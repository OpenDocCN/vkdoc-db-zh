  trans: '## 经典的间隔/岛屿问题


    在本章的分析中，我们将**间隔**定义为一个序列的结束与下一个序列开始之间的距离。而一个**岛屿**则是由前一个间隔的结束与下一个间隔的开始所界定的数据集。间隔和岛屿都由一系列值来定义，这些值指明了间隔或岛屿的开始与结束。间隔和岛屿共存，一方的存在意味着另一方的存在。没有围绕它的数据岛屿，间隔就不可能存在；而没有间隔的环绕，岛屿也不可能存在。数据集的开始和结束通常被视为终止符，其作用类似于间隔，即使我们不认为它们是数据中的间隔。


    间隔是两个数据序列之间的距离，而岛屿则是一对间隔所界定的数据。


    间隔分析最简单的应用是查找表中缺失的 ID 值。考虑一个我们用一组整数填充的表，如清单 9-1 所示。


    ```sql

    CREATE TABLE dbo.integers

    (integer_id INT NOT NULL);

    INSERT INTO dbo.integers

    (integer_id)

    VALUES

    (1), (2), (3), (4), (5), (6), (7), (8), (9), (12), (13), (14), (15), (17), (19),
    (20), (21), (22), (23), (24);

    ```

    清单 9-1

    为间隔分析创建并填充一个整数值表


    我们在 `INSERT` 语句中有意跳过了一些值。挑战在于确定使用 T-SQL 定位缺失整数值的最佳方法。由于这是一个小列表，我们可以直观地从 `INSERT`
    语句中确认缺失值：


    *   1 2 3 4 5 6 7 8 9…12 13 14 15…17…19 20 21 22 23 24


    最简单但最慢的方法是遍历表，逐个计数整数，并在遇到缺失值时进行标记。这很容易理解，但速度极慢且局限性大。在包含数百万或数十亿行的更现实的数据集中，遍历每个值来查找缺失数据效率会低到不值得尝试。此外，该策略对于非整数数据（如日期和时间）会失效。对于这些数据类型，值之间的距离是不确定的，需要额外的分析来定义间隔和岛屿。


    ### 查找岛屿


    窗口函数允许我们以单一步骤处理此数据并返回结果列表，如清单 9-2 所示。


    ```sql

    WITH CTE_ISLANDS AS (

    SELECT

    integer_id,

    integer_id - ROW_NUMBER() OVER (ORDER BY integer_id) AS gap_quantity

    FROM dbo.integers)

    SELECT

    MIN(integer_id) AS island_start,

    MAX(integer_id) AS island_end

    FROM CTE_ISLANDS

    GROUP BY gap_quantity;

    ```

    清单 9-2

    返回非重复整数列表中岛屿的查询


    在此查询中，我们定义了一个公共表表达式，它返回整数值以及该值与其行号之间的差值。在不重复的正整数序列中，该差值只能由序列中的间隔造成，为此我们可以使用 `MIN`
    和 `MAX` 来量化剩余数据岛屿的端点。结果如图 9-1 所示。


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig1_HTML.jpg](img/335106_2_En_9_Fig1_HTML.jpg)

    图 9-1

    通过清单 9-2 的查询找到的整数岛屿


    处理重复值很重要，因此我们通过向整数列表添加一些重复项来继续分析：


    ```sql

    INSERT INTO dbo.integers

    (integer_id)

    VALUES

    (2), (12), (12), (24);

    ```


    如果我们运行之前的查询，图 9-2 所示的结果将显得毫无意义。


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig2_HTML.jpg](img/335106_2_En_9_Fig2_HTML.jpg)

    图 9-2

    通过清单 9-2 的查询找到的整数岛屿


    重复值的存在干扰了我们的计算，因为计算基于行数表示唯一值的假设。窗口函数 `DENSE_RANK` 可以为我们解决这个问题，因为它只考虑唯一值，不会为重复值分配多个
    ID。清单 9-3 展示了一个使用此窗口函数提供准确岛屿列表的新查询。


    ```sql

    WITH CTE_ISLANDS AS (

    SELECT

    integer_id,

    integer_id - DENSE_RANK() OVER (ORDER BY integer_id) AS gap_quantity

    FROM dbo.integers)

    SELECT

    MIN(integer_id) AS island_start,

    MAX(integer_id) AS island_end,

    COUNT(*) AS distinct_value_count

    FROM CTE_ISLANDS

    GROUP BY gap_quantity;

    ```

    清单 9-3

    使用 `DENSE_RANK` 处理重复值


    此查询的结果证实，即使存在重复值，我们也可以返回岛屿集合，如图 9-3 所示。


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig3_HTML.jpg](img/335106_2_En_9_Fig3_HTML.jpg)

    图 9-3

    通过清单 9-2 的查询找到的整数岛屿


    作为额外收获，我们包含了每个岛屿内的行数统计。这很有价值，因为它确实包含了重复值。范围 1-9 包含 10 个值，因为数字 2 重复了一次。这对于量化特定岛屿内的数据量（无论具体值如何）很有用。如果我们想返回忽略重复值的绝对岛屿长度，只需简单地用岛屿结束值减去开始值并加
    1。例如，`9-1 + 1 = 9` 就是范围 1-9 内的 9 个唯一整数值。


    ### 查找间隔


    定位数据中的间隔需要我们首先考虑岛屿集合，然后反转该数据集以查找它们之间的间隔。这需要更多工作，但可以用与定位岛屿类似的方式完成。清单 9-4 中的查询展示了一种在整数列表中查找间隔的方法。


    ```sql

    WITH CTE_GAPS AS (

    SELECT

    integer_id,

    ROW_NUMBER() OVER (ORDER BY integer_id) AS island_quantity

    FROM dbo.integers)

    SELECT

    ISLAND_END.integer_id + 1 AS gap_starting_value,

    ISLAND_START.integer_id - 1 AS gap_ending_value,

    ISLAND_START.integer_id - ISLAND_END.integer_id - 1 AS gap_length

    FROM CTE_GAPS AS ISLAND_END

    INNER JOIN CTE_GAPS AS ISLAND_START

    ON ISLAND_START.island_quantity = ISLAND_END.island_quantity + 1

    WHERE ISLAND_START.integer_id - ISLAND_END.integer_id > 1;

    ```

    清单 9-4

    通过使用 `ROW_NUMBER` 的自连接公共表表达式查找间隔


    此查询的结果可以在图 9-4 中找到，它提供了整数集中的三个间隔。


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig4_HTML.jpg](img/335106_2_En_9_Fig4_HTML.jpg)

    图 9-4

    整数集中的间隔，包括间隔长度


    结果显示了三个符合先前确定的四个岛屿的间隔。由于间隔被定义为值的缺失，因此间隔长度就是该范围内的整数数量。同样，重复值对我们的结果没有影响，我们特意使用 `ROW_NUMBER`
    而不是 `DENSE_RANK`，因为计算重复值会干扰间隔计算，并在存在重复值时导致错误的范围。'
- fmt: '## Limitations and Notes


    The number of islands in a data set will always equal the number of gaps plus
    one. While this may seem like a trivial fact, it allows us to make simplifying
    assumptions about how gaps and islands relate to each other and assign a pair
    of islands to each gap as being related to it. In a discussion of data proximity,
    the events that occur immediately before and after a gap may be significant, and
    assigning them special meaning may allow for the prediction of future events.
    If a gap or island represents an anomaly and we can uniquely quantify the events
    leading up to it as the corresponding gap or island, then those events can be
    alerted on and potentially avoided using automation.


    There are many ways to return gaps and islands within a set of data. We will standardize
    on those that are the easiest to write, document, and maintain. A discussion of
    performance will occur later in this chapter and will address ways to speed up
    gaps/islands analytics in the event that latency or resource consumption concerns.


    So far, our examples have centered around a set of positive integers. While we
    have acknowledged repeated values, our analysis will not work on other data types.
    If we wished to find gaps or islands within a set of decimals, dates, or times,
    our calculations would be insufficient. The remainder of this chapter will center
    on extending gaps and islands analysis to encompass data that we would encounter
    in the real world. This data will often be crunched by analyzing dates and times,
    rather than integers or identities, and will require additional code to do so
    meaningfully.


    ## Data Clusters


    Real data rarely consists of sequential nonrepeating positive integers. While
    IDs are often used to organize information, it is typically dates and times that
    are used to naturally reference it. Performing gaps and islands analysis against
    data based on datetime components leads us into defining a new entity: a data
    cluster.


    Data can be grouped based on boundaries that we create. For example, we can take
    sales data and group it by month, fiscal quarter, or year in order to view changes
    over time. These groupings are static and unchanging. We know that a quarterly
    report will contain 4 buckets of data per year, a monthly report will contain
    12, and a weekly report will contain 52.


    We can choose to group data organically as well, creating rules and allowing data
    to be partitioned into an unknown number of segments based on those rules. The
    rules we choose will be based on a measure of proximity and will determine whether
    two events are related to each other by checking if they are within the same data
    island as each other.


    A data cluster is an organically grouped set of data that is represented by a
    single island within a larger data set. The dimension used to determine grouping
    rules may be numeric, such as an integer or decimal, or it may be a datetime.
    In theory, any data type may be used for this purpose so long as we can construct
    rules about how the data interacts. For example, word strings could be used in
    determining data clusters if proximity happened to be calculated based on alphabetical
    distance.


    To introduce this concept, let’s consider the plight of the on-call technician.
    Alerts are received when things break; the technician wakes up and fixes them,
    heads back to bed, and sleeps until the next thing breaks. When looking back on
    alerts from the past week or month or year, there would be value in grouping events
    by those that are most likely related.


    The easiest way to do so is to look at timing. Events that occur close together
    in time are likely (though not guaranteed) to be related. If a network switch
    breaks, then everything attached to it becomes unreachable. If a cloud service
    becomes unavailable for a minute, then any application that uses that service
    will also encounter trouble.


    Let’s build a simple set of data to introduce this concept. Listing [9-5](#335106_2_En_9_Chapter.xhtml#PC6)
    shows the TSQL to create a new table and populate it with test data.


    ```sql

    CREATE TABLE dbo.error_log

    (        error_log_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_error_log PRIMARY
    KEY CLUSTERED,

    error_time_utc DATETIME NOT NULL,

    error_source VARCHAR(50) NOT NULL,

    severity VARCHAR(10) NOT NULL,

    error_description VARCHAR(100) NOT NULL);

    GO

    INSERT INTO dbo.error_log (error_time_utc, error_source, severity, error_description)

    VALUES

