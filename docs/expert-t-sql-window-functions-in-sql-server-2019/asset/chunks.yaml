  trans: '## 利用行存储上的批处理模式


    有两类窗口函数在过去扩展性不佳：窗口聚合函数和统计函数。这些函数易于使用，但如果在大量行上操作，性能就会下降。你可以通过预聚合来规避这些问题，使函数应用于更少的行，但这并非总是可行。清单
    8-13 展示了两个示例，它们使用清单 8-10 中创建的表，并确保数据库处于 2017 (140) 兼容模式。


    ```sql

    --8-13.1 设置兼容级别

    USE master;

    GO

    ALTER DATABASE AdventureWorks2017

    SET COMPATIBILITY_LEVEL = 140 WITH NO_WAIT;

    GO

    USE AdventureWorks2017;

    GO

    --8-13.2 一个窗口聚合函数

    PRINT ''8-13.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID) AS SubTotal

    FROM SOD;

    --8-13.2 一个统计函数

    PRINT ''8-11.2''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    PERCENT_RANK()

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) AS Ranking

    FROM SOD;

    ```


    清单 8-13: 一个窗口聚合函数和一个统计函数


    ### 图 8-17: 窗口聚合函数和统计函数的逻辑读取


    图 8-17 显示了逻辑读取情况。注意，由于使用了工作表，产生了大量的逻辑读取。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig17_HTML.jpg](img/335106_2_En_8_Fig17_HTML.jpg)


    ### 图 8-18: 显示表假脱机运算符的执行计划


    尽管查询语法简单，但实际执行计划相当复杂。图 8-18 显示了部分计划。请注意，每个计划都有不止一个 `Table Spool`（表假脱机）运算符。`Table
    Spool` 运算符意味着在 `tempdb` 中创建了工作表。即使估计成本很低，这也总会消耗大量资源。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig18_HTML.jpg](img/335106_2_En_8_Fig18_HTML.jpg)


    你可能想知道为什么 `PERCENT_RANK()` 函数性能不佳，而 `RANK()` 函数的性能尚可接受。这是因为 `PERCENT_RANK()` 函数的公式是
    `(RANK -1)/(TotalRows -1)`。在内部，它使用了窗口聚合函数 `COUNT` 来计算总行数。其他三个统计函数也存在同样的性能问题。


    2012 年，微软引入了非聚集 `列存储索引`（`CI`）。`CI` 是一种不同的数据存储方式，其中一页包含一列中的许多行（可能成千上万）。这意味着可以实现高压缩率，查询速度可以提升一个数量级。随着
    SQL Server 的每个新版本，微软都增强了 `CI`，包括引入一种新的处理大数据集聚合的方法：`批处理模式`。这对于需要高 CPU 资源的查询尤其有用。在
    SQL Server 2019 之前（在撰写本文时仍处于预览版），查询中必须涉及 `CI` 才能使用批处理模式。从 2019 版本开始，即使查询中没有 `CI`，优化器也可以选择使用
    `批处理模式`。这被称为 `行存储上的批处理模式`。


    清单 8-14 展示了新的 `行存储上的批处理模式` 如何提升窗口聚合查询的性能。


    ```sql

    --8-14.1 设置兼容级别

    USE master;

    GO

    ALTER DATABASE AdventureWorks2017

    SET COMPATIBILITY_LEVEL = 150 WITH NO_WAIT;

    GO

    USE AdventureWorks2017;

    GO

    --8-14.2 一个窗口聚合函数

    PRINT ''8-14.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID) AS SubTotal

    FROM SOD;

    ```


    清单 8-14: 使用行存储上的批处理模式


    ### 图 8-19: 使用批处理模式时的逻辑读取


    图 8-19 显示了逻辑读取情况。注意，工作表的逻辑读取为 0。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig19_HTML.jpg](img/335106_2_En_8_Fig19_HTML.jpg)


    ### 图 8-20: 带有窗口聚合运算符的执行计划


    图 8-20 显示了实际执行计划。在这种情况下，与在 2017 兼容模式下运行相同查询相比，计划非常简单。另请注意，一个新的运算符 `Window Aggregate`（窗口聚合）成为了计划的一部分。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig20_HTML.jpg](img/335106_2_En_8_Fig20_HTML.jpg)


    ### 图 8-21: 批执行模式


    当鼠标悬停在运算符上时，你会看到图 8-21 所示的属性。注意，`执行模式` 是 `Batch`（批处理）。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig21_HTML.jpg](img/335106_2_En_8_Fig21_HTML.jpg)


    自从窗口聚合函数引入以来，我一直很喜欢使用它们，但我总是担心性能问题。现在，当函数必须在大量行上操作时，`批处理模式` 可以介入并提升性能。请注意，微软没有公布何时切换到
    `批处理模式` 是值得的，因此你的结果可能会有所不同。


    `行存储上的批处理模式` 也有助于提升统计函数 `PERCENT_RANK()`、`CUME_DIST()`、`PERCENTILE_CONT()` 和 `PERCENTILE_DISC()`
    的性能。在内部，这些函数在其公式中使用了窗口聚合，因此它们受益于此是合理的。


    在撰写本文时，尚不清楚 SQL Server 的哪些版本将包含此强大功能。'
- fmt: '## Measuring Time Comparisons


    So far you have learned what to look for in the execution plan and `STATISTICS
    IO`. Your customer, however, will not care about the execution plan or the logical
    reads. Your customer only cares about how fast the query runs. Another setting
    called `STATISTICS TIME` can be used to measure how long a query takes to run.
    While `STATISTICS IO` is beneficial to compare the IO between two queries, you
    may also be interested in how long the queries actually run especially when working
    with longer running queries. Listing [8-15](#335106_2_En_8_Chapter.xhtml#PC15)
    shows an example using the `dbo.SOD` table created earlier in the chapter.


    ```sql

    --8-15.1 Change settings

    SET STATISTICS IO OFF;

    SET STATISTICS TIME ON;

    GO

    --8-15.2 Change compatibility

    USE MASTER;

    GO

    ALTER DATABASE AdventureWorks2017

    SET COMPATIBILITY_LEVEL = 140 WITH NO_WAIT;

    USE AdventureWorks2017;

    GO

    --8-15.3

    PRINT ''

    DEFAULT frame''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID

    ORDER BY SalesOrderDetailID) AS RunningTotal

    FROM SOD;

    --8-15.4

    PRINT ''

    ROWS''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID

    ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS SubTotal

    FROM SOD;

    ```

    Listing 8-15

    Using `STATISTICS TIME`


    The listing compares two queries that return running totals. The first using the
    `DEFAULT` frame, and the second uses `ROWS`. The compatibility mode was also changed
    to SQL Server 2017 as to not take advantage of batch mode. Figure [8-22](#335106_2_En_8_Chapter.xhtml#Fig22)
    shows the information returned by `STATISTICS TIME`.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig22_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig22_HTML.jpg)

    Figure 8-22

    The `STATISTICS TIME` information


    Using `ROWS` took less than 2 seconds, while leaving out the frame took about
    21 seconds. There are several other ways to time the amount of time a query takes
    to run. You can run an Extended Events session, for example. One other thing to
    keep in mind if you do time the queries using the Query Window is that the time
    to populate the grid is also included. You can also turn on *Discard results after
    execution* in the SSMS options to avoid populating the grid. This setting also
    affected the Messages tab in some earlier versions of SSMS. To avoid any issues
    with this, Listing [8-16](#335106_2_En_8_Chapter.xhtml#PC16) throws the rows into
    temp tables instead of displaying them.


    ```sql

    --8-16.1

    PRINT ''

    DEFAULT frame''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID

    ORDER BY SalesOrderDetailID) AS RunningTotal

    INTO #temp1

    FROM SOD;

    --8-16.2

    PRINT ''

    ROWS''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID

    ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS SubTotal

    INTO #Temp2

    FROM SOD;

    DROP TABLE #Temp1;

    DROP TABLE #temp2;

    ```

    Listing 8-16

    Throwing the rows away


    Figure [8-23](#335106_2_En_8_Chapter.xhtml#Fig23) shows the difference.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig23_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig23_HTML.jpg)

    Figure 8-23

    The time when throwing away the results


    ### Note

    You may notice something strange. Why is the CPU time greater than the elapsed
    time? This is because the optimizer divided the query over multiple cores with
    parallelism, so the time is the sum over all the cores.


    I find it interesting to perform comparisons over an even larger number of rows.
    To do so, I’ve run a script from data platform guru, Adam Machanic, called `Thinking
    Big Adventure`. (You can easily find this script by Googling for it.) This script
    creates a 30-million-row table called `bigTransactionHistory`. If you are interested
    in running timings yourself, the queries used will be available along with the
    other queries in this chapter.


    Figure [8-24](#335106_2_En_8_Chapter.xhtml#Fig24) compares using a window aggregate
    to a CTE producing the same results. When running in 2016 mode on my VM, it took
    5 minutes to run the window aggregate compared to 1.75 minutes when using a CTE.
    Both methods ran fast when switching to 2019.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig24_HTML.png](images/335106_2_En_8_Chapter/335106_2_En_8_Fig24_HTML.png)

    Figure 8-24

    Window aggregate performance


    Figure [8-25](#335106_2_En_8_Chapter.xhtml#Fig25) shows the difference for running
    totals between the `DEFAULT` frame and `ROWS`. With 2016, it took 36 minutes when
    using the default frame compared to 3.5 minutes with `ROWS`. Switching to 2019
    mode took only 1.3 minutes for each!


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig25_HTML.png](images/335106_2_En_8_Chapter/335106_2_En_8_Fig25_HTML.png)

    Figure 8-25

    Running total performance


    ## Cleaning Up the Database

    If you would like to return your AdventureWorks database back to its original
    state, you can run Listing [8-17](#335106_2_En_8_Chapter.xhtml#PC17).


    ```sql

    --8-17.1 Drop index

    DROP INDEX [IX_SalesOrderHeader_CustomerID_OrderDate]

    ON Sales.SalesOrderHeader;

    GO

    --8-17-2 Recreate original index

    CREATE INDEX [IX_SalesOrderHeader_CustomerID] ON Sales.SalesOrderHeader

    (CustomerID);

    --8-17-3 Drop special table

    DROP TABLE IF EXISTS dbo.SOD;

    --8-17-4 Drop Thinking Big Adventure tables

    DROP TABLE IF EXISTS dbo.bigTransactionHistory;

    DROP TABLE IF EXISTS dbo.bigProduct;

    ```

    Listing 8-17

    Cleaning Up the Database


    ## Summary

    You can affect the performance of queries with window functions by adding an index
    that sorts on the `PARTITION BY` and `ORDER BY` clauses. A properly constructed
    index can improve the performance of many queries containing window functions.
    When the frame is supported, it’s important to include it. In some cases, you
    can also take advantage of the 2019 Batch Mode on Rowstore feature.


    Now that you understand all the possible types of window functions available and
    how to tune them, it’s time to see even more real-world examples. In Chapter [9](#335106_2_En_9_Chapter.xhtml),
    you’ll play with baseball data!


    # 9. Hitting a Home Run with Gaps, Islands, and Streaks

    Within any set of data, we may examine how that data groups together. This can
    allow us to identify missing rows, find unusual patterns, or develop advanced
    analytical techniques. At its simplest, being able to locate gaps and islands
    will tell us about missing data values. As we delve deeper, it will allow us to
    identify streaks, droughts, or anomalous events worthy of further investigation.


    At the core of this idea are boundaries. A boundary represents a stopping point
    or transition where statistically significant sets of data meet. Dates and times
    are the most common natural boundary conditions found in data as so much of our
    world is organized by when events occur. We can also look at ranges of identity
    values and determine when a value is missing or how many sequential values exist
    before a gap is found. Any data that can be meaningfully sorted can be analyzed
    for the existence of gaps, islands, or data groups.


    To effectively demonstrate these concepts and techniques, we will use a set of
    baseball data for our work. Because baseball is an old sport and our data spans
    over a hundred years, it makes for an excellent set of test data as it is large,
    messy, and full of unusual events. Databases in 1920 were not up to par with what
    we have today, so we can be assured that there exist bad, missing, or unusual
    events that will make for fun analytics.


    Window functions are essential for performing gaps/islands analysis as they provide
    immense flexibility and allow us to apply complex analytics without the need for
    pages of T-SQL. While correlated subqueries, temporary tables, or iteration can
    be used, our goal will be to present solutions that are easy to read and maintain
    and that perform reasonably well.'
