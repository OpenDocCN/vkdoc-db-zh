    FROM Sales.SalesOrderDetail;

    --8-10.5 Create a nonclustered index

    CREATE INDEX SalesOrderID_SOD ON dbo.SOD

    (SalesOrderID, SalesOrderDetailID) INCLUDE(LineTotal);

    Listing 8-10

    Create a Large Test Table

    ```


    Listing [8-11](#335106_2_En_8_Chapter.xhtml#PC11) contains two queries that don’t
    perform well. Be sure to toggle on the actual execution plan before running the
    script.


    ```

    --8-11.1 A running total

    PRINT ''8-11.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) RunningTotal

    FROM SOD;

    --8-11.2 A query with FIRST_VALUE

    PRINT ''8-11.2''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    FIRST_VALUE(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) FirstValue

    FROM SOD;

    Listing 8-11

    Two Queries with Poor Performance

    ```


    Figure [8-14](#335106_2_En_8_Chapter.xhtml#Fig14) shows the statistics information.
    In each case, over 1.4 million logical reads were taken from a worktable.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig14_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig14_HTML.jpg)


    Figure 8-14


    The logical reads from two poorly performing queries


    Figure [8-15](#335106_2_En_8_Chapter.xhtml#Fig15) shows the execution plans for
    the queries. Note the Window Spool operator that shows that a worktable was created,
    but it was not created in memory.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig15_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig15_HTML.jpg)


    Figure 8-15


    The execution plans for two poorly performing queries


    When framing is support but left out, the default frame is used. The default frame
    is `RANGE BETWEEN UNBOUNDED PRECEEDING AND CURRENT ROW`. The `RANGE` operator
    is meant for logical time periods which hasn’t been implemented in SQL Server.
    When `RANGE` is used, the worktable is always created in tempdb, not memory. To
    get around this issue, specify the ROWS operator in the frame. Listing [8-12](#335106_2_En_8_Chapter.xhtml#PC12)
    shows the corrected queries.


    ```

    PRINT ''8-12.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) RunningTotal

    FROM SOD;

    --8-12.2 A query with FIRST_VALUE using ROWS

    PRINT ''8-12.2''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    FIRST_VALUE(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) RunningTotal

    FROM SOD;

    Listing 8-12

    Queries with ROWS

    ```


    Figure [8-16](#335106_2_En_8_Chapter.xhtml#Fig16) shows that the worktables now
    take 0 logical reads. This shows you that the worktables are created in memory.
    If you review the execution plans, they will be identical to the plans shown in
    Figure [8-15](#335106_2_En_8_Chapter.xhtml#Fig15).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig16_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig16_HTML.jpg)


    Figure 8-16


    The logical reads when using ROWS


    These examples compared the logical reads, but how do you know that this really
    makes a difference in how long the queries take to run? If your customer calls
    to complain about a slowly running query, explaining that the logical reads look
    good will mean nothing to them. In the “Measuring Time Comparisons” section of
    this chapter, you’ll see that there really is a performance difference suggested
    by the logical reads.'
  trans: '

    内存授予不再需要，而估计子树成本仅为 `0.104003`。这是一个相当大的改进！对于带有 `WHERE` 子句的查询，应在 `PARTITION BY`
    和 `OVER` 列之前，将该列添加到索引的首位。在前面的例子中，创建一个新的索引比在以 `CustomerID` 开头的索引上添加列更合理，这样可以不影响那些需要
    `CustomerID` 作为第一个索引键的现有查询。不幸的是，如果新列不属于 `OVER` 子句的一部分，排序操作可能还会出现。


    这样设计的索引能有效提升任何单表窗口函数查询的性能。然而，大多数查询涉及多个表。清单 8-9 展示了从多表查询返回相同结果的两种方式。这些查询具有不同的执行计划。此结果假设已应用了清单
    8-8 中的索引更改。


    ```sql

    --8-9.1 使用连接的查询

    SELECT SOH.CustomerID, SOH.SalesOrderID, SOH.OrderDate, C.TerritoryID,

    ROW_NUMBER() OVER(PARTITION BY SOH.CustomerID ORDER BY SOH.OrderDate)

    AS RowNumber

    FROM Sales.SalesOrderHeader AS SOH

    JOIN Sales.Customer C ON SOH.CustomerID = C.CustomerID;

    --8-9.2 重新排列查询

    WITH Sales AS (

    SELECT CustomerID, OrderDate, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate)

    AS RowNumber

    FROM Sales.SalesOrderHeader)

    SELECT Sales.CustomerID, SALES.SalesOrderID, Sales.OrderDate,

    C.TerritoryID, Sales.RowNumber

    FROM Sales

    JOIN Sales.Customer AS C ON C.CustomerID = Sales.CustomerID;

    ```


    清单 8-9

    带有连接的窗口函数


    图 8-13 展示了执行计划。查询 1 通过合并连接将 `Customer` 表和 `SalesOrderHeader` 表的行连接起来，因为两个索引都按
    `CustomerID` 排序。然后输出结果按 `CustomerID` 和 `OrderDate` 排序，并计算行号。查询 2 将 `SalesOrderHeader`
    表移至一个 CTE 中，并在那里应用行号。从执行计划中可以看到，行号是在连接到 `Customer` 表之前应用的。您还可以看到排序操作消失了，其相对成本为
    12%。在这种情况下，通过重新排列查询，第二个查询的性能更好。`PARTITION BY` 和 `ORDER BY` 列都来自同一个查询，但情况并非总是如此。查询会迅速变得复杂，您可能无法总是消除排序。我曾遇到过涉及多个连接表的查询中存在顽固的排序算子，无法将其移除。幸运的是，排序的成本通常与计划中的其他算子相比很小。


    ![连接的执行计划](img/335106_2_En_8_Fig13_HTML.jpg)


    图 8-13

    连接的执行计划


    ## 为性能而设计框架


    在第 5 章中，您学习了如何向 `OVER` 子句添加框架以创建移动聚合。在第 6 章中，您看到了 `FIRST_VALUE` 和 `LAST_VALUE`
    函数为何需要框架。在每种情况下，我都解释了有时需要框架才能获得正确的结果，但它对于性能原因也很重要。本章后面，我将介绍 SQL Server 2019 中一些令人兴奋的性能更新，但现在，本节中的示例将假设数据库处于
    SQL Server 2017 兼容模式或更低版本。


    如果表很小，即使省略框架，查询也能快速运行。清单 8-10 将数据库兼容模式设置为 2017 (`140`) 并打开统计信息。然后，它创建一个用于测试的表并填充数据。如果需要，请修改数据库名称。


    ```sql

    --8-10.1 设置兼容性级别

    USE master;

    GO

    ALTER DATABASE AdventureWorks2017

    SET COMPATIBILITY_LEVEL = 140 WITH NO_WAIT;

    GO

    USE AdventureWorks2017;

    GO

    --8-10.2 打开 STATISTICS IO

    SET STATISTICS IO ON;

    SET NOCOUNT ON;

    GO

    --8-10.3 创建一个更大的测试表

    DROP TABLE IF EXISTS dbo.SOD ;

    CREATE TABLE dbo.SOD(SalesOrderID INT, SalesOrderDetailID INT, LineTotal Money);

    --8-10.4 填充表

    INSERT INTO dbo.SOD(SalesOrderID, SalesOrderDetailID, LineTotal)

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal

    FROM Sales.SalesOrderDetail

    UNION ALL

    SELECT SalesOrderID + MAX(SalesOrderID) OVER(), SalesOrderDetailID, LineTotal

    FROM Sales.SalesOrderDetail;

    --8-10.5 创建非聚集索引

    CREATE INDEX SalesOrderID_SOD ON dbo.SOD

    (SalesOrderID, SalesOrderDetailID) INCLUDE(LineTotal);

    ```


    清单 8-10

    创建大型测试表


    清单 8-11 包含两个性能不佳的查询。运行脚本前请务必打开实际执行计划。


    ```sql

    --8-11.1 运行总和

    PRINT ''8-11.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) RunningTotal

    FROM SOD;

    --8-11.2 使用 FIRST_VALUE 的查询

    PRINT ''8-11.2''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    FIRST_VALUE(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) FirstValue

    FROM SOD;

    ```


    清单 8-11

    两个性能不佳的查询


    图 8-14 显示了统计信息。在每种情况下，从临时表中执行了超过 140 万次逻辑读取。


    ![两个性能不佳查询的逻辑读取](img/335106_2_En_8_Fig14_HTML.jpg)


    图 8-14

    两个性能不佳查询的逻辑读取


    图 8-15 显示了查询的执行计划。请注意窗口假脱机算子，它表明创建了一个临时表，但该表并非在内存中创建。


    ![两个性能不佳查询的执行计划](img/335106_2_En_8_Fig15_HTML.jpg)


    图 8-15

    两个性能不佳查询的执行计划


    当支持框架但被省略时，会使用默认框架。默认框架是 `RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`。`RANGE`
    运算符旨在处理逻辑时间段，这在 SQL Server 中尚未实现。当使用 `RANGE` 时，临时表总是在 tempdb 中创建，而不是在内存中。为了解决此问题，请在框架中指定
    `ROWS` 运算符。清单 8-12 显示了更正后的查询。


    ```sql

    PRINT ''8-12.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) RunningTotal

    FROM SOD;

    --8-12.2 使用 ROWS 的 FIRST_VALUE 查询

    PRINT ''8-12.2''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    FIRST_VALUE(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) RunningTotal

    FROM SOD;

    ```


    清单 8-12

    使用 ROWS 的查询


    图 8-16 显示临时表现在产生 0 次逻辑读取。这表明临时表是在内存中创建的。如果您回顾执行计划，它们将与图 8-15 所示的计划相同。


    ![使用 ROWS 时的逻辑读取](img/335106_2_En_8_Fig16_HTML.jpg)


    图 8-16

    使用 ROWS 时的逻辑读取


    这些示例比较了逻辑读取次数，但您如何知道这真的会对查询运行时间产生影响？如果您的客户打电话抱怨查询运行缓慢，解释逻辑读取情况良好对他们来说毫无意义。在本章的“时间测量比较”部分，您将看到逻辑读取确实暗示了性能差异。

