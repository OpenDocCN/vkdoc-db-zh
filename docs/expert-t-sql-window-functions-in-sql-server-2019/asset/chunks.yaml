- fmt: '## Comparing Statistical Functions to Older Methods


    The functions `PERCENT_RANK` and `CUME_DIST` are more of a convenience than an
    amazing breakthrough like the offset functions you learned about in Chapter [6](#335106_2_En_6_Chapter.xhtml).
    By using the `RANK` function in a simple calculation, you can come up with the
    same answers. The formulas are as follows:


    ```

    PERCENT_RANK = (Rank – 1)/(N – 1)

    CUME_DIST = Rank/N

    ```


    Listing [7-7](#335106_2_En_7_Chapter.xhtml#PC10) demonstrates that you can get
    the same results as Listing [7-1](#335106_2_En_7_Chapter.xhtml#PC2) by using SQL
    Server 2005 functionality.


    ```

    --7-7.1 Using 2005 functionality

    SELECT COUNT(*) NumberOfOrders, Month(OrderDate) AS OrderMonth,

    ((RANK() OVER(ORDER BY COUNT(*)) -1) * 1.0)/(COUNT(*) OVER() -1)

    AS PercentRank,

    (RANK() OVER(ORDER BY COUNT(*)) * 1.0)/COUNT(*) OVER()

    AS CumeDist

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    GROUP BY  Month(OrderDate);

    Listing 7-7

    Using SQL Server 2005 Functionality for the Same Results

    ```


    Figure [7-7](#335106_2_En_7_Chapter.xhtml#Fig7) shows the results. Except that
    the zeros are filled out to 12 places, the results look the same. In this example,
    the window aggregate, `COUNT(*) OVER`, is used to calculate the number of rows
    in the partition. For `PercentRank`, one is subtracted from both the rank and
    the count before dividing.


    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig7_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig7_HTML.jpg)

    Figure 7-7

    The results of calculating percents with older methods


    Is it possible to use an older method for the `PERCENTILE_CONT` and `PERCENTILE_DISC`
    functions? It is not difficult for `PERCENTILE_DISC` because it always returns
    an actual value from the set. Listing [7-8](#335106_2_En_7_Chapter.xhtml#PC11)
    shows how to calculate `PERCENTILE_DISC` using only 2005 functionality.


    ```

    --7-8.1 PERCENTILE_DISC

    SELECT DISTINCT PERCENTILE_DISC(0.75) WITHIN GROUP (ORDER BY COUNT(*)) OVER()
    AS PercentileDisc

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate = ''2013-01-01'' AND OrderDate
    < ''2014-01-01''

    GROUP BY  Month(OrderDate))

    SELECT TOP(1) NumberOfOrders AS PercentileDisc

    FROM Level1

    WHERE Level1.PercentRank <= 0.75

    ORDER BY Level1.PercentRank DESC;

    Listing 7-8

    Using Only SQL Server 2005 Functionality to Calculate PERCENTILE_DISC

    ```


    Figure [7-8](#335106_2_En_7_Chapter.xhtml#Fig8) shows the results. Query 1 uses
    the new functionality so that you can compare it to the older method. Query 2
    moves the query to calculate the percent rank to a CTE called `Level1`. In the
    outer query, one row that is equal to or less than the percent rank 0.75 is returned.


    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig8_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig8_HTML.jpg)

    Figure 7-8

    The result of using an older method for PERCENTILE_DISC


    Accomplishing the same thing for `PERCENTILE_CONT` is even trickier but can still
    be done. In this case, when the exact row is not available, a value is calculated
    by using one value above and one value below the given percent rank. When trying
    to find the median, you just average the two rows, but not when trying to find
    any other percent rank. Listing [7-9](#335106_2_En_7_Chapter.xhtml#PC12) shows
    the solution.


    ```

    --7-9.1 PERCENTILE_CONT

    SELECT DISTINCT PERCENTILE_CONT(0.75) WITHIN GROUP (ORDER BY COUNT(*)) OVER()
    AS PercentCont

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate = ''2013-01-01'' AND OrderDate
    < ''2014-01-01''

    GROUP BY Month(OrderDate)),

    Level2 AS (

    SELECT RowNum, NumberOfOrders,

    FLOOR(TheRow) AS TheBottomRow,

    CEILING(TheRow) AS TheTopRow,

    TheRow

    FROM Level1 ),

    Level3 AS (

    SELECT SUM(CASE WHEN RowNum = TheBottomRow THEN NumberOfOrders END) AS BottomValue,

    SUM(CASE WHEN RowNum = TheTopRow THEN NumberOfOrders END) AS TopValue,

    MAX(TheRow % Level2.TheBottomRow) AS Diff

    FROM Level2)

    SELECT Level3.BottomValue +

    (Level3.TopValue - Level3.BottomValue) * Diff

    FROM Level3;

    Listing 7-9

    Finding PERCENTILE_CONT Using SQL Server 2005 Functionality

    ```


    Figure [7-9](#335106_2_En_7_Chapter.xhtml#Fig9) shows the results. Query 1 uses
    the `PERCENTILE_CONT` function so that you can compare to the older method. The
    `Level1` CTE contains a query that lists the row numbers and the count of orders
    for each month. It also figures out which row has the correct value, `TheRow`,
    if an exact value was in the list. In this case, the row is 9.25. In `Level2`,
    the `FLOOR` function is used to find the row below `TheRow` (9), and the `CEILING`
    function is used to find the row above `TheRow` (10). In `Level3`, the values
    for the two rows are found along with a multiplier, MP. MP is the decimal part
    of `TheRow` (0.25). The code finds it by performing a modulus operation (9.25
    % 9). The outer query adds the difference between the two rows multiplied by MP
    to the value of the bottom row. Whew!


    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig9_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig9_HTML.jpg)

    Figure 7-9

    Comparing PERCENTILE_CONT to an older method


    ## Summary


    Now that you have seen statistical functions `PERCENT_RANK`, `CUME_DIST`, `PERCENTILE_DISC`,
    and `PERCENTILE_CONT`, you have used all of the window functions available with
    SQL Server 2012 up to 2019. In Chapter [8](#335106_2_En_8_Chapter.xhtml), you
    will learn about the performance considerations when using all the window functions.


    # 8. Tuning for Better Performance


    Microsoft has always promoted window functions as having better performance than
    older techniques. In many situations, this is true, but, in my opinion, the biggest
    advantage is that these functions have made solving tricky queries easier. In
    some cases, these functions replace cursors, temp tables, and triangular joins.
    They are quite powerful tools before performance is even considered.


    There are, however, some things you need to know to make sure your queries run
    as fast as possible when you use window functions. Microsoft hasn’t added any
    new functionality since 2012, but it has made some changes to query processing
    in recent versions that directly affect window function performance.


    In this chapter, you will learn what to look for in execution plans, where the
    bottlenecks are, and how to create an index to help any query with a window function.
    You’ll also learn how window functions compare to using older methods and when
    using an older method might be a good idea.'
  raw: '## Comparing Statistical Functions to Older Methods


    The functions `PERCENT_RANK` and `CUME_DIST` are more of a convenience than an
    amazing breakthrough like the offset functions you learned about in Chapter [6](#335106_2_En_6_Chapter.xhtml).
    By using the `RANK` function in a simple calculation, you can come up with the
    same answers. The formulas are as follows:


    ```

    PERCENT_RANK = (Rank – 1)/(N – 1)

    CUME_DIST = Rank/N

    ```


    Listing [7-7](#335106_2_En_7_Chapter.xhtml#PC10) demonstrates that you can get
    the same results as Listing [7-1](#335106_2_En_7_Chapter.xhtml#PC2) by using SQL
    Server 2005 functionality.


    ```

    --7-7.1 Using 2005 functionality

    SELECT COUNT(*) NumberOfOrders, Month(OrderDate) AS OrderMonth,

    ((RANK() OVER(ORDER BY COUNT(*)) -1) * 1.0)/(COUNT(*) OVER() -1)

    AS PercentRank,

    (RANK() OVER(ORDER BY COUNT(*)) * 1.0)/COUNT(*) OVER()

    AS CumeDist

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    GROUP BY  Month(OrderDate);

    Listing 7-7

    Using SQL Server 2005 Functionality for the Same Results

    ```


    Figure [7-7](#335106_2_En_7_Chapter.xhtml#Fig7) shows the results. Except that
    the zeros are filled out to 12 places, the results look the same. In this example,
    the window aggregate, `COUNT(*) OVER`, is used to calculate the number of rows
    in the partition. For `PercentRank`, one is subtracted from both the rank and
    the count before dividing.


    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig7_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig7_HTML.jpg)


    Figure 7-7


    The results of calculating percents with older methods


    Is it possible to use an older method for the `PERCENTILE_CONT` and `PERCENTILE_DISC`
    functions? It is not difficult for `PERCENTILE_DISC` because it always returns
    an actual value from the set. Listing [7-8](#335106_2_En_7_Chapter.xhtml#PC11)
    shows how to calculate `PERCENTILE_DISC` using only 2005 functionality.


    ```

    --7-8.1 PERCENTILE_DISC

    SELECT DISTINCT PERCENTILE_DISC(0.75) WITHIN GROUP (ORDER BY COUNT(*)) OVER()
    AS PercentileDisc

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate = ''2013-01-01'' AND OrderDate
    < ''2014-01-01''

    GROUP BY  Month(OrderDate))

    SELECT TOP(1) NumberOfOrders AS PercentileDisc

    FROM Level1

    WHERE Level1.PercentRank <= 0.75

    ORDER BY Level1.PercentRank DESC;

    Listing 7-8

    Using Only SQL Server 2005 Functionality to Calculate PERCENTILE_DISC

    ```


    Figure [7-8](#335106_2_En_7_Chapter.xhtml#Fig8) shows the results. Query 1 uses
    the new functionality so that you can compare it to the older method. Query 2
    moves the query to calculate the percent rank to a CTE called `Level1`. In the
    outer query, one row that is equal to or less than the percent rank 0.75 is returned.


    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig8_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig8_HTML.jpg)


    Figure 7-8


    The result of using an older method for PERCENTILE_DISC


    Accomplishing the same thing for `PERCENTILE_CONT` is even trickier but can still
    be done. In this case, when the exact row is not available, a value is calculated
    by using one value above and one value below the given percent rank. When trying
    to find the median, you just average the two rows, but not when trying to find
    any other percent rank. Listing [7-9](#335106_2_En_7_Chapter.xhtml#PC12) shows
    the solution.


    ```

    --7-9.1 PERCENTILE_CONT

    SELECT DISTINCT PERCENTILE_CONT(0.75) WITHIN GROUP (ORDER BY COUNT(*)) OVER()
    AS PercentCont

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate = ''2013-01-01'' AND OrderDate
    < ''2014-01-01''

    GROUP BY Month(OrderDate)),

    Level2 AS (

    SELECT RowNum, NumberOfOrders,

    FLOOR(TheRow) AS TheBottomRow,

    CEILING(TheRow) AS TheTopRow,

    TheRow

    FROM Level1 ),

    Level3 AS (

    SELECT SUM(CASE WHEN RowNum = TheBottomRow THEN NumberOfOrders END) AS BottomValue,

    SUM(CASE WHEN RowNum = TheTopRow THEN NumberOfOrders END) AS TopValue,

    MAX(TheRow % Level2.TheBottomRow) AS Diff

    FROM Level2)

    SELECT Level3.BottomValue +

    (Level3.TopValue - Level3.BottomValue) * Diff

    FROM Level3;

    Listing 7-9

    Finding PERCENTILE_CONT Using SQL Server 2005 Functionality

    ```


    Figure [7-9](#335106_2_En_7_Chapter.xhtml#Fig9) shows the results. Query 1 uses
    the `PERCENTILE_CONT` function so that you can compare to the older method. The
    `Level1` CTE contains a query that lists the row numbers and the count of orders
    for each month. It also figures out which row has the correct value, `TheRow`,
    if an exact value was in the list. In this case, the row is 9.25\. In `Level2`,
    the `FLOOR` function is used to find the row below `TheRow (9)`, and the `CEILING`
    function is used to find the row above `TheRow (10)`. In `Level3`, the values
    for the two rows are found along with a multiplier, MP. MP is the decimal part
    of `TheRow (0.25)`. The code finds it by performing a modulus operation (9.25
    % 9). The outer query adds the difference between the two rows multiplied by MP
    to the value of the bottom row. Whew!


    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig9_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Comparing PERCENTILE_CONT to an older method


    ## Summary


    Now that you have seen statistical functions `PERCENT_RANK`, `CUME_DIST`, `PERCENTILE_DISC`,
    and `PERCENTILE_CONT`, you have used all of the window functions available with
    SQL Server 2012 up to 2019\. In Chapter [8](#335106_2_En_8_Chapter.xhtml), you
    will learn about the performance considerations when using all the window functions.


    # 8. Tuning for Better Performance


    Microsoft has always promoted window functions as having better performance than
    older techniques. In many situations, this is true, but, in my opinion, the biggest
    advantage is that these functions have made solving tricky queries easier. In
    some cases, these functions replace cursors, temp tables, and triangular joins.
    They are quite powerful tools before performance is even considered.


    There are, however, some things you need to know to make sure your queries run
    as fast as possible when you use window functions. Microsoft hasn’t added any
    new functionality since 2012, but it has made some changes to query processing
    in recent versions that directly affect window function performance.


    In this chapter, you will learn what to look for in execution plans, where the
    bottlenecks are, and how to create an index to help any query with a window function.
    You’ll also learn how window functions compare to using older methods and when
    using an older method might be a good idea.'
  trans: "## 比较统计函数与旧方法\n\n函数 `PERCENT_RANK` 和 `CUME_DIST` 主要提供了一种便利性，而非像你在第 6 章学到的偏移函数那样的惊人突破。通过在一个简单计算中使用\
    \ `RANK` 函数，你也可以得出相同的答案。公式如下：\n\n```\nPERCENT_RANK = (排名 – 1)/(N – 1)\nCUME_DIST\
    \ = 排名/N\n```\n\n代码清单 7-7 演示了如何使用 SQL Server 2005 的功能得到与代码清单 7-1 相同的结果。\n\n```\n\
    --7-7.1 使用 2005 功能\nSELECT COUNT(*) NumberOfOrders, Month(OrderDate) AS OrderMonth,\n\
    ((RANK() OVER(ORDER BY COUNT(*)) -1) * 1.0)/(COUNT(*) OVER() -1)\nAS PercentRank,\n\
    (RANK() OVER(ORDER BY COUNT(*)) * 1.0)/COUNT(*) OVER()\nAS CumeDist\nFROM Sales.SalesOrderHeader\n\
    WHERE OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01'\nGROUP BY  Month(OrderDate);\n\
    代码清单 7-7\n使用 SQL Server 2005 功能获得相同结果\n```\n\n图 7-7 展示了结果。除了零被填充到 12 位之外，结果看起来是一样的。在此示例中，使用了窗口聚合函数\
    \ `COUNT(*) OVER` 来计算分区中的行数。对于 `PercentRank`，在相除之前，排名和计数都减去了 1。\n\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig7_HTML.jpg](img/335106_2_En_7_Fig7_HTML.jpg)\n\
    图 7-7\n使用旧方法计算百分比的结果\n\n对于 `PERCENTILE_CONT` 和 `PERCENTILE_DISC` 函数，是否可以使用旧方法呢？`PERCENTILE_DISC`\
    \ 并不困难，因为它总是返回集合中的一个实际值。代码清单 7-8 展示了如何仅使用 2005 功能来计算 `PERCENTILE_DISC`。\n\n```\n\
    --7-8.1 PERCENTILE_DISC\nWITH Level1 AS (\nSELECT DISTINCT Month(OrderDate) AS\
    \ OrderMonth, \nCOUNT(*) AS NumberOfOrders,\nPERCENT_RANK() OVER(ORDER BY COUNT(*))\
    \ AS PercentRank\nFROM Sales.SalesOrderHeader\nWHERE OrderDate >= '2013-01-01'\
    \ AND OrderDate < '2014-01-01'\nGROUP BY  Month(OrderDate))\nSELECT TOP(1) NumberOfOrders\
    \ AS PercentileDisc\nFROM Level1\nWHERE Level1.PercentRank <= 0.75\nORDER BY Level1.PercentRank\
    \ DESC;\n代码清单 7-8\n仅使用 SQL Server 2005 功能计算 PERCENTILE_DISC\n```\n\n图 7-8 展示了结果。查询\
    \ 1 使用了新功能，以便与旧方法进行比较。查询 2 将计算百分比排名的查询移动到一个名为 `Level1` 的 CTE 中。在外层查询中，返回了一行百分比排名等于或小于\
    \ 0.75 的数据。\n\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig8_HTML.jpg](img/335106_2_En_7_Fig8_HTML.jpg)\n\
    图 7-8\n使用旧方法计算 PERCENTILE_DISC 的结果\n\n对 `PERCENTILE_CONT` 实现相同的目的则更为棘手，但仍可实现。在这种情况下，当确切行不可用时，会使用给定百分比排名之上和之下的一个值来计算一个值。尝试找到中位数时，你只需对两行取平均值，但在尝试找到任何其他百分比排名时则不然。代码清单\
    \ 7-9 展示了解决方案。\n\n```\n--7-9.1 PERCENTILE_CONT\nWITH Level1 AS (\nSELECT DISTINCT\
    \ Month(OrderDate) AS OrderMonth, \nCOUNT(*) AS NumberOfOrders,\nPERCENTILE_CONT(0.75)\
    \ WITHIN GROUP (ORDER BY COUNT(*)) OVER() AS PercentCont,\nPERCENT_RANK() OVER(ORDER\
    \ BY COUNT(*)) AS PercentRank,\nROW_NUMBER() OVER(ORDER BY COUNT(*)) AS RowNum,\n\
    0.75 * (COUNT(*) OVER() - 1) + 1 AS TheRow\nFROM Sales.SalesOrderHeader\nWHERE\
    \ OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01'\nGROUP BY Month(OrderDate)),\n\
    Level2 AS (\nSELECT RowNum, NumberOfOrders,\nFLOOR(TheRow) AS TheBottomRow,\n\
    CEILING(TheRow) AS TheTopRow,\nTheRow\nFROM Level1 ),\nLevel3 AS (\nSELECT SUM(CASE\
    \ WHEN RowNum = TheBottomRow THEN NumberOfOrders END) AS BottomValue,\nSUM(CASE\
    \ WHEN RowNum = TheTopRow THEN NumberOfOrders END) AS TopValue,\nMAX(TheRow %\
    \ Level2.TheBottomRow) AS Diff\nFROM Level2)\nSELECT Level3.BottomValue +\n(Level3.TopValue\
    \ - Level3.BottomValue) * Diff\nFROM Level3;\n代码清单 7-9\n使用 SQL Server 2005 功能查找\
    \ PERCENTILE_CONT\n```\n\n图 7-9 展示了结果。查询 1 使用了 `PERCENTILE_CONT` 函数，以便与旧方法进行比较。`Level1`\
    \ CTE 包含一个查询，列出了每个月的行号和订单计数。它还计算出如果列表中存在确切值，哪一行会包含该值，即 `TheRow`。在此例中，该行是 9.25。在\
    \ `Level2` 中，使用 `FLOOR` 函数找到 `TheRow` 之下的一行(9)，使用 `CEILING` 函数找到 `TheRow` 之上的一行(10)。在\
    \ `Level3` 中，找到了两行的值以及一个乘数 MP。MP 是 `TheRow` 的小数部分(0.25)。代码通过执行取模运算(9.25 % 9)找到它。外层查询将两行之间的差值乘以\
    \ MP 后，加到底行的值上。呼！\n\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig9_HTML.jpg](img/335106_2_En_7_Fig9_HTML.jpg)\n\
    图 7-9\n将 PERCENTILE_CONT 与旧方法进行比较\n\n## 小结\n\n既然你已经见识了统计函数 `PERCENT_RANK`、`CUME_DIST`、`PERCENTILE_DISC`\
    \ 和 `PERCENTILE_CONT`，那么你已使用了 SQL Server 2012 至 2019 版可用的所有窗口函数。在第 8 章中，你将学习使用所有窗口函数时的性能考量。\n\
    \n# 8. 为获得更佳性能进行调优\n\n微软一直宣传窗口函数比旧技术具有更好的性能。在许多情况下，这是事实，但在我看来，最大的优势是这些函数让解决棘手的查询变得更容易。在某些情况下，它们替代了游标、临时表和三角连接。甚至在考虑性能之前，它们就是非常强大的工具。\n\
    \n然而，在使用窗口函数时，为了确保查询运行得尽可能快，有些事情你需要了解。自 2012 年以来，微软没有添加任何新功能，但在最近的版本中，它对查询处理进行了一些更改，这些更改直接影响窗口函数的性能。\n\
    \n在本章中，你将学习在执行计划中需要关注什么，瓶颈在哪里，以及如何创建索引来帮助任何使用窗口函数的查询。你还将学习窗口函数与使用旧方法相比如何，以及何时使用旧方法可能是个好主意。"
- fmt: '## Using Execution Plans


    Graphical execution plans make tuning T-SQL queries easier. You can compare the
    performance of multiple queries and look for bottlenecks within a query. If graphical
    execution plans are new to you, you may want to read *SQL Server 2017 Query Performance
    Tuning* by Grant Fritchey (Apress, 2018) or just follow along and see what you
    can learn.


    For many years, database professionals have been using SQL Server Management Studio
    (`SSMS`) to run queries. Microsoft has not only updated the icons used in graphical
    execution plans since the first edition of this book, it has recently introduced
    a new cross-platform tool called Azure Data Studio (`ADS`) with execution plans
    that have a different look to them. To see the difference, run the simple query
    found in Listing [8-1](#335106_2_En_8_Chapter.xhtml#PC1) both in `SSMS` and `ADS`.
    Before running the query in `SSMS`, be sure to turn on the execution plan by typing
    `CTRL + M`. In `ADS`, just click `Explain` after running the query.


    ```

    --8-1.1 A simple query

    SELECT *

    FROM HumanResources.Employee;

    Listing 8-1

    A Simple Query to Run

    ```


    Figure [8-1](#335106_2_En_8_Chapter.xhtml#Fig1) shows the two execution plans.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig1_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig1_HTML.jpg)

    Figure 8-1: The graphical execution plans from `SSMS` and `ADS`


    I’ll show the execution plans generated from `SSMS` version 18 throughout this
    chapter. To follow along, be sure that the actual execution plan is toggled on
    for all examples in this chapter.


    There is one execution operator that is specific for window functions; it is the
    `Sequence Project (Compute Scalar)` operator, which is shown in Figure [8-2](#335106_2_En_8_Chapter.xhtml#Fig2).
    This operator is nothing to worry about. It just means that the column for the
    computation has been added to the results. You’ll see it in the execution plans
    of queries with some window functions, but not all. To see the plan, run Listing
    [8-2](#335106_2_En_8_Chapter.xhtml#PC2).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig2_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig2_HTML.jpg)

    Figure 8-2: An execution plan with a `Sequence Project (Compute Scalar)` operator


    ```

    --8-2.1 Query to produce Sequence Project (Compute Scalar) operator

    SELECT CustomerID, ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 8-2

    Seeing the Sequence Project Operator (Compute Scalar)

    ```


    Another operator you will see often with window function queries is the `Segment`
    operator, also shown in Figure [8-2](#335106_2_En_8_Chapter.xhtml#Fig2) to the
    right of the `Sequence Project (Compute Scalar)` operator. The `Segment` operator
    divides the input into segments or groups. If there is no `PARTITION BY` expression,
    then the segment will be the entire result set. Otherwise, the segments will be
    divided by the `PARTITION BY` expressions. By opening the properties of the `Segment`
    operator, you’ll see that the `Group By` property is blank. Figure [8-3](#335106_2_En_8_Chapter.xhtml#Fig3)
    shows this.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig3_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig3_HTML.jpg)

    Figure 8-3: The `Group By` property of the `Segment` operator


    If you change the query by adding a `PARTITION BY`, shown in Listing [8-3](#335106_2_En_8_Chapter.xhtml#PC3),
    the `Group By` property shows the `PARTITION BY` column.


    ```

    --8-3.1 Add PARTITION BY

    SELECT CustomerID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 8-3

    Add a PARTITION BY

    ```


    Figure [8-4](#335106_2_En_8_Chapter.xhtml#Fig4) shows how the properties have
    changed.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig4_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig4_HTML.jpg)

    Figure 8-4: The `Group By` properties when a partition is added


    The `Sequence Project (Compute Scalar)` and `Segment` operators are nothing to
    worry about when tuning queries. The operator to watch out for, that you can do
    something about, is the `Sort` operator, shown in Figure [8-5](#335106_2_En_8_Chapter.xhtml#Fig5).
    The `Sort` operator is found in many types of queries and is often the bottleneck
    in window function queries. To see the plan, run Listing [8-4](#335106_2_En_8_Chapter.xhtml#PC4).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig5_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig5_HTML.jpg)

    Figure 8-5: An execution plan with the `Sort` operator


    ```

    --8-4.1 A query to show the Sort operator

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 8-4

    A Query with a Sort Operator

    ```


    Notice that the `Sort` operator takes 80% of the resources used to run the query
    even though a clustered index scan was performed. You’ll learn how to create an
    index to eliminate the `Sort` in many cases later in the chapter.


    There are two more operators to watch out for. Take a look at the `Table Spool`
    operator shown in Figure [8-6](#335106_2_En_8_Chapter.xhtml#Fig6). Run Listing
    [8-5](#335106_2_En_8_Chapter.xhtml#PC5) to generate the plan yourself.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig6_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig6_HTML.jpg)

    Figure 8-6: An execution plan with `Table Spool` operators


    ```

    --8-5.1 A query with a Table Spool operator

    SELECT CustomerID, SalesOrderID, SUM(TotalDue)

    OVER(PARTITION BY CustomerID) AS SubTotal

    FROM Sales.SalesOrderHeader;

    Listing 8-5

    A Query Containing Table Spool Operators

    ```


    The `Table Spool` operator means that a worktable is created in `tempdb` to help
    solve the query. You will see `Table Spool` operators with window aggregates and
    some other window functions. This worktable uses a lot of resources, including
    locks, but there is good news if you are using SQL Server 2019 which you will
    learn about later in the chapter.


    The other operator to be aware of, the `Window Spool` operator, is similar, but
    it *sometimes* creates the worktable in memory. Run Listing [8-6](#335106_2_En_8_Chapter.xhtml#PC6)
    to see the plan shown in Figure [8-7](#335106_2_En_8_Chapter.xhtml#Fig7).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig7_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig7_HTML.jpg)

    Figure 8-7: A plan with a `Window Spool` operator


    ```

    --8-6.1 A query with a window spool operator

    SELECT CustomerID, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RunningTotal

    FROM Sales.SalesOrderHeader;

    Listing 8-6

    A Query Containing a Window Spool Operator

    ```


    The `Window Spool` operator theoretically means that the worktable is created
    in memory, but, in some cases, it is created in `tempdb`. The difference will
    be covered later in the chapter. Just like the `Table Spool` operator, this one
    has some performance improvements in 2019.'
  raw: '## Using Execution Plans


    Graphical execution plans make tuning T-SQL queries easier. You can compare the
    performance of multiple queries and look for bottlenecks within a query. If graphical
    execution plans are new to you, you may want to read *SQL Server 2017 Query Performance
    Tuning* by Grant Fritchey (Apress, 2018) or just follow along and see what you
    can learn.


    For many years, database professionals have been using SQL Server Management Studio
    (SSMS) to run queries. Microsoft has not only updated the icons used in graphical
    execution plans since the first edition of this book, it has recently introduced
    a new cross-platform tool called Azure Data Studio (ADS) with execution plans
    that have a different look to them. To see the difference, run the simple query
    found in Listing [8-1](#335106_2_En_8_Chapter.xhtml#PC1) both in SSMS and ADS.
    Before running the query in SSMS, be sure to turn on the execution plan by typing
    `CTRL + M`. In ADS, just click Explain after running the query.


    ```

    --8-1.1 A simple query

    SELECT *

    FROM HumanResources.Employee;

    Listing 8-1

    A Simple Query to Run

    ```


    Figure [8-1](#335106_2_En_8_Chapter.xhtml#Fig1) shows the two execution plans.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig1_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig1_HTML.jpg)


    Figure 8-1


    The graphical execution plans from SSMS and ADS


    I’ll show the execution plans generated from SSMS version 18 throughout this chapter.
    To follow along, be sure that the actual execution plan is toggled on for all
    examples in this chapter.


    There is one execution operator that is specific for window functions; it is the
    *Sequence Project* *(Compute Scalar)* operator, which is shown in Figure [8-2](#335106_2_En_8_Chapter.xhtml#Fig2).
    This operator is nothing to worry about. It just means that the column for the
    computation has been added to the results. You’ll see it in the execution plans
    of queries with some window functions, but not all. To see the plan, run Listing
    [8-2](#335106_2_En_8_Chapter.xhtml#PC2).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig2_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    An execution plan with a Sequence Project (Compute Scalar) operator


    ```

    --8-2.1 Query to produce Sequence Project (Compute Scalar) operator

    SELECT CustomerID, ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 8-2

    Seeing the Sequence Project Operator (Compute Scalar)

    ```


    Another operator you will see often with window function queries is the *Segment*
    operator, also shown in Figure [8-2](#335106_2_En_8_Chapter.xhtml#Fig2) to the
    right of the Sequence Project (Compute Scalar) operator. The Segment operator
    divides the input into segments or groups. If there is no `PARTITION BY` expression,
    then the segment will be the entire result set. Otherwise, the segments will be
    divided by the `PARTITION BY` expressions. By opening the properties of the Segment
    operator, you’ll see that the Group By property is blank. Figure [8-3](#335106_2_En_8_Chapter.xhtml#Fig3)
    shows this.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig3_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    The Group By property of the Segment operator


    If you change the query by adding a PARTITION BY, shown in Listing [8-3](#335106_2_En_8_Chapter.xhtml#PC3),
    the Group By property shows the PARTITION BY column.


    ```

    --8-3.1 Add PARTITION BY

    SELECT CustomerID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 8-3

    Add a PARTITION BY

    ```


    Figure [8-4](#335106_2_En_8_Chapter.xhtml#Fig4) shows how the properties have
    changed.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig4_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    The Group By properties when a partition is added


    The Sequence Project (Compute Scalar) and Segment operators are nothing to worry
    about when tuning queries. The operator to watch out for, that you can do something
    about, is the *Sort* operator, shown in Figure [8-5](#335106_2_En_8_Chapter.xhtml#Fig5).
    The Sort operator is found in many types of queries and is often the bottleneck
    in window function queries. To see the plan, run Listing [8-4](#335106_2_En_8_Chapter.xhtml#PC4).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig5_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    An execution plan with the Sort operator


    ```

    --8-4.1 A query to show the Sort operator

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 8-4

    A Query with a Sort Operator

    ```


    Notice that the Sort operator takes 80% of the resources used to run the query
    even though a clustered index scan was performed. You’ll learn how to create an
    index to eliminate the Sort in many cases later in the chapter.


    There are two more operators to watch out for. Take a look at the Table Spool
    operator shown in Figure [8-6](#335106_2_En_8_Chapter.xhtml#Fig6). Run Listing
    [8-5](#335106_2_En_8_Chapter.xhtml#PC5) to generate the plan yourself.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig6_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig6_HTML.jpg)


    Figure 8-6


    An execution plan with Table Spool operators


    ```

    --8-5.1 A query with a Table Spool operator

    SELECT CustomerID, SalesOrderID, SUM(TotalDue)

    OVER(PARTITION BY CustomerID) AS SubTotal

    FROM Sales.SalesOrderHeader;

    Listing 8-5

    A Query Containing Table Spool Operators

    ```


    The Table Spool operator means that a worktable is created in `tempdb` to help
    solve the query. You will see Table Spool operators with window aggregates and
    some other window functions. This worktable uses a lot of resources, including
    locks, but there is good news if you are using SQL Server 2019 which you will
    learn about later in the chapter.


    The other operator to be aware of, the Window Spool operator, is similar, but
    it *sometimes* creates the worktable in memory. Run Listing [8-6](#335106_2_En_8_Chapter.xhtml#PC6)
    to see the plan shown in Figure [8-7](#335106_2_En_8_Chapter.xhtml#Fig7).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig7_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig7_HTML.jpg)


    Figure 8-7


    A plan with a Window Spool operator


    ```

    --8-6.1 A query isth a window spool operator

    SELECT CustomerID, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RunningTotal

    FROM Sales.SalesOrderHeader;

    Listing 8-6

    A Query Containing a Window Spool Operator

    ```


    The Window Spool operator theoretically means that the worktable is created in
    memory, but, in some cases, it is created in tempdb. The difference will be covered
    later in the chapter. Just like the Table Spool operator, this one has some performance
    improvements in 2019.'
  trans: '## 使用执行计划


    图形化执行计划让 T-SQL 查询的调优变得更加容易。您可以比较多个查询的性能，并寻找查询内部的瓶颈。如果您对图形化执行计划还不熟悉，可以阅读 Grant
    Fritchey 所著的*《SQL Server 2017 查询性能调优》*（Apress，2018），或者直接跟随本文了解您能学到什么。


    多年来，数据库专业人员一直使用 SQL Server Management Studio (`SSMS`) 来运行查询。自本书第一版以来，微软不仅更新了图形化执行计划中使用的图标，最近还引入了一个新的跨平台工具——Azure
    Data Studio (`ADS`)，其执行计划的外观有所不同。要看到差异，可以在 `SSMS` 和 `ADS` 中分别运行清单 8-1 中的简单查询。在
    `SSMS` 中运行查询前，请务必键入 `CTRL + M` 以开启执行计划。在 `ADS` 中，运行查询后只需点击 `Explain` 即可。


    ```

    --8-1.1 一个简单查询

    SELECT *

    FROM HumanResources.Employee;

    清单 8-1

    要运行的简单查询

    ```


    图 8-1 展示了这两个执行计划。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig1_HTML.jpg](img/335106_2_En_8_Fig1_HTML.jpg)

    图 8-1：来自 `SSMS` 和 `ADS` 的图形化执行计划


    本章将展示由 `SSMS` 18 版本生成的执行计划。要跟随操作，请确保本章所有示例都切换开启了实际执行计划。


    有一个专门用于窗口函数的执行操作符；它是 `Sequence Project (Compute Scalar)` 操作符，如图 8-2 所示。这个操作符无需担心。它只是意味着计算所需的列已被添加到结果中。您会在包含某些窗口函数的查询执行计划中看到它，但并非所有情况都会出现。要查看该计划，请运行清单
    8-2。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig2_HTML.jpg](img/335106_2_En_8_Fig2_HTML.jpg)

    图 8-2：包含 `Sequence Project (Compute Scalar)` 操作符的执行计划


    ```

    --8-2.1 生成 Sequence Project (Compute Scalar) 操作符的查询

    SELECT CustomerID, ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    清单 8-2

    查看 Sequence Project 操作符 (Compute Scalar)

    ```


    另一个在窗口函数查询中常见的操作符是 `Segment` 操作符，同样显示在图 8-2 中 `Sequence Project (Compute Scalar)`
    操作符的右侧。`Segment` 操作符将输入划分为段或组。如果没有 `PARTITION BY` 表达式，那么段将是整个结果集。否则，段将根据 `PARTITION
    BY` 表达式进行划分。通过打开 `Segment` 操作符的属性，您会看到 `Group By` 属性是空白的。图 8-3 展示了这一点。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig3_HTML.jpg](img/335106_2_En_8_Fig3_HTML.jpg)

    图 8-3：`Segment` 操作符的 `Group By` 属性


    如果您通过添加 `PARTITION BY` 来修改查询，如清单 8-3 所示，`Group By` 属性就会显示 `PARTITION BY` 的列。


    ```

    --8-3.1 添加 PARTITION BY

    SELECT CustomerID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    清单 8-3

    添加 PARTITION BY

    ```


    图 8-4 显示了属性如何变化。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig4_HTML.jpg](img/335106_2_En_8_Fig4_HTML.jpg)

    图 8-4：添加分区后的 `Group By` 属性


    在调优查询时，`Sequence Project (Compute Scalar)` 和 `Segment` 操作符无需担心。需要注意且您可以采取措施的操作符是
    `Sort` 操作符，如图 8-5 所示。`Sort` 操作符出现在多种查询中，并且常常是窗口函数查询中的瓶颈。要查看该计划，请运行清单 8-4。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig5_HTML.jpg](img/335106_2_En_8_Fig5_HTML.jpg)

    图 8-5：包含 `Sort` 操作符的执行计划


    ```

    --8-4.1 展示 Sort 操作符的查询

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate) AS RowNumber

    FROM Sales.SalesOrderHeader;

    清单 8-4

    包含 Sort 操作符的查询

    ```


    请注意，即使执行了聚集索引扫描，`Sort` 操作符也占用了运行该查询所用资源的 80%。本章稍后将介绍如何创建索引以在许多情况下消除 `Sort`。


    还有两个操作符需要注意。看一下图 8-6 中的 `Table Spool` 操作符。运行清单 8-5 来亲自生成该计划。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig6_HTML.jpg](img/335106_2_En_8_Fig6_HTML.jpg)

    图 8-6：包含 `Table Spool` 操作符的执行计划


    ```

    --8-5.1 包含 Table Spool 操作符的查询

    SELECT CustomerID, SalesOrderID, SUM(TotalDue)

    OVER(PARTITION BY CustomerID) AS SubTotal

    FROM Sales.SalesOrderHeader;

    清单 8-5

    包含 Table Spool 操作符的查询

    ```


    `Table Spool` 操作符意味着在 `tempdb` 中创建了一个工作表来帮助解决查询。您会在窗口聚合和一些其他窗口函数中看到 `Table Spool`
    操作符。这个工作表会消耗大量资源，包括锁，但如果您使用的是 SQL Server 2019，则有个好消息，本章稍后会介绍。


    另一个需要注意的操作符是 `Window Spool` 操作符，它与之类似，但*有时*会在内存中创建工作表。运行清单 8-6 以查看图 8-7 所示的计划。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig7_HTML.jpg](img/335106_2_En_8_Fig7_HTML.jpg)

    图 8-7：包含 `Window Spool` 操作符的计划


    ```

    --8-6.1 包含窗口假脱机操作符的查询

    SELECT CustomerID, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RunningTotal

    FROM Sales.SalesOrderHeader;

    清单 8-6

    包含 Window Spool 操作符的查询

    ```


    `Window Spool` 操作符理论上意味着工作表在内存中创建，但在某些情况下，它会在 `tempdb` 中创建。区别将在本章后面介绍。与 `Table
    Spool` 操作符一样，此操作符在 2019 版本中也有一些性能改进。'
- fmt: '## Using STATISTICS IO


    Another very helpful tool for understanding query performance is `STATISTICS IO`.
    This setting will give you information about the pages read to run the query.
    The nice thing is that it doesn’t matter if other queries are running on the server
    or if the data is already in the cache. If the cache is warm, meaning the needed
    data is already in memory, the query will often run faster, and you might mistakenly
    think you have made an improvement. The logical reads (the number of data pages
    read) returned will be consistent as long as nothing has changed about the query,
    indexes, data, or settings. That makes it a great tool for comparing two queries
    or figuring out if a new index has helped. I like to use both the execution plan
    and `STATISTICS IO` to make sure I understand what is going on.


    Run Listing [8-7](#335106_2_En_8_Chapter.xhtml#PC7) to see how the queries from
    the previous section compare. While the queries do not produce the same results,
    it is still interesting to see the difference between them from a performance
    perspective. Note that the database compatibility mode has been set to the 2014
    version.


    ```

    --8-7.0 Settings

    USE [master];

    GO

    --Change database name as needed

    ALTER DATABASE [AdventureWorks]

    SET COMPATIBILITY_LEVEL = 120;

    GO

    USE [AdventureWorks];

    SET STATISTICS IO ON;

    SET NOCOUNT ON;

    GO

    --8-7.1 Query to produce Sequence Project

    PRINT ''8-7.1'';

    SELECT CustomerID, ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --8-7.2 A query to show the Sort operator

    PRINT ''8-7.2'';

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --8-7.3 A query with a Table Spool operator

    PRINT ''8-7.3'';

    SELECT CustomerID, SalesOrderID, SUM(TotalDue) OVER(PARTITION BY CustomerID)

    AS SubTotal

    FROM Sales.SalesOrderHeader;

    Listing 8-7

    Using STATISTICS IO

    ```


    Figure [8-8](#335106_2_En_8_Chapter.xhtml#Fig8) shows the results from the Messages
    tab produced by the `STATISTICS IO` setting. The listing begins by turning on
    `STATISTICS IO` and turning off row counts. Before each query, a `PRINT` statement
    prints the query number so that you will know which information goes with which
    query.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig8_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig8_HTML.jpg)


    Figure 8-8

    The STATISTICS IO output from the queries


    The most useful information comes from `logical reads`, which is the number of
    pages read. Query 1 and Query 2 each take 689 `logical reads`. That is approximately
    the number of pages in the clustered index of the `Sales.SalesOrderHeader` table.
    If you look back at Figure [8-1](#335106_2_En_8_Chapter.xhtml#Fig1), you will
    see that a clustered index scan was performed. Query 3 with a window aggregate
    takes 689 `logical reads` to scan the clustered index, but it also creates a worktable
    in `tempdb`. It uses 139,407 `logical reads` to perform the calculations using
    the worktable.


    Using `STATISTICS IO` can be very beneficial in cases where the execution plans
    show identical costs, but the queries take a different amount of time to run.
    I always use both tools when I am tuning queries.


    ## Indexing to Improve the Performance of Window Functions


    Sorting is often the bottleneck in queries with window functions. You saw the
    Sort operator take 95% of the resources in the query from Listing [8-4](#335106_2_En_8_Chapter.xhtml#PC4).
    It is possible, by adding the correct index, to eliminate the sort and decrease
    the logical reads. The optimum index will sort correctly and cover the query.
    Of course, you can’t add an index for every query you write, but for queries where
    the performance is critical, you will know what to do.


    Rerun the query from Listing [8-4](#335106_2_En_8_Chapter.xhtml#PC4), making sure
    the actual execution plan setting is toggled on first. Click the `Select` operator
    and view the tooltip, as shown in Figure [8-9](#335106_2_En_8_Chapter.xhtml#Fig9).
    You can see a `Memory Grant` of 4416 reserved as space for sorting and the `Estimated
    Subtree Cost` of 2.71698.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig9_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig9_HTML.jpg)


    Figure 8-9

    The SELECT tooltip


    Click the `Sort` operator and then press `F4` to see the properties. The `Order
    By` property lists two columns. Figure [8-10](#335106_2_En_8_Chapter.xhtml#Fig10)
    shows the information.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig10_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig10_HTML.jpg)


    Figure 8-10

    The Order By columns


    The `Sort` operator is sorting by `CustomerID` and `OrderDate`. This makes sense
    because the `PARTITION BY` expression is `CustomerID` and the `ORDER BY` expression
    is `OrderDate`. The data had to be divided by the `PARTITION BY` column and then
    sorted by the `ORDER BY` column. Notice also in the figure that there are three
    `Output List` columns. If you look at the `Output List`, you will see `CustomerID`,
    `OrderDate`, and `SaleOrderID`, the three columns used in the query. The candidate
    index will have `CustomerID` and `OrderDate` as the keys and `SalesOrderID` as
    an included column. In this case, `SalesOrderID` is not required since it is the
    cluster key of the table and it is already part of any nonclustered index.


    Another thing to consider is existing indexes on the table. The table has a nonclustered
    index on `CustomerID`, `IX_SalesOrderHeader_CustomerID`. Instead of creating a
    new index, you can modify this one. Queries that previously used the old index
    can now use the new one. Run Listing [8-8](#335106_2_En_8_Chapter.xhtml#PC8) to
    drop the existing index and create a new one.


    ```

    --8-8.1 Drop the existing index

    DROP INDEX [IX_SalesOrderHeader_CustomerID] ON [Sales].[SalesOrderHeader];

    GO

    --8-8.2 Create a new index for the query

    CREATE NONCLUSTERED INDEX [IX_SalesOrderHeader_CustomerID_OrderDate]

    ON [Sales].[SalesOrderHeader] ([CustomerID], [OrderDate]);

    Listing 8-8

    Modifying the Index

    ```


    Now rerun the query from Listing [8-4](#335106_2_En_8_Chapter.xhtml#PC4). The
    new execution plan is shown in Figure [8-11](#335106_2_En_8_Chapter.xhtml#Fig11).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig11_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig11_HTML.jpg)


    Figure 8-11

    The execution plan after the index change


    The first thing you should see is that the `Sort` operator is gone. Now the main
    cost of running the query is scanning the new nonclustered index. Figure [8-12](#335106_2_En_8_Chapter.xhtml#Fig12)
    shows the `SELECT` tooltip.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig12_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig12_HTML.jpg)


    Figure 8-12

    The SELECT tooltip after the index change'
  raw: '## Using STATISTICS IO


    Another very helpful tool for understanding query performance is `STATISTICS IO`.
    This setting will give you information about the pages read to run the query.
    The nice thing is that it doesn’t matter if other queries are running on the server
    or if the data is already in the cache. If the cache is warm, meaning the needed
    data is already in memory, the query will often run faster, and you might mistakenly
    think you have made an improvement. The logical reads (the number of data pages
    read) returned will be consistent as long as nothing has changed about the query,
    indexes, data, or settings. That makes it a great tool for comparing two queries
    or figuring out if a new index has helped. I like to use both the execution plan
    and `STATISTICS IO` to make sure I understand what is going on.


    Run Listing [8-7](#335106_2_En_8_Chapter.xhtml#PC7) to see how the queries from
    the previous section compare. While the queries do not produce the same results,
    it is still interesting to see the difference between them from a performance
    perspective. Note that the database compatibility mode has been set to the 2014
    version.


    ```

    --8-7.0 Settings

    USE [master];

    GO

    --Change database name as needed

    ALTER DATABASE [AdventureWorks]

    SET COMPATIBILITY_LEVEL = 120;

    GO

    USE [AdventureWorks];

    SET STATISTICS IO ON;

    SET NOCOUNT ON;

    GO

    --8-7.1 Query to produce Sequence Project

    PRINT ''8-7.1'';

    SELECT CustomerID, ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --8-7.2 A query to show the Sort operator

    PRINT ''8-7.2'';

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --8-7.3 A query with a Table Spool operator

    PRINT ''8-7.3'';

    SELECT CustomerID, SalesOrderID, SUM(TotalDue) OVER(PARTITION BY CustomerID)

    AS SubTotal

    FROM Sales.SalesOrderHeader;

    Listing 8-7

    Using STATISTICS IO

    ```


    Figure [8-8](#335106_2_En_8_Chapter.xhtml#Fig8) shows the results from the Messages
    tab produced by the `STATISTICS IO` setting. The listing begins by turning on
    `STATISTICS IO` and turning off row counts. Before each query, a `PRINT` statement
    prints the query number so that you will know which information goes with which
    query.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig8_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig8_HTML.jpg)


    Figure 8-8


    The STATISTICS IO output from the queries


    The most useful information comes from *logical reads*, which is the number of
    pages read. Query 1 and Query 2 each take 689 logical reads. That is approximately
    the number of pages in the clustered index of the `Sales.SalesOrderHeader` table.
    If you look back at Figure [8-1](#335106_2_En_8_Chapter.xhtml#Fig1), you will
    see that a clustered index scan was performed. Query 3 with a window aggregate
    takes 689 logical reads to scan the clustered index, but it also creates a worktable
    in `tempdb`. It uses 139,407 logical reads to perform the calculations using the
    worktable.


    Using `STATISTICS IO` can be very beneficial in cases where the execution plans
    show identical costs, but the queries take a different amount of time to run.
    I always use both tools when I am tuning queries.


    ## Indexing to Improve the Performance of Window Functions


    Sorting is often the bottleneck in queries with window functions. You saw the
    Sort operator take 95% of the resources in the query from Listing [8-4](#335106_2_En_8_Chapter.xhtml#PC4).
    It is possible, by adding the correct index, to eliminate the sort and decrease
    the logical reads. The optimum index will sort correctly and cover the query.
    Of course, you can’t add an index for every query you write, but for queries where
    the performance is critical, you will know what to do.


    Rerun the query from Listing [8-4](#335106_2_En_8_Chapter.xhtml#PC4), making sure
    the actual execution plan setting is toggled on first. Click the Select operator
    and view the tooltip, as shown in Figure [8-9](#335106_2_En_8_Chapter.xhtml#Fig9).
    You can see a Memory Grant of 4416 reserved as space for sorting and the Estimated
    Subtree Cost of 2.71698.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig9_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig9_HTML.jpg)


    Figure 8-9


    The SELECT tooltip


    Click the Sort operator and then press F4 to see the properties. The `Order By`
    property lists two columns. Figure [8-10](#335106_2_En_8_Chapter.xhtml#Fig10)
    shows the information.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig10_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig10_HTML.jpg)


    Figure 8-10


    The Order By columns


    The Sort operator is sorting by `CustomerID` and `OrderDate`. This makes sense
    because the `PARTITION BY` expression is `CustomerID` and the `ORDER BY` expression
    is `OrderDate`. The data had to be divided by the `PARTITION BY` column and then
    sorted by the `ORDER BY` column. Notice also in the figure that there are three
    `Output List` columns. If you look at the Output List, you will see `CustomerID`,
    `OrderDate`, and `SaleOrderID`, the three columns used in the query. The candidate
    index will have `CustomerID` and `OrderDate` as the keys and `SalesOrderID` as
    an included column. In this case, `SalesOrderID` is not required since it is the
    cluster key of the table and it is already part of any nonclustered index.


    Another thing to consider is existing indexes on the table. The table has a nonclustered
    index on `CustomerID`, `IX_SalesOrderHeader_CustomerID`. Instead of creating a
    new index, you can modify this one. Queries that previously used the old index
    can now use the new one. Run Listing [8-8](#335106_2_En_8_Chapter.xhtml#PC8) to
    drop the existing index and create a new one.


    ```

    --8-8.1 Drop the existing index

    DROP INDEX [IX_SalesOrderHeader_CustomerID] ON [Sales].[SalesOrderHeader];

    GO

    --8-8.2 Create a new index for the query

    CREATE NONCLUSTERED INDEX [IX_SalesOrderHeader_CustomerID_OrderDate]

    ON [Sales].[SalesOrderHeader] ([CustomerID], [OrderDate]);

    Listing 8-8

    Modifying the Index

    ```


    Now rerun the query from Listing [8-4](#335106_2_En_8_Chapter.xhtml#PC4). The
    new execution plan is shown in Figure [8-11](#335106_2_En_8_Chapter.xhtml#Fig11).


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig11_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig11_HTML.jpg)


    Figure 8-11


    The execution plan after the index change


    The first thing you should see is that the Sort operator is gone. Now the main
    cost of running the query is scanning the new nonclustered index. Figure [8-12](#335106_2_En_8_Chapter.xhtml#Fig12)
    shows the `SELECT` tooltip.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig12_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig12_HTML.jpg)


    Figure 8-12


    The SELECT tooltip after the index change'
  trans: '## 使用 STATISTICS IO


    另一个理解查询性能的实用工具是 `STATISTICS IO`。该设置将提供运行查询时所读取页面的信息。其优点在于，无论服务器上是否有其他查询在运行，或者数据是否已在缓存中，结果都是一致的。如果缓存是“热的”，即所需数据已在内存中，查询通常会运行得更快，你可能会误以为是自己做了优化。只要查询、索引、数据或设置没有改变，返回的逻辑读数（读取的数据页数量）将保持一致。这使其成为比较两个查询或判断新索引是否有效的绝佳工具。我喜欢同时使用执行计划和
    `STATISTICS IO` 来确保我理解正在发生的情况。


    运行清单 8-7 来查看上一节中的查询如何比较。虽然这些查询产生的结果不同，但从性能角度观察它们之间的差异仍然很有趣。请注意，数据库兼容性模式已设置为 2014
    版本。


    ```

    --8-7.0 设置

    USE [master];

    GO

    --根据需要更改数据库名称

    ALTER DATABASE [AdventureWorks]

    SET COMPATIBILITY_LEVEL = 120;

    GO

    USE [AdventureWorks];

    SET STATISTICS IO ON;

    SET NOCOUNT ON;

    GO

    --8-7.1 产生序列项目的查询

    PRINT ''8-7.1'';

    SELECT CustomerID, ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --8-7.2 显示排序运算符的查询

    PRINT ''8-7.2'';

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --8-7.3 带有表假脱机运算符的查询

    PRINT ''8-7.3'';

    SELECT CustomerID, SalesOrderID, SUM(TotalDue) OVER(PARTITION BY CustomerID)

    AS SubTotal

    FROM Sales.SalesOrderHeader;

    清单 8-7

    使用 STATISTICS IO

    ```


    图 8-8 显示了由 `STATISTICS IO` 设置在消息选项卡中产生的结果。代码清单首先开启 `STATISTICS IO` 并关闭行计数。在每个查询之前，一个
    `PRINT` 语句会打印查询编号，以便你知道哪些信息对应哪个查询。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig8_HTML.jpg](img/335106_2_En_8_Fig8_HTML.jpg)


    图 8-8

    查询的 STATISTICS IO 输出


    最有用的信息来自 `logical reads`（逻辑读），即读取的页数。查询 1 和查询 2 各需要 689 次 `logical reads`。这大约是
    `Sales.SalesOrderHeader` 表聚集索引中的页数。如果你回顾图 8-1，你会看到执行了聚集索引扫描。使用窗口聚合的查询 3 也需要 689
    次 `logical reads` 来扫描聚集索引，但它还在 `tempdb` 中创建了一个工作表。它使用了 139,407 次 `logical reads`
    来通过工作表执行计算。


    在执行计划显示相同成本但查询运行时间不同的情况下，使用 `STATISTICS IO` 非常有益。在调优查询时，我总是同时使用这两个工具。


    ## 通过索引提升窗口函数性能


    排序通常是带有窗口函数的查询的瓶颈。你看到清单 8-4 中的查询里，排序运算符消耗了 95% 的资源。通过添加正确的索引，有可能消除排序并减少逻辑读数。最优索引将正确排序并覆盖查询。当然，你不能为编写的每个查询都添加索引，但对于性能至关重要的查询，你会知道该怎么做。


    重新运行清单 8-4 中的查询，确保首先切换开启实际执行计划设置。单击 `Select` 运算符并查看工具提示，如图 8-9 所示。你可以看到预留的 `Memory
    Grant`（内存授予）为 4416，用作排序空间，`Estimated Subtree Cost`（估计子树成本）为 2.71698。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig9_HTML.jpg](img/335106_2_En_8_Fig9_HTML.jpg)


    图 8-9

    SELECT 工具提示


    单击 `Sort` 运算符，然后按 `F4` 查看属性。`Order By` 属性列出了两个列。图 8-10 显示了相关信息。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig10_HTML.jpg](img/335106_2_En_8_Fig10_HTML.jpg)


    图 8-10

    Order By 列


    `Sort` 运算符正按 `CustomerID` 和 `OrderDate` 排序。这是合理的，因为 `PARTITION BY` 表达式是 `CustomerID`，而
    `ORDER BY` 表达式是 `OrderDate`。数据必须先按 `PARTITION BY` 列划分，然后按 `ORDER BY` 列排序。另外请注意图中还有三个
    `Output List`（输出列表）列。如果你查看 `Output List`，会看到 `CustomerID`、`OrderDate` 和 `SaleOrderID`，即查询中使用的三个列。候选索引将以
    `CustomerID` 和 `OrderDate` 作为键，并将 `SalesOrderID` 作为包含列。在这种情况下，`SalesOrderID` 不是必需的，因为它是表的聚集键，并且已经是任何非聚集索引的一部分。


    另一件需要考虑的事是表上现有的索引。该表在 `CustomerID` 上有一个非聚集索引 `IX_SalesOrderHeader_CustomerID`。你可以修改这个索引，而不是创建一个新索引。以前使用旧索引的查询现在可以使用新索引。运行清单
    8-8 来删除现有索引并创建一个新索引。


    ```

    --8-8.1 删除现有索引

    DROP INDEX [IX_SalesOrderHeader_CustomerID] ON [Sales].[SalesOrderHeader];

    GO

    --8-8.2 为查询创建新索引

    CREATE NONCLUSTERED INDEX [IX_SalesOrderHeader_CustomerID_OrderDate]

    ON [Sales].[SalesOrderHeader] ([CustomerID], [OrderDate]);

    清单 8-8

    修改索引

    ```


    现在重新运行清单 8-4 中的查询。新的执行计划如图 8-11 所示。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig11_HTML.jpg](img/335106_2_En_8_Fig11_HTML.jpg)


    图 8-11

    索引更改后的执行计划


    首先你应该看到的是 `Sort` 运算符消失了。现在运行查询的主要成本是扫描新的非聚集索引。图 8-12 显示了 `SELECT` 工具提示。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig12_HTML.jpg](img/335106_2_En_8_Fig12_HTML.jpg)


    图 8-12

    索引更改后的 SELECT 工具提示'
- fmt: 'The Memory Grant is no longer needed, and the Estimated Subtree Cost is just
    `0.104003`. That’s quite an improvement! In the case of a query with a `WHERE`
    clause, add the column to the index in the first position before the `PARTITION
    BY` and `OVER` columns. In the preceding example, it would make sense to create
    a new index instead of adding to the index starting with `CustomerID` so that
    existing queries that needed `CustomerID` as the first key would not be affected.
    Unfortunately, if the new column is not part of the `OVER` clause, the sort may
    come back.


    An index designed this way works well to improve performance for any single table
    window function query. Most queries, however, have more than one table. Listing
    8-9 shows two ways to return the same results from a multi-table query. The queries
    have different execution plans. The outcome assumes that the index change from
    Listing 8-8 was made.


    ```sql

    --8-9.1 query with a join

    SELECT SOH.CustomerID, SOH.SalesOrderID, SOH.OrderDate, C.TerritoryID,

    ROW_NUMBER() OVER(PARTITION BY SOH.CustomerID ORDER BY SOH.OrderDate)

    AS RowNumber

    FROM Sales.SalesOrderHeader AS SOH

    JOIN Sales.Customer C ON SOH.CustomerID = C.CustomerID;

    --8-9.2 Rearrange the query

    WITH Sales AS (

    SELECT CustomerID, OrderDate, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate)

    AS RowNumber

    FROM Sales.SalesOrderHeader)

    SELECT Sales.CustomerID, SALES.SalesOrderID, Sales.OrderDate,

    C.TerritoryID, Sales.RowNumber

    FROM Sales

    JOIN Sales.Customer AS C ON C.CustomerID = Sales.CustomerID;

    ```


    Listing 8-9

    Window Functions with Joins


    Figure 8-13 shows the execution plans. Query 1 joins the rows from the `Customer`
    and `SalesOrderHeader` tables with a Merge Join since both indexes are sorted
    on `CustomerID`. Then the output is sorted by `CustomerID` and `OrderDate` and
    the row number is calculated. Query 2 moves the `SalesOrderHeader` table to a
    CTE and applies the row number there. You can see from the execution plan that
    the row number is applied before joining to the `Customer` table. You can also
    see that the Sort is gone, and the relative cost is 12%. In this case, by rearranging
    the query, the second query performed better. Both the `PARTITION BY` and `ORDER
    BY` columns are from the same query, but that is not always the case. Queries
    become complex very quickly, and you may not always be able to eliminate sorting.
    I have seen situations involving queries with several joined tables that had a
    stubborn Sort operator that I was not able to remove. Fortunately, the cost of
    the sorting was usually small in comparison to other operators in the plan.


    ![The execution plans for a join](images/335106_2_En_8_Chapter/335106_2_En_8_Fig13_HTML.jpg)


    Figure 8-13

    The execution plans for a join


    ## Framing for Performance


    In Chapter 5, you learned about adding a frame to the `OVER` clause to create
    moving aggregates. In Chapter 6, you saw how the frame is needed for the `FIRST_VALUE`
    and `LAST_VALUE` functions. In each case, I explained that the frame was sometimes
    needed to get the correct results, but it’s also important for performance reasons.
    Later in the chapter, I’ll cover some exciting performance updates with SQL Server
    2019, but for now, the examples in this section will assume that the database
    is in SQL Server 2017 compatibility mode or lower.


    If the tables are small, the queries run quickly even if the frame is left out.
    Listing 8-10 sets the database compatibility mode to 2017 (`140`) and turns on
    statistics. It then creates and populates a table for testing. If needed, modify
    the database name.


    ```sql

    --8-10.1 Set the compatibility level

    USE master;

    GO

    ALTER DATABASE AdventureWorks2017

    SET COMPATIBILITY_LEVEL = 140 WITH NO_WAIT;

    GO

    USE AdventureWorks2017;

    GO

    --8-10.2 Turn on Statistics IO

    SET STATISTICS IO ON;

    SET NOCOUNT ON;

    GO

    --8-10.3 Create a larger table for testing

    DROP TABLE IF EXISTS dbo.SOD ;

    CREATE TABLE dbo.SOD(SalesOrderID INT, SalesOrderDetailID INT, LineTotal Money);

    --8-10.4 Populate the table

    INSERT INTO dbo.SOD(SalesOrderID, SalesOrderDetailID, LineTotal)

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal

    FROM Sales.SalesOrderDetail

    UNION ALL

    SELECT SalesOrderID + MAX(SalesOrderID) OVER(), SalesOrderDetailID, LineTotal

    FROM Sales.SalesOrderDetail;

    --8-10.5 Create a nonclustered index

    CREATE INDEX SalesOrderID_SOD ON dbo.SOD

    (SalesOrderID, SalesOrderDetailID) INCLUDE(LineTotal);

    ```


    Listing 8-10

    Create a Large Test Table


    Listing 8-11 contains two queries that don’t perform well. Be sure to toggle on
    the actual execution plan before running the script.


    ```sql

    --8-11.1 A running total

    PRINT ''8-11.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) RunningTotal

    FROM SOD;

    --8-11.2 A query with FIRST_VALUE

    PRINT ''8-11.2''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    FIRST_VALUE(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) FirstValue

    FROM SOD;

    ```


    Listing 8-11

    Two Queries with Poor Performance


    Figure 8-14 shows the statistics information. In each case, over 1.4 million logical
    reads were taken from a worktable.


    ![The logical reads from two poorly performing queries](images/335106_2_En_8_Chapter/335106_2_En_8_Fig14_HTML.jpg)


    Figure 8-14

    The logical reads from two poorly performing queries


    Figure 8-15 shows the execution plans for the queries. Note the Window Spool operator
    that shows that a worktable was created, but it was not created in memory.


    ![The execution plans for two poorly performing queries](images/335106_2_En_8_Chapter/335106_2_En_8_Fig15_HTML.jpg)


    Figure 8-15

    The execution plans for two poorly performing queries


    When framing is supported but left out, the default frame is used. The default
    frame is `RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`. The `RANGE` operator
    is meant for logical time periods which hasn’t been implemented in SQL Server.
    When `RANGE` is used, the worktable is always created in tempdb, not memory. To
    get around this issue, specify the `ROWS` operator in the frame. Listing 8-12
    shows the corrected queries.


    ```sql

    PRINT ''8-12.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) RunningTotal

    FROM SOD;

    --8-12.2 A query with FIRST_VALUE using ROWS

    PRINT ''8-12.2''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    FIRST_VALUE(LineTotal)

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) RunningTotal

    FROM SOD;

    ```


    Listing 8-12

    Queries with ROWS


    Figure 8-16 shows that the worktables now take 0 logical reads. This shows you
    that the worktables are created in memory. If you review the execution plans,
    they will be identical to the plans shown in Figure 8-15.


    ![The logical reads when using ROWS](images/335106_2_En_8_Chapter/335106_2_En_8_Fig16_HTML.jpg)


    Figure 8-16

    The logical reads when using ROWS


    These examples compared the logical reads, but how do you know that this really
    makes a difference in how long the queries take to run? If your customer calls
    to complain about a slowly running query, explaining that the logical reads look
    good will mean nothing to them. In the “Measuring Time Comparisons” section of
    this chapter, you’ll see that there really is a performance difference suggested
    by the logical reads.'
