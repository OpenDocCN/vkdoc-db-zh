- fmt: '## The Partitioned Table Problem


    One of my favorite examples involves looking at the metadata of table partitions.
    Table partitions have nothing to do with `PARTITION BY`; it’s a feature that makes
    data management in large databases easier. Since no tables in the AdventureWorks
    database are partitioned, run Listing 3-9 to create a partitioned table. At one
    time, you needed Enterprise Edition to run this feature. Microsoft ported the
    feature to all editions starting with 2016 SP 1.


    ```

    --3-9.1 Create the partition function

    CREATE PARTITION FUNCTION testFunction (DATE)

    AS RANGE RIGHT

    FOR VALUES (''2011-01-01'',''2012-01-01'',''2013-01-01'',''2014-01-01'');

    GO

    --3-9.2 Create the partition scheme

    CREATE PARTITION SCHEME testScheme

    AS PARTITION testFunction ALL TO (''Primary'');

    GO

    --3-9.3 Create a partitioned table

    CREATE TABLE dbo.Orders(CustomerID INT, SalesOrderID INT,

    OrderDate DATE, TotalDue MONEY)

    ON testScheme(OrderDate);

    GO

    --3-9.4 Populate the table

    INSERT INTO dbo.Orders(customerID, SalesOrderID,

    OrderDate, TotalDue)

    SELECT CustomerID, SalesOrderID,

    OrderDate, TotalDue

    FROM Sales.SalesOrderHeader;

    GO

    --3-9.5 Create another partitioned table

    CREATE TABLE dbo.Customer (CustomerID INT, ModifiedDate DATE)

    ON testScheme(ModifiedDate);

    GO

    --3-9.6 Populate the table

    INSERT INTO dbo.Customer(CustomerID, ModifiedDate)

    SELECT CustomerID, ModifiedDate

    FROM Sales.Customer;

    GO

    ```

    Listing 3-9: Creating a Partitioned Table


    When a table is partitioned, you write queries to retrieve the data in the same
    way that you always do even though the table is divided up under the covers. If
    you wish to learn more about table partitioning, be sure to review SQL Server’s
    documentation on the subject since it is out of scope for this book.


    A few years ago, my colleague sent me a query and asked for some help. He wanted
    to see what percentage of rows was found in each partition for a partitioned table.
    Listing 3-10 shows the query that he sent to me and the solution that I came up
    with.


    ```

    --3-10.1 The query from my colleague

    SELECT OBJECT_NAME(p.OBJECT_ID) TableName,

    ps.partition_number, ps.Row_count

    FROM sys.data_spaces  d

    JOIN sys.indexes i

    JOIN (SELECT DISTINCT OBJECT_ID

    FROM sys.partitions

    WHERE partition_number > 1) p

    ON i.OBJECT_ID = p.OBJECT_ID

    ON d.data_space_id = i.data_space_id

    JOIN sys.dm_db_partition_stats ps

    ON i.OBJECT_ID = ps.OBJECT_ID and i.index_id = ps.index_id

    WHERE i.index_id <= 1;


    --3-10.2 The solution

    SELECT OBJECT_NAME(p.OBJECT_ID) TableName,

    ps.partition_number, ps.Row_count,

    ps.Row_count * 1.0 / SUM(ps.Row_count) OVER (PARTITION BY p.OBJECT_ID)

    AS PercentOfRows

    FROM sys.data_spaces  d

    JOIN sys.indexes i

    JOIN (SELECT DISTINCT OBJECT_ID

    FROM sys.partitions

    WHERE partition_number > 1) p

    ON i.OBJECT_ID = p.OBJECT_ID

    ON d.data_space_id = i.data_space_id

    JOIN sys.dm_db_partition_stats ps

    ON i.OBJECT_ID = ps.OBJECT_ID and i.index_id = ps.index_id

    WHERE i.index_id < 2;

    ```

    Listing 3-10: The Table Partition Question and Solution


    Figure 3-8 shows the results of Query 2\. The original query, Query 1, contains
    all of the columns in the results except for the `PercentOfRows` column. Hopefully,
    you agree that the original query is quite complex. The desired solution can be
    found in Query 2\. The `Row_count` column is divided by the sum of the `Row_count`
    partitioned by `OBJECT_ID.` The partition allows the result to be specific to
    each table. The answer is also multiplied by 1.0 to eliminate integer division.
    It has also been formatted for readability. To accomplish the same thing using
    older methods would be much more difficult to write.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig8_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig8_HTML.jpg)

    Figure 3-8: The solution to the table partition problem


    To clean up the database objects created in this section, run Listing 3-11.


    ```

    --3-11 Drop objects created in this section

    DROP TABLE dbo.Customer;

    DROP TABLE dbo.Orders;

    DROP PARTITION SCHEME testScheme;

    DROP PARTITION FUNCTION testFunction;

    GO

    ```

    Listing 3-11: Cleaning Up Database Objects


    Whenever you need to use one of the aggregate functions to summarize at a different
    level than the query’s results, think about using a window aggregate.


    ## Creating Custom Window Aggregate Functions


    Starting with SQL Server 2005, you can create custom aggregate functions with
    a .NET language using CLR (Common Language Runtime) integration. Surprisingly,
    these functions also work as window aggregate functions. Creating a C# DLL is
    beyond the scope of this book, but the code download for this chapter includes
    a C# program for such a function. If you would like to learn how to create your
    own custom function, you can use this project as a model. For more information
    on creating the custom aggregates, search the SQL Server documentation for “CLR
    User-Defined Aggregates.”


    The project contains a DLL file in the chapter’s code folder. Copy this file to
    a location that SQL Server can see such as the `C:\Custom` folder. You will need
    to modify the command in Listing 3-12 if you have copied the file to a different
    location. CLR integration must be enabled as well, so be sure to do this on a
    local instance of SQL Server, or at least an instance where you are allowed to
    change this setting. Run Listing 3-12 to set up the custom window aggregate function.
    Note that the CLR strict security feature was added with SQL Server 2017 but is
    also available with some updates to SQL Server 2016\. If you have a lower version
    of SLQ Server, comment out the 3-12.2 section of the code.


    ```

    --3-12.1 Enable CRL

    EXEC sp_configure ''clr_enabled'', 1;

    GO

    RECONFIGURE;

    GO

    --3-12.2 Enable an unsigned assembly

    EXEC sp_configure ''show advanced options'', 1;

    RECONFIGURE;

    EXEC sp_configure ''clr strict security'',0;

    GO

    RECONFIGURE;

    --3-12.3 Register the DLL

    CREATE ASSEMBLY CustomAggregate FROM

    ''C:\Custom\CustomAggregate.dll'' WITH PERMISSION_SET = SAFE;

    GO

    --3-12.4 Create the function

    CREATE Aggregate Median (@Value INT) RETURNS INT

    EXTERNAL NAME CustomAggregate.Median;

    GO

    --3-12.5 Test the function

    WITH Orders AS (

    SELECT CustomerID, SUM(OrderQty) AS OrderQty, SOH.SalesOrderID

    FROM Sales.SalesOrderHeader AS SOH

    JOIN Sales.SalesOrderDetail AS SOD

    ON SOH.SalesOrderID = SOD.SalesOrderDetailID

    GROUP BY CustomerID, SOH.SalesOrderID)

    SELECT CustomerID, OrderQty, dbo.Median(OrderQty) OVER(PARTITION BY CustomerID)
    AS Median

    FROM Orders

    WHERE CustomerID IN (13011, 13012, 13019);

    GO

    ```

    Listing 3-12: Setting Up a Custom Window Aggregate Function


    Statement 1 turns on CLR integration for the server. Statement 2 enables the ability
    to run an unsigned assembly. You should sign any assemblies you plan to use. Statement
    3 registers the assembly. Statement 4 enables the new custom function. Query 5
    tests the new function, which is called `MEDIAN`. Figure 3-9 shows the results
    of using the `MEDIAN` function . The median returns the middle value when the
    number of values is odd. It returns the average of the two middle values when
    the number of values is even. Customer 13011 has three orders. The median of 5,
    1, and 3 is 3. Customer 13019 has two orders. The median is 6, halfway between
    2 and 10.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig9_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig9_HTML.jpg)

    Figure 3-9: Using the custom MEDIAN function


    If you wish to remove the function and turn off CLR integration, run Listing 3-13.


    ```

    --3-13.1 Drop the objects

    DROP AGGREGATE Median;

    DROP ASSEMBLY CustomAggregate;

    GO

    --3-13.2 Reset CLR integration to the defaults

    EXEC sp_configure ''clr_enabled'', 0;

    GO

    RECONFIGURE;

    EXEC sp_configure ''clr strict security'',1;

    GO

    ```

    Listing 3-13: Cleaning Up the Database'
  raw: '### The Partitioned Table Problem


    One of my favorite examples involves looking at the metadata of table partitions.
    Table partitions have nothing to do with `PARTITION BY`; it’s a feature that makes
    data management in large databases easier. Since no tables in the AdventureWorks
    database are partitioned, run Listing [3-9](#335106_2_En_3_Chapter.xhtml#PC10)
    to create a partitioned table. At one time, you needed Enterprise Edition to run
    this feature. Microsoft ported the feature to all editions starting with 2016
    SP 1.


    ```

    --3-9.1 Create the partition function

    CREATE PARTITION FUNCTION testFunction (DATE)

    AS RANGE RIGHT

    FOR VALUES (''2011-01-01'',''2012-01-01'',''2013-01-01'',''2014-01-01'');

    GO

    --3-9.2 Create the partition scheme

    CREATE PARTITION SCHEME testScheme

    AS PARTITION testFunction ALL TO (''Primary'');

    GO

    --3-9.3 Create a partitioned table

    CREATE TABLE dbo.Orders(CustomerID INT, SalesOrderID INT,

    OrderDate DATE, TotalDue MONEY)

    ON testScheme(OrderDate);

    GO

    --3-9.4 Populate the table

    INSERT INTO dbo.Orders(customerID, SalesOrderID,

    OrderDate, TotalDue)

    SELECT CustomerID, SalesOrderID,

    OrderDate, TotalDue

    FROM Sales.SalesOrderHeader;

    GO

    --3-9.5 Create another partitioned table

    CREATE TABLE dbo.Customer (CustomerID INT, ModifiedDate DATE)

    ON testScheme(ModifiedDate);

    GO

    --3-9.6 Populate the table

    INSERT INTO dbo.Customer(CustomerID, ModifiedDate)

    SELECT CustomerID, ModifiedDate

    FROM Sales.Customer;

    Listing 3-9

    Creating a Partitioned Table

    ```


    When a table is partitioned, you write queries to retrieve the data in the same
    way that you always do even though the table is divided up under the covers. If
    you wish to learn more about table partitioning, be sure to review SQL Server’s
    documentation on the subject since it is out of scope for this book.


    A few years ago, my colleague sent me a query and asked for some help. He wanted
    to see what percentage of rows was found in each partition for a partitioned table.
    Listing [3-10](#335106_2_En_3_Chapter.xhtml#PC11) shows the query that he sent
    to me and the solution that I came up with.


    ```

    --3-10.1 The query from my colleague

    SELECT OBJECT_NAME(p.OBJECT_ID) TableName,

    ps.partition_number, ps.Row_count

    FROM sys.data_spaces  d

    JOIN sys.indexes i

    JOIN (SELECT DISTINCT OBJECT_ID

    FROM sys.partitions

    WHERE partition_number > 1) p

    ON i.OBJECT_ID = p.OBJECT_ID

    ON d.data_space_id = i.data_space_id

    JOIN sys.dm_db_partition_stats ps

    ON i.OBJECT_ID = ps.OBJECT_ID and i.index_id = ps.index_id

    WHERE i.index_id  1) p

    ON i.OBJECT_ID = p.OBJECT_ID

    ON d.data_space_id = i.data_space_id

    JOIN sys.dm_db_partition_stats ps

    ON i.OBJECT_ID = ps.OBJECT_ID and i.index_id = ps.index_id

    WHERE i.index_id < 2;

    Listing 3-10

    The Table Partition Question and Solution

    ```


    Figure [3-8](#335106_2_En_3_Chapter.xhtml#Fig8) shows the results of Query 2\.
    The original query, Query 1, contains all of the columns in the results except
    for the `PercentOfRows` column. Hopefully, you agree that the original query is
    quite complex. The desired solution can be found in Query 2\. The `Row_count`
    column is divided by the sum of the `Row_count` partitioned by `OBJECT_ID.` The
    partition allows the result to be specific to each table. The answer is also multiplied
    by 1.0 to eliminate integer division. It has also been formatted for readability.
    To accomplish the same thing using older methods would be much more difficult
    to write.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig8_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig8_HTML.jpg)


    Figure 3-8


    The solution to the table partition problem


    To clean up the database objects created in this section, run Listing [3-11](#335106_2_En_3_Chapter.xhtml#PC12).


    ```

    --3-11 Drop objects created in this section

    DROP TABLE dbo.Customer;

    DROP TABLE dbo.Orders;

    DROP PARTITION SCHEME testScheme;

    DROP PARTITION FUNCTION testFunction;

    Listing 3-11

    Cleaning Up Database Objects

    ```


    Whenever you need to use one of the aggregate functions to summarize at a different
    level than the query’s results, think about using a window aggregate.


    ## Creating Custom Window Aggregate Functions


    Starting with SQL Server 2005, you can create custom aggregate functions with
    a .NET language using CLR (Common Language Runtime) integration. Surprisingly,
    these functions also work as window aggregate functions. Creating a C# DLL is
    beyond the scope of this book, but the code download for this chapter includes
    a C# program for such a function. If you would like to learn how to create your
    own custom function, you can use this project as a model. For more information
    on creating the custom aggregates, search the SQL Server documentation for “CLR
    User-Defined Aggregates.”


    The project contains a DLL file in the chapter’s code folder. Copy this file to
    a location that SQL Server can see such as the C:\Custom folder. You will need
    to modify the command in Listing [3-12](#335106_2_En_3_Chapter.xhtml#PC13) if
    you have copied the file to a different location. CLR integration must be enabled
    as well, so be sure to do this on a local instance of SQL Server, or at least
    an instance where you are allowed to change this setting. Run Listing [3-12](#335106_2_En_3_Chapter.xhtml#PC13)
    to set up the custom window aggregate function. Note that the CLR strict security
    feature was added with SQL Server 2017 but is also available with some updates
    to SQL Server 2016\. If you have a lower version of SLQ Server, comment out the
    3-12.2 section of the code.


    ```

    --3-12.1 Enable CRL

    EXEC sp_configure ''clr_enabled'', 1;

    GO

    RECONFIGURE;

    GO

    --3-12.2 Enable an unsigned assembly

    EXEC sp_configure ''show advanced options'', 1;

    RECONFIGURE;

    EXEC sp_configure ''clr strict security'',0

    GO

    RECONFIGURE;

    --3-12.3 Register the DLL

    CREATE ASSEMBLY CustomAggregate FROM

    ''C:\Custom\CustomAggregate.dll'' WITH PERMISSION_SET = SAFE;

    GO

    --3-12.4 Create the function

    CREATE Aggregate Median (@Value INT) RETURNS INT

    EXTERNAL NAME CustomAggregate.Median;

    GO

    --3-12.5 Test the function

    WITH Orders AS (

    SELECT CustomerID, SUM(OrderQty) AS OrderQty, SOH.SalesOrderID

    FROM Sales.SalesOrderHeader AS SOH

    JOIN Sales.SalesOrderDetail AS SOD

    ON SOH.SalesOrderID = SOD.SalesOrderDetailID

    GROUP BY CustomerID, SOH.SalesOrderID)

    SELECT CustomerID, OrderQty, dbo.Median(OrderQty) OVER(PARTITION BY CustomerID)
    AS Median

    FROM Orders

    WHERE CustomerID IN (13011, 13012, 13019);

    Listing 3-12

    Setting Up a Custom Window Aggregate Function

    ```


    Statement 1 turns on CLR integration for the server. Statement 2 enables the ability
    to run an unsigned assembly. You should sign any assemblies you plan to use. Statement
    3 registers the assembly. Statement 4 enables the new custom function. Query 5
    tests the new function, which is called `MEDIAN`. Figure [3-9](#335106_2_En_3_Chapter.xhtml#Fig9)
    shows the results of using the `MEDIAN` function . The median returns the middle
    value when the number of values is odd. It returns the average of the two middle
    values when the number of values is even. Customer 13011 has three orders. The
    median of 5, 1, and 3 is 3. Customer 13019 has two orders. The median is 6, halfway
    between 2 and 10.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig9_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Using the custom MEDIAN function


    If you wish to remove the function and turn off CLR integration, run Listing [3-13](#335106_2_En_3_Chapter.xhtml#PC14).


    ```

    --3-13.1 Drop the objects

    DROP AGGREGATE Median;

    DROP ASSEMBLY CustomAggregate;

    GO

    --3-13.2 Reset CLR integration to the defaults

    EXEC sp_configure ''clr_enabled'', 0;

    GO

    RECONFIGURE;

    EXEC sp_configure ''clr strict security'',1;

    GO

    Listing 3-13

    Cleaning Up the Database

    ```'
  trans: '

    ## 分区表问题


    我最喜欢的一个例子涉及查看表分区的元数据。表分区与 `PARTITION BY` 无关；它是一项让大型数据库中的数据管理更轻松的功能。由于 AdventureWorks
    数据库中没有表是分区的，请运行清单 3-9 来创建一个分区表。过去，你需要企业版才能运行此功能。从 2016 SP 1 开始，Microsoft 将该功能移植到了所有版本。


    ```

    --3-9.1 创建分区函数

    CREATE PARTITION FUNCTION testFunction (DATE)

    AS RANGE RIGHT

    FOR VALUES (''2011-01-01'',''2012-01-01'',''2013-01-01'',''2014-01-01'');

    GO

    --3-9.2 创建分区方案

    CREATE PARTITION SCHEME testScheme

    AS PARTITION testFunction ALL TO (''Primary'');

    GO

    --3-9.3 创建分区表

    CREATE TABLE dbo.Orders(CustomerID INT, SalesOrderID INT,

    OrderDate DATE, TotalDue MONEY)

    ON testScheme(OrderDate);

    GO

    --3-9.4 填充表

    INSERT INTO dbo.Orders(customerID, SalesOrderID,

    OrderDate, TotalDue)

    SELECT CustomerID, SalesOrderID,

    OrderDate, TotalDue

    FROM Sales.SalesOrderHeader;

    GO

    --3-9.5 创建另一个分区表

    CREATE TABLE dbo.Customer (CustomerID INT, ModifiedDate DATE)

    ON testScheme(ModifiedDate);

    GO

    --3-9.6 填充表

    INSERT INTO dbo.Customer(CustomerID, ModifiedDate)

    SELECT CustomerID, ModifiedDate

    FROM Sales.Customer;

    GO

    ```

    清单 3-9：创建一个分区表


    当一个表被分区后，尽管在底层数据被分开了，你仍然可以用与以往相同的方式编写查询来检索数据。如果你想了解更多关于表分区的知识，请务必查阅 SQL Server
    关于此主题的文档，因为这超出了本书的范围。


    几年前，我的同事发给我一个查询并寻求帮助。他想查看分区表中每个分区的数据行占比。清单 3-10 展示了他发给我的查询以及我想出的解决方案。


    ```

    --3-10.1 同事的查询

    SELECT OBJECT_NAME(p.OBJECT_ID) TableName,

    ps.partition_number, ps.Row_count

    FROM sys.data_spaces  d

    JOIN sys.indexes i

    JOIN (SELECT DISTINCT OBJECT_ID

    FROM sys.partitions

    WHERE partition_number > 1) p

    ON i.OBJECT_ID = p.OBJECT_ID

    ON d.data_space_id = i.data_space_id

    JOIN sys.dm_db_partition_stats ps

    ON i.OBJECT_ID = ps.OBJECT_ID and i.index_id = ps.index_id

    WHERE i.index_id <= 1;


    --3-10.2 解决方案

    SELECT OBJECT_NAME(p.OBJECT_ID) TableName,

    ps.partition_number, ps.Row_count,

    ps.Row_count * 1.0 / SUM(ps.Row_count) OVER (PARTITION BY p.OBJECT_ID)

    AS PercentOfRows

    FROM sys.data_spaces  d

    JOIN sys.indexes i

    JOIN (SELECT DISTINCT OBJECT_ID

    FROM sys.partitions

    WHERE partition_number > 1) p

    ON i.OBJECT_ID = p.OBJECT_ID

    ON d.data_space_id = i.data_space_id

    JOIN sys.dm_db_partition_stats ps

    ON i.OBJECT_ID = ps.OBJECT_ID and i.index_id = ps.index_id

    WHERE i.index_id < 2;

    ```

    清单 3-10：分区表问题与解决方案


    图 3-8 显示了查询 2 的结果。原始查询（查询 1）包含结果中除 `PercentOfRows` 列之外的所有列。希望你同意原始查询相当复杂。期望的解决方案可以在查询
    2 中找到。`Row_count` 列除以按 `OBJECT_ID` 分区后的 `Row_count` 总和。该分区使得结果对每个表都是特定的。答案还乘以了
    1.0 以消除整数除法。它还为了可读性进行了格式化。使用旧方法来完成同样的事情编写起来会困难得多。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig8_HTML.jpg](img/335106_2_En_3_Fig8_HTML.jpg)

    图 3-8：分区表问题的解决方案


    要清理本节中创建的数据库对象，请运行清单 3-11。


    ```

    --3-11 删除本节中创建的对象

    DROP TABLE dbo.Customer;

    DROP TABLE dbo.Orders;

    DROP PARTITION SCHEME testScheme;

    DROP PARTITION FUNCTION testFunction;

    GO

    ```

    清单 3-11：清理数据库对象


    每当你需要使用某个聚合函数在不同于查询结果的层级上进行汇总时，考虑使用窗口聚合函数。


    ## 创建自定义窗口聚合函数


    从 SQL Server 2005 开始，你可以使用 .NET 语言通过 CLR（公共语言运行时）集成来创建自定义聚合函数。令人惊讶的是，这些函数也可以作为窗口聚合函数工作。创建一个
    C# DLL 超出了本书的范围，但本章的代码下载包含了一个用于此类函数的 C# 程序。如果你想学习如何创建自己的自定义函数，可以使用这个项目作为模板。有关创建自定义聚合函数的更多信息，请在
    SQL Server 文档中搜索“CLR User-Defined Aggregates”。


    该项目在章节的代码文件夹中包含一个 DLL 文件。将此文件复制到 SQL Server 可以访问的位置，例如 `C:\Custom` 文件夹。如果你已将文件复制到其他位置，则需要修改清单
    3-12 中的命令。还必须启用 CLR 集成，因此请确保在本地 SQL Server 实例上执行此操作，或者至少在允许更改此设置的实例上执行。运行清单 3-12
    来设置自定义窗口聚合函数。请注意，CLR 严格安全功能是在 SQL Server 2017 中添加的，但在安装了一些更新的 SQL Server 2016
    上也可用。如果你的 SQL Server 版本较低，请注释掉代码的 3-12.2 部分。


    ```

    --3-12.1 启用 CLR

    EXEC sp_configure ''clr_enabled'', 1;

    GO

    RECONFIGURE;

    GO

    --3-12.2 启用未签名的程序集

    EXEC sp_configure ''show advanced options'', 1;

    RECONFIGURE;

    EXEC sp_configure ''clr strict security'',0;

    GO

    RECONFIGURE;

    --3-12.3 注册 DLL

    CREATE ASSEMBLY CustomAggregate FROM

    ''C:\Custom\CustomAggregate.dll'' WITH PERMISSION_SET = SAFE;

    GO

    --3-12.4 创建函数

    CREATE Aggregate Median (@Value INT) RETURNS INT

    EXTERNAL NAME CustomAggregate.Median;

    GO

    --3-12.5 测试函数

    WITH Orders AS (

    SELECT CustomerID, SUM(OrderQty) AS OrderQty, SOH.SalesOrderID

    FROM Sales.SalesOrderHeader AS SOH

    JOIN Sales.SalesOrderDetail AS SOD

    ON SOH.SalesOrderID = SOD.SalesOrderDetailID

    GROUP BY CustomerID, SOH.SalesOrderID)

    SELECT CustomerID, OrderQty, dbo.Median(OrderQty) OVER(PARTITION BY CustomerID)
    AS Median

    FROM Orders

    WHERE CustomerID IN (13011, 13012, 13019);

    GO

    ```

    清单 3-12：设置自定义窗口聚合函数


    语句 1 为服务器打开 CLR 集成。语句 2 启用运行未签名程序集的能力。你应该对你计划使用的任何程序集进行签名。语句 3 注册程序集。语句 4 启用新的自定义函数。查询
    5 测试名为 `MEDIAN` 的新函数。图 3-9 显示了使用 `MEDIAN` 函数的结果。当数值个数为奇数时，中位数返回中间值。当数值个数为偶数时，它返回两个中间值的平均值。客户
    13011 有三个订单。5、1 和 3 的中位数是 3。客户 13019 有两个订单。中位数是 6，即 2 和 10 的中间值。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig9_HTML.jpg](img/335106_2_En_3_Fig9_HTML.jpg)

    图 3-9：使用自定义 MEDIAN 函数


    如果你希望删除该函数并关闭 CLR 集成，请运行清单 3-13。


    ```

    --3-13.1 删除对象

    DROP AGGREGATE Median;

    DROP ASSEMBLY CustomAggregate;

    GO

    --3-13.2 将 CLR 集成重置为默认值

    EXEC sp_configure ''clr_enabled'', 0;

    GO

    RECONFIGURE;

    EXEC sp_configure ''clr strict security'',1;

    GO

    ```

    清单 3-13：清理数据库

