    All Sales] / [All Sales]`。你可以将得到的比率乘以 100 以百分比形式显示，或者依赖报表或前端工具的格式化功能将其显示为百分比。


    对于这些度量中的每一个，窗口聚合`SUM()`函数都封装了一个常规的`SUM()`函数，一开始可能看起来有点奇怪，但这是将`[SalesAmount]`聚合到高于查询粒度级别所必需的。结果，如图
    10-2 所示，是能够在单个查询中将同一源列聚合到不同级别，而无需借助临时表或公用表表达式。


    清单 10-2 中的代码包含了你需要附加到基础查询的额外列逻辑，位置在`select`列表的最后一列之后。务必在`[Sales]`后面加上逗号。


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig2_HTML.jpg](img/335106_2_En_10_Fig2_HTML.jpg)


    **图 10-2** 计算产品销售额占所有销售额百分比的结果


    ```sql

    SUM(SUM(f.SalesAmount)) OVER () AS [All Sales],

    SUM(SUM(f.SalesAmount)) OVER (PARTITION BY f.productkey)

    AS [Product All Sales],

    SUM(SUM(f.SalesAmount)) OVER (PARTITION BY f.productkey)

    / SUM(SUM(f.SalesAmount)) OVER()

    AS [Ratio to All Sales]

    ```


    **清单 10-2** 用于`[All Sales]`的额外列


    `[All Sales]`列的框架没有`PARTITION`子句，这意味着它将聚合查询可用的所有数据，提供所有时间的销售总计。此值对于结果表中的每一行都是相同的。`[Product
    All Sales]`列的`PARTITION`子句将分区限制为每个产品键的实例，提供按产品所有时间的销售总计。此值对于共享相同`[ProductKey]`值的所有行都是相同的。


    `[Ratio to All Sales]`列结合了前两个语句来计算它们之间的比率。关键是要认识到，你可以在单个列中组合多个聚合结果。了解这一点将使你能够创建各种复杂的计算，而这些计算原本可能只能留在报表工具或应用程序代码中。用简单的术语写出计算逻辑是记录你想要实现目标的好方法，并为组合现有计算以形成新计算提供了模板。以下伪代码描述了将在
    T-SQL 中实现的逻辑：


    ```sql

    [Sales] = 按产品、年和月汇总的 SalesAmount

    [All Sales] = 所有产品和所有日期的 SalesAmount 总和

    [Annual Sales] = 按年汇总的所有产品的 SalesAmount 总和

    [Month All Sales] = 按年和月汇总的所有产品的 SalesAmount 总和

    [Product All Sales] = 按产品汇总的所有日期的 SalesAmount 总和

    [Product Annual Sales] = 按产品和年汇总的 SalesAmount 总和

    [Ratio to All Sales] = [Product All Sales] / [All Sales]

    [Ratio to Annual Sales] = [Product Annual Sales] / [Annual Sales]

    [Ratio to Month Sales] = [Sales] / [Month All Sales]

    ```


    这种方法最有效的方式是，你首先为给定计算的每个输入列理清逻辑，然后创建利用输入列计算的复杂计算。年度和月级别的列计算遵循类似的模式，因此一旦你为一个级别理清了计算，其余的也会很快跟进。本章后面你将学习如何使用公用表表达式来简化复杂计算的创建。


    无需担心在“全部”级别处理被零除错误，因为唯一会导致错误的情况是源表中完全没有行，但对于低于它的每个级别，你必须考虑分母值可能为零的情况。清单 10-3 中“年度”和“月”级别的计算演示了如何做到这一点。通过将窗口`SUM()`语句包装在`NULLIF()`函数中，任何零聚合值都会转换为`NULL`值，从而避免被零除错误。你也可以使用`CASE`语句代替`NULLIF()`，但考虑到所涉及的函数嵌套，`NULLIF()`更简洁。


    ```sql

    --10.3 年度和月度父级百分比

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate)) AS [Annual Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate))

    AS [Product Annual Sales],

    --组内百分比:

    --[Ratio to Annual Sales] = [Product Annual Sales] / [Annual Sales]

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate))

    / NULLIF(SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate))

    , 0) AS [Ratio to Annual Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate), MONTH(f.OrderDate))

    AS [Month All Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate),

    MONTH(f.OrderDate))

    / NULLIF(SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate), MONTH(f.OrderDate))

    , 0) AS [Ratio to Month Sales]

    ```


    **清单 10-3** 用于计算年度和月度父级百分比列的额外列'
- fmt: '## 使用CTE简化计算


    如果你想让代码更易于阅读、理解和维护，可以在一个公共表表达式（`CTE`）中一次性计算所有基本聚合，如列表 [10-4](#335106_2_En_10_Chapter.xhtml#PC6)
    所示，然后在后续查询中执行二阶计算。使用`CTE`中命名的结果列，而不是之前使用的扩展逻辑列，可以显著提高代码的可读性。一旦为任何给定的组合计算推导出逻辑，你就可以注释掉或删除输入列，只返回你感兴趣的最终结果列，如图
    [10-3](#335106_2_En_10_Chapter.xhtml#Fig3) 所示。


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig3_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig3_HTML.jpg)


    图 10-3


    列表 [10-4](#335106_2_En_10_Chapter.xhtml#PC6) 的结果


    ```

    --10.4 Percent of Parent, Annual and Monthly sales

    --Refactored to use a CTE, making the final SELECT readable by mere mortals.

    WITH CTE_Base

    AS ( SELECT f.ProductKey,

    YEAR(f.orderdate) AS OrderYear,

    MONTH(f.orderdate) AS OrderMonth,

    SUM(f.SalesAmount) AS [Sales],

    SUM(SUM(f.SalesAmount)) OVER () AS [All Sales],

    SUM(SUM(f.SalesAmount)) OVER (PARTITION BY f.productkey)

    AS [Product All Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate)) AS [Annual Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate), MONTH(f.OrderDate))

    AS [Month All Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate))

    AS [Product Annual Sales]

    FROM dbo.FactInternetSales AS f

    WHERE OrderDate BETWEEN ''2011-01-01'' AND ''2012-12-31''

    GROUP BY f.ProductKey,

    YEAR(f.orderdate),

    MONTH(f.orderdate)

    )

    SELECT ProductKey,

    OrderYear,

    OrderMonth,

    [Sales],

    [Product All Sales] / [All Sales] AS [Ratio to All Sales],

    [Product Annual Sales] / NULLIF([Annual Sales], 0)

    AS [Ratio to Annual Sales],

    [Sales] / NULLIF([Month All Sales], 0) AS [Ratio to Month Sales]

    FROM CTE_Base

    ORDER BY OrderYear,

    OrderMonth,

    ProductKey;

    ```

    列表 10-4

    针对 `[SalesAmount]` 的包含父级百分比计算的基本查询


    ## 期间至今计算


    期间至今（Period-to-date）计算是财务报告的主要内容，但众所周知，在不借助多个`CTE`或临时表的情况下，很难将其整合到基于查询的报告中。通常，分组是在`SQL
    Server Reporting Services`或`Excel`等报告工具中执行的，以提供聚合结果，但这仍然可能很棘手。你将通过接下来的示例学习如何通过在`ORDER
    BY`子句后添加一个`FRAME`子句，在单个结果集中创建多级滚动总计。`FRAME`子句在第 [5](#335106_2_En_5_Chapter.xhtml)
    章有更详细的介绍。


    列表 [10-5](#335106_2_En_10_Chapter.xhtml#PC7) 演示了如何使用帧定义来按日期、按产品计算月份、季度和年份的期间至今总计。基本查询与之前基本相同，但粒度级别是日期级别而不是月份级别。这样你就可以更详细地查看聚合列的结果。


    ```

    --10.5 day level aggregates, with rolling totals for MTD, QTD, YTD

    SELECT f.OrderDate,

    f.ProductKey,

    YEAR(f.orderdate) AS OrderYear,

    MONTH(f.orderdate) AS OrderMonth,

    SUM(f.SalesAmount) AS [Sales],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate),

    MONTH(f.orderdate)

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales MTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate),

    DATEPART(QUARTER, f.OrderDate)

    ORDER BY f.productkey, YEAR(f.orderdate), MONTH(f.orderdate)

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales QTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate)

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales YTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales Running Total]

    FROM dbo.FactInternetSales AS f

    GROUP BY f.orderdate, f.ProductKey, YEAR(f.orderdate), MONTH(f.orderdate)

    ORDER BY f.ProductKey, f.OrderDate;

    ```

    列表 10-5

    按日期计算期间至今运行总计


    列表 [10-5](#335106_2_En_10_Chapter.xhtml#PC7) 所示的 `OVER` 子句示例使用了 `ROWS BETWEEN
    UNBOUNDED PRECEDING AND CURRENT ROW` 帧。这导致计算聚合从帧的开始到当前行的所有行，为你提供在 `PARTITION`
    子句中指定的级别的正确至今总计。例如，`[Sale Amt MTD]` 聚合列将计算从本月的第一天（第一个无界前置行）到当前行的 `SUM([SalesAmount])`。当使用
    `FRAME` 子句时，`ORDER BY` 子句成为必需，为帧提供在 `PARTITION` 中按顺序遍历行的上下文。


    图 [10-4](#335106_2_En_10_Chapter.xhtml#Fig4) 显示了部分结果。列 [`Sales MTD], [Sales QTD]`
    和 [`Sales YTD]` 的值会增加，直到遇到不同的 [`ProductKey]` 或 [`ProductKey]` 和时间级别（月份和季度）。图 [10-4](#335106_2_En_10_Chapter.xhtml#Fig4)
    中的结果显示聚合在第二季度末中断，因此通过查看 `[ProductKey]` 等于 311、312 或 313 的行，你可以看到 MTD 和 QTD 聚合在
    10 月 1 日重置。


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig4_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig4_HTML.jpg)


    图 10-4


    列表 [10-5](#335106_2_En_10_Chapter.xhtml#PC7) 在季度末（9 月 30 日）的部分结果


