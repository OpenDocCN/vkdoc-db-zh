    \n`图 9-9` 洋基队的连败纪录，最长的记录位于列表顶部\n\n# 跨分区数据集的连胜/连败\n\n虽然确定一支球队对阵所有对手的连胜或连败很有用，但我们可能想知道一支球队对阵其他各支球队的单独表现。这就引入了一个新的挑战：在应用空隙/岛屿分析返回每个对手球队的结果时，需要对数据进行分区。\n\
    \n这可以通过创建一个球队列表并逐个迭代来轻松完成。但这种方法速度较慢，并且缺乏我们目前流程所展现的创造性。另一种方法是调整窗口函数的使用方式，使其不仅按日期和\
