    current row as in Query 2, you create a window that moves.


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig3_HTML.jpg](images/335106_2_En_5_Chapter/335106_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    The partial results of using the frame


    You may notice that the calculations using N PRECEDING return values when less
    than three months of rows is available. To get around this, you can filter out
    rows that don’t qualify. Listing [5-3](#335106_2_En_5_Chapter.xhtml#PC4) shows
    how you might want to do this.


    ```

    --5-3.1 Filter rows with less than 2 preceding rows

