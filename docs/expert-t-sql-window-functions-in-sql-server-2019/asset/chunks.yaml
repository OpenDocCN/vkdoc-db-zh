    \ Server`处理其余部分。图[9-12](#335106_2_En_9_Chapter.xhtml#Fig12)显示了这些更改的结果。\n\n![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig12_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig12_HTML.jpg)\n\
    \n**图 9-12**\n\n历史上最长的整体连胜记录\n\n我们可以看到，历史上最长的连胜记录是1875年由波士顿红袜队创造的，而下一个最长的连胜记录发生在142年后，由克利夫兰印第安人队创造。由于我们进行的是对阵所有其他球队的分析，对手球队已从结果中移除。\n\
    \n## 数据质量\n\n在基于连续区间进行数据分析之前，我们需要仔细考虑底层数据的质量。因为我们将数据集分区并排序为不同的端点，一个错误的数据点可能会打乱集合内剩余的数据。如果我们不事先测试，可能会有多种情况使分析失效，这些情况值得在此简要讨论。\n\
    \n### 空值\n\n考虑我们之前对棒球比分的分析。我们通过比较比分来计算结果，从而分配“W”表示胜利，“L”表示失败，“T”表示平局。如果一个比分为`NULL`会怎样？我们的相等操作将无法返回预期结果，我们的分析也会被破坏。\n\
    \n列表[9-11](#335106_2_En_9_Chapter.xhtml#PC12)提供了一个查询，该查询将单场比赛的比分更新为`NULL`。\n\n\
    ```\nUPDATE GameLog\nSET HomeScore = null,\n    VisitingScore = null\nFROM GameLog\n\
    WHERE GameLogID = 209967;\n```\n**列表 9-11**\n为数据质量测试设置比分为`NULL`\n\n该行对应于1875年7月7日波士顿的比赛。图[9-13](#335106_2_En_9_Chapter.xhtml#Fig13)显示了在我们将一行比分为`NULL`之前和之后波士顿的连胜记录。\n\
    \n![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig13_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig13_HTML.jpg)\n\
    \n**图 9-13**\n波士顿红袜队在设置`NULL`值前后的连胜记录\n\n`NULL`值的出现导致通过将一场连胜分裂为两部分而创建了一个新的数据区间。这是一个相当良性的结果，只在一个位置导致了坏数据，但并未破坏我们的整个数据集。如果更基本的指标包含`NULL`，例如`GameType`，我们可能会在结果中看到更广泛的无效数据。\n\
    \n### 意外或无效值\n\n如同任何数据分析一样，我们经常会遇到可能影响我们工作的垃圾数据。日期字段常包含“1/1/1900”作为虚拟值，字符串可能包含空格，而本应为正整数的字段可能包含-1。虽然我们可以在遇到坏数据时尝试验证和纠正，但我们也应编写能尽可能防范它的查询，这样我们的分析才不会被单个异常条目破坏。以下是管理这些场景的一些建议：\n\
    \n*   使用`CASE`语句时，要么包含一个捕获所有情况的`ELSE`子句，要么在`WHEN`子句集合中涵盖所有可能的选项。\n*   考虑在分析之前过滤掉坏数据。这消除了需要为其编写特殊处理代码的麻烦，并且可以在稍后将问题的存在告知相关方。\n\
    *   如果坏数据可能被创建并传入你的系统，请在报告中加以说明，以便其使用者了解其存在和局限性。\n*   如果可以容忍，修复坏数据。例如，如果我们知道任何`NULL`或小于零的值都应为零，那么我们可以在分析前将其修复，从而消除问题。"
  raw: 'To generalize our results, we need to turn game results into a one-dimensional
    data set where there is simply one team vs. the other team, without a distinction
    between home and visiting teams. To accomplish this, we use our first CTE to flatten
    our game data into a single set of games. We use caution to only count ties once,
    otherwise we might skew the results.


    The second CTE takes this data and applies LAG, LEAD, and ROW_NUMBER to provide
    the basis for gaps/islands analysis. The remainder of our query is very similar
    to before, with the addition of a join to ensure that we compile our streaks based
    on a trending team, opposing team, and the island number. The results of this
    expanded analysis can be found in Figure [9-11](#335106_2_En_9_Chapter.xhtml#Fig11).


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig11_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Winning streaks for each team vs. all opposing teams


    We can see that the longest winning streak of any one team vs. another in history
    occurred from 1883 to 1884 between the Detroit Wolverines and Providence Grays.
    The Red Sox 22-game winning streak from earlier shows up 4th on this list.


    A final task we can accomplish is to determine the longest winning streaks overall
    for all teams shown in Listing [9-10](#335106_2_En_9_Chapter.xhtml#PC11), rather
    than for a team vs. a specific other team. This will be a surprisingly similar
    process and will highlight how consistent coding practices can allow us to reuse
    quite a bit of our TSQL and reduce the chances of a mistake along the way.


    ```

    WITH GAME_LOG AS (

    SELECT

    CASE WHEN HomeScore > VisitingScore THEN ''W''

    WHEN VisitingScore > HomeScore THEN ''L''

    WHEN HomeScore = VisitingScore THEN ''T''

    END AS result,

    VisitingTeamName AS opposing_team,

    HomeTeamName AS team_to_trend,

    GameLog.GameDate,

    GameLog.GameLogId

    FROM dbo.GameLog

    WHERE GameLog.GameType = ''REG''

    UNION ALL

    SELECT

    CASE WHEN VisitingScore > HomeScore THEN ''W''

    WHEN HomeScore > VisitingScore THEN ''L''

    END AS result,

    HomeTeamName AS opposing_team,

    VisitingTeamName AS team_to_trend,

    GameLog.GameDate,

    GameLog.GameLogId

    FROM dbo.GameLog

    WHERE GameLog.GameType = ''REG''

    AND VisitingScore  HomeScore),

    GAME_LOG_ORDERED AS (

    SELECT

    GAME_LOG.GameLogId,

    GAME_LOG.GameDate,

    GAME_LOG.team_to_trend,

    GAME_LOG.result,

    LAG(GAME_LOG.result) OVER (PARTITION BY team_to_trend ORDER BY GAME_LOG.GameDate,
    GAME_LOG.GameLogId) AS previous_game_result,

    LEAD(GAME_LOG.result) OVER (PARTITION BY team_to_trend ORDER BY GAME_LOG.GameDate,
    GAME_LOG.GameLogId) AS next_game_result,

    ROW_NUMBER() OVER (PARTITION BY team_to_trend ORDER BY GAME_LOG.GameDate, GAME_LOG.GameLogId)
    AS island_location

    FROM GAME_LOG),

    CTE_ISLAND_START AS (

    SELECT

    ROW_NUMBER() OVER (PARTITION BY GAME_LOG_ORDERED.team_to_trend ORDER BY GAME_LOG_ORDERED.GameDate,
    GAME_LOG_ORDERED.GameLogId) AS island_number,

    GAME_LOG_ORDERED.GameDate AS island_start_time,

    GAME_LOG_ORDERED.island_location AS island_start_location,

    GAME_LOG_ORDERED.team_to_trend

    FROM GAME_LOG_ORDERED

    WHERE GAME_LOG_ORDERED.result = ''W''

    AND (GAME_LOG_ORDERED.previous_game_result  ''W'' OR GAME_LOG_ORDERED.previous_game_result
    IS NULL)),

    CTE_ISLAND_END AS (

    SELECT

    ROW_NUMBER() OVER (PARTITION BY GAME_LOG_ORDERED.team_to_trend ORDER BY GAME_LOG_ORDERED.GameDate,
    GAME_LOG_ORDERED.GameLogId) AS island_number,

    GAME_LOG_ORDERED.GameDate AS island_end_time,

    GAME_LOG_ORDERED.island_location AS island_end_location,

    GAME_LOG_ORDERED.team_to_trend

    FROM GAME_LOG_ORDERED

    WHERE GAME_LOG_ORDERED.result = ''W''

    AND (GAME_LOG_ORDERED.next_game_result  ''W'' OR GAME_LOG_ORDERED.next_game_result
    IS NULL))

    SELECT

    CTE_ISLAND_START.island_start_time,

    CTE_ISLAND_START.team_to_trend,

    CTE_ISLAND_END.island_end_time,

    CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location +
    1 AS count_of_events,

    DATEDIFF(DAY, CTE_ISLAND_START.island_start_time, CTE_ISLAND_END.island_end_time)
    + 1 AS length_of_streak_in_days

    FROM CTE_ISLAND_START

    INNER JOIN CTE_ISLAND_END

    ON CTE_ISLAND_START.island_number = CTE_ISLAND_END.island_number

    AND CTE_ISLAND_START.team_to_trend = CTE_ISLAND_END.team_to_trend

    ORDER BY CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location
    DESC;

    Listing 9-10

    Query That Calculates Overall Winning Streaks for All Teams

    ```


    To calculate overall winning streaks, we removed references to *opposing_team*
    from joins and window functions and let SQL Server do the rest. Figure [9-12](#335106_2_En_9_Chapter.xhtml#Fig12)
    shows the results of these changes.


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig12_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig12_HTML.jpg)


    Figure 9-12


    Longest overall winning streaks in history


    We can see that the longest streak in history was by the Boston Red Stockings
    in 1875, with the next longest streak taking place 142 years later by the Cleveland
    Indians. Since we are performing an analysis vs. all other teams, the opposition
    team has been removed from the results.


    ## Data Quality


    When building an analysis based on gaps or islands, we need to carefully consider
    the quality of the underlying data prior to crunching it. Because we are partitioning
    and ordering a data set into distinct endpoints, a single bad data point can throw
    off the remaining data within the set. There are a variety of conditions that
    might invalidate analytics if we do not test them first and are worth briefly
    discussing here.


    ### NULL


    Consider our previous analysis of baseball scores. We calculated results based
    on comparing scores, which resulted in the assignment of “W” for a win, “L” for
    a loss, or “T” for a tie. What if a score had been NULL? Our equality operations
    would not have returned the expected results and our analysis would be broken.


    Listing [9-11](#335106_2_En_9_Chapter.xhtml#PC12) provides a query that will update
    the score of a single game to NULL.


    ```

    UPDATE GameLog

    SET HomeScore = null,

    VisitingScore = null

    FROM GameLog

    WHERE GameLogID = 209967;

    Listing 9-11

    Setting Scores to NULL for Data Quality Testing

    ```


    This row corresponds to the game for Boston on July 7, 1875\. Figure [9-13](#335106_2_En_9_Chapter.xhtml#Fig13)
    shows the winning streaks for Boston before we set a row’s scores to NULL and
    afterward.


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig13_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig13_HTML.jpg)


    Figure 9-13


    Winning streaks for the Boston Red Stockings, before and after NULL update


    The presence of NULL resulted in a new island of data being created via a winning
    streak being broken into two. This was a fairly benign result that resulted in
    bad data in one location but did not destroy our entire data set. Had a more fundamental
    metric contained NULL, such as *GameType*, we may have seen more widespread nonsense
    in the results.


    ### Unexpected or Invalid Values


    As is common to any data analysis, we will often find garbage data that can throw
    off our work. Date fields often contain “1/1/1900” as a dummy value, strings can
    contain blanks, and what should be a positive integer might happen to contain
    -1\. While we can try to validate and correct bad data when we encounter it, we
    should write queries that guard against it the best they can so that our analytics
    are not broken by a single odd entry. Here are a few suggestions for managing
    these scenarios:


    *   When using a CASE statement, either have a catch-all ELSE clause or encompass
    all possible options within the set of WHEN clauses.


    *   Consider filtering out bad data prior to analysis. This eliminates the need
    to code around it and its presence can be communicated to the appropriate parties
    at a later time.


    *   If bad data can be created and passed into your system, document the report
    such that its consumer knows its existence and limitations.


    *   If tolerable, fix bad data. For example, if we know that any NULL or value
    less than zero should be zero, then we may fix it prior to analysis, thus eliminating
    the problem.'
  trans: "\n为了总结我们的研究发现，我们需要将比赛结果转换为一个一维数据集，其中仅体现一支队伍与另一支队伍的对决，而不区分主客场。为此，我们使用第一个`CTE`将比赛数据展平为一组统一的比赛记录。我们谨慎地只计算一次平局，否则可能会扭曲结果。\n\
    \n第二个`CTE`接收这些数据，并应用`LAG`、`LEAD`和`ROW_NUMBER`函数，为连续区间的分析提供基础。我们查询的其余部分类似于之前，但增加了一个`JOIN`操作，以确保我们能根据趋势球队、对手球队和区间编号来编译连胜记录。这个扩展分析的结果可以在图\
    \ 9-11 中找到。\n\n![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig11_HTML.jpg](img/335106_2_En_9_Fig11_HTML.jpg)\n\
    \n**图 9-11**\n\n各队对阵所有对手球队的连胜记录\n\n我们可以看到，历史上任何一支队伍对阵另一支队伍的最长连胜发生在 1883 年至 1884\
    \ 年间，由底特律狼獾队对阵普罗维登斯灰队。红袜队早先的 22 场连胜在该列表中排名第四。\n\n我们能完成的最终任务是确定如列表 9-10 所示所有球队的整体最长连胜记录，而不是针对某支队伍对阵特定对手的情况。这将是一个极其相似的过程，并将突出展示一致的编码实践如何使我们能够重用相当多的`TSQL`，并减少在此过程中出错的机会。\n\
    \n```\nWITH GAME_LOG AS (\n    SELECT\n        CASE WHEN HomeScore > VisitingScore\
    \ THEN 'W'\n             WHEN VisitingScore > HomeScore THEN 'L'\n           \
    \  WHEN HomeScore = VisitingScore THEN 'T'\n        END AS result,\n        VisitingTeamName\
    \ AS opposing_team,\n        HomeTeamName AS team_to_trend,\n        GameLog.GameDate,\n\
    \        GameLog.GameLogId\n    FROM dbo.GameLog\n    WHERE GameLog.GameType =\
    \ 'REG'\n    UNION ALL\n    SELECT\n        CASE WHEN VisitingScore > HomeScore\
    \ THEN 'W'\n             WHEN HomeScore > VisitingScore THEN 'L'\n        END\
    \ AS result,\n        HomeTeamName AS opposing_team,\n        VisitingTeamName\
    \ AS team_to_trend,\n        GameLog.GameDate,\n        GameLog.GameLogId\n  \
    \  FROM dbo.GameLog\n    WHERE GameLog.GameType = 'REG'\n        AND VisitingScore\
    \  HomeScore),\nGAME_LOG_ORDERED AS (\n    SELECT\n        GAME_LOG.GameLogId,\n\
    \        GAME_LOG.GameDate,\n        GAME_LOG.team_to_trend,\n        GAME_LOG.result,\n\
    \        LAG(GAME_LOG.result) OVER (PARTITION BY team_to_trend ORDER BY GAME_LOG.GameDate,\
    \ GAME_LOG.GameLogId) AS previous_game_result,\n        LEAD(GAME_LOG.result)\
    \ OVER (PARTITION BY team_to_trend ORDER BY GAME_LOG.GameDate, GAME_LOG.GameLogId)\
    \ AS next_game_result,\n        ROW_NUMBER() OVER (PARTITION BY team_to_trend\
    \ ORDER BY GAME_LOG.GameDate, GAME_LOG.GameLogId) AS island_location\n    FROM\
    \ GAME_LOG),\nCTE_ISLAND_START AS (\n    SELECT\n        ROW_NUMBER() OVER (PARTITION\
    \ BY GAME_LOG_ORDERED.team_to_trend ORDER BY GAME_LOG_ORDERED.GameDate, GAME_LOG_ORDERED.GameLogId)\
    \ AS island_number,\n        GAME_LOG_ORDERED.GameDate AS island_start_time,\n\
    \        GAME_LOG_ORDERED.island_location AS island_start_location,\n        GAME_LOG_ORDERED.team_to_trend\n\
    \    FROM GAME_LOG_ORDERED\n    WHERE GAME_LOG_ORDERED.result = 'W'\n        AND\
    \ (GAME_LOG_ORDERED.previous_game_result  'W' OR GAME_LOG_ORDERED.previous_game_result\
    \ IS NULL)),\nCTE_ISLAND_END AS (\n    SELECT\n        ROW_NUMBER() OVER (PARTITION\
    \ BY GAME_LOG_ORDERED.team_to_trend ORDER BY GAME_LOG_ORDERED.GameDate, GAME_LOG_ORDERED.GameLogId)\
    \ AS island_number,\n        GAME_LOG_ORDERED.GameDate AS island_end_time,\n \
    \       GAME_LOG_ORDERED.island_location AS island_end_location,\n        GAME_LOG_ORDERED.team_to_trend\n\
    \    FROM GAME_LOG_ORDERED\n    WHERE GAME_LOG_ORDERED.result = 'W'\n        AND\
    \ (GAME_LOG_ORDERED.next_game_result  'W' OR GAME_LOG_ORDERED.next_game_result\
    \ IS NULL))\nSELECT\n    CTE_ISLAND_START.island_start_time,\n    CTE_ISLAND_START.team_to_trend,\n\
    \    CTE_ISLAND_END.island_end_time,\n    CTE_ISLAND_END.island_end_location -\
    \ CTE_ISLAND_START.island_start_location + 1 AS count_of_events,\n    DATEDIFF(DAY,\
    \ CTE_ISLAND_START.island_start_time, CTE_ISLAND_END.island_end_time) + 1 AS length_of_streak_in_days\n\
    FROM CTE_ISLAND_START\nINNER JOIN CTE_ISLAND_END\n    ON CTE_ISLAND_START.island_number\
    \ = CTE_ISLAND_END.island_number\n    AND CTE_ISLAND_START.team_to_trend = CTE_ISLAND_END.team_to_trend\n\
    ORDER BY CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location\
    \ DESC;\n```\n**列表 9-10**\n计算所有球队整体连胜记录的查询\n\n为了计算整体连胜记录，我们从`JOIN`和窗口函数中移除了对`opposing_team`的引用，并让`SQL\
    \ Server`处理其余部分。图 9-12 显示了这些更改的结果。\n\n![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig12_HTML.jpg](img/335106_2_En_9_Fig12_HTML.jpg)\n\
    \n**图 9-12**\n\n历史上最长的整体连胜记录\n\n我们可以看到，历史上最长的连胜记录是 1875 年由波士顿红袜队创造的，而下一个最长的连胜记录发生在\
    \ 142 年后，由克利夫兰印第安人队创造。由于我们进行的是对阵所有其他球队的分析，对手球队已从结果中移除。\n\n## 数据质量\n\n在基于连续区间进行数据分析之前，我们需要仔细考虑底层数据的质量。因为我们将数据集分区并排序为不同的端点，一个错误的数据点可能会打乱集合内剩余的数据。如果我们不事先测试，可能会有多种情况使分析失效，这些情况值得在此简要讨论。\n\
    \n### 空值\n\n考虑我们之前对棒球比分的分析。我们通过比较比分来计算结果，从而分配“W”表示胜利，“L”表示失败，“T”表示平局。如果一个比分为`NULL`会怎样？我们的相等操作将无法返回预期结果，我们的分析也会被破坏。\n\
    \n列表 9-11 提供了一个查询，该查询将单场比赛的比分更新为`NULL`。\n\n```\nUPDATE GameLog\nSET HomeScore\
    \ = null,\n    VisitingScore = null\nFROM GameLog\nWHERE GameLogID = 209967;\n\
    ```\n**列表 9-11**\n为数据质量测试设置比分为`NULL`\n\n该行对应于 1875 年 7 月 7 日波士顿的比赛。图 9-13 显示了在我们将一行比分为`NULL`之前和之后波士顿的连胜记录。\n\
    \n![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig13_HTML.jpg](img/335106_2_En_9_Fig13_HTML.jpg)\n\
    \n**图 9-13**\n波士顿红袜队在设置`NULL`值前后的连胜记录\n\n`NULL`值的出现导致通过将一场连胜分裂为两部分而创建了一个新的数据区间。这是一个相当良性的结果，只在一个位置导致了坏数据，但并未破坏我们的整个数据集。如果更基本的指标包含`NULL`，例如`GameType`，我们可能会在结果中看到更广泛的无效数据。\n\
    \n### 意外或无效值\n\n如同任何数据分析一样，我们经常会遇到可能影响我们工作的垃圾数据。日期字段常包含“1/1/1900”作为虚拟值，字符串可能包含空格，而本应为正整数的字段可能包含-1。虽然我们可以在遇到坏数据时尝试验证和纠正，但我们也应编写能尽可能防范它的查询，这样我们的分析才不会被单个异常条目破坏。以下是管理这些场景的一些建议：\n\
    \n*   使用`CASE`语句时，要么包含一个捕获所有情况的`ELSE`子句，要么在`WHEN`子句集合中涵盖所有可能的选项。\n*   考虑在分析之前过滤掉坏数据。这消除了需要为其编写特殊处理代码的麻烦，并且可以在稍后将问题的存在告知相关方。\n\
    *   如果坏数据可能被创建并传入你的系统，请在报告中加以说明，以便其使用者了解其存在和局限性。\n*   如果可以容忍，修复坏数据。例如，如果我们知道任何`NULL`或小于零的值都应为零，那么我们可以在分析前将其修复，从而消除问题。\n"
- fmt: '# Duplicate Data


    Duplicates are managed in our analytics via our window functions. The key to duplicate
    data being correctly processed is to ensure that the `ORDER BY` within each window
    function results in a unique order.


    This requires a primary or alternate key that can be relied on throughout our
    queries. For example, our `error_log` data from earlier in this chapter used a
    unique integer primary key in all `ORDER BY` clauses in addition to the error
    time. This ensured that our data was sorted by datetime first, but ordered further
    by the primary key, in the event that two errors occurred at the same time.


    In our baseball data, we used the integer primary key in the `log` table to ensure
    a unique ordering in all queries. If a unique column doesn’t exist, then consider
    a combination of columns that would form an alternate key and could be used to
    order our data effectively.


    A data set must have a unique column or set of columns to accurately perform gaps/islands
    analytics.


    If no unique column or combination of columns exists, then we have a fundamental
    problem with our data that will potentially invalidate our gaps/islands analysis.
    If this analysis is necessary, then the best solution would be to add a new unique
    column, such as an identity, to ensure that we can uniquely tag each row as we
    analyze a data set.


    A data set without a primary key is challenging to analyze in general, but for
    many types of analytics (such as gaps/islands), our ability to accurately return
    results consistently cannot be guaranteed without it.


    ## Performance


    Window functions provide the ability to produce unique metrics that would be challenging
    to return otherwise in T-SQL. Like all analytical processes, performance will
    be based on the amount of data that needs to be scanned prior to analysis. Calculating
    winning streaks for a single team across 10k rows of data will require scanning
    10k rows. Doing so for a data set of a billion rows would require reading all
    billion rows. We can manage and improve performance by reconsidering the data
    set itself and how we access it.


    The following are some options that can help facilitate better performance when
    performing gaps/islands analysis on a large data set, in the event that performance
    is not adequate:


    1.  Target an OLAP/reporting database. Any large-scale analytics will cause contention
    when run against a database with a highly transactional workload. Consider a reporting
    environment supported by replication, AlwaysOn, ETL, log shipping, or some other
    data copy process that separates analytical workloads from transactional ones.


    2.  If these queries must be run against an OLTP environment, run them off-hours
    or at a time when there are fewer other processes running.


    3.  The underlying filters at the beginning of each query reduce the size of the
    data to be analyzed. Indexing the column(s) in those filters will ensure that
    you do not read any additional data that is not required to satisfy the query.
    This allows data to be sliced into narrower sets that can be individually analyzed
    independently from the rest of the data set.


    4.  Incremental data loads can greatly help reduce the data needed to satisfy
    analytics that are requested regularly. If gaps/islands are crunched daily, then
    one only needs to recalculate metrics for the previous day to get results. The
    only caveat is to start the analysis from the end of the last known gap or island.
    This ensures that an event-in-progress at the start of the reporting period is
    fully reported as a single event, and as not two events split by the end of one
    data load and the start of the next.


    5.  Automate analytics so that these tasks are performed unattended and the results
    stored in a table for future inspection. If the results of a gaps/islands analysis
    are placed into a permanent repository, then future reporting requires only reading
    that table rather than executing complex queries each time they are required.


    ## Summary


    Window functions such as `LEAD`, `LAG`, and `ROW_NUMBER` can be combined to allow
    for a wide variety of analytics to be performed against a data set. In this chapter
    we demonstrated their use in finding missing data, in aggregating related events,
    and in calculating different types of streaks.


    There are many other metrics that we can collect using methods similar to this.
    Gaps and islands analysis can be used to order data and determine how rows relate
    to those nearby in the overall set. They can allow us to locate anomalies that
    otherwise might not be apparent within a large/complex set of tables.


    Calculating streaks allows us to string together significant chains of events
    over time, but we can also consider droughts. How long does time pass in between
    significant events, and does the probability of events occurring increase after
    an extended drought? Any gaps analysis can also be used to produce islands and
    conversely, islands analysis can be used to generate gaps data. In this regard,
    we can always consider both the presence of important events and the absence of
    those events as metrics worthy of consideration.


    Once we structure queries that can perform these analytics, we can reuse our code
    with minimal change to process other data sets, change filters, or crunch the
    data in completely different ways. By experimenting with filters and the contents
    of the window functions we use, the potential applications for these analytics
    are limitless!


    # 10. Time Range Calculations


    A very common reporting requirement is to produce totals by different ranges of
    time for comparison. Typical reports will contain totals by month, quarter, and
    year, sometimes with comparisons to the same period in the prior year or for month-to-date
    or year-to-date totals. Products like SQL Server Analysis Services and Power BI
    provide functions to navigate date hierarchies. With window functions in SQL Server
    2012 or later, you can produce the same calculations using the techniques provided
    earlier in this book.


    In this chapter you will put all the techniques you have learned previously to
    work to create calculations for navigating the timeline to produce the following
    calculations:


    *   Percent of Parent


    *   Year-to-date (YTD)


    *   Quarter-to-date (QTD)


    *   Month-to-date (MTD)


    *   Same Period Prior Year (SP PY)


    *   Prior year-to-date (PY YTD)


    *   Average, moving average (MA)


    *   Growth, growth percentage


    You have learned about using window aggregates to add summaries to queries without
    grouping in Chapter 3, accumulating aggregates in Chapter 4, and frames in Chapter
    5. You will be putting these all together, with a bit of common sense to create
    complex calculations that without the use of window functions would have required
    a lot more steps.


    Remember, in the case of accumulating aggregates, the `PARTITION BY` and `ORDER
    BY` determine which rows end up in the window. The `FRAME DEFINITION` is used
    to define the subset of rows from within the partition that will be aggregated.
    The examples in this section use the frame definition to do the heavy lifting.
    To review, here’s the syntax:


    ```

    () OVER([PARTITION BY [,,...]]

    ORDER BY [,,...] [Frame definition])

    ```


    In this chapter, you will need to use the AdventureWorksDW sample database.'
