    and `LAST_VALUE`. These functions let you include any columns from other rows
    in your results without a self-join and with fantastic performance.


    In this chapter, you will learn how to use `LAG`, `LEAD`, `FIRST_VALUE`, and `LAST_VALUE`.
    You will see how easy they are to use. The performance is great, but you’ll learn
    about that in Chapter [8](#335106_2_En_8_Chapter.xhtml).'
  trans: '

    ## 理解 ROWS 与 RANGE 的逻辑差异


    在第 8 章中，你将会看到，在 2019 年之前的 SQL Server 版本中，使用 `ROWS` 的窗口框架相比 `RANGE` 具有显著的性能优势。这两个操作符之间还存在逻辑上的差异。`ROWS`
    操作符是一个位置操作符，而 `RANGE` 操作符则是一个逻辑操作符。这非常类似于 `ROW_NUMBER` 和 `RANK` 之间的区别。当 `ORDER
    BY` 表达式中存在并列值时，`RANK` 会重复该值，而 `ROW_NUMBER` 会返回唯一值。同样地，在计算累计总和时，如果 `OVER` 子句的 `ORDER
    BY` 表达式中存在并列值，`ROWS` 和 `RANGE` 也会返回不同的结果。运行清单 5-5 来查看这种差异。


    ```sql

    --5-5.1 比较 ROWS 与 RANGE 的逻辑差异

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(ORDER BY OrderDate

    ROWS UNBOUNDED PRECEDING) AS RunningTotalRows,

    SUM(TotalDue) OVER(ORDER BY OrderDate

    RANGE UNBOUNDED PRECEDING) AS RunningTotalRange

    FROM Sales.SalesOrderHeader

    WHERE CustomerID =11300

    ORDER BY SalesOrderID;

    ```


    清单 5-5

    ROWS 与 RANGE 的区别


    部分结果如图 5-5 所示。`OVER` 子句中的 `ORDER BY` 表达式都是 `OrderDate`，该列的值并不唯一。请看第 7 行和第 8 行，该客户在同一天下了两个订单。`RunningTotalRows`
    的值按预期递增，而 `RunningTotalRange` 的值对于这两行是相同的。在第 9 行，`RunningTotalRange` 的值又重新对齐了。


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig5_HTML.jpg](img/335106_2_En_5_Fig5_HTML.jpg)


    图 5-5

    比较 ROWS 与 RANGE 的部分结果


    在这种情况下，`ROWS` 的窗口从第一行开始，包含根据 `ORDER BY` 排序后直至当前行的所有行。`RANGE` 的窗口则是从第一行开始，包含所有与当前行的
    `ORDER BY` 表达式具有 *相同值* 的行。在确定第 7 行的窗口时，`RANGE` 不仅查看位置，还查看值。第 8 行的 `OrderDate`
    值与第 7 行的值相同，因此第 8 行也被包含在第 7 行的窗口中。


    如果你认为 `RANGE` 存在 bug，可以运行清单 5-6，它使用了一种较旧的技术，返回的结果与使用 `RANGE` 相同。


    ```sql

    --5-6.1 查看较旧的技术

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID, TotalDue,

    (SELECT SUM(TotalDue)

    FROM Sales.SalesOrderHeader AS IQ

    WHERE IQ.CustomerID = OQ.CustomerID

    AND IQ.OrderDate <= OQ.OrderDate) AS RunningTotal

    FROM Sales.SalesOrderHeader AS OQ

    WHERE CustomerID =11300

    ORDER BY SalesOrderID;

    ```


    清单 5-6

    使用较旧技术得到相同结果


    部分结果如图 5-6 所示。请看第 7 行和第 8 行。你会发现，由于 `OrderDate` 值相同，`RunningTotal` 的值也相同。


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig6_HTML.jpg](img/335106_2_En_5_Fig6_HTML.jpg)


    图 5-6

    使用较旧技术计算累计总和的部分结果


    如果你确保 `ORDER BY` 表达式是唯一的，那么无论使用旧方法还是使用默认窗口框架的窗口聚合，都能得到预期的结果。


    如前所述，`RANGE` 操作符实际上旨在与月份或季度等逻辑集合一起使用。此功能已由 ANSI 标准定义，但目前在 SQL Server 中尚未实现。在此期间，请务必始终使用
    `ROWS` 来指定窗口框架。


    ## 总结


    编写计算累计总和或移动平均值的查询很容易。默认情况下，窗口框架是用 `RANGE` 定义的，但建议使用 `ROWS`，以防 `ORDER BY` 表达式不唯一。在旧版本的
    SQL Server 中，使用 `ROWS` 还会带来性能提升，你将在第 8 章中了解到这一点。窗口框架还允许你指定一个随结果向下移动的窗口大小，以便进行诸如三个月平均值之类的计算。


    窗口框架的语法并不容易掌握，但时不时地查阅本章中的语法并不丢脸。幸运的是，除了使用累积窗口聚合以及 `FIRST_VALUE` 和 `LAST_VALUE`
    函数时，你不必担心窗口框架的问题。你将在下一章，即第 6 章中学习 `FIRST_VALUE` 和 `LAST_VALUE`。


    # 6. 瞥见另一行


    除了累积窗口聚合，Microsoft 在 SQL Server 2012 中还新增了八个窗口函数。其中四个函数（在本书中我将称之为偏移函数）是我最喜欢的 T-SQL
    函数，它们是 `LAG`、`LEAD`、`FIRST_VALUE` 和 `LAST_VALUE`。这些函数让你无需自连接，就能在结果中包含来自其他行的任何列，并且性能极佳。


    在本章中，你将学习如何使用 `LAG`、`LEAD`、`FIRST_VALUE` 和 `LAST_VALUE`。你会看到它们是多么容易使用。性能非常出色，但你将在第
    8 章中了解到这方面的信息。

