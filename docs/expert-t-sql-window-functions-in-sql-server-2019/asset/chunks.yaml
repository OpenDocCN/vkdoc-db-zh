  trans: '

    ## 时间对比测量


    到目前为止，你已经学习了在执行计划和 `STATISTICS IO` 中需要关注什么。然而，你的客户并不会关心执行计划或逻辑读取次数。你的客户只关心查询运行的速度。另一个名为
    `STATISTICS TIME` 的设置可用于测量查询运行所需的时间。虽然 `STATISTICS IO` 有助于比较两个查询之间的 I/O，但你可能也会对查询实际运行多长时间感兴趣，尤其是在处理运行时间较长的查询时。清单
    8-15 展示了一个使用本章前面创建的 `dbo.SOD` 表的示例。


    ```sql

    --8-15.1 更改设置

    SET STATISTICS IO OFF;

    SET STATISTICS TIME ON;

    GO

    --8-15.2 更改兼容性

    USE MASTER;

    GO

    ALTER DATABASE AdventureWorks2017

    SET COMPATIBILITY_LEVEL = 140 WITH NO_WAIT;

    USE AdventureWorks2017;

    GO

    --8-15.3

    PRINT ''

    DEFAULT frame''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID

    ORDER BY SalesOrderDetailID) AS RunningTotal

    FROM SOD;

    --8-15.4

    PRINT ''

    ROWS''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID

    ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS SubTotal

    FROM SOD;

    ```

    清单 8-15

    使用 `STATISTICS TIME`


    该清单比较了两个返回累计值的查询。第一个使用 `DEFAULT` 框架，第二个使用 `ROWS`。兼容性模式也被更改为 SQL Server 2017，以避免利用批处理模式。图
    8-22 展示了 `STATISTICS TIME` 返回的信息。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig22_HTML.jpg](img/335106_2_En_8_Fig22_HTML.jpg)

    图 8-22

    `STATISTICS TIME` 信息


    使用 `ROWS` 耗时不到 2 秒，而不指定框架则耗时约 21 秒。测量查询运行时间还有其他几种方法。例如，你可以运行一个扩展事件会话。另外需要注意的一点是，如果你使用查询窗口来计时查询，填充网格所花费的时间也被包含在内。你也可以在
    SSMS 选项中打开 *执行后放弃结果* 以避免填充网格。在 SSMS 的某些早期版本中，此设置也会影响“消息”选项卡。为避免此问题，清单 8-16 将行插入临时表而非直接显示它们。


    ```sql

    --8-16.1

    PRINT ''

    DEFAULT frame''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID

    ORDER BY SalesOrderDetailID) AS RunningTotal

    INTO #temp1

    FROM SOD;

    --8-16.2

    PRINT ''

    ROWS''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID

    ORDER BY SalesOrderDetailID

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS SubTotal

    INTO #Temp2

    FROM SOD;

    DROP TABLE #Temp1;

    DROP TABLE #temp2;

    ```

    清单 8-16

    丢弃结果行


    图 8-23 展示了差异。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig23_HTML.jpg](img/335106_2_En_8_Fig23_HTML.jpg)

    图 8-23

    丢弃结果时的耗时


    ### 注意

    你可能会注意到一些奇怪的现象。为什么 CPU 时间大于已用时间？这是因为优化器通过并行处理将查询分配到多个核心上执行，因此时间是所有核心上时间的总和。


    我发现对更大数量的行进行比较非常有趣。为此，我运行了一个来自数据平台专家 Adam Machanic 的脚本，名为 `Thinking Big Adventure`。（你可以轻松地通过谷歌搜索找到这个脚本。）该脚本创建了一个包含
    3000 万行的表，名为 `bigTransactionHistory`。如果你有兴趣自己运行计时测试，所使用的查询将与本章中的其他查询一起提供。


    图 8-24 比较了使用窗口聚合与使用产生相同结果的 CTE 的性能。在我的虚拟机上以 2016 模式运行时，窗口聚合耗时 5 分钟，而使用 CTE 耗时
    1.75 分钟。当切换到 2019 模式时，两种方法都运行得很快。


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig24_HTML.png](img/335106_2_En_8_Fig24_HTML.png)

    图 8-24

    窗口聚合性能


    图 8-25 显示了 `DEFAULT` 框架和 `ROWS` 在累计计算上的差异。在 2016 模式下，使用默认框架耗时 36 分钟，而使用 `ROWS`
    耗时 3.5 分钟。切换到 2019 模式后，每种方法都仅需 1.3 分钟！


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig25_HTML.png](img/335106_2_En_8_Fig25_HTML.png)

    图 8-25

    累计计算性能


    ## 清理数据库

    如果你想将你的 AdventureWorks 数据库恢复到原始状态，可以运行清单 8-17。


    ```sql

    --8-17.1 删除索引

    DROP INDEX [IX_SalesOrderHeader_CustomerID_OrderDate]

    ON Sales.SalesOrderHeader;

    GO

    --8-17-2 重新创建原始索引

    CREATE INDEX [IX_SalesOrderHeader_CustomerID] ON Sales.SalesOrderHeader

    (CustomerID);

    --8-17-3 删除特殊表

    DROP TABLE IF EXISTS dbo.SOD;

    --8-17-4 删除 Thinking Big Adventure 表

    DROP TABLE IF EXISTS dbo.bigTransactionHistory;

    DROP TABLE IF EXISTS dbo.bigProduct;

    ```

    清单 8-17

    清理数据库


    ## 总结

    你可以通过添加一个对 `PARTITION BY` 和 `ORDER BY` 子句进行排序的索引来影响包含窗口函数的查询的性能。一个构建得当的索引可以提高许多包含窗口函数的查询的性能。当框架受支持时，包含它非常重要。在某些情况下，你还可以利用
    2019 的行存储上的批处理模式功能。


    既然你已经了解了所有可能的窗口函数类型以及如何调优它们，是时候看更多真实世界的例子了。在第 9 章中，你将处理棒球数据！


    # 9. 利用间隙、岛屿和连续期打出全垒打

    在任何数据集中，我们都可以检查数据如何分组。这可以让我们识别缺失的行、发现异常模式或开发高级分析技术。最基本地，能够定位间隙和岛屿将告诉我们有关缺失数据值的信息。当我们深入研究时，它将允许我们识别连续期、干旱期或值得进一步调查的异常事件。


    这个概念的核心是边界。边界代表一个停止点或转折点，在此处具有统计显著性的数据集相遇。日期和时间是数据中最常见的自然边界条件，因为我们世界的很多事物都是按事件发生的时间组织的。我们也可以查看标识值的范围，并确定某个值何时缺失，或者在发现间隙之前存在多少连续值。任何可以有意义排序的数据都可以分析是否存在间隙、岛屿或数据组。


    为了有效演示这些概念和技术，我们将使用一组棒球数据来进行我们的工作。因为棒球是一项古老的运动，而我们的数据跨越了一百多年，所以它是一组极好的测试数据，因为它庞大、混乱且充满了不寻常的事件。1920
    年代的数据库远不如我们今天拥有的数据库，因此我们可以确保存在糟糕、缺失或异常的事件，这将为分析增添乐趣。


    窗口函数对于执行间隙/岛屿分析至关重要，因为它们提供了极大的灵活性，并允许我们应用复杂的分析，而无需编写冗长的 T-SQL。虽然可以使用相关子查询、临时表或迭代，但我们的目标是呈现易于阅读和维护且性能合理的解决方案。

    '
- fmt: '## The Classic Gaps/Islands Problem


    For our analysis in this chapter, we will define a gap as the distance between
    the end of one sequence and the beginning of the next. An island is the data set
    bounded by the end of a previous gap and the start of the next. Both gaps and
    islands are defined by a range of values that indicate the beginning of a gap
    or island and the end of that gap or island. Gaps and islands coexist and the
    presence of one implies that of the other. A gap may not exist without islands
    of data surrounding it, and an island may not exist without gaps surrounding it.
    The beginning and end of a data set will often be treated as terminators and act
    similarly to gaps, even if we do not consider them gaps in our data.


    A gap is the distance between two sequences of data, whereas an island is the
    data bounded by a pair of gaps.


    The simplest application of gaps analysis is to look for missing ID values within
    a table. Consider a table that we populate with a set of integers, as seen in
    Listing [9-1](#335106_2_En_9_Chapter.xhtml#PC1).


    ```sql

    CREATE TABLE dbo.integers

    (integer_id INT NOT NULL);

    INSERT INTO dbo.integers

    (integer_id)

    VALUES

    (1), (2), (3), (4), (5), (6), (7), (8), (9), (12), (13), (14), (15), (17), (19),
    (20), (21), (22), (23), (24);

    ```

    Listing 9-1

    Create and Populate a Table of Integer Values for Gaps Analysis


    We intentionally skip some values in the `INSERT` statement. The challenge is
    to determine the best way to locate the missing integer values using TSQL. Since
    this is a small list, we can visually confirm the missing values in our `INSERT`:


    *   1 2 3 4 5 6 7 8 9…12 13 14 15…17…19 20 21 22 23 24


    The simplest and slowest way to do this would be to iterate through the table,
    count integers one by one, and flag any missing values when they are encountered.
    This is easy to understand, but dreadfully slow and limited. In a more realistic
    data set with millions or billions of rows, iterating through every value to find
    missing data would be inefficient enough as to not be worth the effort. Furthermore,
    that strategy would fail against noninteger data, such as dates and times. For
    these data types, the distance between values is indeterminate and additional
    analysis is required to define gaps and islands.


    ### Finding Islands


    Window functions allow us to process this data in a single step and return a list
    of results, as seen in Listing [9-2](#335106_2_En_9_Chapter.xhtml#PC2).


    ```sql

    WITH CTE_ISLANDS AS (

    SELECT

    integer_id,

    integer_id - ROW_NUMBER() OVER (ORDER BY integer_id) AS gap_quantity

    FROM dbo.integers)

    SELECT

    MIN(integer_id) AS island_start,

    MAX(integer_id) AS island_end

    FROM CTE_ISLANDS

    GROUP BY gap_quantity;

    ```

    Listing 9-2

    Query to Return Islands Within a Nonrepeating Integer List


    In this query, we define a common-table expression that returns the integer value,
    as well as the difference between that value and its row number. In a nonrepeating
    sequence of positive integers, that difference can only be accounted for by a
    gap in the sequence, for which we can use `MIN` and `MAX` to quantify the endpoints
    of the remaining islands of data. The results can be seen in Figure [9-1](#335106_2_En_9_Chapter.xhtml#Fig1).


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig1_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig1_HTML.jpg)

    Figure 9-1

    Islands of integers found via the query in Listing [9-2](#335106_2_En_9_Chapter.xhtml#PC2)


    Dealing with duplicates is important, so we’ll continue our analysis by adding
    some duplicates to our integer list:


    ```sql

    INSERT INTO dbo.integers

    (integer_id)

    VALUES

    (2), (12), (12), (24);

    ```


    If we run our previous query, the results shown in Figure [9-2](#335106_2_En_9_Chapter.xhtml#Fig2)
    will appear to be nonsense.


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig2_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig2_HTML.jpg)

    Figure 9-2

    Islands of integers found via the query in Listing [9-2](#335106_2_En_9_Chapter.xhtml#PC2)


    The presence of duplicates throws off our calculations, as they are based on the
    assumption that row counts indicate distinct values. The window function `DENSE_RANK`
    can solve this problem for us as it considers only distinct values and will not
    issue multiple IDs to duplicates. Listing [9-3](#335106_2_En_9_Chapter.xhtml#PC4)
    shows a new query that uses this window function to provide an accurate list of
    islands.


    ```sql

    WITH CTE_ISLANDS AS (

    SELECT

    integer_id,

    integer_id - DENSE_RANK() OVER (ORDER BY integer_id) AS gap_quantity

    FROM dbo.integers)

    SELECT

    MIN(integer_id) AS island_start,

    MAX(integer_id) AS island_end,

    COUNT(*) AS distinct_value_count

    FROM CTE_ISLANDS

    GROUP BY gap_quantity;

    ```

    Listing 9-3

    Using `DENSE_RANK` to Account for Duplicate Values


    The results of this query confirm that we can return the set of islands even in
    the presence of duplicates, as seen in Figure [9-3](#335106_2_En_9_Chapter.xhtml#Fig3).


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig3_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig3_HTML.jpg)

    Figure 9-3

    Islands of integers found via the query in Listing [9-2](#335106_2_En_9_Chapter.xhtml#PC2)


    As a bonus, we have included the count of rows within each island. This is valuable
    as it does include duplicates. The range of 1-9 includes 10 values since the number
    2 is repeated once. This can be useful for quantifying the volume of data within
    a given island, regardless of specific values. If we wanted to return the absolute
    island length ignoring duplicate values, we could simply subtract the island starting
    value from the ending value and add 1. For example, `9-1 + 1 = 9` distinct integer
    values within the range 1-9.


    ### Finding Gaps


    Locating gaps in data requires us to consider the set of islands first and then
    invert that data set to find the gaps in between them. This requires a bit more
    work but can be accomplished in a similar fashion as locating islands. The query
    in Listing [9-4](#335106_2_En_9_Chapter.xhtml#PC5) shows one method for finding
    gaps within a list of integers.


    ```sql

    WITH CTE_GAPS AS (

    SELECT

    integer_id,

    ROW_NUMBER() OVER (ORDER BY integer_id) AS island_quantity

    FROM dbo.integers)

    SELECT

    ISLAND_END.integer_id + 1 AS gap_starting_value,

    ISLAND_START.integer_id - 1 AS gap_ending_value,

    ISLAND_START.integer_id - ISLAND_END.integer_id - 1 AS gap_length

    FROM CTE_GAPS AS ISLAND_END

    INNER JOIN CTE_GAPS AS ISLAND_START

    ON ISLAND_START.island_quantity = ISLAND_END.island_quantity + 1

    WHERE ISLAND_START.integer_id - ISLAND_END.integer_id > 1;

    ```

    Listing 9-4

    Finding Gaps via a Self-Joining CTE Using `ROW_NUMBER`


    The results of this query can be found in Figure [9-4](#335106_2_En_9_Chapter.xhtml#Fig4)
    and provide the three gaps present in our set of integers.


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig4_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig4_HTML.jpg)

    Figure 9-4

    Gaps within a set of integers, including the gap length


    The results show us three gaps that fit within the four islands identified earlier.
    Since gaps are defined as an absence of values, the gap length is simply the number
    of integers within the range. Similarly, repeated values have no bearing on our
    results and we intentionally use `ROW_NUMBER` instead of `DENSE_RANK` as counting
    duplicates would throw off our gap calculations and result in bad ranges whenever
    duplicates were present.'
