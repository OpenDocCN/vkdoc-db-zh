  trans: '# 重复数据


    在我们的分析中，重复数据是通过窗口函数进行管理的。确保重复数据被正确处理的关键在于，确保每个窗口函数内的`ORDER BY`子句能产生一个唯一的排序。


    这要求在整个查询中依赖一个主键或可替换键。例如，本章前面提到的`error_log`数据，在除错误时间外的所有`ORDER BY`子句中都使用了一个唯一的整数主键。这确保了我们的数据首先按日期时间排序，但如果两个错误同时发生，则会进一步按主键排序。


    在我们的棒球数据中，我们使用了`log`表中的整数主键来确保所有查询中的排序都是唯一的。如果不存在唯一的列，那么请考虑使用一组列构成一个可替换键，以便有效地对数据进行排序。


    一个数据集必须拥有一个唯一的列或一组列，才能准确地执行间隙/孤岛分析。


    如果不存在唯一的列或列组合，那么我们的数据就存在一个根本性问题，这可能会使我们的间隙/孤岛分析无效。如果这项分析是必要的，那么最佳解决方案是添加一个新的唯一列，比如一个标识列，以确保我们在分析数据集时能唯一地标记每一行。


    一般来说，没有主键的数据集分析起来具有挑战性，但对于许多类型的分析（如间隙/孤岛），如果没有主键，我们就无法保证能够一致地准确返回结果。


    ## 性能


    窗口函数能够生成一些在 T-SQL 中难以用其他方法返回的独特指标。与所有分析过程一样，性能将取决于分析前需要扫描的数据量。计算单支球队在 1 万行数据上的连胜场次需要扫描
    1 万行数据。对于一个包含十亿行的数据集进行同样的操作，则需要读取所有十亿行数据。我们可以通过重新考虑数据集本身以及我们访问它的方式来管理和提升性能。


    以下是一些选项，当在大型数据集上执行间隙/孤岛分析时，如果性能不足，这些选项有助于提升性能：


    1.  针对一个 OLAP/报告数据库。任何大规模分析在针对具有高事务性工作负载的数据库运行时都会引起资源竞争。请考虑使用由复制、AlwaysOn、ETL、日志传送或其他数据复制过程支持的报告环境，这些过程将分析工作负载与事务性工作负载分离。


    2.  如果这些查询必须在 OLTP 环境中运行，请在非高峰时段或其他进程运行较少时运行它们。


    3.  每个查询开始时的基础筛选器会减少需要分析的数据量。对这些筛选器中的列进行索引，将确保您不会读取任何满足查询所不需要的额外数据。这使得数据可以被切分成更窄的集合，这些集合可以独立于数据集的其余部分进行单独分析。


    4.  增量数据加载可以大大减少满足定期请求的分析所需的数据量。如果间隙/孤岛是按天计算的，那么只需要重新计算前一天的指标即可得到结果。唯一需要注意的是，要从上一个已知的间隙或孤岛的结束点开始分析。这确保了报告期开始时正在进行的事件被完整地报告为一个单一事件，而不是被一次数据加载的结束和下一次加载的开始分割成两个事件。


    5.  自动化分析，使这些任务能够无人值守地执行，并将结果存储在表中以供将来检查。如果间隙/孤岛分析的结果被放入一个永久性存储库，那么未来的报告只需读取该表，而不必每次需要时都执行复杂的查询。


    ## 总结


    像`LEAD`、`LAG`和`ROW_NUMBER`这样的窗口函数可以组合使用，从而能够对数据集执行各种各样的分析。在本章中，我们演示了它们在查找缺失数据、聚合相关事件以及计算不同类型连胜（或干旱期）中的应用。


    我们还可以使用类似的方法收集许多其他指标。间隙和孤岛分析可用于对数据排序，并确定行在整个集合中与附近行的关系。它们可以让我们定位在大型/复杂表格集合中原本可能不明显的异常。


    计算连胜（或干旱期）使我们能够将随时间推移的重要事件链条串联起来，但我们也可以考虑干旱期。重要事件之间的时间间隔是多长？经过长时间的干旱期后，事件发生的概率是否会增加？任何间隙分析也可以用来生成孤岛，反之，孤岛分析也可以用来生成间隙数据。在这方面，我们总可以将重要事件的存在和不存在都视为值得考虑的指标。


    一旦我们构建了能够执行这些分析的查询，我们就可以以最小的改动重用我们的代码，来处理其他数据集、更改筛选器，或以完全不同的方式处理数据。通过试验筛选器和我们所使用的窗口函数的内容，这些分析的潜在应用是无限的！


    # 10. 时间范围计算


    一个非常常见的报告需求是按不同的时间范围生成总计以进行比较。典型的报告将包含按月、季度和年的总计，有时还会与去年同期进行比较，或包含累计至今的月总计（MTD）和累计至今的年总计（YTD）。像
    SQL Server Analysis Services 和 Power BI 这样的产品提供了导航日期层次结构的函数。使用 SQL Server 2012
    或更高版本中的窗口函数，您可以利用本书前面提供的技术实现相同的计算。


    在本章中，您将把之前学到的所有技术付诸实践，创建用于导航时间线的计算，以生成以下计算：


    *   占父级百分比（Percent of Parent）

    *   年初至今（Year-to-date, YTD）

    *   季度初至今（Quarter-to-date, QTD）

    *   月初至今（Month-to-date, MTD）

    *   去年同期（Same Period Prior Year, SP PY）

    *   去年年初至今（Prior year-to-date, PY YTD）

    *   平均值、移动平均（MA）

    *   增长、增长百分比


    您已经在第 3 章学习了使用窗口聚合在不进行分组的情况下向查询添加汇总信息，在第 4 章学习了累积聚合，在第 5 章学习了窗口帧定义。您将把这些知识与一些常识结合起来，创建复杂的计算，如果没有窗口函数，这些计算将需要更多的步骤。


    请记住，在累积聚合的情况下，`PARTITION BY` 和 `ORDER BY` 子句决定了哪些行最终进入窗口。`FRAME DEFINITION`（帧定义）用于定义分区内将被聚合的行的子集。本节中的示例将使用帧定义来完成繁重的工作。回顾一下，其语法如下：


    ```

    () OVER([PARTITION BY [,,...]]

    ORDER BY [,,...] [Frame definition])

    ```


    在本章中，您需要使用 AdventureWorksDW 示例数据库。'
- fmt: '## Percent of Parent


    将特定时期内产品的表现与该时期所有产品的表现进行比较，或将类别中的每个产品与该类别进行比较，是一种非常常见的分析技术。在接下来的这组示例中，你将基于清单[10-1](#335106_2_En_10_Chapter.xhtml#PC2)中的简单基础查询进行扩展，通过添加计算列来生成最终的“父级百分比”结果，如图[10-1](#335106_2_En_10_Chapter.xhtml#Fig1)所示。你将从一个按月汇总销售的直接查询开始，并随着内容的介绍添加新的计算列，使得每个新列都能独立引入，而无需为每个迭代重复整个代码块示例。


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig1_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig1_HTML.jpg)


    **图 10-1** 我们简单基础查询的结果


    ```sql

    --10.1 基础查询。只是一个普通的 GROUP BY。

    SELECT f.ProductKey,

    YEAR(f.orderdate) AS OrderYear,

    MONTH(f.orderdate) AS OrderMonth,

    SUM(f.SalesAmount) AS [Sales]

    FROM dbo.FactInternetSales AS f

    WHERE OrderDate BETWEEN ''2011-01-01'' AND ''2012-12-31''

    GROUP BY f.ProductKey,

    YEAR(f.orderdate),

    MONTH(f.orderdate)

    ORDER BY 2, 3, f.ProductKey;

    ```


    **清单 10-1** 基础查询


    “父级百分比”或“父级比率”计算通常可以定义为“[子级总计] / [父级总计]”。为了计算定义的比率，你需要计算分子和分母输入，并在第三个度量中将它们组合起来。要计算每个产品对所有销售的总体贡献，你需要确定`[All
    Sales]`和`[Product All Sales]`的总计。一旦定义了这些，你就可以将`[Ratio to All Sales]`计算为`[Product
    All Sales] / [All Sales]`。你可以将得到的比率乘以100以百分比形式显示，或者依赖报表或前端工具的格式化功能将其显示为百分比。


    对于这些度量中的每一个，窗口聚合`SUM()`函数都封装了一个常规的`SUM()`函数，一开始可能看起来有点奇怪，但这是将`[SalesAmount]`聚合到高于查询粒度级别所必需的。结果，如图[10-2](#335106_2_En_10_Chapter.xhtml#Fig2)所示，是能够在单个查询中将同一源列聚合到不同级别，而无需借助临时表或公用表表达式。


    清单[10-2](#335106_2_En_10_Chapter.xhtml#PC3)中的代码包含了你需要附加到基础查询的额外列逻辑，位置在`select`列表的最后一列之后。务必在`[Sales]`后面加上逗号。


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig2_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig2_HTML.jpg)


    **图 10-2** 计算产品销售额占所有销售额百分比的结果


    ```sql

    SUM(SUM(f.SalesAmount)) OVER () AS [All Sales],

    SUM(SUM(f.SalesAmount)) OVER (PARTITION BY f.productkey)

    AS [Product All Sales],

    SUM(SUM(f.SalesAmount)) OVER (PARTITION BY f.productkey)

    / SUM(SUM(f.SalesAmount)) OVER()

    AS [Ratio to All Sales]

    ```


    **清单 10-2** 用于`[All Sales]`的额外列


    `[All Sales]`列的框架没有`PARTITION`子句，这意味着它将聚合查询可用的所有数据，提供所有时间的销售总计。此值对于结果表中的每一行都是相同的。`[Product
    All Sales]`列的`PARTITION`子句将分区限制为每个产品键的实例，提供按产品所有时间的销售总计。此值对于共享相同`[ProductKey]`值的所有行都是相同的。


    `[Ratio to All Sales]`列结合了前两个语句来计算它们之间的比率。关键是要认识到，你可以在单个列中组合多个聚合结果。了解这一点将使你能够创建各种复杂的计算，而这些计算原本可能只能留在报表工具或应用程序代码中。用简单的术语写出计算逻辑是记录你想要实现目标的好方法，并为组合现有计算以形成新计算提供了模板。以下伪代码描述了将在
    T-SQL 中实现的逻辑：


    ```sql

    [Sales] = 按产品、年和月汇总的 SalesAmount

    [All Sales] = 所有产品和所有日期的 SalesAmount 总和

    [Annual Sales] = 按年汇总的所有产品的 SalesAmount 总和

    [Month All Sales] = 按年和月汇总的所有产品的 SalesAmount 总和

    [Product All Sales] = 按产品汇总的所有日期的 SalesAmount 总和

    [Product Annual Sales] = 按产品和年汇总的 SalesAmount 总和

    [Ratio to All Sales] = [Product All Sales] / [All Sales]

    [Ratio to Annual Sales] = [Product Annual Sales] / [Annual Sales]

    [Ratio to Month Sales] = [Sales] / [Month All Sales]

    ```


    这种方法最有效的方式是，你首先为给定计算的每个输入列理清逻辑，然后创建利用输入列计算的复杂计算。年度和月级别的列计算遵循类似的模式，因此一旦你为一个级别理清了计算，其余的也会很快跟进。本章后面你将学习如何使用公用表表达式来简化复杂计算的创建。


    无需担心在“全部”级别处理被零除错误，因为唯一会导致错误的情况是源表中完全没有行，但对于低于它的每个级别，你必须考虑分母值可能为零的情况。清单[10-3](#335106_2_En_10_Chapter.xhtml#PC5)中“年度”和“月”级别的计算演示了如何做到这一点。通过将窗口`SUM()`语句包装在`NULLIF()`函数中，任何零聚合值都会转换为`NULL`值，从而避免被零除错误。你也可以使用`CASE`语句代替`NULLIF()`，但考虑到所涉及的函数嵌套，`NULLIF()`更简洁。


    ```sql

    --10.3 年度和月度父级百分比

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate)) AS [Annual Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate))

    AS [Product Annual Sales],

    --组内百分比:

    --[Ratio to Annual Sales] = [Product Annual Sales] / [Annual Sales]

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate))

    / NULLIF(SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate))

    , 0) AS [Ratio to Annual Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate), MONTH(f.OrderDate))

    AS [Month All Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate),

    MONTH(f.OrderDate))

    / NULLIF(SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate), MONTH(f.OrderDate))

    , 0) AS [Ratio to Month Sales]

    ```


    **清单 10-3** 用于计算年度和月度父级百分比列的额外列'
  raw: '## Percent of Parent


    Comparing the performance of a product in a specific period to the performance
    for all products in that same period, or each product in a category to the category,
    is a very common analytic technique. In this next set of examples, you will build
    upon the simple base query in Listing [10-1](#335106_2_En_10_Chapter.xhtml#PC2),
    by adding columns that calculate the pieces needed to produce the final “Percent
    of Parent” results as shown in Figure [10-1](#335106_2_En_10_Chapter.xhtml#Fig1).
    You will start out with a straightforward query that aggregates sales by month
    and will add new calculation columns as they are covered, enabling each new column
    to be introduced on its own without needing to replicate the entire block of example
    code for each iteration.


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig1_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Results of our simple base query


    ```

    --10.1 Base query. Just your average GROUP BY.

    SELECT f.ProductKey,

    YEAR(f.orderdate) AS OrderYear,

    MONTH(f.orderdate) AS OrderMonth,

    SUM(f.SalesAmount) AS [Sales]

    FROM dbo.FactInternetSales AS f

    WHERE OrderDate BETWEEN ''2011-01-01'' AND ''2012-12-31''

    GROUP BY f.ProductKey,

    YEAR(f.orderdate),

    MONTH(f.orderdate)

    ORDER BY 2, 3, f.ProductKey;

    Listing 10-1

    Base Query

    ```


    “Percent of Parent” or “Ratio to Parent” calculations can be generally defined
    as “[Child Total] / [Parent Total]”. In order to calculate the ratio as defined,
    you need to calculate the numerator and denominator inputs and combine them in
    a third measure. To calculate the overall contribution each product has made to
    all sales, you need to determine the total for `[All Sales]` and for `[Product
    All Sales]`. Once you have those defined, you can calculate `[Ratio to All Sales]`
    as `[Product All Sales] / [All Sales]`. You can multiply the resulting ratio by
    100 to display it as a percentage or rely on the formatting functions in the reporting
    or front-end tool to display them as percentages.


    For each of these measures, the window aggregate `SUM()` function encapsulates
    a regular `SUM()` function , which might look a little bit strange to begin with,
    but is required to aggregate `[SalesAmount]` to levels higher than the level of
    granularity of the query. The result, as shown in Figure [10-2](#335106_2_En_10_Chapter.xhtml#Fig2),
    is the ability to aggregate the same source column to different levels in a single
    query without having to resort to temporary tables or common table expressions.


    The code in Listing [10-2](#335106_2_En_10_Chapter.xhtml#PC3) contains the additional
    column logic you need to append to the base query, just after the last column
    in the `select` list. Be sure to include a comma after `[Sales]`.


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig2_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Results of calculating product sales as a percentage of all sales


    ```

    SUM(SUM(f.SalesAmount)) OVER () AS [All Sales],

    SUM(SUM(f.SalesAmount)) OVER (PARTITION BY f.productkey)

    AS [Product All Sales],

    SUM(SUM(f.SalesAmount)) OVER (PARTITION BY f.productkey)

    / SUM(SUM(f.SalesAmount)) OVER()

    AS [Ratio to All Sales]

    Listing 10-2

    Additional Columns for [All Sales]

    ```


    The frame for the `[All Sales]` column does not have a `PARTITION` clause, which
    means it will aggregate across all the data available to the query, providing
    a total of sales for all time. This value will be the same for each row in the
    resulting table. The `PARTITION` clause for the `[Product All Sales]` column restricts
    the partition to each instance of a product key, providing a total of sales by
    product for all time. This value will be the same for all rows sharing the same
    `[ProductKey]` value.


    The `[Ratio to All Sales]` column combines the two prior statements to calculate
    the ratio between them. The key thing to realize is that you can combine the results
    of multiple aggregation results within a single column. Knowing this will allow
    you to create all manner of complex calculations that otherwise would have been
    relegated to a reporting tool or application code. Writing the calculations out
    in simple terms is a good way to document what you want to accomplish and provides
    a template for combining existing calculations together to form new ones. The
    following pseudo-code maps out the logic that will be implemented in T-SQL:


    ```

    [Sales] = SUM of SalesAmount by Product, Year and Month

    [All Sales] = SUM of SalesAmount for all Products and all dates

    [Annual Sales] = SUM of SalesAmount for all Products, by Year

    [Month All Sales] = SUM of SalesAmount for all Product by Year and Month

    [Product All Sales] = SUM of SalesAmount by Product, for all dates

    [Product Annual Sales] = SUM of SalesAmount by Product, by Year

    [Ratio to All Sales] = [Product All Sales] / [All Sales]

    [Ratio to Annual Sales] = [Product Annual Sales] / [Annual Sales]

    [Ratio to Month Sales] = [Sales] / [Month All Sales]

    ```


    This approach works best if you work out the logic for each input column for a
    given calculation and then create the complex calculation that leverages the input
    column calculations. The column calculations for the annual and monthly levels
    follow a similar pattern, so once you have calculations for one level worked out,
    the rest will follow quickly. Later in the chapter you will learn how to use common
    table expressions to make the creation of complex calculations less daunting.


    There is no need to worry about handling a divide-by-zero error at the “all” level,
    as the only case that will result in an error is if there are no rows at all in
    the source table, but for every level below it, you must account for situations
    where the denominator value can be zero. The calculations for the “annual” and
    “month” levels in Listing [10-3](#335106_2_En_10_Chapter.xhtml#PC5) demonstrate
    how this can be done. By wrapping the window `SUM()` statement in a `NULLIF()`
    function , any zero aggregate values is turned into a `NULL` value, avoiding the
    divide by zero error. You could also use a `CASE` statement instead of `NULLIF()`,
    but given the nesting of functions involved, `NULLIF()` is more concise.


    ```

    --10.3 Annual and monthly Percentage of Parent

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate)) AS [Annual Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate))

    AS [Product Annual Sales],

    --Pct of group:

    --[Ratio to Annual Sales] = [Product Annual Sales] / [Annual Sales]

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate))

    / NULLIF(SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate))

    , 0) AS [Ratio to Annual Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate), MONTH(f.OrderDate))

    AS [Month All Sales],

    SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY f.productkey, YEAR(f.OrderDate),

    MONTH(f.OrderDate))

    / NULLIF(SUM(SUM(f.SalesAmount))

    OVER (PARTITION BY YEAR(f.OrderDate), MONTH(f.OrderDate))

    , 0) AS [Ratio to Month Sales]

    Listing 10-3

    Additional Columns to Calculate the Annual and Monthly Percentage of Parent Columns

    ```'
