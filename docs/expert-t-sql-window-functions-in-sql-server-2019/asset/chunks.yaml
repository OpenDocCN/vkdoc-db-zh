    将特定时期内产品的表现与该时期所有产品的表现进行比较，或将类别中的每个产品与该类别进行比较，是一种非常常见的分析技术。在接下来的这组示例中，你将基于清单 10-1
    中的简单基础查询进行扩展，通过添加计算列来生成最终的“父级百分比”结果，如图 10-1 所示。你将从一个按月汇总销售的直接查询开始，并随着内容的介绍添加新的计算列，使得每个新列都能独立引入，而无需为每个迭代重复整个代码块示例。


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig1_HTML.jpg](img/335106_2_En_10_Fig1_HTML.jpg)


    **图 10-1** 我们简单基础查询的结果


    ```sql

    --10.1 基础查询。只是一个普通的 GROUP BY。

    SELECT f.ProductKey,

    YEAR(f.orderdate) AS OrderYear,

    MONTH(f.orderdate) AS OrderMonth,

    SUM(f.SalesAmount) AS [Sales]

    FROM dbo.FactInternetSales AS f

    WHERE OrderDate BETWEEN ''2011-01-01'' AND ''2012-12-31''

    GROUP BY f.ProductKey,

    YEAR(f.orderdate),

    MONTH(f.orderdate)

    ORDER BY 2, 3, f.ProductKey;

    ```


    **清单 10-1** 基础查询


    “父级百分比”或“父级比率”计算通常可以定义为“[子级总计] / [父级总计]”。为了计算定义的比率，你需要计算分子和分母输入，并在第三个度量中将它们组合起来。要计算每个产品对所有销售的总体贡献，你需要确定`[All
