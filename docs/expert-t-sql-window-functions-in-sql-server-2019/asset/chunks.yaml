- fmt: '## 9.4.2 使用 CTE 查询进行邻近性分析


    ```sql

    WITH CTE_ERROR_HISTORY AS (

    SELECT

    LAG(error_log.error_time_utc) OVER (ORDER BY error_log.error_time_utc, error_log.error_log_id)
    AS previous_event_time,

    LEAD(error_log.error_time_utc) OVER (ORDER BY error_log.error_time_utc, error_log.error_log_id)
    AS next_event_time,

    ROW_NUMBER() OVER (ORDER BY error_log.error_time_utc, error_log.error_log_id)
    AS island_location,

    error_log.error_time_utc,

    error_log.error_log_id

    FROM dbo.error_log),

    CTE_ISLAND_START AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY CTE_ERROR_HISTORY.error_time_utc, CTE_ERROR_HISTORY.error_log_id)
    AS island_number,

    CTE_ERROR_HISTORY.error_time_utc AS island_start_time,

    CTE_ERROR_HISTORY.next_event_time,

    CTE_ERROR_HISTORY.island_location AS island_start_location

    FROM CTE_ERROR_HISTORY

    WHERE DATEDIFF(MINUTE, CTE_ERROR_HISTORY.previous_event_time, CTE_ERROR_HISTORY.error_time_utc)
    > 5 OR CTE_ERROR_HISTORY.previous_event_time IS NULL),

    CTE_ISLAND_END AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY CTE_ERROR_HISTORY.error_time_utc, CTE_ERROR_HISTORY.error_log_id)
    AS island_number,

    CTE_ERROR_HISTORY.error_time_utc AS island_end_time,

    CTE_ERROR_HISTORY.next_event_time,

    CTE_ERROR_HISTORY.island_location AS island_end_location

    FROM CTE_ERROR_HISTORY

    WHERE DATEDIFF(MINUTE, CTE_ERROR_HISTORY.error_time_utc, CTE_ERROR_HISTORY.next_event_time)
    > 5 OR CTE_ERROR_HISTORY.next_event_time IS NULL)

    SELECT

    CTE_ISLAND_START.island_start_time,

    CTE_ISLAND_END.island_end_time,

    CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location +
    1 AS count_of_events

    FROM CTE_ISLAND_START

    INNER JOIN CTE_ISLAND_END

    ON CTE_ISLAND_START.island_number = CTE_ISLAND_END.island_number;

    ```


    *Listing 9-6 Query to Group Errors into Related Clusters of Data with a Proximity
    of 5 Minutes*


    这个查询看起来很长，但遵循了一种有条理的方法，我们将在后续工作中采用这种方法：


    1.  创建一个规则来确定邻近性以及事件何时相关。

    2.  创建一个数据集，其中包含当前事件、前一个事件和下一个事件。

    3.  使用邻近性规则定义所有数据簇的起点。

    4.  使用邻近性规则定义所有数据簇的终点。

    5.  将起点和终点连接在一起以生成结果集。


    `LEAD` 和 `LAG` 用于快速检索数据集中的前一个和后一个事件，而 `ROW_NUMBER` 用于跟踪岛屿计数，以便在查询结束时用于连接。结果可以在图
    [9-6](#335106_2_En_9_Chapter.xhtml#Fig6) 中看到。


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig6_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig6_HTML.jpg)


    *Figure 9-6 Error log data, grouped by events that occur within 5 minutes of each
    other*


    我们可以看到，少量错误被分组到更大的数据簇中，而其余的则因邻近性而不相关。任何查看这些数据的人都能判断何时发生了重大中断，并可以根据这些中断的大小、长度或深度来追踪指标。


    虽然我们的结果只包含时间和计数，但我们可以添加关于哪些事件在每个范围内发生得最多、最少，或者范围内第一个事件的详细信息（因为它通常是中断的原因）。


    对数据进行唯一排序非常重要。`LEAD`、`LAG` 和 `ROW_NUMBER` 都必须有一个唯一的 `ORDER BY` 子句。在我们的示例中，我们在时间之后包含了
    *error_log_id*，这是一个标识列。这确保了每次执行此查询时，数据都以相同的方式唯一排序。如果基础数据具有重复值，并且我们没有应用唯一的排序顺序，那么在这些边界上可能存在数据不一致或不准确的风险。


    邻近性分析的关键是定义一个可用于将数据排序为编号组的规则。有了这个规则，我们就可以确定数据簇的边界并将它们连接起来，以产生一组分组的结果。与使用 `GROUP
    BY` 不同，我们直到运行时才知道结果集的大小。返回的行数将由数据驱动，可能是一行（包含许多相关事件），也可能是多行（包含一组不相关的事件）。


    如果我们调整规则，就可以改变结果的形状。如果事件发生在彼此 15 分钟内被视为相关，而不是 5 分钟，那么我们将得到一个事件计数更高的较小数据集。如果我们将规则调整得更严格，将
    1 分钟内发生的事件视为相关，那么我们的结果集将包含更多的行和更小的计数。试验规则是这种分析风格的关键组成部分，将帮助我们确定哪些指标对于给定的数据集最有意义。如有疑问，我们可以自动化一个过程，该过程遍历许多不同的规则，以确定哪一个能提供最大的价值。


    ## 追踪连续记录


    一个数据簇可以表示多种类型的数据分组。在体育中，连续记录意义重大，并构成了许多用于持续数据驱动决策的统计数据的基础。赢和输是最常被报告的模式，但经理们也会追踪细节。在棒球中，连续安打、连续出局、失误以及许多其他指标都可以作为事件序列进行追踪。这些序列表现为岛屿或间隙，我们可以像处理错误日志数据那样以相同的方式进行报告。


    在接下来的例子中，我们将使用一组棒球数据，这些数据定义在一个名为 `dbo.GameLog` 的单一宽表中。该表每场比赛包含一行，并包含详尽的细节，如图 [9-7](#335106_2_En_9_Chapter.xhtml#Fig7)
    中的样本所示。


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig7_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig7_HTML.jpg)


    *Figure 9-7 Sample of baseball game log data*


    其中包括天气、比赛得分以及裁判、教练和经理的姓名等详细信息。对于较旧的比赛，许多数据缺失或不完整，因此我们编写的任何查询都必须容忍这一事实。该数据包括从 1871
    年到 2018 年的所有常规赛、全明星赛和季后赛，总计记录了 219,832 场棒球比赛。


    所有缩写、名称、代码和模糊维度都有查找表，可用于验证其存在或含义。为了我们的工作，将跳过这些附加维度，因为它们不会为我们的连续记录分析提供任何额外价值。'
