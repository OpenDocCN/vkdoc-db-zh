    ![../images/335106_2_En_BookFrontmatter_Figb_HTML.jpg](img/335106_2_En_BookFrontmatter_Figb_HTML.jpg)


    # 前言


    `SQL` 开发于 20 世纪 70 年代，并自 1986 年起通过 `ANSI` 批准的委员会成为正式标准。时至 2019 年，`SQL` 已成为应用最广泛的声明性语言。在此过程中，窗口函数已成为该标准的重要组成部分。`ANSI`
    并不制定标准，但在记录和维护标准方面扮演着重要角色。各个软件供应商自愿决定遵守标准，而像本书作者这样的工作者则致力于以实用的方式阐释 `SQL` 的使用。


    在我自身的数据科学和高级分析职业生涯中，窗口函数在过去几年里一直是多个关键项目的重要组成部分。几年前，我曾基于本书的早期版本为用户小组制作过一个 YouTube
    视频。自那时起，作为微软的职业架构师，我一直在为数据科学应用提供建议。在一个项目中，大约 20 个特征的输入并未产生足够的结果：通过使用窗口函数，我领导的一个团队（没错，直接编码）迅速将特征数量增加到了
    1000 多个。不仅是数量的增长，准确率也得到了提高，从业务角度而言，该组织每年因此为其问题节省了数百万美元。在上个月，我遇到了一个无关的新项目，情况类似：一个时间序列类型的数据集，有机会从不到
    20 个特征增长到更大的数量。


    人们可能会想，自动化机器学习技术是否会自行完成此类组合，而我对此持怀疑态度。仅从窗口函数创建一个稳健的特征集不仅需要时间序列方面的考量，还需要基于对数据领域了解的聚类知识。即使自动化技术在此主题上取得巨大进展，我预计任何数据科学家在更典型的数据科学调查中（仅有少数特征和少量观测值时）仍需要掌握这些函数的基本知识。


    `SQL` 是本地和云数据库技术的核心——而在数据科学领域，许多人使用 `Apache Spark`（`SQL Server 2019` 以及许多其他数据技术）。其在高级分析中的延伸应用，是窗口函数成为
    `SQL` 语言专家级主题的又一个原因。主流应用范围从任何业务分析 `SQL` 查询，一直延伸到支持高级分析和机器学习算法。


    多年来，能分别认识 Kathi Kellenberger 和 Clayton Groom 这两位备受尊敬的同行和专业人士，并见证他们如何通过多次演讲（他们通常自愿奉献自己的时间）以及本书的创建和现在的修订，各自成为技术用户社区的重要领导者，是我莫大的荣幸。在这次修订中，Ed
    Pollack 添加了关于棒球统计的材料，说明了并非所有时间序列都与金钱相关。仅拥有标准是不够的，还需要有专业的教练来解释这些函数如何描述业务分析的方法。本书提供了丰富的示例，共同为读者清晰地指引了一条通往
    `SQL` 语言中数学最复杂但实际最有用的方面之一的路径。


    > Mark Tabladillo 博士

    >

    > 云解决方案架构师，微软


    # 引言


    几年前，我会为每个新版本的 `SQL Server` 制作用户组演示，介绍新的 `T-SQL` 功能。2012 年有太多内容可讲，我决定专门就那年引入的窗口函数做一个演示。最终，我积累了如此多的材料，以至于它变成了两次会议。多年来，我可能在美国和英国各地的活动中至少演示过
    50 次这些信息。尽管如此，大多数人仍然没有使用窗口函数，因为他们没有听说过，或者没有意识到其好处。


    ## 本书内容


    本书涵盖了每种类型的窗口函数，从 `SQL Server 2005` 引入的排名函数开始，一直到 2012 年引入的统计函数。每章都解释了如何使用这些函数及其选项，并提供了几个如何使用的简单示例。遗憾的是，微软上一次添加任何新的窗口函数是在
    2012 年，不过最近有一些性能改进。其中一章专门讨论窗口函数的性能。


    最后，本书的最后两章涵盖了一些实际案例。在 `第 9 章`，你将学习如何分析一个大型数据集——超过 100 年的棒球统计数据。`第 10 章` 和 `第 11
    章` 展示了如何在数据仓库计算中使用窗口函数，而不是构建多维数据集。


    ## 目标读者


    本书适合已经具备良好 `T-SQL` 技能的人员。他们知道如何连接表、使用子查询和 `CTEs`，以及编写聚合查询。尽管具备这些技能，他们偶尔会遇到一些不易用基于集合的方式解决的问题。如果没有窗口函数，其中一些问题只能使用游标或昂贵的三角连接来解决。通过运用本书中传授的概念，你的
    `T-SQL` 技能将提升到一个新的水平。一旦你开始使用窗口函数，你会发现更多学习它们的理由。'
- fmt: '## Contacting the Author


    Great care was taken to ensure that the information presented is correct, but
    sometimes readers come up with a better way to write a query or find an error.
    You can contact me at `kathi.kellenberger@outlook.com` with any comments or questions.


    ## Acknowledgments


    The first edition of this book would not have been written except for the suggestion
    of one of my friends in the data platform community, Larry Toothman. Sadly, Larry
    passed away shortly after the book was published and before I could get a copy
    to him. Larry was just getting started with presenting at events and being more
    involved in the community during the last couple of years of his life. Who knows
    what he might have accomplished if things had turned out differently. Thanks to
    Larry’s inspiration, people around the world will learn about windowing functions.


    They say it takes a village to raise a child, and the same might be true for a
    book. I would like to thank Jonathan Gennick and Jill Balzano for their help and
    guidance. There are probably many people at Apress who had a hand in this project
    that I’ll never meet, and I would like to thank them as well.


    Clayton Groom and Ed Pollack each wrote about their real-world experience using
    windowing functions. In each case, the idea for their chapter came from my running
    into each of them at user group meetings and just talking about my project. Their
    contributions definitely make this a better and more enjoyable book for you.


    Thanks to Rodney Landrum for doing a great job on the technical review and to
    Mark Tabladillo for the wonderful foreword.


    Thank you to my family, especially my husband, Dennis, who takes care of just
    about everything around the house. He makes my life so much easier when I take
    on big projects like this.


    Finally, thank you dear reader for learning about windowing functions from this
    book. I hope that you enjoy it and can apply the things you learn right away.
    I would love to hear from you at events, so don’t be shy!


    ### About the Authors and About the Technical Reviewer


    ### About the Authors


    ### About the Technical Reviewer


    Footnotes [1](#335106_2_En_BookFrontmatter_OnlinePDF.xhtml#Fn1_source)


    # 1. Looking Through the Window


    SQL Server is a powerful database platform with a versatile query language called
    T-SQL. The most exciting T-SQL enhancement over the years, in my opinion, is the
    window functions. Window functions enable you to solve query problems in new,
    easier ways and with better performance most of the time over traditional techniques.
    They are a great tool for analytics. You may hear these called “windowing” or
    “windowed” functions as well. The three terms are synonymous when talking about
    this feature.


    After the release of SQL Server 2000, SQL Server enthusiasts waited 5 long years
    for the next version of SQL Server to arrive. Microsoft delivered an entirely
    new product with SQL Server 2005\. This version brought SQL Server Management
    Studio, SQL Server Integration Services, snapshot isolation, and database mirroring.
    Microsoft also enhanced T-SQL with many great features, such as common table expressions
    (CTEs). The most exciting T-SQL enhancement of all with 2005 was the introduction
    of window functions.


    That was just the beginning. Window functions are part of the standard ANSI SQL
    specification beginning with ANSI SQL2003\. More functionality according to the
    standard was released with version 2012 of SQL Server. In 2019, Microsoft gave
    some of the window functions a performance boost with batch mode processing, a
    feature once reserved for column store indexes. You’ll see how this performance
    feature works in Chapter [8](#335106_2_En_8_Chapter.xhtml). Even now, the functionality
    falls short of the entire specification, so there is more to look forward to in
    the future.


    This chapter provides a first look at two T-SQL window functions, `LAG` and `ROW_NUMBER`.
    You will learn just what the window is and how to define it with the `OVER` clause.
    You will also learn how to divide the windows into smaller sections called partitions.


    ## Discovering Window Functions


    Window functions do not let you do anything that was impossible to do with earlier
    functionality, and they have nothing to do with the Microsoft Windows API. Using
    previously available methods, such as self-joins, correlated subqueries, and cursors,
    you can solve just about any T-SQL problem if you work at it long and hard enough.
    The main benefit of window functions is the ease with which you can solve these
    tricky queries. Most of the time, you also realize a big boost in performance
    over the older methods. You can often use a window function to change a solution
    involving many statements or subqueries to one easier statement.


    I like to divide window functions into several categories that do not exactly
    match up with the way Microsoft defines them: ranking functions, window aggregates,
    accumulating window aggregates, offset functions, and statistical functions. (Microsoft
    refers to the four offset and four statistical functions as “analytic” functions.)
    You can use these functions to assign a rank to each row, calculate summary values
    without grouping, calculate running totals, include columns from different rows
    in your results, and calculate percentages over a group. You’ll learn about these
    functions as you read this book.


    My favorite T-SQL function which also happens to be a window function is called
    `LAG` . It is one of the offset functions, which you will learn about in Chapter
    [6](#335106_2_En_6_Chapter.xhtml). `LAG` allows you to include columns from different
    rows in your results. Using `LAG` is easier and performs better than older methods
    that do the same thing.


