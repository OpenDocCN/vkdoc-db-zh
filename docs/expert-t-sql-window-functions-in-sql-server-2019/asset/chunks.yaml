    In this section of the chapter, you will be adding a third operation by turning
    the aggregate from the last example into a CTE and aggregating results on top
    of it. In some cases, the same results can be achieved with one or two operations,
    but for cases where the nesting of window function is required, the only option
    is to add another level. One example of this is calculating `[Sales PY YTD]` at
    the month level. To create the `[Sales YTD]` measure, you had to use all the clauses
    of the window function. There is not a method left to allow you to shift the partition
    back to the prior year. By first calculating `[Sales YTD]` in the second operation,
    you can then use a window function in the third operation to calculate `[Sales
    PY YTD]`.


    Again, a secondary advantage is that the column calculations on any higher-order
    operations can use the meaningful column names from the lower-order operations
    to make the calculations easier to understand and the code more compact. Managing
    the trade-offs of performance and code readability must be considered as well.
    The following pseudo-code maps out the logic that will be implemented in T-SQL
    for the remaining calculations:


    ```

    [Current Sales] = SUM of SalesAmount for a time period (day, month, year)

    [Prior Sales] = SUM of SalesAmount for the prior time period

    [Growth] = [Current Sales] - [Prior Sales]

    [Growth %] = [Growth] / [Prior Sales]

    [3 MMT] = Sum of SalesAmount for the prior three months

    [12 MMT] = Sum of SalesAmount for the prior 12 months

    [3 MMA] = Average of Monthly Sales for the prior three months

    [12 MMA] = Average of Monthly Sales for the prior 12 months

    [3/12 ROC] = [3 MMT]/([3 MMT].LAG( 11 months))

    [12/12 ROC] = [12 MMT] /([12 MMT].LAG( 11 months))

    [3/12 RoC2]= ([3 MMT]/([3 MMT].LAG( 11 months))* 100) -100

    [12/12 RoC2] = ([12 MMT] /([12 MMT].LAG( 11 months))* 100) -100

    ```


    ### Ensuring Sets Are Complete


    The last item that needs to be addressed is making sure the sets for any moving
    total or moving average calculation contain the correct number of input rows.
    For example, a three-month moving average `[3 MMA]` must contain data from three
    complete months, or it is not correct. By addressing gaps in transaction date
    ranges, part of the problem was solved but not the complete problem. At the beginning
    of a set, the first row has no prior rows, so it is incorrect to calculate a moving
    average for that row. The second row of the set only has one preceding row, making
    it incorrect to calculate the average for it as well. Only when the third row
    is reached are the conditions correct for calculating the three-month moving average.
    Table [11-1](#335106_2_En_11_Chapter.xhtml#Tab1) shows how a three-month average
    should be calculated, given the prior year had no data for the product:


    Table 11-1


    Eliminating incomplete results for averages over ranges of periods


    | Month | Product | Sales | Sales YTD | Sales 3 MMA |

    | --- | --- | --- | --- | --- |

    | January | Bacon | 1000 | 1000 |   |

    | February | Bacon | 500 | 1500 |   |

    | March | Bacon | 1500 | 3000 | 1000 |

    | April | Bacon | 600 | 3600 | 867 |

    | May | Bacon | 0 | 3600 | 700 |

    | June | Bacon | 400 | 4000 | 333 |


    To make this work, you simply COUNT the number of rows in the frame for the three-month
    period instead of averaging the results and use the count to determine when to
    perform the calculation. If there are three rows, perform the calculation; otherwise
    return a null value. The following example uses a CASE statement to determine
    which rows have two preceding rows:


    ```

    CASE WHEN COUNT(*)

    OVER (ORDER BY p.CalendarYear, p.CalendarMonth

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) = 3

    THEN AVG(SUM(f.SalesAmount))

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth

    ROWS BETWEEN 2 PRECEDING AND current row)

    ELSE null

    END AS [Sales 3 MMA]

    ```


    The query in Listing [11-1](#335106_2_En_11_Chapter.xhtml#PC3) includes moving
    total and moving average calculations for 3-month and 12-month rolling periods.
    These are implemented in the second CTE operation, so that the results are available
    for further manipulation in the third operations select statement.'
