- fmt: '## Summary


    窗口聚合使得向非聚合查询添加摘要计算，或向聚合查询添加不同聚合级别的摘要变得非常容易。当你需要将详细数据与整体总计进行比较或生成小计时，这非常方便。如果你灵感迸发，甚至可以创建自己的自定义窗口聚合函数。


    现在你已经了解了如何使用 SQL Server 2005 发布的所有窗口函数特性。[第 4 章](#335106_2_En_4_Chapter.xhtml)
    将展示 2012 年引入的首个特性：移动和累积窗口聚合。


    ## 4. 计算累积和移动聚合


    假设你被分配了一项任务，编写一个带有按客户分类的销售累积总计的 T-SQL 查询。也许你首先想到的是使用游标来完成，或者你可能熟悉一些查询技术，如自连接。如果你运行的是
    SQL Server 2012 或更高版本，那么你很幸运！窗口函数使得计算累积总计、移动平均值等变得非常容易。


    在本章中，你将学习如何在窗口聚合表达式中添加 `ORDER BY` 子句会改变一切！你将学习如何为累积和移动聚合添加计算，这在业务报告和仪表盘中经常需要。


    ### 向窗口聚合添加 ORDER BY


    在[第 3 章](#335106_2_En_3_Chapter.xhtml)中，你学习了如何使用窗口聚合在不分组的情况下向查询添加摘要。2005 版的窗口聚合功能不支持
    `OVER` 子句中的 `ORDER BY` 组件。从 SQL Server 2012 开始，你可以向窗口聚合添加 `ORDER BY` 来计算累积总计。为了区分此功能与
    2005 功能，本书将 2012 功能称为*累积窗口聚合*。添加 `ORDER BY` 时，窗口会发生变化。每一行都有不同的行集（即窗口）用于操作。窗口基于
    `ORDER BY` 表达式。默认情况下，窗口由结果集中的第一行开始，并包括直到当前行的所有后续行。图 [4-1](#335106_2_En_4_Chapter.xhtml#Fig1)
    展示了按 `CustomerID` 分区时窗口的工作原理。


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig1_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig1_HTML.jpg)


    图 4-1

    每一行都有不同的窗口


    在本章之前的示例中，组成窗口的实际行由 `PARTITION BY` 表达式确定。对于累积聚合，窗口中的行由 `PARTITION BY`、`ORDER BY`
    和一个*框架*共同定义。框架可用于更精细地定义窗口。本节中的示例使用了默认框架。你将在本章的“计算移动总计和平均值”部分以及[第 5 章](#335106_2_En_5_Chapter.xhtml)中了解更多关于框架的信息。语法如下：


    ```

    () OVER([PARTITION BY ]

    ORDER BY  [Frame definition])

    ```


    [代码清单 4-1](#335106_2_En_4_Chapter.xhtml#PC2) 演示了如何使用累积窗口聚合来计算累积总计。


    ```

    --4-1.1 累积总计

    SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

    TotalDue, SUM(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS RunningTotal

    FROM Sales.SalesOrderHeader;

    ```


    代码清单 4-1

    计算累积总计


    图 [4-2](#335106_2_En_4_Chapter.xhtml#Fig2) 展示了部分结果。`RunningTotal` 列的值不断增加，直到遇到不同的
    `CustomerID`。此时，总计重新开始计算。


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig2_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig2_HTML.jpg)


    图 4-2

    使用累积聚合计算累积总计的部分结果


    [代码清单 4-1](#335106_2_En_4_Chapter.xhtml#PC2) 示例中的 `OVER` 子句使用了默认框架，该框架是 `OVER`
    子句的一部分。[第 5 章](#335106_2_En_5_Chapter.xhtml) 将深入介绍框架，但你将在下一节中先了解一些基础知识。通过修改框架，你可以计算移动聚合。'
  raw: '## Summary


    Window aggregates make it very easy to add summary calculations to a non-aggregate
    query or add summaries at different levels of aggregations to aggregate queries.
    This is very handy when you need to compare the details to an overall total or
    produce subtotals. If you are really inspired, you can create your own custom
    window aggregate function.


    You now understand how to use all of the window function features released with
    SQL Server 2005\. Chapter [4](#335106_2_En_4_Chapter.xhtml) demonstrates the first
    of the features introduced in 2012, the moving and accumulating window aggregates.


    # 4. Calculating Running and Moving Aggregates


    Imagine you have been given the task of writing a T-SQL query with running totals
    of sales by customer. Maybe your first thought is to use a cursor to do it, or
    possibly you are familiar with some query techniques like self-joins to accomplish
    the task. If you are running SQL Server 2012 or later, you are in luck! Window
    functions make it easy to calculate running totals, moving averages, and more.


    In this chapter, you will learn how adding an `ORDER BY` clause to a windows aggregate
    expression changes everything! You will learn how to add calculations for running
    and moving aggregates, something often required in business reports and dashboards.


    ## Adding ORDER BY to Window Aggregates


    You learned how to use window aggregates to add summaries to queries without grouping
    in Chapter [3](#335106_2_En_3_Chapter.xhtml). The 2005 window aggregate functionality
    does not support the `ORDER BY` component in the `OVER` clause. Starting with
    SQL Server 2012, you can add an `ORDER BY` to a window aggregate to calculate
    running totals. To differentiate between this functionality and the 2005 functionality,
    this book will call the 2012 functionality *accumulating window aggregates*. When
    adding the `ORDER BY`, the window changes. Each row has a different set of rows,
    or window, to operate on. The window is based on the `ORDER BY` expression. By
    default, the window consists of the first row in the results and includes all
    the subsequent rows up to the current row. Figure [4-1](#335106_2_En_4_Chapter.xhtml#Fig1)
    demonstrates how the windows work when partitioned by CustomerID.


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig1_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Each row has a different window


    In the examples leading up to this chapter, the actual rows making up the windows
    were determined by the `PARTITION BY` expressions. In the case of accumulating
    aggregates, the `PARTITION BY`, `ORDER BY`, and a *frame* define which rows end
    up in the window. A frame can be used to more finely define the window. The example
    in this section uses the default frame. You will learn more about frames in the
    “Calculating Moving Totals and Averages” section in this chapter and even more
    in Chapter [5](#335106_2_En_5_Chapter.xhtml). Here is the syntax:


    ```

    () OVER([PARTITION BY ]

    ORDER BY  [Frame definition])

    ```


    Listing [4-1](#335106_2_En_4_Chapter.xhtml#PC2) demonstrates how to use accumulating
    window aggregates to calculate running totals.


    ```

    --4-1.1 A running total

    SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

    TotalDue, SUM(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS RunningTotal

    FROM Sales.SalesOrderHeader;

    Listing 4-1

    Calculating Running Totals

    ```


    Figure [4-2](#335106_2_En_4_Chapter.xhtml#Fig2) shows the partial results. The
    `RunningTotal` column values increase until reaching a different `CustomerID`.
    At that point, the totals start over.


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig2_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Partial results of calculating running totals with accumulating aggregates


    The `OVER` clause in the example shown in Listing [4-1](#335106_2_En_4_Chapter.xhtml#PC2)
    uses the default frame which is part of the `OVER` clause. Chapter [5](#335106_2_En_5_Chapter.xhtml)
    covers framing in depth, but for now you’ll learn a bit about it in the next section.
    By altering the frame, you can calculate moving aggregates.'
  trans: '## 概述


    窗口聚合使得向非聚合查询添加摘要计算，或向聚合查询添加不同聚合级别的摘要变得非常容易。当你需要将详细数据与整体总计进行比较或生成小计时，这非常方便。如果你灵感迸发，甚至可以创建自己的自定义窗口聚合函数。


    现在你已经了解了如何使用 SQL Server 2005 发布的所有窗口函数特性。第 4 章 将展示 2012 年引入的首个特性：移动和累积窗口聚合。


    ## 4. 计算累积和移动聚合


    假设你被分配了一项任务，编写一个带有按客户分类的销售累积总计的 T-SQL 查询。也许你首先想到的是使用游标来完成，或者你可能熟悉一些查询技术，如自连接。如果你运行的是
    SQL Server 2012 或更高版本，那么你很幸运！窗口函数使得计算累积总计、移动平均值等变得非常容易。


    在本章中，你将学习如何在窗口聚合表达式中添加 `ORDER BY` 子句会改变一切！你将学习如何为累积和移动聚合添加计算，这在业务报告和仪表盘中经常需要。


    ### 向窗口聚合添加 ORDER BY


    在第 3 章中，你学习了如何使用窗口聚合在不分组的情况下向查询添加摘要。2005 版的窗口聚合功能不支持 `OVER` 子句中的 `ORDER BY` 组件。从
    SQL Server 2012 开始，你可以向窗口聚合添加 `ORDER BY` 来计算累积总计。为了区分此功能与 2005 功能，本书将 2012 功能称为*累积窗口聚合*。添加
    `ORDER BY` 时，窗口会发生变化。每一行都有不同的行集（即窗口）用于操作。窗口基于 `ORDER BY` 表达式。默认情况下，窗口由结果集中的第一行开始，并包括直到当前行的所有后续行。图
    4-1 展示了按 `CustomerID` 分区时窗口的工作原理。


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig1_HTML.jpg](img/335106_2_En_4_Fig1_HTML.jpg)


    图 4-1

    每一行都有不同的窗口


    在本章之前的示例中，组成窗口的实际行由 `PARTITION BY` 表达式确定。对于累积聚合，窗口中的行由 `PARTITION BY`、`ORDER BY`
    和一个*框架*共同定义。框架可用于更精细地定义窗口。本节中的示例使用了默认框架。你将在本章的“计算移动总计和平均值”部分以及第 5 章中了解更多关于框架的信息。语法如下：


    ```

    () OVER([PARTITION BY ]

    ORDER BY  [Frame definition])

    ```


    代码清单 4-1 演示了如何使用累积窗口聚合来计算累积总计。


    ```

    --4-1.1 累积总计

    SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

    TotalDue, SUM(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS RunningTotal

    FROM Sales.SalesOrderHeader;

    ```


    代码清单 4-1

    计算累积总计


    图 4-2 展示了部分结果。`RunningTotal` 列的值不断增加，直到遇到不同的 `CustomerID`。此时，总计重新开始计算。


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig2_HTML.jpg](img/335106_2_En_4_Fig2_HTML.jpg)


    图 4-2

    使用累积聚合计算累积总计的部分结果


    代码清单 4-1 示例中的 `OVER` 子句使用了默认框架，该框架是 `OVER` 子句的一部分。第 5 章 将深入介绍框架，但你将在下一节中先了解一些基础知识。通过修改框架，你可以计算移动聚合。'
- fmt: "## Calculating Moving Totals and Averages\n\nMoving totals and averages are\
    \ very popular business and economic metrics. Developers may be asked to provide\
    \ reports with these calculations over 3 months or over 12 months, for example.\
    \ By default, the window for accumulating window aggregates keeps growing within\
    \ the partition, but for moving aggregates, you want the window size to stay the\
    \ same. You can accomplish this by adding a frame definition. Here is the syntax\
    \ for accumulating window aggregates including the frame for a moving aggregate.\
    \ Chapter [5](#335106_2_En_5_Chapter.xhtml) covers framing extensively, so for\
    \ now just copy the code in the examples.\n\n```sql\n() OVER([PARTITION BY ]]\n\
    ORDER BY \n[ROWS BETWEEN  PRECEDING AND CURRENT ROW])\n```\n\nThe window is different\
    \ for each row. Figure [4-3](#335106_2_En_4_Chapter.xhtml#Fig3) demonstrates how\
    \ the window works for a moving aggregate.\n\n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig3_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3: The windows for a moving aggregate over 3 months\n\nRun Listing\
    \ [4-2](#335106_2_En_4_Chapter.xhtml#PC4) to see an example.\n\n```sql\n--4-2.1\
    \ Three month sum and average for products qty sold\nSELECT MONTH(SOH.OrderDate)\
    \ AS OrderMonth, SOD.ProductID, SUM(SOD.OrderQty) AS QtySold,\nSUM(SUM(SOD.OrderQty))\n\
    OVER(PARTITION BY SOD.ProductID ORDER BY MONTH(SOH.OrderDate)\nROWS BETWEEN 2\
    \ PRECEDING AND CURRENT ROW) AS ThreeMonthSum,\nAVG(SUM(SOD.OrderQty))\nOVER(PARTITION\
    \ BY SOD.ProductID ORDER BY MONTH(SOH.OrderDate)\nROWS BETWEEN 2 PRECEDING AND\
    \ CURRENT ROW) AS ThreeMonthAvg\nFROM Sales.SalesOrderHeader AS SOH\nJOIN Sales.SalesOrderDetail\
    \ AS SOD ON SOH.SalesOrderID = SOD.SalesOrderID\nJOIN Production.Product AS P\
    \ ON SOD.ProductID = P.ProductID\nWHERE OrderDate >= '2013-01-01' AND OrderDate\
    \ < '2014-01-01'\nGROUP BY MONTH(SOH.OrderDate), SOD.ProductID;\n--Listing 4-2:\
    \ Calculating Moving Averages and Sums\n```\n\nThe query is filtered for orders\
    \ placed in 2013 and aggregated to the month and `ProductID`. Figure [4-4](#335106_2_En_4_Chapter.xhtml#Fig4)\
    \ shows the partial results, one year’s sales of product 707. Notice that the\
    \ window function in each case is applied to an aggregate, the sum of `OrderQty`.\
    \ When using a window function in an aggregate query, any columns used in the\
    \ function or the `OVER` clause follow the same rules as the `SELECT` list. See\
    \ the “Adding Window Aggregates to Aggregate Queries” section in Chapter [3](#335106_2_En_3_Chapter.xhtml)\
    \ for more information. By adding `ORDER BY` and the `ROWS` expression (frame)\
    \ to the `OVER` clause, the window moves forward and includes at most three rows\
    \ each time.\n\n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig4_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4: Partial results of calculating moving aggregates\n\nMost of the\
    \ time, the requirements for three-month calculations specify that the values\
    \ should be `NULL` if there are not three months to average, but the functions\
    \ will just add up whatever is available. For example, the three-month sums and\
    \ averages for January and February should be `NULL`. Starting in March, the three\
    \ months are available, so the total is returned. To accomplish this, you’ll have\
    \ to check for the number of months. Listing [4-3](#335106_2_En_4_Chapter.xhtml#PC5)\
    \ shows one way to do this.\n\n```sql\n--4-3.1 Display NULL when less than\nSELECT\
    \ MONTH(SOH.OrderDate) AS OrderMonth, SOD.ProductID,\nSUM(SOD.OrderQty) AS QtySold,\n\
    CASE WHEN ROW_NUMBER() OVER(PARTITION BY SOD.ProductID\nORDER BY MONTH(SOH.OrderDate))\
    \ = '2013-01-01' AND OrderDate < '2014-01-01'\nGROUP BY MONTH(SOH.OrderDate),\
    \ SOD.ProductID;\n--Listing 4-3: Display NULL When Not Enough Rows\n```\n\nFigure\
    \ [4-5](#335106_2_En_4_Chapter.xhtml#Fig5) shows the partial results, one year’s\
    \ worth of sales for `ProductID` 707. By using a `CASE` statement to check the\
    \ `ROW_NUMBER`, `NULL` is returned when less than three rows are available.\n\n\
    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig5_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5: Return NULL when less than three rows are available\n\n## Solving\
    \ Queries Using Accumulating Aggregates\n\nCreating running and moving aggregates\
    \ is very easy! You will learn how to take advantage of the frame component of\
    \ the `OVER` clause in Chapter [5](#335106_2_En_5_Chapter.xhtml) to make sure\
    \ you get the results you expect. In Chapter [8](#335106_2_En_8_Chapter.xhtml),\
    \ the performance of framing is covered, which is also important. Unlike the ranking\
    \ functions, calculating a running or moving aggregate may be the solution not\
    \ just a step along the way to the solution. The following section shows how to\
    \ use accumulating window functions to solve even more interesting problems."
