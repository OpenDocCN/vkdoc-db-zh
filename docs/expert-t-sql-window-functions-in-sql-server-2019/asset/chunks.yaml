    # 1. Looking Through the Window


    SQL Server is a powerful database platform with a versatile query language called
    T-SQL. The most exciting T-SQL enhancement over the years, in my opinion, is the
    window functions. Window functions enable you to solve query problems in new,
    easier ways and with better performance most of the time over traditional techniques.
    They are a great tool for analytics. You may hear these called “windowing” or
    “windowed” functions as well. The three terms are synonymous when talking about
    this feature.


    After the release of SQL Server 2000, SQL Server enthusiasts waited 5 long years
    for the next version of SQL Server to arrive. Microsoft delivered an entirely
    new product with SQL Server 2005\. This version brought SQL Server Management
    Studio, SQL Server Integration Services, snapshot isolation, and database mirroring.
    Microsoft also enhanced T-SQL with many great features, such as common table expressions
    (CTEs). The most exciting T-SQL enhancement of all with 2005 was the introduction
    of window functions.


    That was just the beginning. Window functions are part of the standard ANSI SQL
    specification beginning with ANSI SQL2003\. More functionality according to the
    standard was released with version 2012 of SQL Server. In 2019, Microsoft gave
    some of the window functions a performance boost with batch mode processing, a
    feature once reserved for column store indexes. You’ll see how this performance
    feature works in Chapter [8](#335106_2_En_8_Chapter.xhtml). Even now, the functionality
    falls short of the entire specification, so there is more to look forward to in
    the future.


    This chapter provides a first look at two T-SQL window functions, `LAG` and `ROW_NUMBER`.
    You will learn just what the window is and how to define it with the `OVER` clause.
    You will also learn how to divide the windows into smaller sections called partitions.


    ## Discovering Window Functions


    Window functions do not let you do anything that was impossible to do with earlier
    functionality, and they have nothing to do with the Microsoft Windows API. Using
