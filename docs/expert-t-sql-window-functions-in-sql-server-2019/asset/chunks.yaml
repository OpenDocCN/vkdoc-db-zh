    (''2/26/2019 03:07:15'', ''git service error'', ''medium'', "),

    (''1/31/2019 23:59:50'', ''sql_server_01'', ''critical'', ''corrupt database identified''),

    (''1/31/2019 23:59:53'', ''sql_server_01'', ''critical'', ''corrupt database identified''),

