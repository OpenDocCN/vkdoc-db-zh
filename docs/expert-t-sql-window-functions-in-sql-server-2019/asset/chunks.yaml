    ## Period-to-Date Calculations


    Period-to-date calculations are a mainstay of financial reports but are notoriously
    difficult to incorporate into query-based reports without resorting to multiple
    CTEs or temporary tables. Typically, the grouping is performed in a reporting
    tool such as SQL Server Reporting Services or Excel to provide the aggregated
    results, but can still be tricky to implement. The examples you will work through
    next will show you how to create multiple levels of rolling totals in a single
    result set, by adding a FRAME clause after the ORDER BY clause. The frame clause
    is covered in more detail in Chapter [5](#335106_2_En_5_Chapter.xhtml).


    Listing [10-5](#335106_2_En_10_Chapter.xhtml#PC7) demonstrates how to use the
    frame definition to calculate period-to-date totals by date, by product for months,
    quarters, and years. The base query is essentially the same as before, but the
    level of granularity is at the date level instead of the month level. This is
    so that you can see the results of the aggregate columns in more detail.


    ```

    --10.5 day level aggregates, with rolling totals for MTD, QTD, YTD

    SELECT f.OrderDate,

    f.ProductKey,

    YEAR(f.orderdate) AS OrderYear,

    MONTH(f.orderdate) AS OrderMonth,

    SUM(f.SalesAmount) AS [Sales],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate),

    MONTH(f.orderdate)

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales MTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate),

    DATEPART(QUARTER, f.OrderDate)

    ORDER BY f.productkey, YEAR(f.orderdate), MONTH(f.orderdate)

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales QTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate)

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales YTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales Running Total]

    FROM dbo.FactInternetSales AS f

    GROUP BY f.orderdate, f.ProductKey, YEAR(f.orderdate), MONTH(f.orderdate)

    ORDER BY f.ProductKey, f.OrderDate;

    Listing 10-5

    Calculating Period-to-Date Running Totals by Date

    ```


    The `OVER` clause examples shown in Listing [10-5](#335106_2_En_10_Chapter.xhtml#PC7)
    uses the `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW` frame. This results
    in the calculation aggregating all rows from the beginning of the frame to the
    current row, giving you the correct total to-date for the level specified in the
    `PARTITION` clause. For instance, the `[Sale Amt MTD]` aggregate column will calculate
    the `SUM([SalesAmount])` from the first day of the month, the first unbounded
    preceding row, through to the current row. The `ORDER BY` clause becomes mandatory
    when using a `FRAME` clause, providing the context for the frame to move sequentially
    through the rows in the `PARTITION`.


    Figure [10-4](#335106_2_En_10_Chapter.xhtml#Fig4) shows the partial results. The
    [`Sales MTD], [Sales QTD]` and [`Sales YTD]` column values increase until reaching
    a different [`ProductKey] or [ProductKey] and time level (Month & Quarter)`. The
    results in Figure [10-4](#335106_2_En_10_Chapter.xhtml#Fig4) show the break in
    aggregations at the end of the second quarter, so you can see by looking at the
    rows where `[ProductKey]` is equal to 311, 312, or 313 that the MTD and QTD aggregations
    reset on October 1.


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig4_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig4_HTML.jpg)


    Figure 10-4


    The partial results of Listing [10-5](#335106_2_En_10_Chapter.xhtml#PC7) at the
    end of a quarter (September 30)


