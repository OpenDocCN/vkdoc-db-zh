    me for help with essentially the same problem: using data from the stock market,
    how can one compare the closing price of a stock from one day to the next? The
    traditional solution requires that each row of the data be joined to the prior
    row to get the closing price from the previous day. By using the `LAG` function,
    the solution is not only simpler to write, it also performs much better.'
