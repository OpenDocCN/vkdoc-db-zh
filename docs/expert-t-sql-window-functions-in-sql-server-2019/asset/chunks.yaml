    ## Framing for Performance


    In Chapter [5](#335106_2_En_5_Chapter.xhtml), you learned about adding a frame
    to the `OVER` clause to create moving aggregates. In Chapter [6](#335106_2_En_6_Chapter.xhtml),
    you saw how the frame is needed for the FIRST_VALUE and LAST_VALUE functions.
    In each case, I explained that the frame was sometimes needed to get the correct
    results, but it’s also important for performance reasons. Later in the chapter,
    I’ll cover some exciting performance updates with SQL Server 2019, but for now,
    the examples in this section will assume that the database is in SQL Server 2017
    compatibility mode or lower.


    If the tables are small, the queries run quickly even if the frame is left out.
    Listing [8-10](#335106_2_En_8_Chapter.xhtml#PC10) sets the database compatibility
    mode to 2017 (140) and turns on statistics. It then creates and populates a table
    for testing. If needed, modify the database name.


    ```

