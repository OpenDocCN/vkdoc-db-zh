- fmt: '## Applying Frames to Running and Moving Aggregates


    Frames were first introduced to SQL Server with the 2012 version. They apply to
    a subset of window functions, the accumulating aggregates you learned about in
    Chapter [4](#335106_2_En_4_Chapter.xhtml) and two of the offset functions, `FIRST_VALUE`
    and `LAST_VALUE`. You will learn about offset functions in Chapter [6](#335106_2_En_6_Chapter.xhtml).


    By specifying the frame, you can calculate reverse running totals and moving aggregates.
    Run Listing [5-2](#335106_2_En_5_Chapter.xhtml#PC3) to see some examples.


    ```sql

    --5-2.1 Running and reverse running totals

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID

    ROWS UNBOUNDED PRECEDING) AS RunningTotal,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING) AS ReverseTotal

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --5-2.2 Moving sum and average

    SELECT YEAR(OrderDate) AS OrderYear, MONTH(OrderDate) AS OrderMonth,

    COUNT(*) AS OrderCount,

    SUM(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthCount,

    AVG(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthAvg

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2012-01-01'' AND OrderDate < ''2013-01-01''

    GROUP BY YEAR(OrderDate), MONTH(OrderDate);

    ```

    Listing 5-2

    Using Frames


    Figure [5-3](#335106_2_En_5_Chapter.xhtml#Fig3) shows the partial results. By
    specifying that the window should start at the current row and continue to the
    end of the partition, you can create a reverse running total as in Query 1. By
    specifying that the window is made up of two rows before the current row and the
    current row as in Query 2, you create a window that moves.


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig3_HTML.jpg](images/335106_2_En_5_Chapter/335106_2_En_5_Fig3_HTML.jpg)

    Figure 5-3

    The partial results of using the frame


    You may notice that the calculations using `N PRECEDING` return values when less
    than three months of rows is available. To get around this, you can filter out
    rows that don’t qualify. Listing [5-3](#335106_2_En_5_Chapter.xhtml#PC4) shows
    how you might want to do this.


    ```sql

    --5-3.1 Filter rows with less than 2 preceding rows

    WITH Sales AS (

    SELECT YEAR(OrderDate) AS OrderYear, MONTH(OrderDate) AS OrderMonth,

    COUNT(*) AS OrderCount,

    SUM(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthCount,

    AVG(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthAvg,

    ROW_NUMBER() OVER(PARTITION BY YEAR(OrderDate)

    ORDER BY MONTH(OrderDate)) AS RowNum

    FROM Sales.SalesOrderHeader

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)

    )

    SELECT OrderYear, OrderMonth, OrderCount, ThreeMonthCount, ThreeMonthAvg

    FROM Sales

    WHERE RowNum >= 3;

    ```

    Listing 5-3

    Filter Rows with Less Than Two Preceding Rows


    This query includes `ROW_NUMBER` partitioned on the year so that May and June
    of 2011 are not returned. Figure [5-4](#335106_2_En_5_Chapter.xhtml#Fig4) shows
    the partial results.


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig4_HTML.jpg](images/335106_2_En_5_Chapter/335106_2_En_5_Fig4_HTML.jpg)

    Figure 5-4

    The partial results of filtering out less than rows


    To get the moving aggregates, like the `ThreeMonthAvg` shown in the previous examples,
    you must use the frame. If you just want a running total, you may be able to get
    by leaving it out. The `ReverseTotal` did require the frame because it starts
    at the end of the data and ends at the current row. Often when giving a presentation
    on window functions, someone will mention that changing the `ORDER BY` expression
    to descending will give a reverse running total, and they are correct. Listing
    [5-4](#335106_2_En_5_Chapter.xhtml#PC5) shows an example.


    ```sql

    --5-4.1 Running and reverse running totals

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RunningTotal,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID DESC

    ) AS ReverseTotal

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    ```

    Listing 5-4

    Running Totals and Reverse Running Totals Without the Frame


    The results are the same as that shown in the first query in Figure [5-3](#335106_2_En_5_Chapter.xhtml#Fig3).
    Before SQL Server 2019, I would have warned not to do this because of performance
    implications. You’ll learn more about the performance of differences between `ROWS`
    and `RANGE` in Chapter [8](#335106_2_En_8_Chapter.xhtml). Until then, you do need
    to be aware of a critical difference in the logic of these two operators.'
  raw: '## Applying Frames to Running and Moving Aggregates


    Frames were first introduced to SQL Server with the 2012 version. They apply to
    a subset of window functions, the accumulating aggregates you learned about in
    Chapter [4](#335106_2_En_4_Chapter.xhtml) and two of the offset functions, `FIRST_VALUE`
    and `LAST_VALUE`. You will learn about offset functions in Chapter [6](#335106_2_En_6_Chapter.xhtml).


    By specifying the frame, you can calculate reverse running totals and moving aggregates.
    Run Listing [5-2](#335106_2_En_5_Chapter.xhtml#PC3) to see some examples.


    ```

    --5-2.1 Running and reverse running totals

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID

    ROWS UNBOUNDED PRECEDING) AS RunningTotal,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING) AS ReverseTotal

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --5-2.2 Moving sum and average

    SELECT YEAR(OrderDate) AS OrderYear, MONTH(OrderDate) AS OrderMonth,

    COUNT(*) AS OrderCount,

    SUM(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthCount,

    AVG(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthAvg

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2012-01-01'' AND OrderDate < ''2013-01-01''

    GROUP BY YEAR(OrderDate), MONTH(OrderDate);

    Listing 5-2

    Using Frames

    ```


    Figure [5-3](#335106_2_En_5_Chapter.xhtml#Fig3) shows the partial results. By
    specifying that the window should start at the current row and continue to the
    end of the partition, you can create a reverse running total as in Query 1\. By
