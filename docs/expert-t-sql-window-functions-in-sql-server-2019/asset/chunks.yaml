    WITH GAME_LOG AS (

    SELECT

    CASE WHEN (HomeScore > VisitingScore AND HomeTeamName = ''BOS'') OR (VisitingScore
    > HomeScore AND VisitingTeamName = ''BOS'') THEN ''W''

    WHEN (HomeScore > VisitingScore AND VisitingTeamName = ''BOS'') OR (VisitingScore
    > HomeScore AND HomeTeamName = ''BOS'') THEN ''L''

    WHEN VisitingScore = HomeScore THEN ''T''

    END AS result,

    LAG(CASE WHEN (HomeScore > VisitingScore AND HomeTeamName = ''BOS'') OR (VisitingScore
    > HomeScore AND VisitingTeamName = ''BOS'') THEN ''W''

    WHEN (HomeScore > VisitingScore AND VisitingTeamName = ''BOS'') OR (VisitingScore
    > HomeScore AND HomeTeamName = ''BOS'') THEN ''L''

    WHEN VisitingScore = HomeScore THEN ''T'' END) OVER (PARTITION BY CASE WHEN VisitingTeamName
    = ''BOS'' THEN HomeTeamName ELSE VisitingTeamName END

    ORDER BY GameLog.GameDate, GameLog.GameLogId) AS previous_game_result,

    LEAD(CASE WHEN (HomeScore > VisitingScore AND HomeTeamName = ''BOS'') OR (VisitingScore
    > HomeScore AND VisitingTeamName = ''BOS'') THEN ''W''

    WHEN (HomeScore > VisitingScore AND VisitingTeamName = ''BOS'') OR (VisitingScore
    > HomeScore AND HomeTeamName = ''BOS'') THEN ''L''

    WHEN VisitingScore = HomeScore THEN ''T'' END) OVER (PARTITION BY CASE WHEN VisitingTeamName
    = ''BOS'' THEN HomeTeamName ELSE VisitingTeamName END

    ORDER BY GameLog.GameDate, GameLog.GameLogId) AS next_game_result,

    ROW_NUMBER() OVER (PARTITION BY CASE WHEN VisitingTeamName = ''BOS'' THEN HomeTeamName
    ELSE VisitingTeamName END ORDER BY GameLog.GameDate, GameLog.GameLogId) AS island_location,

    CASE WHEN VisitingTeamName = ''BOS'' THEN HomeTeamName ELSE VisitingTeamName END
    AS opposing_team,

    GameLog.GameDate,

    GameLog.GameLogId

    FROM dbo.GameLog

    WHERE GameLog.GameType = ''REG''

    AND GameLog.HomeTeamName = ''BOS'' OR GameLog.VisitingTeamName = ''BOS''),

    CTE_ISLAND_START AS (

    SELECT

    ROW_NUMBER() OVER (PARTITION BY GAME_LOG.opposing_team ORDER BY GAME_LOG.GameDate,
    GAME_LOG.GameLogId) AS island_number,

    GAME_LOG.GameDate AS island_start_time,

    GAME_LOG.island_location AS island_start_location,

    GAME_LOG.opposing_team

    FROM GAME_LOG

    WHERE GAME_LOG.result = ''W''

    AND (GAME_LOG.previous_game_result <> ''W'' OR GAME_LOG.previous_game_result IS
    NULL)),

    CTE_ISLAND_END AS (

    SELECT

    ROW_NUMBER() OVER (PARTITION BY GAME_LOG.opposing_team ORDER BY GAME_LOG.GameDate,
    GAME_LOG.GameLogId) AS island_number,

    GAME_LOG.GameDate AS island_end_time,

    GAME_LOG.island_location AS island_end_location,

    GAME_LOG.opposing_team

    FROM GAME_LOG

    WHERE GAME_LOG.result = ''W''

    AND (GAME_LOG.next_game_result <> ''W'' OR GAME_LOG.next_game_result IS NULL))

    SELECT

    CTE_ISLAND_START.island_start_time,

    CTE_ISLAND_START.opposing_team,

    CTE_ISLAND_END.island_end_time,

    CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location +
    1 AS count_of_events,

    DATEDIFF(DAY, CTE_ISLAND_START.island_start_time, CTE_ISLAND_END.island_end_time)
    + 1 AS length_of_streak_in_days

    FROM CTE_ISLAND_START

    INNER JOIN CTE_ISLAND_END

    ON CTE_ISLAND_START.island_number = CTE_ISLAND_END.island_number

    AND CTE_ISLAND_START.opposing_team = CTE_ISLAND_END.opposing_team

    ORDER BY CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location
    DESC;

