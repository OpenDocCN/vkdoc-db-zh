    虽然我们的结果只包含时间和计数，但我们可以添加关于哪些事件在每个范围内发生得最多、最少，或者范围内第一个事件的详细信息（因为它通常是中断的原因）。


    对数据进行唯一排序非常重要。`LEAD`、`LAG` 和 `ROW_NUMBER` 都必须有一个唯一的 `ORDER BY` 子句。在我们的示例中，我们在时间之后包含了
    *error_log_id*，这是一个标识列。这确保了每次执行此查询时，数据都以相同的方式唯一排序。如果基础数据具有重复值，并且我们没有应用唯一的排序顺序，那么在这些边界上可能存在数据不一致或不准确的风险。


    邻近性分析的关键是定义一个可用于将数据排序为编号组的规则。有了这个规则，我们就可以确定数据簇的边界并将它们连接起来，以产生一组分组的结果。与使用 `GROUP
    BY` 不同，我们直到运行时才知道结果集的大小。返回的行数将由数据驱动，可能是一行（包含许多相关事件），也可能是多行（包含一组不相关的事件）。


    如果我们调整规则，就可以改变结果的形状。如果事件发生在彼此 15 分钟内被视为相关，而不是 5 分钟，那么我们将得到一个事件计数更高的较小数据集。如果我们将规则调整得更严格，将
    1 分钟内发生的事件视为相关，那么我们的结果集将包含更多的行和更小的计数。试验规则是这种分析风格的关键组成部分，将帮助我们确定哪些指标对于给定的数据集最有意义。如有疑问，我们可以自动化一个过程，该过程遍历许多不同的规则，以确定哪一个能提供最大的价值。


    ## 追踪连续记录


    一个数据簇可以表示多种类型的数据分组。在体育中，连续记录意义重大，并构成了许多用于持续数据驱动决策的统计数据的基础。赢和输是最常被报告的模式，但经理们也会追踪细节。在棒球中，连续安打、连续出局、失误以及许多其他指标都可以作为事件序列进行追踪。这些序列表现为岛屿或间隙，我们可以像处理错误日志数据那样以相同的方式进行报告。


    在接下来的例子中，我们将使用一组棒球数据，这些数据定义在一个名为 `dbo.GameLog` 的单一宽表中。该表每场比赛包含一行，并包含详尽的细节，如图 9-7
    中的样本所示。


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig7_HTML.jpg](img/335106_2_En_9_Fig7_HTML.jpg)


    *图 9-7 棒球比赛日志数据样本*


    其中包括天气、比赛得分以及裁判、教练和经理的姓名等详细信息。对于较旧的比赛，许多数据缺失或不完整，因此我们编写的任何查询都必须容忍这一事实。该数据包括从 1871
    年到 2018 年的所有常规赛、全明星赛和季后赛，总计记录了 219,832 场棒球比赛。


    所有缩写、名称、代码和模糊维度都有查找表，可用于验证其存在或含义。为了我们的工作，将跳过这些附加维度，因为它们不会为我们的连续记录分析提供任何额外价值。

    '
- fmt: "# Winning and Losing Streaks\n\nWith this new data set introduced, let’s dive\
    \ into the most basic of streaks: winning and losing. We will define a winning\
    \ streak as an island of wins bounded by losses or ties. A streak may span multiple\
    \ seasons, and by default, we will not mix regular-season games with post-season\
    \ games. Losing streaks are calculated the same way: as islands of losses bounded\
    \ by wins or ties. While ties are infrequent in modern times, they were very common\
    \ prior to the use of outdoor lighting and domed fields.\n\nTo begin, let’s consider\
    \ the longest winning streak in history for a specific baseball team. The query\
    \ in `Listing 9-7` will take game log data and group it into consecutive segments\
    \ of wins and losses, creating data clusters that we can then analyze.\n\n```sql\n\
    WITH GAME_LOG AS (\n    SELECT\n        CASE WHEN (HomeScore > VisitingScore AND\
    \ HomeTeamName = 'NYA') OR (VisitingScore > HomeScore AND VisitingTeamName = 'NYA')\
    \ THEN 'W'\n             WHEN (HomeScore > VisitingScore AND VisitingTeamName\
    \ = 'NYA') OR (VisitingScore > HomeScore AND HomeTeamName = 'NYA') THEN 'L'\n\
    \             WHEN VisitingScore = HomeScore THEN 'T'\n        END AS result,\n\
    \        LAG(CASE WHEN (HomeScore > VisitingScore AND HomeTeamName = 'NYA') OR\
    \ (VisitingScore > HomeScore AND VisitingTeamName = 'NYA') THEN 'W'\n        \
    \         WHEN (HomeScore > VisitingScore AND VisitingTeamName = 'NYA') OR (VisitingScore\
    \ > HomeScore AND HomeTeamName = 'NYA') THEN 'L'\n                 WHEN VisitingScore\
    \ = HomeScore THEN 'T' END) OVER (ORDER BY GameLog.GameDate, GameLog.GameLogId)\
    \ AS previous_game_result,\n        LEAD(CASE WHEN (HomeScore > VisitingScore\
    \ AND HomeTeamName = 'NYA') OR (VisitingScore > HomeScore AND VisitingTeamName\
    \ = 'NYA') THEN 'W'\n                  WHEN (HomeScore > VisitingScore AND VisitingTeamName\
    \ = 'NYA') OR (VisitingScore > HomeScore AND HomeTeamName = 'NYA') THEN 'L'\n\
    \                  WHEN VisitingScore = HomeScore THEN 'T' END) OVER (ORDER BY\
    \ GameLog.GameDate, GameLog.GameLogId) AS next_game_result,\n        ROW_NUMBER()\
    \ OVER (ORDER BY GameLog.GameDate, GameLog.GameLogId) AS island_location,\n  \
    \      GameLog.GameDate,\n        GameLog.GameLogId\n    FROM dbo.GameLog\n  \
    \  WHERE (GameLog.HomeTeamName = 'NYA' OR GameLog.VisitingTeamName = 'NYA')\n\
    \        AND GameLog.GameType = 'REG'),\nCTE_ISLAND_START AS (\n    SELECT\n \
    \       ROW_NUMBER() OVER (ORDER BY GAME_LOG.GameDate, GAME_LOG.GameLogId) AS\
    \ island_number,\n        GAME_LOG.GameDate AS island_start_time,\n        GAME_LOG.island_location\
    \ AS island_start_location\n    FROM GAME_LOG\n    WHERE GAME_LOG.result = 'W'\n\
    \        AND (GAME_LOG.previous_game_result <> 'W' OR GAME_LOG.previous_game_result\
    \ IS NULL)),\nCTE_ISLAND_END AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER\
    \ BY GAME_LOG.GameDate, GAME_LOG.GameLogId) AS island_number,\n        GAME_LOG.GameDate\
    \ AS island_end_time,\n        GAME_LOG.island_location AS island_end_location\n\
    \    FROM GAME_LOG\n    WHERE GAME_LOG.result = 'W'\n        AND (GAME_LOG.next_game_result\
    \ <> 'W' OR GAME_LOG.next_game_result IS NULL))\nSELECT\n    CTE_ISLAND_START.island_start_time,\n\
    \    CTE_ISLAND_END.island_end_time,\n    CTE_ISLAND_END.island_end_location -\
    \ CTE_ISLAND_START.island_start_location + 1 AS count_of_events,\n    DATEDIFF(DAY,\
    \ CTE_ISLAND_START.island_start_time, CTE_ISLAND_END.island_end_time) + 1 AS length_of_streak_in_days\n\
    FROM CTE_ISLAND_START\nINNER JOIN CTE_ISLAND_END\n    ON CTE_ISLAND_START.island_number\
    \ = CTE_ISLAND_END.island_number\nORDER BY CTE_ISLAND_END.island_end_location\
    \ - CTE_ISLAND_START.island_start_location DESC;\n```\n\n`Listing 9-7` TSQL that\
    \ Calculates All Winning Streaks by a Team and Orders by Longest First\n\nFor\
    \ this example, we are looking for the longest winning streak for the New York\
    \ Yankees (NYA). We have intentionally retained the structure of our islands query\
    \ from earlier in this chapter. By reusing this code, our work will be greatly\
    \ simplified as the questions we ask become more challenging. Our first CTE filters\
    \ our data to only include games that the Yankees played in. It also illustrates\
    \ that `LAG` and `LEAD` can be used to provide more complex metrics, in this case\
    \ the result of a previous game using a `CASE` statement.\n\nThe second and third\
    \ CTEs are very similar and define the start and end of each winning streak via\
    \ the use of a filter that determines the boundary between winning streak and\
    \ ties/losses. Note that we check for `NULL` in both cases to ensure that we account\
    \ for the first and last rows in our data set, which will have no events before\
    \ or after them.\n\nThe final `SELECT` statement is almost identical to the one\
    \ we implemented earlier. The only addition is a `DATEDIFF` to determine the length\
    \ in days of the winning streak. We order by streak length so that the longest\
    \ appear at the top of the list. Excluding post-season games and ties, the results\
    \ in `Figure 9-8` provide the output of this query.\n\n![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig8_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig8_HTML.jpg)\n\
    \n`Figure 9-8` Yankees winning streaks, with the longest at the top of the list\n\
    \nWe can see that the longest winning streak occurred from June 29 through July\
    \ 17 in 1947 and spanned 19 games over the course of 18 days. If we replace `W`\
    \ with `L` in `CTE_ISLAND_START` and `CTE_ISLAND_END`, we can return the longest\
    \ losing streaks for the Yankees, as seen in `Figure 9-9`.\n\n![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig9_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig9_HTML.jpg)\n\
    \n`Figure 9-9` Yankees losing streaks, with the longest at the top of the list\n\
    \n# Streaks Across Partitioned Data Sets\n\nWhile determining a winning or losing\
    \ streak for a single team vs. all opponents is useful, we might want to know\
    \ the performance of a team vs. each other team individually. This introduces\
    \ a new challenge: the need to partition data as we apply gaps/islands analysis\
    \ to return results for each opposing team.\n\nThis could easily be accomplished\
    \ by creating a list of teams and iterating through them one by one. This would\
    \ be a slow approach that would lack the creativity that our process so far has\
    \ afforded us. An alternative to this would be to adjust how we use window functions\
    \ to not only order by date and ID but also partition by the opposing team.\n\n\
    Let’s consider the winning streaks for the Boston Red Sox vs. each other team\
    \ in Major League Baseball. To calculate the longest winning streaks against any\
    \ individual team, we will need to make the following adjustments to our code:\n\
    \n1.  Partition all window functions by the opposing team.\n2.  Add the opposing\
    \ team to the `GAME_LOG` common table expression.\n3.  When selecting our final\
    \ data set, join on opposing team in addition to the island number.\n\n`Listing\
    \ 9-8` illustrates our modified query that will return streaks vs. any given opposing\
    \ team."
  raw: '### Winning and Losing Streaks


    With this new data set introduced, let’s dive into the most basic of streaks:
    winning and losing. We will define a winning streak as an island of wins bounded
    by losses or ties. A streak may span multiple seasons, and by default, we will
    not mix regular-season games with post-season games. Losing streaks are calculated
    the same way: as islands of losses bounded by wins or ties. While ties are infrequent
    in modern times, they were very common prior to the use of outdoor lighting and
    domed fields.


    To begin, let’s consider the longest winning streak in history for a specific
    baseball team. The query in Listing [9-7](#335106_2_En_9_Chapter.xhtml#PC8) will
    take game log data and group it into consecutive segments of wins and losses,
    creating data clusters that we can then analyze.


    ```

    WITH GAME_LOG AS (

    SELECT

    CASE WHEN (HomeScore > VisitingScore AND HomeTeamName = ''NYA'') OR (VisitingScore
    > HomeScore AND VisitingTeamName = ''NYA'') THEN ''W''

    WHEN (HomeScore > VisitingScore AND VisitingTeamName = ''NYA'') OR (VisitingScore
    > HomeScore AND HomeTeamName = ''NYA'') THEN ''L''

    WHEN VisitingScore = HomeScore THEN ''T''

    END AS result,

    LAG(CASE WHEN (HomeScore > VisitingScore AND HomeTeamName = ''NYA'') OR (VisitingScore
    > HomeScore AND VisitingTeamName = ''NYA'') THEN ''W''

    WHEN (HomeScore > VisitingScore AND VisitingTeamName = ''NYA'') OR (VisitingScore
    > HomeScore AND HomeTeamName = ''NYA'') THEN ''L''

    WHEN VisitingScore = HomeScore THEN ''T'' END) OVER (ORDER BY GameLog.GameDate,
    GameLog.GameLogId) AS previous_game_result,

    LEAD(CASE WHEN (HomeScore > VisitingScore AND HomeTeamName = ''NYA'') OR (VisitingScore
    > HomeScore AND VisitingTeamName = ''NYA'') THEN ''W''

    WHEN (HomeScore > VisitingScore AND VisitingTeamName = ''NYA'') OR (VisitingScore
    > HomeScore AND HomeTeamName = ''NYA'') THEN ''L''

    WHEN VisitingScore = HomeScore THEN ''T'' END) OVER (ORDER BY GameLog.GameDate,
    GameLog.GameLogId) AS next_game_result,

    ROW_NUMBER() OVER (ORDER BY GameLog.GameDate, GameLog.GameLogId) AS island_location,

    GameLog.GameDate,

    GameLog.GameLogId

    FROM dbo.GameLog

    WHERE GameLog.HomeTeamName = ''NYA'' OR GameLog.VisitingTeamName = ''NYA''

    AND GameLog.GameType = ''REG''),

    CTE_ISLAND_START AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY GAME_LOG.GameDate, GAME_LOG.GameLogId) AS island_number,

    GAME_LOG.GameDate AS island_start_time,

    GAME_LOG.island_location AS island_start_location

    FROM GAME_LOG

    WHERE GAME_LOG.result = ''W''

    AND (GAME_LOG.previous_game_result  ''W'' OR GAME_LOG.previous_game_result IS
    NULL)),

    CTE_ISLAND_END AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY GAME_LOG.GameDate, GAME_LOG.GameLogId) AS island_number,

    GAME_LOG.GameDate AS island_end_time,

    GAME_LOG.island_location AS island_end_location

    FROM GAME_LOG

    WHERE GAME_LOG.result = ''W''

    AND (GAME_LOG.next_game_result  ''W'' OR GAME_LOG.next_game_result IS NULL))

    SELECT

    CTE_ISLAND_START.island_start_time,

    CTE_ISLAND_END.island_end_time,

    CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location +
    1 AS count_of_events,

    DATEDIFF(DAY, CTE_ISLAND_START.island_start_time, CTE_ISLAND_END.island_end_time)
    + 1 AS length_of_streak_in_days

    FROM CTE_ISLAND_START

    INNER JOIN CTE_ISLAND_END

    ON CTE_ISLAND_START.island_number = CTE_ISLAND_END.island_number

    ORDER BY CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location
    DESC;

    Listing 9-7

    TSQL that Calculates All Winning Streaks by a Team and Orders by Longest First

    ```


    For this example, we are looking for the longest winning streak for the New York
    Yankees (NYA). We have intentionally retained the structure of our islands query
    from earlier in this chapter. By reusing this code, our work will be greatly simplified
    as the questions we ask become more challenging. Our first CTE filters our data
    to only include games that the Yankees played in. It also illustrates that LAG
    and LEAD can be used to provide more complex metrics, in this case the result
    of a previous game using a CASE statement.


    The second and third CTEs are very similar and define the start and end of each
    winning streak via the use of a filter that determines the boundary between winning
    streak and ties/losses. Note that we check for NULL in both cases to ensure that
    we account for the first and last rows in our data set, which will have no events
    before or after them.


    The final SELECT statement is almost identical to the one we implemented earlier.
    The only addition is a DATEDIFF to determine the length in days of the winning
    streak. We order by streak length so that the longest appear at the top of the
    list. Excluding post-season games and ties, the results in Figure [9-8](#335106_2_En_9_Chapter.xhtml#Fig8)
    provide the output of this query.


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig8_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Yankees winning streaks, with the longest at the top of the list


    We can see that the longest winning streak occurred from June 29 through July
    17 in 1947 and spanned 19 games over the course of 18 days. If we replace W with
    L in *CTE_ISLAND_START* and *CTE_ISLAND_END*, we can return the longest losing
    streaks for the Yankees, as seen in Figure [9-9](#335106_2_En_9_Chapter.xhtml#Fig9).


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig9_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Yankees losing streaks, with the longest at the top of the list


    ### Streaks Across Partitioned Data Sets


    While determining a winning or losing streak for a single team vs. all opponents
    is useful, we might want to know the performance of a team vs. each other team
    individually. This introduces a new challenge: the need to partition data as we
    apply gaps/islands analysis to return results for each opposing team.


    This could easily be accomplished by creating a list of teams and iterating through
    them one by one. This would be a slow approach that would lack the creativity
    that our process so far has afforded us. An alternative to this would be to adjust
    how we use window functions to not only order by date and ID but also partition
    by the opposing team.


    Let’s consider the winning streaks for the Boston Red Sox vs. each other team
    in Major League Baseball. To calculate the longest winning streaks against any
    individual team, we will need to make the following adjustments to our code:


    1.  Partition all window functions by the opposing team.


    2.  Add the opposing team to the GAME_LOG common table expression.


    3.  When selecting our final data set, join on opposing team in addition to the
    island number.


    Listing [9-8](#335106_2_En_9_Chapter.xhtml#PC9) illustrates our modified query
    that will return streaks vs. any given opposing team.'
  trans: "\n# 连胜与连败\n\n引入这个新的数据集后，让我们深入探讨最基本的连胜/连败情况。我们将连胜定义为被失利或平局所**界定**的一段连续胜利。一段连胜可能跨越多个赛季，默认情况下，我们不会将常规赛与季后赛混合计算。连败的计算方式相同：即被胜利或平局界定的一段连续失利。虽然平局在现代比赛中很少见，但在使用户外照明和室内球场之前，平局非常普遍。\n\
    \n首先，让我们考虑某支特定棒球队伍在历史上的最长连胜纪录。`代码清单 9-7`中的查询将获取比赛日志数据，将其分组为连续的胜/负区段，从而创建可供分析的数据集群。\n\
    \n```sql\nWITH GAME_LOG AS (\n    SELECT\n        CASE WHEN (HomeScore > VisitingScore\
    \ AND HomeTeamName = 'NYA') OR (VisitingScore > HomeScore AND VisitingTeamName\
    \ = 'NYA') THEN 'W'\n             WHEN (HomeScore > VisitingScore AND VisitingTeamName\
    \ = 'NYA') OR (VisitingScore > HomeScore AND HomeTeamName = 'NYA') THEN 'L'\n\
    \             WHEN VisitingScore = HomeScore THEN 'T'\n        END AS result,\n\
    \        LAG(CASE WHEN (HomeScore > VisitingScore AND HomeTeamName = 'NYA') OR\
    \ (VisitingScore > HomeScore AND VisitingTeamName = 'NYA') THEN 'W'\n        \
    \         WHEN (HomeScore > VisitingScore AND VisitingTeamName = 'NYA') OR (VisitingScore\
    \ > HomeScore AND HomeTeamName = 'NYA') THEN 'L'\n                 WHEN VisitingScore\
    \ = HomeScore THEN 'T' END) OVER (ORDER BY GameLog.GameDate, GameLog.GameLogId)\
    \ AS previous_game_result,\n        LEAD(CASE WHEN (HomeScore > VisitingScore\
    \ AND HomeTeamName = 'NYA') OR (VisitingScore > HomeScore AND VisitingTeamName\
    \ = 'NYA') THEN 'W'\n                  WHEN (HomeScore > VisitingScore AND VisitingTeamName\
    \ = 'NYA') OR (VisitingScore > HomeScore AND HomeTeamName = 'NYA') THEN 'L'\n\
    \                  WHEN VisitingScore = HomeScore THEN 'T' END) OVER (ORDER BY\
    \ GameLog.GameDate, GameLog.GameLogId) AS next_game_result,\n        ROW_NUMBER()\
    \ OVER (ORDER BY GameLog.GameDate, GameLog.GameLogId) AS island_location,\n  \
    \      GameLog.GameDate,\n        GameLog.GameLogId\n    FROM dbo.GameLog\n  \
    \  WHERE (GameLog.HomeTeamName = 'NYA' OR GameLog.VisitingTeamName = 'NYA')\n\
    \        AND GameLog.GameType = 'REG'),\nCTE_ISLAND_START AS (\n    SELECT\n \
    \       ROW_NUMBER() OVER (ORDER BY GAME_LOG.GameDate, GAME_LOG.GameLogId) AS\
    \ island_number,\n        GAME_LOG.GameDate AS island_start_time,\n        GAME_LOG.island_location\
    \ AS island_start_location\n    FROM GAME_LOG\n    WHERE GAME_LOG.result = 'W'\n\
    \        AND (GAME_LOG.previous_game_result <> 'W' OR GAME_LOG.previous_game_result\
    \ IS NULL)),\nCTE_ISLAND_END AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER\
    \ BY GAME_LOG.GameDate, GAME_LOG.GameLogId) AS island_number,\n        GAME_LOG.GameDate\
    \ AS island_end_time,\n        GAME_LOG.island_location AS island_end_location\n\
    \    FROM GAME_LOG\n    WHERE GAME_LOG.result = 'W'\n        AND (GAME_LOG.next_game_result\
    \ <> 'W' OR GAME_LOG.next_game_result IS NULL))\nSELECT\n    CTE_ISLAND_START.island_start_time,\n\
    \    CTE_ISLAND_END.island_end_time,\n    CTE_ISLAND_END.island_end_location -\
    \ CTE_ISLAND_START.island_start_location + 1 AS count_of_events,\n    DATEDIFF(DAY,\
    \ CTE_ISLAND_START.island_start_time, CTE_ISLAND_END.island_end_time) + 1 AS length_of_streak_in_days\n\
    FROM CTE_ISLAND_START\nINNER JOIN CTE_ISLAND_END\n    ON CTE_ISLAND_START.island_number\
    \ = CTE_ISLAND_END.island_number\nORDER BY CTE_ISLAND_END.island_end_location\
    \ - CTE_ISLAND_START.island_start_location DESC;\n```\n\n`代码清单 9-7` 计算某球队所有连胜纪录并按最长优先排序的\
    \ TSQL\n\n在这个例子中，我们查找的是纽约洋基队（NYA）的最长连胜纪录。我们特意保留了本章前面介绍的岛屿查询的结构。通过复用这段代码，随着我们提出的问题变得更具挑战性，我们的工作将大大简化。第一个\
    \ CTE 过滤了数据，只包含洋基队参与的比赛。它也说明了`LAG`和`LEAD`函数可以用来提供更复杂的度量指标，在此例中是使用`CASE`语句获取上一场比赛的结果。\n\
    \n第二个和第三个 CTE 非常相似，它们通过使用一个筛选器来定义每段连胜的开始和结束，该筛选器用于界定连胜与平局/失利的边界。请注意，我们在两种情况下都检查了`NULL`值，以确保考虑到数据集中的第一行和最后一行，这些行之前或之后没有比赛。\n\
    \n最后的`SELECT`语句与我们之前实现的几乎相同。唯一的增加是使用了`DATEDIFF`函数来确定连胜持续的天数。我们按连胜长度排序，以便最长的记录出现在列表顶部。排除季后赛和平局后，`图\
    \ 9-8`中的结果提供了此查询的输出。\n\n![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig8_HTML.jpg](img/335106_2_En_9_Fig8_HTML.jpg)\n\
    \n`图 9-8` 洋基队的连胜纪录，最长的记录位于列表顶部\n\n我们可以看到最长的连胜发生在 1947 年 6 月 29 日至 7 月 17 日，历时\
