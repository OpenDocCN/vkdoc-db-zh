  trans: '

    ## 理解 LAG 和 LEAD


    你在第 1 章中已经学习了如何使用 `LAG` 来解决股票市场问题。根据 `OVER` 子句的 `ORDER BY` 表达式，你可以使用 `LAG` 来获取结果集中当前行之前某行的某一列，使用
    `LEAD` 来获取当前行之后某行的某一列。`LAG` 和 `LEAD` 不支持框架，因此大多数情况下你无需担心性能问题。分区是可选的，就像其他窗口函数一样，而
    `ORDER BY` 是必需的。基本语法如下：


    ```sql

    LAG () OVER([PARTITION BY ] ORDER BY )

    LEAD () OVER([PARTITION BY ] ORDER BY )

    ```


    运行列表 6-1 来看看 `LAG` 和 `LEAD` 的实际应用。


    ```sql

    --6-1.1 使用 LAG 和 LEAD

    SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

    LAG(CAST(OrderDate AS DATE)) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS PrevOrderDate,

    LEAD(CAST(OrderDate AS DATE)) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS NextOrderDate

    FROM Sales.SalesOrderHeader;

    --6-1.2 将 LAG 和 LEAD 作为参数使用

    SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

    DATEDIFF(DAY,LAG(OrderDate)

    OVER(PARTITION BY CustomerID ORDER BY SalesOrderID), OrderDate)

    AS DaysSincePrevOrder,

    DATEDIFF(DAY, OrderDate, LEAD(OrderDate)

    OVER(PARTITION BY CustomerID ORDER BY SalesOrderID))

    AS DaysUntilNextOrder

    FROM Sales.SalesOrderHeader;

    ```

    **列表 6-1**

    使用 `LAG` 和 `LEAD`


    图 6-1 展示了部分结果。查询 1 使用 `LAG` 和 `LEAD` 函数来查找相对于当前行的前一个和后一个订单日期。函数的参数是转换为 `DATE`
    数据类型的 `OrderDate`。就像其他窗口函数一样，`PARTITION BY` 是可选的。在此例中，数据按 `CustomerID` 进行分区。`ORDER
    BY` 是 `OVER` 子句中非常重要的一部分，它决定了哪一行是前一行，哪一行是后一行。查询 2 的 `OVER` 子句与查询 1 相同，区别在于 `LAG`
    和 `LEAD` 表达式被用作 `DATEDIFF` 函数的参数，以计算订单之间的天数。


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig1_HTML.jpg](img/335106_2_En_6_Fig1_HTML.jpg)


    **图 6-1**

    `LAG` 和 `LEAD` 函数的部分结果


    请注意结果中有几个 `NULL` 值。第 1 行是分区的第一行，你无法找到更早的行，因此 `PrevOrderDate` 和 `DaysSincePrevOrder`
    返回 `NULL`。第 3 行是分区的最后一行，分区中没有第 3 行之后的行，所以第 3 行的 `NextOrderDate` 和 `DaysUntilNextOrder`
    为 null。


    到目前为止，你已经了解了使用 `LAG` 和 `LEAD` 的默认方式。这两个函数各自有两个可选参数。第一个参数是 `Offset`，默认值为 1。默认情况下，`LEAD`
    从当前行之前的一行提取表达式，`LAG` 从当前行之后的一行提取表达式。通过使用 `Offset` 参数，你可以访问距离超过一行的行中的列。关于偏移量需要注意的一个有趣点是，它只允许正整数。使用
    `LAG` 时，正数表示“向后”；使用 `LEAD` 时，正数表示“向前”。使用 `Offset` 参数的语法如下：


    ```sql

    LAG( [,]) OVER()

    LEAD( [,]) OVER()

    ```


    列表 6-2 演示了如何使用 `Offset` 参数。


    ```sql

    --6-2.1 在 LAG 中使用 Offset

    WITH Totals AS (

    SELECT YEAR(OrderDate) AS OrderYear,

    MONTH(OrderDate)/4 + 1 AS OrderQtr,

    SUM(TotalDue) AS TotalSales

    FROM Sales.SalesOrderHeader

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)/4 + 1)

    SELECT OrderYear, Totals.OrderQtr, TotalSales,

    LAG(TotalSales, 4) OVER(ORDER BY OrderYear, OrderQtr)

    AS PreviousYearsSales

    FROM Totals

    ORDER BY OrderYear, OrderQtr;

    ```

    **列表 6-2**

    在 `LAG` 中使用 `Offset` 参数


    图 6-2 展示了结果。在此示例中，总计在一个 CTE 中按年和日历季度进行聚合。日历季度是通过计算月份、除以四再加一得到的。在外部查询中，通过使用偏移量为
    4 的 `LAG`，返回了同一季度上一年的销售额。请注意，此方法仅在数据中没有间隔时有效，因为它使用的是物理偏移量，而非逻辑偏移量。为了证明结果的正确性，请将第
    8 行（2013 年第一季度）的 `PreviousYearSales` 与第 4 行（2012 年第一季度）的 `TotalSales` 进行比较。


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig2_HTML.jpg](img/335106_2_En_6_Fig2_HTML.jpg)


    **图 6-2**

    在 `LAG` 中使用 `Offset` 的结果


    结果的前四行在 `PreviousYearSales` 中返回 `NULL`。这是因为在到达第 5 行之前，没有与当前行相距偏移量 4 的行。如果返回 `NULL`
    是个问题，你可以使用第二个可选参数，用默认值替换 `NULL`。要使用第二个参数，你也必须填写第一个参数。语法如下：


    ```sql

    LAG( [,] [,]) OVER()

    LEAD( [,] [,]) OVER()

    ```


    列表 6-3 演示了如何使用 `Default` 参数。


    ```sql

    --6-3.1 在 LAG 中使用 Offset 和 Default

    WITH Totals AS (

    SELECT YEAR(OrderDate) AS OrderYear,

    MONTH(OrderDate)/4 + 1 AS OrderQtr,

    SUM(TotalDue) AS TotalSales

    FROM Sales.SalesOrderHeader

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)/4 + 1)

    SELECT OrderYear, Totals.OrderQtr, TotalSales,

    LAG(TotalSales, 4, 0) OVER(ORDER BY OrderYear, OrderQtr)

    AS PreviousYearsSales

    FROM Totals

    ORDER BY OrderYear, OrderQtr;

    ```

    **列表 6-3**

    在 `LAG` 中使用 `Default` 参数


    图 6-3 展示了结果。此查询与列表 6-2 中的查询相同，只是增加了 `Default` 参数。`PreviousYearSales` 中的所有 `NULL`
    值都被更改为零。当然，你也可以在 `LEAD` 中同时使用 `Offset` 和 `Default`。


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig3_HTML.jpg](img/335106_2_En_6_Fig3_HTML.jpg)


    **图 6-3**

    在 `LAG` 中使用 `Default` 参数的结果

