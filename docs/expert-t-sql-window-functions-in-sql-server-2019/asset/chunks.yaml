    ## 小结


    自 SQL Server 2012 起可用的偏移函数 `LAG`、`LEAD`、`FIRST_VALUE` 和 `LAST_VALUE` 功能非常强大。它们不仅使编写从不同行提取值的查询变得容易，而且性能也非常出色，你将在第
    8 章亲身体会到。


    还有一组函数需要学习，即统计函数。第 7 章将教你掌握利用这些窗口函数所需的知识。


    # 7. 理解统计函数


    2012 年，微软为 SQL Server 新增了四个窗口函数。它们是统计函数 `PERCENT_RANK`、`CUME_DIST`、`PERCENTILE_CONT`
    和 `PERCENTILE_DISC`。这些函数使得分析来自科学、学术或体育等众多领域的数据变得容易。


    在本章中，你将学习如何使用这些统计函数。


    ## 使用 PERCENT_RANK 和 CUME_DIST


    还记得你在学校参加的那些标准化考试吗？你可能会得到每个测试领域（如数学或语言技能）的原始分数和百分比。百分比排名是一种计算群体中每个个体与其他人相比情况的方法。


    从 SQL Server 2012 开始，有两个函数可以对数据（如考试成绩，甚至身高）进行排名。假设有 100 名七年级学生按身高排队。我的孙子托马斯是个相当高的男孩，所以他可能会站在第
    95 位。他比其他 94 名学生都高。他的身高高于 94% 的身高，并且高于或等于 95% 的身高。托马斯身高的 `PERCENT_RANK` 是 0.9494，`CUME_DIST`（累积分布）是
    0.95。


    你可能会疑惑为什么 `PERCENT_RANK` 是 0.9494 而不是 0.94。`PERCENT_RANK` 的公式是：（排名值 - 1）除以（总数
    - 1）：`(rank-1)/(N-1)`。`CUME_DIST` 的公式是：排名值除以总数：`rank/N`。托马斯身高的 `PERCENT_RANK`
    可以通过 94 除以 99 得到，而不是 94 除以 100。


    就像所有其他窗口函数一样，使用这些函数时需要 `OVER` 子句。它必须包含一个 `ORDER BY` 表达式，用于确定分数或值的排列顺序。`PARTITION
    BY` 表达式是可选的。如果使用，则比较将在分区内进行，而不是跨分区。语法如下：


    ```sql

    PERCENT_RANK OVER([PARTITION BY <partition_column>] ORDER BY <order_column>)

    CUME_DIST OVER([PARTITION BY <partition_column>] ORDER BY <order_column>)

    ```


    列表 7-1 演示了如何使用这些函数来比较给定年份中每个月的销售额。


    ```sql

    --7-1.1 使用 PERCENT_RANK 和 CUME_DIST

    SELECT COUNT(*) NumberOfOrders, Month(OrderDate) AS OrderMonth,

    RANK() OVER(ORDER BY COUNT(*)) AS Ranking,

    PERCENT_RANK() OVER(ORDER BY COUNT(*)) AS PercentRank,

    CUME_DIST() OVER(ORDER BY COUNT(*)) AS CumeDist

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    GROUP BY  Month(OrderDate);

    ```


    列表 7-1: 使用 PERCENT_RANK 和 CUME_DIST


    图 7-1 展示了结果。该查询经过筛选，仅包含 2013 年的订单，并按月份分组。每个函数的 `ORDER BY` 表达式都是订单数量。回想一下，当你在聚合查询中使用窗口函数时，函数中使用的任何列都必须遵循
    `SELECT` 列表的规则。有关在聚合查询中添加窗口函数的更多信息，请参见第 3 章。第一行的 `PercentRank` 是 0。第一行的 `PercentRank`
    值始终为 0，因为该行未排在任何其他行之上。最后一行的 `PercentRank` 和 `CumeDist` 都将是 1，即 100%。除最后一行外的所有行中，`CumeDist`
    都大于 `PercentRank`。请注意，当出现并列情况时（如第 3 和第 4 行），值会重复。


    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig1_HTML.jpg](img/335106_2_En_7_Fig1_HTML.jpg)


    图 7-1: 使用 PERCENT_RANK 和 CUME_DIST 的结果


    这是另一个比较我居住的圣路易斯大都会区月平均最高气温的例子。运行列表 7-2 以创建并填充表格。


    ```sql

    --7-2.1 创建表

    CREATE TABLE #MonthlyTempsStl(MNo Int, MName varchar(15), AvgHighTempF INT, AvgHighTempC
    DECIMAL(4,2));

    --7-2.2 插入华氏温度行

    INSERT INTO #MonthlyTempsStl (Mno, Mname, AvgHighTempF)

    VALUES(1,''Jan'',40),(2,''Feb'',45),(3,''Mar'',55),(4,''Apr'',67),(5,''May'',77),(6,''Jun'',85),

    (7,''Jul'',89),(8,''Aug'',88),(9,''Sep'',81),(10,''Oct'',69),(11,''Nov'',56),(12,''Dec'',43);

    --7-2.3 计算摄氏温度

    UPDATE #MonthlyTempsStl

    SET AvgHighTempC = (AvgHighTempF - 32) * 5.0/9;

    --7-2.4 返回结果

    SELECT * FROM #MonthlyTempsStl;

    ```


    列表 7-2: 圣路易斯平均最高气温

