- fmt: '### Note


    If you would like to follow along with this example, a sample script to create
    the `StockAnalysisDemo` database and generated stock market data can be found
    along with the code for this chapter on the Apress site.


    For a quick look at how to solve this problem first by using one of the traditional
    methods and then by using `LAG`, review and run Listing [1-1](#335106_2_En_1_Chapter.xhtml#PC1).


    ```sql

    USE StockAnalysisDemo;

    GO

    --1-1.1 Using a subquery

    SELECT TickerSymbol, TradeDate, ClosePrice,

    (SELECT TOP(1) ClosePrice

    FROM StockHistory AS SQ

    WHERE SQ.TickerSymbol  = OQ.TickerSymbol

    AND SQ.TradeDate < OQ.TradeDate

    ORDER BY TradeDate DESC) AS PrevClosePrice

    FROM StockHistory AS OQ

    ORDER BY TickerSymbol, TradeDate;

    --1-1.2 Using LAG

    SELECT TickerSymbol, TradeDate, ClosePrice,

    LAG(ClosePrice) OVER(PARTITION BY TickerSymbol

    ORDER BY TradeDate) AS PrevClosePrice

    FROM StockHistory

    ORDER BY TickerSymbol, TradeDate;

    ```

    **Listing 1-1**

    Two Approaches to Solving the Stock Market Problem


    The partial results are shown in Figure [1-1](#335106_2_En_1_Chapter.xhtml#Fig1).
    Since the data is randomly generated, the values of `ClosePrice` and `PrevClosePrice`
    in the image will not match your values. Query 1 uses a correlated subquery, the
    old method, to select one `ClosePrice` for every outer row. By joining the `TickerSymbol`
    from the inner query to the outer query you ensure that you are not comparing
    two different stocks. The inner and outer queries are also joined by the `TradeDate`,
    but the `TradeDate` for the inner query must be less than the outer query to make
    sure you get the prior day. The inner query must also be sorted to get the row
    that has the latest data but still less than the current date. This query took
    over a minute to run on my laptop, which has 16GB of RAM and is using SSD storage.
    Almost 700,000 rows were returned.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig1_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig1_HTML.jpg)

    **Figure 1-1**

    Partial results of the stock market problem


    Query 2 uses the window function `LAG` to solve the same problem and produces
    the same results. Don’t worry about the syntax at this point; you will be an expert
    by the end of this book. The query using `LAG` took just 13 seconds to run on
    my laptop.


    By just looking at the code in Listing [1-1](#335106_2_En_1_Chapter.xhtml#PC1),
    you can see that Query 2 using `LAG` is much simpler to write, even though you
    may not understand the syntax just yet. It also runs much faster because it is
    just reading the table once instead of once per row like Query 1. As you continue
    reading this book and running the examples, you will learn how window functions
    like `LAG` will make your life easier and your customers happier!


    ## Thinking About the Window


    Window functions are different than regular functions because they operate over
    a set of rows, also called a *window*. This may sound similar to how aggregate
    functions work. Aggregate functions, such as `SUM` and `AVG`, operate on groups
    of rows and provide summary values. When you write an aggregate query, you lose
    the detail columns except for those in the `GROUP BY` clause.


    When adding a `GROUP BY` clause, instead of returning a summary along with all
    the rows, you will see a summary row, one row for each unique set of `GROUP BY`
    columns. For example, to get a count of the all the rows using an aggregate query,
    you must leave out the other columns. Once you add columns into the `SELECT` and
    `GROUP BY`, you get a count for each unique grouping, not the entire set of results.


    Queries with window functions are much different than traditional aggregate queries.
    There are no restrictions to the columns that appear in the `SELECT` list, and
    no `GROUP BY` clause is required. You can also add window functions to aggregate
    queries, and that will be discussed in Chapter [3](#335106_2_En_3_Chapter.xhtml).
    Instead of summary rows being returned, all the details are returned and the result
    of the expression with the window function is included as just another column.
    In fact, by using a window function to get the overall count of the rows, you
    could still include all of the columns in the table.


    Imagine looking through a window to see a specific set of rows while your query
    is running. You have one last chance to perform an operation, such as grabbing
    one of the columns from another row. The result of the operation is added as an
    additional column. You will learn how window functions really work as you read
    this book, but the idea of looking through the window has helped me understand
    and explain window functions to audiences at many SQL Server events. Figure [1-2](#335106_2_En_1_Chapter.xhtml#Fig2)
    illustrates this concept.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig2_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig2_HTML.jpg)

    **Figure 1-2**

    Looking through the window to perform an operation on a set of rows


    The window is not limited to the columns found in the `SELECT` list of the query.
    For example, if you take a look at the `StockHistory` table, you will see that
    there is also an `OpenPrice` column. The `OpenPrice` from one day is not the same
    as the `ClosePrice` from the previous day. If you wanted to, you could use `LAG`
    to include the previous `OpenPrice` in the results even though it is not included
    in the `SELECT` list originally.


    In the stock history example using `LAG`, each row has its own window where it
    finds the previous close price. When the calculation is performed on the third
    row of the data, the window consists of the second and third rows. When the calculation
    is performed on the fourth row, the window consists of the third and fourth rows.


    What would happen if the rows for `2017-12-02` were removed from the query by
    a `WHERE` clause? Does the window contain filtered-out rows? The answer is “No,”
    which brings up two very important concepts to understand when using window functions:
    where window functions may be used in the query and the logical order of operations.


    Window functions may only be used in the `SELECT` list and `ORDER BY` clause.
    You cannot filter or group on window functions. In situations where you must filter
    or group on the results of a window function, the solution is to separate the
    logic. You could use a temp table, derived table subquery, or a CTE and then filter
    or group in the outer query.


    Window functions operate after the `FROM`, `WHERE`, `GROUP BY`, and `HAVING` clauses.
    They operate before the `TOP` and `DISTINCT` clauses are evaluated. You will learn
    more about how `DISTINCT` and `TOP` affect queries with window functions in the
    “Uncovering Special Case Windows” section later in this chapter.


    The window is defined by the `OVER` clause. Notice in Query 2 of Listing [1-1](#335106_2_En_1_Chapter.xhtml#PC1)
    that the `LAG` function is followed by an `OVER` clause. Each type of window function
    has specific requirements for the `OVER` clause. The `LAG` function must have
    an `ORDER BY` expression and may have a `PARTITION BY` expression.


    ## Understanding the OVER Clause


    One thing that sets window functions apart is the `OVER` clause, which defines
    the window or set. With one exception I’ll explain in Chapter [7](#335106_2_En_7_Chapter.xhtml),
    window functions will have an `OVER` clause, and learning how to use the `OVER`
    clause is required to understand window functions. In some cases, the `OVER` clause
    will be empty. You will see empty `OVER` clauses in Chapter [3](#335106_2_En_3_Chapter.xhtml)
    when working with window aggregate functions.'
