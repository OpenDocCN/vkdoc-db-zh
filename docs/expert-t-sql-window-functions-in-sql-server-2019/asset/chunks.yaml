    \n![../images/335106_2_En_BookFrontmatter_Figb_HTML.jpg](images/335106_2_En_BookFrontmatter_Figb_HTML.jpg)\n\
    \n# Foreword\n\n`SQL` was developed in the 1970s and became standardized through\
    \ `ANSI`-approved committees as a formal standard starting in 1986. Today in 2019,\
    \ `SQL` has become the most widely used declarative language. Along the way, window\
    \ functions have come to be an important part of that standard. `ANSI` does not\
    \ make standards but plays an important role in documenting and preserving them.\
    \ The individual software vendors voluntarily decide to comply, and it’s the work\
    \ of the authors of books like this one to explain `SQL` use in practical terms.\n\
    \nIn my own career in data science and advanced analytics, window functions have\
    \ been an important part of several key projects in the past few years. Several\
    \ years ago, I made a YouTube video for a user group based on the earlier edition\
    \ of this book. Since then, as a career architect at Microsoft, I have advised\
    \ the application for data science. In one project, the input of about 20 features\
    \ was not yielding adequate results: using window functions, a team under my leadership\
    \ (and yes, direct coding) quickly grew that number to over 1,000. More than numeric\
    \ growth, the accuracy rates improved, and on the business story, the organization\
    \ is saving millions of dollars annually for their question. In the past month,\
    \ I have encountered an unrelated new project, and a similar story is there: a\
    \ time-series type of data set and an opportunity to grow from under 20 features\
    \ to a number much larger.\n\nOne wonders whether automated machine learning technologies\
    \ would make such combinations on their own, and I’m skeptical. Making a robust\
    \ set of features from window functions requires not just time-series considerations\
    \ but also clustering knowledge based on knowing the data domain. Even if automated\
    \ technologies make great progress in this topic, I anticipate the need for any\
    \ data scientist to have simple knowledge of these functions for the more typical\
    \ data science investigation which has only a few features and low number of observations.\n\
    \n`SQL` is central to on-premise and cloud database technologies – and in the\
    \ data science world, many use `Apache Spark` (`SQL Server 2019` and so many other\
    \ data technologies). This reach into advanced analytics is yet another reason\
    \ why this topic is an expert-level subject in the `SQL` language. The mainstream\
    \ applications extend from any business analytics `SQL` query and even into supporting\
    \ advanced analytics and machine learning algorithms.\n\nOver the years, it’s\
    \ been an honor to individually know Kathi Kellenberger and Clayton Groom as respected\
    \ peers and professionals and to see how they have each become important leaders\
    \ to the technical user community through many presentations (for which they typically\
    \ volunteer their own time) and through the creation and now revision of this\
    \ book. In this revision, Ed Pollack has applied material on baseball statistics,\
    \ illustrating that not every time series is about money. It’s not enough to have\
    \ a standard written, but one needs to have expert coaches to explain how these\
    \ functions describe an approach for business analytics. This book has rich examples\
    \ and altogether provides a clear path into one of the most mathematically complex\
    \ and yet practically useful aspects of the `SQL` language.\n\n> Mark Tabladillo,\
    \ Ph.D.\n> \n> Cloud Solution Architect, Microsoft\n\n# Introduction\n\nSeveral\
    \ years ago, I would create a user group presentation for each new version of\
    \ `SQL Server` about the new `T-SQL` features. There was so much to say in 2012\
    \ that I decided to build a presentation on just the windowing functions introduced\
    \ that year. Eventually, I had so much material that it turned into two sessions.\
    \ Over the years, I have probably presented this information at least 50 times\
    \ at events around the United States and the United Kingdom. Despite that, most\
    \ people still are not using windowing functions because they haven’t heard about\
    \ them or do not realize the benefits.\n\n## What’s in This Book?\n\nThis book\
    \ covers each type of windowing function beginning with the ranking functions\
    \ introduced with `SQL Server 2005` through the statistical functions introduced\
    \ in 2012. Each chapter explains how to use the functions along with any options\
    \ and provides a few simple examples of how to use them. Unfortunately, the last\
    \ time that Microsoft added any new windowing functions was 2012, but there have\
    \ been some performance improvements more recently. One chapter is dedicated to\
    \ the performance of windowing functions.\n\nFinally, the last two chapters in\
    \ the book cover some real-world examples. In `Chapter 9`, you’ll learn how to\
    \ analyze a large data set, over 100 years of baseball statistics. `Chapter 10`\
    \ and `Chapter 11` show how windowing functions can be used in data warehouse\
    \ calculations instead of building a cube.\n\n## Intended Audience\n\nThis book\
    \ is meant for people who already have good `T-SQL` skills. They know how to join\
    \ tables, use subqueries and `CTEs`, and write aggregate queries. Despite these\
    \ skills, they occasionally run into problems that are not easy to solve in a\
    \ set-based manner. Without windowing functions, some of these problems can only\
    \ be solved by using cursors or expensive triangular joins. By using the concepts\
    \ taught in this book, your `T-SQL` skills will improve to the next level. Once\
    \ you start using windowing functions, you’ll find even more reasons to learn\
    \ them."
