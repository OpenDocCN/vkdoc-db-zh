    (7,5),(8,10),(9,13),

    (10,12),(11,NULL);

    --4-4.3 Display the results

    SELECT * FROM #TheTable;

    Listing 4-4

    Creating and Populating the Table

    ```


    Figure [4-6](#335106_2_En_4_Chapter.xhtml#Fig6) shows the raw data in the table.
    Notice that rows 3, 4, 6, and 11 have `NULL` in the `Data` column. The solution
    will replace the `NULL` with 1 for rows 3 and 4, with 6 for row 6, and with 12
    for row 11.


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig6_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    The data for the last good value problem


    I found Itzik’s solution to be quite elegant and brilliant. It takes advantage
    of the fact that you can use any of the aggregate functions as accumulating window
    aggregates, not just `SUM` and `AVG`. Take a look at row 4\. The value needed
    to replace the `NULL` is the `Data` value from row 2\. The `ID` of row 2 is also
    the maximum `ID` for the rows leading up to row 4 that are not `NULL` in the `Data`
    column. A window that starts at row 1 of a partition and goes up to the current
    row is the same window that you need for a running total! You can take advantage
    of this fact to find the maximum `ID` leading up to the current row where the
    `Data` value is not `NULL`. Listing [4-5](#335106_2_En_4_Chapter.xhtml#PC7) shows
    step 1 of this solution.


    ```

    --4-5.1 Find the max non-null row

    SELECT ID, Data,

    MAX(CASE WHEN Data IS NOT NULL THEN ID END)

    OVER(ORDER BY ID) AS MaxRowID

    FROM #TheTable;

    Listing 4-5

    Step 1 of the Solution

    ```


    Figure [4-7](#335106_2_En_4_Chapter.xhtml#Fig7) shows the results so far. The
    `MaxRowID` column is the `ID` from the row that contains the `Data` value that
    each row needs. The `MAX` function finds the largest `ID` value for rows that
    have a non-`NULL Data` value up to the current row.


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig7_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig7_HTML.jpg)


    Figure 4-7


    The results of step 1


    My first thought is that I could use the `MaxRowID` column to join the table to
    itself, but take a look at this data closely. Within each group of rows with the
    same `MaxRowID` value, there is one non-`NULL Data` row, and the rest are `NULL`.
    There are three rows where MaxRowID is 2\. Only one of those rows has a non-`NULL
    Data` value. My next thought is to just group by `MaxRowID` and use the `MAX`
    function on the `Data` column. The problem is that you would lose the details
    that you need to see by doing so. But window aggregates let you add an aggregate
    function without changing the query to an aggregate query. Instead of grouping
    on `MaxRowID`, partition on it. Listing [4-6](#335106_2_En_4_Chapter.xhtml#PC8)
    shows the complete solution.


    ```

    --4-6.1 The solution

    WITH MaxData AS

    (SELECT ID, Data,

    MAX(CASE WHEN Data IS NOT NULL THEN ID END)

    OVER(ORDER BY ID) AS MaxRowID

    FROM #TheTable)

    SELECT ID, Data,

    MAX(Data) OVER(PARTITION BY MaxRowID) AS NewData

    FROM MaxData;

    Listing 4-6

    The Complete Solution

    ```


    Figure [4-8](#335106_2_En_4_Chapter.xhtml#Fig8) shows the results. The first part
    of the solution is added to a CTE. In the outer query, the `MAX` function is used
    to find the maximum `Data` value, actually the only one that is not `NULL`, partitioned
    by the `MaxRowID`.


    ![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig8_HTML.jpg](images/335106_2_En_4_Chapter/335106_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    The complete results of the Last Good Value Problem


    The solution seems quite simple once you see it. Thanks to Itzik Ben-Gan for figuring
    this out.'
  trans: '


    ### 上一个有效值问题


    我在一个论坛上看到这个问题，有几个人尝试过解决。最好的解决方案是由 T-SQL 专家 Itzik Ben-Gan 开发的。


    该问题所用的表有两列。第一列 `ID` 是一个递增的整数，是表的主键。第二列可能包含 `NULL` 值。任务是将每个 `NULL` 替换为前一个非 `NULL`
    值。


    #### 清单 4-4：创建并填充表


    以下代码创建并填充表，并显示各行数据。


    ```sql

    --4-4.1 创建表

    CREATE TABLE #TheTable(ID INT, Data INT);

    --4-4.2 填充表

    INSERT INTO #TheTable(ID, Data)

    VALUES(1,1),(2,1),(3,NULL),

    (4,NULL),(5,6),(6,NULL),

    (7,5),(8,10),(9,13),

    (10,12),(11,NULL);

    --4-4.3 显示结果

    SELECT * FROM #TheTable;

    ```


    #### 图 4-6：上一个有效值问题的原始数据


    图 4-6 显示了表中的原始数据。注意第 3、4、6 和 11 行的 `Data` 列为 `NULL`。解决方案将用 1 替换第 3 和第 4 行的 `NULL`，用
    6 替换第 6 行的，用 12 替换第 11 行的。


    ![上一个有效值问题的原始数据](img/335106_2_En_4_Fig6_HTML.jpg)


    我发现 Itzik 的解决方案非常优雅和巧妙。它利用了这样一个事实：你可以使用任何聚合函数作为累积窗口聚合，而不仅仅是 `SUM` 和 `AVG`。看一下第
    4 行。需要用来替换 `NULL` 的值是第 2 行的 `Data` 值。第 2 行的 `ID` 也是从第 1 行到第 4 行中，`Data` 列非 `NULL`
    的所有行中的最大 `ID`。一个从分区第 1 行开始一直到当前行的窗口，与计算运行总计所需的窗口是相同的！你可以利用这个事实来找到截至当前行、`Data`
    值非 `NULL` 的最大 `ID`。


    #### 清单 4-5：解决方案步骤 1


    ```sql

    --4-5.1 找到最大的非空行

    SELECT ID, Data,

    MAX(CASE WHEN Data IS NOT NULL THEN ID END)

    OVER(ORDER BY ID) AS MaxRowID

    FROM #TheTable;

    ```


    #### 图 4-7：步骤 1 的结果


    图 4-7 显示了目前的结果。`MaxRowID` 列是每一行所需的 `Data` 值所在行的 `ID`。`MAX` 函数查找截至当前行、`Data` 值非
    `NULL` 的所有行中的最大 `ID` 值。


    ![步骤 1 的结果](img/335106_2_En_4_Fig7_HTML.jpg)


    我最初的想法是，我可以使用 `MaxRowID` 列将表与自身连接，但仔细看看这些数据。在 `MaxRowID` 值相同的每一组行中，有一行非 `NULL`
    的 `Data`，其余都是 `NULL`。有三行的 `MaxRowID` 是 2。其中只有一行有非 `NULL` 的 `Data` 值。我接下来的想法是直接按
    `MaxRowID` 分组，并对 `Data` 列使用 `MAX` 函数。但问题在于，这样做会丢失你需要查看的细节信息。然而，窗口聚合函数允许你在不将查询更改为聚合查询的情况下添加聚合函数。与其在
    `MaxRowID` 上分组，不如按它进行分区。


    #### 清单 4-6：完整解决方案


    ```sql

    --4-6.1 解决方案

    WITH MaxData AS

    (SELECT ID, Data,

    MAX(CASE WHEN Data IS NOT NULL THEN ID END)

    OVER(ORDER BY ID) AS MaxRowID

    FROM #TheTable)

    SELECT ID, Data,

    MAX(Data) OVER(PARTITION BY MaxRowID) AS NewData

    FROM MaxData;

    ```


    #### 图 4-8：上一个有效值问题的完整结果


    图 4-8 显示了结果。解决方案的第一部分被添加到了一个 CTE 中。在外层查询中，`MAX` 函数用于查找最大的 `Data` 值（实际上是唯一非 `NULL`
    的那个值），并按 `MaxRowID` 进行分区。


    ![上一个有效值问题的完整结果](img/335106_2_En_4_Fig8_HTML.jpg)


    一旦看到这个解决方案，它似乎就变得相当简单了。感谢 Itzik Ben-Gan 想出了这个方法。

    '
- fmt: '## The Subscription Problem


    In today’s world, many of us do not have magazine or newspaper subscriptions,
    but they were very popular not too long ago. Customers subscribed to the publication
    and sometimes cancelled at some point. In this problem, you must calculate the
    number of active subscriptions at the end of each month. There will be cancellation
    dates past the latest subscription date, and you can ignore those rows.


    The most intuitive way to solve this problem is by using a temp table with a row
    for each month. Loop through each row of the data and add or subtract based on
    the start and stop dates. Unfortunately, this method runs extremely slow. Using
    the accumulating aggregate functionality makes this problem easy to solve, and
    it runs fast!


    To get started, create a temp table with some random registration data. Since
    this is random, your final results will not match mine. This script creates a
    table holding 100,000 rows, but you can adjust that number if you wish. Listing
    [4-7](#335106_2_En_4_Chapter.xhtml#PC9) creates and populates the table.


    ```sql

    --4-7.1 Create the temp table

    CREATE TABLE #Registrations(ID INT NOT NULL IDENTITY PRIMARY KEY,

    DateJoined DATE NOT NULL, DateLeft DATE NULL);

    --4-7.2 Variables

    DECLARE @Rows INT = 10000, @Years INT = 5, @StartDate DATE = ''2019-01-01''

    --4-7.3 Insert 10,000 rows with five years of possible dates

    INSERT INTO #Registrations (DateJoined)

    SELECT TOP(@Rows) DATEADD(DAY,CAST(RAND(CHECKSUM(NEWID())) * @Years * 365  as
    INT) ,@StartDate)

    FROM sys.objects a

    CROSS JOIN sys.objects b

    CROSS JOIN sys.objects c;

    --4-7.4 Give cancellation dates to 75% of the subscribers

    UPDATE TOP(75) PERCENT #Registrations

    SET DateLeft = DATEADD(DAY,CAST(RAND(CHECKSUM(NEWID())) * @Years * 365  as INT),DateJoined)

    --4-7.5 The subscription data

    SELECT *

    FROM #Registrations

    ORDER BY DateJoined;

    ```

    Listing 4-7

    Create the Subscription Table


    The partial results will look something like Figure [4-9](#335106_2_En_4_Chapter.xhtml#Fig9).


    ![`../images/335106_2_En_4_Chapter/335106_2_En_4_Fig9_HTML.jpg`](images/335106_2_En_4_Chapter/335106_2_En_4_Fig9_HTML.jpg)

    Figure 4-9

    The partial subscription data


    If you read an article ([`www.red-gate.com/simple-talk/sql/performance/writing-efficient-sql-set-based-speed-phreakery/`](http://www.red-gate.com/simple-talk/sql/performance/writing-efficient-sql-set-based-speed-phreakery/))
    I wrote back in 2009 to solve a similar problem, you’ll see that efficient code
    was also complicated and hard to understand. In the article, I explained a solution
    by T-SQL guru Peter Larsson that used a temp table, `UNPIVOT`, and an unsupported
    “quirky” update. Armed with SQL Server 2012, a solution to this problem is very
    easy to write, and it performs well. Listing [4-8](#335106_2_En_4_Chapter.xhtml#PC10)
    shows the solution.


    ```sql

    --4-8.1 Solve the subscription problem

    WITH NewSubs AS (

    SELECT EOMONTH(DateJoined) AS TheMonth,

    COUNT(DateJoined) AS PeopleJoined

    FROM #Registrations

    GROUP BY EOMONTH(DateJoined)),

    Cancelled AS (

    SELECT EOMONTH(DateLeft) AS TheMonth,

    COUNT(DateLeft) AS PeopleLeft

    FROM #Registrations

    GROUP BY EOMONTH(DateLeft))

    SELECT NewSubs.TheMonth AS TheMonth, NewSubs.PeopleJoined,

    Cancelled.PeopleLeft,

    SUM(NewSubs.PeopleJoined - ISNULL(Cancelled.PeopleLeft,0))

    OVER(ORDER BY NewSubs.TheMonth) AS Subscriptions

    FROM NewSubs

    LEFT JOIN Cancelled ON NewSubs.TheMonth = Cancelled.TheMonth;

    ```

    Listing 4-8

    Solving the Subscription Problem with SQL Server 2012 Functionality


    The partial results are shown in Figure [4-10](#335106_2_En_4_Chapter.xhtml#Fig10).
    The first step is to get a count by month for new subscriptions and cancellations.
    To do that, the data must be grouped by month. In this case, the `EOMONTH` function
    is used, which changes each date to the last day of the month.


    ![`../images/335106_2_En_4_Chapter/335106_2_En_4_Fig10_HTML.jpg`](images/335106_2_En_4_Chapter/335106_2_En_4_Fig10_HTML.jpg)

    Figure 4-10

    Partial results of the Subscription Problem


    The new subscription and cancellation counts are separated into CTEs to get the
    `PeopleJoined` and `PeopleLeft` values, respectively, for each month. The outer
    query joins the `NewSubs` CTE to the `Cancelled` CTE with a `LEFT JOIN` because
    there are many months with no cancellations. The sum of `PeopleJoined` minus `PeopleLeft`
    after `PeopleLeft` is corrected for `NULL` is calculated as a running total.


    The query was very easy to write and runs pretty fast. It ran in less than 100
    milliseconds on my Azure virtual machine against 100,000 rows.


    ## Summary


    Starting with SQL Server 2012, adding an `ORDER BY` to the `OVER` clause changes
    a window aggregate into an accumulating window aggregate. This lets you easily
    create running totals plus moving totals and averages. You are not limited to
    using this functionality for just sums and averages, however. The `MAX` function
    was also used to solve a difficult problem.


    You were briefly introduced to frames in this chapter when looking at moving sums
    and averages. Chapter [5](#335106_2_En_5_Chapter.xhtml) takes a deep look at frames.


    ---


    ## 5. Adding Frames to the Window


    You have looked through the window and used it to write powerful queries to solve
    some common problems. You have partitioned it like the smaller panes in a large
    window. Now you will learn how to create very granular windows, much like stained
    glass, with the use of frames.


    In this chapter, you will learn how framing, where it is supported, is so important
    for the accuracy of the results. The frame is also important for performance,
    but you will learn about that in Chapter [8](#335106_2_En_8_Chapter.xhtml).'
