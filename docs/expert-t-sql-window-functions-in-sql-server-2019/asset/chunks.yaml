    ## 期间至今计算


    期间至今（Period-to-date）计算是财务报告的主要内容，但众所周知，在不借助多个`CTE`或临时表的情况下，很难将其整合到基于查询的报告中。通常，分组是在`SQL
    Server Reporting Services`或`Excel`等报告工具中执行的，以提供聚合结果，但这仍然可能很棘手。你将通过接下来的示例学习如何通过在`ORDER
    BY`子句后添加一个`FRAME`子句，在单个结果集中创建多级滚动总计。`FRAME`子句在第 5 章有更详细的介绍。


    列表 10-5 演示了如何使用帧定义来按日期、按产品计算月份、季度和年份的期间至今总计。基本查询与之前基本相同，但粒度级别是日期级别而不是月份级别。这样你就可以更详细地查看聚合列的结果。


    ```

    --10.5 日级别聚合，包含 MTD、QTD、YTD 的滚动总计

    SELECT f.OrderDate,

    f.ProductKey,

    YEAR(f.orderdate) AS OrderYear,

    MONTH(f.orderdate) AS OrderMonth,

    SUM(f.SalesAmount) AS [Sales],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate),

    MONTH(f.orderdate)

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales MTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate),

    DATEPART(QUARTER, f.OrderDate)

    ORDER BY f.productkey, YEAR(f.orderdate), MONTH(f.orderdate)

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales QTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey, YEAR(f.orderdate)

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales YTD],

    SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.productkey

    ORDER BY f.productkey, f.orderdate

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [Sales Running Total]

    FROM dbo.FactInternetSales AS f

    GROUP BY f.orderdate, f.ProductKey, YEAR(f.orderdate), MONTH(f.orderdate)

    ORDER BY f.ProductKey, f.OrderDate;

    ```

    列表 10-5

    按日期计算期间至今运行总计


    列表 10-5 所示的 `OVER` 子句示例使用了 `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`
    帧。这导致计算聚合从帧的开始到当前行的所有行，为你提供在 `PARTITION` 子句中指定的级别的正确至今总计。例如，`[Sale Amt MTD]` 聚合列将计算从本月的第一天（第一个无界前置行）到当前行的
    `SUM([SalesAmount])`。当使用 `FRAME` 子句时，`ORDER BY` 子句成为必需，为帧提供在 `PARTITION` 中按顺序遍历行的上下文。


    图 10-4 显示了部分结果。列 [`Sales MTD], [Sales QTD]` 和 [`Sales YTD]` 的值会增加，直到遇到不同的 [`ProductKey]`
    或 [`ProductKey]` 和时间级别（月份和季度）。图 10-4 中的结果显示聚合在第二季度末中断，因此通过查看 `[ProductKey]` 等于
    311、312 或 313 的行，你可以看到 MTD 和 QTD 聚合在 10 月 1 日重置。


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig4_HTML.jpg](img/335106_2_En_10_Fig4_HTML.jpg)


    图 10-4


    列表 10-5 在季度末（9 月 30 日）的部分结果


    ## 平均值和移动平均值'
- fmt: '### Handling Gaps in Date Ranges


    Before moving on to more involved examples, you need to stop and consider the
    challenges faced when working with dates. Dates as a data type are continuous
    and sequential. The T-SQL functions that work with dates are written with this
    in mind and handle any involved date math correctly. In reality, data based on
    dates will not be continuous. Transaction data will have gaps where there is no
    data for a day, week, or possibly even a month or more.


    Window functions are not date aware, so it is up to you to ensure that any aggregate
    calculations handle gaps in the data correctly. If you use the `LEAD()` and `LAG()`
    window functions over date ranges or date period ranges, you have to provide partitions
    in your result sets that contain continuous and complete sets of dates, months,
    quarters, or years as needed by your calculations. Failure to do so will result
    in incorrect results. The reason for this is that the `LEAD()` and `LAG()` functions
    operate over the result set of the query, moving the specified number of rows
    forward or backward in the result set, regardless of the number of days or months
    represented.


    For example, a 3-month rolling average implemented incorrectly using window functions
    won’t take into account cases where there is no data for a product in a given
    month. It will perform the frame subset over the data provided and produce an
    average over the prior three months, regardless of whether they are contiguous
    months or not. Listing [10-6](#335106_2_En_10_Chapter.xhtml#PC8) demonstrates
    how not accounting for gaps in a date range will result in incorrect or misleading
    results. In this example, the data is being aggregated to the month level by removing
    any grouping reference to `[OrderDate]`:


    ```sql

    --10.6 Handling gaps in dates, Month level: not handling gaps

    SELECT ROW_NUMBER()

    OVER(ORDER BY f.ProductKey, YEAR(f.OrderDate), MONTH(f.OrderDate))

    AS [RowID],

    f.ProductKey,

    YEAR(f.OrderDate) AS OrderYear,

    MONTH(f.OrderDate) AS OrderMonth,

    ROUND(SUM(f.SalesAmount), 2) AS [Sales], -- month level

    ROUND(SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.ProductKey, YEAR(f.OrderDate)

    ORDER BY f.ProductKey, YEAR(f.OrderDate), MONTH(f.OrderDate)

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ), 2) AS [Sales YTD],

    ROUND(AVG(SUM(f.SalesAmount))

    OVER(PARTITION BY f.ProductKey

    ORDER BY f.ProductKey, YEAR(f.OrderDate), MONTH(f.OrderDate)

    ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

    ),2) AS [3 Month Moving Avg]

    FROM [dbo].[FactInternetSales] AS f

    WHERE ProductKey = 332

    AND f.OrderDate BETWEEN ''2010-12-01'' AND ''2011-12-31''

    GROUP BY f.ProductKey, YEAR(f.OrderDate), MONTH(f.OrderDate)

    ORDER BY f.ProductKey ,YEAR(f.OrderDate), MONTH(f.OrderDate)

    Listing 10-6

    Incorrectly Handling Gaps Dates

    ```


    Notice in the results in Figure [10-5](#335106_2_En_10_Chapter.xhtml#Fig5) that
    for the time range selected, only 9 months are represented. Calculating a moving
    average over the range of months that contain no data will produce incorrect results.
    You will learn how to address this next by filling in the gaps.


    ![`` `../images/335106_2_En_10_Chapter/335106_2_En_10_Fig5_HTML.jpg` ``](images/335106_2_En_10_Chapter/335106_2_En_10_Fig5_HTML.jpg)


    *Figure 10-5*

    *Incorrect calculation of a moving average*


    In order to address this problem, a supplementary “Date” table needs to be used
    to fill in the gaps in the transaction data. This is not a new problem and has
    been solved in data warehouse designs by including a “Date” dimension table that
    contains a row for every date in a specified range of years. The AdventureWorksDW
    database contains a table `DimDate` that will be used in the following examples.
    If you do not have a date dimension at your disposal, you can also use a common
    table expression (CTE) to create a date dimension table. The use of a table of
    date values will result in much better performance over using a CTE. An example
    CTE-derived calendar dimension view is included in the code download.


    In Listing [10-7](#335106_2_En_10_Chapter.xhtml#PC9), the `DimDate` table is cross
    joined with the `DimProduct` table to produce a set containing all products for
    all dates in the specified range. The resulting CTE “table” is used as the primary
    table in the SELECT portion of the query so that every date in the range is represented
    in the aggregated results for every product even if there were no transactions
    for that product in a given time period. You can also pick up additional attributes
    from the product table such as product category, color, etc., row counts, and
    distinct counts from the fact table. These can be used to create additional statistics.
    In Figure [10-6](#335106_2_En_10_Chapter.xhtml#Fig6), you can see that `[ProductAlternateKey]`
    is added and takes the place of `[ProductKey]` in all grouping operations in order
    to make the results more user-friendly.


    ![`` `../images/335106_2_En_10_Chapter/335106_2_En_10_Fig6_HTML.jpg` ``](images/335106_2_En_10_Chapter/335106_2_En_10_Fig6_HTML.jpg)


    *Figure 10-6*

    *Moving average, taking gaps in sales data into account*


    ```sql

    --10.7 month level. Now handling gaps in transaction dates

    WITH CTE_ProductPeriod

    AS (

    SELECT p.ProductKey, p.ProductAlternateKey as [ProductID],

    Datekey, CalendarYear,

    CalendarQuarter, MonthNumberOfYear AS CalendarMonth

    FROM DimDate AS d

    CROSS JOIN DimProduct p

    WHERE d.FullDateAlternateKey BETWEEN ''2011-01-01'' AND ''2013-12-31''

    AND EXISTS(SELECT * FROM FactInternetSales f

    WHERE f.ProductKey = p.ProductKey

    AND f.OrderDate BETWEEN ''2011-01-01'' AND ''2013-12-31'')

    )

    SELECT      ROW_NUMBER()

    OVER(ORDER BY p.[ProductID],

    p.CalendarYear,

    p.CalendarMonth

    ) as [RowID],

    p.[ProductID],

    p.CalendarYear  AS OrderYear,

    p.CalendarMonth AS OrderMonth,

    ROUND(SUM(COALESCE(f.SalesAmount,0)), 2) AS [Sales],

    ROUND(SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY p.[ProductID], p.CalendarYear

    ORDER BY P.[ProductID], p.CalendarYear, p.CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ), 2) AS [Sales YTD],

    ROUND(SUM(SUM(COALESCE(f.SalesAmount, 0)))

    OVER(PARTITION BY p.[ProductID]

    ORDER BY p.[ProductID], p.CalendarYear, p.CalendarMonth

    ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

    ) / 3, 2) AS [3 Month Moving Avg]

    FROM CTE_ProductPeriod AS p

    LEFT OUTER JOIN [dbo].[FactInternetSales]  AS f

    ON p.ProductKey = f.ProductKey

    AND p.DateKey = f.OrderDateKey

    WHERE p.ProductKey = 332

    AND p.CalendarYear =  2011

    GROUP BY p.[ProductID], p.CalendarYear, p.CalendarMonth

    ORDER BY p.[ProductID], p.CalendarYear, p.CalendarMonth

    Listing 10-7

    Correctly Handling Gaps in Dates

    ```


    Compare the results of the two previous queries. The `[3 Month Moving Avg]` column
    is now correct for the months where there were no sales for the product (February,
    March, November) and for the months immediately after the empty periods (May,
    June, December). The calculation in the second query did not use the `AVG()` function
    but rather divides the `SUM()` by three to arrive at the average. This ensures
    a more accurate average for the first three periods. In the following sections,
    you will learn how to limit calculations only to ranges that are complete when
    calculating moving averages.'
