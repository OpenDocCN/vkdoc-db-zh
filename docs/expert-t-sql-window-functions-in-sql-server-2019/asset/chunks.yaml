- fmt: '## Understanding LAG and LEAD


    You saw how to use `LAG` in Chapter [1](#335106_2_En_1_Chapter.xhtml) to solve
    the stock market problem. Based on the `ORDER BY` expression of the `OVER` clause,
    you can use `LAG` to include a column from a row earlier in the results and `LEAD`
    to include a column later in the results. Framing is not supported with `LAG`
    and `LEAD`, so you don’t have to worry about performance most of the time. Partitioning
    is optional, just as for other window functions, and `ORDER BY` is required. Here
    is the basic syntax:


    ```sql

    LAG () OVER([PARTITION BY ] ORDER BY )

    LEAD () OVER([PARTITION BY ] ORDER BY )

    ```


    Run Listing [6-1](#335106_2_En_6_Chapter.xhtml#PC2) to see `LAG` and `LEAD` in
    action.


    ```sql

    --6-1.1 Use LAG and LEAD

    SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

    LAG(CAST(OrderDate AS DATE)) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS PrevOrderDate,

    LEAD(CAST(OrderDate AS DATE)) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS NextOrderDate

    FROM Sales.SalesOrderHeader;

    --6-1.2 Use LAG and LEAD as an argument

    SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

    DATEDIFF(DAY,LAG(OrderDate)

    OVER(PARTITION BY CustomerID ORDER BY SalesOrderID), OrderDate)

    AS DaysSincePrevOrder,

    DATEDIFF(DAY, OrderDate, LEAD(OrderDate)

    OVER(PARTITION BY CustomerID ORDER BY SalesOrderID))

    AS DaysUntilNextOrder

    FROM Sales.SalesOrderHeader;

    ```

    **Listing 6-1**

    Using `LAG` and `LEAD`


    Figure [6-1](#335106_2_En_6_Chapter.xhtml#Fig1) shows the partial results. Query
    1 uses the `LAG` and `LEAD` functions to find the previous and next order dates
    relative to the current row. The argument for the functions is the `OrderDate`
    cast to the `DATE` data type. Just like the other window functions, `PARTITION
    BY` is optional. In this case, the data is partitioned by the `CustomerID`. The
    `ORDER BY` is a very important part of the `OVER` clause. It determines which
    row is the previous row and which row is the next row. Query 2 has the same `OVER`
    clauses as Query 1. The difference is that the `LAG` and `LEAD` expressions are
    used as arguments to the `DATEDIFF` functions to determine the number of days
    between orders.


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig1_HTML.jpg](images/335106_2_En_6_Chapter/335106_2_En_6_Fig1_HTML.jpg)


    **Figure 6-1**

    Partial results of the `LAG` and `LEAD` functions


    Note that there are several `NULL` values in the results. Row 1 is the first row
    of the partition. You cannot find an earlier row, so `NULL` is returned for `PrevOrderDate`
    and `DaysSincePrevOrder`. Row 3 is the final row of the partition. There is no
    row past row 3 in the partition so `NextOrderDate` and `DaysUntilNextOrder` are
    null for row 3.


    So far, you have seen the default ways to use `LAG` and `LEAD`. These functions
    each have two optional parameters. The first parameter is the `Offset`, which
    is 1 by default. By default, `LEAD` pulls an expression from one row before the
    current row, and `LAG` pulls an expression from one row past the current row.
    By using the `Offset` parameter, you can access columns from rows farther away
    than one. One interesting thing to note about the offset is that only positive
    integers are allowed. When using `LAG`, a positive number means “go backward.”
    When using `LEAD`, a positive number means “go forward.” Here is the syntax for
    using the `Offset` parameter:


    ```sql

    LAG( [,]) OVER()

    LEAD( [,]) OVER()

    ```


    Listing [6-2](#335106_2_En_6_Chapter.xhtml#PC4) demonstrates how to use the `Offset`
    parameter.


    ```sql

    --6-2.1 Using Offset with LAG

    WITH Totals AS (

    SELECT YEAR(OrderDate) AS OrderYear,

    MONTH(OrderDate)/4 + 1 AS OrderQtr,

    SUM(TotalDue) AS TotalSales

    FROM Sales.SalesOrderHeader

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)/4 + 1)

    SELECT OrderYear, Totals.OrderQtr, TotalSales,

    LAG(TotalSales, 4) OVER(ORDER BY OrderYear, OrderQtr)

    AS PreviousYearsSales

    FROM Totals

    ORDER BY OrderYear, OrderQtr;

    ```

    **Listing 6-2**

    Using the `Offset` Parameter with `LAG`


    Figure [6-2](#335106_2_En_6_Chapter.xhtml#Fig2) shows the results. In this example,
    the total is aggregated by the year and calendar quarter in a CTE. The calendar
    quarter is calculated by finding the month, dividing by four and adding one. In
    the outer query, by using `LAG` with an offset of four, the previous year’s sales
    for the same quarter are returned. Note that this method will only work if there
    are no gaps in the data, since it is using a physical offset and not a logical
    one. To prove that the results are correct, compare the `PreviousYearSales` of
    row 8, the first quarter of 2013, to the `TotalSales` of row 4, the first quarter
    of 2012.


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig2_HTML.jpg](images/335106_2_En_6_Chapter/335106_2_En_6_Fig2_HTML.jpg)


    **Figure 6-2**

    The results of using the `Offset` with `LAG`


    The first four rows of the results return `NULL` for the `PreviousYearSales`.
    That is because there is no row with an offset of four from the current row until
    you get to row 5. If returning `NULL`s is a problem, you can use the second optional
    parameter to replace `NULL`s with a default value. In order to use the second
    parameter, you must also fill in the first parameter. Here is the syntax:


    ```sql

    LAG( [,] [,]) OVER()

    LEAD( [,] [,]) OVER()

    ```


    Listing [6-3](#335106_2_En_6_Chapter.xhtml#PC6) demonstrates how to use the `Default`
    parameter.


    ```sql

    --6-3.1 Using Offset with LAG

    WITH Totals AS (

    SELECT YEAR(OrderDate) AS OrderYear,

    MONTH(OrderDate)/4 + 1 AS OrderQtr,

    SUM(TotalDue) AS TotalSales

    FROM Sales.SalesOrderHeader

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)/4 + 1)

    SELECT OrderYear, Totals.OrderQtr, TotalSales,

    LAG(TotalSales, 4, 0) OVER(ORDER BY OrderYear, OrderQtr)

    AS PreviousYearsSales

    FROM Totals

    ORDER BY OrderYear, OrderQtr;

    ```

    **Listing 6-3**

    Using the `Default` Parameter with `LAG`


    Figure [6-3](#335106_2_En_6_Chapter.xhtml#Fig3) shows the results. This query
    is the same as the query from Listing [6-2](#335106_2_En_6_Chapter.xhtml#PC4)
    with the addition of the `Default` parameter. All `NULL` values in `PreviousYearSales`
    have been changed to zero. Of course, you can use both the `Offset` and `Default`
    with `LEAD` as well.


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig3_HTML.jpg](images/335106_2_En_6_Chapter/335106_2_En_6_Fig3_HTML.jpg)


    **Figure 6-3**

    The results using the `Default` parameter with `LAG`'
