    ### Pareto Principle


    The Pareto Principle, named after the Italian economist Vilfredo Pareto, is commonly
    known as the 80/20 rule. It states that roughly 80% of the effects come from 20%
    of the causes.^([²](#fn2)) Applying the principle can help us identify the most
    important areas to focus on in our business. For example, determining the top
    20% of products by sales can feed into other types of analysis and decision-making.


    The calculation for a Pareto analysis/charts is done by ordering the items to
    be evaluated by the amount being analyzed and calculating a cumulative or rolling
    sum per item. The cumulative sum is then divided by the overall total to determine
    a percentage.


    The pseudo-code would be:


    ```

    [All Sales] = SUM([SalesAmount])

    [Cumulative Sales] = cumulative SUM([SalesAmount])

    [PARETO] = [Cumulative Sales] / [All Sales]

    ```


    In the case of our sample data, the Pareto Principle, as implemented in Listing
    [11-4](#335106_2_En_11_Chapter.xhtml#PC8) and shown in Figure [11-3](#335106_2_En_11_Chapter.xhtml#Fig3),
    will help us determine the products that produce the majority of revenue.


    ![../images/335106_2_En_11_Chapter/335106_2_En_11_Fig3_HTML.jpg](images/335106_2_En_11_Chapter/335106_2_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Pareto calculation over all subcategories


    ```

    SELECT ps.EnglishProductSubcategoryName AS [Sub Category],

    SUM(f.SalesAmount) AS [Sub Category Sales],

    SUM(SUM(f.SalesAmount)) OVER ()        AS [All Sales],

    SUM(SUM(f.SalesAmount)) OVER (ORDER BY SUM(f.SalesAmount) DESC)    AS [Cumulative
    Sales],

    SUM(SUM(f.SalesAmount)) OVER (ORDER BY SUM(f.SalesAmount) DESC)

    / SUM(SUM(f.SalesAmount)) OVER () AS [Sales Pareto]

    FROM dbo.FactInternetSales AS f

    INNER JOIN dbo.DimProduct AS p

    ON f.ProductKey = p.ProductKey

    INNER JOIN dbo.DimProductSubcategory AS ps

    ON p.ProductSubcategoryKey = ps.ProductSubcategoryKey

    WHERE OrderDate BETWEEN ''2011-01-01'' AND ''2012-12-31''

    GROUP BY ps.ProductSubCategoryKey,

    ps.EnglishProductSubcategoryName

    order by [Sales Pareto]

    Listing 11-4

    Pareto Principle

    ```


    This example shows all the pieces involved in determining the [Sales Pareto] column,
    but because so much of the sales volume consists of road bikes, we’ll need to
    dig into that subcategory to demonstrate a more typical Pareto result. In Listing
    [11-5](#335106_2_En_11_Chapter.xhtml#PC9), the [All Sales] and [Cumulative Sales]
    columns can be removed as they are only needed for the [Sales Pareto] calculation
    itself. Adding in a sum of quantity gives more context to the results, as seen
    in Figure [11-4](#335106_2_En_11_Chapter.xhtml#Fig4).


    ![../images/335106_2_En_11_Chapter/335106_2_En_11_Fig4_HTML.jpg](images/335106_2_En_11_Chapter/335106_2_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Road bike sales Pareto by product


    ```

    SELECT p.EnglishProductName as [Product],

    SUM(f.SalesAmount) AS [Sub Category Sales],

    SUM(f.OrderQuantity) AS [Sub Category Qty],

    SUM(SUM(f.SalesAmount)) OVER (ORDER BY SUM(f.SalesAmount) DESC)

    / SUM(SUM(f.SalesAmount)) OVER () AS [Sales Pareto]

    FROM dbo.FactInternetSales AS f

    INNER JOIN dbo.DimProduct AS p

    ON f.ProductKey = p.ProductKey

    INNER JOIN dbo.DimProductSubcategory AS ps

    ON p.ProductSubcategoryKey = ps.ProductSubcategoryKey

    WHERE OrderDate BETWEEN ''2011-01-01'' AND ''2012-12-31''

    and ps.EnglishProductSubcategoryName = ''Road Bikes''

    GROUP BY P.EnglishProductName

    ,ps.ProductSubCategoryKey,

    ps.EnglishProductSubcategoryName

    order by [Sales Pareto]

    Listing 11-5

    Pareto Refined

    ```


