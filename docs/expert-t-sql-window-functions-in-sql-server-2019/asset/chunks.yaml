    ## 可视化趋势


    由于此查询返回的列数很多，图 11-1 中的图表更能直观地展示结果。创建增长率和增长百分比计算的全部目的，就是为了能够利用它们来分析数据趋势。将数据绘制在图表中是可视化结果并向业务用户展示的好方法。


    ![显示月环比差异百分比和同期上年差异百分比的月度趋势图](img/335106_2_En_11_Fig1_HTML.jpg)


    **图 11-1**

    显示月环比差异百分比和同期上年差异百分比的月度趋势图


    ## 月环比 vs. 同期上年


    月环比 (MOM) 差异计算通常作为直接度量指标并不是那么有用。它们显示了从一个时期到下一个时期的变化，这可能非常“嘈杂”，并且可能掩盖潜在趋势。同期上年
    (SP PY) 差异计算能更好地展示相对于去年的增长趋势，但也可能受到季节性的影响。销售的巨大变化往往可以归因于假日季节，并不总是反映整体趋势。话虽如此，你现在将通过实现前面提到的变化率计算来改进这些计算，并将季节性的起伏平滑为长期趋势。

