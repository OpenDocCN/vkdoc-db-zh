    Partitioning our data further adds complexity to our initial common table expression,
    but our subsequent code is quite similar to what we have previously written. Figure
    [9-10](#335106_2_En_9_Chapter.xhtml#Fig10) shows this partitioned data set and
    how the results differ from our previous streak calculations.


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig10_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig10_HTML.jpg)


    #### Figure 9-10: Red Sox winning streaks vs. each opposing team


    We can see that the Red Sox had a streak of 22 wins in a row vs. the Washington
    Senators, a feat that spanned over a year! By partitioning the data set by opposing
    team, we are no longer analyzing all games as a set, but games against each other
    team as a set of sets.


    This technique can be used to isolate patterns within a set of data and understand
    how performance varies against different challenges. Sometimes a winning streak
    is separated by so much other data and by so much time that it may not be readily
    apparent without isolating it from that noise.


    We can take these analytics a step further to calculate all winning streaks of
    all teams vs. all other teams in a single query. This removes the need to hard-code
    team names and will get us quite a bit of additional data, assuming we want to
    collect it simultaneously for all teams. Listing [9-9](#335106_2_En_9_Chapter.xhtml#PC10)
    shows how we can accomplish this. More TSQL is required, but none of it is more
    complex than what we have already demonstrated thus far.


    ```

    WITH GAME_LOG AS (

    SELECT

    CASE WHEN HomeScore > VisitingScore THEN ''W''

    WHEN VisitingScore > HomeScore THEN ''L''

    WHEN HomeScore = VisitingScore THEN ''T''

    END AS result,

    VisitingTeamName AS opposing_team,

    HomeTeamName AS team_to_trend,

    GameLog.GameDate,

    GameLog.GameLogId

    FROM dbo.GameLog

    WHERE GameLog.GameType = ''REG''

    UNION ALL

    SELECT

    CASE WHEN VisitingScore > HomeScore THEN ''W''

    WHEN HomeScore > VisitingScore THEN ''L''

    END AS result,

    HomeTeamName AS opposing_team,

    VisitingTeamName AS team_to_trend,

    GameLog.GameDate,

    GameLog.GameLogId

    FROM dbo.GameLog

    WHERE GameLog.GameType = ''REG''

    AND VisitingScore <> HomeScore),

    GAME_LOG_ORDERED AS (

    SELECT

    GAME_LOG.GameLogId,

    GAME_LOG.GameDate,

    GAME_LOG.team_to_trend,

    GAME_LOG.opposing_team,

    GAME_LOG.result,

    LAG(GAME_LOG.result) OVER (PARTITION BY team_to_trend, opposing_team ORDER BY
    GAME_LOG.GameDate, GAME_LOG.GameLogId) AS previous_game_result,

    LEAD(GAME_LOG.result) OVER (PARTITION BY team_to_trend, opposing_team ORDER BY
    GAME_LOG.GameDate, GAME_LOG.GameLogId) AS next_game_result,

    ROW_NUMBER() OVER (PARTITION BY team_to_trend, opposing_team ORDER BY GAME_LOG.GameDate,
    GAME_LOG.GameLogId) AS island_location

    FROM GAME_LOG),

    CTE_ISLAND_START AS (

    SELECT

    ROW_NUMBER() OVER (PARTITION BY GAME_LOG_ORDERED.team_to_trend, GAME_LOG_ORDERED.opposing_team
    ORDER BY GAME_LOG_ORDERED.GameDate, GAME_LOG_ORDERED.GameLogId) AS island_number,

    GAME_LOG_ORDERED.GameDate AS island_start_time,

    GAME_LOG_ORDERED.island_location AS island_start_location,

    GAME_LOG_ORDERED.opposing_team,

    GAME_LOG_ORDERED.team_to_trend

    FROM GAME_LOG_ORDERED

    WHERE GAME_LOG_ORDERED.result = ''W''

    AND (GAME_LOG_ORDERED.previous_game_result <> ''W'' OR GAME_LOG_ORDERED.previous_game_result
    IS NULL)),

    CTE_ISLAND_END AS (

    SELECT

    ROW_NUMBER() OVER (PARTITION BY GAME_LOG_ORDERED.team_to_trend, GAME_LOG_ORDERED.opposing_team
    ORDER BY GAME_LOG_ORDERED.GameDate, GAME_LOG_ORDERED.GameLogId) AS island_number,

    GAME_LOG_ORDERED.GameDate AS island_end_time,

    GAME_LOG_ORDERED.island_location AS island_end_location,

    GAME_LOG_ORDERED.opposing_team,

    GAME_LOG_ORDERED.team_to_trend

    FROM GAME_LOG_ORDERED

    WHERE GAME_LOG_ORDERED.result = ''W''

    AND (GAME_LOG_ORDERED.next_game_result <> ''W'' OR GAME_LOG_ORDERED.next_game_result
    IS NULL))

    SELECT

    CTE_ISLAND_START.island_start_time,

    CTE_ISLAND_START.team_to_trend,

    CTE_ISLAND_START.opposing_team,

    CTE_ISLAND_END.island_end_time,

    CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location +
    1 AS count_of_events,

    DATEDIFF(DAY, CTE_ISLAND_START.island_start_time, CTE_ISLAND_END.island_end_time)
    + 1 AS length_of_streak_in_days

    FROM CTE_ISLAND_START

    INNER JOIN CTE_ISLAND_END

    ON CTE_ISLAND_START.island_number = CTE_ISLAND_END.island_number

    AND CTE_ISLAND_START.opposing_team = CTE_ISLAND_END.opposing_team

    AND CTE_ISLAND_START.team_to_trend = CTE_ISLAND_END.team_to_trend

    ORDER BY CTE_ISLAND_END.island_end_location - CTE_ISLAND_START.island_start_location
    DESC;

    ```


