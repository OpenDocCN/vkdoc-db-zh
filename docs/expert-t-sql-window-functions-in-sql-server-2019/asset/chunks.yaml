- fmt: "## Dividing Windows with Partitions\n\nIf there happens to be a window in\
    \ the room you are sitting in, take a look at it now. Is it one large piece of\
    \ glass, or is it divided into smaller panes? A window that is divided into panes\
    \ is still a window. Each individual pane is also a window.\n\nThe same concept\
    \ applies to window functions. The entire set of results is the window, but you\
    \ can also divide the setup into smaller windows based on one or more columns.\
    \ The `OVER` clause contains an optional component, `PARTITION BY`. When a `PARTITION\
    \ BY` is not supplied, the partition is the entire large window.\n\nThe query\
    \ using `LAG` to solve the stock market problem partitioned the data by the `TickerSymbol`\
    \ column. By separating the data by `TickerSymbol`, the `ClosePrice` from one\
    \ stock was not retrieved by rows of another stock. In the case of the `ROW_NUMBER`\
    \ function demonstrated earlier in this chapter, you can force the numbers to\
    \ start over at 1 for each customer, for example. Listing [1-9](#335106_2_En_1_Chapter.xhtml#PC9)\
    \ demonstrates this feature.\n\n```sql\n--1-9.1 Use ROW_NUMBER with PARTITION\
    \ BY\nSELECT CustomerID, SalesOrderID,\nROW_NUMBER() OVER(PARTITION BY CustomerID\
    \ ORDER BY SalesOrderID)\nAS RowNumber\nFROM Sales.SalesOrderHeader;\n```\nListing\
    \ 1-9 Using PARTITION BY\n\nFigure [1-10](#335106_2_En_1_Chapter.xhtml#Fig10)\
    \ shows partial results. Notice that the row numbers start over at 1 for each\
    \ customer.\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig10_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig10_HTML.jpg)\n\
    Figure 1-10 Partial results of using the `PARTITION BY` option with `ROW_NUMBER`\n\
    \nThe `PARTITION BY` expression of the `OVER` clause is supported by all window\
    \ functions. It is also always optional. If the `PARTITION BY` is left out, all\
    \ rows are included in the window. When the `PARTITION BY` is used, each window\
    \ will consist only of the rows matching the `PARTITION BY` column or columns.\n\
    \n## Uncovering Special Case Windows\n\nSo far, the examples have been straightforward,\
    \ but there are some situations that are counterintuitive if you don’t know what\
    \ is going on. The examples in this section use the `ROW_NUMBER` function, but\
    \ the concepts apply to any window function.\n\nFirst, take a look at what happens\
    \ when the `DISTINCT` keyword is used with `ROW_NUMBER`. The window function operates\
    \ before `DISTINCT`, which can lead to results you may not expect. Listing [1-10](#335106_2_En_1_Chapter.xhtml#PC10)\
    \ demonstrates using `DISTINCT` with `ROW_NUMBER` to get a list of the unique\
    \ `OrderDates` along with a row number.\n\n```sql\n--1-10.1 Using DISTINCT\nSELECT\
    \ DISTINCT OrderDate,\nROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber\nFROM\
    \ Sales.SalesOrderHeader\nORDER BY RowNumber;\n\n--1-10.2 Separate logic with\
    \ CTE\nWITH OrderDates AS (\n    SELECT DISTINCT OrderDate\n    FROM Sales.SalesOrderHeader)\n\
    SELECT OrderDate,\n    ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber\nFROM\
    \ OrderDates\nORDER BY RowNumber;\n```\nListing 1-10 Using `DISTINCT` with `ROW_NUMBER`\n\
    \nFigure [1-11](#335106_2_En_1_Chapter.xhtml#Fig11) shows the partial results.\
    \ Query 1 returns 31,465 rows, one row for each order in the table even though\
    \ many orders have the same date. This is definitely not the intended answer.\
    \ The row numbers are generated before `DISTINCT` is applied. Because the row\
    \ numbers are unique, every row in the results ends up being unique, and `DISTINCT`\
    \ cannot eliminate any rows. Query 2 demonstrates the solution: get a distinct\
    \ list of the order dates first in a CTE, and then apply the row numbers in the\
    \ outer query. Query 2 returns 1124 rows, the number of unique order dates. You\
    \ could also use a temp table, a table variable, a view, or a derived table to\
    \ create the distinct list first.\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig11_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig11_HTML.jpg)\n\
    Figure 1-11 Partial results of using `DISTINCT` with `ROW_NUMBER`\n\nYou will\
    \ also find interesting behavior when you use `TOP`. Once again, the row numbers\
    \ are generated before `TOP` is applied. I first discovered this when I was inserting\
    \ random rows into a table for some unit tests. The idea was to reinsert a sample\
    \ of rows back into the same table with new ID numbers. To generate the new IDs,\
    \ I wanted to add row numbers to the maximum existing ID. Since I wanted to insert\
    \ a specific number of rows, I used `TOP`. Instead of the row numbers starting\
    \ with one as I expected, they started with a random value. Listing [1-11](#335106_2_En_1_Chapter.xhtml#PC11)\
    \ shows how using `TOP` can affect window functions.\n\n```sql\n--1-11.1 Using\
    \ TOP with ROW_NUMBER\nSELECT TOP(6) CustomerID, SalesOrderID,\nROW_NUMBER() OVER(ORDER\
    \ BY SalesOrderID) AS RowNumber\nFROM Sales.SalesOrderHeader\nORDER BY NEWID();\n\
    \n--1-11.2 Separate the logic with a CTE\nWITH Orders AS (\n    SELECT TOP(6)\
    \ CustomerID, SalesOrderID\n    FROM Sales.SalesOrderHeader\n    ORDER BY NEWID())\n\
    SELECT CustomerID, SalesOrderID,\nROW_NUMBER() OVER(ORDER BY SalesOrderID) AS\
    \ RowNumber\nFROM Orders;\n```\nListing 1-11 Using `TOP` with `ROW_NUMBER`\n\n\
    Figure [1-12](#335106_2_En_1_Chapter.xhtml#Fig12) shows the results. If you run\
    \ this example, you will see different random results. The purpose of the example\
    \ is to generate six random rows with a row number starting with 1. Query 1 returns\
    \ row numbers, but the row numbers do not start with one nor are they in any kind\
    \ of order. By using a CTE to separate the logic, `TOP` can operate first. Query\
    \ 2 returns a random set of rows, but the row numbers start with one as expected.\n\
    \n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig12_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig12_HTML.jpg)\n\
    Figure 1-12 The results of using `TOP` with `ROW_NUMBER`\n\nThe final interesting\
    \ situation involves adding window functions to aggregate queries. This functionality\
    \ is covered in Chapter [3](#335106_2_En_3_Chapter.xhtml) in the “Adding Window\
    \ Aggregates to Aggregate Queries” section.\n\n## Summary\n\nWindow functions,\
    \ added with SQL Server 2005 and 2012, provide new, easy ways to solve challenging\
    \ queries. Window functions are part of the ANSI standards for SQL. The standards\
    \ committee has defined even more functionality, so it’s possible that Microsoft\
    \ may include additional functions in the future. Window functions must include\
    \ an `OVER` clause, which defines the window for each row to operate on. Depending\
    \ on the window function used, the `OVER` clause may contain `ORDER BY` and frame\
    \ expressions. The `PARTITION BY` expression is supported in all window functions\
    \ and will be used depending on the desired outcome. In many cases, using a window\
    \ function provides better performance over older methods, but they almost always\
    \ make the query easier to write.\n\nNow that you understand the basics of window\
    \ functions, it is time to investigate ranking functions. In Chapter [2](#335106_2_En_2_Chapter.xhtml),\
    \ you will learn how to use the four ranking functions introduced with SQL Server\
    \ 2005 to solve challenging T-SQL queries.\n\n## Discovering Ranking Functions\n\
    \nThe four ranking functions were introduced to T-SQL by Microsoft in 2005. Three\
    \ of the functions, `ROW_NUMBER`, `RANK`, and `DENSE_RANK`, assign a sequential\
    \ number to each row in a query’s results. The fourth ranking function, `NTILE`,\
    \ divides the rows by assigning a bucket number to each row in the results. The\
    \ group of low-ranking rows gets an `NTILE` value of 1 while the highest-ranking\
    \ group of rows is assigned the top number.\n\nWhile adding a number to a row\
    \ is not generally the answer in itself, this functionality is often the basis\
    \ for many solutions. This chapter shows how to use the four ranking functions\
    \ and how to apply them to some real-world problems in this chapter and later\
    \ chapters of this book."
  raw: '## Dividing Windows with Partitions


    If there happens to be a window in the room you are sitting in, take a look at
    it now. Is it one large piece of glass, or is it divided into smaller panes? A
    window that is divided into panes is still a window. Each individual pane is also
    a window.


    The same concept applies to window functions. The entire set of results is the
    window, but you can also divide the setup into smaller windows based on one or
    more columns. The `OVER` clause contains an optional component, `PARTITION BY`
    . When a `PARTITION BY` is not supplied, the partition is the entire large window.


    The query using `LAG` to solve the stock market problem partitioned the data by
    the `TickerSymbol` column. By separating the data by `TickerSymbol`, the `ClosePrice`
    from one stock was not retrieved by rows of another stock. In the case of the
    `ROW_NUMBER` function demonstrated earlier in this chapter, you can force the
    numbers to start over at 1 for each customer, for example. Listing [1-9](#335106_2_En_1_Chapter.xhtml#PC9)
    demonstrates this feature.


    ```

    --1-9.1 Use ROW_NUMBER with PARTITION BY

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY SalesOrderID)

    AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 1-9

    Using PARTITION BY

    ```


    Figure [1-10](#335106_2_En_1_Chapter.xhtml#Fig10) shows partial results. Notice
    that the row numbers start over at 1 for each customer.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig10_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Partial results of using the PARTITION BY option with ROW_NUMBER


    The `PARTITION BY` expression of the `OVER` clause is supported by all window
    functions. It is also always optional. If the `PARTITION BY` is left out, all
    rows are included in the window. When the `PARTITION BY` is used, each window
    will consist only of the rows matching the `PARTITION BY` column or columns.


    ## Uncovering Special Case Windows


    So far, the examples have been straightforward, but there are some situations
    that are counterintuitive if you don’t know what is going on. The examples in
    this section use the `ROW_NUMBER` function, but the concepts apply to any window
    function.


    First, take a look at what happens when the `DISTINCT` keyword is used with `ROW_NUMBER`.
    The window function operates before `DISTINCT` , which can lead to results you
    may not expect. Listing [1-10](#335106_2_En_1_Chapter.xhtml#PC10) demonstrates
    using `DISTINCT` with `ROW_NUMBER` to get a list of the unique `OrderDates` along
    with a row number.


    ```

    --1-10.1 Using DISTINCT

    SELECT DISTINCT OrderDate,

    ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY RowNumber;

    --1-10.2 Separate logic with CTE

    WITH OrderDates AS (

    SELECT DISTINCT OrderDate

    FROM Sales.SalesOrderHeader)

    SELECT OrderDate,

    ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber

    FROM OrderDates

    ORDER BY RowNumber;

    Listing 1-10

    Using DISTINCT with ROW_NUMBER

    ```


    Figure [1-11](#335106_2_En_1_Chapter.xhtml#Fig11) shows the partial results. Query
    1 returns 31,465 rows, one row for each order in the table even though many orders
    have the same date. This is definitely not the intended answer. The row numbers
    are generated before `DISTINCT` is applied. Because the row numbers are unique,
    every row in the results ends up being unique, and `DISTINCT` cannot eliminate
    any rows. Query 2 demonstrates the solution: get a distinct list of the order
    dates first in a CTE, and then apply the row numbers in the outer query. Query
    2 returns 1124 rows, the number of unique order dates. You could also use a temp
    table, a table variable, a view, or a derived table to create the distinct list
    first.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig11_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Partial results of using DISTINCT with ROW_NUMBER


    You will also find interesting behavior when you use `TOP`. Once again, the row
    numbers are generated before `TOP` is applied. I first discovered this when I
    was inserting random rows into a table for some unit tests. The idea was to reinsert
    a sample of rows back into the same table with new ID numbers. To generate the
    new IDs, I wanted to add row numbers to the maximum existing ID. Since I wanted
    to insert a specific number of rows, I used `TOP`. Instead of the row numbers
    starting with one as I expected, they started with a random value. Listing [1-11](#335106_2_En_1_Chapter.xhtml#PC11)
    shows how using `TOP` can affect window functions.


    ```

    --1-11.1 Using TOP with ROW_NUMBER

    SELECT TOP(6) CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY NEWID();

    --1-11.2 Separate the logic with a CTE

    WITH Orders AS (

    SELECT TOP(6) CustomerID, SalesOrderID

    FROM Sales.SalesOrderHeader

    ORDER BY NEWID())

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Orders;

    Listing 1-11

    Using TOP with ROW_NUMBER

    ```


    Figure [1-12](#335106_2_En_1_Chapter.xhtml#Fig12) shows the results. If you run
    this example, you will see different random results. The purpose of the example
    is to generate six random rows with a row number starting with 1\. Query 1 returns
    row numbers, but the row numbers do not start with one nor are they in any kind
    of order. By using a CTE to separate the logic, `TOP` can operate first. Query
    2 returns a random set of rows, but the row numbers start with one as expected.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig12_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig12_HTML.jpg)


    Figure 1-12


    The results of using TOP with ROW_NUMBER


    The final interesting situation involves adding window functions to aggregate
    queries. This functionality is covered in Chapter [3](#335106_2_En_3_Chapter.xhtml)
    in the “Adding Window Aggregates to Aggregate Queries” section.


    ## Summary


    Window functions, added with SQL Server 2005 and 2012, provide new, easy ways
    to solve challenging queries. Window functions are part of the ANSI standards
    for SQL. The standards committee has defined even more functionality, so it’s
    possible that Microsoft may include additional functions in the future. Window
    functions must include an `OVER` clause, which defines the window for each row
    to operate on. Depending on the window function used, the `OVER` clause may contain
    `ORDER BY` and frame expressions. The `PARTITION BY` expression is supported in
    all window functions and will be used depending on the desired outcome. In many
    cases, using a window function provides better performance over older methods,
    but they almost always make the query easier to write.


    Now that you understand the basics of window functions, it is time to investigate
    ranking functions. In Chapter [2](#335106_2_En_2_Chapter.xhtml), you will learn
    how to use the four ranking functions introduced with SQL Server 2005 to solve
    challenging T-SQL queries.


    # 2. Discovering Ranking Functions


    The four ranking functions were introduced to T-SQL by Microsoft in 2005\. Three
    of the functions, `ROW_NUMBER`, `RANK`, and `DENSE_RANK`, assign a sequential
    number to each row in a query’s results. The fourth ranking function, `NTILE`,
    divides the rows by assigning a bucket number to each row in the results. The
    group of low-ranking rows gets an `NTILE` value of 1 while the highest-ranking
    group of rows is assigned the top number.


    While adding a number to a row is not generally the answer in itself, this functionality
    is often the basis for many solutions. This chapter shows how to use the four
    ranking functions and how to apply them to some real-world problems in this chapter
    and later chapters of this book.'
  trans: "\n## 使用分区划分窗口\n\n如果你所在的房间正好有一扇窗户，现在就看看它。它是一整块大玻璃，还是被分成了多个小窗格？一扇被分成多个窗格的窗户仍然是一扇窗户。每一个单独的窗格本身也是一扇窗户。\n\
    \n同样的概念适用于窗口函数。整个结果集就是窗口，但你也可以根据一个或多个列将设置划分为更小的窗口。`OVER` 子句包含一个可选组件 `PARTITION\
    \ BY`。当没有提供 `PARTITION BY` 时，分区就是整个大窗口。\n\n使用 `LAG` 解决股票市场问题的查询通过 `TickerSymbol`\
    \ 列对数据进行了分区。通过按 `TickerSymbol` 分离数据，一只股票的 `ClosePrice` 不会被另一只股票的行所检索。在本章前面演示的\
    \ `ROW_NUMBER` 函数的情况下，你可以强制数字为每个客户重新从 1 开始。清单 1-9 演示了这一特性。\n\n```sql\n--1-9.1\
    \ 结合 PARTITION BY 使用 ROW_NUMBER\nSELECT CustomerID, SalesOrderID,\nROW_NUMBER()\
    \ OVER(PARTITION BY CustomerID ORDER BY SalesOrderID)\nAS RowNumber\nFROM Sales.SalesOrderHeader;\n\
    ```\n清单 1-9 使用 PARTITION BY\n\n图 1-10 展示了部分结果。注意，行号为每个客户重新从 1 开始。\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig10_HTML.jpg](img/335106_2_En_1_Fig10_HTML.jpg)\n\
    图 1-10 结合 `ROW_NUMBER` 使用 `PARTITION BY` 选项的部分结果\n\n所有窗口函数都支持 `OVER` 子句的 `PARTITION\
    \ BY` 表达式。它也总是可选的。如果省略 `PARTITION BY`，所有行都将包含在窗口中。当使用 `PARTITION BY` 时，每个窗口将仅包含与\
    \ `PARTITION BY` 列匹配的行。\n\n## 揭示特殊案例窗口\n\n到目前为止，示例都很直接，但如果你不知道发生了什么，有些情况会显得违反直觉。本节中的示例使用了\
    \ `ROW_NUMBER` 函数，但这些概念适用于任何窗口函数。\n\n首先，看看当 `DISTINCT` 关键字与 `ROW_NUMBER` 一起使用时会发生什么。窗口函数在\
    \ `DISTINCT` 之前操作，这可能导致你意想不到的结果。清单 1-10 演示了将 `DISTINCT` 与 `ROW_NUMBER` 结合使用，以获取唯一的\
    \ `OrderDates` 列表及其行号。\n\n```sql\n--1-10.1 使用 DISTINCT\nSELECT DISTINCT OrderDate,\n\
    ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber\nFROM Sales.SalesOrderHeader\n\
    ORDER BY RowNumber;\n\n--1-10.2 使用 CTE 分离逻辑\nWITH OrderDates AS (\n    SELECT\
    \ DISTINCT OrderDate\n    FROM Sales.SalesOrderHeader)\nSELECT OrderDate,\n  \
    \  ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber\nFROM OrderDates\nORDER\
    \ BY RowNumber;\n```\n清单 1-10 将 `DISTINCT` 与 `ROW_NUMBER` 结合使用\n\n图 1-11 展示了部分结果。查询\
    \ 1 返回了 31,465 行，尽管许多订单日期相同，表中每个订单都返回了一行。这绝对不是预期的答案。行号是在应用 `DISTINCT` 之前生成的。因为行号是唯一的，结果中的每一行最终都是唯一的，所以\
    \ `DISTINCT` 无法消除任何行。查询 2 展示了解决方案：首先在 CTE 中获取订单日期的唯一列表，然后在外部查询中应用行号。查询 2 返回 1124\
    \ 行，即唯一订单日期的数量。你也可以使用临时表、表变量、视图或派生表来首先创建唯一列表。\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig11_HTML.jpg](img/335106_2_En_1_Fig11_HTML.jpg)\n\
    图 1-11 将 `DISTINCT` 与 `ROW_NUMBER` 结合使用的部分结果\n\n当你使用 `TOP` 时，也会发现有趣的行为。同样，行号是在应用\
    \ `TOP` 之前生成的。我最初是在为一些单元测试向表中插入随机行时发现这一点的。思路是将示例行以新的 ID 号重新插入到同一个表中。为了生成新的 ID，我希望在现有最大\
    \ ID 的基础上添加行号。因为我希望插入特定数量的行，所以我使用了 `TOP`。结果行号并没有像我预期的那样从 1 开始，而是从一个随机值开始。清单 1-11\
    \ 展示了使用 `TOP` 如何影响窗口函数。\n\n```sql\n--1-11.1 将 TOP 与 ROW_NUMBER 结合使用\nSELECT TOP(6)\
    \ CustomerID, SalesOrderID,\nROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber\n\
    FROM Sales.SalesOrderHeader\nORDER BY NEWID();\n\n--1-11.2 使用 CTE 分离逻辑\nWITH Orders\
    \ AS (\n    SELECT TOP(6) CustomerID, SalesOrderID\n    FROM Sales.SalesOrderHeader\n\
    \    ORDER BY NEWID())\nSELECT CustomerID, SalesOrderID,\nROW_NUMBER() OVER(ORDER\
    \ BY SalesOrderID) AS RowNumber\nFROM Orders;\n```\n清单 1-11 将 `TOP` 与 `ROW_NUMBER`\
    \ 结合使用\n\n图 1-12 展示了结果。如果你运行这个示例，会看到不同的随机结果。该示例的目的是生成六行随机数据，并且行号从 1 开始。查询 1 返回了行号，但行号并非从\
    \ 1 开始，也没有任何顺序。通过使用 CTE 分离逻辑，`TOP` 可以首先操作。查询 2 返回一组随机的行，但行号如预期那样从 1 开始。\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig12_HTML.jpg](img/335106_2_En_1_Fig12_HTML.jpg)\n\
    图 1-12 将 `TOP` 与 `ROW_NUMBER` 结合使用的结果\n\n最后一个有趣的情况涉及将窗口函数添加到聚合查询中。此功能在第 3 章的“向聚合查询添加窗口聚合”一节中介绍。\n\
    \n## 总结\n\n窗口函数随 SQL Server 2005 和 2012 引入，为解决具有挑战性的查询提供了新的、简便的方法。窗口函数是 SQL ANSI\
    \ 标准的一部分。标准委员会已经定义了更多的功能，因此微软未来可能会包含额外的函数。窗口函数必须包含一个 `OVER` 子句，该子句定义了每行要操作的窗口。根据所使用的窗口函数，`OVER`\
    \ 子句可能包含 `ORDER BY` 和框架表达式。`PARTITION BY` 表达式在所有窗口函数中都受支持，并将根据所需结果酌情使用。在许多情况下，使用窗口函数比旧方法提供更好的性能，但它们几乎总是让查询更容易编写。\n\
    \n既然你已经了解了窗口函数的基础知识，现在该研究排名函数了。在第 2 章中，你将学习如何使用 SQL Server 2005 引入的四个排名函数来解决复杂的\
    \ T-SQL 查询。\n\n## 探索排名函数\n\n这四个排名函数是由微软在 2005 年引入 T-SQL 的。其中三个函数，`ROW_NUMBER`、`RANK`\
    \ 和 `DENSE_RANK`，为查询结果中的每一行分配一个序列号。第四个排名函数 `NTILE`，通过为结果中的每一行分配一个桶编号来划分行。低排名行组获得\
    \ `NTILE` 值 1，而最高排名的行组则被分配最大的编号。\n\n虽然为一行添加编号本身通常不是最终答案，但这个功能往往是许多解决方案的基础。本章展示了如何使用这四个排名函数，以及如何在本章和本书后续章节中将它们应用于一些实际问题。\n"
- fmt: '## 使用 ROW_NUMBER


    根据我在 SQL Server 活动中对听众的询问，`ROW_NUMBER` 是最知名且最常用的窗口函数。许多 SQL Server 专业人员承认使用 `ROW_NUMBER`，即使他们并未意识到这是窗口函数之一。在第
    1 章中，当你学习 `OVER` 子句时，你已经看到了 `ROW_NUMBER` 的实际应用。现在，你将更深入地了解 `ROW_NUMBER`。


    `ROW_NUMBER` 函数为窗口中的每一行返回一个从 1 开始的唯一整数。`OVER` 子句内部的 `ORDER BY` 表达式是必需的，它决定了编号的应用顺序。所有窗口函数都支持一个可选的
    `PARTITION BY` 表达式，该表达式将窗口划分为更小的窗口。每个分区的行号从 1 开始并递增 1。以下是 `ROW_NUMBER` 的基本语法，它可能出现在查询的
    `SELECT` 列表和 `ORDER BY` 子句中：


    ```sql

    ROW_NUMBER() OVER([PARTITION BY column1[, column2, ...]]

    ORDER BY column1 [ASC | DESC][, column2 [ASC | DESC] ...])

    ```


    清单 [2-1] 展示了使用和不使用 `PARTITION BY` 表达式的 `ROW_NUMBER`。为了按 `CustomerID` 对齐行号以便比较，`OVER`
    子句的 `ORDER BY` 表达式是不同的。


    ```sql

    -- 2-1.1 使用带 PARTITION BY 和不带 PARTITION BY 的 ROW_NUMBER

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS WithPart,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS WithoutPart

    FROM Sales.SalesOrderHeader;

    ```


    图 [2-1] 显示了部分结果。行号列 `WithPart` 和 `WithoutPart` 对于前三行（`CustomerID` 11000）的值是相同的。在此之后，由于
    `PARTITION BY` 表达式，`WithPart` 行对于每个新的 `CustomerID` 重新开始编号。


    ![图 2-1：带分区和不带分区的 ROW_NUMBER 部分结果](images/335106_2_En_2_Chapter/335106_2_En_2_Fig1_HTML.jpg)


    图 2-1 带分区和不带分区的 ROW_NUMBER 部分结果


    关于这个查询还有另一个有趣的事情需要考虑。第二个 `OVER` 子句中的 `ORDER BY` 表达式 `CustomerID` 在此数据中不是唯一的。`SalesOrderID`
    为 43793 的两行的行号都返回 1。对于该行，`WithoutPart` 的值可能是 2 或 3，因为 `CustomerID` 11000 有三个订单，并且
    `ORDER BY` 表达式仅基于该列。行号是正确应用的，因为它们是按 `CustomerID` 顺序排列的，但由于 `CustomerID` 不唯一，不能保证在
    `CustomerID` 内部应用行号的顺序。`SalesOrderID` 43793 的 `WithoutPart` 值可能是 1、2 或 3。在第 1
    章中，我简要提到所有窗口函数都是非确定性的，清单 [2-2] 展示了如何使用相同的 `OVER` 子句产生不同的行号。


    ```sql

    -- 2-2.1 查询 ORDER BY 升序

    SELECT CustomerID,

    CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;


    -- 2-2.2 查询 ORDER BY 降序

    SELECT CustomerID,

    CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID DESC;

    ```


    图 [2-2] 显示了部分结果。`OVER` 子句是相同的，但查询的排序方式不同。`SalesOrderID` 43793 在查询 1 中的行号是 1，但在查询
    2 中的行号是 3。


    ![图 2-2：在 OVER 子句中使用非唯一 ORDER BY 的不同结果](images/335106_2_En_2_Chapter/335106_2_En_2_Fig2_HTML.jpg)


    图 2-2 在 OVER 子句中使用非唯一 ORDER BY 的不同结果


    这证明 `ROW_NUMBER` 是非确定性的；换句话说，在相同的情况下，你可以从该函数获得不同的值。查询的 `ORDER BY` 子句不影响确定性，因此这是一个有效的测试。


    为了确保使用 `ROW_NUMBER`（实际上是使用任何窗口函数）时获得可重复的结果，请确保 `OVER` 子句中的 `ORDER BY` 列是唯一的。清单
    [2-3] 是一个使用多个 `ORDER BY` 列以使表达式唯一的示例。


    ```sql

    -- 2-3.1 使用唯一 ORDER BY 的 ROW_NUMBER

    SELECT CustomerID,

    CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID, SalesOrderID) AS RowNum

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;


    -- 2-3.2 改为降序

    SELECT CustomerID,

    CAST(OrderDate AS Date) AS OrderDate,

    SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID, SalesOrderID) AS RowNum

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID DESC;

    ```


    图 [2-3] 显示了部分结果。在这种情况下，无论查询的 `ORDER BY` 子句如何，`SaleOrderID` 43793 的行号都是 1。`ROW_NUMBER`
    仍然是一个非确定性函数，但由于唯一的 `ORDER BY` 列，赋值是一致的。


    ![图 2-3：在 OVER 子句中使用唯一 ORDER BY 表达式](images/335106_2_En_2_Chapter/335106_2_En_2_Fig3_HTML.jpg)


    图 2-3 在 OVER 子句中使用唯一 ORDER BY 表达式


    在 `OVER` 子句的 `PARTITION BY` 表达式中也可以包含多个列、表达式和子查询。事实上，正如你将在本章末尾的“使用排名函数解决查询”部分看到的，在
    `PARTITION BY` 中使用多个列是解决一些实际示例的关键。


    使用 `ROW_NUMBER` 时，数据库引擎对每个分区中的行进行排序，并根据每行的位置分配唯一编号。你已经看到 `OVER` 的 `ORDER BY` 表达式不唯一的情况，因此当值存在并列时，不能保证行号每次完全一致。现在你将学习两个以不同方式处理并列情况的函数：`RANK`
    和 `DENSE_RANK`。'
  raw: '## Using ROW_NUMBER


    Based on my asking audiences at SQL Server events, `ROW_NUMBER` is the most well-known
    and commonly used window function. Many SQL Server professionals admit to using
    `ROW_NUMBER` even if they do not realize it is one of the window functions. You
    saw `ROW_NUMBER` in action in Chapter [1](#335106_2_En_1_Chapter.xhtml) when you
    learned about the `OVER` clause. Now you will take an even deeper look at `ROW_NUMBER`.


    The `ROW_NUMBER` function returns a unique integer starting with one for each
    row in the window. An `ORDER` BY expression inside the `OVER` clause is required,
    and it determines the order in which the numbers are applied. All the window functions
    support an optional `PARTITION BY` expression that divides the window into smaller
    windows. The row number for each partition begins with 1 and increments by 1\.
    Here is the basic syntax for `ROW_NUMBER`, which may appear in the `SELECT` list
    and `ORDER BY` clause of a query:


    ```

    ROW_NUMBER() OVER([PARTITION BY [,,...]]

    ORDER BY  [,,...])

    ```


    Listing [2-1](#335106_2_En_2_Chapter.xhtml#PC2) demonstrates `ROW_NUMBER` with
    and without a `PARTITION BY` expression. So that the row numbers line up by `CustomerID`
    for comparison, the `ORDER BY` expressions of the `OVER` clauses are different.


    ```

    --2-1.1 Using ROW_NUMBER with and without a PARTITION BY

    SELECT CustomerID, CAST(OrderDate AS DATE)

    AS OrderDate, SalesOrderID,

    ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY SalesOrderID)

    AS WithPart,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS WithoutPart

    FROM Sales.SalesOrderHeader;

    Listing 2-1

    Using ROW_NUMBER With and Without a PARTITION BY

    ```


    Figure [2-1](#335106_2_En_2_Chapter.xhtml#Fig1) shows the partial results. The
    row number columns, `WithPart` and `WithoutPart`, are the same values for the
    first three rows, `CustomerID` 11000. After that, the `WithPart` rows start over
    for each new `CustomerID because of the PARTITION BY expression`.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig1_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Partial results of ROW_NUMBER with and without partitioning


    There is another interesting thing to consider with this query. The `ORDER BY`
    expression in the second `OVER` clause, `CustomerID`, is not unique in this data.
    Both the row numbers for `SalesOrderID` 43793 return 1\. It’s possible for the
    `WithoutPart` value to be 2 or 3 for that row since there are three orders for
    `CustomerID` 11000 and the `ORDER BY` expression is based just on that column.
    The row numbers are applied correctly since they are in order of `CustomerID`,
    but since `CustomerID` is not unique, the order in which the numbers are applied
    within `CustomerID` is not guaranteed. The WithoutPart value for `SalesOrderID`
    43793 could be 1, 2, or 3\. In Chapter [1](#335106_2_En_1_Chapter.xhtml), I mentioned
    briefly that all window functions are nondeterministic, and Listing [2-2](#335106_2_En_2_Chapter.xhtml#PC3)
    demonstrates how different row numbers are possible with the same `OVER` clause.


    ```

    --2-2.1 Query ORDER BY ascending

    SELECT CustomerID,

    CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --2-2.2 Query ORDER BY descending

    SELECT CustomerID,

    CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID DESC;

    Listing 2-2

    Different Row Numbers with the Same OVER Clause

    ```


    Figure [2-2](#335106_2_En_2_Chapter.xhtml#Fig2) shows the partial results. The
    `OVER` clauses are identical, but the queries are sorted differently. The row
    number for `SalesOrderID` 43793 in Query 1 is 1, but the row number is 3 in Query
    2.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig2_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Different results with nonunique ORDER BY in the OVER clause


    This proves that `ROW_NUMBER` is nondeterministic; in other words, you can get
    different values from the function under the same circumstances. The `ORDER BY`
    clause of the query doesn’t affect determinism, so this is a valid test.


    To ensure repeatable results when using `ROW_NUMBER`, actually with any of the
    window functions, make sure that the `ORDER BY` columns in the `OVER` clause are
    unique. Listing [2-3](#335106_2_En_2_Chapter.xhtml#PC4) is an example using multiple
    `ORDER BY` columns so that the expression is unique.


    ```

    --2-3.1 Using ROW_NUMBER a unique ORDER BY

    SELECT CustomerID,

    CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID, SalesOrderID) AS RowNum

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --2-3.2 Change to descending

    SELECT CustomerID,

    CAST(OrderDate AS Date) AS OrderDate,

    SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID, SalesOrderID) AS RowNum

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID DESC;

    Listing 2-3

    Using Multiple Columns in the ORDER BY Expression to Ensure Uniqueness

    ```


    Figure [2-3](#335106_2_En_2_Chapter.xhtml#Fig3) shows the partial results. In
    this case, `SaleOrderID` 43793 has a row number of 1 regardless of the query’s
    `ORDER BY` clause. `ROW_NUMBER` is still a nondeterministic function, but the
    assignments are consistent because of the unique `ORDER BY` columns.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig3_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Using a unique ORDER BY expression in the OVER clause


    It is also possible to have multiple columns, expressions, and subqueries in the
    `PARTITION BY` expression of the `OVER` clause. In fact, as you will see in the
    “Solving Queries with Ranking Functions” section at the end of this chapter, multiple
    columns in the `PARTITION BY` is the key to solving some real-world examples.


    With `ROW_NUMBER`, the database engine sorts the rows in each partition and assigns
    unique numbers based on the position of each row. You have seen situations where
    the `ORDER BY` expression of `OVER` is not unique, so the row numbers are not
    guaranteed to line up exactly the same each time when there are ties in the values.
    Now you will learn about two functions that handle ties differently: `RANK` and
    `DENSE_RANK`.'
