    ## Using PERCENTILE_CONT and PERCENTILE_DISC


    You have seen how to rank and compare a series of values with `PERCENT_RANK()`
    and `CUME_DIST()`. The other two statistical functions, `PERCENTILE_CONT()` (percentile
    continuous) and `PERCENTILE_DISC()` (percentile discrete), perform the opposite
    task. Given a percent rank, these functions find the value at that position. The
    difference between these two functions is that `PERCENTILE_CONT()` interpolates
    a value over the set while `PERCENTILE_DISC()` returns an exact value from the
    set.


    One very common requirement is to find the median, or middle value in a list of
    values. You can accomplish this task by using `PERCENTILE_CONT()` and specifying
    that you wish to find the value at 50%.


    The syntax of these functions is also a bit different compared to the other window
    functions. You still need to supply an `OVER` clause, but inside the `OVER` clause
    you only specify the `PARTITION BY` expression if one is needed.


    Instead of placing the `ORDER BY` in the `OVER` clause, there is a new clause
    called `WITHIN GROUP`, where the `ORDER BY` will go. The `WITHIN GROUP` clause
    must return a list of numbers. Recall that the `ORDER BY` in the `OVER` clause
    for other functions lines up the rows, but in this case, the `WITHIN GROUP` expression
    is the list of numbers to operate on. The `ORDER BY` must contain just one expression
    and evaluate to a numeric type like `INT` or `DECIMAL`.


    Here is the syntax:

    ```

    PERCENTILE_CONT() WITHIN GROUP(ORDER BY )

    OVER([PARTITION BY ])

    PERCENTILE_DISC() WITHIN GROUP(ORDER BY )

    OVER([PARTITION BY ])

    ```


    For the results shown in Figure [7-1](#335106_2_En_7_Chapter.xhtml#Fig1) in the
    previous section, what is the median? Since an even number of rows is returned,
    it is the average of 719 and 1740, or 1229.5. Listing [7-4](#335106_2_En_7_Chapter.xhtml#PC6)
    demonstrates how the median can be calculated with `PERCENTILE_CONT()`. `PERCENTILE_DISC()`
    is shown as well, but it is not the median because there is an even number of
    rows. The answer is returned on every row; if you wish to see just the answer,
    use `DISTINCT`.

    ```

    --7-4.1 Find median for the set

    SELECT COUNT(*) NumberOfOrders, Month(OrderDate) AS orderMonth,

    PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY COUNT(*))

    OVER() AS TheMedian,

    PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY COUNT(*))

    OVER() AS PercentileDisc

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    GROUP BY Month(OrderDate);

    ```

    Listing 7-4 Finding the Median with PERCENTILE_CONT


    The results are shown in Figure [7-4](#335106_2_En_7_Chapter.xhtml#Fig4). Query
    1 shows the count and month for the entire year along with the `TheMedian` and
    `PercentileDisc`. The values are the same for every row because the answer is
    the same for every row in the set. Query 2 removes the count and month and uses
    `DISTINCT` so that just the answers are returned. Notice that `PERCENTILE_CONT()`
    interpolates the answer by averaging the two middle values producing a true median.
    `PERCENTILE_DISC()`, however, returns a value of 719. This is an actual value
    in the set. If the number of values is even, then this function will return the
    first value closest to the median when the percentile to compute is 0.5.

    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig4_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig4_HTML.jpg)

    Figure 7-4 Finding the median


    When there is an odd number of rows, these functions will return the same value
    in this case. Listing [7-5](#335106_2_En_7_Chapter.xhtml#PC7) shows what happens
    if there is an odd number of rows by filtering out one month.

    ```

    --7-5.1 Filter out January

    SELECT  DISTINCT PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY COUNT(*))

    OVER() AS TheMedian,

    PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY COUNT(*))

    OVER() AS PercentileDisc

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-02-01'' AND OrderDate < ''2014-01-01''

    GROUP BY Month(OrderDate);

    ```

    Listing 7-5 Finding the Median with an Odd Number of Rows


    Figure [7-5](#335106_2_En_7_Chapter.xhtml#Fig5) shows the results. In this case,
    since the number of rows is odd, the two functions return the same value.

    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig5_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig5_HTML.jpg)

    Figure 7-5 The two functions return the same value with odd rows


    While finding the median is an interesting use for these functions, you can also
    use them to find the value at any other percent rank. A useful application of
    this would be to return the value at the top 25% position, for example. Listing
    [7-6](#335106_2_En_7_Chapter.xhtml#PC8) creates and populates a `#scores` table
    with student scores and returns the score found at the top 25% position.

    ```

    --7-6.1 Set up table

    CREATE TABLE #scores(StudentID INT IDENTITY, Score DECIMAL(5,2));

    --7-6.2

    --Insert scores with Itzik style numbers table

    WITH lv0 AS (SELECT 0 g UNION ALL SELECT 0)

    ,lv1 AS (SELECT 0 g FROM lv0 a CROSS JOIN lv0 b)

    ,lv2 AS (SELECT 0 g FROM lv1 a CROSS JOIN lv1 b)

    ,lv3 AS (SELECT 0 g FROM lv2 a CROSS JOIN lv2 b)

    ,lv4 AS (SELECT 0 g FROM lv3 a CROSS JOIN lv3 b)

    ,Tally (n) AS (SELECT ROW_NUMBER() OVER (ORDER BY (SELECT NULL))

    FROM lv4)

    INSERT INTO #scores(Score)

    SELECT TOP(1000) CAST(RAND(CHECKSUM(NEWID())) * 100 as DECIMAL(5,2)) AS Score

    FROM Tally;

    --7-6.3 Return the score at the top 25%

    SELECT DISTINCT PERCENTILE_DISC(.25) WITHIN GROUP

    (ORDER BY Score DESC) OVER() AS Top25

    FROM #scores;

    ```

    Listing 7-6 Finding the Score at the Top 25% Position


    Figure [7-6](#335106_2_En_7_Chapter.xhtml#Fig6) shows the result. Your value will
    be different, of course, since the scores were generated randomly. After setting
    up the variables and the table, 1,000 rows were inserted with a random value.
    Query 3 returns the score at the top 25% position by finding the score with `PERCENTILE_DISC()`
    0.25 and sorting the scores in descending order.

    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig6_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig6_HTML.jpg)

    Figure 7-6 The score at the top 25% position'
