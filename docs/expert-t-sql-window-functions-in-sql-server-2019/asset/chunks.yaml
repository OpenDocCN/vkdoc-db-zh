- fmt: '## 变化率


    变化率是移动总量或移动平均值的百分比变化，用于衡量一个指标相比前一年是改善还是恶化。它们对于确定不同信息源之间的领先和滞后指标非常有用。领先指标是可以用来预测企业变化力量的事物。例如，如果你的企业依赖石油化工原料生产产品，石油价格的变化很可能预示着你产品需求的变化，因此可以被视为领先指标。将公司销售额的变化率与股票市场和大宗商品指数的变化率进行对比图表分析，可以确定你公司的表现是领先、滞后还是与股票市场表现同步。


    将清单 [11-3](#335106_2_En_11_Chapter.xhtml#PC5) 中的以下列计算块添加到清单 [11-2](#335106_2_En_11_Chapter.xhtml#PC4)
    的查询中，并探索结果。


    ```

    /* Rate of Change [3 MMT]/([3 MMT].LAG( 12 months)) */

    [Sales 3 MMT]

    / LAG(NULLIF([Sales 3 MMT], 0), 11, null)

    OVER(ORDER BY [OrderYear], [OrderMonth])

    as [3/12 RoC],

    /* [12 MMT] /([12 MMT].LAG( 12 months)) */

    [Sales 12 MMT]

    / LAG(NULLIF([Sales 12 MMT],0), 11, null)

    OVER(ORDER BY [OrderYear], [OrderMonth])

    as [12/12 RoC]

    ```


    清单 11-3

    变化率计算


    变化率小于 1.0 (100%) 表示下降趋势，变化率大于或等于 1.0 表示正增长。也可以修改计算，将比率转换为正数或负数，如下所示：


    ```

    /* Rate of Change +/- ([3 MMT]/([3 MMT].LAG( 12 months))* 100) -100 */

    ([Sales 3 MMT] / LAG(NULLIF([Sales 3 MMT], 0), 11, null)

    OVER(ORDER BY [OrderYear], [OrderMonth]) *100) - 100

    as [3/12 RoC2],

    /* ([12 MMT] /([12 MMT].LAG( 12 months))* 100) -100 */

    ([Sales 12 MMT] / LAG(NULLIF([Sales 12 MMT],0), 11, null)

    OVER(ORDER BY [OrderYear], [OrderMonth]) *100) - 100

    as [12/12 RoC2]

    ```


    变化率计算的结果最好用图表可视化。与差异百分比的图表相比，你应该会注意到 `[RoC]` 度量与总量的自然曲线相关性更紧密。本例中的 `[RoC]` 度量是销售额的滞后指标，因为它基于销售额。比较来自不同源度量的多个
    `[ROC]` 序列，可以发现你业务中关键指标的领先指标。图 [11-2](#335106_2_En_11_Chapter.xhtml#Fig2) 使用了
    `[ROC]` 计算的第二种形式。请注意，在 2012 年的大部分时间里，尽管销售额按月来看相对平稳，但变化率是负数。


    ![../images/335106_2_En_11_Chapter/335106_2_En_11_Fig2_HTML.jpg](images/335106_2_En_11_Chapter/335106_2_En_11_Fig2_HTML.jpg)


    图 11-2

    3 个月和 12 个月区间的变化率趋势


    ## 帕累托原则


    帕累托原则以意大利经济学家维尔弗雷多·帕累托命名，通常被称为 80/20 法则。它指出，大约 80% 的结果来自 20% 的原因。^([²](#fn2))
    应用该原则可以帮助我们确定业务中需要重点关注的最重要领域。例如，确定销售额前 20% 的产品可以为其他类型的分析和决策提供依据。


    帕累托分析/图表的计算方法是：按分析金额对项目进行排序，并计算每个项目的累计或滚动总和。然后将累计总和除以总金额以确定百分比。


    伪代码如下：


    ```

    [All Sales] = SUM([SalesAmount])

    [Cumulative Sales] = cumulative SUM([SalesAmount])

    [PARETO] = [Cumulative Sales] / [All Sales]

    ```


    在我们的样本数据中，如清单 [11-4](#335106_2_En_11_Chapter.xhtml#PC8) 所实现并在图 [11-3](#335106_2_En_11_Chapter.xhtml#Fig3)
    中所示的帕累托原则，将帮助我们确定产生大部分收入的产品。


    ![../images/335106_2_En_11_Chapter/335106_2_En_11_Fig3_HTML.jpg](images/335106_2_En_11_Chapter/335106_2_En_11_Fig3_HTML.jpg)


    图 11-3

    所有子类别的帕累托计算


    ```

    SELECT ps.EnglishProductSubcategoryName AS [Sub Category],

    SUM(f.SalesAmount) AS [Sub Category Sales],

    SUM(SUM(f.SalesAmount)) OVER ()        AS [All Sales],

    SUM(SUM(f.SalesAmount)) OVER (ORDER BY SUM(f.SalesAmount) DESC)    AS [Cumulative
    Sales],

    SUM(SUM(f.SalesAmount)) OVER (ORDER BY SUM(f.SalesAmount) DESC)

    / SUM(SUM(f.SalesAmount)) OVER () AS [Sales Pareto]

    FROM dbo.FactInternetSales AS f

    INNER JOIN dbo.DimProduct AS p

    ON f.ProductKey = p.ProductKey

    INNER JOIN dbo.DimProductSubcategory AS ps

    ON p.ProductSubcategoryKey = ps.ProductSubcategoryKey

    WHERE OrderDate BETWEEN ''2011-01-01'' AND ''2012-12-31''

    GROUP BY ps.ProductSubCategoryKey,

    ps.EnglishProductSubcategoryName

    order by [Sales Pareto]

    ```


    清单 11-4

    帕累托原则


    这个例子展示了确定 `[Sales Pareto]` 列所涉及的所有部分，但由于公路自行车占据了如此大的销售份额，我们需要深入研究该子类别以展示更典型的帕累托结果。在清单
    [11-5](#335106_2_En_11_Chapter.xhtml#PC9) 中，可以移除 `[All Sales]` 和 `[Cumulative
    Sales]` 列，因为它们仅用于 `[Sales Pareto]` 计算本身。添加数量总和可以为结果提供更多上下文，如图 [11-4](#335106_2_En_11_Chapter.xhtml#Fig4)
    所示。


    ![../images/335106_2_En_11_Chapter/335106_2_En_11_Fig4_HTML.jpg](images/335106_2_En_11_Chapter/335106_2_En_11_Fig4_HTML.jpg)


    图 11-4

    按产品划分的公路自行车销售帕累托


    ```

    SELECT p.EnglishProductName as [Product],

    SUM(f.SalesAmount) AS [Sub Category Sales],

    SUM(f.OrderQuantity) AS [Sub Category Qty],

    SUM(SUM(f.SalesAmount)) OVER (ORDER BY SUM(f.SalesAmount) DESC)

    / SUM(SUM(f.SalesAmount)) OVER () AS [Sales Pareto]

    FROM dbo.FactInternetSales AS f

    INNER JOIN dbo.DimProduct AS p

    ON f.ProductKey = p.ProductKey

    INNER JOIN dbo.DimProductSubcategory AS ps

    ON p.ProductSubcategoryKey = ps.ProductSubcategoryKey

    WHERE OrderDate BETWEEN ''2011-01-01'' AND ''2012-12-31''

    and ps.EnglishProductSubcategoryName = ''Road Bikes''

    GROUP BY P.EnglishProductName

    ,ps.ProductSubCategoryKey,

    ps.EnglishProductSubcategoryName

    order by [Sales Pareto]

    ```


    清单 11-5

    精细化的帕累托


    多亏了窗口函数的强大功能，现在将帕累托列添加到现有报告查询中是一项高价值、低投入的工作！


