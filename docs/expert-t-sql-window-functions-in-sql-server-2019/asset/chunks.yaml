  trans: '## 注意


    在一种情况下，你会看到查询中 `OVER` 关键字没有跟在窗口函数后面，那就是与序列对象一起使用。序列对象是 SQL Server 2008 引入的，它是一个包含递增数字的容器，通常用作标识列的替代方案。


    对于查询 `SELECT` 列表中的任何类型的表达式，都会对结果集中的每一行执行一次计算。例如，如果你有一个包含表达式 `Col1 + Col2` 的查询，那么对于返回的每一行，这两个列都会被相加一次。对第
    1 行、第 2 行、第 3 行等等都会执行计算。包含窗口函数的表达式也必须为每一行计算一次。然而，在这种情况下，表达式是在一组行上操作的，而这组行对于执行计算的每一行可能都是不同的。


    `OVER` 子句决定了哪些行组成了窗口。`OVER` 子句有三个可能的组成部分：`PARTITION BY`、`ORDER BY` 和窗口框架。`PARTITION
    BY` 表达式用于划分行，根据你要完成的任务，它是可选的。`ORDER BY` 表达式对于某些类型的窗口函数是必需的。在使用时，它决定了窗口函数的执行顺序。最后，窗口框架用于某些特定类型的窗口函数，以提供更细的粒度。你将在第
    5 章学习有关框架的内容。


    许多 T-SQL 开发人员和数据库专业人士都使用过 `ROW_NUMBER` 函数。他们甚至可能没有意识到这是窗口函数之一。在许多情况下，为查询添加行号是解决复杂查询问题的一个步骤。


    `ROW_NUMBER` 为每一行提供一个从 1 开始的递增数字。数字的分配顺序由 `ORDER BY` 表达式中指定的列决定，这独立于查询本身中的 `ORDER
    BY` 子句。运行清单 1-2 中的查询以了解其工作原理。


    ```

    USE AdventureWorks;

    GO

    --1-2.1 按 CustomerID 分配行号

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --1-2.2 按 SalesOrderID 分配行号

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    清单 1-2

    将行号应用于不同列

    ```


    ### 注意


    本书中的许多示例都使用了 `AdventureWorks` 和 `AdventureWorksDW` 数据库。你可以使用 2014 或更高版本的任何版本来跟随操作，本书撰写时最新的版本是
    2017 版。只需确保在包含 `USE` 语句时，根据你的数据库版本进行调整。


    `OVER` 子句跟在 `ROW_NUMBER` 函数后面。在 `OVER` 子句内部，你会看到 `ORDER BY` 后面跟着一个或多个列。查询 1 和
    2 之间的区别仅在于 `OVER` 子句中的 `ORDER BY` 表达式。请注意图 1-3 所示的部分结果，行号最终按照 `OVER` 子句中 `ORDER
    BY` 表达式所指定列的顺序应用，这也是数据返回的顺序。由于必须对数据进行排序才能应用行号，因此数据很容易保持该顺序，但这并不能保证。真正保证结果顺序的唯一方法是在查询中添加一个
    `ORDER BY`。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig3_HTML.jpg](img/335106_2_En_1_Fig3_HTML.jpg)


    图 1-3


    对不同的 `OVER` 子句使用 `ROW_NUMBER` 的部分结果


    如果查询本身有一个 `ORDER BY` 子句，它可以与 `OVER` 中的 `ORDER BY` 不同。清单 1-3 演示了这一点。


    ```

    --1-3.1 使用不同 ORDER BY 的行号

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY SalesOrderID;

    清单 1-3

    在 OVER 子句中使用与查询 ORDER BY 不同的 ROW_NUMBER

    ```


    在这种情况下，行号是按 `CustomerID` 的顺序分配的，但结果是按 `SalesOrderID` 的顺序返回的。部分结果如图 1-4 所示。为了显示行号分配正确，图中显示了网格滚动到第一个客户
    `CustomerID 11000` 的位置。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig4_HTML.jpg](img/335106_2_En_1_Fig4_HTML.jpg)


    图 1-4


    显示查询的 `ORDER BY` 与 `OVER` 子句不同的部分结果


    就像查询的 `ORDER BY` 子句一样，你可以在 `OVER` 子句中使用 `DESCENDING` 或 `DESC` 关键字来指定降序，如清单 1-4
    所示。


    ```

    --1-4.1 使用降序 ORDER BY 的行号

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID DESC) AS RowNumber

    FROM Sales.SalesOrderHeader;

    清单 1-4

    使用降序 ORDER BY 的 ROW_NUMBER

    ```


    图 1-5 显示了部分结果。由于数据库引擎可以轻松地按 `CustomerID` 降序返回结果，你可以很容易地看到行号 1 被分配给了最大的 `CustomerID`。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig5_HTML.jpg](img/335106_2_En_1_Fig5_HTML.jpg)


    图 1-5


    使用降序 `ORDER BY` 的 `ROW_NUMBER` 的部分结果


    在 `SalesOrderHeader` 表中，`CustomerID` 不是唯一的。请注意，在最后一个例子中，30118 是最大的 `CustomerID`。`SalesOrderID`
    为 71803 的行号是 1，而 `SalesOrderID` 为 65221 的行号是 2。无法保证行号会精确地按这种方式分配，只要最小的 `RowNumber`
    与 `CustomerID` 30118 对齐即可。为了确保行号按预期对齐，请在 `OVER` 子句的 `ORDER BY` 表达式中使用唯一的列或列的组合。如果使用多个列，请用逗号分隔。你甚至可以以随机顺序应用行号。清单
    1-5 演示了这一点。'
- fmt: '# 1-5. 使用随机 ORDER BY 的行号


    ```sql

    --1-5.1 Row number with a random ORDER BY

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY NEWID()) AS RowNumber

    FROM Sales.SalesOrderHeader;

    ```


    通过使用 `NEWID()` 函数，行号以随机方式分配。图 [1-6](#335106_2_En_1_Chapter.xhtml#Fig6) 展示了这一点。运行此代码，您将看到不同的
    `CustomerID` 值与行号对齐。每次数据按行号顺序返回，这只是因为数据库引擎这样做更容易。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig6_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig6_HTML.jpg)


    *图 1-6：使用随机 ORDER BY 的 ROW_NUMBER 的部分结果*


    如您所料，以特定顺序应用行号涉及排序，这是一个开销很大的操作。如果您希望生成行号但不关心顺序，可以使用选择字面值而非列名的子查询。清单 [1-6](#335106_2_En_1_Chapter.xhtml#PC6)
    演示了如何做到这一点。


    ```sql

    --1-6.1 Use a constant for an ORDER BY

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY (SELECT 1)) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --1-6.2 Apply an ORDER BY to the query

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY (SELECT 1)) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY SalesOrderID;

    --1-6.3 No ROW_NUMBER and no ORDER BY

    SELECT CustomerID, SalesOrderID

    FROM Sales.SalesOrderHeader;

    ```


    图 [1-7](#335106_2_En_1_Chapter.xhtml#Fig7) 显示了部分结果。在查询 1 和 2 中，选择常量的子查询替代了 `ORDER
    BY` 列。`OVER` 子句是相同的，但行号的应用方式不同，即以最简单的方式应用。两个查询的区别在于查询 2 有一个 `ORDER BY` 子句。由于没有指定行号分配的特定顺序，最简单的方式就是即使没有
    `ROW_NUMBER` 函数时结果也会返回的顺序。查询 3 展示了在没有 `ROW_NUMBER` 和 `ORDER BY` 的情况下行是如何返回的。您可能想知道优化器为何选择在查询
    1 和 3 中按 `CustomerID` 顺序返回结果。恰好在 `CustomerID` 上有一个覆盖这些查询的非聚集索引。优化器选择了在 `CustomerID`
    上有序的索引来解决查询。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig7_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig7_HTML.jpg)


    *图 1-7：让引擎决定如何应用行号的部分结果*


    从这个例子中还可以了解到 `ROW_NUMBER` 是非确定性的。它不能保证在相同情况下返回相同的值。通过查看每个窗口函数的文档，您会发现每一个都是非确定性的。您可能会认为这是错误的，因为两个查询使用了不同的
    `ORDER BY` 子句，导致两个 `ROW_NUMBER` 函数具有不同的输入。SQL Server 文档中的文章“确定性和非确定性函数”指出：


    > *您无法影响任何内置函数的确定性。每个内置函数是确定性的还是非确定性的，取决于 SQL Server 的实现方式。例如，在查询中指定 `ORDER BY`
    子句不会改变该查询中使用的函数的确定性。*


    如果 `ORDER BY` 子句由唯一的列集组成，您可以预测行号的分配方式，但 `ROW_NUMBER` 仍然是非确定性的。清单 [1-7](#335106_2_En_1_Chapter.xhtml#PC7)
    是一个例子。


    ```sql

    --1-7.1 OVER clause has just CustomerID

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --1-7.2 Same query, just a new ORDER BY clause

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID DESC;

    ```


    图 [1-8](#335106_2_En_1_Chapter.xhtml#Fig8) 显示了部分结果。注意，`SalesOrderID` 在查询 1 中被分配为
    1，在查询 2 中被分配为 3。两个查询之间唯一的区别是 `ORDER BY` 子句。由于 `CustomerID` 11000 有三个订单，数字 1、2
    和 3 必须分配给这三行，但无法保证它们将如何被分配。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig8_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig8_HTML.jpg)


    *图 1-8：演示非确定性*


    关于确定性，您无法使用窗口函数完成的有几件事。您不能在计算列（表中由表达式组成的列）中使用窗口函数表达式，也不能将窗口函数表达式用作视图聚集索引的键。


    `OVER` 子句中的 `ORDER BY` 表达式非常灵活。您可以使用表达式而不是列，就像之前示例中的 `NEWID()` 所展示的那样。您也可以列出多个列或表达式。清单
    [1-8](#335106_2_En_1_Chapter.xhtml#PC8) 演示了在 `ORDER BY` 中使用 `CASE` 语句。


    ```sql

    --1-8.1 Use an expression in the ORDER BY

    SELECT CustomerID, SalesOrderID, OrderDate,

    ROW_NUMBER() OVER(ORDER BY CASE WHEN OrderDate > ''2013/12/31''

    THEN 0 ELSE 1 END, SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    ```


    图 [1-9](#335106_2_En_1_Chapter.xhtml#Fig9) 显示了部分结果。在这种情况下，行号首先应用于 2014 年的订单，然后按
    `SalesOrderID` 分配。网格向下滚动到 2014 年的最后三个订单，以便您可以看到接下来应用的数字来自数据的开头，即 2011 年。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig9_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig9_HTML.jpg)


    *图 1-9：使用表达式和另一个列的部分结果*


    `OVER` 子句还有两个额外的组成部分：分区和框架。您将在第 [5](#335106_2_En_5_Chapter.xhtml) 章中学习到 2012 年引入的框架。分区将窗口划分为多个更小的窗口，接下来您将了解这部分内容。'
  raw: '```

    --1-5.1 Row number with a random ORDER BY

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY NEWID()) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 1-5

    Using a Random Order with ROW_NUMBER

    ```


    By using the `NEWID` function, the row numbers are applied in a random fashion.
    Figure [1-6](#335106_2_En_1_Chapter.xhtml#Fig6) shows this. If you run the code,
    you will see different `CustomerID` values aligned with the row numbers. Each
    time the data is returned in order of row number, just because it is easy for
    the database engine to do so.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig6_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Partial results of ROW_NUMBER with a random ORDER BY


    As you may guess, applying the row numbers in a specific order involves sorting,
    which is an expensive operation. If you wish to generate row numbers but do not
    care about the order, you can use a subquery selecting a literal value in place
    of a column name. Listing [1-6](#335106_2_En_1_Chapter.xhtml#PC6) demonstrates
    how to do this.


    ```

    --1-6.1 Use a constant for an ORDER BY

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY (SELECT 1)) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --1-6.2 Apply an ORDER BY to the query

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY (SELECT 1)) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY SalesOrderID;

    --1-6.3 No ROW_NUMBER and no ORDER BY

    SELECT CustomerID, SalesOrderID

    FROM Sales.SalesOrderHeader;

    Listing 1-6

    Using ROW_NUMBER with No Order

    ```


    Figure [1-7](#335106_2_En_1_Chapter.xhtml#Fig7) shows the partial results. In
    Queries 1 and 2, a subquery selecting a constant replaces the `ORDER BY` column.
    The `OVER` clauses are identical, but the row numbers are applied differently,
    the easiest way possible. The difference between the two queries is that Query
    2 has an `ORDER BY` clause. Since there is no specific order for the row numbers
    to be assigned, the easiest way is the order that the results would be returned
    even if the `ROW_NUMBER` function was not there. Query 3 shows how the rows are
    returned with no `ROW_NUMB`ER and no `ORDER BY`. You may be wondering why the
    optimizer chose to return the results in Queries 1 and 3 in `CustomerID` order.
    There just happens to be a nonclustered index on `CustomerID` covering those queries.
    The optimizer chose the index that is ordered on `CustomerID` to solve the queries.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig7_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Partial results of letting the engine decide how row numbers are applied


    Another thing to learn from this example is that `ROW_NUMBER` is nondeterministic.
    It is not guaranteed to return the identical values under the same situations.
    By reviewing the documentation for each window function, you will see that each
    one is nondeterministic. You may argue that this is wrong because a different
    `ORDER BY` clause is used for the two queries, causing the two `ROW_NUMBER` functions
    to have different inputs. The article “Deterministic and Nondeterministic Functions”
    in SQL Server’s documentation states:


    > *You cannot influence the determinism of any built-in function. Each built-in
    function is deterministic or nondeterministic based on how the function is implemented
    by SQL Server. For example, specifying an ORDER BY clause in a query does not
    change the determinism of a function that is used in that query.*


    If the `ORDER BY` clause consists of a unique set of columns, you can predict
    how the row numbers are assigned, but `ROW_NUMBER` is still nondeterministic.
    Listing [1-7](#335106_2_En_1_Chapter.xhtml#PC7) is an example.


    ```

    --1-7.1 OVER clause has just CustomerID

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --1-7.2 Same query, just a new ORDER BY clause

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID DESC;

    Listing 1-7

    Using Different ORDER BY Clauses

    ```


    Figure [1-8](#335106_2_En_1_Chapter.xhtml#Fig8) shows the partial results. Notice
    that `SalesOrderID` is assigned 1 in Query 1 and 3 in Query 2\. The only difference
    between the two queries is the `ORDER BY` clause. Since `CustomerID` 11000 has
    three orders, numbers 1, 2, and 3 must be assigned to the three rows, but there
    is no guarantee how they will be assigned.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig8_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Demonstrating nondeterminism


    There are a couple of things that you cannot do with window functions that may
    be related to determinism. You cannot use a window function expression in a computed
    column (a column in a table composed of an expression), and you cannot use a window
    function expression as a key for the clustered index of a view.


    The `ORDER BY` expression in the `OVER` clause is quite versatile. You can use
    an expression instead of a column as was shown with `NEWID` in the earlier example.
    You can also list multiple columns or expressions. Listing [1-8](#335106_2_En_1_Chapter.xhtml#PC8)
    demonstrates using the `CASE` statement in the `ORDER BY`.


    ```

    --1-8.1 Use an expression in the ORDER BY

    SELECT CustomerID, SalesOrderID, OrderDate,

    ROW_NUMBER() OVER(ORDER BY CASE WHEN OrderDate > ''2013/12/31''

    THEN 0 ELSE 1 END, SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 1-8

    Using an Expression in the ORDER BY and Another Column

    ```


    Figure [1-9](#335106_2_En_1_Chapter.xhtml#Fig9) shows the partial results. In
    this case, the row numbers are applied first to the orders from 2014 and then
    by `SalesOrderID`. The grid is scrolled down to the last three orders of 2014
    so you can see that the next numbers applied are from the beginning of the data,
    2011.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig9_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Partial results of using an expression and another column


    There are two additional components of the `OVER` clause: partitioning and framing.
    You will learn about framing, introduced in 2012, in Chapter [5](#335106_2_En_5_Chapter.xhtml).
    Partitioning divides the window into multiple, smaller windows, and you’ll learn
    about that next.'
