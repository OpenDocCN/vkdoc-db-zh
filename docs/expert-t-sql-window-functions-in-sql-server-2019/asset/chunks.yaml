    ## 使用 PERCENTILE_CONT 和 PERCENTILE_DISC


    你已经了解了如何使用 `PERCENT_RANK()` 和 `CUME_DIST()` 对一系列值进行排名和比较。另外两个统计函数 `PERCENTILE_CONT()`（百分位连续值）和
    `PERCENTILE_DISC()`（百分位离散值）则执行相反的任务。给定一个百分比排名，这些函数会找到该位置的值。这两个函数的区别在于，`PERCENTILE_CONT()`
    会在数据集上插值计算出一个值，而 `PERCENTILE_DISC()` 会从数据集中返回一个精确的值。


    一个非常常见的需求是找到一组值的中位数或中间值。你可以通过使用 `PERCENTILE_CONT()` 并指定希望找到 50% 位置的值来完成此任务。


    这些函数的语法与其他窗口函数也略有不同。你仍然需要提供一个 `OVER` 子句，但在 `OVER` 子句内部，你只需在需要时指定 `PARTITION BY`
    表达式。


    `ORDER BY` 不再放在 `OVER` 子句中，而是放在一个名为 `WITHIN GROUP` 的新子句中。`WITHIN GROUP` 子句必须返回一个数字列表。回想一下，其他函数的
    `OVER` 子句中的 `ORDER BY` 是用来对行进行排序的，但在这里，`WITHIN GROUP` 表达式才是要操作的数字列表。`ORDER BY`
    必须只包含一个表达式，并且计算结果为数值类型，如 `INT` 或 `DECIMAL`。


    语法如下：

    ```

    PERCENTILE_CONT() WITHIN GROUP(ORDER BY )

    OVER([PARTITION BY ])

    PERCENTILE_DISC() WITHIN GROUP(ORDER BY )

    OVER([PARTITION BY ])

    ```


    对于上一节图 7-1 中所示的结果，中位数是多少？由于返回的是偶数行，中位数是 719 和 1740 的平均值，即 1229.5。清单 7-4 演示了如何使用
    `PERCENTILE_CONT()` 计算中位数。同时也展示了 `PERCENTILE_DISC()`，但由于行数是偶数，它返回的不是中位数。结果会在每一行上返回；如果你只想看到答案，请使用
    `DISTINCT`。

    ```

    --7-4.1 查找集合的中位数

    SELECT COUNT(*) NumberOfOrders, Month(OrderDate) AS orderMonth,

    PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY COUNT(*))

    OVER() AS TheMedian,

    PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY COUNT(*))

    OVER() AS PercentileDisc

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    GROUP BY Month(OrderDate);

    ```

    清单 7-4 使用 PERCENTILE_CONT 查找中位数


    结果如图 7-4 所示。查询 1 显示了全年的计数和月份，以及 `TheMedian` 和 `PercentileDisc`。由于集合中每一行的答案都相同，所以这些值在每一行上都是一样的。查询
    2 去掉了计数和月份，并使用了 `DISTINCT`，因此只返回答案。请注意，`PERCENTILE_CONT()` 通过对两个中间值取平均值来进行插值计算，从而得出真正的中位数。然而，`PERCENTILE_DISC()`
    返回的值是 719。这是集合中的一个实际值。如果值的数量是偶数，那么当要计算的百分位为 0.5 时，此函数将返回最接近中位数的第一个值。

    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig4_HTML.jpg](img/335106_2_En_7_Fig4_HTML.jpg)

    图 7-4 查找中位数


    当行数为奇数时，在这种情况下，这两个函数将返回相同的值。清单 7-5 通过过滤掉一个月来展示当行数为奇数时会发生什么。

    ```

    --7-5.1 过滤掉一月份

    SELECT  DISTINCT PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY COUNT(*))

    OVER() AS TheMedian,

    PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY COUNT(*))

    OVER() AS PercentileDisc

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-02-01'' AND OrderDate < ''2014-01-01''

    GROUP BY Month(OrderDate);

    ```

    清单 7-5 在行数为奇数时查找中位数


    图 7-5 展示了结果。在这种情况下，由于行数是奇数，两个函数返回相同的值。

    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig5_HTML.jpg](img/335106_2_En_7_Fig5_HTML.jpg)

    图 7-5 行数为奇数时，两个函数返回相同的值


    虽然寻找中位数是这些函数一个有趣的应用，但你也可以用它们来查找任何其他百分比排名位置的值。一个有用的应用是返回前 25% 位置的值。清单 7-6 创建并填充了一个包含学生成绩的
    `#scores` 表，并返回了在前 25% 位置找到的分数。

    ```

    --7-6.1 设置表

    CREATE TABLE #scores(StudentID INT IDENTITY, Score DECIMAL(5,2));

    --7-6.2

    --使用 Itzik 风格的数字表插入分数

    WITH lv0 AS (SELECT 0 g UNION ALL SELECT 0)

    ,lv1 AS (SELECT 0 g FROM lv0 a CROSS JOIN lv0 b)

    ,lv2 AS (SELECT 0 g FROM lv1 a CROSS JOIN lv1 b)

    ,lv3 AS (SELECT 0 g FROM lv2 a CROSS JOIN lv2 b)

    ,lv4 AS (SELECT 0 g FROM lv3 a CROSS JOIN lv3 b)

    ,Tally (n) AS (SELECT ROW_NUMBER() OVER (ORDER BY (SELECT NULL))

    FROM lv4)

    INSERT INTO #scores(Score)

    SELECT TOP(1000) CAST(RAND(CHECKSUM(NEWID())) * 100 as DECIMAL(5,2)) AS Score

    FROM Tally;

    --7-6.3 返回前 25% 位置的分数

    SELECT DISTINCT PERCENTILE_DISC(.25) WITHIN GROUP

    (ORDER BY Score DESC) OVER() AS Top25

    FROM #scores;

    ```

    清单 7-6 查找前 25% 位置的分数


    图 7-6 展示了结果。当然，你的结果会有所不同，因为分数是随机生成的。在设置好变量和表之后，插入了 1,000 行带有随机值的记录。查询 3 通过使用 `PERCENTILE_DISC()`
    0.25 并按分数降序排序，返回了前 25% 位置的分数。

    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig6_HTML.jpg](img/335106_2_En_7_Fig6_HTML.jpg)

    图 7-6 前 25% 位置的分数

