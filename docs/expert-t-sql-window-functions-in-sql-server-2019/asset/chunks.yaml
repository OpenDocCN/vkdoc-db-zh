    (''2/1/2019 01:30:00'', ''etl data load to sql_server_01'', ''medium'', ''job
    failed'')

    GO

    ```


    Listing 9-5

    Create an Error Log for Demonstration of Simple Data Cluster/Proximity Analytics


    A quick select from the table illustrates the sort of data we are working with,
    as seen in Figure [9-5](#335106_2_En_9_Chapter.xhtml#Fig5).


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig5_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig5_HTML.jpg)


    Figure 9-5

    Data sample from `dbo.error_log`


    Our interest is in grouping alerts to show those that relate to each other. This
    can be done using `GROUP BY`, but how do we decide what to group by? If an alert
    occurs at 11:59:59 p.m. and another at 12:00:00 a.m., grouping by date or hour
    will show these as unrelated events. For our purposes, let’s say that all events
    that occur within 5 minutes of each other are considered part of the same data
    cluster and are related. Listing [9-6](#335106_2_En_9_Chapter.xhtml#PC7) shows
    a query that will return errors from the log grouped by this rule.'
