- fmt: '## Understanding `FIRST_VALUE` and `LAST_VALUE`


    While `LAG` and `LEAD` allow you to include any column from a row a given number
    of rows away from the current row, the `FIRST_VALUE` and `LAST_VALUE` functions
    let you include any column from the first or last row of the partition. At first
    glance, this may seem very similar to `MIN` and `MAX`, but they are very different.
    The column to sort on is not necessarily the column to pull into the results.
    The first value may not be the minimum value. These functions do not have any
    optional parameters, but they do support framing. Review Chapter [5](#335106_2_En_5_Chapter.xhtml)
    to learn more about framing if you are not familiar with the concept. Recall that
    the default frame starts at the first row of the partition and includes all rows
    up to the current row. This causes a problem when using `LAST_VALUE`. If you do
    not specify the frame, `LAST_VALUE` returns the value from the current row instead
    of from the last row of the partition. That is because the current row is the
    same as the last row with the default frame. Listing [6-4](#335106_2_En_6_Chapter.xhtml#PC7)
    demonstrates how to use `FIRST_VALUE` and `LAST_VALUE`.


    ```sql

    --6-4.1 Using FIRST_VALUE and LAST_VALUE

    SELECT CustomerID, SalesOrderID, TotalDue,

    FIRST_VALUE(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS FirstOrderAmt,

    LAST_VALUE(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS LastOrderAmt_WRONG,

    LAST_VALUE(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING) AS LastOrderAmt

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    ```

    Listing 6-4

    Using `FIRST_VALUE` and `LAST_VALUE`


    Figure [6-4](#335106_2_En_6_Chapter.xhtml#Fig4) shows the partial results. The
    windows are partitioned by `CustomerID` and ordered by `SalesOrderID`. The query
    itself is ordered by `CustomerID` and `SalesOrderID` so you can verify the results.
    Take a look at row 2. The `FirstOrderAmt` correctly returns the value of the `TotalDue`
    from row 1. The window frame for `FirstOrderAmt` is the default, all rows from
    the beginning of the partition up to the current row. Since the frame was not
    specified for `LastOrderAmt_WRONG`, the frame is the same, which only goes up
    to the current row. The query was intended to pull a value from the very last
    row of the partition, however. In order to do that, the frame must be specified.
    The expression for `LastOrderAmt` includes the correct frame so it actually does
    return the expected value.


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig4_HTML.jpg](images/335106_2_En_6_Chapter/335106_2_En_6_Fig4_HTML.jpg)


    Figure 6-4

    Partial results of using `FIRST_VALUE` and `LAST_VALUE`


    The new graph database function `SHORTEST_PATH` uses it without an `OVER` clause.
    Take a look at this article to learn more: [`https://www.red-gate.com/simple-talk/sql/sql-development/sql-server-2019-graph-database-and-shortest_path/`](https://www.red-gate.com/simple-talk/sql/sql-development/sql-server-2019-graph-database-and-shortest_path/)


    ## Using the Offset Functions to Solve Queries


    My favorite T-SQL functions of all time are `LAG` and `LEAD`. Not only are they
    easy to use, but they perform very well, too. You will learn more about how the
    performance of the offset functions compares to other methods in Chapter [8](#335106_2_En_8_Chapter.xhtml).
    In Chapter [1](#335106_2_En_1_Chapter.xhtml), you saw how easy it was to compare
    closing stock prices using `LAG`. Now you will see how offset functions can be
    used to solve some other real-world problems.


    ### The Year-Over-Year Growth Calculation


    Year-over-year (YOY) growth is a very commonly used metric in business. It compares
    a period, such as a month or quarter, to the same period from the previous year.
    Run Listing [6-5](#335106_2_En_6_Chapter.xhtml#PC8) to see how easy this is to
    do with `LAG`.


    ```sql

    --6-5.1 Calculate Year-Over-Year Growth

    WITH

    Level1 AS (

    SELECT YEAR(OrderDate) AS SalesYear,

    MONTH(OrderDate) AS SalesMonth,

    SUM(TotalDue) AS TotalSales

    FROM Sales.SalesOrderHeader

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)

    ),

    Level2 AS (

    SELECT SalesYear, SalesMonth,TotalSales,

    LAG(TotalSales,12) OVER(ORDER BY SalesYear) AS PrevYearSales

    FROM Level1)

    SELECT SalesYear, SalesMonth,FORMAT(TotalSales,''C'') AS TotalSales,

    FORMAT(PrevYearSales,''C'') AS PrevYearSales,

    FORMAT((TotalSales-PrevYearSales)/PrevYearSales,''P'') AS YOY_Growth

    FROM Level2

    WHERE PrevYearSales IS NOT NULL;

    ```

    Listing 6-5

    Calculating YOY Growth with `LAG`


    Figure [6-5](#335106_2_En_6_Chapter.xhtml#Fig5) shows the partial results. In
    order to demonstrate a stepwise approach, this query contains two CTEs. Except
    for filtering out the `NULL` values, the same results could be obtained by writing
    the query at two levels, but I think this approach makes it easier to understand.
    The first CTE, `Level1`, creates a list of sales by year and month. `Level2` adds
    in the expression using `LAG` to calculate the sales for the same month of the
    previous year. Finally, in the outer query, the YOY calculation is performed by
    subtracting the previous year’s sales from the current sales and dividing by the
    previous year’s sales. The `FORMAT` function is used to change the results to
    a percentage. The rows that cannot be compared to a previous row are filtered
    out of the outer query.


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig5_HTML.jpg](images/335106_2_En_6_Chapter/335106_2_En_6_Fig5_HTML.jpg)


    Figure 6-5

    Partial results of calculating YOY growth'
