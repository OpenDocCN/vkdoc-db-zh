  trans: '

    ## 将框架应用于累计聚合和移动聚合


    框架概念最早随 SQL Server 2012 版本被引入。它适用于一部分窗口函数，包括你在第 4 章学到的累计聚合函数，以及两个偏移函数：`FIRST_VALUE`
    和 `LAST_VALUE`。你将在第 6 章学习偏移函数。


    通过指定框架，你可以计算反向累计总和和移动聚合。运行代码清单 5-2 查看一些示例。


    ```sql

    --5-2.1 累计与反向累计总和

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID

    ROWS UNBOUNDED PRECEDING) AS RunningTotal,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING) AS ReverseTotal

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --5-2.2 移动求和与移动平均

    SELECT YEAR(OrderDate) AS OrderYear, MONTH(OrderDate) AS OrderMonth,

    COUNT(*) AS OrderCount,

    SUM(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthCount,

    AVG(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthAvg

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2012-01-01'' AND OrderDate < ''2013-01-01''

    GROUP BY YEAR(OrderDate), MONTH(OrderDate);

    ```

    代码清单 5-2

    使用框架


    图 5-3 展示了部分结果。通过指定窗口应从当前行开始并持续到分区末尾，你可以像查询 1 那样创建一个反向累计总和。通过指定窗口由当前行及前两行组成，如查询
    2，你便创建了一个移动窗口。


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig3_HTML.jpg](img/335106_2_En_5_Fig3_HTML.jpg)

    图 5-3

    使用框架计算的部分结果


    你可能会注意到，使用 `N PRECEDING` 的计算在行数不足三个月时也会返回值。为了解决这个问题，你可以过滤掉不合格的行。代码清单 5-3 展示了你可能会如何操作。


    ```sql

    --5-3.1 过滤掉前置行数不足 2 的行

    WITH Sales AS (

    SELECT YEAR(OrderDate) AS OrderYear, MONTH(OrderDate) AS OrderMonth,

    COUNT(*) AS OrderCount,

    SUM(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthCount,

    AVG(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthAvg,

    ROW_NUMBER() OVER(PARTITION BY YEAR(OrderDate)

    ORDER BY MONTH(OrderDate)) AS RowNum

    FROM Sales.SalesOrderHeader

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)

    )

    SELECT OrderYear, OrderMonth, OrderCount, ThreeMonthCount, ThreeMonthAvg

    FROM Sales

    WHERE RowNum >= 3;

    ```

    代码清单 5-3

    过滤掉前置行数不足两行的行


    此查询包含了按年分区的 `ROW_NUMBER`，因此不会返回 2011 年的 5 月和 6 月。图 5-4 展示了部分结果。


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig4_HTML.jpg](img/335106_2_En_5_Fig4_HTML.jpg)

    图 5-4

    过滤掉不足行后的部分结果


    要获得如前面示例中的 `ThreeMonthAvg` 这样的移动聚合值，你必须使用框架。如果你只是想要一个累计总和，或许可以不指定框架。`ReverseTotal`
    确实需要框架，因为它从数据末尾开始，到当前行结束。通常在讲解窗口函数时，会有人提到将 `ORDER BY` 表达式改为降序 (descending) 可以得到反向累计总和，他们是对的。代码清单
    5-4 展示了一个例子。


    ```sql

    --5-4.1 不使用框架的累计与反向累计总和

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RunningTotal,

    SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID DESC

    ) AS ReverseTotal

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    ```

    代码清单 5-4

    不使用框架的累计总和与反向累计总和


    其结果与图 5-3 中第一个查询显示的结果相同。在 SQL Server 2019 之前，我会警告不要这样做，因为存在性能影响。你将在第 8 章了解更多关于
    `ROWS` 和 `RANGE` 在性能上的差异。在此之前，你确实需要意识到这两种运算符在逻辑上的一个关键区别。

    '
- fmt: '## Understanding the Logical Difference Between ROWS and RANGE


    In Chapter [8](#335106_2_En_8_Chapter.xhtml), you will see that frames using `ROWS`
    have a big performance advantage over `RANGE` when working in versions of SQL
    Server before 2019. There is also a logical difference between the two operators.
    The `ROWS` operator is a positional operator, while the `RANGE` operator is a
    logical one. This is very similar to the difference between `ROW_NUMBER` and `RANK`.
    When there are ties in the `ORDER BY` expression, `RANK` will repeat the value,
    while `ROW_NUMBER` will return a unique value. If there are ties in the `ORDER
    BY` expression of the `OVER` clause when calculating running totals, `ROWS` and
    `RANGE` will return different results as well. Run Listing [5-5](#335106_2_En_5_Chapter.xhtml#PC6)
    to see this difference.


    ```sql

    --5-5.1 Compare the logical difference between ROWS and RANGE

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID, TotalDue,

    SUM(TotalDue) OVER(ORDER BY OrderDate

    ROWS UNBOUNDED PRECEDING) AS RunningTotalRows,

    SUM(TotalDue) OVER(ORDER BY OrderDate

    RANGE UNBOUNDED PRECEDING) AS RunningTotalRange

    FROM Sales.SalesOrderHeader

    WHERE CustomerID =11300

    ORDER BY SalesOrderID;

    ```


    Listing 5-5

    The Difference Between ROWS and RANGE


    The partial results are shown in Figure [5-5](#335106_2_En_5_Chapter.xhtml#Fig5).
    The `ORDER BY` expressions in the `OVER` clauses are both `OrderDate`, which is
    not unique. Take a look at rows 7 and 8 where the customer has placed two orders
    on the same day. The `RunningTotalRows` values increment as expected, while the
    `RunningTotalRange` value is the same for both rows. On row 9, the `RunningTotalRange`
    value lines back up again.


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig5_HTML.jpg](images/335106_2_En_5_Chapter/335106_2_En_5_Fig5_HTML.jpg)


    Figure 5-5

    Partial results of comparing ROWS to RANGE


    The window for `ROWS` in this case starts with the first row and includes all
    rows up to the current row sorted by the `ORDER BY`. The window for `RANGE` is
    all rows starting with the first row and up to any rows with the *same value*
    as the current row’s `ORDER BY` expression. When the window for row 7 is determined,
    `RANGE` looks at not just the position but also the value. The value for the `OrderDate`
    for row 8 is the same as the value for row 7, so row 8 is included in the window
    for row 7.


    Just in case you think there is a bug with `RANGE`, run Listing [5-6](#335106_2_En_5_Chapter.xhtml#PC7),
    which uses one of the older techniques and returns the identical results to using
    `RANGE`.


    ```sql

    --5-6.1 Look at the older technique

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID, TotalDue,

    (SELECT SUM(TotalDue)

    FROM Sales.SalesOrderHeader AS IQ

    WHERE IQ.CustomerID = OQ.CustomerID

    AND IQ.OrderDate <= OQ.OrderDate) AS RunningTotal

    FROM Sales.SalesOrderHeader AS OQ

    WHERE CustomerID =11300

    ORDER BY SalesOrderID;

    ```


    Listing 5-6

    Same Results from Older Technique


    The partial results are shown in Figure [5-6](#335106_2_En_5_Chapter.xhtml#Fig6).
    Take a look at rows 7 and 8. You’ll see that because the `OrderDate` values are
    the same, the `RunningTotal` values are the same as well.


    ![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig6_HTML.jpg](images/335106_2_En_5_Chapter/335106_2_En_5_Fig6_HTML.jpg)


    Figure 5-6

    Partial results of using an older technique to calculate running totals


    If you ensure that the `ORDER BY` expression is unique, you will get the expected
    results with both the old method and with a window aggregate using the default
    frame.


    As mentioned previously, the `RANGE` operator is really meant to work with logical
    sets such as months or quarters. This functionality has been defined by the ANSI
    standard but is not implemented at this time in SQL Server. In the meantime, make
    sure you always specify the frame with `ROWS`.


    ## Summary


    It’s easy to write a query that calculates running totals or moving averages.
    By default, the frame is defined with `RANGE`, but `ROWS` is recommended just
    in case the `ORDER BY` expression is not unique. In older versions of SQL Server,
    you will also see a performance boost by using `ROWS` which you’ll learn about
    in Chapter [8](#335106_2_En_8_Chapter.xhtml). The frame also allows you to specify
    a window size that moves down the results for calculations such as three-month
    averages.


    The syntax for the frame is not easy to learn, but there is no shame in looking
    up the syntax found in this chapter from time to time. Luckily, you do not have
    to worry about the frame except when using accumulating window aggregates and
    the functions `FIRST_VALUE` and `LAST_VALUE`. You will learn about `FIRST_VALUE`
    and `LAST_VALUE` in the next chapter, Chapter [6](#335106_2_En_6_Chapter.xhtml).


    # 6. Taking a Peek at Another Row


    Along with accumulating window aggregates, Microsoft added eight new window functions
    with SQL Server 2012. Four of the functions, which I’ll call offset functions
    in this book, are my favorite T-SQL functions, and they are `LAG`, `LEAD`, `FIRST_VALUE`,
    and `LAST_VALUE`. These functions let you include any columns from other rows
    in your results without a self-join and with fantastic performance.


    In this chapter, you will learn how to use `LAG`, `LEAD`, `FIRST_VALUE`, and `LAST_VALUE`.
    You will see how easy they are to use. The performance is great, but you’ll learn
    about that in Chapter [8](#335106_2_En_8_Chapter.xhtml).'
