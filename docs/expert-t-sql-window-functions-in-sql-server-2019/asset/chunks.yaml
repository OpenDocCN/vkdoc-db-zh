  trans: "\n## 计算移动总计和平均值\n\n移动总计和平均值是非常流行的商业和经济指标。例如，开发者可能被要求提供按 3 个月或 12 个月计算这些指标的报告。默认情况下，用于累积窗口聚合的窗口在分区内持续增长，但对于移动聚合，你希望窗口大小保持不变。这可以通过添加窗口框架定义来实现。以下是包含移动聚合窗口框架的累积窗口聚合语法。第\
    \ 5 章详细介绍了窗口框架，所以现在只需复制示例中的代码。\n\n```sql\n() OVER([PARTITION BY ]]\nORDER BY \n\
    [ROWS BETWEEN  PRECEDING AND CURRENT ROW])\n```\n\n窗口对每一行都不同。图 4-3 展示了移动聚合的窗口工作原理。\n\
    \n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig3_HTML.jpg](img/335106_2_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3：按 3 个月计算的移动聚合窗口\n\n运行清单 4-2 查看示例。\n\n```sql\n--4-2.1 产品销售数量的三个月总和与平均值\n\
    SELECT MONTH(SOH.OrderDate) AS OrderMonth, SOD.ProductID, SUM(SOD.OrderQty) AS\
    \ QtySold,\nSUM(SUM(SOD.OrderQty))\nOVER(PARTITION BY SOD.ProductID ORDER BY MONTH(SOH.OrderDate)\n\
    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthSum,\nAVG(SUM(SOD.OrderQty))\n\
    OVER(PARTITION BY SOD.ProductID ORDER BY MONTH(SOH.OrderDate)\nROWS BETWEEN 2\
    \ PRECEDING AND CURRENT ROW) AS ThreeMonthAvg\nFROM Sales.SalesOrderHeader AS\
    \ SOH\nJOIN Sales.SalesOrderDetail AS SOD ON SOH.SalesOrderID = SOD.SalesOrderID\n\
    JOIN Production.Product AS P ON SOD.ProductID = P.ProductID\nWHERE OrderDate >=\
    \ '2013-01-01' AND OrderDate < '2014-01-01'\nGROUP BY MONTH(SOH.OrderDate), SOD.ProductID;\n\
    --清单 4-2：计算移动平均值和总和\n```\n\n该查询筛选出 2013 年下的订单，并按月份和`ProductID`进行聚合。图 4-4 显示了部分结果，即产品\
    \ 707 一年的销售情况。注意，每种情况下的窗口函数都应用于聚合值，即`OrderQty`的总和。在聚合查询中使用窗口函数时，函数或`OVER`子句中使用的任何列都遵循与`SELECT`列表相同的规则。更多信息请参见第\
    \ 3 章的“将窗口聚合添加到聚合查询”部分。通过在`OVER`子句中添加`ORDER BY`和`ROWS`表达式（框架），窗口每次向前移动，最多包含三行。\n\
    \n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig4_HTML.jpg](img/335106_2_En_4_Fig4_HTML.jpg)\n\
    \n图 4-4：计算移动聚合的部分结果\n\n大多数情况下，对三个月计算的要求是，如果不足三个月无法计算平均值，则值应为`NULL`，但这些函数只会对可用数据进行求和。例如，一月和二月的三个月总和与平均值应为`NULL`。从三月开始，三个月的数据已备齐，因此会返回总和。为此，你需要检查月份的数量。清单\
    \ 4-3 展示了一种方法。\n\n```sql\n--4-3.1 当不足三个月时显示 NULL\nSELECT MONTH(SOH.OrderDate)\
    \ AS OrderMonth, SOD.ProductID,\nSUM(SOD.OrderQty) AS QtySold,\nCASE WHEN ROW_NUMBER()\
    \ OVER(PARTITION BY SOD.ProductID\nORDER BY MONTH(SOH.OrderDate)) = '2013-01-01'\
    \ AND OrderDate < '2014-01-01'\nGROUP BY MONTH(SOH.OrderDate), SOD.ProductID;\n\
    --清单 4-3：当行数不足时返回 NULL\n```\n\n图 4-5 显示了部分结果，即`ProductID` 707 一年的销售情况。通过使用`CASE`语句检查`ROW_NUMBER`，当可用行数不足三行时返回`NULL`。\n\
    \n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig5_HTML.jpg](img/335106_2_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5：当可用行数不足三行时返回 NULL\n\n## 使用累积聚合解决查询\n\n创建累加和移动聚合非常简单！你将在第 5 章学习如何利用`OVER`子句的框架组件，以确保得到预期的结果。在第\
    \ 8 章中，还将讨论框架的性能，这也很重要。与排名函数不同，计算累加或移动聚合可能本身就是解决方案，而不仅仅是解决方案中的一个步骤。下一节将展示如何使用累积窗口函数来解决更有趣的问题。\n"
- fmt: '### The Last Good Value Problem


    I ran across this problem in a forum, and several people tried to solve it. The
    best solution was developed by T-SQL guru, Itzik Ben-Gan.


    The table for this problem has two columns. The first, `ID`, is an incrementing
    integer, the primary key of the table. The second column may contain `NULL` values.
    The task is to replace each `NULL` with the previous non-`NULL` value.


    #### Listing 4-4: Creating and Populating the Table


    The following listing creates and populates the table and displays the rows.


    ```sql

    --4-4.1 Create the table

    CREATE TABLE #TheTable(ID INT, Data INT);

    --4-4.2 Populate the table

    INSERT INTO #TheTable(ID, Data)

    VALUES(1,1),(2,1),(3,NULL),

    (4,NULL),(5,6),(6,NULL),

    (7,5),(8,10),(9,13),

    (10,12),(11,NULL);

    --4-4.3 Display the results

    SELECT * FROM #TheTable;

    ```


    #### Figure 4-6: The data for the last good value problem


    Figure 4-6 shows the raw data in the table. Notice that rows 3, 4, 6, and 11 have
    `NULL` in the `Data` column. The solution will replace the `NULL` with 1 for rows
    3 and 4, with 6 for row 6, and with 12 for row 11.


    ![The data for the last good value problem](images/335106_2_En_4_Chapter/335106_2_En_4_Fig6_HTML.jpg)


    I found Itzik’s solution to be quite elegant and brilliant. It takes advantage
    of the fact that you can use any of the aggregate functions as accumulating window
    aggregates, not just `SUM` and `AVG`. Take a look at row 4. The value needed to
    replace the `NULL` is the `Data` value from row 2. The `ID` of row 2 is also the
    maximum `ID` for the rows leading up to row 4 that are not `NULL` in the `Data`
    column. A window that starts at row 1 of a partition and goes up to the current
    row is the same window that you need for a running total! You can take advantage
    of this fact to find the maximum `ID` leading up to the current row where the
    `Data` value is not `NULL`.


    #### Listing 4-5: Step 1 of the Solution


    ```sql

    --4-5.1 Find the max non-null row

    SELECT ID, Data,

    MAX(CASE WHEN Data IS NOT NULL THEN ID END)

    OVER(ORDER BY ID) AS MaxRowID

    FROM #TheTable;

    ```


    #### Figure 4-7: The results of step 1


    Figure 4-7 shows the results so far. The `MaxRowID` column is the `ID` from the
    row that contains the `Data` value that each row needs. The `MAX` function finds
    the largest `ID` value for rows that have a non-`NULL Data` value up to the current
    row.


    ![The results of step 1](images/335106_2_En_4_Chapter/335106_2_En_4_Fig7_HTML.jpg)


    My first thought is that I could use the `MaxRowID` column to join the table to
    itself, but take a look at this data closely. Within each group of rows with the
    same `MaxRowID` value, there is one non-`NULL Data` row, and the rest are `NULL`.
    There are three rows where `MaxRowID` is 2. Only one of those rows has a non-`NULL
    Data` value. My next thought is to just group by `MaxRowID` and use the `MAX`
    function on the `Data` column. The problem is that you would lose the details
    that you need to see by doing so. But window aggregates let you add an aggregate
    function without changing the query to an aggregate query. Instead of grouping
    on `MaxRowID`, partition on it.


    #### Listing 4-6: The Complete Solution


    ```sql

    --4-6.1 The solution

    WITH MaxData AS

    (SELECT ID, Data,

    MAX(CASE WHEN Data IS NOT NULL THEN ID END)

    OVER(ORDER BY ID) AS MaxRowID

    FROM #TheTable)

    SELECT ID, Data,

    MAX(Data) OVER(PARTITION BY MaxRowID) AS NewData

    FROM MaxData;

    ```


    #### Figure 4-8: The complete results of the Last Good Value Problem


    Figure 4-8 shows the results. The first part of the solution is added to a CTE.
    In the outer query, the `MAX` function is used to find the maximum `Data` value,
    actually the only one that is not `NULL`, partitioned by the `MaxRowID`.


    ![The complete results of the Last Good Value Problem](images/335106_2_En_4_Chapter/335106_2_En_4_Fig8_HTML.jpg)


    The solution seems quite simple once you see it. Thanks to Itzik Ben-Gan for figuring
    this out.'
