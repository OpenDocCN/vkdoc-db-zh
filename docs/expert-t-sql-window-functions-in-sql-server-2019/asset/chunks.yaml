  trans: '

    ## 理解 `FIRST_VALUE` 和 `LAST_VALUE`


    虽然 `LAG` 和 `LEAD` 允许你从距当前行指定行数的任意行中包含任何列，但 `FIRST_VALUE` 和 `LAST_VALUE` 函数让你可以包含分区中第一行或最后一行的任何列。乍一看，这似乎与
    `MIN` 和 `MAX` 非常相似，但它们实际上大不相同。用于排序的列不一定是需要提取到结果中的列。第一个值不一定是最小值。这些函数没有任何可选参数，但它们确实支持**框架**。如果你对这个概念不熟悉，请回顾第
    5 章以了解更多关于框架的信息。回想一下，默认框架从分区的第一行开始，并包括直到当前行的所有行。这在使用 `LAST_VALUE` 时会导致一个问题。如果你不指定框架，`LAST_VALUE`
    会从当前行返回值，而不是从分区的最后一行返回。这是因为在默认框架下，当前行与最后一行是相同的。清单 6-4 演示了如何使用 `FIRST_VALUE` 和
    `LAST_VALUE`。


    ```sql

    --6-4.1 使用 FIRST_VALUE 和 LAST_VALUE

    SELECT CustomerID, SalesOrderID, TotalDue,

    FIRST_VALUE(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS FirstOrderAmt,

    LAST_VALUE(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID) AS LastOrderAmt_WRONG,

    LAST_VALUE(TotalDue) OVER(PARTITION BY CustomerID

    ORDER BY SalesOrderID

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING) AS LastOrderAmt

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    ```

    清单 6-4

    使用 `FIRST_VALUE` 和 `LAST_VALUE`


    图 6-4 显示了部分结果。窗口按 `CustomerID` 进行分区，并按 `SalesOrderID` 排序。查询本身按 `CustomerID` 和
    `SalesOrderID` 排序，以便你可以验证结果。看一下第 2 行。`FirstOrderAmt` 正确地返回了第 1 行的 `TotalDue` 值。`FirstOrderAmt`
    的窗口框架是默认的，即从分区开始到当前行的所有行。由于没有为 `LastOrderAmt_WRONG` 指定框架，其框架也是相同的，只到当前行为止。然而，查询的本意是从分区的最后一行提取一个值。为了做到这一点，必须指定框架。`LastOrderAmt`
    的表达式包含了正确的框架，因此它确实返回了预期的值。


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig4_HTML.jpg](img/335106_2_En_6_Fig4_HTML.jpg)


    图 6-4

    使用 `FIRST_VALUE` 和 `LAST_VALUE` 的部分结果


    新的图形数据库函数 `SHORTEST_PATH` 在不使用 `OVER` 子句的情况下使用了它。阅读这篇文章了解更多：[`https://www.red-gate.com/simple-talk/sql/sql-development/sql-server-2019-graph-database-and-shortest_path/`](https://www.red-gate.com/simple-talk/sql/sql-development/sql-server-2019-graph-database-and-shortest_path/)


    ## 使用偏移函数解决查询


    我最喜欢的 T-SQL 函数一直是 `LAG` 和 `LEAD`。它们不仅易于使用，而且性能也非常出色。你将在第 8 章中了解更多关于偏移函数与其他方法性能比较的内容。在第
    1 章中，你已经看到使用 `LAG` 比较收盘价是多么容易。现在你将看到如何使用偏移函数来解决其他一些现实世界的问题。


    ### 同比增长率计算


    同比增长率（YOY）是商业中非常常用的指标。它将一个时期（如月份或季度）与上一年的同一时期进行比较。运行清单 6-5 看看使用 `LAG` 计算这个有多简单。


    ```sql

    --6-5.1 计算同比增长

    WITH

    Level1 AS (

    SELECT YEAR(OrderDate) AS SalesYear,

    MONTH(OrderDate) AS SalesMonth,

    SUM(TotalDue) AS TotalSales

    FROM Sales.SalesOrderHeader

    GROUP BY YEAR(OrderDate), MONTH(OrderDate)

    ),

    Level2 AS (

    SELECT SalesYear, SalesMonth,TotalSales,

    LAG(TotalSales,12) OVER(ORDER BY SalesYear) AS PrevYearSales

    FROM Level1)

    SELECT SalesYear, SalesMonth,FORMAT(TotalSales,''C'') AS TotalSales,

    FORMAT(PrevYearSales,''C'') AS PrevYearSales,

    FORMAT((TotalSales-PrevYearSales)/PrevYearSales,''P'') AS YOY_Growth

    FROM Level2

    WHERE PrevYearSales IS NOT NULL;

    ```

    清单 6-5

    使用 `LAG` 计算同比增长


    图 6-5 显示了部分结果。为了演示一种循序渐进的方法，这个查询包含了两个 CTE。除了过滤掉 `NULL` 值外，通过两级编写查询也可以得到相同的结果，但我认为这种方法更容易理解。第一个
    CTE `Level1` 创建了一个按年和月列出的销售清单。`Level2` 添加了使用 `LAG` 的表达式来计算上一年同一月份的销售额。最后，在外部查询中，通过从当前销售额中减去上一年的销售额，再除以上一年的销售额，来执行同比增长计算。`FORMAT`
    函数用于将结果转换为百分比格式。无法与上一行进行比较的行从外部查询中过滤掉了。


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig5_HTML.jpg](img/335106_2_En_6_Fig5_HTML.jpg)


    图 6-5

    计算同比增长的部分结果

    '
- fmt: '### The Timecard Problem


    This problem involves the timecards of employees as they arrive at and leave work
    each day. The goal is to calculate how long each employee worked on each shift.
    Listing [6-6](#335106_2_En_6_Chapter.xhtml#PC9) contains the statements to create
    a temp table and display the initial rows.


    ```sql

    --6-6.1 Create the table

    DROP TABLE IF EXISTS #TimeCards;

    CREATE TABLE #TimeCards(

    TimeStampID INT NOT NULL IDENTITY PRIMARY KEY,

    EmployeeID INT NOT NULL,

    ClockDateTime DATETIME2(0) NOT NULL,

    EventType VARCHAR(5) NOT NULL);

    --6-6.2 Populate the table

    INSERT INTO #TimeCards(EmployeeID,

    ClockDateTime, EventType)

    VALUES

    (1,''2019-01-02 08:00'',''ENTER''),

    (2,''2019-01-02 08:03'',''ENTER''),

    (2,''2019-01-02 12:00'',''EXIT''),

    (2,''2019-01-02 12:34'',''Enter''),

    (3,''2019-01-02 16:30'',''ENTER''),

    (2,''2019-01-02 16:00'',''EXIT''),

    (1,''2019-01-02 16:07'',''EXIT''),

    (3,''2019-01-03 01:00'',''EXIT''),

    (2,''2019-01-03 08:10'',''ENTER''),

    (1,''2019-01-03 08:15'',''ENTER''),

    (2,''2019-01-03 12:17'',''EXIT''),

    (3,''2019-01-03 16:00'',''ENTER''),

    (1,''2019-01-03 15:59'',''EXIT''),

    (3,''2019-01-04 01:00'',''EXIT'');

    --6-6.2 Display the rows

    SELECT TimeStampID, EmployeeID, ClockDateTime, EventType

    FROM #TimeCards;

    ```


    Listing 6-6: Create and Populate the `#TimeCard` Table


    Figure [6-6](#335106_2_En_6_Chapter.xhtml#Fig6) shows the rows for this problem.
    Note that every `ENTER` row has a matching `EXIT` row.


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig6_HTML.jpg](images/335106_2_En_6_Chapter/335106_2_En_6_Fig6_HTML.jpg)


    Figure 6-6: The timecard rows


    Solving this problem is easy with the `LEAD` function. Listing [6-7](#335106_2_En_6_Chapter.xhtml#PC10)
    shows the solution.


    ```sql

    WITH Level1 AS (

    SELECT EmployeeID, EventType, ClockDateTime,

    LEAD(ClockDateTime) OVER(PARTITION BY EmployeeID ORDER BY ClockDateTime)

    AS NextDateTime

    FROM #TimeCards

    ),

    Level2 AS (

    SELECT EmployeeID, CAST(ClockDateTime AS DATE) AS WorkDate,

    SUM(DATEDIFF(second, ClockDateTime,NextDateTime)) AS Seconds

    FROM Level1

    WHERE EventType = ''Enter''

    GROUP BY EmployeeID, CAST(ClockDateTime AS DATE))

    SELECT EmployeeID, WorkDate,

    TIMEFROMPARTS(Seconds / 3600, Seconds % 3600 / 60,

    Seconds % 3600 % 60, 0, 0) AS HoursWorked

    FROM Level2

    ORDER BY EmployeeID, WorkDate;

    ```


    Listing 6-7: The Solution to the Timecard Problem


    The solution is split up to make it easier to understand. The first CTE, `Level1`,
    uses the `LEAD` function to find the `ClockDateTime` of the next row. The number
    of seconds between the two is calculated and the `Exit` rows are thrown out. The
    seconds are also summed in this level in case the employee clocked out for lunch.
    The main query uses the `TIMEFROMPARTS` to convert the seconds into an hour:minute
    format. Figure [6-7](#335106_2_En_6_Chapter.xhtml#Fig7) shows the results.


    ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig7_HTML.jpg](images/335106_2_En_6_Chapter/335106_2_En_6_Fig7_HTML.jpg)


    Figure 6-7: The results of the timecard problem


    ## Summary


    The offset functions of `LAG`, `LEAD`, `FIRST_VALUE`, and `LAST_VALUE` first available
    with SQL Server 2012 are very powerful. They not only make it easy to write queries
    that pull values from different rows, but the performance is fantastic, too, which
    you’ll see for yourself in Chapter [8](#335106_2_En_8_Chapter.xhtml).


    There is one more set of functions to learn, the statistical functions. Chapter
    [7](#335106_2_En_7_Chapter.xhtml) teaches you what you need to know to take advantage
    of these window functions.


    # 7. Understanding Statistical Functions


    In 2012, Microsoft added four more window functions to SQL Server. These are statistical
    functions `PERCENT_RANK`, `CUME_DIST`, `PERCENTILE_CONT`, and `PERCENTILE_DISC`.
    These functions make analyzing data from many sources, such as science, academics,
    or sports, easy.


    In this chapter you will learn how to use these statistical functions.


    ## Using PERCENT_RANK and CUME_DIST


    Remember those standardized tests you took in school? You were probably given
    a raw score and a percent for each area tested, such as mathematics or language
    skills. Percent rank is a way to calculate how each individual in a group compares
    to the rest of the group.


    Starting with SQL Server 2012, there are two functions for ranking data such as
    those test scores, or even heights. Say that there are 100 seventh graders lined
    up by height. My grandson, Thomas, is a pretty tall boy so he would stand at spot
    95\. He is taller than 94 other students. His height is higher than 94% of the
    heights and is higher than or the same as 95% of the heights. Thomas’ height has
    a `PERCENT_RANK` of 0.9494 and a `CUME_DIST` (cumulative distribution) of 0.95.


    You may be wondering why the `PERCENT_RANK` is 0.9494 and not just 0.94\. The
    formula for `PERCENT_RANK` is the rank of the score minus one divided by the number
    of scores minus one: `(rank-1)/(N-1)`. The formula for `CUME_DIST` is just the
    rank of the score divided by the number of scores: `rank/N`. The `PERCENT_RANK`
    of Thomas’ height can be found by dividing 94 by 99, not 94 by 100.


    Just like all other window functions, an `OVER` clause is required when using
    these functions. It must contain an `ORDER BY` expression that determines how
    the scores or values are lined up. The `PARTITION BY` expression is optional.
    If it is used, then the items within a partition will be compared, not outside
    the partition. Here is the syntax:


    ```sql

    PERCENT_RANK OVER([PARTITION BY <partition_column>] ORDER BY <order_column>)

    CUME_DIST OVER([PARTITION BY <partition_column>] ORDER BY <order_column>)

    ```


    Listing [7-1](#335106_2_En_7_Chapter.xhtml#PC2) demonstrates how to use these
    functions to compare the sales for each month of a given year.


    ```sql

    --7-1.1 Using PERCENT_RANK and CUME_DIST

    SELECT COUNT(*) NumberOfOrders, Month(OrderDate) AS OrderMonth,

    RANK() OVER(ORDER BY COUNT(*)) AS Ranking,

    PERCENT_RANK() OVER(ORDER BY COUNT(*)) AS PercentRank,

    CUME_DIST() OVER(ORDER BY COUNT(*)) AS CumeDist

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    GROUP BY  Month(OrderDate);

    ```


    Listing 7-1: Using PERCENT_RANK and CUME_DIST


    Figure [7-1](#335106_2_En_7_Chapter.xhtml#Fig1) shows the results. The query is
    filtered to include the orders for just 2013 and grouped by month. The `ORDER
    BY` expression for each function is the count of the orders. Recall that when
    you use a window function in an aggregate query, any columns used in the function
    must follow the rules for the `SELECT` list. See Chapter [3](#335106_2_En_3_Chapter.xhtml)
    for more information about adding a window function to an aggregate query. The
    `PercentRank` for the first row is 0\. The first value for `PercentRank` will
    always be 0 because that row is not ranked above any other row. Both the `PercentRank`
    and `CumeDist` will be 1, or 100% for the last row. In all rows except for the
    last, the `CumeDist` is larger than the `PercentRank`. Notice that when there
    is a tie, as in rows 3 and 4, the values are repeated.


    ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig1_HTML.jpg](images/335106_2_En_7_Chapter/335106_2_En_7_Fig1_HTML.jpg)


    Figure 7-1: The results of using PERCENT_RANK and CUME_DIST


    Here’s another example comparing the average high monthly temperature for the
    St. Louis Metro area where I live. Run Listing [7-2](#335106_2_En_7_Chapter.xhtml#PC3)
    to create and populate the table.


    ```sql

    --7-2.1 Create the table

    CREATE TABLE #MonthlyTempsStl(MNo Int, MName varchar(15), AvgHighTempF INT, AvgHighTempC
    DECIMAL(4,2));

    --7-2.2 Insert the rows with F temps

    INSERT INTO #MonthlyTempsStl (Mno, Mname, AvgHighTempF)

    VALUES(1,''Jan'',40),(2,''Feb'',45),(3,''Mar'',55),(4,''Apr'',67),(5,''May'',77),(6,''Jun'',85),

    (7,''Jul'',89),(8,''Aug'',88),(9,''Sep'',81),(10,''Oct'',69),(11,''Nov'',56),(12,''Dec'',43);

    --7-2.3 Calculate C

    UPDATE #MonthlyTempsStl

    SET AvgHighTempC = (AvgHighTempF - 32) * 5.0/9;

    --7-2.4 Return the results

    SELECT * FROM #MonthlyTempsStl;

    ```


