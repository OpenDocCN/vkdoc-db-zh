    Query to Group Errors into Related Clusters of Data with a Proximity of 5 Minutes

    ```


    This query appears long, but follows a methodical approach that we will adopt
    for the remainder of our work:


    1.  Create a rule that determines proximity and when events are related or not.


    2.  Create a set of data that includes the current event, previous event, and
    next event.


    3.  Define the starting points for all data clusters using the proximity rule.


    4.  Define the ending points for all data clusters using the proximity rule.


    5.  Join the starting and ending points together to create a result set.


    LEAD and LAG are used to quickly retrieve the previous and next events in our
    data set, whereas ROW_NUMBER is used to track the island count, for joining purposes
    at the end of our query. The results can be seen in Figure [9-6](#335106_2_En_9_Chapter.xhtml#Fig6).


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig6_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Error log data, grouped by events that occur within 5 minutes of each other


    We can see that a handful of errors have been grouped together into larger data
    clusters, whereas the rest are not related by proximity. Anyone reviewing this
    data would be able to tell when significant outages occurred and could trend metrics
    based on the size, length, or depth of these outages.


    While our results only included times and counts, we could add details about which
    events occurred within each range the most, least, or details of the first event
    in the range (as it may often be the cause of the outage).


    It is important to order data uniquely. LEAD, LAG, and ROW_NUMBER must all have
    an ORDER BY clause that is unique. For our example here, we included *error_log_id*,
    an identity column, after the time. This ensures that our data is ordered uniquely
    the same way every time this query is executed. If the underlying data has duplicate
    values and we do not apply a unique sort order, then there is a risk of inconsistent
    or inaccurate data along those boundaries.


    The key to proximity analysis is to define a rule that can be used to order data
    into numbered groups. With that rule we can determine the boundaries of data clusters
    and join them together to produce a set of grouped results. Unlike using GROUP
    BY, we will not know the size of our result set until runtime. The quantity of
    rows returned will be data-driven and could be a single row for many related events
    or many rows for a set of unrelated events.


    If we adjust our rule, we can change the shape of our results. If events that
    occurred within 15 minutes of each other were related, instead of 5 minutes, then
    we would get a smaller data set with higher event counts. If we adjusted the rule
    to be narrower, counting events occurring within 1 minute of each other as related,
    then our result set would contain more rows and smaller counts. Experimenting
    with rules is a key component of this style of analytics and will help us determine
    which metrics are most meaningful to a given data set. When in doubt, we could
    automate a process that iterates through many different rules to determine which
    will provide the most value.


    ## Tracking Streaks


    A data cluster can represent many types of data groupings. In sports, streaks
    are significant and form the basis for many statistics that are used to make constant
    data-driven decisions. Winning and losing are the most common patterns to be reported
    on, but managers also track details. In baseball, hitting streaks, consecutive
    outs, errors, and many other metrics can be tracked as sequences of events. These
    sequences manifest themselves as islands or gaps that we can report on in the
    same fashion that we did for error log data.


    For the remainder of our examples, we will use a set of baseball data that is
    defined in a single wide table called *dbo.GameLog*. This table contains a row
    per game and includes an exhaustive amount of detail, as shown in a sample in
    Figure [9-7](#335106_2_En_9_Chapter.xhtml#Fig7).


    ![../images/335106_2_En_9_Chapter/335106_2_En_9_Fig7_HTML.jpg](images/335106_2_En_9_Chapter/335106_2_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Sample of baseball game log data


    Included are details such as the weather, line score, and the names of umpires,
    coaches, and managers. Much of this data is missing or incomplete for older games,
    and so any queries we write must be tolerant of this fact. This data includes
    every regular season game, as well as all-star games and post-season games, for
    a total of 219,832 baseball games logged from 1871 through 2018.


    All abbreviations, names, codes, and ambiguous dimensions have lookup tables that
    can be used to validate their existence or meaning. For the sake of our work,
    these added dimensions will be skipped as they will not provide any additional
    value to our analysis of streaks.'
