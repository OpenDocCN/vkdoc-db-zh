- fmt: '## Taking Advantage of Batch Mode on Rowstore


    There are two types of window functions that have not scaled well in the past:
    window aggregates and statistical functions. These functions are easy to use,
    but performance suffers if operating on a large number of rows. You can get around
    these issues by pre-aggregating so that the functions are applied to a smaller
    number of rows, but this is not always possible. Listing [8-13](#335106_2_En_8_Chapter.xhtml#PC13)
    shows two examples using the table created in Listing [8-10](#335106_2_En_8_Chapter.xhtml#PC10)
    and making sure that the database is in 2017 (140) compatibility mode.


    ```sql

    --8-13.1 Set the compatibility level

    USE master;

    GO

    ALTER DATABASE AdventureWorks2017

    SET COMPATIBILITY_LEVEL = 140 WITH NO_WAIT;

    GO

    USE AdventureWorks2017;

    GO

    --8-13.2 A window aggregate

    PRINT ''8-13.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID) AS SubTotal

    FROM SOD;

    --8-13.2 A statistical function

    PRINT ''8-11.2''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    PERCENT_RANK()

    OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) AS Ranking

    FROM SOD;

    ```


    Listing 8-13: A Window Aggregate and a Statistical Function


    ### Figure 8-17: The logical reads from a window aggregate and a statistical function


    Figure [8-17](#335106_2_En_8_Chapter.xhtml#Fig17) shows the logical reads. Notice
    that there are a large number of logical reads due to worktables.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig17_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig17_HTML.jpg)


    ### Figure 8-18: The execution plans showing Table Spool operators


    The actual execution plans are quite complex despite the simple query syntax.
    Figure [8-18](#335106_2_En_8_Chapter.xhtml#Fig18) shows the partial plans. Note
    that each has more than one `Table Spool` operator. `Table Spool` operators mean
    that the worktable is created in `tempdb`. It will always take a lot of resources
    even though the estimated cost is low.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig18_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig18_HTML.jpg)


    You may be wondering why the `PERCENT_RANK()` function has poor performance when
    the `RANK()` function’s performance is acceptable. This is because the formula
    for the `PERCENT_RANK()` function is `(RANK -1)/(TotalRows -1)`. Under the covers,
    the window aggregate `COUNT` is used to calculate the total rows. The other three
    statistical functions suffer from the same performance issues as well.


    In 2012, Microsoft introduced nonclustered `Columnstore Indexes` (`CI`). `CI`s
    are a different way to store data where a page contains one column of many, possibly
    thousands, of rows. This means that high levels of compression are possible, and
    queries can be faster by an order of magnitude. With each version of SQL Server,
    Microsoft has enhanced `CI`, including a new way to process aggregates on large
    data sets, `Batch Mode`. This is especially useful for queries that require high
    CPU resources. Before SQL Server 2019 (still in preview at the time of this writing),
    a `CI` had to be involved in the query. Starting with 2019, the optimizer can
    choose to use `Batch Mode` even when no `CI` is part of the query. This is called
    `Batch Mode on Rowstore`.


    Listing [8-14](#335106_2_En_8_Chapter.xhtml#PC14) demonstrates how the new `Batch
    Mode on Rowstore` improves the performance of a window aggregate query.


    ```sql

    --8-14.1 Set the compatibility level

    USE master;

    GO

    ALTER DATABASE AdventureWorks2017

    SET COMPATIBILITY_LEVEL = 150 WITH NO_WAIT;

    GO

    USE AdventureWorks2017;

    GO

    --8-14.2 A window aggregate

    PRINT ''8-14.1''

    SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

    SUM(LineTotal) OVER(PARTITION BY SalesOrderID) AS SubTotal

    FROM SOD;

    ```


    Listing 8-14: Using Batch Mode on Rowstore


    ### Figure 8-19: The logical reads when Batch Mode is used


    Figure [8-19](#335106_2_En_8_Chapter.xhtml#Fig19) shows the logical reads. Notice
    that there are 0 logical reads for the worktable.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig19_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig19_HTML.jpg)


    ### Figure 8-20: The plan with the Window Aggregate operator


    Figure [8-20](#335106_2_En_8_Chapter.xhtml#Fig20) shows the actual execution plan.
    In this case, the plan is quite simple compared to running the same query when
    in 2017 compatibility. Notice also that a new operator, the `Window Aggregate`
    operator, is part of the plan.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig20_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig20_HTML.jpg)


    ### Figure 8-21: Batch execution mode


    When you hover over the operator, you’ll see the properties shown in Figure [8-21](#335106_2_En_8_Chapter.xhtml#Fig21).
    Notice that the `Execution Mode` is `Batch`.


    ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig21_HTML.jpg](images/335106_2_En_8_Chapter/335106_2_En_8_Fig21_HTML.jpg)


    Over the years since window aggregates have been introduced, I have loved using
    them, but I was always concerned about performance. Now, when the function must
    operate over a large number of rows, `Batch Mode` can kick in and improve the
    performance. Note that Microsoft doesn’t publish when it’s worth it to switch
    to `Batch Mode`, so your results will vary.


    `Batch Mode on Rowstore` also helps the performance of the statistical functions,
    `PERCENT_RANK()`, `CUME_DIST()`, `PERCENTILE_CONT()`, and `PERCENTILE_DISC()`.
    Under the hood, these functions use window aggregates in their formulas, so it
    makes sense that they would benefit.


    At the time of this writing, there is no word on which editions of SQL Server
    will include this great feature.'
