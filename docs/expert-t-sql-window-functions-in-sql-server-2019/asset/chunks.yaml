- fmt: '## Understanding RANK and DENSE_RANK


    The functions `RANK` and `DENSE_RANK` look very similar to `ROW_NUMBER`. In fact,
    in many queries they will return exactly the same values as `ROW_NUMBER`. The
    `RANK` and `DENSE_RANK` functions are quite different, however, since instead
    of just assigning sequential numbers, they rank the rows based on the `ORDER BY`
    expression.


    The difference shows up when the `ORDER BY` column of the `OVER` clause is not
    unique. For example, many customers could place orders on the same date, but each
    order has a unique `SalesOrderID`. If you used the `OrderDate` column instead
    of the `SalesOrderID`, you will see ties in the results. The ranking of the rows
    with ties will be the same.


    There is also a difference between `RANK` and `DENSE_RANK`. The `RANK` function
    returns the rank of the current row compared to the position of all the rows of
    the partition. The `DENSE_RANK` function returns the rank based on the unique
    value of the `ORDER BY` expression of the current row in the partition. `RANK`
    says how many rows before the current one, and `DENSE_RANK` says how many *unique
    values* come before the current value. Another way to think about this is `ROW_NUMBER`
    is positional, `DENSE_RANK` is logical, and `RANK` is halfway between the two.
    `ROW_NUMBER` is based on the position of the row when it is lined up, and `DENSE_RANK`
    is based on how the unique value lines up.


    The syntax of these two functions looks a lot like the syntax of `ROW_NUMBER`:


    ```

    RANK() OVER([PARTITION BY [,,...]] ORDER BY  [,,...])

    DENSE_RANK() OVER([PARTITION BY [,,...]]

    ORDER BY  [,,...])

    ```


    Listing [2-4](#335106_2_En_2_Chapter.xhtml#PC6) compares `ROW_NUMBER` to `RANK`
    and `DENSE_RANK`. The query is filtered to show to customers who have placed multiple
    orders on the same date.


    ```

    --2-4.1 Using RANK and DENSE_RANK

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate,

    ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber,

    RANK() OVER(ORDER BY OrderDate) AS [Rank],

    DENSE_RANK() OVER(ORDER BY OrderDate) AS DenseRank

    FROM Sales.SalesOrderHeader

    WHERE CustomerID IN (11330, 29676);

    Listing 2-4

    Using RANK and DENSE_RANK

    ```


    Figure [2-4](#335106_2_En_2_Chapter.xhtml#Fig4) shows the partial results. The
    `ORDER BY` column in each `OVER` clause is `OrderDate` which is not unique. The
    row numbers are unique and sequential, just as expected. Notice that the `Rank`
    values of the third and fourth rows are both 3. Both of those rows have the `OrderDate`
    of 2013-07-31, a tie. This is the third ranked `OrderDate` in the set of rows.
    On row 5, the `Rank` "catches up" with the `RowNumber` value, 5. The date 2013-08-09
    in the fifth row is the fifth ranked `OrderDate` in the set.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig4_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig4_HTML.jpg)


    Figure 2-4: Partial results comparing ROW_NUMBER, RANK, and DENSE_RANK


    The `DenseRank` values for rows 3 and 4 are also both 3. Notice that the `DenseRank`
    for row 5 is 4, however. The date 2013-08-09 is the fourth *distinct* `OrderDate`
    in the set.


    The `ROW_NUMBER`, `RANK`, and `DENSE_RANK` functions assign a number to each row.
    Now you will learn about a different type of ranking function, `NTILE`.


    ## Dividing Data with NTILE


    The `NTILE` function is a ranking function, but with a twist. The numbers applied
    are used to divide the results into equal buckets. You must specify how many buckets
    are needed and, just like the other ranking functions, an `ORDER BY` expression
    is required in the `OVER` clause. Here is the syntax for `NTILE`:


    ```

    NTILE() OVER([PARTITION BY [,,...]]

    ORDER BY  [,,...])

    ```


    Within the parentheses after the word `NTILE`, supply the number of buckets you
    want to see in the results. The `PARTITION BY` expression is optional, and the
    `ORDER BY` is required. Listing [2-5](#335106_2_En_2_Chapter.xhtml#PC8) shows
    an example that divides the months into four buckets depending on the sales of
    2013.


    ```

    --2.5.1 Using NTILE

    WITH Orders AS (

    SELECT MONTH(OrderDate) AS OrderMonth,

    FORMAT(SUM(TotalDue),''C'') AS Sales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013/01/01'' and OrderDate < ''2014/01/01''

    GROUP BY MONTH(OrderDate))

    SELECT OrderMonth, Sales, NTILE(4) OVER(ORDER BY Sales) AS Bucket

    FROM Orders;

    Listing 2-5

    Using NTILE

    ```


    Figure [2-5](#335106_2_En_2_Chapter.xhtml#Fig5) shows the results. The query aggregates
    the sales from 2013 into months inside a CTE called `Orders`. In the outer query,
    the `NTILE` function is applied. The bucket that each month falls into depends
    on the sales for that month. `Bucket #1` contains the three months with the lowest
    sales. `Bucket #4` contains the three months with the highest sales.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig5_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig5_HTML.jpg)


    Figure 2-5: Using NTILE


    In this example, using four buckets, the data divided up evenly into the buckets.
    Sometimes the rows are not evenly divided by the bucket number. When there is
    one extra row after dividing, `bucket #1` will get an extra row. When there are
    two extra rows after dividing, `buckets #1` and `#2` will get an extra row and
    so on. Listing [2-6](#335106_2_En_2_Chapter.xhtml#PC9) demonstrates this.


    ```

    --2.6.1 Using NTILE with uneven buckets

    WITH Orders AS (

    SELECT MONTH(OrderDate) AS OrderMonth, FORMAT(SUM(TotalDue),''C'')

    AS Sales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013/01/01'' and OrderDate < ''2014/01/01''

    GROUP BY MONTH(OrderDate))

    SELECT OrderMonth, Sales, NTILE(5) OVER(ORDER BY Sales) AS Bucket

    FROM Orders;

    Listing 2-6

    Using NTILE with Uneven Buckets

    ```


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig6_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig6_HTML.jpg)


    Figure 2-6: The results of NTILE with uneven buckets


    This query returns five buckets. Twelve divided by five is two with a remainder
    of two. If you take a look at the results shown in Figure [2-6](#335106_2_En_2_Chapter.xhtml#Fig6),
    you will see that `buckets #1` and `#2` each have three rows. The other buckets
    each have two rows.


    You have seen many examples explaining how to use the ranking functions in this
    chapter, but you have not seen any practical examples. The next section will demonstrate
    some real-world problems that can be solved with these functions.


    ## Solving Queries with Ranking Functions


    Since 2005 when these functions were first introduced, I have found more and more
    reasons to use the ranking functions when writing queries. I believe they have
    helped me learn to think in a set-based manner, and using window functions just
    became intuitive over time. When I am faced with a challenging query, I often
    just add a row number to see if I can find any patterns and go from there.'
  raw: '## Understanding RANK and DENSE_RANK


    The functions `RANK` and `DENSE_RANK` look very similar to `ROW_NUMBER`. In fact,
    in many queries they will return exactly the same values as `ROW_NUMBER`. The
    `RANK` and `DENSE_RANK` functions are quite different, however, since instead
    of just assigning sequential numbers, they rank the rows based on the `ORDER BY`
    expression.


    The difference shows up when the `ORDER BY` column of the `OVER` clause is not
    unique. For example, many customers could place orders on the same date, but each
    order has a unique Sales`OrderID`. If you used the `OrderDate` column instead
    of the Sales`OrderID`, you will see ties in the results. The ranking of the rows
    with ties will be the same.


    There is also a difference between `RANK` and `DENSE_RANK`. The `RANK` function
    returns the rank of the current row compared to the position of all the rows of
    the partition. The `DENSE_RANK` function returns the rank based on the unique
    value of the ORDER BY expression of the current row in the partition. `RANK` says
    how many rows before the current one, and `DENSE_RANK` says how many *unique values*
    come before the current value. Another way to think about this is `ROW_NUMBER`
    is positional, `DENSE_RANK` is logical, and `RANK` is halfway between the two.
    `ROW_NUMBER` is based on the position of the row when it is lined up, and `DENSE_RANK`
    is based on how the unique value lines up.


    The syntax of these two functions looks a lot like the syntax of `ROW_NUMBER`:


    ```

    RANK() OVER([PARTITION BY [,,...]] ORDER BY  [,,...])

    DENSE_RANK() OVER([PARTITION BY [,,...]]

    ORDER BY  [,,...])

    ```


    Listing [2-4](#335106_2_En_2_Chapter.xhtml#PC6) compares `ROW_NUMBER` to `RANK`
    and `DENSE`_`RANK`. The query is filtered to show to customers who have placed
    multiple orders on the same date.


    ```

    --2-4.1 Using RANK and DENSE_RANK

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate,

    ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber,

    RANK() OVER(ORDER BY OrderDate) AS [Rank],

    DENSE_RANK() OVER(ORDER BY OrderDate) AS DenseRank

    FROM Sales.SalesOrderHeader

    WHERE CustomerID IN (11330, 29676);

    Listing 2-4

    Using RANK and DENSE_RANK

    ```


    Figure [2-4](#335106_2_En_2_Chapter.xhtml#Fig4) shows the partial results. The
    `ORDER BY` column in each `OVER` clause is `OrderDate` which is not unique. The
    row numbers are unique and sequential, just as expected. Notice that the `Rank`
    values of the third and fourth rows are both 3\. Both of those rows have the `OrderDate`
    of 2013-07-31, a tie. This is the third ranked `OrderDate` in the set of rows.
    On row 5, the `Rank` “catches up” with the `RowNumber` value, 5. The date 2013-08-09
    in the fifth row is the fifth ranked `OrderDate` in the set.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig4_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Partial results comparing ROW_NUMBER, RANK, and DENSE_RANK


    The `DenseRank` values for rows 3 and 4 are also both 3\. Notice that the `DenseRank`
    for row 5 is 4, however. The date 2013-08-09 is the fourth *distinct* `OrderDate`
    in the set.


    The `ROW_NUMBER`, `RANK`, and `DENSE_RANK` functions assign a number to each row.
    Now you will learn about a different type of ranking function, `NTILE`.


    ## Dividing Data with NTILE


    The `NTILE` function is a ranking function, but with a twist. The numbers applied
    are used to divide the results into equal buckets. You must specify how many buckets
    are needed and, just like the other ranking functions, an `ORDER BY` expression
    is required in the `OVER` clause. Here is the syntax for `NTILE`:


    ```

    NTILE() OVER([PARTITION BY [,,...]]

    ORDER BY  [,,...])

    ```


    Within the parentheses after the word `NTILE`, supply the number of buckets you
    want to see in the results. The `PARTITION BY` expression is optional, and the
    `ORDER BY` is required. Listing [2-5](#335106_2_En_2_Chapter.xhtml#PC8) shows
    an example that divides the months into four buckets depending on the sales of
    2013.


    ```

    --2.5.1 Using NTILE

    WITH Orders AS (

    SELECT MONTH(OrderDate) AS OrderMonth,

    FORMAT(SUM(TotalDue),''C'') AS Sales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013/01/01'' and OrderDate < ''2014/01/01''

    GROUP BY MONTH(OrderDate))

    SELECT OrderMonth, Sales, NTILE(4) OVER(ORDER BY Sales) AS Bucket

    FROM Orders;

    Listing 2-5

    Using NTILE

    ```


    Figure [2-5](#335106_2_En_2_Chapter.xhtml#Fig5) shows the results. The query aggregates
    the sales from 2013 into months inside a CTE called `Orders`. In the outer query,
    the `NTILE` function is applied. The bucket that each month falls into depends
    on the sales for that month. Bucket #1 contains the three months with the lowest
    sales. Bucket #4 contains the three months with the highest sales.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig5_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Using NTILE


    In this example, using four buckets, the data divided up evenly into the buckets.
    Sometimes the rows are not evenly divided by the bucket number. When there is
    one extra row after dividing, bucket #1 will get an extra row. When there are
    two extra rows after dividing, buckets #1 and #2 will get an extra row and so
    on. Listing [2-6](#335106_2_En_2_Chapter.xhtml#PC9) demonstrates this.


    ```

    --2.6.1 Using NTILE with uneven buckets

    WITH Orders AS (

    SELECT MONTH(OrderDate) AS OrderMonth, FORMAT(SUM(TotalDue),''C'')

    AS Sales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013/01/01'' and OrderDate < ''2014/01/01''

    GROUP BY MONTH(OrderDate))

    SELECT OrderMonth, Sales, NTILE(5) OVER(ORDER BY Sales) AS Bucket

    FROM Orders;

    Listing 2-6

    Using NTILE with Uneven Buckets

    ```


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig6_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig6_HTML.jpg)


    Figure 2-6


    The results of NTILE with uneven buckets


    This query returns five buckets. Twelve divided by five is two with a remainder
    of two. If you take a look at the results shown in Figure [2-6](#335106_2_En_2_Chapter.xhtml#Fig6),
    you will see that buckets #1 and #2 each have three rows. The other buckets each
    have two rows.


    You have seen many examples explaining how to use the ranking functions in this
    chapter, but you have not seen any practical examples. The next section will demonstrate
    some real-world problems that can be solved with these functions.


    ## Solving Queries with Ranking Functions


    Since 2005 when these functions were first introduced, I have found more and more
    reasons to use the ranking functions when writing queries. I believe they have
    helped me learn to think in a set-based manner, and using window functions just
    became intuitive over time. When I am faced with a challenging query, I often
    just add a row number to see if I can find any patterns and go from there.'
  trans: '

    ## 理解 RANK 与 DENSE_RANK


    `RANK` 和 `DENSE_RANK` 函数与 `ROW_NUMBER` 看起来非常相似。事实上，在许多查询中，它们返回的值与 `ROW_NUMBER`
    完全相同。然而，`RANK` 和 `DENSE_RANK` 函数却大不相同，因为它们不是简单地分配连续数字，而是根据 `ORDER BY` 表达式对行进行排名。


    当 `OVER` 子句的 `ORDER BY` 列不唯一时，差异就会显现。例如，许多客户可能在同一天下单，但每个订单都有一个唯一的 `SalesOrderID`。如果使用
    `OrderDate` 列而不是 `SalesOrderID`，结果中就会出现并列。并列行的排名将是相同的。


    `RANK` 和 `DENSE_RANK` 之间也有区别。`RANK` 函数返回当前行相对于分区中所有行位置的排名。`DENSE_RANK` 函数则根据当前行在分区内
    `ORDER BY` 表达式的唯一值返回排名。`RANK` 表示当前行之前有多少行，而 `DENSE_RANK` 表示当前值之前有多少个 *唯一值*。另一种理解方式是：`ROW_NUMBER`
    是基于位置的，`DENSE_RANK` 是基于逻辑的，而 `RANK` 介于两者之间。`ROW_NUMBER` 基于行排好序后的位置，而 `DENSE_RANK`
    基于唯一值的排列顺序。


    这两个函数的语法与 `ROW_NUMBER` 的语法非常相似：


    ```

    RANK() OVER([PARTITION BY [,,...]] ORDER BY  [,,...])

    DENSE_RANK() OVER([PARTITION BY [,,...]]

    ORDER BY  [,,...])

    ```


    代码清单 2-4 对比了 `ROW_NUMBER`、`RANK` 和 `DENSE_RANK`。该查询经过筛选，显示在同一天下了多个订单的客户。


    ```

    --2-4.1 使用 RANK 和 DENSE_RANK

    SELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate,

    ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber,

    RANK() OVER(ORDER BY OrderDate) AS [Rank],

    DENSE_RANK() OVER(ORDER BY OrderDate) AS DenseRank

    FROM Sales.SalesOrderHeader

    WHERE CustomerID IN (11330, 29676);

    代码清单 2-4

    使用 RANK 和 DENSE_RANK

    ```


    图 2-4 显示了部分结果。每个 `OVER` 子句中的 `ORDER BY` 列是 `OrderDate`，它不是唯一的。行号是唯一的且连续的，正如预期的那样。请注意，第三行和第四行的
    `Rank` 值都是 3。这两行的 `OrderDate` 都是 2013-07-31，形成了并列。这是数据集中的第三个排名 `OrderDate`。在第五行，`Rank`
    值“追上”了 `RowNumber` 值，均为 5。第五行的日期 2013-08-09 是数据集中的第五个排名 `OrderDate`。


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig4_HTML.jpg](img/335106_2_En_2_Fig4_HTML.jpg)


    图 2-4: 比较 ROW_NUMBER、RANK 和 DENSE_RANK 的部分结果


    第三行和第四行的 `DenseRank` 值也都是 3。然而，请注意第五行的 `DenseRank` 是 4。日期 2013-08-09 是数据集中的第四个
    *不同* `OrderDate`。


    `ROW_NUMBER`、`RANK` 和 `DENSE_RANK` 函数为每一行分配一个数字。现在你将了解一种不同类型的排名函数，`NTILE`。


    ## 使用 NTILE 划分数据


    `NTILE` 函数是一个排名函数，但有点特别。它分配的数字用于将结果划分为等分的桶。你必须指定需要多少个桶，并且与其他排名函数一样，`OVER` 子句中需要包含
    `ORDER BY` 表达式。以下是 `NTILE` 的语法：


    ```

    NTILE() OVER([PARTITION BY [,,...]]

    ORDER BY  [,,...])

    ```


    在 `NTILE` 单词后面的括号内，提供你希望在结果中看到的桶的数量。`PARTITION BY` 表达式是可选的，`ORDER BY` 是必需的。代码清单
    2-5 展示了一个示例，该示例根据 2013 年的销售额将月份划分为四个桶。


    ```

    --2.5.1 使用 NTILE

    WITH Orders AS (

    SELECT MONTH(OrderDate) AS OrderMonth,

    FORMAT(SUM(TotalDue),''C'') AS Sales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013/01/01'' and OrderDate < ''2014/01/01''

    GROUP BY MONTH(OrderDate))

    SELECT OrderMonth, Sales, NTILE(4) OVER(ORDER BY Sales) AS Bucket

    FROM Orders;

    代码清单 2-5

    使用 NTILE

    ```


    图 2-5 显示了结果。该查询在名为 `Orders` 的 CTE 中将 2013 年的销售额按月份进行聚合。在外部查询中，应用了 `NTILE` 函数。每个月份所属的桶取决于该月份的销售额。`桶
    #1` 包含销售额最低的三个月。`桶 #4` 包含销售额最高的三个月。


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig5_HTML.jpg](img/335106_2_En_2_Fig5_HTML.jpg)


    图 2-5: 使用 NTILE


    在此示例中，使用四个桶，数据被均匀地分配到各个桶中。有时，行无法被桶数均匀分配。当分配后多出一行时，`桶 #1` 将获得这一额外行。当分配后多出两行时，`桶
    #1` 和 `#2` 将各获得一个额外行，以此类推。代码清单 2-6 演示了这种情况。


    ```

    --2.6.1 使用不均匀的桶进行 NTILE

    WITH Orders AS (

    SELECT MONTH(OrderDate) AS OrderMonth, FORMAT(SUM(TotalDue),''C'')

    AS Sales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013/01/01'' and OrderDate < ''2014/01/01''

    GROUP BY MONTH(OrderDate))

    SELECT OrderMonth, Sales, NTILE(5) OVER(ORDER BY Sales) AS Bucket

    FROM Orders;

    代码清单 2-6

    使用不均匀的桶进行 NTILE

    ```


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig6_HTML.jpg](img/335106_2_En_2_Fig6_HTML.jpg)


    图 2-6: NTILE 使用不均匀桶的结果


    此查询返回五个桶。十二除以五等于二余二。如果你查看图 2-6 中显示的结果，会看到 `桶 #1` 和 `桶 #2` 各有三行。其他桶各有两行。


    在本章中，你已经看到了许多解释如何使用排名函数的示例，但还没有看到任何实际应用的例子。下一节将演示一些可以用这些函数解决的真实世界问题。


    ## 使用排名函数解决查询


    自 2005 年这些函数首次引入以来，我在编写查询时发现越来越多使用排名函数的理由。我相信它们帮助我学会了以基于集合的方式思考，并且随着时间的推移，使用窗口函数变得自然而然。当我面临一个具有挑战性的查询时，我通常会先添加一个行号，看看是否能找到任何模式，然后据此继续。

    '
- fmt: '## Deduplicating Data


    There is always more than one way to solve a problem, and deduplicating data is
    a good example. The traditional approach involves storing the distinct rows in
    a temp table. Then you can truncate the original table and insert the rows back
    in from the temp table. There could be a situation in which you cannot empty the
    original table and must selectively delete the extra rows. You can solve this
    problem using a row number. Listing 2-7 creates a table with duplicate rows.


    ```sql

    --2-7.1 Create a table that will hold duplicate rows

    CREATE TABLE #dupes(Col1 INT, Col2 CHAR(1));

    --2-7.2 Insert some rows

    INSERT INTO #dupes(Col1, Col2)

    VALUES (1,''a''),(1,''a''),(2,''b''),

    (3,''c''),(4,''d''),(4,''d''),(5,''e'');

    --2-7.3

    SELECT Col1, Col2

    FROM #dupes;

    ```


    **Listing 2-7** Creating a Table with Duplicate Rows


    Figure 2-7 shows the results. You can see that several rows are duplicates. In
    real life, the table will probably have more columns, but two columns are enough
    to demonstrate this technique.


    ![The table with duplicate rows](images/335106_2_En_2_Chapter/335106_2_En_2_Fig7_HTML.jpg)

    **Figure 2-7** The table with duplicate rows


    Listing 2-8 contains a script to remove the duplicates. To better understand how
    this works, it is broken down into two steps. Be sure to run this code in the
    same query window as Listing 2-7 so that the temp table is in place.


    ```sql

    --2-8.1 Add ROW_NUMBER and Partition by all of the columns

    SELECT Col1, Col2,

    ROW_NUMBER() OVER(PARTITION BY Col1, Col2 ORDER BY Col1) AS RowNumber

    FROM #dupes;

    --2-8.2 Delete the rows with RowNumber > 1

    WITH Dupes AS (

    SELECT Col1, Col2,

    ROW_NUMBER() OVER(PARTITION BY Col1, Col2 ORDER BY Col1)

    AS RowNumber

    FROM #dupes)

    DELETE Dupes WHERE RowNumber > 1;

    --2-8.3 The results

    SELECT Col1, Col2

    FROM #dupes;

    ```


    **Listing 2-8** Removing the Duplicate Rows


    Figure 2-8 shows the results of running this script. A `ROW_NUMBER` function is
    added to Query 1. To get the row numbers to start over for each unique row, partition
    by all of the columns in the table. This table has only two columns, but if it
    had more, they would all be listed in the `PARTITION BY` expression. Since the
    row numbers start over for each unique row, it is easy to see the rows to delete:
    they all have row numbers greater than 1. Statement 2 deletes those rows. Because
    you cannot add the `ROW_NUMBER` function to the `WHERE` clause, the logic is separated
    by adding the row number in a CTE. The duplicates are deleted directly from the
    CTE. Finally, Query 3 demonstrates that the duplicates are gone.


    ![Removing duplicate rows](images/335106_2_En_2_Chapter/335106_2_En_2_Fig8_HTML.jpg)

    **Figure 2-8** Removing duplicate rows


    ## Finding the First N Rows of Every Group


    I first thought about this problem during a technical interview. The potential
    customer wanted to know how I would find the first four orders of every month
    within a particular year. One method of solving it involves using `CROSS APPLY`
    and `TOP`. The solution that is easiest to write uses `ROW_NUMBER`. Listing 2-9
    shows both methods.


    ```sql

    --2-9.1 Using CROSS APPLY to find the first four orders

    WITH Months AS (

    SELECT MONTH(OrderDate) AS OrderMonth

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01'')

    SELECT OrderMonth, OrderDate, SalesOrderID, TotalDue

    FROM Months

    CROSS APPLY (

    SELECT TOP 4 OrderDate, SalesOrderID, TotalDue

    FROM Sales.SalesOrderHeader

    WHERE MONTH(OrderDate) = Months.OrderMonth

    AND OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    ORDER BY SalesOrderID) AS Orders

    ORDER BY OrderMonth, SalesOrderID;


    --2-9.2 Using ROW_NUMBER to find the first four orders

    WITH Orders AS (

    SELECT MONTH(OrderDate) AS OrderMonth, OrderDate,

    SalesOrderID, TotalDue,

    ROW_NUMBER() OVER(PARTITION BY MONTH(OrderDate)

    ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01'')

    SELECT OrderMonth, CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID, TotalDue

    FROM Orders

    WHERE RowNumber <= 4

    ORDER BY OrderMonth, SalesOrderID;

    ```


    **Listing 2-9** Finding the First Four Orders of Each Month


    Figure 2-9 shows the partial results, the rows for January and February. A total
    of 48 rows were returned for each query. Query 1 is complex. In my opinion, it
    is not easy to figure out. The CTE creates a list of months for sales year 2013.
    The outer query joins the `Months` CTE to an inner query using `CROSS APPLY`.
    In order to pull back the first four rows for each row of the outer query, `TOP`
    is used. `CROSS APPLY` must be used in this case because using a derived table
    will just pull back a total of four rows, not four rows for each month.


    ![Partial results of returning the first four sales of each month](images/335106_2_En_2_Chapter/335106_2_En_2_Fig9_HTML.jpg)

    **Figure 2-9** Partial results of returning the first four sales of each month


    Query 2 uses `ROW_NUMBER` to accomplish the same thing. The CTE contains all of
    the expressions needed in the results plus a row number. The row number is partitioned
    by month, so that the numbers start over for each month. The outer query simply
    retrieves the data from the CTE and filters on the row number.


    For another twist on this problem, what about finding the four orders from each
    month with the highest price? Listing 2-10 shows how to write this query.


    ```sql

    --2-10.1 Use ROW_NUMBER to find the first four orders

    WITH Orders AS (

    SELECT  MONTH(OrderDate) AS OrderMonth, OrderDate,

    SalesOrderID, TotalDue,

    ROW_NUMBER() OVER(PARTITION BY MONTH(OrderDate)

    ORDER BY TotalDue DESC) AS RowNumber

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01'')

    SELECT OrderMonth, CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    TotalDue

    FROM Orders

    WHERE RowNumber <= 4

    ORDER BY OrderMonth, TotalDue DESC;

    ```


    **Listing 2-10** Finding the Four Most Expensive Orders Each Month


    Figure 2-10 shows the partial results. In this case, four orders from each month
    are returned and these are the highest sales for each month.


    ![Partial results of the four most expensive orders each month](images/335106_2_En_2_Chapter/335106_2_En_2_Fig10_HTML.jpg)

    **Figure 2-10** Partial results of the four most expensive orders each month


    You could also use this technique to find rows at a specific position or a range
    of rows such as for paging. For example, you may need to display ten rows at a
    time on a web page. It’s easy to just supply a variable for the first and last
    rows you want to display in the `WHERE` clause after adding a row number to the
    query in a CTE. There is another method that might work better, the `OFFSET/FETCH`
    technique that was first available with SQL Server 2012. This is an option for
    the `ORDER BY` clause, and more information can be found here: [`https://docs.microsoft.com/en-us/sql/t-sql/queries/select-order-by-clause-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/queries/select-order-by-clause-transact-sql%253Fview%253Dsql-server-2017)'
  raw: '### Deduplicating Data


    There is always more than one way to solve a problem, and deduplicating data is
    a good example. The traditional approach involves storing the distinct rows in
    a temp table. Then you can truncate the original table and insert the rows back
    in from the temp table. There could be a situation in which you cannot empty the
    original table and must selectively delete the extra rows. You can solve this
    problem using a row number. Listing [2-7](#335106_2_En_2_Chapter.xhtml#PC10) creates
    a table with duplicate rows.


    ```

    --2-7.1 Create a table that will hold duplicate rows

    CREATE TABLE #dupes(Col1 INT, Col2 CHAR(1));

    --2-7.2 Insert some rows

    INSERT INTO #dupes(Col1, Col2)

    VALUES (1,''a''),(1,''a''),(2,''b''),

    (3,''c''),(4,''d''),(4,''d''),(5,''e'');

    --2-7.3

    SELECT Col1, Col2

    FROM #dupes;

    Listing 2-7

    Creating a Table with Duplicate Rows

    ```


    Figure [2-7](#335106_2_En_2_Chapter.xhtml#Fig7) shows the results. You can see
    that several rows are duplicates. In real life, the table will probably have more
    columns, but two columns are enough to demonstrate this technique.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig7_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The table with duplicate rows


    Listing [2-8](#335106_2_En_2_Chapter.xhtml#PC11) contains a script to remove the
    duplicates. To better understand how this works, it is broken down into two steps.
    Be sure to run this code in the same query window as Listing [2-7](#335106_2_En_2_Chapter.xhtml#PC10)
    so that the temp table is in place.


    ```

    --2-8.1 Add ROW_NUMBER and Partition by all of the columns

    SELECT Col1, Col2,

    ROW_NUMBER() OVER(PARTITION BY Col1, Col2 ORDER BY Col1) AS RowNumber

    FROM #dupes;

    --2-8.2 Delete the rows with RowNumber > 1

    WITH Dupes AS (

    SELECT Col1, Col2,

    ROW_NUMBER() OVER(PARTITION BY Col1, Col2 ORDER BY Col1)

    AS RowNumber

    FROM #dupes)

    DELETE Dupes WHERE RowNumber > 1;

    --2-8.3 The results

    SELECT Col1, Col2

    FROM #dupes;

    Listing 2-8

    Removing the Duplicate Rows

    ```


    Figure [2-8](#335106_2_En_2_Chapter.xhtml#Fig8) shows the results of running this
    script. A `ROW_NUMBER` function is added to Query 1\. To get the row numbers to
    start over for each unique row, partition by all of the columns in the table.
    This table has only two columns, but if it had more, they would all be listed
    in the `PARTITION BY` expression. Since the row numbers start over for each unique
    row, it is easy to see the rows to delete: they all have row numbers greater than
    1\. Statement 2 deletes those rows. Because you cannot add the `ROW_NUMBER` function
    to the `WHERE` clause, the logic is separated by adding the row number in a CTE.
    The duplicates are deleted directly from the CTE. Finally, Query 3 demonstrates
    that the duplicates are gone.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig8_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Removing duplicate rows


    ### Finding the First N Rows of Every Group


    I first thought about this problem during a technical interview. The potential
    customer wanted to know how I would find the first four orders of every month
    within a particular year. One method of solving it involves using `CROSS APPLY`
    and `TOP`. The solution that is easiest to write uses `ROW_NUMBER`. Listing [2-9](#335106_2_En_2_Chapter.xhtml#PC12)
    shows both methods.


    ```

    --2-9.1 Using CROSS APPLY to find the first four orders

    WITH Months AS (

    SELECT MONTH(OrderDate) AS OrderMonth

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate = ''2013-01-01'' AND OrderDate
    = ''2013-01-01'' AND OrderDate < ''2014-01-01'')

    SELECT OrderMonth, CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID, TotalDue

    FROM Orders

    WHERE RowNumber <= 4

    ORDER BY OrderMonth, SalesOrderID;

    Listing 2-9

    Finding the First Four Orders of Each Month

    ```


    Figure [2-9](#335106_2_En_2_Chapter.xhtml#Fig9) shows the partial results, the
    rows for January and February. A total of 48 rows were returned for each query.
    Query 1 is complex. In my opinion, it is not easy to figure out. The CTE creates
    a list of months for sales year 2013\. The outer query joins the `Months` CTE
    to an inner query using `CROSS APPLY`. In order to pull back the first four rows
    for each row of the outer query, `TOP` is used. `CROSS APPLY` must be used in
    this case because using a derived table will just pull back a total of four rows,
    not four rows for each month.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig9_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Partial results of returning the first four sales of each month


    Query 2 uses `ROW_NUMBER` to accomplish the same thing. The CTE contains all of
    the expressions needed in the results plus a row number. The row number is partitioned
    by month, so that the numbers start over for each month. The outer query simply
    retrieves the data from the CTE and filters on the row number.


    For another twist on this problem, what about finding the four orders from each
    month with the highest price? Listing [2-10](#335106_2_En_2_Chapter.xhtml#PC13)
    shows how to write this query.


    ```

    --2-10.1 Use ROW_NUMBER to find the first four orders

    WITH Orders AS (

    SELECT  MONTH(OrderDate) AS OrderMonth, OrderDate,

    SalesOrderID, TotalDue,

    ROW_NUMBER() OVER(PARTITION BY MONTH(OrderDate)

    ORDER BY TotalDue DESC) AS RowNumber

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01'')

    SELECT OrderMonth, CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    TotalDue

    FROM Orders

    WHERE RowNumber <= 4

    ORDER BY OrderMonth, TotalDue DESC;

    Listing 2-10

    Finding the Four Most Expensive Orders Each Month

    ```


    Figure [2-10](#335106_2_En_2_Chapter.xhtml#Fig10) shows the partial results. In
    this case, four orders from each month are returned and these are the highest
    sales for each month.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig10_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Partial results of the four most expensive orders each month


    You could also use this technique to find rows at a specific position or a range
    of rows such as for paging. For example, you may need to display ten rows at a
    time on a web page. It’s easy to just supply a variable for the first and last
    rows you want to display in the `WHERE` clause after adding a row number to the
    query in a CTE. There is another method that might work better, the `OFFSET/FETCH`
    technique that was first available with SQL Server 2012\. This is an option for
    the ORDER BY clause, and more information can be found here: [`https://docs.microsoft.com/en-us/sql/t-sql/queries/select-order-by-clause-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/queries/select-order-by-clause-transact-sql%253Fview%253Dsql-server-2017)'
  trans: '## 数据去重


    解决问题的方法总是不止一种，数据去重就是一个很好的例子。传统方法涉及将不同的行存储在临时表中。然后你可以截断原始表，并将这些行从临时表插回。可能存在无法清空原始表，而必须有选择地删除多余行的情况。你可以使用行号来解决这个问题。清单
    2-7 创建了一个包含重复行的表。


    ```sql

    --2-7.1 创建一个用于存放重复行的表

    CREATE TABLE #dupes(Col1 INT, Col2 CHAR(1));

    --2-7.2 插入一些行

    INSERT INTO #dupes(Col1, Col2)

    VALUES (1,''a''),(1,''a''),(2,''b''),

    (3,''c''),(4,''d''),(4,''d''),(5,''e'');

    --2-7.3

    SELECT Col1, Col2

    FROM #dupes;

    ```


    **清单 2-7** 创建包含重复行的表


    图 2-7 显示了结果。你可以看到有几行是重复的。在实际应用中，该表可能有更多列，但两列足以演示此技术。


    ![包含重复行的表](img/335106_2_En_2_Fig7_HTML.jpg)

    **图 2-7** 包含重复行的表


    清单 2-8 包含一个删除重复项的脚本。为了更好地理解其工作原理，它被分解为两个步骤。请确保在与清单 2-7 相同的查询窗口中运行此代码，以便临时表存在。


    ```sql

    --2-8.1 添加 ROW_NUMBER 并按所有列分区

    SELECT Col1, Col2,

    ROW_NUMBER() OVER(PARTITION BY Col1, Col2 ORDER BY Col1) AS RowNumber

    FROM #dupes;

    --2-8.2 删除 RowNumber > 1 的行

    WITH Dupes AS (

    SELECT Col1, Col2,

    ROW_NUMBER() OVER(PARTITION BY Col1, Col2 ORDER BY Col1)

    AS RowNumber

    FROM #dupes)

    DELETE Dupes WHERE RowNumber > 1;

    --2-8.3 结果

    SELECT Col1, Col2

    FROM #dupes;

    ```


    **清单 2-8** 删除重复行


    图 2-8 显示了运行此脚本的结果。查询 1 中添加了一个 `ROW_NUMBER` 函数。为了使行号对于每个唯一的行重新开始编号，需要按表中的所有列进行分区。该表只有两列，但如果它有更多列，它们都应列在
    `PARTITION BY` 表达式中。由于行号对于每个唯一的行重新开始编号，因此很容易看出要删除的行：它们的行号都大于 1。语句 2 删除了这些行。因为你不能将
    `ROW_NUMBER` 函数添加到 `WHERE` 子句中，所以通过将行号添加到 CTE 中来分离逻辑。直接从 CTE 中删除重复项。最后，查询 3 证明重复项已消失。


    ![删除重复行](img/335106_2_En_2_Fig8_HTML.jpg)

    **图 2-8** 删除重复行


    ## 查找每组的前 N 行


    我第一次思考这个问题是在一次技术面试中。潜在客户想知道我会如何找到特定年份内每个月的前四个订单。解决它的一种方法涉及使用 `CROSS APPLY` 和 `TOP`。最容易编写的方法是使用
    `ROW_NUMBER`。清单 2-9 展示了这两种方法。


    ```sql

    --2-9.1 使用 CROSS APPLY 查找前四个订单

    WITH Months AS (

    SELECT MONTH(OrderDate) AS OrderMonth

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01'')

    SELECT OrderMonth, OrderDate, SalesOrderID, TotalDue

    FROM Months

    CROSS APPLY (

    SELECT TOP 4 OrderDate, SalesOrderID, TotalDue

    FROM Sales.SalesOrderHeader

    WHERE MONTH(OrderDate) = Months.OrderMonth

    AND OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    ORDER BY SalesOrderID) AS Orders

    ORDER BY OrderMonth, SalesOrderID;


    --2-9.2 使用 ROW_NUMBER 查找前四个订单

    WITH Orders AS (

    SELECT MONTH(OrderDate) AS OrderMonth, OrderDate,

    SalesOrderID, TotalDue,

    ROW_NUMBER() OVER(PARTITION BY MONTH(OrderDate)

    ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01'')

    SELECT OrderMonth, CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID, TotalDue

    FROM Orders

    WHERE RowNumber <= 4

    ORDER BY OrderMonth, SalesOrderID;

    ```


    **清单 2-9** 查找每月前四个订单


    图 2-9 显示了部分结果，即一月和二月的行。每个查询总共返回了 48 行。查询 1 比较复杂。在我看来，它不容易理解。CTE 创建了一个 2013 年销售月份的列表。外部查询使用
    `CROSS APPLY` 将 `Months` CTE 连接到内部查询。为了为外部查询的每一行拉回前四行，使用了 `TOP`。在这种情况下必须使用 `CROSS
    APPLY`，因为使用派生表只会拉回总共四行，而不是每月四行。


    ![返回每月前四个销售的部分结果](img/335106_2_En_2_Fig9_HTML.jpg)

    **图 2-9** 返回每月前四个销售的部分结果


    查询 2 使用 `ROW_NUMBER` 来完成同样的事情。CTE 包含结果所需的所有表达式，外加一个行号。行号按月份分区，以便编号为每个月重新开始。外部查询只是从
    CTE 中检索数据并根据行号进行过滤。


    对于这个问题的另一种变化，如何找出每个月价格最高的四个订单呢？清单 2-10 展示了如何编写此查询。


    ```sql

    --2-10.1 使用 ROW_NUMBER 查找前四个订单

    WITH Orders AS (

    SELECT  MONTH(OrderDate) AS OrderMonth, OrderDate,

    SalesOrderID, TotalDue,

    ROW_NUMBER() OVER(PARTITION BY MONTH(OrderDate)

    ORDER BY TotalDue DESC) AS RowNumber

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01'')

    SELECT OrderMonth, CAST(OrderDate AS DATE) AS OrderDate,

    SalesOrderID,

    TotalDue

    FROM Orders

    WHERE RowNumber <= 4

    ORDER BY OrderMonth, TotalDue DESC;

    ```


    **清单 2-10** 查找每月最昂贵的四个订单


    图 2-10 显示了部分结果。在这种情况下，返回了每个月的四个订单，并且这些是每个月的最高销售额。


    ![每月四个最昂贵订单的部分结果](img/335106_2_En_2_Fig10_HTML.jpg)

    **图 2-10** 每月四个最昂贵订单的部分结果


    你也可以使用此技术查找特定位置的行或一系列行，例如用于分页。例如，你可能需要在网页上一次显示十行。只需在查询中添加行号到 CTE 后，在 `WHERE` 子句中为你想要显示的第一行和最后一行提供一个变量，这很容易。还有另一种可能效果更好的方法，即
    `OFFSET/FETCH` 技术，该技术从 SQL Server 2012 首次可用。这是 `ORDER BY` 子句的一个选项，更多信息可以在这里找到：
    [`https://docs.microsoft.com/en-us/sql/t-sql/queries/select-order-by-clause-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/queries/select-order-by-clause-transact-sql%253Fview%253Dsql-server-2017)'
- fmt: "## Creating a Tally Table\n\nThere are many problems where a tally table,\
    \ or table of numbers, can come in handy, and there are also several methods to\
    \ create such a table. Listing 2-11 shows an example script that uses `ROW_NUMBER`.\n\
    \n```sql\n--2-11.1 Create the table\nCREATE TABLE #Numbers(Number INT);\n--2-11.2\
    \ Populate the tally table\nINSERT INTO #Numbers(Number)\nSELECT TOP(1000000)\
    \ ROW_NUMBER() OVER(ORDER BY a.object_id)\nFROM sys.objects a\nCROSS JOIN sys.objects\
    \ b\nCROSS JOIN sys.objects c;\nListing 2-11\nCreating a Numbers Table\n```\n\n\
    By using `CROSS JOIN`, you can generate a large number of rows, in this case limited\
    \ to one million with `TOP`. Then by adding `ROW_NUMBER`, the numbers 1 to 1,000,000\
    \ will be added to the table.\n\nNow that you have a tally table, you might wonder\
    \ what you will do with it. A tally table often comes in handy when you need to\
    \ find missing dates or ID numbers in a table. Listing 2-12 is an example. Be\
    \ sure to run in the query window where the tally table was created.\n\n```sql\n\
    --2-12.1 Find the earliest date and the number of days\nDECLARE @Min DATE, @DayCount\
    \ INT;\nSELECT @Min = MIN(OrderDate),\n       @DayCount = DATEDIFF(DAY,MIN(OrderDate),MAX(OrderDate))\n\
    FROM Sales.SalesOrderHeader;\n--2-12.2 Change numbers to dates and then find missing\n\
    WITH Dates AS (\n    SELECT TOP(@DayCount) DATEADD(DAY,Number,@Min) AS OrderDate\n\
    \    FROM #Numbers AS N\n    ORDER BY Number\n)\nSELECT Dates.OrderDate\nFROM\
    \ Dates\nLEFT JOIN Sales.SalesOrderHeader AS SOH\n    ON Dates.OrderDate = SOH.OrderDate\n\
    WHERE SOH.SalesOrderID IS NULL;\nListing 2-12\nUsing the Tally Table to Find Dates\
    \ with No Orders\n```\n\nThis example first finds the minimum date in the table\
    \ and difference between the minimum and maximum dates. It then uses a CTE to\
    \ convert the numbers to dates starting with the day after the earliest date.\
    \ In the outer query, it compares the `Dates` CTE to the table, joining on `OrderDate`\
    \ and finding the rows that are `NULL`. Figure 2-11 shows the results. There are\
    \ three dates that do not have any orders.\n\n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig11_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig11_HTML.jpg)\n\
    \nFigure 2-11: The dates with no orders\n\n## Solving the Bonus Problem\n\nThis\
    \ example is one that I have used over the years to explain how to use the `NTILE`\
    \ function. Imagine that you are a manager with a team of salespeople. You have\
    \ bonus money to give out and want to divide the money based on how much each\
    \ person has sold. The best performing group of salespeople will each get $4000,\
    \ and the least performing group will get $1000. Listing 2-13 shows how to solve\
    \ this problem using `NTILE`.\n\n```sql\n--2-13.1 Using NTILE to assign bonuses\n\
    WITH Sales AS (\n    SELECT SP.FirstName, SP.LastName,\n           SUM(SOH.TotalDue)\
    \ AS TotalSales\n    FROM [Sales].[vSalesPerson] SP\n    JOIN Sales.SalesOrderHeader\
    \ SOH\n        ON SP.BusinessEntityID = SOH.SalesPersonID\n    WHERE SOH.OrderDate\
    \ >= '2011-01-01' AND SOH.OrderDate < '2012-01-01'\n    GROUP BY FirstName, LastName)\n\
    SELECT FirstName, LastName, TotalSales,\n       NTILE(4) OVER(ORDER BY TotalSales)\
    \ * 1000 AS Bonus\nFROM Sales;\nListing 2-13\nSolving the Bonus Problem\n```\n\
    \nFigure 2-12 shows the results. This query filters for just one year, 2011. The\
    \ data is aggregated, and the sum of `TotalSales` is calculated for each person\
    \ inside a CTE called `Sales`. In the outer query, the `NTILE` function divides\
    \ the rows into four buckets. The number of buckets is designated by the argument\
    \ provided to `NTILE`. By multiplying the bucket number by 1000, the bonus is\
    \ returned. The salespeople with the lowest sales get the smaller bonus.\n\n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig12_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12: The results of the bonus problem\n\nYou may have noticed that there\
    \ are three people in the first two groups and just two people in the last two\
    \ groups. This is because ten cannot be evenly divided by four. One row of the\
    \ remainder is added to each of the first two groups. In this case, two people\
    \ get the top bonus, but what if you wanted to move the remainder rows to the\
    \ top performing groups? You can sort the rows in descending order to move the\
    \ extra rows, but then there is the problem of how to calculate the bonus. By\
    \ dusting off the algebraic formula for a line, `y = mx + b`, it’s possible to\
    \ get the right results. The slope of the line (`m`) is -1000 and the intersect\
    \ (`b`) is 5000. Listing 2-14 shows that this can be done.\n\n```sql\n--2-14.1\
    \ Assign bonuses in opposite order\nWITH Sales AS (\n    SELECT SP.FirstName,\
    \ SP.LastName,\n           SUM(SOH.TotalDue) AS TotalSales\n    FROM [Sales].[vSalesPerson]\
    \ SP\n    JOIN Sales.SalesOrderHeader SOH\n        ON SP.BusinessEntityID = SOH.SalesPersonID\n\
    \    WHERE SOH.OrderDate >= '2011-01-01' AND SOH.OrderDate < '2012-01-01'\n  \
    \  GROUP BY FirstName, LastName)\nSELECT FirstName, LastName, TotalSales,\n  \
    \     -1000 * NTILE(4) OVER(ORDER BY TotalSales DESC) + 5000 AS Bonus\nFROM Sales;\n\
    Listing 2-14\nUse Algebra to Give Three People the Best Bonus\n```\n\nFigure 2-13\
    \ shows the results. By sorting in the opposite direction and then multiplying\
    \ the result of `NTILE` by -1000 and adding 5000, three people get the best bonus.\n\
    \n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig13_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13: The results when giving three people the best bonus\n\nI’ve also\
    \ heard about shops using `NTILE` to divide up results of contests or groups of\
    \ donors. It’s not used often, but just keep it in mind if there is a reason that\
    \ it will be useful.\n\n# Summary\n\nThe ranking functions, `ROW_NUMBER`, `RANK`,\
    \ `DENSE_RANK`, and `NTILE`, are the most basic of all the window functions. The\
    \ ranking functions add a number to each row of the results. The `ORDER BY` expression\
    \ of the `OVER` clause is required, and, depending on the situation, you may also\
    \ want to add `PARTITION BY`. These functions are usually not the solution in\
    \ themselves but often form the basis of a more complex solution.\n\nWhen faced\
    \ with a tricky query, you may want to add a row number to look for patterns or\
    \ relationships between the rows. Then use those patterns and relationships to\
    \ figure out the solution. You’ll see the ranking functions used to solve more\
    \ query problems in Chapters 9 and 10.\n\nChapter 3 covers window aggregates,\
    \ which allow you to add functions like `SUM` or `AVG` to a query without turning\
    \ the query into an aggregate query. You won’t need `GROUP BY`, and you won’t\
    \ lose any detail.\n\n# 3. Summarizing with Window Aggregates\n\nIn 2005, Microsoft\
    \ introduced another type of window function to T-SQL, the window aggregates.\
    \ By adding an `OVER` clause to an aggregate function, you can avoid the rules\
    \ you must normally follow. When writing aggregate queries, you lose the details\
    \ that are not included in the `GROUP BY` clause. Starting with SQL Server 2005,\
    \ you can eliminate that restriction by adding the `OVER` clause. By adding `OVER`,\
    \ you may also eliminate the `GROUP BY` and `HAVING` clauses. You can also add\
    \ window aggregate functions to aggregate queries to return summary values at\
    \ different levels of aggregation.\n\nIn this chapter, you will learn how to add\
    \ aggregate functions by way of window functions to non-aggregate queries. You\
    \ will also learn to add window aggregate functions to aggregate queries but with\
    \ different levels of aggregation by way of the OVER clause. You will finish up\
    \ the chapter by taking a look at some real-world problems."
  raw: '### Creating a Tally Table


    There are many problems where a tally table, or table of numbers, can come in
    handy, and there are also several methods to create such a table. Listing [2-11](#335106_2_En_2_Chapter.xhtml#PC14)
    shows an example script that uses `ROW_NUMBER`.


    ```

    --2-11.1 Create the table

    CREATE TABLE #Numbers(Number INT);

    --2-11.2 Populate the tally table

    INSERT INTO #Numbers(Number)

    SELECT TOP(1000000) ROW_NUMBER() OVER(ORDER BY a.object_id)

    FROM sys.objects a

    CROSS JOIN sys.objects b

    CROSS JOIN sys.objects c;

    Listing 2-11

    Creating a Numbers Table

    ```


    By using `CROSS JOIN`, you can generate a large number of rows, in this case limited
    to one million with `TOP`. Then by adding `ROW_NUMBER`, the numbers 1 to 1,000,000
    will be added to the table.


    Now that you have a tally table, you might wonder what you will do with it. A
    tally table often comes in handy when you need to find missing dates or ID numbers
    in a table. Listing [2-12](#335106_2_En_2_Chapter.xhtml#PC15) is an example. Be
    sure to run in the query window where the tally table was created.


    ```

    --2-12.1 Find the earliest date and the number of days

    DECLARE @Min DATE, @DayCount INT;

    SELECT @Min = MIN(OrderDate),

    @DayCount = DATEDIFF(DAY,MIN(OrderDate),MAX(OrderDate))

    FROM Sales.SalesOrderHeader;

    --2-12.2 Change numbers to dates and then find missing

    WITH Dates AS (

    SELECT TOP(@DayCount) DATEADD(DAY,Number,@Min) AS OrderDate

    FROM #Numbers AS N

    ORDER BY Number

    )

    SELECT Dates.OrderDate

    FROM Dates

    LEFT JOIN Sales.SalesOrderHeader AS SOH

    ON Dates.OrderDate = SOH.OrderDate

    WHERE SOH.SalesOrderID IS NULL;

    Listing 2-12

    Using the Tally Table to Find Dates with No Orders

    ```


    This example first finds the minimum date in the table and difference between
    the minimum and maximum dates. It then uses a CTE to convert the numbers to dates
    starting with the day after the earliest date. In the outer query, it compares
    the Dates CTE to the table, joining on OrderDate and finding the rows that are
    NULL. Figure [2-11](#335106_2_En_2_Chapter.xhtml#Fig11) shows the results. There
    are three dates that do not have any orders.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig11_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig11_HTML.jpg)


    Figure 2-11


    The dates with no orders


    ### Solving the Bonus Problem


    This example is one that I have used over the years to explain how to use the
    `NTILE` function. Imagine that you are a manager with a team of salespeople. You
    have bonus money to give out and want to divide the money based on how much each
    person has sold. The best performing group of salespeople will each get $4000,
    and the least performing group will get $1000\. Listing [2-13](#335106_2_En_2_Chapter.xhtml#PC16)
    shows how to solve this problem using `NTILE`.


    ```

    --2-13.1 Using NTILE to assign bonuses

    WITH Sales AS (

    SELECT SP.FirstName, SP.LastName,

    SUM(SOH.TotalDue) AS TotalSales

    FROM [Sales].[vSalesPerson] SP

    JOIN Sales.SalesOrderHeader SOH

    ON SP.BusinessEntityID = SOH.SalesPersonID

    WHERE SOH.OrderDate >= ''2011-01-01'' AND SOH.OrderDate < ''2012-01-01''

    GROUP BY FirstName, LastName)

    SELECT FirstName, LastName, TotalSales,

    NTILE(4) OVER(ORDER BY TotalSales) * 1000 AS Bonus

    FROM Sales;

    Listing 2-13

    Solving the Bonus Problem

    ```


    Figure [2-12](#335106_2_En_2_Chapter.xhtml#Fig12) shows the results. This query
    filters for just one year, 2011\. The data is aggregated, and the sum of `TotalSales`
    is calculated for each person inside a CTE called `Sales`. In the outer query,
    the `NTILE` function divides the rows into four buckets. The number of buckets
    is designated by the argument provided to `NTILE`. By multiplying the bucket number
    by 1000, the bonus is returned. The salespeople with the lowest sales get the
    smaller bonus.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig12_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig12_HTML.jpg)


    Figure 2-12


    The results of the bonus problem


    You may have noticed that there are three people in the first two groups and just
    two people in the last two groups. This is because ten cannot be evenly divided
    by four. One row of the remainder is added to each of the first two groups. In
    this case, two people get the top bonus, but what if you wanted to move the remainder
    rows to the top performing groups? You can sort the rows in descending order to
    move the extra rows, but then there is the problem of how to calculate the bonus.
    By dusting off the algebraic formula for a line, `y = mx + b`, it’s possible to
    get the right results. The slope of the line (`m`) is -1000 and the intersect
    (`b`) is 5000\. Listing [2-14](#335106_2_En_2_Chapter.xhtml#PC17) shows that this
    can be done.


    ```

    --2-14.1 Assign bonuses in opposite order

    WITH Sales AS (

    SELECT SP.FirstName, SP.LastName,

    SUM(SOH.TotalDue) AS TotalSales

    FROM [Sales].[vSalesPerson] SP

    JOIN Sales.SalesOrderHeader SOH

    ON SP.BusinessEntityID = SOH.SalesPersonID

    WHERE SOH.OrderDate >= ''2011-01-01'' AND SOH.OrderDate < ''2012-01-01''

    GROUP BY FirstName, LastName)

    SELECT FirstName, LastName, TotalSales,

    -1000 * NTILE(4) OVER(ORDER BY TotalSales DESC) + 5000 AS Bonus

    FROM Sales;

    Listing 2-14

    Use Algebra to Give Three People the Best Bonus

    ```


    Figure [2-13](#335106_2_En_2_Chapter.xhtml#Fig13) shows the results. By sorting
    in the opposite direction and then multiplying the result of `NTILE` by -1000
    and adding 5000, three people get the best bonus.


    ![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig13_HTML.jpg](images/335106_2_En_2_Chapter/335106_2_En_2_Fig13_HTML.jpg)


    Figure 2-13


    The results when giving three people the best bonus


    I’ve also heard about shops using `NTILE` to divide up results of contests or
    groups of donors. It’s not used often, but just keep it in mind if there is a
    reason that it will be useful.


    ## Summary


    The ranking functions, `ROW_NUMBER`, `RANK`, `DENSE_RANK`, and `NTILE`, are the
    most basic of all the window functions. The ranking functions add a number to
    each row of the results. The `ORDER BY` expression of the `OVER` clause is required,
    and, depending on the situation, you may also want to add `PARTITION BY`. These
    functions are usually not the solution in themselves but often form the basis
    of a more complex solution.


    When faced with a tricky query, you may want to add a row number to look for patterns
    or relationships between the rows. Then use those patterns and relationships to
    figure out the solution. You’ll see the ranking functions used to solve more query
    problems in Chapters [9](#335106_2_En_9_Chapter.xhtml) and [10](#335106_2_En_10_Chapter.xhtml).


    Chapter [3](#335106_2_En_3_Chapter.xhtml) covers window aggregates, which allow
    you to add functions like `SUM` or `AVG` to a query without turning the query
    into an aggregate query. You won’t need `GROUP BY`, and you won’t lose any detail.


    # 3. Summarizing with Window Aggregates


    In 2005, Microsoft introduced another type of window function to T-SQL, the window
    aggregates. By adding an `OVER` clause to an aggregate function, you can avoid
    the rules you must normally follow. When writing aggregate queries, you lose the
    details that are not included in the `GROUP BY` clause. Starting with SQL Server
    2005, you can eliminate that restriction by adding the `OVER` clause. By adding
    `OVER`, you may also eliminate the `GROUP BY` and `HAVING` clauses. You can also
    add window aggregate functions to aggregate queries to return summary values at
    different levels of aggregation.


    In this chapter, you will learn how to add aggregate functions by way of window
    functions to non-aggregate queries. You will also learn to add window aggregate
    functions to aggregate queries but with different levels of aggregation by way
    of the OVER clause. You will finish up the chapter by taking a look at some real-world
    problems.'
  trans: "## 创建计数表\n\n在许多问题中，计数表（或数字表）都能派上用场，而且创建这种表也有几种方法。清单 2-11 展示了一个使用 `ROW_NUMBER`\
    \ 的示例脚本。\n\n```sql\n--2-11.1 创建表\nCREATE TABLE #Numbers(Number INT);\n--2-11.2\
    \ 填充计数表\nINSERT INTO #Numbers(Number)\nSELECT TOP(1000000) ROW_NUMBER() OVER(ORDER\
    \ BY a.object_id)\nFROM sys.objects a\nCROSS JOIN sys.objects b\nCROSS JOIN sys.objects\
    \ c;\n清单 2-11\n创建数字表\n```\n\n通过使用 `CROSS JOIN`，你可以生成大量行，本例中通过 `TOP` 限制为一百万行。然后通过添加\
    \ `ROW_NUMBER`，数字 1 到 1,000,000 就会被加入表中。\n\n现在你有了一个计数表，你可能会想用它做什么。当你需要在表中查找缺失的日期或\
    \ ID 号时，计数表通常很有用。清单 2-12 是一个示例。请确保在创建计数表的查询窗口中运行。\n\n```sql\n--2-12.1 找到最早日期和天数差\n\
    DECLARE @Min DATE, @DayCount INT;\nSELECT @Min = MIN(OrderDate),\n       @DayCount\
    \ = DATEDIFF(DAY,MIN(OrderDate),MAX(OrderDate))\nFROM Sales.SalesOrderHeader;\n\
    --2-12.2 将数字转换为日期，然后查找缺失的日期\nWITH Dates AS (\n    SELECT TOP(@DayCount) DATEADD(DAY,Number,@Min)\
    \ AS OrderDate\n    FROM #Numbers AS N\n    ORDER BY Number\n)\nSELECT Dates.OrderDate\n\
    FROM Dates\nLEFT JOIN Sales.SalesOrderHeader AS SOH\n    ON Dates.OrderDate =\
    \ SOH.OrderDate\nWHERE SOH.SalesOrderID IS NULL;\n清单 2-12\n使用计数表查找没有订单的日期\n```\n\
    \n此示例首先在表中找到最小日期以及最小日期和最大日期之间的差值。然后，它使用一个 CTE（公用表表达式）将数字从最早日期的次日开始转换为日期。在外部查询中，它将\
    \ `Dates` CTE 与表进行比较，基于 `OrderDate` 进行连接，并找出那些 `NULL` 的行。图 2-11 显示了结果。有三个日期没有任何订单。\n\
    \n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig11_HTML.jpg](img/335106_2_En_2_Fig11_HTML.jpg)\n\
    \n图 2-11：没有订单的日期\n\n## 解决奖金问题\n\n这个例子是我多年来用来解释如何使用 `NTILE` 函数的一个典型场景。假设你是一位销售团队的经理。你有一笔奖金要发放，并希望根据每个人的销售额来分配这笔钱。业绩最好的销售小组每人将获得\
    \ $4000，业绩最差的小组将获得 $1000。清单 2-13 展示了如何使用 `NTILE` 来解决这个问题。\n\n```sql\n--2-13.1\
    \ 使用 NTILE 分配奖金\nWITH Sales AS (\n    SELECT SP.FirstName, SP.LastName,\n    \
    \       SUM(SOH.TotalDue) AS TotalSales\n    FROM [Sales].[vSalesPerson] SP\n\
    \    JOIN Sales.SalesOrderHeader SOH\n        ON SP.BusinessEntityID = SOH.SalesPersonID\n\
    \    WHERE SOH.OrderDate >= '2011-01-01' AND SOH.OrderDate < '2012-01-01'\n  \
    \  GROUP BY FirstName, LastName)\nSELECT FirstName, LastName, TotalSales,\n  \
    \     NTILE(4) OVER(ORDER BY TotalSales) * 1000 AS Bonus\nFROM Sales;\n清单 2-13\n\
    解决奖金问题\n```\n\n图 2-12 显示了结果。此查询仅筛选了 2011 年这一年的数据。数据被聚合，并在一个名为 `Sales` 的 CTE 中计算每个人的\
    \ `TotalSales` 总和。在外部查询中，`NTILE` 函数将行分成四个组（桶）。提供给 `NTILE` 的参数指定了组的数量。通过将组号乘以 1000，就得到了奖金数额。销售额最低的销售人员获得的奖金较少。\n\
    \n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig12_HTML.jpg](img/335106_2_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12：奖金问题的结果\n\n你可能注意到，前两组各有三个人，而后两组只有两个人。这是因为十不能被四整除。余数中的一行被分配给了前两组。在这个例子中，有两个人获得了最高奖金，但如果你想将余数行分配给表现最好的组呢？你可以按降序对行排序以将额外的行移动到顶部，但接下来就出现了如何计算奖金的问题。通过重新使用直线的代数公式\
    \ `y = mx + b`，就可以得到正确的结果。直线的斜率 (`m`) 是 -1000，截距 (`b`) 是 5000。清单 2-14 展示了这种做法。\n\
    \n```sql\n--2-14.1 按相反顺序分配奖金\nWITH Sales AS (\n    SELECT SP.FirstName, SP.LastName,\n\
    \           SUM(SOH.TotalDue) AS TotalSales\n    FROM [Sales].[vSalesPerson] SP\n\
    \    JOIN Sales.SalesOrderHeader SOH\n        ON SP.BusinessEntityID = SOH.SalesPersonID\n\
    \    WHERE SOH.OrderDate >= '2011-01-01' AND SOH.OrderDate < '2012-01-01'\n  \
    \  GROUP BY FirstName, LastName)\nSELECT FirstName, LastName, TotalSales,\n  \
    \     -1000 * NTILE(4) OVER(ORDER BY TotalSales DESC) + 5000 AS Bonus\nFROM Sales;\n\
    清单 2-14\n使用代数让三个人获得最高奖金\n```\n\n图 2-13 显示了结果。通过按相反方向排序，然后将 `NTILE` 的结果乘以 -1000\
    \ 再加 5000，就有三个人获得了最高奖金。\n\n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig13_HTML.jpg](img/335106_2_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13：让三个人获得最高奖金时的结果\n\n我还听说一些公司使用 `NTILE` 来划分比赛结果或捐赠者群体。虽然不常用，但如果你有适用场景，请记住它。\n\
    \n# 总结\n\n排名函数 `ROW_NUMBER`、`RANK`、`DENSE_RANK` 和 `NTILE` 是所有窗口函数中最基础的。排名函数为结果的每一行添加一个编号。`OVER`\
    \ 子句中的 `ORDER BY` 表达式是必需的，并且根据具体情况，你可能还需要添加 `PARTITION BY`。这些函数本身通常不是最终解决方案，但常常构成更复杂解决方案的基础。\n\
    \n当面对一个棘手的查询时，你可能想添加一个行号来查找行之间的模式或关系。然后利用这些模式和关系来找出解决方案。在第 9 章和第 10 章中，你将看到排名函数被用来解决更多查询问题。\n\
    \n第 3 章将介绍窗口聚合，它允许你在查询中添加像 `SUM` 或 `Avg` 这样的函数，而无需将查询转变为聚合查询。你将不需要 `GROUP BY`，也不会丢失任何明细数据。\n\
    \n# 3. 使用窗口聚合进行汇总\n\n2005 年，微软为 T-SQL 引入了另一种类型的窗口函数：窗口聚合。通过在聚合函数上添加一个 `OVER` 子句，你可以避免通常必须遵守的规则。在编写聚合查询时，你会丢失那些未包含在\
    \ `GROUP BY` 子句中的明细数据。从 SQL Server 2005 开始，你可以通过添加 `OVER` 子句来消除这一限制。通过添加 `OVER`，你也可以省略\
    \ `GROUP BY` 和 `HAVING` 子句。你还可以将窗口聚合函数添加到聚合查询中，以返回不同聚合级别的汇总值。\n\n在本章中，你将学习如何通过窗口函数将聚合函数添加到非聚合查询中。你还将学习通过\
    \ OVER 子句将窗口聚合函数添加到聚合查询中，但实现不同级别的聚合。在本章的最后，我们将一起看一些实际问题。"
- fmt: '## Using Window Aggregates


    Window aggregates are those favorite aggregate functions that you use every day,
    like `SUM` and `AVG`, with the addition of the `OVER` clause. So far, you have
    seen the `OVER` clause used with `LAG` and the ranking functions. In those situations,
    an `ORDER BY` component is required. The `ORDER BY` component *is not supported*
    with SQL Server 2005’s window aggregate functionality. Chapter [4](#335106_2_En_4_Chapter.xhtml)
    covers a 2012 enhancement that does use `ORDER BY`, but you must learn about the
    2005 feature first.


    Although the `ORDER BY` component is not supported in the `OVER` clause for window
    aggregates, all window functions support `PARTITION BY`, and window aggregates
    are no exception. When leaving out `PARTITION BY`, you will have an empty `OVER`
    clause, and the function is applied to the entire set of results, for example,
    a grand total or overall average. When including `PARTITION BY`, the function
    is applied to the individual partitions, for example, subtotals. Here is the syntax:

    ```

    () OVER([PARTITION BY [,,...])

    ```


    The built-in aggregate functions that may be used as a window aggregate are listed
    in Table [3-1](#335106_2_En_3_Chapter.xhtml#Tab1).


    Table 3-1

    The List of Window Aggregate Functions


    | Aggregate Function | Definition |

    | --- | --- |

    | AVG | Calculates the average over the group. |

    | CHECKSUM_AGG | Calculates the checksum over the group. This is often used to
    detect changes in the data. |

    | COUNT | Used to get a count of the rows or a count of non-null values of a column.
    |

    | COUNT_BIG | Works like COUNT but returns a big integer. |

    | MAX | Returns the highest value in the set. |

    | MIN | Returns the lowest value in the set. |

    | STDEV | Calculates the standard deviation over the group. |

    | STDEVP | Calculates the standard deviation for the population over the group.
    |

    | SUM | Adds up the values over the group. |

    | VAR | Returns the statistical variance over the group. |

    | VARP | Returns the statistical variance for the population over the group. |


    If you review the aggregate functions supported in SQL Server 2019, you’ll see
    three that are not included in this list: `GROUPING`, `GROUPING`_`ID`, and `APPROX_COUNT_DISTINCT`.
    `GROUPING` and `GROUPING_ID` are used to identify grouping levels when the more
    advanced `GROUP BY` options such as `ROLLUP` are used. `APPOX_COUNT_DISTINCT`
    is new with SQL Server 2019\. This new function can be used in the case of large
    data sets in place of `COUNT(DISTINCT)` when an approximation is good enough.
    `COUNT(DISTINCT)` cannot be used as a window function, so it makes sense that
    `APPROX_COUNT_DISTINCT` is not allowed either.


    The examples in this chapter will focus on the commonly used functions `AVG`,
    `SUM`, `MIN`, `MAX`, and `COUNT`. Listing [3-1](#335106_2_En_3_Chapter.xhtml#PC2)
    shows some examples of window aggregates.

    ```

    --3.1.1 Window aggregate examples

    SELECT CustomerID, SalesOrderID,

    CAST(MIN(OrderDate) OVER() AS DATE) AS FirstOrderDate,

    CAST(MAX(OrderDate) OVER() AS DATE) AS LastOrderDate,

    COUNT(*) OVER() OrderCount,

    FORMAT(SUM(TotalDue) OVER(),''C'') TotalAmount

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --3.1.2 Use PARTITION BY

    SELECT CustomerID, SalesOrderID,

    CAST(MIN(OrderDate) OVER(PARTITION BY CustomerID) AS DATE)

    AS FirstOrderDate,

    CAST(MAX(OrderDate) OVER(PARTITION BY CustomerID) AS DATE)

    AS LastOrderDate,

    COUNT(*) OVER(PARTITION BY CustomerID) OrderCount,

    FORMAT(SUM(TotalDue) OVER(PARTITION BY CustomerID),''C'') AS TotalAmount

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    ```

    Listing 3-1

    Using Window Aggregates


    Figure [3-1](#335106_2_En_3_Chapter.xhtml#Fig1) shows the partial results. The
    first thing to notice about the examples is that there is no `GROUP BY` clause
    in either of the queries. Adding a window aggregate expression to an otherwise
    non-aggregate query does not change the query to an aggregate query. These queries
    show details of each row along with summary values.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig1_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig1_HTML.jpg)

    Figure 3-1

    Partial results of using window aggregates


    Query 1 uses the empty `OVER` clause. This means that the calculations are performed
    over the entire set of results. The `FirstOrderDate` is the earliest `OrderDate`
    in the data, and the `LastOrderDate` is the latest `OrderDate` in the data. The
    `OrderCount` is the overall count and the `TotalAmount` is the grand total of
    all rows. Query 2 includes a `PARTITION BY` on `CustomerID` in each `OVER` clause.
    Notice in the results that the values for Query 2 are specific for each customer.


    In the previous example, the `OVER` clause was identical within each query. You
    may have different `OVER` clauses within a query. Listing [3-2](#335106_2_En_3_Chapter.xhtml#PC3)
    has two window aggregate functions in one query with different `OVER` clauses.

    ```

    --3.2.1 Use different OVER clauses

    SELECT CustomerID, SalesOrderID, FORMAT(TotalDue,''c'') AS TotalDue,

    FORMAT(SUM(TotalDue) OVER(PARTITION BY CustomerID),''c'') AS CustomerSales,

    FORMAT(SUM(TotalDue) OVER(),''c'') AS TotalSales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    ORDER BY CustomerID, SalesOrderID;

    ```

    Listing 3-2

    Using Different OVER Clauses


    Figure [3-2](#335106_2_En_3_Chapter.xhtml#Fig2) shows the partial results. This
    query returns the total for each customer and the overall total.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig2_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig2_HTML.jpg)

    Figure 3-2

    The partial results of using different OVER clauses


    Another thing to notice in the previous examples is that some of the window aggregate
    functions are nested inside the `CAST` or `FORMAT` function. The window functions
    may also operate on columns, more complex expressions, or subqueries just like
    regular aggregate functions. Listing [3-3](#335106_2_En_3_Chapter.xhtml#PC4) shows
    an example.

    ```

    --3-3-1 Using window functions in expressions

    SELECT CustomerID, SalesOrderID,

    CAST(OrderDate AS Date) AS OrderDate,

    MIN(SalesOrderID/CustomerID)

    OVER(PARTITION BY CustomerID) AS Expr1,

    CAST(MIN(DATEADD(d,1,OrderDate)) OVER() AS DATE) AS Expr2,

    AVG((SELECT COUNT(*)

    FROM Sales.SalesOrderDetail AS SOD

    WHERE SalesOrderID = SOH.SalesOrderID)) OVER() AS Expr3

    FROM Sales.SalesOrderHeader AS SOH;

    ```

    Listing 3-3

    Using Window Functions in Expressions


    The partial results can be seen in Figure [3-3](#335106_2_En_3_Chapter.xhtml#Fig3).
    `Expr1` is the quotient of the `SalesOrderID` divided by the CustomerID. `Expr2`
    nests the `DATEADD` function inside the `MIN` function which is nested inside
    the `CAST` function. `Expr3` applies the `AVG` function to a subquery and returns
    the average number of detail rows.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig3_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig3_HTML.jpg)

    Figure 3-3

    The partial results of nesting functions


    You can see that it is easy to add a window aggregate function to any non-aggregate
    query. Be sure to follow the rules on data types; for example, you can’t calculate
    a sum on character data. You will not use an `ORDER BY` for this functionality
    and the `PARTITION BY` expression is used if you wish to apply the calculations
    over rows divided into subsets.


    A very nonintuitive use of window aggregates is using them within an aggregate
    query.'
  raw: '## Using Window Aggregates


    Window aggregates are those favorite aggregate functions that you use every day,
    like `SUM` and `AVG`, with the addition of the `OVER` clause. So far, you have
    seen the `OVER` clause used with `LAG` and the ranking functions. In those situations,
    an `ORDER BY` component is required. The `ORDER BY` component *is not supported*
    with SQL Server 2005’s window aggregate functionality. Chapter [4](#335106_2_En_4_Chapter.xhtml)
    covers a 2012 enhancement that does use `ORDER BY`, but you must learn about the
    2005 feature first.


    Although the `ORDER BY` component is not supported in the `OVER` clause for window
    aggregates, all window functions support `PARTITION BY`, and window aggregates
    are no exception. When leaving out `PARTITION BY`, you will have an empty `OVER`
    clause, and the function is applied to the entire set of results, for example,
    a grand total or overall average. When including `PARTITION BY`, the function
    is applied to the individual partitions, for example, subtotals. Here is the syntax:


    ```

    () OVER([PARTITION BY [,,...])

    ```


    The built-in aggregate functions that may be used as a window aggregate are listed
    in Table [3-1](#335106_2_En_3_Chapter.xhtml#Tab1).


    Table 3-1


    The List of Window Aggregate Functions


    | Aggregate Function | Definition |

    | --- | --- |

    | AVG | Calculates the average over the group. |

    | CHECKSUM_AGG | Calculates the checksum over the group. This is often used to
    detect changes in the data. |

    | COUNT | Used to get a count of the rows or a count of non-null values of a column.
    |

    | COUNT_BIG | Works like COUNT but returns a big integer. |

    | MAX | Returns the highest value in the set. |

    | MIN | Returns the lowest value in the set. |

    | STDEV | Calculates the standard deviation over the group. |

    | STDEVP | Calculates the standard deviation for the population over the group.
    |

    | SUM | Adds up the values over the group. |

    | VAR | Returns the statistical variance over the group. |

    | VARP | Returns the statistical variance for the population over the group. |


    If you review the aggregate functions supported in SQL Server 2019, you’ll see
    three that are not included in this list: `GROUPING`, `GROUPING`_`ID`, and `APPROX_COUNT_DISTINCT`.
    `GROUPING` and `GROUPING_ID` are used to identify grouping levels when the more
    advanced `GROUP BY` options such as `ROLLUP` are used. `APPOX_COUNT_DISTINCT`
    is new with SQL Server 2019\. This new function can be used in the case of large
    data sets in place of `COUNT(DISTINCT)` when an approximation is good enough.
    `COUNT(DISTINCT)` cannot be used as a window function, so it makes sense that
    `APPROX_COUNT_DISTINCT` is not allowed either.


    The examples in this chapter will focus on the commonly used functions `AVG`,
    `SUM`, `MIN`, `MAX`, and `COUNT`. Listing [3-1](#335106_2_En_3_Chapter.xhtml#PC2)
    shows some examples of window aggregates.


    ```

    --3.1.1 Window aggregate examples

    SELECT CustomerID, SalesOrderID,

    CAST(MIN(OrderDate) OVER() AS DATE) AS FirstOrderDate,

    CAST(MAX(OrderDate) OVER() AS DATE) AS LastOrderDate,

    COUNT(*) OVER() OrderCount,

    FORMAT(SUM(TotalDue) OVER(),''C'') TotalAmount

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --3.1.2 Use PARTITION BY

    SELECT CustomerID, SalesOrderID,

    CAST(MIN(OrderDate) OVER(PARTITION BY CustomerID) AS DATE)

    AS FirstOrderDate,

    CAST(MAX(OrderDate) OVER(PARTITION BY CustomerID) AS DATE)

    AS LastOrderDate,

    COUNT(*) OVER(PARTITION BY CustomerID) OrderCount,

    FORMAT(SUM(TotalDue) OVER(PARTITION BY CustomerID),''C'') AS TotalAmount

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    Listing 3-1

    Using Window Aggregates

    ```


    Figure [3-1](#335106_2_En_3_Chapter.xhtml#Fig1) shows the partial results. The
    first thing to notice about the examples is that there is no `GROUP BY` clause
    in either of the queries. Adding a window aggregate expression to an otherwise
    non-aggregate query does not change the query to an aggregate query. These queries
    show details of each row along with summary values.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig1_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Partial results of using window aggregates


    Query 1 uses the empty `OVER` clause. This means that the calculations are performed
    over the entire set of results. The `FirstOrderDate` is the earliest `OrderDate`
    in the data, and the `LastOrderDate` is the latest `OrderDate` in the data. The
    `OrderCount` is the overall count and the `TotalAmount` is the grand total of
    all rows. Query 2 includes a `PARTITION BY` on `CustomerID` in each `OVER` clause.
    Notice in the results that the values for Query 2 are specific for each customer.


    In the previous example, the `OVER` clause was identical within each query. You
    may have different `OVER` clauses within a query. Listing [3-2](#335106_2_En_3_Chapter.xhtml#PC3)
    has two window aggregate functions in one query with different `OVER` clauses.


    ```

    --3.2.1 Use different OVER clauses

    SELECT CustomerID, SalesOrderID, FORMAT(TotalDue,''c'') AS TotalDue,

    FORMAT(SUM(TotalDue) OVER(PARTITION BY CustomerID),''c'') AS CustomerSales,

    FORMAT(SUM(TotalDue) OVER(),''c'') AS TotalSales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    ORDER BY CustomerID, SalesOrderID;

    Listing 3-2

    Using Different OVER Clauses

    ```


    Figure [3-2](#335106_2_En_3_Chapter.xhtml#Fig2) shows the partial results. This
    query returns the total for each customer and the overall total.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig2_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The partial results of using different OVER clauses


    Another thing to notice in the previous examples is that some of the window aggregate
    functions are nested inside the `CAST` or `FORMAT` function. The window functions
    may also operate on columns, more complex expressions, or subqueries just like
    regular aggregate functions. Listing [3-3](#335106_2_En_3_Chapter.xhtml#PC4) shows
    an example.


    ```

    --3-3-1 Using window functions in expressions

    SELECT CustomerID, SalesOrderID,

    CAST(OrderDate AS Date) AS OrderDate,

    MIN(SalesOrderID/CustomerID)

    OVER(PARTITION BY CustomerID) AS Expr1,

    CAST(MIN(DATEADD(d,1,OrderDate)) OVER() AS DATE) AS Expr2,

    AVG((SELECT COUNT(*)

    FROM Sales.SalesOrderDetail AS SOD

    WHERE SalesOrderID = SOH.SalesOrderID)) OVER() AS Expr3

    FROM Sales.SalesOrderHeader AS SOH;

    Listing 3-3

    Using Window Functions in Expressions

    ```


    The partial results can be seen in Figure [3-3](#335106_2_En_3_Chapter.xhtml#Fig3).
    `Expr1` is the quotient of the `SalesOrderID` divided by the CustomerID. `Expr2`
    nests the `DATEADD` function inside the `MIN` function which is nested inside
    the `CAST` function . `Expr3` applies the `AVG` function to a subquery and returns
    the average number of detail rows.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig3_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The partial results of nesting functions


    You can see that it is easy to add a window aggregate function to any non-aggregate
    query. Be sure to follow the rules on data types; for example, you can’t calculate
    a sum on character data. You will not use an `ORDER BY` for this functionality
    and the `PARTITION BY` expression is used if you wish to apply the calculations
    over rows divided into subsets.


    A very nonintuitive use of window aggregates is using them within an aggregate
    query.'
  trans: '## 使用窗口聚合


    窗口聚合就是你日常使用的那些常用聚合函数，比如 `SUM` 和 `AVG`，只不过加上了 `OVER` 子句。到目前为止，你已经见过 `OVER` 子句与
    `LAG` 和排名函数一起使用。在那些情况下，`ORDER BY` 组件是必需的。但 SQL Server 2005 的窗口聚合功能**不支持** `ORDER
    BY` 组件。第 4 章将介绍一个 2012 年的增强功能，该功能确实使用 `ORDER BY`，但你必须先了解 2005 年的这个功能。


    虽然窗口聚合的 `OVER` 子句中不支持 `ORDER BY` 组件，但所有窗口函数都支持 `PARTITION BY`，窗口聚合也不例外。如果省略 `PARTITION
    BY`，你将得到一个空的 `OVER` 子句，该函数将应用于整个结果集，例如，计算总计或整体平均值。如果包含 `PARTITION BY`，则函数将应用于各个分区，例如，计算小计。语法如下：

    ```

    () OVER([PARTITION BY [,,...])

    ```


    可以作为窗口聚合使用的内置聚合函数列于表 3-1。


    表 3-1

    窗口聚合函数列表


    | 聚合函数 | 定义 |

    | --- | --- |

    | AVG | 计算组的平均值。 |

    | CHECKSUM_AGG | 计算组的校验和。常用于检测数据变化。 |

    | COUNT | 用于获取行数或列的非空值计数。 |

    | COUNT_BIG | 功能类似 COUNT，但返回一个大整数。 |

    | MAX | 返回集合中的最大值。 |

    | MIN | 返回集合中的最小值。 |

    | STDEV | 计算组的标准差。 |

    | STDEVP | 计算组中总体的标准差。 |

    | SUM | 对组中的值进行求和。 |

    | VAR | 返回组的统计方差。 |

    | VARP | 返回组中总体的统计方差。 |


    如果你查看 SQL Server 2019 支持的聚合函数，会发现有三个函数未包含在此列表中：`GROUPING`、`GROUPING_ID` 和 `APPROX_COUNT_DISTINCT`。当使用更高级的
    `GROUP BY` 选项（如 `ROLLUP`）时，`GROUPING` 和 `GROUPING_ID` 用于标识分组级别。`APPROX_COUNT_DISTINCT`
    是 SQL Server 2019 的新函数。对于大型数据集，当近似值足够好时，可以使用此新函数代替 `COUNT(DISTINCT)`。`COUNT(DISTINCT)`
    不能用作窗口函数，因此 `APPROX_COUNT_DISTINCT` 同样不被允许也是合理的。


    本章示例将重点介绍常用函数 `AVG`、`SUM`、`MIN`、`MAX` 和 `COUNT`。代码清单 3-1 展示了一些窗口聚合的示例。

    ```

    --3.1.1 窗口聚合示例

    SELECT CustomerID, SalesOrderID,

    CAST(MIN(OrderDate) OVER() AS DATE) AS FirstOrderDate,

    CAST(MAX(OrderDate) OVER() AS DATE) AS LastOrderDate,

    COUNT(*) OVER() OrderCount,

    FORMAT(SUM(TotalDue) OVER(),''C'') TotalAmount

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    --3.1.2 使用 PARTITION BY

    SELECT CustomerID, SalesOrderID,

    CAST(MIN(OrderDate) OVER(PARTITION BY CustomerID) AS DATE)

    AS FirstOrderDate,

    CAST(MAX(OrderDate) OVER(PARTITION BY CustomerID) AS DATE)

    AS LastOrderDate,

    COUNT(*) OVER(PARTITION BY CustomerID) OrderCount,

    FORMAT(SUM(TotalDue) OVER(PARTITION BY CustomerID),''C'') AS TotalAmount

    FROM Sales.SalesOrderHeader

    ORDER BY CustomerID, SalesOrderID;

    ```

    代码清单 3-1

    使用窗口聚合


    图 3-1 显示了部分结果。关于这些示例，首先要注意的是两个查询中都没有 `GROUP BY` 子句。向原本非聚合的查询中添加窗口聚合表达式，并不会将该查询变为聚合查询。这些查询在显示每行详细信息的同时，也显示了汇总值。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig1_HTML.jpg](img/335106_2_En_3_Fig1_HTML.jpg)

    图 3-1

    使用窗口聚合的部分结果


    查询 1 使用了空的 `OVER` 子句。这意味着计算是在整个结果集上进行的。`FirstOrderDate` 是数据中最早的 `OrderDate`，`LastOrderDate`
    是数据中最新的 `OrderDate`。`OrderCount` 是总计数，`TotalAmount` 是所有行的总金额。查询 2 在每个 `OVER` 子句中包含了对
    `CustomerID` 的 `PARTITION BY`。注意在结果中，查询 2 的值是针对每个客户特定的。


    在之前的例子中，每个查询内的 `OVER` 子句是相同的。你可以在同一个查询中使用不同的 `OVER` 子句。代码清单 3-2 在一个查询中有两个具有不同
    `OVER` 子句的窗口聚合函数。

    ```

    --3.2.1 使用不同的 OVER 子句

    SELECT CustomerID, SalesOrderID, FORMAT(TotalDue,''c'') AS TotalDue,

    FORMAT(SUM(TotalDue) OVER(PARTITION BY CustomerID),''c'') AS CustomerSales,

    FORMAT(SUM(TotalDue) OVER(),''c'') AS TotalSales

    FROM Sales.SalesOrderHeader

    WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

    ORDER BY CustomerID, SalesOrderID;

    ```

    代码清单 3-2

    使用不同的 OVER 子句


    图 3-2 显示了部分结果。此查询返回每个客户的总计和整体总计。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig2_HTML.jpg](img/335106_2_En_3_Fig2_HTML.jpg)

    图 3-2

    使用不同 OVER 子句的部分结果


    在前面的例子中还注意到，有些窗口聚合函数嵌套在 `CAST` 或 `FORMAT` 函数内部。窗口函数也可以像常规聚合函数一样，在列、更复杂的表达式或子查询上操作。代码清单
    3-3 展示了一个例子。

    ```

    --3-3-1 在表达式中使用窗口函数

    SELECT CustomerID, SalesOrderID,

    CAST(OrderDate AS Date) AS OrderDate,

    MIN(SalesOrderID/CustomerID)

    OVER(PARTITION BY CustomerID) AS Expr1,

    CAST(MIN(DATEADD(d,1,OrderDate)) OVER() AS DATE) AS Expr2,

    AVG((SELECT COUNT(*)

    FROM Sales.SalesOrderDetail AS SOD

    WHERE SalesOrderID = SOH.SalesOrderID)) OVER() AS Expr3

    FROM Sales.SalesOrderHeader AS SOH;

    ```

    代码清单 3-3

    在表达式中使用窗口函数


    部分结果如图 3-3 所示。`Expr1` 是 `SalesOrderID` 除以 CustomerID 的商。`Expr2` 将 `DATEADD` 函数嵌套在
    `MIN` 函数内，而 `MIN` 函数又嵌套在 `CAST` 函数内。`Avg` 函数应用于一个子查询，并返回明细行的平均数量。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig3_HTML.jpg](img/335106_2_En_3_Fig3_HTML.jpg)

    图 3-3

    嵌套函数的部分结果


    你可以看到，向任何非聚合查询中添加窗口聚合函数是很容易的。务必遵循数据类型规则；例如，不能对字符数据计算总和。你不会为此功能使用 `ORDER BY`，如果你希望将计算应用于划分成子集的行，则会使用
    `PARTITION BY` 表达式。


    窗口聚合的一个非常直观的用法是在聚合查询中使用它们。'
- fmt: '## Adding Window Aggregates to Aggregate Queries


    The first time I added a window aggregate to an aggregate query, I was surprised
    that it didn’t work and more surprised at the error message. Listing [3-4](#335106_2_En_3_Chapter.xhtml#PC5)
    shows an example.


    ```sql

    --3-4.1 Add a window aggregate to an aggregate query

    SELECT CustomerID, SUM(TotalDue) AS CustomerTotal,

    SUM(TotalDue) OVER() AS GrandTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID;

    ```

    **Listing 3-4**

    Adding a Window Aggregate to an Aggregate Query


    Figure [3-4](#335106_2_En_3_Chapter.xhtml#Fig4) shows the error message.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig4_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig4_HTML.jpg)


    **Figure 3-4**

    The error message from adding a window aggregate to an aggregate query


    Obviously, the `TotalDue` column *is contained* in an aggregate expression, and
    adding it to the `GROUP BY` is certainly not the solution. To understand what
    is going on here, you must think about the window that the window aggregate is
    operating on. The set of rows in the window is created after `GROUP BY` operation.
    The window contains any expression listed in the `GROUP BY` clause plus any aggregate
    expressions. Any expression contained in any part of a window function must follow
    the same rules as the `SELECT` list. This means that adding `CustomerID` as the
    argument of the window function or as a `PARTITION BY` column is fine because
    `CustomerID` is part of the `GROUP BY`. To use `TotalDue` in any role of the window
    aggregate expression, it must be aggregated first. Listing [3-5](#335106_2_En_3_Chapter.xhtml#PC6)
    shows the correct solution.


    ```sql

    --3-5.1 How to add a window aggregate to an aggregate query

    SELECT CustomerID, SUM(TotalDue) AS CustomerTotal,

    SUM(SUM(TotalDue)) OVER() AS GrandTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID;

    ```

    **Listing 3-5**

    How to Add a Window Aggregate to an Aggregate Query


    The syntax may look unusual because you cannot nest aggregate functions, but the
    window function must be applied to the sum of `TotalDue`, not just `TotalDue`
    . Figure [3-5](#335106_2_En_3_Chapter.xhtml#Fig5) shows the partial results and
    proves that this works.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig5_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig5_HTML.jpg)


    **Figure 3-5**

    Partial results of adding a window aggregate to an aggregate query


    Another way to do this that is much more intuitive is by separating the window
    aggregate into a CTE or use another method to separate the logic. Listing [3-6](#335106_2_En_3_Chapter.xhtml#PC7)
    shows how to do this.


    ```sql

    --3.6.1 Using a CTE

    WITH SALES AS (

    SELECT CustomerID, SUM(TotalDue) AS CustomerTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID)

    SELECT CustomerID, CustomerTotal,

    SUM(CustomerTotal) OVER() AS GrandTotal

    FROM Sales;

    ```

    **Listing 3-6**

    Using a CTE instead of nesting


    The results are the same as Figure [3-5](#335106_2_En_3_Chapter.xhtml#Fig5). Inside
    the CTE, the query is grouped by `CustomerID`. A `SUM` for each customer is calculated,
    `CustomerTotal`. In the outer query, the window aggregate is applied to `CustomerTotal`.
    The window aggregate is still being applied to the aggregate expression, but the
    logic is just separated so it’s easier to understand. There is no advantage in
    writing the query this way except to add clarity.


    Listing [3-7](#335106_2_En_3_Chapter.xhtml#PC8) has another interesting example
    involving multiple expressions in the `GROUP BY` clause .


    ```sql

    --3-7.1 Window aggregate to multiple group by

    SELECT YEAR(OrderDate) AS OrderYear,

    CustomerID, SUM(TotalDue) AS CustTotalForYear,

    SUM(SUM(TotalDue)) OVER(PARTITION BY CustomerID) AS CustomerTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID, YEAR(OrderDate)

    ORDER BY CustomerID, OrderYear;

    ```

    **Listing 3-7**

    Adding a Window Aggregate to a Query with Multiple Expressions in the GROUP BY
    Clause


    The partial results are shown in Figure [3-6](#335106_2_En_3_Chapter.xhtml#Fig6).
    The `GROUP BY` clause lists the column `CustomerID` and the expression `YEAR(OrderDate)`.
    Before the window aggregate is applied, the results contain one row for each customer
    per year. The `CustTotalForYear` is a normal aggregate expression. The final expression
    is a window aggregate with a `PARTITION BY` expression on `CustomerID`, so `CustomerTotal`
    is the overall subtotal for the customer. The point of this example is that you
    can use window aggregate functions to return values at different levels of aggregation.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig6_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig6_HTML.jpg)


    **Figure 3-6**

    Using a window aggregate with multiple expressions in the GROUP BY


    Inside the window for a window function within an aggregate query, the rows have
    been filtered and grouped. The list of columns available for use with the window
    function is restricted by the `GROUP BY`. This is the default window; you can
    partition it, but you cannot include anything outside it. You can go smaller but
    not bigger. You could base the `PARTITION BY` expression on the entire set of
    results (empty `OVER` clause), by `CustomerID`, or by `YEAR(OrderYear)` without
    error. You wouldn’t use a combination of `CustomerID` and `YEAR(OrderYear)` because
    that matches the `GROUP BY`.


    The rules for adding a window aggregate to an aggregate query apply to all of
    the window functions. Always keep in mind that the `GROUP BY` and `HAVING` clauses
    operate first. The results of the `FROM`, `WHERE`, `GROUP BY`, and `HAVING` clauses
    determine the rows and columns in the base window and the granularity. Any column
    used anywhere in the window function must be one of the `GROUP BY` columns or
    aggregated inside the window function.


    To avoid confusion, do the first aggregation in a CTE. Then, in the outer query,
    apply the window function.


    ## Using Window Aggregates to Solve Common Queries


    It is very easy to add a window aggregate to a complex non-aggregated query. To
    do the same thing with other methods could double the size of the query.


    ### The Percent of Sales Problem


    This particular example can be applied to many situations. You can perform a calculation,
    such as a percentage, using a window aggregate. Listing [3-8](#335106_2_En_3_Chapter.xhtml#PC9)
    demonstrates how to display the details along with a percent of sales.


    ```sql

    --3-8.1 Calculate the percent of sales

    SELECT P.ProductID,

    FORMAT(SUM(OrderQty * UnitPrice),''C'') AS ProductSales,

    FORMAT(SUM(SUM(OrderQty * UnitPrice)) OVER(),''C'') AS TotalSales,

    FORMAT(SUM(OrderQty * UnitPrice)/

    SUM(SUM(OrderQty * UnitPrice)) OVER(), ''P'') AS PercentOfSales

    FROM Sales.SalesOrderDetail AS SOD

    JOIN Production.Product AS P ON SOD.ProductID = P.ProductID

    JOIN Production.ProductSubcategory AS SUB ON P.ProductSubcategoryID

    = SUB.ProductSubcategoryID

    JOIN Production.ProductCategory AS CAT ON SUB.ProductCategoryID

    = CAT.ProductCategoryID

    WHERE CAT.Name = ''Bikes''

    GROUP BY P.ProductID

    ORDER BY PercentOfSales DESC;

    ```

    **Listing 3-8**

    Using a Window Function to Display Percent of Sales


    Figure [3-7](#335106_2_En_3_Chapter.xhtml#Fig7) shows the partial results. This
    is an aggregate query, so the columns used in any role inside the window aggregate
    must be a `GROUP BY` column or aggregated. The empty `OVER` clause is used to
    calculate `TotalSales`. The sum by `ProductID` is divided by the sales over the
    entire result set and formatted to give the percentage of sales for each bike
    model.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig7_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig7_HTML.jpg)


    **Figure 3-7**

    The percent of sales by ProductID'
  raw: '## Adding Window Aggregates to Aggregate Queries


    The first time I added a window aggregate to an aggregate query, I was surprised
    that it didn’t work and more surprised at the error message. Listing [3-4](#335106_2_En_3_Chapter.xhtml#PC5)
    shows an example.


    ```

    --3-4.1 Add a window aggregate to an aggregate query

    SELECT CustomerID, SUM(TotalDue) AS CustomerTotal,

    SUM(TotalDue) OVER() AS GrandTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID;

    Listing 3-4

    Adding a Window Aggregate to an Aggregate Query

    ```


    Figure [3-4](#335106_2_En_3_Chapter.xhtml#Fig4) shows the error message.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig4_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig4_HTML.jpg)


    Figure 3-4


    The error message from adding a window aggregate to an aggregate query


    Obviously, the `TotalDue` column *is contained* in an aggregate expression, and
    adding it to the `GROUP BY` is certainly not the solution. To understand what
    is going on here, you must think about the window that the window aggregate is
