- fmt: '# 11.1 Month Level, No Product. Handling Gaps, All Products, 3 Operation Query


    ```sql

    /* 11.1 Month level, no product. Handling gaps, All products, 3 operation query
    */

    WITH CTE_ProductPeriod /* Operation #1 Generate the product period framework */

    AS  (

    SELECT `p.ProductKey`, `Datekey`,

    `CalendarYear`, `CalendarQuarter`,

    `MonthNumberOfYear` AS `CalendarMonth`

    FROM `DimDate` AS d

    CROSS JOIN `DimProduct` p

    WHERE `d.FullDateAlternateKey` BETWEEN ''2011-01-01'' AND `GETDATE()`

    AND EXISTS(SELECT * FROM `FactInternetSales` f

    WHERE `f.ProductKey` = `p.ProductKey`

    AND `f.OrderDate` BETWEEN ''2011-01-01'' AND `GETDATE()`)

    ),

    CTE_MonthlySummary /* Operation #2 Calculate the base statistics */

    AS (

    SELECT `ROW_NUMBER`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`) AS `[RowID]`,

    `p.CalendarYear` AS `OrderYear`,

    `p.CalendarMonth` AS `OrderMonth`,

    count(distinct `f.SalesOrderNumber`) AS `[Order Count]`,

    count(distinct `f.CustomerKey`) AS `[Customer Count]`,

    ROUND(SUM(`COALESCE(f.SalesAmount,0)`), 2) AS `[Sales]`,

    ROUND(SUM(SUM(`COALESCE(f.SalesAmount, 0)`)

    OVER(PARTITION BY `p.CalendarYear`

    ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ), 2)

    AS `[Sales YTD]`,

    ROUND(`LAG(SUM(f.SalesAmount), 11, 0 )`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`), 2)

    AS `[Sales SP PY]`,

    ROUND(`LAG(SUM(f.SalesAmount), 1, 0)`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`), 2)

    AS `[Sales PM]`,

    CASE WHEN `COUNT(*)`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) = 3

    THEN `AVG(SUM(f.SalesAmount))`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN 2 PRECEDING AND current row)

    ELSE null

    END AS `[Sales 3 MMA]`,  /* 3 Month Moving Average */

    CASE WHEN `count(*)`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN 2 PRECEDING AND current row) = 3

    THEN `SUM(SUM(f.SalesAmount))`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN 2 PRECEDING AND current row)

    ELSE null

    END AS `[Sales 3 MMT]`,   /* 3 month Moving Total */

    CASE WHEN `COUNT(*)`

    OVER (ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN 11 PRECEDING AND CURRENT ROW) = 12

    THEN `AVG(SUM(f.SalesAmount))`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN 11 PRECEDING AND current row)

    ELSE null

    END AS `[Sales 12 MMA]`, /* 12 Month Moving Average */

    CASE WHEN `count(*)`

    OVER(ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN 11 PRECEDING AND current row) = 12

    THEN `SUM(SUM(f.SalesAmount))`

    OVER (ORDER BY `p.CalendarYear`, `p.CalendarMonth`

    ROWS BETWEEN 11 PRECEDING AND current row)

    ELSE null

    END AS `[Sales 12 MMT]`  /* 12 month Moving Total */

    FROM `CTE_ProductPeriod` AS p

    LEFT OUTER JOIN `[dbo].[FactInternetSales]` AS f

    ON `p.ProductKey` = `f.ProductKey`

    AND `p.DateKey` = `f.OrderDateKey`

    GROUP BY `p.CalendarYear`, `p.CalendarMonth`

    )

    SELECT `[RowID]`,

    `[OrderYear]`,

    `[OrderMonth]`,

    `[Order Count]`,

    `[Customer Count]`,

    `[Sales]`,

    `[Sales SP PY]`,

    `[Sales PM]`,

    `[Sales YTD]`,

    `[Sales 3 MMA]`,

    `[Sales 3 MMT]`,

    `[Sales 12 MMA]`,

    `[Sales 12 MMT]`,

    `[Sales]` - `[Sales SP PY]` AS `[Sales SP PY Growth]`,

    (`[Sales]` - `[Sales SP PY]`)

    / `NULLIF([Sales SP PY], 0)` AS `[Sales SP PY Growth %]`,

    `[Sales]` - `[Sales SP PY]` AS `[Sales PY MOM Growth]`,

    (`[Sales]` - `[Sales PM]`)

    / `NULLIF([Sales PM], 0)` AS `[Sales PY MOM Growth %]`

    FROM `CTE_MonthlySummary`

    ORDER BY `[OrderYear]`, `[OrderMonth]`

    ```


    **Listing 11-1**

    Updated Base Query Using CTE


    Notice how much simpler and readable the final select is. Because you encapsulated
    the logic behind the columns in the previous CTE operation, the resulting columns
    are also available to be used in operation, including window functions!


    ## Moving Monthly Totals and Averages


    The addition of the Moving Monthly Totals (MMT) and Moving Monthly Average (MMA)
    that were added to the summary provides a way to address seasonality in the data
    by averaging the monthly totals across a range of months. Moving totals and averages
    are useful because they smooth out the volatility in seasonal/noisy data. They
    can also be used to calculate an annual rate of change (RoC) which can be used
    to identify trends and measure cyclical change over longer periods of time.


    ## Calculating Same Period Prior Year-to-Date


    You could not create a column for `[Sales YTD PY]` until now. With the `[Sales
    YTD]` column present in every row of the CTE, you can now use a window function
    to look back to the same period in the prior year and use it to calculate a difference
    between the current year to date and the prior year to date. Remember, even though
    you are working with a query that returns data at a month level, this technique
    works for date level results as well. Add the following block of column calculations
    in Listing 11-2 to the new base query from Listing 11-1 and explore the results.


    ```sql

    `LAG([Sales YTD], 11,0)`

    OVER(ORDER BY `[OrderYear]`, `[OrderMonth]`)

    AS `[Sales PY YTD]`,

    `[Sales YTD]` - `LAG([Sales YTD], 11,0)`

    OVER(ORDER BY `[OrderYear]`, `[OrderMonth]`)

    AS `[Sales PY YTD Diff]`,

    (`[Sales YTD]` - `LAG([Sales YTD], 11,0)`

    OVER(ORDER BY `[OrderYear]`, `[OrderMonth]`))

    /`NULLIF(LAG([Sales YTD], 11, 0)`

    OVER(ORDER BY `[OrderYear]`, `[OrderMonth]`), 0)

    AS `[Sales PY YTD Pct Diff]`

    ```


    **Listing 11-2**

    Same Period Prior Year-to-Date Calculations


    ## Visualizing Trends


    Because of the number of columns returned in this query, the chart in Figure 11-1
    makes more sense to demonstrate the results. The whole purpose of creating the
    growth and growth percent calculations is to be able to use them to analyze the
    data for trends. Plotting the data in a chart is a great way to visualize the
    results and present them to business users.


    ![Monthly trend chart showing month-over-month difference % and same period PY
    difference %](images/335106_2_En_11_Chapter/335106_2_En_11_Fig1_HTML.jpg)


    **Figure 11-1**

    Monthly trend chart showing month-over-month difference % and same period PY difference
    %


    ## Month-over-Month vs. Same Period Prior Year


    Month-over-month (MOM) difference calculations are generally not that useful as
    a direct measure. They show the change from one period to the next, which can
    be very "noisy" and can hide underlying trends. Same period prior year (SP PY)
    difference calculations show a better picture of the growth trend over the prior
    year, but can also be prone to seasonality. Big changes in sales can often be
    attributed to the holiday season, and do not always reflect the overall trends
    at work. That being said, you are now going to improve upon these calculations
    by implementing the rate-of-change calculations mentioned previously and smooth
    out the seasonal ups and downs into long-term trends.'
