  5 测试名为 `MEDIAN` 的新函数。图 3-9 显示了使用 `MEDIAN` 函数的结果。当数值个数为奇数时，中位数返回中间值。当数值个数为偶数时，它返回两个中间值的平均值。客户
  13011 有三个订单。5、1 和 3 的中位数是 3。客户 13019 有两个订单。中位数是 6，即 2 和 10 的中间值。


