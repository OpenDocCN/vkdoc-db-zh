- '# 1. 初识窗口


  SQL Server 是一个强大的数据库平台，拥有一个名为 T-SQL 的多功能查询语言。在我看来，多年来 T-SQL 最令人兴奋的增强就是**窗口函数**。窗口函数使您能够以新的、更简单的方式解决查询问题，并且在大多数情况下，其性能优于传统技术。它们是进行数据分析的绝佳工具。您可能还会听到它们被称为“windowing”或“windowed”函数。在讨论此功能时，这三个术语是同义词。


  在 SQL Server 2000 发布之后，SQL Server 爱好者们苦苦等待了漫长的 5 年，才迎来下一个版本。微软带来了全新的产品——SQL Server
  2005。此版本引入了 SQL Server Management Studio、SQL Server Integration Services、快照隔离和数据库镜像。微软还用许多强大的功能增强了
  T-SQL，例如公用表表达式（CTEs）。而在 2005 版本中，所有 T-SQL 增强中最激动人心的，莫过于引入了窗口函数。


  而这仅仅是个开始。窗口函数从 ANSI SQL2003 开始成为标准 ANSI SQL 规范的一部分。SQL Server 2012 版本根据标准发布了更多功能。2019
  年，微软通过批处理模式处理（一种曾专属于列存储索引的功能）为部分窗口函数提供了性能提升。您将在第 8 章了解该性能特性的工作原理。即便如此，目前的功能仍未涵盖整个规范，因此未来还有更多值得期待的内容。


  本章将初步介绍两个 T-SQL 窗口函数：`LAG` 和 `ROW_NUMBER`。您将了解什么是窗口，以及如何用 `OVER` 子句来定义它。您还将学习如何将窗口划分为更小的部分，称为分区。


  ## 探索窗口函数


  窗口函数并没有让您能做以前无法完成的事情，它们也与 Microsoft Windows API 毫无关系。使用以前可用的方法，例如自联接、相关子查询和游标，只要您投入足够的时间和精力，几乎可以解决任何
  T-SQL 问题。窗口函数的主要好处在于，您可以轻松地解决这些棘手的查询。大多数情况下，相较于旧方法，您还能获得巨大的性能提升。您通常可以使用窗口函数将涉及多条语句或子查询的解决方案，转变为更简单的单条语句。


  我喜欢将窗口函数分为几类，这些分类与微软的定义并不完全一致：排名函数、窗口聚合函数、累积窗口聚合函数、偏移函数和统计函数。（微软将四种偏移函数和四种统计函数统称为“分析”函数。）您可以使用这些函数为每一行分配排名、在不分组的情况下计算汇总值、计算运行总计、在结果中包含来自不同行的列，以及计算组内百分比。随着您阅读本书，您将逐步了解这些函数。


  我最喜欢的 T-SQL 函数恰好也是一个窗口函数，名为 `LAG`。它是偏移函数之一，您将在第 6 章学习到。`LAG` 允许您在结果中包含来自不同行的列。与实现相同功能的旧方法相比，使用
  `LAG` 更简单，性能也更好。


  在同一年内（仅相隔几个月），有两个人分别向我寻求帮助，解决的几乎是同一个问题：如何利用股市数据，将某只股票一天的收盘价与下一天进行比较？传统的解决方案需要将数据的每一行与前一行进行联接，以获取前一天的收盘价。而使用
  `LAG` 函数，解决方案不仅编写起来更简单，而且性能也大大提升。



  ### 注意


  如果您想跟随本示例操作，可以创建 `StockAnalysisDemo` 数据库并生成股票市场数据的示例脚本，该脚本与本章代码一同可在 Apress 网站上找到。


  若想快速了解如何先使用一种传统方法，再使用 `LAG` 函数来解决此问题，请审阅并运行代码清单 1-1。


  ```sql

  USE StockAnalysisDemo;

  GO

  --1-1.1 使用子查询

  SELECT TickerSymbol, TradeDate, ClosePrice,

  (SELECT TOP(1) ClosePrice

  FROM StockHistory AS SQ

  WHERE SQ.TickerSymbol  = OQ.TickerSymbol

  AND SQ.TradeDate < OQ.TradeDate

  ORDER BY TradeDate DESC) AS PrevClosePrice

  FROM StockHistory AS OQ

  ORDER BY TickerSymbol, TradeDate;

  --1-1.2 使用 LAG

  SELECT TickerSymbol, TradeDate, ClosePrice,

  LAG(ClosePrice) OVER(PARTITION BY TickerSymbol

  ORDER BY TradeDate) AS PrevClosePrice

  FROM StockHistory

  ORDER BY TickerSymbol, TradeDate;

  ```

  **代码清单 1-1**

  两种解决股票市场问题的方法


  部分结果显示在图 1-1 中。由于数据是随机生成的，图中的 `ClosePrice` 和 `PrevClosePrice` 值与您的值不会匹配。查询 1 使用关联子查询（旧方法）为每一外部行选择一个
  `ClosePrice`。通过将内部查询的 `TickerSymbol` 与外部查询连接，您可以确保不会比较两只不同的股票。内部查询和外部查询也通过 `TradeDate`
  进行连接，但内部查询的 `TradeDate` 必须小于外部查询的 `TradeDate`，以确保您获取的是前一天的数据。内部查询还必须排序，以获取日期小于当前日期但最新的数据行。在我的笔记本电脑（16GB
  RAM，使用 SSD 存储）上运行此查询耗时超过一分钟。返回了近 700,000 行数据。


  ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig1_HTML.jpg](img/335106_2_En_1_Fig1_HTML.jpg)

  **图 1-1**

  股票市场问题的部分结果


  查询 2 使用窗口函数 `LAG` 解决相同的问题，并产生相同的结果。暂时不必担心语法；读完本书时您将成为专家。在我的笔记本电脑上，使用 `LAG` 的查询仅用了
  13 秒运行。


  仅通过查看代码清单 1-1 中的代码，您就可以看到使用 `LAG` 的查询 2 编写起来要简单得多，即使您可能还不理解其语法。它的运行速度也快得多，因为它只读取表一次，而不像查询
  1 那样每行读取一次。当您继续阅读本书并运行示例时，您将了解到像 `LAG` 这样的窗口函数如何让您的工作更轻松，让您的客户更满意！


  ## 理解窗口


  窗口函数不同于常规函数，因为它们在一组行（也称为 *窗口*）上操作。这可能听起来类似于聚合函数的工作方式。聚合函数（例如 `SUM` 和 `AVG`）在行组上操作并提供汇总值。当您编写聚合查询时，除了
  `GROUP BY` 子句中的列之外，您会丢失详细信息列。


  当添加 `GROUP BY` 子句时，您将看到的不是返回所有行的摘要，而是每个 `GROUP BY` 列唯一集合的一行摘要行。例如，要使用聚合查询获取所有行的计数，您必须省略其他列。一旦将列添加到
  `SELECT` 和 `GROUP BY` 中，您将获得每个唯一分组的计数，而不是整个结果集的计数。


  带有窗口函数的查询与传统聚合查询大不相同。`SELECT` 列表中出现的列没有限制，也不需要 `GROUP BY` 子句。您还可以将窗口函数添加到聚合查询中，这将在第
  3 章讨论。返回的不是摘要行，而是所有详细信息，并且包含窗口函数的表达式的结果仅作为另一列包含在内。实际上，通过使用窗口函数获取行的总计数，您仍然可以包含表中的所有列。


  想象一下，在查询运行时，透过一扇窗户查看一组特定的行。您还有最后一次机会执行操作，例如从另一行中获取其中一个列。操作的结果将作为附加列添加。随着您阅读本书，您将了解窗口函数的实际工作原理，但“透过窗户查看”的概念帮助我理解并在许多
  SQL Server 活动中向听众解释了窗口函数。图 1-2 说明了这一概念。


  ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig2_HTML.jpg](img/335106_2_En_1_Fig2_HTML.jpg)

  **图 1-2**

  透过窗户对一组行执行操作


  窗口并不局限于查询的 `SELECT` 列表中的列。例如，如果您查看 `StockHistory` 表，您会看到还有一个 `OpenPrice` 列。某一天的
  `OpenPrice` 与前一天的 `ClosePrice` 是不同的。如果您愿意，您可以使用 `LAG` 将之前的 `OpenPrice` 包含在结果中，即使它最初不在
  `SELECT` 列表中。


  在使用 `LAG` 的股票历史示例中，每一行都有自己的窗口，在其中查找前一个收盘价。当对数据的第三行执行计算时，窗口由第二行和第三行组成。当对第四行执行计算时，窗口由第三行和第四行组成。


  如果通过 `WHERE` 子句从查询中移除了 `2017-12-02` 的行，会发生什么？窗口是否包含被过滤掉的行？答案是“否”，这引出了使用窗口函数时需要理解的两个非常重要的概念：窗口函数可以在查询中使用的位置，以及操作的逻辑顺序。


  窗口函数只能用于 `SELECT` 列表和 `ORDER BY` 子句中。您不能基于窗口函数进行筛选或分组。在必须基于窗口函数的结果进行筛选或分组的情况下，解决方案是分离逻辑。您可以使用临时表、派生表子查询或
  CTE，然后在外部查询中进行筛选或分组。


  窗口函数在 `FROM`、`WHERE`、`GROUP BY` 和 `HAVING` 子句之后操作。它们在计算 `TOP` 和 `DISTINCT` 子句之前操作。您将在本章后面的“揭开特殊情况窗口”一节中了解更多关于
  `DISTINCT` 和 `TOP` 如何影响带有窗口函数的查询。


  窗口由 `OVER` 子句定义。请注意，在代码清单 1-1 的查询 2 中，`LAG` 函数后跟一个 `OVER` 子句。每种类型的窗口函数对 `OVER` 子句都有特定的要求。`LAG`
  函数必须有一个 `ORDER BY` 表达式，并且可以有一个 `PARTITION BY` 表达式。


  ## 理解 OVER 子句


  窗口函数的一个独特之处是 `OVER` 子句，它定义了窗口或集合。除了我将在第 7 章解释的一个特例外，窗口函数都将有一个 `OVER` 子句，学习如何使用 `OVER`
  子句是理解窗口函数的必要条件。在某些情况下，`OVER` 子句可能是空的。在第 3 章处理窗口聚合函数时，您将看到空的 `OVER` 子句。


  ### 注意


  在一种情况下，你会看到查询中 `OVER` 关键字没有跟在窗口函数后面，那就是与序列对象一起使用。序列对象是 SQL Server 2008 引入的，它是一个包含递增数字的容器，通常用作标识列的替代方案。


  对于查询 `SELECT` 列表中的任何类型的表达式，都会对结果集中的每一行执行一次计算。例如，如果你有一个包含表达式 `Col1 + Col2` 的查询，那么对于返回的每一行，这两个列都会被相加一次。对第
  1 行、第 2 行、第 3 行等等都会执行计算。包含窗口函数的表达式也必须为每一行计算一次。然而，在这种情况下，表达式是在一组行上操作的，而这组行对于执行计算的每一行可能都是不同的。


  `OVER` 子句决定了哪些行组成了窗口。`OVER` 子句有三个可能的组成部分：`PARTITION BY`、`ORDER BY` 和窗口框架。`PARTITION
  BY` 表达式用于划分行，根据你要完成的任务，它是可选的。`ORDER BY` 表达式对于某些类型的窗口函数是必需的。在使用时，它决定了窗口函数的执行顺序。最后，窗口框架用于某些特定类型的窗口函数，以提供更细的粒度。你将在第
  5 章学习有关框架的内容。


  许多 T-SQL 开发人员和数据库专业人士都使用过 `ROW_NUMBER` 函数。他们甚至可能没有意识到这是窗口函数之一。在许多情况下，为查询添加行号是解决复杂查询问题的一个步骤。


  `ROW_NUMBER` 为每一行提供一个从 1 开始的递增数字。数字的分配顺序由 `ORDER BY` 表达式中指定的列决定，这独立于查询本身中的 `ORDER
  BY` 子句。运行清单 1-2 中的查询以了解其工作原理。


  ```

  USE AdventureWorks;

  GO

  --1-2.1 按 CustomerID 分配行号

  SELECT CustomerID, SalesOrderID,

  ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

  FROM Sales.SalesOrderHeader;

  --1-2.2 按 SalesOrderID 分配行号

  SELECT CustomerID, SalesOrderID,

  ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

  FROM Sales.SalesOrderHeader;

  清单 1-2

  将行号应用于不同列

  ```


  ### 注意


  本书中的许多示例都使用了 `AdventureWorks` 和 `AdventureWorksDW` 数据库。你可以使用 2014 或更高版本的任何版本来跟随操作，本书撰写时最新的版本是
  2017 版。只需确保在包含 `USE` 语句时，根据你的数据库版本进行调整。


  `OVER` 子句跟在 `ROW_NUMBER` 函数后面。在 `OVER` 子句内部，你会看到 `ORDER BY` 后面跟着一个或多个列。查询 1 和 2
  之间的区别仅在于 `OVER` 子句中的 `ORDER BY` 表达式。请注意图 1-3 所示的部分结果，行号最终按照 `OVER` 子句中 `ORDER BY`
  表达式所指定列的顺序应用，这也是数据返回的顺序。由于必须对数据进行排序才能应用行号，因此数据很容易保持该顺序，但这并不能保证。真正保证结果顺序的唯一方法是在查询中添加一个
  `ORDER BY`。


  ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig3_HTML.jpg](img/335106_2_En_1_Fig3_HTML.jpg)


  图 1-3


  对不同的 `OVER` 子句使用 `ROW_NUMBER` 的部分结果


  如果查询本身有一个 `ORDER BY` 子句，它可以与 `OVER` 中的 `ORDER BY` 不同。清单 1-3 演示了这一点。


  ```

  --1-3.1 使用不同 ORDER BY 的行号

  SELECT CustomerID, SalesOrderID,

  ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

  FROM Sales.SalesOrderHeader

  ORDER BY SalesOrderID;

  清单 1-3

  在 OVER 子句中使用与查询 ORDER BY 不同的 ROW_NUMBER

  ```


  在这种情况下，行号是按 `CustomerID` 的顺序分配的，但结果是按 `SalesOrderID` 的顺序返回的。部分结果如图 1-4 所示。为了显示行号分配正确，图中显示了网格滚动到第一个客户
  `CustomerID 11000` 的位置。


  ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig4_HTML.jpg](img/335106_2_En_1_Fig4_HTML.jpg)


  图 1-4


  显示查询的 `ORDER BY` 与 `OVER` 子句不同的部分结果


  就像查询的 `ORDER BY` 子句一样，你可以在 `OVER` 子句中使用 `DESCENDING` 或 `DESC` 关键字来指定降序，如清单 1-4 所示。


  ```

  --1-4.1 使用降序 ORDER BY 的行号

  SELECT CustomerID, SalesOrderID,

  ROW_NUMBER() OVER(ORDER BY CustomerID DESC) AS RowNumber

  FROM Sales.SalesOrderHeader;

  清单 1-4

  使用降序 ORDER BY 的 ROW_NUMBER

  ```


  图 1-5 显示了部分结果。由于数据库引擎可以轻松地按 `CustomerID` 降序返回结果，你可以很容易地看到行号 1 被分配给了最大的 `CustomerID`。


  ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig5_HTML.jpg](img/335106_2_En_1_Fig5_HTML.jpg)


  图 1-5


  使用降序 `ORDER BY` 的 `ROW_NUMBER` 的部分结果


  在 `SalesOrderHeader` 表中，`CustomerID` 不是唯一的。请注意，在最后一个例子中，30118 是最大的 `CustomerID`。`SalesOrderID`
  为 71803 的行号是 1，而 `SalesOrderID` 为 65221 的行号是 2。无法保证行号会精确地按这种方式分配，只要最小的 `RowNumber`
  与 `CustomerID` 30118 对齐即可。为了确保行号按预期对齐，请在 `OVER` 子句的 `ORDER BY` 表达式中使用唯一的列或列的组合。如果使用多个列，请用逗号分隔。你甚至可以以随机顺序应用行号。清单
  1-5 演示了这一点。



  '
- "# 1-5. 使用随机 ORDER BY 的行号\n\n```sql\n--1-5.1 使用随机 ORDER BY 的行号\nSELECT CustomerID,\
  \ SalesOrderID,\nROW_NUMBER() OVER(ORDER BY NEWID()) AS RowNumber\nFROM Sales.SalesOrderHeader;\n\
  ```\n\n通过使用 `NEWID()` 函数，行号以随机方式分配。图 1-6 展示了这一点。运行此代码，您将看到不同的 `CustomerID` 值与行号对齐。每次数据按行号顺序返回，这只是因为数据库引擎这样做更容易。\n\
  \n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig6_HTML.jpg](img/335106_2_En_1_Fig6_HTML.jpg)\n\
  \n*图 1-6：使用随机 ORDER BY 的 ROW_NUMBER 的部分结果*\n\n如您所料，以特定顺序应用行号涉及排序，这是一个开销很大的操作。如果您希望生成行号但不关心顺序，可以使用选择字面值而非列名的子查询。清单\
  \ 1-6 演示了如何做到这一点。\n\n```sql\n--1-6.1 使用常量作为 ORDER BY\nSELECT CustomerID, SalesOrderID,\n\
  ROW_NUMBER() OVER(ORDER BY (SELECT 1)) AS RowNumber\nFROM Sales.SalesOrderHeader;\n\
  --1-6.2 对查询应用 ORDER BY\nSELECT CustomerID, SalesOrderID,\nROW_NUMBER() OVER(ORDER\
  \ BY (SELECT 1)) AS RowNumber\nFROM Sales.SalesOrderHeader\nORDER BY SalesOrderID;\n\
  --1-6.3 无 ROW_NUMBER 和无 ORDER BY\nSELECT CustomerID, SalesOrderID\nFROM Sales.SalesOrderHeader;\n\
  ```\n\n图 1-7 显示了部分结果。在查询 1 和 2 中，选择常量的子查询替代了 `ORDER BY` 列。`OVER` 子句是相同的，但行号的应用方式不同，即以最简单的方式应用。两个查询的区别在于查询\
  \ 2 有一个 `ORDER BY` 子句。由于没有指定行号分配的特定顺序，最简单的方式就是即使没有 `ROW_NUMBER` 函数时结果也会返回的顺序。查询\
  \ 3 展示了在没有 `ROW_NUMBER` 和 `ORDER BY` 的情况下行是如何返回的。您可能想知道优化器为何选择在查询 1 和 3 中按 `CustomerID`\
  \ 顺序返回结果。恰好在 `CustomerID` 上有一个覆盖这些查询的非聚集索引。优化器选择了在 `CustomerID` 上有序的索引来解决查询。\n\n\
  ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig7_HTML.jpg](img/335106_2_En_1_Fig7_HTML.jpg)\n\
  \n*图 1-7：让引擎决定如何应用行号的部分结果*\n\n从这个例子中还可以了解到 `ROW_NUMBER` 是非确定性的。它不能保证在相同情况下返回相同的值。通过查看每个窗口函数的文档，您会发现每一个都是非确定性的。您可能会认为这是错误的，因为两个查询使用了不同的\
  \ `ORDER BY` 子句，导致两个 `ROW_NUMBER` 函数具有不同的输入。SQL Server 文档中的文章“确定性和非确定性函数”指出：\n\n\
  > *您无法影响任何内置函数的确定性。每个内置函数是确定性的还是非确定性的，取决于 SQL Server 的实现方式。例如，在查询中指定 `ORDER BY`\
  \ 子句不会改变该查询中使用的函数的确定性。*\n\n如果 `ORDER BY` 子句由唯一的列集组成，您可以预测行号的分配方式，但 `ROW_NUMBER`\
  \ 仍然是非确定性的。清单 1-7 是一个例子。\n\n```sql\n--1-7.1 OVER 子句仅包含 CustomerID\nSELECT CustomerID,\
  \ SalesOrderID,\nROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber\nFROM Sales.SalesOrderHeader\n\
  ORDER BY CustomerID, SalesOrderID;\n--1-7.2 相同的查询，仅更改 ORDER BY 子句\nSELECT CustomerID,\
  \ SalesOrderID,\nROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber\nFROM Sales.SalesOrderHeader\n\
  ORDER BY CustomerID, SalesOrderID DESC;\n```\n\n图 1-8 显示了部分结果。注意，`SalesOrderID`\
  \ 在查询 1 中被分配为 1，在查询 2 中被分配为 3。两个查询之间唯一的区别是 `ORDER BY` 子句。由于 `CustomerID` 11000 有三个订单，数字\
  \ 1、2 和 3 必须分配给这三行，但无法保证它们将如何被分配。\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig8_HTML.jpg](img/335106_2_En_1_Fig8_HTML.jpg)\n\
  \n*图 1-8：演示非确定性*\n\n关于确定性，您无法使用窗口函数完成的有几件事。您不能在计算列（表中由表达式组成的列）中使用窗口函数表达式，也不能将窗口函数表达式用作视图聚集索引的键。\n\
  \n`OVER` 子句中的 `ORDER BY` 表达式非常灵活。您可以使用表达式而不是列，就像之前示例中的 `NEWID()` 所展示的那样。您也可以列出多个列或表达式。清单\
  \ 1-8 演示了在 `ORDER BY` 中使用 `CASE` 语句。\n\n```sql\n--1-8.1 在 ORDER BY 中使用表达式\nSELECT\
  \ CustomerID, SalesOrderID, OrderDate,\nROW_NUMBER() OVER(ORDER BY CASE WHEN OrderDate\
  \ > '2013/12/31'\nTHEN 0 ELSE 1 END, SalesOrderID) AS RowNumber\nFROM Sales.SalesOrderHeader;\n\
  ```\n\n图 1-9 显示了部分结果。在这种情况下，行号首先应用于 2014 年的订单，然后按 `SalesOrderID` 分配。网格向下滚动到 2014\
  \ 年的最后三个订单，以便您可以看到接下来应用的数字来自数据的开头，即 2011 年。\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig9_HTML.jpg](img/335106_2_En_1_Fig9_HTML.jpg)\n\
  \n*图 1-9：使用表达式和另一个列的部分结果*\n\n`OVER` 子句还有两个额外的组成部分：分区和框架。您将在第 5 章中学习到 2012 年引入的框架。分区将窗口划分为多个更小的窗口，接下来您将了解这部分内容。\n\
  \n\n\n## 使用分区划分窗口\n\n如果你所在的房间正好有一扇窗户，现在就看看它。它是一整块大玻璃，还是被分成了多个小窗格？一扇被分成多个窗格的窗户仍然是一扇窗户。每一个单独的窗格本身也是一扇窗户。\n\
  \n同样的概念适用于窗口函数。整个结果集就是窗口，但你也可以根据一个或多个列将设置划分为更小的窗口。`OVER` 子句包含一个可选组件 `PARTITION BY`。当没有提供\
  \ `PARTITION BY` 时，分区就是整个大窗口。\n\n使用 `LAG` 解决股票市场问题的查询通过 `TickerSymbol` 列对数据进行了分区。通过按\
  \ `TickerSymbol` 分离数据，一只股票的 `ClosePrice` 不会被另一只股票的行所检索。在本章前面演示的 `ROW_NUMBER` 函数的情况下，你可以强制数字为每个客户重新从\
  \ 1 开始。清单 1-9 演示了这一特性。\n\n```sql\n--1-9.1 结合 PARTITION BY 使用 ROW_NUMBER\nSELECT\
  \ CustomerID, SalesOrderID,\nROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY\
  \ SalesOrderID)\nAS RowNumber\nFROM Sales.SalesOrderHeader;\n```\n清单 1-9 使用 PARTITION\
  \ BY\n\n图 1-10 展示了部分结果。注意，行号为每个客户重新从 1 开始。\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig10_HTML.jpg](img/335106_2_En_1_Fig10_HTML.jpg)\n\
  图 1-10 结合 `ROW_NUMBER` 使用 `PARTITION BY` 选项的部分结果\n\n所有窗口函数都支持 `OVER` 子句的 `PARTITION\
  \ BY` 表达式。它也总是可选的。如果省略 `PARTITION BY`，所有行都将包含在窗口中。当使用 `PARTITION BY` 时，每个窗口将仅包含与\
  \ `PARTITION BY` 列匹配的行。\n\n## 揭示特殊案例窗口\n\n到目前为止，示例都很直接，但如果你不知道发生了什么，有些情况会显得违反直觉。本节中的示例使用了\
  \ `ROW_NUMBER` 函数，但这些概念适用于任何窗口函数。\n\n首先，看看当 `DISTINCT` 关键字与 `ROW_NUMBER` 一起使用时会发生什么。窗口函数在\
  \ `DISTINCT` 之前操作，这可能导致你意想不到的结果。清单 1-10 演示了将 `DISTINCT` 与 `ROW_NUMBER` 结合使用，以获取唯一的\
  \ `OrderDates` 列表及其行号。\n\n```sql\n--1-10.1 使用 DISTINCT\nSELECT DISTINCT OrderDate,\n\
  ROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber\nFROM Sales.SalesOrderHeader\n\
  ORDER BY RowNumber;\n\n--1-10.2 使用 CTE 分离逻辑\nWITH OrderDates AS (\n    SELECT DISTINCT\
  \ OrderDate\n    FROM Sales.SalesOrderHeader)\nSELECT OrderDate,\n    ROW_NUMBER()\
  \ OVER(ORDER BY OrderDate) AS RowNumber\nFROM OrderDates\nORDER BY RowNumber;\n\
  ```\n清单 1-10 将 `DISTINCT` 与 `ROW_NUMBER` 结合使用\n\n图 1-11 展示了部分结果。查询 1 返回了 31,465\
  \ 行，尽管许多订单日期相同，表中每个订单都返回了一行。这绝对不是预期的答案。行号是在应用 `DISTINCT` 之前生成的。因为行号是唯一的，结果中的每一行最终都是唯一的，所以\
  \ `DISTINCT` 无法消除任何行。查询 2 展示了解决方案：首先在 CTE 中获取订单日期的唯一列表，然后在外部查询中应用行号。查询 2 返回 1124\
  \ 行，即唯一订单日期的数量。你也可以使用临时表、表变量、视图或派生表来首先创建唯一列表。\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig11_HTML.jpg](img/335106_2_En_1_Fig11_HTML.jpg)\n\
  图 1-11 将 `DISTINCT` 与 `ROW_NUMBER` 结合使用的部分结果\n\n当你使用 `TOP` 时，也会发现有趣的行为。同样，行号是在应用\
  \ `TOP` 之前生成的。我最初是在为一些单元测试向表中插入随机行时发现这一点的。思路是将示例行以新的 ID 号重新插入到同一个表中。为了生成新的 ID，我希望在现有最大\
  \ ID 的基础上添加行号。因为我希望插入特定数量的行，所以我使用了 `TOP`。结果行号并没有像我预期的那样从 1 开始，而是从一个随机值开始。清单 1-11\
  \ 展示了使用 `TOP` 如何影响窗口函数。\n\n```sql\n--1-11.1 将 TOP 与 ROW_NUMBER 结合使用\nSELECT TOP(6)\
  \ CustomerID, SalesOrderID,\nROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber\n\
  FROM Sales.SalesOrderHeader\nORDER BY NEWID();\n\n--1-11.2 使用 CTE 分离逻辑\nWITH Orders\
  \ AS (\n    SELECT TOP(6) CustomerID, SalesOrderID\n    FROM Sales.SalesOrderHeader\n\
  \    ORDER BY NEWID())\nSELECT CustomerID, SalesOrderID,\nROW_NUMBER() OVER(ORDER\
  \ BY SalesOrderID) AS RowNumber\nFROM Orders;\n```\n清单 1-11 将 `TOP` 与 `ROW_NUMBER`\
  \ 结合使用\n\n图 1-12 展示了结果。如果你运行这个示例，会看到不同的随机结果。该示例的目的是生成六行随机数据，并且行号从 1 开始。查询 1 返回了行号，但行号并非从\
  \ 1 开始，也没有任何顺序。通过使用 CTE 分离逻辑，`TOP` 可以首先操作。查询 2 返回一组随机的行，但行号如预期那样从 1 开始。\n\n![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig12_HTML.jpg](img/335106_2_En_1_Fig12_HTML.jpg)\n\
  图 1-12 将 `TOP` 与 `ROW_NUMBER` 结合使用的结果\n\n最后一个有趣的情况涉及将窗口函数添加到聚合查询中。此功能在第 3 章的“向聚合查询添加窗口聚合”一节中介绍。\n\
  \n## 总结\n\n窗口函数随 SQL Server 2005 和 2012 引入，为解决具有挑战性的查询提供了新的、简便的方法。窗口函数是 SQL ANSI\
  \ 标准的一部分。标准委员会已经定义了更多的功能，因此微软未来可能会包含额外的函数。窗口函数必须包含一个 `OVER` 子句，该子句定义了每行要操作的窗口。根据所使用的窗口函数，`OVER`\
  \ 子句可能包含 `ORDER BY` 和框架表达式。`PARTITION BY` 表达式在所有窗口函数中都受支持，并将根据所需结果酌情使用。在许多情况下，使用窗口函数比旧方法提供更好的性能，但它们几乎总是让查询更容易编写。\n\
  \n既然你已经了解了窗口函数的基础知识，现在该研究排名函数了。在第 2 章中，你将学习如何使用 SQL Server 2005 引入的四个排名函数来解决复杂的\
  \ T-SQL 查询。\n\n## 探索排名函数\n\n这四个排名函数是由微软在 2005 年引入 T-SQL 的。其中三个函数，`ROW_NUMBER`、`RANK`\
  \ 和 `DENSE_RANK`，为查询结果中的每一行分配一个序列号。第四个排名函数 `NTILE`，通过为结果中的每一行分配一个桶编号来划分行。低排名行组获得\
  \ `NTILE` 值 1，而最高排名的行组则被分配最大的编号。\n\n虽然为一行添加编号本身通常不是最终答案，但这个功能往往是许多解决方案的基础。本章展示了如何使用这四个排名函数，以及如何在本章和本书后续章节中将它们应用于一些实际问题。\n\
  \n\n## 使用 ROW_NUMBER\n\n根据我在 SQL Server 活动中对听众的调查，`ROW_NUMBER` 是最广为人知且最常用的窗口函数。许多\
  \ SQL Server 专业人士承认使用过 `ROW_NUMBER`，即使他们并未意识到这是窗口函数之一。在第 1 章中，当你学习 `OVER` 子句时，你已经看到了\
  \ `ROW_NUMBER` 的实际应用。现在，你将更深入地了解 `ROW_NUMBER`。\n\n`ROW_NUMBER` 函数为窗口中的每一行返回一个从 1\
  \ 开始的唯一整数。`OVER` 子句内部的 `ORDER BY` 表达式是必需的，它决定了编号的应用顺序。所有窗口函数都支持一个可选的 `PARTITION\
  \ BY` 表达式，该表达式将窗口划分为更小的窗口（分区）。每个分区的行号从 1 开始并递增 1。以下是 `ROW_NUMBER` 的基本语法，它可能出现在查询的\
  \ `SELECT` 列表和 `ORDER BY` 子句中：\n\n```sql\nROW_NUMBER() OVER([PARTITION BY column1[,\
  \ column2, ...]]\nORDER BY column1 [ASC | DESC][, column2 [ASC | DESC] ...])\n```\n\
  \n清单 [2-1] 展示了使用和不使用 `PARTITION BY` 表达式的 `ROW_NUMBER`。为了按 `CustomerID` 对齐行号以便比较，`OVER`\
  \ 子句的 `ORDER BY` 表达式是不同的。\n\n```sql\n-- 2-1.1 使用带 PARTITION BY 和不带 PARTITION BY\
  \ 的 ROW_NUMBER\nSELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate, SalesOrderID,\n\
  ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS WithPart,\n\
  ROW_NUMBER() OVER(ORDER BY CustomerID) AS WithoutPart\nFROM Sales.SalesOrderHeader;\n\
  ```\n\n图 [2-1] 显示了部分结果。行号列 `WithPart` 和 `WithoutPart` 对于前三行（`CustomerID` 11000）的值是相同的。在此之后，由于\
  \ `PARTITION BY` 表达式，`WithPart` 行对于每个新的 `CustomerID` 重新开始编号。\n\n![图 2-1：带分区和不带分区的\
  \ ROW_NUMBER 部分结果](img/335106_2_En_2_Fig1_HTML.jpg)\n\n关于这个查询还有另一个有趣的事情需要考虑。第二个\
  \ `OVER` 子句中的 `ORDER BY` 表达式 `CustomerID` 在此数据中不是唯一的。`SalesOrderID` 为 43793 的两行的行号都返回\
  \ 1。对于该行，`WithoutPart` 的值可能是 2 或 3，因为 `CustomerID` 11000 有三个订单，并且 `ORDER BY` 表达式仅基于该列。行号是正确应用的，因为它们是按\
  \ `CustomerID` 顺序排列的，但由于 `CustomerID` 不唯一，不能保证在 `CustomerID` 内部应用行号的顺序。`SalesOrderID`\
  \ 43793 的 `WithoutPart` 值可能是 1、2 或 3。在第 1 章中，我简要提到所有窗口函数都是非确定性的，清单 [2-2] 展示了如何使用相同的\
  \ `OVER` 子句产生不同的行号。\n\n```sql\n-- 2-2.1 查询 ORDER BY 升序\nSELECT CustomerID,\nCAST(OrderDate\
  \ AS DATE) AS OrderDate,\nSalesOrderID,\nROW_NUMBER() OVER(ORDER BY CustomerID)\
  \ AS RowNumber\nFROM Sales.SalesOrderHeader\nORDER BY CustomerID, SalesOrderID;\n\
  \n-- 2-2.2 查询 ORDER BY 降序\nSELECT CustomerID,\nCAST(OrderDate AS DATE) AS OrderDate,\n\
  SalesOrderID,\nROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber\nFROM Sales.SalesOrderHeader\n\
  ORDER BY CustomerID, SalesOrderID DESC;\n```\n\n图 [2-2] 显示了部分结果。`OVER` 子句是相同的，但查询的排序方式不同。`SalesOrderID`\
  \ 43793 在查询 1 中的行号是 1，但在查询 2 中的行号是 3。\n\n![图 2-2：在 OVER 子句中使用非唯一 ORDER BY 的不同结果](img/335106_2_En_2_Fig2_HTML.jpg)\n\
  \n这证明 `ROW_NUMBER` 是非确定性的；换句话说，在相同的情况下，你可以从该函数获得不同的值。查询的 `ORDER BY` 子句不影响确定性，因此这是一个有效的测试。\n\
  \n为了确保使用 `ROW_NUMBER`（实际上是使用任何窗口函数）时获得可重复的结果，请确保 `OVER` 子句中的 `ORDER BY` 列是唯一的。清单\
  \ [2-3] 是一个使用多个 `ORDER BY` 列以使表达式唯一的示例。\n\n```sql\n-- 2-3.1 使用唯一 ORDER BY 的 ROW_NUMBER\n\
  SELECT CustomerID,\nCAST(OrderDate AS DATE) AS OrderDate,\nSalesOrderID,\nROW_NUMBER()\
  \ OVER(ORDER BY CustomerID, SalesOrderID) AS RowNum\nFROM Sales.SalesOrderHeader\n\
  ORDER BY CustomerID, SalesOrderID;\n\n-- 2-3.2 改为降序\nSELECT CustomerID,\nCAST(OrderDate\
  \ AS Date) AS OrderDate,\nSalesOrderID,\nROW_NUMBER() OVER(ORDER BY CustomerID,\
  \ SalesOrderID) AS RowNum\nFROM Sales.SalesOrderHeader\nORDER BY CustomerID, SalesOrderID\
  \ DESC;\n```\n\n图 [2-3] 显示了部分结果。在这种情况下，无论查询的 `ORDER BY` 子句如何，`SaleOrderID` 43793\
  \ 的行号都是 1。`ROW_NUMBER` 仍然是一个非确定性函数，但由于唯一的 `ORDER BY` 列，赋值是一致的。\n\n![图 2-3：在 OVER\
  \ 子句中使用唯一 ORDER BY 表达式](img/335106_2_En_2_Fig3_HTML.jpg)\n\n在 `OVER` 子句的 `PARTITION\
  \ BY` 表达式中也可以包含多个列、表达式和子查询。事实上，正如你将在本章末尾的“使用排名函数解决查询”部分看到的，在 `PARTITION BY` 中使用多个列是解决一些实际示例的关键。\n\
  \n使用 `ROW_NUMBER` 时，数据库引擎对每个分区中的行进行排序，并根据每行的位置分配唯一编号。你已经看到 `OVER` 的 `ORDER BY` 表达式不唯一的情况，因此当值存在并列时，不能保证行号每次完全一致。现在你将学习两个以不同方式处理并列情况的函数：`RANK`\
  \ 和 `DENSE_RANK`。\n\n\n## 理解 RANK 与 DENSE_RANK\n\n`RANK` 和 `DENSE_RANK` 函数与 `ROW_NUMBER`\
  \ 看起来非常相似。事实上，在许多查询中，它们返回的值与 `ROW_NUMBER` 完全相同。然而，`RANK` 和 `DENSE_RANK` 函数却大不相同，因为它们不是简单地分配连续数字，而是根据\
  \ `ORDER BY` 表达式对行进行排名。\n\n当 `OVER` 子句的 `ORDER BY` 列不唯一时，差异就会显现。例如，许多客户可能在同一天下单，但每个订单都有一个唯一的\
  \ `SalesOrderID`。如果使用 `OrderDate` 列而不是 `SalesOrderID`，结果中就会出现并列。并列行的排名将是相同的。\n\n\
  `RANK` 和 `DENSE_RANK` 之间也有区别。`RANK` 函数返回当前行相对于分区中所有行位置的排名。`DENSE_RANK` 函数则根据当前行在分区内\
  \ `ORDER BY` 表达式的唯一值返回排名。`RANK` 表示当前行之前有多少行，而 `DENSE_RANK` 表示当前值之前有多少个 *唯一值*。另一种理解方式是：`ROW_NUMBER`\
  \ 是基于位置的，`DENSE_RANK` 是基于逻辑的，而 `RANK` 介于两者之间。`ROW_NUMBER` 基于行排好序后的位置，而 `DENSE_RANK`\
  \ 基于唯一值的排列顺序。\n\n这两个函数的语法与 `ROW_NUMBER` 的语法非常相似：\n\n```\nRANK() OVER([PARTITION\
  \ BY [,,...]] ORDER BY  [,,...])\nDENSE_RANK() OVER([PARTITION BY [,,...]]\nORDER\
  \ BY  [,,...])\n```\n\n代码清单 2-4 对比了 `ROW_NUMBER`、`RANK` 和 `DENSE_RANK`。该查询经过筛选，显示在同一天下了多个订单的客户。\n\
  \n```\n--2-4.1 使用 RANK 和 DENSE_RANK\nSELECT CustomerID, CAST(OrderDate AS DATE)\
  \ AS OrderDate,\nROW_NUMBER() OVER(ORDER BY OrderDate) AS RowNumber,\nRANK() OVER(ORDER\
  \ BY OrderDate) AS [Rank],\nDENSE_RANK() OVER(ORDER BY OrderDate) AS DenseRank\n\
  FROM Sales.SalesOrderHeader\nWHERE CustomerID IN (11330, 29676);\n代码清单 2-4\n使用 RANK\
  \ 和 DENSE_RANK\n```\n\n图 2-4 显示了部分结果。每个 `OVER` 子句中的 `ORDER BY` 列是 `OrderDate`，它不是唯一的。行号是唯一的且连续的，正如预期的那样。请注意，第三行和第四行的\
  \ `Rank` 值都是 3。这两行的 `OrderDate` 都是 2013-07-31，形成了并列。这是数据集中的第三个排名 `OrderDate`。在第五行，`Rank`\
  \ 值“追上”了 `RowNumber` 值，均为 5。第五行的日期 2013-08-09 是数据集中的第五个排名 `OrderDate`。\n\n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig4_HTML.jpg](img/335106_2_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4: 比较 ROW_NUMBER、RANK 和 DENSE_RANK 的部分结果\n\n第三行和第四行的 `DenseRank` 值也都是 3。然而，请注意第五行的\
  \ `DenseRank` 是 4。日期 2013-08-09 是数据集中的第四个 *不同* `OrderDate`。\n\n`ROW_NUMBER`、`RANK`\
  \ 和 `DENSE_RANK` 函数为每一行分配一个数字。现在你将了解一种不同类型的排名函数，`NTILE`。\n\n## 使用 NTILE 划分数据\n\n\
  `NTILE` 函数是一个排名函数，但有点特别。它分配的数字用于将结果划分为等分的桶。你必须指定需要多少个桶，并且与其他排名函数一样，`OVER` 子句中需要包含\
  \ `ORDER BY` 表达式。以下是 `NTILE` 的语法：\n\n```\nNTILE() OVER([PARTITION BY [,,...]]\n\
  ORDER BY  [,,...])\n```\n\n在 `NTILE` 单词后面的括号内，提供你希望在结果中看到的桶的数量。`PARTITION BY` 表达式是可选的，`ORDER\
  \ BY` 是必需的。代码清单 2-5 展示了一个示例，该示例根据 2013 年的销售额将月份划分为四个桶。\n\n```\n--2.5.1 使用 NTILE\n\
  WITH Orders AS (\nSELECT MONTH(OrderDate) AS OrderMonth,\nFORMAT(SUM(TotalDue),'C')\
  \ AS Sales\nFROM Sales.SalesOrderHeader\nWHERE OrderDate >= '2013/01/01' and OrderDate\
  \ < '2014/01/01'\nGROUP BY MONTH(OrderDate))\nSELECT OrderMonth, Sales, NTILE(4)\
  \ OVER(ORDER BY Sales) AS Bucket\nFROM Orders;\n代码清单 2-5\n使用 NTILE\n```\n\n图 2-5\
  \ 显示了结果。该查询在名为 `Orders` 的 CTE 中将 2013 年的销售额按月份进行聚合。在外部查询中，应用了 `NTILE` 函数。每个月份所属的桶取决于该月份的销售额。`桶\
  \ #1` 包含销售额最低的三个月。`桶 #4` 包含销售额最高的三个月。\n\n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig5_HTML.jpg](img/335106_2_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5: 使用 NTILE\n\n在此示例中，使用四个桶，数据被均匀地分配到各个桶中。有时，行无法被桶数均匀分配。当分配后多出一行时，`桶 #1` 将获得这一额外行。当分配后多出两行时，`桶\
  \ #1` 和 `#2` 将各获得一个额外行，以此类推。代码清单 2-6 演示了这种情况。\n\n```\n--2.6.1 使用不均匀的桶进行 NTILE\n\
  WITH Orders AS (\nSELECT MONTH(OrderDate) AS OrderMonth, FORMAT(SUM(TotalDue),'C')\n\
  AS Sales\nFROM Sales.SalesOrderHeader\nWHERE OrderDate >= '2013/01/01' and OrderDate\
  \ < '2014/01/01'\nGROUP BY MONTH(OrderDate))\nSELECT OrderMonth, Sales, NTILE(5)\
  \ OVER(ORDER BY Sales) AS Bucket\nFROM Orders;\n代码清单 2-6\n使用不均匀的桶进行 NTILE\n```\n\
  \n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig6_HTML.jpg](img/335106_2_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6: NTILE 使用不均匀桶的结果\n\n此查询返回五个桶。十二除以五等于二余二。如果你查看图 2-6 中显示的结果，会看到 `桶 #1` 和 `桶\
  \ #2` 各有三行。其他桶各有两行。\n\n在本章中，你已经看到了许多解释如何使用排名函数的示例，但还没有看到任何实际应用的例子。下一节将演示一些可以用这些函数解决的真实世界问题。\n\
  \n## 使用排名函数解决查询\n\n自 2005 年这些函数首次引入以来，我在编写查询时发现越来越多使用排名函数的理由。我相信它们帮助我学会了以基于集合的方式思考，并且随着时间的推移，使用窗口函数变得自然而然。当我面临一个具有挑战性的查询时，我通常会先添加一个行号，看看是否能找到任何模式，然后据此继续。\n\
  \n\n### 数据去重\n\n解决问题的方法总是不止一种，数据去重就是一个很好的例子。传统方法涉及将不同的行存储在临时表中。然后你可以截断原始表，并将这些行从临时表插回。可能存在无法清空原始表，而必须有选择地删除多余行的情况。你可以使用行号来解决这个问题。清单\
  \ 2-7 创建了一个包含重复行的表。\n\n```sql\n--2-7.1 创建一个用于存放重复行的表\nCREATE TABLE #dupes(Col1 INT,\
  \ Col2 CHAR(1));\n--2-7.2 插入一些行\nINSERT INTO #dupes(Col1, Col2)\nVALUES (1,'a'),(1,'a'),(2,'b'),\n\
  (3,'c'),(4,'d'),(4,'d'),(5,'e');\n--2-7.3\nSELECT Col1, Col2\nFROM #dupes;\n```\n\
  \n**清单 2-7** 创建包含重复行的表\n\n图 2-7 显示了结果。你可以看到有几行是重复的。在实际应用中，该表可能有更多列，但两列足以演示此技术。\n\
  \n![包含重复行的表](img/335106_2_En_2_Fig7_HTML.jpg)\n**图 2-7** 包含重复行的表\n\n清单 2-8 包含一个删除重复项的脚本。为了更好地理解其工作原理，它被分解为两个步骤。请确保在与清单\
  \ 2-7 相同的查询窗口中运行此代码，以便临时表存在。\n\n```sql\n--2-8.1 添加 ROW_NUMBER 并按所有列分区\nSELECT Col1,\
  \ Col2,\nROW_NUMBER() OVER(PARTITION BY Col1, Col2 ORDER BY Col1) AS RowNumber\n\
  FROM #dupes;\n--2-8.2 删除 RowNumber > 1 的行\nWITH Dupes AS (\nSELECT Col1, Col2,\n\
  ROW_NUMBER() OVER(PARTITION BY Col1, Col2 ORDER BY Col1)\nAS RowNumber\nFROM #dupes)\n\
  DELETE Dupes WHERE RowNumber > 1;\n--2-8.3 结果\nSELECT Col1, Col2\nFROM #dupes;\n\
  ```\n\n**清单 2-8** 删除重复行\n\n图 2-8 显示了运行此脚本的结果。查询 1 中添加了一个 `ROW_NUMBER` 函数。为了使行号对于每个唯一的行重新开始编号，需要按表中的所有列进行分区。该表只有两列，但如果它有更多列，它们都应列在\
  \ `PARTITION BY` 表达式中。由于行号对于每个唯一的行重新开始编号，因此很容易看出要删除的行：它们的行号都大于 1。语句 2 删除了这些行。因为你不能将\
  \ `ROW_NUMBER` 函数添加到 `WHERE` 子句中，所以通过将行号添加到 CTE 中来分离逻辑。直接从 CTE 中删除重复项。最后，查询 3 证明重复项已消失。\n\
  \n![删除重复行](img/335106_2_En_2_Fig8_HTML.jpg)\n**图 2-8** 删除重复行\n\n### 查找每组的前 N 行\n\
  \n我第一次思考这个问题是在一次技术面试中。潜在客户想知道我会如何找到特定年份内每个月的前四个订单。解决它的一种方法涉及使用 `CROSS APPLY` 和 `TOP`。最容易编写的方法是使用\
  \ `ROW_NUMBER`。清单 2-9 展示了这两种方法。\n\n```sql\n--2-9.1 使用 CROSS APPLY 查找前四个订单\nWITH\
  \ Months AS (\nSELECT MONTH(OrderDate) AS OrderMonth\nFROM Sales.SalesOrderHeader\n\
  WHERE OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01')\nSELECT OrderMonth,\
  \ OrderDate, SalesOrderID, TotalDue\nFROM Months\nCROSS APPLY (\nSELECT TOP 4 OrderDate,\
  \ SalesOrderID, TotalDue\nFROM Sales.SalesOrderHeader\nWHERE MONTH(OrderDate) =\
  \ Months.OrderMonth\nAND OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01'\n\
  ORDER BY SalesOrderID) AS Orders\nORDER BY OrderMonth, SalesOrderID;\n\n--2-9.2\
  \ 使用 ROW_NUMBER 查找前四个订单\nWITH Orders AS (\nSELECT MONTH(OrderDate) AS OrderMonth,\
  \ OrderDate,\nSalesOrderID, TotalDue,\nROW_NUMBER() OVER(PARTITION BY MONTH(OrderDate)\n\
  ORDER BY SalesOrderID) AS RowNumber\nFROM Sales.SalesOrderHeader\nWHERE OrderDate\
  \ >= '2013-01-01' AND OrderDate < '2014-01-01')\nSELECT OrderMonth, CAST(OrderDate\
  \ AS DATE) AS OrderDate,\nSalesOrderID, TotalDue\nFROM Orders\nWHERE RowNumber <=\
  \ 4\nORDER BY OrderMonth, SalesOrderID;\n```\n\n**清单 2-9** 查找每月前四个订单\n\n图 2-9 显示了部分结果，即一月和二月的行。每个查询总共返回了\
  \ 48 行。查询 1 比较复杂。在我看来，它不容易理解。CTE 创建了一个 2013 年销售月份的列表。外部查询使用 `CROSS APPLY` 将 `Months`\
  \ CTE 连接到内部查询。为了为外部查询的每一行拉回前四行，使用了 `TOP`。在这种情况下必须使用 `CROSS APPLY`，因为使用派生表只会拉回总共四行，而不是每月四行。\n\
  \n![返回每月前四个销售的部分结果](img/335106_2_En_2_Fig9_HTML.jpg)\n**图 2-9** 返回每月前四个销售的部分结果\n\
  \n查询 2 使用 `ROW_NUMBER` 来完成同样的事情。CTE 包含结果所需的所有表达式，外加一个行号。行号按月份分区，以便编号为每个月重新开始。外部查询只是从\
  \ CTE 中检索数据并根据行号进行过滤。\n\n对于这个问题的另一种变化，如何找出每个月价格最高的四个订单呢？清单 2-10 展示了如何编写此查询。\n\n\
  ```sql\n--2-10.1 使用 ROW_NUMBER 查找前四个订单\nWITH Orders AS (\nSELECT  MONTH(OrderDate)\
  \ AS OrderMonth, OrderDate,\nSalesOrderID, TotalDue,\nROW_NUMBER() OVER(PARTITION\
  \ BY MONTH(OrderDate)\nORDER BY TotalDue DESC) AS RowNumber\nFROM Sales.SalesOrderHeader\n\
  WHERE OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01')\nSELECT OrderMonth,\
  \ CAST(OrderDate AS DATE) AS OrderDate,\nSalesOrderID,\nTotalDue\nFROM Orders\n\
  WHERE RowNumber <= 4\nORDER BY OrderMonth, TotalDue DESC;\n```\n\n**清单 2-10** 查找每月最昂贵的四个订单\n\
  \n图 2-10 显示了部分结果。在这种情况下，返回了每个月的四个订单，并且这些是每个月的最高销售额。\n\n![每月四个最昂贵订单的部分结果](img/335106_2_En_2_Fig10_HTML.jpg)\n\
  **图 2-10** 每月四个最昂贵订单的部分结果\n\n你也可以使用此技术查找特定位置的行或一系列行，例如用于分页。例如，你可能需要在网页上一次显示十行。只需在查询中添加行号到\
  \ CTE 后，在 `WHERE` 子句中为你想要显示的第一行和最后一行提供一个变量，这很容易。还有另一种可能效果更好的方法，即 `OFFSET/FETCH`\
  \ 技术，该技术从 SQL Server 2012 首次可用。这是 `ORDER BY` 子句的一个选项，更多信息可以在这里找到： [`https://docs.microsoft.com/en-us/sql/t-sql/queries/select-order-by-clause-transact-sql?view=sql-server-2017`](https://docs.microsoft.com/en-us/sql/t-sql/queries/select-order-by-clause-transact-sql%253Fview%253Dsql-server-2017)\n\
  \n### 创建计数表\n\n在许多问题中，计数表（或数字表）都能派上用场，而且创建这种表也有几种方法。清单 2-11 展示了一个使用 `ROW_NUMBER`\
  \ 的示例脚本。\n\n```sql\n--2-11.1 创建表\nCREATE TABLE #Numbers(Number INT);\n--2-11.2 填充计数表\n\
  INSERT INTO #Numbers(Number)\nSELECT TOP(1000000) ROW_NUMBER() OVER(ORDER BY a.object_id)\n\
  FROM sys.objects a\nCROSS JOIN sys.objects b\nCROSS JOIN sys.objects c;\n清单 2-11\n\
  创建数字表\n```\n\n通过使用 `CROSS JOIN`，你可以生成大量行，本例中通过 `TOP` 限制为一百万行。然后通过添加 `ROW_NUMBER`，数字\
  \ 1 到 1,000,000 就会被加入表中。\n\n现在你有了一个计数表，你可能会想用它做什么。当你需要在表中查找缺失的日期或 ID 号时，计数表通常很有用。清单\
  \ 2-12 是一个示例。请确保在创建计数表的查询窗口中运行。\n\n```sql\n--2-12.1 找到最早日期和天数差\nDECLARE @Min DATE,\
  \ @DayCount INT;\nSELECT @Min = MIN(OrderDate),\n       @DayCount = DATEDIFF(DAY,MIN(OrderDate),MAX(OrderDate))\n\
  FROM Sales.SalesOrderHeader;\n--2-12.2 将数字转换为日期，然后查找缺失的日期\nWITH Dates AS (\n   \
  \ SELECT TOP(@DayCount) DATEADD(DAY,Number,@Min) AS OrderDate\n    FROM #Numbers\
  \ AS N\n    ORDER BY Number\n)\nSELECT Dates.OrderDate\nFROM Dates\nLEFT JOIN Sales.SalesOrderHeader\
  \ AS SOH\n    ON Dates.OrderDate = SOH.OrderDate\nWHERE SOH.SalesOrderID IS NULL;\n\
  清单 2-12\n使用计数表查找没有订单的日期\n```\n\n此示例首先在表中找到最小日期以及最小日期和最大日期之间的差值。然后，它使用一个 CTE（公用表表达式）将数字从最早日期的次日开始转换为日期。在外部查询中，它将\
  \ `Dates` CTE 与表进行比较，基于 `OrderDate` 进行连接，并找出那些 `NULL` 的行。图 2-11 显示了结果。有三个日期没有任何订单。\n\
  \n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig11_HTML.jpg](img/335106_2_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11：没有订单的日期\n\n### 解决奖金问题\n\n这个例子是我多年来用来解释如何使用 `NTILE` 函数的一个典型场景。假设你是一位销售团队的经理。你有一笔奖金要发放，并希望根据每个人的销售额来分配这笔钱。业绩最好的销售小组每人将获得\
  \ $4000，业绩最差的小组将获得 $1000。清单 2-13 展示了如何使用 `NTILE` 来解决这个问题。\n\n```sql\n--2-13.1 使用\
  \ NTILE 分配奖金\nWITH Sales AS (\n    SELECT SP.FirstName, SP.LastName,\n         \
  \  SUM(SOH.TotalDue) AS TotalSales\n    FROM [Sales].[vSalesPerson] SP\n    JOIN\
  \ Sales.SalesOrderHeader SOH\n        ON SP.BusinessEntityID = SOH.SalesPersonID\n\
  \    WHERE SOH.OrderDate >= '2011-01-01' AND SOH.OrderDate < '2012-01-01'\n    GROUP\
  \ BY FirstName, LastName)\nSELECT FirstName, LastName, TotalSales,\n       NTILE(4)\
  \ OVER(ORDER BY TotalSales) * 1000 AS Bonus\nFROM Sales;\n清单 2-13\n解决奖金问题\n```\n\
  \n图 2-12 显示了结果。此查询仅筛选了 2011 年这一年的数据。数据被聚合，并在一个名为 `Sales` 的 CTE 中计算每个人的 `TotalSales`\
  \ 总和。在外部查询中，`NTILE` 函数将行分成四个组（桶）。提供给 `NTILE` 的参数指定了组的数量。通过将组号乘以 1000，就得到了奖金数额。销售额最低的销售人员获得的奖金较少。\n\
  \n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig12_HTML.jpg](img/335106_2_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12：奖金问题的结果\n\n你可能注意到，前两组各有三个人，而后两组只有两个人。这是因为十不能被四整除。余数中的一行被分配给了前两组。在这个例子中，有两个人获得了最高奖金，但如果你想将余数行分配给表现最好的组呢？你可以按降序对行排序以将额外的行移动到顶部，但接下来就出现了如何计算奖金的问题。通过重新使用直线的代数公式\
  \ `y = mx + b`，就可以得到正确的结果。直线的斜率 (`m`) 是 -1000，截距 (`b`) 是 5000。清单 2-14 展示了这种做法。\n\
  \n```sql\n--2-14.1 按相反顺序分配奖金\nWITH Sales AS (\n    SELECT SP.FirstName, SP.LastName,\n\
  \           SUM(SOH.TotalDue) AS TotalSales\n    FROM [Sales].[vSalesPerson] SP\n\
  \    JOIN Sales.SalesOrderHeader SOH\n        ON SP.BusinessEntityID = SOH.SalesPersonID\n\
  \    WHERE SOH.OrderDate >= '2011-01-01' AND SOH.OrderDate < '2012-01-01'\n    GROUP\
  \ BY FirstName, LastName)\nSELECT FirstName, LastName, TotalSales,\n       -1000\
  \ * NTILE(4) OVER(ORDER BY TotalSales DESC) + 5000 AS Bonus\nFROM Sales;\n清单 2-14\n\
  使用代数让三个人获得最高奖金\n```\n\n图 2-13 显示了结果。通过按相反方向排序，然后将 `NTILE` 的结果乘以 -1000 再加 5000，就有三个人获得了最高奖金。\n\
  \n![../images/335106_2_En_2_Chapter/335106_2_En_2_Fig13_HTML.jpg](img/335106_2_En_2_Fig13_HTML.jpg)\n\
  \n图 2-13：让三个人获得最高奖金时的结果\n\n我还听说一些公司使用 `NTILE` 来划分比赛结果或捐赠者群体。虽然不常用，但如果你有适用场景，请记住它。\n\
  \n## 总结\n\n排名函数 `ROW_NUMBER`、`RANK`、`DENSE_RANK` 和 `NTILE` 是所有窗口函数中最基础的。排名函数为结果的每一行添加一个编号。`OVER`\
  \ 子句中的 `ORDER BY` 表达式是必需的，并且根据具体情况，你可能还需要添加 `PARTITION BY`。这些函数本身通常不是最终解决方案，但常常构成更复杂解决方案的基础。\n\
  \n当面对一个棘手的查询时，你可能想添加一个行号来查找行之间的模式或关系。然后利用这些模式和关系来找出解决方案。在第 9 章和第 10 章中，你将看到排名函数被用来解决更多查询问题。\n\
  \n第 3 章将介绍窗口聚合，它允许你在查询中添加像 `SUM` 或 `Avg` 这样的函数，而无需将查询转变为聚合查询。你将不需要 `GROUP BY`，也不会丢失任何明细数据。\n\
  \n"
- '# 3. 使用窗口聚合进行汇总


  2005 年，微软为 T-SQL 引入了另一种类型的窗口函数：窗口聚合。通过在聚合函数上添加一个 `OVER` 子句，你可以避免通常必须遵守的规则。在编写聚合查询时，你会丢失那些未包含在
  `GROUP BY` 子句中的明细数据。从 SQL Server 2005 开始，你可以通过添加 `OVER` 子句来消除这一限制。通过添加 `OVER`，你也可以省略
  `GROUP BY` 和 `HAVING` 子句。你还可以将窗口聚合函数添加到聚合查询中，以返回不同聚合级别的汇总值。


  在本章中，你将学习如何通过窗口函数将聚合函数添加到非聚合查询中。你还将学习通过 OVER 子句将窗口聚合函数添加到聚合查询中，但实现不同级别的聚合。在本章的最后，我们将一起看一些实际问题。


  ## 使用窗口聚合


  窗口聚合就是你日常使用的那些常用聚合函数，比如 `SUM` 和 `AVG`，只不过加上了 `OVER` 子句。到目前为止，你已经见过 `OVER` 子句与 `LAG`
  和排名函数一起使用。在那些情况下，`ORDER BY` 组件是必需的。但 SQL Server 2005 的窗口聚合功能**不支持** `ORDER BY` 组件。第
  4 章将介绍一个 2012 年的增强功能，该功能确实使用 `ORDER BY`，但你必须先了解 2005 年的这个功能。


  虽然窗口聚合的 `OVER` 子句中不支持 `ORDER BY` 组件，但所有窗口函数都支持 `PARTITION BY`，窗口聚合也不例外。如果省略 `PARTITION
  BY`，你将得到一个空的 `OVER` 子句，该函数将应用于整个结果集，例如，计算总计或整体平均值。如果包含 `PARTITION BY`，则函数将应用于各个分区，例如，计算小计。语法如下：

  ```

  () OVER([PARTITION BY [,,...])

  ```


  可以作为窗口聚合使用的内置聚合函数列于表 3-1。


  表 3-1

  窗口聚合函数列表


  | 聚合函数 | 定义 |

  | --- | --- |

  | AVG | 计算组的平均值。 |

  | CHECKSUM_AGG | 计算组的校验和。常用于检测数据变化。 |

  | COUNT | 用于获取行数或列的非空值计数。 |

  | COUNT_BIG | 功能类似 COUNT，但返回一个大整数。 |

  | MAX | 返回集合中的最大值。 |

  | MIN | 返回集合中的最小值。 |

  | STDEV | 计算组的标准差。 |

  | STDEVP | 计算组中总体的标准差。 |

  | SUM | 对组中的值进行求和。 |

  | VAR | 返回组的统计方差。 |

  | VARP | 返回组中总体的统计方差。 |


  如果你查看 SQL Server 2019 支持的聚合函数，会发现有三个函数未包含在此列表中：`GROUPING`、`GROUPING_ID` 和 `APPROX_COUNT_DISTINCT`。当使用更高级的
  `GROUP BY` 选项（如 `ROLLUP`）时，`GROUPING` 和 `GROUPING_ID` 用于标识分组级别。`APPROX_COUNT_DISTINCT`
  是 SQL Server 2019 的新函数。对于大型数据集，当近似值足够好时，可以使用此新函数代替 `COUNT(DISTINCT)`。`COUNT(DISTINCT)`
  不能用作窗口函数，因此 `APPROX_COUNT_DISTINCT` 同样不被允许也是合理的。


  本章示例将重点介绍常用函数 `AVG`、`SUM`、`MIN`、`MAX` 和 `COUNT`。代码清单 3-1 展示了一些窗口聚合的示例。

  ```

  --3.1.1 窗口聚合示例

  SELECT CustomerID, SalesOrderID,

  CAST(MIN(OrderDate) OVER() AS DATE) AS FirstOrderDate,

  CAST(MAX(OrderDate) OVER() AS DATE) AS LastOrderDate,

  COUNT(*) OVER() OrderCount,

  FORMAT(SUM(TotalDue) OVER(),''C'') TotalAmount

  FROM Sales.SalesOrderHeader

  ORDER BY CustomerID, SalesOrderID;

  --3.1.2 使用 PARTITION BY

  SELECT CustomerID, SalesOrderID,

  CAST(MIN(OrderDate) OVER(PARTITION BY CustomerID) AS DATE)

  AS FirstOrderDate,

  CAST(MAX(OrderDate) OVER(PARTITION BY CustomerID) AS DATE)

  AS LastOrderDate,

  COUNT(*) OVER(PARTITION BY CustomerID) OrderCount,

  FORMAT(SUM(TotalDue) OVER(PARTITION BY CustomerID),''C'') AS TotalAmount

  FROM Sales.SalesOrderHeader

  ORDER BY CustomerID, SalesOrderID;

  ```

  代码清单 3-1

  使用窗口聚合


  图 3-1 显示了部分结果。关于这些示例，首先要注意的是两个查询中都没有 `GROUP BY` 子句。向原本非聚合的查询中添加窗口聚合表达式，并不会将该查询变为聚合查询。这些查询在显示每行详细信息的同时，也显示了汇总值。


  ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig1_HTML.jpg](img/335106_2_En_3_Fig1_HTML.jpg)

  图 3-1

  使用窗口聚合的部分结果


  查询 1 使用了空的 `OVER` 子句。这意味着计算是在整个结果集上进行的。`FirstOrderDate` 是数据中最早的 `OrderDate`，`LastOrderDate`
  是数据中最新的 `OrderDate`。`OrderCount` 是总计数，`TotalAmount` 是所有行的总金额。查询 2 在每个 `OVER` 子句中包含了对
  `CustomerID` 的 `PARTITION BY`。注意在结果中，查询 2 的值是针对每个客户特定的。


  在之前的例子中，每个查询内的 `OVER` 子句是相同的。你可以在同一个查询中使用不同的 `OVER` 子句。代码清单 3-2 在一个查询中有两个具有不同 `OVER`
  子句的窗口聚合函数。

  ```

  --3.2.1 使用不同的 OVER 子句

  SELECT CustomerID, SalesOrderID, FORMAT(TotalDue,''c'') AS TotalDue,

  FORMAT(SUM(TotalDue) OVER(PARTITION BY CustomerID),''c'') AS CustomerSales,

  FORMAT(SUM(TotalDue) OVER(),''c'') AS TotalSales

  FROM Sales.SalesOrderHeader

  WHERE OrderDate >= ''2013-01-01'' AND OrderDate < ''2014-01-01''

  ORDER BY CustomerID, SalesOrderID;

  ```

  代码清单 3-2

  使用不同的 OVER 子句


  图 3-2 显示了部分结果。此查询返回每个客户的总计和整体总计。


  ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig2_HTML.jpg](img/335106_2_En_3_Fig2_HTML.jpg)

  图 3-2

  使用不同 OVER 子句的部分结果


  在前面的例子中还注意到，有些窗口聚合函数嵌套在 `CAST` 或 `FORMAT` 函数内部。窗口函数也可以像常规聚合函数一样，在列、更复杂的表达式或子查询上操作。代码清单
  3-3 展示了一个例子。

  ```

  --3-3-1 在表达式中使用窗口函数

  SELECT CustomerID, SalesOrderID,

  CAST(OrderDate AS Date) AS OrderDate,

  MIN(SalesOrderID/CustomerID)

  OVER(PARTITION BY CustomerID) AS Expr1,

  CAST(MIN(DATEADD(d,1,OrderDate)) OVER() AS DATE) AS Expr2,

  AVG((SELECT COUNT(*)

  FROM Sales.SalesOrderDetail AS SOD

  WHERE SalesOrderID = SOH.SalesOrderID)) OVER() AS Expr3

  FROM Sales.SalesOrderHeader AS SOH;

  ```

  代码清单 3-3

  在表达式中使用窗口函数


  部分结果如图 3-3 所示。`Expr1` 是 `SalesOrderID` 除以 CustomerID 的商。`Expr2` 将 `DATEADD` 函数嵌套在
  `MIN` 函数内，而 `MIN` 函数又嵌套在 `CAST` 函数内。`Avg` 函数应用于一个子查询，并返回明细行的平均数量。


  ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig3_HTML.jpg](img/335106_2_En_3_Fig3_HTML.jpg)

  图 3-3

  嵌套函数的部分结果


  你可以看到，向任何非聚合查询中添加窗口聚合函数是很容易的。务必遵循数据类型规则；例如，不能对字符数据计算总和。你不会为此功能使用 `ORDER BY`，如果你希望将计算应用于划分成子集的行，则会使用
  `PARTITION BY` 表达式。


  窗口聚合的一个非常直观的用法是在聚合查询中使用它们。



  ## 将窗口聚合添加到聚合查询中


  当我第一次尝试将窗口聚合添加到聚合查询中时，它没有正常工作，这让我很惊讶，而错误信息则让我更加意外。清单 3-4 展示了一个例子。


  ```sql

  --3-4.1 将窗口聚合添加到聚合查询

  SELECT CustomerID, SUM(TotalDue) AS CustomerTotal,

  SUM(TotalDue) OVER() AS GrandTotal

  FROM Sales.SalesOrderHeader

  GROUP BY CustomerID;

  ```

  **清单 3-4**

  将窗口聚合添加到聚合查询


  图 3-4 显示了错误信息。


  ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig4_HTML.jpg](img/335106_2_En_3_Fig4_HTML.jpg)


  **图 3-4**

  将窗口聚合添加到聚合查询后产生的错误信息


  显然，`TotalDue` 列*被包含*在一个聚合表达式中，将其添加到 `GROUP BY` 子句中显然不是解决办法。要理解这里发生了什么，你必须思考窗口聚合所操作的窗口。窗口中的行集是在
  `GROUP BY` 操作之后创建的。该窗口包含 `GROUP BY` 子句中列出的任何表达式加上任何聚合表达式。窗口函数任何部分中包含的任何表达式都必须遵循与
  `SELECT` 列表相同的规则。这意味着将 `CustomerID` 作为窗口函数的参数或作为 `PARTITION BY` 列是没问题的，因为 `CustomerID`
  是 `GROUP BY` 的一部分。但要在窗口聚合表达式的任何角色中使用 `TotalDue`，必须先将其聚合。清单 3-5 展示了正确的解决方案。


  ```sql

  --3-5.1 如何将窗口聚合添加到聚合查询

  SELECT CustomerID, SUM(TotalDue) AS CustomerTotal,

  SUM(SUM(TotalDue)) OVER() AS GrandTotal

  FROM Sales.SalesOrderHeader

  GROUP BY CustomerID;

  ```

  **清单 3-5**

  如何将窗口聚合添加到聚合查询


  语法看起来可能有些奇怪，因为你不能嵌套聚合函数，但窗口函数必须应用于 `TotalDue` 的总和，而不仅仅是 `TotalDue` 本身。图 3-5 显示了部分结果，并证明了这是有效的。


  ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig5_HTML.jpg](img/335106_2_En_3_Fig5_HTML.jpg)


  **图 3-5**

  将窗口聚合添加到聚合查询后的部分结果


  另一种更直观的方法是将窗口聚合分离到一个 CTE（公用表表达式）中，或者使用其他方法来分离逻辑。清单 3-6 展示了如何做到这一点。


  ```sql

  --3.6.1 使用 CTE

  WITH SALES AS (

  SELECT CustomerID, SUM(TotalDue) AS CustomerTotal

  FROM Sales.SalesOrderHeader

  GROUP BY CustomerID)

  SELECT CustomerID, CustomerTotal,

  SUM(CustomerTotal) OVER() AS GrandTotal

  FROM Sales;

  ```

  **清单 3-6**

  使用 CTE 替代嵌套


  结果与图 3-5 相同。在 CTE 内部，查询按 `CustomerID` 分组。为每个客户计算总和 `CustomerTotal`。在外层查询中，窗口聚合被应用于
  `CustomerTotal`。窗口聚合仍然是应用于聚合表达式，但逻辑被分离开了，因此更容易理解。以这种方式编写查询除了增加清晰度之外，并没有其他优势。


  清单 3-7 有另一个有趣的例子，涉及 `GROUP BY` 子句中的多个表达式。


  ```sql

  --3-7.1 对多个分组依据应用窗口聚合

  SELECT YEAR(OrderDate) AS OrderYear,

  CustomerID, SUM(TotalDue) AS CustTotalForYear,

  SUM(SUM(TotalDue)) OVER(PARTITION BY CustomerID) AS CustomerTotal

  FROM Sales.SalesOrderHeader

  GROUP BY CustomerID, YEAR(OrderDate)

  ORDER BY CustomerID, OrderYear;

  ```

  **清单 3-7**

  向包含多个表达式的 GROUP BY 子句的查询添加窗口聚合


  部分结果显示在图 3-6 中。`GROUP BY` 子句列出了 `CustomerID` 列和 `YEAR(OrderDate)` 表达式。在应用窗口聚合之前，结果集包含每个客户每年的数据行。`CustTotalForYear`
  是一个常规的聚合表达式。最后一个表达式是一个窗口聚合，其 `PARTITION BY` 表达式基于 `CustomerID`，因此 `CustomerTotal`
  是该客户的总体小计。这个例子的重点是，你可以使用窗口聚合函数来返回不同聚合级别的值。


  ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig6_HTML.jpg](img/335106_2_En_3_Fig6_HTML.jpg)


  **图 3-6**

  在包含多个表达式的 GROUP BY 查询中使用窗口聚合


  在聚合查询内的窗口函数所操作的窗口中，行已经被过滤和分组。可供窗口函数使用的列列表受到 `GROUP BY` 子句的限制。这是默认的窗口；你可以对其进行分区，但不能包含窗口之外的任何内容。你可以缩小窗口范围，但不能扩大。你可以将
  `PARTITION BY` 表达式基于整个结果集（空的 `OVER` 子句）、按 `CustomerID` 或按 `YEAR(OrderYear)` 进行分区，而不会出错。你不会使用
  `CustomerID` 和 `YEAR(OrderYear)` 的组合，因为那与 `GROUP BY` 完全匹配。


  向聚合查询添加窗口聚合的规则适用于所有窗口函数。请始终牢记，`GROUP BY` 和 `HAVING` 子句首先执行。`FROM`、`WHERE`、`GROUP
  BY` 和 `HAVING` 子句的结果决定了基础窗口中的行、列及其粒度。在窗口函数任何位置使用的任何列都必须是 `GROUP BY` 列之一，或者在窗口函数内部进行了聚合。


  为避免混淆，首先在 CTE 中执行第一次聚合。然后，在外层查询中应用窗口函数。


  ## 使用窗口聚合解决常见查询


  将窗口聚合添加到复杂的非聚合查询中非常容易。而用其他方法实现同样的功能可能会使查询的规模加倍。


  ### 销售额占比问题


  这个特定的例子可以应用于许多情况。你可以使用窗口聚合来执行计算，例如百分比。清单 3-8 演示了如何在显示详细信息的同时显示销售额占比。


  ```sql

  --3-8.1 计算销售额占比

  SELECT P.ProductID,

  FORMAT(SUM(OrderQty * UnitPrice),''C'') AS ProductSales,

  FORMAT(SUM(SUM(OrderQty * UnitPrice)) OVER(),''C'') AS TotalSales,

  FORMAT(SUM(OrderQty * UnitPrice)/

  SUM(SUM(OrderQty * UnitPrice)) OVER(), ''P'') AS PercentOfSales

  FROM Sales.SalesOrderDetail AS SOD

  JOIN Production.Product AS P ON SOD.ProductID = P.ProductID

  JOIN Production.ProductSubcategory AS SUB ON P.ProductSubcategoryID

  = SUB.ProductSubcategoryID

  JOIN Production.ProductCategory AS CAT ON SUB.ProductCategoryID

  = CAT.ProductCategoryID

  WHERE CAT.Name = ''Bikes''

  GROUP BY P.ProductID

  ORDER BY PercentOfSales DESC;

  ```

  **清单 3-8**

  使用窗口函数显示销售额占比


  图 3-7 显示了部分结果。这是一个聚合查询，因此在窗口聚合内部任何角色中使用的列都必须是 `GROUP BY` 列或进行了聚合。空的 `OVER` 子句用于计算
  `TotalSales`。按 `ProductID` 计算的总和除以整个结果集的总销售额，并进行格式化，从而得出每种自行车型号的销售额占比。


