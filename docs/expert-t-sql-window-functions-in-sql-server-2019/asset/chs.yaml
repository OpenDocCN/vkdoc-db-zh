  ### 考勤卡问题


  此问题涉及员工每日上下班的考勤卡记录。目标是计算每位员工每个班次的工作时长。列表 6-6 包含了创建临时表并显示初始行的语句。


  ```sql

  --6-6.1 创建表

  DROP TABLE IF EXISTS #TimeCards;

  CREATE TABLE #TimeCards(

  TimeStampID INT NOT NULL IDENTITY PRIMARY KEY,

  EmployeeID INT NOT NULL,

  ClockDateTime DATETIME2(0) NOT NULL,

  EventType VARCHAR(5) NOT NULL);

  --6-6.2 插入数据

  INSERT INTO #TimeCards(EmployeeID,

  ClockDateTime, EventType)

  VALUES

  (1,''2019-01-02 08:00'',''ENTER''),

  (2,''2019-01-02 08:03'',''ENTER''),

  (2,''2019-01-02 12:00'',''EXIT''),

  (2,''2019-01-02 12:34'',''Enter''),

  (3,''2019-01-02 16:30'',''ENTER''),

  (2,''2019-01-02 16:00'',''EXIT''),

  (1,''2019-01-02 16:07'',''EXIT''),

  (3,''2019-01-03 01:00'',''EXIT''),

  (2,''2019-01-03 08:10'',''ENTER''),

  (1,''2019-01-03 08:15'',''ENTER''),

  (2,''2019-01-03 12:17'',''EXIT''),

  (3,''2019-01-03 16:00'',''ENTER''),

  (1,''2019-01-03 15:59'',''EXIT''),

  (3,''2019-01-04 01:00'',''EXIT'');

  --6-6.2 显示行

  SELECT TimeStampID, EmployeeID, ClockDateTime, EventType

  FROM #TimeCards;

  ```


  列表 6-6: 创建并填充 `#TimeCard` 表


  图 6-6 展示了此问题的行数据。请注意，每一个 `ENTER` 行都有一个匹配的 `EXIT` 行。


  ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig6_HTML.jpg](img/335106_2_En_6_Fig6_HTML.jpg)


  图 6-6: 考勤卡行数据


  使用 `LEAD` 函数可以轻松解决此问题。列表 6-7 展示了解决方案。


  ```sql

  WITH Level1 AS (

  SELECT EmployeeID, EventType, ClockDateTime,

  LEAD(ClockDateTime) OVER(PARTITION BY EmployeeID ORDER BY ClockDateTime)

  AS NextDateTime

  FROM #TimeCards

  ),

  Level2 AS (

  SELECT EmployeeID, CAST(ClockDateTime AS DATE) AS WorkDate,

  SUM(DATEDIFF(second, ClockDateTime,NextDateTime)) AS Seconds

  FROM Level1

  WHERE EventType = ''Enter''

  GROUP BY EmployeeID, CAST(ClockDateTime AS DATE))

  SELECT EmployeeID, WorkDate,

  TIMEFROMPARTS(Seconds / 3600, Seconds % 3600 / 60,

  Seconds % 3600 % 60, 0, 0) AS HoursWorked

  FROM Level2

  ORDER BY EmployeeID, WorkDate;

  ```


  列表 6-7: 考勤卡问题的解决方案


  该解决方案被拆分开以便于理解。第一个公共表表达式 `Level1` 使用 `LEAD` 函数来查找下一行的 `ClockDateTime`。计算了两行之间的时间差（秒数），并排除了
  `Exit` 行。在该层级也对秒数进行了汇总，以防员工有午休打卡的情况。主查询使用 `TIMEFROMPARTS` 函数将秒数转换为“小时:分钟”格式。图 6-7
  展示了结果。


  ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig7_HTML.jpg](img/335106_2_En_6_Fig7_HTML.jpg)


  图 6-7: 考勤卡问题的结果


  ## 小结


  自 SQL Server 2012 起可用的偏移函数 `LAG`、`LEAD`、`FIRST_VALUE` 和 `LAST_VALUE` 功能非常强大。它们不仅使编写从不同行提取值的查询变得容易，而且性能也非常出色，你将在第
  8 章亲身体会到。


  还有一组函数需要学习，即统计函数。第 7 章将教你掌握利用这些窗口函数所需的知识。


  '
- "# 7. 理解统计函数\n\n2012 年，微软为 SQL Server 新增了四个窗口函数。它们是统计函数 `PERCENT_RANK`、`CUME_DIST`、`PERCENTILE_CONT`\
  \ 和 `PERCENTILE_DISC`。这些函数使得分析来自科学、学术或体育等众多领域的数据变得容易。\n\n在本章中，你将学习如何使用这些统计函数。\n\n\
  ## 使用 PERCENT_RANK 和 CUME_DIST\n\n还记得你在学校参加的那些标准化考试吗？你可能会得到每个测试领域（如数学或语言技能）的原始分数和百分比。百分比排名是一种计算群体中每个个体与其他人相比情况的方法。\n\
  \n从 SQL Server 2012 开始，有两个函数可以对数据（如考试成绩，甚至身高）进行排名。假设有 100 名七年级学生按身高排队。我的孙子托马斯是个相当高的男孩，所以他可能会站在第\
  \ 95 位。他比其他 94 名学生都高。他的身高高于 94% 的身高，并且高于或等于 95% 的身高。托马斯身高的 `PERCENT_RANK` 是 0.9494，`CUME_DIST`（累积分布）是\
  \ 0.95。\n\n你可能会疑惑为什么 `PERCENT_RANK` 是 0.9494 而不是 0.94。`PERCENT_RANK` 的公式是：（排名值 -\
  \ 1）除以（总数 - 1）：`(rank-1)/(N-1)`。`CUME_DIST` 的公式是：排名值除以总数：`rank/N`。托马斯身高的 `PERCENT_RANK`\
  \ 可以通过 94 除以 99 得到，而不是 94 除以 100。\n\n就像所有其他窗口函数一样，使用这些函数时需要 `OVER` 子句。它必须包含一个 `ORDER\
  \ BY` 表达式，用于确定分数或值的排列顺序。`PARTITION BY` 表达式是可选的。如果使用，则比较将在分区内进行，而不是跨分区。语法如下：\n\n\
  ```sql\nPERCENT_RANK OVER([PARTITION BY <partition_column>] ORDER BY <order_column>)\n\
  CUME_DIST OVER([PARTITION BY <partition_column>] ORDER BY <order_column>)\n```\n\
  \n列表 7-1 演示了如何使用这些函数来比较给定年份中每个月的销售额。\n\n```sql\n--7-1.1 使用 PERCENT_RANK 和 CUME_DIST\n\
  SELECT COUNT(*) NumberOfOrders, Month(OrderDate) AS OrderMonth,\nRANK() OVER(ORDER\
  \ BY COUNT(*)) AS Ranking,\nPERCENT_RANK() OVER(ORDER BY COUNT(*)) AS PercentRank,\n\
  CUME_DIST() OVER(ORDER BY COUNT(*)) AS CumeDist\nFROM Sales.SalesOrderHeader\nWHERE\
  \ OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01'\nGROUP BY  Month(OrderDate);\n\
  ```\n\n列表 7-1: 使用 PERCENT_RANK 和 CUME_DIST\n\n图 7-1 展示了结果。该查询经过筛选，仅包含 2013 年的订单，并按月份分组。每个函数的\
  \ `ORDER BY` 表达式都是订单数量。回想一下，当你在聚合查询中使用窗口函数时，函数中使用的任何列都必须遵循 `SELECT` 列表的规则。有关在聚合查询中添加窗口函数的更多信息，请参见第\
  \ 3 章。第一行的 `PercentRank` 是 0。第一行的 `PercentRank` 值始终为 0，因为该行未排在任何其他行之上。最后一行的 `PercentRank`\
  \ 和 `CumeDist` 都将是 1，即 100%。除最后一行外的所有行中，`CumeDist` 都大于 `PercentRank`。请注意，当出现并列情况时（如第\
  \ 3 和第 4 行），值会重复。\n\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig1_HTML.jpg](img/335106_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1: 使用 PERCENT_RANK 和 CUME_DIST 的结果\n\n这是另一个比较我居住的圣路易斯大都会区月平均最高气温的例子。运行列表 7-2\
  \ 以创建并填充表格。\n\n```sql\n--7-2.1 创建表\nCREATE TABLE #MonthlyTempsStl(MNo Int, MName\
  \ varchar(15), AvgHighTempF INT, AvgHighTempC DECIMAL(4,2));\n--7-2.2 插入华氏温度行\n\
  INSERT INTO #MonthlyTempsStl (Mno, Mname, AvgHighTempF)\nVALUES(1,'Jan',40),(2,'Feb',45),(3,'Mar',55),(4,'Apr',67),(5,'May',77),(6,'Jun',85),\n\
  (7,'Jul',89),(8,'Aug',88),(9,'Sep',81),(10,'Oct',69),(11,'Nov',56),(12,'Dec',43);\n\
  --7-2.3 计算摄氏温度\nUPDATE #MonthlyTempsStl\nSET AvgHighTempC = (AvgHighTempF - 32)\
  \ * 5.0/9;\n--7-2.4 返回结果\nSELECT * FROM #MonthlyTempsStl;\n```\n\n列表 7-2: 圣路易斯平均最高气温\n\
  \n\n\n图 7-2 展示了表中的行。\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig2_HTML.jpg](img/335106_2_En_7_Fig2_HTML.jpg)\n\
  图 7-2 平均月最高温度\n\n清单 7-3 返回了温度的百分比排名和累积分布。\n```\n--7-3.1 对温度进行排名\nSELECT MName, AvgHighTempF,\
  \ AvgHighTempC,\nPERCENT_RANK() OVER(ORDER BY AvgHighTempF) * 100.0 AS PR,\nCUME_DIST()\
  \ OVER(ORDER BY AvgHighTempF) * 100.0 AS CD\nFROM #MonthlyTempsStl;\n```\n清单 7-3\
  \ 对温度进行排名\n\n图 7-3 展示了结果。一月是最冷的月份，而七月是最热的。就像第一个例子一样，百分比排名和累积分布在七月都达到了 100。\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig3_HTML.jpg](img/335106_2_En_7_Fig3_HTML.jpg)\n\
  图 7-3 排名后的温度\n\n## 使用 PERCENTILE_CONT 和 PERCENTILE_DISC\n\n你已经了解了如何使用 `PERCENT_RANK()`\
  \ 和 `CUME_DIST()` 对一系列值进行排名和比较。另外两个统计函数 `PERCENTILE_CONT()`（百分位连续值）和 `PERCENTILE_DISC()`（百分位离散值）则执行相反的任务。给定一个百分比排名，这些函数会找到该位置的值。这两个函数的区别在于，`PERCENTILE_CONT()`\
  \ 会在数据集上插值计算出一个值，而 `PERCENTILE_DISC()` 会从数据集中返回一个精确的值。\n\n一个非常常见的需求是找到一组值的中位数或中间值。你可以通过使用\
  \ `PERCENTILE_CONT()` 并指定希望找到 50% 位置的值来完成此任务。\n\n这些函数的语法与其他窗口函数也略有不同。你仍然需要提供一个 `OVER`\
  \ 子句，但在 `OVER` 子句内部，你只需在需要时指定 `PARTITION BY` 表达式。\n\n`ORDER BY` 不再放在 `OVER` 子句中，而是放在一个名为\
  \ `WITHIN GROUP` 的新子句中。`WITHIN GROUP` 子句必须返回一个数字列表。回想一下，其他函数的 `OVER` 子句中的 `ORDER\
  \ BY` 是用来对行进行排序的，但在这里，`WITHIN GROUP` 表达式才是要操作的数字列表。`ORDER BY` 必须只包含一个表达式，并且计算结果为数值类型，如\
  \ `INT` 或 `DECIMAL`。\n\n语法如下：\n```\nPERCENTILE_CONT() WITHIN GROUP(ORDER BY )\n\
  OVER([PARTITION BY ])\nPERCENTILE_DISC() WITHIN GROUP(ORDER BY )\nOVER([PARTITION\
  \ BY ])\n```\n\n对于上一节图 7-1 中所示的结果，中位数是多少？由于返回的是偶数行，中位数是 719 和 1740 的平均值，即 1229.5。清单\
  \ 7-4 演示了如何使用 `PERCENTILE_CONT()` 计算中位数。同时也展示了 `PERCENTILE_DISC()`，但由于行数是偶数，它返回的不是中位数。结果会在每一行上返回；如果你只想看到答案，请使用\
  \ `DISTINCT`。\n```\n--7-4.1 查找集合的中位数\nSELECT COUNT(*) NumberOfOrders, Month(OrderDate)\
  \ AS orderMonth,\nPERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY COUNT(*))\nOVER() AS\
  \ TheMedian,\nPERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY COUNT(*))\nOVER() AS PercentileDisc\n\
  FROM Sales.SalesOrderHeader\nWHERE OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01'\n\
  GROUP BY Month(OrderDate);\n```\n清单 7-4 使用 PERCENTILE_CONT 查找中位数\n\n结果如图 7-4 所示。查询\
  \ 1 显示了全年的计数和月份，以及 `TheMedian` 和 `PercentileDisc`。由于集合中每一行的答案都相同，所以这些值在每一行上都是一样的。查询\
  \ 2 去掉了计数和月份，并使用了 `DISTINCT`，因此只返回答案。请注意，`PERCENTILE_CONT()` 通过对两个中间值取平均值来进行插值计算，从而得出真正的中位数。然而，`PERCENTILE_DISC()`\
  \ 返回的值是 719。这是集合中的一个实际值。如果值的数量是偶数，那么当要计算的百分位为 0.5 时，此函数将返回最接近中位数的第一个值。\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig4_HTML.jpg](img/335106_2_En_7_Fig4_HTML.jpg)\n\
  图 7-4 查找中位数\n\n当行数为奇数时，在这种情况下，这两个函数将返回相同的值。清单 7-5 通过过滤掉一个月来展示当行数为奇数时会发生什么。\n```\n\
  --7-5.1 过滤掉一月份\nSELECT  DISTINCT PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY COUNT(*))\n\
  OVER() AS TheMedian,\nPERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY COUNT(*))\nOVER()\
  \ AS PercentileDisc\nFROM Sales.SalesOrderHeader\nWHERE OrderDate >= '2013-02-01'\
  \ AND OrderDate < '2014-01-01'\nGROUP BY Month(OrderDate);\n```\n清单 7-5 在行数为奇数时查找中位数\n\
  \n图 7-5 展示了结果。在这种情况下，由于行数是奇数，两个函数返回相同的值。\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig5_HTML.jpg](img/335106_2_En_7_Fig5_HTML.jpg)\n\
  图 7-5 行数为奇数时，两个函数返回相同的值\n\n虽然寻找中位数是这些函数一个有趣的应用，但你也可以用它们来查找任何其他百分比排名位置的值。一个有用的应用是返回前\
  \ 25% 位置的值。清单 7-6 创建并填充了一个包含学生成绩的 `#scores` 表，并返回了在前 25% 位置找到的分数。\n```\n--7-6.1\
  \ 设置表\nCREATE TABLE #scores(StudentID INT IDENTITY, Score DECIMAL(5,2));\n--7-6.2\n\
  --使用 Itzik 风格的数字表插入分数\nWITH lv0 AS (SELECT 0 g UNION ALL SELECT 0)\n,lv1 AS (SELECT\
  \ 0 g FROM lv0 a CROSS JOIN lv0 b)\n,lv2 AS (SELECT 0 g FROM lv1 a CROSS JOIN lv1\
  \ b)\n,lv3 AS (SELECT 0 g FROM lv2 a CROSS JOIN lv2 b)\n,lv4 AS (SELECT 0 g FROM\
  \ lv3 a CROSS JOIN lv3 b)\n,Tally (n) AS (SELECT ROW_NUMBER() OVER (ORDER BY (SELECT\
  \ NULL))\nFROM lv4)\nINSERT INTO #scores(Score)\nSELECT TOP(1000) CAST(RAND(CHECKSUM(NEWID()))\
  \ * 100 as DECIMAL(5,2)) AS Score\nFROM Tally;\n--7-6.3 返回前 25% 位置的分数\nSELECT DISTINCT\
  \ PERCENTILE_DISC(.25) WITHIN GROUP\n(ORDER BY Score DESC) OVER() AS Top25\nFROM\
  \ #scores;\n```\n清单 7-6 查找前 25% 位置的分数\n\n图 7-6 展示了结果。当然，你的结果会有所不同，因为分数是随机生成的。在设置好变量和表之后，插入了\
  \ 1,000 行带有随机值的记录。查询 3 通过使用 `PERCENTILE_DISC()` 0.25 并按分数降序排序，返回了前 25% 位置的分数。\n\
  ![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig6_HTML.jpg](img/335106_2_En_7_Fig6_HTML.jpg)\n\
  图 7-6 前 25% 位置的分数\n\n\n## 比较统计函数与旧方法\n\n函数 `PERCENT_RANK` 和 `CUME_DIST` 主要提供了一种便利性，而非像你在第\
  \ 6 章学到的偏移函数那样的惊人突破。通过在一个简单计算中使用 `RANK` 函数，你也可以得出相同的答案。公式如下：\n\n```\nPERCENT_RANK\
  \ = (排名 – 1)/(N – 1)\nCUME_DIST = 排名/N\n```\n\n代码清单 7-7 演示了如何使用 SQL Server 2005\
  \ 的功能得到与代码清单 7-1 相同的结果。\n\n```\n--7-7.1 使用 2005 功能\nSELECT COUNT(*) NumberOfOrders,\
  \ Month(OrderDate) AS OrderMonth,\n((RANK() OVER(ORDER BY COUNT(*)) -1) * 1.0)/(COUNT(*)\
  \ OVER() -1)\nAS PercentRank,\n(RANK() OVER(ORDER BY COUNT(*)) * 1.0)/COUNT(*) OVER()\n\
  AS CumeDist\nFROM Sales.SalesOrderHeader\nWHERE OrderDate >= '2013-01-01' AND OrderDate\
  \ < '2014-01-01'\nGROUP BY  Month(OrderDate);\n代码清单 7-7\n使用 SQL Server 2005 功能获得相同结果\n\
  ```\n\n图 7-7 展示了结果。除了零被填充到 12 位之外，结果看起来是一样的。在此示例中，使用了窗口聚合函数 `COUNT(*) OVER` 来计算分区中的行数。对于\
  \ `PercentRank`，在相除之前，排名和计数都减去了 1。\n\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig7_HTML.jpg](img/335106_2_En_7_Fig7_HTML.jpg)\n\
  图 7-7\n使用旧方法计算百分比的结果\n\n对于 `PERCENTILE_CONT` 和 `PERCENTILE_DISC` 函数，是否可以使用旧方法呢？`PERCENTILE_DISC`\
  \ 并不困难，因为它总是返回集合中的一个实际值。代码清单 7-8 展示了如何仅使用 2005 功能来计算 `PERCENTILE_DISC`。\n\n```\n\
  --7-8.1 PERCENTILE_DISC\nWITH Level1 AS (\nSELECT DISTINCT Month(OrderDate) AS OrderMonth,\
  \ \nCOUNT(*) AS NumberOfOrders,\nPERCENT_RANK() OVER(ORDER BY COUNT(*)) AS PercentRank\n\
  FROM Sales.SalesOrderHeader\nWHERE OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01'\n\
  GROUP BY  Month(OrderDate))\nSELECT TOP(1) NumberOfOrders AS PercentileDisc\nFROM\
  \ Level1\nWHERE Level1.PercentRank <= 0.75\nORDER BY Level1.PercentRank DESC;\n\
  代码清单 7-8\n仅使用 SQL Server 2005 功能计算 PERCENTILE_DISC\n```\n\n图 7-8 展示了结果。查询 1 使用了新功能，以便与旧方法进行比较。查询\
  \ 2 将计算百分比排名的查询移动到一个名为 `Level1` 的 CTE 中。在外层查询中，返回了一行百分比排名等于或小于 0.75 的数据。\n\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig8_HTML.jpg](img/335106_2_En_7_Fig8_HTML.jpg)\n\
  图 7-8\n使用旧方法计算 PERCENTILE_DISC 的结果\n\n对 `PERCENTILE_CONT` 实现相同的目的则更为棘手，但仍可实现。在这种情况下，当确切行不可用时，会使用给定百分比排名之上和之下的一个值来计算一个值。尝试找到中位数时，你只需对两行取平均值，但在尝试找到任何其他百分比排名时则不然。代码清单\
  \ 7-9 展示了解决方案。\n\n```\n--7-9.1 PERCENTILE_CONT\nWITH Level1 AS (\nSELECT DISTINCT\
  \ Month(OrderDate) AS OrderMonth, \nCOUNT(*) AS NumberOfOrders,\nPERCENTILE_CONT(0.75)\
  \ WITHIN GROUP (ORDER BY COUNT(*)) OVER() AS PercentCont,\nPERCENT_RANK() OVER(ORDER\
  \ BY COUNT(*)) AS PercentRank,\nROW_NUMBER() OVER(ORDER BY COUNT(*)) AS RowNum,\n\
  0.75 * (COUNT(*) OVER() - 1) + 1 AS TheRow\nFROM Sales.SalesOrderHeader\nWHERE OrderDate\
  \ >= '2013-01-01' AND OrderDate < '2014-01-01'\nGROUP BY Month(OrderDate)),\nLevel2\
  \ AS (\nSELECT RowNum, NumberOfOrders,\nFLOOR(TheRow) AS TheBottomRow,\nCEILING(TheRow)\
  \ AS TheTopRow,\nTheRow\nFROM Level1 ),\nLevel3 AS (\nSELECT SUM(CASE WHEN RowNum\
  \ = TheBottomRow THEN NumberOfOrders END) AS BottomValue,\nSUM(CASE WHEN RowNum\
  \ = TheTopRow THEN NumberOfOrders END) AS TopValue,\nMAX(TheRow % Level2.TheBottomRow)\
  \ AS Diff\nFROM Level2)\nSELECT Level3.BottomValue +\n(Level3.TopValue - Level3.BottomValue)\
  \ * Diff\nFROM Level3;\n代码清单 7-9\n使用 SQL Server 2005 功能查找 PERCENTILE_CONT\n```\n\
  \n图 7-9 展示了结果。查询 1 使用了 `PERCENTILE_CONT` 函数，以便与旧方法进行比较。`Level1` CTE 包含一个查询，列出了每个月的行号和订单计数。它还计算出如果列表中存在确切值，哪一行会包含该值，即\
  \ `TheRow`。在此例中，该行是 9.25。在 `Level2` 中，使用 `FLOOR` 函数找到 `TheRow` 之下的一行(9)，使用 `CEILING`\
  \ 函数找到 `TheRow` 之上的一行(10)。在 `Level3` 中，找到了两行的值以及一个乘数 MP。MP 是 `TheRow` 的小数部分(0.25)。代码通过执行取模运算(9.25\
  \ % 9)找到它。外层查询将两行之间的差值乘以 MP 后，加到底行的值上。呼！\n\n![../images/335106_2_En_7_Chapter/335106_2_En_7_Fig9_HTML.jpg](img/335106_2_En_7_Fig9_HTML.jpg)\n\
  图 7-9\n将 PERCENTILE_CONT 与旧方法进行比较\n\n## 小结\n\n既然你已经见识了统计函数 `PERCENT_RANK`、`CUME_DIST`、`PERCENTILE_DISC`\
  \ 和 `PERCENTILE_CONT`，那么你已使用了 SQL Server 2012 至 2019 版可用的所有窗口函数。在第 8 章中，你将学习使用所有窗口函数时的性能考量。\n\
  \n"
- '# 8. 为获得更佳性能进行调优


  微软一直宣传窗口函数比旧技术具有更好的性能。在许多情况下，这是事实，但在我看来，最大的优势是这些函数让解决棘手的查询变得更容易。在某些情况下，它们替代了游标、临时表和三角连接。甚至在考虑性能之前，它们就是非常强大的工具。


  然而，在使用窗口函数时，为了确保查询运行得尽可能快，有些事情你需要了解。自 2012 年以来，微软没有添加任何新功能，但在最近的版本中，它对查询处理进行了一些更改，这些更改直接影响窗口函数的性能。


  在本章中，你将学习在执行计划中需要关注什么，瓶颈在哪里，以及如何创建索引来帮助任何使用窗口函数的查询。你还将学习窗口函数与使用旧方法相比如何，以及何时使用旧方法可能是个好主意。


  ## 使用执行计划


  图形化执行计划让 T-SQL 查询的调优变得更加容易。您可以比较多个查询的性能，并寻找查询内部的瓶颈。如果您对图形化执行计划还不熟悉，可以阅读 Grant Fritchey
  所著的*《SQL Server 2017 查询性能调优》*（Apress，2018），或者直接跟随本文了解您能学到什么。


  多年来，数据库专业人员一直使用 SQL Server Management Studio (`SSMS`) 来运行查询。自本书第一版以来，微软不仅更新了图形化执行计划中使用的图标，最近还引入了一个新的跨平台工具——Azure
  Data Studio (`ADS`)，其执行计划的外观有所不同。要看到差异，可以在 `SSMS` 和 `ADS` 中分别运行清单 8-1 中的简单查询。在 `SSMS`
  中运行查询前，请务必键入 `CTRL + M` 以开启执行计划。在 `ADS` 中，运行查询后只需点击 `Explain` 即可。


  ```

  --8-1.1 一个简单查询

  SELECT *

  FROM HumanResources.Employee;

  清单 8-1

  要运行的简单查询

  ```


  图 8-1 展示了这两个执行计划。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig1_HTML.jpg](img/335106_2_En_8_Fig1_HTML.jpg)

  图 8-1：来自 `SSMS` 和 `ADS` 的图形化执行计划


  本章将展示由 `SSMS` 18 版本生成的执行计划。要跟随操作，请确保本章所有示例都切换开启了实际执行计划。


  有一个专门用于窗口函数的执行操作符；它是 `Sequence Project (Compute Scalar)` 操作符，如图 8-2 所示。这个操作符无需担心。它只是意味着计算所需的列已被添加到结果中。您会在包含某些窗口函数的查询执行计划中看到它，但并非所有情况都会出现。要查看该计划，请运行清单
  8-2。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig2_HTML.jpg](img/335106_2_En_8_Fig2_HTML.jpg)

  图 8-2：包含 `Sequence Project (Compute Scalar)` 操作符的执行计划


  ```

  --8-2.1 生成 Sequence Project (Compute Scalar) 操作符的查询

  SELECT CustomerID, ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

  FROM Sales.SalesOrderHeader;

  清单 8-2

  查看 Sequence Project 操作符 (Compute Scalar)

  ```


  另一个在窗口函数查询中常见的操作符是 `Segment` 操作符，同样显示在图 8-2 中 `Sequence Project (Compute Scalar)`
  操作符的右侧。`Segment` 操作符将输入划分为段或组。如果没有 `PARTITION BY` 表达式，那么段将是整个结果集。否则，段将根据 `PARTITION
  BY` 表达式进行划分。通过打开 `Segment` 操作符的属性，您会看到 `Group By` 属性是空白的。图 8-3 展示了这一点。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig3_HTML.jpg](img/335106_2_En_8_Fig3_HTML.jpg)

  图 8-3：`Segment` 操作符的 `Group By` 属性


  如果您通过添加 `PARTITION BY` 来修改查询，如清单 8-3 所示，`Group By` 属性就会显示 `PARTITION BY` 的列。


  ```

  --8-3.1 添加 PARTITION BY

  SELECT CustomerID,

  ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RowNumber

  FROM Sales.SalesOrderHeader;

  清单 8-3

  添加 PARTITION BY

  ```


  图 8-4 显示了属性如何变化。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig4_HTML.jpg](img/335106_2_En_8_Fig4_HTML.jpg)

  图 8-4：添加分区后的 `Group By` 属性


  在调优查询时，`Sequence Project (Compute Scalar)` 和 `Segment` 操作符无需担心。需要注意且您可以采取措施的操作符是
  `Sort` 操作符，如图 8-5 所示。`Sort` 操作符出现在多种查询中，并且常常是窗口函数查询中的瓶颈。要查看该计划，请运行清单 8-4。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig5_HTML.jpg](img/335106_2_En_8_Fig5_HTML.jpg)

  图 8-5：包含 `Sort` 操作符的执行计划


  ```

  --8-4.1 展示 Sort 操作符的查询

  SELECT CustomerID, SalesOrderID,

  ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate) AS RowNumber

  FROM Sales.SalesOrderHeader;

  清单 8-4

  包含 Sort 操作符的查询

  ```


  请注意，即使执行了聚集索引扫描，`Sort` 操作符也占用了运行该查询所用资源的 80%。本章稍后将介绍如何创建索引以在许多情况下消除 `Sort`。


  还有两个操作符需要注意。看一下图 8-6 中的 `Table Spool` 操作符。运行清单 8-5 来亲自生成该计划。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig6_HTML.jpg](img/335106_2_En_8_Fig6_HTML.jpg)

  图 8-6：包含 `Table Spool` 操作符的执行计划


  ```

  --8-5.1 包含 Table Spool 操作符的查询

  SELECT CustomerID, SalesOrderID, SUM(TotalDue)

  OVER(PARTITION BY CustomerID) AS SubTotal

  FROM Sales.SalesOrderHeader;

  清单 8-5

  包含 Table Spool 操作符的查询

  ```


  `Table Spool` 操作符意味着在 `tempdb` 中创建了一个工作表来帮助解决查询。您会在窗口聚合和一些其他窗口函数中看到 `Table Spool`
  操作符。这个工作表会消耗大量资源，包括锁，但如果您使用的是 SQL Server 2019，则有个好消息，本章稍后会介绍。


  另一个需要注意的操作符是 `Window Spool` 操作符，它与之类似，但*有时*会在内存中创建工作表。运行清单 8-6 以查看图 8-7 所示的计划。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig7_HTML.jpg](img/335106_2_En_8_Fig7_HTML.jpg)

  图 8-7：包含 `Window Spool` 操作符的计划


  ```

  --8-6.1 包含窗口假脱机操作符的查询

  SELECT CustomerID, SalesOrderID, TotalDue,

  SUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID) AS RunningTotal

  FROM Sales.SalesOrderHeader;

  清单 8-6

  包含 Window Spool 操作符的查询

  ```


  `Window Spool` 操作符理论上意味着工作表在内存中创建，但在某些情况下，它会在 `tempdb` 中创建。区别将在本章后面介绍。与 `Table Spool`
  操作符一样，此操作符在 2019 版本中也有一些性能改进。


  ## 使用 STATISTICS IO


  另一个理解查询性能的实用工具是 `STATISTICS IO`。该设置将提供运行查询时所读取页面的信息。其优点在于，无论服务器上是否有其他查询在运行，或者数据是否已在缓存中，结果都是一致的。如果缓存是“热的”，即所需数据已在内存中，查询通常会运行得更快，你可能会误以为是自己做了优化。只要查询、索引、数据或设置没有改变，返回的逻辑读数（读取的数据页数量）将保持一致。这使其成为比较两个查询或判断新索引是否有效的绝佳工具。我喜欢同时使用执行计划和
  `STATISTICS IO` 来确保我理解正在发生的情况。


  运行清单 8-7 来查看上一节中的查询如何比较。虽然这些查询产生的结果不同，但从性能角度观察它们之间的差异仍然很有趣。请注意，数据库兼容性模式已设置为 2014
  版本。


  ```

  --8-7.0 设置

  USE [master];

  GO

  --根据需要更改数据库名称

  ALTER DATABASE [AdventureWorks]

  SET COMPATIBILITY_LEVEL = 120;

  GO

  USE [AdventureWorks];

  SET STATISTICS IO ON;

  SET NOCOUNT ON;

  GO

  --8-7.1 产生序列项目的查询

  PRINT ''8-7.1'';

  SELECT CustomerID, ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

  FROM Sales.SalesOrderHeader;

  --8-7.2 显示排序运算符的查询

  PRINT ''8-7.2'';

  SELECT CustomerID, SalesOrderID,

  ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate) AS RowNumber

  FROM Sales.SalesOrderHeader;

  --8-7.3 带有表假脱机运算符的查询

  PRINT ''8-7.3'';

  SELECT CustomerID, SalesOrderID, SUM(TotalDue) OVER(PARTITION BY CustomerID)

  AS SubTotal

  FROM Sales.SalesOrderHeader;

  清单 8-7

  使用 STATISTICS IO

  ```


  图 8-8 显示了由 `STATISTICS IO` 设置在消息选项卡中产生的结果。代码清单首先开启 `STATISTICS IO` 并关闭行计数。在每个查询之前，一个
  `PRINT` 语句会打印查询编号，以便你知道哪些信息对应哪个查询。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig8_HTML.jpg](img/335106_2_En_8_Fig8_HTML.jpg)


  图 8-8

  查询的 STATISTICS IO 输出


  最有用的信息来自 `logical reads`（逻辑读），即读取的页数。查询 1 和查询 2 各需要 689 次 `logical reads`。这大约是 `Sales.SalesOrderHeader`
  表聚集索引中的页数。如果你回顾图 8-1，你会看到执行了聚集索引扫描。使用窗口聚合的查询 3 也需要 689 次 `logical reads` 来扫描聚集索引，但它还在
  `tempdb` 中创建了一个工作表。它使用了 139,407 次 `logical reads` 来通过工作表执行计算。


  在执行计划显示相同成本但查询运行时间不同的情况下，使用 `STATISTICS IO` 非常有益。在调优查询时，我总是同时使用这两个工具。


  ## 通过索引提升窗口函数性能


  排序通常是带有窗口函数的查询的瓶颈。你看到清单 8-4 中的查询里，排序运算符消耗了 95% 的资源。通过添加正确的索引，有可能消除排序并减少逻辑读数。最优索引将正确排序并覆盖查询。当然，你不能为编写的每个查询都添加索引，但对于性能至关重要的查询，你会知道该怎么做。


  重新运行清单 8-4 中的查询，确保首先切换开启实际执行计划设置。单击 `Select` 运算符并查看工具提示，如图 8-9 所示。你可以看到预留的 `Memory
  Grant`（内存授予）为 4416，用作排序空间，`Estimated Subtree Cost`（估计子树成本）为 2.71698。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig9_HTML.jpg](img/335106_2_En_8_Fig9_HTML.jpg)


  图 8-9

  SELECT 工具提示


  单击 `Sort` 运算符，然后按 `F4` 查看属性。`Order By` 属性列出了两个列。图 8-10 显示了相关信息。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig10_HTML.jpg](img/335106_2_En_8_Fig10_HTML.jpg)


  图 8-10

  Order By 列


  `Sort` 运算符正按 `CustomerID` 和 `OrderDate` 排序。这是合理的，因为 `PARTITION BY` 表达式是 `CustomerID`，而
  `ORDER BY` 表达式是 `OrderDate`。数据必须先按 `PARTITION BY` 列划分，然后按 `ORDER BY` 列排序。另外请注意图中还有三个
  `Output List`（输出列表）列。如果你查看 `Output List`，会看到 `CustomerID`、`OrderDate` 和 `SaleOrderID`，即查询中使用的三个列。候选索引将以
  `CustomerID` 和 `OrderDate` 作为键，并将 `SalesOrderID` 作为包含列。在这种情况下，`SalesOrderID` 不是必需的，因为它是表的聚集键，并且已经是任何非聚集索引的一部分。


  另一件需要考虑的事是表上现有的索引。该表在 `CustomerID` 上有一个非聚集索引 `IX_SalesOrderHeader_CustomerID`。你可以修改这个索引，而不是创建一个新索引。以前使用旧索引的查询现在可以使用新索引。运行清单
  8-8 来删除现有索引并创建一个新索引。


  ```

  --8-8.1 删除现有索引

  DROP INDEX [IX_SalesOrderHeader_CustomerID] ON [Sales].[SalesOrderHeader];

  GO

  --8-8.2 为查询创建新索引

  CREATE NONCLUSTERED INDEX [IX_SalesOrderHeader_CustomerID_OrderDate]

  ON [Sales].[SalesOrderHeader] ([CustomerID], [OrderDate]);

  清单 8-8

  修改索引

  ```


  现在重新运行清单 8-4 中的查询。新的执行计划如图 8-11 所示。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig11_HTML.jpg](img/335106_2_En_8_Fig11_HTML.jpg)


  图 8-11

  索引更改后的执行计划


  首先你应该看到的是 `Sort` 运算符消失了。现在运行查询的主要成本是扫描新的非聚集索引。图 8-12 显示了 `SELECT` 工具提示。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig12_HTML.jpg](img/335106_2_En_8_Fig12_HTML.jpg)


  图 8-12

  索引更改后的 SELECT 工具提示



  内存授予不再需要，而估计子树成本仅为 `0.104003`。这是一个相当大的改进！对于带有 `WHERE` 子句的查询，应在 `PARTITION BY` 和
  `OVER` 列之前，将该列添加到索引的首位。在前面的例子中，创建一个新的索引比在以 `CustomerID` 开头的索引上添加列更合理，这样可以不影响那些需要
  `CustomerID` 作为第一个索引键的现有查询。不幸的是，如果新列不属于 `OVER` 子句的一部分，排序操作可能还会出现。


  这样设计的索引能有效提升任何单表窗口函数查询的性能。然而，大多数查询涉及多个表。清单 8-9 展示了从多表查询返回相同结果的两种方式。这些查询具有不同的执行计划。此结果假设已应用了清单
  8-8 中的索引更改。


  ```sql

  --8-9.1 使用连接的查询

  SELECT SOH.CustomerID, SOH.SalesOrderID, SOH.OrderDate, C.TerritoryID,

  ROW_NUMBER() OVER(PARTITION BY SOH.CustomerID ORDER BY SOH.OrderDate)

  AS RowNumber

  FROM Sales.SalesOrderHeader AS SOH

  JOIN Sales.Customer C ON SOH.CustomerID = C.CustomerID;

  --8-9.2 重新排列查询

  WITH Sales AS (

  SELECT CustomerID, OrderDate, SalesOrderID,

  ROW_NUMBER() OVER(PARTITION BY CustomerID ORDER BY OrderDate)

  AS RowNumber

  FROM Sales.SalesOrderHeader)

  SELECT Sales.CustomerID, SALES.SalesOrderID, Sales.OrderDate,

  C.TerritoryID, Sales.RowNumber

  FROM Sales

  JOIN Sales.Customer AS C ON C.CustomerID = Sales.CustomerID;

  ```


  清单 8-9

  带有连接的窗口函数


  图 8-13 展示了执行计划。查询 1 通过合并连接将 `Customer` 表和 `SalesOrderHeader` 表的行连接起来，因为两个索引都按 `CustomerID`
  排序。然后输出结果按 `CustomerID` 和 `OrderDate` 排序，并计算行号。查询 2 将 `SalesOrderHeader` 表移至一个 CTE
  中，并在那里应用行号。从执行计划中可以看到，行号是在连接到 `Customer` 表之前应用的。您还可以看到排序操作消失了，其相对成本为 12%。在这种情况下，通过重新排列查询，第二个查询的性能更好。`PARTITION
  BY` 和 `ORDER BY` 列都来自同一个查询，但情况并非总是如此。查询会迅速变得复杂，您可能无法总是消除排序。我曾遇到过涉及多个连接表的查询中存在顽固的排序算子，无法将其移除。幸运的是，排序的成本通常与计划中的其他算子相比很小。


  ![连接的执行计划](img/335106_2_En_8_Fig13_HTML.jpg)


  图 8-13

  连接的执行计划


  ## 为性能而设计框架


  在第 5 章中，您学习了如何向 `OVER` 子句添加框架以创建移动聚合。在第 6 章中，您看到了 `FIRST_VALUE` 和 `LAST_VALUE` 函数为何需要框架。在每种情况下，我都解释了有时需要框架才能获得正确的结果，但它对于性能原因也很重要。本章后面，我将介绍
  SQL Server 2019 中一些令人兴奋的性能更新，但现在，本节中的示例将假设数据库处于 SQL Server 2017 兼容模式或更低版本。


  如果表很小，即使省略框架，查询也能快速运行。清单 8-10 将数据库兼容模式设置为 2017 (`140`) 并打开统计信息。然后，它创建一个用于测试的表并填充数据。如果需要，请修改数据库名称。


  ```sql

  --8-10.1 设置兼容性级别

  USE master;

  GO

  ALTER DATABASE AdventureWorks2017

  SET COMPATIBILITY_LEVEL = 140 WITH NO_WAIT;

  GO

  USE AdventureWorks2017;

  GO

  --8-10.2 打开 STATISTICS IO

  SET STATISTICS IO ON;

  SET NOCOUNT ON;

  GO

  --8-10.3 创建一个更大的测试表

  DROP TABLE IF EXISTS dbo.SOD ;

  CREATE TABLE dbo.SOD(SalesOrderID INT, SalesOrderDetailID INT, LineTotal Money);

  --8-10.4 填充表

  INSERT INTO dbo.SOD(SalesOrderID, SalesOrderDetailID, LineTotal)

  SELECT SalesOrderID, SalesOrderDetailID, LineTotal

  FROM Sales.SalesOrderDetail

  UNION ALL

  SELECT SalesOrderID + MAX(SalesOrderID) OVER(), SalesOrderDetailID, LineTotal

  FROM Sales.SalesOrderDetail;

  --8-10.5 创建非聚集索引

  CREATE INDEX SalesOrderID_SOD ON dbo.SOD

  (SalesOrderID, SalesOrderDetailID) INCLUDE(LineTotal);

  ```


  清单 8-10

  创建大型测试表


  清单 8-11 包含两个性能不佳的查询。运行脚本前请务必打开实际执行计划。


  ```sql

  --8-11.1 运行总和

  PRINT ''8-11.1''

  SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

  SUM(LineTotal)

  OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) RunningTotal

  FROM SOD;

  --8-11.2 使用 FIRST_VALUE 的查询

  PRINT ''8-11.2''

  SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

  FIRST_VALUE(LineTotal)

  OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) FirstValue

  FROM SOD;

  ```


  清单 8-11

  两个性能不佳的查询


  图 8-14 显示了统计信息。在每种情况下，从临时表中执行了超过 140 万次逻辑读取。


  ![两个性能不佳查询的逻辑读取](img/335106_2_En_8_Fig14_HTML.jpg)


  图 8-14

  两个性能不佳查询的逻辑读取


  图 8-15 显示了查询的执行计划。请注意窗口假脱机算子，它表明创建了一个临时表，但该表并非在内存中创建。


  ![两个性能不佳查询的执行计划](img/335106_2_En_8_Fig15_HTML.jpg)


  图 8-15

  两个性能不佳查询的执行计划


  当支持框架但被省略时，会使用默认框架。默认框架是 `RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`。`RANGE`
  运算符旨在处理逻辑时间段，这在 SQL Server 中尚未实现。当使用 `RANGE` 时，临时表总是在 tempdb 中创建，而不是在内存中。为了解决此问题，请在框架中指定
  `ROWS` 运算符。清单 8-12 显示了更正后的查询。


  ```sql

  PRINT ''8-12.1''

  SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

  SUM(LineTotal)

  OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID

  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) RunningTotal

  FROM SOD;

  --8-12.2 使用 ROWS 的 FIRST_VALUE 查询

  PRINT ''8-12.2''

  SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

  FIRST_VALUE(LineTotal)

  OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID

  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) RunningTotal

  FROM SOD;

  ```


  清单 8-12

  使用 ROWS 的查询


  图 8-16 显示临时表现在产生 0 次逻辑读取。这表明临时表是在内存中创建的。如果您回顾执行计划，它们将与图 8-15 所示的计划相同。


  ![使用 ROWS 时的逻辑读取](img/335106_2_En_8_Fig16_HTML.jpg)


  图 8-16

  使用 ROWS 时的逻辑读取


  这些示例比较了逻辑读取次数，但您如何知道这真的会对查询运行时间产生影响？如果您的客户打电话抱怨查询运行缓慢，解释逻辑读取情况良好对他们来说毫无意义。在本章的“时间测量比较”部分，您将看到逻辑读取确实暗示了性能差异。



  ## 利用行存储上的批处理模式


  有两类窗口函数在过去扩展性不佳：窗口聚合函数和统计函数。这些函数易于使用，但如果在大量行上操作，性能就会下降。你可以通过预聚合来规避这些问题，使函数应用于更少的行，但这并非总是可行。清单
  8-13 展示了两个示例，它们使用清单 8-10 中创建的表，并确保数据库处于 2017 (140) 兼容模式。


  ```sql

  --8-13.1 设置兼容级别

  USE master;

  GO

  ALTER DATABASE AdventureWorks2017

  SET COMPATIBILITY_LEVEL = 140 WITH NO_WAIT;

  GO

  USE AdventureWorks2017;

  GO

  --8-13.2 一个窗口聚合函数

  PRINT ''8-13.1''

  SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

  SUM(LineTotal) OVER(PARTITION BY SalesOrderID) AS SubTotal

  FROM SOD;

  --8-13.2 一个统计函数

  PRINT ''8-11.2''

  SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

  PERCENT_RANK()

  OVER(PARTITION BY SalesOrderID ORDER BY SalesOrderDetailID) AS Ranking

  FROM SOD;

  ```


  清单 8-13: 一个窗口聚合函数和一个统计函数


  ### 图 8-17: 窗口聚合函数和统计函数的逻辑读取


  图 8-17 显示了逻辑读取情况。注意，由于使用了工作表，产生了大量的逻辑读取。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig17_HTML.jpg](img/335106_2_En_8_Fig17_HTML.jpg)


  ### 图 8-18: 显示表假脱机运算符的执行计划


  尽管查询语法简单，但实际执行计划相当复杂。图 8-18 显示了部分计划。请注意，每个计划都有不止一个 `Table Spool`（表假脱机）运算符。`Table
  Spool` 运算符意味着在 `tempdb` 中创建了工作表。即使估计成本很低，这也总会消耗大量资源。


  ![../images/335106_2_En_8_Chapter/335106_2_En_8_Fig18_HTML.jpg](img/335106_2_En_8_Fig18_HTML.jpg)


  你可能想知道为什么 `PERCENT_RANK()` 函数性能不佳，而 `RANK()` 函数的性能尚可接受。这是因为 `PERCENT_RANK()` 函数的公式是
  `(RANK -1)/(TotalRows -1)`。在内部，它使用了窗口聚合函数 `COUNT` 来计算总行数。其他三个统计函数也存在同样的性能问题。


  2012 年，微软引入了非聚集 `列存储索引`（`CI`）。`CI` 是一种不同的数据存储方式，其中一页包含一列中的许多行（可能成千上万）。这意味着可以实现高压缩率，查询速度可以提升一个数量级。随着
  SQL Server 的每个新版本，微软都增强了 `CI`，包括引入一种新的处理大数据集聚合的方法：`批处理模式`。这对于需要高 CPU 资源的查询尤其有用。在
  SQL Server 2019 之前（在撰写本文时仍处于预览版），查询中必须涉及 `CI` 才能使用批处理模式。从 2019 版本开始，即使查询中没有 `CI`，优化器也可以选择使用
  `批处理模式`。这被称为 `行存储上的批处理模式`。


  清单 8-14 展示了新的 `行存储上的批处理模式` 如何提升窗口聚合查询的性能。


  ```sql

  --8-14.1 设置兼容级别

  USE master;

  GO

  ALTER DATABASE AdventureWorks2017

  SET COMPATIBILITY_LEVEL = 150 WITH NO_WAIT;

  GO

  USE AdventureWorks2017;

  GO

  --8-14.2 一个窗口聚合函数

  PRINT ''8-14.1''

  SELECT SalesOrderID, SalesOrderDetailID, LineTotal,

  SUM(LineTotal) OVER(PARTITION BY SalesOrderID) AS SubTotal

  FROM SOD;

  ```


  清单 8-14: 使用行存储上的批处理模式


  ### 图 8-19: 使用批处理模式时的逻辑读取


