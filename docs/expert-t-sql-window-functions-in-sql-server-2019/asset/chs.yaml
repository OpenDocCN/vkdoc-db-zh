  ## 概述


  窗口聚合使得向非聚合查询添加摘要计算，或向聚合查询添加不同聚合级别的摘要变得非常容易。当你需要将详细数据与整体总计进行比较或生成小计时，这非常方便。如果你灵感迸发，甚至可以创建自己的自定义窗口聚合函数。


  现在你已经了解了如何使用 SQL Server 2005 发布的所有窗口函数特性。第 4 章 将展示 2012 年引入的首个特性：移动和累积窗口聚合。


  '
- "# 4. 计算累积和移动聚合\n\n假设你被分配了一项任务，编写一个带有按客户分类的销售累积总计的 T-SQL 查询。也许你首先想到的是使用游标来完成，或者你可能熟悉一些查询技术，如自连接。如果你运行的是\
  \ SQL Server 2012 或更高版本，那么你很幸运！窗口函数使得计算累积总计、移动平均值等变得非常容易。\n\n在本章中，你将学习如何在窗口聚合表达式中添加\
  \ `ORDER BY` 子句会改变一切！你将学习如何为累积和移动聚合添加计算，这在业务报告和仪表盘中经常需要。\n\n## 向窗口聚合添加 ORDER BY\n\
  \n在第 3 章中，你学习了如何使用窗口聚合在不分组的情况下向查询添加摘要。2005 版的窗口聚合功能不支持 `OVER` 子句中的 `ORDER BY` 组件。从\
  \ SQL Server 2012 开始，你可以向窗口聚合添加 `ORDER BY` 来计算累积总计。为了区分此功能与 2005 功能，本书将 2012 功能称为*累积窗口聚合*。添加\
  \ `ORDER BY` 时，窗口会发生变化。每一行都有不同的行集（即窗口）用于操作。窗口基于 `ORDER BY` 表达式。默认情况下，窗口由结果集中的第一行开始，并包括直到当前行的所有后续行。图\
  \ 4-1 展示了按 `CustomerID` 分区时窗口的工作原理。\n\n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig1_HTML.jpg](img/335106_2_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n每一行都有不同的窗口\n\n在本章之前的示例中，组成窗口的实际行由 `PARTITION BY` 表达式确定。对于累积聚合，窗口中的行由 `PARTITION\
  \ BY`、`ORDER BY` 和一个*框架*共同定义。框架可用于更精细地定义窗口。本节中的示例使用了默认框架。你将在本章的“计算移动总计和平均值”部分以及第\
  \ 5 章中了解更多关于框架的信息。语法如下：\n\n```\n() OVER([PARTITION BY ]\nORDER BY  [Frame definition])\n\
  ```\n\n代码清单 4-1 演示了如何使用累积窗口聚合来计算累积总计。\n\n```\n--4-1.1 累积总计\nSELECT CustomerID, SalesOrderID,\
  \ CAST(OrderDate AS DATE) AS OrderDate,\nTotalDue, SUM(TotalDue) OVER(PARTITION\
  \ BY CustomerID\nORDER BY SalesOrderID) AS RunningTotal\nFROM Sales.SalesOrderHeader;\n\
  ```\n\n代码清单 4-1\n计算累积总计\n\n图 4-2 展示了部分结果。`RunningTotal` 列的值不断增加，直到遇到不同的 `CustomerID`。此时，总计重新开始计算。\n\
  \n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig2_HTML.jpg](img/335106_2_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n使用累积聚合计算累积总计的部分结果\n\n代码清单 4-1 示例中的 `OVER` 子句使用了默认框架，该框架是 `OVER` 子句的一部分。第\
  \ 5 章 将深入介绍框架，但你将在下一节中先了解一些基础知识。通过修改框架，你可以计算移动聚合。\n\n\n## 计算移动总计和平均值\n\n移动总计和平均值是非常流行的商业和经济指标。例如，开发者可能被要求提供按\
  \ 3 个月或 12 个月计算这些指标的报告。默认情况下，用于累积窗口聚合的窗口在分区内持续增长，但对于移动聚合，你希望窗口大小保持不变。这可以通过添加窗口框架定义来实现。以下是包含移动聚合窗口框架的累积窗口聚合语法。第\
  \ 5 章详细介绍了窗口框架，所以现在只需复制示例中的代码。\n\n```sql\n() OVER([PARTITION BY ]]\nORDER BY \n\
  [ROWS BETWEEN  PRECEDING AND CURRENT ROW])\n```\n\n窗口对每一行都不同。图 4-3 展示了移动聚合的窗口工作原理。\n\
  \n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig3_HTML.jpg](img/335106_2_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3：按 3 个月计算的移动聚合窗口\n\n运行清单 4-2 查看示例。\n\n```sql\n--4-2.1 产品销售数量的三个月总和与平均值\n\
  SELECT MONTH(SOH.OrderDate) AS OrderMonth, SOD.ProductID, SUM(SOD.OrderQty) AS QtySold,\n\
  SUM(SUM(SOD.OrderQty))\nOVER(PARTITION BY SOD.ProductID ORDER BY MONTH(SOH.OrderDate)\n\
  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthSum,\nAVG(SUM(SOD.OrderQty))\n\
  OVER(PARTITION BY SOD.ProductID ORDER BY MONTH(SOH.OrderDate)\nROWS BETWEEN 2 PRECEDING\
  \ AND CURRENT ROW) AS ThreeMonthAvg\nFROM Sales.SalesOrderHeader AS SOH\nJOIN Sales.SalesOrderDetail\
  \ AS SOD ON SOH.SalesOrderID = SOD.SalesOrderID\nJOIN Production.Product AS P ON\
  \ SOD.ProductID = P.ProductID\nWHERE OrderDate >= '2013-01-01' AND OrderDate < '2014-01-01'\n\
  GROUP BY MONTH(SOH.OrderDate), SOD.ProductID;\n--清单 4-2：计算移动平均值和总和\n```\n\n该查询筛选出\
  \ 2013 年下的订单，并按月份和`ProductID`进行聚合。图 4-4 显示了部分结果，即产品 707 一年的销售情况。注意，每种情况下的窗口函数都应用于聚合值，即`OrderQty`的总和。在聚合查询中使用窗口函数时，函数或`OVER`子句中使用的任何列都遵循与`SELECT`列表相同的规则。更多信息请参见第\
  \ 3 章的“将窗口聚合添加到聚合查询”部分。通过在`OVER`子句中添加`ORDER BY`和`ROWS`表达式（框架），窗口每次向前移动，最多包含三行。\n\
  \n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig4_HTML.jpg](img/335106_2_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4：计算移动聚合的部分结果\n\n大多数情况下，对三个月计算的要求是，如果不足三个月无法计算平均值，则值应为`NULL`，但这些函数只会对可用数据进行求和。例如，一月和二月的三个月总和与平均值应为`NULL`。从三月开始，三个月的数据已备齐，因此会返回总和。为此，你需要检查月份的数量。清单\
  \ 4-3 展示了一种方法。\n\n```sql\n--4-3.1 当不足三个月时显示 NULL\nSELECT MONTH(SOH.OrderDate) AS\
  \ OrderMonth, SOD.ProductID,\nSUM(SOD.OrderQty) AS QtySold,\nCASE WHEN ROW_NUMBER()\
  \ OVER(PARTITION BY SOD.ProductID\nORDER BY MONTH(SOH.OrderDate)) = '2013-01-01'\
  \ AND OrderDate < '2014-01-01'\nGROUP BY MONTH(SOH.OrderDate), SOD.ProductID;\n\
  --清单 4-3：当行数不足时返回 NULL\n```\n\n图 4-5 显示了部分结果，即`ProductID` 707 一年的销售情况。通过使用`CASE`语句检查`ROW_NUMBER`，当可用行数不足三行时返回`NULL`。\n\
  \n![../images/335106_2_En_4_Chapter/335106_2_En_4_Fig5_HTML.jpg](img/335106_2_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5：当可用行数不足三行时返回 NULL\n\n## 使用累积聚合解决查询\n\n创建累加和移动聚合非常简单！你将在第 5 章学习如何利用`OVER`子句的框架组件，以确保得到预期的结果。在第\
  \ 8 章中，还将讨论框架的性能，这也很重要。与排名函数不同，计算累加或移动聚合可能本身就是解决方案，而不仅仅是解决方案中的一个步骤。下一节将展示如何使用累积窗口函数来解决更有趣的问题。\n\
  \n\n\n\n### 上一个有效值问题\n\n我在一个论坛上看到这个问题，有几个人尝试过解决。最好的解决方案是由 T-SQL 专家 Itzik Ben-Gan\
  \ 开发的。\n\n该问题所用的表有两列。第一列 `ID` 是一个递增的整数，是表的主键。第二列可能包含 `NULL` 值。任务是将每个 `NULL` 替换为前一个非\
  \ `NULL` 值。\n\n#### 清单 4-4：创建并填充表\n\n以下代码创建并填充表，并显示各行数据。\n\n```sql\n--4-4.1 创建表\n\
  CREATE TABLE #TheTable(ID INT, Data INT);\n--4-4.2 填充表\nINSERT INTO #TheTable(ID,\
  \ Data)\nVALUES(1,1),(2,1),(3,NULL),\n(4,NULL),(5,6),(6,NULL),\n(7,5),(8,10),(9,13),\n\
  (10,12),(11,NULL);\n--4-4.3 显示结果\nSELECT * FROM #TheTable;\n```\n\n#### 图 4-6：上一个有效值问题的原始数据\n\
  \n图 4-6 显示了表中的原始数据。注意第 3、4、6 和 11 行的 `Data` 列为 `NULL`。解决方案将用 1 替换第 3 和第 4 行的 `NULL`，用\
  \ 6 替换第 6 行的，用 12 替换第 11 行的。\n\n![上一个有效值问题的原始数据](img/335106_2_En_4_Fig6_HTML.jpg)\n\
  \n我发现 Itzik 的解决方案非常优雅和巧妙。它利用了这样一个事实：你可以使用任何聚合函数作为累积窗口聚合，而不仅仅是 `SUM` 和 `AVG`。看一下第\
  \ 4 行。需要用来替换 `NULL` 的值是第 2 行的 `Data` 值。第 2 行的 `ID` 也是从第 1 行到第 4 行中，`Data` 列非 `NULL`\
  \ 的所有行中的最大 `ID`。一个从分区第 1 行开始一直到当前行的窗口，与计算运行总计所需的窗口是相同的！你可以利用这个事实来找到截至当前行、`Data`\
  \ 值非 `NULL` 的最大 `ID`。\n\n#### 清单 4-5：解决方案步骤 1\n\n```sql\n--4-5.1 找到最大的非空行\nSELECT\
  \ ID, Data,\nMAX(CASE WHEN Data IS NOT NULL THEN ID END)\nOVER(ORDER BY ID) AS MaxRowID\n\
  FROM #TheTable;\n```\n\n#### 图 4-7：步骤 1 的结果\n\n图 4-7 显示了目前的结果。`MaxRowID` 列是每一行所需的\
  \ `Data` 值所在行的 `ID`。`MAX` 函数查找截至当前行、`Data` 值非 `NULL` 的所有行中的最大 `ID` 值。\n\n![步骤 1\
  \ 的结果](img/335106_2_En_4_Fig7_HTML.jpg)\n\n我最初的想法是，我可以使用 `MaxRowID` 列将表与自身连接，但仔细看看这些数据。在\
  \ `MaxRowID` 值相同的每一组行中，有一行非 `NULL` 的 `Data`，其余都是 `NULL`。有三行的 `MaxRowID` 是 2。其中只有一行有非\
  \ `NULL` 的 `Data` 值。我接下来的想法是直接按 `MaxRowID` 分组，并对 `Data` 列使用 `MAX` 函数。但问题在于，这样做会丢失你需要查看的细节信息。然而，窗口聚合函数允许你在不将查询更改为聚合查询的情况下添加聚合函数。与其在\
  \ `MaxRowID` 上分组，不如按它进行分区。\n\n#### 清单 4-6：完整解决方案\n\n```sql\n--4-6.1 解决方案\nWITH MaxData\
  \ AS\n(SELECT ID, Data,\nMAX(CASE WHEN Data IS NOT NULL THEN ID END)\nOVER(ORDER\
  \ BY ID) AS MaxRowID\nFROM #TheTable)\nSELECT ID, Data,\nMAX(Data) OVER(PARTITION\
  \ BY MaxRowID) AS NewData\nFROM MaxData;\n```\n\n#### 图 4-8：上一个有效值问题的完整结果\n\n图 4-8\
  \ 显示了结果。解决方案的第一部分被添加到了一个 CTE 中。在外层查询中，`MAX` 函数用于查找最大的 `Data` 值（实际上是唯一非 `NULL` 的那个值），并按\
  \ `MaxRowID` 进行分区。\n\n![上一个有效值问题的完整结果](img/335106_2_En_4_Fig8_HTML.jpg)\n\n一旦看到这个解决方案，它似乎就变得相当简单了。感谢\
  \ Itzik Ben-Gan 想出了这个方法。\n\n\n### 订阅问题\n\n在当今世界，我们许多人不再订阅杂志或报纸，但就在不久之前，它们还非常流行。客户会订阅出版物，有时会在某个时间点取消订阅。在这个问题中，你必须计算每个月底的有效订阅数量。数据中可能会有晚于最晚订阅日期的取消日期，对于这些行你可以忽略。\n\
  \n解决这个问题最直观的方法是使用一个临时表，为每个月创建一行。然后遍历数据的每一行，根据开始和停止日期进行加减。遗憾的是，这种方法运行速度极慢。利用累积聚合功能可以轻松解决这个问题，而且运行速度快！\n\
  \n首先，创建一个包含一些随机注册数据的临时表。由于是随机的，你的最终结果将与我的不同。此脚本创建一个包含 100,000 行的表，但你可以根据需要调整这个数字。清单\
  \ 4-7 创建并填充了该表。\n\n```sql\n--4-7.1 创建临时表\nCREATE TABLE #Registrations(ID INT NOT\
  \ NULL IDENTITY PRIMARY KEY,\nDateJoined DATE NOT NULL, DateLeft DATE NULL);\n--4-7.2\
  \ 变量\nDECLARE @Rows INT = 10000, @Years INT = 5, @StartDate DATE = '2019-01-01'\n\
  --4-7.3 插入 10,000 行，包含五年的可能日期\nINSERT INTO #Registrations (DateJoined)\nSELECT TOP(@Rows)\
  \ DATEADD(DAY,CAST(RAND(CHECKSUM(NEWID())) * @Years * 365  as INT) ,@StartDate)\n\
  FROM sys.objects a\nCROSS JOIN sys.objects b\nCROSS JOIN sys.objects c;\n--4-7.4\
  \ 为 75%的订阅者添加取消日期\nUPDATE TOP(75) PERCENT #Registrations\nSET DateLeft = DATEADD(DAY,CAST(RAND(CHECKSUM(NEWID()))\
  \ * @Years * 365  as INT),DateJoined)\n--4-7.5 订阅数据\nSELECT *\nFROM #Registrations\n\
  ORDER BY DateJoined;\n```\n清单 4-7\n创建订阅表\n\n部分结果将如图 4-9 所示。\n\n![`../images/335106_2_En_4_Chapter/335106_2_En_4_Fig9_HTML.jpg`](img/335106_2_En_4_Fig9_HTML.jpg)\n\
  图 4-9\n部分订阅数据\n\n如果你阅读我在 2009 年写的一篇用于解决类似问题的文章（[`www.red-gate.com/simple-talk/sql/performance/writing-efficient-sql-set-based-speed-phreakery/`](http://www.red-gate.com/simple-talk/sql/performance/writing-efficient-sql-set-based-speed-phreakery/)），你会发现高效的代码也曾很复杂且难以理解。在那篇文章中，我解释了\
  \ SQL 专家 Peter Larsson 提出的一种解决方案，它使用了临时表、`UNPIVOT`和一个不受支持的“古怪”更新。有了 SQL Server 2012，这个问题的解决方案写起来就非常容易，而且性能很好。清单\
  \ 4-8 展示了该解决方案。\n\n```sql\n--4-8.1 解决订阅问题\nWITH NewSubs AS (\nSELECT EOMONTH(DateJoined)\
  \ AS TheMonth,\nCOUNT(DateJoined) AS PeopleJoined\nFROM #Registrations\nGROUP BY\
  \ EOMONTH(DateJoined)),\nCancelled AS (\nSELECT EOMONTH(DateLeft) AS TheMonth,\n\
  COUNT(DateLeft) AS PeopleLeft\nFROM #Registrations\nGROUP BY EOMONTH(DateLeft))\n\
  SELECT NewSubs.TheMonth AS TheMonth, NewSubs.PeopleJoined,\nCancelled.PeopleLeft,\n\
  SUM(NewSubs.PeopleJoined - ISNULL(Cancelled.PeopleLeft,0))\nOVER(ORDER BY NewSubs.TheMonth)\
  \ AS Subscriptions\nFROM NewSubs\nLEFT JOIN Cancelled ON NewSubs.TheMonth = Cancelled.TheMonth;\n\
  ```\n清单 4-8\n使用 SQL Server 2012 功能解决订阅问题\n\n部分结果如图 4-10 所示。第一步是按月获取新订阅和取消订阅的计数。为此，必须按月对数据进行分组。在这个案例中，使用了\
  \ `EOMONTH` 函数，它将每个日期更改为当月的最后一天。\n\n![`../images/335106_2_En_4_Chapter/335106_2_En_4_Fig10_HTML.jpg`](img/335106_2_En_4_Fig10_HTML.jpg)\n\
  图 4-10\n订阅问题的部分结果\n\n新订阅数和取消订阅数被分别放入 CTE 中，以分别获取每个月的 `PeopleJoined` 和 `PeopleLeft`\
  \ 值。外部查询将 `NewSubs` CTE 与 `Cancelled` CTE 通过 `LEFT JOIN` 连接，因为有许多月份没有取消订阅。`PeopleJoined`\
  \ 减去已处理了 `NULL` 值的 `PeopleLeft` 之后的总和被计算为一个累计总计。\n\n该查询编写起来非常容易，而且运行相当快。在我的 Azure\
  \ 虚拟机上，针对 100,000 行数据运行，耗时少于 100 毫秒。\n\n## 总结\n\n从 SQL Server 2012 开始，在 `OVER` 子句中添加\
  \ `ORDER BY` 会将窗口聚合变为累积窗口聚合。这让你可以轻松创建累计总计，以及移动总计和平均值。然而，此功能并不仅限于用于求和与平均值。`MAX` 函数也曾被用于解决一个难题。\n\
  \n在本章中，通过观察移动总和与平均值，你初步了解了帧。第 5 章将深入探讨帧。\n\n---\n\n"
- "# 5. 向窗口添加帧\n\n你已经审视过窗口，并利用它编写了强大的查询来解决一些常见问题。你已将窗口分区，就像大窗户上较小的窗格。现在，你将学习如何通过使用帧来创建非常精细的窗口，就像彩色玻璃一样。\n\
  \n在本章中，你将了解在支持帧的情况下，帧对于结果的准确性为何如此重要。帧对于性能也很重要，但你将在第 8 章学习相关内容。\n\n\n## 理解 Framing\n\
  \n当 2012 年的 T-SQL 功能在 2011 年首次公布时，我必须承认 framing 让我有些畏惧。我尽可能避免学习它，因为我实在不太喜欢那个语法，也不太理解它到底是怎么回事。幸运的是，frames\
  \ 只在特定的窗口函数中支持，所以它们并不常用。生活中最可怕的事情，比如公开演讲，往往带来最大的回报，窗口函数表达式中的 framing 也是如此。花时间理解\
  \ framing 将真正帮助你从窗口函数中获得最大收益。\n\n使用 framing，你可以指定一个比分区更小的窗口。例如，你可能想要一个从集合的第一行开始但在当前行停止的窗口。你可能想要一个从当前行之前仅\
  \ 12 行开始，而不管分区中有多少行的窗口。使用 frames，你可以定义满足这些特殊要求的窗口。\n\n在开始向你的 `OVER` 子句添加 frames\
  \ 之前，你应该理解几个关键术语。表 5-1 列出了这些术语及其定义。\n\n**表 5-1**\n\n**关键 Framing 术语**\n\n| 关键术语\
  \ | 定义 |\n| --- | --- |\n| `ROWS` | 一个物理操作符。查看行的位置。 |\n| `RANGE` | 一个逻辑操作符，但在当前版本的\
  \ SQL Server 中未完全实现。查看表达式的值而非位置。 |\n| `UNBOUNDED PRECEDING` | 帧从集合中的第一行开始。 |\n|\
  \ `UNBOUNDED FOLLOWING` | 帧在集合中的最后一行结束。 |\n| `N PRECEDING` | 当前行之前的物理行数。仅与 `ROWS`\
  \ 一起支持。 |\n| `N FOLLOWING` | 当前行之后的物理行数。仅与 `ROWS` 一起支持。 |\n| `CURRENT ROW` | 当前计算所在的行。\
  \ |\n\n你在第 4 章看到，用于累计聚合的窗口对于每一行都是不同的。如果你在计算累计总和，第 1 行的窗口就是第 1 行。第 2 行的窗口是第 1 行和第\
  \ 2 行。第 3 行的窗口是第 1 行到第 3 行，依此类推。在每种情况下，窗口都从分区的第一行开始，在当前行结束。图 5-1 展示了按 `CustomerID`\
  \ 分区时帧的样子。注意，第 4 行的窗口在一个新的分区 `CustomerID` 11001 中，并且第 4 行是该分区的第一行。\n\n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig1_HTML.jpg](img/335106_2_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1**\n\n**每一行都有一个不同的窗口**\n\n帧定义由关键字 `ROWS` 或 `RANGE` 后跟单词 `BETWEEN` 组成。然后你必须指定一个起点和终点。语法如下：\n\
  \n```\nROWS BETWEEN  AND \nRANGE BETWEEN  AND \n```\n\n有两种可能的帧表达式可以给你一个累计聚合，比如累计总和，从分区的第一行开始，到当前行结束：`ROWS\
  \ BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW` 和 `RANGE BETWEEN UNBOUNDED PRECEDING\
  \ AND CURRENT ROW`。你将在本章后面了解更多关于 `ROWS` 和 `RANGE` 之间的区别，但现在你应该理解，`RANGE BETWEEN\
  \ UNBOUNDED PRECEDING AND CURRENT ROW` 是默认的帧，即当支持帧但未指定时使用的帧。这就是为什么你可以只为 `SUM` 的\
  \ `OVER` 子句添加一个 `ORDER BY` 表达式就能产生累计总和。表达式 `SUM(TotalDue) OVER(ORDER BY OrderID)`\
  \ 和 `SUM(TotalDue) OVER(ORDER BY OrderID RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT\
  \ ROW)` 是等效的。\n\n出于你将在本章后面了解的原因，首选的帧表达式使用 `ROWS` 而不是 `RANGE`。你也可以使用累计总和帧的缩写语法：`ROWS\
  \ UNBOUNDED PRECEDING`。\n\n要创建一个从当前行开始并包含到集合末尾的所有行的帧，请使用 `ROWS BETWEEN CURRENT ROW\
  \ AND UNBOUNDED FOLLOWING`。这将允许你创建一个反向的累计总和。使用帧的另一种方式是指定帧中包含的行数。此语法只能与 `ROWS` 一起使用。你可以指定当前行之前、之后或前后的行数。如果你打算指定当前行之前的行数，这个表达式还有一个快捷方式：`ROWS\
  \ <N> PRECEDING`。想象一下，你有一个由 10 行组成的分区，当前行是第 5 行。表 5-2 列出了几个帧示例以及这些示例所引用的行。\n\n**表\
  \ 5-2**\n\n**Framing 示例**\n\n| 帧定义 | 行 |\n| --- | --- |\n| `ROWS BETWEEN 3 PRECEDING\
  \ AND CURRENT ROW` | 2–5 |\n| `ROWS BETWEEN CURRENT ROW AND 4 FOLLOWING` | 5–9 |\n\
  | `ROWS BETWEEN 3 PRECEDING AND 4 FOLLOWING` | 2–9 |\n| `ROWS | RANGE BETWEEN UNBOUNDED\
  \ PRECEDING AND CURRENT ROW` | 1–5 |\n| `ROWS | RANGE BETWEEN CURRENT ROW AND UNBOUNDED\
  \ FOLLOWING` | 5–10 |\n\n图 5-2 说明了这些示例。\n\n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig2_HTML.png](img/335106_2_En_5_Fig2_HTML.png)\n\
  \n**图 5-2**\n\n**一些 framing 示例**\n\n`RANGE` 操作符不能在指定之前或之后的行数时使用，但它可以与 `UNBOUNDED\
  \ PRECEDING` 和 `UNBOUNDED FOLLOWING` 短语一起使用。不太可能有人会故意指定 RANGE；他们很可能是漏掉了帧而默认得到了 `RANGE`。\n\
  \nSQL 标准中有一些功能在 T-SQL 的实现中被遗漏了。该功能允许你指定一个时间段而不是行数。清单 5-1 是一个理论上的查询，可能在将来可用。\n\n\
  ```sql\n--5-1.1 一个理论上的查询\nSELECT SUM(TotalDue) OVER(ORDER BY OrderDate\nRANGE BETWEEN\
  \ INTERVAL 5 MONTH PRECEDING and 1 MONTH FOLLOWING\n) SixMonthTotal\nFROM Sales.SalesOrderHeader;\n\
  ```\n**清单 5-1**\n**一个使用预期中 RANGE 功能的理论查询**\n\n在了解当前实现功能中 `ROWS` 和 `RANGE` 的区别之前，先回顾几个使用帧的示例。\n\
  \n\n\n## 将框架应用于累计聚合和移动聚合\n\n框架概念最早随 SQL Server 2012 版本被引入。它适用于一部分窗口函数，包括你在第 4 章学到的累计聚合函数，以及两个偏移函数：`FIRST_VALUE`\
  \ 和 `LAST_VALUE`。你将在第 6 章学习偏移函数。\n\n通过指定框架，你可以计算反向累计总和和移动聚合。运行代码清单 5-2 查看一些示例。\n\
  \n```sql\n--5-2.1 累计与反向累计总和\nSELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate,\
  \ SalesOrderID, TotalDue,\nSUM(TotalDue) OVER(PARTITION BY CustomerID ORDER BY SalesOrderID\n\
  ROWS UNBOUNDED PRECEDING) AS RunningTotal,\nSUM(TotalDue) OVER(PARTITION BY CustomerID\
  \ ORDER BY SalesOrderID\nROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING) AS ReverseTotal\n\
  FROM Sales.SalesOrderHeader\nORDER BY CustomerID, SalesOrderID;\n--5-2.2 移动求和与移动平均\n\
  SELECT YEAR(OrderDate) AS OrderYear, MONTH(OrderDate) AS OrderMonth,\nCOUNT(*) AS\
  \ OrderCount,\nSUM(COUNT(*)) OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)\nROWS\
  \ BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthCount,\nAVG(COUNT(*)) OVER(ORDER\
  \ BY YEAR(OrderDate), MONTH(OrderDate)\nROWS BETWEEN 2 PRECEDING AND CURRENT ROW)\
  \ AS ThreeMonthAvg\nFROM Sales.SalesOrderHeader\nWHERE OrderDate >= '2012-01-01'\
  \ AND OrderDate < '2013-01-01'\nGROUP BY YEAR(OrderDate), MONTH(OrderDate);\n```\n\
  代码清单 5-2\n使用框架\n\n图 5-3 展示了部分结果。通过指定窗口应从当前行开始并持续到分区末尾，你可以像查询 1 那样创建一个反向累计总和。通过指定窗口由当前行及前两行组成，如查询\
  \ 2，你便创建了一个移动窗口。\n\n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig3_HTML.jpg](img/335106_2_En_5_Fig3_HTML.jpg)\n\
  图 5-3\n使用框架计算的部分结果\n\n你可能会注意到，使用 `N PRECEDING` 的计算在行数不足三个月时也会返回值。为了解决这个问题，你可以过滤掉不合格的行。代码清单\
  \ 5-3 展示了你可能会如何操作。\n\n```sql\n--5-3.1 过滤掉前置行数不足 2 的行\nWITH Sales AS (\nSELECT YEAR(OrderDate)\
  \ AS OrderYear, MONTH(OrderDate) AS OrderMonth,\nCOUNT(*) AS OrderCount,\nSUM(COUNT(*))\
  \ OVER(ORDER BY YEAR(OrderDate), MONTH(OrderDate)\nROWS BETWEEN 2 PRECEDING AND\
  \ CURRENT ROW) AS ThreeMonthCount,\nAVG(COUNT(*)) OVER(ORDER BY YEAR(OrderDate),\
  \ MONTH(OrderDate)\nROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS ThreeMonthAvg,\n\
  ROW_NUMBER() OVER(PARTITION BY YEAR(OrderDate)\nORDER BY MONTH(OrderDate)) AS RowNum\n\
  FROM Sales.SalesOrderHeader\nGROUP BY YEAR(OrderDate), MONTH(OrderDate)\n)\nSELECT\
  \ OrderYear, OrderMonth, OrderCount, ThreeMonthCount, ThreeMonthAvg\nFROM Sales\n\
  WHERE RowNum >= 3;\n```\n代码清单 5-3\n过滤掉前置行数不足两行的行\n\n此查询包含了按年分区的 `ROW_NUMBER`，因此不会返回\
  \ 2011 年的 5 月和 6 月。图 5-4 展示了部分结果。\n\n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig4_HTML.jpg](img/335106_2_En_5_Fig4_HTML.jpg)\n\
  图 5-4\n过滤掉不足行后的部分结果\n\n要获得如前面示例中的 `ThreeMonthAvg` 这样的移动聚合值，你必须使用框架。如果你只是想要一个累计总和，或许可以不指定框架。`ReverseTotal`\
  \ 确实需要框架，因为它从数据末尾开始，到当前行结束。通常在讲解窗口函数时，会有人提到将 `ORDER BY` 表达式改为降序 (descending) 可以得到反向累计总和，他们是对的。代码清单\
  \ 5-4 展示了一个例子。\n\n```sql\n--5-4.1 不使用框架的累计与反向累计总和\nSELECT CustomerID, CAST(OrderDate\
  \ AS DATE) AS OrderDate, SalesOrderID, TotalDue,\nSUM(TotalDue) OVER(PARTITION BY\
  \ CustomerID ORDER BY SalesOrderID) AS RunningTotal,\nSUM(TotalDue) OVER(PARTITION\
  \ BY CustomerID ORDER BY SalesOrderID DESC\n) AS ReverseTotal\nFROM Sales.SalesOrderHeader\n\
  ORDER BY CustomerID, SalesOrderID;\n```\n代码清单 5-4\n不使用框架的累计总和与反向累计总和\n\n其结果与图 5-3\
  \ 中第一个查询显示的结果相同。在 SQL Server 2019 之前，我会警告不要这样做，因为存在性能影响。你将在第 8 章了解更多关于 `ROWS` 和\
  \ `RANGE` 在性能上的差异。在此之前，你确实需要意识到这两种运算符在逻辑上的一个关键区别。\n\n\n\n## 理解 ROWS 与 RANGE 的逻辑差异\n\
  \n在第 8 章中，你将会看到，在 2019 年之前的 SQL Server 版本中，使用 `ROWS` 的窗口框架相比 `RANGE` 具有显著的性能优势。这两个操作符之间还存在逻辑上的差异。`ROWS`\
  \ 操作符是一个位置操作符，而 `RANGE` 操作符则是一个逻辑操作符。这非常类似于 `ROW_NUMBER` 和 `RANK` 之间的区别。当 `ORDER\
  \ BY` 表达式中存在并列值时，`RANK` 会重复该值，而 `ROW_NUMBER` 会返回唯一值。同样地，在计算累计总和时，如果 `OVER` 子句的 `ORDER\
  \ BY` 表达式中存在并列值，`ROWS` 和 `RANGE` 也会返回不同的结果。运行清单 5-5 来查看这种差异。\n\n```sql\n--5-5.1\
  \ 比较 ROWS 与 RANGE 的逻辑差异\nSELECT CustomerID, CAST(OrderDate AS DATE) AS OrderDate,\
  \ SalesOrderID, TotalDue,\nSUM(TotalDue) OVER(ORDER BY OrderDate\nROWS UNBOUNDED\
  \ PRECEDING) AS RunningTotalRows,\nSUM(TotalDue) OVER(ORDER BY OrderDate\nRANGE\
  \ UNBOUNDED PRECEDING) AS RunningTotalRange\nFROM Sales.SalesOrderHeader\nWHERE\
  \ CustomerID =11300\nORDER BY SalesOrderID;\n```\n\n清单 5-5\nROWS 与 RANGE 的区别\n\n\
  部分结果如图 5-5 所示。`OVER` 子句中的 `ORDER BY` 表达式都是 `OrderDate`，该列的值并不唯一。请看第 7 行和第 8 行，该客户在同一天下了两个订单。`RunningTotalRows`\
  \ 的值按预期递增，而 `RunningTotalRange` 的值对于这两行是相同的。在第 9 行，`RunningTotalRange` 的值又重新对齐了。\n\
  \n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig5_HTML.jpg](img/335106_2_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n比较 ROWS 与 RANGE 的部分结果\n\n在这种情况下，`ROWS` 的窗口从第一行开始，包含根据 `ORDER BY` 排序后直至当前行的所有行。`RANGE`\
  \ 的窗口则是从第一行开始，包含所有与当前行的 `ORDER BY` 表达式具有 *相同值* 的行。在确定第 7 行的窗口时，`RANGE` 不仅查看位置，还查看值。第\
  \ 8 行的 `OrderDate` 值与第 7 行的值相同，因此第 8 行也被包含在第 7 行的窗口中。\n\n如果你认为 `RANGE` 存在 bug，可以运行清单\
  \ 5-6，它使用了一种较旧的技术，返回的结果与使用 `RANGE` 相同。\n\n```sql\n--5-6.1 查看较旧的技术\nSELECT CustomerID,\
  \ CAST(OrderDate AS DATE) AS OrderDate,\nSalesOrderID, TotalDue,\n(SELECT SUM(TotalDue)\n\
  FROM Sales.SalesOrderHeader AS IQ\nWHERE IQ.CustomerID = OQ.CustomerID\nAND IQ.OrderDate\
  \ <= OQ.OrderDate) AS RunningTotal\nFROM Sales.SalesOrderHeader AS OQ\nWHERE CustomerID\
  \ =11300\nORDER BY SalesOrderID;\n```\n\n清单 5-6\n使用较旧技术得到相同结果\n\n部分结果如图 5-6 所示。请看第\
  \ 7 行和第 8 行。你会发现，由于 `OrderDate` 值相同，`RunningTotal` 的值也相同。\n\n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig6_HTML.jpg](img/335106_2_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n使用较旧技术计算累计总和的部分结果\n\n如果你确保 `ORDER BY` 表达式是唯一的，那么无论使用旧方法还是使用默认窗口框架的窗口聚合，都能得到预期的结果。\n\
  \n如前所述，`RANGE` 操作符实际上旨在与月份或季度等逻辑集合一起使用。此功能已由 ANSI 标准定义，但目前在 SQL Server 中尚未实现。在此期间，请务必始终使用\
  \ `ROWS` 来指定窗口框架。\n\n## 总结\n\n编写计算累计总和或移动平均值的查询很容易。默认情况下，窗口框架是用 `RANGE` 定义的，但建议使用\
  \ `ROWS`，以防 `ORDER BY` 表达式不唯一。在旧版本的 SQL Server 中，使用 `ROWS` 还会带来性能提升，你将在第 8 章中了解到这一点。窗口框架还允许你指定一个随结果向下移动的窗口大小，以便进行诸如三个月平均值之类的计算。\n\
  \n窗口框架的语法并不容易掌握，但时不时地查阅本章中的语法并不丢脸。幸运的是，除了使用累积窗口聚合以及 `FIRST_VALUE` 和 `LAST_VALUE`\
  \ 函数时，你不必担心窗口框架的问题。你将在下一章，即第 6 章中学习 `FIRST_VALUE` 和 `LAST_VALUE`。\n\n"
- '# 6. 瞥见另一行


  除了累积窗口聚合，Microsoft 在 SQL Server 2012 中还新增了八个窗口函数。其中四个函数（在本书中我将称之为偏移函数）是我最喜欢的 T-SQL
  函数，它们是 `LAG`、`LEAD`、`FIRST_VALUE` 和 `LAST_VALUE`。这些函数让你无需自连接，就能在结果中包含来自其他行的任何列，并且性能极佳。


  在本章中，你将学习如何使用 `LAG`、`LEAD`、`FIRST_VALUE` 和 `LAST_VALUE`。你会看到它们是多么容易使用。性能非常出色，但你将在第
  8 章中了解到这方面的信息。




  ## 理解 LAG 和 LEAD


  你在第 1 章中已经学习了如何使用 `LAG` 来解决股票市场问题。根据 `OVER` 子句的 `ORDER BY` 表达式，你可以使用 `LAG` 来获取结果集中当前行之前某行的某一列，使用
  `LEAD` 来获取当前行之后某行的某一列。`LAG` 和 `LEAD` 不支持框架，因此大多数情况下你无需担心性能问题。分区是可选的，就像其他窗口函数一样，而
  `ORDER BY` 是必需的。基本语法如下：


  ```sql

  LAG () OVER([PARTITION BY ] ORDER BY )

  LEAD () OVER([PARTITION BY ] ORDER BY )

  ```


  运行列表 6-1 来看看 `LAG` 和 `LEAD` 的实际应用。


  ```sql

  --6-1.1 使用 LAG 和 LEAD

  SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

  LAG(CAST(OrderDate AS DATE)) OVER(PARTITION BY CustomerID

  ORDER BY SalesOrderID) AS PrevOrderDate,

  LEAD(CAST(OrderDate AS DATE)) OVER(PARTITION BY CustomerID

  ORDER BY SalesOrderID) AS NextOrderDate

  FROM Sales.SalesOrderHeader;

  --6-1.2 将 LAG 和 LEAD 作为参数使用

  SELECT CustomerID, SalesOrderID, CAST(OrderDate AS DATE) AS OrderDate,

  DATEDIFF(DAY,LAG(OrderDate)

  OVER(PARTITION BY CustomerID ORDER BY SalesOrderID), OrderDate)

  AS DaysSincePrevOrder,

  DATEDIFF(DAY, OrderDate, LEAD(OrderDate)

  OVER(PARTITION BY CustomerID ORDER BY SalesOrderID))

  AS DaysUntilNextOrder

  FROM Sales.SalesOrderHeader;

  ```

  **列表 6-1**

  使用 `LAG` 和 `LEAD`


  图 6-1 展示了部分结果。查询 1 使用 `LAG` 和 `LEAD` 函数来查找相对于当前行的前一个和后一个订单日期。函数的参数是转换为 `DATE` 数据类型的
  `OrderDate`。就像其他窗口函数一样，`PARTITION BY` 是可选的。在此例中，数据按 `CustomerID` 进行分区。`ORDER BY`
  是 `OVER` 子句中非常重要的一部分，它决定了哪一行是前一行，哪一行是后一行。查询 2 的 `OVER` 子句与查询 1 相同，区别在于 `LAG` 和 `LEAD`
  表达式被用作 `DATEDIFF` 函数的参数，以计算订单之间的天数。


  ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig1_HTML.jpg](img/335106_2_En_6_Fig1_HTML.jpg)


  **图 6-1**

  `LAG` 和 `LEAD` 函数的部分结果


  请注意结果中有几个 `NULL` 值。第 1 行是分区的第一行，你无法找到更早的行，因此 `PrevOrderDate` 和 `DaysSincePrevOrder`
  返回 `NULL`。第 3 行是分区的最后一行，分区中没有第 3 行之后的行，所以第 3 行的 `NextOrderDate` 和 `DaysUntilNextOrder`
  为 null。


  到目前为止，你已经了解了使用 `LAG` 和 `LEAD` 的默认方式。这两个函数各自有两个可选参数。第一个参数是 `Offset`，默认值为 1。默认情况下，`LEAD`
  从当前行之前的一行提取表达式，`LAG` 从当前行之后的一行提取表达式。通过使用 `Offset` 参数，你可以访问距离超过一行的行中的列。关于偏移量需要注意的一个有趣点是，它只允许正整数。使用
  `LAG` 时，正数表示“向后”；使用 `LEAD` 时，正数表示“向前”。使用 `Offset` 参数的语法如下：


  ```sql

  LAG( [,]) OVER()

  LEAD( [,]) OVER()

  ```


  列表 6-2 演示了如何使用 `Offset` 参数。


  ```sql

  --6-2.1 在 LAG 中使用 Offset

  WITH Totals AS (

  SELECT YEAR(OrderDate) AS OrderYear,

  MONTH(OrderDate)/4 + 1 AS OrderQtr,

  SUM(TotalDue) AS TotalSales

  FROM Sales.SalesOrderHeader

  GROUP BY YEAR(OrderDate), MONTH(OrderDate)/4 + 1)

  SELECT OrderYear, Totals.OrderQtr, TotalSales,

  LAG(TotalSales, 4) OVER(ORDER BY OrderYear, OrderQtr)

  AS PreviousYearsSales

  FROM Totals

  ORDER BY OrderYear, OrderQtr;

  ```

  **列表 6-2**

  在 `LAG` 中使用 `Offset` 参数


  图 6-2 展示了结果。在此示例中，总计在一个 CTE 中按年和日历季度进行聚合。日历季度是通过计算月份、除以四再加一得到的。在外部查询中，通过使用偏移量为 4
  的 `LAG`，返回了同一季度上一年的销售额。请注意，此方法仅在数据中没有间隔时有效，因为它使用的是物理偏移量，而非逻辑偏移量。为了证明结果的正确性，请将第 8
  行（2013 年第一季度）的 `PreviousYearSales` 与第 4 行（2012 年第一季度）的 `TotalSales` 进行比较。


  ![../images/335106_2_En_6_Chapter/335106_2_En_6_Fig2_HTML.jpg](img/335106_2_En_6_Fig2_HTML.jpg)


  **图 6-2**

  在 `LAG` 中使用 `Offset` 的结果


  结果的前四行在 `PreviousYearSales` 中返回 `NULL`。这是因为在到达第 5 行之前，没有与当前行相距偏移量 4 的行。如果返回 `NULL`
  是个问题，你可以使用第二个可选参数，用默认值替换 `NULL`。要使用第二个参数，你也必须填写第一个参数。语法如下：


  ```sql

  LAG( [,] [,]) OVER()

  LEAD( [,] [,]) OVER()

  ```


  列表 6-3 演示了如何使用 `Default` 参数。


  ```sql

  --6-3.1 在 LAG 中使用 Offset 和 Default

  WITH Totals AS (

  SELECT YEAR(OrderDate) AS OrderYear,

  MONTH(OrderDate)/4 + 1 AS OrderQtr,

  SUM(TotalDue) AS TotalSales

  FROM Sales.SalesOrderHeader

  GROUP BY YEAR(OrderDate), MONTH(OrderDate)/4 + 1)

  SELECT OrderYear, Totals.OrderQtr, TotalSales,

  LAG(TotalSales, 4, 0) OVER(ORDER BY OrderYear, OrderQtr)

  AS PreviousYearsSales

  FROM Totals

  ORDER BY OrderYear, OrderQtr;

  ```

