  每当你需要使用某个聚合函数在不同于查询结果的层级上进行汇总时，考虑使用窗口聚合函数。


  ## 创建自定义窗口聚合函数


  从 SQL Server 2005 开始，你可以使用 .NET 语言通过 CLR（公共语言运行时）集成来创建自定义聚合函数。令人惊讶的是，这些函数也可以作为窗口聚合函数工作。创建一个
  C# DLL 超出了本书的范围，但本章的代码下载包含了一个用于此类函数的 C# 程序。如果你想学习如何创建自己的自定义函数，可以使用这个项目作为模板。有关创建自定义聚合函数的更多信息，请在
  SQL Server 文档中搜索“CLR User-Defined Aggregates”。


  该项目在章节的代码文件夹中包含一个 DLL 文件。将此文件复制到 SQL Server 可以访问的位置，例如 `C:\Custom` 文件夹。如果你已将文件复制到其他位置，则需要修改清单
  3-12 中的命令。还必须启用 CLR 集成，因此请确保在本地 SQL Server 实例上执行此操作，或者至少在允许更改此设置的实例上执行。运行清单 3-12
  来设置自定义窗口聚合函数。请注意，CLR 严格安全功能是在 SQL Server 2017 中添加的，但在安装了一些更新的 SQL Server 2016 上也可用。如果你的
  SQL Server 版本较低，请注释掉代码的 3-12.2 部分。


  ```

  --3-12.1 启用 CLR

  EXEC sp_configure ''clr_enabled'', 1;

  GO

  RECONFIGURE;

  GO

  --3-12.2 启用未签名的程序集

  EXEC sp_configure ''show advanced options'', 1;

  RECONFIGURE;

  EXEC sp_configure ''clr strict security'',0;

  GO

  RECONFIGURE;

  --3-12.3 注册 DLL

  CREATE ASSEMBLY CustomAggregate FROM

  ''C:\Custom\CustomAggregate.dll'' WITH PERMISSION_SET = SAFE;

  GO

  --3-12.4 创建函数

  CREATE Aggregate Median (@Value INT) RETURNS INT

  EXTERNAL NAME CustomAggregate.Median;

  GO

  --3-12.5 测试函数

  WITH Orders AS (

  SELECT CustomerID, SUM(OrderQty) AS OrderQty, SOH.SalesOrderID

  FROM Sales.SalesOrderHeader AS SOH

  JOIN Sales.SalesOrderDetail AS SOD

  ON SOH.SalesOrderID = SOD.SalesOrderDetailID

  GROUP BY CustomerID, SOH.SalesOrderID)

  SELECT CustomerID, OrderQty, dbo.Median(OrderQty) OVER(PARTITION BY CustomerID)
  AS Median

  FROM Orders

  WHERE CustomerID IN (13011, 13012, 13019);

  GO

  ```

