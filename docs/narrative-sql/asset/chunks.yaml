    table1 t2`<br>`  WHERE t2.category = t1.category`<br>`);` |

    | 公共表表达式 | 基本 CTE | `WITH cte_name AS (`<br>`  SELECT column1, column2`<br>`  FROM
    table_name`<br>`  WHERE condition`<br>`)<br>`SELECT * FROM cte_name;` |

    | 多个 CTE | `WITH`<br>`cte1 AS (`<br>`  SELECT * FROM table1 WHERE condition1`<br>`),`<br>`cte2
    AS (`<br>`  SELECT * FROM table2 WHERE condition2`<br>`)<br>`SELECT * FROM cte1
