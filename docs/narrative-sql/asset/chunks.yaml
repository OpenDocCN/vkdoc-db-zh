    | 103 | 1 | 75.00 |


    Table [2-17](#619961_1_En_2_Chapter.xhtml#Tab17) illustrates a number of primary
    aggregate functions that play pivotal roles in data analysis in SQL.


    Table 2-17


    A Number of Primary Aggregate Functions


    | Aggregate Function | Description |

    | --- | --- |

    | `COUNT` | Used to count the number of items in a particular column or dataset,
    helping determine the size, extent, or frequency of various categories within
    the data. For example, `COUNT` can tell how many books are in each category of
    a bookstore’s inventory, providing a quantitative base for inventory management
    decisions. |

    | `AVG` | Used to calculate the average value of a numeric column, which is crucial
    for understanding typical values when dealing with variables such as prices, ages,
    or any measurable quantities where averages can provide insights into normal behavior
    or expected outcomes. For instance, determining the average number of pages in
    their books can help publishers understand typical publication lengths within
    genres. |

    | `MAX` | Finds the highest value in a column. This is particularly useful when
    you need to identify peaks or maximum levels in datasets, such as finding the
    most expensive item sold in a store or the highest score achieved by an individual.
    `MAX` can highlight outliers or exceptional cases in data analysis. |

    | `MIN` | Conversely, the `MIN` function determines the lowest value in a column.
    It can be crucial for identifying the least extreme cases, such as the least costly
    product, which could be useful for businesses looking to market entry-level options
    to customers. |

    | `STDDEV` | Computes the standard deviation of a specified numeric column, which
    measures the amount of variation or dispersion of a set of values. Useful in quality
    control, finance, and any field where variability is key to the analysis. |

    | `VAR` | Calculates the variance of a specified numeric column, similar to `STDDEV`,
    but gives the square of the dispersion. This is critical in financial and scientific
    calculations where understanding variability is essential. |'
  raw: '### Differences Between Regular Arithmetic Functions and Aggregate Functions
    in SQL


    Regular arithmetic functions in SQL are useful for manipulating data within individual
    rows. They perform calculations like addition, subtraction, multiplication, and
    more, transforming or combining values on a row-by-row basis. Aggregate functions,
    on the other hand, take a broader view. Summarizing entire groups of data is one
    of their strengths. The `COUNT`, `SUM`, `AVG`, `MIN`, and `MAX` functions combine
    multiple rows into a single, meaningful value, revealing total quantities, averages,
    and high and low values within a specific column. In contrast to regular arithmetic
    functions, aggregate functions help you identify trends and patterns across your
    data.


    The following lists describe some of the key differences between regular arithmetic
    functions and aggregate functions in SQL.


    **Regular arithmetic functions**:


    *   **Purpose**: Perform calculations on a row-by-row basis. They manipulate data
    within a single row or combine values from multiple columns within a row.


    *   **Examples**: `+`, `-`, `*`, `/`, `MOD (modulo)`, `ROUND`, `SQRT`, `ABS` (absolute
    value), and so on.


    *   **Output**: They return a single value for each row processed in the query.


    *   **Focus on individual values**: They operate on individual values within a
    row, transforming or combining them as needed.


    **Aggregate functions**:


    *   **Purpose**: Summarize data by performing calculations on entire groups of
    values. They condense multiple rows into a single, meaningful value.


    *   **Examples**: `SUM`, `COUNT`, `AVG`, `MIN`, and `MAX`.


    *   **Output**: They return a single value that represents the overall result
    of the calculation across a group of rows.


    *   **Focus on summarization**: They focus on providing a summary statistic (total,
    average, minimum, maximum, etc.) for the data in a specific column or set of columns.


    Table [2-13](#619961_1_En_2_Chapter.xhtml#Tab13) summarizes the differences between
    regular arithmetic functions and aggregate functions.


    Table 2-13


    Differences Between Regular Arithmetic Functions and Aggregate Functions


    | Feature | Regular Arithmetic Functions | Aggregate Functions |

    | --- | --- | --- |

    | Purpose | Row-by-row calculations | Summarize data groups |

    | Input | Values within a row | Groups of rows |

    | Output | Single value per row | Single value |

    | Focus | Individual values manipulation | Summarization |


