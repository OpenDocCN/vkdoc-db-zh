    ## 累计销售额计算


    以下查询计算了每个车型随时间的累计销售额：


    ```sql

    SELECT Sale_ID, Model_Name, Sale_Date,

    SUM(Sales_Amount) OVER (PARTITION BY Model_Name ORDER BY Sale_Date) AS Cumulative_Sales

    FROM Car_Sales;

    ```


    Anna 使用带有 `OVER()` 子句的 `SUM()` 函数来计算每个车型按销售日期排序的累计销售总额。通过这个查询，从 `Car_Sales` 表中执行了每个车型的累计销售额计算。`SUM(Sales_Amount)
    OVER (PARTITION BY Model_Name ORDER BY Sale_Date)` 计算每个 `Model_Name` 按 `Sale_Date`
    排序的销售累计总额。该方法返回 `Sale_ID`、`Model_Name`、`Sale_Date` 以及截至该次销售的累计销售额。表 5-16 显示了每个车型随时间的累计销售总额。


