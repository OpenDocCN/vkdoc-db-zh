  trans: "# SQL 命令类型：数据库交互的五大原则\n\nSQL 中有五种不同的命令类型，每种在管理和操作数据时都执行特定的功能。这些类别分别是：数据定义语言\
    \ (DDL)、数据操作语言 (DML)、数据控制语言 (DCL)、事务控制语言 (TCL) 和数据查询语言 (DQL)。\n\n*   **数据定义语言\
    \ (DDL)**：DDL 命令用于定义、修改和管理数据库对象（如表、索引和视图）的模式与结构。这些命令不直接操作数据本身，而是塑造容纳数据的“容器”，允许创建和修改数据库结构。\n\
    *   **数据操作语言 (DML)**：DML 命令很可能是最常用的，因为它们直接处理现有数据库结构内的数据操作。它们使用户能够插入、更新、删除和管理数据库数据。\n\
    *   **数据控制语言 (DCL)**：DCL 命令侧重于数据库对象的权限和访问控制。出于安全和保密性考虑，这些命令在多用户数据库中至关重要。\n*  \
    \ **事务控制语言 (TCL)**：TCL 命令将由 DML 操作所做的更改作为事务进行管理。事务要么完全处理，要么完全不处理，从而确保数据的一致性和完整性。这些命令允许用户提交或回滚对数据库的更改。\n\
    *   **数据查询语言 (DQL)**：DQL 涉及数据的检索，主要由 `SELECT` 命令表示，该命令查询数据库中的表以获取数据。DQL 允许用户精确指定查询应返回哪些数据，使其成为提取和分析存储在数据库中的信息的强大工具。\n\
    \n图 1-1 展示了 SQL 命令类型的概览，指出了每个类别及其各自的命令。此图作为指南，描绘了不同的 SQL 命令类型。这种可视化不仅有助于理解 SQL\
    \ 内部的功能划分，还突出了每个类别中可以执行的具体操作。\n\n![阐释 SQL 命令类型的流程图。中心节点标记为 \"SQL 命令类型\"，并分为五个类别：DDL（数据定义语言），包含\
    \ \"CREATE\"、\"DROP\"、\"ALTER\"；DML（数据操作语言），包含 \"INSERT\"、\"UPDATE\"；DCL（数据控制语言），包含\
    \ \"GRANT\"、\"REVOKE\"；TCL（事务控制语言），包含 \"COMMIT\"、\"ROLLBACK\"；以及 DQL（数据查询语言），包含\
    \ \"SELECT\"。](img/619961_1_En_1_Fig1_HTML.png)\n*图 1-1：SQL 命令类型*\n\n当涉及到数据分析时，你将主要使用数据操作语言\
    \ (DML) 和数据查询语言 (DQL) 命令。这两类 SQL 命令特别有用：\n\n*   **DML 和 DQL 的共同点**：\n    1.  **数据处理的灵活性**：DML\
    \ 提供了根据分析需要操作数据的灵活性，确保数据集准确且相关。DQL 则提供了挖掘这些数据的工具，提取出对知情决策至关重要的洞察和信息。\n    2. \
    \ **高级分析的基础**：其他 SQL 命令侧重于数据库结构和访问控制，而 DML 和 DQL 则直接关注数据本身。掌握这些命令使分析师能够提取和操作数据。\n\
    \    3.  **数据完整性**：DML 有助于维护数据集的质量和相关性，而 DQL 确保分析过程中数据的完整性得以保持。通过使用 DQL，分析师可以执行只读操作，不会改变或损坏底层数据。\n\
    *   **数据查询语言 (DQL)**：\n    1.  **数据检索**：SQL 环境中数据分析的本质是查询数据库以获取特定数据集。`SELECT`\
    \ 允许你精确指定要检索哪些数据，包括从哪些表获取以及在什么条件下获取。\n    2.  **数据聚合与筛选**：`SELECT` 查询可以通过 `WHERE`、`GROUP\
    \ BY` 和 `HAVING` 等子句进行增强。它们筛选数据、聚合数据（例如，求平均值、总和、计数），并选择满足特定条件的数据。这些操作是数据分析的基础，使分析师能够探索数据中的趋势、模式和异常值。\n\
    \    3.  **连接表**：数据分析通常需要组合来自多个表的数据以获得完整视图。`SELECT` 命令可以根据特定条件连接表，从而实现跨不同数据集的全面分析。\n\
    *   **数据操作语言 (DML)**：\n    1.  **洞察提取**：DML 命令用于在数据库表中插入、更新、删除和管理数据。数据分析的主要目标是从数据中提取洞察，而不是修改它。\n\
    \    2.  **数据准备**：在分析数据之前，通常需要清理和预处理数据。像 `UPDATE` 这样的 DML 命令可以纠正数据错误，`DELETE`\
    \ 可以删除不相关或重复的记录。数据准备对于准确分析至关重要。\n    3.  **插入数据**：`INSERT` 命令对于向数据库添加新数据非常有用，这些数据可能是分析所需的。这可能包括新的数据点、计算指标或你希望存储以备将来使用的先前分析结果。\n\
    \nDML 和 DQL 对于数据分析至关重要。DML 为分析准备数据环境，确保其干净且是最新的，而 DQL 则使分析师能够查询、聚合和解释数据，从而从中得出可行的见解。它们共同构成了\
    \ SQL 数据库中数据分析的支柱。\n\n# 数据分析中的事务语句与查询语句\n\nSQL 中事务语句与查询语句的区别指的是数据分析的两个基本方面：管理数据操作的完整性和获取洞察。\n\
    \n## 数据分析中的事务语句\n\n事务语句管理数据更改如何应用或回滚，在确保整个分析过程中数据的完整性和一致性方面起着至关重要的作用。当执行多个操作时，事务语句允许分析师保持一致的数据状态。例如，在一个事务中更新数据库以纠正错误或反映新信息，可确保所有更新都成功应用，或者都不应用。这可以防止可能导致数据不一致的部分更新。数据分析师经常需要试验数据转换或更正。事务提供了安全性（使用\
    \ `BEGIN`、`COMMIT` 和 `ROLLBACK`），允许分析师在确定结果之前测试更改，而不会永久改变数据。\n\n## 数据分析中的查询语句\n\
    \n专注于数据检索的查询语句是数据分析的基础。它们使分析师能够探索、聚合和可视化数据，提取有意义的洞察。探索数据集以更好地理解潜在的模式、趋势和异常，构成了数据分析的核心。查询语句\
    \ (`SELECT`) 允许分析师筛选大量数据、过滤特定子集，并跨表执行复杂的连接以收集全面的洞察。"
- fmt: '# Integrating Transaction and Query Statements in Data Analysis


    While transaction statements provide a safe means of manipulating data, query
    statements provide a means of extracting insights. In an organized data analysis
    workflow, analysts may use transaction statements to prepare data for analysis
    (e.g., correcting, updating, or cleaning data), and query statements to extract
    insights from the data once it has reached a reliable state. It should be noted
    that transactions can also play a role in ensuring that the data manipulation
    steps are reproducible and reversible, which is critical for verifying and validating
    the analysis results.


    ## Setting Up a Storytelling Environment with PostgreSQL


    Creating a storytelling environment with PostgreSQL involves setting up a database
    system where data can be stored, manipulated, and queried to uncover and narrate
    compelling stories hidden within data. PostgreSQL offers an ideal platform for
    data analysis and storytelling. This section guides you through the initial steps
    to establish such an environment, emphasizing the simplicity and power of PostgreSQL.


    ### Step 1: Installation


    **Download and install PostgreSQL**. Download the PostgreSQL installer for your
    operating system from the [official PostgreSQL website](https://www.postgresql.org/download/).
    The installation process is straightforward. Follow the on-screen instructions
    and make sure to note the administrator password you set during installation as
    well as the default port on which PostgreSQL will run (usually 5432).


    ### Step 2: Create Your First Database


    **Access PostgreSQL**. After installation, access PostgreSQL through its command-line
    interface (CLI) known as `psql`, or use a graphical user interface (GUI) tool.
    Both provide comprehensive database management capabilities, with `pgAdmin` being
    more beginner-friendly due to its visual nature.


    **Create a database**. To create your first database, use the `psql` command-line
    interface or `pgAdmin`. In PostgreSQL, you can create a database named `storytelling_db`
    by executing this command:


    ```

    CREATE DATABASE storytelling_db;

    ```


    ### Step 3: Define Data Structures


    **Create the tables.** With your database in place, the next step is to define
    the structure of your data by creating tables. For example, if you’re telling
    stories about customer interactions, you might create a table called `customers`
    with fields for customer ID, name, email, and interaction dates.


    ```

    CREATE TABLE customers (

    customer_id SERIAL PRIMARY KEY,

    name VARCHAR(100),

    email VARCHAR(100),

    interaction_date DATE

    );

    ```


    **Insert the data**. Fill your table with initial data to start your analysis.
    `INSERT` statements add records to your tables, laying the groundwork for your
    storytelling.


    ```

    INSERT INTO customers (name, email, interaction_date) VALUES

    (''Jane Doe'', ''jane.doe@email.com'', ''2022-01-01''),

    (''John Smith'', ''john.smith@email.com'', ''2022-01-02'');

    ```


    The database, named `storytelling_db`, contains a table called `customers`. Table
    `1-2` illustrates the `customers` table, which was created to hold customer interaction
    data. This table is structured to capture essential details about customers and
    their interactions. The fields within the `customers` table are as follows:


    *   `name`: The customer’s name, stored as a variable character string (`VARCHAR`)
    with a maximum length of 100 characters.

    *   `email`: The customer’s email address, also stored as a `VARCHAR` with a maximum
    length of 100 characters.

    *   `interaction_date`: The date of the interaction with the customer, stored
    as a `DATE`.


    This structure allows you to store and query customer interaction data effectively.
    The next section discusses the different data types of variables in SQL.


    **Table 1-2 The Customer Table**


    | customer_id | Name | Email | interaction_date |

    | --- | --- | --- | --- |

    | 1 | Jane Doe | `jane.doe@email.com` | 2022-01-01 |

    | 2 | John Smith | `john.smith@email.com` | 2022-01-02 |


    Setting up an environment using PostgreSQL is a crucial step. The initial steps
    in creating a robust analysis and storytelling platform are installation, database
    creation, data structuring, and querying. In the forthcoming chapters of this
    book, you are taken on a detailed, step-by-step journey into the art of query
    writing. Through the examples provided in the next chapters, you will develop
    SQL skills, from the basics to advanced querying techniques.'
