    ## Understanding SQL Views


    In PostgreSQL, a *view* is essentially a virtual table derived from the result
    of a stored query. It doesn’t store data itself; instead, it provides a customized,
    simplified view of the underlying data from one or more tables.


    SQL views in PostgreSQL offer a powerful way to streamline database interactions.
    The concept of a view can be described as a virtual table created as a result
    of a stored query. A key advantage of views is that they simplify complex queries
    by encapsulating them, allowing them to be reused; instead of repeatedly writing
    elaborate queries, you can use views as standard tables. The use of views enhances
    the security of data by restricting access to specific columns or rows, allowing
    users to see only the information they require. In addition, views provide data
    abstraction, protecting applications from schema changes even when table structure
    alterations are made. Views also improve readability by simplifying complex queries
    into smaller, more manageable components.


    ### Basic Syntax for SQL Views


    The basic syntax of an SQL view is provided here:


    ```

    CREATE VIEW view_name AS

    SELECT column1, column2, ...

    FROM table1

    WHERE condition;

    ```


    Here, `CREATE VIEW` creates a virtual table, called a view. It stores an SQL query
    that dynamically generates data when called, without storing the data itself.
    The syntax begins with `CREATE VIEW` followed by the desired view name. The `AS`
    keyword introduces the query that defines the view. The `SELECT` statement specifies
    the columns to include, the source table using `FROM`, and optional filtering
    conditions using `WHERE`.


    ### Types of Views in PostgreSQL


    There are two ways to implement views in PostgreSQL—through the use of standard
    views and materialized views. Standard views, created with `CREATE VIEW`, act
    as virtual tables, presenting the results of stored queries without physically
    storing the data. This makes them perpetually up-to-date, reflecting any changes
    to the underlying tables. In contrast, materialized views, created with `CREATE
    MATERIALIZED VIEW`, store the query’s result as a physical table. This creates
    a snapshot of the data at the time of creation or refresh.


    This storage mechanism significantly enhances performance for frequently accessed,
    complex queries, but requires manual or scheduled data refreshes. A trade-off
    between real-time data accuracy and query performance optimization determines
    the choice between standard and materialized views (see Table [9-6](#619961_1_En_9_Chapter.xhtml#Tab6)).


    Table 9-6


    Key Differences Between Standard Views and Materialized Views


    | Feature | Standard Views | Materialized Views |

    | --- | --- | --- |

    | Data storage | Virtual; no physical data stored | Physical table; data is stored
    |

    | Data currency | Always up-to-date | Snapshot; requires manual refresh |

    | Performance | Query performance depends on underlying tables | Improved performance
    for complex queries |

    | Use case | Simplification, security, abstraction | Performance optimization,
    reporting |


    ### The Role of Views in Data Analysis Tasks


    Views can play a crucial role in SQL data analysis, serving as a layer of abstraction
    that significantly enhances the analytical process’ efficiency. They simplify
    complex data models by presenting focused, pre-aggregated, and filtered representations,
    reducing query complexity and increasing readability. By encapsulating intricate
    logic, views act as reusable analysis building blocks, ensuring consistency and
    accelerating analysis through pre-computed summaries and segmented data subsets.
    In addition to speeding up data processing, this improves accuracy and productivity,
    allowing analysts to concentrate on extracting insights rather than retrieving
    data. In addition, views serve to enhance data security by restricting access
    to sensitive information, making them essential for streamlined and secure analytics.'
  trans: "\n```\nEXPLAIN ANALYZE SELECT t.name, s.round_number, s.strokes\nFROM scores\
    \ s\nJOIN players p ON s.player_id = p.player_id\nJOIN tournaments t ON s.tournament_id\
    \ = t.tournament_id\nWHERE p.name = 'Tiger Woods';\n```\n\n`EXPLAIN ANALYZE` 的输出展示了查询的执行步骤。首先，对\
    \ `Scores` 表进行顺序扫描，检索出 1,700 行。接着，对 `Players` 表进行顺序扫描，通过过滤 9 行找到名为“Tiger Woods”的球员。然后，通过哈希连接合并两个表，匹配\
    \ `player_id` 值。随后，使用 `tournaments_pkey` 进行索引扫描，根据 `tournament_id` 检索赛事名称，该操作执行了两次。查询总执行时间为\
    \ 0.107 毫秒，这得益于索引和有限的匹配行数，表明性能很快。\n\n```\nQUERY PLAN\n\nNested Loop  (cost=14.55..47.85\
    \ rows=10 width=126) (actual time=0.041..0.082 rows=2 loops=1)\n->  Hash Join\
    \  (cost=14.40..45.92 rows=10 width=12) (actual time=0.027..0.059 rows=2 loops=1)\n\
    \    Hash Cond: (s.player_id = p.player_id)\n    ->  Seq Scan on scores s  (cost=0.00..27.00\
    \ rows=1700 width=16) (actual time=0.005..0.014 rows=10 loops=1)\n    ->  Hash\
    \  (cost=14.38..14.38 rows=2 width=4) (actual time=0.016..0.018 rows=1 loops=1)\n\
    \        Buckets: 1024  Batches: 1  Memory Usage: 9kB\n        ->  Seq Scan on\
    \ players p  (cost=0.00..14.38 rows=2 width=4) (actual time=0.004..0.007 rows=1\
    \ loops=1)\n            Filter: ((name)::text = 'Tiger Woods'::text)\n       \
    \     Rows Removed by Filter: 9\n->  Index Scan using tournaments_pkey on tournaments\
    \ t  (cost=0.15..0.19 rows=1 width=122) (actual time=0.006..0.006 rows=1 loops=2)\n\
    \    Index Cond: (tournament_id = s.tournament_id)\nPlanning Time: 0.101 ms\n\
    Execution Time: 0.107 ms\n(13 rows)\n```\n\n对于按球员姓名筛选、连接大型表以及聚合分数等数据分析任务，使用索引能显著提升速度。使用\
    \ `EXPLAIN` 和 `EXPLAIN ANALYZE` 有助于确认 PostgreSQL 是否利用了索引来获得更好的性能。这种优化对于商业智能至关重要，能够基于球员表现和赛事结果实现更快的决策。\n\
    \nMartina 出于多种原因，希望在此时删除一个索引。首先，如果查询不再使用该索引，它会不必要地消耗存储空间，并在未来的 `INSERT`、`UPDATE`\
    \ 和 `DELETE` 等写入操作中降低速度。其次，如果数据分布随时间发生变化，索引可能会变得低效，需要重新创建。最后，删除冗余索引可以提升数据库的整体性能，尤其是在为重叠目的维护多个索引的情况下。要在\
    \ PostgreSQL 中删除索引，可使用 `DROP INDEX` 语句。当 Martina 想要删除名为 `players_pkey` 的索引时，她可以按如下方式操作：\n\
    \n```\nDROP INDEX players_pkey;\n```\n\n在这个故事中，重点在于如何优化查询执行，以及如何评估这种优化。如前所述，在处理大型数据表和海量数据时，索引具有积极效果，但这样的表很难在本书的篇幅内容纳！因此，本故事的目的仅限于深入洞察使用\
    \ `INDEX` 进行优化的过程，并使用 `EXPLAIN` 或 `EXPLAIN ANALYZE` 评估其有效性的过程。\n\n## 理解 SQL 视图\n\
    \n在 PostgreSQL 中，*视图* 本质上是一个虚拟表，源自存储查询的结果。它本身不存储数据；而是提供了一个来自一个或多个表的底层数据的定制化、简化的视图。\n\
    \nPostgreSQL 中的 SQL 视图提供了一种强大的方式来简化数据库交互。视图的概念可以描述为一个作为存储查询结果而创建的虚拟表。视图的一个关键优势是它们通过封装复杂查询来简化它们，使其可以复用；你无需反复编写复杂的查询，而是可以像使用标准表一样使用视图。视图的使用通过限制对特定列或行的访问来增强数据安全性，允许用户只看到他们所需的信息。此外，视图提供了数据抽象，即使在表结构发生变更时也能保护应用程序免受其影响。视图还通过将复杂查询简化为更小、更易管理的组成部分来提高可读性。\n\
    \n### SQL 视图的基本语法\n\nSQL 视图的基本语法如下：\n\n```\nCREATE VIEW view_name AS\nSELECT column1,\
    \ column2, ...\nFROM table1\nWHERE condition;\n```\n\n这里，`CREATE VIEW` 创建了一个称为视图的虚拟表。它存储了一个\
    \ SQL 查询，该查询在调用时动态生成数据，而不存储数据本身。语法以 `CREATE VIEW` 开头，后跟所需的视图名称。`AS` 关键字引入了定义视图的查询。`SELECT`\
    \ 语句指定了要包含的列，使用 `FROM` 指定了源表，并使用 `WHERE` 指定了可选的过滤条件。\n\n### PostgreSQL 中的视图类型\n\
    \n在 PostgreSQL 中实现视图有两种方式——使用标准视图和物化视图。使用 `CREATE VIEW` 创建的标准视图充当虚拟表，呈现存储查询的结果而不实际存储数据。这使它们始终保持最新，能够反映底层表的任何更改。相比之下，使用\
    \ `CREATE MATERIALIZED VIEW` 创建的物化视图将查询结果存储为物理表。这创建了创建或刷新时数据的快照。\n\n这种存储机制显著提升了频繁访问的复杂查询的性能，但需要手动或计划的数据刷新。在实时数据准确性和查询性能优化之间权衡，决定了在标准视图和物化视图之间的选择（参见表\
    \ 9-6）。\n\n表 9-6\n\n标准视图与物化视图的关键区别\n\n| 特性 | 标准视图 | 物化视图 |\n| --- | --- | ---\
    \ |\n| 数据存储 | 虚拟；不存储物理数据 | 物理表；存储数据 |\n| 数据时效性 | 始终最新 | 快照；需要手动刷新 |\n| 性能 | 查询性能取决于底层表\
    \ | 提升复杂查询的性能 |\n| 使用场景 | 简化、安全、抽象 | 性能优化、报表 |\n\n### 视图在数据分析任务中的作用\n\n视图可以在 SQL\
    \ 数据分析中发挥关键作用，作为一层抽象，显著提升分析过程的效率。它们通过呈现专注的、预聚合和过滤后的表示来简化复杂的数据模型，降低查询复杂度并提高可读性。通过封装复杂的逻辑，视图充当可复用的分析构建块，确保一致性，并通过预计算的摘要和分割的数据子集来加速分析。除了加快数据处理速度，这还提高了准确性和生产力，让分析人员能够专注于提取洞见，而不是检索数据。此外，视图通过限制对敏感信息的访问来增强数据安全性，使其成为精简和安全分析的重要工具。\n"
- fmt: "# The Second Story: Car Race Data Analysis\n\nNathalie, a data analyst for\
    \ Speed Track Racing, needs to analyze race performance data from recent competitions.\
    \ As shown in Tables 9-7, 9-8, and 9-9, the database contains three main tables:\
    \ `Drivers`, `Races`, and `Results`. By creating SQL views and using the data\
    \ in these tables, Nathalie wants to optimize repetitive queries and improve analysis\
    \ efficiency.\n\n**Table 9-9**  \n**The Results Table**\n\n| `result_id` | `driver_id`\
    \ | `race_id` | `position` | `lap_time_sec` |\n| --- | --- | --- | --- | --- |\n\
    | 1 | 1 | 101 | 1 | 90.23 |\n| 2 | 2 | 101 | 2 | 90.45 |\n| 3 | 3 | 101 | 3 |\
    \ 91.12 |\n| 4 | 4 | 102 | 1 | 87.32 |\n| 5 | 5 | 102 | 2 | 87.78 |\n| 6 | 6 |\
    \ 103 | 1 | 89.01 |\n| 7 | 7 | 103 | 2 | 89.23 |\n| 8 | 8 | 104 | 1 | 88.45 |\n\
    | 9 | 9 | 104 | 3 | 89.67 |\n| 10 | 10 | 105 | 1 | 92.89 |\n\n**Table 9-8**  \n\
    **The Races Table**\n\n| `race_id` | `Location` | `Date` |\n| --- | --- | ---\
    \ |\n| 101 | Silverstone | 2023-07-09 |\n| 102 | Monza | 2023-09-03 |\n| 103 |\
    \ Spa-Francorch. | 2023-07-30 |\n| 104 | Suzuka | 2023-09-24 |\n| 105 | Monaco\
    \ | 2023-05-28 |\n| 106 | Austin | 2023-10-22 |\n| 107 | Singapore | 2023-09-17\
    \ |\n| 108 | Interlagos | 2023-11-05 |\n| 109 | Budapest | 2023-07-23 |\n| 110\
    \ | Melbourne | 2023-04-02 |\n\n**Table 9-7**  \n**The Drivers Table**\n\n| `driver_id`\
    \ | `Name` | `Team` |\n| --- | --- | --- |\n| 1 | Lewis Hamilton | Mercedes |\n\
    | 2 | Max Verstappen | Red Bull |\n| 3 | Charles Leclerc | Ferrari |\n| 4 | Sergio\
    \ Perez | Red Bull |\n| 5 | Carlos Sainz | Ferrari |\n| 6 | George Russell | Mercedes\
    \ |\n| 7 | Lando Norris | McLaren |\n| 8 | Fernando Alonso | Aston Martin |\n\
    | 9 | Pierre Gasly | Alpine |\n| 10 | Esteban Ocon | Alpine |\n\nNathalie aims\
    \ to answer the following questions based on race performance data collected from\
    \ recent races.\n\n*   Who are the top performers who finished first in each race?\n\
    *   What is the average lap time for each driver across all races?\n*   How many\
    \ first-place finishes does each team have?\n*   Who were the winners of each\
    \ race, along with race location and date?\n*   Who recorded the fastest lap in\
    \ each race?\n\n## Identifying Top Performers\n\nNathalie wrote the following\
    \ query to identify drivers who consistently performed well across tracks. This\
    \ task can be made easier with views, which store logic for joining the `Drivers`,\
    \ `Races`, and `Results` tables. Instead of rewriting complex `JOIN`s every time,\
    \ analysts can query the `top_performers` view directly. This improves readability,\
    \ reduces errors, and ensures consistency.\n\n```sql\nCREATE VIEW top_performers\
    \ AS\nSELECT d.name, r.location, res.position\nFROM results res\nJOIN drivers\
    \ d ON res.driver_id = d.driver_id\nJOIN races r ON res.race_id = r.race_id\n\
    WHERE res.position = 1;\n```\n\nThis SQL query creates a view called `top_performers`,\
    \ which displays the race winners. This query selects driver names, race locations,\
    \ and finishing positions, and joins these three tables: `Results`, `Drivers`,\
    \ and `Races`. It then connects these tables using `driver_id` and `race_id` as\
    \ keys, and filters to only include first-place finishes (`position = 1`). Based\
    \ on the filter, the view will display the name of each winning driver, the location\
    \ where they won, and their position. Table 9-10 illustrates what is happening\
    \ in this query as a result of the `SELECT` statement.\n\n**Table 9-10**  \n**The\
    \ Race Winners**\n\n| `Name` | `Location` | `Position` |\n| --- | --- | --- |\n\
    | Lewis Hamilton | Silverstone | 1 |\n| Sergio Perez | Monza | 1 |\n| George Russell\
    \ | Spa-Francorch. | 1 |\n| Fernando Alonso | Suzuka | 1 |\n| Esteban Ocon | Monaco\
    \ | 1 |\n\n## Calculating Average Lap Time\n\nThe following query was written\
    \ by Nathalie to find the average lap time for each driver across all races, and\
    \ to answer the question of driver consistency. This simplifies reporting, especially\
    \ if this metric is needed in multiple dashboards or reports. Views also ensure\
    \ that there is only one source of truth, keeping calculations consistent across\
    \ all analyses.\n\n```sql\nCREATE VIEW avg_lap_time AS\nSELECT d.name, AVG(res.lap_time_sec)\
    \ AS avg_time\nFROM results res\nJOIN drivers d ON res.driver_id = d.driver_id\n\
    GROUP BY d.name;\n```\n\nThis SQL query creates a view called `avg_lap_time`,\
    \ which calculates the average lap time for each driver. It selects driver names\
    \ from the `Drivers` table and computes the average lap times, in seconds, from\
    \ the `Results` table. The query joins these tables using `driver_id` as the common\
    \ key, allowing it to match lap times with the corresponding drivers. Results\
    \ are grouped by driver name, meaning the view displays each driver’s name alongside\
    \ their average lap time across all recorded races. Using this view, it is possible\
    \ to quickly compare the overall performance of drivers when it comes to their\
    \ speed. The driver names are illustrated in Table 9-11, along with the average\
    \ lap time, in seconds, calculated for each driver.\n\n**Table 9-11**  \n**The\
    \ Average Lap Time for Each Driver**\n\n| `Name` | `avg_time` |\n| --- | --- |\n\
    | Sergio Perez | 87.31999969 |\n| Lando Norris | 89.2300034 |\n| Pierre Gasly\
    \ | 89.66999817 |\n| Lewis Hamilton | 90.2300034 |\n| Fernando Alonso | 88.44999695\
    \ |\n| Max Verstappen | 90.44999695 |\n| Esteban Ocon | 92.88999939 |\n| George\
    \ Russell | 89.01000214 |\n| Charles Leclerc | 91.12000275 |\n| Carlos Sainz |\
    \ 87.77999878 |\n\n## Counting Team Victories\n\nIn order to determine how many\
    \ first-place finishes each team has, Nathalie wrote the following query for a\
    \ question that evaluates team performance by summing the victories of each team’s\
    \ drivers.\n\n```sql\nCREATE VIEW team_wins AS\nSELECT d.team, COUNT(*) AS wins\n\
    FROM results res\nJOIN drivers d ON res.driver_id = d.driver_id\nWHERE res.position\
    \ = 1\nGROUP BY d.team;\n```\n\nThis SQL query creates a view named `team_wins`,\
    \ which tracks the number of race victories for each racing team. It joins the\
    \ `Results` and `Drivers` tables to connect race performance with team information.\
    \ The query counts only first-place finishes, where `position` is equal to `1`,\
    \ and groups the results by team name. This means the view will display each team’s\
    \ total wins across all races. By using `COUNT(*)`, it counts the number of races\
    \ where a team’s driver finished first, providing a clear overview of team performance\
    \ and success in racing competitions.\n\nHere, a view named `team_wins` simplifies\
    \ data analysis by creating a predefined, easy-to-access summary of racing performance.\
    \ Views allow quick retrieval of complex information—in this case, team victories—without\
    \ repeatedly writing complicated SQL joins. Views also provide a convenient, performance-efficient\
    \ way to track and analyze team success across multiple races. Table 9-12 illustrates\
    \ the `SELECT` output of the previous query, which is the number of race victories\
    \ for each racing team.\n\n**Table 9-12**  \n**The Number of Race Victories for\
    \ Each Racing Team**\n\n| `Team` | `Wins` |\n| --- | --- |\n| Alpine | 1 |\n|\
    \ Aston Martin | 1 |\n| Mercedes | 2 |\n| Red Bull | 1 |\n\n## Retrieving Race\
    \ Winners with Details\n\nThe following query aims to find race winners in each\
    \ race along with the race location and date. This question highlights race winners\
    \ while connecting them to the location and date for easy event tracking.\n\n\
    ```sql\nCREATE VIEW race_winners AS\nSELECT d.name, r.location, r.date\nFROM results\
    \ res\nJOIN drivers d ON res.driver_id = d.driver_id\nJOIN races r ON res.race_id\
    \ = r.race_id\nWHERE res.position = 1;\n```"
