    | | 比较运算 (=, >, <, >=, <=, <>) | 为有意义的可视化过滤数据 |

    | | 逻辑运算 (`AND`, `OR`, `NOT`) | 组合多个条件进行分段 |

    | 聚合函数 | `COUNT()` | 计算直方图或 KPI 的数据点 |

    | | `SUM()` | 为条形图和饼图计算总计 |

    | | `AVG()` | 为趋势分析计算平均值 |

    | | `MIN() / MAX()` | 确定可视化的范围尺度 |

    | 字符串函数 | `CONCAT()` | 组合值以进行标签格式化 |

