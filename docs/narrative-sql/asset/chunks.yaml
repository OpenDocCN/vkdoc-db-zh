    ## 使用公共表表达式（CTE）的高级查询结构


    在 SQL 中，公共表表达式（CTE）表示一个可以在查询中引用的临时结果集。CTE 使用 `WITH` 关键字定义。简而言之，CTE 创建仅在查询执行期间存在的虚拟表。CTE
