    | 6 | Cruiser | 2024-01-12 | 42000 |

    | 4 | Zoomer | 2024-01-07 | 30000 |

    | 7 | Zoomer | 2024-01-15 | 56000 |


    ## 移动平均值计算


    为了计算每个车型在过去三次销售中的销售移动平均值，您可以使用以下查询。


    ```sql

    SELECT Sale_ID, Model_Name, Sale_Date,

    AVG(Sales_Amount) OVER (PARTITION BY Model_Name ORDER BY Sale_Date ROWS BETWEEN
    2 PRECEDING AND CURRENT ROW) AS Moving_Avg

    FROM Car_Sales;

    ```


    Anna 使用 `AVG()` 窗口函数来计算每个车型在过去三次销售中的销售额移动平均值。通过此查询，基于 `Car_Sales` 表中的 `Sales_Amount`，计算了每个车型的移动平均值。为了计算平均值，查询使用了
    `AVG()` 窗口函数。`PARTITION BY Model_Name` 按车型对数据进行分组。`ORDER BY Sale_Date` 按销售时间顺序排序。`ROWS
    BETWEEN 2 PRECEDING AND CURRENT ROW` 将窗口限制为包含当前销售和前两次销售。`Moving_Avg` 是每个车型随时间推移的销售额移动平均值。窗口框架决定了结果集中每一行的计算应包含哪些行。因此，`ROWS`
    指定窗口框架由相对于当前行的特定行数定义（与 `RANGE` 的值范围相对）。`"BETWEEN 2 PRECEDING AND CURRENT ROW"`
    在计算中包括了当前行及其前两行，而 `CURRENT ROW` 指的是当前行本身。因此，结果集中的每一行都将是基于（`ORDER BY Sale_Date`
    确定的）前两行数据的平均值。当少于两个前置行时（例如，对于第一行或第二行），它将只计算现有的平均值。表 5-17 显示了每个车型最近三次销售的销售额移动平均值。


    ## 表 5-17：各车型销售移动平均值


    | Sale_ID | Model_Name | Sale_Date | Moving_Avg |

    | --- | --- | --- | --- |

    | 1 | Speedster | 2024-01-01 | 25000 |

    | 3 | Speedster | 2024-01-05 | 26000 |

    | 5 | Speedster | 2024-01-10 | 26666 |

    | 8 | Speedster | 2024-01-17 | 28000 |

    | 2 | Cruiser | 2024-01-03 | 20000 |

    | 6 | Cruiser | 2024-01-12 | 21000 |

    | 4 | Zoomer | 2024-01-07 | 30000 |

    | 7 | Zoomer | 2024-01-15 | 28000 |


    ## 按区域的销售排名


    以下查询计算每个区域内各车型的总销售额，根据同一区域内的销售额对车型进行排名，并提供每个区域的总销售额。内部子查询首先通过汇总 `Car_Sales` 表中的
    `Sales_Amount`，聚合每个区域内每款车型的总销售额。结果按 `Model_Name` 和 `Region` 分组，这意味着它计算了每个车型在每个区域的总销售额。外部查询随后增加了两个额外的计算：计算每个区域的总销售额，并根据销售额在每个区域内对车型进行排名。


    ```sql

    SELECT Model_Name, Region, Total_Sales,

    SUM(Total_Sales) OVER (PARTITION BY Region) AS Total_Sales_Region,

    RANK() OVER (PARTITION BY Region ORDER BY Total_Sales DESC) AS Sales_Rank

    FROM (

    SELECT Model_Name, Region,

    SUM(Sales_Amount) AS Total_Sales

    FROM Car_Sales

    GROUP BY Model_Name, Region

    ) AS AggregatedSales;

    ```


    查询首先在内部子查询中聚合销售额，该子查询计算了 `Car_Sales` 表中每款车型（`Model_Name`）在每个区域（`Region`）的总销售额（`Total_Sales`），通过汇总
    `Sales_Amount` 并按车型和区域对结果进行分组。在外部查询中，使用 `SUM(Total_Sales) OVER (PARTITION BY Region)`
    计算每个区域内所有车型的总销售额。这提供了每个区域的总销售额，不考虑具体车型。然后，`RANK() OVER (PARTITION BY Region ORDER
    BY Total_Sales DESC)` 根据每个车型在其区域内的总销售额为其分配一个排名，销售额最高的排名第一。因此，该查询提供了每个车型的总销售额、其在每个区域内的排名以及区域本身的总销售额。这种方法对于按车型和区域分析汽车销售表现非常有用。表
    5-18 显示了每个区域的总销售额，并根据销售额对车型进行了排名。


    ## 表 5-18：按区域的总销售额和排名


    | model_name | Region | total_sales | total_sales_region | sales_rank |

    | --- | --- | --- | --- | --- |

    | Zoomer | East | 30000 | 30000 | 1 |

    | Speedster | North | 52000 | 78000 | 1 |

    | Zoomer | North | 26000 | 78000 | 2 |

    | Cruiser | South | 42000 | 71000 | 1 |

    | Speedster | South | 29000 | 71000 | 2 |

    | Speedster | West | 28000 | 28000 | 1 |


    ## 总结


    总而言之，Anna 使用 `ROW_NUMBER()`、`RANK()`、`SUM()` 和 `AVG()` 等窗口函数来分析 Speedy Motors
    公司的汽车销售情况。分析内容包括识别销售序列、按区域对车型进行排名、计算累计销售额以及计算每个车型的移动平均值。她通过组合多种窗口函数，帮助公司做出数据驱动的决策。

