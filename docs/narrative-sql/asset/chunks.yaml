    ## 使用 `EXPLAIN ANALYZE` 进行性能测量


    `EXPLAIN ANALYZE` 会执行查询并提供实际的运行时统计数据。在添加索引后测试性能改进时，最好使用此工具。


    ```

    EXPLAIN ANALYZE query_statement;

    ```


    此处，`query_statement` 是需要用实时指标进行分析的 SQL 查询。`EXPLAIN ANALYZE` 是 PostgreSQL 中用于数据库性能分析的工具。它超越了简单
    `EXPLAIN` 提供的估算成本，通过实际执行查询并收集实时指标来进行分析。表 9-2 指出了 `EXPLAIN` 和 `EXPLAIN ANALYZE`
    的关键区别。


    表 9-2：`EXPLAIN` 与 `EXPLAIN ANALYZE` 的关键区别


    | 特性 | `EXPLAIN` | `EXPLAIN ANALYZE` |

    | --- | --- | --- |

    | 实际执行 | 生成执行计划（不执行） | 执行查询；收集运行时统计信息 |

    | 实时指标 | 提供估算成本 | 提供实际执行时间、行数 |


    除了估算成本和提供计划结构外，`EXPLAIN ANALYZE` 还提供运行时指标以增强分析。在 PostgreSQL 中，规划器的成本估算表示为两个数字：启动成本和总成本。这些是基于估算的
    I/O、CPU 使用率和行数的无单位值，用于比较不同的执行计划，而不是反映实际时间。`EXPLAIN ANALYZE` 揭示了每个节点的实际执行时间（以毫秒为单位），这直接突出了性能瓶颈。实际行数允许精确比较规划器的估算结果，揭示其准确性。在嵌套循环连接中，循环次数指定了内层循环执行的频率。此外，根据具体查询和
    PostgreSQL 版本，可能还包括其他运行时统计信息。这可以提供查询实际执行情况的概览。


    ## 第一个故事：高尔夫表现数据分析


    玛蒂娜是一家高尔夫俱乐部的数据分析师，负责评估球员表现和优化赛事运营。她管理着一个跟踪球员成绩、球场详情和比赛结果的数据库。随着更多比赛的举行，表 9-3、9-4
    和 9-5 所示的数据表不断增长，她希望确保查询能高效运行。借助索引和 `EXPLAIN ANALYZE` 等性能分析工具，玛蒂娜旨在加快数据检索速度，从而做出更好的决策。


    表 9-5：成绩表


    | score_id | player_id | tournament_id | round_number | Strokes |

    | --- | --- | --- | --- | --- |

    | 1 | 1 | 1 | 1 | 70 |

    | 2 | 1 | 1 | 2 | 72 |

    | 3 | 2 | 1 | 1 | 68 |

    | 4 | 2 | 1 | 2 | 70 |

    | 5 | 3 | 2 | 1 | 71 |

    | 6 | 3 | 2 | 2 | 69 |

    | 7 | 4 | 2 | 1 | 70 |

    | 8 | 4 | 2 | 2 | 68 |

    | 9 | 5 | 3 | 1 | 73 |

    | 10 | 5 | 3 | 2 | 72 |


    表 9-4：赛事表


    | tournament_id | Name | Location | Year |

    | --- | --- | --- | --- |

    | 1 | Masters Tournament | Augusta National Golf Club | 2023 |

    | 2 | US Open | Pebble Beach | 2023 |

    | 3 | The Open Championship | St Andrews | 2023 |

    | 4 | PGA Championship | Oak Hill | 2023 |

    | 5 | Ryder Cup | Marco Simone | 2023 |


    表 9-3：球员表


    | player_id | Name | Age | Nationality |

    | --- | --- | --- | --- |

    | 1 | Tiger Woods | 48 | USA |

    | 2 | Rory McIlroy | 34 | Northern Ireland |

    | 3 | Jon Rahm | 29 | Spain |

    | 4 | Brooks Koepka | 33 | USA |

    | 5 | Dustin Johnson | 40 | USA |

    | 6 | Collin Morikawa | 27 | USA |

    | 7 | Justin Thomas | 31 | USA |

    | 8 | Phil Mickelson | 53 | USA |

    | 9 | Jordan Spieth | 31 | USA |

    | 10 | Viktor Hovland | 26 | Norway |


    玛蒂娜在经常用于筛选和连接的列上创建索引，以提高查询性能。


    ```

    CREATE INDEX idx_player_id ON scores(player_id);

    CREATE INDEX idx_tournament_id ON scores(tournament_id);

    CREATE INDEX idx_name ON players(name);

    ```


    玛蒂娜选择用于索引的列经常用于筛选、连接和排序。这些是索引提高数据分析效率的主要用例。例如，`scores(player_id)` 列上的索引可以加速按球员
    ID 筛选或连接的查询，这在检索特定球员成绩时很常见。由于 `player_id` 是 `Scores` 表中的外键，对其进行索引可以提高与 `Players`
    表的连接性能。要按赛事筛选成绩，`scores(tournament_id)` 列对于分析特定赛事的球员表现至关重要。对 `tournament_id` 进行索引可以加速对来自
    `Tournaments` 表的成绩进行分组、筛选或连接的查询。对于 `players(name)` 列，`name` 上的索引支持按姓名直接查找球员，这在分析单个球员表现时很常见。尽管姓名并非唯一，但对此列进行索引仍然能提高搜索效率。


    选择这些索引是为了在频繁的数据分析任务中平衡性能提升，同时最小化因过度索引带来的开销。


    为了回答以下问题，玛蒂娜打算使用这些数据和 SQL 查询：


    *   谁在大师赛的任何一轮中打出了低于 70 杆的成绩？

    *   计算每位球员在美国公开赛中的平均杆数。

    *   找出在英国公开赛中总杆数最低的前三名球员。

    *   检索泰格·伍兹的所有成绩以进行表现分析。


    玛蒂娜编写了以下查询来寻找在大师赛任何一轮中打出低于 70 杆成绩的球员。玛蒂娜使用 `EXPLAIN` 来显示索引是否用于 `JOIN` 和筛选。为了获得更好的性能，索引扫描应取代顺序扫描。此查询受益于
    `player_id` 和 `tournament_id` 上的索引，因为它同时对两者进行了筛选。

