  trans: '

    ## 测试你的技能


    安吉拉是一家大型电商公司的数据库管理员，负责优化数据检索和报表生成。公司的商业智能团队需要快速高效地访问销售数据，以回答关键的绩效问题，例如：


    *   过去六个月中，各类别中最畅销的产品是什么？

    *   不同地区和时间段之间的收入增长情况如何比较？

    *   哪些客户频繁进行高价值购买？他们偏好哪些产品？

    *   季节性趋势如何影响不同类别的产品需求？

    *   订单的退货率是多少？这对总收入有何影响？


    安吉拉意识到，在庞大的销售数据集上反复执行复杂查询会减慢报表和分析的速度。为了解决这个问题，她决定使用索引来加速对常用查询列（如 `order_date`、`customer_id`
    和 `product_category`）的搜索。此外，她还通过预定义常用查询（如每个地区的总收入或最畅销产品）来创建视图，以简化分析师的数据检索工作。参见表
    9-17、9-18 和 9-19。


    ### 表 9-19：客户表


    | 客户 ID | 姓名 | 年龄 | 地区 | 总消费额 |

