    娜塔莉旨在基于从近期比赛中收集的赛事表现数据，回答以下问题。


    *   在各场比赛中获得第一名的顶尖表现者是谁？

    *   每位车手在所有比赛中的平均圈速是多少？

    *   每支车队获得了多少次第一名？

    *   每场比赛的获胜者是谁，以及比赛地点和日期？

    *   谁在每场比赛中创造了最快单圈？


    ## 识别顶尖表现者


    娜塔莉编写了以下查询，以识别在不同赛道上持续表现优异的车手。使用视图可以简化此任务，视图存储了连接`Drivers`、`Races`和`Results`表的逻辑。分析师无需每次重写复杂的`JOIN`语句，可以直接查询`top_performers`视图。这提高了可读性，减少了错误，并确保了一致性。


    ```sql

    CREATE VIEW top_performers AS

    SELECT d.name, r.location, res.position

    FROM results res

    JOIN drivers d ON res.driver_id = d.driver_id

    JOIN races r ON res.race_id = r.race_id

    WHERE res.position = 1;

    ```


    此 SQL 查询创建了一个名为`top_performers`的视图，用于显示比赛获胜者。该查询选择了车手姓名、比赛地点和完赛名次，并连接了`Results`、`Drivers`和`Races`这三个表。它使用`driver_id`和`race_id`作为键来连接这些表，并筛选出仅包含第一名的记录（`position
    = 1`）。基于此筛选条件，视图将显示每位获胜车手的姓名、他们获胜的地点及其名次。表 9-10 说明了此查询中`SELECT`语句的执行结果。


    **表 9-10**

    **比赛获胜者**


    | `Name` | `Location` | `Position` |

