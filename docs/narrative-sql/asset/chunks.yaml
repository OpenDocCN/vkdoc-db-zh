    ## Moving Average Calculation


    In order to calculate the moving average of sales for each model over the last
    three sales, you can use the following query.


    ```sql

    SELECT Sale_ID, Model_Name, Sale_Date,

    AVG(Sales_Amount) OVER (PARTITION BY Model_Name ORDER BY Sale_Date ROWS BETWEEN
    2 PRECEDING AND CURRENT ROW) AS Moving_Avg

    FROM Car_Sales;

    ```


    Anna uses the `AVG()` window function to calculate a moving average of the sales
    amount over the last three sales for each model. With this query, a moving average
    is calculated for every car model in the `Car_Sales` table based on its `Sales_Amount`.
    To compute the average, the query uses the `AVG()` window function. `PARTITION
    BY Model_Name` groups the data by car model. `ORDER BY Sale_Date` orders the sales
    chronologically. `ROWS BETWEEN 2 PRECEDING AND CURRENT ROW` limits the window
    to include the current sale and the previous two sales. `Moving_Avg` is a moving
    average of sales amounts over time for each model. The window frame determines
    which rows should be included in the calculation for each row in the result set.
    Thus, `ROWS` specifies that the window frame is defined by a specific number of
    rows relative to the current row (as opposed to a range of values with `RANGE`).
    The `"BETWEEN 2 PRECEDING AND CURRENT ROW", "2 PRECEDING`” includes the current
    row and the two rows before it in the calculation, and `CURRENT ROW` refers to
    the current row itself. Due to this, each row in the result set will be averaged
    over the two previous rows (based on the `ORDER BY Sale_Date`). When there are
    fewer than two preceding rows (e.g., for the first or second row), it will just
    calculate the average. Table [5-17](#619961_1_En_5_Chapter.xhtml#Tab17) shows
    the moving average of sales amounts for the last three sales of each car model.


    ## Table 5-17: Moving Averages of Sales by Car Model


    | Sale_ID | Model_Name | Sale_Date | Moving_Avg |

    | --- | --- | --- | --- |

    | 1 | Speedster | 2024-01-01 | 25000 |

    | 3 | Speedster | 2024-01-05 | 26000 |

    | 5 | Speedster | 2024-01-10 | 26666 |

    | 8 | Speedster | 2024-01-17 | 28000 |

    | 2 | Cruiser | 2024-01-03 | 20000 |

    | 6 | Cruiser | 2024-01-12 | 21000 |

    | 4 | Zoomer | 2024-01-07 | 30000 |

    | 7 | Zoomer | 2024-01-15 | 28000 |


    ## Sales Ranking by Region


    The following query calculates the total sales per car model within each region,
    ranks the models based on their sales within the same region, and provides the
    total sales for each region. The inner query first aggregates the total sales
    for each car model in each region by summing `Sales_Amount` from the `Car_Sales`
    table. The results are grouped by `Model_Name` and `Region`, which means it calculates
    the total sales for each model in every region. The outer query then adds two
    additional computations: it calculates the total sales for each region and ranks
    the models within each region based on their sales.


    ```sql

    SELECT Model_Name, Region, Total_Sales,

    SUM(Total_Sales) OVER (PARTITION BY Region) AS Total_Sales_Region,

    RANK() OVER (PARTITION BY Region ORDER BY Total_Sales DESC) AS Sales_Rank

    FROM (

    SELECT Model_Name, Region,

    SUM(Sales_Amount) AS Total_Sales

    FROM Car_Sales

    GROUP BY Model_Name, Region

    ) AS AggregatedSales;

    ```


    The query starts by aggregating sales in the inner subquery, which calculates
    the total sales, `Total_Sales`, for each car model, the `Model_Name` in each region,
    and the `Region` by summing the `Sales_Amount` and grouping the results by model
    and region. In the outer query, `SUM(Total_Sales) OVER (PARTITION BY Region)`
    is used to calculate the total sales across all models within each region. This
    provides the total sales for each region, regardless of the model. The `RANK()
    OVER (PARTITION BY Region ORDER BY Total_Sales DESC)` then assigns a rank to each
    model within the region based on its total sales, with the highest sales being
    ranked first. The query thus provides a view of the total sales for each model,
    its rank within each region, and the total sales for the region itself. This approach
    is useful for analyzing car sales performance both by model and region. Table
    [5-18](#619961_1_En_5_Chapter.xhtml#Tab18) shows total sales in each region and
    ranks the car models based on sales.


    ## Table 5-18: Total Sales and Ranking by Region


    | model_name | Region | total_sales | total_sales_region | sales_rank |

    | --- | --- | --- | --- | --- |

    | Zoomer | East | 30000 | 30000 | 1 |

    | Speedster | North | 52000 | 78000 | 1 |

    | Zoomer | North | 26000 | 78000 | 2 |

    | Cruiser | South | 42000 | 71000 | 1 |

    | Speedster | South | 29000 | 71000 | 2 |

    | Speedster | West | 28000 | 28000 | 1 |


    ## Summary


    To summarize, Anna analyzes Speedy Motors Company’s car sales using window functions
    like `ROW_NUMBER()`, `RANK()`, `SUM()`, and `AVG()`. The analysis consists of
    identifying sales sequences, ranking car models by region, calculating cumulative
    sales, and calculating moving averages for each model. She helps the company make
    data-driven decisions by combining multiple window functions.'
