  trans: "\n## 第二个故事：面包店销售数据分析\n\n有一家小型面包店希望分析其收集到的销售数据。他们有一张名为 `Sales` 的表，其中包含 `CustomerID`、`ProductName`、`Price`、`RegularPrice`、`Discount`\
    \ 和 `Quantity` 等列。他们在分析中提出了以下问题：\n*   哪种口味的甜甜圈最受欢迎？\n*   谁是我们最常光顾的顾客？\n*   每种产品产生了多少收入？\n\
    \n在回答每个问题之前，请考虑 `Sales` 表，如表 2-6 所示。\n\n表 2-6\n销售表\n\n| CustomerID | ProductName\
    \ | Price | Quantity | RegularPrice | Discount |\n| --- | --- | --- | --- | ---\
    \ | --- |\n| 743663 | Glazed Donut | 2.5 | 2 | 3.0 | 0.5 |\n| 743663 | Chocolate\
    \ Muffin | 3.0 | 1 | 3.0 | 0.0 |\n| 223424 | Blueberry Muffin | 3.0 | 2 | 3.0\
    \ | 0.0 |\n| 323423 | Chocolate Chip Cookie | 1.5 | 3 | 2.0 | 0.5 |\n| 432424\
    \ | Sugar Cookie | 1.0 | 4 | 1.0 | 0.0 |\n\n第一个问题可以用以下查询来回答。他们可以使用简单的 `SELECT`\
    \ 语句来确定最受欢迎的甜甜圈口味。\n```sql\nSELECT ProductName, SUM(Quantity) AS TotalSold\nFROM\
    \ Sales\nGROUP BY ProductName;\n```\n此查询选择 `ProductName`，并使用 `SUM(Quantity)` 计算总销售数量，并赋予别名\
    \ `TotalSold`。`SUM()` 是 SQL 中的一个函数，用于计算表中数值列的总和。需要注意的是，此函数默认计算指定数值列中所有值的总和，并忽略\
    \ `NULL` 值。在此查询中，`GROUP BY ProductName` 按产品名称对所有销售记录进行分组，因此 `SUM(Quantity)` 计算每个独特产品的总销售数量。这有助于按产品汇总数据，而不是对整个表进行汇总。参见表\
    \ 2-7。\n\n表 2-7\n第一个问题查询执行结果\n\n| ProductName | TotalSold |\n| --- | --- |\n|\
    \ Chocolate Chip Cookie | 3 |\n| Glazed Donut | 2 |\n| Blueberry Muffin | 2 |\n\
    | Chocolate Muffin | 1 |\n| Sugar Cookie | 4 |\n\n注意\n在 SQL 中，`GROUP BY` 子句用于将指定列中具有相同值的行分组为汇总行。它通常与聚合函数（如\
    \ `SUM()`、`AVG()`、`COUNT()` 和 `MAX()`）结合使用，以对每组数据执行计算。第 5 章将详细介绍 `GROUP BY` 子句，而第\
    \ 5 和 10 章则涵盖更广泛的聚合函数。\n\n要回答第二个问题（最常光顾的顾客），可以使用以下查询：\n```sql\nSELECT CustomerID,\
    \ COUNT(*) AS PurchaseCount\nFROM Sales\nGROUP BY CustomerID;\n```\n此查询选择 `CustomerID`，并使用\
    \ `COUNT(*)` 计算购买次数，并赋予别名 `PurchaseCount`。SQL 中的 `COUNT(*)` 是一个用于获取表中总行数的函数。需要注意的是，此函数计算表中的所有行，包括重复行和包含\
    \ `NULL` 值的行。\n\n注意\n`COUNT(*)` 与 `COUNT(column_name)` 不同，后者仅计算特定列中非 `NULL` 值的数量。在\
    \ SQL 中，星号 (`*`) 用于选择所有列。星号代表表中的所有列。在 `SELECT` 中使用 `*` 对于大表可能效率低下，因为它会检索所有数据。为获得更好的性能，请考虑选择特定列。\n\
    \n表 2-8 显示了仅选择 `CustomerID` 和 `PurchaseCount` 列的查询执行结果。\n\n表 2-8\n第二个问题查询执行结果\n\
    \n| CustomerID | PurchaseCount |\n| --- | --- |\n| 743663 | 2 |\n| 223424 | 1\
    \ |\n| 323423 | 1 |\n| 432424 | 1 |\n\n要回答第三个问题（每种产品产生了多少收入），可以使用以下查询：\n```sql\n\
    SELECT\nCASE\n    WHEN ProductName LIKE '%Donut%' THEN 'Donuts'\n    WHEN ProductName\
    \ LIKE '%Muffin%' THEN 'Muffins'\n    ELSE 'Cookies'\nEND AS Category,\nSUM(Price\
    \ * Quantity) AS TotalRevenue\nFROM Sales\nGROUP BY\nCASE\n    WHEN ProductName\
    \ LIKE '%Donut%' THEN 'Donuts'\n    WHEN ProductName LIKE '%Muffin%' THEN 'Muffins'\n\
    \    ELSE 'Cookies'\nEND;\n```\n这个查询稍微复杂一些。它使用 `CASE` 语句根据产品名称对产品进行分类。它使用 `SUM(Price\
    \ * Quantity)` 计算总收入。为了找到答案，查询分析产品名称并将其分类为 `Donuts`（甜甜圈）、`Muffins`（松饼）或 `Cookies`（饼干）。然后，将每件商品的价格乘以销售数量并相加，得到每个类别产生的总收入。通过这种方式，可以计算出每个产品类别产生的收入。\n\
    \n需要注意的是，`%` 符号是一个特殊字符，用于在字符串内执行模式匹配。`%` 在模式中代表任意字符序列，即零个或多个字符。例如，`%Donut%` 是一个匹配模式。在这个特定情况下，查询查找产品名称中任何位置包含子串\
    \ `\"Donut\"` 的记录。因此，它将匹配像 `\"Glazed Donut\"` 和 `\"Chocolate Donut with Sprinkles\"\
    ` 这样的产品名称。\n\n最后，`GROUP BY` 子句与相同的 `CASE` 表达式一起使用，以便在应用 `SUM` 函数之前，按分配的类别（`Donuts`、`Muffins`\
    \ 或 `Cookies`）对记录进行分组。这确保了每个产品类别的收入汇总正确。表 2-9 显示了结果。\n\n表 2-9\n第三个问题查询执行结果\n\n\
    | Category | TotalRevenue |\n| --- | --- |\n| Donuts | 5 |\n| Muffins | 9 |\n\
    | Cookies | 8.5 |\n\n如表 2-9 所示，`CASE` 语句对产品进行了分类。名称中包含 `\"Donut\"` 的产品成为 `Donuts`，包含\
    \ `\"Muffin\"` 的成为 `Muffins`，其他所有产品则成为 `Cookies`。`SUM(Price * Quantity)` 计算了每个类别的总收入。\n\
    \n### CASE 语句\n\nSQL 中的 `CASE` 语句类似于查询中的 `if-then-else` 逻辑。它评估一系列条件，并根据第一个匹配的条件返回相应的值。\n\
    *   `WHEN` 语句指定要评估的条件。它可以是任何返回布尔值（真/假）的有效 SQL 表达式。\n*   如果相应的 `WHEN` 条件计算结果为 `true`，则由\
    \ `THEN` 返回此值。\n*   `ELSE` 是一个可选子句，如果没有任何 `WHEN` 条件满足，则提供默认结果。如果省略且没有条件为真，通常会返回\
    \ `NULL`。\n\n```sql\nCASE\n    WHEN condition1 THEN result1\n    WHEN condition2\
    \ THEN result2\n    ...\n    ELSE result_else\nEND\n```\n\n对于更复杂的查询，可以嵌套 `CASE`\
    \ 语句。你可以在第 8 章中特别了解更多关于 `CASE` 和嵌套 `CASE` 的内容。\n"
- fmt: '### String Patterns


    A string pattern in SQL allows you to search and filter data based on specific
    patterns within text columns. There are two common wildcards used in string patterns
    in SQL: the `%` symbol, which represents any number of characters, and the `_`
    symbol, which represents a single character. These wildcards provide flexibility
    in searching and filtering data based on varying patterns. Chapter [3](#619961_1_En_3_Chapter.xhtml)
    explores more complex examples of string matching after you learn about the `WHERE`
    and `LIKE` statements.


    Following the answers to the three questions, Sarah is in the process of preparing
    for a promotional event. Her goal is to offer discounts on some items, but she
    is unsure which ones would have the greatest impact on her customers. Ideally,
    she wants to target items that are:


    *   `Popular`: Items with a high number of sales.

    *   `Not already discounted`: She does not want to discount already discounted
    items.


    To identify these ideal candidates for promotion, Sarah decides to analyze her
    sales data. Using these two `CASE` statements, the following query can achieve
    this.


    ```sql

    SELECT ProductName, Quantity,

    CASE

    WHEN Quantity >= (SELECT AVG(Quantity) FROM Sales) THEN ''Popular''

    ELSE ''Less Popular''

    END AS Popularity,

    CASE WHEN RegularPrice > Price THEN ''Discounted'' ELSE ''Regular Price'' END
    AS Price_Status

    FROM Sales

    ```


    In the first `CASE`, the average quantity is calculated using a subquery, and
    the item is categorized based on whether it exceeds or equals the average quantity.
    The second `CASE` statement checks the price status. This ensures that Sarah focuses
    on discounts on popular items. If the item is `Popular` (based on the outer `CASE`)
    and the regular price (`RegularPrice`) is greater than the current price (`Price`),
    it means the item is discounted. If the item is `Popular` but doesn’t have a discount
    (regular price equals current price), it’s categorized as `Regular Price`.


    Note: Subqueries, or inner queries or nested queries, are powerful SQL tools for
    embedding `SELECT` statements within each other. They are used to retrieve data
    for the outer query. This type of queries are discussed in more detail in the
    next chapters, as you become more aware of their importance.


    Table [2-10](#619961_1_En_2_Chapter.xhtml#Tab10) is the result of executing the
    query to select only the `ProductName`, `Quantity`, calculated `Popularity` and
    `PriceStatus` columns.


    Table 2-10: The Result of Promotional Event Query Execution


    | ProductName | Quantity | Popularity | PriceStatus |

    | --- | --- | --- | --- |

    | Glazed Donut | 2 | Less Popular | Discounted |

    | Chocolate Muffin | 1 | Less Popular | Regular Price |

    | Blueberry Muffin | 2 | Less Popular | Regular Price |

    | Chocolate Chip Cookie | 3 | Popular | Discounted |

    | Sugar Cookie | 4 | Popular | Regular Price |


    ## The Art of Distinct Selection


    To create compelling narratives through data, it is essential to utilize the `DISTINCT`
    keyword effectively. In SQL, the `DISTINCT` keyword refines data retrieval by
    ensuring that query results contain unique values. It acts like a filter, eliminating
    duplicate rows that might skew your analysis or storytelling. Here’s the basic
    syntax:


    ```sql

    SELECT DISTINCT column

    FROM table

    ```


    This retrieves only unique values in the specified `column` from the `table`.


    `DISTINCT` removes rows where all selected columns have identical values. For
    example, if a table has `CustomerID` and `OrderDate`, `DISTINCT CustomerID` will
    return each unique customer, even if they placed multiple orders.


    The `DISTINCT` statement can ensure uniqueness across multiple columns when used
    with a combination of columns. For instance, `SELECT DISTINCT CustomerID, ProductID`
    will return only rows where the customer and product combinations are both distinct.


    You can also combine `DISTINCT` with aggregation functions such as `SUM` to uncover
    trends within your data.


    ## The Third Story: The Candy Store Sales Data


    Phoebe is eager to extend her vibrant candy store overflowing with colorful treats.
    Her sales report includes today’s purchases, and she is curious about her customers’
    favorites. Table [2-11](#619961_1_En_2_Chapter.xhtml#Tab11) shows the sales log.


    Table 2-11: The Sales Log


    | OrderID | Candy | Quantity |

    | --- | --- | --- |

    | 1 | Gummy Bears | 2 |

    | 2 | Lollipops | 1 |

    | 3 | Gummy Bears | 3 |

    | 4 | Chocolate Bars | 2 |

    | 5 | Lollipops | 2 |

    | 6 | Gummy Bears | 1 |


    The log shows every sale, but not the unique candies her customers crave. The
    magnifying glass she needs is `DISTINCT`:


    ```sql

    SELECT DISTINCT Candy

    FROM sales_log

    ```


    This query uncovers the data in Table [2-12](#619961_1_En_2_Chapter.xhtml#Tab12).


    Table 2-12: Unique Candies from the Sales Log Table


    | Candy |

    | --- |

    | Gummy Bears |

    | Lollipops |

    | Chocolate Bars |


    Note: Using `DISTINCT` on large datasets can impact performance. It is important
    to consider whether you really need all possible combinations or if filtering
    beforehand is sufficient. The upcoming chapters discuss data filtering in more
    detail.


    ## Aggregating with SELECT


    In SQL, aggregate functions are essential for calculating characteristics of a
    dataset and producing a single value that summarizes their characteristics. These
    functions allow analysts to extract more meaning from the data, transforming raw
    data into useful insights that support decision-making and storytelling. Data
    analysis in SQL depends heavily on aggregate functions, which allow computations
    across large volumes of data in order to create efficient summaries and high-level
    overviews.'
