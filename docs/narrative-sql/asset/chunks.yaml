    # 使用 `ORDER BY` 和 `LIMIT` 提升绘图效率


    `ORDER BY` 和 `LIMIT` 在绘图时特别有用，因为它们允许你：


    *   **聚焦相关数据**：在分析大型数据集时，绘图应专注于关键洞察而非所有数据点。

    *   **提高绘图清晰度**：通过将数据限制为可管理的子集（例如最相关或最具影响力的行），图表变得更容易理解。

    *   **增强性能**：包含数千行的大型数据集会减慢绘图过程并使可视化工具不堪重负，导致加载时间变长和响应性降低。使用 `LIMIT` 和 `ORDER
    BY` 可以避免因仅获取部分行而导致绘图过载。这使得可视化过程更快、更高效。

    *   **突出趋势和异常值**：在绘制特定数据点时，有序和有限的数据能更容易地识别趋势、异常值并进行比较。


    在本章中，`plot` 通常指以结构化、有意义的方式排列或呈现数据，通常是为可视化做准备。使用 `ORDER BY` 和 `LIMIT` 子句通过排序和筛选数据到最相关的条目来实现这一点。尽管数据存储和查询功能强大，但在你准备好并排序数据后，可以使用第三方可视化工具来创建可视化。`ORDER
    BY` 根据指定的列组织结果集，可以是升序（`ASC`）或降序（`DESC`），使你可以优先处理数据。同时，`LIMIT` 限制返回的行数，使得更容易专注于一个子集，例如前几条结果。这些查询共同提炼数据，以便进行更清晰、更有见地的分析和呈现。


    # 总结


    本章解释了在 SQL 查询中使用 `ORDER BY` 和 `LIMIT` 子句对于有效组织和管理数据集的重要性。它强调了这些子句如何通过按特定顺序排序数据并限制返回的行数来缩小查询结果范围。通过有选择地限制和选取数据，分析师可以增强数据分析和可视化任务的清晰度和性能。本章通过过滤数据以获取针对性见解、提高可视化绘图效果以及优化查询性能，展示了这些
    SQL 功能。'
- fmt: '## Key Points


    *   `ORDER BY` 和 `LIMIT` 有助于在大型数据集中聚焦最相关的条目。这使得分析师可以优先处理那些直接影响洞察的数据，例如特定列中的最高或最低值。


    *   通过限制返回的行数，`ORDER BY` 和 `LIMIT` 使图表更具可读性，仅呈现最相关的数据，并降低了图形或表格中的视觉复杂性。


    *   `ORDER BY` 和 `LIMIT` 通过仅返回最关键的数据点，帮助利益相关者做出明智决策，无需筛选不必要的细节。


    *   使用 `OFFSET` 和 `LIMIT` 有助于在查看大型数据集时保持有序结构，因为每页显示一致数量的条目，提高了数据的可访问性和清晰度。通过减少数据库的计算负载，`LIMIT`
    还能加快查询速度并降低资源消耗。


    ## Key Takeaways


    *   `ORDER BY`：使用 `ORDER BY` 按特定列对数据进行排序，优先显示关键洞察，如最高或最低值。这使得在大型数据集中识别趋势和模式变得更容易。


    *   `LIMIT`：通过应用 `LIMIT`，分析师可以限制返回的行数，从而只返回最相关的数据点。这在可视化中特别有用，当只需要顶部或底部的记录时，可以减少杂乱并增强清晰度。


    *   `OFFSET`：将 `OFFSET` 与 `LIMIT` 结合用于分页，允许你以可管理的块状检索数据，并逐页导航大型数据集，而不是一次性加载全部。通过结合使用
    `OFFSET` 和 `LIMIT`，分页成为可能。这种技术支持更用户友好的数据呈现，并通过增量加载数据而非同时处理所有数据来确保高效性能。


    ## Looking Ahead


    下一章“Dynamic Dialogues with Subqueries”将探索编写子查询的艺术，为数据分析增添深度和维度。通过使用嵌套查询，你可以获得有意义的洞察并应对复杂的分析挑战。


    ## Test Your Skills


    Jack 是 Silverstone City Library 的数据分析师，该图书馆拥有庞大的藏书量和读者群。图书馆管理层希望通过了解借阅模式、热门书目和会员活动来改善用户体验。请帮助他使用
    `ORDER BY`、`LIMIT` 和 `OFFSET` 等 SQL 技术基于图书馆数据做出决策。图书馆数据库包含一个名为 `BookLoans` 的表，其列如表
    6-19 所示。


    表 6-19


    `BookLoans` 表


    | 列名 | 描述 |

    | --- | --- |

    | `loan_id` | 每次图书借阅的唯一标识符 |

    | `member_id` | 每个会员的唯一标识符 |

    | `book_title` | 所借图书的标题 |

    | `borrow_date` | 图书借出的日期 |

    | `return_date` | 图书归还的日期 |

    | `loan_duration` | 借阅时长（天），计算为 `return_date` - `borrow_date` |

    | `borrow_count` | 该书被借阅的次数 |


    1.  识别图书馆馆藏中借阅次数最多的前五本书。按 `borrow_count` 降序排序结果，以便借阅次数最多的书出现在顶部。


    2.  为帮助员工监控近期活动，检索过去一个月内借出的图书列表，按 `borrow_date` 从最近到最早排序。每页仅显示五条结果，并使用 `OFFSET`
    在页面间导航。


    3.  确定会员中前五个最长的借阅时长。按 `loan_duration` 降序排序结果，以便最长的时长显示在前面。


    4.  找到借阅次数最少的书，并在第二页（第 6-10 行）显示。按 `borrow_count` 升序排序，并使用 `OFFSET` 跳过前五条记录。


    5.  识别过去一年中借阅次数最多的十本书。按 `borrow_count` 降序排序，并通过 `borrow_date` 筛选过去一年内的结果。


    # 7. Dynamic Dialogues with Subqueries


    本章探讨 SQL 中的动态对话概念，特别是 SQL 中的子查询。如前所述，子查询是强大的工具，允许你将查询嵌套在彼此内部以执行复杂的查询。本章的目的是概述子查询、其类型以及它们在动态对话中使用的叙述性示例。


    ## Introduction to Subqueries


    在 SQL 中，`subquery` 是嵌套在另一个查询内部的查询。使用子查询的方式有很多，包括在 `SELECT`、`FROM`、`WHERE` 和 `HAVING`
    子句中。根据其结构，子查询可以返回单个值、多个值，甚至整个表。因此，子查询可分为三种基本类型：`single-row subqueries`，返回单行，适用于比较运算符；`multiple-row
    subqueries`，提供多行，与 `IN`、`ANY` 和 `ALL` 等运算符配合使用；以及 `correlated subqueries`，基于子查询中的列引用，为外部查询的每一行执行一次。'
  raw: '## Key Points


    *   `ORDER BY` and `LIMIT` help focus on the most relevant entries within large
    datasets. This allows analysts to prioritize data that directly impacts insights,
    such as the highest or lowest values in specific columns.


    *   By limiting the number of rows returned, `ORDER BY` and `LIMIT` make plots
    more readable, presenting only the most relevant data and reducing visual complexity
    in graphs or tables.


    *   `ORDER BY` and `LIMIT` help stakeholders make intelligent decisions without
    sifting through unnecessary details by returning only the most critical data points.


    *   Using `OFFSET` and `LIMIT` helps maintain an orderly structure for viewing
    large datasets, as each page displays a consistent number of entries, improving
    data accessibility and clarity. By reducing the computational load on databases,
    `LIMIT` also speeds up query performance and reduces resource consumption.


    ## Key Takeaways


    *   `ORDER BY`: Use `ORDER BY` to sort data by specific columns, prioritizing
    key insights like the highest or lowest values. This makes it easier to identify
    trends and patterns in large datasets.


    *   `LIMIT`: By applying `LIMIT`, analysts can restrict the number of rows returned,
    so that the most relevant data points are returned. This is especially useful
    in visualizations where only the top or bottom records are needed, reducing clutter
    and enhancing clarity.


    *   `OFFSET`: Combining `OFFSET` with `LIMIT` for pagination allows you to retrieve
    data in manageable chunks and navigate large datasets page-by-page, rather than
    all at once. By using `OFFSET` and `LIMIT` together, pagination becomes possible.
    This technique supports a more user-friendly presentation of data and ensures
    efficient performance by loading data incrementally rather than processing it
    all simultaneously.


    ## Looking Ahead


    The next chapter, “Dynamic Dialogues with Subqueries,” explores the art of writing
    subqueries to add depth and dimension to data analysis. By employing nested queries,
    you can achieve meaningful insights and tackle complex analytical challenges.


    ## Test Your Skills


    Jack is a data analyst for the Silverstone City Library, which has an extensive
    book collection and a large patronage. Library administration is interested in
    improving the user experience by understanding borrowing patterns, popular titles,
    and member activity. Using SQL techniques like `ORDER BY`, `LIMIT`, and `OFFSET`,
    help him to make decisions based on library data. The library database contains
    a table called `BookLoans` with the columns shown in Table [6-19](#619961_1_En_6_Chapter.xhtml#Tab19).


    Table 6-19


    The BookLoans Table


    | Column | Description |

    | --- | --- |

    | `loan_id` | Unique identifier for each book loan |

    | `member_id` | Unique identifier for each member |

    | `book_title` | Title of the borrowed book |

    | `borrow_date` | Date when the book was borrowed |

    | `return_date` | Date when the book was returned |

    | `loan_duration` | Duration in days of the loan (calculated as `return_date`
    - `borrow_date`) |

    | `borrow_count` | Number of times the book has been borrowed |


    1.  Identify the top five most frequently borrowed books in the library collection.
    Order the results by `borrow_count` in descending order so that the most borrowed
    books appear at the top.


    2.  To help staff monitor recent activity, retrieve a list of books borrowed in
    the past month, ordered by `borrow_date` from the most recent to the least. Show
    only five results per page and use `OFFSET` to navigate between pages.


    3.  Determine the top five longest loan durations by members. Order results by
    `loan_duration` in descending order to show the longest durations first.


    4.  Find the books with the fewest borrows and display them on the second page
    (rows 6-10). Order by `borrow_count` in ascending order and use `OFFSET` to skip
    the first five records.


    5.  Identify the ten books that were borrowed the most in the last year. Order
    by `borrow_count` in descending order and filter results by `borrow_date` within
    the past year.


    # 7. Dynamic Dialogues with Subqueries


    This chapter explores the concept of dynamic dialogues in SQL, specifically focusing
    on subqueries in SQL. As mentioned earlier, subqueries are powerful tools that
    allow you to nest queries inside one another to perform complex queries. The purpose
    of this chapter is to provide an overview of subqueries, their types, and narrative
    examples of their use in dynamic dialogues.


    ## Introduction to Subqueries


    In SQL, a *subquery* is a query nested inside another query. There are many ways
    to use subqueries, including within the `SELECT`, `FROM`, `WHERE`, and `HAVING`
    clauses. Depending on their structure, subqueries can return single values, multiple
    values, or even entire tables. Thus, subqueries can be divided into three general
    types: *single-row subqueries,* which return a single row and are suitable for
    use with comparison operators; *multiple-row subqueries*, which provide multiple
    rows and work with operators such as `IN`, `ANY`, and `ALL`; and *correlated subqueries,*
    which execute once for each row in the outer query based on column references
    in the subquery.'
  trans: '## 核心要点


    *   `ORDER BY` 和 `LIMIT` 有助于在大型数据集中聚焦最相关的条目。这使得分析师可以优先处理那些直接影响洞察的数据，例如特定列中的最高或最低值。


    *   通过限制返回的行数，`ORDER BY` 和 `LIMIT` 使图表更具可读性，仅呈现最相关的数据，并降低了图形或表格中的视觉复杂性。


    *   `ORDER BY` 和 `LIMIT` 通过仅返回最关键的数据点，帮助利益相关者做出明智决策，无需筛选不必要的细节。


    *   使用 `OFFSET` 和 `LIMIT` 有助于在查看大型数据集时保持有序结构，因为每页显示一致数量的条目，提高了数据的可访问性和清晰度。通过减少数据库的计算负载，`LIMIT`
    还能加快查询速度并降低资源消耗。


    ## 关键收获


