    # 10. 分析炼金术：将数据转化为金子


    使用 SQL 将数据转化为金子，需要掌握高级分析函数，这些函数能帮助你从原始数据中提取更深层次的见解，并将其转化为引人入胜的叙述。PostgreSQL 提供了强大的函数，可用于将原始数据转化为引人入胜的故事。此外，本章还将阐述如何将原始数据转化为引人入胜的故事，以及如何有效地利用递归来构建查询逻辑。


    ## 函数


    函数可以根据其功能和目的进行分类。PostgreSQL 提供了广泛的函数，虽然聚合函数、统计与数学函数、窗口函数是常见的类别，但还有其他类型，包括排名函数、字符串函数、日期与时间函数、JSON
    函数、控制函数和系统函数。SQL 函数帮助你执行那些原本需要多个查询和多次数据库交互的操作。通过使用函数，可以复用你的数据库，因为其他应用程序可以直接与你的存储过程交互，而无需中间层或重复代码。这对大多数数据分析任务都非常有价值。


    ### 聚合函数


    聚合函数对多行数据进行操作，并返回一个汇总后的值。它们通常与 `GROUP BY` 一起使用，以对数据子集执行计算。例如，PostgreSQL 聚合函数可用于查找每个产品类别的总收入。聚合函数对多行数据进行操作，并为每个数据组返回一个汇总值。常见的聚合函数包括
    `SUM(列名)`（计算一列的总和）和 `AVG(列名)`（确定平均值）。此外，`COUNT(列名)` 用于计算行数，而 `MIN(列名)` 和 `MAX(列名)`
    有助于识别数据集中的最小值和最大值。简而言之，聚合函数的关键特性是它们能将多行数据折叠为每组一个结果。这使得它们非常适合高效地汇总大型数据集。表 10-1
    总结了 PostgreSQL 中大多数众所周知的聚合函数。


    ### 表 10-1：PostgreSQL 中常用的聚合函数


    | 函数 | 描述 | 示例 |

    | --- | --- | --- |

    | `AVG(column_name)` | 返回输入值的平均值（算术平均数）。 | `SELECT AVG(salary) FROM employees;`
    |

    | `COUNT(column_name)` | 返回表达式值不为空的输入行数。 | `SELECT COUNT(department) FROM employees;`
    |

    | `COUNT(*)` | 返回输入行数。 | `SELECT COUNT(*) FROM employees;` |

    | `MAX(column_name)` | 返回输入值中的最大值。 | `SELECT MAX(salary) FROM employees;` |

    | `MIN(column_name)` | 返回输入值中的最小值。 | `SELECT MIN(salary) FROM employees;` |

    | `SUM(column_name)` | 返回输入值的总和。 | `SELECT SUM(salary) FROM employees;` |

    | `BOOL_AND(column_name)` | 如果所有输入值都为真，则返回 `TRUE`，否则返回 `FALSE`。 | `SELECT BOOL_AND(active)
    FROM users;` |

    | `BOOL_OR(column_name)` | 如果任一输入值为真，则返回 `TRUE`，否则返回 `FALSE`。 | `SELECT BOOL_OR(active)
    FROM users;` |

    | `EVERY(column_name)` | 等同于 `BOOL_AND`。 | `SELECT EVERY(active) FROM users;`
    |

    | `MODE(column_name)` | 返回出现频率最高的输入值（如果多个值频率相同，则返回任意一个）。 | `SELECT MODE() WITHIN
    GROUP (ORDER BY department) FROM employees;` |

    | `PERCENTILE_CONT(fraction)` | 返回一个百分位数，如果需要，在相邻的输入项之间进行插值。 | `SELECT PERCENTILE_CONT(0.5)
    WITHIN GROUP (ORDER BY salary) FROM employees;` |

    | `PERCENTILE_DISC(fraction)` | 返回一个百分位数；结果是实际的输入元素。 | `SELECT PERCENTILE_DISC(0.9)
    WITHIN GROUP (ORDER BY salary) FROM employees;` |

