    此查询用于识别每场比赛中做出最快圈速的车手，并突出显示了无论比赛排名如何的出色单圈表现。


    ```

    CREATE VIEW fastest_laps AS

    SELECT d.name, r.location, MIN(res.lap_time_sec) AS fastest_time

    FROM results res

    JOIN drivers d ON res.driver_id = d.driver_id

    JOIN races r ON res.race_id = r.race_id

    GROUP BY r.location, d.name;

    ```


    这个查询创建了一个名为 `fastest_laps` 的视图。其目的是确定每位车手在每个比赛地点取得的最快圈速。该查询连接了 `Results`、`Drivers`
    和 `Races` 表，以将车手姓名和比赛地点与圈速相关联。`MIN(res.lap_time_sec)` 函数确定了每位车手在每个地点的最短圈速。`GROUP
    BY r.location, d.name` 子句对结果进行组织，确保为每位车手在每个比赛地点分别计算最短圈速。该视图简化了对最快圈速数据的访问和分析。


    > **注意**

    >

    > 在 PostgreSQL 中，`MIN()` 函数是一个聚合函数，它返回指定值集中的最小值。它通常用于查找表中某列的最小值。一旦应用 `MIN()`，它会分析选定的列并返回最低值。例如，它可以用来识别最早的日期、最低的价格或最快的圈速。为了在特定组内查找最小值，它常与
    `GROUP BY` 结合使用。


