    #### Advanced Query Structures Using Common Table Expressions (CTEs)


    In SQL, a common table expression (CTE) represents a temporary result set that
    can be referred to within a query. CTEs are defined using the `WITH` keyword.
    In a nutshell, CTEs create virtual tables that exist only while a query is executed.
    CTE makes complex queries more readable; it decomposes them into logical, manageable
    steps. It provides reusable logic that avoids duplication by defining a result
    set once and reusing it throughout the query. Also, by using CTEs, recursive queries
    can handle hierarchical and recursive structures. CTEs can also simplify complex
    multi-step aggregations by breaking them into manageable steps. A CTE allows you
    to create a temporary result set that can be referenced in the main query. The
    basic syntax for a CTE is provided here:


    ```

    WITH cte_name AS (

    SELECT column1, column2

    FROM table_name

    WHERE conditions

    )

    SELECT *

    FROM cte_name;

    ```


    In the query, a CTE is defined (`cte_name`) by using the `WITH` clause to create
    a temporary result set from a `SELECT` statement to be used later. It is possible
    to refer to this result in the main query (`SELECT * FROM cte_name`). It simplifies
    and improves the readability of queries.


    ##### Example: Customer Segmentation with Advanced Metrics


    Suppose you want to segment customers based on their total purchases into high,
    medium, and low spenders. The total amount they spent can be calculated first,
    and then they can be assigned to segments accordingly.


    ```

    WITH CustomerPurchases AS (

    SELECT Customer_ID, SUM(Sale_Amount) AS Total_Purchase

    FROM Sales

    GROUP BY Customer_ID

    ),

    CustomerSegments AS (

    SELECT Customer_ID, Total_Purchase,

    CASE

    WHEN Total_Purchase >= 1000 THEN ''High Spender''

    WHEN Total_Purchase BETWEEN 500 AND 999 THEN ''Medium Spender''

    ELSE ''Low Spender''

    END AS Segment

    FROM CustomerPurchases

    )

    SELECT * FROM CustomerSegments;

    ```


    The first CTE, `CustomerPurchases`, calculate the total purchase amount for each
    customer. The second CTE, `CustomerSegments`, assign customers into segments (`High`,
    `Medium`, and `Low`) based on their total purchase. This method makes it easier
    to break complex queries into manageable steps and improves readability. Table
    [5-23](#619961_1_En_5_Chapter.xhtml#Tab23) shows the customer segmentation based
    on total purchases.


    Table 5-23


    Customer Segments Based on Total Purchases


    | Customer_ID | Total_Purchase | Segment |

    | --- | --- | --- |

    | 101 | 1400 | High Spender |

    | 102 | 450 | Low Spender |

    | 103 | 1300 | High Spender |

    | 104 | 1600 | High Spender |

    | 105 | 250 | Low Spender |


