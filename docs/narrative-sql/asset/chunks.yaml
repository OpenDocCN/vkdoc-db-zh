    Aletta would like to:


    1.  Generate a report that lists all appointments with details about the doctor
    and patient for each appointment.


    2.  Create a list of all patients and their primary doctor, if any.


    3.  Identify all doctors and list their patients (primary care only), if any.


    Aletta intends to find a list of all appointments along with the details of the
    doctor and patient for each appointment, but the problem is that she has to exclude
    any appointments that do not have a matching doctor or patient. The following
    query can do this for Aletta:


    ```

    SELECT a.appointment_id, p.name AS patient_name, d.name AS doctor_name, a.appointment_date

    FROM Appointments a

    INNER JOIN Patients p ON a.patient_id = p.patient_id

    INNER JOIN Doctors d ON a.doctor_id = d.doctor_id;

    ```


    As mentioned, `INNER JOIN` removes rows that have no matching values in the joined
    tables. If `patient_id` in the `Appointments` table does not match any `patient_id`
    in the `Patients` table or `doctor_id` in the `Appointments` matches `doctor_id`
    in the `Doctors`, those rows will not appear in the result. Since `NULL`s in `JOIN`
    columns result in non-matching rows, they are effectively removed from the result
    set. There is no need to handle extra `NULL`s in this query because the `INNER
    JOIN` naturally filters them out. Table [4-23](#619961_1_En_4_Chapter.xhtml#Tab23)
    shows all appointments along with the details of the doctor and patient for each
    appointment.


    Table 4-23


    A List of All Appointments


    | appointment_id | patient_name | doctor_name | appointment_date |

    | --- | --- | --- | --- |

    | 1001 | John Doe | Dr. Alice Smith | 2024-07-01 |

    | 1002 | Jane Roe | Dr. Bob Johnson | 2024-07-02 |

    | 1003 | Jim Beam | Dr. Charlie Lee | 2024-07-03 |

    | 1004 | Jill Hill | Dr. Eve Black | 2024-07-04 |

    | 1005 | John Doe | Dr. Dana White | 2024-07-05 |


    Aletta wants to get a list of all patients along with their primary doctor, if
    any. To do this, she needs to consider a `LEFT JOIN`, which includes all rows
    in the `Patients` table and matches the rows in the `Doctors` table. If they do
    not match, the columns of the doctors table will contain `NULL`. To handle these
    `NULL`s, Aletta can use the `COALESCE` function replace the `NULL` values in the
    `Doctors.name` column with `''No Primary Doctor Assigned''`. This ensures that
    the result set provides meaningful information even when no primary doctor is
    assigned to the patient.


    ```

    SELECT p.name AS patient_name, COALESCE(d.name, ''No Primary Doctor Assigned'')
    AS doctor_name

    FROM Patients p

    LEFT JOIN Doctors d ON p.primary_doctor_id = d.doctor_id;

    ```


    `COALESCE` is useful for handling `NULL` values. For example, when you want to
    display a default value instead of `NULL` when a particular column has missing
    data, `COALESCE` allows you to do this directly in your SQL query.


    Note


    `COALESCE` is a function in SQL that helps you deal with `NULL` values. It evaluates
    a list of expressions you provide, one by one, and returns the first expression
    that is not `NULL`. `COALESCE` works by considering a list of values or expressions
    separated by commas. `COALESCE` starts checking the expressions from left to right.
    If the first expression is not `NULL`, `COALESCE` returns that value immediately.
    If the first expression is `NULL`, `COALESCE` moves on to the second expression
    and checks if it’s `NULL`. This process continues until it finds a non-`NULL`
    value or reaches the end of the list. If all the expressions in the list are `NULL`,
    `COALESCE` itself returns `NULL`. `COALESCE` can take any number of expressions
    as arguments (more than two). It should be noted that the data types of the expressions
    in the list need to be compatible. `COALESCE` will return the data type of the
    first non-`NULL` expression.


    Table [4-24](#619961_1_En_4_Chapter.xhtml#Tab24) shows each patient with their
    primary doctor’s name. For patients without an assigned primary doctor, the query
    substitutes `"No Primary Doctor Assigned"`.


    Table 4-24


    A List of All Patients and Their Primary Doctor


