  trans: '

    ## 第二个故事：一家科技公司


    Piper 在一家成长中的科技公司工作，该公司拥有动态的组织结构，包括多个部门、员工和项目。Piper 打算利用公司数据来寻找关于公司问题的答案。Piper
    公司的数据已被收集并存储在四张表中：`Employees`（见表 4-8）、`Departments`（见表 4-9）、`Projects`（见表 4-10）和
    `Employees_Projects`（见表 4-11）。


    表 4-11

    员工 _ 项目 表


    | EmployeeID | ProjectID |

    | --- | --- |

    | 3 | 101 |

    | 4 | 101 |

    | 3 | 102 |

    | 4 | 102 |

    | 6 | 201 |

    | 8 | 301 |


    表 4-10

    项目 表


    | ProjectID | ProjectName | DepartmentID |

    | --- | --- | --- |

    | 101 | 项目 Alpha | 1 |

    | 102 | 项目 Beta | 1 |

    | 201 | 招聘活动 | 2 |

    | 301 | 财务审计 | 3 |


    表 4-9

    部门 表


    | DepartmentID | DepartmentName |

    | --- | --- |

    | 1 | 工程部 |

    | 2 | 人力资源部 |

    | 3 | 财务部 |


    表 4-8

    员工 表


    | EmployeeID | Name | Age | Position | DepartmentID | ManagerID |

    | --- | --- | --- | --- | --- | --- |

    | 1 | John Smith | 45 | CEO | NULL | NULL |

    | 2 | Jane Dylan | 38 | CTO | 1 | 1 |

    | 3 | Mary Johnson | 28 | Developer | 1 | 2 |

    | 4 | Mike Brown | 35 | Developer | 1 | 2 |

    | 5 | Emily Davis | 30 | HR Manager | 2 | 1 |

    | 6 | Laura Wilson | 25 | HR Associate | 2 | 5 |

    | 7 | David White | 50 | CFO | 3 | 1 |

    | 8 | Steve Black | 40 | Accountant | 3 | 7 |


    Piper 分析数据表的目的是找出以下问题的答案：


    *   谁是经理，谁是他们的直属下属？

    *   哪些部门有员工，他们的名字是什么？列出所有部门和他们的员工，包括没有员工的部门。

    *   哪些员工被分配到了哪些项目，包括没有分配到任何项目的员工？列出所有员工和他们的项目，包括没有分配到任何项目的员工。

    *   项目是什么，它们被分配到了哪些部门，包括没有项目的部门？列出所有项目和它们分配的部门，包括没有项目的部门。

    *   所有员工和项目的所有可能组合是什么？创建所有员工和项目的笛卡尔积。

    *   哪些员工没有被分配到任何项目？找出没有被分配到任何项目的员工。


    要列出经理及其直属下属，你可以在 `Employees` 表上使用 `自连接`：


    ```sql

    SELECT e1.Name AS EmployeeName, e2.Name AS ManagerName

    FROM Employees e1

    LEFT JOIN Employees e2 ON e1.ManagerID = e2.EmployeeID;

    ```


    需要注意的是，当在同一张表上使用 `LEFT JOIN` 或 `RIGHT JOIN`（或任何类型的 `JOIN`）时，这被称为*自连接*。*自连接*就是简单地将一张表与自身连接。这对于层级或递归数据结构（如组织结构图或家族树）非常有用。使用
    `LEFT JOIN` 确保所有员工都包含在结果集中，即使是没有经理的员工（`ManagerID` 为 `NULL`）。这样，你就可以识别出不向任何人汇报的员工。见表
    4-12。


    表 4-12

    第一个查询结果


    | EmployeeName | ManagerName |

    | --- | --- |

    | John Smith | NULL |

    | Jane Dylan | John Smith |

    | Mary Johnson | Jane Dylan |

    | Mike Brown | Jane Dylan |

    | Emily Davis | John Smith |

    | Laura Wilson | Emily Davis |

    | David White | John Smith |

    | Steve Black | David White |


    要列出所有部门及其员工，包括没有员工的部门，你使用 `LEFT JOIN`：


    ```sql

    SELECT d.DepartmentName, e.Name AS EmployeeName

    FROM Departments d

    LEFT JOIN Employees e ON d.DepartmentID = e.DepartmentID;

    ```


    该查询检索每个部门以及在这些部门工作的员工姓名。通过使用 `LEFT JOIN`，你可以确保所有部门都包含在结果中，即使某些部门没有分配员工。见表 4-13。


    表 4-13

    第二个查询结果


    | DepartmentName | EmployeeName |

    | --- | --- |

    | 工程部 | Jane Dylan |

    | 工程部 | Mary Johnson |

    | 工程部 | Mike Brown |

    | 人力资源部 | Emily Davis |

    | 人力资源部 | Laura Wilson |

    | 财务部 | David White |

    | 财务部 | Steve Black |


    要列出所有员工及其项目，包括没有分配到任何项目的员工，你需要使用 `RIGHT JOIN`：


    ```sql

    SELECT e.Name AS EmployeeName, p.ProjectName

    FROM Employees e

    RIGHT JOIN Employees_Projects ep ON e.EmployeeID = ep.EmployeeID

    RIGHT JOIN Projects p ON ep.ProjectID = p.ProjectID;

    ```


    此查询检索所有项目的列表以及分配给每个项目的员工姓名。它使用 `RIGHT JOIN` 确保所有项目都包含在结果集中，即使没有分配员工给它们。第一个 `RIGHT
    JOIN` 通过 `Employees_Projects` 表将员工与他们的项目匹配。第二个 `RIGHT JOIN` 确保来自 `Projects` 表的所有项目都被包含，即使它们没有关联的员工。结果集将显示
    `EmployeeName` 和 `ProjectName`，对于没有分配员工的项目，`EmployeeName` 将为 `NULL`。见表 4-14。


    表 4-14

    第三个查询结果


    | EmployeeName | ProjectName |

    | --- | --- |

    | Mary Johnson | 项目 Alpha |

    | Mike Brown | 项目 Alpha |

    | Mary Johnson | 项目 Beta |

    | Mike Brown | 项目 Beta |

    | Laura Wilson | 招聘活动 |

    | Steve Black | 财务审计 |

    | NULL | 项目 Alpha |

    | NULL | 项目 Beta |

    | NULL | 招聘活动 |

    | NULL | 财务审计 |


    在回答第三个问题的背景下，`NULL` 行的出现可能是个问题，这取决于你如何解释结果。使用带 `NULL` 检查的 `RIGHT JOIN` 可以帮助解决识别未分配到任何项目的员工和没有分配员工的项目的问题。这种方法允许你过滤掉不需要的
    `NULL` 行，提供更清晰的结果。让我们看看如何针对相关问题完成此操作：


    ```sql

    SELECT e.Name AS EmployeeName, p.ProjectName

    FROM Employees e

    RIGHT JOIN Employees_Projects ep ON e.EmployeeID = ep.EmployeeID

    RIGHT JOIN Projects p ON ep.ProjectID = p.ProjectID

    WHERE e.EmployeeID IS NOT NULL;

    ```


    此查询确保你仅在来自 `Employees` 表存在有效的 `EmployeeID` 时才包含行，从而排除了未分配项目的 `NULL` 行。见表 4-15。


    表 4-15

    重写第三个查询的结果（已过滤掉不需要的 NULL 行）


    | EmployeeName | ProjectName |

    | --- | --- |

    | Mary Johnson | 项目 Alpha |

    | Mike Brown | 项目 Alpha |

    | Mary Johnson | 项目 Beta |

    | Mike Brown | 项目 Beta |

    | Laura Wilson | 招聘活动 |

    | Steve Black | 财务审计 |


    需要注意的是，`NULL` 行通常在 SQL `JOIN` 中出现，当连接的表之间存在不匹配的行时。不同类型的 `JOIN` 处理不匹配行的方式不同，导致没有对应匹配的表列出现
    `NULL` 值。在这次分析中，你了解了 `NULL` 出现的原因之一。


    注意

    SQL `JOIN` 中出现 `NULL` 行的主要原因是连接表之间的相应不匹配。所使用的不同类型的 `JOIN`（`LEFT`、`RIGHT`、`FULL`
    或 `OUTER`）会导致不同的结果，因此理解这种行为有助于设计根据分析需求适当处理或避免 `NULL` 值的查询。


    *   `INNER JOIN`：没有 `NULL`，因为只包含匹配的行。

    '
- fmt: '## Handling NULL Values in JOINs


    *   `LEFT JOIN`：当右表中没有匹配时，右表的列会出现`NULL`。

    *   `RIGHT JOIN`：当左表中没有匹配时，左表的列会出现`NULL`。

    *   `FULL OUTER JOIN`：当两个表中都没有匹配时，两个表的列都会出现`NULL`。

    *   `CROSS JOIN`：本质上没有`NULL`，因为包含了所有组合。

    *   `SELF JOIN`**：** 当同一表中的行没有匹配时，会出现`NULL`。

    *   `LEFT JOIN` **with** `NULL` **check**：过滤掉`JOIN`条件中为`NULL`的行，专注于不匹配的行。

    *   `RIGHT JOIN` **with** `NULL` **check**：过滤掉`JOIN`条件中为`NULL`的行，专注于不匹配的行。

    *   `FULL OUTER JOIN` **with** `NULL` **check**：专门处理`NULL`以突出显示两个表中未匹配的行。


    需要注意的是，`NULL`行的出现还有其他原因，包括未匹配的行和数据完整性。


    *   **Missed matches:** 当关联表中没有对应条目时，SQL 会用 `NULL` 填充缺失值以表示数据不存在。

    *   **Data integrity:** 不完整的数据，例如没有分配项目的员工或没有员工的项目，在执行某些 `JOIN` 时会在结果集中产生 `NULL`。


    本章最后一部分将更详细地讨论 `NULL` 的出现。


    为了找到所有项目及其分配的部门（包括没有项目的部门），利用现有的知识，可以编写一个查询，确保只包含在 `Projects` 表中有有效 `ProjectID`
    的行，从而为没有项目的部门移除 `NULL` 行。


    ```sql

    SELECT p.ProjectName, d.DepartmentName

    FROM Projects p

    RIGHT JOIN Departments d ON p.DepartmentID = d.DepartmentID

    WHERE p.ProjectID IS NOT NULL;

    ```


    此查询确保只包含在 `Projects` 表中有有效 `ProjectID` 的行，从而排除了没有项目的部门的 `NULL` 行。参见表 [4-16](#619961_1_En_4_Chapter.xhtml#Tab16)。


