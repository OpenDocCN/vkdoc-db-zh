  trans: '

    ## 窗口函数


    与聚合函数不同，窗口函数不会折叠行，而是在保持对完整数据集访问的同时，为每一行返回一个计算值。与聚合函数相比，窗口函数的关键优势在于它们允许进行行级比较和趋势分析。这使得分析师能够在揭示洞察的同时保持数据的细粒度。表
    10-3 总结了 PostgreSQL 中大部分著名的窗口函数。


    **表 10-3：常用窗口函数**


    | 函数 | 描述 | 示例 |

    | --- | --- | --- |

    | `ROW_NUMBER()` | 为分区内的每一行分配一个唯一的顺序整数。 | `SELECT ROW_NUMBER() OVER (PARTITION
    BY department ORDER BY salary DESC) FROM employees;` |

    | `CUME_DIST()` | 计算值在分区内的累积分布。 | `SELECT CUME_DIST() OVER (PARTITION BY department
    ORDER BY salary DESC) FROM employees;` |

    | `NTILE(n)` | 将分区划分为 n 个近似相等的组，并为每一行分配一个组号。 | `SELECT NTILE(4) OVER (PARTITION
    BY department ORDER BY salary DESC) FROM employees;` |

    | `LAG(expression [, offset [, default]])` | 访问分区中前一行的数据。 | `SELECT LAG(salary,
    1, 0) OVER (PARTITION BY department ORDER BY hire_date) FROM employees;` |

    | `LEAD(expression [, offset [, default]])` | 访问分区中后一行的数据。 | `SELECT LEAD(salary,
    1, 0) OVER (PARTITION BY department ORDER BY hire_date) FROM employees;` |

    | `FIRST_VALUE(expression)` | 返回分区中第一行表达式的值。 | `SELECT FIRST_VALUE(salary) OVER
    (PARTITION BY department ORDER BY hire_date) FROM employees;` |

    | `LAST_VALUE(expression)` | 返回分区中最后一行表达式的值。 | `SELECT LAST_VALUE(salary) OVER
    (PARTITION BY department ORDER BY hire_date RANGE BETWEEN UNBOUNDED PRECEDING
    AND UNBOUNDED FOLLOWING) FROM employees;` |

    | `NTH_VALUE(expression, n)` | 返回分区中第 n 行表达式的值。 | `SELECT NTH_VALUE(salary, 3)
    OVER (PARTITION BY department ORDER BY hire_date) FROM employees;` |

    | `COALESCE(value1, value2, ...)` | 返回列表中第一个非 `NULL` 的值。 | `SELECT COALESCE(NULL,
    ''default'', ''other'');` (返回 ''default'') |

    | `NULLIF(value1, value2)` | 如果 `value1` 等于 `value2`，则返回 `NULL`；否则返回 `value1`。
    | `SELECT NULLIF(10, 10);` (返回 NULL) `SELECT NULLIF(10, 5);` (返回 10) |

    | `GREATEST(value1, value2, ...)` | 返回列表中的最大值。 | `SELECT GREATEST(10, 5, 15);`
    (返回 15) |

    | `LEAST(value1, value2, ...)` | 返回列表中的最小值。 | `SELECT LEAST(10, 5, 15);` (返回 5)
    |

    | `ARRAY[value1, value2, ...]` | 从给定值构建一个数组。 | `SELECT ARRAY[1, 2, 3];` (返回 {1,
    2, 3}) |

    | `GENERATE_SERIES(start, stop [, step])` | 生成一个值序列。 | `SELECT GENERATE_SERIES(1,
    5);` (返回 1, 2, 3, 4, 5) |

    | `GENERATE_SUBSCRIPTS(array, dimension)` | 为给定数组的指定维度生成有效的下标集。 | `SELECT GENERATE_SUBSCRIPTS(ARRAY[''a'',''b'',''c''],
    1);` (返回 1, 2, 3) |


    如表 10-3 所示，一种特殊类型的窗口函数是值函数。使用值函数，您可以操作单个数据值，包括类型转换、`NULL` 处理和数据格式化。这些函数作用于列或表达式中的单个值，从而实现精确的数据操作。


    ## 排名函数


    排名函数对于为查询结果中的行分配顺序至关重要。它们提供了一种根据指定标准对数据进行排名的方法，便于分析和报告。`RANK()` 为每一行分配一个排名，当出现相同排名时会跳过排名。`DENSE_RANK()`
    也分配排名，但不会为并列情况跳过排名，确保顺序排名。`ROW_NUMBER()` 为每一行分配一个唯一的顺序整数，无论是否相等。这些函数使用 `OVER()`
    子句来定义结果集的排序和分区。它们对于识别表现最佳者、分析销售数据和生成排行榜等任务非常宝贵，能够从有序数据中提供清晰且结构化的洞察。表 10-4 总结了
    PostgreSQL 中大部分著名的排名函数。


    **表 10-4：常用排名函数**


    | 函数 | 描述 | 示例 |

    | --- | --- | --- |

    | `RANK()` | 为分区内的每一行分配一个排名，并列值之间会有排名间隔。 | `SELECT RANK() OVER (PARTITION BY department
    ORDER BY salary DESC) FROM employees;` |

    | `DENSE_RANK()` | 为分区内的每一行分配一个排名，并列值之间没有排名间隔。 | `SELECT DENSE_RANK() OVER (PARTITION
    BY department ORDER BY salary DESC) FROM employees;` |

    | `ROW_NUMBER()` | 为分区内的每一行分配一个唯一的顺序整数。 | `SELECT ROW_NUMBER() OVER (PARTITION
    BY department ORDER BY salary DESC) FROM employees;` |

    | `NTILE(n)` | 将分区划分为 n 个近似相等的组，并为每一行分配一个组号。 | `SELECT NTILE(4) OVER (PARTITION
    BY department ORDER BY salary DESC) FROM employees;` |

    | `PERCENT_RANK()` | 计算分区内每一行的相对排名（0 到 1）。 | `SELECT PERCENT_RANK() OVER (PARTITION
    BY department ORDER BY salary DESC) FROM employees;` |

    '
- fmt: '## String Functions


    String functions are essential for text manipulation, enabling tasks like joining,
    extracting, and formatting text data. For instance, `CONCAT()` joins multiple
    strings into one, simplifying string composition. `LOWER()` and `UPPER()` convert
    strings to lowercase or uppercase, ensuring case consistency. `TRIM()` removes
    leading and trailing spaces, cleaning up text data. `LENGTH()` returns the character
    count of a string. `REPLACE()` substitutes specified substrings, which is useful
    for data correction. These functions are indispensable for data cleaning, formatting,
    and analysis, making text data more manageable and consistent within databases.
    Table [10-5](#619961_1_En_10_Chapter.xhtml#Tab5) summarizes most of the well-known
    string functions in PostgreSQL.


    Table 10-5


    Commonly Used String Functions


    | Function | Description | Example |

    | --- | --- | --- |

    | `CONCAT(string1, string2, ...) or string1 || string2 || ...` | Concatenates
    strings. | `SELECT CONCAT(''Post'', ''greSQL''); (returns ''PostgreSQL'')` |

    | `LEFT(string, n)` | Returns the first n characters of a string. | `SELECT LEFT(''PostgreSQL'',
    4); (returns ''Post'')` |

    | `RIGHT(string, n)` | Returns the last n characters of a string. | `SELECT RIGHT(''PostgreSQL'',
    4); (returns ''SQL'')` |

    | `TRIM([LEADING | TRAILING | BOTH] [characters] FROM string)` | Removes leading,
    trailing, or both occurrences of characters from a string. | `SELECT TRIM('' PostgreSQL
    ''); (returns ''PostgreSQL'')` |

    | `LTRIM(string [, characters])` | Removes leading characters from a string. |
    `SELECT LTRIM('' PostgreSQL''); (returns ''PostgreSQL'')` |

    | `RTRIM(string [, characters])` | Removes trailing characters from a string.
    | `SELECT RTRIM(''PostgreSQL ''); (returns ''PostgreSQL'')` |

    | `UPPER(string)` | Converts a string to uppercase. | `SELECT UPPER(''PostgreSQL'');
    (returns ''POSTGRESQL'')` |

    | `LOWER(string)` | Converts a string to lowercase. | `SELECT LOWER(''PostgreSQL'');
    (returns ''postgresql'')` |

    | `LENGTH(string)` | Returns the length of a string. | `SELECT LENGTH(''PostgreSQL'');
    (returns 10)` |

    | `POSITION(substring IN string)` | Returns the position of the first occurrence
    of a substring in a string. When you use the `POSITION` function, the position
    returned starts at 1, not 0. This is unlike many programming languages, like C
    and Python, where indexing starts at 0. | `SELECT POSITION(''gres'' IN ''PostgreSQL'');
    (returns 6)` |

    | `STRPOS(string, substring)` | Returns the position of the first occurrence of
    a substring in a string. | `SELECT STRPOS(''PostgreSQL'', ''gres''); (returns
    6)` |

    | `REPLACE(string, from, to)` | Replaces all occurrences of a substring with another
    substring. | `SELECT REPLACE(''PostgreSQL'', ''Post'', ''New''); (returns ''NewgreSQL'')`
    |

    | `INITCAP(string)` | Converts the first letter of each word to uppercase and
    the rest to lowercase. | `SELECT INITCAP(''postgreSQL database''); (returns ''PostgreSQL
    Database'')` |

    | `REPEAT(string, count)` | Repeats a string a specified number of times. | `SELECT
    REPEAT(''Post'', 3); (returns ''PostPostPost'')` |

    | `SPLIT_PART(string, delimiter, field)` | Splits a string into parts using a
    delimiter and returns the specified field. | `SELECT SPLIT_PART(''PostgreSQL,Database'',
    '','', 2); (returns ''Database'')` |

    | `TO_CHAR(value, format)` | Converts a value to a string using a format. | `SELECT
    TO_CHAR(NOW(), ''YYYY-MM-DD''); (returns ''2023-10-27'' for example)` |

    | `MD5(string)` | Calculates the MD5 hash of a string. | `SELECT MD5(''PostgreSQL'');`
    |

    | `SHA256(string)` | Calculates the SHA256 hash of a string. | `SELECT SHA256(''PostgreSQL'');`
    |

    | `TRANSLATE(string, from, to)` | Replaces characters in a string with other characters.
    | `SELECT TRANSLATE(''12345'', ''13'', ''ax''); (returns ''a2x45'')` |


    ## Date and Time Functions


    Date and time functions are crucial for handling temporal data, enabling precise
    timestamp manipulation. `NOW()` returns the current date and time, capturing the
    present moment. `AGE()` calculates the interval between two timestamps, useful
    for determining how much time has elapsed. `EXTRACT()` retrieves specific date
    or time components, like a year, month, or hour, for detailed analysis. `DATE_TRUNC()`
    truncates timestamps to a specified precision, such as a day or minute, for data
    aggregation. `TO_CHAR()` formats timestamps into custom string representations,
    facilitating report generation. These functions are essential for tasks involving
    time-series analysis and data reporting, ensuring accurate and efficient temporal
    data management. Table [10-6](#619961_1_En_10_Chapter.xhtml#Tab6) summarizes most
    of the well-known date and time functions in PostgreSQL.


    Table 10-6


    The Commonly Used Date and Time Functions


    | Function | Description | Example |

    | --- | --- | --- |

    | `NOW() or CURRENT_TIMESTAMP` | Returns the current date and time with the time
    zone. | `SELECT NOW();` |

    | `CURRENT_DATE` | Returns the current date. | `SELECT CURRENT_DATE;` |

    | `CURRENT_TIME` | Returns the current time with the time zone. | `SELECT CURRENT_TIME;`
    |

    | `DATE(timestamp)` | Extracts the date part from a timestamp. | `SELECT DATE(''2023-10-27
    10:30:00''); (returns ''2023-10-27'')` |

    | `EXTRACT(field FROM timestamp)` | Extracts a specific field (e.g., year, month,
    day, hour, minute, second) from a timestamp. | `SELECT EXTRACT(YEAR FROM ''2023-10-27
    10:30:00''); (returns 2023)` |

    | `AGE(timestamp1, timestamp2) or AGE(timestamp)` | Calculates the difference
    between two timestamps or the age of a timestamp relative to now. | `SELECT AGE(''2023-10-27'',
    ''2023-10-20''); (returns ''7 days'')` |

    | `DATE_TRUNC(field, timestamp)` | Truncates a timestamp to a specified field
    (e.g., day, month, year). | `SELECT DATE_TRUNC(''month'', ''2023-10-27 10:30:00'');
    (returns ''2023-10-01 00:00:00'')` |

    | `TO_CHAR(timestamp, format)` | Formats a timestamp as a string according to
    a format string. | `SELECT TO_CHAR(''2023-10-27 10:30:00'', ''YYYY-MM-DD HH24:MI:SS'');
    (returns ''2023-10-27 10:30:00'')` |

    | `TO_TIMESTAMP(string, format)` | Converts a string to a timestamp according
    to a format string. | `SELECT TO_TIMESTAMP(''2023-10-27 10:30:00'', ''YYYY-MM-DD
    HH24:MI:SS'');` |

    | `MAKE_DATE(year, month, day)` | Constructs a date from year, month, and day.
    | `SELECT MAKE_DATE(2023, 10, 27); (returns ''2023-10-27'')` |

    | `MAKE_TIME(hour, minute, second)` | Constructs a time from hour, minute, and
    second. | `SELECT MAKE_TIME(10, 30, 0); (returns ''10:30:00'')` |

    | `MAKE_TIMESTAMP(year, month, day, hour, minute, second)` | Constructs a timestamp
    from year, month, day, hour, minute, and second. | `SELECT MAKE_TIMESTAMP(2023,
    10, 27, 10, 30, 0);` |

    | `ISFINITE(timestamp)` | Checks if a timestamp is finite (not infinity or -infinity).
    | `SELECT ISFINITE(''2023-10-27''); (returns true)` |

    | `INTERVAL ''value unit''` | Constructs an interval value. | `SELECT INTERVAL
    ''1 day'';` |

    | `DATE_PART(text, timestamp)` | Equivalent to extract, but returns a double precision
    number. | `SELECT DATE_PART(''day'', timestamp ''2023-10-27 12:00:00'');` |

    | `JUSTIFY_DAYS(interval)` | Adjusts an interval so that 30-day time spans are
    represented as months. | `SELECT JUSTIFY_DAYS(INTERVAL ''30 days'');` |

    | `JUSTIFY_HOURS(interval)` | Adjusts an interval so that 24-hour time spans are
    represented as days. | `SELECT JUSTIFY_HOURS(INTERVAL ''24 hours'');` |

    | `JUSTIFY_INTERVAL(interval)` | Adjusts an interval using both `JUSTIFY_DAYS`
    and `JUSTIFY_HOURS`. | `SELECT JUSTIFY_INTERVAL(INTERVAL ''54 hours 31 days'');`
    |'
  raw: '### String Functions


    String functions are essential for text manipulation, enabling tasks like joining,
    extracting, and formatting text data. For instance, `CONCAT()` joins multiple
    strings into one, simplifying string composition. `LOWER()` and `UPPER()` convert
    strings to lowercase or uppercase, ensuring case consistency. `TRIM()` removes
    leading and trailing spaces, cleaning up text data. `LENGTH()` returns the character
    count of a string. `REPLACE()` substitutes specified substrings, which is useful
    for data correction. These functions are indispensable for data cleaning, formatting,
    and analysis, making text data more manageable and consistent within databases.
    Table [10-5](#619961_1_En_10_Chapter.xhtml#Tab5) summarizes most of the well-known
    string functions in PostgreSQL.


