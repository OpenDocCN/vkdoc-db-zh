    The subquery calculates the average spending per city by joining the same tables
    but grouping by city only. The `HAVING` clause filters the customers whose total
    spending exceeds their city’s average spending.


    Note


    The `HAVING` clause is a powerful SQL feature used to filter the results of `GROUP
    BY` operations based on aggregate conditions. While the `WHERE` clause filters
    individual rows before they''re grouped, `HAVING` filters groups after aggregation
    has occurred. When you need conditions based on calculations such as `SUM()`,
    `COUNT()`, `AVG()`, `MAX()`, or `MIN()`, `HAVING` is essential.


