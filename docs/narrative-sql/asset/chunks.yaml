    第 [8](#619961_1_En_8_Chapter.xhtml) 章解释了 SQL 如何为清晰的可视化准备结果。像 `SELECT`、`FROM`、`WHERE`、`GROUP
    BY` 和 `ORDER BY` 这样的语句专门为图表和趋势分析提取、过滤、聚合和排序数据。像 `AS` 这样的子句提供了清晰的标签，而操作和聚合函数则计算视觉表示所必需的数值。字符串和日期函数格式化文本并按时间分组数据。使用窗口函数和
