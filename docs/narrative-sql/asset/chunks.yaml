    # Common Pitfalls and Best Practices


    ## Avoiding Ambiguous Ordering: Always Clarify Column Names


    在排序数据时，列名的歧义可能导致意外结果甚至查询错误。这在涉及多表（如连接）或复杂子查询的查询中很常见，因为这些列可能具有相似的名称。


    在 PostgreSQL 中，当你查询具有重叠列名的多个表时，例如 `customers` 和 `orders` 表中都有 `customer_id`，如果列名在使用时没有别名或表名前缀，数据库引擎就无法立即确定你指的是哪个表的列。这在排序（`ORDER
    BY`）和过滤（`WHERE`）子句中尤其成问题。歧义发生的常见原因有三个。


    1.  `Column name overlap`：当连接多个表时，它们可能有同名的列，例如 `customer_id`。如果不指定表名或别名，PostgreSQL
    就无法确定你指的是哪一列。

    2.  `ORDER BY` 子句要求：PostgreSQL 期望排序引用明确无误，因为它依赖于表列值。如果遇到一个在多个表中存在但没有显式表引用的列名，它就不知道该按哪一列排序，从而导致歧义。

    3.  `Lack of context for aggregation and sorting`：在查询中，如果列没有明确关联到某个表，PostgreSQL
    就缺乏上下文来识别应从哪个数据源提取数据，从而导致错误或意外行为。


    ### Avoiding Ambiguity


    当你查询或排序的列属于多个表时，请使用表名或别名来标识每个列所属的表。这样，PostgreSQL 就会使用正确的数据并消除歧义。


    ### An Example of Ambiguity in Column Names When Sorting Data


    `Customers` 表存储每个客户的信息，包括唯一的 `customer_id` 和 `name`。`Orders` 表记录购买交易，包括 `order_id`、用于将订单链接到特定客户的
    `customer_id`，以及每笔交易的 `order_date`。表 6-16 和 6-17 能够跟踪客户随时间推移的购买情况，将每个订单与特定客户关联起来。


    Table 6-17


    The Orders Table


    | order_id | customer_id | order_date |

    | --- | --- | --- |

    | 1 | 1 | 2023-06-15 |

    | 2 | 1 | 2023-07-20 |

    | 3 | 2 | 2023-05-10 |

    | 4 | 3 | 2023-08-01 |

    | 5 | 3 | 2023-07-22 |

    | 6 | 4 | 2023-04-18 |

    | 7 | 5 | 2023-05-25 |


    Table 6-16


    The Customers Table


    | customer_id | name |

    | --- | --- |

    | 1 | Alice |

    | 2 | Bob |

    | 3 | Charlie |

    | 4 | Diana |

    | 5 | Eve |


    此查询的目的是检索 `customer_id` 和 `order_date`，并按 `order_date` 排序。如果在查询中没有显式使用表名或别名，PostgreSQL
    可能会因列名不明确而感到困惑，特别是当同一个列名在两个表中都存在时：


    ```sql

    SELECT customer_id, order_date

    FROM customers

    JOIN orders ON customers.customer_id = orders.customer_id

    ORDER BY order_date DESC;

    ```


    `order_date` 列只存在于 `Orders` 表中，但 `customer_id` 列在 `Customers` 和 `Orders` 中都有。如果没有明确的澄清，PostgreSQL
    可能无法可靠地确定 `order_date` 的预期来源，甚至可能混淆 `customer_id`。因此，执行此查询时会抛出以下错误：


    ```text

    psql:commands.sql:36: ERROR:  column reference "customer_id" is ambiguous

    LINE 1: SELECT customer_id, order_date

    ```


    通过指定表名或别名，你可以消除任何潜在的歧义。以下是修正后的查询：


    ```sql

    SELECT customers.customer_id, orders.order_date

    FROM customers

    JOIN orders ON customers.customer_id = orders.customer_id

    ORDER BY orders.order_date DESC;

    ```


    这个版本在 `ORDER BY` 子句中明确引用了 `orders.order_date` 列，确保了 PostgreSQL 知道使用哪个表进行排序。


    结果显示了来自 `Orders` 表的 `order_date` 列，按降序排列，如表 6-18 所示。


    Table 6-18


    Descending Order Given the order_date


    | customer_id | order_date |

    | --- | --- |

    | 3 | 2023-08-01 |

    | 3 | 2023-07-22 |

    | 1 | 2023-07-20 |

    | 1 | 2023-06-15 |

    | 5 | 2023-05-25 |

    | 2 | 2023-05-10 |

    | 4 | 2023-04-18 |


    # Plot Efficiency with `ORDER BY` and `LIMIT`


    `ORDER BY` 和 `LIMIT` 在绘图时特别有用，因为它们允许你：


    *   **聚焦相关数据**：在分析大型数据集时，绘图应专注于关键洞察而非所有数据点。

    *   **提高绘图清晰度**：通过将数据限制为可管理的子集（例如最相关或最具影响力的行），图表变得更容易理解。

    *   **增强性能**：包含数千行的大型数据集会减慢绘图过程并使可视化工具不堪重负，导致加载时间变长和响应性降低。使用 `LIMIT` 和 `ORDER
    BY` 可以避免因仅获取部分行而导致绘图过载。这使得可视化过程更快、更高效。

    *   **突出趋势和异常值**：在绘制特定数据点时，有序和有限的数据能更容易地识别趋势、异常值并进行比较。


    在本章中，`plot` 通常指以结构化、有意义的方式排列或呈现数据，通常是为可视化做准备。使用 `ORDER BY` 和 `LIMIT` 子句通过排序和筛选数据到最相关的条目来实现这一点。尽管数据存储和查询功能强大，但在你准备好并排序数据后，可以使用第三方可视化工具来创建可视化。`ORDER
    BY` 根据指定的列组织结果集，可以是升序（`ASC`）或降序（`DESC`），使你可以优先处理数据。同时，`LIMIT` 限制返回的行数，使得更容易专注于一个子集，例如前几条结果。这些查询共同提炼数据，以便进行更清晰、更有见地的分析和呈现。


    # Summary


    本章解释了在 SQL 查询中使用 `ORDER BY` 和 `LIMIT` 子句对于有效组织和管理数据集的重要性。它强调了这些子句如何通过按特定顺序排序数据并限制返回的行数来缩小查询结果范围。通过有选择地限制和选取数据，分析师可以增强数据分析和可视化任务的清晰度和性能。本章通过过滤数据以获取针对性见解、提高可视化绘图效果以及优化查询性能，展示了这些
    SQL 功能。'
  raw: '##### Example 2: Sorting with NULLS LAST


    You can use `NULLS LAST` to display customers who haven’t bought anything yet:


    ```

    SELECT * FROM customers

    ORDER BY last_purchase_date

    DESC NULLS LAST;

    ```


    Table [6-15](#619961_1_En_6_Chapter.xhtml#Tab15) shows that the `NULL`s are sorted
    last in the sorting process.


    Table 6-15


    Customer Sorting with `NULLS LAST`


    | customer_id | customer_name | last_purchase_date |

    | --- | --- | --- |

    | 3 | Charlie | 2023-07-20 |

    | 1 | Alice | 2023-06-15 |

    | 5 | Eve | 2023-05-10 |

    | 2 | Bob | NULL |

    | 4 | Diana | NULL |


    First, non-`NULL` dates appear in descending order, with `NULL` values at the
    bottom because of `NULLs LAST`.


    The purpose of `NULLS FIRST` is to prioritize `NULL` values at the top, whereas
    `NULLS LAST` moves `NULL` values to the bottom of the ordered results. You can
    control how `NULL` values appear in your results, which makes the data presentation
    more meaningful based on context.


    ## Common Pitfalls and Best Practices


    ### Avoiding Ambiguous Ordering: Always Clarify Column Names


    When sorting data, ambiguity in column names can lead to unexpected results or
    even query errors. This commonly occurs in queries involving multiple tables (like
    joins) or complex subqueries, where columns might share similar names.


    In PostgreSQL, when you query multiple tables with overlapping column names, like
    `customer_id` in both customers and orders, the database engine cannot immediately
    determine which table’s column you’re referring to if the column name is used
    without an alias or table name prefix. This is especially problematic in sorting
    (`ORDER BY`) and filtering (`WHERE`) clauses. There are three common reasons why
    ambiguity occurs.


    1.  **Column name overlap**: When multiple tables are joined, they may have columns
    with the same name, such as `customer_id`. Without specifying a table name or
    alias, PostgreSQL can’t determine which column you mean.


    2.  **ORDER BY clause** **requirements**: PostgreSQL expects unambiguous references
    for sorting because it relies on table column values. If it encounters a column
    name that exists in multiple tables without an explicit table reference, it doesn’t
    know which one to sort by, causing ambiguity.


    3.  **Lack of context for** **aggregation and sorting**: In queries where columns
    aren’t explicitly associated with a table, PostgreSQL lacks the context to identify
    which data source to pull from, leading to errors or unexpected behavior.


    #### Avoiding Ambiguity


    Whenever you query or sort on columns that are part of multiple tables, use table
    names or aliases to identify which table each column belongs to. As a result,
    PostgreSQL uses the correct data and eliminates ambiguity.


    #### An Example of Ambiguity in Column Names When Sorting Data


    The `Customers` table stores information about each customer, including a unique
    `customer_id` and `name`. The `Orders` table records purchase transactions, including
    `order_id`, the `customer_id` linking orders to specific customers, and the `order_date`
    of each transaction. Tables [6-16](#619961_1_En_6_Chapter.xhtml#Tab16) and [6-17](#619961_1_En_6_Chapter.xhtml#Tab17)
    enable tracking customer purchases over time, associating each order with a particular
    customer.


    Table 6-17


    The Orders Table


    | order_id | customer_id | order_date |

    | --- | --- | --- |

    | 1 | 1 | 2023-06-15 |

    | 2 | 1 | 2023-07-20 |

    | 3 | 2 | 2023-05-10 |

    | 4 | 3 | 2023-08-01 |

    | 5 | 3 | 2023-07-22 |

    | 6 | 4 | 2023-04-18 |

    | 7 | 5 | 2023-05-25 |


    Table 6-16


    The Customers Table


    | customer_id | name |

    | --- | --- |

    | 1 | Alice |

    | 2 | Bob |

    | 3 | Charlie |

    | 4 | Diana |

    | 5 | Eve |


    The purpose of this query is to retrieve `customer_id` and `order_date`, sorted
    by `order_date`. If the table names or aliases are not used explicitly in the
    query, PostgreSQL can become confused due to ambiguous column names, particularly
    when the same column name exists in both tables:


    ```

    SELECT customer_id, order_date

    FROM customers

    JOIN orders ON customers.customer_id = orders.customer_id

    ORDER BY order_date DESC;

    ```


    The `order_date` column exists only in the `Orders` table, but the `customer_id`
    column is present in both `Customers` and `Orders`. Without explicit clarification,
    PostgreSQL may not reliably determine the intended source of `order_date` or even
    confuse `customer_id`. As a result, this error is thrown when this query is executed.


    ```

    psql:commands.sql:36: ERROR:  column reference "customer_id" is ambiguous

    LINE 1: SELECT customer_id, order_date

    ```


    By specifying the table name or alias, you remove any potential for ambiguity.
    Here’s the revised query:


    ```

    SELECT customers.customer_id, orders.order_date

    FROM customers

    JOIN orders ON customers.customer_id = orders.customer_id

    ORDER BY orders.order_date DESC;

    ```


    This version explicitly references the `orders.order_date` column in the `ORDER
    BY` clause, ensuring PostgreSQL knows which table to use for sorting.


    This result displays the `order_date column` from the `Orders` table in descending
    order, as shown in Table [6-18](#619961_1_En_6_Chapter.xhtml#Tab18).


    Table 6-18


    Descending Order Given the order_date


    | customer_id | order_date |

    | --- | --- |

    | 3 | 2023-08-01 |

    | 3 | 2023-07-22 |

    | 1 | 2023-07-20 |

    | 1 | 2023-06-15 |

    | 5 | 2023-05-25 |

    | 2 | 2023-05-10 |

    | 4 | 2023-04-18 |


    ## Plot Efficiency with ORDER BY and LIMIT


    `ORDER BY` and `LIMIT` are particularly useful when plotting because they allow
    you to:


    *   **Focus on relevant data**: The plot should focus on key insights rather than
    all data points when analyzing large datasets.


    *   **Improve plot clarity**: The plot becomes easier to understand by limiting
    the data to a manageable subset, such as the most relevant or impactful rows.


    *   **Enhance performance**: Large datasets with thousands of rows can slow down
    plotting processes and overwhelm visual tools, resulting in longer load times
    and reduced responsiveness. Using `LIMIT` with `ORDER BY` avoids overloading the
    plot by fetching only a select number of rows. This makes the visualization process
    faster and more efficient.


    *   **Highlight trends and outliers**: When plotting specific data points, ordered
    and limited data makes identifying trends, outliers, and comparisons easier.


    In this chapter, a *plot* generally refers to arranging or presenting data in
    a structured, meaningful way, often as preparation for visualization. Using `ORDER
    BY` and `LIMIT` clauses helps achieve this by sorting and narrowing down data
    into the most relevant entries. Despite the power of data storage and querying,
    third-party visualization tools are available, which make it possible to create
    visualizations after you have prepared and ordered the data. `ORDER BY` organizes
    the result set based on specified columns, either in ascending (`ASC`) or descending
    (`DESC`) order, allowing you to prioritize data. Meanwhile, `LIMIT` constrains
    the number of rows returned, making it easier to focus on a subset, such as the
    top results. Together, these queries refine data for clearer, more insightful
    analysis and presentation.


    ## Summary


    This chapter explained the importance of using the `ORDER BY` and `LIMIT` clauses
    in SQL queries to organize and manage datasets effectively. It highlighted how
    these clauses help narrow down query results by sorting data in a specific order
    and limiting the number of rows returned. By limiting and selecting data selectively,
    analysts can enhance the clarity and performance of data analysis and visualization
    tasks. These SQL features are demonstrated in the chapter in terms of filtering
    data for targeted insights, improving visual plot effectiveness, and optimizing
    query performance.'
