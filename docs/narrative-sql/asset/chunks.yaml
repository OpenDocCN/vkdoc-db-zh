    with a maximum length of 100 characters.


    *   `email`: The customer’s email address, also stored as a `VARCHAR` with a maximum
    length of 100 characters.


    *   `interaction_date`: The date of the interaction with the customer, stored
    as a `DATE`.


    This structure allows you to store and query customer interaction data effectively.
    The next section discusses the different data types of variables in SQL.


    Table 1-2


    The Customer Table


    | customer_id | Name | Email | interaction_date |

    | --- | --- | --- | --- |

    | 1 | Jane Doe | `jane.doe@email.com` | 2022-01-01 |

    | 2 | John Smith | `john.smith@email.com` | 2022-01-02 |


    Setting up an environment using PostgreSQL is a crucial step. The initial steps
    in creating a robust analysis and storytelling platform are installation, database
    creation, data structuring, and querying. In the forthcoming chapters of this
    book, you are taken on a detailed, step-by-step journey into the art of query
    writing. Through the examples provided in the next chapters, you will develop
    SQL skills, from the basics to advanced querying techniques.'
  trans: '

    # 数据分析中的事务语句与查询语句整合


    虽然事务语句提供了安全操作数据的方法，但查询语句则提供了提取洞察的手段。在一个有条理的数据分析工作流中，分析师可能会使用事务语句来准备分析所需的数据（例如，修正、更新或清理数据），并使用查询语句在数据达到可靠状态后从中提取洞察。需要注意的是，事务在确保数据操作步骤的可重复性和可逆性方面也能发挥作用，这对于验证和确认分析结果至关重要。


    ## 使用 PostgreSQL 设置叙事环境


    使用 PostgreSQL 创建一个叙事环境，涉及建立一个数据库系统，数据可以在其中被存储、操作和查询，以揭示和讲述隐藏在数据中的引人入胜的故事。PostgreSQL
    为数据分析和叙事提供了一个理想的平台。本节将指导你完成建立这样一个环境的初始步骤，强调 PostgreSQL 的简洁性和强大功能。


    ### 步骤一：安装


    **下载并安装 PostgreSQL**。从 [PostgreSQL 官网](https://www.postgresql.org/download/) 下载适用于你操作系统的
    PostgreSQL 安装程序。安装过程是直接了当的。按照屏幕上的指示操作，并务必记下你在安装期间设置的管理员密码以及 PostgreSQL 将运行的默认端口（通常是
    5432）。


    ### 步骤二：创建你的第一个数据库


    **访问 PostgreSQL**。安装完成后，通过其名为 `psql` 的命令行界面（CLI）访问 PostgreSQL，或使用图形用户界面（GUI）工具。两者都提供了全面的数据库管理功能，其中
    `pgAdmin` 因其视觉特性对初学者更友好。


    **创建数据库**。要创建你的第一个数据库，请使用 `psql` 命令行界面或 `pgAdmin`。在 PostgreSQL 中，你可以通过执行以下命令创建一个名为
    `storytelling_db` 的数据库：


    ```

    CREATE DATABASE storytelling_db;

    ```


    ### 步骤三：定义数据结构


    **创建表。** 数据库就位后，下一步是通过创建表来定义数据的结构。例如，如果你要讲述关于客户交互的故事，你可能会创建一个名为 `customers` 的表，包含客户
    ID、姓名、电子邮件和交互日期等字段。


    ```

    CREATE TABLE customers (

    customer_id SERIAL PRIMARY KEY,

    name VARCHAR(100),

    email VARCHAR(100),

    interaction_date DATE

    );

    ```


    **插入数据。** 用初始数据填充你的表，以开始分析。`INSERT` 语句向表中添加记录，为你的叙事奠定基础。


    ```

    INSERT INTO customers (name, email, interaction_date) VALUES

    (''Jane Doe'', ''jane.doe@email.com'', ''2022-01-01''),

    (''John Smith'', ''john.smith@email.com'', ''2022-01-02'');

    ```


    这个名为 `storytelling_db` 的数据库包含一个名为 `customers` 的表。表 `1-2` 展示了 `customers` 表，该表是为保存客户交互数据而创建的。这个表的结构旨在捕获关于客户及其交互的基本细节。`customers`
    表中的字段如下：


    *   `name`：客户姓名，存储为最大长度 100 个字符的可变字符串（`VARCHAR`）。

    *   `email`：客户的电子邮件地址，同样存储为最大长度 100 个字符的 `VARCHAR`。

    *   `interaction_date`：与客户交互的日期，存储为 `DATE` 类型。


    这种结构使你能够有效地存储和查询客户交互数据。下一节将讨论 SQL 中变量的不同数据类型。


    **表 1-2 客户表**


    | customer_id | 姓名 | 电子邮件 | interaction_date |

    | --- | --- | --- | --- |

    | 1 | Jane Doe | `jane.doe@email.com` | 2022-01-01 |

    | 2 | John Smith | `john.smith@email.com` | 2022-01-02 |


    使用 PostgreSQL 设置环境是关键一步。创建一个强大的分析和叙事平台的初始步骤包括安装、数据库创建、数据结构化和查询。在本书接下来的章节中，你将踏上一段关于查询编写艺术的、详细的、循序渐进的旅程。通过后续章节提供的示例，你将培养
    SQL 技能，从基础到高级查询技术。

