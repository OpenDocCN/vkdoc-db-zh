  trans: "\n## 第二个故事：一个外卖配送平台\n\n吉妮芙，一家外卖配送平台的数据分析师，当营销团队希望为一个忠诚度计划识别高价值客户时，她面临了一项具有挑战性的任务。她需要找到在各自城市消费额高于平均水平的客户，但仅限那些表现出持续订餐行为的客户。\n\
    \n她希望使用 `表 7-22`、`表 7-23` 和 `表 7-24` 来确定每个城市客户的平均总消费金额，找出在各自城市消费超过该平均值的客户，并筛选掉订单少于两单的客户。\n\
    \n### 表 7-22：客户表\n\n| customer_id | 姓名 | 城市 |\n| --- | --- | --- |\n| 1 | 爱丽丝·约翰逊\
    \ | 纽约 |\n| 2 | 鲍勃·史密斯 | 芝加哥 |\n| 3 | 查理·戴维斯 | 波士顿 |\n| 4 | 大卫·布朗 | 纽约 |\n| 5\
    \ | 伊娃·怀特 | 芝加哥 |\n| 6 | 弗兰克·格林 | 波士顿 |\n| 7 | 格蕾丝·布莱克 | 纽约 |\n| 8 | 汉娜·布鲁 | 芝加哥\
    \ |\n| 9 | 艾薇·瑞德 | 纽约 |\n| 10 | 杰克·格雷 | 芝加哥 |\n| 11 | 利亚姆·耶洛 | 波士顿 |\n| 12 | 米娅·珀普尔\
    \ | 纽约 |\n| 13 | 诺亚·奥兰治 | 芝加哥 |\n| 14 | 奥利维亚·平克 | 波士顿 |\n| 15 | 保罗·西尔弗 | 纽约 |\n\
    | 16 | 奎因·戈尔德 | 芝加哥 |\n\n### 表 7-23：订单表\n\n| order_id | customer_id | restaurant_id\
    \ | total_amount | order_date |\n| --- | --- | --- | --- | --- |\n| 1001 | 1 |\
    \ 101 | 50 | 2025-01-01 |\n| 1002 | 1 | 102 | 20 | 2025-01-02 |\n| 1003 | 2 |\
    \ 101 | 45 | 2025-01-03 |\n| 1004 | 3 | 103 | 35 | 2025-01-04 |\n| 1005 | 3 |\
    \ 102 | 55 | 2025-01-05 |\n| 1006 | 4 | 101 | 70 | 2025-01-06 |\n| 1007 | 5 |\
    \ 102 | 30 | 2025-01-07 |\n| 1008 | 5 | 101 | 60 | 2025-01-08 |\n| 1009 | 5 |\
    \ 102 | 40 | 2025-01-09 |\n| 1010 | 6 | 103 | 25 | 2025-01-10 |\n| 1011 | 6 |\
    \ 102 | 45 | 2025-01-11 |\n| 1012 | 7 | 101 | 90 | 2025-01-12 |\n| 1013 | 7 |\
    \ 102 | 50 | 2025-01-13 |\n| 1014 | 8 | 101 | 80 | 2025-01-14 |\n| 1015 | 8 |\
    \ 102 | 20 | 2025-01-15 |\n| 1016 | 9 | 101 | 100 | 2025-01-16 |\n| 1017 | 9 |\
    \ 102 | 60 | 2025-01-17 |\n| 1018 | 10 | 101 | 90 | 2025-01-18 |\n| 1019 | 10\
    \ | 102 | 70 | 2025-01-19 |\n| 1020 | 11 | 103 | 55 | 2025-01-20 |\n| 1021 | 11\
    \ | 102 | 45 | 2025-01-21 |\n| 1022 | 11 | 101 | 120 | 2025-01-22 |\n| 1023 |\
    \ 11 | 102 | 80 | 2025-01-23 |\n\n### 表 7-24：餐厅表\n\n| restaurant_id | 名称 | 城市\
    \ |\n| --- | --- | --- |\n| 101 | 披萨宫 | 纽约 |\n| 102 | 寿司点 | 芝加哥 |\n| 103 | 汉堡吧\
    \ | 波士顿 |\n\n莎拉的业务问题是识别那些消费额超过所在城市平均值，但前提是他们下过超过两个订单的客户。\n\n作为第一步，她将问题分解为以下子问题：\n\
    \n-   找出每个城市客户的平均总消费金额。\n-   找出在自己居住城市消费超过该城市平均值的客户。\n-   筛选出订单数量少于两单的客户。\n\n\
    为了解决这些问题，将运行多个子查询：\n\n-   最内层的子查询将计算每个城市客户的平均总消费金额。\n-   中间层的子查询将识别符合条件的客户。\n\
    -   最外层的查询将根据客户的订单数量进行筛选。\n\n以下是对最内层子查询的逐步分解：\n\n```sql\nSELECT c.city, AVG(o.total_amount)\
    \ AS avg_city_spending\nFROM customers c\nJOIN orders o ON c.customer_id = o.customer_id\n\
    GROUP BY c.city;\n```\n\n最内层的子查询计算每个城市客户的平均总消费金额。这涉及连接 `Customers` 表和 `Orders`\
    \ 表，并按 `city` 进行分组。如 `表 7-25` 所示，此查询计算出了每个城市客户的平均总消费金额。\n\n### 表 7-25：各城市客户的平均总消费金额\n\
    \n| 城市 | total_amount |\n| --- | --- |\n| 纽约 | 70 |\n| 芝加哥 | 45 |\n| 波士顿 | 90\
    \ |\n\n中间层的子查询使用最内层查询的结果来筛选在各自城市消费超过平均值的客户。中间层子查询编写如下：\n\n```sql\nSELECT c.customer_id,\
    \ c.name, c.city, SUM(o.total_amount) AS total_spent\nFROM customers c\nJOIN orders\
    \ o ON c.customer_id = o.customer_id\nGROUP BY c.customer_id, c.name, c.city\n\
    HAVING SUM(o.total_amount) > (\n    SELECT AVG(o2.total_amount)\n    FROM customers\
    \ c2\n    JOIN orders o2 ON c2.customer_id = o2.customer_id\n    WHERE c2.city\
    \ = c.city\n    GROUP BY c2.city\n);\n```\n\n此查询识别了在各自城市消费超过该城市平均消费额的客户。它通过连接\
    \ `Customers` 表和 `Orders` 表来计算每位客户的总消费额。它按客户详细信息对结果进行分组。子查询通过连接相同的表但仅按 `city`\
    \ 分组，计算了每个城市的平均消费额。`HAVING` 子句筛选出总消费额超过其所在城市平均消费额的客户。\n\n**注意**\n\n`HAVING` 子句是一个强大的\
    \ SQL 功能，用于基于聚合条件过滤 `GROUP BY` 操作的结果。`WHERE` 子句在分组前过滤单个行，而 `HAVING` 在聚合发生后过滤分组。当你需要基于诸如\
    \ `SUM()`、`COUNT()`、`AVG()`、`MAX()` 或 `MIN()` 等计算的条件时，`HAVING` 是必不可少的。\n\n主查询和子查询之间的关联通过\
    \ `c2.city = c.city` 条件建立，这确保了每个客户只与自己城市的平均值进行比较。这使得该查询成为一个关联子查询，它针对外层查询中的每个客户组执行一次。\n\
    \n该查询计算了每个城市的平均总消费额。最后，最外层的查询如下：\n\n```sql\nSELECT c.customer_id, c.name, c.city,\
    \ SUM(o.total_amount) AS total_spent, COUNT(o.order_id) AS order_count\nFROM customers\
    \ c\nJOIN orders o ON c.customer_id = o.customer_id\nGROUP BY c.customer_id, c.name,\
    \ c.city\nHAVING COUNT(o.order_id) > 2 AND SUM(o.total_amount) > (\n    SELECT\
    \ AVG(o2.total_amount)\n    FROM customers c2\n    JOIN orders o2 ON c2.customer_id\
    \ = o2.customer_id\n    WHERE c2.city = c.city\n    GROUP BY c2.city\n);\n```\n\
    \n此查询确保只有那些下过超过两个订单——`COUNT(o.order_id) > 2`——且在各自城市消费超过平均值的客户才会被包含在结果中。最外层的查询检索出那些在各自城市消费超过平均值且下过超过两个订单的客户。\n\
    \n当这些层级结合起来时，便以一种为莎拉的问题提供最终答案的方式编写出了一个多层查询：\n\n```sql\nSELECT c.customer_id, c.name,\
    \ c.city, SUM(o.total_amount) AS total_spent, COUNT(o.order_id) AS order_count\n\
    FROM customers c\nJOIN orders o ON c.customer_id = o.customer_id\nGROUP BY c.customer_id,\
    \ c.name, c.city\nHAVING COUNT(o.order_id) > 2 AND SUM(o.total_amount) > (\n \
    \   SELECT AVG(o2.total_amount)\n    FROM customers c2\n    JOIN orders o2 ON\
    \ c2.customer_id = o2.customer_id\n    WHERE c2.city = c.city\n    GROUP BY c2.city\n\
    );\n```\n\n这个 SQL 查询识别了一个外卖配送平台上的高价值客户。通过连接 `Customers` 表和 `Orders` 表计算每位客户的总消费额。在嵌套的子查询中，订单按\
    \ `city` 分组以计算平均总消费额。使用 `HAVING` 子句，主查询将每位客户的总消费额与其所在城市的平均值进行比较，但只包含订单数超过两个的客户。最终输出中，显示了那些在各自城市消费超过平均值的客户的姓名、城市及其总消费金额。见\
    \ `表 7-26`。\n\n### 表 7-26：莎拉业务问题的最终答案\n\n| customer_id | 姓名 | 城市 | total_spent\
    \ | order_count |\n| --- | --- | --- | --- | --- |\n| 11 | 利亚姆·耶洛 | 波士顿 | 300\
    \ | 4 |\n| 5 | 伊娃·怀特 | 芝加哥 | 130 | 3 |\n"
- fmt: 'To improve the readability of the multi-level nested query, Sarah uses CTEs.
    A CTE is a temporary result set defined by the `WITH` clauses that can be referenced
    within the main query. By dividing complex logic into smaller, named blocks, SQL
    statements can be read, debugged, and maintained more easily. Using CTEs, Sarah
    can separate intermediate steps, clarify query flow, and avoid deeply nested subqueries.


    ```sql

    WITH city_spending AS (

    SELECT city, AVG(total_customer_spent) AS avg_city_spending

    FROM (

    SELECT c.customer_id, c.city, SUM(o.total_amount) AS total_customer_spent

    FROM customers c

    JOIN orders o ON c.customer_id = o.customer_id

    GROUP BY c.customer_id, c.city ) AS customer_totals

    GROUP BY city

    ),

    customer_spending AS (

    SELECT c.customer_id, c.name, c.city, SUM(o.total_amount) AS total_spent, COUNT(o.order_id)
    AS order_count

    FROM customers c

    JOIN orders o ON c.customer_id = o.customer_id

    GROUP BY c.customer_id, c.name, c.city

    HAVING COUNT(o.order_id) > 2 )

    SELECT cs.customer_id, cs.name, cs.city, cs.total_spent, cs.order_count

    FROM customer_spending cs

    JOIN city_spending csp ON cs.city = csp.city

    WHERE cs.total_spent > csp.avg_city_spending;

    ```


    This query uses CTEs to find high-value customers in a food delivery platform.
    It breaks down the analysis into two clear steps: First, `city_spending` calculates
    the total spending for each city. Second, `customer_spending` computes individual
    customer spending while filtering for those with more than two orders. Finally,
    it joins these temporary tables to identify customers whose spending exceeds their
    city’s total. It displays their name, city, and total spent amount. This query
    uses CTEs for better readability and maintainability, while the previous query
    used nested subqueries, making it more complex.


    ## Common Pitfalls


    When working with complex nested queries and multi-level queries in SQL, developers
    often encounter a variety of challenges that affect performance, readability,
    and maintainability. This section contains a detailed overview of common pitfalls
    and solutions.


    ### Poor Readability


    One of the most common issues with complex nested queries is poor readability.
    When queries are deeply nested or overly complex, they become difficult to understand
    and maintain. These queries can also be challenging to debug or modify. The use
    of CTEs to break complex queries into smaller, more manageable parts might be
    one possible solution to this problem. CTEs improve readability and make it easier
    to isolate and troubleshoot different parts of the query.


    ### Repeated Subquery Execution


    Repeated execution of subqueries can cause performance issues, as the same computation
    is done multiple times during query execution.


    The problem of running subqueries multiple times slows down query performance.
    To solve this problem, the subquery can be computed once and referenced multiple
    times within the query using derived tables or CTEs.


    Derived tables are temporary, virtual tables that are created as a result of a
    subquery in a SQL query’s `FROM` clause. These tables do not exist in the database
    schema but are dynamically generated at query runtime. They simplify complex queries
    by breaking them down into smaller, more manageable components.


    The general syntax of derived tables is provided here:


    ```sql

    SELECT derived_table.col1, derived_table.col2

    FROM (

    SELECT col1, col2

    FROM original_table

    WHERE col3 > 100

    ) AS derived_table;

    ```


    ### Too Many Subqueries Instead of Joins


    Using too many nested subqueries instead of `JOIN`s can make queries unnecessarily
    complex and inefficient. Using several nested subqueries instead of `JOIN`s can
    result in slower and more complicated queries. In order to improve performance
    and simplify the query structure, it is best to replace subqueries with `JOIN`s
    where possible.


    ### Returning Too Much Data


    Subqueries that return large result sets can negatively impact query performance
    because it slows down query execution. It is possible to add filters and SQL `WHERE`
    clauses to subqueries to limit the amount of data retrieved.


    ### Forgetting to Use Aliases


    Forgetting to use aliases in nested queries can result in ambiguous column references,
    making queries more difficult to read and maintain. Ambiguous column references
    in nested queries can also cause confusion and errors. To prevent this problem,
    use table aliases to clarify which table each column belongs to.


    Table [7-27](#619961_1_En_7_Chapter.xhtml#Tab27) summarizes these common pitfalls
    and their solutions.


    Table 7-27: Common Pitfalls and Solutions When Writing Complex Nested Queries
    and Multi-Level Queries


    | Pitfall | Problem | Solution |

    | --- | --- | --- |

    | Poor readability | Queries become hard to read and maintain | Use CTEs for better
    readability |

    | Repeated subquery execution | Subqueries run multiple times, slowing performance
    | Use derived tables or CTEs |

    | Too many subqueries instead of joins | Nested subqueries when a `JOIN` would
    suffice | Replace subqueries with `JOIN`s |

    | Returning too much data | Subqueries return large result sets | Add filters
    to subqueries |

    | Forgetting to use aliases | Ambiguous column references in nested queries |
    Use table aliases to clarify |


    ## Summary


    This chapter explored the concept of dynamic dialogues with subqueries, focusing
    on nested and multi-level queries. It highlighted how these queries can enhance
    SQL’s flexibility by allowing complex data manipulations within a single statement.
    However, the chapter also discussed common pitfalls, such as poor readability,
    performance issues from repeated subquery executions, and challenges with large
    result sets. By applying best practices like CTEs and table aliases, analysts
    can optimize query performance and maintainability. These techniques contribute
    to writing more efficient, readable, and maintainable SQL code, ensuring better
    data analysis and decision-making outcomes.


    ## Key Points


    - Dynamic dialogues in SQL involve using subqueries to create more flexible and
    adaptive queries that respond to varying data inputs. These dialogues allow SQL
    queries to be constructed in a modular fashion, adding flexibility to SQL queries
    by enabling complex data manipulations within a single query.

    - Multi-level nested queries provide powerful ways to solve complex problems by
    breaking queries into hierarchical structures. These queries enable SQL users
    to handle multi-step data transformations within a single statement, reducing
    the need for multiple queries.

    - Using CTEs can improve the readability and maintainability of complex queries
    by breaking them into smaller, more manageable parts.

    - Simplifying queries by replacing unnecessary nested subqueries with `JOIN`s
    enhances both performance and clarity.

    - Applying filters within subqueries reduces the amount of data processed, improving
    query efficiency and focusing on relevant data.


    ## Key Takeaways


    - **Dynamic dialogues with subqueries**: Use subqueries to create adaptive queries
    that respond dynamically to varying data inputs. This approach enhances modularity,
    making queries more flexible and reusable in different scenarios.

    - **Multi-level nested queries**: The use of multi-level nested queries can be
    employed in order to handle complex data transformations within a single query.
    This method enables the execution of step-by-step processes without needing separate
    queries, improving both performance and maintainability.


    ## Looking Ahead


    The next chapter, “Conditional Logic in Data Plotting,” looks at `CASE` statements
    for dynamic data outputs and explains how to customize data stories based on complex
    analysis of complex datasets.'
