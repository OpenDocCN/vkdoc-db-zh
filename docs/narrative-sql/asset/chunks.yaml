    ## 动态筛选心脏相关病例


    在下一个挑战中，决策者希望根据诊断代码动态查看入院患者。Sofia 需要筛选数据，仅显示 `diagnosis_codes` 在 100 到 199 之间的心脏相关患者。


    ```sql

    SELECT

    patient_id,

    diagnosis_code,

    admission_date,

    discharge_date

    FROM hospital_admissions

    WHERE diagnosis_code BETWEEN 100 AND 199

    AND admission_date >= ''2024-01-01''

    AND admission_date <= ''2024-12-31'';

    ```


    在此查询中，`WHERE` 子句允许进行动态筛选。此处，数据被缩小到仅显示 2024 年内的心脏相关入院记录，减少了杂乱信息，并将重点放在请求的子集数据上。`WHERE`
    子句通过仅选择 `diagnosis_code` 在 100 到 199 之间（代表心脏相关问题）且 `admission_date` 在 2024 年内的行来进行过滤。如表
    [8-12](#619961_1_En_8_Chapter.xhtml#Tab12) 所示，动态筛选确保只有相关数据被纳入分析。


    **表 8-12：动态筛选（心脏相关问题）**


