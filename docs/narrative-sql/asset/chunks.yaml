  trans: "\n## SQL 中的数据类型\n\nSQL 中的数据类型是一个基本概念，它定义了可以存储在数据库列中的数据性质。SQL 中的每种数据类型都确保数据符合预定义的格式，便于准确的数据存储、检索和分析。为了有效地设计和操作数据库，熟悉这些数据类型至关重要。以下是\
    \ SQL 中可用的常见数据类型：\n\n*   **数值数据类型：**\n\n    `INTEGER`：一个整数，可以是正数或负数。根据数据库系统的不同，变体如\
    \ `INT`、`SMALLINT`、`TINYINT` 和 `BIGINT` 表示不同大小的整数。\n\n    `DECIMAL` 和 `NUMERIC`：这些数据类型旨在存储精确的数值数据值。在\
    \ SQL 中定义 `DECIMAL` 或 `NUMERIC` 列允许分析师指定精度和小数位数，从而使数据库能够精确处理数值数据。精度指的是数字中小数点左右两侧的有效数字位数，即数字的总位数。小数位数指定小数点后的位数。它代表数字的小数部分，是精度的一个子集。\n\
    \n    `FLOAT`、`REAL` 和 `DOUBLE PRECISION`：表示具有不同精度级别的浮点数。适用于对精确度要求不高的科学计算。\n\n\
    *   **字符串数据类型：**\n\n    `CHAR` 和 `CHARACTER`：固定长度的字符串。如果输入的字符串短于指定长度，则会在右侧填充空格。\n\
    \n    `VARCHAR` 和 `CHARACTER VARYING`：可变长度字符串。允许存储长度不超过指定最大值的字符串。\n\n    `TEXT`：用于长度可能超过\
    \ `VARCHAR` 限制的大型文本数据。\n\n*   **日期和时间数据类型：**\n\n    `DATE`：存储日期值，包括年、月、日。\n\n\
    \    `TIME`：存储一天中的时间值。\n\n    `TIMESTAMP`：结合日期和时间，捕捉特定的时间点。\n\n    `INTERVAL`：表示一段时长，可用于计算日期或时间之间的差异。\n\
    \n*   **布尔数据类型：**\n\n    `BOOLEAN`：表示逻辑布尔值，通常为 `TRUE` 或 `FALSE`。\n\n*   **二进制数据类型：**\n\
    \n    `BINARY` 和 `VARBINARY`：以固定长度或可变长度格式分别存储二进制数据，如图像或文件。\n\n    `BLOB` (二进制大对象)：用于存储大型二进制数据，如图像、视频或文档。\n\
    \n*   **特殊化数据类型：**\n\n    `ENUM`：一种字符串对象，其值只能从表创建时定义的值列表中选择一个。\n\n    `ARRAY`：支持存储数组（即元素的有序集合），数组元素为指定的数据类型。\n\
    \n    `JSON` 和 `XML`：用于存储 JSON 或 XML 数据，允许在单个数据库列中存储复杂的数据结构。\n\n    `UUID`：存储通用唯一标识符。\n\
    \n*   **地理空间数据类型：**\n\n    `POINT`、`LINESTRING` 和 `POLYGON`：特定于支持地理空间数据的数据库，用于表示地理形状和位置。\n\
    \n选择适当的数据类型对于优化数据库存储、性能和数据完整性非常重要。在设计数据库模式时，请考虑您的数据特性和性能要求。\n\n以下是每种提到的 SQL 数据类型的示例，它们说明了在创建表时如何使用这些数据类型。\n\
    \n*   **数值数据类型：**\n\n    ```\n    CREATE TABLE numeric_examples (\n    id INT,\n\
    \    small_number SMALLINT,\n    big_number BIGINT,\n    exact_amount DECIMAL(10,\
    \ 2),\n    approx_net_worth FLOAT\n    );\n    ```\n\n    此查询创建了一个名为 `numeric_examples`\
    \ 的表，包含五列，每列设计用于容纳不同类型和规模的数值数据。这些列包括一个名为 `id` 的整数、一个名为 `small_number` 的小整数、一个名为\
    \ `big_number` 的大整数、一个名为 `exact_amount` 的精确小数（适用于财务数据），以及一个名为 `approx_net_worth`\
    \ 的浮点数（用于近似值）。\n\n*   **字符串数据类型：**\n"
- fmt: "# SQL 数据类型详解\n\n## 字符串数据类型\n\n```sql\nCREATE TABLE string_examples (\n   \
    \ fixed_char CHAR(10),\n    variable_char VARCHAR(100),\n    long_text TEXT\n\
    );\n```\n\n此查询创建了一个名为 `string_examples` 的表，该表由三列组成，旨在以不同的格式存储字符串数据。`fixed_char`\
    \ 列存储十个字符的固定长度字符串；`variable_char` 可容纳最多 100 个字符的可变长度字符串；而 `long_text` 则存储没有指定最大长度的大文本条目。\n\
    \n## 日期和时间数据类型\n\n```sql\nCREATE TABLE datetime_examples (\n    birth_date DATE,\n\
    \    appointment_time TIME,\n    event_timestamp TIMESTAMP,\n    duration INTERVAL\n\
    );\n```\n\n此查询创建了一个名为 `datetime_examples` 的表，该表设计用于通过四个列存储各种类型的日期和时间信息。该表包括一个用于日期的\
    \ `birth_date` 列，一个用于一天中时间的 `appointment_time` 列，一个用于日期和时间组合的 `event_timestamp`，以及一个用于表示时间间隔的\
    \ `duration` 列。\n\n## 布尔数据类型\n\n```sql\nCREATE TABLE boolean_example (\n    is_active\
    \ BOOLEAN\n);\n```\n\n此查询生成了一个名为 `boolean_example` 的表，该表由一个名为 `is_active` 的单列组成。`is_active`\
    \ 列旨在存储布尔值，表示真或假的状态。\n\n## 二进制数据类型\n\n```sql\nCREATE TABLE binary_examples (\n\
    \    fixed_binary BYTEA,\n    variable_binary BYTEA,\n    large_object OID\n);\n\
    ```\n\n此查询构建了一个名为 `binary_examples` 的表，该表包含三列，旨在以各种格式存储二进制数据。它包括一个 `fixed_binary`\
    \ 列，用于使用 `BYTEA` 类型存储二进制数据，该类型处理可变长度的二进制数据。`variable_binary` 列的类型也是 `BYTEA`，允许灵活地存储没有预定义大小限制的二进制数据。最后，`large_object`\
    \ 列用于使用 `OID` 类型存储大型二进制对象（BLOB），该类型指向在 PostgreSQL 中单独存储的大型对象。通过这种设置，可以以稳健的方式高效管理不同类型的二进制数据。\n\
    \n## 专用数据类型\n\n```sql\nCREATE TYPE status_enum AS ENUM ('New', 'In Progress',\
    \ 'Completed');\nCREATE TABLE specialized_examples (\n    status status_enum,\n\
    \    number_series INTEGER[],\n    user_profile JSON,\n    unique_id UUID\n);\n\
    ```\n\n在 PostgreSQL 中，要定义 `ENUM` 类型，必须使用 `CREATE TYPE`。在此查询中，`CREATE TYPE` 语句定义了一个名为\
    \ `status_enum` 的 `ENUM` 类型，然后可以在表定义中使用它。\n\n此查询建立了一个名为 `specialized_examples`\
    \ 的表，其中包含具有专用数据类型的列：`status` 作为一个 `ENUM` 以将值限制为特定状态，`number_series` 作为一个 `ARRAY`\
    \ 以存储整数序列，`user_profile` 用于存储结构化的 JSON 数据，以及 `unique_id` 用于保存通用唯一标识符（UUID）。\n\n\
    ## 注意事项\n\nSQL 中的 `--` 符号表示单行注释的开始，表明其后在同行上的文本不会作为 SQL 命令的一部分执行，而是用于脚本内的注释或解释。\n\
    \n在 SQL 中，分号（`;`）是一个语法元素，有多种用途，例如作为语句终止符、批处理、兼容性和清晰度。在 PostgreSQL 中，与 MySQL 等其他一些数据库管理系统相比，分号的使用更为严格。在\
    \ PostgreSQL 的交互式终端（`psql`）中，通常需要使用分号来终止 SQL 语句。如果没有分号，终端会等待进一步的输入，假设语句尚未完成。在\
    \ PostgreSQL 中，分号在交互式会话（`psql`）中执行语句时是必需的，在分隔多个语句时是强制性的，在脚本中对于确保每个语句被正确处理是必要的，并且在\
    \ PL/pgSQL 代码块中用于终止单个语句。\n\n注意 地理空间类型特定于支持它们的数据库，例如带有 PostGIS 的 PostgreSQL。\n\n\
    ## 地理空间数据类型\n\n```sql\nCREATE TABLE geospatial_examples (\n    location_point\
    \ POINT,\n    route LINESTRING,\n    boundary POLYGON\n);\n```\n\n此查询在支持地理空间数据类型的数据库系统（例如带有\
    \ PostGIS 扩展的 PostgreSQL）中创建了一个名为 `geospatial_examples` 的表，旨在存储各种类型的地理数据。该表包括三列：`location_point`\
    \ 用于存储单个地理点，`route` 用于存储一系列连接形成线的点，以及 `boundary` 用于定义封闭的形状或区域。\n\n## 构建叙述\n\n\
    在本书的其余部分，每一章都将采用一种独特的教学方法来审视 SQL 运算符，该方法结合了数据分析和叙事。通过探索各种 SQL 运算符及其应用，每一章都将从数据中揭示洞察并创建引人入胜的叙述。通过增强您的技术技能和分析思维，您将能够有效地沟通复杂的数据驱动故事。\n\
    \n正如本书的名称所示，*叙述性 SQL* 指的是将自然语言查询转换为 SQL 命令的过程。自然语言查询指的是人类用于交流的日常语言所表达的问题或命令，而不是专门的编程或查询语言。这使得用户能够使用类似人类的句子与系统、数据库和计算机进行交互。在本书中，您将受邀踏上一段数据查询和操作的旅程，其中\
    \ SQL 的复杂性将以叙述的方式展开。跟随侦探使用基于数据库提供数据的 SQL 查询来解决谜题的冒险。每一章都由一系列叙述构成，使技术内容变得平易近人且令人难忘。通过使用引人入胜的故事，本书不仅将教育读者，还将激励来自不同背景的读者学习\
    \ SQL 概念，并在他们的数据驱动事业中自信地使用它们。\n\n## 总结\n\n本章从数据及其在数据库中存储的基础知识开始，为通过数据故事讲述掌握 SQL\
    \ 奠定了基础。它探讨了关系型和非关系型数据库之间的区别，并讨论了为什么 PostgreSQL 特别适合学习 SQL，这得益于其强大的功能和强大的社区支持。每个部分都建立在前一个部分的基础上，从理解各种\
    \ SQL 命令（分为 DDL、DML、DCL、TCL 和 DQL）到设置一个有利于故事讲述的 PostgreSQL 环境。"
  raw: "```\n    CREATE TABLE string_examples (\n    fixed_char CHAR(10),\n    variable_char\
    \ VARCHAR(100),\n    long_text TEXT\n    );\n    ```\n\nThis query creates a table\
    \ named `string_examples` composed of three columns designed to store string data\
    \ in distinct formats. The `fixed_char` column stores fixed-length strings of\
    \ ten characters; `variable_char` accommodates variable-length strings up to 100\
    \ characters; and `long_text` stores large text entries without a specified maximum\
    \ length.\n\n*   Date and time data types:\n\n```\n    CREATE TABLE datetime_examples\
    \ (\n    birth_date DATE,\n    appointment_time TIME,\n    event_timestamp TIMESTAMP,\n\
    \    duration INTERVAL\n    );\n    ```\n\nThis query creates a table called `datetime_examples`,\
    \ which is designed to store various types of date and time information across\
    \ four columns. The table includes a `birth_date` column for dates, an `appointment_time`\
    \ column for times of the day, an `event_timestamp` for date and time combinations,\
    \ and a `duration` column to represent time intervals.\n\n*   Boolean data type:\n\
    \n```\n    CREATE TABLE boolean_example (\n    is_active BOOLEAN\n    );\n   \
    \ ```\n\nThis query generates a table named `boolean_example` that consists of\
    \ a single column, called `is_active`. The `is_active` column is designed to store\
    \ Boolean values, indicating a true or false state.\n\n*   Binary data types:\n\
    \n```\n    CREATE TABLE binary_examples (\n    fixed_binary BYTEA,\n    variable_binary\
    \ BYTEA,\n    large_object OID\n    );\n    ```\n\nThis query constructs a table\
    \ named `binary_examples` with three columns designed to store binary data in\
    \ various formats. It includes a `fixed_binary` column for storing binary data\
    \ using the `BYTEA` type, which handles variable-length binary data. The `variable_binary`\
    \ column is also of type `BYTEA`, allowing flexible storage of binary data without\
    \ a predefined size limit. Finally, the `large_object` column is used to store\
    \ large binary objects (BLOBs) using the `OID` type, which refers to large objects\
    \ stored separately in PostgreSQL. With this setup, different types of binary\
    \ data can be managed efficiently in a robust way.\n\n*   Specialized data types:\n\
    \n```\n    CREATE TYPE status_enum AS ENUM ('New', 'In Progress', 'Completed');\n\
    \    CREATE TABLE specialized_examples (\n    status status_enum,\n    number_series\
    \ INTEGER[],\n    user_profile JSON,\n    unique_id UUID\n    );\n    ```\n\n\
    In PostgreSQL, to define the `ENUM` type, you have to use `CREATE TYPE`. In this\
    \ query, the `CREATE TYPE` statement defines an `ENUM` type, called `status_enum`,\
    \ which can then be used in table definitions.\n\nThis query establishes a table\
    \ called `specialized_examples`, incorporating columns with specialized data types:\
    \ `status` as an `ENUM` to restrict values to specific states, `number_series`\
    \ as an `ARRAY` to store sequences of integers, `user_profile` for storing structured\
    \ JSON data, and `unique_id` to hold universally unique identifiers (UUIDs).\n\
    \nNote\n\nThe `--` symbol in SQL signifies the start of a single-line comment,\
    \ indicating that the text following it on the same line is not executed as part\
    \ of the SQL command and is used for annotations or explanations within the script.\n\
    \nIn SQL, the semicolon (`;`) is a syntax element that serves several purposes,\
    \ including like statement terminator, batch processing, compatibility, and clarity.\
    \ In PostgreSQL, the use of semicolons is more strict compared to some other database\
    \ management systems like MySQL. In PostgreSQL’s interactive terminal (`psql`),\
    \ semicolons are generally required to terminate SQL statements. Without a semicolon,\
    \ the terminal waits for further input, assuming the statement is not yet complete.\
    \ In PostgreSQL, semicolons are required in interactive sessions (`psql`) to execute\
    \ statements, mandatory to separate multiple statements, necessary in scripts\
    \ to ensure each statement is processed correctly, and used in PL/pgSQL code blocks\
    \ to terminate individual statements.\n\nNote Geospatial types are specific to\
    \ databases that support them, like PostgreSQL with PostGIS.\n\n*   Geospatial\
    \ data types:\n\n```\n    CREATE TABLE geospatial_examples (\n    location_point\
    \ POINT,\n    route LINESTRING,\n    boundary POLYGON\n    );\n    ```\n\nThis\
    \ query creates a table named `geospatial_examples` in a database system that\
    \ supports geospatial data types, such as PostgreSQL with the PostGIS extension,\
    \ designed to store various types of geographical data. The table includes three\
    \ columns: `location_point` for storing a single geographical point, `route` for\
    \ a series of connected points forming a line, and `boundary` for defining a closed\
    \ shape or area.\n\n## Crafting the Narrative\n\nThroughout the remainder of this\
    \ book, each chapter will examine SQL operators using a unique teaching methodology\
    \ that combines data analysis and storytelling. By exploring various SQL operators\
    \ and their applications, each chapter will uncover insights and create compelling\
    \ narratives from data. By enhancing your technical skills as well as your analytical\
    \ thinking, you will be able to communicate complex data-driven stories effectively.\n\
    \nAs the name of this book indicates, *narrative SQL* refers to the process of\
    \ translating natural language queries into SQL commands. A natural language query\
    \ refers to a question or command expressed in everyday language that humans use\
    \ to communicate, rather than in a specialized programming or query language.\
    \ This enables users to interact with systems, databases, and computers by using\
    \ human-like sentences. In this book, you are invited on a journey through the\
    \ world of data querying and manipulation, where the complexities of SQL are unraveled\
    \ in a narrative manner. Following the adventures of a detective solving mysteries\
    \ using SQL queries based on data provided from a database. Each chapter is structured\
    \ as a series of narratives, making technical content approachable and memorable.\
    \ Through the use of compelling stories, this book will not only educate, but\
    \ also inspire readers from all backgrounds to learn SQL concepts and use them\
    \ with confidence in their data-driven endeavors.\n\n## Summary\n\nThis chapter\
    \ began with the fundamentals of data and its storage in databases to provide\
    \ the foundations for mastering SQL through data storytelling. It explored the\
    \ distinctions between relational and non-relational databases and discussed why\
    \ PostgreSQL is particularly suited to learning SQL, with its robust features\
    \ and strong community support. Each section builds on the last, from understanding\
    \ the various SQL commands—categorized into DDL, DML, DCL, TCL, and DQL—to setting\
    \ up a PostgreSQL environment conducive to storytelling."
  trans: "\n# SQL 数据类型详解\n\n## 字符串数据类型\n\n```sql\nCREATE TABLE string_examples (\n\
    \    fixed_char CHAR(10),\n    variable_char VARCHAR(100),\n    long_text TEXT\n\
    );\n```\n\n此查询创建了一个名为 `string_examples` 的表，该表由三列组成，旨在以不同的格式存储字符串数据。`fixed_char`\
    \ 列存储十个字符的固定长度字符串；`variable_char` 可容纳最多 100 个字符的可变长度字符串；而 `long_text` 则存储没有指定最大长度的大文本条目。\n\
    \n## 日期和时间数据类型\n\n```sql\nCREATE TABLE datetime_examples (\n    birth_date DATE,\n\
    \    appointment_time TIME,\n    event_timestamp TIMESTAMP,\n    duration INTERVAL\n\
    );\n```\n\n此查询创建了一个名为 `datetime_examples` 的表，该表设计用于通过四个列存储各种类型的日期和时间信息。该表包括一个用于日期的\
    \ `birth_date` 列，一个用于一天中时间的 `appointment_time` 列，一个用于日期和时间组合的 `event_timestamp`，以及一个用于表示时间间隔的\
    \ `duration` 列。\n\n## 布尔数据类型\n\n```sql\nCREATE TABLE boolean_example (\n    is_active\
    \ BOOLEAN\n);\n```\n\n此查询生成了一个名为 `boolean_example` 的表，该表由一个名为 `is_active` 的单列组成。`is_active`\
    \ 列旨在存储布尔值，表示真或假的状态。\n\n## 二进制数据类型\n\n```sql\nCREATE TABLE binary_examples (\n\
    \    fixed_binary BYTEA,\n    variable_binary BYTEA,\n    large_object OID\n);\n\
    ```\n\n此查询构建了一个名为 `binary_examples` 的表，该表包含三列，旨在以各种格式存储二进制数据。它包括一个 `fixed_binary`\
    \ 列，用于使用 `BYTEA` 类型存储二进制数据，该类型处理可变长度的二进制数据。`variable_binary` 列的类型也是 `BYTEA`，允许灵活地存储没有预定义大小限制的二进制数据。最后，`large_object`\
    \ 列用于使用 `OID` 类型存储大型二进制对象（BLOB），该类型指向在 PostgreSQL 中单独存储的大型对象。通过这种设置，可以以稳健的方式高效管理不同类型的二进制数据。\n\
    \n## 专用数据类型\n\n```sql\nCREATE TYPE status_enum AS ENUM ('New', 'In Progress',\
    \ 'Completed');\nCREATE TABLE specialized_examples (\n    status status_enum,\n\
    \    number_series INTEGER[],\n    user_profile JSON,\n    unique_id UUID\n);\n\
    ```\n\n在 PostgreSQL 中，要定义 `ENUM` 类型，必须使用 `CREATE TYPE`。在此查询中，`CREATE TYPE` 语句定义了一个名为\
    \ `status_enum` 的 `ENUM` 类型，然后可以在表定义中使用它。\n\n此查询建立了一个名为 `specialized_examples`\
    \ 的表，其中包含具有专用数据类型的列：`status` 作为一个 `ENUM` 以将值限制为特定状态，`number_series` 作为一个 `ARRAY`\
    \ 以存储整数序列，`user_profile` 用于存储结构化的 JSON 数据，以及 `unique_id` 用于保存通用唯一标识符（UUID）。\n\n\
    ## 注意事项\n\nSQL 中的 `--` 符号表示单行注释的开始，表明其后在同行上的文本不会作为 SQL 命令的一部分执行，而是用于脚本内的注释或解释。\n\
    \n在 SQL 中，分号（`;`）是一个语法元素，有多种用途，例如作为语句终止符、批处理、兼容性和清晰度。在 PostgreSQL 中，与 MySQL 等其他一些数据库管理系统相比，分号的使用更为严格。在\
    \ PostgreSQL 的交互式终端（`psql`）中，通常需要使用分号来终止 SQL 语句。如果没有分号，终端会等待进一步的输入，假设语句尚未完成。在\
    \ PostgreSQL 中，分号在交互式会话（`psql`）中执行语句时是必需的，在分隔多个语句时是强制性的，在脚本中对于确保每个语句被正确处理是必要的，并且在\
    \ PL/pgSQL 代码块中用于终止单个语句。\n\n注意 地理空间类型特定于支持它们的数据库，例如带有 PostGIS 的 PostgreSQL。\n\n\
