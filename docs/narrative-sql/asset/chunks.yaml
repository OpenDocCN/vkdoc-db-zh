  trans: '

    ## 理解索引


    SQL 中的 `索引` 是一种数据结构，用于提升表的检索速度。它的工作方式类似于书籍的索引——帮助你快速找到特定信息，而无需扫描全部内容。SQL 索引能带来性能收益，包括更快的搜索查询、改进的排序与过滤，以及高效的表间连接。然而，它们也会消耗额外的磁盘空间，并且由于需要更新索引，可能会减慢
    `INSERT`、`UPDATE` 和 `DELETE` 操作。


    在数据分析中，虽然索引能提升查询性能，但它们也存在需要权衡的地方，可能影响数据存储和写入操作。它们会占用磁盘空间，并减慢 `INSERT`、`UPDATE`
    和 `DELETE` 操作，这些操作在数据分析过程中相对于 `SELECT` 使用得较少。


    索引会消耗额外的磁盘空间，因为它们存储了引用表行的独立数据结构。特别是对于大型数据集和多个索引，这会显著增加存储成本并减慢数据库备份速度。此外，索引会影响
    `INSERT`、`UPDATE` 和 `DELETE` 操作。每次修改一行时，所有关联的索引也必须更新，这增加了开销并减慢了写入操作。例如，插入大量行需要更新所有索引，这会显著增加插入时间。因此，必须取得平衡。在读取频繁但写入较少的数据分析中，索引非常有益。然而，对于写入频繁的表，过多的索引会降低性能。一些优化措施，如仅索引特定数据子集的部分索引，以及在批量导入期间临时禁用索引，可以缓解这些性能缺点。


    > 注意

    >

    > 有些数据库系统以不同方式处理索引。例如，SQL Server 中的聚集索引和 Oracle 中的索引组织表将实际表数据存储在索引本身之中。在这些情况下，索引和表数据之间的区别变得模糊，存储或性能影响可能略有不同。


    ### 创建索引的基本语法


    创建索引的基本语法如下：


    ```

    CREATE INDEX index_name ON table_name (column_name);

    ```


    这里，`CREATE INDEX` 是创建索引的命令。`index_name` 是索引的名称。最好使用描述性的名称。`ON table_name` 指定了创建索引的表，`column_name`
    是索引所基于的一个或多个列。


    ### PostgreSQL 中的索引类型


    PostgreSQL 中的索引类型分为七种——B 树索引、唯一索引、哈希索引、广义倒排索引、广义搜索树（GiST）索引、部分索引和复合索引。本节将详细讨论每一种。


    #### B 树索引


    `B 树索引` 是 PostgreSQL 中最常见和默认的索引类型。它对于使用 `=` 运算符的相等比较以及涉及 `<`、`>`、`<=` 和 `>=` 等运算符的范围查询特别有效。此外，B
    树索引能显著加快使用 `ORDER BY` 子句执行的排序操作。通过将数据组织成平衡树结构，它们允许从根节点快速遍历到叶节点，即使数据集增长也能确保一致的性能。这使得
    B 树索引成为需要频繁搜索和有序数据检索的大型表的理想选择。


    ```

    CREATE INDEX idx_salary ON employees (salary);

    ```


    #### 唯一索引


    `唯一索引` 确保特定列或列组合中的所有值都是唯一的，防止表中出现重复条目。PostgreSQL 在定义带有 `PRIMARY KEY` 或 `UNIQUE`
    约束的列时会自动创建唯一索引。例如，主键列使用索引来维护数据完整性，确保每个值都是唯一的且非 `NULL`。同样，唯一约束强制值的唯一性，同时允许 `NULL`
    值。唯一索引对于维护数据准确性、支持高效查找和优化查询性能至关重要，尤其是在验证用户输入或维护引用完整性时。


    ```

    CREATE UNIQUE INDEX idx_unique_name ON employees (name);

    ```


    #### 哈希索引


    PostgreSQL 中的 `哈希索引` 针对使用 `=` 运算符的简单相等比较进行了优化。与支持相等和范围查询的 B 树索引不同，哈希索引专为精确匹配设计，因此对此类查询更快。这种效率源于哈希算法，它将数据值映射到固定位置，实现快速查找。然而，哈希索引不适用于范围查询或排序，因为它们不维护数据顺序。虽然它们在精确匹配方面提供更快的性能，但使用时需要更加谨慎，因为它们不支持
    `<`、`>` 或 `ORDER BY` 等高级查询类型。


    ```

    CREATE INDEX idx_hash_department ON employees USING HASH (department);

    ```


    #### 广义倒排索引（GIN）


    `广义倒排索引`（GIN）设计用于索引复杂数据结构，如 PostgreSQL 中的数组、JSON 字段和全文搜索。与传统的 B 树索引不同，GIN 通过将每个不同元素映射到相应的行条目，高效处理存储在单个列中的多个值。


    ```

    CREATE INDEX idx_gin_name ON employees USING GIN (to_tsvector(''english'', name));

    ```


    此索引能够快速查找姓名列中的单词，显著提高了大型数据集中的搜索性能。


    #### 广义搜索树（GiST）索引


    `广义搜索树`（GiST）索引是一种灵活、平衡树的索引机制，用于复杂数据类型，如几何形状、网络地址和全文搜索。与 B 树不同，GiST 索引允许自定义搜索策略，使其成为空间查询和全文索引所必需的。


    ```

    CREATE INDEX idx_gist_salary ON employees USING GiST (salary);

    ```


    这使得 PostgreSQL 能够快速定位特定薪资范围内的员工，提高了基于范围的查询性能。此外，GiST 索引支持最近邻搜索，这使得它们在基于距离的查询常见的地理空间应用中很有价值。


    #### 部分索引


    `部分索引` 是一种优化的索引，只存储表行的子集，减少存储开销并提高查询性能。PostgreSQL 通过仅索引满足预定义条件的记录，避免维护不必要的索引条目，从而加快对经常在索引条件上进行筛选的查询的查找速度。


    ```

    CREATE INDEX idx_high_salary ON employees (salary) WHERE salary > 50000;

    ```


    此索引对于频繁检索收入超过 50,000 美元的员工的查询非常有用，使其比扫描整个表快得多。部分索引在大型数据集中特别有效，因为在这些情况下，完整索引将是浪费且不必要的。

    '
- fmt: '## Composite Index


    A `composite index` indexes multiple columns together, making it ideal for queries
    filtering or sorting by multiple attributes. Instead of creating separate indexes
    for each column, PostgreSQL uses a composite index to speed up queries that involve
    a combination of indexed columns in their filtering conditions.


    ```sql

    CREATE INDEX idx_name_department ON employees (name, department);

    ```


    This index improves performance when searching for employees by name within specific
    departments, as it allows PostgreSQL to efficiently navigate the data based on
    both columns simultaneously. Composite indexes are especially useful in multi-column
    filtering, sorting, and `JOIN` operations.


    > **Note**

    > For data analysis tasks, the most applicable PostgreSQL indexes are B-tree,
    GIN, and GiST due to their efficiency in handling large datasets, complex queries,
    and specific data types.


    1.  **B-tree index:** Ideal for equality comparisons (`=`), range queries (`<`,
    `>`, `<=`, `>=`), and sorting (`ORDER BY`). Its balanced structure ensures consistent
    performance, making it essential for filtering and aggregating large datasets.

    2.  **GIN index:** Efficient for indexing composite data types such as arrays,
    JSON, and full-text search. It''s particularly useful for advanced data analysis
    tasks involving semi-structured data and quick lookups within nested structures.

    3.  **GiST index:** Best for multidimensional data and spatial analysis. It supports
    geometric data types, text search, and similarity searches, making it valuable
    for geographic information systems (GIS) and similarity-based data analysis.

    4.  **BRIN index:** Optimized for very large datasets, especially those with natural
    ordering, such as time-series data. By storing minimal information for each data
    block, BRIN reduces storage space and accelerates queries that scan large, sequential
    ranges.


    Other index types, like Hash, are more specialized and less commonly used in general
    data-analysis scenarios. Unique indexes are essential for data integrity but do
    not directly impact analytical performance.


    ### Dropping an Index


    If you no longer need an index, you can remove it using the `DROP INDEX` command:


    ```sql

    DROP INDEX idx_department;

    ```


    ### Checking Index Usage with EXPLAIN


    When you query PostgreSQL, you can use the `EXPLAIN` keyword to see if an index
    is being used:


    ```sql

    EXPLAIN SELECT * FROM employees WHERE department = ''IT'';

    ```


    Look for the `Index Scan` in the output, which indicates that the index is being
    used. If you see `Seq Scan`, PostgreSQL scans the entire table (which is slower).


    ## When to Use and When to Avoid Indexes


    Database indexes are powerful tools for optimizing query performance, but their
    use should be strategic. Indexes are highly beneficial when dealing with large,
    frequently querying tables, especially when searching, filtering, sorting, or
    joining on specific columns. Indexing can, however, be detrimental if it is excessive.
    Because indexes consume additional disk space and slow down `INSERT`, `UPDATE`,
    and `DELETE` operations, it’s crucial to avoid over-indexing. A balanced approach
    is key, carefully selecting which columns to index based on query patterns and
    data modification frequency. An overview explanation of when to use and when to
    avoid indexes is provided in Table [9-1](#619961_1_En_9_Chapter.xhtml#Tab1).


    **Table 9-1: When to Use and When to Avoid Indexes**


    | Use Indexes When | Avoid Excessive Indexing Because |

    | --- | --- |

    | The table is large and frequently queried | Indexes consume disk space (excessive
    indexing increases storage costs) |

    | Specific columns are often searched, filtered, or sorted | Indexes slow down
    `INSERT`, `UPDATE`, and `DELETE` operations |

    | Queries involve joins between large tables | Maintaining multiple indexes adds
    overhead during data modifications |

    | Queries frequently use `WHERE`, `ORDER BY`, or `GROUP BY` | Indexes need to
    be updated each time data is modified, slowing down writes |

    | Full-text search is performed on large text fields (It is recommended to use
    GIN) | Too many indexes can confuse the query planner, leading to suboptimal execution
    |

    | The table has foreign keys or needs to enforce uniqueness | Indexes may not
    provide benefits for small tables or low-selectivity columns |

    | Queries filter by JSON fields or array elements (It is recommended to use GIN
    or GiST) | Indexes can degrade performance if queries rarely use the indexed columns
    |

    | Time-series or sequential data requires efficient range queries (It is recommended
    to use BRIN) | Partial indexes or composite indexes might be more efficient in
    some scenarios |


    ## The Role of Indexes in Data Analysis Tasks


    An index acts as a guide within a database for data retrieval, helping to speed
    up data analysis. This allows the database to skip full table scans and quickly
    locate specific data points. Especially with large datasets, exhaustive searches
    would be prohibitively slow. By optimizing filtering and sorting operations, indexes
    enable analysts to rapidly narrow down data based on specific criteria or arrange
    it meaningfully. This is essential for tasks like identifying trends, outliers,
    or patterns in the data.


    Indexes also boost data warehousing and analytical performance by facilitating
    joins between multiple tables. The index facilitates faster joins for a holistic
    view of data from disparate sources. As well as supporting range queries, they
    also accelerate the calculation of sums, averages, and counts, which are vital
    to summarizing and understanding data distributions. Indexes enable data analysts
    to perform complex investigations, extract valuable insights, and make data-driven
    decisions more quickly. Although there is a tradeoff in terms of storage space
    and writing performance, the benefits outweigh the disadvantages for workloads
    that involve a substantial amount of reading and writing.


    ## Using EXPLAIN to Review Query Execution


    `EXPLAIN` helps analyze how PostgreSQL plans to execute a query, which is essential
    when optimizing analytical queries on large datasets.


    ```sql

    EXPLAIN query_statement;

    ```


    Here, `query_statement` is the SQL query to analyze and provides insights into
    how the database engine intends to execute the SQL statement. In a nutshell, PostgreSQL
    analyzes and parses the SQL statement provided by `EXPLAIN query_statement`. Instead
    of actually executing the query and returning the results, it generates an execution
    plan. This plan outlines the steps to execute the query. As output, this plan
    shows the estimated cost and sequence of operations.


    > **Note**

    > In relation to scan types, `EXPLAIN` can reveal whether the database performs
    a sequential scan, reading every row of a table, or if it uses an index for efficient
    retrieval via an index scan, index only scan using only index data, or bitmap
    scan using bitmap indexes. When queries involve `JOIN`s, `EXPLAIN` details the
    `JOIN` method employed, such as `NestedLoop`, iterative matching, `MERGE JOIN`,
    merging sorted rows, or `Hash Join`, hash table probing. Furthermore, the output
    clearly displays the filtering conditions applied to the data, so you can understand
    how the database narrows down the results.'
  raw: '#### Composite Index


    A *composite index* indexes multiple columns together, making it ideal for queries
    filtering or sorting by multiple attributes. Instead of creating separate indexes
    for each column, PostgreSQL uses a composite index to speed up queries that involve
    a combination of indexed columns in their filtering conditions.


    ```

    CREATE INDEX idx_name_department ON employees (name, department);

    ```


    This index improves performance when searching for employees by name within specific
    departments, as it allows PostgreSQL to efficiently navigate the data based on
    both columns simultaneously. Composite indexes are especially useful in multi-column
    filtering, sorting, and `JOIN` operations.


    Note


    For data analysis tasks, the most applicable PostgreSQL indexes are B-tree, GIN,
    and GiST due to their efficiency in handling large datasets, complex queries,
    and specific data types.


    1.  **B-tree index:** Ideal for equality comparisons (`=`), range queries `(<`,
    `>`, `<=`, `>=`), and sorting (`ORDER BY`). Its balanced structure ensures consistent
    performance, making it essential for filtering and aggregating large datasets.


    2.  **GIN index:** Efficient for indexing composite data types such as arrays,
    JSON, and full-text search. It''s particularly useful for advanced data analysis
    tasks involving semi-structured data and quick lookups within nested structures.


    3.  **GiST index:** Best for multidimensional data and spatial analysis. It supports
    geometric data types, text search, and similarity searches, making it valuable
    for geographic information systems (GIS) and similarity-based data analysis.


    4.  **BRIN index:** Optimized for very large datasets, especially those with natural
    ordering, such as time-series data. By storing minimal information for each data
    block, BRIN reduces storage space and accelerates queries that scan large, sequential
    ranges.


    Other index types, like Hash, are more specialized and less commonly used in general
    data-analysis scenarios. Unique indexes are essential for data integrity but do
    not directly impact analytical performance.


    ### Dropping an Index


    If you no longer need an index, you can remove it using the `DROP INDEX` command:


    ```

    DROP INDEX idx_department;

    ```


    ### Checking Index Usage with EXPLAIN


    When you query PostgreSQL, you can use the `EXPLAIN` keyword to see if an index
    is being used:


    ```

    EXPLAIN SELECT * FROM employees WHERE department = ''IT'';

    ```


    Look for the `Index Scan` in the output, which indicates that the index is being
    used. If you see `Seq Scan`, PostgreSQL scans the entire table (which is slower).


    ## When to Use and When to Avoid Indexes


    Database indexes are powerful tools for optimizing query performance, but their
    use should be strategic. Indexes are highly beneficial when dealing with large,
    frequently querying tables, especially when searching, filtering, sorting, or
    joining on specific columns. Indexing can, however, be detrimental if it is excessive.
    Because indexes consume additional disk space and slow down `INSERT`, `UPDATE`,
    and `DELETE` operations, it’s crucial to avoid over-indexing. A balanced approach
    is key, carefully selecting which columns to index based on query patterns and
    data modification frequency. An overview explanation of when to use and when to
    avoid indexes is provided in Table [9-1](#619961_1_En_9_Chapter.xhtml#Tab1).


    Table 9-1


    When to Use and When to Avoid Indexes


    | Use Indexes When | Avoid Excessive Indexing Because |

    | --- | --- |

    | The table is large and frequently queried | Indexes consume disk space (excessive
    indexing increases storage costs) |

    | Specific columns are often searched, filtered, or sorted | Indexes slow down
    `INSERT`, `UPDATE`, and `DELETE` operations |

    | Queries involve joins between large tables | Maintaining multiple indexes adds
    overhead during data modifications |

    | Queries frequently use `WHERE`, `ORDER BY`, or `GROUP BY` | Indexes need to
    be updated each time data is modified, slowing down writes |

    | Full-text search is performed on large text fields (It is recommended to use
    GIN) | Too many indexes can confuse the query planner, leading to suboptimal execution
    |

    | The table has foreign keys or needs to enforce uniqueness | Indexes may not
    provide benefits for small tables or low-selectivity columns |

    | Queries filter by JSON fields or array elements (It is recommended to use GIN
    or GiST) | Indexes can degrade performance if queries rarely use the indexed columns
    |

    | Time-series or sequential data requires efficient range queries (It is recommended
    to use BRIN) | Partial indexes or composite indexes might be more efficient in
    some scenarios |


    ## The Role of Indexes in Data Analysis Tasks


    An index acts as a guide within a database for data retrieval, helping to speed
    up data analysis. This allows the database to skip full table scans and quickly
    locate specific data points. Especially with large datasets, exhaustive searches
    would be prohibitively slow. By optimizing filtering and sorting operations, indexes
    enable analysts to rapidly narrow down data based on specific criteria or arrange
    it meaningfully. This is essential for tasks like identifying trends, outliers,
    or patterns in the data.


    Indexes also boost data warehousing and analytical performance by facilitating
    joins between multiple tables. The index facilitates faster joins for a holistic
    view of data from disparate sources. As well as supporting range queries, they
    also accelerate the calculation of sums, averages, and counts, which are vital
    to summarizing and understanding data distributions. Indexes enable data analysts
    to perform complex investigations, extract valuable insights, and make data-driven
    decisions more quickly. Although there is a tradeoff in terms of storage space
    and writing performance, the benefits outweigh the disadvantages for workloads
    that involve a substantial amount of reading and writing.


    ## Using EXPLAIN to Review Query Execution


    `EXPLAIN` helps analyze how PostgreSQL plans to execute a query, which is essential
    when optimizing analytical queries on large datasets.


    ```

    EXPLAIN query_statement;

    ```


    Here, `query_statement` is the SQL query to analyze and provides insights into
    how the database engine intends to execute the SQL statement. In a nutshell, PostgreSQL
    analyzes and parses the SQL statement provided by `EXPLAIN query_statement`. Instead
    of actually executing the query and returning the results, it generates an execution
