  trans: '

    威廉能够通过将表连接在一起来获取所需的数据。威廉旨在回答的问题非常适合使用 `INNER JOIN`（内连接），因为它只返回在两个表中都有匹配的行。这意味着结果表中不会出现任何
    `NULL` 值。如果威廉想找出所有球员，包括尚未进球的球员，那么 `INNER JOIN` 就不够用了，他必须在查询中使用另一种类型的 `JOIN`。他很可能需要使用
    `LEFT JOIN`（左连接）或 `RIGHT JOIN`（右连接），这将包含来自一个表的所有行，即使另一个表中没有对应的数据。这不可避免地会导致那些未匹配行在特定列中出现
    `NULL` 值。在本章的下一个故事中，你将更深入地了解这些类型的连接。


    ## 关系数据库中的键


    在 SQL 中连接表开启了强大的数据检索能力，但仔细规划至关重要。选择合适的连接类型（`INNER`、`LEFT`、`RIGHT` 或 `FULL`）取决于你是否希望匹配一个或两个表中的所有行（无论是否匹配）。`JOIN`
    条件（最好基于主键和外键）能确保结果准确。为此，本节将通过介绍关系数据库中的各种键来拓宽你的视野。在关系数据库中，键用于唯一标识表中的行，并建立表之间的关系（见表
    4-7）。


    表 4-7：关系数据库中的键


    | 关系数据库键 | 描述 | 示例 |

    | --- | --- | --- |

    | 主键 | 唯一标识表中每一行的列。 | `PRIMARY KEY (column_name)` |

    | 外键 | 一个表中的一个或一组列，用于唯一标识另一个表中的行。建立两个表数据之间的链接。 | `FOREIGN KEY (column_name) REFERENCES
    other_table(other_column)` |

    | 唯一键 | 一个或一组列，用于唯一标识表中的每一行，但与主键不同，一个表可以有多个唯一键。 | `UNIQUE (column_name)` |

    | 复合键 | 由多个列组成的主键。 | `PRIMARY KEY (column1, column2)` |

    | 候选键 | 一个或一组列，可以在不引用任何其他数据的情况下唯一标识任何数据库记录。 | 通常是任何可以作为主键的列或列组合。 |

    | 超键 | 一个或一组列，可用于唯一标识表中的一行。超键包含主键以及任何使其保持唯一的额外列。 | 通常是任何主键或唯一标识一行的列组合。 |


    为了让你更熟悉键，你将看到如何使用 SQL 根据之前故事中的结构来创建表。在之前的故事中，有三张表：`Player`（球员）、`Matches`（比赛）和
    `MatchDetails`（比赛详情）。以下查询可以在数据库中创建 `Players`、`Matches` 和 `MatchDetails` 表。


    ```

    CREATE TABLE Players (

    PlayerID INT PRIMARY KEY,

    Name VARCHAR(100),

    Age INT,

    Position VARCHAR(50)

    );

    ```


    此查询在数据库中创建了一个名为 `Players` 的表。`CREATE TABLE` 语句用于定义表的结构，指定列及其数据类型。`PlayerID` 列被定义为
    `INT`（整数），并被指定为 `PRIMARY KEY`（主键），这意味着它将唯一标识表中的每一行。这确保了没有两名球员可以拥有相同的 `PlayerID`。`Name`
    列被定义为 `VARCHAR(100)`，允许存储长度可变、最多 100 个字符的字符串，适用于存储球员姓名。`Age` 列被定义为 `INT`，将以整数值存储球员的年龄。`Position`
    列被定义为 `VARCHAR(50)`，允许存储长度可变、最多 50 个字符的字符串，适用于存储球员在场上的位置。


    ```

    CREATE TABLE Matches (

    MatchID INT PRIMARY KEY,

    AgeGroup VARCHAR(10),

    MinutesPlayed INT

    );

    ```


    此查询在数据库中创建了一个名为 `Matches` 的表。`CREATE TABLE` 语句定义了表的结构、列及其数据类型。`MatchID` 列被定义为
    `INT`（整数），并设置为 `PRIMARY KEY`（主键），以确保没有两场比赛具有相同的 `MatchID`。`AgeGroup` 列被定义为 `VARCHAR(10)`，允许存储最多十个字符的长度可变字符串，适用于按年龄组对项目进行分类。`MinutesPlayed`
    列被定义为 `INT`，以整数值存储比赛中进行的总分钟数。


    ```

    CREATE TABLE MatchDetails (

    MatchDetailID INT PRIMARY KEY,

    MatchID INT,

    PlayerID INT,

    GoalsScored INT,

    FOREIGN KEY (MatchID) REFERENCES Matches(MatchID),

    FOREIGN KEY (PlayerID) REFERENCES Players(PlayerID)

    );

    ```


    此查询在数据库中创建了一个名为 `MatchDetails` 的表。`CREATE TABLE` 语句定义了表的结构、列、数据类型以及该表与 `Matches`
    和 `Players` 表之间的关系。`MatchDetailID` 列被定义为 `INT`（整数），并设置为 `PRIMARY KEY`（主键），唯一标识表中的每一行。这确保了没有两条比赛详情记录具有相同的
    `MatchDetailID`。`MatchID` 列被定义为 `INT`，用于存储比赛 ID。此列是一个外键，引用 `Matches` 表中的 `MatchID`
    列。这种关系确保 `MatchDetails` 中的每条记录都对应一场有效的比赛。`PlayerID` 列被定义为 `INT`，用于存储球员 ID。此列是一个外键，引用
    `Players` 表中的 `PlayerID` 列。这种关系确保 `MatchDetails` 中的每条记录都对应一名有效的球员。`GoalsScored`
    列被定义为 `INT`，用于存储该球员在该场比赛中打进的进球数。


    **注意**


    `FOREIGN KEY (column) REFERENCES other_table(other_column)` 在关系数据库模式中定义了一个外键约束。


    *   `FOREIGN KEY (column)`：这指定了当前表中将作为外键的一个或一组列。外键引用另一个表中的数据。

    *   `REFERENCES other_table(other_column)`：这部分定义了外键与另一个表之间的关系。

    *   `other_table`：这指的是被引用表的名称，该表保存了外键所链接的数据。


    外键约束确保了参照完整性，这意味着 `MatchDetails` 表中的每一个 `MatchID` 都必须存在于 `Matches` 表中，并且 `MatchDetails`
    表中的每一个 `PlayerID` 都必须存在于 `Players` 表中。这种表结构允许准确追踪球员在特定比赛中的表现，包括每位球员在每场比赛中的进球数。在本书的后续章节中，你将会遇到通过定义复合键、候选键和超键来存储数据的叙述和示例。

    '
- fmt: '## The Second Story: A Technology Company


    Piper works for a growing technology company with a dynamic organizational structure
    consisting of multiple departments, employees, and projects. Piper intends to
    find the answers of questions about the company using the company data. Piper’s
    company data has been collected and stored in four tables: `Employees` (see Table
    [4-8](#619961_1_En_4_Chapter.xhtml#Tab8)), `Departments` (see Table [4-9](#619961_1_En_4_Chapter.xhtml#Tab9)),
    `Projects` (see Table [4-10](#619961_1_En_4_Chapter.xhtml#Tab10)), and `Employees_Projects`
    (see Table [4-11](#619961_1_En_4_Chapter.xhtml#Tab11)).


    Table 4-11

    The Employees_Projects Table


    | EmployeeID | ProjectID |

    | --- | --- |

    | 3 | 101 |

    | 4 | 101 |

    | 3 | 102 |

    | 4 | 102 |

    | 6 | 201 |

    | 8 | 301 |


    Table 4-10

    The Projects Table


    | ProjectID | ProjectName | DepartmentID |

    | --- | --- | --- |

    | 101 | Project Alpha | 1 |

    | 102 | Project Beta | 1 |

    | 201 | Recruitment Drive | 2 |

    | 301 | Financial Audit | 3 |


    Table 4-9

    The Departments Table


    | DepartmentID | DepartmentName |

    | --- | --- |

    | 1 | Engineering |

    | 2 | Human Resources |

    | 3 | Finance |


    Table 4-8

    The Employees Table


    | EmployeeID | Name | Age | Position | DepartmentID | ManagerID |

    | --- | --- | --- | --- | --- | --- |

    | 1 | John Smith | 45 | CEO | NULL | NULL |

    | 2 | Jane Dylan | 38 | CTO | 1 | 1 |

    | 3 | Mary Johnson | 28 | Developer | 1 | 2 |

    | 4 | Mike Brown | 35 | Developer | 1 | 2 |

    | 5 | Emily Davis | 30 | HR Manager | 2 | 1 |

    | 6 | Laura Wilson | 25 | HR Associate | 2 | 5 |

    | 7 | David White | 50 | CFO | 3 | 1 |

    | 8 | Steve Black | 40 | Accountant | 3 | 7 |


    Piper’s purpose for analyzing the data table is to find the answer to the following
    questions:


    *   Who are the managers and their direct reports?

    *   Which departments have employees, and what are their names? List all departments
    and their employees, including departments without employees.

    *   Which employees are assigned to which projects, including those not assigned
    to any project? List all employees and their projects, including employees not
    assigned to any project.

    *   What are the projects and the departments they are assigned to, including
    departments without projects? List all projects and their assigned departments,
    including departments without projects.

    *   What are all possible combinations of employees and projects? Create a Cartesian
    product of all employees and projects.

    *   Which employees are not assigned to any project? Find employees who are not
    assigned to any project.


    To list the managers and their direct reports, you can use a `SELF JOIN` on the
    `Employees` table:


    ```sql

    SELECT e1.Name AS EmployeeName, e2.Name AS ManagerName

    FROM Employees e1

    LEFT JOIN Employees e2 ON e1.ManagerID = e2.EmployeeID;

    ```


    It should be noted that when you use a `LEFT JOIN` or `RIGHT JOIN` (or any type
    of `JOIN`) on the same table, it is called a *self-join*. A *self-join* is simply
    joining a table with itself. This is useful for hierarchical or recursive data
    structures, such as organizational charts or family trees. Using a `LEFT JOIN`
    ensures that all employees are included in the result set, even those without
    a manager (the `ManagerID` is `NULL`). This way, you can identify employees who
    do not report to anyone. See Table [4-12](#619961_1_En_4_Chapter.xhtml#Tab12).


    Table 4-12

    The First Query Result


    | EmployeeName | ManagerName |

    | --- | --- |

    | John Smith | NULL |

    | Jane Dylan | John Smith |

    | Mary Johnson | Jane Dylan |

    | Mike Brown | Jane Dylan |

    | Emily Davis | John Smith |

    | Laura Wilson | Emily Davis |

    | David White | John Smith |

    | Steve Black | David White |


    To list all departments and their employees, including departments without employees,
    you use a `LEFT JOIN`:


    ```sql

    SELECT d.DepartmentName, e.Name AS EmployeeName

    FROM Departments d

    LEFT JOIN Employees e ON d.DepartmentID = e.DepartmentID;

    ```


    The query retrieves each department along with the names of employees working
    in those departments. By using the `LEFT JOIN`, you can ensure that all departments
    are included in the result, even if no employees are assigned to some departments.
    See Table [4-13](#619961_1_En_4_Chapter.xhtml#Tab13).


    Table 4-13

    The Second Query Result


    | DepartmentName | EmployeeName |

    | --- | --- |

    | Engineering | Jane Dylan |

    | Engineering | Mary Johnson |

    | Engineering | Mike Brown |

    | Human Resources | Emily Davis |

    | Human Resources | Laura Wilson |

    | Finance | David White |

    | Finance | Steve Black |


    To list all employees and their projects, including employees not assigned to
    any project, you need to use a `RIGHT JOIN`:


    ```sql

    SELECT e.Name AS EmployeeName, p.ProjectName

    FROM Employees e

    RIGHT JOIN Employees_Projects ep ON e.EmployeeID = ep.EmployeeID

    RIGHT JOIN Projects p ON ep.ProjectID = p.ProjectID;

    ```


    This query retrieves a list of all projects along with the names of employees
    assigned to each project. It uses a `RIGHT JOIN` to ensure that all projects are
    included in the result set, even if no employees are assigned to them. The first
    `RIGHT JOIN` matches employees to their projects through the `Employees_Projects`
    table. The second `RIGHT JOIN` ensures that all projects from the `Projects` table
    are included, even if they have no associated employees. The result set will display
    the `EmployeeName` and `ProjectName`, with `EmployeeName` being `NULL` for projects
    without assigned employees. See Table [4-14](#619961_1_En_4_Chapter.xhtml#Tab14).


    Table 4-14

    The Third Query Result


    | EmployeeName | ProjectName |

    | --- | --- |

    | Mary Johnson | Project Alpha |

    | Mike Brown | Project Alpha |

    | Mary Johnson | Project Beta |

    | Mike Brown | Project Beta |

    | Laura Wilson | Recruitment Drive |

    | Steve Black | Financial Audit |

    | NULL | Project Alpha |

    | NULL | Project Beta |

    | NULL | Recruitment Drive |

    | NULL | Financial Audit |


    In the context of answering the third question, the presence of `NULL` rows can
    be problematic, depending on how you interpret the results. Using a `RIGHT JOIN`
    with a `NULL` check can help address the problem of identifying employees not
    assigned to any project and projects without assigned employees. This approach
    allows you to filter out unwanted `NULL` rows and provide a clearer result. Let’s
    go through how this can be done for the relevant questions:


    ```sql

    SELECT e.Name AS EmployeeName, p.ProjectName

    FROM Employees e

    RIGHT JOIN Employees_Projects ep ON e.EmployeeID = ep.EmployeeID

    RIGHT JOIN Projects p ON ep.ProjectID = p.ProjectID

    WHERE e.EmployeeID IS NOT NULL;

    ```


    This query ensures that you only include rows when there is a valid `EmployeeID`
    from the `Employees` table, thus excluding the `NULL` rows for unassigned projects.
    See Table [4-15](#619961_1_En_4_Chapter.xhtml#Tab15).


    Table 4-15

    The Result of Rewriting the Third Query (Unwanted NULL Rows Were Filtered)


    | EmployeeName | ProjectName |

    | --- | --- |

    | Mary Johnson | Project Alpha |

    | Mike Brown | Project Alpha |

    | Mary Johnson | Project Beta |

    | Mike Brown | Project Beta |

    | Laura Wilson | Recruitment Drive |

    | Steve Black | Financial Audit |


    It should be noted that `NULL` rows usually appear in SQL `JOIN`s when there are
    unmatched rows between joined tables. Different types of `JOIN`s handle mismatched
    rows differently, resulting in `NULL` values for table columns that do not have
    a corresponding match. In this analysis, you learned about one of the reasons
    for the emergence of `NULL`.


    Note

    The main reason for the occurrence of `NULL` rows in SQL `JOIN`s is the corresponding
    mismatch between the connected tables. The different types of `JOIN` used (`LEFT`,
    `RIGHT`, `FULL`, or `OUTER`) lead to different results, so understanding this
    behavior helps design queries that appropriately handle or avoid `NULL` values
    depending on the analytical needs.


    *   `INNER JOIN`: No `NULL`s as only matched rows are included.'
