    ### 使用分析工具分解复杂问题


    要用 SQL 点“数”成金，掌握一套称为 *递归查询* 的高级分析工具至关重要。递归查询允许你将复杂问题分解为更小、更易于管理的步骤。*递归公共表表达式*（RCTEs）对于处理层次化数据特别有用，例如分析组织结构或网络流。这些功能使分析师能够围绕他们的数据构建一个连贯的叙述，揭示有助于他们做出明智决策的洞见。


    CTE 与递归查询的结合使你能够以模块化和可读性高的方式构建查询。使用 CTE 可以将复杂问题分解为更小、更易于管理的步骤，从而提高查询的清晰度和效率。你无需编写嵌套的子查询，而是可以使用
    CTE 定义中间结果，并在主查询中引用它们，从而使 SQL 查询更易于理解和维护。这种模块化方法允许独立审查每个步骤，从而改进调试和优化。


    前面章节已经提到，CTE 是一个可以在查询中引用的临时结果集。因此，查询更具可读性和结构性，大型查询可以被分解为更小的步骤。


    ```sql

    WITH cte_name AS (

    SELECT column1, column2

    FROM table_name

    WHERE condition

    )

    SELECT * FROM cte_name;

    ```


    这里，一个名为 `cte_name` 的 CTE 创建了一个临时结果集。该 CTE 从 `table_name` 中选择 `column1` 和 `column2`，条件是满足特定条件。然后，主查询从这个临时结果集中选择所有列。相应地，作为一个示例，以下查询从销售表中查找每个产品类别的总销售额。通过使用
    CTE，使其更易于阅读和维护。


    ```sql

    WITH category_sales AS (

    SELECT category, SUM(sales) AS total_sales

    FROM sales_data

    GROUP BY category

    )

    SELECT * FROM category_sales;

    ```


    这里，CTE `category_sales` 计算每个类别的总销售额。为了使 SQL 更易于阅读和维护，主查询只是简单地从 `category_sales`
    中检索结果。


    递归 CTE 是一种特殊类型的 CTE，它引用自身。这使其能够处理层次或序列数据，例如组织结构、网络中的路径或父子关系。它由两个关键部分组成：基本查询和递归查询。*基本查询*是初始数据集，而*递归查询*调用
    CTE 本身，重复获取下一层级的数据。


    ```sql

    WITH RECURSIVE cte_name AS (

    -- 基本查询：选择起始点

    SELECT column1, column2

    FROM table_name

    WHERE condition

    UNION ALL

    -- 递归查询：调用自身以获取相关数据

    SELECT t.column1, t.column2

    FROM table_name t

    JOIN cte_name c ON t.related_column = c.column1

    )

    ```


    此查询采用了一个 `RECURSIVE` CTE，包含两个主要部分。基本查询通过从 `table_name` 中选择满足特定条件的 `column1` 和
    `column2` 来建立起点。因此，这构成了第一层结果。递归部分将表递归连接回先前的结果（这些结果存储在 CTE 本身中）。它使用 `t.related_column`
    和 `c.column1` 之间的关系，逐步构建多个层级的关联数据。每次迭代都会添加新行，直到没有找到匹配的行为止。这种技术对于遍历树结构（如组织结构、物料清单展开或网络路径）特别有用，尤其是在事先不知道其深度的情况下。递归会持续进行，直到达到自然的终止点，即不再添加新行时停止。例如，以下查询希望从一个包含
    `id`、`name` 和 `manager_id` 的员工表中，找到特定经理下的所有员工。

