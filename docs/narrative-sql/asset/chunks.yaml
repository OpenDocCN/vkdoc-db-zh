  trans: '### 字符串模式


    SQL 中的字符串模式允许您基于文本列中的特定模式来搜索和过滤数据。SQL 字符串模式中常用两种通配符：`%`符号代表任意数量的字符，`_`符号代表单个字符。这些通配符为基于不同模式进行数据搜索和过滤提供了灵活性。在您了解了
    `WHERE` 和 `LIKE` 语句之后，第 3 章将探讨更复杂的字符串匹配示例。


    在回答了三个问题后，莎拉正在为一个促销活动做准备。她的目标是对部分商品提供折扣，但不确定哪些商品会对她的客户产生最大的影响。理想情况下，她希望针对的商品是：


    *   `热门`：销售数量高的商品。

    *   `尚未打折`：她不想对已经打折的商品再进行折扣。


    为了识别这些理想的促销候选商品，莎拉决定分析她的销售数据。使用以下两个 `CASE` 语句，可以实现这个查询。


    ```sql

    SELECT ProductName, Quantity,

    CASE

    WHEN Quantity >= (SELECT AVG(Quantity) FROM Sales) THEN ''热门''

    ELSE ''不太热门''

    END AS Popularity,

    CASE WHEN RegularPrice > Price THEN ''已折扣'' ELSE ''原价'' END AS Price_Status

    FROM Sales

    ```


    在第一个 `CASE` 中，使用子查询计算平均数量，并根据商品数量是否达到或超过平均值进行分类。第二个 `CASE` 语句检查价格状态。这确保了莎拉专注于热门商品的折扣。如果商品是
    `热门`（根据外部 `CASE` 判断）且原价 (`RegularPrice`) 高于当前价格 (`Price`)，则意味着该商品已打折。如果商品是 `热门`但没有折扣（原价等于当前价格），则被归类为
    `原价`。


    注意：子查询（也称为内部查询或嵌套查询）是在彼此内部嵌入 `SELECT` 语句的强大 SQL 工具。它们用于为外部查询检索数据。随着您对其重要性认识的加深，这类查询将在后续章节中更详细地讨论。


    表 2-10 是执行查询以选择仅 `ProductName`、`Quantity`、计算出的 `Popularity` 和 `PriceStatus` 列的结果。


    表 2-10：促销活动查询执行结果


    | 商品名称 | 数量 | 热度 | 价格状态 |

    | --- | --- | --- | --- |

    | Glazed Donut | 2 | 不太热门 | 已折扣 |

    | Chocolate Muffin | 1 | 不太热门 | 原价 |

    | Blueberry Muffin | 2 | 不太热门 | 原价 |

    | Chocolate Chip Cookie | 3 | 热门 | 已折扣 |

    | Sugar Cookie | 4 | 热门 | 原价 |


    ## 去重选择的艺术


    要通过数据构建引人入胜的叙述，有效利用 `DISTINCT` 关键字至关重要。在 SQL 中，`DISTINCT` 关键字通过确保查询结果包含唯一值来优化数据检索。它就像一个过滤器，消除了可能扭曲您的分析或叙述的重复行。其基本语法如下：


    ```sql

    SELECT DISTINCT column

    FROM table

    ```


    这从 `table` 中的指定 `column` 仅检索唯一值。


    `DISTINCT` 会移除所有选定列的值都相同的行。例如，如果一个表有 `CustomerID` 和 `OrderDate`，`DISTINCT CustomerID`
    将返回每个唯一的客户，即使他们下了多个订单。


    `DISTINCT` 语句与列的组合一起使用时，可以确保跨多列的唯一性。例如，`SELECT DISTINCT CustomerID, ProductID`
    将仅返回客户和产品组合均唯一的行。


    您还可以将 `DISTINCT` 与 `SUM` 等聚合函数结合使用，以揭示数据中的趋势。


    ## 第三个故事：糖果店销售数据


    菲比渴望扩展她那充满五彩缤纷糖果的热闹糖果店。她的销售报告包含了今天的购买记录，她很好奇她客户的最爱是什么。表 2-11 显示了销售日志。


    表 2-11：销售日志


    | 订单 ID | 糖果 | 数量 |

    | --- | --- | --- |

    | 1 | Gummy Bears | 2 |

    | 2 | Lollipops | 1 |

    | 3 | Gummy Bears | 3 |

    | 4 | Chocolate Bars | 2 |

    | 5 | Lollipops | 2 |

    | 6 | Gummy Bears | 1 |


    日志显示了每一笔销售，但没有显示她客户渴望的独有糖果。她需要的“放大镜”就是 `DISTINCT`：


    ```sql

    SELECT DISTINCT Candy

    FROM sales_log

    ```


    此查询揭示了表 2-12 中的数据。


    表 2-12：来自销售日志表的独有糖果


    | 糖果 |

    | --- |

    | Gummy Bears |

    | Lollipops |

    | Chocolate Bars |


    注意：在大型数据集上使用 `DISTINCT` 可能会影响性能。重要的是要考虑您是否真的需要所有可能的组合，或者事先进行过滤是否足够。接下来的章节将更详细地讨论数据过滤。


    ## 使用 SELECT 进行聚合


    在 SQL 中，聚合函数对于计算数据集的特征并生成一个总结其特征的值至关重要。这些函数允许分析师从数据中提取更多意义，将原始数据转化为支持决策和叙述的有用见解。SQL
    中的数据分析严重依赖聚合函数，这些函数允许跨大量数据进行计算，以创建高效的摘要和高级概览。'
- fmt: '### Differences Between Regular Arithmetic Functions and Aggregate Functions
    in SQL


    Regular arithmetic functions in SQL are useful for manipulating data within individual
    rows. They perform calculations like addition, subtraction, multiplication, and
    more, transforming or combining values on a row-by-row basis. Aggregate functions,
    on the other hand, take a broader view. Summarizing entire groups of data is one
    of their strengths. The `COUNT`, `SUM`, `AVG`, `MIN`, and `MAX` functions combine
    multiple rows into a single, meaningful value, revealing total quantities, averages,
    and high and low values within a specific column. In contrast to regular arithmetic
    functions, aggregate functions help you identify trends and patterns across your
    data.


    The following lists describe some of the key differences between regular arithmetic
    functions and aggregate functions in SQL.


    **Regular arithmetic functions**:


    *   **Purpose**: Perform calculations on a row-by-row basis. They manipulate data
    within a single row or combine values from multiple columns within a row.

    *   **Examples**: `+`, `-`, `*`, `/`, `MOD (modulo)`, `ROUND`, `SQRT`, `ABS (absolute
    value)`, and so on.

    *   **Output**: They return a single value for each row processed in the query.

    *   **Focus on individual values**: They operate on individual values within a
    row, transforming or combining them as needed.


    **Aggregate functions**:


    *   **Purpose**: Summarize data by performing calculations on entire groups of
    values. They condense multiple rows into a single, meaningful value.

    *   **Examples**: `SUM`, `COUNT`, `AVG`, `MIN`, and `MAX`.

    *   **Output**: They return a single value that represents the overall result
    of the calculation across a group of rows.

    *   **Focus on summarization**: They focus on providing a summary statistic (total,
    average, minimum, maximum, etc.) for the data in a specific column or set of columns.


    Table [2-13](#619961_1_En_2_Chapter.xhtml#Tab13) summarizes the differences between
    regular arithmetic functions and aggregate functions.


    Table 2-13


    Differences Between Regular Arithmetic Functions and Aggregate Functions


    | Feature | Regular Arithmetic Functions | Aggregate Functions |

    | --- | --- | --- |

    | Purpose | Row-by-row calculations | Summarize data groups |

    | Input | Values within a row | Groups of rows |

    | Output | Single value per row | Single value |

    | Focus | Individual values manipulation | Summarization |


    As an example, to illustrate the difference between these two, consider the `Orders`
    table shown in Table [2-14](#619961_1_En_2_Chapter.xhtml#Tab14), with the `OrderID`,
    `CustomerID`, and `Amount` columns.


    Table 2-14


    The Orders Table


    | OrderID | CustomerID | Amount |

    | --- | --- | --- |

    | 1 | 101 | 100 |

    | 2 | 102 | 50 |

    | 3 | 103 | 75 |

    | 4 | 101 | 275 |


    This query calculates a 10 percent discount for each order row-by-row multiplication,
    as shown in Table [2-15](#619961_1_En_2_Chapter.xhtml#Tab15):


    Table 2-15


    Discount Added to the Orders Table


    | OrderID | CustomerID | Amount | Discount |

    | --- | --- | --- | --- |

    | 1 | 101 | 100 | 10 |

    | 2 | 102 | 50 | 5 |

    | 3 | 103 | 75 | 7.5 |

    | 4 | 101 | 275 | 27.500 |


    ```sql

    SELECT OrderID, CustomerID, Amount, Amount * 0.1 AS Discount

    FROM Orders;

    ```


    This query calculates a 10 percent discount for each order by multiplying the
    `Amount` by 0.1 and adds a new column named `Discount` to the result set.


    The following query uses aggregate functions to get the total number of orders
    (`COUNT(*)`) and the total sales amount (`SUM(Amount)`) for all orders.


    ```sql

    SELECT

    CustomerID,

    COUNT(*) AS TotalOrders,

