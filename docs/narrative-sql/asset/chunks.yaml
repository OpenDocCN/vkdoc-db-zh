- fmt: "# Correlated Subqueries\n\nA correlated subquery depends on the outer query\
    \ for its execution. It is evaluated once for each row processed by the outer\
    \ query. Correlated subqueries are more like back-and-forth conversations, where\
    \ the inner query continuously references columns from the outer query. As an\
    \ example, the following query compares the salary of each employee with the average\
    \ salary within their own department, not the average salary throughout the entire\
    \ organization, in order to identify employees who earn more than the average\
    \ salary within their own department.\n\n```sql\nSELECT e.name\nFROM employees\
    \ e\nWHERE e.salary > (SELECT AVG(salary) FROM employees WHERE department_id =\
    \ e.department_id);\n```\n\nFor each employee in the outer query, the inner query\
    \ calculates the average salary for that employee’s department and compares it\
    \ to the employee’s salary. To assist you in better understanding, Table [7-16](#619961_1_En_7_Chapter.xhtml#Tab16)\
    \ provides an illustration of the average salary for each employee’s department.\n\
    \nIn the inner query, the average salary for each employee’s department is calculated,\
    \ and in the outer query, as shown Table [7-17](#619961_1_En_7_Chapter.xhtml#Tab17),\
    \ the employee’s salary is compared to that average.\n\nTable 7-17: Output of\
    \ the Correlated Subquery\n\n| Name |\n| --- |\n| Charlie Davis |\n| George Miller\
    \ |\n| Julia Lewis |\n\nTable 7-16: Illustration of Average Salary for Each Employee's\
    \ Department\n\n| Name | department_id | salary | avg_department_salary | salary_comparison\
    \ |\n| --- | --- | --- | --- | --- |\n| Alice Johnson | 1 | 55000 | 58667 | Below\
    \ Average |\n| Charlie Davis | 1 | 60000 | 58667 | Above Average |\n| George Miller\
    \ | 1 | 61000 | 58667 | Above Average |\n| Emma Wilson | 2 | 45000 | 48333 | Below\
    \ Average |\n| Bob Smith | 2 | 48000 | 48333 | Below Average |\n| Julia Lewis\
    \ | 2 | 52000 | 48333 | Above Average |\n\nNote: This table has been adjusted\
    \ for better understanding. To write a query to access this table in PostgreSQL,\
    \ you can write the following query:\n\n```sql\nSELECT\n    e.name,\n    e.department_id,\n\
    \    e.salary,\n    dept_avg.avg_department_salary,\n    CASE\n        WHEN e.salary\
    \ > dept_avg.avg_department_salary THEN 'Above Average'\n        ELSE 'Below Average'\n\
    \    END AS salary_comparison\nFROM employees e\nJOIN (\n    SELECT department_id,\
    \ AVG(salary) AS avg_department_salary\n    FROM employees\n    GROUP BY department_id\n\
    ) dept_avg ON e.department_id = dept_avg.department_id;\n```\n\n# Uncorrelated\
    \ Subqueries\n\nAn uncorrelated subquery is independent of the outer query. It\
    \ is executed only once, and its result is used by the outer query. These are\
    \ more straightforward and they do not reference columns from the outer query.\
    \ The following query, for instance, first calculates the overall company-wide\
    \ average salary before showing employees who earn more than it.\n\n```sql\nSELECT\
    \ name\nFROM employees\nWHERE salary > (SELECT AVG(salary) FROM employees);\n\
    ```\n\nThe subquery calculates the average salary across all employees once, and\
    \ the outer query finds employees with a salary above that average.\n\nAs Tables\
    \ [7-18](#619961_1_En_7_Chapter.xhtml#Tab18) and [7-19](#619961_1_En_7_Chapter.xhtml#Tab19)\
    \ demonstrate, the inner query calculates average salary across all employees,\
    \ and the outer query retrieves employees with salaries above $62,800.\n\nTable\
    \ 7-19: Employees with Salaries Above $62,800\n\n| name |\n| --- |\n| David Brown\
    \ |\n| Fiona Clark |\n| Hannah White |\n| Ian Thompson |\n\nTable 7-18: Average\
    \ Salary Across All Employees\n\n| avg_salary |\n| --- |\n| 62800 |\n\n# Subqueries\
    \ in the FROM Clause\n\nA subquery in a `FROM` clause is often called a derived\
    \ table. It acts as a temporary table that the outer query can use to retrieve\
    \ more meaningful insights. This type of subquery is useful for pre-aggregating\
    \ data before using it in the main query. For example, the following nested query\
    \ calculates the average salary for each department and provides their names along\
    \ with their average salaries.\n\n```sql\nSELECT department_name, avg_salary\n\
    FROM (SELECT department_id, AVG(salary) AS avg_salary\n      FROM employees\n\
    \      GROUP BY department_id) AS dept_avg\nJOIN departments d ON dept_avg.department_id\
    \ = d.department_id;\n```\n\nThe subquery calculates the average salary for each\
    \ department, and the outer query retrieves department names and their corresponding\
    \ average salaries.\n\nIn the inner query, the average salary per department is\
    \ calculated. A `JOIN` operation is then performed to join the `Departments` table.\
    \ See Tables [7-20](#619961_1_En_7_Chapter.xhtml#Tab20) and [7-21](#619961_1_En_7_Chapter.xhtml#Tab21).\n\
    \nTable 7-21: Department Names and Their Corresponding Average Salaries\n\n| department_name\
    \ | avg_salary |\n| --- | --- |\n| Sales | 58667 |\n| Marketing | 48333 |\n| IT\
    \ | 71000 |\n| HR | 82500 |\n\nTable 7-20: The Average Salary per Department\n\
    \n| department_id | avg_salary |\n| --- | --- |\n| 1 | 58667 |\n| 2 | 48333 |\n\
    | 3 | 71000 |\n| 4 | 82500 |\n\n# Complex Conversations: Nested and Multi-Level\
    \ Subqueries\n\nIn SQL, nested subqueries and multi-level subqueries allow you\
    \ to solve complex data-retrieval problems from multiple queries by writing multiple\
    \ layers of queries. Each layer refines the data further, making it more targeted\
    \ and relevant. This can be seen as similar to a dialogue that involves asking\
    \ follow-up questions to previous answers, where each layer is dependent on the\
    \ results of the previous layer.\n\nAs mentioned, a nested subquery is a subquery\
    \ placed inside another subquery or query. In more complex scenarios, multiple\
    \ subqueries may be nested within one another, resulting in a multi-level subqueries.\n\
    \nNote: A subquery can be nested in a `SELECT`, `FROM`, or `WHERE` clause. Multi-level\
    \ subqueries require SQL to evaluate the innermost query first and then pass the\
    \ result to the next query. The outermost query uses the final result to produce\
    \ the desired output.\n\n## General Syntax of Two-Level Subqueries\n\nA two-level\
    \ subquery is a query where the outer query depends on the result of a subquery,\
    \ and that subquery itself has another inner subquery.\n\n```sql\nSELECT column1\n\
    FROM table1\nWHERE column2 = (\n    SELECT column3\n    FROM table2\n    WHERE\
    \ column4 = (\n        SELECT column5\n        FROM table3\n        WHERE condition\n\
    \    )\n);\n```\n\nFirst, the innermost subquery runs and returns a result, then\
    \ the middle subquery filters its own data, and finally the outer query filters\
    \ the main table using the final result.\n\n## Complex Multi-Level Subqueries\n\
    \nTo write complex nested SQL queries, it’s essential to work from the inside\
    \ out, progressively building and testing each layer to ensure correctness. It\
    \ is recommended to begin by writing and testing the innermost query, then gradually\
    \ adding outer layers once you have confirmed the inner portions work properly.\
    \ Using meaningful table aliases enhances code readability and makes complex queries\
    \ easier to understand and maintain. The best recommendation is to use descriptive\
    \ aliases to represent data rather than generic names such as `t1` or `t2`. However,\
    \ it’s crucial to consider performance implications, as nested subqueries can\
    \ consume significant computational resources. To optimize performance, you need\
    \ to use appropriate database indexes, which are introduced in Chapter [9](#619961_1_En_9_Chapter.xhtml).\n\
    \nThe following story illustrates how to write complex multi-level subqueries\
    \ using a food delivery platform data model. This practical business scenario\
    \ shows how multi-level subqueries work."
  raw: '### Correlated Subqueries


    A correlated subquery depends on the outer query for its execution. It is evaluated
    once for each row processed by the outer query. Correlated subqueries are more
    like back-and-forth conversations, where the inner query continuously references
    columns from the outer query. As an example, the following query compares the
    salary of each employee with the average salary within their own department, not
    the average salary throughout the entire organization, in order to identify employees
    who earn more than the average salary within their own department.


    ```

    SELECT e.name

    FROM employees e

    WHERE e.salary > (SELECT AVG(salary) FROM employees WHERE department_id = e.department_id);

    ```


    For each employee in the outer query, the inner query calculates the average salary
    for that employee’s department and compares it to the employee’s salary. To assist
    you in better understanding, Table [7-16](#619961_1_En_7_Chapter.xhtml#Tab16)
    provides an illustration of the average salary for each employee’s department.


    In the inner query, the average salary for each employee’s department is calculated,
    and in the outer query, as shown Table [7-17](#619961_1_En_7_Chapter.xhtml#Tab17),
    the employee’s salary is compared to that average.


    Table 7-17


    Output of the Correlated Subquery


    | Name |

    | --- |

    | Charlie Davis |

    | George Miller |

    | Julia Lewis |


    Table 7-16


    Illustration of Average Salary for Each Employee''s Department


    | Name | department_id | salary | avg_department_salary | salary_comparison |

    | --- | --- | --- | --- | --- |

    | Alice Johnson | 1 | 55000 | 58667 | Below Average |

    | Charlie Davis | 1 | 60000 | 58667 | Above Average |

    | George Miller | 1 | 61000 | 58667 | Above Average |

    | Emma Wilson | 2 | 45000 | 48333 | Below Average |

    | Bob Smith | 2 | 48000 | 48333 | Below Average |

    | Julia Lewis | 2 | 52000 | 48333 | Above Average |


    Note


    This table has been adjusted for better understanding. To write a query to access
    this table in PostgreSQL, you can write the following query:


    ```

    SELECT

    e.name,

    e.department_id,

    e.salary,

    dept_avg.avg_department_salary,

    CASE

    WHEN e.salary > dept_avg.avg_department_salary THEN ''Above Average''

    ELSE ''Below Average''

    END AS salary_comparison

    FROM employees e

    JOIN (

    SELECT department_id, AVG(salary) AS avg_department_salary

    FROM employees

    GROUP BY department_id

    ) dept_avg ON e.department_id = dept_avg.department_id;

    ```


    ### Uncorrelated Subqueries


    An uncorrelated subquery is independent of the outer query. It is executed only
    once, and its result is used by the outer query. These are more straightforward
    and they do not reference columns from the outer query. The following query, for
    instance, first calculates the overall company-wide average salary before showing
    employees who earn more than it.


    ```

    SELECT name

    FROM employees

    WHERE salary > (SELECT AVG(salary) FROM employees);

    ```


    The subquery calculates the average salary across all employees once, and the
    outer query finds employees with a salary above that average.


    As Tables [7-18](#619961_1_En_7_Chapter.xhtml#Tab18) and [7-19](#619961_1_En_7_Chapter.xhtml#Tab19)
    demonstrate, the inner query calculates average salary across all employees, and
    the outer query retrieves employees with salaries above $62,800.


    Table 7-19


    Employees with Salaries Above $62,800


    | name |

    | --- |

    | David Brown |

    | Fiona Clark |

    | Hannah White |

    | Ian Thompson |


    Table 7-18


    Average Salary Across All Employees


    | avg_salary |

    | --- |

    | 62800 |


    ### Subqueries in the FROM Clause


    A subquery in a `FROM` clause is often called a *derived table**.* It acts as
    a temporary table that the outer query can use to retrieve more meaningful insights.
    This type of subquery is useful for pre-aggregating data before using it in the
    main query. For example, the following nested query calculates the average salary
    for each department and provides their names along with their average salaries.


    ```

    SELECT department_name, avg_salary

    FROM (SELECT department_id, AVG(salary) AS avg_salary

    FROM employees

    GROUP BY department_id) AS dept_avg

    JOIN departments d ON dept_avg.department_id = d.department_id;

    ```


    The subquery calculates the average salary for each department, and the outer
    query retrieves department names and their corresponding average salaries.


    In the inner query, the average salary per department is calculated. A `JOIN`
    operation is then performed to join the `Departments` table. See Tables [7-20](#619961_1_En_7_Chapter.xhtml#Tab20)
    and [7-21](#619961_1_En_7_Chapter.xhtml#Tab21).


    Table 7-21


    Department Names and Their Corresponding Average Salaries


    | department_name | avg_salary |

    | --- | --- |

    | Sales | 58667 |

    | Marketing | 48333 |

    | IT | 71000 |

    | HR | 82500 |


    Table 7-20


    The Average Salary per Department


    | department_id | avg_salary |

    | --- | --- |

    | 1 | 58667 |

    | 2 | 48333 |

    | 3 | 71000 |

    | 4 | 82500 |


    ## Complex Conversations: Nested and Multi-Level Subqueries


    In SQL, nested subqueries and multi-level subqueries allow you to solve complex
    data-retrieval problems from multiple queries by writing multiple layers of queries.
    Each layer refines the data further, making it more targeted and relevant. This
    can be seen as similar to a dialogue that involves asking follow-up questions
    to previous answers, where each layer is dependent on the results of the previous
    layer.


    As mentioned, a nested subquery is a subquery placed inside another subquery or
    query. In more complex scenarios, multiple subqueries may be nested within one
    another, resulting in a multi-level subqueries.


    Note


    A subquery can be nested in a `SELECT`, `FROM`, or `WHERE` clause. Multi-level
    subqueries require SQL to evaluate the innermost query first and then pass the
    result to the next query. The outermost query uses the final result to produce
    the desired output.


    ### General Syntax of Two-Level Subqueries


    A two-level subquery is a query where the outer query depends on the result of
    a subquery, and that subquery itself has another inner subquery.


    ```

    SELECT column1

    FROM table1

    WHERE column2 = (

    SELECT column3

    FROM table2

    WHERE column4 = (

    SELECT column5

    FROM table3

    WHERE condition

    )

    );

    ```


    First, the innermost subquery runs and returns a result, then the middle subquery
    filters its own data, and finally the outer query filters the main table using
    the final result.


    ### Complex Multi-Level Subqueries


    To write complex nested SQL queries, it’s essential to work from the inside out,
    progressively building and testing each layer to ensure correctness. It is recommended
    to begin by writing and testing the innermost query, then gradually adding outer
    layers once you have confirmed the inner portions work properly. Using meaningful
    table aliases enhances code readability and makes complex queries easier to understand
    and maintain. The best recommendation is to use descriptive aliases to represent
    data rather than generic names such as `t1` or `t2`. However, it’s crucial to
    consider performance implications, as nested subqueries can consume significant
    computational resources. To optimize performance, you need to use appropriate
    database indexes, which are introduced in Chapter [9](#619961_1_En_9_Chapter.xhtml).


    The following story illustrates how to write complex multi-level subqueries using
    a food delivery platform data model. This practical business scenario shows how
    multi-level subqueries work.'
  trans: "\n# 关联子查询\n\n关联子查询的执行依赖于外部查询。它会对外部查询处理的每一行数据进行一次求值。关联子查询更像是来回的对话，内部查询持续引用外部查询的列。例如，以下查询将每位员工的薪资与其**所在部门**的平均薪资（而非整个组织的平均薪资）进行比较，以识别薪资高于其所在部门平均水平的员工。\n\
    \n```sql\nSELECT e.name\nFROM employees e\nWHERE e.salary > (SELECT AVG(salary)\
    \ FROM employees WHERE department_id = e.department_id);\n```\n\n对于外部查询中的每一位员工，内部查询都会计算该员工所在部门的平均薪资，并将其与该员工的薪资进行比较。为了帮助您更好地理解，表\
    \ 7-16 展示了每位员工所在部门的平均薪资情况。\n\n在内部查询中，计算每位员工所在部门的平均薪资；而在外部查询中，如表 7-17 所示，员工的薪资会与该平均值进行比较。\n\
    \n表 7-17：关联子查询的输出\n\n| 姓名 |\n| --- |\n| Charlie Davis |\n| George Miller |\n|\
    \ Julia Lewis |\n\n表 7-16：每位员工所在部门平均薪资说明\n\n| 姓名 | department_id | salary | avg_department_salary\
    \ | salary_comparison |\n| --- | --- | --- | --- | --- |\n| Alice Johnson | 1\
    \ | 55000 | 58667 | 低于平均 |\n| Charlie Davis | 1 | 60000 | 58667 | 高于平均 |\n| George\
    \ Miller | 1 | 61000 | 58667 | 高于平均 |\n| Emma Wilson | 2 | 45000 | 48333 | 低于平均\
    \ |\n| Bob Smith | 2 | 48000 | 48333 | 低于平均 |\n| Julia Lewis | 2 | 52000 | 48333\
    \ | 高于平均 |\n\n注：此表为便于理解而调整。要在 PostgreSQL 中编写查询来访问此表，您可以使用以下查询：\n\n```sql\nSELECT\n\
    \    e.name,\n    e.department_id,\n    e.salary,\n    dept_avg.avg_department_salary,\n\
    \    CASE\n        WHEN e.salary > dept_avg.avg_department_salary THEN '高于平均'\n\
    \        ELSE '低于平均'\n    END AS salary_comparison\nFROM employees e\nJOIN (\n\
    \    SELECT department_id, AVG(salary) AS avg_department_salary\n    FROM employees\n\
    \    GROUP BY department_id\n) dept_avg ON e.department_id = dept_avg.department_id;\n\
    ```\n\n# 非关联子查询\n\n非关联子查询独立于外部查询。它只执行一次，其结果供外部查询使用。这类子查询更直接，它们不引用外部查询的列。例如，以下查询先计算整个公司的平均薪资，然后显示薪资高于该平均值的员工。\n\
    \n```sql\nSELECT name\nFROM employees\nWHERE salary > (SELECT AVG(salary) FROM\
    \ employees);\n```\n\n子查询一次性计算所有员工的平均薪资，外部查询则找出薪资高于该平均值的员工。\n\n如表 7-18 和 7-19\
    \ 所示，内部查询计算所有员工的平均薪资，外部查询检索薪资高于 62,800 美元的员工。\n\n表 7-19：薪资高于 62,800 美元的员工\n\n\
    | name |\n| --- |\n| David Brown |\n| Fiona Clark |\n| Hannah White |\n| Ian Thompson\
    \ |\n\n表 7-18：所有员工的平均薪资\n\n| avg_salary |\n| --- |\n| 62800 |\n\n# FROM 子句中的子查询\n\
    \n`FROM` 子句中的子查询通常称为派生表。它充当一个临时表，外部查询可以利用它来获取更有意义的洞察。这类子查询对于在主查询中使用之前预聚合数据非常有用。例如，以下嵌套查询计算每个部门的平均薪资，并提供部门名称及其平均薪资。\n\
    \n```sql\nSELECT department_name, avg_salary\nFROM (SELECT department_id, AVG(salary)\
    \ AS avg_salary\n      FROM employees\n      GROUP BY department_id) AS dept_avg\n\
    JOIN departments d ON dept_avg.department_id = d.department_id;\n```\n\n子查询计算每个部门的平均薪资，外部查询检索部门名称及其对应的平均薪资。\n\
    \n在内部查询中，计算每个部门的平均薪资。然后执行 `JOIN` 操作连接 `Departments` 表。参见表 7-20 和 7-21。\n\n表 7-21：部门名称及其对应的平均薪资\n\
    \n| department_name | avg_salary |\n| --- | --- |\n| Sales | 58667 |\n| Marketing\
    \ | 48333 |\n| IT | 71000 |\n| HR | 82500 |\n\n表 7-20：每个部门的平均薪资\n\n| department_id\
    \ | avg_salary |\n| --- | --- |\n| 1 | 58667 |\n| 2 | 48333 |\n| 3 | 71000 |\n\
    | 4 | 82500 |\n\n# 复杂对话：嵌套与多级子查询\n\n在 SQL 中，嵌套子查询和多级子查询允许您通过编写多层查询来解决复杂的数据检索问题。每一层都进一步提炼数据，使其更具针对性和相关性。这可以看作类似于一场涉及对先前答案提出后续问题的对话，每一层都依赖于前一层的结果。\n\
    \n如前所述，嵌套子查询是置于另一个子查询或查询内部的子查询。在更复杂的场景中，多个子查询可能相互嵌套，从而形成多级子查询。\n\n注：子查询可以嵌套在 `SELECT`、`FROM`\
    \ 或 `WHERE` 子句中。多级子查询要求 SQL 先计算最内层的查询，然后将结果传递给下一个查询。最外层的查询使用最终结果来生成所需的输出。\n\n\
    ## 两级子查询的通用语法\n\n两级子查询是一种外部查询依赖于子查询结果，而该子查询本身又有另一个内部子查询的查询。\n\n```sql\nSELECT\
    \ column1\nFROM table1\nWHERE column2 = (\n    SELECT column3\n    FROM table2\n\
    \    WHERE column4 = (\n        SELECT column5\n        FROM table3\n        WHERE\
    \ condition\n    )\n);\n```\n\n首先，最内层的子查询运行并返回一个结果，然后中间子查询筛选其自身的数据，最后外部查询使用最终结果来筛选主表。\n\
    \n## 复杂的多级子查询\n\n要编写复杂的嵌套 SQL 查询，必须从内向外进行，逐步构建和测试每一层以确保正确性。建议从编写和测试最内层的查询开始，一旦确认内部部分工作正常，再逐渐添加外部层。使用有意义的表别名可以提高代码的可读性，并使复杂查询更易于理解和维护。最佳建议是使用描述性别名来表示数据，而不是像\
    \ `t1` 或 `t2` 这样的通用名称。然而，必须考虑性能影响，因为嵌套子查询可能消耗大量计算资源。为了优化性能，您需要使用适当的数据库索引，这将在第\
    \ 9 章介绍。\n\n以下故事阐述了如何使用食品配送平台数据模型编写复杂的多级子查询。这个实际的业务场景展示了多级子查询的工作原理。\n"
- fmt: "## The Second Story: A Food Delivery Platform\n\nGinnifer, a data analyst\
    \ at a food delivery platform, faced a challenging task when the marketing team\
    \ wanted to identify high-value customers for a loyalty program. She needed to\
    \ find customers who spent above average in their respective cities, but only\
    \ those who showed consistent ordering behavior.\n\nUsing `Table 7-22`, `Table\
    \ 7-23`, and `Table 7-24`, she wants to determine the average total amount spent\
    \ by customers in each city, find customers who have spent more than that average\
    \ in their respective city, and filter out customers who have placed fewer than\
    \ two orders.\n\n### Table 7-22: The Customers Table\n\n| customer_id | Name |\
    \ City |\n| --- | --- | --- |\n| 1 | Alice Johnson | New York |\n| 2 | Bob Smith\
    \ | Chicago |\n| 3 | Charlie Davis | Boston |\n| 4 | David Brown | New York |\n\
    | 5 | Eva White | Chicago |\n| 6 | Frank Green | Boston |\n| 7 | Grace Black |\
    \ New York |\n| 8 | Hannah Blue | Chicago |\n| 9 | Ivy Red | New York |\n| 10\
    \ | Jack Gray | Chicago |\n| 11 | Liam Yellow | Boston |\n| 12 | Mia Purple |\
    \ New York |\n| 13 | Noah Orange | Chicago |\n| 14 | Olivia Pink | Boston |\n\
    | 15 | Paul Silver | New York |\n| 16 | Quinn Gold | Chicago |\n\n### Table 7-23:\
    \ The Orders Table\n\n| order_id | customer_id | restaurant_id | total_amount\
    \ | order_date |\n| --- | --- | --- | --- | --- |\n| 1001 | 1 | 101 | 50 | 2025-01-01\
    \ |\n| 1002 | 1 | 102 | 20 | 2025-01-02 |\n| 1003 | 2 | 101 | 45 | 2025-01-03\
    \ |\n| 1004 | 3 | 103 | 35 | 2025-01-04 |\n| 1005 | 3 | 102 | 55 | 2025-01-05\
    \ |\n| 1006 | 4 | 101 | 70 | 2025-01-06 |\n| 1007 | 5 | 102 | 30 | 2025-01-07\
    \ |\n| 1008 | 5 | 101 | 60 | 2025-01-08 |\n| 1009 | 5 | 102 | 40 | 2025-01-09\
    \ |\n| 1010 | 6 | 103 | 25 | 2025-01-10 |\n| 1011 | 6 | 102 | 45 | 2025-01-11\
    \ |\n| 1012 | 7 | 101 | 90 | 2025-01-12 |\n| 1013 | 7 | 102 | 50 | 2025-01-13\
    \ |\n| 1014 | 8 | 101 | 80 | 2025-01-14 |\n| 1015 | 8 | 102 | 20 | 2025-01-15\
    \ |\n| 1016 | 9 | 101 | 100 | 2025-01-16 |\n| 1017 | 9 | 102 | 60 | 2025-01-17\
    \ |\n| 1018 | 10 | 101 | 90 | 2025-01-18 |\n| 1019 | 10 | 102 | 70 | 2025-01-19\
    \ |\n| 1020 | 11 | 103 | 55 | 2025-01-20 |\n| 1021 | 11 | 102 | 45 | 2025-01-21\
    \ |\n| 1022 | 11 | 101 | 120 | 2025-01-22 |\n| 1023 | 11 | 102 | 80 | 2025-01-23\
    \ |\n\n### Table 7-24: The Restaurants Table\n\n| restaurant_id | Name | City\
    \ |\n| --- | --- | --- |\n| 101 | Pizza Palace | New York |\n| 102 | Sushi Spot\
    \ | Chicago |\n| 103 | Burger Barn | Boston |\n\nSarah’s business question is\
    \ to identify customers who have spent more than the average amount in their city,\
    \ but only if they have placed more than two orders.\n\nAs a first step, she breaks\
    \ down the problem into the following subquestions:\n\n- Find the average total\
    \ amount spent by customers in each city.\n- Find customers who have spent more\
    \ than the average in the city where they live.\n- Filter out customers who have\
    \ placed fewer than two orders.\n\nMultiple subqueries will be run in order to\
    \ resolve each of these questions:\n\n- The innermost subquery will calculate\
    \ the average total amount spent by customers in each city.\n- The middle subquery\
    \ will identify customers who meet the condition.\n- The outer query will filter\
    \ customers based on their order count.\n\nThe following is a step-by-step breakdown\
    \ of the innermost subquery:\n\n```sql\nSELECT c.city, AVG(o.total_amount) AS\
    \ avg_city_spending\nFROM customers c\nJOIN orders o ON c.customer_id = o.customer_id\n\
    GROUP BY c.city;\n```\n\nThe innermost subquery calculates the average total amount\
    \ spent by customers in each city. This involves joining the `Customers` and `Orders`\
    \ tables and grouping by the `city`. As shown in `Table 7-25`, this query calculates\
    \ the average total amount spent by customers in each city.\n\n### Table 7-25:\
    \ The Average Total Amount Spent by Customers in Each City\n\n| City | total_amount\
    \ |\n| --- | --- |\n| New York | 70 |\n| Chicago | 45 |\n| Boston | 90 |\n\nThe\
    \ middle subquery uses the innermost query result to filter customers who have\
    \ spent more than the average in their respective cities. The middle subquery\
    \ is written as follows:\n\n```sql\nSELECT c.customer_id, c.name, c.city, SUM(o.total_amount)\
    \ AS total_spent\nFROM customers c\nJOIN orders o ON c.customer_id = o.customer_id\n\
    GROUP BY c.customer_id, c.name, c.city\nHAVING SUM(o.total_amount) > (\n    SELECT\
    \ AVG(o2.total_amount)\n    FROM customers c2\n    JOIN orders o2 ON c2.customer_id\
    \ = o2.customer_id\n    WHERE c2.city = c.city\n    GROUP BY c2.city\n);\n```\n\
    \nThis query identifies customers who have spent more than the average amount\
    \ in their respective cities. It works by joining the `Customers` and `Orders`\
    \ tables to calculate each customer’s total spending. It groups results by customer\
    \ details. The subquery calculates the average spending per city by joining the\
    \ same tables but grouping by `city` only. The `HAVING` clause filters the customers\
    \ whose total spending exceeds their city’s average spending.\n\n**Note**\n\n\
    The `HAVING` clause is a powerful SQL feature used to filter the results of `GROUP\
    \ BY` operations based on aggregate conditions. While the `WHERE` clause filters\
    \ individual rows before they're grouped, `HAVING` filters groups after aggregation\
    \ has occurred. When you need conditions based on calculations such as `SUM()`,\
    \ `COUNT()`, `AVG()`, `MAX()`, or `MIN()`, `HAVING` is essential.\n\nThe correlation\
    \ between the main query and subquery is established by the `c2.city = c.city`\
    \ condition, which ensures that each customer is compared only against the average\
    \ from their own city. This makes the query a correlated subquery that executes\
    \ once for each customer group in the outer query.\n\nThis query calculates the\
    \ average total amount for each city. Lastly, the outer query is as follows:\n\
    \n```sql\nSELECT c.customer_id, c.name, c.city, SUM(o.total_amount) AS total_spent,\
    \ COUNT(o.order_id) AS order_count\nFROM customers c\nJOIN orders o ON c.customer_id\
    \ = o.customer_id\nGROUP BY c.customer_id, c.name, c.city\nHAVING COUNT(o.order_id)\
    \ > 2 AND SUM(o.total_amount) > (\n    SELECT AVG(o2.total_amount)\n    FROM customers\
    \ c2\n    JOIN orders o2 ON c2.customer_id = o2.customer_id\n    WHERE c2.city\
    \ = c.city\n    GROUP BY c2.city\n);\n```\n\nThis query ensures that only customers\
    \ who have placed more than two orders—`COUNT(o.order_id) > 2`—and spent more\
    \ than the average in their city are included in the result. The outer query retrieves\
    \ customers who have spent more than the average in their city and have placed\
    \ more than two orders.\n\nWhen the levels are combined, a multi-level query is\
    \ written in a way that provides the final answer to Sarah’s question:\n\n```sql\n\
    SELECT c.customer_id, c.name, c.city, SUM(o.total_amount) AS total_spent, COUNT(o.order_id)\
    \ AS order_count\nFROM customers c\nJOIN orders o ON c.customer_id = o.customer_id\n\
    GROUP BY c.customer_id, c.name, c.city\nHAVING COUNT(o.order_id) > 2 AND SUM(o.total_amount)\
    \ > (\n    SELECT AVG(o2.total_amount)\n    FROM customers c2\n    JOIN orders\
    \ o2 ON c2.customer_id = o2.customer_id\n    WHERE c2.city = c.city\n    GROUP\
    \ BY c2.city\n);\n```\n\nThis SQL query identifies high-value customers in a food\
    \ delivery platform. Total spending per customer is calculated by joining the\
    \ `Customers` and `Orders` tables. In the nested subquery, orders are grouped\
    \ by `city` to calculate the average total spending. Using the `HAVING` clause,\
    \ the main query compares each customer’s total spending with the average for\
    \ their city, but only includes customers with more than two orders. In the final\
    \ output, the customer’s name, city, and their total spending amount are displayed\
    \ for those who spent more than twice in their city. See `Table 7-26`.\n\n###\
    \ Table 7-26: Sarah's Business Question Final Answer\n\n| customer_id | Name |\
    \ City | total_spent | order_count |\n| --- | --- | --- | --- | --- |\n| 11 |\
    \ Liam Yellow | Boston | 300 | 4 |\n| 5 | Eva White | Chicago | 130 | 3 |"
