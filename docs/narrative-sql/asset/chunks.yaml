- fmt: 'William was able to get the data he needed by joining the tables together.
    The questions that William aimed to answer were well-suited for an `INNER JOIN`,
    as it only returns rows where there’s a match in both tables. This means there
    wouldn’t be any `NULL` values appearing in the result table. If William wanted
    to find all players, even players who have not scored a goal yet, an `INNER JOIN`
    would not be sufficient, and he would have to use another type of `JOIN` in his
    query. He would likely need a `LEFT JOIN` or a `RIGHT JOIN`, which would include
    rows from one table even if there’s no corresponding data in the other table.
    This would inevitably lead to `NULL` values in certain columns for those unmatched
    rows. In the next story of this chapter, you learn more about these types of JOINs.


    ## Keys in Relational Databases


    Joining tables in SQL opens up powerful data-retrieval capabilities, but careful
    planning is critical. Choosing the appropriate join type (`INNER`, `LEFT`, `RIGHT`,
    or `FULL`) depends on whether you want to match all rows from one or both tables,
    with or without matches. `JOIN` conditions, preferably based on primary and foreign
    keys, ensure accurate results. For this purpose, this section expands your horizons
    with various keys in relational databases. In relational databases, keys are used
    to uniquely identify rows within a table and to establish relationships between
    tables (see Table 4-7).


    Table 4-7: Keys in Relational Databases


    | Relational Database Key | Description | Example |

    | --- | --- | --- |

    | Primary Key | A column that uniquely identifies each row in a table. | `PRIMARY
    KEY (column_name)` |

    | Foreign Key | A column or a set of columns in one table that uniquely identifies
    rows in another table. Establishes a link between the data in the two tables.
    | `FOREIGN KEY (column_name) REFERENCES other_table(other_column)` |

    | Unique Key | A column or a set of columns that uniquely identifies each row
    in a table, but unlike primary keys, a table can have multiple unique keys. |
    `UNIQUE (column_name)` |

    | Composite Key | A primary key composed of multiple columns. | `PRIMARY KEY (column1,
    column2)` |

    | Candidate Key | A column or a set of columns that can uniquely identify any
    database record without referring to any other data. | Usually any column or combination
    of columns that can act as a primary key. |

    | Super Key | A set of one or more columns that can be used to uniquely identify
    a row in a table. A super key includes the primary key and any additional columns
    that make it unique. | Usually any primary key or combination of columns that
    uniquely identifies a row. |


    To get more familiar with keys, you’ll see how to create tables from the previous
    story by using SQL. In the previous story, there were three tables: `Player`,
    `Matches`, and `MatchDetails`. These queries can create the `Players`, `Matches`,
    and `MatchDetails` tables in the database.


    ```

    CREATE TABLE Players (

    PlayerID INT PRIMARY KEY,

    Name VARCHAR(100),

    Age INT,

    Position VARCHAR(50)

    );

    ```


    This query creates a table named `Players` in the database. The `CREATE TABLE`
    statement is used to define the structure of the table, specifying the columns
    and their data types. The `PlayerID` column is defined as an `INT` (integer) and
    is designated as the `PRIMARY KEY`, which means it will uniquely identify each
    row in the table. This ensures that no two players can have the same `PlayerID`.
    The `Name` column is defined as a `VARCHAR(100)`, allowing it to store variable-length
    character strings up to 100 characters in length, suitable for storing player
    names. The `Age` column is defined as an `INT`, which will store the player’s
    age as an integer value. The `Position` column is defined as a `VARCHAR(50)`,
    allowing it to store variable-length character strings up to 50 characters in
    length, which is suitable for storing the player’s position on the field.


    ```

    CREATE TABLE Matches (

    MatchID INT PRIMARY KEY,

    AgeGroup VARCHAR(10),

    MinutesPlayed INT

    );

    ```


    This query creates a table called `Matches` in the database. The `CREATE TABLE`
    statement defines the structure of the table and its columns and data types. The
    `MatchID` column is defined as `INT` (integer) and set as the `PRIMARY KEY` to
    ensure that no two matches have the same `MatchID`. The `AgeGroup` column is defined
    as `VARCHAR(10)`, which allows it to store variable-length character strings of
    up to ten characters, which is suitable for sorting items by age group. The `MinutesPlayed`
    column is defined as `INT`, which stores the total number of minutes played in
    the match as an integer value.


    ```

    CREATE TABLE MatchDetails (

    MatchDetailID INT PRIMARY KEY,

    MatchID INT,

    PlayerID INT,

    GoalsScored INT,

    FOREIGN KEY (MatchID) REFERENCES Matches(MatchID),

    FOREIGN KEY (PlayerID) REFERENCES Players(PlayerID)

    );

    ```


    This query creates a table called `MatchDetails` in the database. The `CREATE
    TABLE` statement defines the structure of the table, the columns, their data types,
    and the relationships between this table and the `Matches` and `Players` tables.
    The `MatchDetailID` column is defined as `INT` (integer) and is set as the `PRIMARY
    KEY`, which uniquely identifies each row in the table. This ensures that no two
    match details have the same `MatchDetailID`. The `MatchID` column is defined as
    `INT`, which stores the match ID. This column is a foreign key that refers to
    the `MatchID` column in the `Matches` table. This relationship ensures that each
    entry in `MatchDetails` is a valid match. The `PlayerID` column is defined as
    `INT`, which stores the player ID. This column is a foreign key that references
    the `PlayerID` column in the `Players` table. This relationship ensures that each
    entry in `MatchDetails` is valid for a player. The `GoalsScored` column is defined
    as `INT`, which stores the number of goals scored by the player in the match.


    **Note**


    `FOREIGN KEY (column) REFERENCES other_table(other_column)` defines a foreign
    key constraint in the relational database schema.


    *   `FOREIGN KEY (column)`: This specifies a column or set of columns within the
    current table that will act as the foreign key. A foreign key references data
    in another table.

    *   `REFERENCES other_table(other_column)`: This part defines the relationship
    between the foreign key and another table.

    *   `other_table`: This refers to the name of the referenced table that holds
    the data the foreign key is linked to.


    Foreign key constraints ensure referential integrity, meaning that every `MatchID`
    in `MatchDetails` must exist in the `Matches` table, and every `PlayerID` in `MatchDetails`
    must exist in the `Players` table. This table structure allows accurate tracking
    of player performance in specific matches, including the number of goals scored
    by each player in each match. In the rest of the book, you will come across narratives
    and examples where data is stored by defining composite, candidate, and super
    keys.'
