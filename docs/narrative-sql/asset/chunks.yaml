  trans: '# SQL 语法参考


    本节总结了 SQL 的核心语法元素，包括聚合函数、分组、连接、子查询、数据修改、窗口函数以及日期时间处理。


    ## 聚合函数


    | 类别 | 类型 | 基本语法 |

    | --- | --- | --- |

    | 聚合函数 | 基本聚合 | `SELECT COUNT(*) FROM table_name;`<br>-- 计算行数<br><br>`SELECT COUNT(column1)
    FROM table_name;`<br>-- 计算非空值<br><br>`SELECT COUNT(DISTINCT column1) FROM table_name;`<br>--
    计算唯一值<br><br>`SELECT SUM(column1) FROM table_name;`<br>-- 求和<br><br>`SELECT AVG(column1)
    FROM table_name;`<br>-- 平均值<br><br>`SELECT MIN(column1) FROM table_name;`<br>--
    最小值<br><br>`SELECT MAX(column1) FROM table_name;`<br>-- 最大值<br><br>`SELECT STDDEV(column1)
    FROM table_name;`<br>-- 标准差<br><br>`SELECT VARIANCE(column1) FROM table_name;`<br>--
    方差 |


    ## GROUP BY


    | 类别 | 类型 | 基本语法 |

    | --- | --- | --- |

    | `GROUP BY` | 基本分组 | `SELECT column1, COUNT(*)`<br>`FROM table_name GROUP BY
    column1;` |

    | 多个列 | `SELECT column1, column2, SUM(column3)`<br>`FROM table_name`<br>`GROUP
    BY column1, column2;` |

    | 带 `HAVING` (对聚合数据进行过滤) | `SELECT column1, COUNT(*)`<br>`FROM table_name`<br>`GROUP
    BY column1`<br>`HAVING COUNT(*) > 5;` |


    ## 连接


    表 A-16 展示了不同的 SQL 连接类型，包括 `INNER JOIN`、`LEFT JOIN`、`RIGHT JOIN`、`FULL OUTER JOIN`、`CROSS
    JOIN` 和 `SELF JOIN`，以及它们的基本语法和用于组合多表数据的用例。


    **表 A-16：连接**


    | 类别 | 类型 | 基本语法 |

    | --- | --- | --- |

    | 基本连接 | `INNER JOIN` | `SELECT t1.column1, t2.column2`<br>`FROM table1 t1`<br>`INNER
    JOIN table2 t2 ON t1.id = t2.id;` |

    | `LEFT JOIN` | `SELECT t1.column1, t2.column2`<br>`FROM table1 t1`<br>`LEFT JOIN
    table2 t2 ON t1.id = t2.id;` |

    | `RIGHT JOIN` | `SELECT t1.column1, t2.column2`<br>`FROM table1 t1`<br>`RIGHT
    JOIN table2 t2 ON t1.id = t2.id;` |

    | `FULL OUTER JOIN` | `SELECT t1.column1, t2.column2`<br>`FROM table1 t1`<br>`FULL
    OUTER JOIN table2 t2 ON t1.id = t2.id;` |

    | `CROSS JOIN` | `SELECT t1.column1, t2.column2`<br>`FROM table1 t1`<br>`CROSS
    JOIN table2 t2;` |

    | 自连接 | 自连接 (将表与其自身连接) | `SELECT a.column1, b.column2`<br>`FROM table_name a`<br>`JOIN
    table_name b ON a.id = b.parent_id;` |


    ## 子查询


    表 A-17 说明了 SQL 中不同类型子查询，包括 `WHERE` 和 `FROM` 子句中的基本子查询、相关子查询和公共表表达式，并提供了基本和递归 CTE
    的语法。


    **表 A-17：子查询**


    | 类别 | 类型 | 基本语法 |

    | --- | --- | --- |

    | 基本子查询 | `WHERE` 子句中的子查询 | `SELECT * FROM table1`<br>`WHERE column1 IN (SELECT
    column1 FROM table2);` |

    | `FROM` 子句中的子查询 | `SELECT a.column1, b.column2`<br>`FROM table1 a, (SELECT *
    FROM table2) b`<br>`WHERE a.id = b.id;` |

    | 相关子查询 | `SELECT *`<br>`FROM table1 t1`<br>`WHERE column1 > (`<br>`  SELECT AVG(column1)`<br>`  FROM
    table1 t2`<br>`  WHERE t2.category = t1.category`<br>`);` |

    | 公共表表达式 | 基本 CTE | `WITH cte_name AS (`<br>`  SELECT column1, column2`<br>`  FROM
    table_name`<br>`  WHERE condition`<br>`)<br>`SELECT * FROM cte_name;` |

    | 多个 CTE | `WITH`<br>`cte1 AS (`<br>`  SELECT * FROM table1 WHERE condition1`<br>`),`<br>`cte2
    AS (`<br>`  SELECT * FROM table2 WHERE condition2`<br>`)<br>`SELECT * FROM cte1
    JOIN cte2 ON cte1.id = cte2.id;` |

    | 递归 CTE | `WITH RECURSIVE cte_name AS (`<br>`  -- 基本情况`<br>`  SELECT * FROM table_name
    WHERE condition`<br>`  UNION ALL`<br>`  -- 递归情况`<br>`  SELECT t.*`<br>`  FROM
    table_name t`<br>`  JOIN cte_name c ON c.id = t.parent_id`<br>`)<br>`SELECT *
    FROM cte_name;` |


    ## 数据修改


    表 A-18 提供了用于数据操作的基本 SQL 命令，包括用于添加数据的 `INSERT`、用于修改记录的 `UPDATE` 以及用于删除数据的 `DELETE`。它涵盖了基本操作的语法，如插入多行、更新多列以及使用子查询进行删除。


    **表 A-18：数据修改**


    | 类别 | 类型 | 基本语法 |

    | --- | --- | --- |

    | `INSERT` | 基本插入 | `INSERT INTO table_name (column1, column2) VALUES (value1,
    value2);` |

    | 多行插入 | `INSERT INTO table_name (column1, column2)`<br>`VALUES`<br>`  (value1,
    value2),`<br>`  (value3, value4);` |

    | 从 `SELECT` 插入 | `INSERT INTO table_name (column1, column2)`<br>`SELECT column1,
    column2 FROM source_table WHERE condition;` |

    | `UPDATE` | 基本更新 | `UPDATE table_name SET column1 = value1 WHERE condition;`
    |

    | 更新多列 | `UPDATE table_name`<br>`SET column1 = value1, column2 = value2`<br>`WHERE
    condition;` |

    | 使用 `JOIN` 更新 | `UPDATE table1 t1`<br>`SET t1.column1 = t2.column1`<br>`FROM
    table2 t2`<br>`WHERE t1.id = t2.id;` |

    | `DELETE` | 基本删除 | `DELETE FROM table_name WHERE condition;` |

    | 删除所有行 | `DELETE FROM table_name;` |

    | 使用子查询删除 | `DELETE FROM table_name`<br>`WHERE column1 IN (SELECT column1 FROM
    other_table WHERE condition);` |


    ## 窗口函数


    表 A-19 描述了 SQL 窗口函数，包括 `ROW_NUMBER()` 和 `PARTITION BY`，以及常见的窗口函数如 `SUM()`、`AVG()`、`MIN()`、`MAX()`
    和 `COUNT()`。它还涵盖了排名函数，如 `RANK()`、`DENSE_RANK()`、`NTILE()`，以及用于访问前一行或后一行数据的 `LEAD()`
    和 `LAG()`。这些函数用于跨分区或有序结果集进行高级数据分析和计算。


    **表 A-19：窗口函数**


    | 类别 | 基本语法 |

    | --- | --- |

    | 行号 | `SELECT`<br>`  column1,`<br>`  ROW_NUMBER() OVER (ORDER BY column2) AS
    row_num`<br>`FROM table_name;` |

    | 按分区 | `SELECT`<br>`  column1,`<br>`  column2,`<br>`  ROW_NUMBER() OVER (PARTITION
    BY column1 ORDER BY column2) AS row_num`<br>`FROM table_name;` |

    | 常见窗口函数 | `SELECT`<br>`  column1,`<br>`  column2,`<br>`  SUM(column2) OVER (PARTITION
    BY column1) AS sum,`<br>`  AVG(column2) OVER (PARTITION BY column1) AS avg,`<br>`  MIN(column2)
    OVER (PARTITION BY column1) AS min,`<br>`  MAX(column2) OVER (PARTITION BY column1)
    AS max,`<br>`  COUNT(*) OVER (PARTITION BY column1) AS count`<br>`FROM table_name;`
    |

    | 排名函数 | `SELECT`<br>`  column1,`<br>`  column2,`<br>`  ROW_NUMBER() OVER (ORDER
    BY column2) AS row_num,`<br>`  RANK() OVER (ORDER BY column2) AS rank,`<br>`  DENSE_RANK()
    OVER (ORDER BY column2) AS dense_rank,`<br>`  NTILE(4) OVER (ORDER BY column2)
    AS quartile`<br>`FROM table_name;` |

    | 前导和滞后函数 | `SELECT`<br>`  column1,`<br>`  column2,`<br>`  LEAD(column2) OVER
    (ORDER BY column1) AS next_value,`<br>`  LAG(column2) OVER (ORDER BY column1)
    AS prev_value`<br>`FROM table_name;` |


    ## 日期和时间操作


    表 A-20 提供了用于处理日期和时间的 SQL 语法，涵盖检索当前日期和时间、执行日期运算、提取日期的特定组成部分以及格式化日期和时间值等操作。


    **表 A-20：日期和时间操作**


    | 类别 | 基本语法 |

    | --- | --- |

    | 当前日期和时间 | `SELECT CURRENT_DATE;`<br>-- 当前日期<br><br>`SELECT CURRENT_TIME;`<br>--
    当前时间<br><br>`SELECT CURRENT_TIMESTAMP;`<br>-- 当前日期和时间<br><br>`SELECT NOW();`<br>--
    当前时间戳 |

    | 日期/时间运算 | `SELECT date_column + INTERVAL ''1 day'';`<br>-- 加 1 天<br><br>`SELECT
    date_column + INTERVAL ''2 hours'';`<br>-- 加 2 小时<br><br>`SELECT date_column +
    INTERVAL ''3 months'';`<br>-- 加 3 个月<br><br>`SELECT date_column - INTERVAL ''1
    year'';`<br>-- 减 1 年 |

    | 日期/时间提取 | `SELECT EXTRACT(YEAR FROM date_column);`<br>-- 获取年份<br><br>`SELECT
    EXTRACT(MONTH FROM date_column);`<br>-- 获取月份<br><br>`SELECT EXTRACT(DAY FROM date_column);`<br>--
    获取日<br><br>`SELECT EXTRACT(HOUR FROM timestamp_column);`<br>-- 获取小时<br><br>`SELECT
    EXTRACT(DOW FROM date_column);`<br>-- 星期几 (0-6) |

    | 日期/时间格式化 | `SELECT TO_CHAR(date_column, ''YYYY-MM-DD'');`<br>-- 格式化日期<br><br>`SELECT
    TO_CHAR(timestamp_column, ''HH24:MI:SS'');`<br>-- 格式化时间 |'
- fmt: 'Table [A-21](#Backmatter_001.xhtml#Tab21) covers SQL string operations, such
    as concatenating strings, extracting substrings, calculating string length, replacing
    text, and finding the position of a substring within a string.


    ## Table A-21: String Operations


    | Category | Basic Syntax |

    | --- | --- |

    | String operations | `SELECT CONCAT(column1, '' '', column2);` -- Concatenate<br>`SELECT
    column1 &#124;&#124; '' '' &#124;&#124; column2;` -- Concat operator<br>`SELECT
    UPPER(column1);` -- Uppercase<br>`SELECT LOWER(column1);` -- Lowercase<br>`SELECT
    INITCAP(column1);` -- Capitalize first letter<br>`SELECT TRIM('' text '');` --
    Trim spaces<br>`SELECT LTRIM('' text'');` -- Left trim<br>`SELECT RTRIM(''text
    '');` -- Right trim<br>`SELECT SUBSTRING(column1, 1, 5);` -- Substring<br>`SELECT
    LEFT(column1, 5);` -- Left n chars<br>`SELECT RIGHT(column1, 5);` -- Right n chars<br>`SELECT
    LENGTH(column1);` -- String length<br>`SELECT REPLACE(column1, ''old'', ''new'');`
    -- Replace text<br>`SELECT POSITION(''needle'' IN column1);` -- Find position
    |


    Table [A-22](#Backmatter_001.xhtml#Tab22) explains SQL conditional expressions,
    including the `CASE` expression for conditional logic, `NULLIF` for returning
    `NULL` when two values are equal, `COALESCE` for selecting the first non-`NULL`
    value, and `GREATEST/LEAST` for finding the highest or lowest value among multiple
    columns.


    ## Table A-22: Conditional Expressions


    | Category | Type | Basic Syntax |

    | --- | --- | --- |

    | Conditional Expressions | `CASE` expression | <pre><code>SELECT<br>column1,<br>CASE<br>WHEN
    condition1 THEN result1<br>WHEN condition2 THEN result2<br>ELSE result3<br>END
    AS new_column<br>FROM table_name;</code></pre> |

    |  | `NULLIF` (returns `NULL` if equal) | `SELECT NULLIF(column1, 0) FROM table_name;`
    |

    |  | `COALESCE` (returns first non-`NULL` value) | `SELECT COALESCE(column1, column2,
    ''default'') FROM table_name;` |

    |  | `GREATEST/LEAST` | `SELECT GREATEST(column1, column2, column3) FROM table_name;`<br>`SELECT
    LEAST(column1, column2, column3) FROM table_name;` |


    Table [A-23](#Backmatter_001.xhtml#Tab23) introduces SQL views, including how
    to create, manage, and use both regular and materialized views, with syntax for
    refreshing, altering, querying, and dropping them, as well as retrieving view
    metadata and performing updates when allowed.


    ## Table A-23: Views


    | Category | Type | Basic Syntax |

    | --- | --- | --- |

    | Creating views | Basic view creation | <pre><code>CREATE VIEW view_name AS<br>SELECT
    column1, column2<br>FROM table_name<br>WHERE condition;</code></pre> |

    |  | Create or replace existing view | <pre><code>CREATE OR REPLACE VIEW view_name
