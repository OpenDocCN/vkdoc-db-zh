    # 7. 与子查询的动态对话


    本章探讨 SQL 中的动态对话概念，特别是 SQL 中的子查询。如前所述，子查询是强大的工具，允许你将查询嵌套在彼此内部以执行复杂的查询。本章的目的是概述子查询、其类型以及它们在动态对话中使用的叙述性示例。


    ## 子查询简介


    在 SQL 中，`子查询` 是嵌套在另一个查询内部的查询。使用子查询的方式有很多，包括在 `SELECT`、`FROM`、`WHERE` 和 `HAVING`
    子句中。根据其结构，子查询可以返回单个值、多个值，甚至整个表。因此，子查询可分为三种基本类型：`单行子查询`，返回单行，适用于比较运算符；`多行子查询`，提供多行，与
    `IN`、`ANY` 和 `ALL` 等运算符配合使用；以及 `关联子查询`，基于子查询中的列引用，为外部查询的每一行执行一次。'
- fmt: '## The First Story: A Bustling Office


    In a busy office, Sarah, a junior data analyst, is assigned the task of investigating
    the employee and department databases. Sarah’s manager needed answers to complex
    questions about employee salaries, departments, and performance. Sarah wants to
    write nested SQL subqueries to meet these requirements.


    Sarah uses Tables [7-1](#619961_1_En_7_Chapter.xhtml#Tab1) and [7-2](#619961_1_En_7_Chapter.xhtml#Tab2)
    to extract insights related to her assigned task.


    Table 7-2


    The Departments Table


    | ID | Name |

    | --- | --- |

    | 1 | IT |

    | 2 | Sales |

    | 3 | Marketing |


    Table 7-1


    The Employees Table


    | ID | Name | Salary | department_id |

    | --- | --- | --- | --- |

    | 1 | John | 70,000 | 1 |

    | 2 | Alice | 80,000 | 2 |

    | 3 | Bob | 60,000 | 1 |

    | 4 | Emma | 90,000 | 3 |

    | 5 | Michael | 55,000 | 2 |


    The first question is who has the highest salary. A person who is the highest-paid
    employee at the company is what Sarah is seeking. To find the answer, she used
    the following single-row subquery:


    ```

    SELECT name

    FROM employees

    WHERE salary = (SELECT MAX(salary) FROM employees);

    ```


    In this query, the subquery (`SELECT MAX(salary) FROM employees`) calculates the
    highest salary in the table, and the outer query retrieves the name of the employee
    with that salary. A single row, shown in Table [7-3](#619961_1_En_7_Chapter.xhtml#Tab3),
    is returned by this query, as you might expect.


    Table 7-3


    The Highest Salary


    | Name |

    | --- |

    | Emma |


    The second question is who works in the Sales department. The list Sarah is seeking
    contains all employees in the Sales department. Sarah used a multiple-row subquery
    to match department IDs to find the answer:


    ```

    SELECT name

    FROM employees

    WHERE department_id IN (SELECT id FROM departments WHERE name = ''Sales'');

    ```


    The subquery (`SELECT id FROM departments WHERE name = ''Sales''`) retrieves the
    ID of the Sales department, and the outer query matches this with `department_id`
    in the `Employees` table. Table [7-4](#619961_1_En_7_Chapter.xhtml#Tab4) shows
    the results.


    Table 7-4


    Who Works in the Sales Department


    | Name |

    | --- |

    | Alice |

    | Michael |


    The third question is who earns above the average salary in their department.
    The list Sarah is seeking contains all employees who earn more than the average
    salary for their department. This challenge was addressed by Sarah using a correlated
    subquery:


    ```

    SELECT emp.name

    FROM employees AS emp

    WHERE emp.salary > (

    SELECT AVG(sub_emp.salary)

    FROM employees AS sub_emp

    WHERE sub_emp.department_id = emp.department_id

    );

    ```


    The subquery (`SELECT AVG(sub_emp.salary) FROM employees AS sub_emp WHERE sub_emp.department_id
    = emp.department_id))` calculates the average salary for each department, dynamically
    adjusted based on the `department_id` of each employee in the outer query. The
    `emp` alias represents the `Employees` table in the outer query, and the `sub_emp`
    alias represents the same table in the subquery. There is a clear indication of
    their respective roles in the query by these aliases. Table [7-5](#619961_1_En_7_Chapter.xhtml#Tab5)
    shows which employees earn above the average salary in their department.


    Table 7-5


    Employees Earning Above the Average Salary in Their Department


    | Name |

    | --- |

    | Alice |

    | John |


    ## Dynamic Dialogues with Subqueries


    In SQL, dynamic dialogues are used to create interactive and responsive queries
    that can be modified based on the inputs of the user as well as other conditions.
    As a result of this dynamic behavior, subqueries play an important role. SQL queries
    can be created using dynamic dialogues that adapt based on parameters or conditions.
    As a result, the same query can be executed differently depending on the user’s
    input or the database’s state. Adaptability is essential for building robust applications
    that manipulate and retrieve data in real time.


    ### The Role of Subqueries in Dynamic Dialogues


    The term subqueries or nested queries refers to queries embedded within another
    SQL query. They provide powerful mechanisms for conditional logic and adaptability
    to dynamically filter, aggregate, or transform data. A subquery integrated into
    a dynamic dialogue allows conditional logic, real-time adaptation, and enhanced
    modularity. Table [7-6](#619961_1_En_7_Chapter.xhtml#Tab6) provides a brief description
    of conditional logic, real-time adaptation, and enhanced modularity in subqueries.


    Table 7-6


    Conditional Logic, Real-Time Adaptation, and Enhanced Modularity in subqueries


    | Aspect | Description | Example |

    | --- | --- | --- |

    | Conditional logic | Adjust results dynamically based on thresholds or specific
    scenarios, such as user preferences. | Retrieve records where a subquery calculates
    a threshold:`SELECT name``FROM employees``WHERE salary > (SELECT AVG(salary) FROM
    employees);` |

    | Real-time adaptation | Use parameters or application inputs with subqueries
    to provide context-aware results. | `SELECT name``FROM employees``WHERE salary
    > (SELECT MIN(salary) FROM employees WHERE department_id = 2);` |

    | Enhanced modularity | Break complex operations into smaller, reusable subqueries
    for clarity and maintainability. | `WITH DeptAvg AS (SELECT department_id, AVG(salary)
    AS avg_salary FROM employees GROUP BY department_id) SELECT e.name FROM employees
    e JOIN DeptAvg d ON e.department_id = d.department_id WHERE e.salary > d.avg_salary;`
    |


    As shown in Table [7-6](#619961_1_En_7_Chapter.xhtml#Tab6), conditional logic
    allows dynamic changes to query results based on thresholds, for example, comparing
    employee pay to the average. Real-time adaptation, on the other hand, incorporates
    user input and parameters, ensuring outcomes that are customized to the situation.
    For instance, you can apply a minimum wage filter to workers in a particular department.
    In addition, it is possible to use a common table expression (CTE) to divide large
    queries into parts that can be reused separately; this method simplifies large
    queries. A departmental average salary can be calculated, for example. In this
    section, these subqueries are illustrated with examples to demonstrate their flexibility,
    efficiency, and maintainability.'
