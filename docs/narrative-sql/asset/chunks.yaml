- fmt: '### Window Functions vs. Traditional Aggregation


    Window functions and traditional aggregation serve different purposes in SQL.
    As mentioned earlier, traditional aggregation—using `GROUP BY` with functions
    like `SUM()`, `COUNT()`, `AVG()`, and so on—combines rows into grouped summaries.
    A `GROUP BY` clause, for example, will group data by region and return one row
    per group if you want the total sales per region. Consequently, row-level data
    cannot be retained during aggregation. On the other hand, a window function uses
    `OVER()` to aggregate rows within a window without collapsing the result set.
    Each row of data is preserved while running totals, ranks, or moving averages
    are calculated. For example, `SUM(Sales) OVER (PARTITION BY Region ORDER BY Date)`
    calculates cumulative sales per region, but all original rows remain in the output.


    The key difference between using window functions and traditional aggregation
    is that aggregation provides summary data, whereas window functions allow for
    calculations at the row level based on aggregates. In cases where row-level detail
    is of importance, window functions are ideal for performing tasks such as ranking,
    summation, and comparing individual data points against averages across groups,
    in which the row-level details need to be preserved. See Figure [5-1](#619961_1_En_5_Chapter.xhtml#Fig1).


    ![Flow chart depicting a process in two panels. The left panel shows three horizontal
    rows of boxes, each with a turquoise box followed by two white boxes. Arrows point
    from each row to a new row with two white boxes followed by a purple box. The
    right panel shows three similar rows, each with a turquoise box followed by two
    white boxes, with arrows leading to rows with two white boxes followed by a purple
    box. The chart illustrates a transformation or progression from one state to another.](images/619961_1_En_5_Chapter/619961_1_En_5_Fig1_HTML.png)


    Figure 5-1: A comparison of window functions and traditional aggregation


    Figure [5-1](#619961_1_En_5_Chapter.xhtml#Fig1) illustrates aggregation on the
    left using `GROUP BY`, which combines and then hides individual rows. Alternatively,
    the window function, on the left, can access individual rows and add attributes
    from those rows. To summarize, traditional aggregation can be used for overall
    summaries, whereas window functions can be used for more complex, row-aware analysis.


    ### Combining Multiple Aggregation Techniques


    The combination of window functions and standard aggregation can lead to more
    powerful and flexible SQL queries. By combining row-level detail analysis with
    summary analysis, you can gain more insights than would be possible through either
    approach alone. To perform complex analyses, you can use window functions, such
    as `ROW_NUMBER()` and `RANK()`, alongside standard aggregate functions.


    #### Combining Window Functions with Standard Aggregation


    The following examples demonstrate how to combine window functions and standard
    aggregation.


    The `Sales` table, shown in Table [5-19](#619961_1_En_5_Chapter.xhtml#Tab19),
    is used for all the queries in this section. It contains data on individual sales,
    including `Customer_ID`, `Product_ID`, `Sale_Amount`, `Sale_Date`, and `Region`.


    Table 5-19: The Sales Table


    | Sale_ID | Customer_ID | Product_ID | Sale_Amount | Sale_Date | Region |

    | --- | --- | --- | --- | --- | --- |

    | 1 | 101 | P001 | 500 | 2024-01-05 | North |

    | 2 | 102 | P002 | 300 | 2024-01-08 | South |

    | 3 | 101 | P003 | 200 | 2024-01-12 | North |

    | 4 | 103 | P001 | 900 | 2024-01-15 | East |

    | 5 | 104 | P002 | 600 | 2024-01-18 | West |

    | 6 | 102 | P003 | 150 | 2024-01-22 | South |

    | 7 | 101 | P002 | 700 | 2024-01-25 | North |

    | 8 | 105 | P003 | 250 | 2024-01-30 | West |

    | 9 | 103 | P001 | 400 | 2024-02-01 | East |

    | 10 | 104 | P003 | 1000 | 2024-02-05 | West |


    ##### Example: Customer Segmentation Based on Purchase Totals


    Customers should be ranked based on their total purchases within a specific time
    frame while still seeing individual sales.


    ```sql

    SELECT Customer_ID,

    COUNT(*) OVER (PARTITION BY Customer_ID) AS Total_Sales,

    SUM(Sale_Amount) OVER (PARTITION BY Customer_ID) AS Total_Purchases,

    ROW_NUMBER() OVER (PARTITION BY Customer_ID ORDER BY Sale_Date) AS Sale_Rank

    FROM Sales;

    ```


    `COUNT(*) OVER (PARTITION BY Customer_ID) AS Total_Sales, COUNT(*)` is an aggregate
    function that counts the number of rows. The `OVER (PARTITION BY Customer_ID)`
    window function partitions the data by `Customer_ID`, meaning the count is calculated
    separately for each customer. The total number of sales made by a customer is
    shown in this column for each row of sales. The rows are not collapsed, so every
    row for a customer has the same total sales amount. `SUM(Sale_Amount) OVER (PARTITION
    BY Customer_ID)` is a window function that calculates the total purchases for
    each customer without collapsing the rows, and `ROW_NUMBER() OVER (PARTITION BY
    Customer_ID ORDER BY Sale_Date)` assigns a row number to each sale for each customer
    based on the sale date. In this way, you can see each sale, the total purchase
    amount for each customer, and the order in which the sales took place.


    Table [5-20](#619961_1_En_5_Chapter.xhtml#Tab20) shows the number of sales and
    the total purchase amount for each customer while ranking individual sales by
    date. The `Total_Sales` column shows how many sales each customer has made. `Total_Purchases`
    displays the total amount the customer has spent. `Sale_Rank` assigns a number
    to each sale for a customer, ordered by sale date.


    Table 5-20: Ranking Sales and Calculating Totals per Customer


    | Customer_ID | Total_Sales | Total_Purchases | Sale_Rank |

    | --- | --- | --- | --- |

    | 101 | 3 | 400 | 1 |

    | 101 | 3 | 1400 | 2 |

    | 101 | 3 | 1400 | 3 |

    | 102 | 2 | 450 | 1 |

    | 102 | 2 | 450 | 2 |

    | 103 | 2 | 1300 | 1 |

    | 103 | 2 | 1300 | 2 |

    | 104 | 2 | 1600 | 1 |

    | 104 | 2 | 1600 | 2 |

    | 105 | 1 | 250 | 1 |


    #### Nested GROUP BY with Window Functions


    For deeper analysis, you can use window functions in conjunction with nested `GROUP
    BY`.'
