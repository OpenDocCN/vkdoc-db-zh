    | | `LIMIT` | 限制返回的行数 |

    | | `HAVING` | 过滤聚合后的数据 |

    | SQL 子句 | `DISTINCT` | 删除重复值 |

    | | `AS` | 重命名列以提高可读性 |

    | | `IN / NOT IN` | 根据预定义列表过滤值 |

    | | `BETWEEN` | 过滤指定范围内的值 |

    | | `LIKE` | 使用通配符查找文本模式 |

    | SQL 操作 | 算术运算 (+, -, *, /) | 执行数学计算 |

    | | 比较运算 (=, >, <, >=, <=, <>) | 比较值 |

    | | 逻辑运算 (AND, OR, NOT) | 组合多个过滤条件 |

    | 聚合函数 | `COUNT()` | 计算行数 |

    | | `SUM()` | 计算值的总和 |

    | | `AVG()` | 计算列的平均值 |

    | | `MIN() / MAX()` | 找到最小或最大值 |

