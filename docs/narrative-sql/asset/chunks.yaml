- fmt: '## Looking Ahead


    As you move to the next chapter, “Filtering Facts with `WHERE`,” you will learn
    about another of SQL’s most frequently used commands. This chapter explains how
    to craft precise `WHERE` statements to filter data based on specific conditions.
    It will allow you to refine your datasets and extract even more targeted insights,
    which will enable you to tell deeper stories with your data.


    ## Test Your Skills


    1.  A popular video rental store wants to create a report displaying movie titles,
    release years, and rental categories. The classification of some movies has not
    yet been completed. Write a query that retrieves the `Title` and `ReleaseYear`
    and adds a column named `Category`. Using `CASE`, it is possible to assign categories
    according to release year. Movies released before 1990 are `Classic`; movies released
    from 1991 to 1999 are the `90s`; and movies released after 2000 are labeled `Twenty-first
    century`.


    2.  A fitness instructor wants to analyze workout data using a table that stores
    `UserID`, `DistanceWalked`, and `TimeSpentWalking`. For each user, they want to
    calculate the average walking speed, distance divided by time. Write a query that
    retrieves the `UserID`, `DistanceWalked`, and `TimeSpentWalking`, and adds a column
    named `AverageSpeed`, calculated by dividing `DistanceWalked` by `TimeSpentWalking`.


    3.  An online clothing store manager uses a database to track the `OrderID`, `CustomerID`,
    and `OrderValue`. The manager wants to know the total number of orders, the average
    order amount, and the order with the highest total. Write a query to satisfy this
    request.


    # 3. Filtering Facts with WHERE


    The `WHERE` clause is a crucial feature of SQL. It specifies the conditions under
    which rows should be selected, updated, or deleted. As a result of this statement,
    the records returned from a query are filtered based on whether certain conditions
    are true. This allows you to refine your searches to a subset of data within a
    larger dataset, so that operations are only performed on data entries that meet
    specific criteria.


    ## Introduction to WHERE


    As mentioned earlier, a SQL statement is the first step in building a query. The
    process of asking SQL to perform a specific task begins with the creation of a
    statement. As mentioned earlier, the four basic statements in SQL are `SELECT`,
    `UPDATE`, `DELETE`, and `INSERT`. A `clause` is a component of a SQL statement
    that specifies conditions or modifies the statement’s action. Data can be filtered,
    sorted, or grouped using clauses. Clauses specify what data is retrieved or manipulated
    and how it should be processed. One of the commonly used clauses, `WHERE`, is
    discussed in this chapter. The `WHERE` clause acts like a filter, allowing you
    to select only specific records from a table that meet certain conditions. This
    is incredibly useful for narrowing down large datasets to find the information
    you need.


    ### The Importance of WHERE in Storytelling with Data


    In the process of effective data storytelling, the `WHERE` clause plays a fundamental
    part in crafting narratives that are based on specific parts of the data. The
    clause enables storytellers to zoom in on data that reveals patterns and create
    targeted narratives that are more engaging and informative.


    ### The Anatomy of a WHERE clause


    The `WHERE` clause typically follows the `FROM` clause in a SQL statement. It
    can include multiple conditions combined with logical operators such as `AND`,
    `OR`, and `NOT`. Each condition in the `WHERE` clause can also use functions and
    subqueries to further refine the filtering criteria. This allows for complex and
    dynamic data retrieval strategies tailored to specific storytelling needs. Basically,
    it has the following syntax:


    ```

    SELECT column1, column2, ...

    FROM table_name

    WHERE condition

    ```


    Where `column1, column2, ...` are columns or fields that you want to retrieve,
    `table_name` is the name of the table from which the data is retrieved, and `condition`
    is the criteria for a row to be included in the result set. This condition can
    include comparisons like equals (`=`), not equals (`<>` or `!=`), greater than
    (`>`), less than (`<`), and many others. Table [3-1](#619961_1_En_3_Chapter.xhtml#Tab1)
    summarizes the most commonly used comparison operators in the `WHERE` clause.
    They are essential for filtering data based on specific criteria by comparing
    column values and constants or between columns themselves.


    Table 3-1


    SQL Comparison Operators for the WHERE Clause


    | Operator | Description | Example Use |

    | --- | --- | --- |

    | `=` | Equal to | `WHERE age = 30` |

    | `!=` | Not equal to | `WHERE age != 30` |

    |   | Not equal to | `WHERE age <> 30` |

    | `>` | Greater than | `WHERE age > 30` |

    | `<` | Less than | `WHERE age < 30` |

    | `>=` | Greater than or equal to | `WHERE age >= 30` |

    | `<=` | Less than or equal to | `WHERE age <= 30` |

    | `BETWEEN` | Between an inclusive range | `WHERE age BETWEEN 25 AND 35` |

    | `LIKE` | Search for a pattern | `WHERE name LIKE ''J%''` |

    | `IN` | Match any of a list of values | `WHERE age IN (20, 30, 40)` |

    | `IS NULL` | Matches if the column is `NULL` | `WHERE name IS NULL` |'
