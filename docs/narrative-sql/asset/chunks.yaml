    | | `UPPER() / LOWER()` | 将文本转换为大写或小写 |

    | | `SUBSTRING()` | 提取字符串的一部分 |

    | | `TRIM()` | 从文本中删除多余空格 |

    | 日期函数 | `NOW()` | 返回当前时间戳 |

    | | `DATE_TRUNC()` | 对日期/时间值进行舍入 |

    | | `EXTRACT()` | 检索日期的特定部分 |

    | 窗口函数 | `ROW_NUMBER()` | 分配唯一的行号 |

    | | `RANK() / DENSE_RANK()` | 根据条件为行分配排名 |

    | | `LAG() / LEAD()` | 访问前一行或后一行的值 |

