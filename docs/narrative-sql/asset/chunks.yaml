  trans: '

    # 第三个故事：医院管理


    阿莱塔打算分析她就职医院的管理数据。医院的管理系统有一个数据库，其中包含与医生、患者、预约和科室相关的数据表。这些表格的数据用于有效管理各种关系和程序，确保每位患者都能获得所需的护理。表
    4-19 列出了医生；表 4-20 列出了患者；表 4-21 列出了预约；表 4-22 列出了科室。


    表 4-22

    科室


    | department_id | name    |

    |---------------|---------|

    | 1             | 心脏病科 |

    | 2             | 神经科   |

    | 3             | 骨科     |

    | 4             | 儿科     |

    | 5             | 皮肤科   |


    表 4-21

    预约


    | appointment_id | patient_id | doctor_id | appointment_date |

    |----------------|------------|-----------|------------------|

    | 1001           | 101        | 1         | 2024-07-01       |

    | 1002           | 102        | 2         | 2024-07-02       |

    | 1003           | 103        | 3         | 2024-07-03       |

    | 1004           | 105        | 5         | 2024-07-04       |

    | 1005           | 101        | 4         | 2024-07-05       |


    表 4-20

    患者


    | patient_id | Name         | primary_doctor_id |

    |------------|--------------|-------------------|

    | 101        | John Doe     | 1                 |

    | 102        | Jane Roe     | 2                 |

    | 103        | Jim Beam     | `NULL`              |

    | 104        | Jack Daniels | 4                 |

    | 105        | Jill Hill    | 1                 |


    表 4-19

    医生


    | doctor_id | Name            | department_id |

    |-----------|-----------------|---------------|

    | 1         | Dr. Alice Smith | 1             |

    | 2         | Dr. Bob Johnson | 2             |

    | 3         | Dr. Charlie Lee | 1             |

    | 4         | Dr. Dana White  | 3             |

    | 5         | Dr. Eve Black   | 2             |


    ## 阿莱塔的分析任务


    阿莱塔想要：


    1.  生成一份报告，列出所有预约及其对应的医生和患者详细信息。

    2.  创建一个列表，列出所有患者及其主治医生（如果有）。

    3.  识别所有医生并列出他们的患者（仅限于主治关系），如果有。


    ## 生成预约报告


    阿莱塔打算找出所有预约的列表，以及每次预约的医生和患者详情，但问题在于她必须排除任何没有匹配医生或患者的预约。以下查询可以为阿莱塔完成这项工作：


    ```sql

    SELECT a.appointment_id, p.name AS patient_name, d.name AS doctor_name, a.appointment_date

    FROM Appointments a

    INNER JOIN Patients p ON a.patient_id = p.patient_id

    INNER JOIN Doctors d ON a.doctor_id = d.doctor_id;

    ```


    如前所述，`INNER JOIN` 会移除在连接表中没有匹配值的行。如果 `Appointments` 表中的 `patient_id` 与 `Patients`
    表中的任何 `patient_id` 都不匹配，或者 `Appointments` 表中的 `doctor_id` 与 `Doctors` 表中的 `doctor_id`
    都不匹配，那么这些行将不会出现在结果中。由于 `JOIN` 列中的 `NULL` 值会导致不匹配的行，因此它们实际上会从结果集中被移除。在此查询中无需处理额外的
    `NULL` 值，因为 `INNER JOIN` 会自然地将它们过滤掉。表 4-23 显示了所有预约及其对应的医生和患者详情。


    表 4-23

    所有预约列表


    | appointment_id | patient_name | doctor_name      | appointment_date |

    |----------------|--------------|------------------|------------------|

    | 1001           | John Doe     | Dr. Alice Smith  | 2024-07-01       |

    | 1002           | Jane Roe     | Dr. Bob Johnson  | 2024-07-02       |

    | 1003           | Jim Beam     | Dr. Charlie Lee  | 2024-07-03       |

    | 1004           | Jill Hill    | Dr. Eve Black    | 2024-07-04       |

    | 1005           | John Doe     | Dr. Dana White   | 2024-07-05       |


    ## 创建患者及其主治医生列表


    阿莱塔想要获取所有患者及其主治医生（如果有）的列表。为此，她需要考虑使用 `LEFT JOIN`，它包含 `Patients` 表中的所有行，并与 `Doctors`
    表中的行进行匹配。如果不匹配，医生表的列将包含 `NULL`。为了处理这些 `NULL` 值，阿莱塔可以使用 `COALESCE` 函数，将 `Doctors.name`
    列中的 `NULL` 值替换为 `''未指定主治医生''`。这确保了即使患者未分配主治医生，结果集也能提供有意义的信息。


    ```sql

    SELECT p.name AS patient_name, COALESCE(d.name, ''未指定主治医生'') AS doctor_name

    FROM Patients p

    LEFT JOIN Doctors d ON p.primary_doctor_id = d.doctor_id;

    ```


    `COALESCE` 对于处理 `NULL` 值非常有用。例如，当你希望在特定列数据缺失时显示默认值而不是 `NULL`，`COALESCE` 可以让你直接在
    SQL 查询中实现这一点。


    > **注意**

    >

    > `COALESCE` 是 SQL 中的一个函数，用于帮助你处理 `NULL` 值。它会逐一评估你提供的一系列表达式，并返回第一个不为 `NULL` 的表达式。`COALESCE`
    的工作方式是接受一个由逗号分隔的值或表达式列表。`COALESCE` 从左到右开始检查表达式。如果第一个表达式不是 `NULL`，`COALESCE` 会立即返回该值。如果第一个表达式是
    `NULL`，`COALESCE` 会继续检查第二个表达式，看它是否是 `NULL`。这个过程会持续进行，直到找到非 `NULL` 值或到达列表末尾。如果列表中的所有表达式都是
    `NULL`，则 `COALESCE` 本身返回 `NULL`。`COALESCE` 可以接受任意数量的表达式作为参数（多于两个）。需要注意的是，列表中表达式的数据类型需要是兼容的。`COALESCE`
    将返回第一个非 `NULL` 表达式的数据类型。


    表 4-24 显示了每位患者及其主治医生的姓名。对于未分配主治医生的患者，查询会替换为 `"未指定主治医生"`。


    表 4-24

    所有患者及其主治医生列表


    | patient_name | doctor_name               |

    |--------------|---------------------------|

    | John Doe     | Dr. Alice Smith           |

    | Jane Roe     | Dr. Bob Johnson           |

    | Jim Beam     | 未指定主治医生            |

    | Jack Daniels | Dr. Dana White            |

    | Jill Hill    | Dr. Alice Smith           |


    ## 列出医生及其主治患者


    为了获取所有医生及其所主治患者的列表，阿莱塔使用 `RIGHT JOIN` 来包含 `Doctors` 表中的所有行，并与 `Patients` 表中的行进行匹配。


    ```sql

    SELECT COALESCE(p.name, ''未分配患者'') AS patient_name, d.name AS doctor_name

    FROM Patients p

    RIGHT JOIN Doctors d ON p.primary_doctor_id = d.doctor_id;

    ```


    在此查询中，`RIGHT JOIN` 包含了 `Doctors` 表中的所有行以及 `Patients` 表中的匹配行。如果没有匹配，来自 `Patients`
    表的列将包含 `NULL`。为了处理 `NULL` 值，使用了 `COALESCE` 函数，将 `Patients.name` 列中的 `NULL` 值替换为
    `''未分配患者''`。这确保了结果集显示所有医生，包括那些不是任何患者主治医生的医生，并为 `NULL` 值提供了一个有意义的占位符。表 4-25 显示了每位医生及其主治患者的姓名。对于未分配主治患者的医生，查询会替换为
    `''未分配患者''`。


    表 4-25

    医生及其主治患者姓名


    | patient_name      | doctor_name      |

    |-------------------|------------------|

    | John Doe          | Dr. Alice Smith  |

    | Jane Roe          | Dr. Bob Johnson  |

    | Jack Daniels      | Dr. Dana White   |

    | Jill Hill         | Dr. Alice Smith  |

    | 未分配患者        | Dr. Eve Black    |

    | 未分配患者        | Dr. Charlie Lee  |

