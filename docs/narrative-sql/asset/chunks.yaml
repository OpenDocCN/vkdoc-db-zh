    ## 字符串函数


    字符串函数对于文本处理至关重要，支持连接、提取和格式化文本数据等任务。例如，`CONCAT()` 将多个字符串连接成一个，简化了字符串组合。`LOWER()`
    和 `UPPER()` 将字符串转换为小写或大写，以确保大小写一致性。`TRIM()` 移除字符串前导和尾随的空格，用于清理文本数据。`LENGTH()`
    返回字符串的字符数。`REPLACE()` 替换指定的子字符串，这对于数据更正非常有用。这些函数对于数据清理、格式化和分析不可或缺，能使数据库中的文本数据更易于管理和保持一致性。表
    10-5 总结了 PostgreSQL 中大部分众所周知的字符串函数。


    表 10-5


    常用字符串函数


    | 函数 | 描述 | 示例 |

    | --- | --- | --- |

    | `CONCAT(string1, string2, ...) 或 string1 || string2 || ...` | 连接字符串。 | `SELECT
    CONCAT(''Post'', ''greSQL''); (返回 ''PostgreSQL'')` |

    | `LEFT(string, n)` | 返回字符串的前 n 个字符。 | `SELECT LEFT(''PostgreSQL'', 4); (返回 ''Post'')`
    |

    | `RIGHT(string, n)` | 返回字符串的最后 n 个字符。 | `SELECT RIGHT(''PostgreSQL'', 4); (返回
    ''SQL'')` |

    | `TRIM([LEADING | TRAILING | BOTH] [characters] FROM string)` | 从字符串中移除前导、尾随或两端的指定字符。
    | `SELECT TRIM('' PostgreSQL ''); (返回 ''PostgreSQL'')` |

    | `LTRIM(string [, characters])` | 移除字符串的前导字符。 | `SELECT LTRIM('' PostgreSQL'');
    (返回 ''PostgreSQL'')` |

    | `RTRIM(string [, characters])` | 移除字符串的尾随字符。 | `SELECT RTRIM(''PostgreSQL '');
    (返回 ''PostgreSQL'')` |

    | `UPPER(string)` | 将字符串转换为大写。 | `SELECT UPPER(''PostgreSQL''); (返回 ''POSTGRESQL'')`
    |

    | `LOWER(string)` | 将字符串转换为小写。 | `SELECT LOWER(''PostgreSQL''); (返回 ''postgresql'')`
    |

    | `LENGTH(string)` | 返回字符串的长度。 | `SELECT LENGTH(''PostgreSQL''); (返回 10)` |

    | `POSITION(substring IN string)` | 返回子字符串在字符串中首次出现的位置。使用 `POSITION` 函数时，返回的位置从
    1 开始计数，而非 0。这与许多编程语言（如 C 和 Python）从 0 开始索引的方式不同。 | `SELECT POSITION(''gres'' IN
    ''PostgreSQL''); (返回 6)` |

    | `STRPOS(string, substring)` | 返回子字符串在字符串中首次出现的位置。 | `SELECT STRPOS(''PostgreSQL'',
    ''gres''); (返回 6)` |

    | `REPLACE(string, from, to)` | 将所有出现的子字符串替换为另一个子字符串。 | `SELECT REPLACE(''PostgreSQL'',
    ''Post'', ''New''); (返回 ''NewgreSQL'')` |

    | `INITCAP(string)` | 将每个单词的首字母转换为大写，其余字母转为小写。 | `SELECT INITCAP(''postgreSQL
    database''); (返回 ''PostgreSQL Database'')` |

    | `REPEAT(string, count)` | 将字符串重复指定的次数。 | `SELECT REPEAT(''Post'', 3); (返回 ''PostPostPost'')`
    |

    | `SPLIT_PART(string, delimiter, field)` | 使用分隔符将字符串分割成若干部分，并返回指定的部分。 | `SELECT
    SPLIT_PART(''PostgreSQL,Database'', '','', 2); (返回 ''Database'')` |

    | `TO_CHAR(value, format)` | 使用指定格式将值转换为字符串。 | `SELECT TO_CHAR(NOW(), ''YYYY-MM-DD'');
    (例如返回 ''2023-10-27'')` |

    | `MD5(string)` | 计算字符串的 MD5 哈希值。 | `SELECT MD5(''PostgreSQL'');` |

    | `SHA256(string)` | 计算字符串的 SHA256 哈希值。 | `SELECT SHA256(''PostgreSQL'');` |

    | `TRANSLATE(string, from, to)` | 将字符串中的字符替换为其他字符。 | `SELECT TRANSLATE(''12345'',
    ''13'', ''ax''); (返回 ''a2x45'')` |


    ## 日期和时间函数


    日期和时间函数对于处理时间数据至关重要，支持精确的时间戳操作。`NOW()` 返回当前日期和时间，捕捉当下时刻。`AGE()` 计算两个时间戳之间的间隔，可用于确定经过的时间。`EXTRACT()`
    提取特定的日期或时间组成部分，如年、月或小时，用于详细分析。`DATE_TRUNC()` 将时间戳截断到指定的精度，如天或分钟，用于数据聚合。`TO_CHAR()`
    将时间戳格式化为自定义的字符串表示形式，便于生成报告。这些函数对于涉及时间序列分析和数据报告的任务必不可少，确保时间数据管理的准确性和高效性。表 10-6
    总结了 PostgreSQL 中大部分众所周知的日期和时间函数。


    表 10-6


    常用日期和时间函数


    | 函数 | 描述 | 示例 |

    | --- | --- | --- |

    | `NOW() 或 CURRENT_TIMESTAMP` | 返回带时区的当前日期和时间。 | `SELECT NOW();` |

    | `CURRENT_DATE` | 返回当前日期。 | `SELECT CURRENT_DATE;` |

    | `CURRENT_TIME` | 返回带时区的当前时间。 | `SELECT CURRENT_TIME;` |

    | `DATE(timestamp)` | 从时间戳中提取日期部分。 | `SELECT DATE(''2023-10-27 10:30:00''); (返回
    ''2023-10-27'')` |

    | `EXTRACT(field FROM timestamp)` | 从时间戳中提取特定字段（如年、月、日、时、分、秒）。 | `SELECT EXTRACT(YEAR
    FROM ''2023-10-27 10:30:00''); (返回 2023)` |

    | `AGE(timestamp1, timestamp2) 或 AGE(timestamp)` | 计算两个时间戳之间的差值，或计算一个时间戳距今的“年龄”。
    | `SELECT AGE(''2023-10-27'', ''2023-10-20''); (返回 ''7 days'')` |

    | `DATE_TRUNC(field, timestamp)` | 将时间戳截断到指定字段（如日、月、年）。 | `SELECT DATE_TRUNC(''month'',
    ''2023-10-27 10:30:00''); (返回 ''2023-10-01 00:00:00'')` |

    | `TO_CHAR(timestamp, format)` | 根据格式字符串将时间戳格式化为字符串。 | `SELECT TO_CHAR(''2023-10-27
    10:30:00'', ''YYYY-MM-DD HH24:MI:SS''); (返回 ''2023-10-27 10:30:00'')` |

    | `TO_TIMESTAMP(string, format)` | 根据格式字符串将字符串转换为时间戳。 | `SELECT TO_TIMESTAMP(''2023-10-27
    10:30:00'', ''YYYY-MM-DD HH24:MI:SS'');` |

    | `MAKE_DATE(year, month, day)` | 从年、月、日构造一个日期。 | `SELECT MAKE_DATE(2023, 10,
    27); (返回 ''2023-10-27'')` |

    | `MAKE_TIME(hour, minute, second)` | 从时、分、秒构造一个时间。 | `SELECT MAKE_TIME(10, 30,
    0); (返回 ''10:30:00'')` |

    | `MAKE_TIMESTAMP(year, month, day, hour, minute, second)` | 从年、月、日、时、分、秒构造一个时间戳。
    | `SELECT MAKE_TIMESTAMP(2023, 10, 27, 10, 30, 0);` |

    | `ISFINITE(timestamp)` | 检查时间戳是否为有限值（非无穷大或负无穷大）。 | `SELECT ISFINITE(''2023-10-27'');
    (返回 true)` |

    | `INTERVAL ''value unit''` | 构造一个时间间隔值。 | `SELECT INTERVAL ''1 day'';` |

    | `DATE_PART(text, timestamp)` | 等同于 extract，但返回一个双精度数。 | `SELECT DATE_PART(''day'',
    timestamp ''2023-10-27 12:00:00'');` |

    | `JUSTIFY_DAYS(interval)` | 调整时间间隔，使 30 天的时间跨度用月份表示。 | `SELECT JUSTIFY_DAYS(INTERVAL
    ''30 days'');` |

    | `JUSTIFY_HOURS(interval)` | 调整时间间隔，使 24 小时的时间跨度用天表示。 | `SELECT JUSTIFY_HOURS(INTERVAL
    ''24 hours'');` |

    | `JUSTIFY_INTERVAL(interval)` | 使用 `JUSTIFY_DAYS` 和 `JUSTIFY_HOURS` 两者来调整时间间隔。
    | `SELECT JUSTIFY_INTERVAL(INTERVAL ''54 hours 31 days'');` |

    '
- fmt: '### JSON Functions


    JSON functions are designed to handle JSON data types, which are crucial for working
    with semi-structured data.


    > **Note**

    > JSON (JavaScript Object Notation) is a lightweight data-interchange format,
    ideal for representing structured data as key-value pairs. It''s human-readable
    and easily parsed by machines. In SQL databases like PostgreSQL, JSON integration
    allows storing and querying semi-structured data alongside relational data. The
    ability to handle flexible data models, such as configuration settings or document-style
    data, that do not fit neatly into traditional tables, is crucial.

    >

    > Using JSON functions in SQL, you can query and manipulate JSON data directly,
    bridging the gap between structured and semi-structured data. These functions
    empower analysts to query, modify, and aggregate JSON data directly within PostgreSQL,
    enhancing flexibility in data management. Table [10-7](#table-10-7) summarizes
    most of the well-known JSON functions in PostgreSQL.


    Table 10-7: The Commonly Used JSON Functions


    | Function | Description | Example |

    | --- | --- | --- |

    | `to_json(anyelement)` | Converts a PostgreSQL value to JSON. | `SELECT to_json(ARRAY[1,
    2, 3]);` (returns `"[1,2,3]"`) |

    | `to_jsonb(anyelement)` | Converts a PostgreSQL value to JSONB. | `SELECT to_jsonb(ROW(1,
    ''foo''));` (returns `''{"f1":1,"f2":"foo"}''`) |

    | `json_build_array(VARIADIC "any")` | Builds a JSON array from a variadic parameter
    list. | `SELECT json_build_array(1, ''two'', null);` (returns `"[1,\"two\",null]"`)
    |

    | `json_build_object(VARIADIC "any")` | Builds a JSON object from a variadic parameter
    list. | `SELECT json_build_object(''foo'', 1, ''bar'', ''baz'');` (returns `''{"foo":1,"bar":"baz"}''`)
    |


    ### Control Functions


    Control functions enable procedural logic within database functions and triggers.
    `IF-ELSE` structures enable conditional execution, which enables branching logic
    based on data values. `LOOP` constructs provide iterative capabilities, facilitating
    repetitive tasks. `EXCEPTION` handling captures and manages errors, ensuring robust
    code execution. These control structures empower developers to create complex,
    dynamic database operations, such as data validation, conditional updates, and
    custom error handling. They are essential for building sophisticated database
    applications that require procedural logic beyond simple SQL queries. Table [10-8](#table-10-8)
    summarizes most of the well-known control functions in PostgreSQL.


    Table 10-8: Commonly Used Control Functions


    | Function | Description | Example |

    | --- | --- | --- |

    | `COALESCE(value1, value2, ...)` | Returns the first non-`NULL` value in the
    list. | `SELECT COALESCE(NULL, ''default'', ''other'');` (returns `''default''`)
    |

    | `NULLIF(value1, value2)` | Returns `NULL` if `value1` equals `value2`; otherwise
    returns `value1`. | `SELECT NULLIF(10, 10);` (returns `NULL`) |

    | `GREATEST(value1, value2, ...)` | Returns the largest value from the list. |
    `SELECT GREATEST(10, 5, 15);` (returns `15`) |

    | `LEAST(value1, value2, ...)` | Returns the smallest value from the list. | `SELECT
    LEAST(10, 5, 15);` (returns `5`) |

    | `CASE WHEN condition1 THEN result1 [WHEN condition2 THEN result2 ...] [ELSE
    resultN] END` | Conditional expression, similar to `if-then-else` logic. | `SELECT
    CASE WHEN age >= 18 THEN ''Adult'' ELSE ''Minor'' END FROM users;` |

    | `ASSERT(condition, message)` | Checks a condition and raises an error if it''s
    false. (Primarily for debugging.) | `SELECT ASSERT(age > 0, ''Age must be positive'')
    FROM users;` |


    ### System Functions


    System functions provide access to database metadata and system-level operations.
    `CURRENT_USER` reveals the current user’s name, aiding in security and auditing.
    `VERSION()` displays the PostgreSQL server’s version, crucial for compatibility
    checks. `pg_sleep()` pauses execution for a specified duration, useful for testing
    and scheduling. These functions allow developers to interact with the database
    environment, retrieve system information, and control execution flow. Table [10-9](#table-10-9)
    summarizes most of the well-known system functions in PostgreSQL.


    Table 10-9: Commonly Used System Functions


    | Function | Description | Example |

    | --- | --- | --- |

    | `CURRENT_USER` | Returns the current user name. | `SELECT CURRENT_USER;` |

    | `SESSION_USER` | Returns the session user name. | `SELECT SESSION_USER;` |

    | `USER` | Equivalent to `CURRENT_USER`. | `SELECT USER;` |

    | `CURRENT_DATABASE()` | Returns the name of the current database. | `SELECT CURRENT_DATABASE();`
    |

    | `CURRENT_SCHEMA` | Returns the name of the current schema. | `SELECT CURRENT_SCHEMA;`
    |

    | `CURRENT_SCHEMAS(boolean)` | Returns the names of schemas in the search path.
    If the Boolean parameter is `true`, implicitly included system schemas are included
    in the result. | `SELECT CURRENT_SCHEMAS(false);` |

    | `VERSION()` | Returns a string describing the PostgreSQL server version. | `SELECT
    VERSION();` |


    A summary of the differences between the types of functions is provided in Table
    [10-10](#table-10-10).


    Table 10-10: Differences Between the Types of Functions


    | Function Type | Purpose | Returns |

    | --- | --- | --- |

    | Aggregate functions | Summarize multiple rows into one result. | Single value
    per group |

    | Statistical and mathematical functions | Perform numerical or statistical calculations.
    | Single or multi-row values |

    | Window functions | Compute values across rows without collapsing them. | One
    value per row |

    | Value functions | Handle individual data values, often for type conversion or
    `NULL` handling. | Single value |

    | Ranking functions | Rank rows within a result set based on specified criteria.
    | One value per row |

    | String functions | Manipulate string data. | Single value |

    | Date and time functions | Perform calculations or transformations on dates and
    times. | Single value or multi-row values |

    | JSON functions | Manipulate or extract data from JSON/JSONB data types. | Single
    or multi-row values |

    | Control functions | Control program flow in PostgreSQL. | Depends on the function
    (e.g., Boolean, Integer) |

    | System functions | Interact with the database system or metadata. | Single value
    |


    Each function type serves a different analytical need; these are summarized and
    compared in Table [10-11](#table-10-11).


    Table 10-11: Different Analytical Needs for Each Function


    | Function Type | Description |

    | --- | --- |

    | Aggregate functions | Operate on multiple rows and return a single result. |

    | Statistical and mathematical functions | For calculations like regression, dispersion,
    and other numerical analysis. |

    | Window functions | Perform calculations across rows related to the current row,
    allowing comparisons. |

    | Value functions | Return or manipulate values, often for type casting or handling
    `NULL` values. |

    | Ranking functions | Rank rows based on specified ordering criteria. |

    | String functions | For string manipulation tasks, such as concatenation and
    case conversion. |

    | Date and time functions | Work with date and time types for calculations and
    transformations. |

    | JSON functions | Manipulate and extract data from JSON/JSONB columns. |

    | Control functions | Control program flow in PostgreSQL. |

    | System functions | Deal with system-level information or database metadata.
    |'
