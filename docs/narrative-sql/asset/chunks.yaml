    | 公用表表达式 (CTEs) | `CASE WHEN` | 执行条件计算 |

    | | `WITH` (公用表表达式) | 创建临时结果集以提高可读性 |


    如表 [11-2](#619961_1_En_11_Chapter.xhtml#Tab2) 所示，SQL 提供了构建数据以获得更好洞察的基本组件。像 `SELECT`、`FROM`、`WHERE`、`JOIN`
    和 `GROUP BY` 这样的语句用于检索、过滤、组合和聚合信息。像 `AS`、`LIKE` 和 `BETWEEN` 这样的子句用于优化查询。操作符实现计算和逻辑，而聚合函数、字符串函数和日期函数则用于汇总和格式化数据。正如第
    [10](#619961_1_En_10_Chapter.xhtml) 章所讨论的，像 `RANK()` 和 `LAG()` 这样的高级功能可以跨相关行执行计算。此外，第
    [8](#619961_1_En_8_Chapter.xhtml) 章讨论的 `CASE WHEN` 和 CTEs 提供了条件逻辑并改进了查询组织，从而产生更具洞察力和结构化的结果。


    #### Supporting Visualizations of Query Results


    SQL 查询为仪表板、图表和报告提供干净、结构化的数据。编写良好的查询可确保可视化结果准确、相关且具有洞察力。表 [11-3](#619961_1_En_11_Chapter.xhtml#Tab3)
    列出了可用于帮助您为仪表板、报告和可视化叙事准备查询结果的 SQL 元素。


