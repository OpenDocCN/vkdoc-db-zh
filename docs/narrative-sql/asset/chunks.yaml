    is a new column created in the output that contains the product of `column1` and
    `column2`.


    Table [2-5](#619961_1_En_2_Chapter.xhtml#Tab5) summarizes some of the most commonly
    used SQL mathematical operations.


    Table 2-5


    An Illustration of the Most Useful SQL Mathematical Operations


    | Operation | SQL Symbol | Example Use | Description |

    | --- | --- | --- | --- |

    | Addition | `+` | `column1 + column2` | Adds two columns together. |

    | Subtraction | `-` | `column1 - column2` | Subtracts one column from another.
    |

    | Multiplication | `*` | `column1 * column2` | Multiplies two columns. |

    | Division | `/` | `column1 / column2` | Divides one column by another. |

    | Modulus | `%` | `column1 % column2` | Divides one column by another and returns
    the remainder. |


    These operations can be used to create derived columns and provide greater insight
    into your data.'
  trans: '### 从表中选择列


    在构建叙述或进行分析时，您经常需要从一个或多个表中获取特定的数据片段。选择特定的列可以让您专注于与您的故事或分析相关的数据。例如，如果您有一个名为`Customers`的数据库表，其中包含`CustomerID`、`FirstName`、`LastName`、`Email`、`DateOfBirth`、`Neighborhood`、`Address`、`Zip
    Code`和`Phone Number`等字段，而您的故事或分析只需要知道客户姓名和电子邮件，那么正确的`SELECT`语句应类似如下：


    ```sql

    SELECT FirstName, LastName, Email

    FROM Customers;

    ```


    表 2-2 显示了执行仅选择`FirstName`、`LastName`和`Email`列的查询的结果。


    **表 2-2**

    SELECT 查询执行结果


    | FirstName | LastName | Email |

    | --- | --- | --- |

    | John | Doe | `johndoe@example.com` |

    | Jane | Smith | `janesmith@example.com` |

    | Alice | Johnson | `alicej@example.com` |


    ### 为列引入别名


    SQL 中的别名用于重命名 SQL 查询输出中的列或表。它们对于提高查询结果的可读性特别有用。例如，使用`Contact Email`代替单纯的`Email`可以显著增强清晰度。这在连接多个表时同样适用，这将在第
    4 章中介绍。当连接多个具有名称相同但含义不同的列的表时，使用别名也很有帮助。`AS`关键字用于列名之后来定义别名。然而，`AS`关键字是可选的。


    ```sql

    SELECT FirstName AS First, LastName AS Last, Email AS ContactEmail

    FROM Customers;

    ```


    在此查询中，`FirstName`、`LastName`和`Email`在输出中分别被重命名为`First`、`Last`和`ContactEmail`。别名在报告和导出数据中尤其有用，使其成为数据呈现和讲故事中必不可少的工具。参见表
    2-3。


    **表 2-3**

    带 AS 的 SELECT 查询执行结果


    | First | Last | ContactEmail |

    | --- | --- | --- |

    | John | Doe | `johndoe@example.com` |

    | Jane | Smith | `janesmith@example.com` |

    | Alice | Johnson | `alicej@example.com` |


    ### 介绍 CONCAT 函数


    为完成此过程，最后一步是构建以下 SQL 查询，该查询将连接姓和名以获取全名和电子邮件地址。


    ```sql

    SELECT CONCAT(FirstName, '' '', LastName) AS FullName, Email

    FROM Customers;

    ```


    这条 SQL 语句利用`CONCAT()`函数将`FirstName`和`LastName`合并到一个`FullName`列中，从而简化了每份邀请函的呈现和个性化处理。通过仅选择`FullName`和`Email`列，该查询高效地提取了必要信息，确保创建和发送邀请函的流程得以简化且目标明确。参见表
    2-4。


    **表 2-4**

    SELECT、AS 和 CONCAT 函数查询执行结果


    | FullName | Email |

    | --- | --- |

    | John Doe | `johndoe@example.com` |

    | Jane Smith | `janesmith@example.com` |

    | Alice Johnson | `alicej@example.com` |


    此表高效地呈现了发送书店周年纪念邀请函所需的信息，仅展示每位顾客合并后的全名和电子邮件地址。


    注意


    `CONCAT`是 SQL 中的一个函数，而非操作。它用于将两个或多个字符串连接或拼接成一个字符串。`CONCAT`函数是合并来自不同列的数据或从数据库中的多个字符串字段创建格式化输出的重要工具。`CONCAT`函数的基本语法如下：


    `CONCAT(string_column_1, string_column_2, ..., string_column_N)`


    需要注意的是，PostgreSQL 中的`CONCAT`函数可用于多种场景。然而，在某些特定情况下它可能不适用，或者替代方法可能更合适。`||`操作符是 PostgreSQL
    中连接字符串的标准方法，可以作为`CONCAT`函数的替代方案。例如，考虑以下使用`CONCAT`函数的示例：


    `SELECT CONCAT(string_column_1, string_column_2, ..., string_column_N) AS concatenated_string`


    `FROM your_table;`


    或者，可以使用`||`操作符实现相同的结果，这是标准的 SQL 字符串连接方法：


    `SELECT string_column_1 || string_column_2 || ... || string_column_N AS concatenated_string`


    `FROM your_table;`


    `||`操作符被各种 SQL 数据库广泛支持，与一些专有函数（如`CONCAT`）相比，使其成为一个可移植性更强的选择。两种方法都能有效地连接字符串，选择哪一种取决于可读性、性能考虑以及特定的数据库要求等因素。


    ### 使用 SELECT 进行 SQL 数学运算


    在 SQL 中，数学运算对于转换和分析数据至关重要。这些操作使您能够跨数据列执行计算，从而增强通过数字传达有意义信息的能力。本节探讨 SQL 中可用的基本数学运算，用汇总表说明这些操作，并展示如何将这些技术应用于讲故事。


    SQL 支持多种可以直接在`SELECT`语句中应用的数学运算。包括加法(`+`)、减法(`-`)、乘法(`*`)和除法(`/`)。可以直接在数据库查询中使用这些操作对现有数据进行计算，以生成新值。以下查询提供了一个使用数学运算计算简单乘积的基本示例：


    ```sql

    SELECT column1, column1 * column2 as Product

    FROM Table;

    ```


    在此查询中，`column1`和`column2`是`Table`中的现有列，而`Product`是在输出中创建的新列，包含`column1`和`column2`的乘积。


    表 2-5 总结了一些最常用的 SQL 数学运算。


    **表 2-5**

    最实用的 SQL 数学运算示例


    | 运算 | SQL 符号 | 示例用法 | 描述 |

    | --- | --- | --- | --- |

    | 加法 | `+` | `column1 + column2` | 将两列相加。 |

    | 减法 | `-` | `column1 - column2` | 将一列减去另一列。 |

    | 乘法 | `*` | `column1 * column2` | 将两列相乘。 |

    | 除法 | `/` | `column1 / column2` | 将一列除以另一列。 |

    | 取模 | `%` | `column1 % column2` | 将一列除以另一列并返回余数。 |


    这些操作可用于创建派生列，并更深入地了解您的数据。'
- fmt: '## The Second Story: The Bakery Sales Data


    There is a small bakery that wants to analyze the sales data it has collected.
    They have a table named `Sales` with columns like `CustomerID`, `ProductName`,
    `Price`, `RegularPrice`, `Discount`, and `Quantity`. They raise the following
    questions in their analysis:

    *   Which flavor of donut is most popular?

    *   Who are our most frequent customers?

    *   How much revenue does each product generate?


    Before answering each question, consider the `Sales` table, shown in Table [2-6](#619961_1_En_2_Chapter.xhtml#Tab6).


    Table 2-6

    The Sales Table


    | CustomerID | ProductName | Price | Quantity | RegularPrice | Discount |

    | --- | --- | --- | --- | --- | --- |

    | 743663 | Glazed Donut | 2.5 | 2 | 3.0 | 0.5 |

    | 743663 | Chocolate Muffin | 3.0 | 1 | 3.0 | 0.0 |

    | 223424 | Blueberry Muffin | 3.0 | 2 | 3.0 | 0.0 |

    | 323423 | Chocolate Chip Cookie | 1.5 | 3 | 2.0 | 0.5 |

    | 432424 | Sugar Cookie | 1.0 | 4 | 1.0 | 0.0 |


    The first question can be answered with the following query. They can use a simple
    `SELECT` statement in order to determine the most popular donut flavor.

    ```sql

    SELECT ProductName, SUM(Quantity) AS TotalSold

    FROM Sales

    GROUP BY ProductName;

    ```

    This query selects `ProductName` and calculates the total quantity sold using
    `SUM(Quantity)` with an alias `TotalSold`. `SUM()` is a function in SQL used to
    calculate the total of a numeric column in a table. It should be noted that this
    function calculates the sum of all values in a specified numeric column and ignores
    `NULL` values by default. In this query, `GROUP BY ProductName` groups all sales
    records by product name, so the `SUM(Quantity)` calculates the total quantity
    sold for each unique product. This helps summarize data per product instead of
    across the entire table. See Table [2-7](#619961_1_En_2_Chapter.xhtml#Tab7).


    Table 2-7

    The Result of First Question Query Execution


    | ProductName | TotalSold |

    | --- | --- |

    | Chocolate Chip Cookie | 3 |

    | Glazed Donut | 2 |

    | Blueberry Muffin | 2 |

    | Chocolate Muffin | 1 |

    | Sugar Cookie | 4 |


    Note

    In SQL, the `GROUP BY` clause is used to group rows that have the same values
    in specified columns into summary rows. It’s commonly used with aggregate functions
    like `SUM()`, `AVG()`, `COUNT()`, and `MAX()` to perform calculations on each
    group of data. Chapter [5](#619961_1_En_5_Chapter.xhtml) covers the `GROUP BY`
    clause in detail, while Chapters [5](#619961_1_En_5_Chapter.xhtml) and [10](#619961_1_En_10_Chapter.xhtml)
    cover a much broader range of aggregate functions.


    To answer the second question (most frequent customers), you could use the following
    query:

    ```sql

    SELECT CustomerID, COUNT(*) AS PurchaseCount

    FROM Sales

    ```

    This query selects `CustomerID` and counts the number of purchases using `COUNT(*)`
    with an alias `PurchaseCount`. `COUNT(*)` in SQL is a function used to get the
    total number of rows in a table. It should be noted that this function counts
    all rows in a table, including duplicates and rows with `NULL` values.


    Note

    `COUNT(*)` is distinct from `COUNT(column_name)`, which counts only non-`NULL`
    values in a specific column. In SQL, the asterisk (`*`) is used to select all
    columns. The asterisk represents all columns from a table. Using `*` in `SELECT`
    can be inefficient for large tables, as it retrieves all the data. Consider selecting
    specific columns for better performance.


    Table [2-8](#619961_1_En_2_Chapter.xhtml#Tab8) shows the result of executing the
    query to select only the `CustomerID` and `PurchaseCount` columns.


    Table 2-8

    The Result of the Second Question Query Execution


    | CustomerID | PurchaseCount |

    | --- | --- |

    | 743663 | 2 |

    | 223424 | 1 |

    | 323423 | 1 |

    | 432424 | 1 |


    To answer the third question (how much revenue does each product generate), the
    following query can be used:

    ```sql

    SELECT

    CASE

    WHEN ProductName LIKE ''%Donut%'' THEN ''Donuts''

    WHEN ProductName LIKE ''%Muffin%'' THEN ''Muffins''

    ELSE ''Cookies''

    END AS Category,

    SUM(Price * Quantity) AS TotalRevenue

    FROM Sales

    GROUP BY

    CASE

    WHEN ProductName LIKE ''%Donut%'' THEN ''Donuts''

    WHEN ProductName LIKE ''%Muffin%'' THEN ''Muffins''

    ELSE ''Cookies''

    END;

    ```

    This query is a bit more complex. It uses a `CASE` statement to categorize products
    based on their names. It calculates total revenue using `SUM(Price * Quantity)`.
    In order to find the answer, the query analyzes product names and categorizes
    them into `Donuts`, `Muffins`, or `Cookies`. Then, it multiplies the price of
    each item by the quantity sold and adds them to get the total revenue generated
    by each category. In this way, the revenue generated by each product category
    can be calculated.


    It should be noted that the `%` symbol is a special character used to perform
    pattern matching within strings. `%` represents any sequence of characters, zero
    or more characters, within a pattern. For instance, `%Donut%` is a matching pattern.
    In this specific case, the query is looking for any product name that contains
    the substring `"Donut"` anywhere within it. So, it would match product names like
    `"Glazed Donut"` and `"Chocolate Donut with Sprinkles"`.


    Finally, the `GROUP BY` clause is used with the same `CASE` expression to group
    the records by their assigned category (`Donuts`, `Muffins`, or `Cookies`) before
    applying the `SUM` function. This ensures correct revenue aggregates for each
    product category. Table [2-9](#619961_1_En_2_Chapter.xhtml#Tab9) shows the result.


    Table 2-9

    The Result of Third Question Query Execution


    | Category | TotalRevenue |

    | --- | --- |

    | Donuts | 5 |

    | Muffins | 9 |

    | Cookies | 8.5 |


    As shown in Table [2-9](#619961_1_En_2_Chapter.xhtml#Tab9), the `CASE` statement
    categorized the products. Products with `"Donut"` in their name became `Donuts`,
    `"Muffin"` became `Muffins`, and everything else became `Cookies`. `SUM(Price
    * Quantity)` calculated the total revenue for each category.


    ### The CASE statement


    The `CASE` statement in SQL acts like `if-then-else` logic for queries. It evaluates
    a series of conditions and returns a corresponding value based on the first matching
    condition.

    *   The `WHEN` statement specifies a condition to be evaluated. It can be any
    valid SQL expression that returns a Boolean value (true/false).

    *   If the corresponding `WHEN` condition evaluates to `true`, this value is returned
    by `THEN`.

    *   `ELSE` is an optional clause that provides a default result if none of the
    `WHEN` conditions are met. If omitted and no condition is true, it usually returns
    `NULL`.


    ```sql

    CASE

    WHEN condition1 THEN result1

    WHEN condition2 THEN result2

    ...

    ELSE result_else

    END

    ```


    For more complex queries, it is possible to nest `CASE` statements. You learn
    more about `CASE` and nested `CASE`s in Chapter [8](#619961_1_En_8_Chapter.xhtml)
    in particular.'
