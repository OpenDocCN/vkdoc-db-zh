    原始数据可能密集且难以解读。可视化将原始数据转化为易于理解的洞察，增强了理解和参与度。因为人脑处理视觉信息比文本信息更高效，所以可视化可以成为一种强大的沟通工具。然而，有效的可视化取决于选择正确的图表类型。例如，条形图非常适合比较类别，而折线图则擅长显示随时间变化的趋势。选择恰当的图表能确保数据的故事被准确有效地传达，防止误解并增强理解。表
    11-6 和图 11-2 说明了对有效可视化有用的常用图表类型。


    ![图片是一个展示各种图表类型的面板图。左上角子图是一个具有不同高度垂直条的条形图。其他子图包括柱形图、折线图、散点图、饼图、环形图、直方图、箱线图、气泡图、热力图、面积图、堆积条形图、瀑布图和雷达图。每个图表类型的标签位于其各自子图的顶部，展示了不同的数据可视化方法。](img/619961_1_En_11_Fig2_HTML.jpg)


    **图 11-2** 常用图表类型图示


    **表 11-6** 常用图表类型摘要


    | 图表类型 | 描述 |

    | --- | --- |

    | 条形图 | 用矩形条显示分类数据；用于比较数量。 |

    | 柱形图 | 类似于条形图，但条形是垂直的；用于比较不同类别。 |

    | 折线图 | 通过用线连接数据点来显示随时间变化的趋势。 |

    | 散点图 | 使用点显示两个数值变量之间的关系。 |

    | 饼图 | 用扇形表示一个整体的比例；最适合显示百分比分布。 |

    | 环形图 | 饼图的变体，中心有一个孔，提高了可读性。 |

    | 直方图 | 类似于条形图，但用于连续数据的频率分布。 |

    | 箱线图（箱须图） | 用四分位数和异常值总结数据分布。 |

    | 气泡图 | 类似于散点图，但包含由气泡大小表示的第三个变量。 |

    | 热力图 | 使用颜色梯度以矩阵形式显示变量之间的关系。 |

    | 面积图 | 类似于折线图，但线下有阴影区域以强调数量。 |

    | 堆积条形图 | 将条形分割成不同类别以显示部分与整体的关系。 |

    | 瀑布图 | 显示初始值如何受到一系列正面或负面影响。 |

    | 雷达图（蜘蛛图） | 在径向布局中比较不同类别中的多个变量。 |

    | 树状图 | 使用嵌套的矩形通过大小和颜色来表示层次数据。 |


    如图 11-2 所示，可视化技术在数据叙事中服务于不同的目的。条形图对于比较分类数据非常有效，例如不同产品线的销售额。折线图对于说明随时间变化的趋势非常宝贵，比如全年网站流量的波动。散点图揭示了两个数值变量之间的关系，展示了相关性或模式。直方图显示单个数值变量的分布，突出频率和范围。地图对于地理数据至关重要，允许进行空间分析和模式识别。最后，仪表板可以将多个可视化组合成一个统一的界面，提供关键绩效指标的全面概览。


    ### 为 PostgreSQL 推荐的可视化工具


    `PostgreSQL` 是一个强大的关系型数据库，可以与各种可视化工具无缝集成，使数据变得生动。`Tableau` 和 `Power BI` 提供了用户友好的界面来创建交互式仪表板，而
    `Grafana` 则非常擅长时间序列数据可视化，常用于监控。`Python` 库如 `Matplotlib` 和 `Seaborn` 提供了一种更具编程性的方法，提供了广泛的定制选项，如图
    11-2 所示。要将数据从 `PostgreSQL` 导出到这些工具，你可以执行标准的 `SQL` 查询来提取所需数据，然后将其导出为 `CSV` 文件，或使用可视化工具提供的直接数据库连接器。例如，`Tableau`
    和 `Power BI` 允许通过 `ODBC` 或 `JDBC` 驱动程序直接连接到 `PostgreSQL` 数据库。因此，无论可视化是实时更新还是按计划更新，它们都可以反映最新的信息。


    ### 超越演示：如何引导你的观众


    有效的数据演示并不止于最后一张幻灯片。通过引导观众超越演示文稿，确保他们理解、记住并根据洞察采取行动。这包括提供支持材料、鼓励进一步探索和培养数据驱动的文化。


    #### 支持材料


    为了增强理解和可信度，分享支持分析的资源至关重要。数据来源的透明度允许观众验证信息并理解其可靠性。每个数据集都存在局限性，以及诸如缺失值或偏差等数据挑战。此外，创建一个结构化的关键术语、指标和定义列表，能确保解释的一致性，尤其是在处理复杂数据集或技术术语时。


    #### 鼓励进一步探索


    数据演示应激发观众的好奇心。演示者不应只是简单地给出结论，而应让观众参与到对新问题的讨论中。讨论 `SQL` 查询背后的问题可以带来更好的洞察或更具启发性的问题，从而发现更好的数据发现。此外，提供像共享仪表板或数据集这样的交互式工具，能让观众进行实践探索，使他们能够独立发现洞察。


    #### 创建数据驱动的文化


    超越单次演示的目标，是创造一个数据处于决策核心的环境。通过使用数据来指导策略，演示者可以帮助观众将思维模式从基于直觉转变为基于证据。通过采用这种策略，演示者可以超越仅仅分享洞察——他们可以为观众配备工具、思维方式和动力，使他们在演示结束后仍能长期有效地使用数据。

    '
- fmt: '## Final Thoughts: The Data Storyteller’s Legacy in the Age of Artificial
    Intelligence (AI)


    As you’ve learned, data storytelling is the ability to transform complex data
    into engaging, meaningful narratives. Data storytellers need clarity, context,
    and engagement. By clearly presenting data with context and relevance, storytellers
    can connect with their audience on an emotional level. This makes the data not
    just informative but also interesting by understanding the audience’s needs. It
    also selects the right visualizations and emphasizes the story’s core message.


    Data storytelling is evolving as technology advances. Tools and techniques will
    evolve, but the core need to communicate data effectively will remain. This encourages
    analysts to continue refining their data storytelling skills, which is crucial.
    The future of data storytelling will be dynamic, but its goal will always be to
    make data accessible, relatable, and actionable for all.


    Undoubtedly, the emergence of phenomena such as large language models (LLMs) and
    advanced language models has raised many concerns for those involved in this field
    or planning to enter it in the future. Generative AI and LLMs have revolutionized
    query writing and data analysis in recent years. These technologies enable automated
    SQL query generation, natural language processing for extracting insights, and
    even predictive analytics. By reducing technical expertise, they empower a broader
    audience to interact with data more simply. As these AI tools continue to advance,
    they will further enhance the speed, efficiency, and accuracy of data analysis.
    This will make it easier to uncover insights and create compelling narratives
    from large datasets.


    Despite all the advantages that come with the emergence of AI for writing queries,
    a great question has also arisen. While LLMs can indeed generate SQL queries and
    help automate data analysis tasks, are there still logical reasons to learn SQL?


    The answer that I give to this question as the author of this book when writing
    the current chapter in April 2025 is “most definitely yes,” analysts still need
    to learn programming languages, query writing, and many of the skills that AI
    can do. In fact, I think that knowing SQL allows analysts to understand the logic
    behind queries. This helps them not only understand what a model generates but
    also modify and optimize queries according to specific needs. Without understanding
    SQL, they may struggle to adapt queries when they encounter complex data structures
    or specific requirements that the LLM doesn’t automatically handle well. LLMs
    can generate queries based on patterns they’ve been trained on, but they might
    not always generate the most efficient or contextually appropriate query for each
    particular situation. Through the study of SQL, analysts learn how to customize
    queries to suit their exact needs, refine query performance, and ensure they follow
    best practices. LLM queries that don’t return the expected results or perform
    poorly can be diagnosed with SQL knowledge. It is possible to interpret error
    messages, identify performance issues, and optimize queries.


    In summary, while LLMs can assist in generating queries, SQL remains a fundamental
    skill that allows analysts to manage, understand, and troubleshoot their database
    systems.


    Anyway, I hope your time and effort spent reading and practicing this book will
    help you learn data analysis, query writing, and the ability to tell stories in
    the world of data. In conclusion, I must say that reading just one book is not
    sufficient to become an expert data analyst. I suggest that you always update
    your knowledge and skills. As a data analyst, I recommend gaining a solid understanding
    of the basics and keeping yourself motivated to learn more. As you continue on
    your data storytelling journey, remember that every dataset has a story waiting
    to be told. The world of data storytelling is vast and ever-changing, but your
    role in making data meaningful remains valuable.


    ## Summary


    This chapter explored the art of effectively presenting a data story, ensuring
    insights are clear, compelling, and actionable. You learned how to structure your
    narrative, select impactful visualizations, and engage your audience with storytelling
    principles. A data-driven culture was also discussed, as well as strategies to
    guide audience interpretation, encourage further exploration, and do further research.
    Using these strategies, raw data can be transformed into meaningful insights that
    facilitate informed decisions.


    ## Key Points


    *   Data stories need to be structured with clear narratives and compelling visualizations
    to ensure they are both accessible and engaging.

    *   Adapting presentations to different audiences enhances comprehension and encourages
    decision-making based on data.

    *   While AI and language models can assist in generating queries, SQL remains
    a fundamental skill which allows analysts to manage, understand, and troubleshoot
    their databases.


    ## Key Takeaways


    *   **Effective data narratives**: The ability to present a data story that is
    clearly structured with a clear beginning, middle, and end increases audience
    engagement and comprehension.

    *   **Strategic visualization selection**: Choosing the right chart and visual
    elements will ensure that your data is communicated clearly and convincingly.

    *   **Audience-centered communication**: Making presentations relevant to different
    audiences promotes better understanding and facilitates data-driven decision-making.


    # Appendix A: SQL Syntax Reference Guide


    This appendix is designed as a quick reference guide for readers working with
    SQL in data analysis. It focuses on core elements like essential SQL syntax, key
    SQL keywords, and standard command structures. Rather than diving into exhaustive
    theoretical details, the guide highlights practical syntax patterns commonly used
    in querying, manipulating, and managing data.'
