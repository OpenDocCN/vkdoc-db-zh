    In the next challenge, decision makers want a dynamic view of admitted patients
    according to their diagnosis code. Sofia needs to filter data so that only cardiac-related
    patients with `diagnosis_codes` of 100 to 199 are displayed.


    ```

    SELECT

    patient_id,

    diagnosis_code,

    admission_date,

    discharge_date

    FROM hospital_admissions

    WHERE diagnosis_code BETWEEN 100 AND 199

    AND admission_date >= ''2024-01-01''

    AND admission_date <= ''2024-12-31'';

    ```


    In this query, the `WHERE` clause allows dynamic filtering. Here, data is narrowed
    to show only cardiac-related admissions in a specific year, reducing clutter and
    focusing the plot on the requested subset of data. The `WHERE` clause filters
    rows by selecting only those where the `diagnosis_code` is between 100 and 199,
    representing cardiac-related issues, and the `admission_date` falls within the
    year 2024\. As shown in Table [8-12](#619961_1_En_8_Chapter.xhtml#Tab12), the
    dynamic filtering ensures that only relevant data is included for analysis.


    Table 8-12


    Dynamic Filtering (Cardiac-Related Issues)


    | patient_id | diagnosis_code | admission_date | discharge_date |

    | --- | --- | --- | --- |

    | 1 | 150 | 2024-03-01 | 2024-03-03 |

    | 2 | 120 | 2024-03-02 | 2024-03-05 |

    | 3 | 180 | 2024-03-03 | 2024-03-10 |

    | 5 | 110 | 2024-03-05 | 2024-03-08 |

    | 6 | 130 | 2024-03-06 | 2024-03-12 |

    | 7 | 140 | 2024-03-07 | NULL |

    | 8 | 160 | 2024-03-08 | 2024-03-11 |

    | 9 | 170 | 2024-03-09 | 2024-03-16 |

    | 10 | 190 | 2024-03-10 | 2024-03-20 |

    | 13 | 105 | 2024-03-13 | 2024-03-15 |

    | 15 | 115 | 2024-03-15 | NULL |

    | 16 | 125 | 2024-03-16 | 2024-03-18 |

    | 17 | 135 | 2024-03-17 | 2024-03-24 |

    | 18 | 145 | 2024-03-18 | 2024-03-20 |

    | 19 | 155 | 2024-03-19 | NULL |

    | 20 | 165 | 2024-03-20 | 2024-03-27 |


    In healthcare and hospital records, a diagnosis code is a standardized code used
    to represent a specific medical condition, diagnosis, or reason for a patient’s
    admission to the hospital. These codes are typically part of a coding system like
    the International Classification of Diseases. This system is widely used in healthcare
    for statistical, billing, and research purposes. For example, diagnosis codes
    in the range 100 to 199 might correspond to cardiac-related conditions like heart
    disease, arrhythmia, or hypertension.


    The following query calculates the average length of stay for cardiac-related
    issues grouped by `diagnosis_code` ranges (100–125, 126–150, 151–175, and 176–199).


    ```

    SELECT

    CASE

    WHEN diagnosis_code BETWEEN 100 AND 125 THEN ''100-125''

    WHEN diagnosis_code BETWEEN 126 AND 150 THEN ''126-150''

    WHEN diagnosis_code BETWEEN 151 AND 175 THEN ''151-175''

    WHEN diagnosis_code BETWEEN 176 AND 199 THEN ''176-199''

    ELSE ''Unknown''

    END AS diagnosis_code_range,

    COUNT(patient_id) AS patient_count,

    AVG(COALESCE(discharge_date, admission_date + INTERVAL ''2 days'') - admission_date)
    AS avg_length_of_stay

    FROM hospital_admissions

    WHERE diagnosis_code BETWEEN 100 AND 199

    AND admission_date >= ''2024-01-01''

    AND admission_date <= ''2024-12-31''

    GROUP BY diagnosis_code_range

    ORDER BY diagnosis_code_range;

    ```


    The query uses a `CASE` statement to group the `diagnosis_code` into defined ranges.
    The `COALESCE` function replaces `NULL discharge_date` values with `admission_date`
    plus two days to calculate the length of stay for all patients. The `AVG` function
    calculates the average length of stay for each `diagnosis_code` range. The `COUNT`
    function determines the number of patients in each range, providing better insights
    into patient distribution. The `WHERE` clause filters the data to include only
    cardiac-related admissions in 2024\. The query provides valuable insights into
    average lengths of stay across `diagnosis_code` ranges, assisting decision-makers
    in optimizing resources and understanding trends.


    Next, to create a scatterplot of patient ages against length of stay, Sofia wants
    to assign colors based on whether the stay was short (< 3 days), moderate (3-7
    days), or long (> 7 days).


    ```

    SELECT

    patient_id,

    age,

    (discharge_date - admission_date) AS length_of_stay,

    CASE

    WHEN (discharge_date - admission_date)  7 THEN ''Long Stay''

    ELSE ''Unknown''

    END AS stay_category

    FROM hospital_admissions;

    ```


    Conditional logic in `CASE` creates a `stay_category` column, which can be used
    to assign colors to plot points in visualization software (for instance, Short
    Stay = Blue, Moderate Stay = Green, Long Stay = Red).


    In this query, the `length_of_stay` calculation determines the difference between
    the `discharge_date` and `admission_date`. A `CASE` statement then categorizes
    the length of stay as a `Short Stay` for stays less than three days, a `Moderate
    Stay` for stays between three and seven days, and a `Long Stay` for stays exceeding
    seven days. As shown in Table [8-13](#619961_1_En_8_Chapter.xhtml#Tab13), for
    missing or invalid values, the `Unknown` category is assigned.


    Table 8-13


    Results of the Length of Stay Calculation


    | patient_id | Age | length_of_stay | stay_category |

    | --- | --- | --- | --- |

    | 1 | 12 | 2 | Short Stay |

    | 2 | 45 | 3 | Moderate Stay |

    | 3 | 67 | 7 | Moderate Stay |

    | 4 | 8 | 2 | Short Stay |

    | 5 | 32 | 3 | Moderate Stay |

    | 6 | 55 | 6 | Moderate Stay |

    | 7 | 70 | `NULL` | Unknown |

    | 8 | 25 | 3 | Moderate Stay |

    | 9 | 40 | 7 | Moderate Stay |

    | 10 | 60 | 10 | Long Stay |

    | 11 | 15 | 2 | Short Stay |

    | 12 | 50 | `NULL` | Unknown |

    | 13 | 28 | 2 | Short Stay |

    | 14 | 72 | 7 | Moderate Stay |

    | 15 | 10 | `NULL` | Unknown |

    | 16 | 35 | 2 | Short Stay |

    | 17 | 65 | 7 | Moderate Stay |

    | 18 | 22 | 2 | Short Stay |

    | 19 | 48 | `NULL` | Unknown |

    | 20 | 58 | 7 | Moderate Stay |


    Next, the hospital administrators want to know the average length of stay for
    each age group (Child, Adult, Senior) to plan resources more effectively.


    ```

    SELECT

    CASE

    WHEN age = 65 THEN ''Senior''

    ELSE ''Unknown''

    END AS age_group,

    COUNT(patient_id) AS total_patients,

    AVG(discharge_date - admission_date) AS avg_length_of_stay

    FROM hospital_admissions

    GROUP BY age_group

    ORDER BY age_group;

    ```'
