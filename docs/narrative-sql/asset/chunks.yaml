    ### NULL Behavior in SQL JOIN


    在 SQL 中，`NULL` 表示数据库字段中不存在已知值。它不同于空字符串、零或其他变量。`NULL` 值通常表示缺失的数据或不适用的数据。然而，`NULL`
    的行为可能因上下文而异：


    *   **Comparisons**: 将列与 `NULL` 进行比较通常会得到 `NULL` 本身，因为确切的关系（例如等于）是未知的。

    *   **Operations**: 涉及 `NULL` 的数学运算通常会返回 `NULL`，因为没有确定的值就无法执行计算。

