    | --- | --- | --- |

    | Child | 4 | 2 |

    | Adult | 12 | 4.5 |

    | Senior | 4 | 7 |


    The next challenge is that some patients’ discharge dates are missing, while others
    have extremely long lengths of stay (e.g., outliers caused by data entry errors).
    Sofia needs to clean this data for plotting. Missing values should be filled with
    a default value of `admission_date` plus two days, and any length of stay over
    365 days should be excluded.


    ```sql

    SELECT

    patient_id,

    age,

    admission_date,

    COALESCE(discharge_date, admission_date + INTERVAL ''2 days'') AS clean_discharge_date,

    GREATEST(0, EXTRACT(DAY FROM COALESCE(discharge_date, admission_date + INTERVAL
    ''2 days'') - admission_date)) AS clean_length_of_stay

    FROM hospital_admissions

    WHERE EXTRACT(DAY FROM COALESCE(discharge_date, admission_date + INTERVAL ''2
    days'') - admission_date) <= 365;

    ```


    This query uses `COALESCE` to handle missing values and ensures only clean, valid
    data is used in visualizations, as shown in Table [8-15](#619961_1_En_8_Chapter.xhtml#Tab15).
    Outliers are excluded by applying a filter on `length_of_stay`. The `COALESCE`
    function replaces `NULL` discharge dates with `admission_date` plus two days.
    The `GREATEST` function ensures that the length of stay is at least 0 days. Additionally,
    the `WHERE` clause excludes rows where the length of stay exceeds 365 days, filtering
    out outliers.


    Table 8-15


