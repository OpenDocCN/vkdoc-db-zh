    ## Essential Window Functions for Data Analysis


    Table 5-25 summarizes the most useful window functions in PostgreSQL, along with
    a brief description and an example of how they are used.


    Table 5-25


    The Summarization of the Most Useful Window Functions


    | Window Function | Description | Example |

    | --- | --- | --- |

    | `ROW_NUMBER()` | Assigns a unique sequential number to each row within a partition,
    starting from 1. | `SELECT ROW_NUMBER() OVER (PARTITION BY Region ORDER BY Sale_Date)
    AS Row_Num FROM Car_Sales;` |

    | `RANK()` | Ranks each row within a partition, skipping the next rank if there
    are ties. | `SELECT RANK() OVER (PARTITION BY Region ORDER BY Sales_Amount DESC)
    AS Sales_Rank FROM Car_Sales;` |

    | `DENSE_RANK()` | Similar to `RANK()`, but no gaps are left in the ranking numbers
    after ties. | `SELECT DENSE_RANK() OVER (PARTITION BY Region ORDER BY Sales_Amount
    DESC) AS Dense_Sales_Rank FROM Car_Sales;` |

    | `NTILE(N)` | Divides the result set into `N` roughly equal groups and assigns
    a group number to each row. | `SELECT NTILE(4) OVER (ORDER BY Sales_Amount DESC)
    AS Quartile FROM Car_Sales;` |

    | `SUM()` | Calculates the cumulative or running sum of a column over a specified
    window. | `SELECT SUM(Sales_Amount) OVER (PARTITION BY Model_Name ORDER BY Sale_Date)
    AS Running_Total FROM Car_Sales;` |

    | `AVG()` | Calculates the average of a column over a specified window. | `SELECT
    AVG(Sales_Amount) OVER (PARTITION BY Region ORDER BY Sale_Date) AS Avg_Sales FROM
    Car_Sales;` |

    | `MAX()` | Returns the maximum value within a partition or over the entire window.
    | `SELECT MAX(Sales_Amount) OVER (PARTITION BY Region) AS Max_Sale FROM Car_Sales;`
    |

    | `MIN()` | Returns the minimum value within a partition or over the entire window.
    | `SELECT MIN(Sales_Amount) OVER (PARTITION BY Region) AS Min_Sale FROM Car_Sales;`
    |

    | `COUNT()` | Returns the count of rows within a partition or over the entire
    window. | `SELECT COUNT(*) OVER (PARTITION BY Model_Name) AS Sale_Count FROM Car_Sales;`
    |

    | `FIRST_VALUE()` | Returns the first value within the window frame for each row.
    | `SELECT FIRST_VALUE(Sales_Amount) OVER (PARTITION BY Region ORDER BY Sale_Date)
    AS First_Sale FROM Car_Sales;` |

    | `LAST_VALUE()` | Returns the last value within the window frame for each row.
    | `SELECT LAST_VALUE(Sales_Amount) OVER (PARTITION BY Region ORDER BY Sale_Date)
    AS Last_Sale FROM Car_Sales;` |

    | `LAG()` | Returns the value from the previous row in the window frame. Useful
    for comparing a current row with a previous row. | `SELECT LAG(Sales_Amount, 1)
    OVER (PARTITION BY Model_Name ORDER BY Sale_Date) AS Previous_Sale FROM Car_Sales;`
    |

    | `LEAD()` | Returns the value from the next row in the window frame. Useful for
    comparing a current row with the next row. | `SELECT LEAD(Sales_Amount, 1) OVER
    (PARTITION BY Model_Name ORDER BY Sale_Date) AS Next_Sale FROM Car_Sales;` |


    ## Summary


    This chapter explores the process of aggregating data in SQL, which is crucial
    for summarizing and analyzing data. By understanding how to use aggregate functions
    with the `GROUP BY` clause, you can efficiently compute totals, averages, and
    other statistical values for specific data groups. The advanced topics discussed
    in this chapter include combining aggregation with window functions, using nested
    `GROUP BY` for deeper analysis, and simplifying complex queries with common table
    expressions.


    ## Key Points


    *   `Aggregate functions and the GROUP BY clause`: Use them to efficiently compute
    statistics for specific groups of data.

    *   `Combining aggregations and window functions`: Use `SUM()`, `COUNT()`, `ROW_NUMBER()`,
    or `RANK()` together to calculate both detailed row-level metrics and aggregated
    summaries.

    *   `Nested GROUP BY and window functions`: Use `GROUP BY` to aggregate data first
    and then apply window functions for deeper analysis, like top-N analysis within
    partitions.

    *   `CTEs (common table expressions)`: Simplify multi-step aggregation queries
    by breaking them into separate logical steps, making your queries easier to read
    and maintain.


    ## Key Takeaways


    *   `Aggregate functions`: The `COUNT`, `SUM`, `AVG`, `MIN`, and `MAX` functions
    are useful when working with grouped data.

    *   `GROUP BY clause`: Organize data effectively for aggregation and summarize
    results in a variety of ways.

    *   `Window functions`: Combine aggregate functions with window functions for
    advanced analysis over partitioned data.

    *   `Nested GROUP BY`: Explore nested `GROUP BY` clauses to conduct more in-depth
    and granular data analysis.

    *   `Common table expressions (CTEs)`: Make complex queries easier to read and
    maintain by reducing the number of CTEs in your SQL code.


    ## Looking Ahead


    The next chapter, “Ordering the Plot with `ORDER BY` and `LIMIT`,” explores how
    to sort and filter query results efficiently. You will be able to organize data
    in a meaningful way once you have mastered this operation. You can prioritize
    key information and limit results to focus on the most relevant data points.


    ## Test Your Skills


    A database has three tables—`gym_memberships` (`Member_ID`, `Name`, `Membership_Type`,
    `Join_Date`, and `City`), `classes` (`Class_ID`, `Class_Name`, `Category`, `Class_Date`,
    and `Trainer_Name`), and `attendance` (`Attendance_ID`, `Member_ID`, `Class_ID`,
    `Attendance_Date`, and `Class_Fee`).


    1.  Write an SQL query using window functions to calculate the total class fees
    and rank for each member based on their class attendance. Class name, member ID,
    total class fees, and rank must all be shown.

    2.  Write a query using `ROWS` to calculate a moving average of class fees over
    the last three classes attended by each member, including the current one. Provide
    the member ID, class name, attendance date, and an average of class fees.

    3.  Write a query using CTEs to find members who have spent more than $500 on
    classes. The member’s name, amount of class fees, and city must be shown.

    4.  Write a query using a nested `GROUP BY` to find the top two members who spent
    the most on classes within each membership type. Show the member ID, membership
    type, and total class fees.

    5.  Write a query to calculate the cumulative class fees for each member, ordered
    by class date, using a window function. Provide a table that shows the member
    ID, class name, class date, class fee, and cumulative fees.'
