    ### 2. 按各区域总销售额对车型进行排名


    他们如何按每个区域的总销售额对汽车车型进行排名？


    此查询可用于基于每个区域的总销售额对汽车车型进行排名：


    ```sql

    SELECT Model_Name, Region,

    RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC) AS Sales_Rank

    FROM Car_Sales

    GROUP BY Model_Name, Region;

    ```


    该查询使用带有 `RANK()` 和 `PARTITION BY` 的窗口函数，基于每个区域内的总销售额对汽车车型进行排名。该查询选择了两列：`Model_Name`
    和 `Region`。


    然后，`RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC) AS Sales_Rank`
    使用 `RANK()` 函数，根据总销售额为每个车型在其区域内分配一个排名。


    在此查询中，安娜使用 `RANK()` 按每个区域的总销售额对汽车车型进行排名。这里，总销售额相同的车型将获得相同的排名。`PARTITION BY Region`
    将数据按地区划分为分区，因此排名计算会分别应用于每个区域。


    通过使用 `ORDER BY SUM(Sales_Amount) DESC`，安娜根据总销售额 `SUM(Sales_Amount)` 对每个区域内的汽车车型进行排名，按降序排列。销售额最高的获得最高排名。需要注意的是，由于分区的原因，排名会为每个区域重置。


    `GROUP BY Model_Name, Region` 被使用是因为安娜正在应用 `SUM(Sales_Amount)`。因此，该查询按 `Model_Name`
    和 `Region` 对数据进行分组，以计算每个区域每个车型的总销售额。


    最后，每个汽车车型根据总销售额在其区域内进行排名，销售额最高的车型排名第一。表 5-14 显示了各区域内按总销售额排名的汽车车型排名。


    **表 5-14**

    **按区域对汽车车型进行销售排名**


    | Model_Name | Region | Sales_Rank |

    | --- | --- | --- |

    | Speedster | North | 1 |

    | Zoomer | North | 2 |

    | Cruiser | South | 1 |

    | Speedster | South | 2 |

    | Zoomer | East | 1 |

    | Speedster | West | 1 |


    ### 3. 不跳过排名的车型排名（密集排名）


    当销售额并列时，他们如何在不跳过排名的情况下对汽车车型进行排名？（当两个或多个车型在特定区域内的销售数量相同时，就发生了销售额并列。）


    为了在销售额并列时不跳过排名地对汽车车型按销售额进行排名，下一个查询会顺序排名而没有间隔。为了回答第三个问题，当销售额并列时，车型排名不应有间隔。为了避免两个车型销售额相同时出现间隔，此查询使用
    `DENSE_RANK()`：


    ```sql

    SELECT Model_Name, Region,

    DENSE_RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC) AS Dense_Rank

    FROM Car_Sales

    GROUP BY Model_Name, Region;

    ```


    该查询使用 `DENSE_RANK()` 窗口函数，基于每个区域内的总销售额对汽车车型进行排名。该查询选择两列：`Model_Name` 和 `Region`。


    `DENSE_RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC) AS Dense_Rank`，`DENSE_RANK()`
    是一个窗口函数，它根据销售金额在区域内为每个车型分配一个排名。`DENSE_RANK()` 在销售额并列时不会产生间隔地对车型进行排名。`PARTITION
    BY Region` 按 `Region` 对数据进行分区，意味着排名将为每个区域单独计算。`ORDER BY SUM(Sales_Amount) DESC`
    根据总销售额 (`SUM(Sales_Amount)`) 对汽车车型进行排名，销售额最高的车型排名最前。


    > **注意**

