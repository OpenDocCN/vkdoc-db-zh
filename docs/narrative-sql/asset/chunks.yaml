- fmt: '## Window Functions


    Unlike aggregate functions, window functions do not collapse rows but instead
    return a computed value for each row while maintaining access to the full dataset.
    The key advantage of window functions is that they allow row-wise comparisons
    and trend analysis, unlike aggregate functions. This allows analysts to maintain
    granular data while uncovering insights. Table [10-3](#619961_1_En_10_Chapter.xhtml#Tab3)
    summarizes most of the well-known window functions in PostgreSQL.


    Table 10-3: The Commonly Used Window Functions


    | Function | Description | Example |

    | --- | --- | --- |

    | `ROW_NUMBER()` | Assigns a unique sequential integer to each row within the
    partition. | `SELECT ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary
    DESC) FROM employees;` |

    | `CUME_DIST()` | Calculates the cumulative distribution of a value within the
    partition. | `SELECT CUME_DIST() OVER (PARTITION BY department ORDER BY salary
    DESC) FROM employees;` |

    | `NTILE(n)` | Divides the partition into n approximately equal groups and assigns
    a group number to each row. | `SELECT NTILE(4) OVER (PARTITION BY department ORDER
    BY salary DESC) FROM employees;` |

    | `LAG(expression [, offset [, default]])` | Accesses data from a previous row
    in the partition. | `SELECT LAG(salary, 1, 0) OVER (PARTITION BY department ORDER
    BY hire_date) FROM employees;` |

    | `LEAD(expression [, offset [, default]])` | Accesses data from a subsequent
    row in the partition. | `SELECT LEAD(salary, 1, 0) OVER (PARTITION BY department
    ORDER BY hire_date) FROM employees;` |

    | `FIRST_VALUE(expression)` | Returns the value of the expression from the first
    row in the partition. | `SELECT FIRST_VALUE(salary) OVER (PARTITION BY department
    ORDER BY hire_date) FROM employees;` |

    | `LAST_VALUE(expression)` | Returns the value of the expression from the last
    row in the partition. | `SELECT LAST_VALUE(salary) OVER (PARTITION BY department
    ORDER BY hire_date RANGE BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING)
    FROM employees;` |

    | `NTH_VALUE(expression, n)` | Returns the value of the expression from the nth
    row in the partition. | `SELECT NTH_VALUE(salary, 3) OVER (PARTITION BY department
    ORDER BY hire_date) FROM employees;` |

    | `COALESCE(value1, value2, ...)` | Returns the first non-`NULL` value in the
    list. | `SELECT COALESCE(NULL, ''default'', ''other'');` (returns ''default'')
    |

    | `NULLIF(value1, value2)` | Returns `NULL` if `value1` equals `value2`; otherwise
    returns `value1`. | `SELECT NULLIF(10, 10);` (returns NULL) `SELECT NULLIF(10,
    5);` (returns 10) |

    | `GREATEST(value1, value2, ...)` | Returns the largest value from the list. |
    `SELECT GREATEST(10, 5, 15);` (returns 15) |

    | `LEAST(value1, value2, ...)` | Returns the smallest value from the list. | `SELECT
    LEAST(10, 5, 15);` (returns 5) |

    | `ARRAY[value1, value2, ...]` | Constructs an array from the given values. |
    `SELECT ARRAY[1, 2, 3];` (returns {1, 2, 3}) |

    | `GENERATE_SERIES(start, stop [, step])` | Generates a series of values. | `SELECT
    GENERATE_SERIES(1, 5);` (returns 1, 2, 3, 4, 5) |

    | `GENERATE_SUBSCRIPTS(array, dimension)` | Generates the set of valid subscripts
    for the specified dimension of the given array. | `SELECT GENERATE_SUBSCRIPTS(ARRAY[''a'',''b'',''c''],
    1);` (returns 1, 2, 3) |


    As shown in Table [10-3](#619961_1_En_10_Chapter.xhtml#Tab3), a special type of
    window functions are value functions. Using value functions, you can manipulate
    individual data values, including type conversion, `NULL` handling, and data formatting.
    These functions operate on single values within a column or expression, enabling
    precise data manipulation.


    ## Ranking Functions


    Ranking functions are essential for assigning order to rows within a query’s result.
    They provide a way to rank data based on specified criteria, facilitating analysis
    and reporting. `RANK()` assigns a rank to each row, skipping ranks when equal
    ranks occur. `DENSE_RANK()` also assigns ranks, but doesn’t skip ranks for ties,
    ensuring sequential ranking. `ROW_NUMBER()` assigns a unique sequential integer
    to each row, regardless of equality. These functions use the `OVER()` clause to
    define the result set ordering and partitioning. They are invaluable for tasks
    like identifying top performers, analyzing sales data, and generating leaderboards,
    providing clear and structured insights from ordered data. Table [10-4](#619961_1_En_10_Chapter.xhtml#Tab4)
    summarizes most of the well-known ranking functions in PostgreSQL.


    Table 10-4: Commonly Used Ranking Functions


    | Function | Description | Example |

    | --- | --- | --- |

    | `RANK()` | Assigns a rank to each row within the partition, with gaps for tied
    values. | `SELECT RANK() OVER (PARTITION BY department ORDER BY salary DESC) FROM
    employees;` |

    | `DENSE_RANK()` | Assigns a rank to each row within the partition, without gaps
    for tied values. | `SELECT DENSE_RANK() OVER (PARTITION BY department ORDER BY
    salary DESC) FROM employees;` |

    | `ROW_NUMBER()` | Assigns a unique sequential integer to each row within the
    partition. | `SELECT ROW_NUMBER() OVER (PARTITION BY department ORDER BY salary
    DESC) FROM employees;` |

    | `NTILE(n)` | Divides the partition into n approximately equal groups and assigns
    a group number to each row. | `SELECT NTILE(4) OVER (PARTITION BY department ORDER
    BY salary DESC) FROM employees;` |

    | `PERCENT_RANK()` | Calculates the relative rank of each row within the partition
    (0 to 1). | `SELECT PERCENT_RANK() OVER (PARTITION BY department ORDER BY salary
    DESC) FROM employees;` |'
