    ## Cumulative Sales Calculation


    The following query calculates the cumulative sales over time for each car model:


    ```sql

    SELECT Sale_ID, Model_Name, Sale_Date,

    SUM(Sales_Amount) OVER (PARTITION BY Model_Name ORDER BY Sale_Date) AS Cumulative_Sales

    FROM Car_Sales;

    ```


    Anna uses the `SUM()` function with the `OVER()` clause to calculate a running
    total of sales for each car model, ordered by sale date. A cumulative sales calculation
    for each car model is performed from the `Car_Sales` table using this query. `SUM(Sales_Amount)
    OVER (PARTITION BY Model_Name ORDER BY Sale_Date)` computes a running total of
    sales for each `Model_Name`, ordered by `Sale_Date`. The method returns the `Sale_ID`,
    `Model_Name`, `Sale_Date`, and the cumulative sales amount up until that sale.
    Table [5-16](#619961_1_En_5_Chapter.xhtml#Tab16) shows the cumulative total of
    sales for each car model over time.


