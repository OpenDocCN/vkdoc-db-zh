    计算唯一值<br><br>`SELECT SUM(column1) FROM table_name;`<br>-- 求和<br><br>`SELECT AVG(column1)
    FROM table_name;`<br>-- 平均值<br><br>`SELECT MIN(column1) FROM table_name;`<br>--
    最小值<br><br>`SELECT MAX(column1) FROM table_name;`<br>-- 最大值<br><br>`SELECT STDDEV(column1)
    FROM table_name;`<br>-- 标准差<br><br>`SELECT VARIANCE(column1) FROM table_name;`<br>--
    方差 |


