- fmt: '## 使用 EXPLAIN 分析查询性能


    ```

    EXPLAIN SELECT p.name, s.strokes

    FROM scores s

    JOIN players p ON s.player_id = p.player_id

    JOIN tournaments t ON s.tournament_id = t.tournament_id

    WHERE t.name = ''Masters Tournament'' AND s.strokes < 70;

    ```


    该查询检索大师赛中杆数低于 70 的球员姓名和成绩。它连接了三个表：`Scores`、`Players` 和 `Tournaments`。`JOIN` 条件将
    `scores.player_id` 与 `players.player_id` 以及 `scores.tournament_id` 与 `tournaments.tournament_id`
    关联起来。`WHERE` 子句将结果过滤为仅包含杆数小于 70 且锦标赛名称为 `Masters Tournament` 的记录。


    由于使用了 `EXPLAIN` 命令，执行此查询将显示如下结果：


    ```

    QUERY PLAN


    Nested Loop  (cost=13.92..47.53 rows=4 width=122)

    ->  Hash Join  (cost=13.78..46.54 rows=4 width=8)

    Hash Cond: (s.tournament_id = t.tournament_id)

    ->  Seq Scan on scores s  (cost=0.00..31.25 rows=567 width=12)

    Filter: (strokes < 70)

    ->  Hash  (cost=13.75..13.75 rows=2 width=4)

    ->  Seq Scan on tournaments t  (cost=0.00..13.75 rows=2 width=4)

    Filter: ((name)::text = ''Masters Tournament''::text)

    ->  Index Scan using players_pkey on players p  (cost=0.15..0.25 rows=1 width=122)

    Index Cond: (player_id = s.player_id)

    (10 rows)

    ```


    这里，`EXPLAIN` 的输出展示了 PostgreSQL 如何执行查询。它从对 `scores` 表的顺序扫描开始，过滤杆数 `< 70` 的行，成本为
    31.25。然后，对 `tournaments` 表进行哈希扫描，过滤出 “`Masters Tournament`”，成本为 13.75。一次哈希连接将
    `scores` 和 `tournaments` 连接起来，成本为 46.54。最后，一个嵌套循环通过使用 `players_pkey` 的索引扫描将这个结果与
    `Players` 表连接，成本为 0.25。对 `players.player_id` 的索引提高了性能，但对 `scores` 和 `tournaments`
    的顺序扫描表明还有更多优化策略。


    ## 使用 EXPLAIN ANALYZE 分析聚合查询


    为了计算每位球员在美国公开赛中的平均杆数，Martina 编写了以下查询：


    ```

    EXPLAIN ANALYZE SELECT p.name, AVG(s.strokes) AS avg_strokes

    FROM scores s

    JOIN players p ON s.player_id = p.player_id

    JOIN tournaments t ON s.tournament_id = t.tournament_id

    WHERE t.name = ''US Open''

    GROUP BY p.name;

    ```


    该查询计算参加了美国公开赛的球员的平均杆数。它使用 `player_id` 和 `tournament_id` 连接 `scores`、`players`
    和 `tournaments` 表。`WHERE` 子句按美国公开赛筛选成绩，`GROUP BY` 子句按球员姓名对结果进行分组。`AVG()` 函数计算每位球员的平均杆数。此查询在数据分析和商业智能中很常见，用于评估球员在特定锦标赛中的表现。适当的索引提高了连接效率并减少了查询执行时间，尤其是在处理包含多个锦标赛和球员的大型数据集时。


    ```

    QUERY PLAN


    GroupAggregate  (cost=47.62..47.84 rows=11 width=150) (actual time=0.137..0.156
    rows=2 loops=1)

    Group Key: p.name

    ->  Sort  (cost=47.62..47.65 rows=11 width=122) (actual time=0.124..0.138 rows=4
    loops=1)

    Sort Key: p.name

    Sort Method: quicksort  Memory: 25kB

    ->  Nested Loop  (cost=13.92..47.43 rows=11 width=122) (actual time=0.057..0.095
    rows=4 loops=1)

    ->  Hash Join  (cost=13.78..45.30 rows=11 width=8) (actual time=0.041..0.061 rows=4
    loops=1)

    Hash Cond: (s.tournament_id = t.tournament_id)

    ->  Seq Scan on scores s  (cost=0.00..27.00 rows=1700 width=12) (actual time=0.004..0.013
    rows=10 loops=1)

    ->  Hash  (cost=13.75..13.75 rows=2 width=4) (actual time=0.013..0.015 rows=1
    loops=1)

    Buckets: 1024  Batches: 1  Memory Usage: 9kB

    ->  Seq Scan on tournaments t  (cost=0.00..13.75 rows=2 width=4) (actual time=0.004..0.007
    rows=1 loops=1)

    Filter: ((name)::text = ''US Open''::text)

    Rows Removed by Filter: 4

    ->  Index Scan using players_pkey on players p  (cost=0.15..0.19 rows=1 width=122)
    (actual time=0.004..0.004 rows=1 loops=4)

    Index Cond: (player_id = s.player_id)

    Planning Time: 0.179 ms

    Execution Time: 0.227 ms

    (18 rows)

    ```


    `EXPLAIN ANALYZE` 的输出显示了查询的执行计划及实际执行时间。该过程从对 `Scores` 表的顺序扫描开始，用时 0.013 毫秒检索出十行数据。对
    `Tournaments` 表的顺序扫描过滤出 “US Open”，用时 0.007 毫秒检索出一行。一次哈希连接在 0.061 毫秒内连接了 `scores`
    和 `tournaments`，随后对每个匹配的行使用 `players_pkey` 进行索引扫描，这非常高效（成本：0.19）。结果使用快速排序进行排序（内存：25kB），然后
    `GroupAggregate` 计算平均杆数。总执行时间为 0.227 毫秒，考虑到查询的简单性、处理的行数少以及 I/O 最小（尤其是与更复杂的查询或未优化的连接相比），这被认为是高效的。


    ## 查找总成绩最低的球员


    为了找到公开锦标赛中总成绩最低的前三名球员，以下查询计算参加了 “The Open Championship” 锦标赛的球员的总杆数。它使用 `player_id`
    和 `tournament_id` 连接 `Scores`、`Players` 和 `Tournaments` 表。`WHERE` 子句为 “The Open
    Championship” 筛选成绩，`GROUP BY` 子句按球员姓名对结果进行分组。`SUM()` 函数计算每位球员的总杆数。`ORDER BY total_strokes
    ASC` 将结果按升序排列，`LIMIT 3` 返回总杆数最少的三名球员。


    ```

    EXPLAIN SELECT p.name, SUM(s.strokes) AS total_strokes

    FROM scores s

    JOIN players p ON s.player_id = p.player_id

    JOIN tournaments t ON s.tournament_id = t.tournament_id

    WHERE t.name = ''The Open Championship''

    GROUP BY p.name

    ORDER BY total_strokes ASC

    LIMIT 3;

    ```


    `EXPLAIN` 输出揭示了查询的执行计划。该过程从对 `Scores` 表的顺序扫描开始，检索 1700 行，然后对 `Tournaments` 表进行顺序扫描，过滤出
    “The Open Championship”。一次哈希连接合并这些表。接着，使用 `players_pkey` 进行索引扫描以高效地检索球员姓名。结果被排序两次，首先按球员姓名使用
    `Sort`，然后按总杆数使用另一个 `Sort`（成本=47.96）。`Limit` 步骤返回前三名球员。如图所示，查询计划表明由于适当的索引和排序技术，性能高效：


    ```

    QUERY PLAN


    Limit  (cost=47.96..47.96 rows=3 width=126)

    ->  Sort  (cost=47.96..47.98 rows=11 width=126)

    Sort Key: (sum(s.strokes))

    ->  GroupAggregate  (cost=47.62..47.81 rows=11 width=126)

    Group Key: p.name

    ->  Sort  (cost=47.62..47.65 rows=11 width=122)

    Sort Key: p.name

    ->  Nested Loop  (cost=13.92..47.43 rows=11 width=122)

    ->  Hash Join  (cost=13.78..45.30 rows=11 width=8)

    Hash Cond: (s.tournament_id = t.tournament_id)

    ->  Seq Scan on scores s  (cost=0.00..27.00 rows=1700 width=12)

    ->  Hash  (cost=13.75..13.75 rows=2 width=4)

    ->  Seq Scan on tournaments t  (cost=0.00..13.75 rows=2 width=4)

    Filter: ((name)::text = ''The Open Championship''::text)

    ->  Index Scan using players_pkey on players p  (cost=0.15..0.19 rows=1 width=122)

    Index Cond: (player_id = s.player_id)

    (16 rows)

    ```


    ## 检索单个球员的所有成绩


    为了检索 Tiger Woods 的所有成绩以进行表现分析，以下查询检索 Tiger Woods 的锦标赛名称、轮次数和杆数。它使用 `player_id`
    和 `tournament_id` 连接 `Scores`、`Players` 和 `Tournaments` 表。`WHERE` 子句过滤 `Players`
    表，仅包含姓名与 “Tiger Woods” 匹配的行。查询输出来自 `Scores` 表的相关成绩和轮次数，以及来自 `Tournaments` 表的锦标赛名称。此查询对于分析球员在不同锦标赛中的表现非常有用，帮助教练、分析师和球迷评估稳定性并识别跨多轮比赛的表现趋势。'
