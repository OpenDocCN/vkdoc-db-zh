    视图通过存储预定义的查询、减少代码重复和提高可读性来简化数据访问。通过优化复杂的连接和聚合，视图使分析更快速、更高效。有了这些视图，Nathalie 可以快速访问重要的比赛表现洞察，而无需反复编写复杂的
    SQL 查询。


    ## 管理视图


    如前所述，PostgreSQL 中的 `CREATE VIEW` 语句用于基于 SQL 语句的结果集定义一个虚拟表。`CREATE VIEW` 的语法很简单，它允许创建一个命名查询，该查询可以像表一样使用，从而简化复杂查询并增强数据安全性。


    ### 更新和修改视图 (ALTER VIEW)


    虽然 PostgreSQL 没有直接的 `ALTER VIEW` 语句来修改视图的查询定义，但可以使用 `CREATE OR REPLACE VIEW` 来修改视图。此命令允许你重新定义视图的查询，而无需删除并重新创建它，从而保留任何依赖对象。其语法与
    `CREATE VIEW` 类似，但使用 `CREATE OR REPLACE VIEW` 可确保如果视图已存在，则其定义将被替换。保持一致性并避免中断至关重要。


    PostgreSQL 提供了 `ALTER VIEW` 语句来修改视图属性，例如重命名视图或更改其列名和默认值。基本语法包括以下内容。


    重命名视图：


    ```

    ALTER VIEW view_name RENAME TO new_view_name;

    ```


    更改视图中的列名：


    ```

    ALTER VIEW view_name RENAME COLUMN old_column_name TO new_column_name;

    ```


    设置或移除视图列的默认值：


    ```

    ALTER VIEW view_name ALTER COLUMN column_name SET DEFAULT default_value;

    ALTER VIEW view_name ALTER COLUMN column_name DROP DEFAULT;

    ```


    因此，这些命令可以在不需要完全重新定义的情况下维护视图的一致性。这使得更新更高效，并最大限度地减少了对依赖对象的干扰。


    ### 删除视图 (DROP VIEW)


    `DROP VIEW` 语句用于从数据库中移除一个视图。语法很简单：


    ```

    DROP VIEW view_name;

    ```


    此命令会永久删除视图定义。每当一个视图被删除，任何依赖于它的查询或应用程序都将失败。为了增强灵活性，PostgreSQL 提供了许多可以使用的附加选项。


    如果视图不存在，则避免报错：


    ```

    DROP VIEW IF EXISTS view_name;

    ```


    这可以防止在脚本和自动化过程中，当视图的存在性无法保证时发生错误。


    一次删除多个视图：


    ```

    DROP VIEW view_name1, view_name2, ...;

    ```


    使用 `RESTRICT` 防止意外删除：


    ```

    DROP VIEW view_name RESTRICT;

    ```


    这确保了只有在没有其他对象依赖于该视图时才会将其删除。除了管理数据库完整性外，这些选项还允许受控地清理未使用的视图，防止意外的中断。


    ### ALTER VIEW 和 DROP VIEW 在数据分析中的作用


    在数据分析中，视图在构建和简化复杂查询方面起着至关重要的作用，使数据检索更高效。能够使用 `CREATE OR REPLACE VIEW` 更新视图，确保分析师可以在不中断工作流的情况下修改数据表示方式。这在数据模型演变、需要调整现有视图而不影响依赖的报告或应用程序的情况下尤其有益。另一方面，`DROP
    VIEW` 对于通过删除过时或不必要的视图来维护干净、优化的数据库至关重要。然而，`IF EXISTS` 选项在动态和自动化环境中特别有用，在这些环境中，分析师在删除视图时必须谨慎，以防止破坏依赖的查询。


    ## 视图在优化 SQL 查询中的作用


    当视图被正确使用时，它们通过封装复杂逻辑来减少冗余，从而避免在多个脚本中重复冗长的 SQL 代码。这样，可维护性得到增强，不一致性得以减少。视图有效地平衡了存储、速度和查询复杂性。通过抽象复杂查询，视图提供了简化的接口，减少了在日常分析中对复杂
    SQL 的需求。特别是物化视图通过预编译和存储结果提供了速度优势，尽管这是以存储为代价的。而标准视图虽然不物理存储数据，但它们简化了查询复杂性，从而产生更易于管理、更清晰的脚本。通过视图的战略性实施，数据访问得到优化，确保查询既高效又可读，从而优化了整体性能和可维护性。'
- fmt: '## Using Both Views and Indexes in PostgreSQL


    Views and indexes are complementary but serve different purposes in SQL. `Views`
    are virtual tables that store a query’s result definition, making complex queries
    more readable and reusable. They simplify data access, maintain consistency, and
    improve security by restricting access to specific columns. `Indexes` speed up
    data retrieval by allowing the database to locate rows more efficiently instead
    of scanning entire tables. They are essential for performance optimization, especially
    when dealing with large datasets.


    Since `views` do not store data, they do not automatically benefit from `indexes`
    unless they are materialized or used with indexed queries. The purpose of this
    section is to explore how to use both effectively.


    ## The Third Story: Online Retail Data Analyst


    Kris is a data analyst at an online retail company. The company’s sales team frequently
    asks Kris for reports on product performance. However, querying the raw `sales`
    table every time is slow, especially as the database grows. To solve this, Kris
    decides to use `views` for structured queries and `indexes` for better performance.


    ### Note


    There is no doubt that, in real-world scenarios, datasets are significantly larger
    and more complex than the sample presented in Table 9-15. Due to space constraints
    in presenting stories in the books, the table is limited to ten rows. As long
    as the same methods are applied to large datasets, this limitation does not impact
    query effectiveness.


    ### Table 9-15: The Sales Table


    | sale_id | product_id | amount | sale_date |

    | --- | --- | --- | --- |

    | 1 | 101 | 120.5 | 2024-03-01 |

    | 2 | 102 | 85.75 | 2024-03-02 |

    | 3 | 101 | 99.99 | 2024-03-02 |

    | 4 | 103 | 150 | 2024-03-03 |

    | 5 | 101 | 110 | 2024-03-04 |

    | 6 | 104 | 200 | 2024-03-05 |

    | 7 | 102 | 80.5 | 2024-03-06 |

    | 8 | 103 | 175.25 | 2024-03-07 |

    | 9 | 101 | 125 | 2024-03-08 |

    | 10 | 105 | 300 | 2024-03-09 |


    Kris examines the `Sales` table, which tracks customer purchases including the
    `sale_id`, `product_id`, `amount` (sales value), and `sale_date`.


    Kris notices that most reports filter data by `sale_date`, meaning that the database
    has to scan the entire table to find relevant records. To improve this, Kris creates
    an index on the `sale_date` column:


    ```sql

    CREATE INDEX idx_sale_date ON sales(sale_date);

    ```


    Now, whenever a query filters by `sale_date`, PostgreSQL uses the index, significantly
    speeding up performance.


    As a next step, Kris uses a `view` to calculate total sales per product instead
    of manually aggregating sales data:


    ```sql

    CREATE VIEW sales_summary AS

    SELECT product_id, SUM(amount) AS total_sales

    FROM sales

    GROUP BY product_id;

    ```


    With this `view`, she can quickly retrieve total sales without rewriting complex
    queries.


    Now, in order to eliminate the need for each query to recalculate the data, Kris
    creates a materialized `view` that stores the computed results:


    ```sql

    CREATE MATERIALIZED VIEW sales_summary_mat AS

    SELECT product_id, SUM(amount) AS total_sales

    FROM sales

    GROUP BY product_id;

    ```


    To speed up lookups, Kris adds an `index` on `product_id`:


    ```sql

    CREATE INDEX idx_sales_summary ON sales_summary_mat(product_id);

    ```


    Instead of reprocessing the entire dataset whenever the sales team requests a
    report, Kris queries the materialized `view`:


    ```sql

    SELECT * FROM sales_summary_mat;

    ```


    ### Table 9-16: The Total Sales of Each Product


    | product_id | total_sales |

    | --- | --- |

    | 104 | 200 |

    | 105 | 300 |

    | 103 | 325.25 |

    | 101 | 455.49 |

    | 102 | 166.25 |


    Since new sales are recorded daily, Kris refreshes the materialized `view` periodically:


    ```sql

    REFRESH MATERIALIZED VIEW sales_summary_mat;

    ```


    As mentioned earlier, materialized `views` store query results physically instead
    of recalculating them every time. The `REFRESH MATERIALIZED VIEW sales_summary_mat;`
    command must be used to keep the data current, as a materialized `view` does not
    automatically update when the underlying table changes. Without running this command,
    the materialized `view` continues to display outdated data. This is even if updated
    sales records are added, updated, or deleted from the `Sales` table. This can
    lead to discrepancies in reports and inaccurate business decisions. By refreshing
    the materialized `view`, the latest sales data can be reflected in the summary,
    allowing the sales team to work with accurate and current information. While refreshing
    materialized `views` can be resource-intensive, it is essential for maintaining
    data integrity, especially in environments where reports and analytics rely on
    fresh data.


    The sales team now gets their reports instantly, and Kris no longer has to run
    slow, repetitive queries manually.


    The use of both `views` and `indexes` in SQL has several advantages. The optimization
    of performance is one of the key benefits of `views`, since they simplify queries
    by structuring complex data retrieval, while `indexes` enhance query execution
    by reducing the need for full table scans. In addition to improving security and
    access control, `views` can restrict access to specific columns or join multiple
    tables to present only relevant data, while `indexes` ensure that access to this
    data is as efficient as possible. Furthermore, materialized `views` with `indexing`
    offer significant performance improvements by storing query results physically,
    enabling `indexes` to be applied directly to the results. This can reduce computation
    time and increase query efficiency, particularly for data that is frequently accessed.


    ## Summary


    This chapter highlighted the power of SQL’s `index` and `view` in optimizing data
    analysis. In this chapter, you learned how to improve query performance and data
    management. SQL `index` enables faster data retrieval by reducing the need for
    full table scans. `Views` allow structured and simplified query execution by encapsulating
    complex logic. Also, using both of them can significantly improve efficiency,
    maintainability, and security in database operations.


    ## Key Points


    *   `Indexes` enhance query performance by reducing the need for full table scans,
    enabling faster data retrieval from large datasets.

    *   `Views` simplify complex queries by encapsulating logic into reusable structures,
    making data analysis more efficient and maintainable.

    *   Materialized `views` store query results physically, allowing `indexing` optimizations
    for faster reporting and analytical processing.

    *   The combination of `indexes` and `views` enhances efficiency, ensuring that
    frequently accessed data is both structured and retrievable rapidly.


    ## Key Takeaways


    *   **Optimized query performance**: `Indexes` reduce query execution time by
    minimizing full table scans, improving data retrieval efficiency.

    *   **Simplified data access**: `Views` transform complex queries into reusable
    structures, enhancing readability and maintainability.

    *   **Faster analytical processing**: Materialized `views` store precomputed results,
    allowing `indexed` optimization to be performed for faster insight.

    *   **Efficient data management**: Combining `views` with `indexes` ensures structured
    access to frequently queried data with minimal overhead.


    ## Looking Ahead


    The next chapter, “Analytics Alchemy: Turning Data into Gold”, explores powerful
    techniques that transform raw data into meaningful insights. It investigates advanced
    analytical functions that enable deeper data exploration and `window functions`
    for data comparison, which allow you to analyze trends and relationships across
    rows, as well as strategies for turning raw data into compelling stories through
    insightful structured reporting.'
