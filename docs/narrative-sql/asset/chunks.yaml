    \n```\n    CREATE TABLE numeric_examples (\n    id INT,\n    small_number SMALLINT,\n\
    \    big_number BIGINT,\n    exact_amount DECIMAL(10, 2),\n    approx_net_worth\
    \ FLOAT\n    );\n    ```\n\nThis query creates a table named `numeric_examples`\
    \ with five columns, each designated to hold numeric data of various types and\
    \ scales. The columns include an integer called `id`, a small integer called `small_number`,\
