    # 2. 从 SELECT 开始


    在本章中，你将学习从数据库检索数据的基础 `SQL` 命令。本章通过叙述和实际示例演示 `SELECT` 语句的多功能性，展示其在简单和复杂的数据检索场景中如何使用。


    ## SELECT 简介


    `SELECT` 语句是最基本和最常用的 `SQL` 命令之一，几乎是每个查询操作的核心。对于任何 `SQL` 用户来说，它是从数据库检索数据的必备工具。从本质上讲，`SELECT`
    语句允许你精确指定要从哪些表中检索哪些数据，并且可以通过各种子句进行微调，以满足精确的数据检索需求。`SELECT` 不仅仅是将数据从数据库中提取出来；它是选择能够回答特定问题或满足特定信息需求的正确数据片段。因此，`SELECT`
    语句可以将原始数据转化为有意义的信息。


    ### SELECT 在数据叙事中的重要性


    在数据叙事方面，`SELECT` 超越了数据检索，成为辅助叙事构建的工具。数据叙事是将数据编织成对受众有意义的叙事，帮助他们通过现实世界的故事理解复杂信息。


    例如，为了提取构成这些故事基础的数据点，可以使用 `SELECT` 来提取各种数据点。考虑一个包含多年销售数据的数据库，这些数据是在一段时间内收集的。叙事者可以使用
    `SELECT` 命令来检索主要活动或假期期间的总销售额并进行分析。仔细选择数据可以更多地揭示特定时期内的消费者行为。通过选择特定的数据，叙事者可以强调能够说明趋势、支持假设或解释现象的信息，这种方式在视觉和语境上都具有说服力。


    ### SELECT 语句的剖析


    `SELECT` 语句的结构和语法对于最大化 `SQL` 在数据检索和叙事中的能力至关重要。本小节分解了 `SELECT` 语句的基本组成部分，包括如何选择列和使用别名使查询更具可读性。


    #### 基本结构和语法


    `SELECT` 语句用于查询数据库并检索指定的数据。最基础地，`SELECT` 语句必须指定两个关键信息：要选择什么以及从哪里选择。语法易于理解：


    ```

    SELECT column1, column2, ...

    FROM tableName;

    ```


    在此结构中：


    *   `SELECT` 表示你即将指定要检索的列或表达式列表。

    *   `column1, column2, ...` 是你希望从数据库表中选择的具体列。你也可以使用 `*` 字符来选择表中的所有列。

    *   `FROM tableName` 指定从中检索数据的表。


    这个简单的语法是构建更复杂查询的起点，包括那些过滤、分组或排序数据的查询。


    ## 第一个故事：书店周年庆


    这个故事基于一个名为 `Customers` 的数据库。每个角色都有独特的背景和故事。John Doe、Jane Smith 和 Alice Johnson
