  trans: '### 窗口函数与传统聚合


    窗口函数和传统聚合在 SQL 中服务于不同的目的。如前所述，传统聚合（使用`GROUP BY`结合`SUM()`、`COUNT()`、`AVG()`等函数）将行合并为分组的摘要。例如，如果你想要按区域统计总销售额，`GROUP
    BY`子句会按区域对数据进行分组，并为每个组返回一行。因此，在聚合过程中无法保留行级数据。另一方面，窗口函数使用`OVER()`在窗口内聚合行，但不会折叠结果集。在计算累计总量、排名或移动平均值时，每一行数据都会被保留。例如，`SUM(Sales)
    OVER (PARTITION BY Region ORDER BY Date)`计算每个区域的累计销售额，但所有原始行仍保留在输出中。


    使用窗口函数与传统聚合的关键区别在于：聚合提供摘要数据，而窗口函数允许在行级基于聚合进行计算。在需要保留行级详细信息的情况下，窗口函数非常适合执行诸如排名、求和以及将单个数据点与组内平均值进行比较等任务。参见图
    5-1。


    ![流程图，展示了两个面板中的一个过程。左面板显示了三行水平排列的方框，每行一个青绿色方框后跟两个白色方框。箭头从每行指向一个新行，该新行有两个白色方框后跟一个紫色方框。右面板显示了三行类似的排列，每行一个青绿色方框后跟两个白色方框，箭头指向有两白色方框后跟一紫色方框的行。该图说明了从一个状态到另一个状态的转换或进展。](img/619961_1_En_5_Fig1_HTML.png)


    图 5-1：窗口函数与传统聚合的比较


    图 5-1 左侧展示了使用`GROUP BY`的聚合，它合并并隐藏了各个行。或者，右侧的窗口函数可以访问各个行并添加来自这些行的属性。总而言之，传统聚合可用于整体摘要，而窗口函数可用于更复杂的、行感知的分析。


    ### 组合多种聚合技术


    将窗口函数与标准聚合相结合，可以构建更强大、更灵活的 SQL 查询。通过将行级详细分析与摘要分析相结合，你可以获得比单独使用任何一种方法更多的洞察。为了执行复杂分析，你可以将窗口函数（如`ROW_NUMBER()`和`RANK()`）与标准聚合函数一起使用。


    #### 将窗口函数与标准聚合结合


    以下示例演示了如何结合窗口函数和标准聚合。


    表 5-19 所示的`Sales`表用于本节的所有查询。它包含单个销售的数据，包括`Customer_ID`、`Product_ID`、`Sale_Amount`、`Sale_Date`和`Region`。


    表 5-19：销售表


    | Sale_ID | Customer_ID | Product_ID | Sale_Amount | Sale_Date | Region |

    | --- | --- | --- | --- | --- | --- |

    | 1 | 101 | P001 | 500 | 2024-01-05 | North |

    | 2 | 102 | P002 | 300 | 2024-01-08 | South |

    | 3 | 101 | P003 | 200 | 2024-01-12 | North |

    | 4 | 103 | P001 | 900 | 2024-01-15 | East |

    | 5 | 104 | P002 | 600 | 2024-01-18 | West |

    | 6 | 102 | P003 | 150 | 2024-01-22 | South |

    | 7 | 101 | P002 | 700 | 2024-01-25 | North |

    | 8 | 105 | P003 | 250 | 2024-01-30 | West |

    | 9 | 103 | P001 | 400 | 2024-02-01 | East |

    | 10 | 104 | P003 | 1000 | 2024-02-05 | West |


    ##### 示例：基于购买总额的客户细分


    需要根据客户在特定时间范围内的总购买额进行排名，同时仍能看到单个销售记录。


    ```sql

    SELECT Customer_ID,

    COUNT(*) OVER (PARTITION BY Customer_ID) AS Total_Sales,

    SUM(Sale_Amount) OVER (PARTITION BY Customer_ID) AS Total_Purchases,

    ROW_NUMBER() OVER (PARTITION BY Customer_ID ORDER BY Sale_Date) AS Sale_Rank

    FROM Sales;

    ```


    `COUNT(*) OVER (PARTITION BY Customer_ID) AS Total_Sales`中，`COUNT(*)`是一个聚合函数，用于计数行数。`OVER
    (PARTITION BY Customer_ID)`窗口函数按`Customer_ID`对数据进行分区，意味着计数是为每个客户单独计算的。此列的每一行都显示了该客户的销售总次数。行没有被折叠，因此客户的每个销售行都显示相同的总销售次数。`SUM(Sale_Amount)
    OVER (PARTITION BY Customer_ID)`是一个窗口函数，它计算每个客户的总购买额而不折叠行。`ROW_NUMBER() OVER (PARTITION
    BY Customer_ID ORDER BY Sale_Date)`基于销售日期为每个客户的每次销售分配一个行号。通过这种方式，你可以看到每次销售、每个客户的总购买金额以及销售发生的顺序。


    表 5-20 显示了每个客户的销售次数和总购买额，同时按日期对单个销售进行排名。`Total_Sales`列显示每个客户进行了多少次销售。`Total_Purchases`显示客户花费的总金额。`Sale_Rank`为客户的每次销售分配一个数字，按销售日期排序。


    表 5-20：按客户排名销售并计算总额


    | Customer_ID | Total_Sales | Total_Purchases | Sale_Rank |

    | --- | --- | --- | --- |

    | 101 | 3 | 400 | 1 |

    | 101 | 3 | 1400 | 2 |

    | 101 | 3 | 1400 | 3 |

    | 102 | 2 | 450 | 1 |

    | 102 | 2 | 450 | 2 |

    | 103 | 2 | 1300 | 1 |

    | 103 | 2 | 1300 | 2 |

    | 104 | 2 | 1600 | 1 |

    | 104 | 2 | 1600 | 2 |

    | 105 | 1 | 250 | 1 |


    #### 嵌套 GROUP BY 与窗口函数


    为了进行更深入的分析，你可以将窗口函数与嵌套的`GROUP BY`结合使用。'
- fmt: '## 分区内的Top-N分析


    此处的目标是根据三个最盈利的客户，确定每个地区付费最高的三个客户。


    ```

    WITH CustomerTotals AS (

    SELECT Customer_ID, Region, SUM(Sale_Amount) AS Total_Purchase

    FROM Sales

    GROUP BY Customer_ID, Region

    )

    SELECT

    Customer_ID,

    Region,

    Total_Purchase,

    RANK() OVER (PARTITION BY Region ORDER BY Total_Purchase DESC) AS Region_Rank

    FROM CustomerTotals

    WHERE Customer_ID IN (

    SELECT Customer_ID

    FROM (

    SELECT

    Customer_ID,

    Region,

    Total_Purchase,

    RANK() OVER (PARTITION BY Region ORDER BY Total_Purchase DESC) AS Region_Rank

    FROM CustomerTotals ) AS RankedCustomers

    WHERE Region_Rank <= 3 );

    ```


    此 SQL 查询使用一个名为 `CustomerTotals` 的*公共表表达式*（CTE）来以结构化方式计算并组织客户购买数据。该 CTE 首先通过汇总
    `Sales` 表中的 `Sale_Amount` 并按客户和地区分组，为每个客户 `Customer_ID` 在每一个地区 `Region` 聚合总购买金额
    `Total_Purchase`。此步骤隔离了聚合逻辑，生成一个简洁的结果集，其中包含每个客户在每个地区的一行记录，汇总了他们的总消费。


    在主查询中，这些聚合数据使用 `RANK()` 窗口函数进行进一步处理。该函数按 `Region` 对数据进行分区，并按 `Total_Purchase`
    的降序对结果排序，为每个客户在其各自地区内分配一个排名。为了识别表现最佳的客户，查询应用了一个过滤器。只有区域排名小于或等于三的客户才会被选中，从而有效地将输出限制为每个地区消费最高的三个客户。此过滤是通过在排名结果中嵌套另一个查询并使用
    `WHERE Region_Rank <= 3` 子句来完成的。最终的 `SELECT` 返回 `Customer_ID`、`Region`、`Total_Purchase`
    及其在该地区的排名。


