    Note\n\nThe `ORDER BY` clause in SQL is used to sort the result set of a query\
    \ by one or more columns. This clause allows you to display the data alphabetically,\
    \ numerically, or by date. This clause is introduced in the next chapter with\
    \ more examples and stories. Briefly, it can be said that the basic syntax of\
    \ `ORDER BY` is as follows:\n\n```\nSELECT column_1, column_2\nFROM table_name\n\
    ORDER BY column1 [ASC];\n```\n\n`ORDER BY column1` specifies the column you want\
    \ to sort by, and `ASC` means ascending the data from smallest to largest. In\
    \ the absence of a specification, `ASC` order is the default. As well, `DESC`\
    \ means sorting the data in descending order, from largest to smallest."
