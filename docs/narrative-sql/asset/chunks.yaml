- fmt: '## Chapter 3: Filtering Facts with WHERE


    In this chapter, you discover another SQL command that is frequently used to refine
    data retrieval by using `WHERE` conditions, comparisons, and logical operators.
    This requires creating precise `WHERE` statements that filter data based on specific
    criteria. This will enable you to refine your datasets and extract even deeper
    insights, which in turn helps you tell richer stories with your data.


    ## Chapter 4: Complex Characters with JOINs


    The purpose of this chapter is to explore how to connect multiple tables using
    `JOIN`s, creating richer data narratives based on different sources of data. `JOIN`
    operations, which are fundamental to combining data from multiple tables, are
    discussed. As you become proficient in this operation, you will be able to create
    complex queries that provide deeper insights and more comprehensive analyses of
    your records.


    ## Chapter 5: Aggregating Acts


    The purpose of this chapter is to introduce aggregate functions such as `COUNT`,
    `SUM`, `AVG`, `MIN`, and `MAX`, which can be used to summarize and analyze grouped
    data. In SQL, an aggregate act is the application of aggregate functions to grouped
    data subsets. These actions enable SQL to extract useful summary and statistical
    information from data for analysis and decision-making.


    ## Chapter 6: Ordering the Plot with ORDER BY and LIMIT


    In this chapter, you learn how to sort query results and limit output in order
    to improve readability and performance. The focus is on sorting and filtering
    query results efficiently. Once you have mastered this operation, it will be possible
    to organize data meaningfully. To focus on the most relevant data points, you
    can prioritize key information and limit the results to the most relevant data
    points.


    ## Chapter 7: Dynamic Dialogues with Subqueries


    The purpose of this chapter is to present subqueries as powerful tools for nesting
    logic and constructing complex, layered data requests. This chapter explores the
    art of writing subqueries in order to add depth and dimension to data analysis.
    This chapter provides an overview of subqueries, their types, and narrative examples
    of their use in dynamic dialogues.


    ## Chapter 8: Conditional Logic in Data Plotting


    This chapter explains how SQL’s conditional logic can be used to transform data
    analysis and visualization workflows to enable logic-based data visualization
    and transformation. You learn about conditional logic in SQL, categorize data,
    apply dynamic filtering to improve plot relevance for enhanced visualizations,
    create color-coded data for visualizations, aggregate data using conditional expressions,
    and handle missing data in visualizations. The focus of this chapter is not on
    how to visualize or plot data, but on the crucial process of preparing data. In
    this chapter, SQL is used to manipulate, clean, and structure data before it is
    visualized.


    ## Chapter 9: Optimizing Your Script with Indexes and Views


    This chapter sheds light on how indexes can be used to improve query performance
    and how views can be used to simplify logic. Optimizing SQL queries can significantly
    improve performance when dealing with large data volumes. Indexes and views are
    both powerful tools for achieving this type of optimization. An index enables
    the database engine to locate rows more efficiently, thereby reducing the need
    to scan entire tables in order to retrieve data. Alternatively, views simplify
    complex queries by storing reusable SQL logic, improving readability and maintenance.


    ## Chapter 10: Analytics Alchemy: Turning Data into Gold


    Turning data into gold with SQL requires mastering advanced analytical functions
    that help you extract deeper insights from raw data and transform them into compelling
    narratives. The SQL language provides powerful functions that can be used to transform
    raw data into compelling narratives. The chapter also discusses how raw data can
    be transformed into a compelling story and how recursive queries can be used to
    structure query logic effectively.


    ## Chapter 11: The Grand Finale: Presenting Your Data Story


    In this chapter, your journey is nearing its end. Through chapter-by-chapter learning,
    you learned how to extract deep insights and information from raw data to address
    complex and advanced analytical questions using raw data. This chapter summarizes
    the previous chapters and provides insight into presenting a narrative for data
    analysis.


    ## Appendix A: SQL Syntax Reference Guide


    This appendix provides a quick-access syntax guide for common SQL statements and
    clauses.


    ## Appendix B: Glossary of Terms


    This appendix defines key terms used throughout the book for quick reference and
    deeper understanding.


    ## Appendix C: PostgreSQL Elements Reference


    This appendix highlights PostgreSQL-specific features by providing a comprehensive
    alphabetical list of SQL statements, clauses, operations, and functions available
    in PostgreSQL.


    Any source code or other supplementary material referenced by the author in this
    book is available to readers on the Github repository. For more detailed information,
    please visit https://www.apress.com/gp/services/source-code.


    # About the Author


    # About the Technical Reviewer


    # 1. The Storyteller’s Database


    This chapter provides the basis of your journey into the world of data and narratives.
    Beginning with the basics of data, databases, and data analysis, this chapter
    explores Database Management Systems (DBMS) and SQL’s pivotal role in navigating
    these repositories. Through an exploration of SQL commands and the use of data
    types, you can tell powerful stories. This chapter provides you with the essentials
    you need to get started on this journey. It covers the art and science of data
    storytelling.'
  raw: '## Chapter [3](#619961_1_En_3_Chapter.xhtml): Filtering Facts with WHERE


    In this chapter, you discover another SQL command that is frequently used to refine
    data retrieval by using `WHERE` conditions, comparisons, and logical operators.
    This requires creating precise `WHERE` statements that filter data based on specific
    criteria. This will enable you to refine your datasets and extract even deeper
    insights, which in turn helps you tell richer stories with your data.


    ## Chapter [4](#619961_1_En_4_Chapter.xhtml): Complex Characters with JOINs


    The purpose of this chapter is to explore how to connect multiple tables using
    `JOIN`s, creating richer data narratives based on different sources of data. `JOIN`
    operations, which are fundamental to combining data from multiple tables, are
    discussed. As you become proficient in this operation, you will be able to create
    complex queries that provide deeper insights and more comprehensive analyses of
    your records.


    ## Chapter [5](#619961_1_En_5_Chapter.xhtml): Aggregating Acts


    The purpose of this chapter is to introduce aggregate functions such as `COUNT`,
    `SUM`, `AVG`, `MIN`, and `MAX`, which can be used to summarize and analyze grouped
    data. In SQL, an aggregate act is the application of aggregate functions to grouped
    data subsets. These actions enable SQL to extract useful summary and statistical
    information from data for analysis and decision-making.


    ## Chapter [6](#619961_1_En_6_Chapter.xhtml): Ordering the Plot with ORDER BY
    and LIMIT


    In this chapter, you learn how to sort query results and limit output in order
    to improve readability and performance. The focus is on sorting and filtering
    query results efficiently. Once you have mastered this operation, it will be possible
    to organize data meaningfully. To focus on the most relevant data points, you
    can prioritize key information and limit the results to the most relevant data
    points.


    ## Chapter [7](#619961_1_En_7_Chapter.xhtml): Dynamic Dialogues with Subqueries


    The purpose of this chapter is to present subqueries as powerful tools for nesting
    logic and constructing complex, layered data requests. This chapter explores the
    art of writing subqueries in order to add depth and dimension to data analysis.
    This chapter provides an overview of subqueries, their types, and narrative examples
    of their use in dynamic dialogues.


    ## Chapter [8](#619961_1_En_8_Chapter.xhtml): Conditional Logic in Data Plotting


    This chapter explains how SQL’s conditional logic can be used to transform data
    analysis and visualization workflows to enable logic-based data visualization
    and transformation. You learn about conditional logic in SQL, categorize data,
    apply dynamic filtering to improve plot relevance for enhanced visualizations,
    create color-coded data for visualizations, aggregate data using conditional expressions,
    and handle missing data in visualizations. The focus of this chapter is not on
    how to visualize or plot data, but on the crucial process of preparing data. In
    this chapter, SQL is used to manipulate, clean, and structure data before it is
    visualized.


    ## Chapter [9](#619961_1_En_9_Chapter.xhtml): Optimizing Your Script with Indexes
    and Views


    This chapter sheds light on how indexes can be used to improve query performance
    and how views can be used to simplify logic. Optimizing SQL queries can significantly
    improve performance when dealing with large data volumes. Indexes and views are
    both powerful tools for achieving this type of optimization. An index enables
    the database engine to locate rows more efficiently, thereby reducing the need
    to scan entire tables in order to retrieve data. Alternatively, views simplify
    complex queries by storing reusable SQL logic, improving readability and maintenance.


    ## Chapter [10](#619961_1_En_10_Chapter.xhtml): Analytics Alchemy: Turning Data
    into Gold


    Turning data into gold with SQL requires mastering advanced analytical functions
    that help you extract deeper insights from raw data and transform them into compelling
    narratives. The SQL language provides powerful functions that can be used to transform
    raw data into compelling narratives. The chapter also discusses how raw data can
    be transformed into a compelling story and how recursive queries can be used to
    structure query logic effectively.


    ## Chapter [11](#619961_1_En_11_Chapter.xhtml): The Grand Finale: Presenting Your
    Data Story


    In this chapter, your journey is nearing its end. Through chapter-by-chapter learning,
    you learned how to extract deep insights and information from raw data to address
    complex and advanced analytical questions using raw data. This chapter summarizes
    the previous chapters and provides insight into presenting a narrative for data
    analysis.


    ## Appendix A: SQL Syntax Reference Guide


    This appendix provides a quick-access syntax guide for common SQL statements and
    clauses.


    ## Appendix B: Glossary of Terms


    This appendix defines key terms used throughout the book for quick reference and
    deeper understanding.


    ## Appendix C: PostgreSQL Elements Reference


    This appendix highlights PostgreSQL-specific features by providing a comprehensive
    alphabetical list of SQL statements, clauses, operations, and functions available
    in PostgreSQL.


    Any source code or other supplementary material referenced by the author in this
    book is available to readers on the Github repository. For more detailed information,
    please visit https://www.apress.com/gp/services/source-code.


    # About the Author


    # About the Technical Reviewer


    # 1. The Storyteller’s Database


    This chapter provides the basis of your journey into the world of data and narratives.
    Beginning with the basics of data, databases, and data analysis, this chapter
    explores Database Management Systems (DBMS) and SQL’s pivotal role in navigating
    these repositories. Through an exploration of SQL commands and the use of data
    types, you can tell powerful stories. This chapter provides you with the essentials
    you need to get started on this journey. It covers the art and science of data
    storytelling.'
  trans: '## 第 3 章：用 WHERE 筛选事实


    在本章中，你将发现另一个 SQL 命令，它常用于通过使用 `WHERE` 条件、比较和逻辑运算符来优化数据检索。这需要创建精确的 `WHERE` 语句，根据特定条件过滤数据。这将使你能够优化数据集并提取更深层次的洞见，进而帮助你用数据讲述更丰富的故事。


    ## 第 4 章：用 JOIN 塑造复杂角色


    本章旨在探讨如何使用 `JOIN` 连接多个表，基于不同的数据来源创建更丰富的数据叙事。讨论了 `JOIN` 操作，这是组合多个表数据的基础。当你精通此操作后，你将能创建复杂的查询，为你的记录提供更深入的洞见和更全面的分析。


    ## 第 5 章：聚合行为


    本章旨在介绍聚合函数，如 `COUNT`、`SUM`、`AVG`、`MIN` 和 `MAX`，这些函数可用于汇总和分析分组数据。在 SQL 中，聚合行为就是将聚合函数应用于分组的数据子集。这些操作使得
    SQL 能够从数据中提取有用的汇总和统计信息，用于分析和决策。


    ## 第 6 章：用 ORDER BY 和 LIMIT 安排情节


    在本章中，你将学习如何对查询结果进行排序和限制输出，以提高可读性和性能。重点在于高效地排序和过滤查询结果。一旦掌握此操作，你将能够有意义地组织数据。为了聚焦于最相关的数据点，你可以优先考虑关键信息，并将结果限制在最相关的数据点上。


    ## 第 7 章：用子查询实现动态对话


    本章旨在介绍子查询，它是嵌套逻辑和构建复杂、分层数据请求的强大工具。本章探讨编写子查询的艺术，以便为数据分析增加深度和维度。本章概述了子查询、其类型，以及在动态对话中使用的叙述性示例。


    ## 第 8 章：数据绘图中的条件逻辑


    本章解释了如何利用 SQL 的条件逻辑来转变数据分析和可视化工作流程，从而实现基于逻辑的数据可视化和转换。你将学习 SQL 中的条件逻辑，对数据进行分类，应用动态过滤以提高图表相关性来增强可视化效果，为可视化创建颜色编码数据，使用条件表达式聚合数据，以及处理可视化中的缺失数据。本章的重点不在于如何可视化或绘制数据，而在于准备数据的关键过程。在本章中，SQL
    用于在数据可视化之前对数据进行操作、清理和结构化。


    ## 第 9 章：用索引和视图优化你的脚本


    本章阐明了如何使用索引来提高查询性能，以及如何使用视图来简化逻辑。处理大量数据时，优化 SQL 查询可以显著提升性能。索引和视图都是实现此类优化的强大工具。索引使数据库引擎能更高效地定位行，从而减少为检索数据而进行的全表扫描。另一方面，视图通过存储可重用的
    SQL 逻辑来简化复杂查询，从而提高可读性和可维护性。


    ## 第 10 章：分析炼金术：点数据成金


    用 SQL 将数据点石成金，需要掌握高级分析函数，帮助你从原始数据中提取更深层次的洞见，并将其转化为引人入胜的叙事。SQL 语言提供了强大的函数，可将原始数据转化为引人入胜的叙事。本章还讨论了如何将原始数据转化为一个引人入胜的故事，以及如何使用递归查询来有效地构建查询逻辑。


    ## 第 11 章：盛大终章：呈现你的数据故事


    在本章中，你的旅程即将结束。通过逐章学习，你学会了如何从原始数据中提取深刻的洞见和信息，以使用原始数据解决复杂和高级的分析问题。本章总结了前面的章节，并就如何呈现数据分析的叙事提供了见解。


    ## 附录 A：SQL 语法参考指南


    本附录为常见的 SQL 语句和子句提供了快速访问的语法指南。


    ## 附录 B：术语表


    本附录定义了全书使用的关键术语，以供快速参考和深入理解。


    ## 附录 C：PostgreSQL 元素参考


    本附录通过提供 PostgreSQL 中可用的 SQL 语句、子句、操作和函数的全面字母顺序列表，重点介绍了 PostgreSQL 特有的功能。


    作者在本书中引用的任何源代码或其他补充材料，读者都可以在 Github 仓库中获取。如需更详细信息，请访问 https://www.apress.com/gp/services/source-code。


    # 关于作者


    # 关于技术审校


    # 1. 讲述者的数据库


    本章为你开启数据和叙事世界的旅程奠定基础。从数据、数据库和数据分析的基础知识开始，本章探讨数据库管理系统以及 SQL 在导航这些知识库中的关键作用。通过探索
    SQL 命令和使用数据类型，你可以讲述强大的故事。本章为你提供了开始这段旅程所需的基本知识。它涵盖了数据叙事的艺术与科学。'
- fmt: '## Introduction to Data


    In today’s society, data is the foundation upon which everything is built, and
    it impacts every aspect of our lives. There are countless sources of data available
    to us, from weather patterns tracked by satellites to the number of steps you
    take each day. The term *data* refers to the qualitative or quantitative attributes
    of a variable. A great deal of data is collected, observed, or created for the
    purpose of analyzing it and making decisions based on it. It is possible to store
    structured or unstructured data, ranging from numbers, text, and multimedia to
    complex datasets used in computing and research.


    In a nutshell, data is the raw material of information, the basis for understanding
    the world and making informed decisions. Data on its own is like a pile of unrefined
    oil. In spite of the fact that data has value, it’s useless until it’s processed
    and analyzed. There is a great deal of value in data because it is capable of
    revealing hidden patterns, trends, and insights. The ability to analyze data allows
    people to make better decisions, solve complex problems, and drive innovation
    in business. It is widely accepted that data has become a part of every aspect
    of our lives in the digital age, and that it is the basis of all decision-making
    across sectors such as the healthcare, finance, and technology industries. Table
    `1-1` provides five fundamental questions and answers when exploring data.


    **Table 1-1**

    **Five Fundamental Questions and Answers for Exploring Data**


    | # | Question | Answer |

    | --- | --- | --- |

    | 1 | Why is data so valuable? | The use of data leads to decisions, innovation,
    and progress. Data contains the fundamental insights and evidence required to
    make informed decisions, resolve complex problems, and predict future trends in
    an era in which information is power. |

    | 2 | Who relies on data? | All of us. Data is used in a wide range of things,
    from businesses using customer data to modify their products, to governments using
    data to plan policies, to scientists using research data to make discoveries.
    Many sectors and societies rely on data. |

    | 3 | Where does data come from? | The world over. This includes countless devices
    and sensors in the vast expanse of the Internet and the billions of devices and
    sensors making up the Internet of Things (IoT). From the depths of the oceans
    using climate monitoring equipment, to the far reaches of space with satellites
    collecting data about our universe. Each source of data provides unique insights
    that contribute to our collective understanding. |

    | 4 | When is data used? | Every day, continuously. Data is used constantly throughout
    our lives and is not limited to specific moments. Data is used to guide emergency
    responses and to facilitate financial transactions, and it is used to influence
    long-term policy decisions and scientific research. Data has relevance that extends
    across timescales, from the immediate to the generational. |

    | 5 | What does data do? | In data, transformation occurs. Data has the power
    to change the world in many ways. These include informing policy, driving economic
    growth, advancing science and healthcare, improving education, and enriching cultural
    understanding. By analyzing data, we can uncover patterns, predict outcomes, personalize
    experiences, and foster innovation. |


    ## Data Analysis


    Similar to oil in the 20th century—which powered economies, revolutionized transportation,
    and played a fundamental role in industrial advancement—data is the fundamental
    resource driving societal progress, economic growth, and innovation in the 21st
    century. In the same way that oil must be extracted, refined, and distributed
    to use its energy, data must be collected, organized, and analyzed to unlock its
    full potential. Thus, the importance of controlling the extraction, refinement,
    and analysis of data in this era cannot be understated. The purpose of data analysis
    is to find useful information, provide insight into conclusions, and support decision-making
    through inspection, cleansing, transforming, and modeling the data.


    ### Databases


    Databases are structured collections of data that are stored electronically and
    accessed by a computer system. This system facilitates the efficient organization,
    management, and retrieval of data. A database is designed to handle large amounts
    of data, allowing users to add, modify, and query data quickly and securely. Databases
    support a variety of data types, including text, numbers, multimedia files, and
    more, organized in a manner that facilitates the analysis of business operations,
    the management of transactions, and decision making. Thousands of applications
    rely on databases, from the websites people visit daily to the financial systems
    that operate on a global scale.


    There is more to databases than just storing data; they are intricately designed
    to organize information in a way that makes it easily accessible and useful. Organization
    is of considerable importance, as the value of data lies not only in its existence,
    but in the ability to retrieve and interpret it. In every sector of society—be
    it healthcare, education, business, or technology—databases help manage patient
    records, student information, financial transactions, and more.


    In general, there are several types of databases, including structured, semi-structured,
    and unstructured. As a result of the need to optimize storage, retrieval, and
    analysis of data based on its nature, there is a relationship between data types
    and database types. Structured, semi-structured, and unstructured data all require
    different database features. For analysis, it is crucial to be aware of the distinctions
    between each, since each requires different tools and approaches in order to extract
    its insights.


    In structured data, each piece of information is organized and formatted in a
    way that is easily searchable in databases and spreadsheets, and it is stored
    in predefined models or schemas. In this way, computers can perform efficient
    processing and analysis. Structured data can be easily accessed and analyzed through
    relational databases.


    In the real world, data is not always stored in a structured form and may be unstructured
    or semi-structured. Unstructured data consists of everything from emails to videos
    to social media posts, often stored in non-relational (`NoSQL`) databases that
    handle diverse and dynamic datasets. Semi-structured data straddles the line,
    combining elements of both. Examples of semi-structured data are `JSON` and `XML`
    documents, which, although not fitting into traditional table schemas, have inherent
    structure that can be queried and analyzed.'
