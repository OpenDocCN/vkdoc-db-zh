    # SQL 数据查询与动态分类分析


    在本次查询中，`CASE` 语句根据患者的年龄将其分类到不同的年龄组。`BETWEEN` 操作符用于定义 `Adult` 类别。需要注意的是，`BETWEEN`
    是*包含性*的，这意味着边界值 18 和 64 也被包含在内。因此，年龄恰好为 18 岁或 64 岁的患者将归入 `Adult` 类别。这确保了所有年龄范围的分类清晰且不重叠。


    如表 8-11 所示，结果通过 `ORDER BY` 子句按 `age_group` 列排序，以提高可读性。


    **表 8-11：按 age_group 的数据分类**


    | patient_id | Age | age_group |

    | --- | --- | --- |

    | 1 | 12 | Child |

    | 4 | 8 | Child |

    | 11 | 15 | Child |

    | 15 | 10 | Child |

    | 2 | 45 | Adult |

    | 5 | 32 | Adult |

    | 6 | 55 | Adult |

    | 8 | 25 | Adult |

    | 9 | 40 | Adult |

    | 10 | 60 | Adult |

    | 13 | 28 | Adult |

    | 16 | 35 | Adult |

    | 18 | 22 | Adult |

    | 19 | 48 | Adult |

    | 20 | 58 | Adult |

    | 3 | 67 | Senior |

    | 7 | 70 | Senior |

    | 14 | 72 | Senior |

    | 17 | 65 | Senior |


    ## 动态筛选心脏相关病例


    在下一个挑战中，决策者希望根据诊断代码动态查看入院患者。Sofia 需要筛选数据，仅显示 `diagnosis_codes` 在 100 到 199 之间的心脏相关患者。


    ```sql

    SELECT

    patient_id,

    diagnosis_code,

    admission_date,

    discharge_date

    FROM hospital_admissions

    WHERE diagnosis_code BETWEEN 100 AND 199

    AND admission_date >= ''2024-01-01''

    AND admission_date <= ''2024-12-31'';

    ```


    在此查询中，`WHERE` 子句允许进行动态筛选。此处，数据被缩小到仅显示 2024 年内的心脏相关入院记录，减少了杂乱信息，并将重点放在请求的子集数据上。`WHERE`
    子句通过仅选择 `diagnosis_code` 在 100 到 199 之间（代表心脏相关问题）且 `admission_date` 在 2024 年内的行来进行过滤。如表
    8-12 所示，动态筛选确保只有相关数据被纳入分析。


    **表 8-12：动态筛选（心脏相关问题）**


    | patient_id | diagnosis_code | admission_date | discharge_date |

    | --- | --- | --- | --- |

    | 1 | 150 | 2024-03-01 | 2024-03-03 |

    | 2 | 120 | 2024-03-02 | 2024-03-05 |

    | 3 | 180 | 2024-03-03 | 2024-03-10 |

    | 5 | 110 | 2024-03-05 | 2024-03-08 |

    | 6 | 130 | 2024-03-06 | 2024-03-12 |

    | 7 | 140 | 2024-03-07 | NULL |

    | 8 | 160 | 2024-03-08 | 2024-03-11 |

    | 9 | 170 | 2024-03-09 | 2024-03-16 |

    | 10 | 190 | 2024-03-10 | 2024-03-20 |

    | 13 | 105 | 2024-03-13 | 2024-03-15 |

    | 15 | 115 | 2024-03-15 | NULL |

    | 16 | 125 | 2024-03-16 | 2024-03-18 |

    | 17 | 135 | 2024-03-17 | 2024-03-24 |

    | 18 | 145 | 2024-03-18 | 2024-03-20 |

    | 19 | 155 | 2024-03-19 | NULL |

    | 20 | 165 | 2024-03-20 | 2024-03-27 |


    在医疗保健和医院记录中，诊断代码是用于表示特定医疗状况、诊断或患者入院原因的标准化代码。这些代码通常是《国际疾病分类》等编码系统的一部分。该系统广泛应用于医疗保健的统计、计费和研究目的。例如，100
    到 199 范围内的诊断代码可能对应于心脏病、心律失常或高血压等心脏相关疾病。


    ## 按诊断代码范围分析平均住院时长


    以下查询计算了心脏相关问题的平均住院时长，并按 `diagnosis_code` 范围（100–125、126–150、151–175 和 176–199）进行分组。


    ```sql

    SELECT

    CASE

    WHEN diagnosis_code BETWEEN 100 AND 125 THEN ''100-125''

    WHEN diagnosis_code BETWEEN 126 AND 150 THEN ''126-150''

    WHEN diagnosis_code BETWEEN 151 AND 175 THEN ''151-175''

    WHEN diagnosis_code BETWEEN 176 AND 199 THEN ''176-199''

    ELSE ''Unknown''

    END AS diagnosis_code_range,

    COUNT(patient_id) AS patient_count,

    AVG(COALESCE(discharge_date, admission_date + INTERVAL ''2 days'') - admission_date)
    AS avg_length_of_stay

    FROM hospital_admissions

    WHERE diagnosis_code BETWEEN 100 AND 199

    AND admission_date >= ''2024-01-01''

    AND admission_date <= ''2024-12-31''

    GROUP BY diagnosis_code_range

    ORDER BY diagnosis_code_range;

    ```


    该查询使用 `CASE` 语句将 `diagnosis_code` 分组到定义的范围中。`COALESCE` 函数将 `NULL discharge_date`
    值替换为 `admission_date` 加上两天，以便为所有患者计算住院时长。`AVG` 函数计算每个 `diagnosis_code` 范围的平均住院时长。`COUNT`
    函数确定每个范围内的患者数量，从而更好地了解患者分布情况。`WHERE` 子句将数据筛选为仅包含 2024 年的心脏相关入院记录。该查询提供了有关各 `diagnosis_code`
    范围平均住院时长的宝贵见解，帮助决策者优化资源并理解趋势。


    ## 住院时长分类与可视化


    接下来，为了创建患者年龄与住院时长的散点图，Sofia 希望根据住院时长是短（< 3 天）、中（3-7 天）还是长（> 7 天）来分配颜色。


    ```sql

    SELECT

    patient_id,

    age,

    (discharge_date - admission_date) AS length_of_stay,

    CASE

    WHEN (discharge_date - admission_date) < 3 THEN ''Short Stay''

    WHEN (discharge_date - admission_date) BETWEEN 3 AND 7 THEN ''Moderate Stay''

    WHEN (discharge_date - admission_date) > 7 THEN ''Long Stay''

    ELSE ''Unknown''

    END AS stay_category

    FROM hospital_admissions;

    ```


    `CASE` 中的条件逻辑创建了一个 `stay_category` 列，该列可用于在可视化软件中为绘图点分配颜色（例如，短住院 = 蓝色，中住院 = 绿色，长住院
    = 红色）。


    在此查询中，`length_of_stay` 计算确定了 `discharge_date` 和 `admission_date` 之间的差值。然后，`CASE`
    语句将住院时长短于三天的分类为 `Short Stay`，介于三天到七天之间的分类为 `Moderate Stay`，超过七天的分类为 `Long Stay`。如表
    8-13 所示，对于缺失或无效的值，则分配 `Unknown` 类别。


    **表 8-13：住院时长计算结果**


    | patient_id | Age | length_of_stay | stay_category |

    | --- | --- | --- | --- |

    | 1 | 12 | 2 | Short Stay |

    | 2 | 45 | 3 | Moderate Stay |

    | 3 | 67 | 7 | Moderate Stay |

    | 4 | 8 | 2 | Short Stay |

    | 5 | 32 | 3 | Moderate Stay |

    | 6 | 55 | 6 | Moderate Stay |

    | 7 | 70 | `NULL` | Unknown |

    | 8 | 25 | 3 | Moderate Stay |

    | 9 | 40 | 7 | Moderate Stay |

    | 10 | 60 | 10 | Long Stay |

    | 11 | 15 | 2 | Short Stay |

    | 12 | 50 | `NULL` | Unknown |

    | 13 | 28 | 2 | Short Stay |

    | 14 | 72 | 7 | Moderate Stay |

    | 15 | 10 | `NULL` | Unknown |

    | 16 | 35 | 2 | Short Stay |

    | 17 | 65 | 7 | Moderate Stay |

    | 18 | 22 | 2 | Short Stay |

    | 19 | 48 | `NULL` | Unknown |

    | 20 | 58 | 7 | Moderate Stay |


    ## 按年龄组分析平均住院时长


    接下来，医院管理者希望了解各年龄组（儿童、成人、老年）的平均住院时长，以便更有效地规划资源。


    ```sql

    SELECT

    CASE

    WHEN age < 18 THEN ''Child''

    WHEN age BETWEEN 18 AND 64 THEN ''Adult''

    WHEN age >= 65 THEN ''Senior''

    ELSE ''Unknown''

    END AS age_group,

    COUNT(patient_id) AS total_patients,

    AVG(discharge_date - admission_date) AS avg_length_of_stay

    FROM hospital_admissions

    GROUP BY age_group

    ORDER BY age_group;

    ```

