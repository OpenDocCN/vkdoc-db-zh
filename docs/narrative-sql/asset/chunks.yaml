    This means the view will display each team’s total wins across all races. By using
    `COUNT(*)`, it counts the number of races where a team’s driver finished first,
    providing a clear overview of team performance and success in racing competitions.


    Here, a view named `team_wins` simplifies data analysis by creating a predefined,
    easy-to-access summary of racing performance. Views allow quick retrieval of complex
    information—in this case, team victories—without repeatedly writing complicated
    SQL joins. Views also provide a convenient, performance-efficient way to track
    and analyze team success across multiple races. Table [9-12](#619961_1_En_9_Chapter.xhtml#Tab12)
    illustrates the `SELECT` output of the previous query, which is the number of
    race victories for each racing team.


    Table 9-12


    The Number of Race Victories for Each Racing Team


    | Team | Wins |

    | --- | --- |

    | Alpine | 1 |

    | Aston Martin | 1 |

    | Mercedes | 2 |

    | Red Bull | 1 |


    The following query aims to find race winners in each race along with the race
    location and date. This question highlights race winners while connecting them
    to the location and date for easy event tracking.


    ```

    CREATE VIEW race_winners AS

    SELECT d.name, r.location, r.date

    FROM results res

    JOIN drivers d ON res.driver_id = d.driver_id

    JOIN races r ON res.race_id = r.race_id

    WHERE res.position = 1;

    ```'
