  trans: '### `JOIN` 子句的剖析


    `JOIN` 子句可以被描述为连接两个或多个表的桥梁。如前所述，关系型数据库将包含多个表，而基于特定条件合并这些表数据的可能性，使得你能够检索和分析存储在不同表中的信息。这很重要，因为现实世界的数据库通常将数据存储在不同的表中，以提高组织性和效率。一个
    `JOIN` 子句从根本上包含以下部分：


    1.  **连接类型**：这指定了所执行的连接类型。常见的类型有 `INNER JOIN`、`LEFT OUTER JOIN`、`RIGHT OUTER JOIN`、`FULL
    OUTER JOIN` 和 `CROSS JOIN`。每种类型决定了结果集中如何处理匹配和不匹配的行。


    2.  **FROM 子句**：此子句指定了要连接的表。`FROM` 子句中表的顺序有时会影响查询性能，尤其是在使用某些 `JOIN` 类型时。


    > **注意**

    > 大多数现代数据库系统使用查询优化器来分析 `JOIN` 子句，并选择最有效的方式执行 `JOIN` 操作。当今的数据库优化器很智能。它们在选择 `JOIN`
    策略时会考虑多种因素，例如表大小、索引和 `JOIN` 条件。在许多情况下，无论你在 `FROM` 子句中指定的顺序如何，优化器都能高效地执行 `JOIN`。如果你怀疑某个
    `JOIN` 子句导致了性能问题，建议使用数据库系统提供的工具来检查实际的执行计划。这将揭示优化器选择的 `JOIN` 策略，并突出显示任何瓶颈。


    3.  **ON 子句**：此子句指定了确定每个表中哪些行匹配的条件。`ON` 语句通常使用比较运算符（如 `=`、`<` 或 `>`）来比较两个表的列。


    最常见的 `JOIN` 类型——`INNER JOIN` 的基本语法如下所示：


    ```sql

    SELECT Customers.Name, Orders.OrderID, Orders.OrderDate

    FROM Customers

    INNER JOIN Orders ON Customers.CustomerID = Orders.CustomerID;

    ```


    这个查询是一个 `INNER JOIN`，它连接了 `Customers` 和 `Orders` 表。`ON` 子句指定了只有当 `CustomerID`
    值相等时，`Customers` 表的行才与 `Orders` 表的行匹配。此查询返回一个包含来自两个表的列的结果集，但仅包括相同客户下了订单的行（即匹配的
    `CustomerID` 值）。


    需要注意的是，在 SQL 中，点号 (`.`) 用于引用特定表中的特定列。当不同表中有同名列时，使用点号来确定列属于哪个表，以避免列名混淆。


    ### `JOIN` 的类型


    尽管每个查询的具体需求不同，SQL `JOIN` 仍有不同的类型。每种 SQL `JOIN` 类型提供了组合来自多个表数据的不同方法。接下来将解释每种 `JOIN`
    类型的目的。


    `INNER JOIN`：当表之间存在明确关系时，这是一种用于检索数据的工具。它确保你只获得在两个表中都有匹配的行，这对于诸如查找已下订单的客户等任务非常理想。


    *   **目的**：仅检索在两个表中都有匹配值的行。

    *   **用例**：当你只想获取在两个表中都有相关数据的记录时。


    `LEFT/RIGHT OUTER JOIN`：这些 `JOIN` 对于包含特定表（在 `FROM` 子句中首先列出的那个表）的所有行非常重要，即使在另一表中没有匹配项。它们通常用于在从另一个表检索相关信息的同时，保留一个表的数据。


    `LEFT OUTER JOIN`：


    *   **目的**：检索左表的所有行以及右表的匹配行。如果没有匹配，结果中右侧为 `NULL`。

    *   **用例**：当你想要获取左表的所有记录，以及右表的相关数据（如果有的话）时。


    `RIGHT OUTER JOIN`：


    *   **目的**：检索右表的所有行以及左表的匹配行。如果没有匹配，结果中左侧为 `NULL`。

    *   **用例**：当你想要获取右表的所有记录，以及左表的相关数据（如果有的话）时。


    `FULL OUTER JOIN`：这种 `JOIN` 结合了左外连接和右外连接的功能。它返回两个表中的所有行，并填充不匹配的列。当你需要不受关系限制地获取来自两个表的完整数据视图时，这非常有用。


    *   **目的**：当在左表或右表中有匹配时，检索所有行。在其中一个表中没有匹配的行将包含 `NULL`。

    *   **用例**：当你想要获取两个表的所有记录，并在可能的情况下进行匹配时。


    `CROSS JOIN`：这种 `JOIN` 创建一个笛卡尔积，本质上是将一个表中的所有行与另一个表中的所有行相乘。虽然常用于可视化目的，但对于大型数据集来说计算开销可能很大。通常谨慎使用，或者当你确实需要所有可能的行组合时使用。


    *   **目的**：返回两个表的笛卡尔积。第一个表中的每一行与第二个表中的所有行组合。

    *   **用例**：当你需要表中所有可能的行组合时。除非用于生成测试用的所有组合等特定目的，否则很少使用。


    `SELF JOIN`：这种 `JOIN` 允许你根据特定条件将表与自身连接起来。它对于在表中查找关系非常强大。


    *   **目的**：将表与自身进行 `JOIN`。

    *   **用例**：当你需要比较同一表中的行时。


    使用不同类型的 `JOIN` 为构造数据提供了灵活性。它们允许你根据特定的匹配条件检索数据，包含特定表的所有行，甚至检查所有可能的组合。`JOIN` 是在现实世界的关系型数据库上创建高效分析查询的有用工具。表
    4-1 简要说明了使用每种 `JOIN` 类型的原因。


    **表 4-1**


    不同类型的 `JOIN`'
- fmt: '| JOIN Type | Description | Query Result | Sample Query |

    | --- | --- | --- | --- |

    | `INNER JOIN` | Returns only rows where there’s a match in both tables based
    on the `JOIN` condition. | Matching rows from both tables | `SELECT * FROM Table1
    INNER JOIN table2 ON Table1.key = Table2.key` |

    | `LEFT OUTER JOIN` | Includes all rows from the left table, specified first in
    the `FROM` clause, and matching rows from the right table. If there’s no match
    in the right table, `NULL` values are filled for columns from the right table.
    | All rows from the left table, matching rows from the right table, or `NULL`s
    for non-matching rows. | `SELECT * FROM Table1 LEFT JOIN table2 ON Table1.key
    = Table2.key` |

    | `RIGHT OUTER JOIN` | Similar to `LEFT JOIN`, but includes all rows from the
    right table, specified first in the `FROM` clause, and matching rows from the
    left table. `NULL`s are filled for non-matching rows in the left table. | All
    rows from the right table, matching rows from the left table, or `NULL`s for non-matching
    rows. | `SELECT * FROM Table1 RIGHT JOIN table2 ON Table1.key = Table2.key` |

    | `FULL OUTER JOIN` | Combines the `LEFT` and `RIGHT OUTER JOIN`s. Includes all
    rows from both tables, regardless of whether there’s a match in the other table.
    `NULL`s are filled for non-matching columns. | All rows from both tables with
    `NULL`s for non-matching rows. | `SELECT * FROM Table1 FULL OUTER JOIN table2
    ON Table1.key = Table2.key` |

    | `CROSS JOIN` | Creates a Cartesian product, resulting in all possible combinations
    of rows from both tables, regardless of any matching criteria. Can generate a
    large number of rows. | All possible combinations of rows from both tables. |
    `SELECT * FROM Table1 CROSS JOIN Table2` |

    | `SELF JOIN` | Joins a table to itself based on a specified condition. Often
    used to find relationships within the same table. | Rows from the same table that
    meet the `JOIN` condition. | `SELECT copy1.column1 AS first_column, copy2.column2
    As second_column FROM Table1 copy1 INNER JOIN Table1 copy2 ON copy1.key = copy2.key`
    |

    | `LEFT OUTER JOIN` with `NULL` check | Like a `LEFT JOIN`, but explicitly checks
    for `NULL`s to filter results. | Rows from the left table with no matching rows
    in the right table. | `SELECT * FROM Table1 LEFT JOIN Table2 ON Table1.key = Table2.key
    WHERE Table2.key IS NULL` |

    | `RIGHT OUTER JOIN` with `NULL` check | Like a `RIGHT JOIN`, but explicitly checks
    for `NULL`s to filter results. | Rows from the right table with no matching rows
    in the left table. | `SELECT * FROM Table1 RIGHT JOIN Table2 ON Table1.key = Table2.key
    WHERE Table1.key IS NULL` |

    | `FULL OUTER JOIN` with `NULL` check | Like a `FULL JOIN`, but explicitly checks
    for `NULL`s to filter results. | Rows with no matching rows in the other table.
    | `SELECT * FROM Table1 FULL OUTER JOIN Table2 ON Table1.key = Table2.key WHERE
    Table1.key IS NULL OR Table2.key IS NULL` |


    Table [4-1](#619961_1_En_4_Chapter.xhtml#Tab1) briefly introduced the different
    types of SQL `JOIN`s. It should be noted that it is necessary to combine rows
    from two or more tables based on a related column, known as a `key`. In the rest
    of this chapter, all types of keys are fully explained.


    As stated in the table, in summary, an `INNER JOIN` returns only matching rows
    from both tables, while a `LEFT JOIN` includes all rows from the left table and
    matching rows from the right, filling the right table columns with `NULL`. Conversely,
    `RIGHT JOIN` includes all rows in the right table with `NULL` for unmatched left
    table rows. A `FULL OUTER JOIN` returns all rows from both tables, using `NULL`
    for no match. A `CROSS JOIN` creates a Cartesian product of all rows. A `SELF
    JOIN` joins a table to itself to find related data in the same table. The `LEFT`,
    `RIGHT`, and `FULL OUTER JOIN` special cases with `NULL` check the results to
    show unmatched rows. Understanding these `JOIN` types and keys helps you optimize
    database queries and data analysis. To achieve a more intuitive understanding,
    these JOINs are illustrated in Figure [4-1](#619961_1_En_4_Chapter.xhtml#Fig1).


