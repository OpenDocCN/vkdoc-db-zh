  trans: '

    # 6. 使用 ORDER BY 和 LIMIT 排序数据


    数据分析要求分析师对数据进行排序，以提供清晰度、洞察力和有效沟通。SQL 中的 `ORDER BY` 子句使模式和趋势更加可见，帮助分析师优先处理发现并检测异常值。当你适当地排序数据时，数据中的模式和关系会变得更清晰，从而让你能够做出更好的决策并采取行动。例如，考虑一个没有任何顺序的产品销售列表。识别顶级产品、跟踪趋势甚至发现异常情况的任务将非常具有挑战性。数据排序提供了清晰度，并使你能够快速识别模式并做出明智的决策。`LIMIT`
    子句通过专注于最相关的数据点（例如顶级表现者或最近的条目）来补充这一点，因此更容易专注于最重要的内容。


    ## ORDER BY 简介


    SQL 中的 `ORDER BY` 子句用于根据一列或多列对结果进行排序。通过控制数据显示的顺序，你可以更容易地识别趋势、顶级表现者或特定模式。`ORDER
    BY` 子句的基本语法如下：


    ```sql

    SELECT column1, column2, ...

    FROM table_name

    ORDER BY column1 [ASC | DESC], column2 [ASC | DESC];

    ```


    这里，`column1` 和 `column2` 是你想要排序的列。你可以选择 `ASC` 表示升序（默认）或 `DESC` 表示降序。也可以按多列排序。需要注意的是，如果两行在
    `column1` 中的值相同，SQL 将使用 `column2` 作为次要排序条件。这种灵活的排序有助于更有效地呈现数据。使用 `ORDER BY`，你可以快速创建结构良好的输出，无论你想要一个畅销商品列表还是按雇佣日期排列的员工列表。


    ## 在现实场景中排序数据


    `ORDER BY` 子句对于在各种现实场景中有效地组织 SQL 查询数据至关重要。表 `6-1` 说明了如何使用 `ORDER BY` 子句来识别畅销产品、优先处理订单、突出显示高分学生或组织客户反馈。这些场景展示了
    `ORDER BY` 通过按多列排序以实现特定目标（例如项目排名、识别趋势或优先处理紧急事项）的灵活性。对于每个场景，都包含一个 SQL 查询示例，向你展示如何构建
    `ORDER BY` 子句。表 `6-1` 还解释了每个查询的结构以及它产生的输出类型。


    表 6-1：`ORDER BY` 子句


    | 现实场景 | ORDER BY 子句的作用 | SQL 查询示例 | 描述 |

    | --- | --- | --- | --- |

    | 电子商务商店中的畅销产品 | 识别最畅销的产品。 | `SELECT product_name, total_sales FROM products ORDER
    BY total_sales DESC;` | 按 `total_sales` 降序检索最畅销的产品。 |

    | 公司中的员工工资 | 显示降序排列的工资。 | `SELECT employee_name, salary FROM employees ORDER BY
    salary DESC;` | 列出所有员工，按工资从高到低排序。 |

    | 按日期排序的客户反馈 | 最新的反馈优先显示；有助于处理当前的客户关注点或问题。 | `SELECT customer_id, feedback, feedback_date
    FROM feedbacks ORDER BY feedback_date DESC;` | 显示所有客户反馈，最新的条目优先显示。 |

    | 订单履行优先级 | 根据紧急程度（订单日期或交付截止日期）优先处理订单。 | `SELECT order_id, customer_name, order_date
    FROM orders ORDER BY delivery_date ASC;` | 按 `delivery_date` 排序列出订单，以优先处理最早的截止日期。
    |

    | 考试中得分最高的学生 | 突出显示分数最高的学生。 | `SELECT student_name, score FROM exam_results ORDER
    BY score DESC;` | 按考试成绩降序检索排名靠前的学生。 |

    | 博客上最新的文章 | 根据发布日期显示文章，确保向用户展示最新的内容。 | `SELECT title, publication_date FROM articles
    ORDER BY publication_date DESC;` | 列出所有博客文章，从最近发布的开始。 |

    | 按金额排序的金融交易 | 识别大额交易；有助于欺诈检测。 | `SELECT transaction_id, transaction_amount FROM
    transactions ORDER BY transaction_amount DESC;` | 显示所有交易，按金额从高到低排序。 |

    | 终生价值最高的客户 | 根据产生的总收入识别有价值的客户。 | `SELECT customer_id, lifetime_value FROM customers
    ORDER BY lifetime_value DESC LIMIT 10;` | 检索终生价值排名前十的客户，按降序排列。 |

    | 按评分排序的电影 | 评分最高的电影优先显示；可用于推荐系统或评论。 | `SELECT movie_name, rating FROM movies
    ORDER BY rating DESC;` | 列出所有电影，从评分最高到最低开始。 |

    | 社交媒体帖子的最新更新 | 最新的帖子、评论或反应优先，以保持信息流的相关性和时效性。 | `SELECT post_id, content, post_date
    FROM posts ORDER BY post_date DESC;` | 显示所有社交媒体帖子，从最新的开始。 |

    | 最热门的话题标签 | 实时识别当前趋势和使用最多的话题标签。 | `SELECT hashtag, usage_count FROM hashtags
    ORDER BY usage_count DESC;` | 检索按使用次数排序的热门话题标签。 |


    表 `6-1` 说明了数据排序如何为各种现实场景提供洞察力。当记录按日期排序时，时间序列数据可以揭示随时间变化的趋势，例如季节性高峰。销售经理可以通过分析按时间顺序排序的月度销售数据来识别增长趋势和下降期，从而采取积极措施。根据交易金额对金融交易进行排序有助于识别异常情况，例如异常高的交易。通过根据项目完成时间等指标对员工绩效进行排序，可以识别出顶级表现者。这样，分析师可以专注于关键领域，获得洞察力，并根据可见的模式和趋势做出明智的决策。


    ## LIMIT 简介


    `LIMIT` 子句指定了 SQL 查询应返回多少行。当你只需要数据的一个子集（例如顶级结果或条目样本）而无需检索整个数据集时，它尤其有用。`LIMIT`
    允许你控制显示多少数据，以便你可以专注于最相关的记录。需要注意的是，`LIMIT` 子句在 PostgreSQL、MySQL 和 SQLite 中是标准的，但其他数据库可能需要替代语法。以下是
    `LIMIT` 子句结构的基本说明：


    ```sql

    SELECT column1, column2, ...

    FROM table_name

    ORDER BY column_name [ASC | DESC]

    LIMIT number_of_rows;

    ```


    `SELECT column1, column2, ...` 指定你想要从表中检索的列，`FROM table_name` 指示你从中查询数据的表，`ORDER
    BY column_name [ASC | DESC]` 指定在应用 `LIMIT` 之前用于对行进行排序的列。分析师通常将 `ORDER BY` 与 `LIMIT`
    结合使用，以确保选择最相关的数据，而 `LIMIT number_of_rows` 将结果集限制为指定的行数。例如，如果你使用 `LIMIT 5`，则只会返回前五行。

    '
- fmt: '# Pagination with OFFSET and LIMIT


    For user interfaces like web applications, pagination is essential to efficiently
    display data by dividing large datasets into smaller chunks. Consider browsing
    through a catalog of thousands of products—it’s easier to view 10 or 20 items
    per page rather than loading the entire list at once. `OFFSET` and `LIMIT` clauses
    in SQL are used to paginate. `OFFSET` specifies the starting point for the retrieval,
    while `LIMIT` specifies how many rows are retrieved. This means that before the
    `LIMIT` clause takes effect, users can skip a specified number of rows. Generally,
    `OFFSET` is supported in PostgreSQL, MySQL, and SQLite. Other databases like SQL
    Server and Oracle use different approaches, including `TOP`, `ROWNUM`, or `OFFSET-FETCH`.


    **Note**


    When the `OFFSET` clause is used, the result set is skipped a specified number
    of rows before returning anything. In addition to pagination, this lets you jump
    to any position within the dataset, starting at a given index.


    The following is a brief explanation of how `OFFSET` and `LIMIT` work.


    ```sql

    SELECT column1, column2, ...

    FROM table_name

    ORDER BY column_name [ASC | DESC]

    LIMIT number_of_rows OFFSET start_position;

    ```


    As mentioned, the `LIMIT` clause determines the number of rows to display. `OFFSET`
    specifies how many rows should be skipped before `LIMIT` is applied. In most cases,
    `start_position` is calculated based on the current page number and number of
    rows. Table [6-2](#619961_1_En_6_Chapter.xhtml#Tab2) illustrates how `OFFSET`
    and `LIMIT` are used in PostgreSQL for pagination.


    ### Table 6-2: OFFSET and LIMIT for Pagination


    | Scenario | Common Use | OFFSET | LIMIT | Query | Description |

    | --- | --- | --- | --- | --- | --- |

    | E-commerce product listing | Paginating products for a user browsing | Varies
    by page number | Typically 10-50 | `SELECT * FROM products ORDER BY product_id
    LIMIT 20 OFFSET (page_number - 1) * 20;` | Here, the expression `(page_number
    - 1) * 20` calculates the starting point (`OFFSET`) for each page in pagination.
    By subtracting 1 from `page_number`, the formula ensures that the first page starts
    with an offset of 0, while each subsequent page starts 20 records farther. |

    | Social media feed | Loading posts in a user’s feed | Based on scroll count |
    10-20 | `SELECT * FROM posts WHERE user_id = user_id ORDER BY post_date DESC LIMIT
    10 OFFSET (scroll_count - 1) * 10;` | Loads a specific number of recent posts
    for the user’s feed. The query paginates by setting an offset based on the scroll
    count. |

    | News website | Displaying paginated news articles | Calculated per page | 5-15
    | `SELECT * FROM articles ORDER BY publish_date DESC LIMIT 10 OFFSET (page_number
    - 1) * 10;` | Fetches a page of articles ordered by the most recent publish date,
    adjusting for the specified `page_number`. |

    | Admin dashboard logs | Viewing logs or reports | By requested page | Configurable,
    20-100 | `SELECT * FROM logs ORDER BY timestamp DESC LIMIT 50 OFFSET (page_number
    - 1) * 50;` | Loads log entries in descending timestamp order for an admin view,
    with each page containing 50 records, paginated by page number. |

    | File or data exports | Exporting data with pagination limits | Continuously
    updated | User-specified or 1,000 | `SELECT * FROM data ORDER BY record_id LIMIT
    1000 OFFSET (batch_number - 1) * 1000;` | Exports data in batches of 1,000 records;
    useful for large datasets. Adjusts the offset based on batch to maintain memory
    efficiency. |


    As shown in Table [6-2](#619961_1_En_6_Chapter.xhtml#Tab2), each query is designed
    to handle large datasets efficiently by using `LIMIT` and `OFFSET` to control
    data retrieval. This is done to ensure smooth user experiences across various
    applications.


    **Note**


    Expressions like `(page_number - 1) * page_size` are commonly used to calculate
    the starting point, or the offset, for paginated data. In general, `page_number
    - 1` adjusts for the fact that pages typically start at 1 (e.g., Page 1, Page
    2, etc.), but data offsets start at 0. By subtracting 1, you align the page number
    with the data index. Also, `page_size` multiplies the adjusted page number by
    the number of records desired per page (`page_size`). This shifts each page forward
    by exactly one page''s worth of records. For example, if `page_size` is `10`:


    *   Page 1’s offset is `(1 - 1) * 10 = 0` (starts at the first record).

    *   Page 2’s offset is `(2 - 1) * 10 = 10` (starts at the 11th record).


    In database queries, this approach is widely used to navigate data in manageable
    portions.


    `OFFSET` can generally impact performance for large datasets, as it skims rows
    internally. For large offsets, it is better to consider indexed pagination, which
    is introduced in Chapter [9](#619961_1_En_9_Chapter.xhtml).'
