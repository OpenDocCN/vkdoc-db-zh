- fmt: '### Statistical and Mathematical Functions


    统计和数学函数执行高级的数值计算，常用于预测建模和趋势分析。PostgreSQL 中统计和数学函数的一个实际用例是计算广告支出与销售额之间的相关性。


    ## 相关系数 (Correlation)


    在统计学中，相关系数衡量两个变量之间关系的强度和方向。它量化了一个变量的变化如何与另一个变量的变化相关联。相关系数 (r) 的范围从 -1 到 1：


    *   r = 1 → 完全正相关（两者一起增加）。

    *   r = -1 → 完全负相关（一个增加，另一个减少）。

    *   r = 0 → 无相关（没有关系）。


    最常见的相关方法是皮尔逊相关系数，它假设线性关系。其他类型包括用于排序数据的斯皮尔曼等级相关和用于有序数据的肯德尔等级相关。


    通过统计和数学函数，我们可以超越简单的聚合，提供统计洞察和数值建模。例如，`REGR_SLOPE(y, x)` 和 `REGR_INTERCEPT(y, x)`
    执行线性回归分析，帮助识别两个变量之间的趋势。


    ## 线性回归 (Linear Regression)


    线性回归分析是一种统计方法，通过拟合一条直线来建模两个变量之间的关系。它根据自变量 (X) 预测因变量 (Y) 如何变化。方程式是：


    `Y=mX+b`


    其中 `m` 是斜率（变化率），`b` 是截距（当 `X = 0` 时的 Y 值）。线性回归分析有助于趋势分析、预测和决策制定。为了获得准确的预测，其假设包括线性、独立性、同方差性和残差的正态性。


    ## 数据离散度 (Data Dispersion)


    为了衡量数据离散度，像 `STDDEV(column_name)` 和 `VARIANCE(column_name)` 这样的函数量化了数据集中的变异性。


    数据离散度或变异性指的是数据集中值的分散程度。它有助于理解数据内部的变异程度。常见的离散度度量包括范围、方差和标准差。范围是最大值和最小值之间的差值。方差是每个数据点与平均值之间的平均平方偏差，显示数据点与平均值的差异程度。标准差是方差的平方根，提供了单个数据点偏离平均值的程度度量。


    较高的离散度表示较大的变异性，而较低的离散度意味着数据点更接近平均值。


    数学变换，如 `POWER(x, y)`、`LOG(x)` 和 `SQRT(x)`，进一步有助于调整和规范化数据以供分析。这些函数的关键优势在于它们能够提取对数据驱动决策至关重要的模式、关系和见解。表
    10-2 总结了 PostgreSQL 中大多数著名的统计和数学函数。


    **表 10-2：常用统计和数学函数**


    | 类别 | 函数 | 描述 | 示例 |

    | --- | --- | --- | --- |

    | 数学 | `ABS(x)` | 返回 `x` 的绝对值。 | `SELECT ABS(-5);` |

    | 数学 | `CBRT(x)` | 返回 `x` 的立方根。 | `SELECT CBRT(27);` |

    | 数学 | `CEIL(x) 或 CEILING(x)` | 返回大于或等于 `x` 的最小整数。 | `SELECT CEIL(4.2);` |

    | 数学 | `EXP(x)` | 返回 e 的 `x` 次方。 | `SELECT EXP(1);` |

    | 数学 | `FLOOR(x)` | 返回小于或等于 `x` 的最大整数。 | `SELECT FLOOR(4.8);` |

    | 数学 | `LN(x) 或 LOG(x)` | 返回 `x` 的自然对数。 | `SELECT LN(10);` |

    | 数学 | `LOG(b, x)` | 返回以 `b` 为底的 `x` 的对数。 | `SELECT LOG(10, 100);` |

    | 数学 | `MOD(y, x)` | 返回 `y` 除以 `x` 的余数。 | `SELECT MOD(11, 3);` |

    | 数学 | `PI()` | 返回 π 的值。 | `SELECT PI();` |

    | 数学 | `POWER(x, y) 或 POW(x, y)` | 返回 `x` 的 `y` 次方。 | `SELECT POWER(2, 3);` |

    | 数学 | `ROUND(x)` | 将 `x` 四舍五入到最接近的整数。 | `SELECT ROUND(4.5);` |

    | 数学 | `ROUND(x, s)` | 将 `x` 四舍五入到 `s` 位小数。 | `SELECT ROUND(4.567, 2);` |

    | 数学 | `SIGN(x)` | 返回 `x` 的符号（-1、0 或 1）。 | `SELECT SIGN(-10);` |

    | 数学 | `SQRT(x)` | 返回 `x` 的平方根。 | `SELECT SQRT(16);` |

    | 数学 | `TRUNC(x)` | 向零截断 `x`。 | `SELECT TRUNC(4.8);` |

    | 数学 | `TRUNC(x, s)` | 将 `x` 截断到 `s` 位小数。 | `SELECT TRUNC(4.567, 2);` |

    | 数学 | `RANDOM()` | 返回 0 到 1 之间的伪随机数。 | `SELECT RANDOM();` |

    | 统计 | `AVG(expression)` | 返回输入值的平均值（算术平均）。 | `SELECT AVG(salary) FROM employees;`
    |

    | 统计 | `CORR(y, x)` | 返回相关系数。 | `SELECT CORR(sales, advertising) FROM marketing;`
    |

    | 统计 | `COVAR_POP(y, x)` | 返回总体协方差。 | `SELECT COVAR_POP(sales, advertising) FROM
    marketing;` |

    | 统计 | `COVAR_SAMP(y, x)` | 返回样本协方差。 | `SELECT COVAR_SAMP(sales, advertising)
    FROM marketing;` |

    | 统计 | `STDDEV_POP(expression)` | 返回总体标准差。 | `SELECT STDDEV_POP(salary) FROM employees;`
    |

    | 统计 | `STDDEV_SAMP(expression)` | 返回样本标准差。 | `SELECT STDDEV_SAMP(salary) FROM
    employees;` |

    | 统计 | `VARIANCE(expression)` | 返回样本方差。 | `SELECT VARIANCE(salary) FROM employees;`
    |

    | 统计 | `VAR_POP(expression)` | 返回总体方差。 | `SELECT VAR_POP(salary) FROM employees;`
    |

    | 统计 | `VAR_SAMP(expression)` | 返回样本方差。 | `SELECT VAR_SAMP(salary) FROM employees;`
    |

    | 统计 | `REGR_AVGX(y, x)` | 返回自变量 (`x`) 的平均值。 | `SELECT REGR_AVGX(y, x) FROM table;`
    |

    | 统计 | `REGR_AVGY(y, x)` | 返回因变量 (`y`) 的平均值。 | `SELECT REGR_AVGY(y, x) FROM table;`
    |

    | 统计 | `REGR_INTERCEPT(y, x)` | 返回最小二乘回归线的 y 截距。 | `SELECT REGR_INTERCEPT(y, x)
    FROM table;` |

    | 统计 | `REGR_R2(y, x)` | 返回相关系数的平方。 | `SELECT REGR_R2(y, x) FROM table;` |

    | 统计 | `REGR_SLOPE(y, x)` | 返回最小二乘回归线的斜率。 | `SELECT REGR_SLOPE(y, x) FROM table;`
    |

    | 统计 | `REGR_COUNT(y, x)` | 返回两个表达式都不为 null 的输入行数。 | `SELECT REGR_COUNT(y, x)
    FROM table;` |'
  raw: '### Statistical and Mathematical Functions


    Statistical and mathematical functions perform advanced numerical computations
    and are often used for predictive modeling and trend analysis. A practical use
    case for statistical and mathematical functions in PostgreSQL is calculating the
    correlation between advertising spend and sales.


    Note


    Correlation in statistics measures the strength and direction of a relationship
    between two variables. It quantifies how changes in one variable relate to changes
    in another. The correlation coefficient (r) ranges from -1 to 1:


    *   r = 1 → Perfect positive correlation (both increase together).


    *   r = -1 → Perfect negative correlation (one increases, the other decreases).


    *   r = 0 → No correlation (no relationship).


    The most common correlation method is Pearson’s correlation, which assumes a linear
    relationship. Other types include Spearman’s, for ranked data, and Kendall’s,
    for ordinal data.


    As a result of statistical and mathematical functions, it is possible to go beyond
    simple aggregates in order to provide statistical insights and numerical modeling.
    For instance, `REGR_SLOPE(y, x)` and `REGR_INTERCEPT(y, x)` perform linear regression
    analysis, helping to identify trends between two variables.


    Note


    Linear regression analysis is a statistical method used to model the relationship
    between two variables by fitting a straight line. It predicts how a dependent
    variable (Y) changes based on an independent variable (X). The equation is:


    Y=mX+b


    Where m is the slope (rate of change), and b is the intercept (Y’s value when
    X = 0). Linear regression analysis helps us in trend analysis, forecasting, and
    decision-making. Assumptions include linearity, independence, homoscedasticity,
    and normality of residuals for accurate predictions.


    To measure data dispersion, functions like `STDDEV(column_name)` and `VARIANCE(column_name)`
    quantify variability in datasets.


    Note


    Data dispersion, or variability, refers to how spread out or scattered the values
    in a dataset are. It helps to understand the degree of variation within the data.
    Common measures of dispersion include range, variance, and standard deviation.
    The range is the difference between the maximum and minimum values. Variance is
    the average squared deviation of each data point from the mean, showing how data
    points differ from the average. Standard deviation is the square root of variance,
    providing a measure of how much individual data points deviate from the mean.


    Higher dispersion indicates more variability, while lower dispersion means the
    data points are closer to the mean.


    Mathematical transformations, such as `POWER(x, y)`, `LOG(x)`, and `SQRT(x)` further
    assist in adjusting and normalizing data for analysis. The key advantage of these
    functions is their ability to extract patterns, relationships, and insights that
    are critical for data-driven decision-making. Table [10-2](#619961_1_En_10_Chapter.xhtml#Tab2)
    summarizes most of the well-known statistical and mathematical functions in PostgreSQL.


    Table 10-2


    Commonly Used Statistical and Mathematical Functions


    | Category | Function | Description | Example |

    | --- | --- | --- | --- |

    | Mathematical | `ABS(x)` | Returns the absolute value of x. | `SELECT ABS(-5);`
    |

    | Mathematical | `CBRT(x)` | Returns the cube root of x. | `SELECT CBRT(27);`
    |

    | Mathematical | `CEIL(x) or CEILING(x)` | Returns the smallest integer greater
    than or equal to x. | `SELECT CEIL(4.2);` |

    | Mathematical | `EXP(x)` | Returns e raised to the power of x. | `SELECT EXP(1);`
    |

    | Mathematical | `FLOOR(x)` | Returns the largest integer less than or equal to
    x. | `SELECT FLOOR(4.8);` |

    | Mathematical | `LN(x) or LOG(x)` | Returns the natural logarithm of x. | `SELECT
    LN(10);` |

    | Mathematical | `LOG(b, x)` | Returns the logarithm of x to base b. | `SELECT
    LOG(10, 100);` |

    | Mathematical | `MOD(y, x)` | Returns the remainder of y divided by x. | `SELECT
    MOD(11, 3);` |

    | Mathematical | `PI()` | Returns the value of pi. | `SELECT PI();` |

    | Mathematical | `POWER(x, y) or POW(x, y)` | Returns x raised to the power of
    y. | `SELECT POWER(2, 3);` |

    | Mathematical | `ROUND(x)` | Rounds x to the nearest integer. | `SELECT ROUND(4.5);`
    |

    | Mathematical | `ROUND(x, s)` | Rounds x to s decimal places. | `SELECT ROUND(4.567,
    2);` |

    | Mathematical | `SIGN(x)` | Returns the sign of x (-1, 0, or 1). | `SELECT SIGN(-10);`
    |

    | Mathematical | `SQRT(x)` | Returns the square root of x. | `SELECT SQRT(16);`
    |

    | Mathematical | `TRUNC(x)` | Truncates x toward 0. | `SELECT TRUNC(4.8);` |

    | Mathematical | `TRUNC(x, s)` | Truncates x to s decimal places. | `SELECT TRUNC(4.567,
    2);` |

    | Mathematical | `RANDOM()` | Returns a pseudo-random number between 0 and 1.
    | `SELECT RANDOM();` |

    | Statistical | `AVG(expression)` | Returns the average (arithmetic mean) of the
    input values. | `SELECT AVG(salary) FROM employees;` |

    | Statistical | `CORR(y, x)` | Returns the correlation coefficient. | `SELECT
    CORR(sales, advertising) FROM marketing;` |

    | Statistical | `COVAR_POP(y, x)` | Returns the population covariance. | `SELECT
    COVAR_POP(sales, advertising) FROM marketing;` |

    | Statistical | `COVAR_SAMP(y, x)` | Returns the sample covariance. | `SELECT
    COVAR_SAMP(sales, advertising) FROM marketing;` |

    | Statistical | `STDDEV_POP(expression)` | Returns the population standard deviation.
    | `SELECT STDDEV_POP(salary) FROM employees;` |

    | Statistical | `STDDEV_SAMP(expression)` | Returns the sample standard deviation.
    | `SELECT STDDEV_SAMP(salary) FROM employees;` |

    | Statistical | `VARIANCE(expression)` | Returns the sample variance. | `SELECT
    VARIANCE(salary) FROM employees;` |

    | Statistical | `VAR_POP(expression)` | Returns the population variance. | `SELECT
    VAR_POP(salary) FROM employees;` |

    | Statistical | `VAR_SAMP(expression)` | Returns the sample variance. | `SELECT
    VAR_SAMP(salary) FROM employees;` |

    | Statistical | `REGR_AVGX(y, x)` | Returns the average of the independent variable
    (x). | `SELECT REGR_AVGX(y, x) FROM table;` |

    | Statistical | `REGR_AVGY(y, x)` | Returns the average of the dependent variable
    (y). | `SELECT REGR_AVGY(y, x) FROM table;` |

    | Statistical | `REGR_INTERCEPT(y, x)` | Returns the y-intercept of the least-squares
    regression line. | `SELECT REGR_INTERCEPT(y, x) FROM table;` |

    | Statistical | `REGR_R2(y, x)` | Returns the square of the correlation coefficient.
    | `SELECT REGR_R2(y, x) FROM table;` |

    | Statistical | `REGR_SLOPE(y, x)` | Returns the slope of the least-squares regression
    line. | `SELECT REGR_SLOPE(y, x) FROM table;` |

    | Statistical | `REGR_COUNT(y, x)` | Returns the number of input rows where both
    expressions are not null. | `SELECT REGR_COUNT(y, x) FROM table;` |'
