    # 附录 B：术语表


    本附录按字母顺序提供了与 SQL 和数据分析相关的常用术语表。该术语表包含超过 100 个术语，为任何使用 PostgreSQL 进行数据分析的人员提供了全面的参考。

    '
- fmt: '## A


    `ACID (Atomicity, Consistency, Isolation, Durability)`: Set of properties that
    guarantee database transactions are processed reliably.


    `Aggregate functions`: Functions that perform calculations across multiple rows
    and return a single value.


    `ANALYZE`: Command that collects statistics about the contents of tables, used
    by the query planner to generate efficient execution plans.


    `Array`: A data type that can store multiple values of the same type in a single
    column.


    ## B


    `B-tree index`: Default index type in PostgreSQL; a balanced tree structure optimized
    for range queries and equality conditions.


    `Backup`: Copy of database data that can be used to restore the database in case
    of data loss.


    `BETWEEN`: Operator used to test if a value falls within a specified range.


    `BIGINT`: Integer data type capable of storing numbers between -9,223,372,036,854,775,808
    and 9,223,372,036,854,775,807.


    `BOOLEAN`: Data type that can store true, false, or `NULL` values.


    `BRIN (Block Range INdex)`: Index type suited for very large tables with natural
    ordering; stores summary information for block ranges.


    ## C


    `Cast`: Operation that converts a value from one data type to another.


    `CTE (Common Table Expression)`: Named temporary result set defined within a query
    that can be referenced multiple times.


    `COALESCE`: Function that returns the first non-`NULL` value in a list.


    `Collation`: Set of rules that determine how text data is sorted and compared
    in a database.


    `Composite type`: User-defined data type consisting of multiple fields.


    `Concurrency control`: Mechanisms that ensure data consistency when multiple transactions
    are executing simultaneously.


    `Connection pooling`: Technique of maintaining a pool of database connections
    for reuse, improving performance.


    `Constraints`: Rules enforced on data columns to maintain data integrity.


    `COPY`: Command used for bulk loading or unloading data between PostgreSQL tables
    and files.


    `Correlation`: Statistical measure that indicates the extent to which two variables
    fluctuate together.


    `Correlated subquery`: Subquery that references columns from the outer query.


    `CUBE`: Extension to `GROUP BY` that generates multiple grouping sets for multi-dimensional
    aggregation.


    `Cursor`: Database object used to traverse through the result set of a query.


    ## D


    `Data type`: Attribute that specifies the type of data that an object can hold.


    `Database cluster`: Collection of databases managed by a single PostgreSQL server
    instance.


    `Deadlock`: Situation where two or more transactions are waiting for each other
    to release locks.


    `DISTINCT`: Clause used to eliminate duplicate rows from a result set.


    `Domain`: User-defined data type with constraints.


    ## E


    `ENUM`: Data type that represents a static, ordered set of values.


    `EXPLAIN`: Command that shows the execution plan for a statement without actually
    executing it.


    `EXPLAIN ANALYZE`: Command that shows the execution plan and actual runtime statistics.


    `Extension`: Module that adds functionality to PostgreSQL, such as PostGIS.


    `Extract, Transform, Load (ETL)`: Process of copying data from source systems
    into a database.


    ## F


    `Foreign key`: Constraint that maintains referential integrity between two tables.


    `Full text search`: Feature that allows searching through text data for specific
    words or phrases.


    `Function`: Reusable block of SQL code that performs a specific task and can return
    a value.


    ## G


    `Generalized Inverted Index (GIN)`: Index structure for handling cases where multiple
    values are stored in a single column, often used for arrays and full-text search.


    `Generalized Search Tree (GiST)`: Index structure supporting arbitrary indexing
    schemes, used for geometric data types and full-text search.


    `GROUP BY`: Clause used to group rows with the same values into summary rows.


    ## H


    `Hash index`: Index structure that works well for equality comparisons but not
    for range queries.


    `HAVING`: Clause used to filter groups in a `GROUP BY` query.


    `Histogram`: Data structure that represents the distribution of values in a column.


    `HyperLogLog`: Algorithm used for approximate distinct count calculations.


    ## I


    `Index`: Data structure that improves the speed of data retrieval operations.


    `Index-only scan`: Query execution where all required data can be retrieved from
    the index without accessing the table.


    `INNER JOIN`: Returns rows when there is a match in both tables.


    `Isolation level`: Setting that determines how transaction integrity is enforced.


    ## J


    `JOIN`: SQL operation that combines rows from two or more tables based on a related
    column.


    `JSON/JSONB`: Data types that store JSON (JavaScript Object Notation) data with
    different performance characteristics.


    ## K


    `Key`: Field or combination of fields used to identify a record or establish relationships
    between tables.


    ## L


    `LATERAL JOIN`: Allows subqueries in the `FROM` clause to reference columns from
    preceding items in the `FROM` clause.


    `LEFT JOIN`: Returns all rows from the left table and matching rows from the right
    table.


    `LIMIT`: Clause that restricts the number of rows returned by a query.


    `LISTEN/NOTIFY`: Asynchronous notification system in PostgreSQL.


    `Locale`: Set of parameters that defines language and cultural preferences.


    `Lock`: Mechanism used to control concurrent access to data.


    ## M


    `MADlib`: An open-source library for scalable in-database analytics.


    `Materialized view`: View that stores the result set physically and must be explicitly
    refreshed.


    `Multi-Version Concurrency Control (MVCC)`: Technique PostgreSQL uses to allow
    concurrent access to the database.


    ## N


    `Natural JOIN`: `JOIN` that automatically joins tables based on columns with the
    same name.


    `Normalization`: Process of organizing data to reduce redundancy and improve data
    integrity.


    `NULL`: Special marker used to indicate that a data value does not exist.


    `NULLIF`: Function that returns `NULL` if two specified expressions are equal.


    ## O


    `Object Identifier (OID)`: System column used internally by PostgreSQL.


    `OFFSET`: Clause used to skip a specified number of rows before returning results.


    `Online Analytical Processing (OLAP)`: Data processing that enables users to analyze
    multidimensional data from multiple perspectives.


    `Online Transaction Processing (OLTP)`: Data processing focused on transaction-oriented
    applications.


    `Operator`: Symbol that specifies an operation to be performed.


    `Optimizer`: Component that determines the most efficient way to execute a query.


    `ORDER BY`: Clause used to sort the result set.


    ## P


    `Partition`: Division of a large table into smaller, more manageable pieces.


    `Percentile`: Value below which a given percentage of observations fall.


    `Prepared statement`: SQL statement template that can be executed multiple times
    with different parameters.


    `Primary key`: Column or group of columns that uniquely identifies each row in
    a table.


    `Procedural language`: Language used to write stored procedures and functions
    (e.g., PL/pgSQL).


    ## Q


    `Query`: Request for data or information from a database.


    `Query plan`: Series of steps PostgreSQL uses to access the data.


    `Query optimizer`: Component that determines the most efficient way to execute
    a query.


    ## R


    `RAISE`: Statement used to report messages and raise errors in PL/pgSQL.


    `Recursive query`: Query that references itself.


    `Referential integrity`: Property that ensures relationships between tables remain
    consistent.


    `RETURNING`: Clause that returns data from rows affected by `INSERT`, `UPDATE`,
    or `DELETE`.


    `ROLLUP`: Extension to `GROUP BY` that creates hierarchical grouping sets.


    `Row-level security`: Feature that restricts which rows users can access.'
