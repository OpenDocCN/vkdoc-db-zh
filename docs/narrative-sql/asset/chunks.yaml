  trans: '

    ### JSON 函数


    JSON 函数旨在处理 JSON 数据类型，这对于处理半结构化数据至关重要。


    > **注意**

    > JSON (JavaScript 对象表示法) 是一种轻量级的数据交换格式，非常适合将结构化数据表示为键值对。它具有人类可读性，且易于机器解析。在诸如
    PostgreSQL 之类的 SQL 数据库中，JSON 集成允许将半结构化数据与关系数据一同存储和查询。处理灵活数据模型（例如配置设置或文档式数据）的能力至关重要，这些数据无法整齐地放入传统表中。

    >

    > 在 SQL 中使用 JSON 函数，您可以直接查询和操作 JSON 数据，弥合了结构化与半结构化数据之间的差距。这些函数使分析师能够直接在 PostgreSQL
    中查询、修改和聚合 JSON 数据，从而增强了数据管理的灵活性。表 10-7 总结了 PostgreSQL 中大多数常见的 JSON 函数。


    表 10-7：常用的 JSON 函数


    | 函数 | 描述 | 示例 |

    | --- | --- | --- |

    | `to_json(anyelement)` | 将 PostgreSQL 值转换为 JSON。 | `SELECT to_json(ARRAY[1, 2,
    3]);` (返回 `"[1,2,3]"`) |

    | `to_jsonb(anyelement)` | 将 PostgreSQL 值转换为 JSONB。 | `SELECT to_jsonb(ROW(1,
    ''foo''));` (返回 `''{"f1":1,"f2":"foo"}''`) |

    | `json_build_array(VARIADIC "any")` | 从可变参数列表构建 JSON 数组。 | `SELECT json_build_array(1,
    ''two'', null);` (返回 `"[1,\"two\",null]"`) |

    | `json_build_object(VARIADIC "any")` | 从可变参数列表构建 JSON 对象。 | `SELECT json_build_object(''foo'',
    1, ''bar'', ''baz'');` (返回 `''{"foo":1,"bar":"baz"}''`) |


    ### 控制函数


    控制函数使得在数据库函数和触发器中能够嵌入过程式逻辑。`IF-ELSE` 结构支持条件执行，从而能够基于数据值实现分支逻辑。`LOOP` 结构提供迭代能力，便于处理重复性任务。`EXCEPTION`
    处理用于捕获和管理错误，确保代码的健壮执行。这些控制结构使开发者能够创建复杂、动态的数据库操作，例如数据验证、条件更新和自定义错误处理。对于需要超越简单 SQL
    查询的过程式逻辑的复杂数据库应用构建而言，它们是必不可少的。表 10-8 总结了 PostgreSQL 中大多数常见的控制函数。


    表 10-8：常用的控制函数


    | 函数 | 描述 | 示例 |

    | --- | --- | --- |

    | `COALESCE(value1, value2, ...)` | 返回列表中第一个非 `NULL` 值。 | `SELECT COALESCE(NULL,
    ''default'', ''other'');` (返回 `''default''`) |

    | `NULLIF(value1, value2)` | 如果 `value1` 等于 `value2`，则返回 `NULL`；否则返回 `value1`。
    | `SELECT NULLIF(10, 10);` (返回 `NULL`) |

    | `GREATEST(value1, value2, ...)` | 返回列表中的最大值。 | `SELECT GREATEST(10, 5, 15);`
    (返回 `15`) |

    | `LEAST(value1, value2, ...)` | 返回列表中的最小值。 | `SELECT LEAST(10, 5, 15);` (返回 `5`)
    |

    | `CASE WHEN condition1 THEN result1 [WHEN condition2 THEN result2 ...] [ELSE
    resultN] END` | 条件表达式，类似于 `if-then-else` 逻辑。 | `SELECT CASE WHEN age >= 18 THEN
    ''Adult'' ELSE ''Minor'' END FROM users;` |

    | `ASSERT(condition, message)` | 检查条件，如果为假则引发错误。（主要用于调试。） | `SELECT ASSERT(age
    > 0, ''Age must be positive'') FROM users;` |


    ### 系统函数


    系统函数提供对数据库元数据和系统级操作的访问。`CURRENT_USER` 揭示当前用户名，有助于安全和审计。`VERSION()` 显示 PostgreSQL
    服务器的版本，对于兼容性检查至关重要。`pg_sleep()` 将执行暂停指定的时长，对测试和调度很有用。这些函数允许开发者与数据库环境交互、检索系统信息并控制执行流程。表
    10-9 总结了 PostgreSQL 中大多数常见的系统函数。


    表 10-9：常用的系统函数


    | 函数 | 描述 | 示例 |

    | --- | --- | --- |

    | `CURRENT_USER` | 返回当前用户名。 | `SELECT CURRENT_USER;` |

    | `SESSION_USER` | 返回会话用户名。 | `SELECT SESSION_USER;` |

    | `USER` | 等同于 `CURRENT_USER`。 | `SELECT USER;` |

    | `CURRENT_DATABASE()` | 返回当前数据库的名称。 | `SELECT CURRENT_DATABASE();` |

    | `CURRENT_SCHEMA` | 返回当前模式的名称。 | `SELECT CURRENT_SCHEMA;` |

    | `CURRENT_SCHEMAS(boolean)` | 返回搜索路径中的模式名称。如果布尔参数为 `true`，则隐式包含的系统模式也会包含在结果中。
    | `SELECT CURRENT_SCHEMAS(false);` |

    | `VERSION()` | 返回描述 PostgreSQL 服务器版本的字符串。 | `SELECT VERSION();` |


    函数类型之间的差异总结见表 10-10。


    表 10-10：函数类型之间的差异


    | 函数类型 | 目的 | 返回 |

    | --- | --- | --- |

    | 聚合函数 | 将多行汇总为一个结果。 | 每组单个值 |

    | 统计和数学函数 | 执行数值或统计计算。 | 单个或多行值 |

    | 窗口函数 | 跨行计算值而不折叠它们。 | 每行一个值 |

    | 值函数 | 处理单个数据值，常用于类型转换或 `NULL` 处理。 | 单个值 |

    | 排名函数 | 根据指定标准对结果集中的行进行排名。 | 每行一个值 |

    | 字符串函数 | 操作字符串数据。 | 单个值 |

    | 日期和时间函数 | 对日期和时间执行计算或转换。 | 单个值或多行值 |

    | JSON 函数 | 操作或从 JSON/JSONB 数据类型提取数据。 | 单个或多行值 |

    | 控制函数 | 控制 PostgreSQL 中的程序流。 | 取决于函数（例如，布尔型、整型） |

    | 系统函数 | 与数据库系统或元数据交互。 | 单个值 |


    每种函数类型服务于不同的分析需求；这些需求在表 10-11 中进行了总结和比较。


    表 10-11：每种函数满足的不同分析需求


    | 函数类型 | 描述 |

    | --- | --- |

    | 聚合函数 | 对多行进行操作并返回单个结果。 |

    | 统计和数学函数 | 用于回归、离差和其他数值分析等计算。 |

    | 窗口函数 | 跨与当前行相关的行执行计算，允许进行比较。 |

    | 值函数 | 返回或操作值，常用于类型转换或处理 `NULL` 值。 |

    | 排名函数 | 根据指定的排序标准对行进行排名。 |

    | 字符串函数 | 用于字符串操作任务，例如连接和大小写转换。 |

    | 日期和时间函数 | 处理日期和时间类型以进行计算和转换。 |

    | JSON 函数 | 操作和提取 JSON/JSONB 列中的数据。 |

    | 控制函数 | 控制 PostgreSQL 中的程序流。 |

    | 系统函数 | 处理系统级信息或数据库元数据。 |

    '
- fmt: '### Creating Your Own Functions in PostgreSQL


    Creating your own functions in PostgreSQL is a powerful way to encapsulate reusable
    logic and extend your database’s functionality. Here is the basic syntax for creating
    your own PostgreSQL functions:


    ```sql

    CREATE FUNCTION function_name (parameters)

    RETURNS return_type AS $$

    DECLARE

    -- variable declarations (optional)

    BEGIN

    -- function logic

    RETURN result;

    END;

    $$ LANGUAGE plpgsql;

    ```


    Where `CREATE FUNCTION function_name` defines the function name, `parameters`
    are the input parameters the function takes (which is optional), and `RETURNS
    return_type` specifies the return type of the function (for instance, `INTEGER`,
    `TEXT`, or `VOID` for no return). `DECLARE` is optional and it declares any local
    variables used within the function. `BEGIN` and `END` mark the start and end of
    the function logic, and `RETURN` specifies the value the function returns.


    For example, it might be useful to create a function that calculates the area
    of a rectangle. The following function takes two parameters, `width` and `height`,
    and returns the area as an `INTEGER`.


    ```sql

    CREATE FUNCTION calculate_area(width INTEGER, height INTEGER)

    RETURNS INTEGER AS $$

    BEGIN

    RETURN width * height;

    END;

    $$ LANGUAGE plpgsql;

    ```


    The `CREATE FUNCTION calculate_area(width INTEGER, height INTEGER)` statement
    creates a new function named `calculate_area` that accepts two integer parameters:
    `width` and `height`. The function returns an integer value, as specified by the
    `RETURNS INTEGER` clause. The function body is enclosed within `AS $$ ... $$`,
    which is a dollar-quoted string literal, allowing for easier readability without
    needing to escape special characters.


    Note


    A dollar-quoted string literal in PostgreSQL is a way to define string constants
    without needing to escape special characters like quotes. It is enclosed within
    double dollar signs (`$$`) or custom tags (`$tag$`). This is especially useful
    in functions, stored procedures, and dynamic SQL to improve readability and avoid
    escaping issues.


    Dollar quoting ensures that embedded single quotes don''t interfere with SQL syntax,
    making it easier to write complex queries and function bodies.


    The function logic is placed between `BEGIN` and `END`, marking the start and
    end of the executable code block. Inside this block, `RETURN width * height;`
    performs the multiplication of the provided `width` and `height` values, returning
    the computed area. The `LANGUAGE plpgsql;` statement specifies that the function
    is written in `PL/pgSQL`, PostgreSQL’s procedural language. Once created, the
    function can be used as follows:


    ```sql

    SELECT calculate_area(5, 10);

    ```


    This query will return `50`, as the area is calculated as `5 * 10`.


    The following two queries are provided to illustrate the basic syntax of function
    modification or deletion.


    You can update a function by deleting the old version and creating a new one:


    ```sql

    DROP FUNCTION IF EXISTS function_name;

    ```


    To drop a function, use this statement:


    ```sql

    DROP FUNCTION function_name;

    ```


    Creating your own functions in PostgreSQL using `PL/pgSQL` allows you to define
    complex logic, improve code reusability, and customize your database behavior
    to fit specific needs. You can handle input/output parameters, error handling,
    and return values to suit the business logic you are implementing.


    ### Error Handling


    Error handling in PostgreSQL is essential for query, function, and transaction
    reliability. When an error occurs, PostgreSQL aborts the transaction unless it
    is handled explicitly.


    Note


    A transaction in PostgreSQL is a sequence of SQL statements executed as a single
    unit of work. It ensures atomicity, meaning all operations either complete successfully
    or are entirely rolled back if an error occurs. Transactions start with `BEGIN`,
    and changes are saved using `COMMIT`. If an error occurs, `ROLLBACK` undoes all
    the changes, maintaining database integrity. In general, transactions in PostgreSQL
    are typically used for data integrity and consistency in write operations like
    `INSERT`, `UPDATE`, and `DELETE`, but they can also be used in data analysis tasks
    when necessary. While pure data analysis usually involves `SELECT` queries, aggregations,
    and reporting without requiring transactions, certain situations may benefit from
    them. PostgreSQL is distinct from many other database engines due to its write-ahead
    log (`WAL`) mechanism, which enables rollback of even `DDL` (Data Definition Language)
    statements such as `CREATE`, `ALTER`, and `DROP`. This behavior further strengthens
    its transactional consistency and reliability.


    There are several causes of errors, including invalid input, constraints violations,
    and system failures. PostgreSQL provides exception handling mechanisms to manage
    such situations, particularly within functions and stored procedures. The `RAISE
    EXCEPTION` statement allows developers to generate custom error messages, while
    the `EXCEPTION` block enables structured error handling. Proper error management
    helps prevent unexpected failures, rolls back transactions safely, and provides
    meaningful feedback to users and applications.


    #### Basic Exception Handling


    A function can use the `EXCEPTION` block to catch and respond to errors. Here
    is an example that prevents division by zero errors:


    ```sql

    CREATE FUNCTION safe_divide(numerator INTEGER, denominator INTEGER)

    RETURNS FLOAT AS $$

    BEGIN

    IF denominator = 0 THEN

    RAISE EXCEPTION ''Error: Division by zero is not allowed'';

    ELSE

    RETURN numerator::FLOAT / denominator;

    END IF;

    END;

    $$ LANGUAGE plpgsql;

    ```


    This function named `safe_divide` is designed to perform division operations while
    preventing the common error of dividing by zero. The function accepts two integer
    parameters: `numerator` and `denominator`. When called, it first checks if the
    denominator equals `0` using an `IF` statement.


    Note


    Generally, `IF ELSE` is a conditional statement that allows a program to execute
    different blocks of code based on whether a condition is true or false. In PostgreSQL,
    `IF ELSE` is used inside functions, procedures, and `DO` blocks. For instance,
    the basic syntax is as follows:


    ```sql

    DO $$

    BEGIN

    IF 10 > 5 THEN

    RAISE NOTICE ''Condition is True'';

    ELSE

    RAISE NOTICE ''Condition is False'';

    END IF;

    END $$ LANGUAGE plpgsql;

    ```


    In PostgreSQL, a `DO` block is an anonymous code block that allows executing procedural
    logic without creating a function. It is useful for running temporary scripts,
    testing logic, or performing one-time operations.


    If the denominator is zero, the function raises an exception with a descriptive
    error message stating `"Error: Division by zero is not allowed"`, which prevents
    the operation from proceeding and alerts the user about the issue. If the denominator
    is not zero, the function proceeds to perform the division operation by first
    converting the numerator to a floating-point number (using the `::FLOAT` cast
    notation) and then dividing it by the denominator, returning the result as a floating-point
    number.


    Note


    In PostgreSQL functions, the `::` type cast operator is used to explicitly specify
    the return type of a value before it is returned. This ensures that the function
    always returns the correct data type and prevents implicit type conversion issues.
    Recall that in PostgreSQL, `::` is the type cast operator, used to explicitly
    convert one data type into another. It is an alternative to the `CAST()` function.
    But you should use `::` in function returns for the following reasons:


    1.  To ensure that the function returns the correct type.

    2.  To prevent implicit casting errors when dealing with mixed data types.

    3.  To clarify the type of expected output by explicitly stating it.


    Using this method ensures more precise results than dividing by integers. The
    function is written in PostgreSQL’s procedural language (`PL/pgSQL`), which extends
    standard `SQL` by supporting control structures and error-handling features not
    available in regular `SQL`.'
  raw: '### Creating Your Own Functions in PostgreSQL


    Creating your own functions in PostgreSQL is a powerful way to encapsulate reusable
    logic and extend your database’s functionality. Here is the basic syntax for creating
    your own PostgreSQL functions:


    ```

    CREATE FUNCTION function_name (parameters)

    RETURNS return_type AS $$

    DECLARE

    -- variable declarations (optional)

    BEGIN

    -- function logic

    RETURN result;

    END;

    $$ LANGUAGE plpgsql;

    ```


    Where `CREATE FUNCTION function_name` defines the function name, `parameters`
    are the input parameters the function takes (which is optional), and `RETURNS
    return_type` specifies the return type of the function (for instance, `INTEGER`,
    `TEXT`, or `VOID` for no return). `DECLARE` is optional and it declares any local
    variables used within the function. `BEGIN` and `END` mark the start and end of
    the function logic, and `RETURN` specifies the value the function returns.


    For example, it might be useful to create a function that calculates the area
    of a rectangle. The following function takes two parameters, `width` and `height`,
    and returns the area as an `INTEGER`.


    ```

    CREATE FUNCTION calculate_area(width INTEGER, height INTEGER)

    RETURNS INTEGER AS $$

    BEGIN

    RETURN width * height;

    END;

    $$ LANGUAGE plpgsql;

    ```


    The `CREATE FUNCTION calculate_area(width INTEGER, height INTEGER)` statement
    creates a new function named `calculate_area` that accepts two integer parameters:
    `width` and `height`. The function returns an integer value, as specified by the
    `RETURNS INTEGER` clause. The function body is enclosed within `AS $$ ... $$`,
    which is a *dollar-quoted string literal,* allowing for easier readability without
    needing to escape special characters.


    Note


    A dollar-quoted string literal in PostgreSQL is a way to define string constants
    without needing to escape special characters like quotes. It is enclosed within
    double dollar signs (`$$`) or custom tags (`$tag$`). This is especially useful
    in functions, stored procedures, and dynamic SQL to improve readability and avoid
    escaping issues.


    Dollar quoting ensures that embedded single quotes don''t interfere with SQL syntax,
    making it easier to write complex queries and function bodies.


    The function logic is placed between `BEGIN` and `END`, marking the start and
    end of the executable code block. Inside this block, `RETURN width * height;`
    performs the multiplication of the provided `width` and `height` values, returning
    the computed area. The `LANGUAGE plpgsql;` statement specifies that the function
    is written in PL/pgSQL, PostgreSQL’s procedural language. Once created, the function
    can be used as follows:


    ```

    SELECT calculate_area(5, 10);

    ```


    This query will return `50`, as the area is calculated as `5 * 10`.


    The following two queries are provided to illustrate the basic syntax of function
    modification or deletion.


    You can update a function by deleting the old version and creating a new one:


    ```

    DROP FUNCTION IF EXISTS function_name;

    ```


    To drop a function, use this statement:


    ```

    DROP FUNCTION function_name;

    ```


    Creating your own functions in PostgreSQL using PL/pgSQL allows you to define
    complex logic, improve code reusability, and customize your database behavior
    to fit specific needs. You can handle input/output parameters, error handling,
    and return values to suit the business logic you are implementing.


    ### Error Handling


    Error handling in PostgreSQL is essential for query, function, and transaction
    reliability. When an error occurs, PostgreSQL aborts the transaction unless it
    is handled explicitly.


    Note


    A *transaction* in PostgreSQL is a sequence of SQL statements executed as a single
    unit of work. It ensures atomicity, meaning all operations either complete successfully
    or are entirely rolled back if an error occurs. Transactions start with `BEGIN`,
    and changes are saved using `COMMIT`. If an error occurs, `ROLLBACK` undoes all
    the changes, maintaining database integrity. In general, transactions in PostgreSQL
    are typically used for data integrity and consistency in write operations like
    `INSERT`, `UPDATE`, and `DELETE`, but they can also be used in data analysis tasks
    when necessary. While pure data analysis usually involves `SELECT` queries, aggregations,
    and reporting without requiring transactions, certain situations may benefit from
    them. PostgreSQL is distinct from many other database engines due to its write-ahead
    log (WAL) mechanism, which enables rollback of even DDL (Data Definition Language)
    statements such as `CREATE`, `ALTER`, and `DROP`. This behavior further strengthens
    its transactional consistency and reliability.


    There are several causes of errors, including invalid input, constraints violations,
    and system failures. PostgreSQL provides exception handling mechanisms to manage
    such situations, particularly within functions and stored procedures. The `RAISE
    EXCEPTION` statement allows developers to generate custom error messages, while
    the `EXCEPTION` block enables structured error handling. Proper error management
    helps prevent unexpected failures, rolls back transactions safely, and provides
    meaningful feedback to users and applications.


    #### Basic Exception Handling


    A function can use the `EXCEPTION` block to catch and respond to errors. Here
    is an example that prevents division by zero errors:


    ```

    CREATE FUNCTION safe_divide(numerator INTEGER, denominator INTEGER)

    RETURNS FLOAT AS $$

    BEGIN

    IF denominator = 0 THEN

    RAISE EXCEPTION ''Error: Division by zero is not allowed'';

    ELSE

    RETURN numerator::FLOAT / denominator;

    END IF;

    END;

    $$ LANGUAGE plpgsql;

    ```


    This function named `safe_divide` is designed to perform division operations while
    preventing the common error of dividing by zero. The function accepts two integer
    parameters: `numerator` and `denominator`. When called, it first checks if the
    denominator equals 0 using an `IF` statement.


    Note


    Generally, `IF ELSE` is a conditional statement that allows a program to execute
    different blocks of code based on whether a condition is true or false. In PostgreSQL,
    `IF ELSE` is used inside functions, procedures, and `DO` blocks. For instance,
    the basic syntax is as follows:


    ```

    DO $$

    BEGIN

    IF 10 > 5 THEN

    RAISE NOTICE ''Condition is True'';

    ELSE

    RAISE NOTICE ''Condition is False'';

    END IF;

    END $$ LANGUAGE plpgsql;

    ```


    In PostgreSQL, a `DO` block is an anonymous code block that allows executing procedural
    logic without creating a function. It is useful for running temporary scripts,
    testing logic, or performing one-time operations.


    If the denominator is zero, the function raises an exception with a descriptive
    error message stating `"Error: Division by zero is not allowed"`, which prevents
    the operation from proceeding and alerts the user about the issue. If the denominator
    is not zero, the function proceeds to perform the division operation by first
    converting the numerator to a floating-point number (using the `::FLOAT` cast
    notation) and then dividing it by the denominator, returning the result as a floating-point
    number.


    Note


    In PostgreSQL functions, the `::` type cast operator is used to explicitly specify
    the return type of a value before it is returned. This ensures that the function
    always returns the correct data type and prevents implicit type conversion issues.
    Recall that in PostgreSQL, `::` is the type cast operator, used to explicitly
    convert one data type into another. It is an alternative to the `CAST()` function.
    But you should use `::` in function returns for the following reasons:


    1.  To ensure that the function returns the correct type.


    2.  To prevent implicit casting errors when dealing with mixed data types.


    3.  To clarify the type of expected output by explicitly stating it.


    Using this method ensures more precise results than dividing by integers. The
    function is written in PostgreSQL’s procedural language (PL/pgSQL), which extends
    standard SQL by supporting control structures and error-handling features not
    available in regular SQL.'
