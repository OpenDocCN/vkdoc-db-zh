    4.  进行借阅频率分析。尝试使用一个 CTE 来识别借阅图书超过 20 本的会员，并计算他们的平均借阅时长。

    5.  比较借阅者在两个时间段的行为。尝试使用一个嵌套查询来比较上半年与下半年的图书借阅数量。


    # 8. 数据绘图中的条件逻辑


    在本章中，你将学习 SQL 的条件逻辑如何改变数据分析和可视化工作流程。你将学习 SQL 中的条件逻辑，对数据进行分类，应用动态过滤以提高图表相关性从而增强可视化效果，为可视化创建颜色编码数据，使用条件表达式聚合数据，以及处理可视化中的缺失数据。


    本章的重点不在于如何可视化或绘制数据，而在于使用 SQL 在可视化之前准备数据的关键过程。本章的主要贡献是解释如何使用 SQL 在数据到达可视化阶段之前对其进行操作、清理和结构化。SQL
    本身不生成图表或图形表示；相反，它是一个强大的工具，用于将原始数据转换为适合分析的结构化格式。虽然其他编程语言和工具负责数据可视化，但 SQL 确保底层数据得到适当处理，使其准备好进行有效且有意义的表示。然而，一些数据库管理系统，例如用于
    PostgreSQL 的 `pgAdmin`，提供了有限的可视化工具来图形化显示查询结果。但这些并不是标准 SQL 本身的一部分——它们是数据库用户界面的功能。为了绘制数据，SQL
    可以与外部工具或编程语言结合使用，例如 Python（Matplotlib, Seaborn, Plotly, Pandas）、R（ggplot2, tidyverse）或
    BI 工具（Tableau, Power BI, Looker, Metabase）。


    ## 引言


    SQL 条件逻辑可以通过 `CASE`、`IF` 等表达式以及 `<`、`>`、`=` 等条件运算符来实现。使用这些结构，开发者可以根据特定标准动态转换或过滤数据。这使得
    SQL 查询更加灵活，并能适应复杂分析任务的需求，允许它们操作数据集以满足特定要求。例如，条件逻辑可以将数据分组到不同的组中，根据条件创建动态列，并在查询本身中执行上下文相关的计算。


    通过使用 SQL 条件表达式进行动态绘图，你可以增强数据分析能力，因为它们允许对数据集进行动态和上下文感知的绘图。作为数据准备的一部分，可以使用 `CASE`
    语句为绘图中的分类轴创建条件标签，例如对年龄范围或收入水平进行分组。要执行上下文感知的过滤，一种选择是使用条件过滤，根据分析特定的阈值或趋势来包含或排除数据点，确保图表反映出有意义的洞察。此外，对于派生指标，可以直接在查询中计算新指标以突出显示特定趋势，例如动态定义高或低绩效阈值。


    表 8-1 总结了常见的可视化图表类型以及用于准备数据的 PostgreSQL 查询。该表包括图表类型、其用例以及一个在 PostgreSQL 中准备数据的示例查询。本表中的每个示例查询都使用
    `sales_data` 表作为基础，并设有一个解释列来说明其目的。`sales_data` 表包含以下列：`date` (`DATE`)，表示交易日期；`region`
    (`VARCHAR`)，指示销售区域；`product` (`VARCHAR`)，指定产品名称；`category` (`VARCHAR`)，定义产品类别；`sales`
    (`NUMERIC`)，表示销售额；以及 `profit` (`NUMERIC`)，表示利润额。


    表 8-1


    常见的可视化图表类型及用于准备数据的 PostgreSQL 查询'
- fmt: '## 图表类型示例


    | 图表类型 | 使用场景 | 示例 PostgreSQL 查询 | 说明 |

    | --- | --- | --- | --- |

    | 条形图 | 比较分类数据，例如各地区销售额 | `SELECT region, SUM(sales) AS total_sales FROM sales_data
    GROUP BY region;` | 按地区对销售额进行分组，显示各地区的总销售额。 |

    | 折线图 | 显示随时间变化的趋势，例如股价 | `SELECT date, SUM(sales) AS daily_sales FROM sales_data
    GROUP BY date ORDER BY date;` | 汇总每日销售额以显示时间趋势。 |

    | 散点图 | 可视化两个数值变量之间的关系，例如身高与体重 | `SELECT sales, profit FROM sales_data;` | 提取销售额和利润值以可视化它们的关系。
    |

    | 饼图 | 显示类别的比例或百分比，例如市场份额 | `SELECT category, SUM(sales) AS total_sales FROM sales_data
    GROUP BY category;` | 按类别对销售额进行分组，显示总销售额的比例。 |

    | 直方图 | 显示频率分布，例如年龄分布 | `SELECT FLOOR(sales / 100) * 100 AS sales_range, COUNT(*)
    AS frequency FROM sales_data GROUP BY sales_range ORDER BY sales_range;` | 将销售额分段，例如
    0–100、100–200，并统计每个范围内的交易次数以形成分布。 |

    | 箱线图 | 显示数据分布和异常值，例如按班级的测试分数 | `SELECT region, sales FROM sales_data;` | 按地区检索销售额以分析分布并识别异常值。
    |

    | 热力图 | 显示两个变量的模式，例如按日期和时间的销售额 | `SELECT date, region, SUM(sales) AS total_sales
    FROM sales_data GROUP BY date, region;` | 按日期和地区对销售额进行分组，以在热力图中可视化模式。 |

    | 堆叠条形图 | 比较跨类别的比例，例如按产品和地区的销售额 | `SELECT region, category, SUM(sales) AS total_sales
    FROM sales_data GROUP BY region, category;` | 按地区和类别对销售额进行分组，以显示每个地区中类别的贡献。 |

    | 面积图 | 显示随时间变化的累积趋势，例如累计销售额 | `SELECT date, SUM(sales) OVER (ORDER BY date) AS
    cumulative_sales FROM sales_data;` | 计算随时间的累计销售额，以显示总销售额增长趋势。 |

    | 气泡图 | 表示三个维度，例如利润、销售额和地区 | `SELECT region, SUM(sales) AS total_sales, SUM(profit)
    AS total_profit FROM sales_data GROUP BY region;` | 按地区汇总销售额和利润以表示三个维度，例如气泡大小
    = 销售额。 |

    | 雷达图 | 比较类别的多个变量，例如性能指标 | `SELECT category, AVG(sales) AS avg_sales, AVG(profit)
    AS avg_profit FROM sales_data GROUP BY category;` | 按类别汇总平均销售额和利润以进行多维比较。 |

    | 瀑布图 | 可视化随时间或类别间的变化，例如利润率 | `SELECT product, SUM(sales) AS total_sales FROM
