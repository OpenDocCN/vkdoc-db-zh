    ## 使用 EXCEPTION 块进行错误处理


    `EXCEPTION WHEN` 子句用于捕获特定错误并定义替代操作。


    ```

    CREATE FUNCTION insert_employee(name TEXT, age INTEGER)

    RETURNS VOID AS $$

    BEGIN

    INSERT INTO employees (employee_name, employee_age) VALUES (name, age);

    EXCEPTION

    WHEN unique_violation THEN

    RAISE NOTICE ''Employee with the same name already exists.'';

    WHEN check_violation THEN

    RAISE NOTICE ''Age must be a positive number.'';

    WHEN others THEN

    RAISE NOTICE ''An unknown error occurred.'';

    END;

    $$ LANGUAGE plpgsql;

    ```


    `insert_employee` 函数创建员工记录并处理常见错误。该函数接受两个参数：`name`，一个表示员工姓名的文本字符串，和 `age`，一个表示员工年龄的整数值。执行时，它尝试将这些值插入
    `Employees` 表，具体是插入到 `employee_name` 和 `employee_age` 列。由于其全面的异常处理，该函数特别健壮。如果插入操作违反了唯一性约束（通常意味着数据库中已存在同名员工），它会捕获
    `unique_violation` 错误并向用户显示通知。同样，如果 `age` 参数违反了检查约束（可能要求年龄为正数），它会捕获 `check_violation`
    错误并通知用户年龄必须为正。最后，它包含一个用于处理插入过程中可能发生的任何其他意外错误的后备异常处理器。该函数返回 `VOID`，这意味着它不返回任何值，只是执行插入操作并进行适当的错误处理。表
    10-12 总结了用于处理异常的不同错误类型和用例。


    表 10-12

    用于处理异常的错误类型和用例


    | 错误类型 | 描述 | 用例 |

    | --- | --- | --- |

    | `unique_violation` | 捕获在具有 `UNIQUE` 约束的列中插入重复值相关的错误。 | 防止插入重复的主键或唯一值。 |

    | `check_violation` | 处理违反 `CHECK` 约束（例如负值）时的错误。 | 确保值遵循预定义规则，例如年龄必须为正。 |

    | `others` | 捕获任何与特定类型不匹配的未处理错误。 | 通过优雅地处理意外错误来防止崩溃。 |


