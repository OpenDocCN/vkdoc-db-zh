  trans: '## 最终思考：人工智能（AI）时代数据叙事者的传承


    正如你所了解的，数据叙事是将复杂数据转化为引人入胜、富有意义的叙述的能力。数据叙事者需要清晰度、上下文和互动性。通过清晰呈现数据并赋予其背景和关联，叙事者能与受众在情感层面建立连接。这使得数据不仅具有信息性，而且通过理解受众的需求而变得有趣。同时，它还需要选择正确的可视化方式并强调故事的核心信息。


    随着技术进步，数据叙事也在不断演变。工具和技术会发展，但有效传达数据的核心需求将保持不变。这促使分析师们持续精进他们的数据叙事技能，这一点至关重要。数据叙事的未来将是动态的，但其目标将始终是让数据对所有人而言都易于获取、易于理解且可付诸行动。


    毫无疑问，诸如大语言模型（LLMs）和高级语言模型等现象的出现，给该领域内或计划未来进入该领域的许多人带来了诸多担忧。近年来，生成式 AI 和 LLMs 已经彻底改变了查询编写和数据分析。这些技术能够实现自动化
    SQL 查询生成、用于提取洞察的自然语言处理，甚至预测性分析。通过降低技术门槛，它们赋能更广泛的受众以更简单的方式与数据交互。随着这些 AI 工具的持续进步，它们将进一步提升数据分析的速度、效率和准确性。这将使得从大型数据集中挖掘洞察并创建引人入胜的叙述变得更加容易。


    尽管 AI 的出现为编写查询带来了诸多优势，但一个重大的问题也随之产生。虽然 LLMs 确实可以生成 SQL 查询并帮助自动化数据分析任务，但学习 SQL
    是否仍有其逻辑上的理由？


    作为本书的作者，在 2025 年 4 月撰写本章时，我对这个问题的答案是“绝对肯定的”——分析师仍然需要学习编程语言、查询编写以及许多 AI 可以完成的技能。事实上，我认为掌握
    SQL 能让分析师理解查询背后的逻辑。这不仅有助于他们理解模型生成的内容，还能根据特定需求修改和优化查询。如果不理解 SQL，当他们遇到复杂的数据结构或 LLMs
    无法自动妥善处理的特定需求时，可能会在调整查询时遇到困难。LLMs 可以基于其训练所用的模式生成查询，但它们可能并不总是能为每个特定情况生成最高效或最符合语境的查询。通过学习
    SQL，分析师能够学会如何定制查询以满足其确切需求、优化查询性能并确保遵循最佳实践。对于未返回预期结果或性能不佳的 LLMs 查询，可以利用 SQL 知识进行诊断。可以解读错误信息、识别性能问题并优化查询。


    总而言之，虽然 LLMs 可以辅助生成查询，但 SQL 仍是一项基本技能，使分析师能够管理、理解和排查其数据库系统的问题。


    无论如何，我希望你阅读和实践本书所投入的时间和精力，将帮助你学习数据分析、查询编写以及在数据世界中讲述故事的能力。最后，我必须说明，仅阅读一本书不足以成为专业的数据分析师。我建议你始终更新你的知识和技能。作为一名数据分析师，我建议你扎实掌握基础知识，并保持自我激励去学习更多。在你继续数据叙事之旅时，请记住，每个数据集都有一个等待被讲述的故事。数据叙事的世界广阔且不断变化，但你赋予数据意义的角色始终有价值。


    ## 本章总结


    本章探讨了有效呈现数据故事的艺术，确保洞见清晰、有说服力且可操作。你学习了如何构建叙述结构、选择有影响力的可视化，并运用叙事原则与受众互动。还讨论了数据驱动文化，以及引导受众解读、鼓励进一步探索和开展进一步研究的策略。运用这些策略，可以将原始数据转化为有意义的洞见，以促进明智决策。


    ## 关键点


    *   数据故事需要用清晰的叙述和有吸引力的可视化进行构建，以确保其既易于理解又引人入胜。

    *   针对不同受众调整演示文稿能增强理解，并鼓励基于数据做出决策。

    *   虽然 AI 和语言模型可以辅助生成查询，但 SQL 仍是一项基本技能，使分析师能够管理、理解和排查其数据库问题。


    ## 核心要点


    *   **有效的数据叙述**：呈现一个结构清晰、有开头、发展和结尾的数据故事的能力，能提升受众的参与度和理解度。

    *   **策略性可视化选择**：选择正确的图表和视觉元素，将确保你的数据被清晰且令人信服地传达。

    *   **以受众为中心的沟通**：使演示文稿与不同受众相关，能促进更好的理解并推动数据驱动的决策制定。


    # 附录 A：SQL 语法参考指南


    本附录旨在为使用 SQL 进行数据分析的读者提供快速参考指南。它侧重于核心元素，如基本 SQL 语法、关键 SQL 关键字和标准命令结构。本指南不深入探讨详尽的理论细节，而是重点介绍在查询、操作和管理数据时常用的实用语法模式。'
- fmt: '## SQL Terminology


    Whenever it comes to SQL, it’s essential to distinguish between several core components
    that make up the language’s structure and functionality. At the top level are
    statements, which are complete instructions that perform actions on a database.
    These instructions include `SELECT` to retrieve data, `INSERT` to add data, `UPDATE`
    to modify data, `DELETE` to remove data, and `CREATE TABLE` to define SQL’s structures.


    Within these statements are clauses, which act as building blocks that refine
    the statement’s intent. Clauses like `FROM`, `WHERE`, `GROUP BY`, `ORDER BY`,
    and `HAVING` specify sources, filters, and grouping logic. Operations refer to
    specific actions applied to data, including arithmetic (+, -), comparison (=,
    <, >), and logical operations (`AND`, `OR`, `NOT`). SQL also includes functions,
    which are predefined routines for calculations and transformations—such as `SUM()`,
    `AVG()`, `COUNT()`, `MAX()`, and string and date functions like `UPPER()` or `NOW()`.
    These components often come together in expressions, which combine values, operators,
    and functions to produce a single result. The term *command* is sometimes used
    interchangeably with statement, especially in command-line interfaces where interactions
    with the database system occur. Table [A-1](#Backmatter_001.xhtml#Tab1) shows
    this terminology.


    Table A-1: SQL Terminology


    | Component | Description | Examples |

    | --- | --- | --- |

    | Statements | Complete instructions that perform actions on the database. | `SELECT`
    retrieves data |

    | | | `INSERT` adds new data |

    | | | `UPDATE` modifies existing data |

    | | | `DELETE` removes data |

    | | | `CREATE TABLE` defines a new table |

    | Clauses | Parts of SQL statements that specify sources, conditions, or actions.
    | `FROM` specifies source table(s) |

    | | | `WHERE` filters rows based on conditions |

    | | | `GROUP BY` groups rows with similar values |

    | | | `ORDER BY` sorts the result set |

    | | | `HAVING` filters grouped results |

    | Operations | Actions applied to values in expressions. | Arithmetic: +, -, *,
    / |

    | | | Comparison: =, <, >, != |

    | | | Logical: `AND`, `OR`, and `NOT` |

    | Functions | Predefined routines for calculations or data manipulation. | `SUM()`
    adds values |

    | | | `AVG()` calculates average |

    | | | `COUNT()` counts rows |

    | | | `MAX()`, `MIN()` finds extremes |

    | | | `UPPER()`, `LOWER()` changes case |

    | | | `NOW()`, `DATEADD()` |


    ## SQL Basics


    SQL statements are categorized into functional groups based on their role in database
    management. Table [A-2](#Backmatter_001.xhtml#Tab2) illustrates the four main
    types of SQL statements, categorized by their purpose, description, and common
    commands used in database operations.


    Table A-2: Four Main Types of SQL Statements


    | Category | Description | Common Commands |

    | --- | --- | --- |

    | Data Definition Language (DDL) | Defines and modifies database schema and structure.
    | `CREATE`, `ALTER`, `DROP`, `TRUNCATE` |

    | Data Manipulation Language (DML) | Manages data within tables. | `SELECT`, `INSERT`,
    `UPDATE`, `DELETE` |

    | Data Control Language (DCL) | Controls access and permissions. | `GRANT`, `REVOKE`
    |

    | Transaction Control Language (TCL) | Manages transactions within the database.
    | `BEGIN`, `COMMIT`, `ROLLBACK`, `SAVEPOINT` |


    Among all the mentioned main types of SQL statements, DML is the most frequently
    used for data analysis. Table [A-3](#Backmatter_001.xhtml#Tab3) shows four essential
    DML commands, highlighting their purpose, basic syntax, and example use cases
    for managing data within a database.


    Table A-3: Essential DML Commands


    | Command | Purpose | Basic Syntax | Example Use Case |

    | --- | --- | --- | --- |

    | `SELECT` | Retrieves data from one or more tables. | `SELECT column1, column2
    FROM table_name WHERE condition;` | Get all customer names from the `Customers`
    table. |

    | `INSERT` | Adds new rows of data to a table. | `INSERT INTO table_name (column1,
    column2) VALUES (value1, value2);` | Add a new product to the `Products` table.
    |

    | `UPDATE` | Modifies existing data in a table. | `UPDATE table_name SET column1
    = value1 WHERE condition;` | Change a customer''s email address in the `Customers`
    table. |

    | `DELETE` | Removes rows from a table. | `DELETE FROM table_name WHERE condition;`
    | Remove discontinued products from the `Products` table. |


    Table [A-4](#Backmatter_001.xhtml#Tab4) illustrates key DDL commands, outlining
    their purpose, basic syntax, and example use cases for defining and modifying
    database structures.


    Table A-4: Essential DDL Commands


    | Command | Purpose | Basic Syntax | Example Use Case |

    | --- | --- | --- | --- |

    | `CREATE TABLE` | Defines a new table and its structure. | `CREATE TABLE table_name
    (column1 datatype, column2 datatype, ...);` | Create a users table with ID, name,
    and email. |

    | `ALTER TABLE` | Modifies an existing table. | `ALTER TABLE table_name ADD column_name
    datatype;`<br>`ALTER TABLE table_name DROP COLUMN column_name;` | Add an `Age`
    column to the `Users` table. |

    | `DROP TABLE` | Permanently removes a table and its data. | `DROP TABLE table_name;`
    | Delete the `archived_orders` table. |

    | `TRUNCATE TABLE` | Removes all rows from a table (faster than `DELETE`). | `TRUNCATE
    TABLE table_name;` | Quickly clear all data from a `Logs` table. |


    SQL supports a range of data types to represent different kinds of values. Table
    [A-5](#Backmatter_001.xhtml#Tab5) summarizes commonly used, PostgreSQL-compatible,
    SQL data types.


    Table A-5: Common Data Types (PostgreSQL-Compatible)


    | Data Type | Description | Example Use Case |

    | --- | --- | --- |

    | `INT, INTEGER` | Whole numbers | Counting records, IDs |

    | `DECIMAL(p,s), NUMERIC(p,s)` | Exact decimal numbers | Financial data, currency
    |

    | `REAL, DOUBLE PRECISION` | Approximate numeric values | Scientific or statistical
    data |

    | `CHAR(n), VARCHAR(n)` | Fixed or variable-length strings | Names, email addresses
    |

    | `TEXT` | Large text strings | Comments, descriptions |

    | `DATE, TIME, TIMESTAMP` | Date and time values | Birthdates, transaction logs
    |

    | `BOOLEAN` | True/false values | Flags, binary states |

    | `BYTEA` | Binary data (alternative to BLOB) | Storing images, files, documents
    |'
  raw: '## SQL Terminology


    Whenever it comes to SQL, it’s essential to distinguish between several core components
    that make up the language’s structure and functionality. At the top level are
    statements, which are complete instructions that perform actions on a database.
    These instructions include `SELECT` to retrieve data, `INSERT` to add data, `UPDATE`
    to modify data, `DELETE` to remove data, and `CREATE TABLE` to define SQL’s structures.


    Within these statements are clauses, which act as building blocks that refine
    the statement’s intent. Clauses like `FROM`, `WHERE`, `GROUP BY`, `ORDER BY`,
    and `HAVING` specify sources, filters, and grouping logic. Operations refer to
    specific actions applied to data, including arithmetic (+, -), comparison (=,
    <, >), and logical operations (`AND`, `OR`, `NOT`). SQL also includes functions,
    which are predefined routines for calculations and transformations—such as `SUM()`,
    `AVG()`, `COUNT()`, `MAX()`, and string and date functions like `UPPER()` or `NOW()`.
    These components often come together in expressions, which combine values, operators,
    and functions to produce a single result. The term *command* is sometimes used
    interchangeably with statement, especially in command-line interfaces where interactions
    with the database system occur. Table [A-1](#Backmatter_001.xhtml#Tab1) shows
    this terminology.


    Table A-1


    SQL Terminology


    | Component | Description | Examples |

    | --- | --- | --- |

    | Statements | Complete instructions that perform actions on the database. | `SELECT`
    retrieves data |

    | `INSERT` adds new data |

    | `UPDATE` modifies existing data |

    | `DELETE` removes data |

    | `CREATE TABLE` defines a new table |

    | Clauses | Parts of SQL statements that specify sources, conditions, or actions.
    | `FROM` specifies source table(s) |

    | `WHERE` filters rows based on conditions |

    | `GROUP BY` groups rows with similar values |

    | `ORDER BY` sorts the result set |

    | `HAVING` filters grouped results |

    | Operations | Actions applied to values in expressions. | Arithmetic: +, -, *,
    / |

    | Comparison: =, <, >, != |

    | Logical: `AND`, `OR`, and `NOT` |

    | Functions | Predefined routines for calculations or data manipulation. | `SUM()`
    adds values |

    | `AVG()` calculates average |

    | `COUNT()` counts rows |

    | `MAX()`, `MIN()` finds extremes |

    | `UPPER()`, `LOWER()` changes case |

    | `NOW()`, `DATEADD()` |


