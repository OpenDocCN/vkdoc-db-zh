    | 刘易斯·汉密尔顿 | 银石赛道 | 1 |

    | 塞尔吉奥·佩雷兹 | 蒙扎赛道 | 1 |

    | 乔治·拉塞尔 | 斯帕-弗朗科尔尚赛道 | 1 |

    | 费尔南多·阿隆索 | 铃鹿赛道 | 1 |

    | 埃斯特班·奥康 | 蒙特卡洛赛道 | 1 |


    ## 计算平均圈速


    娜塔莉编写了以下查询，以找出每位车手在所有比赛中的平均圈速，从而回答关于车手一致性的问题。这简化了报告流程，特别是在多个仪表板或报告中需要此指标时。视图还能确保只有一个真实数据源，保持所有分析中计算的一致性。


    ```sql

    CREATE VIEW avg_lap_time AS

    SELECT d.name, AVG(res.lap_time_sec) AS avg_time

    FROM results res

    JOIN drivers d ON res.driver_id = d.driver_id

    GROUP BY d.name;

    ```


    此 SQL 查询创建了一个名为`avg_lap_time`的视图，用于计算每位车手的平均圈速。它从`Drivers`表中选择车手姓名，并从`Results`表中计算以秒为单位的平均圈速。该查询使用`driver_id`作为公共键连接这两个表，从而将圈速与相应的车手匹配。结果按车手姓名分组，这意味着视图将显示每位车手的姓名及其在所有记录比赛中的平均圈速。使用此视图，可以快速比较车手在速度方面的整体表现。表
    9-11 展示了车手姓名及其计算得出的以秒为单位的平均圈速。


