- fmt: '## Using the EXCEPTION Block for Error Handling


    The `EXCEPTION WHEN` clause catches specific errors and defines alternative actions.


    ```

    CREATE FUNCTION insert_employee(name TEXT, age INTEGER)

    RETURNS VOID AS $$

    BEGIN

    INSERT INTO employees (employee_name, employee_age) VALUES (name, age);

    EXCEPTION

    WHEN unique_violation THEN

    RAISE NOTICE ''Employee with the same name already exists.'';

    WHEN check_violation THEN

    RAISE NOTICE ''Age must be a positive number.'';

    WHEN others THEN

    RAISE NOTICE ''An unknown error occurred.'';

    END;

    $$ LANGUAGE plpgsql;

    ```


    The `insert_employee` function creates a record for an employee and handles common
    errors. The function takes two parameters: `name`, a text string representing
    the employee’s name, and `age`, an integer value for the employee’s age. When
    executed, it attempts to insert these values into the `Employees` table, specifically
    into the `employee_name` and `employee_age` columns. This function is particularly
    robust due to its comprehensive handling of exceptions. If the insertion violates
    a unique constraint, likely indicating that an employee with the same name already
    exists in the database, it captures the `unique_violation` error and displays
    a notice to the user. Similarly, if the `age` parameter fails a check constraint
    (probably requiring that age be positive), it catches the `check_violation` error
    and informs the user that age must be positive. Finally, it includes a fallback
    exception handler for any other unexpected errors that might occur during the
    insertion process. This function returns `VOID`, meaning it doesn’t return any
    value but simply performs the insertion operation with appropriate error handling.
    Table [10-12](#619961_1_En_10_Chapter.xhtml#Tab12) summarizes the different error
    types and use cases for handling exceptions.


    Table 10-12

    Error types and Use Cases for Handling Exceptions


    | Error Type | Description | Use Case |

    | --- | --- | --- |

    | `unique_violation` | Catches errors related to inserting duplicate values in
    columns with a `UNIQUE` constraint. | Prevents inserting duplicate primary keys
    or unique values. |

    | `check_violation` | Handles errors when `CHECK` constraints, for instance negative
    values are violated. | Ensures that values follow predefined rules for instance,
    age must be positive. |

    | `others` | Catches any unhandled errors that don’t match specific types. | Prevents
    crashes by handling unexpected errors gracefully. |


    ## The First Story: Online Clothing Market


    Mary is a data analyst at Fashion Flow, an online clothing marketplace. Her job
    is to analyze sales, customer behavior, and inventory using SQL. As shown in Tables
    [10-13](#619961_1_En_10_Chapter.xhtml#Tab13), [10-14](#619961_1_En_10_Chapter.xhtml#Tab14),
    and [10-15](#619961_1_En_10_Chapter.xhtml#Tab15), the company’s database contains
    tables for orders, customers, and products. Mary needs to answer several business
    questions and perform a few tasks:


    Table 10-15

    The Orders Table


    | order_id | customer_id | product_id | Quantity | order_date | total_price |

    | --- | --- | --- | --- | --- | --- |

    | 1 | 1 | 101 | 2 | 2023-02-05 | 40 |

    | 2 | 2 | 102 | 1 | 2023-02-10 | 50 |

    | 3 | 3 | 103 | 1 | 2023-02-15 | 100 |

    | 4 | 4 | 104 | 2 | 2023-02-20 | 160 |

    | 5 | 5 | 105 | 1 | 2023-02-25 | 60 |

    | 6 | 1 | 102 | 1 | 2023-03-01 | 50 |

    | 7 | 3 | 101 | 3 | 2023-03-05 | 60 |

    | 8 | 4 | 105 | 2 | 2023-03-10 | 120 |


    Table 10-14

    The Products Table


    | product_id | Name | Category | Price | Stock | Attributes (JSON) |

    | --- | --- | --- | --- | --- | --- |

    | 101 | T-Shirt | Clothing | 20 | 100 | `{"color": "red", "size": "M"}` |

    | 102 | Jeans | Clothing | 50 | 50 | `{"color": "blue", "size": "L"}` |

    | 103 | Jacket | Clothing | 100 | 30 | `{"color": "black", "size": "XL"}` |

    | 104 | Sneakers | Footwear | 80 | 40 | `{"color": "white", "size": "10"}` |

    | 105 | Hoodie | Clothing | 60 | 25 | `{"color": "gray", "size": "L"}` |


    Table 10-13

    The Customers Table


    | customer_id | Name | Email | signup_date | total_spent |

    | --- | --- | --- | --- | --- |

    | 1 | Alice | `alice@mail.com` | 2022-03-15 | 300.5 |

    | 2 | Bob | `bob@mail.com` | 2021-07-10 | 150 |

    | 3 | Carol | `carol123@mail.com` | 2023-01-20 | 450.75 |

    | 4 | David | `dave99@mail.com` | 2021-12-05 | 1200 |

    | 5 | Eve | `eve_wonder@mail.com` | 2022-08-25 | 550.25 |


    *   What is the total revenue generated and the average order value?

    *   How many sales occurred each month?

    *   Which product has been ordered the most?

    *   Who are the top customers by spending?

    *   What are the email domains of customers?

    *   What are the colors of the available products?

    *   Ensure that if stock data is missing, it shows “Out of Stock.”

    *   Can Mary create a function that assigns a “loyalty score” based on the total
    amount a customer has spent?

    *   What PostgreSQL version is running, and who is the current user?


    The following query uses aggregate functions to calculate the total revenue generated
    and the average order value:


    ```

    SELECT

    SUM(total_price) AS total_revenue,

    AVG(total_price) AS avg_order_value

    FROM orders;

    ```


    Table [10-16](#619961_1_En_10_Chapter.xhtml#Tab16) illustrates the total revenue
    generated and the average order value.


    Table 10-16

    The Total Revenue Generated and the Average Order Value


    | total_revenue | avg_order_value |

    | --- | --- |

    | 640 | 80.00000 |


    The following query calculates sales trends per month:


    ```

    SELECT

    DATE_TRUNC(''month'', order_date) AS month,

    COUNT(order_id) AS total_orders

    FROM orders

    GROUP BY month

    ORDER BY month;

    ```


    Table [10-17](#619961_1_En_10_Chapter.xhtml#Tab17) illustrates sales trends per
    month.


    Table 10-17

    Sales Trends Per Month


    | Month | total_orders |

    | --- | --- |

    | 2023-02-01 | 5 |

    | 2023-03-01 | 3 |


    The following query finds the best-selling products.


    ```

    SELECT

    product_id,

    SUM(quantity) AS total_sold,

    RANK() OVER (ORDER BY SUM(quantity) DESC) AS rank

    FROM orders

    GROUP BY product_id;

    ```


    Table [10-18](#619961_1_En_10_Chapter.xhtml#Tab18) illustrates the best-selling
    products.


    Table 10-18

    Best-Selling Products


    | product_id | total_sold | Rank |

    | --- | --- | --- |

    | 101 | 5 | 1 |

    | 105 | 3 | 2 |

    | 104 | 2 | 3 |

    | 102 | 2 | 3 |

    | 103 | 1 | 5 |


    The following query uses `SUM()` and `RANK()` functions to identify top spending
    customers.


    ```

    SELECT

    customer_id,

    SUM(total_price) AS total_spent,

    RANK() OVER (ORDER BY SUM(total_price) DESC) AS rank

    FROM orders

    GROUP BY customer_id;

    ```


    Table [10-19](#619961_1_En_10_Chapter.xhtml#Tab19) illustrates the top spending
    customers.'
  raw: '#### Using the EXCEPTION Block for Error Handling


    The `EXCEPTION WHEN` clause catches specific errors and defines alternative actions.


    ```

    CREATE FUNCTION insert_employee(name TEXT, age INTEGER)

    RETURNS VOID AS $$

    BEGIN

    INSERT INTO employees (employee_name, employee_age) VALUES (name, age);

    EXCEPTION

    WHEN unique_violation THEN

    RAISE NOTICE ''Employee with the same name already exists.'';

    WHEN check_violation THEN

    RAISE NOTICE ''Age must be a positive number.'';

    WHEN others THEN

    RAISE NOTICE ''An unknown error occurred.'';

    END;

    $$ LANGUAGE plpgsql;

    ```


    The `insert_employee` function creates a record for an employee and handles common
    errors. The function takes two parameters: `name`, a text string representing
    the employee’s name, and `age`, an integer value for the employee’s age. When
    executed, it attempts to insert these values into the `Employees` table, specifically
    into the `employee_name` and `employee_age` columns. This function is particularly
    robust due to its comprehensive handling of exceptions. If the insertion violates
    a unique constraint, likely indicating that an employee with the same name already
    exists in the database, it captures the `unique_violation` error and displays
    a notice to the user. Similarly, if the `age` parameter fails a check constraint
    (probably requiring that age be positive), it catches the `check_violation` error
    and informs the user that age must be positive. Finally, it includes a fallback
    exception handler for any other unexpected errors that might occur during the
    insertion process. This function returns `VOID`, meaning it doesn’t return any
    value but simply performs the insertion operation with appropriate error handling.
    Table [10-12](#619961_1_En_10_Chapter.xhtml#Tab12) summarizes the different error
    types and use cases for handling exceptions.


    Table 10-12


    Error types and Use Cases for Handling Exceptions


    | Error Type | Description | Use Case |

    | --- | --- | --- |

    | `unique_violation` | Catches errors related to inserting duplicate values in
    columns with a `UNIQUE` constraint. | Prevents inserting duplicate primary keys
    or unique values. |

    | `check_violation` | Handles errors when `CHECK` constraints, for instance negative
    values are violated. | Ensures that values follow predefined rules for instance,
    age must be positive. |

    | `others` | Catches any unhandled errors that don’t match specific types. | Prevents
    crashes by handling unexpected errors gracefully. |


