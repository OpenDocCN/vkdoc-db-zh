  trans: '## 测试你的技能


    某城市的一家藏书丰富、用户众多的公共图书馆，聘请杰克担任数据分析师。图书馆管理层希望通过了解借阅模式、热门图书和会员活动来改善用户体验。杰克的目标是使用包含子查询、嵌套查询和多级查询的动态对话，从图书馆数据库中提取洞察。表
    7-28 展示了 `BookLoans` 表；表 7-29 展示了 `Borrowers` 表；表 7-30 展示了 `Books` 表。


    表 7-30


    图书表


    | 列名 | 描述 |

    | --- | --- |

    | `book_id` | 每本书的唯一标识符（主键） |

    | `book_title` | 书名 |

    | `author` | 作者 |

    | `genre` | 图书类型 |

    | `published_year` | 出版年份 |


    表 7-29


    会员表


    | 列名 | 描述 |

    | --- | --- |

    | `member_id` | 每位会员的唯一标识符（主键） |

    | `name` | 会员全名 |

    | `membership_type` | 会员类型（例如，普通会员、高级会员） |

    | `signup_date` | 会员加入图书馆的日期 |


    表 7-28


    图书借阅表


    | 列名 | 描述 |

    | --- | --- |

    | `loan_id` | 每次图书借阅的唯一标识符 |

    | `member_id` | 每位会员的唯一标识符 |

    | `book_title` | 所借图书的书名 |

    | `borrow_date` | 图书借出日期 |

    | `return_date` | 图书归还日期 |

    | `loan_duration` | 借阅时长（天数）（`return_date` - `borrow_date`） |

    | `borrow_count` | 该图书被借阅的次数 |


    1.  确定哪些图书借阅频率最高。尝试编写一个使用子查询的语句，从 `BookLoans` 表中找出借阅次数最多的前五本书。

    2.  确定哪些会员的平均借阅时长最长。尝试使用一个多级查询来计算每位会员的平均借阅时长，并识别出平均借阅时长最长的前三名会员。

    3.  分析近期的借阅模式。尝试编写一个使用子查询的语句，列出最近的十次借阅记录，包括 `member_id` 和 `book_title`，并按 `borrow_date`
