- fmt: '## 关键点


    *   `Data`：数据由各种可数字存储、处理和分析的信息类型组成，是洞察和决策的基础。

    *   `Databases`：数据库在存储、组织和管理数据方面发挥着基础作用，为有效的数据分析和叙事奠定基础。

    *   关系型与非关系型数据库：关系型数据库将数据组织成通过关系链接的表，而非关系型数据库以非表格形式存储数据，以满足多样化的数据存储需求。

    *   选择 `PostgreSQL`：`PostgreSQL` 提供了健壮性、广泛的功能以及强大的社区支持，使其成为学习和使用 SQL 进行数据叙事的合适选择。

    *   理解 `SQL`：`SQL` 是数据库交互的关键语言，涵盖了其在查询、更新和管理数据方面的重要性。

    *   `SQL` 命令类别：`SQL` 命令分为 `DDL`、`DML`、`DCL`、`TCL` 和 `DQL`，为理解它们在数据库操作中的作用提供了基础。

    *   设置叙事环境：设置 `PostgreSQL` 环境，从安装到创建第一个数据库和表，为数据驱动的叙事做好准备。

    *   `SQL` 数据类型：`SQL` 数据类型（数值、字符串、日期和时间、布尔值、二进制及特殊类型）能够准确地存储和操作数据。

    *   开始数据分析和叙事：通过 `SQL` 查询，开始一段发现模式、趋势和洞察的旅程，为叙事奠定基础。


    ## 关键要点


    *   数据和数据库：对于存储和分析信息至关重要，是决策的支柱。

    *   `PostgreSQL`：因其健壮性和适合在 `SQL` 和数据叙事方面进行教育而被选用。

    *   `SQL` 基础知识：涵盖了 `SQL` 在数据库操作中的重要性，并介绍了基本命令和数据类型。


    当你探索 `SQL` 时，你了解到它不仅可以用来查询数据。`SQL` 还可以讲述引人入胜的故事。在设置好叙事环境后，你现在已准备好深入研究 `SQL` 的复杂性。


    ## 展望未来


    当你进入下一章“从 `SELECT` 开始”时，你将深入探讨如何使用 `SQL` 中最常用的命令来有效地检索和操作数据。这包括学习如何构建精确的 `SELECT`
    语句来提取叙事所需的正确数据。这将为更高级的数据操作和分析技术奠定基础。


    # 2. 从 SELECT 开始


    在本章中，你将学习从数据库检索数据的基础 `SQL` 命令。本章通过叙述和实际示例演示 `SELECT` 语句的多功能性，展示其在简单和复杂的数据检索场景中如何使用。


    ## SELECT 简介


    `SELECT` 语句是最基本和最常用的 `SQL` 命令之一，几乎是每个查询操作的核心。对于任何 `SQL` 用户来说，它是从数据库检索数据的必备工具。从本质上讲，`SELECT`
    语句允许你精确指定要从哪些表中检索哪些数据，并且可以通过各种子句进行微调，以满足精确的数据检索需求。`SELECT` 不仅仅是将数据从数据库中提取出来；它是选择能够回答特定问题或满足特定信息需求的正确数据片段。因此，`SELECT`
    语句可以将原始数据转化为有意义的信息。


    ### SELECT 在数据叙事中的重要性


    在数据叙事方面，`SELECT` 超越了数据检索，成为辅助叙事构建的工具。数据叙事是将数据编织成对受众有意义的叙事，帮助他们通过现实世界的故事理解复杂信息。


    例如，为了提取构成这些故事基础的数据点，可以使用 `SELECT` 来提取各种数据点。考虑一个包含多年销售数据的数据库，这些数据是在一段时间内收集的。叙事者可以使用
    `SELECT` 命令来检索主要活动或假期期间的总销售额并进行分析。仔细选择数据可以更多地揭示特定时期内的消费者行为。通过选择特定的数据，叙事者可以强调能够说明趋势、支持假设或解释现象的信息，这种方式在视觉和语境上都具有说服力。


    ### SELECT 语句的剖析


    `SELECT` 语句的结构和语法对于最大化 `SQL` 在数据检索和叙事中的能力至关重要。本小节分解了 `SELECT` 语句的基本组成部分，包括如何选择列和使用别名使查询更具可读性。


    #### 基本结构和语法


    `SELECT` 语句用于查询数据库并检索指定的数据。最基础地，`SELECT` 语句必须指定两个关键信息：要选择什么以及从哪里选择。语法易于理解：


    ```

    SELECT column1, column2, ...

    FROM tableName;

    ```


    在此结构中：


    *   `SELECT` 表示你即将指定要检索的列或表达式列表。

    *   `column1, column2, ...` 是你希望从数据库表中选择的具体列。你也可以使用 `*` 字符来选择表中的所有列。

    *   `FROM tableName` 指定从中检索数据的表。


    这个简单的语法是构建更复杂查询的起点，包括那些过滤、分组或排序数据的查询。


    ## 第一个故事：书店周年庆


    这个故事基于一个名为 `Customers` 的数据库。每个角色都有独特的背景和故事。John Doe、Jane Smith 和 Alice Johnson
    是一家书店的老顾客。书店下个月将庆祝周年纪念日。如果其尊贵的顾客能够参加，这次活动将会取得成功。这需要为每位注册客户准备个性化的邀请函，而这些邀请函所需的关键信息包括每位客户的全名和电子邮件地址。表
    [2-1](#619961_1_En_2_Chapter.xhtml#Tab1) 显示了名为 `Customers` 的表。


    表 2-1


    Customers 表


    | CustomerID | FirstName | LastName | Email | DateOfBirth | Neighborhood | Address
    | ZIP Code | Phone Number |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1 | John | Doe | `johndoe@example.com` | 1980-05-15 | Downtown | 123 Elm St.
    | 90210 | (555) 321-9876 |

    | 2 | Jane | Smith | `janesmith@example.com` | 1975-07-20 | Midtown | 456 Oak
    Ave. | 90212 | (555) 654-1234 |

    | 3 | Alice | Johnson | `alicej@example.com` | 1990-11-12 | Eastside | 789 Pine
    Rd. | 90213 | (555) 789-2342 |'
  raw: '## Key Points


    *   **Data**: Data consists of a wide range of information types that can be digitally
    stored, processed, and analyzed, serving as the foundation for insights and decision-making.


    *   **Databases**: Databases can play a fundamental role in storing, organizing,
    and managing data, setting the stage for effective data analysis and storytelling.


    *   **Relational vs. non-relational databases**: Relational databases organize
    data into tables linked by relationships, whereas non-relational databases store
    data in a non-tabular form, in response to diverse data storage needs.


    *   **Choosing PostgreSQL**: PostgreSQL offers robustness, a wide range of features,
    as well as strong community support, making it a suitable choice for learning
    and using SQL in data storytelling.


    *   **Understanding SQL**: SQL is an essential language for database interaction,
    covering its significance in querying, updating, and managing data.


    *   **SQL command categories**: SQL commands are categorized into DDL, DML, DCL,
    TCL, and DQL, providing a foundational understanding of their roles in database
    operations.


    *   **Setting up a storytelling environment**: Setting up a PostgreSQL environment,
    from installation to creating their first database and tables, enables data-driven
    storytelling.


    *   **SQL data types**: SQL data types (numeric, string, date and time, Boolean,
    binary, and specialized types) enable accurate storing and manipulating of data.


    *   **Getting started with data analysis and storytelling**: Through SQL queries,
    a journey of uncovering patterns, trends, and insights begins to lay the foundation
    for narratives.


    ## Key Takeaways


    *   **Data and databases**: Essential for storing and analyzing information, which
    serves as the backbone for decision-making.


    *   **PostgreSQL**: Chosen for its robustness and suitability for educational
    purposes in SQL and data storytelling.


    *   **SQL basics**: Covered the importance of SQL in database operations and introduced
    the basic commands and data types.


    As you’ve explored SQL, you’ve learned that it can be used not just to query data.
    SQL can also tell compelling stories. After setting up the storytelling environment,
    you are now ready to dive deeper into SQL’s complexities.


    ## Looking Ahead


    As you move into the next chapter, “Starting with `SELECT`,” you will delve into
    how to retrieve and manipulate data effectively using SQL’s most frequently used
    command. This involves learning to craft precise `SELECT` statements to extract
    just the right data needed for your narratives. This will set the stage for more
    advanced data manipulation and analysis techniques.


    # 2. Starting with SELECT


    In this chapter, you learn about the SQL command that is fundamental for retrieving
    data from databases. This chapter demonstrates the versatility of the `SELECT`
    statement by using narratives and practical examples to demonstrate how it is
    used in both simple and complex data retrieval scenarios.


    ## Introduction to SELECT


    The `SELECT` statement is one of the most fundamental and frequently used SQL
    commands, standing at the heart of almost every query operation. For any SQL user,
    it is an essential tool for retrieving data from databases. At its core, the `SELECT`
    statement allows you to specify exactly what data you want to retrieve from which
    tables, and it can be fine-tuned with various clauses to meet precise data retrieval
    needs. `SELECT` is not just about pulling data from a database; it is about choosing
    the right pieces of data that answer specific questions or fulfill particular
    informational needs. As a result, the `SELECT` statement can transform raw data
    into meaningful information.


    ### The Importance of SELECT in Storytelling with Data


    When it comes to data storytelling, `SELECT` goes beyond data retrieval to become
    a tool that assists in narrative construction. Data storytelling is about weaving
    data into a narrative that makes sense to the audience, helping them understand
    complex information through real-world stories.


    For instance, to extract the data points that form the basis of these stories,
    `SELECT` can be used to extract a wide variety of data points. Consider a dataset
    that contains years of sales data that was collected over a period of time. The
    `SELECT` command could be used by a storyteller to retrieve total sales during
    major events or holidays and analyze them. Careful selection of data can reveal
    more about consumer behavior during certain periods. As a result of selecting
    specific data, storytellers can emphasize information that illustrates trends,
    supports a hypothesis, or explains phenomena in a way that is visually and contextually
    compelling.


    ### The Anatomy of a SELECT Statement


    A `SELECT` statement’s structure and syntax are crucial to maximizing SQL’s power
    in data retrieval and storytelling. This subsection breaks down the fundamental
    components of the `SELECT` statement, including how to select columns and use
    aliases to make queries more readable.


    #### Basic Structure and Syntax


    The `SELECT` statement is used to query the database and retrieve specified data.
    At its most basic, a `SELECT` statement must specify two key pieces of information:
    what you want to select and from where. The syntax is easy to understand:


    ```

    SELECT column1, column2, ...

    FROM tableName;

    ```


    In this structure:


    *   `SELECT` indicates that you are about to specify a list of columns or expressions
    you want to retrieve.


    *   `column1, column2, ...` are the specific columns you want to select from the
    database table. You can also use `*` character to select all columns from a table.


    *   `FROM tableName` specifies the table from which to retrieve the data.


    This simple syntax is the starting point for building more complex queries, including
    those that filter, group, or sort data.


