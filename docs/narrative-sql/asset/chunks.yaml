  trans: '

    ## 将子查询作为会话元素简介


    如前所述，子查询是嵌入在另一个查询中的 SQL 查询。因此，它们可以被称为“会话元素”，因为它们允许查询以动态方式交互，从而实现查询之间的信息流动。在对话中，人们常常会提出后续问题以获取更具体的信息。子查询允许
    SQL 查询相互构建，通过基于另一个查询的结果来细化或修改主查询，从而实现更复杂的数据检索。


    SQL 中的子查询使查询能够动态交互和共享信息。子查询有多种类型，每种在增强数据流检索中扮演着不同的角色。单行子查询为问题提供直接、一次性的答案，而多行子查询则返回针对更广泛查询的一系列可能响应。多列子查询返回多列和多行，通常在比较元组、配对和分组时使用。相关子查询与外部查询进行持续的“对话”，因为它们依赖于每一行的上下文来执行。非相关子查询只执行一次，其结果被外部查询使用。最后，`FROM`
    子句中的子查询充当基础上下文，准备主查询可以进一步分析的汇总数据。


    通过将任务分解为更小、更易管理的步骤，SQL 能够构建复杂、精细的查询。以下章节将更详细地解释子查询的类型，并使用基于表 7-7 和 7-8 提供数据的查询示例。


    表 7-8


    部门表


    | `department_id` | `department_name` | Location |

    | --- | --- | --- |

    | 1 | 销售部 | New York |

    | 2 | 市场部 | Chicago |

    | 3 | 信息技术部 | San Francisco |

    | 4 | 人力资源部 | Boston |

    | 5 | 运营部 | Los Angeles |

    | 6 | 财务部 | New York |

    | 7 | 物流部 | Chicago |

    | 8 | 研发部 | San Francisco |

    | 9 | 法务部 | Boston |

    | 10 | 客户支持部 | Los Angeles |


    表 7-7


    员工表


    | `employee_id` | `name` | `department_id` | `job_id` | `Salary` |

    | --- | --- | --- | --- | --- |

    | 101 | Alice Johnson | 1 | J001 | 55000 |

    | 102 | Bob Smith | 2 | J002 | 48000 |

    | 103 | Charlie Davis | 1 | J003 | 60000 |

    | 104 | David Brown | 3 | J004 | 72000 |

    | 105 | Emma Wilson | 2 | J001 | 45000 |

    | 106 | Fiona Clark | 4 | J005 | 80000 |

    | 107 | George Miller | 1 | J003 | 61000 |

    | 108 | Hannah White | 4 | J006 | 85000 |

    | 109 | Ian Thompson | 3 | J002 | 70000 |

    | 110 | Julia Lewis | 2 | J004 | 52000 |


    ### 单行子查询


    在单行子查询中，只返回一行和一列数据。当外部查询期望一个单一值进行比较时（例如使用 `=`、`<`、`>` 或 `!=` 等比较运算符时），经常会用到它。如果子查询返回多行，则会发生错误。例如，下面的嵌套查询使用一个单行子查询来查找销售部所有员工的姓名。


    ```sql

    SELECT name

    FROM employees

    WHERE department_id = (SELECT department_id FROM departments WHERE department_name
    = ''Sales'');

    ```


    内部查询查找 `''Sales''` 部门的 `department_id`，外部查询则检索该部门员工的姓名。


    如表 7-9 和 7-10 所示，内部查询返回销售部的 `department_id`，外部查询检索 `department_id = 1` 的员工姓名。


    表 7-10


    外部查询的输出


    | `name` |

    | --- |

    | Alice Johnson |

    | Charlie Davis |

    | George Miller |


    表 7-9


    内部查询的输出


    | `department_id` |

    | --- |

    | 1 |


    ### 多行子查询


    多行子查询返回多行，但通常只返回单列。这些子查询与 `IN`、`ANY` 或 `ALL` 等运算符一起使用，以匹配子查询结果中的一个或多个值。要查找所有在位于纽约的部门工作的员工姓名，下面的嵌套查询使用了一个多行子查询。


    ```sql

    SELECT name

    FROM employees

    WHERE department_id IN (SELECT department_id FROM departments WHERE location =
    ''New York'');

    ```


    子查询检索所有位于 `''New York''` 的部门的 ID，外部查询则查找在这些部门工作的员工。


    表 7-11 和 7-12 展示了，内部查询返回了纽约各部门的 ID。在外部查询中，返回了部门 ID 为 1 或 6 的员工姓名。


    表 7-12


    外部查询的输出


    | `name` |

    | --- |

    | Alice Johnson |

    | Charlie Davis |

    | George Miller |


    表 7-11


    内部查询的输出


    | `department_id` |

    | --- |

    | 1 |

    | 6 |


    ### 多列子查询


    多列子查询返回多列和多行。它通常用于涉及元组、对或值组的复合比较，常与 `IN` 运算符或在 `JOIN` 条件中结合使用。例如，下面的嵌套查询旨在查找与公司当前空缺职位具有相同
    `department_id` 和 `job_id` 的员工姓名。


    ```sql

    SELECT name

    FROM employees

    WHERE (department_id, job_id) IN (SELECT department_id, job_id FROM job_openings
    WHERE status = ''Open'');

    ```


    子查询检索职位状态为开放的 `department_id` 和 `job_id` 对，外部查询则查找匹配这些对的员工。


    表 7-13 显示了名为 `job_openings` 的表中的数据。


    表 7-13


    job_openings 表


    | `department_id` | `job_id` | Status |

    | --- | --- | --- |

    | 1 | J003 | Open |

    | 4 | J006 | Open |


    子查询检索开放的职位，外部查询将员工与部门-职位对进行匹配。参见表 7-14 和 7-15。


    表 7-15


    外部查询输出


    | `name` |

    | --- |

    | Charlie Davis |

    | George Miller |

    | Hannah White |


    表 7-14


    内部查询输出


    | `department_id` | `job_id` |

    | --- | --- |

    | 1 | J003 |

    | 4 | J006 |

