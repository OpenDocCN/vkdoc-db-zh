    ### 示例：查找整体消费金额最高的两位客户


    ```sql

    WITH RankedCustomers AS (

    SELECT Customer_ID, SUM(Sale_Amount) AS Total_Purchase,

    ROW_NUMBER() OVER (ORDER BY SUM(Sale_Amount) DESC) AS Purchase_Rank

    FROM Sales

    GROUP BY Customer_ID

    )

    SELECT * FROM RankedCustomers

    WHERE Purchase_Rank < 3;

    ```


    `ROW_NUMBER()` 函数根据客户的总消费金额为其分配排名。`CTE` 用于计算每位客户的总消费、进行排名，然后筛选出前三名。表 5-24 展示了总消费最高的两位客户。


    表 5-24


    基于总消费的整体前两位客户


    | Customer_ID | Total_Purchase | Purchase_Rank |

    | --- | --- | --- |

    | 104 | 1600 | 1 |

    | 101 | 1400 | 2 |


    ## 数据分析必备的窗口函数


    表 5-25 总结了 PostgreSQL 中最有用的一些窗口函数，并附有简要说明和使用示例。


    表 5-25


    最有用的窗口函数总结


    | Window Function | Description | Example |

    | --- | --- | --- |

    | `ROW_NUMBER()` | 为分区内的每一行分配一个从 1 开始的唯一连续编号。 | `SELECT ROW_NUMBER() OVER (PARTITION
    BY Region ORDER BY Sale_Date) AS Row_Num FROM Car_Sales;` |

    | `RANK()` | 为分区内的每一行排名，如果存在并列则跳过后续排名。 | `SELECT RANK() OVER (PARTITION BY Region
    ORDER BY Sales_Amount DESC) AS Sales_Rank FROM Car_Sales;` |

    | `DENSE_RANK()` | 与 `RANK()` 类似，但并列后排名数字不留间隔。 | `SELECT DENSE_RANK() OVER (PARTITION
    BY Region ORDER BY Sales_Amount DESC) AS Dense_Sales_Rank FROM Car_Sales;` |

    | `NTILE(N)` | 将结果集大致划分为 `N` 个组，并为每一行分配一个组号。 | `SELECT NTILE(4) OVER (ORDER BY
    Sales_Amount DESC) AS Quartile FROM Car_Sales;` |

    | `SUM()` | 在指定窗口上计算列的累计或连续总和。 | `SELECT SUM(Sales_Amount) OVER (PARTITION BY
    Model_Name ORDER BY Sale_Date) AS Running_Total FROM Car_Sales;` |

    | `AVG()` | 在指定窗口上计算列的平均值。 | `SELECT AVG(Sales_Amount) OVER (PARTITION BY Region
    ORDER BY Sale_Date) AS Avg_Sales FROM Car_Sales;` |

    | `MAX()` | 返回分区或整个窗口内的最大值。 | `SELECT MAX(Sales_Amount) OVER (PARTITION BY Region)
    AS Max_Sale FROM Car_Sales;` |

    | `MIN()` | 返回分区或整个窗口内的最小值。 | `SELECT MIN(Sales_Amount) OVER (PARTITION BY Region)
    AS Min_Sale FROM Car_Sales;` |

    | `COUNT()` | 返回分区或整个窗口内的行数。 | `SELECT COUNT(*) OVER (PARTITION BY Model_Name)
    AS Sale_Count FROM Car_Sales;` |

    | `FIRST_VALUE()` | 返回窗口帧内每一行的第一个值。 | `SELECT FIRST_VALUE(Sales_Amount) OVER (PARTITION
    BY Region ORDER BY Sale_Date) AS First_Sale FROM Car_Sales;` |

    | `LAST_VALUE()` | 返回窗口帧内每一行的最后一个值。 | `SELECT LAST_VALUE(Sales_Amount) OVER (PARTITION
    BY Region ORDER BY Sale_Date) AS Last_Sale FROM Car_Sales;` |

    | `LAG()` | 返回窗口帧中上一行的值。可用于将当前行与上一行进行比较。 | `SELECT LAG(Sales_Amount, 1) OVER (PARTITION
    BY Model_Name ORDER BY Sale_Date) AS Previous_Sale FROM Car_Sales;` |

    | `LEAD()` | 返回窗口帧中下一行的值。可用于将当前行与下一行进行比较。 | `SELECT LEAD(Sales_Amount, 1) OVER
    (PARTITION BY Model_Name ORDER BY Sale_Date) AS Next_Sale FROM Car_Sales;` |


    ## 小结


    本章探讨了在 SQL 中进行数据聚合的过程，这对于数据汇总和分析至关重要。通过理解如何将聚合函数与 `GROUP BY` 子句结合使用，您可以高效地计算特定数据组的总计、平均值和其他统计值。本章讨论的高级主题包括将聚合与窗口函数结合、使用嵌套
    `GROUP BY` 进行更深入的分析，以及使用公共表表达式简化复杂查询。


    ## 关键点


    *   `聚合函数与 GROUP BY 子句`：使用它们来高效计算特定数据组的统计信息。

    *   `结合聚合与窗口函数`：结合使用 `SUM()`、`COUNT()`、`ROW_NUMBER()` 或 `RANK()` 等，既可以计算详细的行级指标，也可以计算聚合摘要。

    *   `嵌套 GROUP BY 与窗口函数`：先使用 `GROUP BY` 聚合数据，然后应用窗口函数进行更深入的分析，例如分组内的前 N 名分析。

    *   `CTEs (公共表表达式)`：通过将多步聚合查询拆分为独立的逻辑步骤来简化查询，使其更易于阅读和维护。


    ## 主要收获


    *   `聚合函数`：`COUNT`、`SUM`、`AVG`、`MIN` 和 `MAX` 函数在处理分组数据时非常有用。

    *   `GROUP BY 子句`：有效地组织数据以进行聚合，并以多种方式汇总结果。

    *   `窗口函数`：将聚合函数与窗口函数结合，用于对分区数据进行高级分析。

    *   `嵌套 GROUP BY`：探索嵌套的 `GROUP BY` 子句，以进行更深入、更精细的数据分析。

    *   `公共表表达式 (CTEs)`：通过减少 SQL 代码中的 CTE 数量，使复杂查询更易于阅读和维护。


    ## 后续内容


    下一章“使用 `ORDER BY` 和 `LIMIT` 整理数据顺序”将探讨如何高效地对查询结果进行排序和过滤。掌握此操作后，您将能够以有意义的方式组织数据。您可以优先关注关键信息，并限制结果以聚焦于最相关的数据点。


    ## 技能测试


    一个数据库有三张表：`gym_memberships`（`Member_ID`，`Name`，`Membership_Type`，`Join_Date`，`City`），`classes`（`Class_ID`，`Class_Name`，`Category`，`Class_Date`，`Trainer_Name`）和
    `attendance`（`Attendance_ID`，`Member_ID`，`Class_ID`，`Attendance_Date`，`Class_Fee`）。


    1.  编写一个使用窗口函数的 SQL 查询，计算每位会员基于其课程出勤情况的总课程费用和排名。必须显示课程名称、会员 ID、总课程费用和排名。

    2.  编写一个使用 `ROWS` 的查询，计算每位会员过去三节课（包括当前课程）的课程费用移动平均值。提供会员 ID、课程名称、出勤日期和课程费用平均值。

    3.  编写一个使用 CTE 的查询，查找在课程上花费超过 500 美元的会员。必须显示会员姓名、课程费用金额和所在城市。

    4.  编写一个使用嵌套 `GROUP BY` 的查询，找出每种会员类型中课程消费最高的前两名会员。显示会员 ID、会员类型和总课程费用。

    5.  编写一个查询，使用窗口函数计算每位会员按课程日期排序的累计课程费用。提供一个表格，显示会员 ID、课程名称、课程日期、课程费用和累计费用。

    '
- fmt: '# 6. Ordering the Plot with ORDER BY and LIMIT


    Data analysis requires that analysts order the data to provide clarity, insight,
    and effective communication. `ORDER BY` clauses in SQL make patterns and trends
    more visible, helping analysts prioritize findings and detect outliers. When you
    sort data appropriately, patterns and relationships within the data become clearer,
    allowing you to make better decisions and take action. For example, consider a
    list of product sales without any order. The task of identifying top-performing
    products, tracking trends, or even spotting anomalies would be very challenging.
    Data sorting provides clarity and enables you to identify patterns and make informed
    decisions quickly. `LIMIT` clauses complement this by focusing on the most relevant
    data points, such as top performers or recent entries, so it is easier to focus
    on what is most important.


    ## Introduction to ORDER BY


    `ORDER BY` clauses in SQL are used to sort results according to a column or columns.
    By controlling the order in which the data is displayed, you can identify trends,
    top performers, or specific patterns more easily. The basic syntax of the `ORDER
    BY` clause is as follows:


    ```sql

    SELECT column1, column2, ...

    FROM table_name

    ORDER BY column1 [ASC | DESC], column2 [ASC | DESC];

    ```


    Here, `column1` and `column2` are the columns you want to sort. You can choose
    `ASC` for ascending order (the default) or `DESC` for descending order. Sorting
    by multiple columns is also possible. It should be noted that if two rows have
    the same value in `column1`, SQL will use `column2` as the secondary sorting criteria.
    This flexible ordering helps present data more effectively. With `ORDER BY`, you
    can quickly create well-structured outputs, whether you want a list of top-selling
    items or employees arranged by date of hire.


    ## Ordering Data in Real-World Scenarios


    `ORDER BY` clauses are essential to organizing data effectively in SQL queries
    in various real-world scenarios. Table `[6-1](#619961_1_En_6_Chapter.xhtml#Tab1)`
    illustrates how to use the `ORDER BY` clause to identify top-selling products,
    prioritize orders, highlight top-scoring students, or organize customer feedback.
    These scenarios demonstrate the flexibility of `ORDER BY` for sorting by multiple
    columns to achieve specific goals, such as ranking items, identifying trends,
    or prioritizing urgent items. For each scenario, an example SQL query is included,
    showing you how to construct `ORDER BY` clauses. Table `[6-1](#619961_1_En_6_Chapter.xhtml#Tab1)`
    also explains how each query is structured and what kind of output it produces.


    Table 6-1: `ORDER BY` Clauses


    | Real-World Scenario | Role of ORDER BY Clause | SQL Query Example | Description
    |

    | --- | --- | --- | --- |

    | Top-selling products in an e-commerce store | Identify the best-selling products.
    | `SELECT product_name, total_sales FROM products ORDER BY total_sales DESC;`
    | Retrieves the top best-selling products by descending `total_sales`. |

    | Employee salaries in a company | Display salaries in descending order. | `SELECT
    employee_name, salary FROM employees ORDER BY salary DESC;` | Lists all employees,
    sorted by salary from highest to lowest. |

    | Customer feedback sorted by date | Show the most recent feedback first; useful
    for addressing current customer concerns or issues. | `SELECT customer_id, feedback,
    feedback_date FROM feedbacks ORDER BY feedback_date DESC;` | Displays all customer
    feedback, showing the latest entries first. |

    | Order fulfillment priority | Prioritize orders based on urgency (order date
    or delivery deadline). | `SELECT order_id, customer_name, order_date FROM orders
    ORDER BY delivery_date ASC;` | Lists orders sorted by `delivery_date` to prioritize
    the earliest deadlines. |

