    ```sql

    WITH RankedCustomers AS (

    SELECT Customer_ID, SUM(Sale_Amount) AS Total_Purchase,

    ROW_NUMBER() OVER (ORDER BY SUM(Sale_Amount) DESC) AS Purchase_Rank

    FROM Sales

    GROUP BY Customer_ID

    )

    SELECT * FROM RankedCustomers

    WHERE Purchase_Rank < 3;

    ```


    `ROW_NUMBER()` assigns a rank to each customer based on their total purchases.
    `CTE` is used to calculate the total purchase for each customer, rank them, and
    then filter out the top three. Table 5-24 shows the top two customers with the
    highest total purchases.


    Table 5-24


