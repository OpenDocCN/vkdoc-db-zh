- fmt: '# The Fourth Story: Analysis of Social Media Hashtags


    Jacob is a data analyst at a social media company who is responsible for analyzing
    the hashtag usage in user posts over the past year. A table called `HashtagUsage`
    (shown in Table [2-18](#619961_1_En_2_Chapter.xhtml#Tab18)) logs every hashtag
    used, the number of likes each post received, and the number of comments each
    post received.


    **Table 2-18**


    The HashtagUsage Table


    | Hashtag | Likes | Comments |

    | --- | --- | --- |

    | `#adventure` | 150 | 30 |

    | `#adventure` | 200 | 45 |

    | `#foodie` | 300 | 60 |

    | `#travel` | 250 | 50 |

    | `#foodie` | 180 | 20 |

    | `#staycation` | 190 | 40 |


    Jacob aims to answer these four questions using this data:


    *   How many hashtag entries have been recorded so far?

    *   For a general idea of how much engagement is going on, how many likes and
    comments are generated per hashtag?

    *   What is the maximum engagement rate to the popular likes and comments?

    *   What is the minimum engagement to identify less popular or ineffective hashtags?


    The following query can generate a baseline understanding of how hashtags are
    utilized:


    ```sql

    SELECT COUNT(*) AS TotalHashtags

    FROM HashtagUsage;

    ```


    This result tells Jacob that there are six entries in the `HashtagUsage` table.
    See Table [2-19](#619961_1_En_2_Chapter.xhtml#Tab19).


    **Table 2-19**


    Total Hashtags


    | TotalHashtags |

    | --- |

    | 6 |


    **Note**


    When counting total hashtag entries using the `COUNT` function, it’s important
    to consider the uniqueness of the values in the `Hashtag` column. If the `Hashtag`
    values are not unique, and you are interested in knowing the number of distinct
    hashtags used rather than the total number of hashtag occurrences, you should
    use the `DISTINCT` keyword within the `COUNT()` function. For example, `COUNT(DISTINCT
    Hashtag)` will count only unique hashtag entries, ensuring that each hashtag is
    counted only once regardless of how many times it appears in the dataset. This
    approach is crucial when analyzing data for diversity in hashtag usage, as it
    provides a more accurate reflection of the range of distinct tags used across
    posts, rather than merely quantifying their total use.


    ```sql

    SELECT COUNT(DISTINCT Hashtag) AS DistinctHashtags

    FROM HashtagUsage;

    ```


    As a result of this query, the number of unique hashtags will be returned, regardless
    of how many times each appears in the table.


    The following query calculates the average number of likes and comments per hashtag
    to determine the general level of engagement with each hashtag.


    ```sql

    SELECT AVG(Likes) AS AverageLikes, AVG(Comments) AS AverageComments

    FROM HashtagUsage;

    ```


    Table [2-20](#619961_1_En_2_Chapter.xhtml#Tab20) shows that on average, hashtags
    got about 211.67 likes and 40.83 comments.


    **Table 2-20**


    Average Likes and Comments


    | AverageLikes | AverageComments |

    | --- | --- |

    | 211.67 | 40.83 |


    To see peak engagement and the maximum likes and comments any hashtag has received,
    you can view the highest points of user interaction with this query.


    ```sql

    SELECT MAX(Likes) AS MaxLikes, MAX(Comments) AS MaxComments

    FROM HashtagUsage;

    ```


    Table [2-21](#619961_1_En_2_Chapter.xhtml#Tab21) indicates that the maximum likes
    and comments any single hashtag received are 300 and 60, respectively.


    **Table 2-21**


    Maximum Likes and Comments


    | MaxLikes | MaxComments |

    | --- | --- |

    | 300 | 60 |


    To understand the least interaction some hashtags receive and the minimum engagement,
    the following query can identify the less popular or ineffective tags:


    ```sql

    SELECT MIN(Likes) AS MinLikes, MIN(Comments) AS MinComments

    FROM HashtagUsage;

    ```


    Table [2-22](#619961_1_En_2_Chapter.xhtml#Tab22) shows that the minimum likes
    and comments recorded are 150 and 20, respectively.


    **Table 2-22**


    Minimum Likes and Comments


    | MinLikes | MinComments |

    | --- | --- |

    | 150 | 20 |


    By using the total hashtag usage data and the queries, Jacob discovers likes (`AverageLikes`)
    and comments (`AverageComments`), as well as the peak of user engagement in posts
    with likes (`MaxLikes`), comments (`MaxComments`), likes (`MinLikes`) and comments
    (`MinComments`).


    Data analysts and business intelligence professionals rely on these aggregate
    functions in SQL. They enable the preparation of reports and analytics that communicate
    the most relevant statistical highlights of large datasets. As these functions
    are integrated into data storytelling, they help to create a narrative that is
    both compelling and based on quantitative evidence, thereby enhancing the informational
    value of the story. These aggregate functions—as well as other aggregate functions
    introduced in following chapters—will be used to create narratives in the following
    chapters.


    ## Summary


    The purpose of this chapter was to uncover the profound capabilities of SQL in
    data storytelling by exploring the `SELECT` statement and its extensions. This
    chapter explained how to enhance queries with aliases, combine data creatively
    using `CONCAT`, and apply mathematical logic directly within SQL. As a result
    of the introduction of the `CASE` and `DISTINCT` selections, you are now equipped
    with additional tools for efficiently segmenting and analyzing your data.


    ## Key Points


    *   `SELECT`: A SQL command used to retrieve rows selected from one or more tables
    in a database.

    *   **Aliases**: Alternative names given to a table or a column in an SQL statement
    to simplify query readability or to resolve naming conflicts.

    *   **The** `CONCAT` **function**: A function in SQL that merges two or more strings
    into one, allowing for dynamic string construction within queries.

    *   **SQL mathematical operations**: Operations that perform regular arithmetic
    calculations like addition, subtraction, multiplication, and division directly
    on database columns to manipulate numeric data.

    *   `CASE`: A conditional expression in SQL that allows for different outputs
    in a query, based on specified conditions, similar to `if-then` logic in programming.

    *   `DISTINCT`: A keyword in SQL used to return only distinct (different) values
    within a column, eliminating duplicate entries in query results.

    *   **Aggregate functions**: Functions in SQL that perform a calculation on a
    set of values and return a single value, commonly used for statistical analysis
    over data groups, such as `SUM()`, `AVG()`, `MIN()`, `MAX()`, and `COUNT()`.


    During this SQL journey, I encourage you to experiment with these tools as you
    develop your data projects.


    ## Key Takeaways


    *   **Versatility of** `SELECT`: The `SELECT` statement is the cornerstone of
    SQL querying, allowing you to retrieve precisely the data you need from a database.

    *   **Using aliases**: Aliases simplify queries and improve the readability of
    the results. They are especially useful in reports and complex queries involving
    multiple tables or when column names are lengthy or not understandable.

    *   **The power of** `CONCAT`: The `CONCAT` function is a powerful tool for merging
    columns and text within SQL queries, enabling the creation of new, meaningful
    strings that can enhance data interpretation and storytelling.

    *   **Mathematical operations**: SQL allows for direct mathematical manipulations
    within the `SELECT` statement, facilitating immediate calculations.

    *   **Conditional logic with** `CASE`: The `CASE` statement enriches SQL queries
    by introducing conditional logic directly into `SELECT` statements.

    *   **Importance of distinct selection**: Using `DISTINCT` helps ensure that query
    results contain unique data points, which is crucial for accurate reporting and
    analysis, avoiding data redundancy and skewing.

    *   **Aggregate functions**: Functions like `COUNT`, `AVG`, `MAX`, `MIN`, and
    others provide statistical insights directly from the database and are crucial
    for summarizing data and drawing meaningful conclusions for strategic decision-making.


    You will learn advanced SQL topics as you progress through the chapters. This
    will enable you to develop insights that help you make decisions.'
