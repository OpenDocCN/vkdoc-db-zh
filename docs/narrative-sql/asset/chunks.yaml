    insights, such as the average length of stay by age group. This type of summarization
    is key for creating bar charts or line plots showing trends. Here, the `CASE`
    statement groups patients into categories of `Child`, `Adult`, and `Senior`. Aggregation
    functions are then applied, with `COUNT(patient_id)` used to count the number
    of patients in each group and `AVG(discharge_date - admission_date)` calculating
    the average length of stay for each group. As shown in Table [8-14](#619961_1_En_8_Chapter.xhtml#Tab14),
    the results are grouped by `age_group` using the `GROUP BY` clause.


    Table 8-14


    The Average Length of Stay Categorized by Age Group


