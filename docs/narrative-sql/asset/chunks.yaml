    WITH RECURSIVE employee_hierarchy AS (

    -- 基础情况：选择顶级经理（CEO）

    SELECT id, name, manager_id, 1 AS level

    FROM employees

    WHERE manager_id IS NULL

    UNION ALL

    -- 递归情况：查找向当前层级汇报的员工

    SELECT e.id, e.name, e.manager_id, eh.level + 1

    FROM employees e

    JOIN employee_hierarchy eh ON e.manager_id = eh.id

    )

    ```


    该查询从 CEO 开始，递归查找其下属的所有员工，并动态分配层级。此查询使用名为 `employee_hierarchy` 的递归 CTE 来生成组织汇报结构的层次视图。查询包含两个协同工作以构建完整组织层次结构的主要组件。基础情况通过从
    `Employees` 表中选择顶级经理（通常是 CEO）来建立起点，其特征是 `manager_id` 列为 `NULL` 值。此查询选择经理的 `id`、`name`
    和 `manager_id`，同时分配一个级别值 1 以指示层次结构中的顶级位置。这是结果集的第一行，并作为递归的基础。


    递归部分随后将 `Employees` 表与先前生成的结果（存储在 `employee_hierarchy` CTE 中）进行连接。它查找所有 `manager_id`
    与当前结果集中某人 ID 匹配的员工，本质上是识别所有直接下属。对于这些员工中的每一个，它将级别值增加 1，表明他们在层次结构中比其经理低一级。这个递归过程自动进行，每次迭代都查找向在上一轮迭代中发现的经理汇报的员工。此过程持续进行，直到找不到更多匹配的员工。


    通过这种递归方法，此查询可以高效地遍历整个组织结构，无论其深度如何。这会产生包含适当级别指示符的完整汇报关系图。这使得无需提前知道有多少层级即可可视化复杂的组织层次结构。


    CTE 和递归 CTE 是强大的工具，可以使 SQL 查询更具结构性、可读性和效率。表 10-25 说明了 CTE 和 RCTE 之间的关键区别。


    表 10-25


    CTE 和 RCTE 的关键区别


    | 特性 | 标准 CTE | 递归 CTE |

    | --- | --- | --- |

    | 目的 | 组织复杂查询 | 处理层次或顺序数据 |

    | 是否调用自身 | 否 | 是 |

    | 用例 | 筛选、分组、聚合 | 组织层次结构、图遍历 |

    | 查询执行 | 运行一次 | 迭代运行，直到没有行匹配 |


    ## 第二个故事：为民事登记处分析家谱


    民事登记过程是保存城市公民和居民生活事件（如出生、婚姻和死亡）记录的地方。Jane 打算在祖先研究部门工作，她将分析从这些记录中收集的数据。Jane 的任务是分析一个家谱数据集。该数据集包括有关个人及其直系父母的信息。使用
    RCTE，她将解决与家族血统相关的各种挑战。对于 Jane 的分析之旅，表 10-26 包含了与公民和居民相关的数据。


    表 10-26


    family_tree 表


    | ID | 姓名 | parent_id | 出生年份 |

    | --- | --- | --- | --- |

    | 1 | Alice | `NULL` | 1950 |

    | 2 | Bob | 1 | 1975 |

    | 3 | Carol | 1 | 1978 |

    | 4 | Dave | 2 | 2000 |

    | 5 | Eve | 3 | 2003 |

    | 6 | Frank | 2 | 2005 |

    | 7 | Grace | 5 | 2028 |


    给定这些数据，Jane 希望完成以下任务：


    *   检索 Alice 的所有后代及其世代深度。

    *   列出 Grace 的所有祖先，追溯世代。

    *   识别家谱中最长的祖先链。

    *   为每个血统找出最年长祖先与最年轻后代之间的年龄差。


    以下查询将检索 Alice 的所有后代及其世代深度：


    ```

    WITH RECURSIVE descendants AS (

    -- 基础情况：从 Alice 开始

    SELECT id, name, parent_id, birth_year, 1 AS generation

    FROM family_tree

    WHERE name = ''Alice''

    UNION ALL

    -- 递归情况：查找上一世代的孩子

    SELECT f.id, f.name, f.parent_id, f.birth_year, d.generation + 1

    FROM family_tree f

    JOIN descendants d ON f.parent_id = d.id

    )

    SELECT * FROM descendants;

    ```


    为了在家族树中找到 Alice 的所有后代，此 SQL 查询使用 `WITH RECURSIVE` 子句构建了一个递归查询。此查询首先从 `family_tree`
    表中选择所有数据，包括关于 Alice 当前祖先的信息，然后递归地调用自身（即 `descendants` CTE）来查找该祖先的所有孩子。此 CTE 将根据
    `parent_id` 将 `family_tree` 表的每一行连接到 Descendants 表，逐步探索家族树，最终返回 Alice 的所有后代的列表，包括他们的
    ID、姓名、父 ID 和出生年份。


    注意


    `WITH RECURSIVE` 子句的一部分在 `descendants` CTE 内定义了一个名为 `generation` 的新列。它在跟踪家族树中每个人祖先的“层级”或“深度”方面起着至关重要的作用。在之前的查询中，`1
    AS generation` 部分声明并命名了一个名为 `generation` 的列，该列将被添加到递归 CTE 生成的每一行中。为基本情况（Alice）分配的值
    `1` 确立了计算世代深度的起点。随着查询递归进行，沿着家族树向下移动，`generation` 值每代增加一。Alice 在第一代，所以她是起点。Bob
    的孩子将在第二代，因为他们距离 Alice 有一代之隔。第三代指的是 Alice 的孙辈。`generation` 列允许您组织和可视化家族树。利用亲代血统，它构建了一个祖先关系的数字层次结构。


    表 10-27 说明了 Alice 的所有后代及其世代深度。


    表 10-27


    Alice 的后代及其世代深度


    | ID | 姓名 | parent_id | 出生年份 | generation |

    | --- | --- | --- | --- | --- |

    | 1 | Alice | `NULL` | 1950 | 1 |

    | 2 | Bob | 1 | 1975 | 2 |

    | 3 | Carol | 1 | 1978 | 2 |

    | 4 | Dave | 2 | 2000 | 3 |

    | 5 | Eve | 3 | 2003 | 3 |

    | 6 | Frank | 2 | 2005 | 3 |

    | 7 | Grace | 5 | 2028 | 4 |


    以下查询提供了 Grace 的所有祖先的列表，并追溯世代：'
- fmt: '## 本章概述


    本章重点介绍了SQL函数在增强数据分析和洞察提取方面的功能。它探讨了使用汇总函数进行总结、统计和数学函数获取数值洞察，以及窗口函数进行趋势分析等操作和分析数据的技巧。此外，值函数、排名函数、字符串函数、日期时间函数、JSON函数、控制函数和系统函数允许进行更深入的数据探索和转换。而且，SQL简化了生成有洞察力的摘要和进行层次数据分析的过程。这些技术共同提升了对数据的整体理解，使复杂数据集更易于访问和处理。


    ## 核心要点


    *   SQL函数通过实现强大的计算、筛选和转换功能来增强数据分析，从而获得更深入的洞察。

    *   递归查询与公共表表达式（CTE）的结合，将复杂问题分解为可管理的步骤，实现了层次化数据分析。

    *   自定义SQL函数允许用户通过定义可重用的逻辑来进行专业计算，从而扩展SQL的能力。

    *   利用这些SQL函数，数据工作流程变得更加高效，有助于做出更好的决策并获得可操作的洞察。


    ## 关键收获


    *   **多样的数据处理能力**：SQL函数为聚合、筛选和转换数据以发掘更深层次洞察提供了强大的工具。

    *   **高级分析能力**：利用统计、数学和窗口函数执行复杂的计算。

    *   **高效的层次分析**：递归公共表表达式（RCTE）有助于分解复杂关系。

    *   **数据结构处理**：利用JSON、字符串和日期函数来有效管理和操作结构化及半结构化数据。

    *   **自定义功能扩展**：定义可重用的SQL函数以封装逻辑，并简化重复性计算，从而提高工作流程效率。


    ## 后续展望


    下一章，“大结局：讲述你的数据故事”，将探讨如何以最佳方式呈现你的数据故事。同时也会分享一些总结性的思考，包括有效的数据故事展示技巧，以及通过创建可重用、高效的工作流程来增强数据解读的建议。'
  raw: '```

    WITH RECURSIVE ancestors AS (

    -- Base case: Start with Grace

    SELECT id, name, parent_id, 1 AS generation

    FROM family_tree

    WHERE name = ''Grace''

    UNION ALL

    -- Recursive case: Find parents of previous generation

    SELECT f.id, f.name, f.parent_id, a.generation + 1

    FROM family_tree f

    JOIN ancestors a ON f.id = a.parent_id

    )

    SELECT * FROM ancestors;

    ```


    This query generates a recursive table named `Ancestors`. It begins with a base
    case selecting all records from the `family_tree` table representing the starting
    point, Grace, with her ID, name, parent ID, and a generation of 1\. Then, this
    query iteratively calls itself, the `ancestors` CTE, to find all the parents of
    the previous generations, starting from Grace. It uses the parent ID from each
    row in the current generation to find the parents of the current generation. Finally,
    the query selects all rows returned by the recursive call, effectively creating
    a table of all the parents within the family tree. This shows a complete view
    of the ancestors, as shown in Table [10-28](#619961_1_En_10_Chapter.xhtml#Tab28).


    Table 10-28


    All Ancestors of Grace


    | ID | Name | parent_id | Generation |

    | --- | --- | --- | --- |

    | 7 | Grace | 5 | 1 |

    | 5 | Eve | 3 | 2 |

    | 3 | Carol | 1 | 3 |

    | 1 | Alice | `NULL` | 4 |


    The following query identifies the longest ancestral chain in the family tree
    to determine the longest lineage:


    ```

    WITH RECURSIVE lineage AS (

    -- Base case: Start with individuals who have no parents

    SELECT id, name, parent_id, 1 AS depth

    FROM family_tree

    WHERE parent_id IS NULL

    UNION ALL

    -- Recursive case: Count generations for each descendant

    SELECT f.id, f.name, f.parent_id, l.depth + 1

    FROM family_tree f

    JOIN lineage l ON f.parent_id = l.id

    )

    SELECT * FROM lineage ORDER BY depth DESC LIMIT 1;

    ```


    This SQL query uses an RCTE named `lineage` to traverse a family tree structure
    stored in a table called `family_tree`. It starts with the base case of finding
    individuals who have no parents, where `parent_id` is `NULL`, and assigns them
    a depth of 1\. The recursive part then joins these results to the `family_tree`
    table to find their children, adding one to the depth counter for each generation.
    This process continues building the lineage hierarchy until all descendants are
    found. The final `SELECT` statement sorts the results by depth in descending order
    and limits the output to just one row. Essentially, this identifies the youngest
    descendant in terms of generational depth in the family tree with the greatest
    distance from the original ancestors. Table [10-29](#619961_1_En_10_Chapter.xhtml#Tab29)
    identifies the longest ancestral chain in the family tree.


    Table 10-29


    The Longest Ancestral Chain in the Family Tree


    | ID | Name | parent_id | Depth |

    | --- | --- | --- | --- |

    | 7 | Grace | 5 | 4 |


    The following query aims to find the age gap between the oldest and youngest in
    each lineage:


    ```

    WITH RECURSIVE family_age AS (

    -- Base case: Start with individuals who have no parents

    SELECT id, name, parent_id, birth_year, birth_year AS oldest_birth_year

    FROM family_tree

    WHERE parent_id IS NULL

    UNION ALL

    -- Recursive case: Compare birth years through generations

    SELECT f.id, f.name, f.parent_id, f.birth_year, fa.oldest_birth_year

    FROM family_tree f

    JOIN family_age fa ON f.parent_id = fa.id

    )

    SELECT

    name,

    birth_year,

    oldest_birth_year,

    birth_year - oldest_birth_year AS age_gap

    FROM family_age

    ORDER BY age_gap DESC;

    ```


    This SQL query uses a RCTE named `family_age` to analyze age relationships within
    a family tree. Starting with individuals who have no parents, *root ancestors,*
    as the base case, it captures their ID, name, parent ID, birth year. It establishes
    their birth year as the `oldest_birth_year` reference point. The recursive part
    then joins these results to the `family_tree` table to add descendants. It maintains
    the original ancestor’s birth year as it traverses through generations. After
    building this complete family structure with preserved ancestral birth years,
    the final `SELECT` statement calculates the `age_gap` by subtracting the oldest
    ancestor’s birth year from each family member’s birth year, effectively measuring
    the time span between generations. The results are sorted by age gap in descending
    order. As a result, family members with the largest generational age differences
    are highlighted first, providing insight into how the age spans of the generations
    have changed over time. Table [10-30](#619961_1_En_10_Chapter.xhtml#Tab30) shows
    the age difference between the oldest ancestor and youngest descendant for each
    lineage.


    Table 10-30


    The Age Difference Between the Oldest Ancestor and Youngest Descendant for Each
    Lineage


    | Name | birth_year | oldest_birth_year | age_gap |

    | --- | --- | --- | --- |

    | Grace | 2028 | 1950 | 78 |

    | Eve | 2003 | 1950 | 53 |

    | Frank | 2005 | 1950 | 55 |


    ## Summary


    This chapter highlighted SQL’s functions in enhancing data analysis and insight
    extraction. It explored techniques for manipulating and analyzing data using aggregate
    functions for summarization, statistical and mathematical functions for numerical
    insights, and window functions for trend analysis. Additionally, value, ranking,
    string, date and time, JSON, control, and system functions allow for deeper data
    exploration and transformation. Moreover, SQL simplifies insightful summaries
    and hierarchical data analysis. These techniques collectively improve overall
    data understanding, making complex datasets more accessible and actionable.


    ## Key Points


    *   SQL functions enhance data analysis by enabling powerful calculations, filtering,
    and transformations for deeper insights.


    *   The combination of recursive queries and CTEs breaks down complex problems
    into manageable steps, enabling hierarchical data analysis.


    *   Custom SQL functions allow users to extend SQL’s capabilities by defining
    reusable logic for specialized calculations.


    *   With these SQL functions, data workflows become more efficient, enabling better
    decision-making and actionable insights.


    ## Key Takeaways


    *   **A variety of data processing**: SQL functions provide powerful tools for
    aggregating, filtering, and transforming data to uncover deeper insights.


    *   **Advanced analytical capabilities**: Utilize statistical, mathematical, and
    window functions to perform complex calculations.


    *   **Efficient hierarchical analysis**: Recursive common table expressions (RCTEs)
    help break down complex relationships.


    *   **Data structure processing**: Take advantage of JSON, string, and date functions
    to manage and manipulate structured and semi-structured data effectively.


    *   **Custom functionality expansion**: Define reusable SQL functions to encapsulate
    logic and streamline repetitive calculations for more efficient workflows.


    ## Looking Ahead


    The next chapter, “The Grand Finale: Presenting Your Data Story,” examines how
    to present your data story in the best way possible. Some closing thoughts are
    also shared. This includes effective techniques for data story presentation, and
    tips that can enhance data interpretation by creating reusable, efficient analytical
    workflows.'
