    daily sales to show trends over time. |

    | Scatterplot | Visualize relationships between two numeric variables, for instance,
    height vs. weight | `SELECT sales, profit FROM sales_data;` | Extracts sales and
    profit values to visualize their relationship. |

    | Pie chart | Show proportions or percentages of categories, for instance, market
    share | `SELECT category, SUM(sales) AS total_sales FROM sales_data GROUP BY category;`
    | Groups sales by category to show proportions of total sales. |

    | Histogram | Show frequency distributions, for instance, age distribution | `SELECT
    FLOOR(sales / 100) * 100 AS sales_range, COUNT(*) AS frequency FROM sales_data
    GROUP BY sales_range ORDER BY sales_range;` | Buckets sales into ranges, for instance
    0–100, 100–200, and counts transactions in each range for a distribution. |

    | Box plot | Display data distribution and outliers, for example, test scores
    by class | `SELECT region, sales FROM sales_data;` | Retrieves sales per region
    to analyze distribution and identify outliers. |

    | Heatmap | Show patterns across two variables, for instance, sales by day and
    time | `SELECT date, region, SUM(sales) AS total_sales FROM sales_data GROUP BY
    date, region;` | Groups sales by date and region to visualize patterns in a heatmap.
    |

    | Stacked bar chart | Compare proportions across categories, for example, sales
    by product and region | `SELECT region, category, SUM(sales) AS total_sales FROM
    sales_data GROUP BY region, category;` | Groups sales by region and category to
    show category-wise contributions in each region. |

    | Area chart | Show cumulative trends over time, for instance, cumulative sales
    | `SELECT date, SUM(sales) OVER (ORDER BY date) AS cumulative_sales FROM sales_data;`
    | Calculates cumulative sales over time to show trends in total sales growth.
    |

    | Bubble chart | Represent three dimensions, for example, profit, sales, and region
    | `SELECT region, SUM(sales) AS total_sales, SUM(profit) AS total_profit FROM
    sales_data GROUP BY region;` | Summarizes sales and profit by region to represent
    three dimensions, for example, bubble size = sales volume. |

    | Radar chart | Compare multiple variables for categories, for instance, performance
    metrics | `SELECT category, AVG(sales) AS avg_sales, AVG(profit) AS avg_profit
    FROM sales_data GROUP BY category;` | Aggregates average sales and profit by category
    for multi-dimensional comparisons. |

    | Waterfall chart | Visualize changes over time or between categories, for instance,
    profit margins | `SELECT product, SUM(sales) AS total_sales FROM sales_data GROUP
    BY product ORDER BY total_sales DESC;` | Ranks products by sales for visualizing
    incremental changes between top-selling products. |

    | Gantt chart | Track project schedules, for instance, start and end dates for
    tasks | `SELECT product, MIN(date) AS start_date, MAX(date) AS end_date FROM sales_data
    GROUP BY product;` | Calculates start and end dates of sales for each product
    for timeline-based visualization. |

    | Treemap | Show hierarchical data, for instance, sales by product category and
    subcategory | `SELECT category, product, SUM(sales) AS total_sales FROM sales_data
    GROUP BY category, product;` | Groups sales by category and product to represent
    hierarchical data. |

    | Donut chart | Similar to a pie chart but with a central cut-out, for example,
    profit share | `SELECT category, SUM(profit) AS total_profit FROM sales_data GROUP
    BY category;` | Groups profit by category to show proportions, similar to a pie
    chart but with a central cut-out. |

