    possible to encounter unexpected results or errors when data types are out of
    alignment.


    It is important to point out some common mistakes associated with the use of `BETWEEN`.
    When dealing with ranges in a large dataset, forgetting that `BETWEEN` includes
    both endpoints can lead to off-by-one errors. Also, using incorrect date formats
    can lead to wrong results or errors. Always use the proper date format supported
    by your SQL database system.


