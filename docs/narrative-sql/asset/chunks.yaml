  trans: '

    ## 数据导言


    在当今社会，数据是一切事物构建的基础，它影响着我们生活的方方面面。我们能获取的数据来源不计其数，从卫星追踪的天气模式到你每天行走的步数。术语*数据*指的是一个变量的定性或定量属性。大量的数据被收集、观测或创造出来，目的是对其进行分析并基于分析做出决策。我们可以存储结构化或非结构化数据，范围涵盖数字、文本、多媒体，直至用于计算和研究的复杂数据集。


    简而言之，数据是信息的原材料，是理解世界和做出明智决策的基础。数据本身就像一堆未经提炼的原油。尽管数据具有价值，但在经过处理和分析之前，它是无用的。数据蕴含着巨大的价值，因为它能够揭示隐藏的模式、趋势和洞见。分析数据的能力使人们能够做出更好的决策、解决复杂问题并推动商业创新。人们普遍认为，在数字时代，数据已成为我们生活各个方面的组成部分，并且是医疗、金融和科技等跨行业所有决策的基础。表`1-1`提供了探索数据时的五个基本问题与答案。


    **表 1-1**

    **探索数据的五个基本问题与答案**


    | # | 问题 | 答案 |

    | --- | --- | --- |

    | 1 | 数据为何如此有价值？ | 数据的运用带来决策、创新与进步。在一个信息即力量的时代，数据蕴含着做出明智决策、解决复杂问题和预测未来趋势所必需的基础洞见与证据。
    |

    | 2 | 谁依赖数据？ | 我们所有人。数据被广泛用于各种事务，从企业利用客户数据调整产品，到政府利用数据规划政策，再到科学家利用研究数据做出发现。许多行业和社会都依赖数据。
    |

    | 3 | 数据从何而来？ | 遍布世界。这包括广阔互联网中的无数设备和传感器，以及构成物联网（IoT）的数十亿设备和传感器。从利用气候监测设备探索海洋深处，到通过卫星收集宇宙数据触及太空遥远之处。每个数据来源都提供了独特的洞见，共同丰富了我们集体的认知。
    |

    | 4 | 数据何时被使用？ | 每天，持续不断地。数据在我们的生活中被持续使用，并非局限于特定时刻。数据被用于指导应急响应、促进金融交易，也被用于影响长期政策决策和科学研究。数据的相关性跨越时间尺度，从即时到代际。
    |

    | 5 | 数据有什么用？ | 数据实现转化。数据有多种改变世界的方式。这包括为政策提供信息、推动经济增长、促进科学与医疗进步、改善教育以及丰富文化理解。通过分析数据，我们可以发现模式、预测结果、个性化体验并激发创新。
    |


    ## 数据分析


    正如 20 世纪的石油——为经济提供动力、彻底改变交通运输并在工业进步中扮演基础角色——数据是 21 世纪推动社会进步、经济增长和创新的基础资源。如同石油必须经过开采、提炼和分配才能利用其能量，数据也必须经过收集、组织和分析才能释放其全部潜力。因此，在这个时代，掌握数据的开采、提炼和分析的重要性不容小觑。数据分析的目的是通过检查、清洗、转换和建模数据，发现有用信息，提供洞见以得出结论，并支持决策。


    ### 数据库


    数据库是以电子方式存储并可通过计算机系统访问的结构化数据集合。这个系统有助于高效地组织、管理和检索数据。数据库旨在处理大量数据，允许用户快速、安全地添加、修改和查询数据。数据库支持多种数据类型，包括文本、数字、多媒体文件等，并以促进业务分析、交易管理和决策的方式进行组织。成千上万的应用程序依赖数据库，从人们日常访问的网站到在全球范围内运行的金融系统。


    数据库不仅仅存储数据；它们经过精心设计，以一种易于访问和使用的方式来组织信息。组织至关重要，因为数据的价值不仅在于其存在，还在于检索和解读它的能力。在社会的每个领域——无论是医疗、教育、商业还是技术——数据库都帮助管理病人记录、学生信息、金融交易等等。


    一般来说，数据库有多种类型，包括结构化、半结构化和非结构化数据库。根据数据性质优化存储、检索和分析的需要，数据类型与数据库类型之间存在关联。结构化、半结构化和非结构化数据都需要不同的数据库特性。对于分析而言，了解每种数据的区别至关重要，因为它们需要不同的工具和方法来提取洞见。


    结构化数据中，每条信息都以易于在数据库和电子表格中搜索的方式进行组织和格式化，并存储在预定义的模型或模式中。这样，计算机可以进行高效的处理和分析。结构化数据可以通过关系型数据库轻松访问和分析。


    在现实世界中，数据并不总是以结构化形式存储，可能是非结构化或半结构化的。非结构化数据包括从电子邮件、视频到社交媒体帖子的一切内容，通常存储在处理多样化和动态数据集的非关系型（`NoSQL`）数据库中。半结构化数据介于两者之间，结合了二者的元素。`JSON`和`XML`文档是半结构化数据的例子，它们虽然不适合传统的表模式，但具有可查询和分析的内在结构。

    '
- fmt: '### 关系型数据库与非关系型数据库


    关系型数据库与非关系型数据库之间存在主要区别，各自具有特点、优势和应用场景。关系型数据库基于关系数据模型。在此模型中，使用表（关系）来组织数据，表由行和列组成。行代表唯一记录，列代表字段。关系型数据库的强大之处在于其使用`SQL`（结构化查询语言）进行数据操作和检索，这允许在查询数据时具有高度的灵活性和精确性。最流行的关系型数据库管理系统包括`PostgreSQL`、`MySQL`、`Oracle
    Database`和`Microsoft SQL Server`。另一方面，非关系型数据库，即`NoSQL`数据库，是作为对关系模型局限性的回应而出现的，特别是在处理大量非结构化或半结构化数据方面。与固定模式不同，这些数据库通常能够存储各种数据类型，如文档、键值对、宽列和图。`NoSQL`数据库特别适用于需要快速开发、可扩展性和处理多种数据类型能力的应用程序。其中最流行的包括`MongoDB`（基于文档）、`Redis`（键值存储）、`Cassandra`（宽列数据库）和`Neo4j`（图数据库）。


    结构化、半结构化和非结构化数据类型之间的转换通常由数据管理和分析中的各种需求与挑战驱动。每种类型都有其独特的特征和最佳用例。因此，存在各种各样的数据库和数据库类型，从关系型数据库（可以通过定义良好的模式和关系有效地处理结构化数据）到`NoSQL`数据库（如文档、键值、宽列和图数据库）。它们各自都针对满足非结构化或半结构化数据的特定需求而定制。正如书名所示，接下来的章节将重点讨论结构化数据，探索关系型数据库的广阔世界以及使用`SQL`语言与它们进行交互。


    ### 探索关系型数据库管理系统


    关系型数据库在整个过程中都至关重要。由于关系型数据库是结构化的，它们确保了数据的完整性和一致性，这对数据分析至关重要。`SQL`强大的查询能力使分析师能够从大型数据库中快速有效地检索特定的数据子集。`SQL`的查询能力使分析师能够轻松地执行复杂的聚合、连接和过滤操作，这些在数据预处理和探索阶段是必不可少的任务。本书的目的是教你如何使用`SQL`提取和分析存储在数据库中的数据。在本章的剩余部分，你将越来越多地了解数据分析、数据库和其他概念，但首先你需要更好地理解数据，以便能够分析它。


    在大多数关系型数据库中，使用`SQL`来查询和管理数据。由于`SQL`强大而灵活的功能，它已成为关系型数据库管理系统的标准语言。有许多流行的关系型数据库系统使用`SQL`，包括`MySQL`、`PostgreSQL`、`Oracle
    Database`、`Microsoft SQL Server`和`SQLite`。由于`SQL`与结构化数据交互的标准方式，这些系统可以更轻松地执行复杂查询、更新数据、创建和修改模式以及管理数据库访问。


    本书使用`PostgreSQL`作为其`SQL`示例的基础，对于渴望通过关系型数据库的视角更深入理解数据分析的读者来说，它提供了许多优势。`PostgreSQL`数据库系统以其健壮性、开源性质和对`SQL`标准的遵循而闻名，使其成为最先进的关系型数据库系统之一。通过其开源模型，用户不仅能够免费使用高质量的数据库系统，而且还能从一个充满活力的开发者社区中受益，该社区不断增强了其功能。除了复杂的`SQL`查询、外键、触发器、视图和存储过程之外，`PostgreSQL`还支持广泛的`SQL`功能。


    ### 数据分析与数据叙事中的数据库


    数据库不仅提供了一种存储数据的手段，它们在分析数据和基于数据讲述故事方面也发挥着重要作用。在数据分析中，数据被检查、清理、转换和建模，以发现有用的信息、得出结论并支持决策。通过构建和组织数据，数据库促进了这一过程；它们使分析师能够有效地查询和操作数据。另一方面，叙事涉及使用叙述以引人入胜且易于理解的方式传达信息。数据叙事涉及围绕数据中的见解构建叙述，以使复杂的信息变得可访问和可理解。在数据叙事的背景下，数据库的定义可以表述为一个事实来源，数据叙事中的叙述由此构建。通过能够提取有意义的模式和趋势，数据库使讲述者能够轻松地讲述与受众产生共鸣的叙事。简而言之，数据库通过提供这些故事的原始材料，位于这一过程的核心。


    ## 深入了解 `SQL`


    在20世纪70年代，`SQL`的创建标志着数据存储和检索演变的一个关键转折点。几十年来，`SQL`从一个简单的查询语言演变为数据专业人士使用的工具。`SQL`的旅程始于20世纪70年代初期的`IBM`，研究人员`Donald
    D. Chamberlin`和`Raymond F. Boyce`开发了一个名为`SEQUEL`（结构化英语查询语言）的原型。该原型设计用于操作和存储在`IBM`早期关系型数据库管理系统中的数据。后来，该语言被更名为`SQL`以避免品牌问题。到20世纪70年代末和80年代初，`SQL`已被采纳为关系型数据库管理系统的标准语言。自那时起，`SQL`经历了多次修订，以包含更新的功能和能力。这些功能包括对`XML`数据的支持、窗口函数，以及扩展其在管理多样数据类型和复杂查询方面的效用和效率。`SQL`允许用户与数据库交互以执行查询、更新、插入和删除数据等操作。'
  raw: '### Relational Databases vs Non-Relational Databases


    There is a major distinction between relational and non-relational databases,
    each with its own characteristics, advantages, and applications. A relational
    database is based on the relational model of data. A table (relation), which consists
    of rows and columns, is used to organize data in this model. A row represents
    a unique record, and a column represents a field. The power of relational databases
    lies in their use of SQL (Structured Query Language) for data manipulation and
    retrieval, which allows high levels of flexibility and precision in querying the
    data. The most popular relational database management systems (RDBMS) are PostgreSQL,
    MySQL, Oracle Database, and Microsoft SQL Server. Alternatively, non-relational
    databases, known as *NoSQL* databases, emerged as a response to the limitations
    of relational models, especially in handling large volumes of unstructured or
    semi-structured data. As opposed to having fixed schemas, these databases are
    often capable of storing a variety of data types, such as documents, key-values,
    wide columns, and graphs. NoSQL databases are particularly well suited to applications
    that require rapid development, scalability, and the ability to handle a variety
    of data types. Among the most popular are MongoDB (document-based), Redis (key-value
    store), Cassandra (wide-column database), and Neo4j (graph database).


    Transferring between structured, semi-structured, and unstructured data types
    is often driven by a variety of needs and challenges in data management and analysis.
    Each has its unique characteristics and optimal use cases. Thus, a variety of
    databases and database types exist, ranging from relational databases, which can
    handle structured data effectively through well-defined schemas and relationships,
    to NoSQL databases such as document, key-value, wide-column, and graph databases.
    They are each tailored to meet the specific requirements of unstructured or semi-structured
    data. As the title of the book indicates, the following chapters focus on structured
    data, exploring the expansive world of relational databases and the use of the
    SQL language to interact with them.


    ### Exploring Relational Database Management Systems (RDBMS)


    Relational databases are crucial throughout the entire process. As relational
    databases are structured, they ensure the integrity and consistency of data, which
    is crucial for data analysis. The powerful querying capability of SQL allows analysts
    to retrieve specific subsets of data quickly and efficiently from large databases.
    SQL’s querying ability enables analysts to perform complex aggregations, joins,
    and filtering operations with ease, which are essential tasks in the data preprocessing
    and exploration phases. The purpose of this book is to teach you how to extract
    and analyze data stored in databases using SQL. Throughout the remainder of this
    chapter, you learn more and more about data analysis, databases, and other concepts,
    but you first need a better understanding of the data in order to be able to analyze
    it.


    In most relational databases, SQL is used to query and manage the data. Due to
    SQL’s powerful and flexible capabilities, it has become the standard language
    for relational database management systems (RDBMS). There are a number of popular
    relational database systems that use SQL, including MySQL, PostgreSQL, Oracle
    Database, Microsoft SQL Server, and SQLite. Due to the standard way in which SQL
    interacts with structured data, these systems can perform complex queries, update
    data, create and modify schemas, and manage database access more easily.


    This book uses PostgreSQL as the basis for its SQL examples, which offers numerous
    advantages for readers who are eager to gain a deeper understanding of data analysis
    through the lens of relational databases. The PostgreSQL database system is well
    known for its robustness, open-source nature, and compliance with SQL standards,
    making it one of the most advanced and reliable relational database systems. Through
    its open-source model, users are not only able to access a high-quality database
    system without licensing fees, but also benefit from a vibrant developer community
    that is constantly enhancing its capabilities. In addition to complex SQL queries,
    foreign keys, triggers, views, and stored procedures, PostgreSQL supports a wide
    range of SQL functionality.


    ### Databases in Data Analysis and Storytelling


    Databases provide more than just a means of storing data; they are also instrumental
    in analyzing data and telling stories based on that data. In data analysis, data
    is examined, cleaned, transformed, and modeled in order to find useful information,
    draw conclusions, and support decision-making. By structuring and organizing data,
    databases facilitate this process; they enable analysts to query and manipulate
    data effectively. On the other hand, storytelling involves using narratives to
    communicate information in an engaging and understandable manner. Data storytelling
    involves crafting narratives around insights in data in order to make complex
    information accessible and understandable. The definition of databases in the
    context of data storytelling could be expressed as a source of truth from which
    narratives are constructed in data storytelling. As a result of enabling the extraction
    of meaningful patterns and trends, databases make it easy for storytellers to
    tell narratives that are in tune with their audiences. In a nutshell, databases,
    by providing the raw material for these stories, lie at the heart of this process.


    ## Diving into SQL


    In the 1970s, the creation of SQL marked a pivotal moment in the evolution of
    data storage and retrieval. Over the decades, SQL evolved from a simple query
    language to a tool for professionals working with data. The journey of SQL began
    in the early 1970s at IBM, where researchers Donald D. Chamberlin and Raymond
    F. Boyce developed a prototype called SEQUEL (Structured English Query Language).
    This prototype was designed to manipulate and retrieve data stored in IBM’s early
    relational database management system. The language was late renamed SQL to avoid
    brand-name issues. By the late 1970s and early 1980s, SQL had been adopted as
    the standard language for RDBMSs. Since then, SQL has undergone several revisions
    to include updated features and capabilities. These features include support for
    XML data, window functions, and expanding its utility and efficiency in managing
    diverse data types and complex queries. SQL allows users to interact with databases
    to perform operations such as querying, updating, inserting, and deleting data.'
