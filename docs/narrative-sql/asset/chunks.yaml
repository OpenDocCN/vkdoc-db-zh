  trans: '

    ## 复合索引


    一个 `复合索引` 会同时索引多个列，非常适合那些按多个属性进行过滤或排序的查询。与其为每一列创建单独的索引，PostgreSQL 使用复合索引来加速那些在过滤条件中涉及索引列组合的查询。


    ```sql

    CREATE INDEX idx_name_department ON employees (name, department);

    ```


    此索引在按特定部门搜索员工时能提升性能，因为它允许 PostgreSQL 同时基于这两个列高效地导航数据。复合索引在多列过滤、排序和 `JOIN` 操作中尤其有用。


    > **注意**

    > 对于数据分析任务，最适用的 PostgreSQL 索引是 B-tree、GIN 和 GiST，因为它们在处理大型数据集、复杂查询和特定数据类型方面效率很高。


    1.  **B-tree 索引：** 适用于等值比较 (`=`)、范围查询 (`<`, `>`, `<=`, `>=`) 和排序 (`ORDER BY`)。其平衡结构确保了性能稳定，对于过滤和聚合大型数据集至关重要。

    2.  **GIN 索引：** 高效索引复合数据类型，如数组、JSON 和全文搜索。它对于涉及半结构化数据和在嵌套结构中快速查找的高级数据分析任务特别有用。

    3.  **GiST 索引：** 最适合多维数据和空间分析。它支持几何数据类型、文本搜索和相似性搜索，对于地理信息系统 (GIS) 和基于相似性的数据分析很有价值。

    4.  **BRIN 索引：** 针对非常大的数据集进行了优化，尤其是那些具有自然顺序的数据，如时间序列数据。通过为每个数据块存储最少的信息，BRIN 减少了存储空间并加速了扫描大范围连续数据的查询。


    其他索引类型，如 Hash，更为专用，在一般数据分析场景中较少使用。唯一索引对数据完整性至关重要，但不会直接影响分析性能。


    ### 删除索引


    如果不再需要某个索引，可以使用 `DROP INDEX` 命令将其移除：


    ```sql

    DROP INDEX idx_department;

    ```


    ### 使用 EXPLAIN 检查索引使用情况


    当查询 PostgreSQL 时，可以使用 `EXPLAIN` 关键字来查看是否使用了索引：


    ```sql

    EXPLAIN SELECT * FROM employees WHERE department = ''IT'';

    ```


    查找输出中的 `Index Scan`，这表明正在使用索引。如果看到 `Seq Scan`，则表示 PostgreSQL 正在扫描整张表（速度较慢）。


    ## 何时使用及何时避免使用索引


    数据库索引是优化查询性能的强大工具，但其使用应具有策略性。索引在处理大型、频繁查询的表时非常有益，尤其是在特定列上进行搜索、过滤、排序或连接时。然而，过度使用索引可能适得其反。因为索引会消耗额外的磁盘空间并减慢
    `INSERT`、`UPDATE` 和 `DELETE` 操作，所以避免过度索引至关重要。平衡的方法是关键，需要根据查询模式和数据修改频率谨慎选择要索引的列。关于何时使用以及何时避免使用索引的概述说明见表
    9-1。


    **表 9-1：何时使用及何时避免使用索引**


    | 何时使用索引 | 避免过度索引的原因 |

    | --- | --- |

    | 表数据量大且频繁被查询 | 索引消耗磁盘空间（过度索引会增加存储成本） |

    | 特定列经常被搜索、过滤或排序 | 索引会减慢 `INSERT`、`UPDATE` 和 `DELETE` 操作 |

    | 查询涉及大表之间的连接 | 维护多个索引会在数据修改时增加开销 |

    | 查询频繁使用 `WHERE`、`ORDER BY` 或 `GROUP BY` | 每次修改数据时索引都需要更新，会减慢写入速度 |

    | 对大文本字段执行全文搜索（推荐使用 GIN） | 过多索引可能会使查询规划器混淆，导致执行计划次优 |

    | 表有外键或需要强制唯一性 | 索引对于小表或低选择性列可能无法提供好处 |

    | 查询按 JSON 字段或数组元素过滤（推荐使用 GIN 或 GiST） | 如果查询很少使用索引列，索引可能会降低性能 |

    | 时间序列或顺序数据需要高效的范围查询（推荐使用 BRIN） | 部分索引或复合索引在某些场景下可能更高效 |


    ## 索引在数据分析任务中的作用


    索引在数据库中充当数据检索的指南，有助于加速数据分析。这使得数据库可以跳过全表扫描并快速定位特定数据点。特别是在处理大型数据集时，穷举搜索会慢得无法承受。通过优化过滤和排序操作，索引使分析人员能够根据特定标准快速缩小数据范围或进行有意义的排列。这对于识别数据中的趋势、异常值或模式等任务至关重要。


    索引还通过促进多个表之间的连接来提升数据仓库和分析性能。索引有助于更快地进行连接，从而获得来自不同来源数据的全景视图。索引不仅支持范围查询，还能加速总和、平均值和计数的计算，这对于汇总和理解数据分布至关重要。索引使数据分析师能够更快地进行复杂调查、提取有价值的见解并做出数据驱动的决策。尽管在存储空间和写入性能方面存在权衡，但对于涉及大量读写操作的工作负载而言，其益处远大于缺点。


    ## 使用 EXPLAIN 审查查询执行


    `EXPLAIN` 有助于分析 PostgreSQL 计划如何执行查询，这在优化大型数据集上的分析查询时至关重要。


    ```sql

    EXPLAIN query_statement;

    ```


    这里，`query_statement` 是待分析的 SQL 查询，它提供了数据库引擎打算如何执行该 SQL 语句的见解。简而言之，PostgreSQL 分析并解析由
    `EXPLAIN query_statement` 提供的 SQL 语句。它不会实际执行查询并返回结果，而是生成一个执行计划。该计划概述了执行查询的步骤。作为输出，此计划显示了估计的成本和操作顺序。


    > **注意**

    > 关于扫描类型，`EXPLAIN` 可以揭示数据库是执行顺序扫描（读取表的每一行），还是使用索引通过索引扫描进行高效检索、仅使用索引数据的索引 only
    扫描，或使用位图索引的位图扫描。当查询涉及 `JOIN` 时，`EXPLAIN` 会详细说明所使用的 `JOIN` 方法，例如迭代匹配的 `NestedLoop`、合并已排序行的
    `MERGE JOIN`，或使用哈希表探测的 `Hash Join`。此外，输出清晰地显示了应用于数据的过滤条件，因此您可以理解数据库是如何缩小结果范围的。

    '
- fmt: '## Using `EXPLAIN ANALYZE` for Performance Measurement


    `EXPLAIN ANALYZE` executes the query and provides actual runtime statistics. It
    is best to use this for testing performance improvements after adding indexes.


    ```

    EXPLAIN ANALYZE query_statement;

    ```


    Here, `query_statement` is the SQL query to analyze with real-time metrics. `EXPLAIN
    ANALYZE` is a tool for database performance analysis in PostgreSQL. It goes beyond
    the estimated costs provided by a simple `EXPLAIN` by actually executing the query
    and collecting real-time metrics. Table [9-2](#619961_1_En_9_Chapter.xhtml#Tab2)
    indicates the key differences of `EXPLAIN` and `EXPLAIN ANALYZE`.


    Table 9-2: Key Differences Between `EXPLAIN` and `EXPLAIN ANALYZE`


    | Feature | `EXPLAIN` | `EXPLAIN ANALYZE` |

    | --- | --- | --- |

    | Actual execution | Generates an execution plan (no execution) | Executes the
    query; gathers runtime stats |

    | Real-time metrics | Provides estimated costs | Provides actual execution times,
    row counts |


    In addition to estimating costs and providing a plan structure, `EXPLAIN ANALYZE`
    provides runtime metrics that enhance the analysis. In PostgreSQL, the planner’s
    cost estimates are expressed as two numbers: a startup cost and a total cost.
    These are unitless values based on estimated I/O, CPU usage, and row counts, and
    are used to compare alternative execution plans rather than reflect actual time.
    `EXPLAIN ANALYZE` reveals the actual execution time for each node, measured in
    milliseconds, which directly highlights performance bottlenecks. The actual row
    counts allow for a precise comparison of the planner’s estimates, revealing their
    accuracy. In nested loop joins, loop counts specify the frequency of inner loop
    executions. Additionally, other runtime statistics may also be included, depending
    on the specific query and PostgreSQL version. This can provide an overview of
    the query’s real-world execution.


    ## The First Story: Golf Performance Data Analysis


    Martina is a data analyst at a golf club, responsible for evaluating player performance
    and optimizing tournament operations. She manages a database that tracks players’
    scores, course details, and tournament results. The data tables shown in Tables
    [9-3](#619961_1_En_9_Chapter.xhtml#Tab3), [9-4](#619961_1_En_9_Chapter.xhtml#Tab4),
    and [9-5](#619961_1_En_9_Chapter.xhtml#Tab5) are growing as more tournaments take
    place, and she wants to ensure that the queries run efficiently. With indexes
    and performance analysis tools like `EXPLAIN ANALYZE`, Martina aims to speed up
    data retrieval and facilitate better decision-making.


    Table 9-5: The Scores Table


    | score_id | player_id | tournament_id | round_number | Strokes |

    | --- | --- | --- | --- | --- |

    | 1 | 1 | 1 | 1 | 70 |

    | 2 | 1 | 1 | 2 | 72 |

    | 3 | 2 | 1 | 1 | 68 |

    | 4 | 2 | 1 | 2 | 70 |

    | 5 | 3 | 2 | 1 | 71 |

    | 6 | 3 | 2 | 2 | 69 |

    | 7 | 4 | 2 | 1 | 70 |

    | 8 | 4 | 2 | 2 | 68 |

    | 9 | 5 | 3 | 1 | 73 |

    | 10 | 5 | 3 | 2 | 72 |


    Table 9-4: The Tournaments Table


    | tournament_id | Name | Location | Year |

    | --- | --- | --- | --- |

    | 1 | Masters Tournament | Augusta National Golf Club | 2023 |

    | 2 | US Open | Pebble Beach | 2023 |

    | 3 | The Open Championship | St Andrews | 2023 |

    | 4 | PGA Championship | Oak Hill | 2023 |

    | 5 | Ryder Cup | Marco Simone | 2023 |


    Table 9-3: The Players Table


    | player_id | Name | Age | Nationality |

    | --- | --- | --- | --- |

    | 1 | Tiger Woods | 48 | USA |

    | 2 | Rory McIlroy | 34 | Northern Ireland |

    | 3 | Jon Rahm | 29 | Spain |

    | 4 | Brooks Koepka | 33 | USA |

    | 5 | Dustin Johnson | 40 | USA |

    | 6 | Collin Morikawa | 27 | USA |

    | 7 | Justin Thomas | 31 | USA |

    | 8 | Phil Mickelson | 53 | USA |

    | 9 | Jordan Spieth | 31 | USA |

    | 10 | Viktor Hovland | 26 | Norway |


    Martina creates indexes on columns frequently used for filtering and joining to
    improve query performance.


    ```

    CREATE INDEX idx_player_id ON scores(player_id);

    CREATE INDEX idx_tournament_id ON scores(tournament_id);

    CREATE INDEX idx_name ON players(name);

    ```


    The columns Martina chose for indexing are frequently used for filtering, joining,
    and sorting. These are the primary use cases where indexes improve data analysis
    efficiency. For instance, an index on the `scores(player_id)` column can speed
    up queries that filter or join by player ID, which is common when retrieving a
    specific player’s scores. Since `player_id` is a foreign key in the `Scores` table,
    indexing it improves join performance with the `Players` table. To filter scores
    by tournament, the `scores(tournament_id)` column is essential for analyzing player
    performance at a specific event. Indexing `tournament_id` speeds up queries that
    group, filter, or join scores from the `Tournaments` table. For the `players(name)`
    column, an index on `name` supports direct lookups of players by name, which is
    common when analyzing an individual player’s performance. Although names are not
    unique, indexing this column still enhances search efficiency.


    These indexes were selected to balance performance improvements for frequent data
    analysis tasks while minimizing overhead associated with excessive indexing.


    To get answers to the following questions, Martina intends to use this data and
    SQL queries:


    *   Who scored below 70 strokes in any round of the Masters Tournament?

    *   Calculate the average strokes for each player in the U.S. Open.

    *   Find the top three players with the lowest combined scores in the Open Championship.

    *   Retrieve all scores of Tiger Woods for performance analysis.


    Martina wrote the following query to find players who scored below 70 strokes
    in any round of the Masters Tournament. Martina uses `EXPLAIN` to show whether
    indexes are used for `JOIN`s and filtering. An index scan should replace seq scan
    for better performance. This query benefits from an index on `player_id` and `tournament_id`
    since it filters by both.'
