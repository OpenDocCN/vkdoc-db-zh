  raw: '##### Example: Top-N Analysis Within Partitions


    The goal here is to determine the three highest-paying customers in each region
    based on the three most profitable customers.


    ```

    WITH CustomerTotals AS (

    SELECT Customer_ID, Region, SUM(Sale_Amount) AS Total_Purchase

    FROM Sales

    GROUP BY Customer_ID, Region

    )

    SELECT

    Customer_ID,

    Region,

    Total_Purchase,

    RANK() OVER (PARTITION BY Region ORDER BY Total_Purchase DESC) AS Region_Rank

    FROM CustomerTotals

    WHERE Customer_ID IN (

    SELECT Customer_ID

    FROM (

    SELECT

    Customer_ID,

    Region,

    Total_Purchase,

    RANK() OVER (PARTITION BY Region ORDER BY Total_Purchase DESC) AS Region_Rank

    FROM CustomerTotals ) AS RankedCustomers

    WHERE Region_Rank <= 3 );

    ```


    This SQL query uses a *common table expression* (CTE) named `CustomerTotals` to
    calculate and organize customer purchase data in a structured manner. The CTE
    first aggregates the total purchase amount, `Total_Purchase`, for each customer,
    `Customer_ID`, in every region, `Region`, by totaling `Sale_Amount` from the `Sales`
    table and grouping by both customer and region. This step isolates the aggregation
    logic, producing a concise result set that contains one row per customer per region,
    summarizing their total spending.


    In the main query, these aggregated data are further processed using the `RANK()`
    window function. The function partitions the data by `Region` and orders the results
    in descending order of `Total_Purchase`, assigning a rank to each customer within
    their respective region. To identify the top performers, the query applies a filter.
    Only customers whose regional rank is less than or equal to three are selected,
    effectively limiting the output to the top three spenders in each region. This
    filtering is done by nesting another query in the ranking results and using a
    `WHERE Region_Rank <= 3` clause. The final `SELECT` returns `Customer_ID`, `Region`,
    `Total_Purchase`, and their rank in that region.


    The use of a CTE improves the readability and maintainability of the query by
    clearly separating the total purchase aggregation from the ranking and filtering
    logic. This approach avoids redundancy by calculating totals once and referencing
    them multiple times without repeating computations, much like using a temporary,
    named result set. In complex analytical queries, CTEs simplify debugging, enhance
    performance through reuse, and make SQL easier to extend or modify in the future.


    Note


    Common table expressions are temporary result sets that you can reference within
    `SELECT`, `INSERT`, `UPDATE`, or `DELETE` queries. They are defined using the
    `WITH` keyword and provide a way to write cleaner, more readable queries, especially
    for complex multi-step operations. The concept of CTEs is similar to that of subqueries,
    but they are much easier to read and reuse. The basic syntax of CTEs can be summed
    up as follows:


    ```

    WITH cte_name AS (

    SELECT columns

    FROM table

    WHERE conditions

    )

    SELECT * FROM cte_name;

    ```


