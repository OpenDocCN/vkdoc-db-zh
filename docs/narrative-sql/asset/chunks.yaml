  trans: '

    ## SQL 术语


    每当涉及 SQL 时，必须区分构成其语言结构和功能的几个核心组件。最高层级是语句（Statements），它们是在数据库上执行操作的完整指令。这些指令包括用于检索数据的
    `SELECT`、用于添加数据的 `INSERT`、用于修改数据的 `UPDATE`、用于删除数据的 `DELETE` 以及用于定义 SQL 结构的 `CREATE
    TABLE`。


    在这些语句内部是子句（Clauses），它们作为构建块来细化语句的意图。诸如 `FROM`、`WHERE`、`GROUP BY`、`ORDER BY` 和
    `HAVING` 之类的子句指定了数据源、过滤条件和分组逻辑。操作（Operations）指应用于数据的特定动作，包括算术运算（+、-）、比较运算（=、<、>）和逻辑运算（`AND`、`OR`、`NOT`）。SQL
    还包含函数（Functions），它们是用于计算和转换的预定义例程——例如 `SUM()`、`AVG()`、`COUNT()`、`MAX()` 以及像 `UPPER()`
    或 `NOW()` 这样的字符串和日期函数。这些组件通常组合在表达式（Expressions）中，表达式结合值、运算符和函数以产生单一结果。术语 *命令*（*command*）有时与语句（statement）互换使用，尤其是在与数据库系统进行交互的命令行界面中。表
    A-1 展示了这些术语。


    表 A-1: SQL 术语


    | 组件 | 描述 | 示例 |

    | --- | --- | --- |

    | 语句 | 在数据库上执行操作的完整指令。 | `SELECT` 检索数据 |

    | | | `INSERT` 添加新数据 |

    | | | `UPDATE` 修改现有数据 |

    | | | `DELETE` 删除数据 |

    | | | `CREATE TABLE` 定义新表 |

    | 子句 | SQL 语句的组成部分，用于指定数据源、条件或操作。 | `FROM` 指定源表 |

    | | | `WHERE` 根据条件过滤行 |

    | | | `GROUP BY` 对具有相似值的行进行分组 |

    | | | `ORDER BY` 对结果集排序 |

    | | | `HAVING` 过滤分组后的结果 |

    | 操作 | 应用于表达式中值的动作。 | 算术：+、-、*、/ |

    | | | 比较：=、<、>、!= |

    | | | 逻辑：`AND`、`OR` 和 `NOT` |

    | 函数 | 用于计算或数据处理的预定义例程。 | `SUM()` 对值求和 |

    | | | `AVG()` 计算平均值 |

    | | | `COUNT()` 计算行数 |

    | | | `MAX()`、`MIN()` 查找极值 |

    | | | `UPPER()`、`LOWER()` 更改大小写 |

    | | | `NOW()`、`DATEADD()` |


    ## SQL 基础


    SQL 语句根据其在数据库管理中的作用被分类为不同的功能组。表 A-2 说明了四种主要的 SQL 语句类型，按其用途、描述和数据库操作中使用的常见命令进行分类。


    表 A-2: 四种主要的 SQL 语句类型


    | 类别 | 描述 | 常用命令 |

    | --- | --- | --- |

    | 数据定义语言 | 定义和修改数据库模式及结构。 | `CREATE`, `ALTER`, `DROP`, `TRUNCATE` |

    | 数据操作语言 | 管理表中的数据。 | `SELECT`, `INSERT`, `UPDATE`, `DELETE` |

    | 数据控制语言 | 控制访问和权限。 | `GRANT`, `REVOKE` |

    | 事务控制语言 | 管理数据库内的事务。 | `BEGIN`, `COMMIT`, `ROLLBACK`, `SAVEPOINT` |


    在所有上述主要的 SQL 语句类型中，DML 是数据分析中最常用的。表 A-3 展示了四个基本的 DML 命令，重点说明了它们的用途、基本语法以及在数据库中管理数据的示例用例。


    表 A-3: 基本 DML 命令


    | 命令 | 用途 | 基本语法 | 示例用例 |

    | --- | --- | --- | --- |

    | `SELECT` | 从一个或多个表中检索数据。 | `SELECT column1, column2 FROM table_name WHERE condition;`
    | 从 `Customers` 表中获取所有客户姓名。 |

    | `INSERT` | 向表中添加新数据行。 | `INSERT INTO table_name (column1, column2) VALUES (value1,
    value2);` | 向 `Products` 表添加一个新产品。 |

    | `UPDATE` | 修改表中的现有数据。 | `UPDATE table_name SET column1 = value1 WHERE condition;`
    | 更改 `Customers` 表中客户的电子邮件地址。 |

    | `DELETE` | 从表中删除行。 | `DELETE FROM table_name WHERE condition;` | 从 `Products`
    表中移除已停产的产品。 |


    表 A-4 说明了关键的 DDL 命令，概述了它们的用途、基本语法以及用于定义和修改数据库结构的示例用例。


    表 A-4: 基本 DDL 命令


    | 命令 | 用途 | 基本语法 | 示例用例 |

    | --- | --- | --- | --- |

    | `CREATE TABLE` | 定义一个新表及其结构。 | `CREATE TABLE table_name (column1 datatype, column2
    datatype, ...);` | 创建一个包含 ID、姓名和电子邮件的用户表。 |

    | `ALTER TABLE` | 修改现有表。 | `ALTER TABLE table_name ADD column_name datatype;`<br>`ALTER
    TABLE table_name DROP COLUMN column_name;` | 向 `Users` 表添加一个 `Age` 列。 |

    | `DROP TABLE` | 永久删除一个表及其数据。 | `DROP TABLE table_name;` | 删除 `archived_orders`
    表。 |

    | `TRUNCATE TABLE` | 从表中删除所有行（比 `DELETE` 更快）。 | `TRUNCATE TABLE table_name;` |
    快速清空 `Logs` 表中的所有数据。 |


    SQL 支持一系列数据类型来表示不同种类的值。表 A-5 总结了常用的、与 PostgreSQL 兼容的 SQL 数据类型。


    表 A-5: 常见数据类型


    | 数据类型 | 描述 | 示例用例 |

    | --- | --- | --- |

    | `INT, INTEGER` | 整数 | 计数记录，ID |

    | `DECIMAL(p,s), NUMERIC(p,s)` | 精确小数 | 财务数据，货币 |

    | `REAL, DOUBLE PRECISION` | 近似数值 | 科学或统计数据 |

    | `CHAR(n), VARCHAR(n)` | 固定或可变长度字符串 | 姓名，电子邮件地址 |

    | `TEXT` | 大文本字符串 | 评论，描述 |

    | `DATE, TIME, TIMESTAMP` | 日期和时间值 | 出生日期，交易日志 |

    | `BOOLEAN` | 真/假值 | 标志，二元状态 |

    | `BYTEA` | 二进制数据 | 存储图像，文件，文档 |

    '
- fmt: '## Identifiers and Naming Conventions


    In SQL, identifiers refer to the names of database objects such as tables, columns,
    indexes, and functions. Naming these objects consistently and correctly ensures
    better code readability, fewer syntax errors, and improved maintainability. Table
    [A-6](#Backmatter_001.xhtml#Tab6) summarizes the essential rules and best practices
    related to identifiers in PostgreSQL.


    **Table A-6**

    Essential Rules and Best Practices Related to Identifiers in PostgreSQL


    | Category | Rule/Best Practice | Description | Examples |

    | --- | --- | --- | --- |

    | Basic structure | Start with a letter or underscore | Identifiers must begin
    with an alphabetic character (a-z, A-Z) or an underscore (_). | `users`, `product_details`,
    `_temp_data` |

    |  | Contain letters, digits, and underscores | Subsequent characters can be letters,
    digits (0-9), or underscores. Other characters are generally not allowed without
    quotation marks. | `user_id`, `order2023`, `item_count` |

    | Case sensitivity (Unquoted) | Unquoted identifiers are folded to lowercase.
    | So, `TableName`, `tablename`, and `TABLENAME` are all interpreted as `tablename`.
    Creating a table as `MyTable` will be referenced as `mytable`. |

    | Case sensitivity (Quoted) | Identifiers enclosed in double quotes (") are treated
    as case-sensitive. | `"MyTable"` is different from `"mytable"`. `SELECT "FirstName"
    FROM "Users";` |

    | Reserved words | Avoid reserved SQL keywords (unquoted) | Do not use unquoted
    SQL keywords (e.g., `SELECT`, `FROM`, `WHERE`, `USER`) as identifiers. This will
    lead to syntax errors. Avoid: `SELECT, user, group` (unquoted). |

    |  | Use double quotes to use reserved words | If you absolutely must use a reserved
    word as an identifier, enclose it in double quotes. This is generally discouraged.
    Examples: `"SELECT"`, `"user"`, `"group"`. |

    | Length limits | Maximum length | PostgreSQL has a maximum length for identifiers,
    typically around 63 bytes. While you can often exceed this, it''s best to keep
    them reasonable. Consider shorter, more descriptive names. |

    | Best practices | Be descriptive and meaningful | Choose names that clearly indicate
    the purpose of the database object. Instead of `t1`, use `customers`. Instead
    of `col1`, use `customer_name`. |

    |  | Maintain consistency | Adopt a consistent naming convention throughout your
    database schema (e.g., snake_case, camelCase). `customer_order` (snake_case) vs.
    `customerOrder` (camelCase). |

    |  | Use underscores for separation | Underscores are commonly used to separate
    words within an identifier, improving readability. Examples: `product_category`,
    `order_item_id`. |

    |  | Avoid special characters (unquoted) | While technically some special characters
    might be allowed with quoting, it''s best to avoid them in general for simplicity
    and portability. Avoid: `data-value, user name` (unquoted). |

    |  | Consider plural vs. singular for tables | There''s no strict rule, but be
    consistent. Plural is often used for tables representing collections of entities.
    Examples: `products`, `orders`. |

    |  | Use singular for column names representing single values | Column names usually
    represent a single attribute of a row. Examples: `customer_id`, `product_name`,
    `order_date`. |


    ## JOINs and Subqueries


    Table [A-7](#Backmatter_001.xhtml#Tab7) shows various SQL `JOIN` types and subquery
    concepts, detailing their purpose, basic syntax, and how they are used to retrieve
    and relate data across tables.


    **Table A-7**

    SQL JOIN Types and Subquery Concepts


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `INNER JOIN` | Returns only rows with matching values in both tables. | `SELECT
    * FROM table1 INNER JOIN table2 ON table1.id = table2.id;` |

    | `LEFT JOIN` | Returns all rows from the left table and matched rows from the
    right table. | `SELECT * FROM table1 LEFT JOIN table2 ON table1.id = table2.id;`
    |

    | `RIGHT JOIN` | Returns all rows from the right table and matched rows from the
    left table. | `SELECT * FROM table1 RIGHT JOIN table2 ON table1.id = table2.id;`
    |

    | `FULL JOIN` | Returns all rows when there is a match in either table. | `SELECT
    * FROM table1 FULL JOIN table2 ON table1.id = table2.id;` |

    | `CROSS JOIN` | Returns the Cartesian product of both tables. | `SELECT * FROM
    table1 CROSS JOIN table2;` |

    | `SELF JOIN` | Joins a table to itself using table aliases. | `SELECT a.name,
    b.name FROM employees a JOIN employees b ON a.manager_id = b.id;` |

    | Non-correlated subquery | Executes independently of the outer query. | `SELECT
    name FROM employees WHERE dept_id IN (SELECT id FROM departments);` |

    | Correlated subquery | References a column from the outer query inside the subquery.
    | `SELECT name FROM employees e WHERE salary > (SELECT AVG(salary) FROM employees
    WHERE dept_id = e.dept_id);` |


    ## Aggregate Functions and Grouping


    Table [A-8](#Backmatter_001.xhtml#Tab8) illustrates key SQL aggregate functions
    and grouping clauses, explaining their purpose, syntax, and how they are used
    to summarize and filter data in queries.


    **Table A-8**

    Key SQL Aggregate Functions and Grouping Clauses


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `COUNT()` | Counts the number of rows or non-`NULL` values. | `SELECT COUNT(*)
    FROM table;` |

    | `SUM()` | Calculates the total of a numeric column. | `SELECT SUM(column) FROM
    table;` |

    | `AVG()` | Computes the average of a numeric column. | `SELECT AVG(column) FROM
    table;` |

    | `MIN()` | Finds the smallest value in a column. | `SELECT MIN(column) FROM table;`
    |

    | `MAX()` | Finds the largest value in a column. | `SELECT MAX(column) FROM table;`
    |

    | `GROUP BY` clause | Groups rows based on one or more columns. | `SELECT column,
    AGG_FUNC(column) FROM table GROUP BY column;` |

    | `HAVING` clause | Filters groups based on aggregate conditions. | `SELECT column,
    AGG_FUNC(column) FROM table GROUP BY column HAVING condition;` |


    ## Conditional Logic and Control Flow


    Table [A-9](#Backmatter_001.xhtml#Tab9) shows SQL conditional expressions and
    functions, describing their purpose, syntax, and how they help in handling logic
    and `NULL` values within queries.


    **Table A-9**

    SQL Conditional Expressions and Functions


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `CASE` statement | Evaluates conditions and returns values based on those conditions.
    | `SELECT CASE WHEN condition THEN result ELSE alternative END FROM table;` |

    | `COALESCE()` | Returns the first non-`NULL` value in a list of expressions.
    | `SELECT COALESCE(column1, column2, default_value) FROM table;` |

    | `NULLIF()` | Returns `NULL` if two expressions are equal; otherwise, returns
    the first. | `SELECT NULLIF(expression1, expression2) FROM table;` |

    | Conditional expressions | Used in `WHERE`, `HAVING`, and other clauses to filter
    or evaluate logic. | `SELECT * FROM table WHERE condition;` |


    ## Common Table Expressions (CTEs) and Views


    Table [A-10](#Backmatter_001.xhtml#Tab10) illustrates the use of CTEs and views
    in SQL, including their purpose, syntax, and how they support query modularization
    and virtual table creation.


    **Table A-10**

    Common Table Expressions and Views in SQL


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `WITH` (non-recursive CTE) | Defines a temporary result set to be used in a
    larger query. | `WITH cte_name AS (SELECT ... FROM table) SELECT ... FROM cte_name;`
    |

    | `WITH RECURSIVE` | Defines a recursive CTE to handle hierarchical or iterative
    data. | `WITH RECURSIVE cte_name AS (SELECT ... UNION ALL SELECT ... FROM cte_name
    ...) SELECT ... FROM cte_name;` |

    | `CREATE VIEW` | Creates a virtual table based on a query result. | `CREATE VIEW
    view_name AS SELECT ... FROM table;` |

    | Use/View Query | Queries data from the created view like a table. | `SELECT
    ... FROM view_name;` |

    | `DROP VIEW` | Deletes a view from the database. | `DROP VIEW view_name;` |'
  raw: '## Identifiers and Naming Conventions


    In SQL, identifiers refer to the names of database objects such as tables, columns,
    indexes, and functions. Naming these objects consistently and correctly ensures
    better code readability, fewer syntax errors, and improved maintainability. Table
    [A-6](#Backmatter_001.xhtml#Tab6) summarizes the essential rules and best practices
    related to identifiers in PostgreSQL.


    Table A-6


    Essential Rules and Best Practices Related to Identifiers in PostgreSQL


    | Category | Rule/Best Practice | Description | Examples |

    | --- | --- | --- | --- |

    | Basic structure | Start with a letter or underscore | Identifiers must begin
    with an alphabetic character (a-z, A-Z) or an underscore (_). | `users`, `product_details`,
    `_temp_data` |

    | Contain letters, digits, and underscores | Subsequent characters can be letters,
    digits (0-9), or underscores. Other characters are generally not allowed without
    quotation marks. | `user_id`, `order2023`, `item_count` |

    | Case sensitivity (Unquoted) | Unquoted identifiers are folded to lowercase.
    So, `TableName`, `tablename`, and `TABLENAME` are all interpreted as `tablename`.
    | Creating a table as `MyTable` will be referenced as `mytable`. |

    | Case sensitivity (Quoted) | Identifiers enclosed in double quotes (") are treated
    as case-sensitive. `"MyTable"` is different from `"mytable"`. | `SELECT "FirstName"
    FROM "Users";` |

    | Reserved words | Avoid reserved SQL keywords (unquoted) | Do not use unquoted
    SQL keywords (e.g., `SELECT`, `FROM`, `WHERE`, `USER`) as identifiers. This will
    lead to syntax errors. | Avoid: `SELECT, user, group (unquoted)` |

    | Use double quotes to use reserved words | If you absolutely must use a reserved
    word as an identifier, enclose it in double quotes. This is generally discouraged.
    | `"SELECT"`, `"user"`, `"group"` |

    | Length limits | Maximum length | PostgreSQL has a maximum length for identifiers,
    typically around 63 bytes. While you can often exceed this, it''s best to keep
    them reasonable. | Consider shorter, more descriptive names |

    | Best practices | Be descriptive and meaningful | Choose names that clearly indicate
    the purpose of the database object. | Instead of `t1`, use `customers`. Instead
    of `col1`, use `customer_name`. |

    | Maintain consistency | Adopt a consistent naming convention throughout your
    database schema (e.g., snake_case, camelCase). | `customer_order` (snake_case)
    vs. `customerOrder` (camelCase) |

    | Use underscores for separation | Underscores are commonly used to separate words
    within an identifier, improving readability. | `product_category`, `order_item_id`
    |

    | Avoid special characters (unquoted) | While technically some special characters
    might be allowed with quoting, it''s best to avoid them in general for simplicity
    and portability. | Avoid: `data-value, user name (unquoted)` |

    | Consider plural vs. singular for tables | There''s no strict rule, but be consistent.
    Plural is often used for tables representing collections of entities. | `products`,
    `orders` |

    | Use singular for column names representing single values | Column names usually
    represent a single attribute of a row. | `customer_id`, `product_name`, `order_date`
    |


    ## JOINs and Subqueries


    Table [A-7](#Backmatter_001.xhtml#Tab7) shows various SQL `JOIN` types and subquery
    concepts, detailing their purpose, basic syntax, and how they are used to retrieve
    and relate data across tables.


    Table A-7


    SQL JOIN Types and Subquery Concepts


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `INNER JOIN` | Returns only rows with matching values in both tables. | `SELECT
    * FROM table1 INNER JOIN table2 ON table1.id = table2.id;` |

    | `LEFT JOIN` | Returns all rows from the left table and matched rows from the
    right table. | `SELECT * FROM table1 LEFT JOIN table2 ON table1.id = table2.id;`
    |

    | `RIGHT JOIN` | Returns all rows from the right table and matched rows from the
    left table. | `SELECT * FROM table1 RIGHT JOIN table2 ON table1.id = table2.id;`
    |

    | `FULL JOIN` | Returns all rows when there is a match in either table. | `SELECT
    * FROM table1 FULL JOIN table2 ON table1.id = table2.id;` |

    | `CROSS JOIN` | Returns the Cartesian product of both tables. | `SELECT * FROM
    table1 CROSS JOIN table2;` |

    | `SELF JOIN` | Joins a table to itself using table aliases. | `SELECT a.name,
    b.name FROM employees a JOIN employees b ON a.manager_id = b.id;` |

    | Non-correlated subquery | Executes independently of the outer query. | `SELECT
    name FROM employees WHERE dept_id IN (SELECT id FROM departments);` |

    | Correlated subquery | References a column from the outer query inside the subquery.
    | `SELECT name FROM employees e WHERE salary > (SELECT AVG(salary) FROM employees
    WHERE dept_id = e.dept_id);` |


    ## Aggregate Functions and Grouping


    Table [A-8](#Backmatter_001.xhtml#Tab8) illustrates key SQL aggregate functions
    and grouping clauses, explaining their purpose, syntax, and how they are used
    to summarize and filter data in queries.


    Table A-8


    Key SQL Aggregate Functions and Grouping Clauses


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `COUNT()` | Counts the number of rows or non-`NULL` values. | `SELECT COUNT(*)
    FROM table;` |

    | `SUM()` | Calculates the total of a numeric column. | `SELECT SUM(column) FROM
    table;` |

    | `AVG()` | Computes the average of a numeric column. | `SELECT AVG(column) FROM
    table;` |

    | `MIN()` | Finds the smallest value in a column. | `SELECT MIN(column) FROM table;`
    |

    | `MAX()` | Finds the largest value in a column. | `SELECT MAX(column) FROM table;`
    |

    | `GROUP BYclause` | Groups rows based on one or more columns. | `SELECT column,
    AGG_FUNC(column) FROM table GROUP BY column;` |

    | `HAVING clause` | Filters groups based on aggregate conditions. | `SELECT column,
    AGG_FUNC(column) FROM table GROUP BY column HAVING condition;` |


    ## Conditional Logic and Control Flow


    Table [A-9](#Backmatter_001.xhtml#Tab9) shows SQL conditional expressions and
    functions, describing their purpose, syntax, and how they help in handling logic
    and `NULL` values within queries.


    Table A-9


    SQL Conditional Expressions and Functions


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `CASE` statement | Evaluates conditions and returns values based on those conditions.
    | `SELECT CASE WHEN condition THEN result ELSE alternative END FROM table;` |

    | `COALESCE()` | Returns the first non-`NULL` value in a list of expressions.
    | `SELECT COALESCE(column1, column2, default_value) FROM table;` |

    | `NULLIF()` | Returns `NULL` if two expressions are equal; otherwise, returns
    the first. | `SELECT NULLIF(expression1, expression2) FROM table;` |

    | Conditional expressions | Used in `WHERE`, `HAVING`, and other clauses to filter
    or evaluate logic. | `SELECT * FROM table WHERE condition;` |


    ## Common Table Expressions (CTEs) and Views


    Table [A-10](#Backmatter_001.xhtml#Tab10) illustrates the use of CTEs and views
    in SQL, including their purpose, syntax, and how they support query modularization
    and virtual table creation.


    Table A-10


    Common Table Expressions and Views in SQL


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `WITH` (non-recursive CTE) | Defines a temporary result set to be used in a
    larger query. | `WITH cte_name AS (SELECT ... FROM table) SELECT ... FROM cte_name;`
    |

    | `WITH RECURSIVE` | Defines a recursive CTE to handle hierarchical or iterative
    data. | `WITH RECURSIVE cte_name AS (SELECT ... UNION ALL SELECT ... FROM cte_name
    ...) SELECT ... FROM cte_name;` |

    | `CREATE VIEW` | Creates a virtual table based on a query result. | `CREATE VIEW
    view_name AS SELECT ... FROM table;` |

    | Use/View Query | Queries data from the created view like a table. | `SELECT
    ... FROM view_name;` |

    | `DROP VIEW` | Deletes a view from the database. | `DROP VIEW view_name;` |'
