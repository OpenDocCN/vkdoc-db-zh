    | Retrieves the top best-selling products by descending `total_sales`. |

    | Employee salaries in a company | Display salaries in descending order. | `SELECT
    employee_name, salary``FROM employees``ORDER BY salary DESC;` | Lists all employees,
    sorted by salary from highest to lowest. |

    | Customer feedback sorted by date | Show the most recent feedback first; useful
    for addressing current customer concerns or issues. | `SELECT customer_id, feedback,
    feedback_date``FROM feedbacks``ORDER BY feedback_date DESC;` | Displays all customer
