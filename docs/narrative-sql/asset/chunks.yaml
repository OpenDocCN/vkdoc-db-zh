    Note


    In relation to scan types, `EXPLAIN` can reveal whether the database performs
    a sequential scan, reading every row of a table, or if it uses an index for efficient
    retrieval via an index scan, index only scan using only index data, or bitmap
    scan using bitmap indexes. When queries involve `JOIN`s, `EXPLAIN` details the
    `JOIN` method employed, such as `NestedLoop`, iterative matching, `MERGE JOIN`,
