  trans: '

    ## 第二个故事：一家足球学院


    一批新的年轻足球运动员加入了俱乐部。然而，面对如此数量的球员，教练们如何识别最有前途的球员呢？俱乐部的**数据分析师**玛丽亚希望分析由俱乐部球探获取的数据。这包括
    `球员 ID`、`姓名`、`年龄`、`位置`（比赛位置，如`后卫`、`中场球员`、`前锋`或`守门员`）、`进球或扑救`（在练习赛中取得的进球数或守门员的扑救次数）、`助攻`和`比赛场次`（已进行的练习赛总数）。表
    3-11 展示了俱乐部球探获得的数据。


    **表 3-11**


    **球员表：年轻足球运动员数据**


    | player_id | Name | Age | Position | goals_scored | Assists | games_played |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1 | Alex Jones | 16 | Midfielder | 8 | 3 | 12 |

    | 2 | Ben Miller | 18 | Defender | 1 | 2 | 10 |

    | 3 | Charlie Brown | 17 | Forward | 12 | 1 | 15 |

    | 4 | David Lee | 15 | Midfielder | 5 | 4 | 8 |

    | 5 | Emily Garcia | 16 | Defender | 0 | 1 | 7 |

    | 6 | Faye Williams | 17 | Forward | 7 | 2 | 11 |

    | 7 | George Smith | 18 | Midfielder | 4 | 5 | 9 |

    | 8 | Hannah Davis | 15 | Defender | 2 | 0 | 5 |

    | 9 | Isabella Moore | 16 | Forward | 9 | 3 | 14 |

    | 10 | Jack Robinson | 18 | Defender | 3 | 1 | 12 |

    | 11 | Kevin Thomas | 17 | Midfielder | 6 | 4 | 10 |

    | 12 | Lily Johnson | 15 | Forward | 4 | 2 | 8 |


    玛丽亚希望回答的问题如下：


    1.  有多少名 U17 球员（17 岁以下球员）进球数超过五个？

    2.  是否有球员能*稳定出场*（`比赛场次 >= 10`）且*进球效率高*（`进球数 / 比赛场次 > 0.5`）？

    3.  哪些球员的进球数超过了所有球员的平均进球数？

    4.  哪些球员年龄小于 17 岁，且助攻数超过 18 岁球员的平均助攻数？


    为了回答“有多少名 U17 球员进球数超过五个？”这个问题，玛丽亚需要筛选`Players`表，仅包括 17 岁以下且进球数超过五个的球员。之后，她可以统计这样的球员有多少人。


    ```

    SELECT COUNT(*)

    FROM Players

    WHERE age < 17 AND goals_scored > 5;

    ```


    `WHERE age < 17` 是一个筛选 17 岁以下球员的条件，`goals_scored > 5` 是一个进一步筛选进球数超过五个球员的条件。`SELECT
    COUNT(*)` 统计了满足这些条件的球员数量。


    对给定的表运行此查询，将得到 U17 且进球数超过五个的球员数量。根据提供的数据，满足这些标准的球员是 Alex Jones（16 岁，进球 8 个）和 Isabella
    Moore（16 岁，进球 9 个）。因此，进球数超过五个的 U17 球员数量是**两名**。


    要找出至少参加了十场比赛且进球效率大于 0.5 的球员，玛丽亚会使用以下查询：


    ```

    SELECT name, goals_scored, games_played, (goals_scored / games_played) AS goal_scoring_average

    FROM Players

    WHERE games_played >= 10 AND (goals_scored / games_played) > 0.5;

    ```


    基于`games_played >= 10`和`(goals_scored / games_played) > 0.5`这两个条件，满足这些标准的球员如表
    3-12 所示。该表提供了满足查询条件的球员的姓名、进球数、比赛场次以及计算出的进球效率。


    **表 3-12**


    **至少参加十场比赛且进球效率大于 0.5 的球员**


    | Name | goals_scored | games_played | goal_scoring_average |

    | --- | --- | --- | --- |

    | Alex Jones | 8 | 12 | 0.66 |

    | Charlie Brown | 12 | 15 | 0.80 |

    | Faye Williams | 7 | 11 | 0.63 |

    | Isabella Moore | 9 | 14 | 0.64 |

    | Kevin Thomas | 6 | 10 | 0.60 |


    在此期间，一位名叫 Jack Robinson 的球员询问玛丽亚为什么自己没有出现在名单上。玛丽亚解释了未选择他的原因。这个结果是通过将条件应用于 Jack
    Robinson 的数据得出的。条件一是`比赛场次 >= 10`。Jack Robinson 参加了 12 场比赛，所以满足此条件。条件二是`(进球数 /
    比赛场次) > 0.5`。Jack Robinson 在 12 场比赛中进了 3 个球。他的进球效率是 3/12=0.25。由于 0.25 的进球效率不大于
    0.5，Jack Robinson 不满足第二个条件。因此，他没有被包含在查询结果表中。这说明了要让球员被包含在查询结果中，必须同时满足两个条件的重要性。


    可以使用以下嵌套查询来识别进球数超过所有球员平均进球数的球员：


    ```

    SELECT name, goals_scored

    FROM Players

    WHERE goals_scored > (SELECT AVG(goals_scored) FROM Players);

    ```


    主查询选择球员的姓名和进球数。子查询`SELECT AVG(goals_scored) FROM Players`计算了`Players`表中所有球员的平均进球数。主查询中的`WHERE`子句检查每位球员的`goals_scored`是否大于子查询计算出的平均进球数。参见表
    3-13。


    **表 3-13**


    **进球数超过学院所有球员平均进球数的球员**


    | Name | goals_scored |

    | --- | --- |

    | Alex Jones | 8 |

    | Charlie Brown | 12 |

    | Faye Williams | 7 |

    | Isabella Moore | 9 |

    | Kevin Thomas | 6 |


    如表 3-13 所示，此查询的结果显示了那些进球数超过学院所有球员平均进球数的球员。


    **注意**


    通过使用嵌套的 SQL 查询，可以在`WHERE`子句中执行子查询。通过这种方式，可以根据从同一表其他部分派生出的复杂条件来过滤数据。使用子查询来计算动态值（如平均值）可以创建功能强大且富有洞察力的查询。


    以下查询可用于识别年龄小于 17 岁且助攻数超过 18 岁（含）球员平均助攻数的球员：


    ```

    SELECT name, age, assists

    FROM Players

    WHERE age < 17 AND assists > (SELECT AVG(assists) FROM Players WHERE age = 18);

    ```


    在主查询中，选择了`姓名`、`年龄`和`助攻`。子查询`SELECT AVG(assists) FROM Players WHERE age = 18`计算了
    18 岁球员的平均助攻数。在主查询中，`WHERE`子句确保只选择年龄小于 17 岁且助攻数超过 18 岁球员平均助攻数的球员。表 3-14 显示了此查询的结果，指明了是哪些球员。


    **表 3-14**


    **年龄小于 17 岁且助攻数超过恰好 18 岁球员平均助攻数的球员**


    | Name | Age | Assists |

    | --- | --- | --- |

    | Alex Jones | 16 | 3 |

    | David Lee | 15 | 4 |

    | Isabella Moore | 16 | 3 |


    ## SQL 中使用 WHERE 子句的常见错误及避免方法


    本节介绍了与使用`WHERE`子句相关的常见错误。使用`WHERE`子句进行查询时，需要仔细注意数据类型、空值和大小写敏感性。

    '
- fmt: '## 数据类型问题


    在SQL中，根据不同的数据类型过滤数据是一项常见任务。如果数据类型处理不当，`WHERE`子句可能会导致错误或意外结果。


    例如，假设一家公司希望根据员工的入职日期来筛选员工。员工数据存储在一个名为`Employees`的表中，其中的`StartDate`列是字符串类型而非日期类型。下面是导致错误的错误查询示例：


    ```

    SELECT * FROM Employees WHERE StartDate = ''2023-05-01''

    ```


    比较日期的字符串表示可能会产生问题，特别是当日期的格式不同时。例如，`''2023-5-1''`和`''2023-05-01''`会被视为不同的值，从而导致结果遗漏。


    解决方案是在过滤之前将`StartDate`列转换为正确的日期类型：


    ```

    SELECT * FROM Employees WHERE CAST(StartDate AS DATE) = ''2023-05-01''

    ```


    将`StartDate`转换为日期类型可确保比较准确且一致，防止潜在的不匹配情况发生。


    > 注意

    >

    > SQL中的`CAST()`函数用于将一个值从一种数据类型转换为另一种数据类型。在处理可能以一种格式存储但需要另一种格式处理或比较的数据时，这特别有用。`CAST()`函数有助于确保数据类型在操作中正确匹配，防止错误并保证结果的准确性。`CAST()`函数的基本语法如下：

    >

    > ```

    > CAST(expression AS target_data_type)

    > ```

    >

    > `expression`是要转换的值或列，而`target_data_type`是您希望将表达式转换成的数据类型。


    数值比较也存在问题。假设`Salary`列存储为字符串。


    ```

    SELECT * FROM Employees WHERE Salary > ''50000''

    ```


    由于字符串比较的工作方式与数值比较不同，此查询可能无法返回正确的结果。一种解决方案是在过滤之前将`Salary`列转换为数值类型。


    ```

    SELECT * FROM Employees WHERE CAST(Salary AS DECIMAL) > 50000

    ```


    数据类型转换确保了数值比较能够正确执行，从而产生预期的结果。


    > 注意

    >

    > `DECIMAL`是SQL中用于存储定点数的数据类型，具有保证的精度和小数位数。与浮点数（例如`FLOAT`）可能因内部表示而损失精度不同，`DECIMAL`提供了十进制值的精确表示。十进制数据类型非常适合存储财务数据、测量值或任何精确十进制值至关重要的场景。`DECIMAL`通常在括号内定义两个参数：精度（`p`）和小数位数（`s`）。

    >

    > *   精度（`p`）表示数字可以容纳的总位数，包括小数点前后的位数。

    > *   小数位数（`s`）表示小数点右侧允许的位数。

    >

    > 例如，`DECIMAL(5,2)`指定精度为五位数，允许的数字如`123.45`和`-98.76`，它们在小数点后有两位数字。


    ## 条件中的逻辑错误


    在`WHERE`子句中，逻辑错误会显著影响查询的性能。常见的逻辑错误包括`AND`和`OR`运算符的错误使用，以及对运算符优先级的误解。`AND`和`OR`运算符用于组合条件以简化数据过滤。


    考虑一个名为`Members`的表，它包含以下列：`MemberID`、`FirstName`、`LastName`、`MembershipType`（例如`Standard`、`Premium`）、`MonthlyFee`、`JoinDate`和`Active`（指示会员资格是否当前有效）。


    健身房的经理想要识别那些要么拥有高级会员资格，要么每月支付超过40美元的会员，但他们只想查看当前会员资格有效的会员。


    ```

    SELECT *

    FROM Members

    WHERE MembershipType = ''Premium'' OR MonthlyFee > 40 AND Active = TRUE

    ```


    这里存在一个由于对运算符优先级理解错误而导致的逻辑错误。SQL会先计算`AND`，然后再计算`OR`。因此，该查询被解释为：


    ```

    SELECT *

    FROM Members

    WHERE (MembershipType = ''Premium'') OR (MonthlyFee > 40 AND Active = TRUE)

    ```


    这将返回所有高级会员，无论他们是否有效，以及任何月费超过40美元且有效的会员。由于包含了无效的高级会员，这个结果并不符合预期。


    ```

    SELECT *

    FROM Members

    WHERE (MembershipType = ''Premium'' OR MonthlyFee > 40) AND Active = TRUE

    ```


    添加括号确保了遵循预期的逻辑。该查询现在筛选出要么是高级会员，要么每月支付超过40美元的会员，并同时检查他们是否有效。通过这种方法，获得了准确且预期的结果，同时过滤掉了无效的会员。


    > 注意

    >

    > 编写SQL查询时可能发生两种类型的错误：语法错误和语义错误。

    >

    > *   **语法错误**：这些是SQL语句形式或结构中的错误。它们很容易检测到，因为SQL引擎会抛出指示问题的错误消息。例如，缺少逗号、关键字使用不正确或括号不匹配。

    > *   **语义错误**：这些是逻辑错误，查询语法正确但未产生预期结果。语义错误很难检测，因为SQL引擎在执行查询时不会有任何错误消息，但返回的数据不正确或具有误导性。

    >

    > 特别是语义错误可能特别成问题，因为它们可能被忽视，导致不正确的数据分析和错误的决策。语法错误导致查询无法运行，而语义错误则导致有效的SQL查询产生不正确或意外的结果。


    ## NULL值处理


    在`WHERE`语句中处理`NULL`值是另一个常见的错误来源。`NULL`表示未知或缺失的数据，涉及`NULL`的比较可能会产生意外结果。


    在SQL中，`NULL`不等于任何东西，甚至不等于另一个`NULL`。因此，需要特殊处理来正确过滤`NULL`值。


    考虑一个包含以下列的`Employees`表：`EmployeeID`、`FirstName`、`LastName`、`Department`和`PhoneNumber`（可能包含`NULL`值）。现在希望分析数据，筛选出没有电话号码的员工，即那些在申请表中未注明电话号码的员工。然而，此查询包含一个逻辑错误。


    ```

    SELECT *

    FROM Employees

    WHERE PhoneNumber = NULL

    ```


    此查询不返回任何结果，因为`NULL`不等于任何东西，包括另一个`NULL`。比较`PhoneNumber = NULL`总是为假。以下查询包含正确的逻辑。


    ```

    SELECT *

    FROM Employees

    WHERE PhoneNumber IS NULL

    ```


    使用`IS NULL`可以正确识别`PhoneNumber`列为`NULL`的行。此查询返回所有未注明电话号码的员工。


    > 注意

    >

    > SQL中的`NULL`值表示缺失、未知或不适用的数据。它是一个空白字段，表示特定字段中不存在值。`NULL`不等同于零或空字符串。它是一个表示值缺失的独特标记。`NULL`不能使用标准比较运算符（例如`=`和`!=`）直接比较。而是使用专门的运算符，如`IS
    NULL`和`IS NOT NULL`。任何涉及`NULL`的算术运算或连接操作都会导致`NULL`。SQL提供了检查`NULL`值的特定语法：

    >

    > 检查`NULL`：

    >

    > ```

    > SELECT * FROM Employees WHERE PhoneNumber IS NULL

    > ```

    >

    > 检查非`NULL`：

    >

    > ```

    > SELECT * FROM Employees WHERE PhoneNumber IS NOT NULL

    > ```'
  raw: '### Data Type Issues


    In SQL, filtering data based on different data types is a common task. The `WHERE`
    clause can result in errors or unexpected results if data types are handled incorrectly.


    For instance, imagine a scenario where a company wants to filter employees based
    on their start date. The employee data is stored in a table named `Employees`,
    with the `StartDate` column as a string instead of a date type. Here is the wrong
    query that caused the mistake.


    ```

    SELECT * FROM Employees WHERE StartDate = ''2023-05-01''

    ```


    Comparing string representations of dates can be problematic, especially if the
    format of the dates varies. For instance, `''2023-5-1''` and `''2023-05-01''`
    will be treated as different, leading to missed results.


    The solution is to convert the `StartDate` column to a proper date type before
    filtering:


    ```

    SELECT * FROM Employees WHERE CAST(StartDate AS DATE) = ''2023-05-01''

    ```


    Casting `StartDate` to a date type ensures that the comparison is accurate and
    consistent, preventing potential mismatches from occurring.


    Note


    The `CAST()` function in SQL is used to convert a value from one data type to
    another. This is particularly useful when dealing with data that may be stored
    in one format but needs to be processed or compared in another. The `CAST()` function
    helps ensure that data types match appropriately in operations, preventing errors
    and ensuring accurate results. The basic syntax of the `CAST()` function is as
    follows:


    ```

    CAST(expression AS target_data_type)

    ```


    The `expression` is the value or column you want to convert, and the `target_data_type`
    is the data type to which you want to convert the expression.


    There is also a problem with numerical comparisons. Assume that the `Salary` column
    is stored as a string.


    ```

    SELECT * FROM Employees WHERE Salary > ''50000''

    ```


    As string comparison does not work the same way as numeric comparison, this query
    may not return the correct results. A solution is to convert the `Salary` column
    to a numeric type before filtering it.


    ```

    SELECT * FROM Employees WHERE CAST(Salary AS DECIMAL) > 50000

    ```


    Data type conversion ensures that numeric comparisons are performed correctly,
    producing the expected results.


    Note


    `DECIMAL` is a data type used in SQL to store fixed-point numbers with a guaranteed
    level of precision and scale. Unlike floating-point numbers (e.g., `FLOAT`), which
    can lose accuracy due to internal representation, `DECIMAL` offers an exact representation
    of decimal values. The decimal data type is ideal for storing financial data,
    measurements, or any scenario where precise decimal values are crucial. `DECIMAL`
    is often defined with two parameters in parentheses: precision (`p`) and scale
    (`s`).


    *   Precision (`p`) represents the total number of digits the number can hold,
    including digits before and after the decimal point.


    *   Scale (`s`) represents the number of digits allowed to the right of the decimal
    point.


    As an example, `DECIMAL(5,2)` specifies a precision of five digits, allowing for
    numbers such as `123.45` and `-98.76`, which have two digits following the decimal
    point.


    ### Logical Mistakes in Conditions


    In the `WHERE` clause, logical errors can significantly affect the performance
    of the query. Common logical mistakes include incorrect use of `AND` and `OR`,
    and misunderstanding operator precedence. The `AND` and `OR` operators combine
    conditions to simplify data filtering.


    Consider a table named `Members` that contains the following columns: `MemberID`,
    `FirstName`, `LastName`, `MembershipType` (e.g., `Standard`, `Premium`), `MonthlyFee`,
    `JoinDate`, and `Active` (indicating whether the membership is currently active).


    The manager of a gym wants to identify members who either have a premium membership
    or pay more than $40 monthly, but they only want to see members who currently
    have an active membership.


    ```

    SELECT *

    FROM Members

    WHERE MembershipType = ''Premium'' OR MonthlyFee > 40 AND Active = TRUE

    ```


    There is a logical error here due to a misunderstanding of operator precedence.
    SQL evaluates `AND` before `OR`. Thus, the query is interpreted as follows:


    ```

    SELECT *

    FROM Members

    WHERE (MembershipType = ''Premium'') OR (MonthlyFee > 40 AND Active = TRUE)

    ```


    This returns all premium members, regardless of whether they are active, as well
    as any members with a monthly fee over $40 who are active. Due to the inclusion
    of inactive premium members, this result is not as expected.


    ```

    SELECT *

    FROM Members

    WHERE (MembershipType = ''Premium'' OR MonthlyFee > 40) AND Active = TRUE

    ```


    The addition of parentheses ensures that the intended logic is followed. The query
    now filters members who are either premium members or pay more than $40 per month,
    and it also checks that they are active. As a result of this approach, accurate
    and expected results are obtained, while inactive members are filtered out.


    Note


    There are two types of errors that can occur when writing SQL queries: syntax
    errors and semantic errors.


    *   **Syntax errors**: These are errors in the SQL statement form or structure.
    They are easy to detect because the SQL engine throws an error message indicating
    the problem. For example, missing a comma, incorrect keyword use, or unmatched
    parentheses.


    *   **Semantic errors**: These are logical errors where the query is syntactically
    correct but does not produce the intended result. Semantic errors are difficult
    to detect because the SQL engine executes the query without any error messages,
    but the data returned is incorrect or misleading.


    In particular, semantic errors can be particularly problematic since they can
    go unnoticed, resulting in incorrect data analysis and incorrect decision-making.
    Syntax errors result in the query not being run, whereas semantic errors result
    in valid SQL queries producing incorrect or unexpected results.


    ### NULL Handling


    Handling `NULL` values in a `WHERE` statement is another common source of errors.
    `NULL` represents unknown or missing data, and comparisons involving `NULL` can
    yield unexpected results.


    In SQL, `NULL` is not equal to anything, not even another `NULL`. Therefore, special
    handling is required to correctly filter `NULL` values.


    Consider an `Employees` table that contains these columns: `EmployeeID`, `FirstName`,
    `LastName`, `Department`, and `PhoneNumber` (which may contain `NULL` values).
    An analysis of the data is intended to filter `Employees` without phone numbers,
    which refers to those employees who have not indicated their phone number on their
    application. However, this query contains a logical error.


    ```

    SELECT *

    FROM Employees

    WHERE PhoneNumber = NULL

    ```


    This query returns no results because `NULL` is not equal to anything, including
    another `NULL`. The comparison `PhoneNumber = NULL` is always false. The following
    query contains the correct logic.


    ```

    SELECT *

    FROM Employees

    WHERE PhoneNumber IS NULL

    ```


    Using `IS NULL` correctly identifies rows where the `PhoneNumber` column is `NULL`.
    This query returns all employees who have not specified their phone number.


    Note


    The `NULL` value in SQL represents data that is missing, unknown, or inapplicable.
    It is a blank field indicating that a value does not exist in a particular field.
    `NULL` is not equivalent to zero or an empty string. It is a distinct marker that
    indicates the absence of value. `NULL` cannot be compared directly using standard
    comparison operators (e.g., `=` and `!=`). Instead, specialized operators like
    `IS NULL` and `IS NOT NULL` are used. Any arithmetic operation or concatenation
    involving `NULL` results in `NULL`. SQL provides specific syntax for checking
    for `NULL` values:


    Checking for `NULL`:


    ```

    SELECT * FROM Employees WHERE PhoneNumber IS NULL

    ```


    Checking for Non-`NULL`:


    ```

    SELECT * FROM Employees WHERE PhoneNumber IS NOT NULL

    ```'
