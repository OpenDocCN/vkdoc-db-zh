    it is necessary to define a specific order, queries must be written differently.
    The `CASE` statement can be used to explicitly specify the order. To define congestion
    levels from `High` to `Moderate` to `Low`, consider the following query:


    ```

    SELECT Route_Name, Vehicle_Count, Avg_Travel_Time, Congestion_Level

    FROM TrafficData_After

    ORDER BY

    CASE

    WHEN Congestion_Level = ''High'' THEN 1

    WHEN Congestion_Level = ''Moderate'' THEN 2

    WHEN Congestion_Level = ''Low'' THEN 3

    END,

    Vehicle_Count DESC

    LIMIT 5;

    ```


    As a result, each congestion level has a numerical value. `High` has the highest
    priority (1), followed by `Moderate` (2), and then `Low` (3). This method ensures
    that the desired order is achieved regardless of the sorting method.


    Note


    In most comparative analyses, using the same query structure on different datasets
    is a common and effective method because it allows direct comparison of results
    across different time periods or conditions. By maintaining a similar query structure,
    analysts ensure that data variations are due to data itself, rather than logical
    differences in the query. As a result of this method, findings are more reliable
    and valid, since this method reduces the potential for unintentional bias.


    Table [6-5](#619961_1_En_6_Chapter.xhtml#Tab5) shows the top five most congested
    routes before the highway was built, with Main Street having the highest traffic
    volume and congestion.


    Table 6-5


    Congested Routes Before Construction


    | Route_Name | Vehicle_Count | Avg_Travel_Time | Congestion_Level |

    | --- | --- | --- | --- |

    | Main Street | 3000 | 50 min | High |

    | Valley Road | 2500 | 45 min | High |

    | Sunset Blvd | 2800 | 48 min | High |

    | 5th Avenue | 2200 | 40 min | High |

    | Riverside Ave | 1800 | 38 min | Moderate |


    Table [6-6](#619961_1_En_6_Chapter.xhtml#Tab6) shows the top five most congested
    routes after the highway construction, indicating a reduction in congestion and
    travel times.


    Table 6-6


    Congested Routes After Construction


    | Route_Name | Vehicle_Count | Avg_Travel_Time | Congestion_Level |

    | --- | --- | --- | --- |

    | Main Street | 2500 | 40 min | Moderate |

    | Sunset Blvd | 2300 | 37 min | Moderate |

    | Valley Road | 2000 | 30 min | Moderate |

    | 5th Avenue | 1800 | 35 min | Moderate |

    | Cedar Road | 1900 | 32 min | Moderate |


    The following query finds the average travel time change before and after the
    highway was built. By performing these queries, Pedro can calculate the average
    travel time for all paths before and after the highway was constructed, which
    will help him determine if there has been a noticeable improvement in the travel
    time throughout the city.


    ```

    -- Average travel time before construction

    SELECT AVG(CAST(SUBSTRING(Avg_Travel_Time FROM ''^[0-9]+'') AS INT)) AS Avg_Travel_Time_Before
    FROM TrafficData_Before;

    -- Average travel time after construction

    SELECT AVG(CAST(SUBSTRING(Avg_Travel_Time FROM ''^[0-9]+'') AS INT)) AS Avg_Travel_Time_After
    FROM TrafficData_After;

    ```


    The queries use *casting* to convert `Avg_Travel_Time` values from strings style
    like `''30 min''` to integers. This conversion is essential because the `AVG`
    function requires numerical input to compute the average. By extracting the numeric
    portion of the travel time and converting it to an integer, Pedro can effectively
    analyze the data and draw meaningful conclusions about the impact of the highway
    on travel times.


    Tables [6-7](#619961_1_En_6_Chapter.xhtml#Tab7) and [6-8](#619961_1_En_6_Chapter.xhtml#Tab8)
    show the average travel times across all routes before and after the highway construction,
    showing a significant reduction in travel time post-construction.


    Table 6-8


    The Average Travel Times Across All Routes (After)


    | Avg_Travel_Time_After |

    | --- |

    | 31.4 |


    Table 6-7


    The Average Travel Times Across All Routes (Before)


    | Avg_Travel_Time_Before |

    | --- |

    | 39.7 |


    This query is provided to find traffic flow improvements based on the data time
    provided in the dataset:


    ```

    SELECT Route_Name, Vehicle_Count, Avg_Travel_Time, Congestion_Level

    FROM TrafficData_After

    WHERE Data_Date BETWEEN ''2023-05-01'' AND ''2023-06-01''

    ORDER BY Avg_Travel_Time ASC

    LIMIT 5;

    ```


    This query filters data from the specific range of `''2023-05-01''` to `''2023-06-01''`
    and sorts by `Avg_Travel_Time` in ascending order to find routes with shorter
    travel times, indicating improved traffic flow. `LIMIT 5` restricts the output
    to the top five routes with the best improvements.


    Table [6-9](#619961_1_En_6_Chapter.xhtml#Tab9) shows routes with the most improved
    travel times over the mentioned 30 days, with routes like Oakwood Blvd and Park
    Lane experiencing the shortest travel times and lowest congestion levels.


    Table 6-9


    Routes with the Most Improved Travel Times


    | Route_Name | Vehicle_Count | Avg_Travel_Time | Congestion_Level |

    | --- | --- | --- | --- |

    | Oakwood Blvd | 1400 | 25 min | Low |

    | Park Lane | 1200 | 27 min | Low |

    | Riverside Ave | 1500 | 28 min | Low |

    | Maple Drive | 1600 | 29 min | Low |

    | Valley Road | 2000 | 30 min | Moderate |


    To find the impacted routes that were previously highly congested and see if they
    are still among the top congested routes post-construction, Pedro used the following
    query:


    ```

    SELECT Route_Name, Congestion_Level

    FROM TrafficData_Before

    WHERE Congestion_Level = ''High''

    UNION

    SELECT Route_Name, Congestion_Level

    FROM TrafficData_After

    WHERE Congestion_Level = ''High'';

    ```


    This query combines routes with a `High` congestion level from before and after
    the highway construction. The `UNION` operator displays routes that were previously
    very busy and indicates if they remain busy.


    Note


    The `UNION` operator is used to combine the results of two or more `SELECT` queries
    into a single result set. Each `SELECT` statement within a `UNION` must have the
    same number of columns in the same order and with compatible data types. When
    using `UNION`, only unique rows are returned, so any duplicate rows between the
    queries will be removed automatically. To retain duplicates, you can use `UNION
    ALL`. Other set operators in PostgreSQL, including `UNION`, `UNION ALL`, `INTERSECT`,
    `INTERSECT ALL`, `EXCEPT`, and `EXCEPT ALL`, are discussed in the next chapters.


    Table [6-10](#619961_1_En_6_Chapter.xhtml#Tab10) shows routes with a high congestion
    level before the highway was built and indicates if any remain highly congested
    after construction; none remain `High` post-construction, indicating an improvement.


    Table 6-10


    Remain Highly Congested Routes After Construction


    | Route_Name | Congestion_Level |

    | --- | --- |

    | Main Street | High |

    | Valley Road | High |

    | Sunset Blvd | High |


    Pedro used SQL to analyze traffic data before and after highway construction.
    Through careful sorting, filtering, and pagination of large datasets, Pedro produced
    insights that demonstrated an improvement in overall traffic conditions. His analysis
    provided city officials with clear evidence that the highway had achieved its
    goal of alleviating congestion. This validated the city’s investment and set a
    data-driven standard for future infrastructure projects.'
  trans: "\n\n## 第一个故事：高速公路建设与交通状况\n\n当一条新高速公路在一座繁华城市建成时，一位名叫佩德罗的有才华的数据分析师被请来调查其对交通的影响。市议会议员们迫切想要确定，这条高速公路是否按计划减少了交通问题。佩德罗使用了一个包含主要路线上车辆数量、旅行时间和拥堵等级的数据集。利用这些数据，佩德罗计划识别趋势、比较变化，并确定高速公路是否带来了城市亟需的缓解效果。他的旅程始于定义查询，这些查询将揭示隐藏的模式和洞见，为议会未来的决策提供信息。以下是佩德罗寻求答案的问题：\n\
    \n1.  在高速公路建设前后，最拥堵的五条路线分别是哪些？\n2.  高速公路修建前后，各路线的平均旅行时间有何变化？\n3.  根据数据集提供的数据时间，哪些路线显示出显著的交通流改善？\n\
    4.  高速公路对先前高度拥堵的路线产生了何种影响？它们在建成后是否仍属于最拥堵路线之列？\n\n佩德罗使用两张表格来比较高速公路建设前后的交通状况。这些表格包含的字段有助于回答前面提供的分析问题。\n\
    \n表 6-3 包含高速公路建设前的交通数据。它包括特定路线、车辆数量、平均旅行时间和拥堵等级的信息，使佩德罗能够评估基线状况。\n\n**表 6-3**\n\
    `TrafficData_Before` 表\n\n| 路线 _ID | 路线名称 | 车辆数量 | 平均旅行时间 | 拥堵等级 | 数据日期 |\n| ---\
    \ | --- | --- | --- | --- | --- |\n| 1 | 谷路 | 2500 | 45 min | 高 | 2022-06-01 |\n\
    | 2 | 河畔大道 | 1800 | 38 min | 中 | 2022-06-01 |\n| 3 | 主街 | 3000 | 50 min | 高 |\
    \ 2022-06-01 |\n| 4 | 第五大道 | 2200 | 40 min | 高 | 2022-06-01 |\n| 5 | 橡木大道 | 1600\
    \ | 35 min | 中 | 2022-06-01 |\n| 6 | 公园巷 | 1300 | 30 min | 低 | 2022-06-01 |\n\
    | 7 | 枫树道 | 1700 | 32 min | 低 | 2022-06-01 |\n| 8 | 白桦街 | 1900 | 42 min | 中 |\
    \ 2022-06-01 |\n| 9 | 日落大道 | 2800 | 48 min | 高 | 2022-06-01 |\n| 10 | 雪松路 | 2100\
    \ | 37 min | 中 | 2022-06-01 |\n\n表 6-4 记录了高速公路建成后同一路线的交通数据。它包括更新的车辆数量、平均旅行时间和拥堵等级。佩德罗将使用此数据来确定交通流的改善程度。\n\
    \n**表 6-4**\n`TrafficData_After` 表\n\n| 路线 _ID | 路线名称 | 车辆数量 | 平均旅行时间 | 拥堵等级 |\
    \ 数据日期 |\n| --- | --- | --- | --- | --- | --- |\n| 1 | 谷路 | 2000 | 30 min | 中\
    \ | 2023-06-01 |\n| 2 | 河畔大道 | 1500 | 28 min | 低 | 2023-06-01 |\n| 3 | 主街 | 2500\
    \ | 40 min | 中 | 2023-06-01 |\n| 4 | 第五大道 | 1800 | 35 min | 中 | 2023-06-01 |\n\
    | 5 | 橡木大道 | 1400 | 25 min | 低 | 2023-06-01 |\n| 6 | 公园巷 | 1200 | 27 min | 低 |\
    \ 2023-06-01 |\n| 7 | 枫树道 | 1600 | 29 min | 低 | 2023-06-01 |\n| 8 | 白桦街 | 1700\
    \ | 31 min | 中 | 2023-06-01 |\n| 9 | 日落大道 | 2300 | 37 min | 中 | 2023-06-01 |\n\
    | 10 | 雪松路 | 1900 | 32 min | 中 | 2023-06-01 |\n\n为了深入了解高速公路建设前后的交通状况，佩德罗分析了这些数据。\n\
    \n### 查找最拥堵的路线\n\n以下查询旨在找出高速公路建成前后最拥堵的五条路线。佩德罗编写了两个 SQL 查询：一个用于 `TrafficData_Before`\
    \ 表，另一个用于 `TrafficData_After` 表。这些表格保存了不同时间段的数据，但佩德罗确保两个查询的结构完全相同，这使得他可以直接比较结果：\n\
    \n```sql\n-- 高速公路建设前最拥堵的 5 条路线\nSELECT Route_Name, Vehicle_Count, Avg_Travel_Time,\
    \ Congestion_Level\nFROM TrafficData_Before\nORDER BY Congestion_Level DESC, Vehicle_Count\
    \ DESC\nLIMIT 5;\n-- 高速公路建设后最拥堵的 5 条路线\nSELECT Route_Name, Vehicle_Count, Avg_Travel_Time,\
    \ Congestion_Level\nFROM TrafficData_After\nORDER BY Congestion_Level DESC, Vehicle_Count\
    \ DESC\nLIMIT 5;\n```\n\n两个查询都按 `Congestion_Level` 对数据排序，其中 `High` 比 `Moderate`\
    \ 或 `Low` 更拥堵。然后，他按 `Vehicle_Count` 降序对数据排序，以找出交通最繁忙的路线。通过指定 `LIMIT 5`，可以将结果限制为仅前五条最拥堵的路线。\n\
    \n需要注意的是，在 SQL 中使用 `ORDER BY` 子句时，某些值如果能被识别，则具有特定的顺序。这里，由于 H、M、L 的字母顺序，`High`\
    \ 将排在 `Moderate` 之前，`Moderate` 将排在 `Low` 之前。因此，上面的查询可以正常工作。但在需要定义特定顺序的地方，查询的写法必须不同。可以使用\
    \ `CASE` 语句来显式指定顺序。要将拥堵等级从 `High` 定义到 `Moderate` 再到 `Low`，请考虑以下查询：\n\n```sql\n\
    SELECT Route_Name, Vehicle_Count, Avg_Travel_Time, Congestion_Level\nFROM TrafficData_After\n\
    ORDER BY\n    CASE\n        WHEN Congestion_Level = 'High' THEN 1\n        WHEN\
    \ Congestion_Level = 'Moderate' THEN 2\n        WHEN Congestion_Level = 'Low'\
    \ THEN 3\n    END,\n    Vehicle_Count DESC\nLIMIT 5;\n```\n\n这样，每个拥堵等级都有一个数值。`High`\
    \ 具有最高优先级（1），其次是 `Moderate`（2），然后是 `Low`（3）。这种方法确保无论排序方法如何，都能实现所需的顺序。\n\n**注意**\n\
    在大多数比较分析中，在不同数据集上使用相同的查询结构是一种常见且有效的方法，因为它允许在不同时间段或条件下直接比较结果。通过保持相似的查询结构，分析师确保数据的变化是由数据本身引起的，而不是由查询的逻辑差异引起的。这种方法的结果更加可靠和有效，因为它减少了无意中产生偏见的可能性。\n\
    \n表 6-5 显示了高速公路建成前最拥堵的五条路线，其中主街的车流量和拥堵程度最高。\n\n**表 6-5**\n建设前拥堵路线\n\n| 路线名称 |\
    \ 车辆数量 | 平均旅行时间 | 拥堵等级 |\n| --- | --- | --- | --- |\n| 主街 | 3000 | 50 min | 高\
    \ |\n| 谷路 | 2500 | 45 min | 高 |\n| 日落大道 | 2800 | 48 min | 高 |\n| 第五大道 | 2200 |\
    \ 40 min | 高 |\n| 河畔大道 | 1800 | 38 min | 中 |\n\n表 6-6 显示了高速公路建成后最拥堵的五条路线，表明拥堵和旅行时间有所减少。\n\
    \n**表 6-6**\n建设后拥堵路线\n\n| 路线名称 | 车辆数量 | 平均旅行时间 | 拥堵等级 |\n| --- | --- | --- | ---\
    \ |\n| 主街 | 2500 | 40 min | 中 |\n| 日落大道 | 2300 | 37 min | 中 |\n| 谷路 | 2000 | 30\
    \ min | 中 |\n| 第五大道 | 1800 | 35 min | 中 |\n| 雪松路 | 1900 | 32 min | 中 |\n\n###\
    \ 分析平均旅行时间变化\n\n以下查询用于查找高速公路建成前后的平均旅行时间变化。通过执行这些查询，佩德罗可以计算出所有路径在高速公路建成前后的平均旅行时间，这将有助于他确定整个城市的旅行时间是否有明显改善。\n\
    \n```sql\n-- 建设前的平均旅行时间\nSELECT AVG(CAST(SUBSTRING(Avg_Travel_Time FROM '^[0-9]+')\
    \ AS INT)) AS Avg_Travel_Time_Before FROM TrafficData_Before;\n-- 建设后的平均旅行时间\n\
    SELECT AVG(CAST(SUBSTRING(Avg_Travel_Time FROM '^[0-9]+') AS INT)) AS Avg_Travel_Time_After\
    \ FROM TrafficData_After;\n```\n\n这些查询使用 `类型转换` 将 `Avg_Travel_Time` 值从像 `'30 min'`\
    \ 这样的字符串样式转换为整数。这种转换是必要的，因为 `AVG` 函数需要数值输入来计算平均值。通过提取旅行时间的数字部分并将其转换为整数，佩德罗可以有效地分析数据，并就高速公路对旅行时间的影响得出有意义的结论。\n\
    \n表 6-7 和表 6-8 显示了高速公路建设前后所有路线的平均旅行时间，表明建设后的旅行时间显著减少。\n\n**表 6-7**\n所有路线的平均旅行时间（建设前）\n\
    \n| Avg_Travel_Time_Before |\n| --- |\n| 39.7 |\n\n**表 6-8**\n所有路线的平均旅行时间（建设后）\n\
    \n| Avg_Travel_Time_After |\n| --- |\n| 31.4 |\n\n### 识别有显著改善的路线\n\n提供此查询旨在根据数据集中提供的数据时间找出交通流的改善情况：\n\
    \n```sql\nSELECT Route_Name, Vehicle_Count, Avg_Travel_Time, Congestion_Level\n\
    FROM TrafficData_After\nWHERE Data_Date BETWEEN '2023-05-01' AND '2023-06-01'\n\
    ORDER BY Avg_Travel_Time ASC\nLIMIT 5;\n```\n\n此查询筛选出特定日期范围 `'2023-05-01'` 到 `'2023-06-01'`\
    \ 的数据，并按 `Avg_Travel_Time` 升序排序，以找出旅行时间较短的路线，表明交通流有所改善。`LIMIT 5` 将输出限制为改善效果最好的前五条路线。\n\
    \n表 6-9 显示了在上述 30 天内旅行时间改善最大的路线，其中橡木大道和公园巷等路线的旅行时间最短，拥堵等级最低。\n\n**表 6-9**\n旅行时间改善最大的路线\n\
    \n| 路线名称 | 车辆数量 | 平均旅行时间 | 拥堵等级 |\n| --- | --- | --- | --- |\n| 橡木大道 | 1400 |\
    \ 25 min | 低 |\n| 公园巷 | 1200 | 27 min | 低 |\n| 河畔大道 | 1500 | 28 min | 低 |\n| 枫树道\
    \ | 1600 | 29 min | 低 |\n| 谷路 | 2000 | 30 min | 中 |\n\n### 检查先前拥堵的路线\n\n为了找出先前高度拥堵的受影响路线，并查看它们在建成后是否仍属于最拥堵路线之列，佩德罗使用了以下查询：\n\
    \n```sql\nSELECT Route_Name, Congestion_Level\nFROM TrafficData_Before\nWHERE\
    \ Congestion_Level = 'High'\nUNION\nSELECT Route_Name, Congestion_Level\nFROM\
    \ TrafficData_After\nWHERE Congestion_Level = 'High';\n```\n\n此查询合并了高速公路建设前后具有\
    \ `High` 拥堵等级的路线。`UNION` 操作符显示了先前非常繁忙的路线，并指明它们是否仍然繁忙。\n\n**注意**\n`UNION` 操作符用于将两个或多个\
    \ `SELECT` 查询的结果组合成一个结果集。`UNION` 中的每个 `SELECT` 语句必须具有相同数量、相同顺序且数据类型兼容的列。使用 `UNION`\
    \ 时，只返回唯一的行，因此查询之间的任何重复行都将自动删除。要保留重复项，可以使用 `UNION ALL`。PostgreSQL 中的其他集合操作符，包括\
    \ `UNION`、`UNION ALL`、`INTERSECT`、`INTERSECT ALL`、`EXCEPT` 和 `EXCEPT ALL`，将在后续章节中讨论。\n\
    \n表 6-10 显示了高速公路建成前拥堵等级为高的路线，并指明是否有任何路线在建成后仍然高度拥堵；没有路线在建设后仍保持 `High`，表明情况有所改善。\n\
    \n**表 6-10**\n建设后仍高度拥堵的路线\n\n| 路线名称 | 拥堵等级 |\n| --- | --- |\n| 主街 | 高 |\n| 谷路\
    \ | 高 |\n| 日落大道 | 高 |\n\n佩德罗使用 SQL 分析了高速公路建设前后的交通数据。通过对大型数据集进行仔细的排序、筛选和分页，佩德罗得出了表明整体交通状况有所改善的洞见。他的分析为市政官员提供了清晰的证据，证明高速公路已经实现了缓解拥堵的目标。这验证了城市的投入，并为未来的基础设施项目设定了数据驱动的标准。\n\
    \n"
- fmt: '## Customizing Your Sorting: Advanced Use Cases of ORDER BY


    ### Case Sensitivity and Sorting Strings


    In SQL, case sensitivity affects the order of results, especially when comparing
    uppercase and lowercase characters. If uppercase letters are not handled properly,
    SQL databases may sort uppercase letters lowercase, which may lead to unexpected
    results. Using the `COLLATE` clause, analysts can perform case-insensitive or
    case-sensitive sorting. Most databases allow defining how text should be compared
    and sorted.


    ### What Is COLLATE?


    In SQL, you can apply rules to compare strings and sort them by using the `COLLATE`
    clause, such as case sensitivity (for example, distinguishing A from a), accent
    sensitivity (for multilingual datasets), and language or regional conventions
    for sorting.


    Note


    A `collation` in SQL is a set of rules that determines how text strings are compared,
    ordered, and sorted. Collations are particularly important when dealing with languages,
    as different languages have unique rules for alphabetical ordering and character
    comparison. For instance, a collation controls:


    1.  **Case sensitivity:** Determines if uppercase and lowercase letters are treated
    as equal (case-insensitive) or different (case-sensitive).

    2.  **Accent sensitivity:** Specifies if accents or diacritical marks on characters
    (like é vs. e) are considered unique.

    3.  **Locale-specific sorting rules:** Defines sorting orders based on language
    or regional rules, which might differ. For instance, in some languages, special
    characters like ø might be sorted differently.


    ### Collation in PostgreSQL


    In PostgreSQL, collations can be applied at various levels, including:


    *   **Database level**: Defines the default collation for all string columns within
    a database.

    *   **Column level**: Sets a specific collation for a particular column in a table,
    overriding the database’s default.

    *   **Query level**: Allows using `COLLATE` in a query to temporarily change the
    sorting behavior for that specific operation.


    PostgreSQL provides many predefined collations based on locale settings, allowing
    developers to select collations suited for particular languages and case-sensitivity
    needs.


    ### Using COLLATE


    In PostgreSQL, `COLLATE` is a clause allowing you to specify collation order for
    a query or operation. This determines how text strings are sorted and compared.
    Collation affects character ordering and case sensitivity. `COLLATE` is used for
    sorting and comparing strings, especially suited for locale-specific ordering.
    For example, in German, ä and a might be sorted differently than in English. `COLLATE`
    can be used with `CREATE TABLE`, `SELECT`, or any text-manipulation operation.
    PostgreSQL comes with several built-in collations. You can list all available
    collations by using the following options.


    #### COLLATE with CREATE TABLE


    ```

    CREATE TABLE employees (

    name TEXT COLLATE "en_US",

    department TEXT COLLATE "de_DE"

    );

    ```


    Here, the `name` column will be sorted using U.S. English rules, and the `department`
    column will be sorted using German rules.


    #### COLLATE in SELECT Query


    ```

    SELECT * FROM employees ORDER BY name COLLATE "fr_FR";

    ```


    This query orders the results by `name` using French collation rules, regardless
    of the default collation.


    #### Example: Case Sensitivity with Different Collations


    As a first step, you’ll create a `users` table with a column for usernames. You
    will compare and order usernames with different case types to see how they work.
    The following data is stored in the `users` table, with a `username` column:


    ```

    CREATE TABLE users (

    username TEXT

    );

    INSERT INTO users (username) VALUES

    (''Alice''),

    (''alice''),

    (''Bob''),

    (''bob'');

    ```


    This table now has mixed-case entries: Alice, alice, Bob, bob, Charlie, and charlie.
    Using `COLLATE`, you can compare results when you query the table with a case-sensitive
    collation versus a case-insensitive collation.


    #### Case-Sensitive Ordering


    To see how case-sensitive ordering works, you’ll use the `C` collation, which
    is usually case-sensitive and orders uppercase letters before lowercase letters.


    ```

    SELECT * FROM users

    ORDER BY username COLLATE "C";

    ```


    Table [6-11](#619961_1_En_6_Chapter.xhtml#Tab11) shows the results of this query.


    Table 6-11


    Case-Sensitive Ordering Output


    | Username |

    | --- |

    | Alice |

    | Bob |

    | Charlie |

    | Alice |

    | Bob |

    | Charlie |


    In this case, uppercase names (Alice, Bob, Charlie) are listed before lowercase
    names (alice, bob, charlie). This ordering is due to `C` collation treating uppercase
    letters as distinct from lowercase letters and sorting them first.


    #### Case-Insensitive Ordering


    The case-insensitive collation `en_US.utf8` treats uppercase and lowercase characters
    equally for sorting.


    ```

    SELECT * FROM users

    ORDER BY username

    COLLATE "en_US.utf8";

    ```


    In this case, as shown in Table [6-12](#619961_1_En_6_Chapter.xhtml#Tab12), Alice
    and alice are grouped together, as are Bob with bob, and Charlie with charlie.
    This shows that the `en_US.utf8` collation ignores case differences when ordering,
    resulting in more “human-friendly” sorting.


    Table 6-12


    Case-Insensitive Ordering Output


    | username |

    | --- |

    | Alice |

    | alice |

    | Bob |

    | bob |

    | Charlie |

    | charlie |


    ### Sorting NULL Values


    In PostgreSQL, handling `NULL` values during sorting can be crucial, especially
    when organizing data that might have missing entries. By default, `NULL` values
    are considered lower than any other value in ascending order and higher in descending
    order. However, PostgreSQL provides explicit options for sorting `NULL` values
    either first or last, allowing you to control their placement within ordered results.


    #### Strategies for Ordering NULL Values: NULLS FIRST and NULLS LAST


    There are two strategies for sorting `NULL` values. The first one is `NULLS FIRST`
    and the second one is `NULLS LAST`.


    `NULLS FIRST`: Place all `NULL` values at the beginning of the result set. This
    is often useful when you want missing values to appear prominently, for example,
    to prioritize records that need attention.


    ```

    ORDER BY column_name NULLS FIRST;

    ```


    `NULLS LAST`: Place all `NULL` values at the end of the result set. This is useful
    when `NULL` values are less relevant, and you want actual data values to appear
    first.


    ```

    ORDER BY column_name NULLS LAST;

    ```


    #### Example: Customer Data with NULLs in the Purchase History


    Take the example of a table `customer` containing customer information, shown
    in Table [6-13](#619961_1_En_6_Chapter.xhtml#Tab13), including a `last_purchase_date`
    column. In some cases, `last_purchase_date` may be `NULL`, indicating that the
    customer hasn’t purchased anything yet.


    Table 6-13


    The Customers Table


    | customer_id | customer_name | last_purchase_date |

    | --- | --- | --- |

    | 1 | Alice | 2023-06-15 |

    | 2 | Bob |   |

    | 3 | Charlie | 2023-07-20 |

    | 4 | Diana |   |

    | 5 | Eve | 2023-05-10 |


    ##### Sorting with NULLS FIRST


    To list customers with the most recent purchases first and those who haven’t made
    a purchase appearing at the top, use this query:


    ```

    SELECT * FROM customers

    ORDER BY last_purchase_date

    DESC NULLS FIRST;

    ```


    Table [6-14](#619961_1_En_6_Chapter.xhtml#Tab14) shows that `NULL`s are sorted
    first in the sorting process.


    Table 6-14


    Customer Sorting with NULLS FIRST


    | customer_id | customer_name | last_purchase_date |

    | --- | --- | --- |

    | 2 | Bob | NULL |

    | 4 | Diana | NULL |

    | 3 | Charlie | 2023-07-20 |

    | 1 | Alice | 2023-06-15 |

    | 5 | Eve | 2023-05-10 |


    In this case, `NULL` values appear at the top due to `NULLS FIRST`, followed by
    recent purchase dates in descending order.'
