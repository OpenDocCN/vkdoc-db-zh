    same total sales will receive the same rank. `PARTITION BY Region` splits the
    data into partitions by region, so that the ranking calculation is applied separately
    to each region. By using `ORDER BY SUM(Sales_Amount) DESC`, Anna ranks the car
    models in each region based on their total sales `SUM(Sales_Amount)`, sorted in
    descending order. The highest sales get the highest rank. It should be noted that
    the rank is reset for each region due to partitioning. `GROUP BY Model_Name, Region`
    is used because Anna is applying `SUM(Sales_Amount)`. Thus, the query groups the
    data by `Model_Name` and `Region` to compute the total sales for each model in
    each region. Finally, each car model is ranked within its region based on total
    sales, with the model having the highest sales ranking first. Table [5-14](#619961_1_En_5_Chapter.xhtml#Tab14)
    shows the rank of car models by total sales in each region.


    Table 5-14


    Ranking Car Models by Sales in Each Region


    | Model_Name | Region | Sales_Rank |

    | --- | --- | --- |

    | Speedster | North | 1 |

    | Zoomer | North | 2 |

    | Cruiser | South | 1 |

    | Speedster | South | 2 |

    | Zoomer | East | 1 |

    | Speedster | West | 1 |


    In order to rank car models in order of sales without skipping ranks when there
    is a tie in sales, the next query is ranked sequentially without gaps. To answer
    the third question, models should be ranked without gaps when sales figures are
    tied. In order to avoid gaps when two models have the same sales amount, this
    query uses `DENSE_RANK()`:


    ```

    SELECT Model_Name, Region,

    DENSE_RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC) AS Dense_Rank

    FROM Car_Sales

    GROUP BY Model_Name, Region;

    ```


    This query ranks car models by their total sales within each region using the
    `DENSE_RANK()` window function. The query selects two columns: `Model_Name` and
    `Region`. `DENSE_RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC)
    AS Dense_Rank`, `DENSE_RANK()` is a window function that assigns a rank to each
    car model based on its sales amount within a region. `DENSE_RANK()` ranks models
    without gaps when sales figures are tied. `PARTITION BY Region` partitions data
    by `Region`, meaning the ranking is calculated separately for each region. `ORDER
    BY SUM(Sales_Amount) DESC` ranks the car models based on their total sales (`SUM(Sales_Amount)`),
    with the models having the highest sales ranked first.


