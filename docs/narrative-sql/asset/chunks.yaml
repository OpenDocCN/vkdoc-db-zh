    | 507 | 格蕾丝 | 27 | 北部 | 360 |

    | 508 | 亨利 | 41 | 东部 | 600 |

    | 509 | 艾琳 | 30 | 南部 | 25 |


    ### 表 9-18：产品表


    | 产品 ID | 产品名称 | 类别 | 单价 | 库存数量 |

    | --- | --- | --- | --- | --- |

    | 2001 | 笔记本 | 文具 | 25 | 500 |

    | 2002 | 笔记本电脑 | 电子产品 | 40 | 100 |

    | 2003 | 智能手机 | 电子产品 | 120 | 50 |

    | 2004 | 办公椅 | 家具 | 300 | 30 |

    | 2005 | 耳机 | 电子产品 | 45 | 200 |


