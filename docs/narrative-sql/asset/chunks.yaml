    A hash join merges these tables. Next, an index scan uses `players_pkey` to retrieve
    player names efficiently. The results are sorted twice, first by player names
    using `Sort`, then by total strokes using another `Sort` with cost=47.96. The
    `Limit` step returns the top three players. As shown here, the query plan indicates
    efficient performance due to proper indexing and sorting techniques:


