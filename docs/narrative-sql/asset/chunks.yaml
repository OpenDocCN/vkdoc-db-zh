    \ | 75000 | 60000 | 0 | 8 |\n| 104 | Diana | 45000 | 40000 | 25 | 0 |\n| 105 |\
    \ Eve | 0 | 35000 | 30 | 4 |\n| 106 | Frank | 85000 | 80000 | 10 | 7 |\n| 107\
    \ | Grace | 25000 | 30000 | 0 | 2 |\n| 108 | Henry | 55000 | 0 | 40 | 6 |\n| 109\
    \ | Ivy | 65000 | 50000 | 35 | 0 |\n| 110 | Jack | 40000 | 45000 | 0 | 5 |\n\n\
    以下查询通过计算关键指标（如目标达成率、生产率比率和绩效方差）来评估员工绩效。它使用 CTE 首先计算目标达成率百分比，并使用 `NULLIF(target,\
    \ 0)` 处理被零除的情况。生产率比率是根据完成的项目相对于培训小时数得出的，而绩效方差衡量与销售目标的偏差。主查询根据预定义阈值将员工分类为绩效状态和效率等级。`NULL`\
    \ 值被有效处理，确保了稳健的数据分析。在此查询中，结果按目标达成率排序，将高绩效员工排在前面。\n\n```sql\nWITH performance_metrics\
    \ AS (\n    SELECT\n        emp_id,\n        name,\n        ROUND(\n         \
    \   sales::numeric / NULLIF(target, 0) * 100,\n            2\n        ) AS target_achievement,\n\
    \        ROUND(\n            projects_completed::numeric / NULLIF(training_hours,\
    \ 0) * 100,\n            2\n        ) AS productivity_ratio,\n        CASE\n \
    \           WHEN sales = 0 THEN NULL\n            WHEN target = 0 THEN NULL\n\
    \            ELSE ROUND((sales - target)::numeric / target * 100, 2)\n       \
    \ END AS performance_variance\n    FROM employee_metrics\n)\nSELECT\n    pm.*,\n\
    \    CASE\n        WHEN target_achievement IS NULL THEN 'Invalid Target'\n   \
    \     WHEN target_achievement >= 100 THEN 'Exceeded'\n        WHEN target_achievement\
    \ >= 80 THEN 'On Track'\n        ELSE 'Below Target'\n    END AS performance_status,\n\
    \    CASE\n        WHEN productivity_ratio IS NULL THEN 'No Training Data'\n \
    \       WHEN productivity_ratio > 20 THEN 'High Efficiency'\n        WHEN productivity_ratio\
    \ > 10 THEN 'Moderate Efficiency'\n        ELSE 'Needs Improvement'\n    END AS\
    \ efficiency_rating\nFROM performance_metrics pm\nORDER BY target_achievement\
    \ DESC NULLS LAST;\n```\n\n此查询使用 `NULLIF` 函数来处理潜在的除法错误并确保计算准确，这很好地示例了 `NULLIF`\
    \ 扮演的重要角色。通过应用 `NULLIF(target, 0)`，查询在计算目标达成率时防止了被零除。`NULLIF(training_hours, 0)`\
    \ 确保即使没有培训小时数，生产率计算也保持有效。此外，`NULLIF` 与 `CASE` 语句结合使用，以创建有意义的分类。这允许查询在单一分析中管理各种零和\
    \ `NULL` 场景。\n\n在此查询中，使用了 `::numeric` 转换来确保小数除法和精确舍入，特别是在原始数据类型可能是整数的情况下。例如，不进行转换，两个整数相除可能导致整数除法，例如\
    \ 1/2 = 0 而不是 0.5。如果涉及的列已经是 `NUMERIC` 或 `DECIMAL` 类型，则可以安全地移除这些转换。但是，如果模式使用 `INTEGER`\
    \ 或 `TEXT`，显式转换可保证在除法和舍入操作期间行为一致。\n\n在此查询中，使用 `WITH` 子句创建了一个名为 `performance_metrics`\
    \ 的 CTE。此 CTE 根据 `employee_metrics` 表计算员工的多个绩效相关指标。定义 CTE 后，主查询从中选择并根据计算出的指标添加列（`performance_status`\
    \ 和 `efficiency_rating`）。\n\n#### 注意\n\n如前面章节所述，`WITH` 子句，也称为 CTE（公共表表达式），允许你定义一个临时结果集，该结果集可以在\
    \ `SELECT`、`INSERT`、`UPDATE` 或 `DELETE` 语句中引用。它通常用于通过将复杂查询分解为更小、更易管理的部分来简化复杂查询。`WITH`\
    \ 子句的基本语法如下：\n\n```sql\nWITH cte_name AS (\n    -- 定义 CTE 的子查询\n    SELECT ...\n\
    \    FROM ...\n    WHERE ...\n)\n-- 引用 CTE 的主查询\nSELECT ...\nFROM cte_name\nWHERE\
    \ ...\n```\n\n原始指标到可操作见解的转换是通过安全计算目标达成率百分比、无错误地计算生产率比率、确定绩效方差以及对绩效和效率水平进行分类来实现的。此外，该查询考虑了目标或培训小时数为零的边缘情况，确保分析保持稳健。此示例突出了\
    \ `NULLIF` 在数据分析中起着至关重要的作用，尤其是在处理包含缺失值或零条目的真实世界数据集时。参见表 8-7。\n\n**表 8-7**\n\n\
    **安全计算目标达成百分比的结果**\n\n| emp_id | name | target_achievement | productivity_ratio\
    \ | performance_variance | performance_status | efficiency_rating |\n| --- | ---\
    \ | --- | --- | --- | --- | --- |\n| 106 | Frank | 106.25 | 70 | 6.25 | Exceeded\
    \ | High Efficiency |\n| 103 | Charlie | 125 | `NULL` | 25 | Exceeded | No Training\
    \ Data |\n| 109 | Ivy | 130 | 0 | 30 | Exceeded | Needs Improvement |\n| 101 |\
    \ Alice | 111.11 | 25 | 11.11 | Exceeded | High Efficiency |\n| 104 | Diana |\
    \ 112.5 | 0 | 12.5 | Exceeded | Needs Improvement |\n| 110 | Jack | 88.89 | `NULL`\
    \ | -11.11 | On Track | No Training Data |\n| 107 | Grace | 83.33 | `NULL` | -16.67\
    \ | On Track | No Training Data |\n| 105 | Eve | 0 | 13.33 | -100 | Below Target\
    \ | Moderate Efficiency |\n| 102 | Bob | `NULL` | 20 | `NULL` | Invalid Target\
    \ | Moderate Efficiency |\n| 108 | Henry | `NULL` | 15 | `NULL` | Invalid Target\
    \ | Moderate Efficiency |"
- fmt: "Now, since `NULL` handling is included, this dataset is valuable for in-depth\
    \ performance assessments and decision-making. Table [8-7](#619961_1_En_8_Chapter.xhtml#Tab7)\
    \ shows how the performance evaluation is extended by adding calculated metrics\
    \ such as targets achieved, productivity ratios, performance variances, performance\
    \ status, and efficiency ratings. Target achievement is measured as a percentage,\
    \ ensuring that employees exceeding their goals are recognized. The productivity\
    \ ratio assesses efficiency based on training hours, while performance variance\
    \ captures deviations from expected performance. Employees are categorized into\
    \ different performance statuses, such as Exceeded or On Track, with efficiency\
    \ ratings indicating their effectiveness.\n\n### COALESCE\n\n`COALESCE` in PostgreSQL\
    \ is a function that returns the first non-`NULL` value from a list of expressions.\
    \ Therefore, it is an essential component for handling `NULL` values and providing\
    \ default values. In the case of a table that contains potentially missing data\
    \ (`NULL`s) in columns, `COALESCE` allows you to substitute these `NULL`s with\
    \ meaningful default values. The basic syntax of `COALESCE` in PostgreSQL is as\
    \ follows:\n\n```\nCOALESCE(value1, value2, ..., value_n)\n```\n\n`COALESCE` returns\
    \ the first non-`NULL` value from the provided arguments list. If all values are\
    \ `NULL`, it returns `NULL`. It is commonly used to handle `NULL` values in queries\
    \ by providing a default or fallback value.\n\nTable [8-8](#619961_1_En_8_Chapter.xhtml#Tab8)\
    \ shows a membership data table that must be filled in with missing expiration\
    \ dates by assuming a default expiration period.\n\nTable 8-8\nThe Memberships\
    \ Data Table\n\n| member_id | member_name | membership_type | expiration_date\
    \ |\n| --- | --- | --- | --- |\n| 1 | John Doe | Gold | 2025-06-15 |\n| 2 | Jane\
    \ Smith | Silver | NULL |\n| 3 | Mike Johnson | Gold | 2025-08-10 |\n| 4 | Sarah\
    \ Williams | Bronze | NULL |\n| 5 | David Brown | Gold | 2025-07-01 |\n| 6 | Emily\
    \ Davis | Silver | NULL |\n| 7 | James Wilson | Bronze | 2025-05-20 |\n| 8 | Laura\
    \ Martinez | Gold | NULL |\n| 9 | Robert Taylor | Silver | 2025-09-25 |\n| 10\
    \ | Sophia Anderson | Bronze | NULL |\n\nThe following query aims to use `COALESCE`\
    \ to fill in missing expiration dates by assuming the default expiration period\
    \ for missing values is: Gold: 2025-12-31, Silver: 2025-11-30, and Bronze: 2025-10-31.\n\
    \n```\nSELECT\n    member_id,\n    member_name,\n    membership_type,\n    COALESCE(expiration_date,\n\
    \             CASE\n                 WHEN membership_type = 'Gold' THEN DATE '2025-12-31'\n\
    \                 WHEN membership_type = 'Silver' THEN DATE '2025-11-30'\n   \
    \              WHEN membership_type = 'Bronze' THEN DATE '2025-10-31'\n      \
    \       END\n    ) AS adjusted_expiration_date\nFROM memberships;\n```\n\nIn this\
    \ case, these values were assumed, but in real-world scenarios, best strategies\
    \ for missing value treatment have been mostly followed using this process:\n\
    1.  Analyze patterns in missing data.\n2.  Considering the business context, document\
    \ assumptions and methods.\n3.  Validate imputed values against known patterns\
    \ and statistical methods with domain expertise to ensure that the imputed values\
    \ make business sense and maintain data integrity.\n\nBy using `COALESCE` with\
    \ a `CASE` statement, you can ensure that members with missing expiration dates\
    \ receive a default date based on their membership type. This helps maintain data\
    \ consistency and avoids `NULL` values in reports. This query ensures that members\
    \ with missing expiration dates will be provided a default date. This is based\
    \ on their membership type. As shown in Table [8-9](#619961_1_En_8_Chapter.xhtml#Tab9),\
    \ this helps maintain data consistency and avoids `NULL` values in reports.\n\n\
    Table 8-9\nDates of Expiration That Were Missing Have Been Filled In\n\n| member_id\
    \ | member_name | membership_type | adjusted_expiration_date |\n| --- | --- |\
    \ --- | --- |\n| 1 | John Doe | Gold | 2025-06-15 |\n| 2 | Jane Smith | Silver\
    \ | 2025-11-30 |\n| 3 | Mike Johnson | Gold | 2025-08-10 |\n| 4 | Sarah Williams\
    \ | Bronze | 2025-10-31 |\n| 5 | David Brown | Gold | 2025-07-01 |\n| 6 | Emily\
    \ Davis | Silver | 2025-11-30 |\n| 7 | James Wilson | Bronze | 2025-05-20 |\n\
    | 8 | Laura Martinez | Gold | 2025-12-31 |\n| 9 | Robert Taylor | Silver | 2025-09-25\
    \ |\n| 10 | Sophia Anderson | Bronze | 2025-10-31 |\n\n## The First Story: The\
    \ Hospital’s Analytical Story\n\nSofia, a data analyst at a large metropolitan\
    \ hospital, has been tasked with preparing visualizations for a key meeting. The\
    \ raw hospital data is messy, with missing values, outliers, and complex relationships\
    \ between variables. As illustrated in Table [8-10](#619961_1_En_8_Chapter.xhtml#Tab10),\
    \ a `hospital_admissions` table has 20 rows and several `NULL` values. Despite\
    \ this, Sofia continues to make clean, insightful plots with SQL and her analytical\
    \ mind.\n\nTable 8-10\nThe hospital_admissions Table\n\n| patient_id | Age | diagnosis_code\
    \ | admission_date | discharge_date |\n| --- | --- | --- | --- | --- |\n| 1 |\
    \ 12 | 150 | 2024-03-01 | 2024-03-03 |\n| 2 | 45 | 120 | 2024-03-02 | 2024-03-05\
    \ |\n| 3 | 67 | 180 | 2024-03-03 | 2024-03-10 |\n| 4 | 8 | 90 | 2024-03-04 | 2024-03-06\
    \ |\n| 5 | 32 | 110 | 2024-03-05 | 2024-03-08 |\n| 6 | 55 | 130 | 2024-03-06 |\
    \ 2024-03-12 |\n| 7 | 70 | 140 | 2024-03-07 | `NULL` |\n| 8 | 25 | 160 | 2024-03-08\
    \ | 2024-03-11 |\n| 9 | 40 | 170 | 2024-03-09 | 2024-03-16 |\n| 10 | 60 | 190\
    \ | 2024-03-10 | 2024-03-20 |\n| 11 | 15 | `NULL` | 2024-03-11 | 2024-03-13 |\n\
    | 12 | 50 | 200 | 2024-03-12 | `NULL` |\n| 13 | 28 | 105 | 2024-03-13 | 2024-03-15\
    \ |\n| 14 | 72 | `NULL` | 2024-03-14 | 2024-03-21 |\n| 15 | 10 | 115 | 2024-03-15\
    \ | `NULL` |\n| 16 | 35 | 125 | 2024-03-16 | 2024-03-18 |\n| 17 | 65 | 135 | 2024-03-17\
    \ | 2024-03-24 |\n| 18 | 22 | 145 | 2024-03-18 | 2024-03-20 |\n| 19 | 48 | 155\
    \ | 2024-03-19 | `NULL` |\n| 20 | 58 | 165 | 2024-03-20 | 2024-03-27 |\n\nShe\
    \ encounters six major challenges during the data-preparation process:\n*   How\
    \ can she categorize hospital patients into age groups such as Child, Adult, and\
    \ Senior, to make visualizations of admissions by age group easier to interpret?\n\
    *   How can she dynamically filter the hospital data to show only patients admitted\
    \ for cardiac-related issues—for instance, diagnosis codes between 100 and 199\
    \ during the year 2024?\n*   What is the average length of stay for patients grouped\
    \ by `diagnosis_code` ranges (100–125, 126–150, 151–175, and 176–199) for cardiac-related\
    \ issues?\n*   How can she preprocess hospital data to create a `stay_category`\
    \ column, using conditional logic to classify patient stays as Short Stay, Moderate\
    \ Stay, or Long Stay, based on the number of days stayed?\n*   How can she calculate\
    \ the total number of patients and the average length of stay for each age group\
    \ (Child, Adult, Senior) to identify trends and resource needs for different demographics?\n\
    *   How can she clean the hospital data for visualization by handling missing\
    \ discharge dates (filling them with `admission_date + 2` days) and excluding\
    \ outliers where the length of the stay exceeds 365 days?\n\nAs part of the first\
    \ challenge, the aim is to categorize hospital patients by age, including their\
    \ age data values in a `hospital_admissions` data table. Sofia needs to categorize\
    \ patients into age groups (Child, Adult, Senior) to better visualize admissions\
    \ by age category.\n\n```\nSELECT\n    patient_id,\n    age,\n    CASE\n     \
    \   WHEN age < 18 THEN 'Child'\n        WHEN age >= 18 AND age < 65 THEN 'Adult'\n\
    \        WHEN age >= 65 THEN 'Senior'\n        ELSE 'Unknown'\n    END AS age_group\n\
    FROM hospital_admissions\nORDER BY age_group;\n```\n\nThis query creates an `age_group`\
    \ column using conditional logic. Categorizing data like this improves clarity\
    \ in visualizations by grouping similar data points together. In this query, the\
    \ `CASE` statement evaluates the `age` column and assigns a category based on\
    \ the value. It categorizes individuals as `Child` if the age is less than 18,\
    \ `Adult` if their age is between 18 and 64, and `Senior` if their age is 65 or\
    \ older. For any unexpected values, such as `NULL`, the `Unknown` category is\
    \ assigned."
  raw: 'Now, since `NULL` handling is included, this dataset is valuable for in-depth
    performance assessments and decision-making. Table [8-7](#619961_1_En_8_Chapter.xhtml#Tab7)
    shows how the performance evaluation is extended by adding calculated metrics
    such as targets achieved, productivity ratios, performance variances, performance
    status, and efficiency ratings. Target achievement is measured as a percentage,
    ensuring that employees exceeding their goals are recognized. The productivity
    ratio assesses efficiency based on training hours, while performance variance
    captures deviations from expected performance. Employees are categorized into
    different performance statuses, such as Exceeded or On Track, with efficiency
    ratings indicating their effectiveness.


    ### COALESCE


    `COALESCE` in PostgreSQL is a function that returns the first non-`NULL` value
    from a list of expressions. Therefore, it is an essential component for handling
    `NULL` values and providing default values. In the case of a table that contains
    potentially missing data (`NULLS`) in columns, `COALESCE` allows you to substitute
    these `NULL`s with meaningful default values. The basic syntax of `COALESCE` in
    PostgreSQL is as follows:


    ```

    COALESCE(value1, value2, ..., value_n)

    ```


    `COALESCE` returns the first non-`NULL` value from the provided arguments list.
    If all values are `NULL`, it returns `NULL`. It is commonly used to handle `NULL`
    values in queries by providing a default or fallback value.


    Table [8-8](#619961_1_En_8_Chapter.xhtml#Tab8) shows a membership data table that
    must be filled in with missing expiration dates by assuming a default expiration
    period.


    Table 8-8


    The Memberships Data Table


    | member_id | member_name | membership_type | expiration_date |

    | --- | --- | --- | --- |

    | 1 | John Doe | Gold | 2025-06-15 |

    | 2 | Jane Smith | Silver | NULL |

    | 3 | Mike Johnson | Gold | 2025-08-10 |

    | 4 | Sarah Williams | Bronze | NULL |

    | 5 | David Brown | Gold | 2025-07-01 |

    | 6 | Emily Davis | Silver | NULL |

    | 7 | James Wilson | Bronze | 2025-05-20 |

    | 8 | Laura Martinez | Gold | NULL |

    | 9 | Robert Taylor | Silver | 2025-09-25 |

    | 10 | Sophia Anderson | Bronze | NULL |


    The following query aims to use `COALESCE` to fill in missing expiration dates
    by assuming the default expiration period for missing values is: Gold: 2025-12-31,
    Silver: 2025-11-30, and Bronze: 2025-10-31.


    ```

    SELECT

    member_id,

    member_name,

    membership_type,

    COALESCE(expiration_date,

    CASE

    WHEN membership_type = ''Gold'' THEN DATE ''2025-12-31''

    WHEN membership_type = ''Silver'' THEN DATE ''2025-11-30''

    WHEN membership_type = ''Bronze'' THEN DATE ''2025-10-31''

    END

    ) AS adjusted_expiration_date

    FROM memberships;

    ```


    In this case, these values were assumed, but in real-world scenarios, best strategies
    for missing value treatment have been mostly followed using this process:


    1.  Analyze patterns in missing data.


    2.  Considering the business context, document assumptions and methods.


    3.  Validate imputed values against known patterns and statistical methods with
    domain expertise to ensure that the imputed values make business sense and maintain
    data integrity.


    By using `COALESCE` with a `CASE` statement, you can ensure that members with
    missing expiration dates receive a default date based on their membership type.
    This helps maintain data consistency and avoids `NULL` values in reports. This
    query ensures that members with missing expiration dates will be provided a default
    date. This is based on their membership type. As shown in Table [8-9](#619961_1_En_8_Chapter.xhtml#Tab9),
    this helps maintain data consistency and avoids `NULL` values in reports.


    Table 8-9


    Dates of Expiration That Were Missing Have Been Filled In


    | member_id | member_name | membership_type | adjusted_expiration_date |

    | --- | --- | --- | --- |

    | 1 | John Doe | Gold | 2025-06-15 |

    | 2 | Jane Smith | Silver | 2025-11-30 |

    | 3 | Mike Johnson | Gold | 2025-08-10 |

    | 4 | Sarah Williams | Bronze | 2025-10-31 |

    | 5 | David Brown | Gold | 2025-07-01 |

    | 6 | Emily Davis | Silver | 2025-11-30 |

    | 7 | James Wilson | Bronze | 2025-05-20 |

    | 8 | Laura Martinez | Gold | 2025-12-31 |

    | 9 | Robert Taylor | Silver | 2025-09-25 |

    | 10 | Sophia Anderson | Bronze | 2025-10-31 |


    ## The First Story: The Hospital’s Analytical Story


    Sofia, a data analyst at a large metropolitan hospital, has been tasked with preparing
    visualizations for a key meeting. The raw hospital data is messy, with missing
    values, outliers, and complex relationships between variables. As illustrated
    in Table [8-10](#619961_1_En_8_Chapter.xhtml#Tab10), a `hospital_admissions` table
    has 20 rows and several `NULL` values. Despite this, Sofia continues to make clean,
    insightful plots with SQL and her analytical mind.


    Table 8-10


    The hospital_admissions Table


    | patient_id | Age | diagnosis_code | admission_date | discharge_date |

    | --- | --- | --- | --- | --- |

    | 1 | 12 | 150 | 2024-03-01 | 2024-03-03 |

    | 2 | 45 | 120 | 2024-03-02 | 2024-03-05 |

    | 3 | 67 | 180 | 2024-03-03 | 2024-03-10 |

    | 4 | 8 | 90 | 2024-03-04 | 2024-03-06 |

    | 5 | 32 | 110 | 2024-03-05 | 2024-03-08 |

    | 6 | 55 | 130 | 2024-03-06 | 2024-03-12 |

    | 7 | 70 | 140 | 2024-03-07 | `NULL` |

    | 8 | 25 | 160 | 2024-03-08 | 2024-03-11 |

    | 9 | 40 | 170 | 2024-03-09 | 2024-03-16 |

    | 10 | 60 | 190 | 2024-03-10 | 2024-03-20 |

    | 11 | 15 | `NULL` | 2024-03-11 | 2024-03-13 |

    | 12 | 50 | 200 | 2024-03-12 | `NULL` |

    | 13 | 28 | 105 | 2024-03-13 | 2024-03-15 |

    | 14 | 72 | `NULL` | 2024-03-14 | 2024-03-21 |

    | 15 | 10 | 115 | 2024-03-15 | `NULL` |

    | 16 | 35 | 125 | 2024-03-16 | 2024-03-18 |

    | 17 | 65 | 135 | 2024-03-17 | 2024-03-24 |

    | 18 | 22 | 145 | 2024-03-18 | 2024-03-20 |

    | 19 | 48 | 155 | 2024-03-19 | `NULL` |

    | 20 | 58 | 165 | 2024-03-20 | 2024-03-27 |


    She encounters six major challenges during the data-preparation process:


    *   How can she categorize hospital patients into age groups such as Child, Adult,
    and Senior, to make visualizations of admissions by age group easier to interpret?


    *   How can she dynamically filter the hospital data to show only patients admitted
    for cardiac-related issues—for instance, diagnosis codes between 100 and 199 during
    the year 2024?


    *   What is the average length of stay for patients grouped by `diagnosis_code`
    ranges (100–125, 126–150, 151–175, and 176–199) for cardiac-related issues?


    *   How can she preprocess hospital data to create a `stay_category` column, using
    conditional logic to classify patient stays as Short Stay, Moderate Stay, or Long
    Stay, based on the number of days stayed?


    *   How can she calculate the total number of patients and the average length
    of stay for each age group (Child, Adult, Senior) to identify trends and resource
    needs for different demographics?


    *   How can she clean the hospital data for visualization by handling missing
    discharge dates (filling them with `admission_date + 2` days) and excluding outliers
    where the length of the stay exceeds 365 days?


    As part of the first challenge, the aim is to categorize hospital patients by
    age, including their age data values in a `hospital_admissions` data table. Sofia
    needs to categorize patients into age groups (Child, Adult, Senior) to better
    visualize admissions by age category.


    ```

    SELECT

    patient_id,

    age,

    CASE

    WHEN age = 65 THEN ''Senior''

    ELSE ''Unknown''

    END AS age_group

    FROM hospital_admissions

    ORDER BY age_group;

    ```


    This query creates an `age_group` column using conditional logic. Categorizing
    data like this improves clarity in visualizations by grouping similar data points
    together. In this query, the `CASE` statement evaluates the `age` column and assigns
    a category based on the value. It categorizes individuals as `Child` if the age
    is less than 18, `Adult` if their age is between 18 and 64, and `Senior` if their
    age is 65 or older. For any unexpected values, such as `NULL`, the `Unknown` category
    is assigned.'
  trans: "\n现在，由于包含了`NULL`值处理，该数据集对于深入的绩效评估和决策制定具有价值。表 8-7 展示了如何通过添加计算指标（如目标达成率、生产率比率、绩效方差、绩效状态和效率评级）来扩展绩效评估。目标达成率以百分比衡量，确保超额完成目标的员工得到认可。生产率比率根据培训时长评估效率，而绩效方差则捕捉与预期绩效的偏差。员工被归类到不同的绩效状态，如“超额完成”或“按计划进行”，效率评级则表明其工作成效。\n\
    \n### COALESCE\n\nPostgreSQL 中的`COALESCE`是一个函数，它返回表达式列表中第一个非`NULL`值。因此，它是处理`NULL`值和提供默认值的关键组件。对于一个可能在列中包含缺失数据（`NULL`值）的表，`COALESCE`允许你用有意义的默认值替换这些`NULL`值。PostgreSQL\
    \ 中`COALESCE`的基本语法如下：\n\n```\nCOALESCE(value1, value2, ..., value_n)\n```\n\n\
    `COALESCE`从提供的参数列表中返回第一个非`NULL`值。如果所有值都是`NULL`，则返回`NULL`。它通常用于通过提供默认或备用值来处理查询中的`NULL`值。\n\
    \n表 8-8 展示了一个会员数据表，该表需要通过假设一个默认有效期来填充缺失的到期日期。\n\n表 8-8\n会员数据表\n\n| member_id |\
    \ member_name | membership_type | expiration_date |\n| --- | --- | --- | --- |\n\
    | 1 | John Doe | Gold | 2025-06-15 |\n| 2 | Jane Smith | Silver | NULL |\n| 3\
    \ | Mike Johnson | Gold | 2025-08-10 |\n| 4 | Sarah Williams | Bronze | NULL |\n\
    | 5 | David Brown | Gold | 2025-07-01 |\n| 6 | Emily Davis | Silver | NULL |\n\
    | 7 | James Wilson | Bronze | 2025-05-20 |\n| 8 | Laura Martinez | Gold | NULL\
    \ |\n| 9 | Robert Taylor | Silver | 2025-09-25 |\n| 10 | Sophia Anderson | Bronze\
    \ | NULL |\n\n以下查询旨在使用`COALESCE`来填充缺失的到期日期，假设缺失值的默认有效期为：Gold: 2025-12-31，Silver:\
    \ 2025-11-30，Bronze: 2025-10-31。\n\n```\nSELECT\n    member_id,\n    member_name,\n\
    \    membership_type,\n    COALESCE(expiration_date,\n             CASE\n    \
    \             WHEN membership_type = 'Gold' THEN DATE '2025-12-31'\n         \
    \        WHEN membership_type = 'Silver' THEN DATE '2025-11-30'\n            \
    \     WHEN membership_type = 'Bronze' THEN DATE '2025-10-31'\n             END\n\
    \    ) AS adjusted_expiration_date\nFROM memberships;\n```\n\n在此案例中，这些值是假设的，但在真实场景中，处理缺失值的最佳策略大多遵循此流程：\n\
    1.  分析缺失数据的模式。\n2.  考虑业务背景，记录假设和方法。\n3.  利用领域专业知识，通过已知模式和统计方法验证插补值，以确保插补值符合业务逻辑并保持数据完整性。\n\
    \n通过结合使用`COALESCE`和`CASE`语句，你可以确保缺失到期日期的会员根据其会员类型获得一个默认日期。这有助于保持数据一致性，并避免报告中出现`NULL`值。此查询确保缺失到期日期的会员将获得一个默认日期。这是基于他们的会员类型。如表\
    \ 8-9 所示，这有助于保持数据一致性并避免报告中出现`NULL`值。\n\n表 8-9\n缺失的到期日期已被填充\n\n| member_id | member_name\
    \ | membership_type | adjusted_expiration_date |\n| --- | --- | --- | --- |\n\
    | 1 | John Doe | Gold | 2025-06-15 |\n| 2 | Jane Smith | Silver | 2025-11-30 |\n\
    | 3 | Mike Johnson | Gold | 2025-08-10 |\n| 4 | Sarah Williams | Bronze | 2025-10-31\
    \ |\n| 5 | David Brown | Gold | 2025-07-01 |\n| 6 | Emily Davis | Silver | 2025-11-30\
    \ |\n| 7 | James Wilson | Bronze | 2025-05-20 |\n| 8 | Laura Martinez | Gold |\
    \ 2025-12-31 |\n| 9 | Robert Taylor | Silver | 2025-09-25 |\n| 10 | Sophia Anderson\
    \ | Bronze | 2025-10-31 |\n\n## 第一个故事：医院的分析故事\n\n索菲亚是一家大型都市医院的分析师，她负责为一个关键会议准备可视化图表。原始的医院数据混乱不堪，包含缺失值、异常值以及变量之间的复杂关系。如表\
    \ 8-10 所示，一个`hospital_admissions`表有 20 行和多个`NULL`值。尽管如此，索菲亚继续运用 SQL 和她的分析思维，绘制出清晰、富有洞察力的图表。\n\
    \n表 8-10\nhospital_admissions 表\n\n| patient_id | Age | diagnosis_code | admission_date\
    \ | discharge_date |\n| --- | --- | --- | --- | --- |\n| 1 | 12 | 150 | 2024-03-01\
    \ | 2024-03-03 |\n| 2 | 45 | 120 | 2024-03-02 | 2024-03-05 |\n| 3 | 67 | 180 |\
    \ 2024-03-03 | 2024-03-10 |\n| 4 | 8 | 90 | 2024-03-04 | 2024-03-06 |\n| 5 | 32\
    \ | 110 | 2024-03-05 | 2024-03-08 |\n| 6 | 55 | 130 | 2024-03-06 | 2024-03-12\
    \ |\n| 7 | 70 | 140 | 2024-03-07 | `NULL` |\n| 8 | 25 | 160 | 2024-03-08 | 2024-03-11\
    \ |\n| 9 | 40 | 170 | 2024-03-09 | 2024-03-16 |\n| 10 | 60 | 190 | 2024-03-10\
    \ | 2024-03-20 |\n| 11 | 15 | `NULL` | 2024-03-11 | 2024-03-13 |\n| 12 | 50 |\
    \ 200 | 2024-03-12 | `NULL` |\n| 13 | 28 | 105 | 2024-03-13 | 2024-03-15 |\n|\
    \ 14 | 72 | `NULL` | 2024-03-14 | 2024-03-21 |\n| 15 | 10 | 115 | 2024-03-15 |\
    \ `NULL` |\n| 16 | 35 | 125 | 2024-03-16 | 2024-03-18 |\n| 17 | 65 | 135 | 2024-03-17\
    \ | 2024-03-24 |\n| 18 | 22 | 145 | 2024-03-18 | 2024-03-20 |\n| 19 | 48 | 155\
    \ | 2024-03-19 | `NULL` |\n| 20 | 58 | 165 | 2024-03-20 | 2024-03-27 |\n\n在数据准备过程中，她遇到了六个主要挑战：\n\
    *   如何将医院患者按年龄组（如儿童、成人、老年）分类，以便更轻松地解读按年龄组划分的入院情况可视化图表？\n*   如何动态过滤医院数据，仅显示因心脏相关问题入院的患者——例如，在\
    \ 2024 年期间，诊断代码在 100 到 199 之间的患者？\n*   按诊断代码范围（100–125, 126–150, 151–175, 和 176–199）分组，心脏相关问题患者的平均住院时长是多少？\n\
    *   如何预处理医院数据以创建一个`stay_category`列，使用条件逻辑根据住院天数将患者住院时长分类为短期住院、中期住院或长期住院？\n*  \
    \ 如何计算每个年龄组（儿童、成人、老年）的患者总数和平均住院时长，以识别人口统计学趋势和资源需求？\n*   如何通过处理缺失的出院日期（用`admission_date\
    \ + 2`天填充）并排除住院时长超过 365 天的异常值，来清洗医院数据以用于可视化？\n\n作为第一个挑战的一部分，目标是按年龄对医院患者进行分类，包括其年龄数据值的`hospital_admissions`数据表。索菲亚需要将患者分为年龄组（儿童、成人、老年），以便更好地可视化按年龄类别划分的入院情况。\n\
    \n```\nSELECT\n    patient_id,\n    age,\n    CASE\n        WHEN age < 18 THEN\
    \ 'Child'\n        WHEN age >= 18 AND age < 65 THEN 'Adult'\n        WHEN age\
    \ >= 65 THEN 'Senior'\n        ELSE 'Unknown'\n    END AS age_group\nFROM hospital_admissions\n\
    ORDER BY age_group;\n```\n\n此查询使用条件逻辑创建了一个`age_group`列。像这样对数据进行分类，通过将相似的数据点分组，提高了可视化图表的清晰度。在此查询中，`CASE`语句评估`age`列并根据其值分配类别。它将年龄小于\
    \ 18 岁的个体归类为`Child`，年龄在 18 到 64 岁之间归类为`Adult`，年龄为 65 岁或以上归类为`Senior`。对于任何意外值（如`NULL`），则分配`Unknown`类别。\n"
