    The query calculates the average strokes of players who participated in the U.S.
    Open tournament. It joins the scores, players, and tournaments tables using `player_id`
    and `tournament_id`. The `WHERE` clause filters scores by the U.S. Open tournament,
    and the `GROUP BY` clause groups results by player names. The `AVG()` function
    computes the average strokes for each player. This query is common in data analysis
