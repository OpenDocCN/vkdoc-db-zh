    ->  Seq Scan on tournaments t  (cost=0.00..13.75 rows=2 width=4) (actual time=0.004..0.007
    rows=1 loops=1)

    Filter: ((name)::text = ''US Open''::text)

    Rows Removed by Filter: 4

    ->  Index Scan using players_pkey on players p  (cost=0.15..0.19 rows=1 width=122)
    (actual time=0.004..0.004 rows=1 loops=4)

