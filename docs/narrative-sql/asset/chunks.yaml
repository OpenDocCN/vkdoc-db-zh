    column2``FROM table_name``WHERE condition``)``SELECT * FROM cte_name;` |

    | Multiple CTEs | `WITH``cte1 AS (``SELECT * FROM table1 WHERE condition1``),``cte2
    AS (``SELECT * FROM table2 WHERE condition2``)``SELECT * FROM cte1 JOIN cte2 ON
