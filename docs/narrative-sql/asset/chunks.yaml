  trans: "### 大小写敏感性\n\n一个常见的错误是假设字符串比较时不区分大小写。SQL 在不同数据库中的行为可能因大小写敏感性设置而异。PostgreSQL\
    \ 默认是大小写敏感的。标识符（如表名、列名和数据值）会根据其大小写被区别对待。例如，`SELECT * FROM Users` 不会返回名为 `users`\
    \ 的表的结果。\n\n假设你需要查找一个姓氏为 `smith` 的用户。根据数据库的标记设置，以下查询可能会漏掉如 `'Smith'` 或 `'SMITH'`\
    \ 这样的条目。\n\n```sql\nSELECT * FROM Employees WHERE LastName = 'smith'\n```\n\n\
    解决方案是使用函数或调整排序规则设置来确保不区分大小写的比较：\n\n```sql\nSELECT * FROM Employees WHERE LOWER(LastName)\
    \ = 'smith'\n```\n\n通过将 `LastName` 转换为小写，该查询能正确识别 `'smith'` 的所有变体。\n\n注意\n\n`UPPER`\
    \ 和 `LOWER` 函数遵循相似的语法。需要牢记的是，结果的排序顺序可能会受到使用 `UPPER` 或 `LOWER` 的影响。由于大写字母通常在小写字母之前排序，排序后的顺序可能与原始的大小写敏感顺序不同。\n\
    \n## 总结\n\n作为提升数据查询技能的一部分，本章探讨了 `WHERE` 子句的用法。通过理解 `WHERE` 子句及其相关函数，你可以编写更高效、更准确的\
    \ SQL 查询。\n\n## 关键点\n\n*   `WHERE`：根据指定条件筛选记录。\n*   SQL 中的日期：处理日期和时间数据类型，允许进行精确的基于日期的查询。\n\
    *   `BETWEEN`：选择给定范围内的值，包括端点。\n*   SQL 模式匹配：使用 `LIKE` 在文本字段中搜索模式。\n*   `CAST`：将值从一种数据类型转换为另一种，以确保正确的比较和操作。\n\
    *   在 SQL 中使用 `WHERE` 时的常见错误：\n    *   `数据类型`：确保数据类型之间的兼容性以避免错误。\n    *   `NULL\
    \ 值`：正确处理 `NULL` 值，因为它们表示未知或缺失的数据，可能会影响查询结果。\n    *   `逻辑错误`：通过理解运算符优先级并使用括号，避免在组合使用\
    \ `AND` 和 `OR` 条件时出错。\n    *   `大小写敏感性`：SQL 可能区分大小写，这可能会影响基于文本的条件和比较。\n\n## 核心要点\n\
    \n*   `WHERE 子句`：对于根据指定条件筛选记录和实现精确数据检索至关重要。\n*   SQL 中的日期：正确处理日期和时间数据类型对于进行精确的基于日期的查询和比较至关重要。\n\
    *   `BETWEEN 操作符`：用于选择特定范围内的值（包括端点），简化了范围查询。\n*   SQL 模式匹配：`LIKE` 操作符允许使用模式搜索文本字段，从而更轻松地找到符合特定条件的记录。\n\
    *   `CAST 函数`：将值从一种数据类型转换为另一种，确保在 SQL 查询中进行正确的比较和操作。\n\n## 展望未来\n\n下一章“复杂角色与 JOIN”将探讨各种类型的\
    \ `JOIN` 操作，这些操作对于组合来自多个表的数据至关重要。掌握此操作将使你能够创建复杂的查询，从而对数据集提供更深入的见解和更全面的分析。\n\n\
    ## 测试你的技能\n\n1.  一位图书馆管理员希望创建一份报告，显示 2000 年至 2010 年（含）间出版的书籍的标题和出版年份。此外，她还想过滤掉任何标题中包含\
    \ *Guide* 这个词的书。请编写一个查询来检索这些书籍的标题和出版年份。\n2.  一位在线市场经理希望分析电子类目中价格在 50 美元到 500 美元之间的商品价格。价格以字符串形式存储。请编写一个查询，检索此价格范围内该类目的商品的\
    \ `ItemID`、`ItemName` 和转换为小数的 `Price`。\n3.  一位健身应用的所有者希望生成一份报告，关于在任何单次会话中步行超过五公里的用户。`DistanceWalked`\
    \ 以米为单位存储。检索这些会话的 `UserID`、`SessionID` 和转换为公里的 `DistanceWalked`。\n4.  一家音乐流媒体服务希望识别所有在\
    \ 2000 年之前发行且标题中包含 *Love* 这个词的歌曲。请编写一个查询来检索这些歌曲的 `SongID`、`SongTitle` 和 `ReleaseYear`。\n\
    \n# 4. 复杂角色与 JOIN\n\nSQL 中的 `JOIN` 操作允许你根据两个或多个表之间的关联列，将它们的行组合起来。在大多数实际应用中，全面分析数据需要考虑的不仅仅是一个单一的表。为了进行全面的分析，考虑不同的维度是非常重要且必要的，因此，使用\
    \ `JOIN` 操作可以让你实现全面的分析。在关系型数据库中，数据通常被规范化并分布在不同的表中，以减少冗余并确保数据完整性。`JOIN` 使你能够将这些分散的数据汇集在一起，并提供一个可用于更好分析和报告的统一视图。\n\
    \n## JOIN 简介\n\nSQL 中的 `JOIN` 是查询关系型数据库必不可少的操作，因为它们使你能够通过链接多个表的数据来提取有意义的信息。\n\n\
    ### JOIN 在数据叙事中的重要性\n\nJOIN 对于数据叙事至关重要，因为它们允许分析师通过组合分散在多个表中的相关信息来创建叙述。例如，要分析客户订单，你可能需要来自三个表的数据：`Customers`、`Orders`\
    \ 和 `Products`。`JOIN` 使你能够将这些表连接在一起，并提取一个连贯的数据集，从而提供对客户购买行为、产品受欢迎程度和销售绩效的见解。通过在查询中使用\
    \ `JOIN` 操作符，你可以实现以下优势。\n\n*   组合来自多个来源的数据\n*   通过访问所有相关数据点进行深入分析\n*   创建能够回答更复杂问题的复杂查询"
- fmt: '### The Anatomy of a `JOIN` Clause


    A `JOIN` clause can be described as a bridge between two or more tables. As mentioned,
    a relational database will contain several tables, and the possibility of merging
    the data of these tables based on a specific criterion allows you to retrieve
    and analyze the information that is in separate tables. This is important because
    real-world databases often store data in separate tables to improve organization
    and efficiency. A `JOIN` clause fundamentally contains the following parts:


    1.  **JOIN types**: This specifies the type of connection performed. Common types
    are `INNER JOIN`, `LEFT OUTER JOIN`, `RIGHT OUTER JOIN`, `FULL OUTER JOIN`, and
    `CROSS JOIN`. Each type determines how matching and non-matching rows are handled
    in the result set.


    2.  **FROM clause**: This clause specifies the tables being attached. The order
    of the tables in the `FROM` clause can sometimes affect query performance, especially
    with certain `JOIN` types.


    > **Note**

    > Most modern database systems use a query optimizer that analyzes the `JOIN`
    clause and chooses the most efficient way to perform the `JOIN`s. Today’s modern
    database optimizers are intelligent. They consider various factors such as table
    size, indexes, and `JOIN` conditions when choosing a `JOIN` strategy. In many
    cases, the optimizer can perform `JOIN`s efficiently regardless of the order you
    specify in the `FROM` clause. If you suspect that a `JOIN` clause is causing performance
    problems, it is recommended that you use the tools provided by your database system
    to examine the actual execution plan. This reveals the `JOIN` strategy chosen
    by the optimizer and highlights any bottlenecks.


    3.  **ON clause**: This clause specifies the condition that determines which rows
    of each table match. The `ON` statement usually compares the columns of both tables
    using comparison operators such as `=`, `<`, or `>`.


    The basic syntax of an `INNER JOIN`, which is the most common type of `JOIN`,
    is shown here:


    ```sql

    SELECT Customers.Name, Orders.OrderID, Orders.OrderDate

    FROM Customers

    INNER JOIN Orders ON Customers.CustomerID = Orders.CustomerID;

    ```


    This query is an `INNER JOIN` that joins the `Customers` and `Orders` tables.
    The `ON` clause specifies that rows of `Customers` match rows of `Orders` only
    when `Customer ID` values are equal. This query returns a result set containing
    columns from both tables, but only for the rows in which the same customer ordered
    (i.e., matching `CustomerID` values).


    It should be noted that in SQL, the dot (`.`) is used to refer to a specific column
    in a specific table. When there are columns with the same name in different tables,
    a dot is used to determine which table a column belongs to, in order to avoid
    confusion about column names.


    ### Types of `JOIN`s


    Despite the specific needs of each query, there are different types of SQL `JOIN`s.
    Each type of SQL `JOIN` provides different methods of combining data from multiple
    tables. The purpose of each type of `JOIN` is explained next.


    `INNER JOIN`: This is a tool for retrieving data when there is an explicit relationship
    between tables. This ensures that you only get rows with matches in both tables,
    which is ideal for tasks like finding customers who have placed an order.


    *   **Purpose**: Retrieves only the rows that have matching values in both tables.

    *   **Use case**: When you want to get only the records that have related data
    in both tables.


    `LEFT/RIGHT OUTER JOIN`: These `JOIN`s are important for including all rows from
    a particular table, the one listed first in the `FROM` clause, even if there is
    no match in another table. They are typically used to maintain data from one table
    while retrieving related information from another table.


    `LEFT OUTER JOIN`:


    *   **Purpose**: Retrieves all rows from the left table and the matched rows from
    the right table. If there is no match, the result is `NULL` on the right side.

    *   **Use case**: When you want to get all records from the left table, with the
    related data from the right table, if available.


    `RIGHT OUTER JOIN`:


    *   **Purpose**: Retrieves all rows from the right table and the matched rows
    from the left table. If there is no match, the result is `NULL` on the left side.

    *   **Use case**: When you want to get all records from the right table, with
    the related data from the left table, if available.


    `FULL OUTER JOIN`: This `JOIN` combines the left and right outer join functionality.
    It returns all rows from both tables and fills unmatched columns. This is useful
    when you need a complete picture of data from both tables, regardless of relationships.


    *   **Purpose**: Retrieves all rows when there is a match in either the left or
    right table. Rows without a match in one of the tables will have `NULL`s.

    *   **Use case**: When you want to get all records from both tables, matching
    where possible.


    `CROSS JOIN`: This `JOIN` creates a Cartesian product, which basically multiplies
    all the rows in one table by all the rows in the other table. While often used
    for visualization purposes, it can be computationally expensive for large datasets.
    Typically used sparingly or when you specifically need all possible combinations
    of rows.


    *   **Purpose**: Returns the Cartesian product of the two tables. Each row from
    the first table is combined with all rows from the second table.

    *   **Use case**: When you need all possible combinations of rows from the tables.
    This is rarely used unless for specific purposes like generating all combinations
    for testing.


    `SELF JOIN`: This `JOIN` allows you to join a table to itself based on a certain
    condition. It is powerful for finding relationships in a table.


    *   **Purpose**: `JOIN`s a table with itself.

    *   **Use case**: When you need to compare rows within the same table.


    Using different types of `JOIN`s provides flexibility in structuring the data.
    They allow you to retrieve data based on specific match criteria, include all
    rows from a specific table, or even examine all possible combinations. `JOIN`s
    are a useful tool for creating efficient analytical queries on real-world relational
    databases. Table 4-1 briefly explains the reason for using each type of `JOIN`.


    **Table 4-1**


    The Different Types of `JOIN`s'
  raw: '### The Anatomy of a JOIN Clause


    A `JOIN` clause can be described as a bridge between two or more tables. As mentioned,
    a relational database will contain several tables, and the possibility of merging
    the data of these tables based on a specific criterion allows you to retrieve
    and analyze the information that is in separate tables. This is important because
    real-world databases often store data in separate tables to improve organization
    and efficiency. A `JOIN` clause fundamentally contains the following parts:


    1.  **JOIN** **types**: This specifies the type of connection performed. Common
    types are `INNER JOIN`, `LEFT OUTER JOIN`, `RIGHT OUTER JOIN`, `FULL OUTER JOIN`,
    and `CROSS JOIN`. Each type determines how matching and non-matching rows are
    handled in the result set.


    2.  **FROM** **clause**: This clause specifies the tables being attached. The
    order of the tables in the `FROM` clause can sometimes affect query performance,
    especially with certain `JOIN` types.


    Note


    Most modern database systems use a query optimizer that analyzes the `JOIN` clause
    and chooses the most efficient way to perform the `JOIN`s. Today’s modern database
    optimizers are intelligent. They consider various factors such as table size,
    indexes, and `JOIN` conditions when choosing a `JOIN` strategy. In many cases,
    the optimizer can perform `JOIN`s efficiently regardless of the order you specify
    in the `FROM` clause. If you suspect that a `JOIN` clause is causing performance
    problems, it is recommended that you use the tools provided by your database system
    to examine the actual execution plan. This reveals the `JOIN` strategy chosen
    by the optimizer and highlights any bottlenecks.


    1.  **ON** **clause**: This clause specifies the condition that determines which
    rows of each table match. The `ON` statement usually compares the columns of both
    tables using comparison operators such as `=`, `<`, or `>`.


    The basic syntax of an `INNER JOIN`, which is the most common type of `JOIN`,
    is shown here:


    ```

    SELECT Customers.Name, Orders.OrderID, Orders.OrderDate

    FROM Customers

    INNER JOIN Orders ON Customers.CustomerID = Orders.CustomerID;

    ```


    This query is an `INNER JOIN` that joins the `Customers` and `Orders` tables.
    The `ON` clause specifies that rows of `Customers` match rows of `Orders` only
    when `Customer ID` values are equal. This query returns a result set containing
    columns from both tables, but only for the rows in which the same customer ordered
    (i.e., matching `CustomerID` values).


