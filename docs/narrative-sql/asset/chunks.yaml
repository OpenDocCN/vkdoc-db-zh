    ## 按年龄组分析平均住院时长


    接下来，医院管理者希望了解各年龄组（儿童、成人、老年）的平均住院时长，以便更有效地规划资源。


    ```sql

    SELECT

    CASE

    WHEN age < 18 THEN ''Child''

    WHEN age BETWEEN 18 AND 64 THEN ''Adult''

    WHEN age >= 65 THEN ''Senior''

    ELSE ''Unknown''

    END AS age_group,

    COUNT(patient_id) AS total_patients,

    AVG(discharge_date - admission_date) AS avg_length_of_stay

    FROM hospital_admissions

    GROUP BY age_group

    ORDER BY age_group;

    ```'
  raw: 'In this query, the `CASE` statement classifies patients into age groups based
    on their age. The `BETWEEN` operator is used to define the `Adult` category. It''s
    important to note that `BETWEEN` is *inclusive,* meaning that the boundary values,
    18 and 64, are included. So, a patient who is exactly 18 or exactly 64 years old
    will fall into the `Adult` category. This ensures a clear, non-overlapping classification
    across all age ranges.


