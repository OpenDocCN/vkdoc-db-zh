    To find the top three players with the lowest combined scores in the Open Championship,
    the following query calculates the total strokes of players who participated in
    “The Open Championship” tournament. It joins the `Scores`, `Players`, and `Tournaments`
    tables using `player_id` and `tournament_id`. The `WHERE` clause filters scores
    for “The Open Championship,” and the `GROUP BY` clause groups results by player
    names. The `SUM()` function calculates each player’s total strokes. The `ORDER
    BY total_strokes ASC` arranges results in ascending order, and `LIMIT 3` returns
    the three players with the fewest total strokes.


    ```

    EXPLAIN SELECT p.name, SUM(s.strokes) AS total_strokes

    FROM scores s

    JOIN players p ON s.player_id = p.player_id

    JOIN tournaments t ON s.tournament_id = t.tournament_id

    WHERE t.name = ''The Open Championship''

    GROUP BY p.name

    ORDER BY total_strokes ASC

    LIMIT 3;

    ```


