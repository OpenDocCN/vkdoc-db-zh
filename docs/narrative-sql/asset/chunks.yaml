- fmt: '# Recursive CTEs: Building Hierarchical Queries


    ```

    WITH RECURSIVE employee_hierarchy AS (

    -- Base case: Select top-level manager (CEO)

    SELECT id, name, manager_id, 1 AS level

    FROM employees

    WHERE manager_id IS NULL

    UNION ALL

    -- Recursive case: Find employees reporting to the previous level

    SELECT e.id, e.name, e.manager_id, eh.level + 1

    FROM employees e

    JOIN employee_hierarchy eh ON e.manager_id = eh.id

    )

    ```


    This query starts with the CEO and recursively finds all employees under them,
    assigning hierarchical levels dynamically. This query uses a recursive CTE called
    `employee_hierarchy` to generate a hierarchical view of an organization’s reporting
    structure. The query consists of two main components that work together to build
    the complete organizational hierarchy. The base case establishes the starting
    point by selecting the top-level manager, typically the CEO, from the `Employees`
    table, identified by having a `NULL` value in the `manager_id` column. This query
    selects the manager’s `id`, `name`, and `manager_id`, while also assigning a level
    value of 1 to indicate the top position in the hierarchy. This is the first row
    of the result set and serves as the basis for recursion.


    The recursive part then joins the `Employees` table with the previously generated
    results, stored in the `employee_hierarchy` CTE. It finds all employees whose
    `manager_id` matches the ID of someone in the current result set, essentially
    identifying all direct reports. For each of these employees, it increases the
    level value by 1, indicating they are one level lower in the hierarchy than their
    manager. This recursive process continues automatically, with each iteration finding
    employees who report to managers discovered in the previous iteration. This continues
    until no more matching employees are found.


    This query efficiently traverses the entire organizational structure regardless
    of its depth using this recursive approach. This results in a complete picture
    of the reporting relationships with appropriate level indicators. This makes it
    possible to visualize complex organizational hierarchies without having to know
    in advance how many levels there are.


    CTEs and recursive CTEs are powerful tools that make SQL queries more structured,
    readable, and efficient. Table [10-25](#619961_1_En_10_Chapter.xhtml#Tab25) illustrates
    the key differences between CTEs and RCTEs.


    Table 10-25


    Key Differences between CTEs and RCTEs


    | Feature | Standard CTE | Recursive CTE |

    | --- | --- | --- |

    | Purpose | Organizes complex queries | Works with hierarchical or sequential
    data |

    | Calls itself | No | Yes |

    | Use case | Filtering, grouping, aggregations | Organizational hierarchies, graph
    traversal |

    | Query execution | Runs once | Runs iteratively until no more rows match |


    ## The Second Story: An Analysis of a Family Tree for the Civil Registration Office


    The civil registration process is where records of life events—such as births,
    marriages, and deaths—are kept for the citizens and residents of a city. Jane
    intends to work in the ancestry research department, where she will be analyzing
    data collected from these records. Jane’s task is to analyze a family tree dataset.
    The dataset includes information about individuals and their direct parents. Using
    RCTEs, she will solve various challenges related to family lineage. For Jane’s
    analytic journey, Table [10-26](#619961_1_En_10_Chapter.xhtml#Tab26) contains
    data associated with citizens and residents.


    Table 10-26


    The family_tree Table


    | ID | Name | parent_id | birth_year |

    | --- | --- | --- | --- |

    | 1 | Alice | `NULL` | 1950 |

    | 2 | Bob | 1 | 1975 |

    | 3 | Carol | 1 | 1978 |

    | 4 | Dave | 2 | 2000 |

    | 5 | Eve | 3 | 2003 |

    | 6 | Frank | 2 | 2005 |

    | 7 | Grace | 5 | 2028 |


    Given this data, Jane wants to accomplish the following:


    *   Retrieve all descendants of Alice along with their generational depth.

    *   List all ancestors of Grace, tracing back through generations.

    *   Identify the longest ancestral chain in the family tree.

    *   Find the age difference between the oldest ancestor and youngest descendant
    for each lineage.


    The following query will retrieve all descendants of Alice together with their
    generational depth:


    ```

    WITH RECURSIVE descendants AS (

    -- Base case: Start with Alice

    SELECT id, name, parent_id, birth_year, 1 AS generation

    FROM family_tree

    WHERE name = ''Alice''

    UNION ALL

    -- Recursive case: Find children of previous generation

    SELECT f.id, f.name, f.parent_id, f.birth_year, d.generation + 1

    FROM family_tree f

    JOIN descendants d ON f.parent_id = d.id

    )

    SELECT * FROM descendants;

    ```


    To find all descendants of Alice within a family tree, this SQL query constructs
    a recursive query using the `WITH RECURSIVE` clause. This query starts by selecting
    all data from the `family_tree` table, including information about the current
    ancestor of Alice, and then iteratively calls itself, the `descendants` CTE, to
    find all children of that ancestor. This CTE will join each row from the `family_tree`
    table to the Descendants table based on the `parent_id`, progressively exploring
    the family tree and ultimately returning a list of all descendants of Alice, including
    their IDs, names, parent IDs, and birth years.


    Note


    Part of the `WITH RECURSIVE` clause defines a new column called `generation` within
    the `descendants` CTE. It plays a crucial role in tracking the “level” or “depth”
    of each individual’s ancestry within the family tree. In the previous query, the
    `1 AS generation` part declares and names a column called `generation` that will
    be added to every row produced by the recursive CTE. The value `1` initially assigned
    to this column for the base case (Alice) establishes the starting point for counting
    generational depth. As the query recurs, moving down through the family tree,
    the `generation` value increases by one for each generation. Alice is in generation
    one, so she''s the starting point. Bob’s children will be in generation two, because
    they’re one generation removed from Alice. Generation 3 refers to Alice''s grandchildren.
    The `generation` column allows you to organize and visualize the family tree.
    Using parental lineage, it builds a numerical hierarchy of ancestry relationships.


    Table [10-27](#619961_1_En_10_Chapter.xhtml#Tab27) illustrates all descendants
    of Alice along with their generational depth.


    Table 10-27


    Descendants of Alice and Their Generational Depth


    | ID | Name | parent_id | birth_year | generation |

    | --- | --- | --- | --- | --- |

    | 1 | Alice | `NULL` | 1950 | 1 |

    | 2 | Bob | 1 | 1975 | 2 |

    | 3 | Carol | 1 | 1978 | 2 |

    | 4 | Dave | 2 | 2000 | 3 |

    | 5 | Eve | 3 | 2003 | 3 |

    | 6 | Frank | 2 | 2005 | 3 |

    | 7 | Grace | 5 | 2028 | 4 |


    The following query provides a list of all the ancestors of Grace, tracing back
    through the generations:'
