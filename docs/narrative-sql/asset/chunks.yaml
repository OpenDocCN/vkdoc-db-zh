    # 10. Analytics Alchemy: Turning Data into Gold


    Turning data into gold with SQL requires mastering advanced analytical functions
    that help you extract deeper insights from raw data and transform them into compelling
    narratives. PostgreSQL provides powerful functions that can be used to transform
    raw data into a compelling story. Additionally, this chapter explains how you
    can transform raw data into a compelling story, and how recursive queries can
    be used to structure query logic effectively.


    ## Functions


    Functions can be categorized based on their functionality and purpose. PostgreSQL
    provides a wide range of functions, and while aggregate, statistical and mathematical,
    and window functions are common categories, there are also other types, including
    ranking functions, string functions, date and time functions, JSON functions,
    control functions and system functions. SQL functions help you perform operations
    that would otherwise require several queries and round trips within the database.
    By using functions, it is possible to reuse your database since other applications
    can interact directly with your stored procedures without the need for middle-tier
    or duplicate code. This is valuable for most data analysis tasks.


    ### Aggregate Functions


    Aggregate functions operate on multiple rows and return a single summarized value.
    They are commonly used with `GROUP BY` to perform calculations across subsets
    of data. For instance, PostgreSQL aggregate functions are used to find the total
    revenue per product category. Aggregate functions operate on multiple rows and
    return a single summarized value for each group of data. Common aggregate functions
    include `SUM(column_name)`, which calculates the total sum of a column, and `AVG(column_name)`,
    which determines the average value. Additionally, `COUNT(column_name)` is used
    to count the number of rows, while `MIN(column_name)` and `MAX(column_name)` help
    identify the smallest and largest values in a dataset. In a nutshell, the key
    feature of aggregate functions is that they collapse multiple rows into a single
    result per group. This makes them ideal for summarizing large datasets efficiently.
    Table [10-1](#619961_1_En_10_Chapter.xhtml#Tab1) summarizes most of the well-known
    aggregate functions in PostgreSQL.


    ### Table 10-1: The Commonly Used Aggregate Functions in PostgreSQL


    | Function | Description | Example |

    | --- | --- | --- |

    | `AVG(column_name)` | Returns the average (arithmetic mean) of the input values.
    | `SELECT AVG(salary) FROM employees;` |

    | `COUNT(column_name)` | Returns the number of input rows for which the value
    of expression is not null. | `SELECT COUNT(department) FROM employees;` |

    | `COUNT(*)` | Returns the number of input rows. | `SELECT COUNT(*) FROM employees;`
    |

    | `MAX(column_name)` | Returns the maximum value of the input values. | `SELECT
    MAX(salary) FROM employees;` |

    | `MIN(column_name)` | Returns the minimum value of the input values. | `SELECT
    MIN(salary) FROM employees;` |

    | `SUM(column_name)` | Returns the sum of the input values. | `SELECT SUM(salary)
    FROM employees;` |

    | `BOOL_AND(column_name)` | Returns `TRUE` if all input values are true, otherwise
    `FALSE`. | `SELECT BOOL_AND(active) FROM users;` |

    | `BOOL_OR(column_name)` | Returns `TRUE` if any input value is true, otherwise
    `FALSE`. | `SELECT BOOL_OR(active) FROM users;` |

    | `EVERY(column_name)` | Equivalent to `BOOL_AND`. | `SELECT EVERY(active) FROM
    users;` |

    | `MODE(column_name)` | Returns the most frequent input value (or any if multiple
    are equally frequent). | `SELECT MODE() WITHIN GROUP (ORDER BY department) FROM
    employees;` |

    | `PERCENTILE_CONT(fraction)` | Returns a percentile, interpolating between adjacent
    input items if needed. | `SELECT PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY salary)
    FROM employees;` |

    | `PERCENTILE_DISC(fraction)` | Returns a percentile; the result is an actual
    input element. | `SELECT PERCENTILE_DISC(0.9) WITHIN GROUP (ORDER BY salary) FROM
    employees;` |'
