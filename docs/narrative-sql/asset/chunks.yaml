- fmt: '### Selecting Columns from a Table


    When constructing a narrative or conducting an analysis, you often need specific
    pieces of data from one or more tables. Selecting specific columns allows you
    to focus on the data relevant to your story or analysis. For instance, if you
    have a database table named `Customers` that includes `CustomerID`, `FirstName`,
    `LastName`, `Email`, `DateOfBirth`, `Neighborhood`, `Address`, `Zip Code`, and
    `Phone Number`, and your story or analysis only needs to know about customer names
    and emails, the proper `SELECT` statement would look something like this:


    ```sql

    SELECT FirstName, LastName, Email

    FROM Customers;

    ```


    Table [2-2](#619961_1_En_2_Chapter.xhtml#Tab2) shows the result of executing the
    query to select only the `FirstName`, `LastName`, and `Email` columns.


    **Table 2-2**

    The Result of the SELECT Query Execution


    | FirstName | LastName | Email |

    | --- | --- | --- |

    | John | Doe | `johndoe@example.com` |

    | Jane | Smith | `janesmith@example.com` |

    | Alice | Johnson | `alicej@example.com` |


    ### Introducing Aliases for Columns


    Aliases in SQL are used to rename a column or table in the output of your SQL
    query. They are particularly useful for making query results more readable. For
    example, using `Contact Email` instead of just `Email` can significantly enhance
    clarity. The same applies when joining multiple tables, which is covered in Chapter
    [4](#619961_1_En_4_Chapter.xhtml). It is also helpful to use aliases when joining
    multiple tables with columns with the same name but with different meanings. The
    `AS` keyword is used after the column name to define an alias. However, the `AS`
    keyword is optional.


    ```sql

    SELECT FirstName AS First, LastName AS Last, Email AS ContactEmail

    FROM Customers;

    ```


    In this query, `FirstName`, `LastName`, and `Email` are renamed to `First`, `Last`,
    and `ContactEmail`, respectively, in the output. Aliases are especially useful
    in reports and exported data, making them essential tools in data presentation
    and storytelling. See Table [2-3](#619961_1_En_2_Chapter.xhtml#Tab3).


    **Table 2-3**

    The Result of the SELECT Along with AS Query Execution


    | First | Last | ContactEmail |

    | --- | --- | --- |

    | John | Doe | `johndoe@example.com` |

    | Jane | Smith | `janesmith@example.com` |

    | Alice | Johnson | `alicej@example.com` |


    ### Introducing the CONCAT Function


    To complete the process, the final step is to construct the following SQL query,
    which concatenates the first and last names to retrieve the full name and email
    address.


    ```sql

    SELECT CONCAT(FirstName, '' '', LastName) AS FullName, Email

    FROM Customers;

    ```


    This SQL statement utilizes the `CONCAT()` function to merge the `FirstName` and
    `LastName` into a single `FullName` column, simplifying the presentation and personalization
    of each invitation. By selecting only the `FullName` and `Email` columns, this
    query efficiently pulls the essential information, ensuring that the process of
    creating and sending invitations is streamlined and targeted. See Table [2-4](#619961_1_En_2_Chapter.xhtml#Tab4).


    **Table 2-4**

    The Result of the Query Execution of the SELECT, AS, and CONCAT Functions


    | FullName | Email |

    | --- | --- |

    | John Doe | `johndoe@example.com` |

    | Jane Smith | `janesmith@example.com` |

    | Alice Johnson | `alicej@example.com` |


    This table efficiently presents the necessary information for sending the bookstore
    anniversary invitations, presenting only the combined full names and email addresses
    of each customer.


    Note


    `CONCAT` is a function in SQL, not an operation. It’s used to concatenate, or
    join together, two or more strings into a single string. The `CONCAT` function
    is an essential tool for combining data from different columns or for creating
    a formatted output from multiple string fields in a database. The basic syntax
    of the `CONCAT` function is as follows:


    `CONCAT(string_column_1, string_column_2, ..., string_column_N)`


    It should be noted that the `CONCAT` function in PostgreSQL can be used in a variety
    of scenarios. However, there are specific cases where it may not be applicable
    or where alternative methods might be more appropriate. The `||` operator is a
    standard way to concatenate strings in PostgreSQL and can serve as an alternative
    to the `CONCAT` function. For instance, consider the following example using the
    `CONCAT` function:


    `SELECT CONCAT(string_column_1, string_column_2, ..., string_column_N) AS concatenated_string`


    `FROM your_table;`


    Alternatively, it is possible to achieve the same result using the `||` operator,
    which is a standard SQL method for string concatenation:


    `SELECT string_column_1 || string_column_2 || ... || string_column_N AS concatenated_string`


    `FROM your_table;`


    The `||` operator is widely supported across various SQL databases, making it
    a more portable option compared to some proprietary functions like `CONCAT`. Both
    approaches effectively concatenate strings, and the choice between them is influenced
    by factors such as readability, performance considerations, and specific database
    requirements.


    ### SQL Mathematical Operations with SELECT


    In SQL, mathematical operations are crucial to transforming and analyzing data.
    These operations enable you to perform calculations across your data columns,
    enhancing the ability to communicate meaningful stories through numbers. This
    section explores the basic mathematical operations available in SQL, illustrates
    these operations with a summary table, and shows how these techniques can be applied
    to storytelling.


    SQL supports a variety of mathematical operations that can be applied directly
    in the `SELECT` statement. These include addition (`+`), subtraction (`-`), multiplication
    (`*`), and division (`/`). Data manipulation can be performed directly within
    the database query using these operations to compute new values from existing
    data. This query provides a basic example of using mathematical operations to
    calculate a simple product:


    ```sql

    SELECT column1, column1 * column2 as Product

    FROM Table;

    ```


    In this query, `column1` and `column2` are existing columns in `Table`, and `Product`
    is a new column created in the output that contains the product of `column1` and
    `column2`.


    Table [2-5](#619961_1_En_2_Chapter.xhtml#Tab5) summarizes some of the most commonly
    used SQL mathematical operations.


    **Table 2-5**

    An Illustration of the Most Useful SQL Mathematical Operations


    | Operation | SQL Symbol | Example Use | Description |

    | --- | --- | --- | --- |

    | Addition | `+` | `column1 + column2` | Adds two columns together. |

    | Subtraction | `-` | `column1 - column2` | Subtracts one column from another.
    |

    | Multiplication | `*` | `column1 * column2` | Multiplies two columns. |

    | Division | `/` | `column1 / column2` | Divides one column by another. |

    | Modulus | `%` | `column1 % column2` | Divides one column by another and returns
    the remainder. |


    These operations can be used to create derived columns and provide greater insight
    into your data.'
