- fmt: '## The CASE Statement


    A `CASE` statement allows a query to be processed in a way similar to an `if-else`
    statement. Consider an example that categorizes sales amounts. In Table [8-2](#619961_1_En_8_Chapter.xhtml#Tab2),
    the `order_id` and `amount` are listed.


    Table 8-2


    The Orders Table


    | order_id | Amount |

    | --- | --- |

    | 101 | 1200 |

    | 102 | 700 |

    | 103 | 300 |


    The following query retrieves `order_id` and `amount` from an `Orders` table and
    adds a new column called `category` using a `CASE` statement, which is shown in
    Table [8-3](#619961_1_En_8_Chapter.xhtml#Tab3). The `category` column classifies
    order amounts into `High` (≥ $1000), `Medium` (≥ $500), and `Low` (< $500), based
    on their monetary value. This allows for quick visualization and analysis of order
    values by creating a simple categorical breakdown without modifying the original
    table structure.


    Table 8-3


    Categorizing order_id and Amount from an Orders Table


    | order_id | Amount | Category |

    | --- | --- | --- |

    | 101 | 1200 | High |

    | 102 | 700 | Medium |

    | 103 | 300 | Low |


    ```sql

    SELECT order_id, amount,

    CASE

    WHEN amount >= 1000 THEN ''High''

    WHEN amount >= 500 THEN ''Medium''

    ELSE ''Low''

    END AS category

    FROM orders;

    ```


    The results of this query are shown in Table [8-3](#619961_1_En_8_Chapter.xhtml#Tab3).


    This next query example provides a solution to a more complicated business intelligence
    question. The query aims to show how to categorize and understand product categories
    based on their sales performance.


    This query must answer the following sub-questions:


    *   How many product categories are there?


    *   What is the sales volume for each product category?


    *   How can you classify product categories into meaningful performance tiers?


    *   What are the averages and total sales for each category?


    Here, the role of the `CASE` statement is crucial because it creates a meaningful
    categorization of sales volumes, transforms raw numerical data into actionable
    insights, and allows for quick visual and analytical understanding of product
    category performance.


    Given the data in Table [8-4](#619961_1_En_8_Chapter.xhtml#Tab4), the `sales_data`
    table, it is possible to identify top-performing product categories, understand
    the distribution of sales across different product lines, and make informed decisions
    about inventory, marketing, and strategic planning.


    Table 8-4


    The sales_data Table


    | product_category | sale_amount | sale_date |

    | --- | --- | --- |

    | Electronics | 1500 | 2024-01-15 |

    | Clothing | 450 | 2024-01-16 |

    | Electronics | 2300 | 2024-01-17 |

    | Books | 750 | 2024-01-18 |

    | Clothing | 1100 | 2024-01-19 |

    | Electronics | 3200 | 2024-01-20 |

    | Books | 250 | 2024-01-21 |

    | Clothing | 600 | 2024-01-22 |

    | Electronics | 4500 | 2024-01-23 |

    | Books | 890 | 2024-01-24 |

    | Clothing | 1750 | 2024-01-25 |

    | Electronics | 5600 | 2024-01-26 |

    | Books | 330 | 2024-01-27 |

    | Clothing | 880 | 2024-01-28 |

    | Electronics | 6700 | 2024-01-29 |


    The following query demonstrates a structured approach to preparing sales data.
    It uses a subquery to calculate total sales per product category, providing a
    broad overview of sales distribution. A `CASE` statement categorizes these totals
    into sales volume tiers based on predefined thresholds, allowing flexible classification.
    Aggregate functions compute key metrics such as the number of sales, the average
    sales per category, and total sales. This makes the resulting dataset suitable
    for visualization and further analysis. By combining dynamic categorization and
    ordering by total sales, the query presents insights in a clear and meaningful
    format:


    ```sql

    SELECT

    product_category,

    CASE

    WHEN SUM(sale_amount) >= 10000 THEN ''High Volume''

    WHEN SUM(sale_amount) >= 5000 THEN ''Medium Volume''

    ELSE ''Low Volume''

    END AS sales_volume_category,

    COUNT(*) AS number_of_sales,

    AVG(sale_amount) AS average_sale,

    SUM(sale_amount) AS total_sales

    FROM sales_data

    GROUP BY product_category

    ORDER BY total_sales DESC;

    ```


    The results of this query are shown in Table [8-5](#619961_1_En_8_Chapter.xhtml#Tab5).


    Table 8-5


    The Structured Data Table (After Query Execution)


    | product_category | sales_volume_category | number_of_sales | average_sale |
    total_sales |

    | --- | --- | --- | --- | --- |

    | Electronics | High Volume | 6 | 3966.66 | 23800.00 |

    | Clothing | Low Volume | 5 | 956.00 | 4780.00 |

    | Books | Low Volume | 4 | 555.00 | 2220.00 |


    This query efficiently prepares structured data that can be used for meaningful
    insights. The computed fields—such as `sales_volume_category`, `number_of_sales`,
    `average_sale`, and `total_sales`—are key elements for data visualization. In
    the next stage, this data can be illustrated using various chart types: a *bar
    chart* can compare absolute values between categories; a *pie chart* shows the
    proportion of total sales per category, and a *scatterplot* can extend the data
    to explore relationships, such as between sales volume and frequency.'
