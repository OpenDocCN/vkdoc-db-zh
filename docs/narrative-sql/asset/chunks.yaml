    Their company hired Anna, a data analyst, to help them make sense of the data
    and provide meaningful insights to drive business decisions. The company collects
    data on car sales, customer demographics, pricing, and production. Anna needs
    to perform the following advanced data analysis in order to answer their key business
    questions. Anna is working with the `Car Sales` table, shown in Table [5-12](#619961_1_En_5_Chapter.xhtml#Tab12),
    which contains records of car sales, including the region, model name, sale date,
    and sales amount.


    Table 5-12


    The Car Sales Table


    | Sale_ID | Model_Name | Region | Sale_Date | Sales_Amount |

    | --- | --- | --- | --- | --- |

    | 1 | Speedster | North | 2024-01-01 | 25000 |

    | 2 | Cruiser | South | 2024-01-03 | 20000 |

    | 3 | Speedster | North | 2024-01-05 | 27000 |

    | 4 | Zoomer | East | 2024-01-07 | 30000 |

    | 5 | Speedster | West | 2024-01-10 | 28000 |

    | 6 | Cruiser | South | 2024-01-12 | 22000 |

    | 7 | Zoomer | North | 2024-01-15 | 26000 |

    | 8 | Speedster | South | 2024-01-17 | 29000 |


    Anna needs answers to the following questions.


    1.  How can they identify the order in which cars were sold in each region?


    2.  How can they rank car models by their total sales in each region?


    3.  How can they rank car models without skipping ranks when sales tie? (A sales
    tie occurs when two or more car models have the same number of sales within a
    specific region.)


    4.  How can they calculate the cumulative sales for each car model over time?


    5.  How can they calculate the moving average of sales over the last three sales
    for each model?


    6.  How can they calculate the total sales per region and rank the car models
    within each region?


    To find the answer to the first question, Anna uses `ROW_NUMBER()` to assign a
    unique rank to each sale in every region, ordered by sale date, to understand
    the sequence of sales.


    ```

    SELECT Sale_ID, Region, Model_Name,

    ROW_NUMBER() OVER (PARTITION BY Region ORDER BY Sale_Date) AS Sale_Rank

    FROM Car_Sales;

    ```


    The query is used to rank each sale of cars within a region, according to the
    sale date. The query retrieves four columns from the `Car_Sales` table: `Sale_ID`,
    `Region`, `Model_Name`, and a newly computed column called `Sale_Rank`, which
    is created using the `ROW_NUMBER()` window function. As the first step, `SELECT
    Sale_ID, Region, Model_Name` retrieves the unique sale identifier (`Sale_ID`),
    the region in which the car was sold (`Region`), and the model of the car (`Model_Name`)
    from the `Car_Sales` table. Then, `ROW_NUMBER() OVER (PARTITION BY Region ORDER
    BY Sale_Date)` uses the `ROW_NUMBER()` window function to assign a sequential
    row number (starting from 1) to each row within a specific partition. Anna uses
    `ROW_NUMBER()` to assign a unique rank to each sale in every region, ordered by
    sale date, to understand the sequence of sales. The partitioning is done by the
    `Region` column, meaning row numbers will be generated separately for each region.
    Within each region, the rows are ordered by `Sale_Date` in ascending order. This
    means the earliest sale will have row number 1, the second earliest sale will
    have 2, and so on. The calculated row number is given the alias `Sale_Rank` in
    the result set, `AS Sale_Rank`, representing the rank or sequence of each sale
    in its respective region.


    Note


    `PARTITION BY` is a clause used in window functions in SQL to divide a result
    set into smaller groups or partitions. A key difference between `PARTITION BY`
    and `GROUP BY` is that `PARTITION BY` doesn''t collapse the rows; it allows calculations
    to be performed within each partition while keeping all rows visible. `PARTITION
    BY` allows window functions to be applied separately to each partition.


    Results will include a list of sales ranked by their order of occurrence within
    the same region. For tracking sales sequences or identifying the first, second,
    and so on, sale within each region over time, this is particularly useful. Table
    [5-13](#619961_1_En_5_Chapter.xhtml#Tab13) shows the rank of each sale within
    its region.


    Table 5-13


    The Sales Sequence


    | Sale_ID | Region | Model_Name | Sale_Rank |

    | --- | --- | --- | --- |

    | 1 | North | Speedster | 1 |

    | 3 | North | Speedster | 2 |

    | 7 | North | Zoomer | 3 |

    | 2 | South | Cruiser | 1 |

    | 6 | South | Cruiser | 2 |

    | 8 | South | Speedster | 3 |

    | 4 | East | Zoomer | 1 |

    | 5 | West | Speedster | 1 |


    This query can be used to rank car models in each region based on their total
    sales:


    ```

    SELECT Model_Name, Region,

    RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC) AS Sales_Rank

    FROM Car_Sales

    GROUP BY Model_Name, Region;

    ```


    This query ranks car models based on their total sales within each region using
    a window function with `RANK()` and `PARTITION BY`. The query selects two columns,
    `Model_Name` and `Region`. Then, `RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount)
    DESC) AS Sales_Rank` uses the `RANK()` function to assign a rank to each car model
    within its region based on total sales. In this query, Anna uses `RANK()` to rank
