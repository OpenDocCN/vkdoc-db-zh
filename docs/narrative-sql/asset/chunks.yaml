    ## 索引与优化


    表 A-11 展示了 SQL 索引与性能优化技术，包括索引创建以及如 `EXPLAIN` 和 `ANALYZE` 等用于提升查询效率的分析工具。


    表 A-11： SQL 索引与性能优化技术


    | 概念 | 用途 | 基本语法 |

    | --- | --- | --- |

    | `CREATE INDEX` | 在一个或多个列上创建索引，以加快查询性能。 | `CREATE INDEX index_name ON table (column);`
    |

    | `DROP INDEX` | 从数据库中移除一个现有索引。 | `DROP INDEX index_name;` |

    | 查询性能建议 | 通过在 `WHERE` 子句中使用选择性列、避免 `SELECT *` 以及规范化数据来提高效率。 | `(最佳实践；非基于语法)`
    |

    | `EXPLAIN` | 显示 SQL 查询的执行计划，帮助分析性能。 | `EXPLAIN SELECT ... FROM table WHERE condition;`
    |

    | `ANALYZE` | 执行查询并提供详细的性能统计数据。 | `EXPLAIN ANALYZE SELECT ... FROM table WHERE
    condition;` |


    ## 存储过程与函数


    表 A-12 说明了 SQL 中存储过程和函数的用法，包括它们的创建、调用以及用于封装任务和返回值的示例用例。


    表 A-12： SQL 中存储过程与函数的用法


    | 概念 | 用途 | 基本语法 | 示例 |

    | --- | --- | --- | --- |

    | 创建存储过程 | 封装一系列 SQL 语句以执行任务。 | `CREATE PROCEDURE procedure_name() LANGUAGE plpgsql
    AS $$ BEGIN --语句 END; $$;` | `CREATE PROCEDURE log_action() LANGUAGE plpgsql AS
    $$ BEGIN INSERT INTO logs(action) VALUES (''test''); END; $$;` |

    | 调用存储过程 | 执行先前定义的存储过程。 | `CALL procedure_name();` | `CALL log_action();` |

    | 创建函数 | 返回一个值，可用于 SQL 表达式中。 | `CREATE FUNCTION function_name() RETURNS return_type
    LANGUAGE plpgsql AS $$ BEGIN RETURN value; END; $$;` | `CREATE FUNCTION add_numbers(a
    INT, b INT) RETURNS INT LANGUAGE plpgsql AS $$ BEGIN RETURN a + b; END; $$;` |

    | 使用函数 | 在查询或语句中调用该函数。 | `SELECT function_name();` | `SELECT add_numbers(3, 5);`
    |


    表 A-13 重点比较了不同数据库系统（MySQL、PostgreSQL、SQL Server 和 Oracle）中 SQL 方言的差异，展示了在自动递增、字符串函数、`NULL`
    处理和查询语法等特性上的不同。


    表 A-13： SQL 方言差异


    | 特性 | MySQL | PostgreSQL | SQL Server | Oracle |

    | --- | --- | --- | --- | --- |

    | 自动递增 | `AUTO_INCREMENT` | `SERIAL / BIGSERIAL` | `IDENTITY` | `SEQUENCE` 配合
    `NEXTVAL` |

    | 限制行数 | `LIMIT n` | `LIMIT n` | `TOP n` | `FETCH FIRST n ROWS ONLY (12c+)` |

    | `NULL` 处理 | `IFNULL(expr, value)` | `COALESCE(expr, value)` | `ISNULL(expr,
    value)` | `NVL(expr, value)` |

    | 字符串函数 | `LOWER(str), UPPER(str)` | `LOWER(str), UPPER(str)` | `LOWER(str), UPPER(str)`
    | `LOWER(str), UPPER(str)` |

    | 字符串连接 | `CONCAT(str1, str2) or ''str` |   | `str2''` | `''str1` |

    | 日期函数 | `CURDATE(), NOW()` | `CURRENT_DATE, CURRENT_TIMESTAMP` | `GETDATE(),
    GETUTCDATE()` | `SYSDATE, CURRENT_DATE` |

    | `SELECT` 中的子查询 | 支持 | 支持 | 支持 | 支持 |

    | 布尔数据类型 | `TINYINT(1) 或 BOOLEAN (别名)` | `BOOLEAN` | `BIT` | 使用 `NUMBER(1)` 或
    `CHAR(1)` 加约束 |

    | 大小写敏感性 | 取决于操作系统 | 大小写敏感 | 默认不区分大小写 | 默认不区分大小写 |

    | 连接语法 | 标准 SQL | 标准 SQL | 标准 SQL | 标准 SQL |


    如表 A-13 所示，此表对比了 MySQL、PostgreSQL、SQL Server 和 Oracle 之间关键 SQL 语法和行为的差异。对于自动递增列，MySQL
    使用`AUTO_INCREMENT`，PostgreSQL 使用`SERIAL`，SQL Server 使用`IDENTITY`，Oracle 使用`SEQUENCE`。行限制在
    MySQL/PostgreSQL 中使用`LIMIT`完成，在 SQL Server 中使用`TOP`完成。每个系统对于`NULL`处理和日期操作使用不同的函数。像`LOWER()`和`UPPER()`这样的字符串函数在所有系统中都很常见。子查询普遍得到支持。布尔类型各不相同——PostgreSQL
    支持`BOOLEAN`，而 SQL Server 使用`BIT`。大小写敏感性和`JOIN`语法相似，尽管大小写行为取决于系统或配置。


    ## PostgreSQL 速查表


    此 PostgreSQL 速查表提供了对 PostgreSQL 数据库中最常见 SQL 命令、函数和特性的简明实用参考。表 A-14 展示了基础 SQL 查询，涵盖了一系列操作，如选择、过滤、排序和条件检查，并附有其语法和用法示例。


