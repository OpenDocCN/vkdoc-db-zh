    还可以通过将复杂的多步聚合分解为可管理的步骤来简化它们。CTE 允许你创建一个可以在主查询中引用的临时结果集。CTE 的基本语法如下所示：


    ```

    WITH cte_name AS (

    SELECT column1, column2

    FROM table_name

    WHERE conditions

    )

    SELECT *

    FROM cte_name;

    ```


    在查询中，使用 `WITH` 子句定义一个 CTE（`cte_name`），从 `SELECT` 语句创建一个临时结果集以供稍后使用。可以在主查询中引用此结果（`SELECT
    * FROM cte_name`）。它简化并提高了查询的可读性。


    ### 示例：使用高级指标进行客户细分


    假设你想根据客户的总购买额将其分为高、中、低消费群体。可以先计算他们花费的总额，然后相应地分配到细分群体。


    ```

