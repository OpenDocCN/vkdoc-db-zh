  trans: '## 第一个故事：繁华都市中的繁忙健身房


    这个故事围绕一家在繁华都市中成功运营多年的繁忙健身房展开。健身房的数据分析师杰克帮助管理团队做出数据驱动的决策，以优化管理策略、提升客户满意度并增加盈利能力。健身房每天收集多种数据点，包括会员、课程、私教课程和整体客户活动信息。


    健身房有几种会员类型，包括基础、标准和高级会员。它提供瑜伽、普拉提和动感单车等多种健身课程，并拥有一支进行一对一私教课程的教练团队。健身房将所有这些数据存储在一个关系型数据库中。杰克需要处理以下数据表。


    第一张表是 `Members` 表，它包含健身房会员的信息，包括他们的会员类型。该表的图示见表 5-2。


    表 5-2

    会员表


    | 会员 _ID | 名 | 姓 | 会员类型 | 加入日期 | 出生日期 | 电话号码 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1 | John | Doe | Premium | 2023-01-10 | 1985-02-20 | 555-1234 |

    | 2 | Jane | Smith | Standard | 2022-08-15 | 1990-05-15 | 555-5678 |

    | 3 | Emily | Johnson | Basic | 2023-03-20 | 1992-09-05 | 555-8765 |

    | 4 | Michael | Brown | Premium | 2021-12-10 | 1988-11-23 | 555-4321 |

    | 5 | Sarah | Davis | Standard | 2023-06-01 | 1987-07-30 | 555-6543 |


    第二张表是 `Classes` 表，它包含关于健身房提供的不同课程的数据。表值见表 5-3。


    表 5-3

    课程表


    | 课程 _ID | 课程名称 | 教练 | 课程类型 | 时间安排 | 最大容量 |

    | --- | --- | --- | --- | --- | --- |

    | 1 | Yoga | Alice Green | Fitness | Mon 9:00 AM | 20 |

    | 2 | Pilates | Bob White | Fitness | Wed 7:00 PM | 15 |

    | 3 | Spinning | Carol Black | Cardio | Fri 6:00 PM | 25 |

    | 4 | Zumba | Dave Brown | Cardio | Sat 10:00 AM | 30 |

    | 5 | HIIT | Eve Silver | Strength | Tue 8:00 AM | 20 |


    如表 5-4 所示，`Attendance` 表记录了会员参加了哪些课程以及在什么日期参加。


    表 5-4

    出勤表


    | 出勤 _ID | 会员 _ID | 课程 _ID | 出勤日期 |

    | --- | --- | --- | --- |

    | 1 | 1 | 3 | 2023-08-18 |

    | 2 | 2 | 1 | 2023-08-19 |

    | 3 | 1 | 4 | 2023-08-20 |

    | 4 | 3 | 2 | 2023-08-20 |

    | 5 | 4 | 5 | 2023-08-21 |


    `Personal_Training_Sessions` 表记录了私教课程的详细信息，包括教练、会员、课程日期和时长，如表 5-5 所示。


    表 5-5

    私教课程表


    | 课程 _ID | 教练姓名 | 会员 _ID | 课程日期 | 时长 _ 分钟 |

    | --- | --- | --- | --- | --- |

    | 1 | Tom Harris | 1 | 2023-08-17 | 60 |

    | 2 | Nina Jordan | 2 | 2023-08-18 | 45 |

    | 3 | Mike Scott | 3 | 2023-08-19 | 30 |

    | 4 | Lisa White | 4 | 2023-08-19 | 60 |

    | 5 | Tom Harris | 5 | 2023-08-20 | 45 |


    最后一个表（见表 5-6）是 `Payments`，它记录了会员的所有付款，包括会员费、课程费和私教费。


    表 5-6

    付款表


    | 付款 _ID | 会员 _ID | 付款日期 | 金额 | 付款类型 |

    | --- | --- | --- | --- | --- |

    | 1 | 1 | 2023-08-01 | 50 | Membership Fee |

    | 2 | 2 | 2023-08-01 | 40 | Membership Fee |

    | 3 | 1 | 2023-08-18 | 20 | Class Fee (Spinning) |

    | 4 | 3 | 2023-08-19 | 60 | Personal Training Fee |

    | 5 | 4 | 2023-08-20 | 50 | Class Fee (HIIT) |


    杰克希望得到以下问题的答案。


    1.  按会员类型划分，会员的平均年龄是多少？

    2.  每位教练进行了多少次私教课程，这些课程的总时长是多少？

    3.  每种付款类型产生的总收入是多少？会员费、课程费和私教费都是付款类型。

    4.  每种类型的课程有多少会员参加，每门课程的总出勤次数是多少？

    5.  按会员类型划分，有多少会员至少参加过一门课程，每位会员平均参加的课程数量是多少？


    可以使用以下查询来计算不同会员类型会员的平均年龄：


    ```sql

    SELECT  Membership_Type, CAST(AVG(DATE_PART(''year'', AGE(CURRENT_DATE, Date_of_Birth)))
    AS INTEGER) AS Avg_Age

    FROM Members

    GROUP BY Membership_Type;

    ```


    在此查询中，`AGE(CURRENT_DATE, Date_of_Birth)` 函数计算当前日期 (`CURRENT_DATE`) 与个人出生日期 (`Date_of_Birth`)
    之间的差值。结果是一个表示个人年龄（年、月、日）的时间间隔。使用 `DATE_PART(''year'', AGE(...))`，你可以从 `AGE()`
    返回的间隔中获取年数，同时忽略月和日。这提供了个人以完整年份计算的年龄。`AVG(DATE_PART(...))` 是一个聚合函数，计算所有行中以年为单位的平均年龄。`CAST(...
    AS INTEGER)` 被使用是因为 `AVG()` 的结果可能有小数位，所以 `CAST(... AS INTEGER)` 将结果转换为整数。这会丢弃任何小数部分，并提供一个整数以便于阅读。通过了解各年龄段会员的典型年龄构成，健身房可以提供定制化的服务和营销。需要注意的是，`DATE_PART`
    和 `AGE` 函数是用于处理日期的标准 PostgreSQL 函数。`CURRENT_DATE` 和 `CAST` 的使用也是标准的。


    注意


    `AGE(timestamp1, timestamp2)` 函数计算两个日期或时间戳之间的差值，并将结果作为 `interval(年, 月, 日等)` 返回。需要注意的是，如果在
    `AGE(timestamp2)` 中只给出一个参数，PostgreSQL 会假定 `CURRENT_DATE` 是较近的日期。例如，`SELECT AGE(''2024-01-01'',
    ''1990-01-01'')` 返回从 1990 年 1 月 1 日到 2024 年 1 月 1 日的时间间隔，显示年龄类似 `34 years 0 months
    0 days`。另外，`DATE_PART()` 函数从日期或间隔中提取特定的 `part`（如年、月或日），`part` 是你想要提取的日期或间隔的一部分，例如年、月或日。`date`
    是你想要从中提取值的日期或间隔。例如，`SELECT DATE_PART(''year'', ''2024-09-22'')` 返回 `2024`，因为它从该日期中提取了年份。


    表 5-7 说明了基于会员类型的平均年龄计算。


    表 5-7

    基于会员类型的平均年龄


    | 会员类型 | 平均年龄 |

    | --- | --- |

    | Premium | 38 |

    | Standard | 36 |

    | Basic | 32 |


    通过以下查询，你可以发现一位私教进行了多少次课程以及每次课程花了多少时间，这些是评估教练工作量和绩效的重要指标。


    ```sql

    SELECT Trainer_Name,  COUNT(Session_ID) AS Total_Sessions, SUM(Duration_mins)
    AS Total_Duration

    FROM  Personal_Training_Sessions

    GROUP BY Trainer_Name;

    ```


    该查询通过计算每位教练进行的培训课程总数及其累计时长，提供了对每位私教表现的洞察。通过使用 `COUNT` 和 `SUM` 函数，你可以统计每位教练进行的课程次数，并计算在培训课程中花费的总分钟数。当按
    `Trainer_Name` 分组时，每位教练的计算是分开的。利用这些信息，可以管理工作量并评估教练在健身房的贡献。表 5-8 显示了每位教练的私教课程次数和时长。


    表 5-8

    每位教练的培训课程及其时长


    | 教练姓名 | 总课程数 | 总时长 |

    | --- | --- | --- |

    | Tom Harris | 2 | 105 |

    | Nina Jordan | 1 | 45 |

    | Mike Scott | 1 | 30 |

    | Lisa White | 1 | 60 |


    以下查询可以通过了解按付款类型划分的收入明细，帮助确定哪些服务对收入的贡献最大：


    ```sql

    SELECT Payment_Type, SUM(Amount) AS Total_Revenue

    FROM Payments

    GROUP BY Payment_Type;

    ```


    在此查询中，每种付款类型都是分开计算的。`SUM` 函数按 `Payment_Type` 分组汇总付款金额，包括会员费、课程费和私教费。如表 5-9 所示，这项分析使健身房管理层能够根据其主要收入来源，就定价策略、促销活动和资源分配做出明智的决策。


    表 5-9

    健身房的主要收入来源


    | 付款类型 | 总收入 |

    | --- | --- |

    | Membership Fee | 90.00 |

    | Class Fee (Spinning) | 20.00 |

    | Personal Training Fee | 60.00 |

    | Class Fee (HIIT) | 50.00 |


    要确定有多少会员参加了健身房的每门课程，可以使用以下查询：


    ```sql

    SELECT  C.Class_Name, COUNT(DISTINCT A.Member_ID) AS Number_of_Members, COUNT(A.Attendance_ID)
    AS Total_Attendances

    FROM  Attendance A

    JOIN Classes C ON A.Class_ID = C.Class_ID

    GROUP BY C.Class_Name;

    ```


    此查询为健身房提供的每门课程提供了两个关键指标。它们是至少参加过一节课的独立会员数量（通过 `COUNT(DISTINCT A.Member_ID))` 计算）和总出勤次数（通过
    `COUNT(A.Attendance_ID)` 计算）。为了将出勤记录与课程名称匹配，它将 `Attendance` 表与 `Classes` 表连接起来。当按
    `Class_Name` 对课程进行分组时，分析是针对每门课程单独进行的。如表 5-10 所示，健身房经理可以利用这些洞察来优化课程安排、更有效地分配资源，甚至根据会员偏好引入新课程。


    表 5-10

    每门课程的总出勤次数和会员数量


    | 课程名称 | 会员数量 | 总出勤次数 |

    | --- | --- | --- |

    | Spinning | 1 | 1 |

    | Yoga | 1 | 1 |

    | Zumba | 1 | 1 |

    | Pilates | 1 | 1 |

    | HIIT | 1 | 1 |


    可以使用以下嵌套查询来查找，按会员类型划分，至少参加过一门课程的会员数量，以及每位会员平均参加的课程数量。


    ```sql

    SELECT M.Membership_Type, COUNT(DISTINCT M.Member_ID) AS Members_Attended, CAST(AVG(Sub.Class_Attended)
    AS DECIMAL(10, 2)) AS Avg_Classes_Per_Member

    FROM Members M

    JOIN

    (SELECT Member_ID, COUNT(Attendance_ID) AS Class_Attended

    FROM Attendance

    GROUP BY Member_ID) Sub

    ON M.Member_ID = Sub.Member_ID

    GROUP BY M.Membership_Type;

    ```


    此嵌套查询旨在分析课程出勤情况，以确定会员参与度。第一步，子查询找出每位会员参加的课程数量。然后，在主查询中将结果连接到 `Members` 表，并按 `Membership_Type`
    对数据进行分组。这计算了每种会员类型的会员平均参加的课程数量。


    如前所述，嵌套查询是嵌入在其他查询中的查询。在此查询中，子查询通过选择 `Member_ID` 并计算 `Attendance` 表中 `Attendance_ID`
    的出现次数来计算每位会员参加的课程数量。之后，结果按 `Member_ID` 分组，给出会员列表及其各自的课程计数。然后给这个子查询一个别名 `Sub`，并在主查询中用于连接
    `Members` 表。因此，主查询可以访问会员数据并对其进行聚合，以得出洞察，例如每种会员类型中有多少会员至少参加过一门课程，以及他们平均参加了多少门课程。表
    5-11 显示了会员参与度，这对于了解每种会员类型的活跃程度很有用。这些洞察可用于定制健身房的服务或创建会员推广优惠。


    表 5-11

    基于会员类型的课程出勤分析


    | 会员类型 | 参与会员数 | 人均平均课程数 |

    | --- | --- | --- |

    | Premium | 2 | 1.5 |

    | Standard | 1 | 1 |

    | Basic | 1 | 1 |


    通过使用 SQL 的 `GROUP BY` 和聚合功能，这些查询揭示了关于健身房统计、参与度和收入的关键信息。下一节将讨论一个更高级的主题。'
- fmt: '## Advanced Aggregation Techniques: Multi-step Calculations


    This section discusses a more advanced topic, called `multi-step calculations`.


    ### Multi-step Calculations: The Basics


    For complex data analysis tasks requiring multiple calculation steps, subqueries
    and nested aggregations can be applied together. Subqueries can be used in various
    places within the main query, such as in a `SELECT`, `FROM`, or `WHERE` clause.
    Subqueries typically return temporary results that the main query can reference.
    In essence, you can break complex operations down into smaller, more manageable
    queries, which can be used to perform specific calculations for the main query.
    To achieve nested aggregation, subqueries are commonly used. Performing multiple
    levels of aggregation, namely processing or aggregating the result of one aggregation
    by another, is called `nested aggregation`. Subqueries are generally aggregated,
    and then another layer of aggregation is applied. The primary reason for using
    nested aggregations is to calculate metrics that require multi-step computations,
    such as group averages, rankings, or aggregated summaries. As a result, you can
    perform complex aggregations on datasets by making intermediate calculations.


    Assuming the previous story scenario, a busy gym in a bustling city, if you want
    to calculate the average number of classes attended by members, grouped by membership
    type, you need to break this down into two steps. First, you count the number
    of classes each member has attended, and then you calculate the average of those
    counts. The first aggregation is performed with a subquery, counting attendance
    per member, and the second aggregation, averaging counts across membership types,
    is performed with the outer query.


    ```sql

    SELECT M.Membership_Type, AVG(Sub.Class_Attended) AS Avg_Classes_Per_Member

    FROM Members M

    JOIN (SELECT Member_ID, COUNT(Attendance_ID) AS Class_Attended FROM Attendance
    GROUP BY Member_ID) AS Sub

    ON M.Member_ID = Sub.Member_ID

    GROUP BY M.Membership_Type;

    ```


    Here, the subquery `(SELECT Member_ID, COUNT(Attendance_ID) AS Class_Attended
    FROM Attendance GROUP BY Member_ID)` calculates the total number of classes each
    member has attended, and the outer query then performs a second aggregation, calculating
    the average `(AVG(Sub.Class_Attended))` number of classes attended by members
    within each membership type, grouping the data by `Membership_Type`.


    The advantages of combining subqueries and nested aggregation are that you get
    better modularity, flexibility, and complex analysis. Subqueries allow for modular
    code, where intermediate calculations can be separated from the main logic, making
    the query more readable and easier to debug. Also, using subqueries for nested
    aggregation offers flexibility to perform multiple levels of aggregation that
    are otherwise difficult to achieve in a single pass. Additionally, this leads
    to the creation of complex analyses like ranking, cumulative sums, and multi-step
    calculations, where one aggregation depends on another’s result.


    ### Using Window Functions for Aggregation


    The window function is a powerful SQL tool that allows you to perform calculations
    across sets of rows related to the current query row. Unlike traditional aggregation
    functions, such as `SUM()`, `COUNT()`, or `AVG()`, used with `GROUP BY`, window
    functions do not collapse rows into a single result. Instead, they provide a calculated
    value while maintaining the row structure.


    #### Window Function Definition


    Window functions operate on a set of rows called a “window,” which is defined
    by the `OVER()` clause. The `OVER()` clause specifies how rows should be grouped
    or partitioned and evaluated. By applying the window function to each row within
    the window, the result set is not collapsed. Window functions involve several
    key concepts that should be noted. Partitioning is the first concept. It is possible
    to divide the data into groups or “partitions” based on one or more columns by
    using the `PARTITION BY` clause. The second concept is ordering. With the `ORDER
    BY` clause, you can specify the order of rows within each partition. The last
    concept is framing. If you want to control which rows appear in the window, you
    can use the `ROWS` or `RANGE` options, but this is less commonly required for
    simple aggregations.


    A window function has the following basic syntax:


    ```sql

    <window_function>() OVER ( [PARTITION BY <partition_key>] [ORDER BY <order_key>]
    )

    ```


    Here, `<window_function>()` can be any SQL aggregate or ranking function, such
    as `SUM()`, `AVG()`, `COUNT()`, `ROW_NUMBER()`, `RANK()`, and so on. The `OVER()`
    clause specifies the “window” or the set of rows that the function should operate
    over. `PARTITION BY` divides the result set into partitions, similar to `GROUP
    BY`, and `ORDER BY` defines the order of rows within each partition.


    Also, the basic structure of a window function using the `ROWS` or `RANGE` options
    is as follows:


    ```sql

    <window_function>() OVER (

    PARTITION BY <partition_key>

    ORDER BY <order_key>

    {ROWS | RANGE} BETWEEN <start_bound> AND <end_bound>

    )

    ```


    Here, `ROWS` defines the window in terms of physical rows, and `RANGE` defines
    the window in terms of logical values (ranges of values). It is important to note
    that `ROWS` operates on a specific number of rows relative to the current row,
    and `RANGE` operates on a range of values (not necessarily consecutive rows).


    Note


    The `ORDER BY` clause in SQL is used to sort the result set of a query by one
    or more columns. This clause allows you to display the data alphabetically, numerically,
    or by date. This clause is introduced in the next chapter with more examples and
    stories. Briefly, it can be said that the basic syntax of `ORDER BY` is as follows:


    ```sql

    SELECT column_1, column_2

    FROM table_name

    ORDER BY column1 [ASC];

    ```


    `ORDER BY column1` specifies the column you want to sort by, and `ASC` means ascending
    the data from smallest to largest. In the absence of a specification, `ASC` order
    is the default. As well, `DESC` means sorting the data in descending order, from
    largest to smallest.'
