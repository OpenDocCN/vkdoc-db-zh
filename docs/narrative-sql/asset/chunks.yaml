    #### Using Aggregation Functions and ROW_NUMBER() Together


    In addition to calculating aggregated metrics like `SUM()` or `COUNT()` across
    partitions, you can also calculate details and ranks at a row-level.


    ##### Example: Count Orders Per Customer and Rank Sales


    To calculate the total number of sales for each client, rank each sale, and determine
    the total amount purchased for each client, you need to calculate the total number
    of sales.


    ```

    SELECT

    Customer_ID,

    COUNT(*) OVER (PARTITION BY Customer_ID) AS Total_Sales,

    SUM(Sale_Amount) OVER (PARTITION BY Customer_ID) AS Total_Purchases,

    ROW_NUMBER() OVER (PARTITION BY Customer_ID ORDER BY Sale_Date) AS Sale_Rank

    FROM Sales;

    ```


    `COUNT(*) OVER (PARTITION BY Customer_ID)` gives the total number of sales for
    each customer. `SUM(Sale_Amount) OVER (PARTITION BY Customer_ID)` calculates the
    total sales amount for each customer. `ROW_NUMBER()` ranks the sales in order
    of sale date. Table [5-22](#619961_1_En_5_Chapter.xhtml#Tab22) shows the total
    number of sales and the rank of each sale by customer.


