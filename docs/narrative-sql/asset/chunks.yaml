    other_table WHERE condition);` |


    ## 窗口函数


    表 A-19 描述了 SQL 窗口函数，包括 `ROW_NUMBER()` 和 `PARTITION BY`，以及常见的窗口函数如 `SUM()`、`AVG()`、`MIN()`、`MAX()`
    和 `COUNT()`。它还涵盖了排名函数，如 `RANK()`、`DENSE_RANK()`、`NTILE()`，以及用于访问前一行或后一行数据的 `LEAD()`
    和 `LAG()`。这些函数用于跨分区或有序结果集进行高级数据分析和计算。


    **表 A-19：窗口函数**


    | 类别 | 基本语法 |

    | --- | --- |

    | 行号 | `SELECT`<br>`  column1,`<br>`  ROW_NUMBER() OVER (ORDER BY column2) AS
    row_num`<br>`FROM table_name;` |

    | 按分区 | `SELECT`<br>`  column1,`<br>`  column2,`<br>`  ROW_NUMBER() OVER (PARTITION
    BY column1 ORDER BY column2) AS row_num`<br>`FROM table_name;` |

    | 常见窗口函数 | `SELECT`<br>`  column1,`<br>`  column2,`<br>`  SUM(column2) OVER (PARTITION
    BY column1) AS sum,`<br>`  AVG(column2) OVER (PARTITION BY column1) AS avg,`<br>`  MIN(column2)
    OVER (PARTITION BY column1) AS min,`<br>`  MAX(column2) OVER (PARTITION BY column1)
    AS max,`<br>`  COUNT(*) OVER (PARTITION BY column1) AS count`<br>`FROM table_name;`
    |

    | 排名函数 | `SELECT`<br>`  column1,`<br>`  column2,`<br>`  ROW_NUMBER() OVER (ORDER
    BY column2) AS row_num,`<br>`  RANK() OVER (ORDER BY column2) AS rank,`<br>`  DENSE_RANK()
    OVER (ORDER BY column2) AS dense_rank,`<br>`  NTILE(4) OVER (ORDER BY column2)
    AS quartile`<br>`FROM table_name;` |

    | 前导和滞后函数 | `SELECT`<br>`  column1,`<br>`  column2,`<br>`  LEAD(column2) OVER
    (ORDER BY column1) AS next_value,`<br>`  LAG(column2) OVER (ORDER BY column1)
    AS prev_value`<br>`FROM table_name;` |


    ## 日期和时间操作


    表 A-20 提供了用于处理日期和时间的 SQL 语法，涵盖检索当前日期和时间、执行日期运算、提取日期的特定组成部分以及格式化日期和时间值等操作。


    **表 A-20：日期和时间操作**


    | 类别 | 基本语法 |

    | --- | --- |

    | 当前日期和时间 | `SELECT CURRENT_DATE;`<br>-- 当前日期<br><br>`SELECT CURRENT_TIME;`<br>--
    当前时间<br><br>`SELECT CURRENT_TIMESTAMP;`<br>-- 当前日期和时间<br><br>`SELECT NOW();`<br>--
    当前时间戳 |

    | 日期/时间运算 | `SELECT date_column + INTERVAL ''1 day'';`<br>-- 加 1 天<br><br>`SELECT
    date_column + INTERVAL ''2 hours'';`<br>-- 加 2 小时<br><br>`SELECT date_column +
    INTERVAL ''3 months'';`<br>-- 加 3 个月<br><br>`SELECT date_column - INTERVAL ''1
    year'';`<br>-- 减 1 年 |

    | 日期/时间提取 | `SELECT EXTRACT(YEAR FROM date_column);`<br>-- 获取年份<br><br>`SELECT
    EXTRACT(MONTH FROM date_column);`<br>-- 获取月份<br><br>`SELECT EXTRACT(DAY FROM date_column);`<br>--
    获取日<br><br>`SELECT EXTRACT(HOUR FROM timestamp_column);`<br>-- 获取小时<br><br>`SELECT
    EXTRACT(DOW FROM date_column);`<br>-- 星期几 (0-6) |

    | 日期/时间格式化 | `SELECT TO_CHAR(date_column, ''YYYY-MM-DD'');`<br>-- 格式化日期<br><br>`SELECT
    TO_CHAR(timestamp_column, ''HH24:MI:SS'');`<br>-- 格式化时间 |'
