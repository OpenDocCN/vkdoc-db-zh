    skip numbers. If two models have the same sales, they will share the same rank,
    and the next model will be ranked right after (without gaps). A final step is
    to use `GROUP BY Model_Name, Region` to calculate the total sales for each model
    based on `SUM(Sales_Amount)`.


    As a result of the query, the ranking of car models is dense in each region based
    on their total sales, ensuring that no gaps exist in the rank numbers, even when
    there are ties among models. Table [5-15](#619961_1_En_5_Chapter.xhtml#Tab15)
    ranks car models without skipping ranks, even when there are ties in total sales.


