    | Social media feed | Loading posts in a user’s feed | Based on scroll count |
    10-20 | `SELECT * FROM posts``WHERE user_id = user_id ORDER BY post_date DESC
    LIMIT 10 OFFSET (scroll_count - 1) * 10;` | Loads a specific number of recent
    posts for the user’s feed. The query paginates by setting an offset based on the
    scroll count. |

    | News website | Displaying paginated news articles | Calculated per page | 5-15
    | `SELECT * FROM articles ORDER BY publish_date DESC LIMIT 10 OFFSET (page_number
    - 1) * 10;` | Fetches a page of articles ordered by the most recent publish date,
    adjusting for the specified `page_number`. |

    | Admin dashboard logs | Viewing logs or reports | By requested page | Configurable,
    20-100 | `SELECT * FROM logs``ORDER BY timestamp DESC LIMIT 50 OFFSET (page_number
    - 1) * 50;` | Loads log entries in descending timestamp order for an admin view,
    with each page containing 50 records, paginated by page number. |

    | File or data exports | Exporting data with pagination limits | Continuously
    updated | User-specified or 1,000 | `SELECT * FROM data ORDER BY record_id LIMIT
    1000 OFFSET (batch_number - 1) * 1000;` | Exports data in batches of 1,000 records;
    useful for large datasets. Adjusts the offset based on batch to maintain memory
    efficiency. |


    As shown in Table [6-2](#619961_1_En_6_Chapter.xhtml#Tab2), each query is designed
    to handle large datasets efficiently by using `LIMIT` and `OFFSET` to control
    data retrieval. This is done to ensure smooth user experiences across various
    applications.


    Note


    Expressions like `(page_number - 1) * page_size` are commonly used to calculate
    the starting point, or the *offset*, for paginated data. In general, `page_number
    - 1` adjusts for the fact that pages typically start at 1 (e.g., Page 1, Page
    2, etc.), but data offsets start at 0\. By subtracting 1, you align the page number
    with the data index. Also, `page_size` multiplies the adjusted page number by
    the number of records desired per page (`page_size`). This shifts each page forward
    by exactly one page''s worth of records. For example, if `page_size` is `10`:


    *   Page 1’s offset is `(1 - 1) * 10 = 0` (starts at the first record).


    *   Page 2’s offset is `(2 - 1) * 10 = 10` (starts at the 11th record).


    In database queries, this approach is widely used to navigate data in manageable
    portions.


    `OFFSET` can generally impact performance for large datasets, as it skims rows
    internally. For large offsets, it is better to consider indexed pagination, which
    is introduced in Chapter [9](#619961_1_En_9_Chapter.xhtml).'
  trans: '# 使用 OFFSET 和 LIMIT 进行分页


    对于像 Web 应用程序这样的用户界面，分页对于高效显示数据至关重要，它将大型数据集划分为较小的块。想象浏览一个包含数千种商品的目录——每页查看 10 或
    20 个项目比一次性加载整个列表要容易得多。SQL 中的 `OFFSET` 和 `LIMIT` 子句就用于分页。`OFFSET` 指定了检索的起始点，而 `LIMIT`
    指定了要检索多少行。这意味着在 `LIMIT` 子句生效之前，用户可以跳过指定数量的行。通常，PostgreSQL、MySQL 和 SQLite 都支持 `OFFSET`。其他数据库如
    SQL Server 和 Oracle 则使用不同的方法，包括 `TOP`、`ROWNUM` 或 `OFFSET-FETCH`。


    **注意**


    使用 `OFFSET` 子句时，结果集会在返回任何内容之前跳过指定数量的行。除了分页，这还允许您跳转到数据集内的任何位置，从给定的索引开始。


    以下是关于 `OFFSET` 和 `LIMIT` 如何工作的简要说明。


    ```sql

    SELECT column1, column2, ...

    FROM table_name

    ORDER BY column_name [ASC | DESC]

    LIMIT number_of_rows OFFSET start_position;

    ```


    如前所述，`LIMIT` 子句决定了要显示的行数。`OFFSET` 指定了在应用 `LIMIT` 之前应跳过多少行。在大多数情况下，`start_position`
    是基于当前页码和每页行数计算的。表 6-2 说明了如何在 PostgreSQL 中使用 `OFFSET` 和 `LIMIT` 进行分页。


    ### 表 6-2：用于分页的 OFFSET 和 LIMIT


    | 场景 | 常见用途 | OFFSET | LIMIT | 查询语句 | 描述 |

    | --- | --- | --- | --- | --- | --- |

    | 电子商务产品列表 | 为用户浏览产品进行分页 | 根据页码变化 | 通常为 10-50 | `SELECT * FROM products ORDER
    BY product_id LIMIT 20 OFFSET (page_number - 1) * 20;` | 这里，表达式 `(page_number
    - 1) * 20` 计算分页中每页的起始点 (`OFFSET`)。通过从 `page_number` 减去 1，该公式确保第一页的偏移量为 0，而每后续一页起始位置向后移动
    20 条记录。 |

    | 社交媒体信息流 | 在用户信息流中加载帖子 | 基于滚动次数 | 10-20 | `SELECT * FROM posts WHERE user_id
    = user_id ORDER BY post_date DESC LIMIT 10 OFFSET (scroll_count - 1) * 10;` |
    为用户信息流加载特定数量的最新帖子。该查询通过基于滚动次数设置偏移量来实现分页。 |

    | 新闻网站 | 显示分页的新闻文章 | 按页计算 | 5-15 | `SELECT * FROM articles ORDER BY publish_date
    DESC LIMIT 10 OFFSET (page_number - 1) * 10;` | 获取按最新发布日期排序的一页文章，并根据指定的 `page_number`
    调整。 |

    | 管理员仪表盘日志 | 查看日志或报告 | 按请求的页码 | 可配置，20-100 | `SELECT * FROM logs ORDER BY timestamp
    DESC LIMIT 50 OFFSET (page_number - 1) * 50;` | 以时间戳降序加载日志条目供管理员查看，每页包含 50 条记录，按页码分页。
    |

    | 文件或数据导出 | 带分页限制地导出数据 | 持续更新 | 用户指定或 1,000 | `SELECT * FROM data ORDER BY record_id
    LIMIT 1000 OFFSET (batch_number - 1) * 1000;` | 以每批 1000 条记录导出数据；对于大型数据集很有用。根据批次调整偏移量以维持内存效率。
    |


    如表 6-2 所示，每个查询都旨在通过使用 `LIMIT` 和 `OFFSET` 来控制数据检索，从而高效处理大型数据集。这样做是为了确保各种应用程序都能拥有流畅的用户体验。


    **注意**


    像 `(page_number - 1) * page_size` 这样的表达式通常用于计算分页数据的起始点或偏移量。一般来说，`page_number -
    1` 调整了页面通常从 1 开始（例如，第 1 页、第 2 页等）但数据偏移量从 0 开始的事实。通过减去 1，您使页码与数据索引对齐。此外，`page_size`
    将调整后的页码乘以每页所需的记录数 (`page_size`)。这将每页准确地向前移动一页的记录量。例如，如果 `page_size` 为 `10`：


    *   第 1 页的偏移量是 `(1 - 1) * 10 = 0`（从第一条记录开始）。

    *   第 2 页的偏移量是 `(2 - 1) * 10 = 10`（从第 11 条记录开始）。


    在数据库查询中，这种方法被广泛用于以可管理的部分导航数据。


    `OFFSET` 通常会影响大型数据集的性能，因为它在内部会掠过行。对于较大的偏移量，最好考虑使用索引分页，这将在第 9 章中介绍。'
- fmt: "## The First Story: Highway Construction and a Traffic Situation\n\nWhen a\
    \ new highway was constructed in a bustling city, a talented data analyst named\
    \ Pedro was called to investigate the impact on traffic. City council members\
    \ were eager to determine whether the highway had reduced traffic issues as planned.\
    \ Pedro uses a dataset containing vehicle counts, travel times, and congestion\
    \ levels on the main routes. With this data, Pedro planned to identify trends,\
    \ compare changes, and determine if the highway had brought the relief the city\
    \ so badly needed. His journey began with defining queries that would reveal hidden\
    \ patterns and insights to inform council future decisions. These are the questions\
    \ Pedro seeks answers to:\n\n1.  What were the top five most congested routes\
    \ before and after the highway’s construction?\n2.  How did the average travel\
    \ time change for routes before and after the highway was built?\n3.  What routes\
    \ show significant traffic flow improvements based on the data time provided on\
    \ the dataset?\n4.  How has the highway impacted routes that were previously highly\
    \ congested? Are they still among the top congested routes post-construction?\n\
    \nPedro uses two tables to compare traffic conditions before and after the highway\
    \ was constructed. These tables include fields that can help answer the analysis\
    \ questions provided earlier.\n\nTable 6-3 contains traffic data before the highway\
    \ was constructed. It includes information on specific routes, vehicle counts,\
    \ average travel times, and congestion levels, allowing Pedro to assess baseline\
    \ conditions.\n\n**Table 6-3**\nThe `TrafficData_Before` Table\n\n| Route_ID |\
    \ Route_Name | Vehicle_Count | Avg_Travel_Time | Congestion_Level | Data_Date\
    \ |\n| --- | --- | --- | --- | --- | --- |\n| 1 | Valley Road | 2500 | 45 min\
    \ | High | 2022-06-01 |\n| 2 | Riverside Ave | 1800 | 38 min | Moderate | 2022-06-01\
    \ |\n| 3 | Main Street | 3000 | 50 min | High | 2022-06-01 |\n| 4 | 5th Avenue\
    \ | 2200 | 40 min | High | 2022-06-01 |\n| 5 | Oakwood Blvd | 1600 | 35 min |\
    \ Moderate | 2022-06-01 |\n| 6 | Park Lane | 1300 | 30 min | Low | 2022-06-01\
    \ |\n| 7 | Maple Drive | 1700 | 32 min | Low | 2022-06-01 |\n| 8 | Birch Street\
    \ | 1900 | 42 min | Moderate | 2022-06-01 |\n| 9 | Sunset Blvd | 2800 | 48 min\
    \ | High | 2022-06-01 |\n| 10 | Cedar Road | 2100 | 37 min | Moderate | 2022-06-01\
    \ |\n\nTable 6-4 records traffic data for the same routes after the highway’s\
    \ construction. It includes updated vehicle counts, average travel times, and\
    \ congestion levels. Pedro will use this data to determine the improvement in\
    \ traffic flow.\n\n**Table 6-4**\nThe `TrafficData_After` Table\n\n| Route_ID\
    \ | Route_Name | Vehicle_Count | Avg_Travel_Time | Congestion_Level | Data_Date\
    \ |\n| --- | --- | --- | --- | --- | --- |\n| 1 | Valley Road | 2000 | 30 min\
    \ | Moderate | 2023-06-01 |\n| 2 | Riverside Ave | 1500 | 28 min | Low | 2023-06-01\
    \ |\n| 3 | Main Street | 2500 | 40 min | Moderate | 2023-06-01 |\n| 4 | 5th Avenue\
    \ | 1800 | 35 min | Moderate | 2023-06-01 |\n| 5 | Oakwood Blvd | 1400 | 25 min\
    \ | Low | 2023-06-01 |\n| 6 | Park Lane | 1200 | 27 min | Low | 2023-06-01 |\n\
    | 7 | Maple Drive | 1600 | 29 min | Low | 2023-06-01 |\n| 8 | Birch Street | 1700\
    \ | 31 min | Moderate | 2023-06-01 |\n| 9 | Sunset Blvd | 2300 | 37 min | Moderate\
    \ | 2023-06-01 |\n| 10 | Cedar Road | 1900 | 32 min | Moderate | 2023-06-01 |\n\
    \nIn order to get insight into of traffic conditions before and after the construction\
    \ of the highway, Pedro analyzed this data.\n\n### Finding Top Congested Routes\n\
    \nThe following query aims to find the top five most congested routes before and\
    \ after the highway was built. Pedro crafted two SQL queries: one for the `TrafficData_Before`\
    \ table and another for the `TrafficData_After` table. These tables held data\
    \ from different time periods, but Pedro ensured that both queries shared the\
    \ exact same structure, allowing him to directly compare the results:\n\n```sql\n\
    -- Top 5 most congested routes before the highway construction\nSELECT Route_Name,\
    \ Vehicle_Count, Avg_Travel_Time, Congestion_Level\nFROM TrafficData_Before\n\
    ORDER BY Congestion_Level DESC, Vehicle_Count DESC\nLIMIT 5;\n-- Top 5 most congested\
    \ routes after the highway construction\nSELECT Route_Name, Vehicle_Count, Avg_Travel_Time,\
    \ Congestion_Level\nFROM TrafficData_After\nORDER BY Congestion_Level DESC, Vehicle_Count\
    \ DESC\nLIMIT 5;\n```\n\nBoth queries order the data by `Congestion_Level`, where\
    \ `High` is more congested than `Moderate` or `Low`. He then ordered the data\
    \ by `Vehicle_Count` in descending order to find the most heavily trafficked routes.\
    \ It is possible to restrict the results to only the top five congested routes\
    \ by specifying `LIMIT 5`.\n\nIt should be noted that, when using the `ORDER BY`\
    \ clause in SQL, certain values have a particular order if they are recognized.\
    \ Here, due to the alphabetical order of H, M, and L, `High` will come before\
    \ `Moderate`, and `Moderate` will come before `Low`. For this reason, the upper\
    \ query works properly. But where it is necessary to define a specific order,\
    \ queries must be written differently. The `CASE` statement can be used to explicitly\
    \ specify the order. To define congestion levels from `High` to `Moderate` to\
    \ `Low`, consider the following query:\n\n```sql\nSELECT Route_Name, Vehicle_Count,\
    \ Avg_Travel_Time, Congestion_Level\nFROM TrafficData_After\nORDER BY\n    CASE\n\
    \        WHEN Congestion_Level = 'High' THEN 1\n        WHEN Congestion_Level\
    \ = 'Moderate' THEN 2\n        WHEN Congestion_Level = 'Low' THEN 3\n    END,\n\
    \    Vehicle_Count DESC\nLIMIT 5;\n```\n\nAs a result, each congestion level has\
    \ a numerical value. `High` has the highest priority (1), followed by `Moderate`\
    \ (2), and then `Low` (3). This method ensures that the desired order is achieved\
    \ regardless of the sorting method.\n\n**Note**\nIn most comparative analyses,\
    \ using the same query structure on different datasets is a common and effective\
    \ method because it allows direct comparison of results across different time\
    \ periods or conditions. By maintaining a similar query structure, analysts ensure\
    \ that data variations are due to data itself, rather than logical differences\
    \ in the query. As a result of this method, findings are more reliable and valid,\
    \ since this method reduces the potential for unintentional bias.\n\nTable 6-5\
    \ shows the top five most congested routes before the highway was built, with\
    \ Main Street having the highest traffic volume and congestion.\n\n**Table 6-5**\n\
    Congested Routes Before Construction\n\n| Route_Name | Vehicle_Count | Avg_Travel_Time\
    \ | Congestion_Level |\n| --- | --- | --- | --- |\n| Main Street | 3000 | 50 min\
    \ | High |\n| Valley Road | 2500 | 45 min | High |\n| Sunset Blvd | 2800 | 48\
    \ min | High |\n| 5th Avenue | 2200 | 40 min | High |\n| Riverside Ave | 1800\
    \ | 38 min | Moderate |\n\nTable 6-6 shows the top five most congested routes\
    \ after the highway construction, indicating a reduction in congestion and travel\
    \ times.\n\n**Table 6-6**\nCongested Routes After Construction\n\n| Route_Name\
    \ | Vehicle_Count | Avg_Travel_Time | Congestion_Level |\n| --- | --- | --- |\
    \ --- |\n| Main Street | 2500 | 40 min | Moderate |\n| Sunset Blvd | 2300 | 37\
    \ min | Moderate |\n| Valley Road | 2000 | 30 min | Moderate |\n| 5th Avenue |\
    \ 1800 | 35 min | Moderate |\n| Cedar Road | 1900 | 32 min | Moderate |\n\n###\
    \ Analyzing Average Travel Time Changes\n\nThe following query finds the average\
    \ travel time change before and after the highway was built. By performing these\
    \ queries, Pedro can calculate the average travel time for all paths before and\
    \ after the highway was constructed, which will help him determine if there has\
    \ been a noticeable improvement in the travel time throughout the city.\n\n```sql\n\
    -- Average travel time before construction\nSELECT AVG(CAST(SUBSTRING(Avg_Travel_Time\
    \ FROM '^[0-9]+') AS INT)) AS Avg_Travel_Time_Before FROM TrafficData_Before;\n\
    -- Average travel time after construction\nSELECT AVG(CAST(SUBSTRING(Avg_Travel_Time\
    \ FROM '^[0-9]+') AS INT)) AS Avg_Travel_Time_After FROM TrafficData_After;\n\
    ```\n\nThe queries use `casting` to convert `Avg_Travel_Time` values from strings\
    \ style like `'30 min'` to integers. This conversion is essential because the\
    \ `AVG` function requires numerical input to compute the average. By extracting\
    \ the numeric portion of the travel time and converting it to an integer, Pedro\
    \ can effectively analyze the data and draw meaningful conclusions about the impact\
    \ of the highway on travel times.\n\nTables 6-7 and 6-8 show the average travel\
    \ times across all routes before and after the highway construction, showing a\
    \ significant reduction in travel time post-construction.\n\n**Table 6-7**\nThe\
    \ Average Travel Times Across All Routes (Before)\n\n| Avg_Travel_Time_Before\
    \ |\n| --- |\n| 39.7 |\n\n**Table 6-8**\nThe Average Travel Times Across All Routes\
    \ (After)\n\n| Avg_Travel_Time_After |\n| --- |\n| 31.4 |\n\n### Identifying Routes\
    \ with Significant Improvements\n\nThis query is provided to find traffic flow\
    \ improvements based on the data time provided in the dataset:\n\n```sql\nSELECT\
    \ Route_Name, Vehicle_Count, Avg_Travel_Time, Congestion_Level\nFROM TrafficData_After\n\
    WHERE Data_Date BETWEEN '2023-05-01' AND '2023-06-01'\nORDER BY Avg_Travel_Time\
    \ ASC\nLIMIT 5;\n```\n\nThis query filters data from the specific range of `'2023-05-01'`\
    \ to `'2023-06-01'` and sorts by `Avg_Travel_Time` in ascending order to find\
    \ routes with shorter travel times, indicating improved traffic flow. `LIMIT 5`\
    \ restricts the output to the top five routes with the best improvements.\n\n\
    Table 6-9 shows routes with the most improved travel times over the mentioned\
    \ 30 days, with routes like Oakwood Blvd and Park Lane experiencing the shortest\
    \ travel times and lowest congestion levels.\n\n**Table 6-9**\nRoutes with the\
    \ Most Improved Travel Times\n\n| Route_Name | Vehicle_Count | Avg_Travel_Time\
    \ | Congestion_Level |\n| --- | --- | --- | --- |\n| Oakwood Blvd | 1400 | 25\
    \ min | Low |\n| Park Lane | 1200 | 27 min | Low |\n| Riverside Ave | 1500 | 28\
    \ min | Low |\n| Maple Drive | 1600 | 29 min | Low |\n| Valley Road | 2000 | 30\
    \ min | Moderate |\n\n### Checking Previously Congested Routes\n\nTo find the\
    \ impacted routes that were previously highly congested and see if they are still\
    \ among the top congested routes post-construction, Pedro used the following query:\n\
    \n```sql\nSELECT Route_Name, Congestion_Level\nFROM TrafficData_Before\nWHERE\
    \ Congestion_Level = 'High'\nUNION\nSELECT Route_Name, Congestion_Level\nFROM\
    \ TrafficData_After\nWHERE Congestion_Level = 'High';\n```\n\nThis query combines\
    \ routes with a `High` congestion level from before and after the highway construction.\
    \ The `UNION` operator displays routes that were previously very busy and indicates\
    \ if they remain busy.\n\n**Note**\nThe `UNION` operator is used to combine the\
    \ results of two or more `SELECT` queries into a single result set. Each `SELECT`\
    \ statement within a `UNION` must have the same number of columns in the same\
    \ order and with compatible data types. When using `UNION`, only unique rows are\
    \ returned, so any duplicate rows between the queries will be removed automatically.\
    \ To retain duplicates, you can use `UNION ALL`. Other set operators in PostgreSQL,\
    \ including `UNION`, `UNION ALL`, `INTERSECT`, `INTERSECT ALL`, `EXCEPT`, and\
    \ `EXCEPT ALL`, are discussed in the next chapters.\n\nTable 6-10 shows routes\
    \ with a high congestion level before the highway was built and indicates if any\
    \ remain highly congested after construction; none remain `High` post-construction,\
    \ indicating an improvement.\n\n**Table 6-10**\nRemain Highly Congested Routes\
    \ After Construction\n\n| Route_Name | Congestion_Level |\n| --- | --- |\n| Main\
    \ Street | High |\n| Valley Road | High |\n| Sunset Blvd | High |\n\nPedro used\
    \ SQL to analyze traffic data before and after highway construction. Through careful\
    \ sorting, filtering, and pagination of large datasets, Pedro produced insights\
    \ that demonstrated an improvement in overall traffic conditions. His analysis\
    \ provided city officials with clear evidence that the highway had achieved its\
    \ goal of alleviating congestion. This validated the city’s investment and set\
    \ a data-driven standard for future infrastructure projects."
