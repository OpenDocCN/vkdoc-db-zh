    # 11. The Grand Finale: Presenting Your Data Story


    Your journey is nearing its end. The journey continued throughout each chapter
    with stories involving data analysis using SQL queries. Through chapter-by-chapter
    stories, you have learned how to extract deeper insights and information from
    raw data to address complex and advanced analytical questions. This chapter aims
    to summarize the previous chapters and provide insight into presenting a narrative
    for data analysis. Up until this chapter, the chapters contributed to teaching
    data analysis and SQL query writing through narratives. However, this chapter
    focuses more on providing a mindset for readers who have acquired sufficient query
    writing skills in data analysis.


    ## The Art of Data Storytelling


    Storytelling in data analysis is the practice of presenting data-driven insights
    in a compelling and understandable way. Instead of just showing raw numbers, tables,
    or charts, storytelling helps communicate what the data means and why it matters.
    It turns complex findings into a narrative that people can relate to, making it
    easier to understand trends, patterns, and conclusions. Data storytelling consists
    of four essential components: data, narrative, visuals, and actionable insights.
    Data consists of facts, numbers, and statistical results, which provide the foundation
    for storytelling. Narrative is a structured explanation that gives context to
    the data, making it meaningful. Visuals like graphs, charts, and dashboards support
    and enhance the story. Lastly, actionable insights are conclusions that guide
    decision-making or strategic planning.


    ### The Importance of Query Writing for Storytelling in Data Analysis


    In data storytelling, SQL plays a crucial role in extracting, transforming, and
    analyzing data to create meaningful narratives. Well-written SQL queries allow
    analysts to retrieve relevant data efficiently, uncover insights, and present
    findings in a structured manner. Without strong query-writing skills, data storytelling
    lacks accuracy, depth, and clarity.


    #### Extracting the Right Data for a Story


    The foundation of storytelling in data analysis starts with retrieving relevant
    and accurate data. SQL enables analysts to filter and organize data, ensuring
    that only the necessary information is included in the analysis. Table [11-1](#619961_1_En_11_Chapter.xhtml#Tab1)
    provides a structured table summarizing SQL statements, clauses, operations, and
    functions used to extract the right data for storytelling.


    Table 11-1


    SQL Statements, Clauses, Operations, and Functions Used to Extract the Right Data
    for Storytelling


    | Category | SQL Components | Purpose |

    | --- | --- | --- |

    | SQL statements | `SELECT` | Retrieves specific data from tables |

    | `FROM` | Specifies the table(s) to query |

    | `WHERE` | Filters data based on conditions |

    | `GROUP BY` | Aggregates data by specific columns |

    | `ORDER BY` | Sorts results in ascending or descending order |

    | `JOIN` | Combines data from multiple tables |

    | `LIMIT` | Restricts the number of returned rows |

    | `HAVING` | Filters aggregated results |

    | SQL clauses | `DISTINCT` | Removes duplicate values |

    | `AS` | Renames columns for better readability |

    | `IN / NOT IN` | Matches values in a specified list |

    | `BETWEEN` | Filters data within a range |

    | `LIKE` | Searches for patterns in text |

    | SQL operations | Arithmetic (+, -, *, /) | Performs mathematical calculations
    |

    | Comparison (=, >, <, >=, <=, <>) | Compares values |

    | Logical (AND, OR, NOT) | Combines multiple conditions for filtering |

    | Aggregate functions | `COUNT()` | Counts the number of rows |

    | `SUM()` | Calculates the total sum of values |

    | `AVG()` | Computes the average of a column |

    | `MIN()` / `MAX()` | Finds smallest or largest values |

    | String functions | `UPPER() / LOWER()` | Converts text to uppercase or lowercase
    |

    | `SUBSTRING()` | Extracts part of a string |

    | `TRIM()` | Removes extra spaces from text |

    | Date functions | `NOW()` | Returns the current timestamp |

    | `DATE_TRUNC()` | Rounds date/time values to a specified level |

    | `EXTRACT()` | Retrieves year, month, or day from a date |


    Data storytelling relies on SQL to extract and shape precise data from databases.
    As explained in Chapters [2](#619961_1_En_2_Chapter.xhtml)-[6](#619961_1_En_6_Chapter.xhtml),
    SQL statements like `SELECT` and `FROM` identify the desired data columns and
    their source tables, respectively. Filtering is achieved using `WHERE` for row-level
    conditions and `HAVING` for conditions on aggregated results produced by `GROUP
    BY`. Data arrangement is handled by `ORDER BY` for sorting, while `JOIN` integrates
    data from multiple tables. `LIMIT` controls output volume.


    Further refinement comes from SQL clauses. `DISTINCT` ensures uniqueness in results,
    `AS` renames columns for clarity, and clauses like `IN`, `NOT IN`, `BETWEEN`,
    and `LIKE` offer powerful pattern-matching and range-filtering capabilities. SQL
    operations, including arithmetic (+, -, *, /), comparison (=, >, <), and logical
    (`AND`, `OR`, `NOT`), allow for calculations and complex conditional logic within
    queries. As discussed in detail in Chapters [5](#619961_1_En_5_Chapter.xhtml)
    and [10](#619961_1_En_10_Chapter.xhtml), aggregate functions such as `COUNT()`,
    `SUM()`, `AVG()`, `MIN()`, and `MAX()` are critical for summarizing data insights.
    Additionally, string functions like `UPPER()`, `SUBSTRING()`, and `TRIM()` and
    date functions like `NOW()`, `DATE_TRUNC()`, and `EXTRACT()` facilitate text manipulation
    and temporal analysis, ensuring the retrieved data effectively supports the narrative.'
  trans: '

    ## 测试你的技能


    Emma 是学者学院的一名数据分析师，该校不同年级的学生参加一年一度的“卓越竞赛”。学校管理层需要了解学生在不同科目和类别的表现。他们要求 Emma 根据表
    10-31 中的数据回答以下问题：


    **表 10-31**


    `competition_results`（竞赛结果）表


    | student_id | 姓名 | 年级 | 科目 | 分数 | 竞赛年份 |

    | --- | --- | --- | --- | --- | --- |

    | 101 | Alice | 9 | 数学 | 92 | 2024 |

    | 102 | Bob | 10 | 科学 | 78 | 2024 |

    | 103 | Charlie | 9 | 数学 | 85 | 2024 |

    | 104 | David | 11 | 文学 | 65 | 2024 |

    | 105 | Emma | 10 | 科学 | 88 | 2024 |


    1.  哪些学生在每个科目中表现最佳，并在他们的年级内进行排名？

    2.  每个科目的平均分是多少？不同年级之间如何比较？

    3.  百分之多少的学生分数高于 90 分（优秀）以及低于 50 分（待提高）？

    4.  学生在核心科目（数学、科学）的分数在不同竞赛年份中有何变化？

    5.  与去年的竞赛相比，有多少比例的学生在同一科目上提高了分数？

    6.  哪些学生在所有科目中的总分最高？

    7.  每个年级有多少学生参加，每个年级的中位数分数是多少？

    8.  每个科目的最高分、最低分和平均分是多少？

    9.  是否可以创建一个函数，根据学生的表现水平（优秀、良好、平均、待提高）对他们进行分类？


    ## 11. 最终章：呈现你的数据故事


    你的旅程即将结束。整个旅程贯穿了每一章，包含了使用 SQL 查询进行数据分析的故事。通过一章又一章的故事，你已经学会了如何从原始数据中提取更深层次的见解和信息，以解决复杂和高级的分析问题。本章旨在总结前面的章节，并为呈现数据分析叙事提供见解。在本章之前，各章主要通过叙事来教授数据分析和
    SQL 查询编写。然而，本章更侧重于为已掌握足够查询编写技能的读者提供一种数据分析的思维方式。


    ### 数据故事讲述的艺术


    数据分析中的故事讲述，是以一种引人入胜且易于理解的方式呈现数据驱动的见解的实践。不仅仅是展示原始数字、表格或图表，故事讲述有助于传达数据的含义及其重要性。它将复杂的发现转化为人们能够产生共鸣的叙事，从而更容易理解趋势、模式和结论。数据故事讲述包含四个基本要素：数据、叙事、可视化和可操作的见解。数据由事实、数字和统计结果组成，为故事讲述提供了基础。叙事是结构化的解释，为数据提供背景，使其具有意义。像图表、图形和仪表板这样的可视化元素支持并强化了故事。最后，可操作的见解是指导决策或战略规划的结论。


    #### 查询编写对于数据故事讲述的重要性


    在数据故事讲述中，SQL 在提取、转换和分析数据以创建有意义的叙述方面扮演着至关重要的角色。编写良好的 SQL 查询能让分析师高效地检索相关数据、发掘见解，并以结构化的方式呈现发现。如果没有强大的查询编写技能，数据故事讲述就会缺乏准确性、深度和清晰度。


    ##### 为故事提取正确的数据


    数据分析中的故事讲述始于检索相关且准确的数据。SQL 使分析师能够筛选和组织数据，确保分析中只包含必要的信息。表 11-1 提供了一个结构化表格，总结了用于为故事讲述提取正确数据的
    SQL 语句、子句、操作和函数。


    **表 11-1**


    用于为故事讲述提取正确数据的 SQL 语句、子句、操作和函数


    | 类别 | SQL 组件 | 用途 |

    | --- | --- | --- |

    | SQL 语句 | `SELECT` | 从表中检索特定数据 |

    | | `FROM` | 指定要查询的表 |

    | | `WHERE` | 根据条件筛选数据 |

    | | `GROUP BY` | 按特定列聚合数据 |

    | | `ORDER BY` | 以升序或降序对结果排序 |

    | | `JOIN` | 组合来自多个表的数据 |

    | | `LIMIT` | 限制返回的行数 |

    | | `HAVING` | 筛选聚合后的结果 |

    | SQL 子句 | `DISTINCT` | 删除重复值 |

    | | `AS` | 重命名列以提高可读性 |

    | | `IN / NOT IN` | 匹配指定列表中的值 |

    | | `BETWEEN` | 筛选某个范围内的数据 |

    | | `LIKE` | 在文本中搜索模式 |

    | SQL 操作 | 算术 (+, -, *, /) | 执行数学计算 |

    | | 比较 (=, >, <, >=, <=, <>) | 比较值 |

    | | 逻辑 (AND, OR, NOT) | 组合多个条件进行筛选 |

    | 聚合函数 | `COUNT()` | 计算行数 |

    | | `SUM()` | 计算值的总和 |

    | | `AVG()` | 计算列的平均值 |

    | | `MIN()` / `MAX()` | 查找最小或最大值 |

    | 字符串函数 | `UPPER()` / `LOWER()` | 将文本转换为大写或小写 |

    | | `SUBSTRING()` | 提取字符串的一部分 |

    | | `TRIM()` | 删除文本中多余的空格 |

    | 日期函数 | `NOW()` | 返回当前时间戳 |

    | | `DATE_TRUNC()` | 将日期/时间值四舍五入到指定级别 |

    | | `EXTRACT()` | 从日期中检索年、月或日 |


    数据故事讲述依赖于 SQL 从数据库中提取和塑形精确的数据。正如第 2 到 6 章所阐述的，像 `SELECT` 和 `FROM` 这样的 SQL 语句分别用于识别所需的数据列及其源表。筛选通过
    `WHERE` 实现行级条件过滤，通过 `HAVING` 对 `GROUP BY` 产生的聚合结果进行条件过滤。数据排列由 `ORDER BY` 处理排序，而
    `JOIN` 用于整合来自多个表的数据。`LIMIT` 控制输出量。


    进一步的细化来自 SQL 子句。`DISTINCT` 确保结果的唯一性，`AS` 重命名列以提高清晰度，而像 `IN`、`NOT IN`、`BETWEEN`
    和 `LIKE` 这样的子句提供了强大的模式匹配和范围筛选能力。SQL 操作，包括算术 (+, -, *, /)、比较 (=, >, <) 和逻辑 (`AND`,
    `OR`, `NOT`) 操作，允许在查询中进行计算和复杂的条件逻辑。正如在第 5 章和第 10 章详细讨论的，聚合函数如 `COUNT()`、`SUM()`、`AVG()`、`MIN()`
    和 `MAX()` 对于总结数据见解至关重要。此外，像 `UPPER()`、`SUBSTRING()` 和 `TRIM()` 这样的字符串函数，以及像 `NOW()`、`DATE_TRUNC()`
    和 `EXTRACT()` 这样的日期函数，便于文本操作和时序分析，确保检索到的数据能有效支持叙述。

    '
- fmt: '#### Structuring Data for Better Insights


    原始数据集通常很复杂且难以解读。SQL 通过使用 `JOIN`、聚合和过滤来构建数据，使洞察更容易获得。参见表 [11-2](#619961_1_En_11_Chapter.xhtml#Tab2)。


    **表 11-2**


    用于构建数据以获得更好洞察的 SQL 语句、子句、操作和函数


