    ## 数据修改


    表 A-18 提供了用于数据操作的基本 SQL 命令，包括用于添加数据的 `INSERT`、用于修改记录的 `UPDATE` 以及用于删除数据的 `DELETE`。它涵盖了基本操作的语法，如插入多行、更新多列以及使用子查询进行删除。


    **表 A-18：数据修改**


    | 类别 | 类型 | 基本语法 |

    | --- | --- | --- |

    | `INSERT` | 基本插入 | `INSERT INTO table_name (column1, column2) VALUES (value1,
    value2);` |

    | 多行插入 | `INSERT INTO table_name (column1, column2)`<br>`VALUES`<br>`  (value1,
    value2),`<br>`  (value3, value4);` |

