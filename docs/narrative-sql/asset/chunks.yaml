- fmt: '## Indexing and Optimization


    Table [A-11](#Backmatter_001.xhtml#Tab11) shows SQL indexing and performance optimization
    techniques, including index creation and analysis tools like `EXPLAIN` and `ANALYZE`
    that improve query efficiency.


    Table A-11: SQL Indexing and Performance Optimization Techniques


    | Concept | Purpose | Basic Syntax |

    | --- | --- | --- |

    | `CREATE INDEX` | Creates an index on one or more columns to speed up query performance.
    | `CREATE INDEX index_name ON table (column);` |

    | `DROP INDEX` | Removes an existing index from the database. | `DROP INDEX index_name;`
    |

    | Query performance tips | Improve efficiency using selective columns in `WHERE`
    clauses, avoid `SELECT *`, and normalize the data. | `(Best practices; not syntax-based)`
    |

    | `EXPLAIN` | Shows the execution plan for an SQL query, helping analyze performance.
    | `EXPLAIN SELECT ... FROM table WHERE condition;` |

    | `ANALYZE` | Executes the query and provides detailed performance statistics.
    | `EXPLAIN ANALYZE SELECT ... FROM table WHERE condition;` |


    ## Stored Procedures and Functions


    Table [A-12](#Backmatter_001.xhtml#Tab12) illustrates the use of stored procedures
    and functions in SQL, including their creation, invocation, and example use cases
    for encapsulating tasks and returning values.


    Table A-12: The Use of Stored Procedures and Functions in SQL


    | Concept | Purpose | Basic Syntax | Example |

    | --- | --- | --- | --- |

    | Create stored procedure | Encapsulates a sequence of SQL statements to perform
    a task. | `CREATE PROCEDURE procedure_name() LANGUAGE plpgsql AS $$ BEGIN --statements
    END; $$;` | `CREATE PROCEDURE log_action() LANGUAGE plpgsql AS $$ BEGIN INSERT
    INTO logs(action) VALUES (''test''); END; $$;` |

    | Call stored procedure | Executes a previously defined stored procedure. | `CALL
    procedure_name();` | `CALL log_action();` |

    | Create function | Returns a value and can be used in SQL expressions. | `CREATE
    FUNCTION function_name() RETURNS return_type LANGUAGE plpgsql AS $$ BEGIN RETURN
    value; END; $$;` | `CREATE FUNCTION add_numbers(a INT, b INT) RETURNS INT LANGUAGE
    plpgsql AS $$ BEGIN RETURN a + b; END; $$;` |

    | Use function | Invokes the function within queries or statements. | `SELECT
    function_name();` | `SELECT add_numbers(3, 5);` |


    Table [A-13](#Backmatter_001.xhtml#Tab13) highlights the differences in SQL dialects
    across various database systems (MySQL, PostgreSQL, SQL Server, and Oracle), showcasing
    variations in features like auto-increment, string functions, `NULL` handling,
    and query syntax.


    Table A-13: SQL Dialect Differences


    | Feature | MySQL | PostgreSQL | SQL Server | Oracle |

    | --- | --- | --- | --- | --- |

    | Auto-increment | `AUTO_INCREMENT` | `SERIAL / BIGSERIAL` | `IDENTITY` | `SEQUENCE`
    with `NEXTVAL` |

    | Limit rows | `LIMIT n` | `LIMIT n` | `TOP n` | `FETCH FIRST n ROWS ONLY (12c+)`
    |

    | `NULL` handling | `IFNULL(expr, value)` | `COALESCE(expr, value)` | `ISNULL(expr,
    value)` | `NVL(expr, value)` |

    | String functions | `LOWER(str), UPPER(str)` | `LOWER(str), UPPER(str)` | `LOWER(str),
    UPPER(str)` | `LOWER(str), UPPER(str)` |

    | String concatenation | `CONCAT(str1, str2) or ''str` |   | `str2''` | `''str1`
    |

    | Date functions | `CURDATE(), NOW()` | `CURRENT_DATE, CURRENT_TIMESTAMP` | `GETDATE(),
    GETUTCDATE()` | `SYSDATE, CURRENT_DATE` |

    | Subqueries in `SELECT` | Supported | Supported | Supported | Supported |

    | Boolean data type | `TINYINT(1) or BOOLEAN (alias)` | `BOOLEAN` | `BIT` | Use
    `NUMBER(1`) or `CHAR(1)` with constraints |

    | Case sensitivity | Depends on OS | Case-sensitive | Case-insensitive by default
    | Case-insensitive by default |

    | Join syntax | Standard SQL | Standard SQL | Standard SQL | Standard SQL |


    As shown in Table [A-13](#Backmatter_001.xhtml#Tab13), this table compares key
    SQL syntax and behavior differences across MySQL, PostgreSQL, SQL Server, and
    Oracle. For auto-incrementing columns, MySQL uses `AUTO_INCREMENT`, PostgreSQL
    uses `SERIAL`, SQL Server uses `IDENTITY`, and Oracle uses `SEQUENCE`. Row limiting
    is done using `LIMIT` in MySQL/PostgreSQL, and `TOP` in SQL Server. Each uses
    different functions for `NULL` handling and date operations. String functions
    like `LOWER()` and `UPPER()` are common across all. Subqueries are generally supported.
    Boolean types vary—PostgreSQL supports `BOOLEAN`, while SQL Server uses `BIT`.
    Case sensitivity and `JOIN` syntax are similar, although case behavior depends
    on the system or configuration.


    ## PostgreSQL Cheat Sheet


    This PostgreSQL Cheat Sheet provides a concise and practical reference to the
    most common SQL commands, functions, and features found in PostgreSQL databases.
    Table [A-14](#Backmatter_001.xhtml#Tab14) shows the basic SQL queries, covering
    a range of operations like selecting, filtering, sorting, and checking conditions,
    with examples of their syntax and use cases.


    Table A-14: Basic Queries


    | Category | Type | Basic Syntax |

    | --- | --- | --- |

    | `SELECT` | Basic `SELECT` | `SELECT column1, column2 FROM table_name;` |

    | Select all columns | `SELECT * FROM table_name;` |

    | Select with alias | `SELECT column1 AS col1, column2 AS "Column 2" FROM table_name;`
    |

    | Select distinct values | `SELECT DISTINCT column1 FROM table_name;` |

    | Select with condition | `SELECT * FROM table_name WHERE condition;` |

    | Limit results | `SELECT * FROM table_name LIMIT 10;` |

    | Offset results | `SELECT * FROM table_name OFFSET 10 LIMIT 10;` |

    | Filtering | Basic comparison operators | `SELECT * FROM table_name WHERE column1
    = value;  -- Equal`<br>`SELECT * FROM table_name WHERE column1 > value;  -- Greater
    than`<br>`SELECT * FROM table_name WHERE column1 >= value;  -- Greater than or
    equal`<br>`SELECT * FROM table_name WHERE column1 < value;  -- Less than`<br>`SELECT
    * FROM table_name WHERE column1 <= value;  -- Less than or equal`<br>`SELECT *
    FROM table_name WHERE column1 != value; -- Not equal`<br>`SELECT * FROM table_name
    WHERE column1 <> value;  -- Not equal (alternative)` |

    | Logical operators | `SELECT * FROM table_name WHERE condition1 AND condition2;  --
    AND`<br>`SELECT * FROM table_name WHERE condition1 OR condition2;  -- OR`<br>`SELECT
    * FROM table_name WHERE NOT condition;  -- NOT` |

    | `NULL` checks | `SELECT * FROM table_name WHERE column1 IS NULL;`<br>`SELECT
    * FROM table_name WHERE column1 IS NOT NULL;` |

    | Pattern matching | `SELECT * FROM table_name WHERE column1 LIKE ''pattern%'';  --
    Starts with ''pattern''`<br>`SELECT * FROM table_name WHERE column1 LIKE ''%pattern'';  --
    Ends with ''pattern''`<br>`SELECT * FROM table_name WHERE column1 LIKE ''%pattern%'';  --
    Contains ''pattern''`<br>`SELECT * FROM table_name WHERE column1 ILIKE ''%pattern%'';  --
    Case-insensitive LIKE` |

    | Range checks | `SELECT * FROM table_name WHERE column1 BETWEEN value1 AND value2;`<br>`SELECT
    * FROM table_name WHERE column1 NOT BETWEEN value1 AND value2;` |

    | List checks | `SELECT * FROM table_name WHERE column1 IN (value1, value2, value3);`<br>`SELECT
    * FROM table_name WHERE column1 NOT IN (value1, value2, value3);` |

    | Sorting | Basic sorting | `SELECT * FROM table_name ORDER BY column1;                --
    ASC by default`<br>`SELECT * FROM table_name ORDER BY column1 ASC;            --
    Ascending`<br>`SELECT * FROM table_name ORDER BY column1 DESC;           -- Descending`<br>`SELECT
    * FROM table_name ORDER BY column1 DESC, column2 ASC;  -- Multiple columns` |


    Table [A-15](#Backmatter_001.xhtml#Tab15) illustrates SQL aggregation and grouping
    functions, showcasing how to perform operations like counting, summing, and averaging
    data, as well as how to group and filter aggregated results.


