  trans: '

    ## 核心聚合函数


    在 SQL 中，聚合函数是进行数据计算的强大工具。这些函数使你能够从大型数据集中计算出有意义的统计数据，这对于数据的分析和报告至关重要。表 5-1 列出了
    SQL 中最常用的聚合函数。


    表 5-1 常用聚合函数


    | 函数 | 用途 | 语法 |

    | --- | --- | --- |

    | `COUNT()` | 计算行数或非`NULL`值的数量 | `COUNT(column_name) 或 COUNT(*)` |

    | `SUM()` | 计算数值列的总和 | `SUM(column_name)` |

    | `AVG()` | 计算数值列的平均值 | `AVG(column_name)` |

    | `MIN()` | 查找列中的最小值 | `MIN(column_name)` |

    | `MAX()` | 查找列中的最大值 | `MAX(column_name)` |

    | `STDDEV()` | 计算数值列的标准差 | `STDDEV(column_name)` |

    | `VARIANCE()` | 计算数值列的方差 | `VARIANCE(column_name)` |

    | `MEDIAN()` | 返回数值列的中位数 | `MEDIAN(column_name)` |

    | `PERCENTILE_CONT()` | 使用连续分布计算百分位数 | `PERCENTILE_CONT(percentile) WITHIN GROUP
    (ORDER BY column_name)` |

    | `PERCENTILE_DISC()` | 使用离散分布计算百分位数 | `PERCENTILE_DISC(percentile) WITHIN GROUP
    (ORDER BY column_name)` |

    | `STRING_AGG()` | 将值连接成单个字符串 | `STRING_AGG(column_name, delimiter)` |

    | `ARRAY_AGG()` | 将值聚合到一个数组中 | `ARRAY_AGG(column_name)` |

    | `MODE()` | 查找列中最频繁出现的值 | `MODE()` |

    | `BIT_AND()` | 计算所有非`NULL`输入值的按位`与` | `BIT_AND(column_name)` |

    | `BIT_OR()` | 计算所有非`NULL`输入值的按位`或` | `BIT_OR(column_name)` |


    借助这些聚合函数，可以完成广泛的数据汇总任务。它们不仅涵盖了最常见的统计分析、数据报告和聚合需求，也是任何使用 PostgreSQL 的人员的基础工具。要开始进行有效的数据分组、有意义的汇总和提取有价值的洞察的旅程，你需要将这些函数与
    `GROUP BY` 结合使用。

    '
- fmt: '## The First Story: A Busy Gym in a Bustling City


    This story revolves around a busy gym in a bustling city that has been operating
    successfully for many years. Jack, the gym data analyst, helps the management
    team make data-driven decisions to optimize management policies, improve customer
    satisfaction, and boost profitability. The gym collects a variety of data points
    daily, including information on memberships, classes, personal training sessions,
    and overall customer activity.


    The gym has several types of memberships, including Basic, Standard, and Premium.
    It offers various fitness classes such as Yoga, Pilates, and Spinning, and it
    also has a team of personal trainers who conduct one-on-one sessions. The gym
    tracks all this data in a relational database. Jack is required to work with the
    following data tables.


    The first table is the `Members` table and it contains information about gym members,
    including their membership type. An illustration of this table can be found in
    Table [5-2](#619961_1_En_5_Chapter.xhtml#Tab2).


    Table 5-2

    The Members Table


    | Member_ID | First_Name | Last_Name | Membership_Type | Join_Date | Date_of_Birth
    | Phone_Number |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1 | John | Doe | Premium | 2023-01-10 | 1985-02-20 | 555-1234 |

    | 2 | Jane | Smith | Standard | 2022-08-15 | 1990-05-15 | 555-5678 |

    | 3 | Emily | Johnson | Basic | 2023-03-20 | 1992-09-05 | 555-8765 |

    | 4 | Michael | Brown | Premium | 2021-12-10 | 1988-11-23 | 555-4321 |

    | 5 | Sarah | Davis | Standard | 2023-06-01 | 1987-07-30 | 555-6543 |


    The second table is the `Classes` table, which contains data about the different
    classes offered at the gym. The table values can be found in Table [5-3](#619961_1_En_5_Chapter.xhtml#Tab3).


    Table 5-3

    The Classes Table


    | Class_ID | Class_Name | Instructor | Class_Type | Schedule | Max_Capacity |

    | --- | --- | --- | --- | --- | --- |

    | 1 | Yoga | Alice Green | Fitness | Mon 9:00 AM | 20 |

    | 2 | Pilates | Bob White | Fitness | Wed 7:00 PM | 15 |

    | 3 | Spinning | Carol Black | Cardio | Fri 6:00 PM | 25 |

    | 4 | Zumba | Dave Brown | Cardio | Sat 10:00 AM | 30 |

    | 5 | HIIT | Eve Silver | Strength | Tue 8:00 AM | 20 |


    As shown in Table [5-4](#619961_1_En_5_Chapter.xhtml#Tab4), the `Attendance` table
    keeps track of which classes members attended and on what dates.


    Table 5-4

    The Attendance Table


    | Attendance_ID | Member_ID | Class_ID | Attendance_Date |

    | --- | --- | --- | --- |

    | 1 | 1 | 3 | 2023-08-18 |

    | 2 | 2 | 1 | 2023-08-19 |

    | 3 | 1 | 4 | 2023-08-20 |

    | 4 | 3 | 2 | 2023-08-20 |

    | 5 | 4 | 5 | 2023-08-21 |


    The `Personal_Training_Sessions` table records details of personal training sessions,
    including the trainer, member, session date, and duration, as shown in Table [5-5](#619961_1_En_5_Chapter.xhtml#Tab5).


    Table 5-5

    The Personal_Training_Sessions Table


    | Session_ID | Trainer_Name | Member_ID | Session_Date | Duration_mins |

    | --- | --- | --- | --- | --- |

    | 1 | Tom Harris | 1 | 2023-08-17 | 60 |

    | 2 | Nina Jordan | 2 | 2023-08-18 | 45 |

    | 3 | Mike Scott | 3 | 2023-08-19 | 30 |

    | 4 | Lisa White | 4 | 2023-08-19 | 60 |

    | 5 | Tom Harris | 5 | 2023-08-20 | 45 |


    The last table (see Table [5-6](#619961_1_En_5_Chapter.xhtml#Tab6)) is `Payments`,
    which logs all payments made by members, including membership fees, class fees,
    and personal training fees.


    Table 5-6

    The Payments Table


    | Payment_ID | Member_ID | Payment_Date | Amount | Payment_Type |

    | --- | --- | --- | --- | --- |

    | 1 | 1 | 2023-08-01 | 50 | Membership Fee |

    | 2 | 2 | 2023-08-01 | 40 | Membership Fee |

    | 3 | 1 | 2023-08-18 | 20 | Class Fee (Spinning) |

    | 4 | 3 | 2023-08-19 | 60 | Personal Training Fee |

    | 5 | 4 | 2023-08-20 | 50 | Class Fee (HIIT) |


    Jack wants answers to the following questions.


    1.  For each membership type, what is the average age of the members?

    2.  How many personal training sessions were conducted by each trainer, and what
    was the total duration of those sessions?

    3.  What is the total revenue generated by each type of payment? A membership
    fee, a class fee, and a personal training fee are all types of payments.

    4.  How many members attended each type of class, and what is the total number
    of attendance for each class?

    5.  For each membership type, how many members have attended at least one class,
    and what is the average number of classes attended per member?


    The following query can be used to calculate the average age of members in different
    membership types:


    ```sql

    SELECT  Membership_Type, CAST(AVG(DATE_PART(''year'', AGE(CURRENT_DATE, Date_of_Birth)))
    AS INTEGER) AS Avg_Age

    FROM Members

    GROUP BY Membership_Type;

    ```


    In this query, the `AGE(CURRENT_DATE, Date_of_Birth)` function calculates the
    difference between the current date (`CURRENT_DATE`) and a person’s date of birth
    (`Date_of_Birth`). The result is a time interval representing a person’s age in
    years, months, and days. Using `DATE_PART(''year'', AGE(...))`, you can access
    the number of years from the interval returned by `AGE()` while ignoring months
    and days. This provides the person’s age in complete years. `AVG(DATE_PART(...))`
    is an aggregate function that calculates the average age in years across all rows.
    `CAST(... AS INTEGER)` is used because the result of `AVG()` could have decimal
    places, so the `CAST(... AS INTEGER)` converts the result to an integer. This
    discards any decimal part and provides a whole number for ease of reading. By
    understanding the typical age profile of members in each age bracket, the gym
    can offer customized services and marketing. It should be noted that the `DATE_PART`
    and `AGE` functions are standard PostgreSQL functions for working with dates.
    The use of `CURRENT_DATE` and `CAST` are also standard.


    Note


    The `AGE(timestamp1, timestamp2)` function calculates the difference between two
    dates or timestamps and returns the result as an `interval(years, months, days,
    etc.)`. It should be noted that if only one argument is given in `AGE(timestamp2)`,
    PostgreSQL assumes `CURRENT_DATE` as the recent date. For instance, `SELECT AGE(''2024-01-01'',
    ''1990-01-01'')` returns the time interval from January 1, 1990 to January 1,
    2024, showing the age as something like `34 years 0 months 0 days`. Also, the
    `DATE_PART()` function extracts a specific `part` (like a year, month, or day)
    from a date or interval, `part` is part of the date or interval you want to extract,
    such as the year, month, or day. `date` is the date or interval from which you
    want to extract the value. For instance, `SELECT DATE_PART(''year'', ''2024-09-22'')`
    returns `2024` as it extracts the year from the date.


    Table [5-7](#619961_1_En_5_Chapter.xhtml#Tab7) illustrates the calculation of
    average age based on the membership type.


    Table 5-7

    The Average Age Based on Membership Type


    | Membership_Type | Avg_Age |

    | --- | --- |

    | Premium | 38 |

    | Standard | 36 |

    | Basic | 32 |


    Through the following query, you can discover how many sessions a personal trainer
    has and how much time they spend on each session, which are important metrics
    to evaluate a trainer’s workload and performance.


    ```sql

    SELECT Trainer_Name,  COUNT(Session_ID) AS Total_Sessions, SUM(Duration_mins)
    AS Total_Duration

    FROM  Personal_Training_Sessions

    GROUP BY Trainer_Name;

    ```


    The query provides insight into the performance of each personal trainer by calculating
    the total number of training sessions they have conducted and their cumulative
    duration. By using the `COUNT` and `SUM` functions, you can count the number of
    sessions held by each trainer and calculate the total minutes spent in training
    sessions. When `Trainer_Name` is grouped, each trainer’s calculations are separate.
    As a result of this information, trainer workloads can be managed and trainer
    contributions assessed in the gym. Table [5-8](#619961_1_En_5_Chapter.xhtml#Tab8)
    shows the number and duration of personal training sessions for each trainer.


    Table 5-8

    Training Sessions Per Trainer and Their Duration


    | Trainer_Name | Total_Sessions | Total_Duration |

    | --- | --- | --- |

    | Tom Harris | 2 | 105 |

    | Nina Jordan | 1 | 45 |

    | Mike Scott | 1 | 30 |

    | Lisa White | 1 | 60 |


    The following query can help identify which services contribute most to its income
    by understanding its revenue breakdown by payment type:


    ```sql

    SELECT Payment_Type, SUM(Amount) AS Total_Revenue

    FROM Payments

    GROUP BY Payment_Type;

    ```


    Each type of payment is calculated separately in this query. The `SUM` function
    aggregates the payment amounts, grouped by `Payment_Type`, including membership
    fees, class fees, and personal training fees. As a result of this analysis, as
    shown in Table [5-9](#619961_1_En_5_Chapter.xhtml#Tab9), the gym’s management
    can make informed decisions about pricing strategies, promotions, and resource
    allocation based on its major sources of income.


    Table 5-9

    The Gym''s Major Sources of Income


    | Payment_Type | Total_Revenue |

    | --- | --- |

    | Membership Fee | 90.00 |

    | Class Fee (Spinning) | 20.00 |

    | Personal Training Fee | 60.00 |

    | Class Fee (HIIT) | 50.00 |


    To determine how many members attend each class at the gym, the following query
    can be used:


    ```sql

    SELECT  C.Class_Name, COUNT(DISTINCT A.Member_ID) AS Number_of_Members, COUNT(A.Attendance_ID)
    AS Total_Attendances

    FROM  Attendance A

    JOIN Classes C ON A.Class_ID = C.Class_ID

    GROUP BY C.Class_Name;

    ```


    This query provides two key metrics for each class offered at the gym. These are
    the number of distinct members who attended at least one session, which is calculated
    by using `COUNT(DISTINCT A.Member_ID))` and the total number of attendances, which
    is calculated by using `COUNT(A.Attendance_ID)`. To match attendance records with
    class names, it joins the `Attendance` table with the `Classes` table. The analysis
    is performed separately for each class when classes are grouped by `Class_Name`.
    As shown in Table [5-10](#619961_1_En_5_Chapter.xhtml#Tab10), gym managers can
    take advantage of these insights to optimize class schedules, allocate resources
    more efficiently, and even introduce new classes based on member preferences.


    Table 5-10

    Attendance Totals and Membership Numbers for Each Class


    | Class_Name | Number_of_Members | Total_Attendances |

    | --- | --- | --- |

    | Spinning | 1 | 1 |

    | Yoga | 1 | 1 |

    | Zumba | 1 | 1 |

    | Pilates | 1 | 1 |

    | HIIT | 1 | 1 |


    The following nested query can be used to find, for each membership type, the
    number of members who attended at least one class, as well as the average number
    of classes attended per member.


    ```sql

    SELECT M.Membership_Type, COUNT(DISTINCT M.Member_ID) AS Members_Attended, CAST(AVG(Sub.Class_Attended)
    AS DECIMAL(10, 2)) AS Avg_Classes_Per_Member

    FROM Members M

    JOIN

    (SELECT Member_ID, COUNT(Attendance_ID) AS Class_Attended

    FROM Attendance

    GROUP BY Member_ID) Sub

    ON M.Member_ID = Sub.Member_ID

    GROUP BY M.Membership_Type;

    ```


    This nested query aims to analyze class attendance to determine membership engagement
    levels. As a first step, a subquery finds the number of classes each member attended.
    In the main query, the result is then joined to the `Members` table, and the data
    is grouped by `Membership_Type`. This calculates the average number of classes
    attended by members of each membership type.


    As mentioned earlier, nested queries are queries embedded within other queries.
    In this query, the subquery calculates how many classes each member has attended
    by selecting `Member_ID` and counting the occurrences of `Attendance_ID` in the
    `Attendance` table. After that, the results are grouped by `Member_ID`, giving
    a list of members and their respective class counts. This subquery is then given
    an alias `Sub` and used in the main query to join the `Members` table. As a result,
    the main query can access membership data and aggregate it to derive insights,
    such as how many members of each membership type attended at least one class and
    how many classes they attended on average. Table [5-11](#619961_1_En_5_Chapter.xhtml#Tab11)
    shows member engagement, which is useful for understanding how active each membership
    type is. These insights can be used to customize the gym’s offerings or create
    membership promotion offers.


    Table 5-11

    Analysis of Class Attendance Based on Type of Membership


    | Membership_Type | Members_Attended | Avg_Classes_Per_Member |

    | --- | --- | --- |

    | Premium | 2 | 1.5 |

    | Standard | 1 | 1 |

    | Basic | 1 | 1 |


    By using SQL’s `GROUP BY` and aggregation capabilities, these queries reveal crucial
    information about the gym statistics, participation, and revenue. The next section
    discusses a more advanced topic.'
