- fmt: "## NULL-Safe Equal Operator\n\n需要注意的是，一些数据库（如 MySQL）提供了 `NULL`-safe 等值操作符。操作符\
    \ `<=>` 的行为类似于标准的 `=`，但对 `NULL` 值有特殊处理。如果两个操作数都是 `NULL`，它返回 `1`（真）。如果只有一个操作数是\
    \ `NULL`，它返回 `0`（假）。这简化了涉及 `NULL` 的比较，避免了为缺失数据编写复杂逻辑或进行额外检查的需要。它提高了代码的可读性，并确保您的查询在遇到\
    \ `NULL` 值时能按预期运行。\n\nPostgreSQL 没有像 `<=>` 这样的 `NULL`-safe 等值操作符。但是，PostgreSQL\
    \ 提供了实现 `NULL`-safe 比较的替代方法：\n\n*   `IS NULL` 和 `IS NOT NULL`：这些操作符显式检查 `NULL`\
    \ 值的存在与否。您可以在比较中使用它们，例如：\n    ```\n    SELECT *\n    FROM table\n    WHERE column1\
    \ IS NULL OR column2 = value\n    ```\n\n*   `=` 操作符：虽然标准 `=` 操作符在与 `NULL` 比较时可能返回\
    \ `NULL`，但您可以使用 PostgreSQL 的 `IS DISTINCT FROM` 操作符来实现 `NULL`-safe 比较行为。\n   \
    \ ```\n    SELECT *\n    FROM table\n    WHERE column1 IS DISTINCT FROM column2\n\
    \    ```\n    这对于非 `NULL` 值表现得像 `=`，但当两个操作数都是 `NULL` 时返回 true，当只有一个为 `NULL` 时返回\
    \ false。\n\n这两种方法都能有效地处理 PostgreSQL 中的 `NULL`-safe 比较。虽然 PostgreSQL 没有专用的 `NULL`-safe\
    \ 操作符，但其 `IS DISTINCT FROM` 操作符提供的 `NULL`-safe 比较行为在处理 `NULL` 值时，为编写更清晰、更易读的 `JOIN`\
    \ 条件提供了类似的好处。使用 `NULL`-safe 操作符的代码更易于理解。如果没有这些操作符，您可能需要在 `JOIN` 条件中嵌套检查（`IS NULL`\
    \ 或 `COALESCE`）来处理 `NULL` 值。这可能会使查询逻辑变得复杂且难以维护。\n\n## Summary\n\n本章介绍了一种用于从多个表组合数据的基本工具，称为\
    \ SQL `JOIN`，它能够实现复杂且有意义的数据分析。理解不同类型的 `JOIN` 及其应用对于有效地执行高级数据查询至关重要。\n\n## Key\
    \ Points\n\n*   `INNER JOIN`：基于相关列合并两个或多个表中的行，仅返回匹配的行。\n*   `LEFT OUTER JOIN`：检索左表中的所有行以及右表中的匹配行，为不匹配的行填充\
    \ `NULL`。\n*   `RIGHT OUTER JOIN`：检索右表中的所有行以及左表中的匹配行，为不匹配的行填充 `NULL`。\n*   `FULL\
    \ OUTER JOIN`：当在左表或右表中存在匹配时返回所有行，对于没有匹配的情况填充 `NULL`。\n*   `SELF JOIN`：一个表与自身连接，用于比较同一表中的行。\n\
    *   `CROSS JOIN`：生成笛卡尔积，将一个表中的每一行与另一个表中的所有行配对，很少用于特定目的。\n*   处理 `NULL` 值：妥善处理外连接产生的\
    \ `NULL` 值，以避免误导性数据。\n\n## Key Takeaways\n\n*   `JOIN` 类型：探索 `INNER`、`LEFT`、`RIGHT`\
    \ 和 `FULL JOIN`，根据匹配条件从多个表组合数据。\n*   `JOIN` 条件：使用 `ON` 子句和比较操作符定义表之间行的匹配规则。\n\
    *   处理 `NULL`：理解不同 `JOIN` 类型如何处理结果中的缺失数据（`NULL` 值）。\n\n## Looking Ahead\n\n下一章“Aggregating\
    \ Acts”将探讨聚合函数和 `GROUP BY`，它们对于汇总和分析大型数据集至关重要。掌握此操作将使您能够从数据中提取有意义的见解，发现趋势、模式和整体统计信息。\n\
    \n## Test Your Skills\n\n一个数据库有三张表：`customers`（`CustomerID`, `Name`, `City`）、`orders`（`OrderID`,\
    \ `CustomerID`, `ProductID`, `OrderDate`）和 `products`（`ProductID`, `Name`, `Description`,\
    \ `Price`, `Color`）。\n\n1.  编写一个 SQL 查询，使用适当的 `JOIN` 来检索所有在七月下单的客户的姓名和城市。\n2.\
    \  `products` 表中有一个名为 `Color` 的列可能包含 `NULL` 值。编写一个查询，检索所有产品及其颜色信息。但是，对于颜色值为 `NULL`\
    \ 的产品，显示 `\"Unknown\"`。\n3.  编写一个查询来查找所有居住在同一城市的客户对。确保每个对只列出一次。\n\n# 5. Aggregating\
    \ Acts\n\nSQL 中的聚合操作是将聚合函数应用于数据表中已分组的子数据集的过程。为了实现这一点，聚合函数（如 `COUNT`、`SUM`、`AVG`、`MIN`\
    \ 和 `MAX`）与 `GROUP BY` 子句结合使用，以计算特定数据组的值。通过这些操作，SQL 通过提取有意义的摘要和统计信息，为数据分析和决策提供了宝贵的见解。\n\
    \n## Introduction to GROUP BY\n\n在 SQL 中，`GROUP BY` 允许将相同的数据分组在一起。SQL 中的 `GROUP\
    \ BY` 子句允许我们根据一个或多个列对行进行分组。分组后，可以应用聚合函数来计算每个组的摘要统计信息。`GROUP BY` 子句的语法如下：\n\n```\n\
    SELECT first_column, aggregate_function(second_column)\nFROM table_name\nWHERE\
    \ condition\nGROUP BY first_column;\n```\n\n这里，`first_column` 是用于对数据进行分组的列，`aggregate_function`\
    \ 是一个从一组值中计算单个值的函数（如 `COUNT`、`SUM`、`AVG`、`MIN`、`MAX`），`second_column` 是应用聚合函数的列，`table_name`\
    \ 指的是您正在查询的表，而 `WHERE` 条件在分组前过滤数据。\n\n`GROUP BY` 子句可用于根据子句中指定的列将结果集划分为子组。分组列中的每个唯一值都会形成多个组。通过应用聚合函数为每个组赋予一个值。最终结果包含每个组的一行以及聚合值。\n\
    \n`GROUP BY` 子句对于数据聚合至关重要，因为它允许您汇总数据、分析趋势、创建报告和提高性能。`GROUP BY` 可以通过计算总计、平均值、最小值和最大值来汇总数据。在不同类别的数据中，`GROUP\
    \ BY` 可用于识别模式和趋势。可以使用 `GROUP BY` 利用各种组的汇总信息创建报告。使用 `GROUP BY` 通常可以通过减少返回的数据量来提高查询性能。本章将详细阐述这些方面。它探讨了如何使用\
    \ `GROUP BY` 计算总计、平均值、最小值和最大值。此外，它还解释了如何结合使用聚合和窗口函数，使用嵌套 `GROUP BY` 进行更精细的分析，以及如何使用公共表表达式简化复杂查询。"
  raw: "## NULL-Safe Equal Operator\n\nIt should be noted that some databases, like\
    \ in MySQL, offer a `NULL`-safe equal operator. This operator `<=>` behaves like\
    \ the standard `=`, but with special handling for `NULL` values. If both operands\
    \ are `NULL`, it returns `1` (true). If only one operand is `NULL`, it returns\
    \ `0` (false). This simplifies comparisons involving `NULL`s, avoiding the need\
    \ for complex logic or additional checks for missing data. It improves code readability\
    \ and ensures your queries function as expected when encountering `NULL` values.\n\
    \nPostgreSQL doesn’t have a `NULL`-safe equal operator like `<=>`. However, PostgreSQL\
    \ offers alternative ways to achieve `NULL`-safe comparisons:\n\n*   `IS NULL`\
    \ **and** `IS NOT NULL`: These operators explicitly check for the presence or\
    \ absence of `NULL` values. You can use them in your comparisons, like so:\n\n\
    \    ```\n    SELECT *\n    FROM table\n    WHERE column1 IS NULL OR column2 =\
    \ value\n    ```\n\n*   **The** `=` **operator**: While the standard `=` operator\
    \ might return `NULL` when comparing with `NULL`, you can use PostgreSQL’s `NULL`-safe\
    \ comparison behavior with the `IS DISTINCT FROM` operator.\n\n    ```\n    SELECT\
    \ *\n    FROM table\n    WHERE column1 IS DISTINCT FROM column2\n    ```\n\nThis\
    \ acts like `=` for non-`NULL` values, but returns true when both operands are\
    \ `NULL` and false when only one is `NULL`.\n\nBoth approaches effectively handle\
    \ `NULL`-safe comparisons in PostgreSQL. While PostgreSQL doesn’t have a dedicated\
    \ `NULL`-safe operator, its `NULL`-safe comparison behavior with `IS DISTINCT\
    \ FROM` offers similar benefits for writing cleaner and more readable `JOIN` conditions\
    \ when dealing with `NULL` values. Code using `NULL`-safe operators is easier\
    \ to understand. Without these operators, you might need nested checks (`IS NULL`\
    \ or `COALESCE`) within your `JOIN` conditions to handle `NULL` values. This can\
    \ make the query logic convoluted and harder to maintain.\n\n## Summary\n\nThis\
    \ chapter described an essential tool for combining data from multiple tables,\
    \ called SQL `JOIN`, which can enable complex and meaningful data analysis. Understanding\
    \ the different types of `JOIN`s and their applications is crucial for performing\
    \ advanced data queries effectively.\n\n## Key Points\n\n*   `INNER JOIN`: Combines\
    \ rows from two or more tables based on a related column, returning only matching\
    \ rows.\n\n*   `LEFT OUTER JOIN`: Retrieves all rows from the left table and the\
    \ matched rows from the right table, filling in `NULL`s for unmatched rows.\n\n\
    *   `RIGHT OUTER JOIN`: Retrieves all rows from the right table and the matched\
    \ rows from the left table, filling in `NULL`s for unmatched rows.\n\n*   `FULL\
    \ OUTER JOIN`: Returns all rows when there is a match in either left or right\
    \ table, filling in NULLs where there are no matches.\n\n*   `SELF JOIN`: A table\
    \ is joined with itself to compare rows within the same table.\n\n*   `CROSS JOIN`:\
    \ Produces a Cartesian product, pairing each row from one table with all rows\
    \ in another table, used rarely for specific purposes.\n\n*   **Handling** `NULL`\
    \ **values**: Properly handle `NULL` values, resulting from outer joins to avoid\
    \ misleading data.\n\n## Key Takeaways\n\n*   **Types of** `JOIN`**s**: Explore\
    \ `INNER`, `LEFT`, `RIGHT`, and `FULL JOIN`s to combine data from multiple tables\
    \ based on matching criteria.\n\n*   **JOIN** **conditions**: Define the rules\
    \ for matching rows between tables using the `ON` clause and comparison operators.\n\
    \n*   **Handling** `NULL`**s**: Understand how different `JOIN` types handle missing\
    \ data (`NULL` values) in the results.\n\n## Looking Ahead\n\nThe next chapter,\
    \ “Aggregating Acts,” explores aggregation functions and `GROUP BY`, which are\
    \ fundamental for summarizing and analyzing large datasets. Mastery of this operation\
    \ will enable you to extract meaningful insights from your data, uncovering trends,\
    \ patterns, and overall statistics.\n\n## Test Your Skills\n\nA database has three\
    \ tables: `customers` (`CustomerID`, `Name`, `City`), `orders` (`OrderID`, `CustomerID`,\
    \ `ProductID`, `OrderDate`), and `products` (`ProductID`, `Name`, `Description`,\
    \ `Price`, `Color`).\n\n1.  Write an SQL query using an appropriate `JOIN` to\
    \ retrieve the names and cities of all customers who placed an order in July.\n\
    \n2.  The `products` table has a column called `Color` that might contain `NULL`\
    \ values. Write a query that retrieves all products along with their color information.\
    \ However, for products with a NULL color value, display `\"Unknown\"` instead.\n\
    \n3.  Write a query to find all pairs of customers who live in the same city.\
    \ Ensure that each pair is listed only once.\n\n# 5. Aggregating Acts\n\nAn aggregate\
    \ act in SQL is the process of applying aggregate functions to grouped data subsets\
    \ from a data table. To accomplish this, aggregate functions, such as `COUNT`,\
    \ `SUM`, `AVG`, `MIN`, and `MAX`, are combined with the `GROUP BY` clause to calculate\
    \ specific groups of data. As a result of these actions, SQL provides valuable\
    \ insights for data analysis and decision-making by extracting meaningful summaries\
    \ and statistical information.\n\n## Introduction to GROUP BY\n\nIn SQL, `GROUP\
    \ BY` allows identical data to be grouped together. `GROUP BY` clauses in SQL\
    \ allow us to group rows according to one or more columns. Once grouped, aggregate\
    \ functions can be applied to calculate summary statistics for each group. The\
    \ `GROUP BY` clause syntax is as follows:\n\n```\nSELECT first_column, aggregate_function(second_column)\n\
    FROM table_name\nWHERE condition\nGROUP BY first_column;\n```\n\nHere, the `first``_column`\
    \ is the column used to group the data, an `aggregate_function` is a function\
    \ that calculates a single value from a set of values like `COUNT`, `SUM`, `AVG`,\
    \ `MIN`, and `MAX`, the `second_column` is the column on which the aggregate function\
    \ is applied, the `table_name` refers to the table you are querying, and the `WHERE`\
    \ condition filters the data before grouping it.\n\nThe `GROUP BY` clause can\
    \ be used to divide the result set into subgroups based on the column(s) specified\
    \ in the clause. There are multiple groups formed by each unique value in the\
    \ grouping column. Each group is given a single value by applying an aggregate\
    \ function. The final result contains a row for each group along with the aggregate\
    \ values.\n\nThe `GROUP BY` clause is essential for data aggregation, as it allows\
    \ you to summarize data, analyze trends, create reports, and improve performance.\
    \ `GROUP BY` can summarize data by computing totals, averages, minimums, and maximums.\
    \ Within different categories of data, `GROUP BY` can be used to identify patterns\
    \ and trends. A report can be created by `GROUP BY` using summarized information\
    \ for various groups. It is often possible to improve the performance of queries\
    \ using `GROUP BY` by reducing the amount of data returned. This chapter elaborates\
    \ on each of these aspects in more detail. It explores how to compute totals,\
    \ averages, minimums, and maximums using `GROUP BY`. Additionally, it explains\
    \ how to combine aggregations and window functions, use nested `GROUP BY` for\
    \ more granular analysis, and simplify complex queries with common table expressions."
  trans: "\n## NULL 安全等值操作符\n\n需要注意的是，一些数据库（如 MySQL）提供了 `NULL`-safe 等值操作符。操作符 `<=>`\
    \ 的行为类似于标准的 `=`，但对 `NULL` 值有特殊处理。如果两个操作数都是 `NULL`，它返回 `1`（真）。如果只有一个操作数是 `NULL`，它返回\
    \ `0`（假）。这简化了涉及 `NULL` 的比较，避免了为缺失数据编写复杂逻辑或进行额外检查的需要。它提高了代码的可读性，并确保您的查询在遇到 `NULL`\
    \ 值时能按预期运行。\n\nPostgreSQL 没有像 `<=>` 这样的 `NULL`-safe 等值操作符。但是，PostgreSQL 提供了实现\
    \ `NULL`-safe 比较的替代方法：\n\n*   `IS NULL` 和 `IS NOT NULL`：这些操作符显式检查 `NULL` 值的存在与否。您可以在比较中使用它们，例如：\n\
    \    ```\n    SELECT *\n    FROM table\n    WHERE column1 IS NULL OR column2 =\
    \ value\n    ```\n\n*   `=` 操作符：虽然标准 `=` 操作符在与 `NULL` 比较时可能返回 `NULL`，但您可以使用 PostgreSQL\
    \ 的 `IS DISTINCT FROM` 操作符来实现 `NULL`-safe 比较行为。\n    ```\n    SELECT *\n    FROM\
    \ table\n    WHERE column1 IS DISTINCT FROM column2\n    ```\n    这对于非 `NULL`\
    \ 值表现得像 `=`，但当两个操作数都是 `NULL` 时返回 true，当只有一个为 `NULL` 时返回 false。\n\n这两种方法都能有效地处理\
    \ PostgreSQL 中的 `NULL`-safe 比较。虽然 PostgreSQL 没有专用的 `NULL`-safe 操作符，但其 `IS DISTINCT\
    \ FROM` 操作符提供的 `NULL`-safe 比较行为在处理 `NULL` 值时，为编写更清晰、更易读的 `JOIN` 条件提供了类似的好处。使用\
    \ `NULL`-safe 操作符的代码更易于理解。如果没有这些操作符，您可能需要在 `JOIN` 条件中嵌套检查（`IS NULL` 或 `COALESCE`）来处理\
    \ `NULL` 值。这可能会使查询逻辑变得复杂且难以维护。\n\n## 总结\n\n本章介绍了一种用于从多个表组合数据的基本工具，称为 SQL `JOIN`，它能够实现复杂且有意义的数据分析。理解不同类型的\
    \ `JOIN` 及其应用对于有效地执行高级数据查询至关重要。\n\n## 要点\n\n*   `INNER JOIN`：基于相关列合并两个或多个表中的行，仅返回匹配的行。\n\
    *   `LEFT OUTER JOIN`：检索左表中的所有行以及右表中的匹配行，为不匹配的行填充 `NULL`。\n*   `RIGHT OUTER JOIN`：检索右表中的所有行以及左表中的匹配行，为不匹配的行填充\
    \ `NULL`。\n*   `FULL OUTER JOIN`：当在左表或右表中存在匹配时返回所有行，对于没有匹配的情况填充 `NULL`。\n*   `SELF\
    \ JOIN`：一个表与自身连接，用于比较同一表中的行。\n*   `CROSS JOIN`：生成笛卡尔积，将一个表中的每一行与另一个表中的所有行配对，很少用于特定目的。\n\
    *   处理 `NULL` 值：妥善处理外连接产生的 `NULL` 值，以避免误导性数据。\n\n## 关键要点\n\n*   `JOIN` 类型：探索 `INNER`、`LEFT`、`RIGHT`\
    \ 和 `FULL JOIN`，根据匹配条件从多个表组合数据。\n*   `JOIN` 条件：使用 `ON` 子句和比较操作符定义表之间行的匹配规则。\n\
    *   处理 `NULL`：理解不同 `JOIN` 类型如何处理结果中的缺失数据（`NULL` 值）。\n\n## 后续内容\n\n下一章“聚合操作”将探讨聚合函数和\
    \ `GROUP BY`，它们对于汇总和分析大型数据集至关重要。掌握此操作将使您能够从数据中提取有意义的见解，发现趋势、模式和整体统计信息。\n\n## 技能测试\n\
    \n一个数据库有三张表：`customers`（`CustomerID`, `Name`, `City`）、`orders`（`OrderID`, `CustomerID`,\
    \ `ProductID`, `OrderDate`）和 `products`（`ProductID`, `Name`, `Description`, `Price`,\
    \ `Color`）。\n\n1.  编写一个 SQL 查询，使用适当的 `JOIN` 来检索所有在七月下单的客户的姓名和城市。\n2.  `products`\
    \ 表中有一个名为 `Color` 的列可能包含 `NULL` 值。编写一个查询，检索所有产品及其颜色信息。但是，对于颜色值为 `NULL` 的产品，显示\
    \ `\"Unknown\"`。\n3.  编写一个查询来查找所有居住在同一城市的客户对。确保每个对只列出一次。\n\n# 5. 聚合操作\n\nSQL 中的聚合操作是将聚合函数应用于数据表中已分组的子数据集的过程。为了实现这一点，聚合函数（如\
    \ `COUNT`、`SUM`、`AVG`、`MIN` 和 `MAX`）与 `GROUP BY` 子句结合使用，以计算特定数据组的值。通过这些操作，SQL\
    \ 通过提取有意义的摘要和统计信息，为数据分析和决策提供了宝贵的见解。\n\n## GROUP BY 简介\n\n在 SQL 中，`GROUP BY` 允许将相同的数据分组在一起。SQL\
    \ 中的 `GROUP BY` 子句允许我们根据一个或多个列对行进行分组。分组后，可以应用聚合函数来计算每个组的摘要统计信息。`GROUP BY` 子句的语法如下：\n\
    \n```\nSELECT first_column, aggregate_function(second_column)\nFROM table_name\n\
    WHERE condition\nGROUP BY first_column;\n```\n\n这里，`first_column` 是用于对数据进行分组的列，`aggregate_function`\
    \ 是一个从一组值中计算单个值的函数（如 `COUNT`、`SUM`、`AVG`、`MIN`、`MAX`），`second_column` 是应用聚合函数的列，`table_name`\
    \ 指的是您正在查询的表，而 `WHERE` 条件在分组前过滤数据。\n\n`GROUP BY` 子句可用于根据子句中指定的列将结果集划分为子组。分组列中的每个唯一值都会形成多个组。通过应用聚合函数为每个组赋予一个值。最终结果包含每个组的一行以及聚合值。\n\
    \n`GROUP BY` 子句对于数据聚合至关重要，因为它允许您汇总数据、分析趋势、创建报告和提高性能。`GROUP BY` 可以通过计算总计、平均值、最小值和最大值来汇总数据。在不同类别的数据中，`GROUP\
    \ BY` 可用于识别模式和趋势。可以使用 `GROUP BY` 利用各种组的汇总信息创建报告。使用 `GROUP BY` 通常可以通过减少返回的数据量来提高查询性能。本章将详细阐述这些方面。它探讨了如何使用\
    \ `GROUP BY` 计算总计、平均值、最小值和最大值。此外，它还解释了如何结合使用聚合和窗口函数，使用嵌套 `GROUP BY` 进行更精细的分析，以及如何使用公共表表达式简化复杂查询。\n"
- fmt: '## Essential Aggregation Functions


    In SQL, aggregate functions are powerful tools for calculating data. These functions
    allow you to calculate meaningful statistics from large datasets, which is essential
    for the analysis and reporting of data. Table [5-1](#619961_1_En_5_Chapter.xhtml#Tab1)
    lists the most commonly used aggregation functions in SQL.


    Table 5-1 Commonly Used Aggregation Functions


    | Function | Purpose | Syntax |

    | --- | --- | --- |

    | `COUNT()` | Counts rows or non-`NULL` values | `COUNT(column_name) or COUNT(*)`
    |

    | `SUM()` | Calculates the sum of a numeric column | `SUM(column_name)` |

    | `AVG()` | Computes the average of a numeric column | `AVG(column_name)` |

    | `MIN()` | Finds the smallest value in a column | `MIN(column_name)` |

    | `MAX()` | Finds the largest value in a column | `MAX(column_name)` |

    | `STDDEV()` | Calculates the standard deviation of a numeric column | `STDDEV(column_name)`
    |

    | `VARIANCE()` | Computes the variance of a numeric column | `VARIANCE(column_name)`
    |

    | `MEDIAN()` | Returns the median value of a numeric column | `MEDIAN(column_name)`
    |

    | `PERCENTILE_CONT()` | Calculates a percentile using continuous distribution
    | `PERCENTILE_CONT(percentile) WITHIN GROUP (ORDER BY column_name)` |

    | `PERCENTILE_DISC()` | Calculates a percentile using discrete distribution |
    `PERCENTILE_DISC(percentile) WITHIN GROUP (ORDER BY column_name)` |

    | `STRING_AGG()` | Concatenates values into a single string | `STRING_AGG(column_name,
    delimiter)` |

    | `ARRAY_AGG()` | Aggregates values into an array | `ARRAY_AGG(column_name)` |

    | `MODE()` | Finds the most frequent value in a column | `MODE()` |

    | `BIT_AND()` | Computes the bitwise `AND` of all non-`NULL` input values | `BIT_AND(column_name)`
    |

    | `BIT_OR()` | Computes the bitwise `OR` of all non-`NULL` input values | `BIT_OR(column_name)`
    |


    A wide range of data summarization tasks can be accomplished with these aggregation
    functions. In addition to covering the most common statistical analysis, data
    reporting, and aggregation needs, they are also fundamental tools for anyone using
    PostgreSQL. To begin the journey of effective data grouping, meaningful summaries,
    and valuable insight extraction, you use these functions along with `GROUP BY`.'
