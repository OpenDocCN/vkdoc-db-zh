- fmt: "### Case Sensitivity\n\nThe assumption that case insensitivity applies to\
    \ string comparisons is another common mistake. It is possible for SQL to behave\
    \ differently depending on the database in terms of case sensitivity. PostgreSQL\
    \ is case-sensitive by default. Identifiers, such as table names, column names,\
    \ and data values, are treated according to their case. For instance, `SELECT\
    \ * FROM Users` will not return results for a table named `users`.\n\nAssume you\
    \ need to find a user with the last name `smith`. The following query would miss\
    \ entries like `'Smith'` or `'SMITH'`, depending on the database’s tagging settings.\n\
    \n```sql\nSELECT * FROM Employees WHERE LastName = 'smith'\n```\n\nThe solution\
    \ is to use functions or adjust collation settings to ensure case-insensitive\
    \ comparisons:\n\n```sql\nSELECT * FROM Employees WHERE LOWER(LastName) = 'smith'\n\
    ```\n\nBy converting `LastName` to lowercase, the query correctly identifies all\
    \ variations of `'smith'`.\n\nNote\n\nBoth `UPPER` and `LOWER` follow similar\
    \ syntax. It is important to keep in mind that the order in which your results\
    \ are sorted might be affected by the use of `UPPER` or `LOWER`. Due to the fact\
    \ that uppercase letters are usually sorted before lowercase letters, the sorted\
    \ order may differ from the original case-sensitive order.\n\n## Summary\n\nAs\
    \ part of an effort to improve data querying skills, this chapter explored the\
    \ use of the `WHERE` clause. By understanding the `WHERE` clause and its related\
    \ functions, you can write more efficient and accurate SQL queries.\n\n## Key\
    \ Points\n\n*   `WHERE`: Filters records based on specified conditions.\n*   `Dates\
    \ in SQL`: Handles date and time data types, allowing accurate date-based queries.\n\
    *   `BETWEEN`: Selects values within a given range, including endpoints.\n*  \
    \ `SQL pattern matching`: Uses `LIKE` to search for patterns within text fields.\n\
    *   `CAST`: Converts a value from one data type to another to ensure proper comparison\
    \ and manipulation.\n*   `Common Mistakes When Using WHERE in SQL`:\n    *   `Data\
    \ types`: Ensure compatibility between data types to avoid errors.\n    *   `NULL\
    \ values`: Properly handle `NULL` values as they represent unknown or missing\
    \ data, which can affect query results.\n    *   `Logical mistakes`: Avoid errors\
    \ in combining conditions with `AND` and `OR` by understanding operator precedence\
    \ and using parentheses.\n    *   `Case sensitivity`: SQL may be case-sensitive,\
    \ which may affect text-based conditions and comparisons.\n\n## Key Takeaways\n\
    \n*   `WHERE clause`: Essential for filtering records based on specified conditions\
    \ and enabling precise data retrieval.\n*   `Dates in SQL`: Proper handling of\
    \ date and time data types is crucial for accurate date-based queries and comparisons.\n\
    *   `BETWEEN operator`: Useful for selecting values within a specific range, including\
    \ the endpoints, simplifying range queries.\n*   `SQL pattern matching`: The `LIKE`\
    \ operator allows for searching text fields using patterns, making it easier to\
    \ find records that match specific criteria.\n*   `CAST function`: Converts values\
    \ from one data type to another, ensuring proper comparison and manipulation in\
    \ SQL queries.\n\n## Looking Ahead\n\nThe next chapter, “Complex Characters with\
    \ JOINs,” explores the various types of `JOIN` operations, which are fundamental\
    \ for combining data from multiple tables. Mastery of this operation will enable\
    \ you to create complex queries that provide deeper insights and more comprehensive\
    \ analyses of your datasets.\n\n## Test Your Skills\n\n1.  A library manager wants\
    \ to create a report displaying the titles and publication years of books published\
    \ between 2000 and 2010, inclusive. Additionally, she would like to filter out\
    \ any titles that contain the word *Guide*. Write a query that retrieves the title\
    \ and publicationyear for these books.\n2.  An online marketplace manager wants\
    \ to analyze the prices of items listed in the Electronics category that are priced\
    \ between $50 and $500. The prices are stored as strings. Write a query that retrieves\
    \ the `ItemID`, `ItemName`, and `Price` (cast to a decimal) for items in this\
    \ category and price range.\n3.  The owner of a fitness app wants to generate\
    \ a report on users who have walked more than five kilometers in any single session.\
    \ The `DistanceWalked` is stored in meters. Retrieve `UserID`, `SessionID`, and\
    \ `DistanceWalked` (converted to kilometers) for these sessions.\n4.  A music\
    \ streaming service wants to identify all the songs that were released prior to\
    \ the year 2000 and contain the word *Love* in the title. Write a query that retrieves\
    \ the `SongID`, `SongTitle`, and `ReleaseYear` for these songs.\n\n# 4. Complex\
    \ Characters with JOINs\n\n`JOIN`s in SQL are operations that allow you to combine\
    \ the rows of two or more tables based on a related column between them. In most\
    \ real-world applications, analyzing data comprehensively requires more than just\
    \ considering a single table. For a comprehensive analysis, it is very important\
    \ and necessary to consider different dimensions, thus, using the `JOIN`s operation\
    \ allows you to reach a comprehensive analysis. In a relational database, data\
    \ is often normalized and spread across different tables to reduce redundancy\
    \ and ensure data integrity. `JOIN`s enable you to bring this scattered data together\
    \ and provide a unified view that can be used for better analysis and reporting.\n\
    \n## Introduction to JOINs\n\n`JOIN`s in SQL are operations that are essential\
    \ for querying relational databases because they enable you to extract meaningful\
    \ information from multiple tables by linking their data.\n\n### Importance of\
    \ JOINs in Storytelling with Data\n\nJOINs are critical to data storytelling because\
    \ they allow analysts to create a narrative by combining related pieces of information\
    \ scattered across multiple tables. For example, to analyze customer orders, you\
    \ might need data from three tables: `Customers`, `Orders`, and `Products`. `JOIN`s\
    \ enables you to join these tables together and extract a coherent dataset that\
    \ provides insights into customer buying behaviors, product popularity, and sales\
    \ performance. By using the `JOIN`s operator in your queries, you can achieve\
    \ the following advantages.\n\n*   Combine data from multiple sources\n*   Perform\
    \ in-depth analysis with access to all relevant data points\n*   Create complex\
    \ queries that can answer more complex questions"
