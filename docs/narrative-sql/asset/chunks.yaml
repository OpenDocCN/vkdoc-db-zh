    | 类别 | 类型 | 基本语法 |

    | --- | --- | --- |

    | `SELECT` | 基础 `SELECT` | `SELECT column1, column2 FROM table_name;` |

    | 选择所有列 | `SELECT * FROM table_name;` |

    | 选择并起别名 | `SELECT column1 AS col1, column2 AS "Column 2" FROM table_name;` |

    | 选择不重复值 | `SELECT DISTINCT column1 FROM table_name;` |

    | 带条件的选择 | `SELECT * FROM table_name WHERE condition;` |

    | 限制结果数量 | `SELECT * FROM table_name LIMIT 10;` |

    | 结果偏移 | `SELECT * FROM table_name OFFSET 10 LIMIT 10;` |

    | 过滤 | 基础比较运算符 | `SELECT * FROM table_name WHERE column1 = value;  -- 等于`<br>`SELECT
    * FROM table_name WHERE column1 > value;  -- 大于`<br>`SELECT * FROM table_name
    WHERE column1 >= value;  -- 大于等于`<br>`SELECT * FROM table_name WHERE column1 <
    value;  -- 小于`<br>`SELECT * FROM table_name WHERE column1 <= value;  -- 小于等于`<br>`SELECT
    * FROM table_name WHERE column1 != value; -- 不等于`<br>`SELECT * FROM table_name
    WHERE column1 <> value;  -- 不等于（替代写法）` |

    | 逻辑运算符 | `SELECT * FROM table_name WHERE condition1 AND condition2;  -- 与`<br>`SELECT
    * FROM table_name WHERE condition1 OR condition2;  -- 或`<br>`SELECT * FROM table_name
    WHERE NOT condition;  -- 非` |

    | `NULL` 检查 | `SELECT * FROM table_name WHERE column1 IS NULL;`<br>`SELECT * FROM
    table_name WHERE column1 IS NOT NULL;` |

    | 模式匹配 | `SELECT * FROM table_name WHERE column1 LIKE ''pattern%'';  -- 以 ''pattern''
    开头`<br>`SELECT * FROM table_name WHERE column1 LIKE ''%pattern'';  -- 以 ''pattern''
    结尾`<br>`SELECT * FROM table_name WHERE column1 LIKE ''%pattern%'';  -- 包含 ''pattern''`<br>`SELECT
    * FROM table_name WHERE column1 ILIKE ''%pattern%'';  -- 不区分大小写的 LIKE` |

    | 范围检查 | `SELECT * FROM table_name WHERE column1 BETWEEN value1 AND value2;`<br>`SELECT
    * FROM table_name WHERE column1 NOT BETWEEN value1 AND value2;` |

    | 列表检查 | `SELECT * FROM table_name WHERE column1 IN (value1, value2, value3);`<br>`SELECT
    * FROM table_name WHERE column1 NOT IN (value1, value2, value3);` |

    | 排序 | 基础排序 | `SELECT * FROM table_name ORDER BY column1;                -- 默认为升序(ASC)`<br>`SELECT
    * FROM table_name ORDER BY column1 ASC;            -- 升序`<br>`SELECT * FROM table_name
    ORDER BY column1 DESC;           -- 降序`<br>`SELECT * FROM table_name ORDER BY
    column1 DESC, column2 ASC;  -- 多列排序` |


    表 A-15 说明了 SQL 聚合与分组函数，展示了如何执行计数、求和、平均值等数据操作，以及如何对聚合结果进行分组和过滤。


