    EXPLAIN SELECT p.name, s.strokes

    FROM scores s

    JOIN players p ON s.player_id = p.player_id

    JOIN tournaments t ON s.tournament_id = t.tournament_id

    WHERE t.name = ''Masters Tournament'' AND s.strokes < 70;

    ```


    The query retrieves player names and strokes for scores under 70 in the Masters
    Tournament. It joins three tables: `Scores`, `Players`, and `Tournaments`. The
    `JOIN` condition links `scores.player_id` with `players.player_id` and `scores.tournament_id`
    with `tournaments.tournament_id`. The `WHERE` clause filters the results to include
    only scores less than 70 and tournaments named `Masters Tournament`.


    Due to the `EXPLAIN` command, executing this query will show these results:


    ```

