    \ 检查日期是否在指定范围内。 | `SELECT * FROM Orders WHERE OrderDate BETWEEN '2023-01-01' AND\
    \ '2023-12-31';` |\n| `TIMESTAMPDIFF()` | 以指定单位计算两个日期或日期/时间值之间的差值。例如，秒、分钟、小时、天、周、月和年。\
    \ | `SELECT TIMESTAMPDIFF(DAY, '2023-01-01', '2023-12-31');` |\n\n### 超越精确匹配\n\
    假设你正在搜索一本书名，但只能回忆起其中一个片段。你可以在 SQL 中使用 `LIKE` 操作符，通过使用通配符来匹配文本数据中的部分匹配项。这样，即使搜索词不够精确，你也能发现相关信息，使文本搜索更容易。表\
    \ 3-10 提供了 SQL 中模式匹配的概述，重点关注通配符和 `LIKE` 操作符。\n\n表 3-10\nSQL 模式匹配总结\n\n| 模式匹配技术\
    \ | 描述 | 示例 | 结果 |\n| --- | --- | --- | --- |\n| % (百分号) | 匹配任意字符序列（包括零个字符）。 |\
    \ `WHERE Name LIKE 'J%'` | 以 `'J'` 开头的名字，如 `'John'`、`'Jane'` 和 `'Jack'`。 |\n|\
    \ `_` (下划线) | 精确匹配一个字符。 | `WHERE Name LIKE 'J_n'` | 类似 `'Jon'`、`'Jan'` 的名字，但不是\
    \ `'John'`。 |\n| `[charlist]` | 匹配指定范围或集合内的任意单个字符。 | `WHERE Name LIKE 'J[aeiou]n'`\
    \ | 类似 `'Jan'`、`'Jen'`、`'Jin'`、`'Jon'` 和 `'Jun'` 的名字。 |\n| `[^charlist]` 或 `[!charlist]`\
    \ | 匹配不在指定范围或集合内的任意单个字符。 | `WHERE Name LIKE 'J[^aeiou]n'` 或 `WHERE Name LIKE 'J[!aeiou]n'`\
    \ | 类似 `'Jyn'`、`'Jhn'` 和 `'Jzn'` 的名字。 |\n| `%...%` | 匹配指定模式前后任意字符序列。 | `WHERE\
    \ Name LIKE '%son%'` | 包含 `'son'` 的名字，例如 `'Johnson'`、`'Jackson'`。 |\n| `%_` |\
    \ 组合 `%` 和 `_`，匹配任意序列后紧跟一个字符。 | `WHERE Name LIKE '%_n'` | 以 `'n'` 结尾，且前面至少有一个字符的名字。\
    \ |\n\n## 子查询筛选\n子查询允许你创建高度特定的筛选条件。子查询可以根据子查询的结果动态生成筛选条件来处理复杂筛选。子查询使你能够从多个角度探索数据。为了保持主查询的整洁和易于理解，你可以将复杂的筛选逻辑封装在子查询中。——例如，在查找销售额高于去年的产品时。平均值可以由子查询计算出来，然后使用该值进行筛选。\n\
    \n```sql\nSELECT product_id, sales_volume, year\nFROM sales_data\nWHERE sales_volume\
    \ > (\n    SELECT AVG(sales_volume)\n    FROM sales_data\n    WHERE year = 2023\n\
    ) AND year = 2024\n```\n\n本质上，此查询首先计算上一年的平均销售额，然后筛选本年度的销售数据，仅显示那些销售额超过该平均值的产品。假设\
    \ `sales_data` 表包含诸如 `product_id`（每个产品的唯一标识符）、`sales_volume`（特定年份每个产品的销售数量）和 `year`（销售数据的年份）等列，这个嵌套查询可以找到今年所有销售额高于去年平均值的产品。\n"
- fmt: '## The Second Story: A Football Academy


    A new batch of young football players joined the club. However, with this number
    of players on hand, how can the coaches identify the most promising players? Maria,
    the club’s data analyst, wants to analyze the data obtained by football club talent
    scouts. This includes `Player_id`, `name`, `age`, `position` (the playing position,
    such as `Defender`, `Midfielder`, `Striker`, or `Goalkeeper`), `goals_or_saves`
    (the number of goals scored in practice matches or saves made by the goalkeeper),
    `assists`, and `games_played` (the total number of practice matches played). Table
    [3-11](#619961_1_En_3_Chapter.xhtml#Tab11) shows the data obtained by football
    club talent scouts.


    **Table 3-11**


    **Players Table: Young Football Players Data**


    | player_id | Name | Age | Position | goals_scored | Assists | games_played |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1 | Alex Jones | 16 | Midfielder | 8 | 3 | 12 |

    | 2 | Ben Miller | 18 | Defender | 1 | 2 | 10 |

    | 3 | Charlie Brown | 17 | Forward | 12 | 1 | 15 |

    | 4 | David Lee | 15 | Midfielder | 5 | 4 | 8 |

    | 5 | Emily Garcia | 16 | Defender | 0 | 1 | 7 |

    | 6 | Faye Williams | 17 | Forward | 7 | 2 | 11 |

    | 7 | George Smith | 18 | Midfielder | 4 | 5 | 9 |

    | 8 | Hannah Davis | 15 | Defender | 2 | 0 | 5 |

    | 9 | Isabella Moore | 16 | Forward | 9 | 3 | 14 |

    | 10 | Jack Robinson | 18 | Defender | 3 | 1 | 12 |

    | 11 | Kevin Thomas | 17 | Midfielder | 6 | 4 | 10 |

    | 12 | Lily Johnson | 15 | Forward | 4 | 2 | 8 |


    The questions Maria is looking to answer are as follows:


    1.  How many U17 players (players under 17 years of age) have scored more than
    five goals?

    2.  Are there any players who consistently play (`games_played >= 10`) and have
    a high goal scoring average (`goals_scored / games_played > 0.5`)?

    3.  Which players have scored more goals than the average number of goals scored
    by all players?

    4.  Which players are younger than 17 and have more assists than the average assists
    of players aged 18?


    To answer the question “How many U17 players have scored more than five goals?”,
    Maria needs to filter the `Players` table to include only those players who are
    under 17 and have scored more than five goals. Afterward, she can count how many
    players there are.


    ```

    SELECT COUNT(*)

    FROM Players

    WHERE age  5;

    ```


    `WHERE age < 17` is a condition that filters players who are under 17 years of
    age, and `goals_scored > 5` is a condition that further filters players who have
    scored more than five goals. `SELECT COUNT(*)` counts the number of players who
    meet these conditions.


    Running the query on the given table will yield the number of U17 players who
    have scored more than five goals. Based on the provided data, the players who
    meet these criteria are Alex Jones (16 years old, 8 goals scored) and Isabella
    Moore (16 years old, 9 goals scored). Therefore, the number of U17 players who
    have scored more than five goals is two.


    To find players who have played at least ten games and have a goal scoring average
    greater than 0.5, Maria would use this query:


    ```

    SELECT name, goals_scored, games_played, (goals_scored / games_played) AS goal_scoring_average

    FROM Players

    WHERE games_played >= 10 AND (goals_scored / games_played) > 0.5;

    ```


    Based on the `games_played >= 10` and `(goals_scored / games_played) > 0.5` conditions,
    the players who meet these criteria are shown in Table [3-12](#619961_1_En_3_Chapter.xhtml#Tab12).
    This table provides the names, goals scored, games played, and calculated goal-scoring
    averages for the players who satisfy the query’s conditions.


    **Table 3-12**


    **Players Who Have Played at Least Ten Games and Have a Goal Scoring Average Greater
    Than 0.5**


    | Name | goals_scored | games_played | goal_scoring_average |

    | --- | --- | --- | --- |

    | Alex Jones | 8 | 12 | 0.66 |

    | Charlie Brown | 12 | 15 | 0.80 |

    | Faye Williams | 7 | 11 | 0.63 |

    | Isabella Moore | 9 | 14 | 0.64 |

    | Kevin Thomas | 6 | 10 | 0.60 |


    During this time, a player named Jack Robinson asked Maria why he was not included
    on the list. Maria explains the reason for not choosing him. This result is obtained
    by applying the conditions to Jack Robinson’s data. Condition 1 is `games_played
    >= 10`. Jack Robinson played 12 games, so this condition is satisfied. Condition
    2 is `(goals_scored / games_played) > 0.5`. Jack Robinson scored three goals in
    12 games. His goal-scoring average is 3/12=0.25\. Since the goal-scoring average
    of 0.25 is not greater than 0.5, Jack Robinson does not meet the second condition.
    Therefore, he is not included in the query resulting table. This illustrates the
    importance of both conditions being met for a player to be included in the query
    results.


    The following nested queries can be used to identify players who have scored more
    goals than the average number of goals scored by each player:


    ```

    SELECT name, goals_scored

    FROM Players

    WHERE goals_scored > (SELECT AVG(goals_scored) FROM Players);

    ```


    The main query selects the players’ names and goals scored. The subquery, `SELECT
    AVG(goals_scored) FROM Players`, calculates the average number of goals scored
    by all players in the `Players` table. The `WHERE` clause in the main query checks
    if the `goals_scored` by each player is greater than the average goals scored
    calculated by the subquery. See Table [3-13](#619961_1_En_3_Chapter.xhtml#Tab13).


    **Table 3-13**


    **Players Who Have Scored More Goals Than the Average Number of Goals Scored by
    All Players in the Academy**


    | Name | goals_scored |

    | --- | --- |

    | Alex Jones | 8 |

    | Charlie Brown | 12 |

    | Faye Williams | 7 |

    | Isabella Moore | 9 |

    | Kevin Thomas | 6 |


    As shown in Table [3-13](#619961_1_En_3_Chapter.xhtml#Tab13), the result of this
    query shows players who have scored more goals than the average number of goals
    scored by all players in the academy.


    **Note**


    By using nested SQL queries, it is possible to execute subqueries within the `WHERE`
    clause. Data can be filtered based on complex conditions derived from other parts
    of the same table in this manner. A powerful and insightful query can be created
    by using subqueries to calculate dynamic values (such as averages).


    The following query can be used to identify players who are younger than 17 and
    have more assists than average compared to players aged 18 and older:


    ```

    SELECT name, age, assists

    FROM Players

    WHERE age  (SELECT AVG(assists) FROM Players WHERE age = 18);

    ```


    In the main query, `names`, `age`, and `assists` are selected. The subquery, `SELECT
    AVG(assists) FROM Players WHERE age = 18`, determines the average number of assists
    provided by players aged 18\. In the main query, the `WHERE` clause ensures that
    only players who younger than 17 and who have more assists than the average assists
    for 18-year-olds are selected. Table [3-14](#619961_1_En_3_Chapter.xhtml#Tab14)
    shows the result of this query, identifying the players.


    **Table 3-14**


    **Players Who Are Younger Than 17 and Have More Assists Than the Average Number
    of Assists Recorded by Players Aged Exactly 18**


    | Name | Age | Assists |

    | --- | --- | --- |

    | Alex Jones | 16 | 3 |

    | David Lee | 15 | 4 |

    | Isabella Moore | 16 | 3 |


    ## Common Mistakes When Using WHERE in SQL and How to Avoid Them


    This section introduces common errors associated with the use of the `WHERE` clause.
    Querying using `WHERE` clauses requires careful attention to data type, null values,
    and case sensitivities.'
