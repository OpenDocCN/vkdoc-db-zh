    publication_date FROM articles ORDER BY publication_date DESC;` | Lists all blog
    articles, starting with the most recently published ones. |

    | Financial transactions sorted by amount | Identify large transactions; useful
    for fraud detection. | `SELECT transaction_id, transaction_amount FROM transactions
    ORDER BY transaction_amount DESC;` | Displays all transactions, sorted by amount
    from highest to lowest. |

    | Customers with the highest lifetime value | Identify valuable customers based
    on the total revenue generated. | `SELECT customer_id, lifetime_value FROM customers
    ORDER BY lifetime_value DESC LIMIT 10;` | Retrieves the top ten customers by lifetime
    value, in descending order. |

    | Movies sorted by rating | Show the highest-rated movies first; useful for recommendation
    systems or reviews. | `SELECT movie_name, rating FROM movies ORDER BY rating DESC;`
    | Lists all movies, starting from the highest to the lowest rating. |

