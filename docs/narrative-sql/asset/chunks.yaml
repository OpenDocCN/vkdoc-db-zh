- fmt: "### NULLIF\n\n`NULLIF` 函数通过在两个值相等时返回 `NULL` 来防止错误。`NULLIF` 是一个强大的 SQL 函数，可防止被零除错误，并在数据分析过程中处理空值。本质上，它允许你将特定值替换为\
    \ `NULL`，这在执行百分比或比率等可能因零值导致计算问题的计算时至关重要。使用 `NULLIF`，数据分析师和数据库专业人员可以通过将潜在的有问题的零值转换为\
    \ `NULL`，来创建可靠、防错的查询，用于报告、绘图和统计分析。在数据转换中，这提供了一种处理边缘情况的干净、健壮的方法。\n\n#### 注意\n\n\
    在 SQL 中，某些常见情况如果不小心处理，可能会导致错误或意外行为。这些情况包括被零除、区分空字符串与 `NULL` 值、日期范围边界、字符串比较中的大小写敏感性、数值精度损失以及在空数据集上的聚合。这些并非罕见的边缘情况；它们是编写健壮\
    \ SQL 查询的关键考虑因素，应在数据处理过程中明确处理。\n\n例如，在目标为零或数据缺失的情况下，`NULLIF` 可用于分析以下员工绩效指标数据。表\
    \ 8-6 显示了员工绩效指标，包括销售额、目标、培训小时数和完成的项目。这提供了每位员工的销售成就与其目标的结构化视图。\n\n**表 8-6**\n\n\
    **performance_metrics 数据表（员工绩效指标）**\n\n| emp_id | Name | Sales | Target | training_hours\
    \ | projects_completed |\n| --- | --- | --- | --- | --- | --- |\n| 101 | Alice\
    \ | 50000 | 45000 | 20 | 5 |\n| 102 | Bob | 30000 | 0 | 15 | 3 |\n| 103 | Charlie\
    \ | 75000 | 60000 | 0 | 8 |\n| 104 | Diana | 45000 | 40000 | 25 | 0 |\n| 105 |\
    \ Eve | 0 | 35000 | 30 | 4 |\n| 106 | Frank | 85000 | 80000 | 10 | 7 |\n| 107\
    \ | Grace | 25000 | 30000 | 0 | 2 |\n| 108 | Henry | 55000 | 0 | 40 | 6 |\n| 109\
    \ | Ivy | 65000 | 50000 | 35 | 0 |\n| 110 | Jack | 40000 | 45000 | 0 | 5 |\n\n\
    以下查询通过计算关键指标（如目标达成率、生产率比率和绩效方差）来评估员工绩效。它使用 CTE 首先计算目标达成率百分比，并使用 `NULLIF(target,\
    \ 0)` 处理被零除的情况。生产率比率是根据完成的项目相对于培训小时数得出的，而绩效方差衡量与销售目标的偏差。主查询根据预定义阈值将员工分类为绩效状态和效率等级。`NULL`\
    \ 值被有效处理，确保了稳健的数据分析。在此查询中，结果按目标达成率排序，将高绩效员工排在前面。\n\n```sql\nWITH performance_metrics\
    \ AS (\n    SELECT\n        emp_id,\n        name,\n        ROUND(\n         \
    \   sales::numeric / NULLIF(target, 0) * 100,\n            2\n        ) AS target_achievement,\n\
    \        ROUND(\n            projects_completed::numeric / NULLIF(training_hours,\
    \ 0) * 100,\n            2\n        ) AS productivity_ratio,\n        CASE\n \
    \           WHEN sales = 0 THEN NULL\n            WHEN target = 0 THEN NULL\n\
    \            ELSE ROUND((sales - target)::numeric / target * 100, 2)\n       \
    \ END AS performance_variance\n    FROM employee_metrics\n)\nSELECT\n    pm.*,\n\
    \    CASE\n        WHEN target_achievement IS NULL THEN 'Invalid Target'\n   \
    \     WHEN target_achievement >= 100 THEN 'Exceeded'\n        WHEN target_achievement\
    \ >= 80 THEN 'On Track'\n        ELSE 'Below Target'\n    END AS performance_status,\n\
    \    CASE\n        WHEN productivity_ratio IS NULL THEN 'No Training Data'\n \
    \       WHEN productivity_ratio > 20 THEN 'High Efficiency'\n        WHEN productivity_ratio\
    \ > 10 THEN 'Moderate Efficiency'\n        ELSE 'Needs Improvement'\n    END AS\
    \ efficiency_rating\nFROM performance_metrics pm\nORDER BY target_achievement\
    \ DESC NULLS LAST;\n```\n\n此查询使用 `NULLIF` 函数来处理潜在的除法错误并确保计算准确，这很好地示例了 `NULLIF`\
    \ 扮演的重要角色。通过应用 `NULLIF(target, 0)`，查询在计算目标达成率时防止了被零除。`NULLIF(training_hours, 0)`\
    \ 确保即使没有培训小时数，生产率计算也保持有效。此外，`NULLIF` 与 `CASE` 语句结合使用，以创建有意义的分类。这允许查询在单一分析中管理各种零和\
    \ `NULL` 场景。\n\n在此查询中，使用了 `::numeric` 转换来确保小数除法和精确舍入，特别是在原始数据类型可能是整数的情况下。例如，不进行转换，两个整数相除可能导致整数除法，例如\
    \ 1/2 = 0 而不是 0.5。如果涉及的列已经是 `NUMERIC` 或 `DECIMAL` 类型，则可以安全地移除这些转换。但是，如果模式使用 `INTEGER`\
    \ 或 `TEXT`，显式转换可保证在除法和舍入操作期间行为一致。\n\n在此查询中，使用 `WITH` 子句创建了一个名为 `performance_metrics`\
    \ 的 CTE。此 CTE 根据 `employee_metrics` 表计算员工的多个绩效相关指标。定义 CTE 后，主查询从中选择并根据计算出的指标添加列（`performance_status`\
    \ 和 `efficiency_rating`）。\n\n#### 注意\n\n如前面章节所述，`WITH` 子句，也称为 CTE（公共表表达式），允许你定义一个临时结果集，该结果集可以在\
    \ `SELECT`、`INSERT`、`UPDATE` 或 `DELETE` 语句中引用。它通常用于通过将复杂查询分解为更小、更易管理的部分来简化复杂查询。`WITH`\
    \ 子句的基本语法如下：\n\n```sql\nWITH cte_name AS (\n    -- 定义 CTE 的子查询\n    SELECT ...\n\
    \    FROM ...\n    WHERE ...\n)\n-- 引用 CTE 的主查询\nSELECT ...\nFROM cte_name\nWHERE\
    \ ...\n```\n\n原始指标到可操作见解的转换是通过安全计算目标达成率百分比、无错误地计算生产率比率、确定绩效方差以及对绩效和效率水平进行分类来实现的。此外，该查询考虑了目标或培训小时数为零的边缘情况，确保分析保持稳健。此示例突出了\
    \ `NULLIF` 在数据分析中起着至关重要的作用，尤其是在处理包含缺失值或零条目的真实世界数据集时。参见表 8-7。\n\n**表 8-7**\n\n\
    **安全计算目标达成百分比的结果**\n\n| emp_id | name | target_achievement | productivity_ratio\
    \ | performance_variance | performance_status | efficiency_rating |\n| --- | ---\
    \ | --- | --- | --- | --- | --- |\n| 106 | Frank | 106.25 | 70 | 6.25 | Exceeded\
    \ | High Efficiency |\n| 103 | Charlie | 125 | `NULL` | 25 | Exceeded | No Training\
    \ Data |\n| 109 | Ivy | 130 | 0 | 30 | Exceeded | Needs Improvement |\n| 101 |\
    \ Alice | 111.11 | 25 | 11.11 | Exceeded | High Efficiency |\n| 104 | Diana |\
    \ 112.5 | 0 | 12.5 | Exceeded | Needs Improvement |\n| 110 | Jack | 88.89 | `NULL`\
    \ | -11.11 | On Track | No Training Data |\n| 107 | Grace | 83.33 | `NULL` | -16.67\
    \ | On Track | No Training Data |\n| 105 | Eve | 0 | 13.33 | -100 | Below Target\
    \ | Moderate Efficiency |\n| 102 | Bob | `NULL` | 20 | `NULL` | Invalid Target\
    \ | Moderate Efficiency |\n| 108 | Henry | `NULL` | 15 | `NULL` | Invalid Target\
    \ | Moderate Efficiency |"
  raw: '### NULLIF


    The `NULLIF` function prevents errors by returning `NULL` if two values are equal.
    `NULLIF` is a powerful SQL function that prevents division by zero errors and
    handles null values during data analysis. In essence, it allows you to replace
    a specific value with `NULL`, which is crucial when performing calculations like
    percentages or ratios where zero could cause computational issues. Using `NULLIF`,
    data analysts and database professionals can create reliable, error-resistant
    queries for reporting, plotting, and statistical analysis by converting potentially
    problematic zero values to `NULL`. In data transformation, this provides a clean,
    robust way to deal with edge cases.


    Note


    In SQL, certain common scenarios can lead to errors or unexpected behavior if
    they aren''t handled carefully. These include division by zero, distinguishing
    between empty strings and `NULL` values, date range boundaries, case sensitivity
    in string comparisons, numerical precision loss, and aggregation over empty datasets.
    These are not rare edge cases; they are critical considerations in writing robust
    SQL queries and should be explicitly handled during data processing.


    In the case of zero targets or missing data, for instance, `NULLIF` can be used
    to analyze the following employee performance metrics data. Table [8-6](#619961_1_En_8_Chapter.xhtml#Tab6)
    shows employee performance metrics, including sales figures, targets, training
    hours, and completed projects. This gives a structured view of every employee''s
    sales achievements in relation to their targets.


    Table 8-6


    The performance_metrics Data Table (Employee Performance Metrics)


    | emp_id | Name | Sales | Target | training_hours | projects_completed |

    | --- | --- | --- | --- | --- | --- |

    | 101 | Alice | 50000 | 45000 | 20 | 5 |

    | 102 | Bob | 30000 | 0 | 15 | 3 |

    | 103 | Charlie | 75000 | 60000 | 0 | 8 |

    | 104 | Diana | 45000 | 40000 | 25 | 0 |

    | 105 | Eve | 0 | 35000 | 30 | 4 |

    | 106 | Frank | 85000 | 80000 | 10 | 7 |

    | 107 | Grace | 25000 | 30000 | 0 | 2 |

    | 108 | Henry | 55000 | 0 | 40 | 6 |

    | 109 | Ivy | 65000 | 50000 | 35 | 0 |

    | 110 | Jack | 40000 | 45000 | 0 | 5 |


    The following query evaluates employee performance by calculating key metrics
    such as target achievement, productivity ratio, and performance variance. Using
    a CTE, it first computes target achievement as a percentage while handling division
    by zero with `NULLIF(target, 0)`. The productivity ratio is derived from completed
    projects relative to training hours, and performance variance measures deviation
    from sales targets. The main query categorizes employees into performance statuses
    and efficiency ratings based on predefined thresholds. `NULL` values are handled
    effectively, ensuring robust data analysis. In this query, the results are sorted
    by target achievement, placing high-performing employees at the top.


    ```

    WITH performance_metrics AS (

    SELECT

    emp_id,

    name,

    ROUND(

    sales::numeric / NULLIF(target, 0) * 100,


    ) AS target_achievement,

    ROUND(

    projects_completed::numeric / NULLIF(training_hours, 0) * 100,


    ) AS productivity_ratio,

    CASE

    WHEN sales = 0 THEN NULL

    WHEN target = 0 THEN NULL

    ELSE ROUND((sales - target)::numeric / target * 100, 2)

    END AS performance_variance

    FROM employee_metrics

    )

    SELECT

    pm.*,

    CASE

    WHEN target_achievement IS NULL THEN ''Invalid Target''

    WHEN target_achievement >= 100 THEN ''Exceeded''

    WHEN target_achievement >= 80 THEN ''On Track''

    ELSE ''Below Target''

    END AS performance_status,

    CASE

    WHEN productivity_ratio IS NULL THEN ''No Training Data''

    WHEN productivity_ratio > 20 THEN ''High Efficiency''

    WHEN productivity_ratio > 10 THEN ''Moderate Efficiency''

    ELSE ''Needs Improvement''

    END AS efficiency_rating

    FROM performance_metrics pm

    ORDER BY target_achievement DESC NULLS LAST;

    ```


    This query uses the `NULLIF` function to handle potential division errors and
    ensure accurate calculations, which makes it a good example of how `NULLIF` plays
    an important role. By applying `NULLIF(target, 0)`, the query prevents division
    by zero when computing target achievement. `NULLIF(training_hours, 0)` ensures
    productivity calculations remain valid even without training hours. Additionally,
    `NULLIF` is combined with `CASE` statements to create meaningful categorizations.
    This allows the query to manage various zero and `NULL` scenarios in a single
    analysis.


    In this query, `::numeric` casting is used to ensure decimal division and precise
    rounding, especially in cases where the original data type might be integers.
    For example, without casting, dividing two integers could result in integer division,
    for instance 1/2 = 0 instead of 0.5\. If the columns involved are already of a
    `NUMERIC` or `DECIMAL` type, the castings can be safely removed. However, if the
    schema uses `INTEGER` or `TEXT`, the explicit cast guarantees consistent behavior
    during division and rounding operations.


    In this query, a `WITH` clause is used to create a CTE named `performance_metrics`.
    This CTE calculates several performance-related metrics for employees based on
    the `employee_metrics` table. After defining the CTE, the main query selects from
    it and adds columns (`performance_status` and `efficiency_rating`) based on the
    calculated metrics.


    Note


    As mentioned in earlier chapters, a `WITH` clause, also known as a CTE (common
    table expression), allows you to define a temporary result set that you can reference
    within a `SELECT`, `INSERT`, `UPDATE`, or `DELETE` statement. It is often used
    to simplify complex queries by breaking them into smaller, more manageable parts.
    The basic syntax of the `WITH` clause is as follows:


    ```

    WITH cte_name AS (

    -- Subquery that defines the CTE

    SELECT ...

    FROM ...

    WHERE ...

    )

    -- Main query that references the CTE

    SELECT ...

    FROM cte_name

    WHERE ...

    ```


    The transformation of raw metrics into actionable insights is achieved by safely
    calculating target achievement percentages. This is done by computing productivity
    ratios without errors, determining performance variance, and categorizing both
    performance and efficiency levels. Moreover, the query accounts for edge cases
    where targets or training hours are zero, ensuring the analysis remains robust.
    This example highlights how `NULLIF` plays a crucial role in data analysis, particularly
    when working with real-world datasets that often include missing values or zero
    entries. See Table [8-7](#619961_1_En_8_Chapter.xhtml#Tab7).


    Table 8-7


    The Result of Safely Calculating Target Achievement Percentages


    | emp_id | name | target_achievement | productivity_ratio | performance_variance
    | performance_status | efficiency_rating |

    | --- | --- | --- | --- | --- | --- | --- |

    | 106 | Frank | 106.25 | 70 | 6.25 | Exceeded | High Efficiency |

    | 103 | Charlie | 125 | `NULL` | 25 | Exceeded | No Training Data |

    | 109 | Ivy | 130 | 0 | 30 | Exceeded | Needs Improvement |

    | 101 | Alice | 111.11 | 25 | 11.11 | Exceeded | High Efficiency |

    | 104 | Diana | 112.5 | 0 | 12.5 | Exceeded | Needs Improvement |

    | 110 | Jack | 88.89 | `NULL` | -11.11 | On Track | No Training Data |

    | 107 | Grace | 83.33 | `NULL` | -16.67 | On Track | No Training Data |

    | 105 | Eve | 0 | 13.33 | -100 | Below Target | Moderate Efficiency |

    | 102 | Bob | `NULL` | 20 | `NULL` | Invalid Target | Moderate Efficiency |

    | 108 | Henry | `NULL` | 15 | `NULL` | Invalid Target | Moderate Efficiency |'
