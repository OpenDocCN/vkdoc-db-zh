- fmt: '## Understanding Indexes


    An `index` in SQL is a data structure that improves a table’s retrieval speed.
    It works like an index in a book—it helps you quickly find specific information
    without scanning the entire content. SQL indexes offer performance benefits, including
    faster search queries, improved sorting and filtering, and efficient joins between
    tables. However, they also consume additional disk space and can slow down `INSERT`,
    `UPDATE`, and `DELETE` operations due to the need to update the index.


    In data analysis, while indexes improve query performance, they also have trade-offs
    that can impact data storage and write operations. They can affect disk space
    and slow down `INSERT`, `UPDATE`, and `DELETE` operations, which are used relatively
    less often in the data analysis process than `SELECT` is.


    Indexes consume additional disk space as they store separate data structures referencing
    table rows. Especially for large datasets and multiple indexes, this can significantly
    increase storage costs and slow down database backups. Furthermore, indexes impact
    `INSERT`, `UPDATE`, and `DELETE` operations. Each time a row is modified, all
    associated indexes must also be updated, adding overhead and slowing down write
    operations. For example, inserting a large number of rows requires updating all
    indexes, significantly increasing insertion time. Therefore, a balance must be
    struck. In data analysis, where reads are frequent but writes are less so, indexes
    are highly beneficial. However, for tables with frequent writes, excessive indexing
    can degrade performance. Optimizations like partial indexes, which index only
    specific data subsets, as well as temporarily disabling indexes during bulk imports
    can mitigate these performance drawbacks.


    > Note

    >

    > There are some database systems that handle indexing in a different way. For
    example, clustered indexes in SQL Server and index-organized tables in Oracle
    store the actual table data within the index itself. In these cases, the distinction
    between index and table data blurs, and storage or performance implications may
    differ slightly.


    ### Basic Syntax for Creating an Index


    The basic syntax for creating an index is provided here:


    ```

    CREATE INDEX index_name ON table_name (column_name);

    ```


    Here, `CREATE INDEX` is the command to create an index. `index_name` is the name
    of the index. It is best to use a descriptive name. `ON table_name` specifies
    the table where the index is created, and `column_name` is the column or columns
    the index is based on.


    ### Types of Indexes in PostgreSQL


    Index types in PostgreSQL are divided into seven types—B-tree index, unique index,
    hash index, generalized inverted index, generalized search tree (GiST) index,
    partial index, and composite index. Each is discussed in more detail in this section.


    #### B-tree Index


    A `B-tree index` is the most common and default index type in PostgreSQL. It is
    particularly effective for equality comparisons using the `=` operator, as well
    as range queries involving operators like `<`, `>`, `<=`, and `>=`. Additionally,
    B-tree indexes significantly speed up sorting operations performed with the `ORDER
    BY` clause. By organizing data in a balanced tree structure, they allow quick
    traversal from root to leaf nodes, ensuring consistent performance even as the
    dataset grows. This makes B-tree indexes ideal for large tables that require frequent
    searches and ordered data retrieval.


    ```

    CREATE INDEX idx_salary ON employees (salary);

    ```


    #### Unique Index


    A `unique index` ensures that all values in a specific column or combination of
    columns are distinct, preventing duplicate entries in the table. PostgreSQL automatically
    creates unique indexes when defining columns with `PRIMARY KEY` or `UNIQUE` constraints.
    For example, a primary key column uses an index to maintain data integrity by
    ensuring each value is unique and non-`NULL`. Similarly, a unique constraint enforces
    distinct values while allowing `NULL`s. Unique indexes are essential for maintaining
    data accuracy, supporting efficient lookups, and optimizing query performance.
    Particularly when validating user input or maintaining referential integrity.


    ```

    CREATE UNIQUE INDEX idx_unique_name ON employees (name);

    ```


    #### Hash Index


    A `hash index` in PostgreSQL is optimized for simple equality comparisons using
    the `=` operator. Unlike B-tree indexes, which support both equality and range
    queries, hash indexes are specifically designed for exact matches, making them
    faster for such queries. This efficiency stems from hashing algorithms that map
    data values to fixed locations, enabling quick lookups. However, hash indexes
    are not suitable for range queries or ordering because they do not maintain data
    order. While they offer faster performance for exact matches, they require more
    careful use since they do not support advanced query types like `<`, `>`, or `ORDER
    BY`.


    ```

    CREATE INDEX idx_hash_department ON employees USING HASH (department);

    ```


    #### Generalized Inverted Index (GIN)


    A `generalized inverted index` (GIN) is designed for indexing complex data structures
    such as arrays, JSON fields, and full-text search in PostgreSQL. Unlike traditional
    B-tree indexes, GIN efficiently handles multiple values stored within a single
    column by mapping each distinct element to the corresponding row entries.


    ```

    CREATE INDEX idx_gin_name ON employees USING GIN (to_tsvector(''english'', name));

    ```


    This index enables fast lookup of words within the name column, significantly
    improving search performance in large datasets.


    #### Generalized Search Tree (GiST) Index


    A `generalized search tree` (GiST) index is a flexible, balanced-tree indexing
    mechanism used for complex data types such as geometric shapes, network addresses,
    and full-text search. Unlike B-trees, GiST indexes allow custom search strategies,
    making them essential for spatial queries and full-text indexing.


    ```

    CREATE INDEX idx_gist_salary ON employees USING GiST (salary);

    ```


    This allows PostgreSQL to quickly locate employees within specific salary bands,
    improving performance for range-based queries. Additionally, GiST indexes support
    nearest-neighbor searches, making them valuable in geospatial applications where
    distance-based queries are common.


    #### Partial Index


    A `partial index` is an optimized index that stores only a subset of table rows,
    reducing storage overhead and improving query performance. PostgreSQL avoids maintaining
    unnecessary index entries by indexing only records that meet a predefined condition,
    leading to faster lookups for queries that frequently filter on the indexed condition.


    ```

    CREATE INDEX idx_high_salary ON employees (salary) WHERE salary > 50000;

    ```


    This index is useful for queries frequently retrieving employees earning more
    than $50,000, making them significantly faster than scanning the entire table.
    Partial indexes are particularly effective in large datasets where a full index
    would be wasteful and unnecessary.'
