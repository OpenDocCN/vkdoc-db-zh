    These insights empowered Alex to make data-driven decisions, optimize inventory
    management, enhance customer satisfaction, and tailor marketing strategies to
    boost overall sales and operational efficiency.


    ## Advanced Filtering


    It is often difficult to interpret data, regardless of how vast it is. Fortunately,
    SQL offers powerful tools that enable you to unlock its mysteries. In this section,
    you learn about advanced filtering techniques.


    ### Using WHERE with Dates


    Filtering records based on date conditions is a fundamental skill in SQL, especially
    crucial for handling time-series data. Dates are often used in reporting, trend
    analysis, and forecasting. The `WHERE` clause enables precise filtering by specific
    dates or ranges, allowing meaningful insights from temporal data. Table [3-9](#619961_1_En_3_Chapter.xhtml#Tab9)
    outlines the key aspects of working with dates in SQL, including the most common
    functions and operations.


    Table 3-9


    SQL Date Handling


    | Operation | Description | Example Use |

    | --- | --- | --- |

    | `CURRENT_DATE` | Returns the current date. | `SELECT CURRENT_DATE;` |

    | `CURRENT_TIMESTAMP` | Returns the current date and time. | `SELECT CURRENT_TIMESTAMP;`
    |

    | `DATE()` | Extracts the date part of a date/time expression. | `SELECT DATE(OrderDate)
    FROM Orders;` |

    | `YEAR()` | Extracts the year part of a date. | `SELECT YEAR(OrderDate) FROM
    Orders;` |

    | `MONTH()` | Extracts the month part of a date. | `SELECT MONTH(OrderDate) FROM
    Orders;` |

    | `DAY()` | Extracts the day part of a date. | `SELECT DAY(OrderDate) FROM Orders;`
    |

    | `DATEDIFF()` | Calculates the difference between two dates. | `SELECT DATEDIFF(''2023-05-10'',
    ''2023-05-01'');` |

    | `DATE_ADD()` | Adds a specified time interval to a date. | `SELECT DATE_ADD(''2023-05-01'',
    INTERVAL 7 DAY);` |

    | `DATE_SUB()` | Subtracts a specified time interval from a date. | `SELECT DATE_SUB(''2023-05-01'',
    INTERVAL 7 DAY);` |

    | `STR_TO_DATE()` | Converts a string to a date. | `SELECT STR_TO_DATE(''01,05,2023'',
    ''%d,%m,%Y'');` |

    | `DATE_FORMAT()` | Formats a date based on a specified format. | `SELECT DATE_FORMAT(OrderDate,
    ''%W %M %Y'') FROM Orders;` |

    | `BETWEEN` | Checks if a date falls within a specified range. | `SELECT * FROM
    Orders WHERE OrderDate BETWEEN ''2023-01-01'' AND ''2023-12-31'';` |

    | `TIMESTAMPDIFF()` | Calculates the difference between two dates or date/time
    values in the specified unit. For instance, seconds, minutes, hours, days, weeks,
    months, and years. | `SELECT TIMESTAMPDIFF(DAY, ''2023-01-01'', ''2023-12-31'');`
    |


    ### Beyond Exact Matching


    Suppose you are searching for a book title but can only recall a fragment of it.
    You can use the `LIKE` operator in SQL to match patterns by using wildcards to
    capture partial matches within text data. In this way, you can uncover relevant
    information even when your search terms are less than precise, making text searches
    easier. An overview of pattern matching in SQL is provided in Table [3-10](#619961_1_En_3_Chapter.xhtml#Tab10),
    with a focus on wildcards and the `LIKE` operator.


    Table 3-10


    SQL Pattern Matching Summary


    | Pattern Matching Technique | Description | Example | Result |

    | --- | --- | --- | --- |

    | % (percent) | Matches any sequence of characters (including zero characters).
    | `WHERE Name LIKE ''J%''` | Names starting with `''J''`, like `''John''`, `''Jane''`,
    and `''Jack''`. |

    | `_` (underscore) | Matches exactly one character. | `WHERE Name LIKE ''J_n''`
    | Names like `''Jon''`, `''Jan''`, but not `''John''`. |

    | `[charlist]` | Matches any single character within the specified range or set.
    | `WHERE Name LIKE ''J[aeiou]n''` | Names like `''Jan''`, `''Jen''`, ''`Jin''`,
    `''Jon''`,and `''Jun''`. |

    | `[^charlist]` or `[!charlist]` | Matches any single character not within the
    specified range or set. | `WHERE Name LIKE ''J[^aeiou]n'' or WHERE Name LIKE ''J[!aeiou]n''`
    | Names like `''Jyn''`, `''Jhn''`,and `''Jzn''`. |

    | `%...%` | Matches any sequence of characters, both before and after the specified
    pattern. | `WHERE Name LIKE ''%son%''` | Names containing `''son''`, e.g., `''Johnson''`,
    `''Jackson''`. |

    | `%_` | Combines `%` and `_` to match any sequence followed by exactly one character.
    | `WHERE Name LIKE ''%_n''` | Names ending with `''n''` and having at least one
    preceding character. |


    ## Subquery Filtering


    Subqueries allow you to create highly specific filtering criteria. A subquery
    can handle complex filtering by dynamically generating the filter condition based
    on the subquery’s results. Subqueries empower you to explore data from multiple
    angles. In order to keep your main query clean and easy to understand, you can
    encapsulate complex filtering logic within a subquery.—in the case of finding
    products with a higher sales volume than the previous year, for example. The average
    can be calculated by a subquery and then filtered using that value.


    ```

    SELECT product_id, sales_volume, year

    FROM sales_data

    WHERE sales_volume > (

    SELECT AVG(sales_volume)

    FROM sales_data

    WHERE year = 2023

    ) AND year = 2024

    ```


    In essence, this query first calculates the average sales volume for the previous
    year and then filters the current year’s sales data to show only products that
    have exceeded that average. By assuming that the `sales_data` table has columns
    like `product_id` (a unique identifier for each product), `sales_volume` (the
    number of units sold for each product in a specific year), and `year` (the year
    of the sales data), this nested query can find all the products sold this year
    with a higher sales volume than last year’s average.'
