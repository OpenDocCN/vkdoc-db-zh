- fmt: "## The Second Story: Speedy Motors Company\n\nAt a fast-growing automobile\
    \ manufacturer, management is excited to gather insights from a data table that\
    \ contains information about sales, customers, and vehicles. Their company hired\
    \ Anna, a data analyst, to help them make sense of the data and provide meaningful\
    \ insights to drive business decisions. The company collects data on car sales,\
    \ customer demographics, pricing, and production. Anna needs to perform the following\
    \ advanced data analysis in order to answer their key business questions. Anna\
    \ is working with the `Car Sales` table, shown in Table 5-12, which contains records\
    \ of car sales, including the region, model name, sale date, and sales amount.\n\
    \n**Table 5-12**  \n**The Car Sales Table**\n\n| Sale_ID | Model_Name | Region\
    \ | Sale_Date | Sales_Amount |\n| --- | --- | --- | --- | --- |\n| 1 | Speedster\
    \ | North | 2024-01-01 | 25000 |\n| 2 | Cruiser | South | 2024-01-03 | 20000 |\n\
    | 3 | Speedster | North | 2024-01-05 | 27000 |\n| 4 | Zoomer | East | 2024-01-07\
    \ | 30000 |\n| 5 | Speedster | West | 2024-01-10 | 28000 |\n| 6 | Cruiser | South\
    \ | 2024-01-12 | 22000 |\n| 7 | Zoomer | North | 2024-01-15 | 26000 |\n| 8 | Speedster\
    \ | South | 2024-01-17 | 29000 |\n\nAnna needs answers to the following questions.\n\
    \n### 1. Identifying Sale Order per Region\n\nHow can they identify the order\
    \ in which cars were sold in each region?\n\nTo find the answer to the first question,\
    \ Anna uses `ROW_NUMBER()` to assign a unique rank to each sale in every region,\
    \ ordered by sale date, to understand the sequence of sales.\n\n```sql\nSELECT\
    \ Sale_ID, Region, Model_Name,\nROW_NUMBER() OVER (PARTITION BY Region ORDER BY\
    \ Sale_Date) AS Sale_Rank\nFROM Car_Sales;\n```\n\nThe query is used to rank each\
    \ sale of cars within a region, according to the sale date. The query retrieves\
    \ four columns from the `Car_Sales` table: `Sale_ID`, `Region`, `Model_Name`,\
    \ and a newly computed column called `Sale_Rank`, which is created using the `ROW_NUMBER()`\
    \ window function.\n\nAs the first step, `SELECT Sale_ID, Region, Model_Name`\
    \ retrieves the unique sale identifier (`Sale_ID`), the region in which the car\
    \ was sold (`Region`), and the model of the car (`Model_Name`) from the `Car_Sales`\
    \ table. Then, `ROW_NUMBER() OVER (PARTITION BY Region ORDER BY Sale_Date)` uses\
    \ the `ROW_NUMBER()` window function to assign a sequential row number (starting\
    \ from 1) to each row within a specific partition.\n\nAnna uses `ROW_NUMBER()`\
    \ to assign a unique rank to each sale in every region, ordered by sale date,\
    \ to understand the sequence of sales. The partitioning is done by the `Region`\
    \ column, meaning row numbers will be generated separately for each region. Within\
    \ each region, the rows are ordered by `Sale_Date` in ascending order. This means\
    \ the earliest sale will have row number 1, the second earliest sale will have\
    \ 2, and so on. The calculated row number is given the alias `Sale_Rank` in the\
    \ result set, `AS Sale_Rank`, representing the rank or sequence of each sale in\
    \ its respective region.\n\n> **Note**  \n> `PARTITION BY` is a clause used in\
    \ window functions in SQL to divide a result set into smaller groups or partitions.\
    \ A key difference between `PARTITION BY` and `GROUP BY` is that `PARTITION BY`\
    \ doesn't collapse the rows; it allows calculations to be performed within each\
    \ partition while keeping all rows visible. `PARTITION BY` allows window functions\
    \ to be applied separately to each partition.\n\nResults will include a list of\
    \ sales ranked by their order of occurrence within the same region. For tracking\
    \ sales sequences or identifying the first, second, and so on, sale within each\
    \ region over time, this is particularly useful. Table 5-13 shows the rank of\
    \ each sale within its region.\n\n**Table 5-13**  \n**The Sales Sequence**\n\n\
    | Sale_ID | Region | Model_Name | Sale_Rank |\n| --- | --- | --- | --- |\n| 1\
    \ | North | Speedster | 1 |\n| 3 | North | Speedster | 2 |\n| 7 | North | Zoomer\
    \ | 3 |\n| 2 | South | Cruiser | 1 |\n| 6 | South | Cruiser | 2 |\n| 8 | South\
    \ | Speedster | 3 |\n| 4 | East | Zoomer | 1 |\n| 5 | West | Speedster | 1 |\n\
    \n### 2. Ranking Models by Total Sales per Region\n\nHow can they rank car models\
    \ by their total sales in each region?\n\nThis query can be used to rank car models\
    \ in each region based on their total sales:\n\n```sql\nSELECT Model_Name, Region,\n\
    RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC) AS Sales_Rank\n\
    FROM Car_Sales\nGROUP BY Model_Name, Region;\n```\n\nThis query ranks car models\
    \ based on their total sales within each region using a window function with `RANK()`\
    \ and `PARTITION BY`. The query selects two columns, `Model_Name` and `Region`.\n\
    \nThen, `RANK() OVER (PARTITION BY Region ORDER BY SUM(Sales_Amount) DESC) AS\
    \ Sales_Rank` uses the `RANK()` function to assign a rank to each car model within\
    \ its region based on total sales.\n\nIn this query, Anna uses `RANK()` to rank\
    \ car models in each region based on their total sales. Here, the models with\
    \ the same total sales will receive the same rank. `PARTITION BY Region` splits\
    \ the data into partitions by region, so that the ranking calculation is applied\
    \ separately to each region.\n\nBy using `ORDER BY SUM(Sales_Amount) DESC`, Anna\
    \ ranks the car models in each region based on their total sales `SUM(Sales_Amount)`,\
    \ sorted in descending order. The highest sales get the highest rank. It should\
    \ be noted that the rank is reset for each region due to partitioning.\n\n`GROUP\
    \ BY Model_Name, Region` is used because Anna is applying `SUM(Sales_Amount)`.\
    \ Thus, the query groups the data by `Model_Name` and `Region` to compute the\
    \ total sales for each model in each region.\n\nFinally, each car model is ranked\
    \ within its region based on total sales, with the model having the highest sales\
    \ ranking first. Table 5-14 shows the rank of car models by total sales in each\
    \ region.\n\n**Table 5-14**  \n**Ranking Car Models by Sales in Each Region**\n\
    \n| Model_Name | Region | Sales_Rank |\n| --- | --- | --- |\n| Speedster | North\
    \ | 1 |\n| Zoomer | North | 2 |\n| Cruiser | South | 1 |\n| Speedster | South\
    \ | 2 |\n| Zoomer | East | 1 |\n| Speedster | West | 1 |\n\n### 3. Ranking Models\
    \ Without Skipping Ranks (Dense Rank)\n\nHow can they rank car models without\
    \ skipping ranks when sales tie? (A sales tie occurs when two or more car models\
    \ have the same number of sales within a specific region.)\n\nIn order to rank\
    \ car models in order of sales without skipping ranks when there is a tie in sales,\
    \ the next query is ranked sequentially without gaps. To answer the third question,\
    \ models should be ranked without gaps when sales figures are tied. In order to\
    \ avoid gaps when two models have the same sales amount, this query uses `DENSE_RANK()`:\n\
    \n```sql\nSELECT Model_Name, Region,\nDENSE_RANK() OVER (PARTITION BY Region ORDER\
    \ BY SUM(Sales_Amount) DESC) AS Dense_Rank\nFROM Car_Sales\nGROUP BY Model_Name,\
    \ Region;\n```\n\nThis query ranks car models by their total sales within each\
    \ region using the `DENSE_RANK()` window function. The query selects two columns:\
    \ `Model_Name` and `Region`.\n\n`DENSE_RANK() OVER (PARTITION BY Region ORDER\
    \ BY SUM(Sales_Amount) DESC) AS Dense_Rank`, `DENSE_RANK()` is a window function\
    \ that assigns a rank to each car model based on its sales amount within a region.\
    \ `DENSE_RANK()` ranks models without gaps when sales figures are tied. `PARTITION\
    \ BY Region` partitions data by `Region`, meaning the ranking is calculated separately\
    \ for each region. `ORDER BY SUM(Sales_Amount) DESC` ranks the car models based\
    \ on their total sales (`SUM(Sales_Amount)`), with the models having the highest\
    \ sales ranked first.\n\n> **Note**"
