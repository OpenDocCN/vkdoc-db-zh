    ## 展望未来


    当你进入下一章“使用 `WHERE` 过滤事实”时，你将学习 SQL 中另一个最常用的命令。本章将解释如何编写精确的 `WHERE` 语句，以根据特定条件过滤数据。这将使你能够优化数据集并提取更具针对性的洞察，从而能够用数据讲述更深入的故事。


    ## 测试你的技能


    1.  一家受欢迎的音像租赁店想要创建一个报告，显示电影标题、发行年份和租赁类别。部分电影的分类尚未完成。编写一个查询，检索 `Title` 和 `ReleaseYear`，并添加一个名为
    `Category` 的列。使用 `CASE`，可以根据发行年份分配类别。1990 年以前发行的电影为 `Classic`；1991 年至 1999 年发行的电影为
    `90s`；2000 年以后发行的电影标记为 `Twenty-first century`。


    2.  一位健身教练想使用一个存储了 `UserID`、`DistanceWalked` 和 `TimeSpentWalking` 的表来分析锻炼数据。对于每位用户，他们想计算平均步行速度，即距离除以时间。编写一个查询，检索
    `UserID`、`DistanceWalked` 和 `TimeSpentWalking`，并添加一个名为 `AverageSpeed` 的列，该列通过将
    `DistanceWalked` 除以 `TimeSpentWalking` 计算得出。


    3.  一家在线服装店的经理使用数据库来跟踪 `OrderID`、`CustomerID` 和 `OrderValue`。该经理想知道订单总数、平均订单金额以及总额最高的订单。编写一个查询以满足此需求。


    # 3. 使用 WHERE 过滤事实


    `WHERE` 子句是 SQL 的一个关键特性。它指定了选择、更新或删除行所应满足的条件。由于此语句，从查询返回的记录会根据某些条件是否为真来进行过滤。这使你能够将搜索细化到较大数据集内的一个数据子集，从而只对符合特定条件的数据条目执行操作。


    ## WHERE 简介


    如前所述，SQL 语句是构建查询的第一步。要求 SQL 执行特定任务的过程始于创建语句。如前所述，SQL 中的四个基本语句是 `SELECT`、`UPDATE`、`DELETE`
    和 `INSERT`。`子句` 是 SQL 语句的一个组成部分，用于指定条件或修改语句的操作。可以使用子句来过滤、排序或分组数据。子句指定了检索或操作什么数据以及应如何处理这些数据。本章将讨论常用子句之一——`WHERE`。`WHERE`
    子句就像一个过滤器，允许你仅从表中选择符合特定条件的特定记录。这对于缩小大型数据集范围以找到所需信息非常有用。


    ### WHERE 在数据叙事中的重要性


    在有效的数据叙事过程中，`WHERE` 子句在基于数据的特定部分构建叙述方面起着基础性作用。该子句使叙事者能够聚焦于揭示模式的数据，并创建更有针对性、更具吸引力和信息量的叙述。


    ### WHERE 子句的剖析


    在 SQL 语句中，`WHERE` 子句通常位于 `FROM` 子句之后。它可以包含多个通过逻辑运算符（如 `AND`、`OR` 和 `NOT`）组合的条件。`WHERE`
    子句中的每个条件还可以使用函数和子查询来进一步细化过滤条件。这允许根据特定的叙事需求定制复杂和动态的数据检索策略。基本上，它具有以下语法：


    ```

    SELECT column1, column2, ...

    FROM table_name

    WHERE condition

    ```


    其中 `column1, column2, ...` 是你想要检索的列或字段，`table_name` 是从中检索数据的表的名称，`condition` 是行包含在结果集中的标准。此条件可以包括等于
    (`=`)、不等于 (`<>` 或 `!=`)、大于 (`>`)、小于 (`<`) 等比较。表 3-1 总结了 `WHERE` 子句中最常用的比较运算符。它们对于通过比较列值与常量或列与列本身来基于特定条件过滤数据至关重要。


    表 3-1


    WHERE 子句的 SQL 比较运算符


    | 运算符 | 描述 | 使用示例 |

    | --- | --- | --- |

    | `=` | 等于 | `WHERE age = 30` |

    | `!=` | 不等于 | `WHERE age != 30` |

    | `<>` | 不等于 | `WHERE age <> 30` |

    | `>` | 大于 | `WHERE age > 30` |

    | `<` | 小于 | `WHERE age < 30` |

    | `>=` | 大于或等于 | `WHERE age >= 30` |

    | `<=` | 小于或等于 | `WHERE age <= 30` |

    | `BETWEEN` | 在包含范围内 | `WHERE age BETWEEN 25 AND 35` |

    | `LIKE` | 搜索模式 | `WHERE name LIKE ''J%''` |

    | `IN` | 匹配列表中的任意值 | `WHERE age IN (20, 30, 40)` |

    | `IS NULL` | 当列为 `NULL` 时匹配 | `WHERE name IS NULL` |

    '
- fmt: '## 第一部分：在线商店


    Alex 经营着一家在线商店，过去一年经历了快速增长。随着业务扩张，Alex 发现基于数据的决策对于提升客户满意度越来越重要。他需要分析商店表现的各个方面，从了解客户行为到监控订单状态。在线商店的数据库中包含一个名为
    `Orders` 的表。表 [3-2](#619961_1_En_3_Chapter.xhtml#Tab2) 展示了 `Orders` 表的结构。


    表 3-2：订单表


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 1 | 10 | 2023-05-01 | 120.00 | Delivered |

    | 2 | 20 | 2023-05-02 | 75.00 | Shipped |

    | 3 | 10 | 2023-05-03 | 200.00 | Pending |

    | 4 | 30 | 2023-05-04 | 150.00 | Canceled |

    | 5 | 20 | 2023-05-05 | 500.00 | Delivered |

    | 6 | 30 | 2023-05-01 | 60.00 | Pending |


    为了分析商店表现的各个方面，Alex 希望得到以下问题的答案：


    *   Alex 想找到所有总金额大于 100 美元的订单。

    *   他想选择所有状态为 `Shipped` 的订单。

    *   他需要找到所有在特定日期 `2023-05-01` 下的订单。

    *   他需要找到所有总金额大于 200 美元且状态为 `Delivered` 的订单。

    *   他想选择所有状态为 `Pending` 或总金额大于 500 美元的订单。

    *   他想找到所有在 `2023-05-01` 下且总金额在 50 美元到 150 美元之间的订单。


    下面的 SQL 查询将用于回答每个问题。


    ### 查询总金额大于 100 美元的订单


    首先，以下查询用于检索所有总金额大于 100 美元的订单。这样的查询有助于识别高价值交易，这些交易可能代表重要的采购或重要客户：


    ```sql

    SELECT *

    FROM Orders

    WHERE TotalAmount > 100;

    ```


    表 [3-3](#619961_1_En_3_Chapter.xhtml#Tab3) 展示了结果表，提供了所有总金额大于 100 美元的订单。


    表 3-3：总金额大于 100 美元的所有订单


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 1 | 10 | 2023-05-01 | 120.00 | Delivered |

    | 3 | 10 | 2023-05-03 | 200.00 | Pending |

    | 4 | 30 | 2023-05-04 | 150.00 | Canceled |

    | 5 | 20 | 2023-05-05 | 500.00 | Delivered |


    ### 查询状态为“已发货”的订单


    可以使用以下查询来筛选当前状态为 `Shipped` 的订单。通过此查询，可以跟踪已发货但尚未交付给客户的订单：


    ```sql

    SELECT *

    FROM Orders

    WHERE Status = ''Shipped'';

    ```


    表 [3-4](#619961_1_En_3_Chapter.xhtml#Tab4) 说明了已加载（已发货）的订单。


    表 3-4：已加载的订单


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 2 | 20 | 2023-05-02 | 75.00 | Shipped |


    ### 查询特定日期下的订单


    以下查询检索所有在 2023 年 5 月 1 日下的订单。这对于分析特定日期的销售活动很有用。


    ```sql

    SELECT *

    FROM Orders

    WHERE OrderDate = ''2023-05-01'';

    ```


    表 [3-5](#619961_1_En_3_Chapter.xhtml#Tab5) 显示了所有在 2023 年 5 月 1 日下的订单。


    表 3-5：2023 年 5 月 1 日下的订单


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 1 | 10 | 2023-05-01 | 120.00 | Delivered |

    | 6 | 30 | 2023-05-01 | 60.00 | Pending |


    日期在 SQL 数据分析中起着至关重要的作用，它们提供了随时间变化的趋势、模式和行为洞察。表 [3-5](#619961_1_En_3_Chapter.xhtml#Tab5)
    中呈现的结果为 Alex 提供了机会，让他可以分析基于日期的数据来进行下一个分析任务。


    **注意**


    日期在 SQL 中对于过滤、排序和聚合基于时间的数据至关重要。正确处理日期对于获得准确且有意义的查询结果至关重要。需要注意的是，SQL 提供了多种函数来操作日期，包括
    `NOW()`、`CURDATE()`、`DATEADD()`、`DATEDIFF()` 和 `DATE_FORMAT()`。这些函数有助于执行诸如获取当前日期、添加或减去日期、计算差异以及格式化日期等操作。此外，SQL
    主要以标准格式（如 `YYYY-MM-DD`）存储日期，以避免不一致并确保跨不同系统的兼容性。但是，可以使用日期函数提取日期部分进行比较。例如，你可以使用
    `YEAR(OrderDate) = 2023` 来按年份过滤记录。


    在 SQL 中处理日期时有一些常见错误。将日期存储为字符串可能会导致格式不一致。因此，强烈建议使用合适的日期数据类型，如 `DATE`、`DATETIME`
    和 `TIMESTAMP`。另外，在处理时区以及使用 `TIMESTAMP` 或 `DATETIME` 时必须小心。为了避免差异，数据库和应用程序在时区上保持一致至关重要。SQL
    中处理日期的另一个常见错误是比较日期。如果忽略时间部分，可能会得到意外的结果。例如，`WHERE OrderDate = ''2023-05-01''` 可能会遗漏带有时间戳的记录。建议使用
    `DATE(OrderDate) = ''2023-05-01''` 来忽略时间部分。


    ### 查询高金额且已交付的订单


    以下查询考虑多个条件，以检索所有客户已收到的总金额大于 200 美元的订单。此查询识别了由收到订单的客户所下的、总金额大于 200 美元的订单。这使得 Alex
    能够细分他的高价值客户。


    ```sql

    SELECT *

    FROM Orders

    WHERE TotalAmount > 200 AND Status = ‘Delivered’;

    ```


    表 [3-6](#619961_1_En_3_Chapter.xhtml#Tab6) 显示了所有已收到的总金额大于 200 美元的订单。


    表 3-6：已收到的总金额大于 200 美元的订单


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 5 | 20 | 2023-05-05 | 500.00 | Delivered |


    ### 查询特定状态或高金额的订单


    以下查询查找所有状态为 `Pending` 或总金额大于 500 美元的订单，从而突出显示正在进行或异常大的交易。


    ```sql

    SELECT *

    FROM Orders

    WHERE Status = ''Pending'' OR TotalAmount > 500;

    ```


    表 [3-7](#619961_1_En_3_Chapter.xhtml#Tab7) 指明了所有状态为 `Pending` 或总金额大于 500 美元的订单。


    表 3-7：状态为待处理或总金额大于 500 美元的订单


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 3 | 10 | 2023-05-03 | 200.00 | Pending |

    | 6 | 30 | 2023-05-01 | 60.00 | Pending |


    ### 查询特定日期和金额范围的订单


    以下查询筛选了在 2023 年 5 月 1 日下且总金额在 50 美元到 150 美元之间的订单。此查询可用于分析特定日期的中等交易：


    ```sql

    SELECT *

    FROM Orders

    WHERE OrderDate = ''2023-05-01'' AND TotalAmount BETWEEN 50 AND 150;

    ```


    在 SQL 中，`BETWEEN` 操作符用于根据指定的值范围过滤结果集。根据上下文，这个范围可以包括数字、日期甚至文本值。由于 `BETWEEN` 操作符是包含性的，它包括起始值和结束值。例如，这里
    `TotalAmount` 是我们过滤的列，50 和 150 定义了范围。结果将包括 `TotalAmount` 值在 50 到 150 之间（包含）的行。


    **注意**'
  raw: '## The First Story: The Online Shop


    Alex manages an online shop that has experienced rapid growth over the past year.
    As the business expands, Alex finds it increasingly important to make data-driven
    decisions to enhance customer satisfaction. He needs to analyze various aspects
    of the shop’s performance, from understanding customer behavior to monitoring
    order statuses. The online shop has a database that contains a table called `Orders`.
    Table [3-2](#619961_1_En_3_Chapter.xhtml#Tab2) illustrates the `Orders` table.


    Table 3-2


    The Orders Table


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 1 | 10 | 2023-05-01 | 120.00 | Delivered |

    | 2 | 20 | 2023-05-02 | 75.00 | Shipped |

    | 3 | 10 | 2023-05-03 | 200.00 | Pending |

    | 4 | 30 | 2023-05-04 | 150.00 | Canceled |

    | 5 | 20 | 2023-05-05 | 500.00 | Delivered |

    | 6 | 30 | 2023-05-01 | 60.00 | Pending |


    To analyze various aspects of the shop’s performance, Alex is seeking answers
    to the following questions:


    *   Alex wants to find all orders with a total amount greater than $100.


    *   He wants to select all orders with a status of `Shipped`.


    *   He needs to find all orders placed on a specific date, `2023-05-01`.


    *   He needs to find all orders with a total amount greater than $200 and with
    the `Delivered` status.


    *   He wants to select all orders that are either in `Pending` status or have
    a total amount greater than $500.


    *   He wants to find all orders placed on `2023-05-01` with a total amount between
    $50 and $150.


    The following SQL queries will be used to answer each of these questions.


    First, the following query retrieves all orders with a total amount greater than
    $100\. A query such as this may be useful in identifying high-value transactions,
    which might indicate significant purchases or significant customers:


    ```

    SELECT *

    FROM Orders

    WHERE TotalAmount > 100;

    ```


    Table [3-3](#619961_1_En_3_Chapter.xhtml#Tab3) shows the resulting table, which
    provides all orders with a total amount greater than $100.


    Table 3-3


    All Orders with a Total Amount Greater Than $100


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 1 | 10 | 2023-05-01 | 120.00 | Delivered |

    | 3 | 10 | 2023-05-03 | 200.00 | Pending |

    | 4 | 30 | 2023-05-04 | 150.00 | Canceled |

    | 5 | 20 | 2023-05-05 | 500.00 | Delivered |


    The following query can be used to filter orders that are currently in the `Shipped`
    status. By using this query, it is possible to track orders that are on their
    way to customers but have not yet been delivered:


    ```

    SELECT *

    FROM Orders

    WHERE Status = ''Shipped'';

    ```


    Table [3-4](#619961_1_En_3_Chapter.xhtml#Tab4) illustrates orders that have been
    loaded.


    Table 3-4


    Orders That Have Been Loaded


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 2 | 20 | 2023-05-02 | 75.00 | Shipped |


    The following query retrieves all orders placed on May 1, 2023\. For the purpose
    of analyzing sales activity on a particular day, it is useful.


    ```

    SELECT *

    FROM Orders

    WHERE OrderDate = ''2023-05-01'';

    ```


    Table [3-5](#619961_1_En_3_Chapter.xhtml#Tab5) shows all the orders placed on
    May 1, 2023.


    Table 3-5


    Orders Placed on May 1, 2023


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 1 | 10 | 2023-05-01 | 120.00 | Delivered |

    | 6 | 30 | 2023-05-01 | 60.00 | Pending |


    Dates play a crucial role in data analysis with SQL, providing insight into trends,
    patterns, and behaviors over time. The results presented in Table [3-5](#619961_1_En_3_Chapter.xhtml#Tab5)
    provide Alex with an opportunity to analyze date-based data for his next analytical
    task.


    Note


    Dates are crucial in SQL for filtering, sorting, and aggregating time-based data.
    An accurate and meaningful query result depends on the proper handling of dates.
    It should be noted that SQL provides various functions to manipulate dates, including
    `NOW()`, `CURDATE()`, `DATEADD()`, `DATEDIFF()`, and `DATE_FORMAT()`. These functions
    help perform operations like getting the current date, adding or subtracting dates,
    calculating differences, and formatting dates. Also, SQL mostly stores dates in
    a standard format, such as `YYYY-MM-DD`, to avoid inconsistencies and ensure compatibility
    across different systems. However, it is possible to use date functions to extract
    parts of dates for comparison. For example, you can use `YEAR(OrderDate) = 2023`
    to filter records by year.


    There are a number of common mistakes when dealing with dates in SQL. It is possible
    to have format inconsistencies when storing dates as strings. Thus, it is highly
    recommended to use proper date data types like `DATE`, `DATETIME`, and `TIMESTAMP`.
    Additionally, you must be careful when dealing with timezones and using either
    a `TIMESTAMP` or a `DATETIME`. In order to avoid discrepancies, it is critical
    that the database and application are aligned on the same time zone. Another common
    error when dealing with dates in SQL is comparing dates. It is possible to obtain
    unexpected results if the time component is ignored. For instance, `WHERE OrderDate
    = ''2023-05-01''` might miss records with timestamps. It is recommended to use
    `DATE(OrderDate) = ''2023-05-01''` to ignore the time part.


    The following query considers multiple conditions to retrieve all orders with
    a total amount greater than $200 that were received by customers. This query identifies
    orders with a total amount greater than $200 placed by customers who received
    their order. This allows Alex to segment his high-value customers.


    ```

    SELECT *

    FROM Orders

    WHERE TotalAmount > 200 AND Status = ‘Delivered’;

    ```


    Table [3-6](#619961_1_En_3_Chapter.xhtml#Tab6) shows all received orders with
    a total amount greater than $200.


    Table 3-6


    Received Orders with a Total Amount Greater Than $200


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 5 | 20 | 2023-05-05 | 500.00 | Delivered |


    The following query finds all orders that are either in `Pending` status or have
    a total amount greater than $500, thus highlighting ongoing or exceptionally large
    transactions.


    ```

    SELECT *

    FROM Orders

    WHERE Status = ''Pending'' OR TotalAmount > 500;

    ```


    Table [3-7](#619961_1_En_3_Chapter.xhtml#Tab7) indicates all orders that are either
    in `Pending` status or have a total amount greater than $500.


    Table 3-7


    Orders That Are in Pending Status or Have a Total Amount Greater Than $500


    | OrderID | CustomerID | OrderDate | TotalAmount | Status |

    | --- | --- | --- | --- | --- |

    | 3 | 10 | 2023-05-03 | 200.00 | Pending |

    | 6 | 30 | 2023-05-01 | 60.00 | Pending |


    The following query filters orders made on May 1, 2023, where the total amount
    is between $50 and $150\. This query is useful in analyzing moderate transactions
    on a particular date:


    ```

    SELECT *

    FROM Orders

    WHERE OrderDate = ''2023-05-01'' AND TotalAmount BETWEEN 50 AND 150;

    ```


    In SQL, the `BETWEEN` operator is used to filter the result set based on a specified
    range of values. Depending on the context, this range may include numeric, date,
    or even text values. As the `BETWEEN` operator is inclusive, it includes both
    the start and end values. For instance, here, `TotalAmount` is the column we are
    filtering, and 50 and 150 define the range. The result will include rows where
    `TotalAmount` has values between 50 and 150, inclusive.


    Note'
