- fmt: "## Data Types in SQL\n\nData types in SQL are an essential concept, defining\
    \ the nature of data that can be stored in a database column. Each data type in\
    \ SQL ensures that data fits into predefined formats, facilitating accurate data\
    \ storage, retrieval, and analysis. To design and manipulate databases effectively,\
    \ it is crucial to be familiar with these data types. The following are common\
    \ data types available in SQL:\n\n*   **Numeric data types:**\n\n    `INTEGER`:\
    \ A whole number, either positive or negative. Depending on the database system,\
    \ variations like `INT`, `SMALLINT`, `TINYINT`, and `BIGINT` represent integers\
    \ of different sizes.\n\n    `DECIMAL` and `NUMERIC`: These data types are designed\
    \ to store exact numeric data values. Defining `DECIMAL` or `NUMERIC` columns\
    \ in SQL allows analysts to specify precision and scale so that the database handles\
    \ numeric data precisely. Precision refers to the amount of significant digits\
    \ in a number, to both left and right of the decimal point. It’s the total count\
    \ of digits in the number. The scale specifies the number of digits after the\
    \ decimal point. It represents the fraction part of the number and is a subset\
    \ of the precision.\n\n    `FLOAT`, `REAL`, and `DOUBLE PRECISION`: Represent\
    \ floating-point numbers with varying levels of precision. Ideal for scientific\
    \ calculations where exact precision is not critical.\n\n*   **String data types:**\n\
    \n    `CHAR` and `CHARACTER`: A fixed-length string. If the entered string is\
    \ shorter than the specified length, it will be right-padded with spaces.\n\n\
    \    `VARCHAR` and `CHARACTER VARYING`: Variable-length strings. Allows for storing\
    \ strings up to a specified maximum length.\n\n    `TEXT`: For large text data\
    \ where the length might exceed the limits of `VARCHAR`.\n\n*   **Date and time\
    \ data types:**\n\n    `DATE`: Stores date values, including year, month, and\
    \ day.\n\n    `TIME`: Stores time of day values.\n\n    `TIMESTAMP`: Combines\
    \ date and time, capturing a specific moment in time.\n\n    `INTERVAL`: Represents\
    \ a span of time, useful for calculating differences between dates or times.\n\
    \n*   **Boolean data type:**\n\n    `BOOLEAN`: Represents logical Boolean values,\
    \ typically as `TRUE` or `FALSE`.\n\n*   **Binary data types:**\n\n    `BINARY`\
    \ and `VARBINARY`: Stores binary data, such as images or files, in fixed-length\
    \ or variable-length formats, respectively.\n\n    `BLOB` (Binary Large Object):\
    \ For storing large binary data, like images, videos, or documents.\n\n*   **Specialized\
    \ data types:**\n\n    `ENUM`: A string object that can have only one value chosen\
    \ from a list of values defined at the table creation time.\n\n    `ARRAY`: Supports\
    \ storing an array, which is an ordered collection of elements, of a specified\
    \ data type.\n\n    `JSON` and `XML`: For storing JSON or XML data, allowing for\
    \ complex data structures within a single database column.\n\n    `UUID`: Stores\
    \ Universally Unique Identifiers.\n\n*   **Geospatial data types:**\n\n    `POINT`,\
    \ `LINESTRING`, and `POLYGON`: Specific to databases that support geospatial data\
    \ for representing geographic shapes and locations.\n\nIt is important to choose\
    \ the appropriate data type to optimize database storage, performance, and data\
    \ integrity. Consider your data characteristics and performance requirements when\
    \ designing your database schema.\n\nThe following are examples of each of the\
    \ mentioned SQL data types, and they illustrate how these data types can be used\
    \ when creating a table.\n\n*   **Numeric data types:**\n\n    ```\n    CREATE\
    \ TABLE numeric_examples (\n    id INT,\n    small_number SMALLINT,\n    big_number\
    \ BIGINT,\n    exact_amount DECIMAL(10, 2),\n    approx_net_worth FLOAT\n    );\n\
    \    ```\n\n    This query creates a table named `numeric_examples` with five\
    \ columns, each designated to hold numeric data of various types and scales. The\
    \ columns include an integer called `id`, a small integer called `small_number`,\
    \ a large integer called `big_number`, a precise decimal called `exact_amount`\
    \ suitable for financial data, and a floating-point number called `approx_net_worth`\
    \ for approximate values.\n\n*   **String data types:**"
