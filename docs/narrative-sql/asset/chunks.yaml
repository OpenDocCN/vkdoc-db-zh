    会计算所有行，包括包含 `NULL` 的行。

    *   **JOINs**: 不同的连接类型生成 `NULL` 值的方式不同，这会影响最终结果集中出现的行。


    理解这些行为对于编写准确且高效的 SQL 查询至关重要，以有效处理缺失信息。第三个故事更详细地介绍了在使用不同类型的 `JOIN` 时如何处理 `NULL`。'
  raw: '*   `LEFT JOIN`: `NULL`s appear for right table columns when there’s no match
    in the right table.


    *   `RIGHT JOIN`: `NULL`s appear for left table columns when there’s no match
    in the left table.


    *   `FULL OUTER JOIN`: `NULL`s appear for both table columns when there’s no match
    in either table.


    *   `CROSS JOIN`: No `NULL`s inherently, as all combinations are included.


    *   `SELF JOIN`**:** `NULL`s appear when a row has no match in the same table.


    *   `LEFT JOIN` **with** `NULL` **check**: Filters out rows with `NULL`s in the
    `JOIN` condition, focusing on non-matching rows.


    *   `RIGHT JOIN` **with** `NULL` **check**: Filters out rows with `NULL`s in the
    `JOIN` condition, focusing on non-matching rows.


    *   `FULL OUTER JOIN` **with** `NULL` **check**: Specifically handles `NULL`s
    to highlight unmatched rows from both tables.


    It should be noted that there are other reasons for the occurrence of `NULL` rows,
    including missed matches and data integrity.


    *   **Missed matches:** When there are no corresponding entries in the linked
    table, SQL fills the missing values with `NULL` to indicate the absence of data.


    *   **Data integrity:** Incomplete data, such as employees without projects or
    projects without employees, will result in `NULL`s in the result set when performing
    certain `JOIN`s.


    The last part of this chapter discusses the emergence of `NULL` in more detail.


    To find all projects and their assigned departments, including departments without
    projects, with the experience you have now, you can write a query that ensures
    that you only include rows for which there is a valid `ProjectID` in the `Projects`
    table, so `NULL` rows are removed for departments without projects.


    ```

    SELECT p.ProjectName, d.DepartmentName

    FROM Projects p

    RIGHT JOIN Departments d ON p.DepartmentID = d.DepartmentID

    WHERE p.ProjectID IS NOT NULL;

    ```


    This query ensures that you only include rows where there is a valid `ProjectID`
    in the `Projects` table, thus excluding the `NULL` rows for departments without
    projects. See Table [4-16](#619961_1_En_4_Chapter.xhtml#Tab16).


