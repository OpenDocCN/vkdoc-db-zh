    `NULL` 值。 | 左表的所有行，右表中匹配的行，或者对于不匹配的行填充 `NULL`。 | `SELECT * FROM Table1 LEFT JOIN
    table2 ON Table1.key = Table2.key` |

    | `RIGHT OUTER JOIN` | 类似于 `LEFT JOIN`，但包含右表（在 `FROM` 子句中首先指定）的所有行以及左表中匹配的行。左表中不匹配的行将填充
    `NULL`。 | 右表的所有行，左表中匹配的行，或者对于不匹配的行填充 `NULL`。 | `SELECT * FROM Table1 RIGHT JOIN
    table2 ON Table1.key = Table2.key` |

    | `FULL OUTER JOIN` | 结合了 `LEFT` 和 `RIGHT OUTER JOIN`。包含两个表中的所有行，无论另一个表中是否存在匹配项。不匹配的列将填充
    `NULL`。 | 两个表中的所有行，对于不匹配的行填充 `NULL`。 | `SELECT * FROM Table1 FULL OUTER JOIN table2
    ON Table1.key = Table2.key` |

    | `CROSS JOIN` | 创建笛卡尔积，产生两个表中所有可能的行组合，不受任何匹配条件的限制。可能生成大量行。 | 两个表中所有可能的行组合。 |
    `SELECT * FROM Table1 CROSS JOIN Table2` |

    | `SELF JOIN` | 根据指定条件将一个表与自身连接。常用于查找同一表中的关系。 | 来自同一表且满足 `JOIN` 条件的行。 | `SELECT
    copy1.column1 AS first_column, copy2.column2 As second_column FROM Table1 copy1
    INNER JOIN Table1 copy2 ON copy1.key = copy2.key` |

    | `LEFT OUTER JOIN` 带 `NULL` 检查 | 类似于 `LEFT JOIN`，但显式检查 `NULL` 值以过滤结果。 | 左表中在右表里没有匹配行的行。
    | `SELECT * FROM Table1 LEFT JOIN Table2 ON Table1.key = Table2.key WHERE Table2.key
    IS NULL` |

    | `RIGHT OUTER JOIN` 带 `NULL` 检查 | 类似于 `RIGHT JOIN`，但显式检查 `NULL` 值以过滤结果。 | 右表中在左表里没有匹配行的行。
    | `SELECT * FROM Table1 RIGHT JOIN Table2 ON Table1.key = Table2.key WHERE Table1.key
    IS NULL` |

    | `FULL OUTER JOIN` 带 `NULL` 检查 | 类似于 `FULL JOIN`，但显式检查 `NULL` 值以过滤结果。 | 在另一表中没有匹配行的行。
    | `SELECT * FROM Table1 FULL OUTER JOIN Table2 ON Table1.key = Table2.key WHERE
    Table1.key IS NULL OR Table2.key IS NULL` |


    表 4-1 简要介绍了不同类型的 SQL `JOIN`。需要注意的是，有必要根据相关列（称为`键`）从两个或多个表中组合行。在本章的其余部分，将对所有类型的键进行详细说明。


    如表中所述，总结来说，`INNER JOIN` 仅返回两个表中匹配的行，而 `LEFT JOIN` 包含左表的所有行以及右表中匹配的行，并用 `NULL`
    填充右表列。相反，`RIGHT JOIN` 包含右表的所有行，对于左表中不匹配的行则填充 `NULL`。`FULL OUTER JOIN` 返回两个表中的所有行，对于没有匹配的情况使用
    `NULL`。`CROSS JOIN` 创建所有行的笛卡尔积。`SELF JOIN` 将一个表与自身连接，以查找同一表中的相关数据。带有 `NULL` 检查的
    `LEFT`、`RIGHT` 和 `FULL OUTER JOIN` 特殊情况用于检查结果以显示未匹配的行。理解这些 `JOIN` 类型和键有助于优化数据库查询和数据分析。为了更直观地理解，这些
    JOIN 类型在图 4-1 中进行了说明。


    ![一个包含九个维恩图的网格，每个图都位于虚线边框内。每个图都有两个重叠的圆圈，分别标记为“表 1”和“表 2”。这些图在重叠区域和阴影方面各不相同。有些圆圈完全着色，有些部分着色，还有一些有箭头或线条指示移动或连接。中间的图只有一个带箭头的圆圈。这些图说明了两个集合之间的不同关系和交集。](img/619961_1_En_4_Fig1_HTML.png)


    图 4-1


    JOIN 类型示意图

    '
- fmt: '## The First Story: A Football Academy


    In a football academy, academy data analyst William is under pressure from the
    club’s management staff to find the next young star. Having a database of last
    season’s information, William plans to find the club’s next young star by determining
    the following information:


    1.  List all the matches along with the names of players who participated.

    2.  List the players and the total number of goals they scored across all matches.


    William’s goal is to analyze the data that is stored in the database, including
    the tables called `Player`, `Matches`, and `MatchDetails`. These tables store
    each player’s statistics and their performance in each match. The `Player`, `Matches`,
    and `MatchDetails` tables are shown in Tables [4-2](#619961_1_En_4_Chapter.xhtml#Tab2),
    [4-3](#619961_1_En_4_Chapter.xhtml#Tab3), and [4-4](#619961_1_En_4_Chapter.xhtml#Tab4),
    respectively.


    Table 4-4: The MatchDetails Table


    | MatchDetailID | MatchID | PlayerID | GoalsScored |

    | --- | --- | --- | --- |

    | 1 | 101 | 1 | 2 |

    | 2 | 101 | 2 | 2 |

    | 3 | 102 | 2 | 0 |

    | 4 | 103 | 3 | 1 |

    | 5 | 103 | 4 | 2 |

    | 6 | 104 | 4 | 1 |

    | 7 | 105 | 1 | 1 |

    | 8 | 105 | 5 | 0 |

    | 9 | 106 | 6 | 1 |

    | 10 | 107 | 3 | 2 |

    | 11 | 107 | 7 | 1 |


    Table 4-3: The Matches Table


    | MatchID | AgeGroup | MinutesPlayed |

    | --- | --- | --- |

    | 101 | U18 | 90 |

    | 102 | U16 | 45 |

    | 103 | U18 | 90 |

    | 104 | U16 | 90 |

    | 105 | U18 | 90 |

    | 106 | U16 | 90 |

    | 107 | U18 | 70 |


    Table 4-2: The Player Table


    | PlayerID | Name | Age | Position |

    | --- | --- | --- | --- |

    | 1 | Alex Jones | 17 | Midfielder |

    | 2 | Mia Garcia | 16 | Defender |

    | 3 | David Lee | 18 | Forward |

    | 4 | Sarah Miller | 15 | Midfielder |

    | 5 | Chris Brown | 17 | Defender |

    | 6 | Emily Sanchez | 16 | Goalkeeper |

    | 7 | Ben Johnson | 18 | Midfielder (Winger) |


    It should be noted that the `Players`, `Matches`, and `MatchDetails` tables use
    primary and foreign keys to ensure data integrity and create relationships between
    tables. The `Players` table has a primary key called `PlayerID`, which uniquely
    identifies each player and ensures that there are no duplicate records for players.
    The `Matches` table has a primary key called `MatchID`, which uniquely identifies
    each match and ensures that each match record is unique. The `MatchDetails` table,
    which links players and matches, has a composite primary key called `MatchDetailID`,
    which uniquely identifies each record in the `MatchDetails` table. Additionally,
    the `MatchDetails` table contains two foreign keys: `MatchID` and `PlayerID`.
    The `MatchID` foreign key references the `MatchID` in the `Matches` table, establishing
    a relationship between the match details and the corresponding matches. The same
    goes for the `Players` table. These primary and foreign key constraints guarantee
    integrity, meaning that each match detail must match valid entries in both the
    `Players` and `Matches` tables.


    ### Note


    In a relational database table, a `key` is a column or set of columns that uniquely
    identifies a row in the table. In other words, this column or columns act like
    a fingerprint, ensuring that no two rows have the same value for that key. Defining
    a key in a table is very important to maintaining data integrity and efficiently
    retrieving specific records. The rest of this chapter explains the keys in the
    database in more detail.


    To find all matches along with the names of players who participated in them,
    including their positions, an `INNER JOIN` can be used to match players with their
    recent performances:


    ```sql

    SELECT m.MatchID, p.Name, p.Position

    FROM Matches m

    INNER JOIN MatchDetails md ON m.MatchID = md.MatchID

    INNER JOIN Players p ON p.PlayerID = md.PlayerID;

    ```


    This query retrieves a list of matches, along with the names and positions of
    the players who participated in each match, using two `INNER JOIN` operations
    to combine data from the three tables: `Matches`, `MatchDetails`, and `Players`.
    First, the `Matches` table (aliased as `m`) is linked to the `MatchDetails` table
    (aliased as `md`) on the `MatchID` column, ensuring that each detail is associated
    with a corresponding match. The resulting dataset is then further linked to the
    `Players` table (aliased as `p`) on the `PlayerID` column, associating each match
    detail to the corresponding player. The `SELECT` statement specifies that the
    query returns the `MatchID` from the `Matches` table and the `Name` and `Position`
    from the `Players` table. It effectively provides a list of matches, detailing
    the players who participated in each match and their respective positions, providing
    a clear view of the players’ participation in the various matches.


    ### Note


    As mentioned in previous chapters, in SQL, an `alias` is a temporary name given
    to a table or column for the duration of a query. Aliases are often used to make
    complex queries more readable and shorten long table names, making SQL code easier
    to write and understand. To create an alias for a table, you use the `AS` keyword
    followed by the alias. For example, in the `FROM Players AS p` statement, `Players`
    is the main table name and `p` is the alias. It should be noted that the `AS`
    keyword is optional, so you can also write `FROM Players p`. Once an alias is
    assigned, you can use it to refer to the table in the rest of the query. This
    is especially useful when dealing with multiple tables or when doing `JOIN`s,
    as it helps to clearly distinguish between different tables and their columns.


    The result of the first query is illustrated in Table [4-5](#619961_1_En_4_Chapter.xhtml#Tab5).


    Table 4-5: The First Query Result


    | MatchID | Name | Position |

    | --- | --- | --- |

    | 101 | Alex Jones | Midfielder |

    | 101 | Mia Garcia | Defender |

    | 102 | Mia Garcia | Defender |

    | 103 | David Lee | Forward |

    | 103 | Sarah Miller | Midfielder |

    | 104 | Sarah Miller | Midfielder |

    | 105 | Alex Jones | Midfielder |

    | 105 | Chris Brown | Defender |

    | 106 | Emily Sanchez | Goalkeeper |

    | 107 | David Lee | Forward |

    | 107 | Ben Johnson | Midfielder (Winger) |


    To retrieve a list of all players and the total number of goals they scored across
    all matches, use this query:


    ```sql

    SELECT p.Name, SUM(md.GoalsScored) AS TotalGoals

    FROM Players p

    INNER JOIN MatchDetails md ON p.PlayerID = md.PlayerID

    GROUP BY p.Name;

    ```


    To return a list of players along with the total number of goals scored by each
    player, this query performs an `INNER JOIN` with the `MatchDetails` table on the
    `PlayerID` column to ensure that each player’s match details are included. The
    `SUM(md.GoalsScored)` function is used to calculate the total goals scored by
    each player in all their matches. The `GROUP BY p.Name` statement groups the results
    by each player’s name, so that the sum function (`SUM`) can be applied to each
    group. The query returns a set of results containing each player’s name and the
    corresponding total goals they have scored, effectively summarizing each player’s
    scoring performance across all recorded matches.


    ### Note


    `GROUP BY` is a clause used within a `SELECT` statement in SQL. The `GROUP BY`
    clause in SQL arranges identical data into groups. It is often used in conjunction
    with aggregate functions such as `COUNT()`, `SUM()`, `AVG()`, `MAX()`, and `MIN()`
    to perform calculations on any group of data. The next chapter focuses on this
    statement in more detail along with several narratives.


    The result of the second query is illustrated in Table [4-6](#619961_1_En_4_Chapter.xhtml#Tab6).


    Table 4-6: The Second Query Result


    | Name | TotalGoals |

    | --- | --- |

    | Alex Jones | 3 |

    | Mia Garcia | 2 |

    | David Lee | 3 |

    | Sarah Miller | 3 |

    | Chris Brown | 0 |

    | Emily Sanchez | 1 |

    | Ben Johnson | 1 |'
