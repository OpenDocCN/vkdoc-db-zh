  trans: '

    ## 第一个故事：一家足球学院


    在一家足球学院里，学院数据分析师威廉正面临来自俱乐部管理层人员的压力，需要他找出下一位年轻的明星球员。手握上个赛季的信息数据库，威廉计划通过确定以下信息来找到俱乐部的下一位年轻新星：


    1.  列出所有比赛以及参与比赛的球员姓名。

    2.  列出所有球员以及他们在所有比赛中的总进球数。


    威廉的目标是分析存储在数据库中的数据，包括名为 `Player`、`Matches` 和 `MatchDetails` 的表。这些表存储了每位球员的统计数据及其在每场比赛中的表现。`Player`、`Matches`
    和 `MatchDetails` 表分别展示在表 4-2、4-3 和 4-4 中。


    表 4-4：MatchDetails 表


    | MatchDetailID | MatchID | PlayerID | GoalsScored |

    | --- | --- | --- | --- |

    | 1 | 101 | 1 | 2 |

    | 2 | 101 | 2 | 2 |

    | 3 | 102 | 2 | 0 |

    | 4 | 103 | 3 | 1 |

    | 5 | 103 | 4 | 2 |

    | 6 | 104 | 4 | 1 |

    | 7 | 105 | 1 | 1 |

    | 8 | 105 | 5 | 0 |

    | 9 | 106 | 6 | 1 |

    | 10 | 107 | 3 | 2 |

    | 11 | 107 | 7 | 1 |


    表 4-3：Matches 表


    | MatchID | AgeGroup | MinutesPlayed |

    | --- | --- | --- |

    | 101 | U18 | 90 |

    | 102 | U16 | 45 |

    | 103 | U18 | 90 |

    | 104 | U16 | 90 |

    | 105 | U18 | 90 |

    | 106 | U16 | 90 |

    | 107 | U18 | 70 |


    表 4-2：Player 表


    | PlayerID | Name | Age | Position |

    | --- | --- | --- | --- |

    | 1 | Alex Jones | 17 | Midfielder |

    | 2 | Mia Garcia | 16 | Defender |

    | 3 | David Lee | 18 | Forward |

    | 4 | Sarah Miller | 15 | Midfielder |

    | 5 | Chris Brown | 17 | Defender |

    | 6 | Emily Sanchez | 16 | Goalkeeper |

    | 7 | Ben Johnson | 18 | Midfielder (Winger) |


    需要注意的是，`Players`、`Matches` 和 `MatchDetails` 表使用主键和外键来确保数据完整性，并在表之间建立关系。`Players`
    表有一个名为 `PlayerID` 的主键，它唯一标识每位球员，并确保没有重复的球员记录。`Matches` 表有一个名为 `MatchID` 的主键，它唯一标识每场比赛，并确保每条比赛记录是唯一的。`MatchDetails`
    表连接了球员和比赛，它有一个名为 `MatchDetailID` 的复合主键，唯一标识 `MatchDetails` 表中的每条记录。此外，`MatchDetails`
    表包含两个外键：`MatchID` 和 `PlayerID`。`MatchID` 外键引用 `Matches` 表中的 `MatchID`，在比赛详情和相应的比赛之间建立关系。对于
    `Players` 表也是如此。这些主键和外键约束保证了完整性，意味着每条比赛详情必须与 `Players` 表和 `Matches` 表中的有效条目相匹配。


    ### 注意


    在关系数据库表中，`键` 是一个或一组列，用于唯一标识表中的一行。换句话说，该列或这些列就像指纹一样，确保没有两行在该键上具有相同的值。在表中定义键对于维护数据完整性和高效检索特定记录非常重要。本章其余部分将更详细地解释数据库中的键。


    为了找出所有比赛以及参与其中的球员姓名（包括他们的位置），可以使用 `INNER JOIN` 来匹配球员与其最近的比赛表现：


    ```sql

    SELECT m.MatchID, p.Name, p.Position

    FROM Matches m

    INNER JOIN MatchDetails md ON m.MatchID = md.MatchID

    INNER JOIN Players p ON p.PlayerID = md.PlayerID;

    ```


    此查询使用两个 `INNER JOIN` 操作将三个表（`Matches`、`MatchDetails` 和 `Players`）的数据组合起来，检索出比赛列表，以及每场比赛中参赛球员的姓名和位置。首先，将
    `Matches` 表（别名为 `m`）通过 `MatchID` 列链接到 `MatchDetails` 表（别名为 `md`），确保每条详情都与相应的比赛关联。然后，将得到的数据集进一步通过
    `PlayerID` 列链接到 `Players` 表（别名为 `p`），将每条比赛详情关联到相应的球员。`SELECT` 语句指定查询返回 `Matches`
    表中的 `MatchID` 以及 `Players` 表中的 `Name` 和 `Position`。它有效地提供了一个比赛列表，详细说明了每场比赛的参赛球员及其各自的位置，清晰地展示了球员在各项比赛中的参与情况。


    ### 注意


    如前几章所述，在 SQL 中，`别名` 是在查询期间赋予表或列的临时名称。别名通常用于使复杂查询更具可读性，并缩短长表名，使 SQL 代码更易于编写和理解。要为表创建别名，需使用
    `AS` 关键字后跟别名。例如，在 `FROM Players AS p` 语句中，`Players` 是主表名，`p` 是别名。需要注意的是，`AS` 关键字是可选的，因此也可以写成
    `FROM Players p`。一旦分配了别名，就可以在查询的其余部分使用它来引用该表。这在处理多个表或进行 `JOIN` 操作时特别有用，因为它有助于清楚地区分不同的表及其列。


    第一个查询的结果如表 4-5 所示。


    表 4-5：第一个查询结果


    | MatchID | Name | Position |

    | --- | --- | --- |

    | 101 | Alex Jones | Midfielder |

    | 101 | Mia Garcia | Defender |

    | 102 | Mia Garcia | Defender |

    | 103 | David Lee | Forward |

    | 103 | Sarah Miller | Midfielder |

    | 104 | Sarah Miller | Midfielder |

    | 105 | Alex Jones | Midfielder |

    | 105 | Chris Brown | Defender |

    | 106 | Emily Sanchez | Goalkeeper |

    | 107 | David Lee | Forward |

    | 107 | Ben Johnson | Midfielder (Winger) |


    要检索所有球员列表以及他们在所有比赛中的总进球数，请使用此查询：


    ```sql

    SELECT p.Name, SUM(md.GoalsScored) AS TotalGoals

    FROM Players p

    INNER JOIN MatchDetails md ON p.PlayerID = md.PlayerID

    GROUP BY p.Name;

    ```


    为了返回球员列表以及每位球员的总进球数，此查询在 `PlayerID` 列上与 `MatchDetails` 表执行 `INNER JOIN`，以确保包含每位球员的比赛详情。`SUM(md.GoalsScored)`
    函数用于计算每位球员在所有比赛中的总进球数。`GROUP BY p.Name` 语句按每位球员的姓名对结果进行分组，以便求和函数 (`SUM`) 可以应用于每个分组。该查询返回一组包含每位球员姓名及其对应总进球数的结果，有效地总结了每位球员在所有记录比赛中的得分表现。


    ### 注意


    `GROUP BY` 是 SQL 中 `SELECT` 语句内使用的一个子句。SQL 中的 `GROUP BY` 子句将相同的数据安排到组中。它通常与聚合函数（如
    `COUNT()`、`SUM()`、`AVG()`、`MAX()` 和 `MIN()`）结合使用，以对任何数据组执行计算。下一章将更详细地重点介绍此语句及其几个示例。


    第二个查询的结果如表 4-6 所示。


    表 4-6：第二个查询结果


    | Name | TotalGoals |

    | --- | --- |

    | Alex Jones | 3 |

    | Mia Garcia | 2 |

    | David Lee | 3 |

    | Sarah Miller | 3 |

    | Chris Brown | 0 |

    | Emily Sanchez | 1 |

    | Ben Johnson | 1 |

