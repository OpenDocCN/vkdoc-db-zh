    ## 标识符与命名规范


    在 SQL 中，标识符指的是表、列、索引和函数等数据库对象的名称。统一且正确地命名这些对象可以确保更好的代码可读性、减少语法错误并提高可维护性。表 A-6
    总结了 PostgreSQL 中与标识符相关的基本规则和最佳实践。


    **表 A-6**

    PostgreSQL 中与标识符相关的基本规则和最佳实践


    | 类别 | 规则/最佳实践 | 描述 | 示例 |

    | --- | --- | --- | --- |

    | 基本结构 | 以字母或下划线开头 | 标识符必须以字母字符（a-z, A-Z）或下划线（_）开头。 | `users`, `product_details`,
    `_temp_data` |

    |  | 包含字母、数字和下划线 | 后续字符可以是字母、数字（0-9）或下划线。其他字符通常不允许，除非使用引号括起来。 | `user_id`, `order2023`,
    `item_count` |

    | 大小写敏感性（未加引号） | 未加引号的标识符会被转换为小写。 | 因此，`TableName`、`tablename` 和 `TABLENAME` 都会被解释为
    `tablename`。以 `MyTable` 创建的表将被引用为 `mytable`。 |

    | 大小写敏感性（加引号） | 用双引号（"）括起来的标识符被视为区分大小写。 | `"MyTable"` 不同于 `"mytable"`。 `SELECT
    "FirstName" FROM "Users";` |

    | 保留字 | 避免使用未加引号的 SQL 保留关键字 | 不要使用未加引号的 SQL 关键字（例如 `SELECT`、`FROM`、`WHERE`、`USER`）作为标识符。这将导致语法错误。避免：`SELECT,
    user, group`（未加引号）。 |

    |  | 使用双引号来使用保留字 | 如果必须将保留字用作标识符，请将其用双引号括起来。这通常不鼓励。示例：`"SELECT"`、`"user"`、`"group"`。
    |

    | 长度限制 | 最大长度 | PostgreSQL 对标识符有最大长度限制，通常约为 63 字节。虽然有时可以超过，但最好保持名称长度合理。考虑使用更短但更具描述性的名称。
    |

    | 最佳实践 | 具有描述性和意义 | 选择能清晰表明数据库对象用途的名称。不要用 `t1`，而要用 `customers`。不要用 `col1`，而要用
    `customer_name`。 |

    |  | 保持一致性 | 在整个数据库模式中采用一致的命名约定（例如，snake_case、camelCase）。`customer_order`（snake_case）与
    `customerOrder`（camelCase）。 |

    |  | 使用下划线分隔 | 下划线通常用于分隔标识符中的单词，以提高可读性。示例：`product_category`、`order_item_id`。
    |

    |  | 避免特殊字符（未加引号） | 虽然从技术上讲，某些特殊字符在加引号后可能是允许的，但为了简单性和可移植性，最好通常避免使用它们。避免：`data-value,
    user name`（未加引号）。 |

    |  | 考虑表名的复数与单数形式 | 没有严格规定，但要保持一致。复数形式常用于表示实体集合的表。示例：`products`、`orders`。 |

    |  | 表示单个值的列名使用单数形式 | 列名通常表示行的一个属性。示例：`customer_id`、`product_name`、`order_date`。
    |


    ## 连接与子查询


    表 A-7 展示了各种 SQL `JOIN` 类型和子查询概念，详细说明了它们的目的、基本语法以及如何用于跨表检索和关联数据。


    **表 A-7**

    SQL 连接类型与子查询概念


    | 概念 | 目的 | 基本语法 |

    | --- | --- | --- |

    | `INNER JOIN` | 仅返回两个表中值匹配的行。 | `SELECT * FROM table1 INNER JOIN table2 ON table1.id
    = table2.id;` |

    | `LEFT JOIN` | 返回左表中的所有行以及右表中的匹配行。 | `SELECT * FROM table1 LEFT JOIN table2 ON
    table1.id = table2.id;` |

    | `RIGHT JOIN` | 返回右表中的所有行以及左表中的匹配行。 | `SELECT * FROM table1 RIGHT JOIN table2
    ON table1.id = table2.id;` |

    | `FULL JOIN` | 当任一表中存在匹配时，返回所有行。 | `SELECT * FROM table1 FULL JOIN table2 ON
    table1.id = table2.id;` |

    | `CROSS JOIN` | 返回两个表的笛卡尔积。 | `SELECT * FROM table1 CROSS JOIN table2;` |

    | `SELF JOIN` | 使用表别名将表与自身连接。 | `SELECT a.name, b.name FROM employees a JOIN employees
    b ON a.manager_id = b.id;` |

    | 非关联子查询 | 独立于外部查询执行。 | `SELECT name FROM employees WHERE dept_id IN (SELECT id
    FROM departments);` |

    | 关联子查询 | 在子查询内部引用外部查询的列。 | `SELECT name FROM employees e WHERE salary > (SELECT
    AVG(salary) FROM employees WHERE dept_id = e.dept_id);` |


    ## 聚合函数与分组


    表 A-8 说明了关键的 SQL 聚合函数和分组子句，解释了它们的目的、语法以及如何用于在查询中汇总和筛选数据。


    **表 A-8**

    关键 SQL 聚合函数与分组子句


    | 概念 | 目的 | 基本语法 |

    | --- | --- | --- |

    | `COUNT()` | 计算行数或非 `NULL` 值的数量。 | `SELECT COUNT(*) FROM table;` |

    | `SUM()` | 计算数值列的总和。 | `SELECT SUM(column) FROM table;` |

    | `AVG()` | 计算数值列的平均值。 | `SELECT AVG(column) FROM table;` |

    | `MIN()` | 查找列中的最小值。 | `SELECT MIN(column) FROM table;` |

    | `MAX()` | 查找列中的最大值。 | `SELECT MAX(column) FROM table;` |

    | `GROUP BY` 子句 | 基于一个或多个列对行进行分组。 | `SELECT column, AGG_FUNC(column) FROM table
    GROUP BY column;` |

    | `HAVING` 子句 | 基于聚合条件对分组进行筛选。 | `SELECT column, AGG_FUNC(column) FROM table GROUP
    BY column HAVING condition;` |


    ## 条件逻辑与控制流


    表 A-9 展示了 SQL 条件表达式和函数，描述了它们的目的、语法以及如何帮助在查询中处理逻辑和 `NULL` 值。


    **表 A-9**

    SQL 条件表达式与函数


    | 概念 | 目的 | 基本语法 |

    | --- | --- | --- |

    | `CASE` 语句 | 对条件进行求值并根据这些条件返回值。 | `SELECT CASE WHEN condition THEN result ELSE
    alternative END FROM table;` |

    | `COALESCE()` | 返回表达式列表中的第一个非 `NULL` 值。 | `SELECT COALESCE(column1, column2,
    default_value) FROM table;` |

    | `NULLIF()` | 如果两个表达式相等则返回 `NULL`；否则返回第一个表达式。 | `SELECT NULLIF(expression1, expression2)
    FROM table;` |

    | 条件表达式 | 在 `WHERE`、`HAVING` 和其他子句中用于筛选或求值逻辑。 | `SELECT * FROM table WHERE condition;`
    |


    ## 公用表表达式与视图


    表 A-10 说明了 CTE 和视图在 SQL 中的使用，包括它们的目的、语法以及如何支持查询模块化和虚拟表创建。


    **表 A-10**

    SQL 中的公用表表达式与视图


    | 概念 | 目的 | 基本语法 |

    | --- | --- | --- |

    | `WITH`（非递归 CTE） | 定义一个临时结果集，供更大的查询使用。 | `WITH cte_name AS (SELECT ... FROM table)
    SELECT ... FROM cte_name;` |

    | `WITH RECURSIVE` | 定义一个递归 CTE 以处理分层或迭代数据。 | `WITH RECURSIVE cte_name AS (SELECT
    ... UNION ALL SELECT ... FROM cte_name ...) SELECT ... FROM cte_name;` |

    | `CREATE VIEW` | 基于查询结果创建一个虚拟表。 | `CREATE VIEW view_name AS SELECT ... FROM table;`
    |

    | 使用/查询视图 | 像查询表一样从创建的视图中查询数据。 | `SELECT ... FROM view_name;` |

    | `DROP VIEW` | 从数据库中删除视图。 | `DROP VIEW view_name;` |

