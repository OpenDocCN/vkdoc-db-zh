    ## 第一个故事：繁忙的办公室


    在一间繁忙的办公室里，初级数据分析师萨拉被指派了一项任务：研究员工与部门数据库。萨拉的经理需要针对员工薪资、所属部门和绩效等复杂问题找到答案。萨拉希望通过编写嵌套的
    SQL 子查询来满足这些需求。


    萨拉利用表 7-1 和 7-2 来提取与她所分配任务相关的洞察。


    表 7-2

    部门表


    | ID | Name |

    | --- | --- |

    | 1 | IT |

    | 2 | Sales |

    | 3 | Marketing |


    表 7-1

    员工表


    | ID | Name | Salary | department_id |

    | --- | --- | --- | --- |

    | 1 | John | 70,000 | 1 |

    | 2 | Alice | 80,000 | 2 |

    | 3 | Bob | 60,000 | 1 |

    | 4 | Emma | 90,000 | 3 |

    | 5 | Michael | 55,000 | 2 |


    第一个问题是“谁的薪水最高”。萨拉要寻找的是公司里薪水最高的员工。为了找到答案，她使用了以下单行子查询：


    ```

    SELECT name

    FROM employees

    WHERE salary = (SELECT MAX(salary) FROM employees);

    ```


    在此查询中，子查询 (`SELECT MAX(salary) FROM employees`) 计算出表中最高的薪水，外部查询则检索拥有该薪水的员工姓名。如你所料，此查询返回单行结果，如表
    7-3 所示。


    表 7-3

    最高薪资


    | Name |

    | --- |

    | Emma |


    第二个问题是“谁在销售部门工作”。萨拉要寻找的是一份包含所有在销售部门工作的员工的列表。萨拉使用了一个多行子查询来匹配部门 ID，从而找到答案：


    ```

    SELECT name

    FROM employees

    WHERE department_id IN (SELECT id FROM departments WHERE name = ''Sales'');

    ```


    子查询 (`SELECT id FROM departments WHERE name = ''Sales''`) 检索销售部门的 ID，外部查询将此 ID
    与 `Employees` 表中的 `department_id` 进行匹配。表 7-4 展示了结果。


    表 7-4

    谁在销售部门工作


    | Name |

    | --- |

    | Alice |

    | Michael |


    第三个问题是“谁的薪资高于其所在部门的平均薪资”。萨拉要寻找的是一份包含所有薪资高于其所在部门平均薪资的员工的列表。萨拉使用了一个关联子查询来解决这个挑战：


    ```

    SELECT emp.name

    FROM employees AS emp

    WHERE emp.salary > (

    SELECT AVG(sub_emp.salary)

    FROM employees AS sub_emp

    WHERE sub_emp.department_id = emp.department_id

    );

    ```


    子查询 (`SELECT AVG(sub_emp.salary) FROM employees AS sub_emp WHERE sub_emp.department_id
    = emp.department_id)` 根据外部查询中每位员工的 `department_id` 动态调整，计算每个部门的平均薪资。别名 `emp` 代表外部查询中的
    `Employees` 表，别名 `sub_emp` 代表子查询中的同一个表。这些别名清晰地表明了它们在查询中各自的角色。表 7-5 显示了哪些员工的薪资高于其所在部门的平均薪资。


    表 7-5

    薪资高于部门平均薪资的员工


    | Name |

    | --- |

    | Alice |

    | John |


    ## 动态对话与子查询


    在 SQL 中，动态对话用于创建交互式和响应式的查询，这些查询可以根据用户的输入以及其他条件进行修改。由于这种动态特性，子查询扮演了重要的角色。SQL 查询可以利用动态对话来创建，这些对话能够根据参数或条件进行调整。因此，相同的查询可以根据用户的输入或数据库的状态以不同的方式执行。这种适应性对于构建能够实时操作和检索数据的稳健应用程序至关重要。


    ### 子查询在动态对话中的作用


    子查询或嵌套查询是指嵌入在另一个 SQL 查询内部的查询。它们为条件逻辑和适应性提供了强大的机制，能够动态地过滤、聚合或转换数据。集成到动态对话中的子查询允许实现条件逻辑、实时适应和增强的模块化。表
    7-6 简要描述了子查询中的条件逻辑、实时适应和增强模块化。


    表 7-6

    子查询中的条件逻辑、实时适应与增强模块化


    | 方面 | 描述 | 示例 |

    | --- | --- | --- |

    | 条件逻辑 | 基于阈值或特定场景（例如用户偏好）动态调整结果。 | 检索子查询计算阈值的记录：`SELECT name``FROM employees``WHERE
    salary > (SELECT AVG(salary) FROM employees);` |

    | 实时适应 | 将参数或应用程序输入与子查询结合使用，以提供上下文相关的结果。 | `SELECT name``FROM employees``WHERE
    salary > (SELECT MIN(salary) FROM employees WHERE department_id = 2);` |

    | 增强模块化 | 将复杂的操作分解为更小、可重用的子查询，以提高清晰度和可维护性。 | `WITH DeptAvg AS (SELECT department_id,
    AVG(salary) AS avg_salary FROM employees GROUP BY department_id) SELECT e.name
    FROM employees e JOIN DeptAvg d ON e.department_id = d.department_id WHERE e.salary
    > d.avg_salary;` |


    如表 7-6 所示，条件逻辑允许基于阈值（例如，将员工薪资与平均值进行比较）动态更改查询结果。另一方面，实时适应结合了用户输入和参数，确保结果能根据具体情况进行定制。例如，你可以对特定部门的员工应用最低工资过滤器。此外，可以使用公用表表达式（CTE）将大型查询划分为可单独重用的部分；这种方法简化了大型查询。例如，可以计算部门平均薪资。本节通过示例阐释了这些子查询，以展示其灵活性、效率和可维护性。

    '
- fmt: '## Introduction to Subqueries as Conversational Elements


    As mentioned, subqueries are SQL queries embedded inside another query. As such,
    they can be referred to as "conversational elements" since they permit queries
    to interact in a dynamic manner, thus enabling a flow of information between queries.
    Follow-up questions are often asked in a conversation to obtain more specific
    information. Subqueries allow SQL queries to build upon each other, enabling more
    complex data retrieval by refining or modifying the main query based on the results
    of another query.


    Subqueries in SQL allow queries to interact and share information dynamically.
    There are various types of subqueries, each playing a different role in enhancing
    data retrieval flow. Single-row subqueries provide direct, one-time answers to
    questions, while multi-row subqueries return a list of possible responses to broader
    queries. A multi-column subquery returns multiple columns and rows, typically
    when comparing tuples, pairs, and groups. Correlated subqueries engage in a continuous
    back-and-forth conversation with the outer query, as they depend on each row''s
    context for execution. Uncorrelated subqueries are executed only once, and their
    results are used by the outer query. Lastly, the subqueries in the `FROM` clause
    act as a foundational context, preparing summarized data that the main query can
    further analyze.


    By breaking down tasks into smaller, more manageable steps, SQL can build complex,
    refined queries. The following sections include a more detailed explanation of
    the types of subqueries, using query examples based on the data provided in Tables
    [7-7](#619961_1_En_7_Chapter.xhtml#Tab7) and [7-8](#619961_1_En_7_Chapter.xhtml#Tab8).


    Table 7-8


    The Departments Table


    | `department_id` | `department_name` | Location |

    | --- | --- | --- |

    | 1 | Sales | New York |

    | 2 | Marketing | Chicago |

    | 3 | IT | San Francisco |

    | 4 | HR | Boston |

    | 5 | Operations | Los Angeles |

    | 6 | Finance | New York |

    | 7 | Logistics | Chicago |

    | 8 | R&D | San Francisco |

    | 9 | Legal | Boston |

    | 10 | Customer Support | Los Angeles |


    Table 7-7


    The Employees Table


    | `employee_id` | `name` | `department_id` | `job_id` | `Salary` |

    | --- | --- | --- | --- | --- |

    | 101 | Alice Johnson | 1 | J001 | 55000 |

    | 102 | Bob Smith | 2 | J002 | 48000 |

    | 103 | Charlie Davis | 1 | J003 | 60000 |

    | 104 | David Brown | 3 | J004 | 72000 |

    | 105 | Emma Wilson | 2 | J001 | 45000 |

    | 106 | Fiona Clark | 4 | J005 | 80000 |

    | 107 | George Miller | 1 | J003 | 61000 |

    | 108 | Hannah White | 4 | J006 | 85000 |

    | 109 | Ian Thompson | 3 | J002 | 70000 |

    | 110 | Julia Lewis | 2 | J004 | 52000 |


    ### Single-Row Subqueries


    In a single-row subquery, only one row and one column of data are returned. It
    is often used when the outer query expects a single value to compare against,
    such as when using comparison operators like `=`, `<`, `>`, or `!=`. If the subquery
    returns more than one row, an error will occur. For instance, the following nested
    query considers a single-row subquery to find the names of all employees in the
    Sales department.


    ```sql

    SELECT name

    FROM employees

    WHERE department_id = (SELECT department_id FROM departments WHERE department_name
    = ''Sales'');

    ```


    The inner query finds the `department_id` of the `''Sales''` department, and the
    outer query retrieves the names of employees in that department.


    As shown in Tables [7-9](#619961_1_En_7_Chapter.xhtml#Tab9) and [7-10](#619961_1_En_7_Chapter.xhtml#Tab10),
    the inner query returns the `department_id` for the Sales department, and the
    outer query retrieves the names of employees with `department_id = 1`.


    Table 7-10


    The Output of the Outer Query


    | `name` |

    | --- |

    | Alice Johnson |

    | Charlie Davis |

    | George Miller |


    Table 7-9


    The Output of Inner Query


    | `department_id` |

    | --- |

    | 1 |


    ### Multi-Row Subqueries


    A multi-row subquery returns multiple rows but usually a single column. These
    subqueries are used with operators like `IN`, `ANY`, or `ALL` to match one or
    more values from the subquery''s results. To find the names of all employees who
    work in any department located in New York, the following nested query considers
    a multi-row subquery.


    ```sql

    SELECT name

    FROM employees

    WHERE department_id IN (SELECT department_id FROM departments WHERE location =
    ''New York'');

    ```


    The subquery retrieves the IDs of all departments located in `''New York''`, and
    the outer query finds employees working in those departments.


    Tables [7-11](#619961_1_En_7_Chapter.xhtml#Tab11) and [7-12](#619961_1_En_7_Chapter.xhtml#Tab12)
    demonstrate, in the inner query, the IDs of the New York departments are returned.
    In the outer query, the names of employees in departments with IDs 1 or 6 are
    returned.


    Table 7-12


    The Output of Outer Query


    | `name` |

    | --- |

    | Alice Johnson |

    | Charlie Davis |

    | George Miller |


    Table 7-11


    The Output of Inner Query


    | `department_id` |

    | --- |

    | 1 |

    | 6 |


    ### Multi-Column Subqueries


    A multi-column subquery returns multiple columns and rows. It is typically used
    with composite comparisons involving tuples, pairs, or groups of values, often
    combined with operators like `IN` or in `JOIN` conditions. For instance, the following
    nested query aims to find the names of employees who have both the same `department_id`
    and `job_id` as current open positions in the company.


    ```sql

    SELECT name

    FROM employees

    WHERE (department_id, job_id) IN (SELECT department_id, job_id FROM job_openings
    WHERE status = ''Open'');

    ```


    The subquery retrieves pairs of `department_id` and `job_id` where jobs are open,
    and the outer query finds employees who match those pairs.


    Table [7-13](#619961_1_En_7_Chapter.xhtml#Tab13) shows the data in the table called
    `job_openings`.


    Table 7-13


    The job_openings Table


    | `department_id` | `job_id` | Status |

    | --- | --- | --- |

    | 1 | J003 | Open |

    | 4 | J006 | Open |


    Subqueries retrieve open jobs, and the outer queries match employees with department-job
    pairs. See Tables [7-14](#619961_1_En_7_Chapter.xhtml#Tab14) and [7-15](#619961_1_En_7_Chapter.xhtml#Tab15).


    Table 7-15


    The Outer Query Output


    | `name` |

    | --- |

    | Charlie Davis |

    | George Miller |

    | Hannah White |


    Table 7-14


    The Inner Query Output


    | `department_id` | `job_id` |

    | --- | --- |

    | 1 | J003 |

    | 4 | J006 |'
