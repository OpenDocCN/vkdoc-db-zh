    ## 第二个故事：速驰汽车公司


    在一家快速发展的汽车制造商，管理层很兴奋地从一张包含销售、客户和车辆信息的数据表中收集洞见。他们公司聘请了数据分析师安娜，来帮助他们理解数据，并提供有意义的见解以推动业务决策。公司收集汽车销售、客户人口统计、定价和生产的数据。安娜需要执行以下高级数据分析，以回答他们关键的业务问题。安娜正在处理表
    5-12 所示的`汽车销售`表，该表包含汽车销售记录，包括地区、车型名称、销售日期和销售金额。


    **表 5-12**

    **汽车销售表**


    | Sale_ID | Model_Name | Region | Sale_Date | Sales_Amount |

    | --- | --- | --- | --- | --- |

    | 1 | Speedster | North | 2024-01-01 | 25000 |

    | 2 | Cruiser | South | 2024-01-03 | 20000 |

    | 3 | Speedster | North | 2024-01-05 | 27000 |

    | 4 | Zoomer | East | 2024-01-07 | 30000 |

    | 5 | Speedster | West | 2024-01-10 | 28000 |

    | 6 | Cruiser | South | 2024-01-12 | 22000 |

    | 7 | Zoomer | North | 2024-01-15 | 26000 |

    | 8 | Speedster | South | 2024-01-17 | 29000 |


    安娜需要回答以下问题。


    ### 1. 识别各区域内的销售顺序


    他们如何识别每个区域内汽车销售的顺序？


    为了找到第一个问题的答案，安娜使用 `ROW_NUMBER()` 为每个区域内的每笔销售分配一个唯一的排名，按销售日期排序，以了解销售的序列。


    ```sql

    SELECT Sale_ID, Region, Model_Name,

    ROW_NUMBER() OVER (PARTITION BY Region ORDER BY Sale_Date) AS Sale_Rank

    FROM Car_Sales;

    ```


    该查询用于根据销售日期对每个区域内汽车的销售进行排名。该查询从 `Car_Sales` 表中检索四列：`Sale_ID`、`Region`、`Model_Name`
    以及一个新计算的列 `Sale_Rank`，后者是使用 `ROW_NUMBER()` 窗口函数创建的。


    首先，`SELECT Sale_ID, Region, Model_Name` 从 `Car_Sales` 表中检索唯一的销售标识符 (`Sale_ID`)、汽车销售的地区
    (`Region`) 以及汽车的型号 (`Model_Name`)。然后，`ROW_NUMBER() OVER (PARTITION BY Region ORDER
    BY Sale_Date)` 使用 `ROW_NUMBER()` 窗口函数为特定分区内的每一行分配一个连续的行号（从 1 开始）。


    安娜使用 `ROW_NUMBER()` 为每个区域内的每笔销售分配一个唯一的排名，按销售日期排序，以了解销售的序列。分区是通过 `Region` 列完成的，这意味着行号将为每个区域单独生成。在每个区域内，行按
    `Sale_Date` 升序排列。这意味着最早的销售行号为 1，第二早的为 2，依此类推。计算出的行号在结果集中被赋予别名 `Sale_Rank` (`AS
    Sale_Rank`)，代表其所在区域内每笔销售的排名或顺序。


    > **注意**

    > `PARTITION BY` 是 SQL 中用于窗口函数的一个子句，用于将结果集划分为更小的组或分区。`PARTITION BY` 与 `GROUP BY`
    的一个关键区别是，`PARTITION BY` 不会折叠行；它允许在每个分区中执行计算，同时保持所有行可见。`PARTITION BY` 允许窗口函数分别应用于每个分区。


    结果将包含按同一区域内发生顺序排名的销售列表。对于跟踪销售序列或识别每个区域内随时间推移的第一、第二……笔销售，这尤其有用。表 5-13 显示了每笔销售在其区域内的排名。


