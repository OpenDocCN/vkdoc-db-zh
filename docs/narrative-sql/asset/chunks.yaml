    ->  Index Scan using players_pkey on players p  (cost=0.15..0.25 rows=1 width=122)

    Index Cond: (player_id = s.player_id)

    (10 rows)

    ```


    Here, the `EXPLAIN` output shows how PostgreSQL executes the query. It starts
    with a sequential scan on the scores table, filtering rows where strokes < 70,
    costing 31.25\. Then, a hash scan on the tournaments table filters for “`Masters
    Tournament`,” costing 13.75\. A hash join connects scores and tournaments, costing
    46.54\. Finally, a nested loop joins this result with the `Players` table using
    an index scan on the primary key, which costs 0.25\. Indexing on `players.player_id`
    improves performance, but sequential scans on scores and tournaments suggest more
    optimization strategies.


    In order to calculate the average strokes for each player in the U.S. Open, Martina
    wrote the following query:


