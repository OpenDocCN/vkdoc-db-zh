    | 7 | 70 | `NULL` | Unknown |

    | 8 | 25 | 3 | Moderate Stay |

    | 9 | 40 | 7 | Moderate Stay |

    | 10 | 60 | 10 | Long Stay |

    | 11 | 15 | 2 | Short Stay |

    | 12 | 50 | `NULL` | Unknown |

    | 13 | 28 | 2 | Short Stay |

    | 14 | 72 | 7 | Moderate Stay |

    | 15 | 10 | `NULL` | Unknown |

    | 16 | 35 | 2 | Short Stay |

    | 17 | 65 | 7 | Moderate Stay |

    | 18 | 22 | 2 | Short Stay |

