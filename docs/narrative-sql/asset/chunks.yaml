- fmt: '### PostgreSQL Query Execution


    在查询执行期间，PostgreSQL 首先检查其语法和结构是否有效。此步骤包括词法分析、语法分析和语义分析。*Lexical analysis* 将查询分解为单个标记，如关键字、列名和表名。*Syntax
    analysis* 检查查询是否遵循 SQL 语法规则。*Semantic analysis* 确保引用的表或列存在并验证数据类型。一旦查询被解析，PostgreSQL
    会通过考虑多种策略来创建执行计划。PostgreSQL 在这些步骤中的关键操作包括表扫描方法、连接策略选择以及排序和聚合优化。在表扫描方法中，PostgreSQL
    在扫描全表的顺序扫描、使用索引的索引扫描以及优化多索引扫描的位图堆扫描之间做出选择。在连接策略选择中，嵌套循环连接适合小表，哈希连接对于大型数据集高效，而合并连接则适合已排序的数据。在排序和聚合优化中，PostgreSQL
    使用索引、哈希、并行处理和内存高效算法来优化排序和聚合，以减少磁盘 I/O 和计算时间。


    图 [11-1](#619961_1_En_11_Chapter.xhtml#Fig1) 说明了 SQL 语句和子句的执行顺序。在 PostgreSQL 中，SQL
    语句和子句的执行顺序遵循一个特定的序列，这与它们在查询中被书写的顺序不同。通常，它以 `FROM` 子句开始，PostgreSQL 在此确定数据来源，这可能涉及多个表或视图，并应用任何
    `JOIN` 操作来组合这些来源。接下来，`WHERE` 子句根据指定的条件过滤行。过滤后，`GROUP BY` 子句将行分组为聚合。如果对聚合组有任何条件，则随后应用
    `HAVING` 子句。一旦行被分组并由 `HAVING` 过滤（如果适用），`SELECT` 子句用于选择将出现在结果中的列和表达式。然后使用 `ORDER
    BY` 子句对数据进行排序，确定返回行的顺序。最后，应用 `LIMIT` 和 `OFFSET` 来限制返回的行数，并在使用 `OFFSET` 的情况下跳过指定数量的行。


    ![Flow chart illustrating a data processing sequence. The process begins with
    merging data from multiple sources using "FROM and JOIN," resulting in a merged
    dataset. This dataset is filtered using "WHERE," then grouped into three categories
    with "GROUP BY." The grouped data undergoes further filtering with "HAVING," followed
    by selection with "SELECT." Finally, the data is ordered using "ORDER BY" and
    limited with "LIMIT and OFFSET." Each step is visually represented by colored
    blocks and arrows indicating the flow direction.](images/619961_1_En_11_Chapter/619961_1_En_11_Fig1_HTML.png)


    图 11-1


    PostgreSQL 中的查询执行流程。


    理解此执行流程至关重要。通过理解 PostgreSQL 中的这个执行流程，你可以优化查询并确保它们返回正确的结果。


    ### Beyond the Query


    数据分析之旅并不止于 SQL 查询的执行。虽然查询是获取洞察的基础，但最终目标是有效地传达这些洞察。原始数据通常抽象而复杂，需要转化为有意义的故事。这就是数据故事讲述发挥作用的地方。它充当了将数据的原始形式与有意义的理解连接起来的桥梁。数据分析师可以通过故事讲述，以引人入胜且富有影响力的方式连接趋势、数据点和模式。


    为了提高分析效果，有效地展示你的发现至关重要。要让受众理解数据并基于数据采取行动，仅仅展示数据是不够的；关键是以他们容易理解的方式解释数据。一个精心制作的演示文稿可以将原始数字转化为强大的叙事，从而指导决策。通过清晰地组织数据、有效地使用视觉辅助工具并专注于洞察，可以确保你的发现不仅被看到，而且被理解。演示文稿不仅应传达信息，还应讲述一个突出数据重要性的故事。它还应强调从中得出的结论的影响。


    前面的章节探讨了数据分析的各个步骤，从理解问题和准备数据到分析和解释数据。现在，是时候将重点转移到讨论如何让发现变得生动起来。


    #### Structuring Your Data Narrative for Presentation


    为演示构建数据叙事对于有效呈现复杂信息至关重要。一个精心构建的数据演示最常具有经典的讲故事结构，从演示开始。


    经典的叙事结构——铺垫、发展、高潮和结局——可以成为数据故事讲述的坚实基础。这种结构通过将数据驱动的洞察置于有意义的框架中，使其更具吸引力和记忆点。简而言之，数据故事讲述涉及一个激发行动的结构化叙事，超越了单纯的统计数据，以传达引人入胜的信息。经典叙事结构以铺垫开始，设定场景，介绍背景、问题或手头的疑问。提供相关的背景信息和数据对于确立主题的重要性并帮助受众理解其为何重要至关重要。随后是发展部分，它构建论点，呈现关键发现和见解。数据可视化、趋势分析和比较被用来建立期望并引导受众走向核心信息。然后叙事达到高潮，揭示最具影响力的洞察或意外发现。这是一个关键时刻，旨在激发受众的重大认识。最后是结局，它呼吁行动或后续步骤，解释发现的启示。它根据数据建议可能的行动、决策或未来方向。这个结束阶段确保数据故事不仅能传递信息，还能激发行动，将原始数据转化为知情决策的基础。


    #### Understanding the Audience


    了解你的受众的重要性不容低估。根据受众的专业水平定制你的演示文稿至关重要。对于数据科学家，详细的方法论和专业术语可能是合适的，而对于业务高管或普通利益相关者，则需要一个专注于战略影响的高层次概述。此外，识别你受众的目标——无论他们是寻求战略业务洞察、运营改进还是技术解决方案——将使你能够使内容与他们的需求保持一致。通过将你的叙事与他们的关切对齐，你确保叙事直接解决受众的关切并为他们提供有用的信息。'
  raw: '### PostgreSQL Query Execution


    During the execution of a query, PostgreSQL first checks whether it is valid in
    terms of syntax and structure. This step includes lexical analysis, syntax analysis,
    and semantic analysis. *Lexical analysis* breaks the query down into individual
    tokens like keywords, column names, and table names. *Syntax analysis* checks
    whether the query follows SQL grammar rules. *Semantic analysis* ensures referenced
    tables or columns exist and verifies data types. Once the query is parsed, PostgreSQL
    creates an execution plan by considering multiple strategies. PostgreSQL’s key
    actions in these steps include table scanning methods, join strategy selection
    and sorting and aggregation optimization. In table scanning methods, PostgreSQL
    decides between a sequential scan that scans the full table, an index scan that
    uses indexes, and a bitmap heap scan that optimizes scans with multiple indexes.
    In the join strategy selection, a nested loop join is good for small tables, a
    hash join is efficient for large datasets, and a merge join is good for sorted
    data. In sorting and aggregation optimization, PostgreSQL optimizes sorting and
    aggregation using indexes, hashing, parallel processing, and memory-efficient
    algorithms to reduce disk I/O and computation time.


    Figure [11-1](#619961_1_En_11_Chapter.xhtml#Fig1) illustrates the execution order
    of SQL statements and clauses. In PostgreSQL, the execution order of SQL statements
    and clauses follows a specific sequence that differs from the order in which they
    are written in the query. Generally, it begins with the `FROM` clause, where PostgreSQL
    identifies the source of the data, which could involve multiple tables or views,
    and applies any `JOIN` operations to combine these sources. Next, the `WHERE`
    clause filters the rows based on the conditions specified. After filtering, the
    `GROUP BY` clause groups the rows into aggregates. If there are any conditions
    on the aggregated groups, the `HAVING` clause is then applied. Once the rows are
    grouped and filtered by `HAVING`, if applicable, the `SELECT` clause is used to
    choose the columns and expressions that will appear in the result. The data is
    then sorted using the `ORDER BY` clause, determining the order in which the rows
    are returned. Finally, `LIMIT` and `OFFSET` are applied to restrict the number
    of rows returned and, in the case of `OFFSET`, to skip a specified number of rows.


    ![Flow chart illustrating a data processing sequence. The process begins with
    merging data from multiple sources using "FROM and JOIN," resulting in a merged
    dataset. This dataset is filtered using "WHERE," then grouped into three categories
    with "GROUP BY." The grouped data undergoes further filtering with "HAVING," followed
    by selection with "SELECT." Finally, the data is ordered using "ORDER BY" and
    limited with "LIMIT and OFFSET." Each step is visually represented by colored
    blocks and arrows indicating the flow direction.](images/619961_1_En_11_Chapter/619961_1_En_11_Fig1_HTML.png)


    Figure 11-1


    The flow of query execution in PostgreSQL.


    It is essential to understand this execution flow. By understanding this flow
    of execution in PostgreSQL, you can optimize queries and ensure that they return
    the right results.


    ### Beyond the Query


    The journey of data analysis doesn’t end with the execution of a SQL query. While
    querying serves as the foundation for gathering insights, the ultimate goal is
    to communicate these insights effectively. Often abstract and complex, raw data
    requires transformation into a meaningful story. This is where data storytelling
    comes into play. It acts as the bridge that connects the data’s raw form to meaningful
    understanding. Data analysts can connect trends, data points, and patterns in
    interesting, engaging, and impactful ways through storytelling.


    In order to increase analytical effectiveness, it is essential to present your
    findings effectively. To get your audience to understand and act on the data,
    it is not sufficient to simply display the data; the key is to explain the data
    in a way they can easily understand. A well-crafted presentation can transform
    raw numbers into a powerful narrative that guides decision-making. By organizing
    data clearly, using visual aids effectively, and focusing on the insights, it
    is possible to ensure that your findings are not just seen, but understood. The
    presentation should not only convey information but also tell a story that highlights
    the significance of the data. It should also highlight the impact of the conclusions
    drawn from them.


    The previous chapters explored the steps of data analysis, from understanding
    the problem and preparing the data to analyzing and interpreting it. Now, it’s
    time to shift focus and discuss how to bring the findings to life.


    #### Structuring Your Data Narrative for Presentation


    Structuring your data narrative for presentation is crucial to presenting complex
    information effectively. A well-constructed data presentation most often has a
    classic storytelling structure, beginning with the presentation.


    The classic narrative structure—exposition, rising action, climax, and resolution—can
    be a strong foundation for data storytelling. This structure helps you make data-driven
    insights more engaging and memorable by framing them in a meaningful way. In a
    nutshell, data storytelling involves a structured narrative that inspires action,
    going beyond mere statistics to convey a compelling message. The classic narrative
    structure begins with exposition, which sets the stage, where the context, problem,
    or question at hand is introduced. Providing relevant background information and
    data is crucial to establish the significance of the topic and help the audience
    understand why it matters. Following this is rising action, which builds the case,
    presenting key findings and insights. Data visualizations, trend analyses, and
    comparisons are employed to build expectation and guide the audience toward the
    core message. The narrative then reaches its climax, where the most impactful
    insight or unexpected discovery is revealed. This is the pivotal moment, designed
    to inspire a significant realization in the audience. Finally, the resolution,
    which calls to action or next steps, explains the implications of the findings.
    It suggests possible actions, decisions, or future directions based on the data.
    This concluding phase ensures that the data story not only informs but also inspires
    action, transforming raw data into a basis for informed decision-making.


    #### Understanding the Audience


    The importance of knowing your audience cannot be underestimated. Customizing
    your presentation to the audience’s proficiency is essential. For data scientists,
    detailed methodology and technical terminology may be appropriate, while business
    executives or general stakeholders require a high-level overview that focuses
    on strategic implications. Further, recognizing your audience’s objectives—whether
    they seek strategic business insights, operational improvements, or technical
    solutions—will enable you to align your content with their needs. By aligning
    your narrative with their concerns, you ensure that your narrative addresses the
    audience’s concerns directly and provides them with useful information.'
  trans: '

    ### PostgreSQL 查询执行


    在查询执行期间，PostgreSQL 首先检查其语法和结构是否有效。此步骤包括词法分析、语法分析和语义分析。*词法分析* 将查询分解为单个标记，如关键字、列名和表名。*语法分析*
    检查查询是否遵循 SQL 语法规则。*语义分析* 确保引用的表或列存在并验证数据类型。一旦查询被解析，PostgreSQL 会通过考虑多种策略来创建执行计划。PostgreSQL
    在这些步骤中的关键操作包括表扫描方法、连接策略选择以及排序和聚合优化。在表扫描方法中，PostgreSQL 在扫描全表的顺序扫描、使用索引的索引扫描以及优化多索引扫描的位图堆扫描之间做出选择。在连接策略选择中，嵌套循环连接适合小表，哈希连接对于大型数据集高效，而合并连接则适合已排序的数据。在排序和聚合优化中，PostgreSQL
    使用索引、哈希、并行处理和内存高效算法来优化排序和聚合，以减少磁盘 I/O 和计算时间。


    图 11-1 说明了 SQL 语句和子句的执行顺序。在 PostgreSQL 中，SQL 语句和子句的执行顺序遵循一个特定的序列，这与它们在查询中被书写的顺序不同。通常，它以
    `FROM` 子句开始，PostgreSQL 在此确定数据来源，这可能涉及多个表或视图，并应用任何 `JOIN` 操作来组合这些来源。接下来，`WHERE`
    子句根据指定的条件过滤行。过滤后，`GROUP BY` 子句将行分组为聚合。如果对聚合组有任何条件，则随后应用 `HAVING` 子句。一旦行被分组并由 `HAVING`
    过滤（如果适用），`SELECT` 子句用于选择将出现在结果中的列和表达式。然后使用 `ORDER BY` 子句对数据进行排序，确定返回行的顺序。最后，应用
    `LIMIT` 和 `OFFSET` 来限制返回的行数，并在使用 `OFFSET` 的情况下跳过指定数量的行。


    ![展示数据处理序列的流程图。流程从使用“FROM and JOIN”合并来自多个源的数据开始，产生一个合并的数据集。该数据集使用“WHERE”进行过滤，然后使用“GROUP
    BY”分为三个类别。分组后的数据使用“HAVING”进行进一步过滤，接着使用“SELECT”进行选择。最后，数据使用“ORDER BY”排序，并使用“LIMIT
    and OFFSET”限制。每个步骤都由彩色块和指示流向的箭头直观表示。](img/619961_1_En_11_Fig1_HTML.png)


    图 11-1


    PostgreSQL 中的查询执行流程。


    理解此执行流程至关重要。通过理解 PostgreSQL 中的这个执行流程，你可以优化查询并确保它们返回正确的结果。


    ### 超越查询本身


    数据分析之旅并不止于 SQL 查询的执行。虽然查询是获取洞察的基础，但最终目标是有效地传达这些洞察。原始数据通常抽象而复杂，需要转化为有意义的故事。这就是数据故事讲述发挥作用的地方。它充当了将数据的原始形式与有意义的理解连接起来的桥梁。数据分析师可以通过故事讲述，以引人入胜且富有影响力的方式连接趋势、数据点和模式。


    为了提高分析效果，有效地展示你的发现至关重要。要让受众理解数据并基于数据采取行动，仅仅展示数据是不够的；关键是以他们容易理解的方式解释数据。一个精心制作的演示文稿可以将原始数字转化为强大的叙事，从而指导决策。通过清晰地组织数据、有效地使用视觉辅助工具并专注于洞察，可以确保你的发现不仅被看到，而且被理解。演示文稿不仅应传达信息，还应讲述一个突出数据重要性的故事。它还应强调从中得出的结论的影响。


    前面的章节探讨了数据分析的各步骤，从理解问题和准备数据到分析和解释数据。现在，是时候将重点转移到讨论如何让发现变得生动起来。


    #### 为演示构建数据叙事结构


    为演示构建数据叙事对于有效呈现复杂信息至关重要。一个精心构建的数据演示最常具有经典的讲故事结构，从演示开始。


    经典的叙事结构——铺垫、发展、高潮和结局——可以成为数据故事讲述的坚实基础。这种结构通过将数据驱动的洞察置于有意义的框架中，使其更具吸引力和记忆点。简而言之，数据故事讲述涉及一个激发行动的结构化叙事，超越了单纯的统计数据，以传达引人入胜的信息。经典叙事结构以铺垫开始，设定场景，介绍背景、问题或手头的疑问。提供相关的背景信息和数据对于确立主题的重要性并帮助受众理解其为何重要至关重要。随后是发展部分，它构建论点，呈现关键发现和见解。数据可视化、趋势分析和比较被用来建立期望并引导受众走向核心信息。然后叙事达到高潮，揭示最具影响力的洞察或意外发现。这是一个关键时刻，旨在激发受众的重大认识。最后是结局，它呼吁行动或后续步骤，解释发现的启示。它根据数据建议可能的行动、决策或未来方向。这个结束阶段确保数据故事不仅能传递信息，还能激发行动，将原始数据转化为知情决策的基础。


    #### 理解你的受众


    了解你的受众的重要性不容低估。根据受众的专业水平定制你的演示文稿至关重要。对于数据科学家，详细的方法论和专业术语可能是合适的，而对于业务高管或普通利益相关者，则需要一个专注于战略影响的高层次概述。此外，识别你受众的目标——无论他们是寻求战略业务洞察、运营改进还是技术解决方案——将使你能够使内容与他们的需求保持一致。通过将你的叙事与他们的关切对齐，你确保叙事直接解决受众的关切并为他们提供有用的信息。

    '
- fmt: '### 数据故事呈现的关键要素


    一个数据故事呈现的关键要素始于一个强有力的开场，旨在立即抓住注意力。这可以是一个发人深省的问题、一个惊人的统计数据或一个相关的现实场景。开场之后，应提供背景和概述，说明数据集的来源以及正在调查的业务问题或研究问题。对方法（包括所使用的任何
    `SQL` 查询和分析技术）进行简明描述，能为你的发现增添可信度。关键发现应清晰、简洁地呈现，最好辅以可视化图表以增强理解。从发现过渡到实际建议至关重要。这能将洞察转化为利益相关者可以实施的实际步骤。通过引导观众采取行动——无论是做出业务决策、采用新策略还是进行进一步研究——这确保了演示文稿以一个明确的目标和影响力结束。


    ### 可视化：从图像中获取洞察


    原始数据可能密集且难以解读。可视化将原始数据转化为易于理解的洞察，增强了理解和参与度。因为人脑处理视觉信息比文本信息更高效，所以可视化可以成为一种强大的沟通工具。然而，有效的可视化取决于选择正确的图表类型。例如，条形图非常适合比较类别，而折线图则擅长显示随时间变化的趋势。选择恰当的图表能确保数据的故事被准确有效地传达，防止误解并增强理解。表
    [11-6](#619961_1_En_11_Chapter.xhtml#Tab6) 和图 [11-2](#619961_1_En_11_Chapter.xhtml#Fig2)
    说明了对有效可视化有用的常用图表类型。


    ![图片是一个展示各种图表类型的面板图。左上角子图是一个具有不同高度垂直条的条形图。其他子图包括柱形图、折线图、散点图、饼图、环形图、直方图、箱线图、气泡图、热力图、面积图、堆积条形图、瀑布图和雷达图。每个图表类型的标签位于其各自子图的顶部，展示了不同的数据可视化方法。](images/619961_1_En_11_Chapter/619961_1_En_11_Fig2_HTML.jpg)


    **图 11-2** 常用图表类型图示


    **表 11-6** 常用图表类型摘要


    | 图表类型 | 描述 |

    | --- | --- |

    | 条形图 | 用矩形条显示分类数据；用于比较数量。 |

    | 柱形图 | 类似于条形图，但条形是垂直的；用于比较不同类别。 |

    | 折线图 | 通过用线连接数据点来显示随时间变化的趋势。 |

    | 散点图 | 使用点显示两个数值变量之间的关系。 |

    | 饼图 | 用扇形表示一个整体的比例；最适合显示百分比分布。 |

    | 环形图 | 饼图的变体，中心有一个孔，提高了可读性。 |

    | 直方图 | 类似于条形图，但用于连续数据的频率分布。 |

    | 箱线图（箱须图） | 用四分位数和异常值总结数据分布。 |

    | 气泡图 | 类似于散点图，但包含由气泡大小表示的第三个变量。 |

    | 热力图 | 使用颜色梯度以矩阵形式显示变量之间的关系。 |

    | 面积图 | 类似于折线图，但线下有阴影区域以强调数量。 |

    | 堆积条形图 | 将条形分割成不同类别以显示部分与整体的关系。 |

    | 瀑布图 | 显示初始值如何受到一系列正面或负面影响。 |

    | 雷达图（蜘蛛图） | 在径向布局中比较不同类别中的多个变量。 |

    | 树状图 | 使用嵌套的矩形通过大小和颜色来表示层次数据。 |


    如图 [11-2](#619961_1_En_11_Chapter.xhtml#Fig2) 所示，可视化技术在数据叙事中服务于不同的目的。条形图对于比较分类数据非常有效，例如不同产品线的销售额。折线图对于说明随时间变化的趋势非常宝贵，比如全年网站流量的波动。散点图揭示了两个数值变量之间的关系，展示了相关性或模式。直方图显示单个数值变量的分布，突出频率和范围。地图对于地理数据至关重要，允许进行空间分析和模式识别。最后，仪表板可以将多个可视化组合成一个统一的界面，提供关键绩效指标的全面概览。


    ### 为 PostgreSQL 推荐的可视化工具


    `PostgreSQL` 是一个强大的关系型数据库，可以与各种可视化工具无缝集成，使数据变得生动。`Tableau` 和 `Power BI` 提供了用户友好的界面来创建交互式仪表板，而
    `Grafana` 则非常擅长时间序列数据可视化，常用于监控。`Python` 库如 `Matplotlib` 和 `Seaborn` 提供了一种更具编程性的方法，提供了广泛的定制选项，如图
    [11-2](#619961_1_En_11_Chapter.xhtml#Fig2) 所示。要将数据从 `PostgreSQL` 导出到这些工具，你可以执行标准的
    `SQL` 查询来提取所需数据，然后将其导出为 `CSV` 文件，或使用可视化工具提供的直接数据库连接器。例如，`Tableau` 和 `Power BI`
    允许通过 `ODBC` 或 `JDBC` 驱动程序直接连接到 `PostgreSQL` 数据库。因此，无论可视化是实时更新还是按计划更新，它们都可以反映最新的信息。


    ### 超越演示：如何引导你的观众


    有效的数据演示并不止于最后一张幻灯片。通过引导观众超越演示文稿，确保他们理解、记住并根据洞察采取行动。这包括提供支持材料、鼓励进一步探索和培养数据驱动的文化。


    #### 支持材料


    为了增强理解和可信度，分享支持分析的资源至关重要。数据来源的透明度允许观众验证信息并理解其可靠性。每个数据集都存在局限性，以及诸如缺失值或偏差等数据挑战。此外，创建一个结构化的关键术语、指标和定义列表，能确保解释的一致性，尤其是在处理复杂数据集或技术术语时。


    #### 鼓励进一步探索


    数据演示应激发观众的好奇心。演示者不应只是简单地给出结论，而应让观众参与到对新问题的讨论中。讨论 `SQL` 查询背后的问题可以带来更好的洞察或更具启发性的问题，从而发现更好的数据发现。此外，提供像共享仪表板或数据集这样的交互式工具，能让观众进行实践探索，使他们能够独立发现洞察。


    #### 创建数据驱动的文化


    超越单次演示的目标，是创造一个数据处于决策核心的环境。通过使用数据来指导策略，演示者可以帮助观众将思维模式从基于直觉转变为基于证据。通过采用这种策略，演示者可以超越仅仅分享洞察——他们可以为观众配备工具、思维方式和动力，使他们在演示结束后仍能长期有效地使用数据。'
  raw: '#### The Key Elements of a Data Story Presentation


    The key elements of a data story presentation begin with a powerful intro, designed
    to immediately capture attention. This could be a thought-provoking question,
    a startling statistic, or a relatable real-world scenario. Following the opening
    line, provide context and background, outlining the dataset’s origin and the business
    problem or research question being investigated. A concise description of the
    methodology, including any SQL queries and analytical techniques used, adds credibility
    to your findings. The key findings should be presented clearly and concisely,
    ideally supported by visualizations for enhanced comprehension. Transitioning
    from findings to practical recommendations is essential. This can translate insights
    into practical steps stakeholders can implement. This ensures that the presentation
    concludes with a clear purpose and impact by directing the audience to take action,
    whether making a business decision, adopting a new strategy, or pursuing further
    research.


    #### Visualization: Insights from Visuals


    Data in its raw form can be dense and difficult to interpret. Visualizations transform
    raw data into digestible insights, enhancing understanding and engagement. Because
    the human brain processes visual information more efficiently than textual information,
    visualizations can be a powerful communication tool. An effective visualization
    depends, however, on the selection of the right chart type. For example, bar charts
    are ideal for comparing categories, whereas line charts are excellent for displaying
    trends over time. A properly chosen chart ensures that the data’s story is conveyed
    accurately and effectively, preventing misinterpretations and enhancing understanding.
    Table [11-6](#619961_1_En_11_Chapter.xhtml#Tab6) and Figure [11-2](#619961_1_En_11_Chapter.xhtml#Fig2)
    illustrate commonly used chart types that are useful for effective visualization.


    ![The image is a panel figure displaying various types of charts. The top left
    subfigure is a bar chart with vertical bars of varying heights. Other subfigures
    include a column chart, line chart, scatter plot, pie chart, doughnut chart, histogram,
    box plot, bubble chart, heatmap, area chart, stacked bar chart, waterfall chart,
    and radar chart. Each chart type is labeled at the top of its respective subfigure,
    illustrating different methods of data visualization.](images/619961_1_En_11_Chapter/619961_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    An illustration of commonly used chart types


    Table 11-6


    A Summary of Commonly Used Chart Types


    | Chart Type | Description |

    | --- | --- |

    | Bar chart | Displays categorical data with rectangular bars; useful for comparing
    quantities. |

    | Column chart | Similar to a bar chart but with vertical bars; used to compare
    different categories. |

    | Line chart | Shows trends over time by connecting data points with a line. |

    | Scatterplot | Displays relationships between two numerical variables using dots.
    |

    | Pie chart | Represents proportions of a whole using slices; best for showing
    percentage distributions. |

    | Doughnut chart | A variation of the pie chart with a hole in the center, improving
    readability. |

    | Histogram | Similar to a bar chart but used for frequency distribution of continuous
    data. |

    | Box plot (box-and-whisker plot) | Summarizes data distribution with quartiles
    and outliers. |

    | Bubble chart | Similar to a scatterplot but includes a third variable represented
    by bubble size. |

    | Heatmap | Uses color gradients to show relationships between variables in a
    matrix format. |

    | Area chart | Similar to a line chart but with shaded areas under the lines to
    emphasize volume. |

    | Stacked bar chart | Segments bars into different categories to show part-to-whole
    relationships. |

    | Waterfall chart | Shows how an initial value is affected by a series of positive
    or negative changes. |

    | Radar chart (spider chart) | Compares multiple variables across different categories
    in a radial layout. |

    | Treemap | Uses nested rectangles to represent hierarchical data with size and
    color. |


    As shown in Figure [11-2](#619961_1_En_11_Chapter.xhtml#Fig2), visualization techniques
    serve distinct purposes in data storytelling. Bar charts are effective for comparing
    categorical data, such as sales figures across different product lines. Line charts
    are invaluable for illustrating trends over time, like website traffic fluctuations
    throughout the year. Scatterplots reveal relationships between two numerical variables,
    showcasing correlations or patterns. Histograms display the distribution of a
    single numerical variable, highlighting frequency and range. Maps are essential
    for geographical data, allowing spatial analysis and pattern recognition. Lastly,
    dashboards can combine multiple visualizations into a unified interface, providing
    a comprehensive overview of key performance indicators.


    #### Visualization Tools Recommended for PostgreSQL


    PostgreSQL, a robust relational database, can be seamlessly integrated with various
    visualization tools to bring data to life. Tableau and Power BI offer user-friendly
    interfaces for creating interactive dashboards, while Grafana is excellent for
    time-series data visualization, often used for monitoring. Python libraries such
    as Matplotlib and Seaborn provide a more programmatic approach, offering a wide
    range of customization options, as illustrated in Figure [11-2](#619961_1_En_11_Chapter.xhtml#Fig2).
    To export data from PostgreSQL to these tools, you can perform standard SQL queries
    to extract the desired data and then export it as a CSV file, or use direct database
    connectors provided by the visualization tools. For example, Tableau and Power
    BI allow direct connections to PostgreSQL databases via ODBC or JDBC drivers.
    As a result, the visualizations can reflect the most current information, whether
    they are updated live or on a schedule.


    ### Beyond the Presentation: How to Guide Your Audience


    Effective data presentations do not end with the last slide. Ensure that audience
    members understand, retain, and act on insights by guiding them beyond the presentation.
    This involves providing supporting materials, encouraging further exploration,
    and fostering a data-driven culture.


    #### Supporting Materials


    To enhance understanding and credibility, it’s essential to share resources that
    support the analysis. Transparency in data sourcing allows audiences to verify
    information and understand reliability. There are limitations in every dataset,
    as well as data challenges such as missing values or biases. Furthermore, creating
    a structured list of key terms, metrics, and definitions ensures consistency in
    interpretation, especially when working with complex datasets or technical terminology.


    ### Encouraging Further Explorationt


    A data presentation should inspire a sense of curiosity in the audience. Rather
    than simply delivering conclusions, presenters should engage the audience in a
    discussion of new questions. Discussing the questions behind SQL queries can lead
    to better insights or more insightful questions that can uncover better data findings.
    Also, providing interactive tools like shared dashboards or datasets enables hands-on
    exploration, empowering the audience to uncover insights independently.


    #### Creating a Data-Driven Culture


    Beyond a single presentation, the goal is to create an environment where data
    is at the core of decision-making. By using data to inform strategies, presenters
    can help audiences shift mindsets from intuition-based to evidence-based decision-making.
    By incorporating this strategy, presenters can move beyond just sharing insights—they
    can equip their audience with the tools, mindset, and motivation to use data effectively
    long after the presentation ends.'
