  ## 1


  数据库管理是一个很难向他人解释你靠什么谋生的职业。我们通常介于构建服务器的人和需要在同一台服务器上存储和检索数据的人之间。因此，我们被期望知道并理解大量、多方面的知识，有时这会让人难以承受。以至于你有时会停下来，花点时间反思自己在生活中的位置，并疑惑：“我是如何走到这一步的？”


  我经常被问到两个问题。第一个是，“你是如何成为 DBA 的？”第二个问题是，“DBA 具体是做什么的？”本章将帮助解释前者，其余章节将帮助解释后者。对大多数人来说，成为一名
  DBA 可能是一段神秘的旅程。我将与你分享我的故事以及其他人的故事，以帮助你更好地理解有些人是如何最终成为 DBA 的。


  提示：小心你的愿望，因为它可能会成真。


  在本章中，我们将讨论以下内容：


  1.  我的旅程

  2.  其他人的旅程

  3.  你的旅程

  4.  保持专注


  ## 我的旅程


  我是如何成为一名 DBA 的？这肯定不是我小学时梦想的职业。那时我可能想成为一名消防员或警察。


  我也不能说我在职业生涯早期就计划成为一名 DBA，至少最初不是这样。我进入 DBA 领域有点顺其自然。有些人可能会认为这是“纯粹的运气”，但我更喜欢称之为“明智的运气”。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 4](img/index-20_1.png)


  ## 早期的教训


  我的第一台电脑？那会是`Commodore VIC-20`。我记得通过修剪草坪攒钱，由姐姐开车带我去商场，买了那台可以使用`RF 适配器`连接到电视的一体机。我还买了`datasette`，那不过是一个盒式磁带播放器，但它能让我保存程序，这很好。


  我买了一本程序书，可以自己输入并运行。你知道吗？有时候书里会印错。想象一下，一本书里的计算机程序缺少了几个重要字符。我不需要想象这种事，因为我亲身经历过。我常常发现自己处于调试程序的状态。直到今天，我相信这是我进行迭代式调试的最大原因；我总是做小的改动，并在进行过程中衡量效果，而其他人则喜欢做大量工作，然后试图调试一切。


  除了从小就对计算机感兴趣外，我还对数学着迷。这两个领域本质上都是分析性的，为我后来的生活打下了良好的基础。哦，而且这两个领域都不需要我做很多写作，这也很好。事实上，我上大学时选择数学专业，只是为了最小化学期论文的数量。


  提示：多走一步，多做一点工作，从长远来看总是值得的。


  不幸的是，我缺乏写作经验的后果在研究生院显现出来了。在我上的第一堂课上，教授告诉我需要把解题过程写出来；我需要写出单词`two`，而不是使用数字`2`。而且我不能只用`=`；我必须写`equals`。这对我来说是一个痛苦的调整，但它对我很有帮助。到那时，我已经明白，那条少有人走的路通常会把我带到比想象中更好的地方。


  在研究生院期间，我可以选择完成一个硕士项目作为获得学位的一部分。由于过去知道多付出总是有回报，我决定承担一个项目。当时，华盛顿州立大学（`WSU`）的数学系和天文系是联合的，我对所有外星事物有着天然的热爱（现在仍然如此）。我问一位天文学教授是否愿意和我一起做一个项目，他同意了。


  我的项目题为“球状星团的星际辐射场”，涉及相当多的编程。不是`Commodore VIC-20`的编程；我们谈论的是`FORTRAN77`、`Sun 工作站`、天体物理方程、数组、望远镜、图表、图形，甚至`LaTeX`。我在很短的时间内接触了大量编程，并在离开`WSU`时获得了数学硕士学位（`MS`），以及足够帮我找到工作的编程经验。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 5](img/index-21_1.png)


  ## 职业生涯早期


  我带着`MS`学位离开了研究生院，因为我觉得这比继续攻读`PhD`能给我更多找工作的机会。有一天，我去面试，面试官是一位拥有物理学`PhD`的男士。我们面试的大部分时间都在谈论我在`WSU`做的项目。他需要有人用`PowerBuilder`做一些编程工作。我仍然记得他对我说的话：“我可以教你任何我需要你做的事，我知道你能做好这份工作。”


  就这样，我被录用了。作为一名`PowerBuilder`开发人员。尽管我对`PowerBuilder`毫无经验。


  我在那里工作了大约一年半，然后跳槽到一家也在寻找`PowerBuilder`帮手的软件公司。当然，到那时我实际上已经有了一些`PowerBuilder`经验。但我仍然没有的是任何真正的数据库经验。


  我当时只知道我的数据去了某个地方，当我需要时，它又会回来。我确实在那里学到了一些关于数据库设计、触发器、存储过程的东西，并意识到我有兴趣了解更多。




  '
- '# 第一章：我是如何走到这里的？


  ## 影子所知！


  又过了一年，我发现自己来到了一家新公司，他们正在寻找一些 `PowerBuilder` 方面的帮助。我接受了这份工作，大约工作了一年左右，我意识到了两件事。第一，我需要做些
  `PowerBuilder` 以外的事情，因为总会有那么一天，`PowerBuilder` 的需求会下降到我无法持续找到工作的地步。第二，我想成为一名 `DBA`。


  **提示：** 在生活中找到你热爱的事物；它会让其他人生决策变得容易。


  我认为 `DBA` 这个角色，不会像只懂一门特定编程语言的开发者那样容易消失。在那之前，我主要做 `PowerBuilder` 的工作，并且刚刚开始接触 `.NET`。那时，为了保持市场竞争力，每隔几年就必须学习一门新语言的想法，似乎令人生畏。但成为一名
  `DBA` 意味着我将成为“幕后之人”，总是在调整各种“旋钮”，并且总能找到工作。


  因此，我开始寻找机会协助处理 `DBA` 任务。当公司打算招聘一名全职 `DBA` 时，我拿着简历去找了招聘经理。她立刻告诉我，他们不会考虑雇我做这份工作，因为我没有经验。


  相反，他们打算雇一位之前合作过的人。我大约失望了三十秒钟，然后经理告诉我，他们也正在考虑启动一个“初级 `DBA`”计划，以培训人员在需要时提供帮助。她想把我的名字记下来，作为有兴趣参加内部培训的人，我同意了。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 6](img/index-22_1.png)


  作者：Brent Ozar


  如果你想成为一名 `DBA`，而你的公司不愿意送你去培训，问问他们是否允许你每周花一天时间跟随公司的 `DBA` 学习。如果他们不同意，那就播下一颗种子，让他们意识到
  `DBA` 不会永远在这里。如果公司内部已经有人懂得公司数据库运作的基本原理，岂不是很好？这个想法或许能促使他们启动一个内部指导计划。


  ## 运气、准备与机遇


  如果说我从运动生涯和担任教练的日子里学到了一点什么，那就是运气可以定义为当准备遇上机遇。考虑到这一点，我开始参加那些初级 `DBA` 课程。我像一块海绵，尽可能吸收一切知识。随着时间的推移，我会请求执行一些常规任务，并得到了一些高质量的在职培训。发展到后来，当常规的
  `DBA`（当时有两位）需要请一天假时，他们可以放心休假，并让人们在遇到任何问题时来找我处理。


  我对于处理大量常规操作任务变得越来越得心应手。


  备份、恢复、密码重置、创建登录账户，甚至一些性能调优和故障排除。我还开始参与配置必要的环境监控，帮助构建一个内部监控解决方案，以便我们能更主动地解决问题。同时，我还有我的常规日常工作，处理
  `PowerBuilder`、`.NET` 和 `SQR` 报告。


  然后，有一天，我所有的准备都遇到了它等待已久的机遇。两位常规 `DBA` 在日历年结束时辞职了。其中一位是合同工，他离开去其他地方签了新合同。另一位则纯粹是不想再待下去了。


  他们的经理过来和我的经理谈了谈，然后他们问我是否愿意成为下一任 `DBA`。我的一位团队成员评论说，这份工作对你来说是“一个巨大的机会”，于是我走进办公室与两位经理讨论这个职位。


  我告诉他们我需要一些时间考虑。嘿，我可不想显得太急切！


  作者：Jonathan Gennick


  “有时你会创造自己的运气。”一位朋友曾在我获得一个对职业生涯至关重要的职位后，对我说过这句话。当时我为了糊口，干了两三个月的 `COBOL` 合同工。然后客户突然终止了项目，让我们十几号人甚至更多人又回到了就业市场。


  我当时的热爱是 `SQL`，所以我抓住每一个机会参与到项目的数据库端工作中。最终我“拥有”了输入/输出例程，因为我既懂 `COBOL` 又懂 `Rdb`，并且知道如何将它们结合起来。我工作认真，态度良好，并对我所做的事充满热情。回想起来，我工作做得非常出色，并且与同事们分享了我对这份工作的热情。


  我的一位办公室同事——那个项目中我们三人共用一间办公室——比我自己意识到的更多地关注了我。后来他找到了我，并在我加入一家国际咨询公司过程中发挥了关键作用。正是在那里，我学习了
  `Oracle`，这促使我写了几本书，又导致了职业生涯的转变（同样是由于热情和准备），最终使我得以住在上半岛，那是我长久以来的梦想之地。在我的职业生涯中，我曾有过几次“幸运”。然而，在我能想到的所有情况中，汤姆说的是对的。任何“运气”始终是工作、准备和个人成长与意外机遇相遇的结果。


