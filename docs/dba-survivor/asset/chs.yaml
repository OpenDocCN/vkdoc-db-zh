- "# 第三章：基础知识\n\n在我们正式开始之前，有必要快速了解一下复制术语。许多使用的术语（`发布者`、`订阅者`、`分发者`）源于出版行业，\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![图片 52](img/index-68_1.png)\n\n因此出版行业常被用来描述复制概念。所以，`发布者`一词的含义正如您所想的那样：发布信息的人，就像报社一样。`分发者`则是将报纸分发给`订阅者`的人。够简单吧？很好，现在让我们来看看\
  \ SQL 复制的不同类型。\n\n#### 事务复制\n\n事务复制是指在发布者处提交的事务被复制并提交到订阅者处。这用报纸或杂志来类比就说不通了，所以请把它想象成您正在阅读本地报纸的在线版。如果有人对网站上的文章进行了修改，您下次刷新浏览器时就会看到这些更改。\n\
  \n何时应使用这种类型的复制？答案通常涉及具有高事务量且需要低延迟的系统，以及您的其中一个订阅者不是 Microsoft SQL Server 的情况。此外，事务复制拓扑中的订阅者通常被认为是只读的，但也可以允许订阅者对数据进行更改，然后将这些更改推送回发布者。\n\
  \n当您有一个非 SQL Server 的服务器，或者您需要多个订阅者时，事务复制是有意义的。如果您只有一个订阅者并且您只有 SQL Server 数据库服务器，那么您应该采用数据库镜像，如本章后面将讨论的那样。但请考虑您希望复制更改的范围。使用数据库镜像，所有事务都会被镜像并因此被复制，而使用事务复制，只有那些标记为复制的事务才会被复制。\n\
  \n#### 合并复制\n\n这可能是所有复制技术中最庞大的怪兽。通过使用触发器，发布者和订阅者处的更改被合并在一起。想象一家报社需要发布晚间新闻，有十名记者在现场更新报道。现在假设两名记者正在报道同一新闻并尝试发布不同版本。哪个版本会被写入？您将如何解决冲突？\n\
  \n合并复制不适合意志薄弱者。当这种复制出现问题时，您最好有方法将其恢复。合并复制可能会带来大量的管理开销。那么，为什么还有人想使用它呢？\n\n我最常见到它被用于您有与中央发布者断开连接的用户时。\n\
  \n您经常会看到这样的例子：销售团队成员在外拜访客户。他们的移动设备和笔记本电脑并不总是连接着，但他们可能正在收集数据。当他们连接到网络时，他们希望他们的数据能相应地更新。如果另一位销售代表尝试更新相同的数据，冲突可能（也将会）发生。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![图片 53](img/index-69_1.png)\n\
  \n这种复制拓扑只应在您有许多断开的客户端需要连接回总部时使用。如果这是您工作环境的需求，那么合并复制可能就是答案。我宁愿吃碎玻璃片也不愿实施合并复制，但这只是我的个人看法。有些人在嘉年华会上靠吃碎玻璃过上了好日子。您应该在人生中选择自己的道路。\n\
  \n#### 快照复制\n\n快照复制比其他两种复制形式所需的管理开销要少。顾名思义，会对数据库进行快照，并整体复制到订阅者。当您的数据不经常变化时，这非常有用。\n\
  \n也许您每年需要几次向销售团队更新可用产品列表。当销售代表连接到您的网络时，可以将数据的快照推送给他们，这样他们就能看到所有新产品。\n\n在非常大的数据集上使用快照复制时要小心。如果您决定在一天中段将一个\
  \ 100GB 的快照推送到 100 个订阅者，很容易引发网络问题。\n\n如果您没有迫使您使用事务复制的多服务器平台需求，并且不想要合并复制的麻烦，那么快照复制可能是适合您工作环境的正确解决方案。虽然快照复制是最容易管理的类型，但还有一种移动数据的方法所需的工作和时间更少。\n\
  \n### 数据库镜像\n\n最近，有人要求我尽可能用最简单的术语解释数据库镜像。\n\n我能想到的唯一回答就是下面的故事：\n\n很久很久以前，在远古时代，在时间诞生之前，人们被要求复制他们的工作。这导致历史上一些非常有趣的发明，最著名的是印刷机、复写器，以及最终在节日办公室派对上大受欢迎的现代复印机。但随着社会进步到以秒的分数而非天或周来衡量交付成果的程度，这些古老的方法已不再足够。人们面临着越来越多的需求，要同时将同一份信息传送到许多不同的地方，且不能有任何服务中断。\n\
  \n不久，一场大战在两只名为“集群”和“日志传送”的巨兽之间展开，它们在两个月前的一次付费观看事件中轻易击败了劣等的“SQL 复制”。集群和日志传送战斗了多年，互不相让，直到双方都伤痕累累，虚弱不堪，几乎无法站立。\n\
  \n在 SQL Server 2005 发布之际，一位伟大的英雄从集群的灰烬和日志传送的废墟中崛起。这位英雄的名字叫“数据库镜像”，他承诺一切都会变得不同。数据库镜像承诺实时同步您的数据，而无需日志传送的麻烦。数据库镜像承诺更快的故障转移，而无需集群。简而言之，数据库镜像承诺了所有其他技术的优点，没有任何缺点，甚至还带来了一位见证人来证明其能力。\n\
  \n就是这样。数据库镜像旨在通过结合其他工具的所有优点并摒弃所有缺点，为您提供高可用性的最佳方案。然而，有一个微小的问题使得数据库镜像并不像人们想象的那样完美：您只能获得一个镜像。\n\
  \n当然，您可以去一家服装店，站在那些能让您看到自己身体某些未知部位的花哨镜子前。嗯，数据库镜像只给您一个镜像，没有更多。所以，如果您有将数据镜像到多个位置的需求，那么您需要一个不同的解决方案。如果您愿意，可以配置您的镜像，同时配置日志传送到其他服务器。但仅凭这一个镜像本身无法为多台服务器提供该选项。\n\
  \n除了那个问题，数据库镜像还是集群、日志传送和复制的一个很好的替代方案。它确实提供了一个出色的高可用性解决方案，可以满足许多工作环境的高可用性需求。事实上，异步镜像*可以*用于灾难恢复\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![图片 54](img/index-70_1.png)\n\
  \n\n\n目的，这一点在你开始规划灾难发生时的应对措施时至关重要。\n\n## 灾难恢复规划\n\n灾难恢复规划至关重要；不仅关乎你的工作保障，更关系到整个公司的生存。你可以快速在网上搜索一下，有多少公司仅仅因为未能规划灾难就倒闭了。最常见的情况是，那些公司完全不了解及时恢复数据的必要性。我见过很多公司因为一些愚蠢的事情而倒闭，比如仅仅依赖\
  \ `RAID 5` 作为防止灾难的唯一手段。\n\n### 提示\n在灾难恢复方面，不做计划就等于计划着失败。\n\n你必须为灾难做规划。任何情况都不能排除在外。每当我看到一个新的设计，我通常会指向某个特定部分并问道：“如果那台服务器消失了怎么办？然后怎么办？”问这类问题是有效规划灾难的唯一方法。\n\
  \n我在灾难恢复规划方面遇到过的较好方法之一，就是直接问这个问题：如果……，我们会怎么做？你会一直问这个问题，直到达到一个你无法再有效规划为止的地步。\n\n\
  这里有一个例子：\n\n问：如果那台服务器烧毁了，我们会怎么做？\n\n答：我们有 `SAN` 复制，只需要启动灾难恢复服务器就行了。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![Image 55](img/index-71_1.png)\n\n**第 3 章：一些基础知识**  \n**53**\n\n问：如果 `SAN` 复制停止工作了，我们会怎么做？\n\
  \n答：我们会从磁带恢复，将灾难恢复服务器恢复到昨晚的状态。\n\n问：如果磁带坏了怎么办？\n\n答：我们会从上一次已知完好的磁带恢复。\n\n问：如果灾难恢复服务器不能及时启动怎么办？\n\
  \n答：我们可以再构建一台服务器。\n\n问：如果没有其他服务器可用以构建怎么办？\n\n答：我们可以去买一台新服务器。\n\n问：如果无法购买另一台服务器怎么办？\n\
  \n答：我们可以暂时拿测试服务器用作生产服务器。\n\n现在，将这一系列问答与这种类型的灾难恢复规划对比一下：\n问：如果那台服务器烧毁了，我们会怎么做？\n\n\
  答：我们的磁盘在 `RAID 5` 阵列中；两块磁盘同时故障的可能性很小。\n\n问：如果两块磁盘都故障了怎么办？\n\n答：这种情况发生的可能性很小。\n\n\
  问：嗯……好吧……那么，如果这种情况真的发生了，我们会怎么做？\n\n答：别担心；这不会发生的。\n\n抱歉，但这并不能让我感到安心，也不应该让你感到舒服。另一个值得问自己和他人的好问题是，我们试图防范什么？在灾难恢复方面，问题永远不嫌多，也永远不要满足于“你不必担心那个，它永远不会发生”这样的答案。\n\
  \n### 免罪金牌\n作者：西尔维斯特·卡斯塔芬\n\n有一件事我喜欢获取，那就是书面文档——我称之为我的“免罪金牌”——当管理层坚称某个特定情况永远不会发生时。\n\
  \n### 灾难恢复测试\n\n如果你的公司是明智的，那么它将定期进行灾难恢复测试。在某些情况下，内部和外部审计员要求进行定期的灾难恢复测试，以便你的公司保持特定的合规水平。你应该了解这些灾难恢复测试，并积极寻求参与，这样你才能从每一次测试经验中学习。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 56](img/index-72_1.png)\n\
  \n**54**  \n**第 3 章：一些基础知识**\n\n每一次灾难恢复演练都给了你准备自己的灾难恢复测试计划的机会。\n\n如果灾难发生，这些细节对你来说将非常有价值。在参与测试演练时，你不可避免地会发现系统的一些隐藏细节。例如，你可能会发现少量服务器需要以特定顺序启动。\n\
  \n### 提示\n熟能生巧。通过练习恢复所需的步骤，给自己一个在危机中成功的机会。\n\n同样重要的是，你要为系统定义非常清晰的恢复时间目标。\n\n虽然你可能很高兴知道你可以在\
  \ 45 分钟内让灾难恢复服务器运行起来，但对于你的最终用户来说，这可能是不可接受的时间。确保时间目标被明确陈述，并且你的实际恢复时间被清晰记录，供所有人查看。否则，在真正的灾难发生时，将很难知道事情是否进展顺利（但如果进展不顺利，那将是显而易见的）。\n\
  \n这个参考在你从灾难中恢复时也会很方便。如果你知道你的测试花了 30 分钟恢复，那么你可以参考之前的测试，并通知你的客户他们可以期待系统何时恢复在线。\n\n\
  ### 卡内基音乐厅\n\n有一个老笑话，讲的是一个年轻人在纽约市问路。他拦住一位老先生问道：“去卡内基音乐厅怎么走？”那位老先生回答说：“练习、练习、再练习。”\
  \ 当我担任篮球教练时，我总是告诉我的球队，要在“比赛地点”以“比赛速度”练习“比赛投篮”。换句话说，你练习的方式就是你比赛的方式，应该始终全力以赴。如果你以半速练习，你最终就会以半速比赛。\n\
  \n所有这些对于灾难恢复准备都适用。你需要练习并保持技能的敏锐。你上一次尝试恢复 `master` 数据库是什么时候？或者，更好的是，你*曾经*尝试过恢复 `master`\
  \ 数据库吗？相信我，当灾难事件中压力山大时，你最不想做的事就是笨手笨脚地翻手册，或者因为不知道如何启动实例而用拳头砸显示器。\n\n练习恢复 `master`\
  \ 数据库。有时也尝试恢复 `msdb` 数据库。抽查你的备份文件并进行还原操作，以确保你熟悉这个过程。要特别关注你重要的系统。如果你其他事情都没做对，仅仅能够毫无问题地恢复重要系统可能就足以保住你的工作，所以请多加练习，并确保你熟悉它们可能包含的任何微妙之处。\n\
  \n在灾难方面，你永远无法练习得足够多。作为一名数据库管理员，你的主要职责是在灾难发生时恢复数据。因此，这是你最需要规划和最常练习的事情。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n![Image 57](img/index-73_1.png)\n\n**第 3 章：一些基础知识**  \n**55**\n\n## 网络就像卫生间\n\n\
  当问题出现时——*问题总会出现*——人们会开始责备他们最不了解的环境部分。作为数据库管理员，你会发现人们不可避免地会因为各种问题而责备数据库服务器。根据我的经验，我看到人们因为一堆与数据库服务器毫无关系的问题而责备数据库服务器。事实是，他们知道数据库服务器存在，但他们不知道这是否是真正的问题所在，所以他们首先就把矛头指向了你。\n\
  \n人们最后才会想到的事情之一就是网络。你的网络一直有波动。有大量的线缆、路由器和交换机组成了你网络的骨干。有这么多需要协同工作才能让你的系统运行的活动部件，很容易理解问题会不时出现。我曾经读到一项研究，说数据库服务器是人们被要求进行故障排除的第一大基础设施，但超过\
  \ 70% 的问题都直接与糟糕的应用程序代码有关。\n\n\n\n"
- '# 第三章：基础知识


  作为一名数据库管理员（DBA），你有时可能会发现自己抱怨网络问题，仅仅因为你不可能总是抱怨糟糕的代码。抱怨网络也无可厚非，因为网络团队通常会把责任推给管理层，怪他们当初不同意购买合适的设备。但事实是，人们常常误解网络和计算机之间的区别。


  在办公室里，经常听到人们大喊：“数据库服务器宕机了！”而问题可能完全出在别处。网络很像你家里的卫生间。


  ### 叫个水管工来


  我对管道维修一窍不通，但如果水龙头漏水，我听上几个晚上就会去五金店问个明白。但水龙头漏水并不意味着你的管道系统有问题。数据库服务器也是如此：如果数据库服务器崩溃了，并不表示你的网络离线了。如果只有一台工作站出现问题而其他正常，那很可能也不是网络的问题。（请注意，如果一台工作站有问题而其他没有，问题也不太可能出在数据库服务器上。）而且，如果那台工作站无法向网络打印机打印，你跑进网络机房也解决不了问题。


  如果你的水龙头流出脏水，你会怎么做？可能先让水流几分钟看看会不会变清，对吧？也许市政正在维修水管，几分钟后问题就消失了。如果你无法访问某个网站或特定的网络服务器，也许只是有人在挪动线路。人们需要定期进行维护，期望一切时刻完美无缺是不现实的。在发出警报前，先等几分钟再试一次。


  不过，你无需成为水管工也能明白：如果洗个 5 分钟的澡热水就用完了，那你得花钱解决问题。大多数企业宁愿忍受一段时间的网络缓慢，也不愿面对真正修复问题的开销。让网络管理员每周多工作一天也解决不了问题。


  最重要的是那些看不见又昂贵的东西。如果整个房子只用一根半英寸的花园软管供水，再漂亮的水龙头也不会给人留下印象。管道系统真正的支柱是热水器以及埋在墙后和地板下的管道。这些部分日后很难返工修复，所以做采购决策时不能没有专业人士的帮助。如果你不经常购买这类设备，你就不会了解其中的品牌、功能甚至当地法规的细节。网络硬件也是如此：基本的管道原则不变，但具体情况每年都在变；没有帮助，你可能会买下日后难以更换的设备。


  [`www.it-ebooks.info`](http://www.it-ebooks.info)


  ![图片 58](img/`index-74_1.png`)


  ### 立即修复！


  良好的管道系统需要大量知识和规划。如果你要浇灌草坪，可以随便接几根延长管，四处放几个洒水器，草变黄时就打开水龙头。但如果你想做好工作，让草坪看起来完美，又不想费力地移动洒水器和手动开关水龙头，你就必须做好功课。


  当要建立网络时，你需要研究管道的工作原理和使用何种连接器，在可靠性和成本之间取得平衡，并确保以后永远无需再碰那些设备。这些都不是凭猜测就能完成的。


  即使是最小的管道问题也会被视为紧急情况。有人洗澡时没有热水，他们会立刻生气。也许他们可以凑合用冷水，但他们很不高兴，然后会告诉遇到的每个人他们早上有多倒霉，房东最好赶紧修好，否则就有麻烦了。当用户遇到问题时，他们会大喊大叫、焦头烂额。从“我在网络上无法打印！”到“数据库服务器太慢！”所有问题都带着同样急切的语气，每个人都会期望你立刻放下手头的一切。


  ## DBA 代表……


  现在你已经掌握了一些技术基础，让我们回顾一些职业基础。首先，看看下面这个问题：


  DBA 代表什么？


  答案因人而异。你可能会回答“数据库管理员”（database administrator），技术上你是对的。对某些人来说，答案是“默认的责任承担者”（default
  blame accepter）。对另一些人来说，它可能是“别问了”（don''t bother asking）的缩写。进一步了解你会发现，关于 DBA 做什么、DBA
  代表什么以及 DBA 应该做而还没做什么，存在着许多不同的观点。


  [`www.it-ebooks.info`](http://www.it-ebooks.info)


  ![图片 59](img/`index-75_1.png`)


  **第三章：基础知识** **57**


  为什么观点如此之多？DBA 以多种方式涉足公司的许多不同领域。对许多最终用户来说，我们是重置他们密码的人，也是系统运行缓慢时负责修复的人。因此，即使系统运行缓慢与我们无关（尤其是供应商的应用程序），我们也会因此受到指责。简而言之，DBA
  为许多他们无法控制的事情背锅，但因为在故障排查过程中他们有时帮了忙，最终就被视为负责人。


  **提示：** 没人知道你真正做什么，甚至连你的老板也不知道。他们只知道你没做什么，或者更准确地说，他们只记得你的失败，而很容易忘记你所有的成功。


  问问开发人员 DBA 做什么，他们会告诉你 DBA 是进步的绊脚石。实施数据库使用标准和指南只会拖慢开发工作。当然，好处是环境更稳定，但对于那些咆哮着需要系统管理员权限否则项目就要延期的开发人员来说，这几乎无关紧要。


  由于你的角色涉及这些不同的接触点，你也面临不同的认知，你需要意识到这些认知，以便在它们在你和客户之间造成隔阂之前努力缓解它们。在每日的所有互动中，有三点需要牢记。


  ### 人们会抵制变化


  变化会发生，这是事实。那么，为什么尽管变化无时无刻不在发生，却有那么多人抵制变化呢？你会以为每个人都习惯了事物的变化，但有些人固执地拒绝放手。


  变化有三个主要驱动因素：人、技术和信息。你可能不知道，作为一名 DBA，你很可能在公司的一个名为“信息技术”（Information Technology）的部门工作。这个头衔本身就包含了三个驱动因素中的两个！再加上那里雇佣的是人，难怪你会看到如此频繁的变化。引用艾伦·齐默尔曼的话：“真正的问题不是变化本身……而是人们对变化的反应。”


  变化周期本身有三个阶段：开始、中间和结束。当变化发生时，我们可以在开始阶段立即投入其中；在中间阶段，我们感觉既与过去（已知）相连，又与未来（未知）状态相连；在最后阶段，我们终于放下了已知的状态，那通常是我们认为可靠和值得依赖的东西。




