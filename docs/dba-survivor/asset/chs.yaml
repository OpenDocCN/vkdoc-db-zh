  一个包含上述许多细节的流程示例如下：


  1.  客户拨打生产支持电话号码。

  2.  电话由应答服务接听。

  3.  记录留言，包括客户详细信息。

  4.  应答服务拨打指定的电话号码。

  5.  电话由负责支持的 DBA 接听。


