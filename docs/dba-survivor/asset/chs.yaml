  ### 第八章


  ### 培训，你也来点吧


  停下片刻，反思一下你已经走了多远。你想成为一名 DBA，你找到了机会，你与同事建立了关系，目前你正有效地掌管着这艘船。一路走来，你注意到环境的某些方面会随着时间而改变。其中一个变化当然是
  SQL Server 的新版本。即使只是给 SQL Server 应用一个热修复补丁，也可能给你带来意想不到的学习机会。


  许多人根本不认为培训是他们 DBA 生涯的重要组成部分。如果你想作为一名 DBA 生存下去，那么你需要能够快速适应不断变化的情况。你需要了解即将出现的想法和概念。简而言之，你需要培训，而且培训是一个永不停止的持续职能。


  **提示：** 培训是教育与动力的交汇点。


  当形势艰难时，培训预算往往是首批被削减资金的项目之一。这可能使你很难说服管理层让你离开一两天以保持技能敏锐。你必须找到一种方法，提出一个无可辩驳的商业案例；让他们理解这将带来可观的投资回报。




  '
- '# 培训，助你一臂之力


  培训不仅仅是坐在教室里三到五天，听讲师讲解别人准备好的学习指南。有效的培训远不止于此；它将成为你日常工作的组成部分。你或许现在工作表现出色，但离完美还差得远（相信我），如果不花些时间跟进最新的行业趋势，你就会像困在沥青坑里的恐龙一样被淘汰。


  [`www.it-ebooks.info`](http://www.it-ebooks.info)


  ![Image 140](img/index-150_1.png)


  在本章中，我们将讨论以下内容：


  1.  培训的原因

  2.  培训资源

  3.  构建你的培训方案


  ## 培训的原因


  想想一个高中篮球项目。你会有一支校队、一支初级队（JV）和一支新生队。每支队伍都需要训练，球员的自然晋升路径是从新生队到初级队，再到校队。但谁决定球员何时准备好向上晋升呢？当然是校队教练，他负责管理整个项目并每天持续评估球员，由他做出这个决定。


  赛季开始时，教练会布置球队整个赛季将使用的基本进攻和防守战术。这些战术基于球员的个人优势；然而，在赛季过程中，会引入新的战术以确保球队保持竞争力，这会让球迷们感到高兴。


  **提示：** 让球迷满意*永远*是首要任务，无论你是在执教一支高中篮球队，还是在为一家大公司管理数据库服务器。


  现在将此与 IT 部门进行比较。你有一个担任 IT 主管的人（你的校队教练），他负责评估员工，作为整体职业发展计划的一部分。根据员工的表现，可能希望将他们安排到新的岗位上。或者可能是公司引入了新系统，某些员工将被调去专门负责新系统的工作。归根结底，IT
  主管会做出她认为能为企业带来最高满意度的调动。


  关于培训，这两种情况是相同的。在每种情况下，你都有人员在改变角色或职位，都有新系统在部署，都有人员在评估员工和球员，你都希望客户满意。因此，我们可以说，公司提供培训有四个充分的理由：为了职业发展，为了人员角色变动，为了新系统，以及为了客户满意度。每一个理由都会为员工和企业带来益处。


  [`www.it-ebooks.info`](http://www.it-ebooks.info)


  ![Image 141](img/index-151_1.png)


  ### 职业发展


  职业发展对不同的人可能有许多不同的含义。对一些人来说，它意味着职业成长。对另一些人来说，它可能只是描述年度绩效评估的另一种方式。还有一些人可能认为职业发展是他们在公司内的职业路径。


  年度评估的结果可能导致公司制定培训计划。例如，一名员工可能被告知他们缺乏其职位所必需的核心技能。公司随后可能会认为有必要为该员工提供一些培训，以帮助他们发展。或者评估可能指出员工在某个领域表现出色，那么提供培训以增强某些现有技能可能是个好主意。


  **提示：** 一份恰当的评估还应包括来年的培训计划。


  培训应该是任何职业发展计划的一部分。如果培训没有列入任何正式的评估或职业发展计划，那么请制定你自己的计划，其中包含培训。而且培训并不一定意味着要离开办公室，去某个风景优美的地方上课。在本章后面，我将为你列出许多你可以使用的培训资源和选项。


  好的公司会提供强大的职业发展机会。请注意，这并不意味着公司有可供晋升的职位；在大多数情况下，他们没有。但好的公司会做的是确保他们的员工有机会追求他们喜欢的职位。有时这些职位是现有的，有时是创造出来的。但如果没有培训，IT
  主管将很难评估员工的成长潜力。你想做的是利用培训来提升你的技能，进而向雇主证明你不断增长的价值。


  ## 角色变动


  你的愿望和动机会随着时间而改变。因此，经常需要考虑改变角色。有时这可能意味着晋升，但也可能意味着平级调动。也许你一直在 QA 部门工作，想要转到初级管理岗位。拥有培训计划的公司可以轻松实现这种角色变动；否则，内部成长机会将非常难以实现。如果员工没有内部成长机会，可能会导致士气低落。


  我认识许多数据库专业人士，他们一开始是纯粹的数据库管理员（DBA），现在更多地涉足商业智能、数据库开发，甚至存储区域网络（SAN）管理。随着你的愿望随时间变化，寻找机会与你的老板合作，获取一些额外的知识和培训，这样，如果有新角色创建，你将有机会填补那个角色。


  [`www.it-ebooks.info`](http://www.it-ebooks.info)


  ![Image 142](img/index-152_1.png)


  ### 试点新系统


  系统来了又去，在 IT 领域尤其如此。当新系统进入你的公司时，你的公司将需要有人来管理和维护它们。这可以通过以下方式完成：（1）培训现有员工，（2）雇佣具有必要经验的新员工或承包商，或者（3）什么也不做。


  什么也不做会导致糟糕的管理和维护，进而导致糟糕的客户满意度。雇佣新员工是一种选择，但可能成本过高。


  大多数情况下，最佳行动方案是培训现有员工来使用新系统。


  ### 客户满意度


  公司应始终致力于提高客户满意度。毕竟，如果他们疏远客户到没有客户留下的地步，那么他们就不会经营太久。培训计划有能力最终提高客户满意度。如何实现？通过提高员工的士气。当你创造一个积极的工作环境时，你也有机会创造积极的客户体验。


  **提示：** 虽然你应该享受你的工作，但它被称为工作而不是“快乐有趣玩耍时间”是有原因的。让你保持娱乐不是你雇主的责任。他们的责任是让你保持专注和高效。


  想想你可能工作过的、办公室士气低落的地方。成为那家公司的客户是什么感觉？是一次积极的体验吗？很可能，那些客户与你公司之间的大多数互动都不是非常积极。我不能将这种糟糕的互动归咎于缺乏像样的培训计划；我想说的是，制定培训计划的一个原因是为了最终获得更高的客户满意度。


  ### 员工福利



  '
- '# 第 8 章：培训，你也值得拥有


  毫无疑问，接受培训的员工能获得诸多好处。你可以提升技能、结识新朋友、拓展人脉，并实质上增加自己对公司的价值，因为没有公司愿意失去他们投入了培训资金的员工。


  员工通过培训获得的许多其他益处往往被人们忽视，因为他们只关注短期效益。但从更宏观的角度看，你就能发现一系列附加的好处。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 143](img/index-153_1.png)


  ### 工作满意度


  当你参与一个培训项目时，它能激发你的活力，给你一些能力上的自信，进而转化为整体工作满意度的提升。由于培训，你对日常职责变得更加自信。更好的是，培训让你能够承担新的责任。虽然大多数人喜欢生活中的一些常规，但他们也享受一些变化。随着信心的增强，你会更享受自己的工作，从而提升工作满意度。


  ### 员工激励


  培训可以提升你的积极性。除了信心和工作满意度的提高，你还会经常发现自己有动力去做更多事情。那一点额外的培训，可能就是将员工从“仅仅打卡上下班”转变为“愿意早来晚走”的关键区别。


  ### 流程效率


  员工培训最不明显的益处之一，可能是由此带来的效率提升。员工可能找到方法将一个 30 分钟的任务缩减到 5 分钟。作为一名数据库管理员，你可能会找到性能调优查询的方法，将调优时间从数天缩短到数小时。这节省了时间，而我们都知道时间就是金钱，对吧？


  想想你最近可用于管理的那些工具。`PowerShell`、`Operations Manager` 和 `Policy-Based Management`。每一个都还相对较新，每一个都旨在提高你作为
  `DBA` 的效率。通过一些培训，你将能发现新的方法，以更易于维护的方式来执行当前的一些任务。


  ### 时间管理


  当你变得更高效时，你就开始节省时间。同时获得的，还有更好地管理时间的能力。有多少次你被期望放下一切，去应对一个紧急问题？然后，在应对之后，你尽力分析问题，接着又被不断追问进展：“你还要多久才能解决问题？”


  通过培训，这些问题解决起来所需时间更短，使你能够有效管理紧急问题，同时继续完成日常工作。简而言之，你拥有了更好地管理时间的能力。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 144](img/index-154_1.png)


  ### 沟通技巧


  即使你参加的并非专门针对沟通技巧（或“软技能”）的课程，你也会看到这些技能的提升。通过培训，你获得了在办公室以外的环境中与他人互动的机会。培训结束后，当你开始将新技能应用到当前职位时，你将有机会开始与办公室内部的不同人员进行互动。


  **提示：** 你的沟通技巧会随着时间的推移而提高，但这前提是你有意去改进。这可以通过简单地回顾之前的对话，看看自己是否有做得更好的地方来实现。


  在大多数情况下，你的培训将使你有机会与办公室里的其他人，特别是其他团队成员分享你的新技能。这无疑是一个提升软技能的机会——一个如果没有最初提供的培训，你可能得不到的机会。


  ## 商业利益


  尽管知道培训对员工有好处，但一些公司在培训员工方面投入的时间和精力却不如应有的那么多。原因之一是公司没有完全理解培训员工的好处。如果你能够学习、理解并有效地传达这些好处，那么你就有机会说服公司来帮助分担部分（甚至可能全部）的实际金钱成本。


  每个人都需要培训，无论其经验水平如何。每个人都有改进的空间。改进可能是戏剧性的，例如从新手变成技能高超的人。也可能是技能高超的人想要进一步磨练这些技能以保持竞争优势，比如奥运会运动员。


  事实是，培训不仅带来员工福利，也带来商业利益。公司应该理解并认识到，建立一个持续的培训体系是其业务的必要组成部分。


  当提到培训项目时，大多数人往往认为唯一受益的人是接受培训的个人。虽然员工确实获得了直接利益，但雇主也确实获得了利益。其中一些好处我们已经看到，例如通过提供更好的客户服务带来的客户满意度提升。或者效率提高带来的生产力提升。但也有一些其他商业利益可以直接归因于培训。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 145](img/index-155_1.png)


  ### 提升士气


  我们已经看到培训可以提高工作满意度。而对工作感到满意的员工对于保持高昂的办公室士气至关重要。培训每个人可能不切实际，因此 IT 经理需要找到一种方法来证明和轮换部门的培训需求。如果操作得当，培训能对办公室士气产生显著的积极影响。


  ### 降低流失率


  对工作感到满意的员工不太可能离开。员工留任很重要，原因有二。首先，你需要业务支持能力的连续性。其次，你不想花费时间和金钱去寻找新员工。在花费数万美元寻找新员工和提供一些培训之间做选择的话，如果公司提供一些定期培训会更划算。


  ### 降低风险


  培训可以有效地降低风险。这里所说的风险可以是多种多样的；例如，它可以确保每个人都接受过性骚扰方面的培训。或者你可能希望降低与 `Sarbanes-Oxley`（《萨班斯-奥克斯利法案》）合规相关的风险。我想不出有哪个员工渴望去上关于
  `Sarbanes-Oxley` 合规的培训课，但我知道很多企业会看到派员工去上这类课程的好处。


  ### 保持竞争力


  培训员工使企业能够在行业中保持竞争力。例如，他们有机会在竞争对手之前利用新技术。在某些行业，保持技术领先至关重要；在其他行业，能够使用现有技术但只是比别人早一步将特定产品推向市场至关重要。就培训资金的这方面的商业利益而言，其潜在回报可能是最丰厚的。


  ## 培训资源



  '
- '# 第 8 章：培训，开始行动吧


  对于想要启动培训计划的个人或公司来说，有许多可用的选择。第一步是确定期望的最终结果；你希望从培训中获得什么？比*从培训中得到什么*更重要的是*你能从中带走什么*。如果你指望别人把东西拱手相送或替你完成，那么你将会失望。


  无论你的预算如何，你都能找到某种程度上满足需求的培训。


  有大量的免费培训选项（网站）和许多略高于免费的选项（专业培训师）。在安排培训计划时，你应该留意每个选项及其相关的优缺点。


  **提示：** 在聘请培训师或参加课程时，做一些调查研究。确保你找到的是有信誉的培训师。


  请注意，我所讨论的选项是自助式和有组织的培训课程的混合体。这是因为任何好的培训计划都会包含不止一种选项。如果你只是等待别人来为你安排培训，那么你很可能就会落后。你绝对需要掌控自己的职业发展；在力所能及时抓住自助式选项。


  ### 网站


  互联网提供了大量的培训参考资料。作为数据库管理员，你可能专注于 SQL Server 培训选项，但即使你在寻找不同的东西——也许是一些通用的职业发展培训——你应该也能通过你喜欢的搜索引擎找到网站。参与论坛、新闻组，甚至
  Twitter 都能提供有价值的培训材料。


  **优点：** 大多数是免费的，但有些内容会收费。网站允许你按自己的时间安排进行培训；通常你不需要在特定的日期和时间在线。论坛和新闻组通常是与其他专业人士联系和分享经验的好方法。像微软和
  Oracle 这样的公司提供大量免费培训材料，希望能说服像你这样的专业人士使用他们的产品。


  **缺点：** 一分钱一分货。你需要意识到，有些人在论坛问题回复中发表疯狂的言论，还有些人开玩笑地发布幽默的答案而你可能看不出来。很难区分提供高质量内容的网站和那些不提供的，但一个开始的方法是查看每位作者的经验。在涉及你的数据库时，不要听信一个没有资历的陌生人的说法。也不要相信为内容付费就意味着你比免费网站更能信任这些材料；我在收费网站上也看到过很多错误。


  ### 自我培训


  除了从网站、博客和播客获得的自我培训外，你也可以简单地开始一个副业项目，让你学到新东西。


  也许你的公司需要建立事务日志传送，而你以前从未做过。把这当作你自学新东西的机会吧。


  **优点：** 没有比实践更好的学习方式了。而且通过自我培训，你通常是在做自己感兴趣的事情，这使你更有可能记住所学的知识。你可以按照自己的节奏学习。而且你可能会发现，在某个领域学到的一些技能也适用于其他领域，特别是软技能。


  **缺点：** 很容易屈服于分心或变得沮丧。如果你在一个小团队中，这也可能让你与他人隔绝。保持动力可能很难。


  ### 志愿服务


  可能最被忽视的培训机会是志愿服务。当地有许多组织需要各种帮助。信不信由你，如果你想进入 IT 行业，最好找一个能提供一些 IT 帮助的本地团体。


  最容易想到的例子是教堂或社区中心。依赖志愿者协助的地方，几乎在你能想象到的每个领域都需要帮助。


  而且你不需要觉得你的志愿服务必须与技术相关。你可以自愿花时间指导你团队中的某个人。指导是提升技能的好方法，尤其是你的软技能。


  **优点：** 这是丰富你的简历并获得实际经验的好方法。课堂学习有一定价值，但实际经验总是更好。此外，捐出时间帮助他人是一种很棒的感觉。事实上，无论是否有培训机会，你都应该这样做。


  **缺点：** 你获得的经验可能相当有限；很可能你做的不会是最前沿的事情。除非你是在指导别人，否则你很可能会独自工作，缺乏指导。


  ### 在职培训


  这也常被称为“便当午餐会”。其理念是通过邀请外部培训师来公司授课，为员工提供培训。或者由一位受人尊敬的同事来主导教学。


  **优点：** 通过邀请人员到公司内部进行培训，这是最大化利用培训预算的好方法。如果你是被要求培训他人的员工，那么这也是你学习更多东西的绝佳机会。我经常告诉别人，学习某样东西的好方法是尝试把它教给别人。


  **缺点：** 这会让你离开办公桌，但并未离开办公室；如果你需要履行工作职责，你可能会发现很难专注于培训材料。材料可能并不总是你感兴趣的主题。


  ## 专业协会


  你可以找到符合你兴趣的专业协会。立刻想到的两个是：SQL Server 专业人士协会 (`PASS`, `http://sqlpass.org`) 和可用性专业人士协会
  (`UPA`, `http://www.upassoc.org`)。两者都让你能够参与用户组会议并举办年度会议。


  **优点：** 大多数协会提供基础会员资格，费用很低或免费。会员资格通常包括一份通讯，提醒你即将举行的活动，让你能够联系、分享并向他人学习。许多这类活动都是免费参加的。


  **缺点：** 就有组织的协会而言，选择并不多，你可能会对整体选择感到失望。此外，它们可能仅仅侧重于建立人脉，而不是培训或专业发展。你需要做额外的研究来了解会员资格的确切好处。


  ### 继续教育


  当地的学院或大学可能提供相关的课程，可能符合你的兴趣。也许你正在寻求获得 IT 学位，或者更通用的 MBA。或者你可能只想上一门课，以便在某个特定主题上获得更多知识。


  **优点：** 赚取学位学分。课程通常在晚上，这意味着你不会损失工作时间。除非是更正式的学位或认证计划的一部分，课程通常持续八周。


  **缺点：** 可能费用高昂；咨询你的人力资源部门，看看公司是否有政策协助支付课程费用。课程通常在晚上，意味着你会失去本可以与家人共度的时间。


  ### 课堂培训




  '
- '# 第 8 章：培训，提升自我


  ### 认证


  认证本身并非一种资源；你从上述渠道获得的培训才是你将（与工作经验一起）用于获得认证的实际资源。将认证视为目标，而前述资源则是实现目标的手段。切勿相信仅凭认证就能轻松获得名利。


  **提示：** 认证本身证明力有限。认证与工作经验相结合，才能讲述一个更完整的故事。


  **优点：** 认证能极大增强你现有的技能，并且与你的经验结合后，能向他人传达你的技能组合。


  **缺点：** 它可能会被负面看待，尤其是当你持有很多认证但缺乏经验时。市场上存在*大量*的“题库速成”机构，提供获取认证的捷径；长远来看，这可能会削弱人们对认证价值的信心。


  ## 构建你的论证基础


  你现在应该已经认识到培训的必要性，并列出了一些可能的培训资源。让你的经理相信派你去参加一些培训课程是合乎逻辑的，这应该相当容易，对吧？


  错了。


  切勿将逻辑与`商业智慧`混为一谈。你的经理很可能也有他的经理，而那位经理无论培训费用高低，都会希望为这笔开支找到一些正当理由。很可能需要由你提出一个坚实的商业论证，才能确保获得这笔资金。


  要为培训构建一个坚实的商业论证，首先要理解企业最关心什么：`收入`、`支出`和`利润`。尽管我们都希望热爱自己的工作，并在一个充满欢乐、友爱、独角兽和彩虹的环境中工作，但事实是金钱让世界运转。如果你想确保获得培训经费，那么你需要展示企业通过花费这笔钱将如何获益。如果这听起来像是我在说“赚钱需要本钱”，那确实如此。但这没关系，因为大多数公司正是遵循这一理念运作；你需要做的，就是向他们展示如何实现。


  **提示：** 你需要与之讨论资金问题的职位越高，就越重要的是，你能证明他们为你所请求的任何投资带来财务回报。


  以下是一份需要开始收集信息的具体项目清单：

  1.  确定你的培训需求。

  2.  确定有多少人需要培训。

  3.  确定将使用哪些选项。

  4.  计算相关的成本/支出。

  5.  确定培训的收益。

  6.  确定成本节约。

  7.  衡量你的成果！


  ### 确定你的培训需求


  你需要清晰地识别你的培训需求，并且这些需求应以某种方式与业务目标或计划保持一致。例如，假设公司正致力于将数据库服务器虚拟化。你可以列出对虚拟化某个方面的培训需求。或者，也许你想学习某个特定工具，而你的公司也正希望构建一个数据仓库。如果你的培训需求与任何业务需求不符，那么你拥有的就不是培训`需求`，而是培训`愿望`。公司没有理由仅仅满足你的愿望；必须在某种程度上对公司有利。


  ## 确定有多少人需要培训


  这在后续权衡培训选项和计算成本时将非常重要。有时你会发现，如果你能证明培训也能使他人受益，而不仅仅是你自己，那么获得培训批准会更容易。记住，你总是在为培训经费而竞争——你的同事也想要那笔培训资金。你可能需要通过承诺在培训归来后培训其他员工来为你的培训预算做辩护。此外，如果只有你一个人参加了培训，那么你可能是唯一掌握该知识的人，结果可能是你发现自己需求激增，这很容易侵蚀你的工作/生活平衡（如果它存在的话）。


  ### 确定将使用哪些选项


  回顾之前列出的所有可用培训选项，看看哪些是可行的。


  哪些选项能满足你的需求，并容纳所有需要培训的人？


  你或许可以混合搭配几个选项。也许一个人可以参加课程，另一个人可以参加会议，还有一个人可以找一个副业项目进行一些自我培训。然后你们三人可以聚在一起交流、学习和分享经验。


  在我们的团队中，我们倾向于让每个成员专注于数据库管理的一个特定方面。其他成员知道谁专注于什么，并在必要时利用这些知识。随着时间的推移，我们在许多不同领域都变得知识更丰富一些。这减少了全年派我们所有人参加许多不同培训课程的需求。


  ## 计算相关的成本/支出


  开始累加你能想到的所有相关成本。容易识别的成本是那些最大的开销，例如课程费用、会议费用或聘请培训师现场授课的费用。差旅和住宿也是培训支出中容易识别的成本。一些较难识别的隐性成本包括：如果你必须开车去培训中心，可能会产生汽车里程费；或者购买先决培训材料，如书籍。还有你离开办公室的时间，你可以用损失的工作小时数来表示。如果培训班上人数众多，你可能更容易用全职人力当量（`FTE`）来表示这个数字。


  **提示：** 没有任何支出是微不足道的；写下你能想到的所有可能的支出项目。


  尽你所能考虑每一项可能的支出。你可能无法涵盖所有项目，但你需要让你的估算尽可能接近最终账单。


  ## 确定培训的收益


  首先写下你能想到的培训可能带来的每一个可能的好处。不要像列出培训需求时那样，将自己局限于仅与业务相关的结果。一些好处可能包括：降低员工流失率、减少使用系统时出现的错误，或者仅仅是让你有能力与其他专业人士建立联系。




  '
- '# 第八章：培训，来获取一些吧


  当你逐一审视这些益处时，你应该能将它们分为两类：那些能轻易证明与业务目标一致的，以及那些与你个人目标一致的。对于个人目标，看看它们是否也能被证明对业务有益。


  例如，如果你说其中一项益处是与其他专业人士建立人脉的能力，你的公司很可能不会在意。但如果你说，“我将能够与其他专业人士建立人脉，这能让我提升一些必要的软技能，并且将来当我向这个人脉寻求技术问题帮助时，将为公司带来好处。”那么你的公司可能会非常在意。


  你列出的许多个人目标都能被证明能带来业务收益；你只需要稍加思考。


  ## 确定成本节省


  这可能很难计算，因为收益并不总是能体现为硬性成本。


  大多数人通常关注易于计算的硬性成本和成本削减。寻找有助于所谓“成本规避”的培训也是可以的。这是指你节省了尚未支出的费用。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 152](img/index-162_1.png)


  一个例子是虚拟化。你可能有一些使用了几年的服务器。你可以购买新硬件来替换旧服务器，或者考虑对旧硬件进行虚拟化。物理环境和虚拟环境之间的成本差异就属于成本规避。


  **提示：** 理解成本削减和成本规避之间的区别。你不可能声称通过*不*购买钻石每年为你的家庭节省了数百万美元，对吧？


  如果你能量化因培训而节省的时间量，那么通过简化流程也能带来成本节省。另一个寻找成本节省的地方是，如果培训后你能够承担更广泛的职责；也许你可以开始主持未来的培训课程，从而减少公司聘请外部培训师的需求。


  ### 衡量你的结果！


  最后这部分可能是最重要的。在你把其他一切都准备好之后，花些时间思考你将如何衡量你的成功。如果你声称有成本节省，那么写下你计划在培训完成后如何计算这笔节省。成本规避也是如此；务必跟踪所有你能收集到的实际成本，以及如果不进行培训的预估成本。我经常看到任何商业案例中遗漏了这部分内容，好像衡量要么是计划中被遗忘的组成部分，要么就是人们根本不理解其重要性。


  没有衡量，你将无法验证培训的结果。如果结果低于预期，那么你有机会从经验中学习，并对未来的培训计划进行修正。如果结果好于预期，那么当你向管理层展示成果时，你的衡量数据将成为宝贵的资产。


  我以“每个人都需要培训”作为本章的开头。当你下一轮培训结束时，你需要跟踪在接下来的一年里你运用了多少该培训内容，以及它为业务节省了多少钱。这样做将使公司更容易派你参加下一轮培训，并让你成为更出色的员工。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 153](img/index-163_1.png)


  '
- '# 第九章：连接、学习、分享


  在你建立了自己的工作常规，并对 DBA 技能感到得心应手之后，你可能会发现自己被吸引去帮助他人。别惊慌；发现自己愿意帮助他人是完全正常的。在其他数据库专业人士及其技能面前感到胆怯也很正常。每次我坐在一群
  DBA 中间时，我总是假设每个人都比我懂得多。然后我会惊讶地发现，桌子对面的人对我也是同样的想法。


  我在担任 DBA 期间学到的一件事是，通常你总能找到愿意提供帮助的人。我认识的大多数 DBA 都不害怕承认他们不知道某事。这与其他职业形成对比，在其他职业中，人们倾向于声称自己是某方面的专家（电视脱口秀主持人），或者觉得需要假装是专家，或者根本不想让任何人质疑他们的专业水平（医生或律师）。


  因为大多数 DBA 愿意承认自己有所不知，所以大多数其他 DBA 也愿意提供帮助，因为他们知道，总有一天他们自己也需要帮助。


  **提示：** 没有一个人能知晓所有事情。


  在本章中，我们将讨论以下内容：


  1.  沟通以及如何开始（写作与演讲）

  2.  专业协会

  3.  人脉网络基础


  ## 沟通


  沟通技巧对任何人来说都很重要，无论其职业如何。在当今互联互通的世界中，拥有强大的沟通技巧比以往任何时候都更加重要。电子邮件、博客、电话和面对面讨论对大多数 IT
  专业人士来说相当普遍。拥有良好沟通技巧的个人，相对于缺乏这些技巧的人具有优势。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 154](img/index-164_1.png)


  **提示：** 电子邮件是与他人沟通的糟糕载体。拿起电话与人交谈吧。


  很多时候，人们告诉我，一谈到良好的沟通技巧，他们往往想到的是高层管理人员。换句话说，这似乎不是他们在其特定职位上需要关心的事情。


  虽然你可能确实需要良好的沟通技巧才能攀登公司的晋升阶梯，但同样正确的是，良好的沟通技巧使你能够与你周围的人保持关系。同样正确的是，大多数招聘的技术岗位通常都把“良好的沟通技巧”列为一项要求。


  如果你已经具备良好的沟通技巧，那么你与其他专业人士建立联系、学习和分享就会更容易。如果你的沟通技巧需要一些提升（而且大多数人的沟通技巧在某种程度上总是可以改进的），那么只有一个方法可以变得更好：你需要练习。根据我的经验，最好的开始方式就是去做所有你想提高的事情。


  想提高打电话的水平？那就多打电话。想提高写作水平？从多做一些额外阅读开始，然后自己写点东西。想提高在会议上激发他人兴趣、接受你想法的能力？改进你的姿势和肢体语言。但是，你该如何以及从哪里开始这一切呢？


  **提示：** 别忘了衣着。汤姆提到了姿势和肢体语言。别忘了这两项是包裹在衣服里的。想想你穿什么去办公室。在合理范围内，向上靠拢着装。每个办公室对于可接受的着装都有一个高端和低端的范围。倾向于高端。——乔纳森·詹尼克


  ### 开始阅读


  对我来说，提升沟通技巧最好的方法就是开始多阅读。



  '
- '# 第 9 章：连接、学习与分享


  无论我当时在读什么——可能是一本书、一份技术期刊、一个网站、一篇博客，甚至是一本教科书——随着时间的推移，我开始发现并认同某些写作风格，这让我更愿意读下去。我最喜欢的作者之一恰好是一位以撰写本地体育队伍博客起家的博主。他现在是某大型体育网络平台网站上最知名的撰稿人之一。他的写作风格是如此自然，看似毫不费力，这让我对自己尝试写作的想法感到更自在了。


  当我成为一名数据库管理员后，我阅读体育内容的时间变少了，而花在阅读技术网站、博客和文章上的时间更多了。读得越多，我就越开始发现哪些写作风格最吸引我。这在我后来寻找自己独特的写作风格时变得很重要。


  `www.it-ebooks.info`


  `图片 155`


  阅读让你能够与作者连接，并向其学习。你读得越多，就越会被某些作者吸引，也越能与你所在的整个社群产生连接。例如，你可能会订阅多个博客，这些博客的作者都是你所在行业内一些杰出的领导者。通过阅读他们的博客或其他行业出版物，你可以了解到你领域内的其他人正在做什么。你可以看到他们如何解决了某些问题，或者阅读他们对某个产品的评测，并感受到彼此共享的一些共同点。


  有一天，你会发现自已正在阅读某篇文章，其中描述的解决方案与你最近遇到的某个问题相似。你会突然想到：`嘿，如果我采用他们的解决方案，看看它是否适用于我这里的情况，会怎样？`
  你会做一些修改，然后部署这个解决方案，看看是否符合你的需求。这将增强你与作者的共鸣，同时你也在这个过程中学到了东西。


  因此，除了帮助提升沟通技巧外，多阅读还有一个附带的好处：你也能提升你的技术能力（或你所阅读领域的任何技能）。当你的技能提升到一定水平时，你会开始考虑参加培训研讨会、讲座、编程训练营或技术大会。


  ### 开始参与


  阅读能激发你内心想要获取比书籍提供更多细节的渴望。这将引导你考虑亲自去参加相关活动。这类活动可能是一场技术大会、一个培训课程或研讨会、一个用户小组会议，或某处的讲座。


  我们大多数人高中和大学时都参加过多年的讲座。我在研究生院时还参加过研讨会，那是向公众开放的学术讨论会。可以想象成一个没有供应商和免费披萨的用户小组会议。有很多机会可以让你去听别人讲的讲座。


  参加这类活动让你有可能与演讲者和其他人建立连接、学习和分享。


  **小贴士：** 即使是半天的活动也值得参加。务必去参加并结识新朋友。


  我仍然记得我在一次技术大会上参加的第一个分会场。我记得当时看这个人做关于查询计划的演讲，我心想：


  `我当年在研究生院给数学 107 班的学生讲解如何计算椭圆面积时，演讲得都比这个好。如果这家伙能在这里演讲，也许我也能。`


  `www.it-ebooks.info`


  `图片 156`


  公平地说，他的演讲并不差，它只是让我意识到，在我人生的那个阶段，我已经在观众面前花费了大量时间，只要准备充分，我也能做技术演讲。我不能像上代数课那样随意地去做技术演讲，那样会搞砸的。


  参加这些活动还能让你了解演讲时哪些方式效果好，哪些不好。当你开始考虑自己如何做演讲时，这将是非常有价值的信息。


  你的演讲需要很多演示吗？也许多用图片、少用文字效果会更好？


  在你考虑在他人面前演讲之前，你需要能够清晰连贯地写下自己的想法。当然，提升写作能力的唯一方法就是多写。


  ### 加入论坛


  **作者：贾里德·斯蒂尔**


  还可以考虑加入一个论坛、邮件列表或其他平台，让其他技术专业人士可以在上面提出他们未能解决的技术问题。一个活跃的论坛就像一场永不停歇的技术大会。你也要积极参与。而且，你在学习的过程中，不可避免地会结识新朋友。


  ### 开始写作


  我从来不是一个作家。事实上，我成为数学专业就是因为不用写作。本科时，凡是要求学期论文的课我都会退掉，转而选择数学课，仅仅因为不涉及写作。我仍然记得，当我好不容易在一门名为“变态心理学”的课上获得一个座位时有多么兴奋，而当教授在第一天就说学期末要写一篇十页纸的论文时，我又有多么失望。我离开教室，走到注册处，换到了一门叫“数值分析”的课。


  当我进入研究生院时，我的世界被颠覆了。在我上的第一堂课上，教授就说明我的作业需要用文字写出来并提交。所以，我甚至不能写“2”，我需要把它拼写成“two”。简单的数学陈述和公式变成了句子和段落。这简直是变态的折磨。老实说，我当时都不觉得自己能撑过去。教授解释说，如果我想要在数学或其他任何领域有所作为，我就必须提高我的阅读和写作能力。


  而且，她说得对。


  说实话，这就是我当前写作技能的开端，就在研究生院学习线性代数的时候。在研究生院毕业后的几年里，作为一名程序员，我发现工作中时不时需要写点东西。我怀疑当时写的东西现在看来都没什么可读性，除了能让人笑笑。不，我最初真正写的东西是相当私人的。


  我和妻子有了第一个孩子。我决定建立一个家庭博客，可以在那里写各种事情并贴上宝宝的照片，这样人们随时都可以看。我一直保持着每月写两到三篇的频率，直到第二年我们有了第二个孩子。然后我就开始为两个孩子都写博客，直到今天我还在坚持。我之所以能开始写作，是因为我有充满热情的东西可以写。随着时间的推移，我也意识到自己对技术事物同样充满热情，所以除了家庭博客，我开始为自己作为专业人士的身份写博客。事实上，我找到了所有这些我热爱的东西，并且喜欢写它们，这让文字从我指尖流出变得非常容易。


  多年的阅读让我更容易理解，我想要拥有自己的声音、自己的风格，并成为一名作家。有充满热情的东西可写则让事情变得更容易。如果你想成为一名更好的作家，那么你需要多写，而多写最简单的方法就是找到你热爱的东西来写。


  **小贴士：** 当你对做某事充满热情时，它感觉就不那么像工作，而且它实际上会激励你取得更多成就。



