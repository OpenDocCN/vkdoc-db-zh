  ## “今日”待办清单


  **作者：乔纳森·詹尼克**


  我每天开始工作时，都会为当天创建一个待办事项清单。几年前，我会试图把自认为能完成的所有事项都塞进清单里。别这么做。这是个陷阱。正如汤姆指出的，工作日绝不会完全按计划进行，你需要为错误留出一些余地。我现在仍然创建每日清单，但会留出充裕的余地来处理一天中出现的所有临时任务。待办清单给了我一个目标——如果我能完成它——就能让我自豪地回家，感觉付出了良好努力并取得了一些切实成果。


  ## 外包


  如今，“外包”一词带有负面含义。事实上，大多数时候我请人们分享他们的外包经验时，他们的回应负面多于正面。原因各不相同，但我将它们归为以下几类：


  工作质量差


  语言障碍


  安全问题


  担心失业


  几年前，随着工作量不断增长，我不堪重负，我的经理告诉我，当时我们唯一的选择就是将我的部分工作外包出去。我犹豫不决，原因有几个，其中一些我刚刚提到。但我的顾虑不足以阻止我去尝试，因为我知道没有帮助的话，堆积如山的工作是无法完成的。


  我有两个选择：要么在试图管理工作量上惨败，要么给外包一个机会；如果失败了，至少我尝试过做些什么。回顾决定将我们大部分工作外包出去的决定，我意识到这可能是我职业生涯中最好的决定之一。


  在我们决定雇用任何人之前，我的经理和我仔细考虑了我们所有的顾虑。我们把它们列出来，然后尽力想出缓解这些顾虑的办法。毕竟，未能计划就是计划失败，对吧？我们从未打算失败，也决定不想在如此重要的事情上失败。


