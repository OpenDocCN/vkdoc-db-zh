  ## 社群


  所有这些事件感觉就像是上辈子的事了。实际上像是两辈子前，因为自那以后我又有了两个孩子。在这条路上，我知道我不可能懂得关于成为一名 `DBA` 的所有事情，所以我开始接触并寻找其他的
  `DBA`。我在网站上、论坛里和会议上找到了他们。现在到了这样一个程度，我会告诉别人这句话：“你得到的不仅仅是我，还有我的人脉网络。”


  没过多久，我自己也开始做一些写作、帮助他人以及进行演讲。2009 年，我被任命为 `PASS` 董事会成员，同时也成为了一名 `SQL` MVP。对于一个 `PowerBuilder`
  开发者来说，这还不错。


  所以，这就是我最终如何成为一名 `DBA` 的故事。很多人，包括我自己，总是很好奇一个人是如何成为 `DBA` 的。在很多情况下，我们最终走上这条路是偶然的，但也有时候，我们只是为自己的机遇做好了准备。我的故事不一定独特，当然也绝非唯一。我询问了一些同事是否愿意分享他们的故事，他们的回复如下。


  ## 其他旅程


  成为 `DBA` 有很多不同的途径。我绝不是唯一一个走了迂回路线的人。我们大多数人确实往往拥有一些技术经验或悟性，并且具备良好的组织或分析能力。但事实是，这些技能同样适用于许多其他职业。例如，酒店经理需要有条理、注重细节，并且能够理解和排除运行收银机的销售点软件的故障。


  很少有学院或大学提供数据库管理作为专业。许多学校会提供计算机科学或某种信息系统专业，但没有专门培养 `DBA` 的专业。可能有一两门关于数据库设计或理论的课程，但关于灾难恢复、高可用性、服务器配置以及其他
  `DBA` 需要知道的 everything else，可能就讲得不多了。因此，对于大多数人来说，成为 `DBA` 的道路不是一条直线，这是可以理解的。事实上，我们都是在某个时刻偶然进入了这个角色，然后在那里我们决定是否喜欢这份工作。


