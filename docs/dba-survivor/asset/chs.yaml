  ## 第三章：一些基础知识


  **图 3–2.** *一种通过条带化提高性能的 `RAID` 配置*


  现在，你有两个小磁臂在两个磁盘上同时来回移动。


  你仍然需要执行那两百个操作，但它们将在两个驱动器上同时进行。每个驱动器承担一半的工作量。你的总时间将从两秒减少到一秒。


  另一种提高性能的方法是缓存。大多数 `RAID` 控制器允许将一定量的数据存储在缓存中。其思路是尽可能多地缓存非顺序请求，以便将它们批量处理，并作为顺序请求发送给硬盘驱动器。


  ### 用于容错的 RAID


  `RAID` 使用两种方法来提供容错能力：镜像和奇偶校验。镜像正如其名：你在两个（或更多）不同的磁盘上有两个（或更多）数据副本。图 3–1 中的场景就是一个镜像场景。


  **注意：** 镜像通常被认为是两个驱动器相互镜像。然而，没有任何因素阻止你跨两个以上的驱动器进行镜像。


  *奇偶校验* 是指你向其中一个磁盘添加称为*奇偶校验数据*的额外数据，这些数据可以在某个磁盘故障时用来重建你的实际数据。奇偶校验方法的优点是节省磁盘空间。图 3–3
  展示了一个字节的奇偶校验数据如何保护两个字节的实际数据。


  **图 3–3.** *一个字节的奇偶校验数据可以保护两个字节的实际数据。*


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 41](img/index-57_1.png)


  ## 第三章：一些基础知识


  39


  奇偶校验方法的 `RAID` 是一件好事，除非你关心性能。它会对性能产生负面影响，因为每次都要写入那个额外的奇偶校验信息，这会增加额外的开销。


  让我们研究几种不同的 `RAID` 级别，它们使用镜像和奇偶校验的不同组合来实现保护和速度。我不会讨论所有可能的 `RAID` 级别，只讨论作为 DBA 可能会遇到的那些。


  ### RAID 0


  这个级别通常称为*磁盘条带化*，其结果通常被称为*条带集*。你的数据被分成块（或区块），并以固定顺序分布在阵列中的所有磁盘上。图 3–4 说明了这种方法。


  **图 3–4.** *一个 `RAID 0` 配置示例*


  `RAID 0` 会提高性能，因为所有操作都可以如前所述同时独立执行。缺点是任何一段数据只存在于一个磁盘上，因为数据被均匀地分布在所有磁盘上。一旦驱动器发生故障，该磁盘上的所有数据将永久丢失。实际上，情况更糟：失去一个驱动器，就相当于失去了阵列中的所有数据。从
  `RAID 0` 阵列的驱动器故障中恢复的唯一方法是从上一次备份中恢复整个阵列。因此，`RAID 0` 不是 SQL Server 存储的好选择。值得注意的是，`RAID
  0` 既不提供容错，也不提供冗余。


  ### RAID 1


  这个级别更常被称为镜像。它就是前面图 3–1 所示的场景。你的数据只是简单地同时写入至少两个不同的位置，在单独的磁盘上创建一个或多个数据副本。一旦发生驱动器故障，阵列仍然完全可用，因为至少还有另一个驱动器副本在线且功能正常。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 42](img/index-58_1.png)


  40


  ## 第三章：一些基础知识


  ### RAID 5


  这个级别也称为带奇偶校验的条带化。它与 `RAID 0` 非常相似，但需要一个额外的磁盘来存放跨所有磁盘条带化的奇偶校验位。图 3–5 展示了一个示例配置。毫无疑问，`RAID
  5` 是最受欢迎的 `RAID` 级别，我看到许多管理员都在使用它。


  **图 3–5.** *`RAID 5` 配置示例*


  `RAID 5` 如此受欢迎的原因是，如果一个磁盘发生故障，你只需（在第二个磁盘故障之前；否则，你会丢失*所有数据*）添加一个新磁盘，阵列就会自我重建。听起来不错，是吧？虽然
  `RAID 5` 能提供比 `RAID 1` 更好的性能，但奇偶校验位带来的开销意味着它的性能不如 `RAID 0`。但 `RAID 5` 确实提供了容错能力，这就是为什么许多管理员喜欢使用
  `RAID 5` 胜过其他任何级别的原因。


  ```

  与任何 RAID 5 作战？


  作者：Jonathan Gennick

  ```




  对 RAID 5 的喜爱并非人皆有之。2003 年，沮丧的数据库管理员 James Morle 创建了一个戏谑的组织，名为**反对 RAID 5 联盟**。该联盟的目标是反对任何及所有
  RAID 5。您可以访问其网站并在以下 URL 阅读相关论述：


  [`http://miracleas.com/BAARF/BAARF2.html`](http://miracleas.com/BAARF/BAARF2.html)


  你可能会也可能不会同意该联盟的观点——到目前为止，我选择保持开放的心态——但该联盟网站上托管的一些文章是经过深思熟虑的，值得一读。


  ## RAID 1+0


  这个级别通常被称为带镜像的条带化，有时也称为 `RAID 10` 甚至 `RAID 1/0`。你需要先配置一个条带集（`RAID 0`），然后将其镜像（`RAID
  1`）到另一个类似的条带集上。图 3-6 展示了其可能的样子。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 43](img/index-59_1.png)


  ## 第三章：一些基础知识


  ### 41


  **图 3-6.** *将驱动器条带集进行镜像的 RAID 1+0*


  在所有的 `RAID` 级别中，`RAID 1+0` 级别提供了最高的性能。它也提供了容错能力。当然，它的成本也更高，因为你需要两倍数量的磁盘。


  ## 你想要哪种 RAID 级别？


  这当然取决于情况。你是否希望当一个驱动器故障时，你的数据仍然保持在线？大多数人都希望如此，但也许你不是。那样的话，`RAID 0` 就适合你！无需担心奇偶校验或镜像，只需将你的磁盘配置成一个大型条带集就完事了。


  那性能和成本呢？大多数人也关心这些，很可能你也关心。但当涉及到 SQL Server 时，你会发现没有一个单一的 `RAID` 级别能满足你所有的需求。等等……你了解自己的需求是什么吗？嗯，让我们以最简单的方式讨论一下。


  ### 你的需求


  你实际上只有三个基本需求：


  -   数据库数据文件的放置位置

  -   事务日志文件的放置位置

  -   tempdb 数据库文件的放置位置

  -   数据库备份的放置位置


  好吧，那是四个需求，但真的就这些了。你的数据文件应该放在一个驱动器或磁盘组（阵列）上，你的事务日志文件应该放在另一个单独的驱动器或磁盘组上，你的 tempdb
  文件应该放在第三个组上，而你的备份应该存储在第四个组上，或者完全放在另一个服务器上（这通常是推荐的做法）。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 44](img/index-60_1.png)


  ### 42


  ## 第三章：一些基础知识


  上述列表中的每一项都引出一组不同的需求。在一个预算无上限、且有专为数据库服务器设计的硬件的完美世界里，你将能够用 `RAID 10` 配置所有内容。服务器的操作系统文件放在一个阵列上，页面文件放在另一个阵列上，你的数据、事务日志和
  tempdb 文件也分别放在不同的阵列上。那将是五个不同的阵列，都配置为 `RAID 10`，意味着你（至少）需要二十块硬盘。如果你想知道的话，那确实需要很多硬盘。大多数服务器都没有那么多硬盘托架。


  但你真的需要这一切吗？我现在维护着数千个数据库，其中 99%的数据库即使数据、事务日志和 tempdb 都使用 `RAID 5` 也能运行良好。但也有少数系统确实需要额外的关注和照顾。当你需要帮助进行性能调优时，坚持基本原则将对你有益。


  **注意：** Tom 在这里关于许多系统在 `RAID 5` 阵列上运行良好的评论与我自身的经验相符。这就是为什么我一直无法完全接受 BAARF 的观点。 –
  Jonathan Gennick


  在故障排除时，你最需要认识到的是压力来自哪里。是 tempdb 吗？如果可能，将你的 tempdb 放在 `RAID 10` 上。是事务日志吗？如果可能，将你的事务日志放在不同的
  `RAID 10` 组上。如果不行，那么为你的事务日志选择 `RAID 1`。是数据文件吗？你的数据也应该放在另一组 `RAID 10` 上，但如果那不可能，那么为你的数据选择
  `RAID 5`。


  归根结底是：了解这些 `RAID` 级别之间的差异，以及你想使用哪些级别。这些知识在你帮助设计任何系统架构时将大有裨益。


  ## 面向数据库管理员的 SAN 入门知识


  至此，你应该已经牢牢掌握了 `RAID` 的概念，足以坐下来与你的服务器团队成员讨论一些技术问题了。如果真这么做，你可能会发现你的大多数服务器都没有足够的驱动器托架来容纳你可能想要的各种
  `RAID` 类型。你甚至可能会发现自己提出了不同的 `RAID` 配置需求，从而引发了关于外部存储的讨论……然后，某个地方的某人会提到以下内容：`SAN`。


  `SAN` 代表 *存储区域网络*，它要么是你所能想象的最奇妙的东西（可能性很高），要么是一场噩梦（可能性不大，但存在）。`SAN` 背后的概念很简单：将成百上千个物理磁盘捆绑在一起，将它们划分成逻辑单元（称为
  `LUNs`），然后将你的服务器连接到这些 `LUNs` 以获取存储空间。图 3-7 展示了一个 `SAN` 如何为许多服务器提供服务。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 45](img/index-61_1.png)


  ## 第三章：一些基础知识


  ### 43


  **图 3-7.** *SAN 中的驱动器可以根据需要分配给多个服务器。*


  这样，如果你需要为服务器增加额外的存储空间，只需分配一些额外的 `LUNs` 即可。事实上，大多数时候，你的 `SAN` 管理员只会问你：“鲍勃，你现在需要多少空间？”
  无需将小硬盘换成大硬盘，也无需让 `RAID` 控制器重建阵列。听起来很棒，对吧？


  也许吧。


  让我们想象一下，你是 `SAN` 管理员。你将成百上千个磁盘捆绑成 `LUNs`。你会为所有这些磁盘使用哪个 `RAID` 级别？如果你回答 `RAID 5`，因为它具有成本效益和大存储容量，那么当你结束数据库管理员的职业生涯后，可能在
  `SAN` 管理领域会有发展前途。


  很可能你的 `SAN` 确实是配置为 `RAID 5`。如果你还记得，`RAID 5` 对于数据库服务器来说并不总是理想的。别慌：当在 `SAN` 中正确使用时，`RAID
  5` 阵列可能不是最理想的，但它们仍然可以足够好。


  ## 为什么 RAID 5 可能适合你


  首先不必担心的原因是，`SAN` 控制器具有内置缓存：作为服务器与其存储阵列之间缓冲区的内存。每当 SQL Server 向你的驱动器发出写入操作时，只要数据进入
  `SAN` 控制器的缓存，这些写入就被认为是已提交的。配置正确时，该缓存比任何磁盘阵列都要快，无论是 `RAID 5` 还是 `RAID 10`。虽然你的 `SAN`
  可能使用 `RAID 5`，但你的数据并非直接写入磁盘；它首先被转储到缓存中，然后再写入磁盘。


  你的查询不会等待数据真正写入磁盘；当数据实际上还在缓存中时，它们就认为数据已经到位了。只有在缓存实际被填满的情况下，你才会看到性能问题，而在这种情况下，你将*处处*遇到性能问题，而不仅仅是一台服务器。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![Image 46](img/index-62_1.png)


  ### 44


  ## 第三章：一些基础知识


  其次，你不应惊慌，因为你可能还没有看到任何实际的性能问题。仅仅因为你的 `SAN` 可能配置为 `RAID 5`，并不足以让你竖起汗毛。不，先生，你最好能提供一些证据，证明你遇到的性能问题可能与
  `SAN` 性能有关。




  '
- '# 被遗忘的性能基准测试艺术


  在服务器投入生产前，要确定存储是否是瓶颈，唯一的方法就是进行一些性能基准测试。我发现如今大多数机房里普遍存在的一点是，基准测试远非常规做法。人们往往倾向于将东西草草拼凑起来，扔进生产环境，然后等着看是否有人抱怨。如果你想晋升为“问题解决者”，那么明智的做法是对你机房中一些更重要的流程进行基准测试。这样，当有人说“这个很慢”时，你可以迅速参考最新的基准测试，判断它是否真的变慢了，或者这只是感觉上的错觉。


  当排查可能的 SAN 性能问题时，你需要问 SAN 管理员的第一个问题是：“我们 SAN 的预期 I/O 吞吐量是多少？” 获取你能得到的所有细节，然后回到你的工位开始收集你自己的指标。接着进行对比，看看预期吞吐量是否与观测到的足够接近。如果不够，现在你就可以带着一些实际数据回去找
  SAN 管理员了。


  相信我，相比于像这样说一个笼统的声明：“我们希望在 SAN 上为我们的`tempdb`划分一些使用 RAID 10 的存储空间”，这种方法能让你获得更多支持。除非你有证据证明确实存在性能问题，否则你的
  SAN 管理员不会有动力开始划分不同的 RAID 级别，即使你了解什么对 SQL Server 最有效。


  **提示：** 你进行的基准测试和测试越多，你对环境的控制力就越强。


  你的 SAN 确实可能是一个性能瓶颈，而且对你来说可能很难排查。就像人们会责怪数据库服务器一样，因为它是一个他们不理解的大黑匣子，我也看到过一些 DBA 感到沮丧，因为他们的
  SAN 同样也是一个他们不理解的大黑匣子。我能给你的最好建议是，把你的 SAN 看作一个常量。它应该提供标准的 I/O 吞吐量。它应该允许你在需要时动态地为服务器添加空间。它对每台服务器都应该是相同的。这意味着你可以在不同的服务器上执行一些基准测试，假设
  SAN 性能应该是相等的，然后带着你的结果去找服务器团队讨论差异。问题可能确实出在 SAN 上，但也可能是其他原因。


  [www.it-ebooks.info](http://www.it-ebooks.info)


