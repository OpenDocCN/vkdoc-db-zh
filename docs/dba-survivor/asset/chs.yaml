  ### 用于性能的 RAID


  你也可以利用 `RAID` 来提高性能。了解如何做到这一点，在尝试进行查询性能调优时会很有帮助。当你完成初始检查清单并开始收集服务器配置的基线信息时，这也会让你受益匪浅。


  SQL Server 是一个非常消耗输入/输出（I/O）的系统。这意味着你能越快地从磁盘读取和写入数据，响应时间就会越快。你可以使用 `RAID` 通过利用将数据*条带化*分布在多个磁盘上的方式来增加
  I/O 吞吐量。


  例如，一个传统的硬盘内部有一个小磁臂，每次你想读写数据时它都会来回移动。假设你需要执行 100 次读取和 100 次写入操作，每次操作耗时 1/100 秒。在单个磁盘上需要多长时间？两秒钟。现在，假设你如图
  3–2 所示配置了 `RAID`。


