  你来回答这个问题：你会认为哪一种（正确先生或及时先生）是初级 DBA，哪一种是高级 DBA？


  **提示：** 能够解决问题并不会使你成为高级 DBA。你成为高级 DBA 是因为确保问题首先不会发生。


  虽然及时先生可能因为他的所有努力而得到终端用户的赞赏，但必须提出最终问题：他是否在修复那些由他修复早期问题而引起的新问题？


  有人成为及时先生有两个原因。第一个原因是，在他们上任之初问题就太多，他们将面临一场漫长的战斗来控制所有“火情”。第二个原因是，他们是初级管理员，只知道足以解决当前问题的知识。


  然而，正确先生这个人不仅能在火情发生时将其扑灭，而且拥有知识和经验来建立控制措施，确保问题不太可能再次发生。因此，他们不仅知道如何解决当前问题，而且*知道如何解决问题的根源*。他们实施的解决方案不会使环境复杂化；它们有助于减轻他们的工作负担。


  当你开始新角色时，你很有可能需要在很长一段时间内扮演及时先生，即使你处于高级水平。这可能是因为工作量远远超出一个人所能处理的范围。当然，你有你的检查清单并且组织有序，所以你知道应该先关注哪里。但是，当你沿着清单向下推进时，你需要不断思考解决方案，而不是临时的快速修复。


  随着时间的推移，你真的想成为正确先生，并将你的环境配置成几乎能自我修复的样子。如果你觉得失去了向人们展示你对公司有多大价值的机会，也不要绝望。


  的确，当你持续配置你的环境并主动阻止潜在麻烦时，你会发现你有更多时间以不同的方式展现自己。


  **提示：** 更聪明地工作，而不是更辛苦。寻找主动解决问题的方法。


