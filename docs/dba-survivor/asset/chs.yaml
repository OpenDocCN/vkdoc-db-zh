- '# 第三章：一些基础知识


  当人们经历这三个阶段时，他们的反应各不相同。想想你可能已经认识的以下几类人群：


  *   创新者

  *   早期采用者

  *   早期大众

  *   晚期大众

  *   落后者

  *   顽固派


  听起来是不是就像你认识的几乎每个人？而且很有可能，这些分类也适用于你自己，只不过针对不同的事物，你可能属于不同的类别。也许你永远要等到第一个服务包发布后，才会升级到新版本的软件。听起来耳熟吗？但或许你也会第一个排队购买最新的
  iPhone。在某些情况下你拥抱变化，在另一些情况下则更为谨慎。


  一个人对最熟悉的事物所赋予的价值，将引导他们拥抱或抗拒变化。思考一下。如果你赋予已知事物的价值高于未知事物，难道你不会抗拒改变吗？你所支持的最终用户也是如此。如果你提议他们开始以许多不同的方式做事，你最好准备好向他们展示未来的状态将比现状有价值多少。


  你为什么排队购买新款 iPhone？因为你认为新型号比你当前的手机更有价值。你为什么在考虑升级软件前，一定要等到第一个服务包发布？因为你认为当前系统的稳定性比新版本更有价值。


  作为一名数据库管理员，你将在许多场合被要求领导变革。而且，在某些场合，你不会被*要求*领导变革——你需要主动从你的小隔间里站起来，无需他人告知就自己动手去做。当那一刻到来时，请遵循这些简单的准则：


  1.  从组织的角度定义需求。

  2.  从个人（或最终用户）的角度定义需求。

  3.  描述期望的结果。

  4.  定义一个时间表。


  相信我，这需要练习。很少有人天生具备那种能让人轻松拥抱变革的软技能。但对于那些天生具备或后天习得这些技能的人来说，结果是强大的——能激励和鼓舞人们走向新的境地。


  你还应该意识到抵制行为的类型。有两种：消极抵制和积极抵制。消极抵制是指一个人口头同意你所说的一切，但从不履行他们同意的事，或者假装无知，也许还隐瞒信息。积极抵制是指一个人寻找缺陷并嘲笑变革；操纵他人并诉诸恐惧感。


  如果你在与人打交道时意识到这些行为，你就可以在问题变得更大之前就将其扼杀。


  ### 拥有标准和流程并非坏事


  在某个时候，你不可避免地会遇到有人表示不理解你为什么以特定的方式做事。这很可能是因为你已经实施了一些标准，以帮助你提供更稳定的环境。而这些人会目瞪口呆地发现：（1）你需要有这样的标准，以及（2）这个标准竟然真的要适用于*他们*。


  例如，假设你是一个之前没有数据库管理员的新单位的数据库管理员。每个人都对数据库服务器拥有完全访问权限，可以为所欲为。说一团糟可能都太客气了。作为优秀的数据库管理员，你检查了清单，找到了几种可以立即改进并给整个公司带来巨大利益的方法。


  首先，你逐一检查每个服务器和数据库，将数据和日志文件正确地放置在不同的驱动器上，以避免重大灾难。在移动文件的过程中，你撤销了除你自己之外任何人创建新数据库的权限。你这样做是因为你对问题的根本原因分析得出结论：有如此多的数据库设置不正确，是因为太多人不了解其行为的后果。为了帮助他们避免伤害自己，你做出了必要的更改。


  在你开始撤销权限大约一小时后，你接到了一位开发人员的电话，他不明白为什么自己不能创建数据库了。“不就是个数据库吗——我自己能创建，为什么还要打电话叫你来创建？”
  你会忍住想要回应说“如果你自己能搞定，那我就不用花一周时间跟在你们屁股后面收拾烂摊子了，就像独立日后跟在马后面清扫的人一样”的冲动，并会尽力解释：为了拥有一个稳定的环境，数据库创建权掌握在少数人手中比掌握在多数人手中更好。


  试着去理解，大多数人在日常生活中持有的是一种横向视角或体验。开发者需要上班，登录网络，访问数据库服务器，进行更改，测试他们的更改（希望如此），并将更改部署到生产环境。为什么这是一种横向视角？嗯，想想他们一天中经历的所有纵向壁垒：他们开车上班，停车，进入大楼（设施）。他们登录网络（域控制器，网络）。他们访问数据库服务器进行更改（你这里）。他们测试更改（获取客户确认）。他们将更改部署到生产环境（又是你这里）。


  你与他们进入大楼或访问网络通常无关，但你对他们如何被允许更改数据库服务器确实有一定控制权。在这种情况下，你的视角是纵向的：你主要关心自己的领域（数据库服务器），完全不知道横向视角是什么样子。这可能是一件很难调和的事情；你真的需要与你的最终用户合作，并经常与他们沟通，以理解他们所有的痛点。


  一旦你开始理解你的大多数最终用户都是从横向视角看问题，就很容易明白为什么当你开始强制执行政策、指南和标准时，他们可能会感到沮丧。记住，人们可能抵制变化，并利用这个机会来领导变革。随着时间的推移，你的软技能会提高到一定程度，人们会开始相信你的行为是为了公司的整体利益，而不是针对任何个人。


  ### 人们会责备他们不理解的事物


  这一点相当不言自明。人们总是倾向于责备他们知道但不完全理解的东西。这很自然，对吧？我的意思是，如果你认为自己对十件事中的九件都已经了如指掌，那么你的注意力就会集中在第十件事上，并且你会花太多时间去思考为什么这第十件事此刻让你如此头疼。


  你会经常听到这样的话：“我们的代码多年没变过了”，“昨晚一切都运行良好”，以及“你们昨天肯定做了什么，因为现在我们所有东西运行得都慢多了”。习惯成为任何系统任何问题的焦点吧。开始培养一些厚脸皮，因为你很快就会需要它。



  '
- '# 第三章：基础知识


  任何时候，只要系统出现哪怕一丝异常迹象，人们首先会做的就是责怪数据库服务器。尽管在你的屏幕和数据库服务器之间存在许多层，但第一个接到的电话总会是你。你会被期望立即调查问题，同时也会惊讶地看到这样的邮件：“我已联系了数据库管理员，他们将修复这个问题。”等等！我们从未说过数据库服务器有问题——你们为什么告诉别人我们要修复什么？问题可能是网络，或者是无法扩展的糟糕设计，又或是*任何原因*。然而，人们就是会死死盯住数据库服务器，因为（1）它是已知的，（2）大多数人不理解它的工作原理。在某些情况下，如果他们收到诸如“无法连接到数据库”之类的错误消息（或者错误消息中简单地出现了“数据库”这个词），人们就会自动假定问题*一定*出在数据库上。


  我已经记不清有多少次被告知服务器有问题，结果发现问题是用户或账户没有登录权限。抱歉，但这并不是服务器的问题。同样，如果你试图将 100GB 的数据加载到一个只有
  10GB 可用空间的磁盘上，这也不是服务器的问题。


  33GB 的 tempdb 驱动器被填满也是同样道理；问题不在于服务器，而在于低效的代码。然而，你的服务器（最终是你自己）将被迫承担过错的负担。


  没关系，因为你之所以是一名数据库管理员，原因之一就是你有能力承担这种足以压垮你大多数同行的负担。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 63](img/index-79_1.png)


  ## 责备与功劳


  在上一节中，我们讨论了人们倾向于责怪他们不理解的事物。另一个你需要习惯的事实是，人们很少会特意为你所做的工作或建议应做的事情给予你功劳。我从未在上班时听到有人对我说：“昨晚干得漂亮，我们的批处理加载比预期快了两秒。”但如果它慢了两秒，那么你可能就会被要求开始进行一种星际迷航式的五级诊断，不管那是什么意思。


  你很快会发现，唯一能让你引人注目的时候就是出问题的时候。一些数据库管理员开始认为，展示自己价值的唯一方式就是总在身边去修复出错的事情。就我个人而言，我宁愿从一开始就构建一个稳定运行、不出任何问题的环境，即使这意味着我永远不会被注意到。


  如果你发现自己处于不被注意的境地，那么你需要做的就是开始建立一些指标。从简单的事情开始，比如你的数据库备份。追踪过去一周进行了多少次备份，以及有多少次备份失败。经过一段时间，也许一两个月后，你可以用这些数据向你的经理汇报。如果你随着时间的推移减少了备份失败的次数，那么这份报告将帮助你向公司展示你的价值，而不需要等到出了问题才被注意到。


  **提示：** 指标和报告是你展示价值的方式；明智地使用它们。


  指标是为你构建稳定环境、报告你所做的良好工作以及在灾难之外展示价值的绝佳方式。除了追踪备份和备份失败次数，以下是其他一些值得长期追踪的良好项目：


  - 数据库数量（按生产环境、非生产环境等细分）

  - 数据库文件在磁盘上使用的空间量

  - 数据库备份使用的空间量

  - 备份数据库所花费的时间量

  - 数据库还原次数

  - 新创建的数据库数量


  所有这些信息在系统数据库中都很容易获得，并将极大地帮助你确保人们了解你在幕后所做的工作。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 64](img/index-80_1.png)


  ## 正确与讨喜的需求


  如果你总是正确，没人会喜欢这一点。而每个人又都会希望你总是正确。祝你好运，调和这两件事。


  人们来找你，是因为他们想知道把事情做对的正确方法。在这种时候，你希望尽力帮助他们找到正确的解决方案。虽然在这种讨论中未能始终正确并不会很快导致人们要求解雇你，但如果你有必须始终正确的需求，那么你会发现你与同事之间会产生问题。


  如果出了问题（而且*总是*会出问题），而你的数据库服务器受到责备（70%的情况下会发生），你告诉人们问题不在数据库服务器（90%的情况下确实如此），结果也的确证明问题不在数据库服务器，那么通过提醒人们你始终是对的，这对你自己没有任何好处。


  在这一点上请相信我。不要觉得有必要提醒人们他们一开始就该听你的。随着时间的推移，人们要么会因为你的建议和经验而被你吸引，要么会因为讨厌每次他们在办公室里跑来跑去大喊天要塌了，而你让他们坐下别喊时的那种感觉而远离你。


  请记住，在薪资评估时，你的“支持率”很重要。你可能总是正确，但由于你的态度而被忽视，结果你不会获得任何绩效加薪。然而，你可能非常受欢迎，几乎总是错的，却发现自己在薪资等级上不断攀升。


  你会遇到与你共事的这些人，他们要么（1）自己想正确，要么（2）希望你偶尔错一次。这会发生，就像太阳会从东方升起一样。当这种情况发生时不要惊慌；当你感觉到别人情绪激动时，保持冷静。你最不希望看到的就是问题升级。如有必要，提议与一个中立的第三方进行讨论，也许是你们都尊重的一位同事或经理。陈述你的理由，并明智地选择你的“战斗”。有时，即使对方是错的，做出让步也会带来明显的好处。


  当你做出让步时，这将有助于在一定程度上表明你是可以讲道理的。这也可能会为你在同事那里赢得一些好感分。事实上，如果你让步足够多，你会发现你可能会在办公室里非常受欢迎。


  虽然这可能会让你自我感觉良好，但你需要平衡你对受人喜爱的渴望与你执行标准和遵守准则的需求。这是一条难以把握的界限，但随着时间的推移，你将学会哪些“战斗”是值得去打的。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 65](img/index-81_1.png)


  '
- '# 第四章：对开发人员来说，开发服务器就是生产服务器


  你进展顺利，大家都相处融洽，但你是否注意到，你的工作做得越好，被要求做的事情就越多？你是否还注意到，开发人员往往只在他们自己那边出现紧急情况时才会联系你，而且不管是什么服务器，一切事情都总是紧急的？


  请做好随时待命的准备，尤其是随着你工作能力的提升。优秀的数据库管理员价值连城，而你很快也将成为其中一员。



