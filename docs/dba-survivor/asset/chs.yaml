- "# 第一章：我是如何走到这里的？\n\n他作为一名`COBOL`程序员，在各种合同工作中未能成为`DBA`。\n\n他作为一名`Visual Basic`程序员未能成为`DBA`。\n\
  \n他作为一名`PowerBuilder`程序员几乎也没能成为`DBA`。\n\n然后有一天，那位`DBA`辞职了，乔纳森成了**立即上任的 DBA**。他终于可以称自己为`DBA`了。\n\
  \n让乔纳森最终成功的是他坚持不懈——坚持了五年多。为了谋生，他必须用各种开发语言做高质量的工作，但他一直持续钻研他的数据库技能。\n\n当`DBA`辞职时，那就是准备遇到机会的时刻。\n\
  \n## 你被选中了！\n**肯·西蒙斯 著**\n\n这里的大多数故事似乎都是关于人们积极尝试成为`DBA`。我一直在等待这样的情景出现：经理走进来对开发人员说：“嘿，你，你现在是`DBA`了。”\n\
  \n## 你的旅程\n\n如果你希望成为一名`DBA`，你该如何以及从哪里开始？你需要获得特定的学位吗？你需要尝试在某个地方找到一份初级`DBA`的工作吗？在没有`DBA`经验的情况下，你如何开始你的`DBA`职业生涯？要进入这个职业道路，你有哪些选择？\n\
  \n与大多数专业领域一样，成为一名`DBA`可能看起来令人生畏。刚开始做`DBA`可能很艰难，因为大多数时候，这取决于有人给你一个你需要的机会。你需要有人给你正确的机会，而在你得到那个机会之前，你需要开始准备自己。那么，你到底该如何为你还不太了解的工作做准备呢？\n\
  \n### 积累生活经验\n**布伦特·奥扎尔 著**\n\n即使是上学也不能保证得到一份`DBA`工作。公司最珍贵、最有价值且不可替代的资产是其数据。公司必须确保他们的`DBA`值得信赖且有经验，这意味着他们通常不会信任刚从大学毕业的人担任`DBA`角色。在你阅读本章以及人们如何成为`DBA`的故事时，思考一下你自己的生活经历如何能够展现你的可信赖性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 10](img/index-26_1.png)\n\
  \n### 做好准备\n\n如果你已经决定要成为一名`DBA`，那么就开始采取措施，为机会敲门时做好准备。如果你不采取行动，只是坐着等待有人将你梦想工作的机会拱手相奉，那么当机会从未降临时，请不要沮丧。它确实不会来。\n\
  \n你能采取哪些步骤来让自己做好准备？我的第一个建议是，在你的日常工作中寻找能够让你获得一些`DBA`经验的机会。如果你尚未进入 IT 行业，那么你的选择会更有限，但并非不可能。如果你在\
  \ IT 行业，也许是一名开发人员，那么就开始更多地参与数据库设计工作或性能调优。\n\n如果你是一名开发人员，并且希望成为一名`DBA`，我将给你一个相当大的建议，关于如何获得宝贵的经验：学会更好地进行性能调优，而不要抱怨你需要成为“`sa`”才能完成工作。说真的，如果你对系统非常了解，即使没有管理员权限也能获取性能详细信息，那么你成为`DBA`的路就走过一大半了。\n\
  \n你会非常惊讶地发现，许多`DBA`执行常规任务时并不需要`sa`权限。随着越来越多的公司对允许的访问级别实施更严格的控制，你可能会发现有必要学会用最少的权限来完成任务。\n\
  \n**提示：** 学会在不是`sys admin fixed-server role`成员的情况下执行任务。这些技能对你以后会很有用。\n\n如果你目前的角色不允许你承担可能与`DBA`相关的额外任务，那么去找工作中的一位`DBA`，问问他们你该如何开始。\n\
  \n大多数`DBA`总是乐于帮助他人更多地了解系统；这样做意味着当他们被叫来修复你的错误时，支持工作会更少！大多数`DBA`既积极进取*又*有些懒惰；这意味着我们总是在寻找让我们的生活更轻松的方法。其中之一就是帮助培训人们如何更好地完成他们的工作。\n\
  \n如果工作中没有什么你能帮忙的怎么办？你可以寻找做志愿者的机会。许多慈善组织需要人们捐赠他们的时间。当地的教会可能需要一些帮助来维护他们的计算机，甚至可能帮助维护一两个数据库。它可能不是每秒`15,000`笔事务的`10TB`数据库，但它是一个数据库，并且将是一个学习机会，你可以写进你的简历。\n\
  \n### 做一位负责任的管理者\n**肯·西蒙斯 著**\n\n值得注意的是，数据终究是数据，即使你是一名志愿者，你也需要小心，不要承担超出你能力范围的事情而犯下严重错误。编程错误不像`DBA`错误那样具有灾难性。在你的志愿工作中要像在带薪工作中一样负责任。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 11](img/index-27_1.png)\n\
  \n如果你没有兴趣志愿帮助他人，那么也许你有一个重叠的爱好可以提供学习机会。就我而言，我喜欢梦幻橄榄球。多年前，我帮助建立了一个带有数据库后端的自定义网站。这给了我很多学习机会，帮助我获得了成为`DBA`的最初机会。\n\
  \n\n\n## 第 1 章：我是如何走到这一步的？\n\n另一种为你做准备的方式是在线寻找兼职帮助。你可能会找到愿意提供一些合同工作的人，在夜间或周末帮忙处理数据库。这类职位确实存在，即使对于经验很少或毫无经验的人也是如此。在大多数情况下，它们可以直接通向初级\
  \ DBA 的职位。我要提醒你，要避开那些看起来好得令人难以置信的招聘广告；它们通常确实如此。\n\n### 接受培训\n\n你整体准备的一部分应包括某种形式的培训。这种培训可以有多种形式，例如培训书籍、课堂培训和在线培训；或者，如刚才提到的，在职培训。其他培训来源包括研讨会或会议。\n\
  \n无论你选择何种培训媒介，至关重要的是你要开始行动。即使是在职的 DBA 也有持续的培训计划，所以开始养成类似的习惯对你有益。开始每天阅读一些网站。寻找一些推荐的书籍。每天留出专门用于培训的时间。如果你正在寻找最有价值的培训方法以加快自己的学习曲线，那么我有一个词给你：教。\n\
  \n如果你真的想学习一个主题或学科，那就试着把它教给别人。选取数据库管理的某个方面，也许是索引，并尝试向别人解释它们是如何工作的。你会发现，你被要求教得越多，你获得的知识就越深入，你就会变得越好。\n\
  \n经常有人问我，如果他们想成为一名 DBA，应该考虑获取什么类型的学位。我只想说，你的学位并不像你想象的那么重要。总的来说，你的学位只是对你工作量的衡量，仅此而已。而世界上所有的教育，除非你也有动力，否则都收效甚微。当你将教育与动力结合起来时，你就真正拥有了一股强大的力量。\n\
  \n### 获得认证\n\n关于认证的价值已经有很多论述。我认为认证在向他人展示你的整体价值方面有一席之地。我`不`认为认证能完全说明你是谁或你的能力。\n\n\
  如果你认为专注于获得认证将是快速获得 DBA 工作的关键，你可能会惊讶地发现，许多人不会仅凭你的认证就雇佣你。如果你能够将认证与某种程度的相关工作经验结合起来，那么你会发现，与没有任何相关工作经验仅持有认证相比，你面前敞开的大门会更多。\n\
  \n[`www.it-ebooks.info`](http://www.it-ebooks.info)\n\n![Image 12](img/index-28_1.png)\n\
  \n认证的问题在于，许多公司提供`特训班`，你可以在那里待上一两周，然后获得某项特定技术的认证。\n\n这之所以成为问题，是因为它贬低了他人获得的认证的价值。这使得潜在的雇主很难判断你的认证是代表你实际的知识水平，还是代表你经过两周强化培训后、而且现在很可能已经大部分忘记了的知识水平。\n\
  \n**提示：** 认证和经验是一个强大的组合，类似于将教育与动力结合起来。\n\n还要记住，有很多人技术足够好，可以获得认证，但从不费心去参加考试。事实上，大多数人只是把考试作为通往其他东西的垫脚石。如果一个人认为自己无处可去，为什么还要费心参加考试呢？换句话说，`不`获得认证不一定对你有害，前提是你有经验来支持你的资历。\n\
  \n但对于那些没有必要经验的人，他们可能会考虑去获得认证。\n\n潜在的雇主在与候选人会面时会权衡这一点。\n\n我的建议是，先获得一些经验，然后再获得认证。反过来做可能会亮起红灯。你肯定不想投入大量的时间和金钱到一件在找到你希望通过认证本身帮你找到的工作之后才能有回报的事情上，对吧？你不如先把时间投资在寻找获取实际经验的方法上。\n\
  \n### 现在去争取你的机会吧！\n\n你已经做好了准备，有了一些经验，接受了一些培训，甚至可能还有了认证。现在是去找一份 DBA 工作的时候了，对吧？\n\n\
  嗯，不完全是这样。你看，开始寻找 DBA 工作的时机不是在拥有所有这些之后，而是在这`之前`。不要等到你认为自己掌握了所有必要技能；你可能永远无法对自己的技能感到足够放心，以至于认为会有人想雇你当\
  \ DBA。相反，立即开始寻找工作。\n\n大多数工作是通过与朋友和家人建立人脉找到的。一旦你知道自己想要从事这样的工作，就立即让人们知道你正在寻找一份 DBA\
  \ 的工作。为什么？因为一次合适的求职可能需要几个月时间。在你开始正式求职和你最终获得机会之间的时间里，你将能够获得必要的经验和培训，从而能够迅速投入工作。\n\
  \n开始与人交谈。告诉他们你在寻找什么。告诉他们你想做什么。你可能会发现，那些机会已经存在于你当前所在的地方。如果不在，那么至少你是在人们的心中播下了种子。这样想，他们可能会遇到一个你可能感兴趣的机会，而你希望他们在遇到时能想到你。而让他们知道你感兴趣的唯一方式就是告诉他们。\n\
  \n[`www.it-ebooks.info`](http://www.it-ebooks.info)\n\n![Image 13](img/index-29_1.png)\n\
  \n积极主动。掌控你的职业生涯。主宰你的未来。为你的机会做好准备，让别人感叹：“嘿，他们怎么这么幸运能成为 DBA？”\n\n### 保持专注\n\n很可能需要你相当长的时间才能获得成为\
  \ DBA 的机会。就我而言，从我第一次告诉我的经理我想成为一名 DBA，到我最终在另一家公司得到机会，大约花了五年时间。\n\n在那段时间里，有很多次我可以轻易放弃。但我`知道`我想成为一名\
  \ DBA，所以我坚持了下来，最终迎来了我的重大突破。\n\n对我来说，关键是要定期设想我想要的工作。我越多地开始思考我想要的工作，我就发现自己在白天做了更多此类任务。即使到今天，我也总是在设想我梦想中的工作是什么样子。时不时地，我会后退两大步，审视我的工作日，并意识到我已经在做很多让我充满活力的事情了。\n\
  \n我常想起文斯·隆巴迪的一句名言：“一旦你学会了放弃，它就会变成一种习惯。”如果你想换工作，转型进入一个新的角色，无论是在你现在的公司还是其他地方，你都不能轻易气馁。一切就绪需要时间。你必须相信自己。毕竟，如果你都不相信自己，别人凭什么要相信你？\n\
  \n持续学习，持续写作，持续交流，持续结识新朋友，并时刻紧盯你的目标。继续为你机会的到来做好准备，这样当有人问你“嘿，你怎么这么幸运能成为 DBA？”时，你就能微笑以对。\n\
  \n[`www.it-ebooks.info`](http://www.it-ebooks.info)\n\n![Image 14](img/index-30_1.png)\n\
  \n[`www.it-ebooks.info`](http://www.it-ebooks.info)\n\n![Image 15](img/index-31_1.png)\n\
  \n## 第 2 章：现在我该做什么？\n\n\n\n如今梦想成真，你成为了常驻数据库管理员，首先要做什么？就像世界上任何其他工作一样，你需要开始着手于……嗯……\n\
  \n某些事情，对吧？但具体是什么呢？为了最好地展示你对组织的价值，你应该把精力集中在哪里？知道从哪里开始对你的成功至关重要，本章将帮助你最好地确定如何开始、规划你第一个一百天，甚至决定你应该定期和谁共进午餐。\n\
  \n**提示：** 从现在开始，你将持续通过你的实际成果被评判。\n\n本章中，我们将讨论以下内容：\n\n1.  整理你的初始检查清单\n2.  如何处理你收集到的信息\n\
  3.  应对不熟悉的警报\n4.  如何打破僵局\n5.  合适人选\n\n## 你与总统的共同点\n\n你真的和总统有什么共同点吗？是的。比你可能意识到的要多。首先，你周围大约有一半的人怀疑你是否有资格真正胜任你被赋予的职位。其次，每次你做出决定或规划行动方针时，你都会不断受到批评，即使是来自你的支持者。第三，无论好坏，即使不在你的控制范围内，你都将通过你在最初一百天里取得的成就被评判。\n\
  \n每四年我们选举一位新总统，而在任者总是受到支持率的审视。你也会有自己版本的这个生活现实；它叫做你的年度绩效评估。到了评估的时候，你希望你的支持率尽可能高。\n\
  \n听起来很糟糕？也许吧，但只要你开始时意识到这些事情，其实也没那么糟。对你来说最重要的目标是你初到任时的行动计划。如果你认为你可以出现，端杯咖啡，然后轻松适应新职位，那你就错了。你的那杯咖啡可以等到你开始收集有效开展新工作所需的信息之后再喝。\n\
  \n那么是什么信息呢？先从一些基础信息开始怎么样，例如，你负责哪些服务器？你期望支持哪些应用程序？这些应用程序在一天中的什么时段使用？你的客户是谁？数据库目前是否得到了正确的备份？如果备份失败了，你怎么知道？有这么多项目要检查，很快就会变得非常令人应接不暇。这就是为什么你需要整理一份基本要点的检查清单并开始行动。然后，在你能够掌握所处环境之后，你可以开始制定一些短期改进计划。不知不觉中，你的一百天就会过去，你将能够回顾并看到你在短时间内取得了多大的进展。\n\
  \n相信我，这比听起来容易，你只需要有条理。\n\n## 你的初始检查清单\n\n到现在，你应该已经坐在你的办公桌前，我们将这一天称为第一天。你与人力资源部的初次会面已经结束，你已经参观了办公地点，并且正在确保你拥有至少可以开始工作所需的访问权限。例如，像`电子邮件`这样的东西。哦，还有访问他们期望你管理的数据库服务器的权限。\n\
  \n这是你需要的第一条信息，对吧？*我负责哪些服务器和系统？* 没有这个小小的知识要点，在你开始漫长而缓慢的逆流而上时，将很难取得任何进展。\n\n你的初始检查清单分为几个部分。为什么？嗯，因为我喜欢把事情列成清单，如果可能的话对这些清单进行分类。这有助于我记住全局，而不必担心遗漏任何特定的细节。我鼓励你尝试同样的方法，看看是否对你有帮助，但每个人的组织方式不同，所以如果你想以不同的方式开始你的清单，也不必担心。\n\
  \n现在，这个检查清单有三个主要部分。一个部分涉及收集我简单称之为*你的东西*的信息。另一个部分涉及查找*客户的东西*的信息。你还需要考虑的另一个部分是我称之为*你的行动计划*的东西。这三个领域是你在第一天将开始集中精力的地方：找到你的东西，找到你客户的东西，并开始制定行动计划。因此，一个检查清单示例可能如下所示：\n\
  \n1.  创建服务器列表。\n2.  检查数据库备份是否在运行。\n3.  抽查并验证你是否能从其中一个备份中进行恢复。\n4.  建立客户列表。\n5. \
  \ 列出“最重要”的数据库。\n6.  列出即将到来的交付成果/项目。\n7.  建立环境基线。\n    -   服务器配置检查\n    -   数据库配置检查\n\
  8.  制定你的恢复计划（不是你的备份计划，是你的恢复计划）。\n\n请注意，我的清单遗漏了一些很多人会告诉你是数据库管理员日常必须做的事情。它不包括诸如常规`索引维护`、`性能调优`、审查`事件日志`之类的事情。当然，所有这些事情都是必要的，但我们仍然在你的第一天待办事项清单上。到目前为止我提到的所有事情都需要你花费不止几天的时间来收集。如果你在第一天就忙于解决某个`存储过程`的问题，那么一旦灾难来临而你还来不及记录恢复计划，你就是在为自己的重大失败铺路。\n\
  \n你是更愿意因为告诉那个开发人员停止写`游标`而成为英雄，还是更愿意因为告诉客户你能在 30 分钟内让他们的数据库恢复运行而成为英雄？我知道在刚接手一个新职位后不久，我会选择哪一个。\n\
  \n**提示：** 所有这些任务都需要超过一天的时间来执行，但不要拖延开始整理这份检查清单。\n\n在第一天，向你的经理解释你将首先收集这些清单数据。通过主动先进行尽职调查，你向他们表明你的首要任务是保护他们的数据、你的工作以及他们的工作。他们可能无法为你提供这份清单，而且他们甚至比你更需要它。你稍后会有足够的时间处理其他事情，随着你为企业带来标准化，这些事情会自然地融入到你的环境基线和后续行动计划中。\n\
  \n### 一个 OSHA 时刻\n**作者：布伦特·奥扎**\n\n在一家公司，当我为我头两周制定这个计划时，我的老板大声说：“天呐！我们其他服务器也没有这些信息。”\
  \ 然后他把他的系统管理员叫进来，告诉他们放下手头正在做的事情，去做和我一样的事情——但针对文件服务器、Exchange 服务器等。\n\n让我们来看看为什么检查清单中的每一项都很重要，以及为什么需要从第一天就开始处理。如果今天是你的第一天，你现在就想开始这些任务。\n\
  \n### 创建服务器列表\n\n\n\n"
- '# 第二章：现在我该做什么？


  我觉得这章的内容其实不言自明，但你最好先搞清楚自己到底需要管理什么。很可能你最初列出的清单并不完整，但它能立刻为你提供一个参考基准。相信我，总会有那么一刻，某个人会走到你面前，谈论一台你闻所未闻的服务器。而且他们会非常困惑，为什么你竟然没听说过，因为他们天天都在用它，上面有个数据库，而你作为**DBA**（数据库管理员）理应知晓。


  尽你所能，尽快收集尽可能多的信息。这样你就能更清楚自己将要面对什么，这也能帮助你在制定行动计划时有的放矢——你的行动计划会根据需要照看的是五台还是五百台实例而大不相同。


  我知道你在问自己什么。你在问：“我怎么才能弄清楚我到底负责什么呢？” 我建议你从你的直属上司开始，然后顺藤摸瓜。


  这条线索可能会把你引向应用管理员和服务器管理员。例如，你的上司可能会说你负责“工资单数据库”。但什么是“工资单数据库”呢？你可能需要抓住这最初的线索，做一些侦探工作，找出具体的数据库。在这个过程中，你会对你即将入职的新环境的复杂性有一个概览。任何你不得不做的侦探工作，都会极大地加深你对自己工作环境的了解和认识。


  如果你在寻找一种技术方法来查找数据库，有几种方式可以实现。最简单的方法之一是使用 `SQLCMD` 工具加上 `–L` 参数，来返回网络上正在广播的数据库服务器列表。不过，由于有些服务器可能无法通过该工具被发现，因此在整理清单时，最好还是多方打听一下。


  那么，你把这份清单保存在哪里呢？我喜欢把很多笔记写在一个笔记本上。我说的“笔记本”不是指电脑，而是指一本我能拿在手里的、实实在在的纸质本子。其他人则更喜欢把所有东西都放进
  Word 文档并储存在电脑里。纸质笔记本对我来说最管用，因为我发现我通过手写比通过打字学得更好。用笔写下的东西，比用键盘敲出来的东西更让我印象深刻。


  还有一点要提的是，列出一份你**不**负责的服务器清单也很重要。在你的环境中，很可能有些系统是完全由供应商维护的。如果其中某台服务器出了问题，明确谁该负责什么至关重要。如果有人告诉你某台服务器你无需担心，我的建议是：让他白纸黑字写下来。


  相信我，当灾难降临时，你最好能提供证据，证明哪些系统是你的责任范围。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 19](img/index-35_1.png)


  ### 检查数据库备份


  既然你已经知道哪些服务器由你负责，那么你接下来要问的问题最好是：“备份都在正常运行吗？” 不要假设一切完美无缺。要亲自深入细节，核实每个实例都在进行备份。哦，这包括系统数据库（`master`、`model`、`msdb`）以及所有用户数据库。检查备份文件是否存在，它们存储的目录所在磁盘是否有足够的空间，以及最近是否有过任何备份失败的情况。


  你还需要记录下服务器和数据库的备份计划。之后你可以利用这些信息来验证数据库的备份是否满足业务要求。你肯定不希望发现，业务部门期望某个数据库具备时间点恢复能力，而该数据库却仅仅每周才备份一次。


  这一点我再怎么强调都不为过，但如果说作为**DBA**只有一件事需要你重点关注，那就是确保在灾难发生时你能够进行恢复。而任何良好的恢复计划，都始于一个可靠的数据库备份策略。


  [www.it-ebooks.info](http://www.it-ebooks.info)


  ![图片 20](img/index-36_1.png)


  ## 验证你能够恢复


  我时不时会抽查我的备份，尝试进行一些恢复操作。对我来说，我喜欢尝试在同一台服务器上进行恢复，也喜欢尝试恢复到一个不同的实例。请注意，这不同于仅仅还原文件头来验证文件是否可读。不，先生，我想恢复整个数据库——这只是我的个人偏好。我通常没有时间去验证每一个备份文件，也不会尝试这样做。我只是想从几台服务器上各选取几个备份文件，确保没有问题。


  现在，我在上一段提到了“同一服务器恢复”，我想非常明确地说明一点：


  *在生产服务器上执行同一服务器恢复操作时务必谨慎。*


  好了，现在我感觉好多了。只有当你确信安全时，才应该进行同一服务器恢复。你怎么知道是否安全呢？嗯，你总可以问别人。或者你可以看看当前是否有人连接到该实例。又或者，如果你的数据库相当小且易于管理，恢复操作最多只需要几分钟，那应该是安全的。当然，如果那是一台非生产服务器，你就可以更放心些了。





  '
- '# 第二章：现在我该做什么？


  你应该重点验证哪些数据库的可恢复性？你的工作重心几乎可以放在任何一组或一套数据库上。这里真正的目标是让你熟悉新工作环境中的恢复流程，并验证备份是否可用。在对任何重要系统进行深入探查之前，请务必全面了解你所在机构的恢复流程。这可能会在日后为你避免一些尴尬——比如你拉响警报说某个备份无效，结果发现无效的只是你对工作流程的理解。


  `提示：` 练习恢复操作的另一个绝佳理由是，当你连续熬了三个通宵后，凌晨三点接到求助电话时，你能够执行恢复操作。那时你会很疲惫，思维不会清晰。你之前的练习将成为大脑的“肌肉记忆”。熟能生巧，让你在压力和疲劳下也能做出正确的操作。


  ## 建立客户名单


  如果你清楚自己负责哪些服务器，那么就开始询问每台服务器的客户是谁。请注意，这种调查可能会产生一份非常长的名单。对于共享系统，你可能会发现每个人都与每台服务器有部分关联。


  掌握客户名单至关重要。例如，当需要重启某台服务器时，知道该联系谁来解释服务器将离线五分钟进行重启，是一件好事。在编制客户名单时，了解谁是公司高管以及他们最依赖哪些服务器，也并无坏处。


  当你开始列出客户时，也应该开始询问这些客户使用的应用和系统，以及他们使用这些系统最频繁的时间段。你可能会惊讶地发现，一些人们认为相对次要的系统被全天使用，而另一些被认为最重要的系统却只每月使用一次。


  建立这份名单还有一个额外好处：你获得了与客户建立关系的机会。很可能，他们会对你的主动关心感到荣幸。整理名单给了你一个联系客户的理由。不妨将其视为破冰之举——一个让双方会面的轻松借口。


  `不常使用的数据库也可能至关重要`


  *作者：肯·西蒙斯*


  汤姆关于时间段的评论让我回想起过去管理数据仓库的日子。我们有一个数据库，一个月内有三周可以处于离线状态，而且没人会注意到。这是一个具有特定用途的关键数据库。只是其工作负载恰好导致它一个月内有三周不被使用。但在第一周，它确实被使用。在第一周，它最好能
  24/7 全天候运行。在剩下的几周里，它是否在线就不那么重要了。寓意是什么？不要假设某事物的使用频率与其真正的重要性之间存在必然关联。


  ### 列出“最重要”的数据库


  在收集重要客户名单的同时，更进一步，找出他们最重要的数据库是什么。这可以通过 (1) 直接询问他们，或 (2) 询问其他人，然后 (3) 对比这些名单来完成。你可能会非常惊讶地发现它们并不匹配。你还会更惊讶地发现，有多少人会忘记自己的某些系统，需要温和的提醒才能记起它们的重要性。作为数据库管理员，我们同等对待所有数据库，但我们承认，某些数据库确实比其他数据库更重要，尤其是在特定的时间段、周或月。


  例如，你可能有一个关键任务数据仓库。公司里的每个人都会告诉你这个系统至关重要。然而，他们无法告诉你的是，它一个月只使用三天。因此，这个数据库可能离线 21 天，也不会有人提出异议。


  另一个例子是交易平台。这个系统可能在每个工作日被密集使用九到十个小时。但在一天剩下的时间里，它完全不被使用。这是否意味着当这些系统不被使用时，它们就不重要了？不，不是这样。这确实意味着你正在收集关于这些系统的更多细节。如果有十七个不同的团队提到某个微小的数据库，但他们认为其重要性较低，你反而可以认为它非常重要，因为它被如此多不同的人员所触及。


  这里的另一个因素是可恢复性。如果业务要求你能够将数据库恢复到某个时间点，那么你也应该将此数据库视为重要数据库，即使那位客户就坐在你对面说“它没那么重要”。我已经记不清有多少次，客户随口告诉我“这个系统真的没什么大不了的——我们需要在五分钟内恢复，而且我们整天都在用它，但你不必担心它。”是的，说得对。当然，直到灾难发生，而你必须负责快速地将一切恢复原状！


  ### 列出即将进行的项目和可交付成果


  如果周围有人能帮你了解当前和即将进行的项目，那将有助于你知晓即将落到你头上的任务。你想尽量减少等待你的意外；了解当前规划的项目有助于你理解将为每个项目分配多少时间。并且请记住，除了项目支持和你即将开始编制的行动任务外，你还被期望维持一定水平的生产支持。


  你还想知道哪些服务器将在不久的将来被停用，这样你就不会浪费时间去对那些“濒死”的服务器进行性能调优。也请留意这个角度。


  ### 建立环境基线


  为你的环境建立基线是一项经常被忽视的功能。拥有一个记录在案的起始点的重要性再怎么强调也不为过。没有一个起始点作为参考，你将很难绘制和报告随时间推移所取得的进展。


  收集你所管理服务器的基线信息的想法，简单来说就是找出你与理想状态之间存在多少偏差。你已经完成了一项基线项目——你已经评估了数据库备份。由于这个检查清单项目很快就会变得有点繁琐，请尽量专注于基础项目。


  例如，在一个具有直连存储的独立数据库服务器上，你的数据文件应该与日志文件存放在不同的驱动器上。有多少台服务器拥有相同的配置？那些磁盘驱动器呢？是否有标准的 RAID
  配置？（你可能会惊讶地发现，服务器在物理构建上并非总是一样的。）实例的内存设置或处理器数量如何？数据文件和日志文件有多大，平均 CPU 利用率是多少？


  专注于几个关键项目来收集作为你的基线信息，并持续保存这些信息。你可以根据需要随时间推移添加额外的项目。




  '
- '# 第二章：现在该做什么？


  ## 你已获得信息，接下来呢？


  到目前为止讨论的所有内容，至少应该能让你忙到第一天午餐时间。好吧，也许你需要几天时间才能收集齐清单上的所有信息。你可能已经掌握了其中的大部分信息，也可能没有，因此收集所有资料所需的时间将取决于你所在单位特定部门的当前结构。（顺便说一句，习惯听到和说“视情况而定”吧；关于这一点后面还会详述。）不必担心，因为你可以在继续收集数据的同时，过渡到下一个阶段。


  我还要建议你简化收集这些信息的方式。例如，如果你有一百台服务器，你肯定不想远程连接到每一台上去检查各自的内存设置。你需要学习如何高效地收集信息，其中很多可以使用像
  `System Center Configuration Manager (SCCM)` 和 `Operations Manager` 这样的工具来收集。如果你的环境没有这些工具，那么你可能需要使用
  `PowerShell`、`T-SQL` 或其他替代方案来编写基线查询脚本。


  或者，你可以使用 `SQL 2008` 中一个定义的中央管理服务器，同时对多个实例运行查询。你也可以考虑使用基于策略的管理来报告并可能强制执行配置选项。无论你选择哪种方法，目标始终如一：跟踪随时间发生的变化。一旦你捕获了环境当前状态的快照，你就可以开始记录如何在出现问题时将服务器恢复到原始状态。


  ### 制定你的恢复计划


  注意我说的是“恢复计划”而不是“备份计划”。到目前为止在你的清单中，你已经确认了数据库备份正在运行，开始抽查以确保你能从备份中恢复，并大致了解了你的重要数据库。现在是时候将所有这些整合成一个灾难恢复（DR）计划了。对于每一个被列为重要的数据库，你都应该写下灾难发生时恢复所需的具体步骤。


  请务必认清这一点：如果灾难发生，你的工作将岌岌可危。如果你因为准备不足而恢复失败，那么到下周末之前，你很可能就会被调去负责“特殊项目”。避免这种情况发生的最佳方法就是练习、练习、再练习。你的业务可能每年会安排一些
  DR 测试，但这不应阻止你自己更频繁地进行小规模 DR 测试。


  记录每个系统以及恢复所需的所有步骤。数据库是否处于 `完整恢复` 模式？你多久进行一次事务日志备份？写下备份时间表，以便清楚恢复点在哪里。如果你的客户期望恢复到分钟级别，而你处于
  `简单` 模式，那你就真的要面临灾难了。


  别忘了从过去几天或几周恢复的情况。如果你的客户需要恢复两个月前的数据库备份，请确保你知道完成该工作的每一个步骤。如果你公司使用异地磁带存储服务，并且需要两天时间才能从异地取回磁带，那么你必须作为
  DR 计划的一部分提前将这一事实告知你的用户。


  ### 与你的经理会面


  在收集数据的同时，你应该与你的经理会面，讨论你的初步发现，并共同确定需要完成工作的优先级。如果你发现一台服务器没有运行任何备份，或者备份失败，那么这台服务器必须优先处理。我不在乎你哪个“最重要”的客户在第一天就冲你大喊大叫，要你修复他们写的、填满了
  70GB 日志驱动器的查询，你*必须*确保自己能够从灾难中恢复。


  继续与你的经理一起审查你的清单，确定哪些项目需要完成，哪些项目需要最多的资源和精力，以及哪些项目可以暂时搁置。在开始工作之前，你和你的新经理就任务及其优先级达成一致非常重要。这将对你们双方都大有裨益；它让你从现在开始有据可依。


  然而，如果你和你的经理在优先级上存在分歧，请确保记录在案。当有人过来询问为什么某件具体的事情还没做时，这将对你大有帮助，你可以礼貌地解释你一直在忙于其他事情。然后，如果仍然存在分歧，你、另一个人以及你的老板可以一起重新评估你的优先级。


  **提示：** 记录下来，但不要为了对抗。不要拿老板的旧邮件当头棒喝。相反，把它们当作温和的提醒，表明你正致力于完成老板定下的优先事项。你的老板会欣赏你为他的优先事项付出努力。


  与你的经理会面后，你将不断受到衡量。每个人都会因为这样或那样的事情需要你。你与他人的每一次互动都将构成一种衡量形式，并通过你采取行动所产生的有形成果来验证。如果你有那份清单，并且你的经理知道这份清单，那么从第一天起，你就有具体的东西可以交付了。


  想想这对你有多重要。三四周后，某个地方的某个人会问你的经理，新来的 DBA 工作情况如何。你的经理将能够迅速肯定你一直所做的出色工作（我们就假设你工作出色，而不是整天无所事事）。你将能够轻松跟踪自己的进展，最终你可以准备一份简要的总结或演示文稿，详细说明你在最初几个月的工作进展。


  ### 与开发人员会面


  如果你公司有内部开发团队，花点时间去见见他们，认识一下。在未来的几个月里，他们将成为你成功与否的最关键因素。


  了解他们正在做什么项目，目前遇到了哪些障碍，看看是否有你能提供协助的机会。


  毫无疑问，开发人员会让你非常忙碌。开发人员将是那些试图利用现有技术挑战极限的人。最终结果将是为你提供大量可以利用的“培训机会”。填满了事务日志？让我来了解一下你原本想做什么。整个日志驱动器都满了？你的远程查询性能很差？你那有
  27 个嵌套游标的存储过程运行时间太长？来，让我帮你处理，也许我们可以找到更好的方法来完成工作。


  每个开发人员都想成为你的朋友吗？绝对不是——很难找到一个地方所有人任何时候都相处融洽。如果你遇到一个自认为比房间里所有人都懂得多的开发人员，你可以坐在那里偷笑，因为你早就知道
  DBA 才是最聪明的，否则也不会整天被叫去解决他们的问题了。


  ### 与服务器管理员会面



