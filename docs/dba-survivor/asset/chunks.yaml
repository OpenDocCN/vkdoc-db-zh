- fmt: '# 音乐家需要懂的远不止声学，雕塑家需要懂的也远不止地质学。从事创造性艺术的人们都是创造者，而选择 DBA 之路，你也将成为其中一员。我们可以从这些创造者身上学到极其重要的一课：他们主要通过两种方式学习。首先，创造者通过持续练习和动手实践来学习。要想真正擅长数据库管理，你也必须这样做。当你想到“发明家”的形象时，你可能会联想到一个头发凌乱、穿着白大褂、身处忙乱实验室的人。猜猜怎么着？我认识的所有优秀
    DBA 确实都有一个实验室，通常被称为开发环境。那就是他们经常捣鼓、实验和测试的地方。


    我将 DBA 与其他创造者相比的第二个，也是最重要的相似之处是：他们至少需要一位优秀的导师来开启职业生涯。每一位创造者的学习过程，都包括在比他们更资深的人面前学习多年，无论他们是艺术家、音乐家，还是
    DBA。这正是本书发挥作用的地方。你身边可能没有资深 DBA 可以依靠以获取建议和灵感，但本书就是你的导师。正如快速回顾本书目录所揭示的，对于一位新的数据库管理员来说，许多基础课程都涉及你如何与企业
    IT 环境中的其他人互动。是的，了解技术非常重要，通过阅读本书并应用其中的课程，你将学到大量技术知识。然而，你还将学习 DBA 与软件开发人员和企业经理之间的关系——哪些领域你需要谨慎，哪些领域你需要坚持己见。


    当然，没有任何一本书能教你关于像 Microsoft SQL Server 数据库管理这样广阔而深远的学科所需的一切知识。因此，Tom 花费心血为你展示了第一步。他提供了进一步学习的资源、寻找导师的方法，以及——当时机成熟时——让你自己成为导师的途径。我恳请你要充分利用这本好书，并在准备好时，将你学到的经验教训回馈给
    SQL Server 社区。


    **Kevin Kline**


    *技术策略经理，Quest Software*


    *PASS（SQL Server 专业协会）创始董事会成员*


    以非常“真实”的语言来说，你手中握着的这本书将帮助你理解数据库管理员的日常生活。从如何成为一名数据库管理员，到备份与恢复，当然，还有培根带来的乐趣——尽在其中。（好吧，关于最后一句话得说明一下。Thomas
    很喜欢培根。非常喜欢。事实上，他认为几乎任何东西加了培根都会更好，所以你可以预料到在他写的任何书里，都会提到一两次培根。）除了培根信息，Thomas 还分享了他在数据库系统方面的现实世界经验。你将学习如何在开发团队中工作，以及不要惧怕外包。你将了解如何维护生产系统，以及如何监控所管理的系统。


    Thomas 甚至解释了如何利用 SQL Server 社区来帮助你，以及你如何回馈他们。


    所以，如果你有一两个晚上空闲，正在考虑成为一名 DBA，欢迎加入。你将有一段美好的体验。


    **Buck Woody**


    *高级技术专家，Microsoft*


