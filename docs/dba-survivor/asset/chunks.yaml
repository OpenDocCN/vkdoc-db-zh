    ## Dear Reader,


    I wrote this book to help you succeed as a database administrator. Database administra-or

    tion is tough and crazy job. I learned the hard way—by experience—and often wished
    for a book to help me understand all I needed to know in order to be successful.
    I dreamed of a book that would tell me what to do on day one, how to get myself
    organized, where I

    :

    should focus my efforts, who to go to for help, and how to take the best care
    of not only my

    **servers, but myself as well.**


    Become a R

    The book I dreamed of didn’t exist, so I set about to create one. You hold in
    your hands the end result. Read this book and you’ll learn:


    - Where you should spend your energy in your first 100 days

    - Basics of technologies such as `RAID` that you need to be familiar with

    - To effectively build and maintain relationships with coworkers

    - To build a process by which to offer quality production support

    - How best to connect, learn, and share with others


    ock S

    I explain what to do on your first day. I cover the basics of your role and how
    you will

    DBA Survivor

    need to interact with others. I offer some guidelines for basic troubleshooting,
    some understanding for why developers are so needy, and help point you in the
    right direction for additional training.


    tar DBA

    In the end I want you to understand that no DBA is an island; if you want to have
    a successful career in database administration, then you will need help from time
    to time. This book is the first piece of help for you to take.


    Become a Rock Star DBA


    Thomas LaRock

