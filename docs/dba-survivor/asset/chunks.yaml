    我认同关注卡路里是件好事。如果你想实现整体减重，那么有两件事需要牢记：减少热量摄入和提高活动水平。我们之前已经讨论过一些逐步提升活动水平的方法。想象一下，如果你开始关注卡路里摄入，将会获得怎样的益处。有些人甚至提出，长寿的秘诀之一就是减少卡路里摄入。


    ### 生活很美好，但有了培根会更好


    我在 IT 部门工作。工作时间可能很紧张，工作通常不遵循严格的日程安排，而且需要我周末加班。女儿出生后，我决定在接下来的 18 年里坚持举重训练，这样万一她开始和橄榄球队的男生约会，我也能做好准备。儿子出生后，我意识到我可以停止举重，转而训练他。但另一个目标浮现在我的脑海中：那就是能够和孩子们在院子里玩耍，而且（1）不会气喘吁吁，（2）不会冒着心脏病发作的风险，无论我吃了多少培根。


    过去几年里，我一直在为实现这个目标而努力。我开始慢跑，开始注意饮食的量和内容，并真正努力实现最佳的工作与生活平衡。现在我能和孩子们踢足球，在他们骑自行车时追逐他们，就在后院里享受快乐时光。每一天都像是父亲节。别提因为营养不良而提前结束职业生涯——我可不想我的*生命*被缩短。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    `Image 137`


    ### 第七章：自助餐厅在哪里？


    **129**


    想象这样一个场景：你早上醒来，为上班做好准备，然后开车去上班。你在家里不吃早餐，因为大多数早晨你都会和同事一起买一杯加奶油和糖的咖啡（还有一些咖啡）。不幸的是，今早的交通异常拥堵，你花了太长时间才到达办公室。


    你糟糕的营养选择导致你感到头晕目眩，于是你失去了对汽车的控制，冲进了路边的沟里。后来你才知道，在急诊室里用骨折的手臂管理服务器是多么困难。


    这就是为什么我总是在手套箱里放一个额外的甜甜圈。


    如果你认为上述场景不可能发生，那么试试这个：你坐在办公桌前，吃完从街边那家泰国餐馆点的超大份芝麻鸡晚餐，你认为它比中餐健康，但其实都一样。午餐后大约一小时，你就像感恩节又来了一样睡着了，最后口水流了一桌子。你的老板路过，用他的黑莓手机迅速拍了张照片。你对此毫不知情，直到下次绩效评估时他给你看照片，然后说：“那么……关于今年你拿不到的加薪。”


    也许你不是那种大餐后会睡着的人。至少，你记得不是这样，对吧？好吧，让我们再试一个：你稳定的饮食中只含有极少量的绿叶蔬菜，这导致你血液中的铁含量低到足以让你贫血。一天早上，你在电梯里上楼去办公室时，突然流鼻血了。你试图止血，但你的血液凝固得没有那么快。电梯门开了，你的老板就站在那里，你的血流到了他的鞋子上，把电梯和办公室地板弄得像犯罪现场。


    仍然认为这些场景不可能？嗯，它们完全可能。许多人由于营养不良导致的铁缺乏，要么已经贫血，要么处于贫血边缘。


    人们在大餐后会睡着。很多司机会失去注意力；虽然无法确切知道有多少事故是由低血糖引起的，但我敢打赌，有很多事故是因此造成的。


    我知道在工作日程和个人日程之间取得完美平衡可能很困难。而且你常常会发现自己把工作当作借口，回避为自己留出时间。但你需要为自己腾出时间，其中一个方法就是关注你吃的东西。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    `Image 138`


    **130**


    ### 第七章：自助餐厅在哪里？


    抽出时间！


    **作者：Jonathan Gennick**


    抽出时间是如此重要。如果你放任不管，工作会吞噬你。如果我们能更直接地感受到后果，照顾自己就会更容易些。想象一下，如果你的老板对你说：“你愿意为了创建那个新数据库而加班到很晚，然后心脏病发作吗？”哇！拒绝这个请求会很容易。困难的是，每次牺牲都如此微小，如此渐进。照顾自己需要从非常长远的角度来看待。


    关注饮食的最简单方法之一是通过写在纸上来记录。如果纸笔对你来说太原始了，你总可以为你的 iPhone 下载一个应用程序，让你记录餐食并计算卡路里。


    写下或追踪你的饮食也将帮助你注意或消除零食习惯。下午三四点的一包薯片和一罐苏打水，每天给你的饮食增加了 350 卡路里的“空热量”。一磅体脂肪大约含有 3500
    卡路里。一个月有 20 个工作日，这相当于每月增加 2 磅体脂肪，或每年增加 20 磅体脂肪。如果你认为有人每天以薯片和苏打水作为零食是不合理的，那就权当每周一次，那么
    20 磅体脂肪将在五年内累积起来。


    相信我，五年过得很快。体重会增加得很慢，但它确实会增加。尽管体重需要数年时间才会上升，许多人却认为他们可以在几周内减掉所有体重。结果，他们对日常习惯中任何不能立即见效的改变感到沮丧。


    关键在于，你需要开始把自己放在首位；别再找借口，开始为你的健康负责，就好像你的生命取决于它一样——*因为它确实如此*。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    `Image 139`


    **131**


    ### 第八章


    ### 培训，你也来点吧


    停下片刻，反思一下你已经走了多远。你想成为一名 DBA，你找到了机会，你与同事建立了关系，目前你正有效地掌管着这艘船。一路走来，你注意到环境的某些方面会随着时间而改变。其中一个变化当然是
    SQL Server 的新版本。即使只是给 SQL Server 应用一个热修复补丁，也可能给你带来意想不到的学习机会。


    许多人根本不认为培训是他们 DBA 生涯的重要组成部分。如果你想作为一名 DBA 生存下去，那么你需要能够快速适应不断变化的情况。你需要了解即将出现的想法和概念。简而言之，你需要培训，而且培训是一个永不停止的持续职能。


    **提示：** 培训是教育与动力的交汇点。


    当形势艰难时，培训预算往往是首批被削减资金的项目之一。这可能使你很难说服管理层让你离开一两天以保持技能敏锐。你必须找到一种方法，提出一个无可辩驳的商业案例；让他们理解这将带来可观的投资回报。

