- fmt: '# CHAPTER 4: A Development Server Is a Production Server to a Developer


    ## Scenario one


    A developer needs to have the latest production backup restored down to the development
    server. They send an e-mail to the `DBA` with the details, and the `DBA` responds
    back saying they will perform the restore. An hour goes by and the developer gets
    impatient because they haven’t heard back, and after all, *it’s just a database
    restore—how long should that take?* So the developer sends another e-mail to the
    `DBA` asking how much longer. The `DBA` responds and says that there is not enough
    space on the development server to restore the production database, so they have
    contacted a member of the server team to see if the drive can be expanded, and
    they haven’t heard back from them yet. The developer is very frustrated upon hearing
    this and wants to know if there are any other options to have this done quickly
    *because they are trying to resolve a production issue.* Now, the initial request
    was for a restore from production to development, nothing more. Such a request
    would have a defined `SLA` of perhaps one business day. So the `DBA` is performing
    his tasks well, trying to solve the issue within the defined time frame. However,
    the developer is clearly expecting a different turnaround time and thus became
    frustrated. Likewise, the business end users, management, and just about everyone
    that can spell `DBA` is now displeased with the level of service from the `DBA`s.


    ## Scenario two


    A developer needs to have the latest production backup restored down to the development
    server. They send an e-mail to the `DBA` with the details, and the `DBA` responds
    back saying they will perform the restore. The `DBA` determines that there is
    not enough space to perform the restore and sends an e-mail back to the developer
    to inform them about the issue, that they are contacting the server team to ask
    for more space, and that once the space is added the restore itself will take
    about 3 hours given the size of the current production database. The developer
    then informs the `DBA` that this is more than just a routine restore and asks
    if there is any other option at this point. The `DBA` responds back that the `test
    server` has enough space and they could start the restore there after taking a
    backup of the current test database. The developer agrees and a minimal amount
    of time is lost.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 72](index-88_1.png)


    **70**


    Now, which scenario looks better to you, and why?


    For me, I like scenario two, because it demonstrates how some extra communication
    can improve the service you provide to your customers. The piece of communication
    that is entirely in your control is your initial response to the person making
    the request. I like to provide them an estimate as to how long it will take for
    you to complete your work. You do not need to be exact, but you do need to give
    a rough idea. Will it take 30 minutes? An hour? Two hours? A day? This way the
    requestor has an idea as to what point they should send a follow up e-mail should
    the task not be completed; plus they can then in turn communicate the progress
    to their customer as well.


    The other piece of communication is nothing you control, and that is the initial
    request. Ideally the request would have all the necessary details, including the
    fact that they are trying to troubleshoot a production issue. Unfortunately that
    is not always going to be the case. As such, you may need to solicit some additional
    details from the requestor—but how are you to know which details are the important
    ones for you to know right now? You don’t, so you focus on the things you can
    control, and respond with the details on the actions you are going to take. That
    way you give the requestor the opportunity to review your actions and the timeline
    (the timeline is all they really care about, by the way). And if the timeline
    is not adequate, then they have the opportunity to make that known.


    **TIP:** Giving people the ability to review your progress helps them share in
    the responsibility should events turn for the worse.


    I can never stress the importance of communication enough. In fact, I often use
    some example from my former life as a basketball coach to stress how well communication
    works. When my team took the floor, I always reminded them about the necessity
    of talking to each other while playing defense. We could be winning by twenty
    points and I would still remind them that they needed to be talking more. Teams
    that talk on defense are more engaged and more energized. It can be demoralizing
    to an offense to have to hear about how the defenders know exactly what play is
    about to be run. Just by the simple act of talking you can accomplish so much
    more than by remaining silent.


    That respect for the power of communication is something I carry with me to corporate
    life as well. More communication is always better than no communication.


    ## Managing Expectations


    If you have well-defined `SLA`s in place, then it is easier to manage expectations,
    right? Wrong. Just because you have a defined `SLA`s in place *does not* mean
    people will stop expecting you to have everything done yesterday. If someone requests
    a database restore and you get it done in 30 minutes, then that person is going
    to expect that same turnaround time for each subsequent request. A few days later
    you may be asked to do it again, and it will take 45 minutes because the volume
    of data is greater. But the customer may now expect it in 30 minutes, and will
    think you are performing your job poorly as compared to the other times.


    How do you manage that expectation? Do you communicate every action (e.g., “I’ll
    start it now, and e-mail when done.”)? Do you configure and build a process to
    automagically send an e-mail when the task is complete? No matter what you decide,
    the key point to remember is consistency. Hopefully you will have a good customer;
    one that is professional enough to ask if there was any issue as to why it took
    15 minutes longer today. If you are unlucky, then you will have someone just accuse
    you of being incompetent or unwilling to help when they needed you.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 73](index-89_1.png)


    **71**


    ## No One Cares About Effort


    Better you hear this now from me than later during a performance review. The only
    thing that truly matters to your customers is the end result; they do not care
    what it takes to get there. On their end they make what they believe to be a simple
    request. On your end you may have to spend hours getting it done, miss dinner
    with your family, or cancel your weekend plans.


    And no one cares about inconvenience, either. If there is the need to deploy some
    changes to production on a Saturday, and you do not get an e-mail until Friday
    afternoon at 5:00 p.m. that you are needed to work tomorrow, no one will care
    to hear about how you have already made plans. It just does not matter; you are
    expected to provide support at all times no matter what amount of notice you are
    given.


    And there are going to be times when you are asked to come into the office on
    a weekend just because you *might* be needed to do something. Remember, no one
    cares about effort or inconvenience. What they do care about are results and perception.
    The fact that you may sit in your cube for 8 hours on a Saturday and end up doing
    nothing is better than doing nothing without being seen. And everyone will tell
    you that they understand it makes no sense to be asked to sit there all day and
    do nothing, but you have to do it anyway.


    So, what are some things you can do to better manage the expectations that others
    will have of you as a `DBA`?


    ## Let’s Talk


    Pure and simple, nothing beats sitting down and talking with someone. The more
    people get to know you, the more they will get to understand what it is you actually
    do for work.'
