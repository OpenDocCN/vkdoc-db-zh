- fmt: '# CHAPTER 8: Training, Get You Some of That


    There is little question that there are lots of benefits to the employees that
    are receiving the training. You get to increase your skill set, make new contacts,
    expand your network, and essentially increase your value to the company, because
    no company wants to lose an employee that they invest training dollars on.


    There are a lot of other benefits that employees receive through training that
    many people do not consider because they are focused only on the short term. But
    when looking at the larger picture, you can start to see a host of ancillary benefits.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 143](index-153_1.png)


    ## Job Satisfaction


    When you are involved in a training program, it can energize you and give you
    some confidence in your abilities, which then boils over into your overall job
    satisfaction. You become more confident in your daily duties as a result of training.
    Better yet, your training allows you to take on new responsibilities. While most
    people enjoy some routine in their lives, they also enjoy a dose of variety. As
    you gain confidence, you enjoy your job more, leading to increased job satisfaction.


    ## Employee Motivation


    Training can lead to an increase in your motivation. In addition to the confidence
    and increase in job satisfaction, you will often find yourself motivated to do
    more. That extra bit of training may be the difference between having employees
    that are just punching the clock to having employees that come in early and stay
    a little late.


    ## Process Efficiencies


    Probably one of the least obvious employee training benefits is the increase in
    efficiency that can result. An employee could find ways to take a 30-minute task
    down to a 5-minute task. As a DBA you may find ways to performance tune queries
    that can cut your tuning time from days to hours. That saves time, and we all
    know that time is money, right?


    Think about some of the recent tools at your disposal for administration. `PowerShell`,
    `Operations Manager`, and `Policy-Based Management`. Each one is still fairly
    new, and each one is designed to improve your efficiency at being a `DBA`. With
    some training, you will be able to discover new ways to do some of your current
    tasks with a method that is easier to maintain.


    ## Time Management


    When you become more efficient, you start to save time. What you also get is the
    ability to better manage your time. How many times have you been expected to drop
    everything and respond to a critical issue? Then, after responding, you do your
    best to dissect the problem and are then badgered for constant updates: “How much
    longer before you fix the problem?”


    With training, those issues take less time to resolve, giving you the ability
    to effectively manage critical issues and continue to get your regular work done.
    In short, you have the ability to manage your time better.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 144](index-154_1.png)


    ## Communication Skills


    Even if you are not attending a class designed to work on communication (or “soft”)
    skills, you can see an increase in those skills regardless. Through training you
    get the opportunity to interact with others in an environment outside of the office.
    After the training is complete and you start applying your new skills to your
    current position, you will then start having the opportunity to be interacting
    with different people inside your office.


    **TIP:** Your communication skills will improve in time, but only if you look
    to improve upon them. This can be done be simply reviewing prior conversations
    and seeing if you could have done something better.


    In most cases your training will give you the opportunity to share your new skills
    with others in your office, particularly with other team members. This is certainly
    a chance to improve upon your soft skills—a chance you may not been given without
    having been offered the training to begin with.


    ## Business Benefits


    Despite knowing that training has benefits for employees, some companies do not
    invest as much time and energy into training their employees as they should. One
    reason for this is that the company does not fully understand the benefits of
    training their employees. If you are able to learn, understand, and communicate
    the benefits effectively, then you have a chance at convincing your company to
    help defray some (or possibly all) of the hard dollar costs.


    Everyone needs training, regardless of their level of experience. Everyone has
    room for improvement. The improvement could be something dramatic, such as going
    from being a novice to someone highly skilled. Or it could be that someone who
    is highly skilled wants to hone those skills even further in order to stay ahead
    of the competition, such as an Olympic athlete.


    The truth is that training offers not only employee benefits but business benefits.
    Companies should understand and recognize that having an ongoing training structure
    in place is a necessary part of their business.


    When it comes to training programs, most people tend to think that the only person
    receiving a benefit is the person receiving the training. While it is true that
    the employee is getting a direct benefit, it is also true that the employer also
    receives a benefit. Some of these benefits we have already seen, such as the increase
    in customer satisfaction that is brought about by providing better customer service.
    Or the increase in productivity that results from increased efficiency. But there
    are a handful of other benefits to the business that can be directly attributed
    to training.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 145](index-155_1.png)


    ### Improved Morale


    We already saw that training can lead to an increase in job satisfaction. And
    employees who feel satisfied in their jobs are vital to ensuring that office morale
    stays high. It may not be practical to train everyone, so the IT manager is going
    to have to find a way to justify and rotate the training needs of the department.
    When done correctly, training can have dramatic effects on office morale.


    ### Reduced Turnover


    Employees who feel satisfied by their jobs are less likely to leave. Employee
    retention is important for two reasons. First, you want consistency in your ability
    to support the business. Second, you do not want to go through the time and expense
    to find new employees. Given the choice between spending tens of thousands of
    dollars to find new employees or offering some training, it would be cheaper if
    your company offered some periodic training.


    ### Reduced Risk


    Training can be effective in the reduction of risk. The risk in question can vary;
    it could be making certain that everyone has sexual harassment training, for example.
    Or you may want to reduce your risk with regard to `Sarbanes-Oxley` compliance.
    I cannot think of one employee that desires to go to a training class on `Sarbanes-Oxley`
    compliance, but I can think of many businesses that would see a benefit from sending
    their employees to such classes.


    ### Staying Competitive


    Training employees offers a business the ability to stay competitive in their
    industry. They have the chance to take advantage of new technologies before a
    competitor, for example. In some industries it is vital to stay on the cutting
    edge of technology; in others it is vital to be able to use existing technology
    but simply be the first one to get a specific product to market before someone
    else. The business benefit for this aspect of training dollars is potentially
    the most lucrative.


    ## Training Resources'
