    ****Chapter**


    **Some Basics**


    You have your checklist in hand, you are meeting with people every day, and you
    are slowly bringing your environment under control. As you meet more and more
    people, you find that they appear to be speaking in code; their use of acronyms
    is astounding.


    Even more astounding is that they expect you to understand the acronyms right
    from the start.


    This chapter will cover some of the technical basics you will be expected to be
    familiar with. After reading this chapter you should be more familiar with the
    acronyms you might be hearing frequently, such as RAID, SAN, HA, and DR, and even
    what DBA means to some people.


    **TIP:** No one person knows everything. Do not be afraid to tell someone that
    you have not heard of something that they are talking about. The best DBAs ask
    questions, even basic questions, to quench their thirst for knowledge.


    In this chapter we will discuss the following:


    **1.** RAID


    **2.** Storage area networks (SANs)


    **3.** High availability options


    **4.** Disaster recovery (DR)


    **5.** Why networks are like bathrooms


    **6.** The meaning of “DBA”


    **7.** Why you get all the blame


    **8.** How to politely be right


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 38](index-54_1.png)


    **36**


    **CHAPTER 3: Some Basics**


    **Introduction to RAID**


    Probably the most important hardware concept you need to be familiar with is RAID,
    which stands for *redundant array of inexpensive disks*. RAID is essentially about
    different ways of storing data twice, or more than twice, on different disks.
    I’m oversimplifying just a bit, but a core goal of RAID is to let you survive
    losing a disk without also losing any of the data that was on that disk.


    The redundancy part of RAID is what allows us to survive the loss of a drive.
    There are different ways to provide redundancy, and I’ll cover those in this chapter.


    Understanding different RAID configurations is going to save your bacon on more
    than one occasion. Different RAID configurations are called for in different situations.
    They can be used to improve performance as well as protect against disaster.


    **Why Is RAID So Important?**'
