    **CHAPTER 5: Production Support**


    ## THE “TODAY” LIST


    **by Jonathan Gennick**


    I begin each workday by creating a to-do list specifically for that day. Years
    ago, I would try to cram as many items on the list as I thought I could fit. Don’t
    do that. It’s a trap. As Tom points out, workdays never go purely as planned,
    and you need to leave some margin for error. I still create a daily list, but
    I leave a generous margin to handle all the ad hoc items that hit me as the day
    progresses. The to-do list gives me a target that—if I can hit it—lets me go home
    feeling proud of having given a good effort and accomplishing some tangible results.


    ## Outsourcing


    The term *outsourcing* has a negative connotation associated with it these days.
    In fact, most times I ask people to share their experiences with outsourcing,
    their responses are more negative than positive. The reasons vary, but I have
    grouped them into the following categories:


    Poor quality of work


    Language barriers


    Security


    Fear of losing one’s job


    Years ago, as I was becoming overwhelmed with the growing volume of work, my manager
    told me that the only alternative we had at the time was to outsource some of
    my workload. I was tentative for a handful of reasons, some of which I just noted.
    But my apprehension was not enough to stop me from trying, as I knew that the
    mountain of work was not going to be done without some help.


    I had a choice: I could fail miserably at trying to manage my workload, or I could
    give outsourcing a chance; if it failed, at least I would have tried to do something.
    As I look back upon the decision to outsource a large bulk of our workload, I
    realize that it was probably one of the best decisions of my career.


    Before we decided to dive into hiring anyone, my manager and I went over all of
    our concerns. We listed them out and then did our best to come up with ideas to
    mitigate them. After all, failure to plan is planning to fail, right? We had never
    set out to fail before, and decided that we didn’t want to fail on something as
    important as this.


    How did we manage to have success? Well, let’s look at each of the groups I listed
    and help to mitigate some of your fears.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 93](index-109_1.png)


    **CHAPTER 5: Production Support**


    **91**


    ## Quality of Work


    At the top of many people’s list when it comes to outsourcing is the concern that
    the quality of work will be poor. And for many this is no doubt true. But we decided
    to examine why there is a perception of poor quality. We asked around to find
    other companies that were using outsourcing, in the attempt to find out what was
    and wasn’t working for each particular company.


    What we found was that tasks that could be identified as *operational* were usually
    considered to be done with a high rate of quality. Tasks that were defined as
    *nonoperational* were usually considered to have poor quality. Believe me, it
    was that simple. All it took was asking around, talking to some peers, finding
    out what was and wasn’t working, and putting them into two groups.


    As a DBA, we have many tasks that are considered operational in nature. To me,
    an operational task is something that can be followed through repetition—it rarely
    changes, and the outcome is typically known. Consider database backups. Configuring
    backups—making certain they complete successfully—is an operational task. So is
    a database restore. As are password resets, production change deployments, data
    migrations, and even some basic troubleshooting.


    **TIP:** If you have documented things well, then it should be very easy to determine
    if quality is suffering as a result of outsourcing.


    The first step is to document exactly how such tasks are done in your shop. Once
    you have that document, you then hand it off to your outsource team and give them
    a chance to provide the same level of support. Either they can, which is great,
    or they cannot, and you move along to find someone else.


    And if the worst thing to come from all of this is that you finally spend the
    time to document some of your daily tasks, then you will be in better shape anyway.
    After all, you know you are already sinking under a mountain of work and that
    you need help from someone. Having your procedures written down is a necessity
    in order to make certain that any new hire can be brought up to speed in the shortest
    time.


    Whenever we noticed that our offshore team could not provide the level of support
    necessary for our customers, we did not react by saying, “We need to find someone
    better.” Our first reaction was, “How can we make the process simpler and improve
    our documentation?”


    In time, we were able to streamline our processes and improve our documentation,
    and our offshore team was able to provide the support necessary for all the tasks
    we could classify as operational.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 94](index-110_1.png)


