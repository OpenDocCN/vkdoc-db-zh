- fmt: '# CHAPTER 7: Where’s the Buffet?


    ## THE MOST IMPORTANT CHAPTER?


    **by Jonathan Gennick**


    Anyone who knows me also knows I have an affinity for bacon. I like it so much
    that I am certain it will be my undoing. While it is true that you can add bacon
    to anything and it will immediately become better, it is also true that too much
    bacon will clearly lead to health problems. IT professionals make great technical
    decisions all day long, but when mealtime arrives, we make bad decisions that
    come back to haunt us. We face long, stressful hours sitting in a chair punctuated
    by rushed meals of the fastest, most convenient food available. When done in moderation,
    however, you can have your cake and bacon too.


    **TIP:** Bacon is to food as black is to fashion; it goes with everything.


    In this chapter we will discuss the following:


    1.  How food is the easiest drug of choice

    2.  How social interactions can lead to poor nutritional choices

    3.  The need for regular exercise

    4.  How to avoid letting your career, and life, be cut short


    Do you ever think of your job as being dangerous? You should. We all should. We
    in the technology industry—book editors included!—can all too easily fall into
    thinking that we have “safe” jobs. We only drive a desk, right? But we’re in grave
    danger! We’re not active enough. We spend all day sitting. Our bodies atrophy.
    We’re at risk from all sorts of coronary disease. There is diabetes to worry about.
    Have you read about deep vein thrombosis? You get that from sitting too much.
    Hurt your back lately? Perhaps your core muscles are too flabby to properly protect
    your back, again due to inactivity.


    Think about quality of life. Tom speaks to that near the end of the chapter. He
    wants to be able to run and play with his kids. I enjoy being active, and I want
    to continue to be able to get out and hike, ski, mountain bike, and more for as
    long as I can in life. Yet a few years ago I found myself setting aside cross-country
    skiing because I found one day that I outweighed the design limits of my skis
    (I could buy longer skis, but that’s not the goal here).


    I’m guilty of every one of the poor habits that Tom describes in this chapter.
    I have lived long enough to experience some of their unwelcome fruits. I have
    eaten too much, slept too little, and not gotten enough exercise. It is a constant
    battle to push back, to try and regain ground that I’ve lost. Don’t think you
    have a dangerous job? Think again!


    ### Food Can Be a Drug


    Food is by far the drug of choice for most of us. It is legal, readily available,
    makes us feel good, and comforts us. We can get together with friends to eat,
    and we tell ourselves that we can stop eating the unhealthy stuff any time we
    want, but we never really do.


    For example, I love donuts, and wish they came with bacon (either on the side
    or baked right into the middle like some type of deep-fried calzone). I enjoy
    having a coffee in the morning and *really* enjoy coffee and beignets. Of course
    I cannot find beignets most places where I live and work, so I settle for a donut.
    I can’t throw a developer without hitting a donut shop. As much as I love my coffee
    and donuts, that combination is not something I indulge in every day. I may eat
    donuts with my coffee once a week, because I understand the need for moderation.


    **TIP:** Moderation and balance are key. You can eat whatever you want to eat,
    providing you do so in moderation and follow a balanced diet.


    The next time you head over to the vending machine for a quick fix of something
    crispy, cheesy, and salty, stop and think to yourself about why you are buying
    that snack. Chances are you will find yourself eating not from hunger, but from
    emotional eating or unconscious eating.


    ### Emotional Eating


    This is often the result of some emotional trigger. It can be brought about by
    stress that is a result of your current job function. For example, your company
    may be going through layoffs and you have been asked to help manage the project,
    meaning you will be eliminating the jobs of people you have worked with for years.
    Or you may simply have a colleague who treats you will little respect and is very
    demanding. The stress that is put upon you can directly lead to emotional eating.


    **NOTE:** The problem of emotional eating is well-recognized in medicine. The
    Mayo Clinic has an excellent article on the topic at www.mayoclinic.com/health/weight-loss/MH00025.
    A quick Google search on the term “emotional eating” will turn up a plethora of
    other articles for you to feast upon.


    When you are eating emotionally, you are using food as a way to control your mood.
    It could be something as simple as a way to combat boredom. Because you do not
    like to be bored, you start to think about some ice cream. Now that you are thinking
    about ice cream, you are no longer bored, and before you know it you are having
    yourself a triple scoop of Rocky Road.


    Emotional eating is a pattern that you do not want to fall into. You swear you
    will not eat another pound of bacon for breakfast and then you do it again the
    next day. Your colleague or manager treats you poorly in front of the office and
    you reach for a bag of chips. You find yourself eating *when you are not even
    hungry*.


    Emotional eating can be difficult to overcome. The first step to solving any problem
    is to first identify that the problem exists. Once you have done that, the next
    step could be something simple, like keeping a food diary of what you eat throughout
    the day. Or it could be more complex, like seeking the help of a therapist. In
    the end, you need to be more focused on your well-being and less likely to react
    to the emotional eating.


    ### Unconscious Eating


    Unconscious eating happens when you are not aware that you are putting food into
    your mouth. It sounds silly, right? I mean, *how can you not know you are eating?*
    It is not a matter of not knowing that you are eating, it is more a matter that
    you are not aware of how much or what you are eating.


    The classic example is movie theater popcorn. Most of the time the popcorn at
    the theater is made well in advance (sometimes days in advance) and stored in
    big plastic bags until it is taken out, placed under heat lamps, and served to
    the public. If you were to be given a bowl of that popcorn and a bowl of freshly
    popped popcorn, the difference in the taste would be quite noticeable. And yet
    when you go to watch a movie you are content to eat the entire bucket of stale
    popcorn instead of demanding something fresh.


    Why? Because *you are eating unconsciously.* You are distracted by the movie.
    Your focus is not on your food, it is somewhere else. As a result, you continue
    to shovel popcorn down your throat until it is all gone. Same thing for eating
    in front of the television, or . . .


    *Your computer screen.*


    Yes, it is true. Sitting at your desk watching your computer screen all day is
    enough of a distraction for you to start down the path that leads to unconscious
    eating. Don’t believe me? Get up out of your chair, leave your cube, and start
    taking notice of the physical appearance of others in your department. My guess
    is that more than half of them are overweight. And they are probably also doing
    exactly what you do all day; sitting at their desk staring at a computer screen.


    **TIP:** Getting out of your cube is a good idea anyway. Go ahead and stretch
    your legs for a few minutes. Walk up a flight of stairs when you have the chance.'
