- fmt: '# One of the biggest benefits that outsourcing has for me is to make me focus
    on defining our current processes—very helpful when someone demands to see that
    you have something documented even though they (1) don’t really care and (2) don’t
    understand it anyway. Having your stuff documented is necessary anyway. Plus,
    if your support breaks down, you can go back to your documents and make certain
    they are clear enough for everyone to understand. If they are, then it allows
    you to review the process and try making it simpler. In the end, you’ll have a
    stabler environment, and one that is easier to maintain. And one that allows for
    you to keep your customers happy. Trust me, they like to be happy.


