  trans: '

    我常听人说建立人脉有多难。虽然我喜欢提醒大家，生活中有价值的事物往往也伴随着困难，但我本人也属于喜欢把事情简单化的人。让社交变得简单的一个方法是明确自己的目标。如果你想提升销售额，那么你应当寻找特定类型的社交场合。如果你只是想扩大职业联系人名单，那么你需要的场合又会有所不同。最不希望看到的情况莫过于投入了时间和精力去社交，最后却发现待错了地方。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 166](img/index-176_1.png)


    **158**


    ## **第 9 章：连接。学习。分享。**


    让社交更轻松的另一个方法就是保持良好的礼仪。如果你能言善道（很可能你从很小就开始说话了）并且彬彬有礼，那么社交的容易程度会让你惊讶。记得你只需说声“不好意思”就能离开一个群体吧？这就是良好的礼仪。展现出良好礼仪的人往往更出众、更受欢迎、也更受尊重。


    成功的社交需要一些工作和努力，但这些工作和努力最终大多会变成有益的习惯。不知不觉中，你就会成为社交高手。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 167](img/index-177_1.png)


    ****159**


    ## **10**


    ## **章**


    ## **总结**


    我依然记得走进华盛顿州立大学那间教室的情景。当时我是一名研究生和助教，即将教授我的第一堂预备微积分课。我以前从未当过老师（除了代课），真的不知道会发生什么。开课前几天我们接受了一些培训，但没有什么能完全让我准备好去面对即将经历的一切。培训主要包括在同事面前练习一些基础讲座。我不记得有很多正式的书面指导，大多是小组讨论。


    同样，我还记得我刚开始担任数据库管理员的那些日子。


    每当数据库这个神秘事物出了任何问题，我都会被召唤去提供即时答案。如果我不知道答案，我就得待在办公桌前直到找到答案为止。好吧，那是我给自己施加的压力，因为我愚蠢地以为每个数据库管理员都已经无所不知。是的，我就是那么愚蠢。


    我多希望当时有人能递给我一本书，概述未来几周、几个月乃至几年可能发生的情况；一本帮助我作为一名数据库管理员取得成功，并从第一天起就规划我职业成长的书籍。


    这就是我写这本书的原因。我想写一本我希望在我入职第一天有人能递给我那样的书。我担任数据库管理员已超过六年，但头两年的学习曲线非常陡峭。我似乎总是落后，总是在应对各种情况或需求，很少能主动出击。随着时间的推移，我学会了如何领先，我希望前面章节中的信息也能帮助你做到同样的事。


    ### **达成目标**


    你如何来到这里并不重要。你从第一天起所做的事才是衡量你的标准。没有人会关心你的过去，他们想要的只是用丝带精美包装好的切实成果。各行各业的人都会成为数据库管理员；很少有人从小就想好自己将来要做一名
    `DBA`。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 168](img/index-178_1.png)


    **160**


    ## **第 10 章：总结**


    然而，有时人们就是知道他们想从事数据库管理。我当然是这种情况。大多数人则是偶然踏入这个角色。他们发现自己在这里做一点管理任务，在那里做一点，不知不觉中就越做越多。你会发现成为
    `DBA` 有很多条路。达成目标既可以被视为一次不可能的旅程，也可以被视为一段你甚至未曾察觉其正在发生的旅程。


    如果你希望成为一名 `DBA`，却感觉没有获得机会，那么你需要自己掌握主动权。开始寻找机会让自己获得必要的技能。如今网上有大量的免费培训。也有很多付费培训。我总是建议任何人，除了书籍和手册提供的培训外，尽可能多地获得实践经验。另外，你总是可以向当地组织贡献你的时间来获取实践经验。


    如果你真的想成为一名 `DBA`，有很多方法可以达成目标。有些路径可能比其他的耗时更长，所以你需要保持积极，并不断想象最终的结果。


    ### **身处其位**


    成为一名 `DBA` 有时可能看起来令人生畏。一旦你发现自己身处你曾想象过的那个角色中，你可能会不时感到不堪重负。即使是经验丰富的数据库管理员，面对眼前堆积如山的任务，有时也会感到力不从心。你可能无法避免在某一天被工作淹没，但你可以采取一些措施来尽量减少这种日子。


    首先，你需要打下坚实的基础。做到这一点的最佳方法之一就是尽可能多地进行文档记录。写下你能写的一切，无论当时看起来重要与否。文档记录将对你大有裨益，因为通过反复记忆来学习是记住信息的好方法。


    其次，在你开始记录你所能找到的一切之后，你就可以与同事分享你的知识和经验。想办法增加你所在机构所有团队之间的沟通交流。有 `Sharepoint` 吗？给自己建一个门户并用它来发布有用的信息。你甚至可以用它来发布
    `T-SQL` 的技巧和诀窍，或者讨论一些数据库设计的基础知识。随着时间的推移，你会发现哪种沟通形式对你的团队最有效。


    ### **坚守岗位**


    达成目标可能很难。身处其位可能更难。而坚守岗位可能是最难的事。如果你想留下来，那么你需要超越技术技能，开始培养软技能。


    安排时间与他人会面，即使只是给其他办公室的人打个电话。尽你所能管理好各种关系，同时要记住


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 169](img/index-179_1.png)


    ## **第 10 章：总结**


    **161**


    不同的人需要被区别对待。弄清楚他们想从你这里得到或需要什么信息，并想办法定期提供这些信息。


    **提示：** 不要孤立自己。如果你大部分工作都是独立完成的，想办法与 `IT` 部门的其他人、用户以及你社交网络中的同事合作。没有人是一座孤岛。我们都需要与他人合作。这样做将有助于你理解他人所做的工作，并让你因自己所做的工作而更加引人注目。——贾里德·斯蒂尔


    确保你能长期留任的另一个方法是持续你的专业发展。尝试用一些培训任务来补充你的日常工作，因为你需要始终保持领先。只要有可能，就下载并安装 `CTP`（社区技术预览版）。并且要阅读。你需要大量阅读。掌握最新的行业趋势，并将这些趋势传达给你的同行。引导他人参与更多关于设计和架构的讨论，而不是生产问题。

    '
- fmt: 'However, do take time for yourself. Put your family first whenever possible.
    But remain responsive and responsible, and never be afraid to admit that you do
    not know everything.


    You spent a long time getting here, so make certain you are enjoying your life
    and your career.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 170](index-180_1.png)


