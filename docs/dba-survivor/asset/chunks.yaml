- fmt: '# CHAPTER 6: Basic Troubleshooting


    Most senior DBA’s have some level of proactive monitoring in place. This allows
    for them to see changes in the environment, which helps them know where to look
    and what questions to ask when issues arise. But how do they know what to monitor
    in the first place?


    Everyone starts with some basic monitoring of their environment, but over time
    you may find yourself monitoring some oddball items. This is often the result
    of a previous incident followed by a knee-jerk reaction in which you are asked
    (or ordered) to start monitoring something in particular.


    **NOTE:** I’m reminded of the airline security practice of removing shoes. That
    practice is a classic example of a single incident leading to the type of reaction-oriented
    monitoring that Tom talks about. Some of what you monitor will be a similar result
    of your employer’s or client’s specific history. — Jonathan Gennick.


    For example, many companies monitor their database backups to ensure that they
    have run successfully. But not many have a process in place to verify if the database
    backups can be restored in a timely fashion. All it takes is one time where you
    are not able to complete a restore and you will find yourself being asked to monitor
    your database backups more closely. In one particular case, this meant I needed
    to develop a process that would verify the database backups were still available
    on disk, because waiting a day to recover from tape was not considered acceptable.


    Another item to consider is that your monitoring solution needs to mitigate the
    incidents that are occurring. If something happens once and you are not able to
    provide an answer immediately, you may buy some time by explaining how you will
    put some better monitoring into place. But if the same incidents continue to happen
    and you are no closer to a solution despite your efforts to monitor the situation,
    then you had better believe that people’s confidence in your abilities will wane.


    As time goes by, you will find that your monitoring solution will develop as a
    reaction to incidents and issues that have arisen. What really matters is the
    end result, which is that you need to have tools in place to recreate events or
    to watch events as they unfold.


    ## Common Bottlenecks


    Issues with `SQL Server` are usually grouped into three main categories: disk
    I/O, memory, or CPU. As such, those three items are good places to begin when
    trying to troubleshoot any particular issue. When the phone rings in the middle
    of the night you want to start ruling out as many suspects as possible. Doing
    so will allow for you to focus on finding the true root cause of the issue.


    Most likely, all you will ever be told is that the server is “slow.” The end user
    has little or no idea as to the nature of the problem; they just want their problem
    to disappear. It is up to you to know where, and how, to analyze the situation.
    Therefore, you should become familiar with the most common bottlenecks and how
    to quickly diagnose if any one of them is the issue. Later in this chapter in
    the section “Available Tools,” I will discuss some of the various tools you have
    at your disposal right out of the box. I will explain how each tool can be used
    to find out more about disk I/O, memory, and CPU.


    In the next sections, I will explain how and why each is important and what role
    they play in your overall performance.


    ### Disk


    If you are using a database then you have the need for data to be written to and
    read from disks. You want your data to be written to disk as fast as possible.
    You want your data read from disks just as quickly. You also want your disks to
    have adequate space to store all of your data. All of this requires adequate planning
    as well as some performance tuning. Unfortunately, in the middle of the night
    you will not have the luxury of doing one or the other. You will need to have
    a method for quickly determining if disk I/O is an issue, either as a root cause
    or a symptom of something else.


    Unless your database is of a small enough size to fit entirely inside of the server’s
    memory, your performance is going to be dependent upon your disk I/O. This is
    because the database engine will be constantly swapping data pages from memory
    to disk and vice versa. `SQL Server` will also use `tempdb` to store data and
    the transaction log will need to flush pages to disk as well.


    That is a lot of I/O activity for one database. Data, logs, and `tempdb` all need
    to read and write data from disk. Now consider that you probably have more than
    just one database on your server. It is easy to see how disk I/O can be a bottleneck
    for any server. Proper alignment of data files, log files, and `tempdb` is essential
    for good performance.


    ### Memory


    Applications need to use computer memory in order to run, and `SQL Server` is
    no exception. You may find yourself having memory pressure that is either physical
    or virtual in nature, and in both cases the pressure may be internal or external.
    Before you dive into such details, you need to be able to determine if memory
    pressure even exists.


    Just because `SQL Server` is consuming memory does not mean that there is a problem.


    I like to set the memory for my database servers to be the same fixed size for
    both the maximum and minimum memory configurations. On a dedicated database server,
    I will leave just enough memory for the base operating system to function, typically
    2–3GB, and assign the rest to `SQL Server`. This can result in a situation where
    your phone will ring and the voice on the other end will say “`SQL` is consuming
    a lot of memory, please do something to fix the situation.” Of course there is
    nothing for you to fix, because you have configured it to operate that way!


    If the `SQL` service is indeed operating at or near capacity then you may start
    to see error messages that pertain to memory. If you recall, I already talked
    about how `SQL` will swap data pages between memory and disk. The area of memory
    used is called the `buffer pool`. Reading from memory is faster than reading from
    disk, so the more you can store in the `buffer pool` the faster your performance
    will be.


    But when your server is under memory pressure, your `buffer pool` will not be
    able to handle the increase in requests, and performance will degrade. That’s
    when your phone will ring.


    ### CPU


    CPU spikes will happen from time to time and are typically defined by having the
    available CPUs more than 80 percent utilized. CPU spikes represent a dichotomy;
    you don’t want to see your CPU’s being over utilized and yet you also want to
    use your available CPU’s otherwise they are sitting there idle. Allowing a resource
    to sit idle could be considered to be a waste, right? So, you have to make certain
    your CPU’s are being used efficiently, but not taxed to the point that the server
    itself is overburdened.'
