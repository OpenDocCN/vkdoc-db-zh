- fmt: '# Training, Get You Some of That


    Training is more than just sitting in a classroom for three to five days and listening
    to an instructor offer up information from a study guide prepared by someone else.
    Effective training is much more than that; it is something that becomes a part
    of your everyday routine. You may be good at what you do right now, but you are
    far from perfect (trust me), and if you do not spend some of your time following
    the latest industry trends, then you will be left behind like a dinosaur trapped
    in a tar pit.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 140](index-150_1.png)


    In this chapter, we will discuss the following:


    1.  Reasons for training

    2.  Training resources

    3.  Building your case


    ## Reasons for Training


    Think of a high school basketball program. You would have a varsity team, a junior
    varsity (JV) team, and a freshman team. Each team would have practices, and the
    natural progression of a player would be from the freshman team to the JV team
    and then on to varsity. But who decides when a player is ready to move upward?
    The varsity coach, of course, who is managing the entire program and constantly
    evaluating the players daily, would be the one responsible for that decision.


    At the start of the season, the coach will put in the base set of offensive and
    defensive plays that the team will use for the season. These plays will be based
    upon the individual players’ strengths; however, during the course of the season,
    new plays will be put into the system in order to make certain the team remains
    competitive, which makes their fans happy.


    **TIP:** Keeping fans happy is *always* a priority, no matter if you are coaching
    a high school basketball team or administering the database servers for a large
    corporation.


    Now compare that to an IT department. You have a person that serves as the head
    of IT (your varsity coach) and is responsible for evaluating the employees as
    part of an overall professional development program. Depending upon the performance
    of an employee, it could be desirable to have them placed into a new role. Or
    it could be that a new system is being brought in house and certain employees
    will be shifted over to be dedicated to working with the new system. At the end
    of the day, the head of IT is going to make the moves that she feels will provide
    the business with the highest level of satisfaction.


    With regard to training, the two scenarios are the same. In each case you have
    people changing roles or positions, you have new systems being put into place,
    you have people evaluating the employees and players, and you want your customers
    to be happy. We could therefore say that there are four good reasons for companies
    to offer training: for professional development, for when people change roles,
    for new systems, and for customer satisfaction. Each of those reasons will result
    in benefits for the employee as well as for the business.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 141](index-151_1.png)


    ## Professional Development


    Professional development can have many meanings to many people. For some, it means
    career growth. For others it may simply be another way to describe their annual
    performance review. And still others may think of professional development as
    their career track within a company.


    The results of annual reviews could lead a company to institute a training program.
    For example, an employee may be told that they are lacking in a core set of necessary
    skills for their position. The company may then see fit to offer some training
    to that employee in an effort to help them with their development. Or the evaluation
    could point out that the employee is excelling in a certain area and it might
    be a good idea to offer training in order to enhance some existing skills.


    **TIP:** A proper review should also include a training plan for the upcoming
    year.


    Training should be a part of any professional development program. If training
    is not listed on any official review or professional development program, then
    make your own plan that includes training. And training does not need to mean
    time away from the office in a classroom located in some exotic location. I will
    list out for you later in this chapter many of the training resources and options
    you have available.


    Good companies will offer strong professional development opportunities. Note
    that this does not mean that the company has positions of advancement to offer;
    in most cases they will not. But what good companies will do is make certain their
    employees are given opportunities to pursue positions they enjoy. Sometimes those
    positions exist and sometimes they are created. But without training it will be
    difficult for the IT director to be able to evaluate the employee’s growth potential.
    What you want to do is use your training to enhance your skills and in turn help
    to demonstrate your increased value to your employer.


    ## Changing Roles


    Your desires and motivations will change over time. As a result it will often
    be necessary to consider changing roles. Sometimes this could mean a promotion,
    but it could also mean a lateral move. Perhaps you have been working in the QA
    department and want to move into a junior administration role. Companies that
    have training programs in place allow for this changing of roles easily; otherwise
    it would be very difficult to allow for internal growth opportunities. And if
    there are no internal growth opportunities for the employees, then low morale
    could be a result.


    I know of many database professionals who started out as straightforward DBAs
    and are now more involved with business intelligence, database development, or
    even SAN administration. As your desires change over time, look for opportunities
    to work with your boss to get some additional knowledge and training so that if
    new roles are created, you will have an opportunity to fill that role.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 142](index-152_1.png)


    ## Piloting New Systems


    Systems come and go, especially in the IT sector. When new systems come into your
    shop, your company is going to need someone to administer and support them. This
    can be done by (1) training existing employees, (2) hiring new employees or contractors
    with the necessary experience, or (3) doing nothing.


    Doing nothing will lead to poor administration and support, which will lead to
    poor customer satisfaction. Hiring new employees is an option, but may be cost
    prohibitive.


    Most of the time the best course of action is to train current employees to work
    with the new system.


    ## Customer Satisfaction


    Companies should always be looking to increase customer satisfaction. After all,
    if they alienate their customers to the point that no customers remain, then they
    will not be in business very long. Training programs have the ability to increase
    customer satisfaction as an end result. How? By improving the morale of the employees.
    When you create a positive work environment, you allow for the opportunity to
    create a positive customer experience as well.


    **TIP:** While you should enjoy your work, there is a reason it is called work
    and not “happy fun play time.” It is not your employer’s responsibility to keep
    you entertained. It is their responsibility to keep you focused and productive.


    Think about places you may have worked where office morale was low. What was it
    like to be a customer of that company? Was it a positive experience? Chances are
    that most interactions between those customers and your company were not very
    positive. Now I cannot pinpoint that bad interaction on the lack of a decent training
    program; what I am saying is that one reason for instituting a training program
    would be in order to have higher customer satisfaction as a result.


    ## Employee Benefits'
