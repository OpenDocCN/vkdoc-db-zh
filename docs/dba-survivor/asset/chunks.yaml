- fmt: '# Chapter 1: How Did I Get Here?


    Congratulations! You have accepted a position as a Database Administrator. What’s
    that? Oh, you were *told* that you were going to be the new DBA? No worries, I
    am certain you were carefully selected to be the best…of the best…of the best.
    Now that you have the job, what’s next? What is your action plan? What do you
    take care of first? Who should you look to make friends with, and fast? And how
    much more will you get paid?


    First off, let’s get some basics out of the way. You do not know everything. Sorry
    to tell you, but better to find out now rather than later on. Trust me. No one
    person knows everything; it is a fact of human existence. You are human, right?
    Because that simple fact will be questioned periodically, so you better check
    again just to make certain. Last thing you want is to find out you are actually
    a Cylon or something worse.


    Another thing you need to know about being a DBA is that you will have fewer friends
    at work than when you started. Now, that is not necessarily a bad thing. See,
    you have been placed into a position of responsibility, and with this responsibility
    you will need to make some decisions, and those decisions will not always be popular.
    Thus, you may lose some friends at work, but these losses will be more than offset
    by the gains you have in the overall DBA community. So you have that going for
    you, which is nice.


    With that responsibility, you will also find that you start getting more blame
    than credit for your work. I promise you this: no one will ever stop by your desk
    in the morning and thank you for the fact that everything ran smoothly last night.
    But you better believe if a batch load took five minutes longer than expected,
    you will have four different people asking you “WTF?”


    While being a DBA may not be all unicorns and rainbows, it has the potential to
    be the most rewarding career path you could ever be presented with. Ask around
    and you will find that most people cherish having a good DBA on hand. It is my
    hope that this book will give you the tools necessary to be that DBA—the one they
    decide they cannot live without.


    xv


    [www.it-ebooks.info](http://www.it-ebooks.info)


    xvi


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 3](index-19_1.png)


    ## 1


    Database administration is one of those professions that makes it hard to explain
    to others what you do for a living. We typically fit in between the people who
    build servers and the people who need to store and retrieve data from those same
    servers. We are therefore expected to know and understand a lot about a lot, and
    it can be overwhelming at times. So much so that you will sometimes stop to take
    a moment to reflect upon where you are in life and wonder, “How did I get here?”


    I am often asked two questions. The first is, “How did you become a DBA?” The
    second question is, “What does a DBA do, exactly?” This chapter will help to explain
    the former, and the remaining chapters will help to explain the latter. Becoming
    a DBA can be a mysterious journey for most. I will share with you my story and
    the stories of others in an effort to help you better understand how some people
    end up becoming DBAs.


    TIP: Be careful what you wish for, because you might just get it.


    In this chapter, we will discuss the following:


    1. My journey

    2. Other journeys

    3. Your journey

    4. Staying focused


    ### My Journey


    How did I become a DBA? It sure wasn’t the career I dreamed of in elementary school.
    I probably wanted to be a fireman or a policeman back then.


    I can’t say that I planned to become a DBA either, at least not at first, not
    early in my career. My entry into the DBA world sort of just happened. Some might
    see it as “dumb luck,” but I prefer the term “smart luck.”


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 4](index-20_1.png)


    ### Early Lessons


    My first computer? That would be the `Commodore VIC-20`. I remember saving my
    money from mowing lawns, my sister driving me to the mall, and buying that all-in-one
    unit that I could attach to my television with an `RF adapter`. I also got the
    `datasette`, which was nothing more than a cassette tape player, but it allowed
    me to save programs, which was nice.


    I bought a book of programs that I could type myself and run. Did you know that
    sometimes books have mistakes printed in them? Imagine a computer program in a
    book that was missing a couple of important characters. I didn’t have to imagine
    such a thing, because I lived it. I would often find myself debugging programs.
    To this day, I believe that is the biggest reason I do iterative debugging; I
    always make small changes and measure the effects as I progress, whereas others
    like to do a lot of work and try to debug everything afterward.


    In addition to being drawn toward computers at an early age, I was also drawn
    toward mathematics. Both of those fields are analytical in nature and served as
    a good base for me later in life. Oh, and neither field required me to do a lot
    of writing, which was nice as well. In fact, I went to college as a math major
    just to keep the number of term papers to a minimum.


    TIP: Going the extra mile and doing a little extra work always pays off in the
    long run.


    Unfortunately, my lack of writing experience caught up with me in graduate school.
    In my very first class there, the professor told me I needed to write out my solutions;
    I needed to write out the word `two` instead of using the numerical `2`. And I
    could not just use `=`; I had to write `equals`. It was a painful adjustment for
    me, but it served me well. By that time in my life, I had learned that the path
    less traveled usually led me to a better place than I would have imagined.


    While in graduate school, I had the option of composing a master’s project as
    part of earning my degree. Since knowing how doing extra work had always paid
    off for me in the past, I decided to take on a project. The math and astronomy
    departments at Washington State University (`WSU`) were joined at the time, and
    I had a natural love for all things extraterrestrial (and still do). I asked one
    of the astronomy professors if he would work with me on a project and he agreed.


    My project was titled “The Interstellar Radiation Field of Globular Clusters”
    and involved quite a bit of programming. Not `Commodore VIC-20` programming; we
    are talking `FORTRAN77`, `Sun boxes`, astrophysical equations, arrays, telescopes,
    charts, graphs, and even `LaTeX`. I was exposed to a lot of programming in a very
    short time, and left `WSU` with a master of science (`MS`) in mathematics and
    enough programming experience to help me land a job.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 5](index-21_1.png)


    ### Early Career


    I left graduate school with my `MS` in hand as I felt that would give me more
    opportunities to find work than if I continued on to get a `PhD`. I found myself
    in an interview one day with a man who had a `PhD` in physics. We spent most of
    my interview talking about the project I had done at `WSU`. He needed someone
    to do some programming work with `PowerBuilder`. I still remember his remark to
    me: “I can teach you whatever I need you to do and I know you’ll be able to do
    the work.”


    And with that, I was hired. As a `PowerBuilder` developer. With no experience
    in `PowerBuilder`.


    I was there for about a year and a half, and then I jumped to a software company
    that was also looking for some `PowerBuilder` help. Of course, by then I actually
    had some `PowerBuilder` experience. But what I still did not have was any real
    database experience.


    All I knew was that my data went somewhere and it came back when I needed it.
    I did pick up a few things there with regard to database design, triggers, stored
    procedures, and a realization that I was interested in learning more.'
