- fmt: '# CHAPTER 8: Training, Get You Some of That


    There are many options available for individuals or companies looking to get started
    on a training program. The first step is to identify the desired end result; what
    do you hope to get from your training? More importantly than *what you get* from
    your training is *what* *you can take* from your training. If you are going to
    expect to have things handed to you or done for you, then you are going to be
    disappointed.


    No matter what your budget, you can find some level of training to suit your needs.


    There are lots of free options for training (web sites) and lots of slightly-more-expensive-than-free
    choices (professional trainer). When making arrangements for a training program,
    you should be mindful of each option and its associated strengths and weaknesses.


    **TIP:** Do some research when hiring a trainer or attending a class. Make certain
    you are getting a reputable trainer.


    Notice that the options I discuss are a mixture of self-help and organized training
    classes. That is because any good training program is going to incorporate more
    than one option. If you are waiting around for someone else to put together your
    training for you, then you are most likely going to be left behind. You absolutely
    need to take control of your own career development; grab the self-help options
    when you are able.


    ## Web Sites


    The Internet offers a lot of reference material for training. As a DBA you may
    be focused on SQL Server training options, but even if you are looking for something
    different—perhaps some general professional development training—you should be
    able to find a web site through a search from your favorite search engine. Participation
    in forums, newsgroups, and even Twitter can offer valuable training material.


    **Pros:** Most are free, but some charge for content. Web sites allow for you
    to conduct training on your schedule; typically you do not need to be online at
    a particular day and time. Forums and newsgroups are often a good way to connect
    with other professionals and share experiences. Some companies such as Microsoft
    and Oracle offer a lot of training materials for free with the hope that they
    can persuade professionals such as yourself to use their products.


    **Cons:** You get what you pay for. You need to be mindful that there are crazy
    people out there posting responses to forum questions, and there are people posting
    humorous answers as a joke that you might not get. It can be hard to distinguish
    between sites that offer quality content and those that do not, but one way to
    start is to look at each author’s experience. Don’t take the word of an uncredentialed
    stranger when it comes to your databases. And don’t believe that paying a premium
    for content means you can trust the material any more than a free web site; I
    have seen lots of mistakes on web sites that charge for content.


    ## Self-Training


    In addition to the self-training that you can get from web sites, blogs, and podcasts,
    you can also simply get started on a side project that will allow you to learn
    something new.


    Perhaps your company needs to institute transaction log shipping and you have
    never done that before. Consider this your opportunity to teach yourself something
    new.


    **Pros:** There is no better way to learn than by doing. And with self-training
    you often are doing something that already has your interest, making it more likely
    that you will retain the knowledge. You are able to learn at your own pace. And
    you may find that some skills you learn in one area are applicable in others,
    especially soft skills.


    **Cons:** It can be easy to give in to distractions or become frustrated. If you
    are on a small team, it can also make you isolated from others. It can be hard
    to stay motivated.


    ## Volunteering


    Probably the most overlooked training opportunity is volunteering. There are lots
    of local organizations that can use all sorts of help. Believe it or not, if you
    are looking to break into the IT sector, you would do well to find a local group
    that could use some IT help.


    The easiest example that comes to mind is a church or a community center. Places
    that thrive on the assistance of volunteers need help in almost every area you
    can imagine.


    And you do not need to feel that your volunteering has to be related to something
    technical. You could volunteer your time to mentor someone in your shop. Mentoring
    is a wonderful way to enhance your skills, especially your soft skills.


    **Pros:** It is a great way to build your resume and get some actual experience.
    Classroom learning has a certain value, but real-world experience is always better.
    Plus, it is a great feeling to donate your time to helping others. In fact, you
    should do this regardless of the training opportunity.


    **Cons:** The experience you get may be quite limited; chances are you will not
    be doing anything cutting edge. Unless you are mentoring someone else, you will
    most likely be working alone with little direction.


    ## In-Service Training


    This is also sometimes called a brown-bag lunch session. The idea is to offer
    training to employees by bringing in an outside trainer to conduct the class.
    Or a respected colleague might lead the instruction.


    **Pros:** This is a good way to maximize your training dollars by bringing someone
    in house to conduct the training. If you are an employee being asked to train
    others, then it is also a great opportunity for you to learn even more. I have
    often told others that a good way to learn something is to try to teach it to
    others.


    **Cons:** This creates time away from your desk, but not away from the office;
    you may find it difficult to focus on the training materials if you are needed
    to perform work duties. Materials may not always be on a topic you have interest
    in.


    ## Professional Associations


    You can find a professional association to suit your interests. Two that come
    to mind immediately are the Professional Association for SQL Server (`PASS`, `http://sqlpass.org`)
    and the Usability Professional’s Association (`UPA`, `http://www.upassoc.org`).
    Both offer you the ability to participate in user group meetings and hold annual
    conferences.


    **Pros:** Most will offer a basic membership at little or no cost. Membership
    status will typically include a newsletter that will alert you to upcoming events
    that allow for you to connect, share, and learn from others. Many of these events
    are free to attend.


    **Cons:** There are not a lot of options as far as organized associations go,
    and you may be disappointed in the overall selection. Also, they may be nothing
    more than a networking focus as opposed to training or professional development.
    You will need to do extra research to find out the exact benefits of membership.


    ## Continuing Education


    A local college or university may offer a relevant class that could be of interest.
    Perhaps you are looking to get a degree in IT or maybe a more general MBA. Or
    you could just want to take one class in order to gain more knowledge on a particular
    subject.


    **Pros:** Earn credits toward a degree. Classes are usually at night, meaning
    you do not lose any time from work. Classes typically run eight weeks unless they
    are part of a more formal degree or certification program.


    **Cons:** Could be cost prohibitive; check with your HR department to see if your
    company has a policy on assisting with the costs of the classes. Classes are usually
    at night, meaning you lose time that could otherwise be spent with your family.


    ## Classroom Training'
