    ## 第 3 章：一些基础知识


    ### `RAID` 简介


    可能你需要熟悉的最重要的硬件概念是 `RAID`，它代表*廉价磁盘冗余阵列*。`RAID` 本质上是关于以不同方式将数据存储两次或更多次在不同的磁盘上。我说的有点简化了，但
    `RAID` 的一个核心目标是让你在丢失一个磁盘时也能幸存下来，而不会丢失该磁盘上的任何数据。


    `RAID` 的冗余部分使我们能够在丢失驱动器时幸存下来。有不同的方式提供冗余，我将在本章中介绍这些方式。


    了解不同的 `RAID` 配置将在多个场合拯救你。不同的情况需要不同的 `RAID` 配置。它们可用于提高性能以及防范灾难。


    ### 为什么 `RAID` 如此重要？

    '
- fmt: 'Consider most home computer systems that are bought from a national superstore
    chain. They come with more than enough memory, have more than enough processing
    power, and have lots of disk space. The one thing they don’t come with is a backup
    (or external) drive. And why would you want one of those? Users need those to
    protect their important files, such as e-mails, pictures of the cats, and all
    their favorite web links.


    Many homeowners don’t think about backups. They go on merrily for years, adding
    their financial data, their photographs, and their collections of e-mail and iTunes
    music to their hard drives. Then one day they learn the hard way about hard drive
    failure. Their hard drive fails, their computer won’t boot, and they lose everything.


    What about servers—do they come with extra disks? Usually, yes, servers are ordered
    with extra disks. Depending on the model of the server, you will have a different
    number of options and disks available. The primary reason for extra disks, besides
    the need for disk capacity, is to protect yourself through the utilization of
    `RAID` in the event of a hard disk failure.


    For example, Figure 3–1 shows one possible `RAID` configuration. In Figure 3–1,
    three hard drives are tied together to appear as one. The same data gets written
    to all three drives. Because the three drives are mirror images of each other,
    we can trash one of the drives and still have access to our data on the other
    two. We can even trash two drives, leaving just one good one.


    **CAUTION:** Do not rely solely on `raid` to avert disasters. `RAID` is not backup.
    When a user deletes a record, it’s instantly deleted on all drives. You still
    need backups to recover from small problems like these, as well as major disasters
    like server failures, datacenter outages, and natural disasters.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 39](index-55_1.png)


    ## CHAPTER 3: Some Basics


    37


    **Figure 3–1.** *One path to redundancy is writing the same data to many drives.*


    ### RAID for Performance


    You can also utilize `RAID` to improve performance. Knowing how to do that can
    be helpful when trying to performance tuning queries. It will also serve you well
    when you go through your initial checklist and start to gather baseline information
    on the configuration of your servers.


    SQL Server is very much an input/output (I/O)–intensive system. That means that
    the faster you can read and write data to and from your disks, the faster your
    response times will be. You can use `RAID` to increase your I/O throughput by
    taking advantage of *striping* your data across several disks at once.


    For example, a traditional hard disk has a little arm inside of it that moves
    back and forth every time you want to read and write data. Well, let’s say you
    had to do 100 read and 100 write operations, and each one took 1/100th of a second.
    How long would that take on one disk? Two seconds. Now, let’s say you configured
    `RAID` as shown in Figure 3–2.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 40](index-56_1.png)


    38


    ## CHAPTER 3: Some Basics


    **Figure 3–2.** *A `RAID` configuration to improve performance by striping*


    Now you have two little arms moving back and forth across two disks at the same
    time.


    You would still have your two hundred operations to perform, but they would be
    done on two drives simultaneously. Each individual drive would get half the work.
    Your overall time would be reduced from two seconds to one second.


    Another method for improving performance would be caching. Most `RAID` controllers
    allow for some amount of data to be stored in cache. The idea would be to cache
    as many nonsequential requests as possible in order to batch them together and
    send them as a sequential request to the hard drives.


    ### RAID for Fault Tolerance


    `RAID` uses two methods to provide for fault tolerance: mirroring and parity.
    Mirroring is exactly what it sounds like: you have two (or more) copies of your
    data on two (or more) different disks. the scenario in Figure 3–1 is a mirroring
    scenario.


    **NOTE:** Mirroring is most commonly thought of in terms of two drives mirroring
    each other. However, there is nothing stopping you from mirroring across more
    than two drives.


    *Parity* occurs when you add extra data called *parity data* to one of your disks,
    which can then be used to reconstruct your real data should one disk fail. The
    advantage of the parity approach is that you save on disk space. Figure 3–3 shows
    how one byte of parity data can protect two bytes of real data.


    **Figure 3–3.** *One byte of parity data can protect two bytes of real data.*


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 41](index-57_1.png)


    ## CHAPTER 3: Some Basics


    39


    The parity approach to `RAID` is a good thing, unless you are concerned about
    performance. There’s a negative impact on performance, because writing that extra
    bit of parity information each and every time will add additional overhead.


    Let’s examine several different `RAID` levels that use different combinations
    of mirroring and parity to achieve protection and speed. I don’t discuss every
    possible `RAID` level, just the ones you are likely to encounter as a DBA.


    ### RAID 0


    This level is commonly called *disk striping,* and the result is often referred
    to as a *striped set* of disks. Your data gets divided into chunks (or blocks)
    and distributed across all the disks in the array in a fixed order. Figure 3–4
    illustrates the approach.


    **Figure 3–4.** *An example of a `RAID 0` configuration*


    `RAID 0` will increase performance as the operations can all be performed at the
    same time independently from one another, as noted earlier. The drawback is that
    any piece of data is on only one disk, because the data was divided across all
    of the disks evenly. In the event of a drive failure, all of the data that was
    on that disk is permanently lost. In fact, it’s worse: lose one drive and you’ve
    effectively lost all data in the array. The only way to recover from a drive failure
    in a `RAID 0` array is to restore the entire array from the last backup. Therefore,
    `RAID 0` does not make a good choice for SQL Server storage. It is worth noting
    that `RAID 0` does not provide fault tolerance, nor does it provide redundancy.


    ### RAID 1


    This level is more commonly called mirroring. It’s the scenario illustrated earlier
    in Figure 3–1. Your data is simply written to at least two different places at
    the same time, creating one or more copies of your data on a separate disk. In
    the event of a drive failure, the array is still completely available because
    at least one other copy of the drive is still online and functional.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 42](index-58_1.png)


    40


    ## CHAPTER 3: Some Basics


    ### RAID 5


    This level is also known as striping with parity. It is very similar to `RAID
    0`, with one additional disk needed to hold the parity bit that gets striped across
    all disks. Figure 3–5 illustrates an example configuration. Without a doubt, `RAID
    5` is a favorite `RAID` level, and I have seen it used by many administrators.


    **Figure 3–5.** *Example `RAID 5` configuration*


    The reason for `RAID 5` being so well liked is that if one disk fails, you simply
    have to add in a new disk (before a second disk fails; otherwise, you lose *everything*)
    and the array will rebuild itself. Sounds nice, huh? While `RAID 5` can offer
    better performance than `RAID 1`, the overhead for that parity bit means it will
    not perform as well as `RAID 0`. But you do get fault tolerance with `RAID 5`,
    and that is why so many administrators love using `RAID 5` over anything else.


    ```

    BATTLE AGAINST ANY RAID 5?


    by Jonathan Gennick

