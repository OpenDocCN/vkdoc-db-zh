  trans: '

    # 第九章：连接、学习、分享


    **作者：贾里德·斯蒂尔 (Jared Still)**


    我鼓励任何希望成为更好沟通者的人开始写作，或许可以从撰写个人博客开始。不要以为写博客就意味着你认为有人关心你说什么。相信我，他们并不关心。不，你需要将博客视为提升自己写作能力的一种方式。随着时间的推移，你会考虑写点什么发布到某个网站上。这将是你与他人分享经验、与他们建立联系并帮助别人学到新东西的机会。


    渐渐地，在写了很多东西之后，你会想和别人谈谈它。


    **发现问题。做研究。写作。**


    开始写作的一个好方法是找到一个你不知道答案的问题。研究这个问题。当你感觉有了一些有价值的东西可以贡献时，就提出一个解决方案。你可以将你的发现写在论坛里或作为一篇博客文章发布。选择让你感觉最自在的媒介。


    不要过于谦虚。任何做过一些研究并对相关技术有所了解的人都能做出有价值的贡献。你会学到新东西，而且你的努力也很可能会改善你的社交网络。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 158](img/index-168_1.png)


    ## 开始演讲


    我从 18 岁起就开始担任领导职务。因此，我已经在众人面前站立并发表演讲很长时间了。


    然而，每次在他人面前讲话，我都会紧张。我仍然记得作为一名研究生教授代数时有多紧张，那当然不是因为我不熟悉内容，或者我认为听众中有人比我更懂二项式。


    有一次我参加一个会议，我的一位好朋友正在做报告。她有点紧张，但她告诉我，为了提高公开演讲能力，她开始唱卡拉 OK，因为如果你能在陌生人面前唱歌，那么讲话就容易了。我同意这个说法；但你不会很快在酒吧里找到我唱歌。对我来说，对抗紧张的唯一方法就是直接开始。一旦我开始了，就会变得容易一些。


    真正让我感觉更好的是，当我能与听众中的一些人互动时。


    很多时候，在开始之前，我会在前几排找个人聊聊天，而其他人正在就座。这能让我放松下来，并让我稍微热身一下。


    **提示：** 在做报告之前，一定要花时间热身，这会提升你报告的质量。


    另一种让你自己和你的听众放松的方法是在演讲过程中讲故事。你可能听过人们说，你应该在演讲开始时讲个笑话，以帮助大家放松，包括你自己。我发现，通常最好的演讲者是在整个报告中穿插轶事趣闻的人。讲故事是一种向数百人同时传达信息的有力方式。


    现在，并非每个人都需要具备向数百人演讲的能力。我想我一次面对过的最多听众不到两百人。出席演讲的人数对我来说其实并不重要，最重要的是听众和我的材料。这就是为什么对我来说，尽快与听众建立联系很重要。这样做将使我更容易与他们分享我的信息，并希望他们也能学到东西。


    我的第一次技术演讲是在一个本地用户小组进行的。我利用小组的反馈，为同年晚些时候在一个全国性会议上的演讲做准备。从那时起，我已经以各种形式演讲了数十次。我发现一个事实是，大多数人对讲故事或轶事趣闻的共鸣，比对直截了当的技术讨论更好。我努力成为一个好的讲故事者，但我离我希望有一天能达到的水平还差得远。这就是为什么我继续做演讲，因为我想不断进步。


    我想进步的原因不是因为我总想在会议上发表演讲。我想进步是为了能够随时随地向我的同行发表演讲。更重要的是那些需要向高层管理人员做报告的时候。我希望能够像沟通技巧良好的人一样，自信地进行我的演讲。这意味着我需要练习说话，这意味着我需要做更多的写作，参加更多的活动，并做更多的阅读。


    它们共同作用，使你成为一个更好的沟通者。


    ## 克服恐惧


    ### 作者：乔纳森·杰尼克 (Jonathan Gennick)


    汤姆的朋友用卡拉 OK 来提高她在公开演讲中的信心。对我来说，帮助很大的是与一个青年团体合作。


    在我职业生涯早期，我对公开演讲非常恐惧，以至于我会断然拒绝任何在众人面前讲话的请求。后来有一天，我被拉去帮助我所在教堂的一个青年团体。我不太清楚那是怎么发生的，但突然间，我就站在了十几个青少年和准青少年面前，他们会在我感到无聊时随时嘲笑、起哄并愉快地告诉我。


    相比之下，成年人要礼貌得多。我现在有时还是会紧张，我也不是最好的演讲者，但恐惧已经消失了。当我紧张时，那是健康的那种紧张，来自于担心一切能否按计划进行。曾经一想到要在一群人面前讲话就会袭来的、令人恐慌的冰冷恐惧感，已经消失了。


    ### 专业协会


    多年前，我有机会参加了一个专业协会的会议。


    在那之前，我一直认为会议就是人们去坐在房间里听讲座的地方。当我看到供应商和他们的展台时，我第一次意识到会议不止于此。我开始明白，这不仅仅是参加一些无聊的讲座；这个活动有一种真正的活力。人们不仅仅是在学习；*他们是在建立连接*。


    这个会议是由一个专业协会举办的。那时我对专业协会的唯一了解是我在研究生院时加入了几个协会。每个学生默认都注册了一两个协会。这意味着我们会在信箱里收到每月的通讯，仅此而已。我认识的唯一其他会员就是我的同学们。


    在这次会议期间，我开始更多地了解加入专业协会的好处。作为会员，人们有机会及时了解其行业的最新趋势。他们获得了无尽的社交机会；与许多其他志同道合的人建立连接、学习和分享。


    **提示：** 人多力量大；成为专业协会的会员可以赋予你巨大的力量。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 160](img/index-170_1.png)


    在我成为一名数据库管理员后，我参加了一次我的第一次会议。那是由 SQL Server 专业协会 (PASS) 举办的。我决心尽可能地享受会员的所有好处。我想成为我能做到的最好的
    DBA，而我知道实现这一目标的方法之一就是加入一个专业协会。

    '
- fmt: 'On the first day of the conference, I met two people that have remained close
    colleagues to this day. Following the conference I remained in touch with these
    two individuals and we were able to help each other from time to time. Not just
    when issues arose, but also for very general questions regarding best practices.
    When we did not have answers for each other, we did our best to help point each
    other in the right direction.


    By the time I attended my third PASS conference, I had a network of roughly 30
    people that I could rely on for similar help. I was also surprised that the more
    experience I got then the more I was able to help others. Soon enough I found
    myself starting to write articles for publication as I wanted to share my experiences
    with others. There is no doubt that I have personally grown as a database professional
    simply by becoming a member of PASS.


    Through the years my involvement with PASS has given me chances to speak and to
    write. More importantly, it has given me the chance to meet others. I like to
    stress to people the fact that PASS is an *association* of database professionals.
    I often get asked the question “Why should I bother joining any professional association?”
    Following are the answers I often give.


    ## Latest Trade Information


    Being a member of a professional association allows for you to stay informed about
    the latest in industry trends. Sure, you could hope to get the latest information
    from web sites, blogs, and magazines. However, when you are a member you tend
    to get access to information *before* it ends up in print. This kind of insider
    access can be invaluable when you are architecting your environment.


    Membership allows for more than just cutting edge information on industry trends.
    You also get information on products and services specific to your industry. Typically
    vendors will target a professional association and their members when it comes
    to their products. Nowhere is this more evident than at a conference. You will
    see dozens of vendors lined up to show you their products in the hopes that they
    can earn your business. This allows for you to get an idea for lots of products
    and how they could be applicable for your shop.


    Still another advantage would be the ability to exchange information with other
    members regarding processes; in other words, ask “How do you do this in your shop?”
    You will find that many members are willing to help other members by sharing their
    experiences.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 161](index-171_1.png)


    ## CHAPTER 9: Connect. Learn. Share.


    **153**


    ## Writing Opportunities


    Most professional associations offer some type of publication. It could be a web
    site, a newsletter in the form of an e-mail, or a printed journal. It does not
    really matter as to the type and form of communication used; each is an opportunity
    for you to write and be published. The more you write and get published the more
    name recognition you will build over time.


    **TIP:** Yes, writing opportunities would include a book, believe it or not.


    You may soon find yourself being offered additional writing opportunities. Remember
    all those vendors that target professional associations? Well, they like to have
    people write articles, tech briefs, and white papers. There may even be the chance
    for you to collaborate on a book (or even write your very own).


    ## Speaking Opportunities


    Many professional associations have annual meetings or conferences. By being a
    member you increase your chances of securing a speaking opportunity. Some associations
    also have local meetings that are less informal but still offer you an opportunity
    to participate by speaking. You may not always need to be a member in order to
    speak, but it certainly never hurts your chances.


    There is also the chance that you could find speaking opportunities simply by
    responding to advertisements in trade publications or journals. It is possible
    that a company or organization could be looking for someone with specialization.
    They may contact your association in order to find someone willing to speak on
    a particular subject. I have often seen this done when a company is looking for
    someone to conduct some training, but I have also seen it done by companies looking
    to put together a larger one day event.


    ## Networking


    You certainly do not need to join a professional association if you want to do
    some networking. But if you were to get started in networking, would it not make
    sense to network with others in your industry? Why spend time networking with
    other professionals outside your field?


    In addition to networking with other professionals in your particular field, you
    will be able to network with vendors, which can be quite valuable especially when
    you need some quick support.


    Of course, one of the biggest advantages to networking is the career opportunities
    that can arise as a result. You never know when a job will open up; it is nice
    when you are the first person that someone thinks of when an opportunity arises.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 162](index-172_1.png)


    **154**


    ## CHAPTER 9: Connect. Learn. Share.


    Networking can be hard to understand and even harder to get started. Let’s review
    some of the basics of networking in order to help you get started.


    ### Networking Basics


    I know more than a handful of people that think of networking as a dirty word.
    Being a shy person I find it difficult to get accustomed to networking as much
    as anyone else. I do, however, understand the value in building a wide network
    and how it allows you to connect, learn, and share with others. Still many people
    seem to understand the real purpose of networking.


    The purpose of networking is to build a series of mutually beneficial relationships.


    Seriously, it is that simple. The whole idea of creating a network is to build
    relationships that benefit both parties. Sometimes you will need help from your
    network. Other times, you will be able to help others in your network. Plus, the
    more help you give to people in your network the more help you are likely to receive
    in return.


    **TIP:** Think of your career as a ship, and your network as your crew. If you
    want to sail far, then you need a reliable crew. The larger your ship, the larger
    your network needs to be.


    But how does someone go about building such a network? It is certainly not an
    easy thing to do for most people. Meeting new people when you are in a room full
    of individuals that all seem to be interacting nicely with each other is not something
    that comes naturally for many. It can seem rather overwhelming to meet strangers.


    ### Building Your Network


    To build your network you will need to meet other people. There is really no other
    way; you simply have to interact with others. This can be done through either
    a physical interaction (say, a networking event) or through what is called social
    networking. Social networking involves web sites that specialize in your ability
    to interact with others in online forums. Some of the more well-known social networking
    sites are `Twitter`, `Facebook`, and `LinkedIn`.


    Many people find it easier to interact socially online with strangers than if
    they were to interact physically with others in a group setting. Even in situations
    that are not necessarily a networking event some people find it awkward to talk
    to strangers.


    Consider the following scenario:


    *John was in need of buying a replacement headlight for his car. John* *was not
    mechanically inclined in any way and typically he would just go* *to the dealer
    for any type of repair. This time he decided that he was* *going to try to fix
    something for himself because others had told him* *how satisfying it was to do
    so.*


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 163](index-173_1.png)'
