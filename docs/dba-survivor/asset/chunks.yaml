    的职业生涯历经多个职位，包括程序员、分析师和 DBA。在成为 DBA 之前，他曾在美国和海外的客户现场就职于多家软件和咨询公司。Thomas 拥有华盛顿州立大学数学硕士学位，是
    Quest Software 的 SQL Server 专家协会成员，目前服务于 SQL Server 专业协会 (PASS) 的董事会，并且是 SQL Server
    MVP。


