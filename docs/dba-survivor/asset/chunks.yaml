    It is a life goal of mine to live and work in the south of France. Anywhere would
    be fine, really—I am not picky. A quick search for technical jobs in France shows
    more than a handful that I am qualified for. So, why am I not living and working
    in France right now?


    Because I don’t speak the language well enough to work as a database professional.


    And speaking the native language is a fairly important skill to have.


    Are there any database professional jobs available for someone that has limited
    language skills? Probably, but how much time do I want to spend trying to arrange
    for interviews with people I do not know? It would be better for me to let my
    network know I am interested and then wait for the right opportunity to find me.


    **TIP:** I always admire people that take the time to learn a second language,
    and I do my best to help them communicate when possible.


    Let’s reverse the scenario and suppose that someone from another country comes
    to me looking for a job. Would I hire them if they had all the necessary skills
    except being able to communicate in English? Of course not—no one would hire someone
    that cannot speak the language for a job that requires good communication skills.


    I also like to evaluate the importance of the candidate’s communication skills
    when interviewing them. If you are going to be required to communicate with customers,
    then the ability to speak clearly is important. If you only interact with the
    DBA team, I may be more forgiving when it comes to your ability to speak clearly.


    Sylvester Carstarphen


    And yet that is a common practice with outsourcing. For whatever reason, people
    simply accept someone with below-average communication skills instead of saying,
    “I’m sorry, but we need someone that can speak our language better.” We never
    hesitated when it came to communication skills. If I was not able to understand
    a candidate during the interview, then my customers would have no chance of understanding
    them.


    So we held out for a candidate that could communicate, and emphasized that over
    technical skills. I felt I could teach anyone the skills they needed, but I could
    not teach them English. I did not need a senior administrator; I would take a
    junior administrator that could speak well instead. And in order to handle any
    turnover, we would always keep a shadow resource on staff so that we could easily
    transition new members to the team without suffering loss of support.


    `www.it-ebooks.info`


    ![Image 95](index-111_1.png)


    ## Security


    Another common concern with outsourcing centers on the security of the company’s
    data. I am certain that this is a natural concern and a valid one in today’s global
    electronic society, but I also never understood how it is different than when
    you hire any new employee. I suppose you may say that it is different because
    the outsource team is outside your network, or that you cannot see what they are
    doing while at their desks, but there are plenty of ways to monitor their activities
    if necessary. Besides, the risk of data theft is real enough and can happen from
    anywhere—inside your network as well as outside.


    We listed this as a concern as well when we first started. So much so that we
    talked about not allowing our outsource team to handle anything related to security.
    After a while, we understood that many security requests are operational in nature,
    and we made an easy transition to have those tasks outsourced. After all, we needed
    them to perform these tasks so that we could free up time to focus on some larger
    issues with regard to instance configurations, baselines, and monitoring.


    I would suggest that you treat your outsource partner as you would any other partner
    when it comes to matters of security. Define what tasks are allowable; you may
    have some security items that are not allowed to be done by anyone else. And keep
    in mind that there is a difference between what you *need* to remain in house
    and what you *want* to remain.


    ## Job Security


    One summer during college I had a job doing piece work in a furniture factory.


    Essentially, I would assemble different pieces of what would become frames for
    things like chairs and sofas. I rarely ever saw the finished product, as all we
    were contracted to do was build a frame and send it off to a different shop where
    they would finish the actual piece.


    As I started getting used to the environment and the work, I also started getting
    faster at producing my pieces. I would get started, figure out an efficient way
    to maximize my output, and focus on getting the job done. I enjoyed the work and
    enjoyed keeping track of how well I was doing. The man working next to my table
    would keep pace with me as well. We could talk while we worked and managed to
    get a lot of work done.


    **TIP:** You should spend more time focusing on your own efforts and less time
    worrying about someone else. Focus on what you can control; otherwise, you will
    quickly become frustrated.


    One day we were approached by a coworker who said simply, “Slow down; you guys
    are making us look bad.”


    I had no idea that my doing good work would be considered a bad thing by others.


    Sure, I was aware of things like how a person doing well on an exam can throw
    off the grading curve for the whole class, but this was different. First, this
    man was serious.


    `www.it-ebooks.info`


    ![Image 96](index-112_1.png)


    Second, he had access to lots of tools and machines that could hurt me, especially
    in an industrial “accident.” I didn’t know what to say, but the man next to me
    sure did: “Get out of here,” he said. “Try doing some work yourself for a change,
    and don’t ever tell us we are going too fast. The only one making you look bad
    is yourself.”


    When it comes to outsourcing, many people are apprehensive. They do not want to
    see the tasks they perform being done by someone else, and they especially don’t
    want someone else to start doing them better than they were able to do. This is
    a natural reaction and quite understandable. Except, well, I don’t understand
    it.


    Maybe it is the `Tom Sawyer` in me, but if I can find someone else to paint the
    fence for me, I will. I have never felt threatened by letting someone else take
    on tasks that I was doing. I always saw that as an opportunity for me to start
    doing something new and greater. I would be allowed to shift my focus, learn new
    things, take on greater responsibilities, and grow as an individual.


    I was never afraid of handing tasks to our outsource team. I would have people
    in our department tell me, “If you give them too much work, then there won’t be
    any need to keep you.” I could never understand that way of thinking. From the
    moment we decided to outsource, I was only looking forward and never worried about
    losing my own job.


    ## All Good Things


    My outsourcing experience has been quite positive. Apparently I am an aberration,
    according to the many people who talk about how bad it is to outsource. What I
    find funny is when someone considers outsourcing to mean that a particular role
    or function is sent overseas, and doesn’t understand that hiring a contractor
    to come onsite is the same thing. If you are hiring someone to help you with some
    defined tasks, does it really matter where they sit? Why are you comfortable if
    they sit next to you and do part of your job, and not as comfortable if they are
    not near you?'
  raw: 'It is a life goal of mine to live and work in the south of France. Anywhere
    would be fine, really—I am not picky. A quick search for technical jobs in France
    shows more than a handful that I am qualified for. So, why am I not living and
    working in France right now?


    Because I don’t speak the language well enough to work as a database professional.


    And speaking the native language is a fairly important skill to have.


    Are there any database professional jobs available for someone that has limited
    language skills? Probably, but how much time do I want to spend trying to arrange
    for interviews with people I do not know? It would be better for me to let my
    network know I am interested and then wait for the right opportunity to find me.


    **TIP:** I always admire people that take the time to learn a second language,
    and I do my best to help them communicate when possible.


    Let’s reverse the scenario and suppose that someone from another country comes
    to me looking for a job. Would I hire them if they had all the necessary skills
    except being able to communicate in English? Of course not—no one would hire someone
    that cannot speak the language for a job that requires good communication skills.


    *I also like to evaluate the importance of the candidate’s communication* *skills
    when interviewing them. If you are going to be required to* *communicate with
    customers, then the ability to speak clearly is*


    *important. If you only interact with the DBA team, I may be more*


    *forgiving when it comes to your ability to speak clearly.*


    Sylvester Carstarphen


    And yet that is a common practice with outsourcing. For whatever reason, people
    simply accept someone with below-average communication skills instead of saying,
    “I’m sorry, but we need someone that can speak our language better.” We never
    hesitated when it came to communication skills. If I was not able to understand
    a candidate during the interview, then my customers would have no chance of understanding
    them.


    So we held out for a candidate that could communicate, and emphasized that over
    technical skills. I felt I could teach anyone the skills they needed, but I could
    not teach them English. I did not need a senior administrator; I would take a
    junior administrator that could speak well instead. And in order to handle any
    turnover, we would always keep a shadow resource on staff so that we could easily
    transition new members to the team without suffering loss of support.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 95](index-111_1.png)


    **CHAPTER 5: Production Support**


    **93**


    **Security**


    Another common concern with outsourcing centers on the security of the company’s
    data. I am certain that this is a natural concern and a valid one in today’s global
    electronic society, but I also never understood how it is different than when
    you hire any new employee. I suppose you may say that it is different because
    the outsource team is outside your network, or that you cannot see what they are
    doing while at their desks, but there are plenty of ways to monitor their activities
    if necessary. Besides, the risk of data theft is real enough and can happen from
    anywhere—inside your network as well as outside.


    We listed this as a concern as well when we first started. So much so that we
    talked about not allowing our outsource team to handle anything related to security.
    After a while, we understood that many security requests are operational in nature,
    and we made an easy transition to have those tasks outsourced. After all, we needed
    them to perform these tasks so that we could free up time to focus on some larger
    issues with regard to instance configurations, baselines, and monitoring.


    I would suggest that you treat your outsource partner as you would any other partner
    when it comes to matters of security. Define what tasks are allowable; you may
    have some security items that are not allowed to be done by anyone else. And keep
    in mind that there is a difference between what you *need* to remain in house
    and what you *want* to remain.


    **Job Security**


    One summer during college I had a job doing piece work in a furniture factory.


    Essentially, I would assemble different pieces of what would become frames for
    things like chairs and sofas. I rarely ever saw the finished product, as all we
    were contracted to do was build a frame and send it off to a different shop where
    they would finish the actual piece.


    As I started getting used to the environment and the work, I also started getting
    faster at producing my pieces. I would get started, figure out an efficient way
    to maximize my output, and focus on getting the job done. I enjoyed the work and
    enjoyed keeping track of how well I was doing. The man working next to my table
    would keep pace with me as well. We could talk while we worked and managed to
    get a lot of work done.


    **TIP:** You should spend more time focusing on your own efforts and less time
    worrying about someone else. Focus on what you can control; otherwise, you will
    quickly become frustrated.


    One day we were approached by a coworker who said simply, “Slow down; you guys
    are making us look bad.”


    I had no idea that my doing good work would be considered a bad thing by others.


    Sure, I was aware of things like how a person doing well on an exam can throw
    off the grading curve for the whole class, but this was different. First, this
    man was serious.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 96](index-112_1.png)


    **94**


    **CHAPTER 5: Production Support**


    Second, he had access to lots of tools and machines that could hurt me, especially
    in an industrial “accident.” I didn’t know what to say, but the man next to me
    sure did: “Get out of here,” he said. “Try doing some work yourself for a change,
    and don’t ever tell us we are going too fast. The only one making you look bad
    is yourself.”


    When it comes to outsourcing, many people are apprehensive. They do not want to
    see the tasks they perform being done by someone else, and they especially don’t
    want someone else to start doing them better than they were able to do. This is
    a natural reaction and quite understandable. Except, well, I don’t understand
    it.


    Maybe it is the Tom Sawyer in me, but if I can find someone else to paint the
    fence for me, I will. I have never felt threatened by letting someone else take
    on tasks that I was doing. I always saw that as an opportunity for me to start
    doing something new and greater. I would be allowed to shift my focus, learn new
