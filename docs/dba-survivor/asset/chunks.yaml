  trans: '

    ## 应对内向性格


    并非所有技术人员都内向，但很多人确实如此。我们工作的性质需要细致、能长时间独立工作的人。这些特质与外向的销售人员形成鲜明对比——后者能在 10 分钟内结识
    15 个新朋友，并迅速与所有人成为密友。我们则是那种可以坐在 100 人的会议厅里听完讲座，走出来时却一个人都没认识的人。


    然而，职业成功要求我们让自己被看见。有时我们需要挺身而出领导团队，或就我们所知进行展示。我们需要自在地与人会面、协作。并且，我们需要在做这些事情的同时，保持真实的自我，尊重我们与生俱来的个性。


    ## 认识到这并无不妥


    如果你发现自己是那种想要独自吃午餐的人，请不要绝望。你首先应该做的是：


    ### 意识到你的组合方式并无错误。


    是的，这是事实。如果我们的整个社会都由那些跑来跑去、互相结识的“社交泡泡”组成，我们都会陷入困境。我们需要那些外向的人。


    例如，你的公司需要销售团队。但我们也需要所有其他性格类型。那些销售人员需要产品和服务来销售。


    关键是“认识你自己”。了解你自己的舒适区。发挥你的长处。


    培养你所欠缺的技能。你实际上可以把“外向”当作另一项需要掌握的技能来对待。这样做将在个人和工作满意度方面带来丰厚的回报。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 32](img/index-48_1.png)


    **30**


    **第二章：现在我该做什么？**


    **注意：** 一本关于性格特质的好书是戴维·凯尔西和玛丽莲·贝茨合著的《*请理解我*》（普罗米修斯·涅墨西斯出版社，1984 年）。


    ## 照顾好自己


    内向者的决定性特质有时被认为是：


    ### 内向者从独处中汲取能量，而在社交场合中消耗能量。


    这听起来像你吗？如果是，那么不要害怕设定一些界限。


    例如，在出差参加会议时，我的编辑通常会为自己预留早餐时间。那是他的“自我时间”，可以为一天充电。他也会在午餐时间让自己下班。如果你路过 Apress 展台，他会主动与你交流，但在午餐时，他会关闭“推销模式”，只是享受一顿美餐。


    与同事一起旅行时，不要觉得有义务每分每秒都和他们待在一起。告诉同事你需要一些独处时间，宁愿不去酒吧喝到凌晨两点，这完全没问题。坦率地说明你这样做的原因。同事们会理解的。有些人可能会承认自己有同样的情况。


    我刚才说和同事一起吃午餐了吗？我现在要自相矛盾一下：如果你需要一些空间，我允许你独自用餐。午餐是与同事交流、更好地了解他们的绝佳场合。但你不必每一顿饭都和他们一起。先照顾好自己。如果你需要独自吃午餐来为下午理清思路，那就去吧。


    ## 开放坦率


    不要试图成为你不是的人。不要害怕承认自己不是超级外向的人。有时当我想认识某人时，我会直接走过去告诉对方我想认识他们。这是一种缺乏微妙性的直率方法，但为什么不呢？如果你对人们感兴趣，并试图与他们交好，大多数人会积极回应，无论你的努力显得多么笨拙。


    ## 加入一些组织


    组织提供了结构。这种结构使人更容易踏出舒适区。这就是像“SQL Server 专业人士协会”（PASS）这样的组织如此有价值的原因。它们提供了一个社交上安全的场所来建立专业联系。其他成员也在场是为了同样的目的，这只会有所帮助。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 33](img/index-49_1.png)


    **第二章：现在我该做什么？**


    **31**


    组织也提供了领导、发展演讲和展示技能的机会。你可以从小处着手。你不需要第一次演讲就在有 1000 个座位的大厅里进行。从本地的用户组开始。随着你的舒适感和信心增长，逐步提升。


    也不要只围绕工作。你在社区或教会组织工作中培养的技能和信心，很容易转化到职业领域。如果你能与人们合作在社区中有所作为，那么你就知道你也能在工作中做到同样的事。


    ### 认识到这并无不妥


    我们刚刚有过这个标题吗？确实有，但这个观点非常重要，值得重复。一个可悲的事实是，社会普遍倾向于对活泼外向的人报以微笑，而对安静内向的人皱眉。这是一种不幸且错误的态度。不要被其裹挟！


    我关于发展人际交往能力所说的一切，都只有一个目标：发展你的人际交往能力。不要试图把自己变成你不是的样子。


    你的个性是你擅长工作的重要组成部分。不要对抗这种优势。发挥你的长处。同时，努力在其他领域发展你的技能。这两件事并行不悖，并无矛盾。


    ### 对话开场白与寒暄


    **乔纳森·格尼克**


    在社交场合中进行寒暄的艺术，对我来说并非轻松自然就能掌握的。即使在小学时，我也会注意到有些人可以坐到午餐桌旁，几乎立刻就能与周围的每个人聊起来。更重要的是，话题会以我几乎无法跟上的方式不断转换。就在一个话题变得有趣，我准备深入发表评论时，突然整个群体又开始谈论别的了。我总是慢半拍。


    在商业场合，掌握一些开启对话的技巧很有帮助。我最喜欢的开始对话的方式之一是提问。如果你在像 PASS 这样的会议上碰巧看到我在 Apress 展台，你最有可能被问到的问题是：你有我们的书吗？这是一个合乎逻辑的问题，通常会引发一些关于具体书籍及其优缺点的来回交流。


    我的问题是一个很好的对话开场白，但它也是真诚的。我真的很想知道读者喜欢和不喜欢我们书籍的哪些方面。我想知道哪些主题能引起读者的共鸣，哪些不能。说真的，我渴望得到帮助，以便更好地完成我的工作。


    我可能还会问其他问题。有时一个公司名会让我觉得有趣。其他时候我会看到我去过或居住过的城市名字。提问是让对话滚动起来的好方法。但要真诚。不要仅仅表现出兴趣。要真正感兴趣。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 34](img/index-50_1.png)


    **32**


    **第二章：现在我该做什么？**


    ## 追踪你的进展


    还记得那个清单吗？很好，因为你需要它来规划未来几周的进展。作为一名 DBA，你的很多工作都是在幕后完成的。事实上，人们常常会好奇你整天都在做什么，因为你的大部分工作最终用户根本看不到。当你试图向人们展示你所交付的一些切实成果时，你的清单将对你大有裨益。

