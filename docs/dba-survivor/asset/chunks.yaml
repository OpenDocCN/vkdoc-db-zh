    # 前言


    你手中的这本书，凝聚了关于 `database` 管理领域的大量洞见与智慧，这些都是通过多年艰苦卓绝的经验、无数个挑灯夜读的夜晚，以及在一些业内最具才华的
    `database` 专业人士和信息技术（`IT`）专家直接指导下所获得的。


    想一想大学里培训我们这一行人的标准方法。许多学院和大学提供“计算机科学”课程，鼓励其毕业生从事“软件工程”这一收入丰厚的职业。然而，任何在计算机技术领域工作过相当一段时间的人都会告诉你，这些术语常常具有误导性。毕竟，任何一门科学都以
    `Scientific Method`（科学方法）为基础：描述你的观察和经验，提出假设，进行逻辑推断预测，并通过一项或多项实验来检验假设和预测。这听起来像是信息技术专家和计算机程序员所做的工作吗？不是“不”，而是“绝对不”！虽然确实有些计算技术专家会做实验（通常在处理器设计、网络技术设计、安全加密算法以及某些基础软件技术平台领域），但这可能只占全球信息技术劳动力总量的
    0.02%，而且通常需要博士学位。


    更进一步，让我们看看“软件 `engineer`（工程师）”这个术语。虽然 `engineer` 一词的完整定义可以写上好几段，但这个词的内涵意味着运用科学和数学知识来解决问题，得到可预测的结果，其运作和成果能够被可靠地预见。`Engineers`（工程师）严肃对待他们的职业，其信誉建立在设计出能够如预期般运作，且不会对广大公众造成意外伤害的成果之上。这听起来很像你的工作吗？这听起来像是你认识的任何从事
    `IT` 工作的人的工作吗？


    这不像我认识的任何 `IT` 专业人士。虽然 `IT` 行业多年来取得了许多进步，在产生可预测结果和减少意外后果方面的能力也大大提高，但我们每天仍然面临着热修复、软件补丁和无数的中断，这使得计算机编程和
    `IT` 无法被视为一门科学，也无法被视为一门工程学科。


    因此，我对我们所选择的职业道路提出另一种解读。当我们审视人类事业的范畴时，我们可以看到许多职业和学科与我们作为 `IT` 专业人士（或 `IT` 专业人士的向往者）的经历非常相似。但最接近的匹配并不在计算机领域，而是在创意艺术领域。不信吗？看看这个对比。


    `Engineers`（工程师）和科学家需要全面而深入地理解他们学科的细枝末节。我的一个好朋友是真正的火箭科学家，为 `NASA` 工作，他对计量学（用于火箭结构）和化学（用于火箭燃料）拥有百科全书式的知识。这不是我们需要的。你上次与一位对其所选
    `database` 平台用于缓冲 `x` 数据进出 `system RAM` 的 `hashing`（哈希）算法有着详尽了解的 `database administrator`
    (`DBA`，数据库管理员) 是什么时候？相反，我们需要了解计算算法，大约就像雕塑家需要了解大理石和石英的分子晶体结构，或者音乐家需要了解声学共振的科学一样。你上次遇到一位音乐家坐下来和你讨论湿度和海拔对他们下一场演出的影响是什么时候？（也许并不奇怪，许多
    `IT` 专业人士同时也是兼职音乐家。）


    [www.it-ebooks.info](http://www.it-ebooks.info)

