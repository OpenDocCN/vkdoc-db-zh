  trans: '# 第 7 章：自助餐在哪里？


    或者，也许不是一个人主动提出，而是有人顺路过来问：“我们要去那家假装是健康泰餐馆的中餐馆，不过那儿的东西反正都是油炸的。要一起来吗？”你想说不，但你平时也不常去那儿，觉得这算是个犒劳。于是你起身和几个朋友一起去吃点东西，并保证回家后去慢跑（你才不会）。


    我想明确一点：`我们单独一个人都没集体行动时那么蠢`。看着一群人做出他们作为个体不会做的糟糕决定，真是令人惊讶。这种情况经常发生，而且不仅仅是在食物方面。群体心态有种力量，能让聪明人显得不那么聪明。


    拒绝与同事社交互动的机会可能很难。


    而且你也不想成为群体中唯一坚持要去那种“菜单选择没有父母”（意指不健康快餐）的地方的人。但你确实需要留意，当这种情况出现时，你得有些备选方案。


    例如，你可以这样回答：“我带了午餐，但如果你打算把午餐带回这里吃，我不介意一起去散散步。” 看到了吗？你既散了步，有了社交互动，又能吃到更健康的午餐。


    什么？你没带午餐？那试试这样回应：“哦，我正打算去隔壁那家；我可以跟你们一起走，然后去我本来要去的那家吃点东西，那家店不会让我在 39 岁前就心脏病发作。”


    看到这有多简单了吗？你仍然可以在更健康的地方买午餐，仍然可以和同事一起散步。如果真有双赢的话，这就是一个。


    最终的结果应该是，你尽最大努力避免不健康的选择，仅仅因为你身处群体之中。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 132](img/index-142_1.png)


    ## 欢乐时光


    没有什么比“欢乐时光”更能体现同伴压力了。下班后和同事一起喝上几品脱拉格啤酒，可能会导致额外摄入数千卡路里，因为你喝了好几品脱啤酒，还吃了一些开胃小菜。如果有几位高管在场，他们要是请你喝一轮，那压力只会更大。毕竟，没人想对大老板说不。


    很可能你更愿意喝那杯酒，因为它会给你机会聊上几分钟。相信我，如果老板请客喝酒，你多半不会去计算卡路里。如果你们是一群人在场，更是如此，因为你已经知道`我们单独一个人都没集体行动时那么蠢`。


    如何避免这种情况？嗯，你总可以拒绝参加这种活动。当然，你可能觉得社交很重要。那么，为什么不只待一小会儿——比如 30 分钟——然后找个借口离开呢？这样看起来两全其美。你既能与同事社交，又能避免人们多喝几杯后必然发生的那些额外的不健康饮食。


    **提示：** 如果你觉得你的工作依赖于参加此类活动，那么你将需要采取措施避免同伴压力，接受体重会增加的事实，或者找一份新工作。


    如果你要去欢乐时光，在出发前应该先喝点水。用水填满肚子会让你的身体误以为已经吃过东西了，这样你会不那么想吃零食（也希望不那么想喝酒）。


    ## 出差旅行


    出差也可能导致糟糕的营养选择。你身处一个陌生的地方，最终只能从客房服务点餐，而且还能用公司报销账户。这一切加起来，当你决定尝试点不一样的东西时，就多了很多额外的卡路里。


    为什么不呢？如果你在路上，为什么不犒劳自己，尝点和你平时吃的扁豆糕配菠菜沙拉不一样的晚餐呢？


    旅行时要记住的是适度。你想吃一个三重培根芝士汉堡？可以，但别让它成为你每晚的晚餐。确保喝大量的水，并在其他晚上不辞辛苦地选择更健康的选项。你可能会发现坚持规律作息很难，因为你可能根本没有规律，除非你经常出差。


    我喜欢在旅行时租车，因为这样我可以选择去当地的杂货店。这不仅省钱，而且我发现这样能获得最广泛的餐食选择。当然，我没有厨房，但现在许多超市都有我可以品尝的预制餐食，或者沙拉吧，甚至可能还有寿司。


    旅行时，你希望一切尽可能像在家里一样。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 133](img/index-143_1.png)


    在家时，你的饭菜通常是在当地超市购买的食材做的，对吧？如果是这样，那为什么在路上不能也吃超市的食物呢？即使你只在镇上待两个晚上，你也可以去一趟超市，买一些早餐、午餐和晚餐的食材，这些会比客房服务菜单上的任何东西都更有营养。


    **提示：** 如今你可以在网上找到很多很棒的旅行小贴士。和任何建议一样，你需要亲自尝试，看看什么最适合你。


    出差时更困难的部分，是与不常见面的人一起出去吃饭的诱惑。也许你会和几个同事共进午餐，和另外的人共进晚餐。或者约在某个当地的煎饼宫殿吃早餐。你很容易发现自己总是和各种不同的人在外面吃饭。


    这可能很困难，但在出差时做出好的选择、让自己处于好的情境中并非不可能。有时需要一点创造力。几乎总是需要投入精力。无论付出什么代价，去做吧。不要放弃自己。你值得这份努力。


    ## 锻炼


    我知道当大多数人听到`锻炼`这个词时，他们会想到一些困难和费力的事情。他们想象着无休止的慢跑、举重、游泳、气喘吁吁，以及即使回到办公室也汗湿衣服。


    他们还会想象肌肉酸痛、背痛，并且觉得自己一天中没有足够的时间做这些事。


    虽然以上对于大多数形式的锻炼来说确实是事实，但情况并非总是如此。有一种方法可以让你提高活动水平，而无需承担午餐时间去健身房那种出汗和紧张的压力。而且这是你几乎一辈子都在做的事情：走路。


    或者不走路


    **乔纳森·根尼克 (Jonathan Gennick)**


    汤姆推荐走路作为良好的锻炼当然是正确的。这是极好的锻炼，不需要任何特殊技能或设备。我住在一个小镇上，我利用这一点步行处理许多差事。


    但另一种观点是，找到一些你喜欢做的、有趣的、活跃的事情。甚至比走路更喜欢，我喜欢骑自行车——一直如此，从我小时候收到第一辆自行车开始就是。我说的不是那些原地不动的健身自行车。那些东西无聊得要命。但把我放在一辆能移动的自行车上，我会非常乐意骑上很长时间。我非常喜欢自行车，以至于我甚至在冬天的冰面上骑行，使用从芬兰进口的带钉轮胎。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 134](img/index-144_1.png)'
- fmt: '## 找到动力与增加步数


    找到一些能激励你、让自己活跃起来的事情。如果这件事是你整天都渴望去做的，那就更好了。把钱——不，是投资——花在需要的好装备上。当这项活动是你所热爱的时，锻炼会变得容易得多，也更自然。


    ### 增加步数的额外方法


    有几种方法可以将步行融入你的生活。你可以养只狗，在早晨或晚上带它散步。或者晚饭后和孩子们一起散步。你甚至可以在午休时间散步，也许就在街区周围转转。你真正要找的，是在一天或一周中增加额外的步数。


    一个增加步数的地方是把车停得离办公室更远一些。一个月大约有20个工作日。如果你每天把车停在离办公室远50英尺的地方，那么你每天就必须多走100英尺。乘以20个工作日，你一个月就多走了2000英尺，一年就是24000英尺——这几乎是5英里的步行路程。


    另一个增加步数的地方是，嗯，楼梯！有机会就走楼梯，特别是在只有一两层楼的时候。你的心脏日后会感谢你的。


    步行是世界上最受欢迎的锻炼形式之一。一点一滴的步数会随着时间累积起来；你只需要找到日常安排中那些可以增加步数的机会。


    如果你想采取极端措施，那么你应该考虑一下跑步机办公桌（[www.treadmill-desk.com](http://www.treadmill-desk.com)）。理念很简单：你以每小时1英里的速度在跑步机上行走，同时在办公桌前工作。每小时可以额外燃烧高达100卡路里，并且在工作的同时减轻体重。


    ## 定期锻炼的必要性


    你的每日或每周习惯中应该包括定期锻炼。定期锻炼会降低你的压力水平，保持身体健康，并提高你的能量水平。然而，尽管定期锻炼有诸多有据可查的好处，许多人还是没有努力将其纳入日常习惯。总似乎有一个借口，可以归为以下两类：工作太多，时间不够。


    如果你想为不做定期锻炼找一个轻松的借口，那么声称工作太多就是为你准备的。如今每个人都有处理不完的工作，尤其是**DBA**。我们被期望随时待命，并且总是在努力处理警报，甚至配置新的方法来主动维护一个稳定的环境。但你必须找到时间。对你来说，以某种方式抽出一些时间来提高活动水平是很重要的。你可以从每天多走几步开始，然后逐步过渡到定期步行。


    除了工作太多，你可能发现自己只是单纯地时间紧张。


    也许你的通勤时间略长于平均水平，而车里多花的那些分钟给了你一个借口，解释为什么一天中没有足够的时间照顾自己。对于声称没时间的人，我能给的唯一建议是写下你所有的活动，看看它们花了多长时间。通过评估当前时间花费在哪里，你可能会在一天中找到一些额外的时间。


    **提示：** 定期锻炼也是与其他专业人士建立联系的好方法，甚至可以是与你同公司的人。


    ## 睡眠


    你很可能听说过每晚至少睡足8小时不间断睡眠的好处。如果你还没听说过，那么让我第一个告诉你：*你需要休息*。每当我在夜间休息不足时，第二天早上往往会发现自己多买了一杯超大杯咖啡。整个白天似乎比平时更迷糊，我在晚餐时间就筋疲力尽了，然后到了晚上又精神起来，发现自己再次工作到深夜。第二天，这个循环又重复了。


    我认识的许多**DBA**都是渴望在职业生涯中变得更好的人。


    他们越是积极进取，就会被要求做出更多牺牲。人们最容易牺牲的事情之一就是睡眠。他们会多熬30分钟来读完一章或调整一些**T-SQL**，然后30分钟变成一个小时，等他们意识到时已是凌晨两点，而几小时后就需要起床了。


    长期休息不足会导致一系列问题，最轻的就是开车时睡着。也可能是生理上的，比如背痛，我经常在睡眠不足时出现。


    如果你发现自己养成了不良的睡眠习惯，一个简单的恢复正轨的方法是每晚早一点上床睡觉。把它想象成一个银行；前期投入一些额外的时间，日后可以收获红利。


    另一个要确保获得充足休息的原因是，有时你需要在休息不足的情况下工作。例如，当你需要在凌晨3点进行紧急修复工作时，你需要尽可能保持警觉才能做好工作。如果你一直睡眠不足，你会发现自己在半夜反应迟钝，这可能导致在最糟糕的时刻犯下容易避免的错误。


    **提示：** 想了解更多关于睡眠重要性的细节和信息，请查看[www.apa.org/topics/whysleep.html。](http://www.apa.org/topics/whysleep.html)


    ## 卡路里


    计算卡路里与营养或锻炼不是一回事。许多人为了降低卡路里摄入，千方百计地避免某些食物。我最喜欢的例子是点餐时搭配健怡汽水。虽然这个人喝水或果汁会更好，但他们不知为何认为，因为健怡汽水比普通汽水卡路里低，他们是在帮自己一个忙。对此我只想说：*健怡汽水会让你吃得更多*。


    **提示：** 请查看关于锻炼、碳水化合物、健怡汽水及其对大脑影响的所有详细信息，网址为[http://jp.physoc.org/content/587/8/1779.full](http://jp.physoc.org/content/587/8/1779.full)，它介绍了一项发表在《生理学杂志》上的研究；以及网址[www.menstuff.org/issues/byissue/dietsoda.html。](http://www.menstuff.org/issues/byissue/dietsoda.html)


    也请查看文章“能量饮料以神秘的方式发挥作用”，网址是[www.medicalnewstoday.com/articles/146062.php](http://www.medicalnewstoday.com/articles/146062.php)，它很好地解释了原始研究的结果。


    因为点了健怡汽水而吃得更多，其负面影响远大于喝普通汽水多摄入的额外卡路里。毕竟，你是愿意现在多摄入100卡路里，还是之后多摄入几百卡路里？底线是，如果你觉得有必要点健怡汽水，不如直接点些水吧。'
  raw: 'Find something active that motivates you. If it’s something you spend all
    day wishing you could do, so much the better. Spend—no, invest—the money in whatever
    good equipment and gear you need. Exercise is a lot easier and comes more naturally
    when the activity is something you’re passionate about.


    **Extra Steps**


    There are a handful of ways to incorporate walking into your life. You could get
    a dog and go for a walk in the morning or the evening. Or you could walk with
    your children after dinner. You could even take a walk during your lunchtime,
    perhaps taking a stroll around the block. What you are really looking for are
    extra steps in your day or week.


    One place to find extra steps is to park farther away from your office. There
    are roughly 20 working days in a month. If you park 50 feet farther away from
    your office, then you must walk 100 extra feet each day. Multiply that by 20 working
    days and you will have walked 2,000 extra feet in 1 month, and 24,000 extra feet
    in 1 year—that is almost 5


    miles of walking.


    Another place to find extra steps are, well, steps! Take the stairs when you have
    the chance, especially for only one or two flights. Your heart will thank you
    later.


    Walking is one of the most popular forms of exercise in the world. A few steps
    here and there add up over time; you just need to find where the extra steps are
    in your daily routine.


    If you want to go to an extreme measure, then you should look into the Treadmill
    Desk ([www.treadmill-desk.com](http://www.treadmill-desk.com)). The idea is simple:
    you walk on a treadmill going 1 mile per hour while you work at your desk. You
    can burn up to 100 extra calories per hour and lose weight while you work.


    **The Need for Regular Exercise**


    Part of your daily or weekly routine should include regular exercise. Regular
    exercise will reduce your stress levels, keep you in good health, and increase
    your energy level. Yet despite all of the documented benefits of regular exercise,
    many people do not make the effort to incorporate it into their daily routines.
    There always seems to be an excuse that falls into one of two camps: too much
    work and not enough time.


    If you are looking for the easy way out of doing regular exercise, then claiming
    to have too much work is the excuse for you. Everyone has more work than they
    can handle these days, especially a DBA. We are expected to be available at all
    hours and find ourselves always trying to get caught up on alerts and even configure
    new ways to be proactive in order to maintain a stable environment. But you must
    find the time. It is important for you to carve out some time, in some way, to
    raise your activity level. You can start small by taking extra steps every day
    and work your way up toward regular walks.


    In addition to having too much work, you can also find yourself simply short on
    time.


    Perhaps your commute is slightly longer than average and those extra minutes in
    the car provide you with an excuse as to why you do not have enough time in the
    day to care


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 135](index-145_1.png)


    **CHAPTER 7: Where’s the Buffet?**


    **127**


    for yourself. The only advice I can give someone who claims to have no time is
    to write down all your activities and see how long they are taking. You may find
    some extra time in your day by evaluating where your time is being spent currently.


    **TIP:** Regular exercise can also be a great way to network with other professionals,
    even some within your own company.


    **Sleep**


    Chances are you have heard about the benefits of having at least 8 hours of uninterrupted
    sleep per night. In case you have not yet heard, then let me be the first to tell
    you: *you need to get some rest*. Whenever I get too little rest during the night,
    I often find myself grabbing an extra-large cup of coffee the next morning. The
    entire day seems to be a little foggier than normal, I end up crashing around
    dinnertime, and I get a second wind and find myself working late again the next
    night. And the next day the cycle repeats.


    Many of the DBAs I know are people who are driven to become better at their careers.


    The more they are driven, the more sacrifices they will be asked to make. One
    of the easiest things that people tend to sacrifice is sleep. They will stay up
    an extra 30


    minutes to finish a chapter or tweak some T-SQL, and then the 30 minutes becomes
    an hour, and before they know any better it is 2:00 a.m. and they need to be up
    in a few hours.


    Not getting enough rest on a regular basis can lead to a host of problems, the
    least of which is falling asleep while driving. Or it could be physiological,
    such as a backache, which I often get when I have not had enough sleep.


    If you find yourself falling into bad sleep habits, a simple way to get back on
    track is to go to bed a little bit earlier each night. Think of it as a bank;
    invest some extra time up front and you can reap the dividends later on.


    Another reason to make certain you are getting enough rest is because of the times
    you will be needed to work on short rest. For example, when you are needed to
    perform some emergency repair work at 3:00 a.m., you need to be as alert as possible
    in order to do the job well. If you have not been getting enough sleep on a regular
    basis, you will find yourself sluggish in the middle of the night, which could
    lead to easy mistakes being made at the worst possible time.


    **TIP:** For more details and information on the importance of sleep, check out


    [www.apa.org/topics/whysleep.html.](http://www.apa.org/topics/whysleep.html)


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 136](index-146_1.png)


    **128**


    **CHAPTER 7: Where’s the Buffet?**


    **Calories**


    Counting calories is not the same as nutrition or exercise. Many people go out
    of their way to avoid certain foods in an effort to reduce their calories. My
    favorite is the ordering of diet soda with a meal. Although the person would be
    better off with water or juice, somehow they think that because a diet soda has
    fewer calories than a regular one, they are doing themselves a favor. To them
    I have one thing to say: *diet soda can make you* *eat more*.


    **TIP:** Check out all the gory details on exercise, carbohydrates, diet soda,
    and your brain at


    [http://jp.physoc.org/content/587/8/1779.full, which presents a study published
    in](http://jp.physoc.org/content/587/8/1779.full)


    [the Journal of Physiology; and at www.menstuff.org/issues/byissue/dietsoda.html.](http://www.menstuff.org/issues/byissue/dietsoda.html)


    Also check out the article “Energy Drinks Work in Mysterious Ways,” at


    [www.medicalnewstoday.com/articles/146062.php, which does a good job of explaining](http://www.medicalnewstoday.com/articles/146062.php)


    the results of the original study.


    The effect of eating more because of ordering a diet soda is far worse than the
    extra calories you would get with a regular soda. After all, would you rather
    have an extra 100


    calories now or an extra few hundred extra calories later on? The bottom line
    is if you feel the need to order a diet soda, just order some water instead.'
  trans: '## 找到动力与增加步数


    寻找一些能够激励你、让你活动起来的事情。如果这件事是你一整天都盼着去做的，那就更好了。把钱——不，是投资——花在所需的好装备上。当这项活动是你所热爱时，锻炼会变得容易得多，也更自然。


    ### 增加步数的额外方法


    有几种方法可以将步行融入你的生活。你可以养只狗，在早晨或晚上带它散步。或者晚饭后和孩子们一起散步。你甚至可以在午休时间散步，也许就在街区周围转转。你真正要寻找的，是在一天或一周中增加额外步数的机会。


    一个增加步数的方法是把车停在离办公室更远的地方。一个月大约有 20 个工作日。如果你每天把车停在离办公室远 50 英尺的地方，那么你每天就必须多走 100
    英尺（来回）。乘以 20 个工作日，你一个月就多走了 2000 英尺，一年就是 24000 英尺——这几乎是 5 英里的步行路程。


    另一个增加步数的地方是，嗯，楼梯！有机会就走楼梯，特别是在只有一两层楼的时候。你的心脏日后会感谢你的。


    步行是世界上最受欢迎的锻炼形式之一。一点一滴的步数会随着时间累积起来；你只需要找到日常安排中那些可以增加步数的机会。


    如果你想采取极端措施，那么你应该考虑一下跑步机办公桌（[www.treadmill-desk.com](http://www.treadmill-desk.com)）。理念很简单：你以每小时
    1 英里的速度在跑步机上行走，同时在办公桌前工作。每小时可以额外燃烧高达 100 卡路里，并且在工作的同时减轻体重。


    ## 定期锻炼的必要性


    你的每日或每周习惯中应该包括定期锻炼。定期锻炼会降低你的压力水平，保持身体健康，并提高你的能量水平。然而，尽管定期锻炼有诸多有据可查的好处，许多人还是没有努力将其纳入日常习惯。总似乎有一个借口，可以归为以下两类：工作太多，时间不够。


    如果你想为不做定期锻炼找一个轻松的借口，那么声称工作太多就是为你准备的。如今每个人都有处理不完的工作，尤其是**DBA**。我们被期望随时待命，并且总是在努力处理警报，甚至配置新的方法来主动维护一个稳定的环境。但你必须找到时间。对你来说，以某种方式抽出一些时间来提高活动水平是很重要的。你可以从每天多走几步开始，然后逐步过渡到定期步行。


    除了工作太多，你可能发现自己只是单纯地时间紧张。


    也许你的通勤时间略长于平均水平，而车里多花的那些分钟给了你一个借口，解释为什么一天中没有足够的时间照顾自己。对于声称没时间的人，我能给的唯一建议是写下你所有的活动，看看它们花了多长时间。通过评估当前时间花费在哪里，你可能会在一天中找到一些额外的时间。


    **提示：** 定期锻炼也是与其他专业人士建立联系的好方法，甚至可以是与你同公司的人。


    ## 睡眠


    你很可能听说过每晚至少睡足 8 小时不间断睡眠的好处。如果你还没听说过，那么让我第一个告诉你：*你需要休息*。每当我在夜间休息不足时，第二天早上往往会发现自己多买了一杯超大杯咖啡。整个白天似乎比平时更迷糊，我在晚餐时间就筋疲力尽了，然后到了晚上又精神起来，发现自己再次工作到深夜。第二天，这个循环又重复了。


    我认识的许多**DBA**都是渴望在职业生涯中变得更好的人。


    他们越是积极进取，就会被要求做出更多牺牲。人们最容易牺牲的事情之一就是睡眠。他们会多熬 30 分钟来读完一章或调整一些**T-SQL**，然后 30 分钟变成一个小时，等他们意识到时已是凌晨两点，而几小时后就需要起床了。


    长期休息不足会导致一系列问题，最轻的就是开车时睡着。也可能是生理上的，比如背痛，我经常在睡眠不足时出现。


    如果你发现自己养成了不良的睡眠习惯，一个简单的恢复正轨的方法是每晚早一点上床睡觉。把它想象成一个银行；前期投入一些额外的时间，日后可以收获红利。


    另一个要确保获得充足休息的原因是，有时你需要在休息不足的情况下工作。例如，当你需要在凌晨 3 点进行紧急修复工作时，你需要尽可能保持警觉才能做好工作。如果你一直睡眠不足，你会发现自己在半夜反应迟钝，这可能导致在最糟糕的时刻犯下容易避免的错误。


    **提示：** 想了解更多关于睡眠重要性的细节和信息，请查看[www.apa.org/topics/whysleep.html。](http://www.apa.org/topics/whysleep.html)


    ## 卡路里


    计算卡路里与营养或锻炼不是一回事。许多人为了降低卡路里摄入，千方百计地避免某些食物。我最喜欢的例子是点餐时搭配健怡汽水。虽然这个人喝水或果汁会更好，但他们不知为何认为，因为健怡汽水比普通汽水卡路里低，他们是在帮自己一个忙。对此我只想说：*健怡汽水会让你吃得更多*。


    **提示：** 请查看关于锻炼、碳水化合物、健怡汽水及其对大脑影响的所有详细信息，网址为[`jp.physoc.org/content/587/8/1779.full`](http://jp.physoc.org/content/587/8/1779.full)，它介绍了一项发表在《生理学杂志》上的研究；以及网址[www.menstuff.org/issues/byissue/dietsoda.html。](http://www.menstuff.org/issues/byissue/dietsoda.html)


    也请查看文章“能量饮料以神秘的方式发挥作用”，网址是[www.medicalnewstoday.com/articles/146062.php](http://www.medicalnewstoday.com/articles/146062.php)，它很好地解释了原始研究的结果。


    因为点了健怡汽水而吃得更多，其负面影响远大于喝普通汽水多摄入的额外卡路里。毕竟，你是愿意现在多摄入 100 卡路里，还是之后多摄入几百卡路里？底线是，如果你觉得有必要点健怡汽水，不如直接点些水吧。'
- fmt: 'I will agree that being mindful of calories is a good thing. If you are looking
    for some overall weight loss, then there are two things to keep in mind: reduce
    your caloric intake and raise your activity level. We already discussed some of
    the ways to increase your activity levels over time. Imagine the benefits you
    will get should you start being mindful of calories as well. Some people have
    even suggested that one of the secrets to a longer life is to eat fewer calories.


    ### Life Is Good, but It’s Better with Bacon


    I work in an IT department. The hours can be demanding, the job often doesn’t
    conform to a rigid schedule, and it requires me to work many weekends. When my
    daughter was born, I decided that I needed to lift weights for the next 18 years
    so that I could be ready in case she decided to start dating someone on the football
    team. After my son was born, I realized I could stop lifting weights and just
    train him instead. But another goal came to mind. The goal was to be able to play
    in the yard with my children and (1) not be short of breath and (2) not risk a
    heart attack, no matter how much bacon I may have consumed.


    I have spent the past few years doing what I can to attain that goal. I started
    jogging, began to pay attention to how much and what I was eating, and started
    making a real effort to have the best possible work/life balance. I am able to
    play soccer with my children, chase them on their bikes, and just have fun in
    the backyard. Every day is Father’s Day. Never mind having my career cut short
    due to poor nutrition—I do not want my *life* cut short.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    `Image 137`


    ### CHAPTER 7: Where’s the Buffet?


    **129**


    Think about this scenario: you wake up in the morning, get yourself ready for
    work, and head out in your car for your morning commute. You do not bother with
    breakfast while at home, because you grab a cup of cream and sugar (and some coffee)
    with some coworkers most mornings. Unfortunately traffic is unusually heavy this
    morning, and it takes too long to get to the office.


    Your poor nutritional choices lead to you becoming light-headed, and you lose
    control of the car and head into a ditch. Later on you find out how difficult
    it is to administer servers from the emergency room with a broken arm.


    And that’s why I always drive around with an extra donut in my glove compartment.


    If you do not believe that the preceding scenario is possible, then try this one:
    you are at your desk finishing up an extra-large sesame chicken dinner from that
    Thai place down the street that you think is healthier because it is Thai food
    and not Chinese food, but it’s really all the same. You fall asleep about an hour
    after lunch as if it were Thanksgiving all over again and you end up drooling
    all over your desk. Your boss stops by and snaps a quick picture on his Blackberry.
    You have no idea about the photo until your next performance review when he shows
    it to you and then says, “Now…about that raise you won’t be getting this year.”


    Perhaps you are not the type to fall asleep after a large meal. At least, not
    that you remember, right? Well, let’s try one more: your steady diet with a minimal
    amount of leafy green items has led you to have low enough iron content in your
    blood to make you anemic. You are heading up to your office in the elevator one
    morning and you get a sudden nosebleed. You try to stop the bleeding but your
    blood does not clot as quickly as it should. The doors open, your boss is standing
    there, you bleed all over his shoes, and you make the elevator and office floor
    look like a crime scene.


    Still think these scenarios are impossible? Well, they aren’t. Many people are
    either anemic or borderline anemic due to the lack of iron brought about by poor
    nutrition.


    People fall asleep after large meals. And lots of drivers lose their concentration;
    there is no real way to know how many accidents are caused by low blood sugar,
    but I would be willing to wager that a good number are.


    I know that it can be difficult to strike a perfect balance between your work
    schedule and your personal schedule. And often you will find yourself using work
    as an excuse to avoid taking time for yourself. But you need to make the time
    for yourself, and one way to do that is to be mindful of what you are eating.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    `Image 138`


    **130**


    ### CHAPTER 7: Where’s the Buffet?


    MAKE THE TIME!


    **by Jonathan Gennick**


    It is so important to make the time. Your job will eat you alive if you let it.
    Taking care of ourselves would be easier if the penalties were more immediate.
    Imagine if your boss came to you saying, “Will you stay late and have a heart
    attack in order to get that new database created?” Wow! It would be easy to say
    no to that request. What’s hard is that each sacrifice is so small, so incremental.
    Taking care of yourself involves taking a very long-term view.


    One of the easiest ways to be mindful of what you are eating is to keep track
    by writing it down on a piece of paper. If pen and paper are too rustic for your
    liking, then you can always get an application for your iPhone that allows you
    to record your meals and calculate your calories.


    Writing down or tracking your meals will also help you to be mindful of, or eliminate,
    snacking. The bag of chips and can of soda in the middle of the afternoon is adding
    350 empty calories to your diet each day. There are roughly 3,500 calories in
    a pound of body fat. With 20 working days in a month, that would equate to 2 pounds
    of body fat per month or 20 pounds of body fat per year. And if you think it is
    unreasonable to believe that someone is eating chips and soda for a snack every
    day, then just consider it to be done once a week, and that the 20 pounds gets
    tacked on over five years instead.


    Believe me, five years can go by quickly. The weight will go on very slowly, but
    it will go on. And despite it taking years to go on, many people think they can
    take it all off in a matter of weeks. As a result, they get frustrated with any
    change in their daily routine that does not have immediate results.


    The point is that you need to start putting yourself first; stop making excuses
    and start being responsible for your health as if your life depends on it, *because
    it does*.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    `Image 139`


    **131**


    ### 8 Chapter


    ### Training, Get You Some of That


    Stop for a moment and reflect on how far you have come to this point. You wanted
    to become a DBA, you found your opportunity, you have built up relationships with
    colleagues, and you are effectively running the ship at this point. Along the
    way you have noticed that certain aspects of your environment tend to shift over
    time. One shift is, of course, new releases of SQL Server. Even applying a hotfix
    to SQL Server could provide you with an unexpected learning opportunity.


    Many people simply do not consider training an important part of their life as
    a DBA. If you want to survive as a DBA, then you need to be able to quickly adapt
    to changing circumstances. You need to be aware of ideas and concepts that are
    on the horizon. In short, you need training, and that training is an ongoing function
    that never stops.


    **TIP:** Training is the point at which education and motivation meet.


    When times get tough, training budgets are one of the first things to get their
    funding cut. This can make it difficult for you to convince your management to
    send you away for a day or two in order to keep your skills sharp. You must find
    a way to present a business case that is rock-solid; get them to understand that
    there will be a substantial return on their investment.'
