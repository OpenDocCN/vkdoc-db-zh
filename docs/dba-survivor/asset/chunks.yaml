    \ the chaos that would exist if no SLAs were defined. Then everything would be\
    \ an emergency, everyone would demand that their stuff get done quickly, and no\
    \ one would ever be satisfied with whatever help you were able to provide. It\
    \ can be inferred that your approval ratings are going to be directly tied to\
    \ your SLA agreements, which are going to be tied to how well you manage expectations.\n\
    \n## Get to Know What You Do\n\nOn day one you started building your initial checklist.\
    \ Part of that checklist was to gather information on your databases, and to practice\
    \ a few restores. That means you should have a rough idea as to how long it should\
    \ take to recover some databases. This will be invaluable for those times when\
    \ someone is impatiently waiting in your cube and asking, “How much longer?”\n\
    \nInstead of reminding them that the SLA for this particular request is the next\
    \ business day, you can respond with, “The last time we did this restore it took\
    \ three hours. It has only been 45 minutes, so you can expect to wait another\
    \ two hours at least, if everything goes well.” They still may leave your cube\
    \ unhappy, but you cannot really control how they will feel. All you can control\
    \ is getting the restore done, and in a timely manner.\n\n*Put yourself on the\
    \ other end of this transaction. Say you’ve called the cable company to come fix\
    \ a problem for you. You may not care if it takes them a couple days to do so,\
    \ but you need to know that someone at the cable provider is aware of the problem\
    \ and working on a solution.*  \n— Tim Gorman\n\nIf you have a help desk in place\
    \ already, it may be easier for you to track your requests and make certain you\
    \ are meeting your defined SLAs. If you do not have anything in place, then you\
