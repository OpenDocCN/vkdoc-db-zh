    # 第四章：对开发者而言，开发服务器就是生产服务器


    ## 场景一


    一位开发者需要将最新的生产环境备份还原到开发服务器。他们通过电子邮件向 `DBA` 发送了详细信息，`DBA` 回复说会执行还原操作。一个小时过去了，开发者因为没有收到后续消息而变得不耐烦，毕竟，*这不过是个数据库还原——能花多长时间？*
    于是开发者又给 `DBA` 发了一封邮件询问还需要多久。`DBA` 回复说，开发服务器上没有足够的空间来还原生产数据库，因此他们已经联系了服务器团队的成员，询问是否可以扩容磁盘，但目前尚未收到回复。听到这个消息，开发者非常沮丧，想知道是否有其他选项可以快速完成这项工作，*因为他们正试图解决一个生产问题。*
    起初的请求只是从生产环境还原到开发环境，仅此而已。这类请求的 `SLA` 可能定义为一个工作日。所以 `DBA` 正在很好地执行任务，试图在规定的时间范围内解决问题。然而，开发者显然期望不同的周转时间，因此感到沮丧。同样地，业务最终用户、管理层，以及几乎所有知道
    `DBA` 是什么的人，现在都对 `DBA` 的服务水平感到不满。


    ## 场景二


    一位开发者需要将最新的生产环境备份还原到开发服务器。他们通过电子邮件向 `DBA` 发送了详细信息，`DBA` 回复说会执行还原操作。`DBA` 判断空间不足以执行还原，于是发邮件回复开发者，告知问题所在，他们正在联系服务器团队申请更多空间，并且一旦空间增加，鉴于当前生产数据库的大小，还原本身大约需要
    3 小时。开发者随后告知 `DBA` 这不仅仅是一次常规还原，并询问此时是否有其他选项。`DBA` 回复说 `测试服务器` 有足够的空间，他们可以在备份当前测试数据库后，开始在那里进行还原。开发者同意了，从而将损失的时间降到了最低。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 72](img/index-88_1.png)


    **70**


    现在，哪个场景看起来更好，为什么？


    对我来说，我喜欢场景二，因为它展示了额外的沟通如何能改善你为客户提供的服务。沟通中完全在你控制范围内的部分，是你对提出请求者的初次回应。我喜欢向他们预估完成工作所需的时间。你不必非常精确，但需要给出一个大致概念。是需要
    30 分钟？一小时？两小时？还是一天？这样，请求者就知道如果任务未完成，应该在什么时间点发送后续邮件；同时，他们也可以据此向他们的客户传达进度。


    另一部分沟通不在你的控制范围内，那就是最初的请求。理想情况下，请求应包含所有必要的细节，包括他们正在尝试解决生产问题这一事实。不幸的是，情况并非总是如此。因此，你可能需要向请求者询问一些额外的细节——但你怎么知道哪些细节是你当前需要了解的重要信息呢？你不知道，所以你专注于你能控制的事情，并对你将要采取的行动细节做出回应。这样，你就给了请求者审查你的行动和时间线的机会（顺便说一句，时间线才是他们真正关心的）。如果时间线不合适，他们也有机会提出来。


    **提示：** 让人们能够审查你的进度，有助于在事情恶化时分担责任。


    我无论怎样强调沟通的重要性都不为过。事实上，我经常用我以前当篮球教练时的一些例子来强调沟通的效果有多好。当我的球队上场时，我总是提醒他们在防守时必须相互交流。即使我们领先二十分，我仍然会提醒他们需要多说话。在防守中交流的球队更投入、更充满活力。对于进攻方来说，听到防守方确切知道他们即将执行什么战术，这可能会令人士气低落。仅仅通过简单的交谈，你就能比保持沉默完成更多的事情。


    这种对沟通力量的尊重，我也带入了企业生活。更多的沟通永远比没有沟通好。


    ## 管理期望


    如果你有明确定义的 `SLA`，那么管理期望就更容易了，对吗？错。仅仅因为你有定义好的 `SLA` *并不*意味着人们会停止期望你昨天就把所有事情做完。如果某人请求数据库还原，而你在
    30 分钟内完成，那么这个人就会期望每次后续请求都有相同的周转时间。几天后，你可能会被要求再做一次，而这次需要 45 分钟，因为数据量更大了。但客户现在可能期望
    30 分钟完成，并会认为你与之前相比工作表现不佳。


    你如何管理这种期望？你是否沟通每一个行动（例如，“我现在开始，完成后发邮件通知你。”）？你是否配置并构建一个流程，在任务完成时神奇地自动发送电子邮件？无论你决定什么，关键是要记住一致性。希望你有一个好的客户；一个足够专业的客户，会询问今天为什么多花了
    15 分钟。如果你不走运，那么你会遇到有人直接指责你无能，或者在他们需要帮助时不愿意提供帮助。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 73](img/index-89_1.png)


    **71**


    ## 没人在意付出


    你最好现在就从我这里听到这个，而不是以后在绩效评估中听到。对于你的客户来说，真正重要的只有最终结果；他们不在乎达成结果需要付出什么。在他们看来，他们提出的是一个简单的请求。在你这边，你可能需要花费数小时来完成，错过与家人的晚餐，或者取消周末计划。


    而且也没人在意带来的不便。如果需要在周六向生产环境部署一些变更，而你直到周五下午 5 点才收到邮件通知你明天需要工作，没人会关心你是否已经有安排。这根本不重要；无论你得到多少提前通知，你都被期望在任何时候提供支持。


    还会有一些时候，你被要求在周末来办公室，仅仅是因为你*可能*需要做点什么。记住，没人在意付出或不便。他们真正在意的是结果和观感。你可能在周六坐在你的隔间里
    8 小时，最终什么也没做，但这比不被看见地什么都没做要好。每个人都会告诉你，他们理解让你整天坐在那里无所事是毫无意义的，但你还是必须这么做。


    那么，你可以做些什么来更好地管理别人对你作为一名 `DBA` 的期望呢？


    ## 我们来谈谈


    纯粹而简单，没有什么比坐下来与人交谈更好的了。人们越了解你，就越会理解你实际的工作内容。

