    ## 第 3 章


    ### 一些基础知识


    你手里拿着检查清单，每天与人会面，并慢慢将你的环境置于控制之下。随着你见到越来越多的人，你会发现他们似乎在说一种代码；他们对缩略语的使用令人震惊。


    更令人震惊的是，他们期望你从一开始就理解这些缩略语。


    本章将涵盖一些你被期望熟悉的技术基础知识。阅读本章后，你应该对可能经常听到的缩略语更加熟悉，例如 `RAID`、`SAN`、`HA` 和 `DR`，甚至包括
    `DBA` 对一些人意味着什么。


    **提示：** 没有人知道所有事情。不要害怕告诉别人你没听说过他们谈论的东西。最好的 DBA 会提出问题，甚至是基本问题，以满足他们对知识的渴求。


    在本章中，我们将讨论以下内容：


    1.  `RAID`

    2.  存储区域网络（`SANs`）

    3.  高可用性选项

    4.  灾难恢复（`DR`）

    5.  为什么网络就像浴室

    6.  “`DBA`”的含义

    7.  为什么所有责备都落到你头上

    8.  如何礼貌地证明自己是对的


