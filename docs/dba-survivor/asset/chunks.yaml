    # 被遗忘的性能基准测试艺术


    在服务器投入生产前，要确定存储是否是瓶颈，唯一的方法就是进行一些性能基准测试。我发现如今大多数机房里普遍存在的一点是，基准测试远非常规做法。人们往往倾向于将东西草草拼凑起来，扔进生产环境，然后等着看是否有人抱怨。如果你想晋升为“问题解决者”，那么明智的做法是对你机房中一些更重要的流程进行基准测试。这样，当有人说“这个很慢”时，你可以迅速参考最新的基准测试，判断它是否真的变慢了，或者这只是感觉上的错觉。


    当排查可能的 SAN 性能问题时，你需要问 SAN 管理员的第一个问题是：“我们 SAN 的预期 I/O 吞吐量是多少？” 获取你能得到的所有细节，然后回到你的工位开始收集你自己的指标。接着进行对比，看看预期吞吐量是否与观测到的足够接近。如果不够，现在你就可以带着一些实际数据回去找
    SAN 管理员了。


    相信我，相比于像这样说一个笼统的声明：“我们希望在 SAN 上为我们的`tempdb`划分一些使用 RAID 10 的存储空间”，这种方法能让你获得更多支持。除非你有证据证明确实存在性能问题，否则你的
    SAN 管理员不会有动力开始划分不同的 RAID 级别，即使你了解什么对 SQL Server 最有效。


    **提示：** 你进行的基准测试和测试越多，你对环境的控制力就越强。


    你的 SAN 确实可能是一个性能瓶颈，而且对你来说可能很难排查。就像人们会责怪数据库服务器一样，因为它是一个他们不理解的大黑匣子，我也看到过一些 DBA 感到沮丧，因为他们的
    SAN 同样也是一个他们不理解的大黑匣子。我能给你的最好建议是，把你的 SAN 看作一个常量。它应该提供标准的 I/O 吞吐量。它应该允许你在需要时动态地为服务器添加空间。它对每台服务器都应该是相同的。这意味着你可以在不同的服务器上执行一些基准测试，假设
    SAN 性能应该是相等的，然后带着你的结果去找服务器团队讨论差异。问题可能确实出在 SAN 上，但也可能是其他原因。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 47](img/index-63_1.png)


    ## 第三章：一些基础知识


    ### 45


    **不是常量，而是变量！**


    **作者：Brent Ozar**


    嗯——我告诉人们的正好相反。假设 SAN 是一个变量。SAN 团队可能会在毫无预警的情况下更改它。你可能会有共享你驱动器的新“邻居”，可能会遇到交换机故障等等。所有这些事情都可能在毫无预警的情况下改变你的性能。也许关键点在于，要进行测试以确保你的
    SAN 像它应该的那样保持为一个常量，这样当它因为某个不动脑筋的 SAN 管理员的未知更改而不再是常量时，你能够得到警报。


    ### 关键在于主轴，宝贝


    如果 SAN 造成了性能瓶颈，那么你需要进行的一项讨论就是关于主轴的。*主轴*是 SAN 管理员的行话，指的是单个驱动器，这些驱动器与其他驱动器组合在一起形成阵列。例如，你可以在一个阵列中有十个磁盘，在这十个磁盘上构建五个逻辑卷，每个卷将有十个主轴。但是，如果这些卷中有两个或更多个承受压力，那么所有十个主轴都会承受压力。在理想的配置中，你的
    SAN 应该有尽可能多的主轴，并且资源争用的可能性最小。


    想找点乐子吗？去问你的 SAN 管理员这个问题：“如果我当前的 LUN 被转换为物理磁盘，我分配了多少个主轴？” 如果这个数字很低，那么你可能有理由担忧。再次强调，这就是为什么我强调基准测试的重要性。


    虽然 SAN 可能很棒，但它并非全是独角兽和彩虹（完美无缺）。SAN 存储的一个缺点是它可能不可预测。例如，如果你每天、每周都在同一时间使用 SAN 进行所有数据库备份会怎样？很可能会淹没缓存并到处引发问题。现在想象一下，不是你的备份进程，而是一个最终用户决定批量加载
    20GB 数据，导致共享同一 LUN 内磁盘的其他服务器出现性能问题。


    最后要注意的一点是，你的 SAN 可能使用复制功能，为了高可用性和/或灾难恢复目的，自动将所有数据从一个 SAN 发送到另一个位于不同城市的 SAN。即使情况如此，你仍然需要定期进行数据库备份。


    不要让任何人试图说服你，SAN 复制消除了定期数据库备份的需要。唯一比这更愚蠢的事情可能就是他们说 RAID 5 消除了数据库备份的需要。这不是真的，而且只需一次灾难（顺便说一句，这将是你最后一次灾难），所有人都会明白为什么数据库备份是必要的。此外，像
    SAN 复制和 RAID 这样的工具仍然只能是你高可用性策略的一部分。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 48](img/index-64_1.png)


    ### 46


    ## 第三章：一些基础知识


    ### 高可用性选项


    你已经掌握了足够的存储基础知识，但要确保你的系统始终可用，你必须担心的不仅仅是存储问题。尽管存在服务器崩溃、操作系统冻结和硬件故障等问题，仍保持数据库在线，这被称为*高可用性
    (HA)*。作为 DBA，你将被要求确保你的数据库服务器始终可用，*即使你对明显的故障毫无责任*。你没看错。你的最终用户将你视为可用性的代言人。如果服务器因为有人误操作将其下架而宕机，响的将是你的电话，而不是那个在机房里用你的设备当新镇纸的家伙。


    在小组讨论时，你应该熟悉四大类高可用性选项。它们是：集群、日志传送、复制（包括 SQL 复制和 SAN 复制）以及数据库镜像。每一种与其他选项相比都有优点和缺点。我能给你的最好建议是：*没有什么是永恒的，除了变化*。我的意思是，你可能会花费大量时间和金钱为你的机房设计出完美的高可用性解决方案，结果却发现
    18 个月后你的设计已经不够用了。因此，最好记住所有可用的选项，以及如何足够灵活地在必要时进行调整。


    **提示：** HA 是 HA，DR 是 DR。它们是非常不同的两件事。记住这一点。


    在我们继续之前，最后一点说明：*HA 与 DR 的含义不同*。你的系统可以是高度可用的，但不具备从灾难中恢复的能力。同样，你的系统可以配置为能够从灾难中恢复，但在恢复过程中，你的系统可能不可用。请在你们的对话中记住这一点。有时你会遇到一个人，他们觉得
    HA 比 DR 更重要。他们是错的，你应该尽最大努力帮助他们理解，我们的工作更多地依赖于从灾难中恢复，而不仅仅是可用性。


    我们接下来讨论的主题主要着眼于高可用性选项，但其中一些可以同时作为高可用性和灾难恢复解决方案。你需要决定哪些最适合你的机房。


    ### 集群

