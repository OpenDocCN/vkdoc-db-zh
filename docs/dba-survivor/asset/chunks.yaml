    我在研究生院时开始使用待办清单。出于某种原因，我开始写下一天中我需要处理的所有事情。大事如考试，小事如“去吃午饭”。因此，我的清单平均大约有十几项或更多，并且通常是按照我期望在一天中完成的顺序写下的。每完成一项，我就会把它从清单上划掉。任何未完成的事项都会被移到明天的清单上。


    我这样做了三年，离开研究生院后就停止了。从那以后，我断断续续地使用它。在我人生的某些阶段，我感到需要清单来帮助我保持条理。这反过来又降低了我的压力水平，而我们已知道这对时间管理很重要。而且，当你划掉清单上的一项时，感觉总是很棒。


    在我只有四五件事情要处理的时期，我发现不用待办清单、仅靠例行安排来管理时间会更容易。每当我开始感觉自己承担了超出管理能力的事情时，我就会拿出一些纸，开始把事情写下来。一旦你把所有事情都写在一张纸上，它真的能帮你让所有工作看起来更易于管理。看似压倒性的工作量，可以开始变得像是你能够轻松应对的事情。


    这个技巧并不适合所有人。我妻子尝试过清单，但效果不如她希望的那样好。但这里重要的是她尝试过了，对吧？我鼓励你也去尝试，你可能会惊讶于它能带来的帮助。


    ## 任务分块


    有时你会发现自己“有心情”一次性完成很多事情。也许你有一个任务清单，但你决定在一两个任务上多做一点，而不是继续推进。有些人可能会开始觉得他们会落后于清单上的事项。然而，另一些人则会因为知道在某项任务上取得了更多进展而感觉良好。如果你清单上有一个你知道是持续性的任务，这种方法尤其有用。


    虽然你可以专注于一项任务的特定分块，但你也可以在一天中处理多项任务的小块内容。对某些人来说，整天处理各种各样的任务能让他们保持投入和精力充沛。有很多天，我喜欢同时处理很多事项，在每件上都完成一点点。当然，也有其他一些天，我喜欢非常专注于某一个特定的事项。


    我有效地管理我的时间，使用了刚才描述的每一种技巧。嗯，除了这些，还有一种我们尚未讨论的技巧。


    ## 学会拒绝


    你去过自助餐厅吃饭吗？如果去过，你是否曾发现自己品尝了很多不同的食物，每次只拿一点点——但当你回到餐桌时，盘子里已经有了大约 5 磅的食物？你知道这太多了，但你觉得必须吃掉你拿的所有东西——否则就是浪费。嗯，当涉及到你的工作时，也会发生同样的事情。你最终会一件接一件地堆积小任务，不知不觉中，你就一次性地承担了远超出你舒适处理能力的事情。


    我知道我经常承担了太多的副项目。我相信大多数人在专注于两件或更少的事情时，可以发挥出最高的效率。当然，我每天要处理的事项远不止两件，但当我盯着电脑屏幕说“我从哪里开始？”时，这会让人不堪重负。这时候，我就会拿出待办清单，让所有事情变得可管理；我可以为手头的任务排定优先级，将它们分解成我想要的任何大小的分块，建立例行安排，并在需要提神时去慢跑一下。


    ## 代码评审与克里斯·汉森


    好的代码评审是一项必要的“邪恶”。它们应该在固定的时间间隔进行，也许是在项目的里程碑或关卡处。代码评审是你向同行解释你思维过程的时间，同时也是就你的代码和设计获得反馈的时间。最终的结果是更好的代码，这带来更稳定的系统，从而减少生产支持问题。那么，为什么大多数公司都不愿进行代码评审呢？


    因为每个人都害怕代码评审。


    大多数人都不擅长展示。更糟的是，他们知道自己不擅长，这让他们表现得更差。有些人可能本来可以做得好，但在一群同行面前讲话时会紧张。而那些代码被评审的人，感觉就像是被《to
    Catch a Predator》节目中的克里斯·汉森审问一样。所有这些加起来，就成了你能想象到的最令人畏惧的员工集会。


    所以我们知道代码评审很重要，对吧？而且我们知道每个人都害怕它们，结果就是现在没人再做代码评审了，对吧？现在，我希望你想象一下，是克里斯·汉森在主持代码评审，而你就是当前正在做展示的开发者。你刚解释完你在做什么，克里斯开始问你一些问题，比如：


    *CH*: 你知道`DTS`有多旧了吗？你是怎么想的？而且你不打算批量处理你的事务吗？你知道这会对你的日志文件造成什么影响吗？


    *你*: 我发誓，伙计，那只是说说而已，仅此而已。我没打算做任何事。我来这里是为了告诉我的`DBA`我们需要分道扬镳了。


    *CH*: 只是说说？这话说得可不少。我这里有完整的记录。你在这里说，“`I want to cursor through all your rows`”。伙计，这简直*大错特错*。


    *你*: 我知道，我知道。我正在寻求帮助。前几天我买了一本关于`SQL Server 2008`的书。而且我愿意尽我所能来帮助你们。告诉我你们希望我做什么。


    *CH*: 帮助我们？


    *你*: 是的，无论需要做什么。


    *CH*: 门在那儿。去告诉你的朋友们，我们在看着。下次他们给我们一份比`NASA`发射流程还复杂的部署说明时，我们会去找他们的。

    '
- fmt: '# 处理开发者反馈


    Clearly you don’t want to have things go that far, but there are going to be times
    when you really want to call a developer out and ask them why they have their
    head up their ass. Stay calm—no one person knows everything, right? But also put
    yourself in their shoes. If every piece of code that you just spent weeks putting
    together was being picked apart, you would be defensive, right? So it is natural
    to see the developer get defensive as well. In fact, it is natural for anyone
    to be somewhat defensive, even if their code is not being picked apart.


    Do your best to see this as an opportunity to teach something new. Not everyone
    wants a lesson, however, and for those people, you need to remain calm and try
    your best to persuade them to see things from a different point of view. Find
    out their roadblock (why don’t they want to do something new) and help them get
    around it. Over time people will begin to trust your feedback rather than think
    you are always on the offensive.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 82](index-98_1.png)


    **80**


    # CHAPTER 4: A Development Server Is a Production Server to a Developer


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 83](index-99_1.png)


    **81**


    # CHAPTER 5: Production Support


    You are going to be responsible for supporting production systems. What you are
    going to find is that most people consider their system the most crucial production
    system. No matter what the time of day, no matter what the system, you will hear
    at some point,


    “`My` users are waiting.” That translates into, “I don’t care whatever else you
    `were` working on, fix `my` problem now so `my` users will stop complaining to
    me.”


    Yeah, it flows, and rolls, downhill. And you will have no choice but to feel you
    are at the bottom. No matter what else you do, you must remember to be professional
    in every communication you have. No flame mails, no yelling on the phone, no telling
    people that their system is not as important as they might think. Instead, treat
    each opportunity as a learning experience, see what you can take from it, and
    build upon it so that the next time an outage occurs, there is a reduced level
    of frustration for everyone.


    In other words, be calm, especially if everyone else around you is starting to
    panic. And the best way to keep yourself calm? Make sure you have a plan, of course.
    And make sure you have some help.


    **TIP:** The real trick is to make everyone think that you believe their system
    is the most important, no matter what the circumstance.


    In this chapter, we will discuss the following:


    1.  Why service-level agreements are important

    2.  How to establish a defined process for contacting support

    3.  How to establish a work/life balance

    4.  Outsourcing


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 84](index-100_1.png)


    **82**


    ## ON STAYING CALM


    **by Jonathan Gennick**


    I live and work in a remote area. Services aren’t what they are in the big cities.
    Ambulance services are part volunteer, and I’m one of the volunteers in our local
    service. My EMS sideline has given me some good perspective on staying calm.


    First of all, nothing you face as a DBA will compare to walking into a residence
    during a 911 call to find your patient lying on the floor and completely unresponsive.
    Is it a heart attack? A low blood sugar episode? A drug reaction? Do you know
    what to do? Will the patient die? Will it be your fault? Once you’ve faced that
    sort of situation, you’ll find that a mere database disaster just doesn’t register
    very highly on the “it matters” meter. No one is likely to die just because the
    database is down, unless it’s your boss from having “the big one.”


    Secondly, good patient care begins with staying calm. An EMS crew that gets rattled
    and begins to hurry too much is a crew that will make mistakes. Give me a steady
    and calm crew every time. Ditto in database administration. Good DBA work begins
    with calmness. Move slowly with deliberation. Don’t rush. Take time to think.


    Lastly, when confronted with something really scary, when you have that deer-in-the-headlights
    feeling fall over you, that’s the time we in EMS fall back on our `ABCs`: airway,
    breathing, and circulation. The `ABCs` work for database administration, too.
    Can you breathe? Take a deep breath. Is air moving in and out? Put your finger
    on your wrist. Do you feel your pulse? If you’ve got those things, then relax:
    you’ve got time to think.


    ## Service-Level Agreements


    Service-level agreements (`SLAs`) are exactly that: agreements between two parties,
    often in the form of a contract, regarding a level of guaranteed service. Why
    do `SLAs` matter to you? Because you are going to be held to such an agreement.
    If your company is large enough to warrant a help desk or ticketing application,
    then chances are `SLAs` have been put into place already. If your company does
    not have those systems, then you would be wise to create your own `SLAs`.


    Typically, such agreements will be written down. If not, then neither party will
    have a point of reference to work from, which will lead to confusion and frustration
    the next time something breaks and you are expected to fix it. You may think you
    have a day to resolve the matter, and the other party may think you should be
    done in an hour. Not good times.


    `SLAs` can cover a wide array of topics, such as uptime, problem resolution, the
    amount of time to respond to a page, the number of hours you will provide coverage,
    and just about anything else you can imagine. Essentially, if there is a service
    that you are expected to provide, then having an `SLA` is a necessity.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 85](index-101_1.png)


    **83**


    ### I Thought We Had an Agreement?


    Yeah, get used to that feeling. See, these “agreements” are subjective, and often
    ignored. That’s especially true if everything in your environment (development,
    test, and production servers) is expected to be treated as production, and then
    on top of that everyone thinks their system is more important than anyone else’s.


    You may find it tempting to remind people about the `SLA` for their particular
    issue, but that will not earn you any good will. If there is a person standing
    in your cube, the last thing they want to hear is that you have another hour,
    or two, or ten before an `SLA` is broken. And you do not want to seem as if you
    are not doing anything, or deciding to do something else while there is an outage.


    **TIP:** Some people may say it is best to always look busy, and others say it
    is better to not be seen. I say it is best if you are not seen *and* people know
    you are busy.


    The best advice I can give you here is to simply focus on the things that you
    can control, especially at that moment. Instead of reminding the customer about
    the true `SLA` time, give them an estimate on how much longer it will take for
    a resolution. Then, after the issue has been resolved, you should take a moment
    to review the defined `SLAs`.


    *I agree, and would go even further to argue that regardless of the `SLA`, you
    want to resolve an issue as quickly as possible. That is, unless you have multiple
    issues going on at the same time. Then you have to prioritize them based upon
    the `SLA`.*


    Sylvester Carstarphen'
