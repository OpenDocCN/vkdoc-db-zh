    ![Image 74](index-90_1.png)


    72


    ## CHAPTER 4: A Development Server Is a Production Server to a Developer


    Another tip is to learn the power of the phrase “I understand.” Those two words
    can communicate a lot to the person you are talking with. You could be saying
    that you agree with them (I understand what you are saying), or you could be saying
    that you do not agree with them (I understand what you are saying, but I am still
    not convinced). The bottom line is that you can be a most agreeable person to
    talk with simply by using those two words.


    Now imagine this conversation:


    > “Why the hell is that restore taking so long?”

    >

    > “Well, it looks like the database has grown in size. It should take another
    15 minutes.”

    >

    > “We need it to be finished now; why is it not done yet?”

    >

    > “I understand that you need it done quickly, and as soon as it is done I will
    send you an e-mail, or I can call you if you prefer.”


    How could someone possibly be expecting you to do anything more for them at this
    point? By talking with them, you make a connection with them, show them that you
    are human and that the desired results are coming, and most importantly that you
    understand their needs. This might be the most important thing you could ever
    communicate to someone, and it is easiest to communicate when you sit down to
    talk.


    ### Get Involved Early


    Another way to help you manage expectations is to make certain you are involved
    at an early enough phase of any project. Of course, this may not always be possible—for
    example, if you are not somehow privy to information on new projects. In fact
    it is quite possible that most of the time the only way you are going to be privy
    to anything related to a project is when an e-mail arrives and says something
    to the effect of, “Please put your life on hold for the next three days starting
    at 6:00 p.m. tonight, thanks.”


    If you are able to get involved early, the benefits are tremendous. First, you
    will be able to voice concern over possible design flaws. This can save many hours
    of time later when a design that works fine for a few bits of data suddenly performs
    poorly when many gigabytes of data are being pumped through. Or when someone insists
    on using a particular tool—perhaps DTS when SSIS would be preferred—you can be
    there to suggest that they join the rest of the world in the 21st century.


    A second benefit to being involved early is that as the project progresses, you
    will be familiar with the tasks that are associated with your name. This is important
    because the last thing you want to happen on the day of the production deployment
    is for someone to look to you to perform some task that is not even related to
    your job as a DBA.


    Believe me, it is not a pretty thing to get dragged into the whole “who does what
    around here” discussion. And by being involved early, you can help guide things
    along to make certain the right people are being called upon to perform the right
    functions.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 75](index-91_1.png)


    ## CHAPTER 4: A Development Server Is a Production Server to a Developer 73


    **TIP:** Do not be frustrated if you find yourself not being involved early on
    in projects, just make certain you fully participate from the moment you are asked
    to join.


    Another benefit to being involved early in any project plan is that you will be
    able to have clearly defined tasks to accomplish as part of the deployment. Having
    clearly defined tasks is a wonderful way to make certain that you can manage the
    expectations that others will have with regard to your role and participation.
    With defined tasks, you will not be concerned that someone is expecting you to
    “handle everything” or to “just make it work.” The lines of communication should
    be open for all project members, making it easier to smooth out any bumps during
    implementation and for every member to step up to fulfill their roles and complete
    their tasks.


    ### Communicate Your Actions


    I have already touched upon this, but I wanted to stress this point again. Communication
    is key to your success as a DBA. Do not be afraid to tell people how long things
    will take.


    At the very least, acknowledge that you are working on a specific task. When you
    start a new position, you can find yourself concerned that others may not find
    you, say, competent. In fact, there are two likely scenarios that will pop into
    your mind.


    #### You Are Not Fast Enough


    Chances are you will have some apprehension about telling people how long something
    will take because you believe that they know how long the task should take. There
    is a high degree of probability that they have no idea how long something will
    take. What they do know, however, is how long they want something to take. If
    your estimate is close enough to what they want, then there is no issue. If your
    estimate is much longer than their current needs, then they will tell you so.


    Now, if your estimate is truly the fastest amount of time it will take to perform
    the task, then it really won’t matter one way or the other. If the estimate is
    not the fastest because of your experience level, then you have the following
    scenario.


    #### You Did It Wrong


    Let’s say you tell them your estimate, you get the work done, and you provide
    some details on what you did. There is always a chance that they are going to
    respond and ask why you did something in a particular way. This may be because
    they have some knowledge that you do not possess, but it could also be that they
    are just looking for some knowledge themselves. In either case you do not need
    to apologize for getting a task done in a certain way. If there is a better way
    that you were not aware of, then admit as much and thank the person for bringing
    it to your attention. If there is a reason you chose to perform a specific set
    of actions, then feel free to explain why (politely, of course) you chose those
    actions, and again thank them for bringing the alternate method to your attention.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 76](index-92_1.png)


    74


    ## CHAPTER 4: A Development Server Is a Production Server to a Developer


    I can recall one time being questioned outright as to how and why I performed
    a task in a certain way. The developer was quite polite about asking me why I
    took a few extra steps in getting something done, and I really had no answer at
    the time, other than, “I preferred to do it this way and keep everything in a
    standard state.” Another time I was ordered to perform a task in a specific way
    because they “wanted it done fast,” and yet they were asking for it to be completed
    in a way that would take much longer.


    It is perfectly natural to feel apprehensive about giving away too many details
    about the tasks you are performing. But it is my belief that you are better off
    communicating your actions than remaining silent. If someone suggests a different
    way to get something done, then you may learn something new. If someone suggests
    the wrong way to get something done, then you’ll be presented with the opportunity
    to help educate someone—a win-win situation if there ever was one.


    ### Be Responsive and Responsible'
