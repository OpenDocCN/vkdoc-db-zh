  raw: 'Musicians need to know a heck of a lot more than acoustics, and sculptors
    need to know a lot more than geology. The people in the creative arts are makers,
    and by choosing the path of DBA, you’ll be one too. One extremely important lesson
    we can take from makers is that they learn best in two ways. First, makers learn
    by constant practice and hands-on tinkering. You will need to do this too to become
    truly good at database administration. When you conjure an image of an


    “inventor,” you probably envision a guy with messy hair, a white lab coat, and
    a harried-looking laboratory. Guess what? All good DBAs I know do indeed have
    a lab, usually called the dev environment. That’s where they regularly tinker
    and experiment and test.


    My second and most important comparison to other makers is that they need at least
    one good mentor to launch their career. Every maker’s education includes years
    of lessons at the feet of others who were more advanced than them, whether they
    are artist, musician, or yes, DBA. That’s where this book comes into play. You
    might not have a senior DBA to lean on for advice and inspiration, but you have
    one in this book. Many of the fundamental lessons for a new database administrator,
    as a review of this book’s table of contents quickly reveals, are about how you
    interact with other people in your enterprise’s IT environment. Yes, it’s very
    important to know the technology, and you’ll learn a great deal about technology
    by reading this book and applying its lessons. However, you’ll also learn about
    the relationships between DBAs and software developers and corporate managers—areas
    where you must be guarded and areas where you must be hardnosed.


    Of course, no single book can ever teach you everything you need to know about
    a discipline as broad and far-reaching as database administration for Microsoft
    SQL Server. So Tom has taken pains to show you the first steps. He gives sources
    for additional learning, ways of finding a mentor, and—when the time comes—a means
    of you becoming a mentor yourself. I exhort you to make the most of this fine
    book and, when you’re ready, take the lessons you’ve learned and give them back
    to the SQL Server community.


    Kevin Kline


    *Technical Strategy Manager, Quest Software*


    *Founding board member of PASS, the Professional Association for SQL Server* In
    very “real” language, you hold a book in your hands that will help you understand
    the day-today life of the Database Administrator. From how you become a database
    administrator, to backups and recover, and, of course, the joys of bacon—it’s
    all here. (OK, a word about that last sentence. Thomas likes bacon. A lot. In
    fact, he believes that just about anything is better with bacon, so it follows
    that you’ll get a mention or two on it in any book he writes.) Other than the
    bacon information, Thomas lays out his real world experience with database systems.
    You’ll learn how to work in a development team, and not to fear outsourcing. You’ll
    find out how to maintain a production system, and how to monitor the systems under
    control.


    Thomas even explains how to leverage the SQL Server community to help you, and
    how you can help them back.


    So if you’ve got an evening or two to kill, and you’re thinking about becoming
    a DBA, welcome aboard. You’re in for a treat.


    Buck Woody


    *Senior Technology Specialist, Microsoft*


