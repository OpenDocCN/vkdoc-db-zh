- fmt: '## Pharmacist


    After 16 years of being a pharmacist where she helped to configure some Microsoft
    Access applications, Kathi decided to leave the hospital she was working at and
    get a job as a programmer. She learned some Visual Basic 4 and HTML, created her
    first ASP web site, and started working with `SQL Server 6.5`. After being placed
    for a six-month programming assignment, she was then hired by that same company
    as a full-time `DBA`.


    She is now a published author and a `SQL Server MVP`.


    ## Hotel Manager


    While working the most awful hours imaginable as a hotel manager, as well as dealing
    with some of the surliest customers possible, Brent stumbled upon Quattro Pro
    and spreadsheets. Tired of working the long hours, especially on holidays, he
    decided to switch over and get a job in IT. The hours got slightly better, except
    now he had to wear a pager all day and night, so it was actually a step backward.
    But he got to learn a lot about servers and eventually databases. Today he is
    also a `SQL Server MVP`.


    ## Estimating Supervisor


    I had no idea that such a job title even existed, but this is exactly where Tim
    started many years ago. The job was less than satisfying, and a friend got him
    started on some self-learning for `T-SQL`. He jumped at the chance to job-hop
    even though it meant he was to become an `Access` developer. That same company
    that hired him to be a developer decided to switch him to become their `SQL Server
    DBA`, an opportunity that he did not want at the time. But ten years later, he
    feels very fortunate to have been given the chance to be the `DBA`, and he is
    also a `SQL Server MVP`.


    ## MUMPS Programmer


    Jonathan was a `MUMPS` programmer at a major chemical company, supporting industrial
    hygiene and medical systems written in `MUMPS` and running under `DEC VAX/VMS`.
    One day he was told that the decision had been made to rewrite the systems using
    a relational database for the back-end storage.


    The company was planning to standardize on `Rdb`, so Jonathan typed “`HELP RDB`”
    into his `VMS` command line. He devoured the online help. He devoured the manuals.
    He created databases to experiment with. He became enamored of the power of `SQL`,
    and quickly became the go-to person in his department for database questions.
    He wanted to become a `DBA`.


    He failed to become a `DBA` as a `MUMPS` programmer. He got laid off instead.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 9](index-25_1.png)


    ## CHAPTER 1: How Did I Get Here?


    He failed to become a `DBA` as a `COBOL` programmer at various contract jobs.


    He failed to become a `DBA` as a `Visual Basic` programmer.


    He almost failed to become a `DBA` as a `PowerBuilder` programmer.


    Then one day the `DBA` quit, and Jonathan became Johnny-on-the-spot. He could
    finally call himself a `DBA`.


    What made the difference for Jonathan is that he kept at it—for more than five
    years. He did quality work in all the development languages that he had to work
    in to put bread on the table, but he kept plugging away at his database skills.


    When the `DBA` quit, that’s when preparation met opportunity.


    ## YOU’RE DRAFTED!

    **by Ken Simmons**


    It seems like most of the stories here are about people actively trying to become
    a `DBA`. I kept waiting for the scenario where the manager comes in and says to
    the developer, “Hey you, you’re the `DBA` now.”


    ## Your Journey


    If you are looking to become a `DBA`, how and where do you get started? Do you
    get a specific degree? Do you try to land a junior `DBA` job somewhere? How do
    you get your `DBA` career started without having experience as a `DBA`? What options
    do you have for breaking into this career path?


    As with most professional fields, becoming a `DBA` can seem daunting. It can be
    tough to get started as a `DBA` because most of the time it comes down to someone
    giving you the break that you need. You need someone to give you the right opportunity,
    and before you can get that opportunity, you need to start preparing yourself.
    And how, exactly, are you to prepare yourself for a job you do not know much about?


    ### LIFE EXPERIENCE—GET SOME

    **by Brent Ozar**


    Even schooling doesn’t guarantee a `DBA` job. A company’s most precious, valuable,
    and irreplaceable asset is its data. Companies have to know that their `DBA` is
    trustworthy and experienced, which means they don’t usually trust people fresh
    out of college in the `DBA` role. As you review this chapter and the stories of
    how people became `DBAs`, think about how your own life experience can convey
    your trustworthiness.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 10](index-26_1.png)


    ### Get Prepared


    If you have decided that you want to become a `DBA`, then start taking steps to
    be ready for when opportunity comes knocking. If you take no action and sit around
    waiting for someone to hand you an opportunity for your dream job, then do not
    get upset when your break never comes. It won’t.


    What steps can you take to get yourself prepared? My first suggestion is to find
    opportunities in your everyday job that allow for you to gain some `DBA` experience.
    If you are not already in the `IT` industry, then your options will be more limited,
    but not impossible. If you are in `IT`, perhaps as a developer, then start getting
    more involved in database design work or performance tuning.


    If you are a developer and are looking to become a `DBA`, I will give you a rather
    large tip on how to gain valuable experience: learn to get better at performance
    tuning without crying that you need to be “`sa`” in order to do the job. Seriously,
    if you know the system so well that you can get details about performance without
    being given administrative rights, then you are more than halfway to becoming
    a `DBA`.


    You would be quite surprised to find out that many `DBAs` perform frequent job
    tasks without needing `sa` rights. And as more and more companies get tighter
    controls around the levels of access allowable, you may find it necessary to learn
    to get things done with the least amount of privileges.


    **TIP:** Learn to perform tasks without being a member of the `sys admin fixed-server
    role`. Such skills will serve you well later on.


    If your current role does not allow for you to take on additional tasks that may
    be `DBA`-related, then go find one of the `DBAs` at work and ask them how you
    can get started.


    Most `DBAs` are always willing to help someone else learn more about the system;
    doing so means less support work when they are called upon to fix your mistakes!
    Most `DBAs` are both driven *and* lazy; this means that we are always looking
    for ways to make our lives easier. One way is to help train people on how to do
    their jobs better.


    What if there is nothing for you to help with at work? You can look to volunteer
    your time. Many charitable organizations need people to donate their time. It
    is possible that a local church could use some help with their computers, perhaps
    even to help maintain a database or two. It may not be a `10TB` database with
    `15,000` transactions per second, but it is a database, and it will be a learning
    opportunity for you to use on your resume.


    ### BE A GOOD STEWARD

    **by Ken Simmons**


    It may be worth noting that data is still data, and that even though you are a
    volunteer, you need to be careful not to bite off more than you can chew and make
    a serious mistake. A programming mistake is not as disastrous as a `DBA` mistake.
    Be as responsible in your volunteer work as in your paid work.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 11](index-27_1.png)


    If you are not interested in volunteering your time to help others, then perhaps
    you have an overlapping hobby that allows for a learning opportunity. In my case,
    I love Fantasy Football. Years ago I helped build a custom web site with a database
    back end. This gave me lots of learning opportunities that helped me when I got
    my initial opportunity to become a `DBA`.'
