- fmt: '## CHAPTER 1: How Did I Get Here?


    Still another way for you to get prepared is to look online for part-time help.
    You may find someone that is willing to offer some contract work to help out with
    a database during nights and weekends. Such positions do exist, even for people
    with little to no experience. In most cases, they can directly lead to junior
    DBA roles. I would caution you to stay away from job advertisements that seem
    too good to be true; they usually are.


    ### Get Trained


    Part of your overall preparation should include some form of training. This training
    can come in various forms such as training books, classroom training, and online
    training; or, in the cases just mentioned, on-the-job training. Other sources
    of training would include seminars or conferences.


    No matter what training medium you choose, it is vital that you get started. Even
    current DBAs have an ongoing training regime in place, so it is to your benefit
    to start getting into a similar habit. Start reading some web sites on a daily
    basis. Look for some recommended books. Set aside time in each day that you use
    strictly for training purposes. And if you are looking for the most valuable training
    method in order to expedite your own learning curve, then I have one word for
    you: teach.


    If you truly want to learn a topic or subject, then try to teach it to someone
    else. Take some aspect of database administration, perhaps indexes, and try to
    explain how they work to someone else. You will find that the more you are asked
    to teach, the more in-depth knowledge you will acquire, and the better you will
    become.


    I have often been asked by people about what type of degree they should consider
    getting if they want to become a DBA. I will simply say that your degree does
    not matter as much as you might think. In general, your degree is simply a measure
    of work, nothing more. And all the education in the world matters very little
    unless you also have motivation. When you combine an education with motivation,
    then you truly have a powerful force.


    ### Get Certified


    A lot has been written about the value of certifications. I believe that certifications
    have a place in communicating your overall value for others to see. I do `not`
    believe that certifications tell the complete story about who you are or your
    abilities.


    If you believe that focusing on obtaining certifications is going to be your key
    to landing a DBA job quickly, you may be surprised to find out that many people
    will not hire you based solely on your certifications. If you are able to combine
    certifications with some level of relevant work experience, then you are going
    to find more doors opened than just having certifications without any relevant
    work experience.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 12](index-28_1.png)


    The trouble with certifications is that many companies offer `boot camps` where
    you can spend one or two weeks and walk away certified in a particular piece of
    technology.


    The reason this is a problem is that it cheapens the certifications earned by
    others. This makes it difficult for potential employers to know if your certification
    represents your actual knowledge or if it represents your knowledge after two
    weeks of dedicated training that you have mostly forgotten by now.


    **TIP:** Certification and experience are a powerful combination, similar to when
    you combine an education with motivation.


    Also keep in mind that there are many people out there that are good enough to
    be certified but never bother to take the exams. In fact, most people only take
    the exams as a stepping stone to something else. If a person believes they have
    nowhere else to step, why would they bother taking the exam? In other words, `not`
    being certified does not necessarily hurt you, providing you have some experience
    to back up your credentials.


    But for people that don’t have requisite experience, they may look to get certified.


    Potential employers weigh this when they meet with candidates.


    My advice would be to gain some experience first and get certified second. Doing
    it the other way around may raise a red flag. And you would not want to invest
    a lot of time and money into something that will not pay off until after you find
    the job you were hoping the certification itself would help you find, right? You
    might as well invest your time in finding ways to get real-world experience first.


    ### Now Go and Get Your Opportunity!


    You’ve gotten prepared, you have some experience, and you have some training and
    possibly even a certification. Now is the time to go and find yourself a job as
    a DBA, right?


    Well, not exactly. See, the time to get started on finding a DBA job is not after
    you have all these things, it is `before` you have them. Do not wait until you
    think you have all the necessary skills; you may never be comfortable enough with
    your skills to think that anyone would want to hire you as a DBA. Instead, start
    looking for work right away.


    Most jobs are found through networking with friends and family. Start letting
    people know you are looking for a job as a DBA as soon as you know that you want
    to have such a job. Why? Because a proper job search can take months. In between
    the time you get a proper job search started and the time you finally get your
    opportunity, you will be able to get the experience and training necessary to
    hit the ground running.


    Start talking with people. Tell then what you are looking for. Tell them what
    you want to do. You may find that those opportunities already exist right where
    you are. And if not, then at least you are planting seeds in the back of people’s
    minds. The idea is that they may come across an opportunity that you might be
    interested in, and you want them to think of you when they do. And the only way
    for them to know you are interested is to tell them.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 13](index-29_1.png)


    Be proactive. Take ownership of your career. Take charge of your future. Be prepared
    for your opportunity and let someone else remark, “Hey, how did they get so lucky
    to become a DBA?”


    ### Staying Focused


    Chances are that it can take you quite some time to get your opportunity to become
    a DBA. In my case, it took about five years from the time I first told my managers
    that I wanted to become a DBA until the time I finally got my chance at a different
    company.


    During that time there were lots of chances for me to simply give up. But I `knew`
    that I wanted to become a DBA, so I stayed after it and finally got my big break.


    For me, the key was to periodically visualize the job that I wanted. The more
    I started to think about the job I wanted, the more I found myself doing a handful
    of those tasks during my day. Even to this day I am always visualizing what I
    want my dream job to be like. And every now and then I take two big steps back,
    look upon my workday, and realize that I am already doing a lot of the things
    that keep me energized.


    I am often reminded of a quote from Vince Lombardi: “Once you learn to quit, it
    becomes a habit.” If you want to change jobs and transition into a new role, whether
    it is at your company or somewhere new, then you need to not be easily discouraged.
    It will take time for everything to fall into place. You simply must believe in
    yourself. After all, if you don’t believe in yourself, why should anyone else?


    Keep learning, keep writing, keep speaking, keep meeting new people, and keep
    your eye on the prize. Continue to prepare yourself for your opportunity so that
    you can smile when someone asks you, “Hey, how did you get so lucky to be a DBA?”


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 14](index-30_1.png)


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 15](index-31_1.png)


    ## 2 Chapter: Now What Do I Do?'
