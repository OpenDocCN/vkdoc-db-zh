- fmt: 'Wait stats are a way for you to feel the air on your skin. They allow for
    you to immediately know what the issue is, and often times can provide you a solution.
    They are a hidden gem when it comes to troubleshooting, allowing you to diagnose
    performance issues in a fraction of the time compared to other tools.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 115](index-127_1.png)


    # CHAPTER 6: Basic Troubleshooting


    ## 109


    Wait stats can be found through the use of `perfmon` and the `SQLServer:Wait Statistics`
    object. They are also included in the `Activity Monitor`, having their own section
    located below the graphs that are displayed. The best usage of wait stats is in
    the understanding of *wait types*. A list of wait types can be found at: [http://msdn.microsoft.com/en-us/library/ms179984.aspx](http://msdn.microsoft.com/en-us/library/ms179984.aspx).
    You can find the wait type inside of the `sys.dm_os_wait_stats` DMV, and you can
    also find it in the `Processes` section of the `Activity Monitor`.


    **TIP:** I would wager a pound of bacon that a majority of the wait types you
    come across can be solved with some advanced index tuning. Examine some query
    plans before purchasing new hardware; you’ll be doing yourself a favor.


    ## Disk I/O


    Wait types that are specific to disk I/O include:


    - `ASYNC_IO_COMPLETION`

    - `IO_COMPLETION`

    - `IO_RETRY`

    - `PAGEIOLATCH_*`

    - `PAGELATCH_*`

    - `WRITELOG`


    If you are seeing these wait types as the bulk of your overall waits, then you
    will most likely want to examine your disk subsystem. Also keep in mind that sometimes
    issues with disk I/O can be related to memory pressure, so you will want to rule
    that out before sounding any alarms.


    ## Memory


    Wait types that are specific to memory include:


    - `CMEMTHREAD`

    - `LATCH_*`

    - `LCK_M_*`

    - `LOWFAIL_MEMMGR_QUEUE`

    - `RESOURCE_SEMAPHORE_*`

    - `UTIL_PAGE_ALLOC`


    If you are seeing these wait types as the bulk of your overall waits, then you
    will want to investigate the amount of memory that has been allocated to your
    SQL Server. Locks and latches could be the result of insufficient memory that
    causes SQL to swap data pages to disk (because it does not have enough memory
    to store the data in cache), and you could also see some disk I/O issues as well.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 116](index-128_1.png)


    ## 110


    ### CHAPTER 6: Basic Troubleshooting


    ## CPU


    Wait types that are specific to CPU include:


    - `CXPACKET`

    - `EXCHANGE`

    - `EXECSYNC`


    There are very few wait types that are dedicated to helping you isolate CPU spikes.
    The three I have listed are all related to *parallelism*, which can happen during
    synchronization of a query being run on multiple processors. Essentially, if your
    query is run in parallel, it gets split onto multiple processors and then needs
    to be merged back together at the end. This synchronization can be manifested
    by these wait types.


    The quick fix for this situation is to reconfigure the `MAXDOP` setting for the
    query, or for the instance as a whole. I always recommend setting the `MAXDOP`
    to be one less than the total number of physical processors. This allows for there
    to be one processor free to handle requests should a parallel query decide to
    consume the remainder.


    ## SQL Profiler


    `SQL Profiler` allows you to capture the activity running against your database
    server instance by creating what is called a *trace*. `SQL Profiler` can be launched
    either from the Start Menu or from within `SQL Server Management Studio`. Once
    started, you configure `SQL Profiler` to run a trace be selecting various event
    categories, event classes, columns, and applying filters. You even have the option
    to select from a handful of default trace templates (see Figure 6–5). For a complete
    list of `SQL Profiler` event categories and classes, go to [http://msdn.microsoft.com/en-us/library/ms175481.aspx](http://msdn.microsoft.com/en-us/library/ms175481.aspx).


    The event categories for `SQL Profiler` are not organized in a way to allow for
    you to pinpoint one specific category for disk I/O, memory, or CPU. Instead, you
    have to examine event categories, event classes, and the data columns in order
    to get the information you need for each potential bottleneck. Think of `SQL Profiler`
    as a way to gather details on all the activity against your server, but it will
    be up to you to analyze the trace output in order to determine where the bottleneck
    truly lies.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 117](index-129_1.png)


    ![Image 118](index-129_2.png)


    ### CHAPTER 6: Basic Troubleshooting


    ## 111


    **Figure 6–5.** *Creating a trace using a default template*


    The event categories that are most useful are as follows:


    - `Cursors`

    - `Database`

    - `Errors and Warnings`

    - `Locks`

    - `Scans`

    - `Stored Procedures`

    - `TSQL`


    Inside those categories are event classes and those event classes contain data
    columns. A complete list of available data columns can be found at: [http://msdn.microsoft.com/en-us/library/ms190762.aspx](http://msdn.microsoft.com/en-us/library/ms190762.aspx).
    You can also browse them for yourself, if desired. When creating a trace, on the
    Events Selection tab, simply check off the `Show all events` and `Show all columns`
    boxes (see Figure 6–6). Note that there is a column named `CPU`, but no column
    named `Memory` or `disk I/O`. That is where your analysis will become valuable
    as you try to determine the nature of the issue. Many senior DBA’s put together
    a list of default events to capture with a trace file, in the hope that it gives
    them enough information to begin troubleshooting.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 119](index-130_1.png)


    ![Image 120](index-130_2.png)


    ## 112


    ### CHAPTER 6: Basic Troubleshooting


    **Figure 6–6.** *Displaying all events and all data columns*


    An example of this would be to capture the `RPC:CompletedEvent` and `SP:BatchCompleted`
    event classes found in the `Stored Procedures` and `TSQL` event categories, respectively.
    Those event classes will allow for you to include data columns for the following:


    - `ApplicationName`

    - `CPU`

    - `Duration`

    - `LoginName`

    - `Reads`

    - `TextData`

    - `Writes`


    Since this trace could generate a lot of results it may be worth your time to
    configure some filters on the data columns. You may want to consider only returning
    results for statements that have `CPU > 500`, a `duration > 500`, `reads > 10,000`,
    and `writes > 5000`, or some combination thereof. You can adjust as necessary
    in order to have a manageable result set.


    As you may have surmised by now, using `SQL Profiler` to troubleshoot performance
    issues is a lot more overhead than the other methods discussed. The use of `SQL
    Profiler` itself can in turn cause performance issues for the queries that are
    actively running, so use it with caution on any system in your care. It does allow
    for a good deal of flexibility in capturing information and when the output is
    stored in a database table it can allow for easy filtering. Using it to isolate
    an issue with disk I.O, memory, or CPU is probably more overhead than necessary;
    it may not lead you to any conclude any one of those potential bottlenecks as
    your culprit.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 121](index-131_1.png)


    ### CHAPTER 6: Basic Troubleshooting


    ## 113


    **NOTE:** If you store the results in a database table, you are increasing the
    activity on the database server. If you don’t store the results, you are increasing
    the memory usage, which is not good if you are already having memory issues, and
    the increase in disk I/O if you are saving your results to the same drives that
    your data and log files are using. So choose how you use profiler carefully. —Sylvester
    Carstarphen.'
