    *“I used to give better talks when describing how to find the area of an* *ellipse
    to my Math-107 students in grad school. If this guy can present* *here, maybe
    I could as well.”*


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 156](index-166_1.png)


    **148**


    **CHAPTER 9: Connect. Learn. Share.**


    Now, to be fair, his talk was not bad, it just made me understand that by that
    point in my life I had already spent a lot of time in front of an audience, and
    that I could do technical presentations as long as I was prepared. I could not
    roll into a technical talk as if it was an algebra class, I would bomb.


    Attending functions will also allow for you to get an idea of what works well
    when presenting and what doesn’t work well. This will be valuable information
    for you when you want to start thinking about how you would go about giving your
    own presentation.


    Will your talk need a lot of demos? Perhaps more pictures and fewer words would
    work better?


    Before you can think about speaking in front of others you will need to be able
    to write down your thoughts coherently. And the only way to get better at writing
    is by writing, of course.


    JOIN A FORUM


    **By Jared Still**


    Also consider joining a forum, mailing list, or some other venue by which other
    technical professionals can pose technical problems that they have been unable
    to solve. An active forum is like a perpetual conference. Be active too. Plus
    you can’t help but meet new people as you learn.


    **Start Writing**


    I was never a writer. In fact, I became a math major because I did not have to
    write. As an undergrad, I would drop classes that required a term paper and take
    a math class simply because there was no writing involved. I still remember how
    excited I was to have gotten a seat in a class titled “Abnormal Psychology” and
    the disappointment I felt when on the first day the professor explained that I
    was going to write a ten page paper at the end of the semester. I left the class,
    walked over to the registrar, and switched into a class called “Numerical Analysis.”


    When I went to graduate school my world was turned upside down. In my very first
    class, the professor explained that my homework was to be written out, in words,
    and submitted. So, I could not even write a “2,” I needed to spell it out as “two.”
    Simple mathematical statements and formulas became sentences and paragraphs. It
    was pure sadistic torture. I honestly did not think I would make it through. The
    professor explained that I needed to improve my reading and writing if I was going
    to have any future as a mathematician, or anything else.


    And, she was right.


    That was the beginning of my current writing skills, to be honest, right there
    in graduate school while learning some linear algebra. In the years following
    graduate school, I would find it necessary to do a bit of writing from time to
    time in my job as a


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 157](index-167_1.png)


    **CHAPTER 9: Connect. Learn. Share.**


    **149**


    programmer. I doubt anything I wrote at that time is worth much of a read these
    days, except for a laugh. No, the real first things I wrote about were quite personal.


    My wife and I had our first child. I decided to put up a family blog where I could
    write about everything and post pictures of the baby so that people could view
    them whenever they wanted. I blogged two or three times a month right up until
    we had our second child the following year. Then I was blogging for both of them,
    and I continue to do so to this day. I was able to start writing because there
    was something passionate for me to write about. Over time, I also realized I had
    a passion for technical things as well, so I started blogging for myself as a
    professional in addition to the family blog. The fact that I had found all these
    things that I loved, and that I loved to write about them, made it very easy for
    the words to leave my fingers.


    The years of reading made it easier for me to understand that I wanted my own
    voice, my style, and to become a writer. Having something passionate to write
    about made it even easier. If you want to get better as a writer then you need
    to write more, and the easiest way to write more is to find something you love
    to write about.


    **TIP:** When you have a passion for doing something then it feels less like work,
    and it will actually energize you to achieve more.'
  trans: '# 第 9 章：连接、学习与分享


    无论我当时在读什么——可能是一本书、一份技术期刊、一个网站、一篇博客，甚至是一本教科书——随着时间的推移，我开始发现并认同某些写作风格，这让我更愿意读下去。我最喜欢的作者之一恰好是一位以撰写本地体育队伍博客起家的博主。他现在是某大型体育网络平台网站上最知名的撰稿人之一。他的写作风格是如此自然，看似毫不费力，这让我对自己尝试写作的想法感到更自在了。


    当我成为一名数据库管理员后，我阅读体育内容的时间变少了，而花在阅读技术网站、博客和文章上的时间更多了。读得越多，我就越开始发现哪些写作风格最吸引我。这在我后来寻找自己独特的写作风格时变得很重要。


    `www.it-ebooks.info`


    `图片 155`


    阅读让你能够与作者连接，并向其学习。你读得越多，就越会被某些作者吸引，也越能与你所在的整个社群产生连接。例如，你可能会订阅多个博客，这些博客的作者都是你所在行业内一些杰出的领导者。通过阅读他们的博客或其他行业出版物，你可以了解到你领域内的其他人正在做什么。你可以看到他们如何解决了某些问题，或者阅读他们对某个产品的评测，并感受到彼此共享的一些共同点。


    有一天，你会发现自已正在阅读某篇文章，其中描述的解决方案与你最近遇到的某个问题相似。你会突然想到：`嘿，如果我采用他们的解决方案，看看它是否适用于我这里的情况，会怎样？`
    你会做一些修改，然后部署这个解决方案，看看是否符合你的需求。这将增强你与作者的共鸣，同时你也在这个过程中学到了东西。


    因此，除了帮助提升沟通技巧外，多阅读还有一个附带的好处：你也能提升你的技术能力（或你所阅读领域的任何技能）。当你的技能提升到一定水平时，你会开始考虑参加培训研讨会、讲座、编程训练营或技术大会。


    ## 开始参与


    阅读能激发你内心想要获取比书籍提供更多细节的渴望。这将引导你考虑亲自去参加相关活动。这类活动可能是一场技术大会、一个培训课程或研讨会、一个用户小组会议，或某处的讲座。


    我们大多数人高中和大学时都参加过多年的讲座。我在研究生院时还参加过研讨会，那是向公众开放的学术讨论会。可以想象成一个没有供应商和免费披萨的用户小组会议。有很多机会可以让你去听别人讲的讲座。


    参加这类活动让你有可能与演讲者和其他人建立连接、学习和分享。


    **小贴士：** 即使是半天的活动也值得参加。务必去参加并结识新朋友。


    我仍然记得我在一次技术大会上参加的第一个分会场。我记得当时看这个人做关于查询计划的演讲，我心想：


    `我当年在研究生院给数学 107 班的学生讲解如何计算椭圆面积时，演讲得都比这个好。如果这家伙能在这里演讲，也许我也能。`


    `www.it-ebooks.info`


    `图片 156`


    公平地说，他的演讲并不差，它只是让我意识到，在我人生的那个阶段，我已经在观众面前花费了大量时间，只要准备充分，我也能做技术演讲。我不能像上代数课那样随意地去做技术演讲，那样会搞砸的。


    参加这些活动还能让你了解演讲时哪些方式效果好，哪些不好。当你开始考虑自己如何做演讲时，这将是非常有价值的信息。


    你的演讲需要很多演示吗？也许多用图片、少用文字效果会更好？


    在你考虑在他人面前演讲之前，你需要能够清晰连贯地写下自己的想法。当然，提升写作能力的唯一方法就是多写。


    ## 加入论坛


    **作者：贾里德·斯蒂尔**


    还可以考虑加入一个论坛、邮件列表或其他平台，让其他技术专业人士可以在上面提出他们未能解决的技术问题。一个活跃的论坛就像一场永不停歇的技术大会。你也要积极参与。而且，你在学习的过程中，不可避免地会结识新朋友。


    ## 开始写作


    我从来不是一个作家。事实上，我成为数学专业就是因为不用写作。本科时，凡是要求学期论文的课我都会退掉，转而选择数学课，仅仅因为不涉及写作。我仍然记得，当我好不容易在一门名为“变态心理学”的课上获得一个座位时有多么兴奋，而当教授在第一天就说学期末要写一篇十页纸的论文时，我又有多么失望。我离开教室，走到注册处，换到了一门叫“数值分析”的课。


    当我进入研究生院时，我的世界被颠覆了。在我上的第一堂课上，教授就说明我的作业需要用文字写出来并提交。所以，我甚至不能写“2”，我需要把它拼写成“two”。简单的数学陈述和公式变成了句子和段落。这简直是变态的折磨。老实说，我当时都不觉得自己能撑过去。教授解释说，如果我想要在数学或其他任何领域有所作为，我就必须提高我的阅读和写作能力。


    而且，她说得对。


    说实话，这就是我当前写作技能的开端，就在研究生院学习线性代数的时候。在研究生院毕业后的几年里，作为一名程序员，我发现工作中时不时需要写点东西。我怀疑当时写的东西现在看来都没什么可读性，除了能让人笑笑。不，我最初真正写的东西是相当私人的。


    我和妻子有了第一个孩子。我决定建立一个家庭博客，可以在那里写各种事情并贴上宝宝的照片，这样人们随时都可以看。我一直保持着每月写两到三篇的频率，直到第二年我们有了第二个孩子。然后我就开始为两个孩子都写博客，直到今天我还在坚持。我之所以能开始写作，是因为我有充满热情的东西可以写。随着时间的推移，我也意识到自己对技术事物同样充满热情，所以除了家庭博客，我开始为自己作为专业人士的身份写博客。事实上，我找到了所有这些我热爱的东西，并且喜欢写它们，这让文字从我指尖流出变得非常容易。


    多年的阅读让我更容易理解，我想要拥有自己的声音、自己的风格，并成为一名作家。有充满热情的东西可写则让事情变得更容易。如果你想成为一名更好的作家，那么你需要多写，而多写最简单的方法就是找到你热爱的东西来写。


    **小贴士：** 当你对做某事充满热情时，它感觉就不那么像工作，而且它实际上会激励你取得更多成就。'
- fmt: '# CHAPTER 9: Connect. Learn. Share.


    **By Jared Still**


    I would encourage anyone looking to become a better communicator to start writing,
    perhaps by posting to their own blog. Do not assume blogging means that you think
    people care about what you have to say. They don’t, trust me. No, you need to
    think of blogging as a way for you to get better as a writer. Over time, you will
    think about writing something to be published on a web site somewhere. This will
    be your chance to share your experience with others, to connect with them, and
    help someone else learn something new.


    Gradually, after all that writing, you are going to want to talk to someone about
    it.


    FIND QUESTIONS. DO RESEARCH. WRITE.


    A good way to get started writing is to find a question that you don''t know the
    answer to. Research the problem. When you feel you have something worthwhile to
    contribute, propose a solution. You can write your findings in a forum or as a
    blog entry. Go with whichever medium leaves you feeling the most comfortable.


    Don''t be too modest. Anyone who does some research and already has some knowledge
    of the technology in question can make a worthwhile contribution. You’ll learn
    something new, and your efforts will likely improve your social networking as
    well.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 158](index-168_1.png)


    ## Start Speaking


    I have been in positions of leadership since I was 18 years old. As such, I have
    been standing in front of groups of people and making speeches for a long time
    now.


    However, each time I speak in front of others I get nervous. I still remember
    how nervous I was to teach algebra while a graduate student, and it certainly
    was not because I was unfamiliar with the material or that I thought someone in
    the audience knew more about binomials than I did.


    Once I was at a conference where a good friend was presenting. She was nervous
    a little bit but she told me that in order to get better at public speaking she
    started singing karaoke because if you can sing in front of strangers then speaking
    is easy. I can agree to that; but you won’t find me singing in a bar anytime soon.
    For me the only way to combat the nervousness is to simply get started. Once I
    get going it gets a little easier.


    What really makes me feel better is when I can interact with someone in the audience.


    Lots of times before I get started I will find someone in the first few rows to
    chat with while others are taking their seats. It sets me at ease and allows for
    me to warm up a bit.


    **TIP:** Always take the time to get warmed up before you present your session,
    it will enhance the quality of your presentation.


    Another way to set yourself, and your audience, at ease is to tell stories during
    your presentation. You have probably heard about people saying that you should
    start off your talk with a joke in order to help relax everyone, including yourself.
    What I have found is often the best speakers are the ones that have anecdotal
    stories spread throughout their presentation. Storytelling is a powerful way to
    get a message across to hundreds of people at the same time.


    Now, not everyone needs to be able to make speeches to hundreds of people. I think
    the most people I have ever spoken to at one time would be less than two hundred.
    The number of people present at the talk really does not matter to me, what matters
    most is the audience and my material. That is why it is important for me to connect
    with the audience as soon as possible. Doing so will make it easier for me to
    share my information with them and hopefully for them to learn as well.


    My first technical presentation was at a local user group. I used the feedback
    from the group to prep for a presentation at a national conference later that
    same year. Since then, I have spoken dozens of times in various formats. One thing
    I have found to be true is that most people relate to storytelling or anecdotal
    stories better than to a straightforward technical discussion. I strive to be
    a good storyteller, but I am nowhere near as good as I hope to be someday. That
    is why I continue to present, because I want to keep getting better.


    The reason I want to get better is not because I want to keep giving talks at
    conferences. I want to get better so that I can give talks to my peers anywhere.
    Even more important are those times when I need to give talks to upper management.
    I want to be able to give my talk with confidence, just as someone with good communication
    skills would. That means I need to practice speaking, which means I need to do
    more writing, attend more functions, and do more reading.


    They all work together in order to make you a better communicator.


    ## GETTING PAST THE FEAR


    ### By Jonathan Gennick


    Tom’s friend used karaoke to increase her confidence in public speaking. For me,
    what helped a lot was working with a youth group.


    I was so terrified at public speaking early in my career that I would flatly refuse
    any request to speak in front of people. Then one day I got roped into helping
    with a youth group at my church. I don’t clearly recall just how that came about,
    but suddenly there I was, in front of over a dozen teens and pre-teens who would
    laugh, jeer, and happily tell me anytime I was boring.


    Adults are so polite by comparison. I still get nervous sometimes, and I’m not
    the best presenter, but the fear is gone. When I get nervous now, it’s the healthy
    sort of nervousness that comes from being anxious that everything go according
    to plan. Gone is the cold ball of panic-inducing fear that used to slam into me
    at the thought of speaking in front of a group.


    ### Professional Associations


    Years ago I had the opportunity to attend a conference for a professional association.


    Until then, I had always thought of conferences as a place where people go to
    sit in a room and listen to lectures. The first sign I had that there was more
    to a conference was when I saw the vendors and their exhibits. I started to understand
    that there was more than just attending some boring lectures; there was a real
    energy at this event. People were not just learning; *they were connecting*.


    The conference was being put on by a professional association. My only knowledge
    of professional associations at that time was my being a member of a couple while
    in graduate school. Every student was enrolled in a couple of associations by
    default. That meant we got a monthly newsletter in our mailbox and that was about
    it. The only other members I knew were my fellow students.


    During this conference, I began to understand more about the benefits of joining
    a professional association. Being a member allowed people the opportunity to keep
    up to date on the latest trends in their industry. They were afforded endless
    networking opportunities; connecting, learning, and sharing with many other like-minded
    individuals.


    **TIP:** There is great strength in numbers; being a member of a professional
    association can give you great strength.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 160](index-170_1.png)


    After I became a database administrator, I went to my first conference. It was
    put on by the Professional Association for SQL Server (PASS). I was determined
    to take in all the benefits of membership possible. I wanted to become the best
    DBA that I could be, and I knew that one way to achieve that goal was to join
    a professional association.'
