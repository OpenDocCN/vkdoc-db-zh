    \ with the thought that I am *not* immediately available. For example, I could\
    \ be driving through a tunnel and not have good reception for my phone.\n\nThe\
    \ start of your process would begin with someone needing to contact you, so think\
    \ about how you want that contact to happen. You have three choices: they can\
