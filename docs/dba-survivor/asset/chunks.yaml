    **Disaster Recovery Planning**


    DR planning is essential; not only for your job security, but for the entire company’s
    existence. You can do a quick search on the Internet regarding the number of companies
    that have gone out of business simply due to their failure to plan for a disaster.
    Most commonly you will find companies that simply did not have any idea about
    the need to recover their data in a timely fashion. I see a lot of cases where
    companies go under because of something boneheaded, such as relying on RAID 5
    as the only means for preventing a disaster.


    **TIP:** When it comes to DR, failure to plan is planning to fail.


    You simply must plan for a disaster. No scenario is out of the question. Whenever
    I see a new design, I usually point to a particular section and ask, “What if
    that server disappears? What then?” Asking those types of questions are the only
    way to effectively plan for a disaster.


    One of the better methods I have come across when it comes to DR planning is to
    simply ask the question, what will we do if . . . ? You ask the question until
    you reach a point where there is nothing left that you could effectively plan
    for.


    Here is an example:


    Q: What will we do if that server melts?


    A: We have SAN replication and would just need to boot up the DR server.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 55](index-71_1.png)


    **CHAPTER 3: Some Basics**


    **53**


    Q: What will we do if the SAN replication stops working?


    A: We would recover from tape to restore the DR server to last night.


    Q: What will we do if the tapes are not good?


    A: We would recover from the last known good tapes.


    Q: What will we do if the DR server does not boot in a timely manner?


    A: We could build another server.


    Q: What will we do if there is no other server available to build?


    A: We could go buy another server.


    Q: What will we do if we cannot buy another server?


    A: We could take the test server and use that one as production for the time being.


    Now, compare that series of questions and answers to this type of DR planning:
    Q: What will we do if that server melts?


    A: We have the disks in a RAID 5 array; the chances of two disks failing is minimal.


    Q: What will we do if two disks fail?


    A: There is little chance of that happening.


    Q: Um . . . OK . . . so, what will we do if that does happen?


    A: Don’t worry about it; it won’t happen.


    Sorry, but that does not leave me warm and fuzzy inside, nor should it make you
    feel comfortable either. Another good question to ask yourself and others would
    be, what are we trying to protect against? When it comes to DR, you can never
    ask enough questions, and never settle for an answer similar to “You don’t have
    to worry about that, it will never happen.”


    GET OUT OF JAIL FREE


    **by Sylvester Carstarphen**


    One thing I like to get is written documentation—what I refer to as my “get out
    of jail free” card—when management insists a particular scenario will never happen.


    **DR Testing**


    If your company is wise, then it will be conducting regular DR tests. In some
    cases, regular DR testing is required by internal and external auditors in order
    for your company to retain a specific level of compliance. You should be aware
    of the DR tests and look to actively participate so that you can learn from each
    and every test experience.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 56](index-72_1.png)


    **54**


    **CHAPTER 3: Some Basics**


    Each DR test exercise gives you the opportunity to prepare your own DR test plans.


    These details are going to be quite valuable to you should a disaster happen.
    As you participate in the test exercise, you will inevitably come across some
    hidden nuance of your systems. For example, you may find a handful of servers
    that need to be booted in a particular order.


    **TIP:** Practice makes perfect. Give yourself an opportunity to succeed during
    a crisis by practicing the steps needed to recover.


    It is also important that you have very clearly defined recovery times for your
    systems.


    While you may be pleased to know that you can have your DR servers functional
    in 45


    minutes, that may be an unacceptable amount of time to your end users. Make certain
    that time objectives are clearly stated and that your actual recovery times are
    clearly recorded for everyone to see. Otherwise, it will be difficult to know
    during a real disaster whether things are going well (but it will be painfully
    obvious if things are going poorly).


    This reference will also be handy when you are recovering from disaster. If you
    know your testing took 30 minutes to recover, then you can reference your earlier
    testing and notify your customers as to when they can expect their systems to
    be back online.


    **Carnegie Hall**


    There is an old joke about a young man asking for directions in New York City.
    He stops an older man and asks the question, “How do I get to Carnegie Hall?”
    The old man replies, “Practice, practice, practice.” When I was coaching basketball,
    I would always tell my team to practice “game shots” from “game spots” at “game
    speed.” In other words, you practice how you play, which should be all out, all
    the time. If you practice at half speed, you end up playing at half speed.


    All of that holds true for DR preparation. You need to practice and keep your
    skills sharp. When was the last time you tried to recover the master database?
    Or, better yet, have you *ever* tried to recover the master database? Believe
    me, when the pressure is on during a disaster event, the last thing you want to
    be doing is fumbling around with manuals and pounding your fist against your monitor
    because you do not know how to get your instance started.


    Practice recovering the master database. Try recovering the msdb database sometime
    as well. Spot check your backup files and do a restore to make certain you are
    familiar with the process. Pay particular attention to your important systems.
    If you do nothing else right, recovering the important systems without any problems
    just may be enough to save your job, so practice with those and make certain you
    are familiar with any subtleties that they may contain.


    You simply cannot practice enough when it comes to a disaster. As a DBA, your
    primary responsibility is to recover the data in the event of a disaster. Therefore,
    it is the one thing you need to plan for and practice most often.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 57](index-73_1.png)


    **CHAPTER 3: Some Basics**


    **55**


    **Networks Are Like Bathrooms**


    When issues arise, and *issues will always arise*, people will start to blame
    the pieces of their environment they know the least about. As the DBA you will
    find people inevitably blaming the database server for all sorts of problems.
    In my experience I have seen people blame the database server for a host of problems
    that have nothing to do with the database server. The fact is that they know the
    database server exists, but they don’t know if it is truly the problem, so they
    just point their finger in your direction first.


    One of the last things that anyone ever thinks about is the network. Your network
    has ups and downs all the time. There are lots of wires, routers, and switches
    that make up the backbone of your network. With so many moving parts that need
    to go together in order to make your systems work, it is easy to understand that
    issues will arise from time to time. I once read a study that said how database
    servers are the number one piece of infrastructure that people are ordered to
    troubleshoot, but over 70 percent of all issues are directly related to bad application
    code.'
  trans: "\n目的，这一点在你开始规划灾难发生时的应对措施时至关重要。\n\n## 灾难恢复规划\n\n灾难恢复规划至关重要；不仅关乎你的工作保障，更关系到整个公司的生存。你可以快速在网上搜索一下，有多少公司仅仅因为未能规划灾难就倒闭了。最常见的情况是，那些公司完全不了解及时恢复数据的必要性。我见过很多公司因为一些愚蠢的事情而倒闭，比如仅仅依赖\
    \ `RAID 5` 作为防止灾难的唯一手段。\n\n### 提示\n在灾难恢复方面，不做计划就等于计划着失败。\n\n你必须为灾难做规划。任何情况都不能排除在外。每当我看到一个新的设计，我通常会指向某个特定部分并问道：“如果那台服务器消失了怎么办？然后怎么办？”问这类问题是有效规划灾难的唯一方法。\n\
    \n我在灾难恢复规划方面遇到过的较好方法之一，就是直接问这个问题：如果……，我们会怎么做？你会一直问这个问题，直到达到一个你无法再有效规划为止的地步。\n\n\
    这里有一个例子：\n\n问：如果那台服务器烧毁了，我们会怎么做？\n\n答：我们有 `SAN` 复制，只需要启动灾难恢复服务器就行了。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 55](img/index-71_1.png)\n\n**第 3 章：一些基础知识**  \n**53**\n\n问：如果 `SAN`\
    \ 复制停止工作了，我们会怎么做？\n\n答：我们会从磁带恢复，将灾难恢复服务器恢复到昨晚的状态。\n\n问：如果磁带坏了怎么办？\n\n答：我们会从上一次已知完好的磁带恢复。\n\
    \n问：如果灾难恢复服务器不能及时启动怎么办？\n\n答：我们可以再构建一台服务器。\n\n问：如果没有其他服务器可用以构建怎么办？\n\n答：我们可以去买一台新服务器。\n\
    \n问：如果无法购买另一台服务器怎么办？\n\n答：我们可以暂时拿测试服务器用作生产服务器。\n\n现在，将这一系列问答与这种类型的灾难恢复规划对比一下：\n\
    问：如果那台服务器烧毁了，我们会怎么做？\n\n答：我们的磁盘在 `RAID 5` 阵列中；两块磁盘同时故障的可能性很小。\n\n问：如果两块磁盘都故障了怎么办？\n\
    \n答：这种情况发生的可能性很小。\n\n问：嗯……好吧……那么，如果这种情况真的发生了，我们会怎么做？\n\n答：别担心；这不会发生的。\n\n抱歉，但这并不能让我感到安心，也不应该让你感到舒服。另一个值得问自己和他人的好问题是，我们试图防范什么？在灾难恢复方面，问题永远不嫌多，也永远不要满足于“你不必担心那个，它永远不会发生”这样的答案。\n\
    \n### 免罪金牌\n作者：西尔维斯特·卡斯塔芬\n\n有一件事我喜欢获取，那就是书面文档——我称之为我的“免罪金牌”——当管理层坚称某个特定情况永远不会发生时。\n\
    \n## 灾难恢复测试\n\n如果你的公司是明智的，那么它将定期进行灾难恢复测试。在某些情况下，内部和外部审计员要求进行定期的灾难恢复测试，以便你的公司保持特定的合规水平。你应该了解这些灾难恢复测试，并积极寻求参与，这样你才能从每一次测试经验中学习。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n![Image 56](img/index-72_1.png)\n\
    \n**54**  \n**第 3 章：一些基础知识**\n\n每一次灾难恢复演练都给了你准备自己的灾难恢复测试计划的机会。\n\n如果灾难发生，这些细节对你来说将非常有价值。在参与测试演练时，你不可避免地会发现系统的一些隐藏细节。例如，你可能会发现少量服务器需要以特定顺序启动。\n\
    \n### 提示\n熟能生巧。通过练习恢复所需的步骤，给自己一个在危机中成功的机会。\n\n同样重要的是，你要为系统定义非常清晰的恢复时间目标。\n\n虽然你可能很高兴知道你可以在\
    \ 45 分钟内让灾难恢复服务器运行起来，但对于你的最终用户来说，这可能是不可接受的时间。确保时间目标被明确陈述，并且你的实际恢复时间被清晰记录，供所有人查看。否则，在真正的灾难发生时，将很难知道事情是否进展顺利（但如果进展不顺利，那将是显而易见的）。\n\
    \n这个参考在你从灾难中恢复时也会很方便。如果你知道你的测试花了 30 分钟恢复，那么你可以参考之前的测试，并通知你的客户他们可以期待系统何时恢复在线。\n\
    \n## 卡内基音乐厅\n\n有一个老笑话，讲的是一个年轻人在纽约市问路。他拦住一位老先生问道：“去卡内基音乐厅怎么走？”那位老先生回答说：“练习、练习、再练习。”\
    \ 当我担任篮球教练时，我总是告诉我的球队，要在“比赛地点”以“比赛速度”练习“比赛投篮”。换句话说，你练习的方式就是你比赛的方式，应该始终全力以赴。如果你以半速练习，你最终就会以半速比赛。\n\
    \n所有这些对于灾难恢复准备都适用。你需要练习并保持技能的敏锐。你上一次尝试恢复 `master` 数据库是什么时候？或者，更好的是，你*曾经*尝试过恢复\
    \ `master` 数据库吗？相信我，当灾难事件中压力山大时，你最不想做的事就是笨手笨脚地翻手册，或者因为不知道如何启动实例而用拳头砸显示器。\n\n练习恢复\
    \ `master` 数据库。有时也尝试恢复 `msdb` 数据库。抽查你的备份文件并进行还原操作，以确保你熟悉这个过程。要特别关注你重要的系统。如果你其他事情都没做对，仅仅能够毫无问题地恢复重要系统可能就足以保住你的工作，所以请多加练习，并确保你熟悉它们可能包含的任何微妙之处。\n\
    \n在灾难方面，你永远无法练习得足够多。作为一名数据库管理员，你的主要职责是在灾难发生时恢复数据。因此，这是你最需要规划和最常练习的事情。\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 57](img/index-73_1.png)\n\n**第 3 章：一些基础知识**  \n**55**\n\n## 网络就像卫生间\n\
    \n当问题出现时——*问题总会出现*——人们会开始责备他们最不了解的环境部分。作为数据库管理员，你会发现人们不可避免地会因为各种问题而责备数据库服务器。根据我的经验，我看到人们因为一堆与数据库服务器毫无关系的问题而责备数据库服务器。事实是，他们知道数据库服务器存在，但他们不知道这是否是真正的问题所在，所以他们首先就把矛头指向了你。\n\
    \n人们最后才会想到的事情之一就是网络。你的网络一直有波动。有大量的线缆、路由器和交换机组成了你网络的骨干。有这么多需要协同工作才能让你的系统运行的活动部件，很容易理解问题会不时出现。我曾经读到一项研究，说数据库服务器是人们被要求进行故障排除的第一大基础设施，但超过\
    \ 70% 的问题都直接与糟糕的应用程序代码有关。\n"
- fmt: '# CHAPTER 3: Some Basics


    As a DBA you may sometimes find yourself blaming the network simply because you
    cannot possibly blame bad code all of the time. And it is fine for you to blame
    the network, because the network team will usually just blame management for not
    agreeing to buy the right equipment. But the truth is that people will often misunderstand
    the difference between networks and computers.


    It’s common to hear people in offices yell out, “The database server is down!”
    when the problem is something completely different. Networks are a lot like your
    bathroom at home.


    ## Call a Plumber


    I could not tell you the first thing about plumbing, but it would not take more
    than a few nights of listening to a leaky faucet before I would head down to the
    hardware store to start asking questions. But a leaky faucet does not mean that
    you have a problem with your plumbing. Likewise with database servers; if your
    database server crashes, that does not mean your network is offline. And if one
    workstation is showing signs of a problem and others are not, then chances are
    it is not the network either. (For the record, if one workstation has problems
    and others do not, the problem is not likely the database server either.) And
    if that workstation cannot print to a network printer, you will not solve that
    problem by going into the network closet.


    If your faucet were to spit out some dirty water, what would you do? Probably
    let it run for a few minutes to see if it clears up, right? Perhaps the city was
    working on the water lines, and after a few minutes the issue will go away. If
    you cannot get to a web site or a particular network server, maybe someone is
    moving some cables around. People need to perform maintenance on a regular basis,
    and it is not practical to expect everything to be flawless all the time. Wait
    a few minutes and try again before sounding the alarm.


    You don’t have to be a plumber, however, to know that if you run out of hot water
    after a 5-minute shower, you are going to need to spend some money to fix the
    problem. And most businesses will put up with a slow network for a period of time
    rather than face the expense of actually fixing the problem. Having the network
    administrators work an extra day a week is not going to solve the problem, either.


    The stuff that matters most is invisible and expensive. Beautiful faucets won’t
    impress anybody if the entire house is running off a one-half-inch garden hose.
    The real backbones of your plumbing system are the water heater and the pipes
    running behind the walls and under the floorboard. Those pieces are hard to go
    back and fix later, so you don’t want to make those purchasing decisions without
    qualified help. If you’re not buying this kind of equipment on a regular basis,
    you don’t know the ins and outs of the brands, features, and even the local regulations
    involved. Network hardware is the same way: the basic plumbing guidelines stay
    the same, but things change every year; and without help, you can end up buying
    gear that you can’t easily replace later.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 58](`index-74_1.png`)


    ## Fix It Now!


    Good plumbing requires a lot of knowledge and planning. If you need to water your
    lawn, you can slap some hose extensions together, scatter some sprinklers around,
    and turn the faucet on whenever the grass starts to turn brown. But if you want
    to do a good job, get your lawn looking perfect, and not have to hassle with moving
    the sprinklers around and manually turning the faucet off and on, you have to
    do your homework.


    When it comes time to build a network, you want to research how the pipes work
    and what kinds of connectors to use, strike a balance between reliability and
    affordability, and make sure you never have to touch the equipment again. None
    of that is guesswork.


    Even the most minor plumbing problem is perceived as an emergency. When somebody
    can’t get hot water to take a shower, they get angry quick. They might be able
    to make do with cold water, but they’re not happy about it, and they proceed to
    tell everybody they meet about what a lousy morning they’re having, and how the
    landlord better fix it or there’s going to be trouble. When a user is having a
    problem, they yell and pull their hair out. Problems from “I can’t print on the
    network!” to “The database server is slow!” are all spoken with the same urgent
    tone of voice, and everyone will expect you to drop everything immediately.


    ## DBA Stands For . . .


    Now that you have some technical basics, let’s review some professional basics.
    To start with, let’s look at the following question:


    What does DBA stand for?


    Depending on whom you ask, you will get a different answer. You might respond
    with “database administrator,” and technically you would be right. To some the
    answer would be “default blame accepter.” And to others it could be an acronym
    for “don’t bother asking.” Keep poking around and you will find that there are
    many different points of view with regard to what DBAs do, what DBA stands for,
    and what DBAs should be doing that they are not currently doing already.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 59](`index-75_1.png`)


    **CHAPTER 3: Some Basics** **57**


    Why so many viewpoints? DBAs touch many different areas of the company in many
    different ways. To many end users, we are the ones that reset their passwords
    and the ones that fix things when the system is running slowly. As such, we are
    also blamed for the systems running slowly even if we had nothing to do with the
    design of the system (especially with vendor applications). In short, DBAs get
    blamed for a lot of things that they have no control over, but because they have
    been helpful at one point or another when troubleshooting, they are ultimately
    seen as the owners.


    **TIP:** No one knows what you really do, not even your boss. They only know what
    you do not do, or to be more precise, they only remember your failures and easily
    forget all your success.


    Ask a developer about what a DBA does and you will be told that they are a roadblock
    to progress. The implementation of standards and guidelines for database usage
    only slows down development work. Of course, the upside is having a stabler environment,
    but that hardly matters to the developer screaming that they need sys admin access
    or else their project will be late.


    With these different touch points around your role, you also have different perceptions,
    and you need to be aware of these perceptions so that you can make an effort to
    mitigate them before they drive a wedge between you and your customers. There
    are three things to keep in mind for all of your interactions daily.


    ## People Will Resist Change


    Change happens, it’s a fact. So why do so many people resist change, despite the
    fact that it happens all the time? You would think that everyone would be used
    to having things change, and yet some people stubbornly refuse to let go.


    There are three main drivers of change: people, technology, and information. In
    case you were not aware, as a DBA you will (most likely) be working in a division
    of a company called Information Technology. That title has two of the three drivers
    alone! Toss in the fact that people are employed there, and it’s no wonder you
    will see so much change on a daily basis. To quote Alan Zimmerman, “The real problem
    isn’t the change . . . it’s people’s reaction to the change.”


    The change cycle itself has three stages: a beginning, a middle, and an end. When
    change happens we can dive right into it at the beginning, while in the middle
    we feel tied to both our past (known) and our future (unknown) states, and at
    the end we finally let go of the known state, which is often something we found
    dependable and reliable.'
