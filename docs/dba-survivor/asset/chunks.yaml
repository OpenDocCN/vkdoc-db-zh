- fmt: '# CHAPTER 2: Now What Do I Do?


    Depending on your shop, you may or may not have duties. Many DBAs focus only on
    the administration of the server instances and leave the O/S administration to
    others. If that is the case for you, then you need to make an effort to get to
    know this team. The server administrators have their fingers on the pulse of the
    whole company. They know which systems are most important, and they know where
    to find some extra hardware when you are in a pinch.


    ## SYS ADMINS ARE YOUR FRIENDS


    by Jonathan Gennick


    It’s a huge help if you are on friendly terms with the sys admins that manage
    your servers. If a DBA can be comfortable in sitting down with a sys admin to
    troubleshoot a problem together, well, I’m not sure it gets any better than that.


    System administrators are also going to be the ones to build out your infrastructure.
    It is vital that you are aware of the hardware you are using, as well as the hardware
    that might be coming in the door. If your company is looking to implement a storage
    area network (SAN), they will not be asking you how to configure it; they will
    be asking someone on the server team. Since a SAN can and will have dramatic impacts
    on database servers, you need to be involved in those discussions. Ideally you
    will be invited to the table to discuss such things early on, and the more time
    you spend with the server team, the better chance you have to know about what
    changes are coming your way.


    You are also going to frequently be needed to help the developers and the server
    administrators talk to and understand each other. Why is that the case? Well,
    think of yourself as the universal translator. Developers know code, and they
    know various facets of the business; and because they focus on those items daily,
    they are not spending time racking servers, installing routers, replacing hard
    disks, allocating space on the SAN, and so forth. Server administrators do those
    things, but they do not know how to code or build applications that will drive
    the business forward at the same speed as a developer.


    Unfortunately these two groups rarely interface unless there is a problem (or
    an opportunity to point fingers at each other). That is where you come in. The
    developers can point their fingers at you and explain what the roadblock is at
    the moment, and you can turn and speak to the server administrators in a language
    they can understand.


    Without you, that does not happen, frustrations levels rise, and your shop ends
    up spending far too much money on hardware to solve issues that could be remedied
    by altering a few lines of code.


    So by meeting with both groups, you continue to brush up on your language skills
    and help to keep the peace, and ultimately you can also help to reduce costs.


    ## Meet with Your Customers


    By now you have met with almost everyone possible, except for your actual customers.


    Actually, when you are a DBA, everyone is your customer, but let’s focus on the
    actual end users of the applications and servers. These are the people that are
    going to give you a much different view than any other group.


    Why is it so important to meet with them? Well, consider this story.


    One day a man answered an ad for renting a bedroom above a garage at a family’s
    home. The man was well kept and had a job (no one knew what it was), but was also
    always around. But he was a nice enough fellow and never late with his rent, and
    the family liked having him around. The family never noticed that the man always
    liked to go with them for rides in their car. It did not matter the destination;
    the man would ask, “Mind if I take a ride?” and the family would let him.


    Every time he rode in the car he would ask one or two questions about the car,
    but not so many as to make the family think anything was strange. He would simply
    work the questions into a conversation somehow. “So, think they have enough cup
    holders in here?” could lead to all sorts of comments about the design and functionality
    of the car.


    Eventually the man told the family it was time for him to move out; he had found
    a new apartment to live at. Before he left, he finally told them what he did for
    a living: he worked for the car company. The reason he asked those questions was
    to get honest feedback about the car’s design. The feedback they provided was
    much more reliable and honest than any survey could hope to be; the man observed
    the family actually using the product!


    And so you need to do the same with your end users. Get to understand more about
    how they are using their tools, what their frustrations are, and what little things
    would help them (and therefore your business) be more efficient and productive.
    Go and ask your customers if you can take a ride in their car. You will be amazed
    at the things you will find.


    ## Is That Alert Serious?


    So, you have collected your info. You have meet with all sorts of people. And
    you get back to your desk to find about 1,500 e-mails waiting for you. What to
    do? Some of those e-mails might be database alerts. Better look into those.


    **TIP:** Setting up rules in your e-mail to file alerts automatically is a wonderful
    thing, but only when done carefully and correctly.


    Is a specific alert important? I don’t know. It could be. Or it might be safe
    to ignore. If it is really important, then someone will start yelling at you soon
    enough, right? Well, technically that may be true, but let’s not let it come to
    that for you. Here is a basic rule to follow when it comes to alerts:


    *If you don’t know what they are for, then you need to find out why you are getting
    them.*


    Simple enough to remember. Following that rule will be the difference between
    you being thought of in a positive way vs. a negative way. Consider the following
    scenario: It’s a lazy Sunday afternoon. You are relaxing at home. Your Blackberry
    receives a cryptic message that you don’t understand. You assume that someone
    else must have gotten the same message and knows what to do about it, so you will
    be able to find out tomorrow what it means. The next morning at work, you have
    users complaining about one of the important databases. Reports and batch loads
    should have finished hours ago and are still running. The users want to know what
    the problem is and how long it will be before you fix things. You have no idea
    what the problem is, but you do remember that cryptic message from yesterday.
    You do some research, find out where the alert came from, find the message itself,
    start to understand what it might mean, and finally isolate the problem. You start
    to get the system back into working order, but by then it has essentially been
    out of the water for most of the day. No one else received the page—just you—and
    therefore all blame lies at your feet and your feet alone.


    Sound like good times? It wasn’t, and it describes an event that happened to me
    in my first few weeks on the job. Since that day I have made it my personal mission
    to make certain that any alerting system of mine would only provide value. Too
    many times I hear about shops where they are flooded with e-mails. Some are alerts,
    and some are just informational. I am always looking for things to be efficient,
    and that is why I only want alerts for items that are actionable.'
