    is OK to let people know that when you are home, you are home. Many people believe
    that by protecting their home life, they end up enhancing the quality of the work
    they produce during regular working hours.


    **Happy Fun Play Time**


    You need to keep your stress level low, and one way to do that is to stay involved
    with activities you find fun and enjoyable. Have a hobby? Set aside some time
    weekly to pursue that hobby. Find those things that are important to you; things
    that are important enough for you to set aside some time. You are the one that
    controls your schedule, so use that to your advantage.


