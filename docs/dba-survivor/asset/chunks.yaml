    # 第五章：生产支持


    当然，你可能会漏接一个电话，这一点毫无疑问。但当你想想一天内收到的电子邮件数量与电话数量的对比，你就会发现电话是*不同寻常*的东西，你会更注意电话铃声，而不是一封电子邮件。


    如果我们假设有人打电话并留言，你有多长时间来响应？答案当然是，你的响应时间由 SLA（服务级别协议）来定义。


    这意味着它取决于紧急情况的性质。也就是说，你需要建立一个流程来满足可能的最高 SLA 响应时间，而凌晨三点的一封邮件很可能是不够的。


    **提示：** 我不确定你怎么样，但我喜欢睡觉。当你开始构建系统并定义 SLA 时，请记住其他人也同样喜欢睡觉。


    如果你有幸能够雇用一个电话应答服务，我建议你这样做。这样你就能放心，总会有人接电话，并且他们会立即尝试联系你或你的团队。无论你是否拥有电话应答服务，你都应该确保只使用一个电话号码作为主要联系电话。


    一个包含上述许多细节的流程示例如下：


    1.  客户拨打生产支持电话号码。

    2.  电话由应答服务接听。

    3.  记录留言，包括客户详细信息。

    4.  应答服务拨打指定的电话号码。

    5.  电话由负责支持的 DBA 接听。


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![图 89](img/index-105_1.png)


    这是一个非常简单的定义好的支持流程版本，但要实现它需要大量的工作。反过来看，你如何确保应答服务能联系到正确的 DBA？一种方法是轮换使用寻呼机，但你可能很幸运，有人员被指派支持特定的应用程序或站点。


    再进一步反过来看，你如何确保客户拨打的是 DBA 生产支持的正确号码？我们接下来就看这个问题的答案。


    ## 发布流程


    你需要发布你定义的**生产支持**流程。它必须被清晰地传达，并且需要经常传达。无论你向客户传达了多少次这个流程，总会有人说他们对这个流程一无所知。记住，*态度要友好*。


    寻找有创意的方式来宣传支持流程。与其发送详细描述流程的全公司范围的电子邮件，你可以更巧妙一些，只需在电子邮件签名中包含正确的电话号码。你也可以将流程发布到内部网站上，并在适当时引导人们访问该链接。另一个选择是发布关于你每月处理支持呼叫量的报告，并将流程详情包含在报告中（而不是仅仅报告数字并假设每个人都知道流程）。


    **提示：** 即使你发布十遍这个信息，人们仍然会忽略或否认看过。当他们声称不知道时，请耐心对待，只需再次将材料转发给他们。


    你需要在任何可能的地方发布，定期（以某种方式）提醒人们，并确保人们被通知到这个流程，尤其是在流程发生变更时。


    ## 提醒和执行


    你需要不断提醒人们你的**生产支持**流程。大多数人不会关注他们不经常使用的任何流程。如果你的系统运行良好，那么人们就不需要联系你寻求帮助，这意味着他们很可能不像应有的那样熟悉这个流程。


    除了提醒人们这个流程外，你还需要**执行**这个流程。


    这正是态度友好能带来好处的地方。如果有人联系你进行生产支持但没有遵循既定的流程，你有两个选择。你可以帮助他们并提醒他们流程，或者你可以先提醒他们流程，并要求他们遵循流程后你再提供帮助。


    虽然你可能认为正确的选择是先帮助这个人，然后提醒他们正确的流程，但请停下来想一下这个场景。如果他们不需要遵循流程而你还是帮助了他们，下次他们有什么理由要改变做法呢？记住，如果你的系统运行良好，那么大多数人不需要经常联系你。那么，他们到底什么时候才会开始熟悉这个流程呢？


    尽管这样做可能很痛苦，甚至冒着你的人缘变差的风险，但有时最好提醒人们正确的流程。通常我会权衡手头的情况，以决定是执行流程，还是允许这个人完全绕过流程。无论我选择哪一种，我都尽力保持友好的态度。


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![图 90](img/index-106_1.png)


    ## 工作/生活平衡


    在设计**生产支持**流程时，重要的是要记住你的工作之外还有生活。未能认识到这一事实，可能会导致你设计出一个长期来看不可持续的流程。即使你认为自己没有个人生活，也请尽力假设你有；否则，你的流程设计将建立在“你随时有空”的假设之上。这意味着你是一个单点故障，这将导致在某个时间点为某人提供糟糕的服务。


    一个往往被忽视的方面是知道何时说“不”的能力。在当今的企业文化中，许多人觉得当被要求承担额外任务时，他们不被允许说“不”。如果你经常说“不”，那么很快人们就不再问你了，不久之后，你的服务将不再被需要。


    从工作职责中抽身休息一下是很重要的。这可以让你，可以说，给自己充充电。你可以降低压力水平，得到一些必要的休息，当你重返工作岗位时，会发现自己精神焕发。但如果工作要求太高，你随时都需要待命，你该如何平衡工作和生活呢？


    ## 沟通


    就像生活中的大多数事情一样，良好的沟通对于一切顺利运行至关重要。这里也不例外。在努力平衡工作和个人时间时，你、你的经理和你的家人之间的良好沟通至关重要。


    如果你需要加班或在周末工作，那么一旦你知道了就通知你的家人。你能做到足够及时，达到他们的期望吗？不，不一定。但至少你在尝试这样做。我发现与家人共享一个日历很有用，这样当我知道我的工作职责会占用家庭时间时，我总能了解家人的活动安排。


    **提示：** 知道何时说“不”，但对你的家人永远要说“是”。永远如此。


    如果你的家人需要你，那么一旦你知道了就告诉你的经理。如果你需要早退，比如孩子病了，就告诉你的经理。如今大多数公司都提供所谓的弹性工作时间；没有打卡钟，所以如果你只是偶尔需要早退，你可以这样做，只要之后补上工作时间。


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![图 91](img/index-107_1.png)

    '
- fmt: 'I know that a lot of people are going to tell you that you family must come
    before your work. I will not disagree with that, but would add that you need to
    be mindful of your duties and obligations to each.


    ## Protect Your Private Time


    When you are home and not on call or expected to respond to anyone at work, then
    put the Blackberry in a different room. Believe me, the world will not end if
    you do not read or respond to an e-mail until the morning. If something is important,
    then someone should be calling your Blackberry, not sending you an e-mail, so
    just make certain you can hear your phone ring.


    Your job performance should be tied to tangible results, not the amount of hours
    that you put in working. If the number of hours seems to be all that matters,
    then you will find yourself with less personal time, and the company will more
    than likely find itself with less-than-ideal results from your performance. It
    is OK to let people know that when you are home, you are home. Many people believe
    that by protecting their home life, they end up enhancing the quality of the work
    they produce during regular working hours.


    ## Happy Fun Play Time


    You need to keep your stress level low, and one way to do that is to stay involved
    with activities you find fun and enjoyable. Have a hobby? Set aside some time
    weekly to pursue that hobby. Find those things that are important to you; things
    that are important enough for you to set aside some time. You are the one that
    controls your schedule, so use that to your advantage.


    What I look for are things that energize me. It can be anything—writing, tuning
    queries, jogging—whatever. The point is that I know there are certain activities
    that engage me at different times of the day and week, and those activities energize
    me as opposed to draining me physically, mentally, and emotionally.


    You are not always going to have equal amounts of time for work and life activities.
    But what you *can* do is only find time for work and life activities that you
    find energizing.


    Work and life are fluid events—some days you need to do more of one than the other,
    much to your dismay usually. But if those activities are *giving* you energy,
    then you are less likely to suffer from burnout.


    Your schedule should reflect this; give yourself some wiggle room each day to
    allow for your work or life to run longer than expected. That way, you never feel
    like you are leaving something out. What’s more is that as you finish up a task
    for either one, you will finish it feeling energized, not drained. You should
    feel like you accomplished something and be looking forward to the next task.


    [www.it-ebooks.info](http://www.it-ebooks.info)


