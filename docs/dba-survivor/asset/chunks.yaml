- fmt: '# CHAPTER 9: Connect. Learn. Share.


    John was not comfortable when he entered the store and tried to blend in with
    the other customers. He looked around for a headlight but could not find one.
    He was afraid to ask for help because he did not want anyone to know that he could
    not find something as simple as a headlight. At one point, he found a young man
    in a store uniform and asked him for help, but the young man was not very helpful.


    Frustrated, John heads over to the customer service desk to finally ask for some
    help. “Can someone please show me where the car headlights are?”


    The man behind the desk asked John, “Sir, have you ever shopped for car parts
    before?”


    “No,” John replied, “this is my first time. How did you know?”


    “Sir,” the man replied, “this is a pool supply store.”


    If you want to build your network then you are going to need to do two very important
    things. First, you are going to have to interact with others, in some way. Second,
    you have to make certain you are in the right room to begin with.


    ## Feeling Comfortable


    So how do you get past those feelings that make you uncomfortable?


    Find out what things make you most uncomfortable, and then don’t do those things.


    Sounds simple, right? Well, it depends.


    First, it could be difficult to ascertain what it is that makes you most uncomfortable.
    I know some people that are afraid of talking with new people because they are
    concerned that they may make a bad impression. I know others that are afraid of
    new people because they are not comfortable with themselves to start with. You
    need to find out *exactly* what your biggest concern is with meeting new people.
    Doing so will give you the opportunity to overcome those challenges, which also
    happens to be the second difficulty you face.


    Most people find it uncomfortable to attend events where they do not already know
    someone. If that also describes yourself then make an effort to find a friend
    to attend the event with you. Just make certain you do not spend all night talking
    with your friend and you never meet anyone new.


    **TIP:** It always helps to have a conversation starter. If you cannot think of
    anything else, you can always start with the weather.


    `www.it-ebooks.info`


    ![Image 164](index-174_1.png)


    Another tip that helps many people is to arrive early. That way it is easier to
    start a conversation with someone else that arrives early. If you arrive fashionably
    late you may find it more difficult to inject yourself into a conversation taking
    place among a group of people. When you arrive early you can not only talk with
    some of the other few early arrivals, you may also find it easier to move from
    your current group to another group.


    This is one reason why some people prefer social networking. It is more comfortable
    to meet people online than in person. I would remind you, however, that you are
    not anonymous when online. Be mindful of whatever comments you post to these forums.


    ## How to Approach Others


    I am not a natural conversationalist by any means. Walking up to strangers and
    talking to them is just not something I am very comfortable with. I have, however,
    learned a few things over the years that helps me understand how and when to approach
    others during a networking or social events.


    The first thing to notice is how people are interacting with each other. No matter
    how many people in a group, that group is always considered either open or closed.


    An open group means that people’s body positions are such that they are inviting
    others to join in their conversation. When people are standing and talking they
    will naturally position their bodies in a specific way depending on the nature
    of the discussion. Most discussions lend themselves to the group being open.


    A closed group is formed when the nature of the conversation is such that the
    participants are turned toward each other in a manner that is not inviting. This
    is a group that you would not want to try to interject yourself into a conversation,
    you would want to scan the room and look for open groups instead.


    **TIP:** I like to look for people that are looking for people. Hopefully that
    makes sense. In other words, often times there are people who have that inviting
    look, a look that says come talk to me or I wish someone was talking to me. —Sylvester
    Carstarphen


    Once you have figured out which groups are open, you will need to go over and
    introduce yourself. It does not have to be anything fancy or difficult. Just a
    simple, “Hello, my name is Tom, nice to meet you.” is all you need. Well, you
    should use your own name, of course. After that you can get a conversation started
    with a basic question such as “How did you hear about this event?” or “What do
    you do for work?” You could even make a statement, like “I am nervous.” or “I
    have trouble meeting new people.” are all acceptable conversation starters.


    After you have spent some time, you may want to move on to a new group. There
    is no hard and fast rule on the amount of time that must be spent with any one
    group. But you will need to have an exit strategy in place before leaving your
    group for another. Do not be so rude that you would leave a person by themselves,
    of course, but it is perfectly acceptable to simply say “excuse me” and move to
    another part of the room. Yes, it really is that simple.


    One of my favorite parts of these types of events is the power you have when connecting
    others. You may spend five minutes with one group and learn a few things about
    a person. Then, twenty minutes later, you may find someone new that has something
    in common with that other person you had met earlier. So you take the time to
    introduce those two people together.


    Why would you want to do this? Remember that you are all looking to build mutually
    beneficial relationships. If you can connect two people that may be able to help
    each other then you are helping others to build their networks. You can be certain
    that those two people are going to remember you as the person that introduced
    them to each other. Chances are they will return the favor by introducing you
    to someone that shares common interests with yourself.


    There is real power in being the person that helps to connect others.


    `www.it-ebooks.info`


    ![Image 165](index-175_1.png)


    ## Choosing the Right Room


    Where are some good places to go when you are looking for networking? Well, I
    have already talked about the value of professional associations. If you attend
    events sponsored by your professional association, you would at least know that
    others attending the event are people in the same field or industry as yourself.
    That could make conversations a little easier. Some common places to meet others
    would be conferences, user groups, local events, and training seminars.


    If you want to build a mutually beneficial relationship with someone else then
    you need to make certain that you both have something of value and interest to
    each other. It makes little sense to be shopping for car headlights in a pool
    supply store, so why would you network in a room filled with people outside your
    profession or field of interest? However, I see and hear about this exact situation
    from people that tell me how disappointed they are with networking events.


    Make certain you are in the right room to begin with before complaining about
    how bad your results are.


    ## Making It Easier'
