    ## **6** **Basic Troubleshooting**


    Your phone is going to ring, and the voice on the other end is going to say something
    incredibly descriptive such as “the server is slow,” or “is the server OK right
    now,” or one of my favorites, “we had a problem last night at 3AM, did you see
    anything wrong at that time?”


    When the time comes to drill down to the root cause of performance issues you
    are going to want to quickly isolate the nature of the issue. Knowing what tools
    you have at your disposal is only part of the solution; the other part is knowing
    how to apply the right tools, and at the right time.


    This chapter will give you a solid foundation on basic troubleshooting techniques
    and tools. You will need to be able to troubleshoot issues if you want to survive
    as a `DBA`.


    Performance tuning skills will come later. Right now, you need to be able to isolate
    the problems if you expect to come back to work each Monday.


    `TIP:` I would estimate that roughly seventy percent of all performance issues
    I have seen are the result of code, and not the database engine. Code can be stored
    procedures, queries, database design or schema, or indexes. Sometimes it is simply
    the result of an influx of data. Keep all that in mind when troubleshooting any
    performance issue.


    In this chapter, we will discuss the following:


    **1.** `CSI: SQL`


    **2.** Common Bottlenecks


    **3.** Available Tools


    ### `CSI: SQL`


    Think of the job of a police detective assigned to the forensics unit. No matter
    what time of day or night, when a crime happens they will be called to investigate.
    They make certain the scene is secure, they gather their evidence, interview witnesses
    and 95


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 98](index-114_1.png)


    # **CHAPTER 6: Basic Troubleshooting** **96**


    suspects, and do their best to solve the crime. Not only will they need to interview
    people but they will need to set up surveillance on their suspects and monitor
    their activities for a period of time.


    On television all of this happens in less than an hour. In real life, it takes
    a little bit longer.


    And some crimes never get solved.


    Now think about your life as a `DBA`. No matter what time of the day or night
    someone, somewhere, is going to have an issue with a database or a database server.
    When that happens, you are going to get called in to investigate. You will be
    expected to immediately analyze all available details and provide a recommended
    course of action. If your job was a television show, you would be given about
    an hour to solve the issue. In real life, people want an answer in less than a
    few minutes, especially if it is the middle of the night. And rarely are your
    issues allowed to go unsolved.


    In order to provide high level of support you will need to make certain you can
    do three things. First, you need to know where to look, which we will assume to
    mean an incident has taken place. Second, you need to know what questions to ask
    (and who to ask), which you can think of as an interview (or an interrogation).
    And third, either review your monitoring or put your monitoring in place, which
    is the same as surveillance.


    That is the `DBA` circle of life: something will happen, you will ask some questions,
    and you need to monitor some things going forward.


    ### Incidents


    Incidents and issues will happen; there is no way to avoid them. All you can really
    do is make certain you are as prepared as possible to deal with them when they
    happen. You can best achieve this by approaching each issue in the same exact
    way, much as a forensics detective would. In addition to having your own set of
    tools at your disposal, another good skill to acquire is the ability to *remain
    unemotional*.


    If you allow emotions to be a factor in your work then you will likely have clouded
    judgment. You need to focus on the facts at hand. Allowing your emotions to come
    into play can cause you to overlook facts or clues that are right in front of
    you. This can lead you to make a poor recommendation on a course of action.


    `TIP:` Do not lay blame for the incident on someone that was not involved in any
    way. Gather your facts so that you can arrive at sound conclusions.


    When an incident arises you need to get involved and gather all the facts you
    can and then analyze those facts. Chances are you will feel pressure to solve
    the issue; do not let that pressure dictate your actions.


    Always check your work. If you think you know the answer after only a few minutes
    of investigation then go back and check again to see if there is anything you
    may have missed.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 99](index-115_1.png)


    # **CHAPTER 6: Basic Troubleshooting** **97**


    Only after you have gathered your facts will you be ready to start asking some
    pertinent questions.


    ### Interrogations


    The facts that you gather will lead you to questions that need to be answered.


    Let’s consider the following scenario. It is the middle of the night. A scheduled
    process has filled up the data drive on the server. You get called in to investigate,
    you gather your facts, and you can see the exact database that is responsible
    for the unexpected growth. You could dive in and start trying to solve the issue
    but the right thing to do is to start asking questions.


    Is the space needed? Was this growth expected, but not properly planned for? Is
    there some cleanup that can be done? Can the drive be expanded? If so, how long
    will it take?


    If you are lucky, the people that can answer your questions will be immediately
    available.


    That is not always going to be the case. When asking questions you will need to
    make certain you do so in a way that does not make them feel as if it is a police
    interrogation.


    You will need to have good soft skills (and patience) in order to draw out all
    the necessary details.


    One way to get this done is by focusing on the process. Let the people know that
    you are trying to help and that in order to get them the help they need then there
    is a process to be followed. Part of the process is to ask questions in order
    to make certain all relevant facts are known. If you fail to make that connection
    then people will tend to react to you as if they are being questioned by the police.


    However, there are going to be times when you do everything in your power to make
    people feel as if they are part of the process, but they still choose to not participate.
    You cannot force people to talk; either they want to work with you on a proper
    solution or not. Even if you know they have the details you need, if they choose
    to remain silent, or choose to work by themselves, all you can do is work with
    the facts and answers you have. You are not allowed to sit them in a cold room
    with bright lights for hours on end, no matter how much you think they deserve
    such treatment.


    Of course, one reason people may not want to answer your questions is because
    they don’t want to incriminate themselves. If you have your surveillance in place
    then your questions can be focused, but remember to remain emotionally detached.


    ### Surveillance


    [www.it-ebooks.info](http://www.it-ebooks.info)


