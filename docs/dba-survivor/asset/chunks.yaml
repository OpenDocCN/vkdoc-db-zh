    ## 药剂师


    在担任药剂师 16 年，期间协助配置过一些微软 Access 应用程序后，凯西决定离开她工作的医院，去找一份程序员的工作。她学习了一些 Visual Basic
    4 和 HTML，创建了她的第一个 ASP 网站，并开始使用`SQL Server 6.5`。在完成了一个为期六个月的编程任务后，她被同一家公司聘为全职`DBA`。


    她现在是一位已出版的作者和`SQL Server MVP`。


    ## 酒店经理


    布伦特在担任酒店经理时，忍受着难以想象的糟糕工作时间，并应付着一些可能最暴躁的顾客，他偶然发现了 Quattro Pro 和电子表格。厌倦了长时间的工作，尤其是在节假日，他决定转行进入
    IT 领域。工作时间略有改善，但现在他必须整天整夜携带寻呼机，所以实际上这算是倒退了一步。但他学到了很多关于服务器的知识，并最终接触到了数据库。如今他也是一位`SQL
    Server MVP`。


    ## 估算主管


    我以前甚至不知道还有这样的职位名称，但蒂姆多年前正是从这里开始的。这份工作并不令人满意，一位朋友让他开始自学一些`T-SQL`。他抓住了跳槽的机会，尽管这意味着他将成为一名`Access`开发人员。雇佣他做开发人员的同一家公司决定让他转做公司的`SQL
    Server DBA`，这是他当时并不想要的机会。但十年后，他感到非常幸运能得到担任`DBA`的机会，他同样也是一位`SQL Server MVP`。


    ## MUMPS 程序员


    乔纳森是一家大型化学品公司的`MUMPS`程序员，支持用`MUMPS`编写并在`DEC VAX/VMS`上运行的工业卫生和医疗系统。有一天，他被告知，公司已决定使用关系数据库作为后端存储来重写这些系统。


    公司计划标准化使用`Rdb`，于是乔纳森在他的`VMS`命令行中输入了“`HELP RDB`”。他如饥似渴地阅读在线帮助文档。他钻研手册。他创建数据库进行实验。他迷上了`SQL`的强大功能，并迅速成为部门里处理数据库问题的首选人物。他想成为一名`DBA`。


    他作为一名`MUMPS`程序员未能成为`DBA`。相反，他被解雇了。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 9](img/index-25_1.png)


    ## 第一章：我是如何走到这里的？


    他作为一名`COBOL`程序员，在各种合同工作中未能成为`DBA`。


    他作为一名`Visual Basic`程序员未能成为`DBA`。


    他作为一名`PowerBuilder`程序员几乎也没能成为`DBA`。


    然后有一天，那位`DBA`辞职了，乔纳森成了**立即上任的 DBA**。他终于可以称自己为`DBA`了。


    让乔纳森最终成功的是他坚持不懈——坚持了五年多。为了谋生，他必须用各种开发语言做高质量的工作，但他一直持续钻研他的数据库技能。


    当`DBA`辞职时，那就是准备遇到机会的时刻。


    ## 你被选中了！

    **肯·西蒙斯 著**


    这里的大多数故事似乎都是关于人们积极尝试成为`DBA`。我一直在等待这样的情景出现：经理走进来对开发人员说：“嘿，你，你现在是`DBA`了。”


    ## 你的旅程


    如果你希望成为一名`DBA`，你该如何以及从哪里开始？你需要获得特定的学位吗？你需要尝试在某个地方找到一份初级`DBA`的工作吗？在没有`DBA`经验的情况下，你如何开始你的`DBA`职业生涯？要进入这个职业道路，你有哪些选择？


    与大多数专业领域一样，成为一名`DBA`可能看起来令人生畏。刚开始做`DBA`可能很艰难，因为大多数时候，这取决于有人给你一个你需要的机会。你需要有人给你正确的机会，而在你得到那个机会之前，你需要开始准备自己。那么，你到底该如何为你还不太了解的工作做准备呢？


    ### 积累生活经验

    **布伦特·奥扎尔 著**


    即使是上学也不能保证得到一份`DBA`工作。公司最珍贵、最有价值且不可替代的资产是其数据。公司必须确保他们的`DBA`值得信赖且有经验，这意味着他们通常不会信任刚从大学毕业的人担任`DBA`角色。在你阅读本章以及人们如何成为`DBA`的故事时，思考一下你自己的生活经历如何能够展现你的可信赖性。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 10](img/index-26_1.png)


    ### 做好准备


    如果你已经决定要成为一名`DBA`，那么就开始采取措施，为机会敲门时做好准备。如果你不采取行动，只是坐着等待有人将你梦想工作的机会拱手相奉，那么当机会从未降临时，请不要沮丧。它确实不会来。


    你能采取哪些步骤来让自己做好准备？我的第一个建议是，在你的日常工作中寻找能够让你获得一些`DBA`经验的机会。如果你尚未进入 IT 行业，那么你的选择会更有限，但并非不可能。如果你在
    IT 行业，也许是一名开发人员，那么就开始更多地参与数据库设计工作或性能调优。


    如果你是一名开发人员，并且希望成为一名`DBA`，我将给你一个相当大的建议，关于如何获得宝贵的经验：学会更好地进行性能调优，而不要抱怨你需要成为“`sa`”才能完成工作。说真的，如果你对系统非常了解，即使没有管理员权限也能获取性能详细信息，那么你成为`DBA`的路就走过一大半了。


    你会非常惊讶地发现，许多`DBA`执行常规任务时并不需要`sa`权限。随着越来越多的公司对允许的访问级别实施更严格的控制，你可能会发现有必要学会用最少的权限来完成任务。


    **提示：** 学会在不是`sys admin fixed-server role`成员的情况下执行任务。这些技能对你以后会很有用。


    如果你目前的角色不允许你承担可能与`DBA`相关的额外任务，那么去找工作中的一位`DBA`，问问他们你该如何开始。


    大多数`DBA`总是乐于帮助他人更多地了解系统；这样做意味着当他们被叫来修复你的错误时，支持工作会更少！大多数`DBA`既积极进取*又*有些懒惰；这意味着我们总是在寻找让我们的生活更轻松的方法。其中之一就是帮助培训人们如何更好地完成他们的工作。


    如果工作中没有什么你能帮忙的怎么办？你可以寻找做志愿者的机会。许多慈善组织需要人们捐赠他们的时间。当地的教会可能需要一些帮助来维护他们的计算机，甚至可能帮助维护一两个数据库。它可能不是每秒`15,000`笔事务的`10TB`数据库，但它是一个数据库，并且将是一个学习机会，你可以写进你的简历。


    ### 做一位负责任的管理者

    **肯·西蒙斯 著**


    值得注意的是，数据终究是数据，即使你是一名志愿者，你也需要小心，不要承担超出你能力范围的事情而犯下严重错误。编程错误不像`DBA`错误那样具有灾难性。在你的志愿工作中要像在带薪工作中一样负责任。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 11](img/index-27_1.png)


    如果你没有兴趣志愿帮助他人，那么也许你有一个重叠的爱好可以提供学习机会。就我而言，我喜欢梦幻橄榄球。多年前，我帮助建立了一个带有数据库后端的自定义网站。这给了我很多学习机会，帮助我获得了成为`DBA`的最初机会。

