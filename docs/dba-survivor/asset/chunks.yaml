- fmt: '# CHAPTER 7: Where’s the Buffet?


    Or perhaps instead of one person heading out, someone stops by and says, “We’re
    heading down to the Chinese place that pretends to be a healthy Thai place, but
    everything is deep fried there anyway. Want to come along?” You want to say no,
    but you don’t normally eat there often and think of this as a treat. You get up
    and head out to grab a bite to eat with some friends and promise to go for a jog
    later when you get home (you won’t).


    I want to make one thing very clear: `none of us is as dumb as all of us`. It
    is amazing to watch a group of people make poor decisions that they wouldn’t make
    as individuals. It happens all the time, and not just with food. There is something
    about group mentality that can make smart people look less than smart.


    It can be difficult to turn down the chance to be socially interactive with your
    coworkers.


    And you do not want to be the only one in the group that insists on heading to
    a place that has a menu selection that did not have parents. But you do need to
    be mindful that when the situations come up, that you have some options.


    For example, you could reply with, “I brought my lunch, but I wouldn’t mind going
    for a walk if you are planning on bringing your lunch back here.” See? You get
    to talk a walk and have some social interaction, but you still get to eat the
    healthier lunch.


    What? You did not bring lunch? Well then, try this response instead: “Oh, I was
    planning on going to the place right next door; I will walk with you anyway and
    grab a bite at the place I was going to eat that won’t be giving me a heart episode
    by the time I am 39.”


    See how easy that is? You can still grab your lunch at the healthier place, and
    you still get to walk with your coworkers. A venerable win-win if there ever was
    one.


    The end result should be that you make your best effort to avoid unhealthy options
    simply because you are with a group.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 132](index-142_1.png)


    ## Happy Hours


    Nothing says peer pressure like a happy hour. Getting together with your coworkers
    for a few pints of lager after work can lead to an extra few thousand calories
    as you have a handful of pints and appetizers. If there are a few executives around,
    it can only add to the pressure if they order you a round. After all, no one wants
    to tell the big boss no.


    Chances are you would rather have the drink because it would give you the opportunity
    to spend a few minutes having a conversation. Trust me, if the boss is buying
    drinks, chances are you are not counting calories. Even more so if there is a
    group of you there, because you already know that `none of us is as dumb as all
    of us`.


    How do you avoid this scenario? Well, you could always turn down the offer to
    attend the function. Of course you may feel that it is important to be social.
    Well, why not attend for just a while—say, 30 minutes—and then excuse yourself?
    You would seem to get the best of both worlds there. You get to socialize with
    your coworkers and you get to avoid all the extra unhealthy eating that is bound
    to happen as people have a few extra drinks.


    **TIP:** If you feel that your job depends upon your participation in such events,
    then you will either need to take steps to avoid the peer pressure, accept that
    you will gain weight, or find a new job.


    And if you are heading to the happy hour, you should grab yourself some water
    before you head out. Filling your stomach with some water will trick your body
    into thinking that it has had food already, and you will be less inclined to snack
    (and hopefully less inclined to drink).


    ## Traveling


    Traveling for business can also lead to poor nutritional choices. You are in an
    unfamiliar area, you end up ordering from room service, and you are able to use
    an expense account. It all adds up to a lot of extra calories as you decide to
    try something different.


    And why not? If you are on the road, why not treat yourself to trying something
    a little different than your normal dinner of lentil loaf and a spinach salad?


    The thing to keep in mind when traveling is moderation. You want to have a triple
    bacon cheeseburger? Fine, but do not make it your dinner every night. Make sure
    you drink plenty of water and go out of your way for a healthier option the other
    nights. You may find it hard to stick to a routine because you may not have a
    routine, unless you travel frequently.


    I like to rent a car when I travel because then I have the option to head to a
    local grocery store. Not only does it save money, but I find that I will have
    the widest possible variety of meal selections. Sure, I do not have a kitchen,
    but a lot of supermarkets these days have prepared meals that I can sample, or
    a salad bar, and maybe even some sushi.


    When you travel, you want things to be as similar to home as possible.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 133](index-143_1.png)


    When you are home, your meals are usually made from items you have purchased at
    your local supermarket, right? If so, then why not have supermarket food on the
    road as well? Even if you are in town for just two nights, you can stop by a supermarket
    and pick up some items for breakfast, lunch, and dinner that would be better nutritional
    choices than anything on the room service menu.


    **TIP:** You can find lots of great traveling tips online these days. As with
    any advice, you need to try things for yourself to see what works best.


    The harder part when traveling would be the temptation to head out for a bite
    to eat with people you see infrequently. Maybe you will grab lunch with a couple
    of coworkers and dinner with someone else. Or meet up for breakfast at a local
    pancake palace. It can be all too easy to find yourself eating out all the time
    with all sorts of different people.


    It can be difficult, but it is not impossible to make good choices and put yourself
    into good situations when traveling. Sometimes it takes a bit of creativity. Almost
    always it takes dedication. Whatever it takes, do it. Don’t give up on yourself.
    You’re worth the effort.


    ## Exercise


    I know that when most people hear the word `exercise`, they think about something
    difficult and strenuous. They imagine endless jogs, lifting weights, swimming
    laps, being out of breath, and sweating through their clothes even when they get
    back to the office.


    They also imagine aching muscles, sore backs, and that they don’t have enough
    time in the day for any of that.


    While the above is certainly true for the majority forms of exercise, it is not
    always the case. There is a way for you to increase your activity level without
    the sweat and strain associated with hitting the gym during your lunch hour. And
    it is something you have been doing almost your whole life: walking.


    OR NOT WALKING


    **by Jonathan Gennick**


    Tom is of course spot-on to recommend walking as good exercise. It is wonderful
    exercise, and requires no special skill or equipment. I live in a small town,
    and I take advantage of that to run many errands on foot.


    But another point of view is to find something fun that you enjoy doing, that
    is active. More than walking even, I like to ride bikes—always have, ever since
    my receiving my very first one as young child. I’m not talking about exercise
    bikes that don’t go anywhere. Those bore me to tears. But put me on a bike that
    moves, and I’m good and willing to go for a long time. I like bikes so much that
    I even ride in winter, on ice, using studded tires imported from Finland.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 134](index-144_1.png)'
  raw: 'Or perhaps instead of one person heading out, someone stops by and says, “We’re
    heading down to the Chinese place that pretends to be a healthy Thai place, but
    everything is deep fried there anyway. Want to come along?” You want to say no,
    but you don’t normally eat there often and think of this as a treat. You get up
    and head out to grab a bite to eat with some friends and promise to go for a jog
    later when you get home (you won’t).


    I want to make one thing very clear: *none of us is as dumb as all of us*. It
    is amazing to watch a group of people make poor decisions that they wouldn’t make
    as individuals. It happens all the time, and not just with food. There is something
    about group mentality that can make smart people look less than smart.


    It can be difficult to turn down the chance to be socially interactive with your
    coworkers.


    And you do not want to be the only one in the group that insists on heading to
    a place that has a menu selection that did not have parents. But you do need to
    be mindful that when the situations come up, that you have some options.


    For example, you could reply with, “I brought my lunch, but I wouldn’t mind going
    for a walk if you are planning on bringing your lunch back here.” See? You get
    to talk a walk and have some social interaction, but you still get to eat the
    healthier lunch.


    What? You did not bring lunch? Well then, try this response instead: “Oh, I was
    planning on going to the place right next door; I will walk with you anyway and
    grab a bite at the place I was going to eat that won’t be giving me a heart episode
    by the time I am 39.”


    See how easy that is? You can still grab your lunch at the healthier place, and
    you still get to walk with your coworkers. A venerable win-win if there ever was
    one.


    The end result should be that you make your best effort to avoid unhealthy options
    simply because you are with a group.


    [www.it-ebooks.info](http://www.it-ebooks.info)


