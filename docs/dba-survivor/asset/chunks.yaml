  trans: '

    对 RAID 5 的喜爱并非人皆有之。2003 年，沮丧的数据库管理员 James Morle 创建了一个戏谑的组织，名为**反对 RAID 5 联盟**。该联盟的目标是反对任何及所有
    RAID 5。您可以访问其网站并在以下 URL 阅读相关论述：


    [`http://miracleas.com/BAARF/BAARF2.html`](http://miracleas.com/BAARF/BAARF2.html)


    你可能会也可能不会同意该联盟的观点——到目前为止，我选择保持开放的心态——但该联盟网站上托管的一些文章是经过深思熟虑的，值得一读。


    ## RAID 1+0


    这个级别通常被称为带镜像的条带化，有时也称为 `RAID 10` 甚至 `RAID 1/0`。你需要先配置一个条带集（`RAID 0`），然后将其镜像（`RAID
    1`）到另一个类似的条带集上。图 3-6 展示了其可能的样子。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 43](img/index-59_1.png)


    ## 第三章：一些基础知识


    ### 41


    **图 3-6.** *将驱动器条带集进行镜像的 RAID 1+0*


    在所有的 `RAID` 级别中，`RAID 1+0` 级别提供了最高的性能。它也提供了容错能力。当然，它的成本也更高，因为你需要两倍数量的磁盘。


    ## 你想要哪种 RAID 级别？


    这当然取决于情况。你是否希望当一个驱动器故障时，你的数据仍然保持在线？大多数人都希望如此，但也许你不是。那样的话，`RAID 0` 就适合你！无需担心奇偶校验或镜像，只需将你的磁盘配置成一个大型条带集就完事了。


    那性能和成本呢？大多数人也关心这些，很可能你也关心。但当涉及到 SQL Server 时，你会发现没有一个单一的 `RAID` 级别能满足你所有的需求。等等……你了解自己的需求是什么吗？嗯，让我们以最简单的方式讨论一下。


    ## 你的需求


    你实际上只有三个基本需求：


    -   数据库数据文件的放置位置

    -   事务日志文件的放置位置

    -   tempdb 数据库文件的放置位置

    -   数据库备份的放置位置


    好吧，那是四个需求，但真的就这些了。你的数据文件应该放在一个驱动器或磁盘组（阵列）上，你的事务日志文件应该放在另一个单独的驱动器或磁盘组上，你的 tempdb
    文件应该放在第三个组上，而你的备份应该存储在第四个组上，或者完全放在另一个服务器上（这通常是推荐的做法）。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 44](img/index-60_1.png)


    ### 42


    ## 第三章：一些基础知识


    上述列表中的每一项都引出一组不同的需求。在一个预算无上限、且有专为数据库服务器设计的硬件的完美世界里，你将能够用 `RAID 10` 配置所有内容。服务器的操作系统文件放在一个阵列上，页面文件放在另一个阵列上，你的数据、事务日志和
    tempdb 文件也分别放在不同的阵列上。那将是五个不同的阵列，都配置为 `RAID 10`，意味着你（至少）需要二十块硬盘。如果你想知道的话，那确实需要很多硬盘。大多数服务器都没有那么多硬盘托架。


    但你真的需要这一切吗？我现在维护着数千个数据库，其中 99%的数据库即使数据、事务日志和 tempdb 都使用 `RAID 5` 也能运行良好。但也有少数系统确实需要额外的关注和照顾。当你需要帮助进行性能调优时，坚持基本原则将对你有益。


    **注意：** Tom 在这里关于许多系统在 `RAID 5` 阵列上运行良好的评论与我自身的经验相符。这就是为什么我一直无法完全接受 BAARF 的观点。
    – Jonathan Gennick


    在故障排除时，你最需要认识到的是压力来自哪里。是 tempdb 吗？如果可能，将你的 tempdb 放在 `RAID 10` 上。是事务日志吗？如果可能，将你的事务日志放在不同的
    `RAID 10` 组上。如果不行，那么为你的事务日志选择 `RAID 1`。是数据文件吗？你的数据也应该放在另一组 `RAID 10` 上，但如果那不可能，那么为你的数据选择
    `RAID 5`。


    归根结底是：了解这些 `RAID` 级别之间的差异，以及你想使用哪些级别。这些知识在你帮助设计任何系统架构时将大有裨益。


    ## 面向数据库管理员的 SAN 入门知识


    至此，你应该已经牢牢掌握了 `RAID` 的概念，足以坐下来与你的服务器团队成员讨论一些技术问题了。如果真这么做，你可能会发现你的大多数服务器都没有足够的驱动器托架来容纳你可能想要的各种
    `RAID` 类型。你甚至可能会发现自己提出了不同的 `RAID` 配置需求，从而引发了关于外部存储的讨论……然后，某个地方的某人会提到以下内容：`SAN`。


    `SAN` 代表 *存储区域网络*，它要么是你所能想象的最奇妙的东西（可能性很高），要么是一场噩梦（可能性不大，但存在）。`SAN` 背后的概念很简单：将成百上千个物理磁盘捆绑在一起，将它们划分成逻辑单元（称为
    `LUNs`），然后将你的服务器连接到这些 `LUNs` 以获取存储空间。图 3-7 展示了一个 `SAN` 如何为许多服务器提供服务。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 45](img/index-61_1.png)


    ## 第三章：一些基础知识


    ### 43


    **图 3-7.** *SAN 中的驱动器可以根据需要分配给多个服务器。*


    这样，如果你需要为服务器增加额外的存储空间，只需分配一些额外的 `LUNs` 即可。事实上，大多数时候，你的 `SAN` 管理员只会问你：“鲍勃，你现在需要多少空间？”
    无需将小硬盘换成大硬盘，也无需让 `RAID` 控制器重建阵列。听起来很棒，对吧？


    也许吧。


    让我们想象一下，你是 `SAN` 管理员。你将成百上千个磁盘捆绑成 `LUNs`。你会为所有这些磁盘使用哪个 `RAID` 级别？如果你回答 `RAID 5`，因为它具有成本效益和大存储容量，那么当你结束数据库管理员的职业生涯后，可能在
    `SAN` 管理领域会有发展前途。


    很可能你的 `SAN` 确实是配置为 `RAID 5`。如果你还记得，`RAID 5` 对于数据库服务器来说并不总是理想的。别慌：当在 `SAN` 中正确使用时，`RAID
    5` 阵列可能不是最理想的，但它们仍然可以足够好。


    ## 为什么 RAID 5 可能适合你


    首先不必担心的原因是，`SAN` 控制器具有内置缓存：作为服务器与其存储阵列之间缓冲区的内存。每当 SQL Server 向你的驱动器发出写入操作时，只要数据进入
    `SAN` 控制器的缓存，这些写入就被认为是已提交的。配置正确时，该缓存比任何磁盘阵列都要快，无论是 `RAID 5` 还是 `RAID 10`。虽然你的
    `SAN` 可能使用 `RAID 5`，但你的数据并非直接写入磁盘；它首先被转储到缓存中，然后再写入磁盘。


    你的查询不会等待数据真正写入磁盘；当数据实际上还在缓存中时，它们就认为数据已经到位了。只有在缓存实际被填满的情况下，你才会看到性能问题，而在这种情况下，你将*处处*遇到性能问题，而不仅仅是一台服务器。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 46](img/index-62_1.png)


    ### 44


    ## 第三章：一些基础知识


    其次，你不应惊慌，因为你可能还没有看到任何实际的性能问题。仅仅因为你的 `SAN` 可能配置为 `RAID 5`，并不足以让你竖起汗毛。不，先生，你最好能提供一些证据，证明你遇到的性能问题可能与
    `SAN` 性能有关。

    '
- fmt: '# The Lost Art of Benchmarking


    The only way to find out for certain if storage is a bottleneck before a server
    goes into production is to do some benchmarking. One thing I find common in most
    shops these days is that fact that benchmarking is far from a common practice.
    People tend to slap things together, throw them into production, and wait to see
    if anyone screams. If you want to make the leap to being Mr. Right, then you will
    be wise to benchmark some of the more important processes in your shop. That way,
    when someone says, “This is slow,” you can quickly reference the latest benchmark
    to determine if it really is slow or if it is just perception.


    The first question you need to ask you SAN administrator when troubleshooting
    possible SAN performance issues is, “What is the expected I/O throughput for our
    SAN?” Get whatever details you can, and then go back to your cube and start gathering
    your own metrics. Then compare to see if the expected throughput is close enough
    to the observed. If not, now you can go back to the SAN administrator with some
    actual facts.


    Believe me, that will get you a lot more traction than making a blanket statement
    such as, “We would like to have some space on the SAN carved out in RAID 10 for
    our `tempdb`.” Unless you have proof that there is a performance issue, your SAN
    administrator is not going to be compelled to start carving out different RAID
    levels, even if you know what works best for SQL Server.


    **TIP:** The more benchmarking and testing you perform, the more control you have
    over your environment.


    Your SAN could indeed be a performance bottleneck, and it may be very difficult
    for you to troubleshoot. Much in the same way that people will blame a database
    server because it is a big black box they do not understand, I have seen some
    DBAs be frustrated because their SAN is also a big box that they do not understand.
    The best advice I could give to you is to think of your SAN as being a constant.
    It should serve up a standard I/O throughput. It should allow for you to dynamically
    add space to a server when needed. It should be the same for each server. And
    that means you can perform some benchmarks on different servers, assume that the
    SAN performance should be equal, and take your results to the server team to discuss
    the discrepancies. It may indeed be the SAN, but it could also be something else.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 47](index-63_1.png)


    ## CHAPTER 3: Some Basics


    ### 45


    **NOT A CONSTANT, BUT A VARIABLE!**


    **by Brent Ozar**


    Hmm—I tell people the opposite. Assume the SAN is a variable. The SAN team can
    change it without warning. You can get new neighbors that share your drives, you
    can have switch failures, and so forth. All these things can change your performance
    without warning. Perhaps the point is to test to ensure that your SAN remains
    a constant like it is supposed to, and so that you are alerted when it ceases
    to be a constant due to some unknown change by an unthinking SAN administrator.


    ### It’s All About the Spindles, Baby


    If the SAN creates a performance bottleneck, then one discussion you will want
    to have is about the spindles. A *spindle* is a SAN administrator’s slang for
    an individual drive that is combined together with other drives to make arrays.
    For example, you could have ten disks in an array, build five logical volumes
    on those ten disks, and each volume would have ten spindles. But if two or more
    of those volumes are put under stress, then all ten spindles are under stress.
    In an ideal configuration, your SAN would have as many spindles as possible and
    a minimal chance for resource contention.


    Want to have some fun? Go and ask your SAN administrator this question: “If my
    current LUNs were converted into physical disks, how many spindles would I have
    allocated?” If the number is low, then you may have cause for concern. Again,
    that is why I stress the importance of benchmarking.


    While SANs may be great, it is not all unicorns and rainbows. One of the drawbacks
    to SAN storage is that it can be unpredictable. For example, what if you are doing
    all of your database backups at the same time of day and week on your SAN? Chances
    are you will flood the cache and cause issues everywhere. Now imagine that it
    is not your backup process but an end user that decides to bulk load 20GB of data
    that causes performance issues on other servers that are sharing disks within
    the same LUNs.


    One last thing to note is that your SAN may use replication, automatically sending
    all data from one SAN to another SAN in a different city, for high availability
    and/or DR purposes. Even if that is the case, you still need to be taking regular
    database backups.


    Do not let anyone try to convince you that SAN replication eliminates the need
    for regular database backups. About the only thing sillier would be if they said
    that RAID 5 eliminated the need for a database backup. It is not true, and it
    will only take one disaster (which will be your last disaster, by the way) for
    everyone to understand why the database backups were necessary. Furthermore, tools
    like SAN replication and RAID should still only be one part of your high availability
    strategy.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 48](index-64_1.png)


    ### 46


    ## CHAPTER 3: Some Basics


    ### High Availability Options


    You know enough basics on storage, but you have to worry about more than just
    storage to make certain your systems are always available. Keeping a database
    online despite problems like server crashes, OS freezes, and hardware failures
    is called *high availability (HA)*. As the DBA, you are going to be held responsible
    for making certain your database servers are always available, *even if you have
    nothing to do with the apparent outage*. You read that correctly. Your end users
    see you as the face of availability. Should the server be down because someone
    decided to unrack it by mistake, it will be your phone that rings, not the guy
    in the server room using your box as a new paperweight.


    There are four major groups of HA options that you should be familiar with when
    having group discussions. They are clustering, log shipping, replication (both
    SQL and SAN), and database mirroring. Each one has advantages and disadvantages
    when compared to the others. The best advice I could give you is this: *there
    is nothing permanent except change*. What I mean by that is that you can spend
    a lot of time and money designing the perfect HA solution for your shop only to
    find that in 18 months your design is no longer adequate. Therefore it is best
    to keep in mind all available options and how to be flexible enough to move things
    around, if necessary.


    **TIP:** HA is HA and DR is DR. They are very different things. Remember that.


    One last note before we continue: *HA does not mean the same thing as DR*. You
    systems can be highly available, but have no ability to recover from a disaster.
    Likewise, your system can be configured to recover from a disaster, but during
    recovery your systems may not be available. Please keep this in mind during your
    conversations. At some point you will run into a person who feels that HA is more
    important than DR. They will be wrong, and you will do your best to help them
    understand that your jobs depend more on recovering from a disaster than availability.


    The topics we discuss next are mostly with an eye toward HA options, but some
    of them can double as both HA and DR solutions. You will need to decide which
    ones work best for your shop.


    ### Clustering'
  raw: '**The Lost Art of Benchmarking**


    The only way to find out for certain if storage is a bottleneck before a server
    goes into production is to do some benchmarking. One thing I find common in most
    shops these days is that fact that benchmarking is far from a common practice.
    People tend to slap things together, throw them into production, and wait to see
    if anyone screams. If you want to make the leap to being Mr. Right, then you will
    be wise to benchmark some of the more important processes in your shop. That way,
    when someone says, “This is slow,” you can quickly reference the latest benchmark
    to determine if it really is slow or if it is just perception.


    The first question you need to ask you SAN administrator when troubleshooting
    possible SAN performance issues is, “What is the expected I/O throughput for our
    SAN?” Get whatever details you can, and then go back to your cube and start gathering
    your own metrics. Then compare to see if the expected throughput is close enough
    to the observed. If not, now you can go back to the SAN administrator with some
    actual facts.


    Believe me, that will get you a lot more traction than making a blanket statement
    such as, “We would like to have some space on the SAN carved out in RAID 10 for
    our tempdb.” Unless you have proof that there is a performance issue, your SAN


    administrator is not going to be compelled to start carving out different RAID
    levels, even if you know what works best for SQL Server.


