    Chances are you will have some apprehension about telling people how long something
    will take because you believe that they know how long the task should take. There
    is a high degree of probability that they have no idea how long something will
    take. What they do know, however, is how long they want something to take. If
    your estimate is close enough to what they want, then there is no issue. If your
    estimate is much longer than their current needs, then they will tell you so.


    Now, if your estimate is truly the fastest amount of time it will take to perform
    the task, then it really won’t matter one way or the other. If the estimate is
    not the fastest because of your experience level, then you have the following
    scenario.


    **You Did It Wrong**


    Let’s say you tell them your estimate, you get the work done, and you provide
    some details on what you did. There is always a chance that they are going to
    respond and ask why you did something in a particular way. This may be because
    they have some knowledge that you do not possess, but it could also be that they
    are just looking for some knowledge themselves. In either case you do not need
    to apologize for getting a task done in a certain way. If there is a better way
    that you were not aware of, then admit as much and thank the person for bringing
    it to your attention. If there is a reason you chose to perform a specific set
    of actions, then feel free to explain why (politely, of course) you chose those
    actions, and again thank them for bringing the alternate method to your attention.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 76](index-92_1.png)


    **74**


    **CHAPTER 4: A Development Server Is a Production Server to a Developer** I can
    recall one time being questioned outright as to how and why I performed a task
    in a certain way. The developer was quite polite about asking me why I took a
    few extra steps in getting something done, and I really had no answer at the time,
    other than, “I preferred to do it this way and keep everything in a standard state.”
    Another time I was ordered to perform a task in a specific way because they “wanted
    it done fast,” and yet they were asking for it to be completed in a way that would
    take much longer.


    It is perfectly natural to feel apprehensive about giving away too many details
    about the tasks you are performing. But it is my belief that you are better off
    communicating your actions than remaining silent. If someone suggests a different
    way to get something done, then you may learn something new. If someone suggests
    the wrong way to get something done, then you’ll be presented with the opportunity
    to help educate someone—a win-win situation if there ever was one.


    **Be Responsive and Responsible**'
  trans: '

    在此过程中，他们将了解你所执行任务的多样性，甚至是你面临的一些困难。


    如果你的公司有多个办公室，那么坐下来与人交谈就会更加困难。虽然难度增加了，但这并非不可能。无论你交谈的对象是谁、他们身处何地，你能做的最重要的事情就是保持平稳的语调。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图 74](img/index-90_1.png)


    72


    ## 第四章：对开发者而言，开发服务器就是生产服务器


    另一个建议是学会使用“我理解”这句话的力量。这两个字可以向你交谈的对象传达很多信息。你可能是在说你同意他们（我明白你在说什么），也可能是在说你不同意他们（我理解你的意思，但我仍然不确定）。关键是，仅仅通过使用这两个字，你就可以成为一个非常容易沟通的人。


    现在想象一下这段对话：


    > “那个恢复操作到底为什么要这么久？”

    >

    > “嗯，看起来数据库容量增长了。还需要大约 15 分钟。”

    >

    > “我们现在就需要完成；为什么还没好？”

    >

    > “我理解您希望尽快完成，一旦完成我会立即给您发邮件，或者如果您愿意，我也可以打电话给您。”


    此时，别人怎么可能还期望你为他们做更多的事情呢？通过与他们交谈，你与他们建立了联系，向他们展示了你也是普通人，期望的结果即将到来，最重要的是，你理解他们的需求。这可能是你能向别人传达的最重要的事情，而坐下来交谈是最容易传达这种信息的方式。


    ### 尽早参与


    另一种帮助你管理他人预期的方法是，确保你在任何项目的足够早期阶段就参与其中。当然，这并非总是可行——例如，如果你未能以某种方式获知新项目的信息。事实上，很有可能大多数时候，你唯一能获知与项目相关信息的方式，就是收到一封邮件，上面写着类似这样的话：“请从今晚
    6 点开始，将你未来三天的生活安排搁置，谢谢。”


    如果你能尽早参与，好处是巨大的。首先，你将能够就可能的设计缺陷提出担忧。这可以在日后节省大量时间，比如当一个对少量数据运行良好的设计，在处理海量数据时突然表现不佳时；或者当有人坚持使用特定工具——也许是
    DTS 而更优选 SSIS 时——你可以建议他们加入 21 世纪的主流。


    尽早参与的第二个好处是，随着项目的进展，你会熟悉那些与你名字相关的任务。这一点很重要，因为你最不希望在生产部署当天发生的事情，就是有人指望你去执行一些甚至与你
    DBA 工作无关的任务。


    相信我，被卷入“这里谁该做什么”的讨论可不是什么愉快的事。而通过尽早参与，你可以帮助引导事态发展，确保正确的人被召集来履行正确的职能。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图 75](img/index-91_1.png)


    ## 第四章：对开发者而言，开发服务器就是生产服务器 73


    **提示：** 如果你发现自己未能尽早参与项目，不要沮丧，只需确保从被邀请加入的那一刻起就全力参与。


    在任何项目计划中尽早参与的另一个好处是，你将能够有明确界定的任务作为部署的一部分去完成。拥有明确界定的任务是确保你能管理他人对你角色和参与度预期的绝佳方式。有了明确的任务，你就不用担心有人会指望你“处理一切”或“让它运行起来就行”。所有项目成员之间的沟通渠道应该保持畅通，这使得在实施过程中更容易解决任何磕磕绊绊，也便于每位成员挺身而出，履行自己的职责并完成任务。


    ### 沟通你的行动


    这一点我已经提到过，但我想再次强调。沟通是你作为 DBA 成功的关键。不要害怕告诉人们事情需要多长时间。


    至少，要告知你正在处理某项特定任务。当你开始一份新工作时，你可能会担心别人可能觉得你不够，比如说，称职。实际上，有两种可能的情况会出现在你的脑海中。


    #### 你不够快


    你很可能对告诉别人某件事需要多长时间感到顾虑，因为你认为他们知道完成任务应该花多久。极有可能的情况是，他们根本不知道需要多久。但他们确实知道的是，他们希望事情花多长时间。如果你的估计与他们的期望相近，那就没问题。如果你的估计比他们当前的需求长得多，那么他们会直接告诉你。


    现在，如果你的估计确实是完成任务所需的最快时间，那么无论怎样都没关系。如果你的估计不是最快的，那是由于你的经验水平所致，那么你就会面临以下情况。


    #### 你做错了


    假设你告诉了他们你的估计，完成了工作，并提供了一些关于你所做工作的细节。总存在一种可能性，他们会回应并询问你为何以某种特定方式做事。这可能是因为他们拥有一些你不知道的知识，但也可能是他们自己正在寻求一些知识。无论哪种情况，你都不必为以某种方式完成任务而道歉。如果有一个你不知道的更好方法，那么承认这一点并感谢对方让你注意到它。如果你选择执行特定一系列操作是有原因的，那么请自由解释你选择这些行动的原因（当然要礼貌），并再次感谢他们让你注意到替代方法。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图 76](img/index-92_1.png)


    74


    ## 第四章：对开发者而言，开发服务器就是生产服务器


    我记得有一次，有人直接质疑我为何以及如何以某种方式执行任务。那位开发者非常有礼貌地问我为什么在完成某事时多做了几个步骤，而我当时确实无言以对，只能说：“我更喜欢这样做，以保持一切处于标准状态。”另一次，我被命令以特定方式执行任务，因为他们“希望尽快完成”，但他们要求的方式却会花费更长的时间。


    对于透露太多关于你所执行任务的细节感到顾虑是完全自然的。但我相信，与其保持沉默，不如沟通你的行动。如果有人建议了不同的完成方式，那么你可能会学到新东西。如果有人建议了错误的方式，那么你将获得一个帮助教育他人的机会——如果曾有过双赢局面，那这就是了。


    ### 积极响应并承担责任

