- fmt: '# CHAPTER 3: Some Basics


    As people pass through these three stages, they react in different ways. Consider
    the following type of groups of people you may already know:


    *   Innovators

    *   Early adopters

    *   Early majority

    *   Late majority

    *   Late adopters

    *   Diehards


    Probably sounds like just about everyone you know, right? And there is a good
    chance that those classifications apply to yourself as well, and you fall into
    a different class for different things. Perhaps you never upgrade to a new version
    of software until the first service pack is released. Sound familiar? And perhaps
    you are also first in line to buy the latest iPhone. In some cases you embrace
    change and in others you proceed with more caution.


    The value that one places on the items and things most familiar to them is what
    will lead them to either embrace or resist change. Think about that for a moment.
    If you place more value on the known than the unknown, would you not also resist
    change? The same holds true for the end users that you support. If you propose
    that they start doing a lot of things differently, you had better be prepared
    to show them how much more valuable the future state will be than the current
    one.


    Why do you stand in line for the new iPhone? Because you value the new model more
    than your current one. Why do you wait for the first service pack to be released
    before even considering upgrading your software? Because you value the stability
    of your current system more than the new version.


    As a DBA you are going to be asked to lead change on a number of occasions. And,
    on some occasions, you won’t be *asked* to lead change—you will need to get up
    out of your cube and do it yourself without being told. When the time comes, follow
    these simple guidelines:


    1.  Define the need from the organization’s point of view.

    2.  Define the need from the individual (or end user’s) point of view.

    3.  Describe the desired outcome.

    4.  Define a timeline.


    Believe me, this will take practice. Very few people have innate soft skills that
    allow for them to easily get people to embrace change. But for those that do,
    and for those that learn them, the result is a powerful way to motivate and energize
    people to new places.


    You should also be aware of the types of resistance behaviors. You get two flavors
    for that: passive and active. Passive resistance would be a person who agrees
    verbally to everything you say but never follows through on what they agree to,
    or who feigns ignorance and perhaps withholds information. Active resistance would
    be a person who looks to find fault and ridicules change; who manipulates and
    appeals to a sense of fear.


    If you are aware of these behaviors when dealing with people, you can head off
    problems long before they become bigger problems.


    ## Having Standards and Processes Is Not a Bad Thing


    It is inevitable that at some point you will be approached by someone who says
    they do not understand why you are doing things in a particular way. Chances are
    that this is a result of your having put into practice some standards that help
    you to provide a stabler environment. And these same people will be dumbfounded
    that (1) you need to have such a standard and (2) that it should really have to
    apply to *them*.


    For example, suppose you are the new DBA in a shop that had no previous DBA. Everyone
    had full access to the database servers and could do whatever they wanted. To
    say things were a mess might be too kind. Being the good DBA that you are, you
    go through your checklist and find a few ways to make immediate improvements that
    would be of a great benefit to the entire company.


    First, you go through each server and database and correctly place the data and
    log files on separate drives in an effort to avoid a large disaster. While getting
    the files moved around, you revoke the ability for anyone except yourself to create
    a new database. You do this because your root cause analysis of the problem led
    you to the conclusion that the reason there were so many databases set up incorrectly
    was because too many people did not understand the implications of their actions.
    In an effort to help them avoid hurting themselves, you make the necessary changes.


    About an hour after you start revoking access, you get a phone call from a developer
    that cannot understand why they cannot create a database. “It’s just a database—why
    should I call you to create one when I am capable of doing it myself?” You will
    resist the urge to respond with, “If you could do it yourself, then I would not
    have spent a week cleaning up after you like the guy following the horses on the
    Fourth of July,” and will do your best to explain that in an effort to have a
    stable environment, it is best if database creation were in the hands of the few,
    not the many.


    Try to understand that most people have a horizontal view or experience in their
    daily life. Developers need to get to work, log into the network, access the database
    server, make changes, test their changes (hopefully), and deploy changes to production.
    Why is that a horizontal view? Well, think of all the vertical silos they went
    through during the day: They drove to work, parked their car, and entered the
    building (facilities). They logged into the network (domain controllers, network).
    They accessed the database servers to make changes (you). They test their changes
    (get customer sign-off). They deploy their changes to production (you again).


    You have nothing to do with their access to the building or their access to the
    network in general, but you do have some control over how they are allowed to
    make changes to the database servers. In this scenario your view is a vertical
    one: you are mostly concerned with your silo (database servers), and have no idea
    what the horizontal view looks like. And this can be a very hard thing to reconcile;
    you really need to work with your end users and communicate with them on a frequent
    basis to understand all of their pain points.


    Once you start to understand that most of your end users are taking a horizontal
    view, it is easy to see why they might be frustrated when you start to enforce
    policies, guidelines, and standards. Remember that people may resist change and
    use this as an opportunity to lead change. Over time your soft skills will improve
    to the point that people will begin to trust that your actions are best for the
    company as a whole, and not intended as a slight to any one individual.


    ## People Will Blame What They Do Not Understand


    This one is fairly self-explanatory. People will always tend to blame something
    they are aware of but do not fully understand. It is only natural, right? I mean,
    if you think you already know everything about nine out of ten items, then your
    mind will focus on that tenth item and you will spend far too much time on why
    the tenth item is causing you so much heartache at the moment.


    You will frequently be told such things as, “Our code hasn’t changed in years,”
    “Everything ran fine last night,” and “You guys must have done something yesterday
    because now all of our stuff runs much slower.” Get used to being the focus of
    attention for any problems with any system. Start developing some thick skin because
    you are going to need it, and soon.'
