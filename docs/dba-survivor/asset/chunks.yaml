  trans: '

    考虑一下从全国性超级商店连锁店购买的大多数家用电脑系统。它们自带充足的内存、强大的处理能力和大量的磁盘空间。但唯独不配备备份（或外部）驱动器。您可能会问，为什么需要那种东西？用户需要它来保护重要文件，例如电子邮件、猫咪的照片以及他们所有喜爱的网页链接。


    许多家庭用户不会考虑备份。他们年复一年地愉快使用，不断向硬盘中添加财务数据、照片、电子邮件收藏和 iTunes 音乐。直到有一天，他们以惨痛的方式认识到了硬盘故障。他们的硬盘坏了，电脑无法启动，所有东西都丢失了。


    那么服务器呢——它们会配备额外的磁盘吗？通常，是的，订购服务器时通常会包含额外的磁盘。根据服务器型号的不同，可用的选项和磁盘数量也不同。除了需要磁盘容量外，配备额外磁盘的主要原因是为了在发生硬盘故障时，通过利用
    `RAID` 来保护自己。


    例如，图 3–1 展示了一种可能的 `RAID` 配置。在图 3–1 中，三个硬盘被绑定在一起，表现为一个硬盘。相同的数据被写入所有三个驱动器。因为这三个驱动器是彼此的镜像，所以我们可以损坏其中一个驱动器，仍然可以通过另外两个访问我们的数据。我们甚至可以损坏两个驱动器，只留下一个好的。


    **注意：** 不要仅仅依赖 `raid` 来避免灾难。`RAID` 不是备份。当用户删除一条记录时，它会立即在所有驱动器上被删除。你仍然需要备份来从这类小问题以及服务器故障、数据中心中断和自然灾害等重大灾难中恢复。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 39](img/index-55_1.png)


    ## 第三章：一些基础知识


    37


    **图 3–1.** *实现冗余的一种方法是将相同的数据写入多个驱动器。*


    ### 用于性能的 RAID


    你也可以利用 `RAID` 来提高性能。了解如何做到这一点，在尝试进行查询性能调优时会很有帮助。当你完成初始检查清单并开始收集服务器配置的基线信息时，这也会让你受益匪浅。


    SQL Server 是一个非常消耗输入/输出（I/O）的系统。这意味着你能越快地从磁盘读取和写入数据，响应时间就会越快。你可以使用 `RAID` 通过利用将数据*条带化*分布在多个磁盘上的方式来增加
    I/O 吞吐量。


    例如，一个传统的硬盘内部有一个小磁臂，每次你想读写数据时它都会来回移动。假设你需要执行 100 次读取和 100 次写入操作，每次操作耗时 1/100 秒。在单个磁盘上需要多长时间？两秒钟。现在，假设你如图
    3–2 所示配置了 `RAID`。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 40](img/index-56_1.png)


    38


    ## 第三章：一些基础知识


    **图 3–2.** *一种通过条带化提高性能的 `RAID` 配置*


    现在，你有两个小磁臂在两个磁盘上同时来回移动。


    你仍然需要执行那两百个操作，但它们将在两个驱动器上同时进行。每个驱动器承担一半的工作量。你的总时间将从两秒减少到一秒。


    另一种提高性能的方法是缓存。大多数 `RAID` 控制器允许将一定量的数据存储在缓存中。其思路是尽可能多地缓存非顺序请求，以便将它们批量处理，并作为顺序请求发送给硬盘驱动器。


    ### 用于容错的 RAID


    `RAID` 使用两种方法来提供容错能力：镜像和奇偶校验。镜像正如其名：你在两个（或更多）不同的磁盘上有两个（或更多）数据副本。图 3–1 中的场景就是一个镜像场景。


    **注意：** 镜像通常被认为是两个驱动器相互镜像。然而，没有任何因素阻止你跨两个以上的驱动器进行镜像。


    *奇偶校验* 是指你向其中一个磁盘添加称为*奇偶校验数据*的额外数据，这些数据可以在某个磁盘故障时用来重建你的实际数据。奇偶校验方法的优点是节省磁盘空间。图
    3–3 展示了一个字节的奇偶校验数据如何保护两个字节的实际数据。


    **图 3–3.** *一个字节的奇偶校验数据可以保护两个字节的实际数据。*


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 41](img/index-57_1.png)


    ## 第三章：一些基础知识


    39


    奇偶校验方法的 `RAID` 是一件好事，除非你关心性能。它会对性能产生负面影响，因为每次都要写入那个额外的奇偶校验信息，这会增加额外的开销。


    让我们研究几种不同的 `RAID` 级别，它们使用镜像和奇偶校验的不同组合来实现保护和速度。我不会讨论所有可能的 `RAID` 级别，只讨论作为 DBA 可能会遇到的那些。


    ### RAID 0


    这个级别通常称为*磁盘条带化*，其结果通常被称为*条带集*。你的数据被分成块（或区块），并以固定顺序分布在阵列中的所有磁盘上。图 3–4 说明了这种方法。


    **图 3–4.** *一个 `RAID 0` 配置示例*


    `RAID 0` 会提高性能，因为所有操作都可以如前所述同时独立执行。缺点是任何一段数据只存在于一个磁盘上，因为数据被均匀地分布在所有磁盘上。一旦驱动器发生故障，该磁盘上的所有数据将永久丢失。实际上，情况更糟：失去一个驱动器，就相当于失去了阵列中的所有数据。从
    `RAID 0` 阵列的驱动器故障中恢复的唯一方法是从上一次备份中恢复整个阵列。因此，`RAID 0` 不是 SQL Server 存储的好选择。值得注意的是，`RAID
    0` 既不提供容错，也不提供冗余。


    ### RAID 1


    这个级别更常被称为镜像。它就是前面图 3–1 所示的场景。你的数据只是简单地同时写入至少两个不同的位置，在单独的磁盘上创建一个或多个数据副本。一旦发生驱动器故障，阵列仍然完全可用，因为至少还有另一个驱动器副本在线且功能正常。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 42](img/index-58_1.png)


    40


    ## 第三章：一些基础知识


    ### RAID 5


    这个级别也称为带奇偶校验的条带化。它与 `RAID 0` 非常相似，但需要一个额外的磁盘来存放跨所有磁盘条带化的奇偶校验位。图 3–5 展示了一个示例配置。毫无疑问，`RAID
    5` 是最受欢迎的 `RAID` 级别，我看到许多管理员都在使用它。


    **图 3–5.** *`RAID 5` 配置示例*


    `RAID 5` 如此受欢迎的原因是，如果一个磁盘发生故障，你只需（在第二个磁盘故障之前；否则，你会丢失*所有数据*）添加一个新磁盘，阵列就会自我重建。听起来不错，是吧？虽然
    `RAID 5` 能提供比 `RAID 1` 更好的性能，但奇偶校验位带来的开销意味着它的性能不如 `RAID 0`。但 `RAID 5` 确实提供了容错能力，这就是为什么许多管理员喜欢使用
    `RAID 5` 胜过其他任何级别的原因。


    ```

    与任何 RAID 5 作战？


    作者：Jonathan Gennick

    ```

