    \nA: We have the disks in a `RAID 5` array; the chances of two disks failing is\
    \ minimal.\n\nQ: What will we do if two disks fail?\n\nA: There is little chance\
    \ of that happening.\n\nQ: Um . . . OK . . . so, what will we do if that does\
    \ happen?\n\nA: Don’t worry about it; it won’t happen.\n\nSorry, but that does\
    \ not leave me warm and fuzzy inside, nor should it make you feel comfortable\
    \ either. Another good question to ask yourself and others would be, what are\
    \ we trying to protect against? When it comes to DR, you can never ask enough\
    \ questions, and never settle for an answer similar to “You don’t have to worry\
    \ about that, it will never happen.”\n\n### GET OUT OF JAIL FREE\nby Sylvester\
    \ Carstarphen\n\nOne thing I like to get is written documentation—what I refer\
    \ to as my “get out of jail free” card—when management insists a particular scenario\
    \ will never happen.\n\n## DR Testing\n\nIf your company is wise, then it will\
    \ be conducting regular DR tests. In some cases, regular DR testing is required\
    \ by internal and external auditors in order for your company to retain a specific\
    \ level of compliance. You should be aware of the DR tests and look to actively\
    \ participate so that you can learn from each and every test experience.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 56](index-72_1.png)\n\n**54**  \n**CHAPTER 3: Some Basics**\n\nEach\
    \ DR test exercise gives you the opportunity to prepare your own DR test plans.\n\
    \nThese details are going to be quite valuable to you should a disaster happen.\
    \ As you participate in the test exercise, you will inevitably come across some\
    \ hidden nuance of your systems. For example, you may find a handful of servers\
    \ that need to be booted in a particular order.\n\n### TIP\nPractice makes perfect.\
    \ Give yourself an opportunity to succeed during a crisis by practicing the steps\
    \ needed to recover.\n\nIt is also important that you have very clearly defined\
    \ recovery times for your systems.\n\nWhile you may be pleased to know that you\
    \ can have your DR servers functional in 45 minutes, that may be an unacceptable\
    \ amount of time to your end users. Make certain that time objectives are clearly\
    \ stated and that your actual recovery times are clearly recorded for everyone\
    \ to see. Otherwise, it will be difficult to know during a real disaster whether\
    \ things are going well (but it will be painfully obvious if things are going\
    \ poorly).\n\nThis reference will also be handy when you are recovering from disaster.\
    \ If you know your testing took 30 minutes to recover, then you can reference\
    \ your earlier testing and notify your customers as to when they can expect their\
    \ systems to be back online.\n\n## Carnegie Hall\n\nThere is an old joke about\
    \ a young man asking for directions in New York City. He stops an older man and\
    \ asks the question, “How do I get to Carnegie Hall?” The old man replies, “Practice,\
    \ practice, practice.” When I was coaching basketball, I would always tell my\
    \ team to practice “game shots” from “game spots” at “game speed.” In other words,\
    \ you practice how you play, which should be all out, all the time. If you practice\
    \ at half speed, you end up playing at half speed.\n\nAll of that holds true for\
    \ DR preparation. You need to practice and keep your skills sharp. When was the\
    \ last time you tried to recover the `master database`? Or, better yet, have you\
    \ *ever* tried to recover the `master database`? Believe me, when the pressure\
    \ is on during a disaster event, the last thing you want to be doing is fumbling\
    \ around with manuals and pounding your fist against your monitor because you\
    \ do not know how to get your instance started.\n\nPractice recovering the `master\
    \ database`. Try recovering the `msdb database` sometime as well. Spot check your\
    \ backup files and do a restore to make certain you are familiar with the process.\
    \ Pay particular attention to your important systems. If you do nothing else right,\
    \ recovering the important systems without any problems just may be enough to\
    \ save your job, so practice with those and make certain you are familiar with\
    \ any subtleties that they may contain.\n\nYou simply cannot practice enough when\
    \ it comes to a disaster. As a DBA, your primary responsibility is to recover\
    \ the data in the event of a disaster. Therefore, it is the one thing you need\
    \ to plan for and practice most often.\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
    \n![Image 57](index-73_1.png)\n\n**CHAPTER 3: Some Basics**  \n**55**\n\n## Networks\
    \ Are Like Bathrooms\n\nWhen issues arise, and *issues will always arise*, people\
    \ will start to blame the pieces of their environment they know the least about.\
    \ As the DBA you will find people inevitably blaming the database server for all\
    \ sorts of problems. In my experience I have seen people blame the database server\
    \ for a host of problems that have nothing to do with the database server. The\
    \ fact is that they know the database server exists, but they don’t know if it\
    \ is truly the problem, so they just point their finger in your direction first.\n\
    \nOne of the last things that anyone ever thinks about is the network. Your network\
    \ has ups and downs all the time. There are lots of wires, routers, and switches\
    \ that make up the backbone of your network. With so many moving parts that need\
    \ to go together in order to make your systems work, it is easy to understand\
    \ that issues will arise from time to time. I once read a study that said how\
    \ database servers are the number one piece of infrastructure that people are\
    \ ordered to troubleshoot, but over 70 percent of all issues are directly related\
    \ to bad application code."
