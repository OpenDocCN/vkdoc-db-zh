- fmt: '# CHAPTER 1: How Did I Get Here?


    ## THE SHADOW KNOWS!


    After another year, I found myself at a new company that was looking for some
    `PowerBuilder` help. I took the job, and after about a year or so there, I came
    to realize two things. First, I needed to do something other than `PowerBuilder`
    because there was going to come a day when `PowerBuilder` would not be in enough
    of a demand for me to keep finding work. Second, I wanted to become a `DBA`.


    **TIP:** Find something in life that you have a passion for; it makes other life
    decisions easy.


    I looked upon the role of a `DBA` as one that does not disappear in the same way
    as a developer who knows only one particular language. To that point, I had done
    mostly `PowerBuilder` work and had just started getting involved in `.NET`. The
    idea of having to learn a new language every few years in order to stay marketable
    seemed daunting at the time. But to be a `DBA` meant I would be the “man behind
    the curtain,” always turning knobs and always being able to find work.


    So I sought out opportunities to help out with `DBA` tasks. And when my company
    looked to bring on a full-time `DBA`, I went to the hiring manager with my résumé.
    She promptly told me that they would not think to hire me for the job because
    I had no experience.


    Instead, they were going to bring in someone they had worked with before. I felt
    disappointed for about thirty seconds and then the manager told me that they would
    also be looking to start up a “junior `DBA`” program to train people to help out
    in times of need. She wanted to put my name down as a person interested in attending
    the in-house training, and I agreed.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 6](index-22_1.png)


    by Brent Ozar


    If you want to become a `DBA`, and your company won’t send you for training, ask
    if they’ll let you shadow the company’s `DBA` for one day per week. If they don’t
    go for it, plant the seed that the `DBA` won’t be around forever. Wouldn’t it
    be nice to have someone on staff who already knew the basics of how the company’s
    databases work? That idea might encourage them to start an internal mentoring
    program.


    ## Luck, Preparation, and Opportunity


    If there is one thing I have learned through my days playing and coaching sports,
    it is that luck can be defined as when preparation meets opportunity. With that
    in mind I started attending those junior `DBA` classes. I was a sponge, soaking
    up everything possible. Over time I would ask to perform some routine tasks and
    was able to get some quality on-the-job training. It got to the point that when
    the regular `DBA`s (both of them) needed to take a day off, they could do so and
    send people my way for any issues.


    I became more and more comfortable handling a lot of routine operational tasks.


    Backups, restores, password resets, creation of logins, and even some performance
    tuning and troubleshooting. I also started getting involved in configuring the
    necessary monitoring for the environment, helping to build an in-house monitoring
    solution to help us stay proactive for resolving issues. And I still had my regular
    day job working with `PowerBuilder`, `.NET`, and `SQR` reports.


    And then, one day, all of my preparation met the opportunity it was waiting for.
    The regular `DBA`s resigned at the end of the calendar year. One was a contractor
    that left for a new contract somewhere else. The other simply did not want to
    stay any longer.


    Their manager came over to talk with my manager and then they asked me if I wanted
    to be the next `DBA`. One of my team members remarked about how the job was “a
    huge opportunity for you,” and I went into the office to talk with the two managers
    about the position.


    I told them I needed some time to think it over. Hey, I didn’t want to seem too
    eager!


    by Jonathan Gennick


    “Sometimes you make your own luck.” A friend once said those words to me after
    I’d landed a position that turned out to be pivotal to my career. I had worked
    a contract job in `COBOL` for two or three months to put bread on the table. Then
    the client abruptly pulled the plug on the project, sending a dozen or more of
    us out into the job market again.


    My love at the time was `SQL`, so I had taken every opportunity to be involved
    with the database end of the project. I had wound up “owning” the input/output
    routines, because I knew both `COBOL` and `Rdb`, and I knew how to put them together.
    I worked carefully, had a good attitude, and exhibited passion for what I was
    doing. Looking back, I did excellent work, and I shared my excitement about that
    work with my coworkers.


    One of my office mates—we were three to an office on that project—paid me more
    notice than I had realized. He later sought me out and was instrumental in bringing
    me on board with an international consulting firm. It was there that I learned
    `Oracle`, which led to my writing some books, which led to a career change (again
    due to passion and preparation), which led to my being able to live in the Upper
    Peninsula, where I’d long dreamed of living. I’ve been “lucky” several times in
    my career. In all cases that come to mind, though, what Tom says is true. Any
    “luck” has always been the result of work and preparation, and personal growth
    meeting the unexpected opportunity.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 7](index-23_1.png)


    ## Community


    All those events feel like they were a lifetime ago. Actually two lifetimes ago,
    since I have had two children since all of the above happened. Along the way,
    I knew I could not possibly know everything there is to know about being a `DBA`,
    so I reached out to find other `DBA`s. I found them on web sites, in forums, and
    at conferences. It’s at the point now where I tell people the line, “You don’t
    just get me, you get my network.”


    Before too much time had passed, I found myself doing some writing, helping others,
    and presenting sessions as well. In 2009 I was appointed to the `PASS` Board of
    Directors and I also became a `SQL` MVP. Not too bad for a `PowerBuilder` developer.


    So that’s how I ended up becoming a `DBA`. Many people, me included, are always
    curious to know how someone becomes a `DBA`. In a lot of cases, we end up here
    by accident, but there are also times when we simply prepare for our opportunity.
    My story is not necessarily unique, and certainly not the only one out there.
    I asked some colleagues if they would be willing to share their stories as well,
    and their replies follow.


    ## Other Journeys


    There are a lot of different paths toward becoming a `DBA`. I am far from the
    only person to have taken a roundabout way. Most of us do tend to have some technical
    experience or acumen, and have good organizational or analytical skills. But the
    truth is that those very same skills apply to a lot of other professions as well.
    For example, a hotel manager would need to be organized, pay attention to details,
    and be able to understand and troubleshoot the point-of-sale software that runs
    the registers.


    There are few if any colleges or universities that offer database administration
    as a major. Lots of schools will offer computer science, or some type of information
    systems major, but nothing dedicated to being a `DBA`. Maybe a course or two on
    database design or theory, but probably not much on disaster recovery, high availability,
    server configurations, and everything else a `DBA` needs to know. So it is understandable
    that the path to becoming a `DBA` is not a straight line for most. In fact, we
    all tend to fall into the role at some point, and once there we decide whether
    we enjoy the work or not.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 8](index-24_1.png)


    **TIP:** Buck Woody teaches a `DBA` course at the University of Washington. Enroll
    if you can.'
