    # Foreword


    You hold in your hands a collection of insight and wisdom on the topic of `database`
    administration gained through many years of hard-won experience, long nights of
    study, and direct mentorship under some of the industry’s most talented `database`
    professionals and information technology (`IT`) experts.


    Consider the standard university approach to training people in our discipline.
    Many colleges and universities offer a curriculum in “computer science,” encouraging
    their alumni with lucrative careers in “software engineering.” Yet, anyone who’s
    spent much time working with computer technology will tell you that these terms
    are often misleading. After all, any type of science is predicated upon the `Scientific
    Method`: characterize your observations and experiences, construct a hypothesis,
    predict a logical deduction, and test the hypothesis and prediction using one
    or more experiments. Does that sound like what information technologists and computer
    programmers do? Not just “no,” but “Heck No!” While it is certainly true that
    some computer technologists experiment (usually in the fields of processor design,
    networking technology design, security and encryption algorithms, and certain
    fundamental software technology platforms) this might represent 0.02 percent of
    the total information technology workforce around the world and frequently requires
    a doctoral degree.


    Going a step further, let’s look at the term “software `engineer`.” While a full
    definition of the term `engineer` could fill a couple of paragraphs, the connation
    of the word implies the application of knowledge in science and mathematics to
    solve a problem with predictable results whose operation and outcome can be reliably
    forecast. `Engineers` take their profession seriously and rest their credibility
    on producing designs that perform as expected without causing unintended harm
    to the public at large. Does that sound a lot like what you do? Does that sound
    like the jobs of anyone you know who work with `IT`?


    It doesn’t sound like any `IT` professionals I know. While the `IT` profession
    has made many strides over the years and has greatly improved their ability to
    produce predictable results and reduce unintended consequences, we’re still subjected
    to daily hot fixes, software patches, and countless interruptions that disqualify
    computer programming and `IT` from consideration as both a science and an engineering
    discipline.


    Instead, I offer an alternative interpretation of our chosen career path. When
    we look at the scope of human undertaking, we can see many careers and disciplines
    that closely mimic our experiences as `IT` professionals (or `IT` professional
    wannabees). But the closest matches aren’t in the computer field, they’re in the
    creative arts. Don’t believe me? Consider this comparison.


    `Engineers` and scientists need to completely and deeply understand the minutia
    of their discipline. A good friend of mine is literally a rocket scientist working
    for `NASA` and possesses an encyclopedic knowledge of metrology (used in the rocketry
    structures) and chemistry (used in the rocket fuels). That’s not what we need.
    When was the last time you talked to a `database administrator` (`DBA`) who had
    exhaustive knowledge of the `hashing` algorithms used to buffer `x` data into
    and out of the `system RAM` of their chosen `database` platform? Instead, we need
    to know computational algorithms about as much as a sculptor needs to know the
    molecular crystalline structure of marble and quartz or a musician needs to understand
    the science of acoustic resonance. When was the last time a musician sat you down
    to discuss the effect of humidity and altitude upon their next performance? (Perhaps
    not ironically, many `IT` professionals are also part-time musicians.)


