    # 第七章：自助餐在哪里？


    ## 最重要的一章？


    **作者：乔纳森·杰尼尼克**


    认识我的人都知道我对培根情有独钟。我非常喜欢它，以至于确信它最终会毁了我。虽然给任何东西加上培根都会立刻变得更美味是事实，但吃太多培根显然会导致健康问题也是事实。IT
    专业人士整天都在做出色的技术决策，但一到吃饭时间，我们就会做出糟糕的决定，这些决定日后会回来困扰我们。我们长时间、高压地坐在椅子上，期间穿插着匆忙吃下的最快、最方便的食物。然而，只要适度，你也可以鱼与熊掌兼得。


    **提示：** 培根之于食物，犹如黑色之于时尚；它与万物皆相配。


    在本章中，我们将讨论以下内容：


    1.  食物如何成为最容易获得的药物选择

    2.  社交互动如何导致糟糕的营养选择

    3.  规律锻炼的必要性

    4.  如何避免让你的职业生涯和生命过早结束


    你是否曾认为自己的工作很危险？你应该这么想。我们都应该。我们这些在科技行业的人——图书编辑也包括在内！——太容易陷入认为自己拥有“安全”工作的错觉。我们只是坐办公室，对吧？但我们正面临着严重的危险！我们活动量不足。我们整天坐着。我们的身体在萎缩。我们面临各种冠心病的风险。还要担心糖尿病。你读过关于深静脉血栓的文章吗？那是坐得太久引起的。最近背疼了吗？也许是因为缺乏锻炼，你的核心肌肉太松弛，无法很好地保护背部。


    想想生活质量。汤姆在本章接近尾声时谈到了这一点。他希望能奔跑着和孩子们玩耍。我喜欢活动，并希望在我的一生中，只要力所能及，就能继续出去远足、滑雪、山地骑行等等。然而几年前，我发现自己不得不放弃越野滑雪，因为有一天我发现自己超出了滑雪板的设计承重极限（我可以买更长的滑雪板，但这并不是这里的目标）。


    汤姆在本章描述的所有坏习惯，我都有。我活了足够长的时间，已经尝到了它们带来的一些苦果。我吃得太多，睡得太少，锻炼不足。这是一场持续的战斗，要努力收复我已经失去的阵地。不认为你的工作危险？再想想吧！


    ### 食物可以是药物


    食物是我们大多数人目前最容易获得的药物。它是合法的、随手可得的、能让我们感觉良好并给予我们安慰。我们可以和朋友聚餐，我们告诉自己，我们随时可以停止吃那些不健康的东西，但我们从未真正做到。


    例如，我喜欢甜甜圈，真希望它们能配上培根（无论是放在旁边还是像某种油炸卡尔佐内三明治一样直接烤在中间）。我喜欢早上喝咖啡，而且*非常*喜欢咖啡和贝奈特饼。当然，在我生活和工作的大部分地方都找不到贝奈特饼，所以我只能用甜甜圈凑合。我闭着眼睛都能找到一家甜甜圈店。尽管我如此热爱咖啡和甜甜圈，但我并没有每天都沉溺于这种组合。我可能每周喝咖啡时吃一次甜甜圈，因为我明白适度的必要性。


    **提示：** 适度和平衡是关键。只要你适度并遵循均衡饮食，你想吃什么都可以。


    下次你去自动售货机买点脆脆的、奶酪味的、咸咸的东西来快速补充能量时，停下来问问自己为什么要买那份零食。很可能你会发现，自己吃东西不是因为饥饿，而是出于情绪化进食或无意识进食。


    ### 情绪化进食


    这通常是某种情绪触发的结果。它可能源于你当前工作职能带来的压力。例如，你的公司可能正在经历裁员，而你被要求协助管理这个项目，这意味着你将解雇那些与你共事多年的人的职位。或者，你可能只是有一个同事不太尊重你且要求很高。施加在你身上的压力会直接导致情绪化进食。


    **注意：** 情绪化进食的问题在医学界已得到广泛认可。梅奥诊所有一篇关于此主题的优秀文章，网址是 www.mayoclinic.com/health/weight-loss/MH00025。快速在谷歌上搜索“情绪化进食”一词，会为你提供大量其他文章供你参考。


    当你情绪化进食时，你是在用食物来控制自己的情绪。这可能简单到只是一种对抗无聊的方式。因为你不喜无聊，于是你开始想到一些冰淇淋。既然你在想冰淇淋，你就不再无聊了，不知不觉中，你就吃下了一个三重份的
    Rocky Road 冰淇淋。


    情绪化进食是一种你不想陷入的模式。你发誓早餐不再多吃一磅培根，但第二天你又这样做了。你的同事或经理在办公室里对你态度恶劣，于是你伸手去拿一包薯片。你发现自己*在根本不饿的时候*还在吃东西。


    情绪化进食可能难以克服。解决任何问题的第一步是首先承认问题的存在。一旦你做到了，下一步可以很简单，比如记录你一天的饮食日记。也可能更复杂，比如寻求治疗师的帮助。最终，你需要更关注自己的健康，减少对情绪化进食做出反应的可能性。


    ### 无意识进食


    无意识进食发生在你没有意识到自己在把食物放进嘴里的时候。听起来很傻，对吧？我的意思是，*你怎么可能不知道自己在吃东西？* 这并不是不知道自己在吃东西的问题，更多的是你没有意识到自己吃了多少或吃了什么。


    典型的例子是电影院的爆米花。大多数时候，影院的爆米花是提前很久（有时是提前几天）做好的，存放在大的塑料袋里，直到拿出来放在加热灯下提供给观众。如果你拿到一碗那样的爆米花和一碗刚爆好的爆米花，味道上的差异会相当明显。然而，当你去看电影时，你却心甘情愿地吃完一整桶不新鲜的爆米花，而不是要求新鲜的。


    为什么？因为*你在无意识地吃东西*。你被电影分散了注意力。你的焦点不在食物上，而在别处。结果，你继续把爆米花铲进喉咙，直到吃完为止。在电视机前吃饭也是如此，或者……


    *在你的电脑屏幕前。*


    是的，这是真的。整天坐在办公桌前盯着电脑屏幕，这种程度的分心足以让你开始走向无意识进食的道路。不相信我？离开你的椅子，走出你的隔间，开始留意你部门里其他人的体型。我猜其中超过一半的人超重。而且他们很可能也在做你整天在做的事：坐在办公桌前盯着电脑屏幕。


    **提示：** 无论如何，走出你的隔间是个好主意。去伸展一下腿脚几分钟。有机会的话，爬一段楼梯。

    '
- fmt: '## Overcoming Bad Habits


    How do you combat emotional or unconscious eating? As noted before, the first
    thing you need to do is to recognize the problem is happening. From there you
    will have different ways to overcome the bad eating habits. My favorite would
    happen to be the food diary. You simply write down everything you eat throughout
    the day. No matter how big or small, you write it down. By the time you get to
    the afternoon and you see a long list, it is easy to understand where and how
    the extra calories are getting added to your diet.


    Another little trick I like to use is to surround myself with healthier options.
    I will take carrot sticks or an orange to have as an afternoon snack. Some days
    I have an apple before lunch. This helps me to understand that if I start to reach
    for something later on that I am not doing so because I am hungry; I have already
    had a snack.


    ### TIP:


    Other snack items I like include grapes, almonds, and wasabi peas. And popcorn—I
    love popcorn—and a snack-size bag is just the right size.


    There are also going to be times where you decide to skip a meal, most likely
    lunch. Skipping meals will cause your metabolism to slow, lower your energy, and
    reduce your ability to focus. Worse than all that is that you will be more inclined
    to start snacking, so it is always a good tip to check your calendar; if you know
    you are pressed for time, then pack yourself some healthy snacks.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 129](index-139_1.png)


    # CHAPTER 7: Where’s the Buffet?


    **121**


    ## SET AN ALARM


    by Brent Ozar


    Don’t be afraid to set calendar timers to force yourself to have a small snack
    at midday and again at mid-afternoon. I’ve got alarms set at 10:00 a.m. and 2:00
    p.m. to force myself to eat a 100-calorie snack twice a day. That way, at lunch
    and dinnertime, I’m less hungry. And being less hungry, I’m less tempted to stuff
    that entire burrito into my mouth in one sitting. If you let yourself get starved,
    then you may overeat at mealtime.


    Still another trick is to drink some water. It is a good idea to have some water
    right before a meal, as it will help to fill your stomach before you start eating.
    Most people tend to not recognize the clues that their stomach is full until after
    they have overeaten. By taking water before your meal (that’s water, not soda!),
    you help to reduce the chance that you are going to overeat.


    ## Social Gatherings


    At some point in your professional career you will find yourself in a social setting
    with your coworkers, and food will be nearby. Trust me, it will happen. It could
    be something quite informal, such as the sharing of a birthday cake for someone
    in the department. Or it could be something more formal such as a holiday gathering.
    No matter what the setting, a few things will remain constant: you, them, and
    food.


    In all cases you need to be prepared to make smart choices. One piece of birthday
    cake would be more than enough. So would one cocktail-sized plate of wings at
    a happy hour, or just one drink at that same happy hour. The trouble is that when
    you are surrounded by tasty treats and people to have conversations with, it is
    all too easy to overindulge. These moments are not limited to special events,
    either—they can happen during your regular routine as well.


    ## Breakfast


    We all have a breakfast routine. Good or bad, it is something we tend to follow
    as we start our workday. And a majority of people start their day with a cup of
    coffee with friends.


    *Coffee. Caffeine. Cream. Sugar.*


    All good things, right? Not really, no. I doubt I need to inform you about the
    ills of too much sugar or cream in your diet. Many people tend to believe that
    the real problem with coffee is the caffeine. And they would be wrong. It is the
    cream and the sugar that will be worse for you over time.


    While you may feel that you cannot function without your cup of coffee in the
    morning, stop and think about someone who is addicted to cocaine—who needs just
    a little bump to get to the next one. Sure, caffeine is a drug, and I can hear
    you already telling me, “No, it is not like that, not at all.” Yes, it is, actually.
    You may not be pawning your DVD player in order to get enough scratch to order
    a venti triple quad latte, but the idea is very much the same; if you are one
    of those that absolutely needs to have a cup of coffee in the morning, then you
    have an addiction.


    ### TIP:


    The first step in overcoming your addiction is to admit you have one.


    If you still feel that you need to have that cup of coffee, then start thinking
    about switching to decaf. You can ease into it—just order your coffee for the
    next two weeks by saying “half-decaf,” and the barista will be happy to accommodate.
    You can break your addiction in a short time. Do the same with the cream and sugar—start
    using less until you just about drink your coffee black, like you should be drinking
    it. Why?


    *Because the thing you really need to be aware of is that your coffee is just
    a vehicle to get the cream and sugar into your body.*


    I knew a man once who drank his coffee black. I asked him how he could drink coffee
    without even some cream to temper it, and his reply has stuck with me to this
    day: “Would you pour cream and sugar into a glass of 20-year-old Scotch?” I stared
    blankly at him and replied softly, “No.” He responded with, “Then why would you
    want to ruin a perfectly good cup of coffee by pouring that junk in it?”


    Exactly. If coffee is a part of your breakfast routine, you need to be mindful
    of the effects it will have on you over time. This can be difficult if you are
    accustomed to heading down to grab a cup with your friends in the morning. I enjoy
    taking a walk with friends every morning to get a cup myself, but I do my best
    to be mindful of what I am putting into my body. After the first cup of coffee
    each morning, put the coffee cup away, and place a full bottle of water on your
    desk. Instead of unconsciously drinking the coffee, you’ll be unconsciously drinking
    something that doesn’t have ill effects.


    Do not let your breakfast routine get in the way of making good choices. Skip
    the sausage, egg, and cheese biscuit and frappuccino. Try to have some black decaf
    coffee or tea and an egg on English muffin (no cheese or sausage) once a week
    when you head out with your friends. Then make that same healthy choice twice
    a week. Before you know it, you will be having breakfast with your friends and
    not slowly poisoning yourself to death or adding a few extra pounds with each
    passing year.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 131](index-141_1.png)


    **CHAPTER 7: Where’s the Buffet?**


    **123**


    ## Lunch


    How many times has someone stopped by your desk and said something akin to the
    following: “I’m heading out to the local high-caloric sandwich shop; can I get
    you something?” You want to say no, but you don’t normally eat there often and
    think of this as a treat. You place your order, finish your double chicken cutlet,
    and promise yourself to go for a walk when you get home (you won’t).


    “A vendor’s taking all of us to Oversized Burritos, and the ingredients are all
    organic.” Organic doesn’t necessarily mean healthy. Raw butter can be completely
    organic, but it will clog your arteries faster than you can say “Paula Deen.”
    In addition, just because something’s free doesn’t mean you need to eat a lot
    of it.'
  raw: 'And for those that are not distracted and eating, you will find people who
    are simply procrastinating and using food as a distraction. Weird as this may
    sound, there are many times when you may be procrastinating about a task and find
    yourself getting up and reaching for something to snack on. Heck, since I started
    this chapter I have eaten bacon and potato chips, and had some ice tea. Not exactly
    a salad, is it?


    **Overcoming Bad Habits**


    How do you combat emotional or unconscious eating? As noted before, the first
    thing you need to do is to recognize the problem is happening. From there you
    will have different ways to overcome the bad eating habits. My favorite would
    happen to be the food diary. You simply write down everything you eat throughout
    the day. No matter how big or small, you write it down. By the time you get to
    the afternoon and you see a long list, it is easy to understand where and how
    the extra calories are getting added to your diet.


    Another little trick I like to use is to surround myself with healthier options.
    I will take carrot sticks or an orange to have as an afternoon snack. Some days
    I have an apple before lunch. This helps me to understand that if I start to reach
    for something later on that I am not doing so because I am hungry; I have already
    had a snack.


    **TIP:** Other snack items I like include grapes, almonds, and wasabi peas. And
    popcorn—I love popcorn—and a snack-size bag is just the right size.


    There are also going to be times where you decide to skip a meal, most likely
    lunch.


    Skipping meals will cause your metabolism to slow, lower your energy, and reduce
    your ability to focus. Worse than all that is that you will be more inclined to
    start snacking, so it is always a good tip to check your calendar; if you know
    you are pressed for time, then pack yourself some healthy snacks.


