- fmt: '# CHAPTER 6: Basic Troubleshooting


    I have often heard from other senior database administrators that `SQL Profiler`
    is not a useful tool for basic troubleshooting. It is useful, however, for those
    times when you need to capture all the activity (sometimes called a *workload*)
    hitting your instance. But unless you have a general idea as to where your problem
    lies, it can be daunting to sift through all of the activity returned. Think of
    a needle in a haystack and you get the idea.


    The Books Online do not even list “troubleshooting” as one of the common uses
    for `SQL Profiler`, and yet I still see many people resorting to `SQL Profiler`
    as the only tool they want to use to troubleshoot performance issues. A list of
    scenarios can be found at:

    `http://msdn.microsoft.com/en-us/library/ms190793.aspx`


    In the end, `SQL Profiler` is best used when you already have a particular area
    to focus upon. Otherwise, you are taking a shotgun approach to troubleshooting,
    which can be quite time consuming.


    ## Disk I/O


    Unlike the tools mentioned previously, there is no direct way to use profiler
    to know if disk I/O is the root cause for the issue you are trying to troubleshoot.
    There is no event category, event class, or data column that says “check here
    for disk I/O problems.”


    Compare this to wait types, where you can explicitly find if a query is waiting
    for disk and decide for yourself which method you would prefer in the middle of
    the night.


    While it is true that you can capture the reads, writes, and duration for queries,
    these elements alone are not going to tell you if disk I/O is the root cause of
    your issue. All they can do is point you to using additional tools to take a deeper
    dive into the trace results. For example, you may find a query with a high duration
    value but very low reads and writes. You cannot conclude that you have a potential
    disk I/O issue because that query may have a high duration simply due to the fact
    that it was a being blocked by other activity.


    ## Memory


    `SQL Profiler` does not offer a direct way to measure potential memory issues.
    There is no event category, event class, or data column that says “check here
    for memory problems.” Compare this to the Reliability and Performance Monitor
    where you can configure specific counters to capture memory resource information
    and you can decide for yourself which method you would prefer to use when someone
    is standing in your cube and demanding to know how much longer before you fix
    their problem.


    However, you can use `SQL Profiler` to capture query plans. Inside the Performance
    Event category you can capture the plans with the `Showplan All Event` class.
    You can then examine the query plans and look for operators that are likely to
    consume memory such as a `Hash Match`. Personally, I think this is the same as
    trying to use a hammer to replace a light bulb; it is not the right tool for the
    task at hand.


    ## CPU


    Unlike disk I/O and memory, you can (in theory) use `SQL Profiler` to troubleshoot
    CPU issues. Of course, the catch here is that you would need to know that you
    have CPU issues before you are starting your trace. Otherwise, you are back to
    the shotgun approach.


    So, let’s say you suspect a possible CPU issue, or that you know you can use `SQL
    Profiler` to look for a possible CPU issue. You can run a trace that contains
    the `CPU` data column and filter for a specific CPU duration. Earlier when discussing
    `SQL Profiler`, I listed a possible threshold of `CPU > 500` along with a handful
    of categories and classes.


    I think it is a good idea to focus on the `TSQL` and `Stored Procedure` categories
    as previously mentioned; this will allow for you to examine the queries hitting
    the server and provide just enough detail for you to focus on a particular application
    or database that may be adversely affecting the server.


    ## Web Sites


    When my children were smaller they would like to ask “Why?” to just about everything,
    even after I would say “I don’t know.” This got a little tiring for my wife and
    me in a short amount of time, so I started answering their questions in a specific
    way. It went something like this:


    Children: “Why?”


    Me: “I don’t know.”


    Children: “Why?”


    Me: “Because I don’t know everything.”


    Children: “Why?”


    Me: “Because no one person can know everything.”


    Children: “Why?”


    Me: “I don’t know.”


    And so we would repeat, eventually they grew tired of asking me “Why?” all the
    time.


    Maybe they just grew out of it, but I like to think I helped them through that
    phase quickly enough. Besides, I was teaching them a very important lesson: no
    one person knows everything.


    Neither do you. As more and more functionality is shoved into `SQL Server`, get
    used to not knowing everything about everything. There is going to come a time,
    fairly quickly, where you will need to go and find an answer. So, where do you
    begin your search?


    ## Search Engines


    My list of search engines is very short. It is either Bing or Google, and nothing
    else.


    Either one is a good place to start when you do not know the answer. Input some
    keywords, or an error message, and start fishing for some answers. I have one
    colleague who refers to Google as his “junior DBA.”


    ```

    http://www.google.com

    http://www.bing.com

    ```


    Think of search engines as the 21st century encyclopedia. It is good at letting
    you read pages that have been printed previously by someone else. Well, except
    for those rare occasions where a search returns your own blog site and you have
    forgotten what you wrote years ago.


    ## Forums


    Forums are good at interacting with other professionals. Most forums are disconnected
    conversations. You submit a question and at some point in the future it may or
    may not be answered. Or you search the forum for similar questions and issues
    to yours in the hope of inching closer to a resolution.


    Here’s my short list of forums:


    ```

    http://www.sqlservercentral.com

    http://www.msdn.com

    http://www.stackoverflow.com

    http://www.serverfault.com

    http://www.twitter.com

    ```


    `SQLServerCentral` is one of the top SQL forums available for you to participate
    in. `StackOverflow` and `ServerFault` are also quite good at finding and getting
    answers. Of course, you can just go right to the source and participate in the
    `MSDN` forums as well.


    Think of forums as a chat room and be mindful of the people you are having a conversation
    with.


    Other forums, most notably the social networking site `Twitter`, allow for you
    to interact with others in near real time. If you are connected to other database
    professionals then there is a good chance you are going to get an answer from
    your network on `Twitter` faster than any other type of forum.


    ## Technical Resources


    Another group of websites for you to keep handy would be technical resources such
    as the following two sites:


    ```

    http://www.technet.com

    http://www.sqlserverpedia.com

    ```


    These websites and links are similar to having the product manual right in your
    hands. In some cases, such as `SQLServerPedia`, it is like having a cheat sheet
    right at your fingertips.


    # 7 Chapter: Where’s the Buffet?'
