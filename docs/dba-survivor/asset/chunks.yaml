    \ resolution time. Start tracking what it is you do. Write down that you did a\
    \ password reset, or that you did a restore by refreshing development from production,\
    \ or that you spent time reviewing a server for any missing indexes. Get a sense\
    \ for a lot of the common tasks that are coming your way and also note just how\
    \ long it takes for you to resolve each of them.\n\n**TIP:** Document everything\
    \ that you can, no matter how insignificant it may seem.\n\nTracking your time\
    \ is going to serve you well in two ways. First, it will allow for you to give\
    \ your customers realistic SLAs for a group of specific requests. Second, it helps\
    \ you to better manage the expectations that will be set upon you by your customers.\
    \ Think about how crucial those two items are. You will be on your way to delivering\
    \ what is needed, on time, and with value.\n\nA residual effect is that this will\
    \ allow you to sit with your customers to get details on their requests. If you\
    \ have demonstrated that you are able to provide quality support, then it is easier\
    \ to have your customers spend an extra 5 minutes explaining some details to you\
    \ that will help you to resolve their issue. That is better than the alternative,\
    \ where they do not want to spend any extra time than necessary and just want\
    \ you to fix something, and now.\n\n## Be Nice\n\nWhen it comes to support issues,\
    \ do not get caught up in flame mails. E-mail has no tone, and it is very easy\
    \ to let your inner voice interpret an e-mail in a different way than was intended.\
    \ If you ever think that someone is sending you a flame mail, then your best response\
    \ is to pick up the phone and call them. Do not respond to them with an e-mail,\
    \ as that will most likely lead to a downward spiral.\n\n### READ ME ONE MORE\
    \ TIME  \nby Tim Gorman\n\nWhen sending e-mail to customers, sometimes it is a\
