  trans: '# 第二章：现在我该做什么？


    那么，我们假设最初遇到的每一条警报都需要你采取行动。请注意，我并未在初始清单中包含这一点，但这只是因为响应警报应作为之前讨论任务的**次要事项**。


    当你花费数小时响应某个不太关键系统的警报，而最关键系统却连续多日没有数据库备份，这说得过去吗？


    但现在是时候问问别人了：“嘿！我们的警报系统是什么？” 如果可能，你应该查看不同类型的警报，看看它们是否可以被标记为**关键**或**信息性**。


    你如何判断警报的严重性？你怎么知道它是否真的重要？很简单——如果它与你负责的某个数据库或客户相关，那么毫无疑问你应该调查这条警报。如果它不属于前面列出的项目，那么毫无疑问你也应该调查这条警报。换句话说，如果你不知道答案，那么答案必须是肯定的。


    **提示：** 记住，如果你不知道一条警报的严重程度，那就按它非常严重来处理。


    ## 我应该调查那条警报吗？


    既然你知道任何来源不明的警报在证明其无害之前都应被视为严重，真正的问题就变成了“下一步怎么办”？如果你团队里有其他人，那么你的第一站应该是去问他们。如果只有你自己，那就问你的经理。如果这两条路都走不通，那你还有几个其他选择。


    ### 检查警报系统


    开始深入调查警报系统，看看能否找出为什么会生成这条警报。通过这样做，你会更多地了解警报系统，从而更容易理解将来可能收到的警报。如果你担心的警报是直接明了的事情，比如
    `Database Mail` 因 `SQL Server Agent` 中作业失败而给你发送邮件，那么你的调查工作应该很简单。如果警报系统稍微复杂一些，比如
    `Operations Manager`，那么可能需要花更长时间才能确定细节，但从长远来看，现在的额外努力是值得的。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图 29](img/index-45_1.png)


    在检查警报系统时，务必确认它不是将邮件发送到单个邮箱（你的邮箱），而是发送到一个**通讯组列表**。除非你计划每分每秒都保持在线并响应，否则始终使用通讯组列表来接收警报通知。


    但如果你不知道邮件是如何发送的呢？


    ### 询问开发人员


    如果你已经收集了警报所涉及服务器或数据库的详细信息，那就去问问开发人员，看他们是否对警报性质有更多了解。他们也许能阐明相关事件；可能是批量加载失败了，或者他们正在进行一些测试。最坏的情况是，这预示着某个重要问题，而他们将会非常感激你在通知其他人之前先来找他们。


    但如果他们也没有更多细节呢？


    ### 询问服务器管理员


    下一个合乎逻辑的步骤是联系服务器管理员。他们中可能有人熟悉警报系统或警报本身的性质。他们可能还配置了一些邮件规则，这对你或许也有帮助。


    四处问问看；同样地，你可能正在发现比你意识到的更严重的事情，服务器团队会非常高兴你在联系……你的客户之前先来找他们。


    ### 询问你的客户


    当所有其他方法都失败时，就去问客户自己，看看他们是否知道当前有任何问题。你可能会发现他们已经遇到了一些麻烦，他们会很高兴看到你。通过帮助他们解决任何可能的问题，你也可能发现警报的本质。如果他们目前没有任何问题，那么你现在提高他们的意识将是有益的，以便他们在以后出现任何异常时可以再次联系你。


    每当一条警报出现，你都得到了一个学习新事物的机会。拥抱它，并学会爱上它，因为如果你不这样做，它很快就会成为你存在的祸根，以至于你想把你的黑莓手机（Crackberry）扔到墙上。


    而当那一刻到来时，你需要找人倾诉，最好是一边吃着东西喝着饮料。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图 30](img/index-46_1.png)


    ## 嗨，一起吃个午饭？


    至此，你已经对系统进行了基本的健康检查，了解了你的客户，也知道了哪些系统最重要，那么是时候开始更多地了解在接下来几周和几个月里你将与之密切合作的人了。


    **提示：** 开始一份新工作时，每个人都是陌生人。你需要学会如何结识他人，以发展互利的关系。


    我本人天性非常害羞。大多数人听我这么说都不相信，但这是千真万确的。因此，我很难结识新朋友，甚至是我的同事。这让别人很难了解我，也让我很难了解他们。


    反过来，这可能会使得建立牢固、成功的工作关系变得困难。如果说我这些年学到了什么，那就是与你上下链条中的人**管理关系的重要性**。


    ### 以吃会友


    害羞或天性内向的人如何能够与他人建立和管理关系？这不是一件容易的事。事实上，有时会让人感到不知所措。但我发现了一个每个人都具备的非常普遍的特质：**每个人都要吃饭**。


    这是真的。每个人都会在某个时间点吃饭。你可能会发现他们坐下来吃午饭。


    你可能会发现他们早上去买杯咖啡。很可能你迟早会看到你每个同事在某个时候吃东西。而且很可能你自己也时不时地吃点东西。是什么阻止你们偶尔一起吃饭呢？为了打破僵局，在
    11:45 左右去别人的办公室或隔间，介绍自己是新人，并问他们是否知道附近有什么好吃的午餐地点。


    我每天早上都会走过去买杯咖啡。我并不总是自己买一杯，但小组里至少有一个人会买。那我为什么要去呢？因为我和他们共度的十分钟，给了我额外十分钟与他们在工作之外的互动时间，而如果我坐在自己的隔间里，就不会有这十分钟。


    时不时地，我会发现自己和别人一起吃午饭，或者走去买午饭。在我觉得自己吃太多的日子，我会和另一群同事去健身房。换句话说，我一直努力找到以不同方式与不同群体的人互动的机会，以便我们能更好地了解彼此。这是否意味着我们总是相处融洽？绝对不是。它确实意味着我们在努力相处。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图 31](img/index-47_1.png)


    ### 政治，或不参与


    我必须警告你，不要陷入办公室政治的泥潭。对任何人来说，那都是一个双输的局面。目标应是与同事建立良好、健康的关系。健康的关系不是关于合谋打压他人。健康的关系是关于**共同努力，相互成就**。


    **注意：** 不要卷入八卦或办公室政治。'
- fmt: '## Dealing with Introversion


    Not all technical people are introverted, but many are. The nature of our work
    calls for detail-oriented people comfortable at working alone for long periods
    of time. Those traits are in stark contrast to the outgoing salesperson who can
    meet 15 new people in 10 minutes, and be bosom-buddies with all of them. We are
    the people who can sit in a conference lecture with 100 other people and walk
    out not having met a single one of them.


    Yet career success demands that we make ourselves visible. Sometimes we need to
    step up and lead, or present on what we know. We need to be comfortable in meeting
    people and working together. And we need to do all these things while being true
    to ourselves and respecting the personalities that we were born with.


    ## Accept That Nothing Is Wrong


    If you find that you’re the sort of person to want to have lunch alone, do not
    despair. The very first thing that you should do is


    ### Realize that you are not put together wrong.


    Yes, it is true. If our entire society were made up of social bubbleheads running
    around and meeting each other, we’d all be in a world of hurt. We need those outgoing
    people.


    Your company needs its sales force, for example. But we need all the other personality
    types, too. Those salespeople need products and services to sell.


    The key is to “know thyself.” Know your own comfort zone. Play to your strengths.


    Develop skills that you lack. You can actually treat “extroversion” as just another
    skill to master. Doing so will pay handsomely in both personal and job satisfaction.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 32](index-48_1.png)


    **30**


    **CHAPTER 2: Now What Do I Do?**


    **NOTE:** A good book on personality traits is *Please Understand Me*, by David
    Keirsey and Marilyn Bates (Prometheus Nemesis, 1984).


    ## Take Care of Yourself


    The defining trait of an introvert is sometimes said to be that


    ### An introvert draws energy from being alone, and expends energy to engage in
    social situations.


    Does that sound like you? If it does, then don’t be afraid to lay down some boundaries.


    For example, when travelling to conferences, my editor generally blocks out breakfast
    for himself. That’s his “me time,” when he can charge his batteries for the day.
    He also takes himself off the clock for lunch. He’ll reach out aggressively to
    engage you if you walk by the Apress booth, but at lunch he switches off the “selling
    mode” and just enjoys a good meal.


    When travelling with colleagues, don’t feel obligated to spend every waking moment
    with them. There is nothing wrong with telling your coworkers that you need some
    time alone, and that you’d rather not go bar-hopping until 2:00 a.m. Be up front
    about why you’re doing it. Your colleagues will understand. Some may admit to
    being in the same boat.


    Did I just say to eat lunch with coworkers? I’m going to contradict myself now
    by giving you permission to eat alone if you need some space. Meals are a great
    venue in which to engage coworkers and get to know them better. But you don’t
    have to spend each and every meal with them. Take care of yourself first. If you
    need lunch alone to get your head together for the afternoon, then take it.


    ## Be Open and Straightforward


    Don’t try to be something you’re not. Don’t be afraid to admit that you’re not
    a super-outgoing person. Sometimes when I want to meet someone, I just walk up
    and tell that person I’d like to meet them. It’s a straightforward approach lacking
    in subtlety, but why not? If you take an interest in people, and attempt to befriend
    them, most people will respond positively regardless of how clumsy your own efforts
    are.


    ## Join Some Organizations


    Organizations provide structure. And that structure makes it easier to step outside
    of one’s comfort zone. That’s why organizations such as the Professional Association
    for SQL Server (PASS) are so valuable. They provide a socially safe venue in which
    to make professional contacts. That the other members are there for the same reason
    only helps.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 33](index-49_1.png)


    **CHAPTER 2: Now What Do I Do?**


    **31**


    Organizations also provide opportunities to lead, and to develop speaking and
    presentation skills. You can start small. You don’t need to make your first talk
    in a 1,000-seat room. Start with a local user group. Work your way up as your
    comfort and confidence grow.


    Don’t make it all about work either. The skills and confidence that you develop
    working in a community or church organization easily translate into the professional
    space. If you can work with people to make a difference in your community, then
    you know you can do the same in your job.


    ### Accept That Nothing Is Wrong


    Did we just have this heading? We sure did, but the point is so important it bears
    repeating. It is a sad truth that society in general tends to smile upon bubbly
    and outgoing people, and to likewise frown upon those who are quiet and withdrawn.
    That’s an unfortunate and wrongheaded attitude. Do not get sucked into it!


    Everything I’ve said about developing people skills is intended with just that
    one goal in mind: to develop your people skills. Don’t try to make yourself something
    you are not.


    Your personality is a big part of what makes you good at your job. Don’t fight
    that goodness. Play to your strengths. At the same time, work to develop your
    skills in other areas. There is no contradiction in doing both of those things.


    ### CONVERSATION STARTERS AND SMALL TALK


    **by Jonathan Gennick**


    The art of making small talk in social situations is one that did not come easily
    or naturally to me. Even in elementary school I would notice that some people
    could sit down to the lunch table and almost instantly be engaged in conversation
    with everybody around them. What’s more, the conversation would drift from topic
    to topic in ways that I seldom could follow. Just when a topic got interesting
    and I was ready to dive in deeply with a comment, suddenly the group was talking
    about something else. I was always a half-step off.


    In business, it’s helpful to have a few tricks for starting conversations. One
    of my favorite ways to begin a conversation is with a question. If you ever catch
    me manning the Apress booth at a conference like PASS, the question you’re most
    likely to get hit with is, do you have any of our books? It’s a logical question
    that usually leads to some back-and-forth conversation about specific books and
    what’s good and bad about them.


    My question is a good conversation starter, but it’s sincere too. I truly want
    to know what readers like and don’t like about our books. I want to know which
    topics resonate with our audience and which do not. I’m hungry for help, really,
    in doing my job better.


    I might ask other questions, too. Sometimes a company name will strike me as interesting.
    Other times I see names of cities that I’ve visited or lived in. Questions are
    a great way to get a conversation rolling. But be sincere. Don’t just show interest.
    Be interested.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 34](index-50_1.png)


    **32**


    **CHAPTER 2: Now What Do I Do?**


    ## Track Your Progress


    Remember that checklist? Good, because you need it in order to chart your progress
    over the coming weeks. As a DBA, a lot of your work is done behind the scenes.
    In fact, people will often wonder what it is you do all day, since much of your
    work is never actually seen by the end users. Your checklist will serve you well
    when you try to show people some of the tangible results that you have been delivering.'
