    you at some point to ask you a question. And when you respond with, “No, I do
    not know how to wrap a notification from `SSNS` into an `SSIS` package, build
    a report in `SSRS`, and then push everything to `SQL Azure`,” you will get a blank
    stare and hear the words “But aren’t you the `DBA`?”


    **TIP:** Remember, no one person knows everything.


    The answer is yes. Yes, we are the `DBA`s, but that does not mean we know everything
    about each product that has the letters `SQL`. It’s the same reaction a developer
    has when I say, “What do you mean you need me to restore the production database
    from yesterday down to test so that you can get a stored procedure? Don’t you
    have a copy of the stored procedure in your source control?”


    ### GETTING ASKED ABOUT SQL

    *by Jonathan Gennick*


    A few years ago, I was approached about teaching a class on “`SQL`.” I don’t remember
    now whether it was someone who’d read my books and articles, or whether the person
    had simply heard that I was good at `SQL`. What I soon discovered though, was
    that the person wanted someone to teach a class not on `SQL` the query language,
    but on `SQL Server` the database management system. They are two different things,
    of course. Trust me. I am comfortable with `SQL`, but you do not want to see me
    teaching about `SQL Server`.


    Now that we have established that `SQL Server` has a lot of functionality, you
    need to be aware that developers are going to ask you a lot of questions about
    various components that you have never used. That’s OK—do not panic—the developers
    are doing their job well and are researching different ways to complete a particular
    task.


    With all the functionality that `SQL Server` has to offer, developers are not
    only going to ask you to help them to make something work, but they are going
    to also expect that you can help explain why something works in a particular way.
    It could very well be the case that a particular component of `SQL Server` is
    working in a way that is contrary to what everyone expects. Of course, you will
    be expected to provide an answer for the behavior; the answer had better be found
    fast, and the answer better come with a solution that does not require the developer
    to undo months of coding. If it does, then that same developer is going to ask
    for you to take out a hammer and make the square peg fit into the round hole.


    If such a situation comes up, you should do your best to offer the developers
    a handful of alternative solutions. The last thing anyone wants is for some Band-Aid
    solution to make its way to production. Too many times I have seen poorly designed
    systems deployed to production simply because a developer did not want to admit
    that perhaps they could have done things in a way that did not cause a slow memory
    leak and subsequent server reboots once a week.


    Usually when that happens, they do their best to shrug their shoulder and tell
    you to ask Microsoft for a patch to fix the problem. After all, they don’t have
    time to fix things right because they are under pressure to finish some other
    project.


    ### Service-Level Agreements


    *Service-level agreements (`SLA`s)* are a must have for any `DBA`. If your shop
    already has `SLA`s defined, you must take the time to review them. Knowing the
    defined `SLA`s will help you to prioritize your tasks. For example, if you have
    two tasks to perform, and one must be done in four hours and the other has a limit
    of two days, then it is easy for you to decide which one to work on first.


    **TIP:** `SLA`s are good for a variety of reasons, most notably that they can
    help you to prioritize your current tasks.


    If your shop does not have defined `SLA`s, then you must sit down with your manager
    and start discussing them. Do your best to define the `SLA` for groups of requests
    that you get most frequently, and also discuss the varying levels of environments.
    For example, if an end user needs a password reset in production, that should
    be given a priority over a password reset to the test environment. It will be
    hard to draw a hard line on each and every task that you receive, so it is best
    to classify requests in a particular category.


    Some examples of categories could include the following:

    * Password resets

    * Database restores

    * Database backups

    * Creating server logins

    * Creating new databases

    * Performance tuning


    For each of those categories you should also consider the level of environment.
    So production requests take precedence over anything else, right? Well, maybe.
    It also depends, of course, on your customer.


    ### Being a Good Customer


    While you have a duty to provide quality customer service to your end users, there
    is also something to be said for being a good customer. As a `DBA` you are working
    in a service profession; you provide a service for all your customers. Many of
    those customers are also providing a service for others. Naturally you would expect
    that there would be some professional courtesy extended when it comes to your
    level of service.


    Of course, you would be wrong to expect such a courtesy from everyone.


    Even having an `SLA` defined will not stop people from demanding everything be
    done yesterday. Developers will want their requests filled immediately for a development
    server and could care less about any production issues you may be working on,
    or the need for you to review your dashboard reports from last night, or whether
    you are trying to perform some needed maintenance.


    Developers typically want action; they want to see you doing something, and preferably
    doing what they need done at that moment. Otherwise, they assume you are not doing
    anything when you are not working on something specifically for them. When a developer
    complains that something is taking too long, then it is time for you to compare
    just how long it has been to the defined `SLA` for the task.


    **TIP:** Keep this in mind the next time you interact with someone in a store
    or restaurant. If you feel yourself getting impatient because the level of service
    is not to your liking, ask yourself if you have been a good customer first before
    making your complaints known.


    ### Communication Is Key


    I have seen that a lot of frustration around tasks and their completion comes
    down to a simple amount of communication. I have lost count of the number of times
    I have seen e-mails from a customer asking for an update on the progress of a
    task that the `DBA` would know is going to take another hour or more. So why was
    the customer expecting something to be completed sooner? *Because they had no
    idea how long the request should take!*


    So how do you avoid this? With communication, of course. Let’s consider two scenarios
    for the same request.'
