- fmt: '# CHAPTER 6: Basic Troubleshooting


    The `Activity Monitor` in `SQL Server 2008 Management Studio (SSMS)` has undergone
    a facelift from the 2005 version. For starters, you access the `Activity Monitor`
    by right-clicking on the instance name inside of `SSMS` and select “Activity Monitor.”
    The monitor displays four graphs and four rows to help you understand more details
    regarding the processes that are currently being run by the database engine. See
    `Figure 6–3` for an example.


    The information being displayed is taken from `Dynamic Management Views` being
    run against the instance. That means the information you see displayed is real
    time. However, it only goes as far back as the last time the instance was started.


    ## Disk I/O


    The `Data File I/O` section will return information on the data and log files
    for the system and user databases. You can sort and filter on columns for `MB/sec
    Read`, `MB/sec Written`, and `Response Time`. This is a very quick and easy way
    to see if there is disk I/O contention for any particular data or log file.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 110](index-123_1.png)


    ## Memory


    The only part of the `Activity Monitor` that pertains to memory is found in the
    `Processes section` which has a column named `Memory Use (KB)`. This column simply
    shows the amount of memory that is being used by a particular query. If you are
    having memory issues, then chances are you will not be able to use this section
    to isolate one particular query, as it could be the sum total of all the queries
    currently running.


    ## CPU


    There are two places inside of `Activity Monitor` to find pertinent information
    on CPU usage. One is inside of the `Resource Waits section`, where there is a
    wait category appropriately named `CPU`. You can then use that information to
    filter the queries in the `Processes tab` to isolate the processes that are currently
    waiting for CPU.


    The other section to find information on CPU usage is in the `Recent Expensive
    Queries`. There you will see roughly ten to fifteen recent queries and you can
    sort by the `CPU (ms/sec)` column. This is especially handy because you will most
    likely be called to investigate after an issue has happened, so being able to
    review the recent queries that have been run against the instance is valuable
    information to review.


    ## Dynamic Management Views (DMVs)


    `SQL 2005` introduced the use of `Dynamic Management Views` and functions. These
    are views that will return information about your server instance and databases
    and are useful for diagnosing performance issues. You access the views and functions
    with `TSQL` only, as if you were querying from a table. All of the `DMV’s` are
    located inside the `sys schema`. If you want to browse them inside of `SSMS` then
    you will need to navigate to the system views inside of individual databases,
    as shown in `Figure 6–4`.


    The information returned by querying a `DMV` is reset when the instance is restarted.
    So any information returned is only going to give you a look at the system since
    that last restart. This means you cannot use a `DMV` for historical purposes,
    unless you are gathering and storing the data in a repository manually yourself.
    Of course, if you are having performance issues now, then `DMV’s` are going to
    be giving you a real-time look at what is happening, and that can be valuable
    information to aid in your analysis.


    If you want specific details about `DMV’s` you can find them at: [http://msdn.microsoft.com/en-us/library/ms188754.aspx](http://msdn.microsoft.com/en-us/library/ms188754.aspx).
    The following list shows some of the `DMV’s` I believe you will find most useful
    for basic troubleshooting, but will not go into much detail. I would encourage
    you to do some independent research about `DMV’s` as the best way to learn about
    them and what they can do for you is to start experiencing them for yourself.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 111](index-124_1.png)


    ![Image 112](index-124_2.png)'
