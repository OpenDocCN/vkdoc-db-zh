  trans: "\n如今梦想成真，你成为了常驻数据库管理员，首先要做什么？就像世界上任何其他工作一样，你需要开始着手于……嗯……\n\n某些事情，对吧？但具体是什么呢？为了最好地展示你对组织的价值，你应该把精力集中在哪里？知道从哪里开始对你的成功至关重要，本章将帮助你最好地确定如何开始、规划你第一个一百天，甚至决定你应该定期和谁共进午餐。\n\
    \n**提示：** 从现在开始，你将持续通过你的实际成果被评判。\n\n本章中，我们将讨论以下内容：\n\n1.  整理你的初始检查清单\n2.  如何处理你收集到的信息\n\
    3.  应对不熟悉的警报\n4.  如何打破僵局\n5.  合适人选\n\n## 你与总统的共同点\n\n你真的和总统有什么共同点吗？是的。比你可能意识到的要多。首先，你周围大约有一半的人怀疑你是否有资格真正胜任你被赋予的职位。其次，每次你做出决定或规划行动方针时，你都会不断受到批评，即使是来自你的支持者。第三，无论好坏，即使不在你的控制范围内，你都将通过你在最初一百天里取得的成就被评判。\n\
    \n每四年我们选举一位新总统，而在任者总是受到支持率的审视。你也会有自己版本的这个生活现实；它叫做你的年度绩效评估。到了评估的时候，你希望你的支持率尽可能高。\n\
    \n听起来很糟糕？也许吧，但只要你开始时意识到这些事情，其实也没那么糟。对你来说最重要的目标是你初到任时的行动计划。如果你认为你可以出现，端杯咖啡，然后轻松适应新职位，那你就错了。你的那杯咖啡可以等到你开始收集有效开展新工作所需的信息之后再喝。\n\
    \n那么是什么信息呢？先从一些基础信息开始怎么样，例如，你负责哪些服务器？你期望支持哪些应用程序？这些应用程序在一天中的什么时段使用？你的客户是谁？数据库目前是否得到了正确的备份？如果备份失败了，你怎么知道？有这么多项目要检查，很快就会变得非常令人应接不暇。这就是为什么你需要整理一份基本要点的检查清单并开始行动。然后，在你能够掌握所处环境之后，你可以开始制定一些短期改进计划。不知不觉中，你的一百天就会过去，你将能够回顾并看到你在短时间内取得了多大的进展。\n\
    \n相信我，这比听起来容易，你只需要有条理。\n\n## 你的初始检查清单\n\n到现在，你应该已经坐在你的办公桌前，我们将这一天称为第一天。你与人力资源部的初次会面已经结束，你已经参观了办公地点，并且正在确保你拥有至少可以开始工作所需的访问权限。例如，像`电子邮件`这样的东西。哦，还有访问他们期望你管理的数据库服务器的权限。\n\
    \n这是你需要的第一条信息，对吧？*我负责哪些服务器和系统？* 没有这个小小的知识要点，在你开始漫长而缓慢的逆流而上时，将很难取得任何进展。\n\n你的初始检查清单分为几个部分。为什么？嗯，因为我喜欢把事情列成清单，如果可能的话对这些清单进行分类。这有助于我记住全局，而不必担心遗漏任何特定的细节。我鼓励你尝试同样的方法，看看是否对你有帮助，但每个人的组织方式不同，所以如果你想以不同的方式开始你的清单，也不必担心。\n\
    \n现在，这个检查清单有三个主要部分。一个部分涉及收集我简单称之为*你的东西*的信息。另一个部分涉及查找*客户的东西*的信息。你还需要考虑的另一个部分是我称之为*你的行动计划*的东西。这三个领域是你在第一天将开始集中精力的地方：找到你的东西，找到你客户的东西，并开始制定行动计划。因此，一个检查清单示例可能如下所示：\n\
    \n1.  创建服务器列表。\n2.  检查数据库备份是否在运行。\n3.  抽查并验证你是否能从其中一个备份中进行恢复。\n4.  建立客户列表。\n5.\
    \  列出“最重要”的数据库。\n6.  列出即将到来的交付成果/项目。\n7.  建立环境基线。\n    -   服务器配置检查\n    -   数据库配置检查\n\
    8.  制定你的恢复计划（不是你的备份计划，是你的恢复计划）。\n\n请注意，我的清单遗漏了一些很多人会告诉你是数据库管理员日常必须做的事情。它不包括诸如常规`索引维护`、`性能调优`、审查`事件日志`之类的事情。当然，所有这些事情都是必要的，但我们仍然在你的第一天待办事项清单上。到目前为止我提到的所有事情都需要你花费不止几天的时间来收集。如果你在第一天就忙于解决某个`存储过程`的问题，那么一旦灾难来临而你还来不及记录恢复计划，你就是在为自己的重大失败铺路。\n\
    \n你是更愿意因为告诉那个开发人员停止写`游标`而成为英雄，还是更愿意因为告诉客户你能在 30 分钟内让他们的数据库恢复运行而成为英雄？我知道在刚接手一个新职位后不久，我会选择哪一个。\n\
    \n**提示：** 所有这些任务都需要超过一天的时间来执行，但不要拖延开始整理这份检查清单。\n\n在第一天，向你的经理解释你将首先收集这些清单数据。通过主动先进行尽职调查，你向他们表明你的首要任务是保护他们的数据、你的工作以及他们的工作。他们可能无法为你提供这份清单，而且他们甚至比你更需要它。你稍后会有足够的时间处理其他事情，随着你为企业带来标准化，这些事情会自然地融入到你的环境基线和后续行动计划中。\n\
    \n### 一个 OSHA 时刻\n**作者：布伦特·奥扎**\n\n在一家公司，当我为我头两周制定这个计划时，我的老板大声说：“天呐！我们其他服务器也没有这些信息。”\
    \ 然后他把他的系统管理员叫进来，告诉他们放下手头正在做的事情，去做和我一样的事情——但针对文件服务器、Exchange 服务器等。\n\n让我们来看看为什么检查清单中的每一项都很重要，以及为什么需要从第一天就开始处理。如果今天是你的第一天，你现在就想开始这些任务。\n\
    \n### 创建服务器列表\n"
- fmt: '# CHAPTER 2: Now What Do I Do?


    Not sure I really need to explain this one, but you best get an idea of exactly
    what you are expected to administer. Chances are your initial list will not be
    complete, but it will give you an immediate baseline of reference. Trust me, at
    some point some person will walk up to you and start talking about a server you
    never knew existed. And they will be very confused as to why you have never heard
    of it, since they work with it all the time, there is a database there, and you
    are the DBA.


    Do your best to gather as much information right away as you can. That way you
    will know more about what you are up against, and it will help you when it comes
    time to formulate your action plans, which will be very different depending on
    whether you have five or five hundred instances to look after.


    I know what you are asking yourself. You are asking, “Self, how do I find out
    what I am responsible for?” I suggest you start with your immediate supervisor
    and go from there.


    The trail may take you to application managers and server administrators. For
    example, your boss might say that you are responsible for the payroll databases.
    But what are “the payroll databases”? You may need to run with that initial bit
    of information and do some detective work to track down the specific databases
    involved. Along your journey, you will be given an overview of the complexity
    that is your new home. Any detective work that you’re forced to do will pay off
    handsomely by deepening you knowledge and understanding of where you work.


    If you are looking for a technical solution to finding databases, there are a
    handful of ways to get the job done. One of the simplest ways is to use the `SQLCMD`
    utility with the `–L` parameter to return a list of database servers that are
    broadcasting on the network. Since it is possible that some servers may not be
    found with that tool, you would be wise to still ask around when putting together
    your list.


    And where do you keep such a list? I like to keep a lot of notes written down
    in a notebook. When I say “notebook,” I’m not talking about a computer. I’m talking
    about a physical, paper book that I can hold in my hands. Others prefer to put
    everything into Word documents and store them on their computer. The paper notebook
    works best for me because I have found that I learn better by rote than by typing.
    What I write with a pen stays with me better than what I type with a keyboard.


    One more thing to mention would be the importance of having a list of servers
    you are *not* responsible for. There is a chance that you have some systems in
    your environment that are maintained strictly by vendors. If something goes wrong
    with one of those servers, it is important to know who is responsible for what.
    And if someone tells you that you do not need to worry about a server, my advice
    would be to get that in writing.


    Believe me, when disaster strikes, you had better be able to provide proof about
    the systems that are your responsibility.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 19](index-35_1.png)


    ## Check Database Backups


    Now that you know what servers you are responsible for, your next question had
    better be, are the backups running?” Do not assume that everything is working
    perfectly. Dig into the details yourself and verify that each and every instance
    is being backed up. Oh, and that includes the system databases (`master`, `model`,
    `msdb`) as well as all user databases. Check that the backup files exist, that
    the directory they are being stored in is on a disk that has adequate space, and
    if there have been any recent failures.


    You will also want to note the backup schedule for the servers and databases.
    You can use that information later on to verify that the databases are being backed
    up to meet the business requirements. You would not want to find out that the
    business is expecting a point-in-time restore ability for a database that is only
    being backed up once a week.


    I cannot stress this enough, but if there is one and only one thing for you to
    focus on as a DBA, it is to ensure that you can recover in the event of a disaster.
    And any good recovery plan starts with having a reliable database backup strategy.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 20](index-36_1.png)


    ## Verify That You Can Restore


    Every now and then I like to do a spot check of my backups by taking some and
    attempting to restore. For me, I like to attempt a same-server restore as well
    as a restore to a different instance. Note that this is not the same as just restoring
    the file header in order to verify that the file is readable. No sir, I want to
    restore the entire database—it’s just my preference. I would not typically have
    time to verify each and every backup file, and would not attempt to do so. I just
    want to select a few backup files from a few servers and ensure that there are
    no issues.


    Now, I said a “same-server restore” in the last paragraph and I want to make something
    very clear:


    *Be mindful when performing a same-server restore to a production server.*


    There, now I feel better. Same-server restores should be done only when you know
    it is safe to do so. How do you know if it is safe? Well, you could always ask
    someone. Or you could look to see if people are currently connected to the instance.
    Or, if your database is fairly small and manageable, and the restore should only
    take a few minutes at most, it should be safe. And of course, if it is a non-production
    server, then you can feel safer.'
