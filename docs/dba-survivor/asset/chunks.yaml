  trans: '# 第六章：基本故障排查


    `SQL Server 2008 Management Studio (SSMS)` 中的 `Activity Monitor`（活动监视器）相比 2005
    版本已焕然一新。首先，您可以在 `SSMS` 中右键单击实例名称，然后选择“活动监视器”来访问它。该监视器显示四个图表和四行信息，帮助您了解数据库引擎当前正在运行的进程的更多详细信息。示例请参见
    `图 6–3`。


    显示的信息取自针对实例运行的 `Dynamic Management Views`（动态管理视图）。这意味着您看到的信息是实时的。但是，它只能追溯到实例上次启动的时间点。


    ## 磁盘 I/O


    `Data File I/O`（数据文件 I/O）部分将返回系统和用户数据库的数据文件和日志文件的信息。您可以按 `MB/sec Read`（每秒读取 MB
    数）、`MB/sec Written`（每秒写入 MB 数）和 `Response Time`（响应时间）等列进行排序和筛选。这是快速简便地查看是否存在任何特定数据文件或日志文件的磁盘
    I/O 争用的方法。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 110](img/index-123_1.png)


    ## 内存


    `Activity Monitor` 中唯一与内存相关的部分位于 `Processes section`（进程部分），其中有一个名为 `Memory Use
    (KB)`（内存使用量 (KB)）的列。该列仅显示特定查询正在使用的内存量。如果您遇到内存问题，那么很可能无法使用此部分来隔离某个特定查询，因为它可能是当前正在运行的所有查询的总和。


    ## CPU


    在 `Activity Monitor` 内部有两个位置可以找到有关 CPU 使用率的相关信息。一个是在 `Resource Waits section`（资源等待部分）中，其中有一个等待类别恰当地命名为
    `CPU`。然后，您可以利用该信息来筛选 `Processes tab`（进程选项卡）中的查询，以隔离当前正在等待 CPU 的进程。


    另一个可以找到 CPU 使用率信息的部分是 `Recent Expensive Queries`（最近的高开销查询）。在那里，您将看到大约十到十五个最近的查询，并且可以按
    `CPU (ms/sec)`（CPU（毫秒/秒））列进行排序。这尤其方便，因为您很可能在问题发生后才会被要求进行调查，因此能够查看针对实例运行的最近查询是很有价值的审查信息。


    ## 动态管理视图 (DMV)


    `SQL 2005` 引入了 `Dynamic Management Views`（动态管理视图）和函数的使用。这些视图将返回有关您的服务器实例和数据库的信息，对于诊断性能问题非常有用。您只能通过
    `TSQL` 来访问这些视图和函数，就像从表中查询一样。所有 `DMV’s` 都位于 `sys` 架构内。如果您想在 `SSMS` 中浏览它们，则需要导航到各个数据库内的系统视图，如
    `图 6–4` 所示。


    查询 `DMV` 所返回的信息在实例重启时会被重置。因此，任何返回的信息都只为您提供自上次重启以来的系统情况。这意味着您不能将 `DMV` 用于历史目的，除非您手动将数据收集并存储在存储库中。当然，如果您当前正遇到性能问题，那么
    `DMV’s` 将为您提供有关正在发生的情况的实时视图，这可以是辅助您分析的有价值信息。


    如果您想了解有关 `DMV’s` 的具体详细信息，可以在此处找到：[`msdn.microsoft.com/en-us/library/ms188754.aspx`](http://msdn.microsoft.com/en-us/library/ms188754.aspx)。以下列表展示了一些我认为对于基本故障排查最有用的
    `DMV’s`，但不会深入太多细节。我鼓励您对 `DMV’s` 进行一些独立研究，因为了解它们以及它们能为您做什么的最佳方式就是开始亲身体验它们。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 111](img/index-124_1.png)


    ![图片 112](img/index-124_2.png)'
- fmt: '# CHAPTER 6: Basic Troubleshooting


    ## Figure 6–4. Navigating to the dynamic management views


    ## Disk I/O


    Some of the DMV’s that will help you to determine disk I/O issues include the
    following:

    - `sys.dm_db_file_space_usage`

    - `sys.dm_db_index_operational_stats`

    - `sys.dm_db_index_usage_stats`

    - `sys.dm_exec_query_stats`

    - `sys.dm_exec_query_plan`

    - `sys.dm_io_virtual_file_stats`

    - `sys.dm_io_pending_io_requests`

    - `sys.dm_os_wait_stats`

    - `sys.dm_os_waiting_tasks`


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 113](index-125_1.png)


    Here is an example T-SQL script that will help you use the `sys.dm_io_virtual_file_stats`
    DMV to find data files that are producing the highest average number of milliseconds
    per I/O:


    ```sql

    SELECT io_stall / (num_of_reads + num_of_writes) AS avg_ms_per_io,

    io_stall AS io_stall_ms,

    (num_of_reads + num_of_writes) AS num_io,

    DB_NAME (database_id) AS database_name,

    file_id

    FROM sys.dm_io_virtual_file_stats (null, null)

    WHERE (num_of_reads + num_of_writes) > 500

    ORDER BY 1 DESC

    ```


    ## Memory


    Some of the DMV’s that will help you to determine memory issues include the following:

    - `sys.dm_os_cache_counters`

    - `sys.dm_os_memory_clerks`

    - `sys.dm_os_memory_cache_clock_hands`

    - `sys.dm_os_process_memory`

    - `sys.dm_os_ring_buffers`

    - `sys.dm_os_sys_memory`

    - `sys.dm_os_virtual_address_dump`

    - `sys.dm_os_wait_stats`

    - `sys.dm_os_waiting_tasks`


    Here is an example T-SQL script that will help you use the `sys.dm_os_buffer_descriptors`
    DMV to find the databases that have the most data pages currently residing in
    the buffer pool:


    ```sql

    SELECT COUNT(*) AS cached_pages,

    CASE database_id WHEN 32767 THEN ''ResourceDb''

    ELSE DB_NAME(database_id)

    END AS [database]

    FROM sys.dm_os_buffer_descriptors

    GROUP BY DB_NAME(database_id), database_id

    ORDER BY cached_pages DESC

    ```


    ## CPU


    Some of the DMV’s that will help you to determine CPU issues include the following:

    - `sys.dm_exec_cached_plans`

    - `sys.dm_exec_query_stats`

    - `sys.dm_exec_query_optimizer_info`

    - `sys.dm_exec_requests`

    - `sys.dm_exec_sessions`

    - `sys.dm_os_schedulers`

    - `sys.dm_os_wait_stats`

    - `sys.dm_os_waiting_tasks`


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 114](index-126_1.png)


    CHAPTER 6: Basic Troubleshooting 108


    Here is an example T-SQL script that will help you use the `sys.dm_os_schedulers`
    DMV to locate possible CPU issues by identifying the number of tasks currently
    waiting to be run on a CPU:


    ```sql

    SELECT scheduler_id, current_tasks_count, runnable_tasks_count

    FROM sys.dm_os_schedulers

    WHERE scheduler_id < 255

    ```


    Did you happen to notice I listed these DMV’s twice?

    - `sys.dm_os_wait_stats`

    - `sys.dm_os_waiting_tasks`


    These DMV’s help to identify the wait stats and types for the activity on your
    server since the last restart. Wait stats may be one of the most powerful tools
    you have when it comes to troubleshooting performance issues. Even this simple
    query:


    ```sql

    select top 10 *

    from sys.dm_os_wait_stats

    order by wait_time_ms desc

    ```


    can yield a wealth of information in a short amount of time. While other DBA’s
    are fumbling around to launch SQL Profiler, you could have already isolated the
    query, what it is waiting for, and propose a possible solution.


    ## Wait Stats


    Most people are familiar with the indoor/outdoor thermometers that are sold in
    stores. These devices let you see the temperature in both places at the same time.
    They don’t really offer an advantage over the traditional method of placing a
    thermometer outside your window. In fact, unless the probe is placed properly,
    the reading you get outside may be off by a good amount. In the end, we all check
    the real temperature outside by opening a door or window and feeling the air on
    our skin.


    Now consider your phone rings and the voice on the other end says “the server
    is slow.” You have a handful of tools at your disposal to look inside the database
    engine to find out what is happening. In short, you have someone on the outside
    observing one temperature, and you can look inside for another temperature.'
