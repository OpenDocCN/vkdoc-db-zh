    **CHAPTER 2: Now What Do I Do?**


    **17**


    If you are storing your information in a spreadsheet or similar document, then
    you can go back over time to better track how your environment is changing. Are
    you administering more servers or fewer? More databases or fewer? Are all your
    jobs running? Backups working? This information will surely help with your approval
    ratings.


    If nothing else, you’ll have the backup detail to be able to clearly show to your
    boss how your job is changing and how your responsibilities are increasing. You’ll
    be better able to document your value to the company.


    ON SELLING YOUR VALUE


    **by Jonathan Gennick**


    You’d think your boss would know your value, would know what it is that you do
    all day long. My own experience though, is quite opposite that. Early in my career
    I suffered a painful layoff. Looking back on that event, I’ve come to believe
    it was in part because I failed to manage upwards in a way that kept my boss apprised
    of my true value to the company. My boss was local, in the same building. My internal
    clients were all over the country, with some even in Europe. I worked closely
    with those internal clients, delivering results. But my boss was outside the loop.
    He and I didn’t interact much. We never really needed to interact on a daily basis,
    so we didn’t. Guess who got the boot when the mandate came down to cut head count?


    I learned many painful lessons from that first layoff. One is that bosses are
    busy people. Your boss has his own set of responsibilities. He may have only a
    dim idea as to what exactly you do. Make sure that you do a better job than I
    did at keeping your boss “in the loop” and apprised of your good work. Someday
    your boss will be in a meeting with HR about cutting staff. When he’s in that
    meeting, you want him to be able to recall from the top of his head all the good
    that you do for the company.


    **Check Database Backups**


