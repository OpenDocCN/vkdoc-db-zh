    ****About the Technical**


    **Reviewers**


    **Sylvester Carstarphen** is a working DBA manager at a leading automobile CRM
    company, where he is passionate about developing his team’s soft skills as well
    as their DBA skills. Sylvester has been a DBA for 6+ plus years with strong performance
    tuning skills. He is also the co-author of Pro SQL Server 2008 Administration
    by Apress.


    ****Darl Kuhn** has been an Oracle DBA since 1992\. For the past 14 years, he
    has been a volunteer DBA for the Rocky Mountain Oracle Users Group. Darl also
    teaches Oracle classes at Regis University in the department of computer information
    technology.


    **Michele LaRock** MS RD LDN is a Registered Dietitian with a Masters degree from
    Bastyr University in Seattle. When not providing her brother with nutritional
    advice about Turbaconduckens, she counsels others in Holistic Nutrition, including
    her husband and two children.


    **Brent Ozar** is a Microsoft MVP and a SQL Server Expert for Quest Software.
    He has over a decade of broad IT experience, performing SQL Server database administration,
    systems administration, SAN administration, virtualization administration, and
    project management. He has spoken around the globe at events for PASS, SQLBits,
    SSWUG, and other organizations. Brent founded the Virtualization Virtual Chapter
    for the Professional Association for SQL Server (PASS), and serves as the Editor-in-Chief
    at SQLServerPedia.com.


    **Michael Russo** is a former student athletic trainer at the University of New
    Hampshire and is a frequent jogging partner for Thomas LaRock. When not dragging
    Tom through the streets or to a track at lunchtime, he often reminds Tom about
    good nutritional choices and has slapped a donut from Tom’s hand on more than
    one occasion.


    **Ken Simmons** is a database administrator, developer, and Microsoft SQL Server
    MVP. He is the Author of Pro SQL Server 2008 Administration (Apress, 2009), Pro
    SQL Server 2008 Mirroring (Apress, 2009), and Pro SQL Server 2008 Policy-Based
    Management (Apress, 2010). He has been working in the IT industry since 2000 and
    currently holds certifications for MCP, MCAD, MCSD, MCDBA, and MCTS for SQL 2005.


    **Jared Still**, Certifiable Oracle DBA and Part Time Perl Evangelist, has been
    a DBA for quite a few years now, but tries to keep that dyed-in-the-wool status
    from hindering his progress by continuing to learn about databases and computer
    systems in general. And yes, he really is a Part Time Perl Evangelist.


