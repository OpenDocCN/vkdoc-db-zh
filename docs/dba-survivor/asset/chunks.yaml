- fmt: "Now that your dream has come true and you are the resident database administrator,\
    \ what do you do first? Like any other job in the world you need to get started\
    \ on…well…\n\nsomething, right? But what? Where do you focus your energies in\
    \ order to best demonstrate your value to your organization? Knowing where to\
    \ begin is crucial for your success, and this chapter is going to help you best\
    \ determine how to get started, plan for your first one hundred days, and even\
    \ decide who you should eat lunch with on a regular basis.\n\n**TIP:** You are\
    \ going to be constantly judged by your tangible results from this point forward.\n\
    \nIn this chapter, we will discuss the following:\n\n1. Putting together your\
    \ initial checklist\n2. What to do with the information you have gathered\n3.\
    \ Responding to unfamiliar alerts\n4. How to break the ice\n5. Mr. Right\n\n##\
    \ What You Have in Common with the President\n\nDo you really have anything in\
    \ common with the President? Yes. More than you probably realize. First, about\
    \ half of the people around you doubt whether you are qualified to actually hold\
    \ the job you have been given. Second, every time you make a decision or plot\
    \ a course of action, you will constantly be criticized, even by your supporters.\
    \ And third, you are going to be judged by what you accomplish in your first one\
    \ hundred days, good or bad, even if it is not in your control.\n\nEvery four\
    \ years we elect a new President, and the person in office is always subject to\
    \ approval ratings. You will have your own version of this fact of life; it is\
    \ called your annual performance review. Come review time, you want your approval\
    \ ratings to be as high as possible.\n\nSound awful? Perhaps, but it really is\
    \ not all that bad as long as you are aware of these things when you start. The\
    \ most important objective for you is your plan of action for when you first arrive.\
    \ If you think you can show up, grab a cup of coffee, and ease into your new position,\
    \ then you are mistaken. Your cup of coffee can wait until after you start gathering\
    \ the information you need in order to do your new job effectively.\n\nAnd what\
    \ information is that? How about some of the basics first, such as, what servers\
    \ are you responsible for? What applications are you expected to support? What\
    \ time of day are the applications used? Who are your customers? Are the databases\
    \ being backed up properly right now? How would you know if the backups were failing?\
    \ With so many items to check, it can become very overwhelming very fast. That\
    \ is why you need to put together a checklist of the bare essentials and get started.\
    \ Then, after you are able to get a handle on your environment, you can start\
    \ making some short-term plans for improvements. Before you know it, your first\
    \ one hundred days will be behind you and you will be able to look back and see\
    \ just how far you have come in a short amount of time.\n\nTrust me, it is easier\
    \ than it sounds, you just need to be organized.\n\n## Your Initial Checklist\n\
    \nBy now you should be sitting at your desk on what we will call day one. Your\
    \ initial meetings with HR are over, you have gotten a tour of the place, and\
    \ you are making certain you have the access you need to at least get started.\
    \ Things like `e-mail`, for example. Oh, and access to the database servers they\
    \ expect you to administer.\n\nThat is the very first piece of information you\
    \ need, right? *What servers and systems am I responsible for?* Without that little\
    \ nugget of knowledge, it is going to be very difficult to make any headway as\
    \ you start your long, slow journey upstream.\n\nYour initial checklist is divided\
    \ into sections. Why? Well, because I like to put things into lists and categorize\
    \ the lists if possible. It just helps me remember the bigger picture and not\
    \ worry about missing any particular detail. I would encourage you to try the\
    \ same thing and see if it helps, but everyone organizes themselves in different\
    \ ways, so don’t worry if you want to start your list differently.\n\nNow, the\
    \ checklist has three main sections. One section pertains to gathering information\
    \ on what I simply call *your stuff*. Another section deals with finding information\
    \ on *the customer’s stuff*. Still another section you need to consider is what\
    \ I call *your action plans*. Those three areas are where you will start to focus\
    \ your efforts on day one; find your stuff, find your customer’s stuff, and start\
    \ making an action plan. So, a sample of a checklist might look like this:\n\n\
    1. Create a list of servers.\n2. Check that database backups are running.\n3.\
    \ Spot check and verify that you can do a restore from one of those backups.\n\
    4. Build a list of customers.\n5. List the “most important” databases.\n6. List\
    \ upcoming deliverables/projects.\n7. Establish environmental baselines.\n   \
    \ - Server configuration check\n    - Database configuration check\n8. Compose\
    \ your recovery plan (not your backup plan, your recovery plan).\n\nNotice that\
    \ my checklist is missing a few things that a lot of people will tell you are\
    \ a must for DBAs to be doing daily. It doesn’t include things like routine `index\
    \ maintenance`, `performance tuning`, reviewing `event logs`, and so on. Sure,\
    \ all of those things are necessary, but we are still on your list of items for\
    \ day one. Everything I have mentioned so far is going to take you more than a\
    \ few days to gather. If you get tied up troubleshooting some `stored procedure`\
    \ on day one, then you are setting yourself up for a massive failure should a\
    \ disaster hit and you have not had time to document your recovery plan.\n\nWould\
    \ you rather be a hero for telling that developer to stop writing `cursors` or\
    \ a hero for informing a customer that you can have their database back up and\
    \ running in less than 30 minutes? I know which choice I would make so soon after\
    \ taking a new position.\n\n**TIP:** These tasks will all take longer than a day\
    \ to perform, but do not delay in getting the checklist started.\n\nOn your first\
    \ day, explain to your manager that you’ll be gathering this inventory data first.\
    \ By taking the initiative to perform due diligence first, you’re showing them\
    \ that your first mission is to safeguard their data, your job, and their job\
    \ too. They probably won’t be able to produce the inventory for you, and they’re\
    \ going to want it even more than you do. You will have plenty of time later on\
    \ for the other stuff, and it will fall naturally into your environment baseline\
    \ and subsequent action plans as you bring standards to your enterprise.\n\n###\
    \ AN OSHA MOMENT\n**by Brent Ozar**\n\nAt one company, when I laid out this plan\
    \ for my first two weeks, my boss said out loud: “Holy sh*t! We don’t have this\
    \ information for the rest of our servers either.” He then pulled his sys admins\
    \ in, told them to drop what they were doing, and to do the same thing I was doing—but\
    \ for the file servers, Exchange servers, etc.\n\nLet’s look at why each of the\
    \ items in the checklist is important, and important to address from day one.\
    \ If today is your first day, you want to begin these tasks right now.\n\n###\
    \ Create a List of Servers"
