  trans: '# 第四章：对开发者而言，开发服务器就是生产服务器


    当需要采取行动时，要积极响应并为自己的行动负责。这样做将使他人有机会看到你的实际行动，熟悉你的技能，并更好地理解你所负责的任务类型。这反过来会随着时间的推移，帮助你管理他们的预期。


    响应性始终取决于旁观者的看法。你可能觉得你已经做了所有人力可及的事情来保持响应。你是否已经忘记了没人在乎努力过程？他们只关心结果，而如果结果恰好是他们希望你随时待命，那么这将通过你的响应性来衡量。


    然而，与此同时，你不可能满足所有人的所有要求。虽然你的最终用户很可能期望你每周 168 小时都在线，但现实是你要吃饭、睡觉，或许偶尔还要洗澡。这意味着你不可能随时响应所有事情。而且，设备总会有出故障的时候，比如可怜的黑莓手机信号，或者你的笔记本电脑决定不再配合。


    你需要在这两者之间找到一个微妙的平衡。一方面是对您服务不断增长的需求。另一方面是你在办公室之外拥有个人生活的需要，这可能包括睡眠。


    虽然听起来可能有点好笑，但保持响应是帮助管理预期的一种方式。你与人们互动得越多，他们就越理解你的工作，也就越清楚能从你这里期待什么。


    在管理预期方面，负责也非常重要。你必须对自己执行的操作感到安心。如果你犯了错误，你必须承认它。不承认错误可能（而且通常会）导致进一步的复杂情况。通过承担责任，你将向他人证明你实际上是一个负责任的人。这将有助于让他们感觉到你在执行负责任的行为，换句话说，他们将开始建立一种信任感。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 77](img/index-93_1.png)


    一旦你开始建立信任，那么管理预期就会变得更容易，而不是几乎没有信任。没有任何信任时，人们要么期望你无所作为（这非常糟糕），要么期望你尝试做事但总是出错（这更糟糕）。你可以通过负责任来建立信任。你可以为你的行动、你的系统以及你在项目中的职责负责。每天你都有很多方式可以展现责任感。当你看到这些机会时，就采取行动，开始建立信任，并帮助管理他人对您这位
    DBA 的预期。


    ## 时间管理


    你可以出去买很多关于时间管理技巧和窍门的书。很可能如果你读得够多，尝试得够多，最终你会找到适合你的方法。但是，有多少时间管理书籍是由 DBA 撰写的？或者至少是由
    IT 领域的人士撰写的？虽然他们的一些技巧可能有效，但大多数可能并不适合你作为 DBA 的工作。


    在我的职业生涯中，我尝试过`很多`时间管理技巧。如果说我学到了一点，那就是无论你今天使用什么技巧，明天可能就不管用了，所以你需要学习新的。我曾经有一个我认为很棒的习惯，就是把正在处理的工作保持打开状态，这样第二天回来工作时，我可以直接从上次中断的地方继续。这个方法对我很有效，直到我们公司强制要求每晚重启台式机。我花了几个月时间才找到一个新的习惯，让我能保持同样的效率。


    我学到的另一件事是，最基础的技巧是那些陪伴你最久、通常也是最有效的。这些包括制定日常工作流程、寻找减压方法、编制待办事项清单以及分块工作。随着时间的推移，你可能会发现一种技巧在一段时间内很有效，然后你开始尝试不同的方法，接着你又发现自己回到了最初的技巧。这没关系——只要你是在采取行动，随着环境变化让技巧来来去去是完全可以的。


    ### 制定日常工作流程


    当人们遵循一个日常流程时，通常会感到更舒适。最近，当我和妻子有了两个孩子后，我才深刻理解到这一点。早期就明显看出，当他们的每一天有一些结构时，他们会运作得更好。我们还了解到，某些情况需要遵循一套步骤，而孩子们在遵循每一步时通常会表现得很好。


    你的工作日也是如此。找到一个适合你全天工作的日常流程。这有助于你很好地管理时间；你能保持条理，一次专注于特定任务，并且你会感受到成就感，而不是被压垮。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 78](img/index-94_1.png)


    **提示：** 人是习惯的产物；我们在常规中茁壮成长。只要记住在你的流程中保持足够的灵活性，以应对接踵而至的意外（因为意外总会发生）。


    拥有稳定的日常流程并能保持节奏，对于有效的时间管理至关重要。当你到达办公室时，你立即知道在开始一天工作前要检查的一两件事。随着时间推移，你可以继续遵循你的流程，感觉像是在任务上取得了进展。每天都会一帆风顺吗？当然不是，但拥有一个流程能给你更好的机会来管理时间。


    你的日常流程的一部分应该包括检查你已自动化的任何任务。说到自动化，如果你有机会自动化某件事，那就一定要这样做。没有什么比减少你手动操作大量按钮的需求更能快速释放你的时间了。如果你能在流程中安排一些时间用于审查自动化任务的输出，那么你就已经踏上了成功管理时间的道路。


    ### 缓解压力


    缓解压力对于时间管理很重要，因为它让你能持续以更高的效率运作。当压力来袭时，它会以多种方式影响你，其中之一是注意力不集中，随之而来的是生产力下降。更不用说，如果有人空手而来，你可能会大发雷霆。


    当你开始感到不堪重负，压力正在拖垮你时，是时候起身离开你的小隔间了。


    午餐时间散个步。你会惊讶地发现，在外面街区走 10 分钟能给你的这一天带来多大的不同。找个长椅坐几分钟，看着路人经过。几年前我开始慢跑，发现它是白天很好的一个调剂，尤其是当我有一个喜欢与之交谈的慢跑伙伴时。


    无论我们选择做什么来缓解压力，我们都有一点是共同的：*我们选择那些能在某种程度上为我们补充能量的活动*。这是有效缓解压力的关键。找到能给你能量的事情，无论心情如何你都喜欢做的事情。当然，如果你碰巧发现你的工作就是给你能量的事情，那么你是幸运者之一。'
- fmt: '# 第四章：开发服务器对开发者而言就是生产服务器


    另一个缓解压力的关键在于识别那些你感到压力并知道需要起身做些能让你精力充沛的事情的时刻。这对每个人来说并不相同；你需要找到适合自己的方法，并在压力症状出现时能够识别它们。


    现在，我经常被问到关于缓解压力和时间管理的这个问题：“但是，从工作中抽出时间难道不是在浪费宝贵的工作时间，并且让在规定时间内完成任务变得更困难吗？” 绝对不是。缓解压力能让你保持高效；当你高效时，你也同时具备效率；当你有效率时，你就在明智地最大化利用你的时间。道理就是这么简单。你是愿意花一个小时拖拖拉拉地完成一些任务，还是愿意花30分钟呼吸新鲜空气，然后用清晰的头脑再花30分钟完成任务？


    当我担任篮球教练时，我总是强调，如果我们在心理、身体和情感上都做好了准备，那么我们在任何一个晚上都将难以被击败。你在工作时也是如此。如果你感到压力袭来，并以某种方式消耗着你，那就找些能让你重新振作起来的事情，你会惊讶于自己能变得多么高效。


    ## 待办清单


    我在研究生院时开始使用待办清单。出于某种原因，我开始写下一天中我需要处理的所有事情。大事如考试，小事如“去吃午饭”。因此，我的清单平均大约有十几项或更多，并且通常是按照我期望在一天中完成的顺序写下的。每完成一项，我就会把它从清单上划掉。任何未完成的事项都会被移到明天的清单上。


    我这样做了三年，离开研究生院后就停止了。从那以后，我断断续续地使用它。在我人生的某些阶段，我感到需要清单来帮助我保持条理。这反过来又降低了我的压力水平，而我们已知道这对时间管理很重要。而且，当你划掉清单上的一项时，感觉总是很棒。


    在我只有四五件事情要处理的时期，我发现不用待办清单、仅靠例行安排来管理时间会更容易。每当我开始感觉自己承担了超出管理能力的事情时，我就会拿出一些纸，开始把事情写下来。一旦你把所有事情都写在一张纸上，它真的能帮你让所有工作看起来更易于管理。看似压倒性的工作量，可以开始变得像是你能够轻松应对的事情。


    这个技巧并不适合所有人。我妻子尝试过清单，但效果不如她希望的那样好。但这里重要的是她尝试过了，对吧？我鼓励你也去尝试，你可能会惊讶于它能带来的帮助。


    ## 任务分块


    有时你会发现自己“有心情”一次性完成很多事情。也许你有一个任务清单，但你决定在一两个任务上多做一点，而不是继续推进。有些人可能会开始觉得他们会落后于清单上的事项。然而，另一些人则会因为知道在某项任务上取得了更多进展而感觉良好。如果你清单上有一个你知道是持续性的任务，这种方法尤其有用。


    虽然你可以专注于一项任务的特定分块，但你也可以在一天中处理多项任务的小块内容。对某些人来说，整天处理各种各样的任务能让他们保持投入和精力充沛。有很多天，我喜欢同时处理很多事项，在每件上都完成一点点。当然，也有其他一些天，我喜欢非常专注于某一个特定的事项。


    我有效地管理我的时间，使用了刚才描述的每一种技巧。嗯，除了这些，还有一种我们尚未讨论的技巧。


    ## 学会拒绝


    你去过自助餐厅吃饭吗？如果去过，你是否曾发现自己品尝了很多不同的食物，每次只拿一点点——但当你回到餐桌时，盘子里已经有了大约5磅的食物？你知道这太多了，但你觉得必须吃掉你拿的所有东西——否则就是浪费。嗯，当涉及到你的工作时，也会发生同样的事情。你最终会一件接一件地堆积小任务，不知不觉中，你就一次性地承担了远超出你舒适处理能力的事情。


    我知道我经常承担了太多的副项目。我相信大多数人在专注于两件或更少的事情时，可以发挥出最高的效率。当然，我每天要处理的事项远不止两件，但当我盯着电脑屏幕说“我从哪里开始？”时，这会让人不堪重负。这时候，我就会拿出待办清单，让所有事情变得可管理；我可以为手头的任务排定优先级，将它们分解成我想要的任何大小的分块，建立例行安排，并在需要提神时去慢跑一下。


    ## 代码评审与克里斯·汉森


    好的代码评审是一项必要的“邪恶”。它们应该在固定的时间间隔进行，也许是在项目的里程碑或关卡处。代码评审是你向同行解释你思维过程的时间，同时也是就你的代码和设计获得反馈的时间。最终的结果是更好的代码，这带来更稳定的系统，从而减少生产支持问题。那么，为什么大多数公司都不愿进行代码评审呢？


    因为每个人都害怕代码评审。


    大多数人都不擅长展示。更糟的是，他们知道自己不擅长，这让他们表现得更差。有些人可能本来可以做得好，但在一群同行面前讲话时会紧张。而那些代码被评审的人，感觉就像是被《to
    Catch a Predator》节目中的克里斯·汉森审问一样。所有这些加起来，就成了你能想象到的最令人畏惧的员工集会。


    所以我们知道代码评审很重要，对吧？而且我们知道每个人都害怕它们，结果就是现在没人再做代码评审了，对吧？现在，我希望你想象一下，是克里斯·汉森在主持代码评审，而你就是当前正在做展示的开发者。你刚解释完你在做什么，克里斯开始问你一些问题，比如：


    *CH*: 你知道`DTS`有多旧了吗？你是怎么想的？而且你不打算批量处理你的事务吗？你知道这会对你的日志文件造成什么影响吗？


    *你*: 我发誓，伙计，那只是说说而已，仅此而已。我没打算做任何事。我来这里是为了告诉我的`DBA`我们需要分道扬镳了。


    *CH*: 只是说说？这话说得可不少。我这里有完整的记录。你在这里说，“`I want to cursor through all your rows`”。伙计，这简直*大错特错*。


    *你*: 我知道，我知道。我正在寻求帮助。前几天我买了一本关于`SQL Server 2008`的书。而且我愿意尽我所能来帮助你们。告诉我你们希望我做什么。


    *CH*: 帮助我们？


    *你*: 是的，无论需要做什么。


    *CH*: 门在那儿。去告诉你的朋友们，我们在看着。下次他们给我们一份比`NASA`发射流程还复杂的部署说明时，我们会去找他们的。'
  raw: 'Another key to relieving stress is identifying those times when you are stressed
    and you know to get up and do something that energizes you. This is not going
    to be the same for each person; you will need to find the things that work for
    you as well as recognize the symptoms of stress when they occur.


    Now, I am often asked this question regarding stress relief and time management:
    “But isn’t taking time away from work in fact wasting valuable work time and making
    it harder to get things done in the time allowed?” Absolutely not. Relieving stress
    will keep you productive; when you are productive, you are also efficient; when
    you are efficient, you


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 79](index-95_1.png)


    **CHAPTER 4: A Development Server Is a Production Server to a Developer** **77**


    are maximizing your time wisely. It really is that simple. Would you rather spend
    an hour dragging your heels to get through some tasks or spend 30 minutes getting
    some fresh air and then another 30 getting the tasks done with a clear mind?


    When I was coaching basketball, I would always stress that if we prepared ourselves
    mentally, physically, and emotionally, then we were going to be tough to beat
    on any given night. Same thing for when you are at work. If you feel stress coming
    on and it is draining you in some way, find something to energize you, and you
    will be amazed at how much more productive you can become.


    **To-Do Lists**


    I started using to-do lists while in graduate school. For whatever reason, I started
    writing down all the things I would need to work on during the day. Big things
    like exams and small things like “go eat lunch.” My lists would therefore be on
    average about a dozen items or more and typically written in the order I expected
    to complete them as the day went on. As I completed something, I would cross it
    off the list. Anything not completed would get moved to the list for tomorrow.


    I did this for three years, and then stopped after leaving graduate school. I
    have used it on and off ever since. There are periods of my life when I feel the
    need to have the list in order to help me stay organized. In turn this reduces
    my stress levels, which we already know is important for time management. And
    it always makes you feel good when you get to cross something off your list.


    During periods when I only have four or five things on my plate, I find it easier
    to go without a to-do list and simply use a routine to manage my time. Whenever
    I start to feel like I have taken on more than I can manage, I break out some
    paper and start writing things down. Once you have everything written down on
    a piece of paper, it really can help make all your work seem more manageable.
    What can seem like an overwhelming volume of work can start to seem like something
    you can handle with ease.


    This technique does not work for everyone. My wife has tried lists and it has
    not been as effective as she had hoped. But the important thing here is that she
    tried, right? I would encourage you to do the same, as you may be surprised at
    how much it can help.


    **Chunks**


    Sometimes you find yourself “in the mood” to get a lot of stuff done at once.
    Perhaps you have a list of tasks to follow but you decide to get a little extra
    done for one or two of your tasks instead of moving on. Some people may start
    to feel that they are going to be falling behind on their list of items. Others,
    however, will feel great knowing that they are making more headway on one of their
    tasks. This is especially helpful if you have a task on your list that you know
    is ongoing.


    While you can work on a specific chunk of a task, you can also work on little
    chunks of many tasks throughout your day. For some people, it will keep them engaged
    and energized to be working on a variety of tasks throughout the day. There are
    lots of days


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 80](index-96_1.png)


    **78**


    **CHAPTER 4: A Development Server Is a Production Server to a Developer** where
    I like to juggle a lot of items and get a little bit done on each. Then again,
    there are other days when I like to be very focused on one specific item.


    I manage my time effectively using each of the techniques just described. Well,
    all of them and one more that we have not discussed yet.


    **Know When to Say No**


    Have you ever eaten at a buffet? If so, have you ever found yourself sampling
    a lot of different foods, only grabbing a little bit at a time—but by the time
    you get back to your table you have about 5 pounds of food on your plate? You
    know it is too much, but you feel compelled to eat everything that you took—otherwise,
    it would be wasteful. Well, the same thing happens when it comes to your work.
    You end up piling on one little thing after another, and before you know it, you
    have a lot more than you can handle comfortably in one sitting.


    I know that I have taken on too many side projects far too often. I believe that
    most people can operate at peak efficiency when focusing on two things and no
    more. Of course, I juggle a lot more than two items each day, but it can be overwhelming
    when I stare at my computer screen and say, “Where do I begin?” That is when I
    break out the to-do list in order to make everything manageable; I can prioritize
    the tasks on my plate, break them into whatever size chunks I desire, build a
    routine, and go for a jog when I need to energize myself.


    **Chris Hansen and Code Reviews**


    Good code reviews are a necessary evil. They should be performed at regular intervals,
    perhaps at a project milestone or tollgate. Code reviews are a time for you to
    explain to your peers your thought process, as well as receive feedback on your
    code and design. The end result is better code, which results in a stabler system,
    which results in fewer production support issues. So why are most companies not
    bothering to do code reviews?


    Because everyone dreads code reviews.


    Most people are not good at presenting. To make things worse, they know they are
    not good and that makes them even worse. Some people could be good, but get nervous
    when talking in front of a group of their peers. And those that are having their
    code reviewed feel as if they are being interrogated by Chris Hansen from “To
    Catch a Predator.” It all adds up to some of the most dreadful assemblies of employees
    you could ever hope to imagine.


    So we know code reviews are important, right? And we know that everyone dreads
    them, and as a result no one does them anymore, right? Now, I want you to imagine
    that Chris Hansen is leading the code review and you are the developer currently
    making your presentation. You get done explaining what you are doing, and Chris
    starts asking you some questions, such as


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 81](index-97_1.png)


    **CHAPTER 4: A Development Server Is a Production Server to a Developer** **79**


    *CH*: Do you know how old DTS is? What were you thinking? And you were not going
    to batch your transactions? Do you know what that will do to your log file?


    *You:* I swear man, it was just talk, that’s all it was. I wasn’t going to do
    anything. I came here to tell my DBA that we needed to go our separate ways.


    *CH*: Just talk? It’s a lot of talk. I’ve got the transcript right here. You say
    here, “I want to cursor through all your rows.” Man, that’s just *wrong*.


    *You*: I know, I know. I’m getting help. The other day I bought a book on SQL
    Server 2008\. And I am willing to do whatever I can to help you guys. Just tell
    me what you want me to do.


    *CH*: Help us?


    *You*: Yeah, with whatever.


    *CH*: There’s the door. Go tell your friends we’re watching. And the next time
    they hand us deployment instructions that are more complicated than a NASA launch
    sequence, we’re coming after them.'
