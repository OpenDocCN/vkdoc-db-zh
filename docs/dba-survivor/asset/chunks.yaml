- fmt: '# CHAPTER 3: Some Basics


    Any time there is even one hint that something is amiss with a system, the first
    thing people will do is blame the database server. Despite the fact that there
    are many layers between their screen and the database server, your phone will
    be the first to ring. You will be expected to investigate the issue immediately,
    and you will also be surprised to see e-mails with sentences that read, “I called
    the DBA and they are going to fix the problem.” Wait a minute! We never said there
    was a problem with the database server—why are you telling people we are going
    to fix anything? The problem could be the network, or a poor design that didn’t
    scale, or *anything*. And yet people will fixate on the database server because
    (1) it is known and (2) most people do not understand how it works. And in some
    cases, if they get an error message such as, “Could not connect to the database”
    (or the word “database” is simply in the error message somewhere), people automatically
    assume that the problem *must* be with the database.


    I have lost count of the number of times I have been told there is something wrong
    with the server only to find that the issue is that the person or account did
    not have rights to log in. Sorry, but that is not a problem with the server. And
    it is also not a problem with the server if you try to load 100GB of data onto
    a disk that only has 10GB of space free.


    Same for filling up a 33GB tempdb drive; the issue is not with the server, it
    is with inefficient code. And yet your server (and ultimately yourself) will be
    forced to carry the burden of fault.


    That’s OK, because one of the reasons you are a DBA is because you are able to
    carry such a burden as would crush most of your peers.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 63](index-79_1.png)


    ## Blame vs. Credit


    In the preceding section, we discussed how people tend to blame things they do
    not understand. Another fact that you need to get used to is that people rarely
    go out of their way to give you credit for the things you do or suggest should
    be done. I have never once come to work to be told, “Nice job last night, our
    batch load ran two seconds faster than expected.” But if it runs two seconds longer,
    then you may be asked to start on a Star Trek–type Level 5 diagnostic, whatever
    that means.


    You are going to find out quickly that the only time you get noticed is when things
    go wrong. Some DBAs start to think that the only way they can show value is if
    they are always around to fix the things that go wrong. Personally I would rather
    build out an environment that hums along nicely without anything ever going wrong
    to begin with, even if that means I will never be noticed.


    If you do find yourself in the situation where you are not being noticed, then
    what you need to do is start building out some metrics. Start with something simple,
    like your database backups. Track how many backups were taken in the past week
    and how many backups failed. At some point, perhaps a month or two, you can use
    the data to report to your manager. If you have reduced the number of backup failures
    over time, then this report is going to help you demonstrate your value to the
    company in a way that did not require something to go wrong before you got noticed.


    **TIP:** Metrics and reporting are ways for you to demonstrate your value; use
    them wisely.


    Metrics are a wonderful way for you to build up a stable environment, report on
    the good work you are doing, and show value besides during a disaster. Besides
    tracking backups and backup failures, here are a few other good items to track
    over time:


    - Number of databases (broken down to production, nonproduction, etc.)

    - Amount of space used on disk by database files

    - Amount of space used by database backups

    - Amount of time taken to back up databases

    - Number of database restores

    - Number of new databases created


    All of this information is readily available in the system databases, and will
    go a long way to help you make certain that people are aware of your work behind
    the scenes.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 64](index-80_1.png)


    ## The Need to Be Right vs. Being Liked


    Nobody will like it if you are right all the time. And everyone is going to want
    you to be right all the time. Good luck reconciling those two items.


    People are going to come to you because they want to know the right way to get
    things done. It is times like that when you want to do your best to help them
    find the right solution. While failure to be right all of the time in such discussions
    is not going to have people calling for your head anytime soon, if you have the
    need to be right all the time, then you will find yourself having issues with
    coworkers.


    If there is a problem (and there is *always* a problem), and your database server
    gets blamed (which will happen 70 percent of the time), and you tell people that
    it is not the database server (which will the case 90 percent of the time), and
    it turns out to indeed not be the database server, you do yourself no good by
    reminding people you were right all along.


    Trust me on this one. Do not feel the need to remind people that they should have
    listened to you in the first place. Over time either people will gravitate toward
    you for your advice and experience, or they will stay away from you because they
    hate the feeling they get every time they run around the office yelling that the
    sky is falling, and you tell them to sit down and stop yelling.


    Keep in mind that your approval ratings are important when it comes time for a
    salary review. You may be right all the time, but get ignored due to your attitude,
    and you will not be in line for any merit increase as a result. However, you could
    be well liked, almost always wrong, and find yourself moving up on the salary
    pay scale.


    You are going to run into people you work with that either (1) want to be right
    themselves or (2) want you to be wrong for a change. It will happen, just as the
    sun will rise in the east. Do not panic when this happens; remain calm when you
    sense that someone else is getting worked up. The last thing you want to do is
    have the problem escalate. If necessary, offer to have your discussion with a
    neutral third party, perhaps a colleague or a manager that both of you respect.
    Present your case and choose your battles wisely. Sometimes there is a decided
    advantage in giving ground to someone, even when they are wrong.


    When you give ground, it will help to demonstrate that you can be reasoned with
    to some degree. It may win you a few points with your colleagues as well. In fact,
    if you give enough ground, you will find that you may be very well liked around
    the office.


    While that may make you feel good about yourself, you need to balance your desire
    to be liked with your need to enforce standards and follow guidelines. It can
    be a difficult line to follow, but over time you will learn which battles are
    worth fighting.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 65](index-81_1.png)


    # 4 A Development Server Is a Production Server to a Developer


    You are going along well, and everyone is getting along swimmingly, but have you
    noticed that the better you get at your job, the more you are asked to do? And
    have you also noticed that often developers will reach out to you only in case
    of an emergency on their part, and that everything is always an emergency, no
    matter what the server?


    Expect to always be in demand, especially as you get better at your job. Good
    DBAs are worth their weight in gold, and soon you will be no exception.'
