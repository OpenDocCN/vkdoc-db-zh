- fmt: '# CHAPTER 4: A Development Server Is a Production Server to a Developer


    When the time comes to act, be responsive and responsible for your actions. Doing
    so will give others the opportunity to see you in action, to become comfortable
    with your skills, and to better understand that types of tasks that you are responsible
    for. This will in turn help you to manage their expectations over time.


    Responsiveness is always going to be in the eye of the beholder. You may feel
    that you have done everything humanely possible to be responsive. Did you forget
    already that no one cares about effort? All they care about is a result, and if
    the result happens to be that they want you available, then that is going to be
    measured in terms of your responsiveness.


    At the same time, however, you cannot be everything to everyone. While chances
    are your end users will expect you to be available 168 hours a week, the reality
    is that you eat, sleep, and probably also shower from time to time. This means
    you cannot possibly be able to respond to everything at all hours. And there are
    going to be times when equipment will fail, such as poor Blackberry reception,
    or your laptop deciding to not play nice anymore.


    You will need to strike a careful balance between the two forces at play here.
    One the one hand will be the ever-increasing demand for your services. On the
    other will be your need to have a life outside of the office, which may possibly
    include sleep.


    As funny as it may sound, being responsive is a way to help manage expectations.
    The more you interact with people, the more they understand what it is you do,
    and the more they have an idea about what they can expect from you.


    Being responsible is also very important when it comes to managing expectations.
    You simply must be comfortable with the actions you are performing. If you make
    a mistake, you must admit to such. Failure to admit to a mistake can (and most
    often will) lead to further complications. By taking responsibility you will be
    demonstrating to others that you are in fact a responsible person. This will help
    to give them a sense that you are performing responsible actions, which is another
    way of saying that they will begin to develop a sense of trust.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 77](index-93_1.png)


    Once you start building trust, then it is easier to manage expectations as opposed
    to having little to no trust. Without any trust, people will either expect you
    to do nothing (which is very bad) or expect you to try to do things but get them
    wrong (which is even worse). You can build trust by being responsible. You can
    be responsible for your actions, for your systems, and for your part in a project.
    There are many ways that you can demonstrate responsibility daily. When you see
    them, act upon them, start building some trust and help to manage the expectations
    of you as a DBA.


    ## Time Management


    You can go out and buy lots of books on time management tips and tricks. And chances
    are if you read enough and try enough of them, then eventually you will find something
    that sticks for you. But how many of those time management books were written
    by DBAs? Or even people that are part of IT fields in some way? While some of
    their tips and tricks may work, most of them may not be practical for your work
    as a DBA.


    I have tried `a lot` of time management tricks over the course of my career. If
    there is one thing I have learned, it is that whatever tricks you are using today
    may not be effective tomorrow, and so you need to learn new ones. I once had what
    I thought was a wonderful habit of simply leaving whatever I was working on open
    so that when I came back to work the next day I could pick right up where I left
    off. That worked well for me until our company mandated that we reboot our desktops
    every night. It took me months to find a new habit that allowed for me to be as
    productive.


    The other thing I have learned is that the most basic of techniques are the ones
    that stick with you the longest and are typically the most effective. These would
    be things like developing a routine, finding some stress relief, composing a to-do
    list, and working in chunks. Over time you will probably find that one technique
    works well for a while, then you start doing something different, and then you
    find yourself back with your original technique. That’s fine—as long as you are
    doing something, it is perfectly fine to let the techniques come and go as your
    environment changes.


    ### Develop a Routine


    People are generally more comfortable when they have a routine to follow. I learned
    this cold reality most recently when my wife and I had our two children. Early
    on it was clear that they would function better when they had some structure to
    their day. We also learned that certain situations required a set of steps to
    be followed, and the children would often do very well following each step.


    The same thing is true for your workday. Find a routine that works well for you
    throughout the course of the day. This helps you manage your time very well; you
    stay organized, you can focus on specific tasks at a time, and you’ll feel a sense
    of accomplishment as opposed to being overwhelmed.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 78](index-94_1.png)


    **TIP:** Humans are creatures of habit; we thrive on routines. Just remember to
    be flexible enough in your routine to handle the unexpected that comes your way
    (because something unexpected will always come your way).


    Having a steady routine and being able to stay in rhythm are crucial to effective
    time management. When you arrive at the office, you immediately know the one or
    two things you will review before you start your day. As your day progresses,
    you can continue to follow your routine and feel as if you are making progress
    on a task. Is every day going to be unicorns and rainbows? Of course not, but
    having a routine gives you a better chance at managing your time.


    Part of your routine should include the review of any tasks you have automated.
    And speaking of automation, if you have the chance to automate something, then
    by all means do so. Nothing will free up your time faster than reducing your need
    to push a lot of buttons. If you can work into your routine some time spent on
    reviewing the output of automated tasks, then you will be well on your way to
    successful time management.


    ### Stress Relief


    Stress relief is important to time management, as it allows for you to continue
    operating at a higher level of efficiency. When stress hits, it will affect you
    in a variety of ways, one of which is your lack of focus and subsequent decrease
    in productivity. Not to mention the fact that you can bite someone’s head off
    if they approach you without bearing gifts.


    When you start to sense that you are feeling overwhelmed and that stress is wearing
    you down, it is time to get up out of your cube.


    Take a walk at lunch. You’ll be surprised how 10 minutes around the block outside
    can make a big difference in your day. Go sit on a bench somewhere and watch people
    pass by for a few minutes. I took up jogging a few years back and find it a nice
    distraction during the day, especially when I have a jogging partner that I enjoy
    having a conversation with.


    No matter what we choose to do to relieve stress, we all have one thing in common:
    *we select activities that energize us in some way*. That is the key to relieving
    stress effectively. Find something that energizes you, something you enjoy doing
    no matter what your mood. Of course, if you happen to find that your job is what
    energizes you, then you are one of the lucky ones.'
