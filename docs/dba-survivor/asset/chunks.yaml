- fmt: '# CHAPTER 8: Training, Get You Some of That


    As you go down the list of the benefits, you should be able to divide them into
    two categories: those that can easily be shown to align with business goals and
    those that align to your personal goals. Take the personal goals and see if they
    can also be shown to have a business benefit.


    For example, if you said that one of the benefits was your ability to network
    with other professionals, chances are your company will not care. But if you said,
    “I will be able to network with other professionals and that will allow for me
    to improve upon some necessary soft skills and will provide a benefit to the company
    in the future when I reach out to that network for help with technical issues,”
    then your company may care a great deal.


    Many of those personal goals you have listed can be shown to provide a business
    benefit; you just need to give it some thought.


    ## Determine the Cost Savings


    This can be difficult to calculate, as the benefits are not always going to be
    hard dollars.


    Most people typically focus on hard dollars and cost reductions that are easily
    calculated. It is fine to also look for training that will help with what is called
    “cost avoidance.” This is where you save money that has not been spent yet.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 152](index-162_1.png)


    An example of this would be virtualization. You may have some servers that are
    a few years old. You could either buy new hardware to replace the old servers,
    or you could look to virtualize the older hardware. The difference in costs between
    the physical and virtual environment would be considered cost avoidance.


    **TIP:** Understand the difference between a cost reduction and cost avoidance.
    You cannot claim to be saving your household millions of dollars a year by *not*
    buying diamonds, could you?


    Cost savings can also be brought about by streamlining a process if you are able
    to quantify the amount of time saved as a result of the training. Another place
    to find cost savings is if you are able to take on an expanded role as a result
    of the training; perhaps you could start conducting future training classes and
    reduce the need for your company to hire an outside trainer.


    ## Measure Your Results!


    This last part may be the most important. After you put everything else together,
    take some time to think about how you will measure your success. If you have declared
    that there is cost savings then write down how you plan to calculate that savings
    once the training is complete. Same thing for cost avoidance; make certain you
    track everything you can with regard to the actual costs and the estimate costs
    had no training been given. All too often I see this part of any business case
    left out, as if measurements are either a forgotten component of any plan or that
    people just do not understand their importance.


    Without measurements, you will not be able to validate the results of the training.
    If the results are less than expected, then you have the opportunity to learn
    from your experience and make corrections to future training plans. If the results
    are better than expected, then your measurements are going to be a valuable asset
    when you present your results to management.


    I started this chapter by saying everyone always needs training. When your next
    round of training finishes, you need to keep track of how much you used that training
    over the year and how it’s saved the business money. Doing so will make it easier
    for the business to send you to your next round of training and make you an even
    better employee.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 153](index-163_1.png)


    # CHAPTER 9: Connect. Learn. Share.


    After you have established your routine and have become comfortable with your
    DBA skills, you may find yourself drawn toward helping others. Do not panic; it
    is perfectly natural to find yourself willing to help others. It is also natural
    to be timid when it comes to other database professionals and their skills. Every
    time I sit in a room of other DBA’s I always assume everyone knows more than I
    do. Then I am surprised to find out that the people on the other side of the table
    are thinking the same thing about me.


    One thing I have learned in my role as a DBA is that more often than not you are
    going to be able to find someone willing to help. Most DBA’s I know are not afraid
    to say that they do not know something. This is in contrast to other professions
    where people tend to profess being an expert in something (TV talk-show hosts),
    or feel the need to pretend to be an expert, or don’t want anyone to question
    their level of expertise at all (doctors or lawyers).


    Because most DBA’s are willing to admit they do not know something, most other
    DBA’s are willing to help because they know that a time will come when they need
    some help as well.


    **TIP:** No one person can know everything.


    In this chapter, we will discuss the following:


    1. Communications and how to get started (writing and speaking)

    2. Professional associations

    3. Networking basics


    ## Communication


    Communication skills are important for anyone regardless of their vocation. In
    today’s wired world it is more important than ever to have strong communication
    skills. E-mail, blogs, phone calls, and face-to-face discussions are quite commonplace
    for most IT professionals. Individuals that have good communication skills have
    an advantage over those that lack those same communication skills.


