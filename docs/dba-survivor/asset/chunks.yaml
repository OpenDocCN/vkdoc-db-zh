- fmt: '# CHAPTER 8: Training, Get You Some of That


    ## Certifications


    Certification is not a resource in and of itself; the training you receive from
    the sources just listed are the actual resources you will use (along with work
    experience) to earn the certification. Think of a certification as the end and
    the preceding resources as the means. And do not believe that certifications alone
    are going to be the easy path to fame and fortune.


    **TIP:** Certifications by themselves demonstrate very little. Certifications
    combined with work experience tell a more complete story.


    **Pros:** Certification can greatly enhance your existing skills, and when combined
    with your experience, it can communicate your skill set to others.


    **Cons:** It can be cast in a negative light, especially if you are long on certifications
    but short on experience. There are a *lot* of “brain dump” factories out there
    that offer shortcut methods to obtaining certifications; over time this can erode
    confidence in the value of the certification.


    ## Building Your Case


    You should now recognize the need for training and have some possible training
    resources listed. It should be quite easy for you to convince you manager that
    it is logical to send you to some training classes, right?


    Wrong.


    Never confuse logic with `business intelligence`. Your manager has a manager,
    most likely, and that manager is going to want some justification for spending
    training dollars on you no matter how big or small the expense. It will most likely
    fall to you to present a solid business case in order for you to secure this funding.


    To go about building a solid business case for training, start by understanding
    what a business cares about most: `revenue`, `expenses`, and `profit`. As much
    as we all want to love our jobs and work in a happy, loving environment with unicorns
    and rainbows all around us, the fact is that money makes the world go round. If
    you want to secure the funding for training dollars, then you will need to demonstrate
    how the business will benefit by spending this money. If this sounds like I am
    saying, “It takes money to make money,” that’s because I am. But that’s OK, because
    most corporations live by that very ideal; it will be up to you to show them how.


    **TIP:** The higher up you need to talk to someone about money, the more important
    it is you can demonstrate a financial return for any investment you are asking
    them to make on your behalf.


    Here is a list of specific items to start gathering information about:

    1.  Determine your training needs.

    2.  Determine how many people need the training.

    3.  Determine which options will be used.

    4.  Calculate the associated costs/expenses.

    5.  Determine the benefits of training.

    6.  Determine the cost savings.

    7.  Measure your results!


    ## Determine Your Training Needs


    You will need to clearly identify your training needs, and they should align with
    a business goal or initiative in some way. For example, perhaps there is an effort
    to virtualize your database servers. You could list a training need for some aspect
    of virtualization. Or perhaps you want to learn about a particular tool and your
    company is also looking to build a data warehouse. If your training needs do not
    match any business needs, then you do not have training `needs`, you have training
    `wants`. And there is no reason for your company to simply give you what you want;
    there has to be a benefit for the company at some level.


    ## Determine How Many People Need the Training


    This will be important later on when you need to weigh your training options and
    calculate costs. There are times when you will find it easier to get training
    if you can also show that the training would benefit others as opposed to just
    yourself. Remember that you’re always in competition for training dollars—your
    coworkers want that training money, too. You may have to justify your training
    budget by offering to train other employees upon your return. Besides, if only
    you go the training, then you might be the only person with the knowledge, and
    as a result you may find yourself in even more demand, which could easily erode
    your work/life balance (if it exists).


    ## Determine Which Options Will Be Used


    Review all the available training options listed previously and see which ones
    are viable.


    Which ones will suit your needs and accommodate everyone that needs to be trained?


    You may be able to mix and match a few options. Perhaps one person could attend
    a class, another could attend a conference, and someone else could find a side
    project to do some self-training on. Then the three of you can get together to
    connect, learn, and share from one another.


    In our shop we tend to have each team member focus on one particular aspect of
    database administration. The other team members know who is focused on what, and
    leverage that knowledge when necessary. Over time we all become a little more
    knowledgeable in many different areas. This reduces the need to send us all to
    many different training sessions throughout the year.


    ## Calculate the Associated Costs/Expenses


    Start adding up everything you can think of with regard to costs. The easy costs
    to identify are the biggest ones, such as the cost of a class, a conference, or
    hiring a trainer to come onsite. Travel and lodging are also easy costs to identify
    when it comes to training expenses. Some of the hidden costs that are harder to
    identify are things like mileage on your car if you have to drive to a training
    center, or the purchase of prerequisite training materials such as books. And
    then there is your time away from the office, which you can express in the number
    of hours lost from work. If there are many people in the training class, you may
    find it easier to express this number in terms of a full-time equivalent (`FTE`).


    **TIP:** No expense is too small; write down everything you can possibly think
    of as an expense.


    Try your best to think of every possible expense. You may not be able to cover
    everything, but you need your estimate to be as close to the final bill as possible.


    ## Determine the Benefits of Training


    Start by writing down every possible benefit you can think would be a result of
    the training. Do not limit yourself only to business-specific results as you may
    have done when listing out your training needs. Some of the benefits could be
    things like a reduction in turnover, fewer errors being made when using a system,
    or simply your ability to network with other professionals.'
