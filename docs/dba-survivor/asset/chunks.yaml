- fmt: '# CHAPTER 3: Some Basics


    ## Clusters


    One of the more expensive options with physical servers is the notion of `clusters`.
    In order to build a cluster, you first build your primary server (or `node`),
    which has a defined set of shared disks (called a `resource group`). Sharing disks
    between multiple nodes does not require a `SAN`, but having a `SAN` can make your
    life a little easier. You then add nodes to the cluster, with each node being
    defined to that same resource group.


    The entire cluster appears on your network as a single server instance, but it
    is really made up of multiple server instances. You will hear talk of primary
    nodes, secondary nodes, or failover nodes; all that talk amounts to fancy words
    for a server instance.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 49](index-65_1.png)


    Figure 3–8 provides an example of a four-node cluster. The arrangement may at
    first glance appear similar to that in Figure 3–7. The difference is that all
    four nodes in the cluster share access to the same set of database disks. Furthermore,
    the outside world sees the cluster as a single database instance.


    **Figure 3–8.** *A four-node cluster built around shared disks*


    The reason clusters can be so expensive is because they typically require a lot
    of additional hardware like a `SAN`, and each node in the cluster needs to have
    very similar hardware. However, with virtualization you can look to use clusters
    with virtual servers and reduce your costs. You can even find some third-party
    software applications that help you to failover your virtual instances during
    times of peak usage, which will (in theory) help to increase your availability
    (often called `uptime`).


    If this all sounds too good to be true, that’s because it is too good to be true.
    There simply must be a downside to clustering, even on virtual servers, right?
    Absolutely.


    Many times I have had the opportunity to load software onto a cluster. And despite
    the vendor assuring me that I only need to load their software onto the primary
    node, I will often find their software not working should the cluster fail over
    to a different node.


    Historically you will find horror stories relating to the application of `SQL`
    hotfixes and service packs to the primary node, and their failure to work on the
    other nodes. And while each version of `SQL` and server `OS` helps to reduce those
    headaches, you should be aware that they can still happen.


    The other downside to the use of clusters is the increase in the number of servers
    that your shop needs to administer. While having three nodes sounds like a great
    way to achieve `HA`, it may not sound so great to the people that need to administer
    those instances and apply things like service packs. Believe me, administrators
    enjoy having a weekend off every now and then, same as everyone else.


    Need more downsides to clusters? How about the amount of time it takes for the
    failover to happen? Depending on your configuration it can take less than a minute
    to several minutes. And what about those transactions and connections in flight
    during the failover? Will they see an interruption in service? Probably, so your
    application had better be able to handle such an event; otherwise, your phone
    will ring off the hook the minute people perceive there is an issue.


    Need more downside? Well, how about that clusters do not protect you from a disk
    failure? If you are going about setting up clusters and think that they are a
    good `DR` strategy, then you are looking Mr. Murphy right in the face and laughing
    at his laws.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 50](index-66_1.png)


    ## Log Shipping


    `Log shipping` is a traditional method of `HA`, allowing for you to maintain your
    data in two (or more) places at the same time. The idea is quite simple:


    1.  Do a backup of your `transaction log` on your production server.

    2.  Copy that backup file to another server.

    3.  Restore that backup file to another server.


    And there you go—you now have a database (see Figure 3–9) that should look just
    like the database that went offline for whatever reason. Well, close enough to
    the database that went offline. I mean, how often are you doing those `transaction
    log` backups? Every minute? Five minutes? Ten? Fifteen?


    **Figure 3–9.** *A log-shipping scenario*


    Just how long would you be able to go without data? Would it be acceptable to
    tell your end users that they would be without their data for the past ten or
    fifteen minutes? And if you did `transaction log` backups every minute, are you
    certain they would complete in that minute? Depending on the usage and activity,
    you could find your `transaction logs` taking longer than one minute to complete
    their backup, meaning it would take some time to do the file copy, and then longer
    than a minute to do the restore. What does that mean for the jobs that keep trying
    to do the backups and restores every minute?


    They fall behind, that’s what it means. And if they fall too far behind, you will
    find yourself having to reinitialize everything from scratch. And depending upon
    the size of the files and databases involved, that could make for a long afternoon
    and evening.


    But for a lot of people, `log shipping` is the way to go. `Log shipping` doesn’t
    require a `SAN` or identical hardware on each server involved. A lot of vendors
    will recommend `log shipping` as a way to achieve `HA` with a fairly low amount
    of overhead. You do not necessarily save on costs when compared to clusters, but
    you do save on overall administration costs, because things like service packs
    and hotfixes are easier to implement, as well as installation of vendor software.


    Be mindful that `log shipping` requires manual intervention. Unlike clustering,
    which can provide you with an automated failover, `log shipping` requires a human
    to get involved and to manually get the backup server up and running as a production
    server.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 51](index-67_1.png)


    ## Replication


    You will often be involved in conversations about `replication`. My first word
    of caution is to make certain that everyone understand what type of `replication`
    is being discussed.


    You have two main types of `replication` to be concerned with: `SQL replication`
    and `SAN replication`. They are not the same thing—in fact they are very different,
    and can exist together or separately depending on your needs.


    `SAN replication` is simply a way your shop has configured the `SAN` to accommodate
    for moving bits of data from point A to point B. This is done primarily for `HA`
    purposes, but you will find someone who thinks it is also being done for `DR`
    purposes. Depending on how the `SAN replication` is configured, it most certainly
    is an `HA` option and is possibly a `DR` option. For example, if you have two
    sites and are doing `SAN replication` from site A to site B, then you certainly
    have an `HA` scenario configured. However, when an event happens that affects
    both site A and site B, both `SANs` will go down. Your `HA` is clearly going to
    be out of the water, and so will your `DR` unless you are also replicating to
    a third site.


    I can hear people now saying that they can recover from `tape`, so technically
    they have a `DR` solution in place. And I will tell them the same thing I am telling
    you right now: *then your tape backups are your DR solution, not your SAN replication*.
    I hope that helps clear up the confusion.


    As for `SQL replication`, you get your choice of flavors. Each one is unique from
    the rest, and each appropriate according to your particular needs. You should
    have a cursory knowledge of the different types and when it might make sense to
    deploy. Your environment and the nature of the requirements you are given will
    be your primary decision factors when selecting a mode of `SQL replication`.'
  raw: 'One of the more expensive options with physical servers is the notion of *clusters*.
    In order to build a cluster, you first build your primary server (or *node*),
    which has a defined set of shared disks (called a *resource group*). Sharing disks
    between multiple nodes does not require a SAN, but having a SAN can make your
    life a little easier. You then add nodes to the cluster, with each node being
    defined to that same resource group.


    The entire cluster appears on your network as a single server instance, but it
    is really made up of multiple server instances. You will hear talk of primary
    nodes, secondary nodes, or failover nodes; all that talk amounts to fancy words
    for a server instance.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 49](index-65_1.png)


    **CHAPTER 3: Some Basics**


    **47**


    Figure 3–8 provides an example of a four-node cluster. The arrangement may at
    first glance appear similar to that in Figure 3–7. The difference is that all
    four nodes in the cluster share access to the same set of database disks. Furthermore,
    the outside world sees the cluster as a single database instance.


    **Figure 3–8.** *A four-node cluster built around shared disks* The reason clusters
    can be so expensive is because they typically require a lot of additional hardware
    like a SAN, and each node in the cluster needs to have very similar hardware.
    However, with virtualization you can look to use clusters with virtual servers
    and reduce your costs. You can even find some third-party software applications
    that help you to failover your virtual instances during times of peak usage, which
    will (in theory) help to increase your availability (often called *uptime*).


    If this all sounds too good to be true, that’s because it is too good to be true.
    There simply must be a downside to clustering, even on virtual servers, right?
    Absolutely.


    Many times I have had the opportunity to load software onto a cluster. And despite
    the vendor assuring me that I only need to load their software onto the primary
    node, I will often find their software not working should the cluster fail over
    to a different node.


    Historically you will find horror stories relating to the application of SQL hotfixes
    and service packs to the primary node, and their failure to work on the other
    nodes. And while each version of SQL and server OS helps to reduce those headaches,
    you should be aware that they can still happen.


    The other downside to the use of clusters is the increase in the number of servers
    that your shop needs to administer. While having three nodes sounds like a great
    way to achieve HA, it may not sound so great to the people that need to administer
    those


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 50](index-66_1.png)


    **48**


    **CHAPTER 3: Some Basics**


    instances and apply things like service packs. Believe me, administrators enjoy
    having a weekend off every now and then, same as everyone else.


    Need more downsides to clusters? How about the amount of time it takes for the
    failover to happen? Depending on your configuration it can take less than a minute
    to several minutes. And what about those transactions and connections in flight
    during the failover? Will they see an interruption in service? Probably, so your
    application had better be able to handle such an event; otherwise, your phone
    will ring off the hook the minute people perceive there is an issue.


    Need more downside? Well, how about that clusters do not protect you from a disk
    failure? If you are going about setting up clusters and think that they are a
    good DR


    strategy, then you are looking Mr. Murphy right in the face and laughing at his
    laws.


    **Log Shipping**


    Log shipping is a traditional method of HA, allowing for you to maintain your
    data in two (or more) places at the same time. The idea is quite simple:


    **1.** Do a backup of your transaction log on your production server.


    **2.** Copy that backup file to another server.


    **3.** Restore that backup file to another server.


    And there you go—you now have a database (see Figure 3–9) that should look just
    like the database that went offline for whatever reason. Well, close enough to
    the database that went offline. I mean, how often are you doing those transaction
    log backups? Every minute? Five minutes? Ten? Fifteen?


    **Figure 3–9.** *A log-shipping scenario*


    Just how long would you be able to go without data? Would it be acceptable to
    tell your end users that they would be without their data for the past ten or
    fifteen minutes? And if you did transaction log backups every minute, are you
    certain they would complete in that minute? Depending on the usage and activity,
    you could find your transaction logs taking longer than one minute to complete
    their backup, meaning it would take some


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 51](index-67_1.png)


    **CHAPTER 3: Some Basics**


    **49**


    time to do the file copy, and then longer than a minute to do the restore. What
    does that mean for the jobs that keep trying to do the backups and restores every
    minute?


    They fall behind, that’s what it means. And if they fall too far behind, you will
    find yourself having to reinitialize everything from scratch. And depending upon
    the size of the files and databases involved, that could make for a long afternoon
    and evening.


    But for a lot of people, log shipping is the way to go. Log shipping doesn’t require
    a SAN


    or identical hardware on each server involved. A lot of vendors will recommend
    log shipping as a way to achieve HA with a fairly low amount of overhead. You
    do not necessarily save on costs when compared to clusters, but you do save on
    overall administration costs, because things like service packs and hotfixes are
    easier to implement, as well as installation of vendor software.


    Be mindful that log shipping requires manual intervention. Unlike clustering,
    which can provide you with an automated failover, log shipping requires a human
    to get involved and to manually get the backup server up and running as a production
    server.


    **Replication**


    You will often be involved in conversations about replication. My first word of
    caution is to make certain that everyone understand what type of replication is
    being discussed.


    You have two main types of replication to be concerned with: SQL replication and
    SAN


    replication. They are not the same thing—in fact they are very different, and
    can exist together or separately depending on your needs.


    SAN replication is simply a way your shop has configured the SAN to accommodate
    for moving bits of data from point A to point B. This is done primarily for HA
    purposes, but you will find someone who thinks it is also being done for DR purposes.
    Depending on how the SAN replication is configured, it most certainly is an HA
    option and is possibly a DR option. For example, if you have two sites and are
    doing SAN replication from site A to site B, then you certainly have an HA scenario
    configured. However, when an event happens that affects both site A and site B,
    both SANs will go down. Your HA is clearly going to be out of the water, and so
    will your DR unless you are also replicating to a third site.


    I can hear people now saying that they can recover from tape, so technically they
    have a DR solution in place. And I will tell them the same thing I am telling
    you right now: *then* *your tape backups are your DR solution, not your SAN replication*.
    I hope that helps clear up the confusion.


    As for SQL replication, you get your choice of flavors. Each one is unique from
    the rest, and each appropriate according to your particular needs. You should
    have a cursory knowledge of the different types and when it might make sense to
    deploy. Your environment and the nature of the requirements you are given will
    be your primary decision factors when selecting a mode of SQL replication.'
