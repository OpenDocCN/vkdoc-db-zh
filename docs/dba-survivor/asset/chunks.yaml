  trans: '

    # 第八章：培训，来获取一些吧


    当你逐一审视这些益处时，你应该能将它们分为两类：那些能轻易证明与业务目标一致的，以及那些与你个人目标一致的。对于个人目标，看看它们是否也能被证明对业务有益。


    例如，如果你说其中一项益处是与其他专业人士建立人脉的能力，你的公司很可能不会在意。但如果你说，“我将能够与其他专业人士建立人脉，这能让我提升一些必要的软技能，并且将来当我向这个人脉寻求技术问题帮助时，将为公司带来好处。”那么你的公司可能会非常在意。


    你列出的许多个人目标都能被证明能带来业务收益；你只需要稍加思考。


    ## 确定成本节省


    这可能很难计算，因为收益并不总是能体现为硬性成本。


    大多数人通常关注易于计算的硬性成本和成本削减。寻找有助于所谓“成本规避”的培训也是可以的。这是指你节省了尚未支出的费用。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 152](img/index-162_1.png)


    一个例子是虚拟化。你可能有一些使用了几年的服务器。你可以购买新硬件来替换旧服务器，或者考虑对旧硬件进行虚拟化。物理环境和虚拟环境之间的成本差异就属于成本规避。


    **提示：** 理解成本削减和成本规避之间的区别。你不可能声称通过*不*购买钻石每年为你的家庭节省了数百万美元，对吧？


    如果你能量化因培训而节省的时间量，那么通过简化流程也能带来成本节省。另一个寻找成本节省的地方是，如果培训后你能够承担更广泛的职责；也许你可以开始主持未来的培训课程，从而减少公司聘请外部培训师的需求。


    ## 衡量你的结果！


    最后这部分可能是最重要的。在你把其他一切都准备好之后，花些时间思考你将如何衡量你的成功。如果你声称有成本节省，那么写下你计划在培训完成后如何计算这笔节省。成本规避也是如此；务必跟踪所有你能收集到的实际成本，以及如果不进行培训的预估成本。我经常看到任何商业案例中遗漏了这部分内容，好像衡量要么是计划中被遗忘的组成部分，要么就是人们根本不理解其重要性。


    没有衡量，你将无法验证培训的结果。如果结果低于预期，那么你有机会从经验中学习，并对未来的培训计划进行修正。如果结果好于预期，那么当你向管理层展示成果时，你的衡量数据将成为宝贵的资产。


    我以“每个人都需要培训”作为本章的开头。当你下一轮培训结束时，你需要跟踪在接下来的一年里你运用了多少该培训内容，以及它为业务节省了多少钱。这样做将使公司更容易派你参加下一轮培训，并让你成为更出色的员工。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 153](img/index-163_1.png)


    # 第九章：连接、学习、分享


    在你建立了自己的工作常规，并对 DBA 技能感到得心应手之后，你可能会发现自己被吸引去帮助他人。别惊慌；发现自己愿意帮助他人是完全正常的。在其他数据库专业人士及其技能面前感到胆怯也很正常。每次我坐在一群
    DBA 中间时，我总是假设每个人都比我懂得多。然后我会惊讶地发现，桌子对面的人对我也是同样的想法。


    我在担任 DBA 期间学到的一件事是，通常你总能找到愿意提供帮助的人。我认识的大多数 DBA 都不害怕承认他们不知道某事。这与其他职业形成对比，在其他职业中，人们倾向于声称自己是某方面的专家（电视脱口秀主持人），或者觉得需要假装是专家，或者根本不想让任何人质疑他们的专业水平（医生或律师）。


    因为大多数 DBA 愿意承认自己有所不知，所以大多数其他 DBA 也愿意提供帮助，因为他们知道，总有一天他们自己也需要帮助。


    **提示：** 没有一个人能知晓所有事情。


    在本章中，我们将讨论以下内容：


    1.  沟通以及如何开始（写作与演讲）

    2.  专业协会

    3.  人脉网络基础


    ## 沟通


    沟通技巧对任何人来说都很重要，无论其职业如何。在当今互联互通的世界中，拥有强大的沟通技巧比以往任何时候都更加重要。电子邮件、博客、电话和面对面讨论对大多数
    IT 专业人士来说相当普遍。拥有良好沟通技巧的个人，相对于缺乏这些技巧的人具有优势。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 154](img/index-164_1.png)


    **提示：** 电子邮件是与他人沟通的糟糕载体。拿起电话与人交谈吧。


    很多时候，人们告诉我，一谈到良好的沟通技巧，他们往往想到的是高层管理人员。换句话说，这似乎不是他们在其特定职位上需要关心的事情。


    虽然你可能确实需要良好的沟通技巧才能攀登公司的晋升阶梯，但同样正确的是，良好的沟通技巧使你能够与你周围的人保持关系。同样正确的是，大多数招聘的技术岗位通常都把“良好的沟通技巧”列为一项要求。


    如果你已经具备良好的沟通技巧，那么你与其他专业人士建立联系、学习和分享就会更容易。如果你的沟通技巧需要一些提升（而且大多数人的沟通技巧在某种程度上总是可以改进的），那么只有一个方法可以变得更好：你需要练习。根据我的经验，最好的开始方式就是去做所有你想提高的事情。


    想提高打电话的水平？那就多打电话。想提高写作水平？从多做一些额外阅读开始，然后自己写点东西。想提高在会议上激发他人兴趣、接受你想法的能力？改进你的姿势和肢体语言。但是，你该如何以及从哪里开始这一切呢？


    **提示：** 别忘了衣着。汤姆提到了姿势和肢体语言。别忘了这两项是包裹在衣服里的。想想你穿什么去办公室。在合理范围内，向上靠拢着装。每个办公室对于可接受的着装都有一个高端和低端的范围。倾向于高端。——乔纳森·詹尼克


    ## 开始阅读


    对我来说，提升沟通技巧最好的方法就是开始多阅读。

    '
- fmt: '# CHAPTER 9: Connect. Learn. Share.


    It did not matter what I was reading; it could be a book, a technical journal,
    a web site, a blog, or even a textbook. Over time I would start to find and identify
    with certain writing styles that made me want to read more. One of my favorite
    writers happens to be a blogger that got started by blogging about local sports
    teams. He is now one of the most well-known writers for a major sports network’s
    web site. His writing style was so natural and seemingly so effortless that it
    made me more comfortable with the idea of writing for myself.


    As I fell into being a DBA, I had less time to read about sports and was spending
    more time reading technical web sites, blogs, and articles. The more I read, the
    more I started to find which writing styles were most appealing for me. This became
    important later on as I searched for my own particular writing style.


    `www.it-ebooks.info`


    `Image 155`


    Reading allows for you to connect with, and learn from, the author. The more you
    read, the more you will be drawn to certain writers, and the more you will be
    connected to your community as a whole. For example, you may subscribe to several
    blogs, all written by some of the prominent leaders in your industry. By reading
    their blogs, or other trade publications, you can get a sense of what others in
    your field are doing. You can see how they have solved certain issues, or read
    about their reviews of a product, and get a sense of sharing some common ground.


    One day you will find yourself reading some article that describes a solution
    to a problem that is similar to something you have seen recently. You will suddenly
    think to yourself `Hey, what if I took their solution and see if it would work
    for me here?` You’ll make a few changes and deploy the solution to see if it is
    what you need, which will increase that connection you feel with the author, and
    also have learned something in the process.


    Therefore, reading more also has a residual benefit in addition to helping your
    communication skills; you get to improve your technical skills (or whatever you
    are reading about) as well. As your skills improve to a certain level, you will
    start to think about attending training seminars, lectures, code camps, or conferences.


    ## Start Attending


    Reading can trigger something inside of you to want to get more details than what
    a book will provide. This will lead you to look at attending events in person.
    Such an event could be a conference, a training class or seminar, a user group
    meeting, or a lecture somewhere.


    Most of us have attended lectures for years while in high school and college.
    When I was in graduate school we also had colloquium, which are seminars that
    are open to the public. Think of a user group meeting except without the vendor
    and free pizza. There are lots of opportunities for you to attend a lecture being
    given by someone else.


    Attending such functions allows you the possibility to connect, learn, and share
    with the speaker and others.


    **TIP:** Even half-day events are worthwhile. Make a point to attend and meet
    new people.


    I still recall the very first session I attended at a conference. I remember watching
    this person present a talk on query plans and I was thinking to myself:


    `I used to give better talks when describing how to find the area of an ellipse
    to my Math-107 students in grad school. If this guy can present here, maybe I
    could as well.`


    `www.it-ebooks.info`


    `Image 156`


    Now, to be fair, his talk was not bad, it just made me understand that by that
    point in my life I had already spent a lot of time in front of an audience, and
    that I could do technical presentations as long as I was prepared. I could not
    roll into a technical talk as if it was an algebra class, I would bomb.


    Attending functions will also allow for you to get an idea of what works well
    when presenting and what doesn’t work well. This will be valuable information
    for you when you want to start thinking about how you would go about giving your
    own presentation.


    Will your talk need a lot of demos? Perhaps more pictures and fewer words would
    work better?


    Before you can think about speaking in front of others you will need to be able
    to write down your thoughts coherently. And the only way to get better at writing
    is by writing, of course.


    ## JOIN A FORUM


    **By Jared Still**


    Also consider joining a forum, mailing list, or some other venue by which other
    technical professionals can pose technical problems that they have been unable
    to solve. An active forum is like a perpetual conference. Be active too. Plus
    you can’t help but meet new people as you learn.


    ## Start Writing


    I was never a writer. In fact, I became a math major because I did not have to
    write. As an undergrad, I would drop classes that required a term paper and take
    a math class simply because there was no writing involved. I still remember how
    excited I was to have gotten a seat in a class titled “Abnormal Psychology” and
    the disappointment I felt when on the first day the professor explained that I
    was going to write a ten page paper at the end of the semester. I left the class,
    walked over to the registrar, and switched into a class called “Numerical Analysis.”


    When I went to graduate school my world was turned upside down. In my very first
    class, the professor explained that my homework was to be written out, in words,
    and submitted. So, I could not even write a “2,” I needed to spell it out as “two.”
    Simple mathematical statements and formulas became sentences and paragraphs. It
    was pure sadistic torture. I honestly did not think I would make it through. The
    professor explained that I needed to improve my reading and writing if I was going
    to have any future as a mathematician, or anything else.


    And, she was right.


    That was the beginning of my current writing skills, to be honest, right there
    in graduate school while learning some linear algebra. In the years following
    graduate school, I would find it necessary to do a bit of writing from time to
    time in my job as a programmer. I doubt anything I wrote at that time is worth
    much of a read these days, except for a laugh. No, the real first things I wrote
    about were quite personal.


    My wife and I had our first child. I decided to put up a family blog where I could
    write about everything and post pictures of the baby so that people could view
    them whenever they wanted. I blogged two or three times a month right up until
    we had our second child the following year. Then I was blogging for both of them,
    and I continue to do so to this day. I was able to start writing because there
    was something passionate for me to write about. Over time, I also realized I had
    a passion for technical things as well, so I started blogging for myself as a
    professional in addition to the family blog. The fact that I had found all these
    things that I loved, and that I loved to write about them, made it very easy for
    the words to leave my fingers.


    The years of reading made it easier for me to understand that I wanted my own
    voice, my style, and to become a writer. Having something passionate to write
    about made it even easier. If you want to get better as a writer then you need
    to write more, and the easiest way to write more is to find something you love
    to write about.


    **TIP:** When you have a passion for doing something then it feels less like work,
    and it will actually energize you to achieve more.'
