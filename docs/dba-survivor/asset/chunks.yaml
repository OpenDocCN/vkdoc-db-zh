    **CHAPTER 5: Production Support**


    **85**


    READ ME ONE MORE TIME


    **by Tim Gorman**


    When sending e-mail to customers, sometimes it is a good idea to let it sit for
    a few minutes while you read it over a couple times. If practical, have a trusted
    coworker take a look at it as well. E-mail is a great communication tool when
    there are details that need to be conveyed, but getting someone else’s perspective
    on the text can be a good idea on e-mail messages that you consider important.


    I’ve personally asked a coworker to help edit important e-mails a number of times.
    Following a couple of e-mail faux pas, I have become more conscious of rereading
    many of my e-mails before hitting the Send button.


    Simply put, you must be nice. Even if someone is not being nice to you. If that
    is the case, then you need to find out why they are not being nice. Is it that
    they did not know about an SLA, did not understand the SLA, or did not care about
    the SLA? Could you have communicated something better? Is there a way to avoid
    this issue or misunderstanding in the future?


    A lot of people have no idea what you do for work all day long. By the time they
    contact you, they are short on time. Try to keep those things in mind before you
    let your fingers get ahead of your brain and you click Send.


    **Establish Support Process**


    You need to clearly define how people will contact you and your team for support
    issues. Depending on your shop, the process could be something as simple as coming
    over and standing in your cube to something more complicated involving a call
    center application and associated work queues. If you have well-defined SLAs,
    then you should not have to worry about people tapping their foot in your cube
    waiting for a fix, right?


    Well, maybe. See, even if you have a well-defined SLA, you still may have people
    frustrated if they do not know how to get ahold of you or your team. It is imperative
    that you not only define the process for contacting support, but that you publish
    this process so that everyone is aware.


    One quick note: *do not rely on e-mail*. If you are relying on people sending
    e-mail as the primary means for contacting you for support, then you are setting
    yourself up for disappointment and frustration. Unless, of course, you expect
    that you are going to be able to respond to an e-mail at any time of the day or
    night (including weekends). I don’t know about you, but every now and then I need
    to use the bathroom, and I typically do not offer remote support from there. I
    also have a tendency to sleep every now and then.


    **TIP:** I know of one person that likes to send all e-mail alerts to the receptionist,
    because they are most likely to always be at or near their desk.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 88](index-104_1.png)


    **86**


    **CHAPTER 5: Production Support**


    **Define Process**


    You need to have a clear, easy-to-follow process for production support defined.
    It should be as streamlined as possible, with very few handoffs between people
    or systems. When someone wants to contact you, they should be able to do so in
    a simple manner. I like to define any process with the thought that I am *not*
    immediately available. For example, I could be driving through a tunnel and not
    have good reception for my phone.


    The start of your process would begin with someone needing to contact you, so
    think about how you want that contact to happen. You have three choices: they
    can call you on the phone, they can send you an e-mail, or they can walk over
    to your cube. As I said before, try to build your process with the assumption
    that you will not be immediately available. Therefore, telling people to stop
    by your cubicle would not be the best possible choice. Same for e-mail, as there
    is a chance that you will not always have your eyes glued to your inbox. The choice
    that allows for the highest probability of success is a telephone call.'
  trans: '

    虽然采用服务等级协议（SLA）看起来可能并非完美的体系，但试想一下，若没有定义任何 SLA，将会出现怎样的混乱局面。届时，所有事情都会变成紧急事件，每个人都要求自己的事务得到优先处理，而且无论你提供了何种帮助，都无人会感到满意。由此可以推断，你的用户满意度将与你所签订的
    SLA 协议直接挂钩，而这些协议又取决于你管理用户期望的效果如何。


    ## 了解你的工作内容


    从第一天起，你就开始构建初始的工作清单。该清单的一部分是收集数据库相关信息，并进行几次恢复演练。这意味着你应该大致了解恢复某些数据库所需的时间。当有人焦急地在你工位旁等待并询问“还要多久？”时，这份认知将无比宝贵。


    与其提醒他们这项特定请求的 SLA 是下一个工作日，你不如这样回应：“上次我们进行此恢复操作花了三个小时。现在才过了 45 分钟，所以如果一切顺利，你至少还需要等两个小时。”他们离开你的工位时可能依然不悦，但你其实无法控制他们的感受。你能控制的只是及时完成恢复工作。


    *设身处地站在对方的角度想想。假设你打电话给有线电视公司来为你解决问题。你可能不在乎他们花几天时间来处理，但你需要知道有线电视供应商那边有人知晓此问题并且正在着手解决。*

    — Tim Gorman


    如果你已经配备了服务台，跟踪请求并确保满足你定义的 SLA 可能会更容易。如果尚未建立任何系统，那么你应该着手开始对请求进行分组和分类，并制定标准的解决时限。开始记录你所做的工作。记下你执行了密码重置，或者通过从生产环境刷新开发环境进行了恢复操作，或者花费时间检查服务器是否存在缺失索引。感知那些你经常处理的常见任务，并记录下解决每项任务所需的时间。


    **提示：** 尽可能记录一切，无论它看起来多么微不足道。


    记录你的时间将在两个方面对你大有裨益。首先，它能让你为特定类别的请求向客户提供现实的 SLA。其次，它有助于你更好地管理客户对你设定的期望。思考一下这两点有多么关键。你将走上按时、有价值地交付所需成果的道路。


    一个附带效果是，这将使你能够与客户坐下来详细了解他们的请求。如果你已经证明自己能够提供高质量的支持，那么客户就更愿意多花 5 分钟向你解释一些细节，这些细节有助于你解决问题。这比另一种情况要好得多：他们不愿意花费任何额外时间，只想让你立刻修复问题。


    ## 保持友善


    面对支持问题时，切勿陷入邮件争吵。电子邮件没有语气，很容易让你内心的声音以不同于原意的方式解读一封邮件。如果你认为有人在给你发火药味十足的邮件，那么最好的回应方式是拿起电话打给他们。不要用邮件回复他们，因为那很可能导致情况螺旋式恶化。


    ### 请再读一遍我

    by Tim Gorman


    给客户发送邮件时，有时最好让邮件静置几分钟，自己再反复阅读几遍。如果可行，也可以请一位值得信赖的同事过目。在需要传达细节时，电子邮件是一个很好的沟通工具，但对于你认为重要的邮件，获取他人对文本的看法会是一个好主意。


    我个人曾多次请同事帮忙编辑重要的邮件。在经历了几次邮件失礼之后，我在点击发送按钮前会更加有意识地重读许多邮件。


    简单来说，你必须保持友善。即使有人对你并不友善。如果是这种情况，那么你需要弄清楚他们为何不友善。是因为他们不知道 SLA，不理解 SLA，还是根本不关心 SLA？你本可以沟通得更好吗？有没有办法在未来避免这个问题或误解？


    很多人根本不知道你整天的工作内容。等到他们联系你时，他们的时间已经很紧迫。在让手指快于大脑点击“发送”按钮之前，请尽量记住这些。


    ## 建立支持流程


    你需要明确定义人们应如何联系你和你的团队以获取支持。根据你的工作环境，流程可能简单如走到你的工位旁站立等候，也可能复杂到涉及呼叫中心应用程序和相关工作队列。如果你有明确的
    SLA，那么你就不必担心有人在你工位旁不耐烦地等待修复，对吧？


    嗯，也许吧。要知道，即使你有明确的 SLA，如果人们不知道如何联系到你或你的团队，他们仍然可能感到沮丧。至关重要的是，你不仅要定义联系支持的流程，还要发布这个流程，以便所有人知晓。


    一个快速提示：*不要依赖电子邮件*。如果你依赖人们发送电子邮件作为联系你获取支持的主要方式，那你就是在为自己埋下失望和沮丧的种子。当然，除非你期望自己能在一天中的任何时间（包括周末）回复邮件。我不知道你怎么想，但我时不时需要去洗手间，而且我通常不在那里提供远程支持。我也有时不时需要睡觉的习惯。


    **提示：** 我认识一个人，他喜欢把所有邮件警报都发给前台接待员，因为他们最有可能总是坐在办公桌前或附近。


    ## 定义流程


    你需要为生产支持定义一个清晰、易于遵循的流程。它应该尽可能精简，在人员或系统之间的交接越少越好。当有人想联系你时，他们应该能够以简单的方式做到。我喜欢在定义任何流程时假设我*并非*立即可用。例如，我可能正在开车穿过隧道，手机信号不好。


    你的流程起始点将是某人需要联系你，因此请思考你希望这种联系如何发生。你有三个选择：他们可以打电话给你，发送电子邮件，或者走到你的工位。正如我之前所说，在假设你不会立即可用的情况下构建你的流程。因此，告诉人们到你的工位来可能不是最佳选择。电子邮件也一样，因为你并不总是目不转睛地盯着收件箱。成功概率最高的选择是电话。

    '
- fmt: '# CHAPTER 5: Production Support


    Sure, you could miss a phone call, no question. But when you think about the number
    of e-mails you get a day vs. the number of phone calls, you can see that phone
    calls stand out as something *different*, and you are going to pay more attention
    to your phone ringing than to an e-mail.


    If we were to assume that someone calls and leaves a message, how long would you
    have to respond? The answer, of course, is that you have as long as your SLA defines.


    And that means it depends upon the nature of the emergency. Which means you need
    to have a process in place that satisfies the highest possible SLA-defined response
    time, and chances are an e-mail at 3 a.m. is not going to suffice.


    **TIP:** I’m not sure about you, but I enjoy sleeping. Keep in mind that others
    enjoy that as well when you start building out your systems and defined SLAs.


    If you are fortunate enough to be able to hire an answering service, I would recommend
    doing so. This way you can rest assured that someone will always be available
    to answer the phone and that they will in turn make an attempt to contact you
    or your team immediately afterward. Whether or not you have the luxury of an answering
    service, you should make certain that there is only one phone number used as the
    primary contact number.


    An example of a process using many of the above details would look as follows:


    1.  The customer calls a production support number.

    2.  The call is answered by answering service.

    3.  The message is taken, including customer information details.

    4.  The answering service calls the specified phone number.

    5.  The call is answered by the DBA responsible for support.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 89](index-105_1.png)


    That is a very simple version of a defined support process, but there is a lot
    of work that goes into making this happen. Working backward, how do you make certain
    that the answering service contacts the correct DBA? One way is to rotate a pager,
    but you may be fortunate enough to have people assigned to support specific applications
    or sites.


    Going further backward, how do you make certain that the customer calls the correct
    number for DBA production support? Let’s look at the answer to that question next.


    ## Publish Process


    You need to publish your defined production support process. It must be communicated
    clearly, and it will need to be communicated often. And no matter how many times
    you communicate the process to your customers, there is always going to be someone
    that tells you they had no idea about the process. Remember, *be nice*.


    Look for creative ways to advertise the support process. Instead of sending out
    company-wide e-mails detailing the process, you could be subtler and simply include
    the correct phone numbers in your e-mail signature. You could also publish the
    process to an internal web site and refer people to that link when appropriate.
    Still another option would be to publish reports on the volume of support calls
    you handle per month and include the process details inside the report (as opposed
    to just reporting on the numbers and assuming everyone knows the process).


    **TIP:** You could publish this info ten times over and people will still miss
    things or deny having read them. Be patient when they claim ignorance, and simply
    forward them the materials again.


    You will need to publish wherever you can, remind people periodically (somehow),
    and make certain people are notified about the process, especially if and when
    changes are made.


    ## Remind and Enforce


    You will constantly need to remind people about your production support process.
    Most people are not going to pay attention to any process that they do not use
    on a regular basis. And if things are going well in your shop, then people will
    not need to be contacting you for help, which means they will most likely not
    be as familiar with the process as they should be.


    Besides reminding people about the process, you will also need to enforce the
    process.


    This is where it pays to be nice. If someone contacts you for production support
    and does not follow the defined process, you have two choices. You can assist
    them and remind them of the process, or you can remind them of the process and
    make them follow it before you assist them.


    While you may think that the right choice is to help the person and then remind
    them about the correct process, stop and think about that scenario for a moment.
    If they did not need to follow the process and you helped them anyway, why would
    they change their ways the next time around? Remember that if things are going
    well in your shop, then most people will not need to contact you on a regular
    basis. So, when exactly would they start to become familiar with the process?


    As painful as it may be to do so, and even at the risk of your approval ratings,
    sometimes it is best to remind people about the correct process. Usually I try
    to weigh the situation at hand to decide if I am going to enforce the process
    or if I am going to allow the person to bypass the process altogether. No matter
    which one I choose, I do my best be nice.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 90](index-106_1.png)


    ## Work/Life Balance


    When you are designing your production support process, it is important to remember
    that you have a life outside of work. Failure to recognize this fact could result
    in your designing a process that isn’t sustainable over a long period of time.
    Even if you don’t think you have a life, do your best to assume that you do; otherwise,
    your design process will be built around the assumption that you are always available.
    That means you have a single point of failure, which is going to result in poor
    service to someone at some point in time.


    One aspect that tends to get overlooked is the ability to know when to say no.
    In today’s corporate culture, many people feel that they are not allowed to say
    no when asked to take on extra assignments. If you say no too often, then soon
    enough people will stop asking, and it will not be long before your services will
    no longer be required altogether.


    It is important to have some downtime away from your work responsibilities. This
    allows you to recharge your batteries, so to speak. You can reduce your stress
    level and get some needed rest, and when you return to work find yourself refreshed.
    But if work is so demanding that you are constantly needed at all hours, how do
    you balance your work life and your home life?


    ## Communication


    Like most things in life, good communication is critical to making everything
    run smoothly. This is no exception. Good communication between you, your manager,
    and your family is essential when trying to balance your work and your personal
    time.


    If you need to work late or on the weekend, then notify your family as soon as
    you are aware. Will you be able to do so in a timely enough manner for their liking?
    No, not always. But at least you are making the attempt. I find it useful to share
    a calendar with my family so that I am always aware of everyone’s activities at
    home when I know my work responsibilities will infringe upon family time.


    **TIP:** Know when to say no, but always say yes to your family. Always.


    If your family needs you, then communicate that to your manager as soon as you
    are aware. If you need to leave early, say your child is sick and tell your manager.
    Most companies these days offer what is commonly called flex time; there is no
    clock to punch, so if you need to leave early infrequently, then you can do so,
    providing that you make up for the time later on.


    [`www.it-ebooks.info`](http://www.it-ebooks.info)


    ![Image 91](index-107_1.png)'
