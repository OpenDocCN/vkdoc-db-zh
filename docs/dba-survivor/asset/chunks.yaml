    become familiar with the restore process in your new shop as well as to verify
    that the backups are usable. Make certain you know all aspects of the recovery
    process for your shop before you start poking around on any system of importance.
    It could save you some embarrassment later on should you sound the alarm that
    a backup is not valid and what turns out to not be valid is really just your understanding
    of how things work.


    **TIP:** Another good reason to practice restores is so that you can perform one
    when the call comes in at 3:00 a.m. the morning after you’ve stayed up late three
    nights in a row. You’ll be tired. You won’t be thinking clearly. The practice
    that you’ve previously put in will serve as your brain’s “muscle memory.” Practice
    makes you better able to do the right thing under pressure and when fatigued.


    **Build a List of Customers**


    If you know what servers you are responsible for, then start asking who the customers
    are for each of those servers. Note that this line of inquiry can result in a
    very large list.


    And with shared systems, you could find that everyone has a piece of every server.


    The list of customers is vital information to have. For example, if there is a
    need to reboot a server, it is nice to know who you need to contact in order to
    explain that the


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 21](index-37_1.png)


    **CHAPTER 2: Now What Do I Do?**


    **19**


    server will be offline for five minutes while it is rebooted. And while you compile
    your list of customers, it does not hurt to know who the executives are and which
    servers they are most dependent upon.


    When you start listing the customers, you should also start asking about the applications
    and systems those customers use, and the time of day they are being used the most.


    You may be surprised to find some systems that people consider to be relatively
    minor are used throughout the day, while other systems that are considered most
    important are used only once a month.


    There is an extra benefit to building this list: you get your chance to begin
    building a relationship with your customers. Chances are they will be flattered
    that you care enough to seek them out. Putting together your list gives you an
    excuse to reach out to your customers. Think of it as an ice breaker—an easy excuse
    for the two of you to meet.


    INFREQUENTLY USED DATABASES CAN STILL BE CRITICAL


    **by Ken Simmons**


    Tom’s time-of-day comment made me think back to when I used to work managing a
    data warehouse. We had a database that could be offline three weeks out of the
    month, and nobody would notice. It was a critical database, with a specific purpose.
    The workload just happened to be such that the database wasn’t used three weeks
    out of the month. It sure was used during week 1 though. During week 1, it had
    better be up 24/7\. The remaining weeks, it didn’t matter so much. The moral?
    Don’t assume a correlation between how much something is used and how truly important
    it is.


    **List the “Most Important” Databases**


    While you gather your list of you important customers, go one step further and
    find out what their most important databases are. This could be done by either
    (1) asking them or (2) asking others, and then (3) comparing those lists. You
    could be very surprised to find that they do not match. You will be even more
    surprised to find how many people can forget about some of their systems and need
    a gentle reminder about their importance. As DBAs, we treat all databases with
    equal importance, but we recognize that some databases are indeed more important
    than others, especially given a particular time of day, week, or month.


    For example, you could have a mission-critical data warehouse. Everyone in the
    company could tell you that this system is vital. What they cannot tell you, however,
    is that it is only used for three days out of the month. So, the database could
    be offline for 21 days and no one would say a word.


    Another example would be a trading platform. This system could be used heavily
    for nine or ten hours each business day. But for the remaining hours of the day
    it is not used at all. Does that mean that when these systems are not used they
    are not important? No, it does not. What it does mean is that you are gathering
    more details


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 22](index-38_1.png)


    **20**


    **CHAPTER 2: Now What Do I Do?**


    about the systems. If 17 different groups mention some tiny database, but they
    consider it to be of minor importance, you can consider it very important because
    it is touched by so many different people.


    Another factor here is recoverability. If the business requires you to be able
    to recover a database to a point in time, then you should consider that to be
    an important database as well, even if that customer sits across from you and
    says “it’s not *that* important.” I have lost track of the number of times a customer
    has told me offhand that “the system really is not a big deal—we need to recover
    to within five minutes, and we use it all day long, but you don’t have to worry
    about it.” Yeah, right. Until a disaster happens, of course, and you are on the
    hook to put everything back, and quickly!


    **List Upcoming Projects and Deliverables**


    If there is someone around that can help you see the current and upcoming projects,
    it would help for you to know what is about to be dumped in your lap. You want
    to minimize the number of surprises that await you; knowing what projects are
    currently planned helps you to understand how much time you will be asked to allocate
    for each one. And do keep in mind that you will be expected to maintain a level
    of production support in addition to your project support, in addition to the
    action tasks you are about to start compiling.


    You’ll also want to know which servers will be decommissioned in the near future
    so that you don’t waste time performance tuning servers that are on death row.
    Keep an eye on this angle as well.


    **Establish Environmental Baselines**


    Baselining your environment is a function that gets overlooked frequently. The
    importance of having a documented starting point cannot be stressed enough. Without
    a starting point as a reference, it will be difficult for you to chart and report
    upon your progress over time.


    The idea of gathering baseline information on the servers you administer is to
    simply find out how many deviations you have from an ideal state. You have already
    done one baseline item—you have evaluated your database backups. Since this checklist
    item can become a little cumbersome in a short amount of time, try to focus on
    the basics.


    For example, on a stand-alone database server with direct attached storage, your
    data files should exist on a separate drive from your log files. How many servers
    have that same configuration? And what about those disk drives? Is there a standard
    RAID


    configuration? (You may be surprised to find that servers are not always physically
    built the same.) How about the memory settings or the number of processors for
    the instances? How big are the data and log files, and what is the average CPU
    utilization?


    Focus on a handful of big-ticket items to gather as your baseline information
    and keep the information going forward. You can add additional items over time
    as needed.


