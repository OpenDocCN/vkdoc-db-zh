- fmt: '无论你在未来几周内会见和问候多少人，除非你能向你的经理和其他人提供一些切实成果的证据，否则人们迟早会想知道你整天都在做什么。如果你的初始检查清单显示你有二十五台服务器，其中六台在
    C: 盘上存放了数据和日志，另外两台根本没有备份，那么你日后报告你的二十五台服务器现在都已配置好备份且所有驱动器都已正确配置时，就会容易得多。


    最终，人们记住的不是你的努力，而是最终的结果。务必妥善跟踪你的进度，以便用事实帮助人们准确理解你所交付的工作。


    ## 主动出击


    既然你的大部分调研已经完成，你应该对你在新环境中面临的局面有了非常清晰的认识。随着时间的推移，你将在新的角色中建立自己的身份。大多数 DBA 都会归入以下两类之一：*正确先生*
    或 *及时先生*。


    以下哪一项最能描述你处理工作的方式，或者你希望别人如何看待你？


    *及时先生*：这个人总是随时准备解决任何问题。他非常引人注目，每个人都知道他的名字，也知道他做什么。他负责解决问题。无论白天黑夜，他总是在那里。一旦出现问题——任何问题——你打电话给及时先生，他总能找到解决办法。他很少无法交付成果，每个人都称赞他的辛勤工作和努力。然而，每当他解决了一个问题，他只是做到足够好以便能转向下一个紧急任务。


    *正确先生*：这个人你很少见到。出现问题时，他会探头看看，但由于问题很少，人们从不真正知道他在场。事实上，人们常常问：“那么，你在这里到底做什么？”但是，当正确先生解决一个问题时，他会彻底解决，确保永远不必再为同一个问题去碰那台服务器。然后，他会主动地对其余服务器执行相同的修复，以防它们发生类似问题，从而在问题发生前就将其解决。


    你更愿意成为哪一种人？你是愿意成为那个非常显眼、终端用户因为他总是随时修复问题而喜爱的人？还是愿意成为那个人们很少见到、完全不知道你以何为生的人？


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 35](index-51_1.png)


    ## 第 2 章：现在我该做什么？


    **33**


    你来回答这个问题：你会认为哪一种（正确先生或及时先生）是初级 DBA，哪一种是高级 DBA？


    **提示：** 能够解决问题并不会使你成为高级 DBA。你成为高级 DBA 是因为确保问题首先不会发生。


    虽然及时先生可能因为他的所有努力而得到终端用户的赞赏，但必须提出最终问题：他是否在修复那些由他修复早期问题而引起的新问题？


    有人成为及时先生有两个原因。第一个原因是，在他们上任之初问题就太多，他们将面临一场漫长的战斗来控制所有“火情”。第二个原因是，他们是初级管理员，只知道足以解决当前问题的知识。


    然而，正确先生这个人不仅能在火情发生时将其扑灭，而且拥有知识和经验来建立控制措施，确保问题不太可能再次发生。因此，他们不仅知道如何解决当前问题，而且*知道如何解决问题的根源*。他们实施的解决方案不会使环境复杂化；它们有助于减轻他们的工作负担。


    当你开始新角色时，你很有可能需要在很长一段时间内扮演及时先生，即使你处于高级水平。这可能是因为工作量远远超出一个人所能处理的范围。当然，你有你的检查清单并且组织有序，所以你知道应该先关注哪里。但是，当你沿着清单向下推进时，你需要不断思考解决方案，而不是临时的快速修复。


    随着时间的推移，你真的想成为正确先生，并将你的环境配置成几乎能自我修复的样子。如果你觉得失去了向人们展示你对公司有多大价值的机会，也不要绝望。


    的确，当你持续配置你的环境并主动阻止潜在麻烦时，你会发现你有更多时间以不同的方式展现自己。


    **提示：** 更聪明地工作，而不是更辛苦。寻找主动解决问题的方法。


    你是愿意整个周末被困在服务器机房里，还是愿意帮助某人学习编写更好的 T-SQL 代码？你是愿意在工作日内尽可能快地重启机器来排查某个问题，还是愿意帮助财务部门的某人了解如何使用
    SSRS 配置和构建他们自己的报告？相信我，有很多方法可以展现你的价值，而不必像房子着火一样到处跑。


    上大学时，我们总是被告知要更聪明地学习，而不是更用功。同样的原则也适用于这里：更聪明地工作，而不是更辛苦。


