- fmt: '# CHAPTER 2: Now What Do I Do?


    ## You Have Your Info, Now What?


    Everything discussed up to this point should keep you busy until at least lunchtime
    on day one. OK, maybe it will take you a few days to get all of the information
    on your checklist. You may or may not have a lot of that information already available,
    so the amount of time it takes to gather everything will depend upon the current
    structure of your particular department in your shop. (By the way, get used to
    hearing and saying "it depends"; more on that later.) No worries, because you
    can transition into the next phase while you continue to gather your data.


    I would also advise you to streamline the ways in which you collect this information.
    For example, if you have one hundred servers, you really do not want to remote
    to all of them just to examine the memory settings for each one. You will need
    to learn how to efficiently gather your information, much of which can be collected
    using tools such as `System Center Configuration Manager (SCCM)` and `Operations
    Manager`. If your environment does not have those tools, then you may need to
    script out your baseline queries using `PowerShell`, `T-SQL`, or some alternative.


    Alternatively, you could use a defined central management server in `SQL 2008`
    to run queries against multiple instances at the same time. Or you could look
    to use policy-based management to report on and possibly enforce configuration
    options. No matter what method you choose, the goal remains the same: to track
    changes over time. Once you’ve captured a picture of how your environment looks
    now, you can start to document how to return servers to their original state if
    something goes wrong.


    ## Compose Your Recovery Plan


    Notice how I said "recovery plan" as opposed to "backup plan." In your checklist
    so far, you have already verified that your database backups are running, started
    to spot check that you can restore from your backups, and gotten an idea of your
    important databases. Now is the time to put all of this together in the form of
    a disaster recovery (DR) plan. For each one of those databases listed as important,
    you should write down exactly the steps involved to recover should a disaster
    happen.


    Make no mistake about it: should a disaster happen, then your job is on the line.
    If you fail to recover because you are not prepared, then you could easily find
    yourself reassigned to "special projects" by the end of next week. The best way
    to avoid that happening to you is to practice, practice, practice. Your business
    should have some scheduled DR tests perhaps once a year, but that should not prevent
    you from doing your own smaller DR tests on a more frequent basis.


    Document each system and all the steps required to recover. Is the database in
    `full-recovery` mode? How frequently are you doing transaction log backups? Write
    down the backup schedule so that it is clear where the restore points are. If
    your customers expect recovery to the minute and you are in `simple` mode, then
    you are heading for a true disaster.


    And don’t forget about recovering from past days or weeks. If your customer needs
    a database backup restored from two months ago, make certain you know every step
    in the process in order to get that job done. If your company uses an offsite
    tape storage company, and if it takes two days to recall a tape from offsite,
    then you need to communicate that fact to your users ahead of time as part of
    your DR plans.


    ## Meet with Your Manager


    While gathering the data, you should meet with your manager to discuss your preliminary
    findings and work together to prioritize the work that needs to be done. If you
    have found one server that is not running any backups, or the backups are failing,
    then that server must take precedence over everything else. I don’t care which
    one of your "most important" customers screams at you on day one to fix a query
    they wrote that filled up a 70GB log drive, you *must* ensure you can recover
    from a disaster.


    Continue to review your checklist with your manager and determine which items
    need to be done, which items need the most resources and effort, and which ones
    can wait for now. It is very important that you and your new manager agree upon
    the tasks and their priority before you get started. This will serve both of you
    very well; it gives you a chance to be measured from this point forward.


    Should you and your manager disagree, however, with regard to your priorities,
    make sure you have that documented. It will serve you well when someone comes
    around asking why something specific has not been done yet, and you politely explain
    why you have been working on something else. Then, if there is still disagreement,
    you, the other person, and your boss can get together to reevaluate your priorities.


    **TIP:** Document, but not to be confrontational. Don’t whack your boss upside
    the head with his old e-mails. Instead, use them as gentle reminders that you
    are committed to working on the priorities that your boss lays down. Your boss
    will appreciate that you are putting your efforts toward his priorities.


    After you have met with your manager, you are going to constantly be measured.
    Everyone is going to want or need you for one thing or another. Every interaction
    you have with others will serve as a form of measurement, to be verified by something
    tangible produced by actions on your part. If you have that checklist, and your
    manager is aware of the checklist, you now have something tangible to deliver
    on starting from day one.


    Think about how important this will be for you. In three or four weeks someone,
    somewhere, will ask your manager how things are working out with the new DBA.
    Your manager will be able to quickly affirm all the great work you have been doing
    (let’s just assume you have been doing great work and not sitting on your arse
    all day). You will be able to track your progress easily, and eventually you can
    prepare a brief summary or presentation that details your progress over your first
    few months.


    ## Meet with the Developers


    If your company has in-house development teams, take some time to meet and greet
    them. They are going to figure most prominently in your success in the coming
    months.


    Find out what projects they are working on and what roadblocks they are currently
    facing, and see if there is an opportunity for you to offer assistance.


    There is no question that the developers are going to keep you very busy. The
    developers will be the ones that look to push the limits with the technologies
    at their disposal. The end result will be an abundance of little training opportunities
    for you to take advantage of. Fill up the transaction log? Let me understand more
    about what you were trying to do. Filled up the entire log drive? Your remote
    query has bad performance? Your stored procedure with 27 nested cursors is taking
    too long? Here, let me help you with that, and perhaps we can find a better way
    to get the job done.


    Will every developer want to be your friend? Absolutely not—it is rare to be somewhere
    where everyone gets along at all times. If you come across a developer that believes
    they know more than anyone else in the room, you can sit back and chuckle because
    you already know that the DBAs are the smartest, otherwise you wouldn’t always
    be called to fix their problems all day long.


    ## Meet with the Server Administrators'
