  trans: '

    # 第九章：连接、学习与分享


    约翰走进商店时感到很不自在，他试图融入其他顾客。他四处寻找车头灯却一无所获。他不敢寻求帮助，因为他不想让人知道他连车头灯这么简单的东西都找不到。过了一会儿，他发现一个穿着商店制服的年轻人，便向他求助，但那个年轻人并没有帮上什么忙。


    沮丧之下，约翰走向客服台，终于开口请求帮助：“请问有人能告诉我车头灯在哪里吗？”


    柜台后的男人问约翰：“先生，您以前买过汽车配件吗？”


    “没有，”约翰回答，“这是我第一次买。您怎么知道的？”


    “先生，”那人回答道，“这是一家游泳池用品店。”


    如果你想建立自己的人脉网络，那么你需要做两件非常重要的事情。首先，你必须以某种方式与他人互动。其次，你必须确保自己一开始就在正确的房间里。


    ## 如何感到舒适


    那么，如何克服那些让你不适的感觉呢？


    找出让你最不舒服的事情，然后别去做那些事。


    听起来很简单，对吧？嗯，这要看情况。


    首先，要确定什么让你最不舒服可能很困难。我认识一些人害怕与新人交谈，因为他们担心可能会给人留下坏印象。我还有一些人害怕新人，因为他们自己本身就不够自在。你需要*确切*找出你与新人见面时最大的担忧是什么。这样做将使你有机会克服这些挑战，而这恰好也是你面临的第二个困难。


    大多数人都会觉得参加不认识任何人的活动很不舒服。如果这描述的也是你，那么努力找一个朋友陪你一起去参加活动。但要确保你不会整晚都只和你的朋友聊天，而一个新人都没认识。


    **提示：** 准备一个谈话开场白总是有帮助的。如果实在想不出别的，你总可以从天气开始聊。


    `www.it-ebooks.info`


    ![图 164](img/index-174_1.png)


    另一个对很多人有帮助的建议是早点到场。这样更容易与其他早到的人开始交谈。如果你姗姗来迟，可能会发现更难加入一群正在进行的谈话中。当你早到时，你不仅可以和少数其他早到的人交谈，还可能发现更容易从你当前所在的小组移动到另一个小组。


    这就是为什么有些人更喜欢社交网络的原因之一。在线与人见面比面对面更舒适。然而，我要提醒你，在线时你并非匿名。在论坛上发表任何评论时都要注意言行。


    ## 如何接近他人


    我绝非天生健谈的人。走到陌生人面前和他们交谈，这对我来说并不是一件很自在的事。不过，这些年来我学到了一些东西，帮助我理解了在社交或人脉活动中如何以及何时接近他人。


    首先要注意的是人们如何相互互动。无论一个小组有多少人，该小组总是被视为开放或封闭的。


    开放小组意味着人们的身体姿态表明他们邀请他人加入他们的谈话。当人们站着交谈时，他们会根据讨论的性质自然地以特定方式摆放身体。大多数讨论都适合形成开放小组。


    当谈话的性质使得参与者彼此相对而立，且姿态不具邀请性时，就形成了封闭小组。对于这样的小组，你不想尝试插入他们的谈话，你应该扫视房间，寻找开放的小组。


    **提示：** 我喜欢寻找那些正在寻找他人的人。希望这能说得通。换句话说，通常会有一些人，他们脸上带着邀请的表情，那表情仿佛在说“来和我聊聊吧”或者“我希望有人能和我说话”。——西尔维斯特·卡斯塔芬


    一旦你弄清楚哪些小组是开放的，你就需要走过去自我介绍。这不需要很花哨或困难。一句简单的“你好，我叫汤姆，很高兴认识你。”就足够了。当然，你应该用你自己的名字。之后，你可以用一个基本的问题开始对话，比如“你是怎么知道这个活动的？”或“你是做什么工作的？”你甚至可以陈述一下，比如“我很紧张。”或“我不擅长认识新人。”这些都是可以接受的对话开场白。


    在你待了一段时间后，你可能想转到一个新的小组。关于必须在任何一个小组待多久，没有硬性规定。但在离开你所在的小组去另一个小组之前，你需要有一个退出策略。当然，不要粗鲁到把一个人单独丢下，但简单地说声“不好意思”然后移动到房间的另一部分是完全没问题的。是的，真的就这么简单。


    这类活动我最喜欢的部分之一，是你连接他人时所拥有的力量。你可能和一个小组待了五分钟，了解到关于某个人的几件事。然后，二十分钟后，你可能会发现一个新的人和你之前遇到的那个人有共同之处。于是，你花时间把这两个人介绍认识。


    你为什么要这么做？记住，你们都在寻求建立互利的关系。如果你能把两个可能互相帮助的人联系起来，那么你就是在帮助他人建立他们的人脉网络。你可以肯定，那两个人会记得你是把他们介绍给彼此的人。很可能他们会投桃报李，把你介绍给与你志趣相投的人。


    成为帮助连接他人的人，拥有真正的力量。


    `www.it-ebooks.info`


    ![图 165](img/index-175_1.png)


    ## 选择正确的房间


    当你寻找建立人脉的场所时，有哪些好去处？嗯，我已经谈过专业协会的价值。如果你参加由你的专业协会主办的活动，你至少会知道参加活动的人是来自与你相同领域或行业的人。这可能会让对话更容易一些。一些常见的结识他人的场所包括会议、用户组、本地活动和培训研讨会。


    如果你想与他人建立互利关系，那么你需要确保你们双方都有对彼此有价值和感兴趣的东西。在游泳池用品店购买车头灯没什么意义，那么为什么要在一个充满你专业或兴趣领域之外的人的房间里建立人脉呢？然而，我看到并从人们那里听说了正是这种情况，他们告诉我他们对社交活动有多么失望。


    在抱怨你的结果有多糟糕之前，请确保你一开始就在正确的房间里。


    ## 让事情变得更简单

    '
- fmt: 'I often hear about how hard networking can be. While I like to remind people
    that most things in life that are worthwhile are also sometimes difficult, I am
    also one of those that likes to have things made easy. One way to make networking
    easy is to know what your goals are. If you are looking to increase sales then
    you are going to want to find a specific type of room to network. If you are looking
    to simply increase your number of professional contacts then you are going to
    want a different type of room. The last thing you want to do is invest time and
    energy into a networking effort only to find that you are in the wrong room.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 166](index-176_1.png)


    **158**


    ## **CHAPTER 9: Connect. Learn. Share.**


    Another way to make networking easier is to simply have good manners. If you can
    talk (and chances are you have been talking since you were very young) and you
    have good manners, then you will be surprised at how easy networking can be. Remember
    how you can leave a group by simply saying “excuse me.” Well, that is just good
    manners, and people that demonstrate good manners often stand out, are well liked,
    and respected.


    Successful networking requires some work and effort, yet a lot of that work and
    effort end up becoming helpful habits. Before you know it, you will be a natural
    at networking.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 167](index-177_1.png)


    ****159**


    ## **10**


    ## **Chapter**


    ## **Summary**


    I still remember walking into that classroom at Washington State University. I
    was a graduate student and Teaching Assistant and was about to teach my very first
    pre-calculus class. I had never been a teacher before (except as a substitute)
    and really had no idea what to expect. We had been given some training in the
    days before classes were to begin, but nothing could have prepared me completely
    for what I was to experience. The training consisted mostly of practicing some
    basic lectures in front of our peers. I do not recall there being a lot of formal
    instruction written down, it was mostly group discussions.


    Likewise, I still remember the first days that I took over as the database administrator.


    Any time anything went wrong with the mystery that is a database, I was called
    upon to provide an immediate answer. If I didn’t have the answer, I was expected
    to stay at my desk until one could be found. Well, OK, that was the pressure I
    put upon myself because I was foolish enough to think that each and every database
    administrator already knew everything there is to know. Yes, I was that foolish.


    How I wish that someone could have handed me a book that would outline what to
    expect over the coming weeks, months, and years; a book that would help me to
    be successful as a database administrator and outline my career growth from day
    one.


    That is why I wrote this book. I wanted to write a book that I wish someone would
    have written and handed to me on my first day. I have been a database administrator
    for over six years now, but the learning curve during those first two was steep.
    I always seemed to be behind, always reacting to a situation or need, and rarely
    finding time to be proactive. Over time, I learned how to get ahead and I hope
    that the information in the preceding chapters allows for you to do the same.


    ### **Getting There**


    How you got here does not matter. What you do from your first day forward is how
    you will be measured. No one is going to be concerned about your past, all they
    will want are tangible results delivered with a ribbon on top. People from all
    walks of life become database administrators; very few people grow up with the
    idea in their mind that they will be a `DBA`.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 168](index-178_1.png)


    **160**


    ## **CHAPTER 10: Summary**


    Sometimes, however, people just know they want to get involved in database administration.
    That was certainly the case for me. Most others tend to fall into the role by
    accident. They find themselves doing a few administrative tasks here and there,
    and before they know it they are doing more and more. You will find that there
    are many paths to becoming a `DBA`. Getting there can be seen as either an impossible
    journey or as a journey you did not even know was happening.


    If you are looking to become a `DBA` and feel as if you are not being given an
    opportunity, then you need to take matters into your own hands. Start finding
    opportunities to get yourself the necessary skills. There is a wealth of free
    training available online these days. There is also plenty of training available
    for a fee. I would always advise anyone to get as much hands-on experience as
    possible, in addition to any training offered through books and manuals. Plus
    you can always donate your time to local organizations in order to get that hands-on
    experience.


    If you truly want to become a `DBA`, there are many ways to get there. Some paths
    may take longer than others, so you need to remain positive and keep visualizing
    the end result.


    ### **Being There**


    Getting to become a `DBA` may seem daunting at times. Once you find yourself in
    the role that you had been visualizing you may find yourself overwhelmed from
    time to time. Even seasoned database administrators can find themselves feeling
    overwhelmed by the volume of tasks at their fingertips. You may not be able to
    avoid being in over your head on any given day, but there are things you can do
    to keep those days to a minimum.


    First off, you need to lay a solid foundation. One of the best ways to do this
    is by documenting as much as possible. Write down everything you can, no matter
    how important it may (or may not) seem at the time. The documentation will serve
    you well, as learning by wrote is a great way to memorize information.


    Second, after you begin documenting everything you can find, you can then share
    your knowledge and experiences with your coworkers. Find ways to increase the
    flow of communication between all the teams in your shop. Got `Sharepoint`? Build
    yourself a portal and use it to publish useful information. You can even use it
    to publish `T-SQL` tips and tricks, or to discuss some basics of database design.
    Over time, you will find out what forms of communication work best for everyone
    in your shop.


    ### **Staying There**


    Getting there can be tough. Being there can be tougher. And staying there can
    be the hardest thing of all. If you want to stay, then you will need to move beyond
    the technical skills and start working on the soft skills.


    Schedule times to meet with others, even if it is just a phone call to someone
    in a different office. Manage as many relationships as best as you can, keeping
    in mind


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 169](index-179_1.png)


    ## **CHAPTER 10: Summary**


    **161**


    that different people will need to be treated, well, differently. Find out what
    information they want or need from you and look to find ways to provide that information
    on a regular basis.


    **TIP:** Don''t isolate yourself. If most of your work is done solo, find ways
    to collaborate with others in `IT`, users, and colleagues in your social network.
    No one is an island. We all need to work with others. Doing so will help you appreciate
    what others are doing, and make you more visible for the work that you do. —Jared
    Still


    Another way to make sure you stick around for a while is to continue your professional
    development. Look to supplement your working tasks with some training tasks as
    you will always need to stay ahead of the curve. Download and install `CTP’s`
    whenever possible. And read. You will need to read a lot. Stay on top of latest
    industry trends and communicate those trends to your peers. Engage others in discussions
    that are more about design and architecture and less about production issues.'
