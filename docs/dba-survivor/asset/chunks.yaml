    put the Blackberry in a different room. Believe me, the world will not end if
    you do not read or respond to an e-mail until the morning. If something is important,
    then someone should be calling your Blackberry, not sending you an e-mail, so
    just make certain you can hear your phone ring.


    Your job performance should be tied to tangible results, not the amount of hours
