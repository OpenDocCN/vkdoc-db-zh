    \ great communication tool when there are details that need to be conveyed, but\
    \ getting someone else’s perspective on the text can be a good idea on e-mail\
    \ messages that you consider important.\n\nI’ve personally asked a coworker to\
    \ help edit important e-mails a number of times. Following a couple of e-mail\
    \ faux pas, I have become more conscious of rereading many of my e-mails before\
    \ hitting the Send button.\n\nSimply put, you must be nice. Even if someone is\
    \ not being nice to you. If that is the case, then you need to find out why they\
    \ are not being nice. Is it that they did not know about an SLA, did not understand\
