    ![Image 38](index-54_1.png)


    **36**


    ## 第 3 章：一些基础知识


    ### `RAID` 简介


    可能你需要熟悉的最重要的硬件概念是 `RAID`，它代表*廉价磁盘冗余阵列*。`RAID` 本质上是关于以不同方式将数据存储两次或更多次在不同的磁盘上。我说的有点简化了，但
    `RAID` 的一个核心目标是让你在丢失一个磁盘时也能幸存下来，而不会丢失该磁盘上的任何数据。


    `RAID` 的冗余部分使我们能够在丢失驱动器时幸存下来。有不同的方式提供冗余，我将在本章中介绍这些方式。


    了解不同的 `RAID` 配置将在多个场合拯救你。不同的情况需要不同的 `RAID` 配置。它们可用于提高性能以及防范灾难。


    ### 为什么 `RAID` 如此重要？'
  raw: 'No matter how many people you meet and greet in the coming weeks, unless you
    can provide some evidence of tangible results to your manager and others, people
    will inevitably wonder what it is you do all day long. If your initial checklist
    shows that you have twenty-five servers, six of which have data and logs on the
    C: drive, and two others that have no backups at all, it is going to be easy for
    you to report later that your twenty-five servers now have backups running and
    all drives configured properly.


    In the end, it is not your effort that people will remember. It is the end result.
    Make certain you keep good track of your progress so that the facts can help provide
    people a way to understand exactly what you have been delivering.


    **Get Proactive**


    Now that a lot of your research is complete, you should have a very clear picture
    about what you are up against in your new environment. As time goes on, you will
    be establishing your own identity in your new role. Most DBAs will fall into one
    of two categories: *Mr. Right* or *Mr. Right Now*.


    Which one of the following would best describe how you handle your work tasks
    or how you want to be perceived?


    *Mr. Right Now*: This is the guy that is always available to solve any problem.
    He is very visible, everyone knows his name, and everyone knows what he does.
    He fixes things. It doesn’t matter what time of the day or night, he is always
    there. When there is a problem—any problem—you call Mr. Right Now and he finds
    a way to solve that problem. He rarely fails to deliver and everyone praises his
    hard work and effort. However, whenever he solves a problem, he solves it just
    enough to move on to the next emergency.


    *Mr. Right*: This is the guy that you rarely see. When there is a problem, he
    pokes his head around the corner, but since there are few problems, people never
    really know that he is around. In fact, people often ask, “So, what is it you
    do around here?” But when Mr. Right solves a problem, he solves it for good, making
    sure that he never has to touch that server again to address that issue. Then,
    he proactively does that same fix against the rest of his servers before they
    experience a similar issue, thereby solving problems before they happen.


    Which one would you rather be? Would you rather be the guy that is very visible
    and that the end users love because he is always there to fix things? Or would
    you rather be the guy that people rarely see and have no idea what you do for
    a living?


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 35](index-51_1.png)


    **CHAPTER 2: Now What Do I Do?**


    **33**


    How about you answer this question: Which one (Mr. Right or Mr. Right Now) would
    you consider to be a junior DBA, and which a senior DBA?


    **TIP:** Being able to fix things does not make you a senior DBA. You become a
    senior DBA by making certain that things do not break in the first place.


    While Mr. Right Now may be getting slaps on the back from the end users for all
    of his efforts, the ultimate question must be asked: is he fixing problems that
    are being caused by his fixing of an earlier problem?


    There are two reasons for someone to be a Mr. Right Now. The first is that there
    are far too many problems at the onset of their tenure and they are going to be
    fighting a long battle to get all of the fires under control. The second reason
    is that they are a junior-level administrator who knows just enough to fix the
    current issue.


    Mr. Right, however, is the guy that not only puts out the fires as they happen,
    but also has the knowledge and experience to put controls into place to make certain
    that the problems are less likely to happen again. So, they not only know enough
    to fix the current issue, but *they know enough to solve the root cause of the
    problem*. The solutions they put in place do not complicate the environment; they
    help to lessen their workload.


    As you start your new role, there is a very good chance that you will need to
    be Mr.


    Right Now for an extended period of time, even if you are at a senior level. It
    could be the case that there is way more work than one person can handle. Of course
    you have your checklist and are well organized, so you know where to focus you
    efforts first. But as you go down that checklist, you need to keep thinking about
    solutions, as opposed to a quick fix.


    Over time, you really want to be Mr. Right, and have your environment configured
    in such a way that it practically heals itself. And do not despair if you feel
    that you are losing out on an opportunity to show people how valuable you are
    to the company.


    Indeed, as you continue to configure your environment and are proactive in heading
    off potential trouble, you will find you have more time to be visible in different
    ways.


    **TIP:** Work smarter, not harder. Find ways to be proactive in solving issues.


    Would you rather be stuck in a server room all weekend or be helping someone learn
    to write better T-SQL code? Would you rather be rebooting boxes as quickly as
    possible during the business day as you troubleshoot some issue, or would you
    rather be helping someone in finance understand how to configure and build their
    own reports using SSRS? Trust me, there are plenty of ways for you to show your
    value without having to run around the place as if it were on fire.


    Back in college we were always told to study smarter, not harder. The same principal
    applies here: work smarter, not harder.


