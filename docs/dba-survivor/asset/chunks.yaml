- fmt: 'Love for RAID 5 isn’t universal. Frustrated DBA James Morle created a tongue-in-cheek
    group known as the BAARF Party in 2003. The goal of The BAARF Party is to battle
    against any and all RAID 5. You can visit the web site and read the arguments
    at the following URL:


    [`http://miracleas.com/BAARF/BAARF2.html`](http://miracleas.com/BAARF/BAARF2.html).


    You may or may not agree with the BAARF Party—so far, I’ve chosen to keep an open
    mind—but some of the papers hosted on the BAARF Party’s site are well thought
    out, and are worth the time to read.


    ## RAID 1+0


    This level is commonly known as mirroring with striping, and is sometimes referred
    to as `RAID 10` or even `RAID 1/0`. You would configure a striped set (`RAID 0`)
    and then mirror them (`RAID 1`) onto a similar striped set. Figure 3–6 shows how
    that might look.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 43](index-59_1.png)


    ## CHAPTER 3: Some Basics


    ### 41


    **Figure 3–6.** *RAID 1+0 mirroring a striped set of drives*


    The `RAID 1+0` level offers the highest performance of any `RAID` level. It provides
    fault tolerance, too. And it costs more money, because you need twice as many
    disks.


    ## Which RAID Level Do You Want?


    It depends, of course. Do you want your data to stay online when one drive fails?
    Most people do, but perhaps you do not. In that case, `RAID 0` is for you! No
    need to worry about parity or mirroring, just configure your disks as one big
    striped set and be done with it.


    What about performance and costs? Most people care about them as well, and chances
    are you care, too. But when it comes to SQL Server, you will find that no one
    `RAID` level is going to suit your every need. Wait a minute . . . do you know
    what those needs are yet? Well, let’s discuss them in their simplest view.


    ## Your Needs


    You really only have three basic needs:


    - Placement of your database data files

    - Placement of your transaction log files

    - Placement of your tempdb database files

    - Placement of your database backups


    OK, that’s four needs, but that’s it, really. Your data files should be placed
    on one drive or set of disks (array), your transaction log files should be placed
    on a separate drive or set of disks, your tempdb files should be placed onto a
    third set, and your backups should be stored either on a fourth set or on a different
    server altogether (which is often recommended).


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 44](index-60_1.png)


    ### 42


    ## CHAPTER 3: Some Basics


    Each item in the preceding list leads to a different set of needs. In a perfect
    world with bottomless budgets and hardware designed specifically for database
    servers, you would be able to configure everything with `RAID 10`. Your server’s
    operating system files would go on one array, and your pagefile would go on a
    different array, as well as your data, your transaction logs, and your tempdb
    files. That would be five different arrays, configured as `RAID 10`, meaning you
    would need (at a minimum) twenty hard drives. In case you are wondering, that
    is a lot of drives. Most servers do not come with twenty hard drive bays.


    But do you really need all of that? I have thousands of databases under my care
    right now, and 99 percent of them would perform just fine with `RAID 5` for data,
    transaction logs, and tempdb. But there are a handful of systems that do need
    some extra care and attention. And when the time arises for you to help performance
    tune a system, it is going to benefit you if you just stick to the basics.


    **NOTE:** Tom’s comment here about many systems performing just fine on `RAID
    5` arrays fits my own experience. It’s why I haven’t been able to quite bring
    myself to drink the BAARF Kool-Aid. – Jonathan Gennick


    The biggest thing for you to recognize when troubleshooting is where you are feeling
    the pressure. Is it in your tempdb? Then put your tempdb on a `RAID 10`, if possible.
    Is it your transaction logs? Put your transaction logs onto a different `RAID
    10` set, if possible. If not, then go with a `RAID 1` for your transaction logs.
    Is it your data files? Your data should also go onto yet a different set of `RAID
    10`, but if that is not possible, then go with `RAID 5` for your data.


    The bottom line is this: know the difference between these `RAID` levels as well
    as which ones you want to use. That knowledge will be a benefit when you are helping
    to architect the design of any system.


    ## The ABCs of SANs for DBAs


    By now you should have the concept of `RAID` safely under your belt to the point
    that you could sit down with a member of your server team and talk a bit of shop.
    If you did, you will probably find that most of your servers will not have enough
    drive bays for all the different flavors of `RAID` that you might desire. You
    may even find yourself asking for different `RAID` configurations that result
    in conversations around external storage . . . and then someone, somewhere, will
    mention the following: `SAN`.


    `SAN` stands for *storage area network*, and will either be the most wonderful
    thing you can possibly imagine (high probability) or a nightmare (not likely,
    but possible). The concept behind a `SAN` is quite simple: bundle together hundreds
    of physical disks, partition them out in logical units (called `LUNs`), and connect
    your servers to the `LUNs` for their storage. Figure 3–7 shows how one `SAN` can
    serve many servers.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 45](index-61_1.png)


    ## CHAPTER 3: Some Basics


    ### 43


    **Figure 3–7.** *Drives in a SAN can be assigned to many servers as needed.*


    This way, if you needed to add additional storage to a server, it would be as
    easy as assigning some additional `LUNs`. In fact, most of the time, all your
    `SAN` administrator is going to ask you is, “How much space do you need now, Bob?”
    No need to swap out smaller drives for larger ones and let your `RAID` controller
    rebuild your array. Sounds wonderful, right?


    Maybe.


    Let’s imagine for a moment that you are the `SAN` administrator. You have hundreds
    of disks bundled together into `LUNs`. Which `RAID` level would you use for all
    these disks? If you answered `RAID 5` for its cost-effectiveness and large storage
    volume, then you may have a future in `SAN` administration when your DBA days
    are over.


    Chances are your `SAN` is indeed configured with `RAID 5`. If you recall, `RAID
    5` is not always ideal for a database server. Don’t panic: when used correctly
    in a `SAN`, `RAID 5` arrays may not be ideal, but they can still be good enough.


    ## Why RAID 5 Might Work for You


    The first reason not to fear is that `SAN` controllers have built-in cache: memory
    that serves as a buffer between your server and its storage arrays. Whenever SQL
    Server issues writes to your drives, they’re considered committed as soon as the
    data enters the `SAN` controller’s cache. When configured correctly, that cache
    is faster than any drive arrays, whether they’re `RAID 5` or `RAID 10`. While
    your `SAN` may be at `RAID 5`, your data is not going to disk directly; it gets
    dumped into cache first and then goes to disk.


    Your queries do not wait for it to get to disk; they think it is already there
    when in fact it is actually still in cache. You see no performance issues until
    such time as you would actually fill your cache, in which case you have performance
    issues *everywhere*, not just on one server.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 46](index-62_1.png)


    ### 44


    ## CHAPTER 3: Some Basics


    The second reason you should not panic is because you may have not seen any actual
    performance problem yet. Just because your `SAN` may be at `RAID 5` is not enough
    reason to raise the hairs on your back. No sir, you had better be able to provide
    some proof that you are seeing performance issues that could be related to `SAN`
    performance.'
