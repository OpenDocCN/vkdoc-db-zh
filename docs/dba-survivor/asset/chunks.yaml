    # 第三章：基础知识


    ## 集群


    物理服务器更昂贵的选项之一是`集群`的概念。要构建集群，首先需要构建主服务器（或`节点`），该服务器具有一组定义好的共享磁盘（称为`资源组`）。在多个节点之间共享磁盘并不一定需要`SAN`，但拥有`SAN`可以让工作更轻松一些。然后将节点添加到集群中，每个节点都被定义为连接到同一个资源组。


    整个集群在您的网络中显示为单个服务器实例，但实际上它由多个服务器实例组成。您会听到关于主节点、辅助节点或故障转移节点的讨论；所有这些术语本质上都是服务器实例的别称。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 49](img/index-65_1.png)


    图 3-8 展示了一个四节点集群的示例。这种布局乍看之下可能与图 3-7 相似。区别在于集群中的所有四个节点共享访问同一组数据库磁盘。此外，外部世界将该集群视为单个数据库实例。


    **图 3-8.** *围绕共享磁盘构建的四节点集群*


    集群之所以如此昂贵，是因为它们通常需要大量额外硬件，例如`SAN`，而且集群中的每个节点都需要非常相似的硬件。然而，借助虚拟化，您可以考虑在虚拟服务器上使用集群以降低成本。您甚至可以找到一些第三方软件应用程序，帮助您在高峰使用时段故障转移虚拟实例，这（理论上）有助于提高您的可用性（通常称为`正常运行时间`）。


    如果这听起来好得难以置信，那是因为它确实好得难以置信。集群技术必然存在缺点，即使在虚拟服务器上也是如此，对吧？绝对如此。


    我曾多次有机会在集群上加载软件。尽管供应商向我保证只需在主节点上加载他们的软件，但我经常发现当集群故障转移到不同节点时，他们的软件无法正常工作。


    历史上，您会发现许多关于在主节点上应用`SQL`修复程序和服务包，而这些补丁在其他节点上失效的恐怖故事。尽管每个版本的`SQL`和服务器`操作系统`都在努力减少这些麻烦，但您仍应意识到它们仍有可能发生。


    使用集群的另一个缺点是您的站点需要管理的服务器数量增加。虽然拥有三个节点听起来是实现高可用性的绝佳方式，但对于需要管理这些实例并应用服务包的人员来说，这可能就不那么美好了。相信我，管理员和所有人一样，也希望能偶尔享受一个悠闲的周末。


    还需要更多集群的缺点吗？故障转移所需的时间量怎么样？根据您的配置，可能少于一分钟，也可能需要几分钟。那么在故障转移期间正在进行的事务和连接会怎样？它们会看到服务中断吗？很有可能，因此您的应用程序最好能够处理此类事件；否则，一旦人们察觉到问题，您的电话就会响个不停。


    还需要更多缺点？好吧，集群无法保护您免受磁盘故障的影响怎么样？如果您正在设置集群并认为这是一个良好的`灾难恢复`策略，那么您就是在直面墨菲先生并嘲笑他的定律。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 50](img/index-66_1.png)


    ## 日志传送


    `日志传送`是一种传统的`高可用性`方法，允许您同时在两处（或更多处）维护数据。其理念非常简单：


    1.  在生产服务器上对您的`事务日志`进行备份。

    2.  将该备份文件复制到另一台服务器。

    3.  将该备份文件还原到另一台服务器。


    然后，您就拥有了一个（如图 3-9 所示）应该与因任何原因离线的数据库看起来完全一样的数据库。嗯，差不多与离线的数据库一样。我的意思是，您多久执行一次那些`事务日志`备份？每分钟？五分钟？十分钟？十五分钟？


    **图 3-9.** *日志传送场景*


    您能够容忍多长时间的数据丢失？告诉最终用户他们将丢失过去十分钟或十五分钟的数据，这可以接受吗？即使您每分钟执行一次`事务日志`备份，您能确定备份会在那一分钟内完成吗？根据使用情况和活动量，您可能会发现`事务日志`备份完成时间超过一分钟，这意味着文件复制需要一些时间，而还原操作耗时更久。这对于每分钟尝试执行备份和还原的作业意味着什么？


    这意味着它们会落后。如果落后太多，您将不得不从头开始重新初始化所有内容。根据涉及的文件和数据库大小，这可能会让您忙上一个漫长的下午和晚上。


    但对许多人来说，`日志传送`是可行之路。`日志传送`不需要`SAN`或所涉及的每台服务器硬件完全相同。许多供应商会推荐`日志传送`作为一种以相当低的开销实现`高可用性`的方式。与集群相比，您不一定能节省成本，但您确实可以降低整体管理成本，因为服务包、修复程序以及供应商软件的安装更容易实施。


    请注意，`日志传送`需要手动干预。与集群可以提供自动故障转移不同，`日志传送`需要人工介入，手动将备份服务器启动并运行为生产服务器。


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![图片 51](img/index-67_1.png)


    ## 复制


    您经常会参与关于`复制`的讨论。我的第一个提醒是确保每个人都清楚正在讨论的是哪种`复制`。


    您需要关注两种主要类型的`复制`：`SQL 复制`和`SAN 复制`。它们不是一回事——事实上它们非常不同，并且可以根据您的需求一起存在或单独存在。


    `SAN 复制`只是您的站点配置`SAN`以适应将数据位从 A 点移动到 B 点的一种方式。这主要是为了`高可用性`目的，但您也会遇到认为它也用于`灾难恢复`目的的人。根据`SAN
    复制`的配置方式，它绝对是一个`高可用性`选项，并且可能也是一个`灾难恢复`选项。例如，如果您有两个站点，并且正在从 A 站点向 B 站点进行`SAN 复制`，那么您肯定配置了一个`高可用性`场景。然而，当发生同时影响
    A 站点和 B 站点的事件时，两个`SAN`都会宕机。您的`高可用性`显然将荡然无存，除非您还同时复制到第三个站点，否则您的`灾难恢复`也同样如此。


    我现在就能听到人们说他们可以从`磁带`恢复，因此从技术上讲他们有`灾难恢复`解决方案。我会告诉他们我此刻告诉您的同样的话：*那么您的磁带备份就是您的灾难恢复解决方案，而不是您的`SAN
    复制`。* 我希望这有助于澄清困惑。


    至于`SQL 复制`，您有多种类型可供选择。每种类型都与其他不同，并且各自适用于您的特定需求。您应该对不同类型及其适用场景有基本的了解。您的环境和所给需求的性质将是选择`SQL
    复制`模式时的主要决策因素。

    '
- fmt: '# CHAPTER 3: Some Basics


    Before we even get started, a quick overview of replication terminology is in
    order. Many of the terms used (`publisher`, `subscriber`, `distributor`) are used
    in the publishing industry,


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 52](index-68_1.png)


    and thus the publishing industry is often used to describe replication concepts.
    So the term `publisher` means exactly what you would expect: someone who publishes
    information, like a newspaper. A `distributor` would be someone who distributes
    the newspapers to the people who are `subscribers`. Simple enough? Great, now
    let us have a look at the different types of SQL replication.


    ## Transactional Replication


    Transactional replication is when transactions committed at the publisher are
    then replicated and committed at the subscriber. This makes no sense in terms
    of newspapers or magazines, so think of this as if you were reading the online
    version of your local newspaper. If someone makes a change to the articles on
    the web site, you will see the changes the next time you refresh your browser.


    When would you want to use this type of replication? Often the answer has to do
    with systems that have a high volume of transactions and the need for low latency,
    and the fact that one of your subscribers is a not a Microsoft SQL Server. Also,
    the subscribers in a transactional replication topology are usually considered
    to be read-only, but it is possible to allow for subscribers to make changes to
    data that are then pushed back to the publisher.


    Transactional replication makes sense when you have a server that is not SQL Server,
    or when you have the need for more than one subscriber. If you only have one subscriber
    and you only have SQL Server database servers, then you should go with database
    mirroring instead, as discussed later in the chapter. But take into consideration
    the scope of the changes you want replicated. With database mirroring, all transactions
    are mirrored and thus replicated, but with transactional replication, only those
    transactions marked for replication will be replicated.


    ## Merge Replication


    This might be the biggest beast of all replication technologies. Changes at both
    the publisher and subscribers are merged together through the use of triggers.
    Think of a newspaper needing to publish the evening news that has ten reporters
    in the field updating stories. Now let’s say that two reporters are covering the
    same story and try to publish different versions. Which version will get written?
    How would you resolve the conflicts?


    Merge replication is not for the faint of heart. When this replication breaks,
    you had better have a method in place to put it back together again. There can
    be a lot of administrative overhead with merge replication. So why would anyone
    want to use this?


    Most often I see it used when you have disconnected users from a central publisher.


    Often times you will see the example of having members of a sales team in the
    field visiting clients. Their mobile devices and laptops are not always connected,
    but they may be gathering data. When they do connect to the network, they want
    their data to update accordingly. Conflicts can (and will) arise if another sales
    representative tries to update the same data.


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 53](index-69_1.png)


    This replication topology should only be used if you have the need for many disconnected
    clients to connect back to the main office. If that is a requirement for your
    shop, then merge replication may be the answer. I would rather eat shards of broken
    glass than implement merge replication, but that’s just me. Some people make a
    great living eating broken glass at carnivals. You should choose your own path
    in life.


    ## Snapshot Replication


    Snapshot replication requires less administrative overhead than the other two
    forms of replication. Just as it sounds, a snapshot of the database is taken and
    replicated as a whole to a subscriber. This is very useful when you have data
    that changes infrequently.


    Perhaps you might need to update your list of available products to your sales
    team a few times a year. When the sales representatives connect to your network,
    a snapshot of your data can be pushed out to them so they see all the new products.


    Be careful using snapshot replication on very large data sets. You can easily
    cause network issues if you were to decide to push a 100GB snapshot out to 100
    subscribers in the middle of the day.


    If you do not have the multi–server platform requirements that would force you
    into transactional replication, and if you do not want the hassles of merge replication,
    then snapshot replication may be the right solution for your shop. While snapshot
    replication is the easiest type to manage, there’s another method of moving data
    around that requires even less work and time.


    ## Database Mirroring


    Recently I was asked to explain database mirroring in the simplest terms possible.


    About the only thing I could think to say was the following story:


    Long ago, in ancient times, in the time before time, people were asked to make
    copies of their work. This led to some very interesting inventions throughout
    history, most notably the printing press, the polygraph, and ultimately the modern
    day copy machines that became a big hit at holiday office parties. But as society
    progressed to the point where deliverables were measured in fractions of a second
    as opposed to days or weeks, these archaic methods were no longer good enough.
    More and more demand was placed upon people to deliver the same piece of information
    into many different places all at the same time without any loss of service.


    Soon a great battle took place between two giant beasts named Cluster and Log
    Shipping, who had easily beaten down the inferior SQL Replication in a pay-per-view
    event two months prior. Cluster and Log Shipping battled for years, neither giving
    an inch to the other, until such time that they were both badly beaten, weakened,
    and barely able to stand.


    At the time of SQL Server 2005’s release, a great hero rose from the ashes of
    Cluster and the ruins of Log Shipping. The hero’s name was Database Mirroring,
    and promised that everything was going to be different. Database Mirroring promised
    real-time synchronization of your data without the hassle of log shipping. Database
    Mirroring promised faster failover without the need for a cluster. In short, Database
    Mirroring promised the best of all other technologies, with none of the shortcomings,
    and even brought along a witness to attest to its abilities.


    And there you have it. Database mirroring looks to give you the very best in HA
    by combining all of the good in other tools and none of the bad. However, there
    is one tiny little thing that makes database mirroring not as perfect as people
    may think: you only get one mirror.


    Oh sure, you can go to a clothing store and stand in those fancy mirrors that
    let you see parts of your body you didn’t even know existed. Well, database mirroring
    gives you one mirror, no more. So, if you have the need to mirror your data to
    more than one location, then you need a different solution. You could, if so desired,
    configure your mirror and also configure log shipping to other servers. But the
    one mirror itself will not provide that option for multiple servers.


    Other than that one issue, database mirroring is a fine alternative to clustering,
    log shipping, and replication. It truly does offer a wonderful HA solution that
    will satisfy the HA requirements for many shops. In fact, asynchronous mirroring
    *could* be used for DR


    [www.it-ebooks.info](http://www.it-ebooks.info)


    ![Image 54](index-70_1.png)'
