    ****About the Author**


    **Thomas LaRock** is a seasoned IT professional with over a decade of technical
    and management experience. Currently serving as a database


    administration manager with a financial services company, Thomas has


    progressed through several roles including programmer, analyst, and DBA.


    Prior to being a DBA, he worked at several software and consulting


    companies at customer sites in the United States and abroad. Thomas


    holds a MS degree in Mathematics from Washington State University, is a member
    of Quest Software’s Association of SQL Server Experts, currently serves on the
    Board of Directors for the Professional Association for SQL


    Server (PASS), and is a SQL Server MVP.


