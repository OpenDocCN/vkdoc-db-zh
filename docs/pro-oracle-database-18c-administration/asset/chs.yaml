- "# 组织脚本\n\n当您拥有一组脚本和实用程序时，您应该对它们进行组织，以便为每个数据库服务器一致地实施。它们应成为您安装 Oracle 二进制文件后步骤的一部分。\n\
  这些脚本不仅能够作为此过程的一部分一致地部署，还可以用于测试数据库的安装和设置。请按照以下步骤为环境中的每个数据库服务器实施上述 DBA 实用程序：\n\n1.\
  \  创建用于存储脚本的操作系统目录。\n2.  将您的脚本和实用程序复制到步骤 1 中创建的目录。\n3.  配置您的启动文件以初始化环境。\n\n这些步骤在以下部分中有详细说明。\n\
  \n## 步骤 1. 创建目录\n\n在每个数据库服务器上创建一组标准目录来存储您的自定义脚本。`oracle`用户`HOME`目录下的一个目录通常是一个不错的位置。我通常创建以下三个目录：\n\
  \n*   `HOME/bin`。用于存放以自动方式（例如从`cron`）运行的 Shell 脚本的标准位置。\n*   `HOME/bin/log`。用于存放由计划\
  \ Shell 脚本生成的日志文件的标准位置。\n*   `HOME/scripts`。用于存储 SQL 脚本的标准位置。\n\n您可以使用`mkdir`命令创建上述目录，如下所示：\n\
  \n```\n$ mkdir -p $HOME/bin/log\n$ mkdir $HOME/scripts\n```\n\n脚本放置在何处或目录如何命名并不重要，只要您有一个标准位置，这样当您在服务器之间导航时，总能在相同位置找到相同的文件即可。换句话说，标准本身是什么并不重要，重要的是您有一个标准。\n\
  \n## 步骤 2. 将文件复制到目录\n\n将您的实用程序和脚本放入相应的目录。将以下文件复制到`HOME/bin`目录：\n\n```\ndba_setup\n\
  dba_fcns\ntbsp_chk.bsh\nconn.bsh\nfilesp.bsh\n```\n\n将以下 SQL 脚本放入`HOME/scripts`目录：\n\
  \n```\nlogin.sql\ntop.sql\nlock.sql\nusers.sql\n```\n\n## 步骤 3. 配置启动文件\n\n将以下代码放入`.bashrc`文件或您使用的\
  \ Shell 对应的等效启动文件中（对于 Korn shell 是`.profile`）。以下是如何配置`.bashrc`文件的示例：\n\n```\n\n\
  ```\n\n\n\n```\n# 引入全局定义\nif [ -f /etc/bashrc ]; then\n. /etc/bashrc\nfi\n#\n# 引入\
  \ Oracle 数据库操作系统变量\n. /etc/oraset \n#\n```\n\n\nThe request was rejected because\
  \ it was considered high risk\n\n\n"
- '# 通过 oraset 脚本设置 Oracle 操作系统变量。


  '
- "# 有关设置操作系统变量的更多详情，请参见第 2 章。\n. /etc/oraset $1\n#\nuserlist=\"system sys dbsnmp\
  \ dip oracle_ocm outln\"\nfor u1 in $userlist\ndo\n#\ncase $u1 in\nsystem)\npwd=manager\n\
  cdb=$1\n;;\nsys)\npwd=\"change_on_install\"\ncdb=\"$1 as sysdba\"\n;;\n*)\npwd=$u1\n\
  cdb=$1\nesac\n#\necho \"select 'default' from dual;\" | \\\nsqlplus -s $u1/$pwd@$cdb\
