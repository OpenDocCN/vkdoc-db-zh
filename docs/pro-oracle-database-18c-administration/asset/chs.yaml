- "# 调查磁盘使用情况\n\n要进一步诊断问题（例如磁盘空间不足），您需要直接登录到远程服务器。通常，您需要以 Oracle 软件的所有者身份（通常是 `oracle`\
  \ 操作系统账户）登录。首次登录到服务器时，导致数据库挂起或出现问题的一个原因是挂载点已满。带有人类可读选项 `-h` 的 `df` 命令有助于验证磁盘使用情况：\n\
  ```\n$ df -h\n```\n任何已满的挂载点都需要进行调查。如果包含 `ORACLE_HOME` 的挂载点已满，那么在连接到数据库时会收到如下错误：\n\
  ```\nLinux Error: 28: No space left on device\n```\n要解决挂载点已满的问题，首先要识别可以移动或删除的文件。通常，从查找旧的跟踪文件开始；通常有一些旧文件可以安全删除。\n\
  \n## 定位警报日志和跟踪文件\n\n默认的警报日志目录路径结构如下：\n```\nORACLE_BASE/diag/rdbms/<DB_UNIQUE_NAME>/<INSTANCE_NAME>/trace\n\
  ```\n或者在 SQL*Plus 中查看目录：\n```\nSQL> show parameter background\n```\n> 注意\n> 您可以通过设置\
  \ `DIAGNOSTIC_DEST` 初始化参数来覆盖警报日志的默认目录路径。\n\n通常，`db_unique_name` 与 `instance_name`\
  \ 相同。然而，在 RAC 和 Data Guard 环境中，`db_unique_name` 通常与 `instance_name` 不同。您可以使用以下查询验证目录路径：\n\
  ```\nSQL> select value from v$diag_info where name = 'Diag Trace';\n```\n警报日志的名称遵循以下格式：\n\
  ```\nalert_<ORACLE_SID>.log\n```\n您还可以通过操作系统命令从 OS 定位警报日志（无论数据库是否已启动）：\n```\n$ cd\
  \ $ORACLE_BASE\n$ find . -name alert_<ORACLE_SID>.log\n```\n在上面的 `find` 命令中，您需要将\
  \ `<ORACLE_SID>` 值替换为您的数据库名称。\n\n如第 3 章所示，建议设置一个操作系统函数来帮助您导航到警报日志的位置。下面是一个这样的函数（您需要根据您的环境进行修改）：\n\
  ```\nfunction bdump {\nif [ \"$ORACLE_SID\" = \"O18C\" ]; then\ncd /orahome/app/oracle/diag/rdbms/o18c/O18C/trace\n\
  elif [ \"$ORACLE_SID\" = \"O12c\" ]; then\ncd /orahome/app/oracle/diag/rdbms/o12c/O12C/trace\
  \  \nelif [ \"$ORACLE_SID\" = \"O11R2\" ]; then\ncd /orahome/app/oracle/diag/rdbms/o11r2/O11R2/trace\n\
  fi\n}\n```\n现在您可以输入 `bdump`，然后将被置于包含数据库警报日志的工作目录中。找到正确的文件后，检查最近的条目是否有错误，然后在同一目录中查找跟踪文件：\n\
  ```\n$ ls -altr *.tr*\n```\n如果其中任何跟踪文件超过几天，请考虑移动或删除它们。\n\n## 删除文件\n不用说，在删除文件时要非常小心。在尝试解决问题时，最不想做的事情就是让情况变得更糟。意外删除一个关键文件可能是灾难性的。对于您识别为候选删除的任何文件，请考虑移动（而不是删除）它们。如果您有可用空间的挂载点，请将文件移过去，放置几天后再删除它们。\n\
  \n> 提示\n> 考虑使用 Automatic Diagnostic Repository Command Interpreter (ADRCI) 实用程序来清除旧的跟踪文件。有关更多详细信息，请参阅《Oracle\
  \ Database Utilities Guide》，可从 Oracle 技术网络区网站下载。\n\n如果您已识别出可以删除的文件，请在实际删除它们之前先创建要删除的文件列表。至少在删除任何文件之前执行此操作：\n\
  ```\n$ ls -altr <filename>\n```\n查看 `ls` 命令返回的结果后，删除文件。此示例使用 Linux/Unix 的 `rm` 命令永久删除文件：\n\
  ```\n$ rm <filename>\n```\n您也可以根据文件年龄删除文件。例如，假设您确定任何超过 2 天的跟踪文件都可以安全删除。通常，`find`\
  \ 命令与 `rm` 命令结合使用来完成此任务。在删除文件之前，首先显示 `find` 命令的结果：\n```\n$ find . -type f -mtime\
  \ +2 -name \"*.tr*\"\n```\n如果您对文件列表满意，则添加 `rm` 命令来删除它们：\n```\n$ find . -type f -mtime\
  \ +2 -name \"*.tr*\" | xargs rm\n```\n在上面的代码行中，`find` 命令的结果通过管道传递给 `xargs` 命令，该命令为\
  \ `find` 命令找到的每个文件执行 `rm` 命令。这是一种基于年龄删除文件的有效方法。但是，请务必确认您知道将要删除哪些文件。\n\n另一个有时会占用大量空间的文件是\
  \ `listener.log` 文件。由于此文件由侦听器进程主动写入，因此您不能简单地删除它。在第 19 章中有一个关于此作业的示例，可以执行该作业或查看它是否正在运行。如果您需要保留此文件的内容以检查连接问题，请先将其复制到有可用磁盘空间的备份位置，然后截断该文件。在此示例中，`listener.log`\
  \ 文件被复制到 `/u01/backups`，然后截断该文件，如下所示：\n```\n$ cp listener.log /u01/backups\n```\n\
  接下来，使用 `cat` 命令将 `listener.log` 的内容替换为 `/dev/null` 文件（它包含零字节）：\n```\n$ cat /dev/null\
  \ > listener.log\n```\n此文件需要替换为空内容（/dev/null），而不是删除文件并让系统创建新文件，因为此文件附加到一个进程（侦听器）。替换文件将允许写入操作在进程运行时继续到该文件。对于\
  \ `alert.log` 文件也需要执行相同的操作。\n\n"
- "# 检查警报日志\n\n处理数据库问题时，`alert.log` 文件应该是您检查相关错误消息的首批文件之一。您可以使用操作系统工具或 ADRCI 实用程序来查看\
  \ `alert.log` 文件和相应的跟踪文件。\n\n## 通过操作系统工具查看警报日志\n\n导航到包含 `alert.log` 的目录后，您可以通过查看文件末尾（最靠下的部分）来查看最新消息（换句话说，最新的消息写入文件的末尾）。要查看最后\
  \ 50 行，请使用 `tail` 命令：\n```\n$ tail -50 alert_<ORACLE_SID>.log\n```\n您可以使用 `-f` 选项持续查看最新条目：\n\
  ```\n$ tail -f alert_<ORACLE_SID>.log\n```\n您还可以使用操作系统编辑器（如 `vi`）直接打开 `alert.log`：\n\
  ```\n$ vi alert_<ORACLE_SID>.log\n```\n\n\n有时，定义一个函数来打开 `alert.log` 文件会非常方便，无论你当前的工作目录在哪里。接下来的几行代码定义了一个函数，它能在\
  \ 11g 或 10g 环境中定位并使用 `view` 命令打开 `alert.log`：\n\n```\n#-----------------------------------------------------------#\n\
  # 查看告警日志\nfunction valert {\nif [ \"$ORACLE_SID\" = \"O18C\" ]; then\nview /orahome/app/oracle/diag/rdbms/o18c/O18C/trace/alert_O18C.log\n\
  elif [ \"$ORACLE_SID\" = \"O12C\" ]; then\nview /orahome/app/oracle/diag/rdbms/o12c/O12C/trace/alert_O12C.log\
  \  \nelif [ \"$ORACLE_SID\" = \"O11R2\" ]; then\nview /orahome/app/oracle/diag/rdbms/o11r2/O11R2/trace/alert_O11R2.log\n\
  fi\n} # valert\n#-----------------------------------------------------------#\n\
  ```\n\n通常，上述代码会被放置在启动文件中，以便在你登录服务器时自动定义该函数。一旦函数定义好，你可以通过输入以下命令来查看 `alert.log`：\n\
  \n```\n$ valert\n```\n\n在检查 `alert.log` 的末尾时，留意表明以下类型问题的错误：\n\n*   归档进程因磁盘空间不足而挂起\n\
  *   文件系统空间耗尽\n*   表空间空间耗尽\n*   ORA-600 或 7445 错误\n*   缓冲区高速缓存或共享池内存耗尽\n*   表明数据文件缺失或损坏的介质错误\n\
  *   表明写归档日志存在问题的错误；例如，\n\n```\nORA-19502: write error on file \"/ora01/fra/o18c/archivelog/...\n\
  ```\n\n对于 `alert.log` 文件中列出的严重错误消息，几乎总有一个对应的跟踪文件。例如，上述错误消息的伴随信息如下：\n\n```\nErrors\
  \ in file /orahome/app/oracle/diag/rdbms/o18c/O18C/trace/O18C_ora_5665.trc\n```\n\
  \n检查跟踪文件通常（但不总是）能为问题提供更深入的洞察。\n\n## 使用 ADRCI 工具查看 alert.log\n\n你可以使用 ADRCI 工具来查看\
  \ `alert.log` 文件的内容。从操作系统运行以下命令来启动 ADRCI 工具：\n\n```\n$ adrci\n```\n\n你应该会看到一个提示符：\n\
  \n```\nadrci>\n```\n\n使用 `SHOW ALERT` 命令来查看 `alert.log` 文件：\n\n```\nadrci> show\
  \ alert\n```\n\n如果服务器上有多个 Oracle 主目录，系统将提示你选择要查看哪个 `alert.log`。`SHOW ALERT` 命令将使用操作系统设置为默认编辑器的工具来打开\
  \ `alert.log`。在 Linux/Unix 系统上，默认编辑器来源于操作系统 `EDITOR` 变量（通常设置为 `vi` 之类的工具）。\n\n**提示**\n\
  当显示 `alert.log` 时，如果你不熟悉 `vi` 并想退出，首先按 Escape 键，然后按住 Shift 键的同时按下冒号 (`:`) 键。接着，输入\
  \ `q!`。这应该会退出 `vi` 编辑器并返回到 ADRCI 提示符。\n\n你可以在 ADRCI 中使用 `SET EDITOR` 命令覆盖默认编辑器。此示例将默认编辑器设置为\
  \ `emacs`：\n\n```\nadrci> set editor emacs\n```\n\n你可以使用 `TAIL` 选项查看 `alert.log`\
  \ 中最后的 `N` 行。以下命令显示 `alert.log` 的最后 50 行：\n\n```\nadrci> show alert -tail 50\n```\n\
  \n如果你有多个 Oracle 主目录，可能会看到如下消息：\n\n```\nDIA-48449: Tail alert can only apply to single\
  \ ADR home\n```\n\nADRCI 工具不会假设你想在服务器上使用一个 Oracle 主目录而不是另一个。要专门为 ADRCI 工具设置 Oracle\
  \ 主目录，首先使用 `SHOW HOMES` 命令显示所有可用的 Oracle 主目录：\n\n```\nadrci> show homes\n```\n\n\
  以下是此服务器的一些示例输出：\n\n```\ndiag/rdbms/o18c/O18C\ndiag/rdbms/o18cp/O18CP\n```\n\n现在，使用\
  \ `SET HOMEPATH` 命令。这将把 `HOMEPATH` 设置为 `diag/rdbms/o18c/O18C`：\n\n```\nadrci> set\
  \ homepath  diag/rdbms/o18c/O18C\n```\n\n要持续显示文件末尾，请使用此命令：\n\n```\nadrci> show alert\
  \ -tail -f\n```\n\n按 Ctrl+C 可以中断对 `alert.log` 文件的持续查看。要显示 `alert.log` 中包含特定字符串的行，请使用\
  \ `MESSAGE_TEXT LIKE` 命令。此示例显示包含 `ORA-27037` 字符串的消息：\n\n```\nadrci> show alert -p\
  \ \"MESSAGE_TEXT LIKE '%ORA-27037%'\"\n```\n\n你将看到一个文件，其中包含 `alert.log` 中与指定字符串匹配的所有行。\n\
  \n**提示**\n有关如何使用 ADRCI 工具的完整详细信息，请参阅《Oracle 数据库实用程序指南》。\n\n## 通过操作系统工具识别瓶颈\n\n在\
  \ Oracle 领域，有时人们倾向于假设你为一台 Oracle 数据库配备了专用机器。此外，这个数据库是最新的 Oracle 版本，已完全打补丁，并由复杂的图形化工具监控。这个数据库环境是完全自动化的，并通过可视化工具快速定位问题、高效隔离和解决问题来保持无故障运行。如果你生活在这样理想的世界中，那么你可能不需要本章的任何内容。\n\
  \n让我描绘一个略有不同的场景：一个环境，一台机器上运行着十几个数据库。有一个 MySQL 数据库；一个 PostgreSQL 数据库；以及 Oracle 11g、12c\
  \ 和 18c 版本的混合数据库。此外，许多这些旧数据库使用的是 Oracle 的非终端版本，因此不受 Oracle 支持。由于业务无法承担可能破坏依赖这些数据库的应用程序的风险，没有计划升级任何这些不受支持的数据库。注意：此时也应理解对业务的安全风险；尽管如此，多数据库平台是可能的。\n\
  \n那么，当有人报告数据库应用程序性能不佳时，在这种环境中该怎么做？在这种情况下，通常是其他数据库中的某些东西导致同一台机器上的其他应用程序表现不佳。可能不是\
  \ Oracle 进程或 Oracle 数据库导致了问题。\n\n在这种情况下，从使用操作系统工具开始调查问题几乎总是更有效。操作系统工具与数据库无关。操作系统性能工具有助于精确定位资源消耗最多的位置，无论数据库供应商或版本如何。\n\
  \n在 Linux/Unix 环境中，有多种工具可用于监控资源使用情况。表 21-1 总结了用于诊断性能问题的最常用操作系统实用程序。熟悉这些操作系统命令的工作原理以及如何解读输出，将使你能够更好地诊断服务器性能问题，尤其是当性能拖累盒上所有其他应用程序的是非\
  \ Oracle 甚至是非数据库进程时。\n\n**表 21-1** 性能和监控实用程序\n\n| 工具 | 用途 |\n| --- | --- |\n| `vmstat`\
  \ | 监控进程、CPU、内存和磁盘 I/O 瓶颈 |\n| `top` | 识别消耗资源最多的会话 |\n| `watch` | 定期运行另一个命令 |\n\
  | `ps` | 识别消耗 CPU 和内存最多的会话；用于识别消耗系统资源最多的 Oracle 会话 |\n| `mpstat` | 报告 CPU 统计信息 |\n\
  | `sar` | 显示当前和历史的 CPU、内存、磁盘 I/O 和网络使用情况 |\n| `free` | 显示空闲和已使用的内存 |\n| `df` | 报告空闲磁盘空间\
  \ |\n| `du` | 显示磁盘使用情况 |\n| `iostat` | 显示磁盘 I/O 统计信息 |\n| `netstat` | 报告网络统计信息 |\n\
  \n在诊断性能问题时，确定操作系统在何处受限是很有用的。例如，尝试识别问题是否与 CPU、内存或 I/O 相关，或者是这些因素的组合。\n\n\n"
- '# 系统监控工具简介


  每当出现应用程序性能问题或可用性故障时（从数据库管理员的视角看），第一个被问到的问题通常是：“数据库怎么了？”无论问题根源何在，责任往往落在数据库管理员身上，需要确认数据库运行是否良好。我通常通过确定系统范围内的资源消耗情况来处理这个问题。有两个
  Linux/Unix 操作系统工具对于显示系统范围内的资源使用情况特别有用：


  *   `vmstat`

  *   `top`


  `vmstat`（虚拟内存统计）工具旨在帮助您快速识别服务器上的瓶颈。`top` 实用程序则提供了系统资源使用的动态、实时视图。这两个实用工具将在接下来的两节中讨论。


  ## 使用 vmstat


  `vmstat` 实用程序显示关于进程、内存、分页、磁盘 I/O 和 CPU 使用情况的实时性能信息。此示例展示了在不指定任何选项的情况下，使用 `vmstat`
  显示默认输出：


  ```

  $ vmstat

  procs  -----------memory---------- ---swap-- -----io---- --system-- ----cpu----

  r  b   swpd   free   buff  cache    si   so    bi    bo   in    cs us sy id wa

  14  0  52340  25272   3068 1662704    0    0    63    76    9    31 15  1 84  0

  ```


  在解释 `vmstat` 输出时，可以使用以下一些通用启发式方法：


  *   如果 `wa`（等待 I/O 的时间）列的值很高，这通常表明存储子系统过载。

  *   如果 `b`（被阻塞的进程）持续大于 0，则可能表示 CPU 处理能力不足。

  *   如果 `so`（换出到磁盘的内存）和 `si`（从磁盘换入的内存）持续大于 0，则可能存在内存瓶颈。


  默认情况下，运行 `vmstat`（不提供任何选项）时，仅显示一行服务器统计数据。这一行输出给出了自上次系统重启以来计算出的平均统计数据。这对于快速快照来说是足够的。但是，如果您想在一段时间内收集指标，请使用以下语法的
  `vmstat`：


  ```

  $ vmstat 间隔秒数 报告次数

  ```


  在此模式下，`vmstat` 会报告统计数据，从一个间隔到下一个间隔进行采样。例如，如果您希望每 2 秒报告一次系统统计数据，总共报告 10 次，可以输入以下命令：


  ```

  $ vmstat 2 10

  ```


  您还可以将 `vmstat` 输出发送到一个文件。这对于分析一段时间的历史性能非常有用。此示例每 5 秒采样一次统计数据，总共生成 60 份报告，并将输出记录到文件中：


  ```

  $ vmstat 5 60 > vmout.perf

  ```


  此外，`vmstat` 实用程序可以与 `watch` 工具结合使用。`watch` 命令用于定期执行另一个程序。在此示例中，`watch` 每 5 秒运行一次
  `vmstat` 命令，并在屏幕上高亮显示每个快照之间的任何差异：


  ```

  $ watch –n 5 –d vmstat

  Every 5.0s: vmstat                                    Thu Aug  9 13:27:57 2007

  procs -----------memory---------- ---swap-- -----io---- --system-- ----cpu----

  r  b   swpd   free   buff  cache  si   so    bi    bo   in    cs us sy id wa

  0  0    144  15900  64620 1655100   0    0     1     7   16     4  0  0 99  0

  ```


  在 `watch -d`（差异）模式下运行 `vmstat` 时，您将在屏幕上直观地看到从快照到快照的变化。要退出 `watch`，请按 `Ctrl+C`。


  请注意，`vmstat` 内存列的默认计量单位是千字节。如果您想以兆字节为单位查看内存统计信息，请使用 `S m`（以兆字节显示统计信息）选项：


  ```

  $ vmstat –S m

  ```


  **提示**

  使用 `man vmstat` 或 `vmstat --help` 命令获取有关此实用程序的更多文档。


  ## 使用 top


  另一个用于识别资源密集型进程的工具是 `top` 命令。使用此实用程序可以快速识别哪些进程是服务器上资源的最大消耗者。默认情况下，`top` 会重复刷新（每 3
  秒）有关最消耗 CPU 的进程的信息。运行 `top` 的最简单方式如下：


  ```

  $ top

  ```


  以下是输出的一个片段：


  ```

  top - 13:34:32 up 19 min,  2 users,  load average: 0.05, 0.16, 0.24

  Tasks: 176 total,   1 running, 175 sleeping,   0 stopped,   0 zombie

  Cpu(s):  2.0%us,  0.7%sy,  0.0%ni, 91.6%id,  5.7%wa,  0.0%hi,  0.0%si,  0.0%st

  Mem:    787028k total,   748744k used,    38284k free,      1836k buffers

  Swap:  1605624k total,    31896k used,  1573728k free,      377668k cached

  PID USER      PR  NI  VIRT  RES  SHR S %CPU %MEM    TIME+  COMMAND

  4683 root      20   0  279m  14m 7268 S  2.0  1.9   0:01.61 gnome-terminal

  3826 root      20   0  218m 9944 4200 S  1.7  1.3   0:02.80 Xorg

  3592 oracle    -2   0  601m  18m  15m S  0.7  2.4   0:09.36 ora_vktm_o12c

  ```


  最高消耗会话的进程标识符 (PID) 列在第一列 (`PID`)。您可以使用此信息查看 PID 是否映射到数据库进程（有关将 PID 映射到数据库进程的详细信息，请参阅下一节“将操作系统进程映射到
  SQL 语句”）。


  在 `top` 运行时，您可以交互式地更改其输出。例如，如果您键入重定向字符 (`>`)，这将使 `top` 排序的列向右移动一个位置。下表列出了一些可用于将
  `top` 显示更改为您所需格式的关键功能。


  表 21-2：交互式更改 `top` 输出的命令

  | 命令 | 功能 |

  | :--- | :--- |

  | 空格键 | 立即刷新输出 |

  | `<` 或 `>` | 将排序列向左或向右移动一个位置。默认情况下，`top` 按 CPU 列排序。 |

  | `D` | 更改刷新时间 |

  | `R` | 反转排序顺序 |

  | `Z` | 切换彩色输出 |

  | `H` | 显示帮助菜单 |

  | `F` 或 `O` | 选择排序列 |


  键入 `q`，或按 `Ctrl+C` 以退出 `top`。下表描述了 `top` 默认输出中显示的几个列。


  表 21-3：`top` 输出的列描述

  | 列 | 描述 |

  | :--- | :--- |

  | `PID` | 唯一的进程标识符 |

  | `USER` | 运行进程的操作系统用户名 |

  | `PR` | 进程的优先级 |

  | `NI` | 进程的 Nice 值。负值表示高优先级；正值表示低优先级。 |

  | `VIRT` | 进程使用的虚拟内存总量 |

  | `RES` | 进程使用的非交换物理内存 |

  | `SHR` | 进程使用的共享内存 |

  | `S` | 进程状态 |

  | `CPU` | 自上次屏幕刷新以来进程消耗的 CPU 百分比 |

  | `MEM` | 进程消耗的物理内存百分比 |

  | `TIME` | 进程使用的 CPU 总时间 |

  | `TIME+` | 进程使用的 CPU 总时间，显示到百分之一秒 |

  | `COMMAND` | 用于启动进程的命令行 |


  您也可以使用 `b`（批处理模式）选项运行 `top`，并将输出发送到文件以供以后分析：


  ```

  $ top –b > tophat.out

  ```


  在批处理模式下运行时，`top` 命令将持续运行，直到您终止它（使用 `Ctrl+C`）或达到指定的迭代次数。您可以将前面的 `top` 命令与 `nohup`
  和 `&` 结合使用，以批处理模式运行它，无论您是否登录系统都能保持其运行。这样做的危险在于，您可能会忘记它，最终创建一个非常大的输出文件（并惹恼系统管理员）。


  如果您有一个特定的进程需要监控，请使用 `p` 选项监控某个 PID，或使用 `U` 选项监控某个用户名。您还可以使用 `d` 和 `-n` 选项指定延迟和迭代次数。以下示例监控
  `oracle` 用户，延迟为 5 秒，共 25 次迭代：



  '
- '# 将操作系统进程映射到 SQL 语句


  在识别操作系统进程时，查看哪些进程消耗最多的 CPU 是很有用的。如果资源消耗大户是数据库进程，将其映射到数据库作业或查询也很有用。要确定消耗最多 CPU 资源的进程
  ID，可以使用类似 `ps` 的命令：


  ```bash

  $ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head

  ```


  这是一段输出示例：


  ```

  14.6 24875 oracle   ?      oracleo18c (DESCRIPTION=(LOCAL=YES)(ADDRESS=...

  0.8 21613 oracle   ?      ora_vktm_o18c

  0.1 21679 oracle   ?      ora_mmon_o18c

  ```


  从输出中可以看到，操作系统会话 24875 是 CPU 资源的最大消费者。输出还表明该进程与 `o12c` 数据库相关联。掌握这些信息后，登录到相应的数据库，并使用以下
  SQL 语句来确定与操作系统进程 24875 关联的程序类型：


  ```sql

  SQL> select

  ''USERNAME : '' || s.username|| chr(10) ||

  ''OSUSER   : '' || s.osuser  || chr(10) ||

  ''PROGRAM  : '' || s.program || chr(10) ||

  ''SPID     : '' || p.spid    || chr(10) ||

  ''SID      : '' || s.sid     || chr(10) ||

  ''SERIAL#  : '' || s.serial# || chr(10) ||

  ''MACHINE  : '' || s.machine || chr(10) ||

  ''TERMINAL : '' || s.terminal

  from v$session s,

  v$process p

  where s.paddr = p.addr

  and   p.spid  = &PID_FROM_OS;

  ```


  运行该命令时，SQL*Plus 将提示您输入用于替代 `&PID_FROM_OS` 的值。在此示例中，您将输入 `24875`。以下是相关输出：


  ```

  USERNAME : MV_MAINT

  OSUSER   : oracle

  PROGRAM  : sqlplus@speed2 (TNS V1-V3)

  SPID     : 24875

  SID      : 111

  SERIAL#  : 899

  MACHINE  : speed2

  TERMINAL : pts/4

  ```


  在此输出中，`PROGRAM` 值表明一个 SQL*Plus 会话是在服务器上消耗过多资源的程序。接下来，运行以下查询以显示与操作系统 PID 关联的 SQL
  语句（在此示例中，服务器进程标识符 [SPID] 是 24875）：


  ```sql

  SQL> select

  ''USERNAME : '' || s.username || chr(10) ||

  ''OSUSER   : '' || s.osuser   || chr(10) ||

  ''PROGRAM  : '' || s.program  || chr(10) ||

  ''SPID     : '' || p.spid     || chr(10) ||

  ''SID      : '' || s.sid      || chr(10) ||

  ''SERIAL#  : '' || s.serial#  || chr(10) ||

  ''MACHINE  : '' || s.machine  || chr(10) ||

  ''TERMINAL : '' || s.terminal || chr(10) ||

  ''SQL TEXT : '' || sa.sql_text

  from v$process p,

  v$session s,

  v$sqlarea sa

  where p.addr = s.paddr

  and s.username is not null

  and s.sql_address = sa.address(+)

  and s.sql_hash_value = sa.hash_value(+)

  and p.spid= &PID_FROM_OS;

  ```


  结果在 `SQL TEXT` 列中显示了消耗资源的 SQL 语句。以下是输出的一段摘录：


  ```

  USERNAME : MV_MAINT

  OSUSER   : oracle

  PROGRAM  : sqlplus@speed2 (TNS V1-V3)

  SPID     : 24875

  SID      : 111

  SERIAL#  : 899

  MACHINE  : speed2

  TERMINAL : pts/4

  SQL TEXT : select a.table_name from dba_tables a,dba_indexes b,dba_objects c...

  ```


  当在一台服务器上运行多个数据库并且遇到服务器性能问题时，有时很难确定是哪个数据库及相关进程导致了问题。在这些情况下，您必须使用操作系统工具来识别系统上资源消耗最高的会话。


  在 Linux/Unix 环境中，您可以使用 `ps`、`top` 或 `vmstat` 等工具来识别消耗最高的操作系统进程。`ps` 工具非常方便，因为它可以让您识别消耗最多
  CPU 或内存的进程。前面的 `ps` 命令识别了消耗 CPU 最多的进程。这里，它被用来识别消耗 Oracle 内存最多的进程：


  ```bash

  $ ps -e -o pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head

  ```


  一旦确定了与数据库关联的消耗最高的进程，您就可以基于 SPID 查询数据字典视图，以识别数据库进程正在执行什么。


  ## OS Watcher


  Oracle 提供了一系列用于收集和存储 CPU、内存、磁盘和网络使用情况指标的脚本。在 Linux/Unix 系统上，OS Watcher 工具套件自动化了统计信息的收集，使用的工具包括
  `top`、`vmstat`、`iostat`、`mpstat`、`netstat` 和 `traceroute`。该工具还有一个可选的图形组件，用于直观地显示性能指标。


  您可以从 Oracle 的 MOS 网站获取 OS Watcher。对于 Linux/Unix 版本，请参阅 MOS note 301137.1 或标题为“OS
  Watcher User Guide”的文档。有关 Windows 版本的 OS Watcher 的详细信息，请参阅 MOS note 433472.1。


  ## 查找资源密集型 SQL 语句


  隔离性能不佳的查询的最佳方法之一是让用户或开发人员抱怨某个特定的 SQL 语句。在这种情况下，不需要进行任何侦探工作。您可以直接定位需要调整的 SQL 查询。


  然而，在调查性能问题时，您并不经常有幸让人类明确告知从何处查看。有多种方法可用于确定数据库中哪些 SQL 语句消耗了最多的资源：


  *   实时执行统计信息

  *   近实时统计信息

  *   Oracle 性能报告


  这些技术将在接下来的几个部分中描述。


  ### 监控实时 SQL 执行统计信息


  您可以使用以下查询从 `V$SQL_MONITOR` 中进行选择，以监控 SQL 查询的近实时资源消耗：


  ```sql

  SQL> select * from (

  select a.sid session_id, a.sql_id

  ,a.status

  ,a.cpu_time/1000000 cpu_sec

  ,a.buffer_gets, a.disk_reads

  ,b.sql_text sql_text

  from v$sql_monitor a

  ,v$sql b

  where a.sql_id = b.sql_id

  order by a.cpu_time desc)

  where rownum <=20;

  ```


  该查询的输出不容易完整地放在一页上。以下是输出的子集：


  ```

  SESSION_ID  SQL_ID         STATUS      CPU_SEC  BUFFER_GETS  DISK_READS

  ----------  -------------  ---------  --------  -----------  -----------   SQL_TEXT---------

  139  d07nngmx93rq7  DONE       331.88    5708         3490 select  count(*)

  130  9dtu8zn9yy4uc  EXECUTING  11.55     5710         248 select  task_name

  ```


  在查询中，首先使用内联视图检索所有记录并按 `CPU_TIME` 降序组织它们。然后，外部查询使用 `ROWNUM` 伪列将结果集限制为前 20 行。


  您可以修改前面的查询，以便按您选择的统计信息对结果进行排序，或者仅显示当前正在执行的查询。例如，下一个 SQL 语句监控当前正在执行的查询，并按磁盘读取次数排序：


  ```sql

  SQL> select * from (

  select a.sid session_id, a.sql_id, a.status

  ,a.cpu_time/1000000 cpu_sec

  ,a.buffer_gets, a.disk_reads

  ,substr(b.sql_text,1,35) sql_text

  from v$sql_monitor a

  ,v$sql b

  where a.sql_id = b.sql_id

  and   a.status=''EXECUTING''

  order by a.disk_reads desc)

  where rownum <=20;

  ```




  '
- '# Oracle SQL 监控与性能诊断


  ## V$SQL_MONITOR 视图


  `V$SQL_MONITOR` 中的统计数据每秒更新一次，因此您可以查看资源消耗的变化情况。默认情况下，如果 SQL 语句并行运行或消耗超过 5 秒的 CPU
  或 I/O 时间，就会收集这些统计数据。


  `V$SQL_MONITOR` 视图包含 `V$SQL`、`V$SQLAREA` 和 `V$SQLSTATS` 视图中包含的统计数据的一个子集。`V$SQL_MONITOR`
  视图显示每个资源密集型 SQL 语句执行的实时统计数据，而 `V$SQL`、`V$SQLAREA` 和 `V$SQLSTATS` 则包含多次执行 SQL 语句所产生的累积统计数据集。


  SQL 语句执行结束后，运行时统计数据不会立即从 `V$SQL_MONITOR` 中刷新。根据数据库中的活动情况，统计数据可能会保留一段时间。然而，如果您的数据库非常活跃，统计数据可能会在查询完成后不久被刷新。


  **提示**

  您可以通过以下列的组合在 `V$SQL_MONITOR` 中唯一标识 SQL 语句的执行：`SQL_ID`、`SQL_EXEC_START`、`SQL_EXEC_ID`。


  ## 识别高资源消耗 SQL


  您也可以查询 `V$SQLSTATS` 等视图来确定哪些 SQL 语句消耗了过量的资源。例如，使用以下查询根据 CPU 时间识别消耗资源最多的十个查询：


  ```sql

  SQL> select * from(

  select s.sid, s.username, s.sql_id

  ,sa.elapsed_time/1000000, sa.cpu_time/1000000

  ,sa.buffer_gets, sa.sql_text

  from v$sqlarea sa

  ,v$session s

  where s.sql_hash_value = sa.hash_value

  and   s.sql_address    = sa.address

  and   s.username is not null

  order by sa.cpu_time desc)

  where rownum <= 10;

  ```


  在上面的查询中，使用了一个内联视图首先检索所有记录，并按 `CPU_TIME` 降序对输出进行排序。然后外部查询使用 `ROWNUM` 伪列将结果集限制为前 10
  行。该查询可以很容易地修改为按 `CPU_TIME` 以外的列排序。例如，如果您想按 `BUFFER_GETS` 报告资源使用情况，只需在 `ORDER BY`
  子句中用 `BUFFER_GETS` 替换 `CPU_TIME` 即可。`CPU_TIME` 列以微秒计算；为了将其转换为秒，它被除以 1,000,000。


  **提示**

  请记住，`V$SQLAREA` 包含的是给定会话持续期间的累积统计数据。因此，如果一个会话多次运行相同的查询，该连接的统计数据将是该查询所有运行的总和。相比之下，`V$SQL_MONITOR`
  显示的是给定 SQL 语句当前运行累积的统计数据。因此，每次查询运行时，`V$SQL_MONITOR` 中都会报告该查询的新统计数据。


  ## Oracle 诊断工具


  Oracle 提供了几种用于诊断数据库性能问题的实用程序：


  *   自动工作量存储库（AWR）

  *   自动数据库诊断监视器（ADDM）

  *   活动会话历史（ASH）

  *   Statspack


  AWR、ADDM 和 ASH 是多年前在 Oracle Database 10g 中引入的。这些工具提供了高级报告功能，使您可以排查和解决性能问题。这些新实用程序需要从
  Oracle 获得额外许可。较旧的 Statspack 实用程序是免费的，不需要许可。


  所有这些工具都严重依赖底层的 `V$` 动态性能视图。Oracle 维护着大量的这些视图，用于跟踪和累积数据库性能指标。例如，如果您运行以下查询，您会注意到在
  Oracle Database 18c 中，大约有 760 个 `V$` 视图：


  ```sql

  SQL> select count(*) from v$fixed_table where name like ''V$%'';

  COUNT(*)

  ```


  `V$FIXED_TABLE` 提供有关动态性能视图的信息，包括 RAC 环境的底层 X$ 表和 GV$ 视图。


  Oracle 性能实用程序依赖于从这些内部性能视图收集的定期快照。关于性能统计，最有用的两个视图是 `V$SYSSTAT` 和 `V$SESSTAT` 视图。`V$SYSSTAT`
  视图提供超过 800 种类型的数据库统计信息。这个 `V$SYSSTAT` 视图包含整个数据库的信息，而 `V$SESSTAT` 视图包含关于各个会话的统计信息。`V$SYSSTAT`
  和 `V$SESSTAT` 视图中的一些值代表资源的当前使用情况。这些值是：


  *   当前打开的游标数

  *   当前登录数

  *   当前会话游标缓存数

  *   已分配的工作区内存


  其余的值是累积的。`V$SYSSTAT` 中的值是从实例启动开始对整个数据库累积的。`V$SESSTAT` 中的值是从会话开始起对每个会话累积的。一些更重要的与性能相关的累积值如下：


  *   使用的 CPU

  *   一致读

  *   物理读

  *   物理写


  对于累积统计数据，衡量周期性使用的方法是在起始点记录一个统计值，然后在稍后的时间点再次记录该值并捕获差值。这就是 Oracle 性能实用程序（如 AWR 和 Statspack）所采用的方法。Oracle
  会定期获取动态等待接口视图的快照并将其存储在存储库中。


  以下部分详细介绍了如何通过 SQL 命令行访问 AWR、ADDM、ASH 和 Statspack。


  **提示**

  您可以从 Enterprise Manager 访问 AWR、ADDM 和 ASH。如果您有权访问 Enterprise Manager，您会发现该界面相当直观且视觉上很有帮助。


  ### 使用 AWR


  AWR 报告适用于查看整个系统的性能并识别消耗资源最多的 SQL 查询。运行以下脚本以生成 AWR 报告：


  ```sql

  SQL> @?/rdbms/admin/awrrpt

  ```


  从 AWR 输出中，您可以通过检查报告的“SQL Ordered by Elapsed Time”或“SQL Ordered by CPU Time”部分来识别消耗资源最多的语句。以下是一些示例输出：


  ```sql

  SQL ordered by CPU Time                  DB/Inst: O18C/o18c  Snaps: 1668-1669

  -> Resources reported for PL/SQL code includes the resources used by all SQL

  statements called by the code.

  -> %Total - CPU Time      as a percentage of Total DB CPU

  -> %CPU   - CPU Time      as a percentage of Elapsed Time

  -> %IO    - User I/O Time as a percentage of Elapsed Time

  -> Captured SQL account for   3.0E+03% of Total CPU Time (s):              0

  -> Captured PL/SQL account for  550.9% of Total CPU Time (s):              0

  CPU                   CPU per           Elapsed

  Time (s)  Executions    Exec (s) %Total   Time (s)   %CPU   %IO         SQL Id

  ---------- ------------ ---------- ------ ---------- ------ ----- --------------

  3.2           1        3.24  930.5       10.5   30.9  74.9  93jktd5vtxb98

  ```


  Oracle 将自动每小时对数据库进行一次快照，并填充存储统计数据的底层 AWR 表。默认情况下，统计数据会保留 7 天。


  您也可以通过运行 `awrsqrpt.sql` 报告为特定 SQL 语句生成 AWR 报告。当您运行以下脚本时，系统将提示您输入感兴趣的查询的 `SQL_ID`：


  ```sql

  SQL> @?/rdbms/admin/awrsqrpt.sql

  ```


  ### 使用 ADDM


  ADDM 报告提供了有关哪些 SQL 语句是调优候选者的有用信息。使用以下 SQL 脚本生成 ADDM 报告：


  ```sql

  SQL> @?/rdbms/admin/addmrpt

  ```


  查找报告中标识为“SQL Statements Consuming Significant Database Time”的部分。以下是一些示例输出：


  ```

  FINDING 2: 29% impact (65043 seconds)


  SQL statements consuming significant database time were found.

  RECOMMENDATION 1: SQL Tuning, 6.7% benefit (14843 seconds)

  ACTION: Investigate the SQL statement with SQL_ID "46cc3t7ym5sx0" for

  ```




  ADDM 报告通过分析 AWR 表中的数据，识别潜在瓶颈和高资源消耗的 SQL 查询。


  ## 使用 ASH


  ASH 报告让您能够聚焦于近期执行过、可能仅短暂存在的 SQL 语句。运行以下脚本生成 ASH 报告：


  ```sql

  SQL> @?/rdbms/admin/ashrpt

  ```


  在输出结果中查找标记为"Top SQL"的部分。以下是一段示例输出：


  ```

  Top SQL with Top Events           DB/Inst: O18C/o18c  (Jan 30 14:49 to 15:14)

  Sampled #

  SQL ID             Planhash        of Executions     % Activity

  ----------------------- -------------------- -------------------- --------------

  Event                          % Event Top Row Source                    % RwSrc

  ------------------------------ ------- --------------------------------- -------

  dx5auh1xb98k5           1677482778                    1          46.57

  CPU + Wait for CPU               46.57 HASH JOIN                           23.53

  ```


  以上输出表明该查询正在等待 CPU 资源。在这种情况下，问题可能是另一个查询占用了 CPU 资源。

  ASH 报告何时比 AWR 或 ADDM 报告更有用？AWR 和 ADDM 输出展示的是按总数据库时间排序的高消耗 SQL。如果 SQL 性能问题是短暂且稍纵即逝的，它可能不会出现在
  AWR 和 ADDM 报告中。在这些情况下，ASH 报告更为有用。


  ## 使用 Statspack


  如果您没有使用 AWR、ASH 和 ADDM 报告的许可，免费的 Statspack 工具可以帮助您识别性能不佳的 SQL 语句。以`SYS`身份运行以下脚本安装
  Statspack：


  ```sql

  SQL> @?/rdbms/admin/spcreate.sql

  ```


  此脚本会创建拥有 Statspack 存储库的`PERFSTAT`用户。创建完成后，以`PERFSTAT`用户身份连接，并运行此脚本来启用 Statspack
  统计信息的自动收集：


  ```sql

  SQL> @?/rdbms/admin/spauto.sql

  ```


  收集了一些快照后，您可以以`PERFSTAT`用户身份运行以下脚本创建 Statspack 报告：


  ```sql

  SQL> @?/rdbms/admin/spreport.sql

  ```


  报告创建后，查找标记为"SQL Ordered by CPU"的部分。以下是一段示例输出：


  ```

  SQL ordered by CPU  DB/Inst: O18C/o18c  Snaps: 30-31

  -> Total DB CPU (s):           1,432

  -> Captured SQL accounts for  100.5% of Total DB CPU

  -> SQL reported below exceeded  1.0% of Total DB CPU

  CPU                  CPU per          Elapsd                        Old

  Time (s)   Executions  Exec (s)  %Total   Time (s)    Buffer Gets  Hash Value

  ---------- ------------ ---------- ------ ---------- --------------- ----------

  1430.41            1   1430.41    99.9    1432.49            482   690392559

  Module: SQL*Plus

  select a.table_name from my_tables

  ```


  > **提示：** Statspack 文档请参见 `ORACLE_HOME/rdbms/admin/spdoc.txt` 文件。


  ## 检测与解决锁问题


  有时，开发人员或应用用户会报告一个通常只需几秒运行的进程，现在需要几分钟，并且似乎没有任何进展。在这些情况下，问题通常是以下之一：


  *   空间相关问题（例如，归档重做日志目标已满，导致所有事务挂起）。

  *   一个进程锁定了表中的一行，但既未提交也未回滚，从而阻止其他会话修改同一行。


  在此场景中，首先检查 `alert.log` 看看最近是否有明显的问题发生（例如表空间无法再分配区间）。如果 `alert.log` 文件中没有明显问题，则运行
  SQL 查询以查找锁问题。此处列出的查询是第 3 章介绍的锁检测脚本的更复杂版本。该查询显示诸如锁定会话的 SQL 语句和等待会话的 SQL 语句等信息：


  ```sql

  SQL> set lines 80

  SQL> col blkg_user form a10

  SQL> col blkg_machine form a10

  SQL> col blkg_sid form 99999999

  SQL> col wait_user form a10

  SQL> col wait_machine form a10

  SQL> col wait_sid form 9999999

  SQL> col obj_own form a10

  SQL> col obj_name form a10

  SQL> col blkg_sql form a50

  SQL> col wait_sql form a50

  --

  SQL> select

  s1.username    blkg_user, s1.machine     blkg_machine

  ,s1.sid         blkg_sid, s1.serial#     blkg_serialnum

  ,s1.process     blkg_OS_PID

  ,substr(b1.sql_text,1,50) blkg_sql

  ,chr(10)

  ,s2.username    wait_user, s2.machine     wait_machine

  ,s2.sid         wait_sid, s2.serial#     wait_serialnum

  ,s2.process     wait_OS_PID

  ,substr(w1.sql_text,1,50) wait_sql

  ,lo.object_id   blkd_obj_id

  ,do.owner       obj_own, do.object_name obj_name

  from v$lock          l1

  ,v$session       s1

  ,v$lock          l2

  ,v$session       s2

  ,v$locked_object lo

  ,v$sqlarea       b1

  ,v$sqlarea       w1

  ,dba_objects     do

  where s1.sid = l1.sid

  and s2.sid = l2.sid

  and l1.id1 = l2.id1

  and s1.sid = lo.session_id

  and lo.object_id = do.object_id

  and l1.block = 1

  and s1.prev_sql_addr = b1.address

  and s2.sql_address = w1.address

  and l2.request > 0;

  ```


  此查询的输出不太适合放在一页上。运行此查询时，您需要对其进行格式化以便在屏幕上显示。以下是一段示例输出，表明`SALES`表被锁定，并且另一个进程正在等待锁被释放：


  ```

  BLKG_USER  BLKG_MACHI  BLKG_SID BLKG_SERIALNUM BLKG_OS_PID

  ---------- ---------- --------- -------------- ------------------------

  BLKG_SQL                                           C WAIT_USER  WAIT_MACHI

  -------------------------------------------------- - ---------- ----------

  WAIT_SID WAIT_SERIALNUM WAIT_OS_PID

  -------- -------------- ------------------------

  WAIT_SQL                                           BLKD_OBJ_ID OBJ_OWN

  -------------------------------------------------- ----------- ----------

  OBJ_NAME


  MV_MAINT   speed2            32            487 26216

  update sales set sales_amt=100 where sales_id=1      MV_MAINT   speed2

  116            319 25851

  ```


  这种情况在应用程序未在代码中适当地显式发出`COMMIT`或`ROLLBACK`时很常见。这会导致锁留在行上，并在锁被释放前阻止事务继续进行。在此场景中，您可以尝试找出阻塞事务的用户，并查看该用户是否需要点击一个类似“提交您的更改”的按钮。如果无法做到这一点，您可以手动终止其中一个会话。请注意，终止会话可能会产生不可预见的影响（例如回滚用户认为已提交的数据）。


  如果您决定终止某个用户会话，需要确定要终止的会话的`SID`和序列号。确定后，使用`ALTER SYSTEM KILL SESSION`语句终止会话：


  ```sql

  SQL> alter system kill session ''32,487'';

  ```


  再次提醒，终止会话时要谨慎。确保您了解终止会话并因此回滚该会话中当前所有活动事务的影响。


  另一种终止会话的方法是使用操作系统命令，例如`KILL`。在之前的输出中，您可以从`BLKG_OS_PID`和`WAIT_OS_PID`列中确定操作系统进程 ID。在操作系统层面终止进程之前，请确保该进程并非关键进程。对于此示例，要终止阻塞的操作系统进程，首先检查阻塞进程的
  PID：


  ```bash

  $ ps -ef | grep 26216

  ```


  以下是一段示例输出：


  ```

  oracle   26222 26216  0 16:49 ?        00:00:00 oracleo12c

  ```


  然后，使用`KILL`命令，如下所示：


  ```bash

  $ kill -9  26216

  ```


  `KILL`命令将会立即终止进程。与该进程关联的所有未提交事务将由 Oracle 进程监视器回滚。


  ## 解决开放游标问题




  ## OPEN_CURSORS 参数


  `OPEN_CURSORS` 初始化参数决定了一个会话可以同时打开的游标数量上限。此设置是按会话生效的。默认值 50 对于任何应用程序来说通常都太低了。当应用程序超过允许的打开游标数时，会抛出以下错误：


  ```

  ORA-01000: maximum open cursors exceeded

  ```


  通常，在以下情况下会遇到上述错误：


  *   `OPEN_CURSORS` 初始化参数设置得过低

  *   开发人员编写的代码未能正确关闭游标


  要调查此问题，首先需要确定该参数的当前设置：


  ```

  SQL> show parameter open_cursors;

  ```


  如果该值小于 300，请考虑将其设置得更高一些。对于繁忙的 OLTP 系统，通常将此值设置为 1,000。您可以在数据库打开状态下动态修改该值，如下所示：


  ```

  SQL> alter system set open_cursors=1000;

  ```


  如果您使用的是 `spfile`，请考虑同时在内存和 `spfile` 中进行更改：


  ```

  SQL> alter system set open_cursors=1000 scope=both;

  ```


  在将 `OPEN_CURSORS` 设置为更高的值后，如果应用程序仍然超过最大值，那么您的代码中很可能存在未能正确关闭游标的问题。


  ### 调查游标使用情况


  如果您工作的环境有数千个到数据库的连接，您可能只想查看消耗游标最多的前几个会话。以下查询使用一个内联视图和伪列 `ROWNUM` 来显示前 20 个值：


  ```

  SQL> select * from (

  select a.value, c.username, c.machine, c.sid, c.serial#

  from v$sesstat  a

  ,v$statname b

  ,v$session  c

  where a.statistic# = b.statistic#

  and   c.sid        = a.sid

  and   b.name       = ''opened cursors current''

  and   a.value     != 0

  and   c.username IS NOT NULL

  order by 1 desc,2)

  where rownum < 21;

  ```


  如果单个会话的打开游标数超过 1,000，那么很可能是代码编写方式导致游标没有被关闭。当达到限制时，应该有人检查应用程序代码，以确定是否有游标未被关闭。


  **提示**

  建议您查询 `V$SESSION` 而不是 `V$OPEN_CURSOR` 来确定打开的游标数量。`V$SESSION` 提供的当前打开游标计数更为准确。


  ## 疑难解答撤销表空间问题


  撤销表空间的问题通常属于以下性质：


  *   `ORA-01555: snapshot too old`

  *   `ORA-30036: unable to extend segment by ... in undo tablespace ''UNDOTBS1''`


  上述错误可能由多种不同问题引起，例如撤销表空间大小设置不正确，或者 SQL 或 PL/SQL 代码编写不当。快照过旧也可能在导出操作期间由于更新非常大的表而出现，并且通常在撤销保留时间或大小设置不当时遇到。对于导出操作，在较安静的时间重新运行是一个简单的解决方法。


  ### 确定撤销表空间大小是否正确


  假设您有一个运行时间很长的 SQL 语句，它正在抛出 `ORA-01555: snapshot too old` 错误，并且您想确定增加撤销表空间的空间是否有助于缓解该问题。运行以下查询以识别撤销表空间的潜在问题。该查询检查过去一天内发生的问题：


  ```

  SQL> select to_char(begin_time,''MM-DD-YYYY HH24:MI'') begin_time

  ,ssolderrcnt    ORA_01555_cnt, nospaceerrcnt  no_space_cnt

  ,txncount       max_num_txns, maxquerylen    max_query_len

  ,expiredblks    blck_in_expired

  from v$undostat

  where begin_time > sysdate - 1

  order by begin_time;

  ```


  以下是一些示例输出。为适应页面，输出的一部分已被省略：


  ```

  BEGIN_TIME       ORA_01555_CNT NO_SPACE_CNT MAX_NUM_TXNS BLCK_IN_EXPIRED

  ---------------- ------------- ------------ ------------ ---------------

  01-31-2013 08:21             0            0           51               0

  01-31-2013 08:31             0            0            0               0

  01-31-2013 12:11             0            0          629             256

  ```


  `ORA_01555_CNT` 列指示您的数据库遇到 `ORA-01555: snapshot too old` 错误的次数。如果此列报告非零值，您需要执行以下一项或多项任务：


  *   确保代码中不包含游标循环内的 `COMMIT` 语句。

  *   调优抛出错误的 SQL 语句，使其运行得更快。

  *   确保您有良好的统计信息（以便您的 SQL 能高效运行）。

  *   增加 `UNDO_RETENTION` 初始化参数值。


  `NO_SPACE_CNT` 列显示在撤销表空间中请求空间的次数。在此示例中，没有此类请求。然而，如果 `NO_SPACE_CNT` 报告非零值，则您可能需要向撤销表空间添加更多空间。


  `V$UNDOSTAT` 视图中最多存储 4 天的信息。统计信息每 10 分钟收集一次，表中最多有 576 行。如果您在过去 4 天内停止并重新启动了数据库，则此视图仅包含您上次启动数据库以来的信息。


  ### 使用 Oracle 撤销顾问


  获取撤销表空间大小设置建议的另一种方法是使用 Oracle 撤销顾问，您可以通过从 `SELECT` 语句中调用 PL/SQL `DBMS_UNDO_ADV`
  包来使用它。以下查询显示当前撤销大小以及撤销保留设置为 900 秒时的建议大小：


  ```

  SQL> select

  sum(bytes)/1024/1024                  cur_mb_size

  ,dbms_undo_adv.required_undo_size(900) req_mb_size

  from dba_data_files

  where tablespace_name =

  (select

  value

  from v$parameter

  where name = ''undo tablespace'');

  ```


  以下是一些示例输出：


  ```

  CUR_MB_SIZE REQ_MB_SIZE

  ----------- -----------

  36864       20897

  ```


  输出显示撤销表空间当前分配了 36.8GB。在前面的查询中，您使用了 900 秒作为在撤销表空间中保留信息的时间。为了保留撤销信息 900 秒，Oracle 撤销顾问估计撤销表空间应为
  20.8GB。在此示例中，撤销表空间大小是足够的。如果大小不足，您将必须向现有数据文件添加空间，或者向撤销表空间添加一个数据文件。


  以下是一个稍复杂的示例，使用 Oracle 撤销顾问查找撤销表空间所需大小。此示例使用 PL/SQL 显示有关潜在问题以及修复建议的信息：


  ```

  SQL> SET SERVEROUT ON SIZE 1000000

  SQL> DECLARE

  pro    VARCHAR2(200);

  rec    VARCHAR2(200);

  rtn    VARCHAR2(200);

  ret    NUMBER;

  utb    NUMBER;

  retval NUMBER;

  BEGIN

  DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));

  DBMS_OUTPUT.PUT_LINE(''Required Undo Size (megabytes): '' || DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE
  (900));

  retval := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);

  DBMS_OUTPUT.PUT_LINE(''Problem:   '' || pro);

  DBMS_OUTPUT.PUT_LINE(''Advice:    '' || rec);

  DBMS_OUTPUT.PUT_LINE(''Rational:  '' || rtn);

  DBMS_OUTPUT.PUT_LINE(''Retention: '' || TO_CHAR(ret));

  DBMS_OUTPUT.PUT_LINE(''UTBSize:   '' || TO_CHAR(utb));

  END;

  /

  ```


  如果没有发现问题，则保留大小将返回 0。以下是一些示例输出：


  ```

  Finding 1:The undo tablespace is OK.

  Required Undo Size (megabytes): 64

  Problem:   No problem found

  Advice:

  Rational:

  Retention: 0

  UTBSize:   0

  ```




  '
- "# 查看消耗 Undo 空间的 SQL\n\n有时，一段代码未能正确提交，这会导致大量空间被分配在 undo 表空间中且永不释放。迟早，你会遇到 `ORA-30036`\
  \ 错误，表明表空间无法扩展。通常，第一次出现空间相关错误时，你可以简单地增加与 undo 表空间关联的某个数据文件的大小。\n然而，如果某个 SQL 语句持续运行并填满了新添加的空间，那么问题很可能出在一个写得不好的应用程序上。例如，开发者可能没有在代码中包含适当的\
  \ `commit` 语句。\n\n在这种情况下，识别哪些用户正在消耗 undo 表空间中的空间是很有帮助的。运行此查询可以报告基于每个用户分配的空间的基本信息：\n\
  \n```sql\nSQL> select s.sid, s.serial#, s.osuser, s.logon_time\n       ,s.status,\
  \ s.machine\n       ,t.used_ublk, t.used_ublk*16384/1024/1024 undo_usage_mb\n  from\
  \ v$session     s\n      ,v$transaction t\n where t.addr = s.taddr;\n```\n\n如果你想查看与消耗\
  \ undo 空间的用户相关联的 SQL 语句，则可以连接到 `V$SQL`，如下所示：\n\n```sql\nSQL> select s.sid, s.serial#,\
  \ s.osuser, s.logon_time, s.status\n       ,s.machine, t.used_ublk\n       ,t.used_ublk*16384/1024/1024\
  \ undo_usage_mb\n       ,q.sql_text\n  from v$session     s\n      ,v$transaction\
  \ t\n      ,v$sql         q\n where t.addr = s.taddr\n   and s.sql_id = q.sql_id;\n\
  ```\n\n如果需要更多信息，例如回滚段的名称和状态，可以运行连接到 `V$ROLLNAME` 和 `V$ROLLSTAT` 视图的查询，像这样：\n\n```sql\n\
  SQL> select s.sid, s.serial#, s.username, s.program\n       ,r.name undo_name, rs.status\n\
  \       ,rs.rssize/1024/1024 redo_size_mb\n       ,rs.extents\n  from v$session\
  \     s\n      ,v$transaction t\n      ,v$rollname    r\n      ,v$rollstat    rs\n\
  \ where s.taddr = t.addr\n   and t.xidusn  = r.usn\n   and r.usn     = rs.usn;\n\
  ```\n\n之前的查询使你能够精确定位哪些用户负责在 undo 表空间内分配的空间。当代码未在适当时候提交并过度消耗 undo 空间时，这尤其有用。\n\n"
- "# 处理临时表空间问题\n\n临时表空间的问题相对容易发现。\n例如，当临时表空间空间不足时，将抛出以下错误：\n\n```sql\nORA-01652: unable\
  \ to extend temp segment by 128 in tablespace TEMP\n```\n\n当你看到此错误时，你需要确定是临时表空间空间不足，还是一个罕见的失控\
  \ SQL 查询暂时消耗了异常大量的临时空间。这两个问题都将在以下部分讨论。\n\n## 确定临时表空间大小是否正确\n\n当进程耗尽可用内存并需要更多空间时，临时表空间被用作磁盘上的排序区。需要排序区的操作包括：\n\
  \n*   索引创建\n*   SQL 排序操作\n*   临时表和索引\n*   临时 LOB\n*   临时 B 树\n\n没有确切的公式来确定你的临时表空间大小是否正确。它取决于查询的数量和类型、索引构建操作、并行操作以及你的内存排序空间（PGA）的大小。你必须在数据库有负载时监控你的临时表空间以建立其使用模式。由于\
  \ TEMP 表空间是临时文件，它们的处理方式与数据文件不同，详情在另一个视图中。运行以下查询以显示临时表空间中已分配和空闲的空间：\n\n```sql\nSQL>\
  \ select tablespace_name\n       ,tablespace_size/1024/1024 mb_size\n       ,allocated_space/1024/1024\
  \ mb_alloc\n       ,free_space/1024/1024      mb_free\n  from dba_temp_free_space;\n\
  ```\n\n以下是一些示例输出：\n\n```sql\nTABLESPACE_NAME    MB_SIZE   MB_ALLOC    MB_FREE\n\
  --------------- ---------- ---------- ----------\nTEMP                   200   \
  \     200        170\n```\n\n如果 `FREE_SPACE` (`MB_FREE`) 值降至接近 0，说明数据库中有 SQL 操作消耗了大部分可用空间。`FREE_SPACE`\
  \ (`MB_FREE`) 列是总的可用空间，包括当前已分配和可重用的空间。\n\n如果使用量接近你当前的分配量，你可能需要向临时表空间数据文件分配更多空间。运行以下查询以查看临时数据文件名称和分配大小：\n\
  \n```sql\nSQL> select name, bytes/1024/1024 mb_alloc from v$tempfile;\n```\n\n以下是一些典型输出：\n\
  \n```sql\nNAME                                       MB_ALLOC\n----------------------------------------\
  \ ----------\n/u01/dbfile/o18c/temp01.dbf                     400\n/u01/dbfile/o18c/temp02.dbf\
  \                     100\n/u01/dbfile/o18c/temp03.dbf                     100\n\
  ```\n\n在首次创建数据库时，如果你对临时表空间的“正确”大小毫无概念，通常将其大小设置为约 20GB。如果我正在构建一个数据仓库类型的数据库，我可能会将临时表空间大小设置为约\
  \ 80GB。你必须使用适当的 SQL 监控你的临时表空间，并根据需要调整大小。\n你还可以创建多个 TEMP 表空间以供不同的应用程序和用户使用。如果某个应用程序似乎消耗了所有\
  \ TEMP 表空间，请创建另一个 TEMP 表空间，例如 TEMP2，并将其分配给该应用程序用户。这将隔离问题，直到可以研究并修复代码、排序和索引创建。\n\n\
  ## 查看消耗临时空间的 SQL\n\n当 Oracle 抛出 `ORA-01652: unable to extend temp` 错误时，这可能表明你的临时表空间太小。然而，如果\
  \ Oracle 因一次性事件（例如大型索引构建）而耗尽空间，它也可能抛出该错误。你必须决定是否需要为空间不足的一次性索引构建或消耗大量临时表空间中排序空间的查询添加空间。\n\
  \n要查看会话在临时表空间中使用的空间，请运行此查询：\n\n```sql\nSQL> SELECT s.sid, s.serial#, s.username\n\
  \       ,p.spid, s.module, p.program\n       ,SUM(su.blocks) * tbsp.block_size/1024/1024\
  \ mb_used\n       ,su.tablespace\n  FROM v$sort_usage    su\n      ,v$session  \
  \     s\n      ,dba_tablespaces tbsp\n      ,v$process       p\n WHERE su.session_addr\
  \ = s.saddr\n   AND su.tablespace   = tbsp.tablespace_name\n   AND s.paddr     \
  \    = p.addr\n GROUP BY\n       s.sid, s.serial#, s.username, s.osuser, p.spid,\
  \ s.module,\n       p.program, tbsp.block_size, su.tablespace\n ORDER BY s.sid;\n\
  ```\n\n如果你确定需要添加空间，可以调整现有临时文件的大小或添加一个新的。要调整临时表空间临时文件的大小，请使用 `ALTER DATABASE TEMPFILE...RESIZE`\
  \ 语句。以下命令将临时数据文件大小调整为 12GB：\n\n```sql\nSQL> alter database tempfile '/u01/dbfile/o18c/temp02.dbf'\
  \ resize 12g;\n```\n\n你可以向临时表空间添加一个数据文件，如下所示：\n\n```sql\nSQL> alter tablespace temp\
  \ add tempfile '/u02/dbfile/o18c/temp04.dbf' size 2g;\n```\n\n\n"
- '# 摘要


  一名高级数据库管理员（DBA）必须擅长高效地确定数据库不可用和性能问题的根源。识别并解决问题的能力定义了专业级别的 DBA。任何人都可以谷歌一个主题（最糟糕的事情莫过于与一位正在谷歌并推荐随机解决方案的经理一起参加故障排除电话会议）。除了确认正在谷歌的是正确的
  Oracle 版本外，找到合适的解决方案并自信地将其应用到生产数据库环境中，才是你创造巨大价值的方式。


  诊断问题有时需要一些系统和网络管理员的技能。此外，一名高效的 DBA 必须知道如何利用 Oracle 数据字典来识别问题。作为策略的一部分，你还应该主动监控导致数据库不可用的常见原因。理想情况下，你应该在其他人发现问题之前就察觉到，并主动解决问题。


  没有一本书能涵盖所有的故障排除活动。本章包含了一些最常用的识别和处理问题的技巧。通常，基本的操作系统实用程序将帮助你确定挂起数据库的根源。在几乎所有情况下，都应该检查
  `alert.log` 和相应的跟踪文件。找到问题的根本原因往往是最困难的任务。采用一致且有条理的方法，你将在诊断和解决问题方面成功得多。


  本章旨在传授一些技巧和方法，帮助你在最混乱的数据库环境中也能生存下来。总结这些想法，这可以说是一份 DBA 的宣言：


  *   通过脚本和调度程序实现自动化和监控。成为第一个知道系统出问题的人。

  *   在流程和脚本中力求可重复性和高效。保持一致性。

  *   保持简单。如果一个模块超过一页长，那就太长了。不要编写其他 DBA 无法理解或维护的脚本或功能。有时，简单的解决方案就是正确的解决方案。

  *   无论灾难如何，保持冷静。保持尊重。

  *   不要害怕寻求或采纳建议。欢迎反馈和批评。倾听他人。接受自己可能是错的这一想法。

  *   利用图形化工具，但始终要懂得如何手动实现功能。

  *   预期故障，预测故障，为故障做准备。你不知道什么会出问题，但你知道一定会出问题。为你已为故障做好准备而感到高兴吧。最好的教训往往是痛苦的。

  *   测试并记录你的操作流程、备份和恢复步骤。这将帮助你在压力巨大的数据库宕机情况下保持冷静（相对而言）并专注于问题。

  *   不要为实现数据库供应商已提供解决方案（如复制、灾难恢复、备份与恢复等）的功能而编写代码。

  *   熟练掌握 SQL、过程化 SQL 和操作系统命令。这些技能区分了弱者与强者。最优秀的 DBA 兼具系统管理员（SA）和开发者的专长。

  *   不断研究新功能和新技术。学习是一个永无止境的过程。质疑一切，重新评估，并寻找更好的方法。通过可重复的、同行评审的测试来验证你的解决方案。记录并自由分享你的知识。

  *   知道该问什么问题，以便更好地理解问题或情况。

  *   寻求协助数据库迁移上云、迁移到合适的数据库以及利用自治数据库流程。

  *   全力以赴完成任务。你现在是在与全世界竞争。更努力、更聪明地工作。


  DBA 的工作可能非常有回报，但也可能非常痛苦和充满压力。希望本书记录的技巧能帮你从压力重重的状态转变为偶尔快乐的状态。


  '
- '# 22. 可插拔数据库


  Oracle 数据库 12c 的新特性是 Oracle 多租户。此功能允许您在一个总体的多租户容器数据库内创建和维护多个可插拔数据库。以下是关于可插拔术语的简明介绍。


  一个多租户容器数据库被定义为一个能够容纳一个或多个可插拔数据库的数据库。容器被定义为存在于 CDB 内的一组数据文件和元数据的集合。PDB 是一种特殊类型的容器，可以通过克隆另一个数据库轻松配置。如果需要，PDB
  也可以从一个 CDB 转移到另一个 CDB。


  CDB 将是数据库资源的容器，您应该将其视为进程、全部内存和 CPU 分配的数据库。每个 CDB 启动时都有一组进程，内存分配给 CDB 供每个 PDB 使用。我们稍后将介绍资源管理，它允许为每个
  PDB 分配特定的内存和 CPU；否则，内存和 CPU 将在单个 CDB 内的所有 PDB 之间按需共享。


  不是在一个服务器上拥有多个数据库实例，而是可以创建一个或几个 CDB 来容纳所有的 PDB。PDB 彼此之间在数据和用户上是隔离的，因此它们不需要各自拥有自己的
  CDB 来实现隔离。


  每个 CDB 都包含一组主数据文件和元数据，称为主容器。每个 CDB 还包含一个种子 PDB，它被用作创建其他 PDB 的模板。每个 CDB 由一个主根容器、一个种子
  PDB 和一个或多个 PDB 组成。


  必须使用 `ENABLE PLUGGABLE DATABASE` 子句创建支持可插拔功能的 CDB。未以此方式创建的数据库不能包含 PDB。在 Oracle 12c
  之前，唯一可用的数据库类型是非 CDB，目前仍可以这种方式创建。使用 `dbca` 实用程序时，默认设置是创建一个带有一个 PDB 的 CDB。每个 CDB 包含以下元素：


  *   一个根容器，名为 `CDB$ROOT`。根容器包含主数据字典视图，这些视图具有关于根容器以及 CDB 内每个子 PDB 的元数据。

  *   一个静态的种子容器，名为 `PDB$SEED`。此容器仅作为模板存在，用于提供创建 CDB 内新 PDB 所需的数据文件和元数据。

  *   零个，或一个或多个 PDB（最多 4096 个）。每个 PDB 是独立的，功能类似于一个孤立的非 CDB 数据库。此外，每个 PDB 包含自己的数据文件和应用程序对象（用户、表、索引等）。连接到
  PDB 时，无法看到根容器或 CDB 中存在的任何其他 PDB。


  Oracle 数据库 12c 新增了一个 CDB 级别的数据字典视图层，它涵盖了 `DBA/ALL/USER` 级别的视图。CDB 级视图报告 CDB 中所有容器（根、种子和所有可插拔数据库）的信息。例如，如果您想查看
  CDB 数据库中的所有用户，可以从根容器查询 `CDB_USERS` 来实现。如果您不使用 CDB，那么 `DBA_USERS` 仍然是报告所有用户信息的准确视图。许多数据字典视图现在包含一个名为
  `CON_ID` 的新列，它是 CDB 内每个容器的唯一标识符。根容器的 `CON_ID` 为 1。种子的 `CON_ID` 为 2。在 CDB 内创建的每个新可插拔数据库都会被分配一个唯一的顺序容器
  ID。


  表 22-1 定义了可插拔数据库环境中使用的术语。在阅读本章时，请参考此表。


  ## 表 22-1 可插拔数据库术语摘要


  | 术语 | 含义 |

  | :--- | :--- |

  | 容器数据库 (CDB), 多租户数据库 | 一个能够容纳一个或多个可插拔数据库、进程和共享资源的数据库 |



  '
- '# 术语定义


  | 术语 | 描述 |

  | :--- | :--- |

  | 可插拔数据库 (PDB) | 一套数据文件和元数据，可以无缝地从一个 CDB 转移到另一个 CDB，是面向应用程序的用户数据库。 |

  | 根容器 | 一个主数据文件和元数据集合，包含关于 CDB 内所有容器的信息。根容器名为`CDB$ROOT`。 |

  | 容器 | 一个数据文件和元数据的集合。可以是根容器、种子容器或可插拔数据库。 |

  | 种子可插拔数据库 | 一个用于创建新可插拔数据库的数据文件和元数据模板。种子可插拔数据库名为`PDB$SEED`。 |

  | 插入 (Plugging) | 将可插拔数据库的元数据和数据文件与 CDB 关联。 |

  | 拔出 (Unplugging) | 将可插拔数据库的元数据和数据文件与 CDB 解除关联。 |

  | 克隆 (Cloning) | 从另一个数据库（种子、PDB 或非 CDB）的副本创建可插拔数据库。 |

  | `CON_ID` | CDB 中每个容器的唯一标识符。CDB 级别的视图包含一个`CON_ID`列，用于标识正在查看的信息所属的容器。 |

  | CDB 数据字典视图 | 包含关于 CDB 内所有可插拔数据库元数据的视图。这些视图只有通过根容器的特权连接查询时，才会显示有意义的信息。可插拔数据库必须处于打开状态才能使用。
  |

  | 非 CDB 数据库 | 一个未启用可插拔数据库功能创建的 Oracle 数据库（在 12c 之前唯一可用的数据库类型）。 |


  '
- '# 本章目标


  本章旨在让你熟练管理容器/可插拔数据库环境。学完本章，你应该理解如何创建可插拔环境、配置 PDB、在 PDB 内连接和导航，以及将 PDB 从一个 CDB 转移到另一个
  CDB。这一切的基础始于理解可插拔架构。图 22-1 可能过于简化，但展示了包含 CDB 和 PDB 的数据库整体视图。它提供了多租户架构的基本视图。


  ![../images/214899_3_En_22_Chapter/214899_3_En_22_Fig1_HTML.jpg](img/214899_3_En_22_Fig1_HTML.jpg)


  **图 22-1** Oracle 多租户概览，推荐一个 CDB 配一个 PDB


  > **注意**：Oracle 多租户是企业版可用的额外付费选项。但是，所有版本都允许使用一个可插拔数据库。即使不打算使用该选项或创建更多 PDB，也建议创建一个
  CDB 和一个 PDB。图 22-1 显示了即使不使用该选项，架构也会是这种样子。这样设置数据库将便于将来使用多租户选项而无需迁移。详情请查看 Oracle 许可指南。


  '
- '# 理解可插拔架构


  PDB 与非 CDB 数据库环境有一些重要的架构差异。图 22-2 展示了一个名为`CDB`的容器数据库，它包含一个根容器、一个种子数据库和两个名为`SALESPDB`及`HRPDB`的
  PDB。


  ![../images/214899_3_En_22_Chapter/214899_3_En_22_Fig2_HTML.jpg](img/214899_3_En_22_Fig2_HTML.jpg)


  **图 22-2** 可插拔数据库架构


  花点时间看看图 22-2。如果你是一个好奇的 DBA，很可能立刻涌现出许多想法。以下列表重点介绍了理解图 22-2 中新架构需要理解的一些关键点：


  *   连接到`CDB`数据库等同于连接到`CDB$ROOT`根容器。根容器的主要目的是为任何关联的 PDB 提供资源和存放元数据。

  *   你可以通过`SYS`用户访问根容器，就像访问非 CDB 数据库一样。换句话说，当登录到数据库服务器时，你可以使用操作系统认证直接连接到根容器，无需指定用户名和密码（`sqlplus
  / as sysdba`）。

  *   种子 PDB (`PDB$SEED`) 仅作为创建新 PDB 的模板存在。你可以连接到种子，但它是只读的，这意味着你不能对其执行事务。

  *   除了两个默认容器（根和种子）外，这个特定的 CDB 还手动创建了两个额外的 PDB，名为`SALESPDB`和`HRPDB`（本章后面会详细介绍创建 PDB）。

  *   PDB 存在于独立的命名空间中。PDB 在 CDB 内必须是唯一的，但 PDB 内的对象遵循非 CDB 数据库的命名空间规则。例如，表空间名称和用户名必须在各个
  PDB 内唯一，但在 CDB 内的其他 PDB 之间不必唯一。

  *   每个 PDB 都有自己的`SYSTEM`和`SYSAUX`表空间，以及可选的`TEMP`表空间。

  *   如果 PDB 没有自己的`TEMP`文件，它可以使用根容器`TEMP`文件中的资源。

  *   每个 PDB 的`SYSTEM`表空间包含有关 PDB 元数据的信息，例如其用户和对象；这些元数据可通过 PDB 内的`DBA/ALL/USER`级视图访问，并可通过根容器的
  CDB 级视图看到。

  *   CDB 可以容纳不同字符集的 PDB（自 12.2 起）。

  *   你可以为 CDB 和所有关联的 PDB 设置时区，也可以为每个 PDB 单独设置时区。

  *   CDB 实例在通过`SYS`连接到根容器时启动和停止。你不能在连接到 PDB 时启动/停止 CDB 实例（系统 DBA 和应用程序 DBA 的职责分离）。

  *   实例启动时读取一个初始化参数文件。连接到根容器的特权用户可以修改所有初始化参数。相比之下，连接到 PDB 的特权用户只能修改适用于当前连接的 PDB 的参数。

  *   当连接到 PDB 并修改初始化参数时，这些修改仅适用于当前连接的 PDB，并在数据库重启后对该 PDB 持久生效。`V$PARAMETER`中的`ISPDB_MODIFIABLE`列显示了哪些参数可以在以
  DBA 身份连接到 PDB 时修改。（锁定参数和配置还有额外的安全权限。）

  *   应用程序用户只能通过网络连接访问 PDB。因此，必须有一个侦听器正在运行，并侦听与关联 PDB 对应的服务名。如果没有运行侦听器，应用程序用户就无法连接到
  PDB。

  *   单个 PDB 本身不会停止或启动（不是数据库实例的术语）。当你启动/停止 PDB 时，你并不是在分配内存或启动/停止后台进程。相反，PDB 要么变为可用，要么不可用（打开或关闭）。

  *   CDB 有一组控制文件。控制文件在以特权用户身份连接到根容器时进行管理。

  *   CDB 有一个`UNDO`表空间。CDB 中的所有 PDB 使用相同的`UNDO`表空间（如果是 RAC，则每个实例一个活动的 undo 表空间）。

  *   有一条重做线程（每个实例），在以具有适当特权的用户身份连接到根容器时进行管理。只有连接到根的特权连接才能启用归档或切换联机日志。具有 SYSDBA 特权的用户连接到
  PDB 时不能更改联机重做或归档设置。




  '
- '# Oracle CDB 与 PDB 架构详解


  ## CDB 与 PDB 的管理特点


  - 一个 CDB 对应一个告警日志和一组跟踪文件。适用于关联 PDB 的任何数据库消息都会写入公共的 CDB 告警日志。


  - 每个容器都被分配一个唯一的容器 ID。根容器被分配容器 ID 为 1；种子数据库被分配容器 ID 为 2。每个后续创建的 PDB 都会被分配一个唯一的顺序容器
  ID。


  - CDB 有一个 FRA。在 FRA 内不会为 PDB 创建单独的目录。RMAN 备份文件、控制文件和在线重做日志都放置在与 CDB 关联的目录中，不会按 PDB
  隔离。如果仅备份 PDB，备份文件可以被分离开，但它们仍然位于同一个 FRA 中。


  - “闪回数据库”功能通过到根容器的特权连接开启和关闭。你无法在 PDB 级别启用闪回。


  - AWR、ADD M 和 ASH 报告是在 CDB 中所有 PDB 范围内发布的。资源消耗按 PDB 识别。


  - 在解决 SQL 性能问题时，查询通过视图（如 `V$SQL` 和 `V$SQLAREA`）中的 `CON_ID` 列与特定的 PDB 相关联。


  - 数据库保险库等安全选项可以在 PDB 级别启用。CDB 和 PDB 中的权限提供了另一级别的安全性和职责分离。


  上述列表很长，包含大量信息，但一旦你消化了 PDB 环境的细微差别，就能有效地实施和管理这项技术。这里的一个要点是，你可以在一个 CDB 内安全地隔离数十个甚至更多的
  PDB，而只需管理一个实例（内存和后台进程）、一个重做线程和一个控制文件集。本章还有更多内容需要讨论以填补更多细节。


  ## 范式转变


  通常，特定的应用程序会要求将其数据库对象（用户、表、索引等）放置在与其他应用程序隔离的数据库中。这样做的原因通常是安全或性能问题。在 PDB 出现之前，想想你是如何解决为不同应用程序和开发团队提供独立环境的需求的。两种常见的解决方案如下：


  - 为每个需要环境的团队/应用程序创建一个单独的数据库。有时这种方法是每个服务器一个数据库，这通常意味着额外的硬件和许可成本。


  - 在一个数据库内创建独立的环境。通常这是通过独立的模式和不同的表空间来实现的。这种方法要求应用程序之间不能有任何数据库对象命名冲突，例如用户名、表空间名和公共同义词等对象。


  从 Oracle Database 12c 开始，PDB 为你提供了另一种工具来满足先前的需求。PDB 提供了安全隔离要求；一个 PDB 不能直接访问另一个 PDB。即使一个用户以
  `SYSDBA` 特权连接到给定的 PDB，也不能直接 SQL 访问 CDB 中的其他 PDB。这与非 CDB 数据库类似。从安全和应用程序的角度来看，你在更大的
  CDB 内拥有完全隔离的 PDB。


  作为 DBA，你无需再实施和维护数十个独立的数据库及相关运维任务（例如配置新数据库、安装、升级、调优、可用性、监控、复制、灾难恢复以及备份与恢复），而是可以像管理一个数据库那样管理任意数量的
  PDB。从根容器的角度来看，这类似于管理一个非 CDB 数据库。


  可插拔架构的另一个显著优势是，PDB 可以轻松地从一个 CDB 克隆或传输到另一个 CDB。这为执行诸如配置新数据库、升级数据库、负载均衡或将应用程序数据从一个环境移动到另一个环境（例如从开发数据库到测试数据库）等任务提供了更多选项。可以通过克隆另一个
  PDB 来创建新环境。而将 PDB 从 CDB 中移出，只需通过 SQL 命令将该 PDB 从 CDB 中拔出，然后将元数据和数据文件与新的 CDB 关联（插入）。


  如前面章节所多次提到的，新的数据库结构应该是一个至少包含一个 PDB 的 CDB。这支持了新的转变，即让一个 CDB 管理多个 PDB，实现集中资源管理和规划。


  ## Oracle 云中的 PDB：Exadata Express


  测试、开发和开始向云迁移的一个好方法是使用 Oracle 云中的 Exadata Express 服务。这是在 Exadata 上运行的一个 PDB。它具备 PDB
  能做的所有事情，本质上是一个平台即服务，具有 Exadata 特性和可用的数据库企业版。这不仅是测试一些应用程序的好方法，而且能让你习惯 PDB 的管理而无需担心其他事情。


  基础设施和 CDB 已经准备就绪，配置 PDB 只需要几分钟。维护脚本和应用程序可以快速进行测试，同时使用云服务作为数据库。


  这个 PDB 和 Oracle 云的切入点对于熟悉所需服务和管理 PDB 非常有用。添加用户、对象和数据，花时间探索云环境中的 PDB 数据字典。


  ## 备份与恢复的影响


  可插拔环境在备份和恢复架构方面有一些有趣的方面。以下列表重点介绍了这些特性：


  - 当以 `SYSDBA` 或 `SYSBACKUP` 特权连接到根容器时，你可以选择通过一个备份命令备份 CDB 内的所有数据文件（根、种子和所有 PDB）。你还可以选择在
  PDB 粒度级别执行备份和恢复任务。


  - 当直接以 `SYSDBA` 或 `SYSBACKUP` 特权连接到 PDB 时，你只能备份和恢复与当前连接的 PDB 相关联的数据文件；你无法查看或操作根容器数据文件或其他
  PDB 数据文件。


  - 对整个 CDB 的不完全恢复必须通过以 `SYSDBA` 或 `SYSBACKUP` 特权连接到根容器来执行。在执行整个 CDB 的不完全恢复期间，CDB
  内的所有数据文件（根容器和关联的 PDB）都不可用。


  - 以 `SYSDBA` 或 `SYSBACKUP` 特权直接连接到 PDB 可以仅对当前连接的 PDB 执行不完全恢复，而不影响 CDB 内的任何其他 PDB。




  '
- '# UNDO 表空间与恢复操作


  *   由于存在共享的 `UNDO` 表空间，任何针对 PDB 的基于时间点的不完全恢复都必须临时将根容器的 `UNDO` 表空间还原到一个辅助数据库位置，以便它能参与
  PDB 的基于时间点恢复。


  这意味着，作为根级别的 DBA，你可以像对待单个数据库一样处理备份和恢复操作。从可插拔的角度来看，如果需要，你可以按 PDB 执行备份和恢复。


  > **注意**

  > 有关使用 RMAN 在可插拔环境中进行备份、还原和恢复的示例，请参见第 18 章和第 19 章。


  '
- '# 调优的细微差别


  在可插拔环境中进行调优带来了新的挑战，但与在具有多个数据库实例的服务器上调优类似。优势在于，CDB 拥有资源并能查看其他已插入并消耗资源的 PDB 的活动情况。性能调优可以从
  PDB 级别开始，然后继续到 CDB 级别，以理解其他 PDB 的活动。此外，还可以根据不同的服务级别、优先级或数据层来管理 PDB 的资源。


  AWR、ADDM 和 ASH 报告现在显示 PDB 级别的资源使用情况；这将使你能够将调优工作集中在适当的 PDB 上。对于你编写的任何自定义调优 SQL 查询，你需要在适当的地方修改它们以报告
  CDB 级别的视图。同样，在分析 SQL 语句时，你必须考虑该 SQL 语句是在哪个 PDB 中执行的。


  本章前面的部分重点讨论了可插拔架构。在创建 CDB 之前，理解这些架构基础至关重要；因此，本主题的介绍篇幅较长。现在你已经掌握了可插拔基础，可以准备将理论概念转化为可用且可持续的数据库技术了。手头的第一个实际任务是创建一个
  CDB。


  '
- '# 可插拔的集装箱：数量优势


  **安全性：** CDB 中的 PDB 类似于大型商船上的可插拔集装箱。每个容器都是安全隔离且自包含的。如果你发现自己在一个特定的集装箱内，你不一定知道母船上的其他任何容器。船长（通过
  `SYS` 连接到根容器）知道船上的所有容器，并可以通过集装箱货运清单（CDB 级别的元数据视图）查看每个容器的内容。

  **粒度：** 如果需要，可以在容器级别执行维修和维护。同样地，你可以将 PDB 离线进行维护或移动，而不会影响 CDB 内的任何其他 PDB。

  **协同作用：** 每个容器高效地共享船舶的公共资源，如引擎、船员和导航系统。这类似于 PDB 共享一个公共的 SGA、`UNDO` 表空间、FRA、参数文件、重做日志和归档日志以及后台进程和控制文件。通过共享共同的数据库基础设施产生规模经济；硬件和人力资源（DBA）成本分散到许多数据库上。

  **供应：** 在这个类比中，假设你可以轻松复制一个集装箱（可能使用一个巨大的三维扫描仪/打印机）；这将允许你创建现有容器的副本。同样地，PDB 可以从现有数据库（种子、PDB
  或非 CDB）中快速高效地创建。

  **可移植性：** 当需要时，一个集装箱可以轻松地转移到另一种运输工具上（另一艘船、一列货运火车或由一辆半挂卡车驮运）。同样地，PDB 可以轻松地拔出并插入其他
  CDB。目标 CDB 是否与源 CDB 版本和类型相同并不一定重要。


  '
- '# 创建 CDB


  要使用可插棒数据库功能，你必须专门创建一个支持可插拔的 CDB。有几种不同的技术可以创建 CDB：


  *   使用 `dbca` 实用程序

  *   使用 DBCA 生成所需的脚本，然后手动运行这些脚本来创建 CDB

  *   手动发出 SQL `CREATE DATABASE` 命令，使用 RMAN 复制现有的 CDB


  接下来的两节重点介绍如何使用 `CREATE DATABASE` 命令和 DBCA 创建数据库。有关使用 RMAN 复制 CDB 或可插棒数据库的详细信息，请参阅
  Darl Kuhn、Sam Alapati 和 Arup Nanda 所著的 *RMAN Recipes for Oracle Database 12c*，第二版（Apress，2013）。


  ## 使用数据库配置助手 (DBCA)


  你可以使用 DBCA 实用程序通过图形界面或命令行模式创建 CDB。使用图形界面时，系统会提示你是否要创建 CDB。


  本示例将引导你使用命令行模式。首先，确保你的 `ORACLE_SID`、`ORACLE_HOME` 和 `PATH` 变量已为 CDB 环境设置（有关设置 OS
  变量的详细信息，请参见第 2 章）；例如，


  ```

  $ export ORACLE_SID=CDB

  $ export ORACLE_HOME=/u01/app/oracle/product/18.1.0.1/db_1

  $ export PATH=$ORACLE_HOME/bin:$PATH

  ```


  现在，使用 DBCA 创建 CDB。使用 DBCA 的命令行模式时，必须指定 `createAsContainerDatabase` 子句。以下代码创建一个名为
  `CDB` 的数据库：


  ```

  dbca -silent -createDatabase -templateName General_Purpose.dbc -gdbname CDB

  -sid CDB -responseFile NO_VALUE -characterSet AL32UTF8 -memoryPercentage 30

  -emConfiguration LOCAL -createAsContainerDatabase true

  -sysPassword foo -systemPassword foo

  ```


  前面的代码必须在一行中输入（这里为了适应页面才显示在多行）。你提供的 SID（本例中为 `CDB`）不能存在于你的 `oratab` 文件中。在 Linux 系统上，`oratab`
  文件通常位于 `/etc` 目录。在其他 Unix 系统（如 Solaris）上，`oratab` 文件通常位于 `/var/opt/oracle` 目录。


  按下 Enter 键后，你应该会看到类似以下的输出：


  ```

  Copying database files

  ...

  9% complete

  41% complete

  Creating and starting Oracle instance

  43% complete

  48% complete

  ...

  ```


  DBCA 助手需要几分钟时间来创建新的 CDB。创建此数据库时，请确保有足够的磁盘空间可用（大约 5GB 应该足够）。DBCA 运行完成后，你应该拥有一个功能齐全的
  CDB 数据库，并可以开始在其中创建 PDB。


  ## 通过 DBCA 生成 CDB 创建脚本


  你可以使用 DBCA 生成创建 CDB 所需的脚本，然后可以选择手动运行这些脚本来执行该过程。接下来的代码从命令行调用 DBCA 实用程序，并生成创建名为 `CDB1`
  的 CDB 所需的脚本：


  ```

  dbca -silent -generateScripts -templateName General_Purpose.dbc -gdbname CDB1

  -sid CDB1 -responseFile NO_VALUE -characterSet AL32UTF8 -memoryPercentage 30

  -emConfiguration LOCAL -createAsContainerDatabase true

  -sysPassword foo -systemPassword foo

  ```


  前面的代码在执行时必须在一行中输入。以下是典型的输出片段：


  ```

  Database creation script generation

  1% complete

  .....

  100% complete

  Look at the log file "/orahome/app/oracle/admin/CDB1/scripts/CDB1.log"...

  ```


  DBCA 运行完成后，将目录更改为新生成脚本的位置：


  ```

  $ cd $ORACLE_BASE/admin/CDB1/scripts

  ```


  现在，显示目录中的脚本：


  ```

  $ ls

  ```


  以下是一些示例输出：




  ## 创建 Oracle CDB 数据库


  以下文件列表包含了创建数据库所需的脚本和配置文件：

  ```

  CDB1.log                  cloneDBCreation.sql       lockAccount.sql

  CDB1.sh                   init.ora                  postDBCreation.sql

  CDB1.sql                  initCDB1Temp.ora          postScripts.sql

  CloneRmanRestore.sql      initCDB1TempOMF.ora       rmanRestoreDatafiles.sql

  tempControl.ctl

  ```


  要创建数据库，请运行 `CDB1.sh` 脚本：

  ```

  $ CDB1.sh

  ```


  前面的 shell 脚本调用了 `CDB1.sql`，该脚本随后会调用 RMAN 工具。RMAN 从备份中创建所需的数据文件，并创建一个名为 `CDB1` 的数据库。将
  `ORACLE_SID` 操作系统变量设置为新创建的 CDB 名称后，您应该就能够启动数据库了。


  ## 手动使用 SQL 创建


  首先，确保为您的 CDB 环境设置了 `ORACLE_SID`、`ORACLE_HOME` 和 `PATH` 变量（有关设置操作系统变量的详细信息，请参见第 2
  章）；例如：

  ```

  $ export ORACLE_SID=CDB

  $ export ORACLE_HOME=/u01/app/oracle/product/18.1.0.1/db_1

  $ export PATH=$ORACLE_HOME/bin:$PATH

  ```


  接下来，在 `ORACLE_HOME/dbs` 目录中创建一个参数初始化文件。请确保将 `ENABLE_PLUGGABLE_DATABASE` 参数设置为 `TRUE`。这里，使用操作系统文本编辑器创建一个名为
  `initCDB.ora` 的文件，并在其中放入以下参数规范：

  ```

  db_name=''CDB''

  enable_pluggable_database=true

  audit_trail=''db''

  control_files=''/u01/dbfile/CDB/control01.ctl'',''/u01/dbfile/CDB/control02.ctl''

  db_block_size=8192

  db_domain="

  memory_target=629145600

  memory_max_target=629145600

  open_cursors=300

  processes=300

  remote_login_passwordfile=''EXCLUSIVE''

  undo_tablespace=''UNDOTBS1''

  ```


  现在，使用操作系统文本编辑器创建一个名为 `credb.sql` 的文件，并在其中放入合适的 `CREATE DATABASE` 语句：

  ```

  SQL> CREATE DATABASE CDB

  MAXLOGFILES 16

  MAXLOGMEMBERS 4

  MAXDATAFILES 1024

  MAXINSTANCES 1

  MAXLOGHISTORY 680

  CHARACTER SET US7ASCII

  NATIONAL CHARACTER SET AL16UTF16

  DATAFILE

  ''/u01/dbfile/CDB/system01.dbf'' SIZE 500M

  EXTENT MANAGEMENT LOCAL

  UNDO TABLESPACE undotbs1 DATAFILE

  ''/u01/dbfile/CDB/undotbs01.dbf'' SIZE 800M

  SYSAUX DATAFILE

  ''/u01/dbfile/CDB/sysaux01.dbf'' SIZE 500M

  DEFAULT TEMPORARY TABLESPACE TEMP TEMPFILE

  ''/u01/dbfile/CDB/temp01.dbf'' SIZE 500M

  DEFAULT TABLESPACE USERS DATAFILE

  ''/u01/dbfile/CDB/users01.dbf'' SIZE 50M

  LOGFILE GROUP 1

  (''/u01/oraredo/CDB/redo01a.rdo'') SIZE 50M,

  GROUP 2

  (''/u01/oraredo/CDB/redo02a.rdo'') SIZE 50M

  USER sys    IDENTIFIED BY foo

  USER system IDENTIFIED BY foo

  USER_DATA TABLESPACE userstbs DATAFILE

  ''/u01/dbfile/CDB/userstbsp01.dbf'' SIZE 500M

  ENABLE PLUGGABLE DATABASE

  SEED FILE_NAME_CONVERT = (''/u01/dbfile/CDB'',''/u01/dbfile/CDB/pdbseed'');

  ```


  `CREATE DATABASE` 语句中有几个子句仅与 PDB 相关。例如，`ENABLE PLUGGABLE DATABASE` 子句是必需的，因为您希望在
  CDB 中创建 PDB。`USER_DATA TABLESPACE` 子句指定了在种子数据库中创建一个额外的表空间；这个表空间也将被复制到从种子数据库克隆的任何
  PDB 中。此外，`SEED FILE_NAME_CONVERT` 指定了种子数据库文件的命名方式以及它们将位于的目录。


  接下来，确保已创建参数文件和 `CREATE DATABASE` 语句中引用的任何目录：

  ```

  $ mkdir -p /u01/dbfile/CDB/pdbseed

  $ mkdir -p /u01/dbfile/CDB

  $ mkdir -p /u01/oraredo/CDB

  ```


  现在，以 `nomount` 模式启动数据库，并运行 `credb.sql` 脚本：

  ```

  $ sqlplus / as sysdba

  SQL> startup nomount;

  SQL> @credb.sql

  ```


  如果成功，您应该会看到：

  ```

  Database created.

  ```


  Oracle 建议您使用 `catcon.pl` Perl 脚本为 CDB 运行任何 Oracle 提供的 SQL 脚本。因此，要为 CDB 创建数据字典，请使用
  `catcon.pl` Perl 脚本。首先切换到 `ORACLE_HOME/rdbms/admin` 目录：

  ```

  $ cd $ORACLE_HOME/rdbms/admin

  ```


  现在使用 `catcon.pl` 以 `SYS` 身份运行 `catalog.sql` 脚本：

  ```

  $ catcon.pl -n 1 -U SYS -c ''catalog.sql''

  ```



  ## 验证 CDB 是否已创建


  要验证数据库是否创建为 CDB，首先以 `SYS` 身份连接到根容器：


  ```bash

  $ sqlplus / as sysdba

  ```


  现在，你可以通过此查询确认 CDB 是否已成功创建。如果数据库创建为 CDB，`V$DATABASE` 的 `CDB` 列将包含 `YES` 值：


  ```sql

  SQL> select name, cdb from v$database;

  ```


  以下是一些示例输出：


  ```sql

  NAME      CDB

  --------- ---

  CDB       YES

  ```


  此时，你的 CDB 数据库中应该有两个容器：根容器和种子可插拔数据库。你可以使用此查询进行检查：


  ```sql

  SQL> select con_id, name from v$containers;

  ```


  以下是一些示例输出：


  ```sql

  CON_ID NAME

  ------ --------------------

  1 CDB$ROOT

  2 PDB$SEED

  ```


  你还应该有与根数据库和种子数据库关联的数据文件。你可以通过此查询查看与每个容器关联的数据文件：


  ```sql

  SQL> select con_id, file_name from cdb_data_files order by 1;

  ```


  以下是一些输出：


  ```sql

  CON_ID FILE_NAME

  ------ -------------------------------------------------------

  1 /u01/app/oracle/oradata/CDB/system01.dbf

  1 /u01/app/oracle/oradata/CDB/sysaux01.dbf

  1 /u01/app/oracle/oradata/CDB/undotbs01.dbf

  1 /u01/app/oracle/oradata/CDB/users01.dbf

  2 /u01/app/oracle/oradata/CDB/pdbseed/system01.dbf

  2 /u01/app/oracle/oradata/CDB/pdbseed/sysaux01.dbf

  ```


  请注意，如果你查询的是 `DBA_DATA_FILES` 而不是 `CDB_DATA_FILES`，你将只会看到与根容器（你当前连接的容器）关联的四个数据文件；例如，


  ```sql

  SQL> select file_name from dba_data_files;

  FILE_NAME

  -------------------------------------------------------

  /u01/app/oracle/oradata/CDB/system01.dbf

  /u01/app/oracle/oradata/CDB/sysaux01.dbf

  /u01/app/oracle/oradata/CDB/users01.dbf

  /u01/app/oracle/oradata/CDB/undotbs01.dbf

  ```


  ## 管理根容器


  在管理 CDB 时，大多数情况下，你是以 `SYS` 身份连接到根容器，并像操作非 CDB 数据库一样执行任务。然而，有几点需要特别注意，这些是维护 CDB 所特有的。以下任务只能在以
  `SYSDBA` 权限连接到根容器时执行：


  *   启动/停止实例

  *   启用/禁用归档日志模式

  *   管理影响 CDB 内所有数据库的实例设置，例如整体内存大小

  *   备份和恢复数据库中的所有数据文件

  *   管理控制文件（添加、恢复、删除等）

  *   管理在线重做日志

  *   管理根 `UNDO` 表空间

  *   管理根 `TEMP` 表空间

  *   创建公共用户和角色


  以下各节将讨论这些主题。


  ### 连接到根容器


  以 `SYS` 身份连接到根容器允许你执行通常与数据库管理相关的所有任务。你可以通过操作系统认证或网络连接从数据库服务器本地以 `SYS` 身份连接（网络连接需要监听器和密码文件）。建议为
  CDB 管理员设置角色，以便能够使用个人账户，而不是通过 `SYS` 登录。只有在执行服务器任务时才需要在服务器上登录，否则出于安全和合规性考虑，应允许通过网络连接到
  CDB。


  #### 通过网络


  如果你通过网络发起远程连接，那么你需要先在目标数据库服务器上设置一个监听器并创建一个密码文件（详见第 2 章）。一旦监听器和密码文件建立，你就可以通过网络远程连接，如下所示：


  ```bash

  $ sqlplus user/pass@connection_string as sysdba

  ```


  ```sql

  SQL> show user

  USER is "user"

  SQL> show con_id, conname

  CON_ID

  ----------

  1

  CON_NAME

  ----------

  CDB$ROOT

  SQL> show user

  USER is "user"

  ```


  有关如何在插件式环境中实现监听器的详细信息，请参阅本章后面的“在 PDB 环境中管理监听器”部分。


  ### 显示当前连接的容器信息


  从 `SQL*Plus` 出发，有几种简单的方法可以显示你当前连接的 CDB 的名称。此示例使用 `SHOW` 命令来显示容器 ID、名称和用户：


  ```sql

  SQL> show con_id con_name user

  ```


  你也可以通过 SQL 查询显示相同的信息：


  ```sql

  SQL> SELECT SYS_CONTEXT(''USERENV'', ''CON_ID'') AS con_id,

  SYS_CONTEXT(''USERENV'', ''CON_NAME'') AS cur_container,

  SYS_CONTEXT(''USERENV'', ''SESSION_USER'') AS cur_user

  FROM DUAL;

  ```


  以下是一些示例输出：


  ```sql

  CON_ID               CUR_CONTAINER        CUR_USER

  -------------------- -------------------- --------------------

  1                    CDB$ROOT             USER

  ```


  ### 启动/停止根容器


  你只能以特权用户身份连接到根容器时启动/停止 CDB。启动和停止根容器的过程与非 CDB 数据库相同。要启动 CDB，首先以 `SYS` 身份连接，并发出 `startup`
  命令：


  ```bash

  $ sqlplus / as sysdba

  ```


  ```sql

  SQL> startup;

  ```


  启动 CDB 数据库不会打开任何关联的 PDB。你可以使用此命令打开所有 PDB：


  ```sql

  SQL> alter pluggable database all open;

  ```


  要关闭 CDB 数据库，请发出以下命令：


  ```sql

  SQL> shutdown immediate;

  ```


  与非 CDB 数据库一样，上面的命令会关闭 CDB 实例并断开任何连接到数据库的用户。如果有任何可插拔数据库处于打开状态，它们将被关闭，用户将被断开连接。


  ### 创建公共用户


  在插件式环境中有两种类型的用户：本地用户和公共用户。本地用户只不过是在 PDB 中创建的常规用户。PDB 中的本地用户类型的行为与非 CDB 环境中的用户相同。管理本地用户没什么特别之处。你可以像管理非
  CDB 环境中的用户一样管理它们。


  公共用户是 Oracle Database 12c 中的一个新概念，仅适用于插件式数据库环境。公共用户是存在于根容器和每个 PDB 中的用户。这种类型的用户必须最初在根容器中创建，并且会自动在所有现有
  PDB 以及未来创建的任何 PDB 中创建。


  提示

  `SYS` 和 `SYSTEM` 账户是 Oracle 在插件式环境中自动创建的公共用户。


  创建公共用户时，用户名必须以字符串 `C##` 或 `c##` 开头。例如，以下命令在所有 PDB 中创建一个公共用户：


  ```sql

  SQL> create user c##dba identified by foo;

  ```



  '
- '# 公共用户、角色与容器管理


  ## 公共用户的权限管理


  普通用户必须在每个可插拔数据库内部授予权限。换句话说，如果你在连接到根容器时为公共用户授予权限，这些权限不会级联到 PDB。如果你需要为公共用户授予跨 PDB
  的权限，那么请创建一个公共角色，并将其分配给该公共用户。


  那么，公共用户有什么用呢？一种情况是跨 PDB 执行不需要`SYSDBA`级别权限的常见 DBA 维护活动。例如，你希望建立一个 DBA 账户，该账户拥有创建用户、授予权限等的权限，但又不想使用像`SYS`（在所有数据库中拥有所有权限）这样的账户。在此场景中，你可以创建一个公共
  DBA 用户，并创建一个包含适当权限的 DBA 公共角色。然后，将这个公共角色分配给公共 DBA。


  ## 创建公共角色


  就像你可以创建一个跨越所有 PDB 的公共用户一样，你也可以以同样的方式创建一个公共角色。公共角色提供了一个单一的对象，你可以向其授予在根容器关联的所有可插拔数据库中都有效的权限。


  公共角色在根容器中创建，并会自动在所有关联的 PDB 以及未来创建的任何 PDB 中创建。与公共用户类似，公共角色必须以`C##`或`c##`字符串开头；例如：


  ```sql

  SQL> create role c##dbaprivs container = all;

  ```


  接下来，你可以根据需要向公共角色分配权限。这里，将`DBA`角色授予先前创建的角色：


  ```sql

  SQL> grant dba to c##dbaprivs container = all;

  ```


  现在，如果你将这个公共角色分配给一个公共用户，那么当该公共用户连接到与根容器关联的任何可插拔数据库时，该角色关联的权限就会生效：


  ```sql

  SQL> grant c##dbaprivs to c##dba container = all;

  ```


  ## 创建本地用户和角色


  本地用户是仅针对该容器并且在该容器内“本地”的用户。这特别适用于应用程序用户以及仅在特定 PDB 中被授权的用户。本地用户与数据库用户之间实际上没有区别，它们只是没有“C##”前缀的
  CDB 用户。


  你可以通过指定`CONTAINER`子句或不指定它来在 PDB 中创建本地用户。首先连接到要为其创建本地用户的 PDB：


  ```sql

  SQL> CREATE USER pdbsys IDENTIFIED BY pass CONTAINER=CURRENT;

  SQL> CREATE USER appuser IDENTIFIED BY pass;

  ```


  角色也分为公共角色和本地角色。所有 Oracle 提供的角色都是公共角色，但可以被授予本地用户。


  ## 报告容器空间


  要报告 CDB 内的所有容器（根容器、种子容器和所有 PDB），你必须遵循以下步骤：


  *   以具有查看 CDB 级别视图权限的用户身份连接到根容器。

  *   确保你的查询在适当的地方使用了 CDB 级别视图。

  *   确保你希望报告的任何 PDB 都处于打开状态。如果 PDB 未打开，则不会显示任何信息。


  以下是一个使用 CDB 级别视图报告 CDB 内所有容器基本空间使用信息的查询：


  ```sql

  SQL> SET LINES 132 PAGES 100

  SQL> COL con_name        FORM A15 HEAD "Container|Name"

  SQL> COL tablespace_name FORM A15

  SQL> COL fsm             FORM 999,999,999,999 HEAD "Free|Space Meg."

  SQL> COL apm             FORM 999,999,999,999 HEAD "Alloc|Space Meg."

  --

  SQL> COMPUTE SUM OF fsm apm ON REPORT

  SQL> BREAK ON REPORT ON con_id ON con_name ON tablespace_name

  --

  SQL> WITH x AS (SELECT c1.con_id, cf1.tablespace_name, SUM(cf1.bytes)/1024/1024
  fsm

  FROM cdb_free_space cf1

  ,v$containers   c1

  WHERE cf1.con_id = c1.con_id

  GROUP BY c1.con_id, cf1.tablespace_name),

  y AS (SELECT c2.con_id, cd.tablespace_name, SUM(cd.bytes)/1024/1024 apm

  FROM cdb_data_files cd

  ,v$containers   c2

  WHERE cd.con_id = c2.con_id

  GROUP BY c2.con_id

  ,cd.tablespace_name)

  SELECT x.con_id, v.name con_name, x.tablespace_name, x.fsm, y.apm

  FROM x, y, v$containers v

  WHERE x.con_id          = y.con_id

  AND   x.tablespace_name = y.tablespace_name

  AND   v.con_id          = y.con_id

  UNION

  SELECT vc2.con_id, vc2.name, tf.tablespace_name, null, SUM(tf.bytes)/1024/1024

  FROM v$containers vc2, cdb_temp_files tf

  WHERE vc2.con_id  = tf.con_id

  GROUP BY vc2.con_id, vc2.name, tf.tablespace_name

  ORDER BY 1, 2;

  ```


  以下是一些示例输出：


  ```

  Container                                   Free            Alloc

  CON_ID Name            TABLESPACE_NAME       Space Meg.       Space Meg.

  ---------- --------------- --------------- ---------------- ----------------

  1 CDB$ROOT        SYSAUX                        42              780

  SYSTEM                         7              790

  TEMP                                           88

  UNDOTBS1                     206              230

  USERS                          4                5

  2 PDB$SEED        SYSAUX                         2              640

  SYSTEM                         5              260

  TEMP                                           87

  ********** *************** *************** ---------------- ----------------

  sum                                                     266            2,880

  ```


  在尝试查询 CDB 级别视图之前，请确保你想要报告的 PDB 都已打开。如果 PDB 未打开，它将不会出现在报告输出中。默认情况下，PDB 设置为打开；作为参考，以下是再次打开所有可插拔数据库的语句：


  ```sql

  SQL> alter pluggable database all open ;

  ```


  > **提示：**

  > 报告单个可插拔数据库的表空间和数据文件使用情况与报告非 CDB 数据库中的空间使用情况没有太大区别。首先，以具有从`DBA`级别视图选择权限的用户身份直接连接到可插拔数据库。然后，运行查询空间相关视图的报告。有关报告非
  CDB 中空间使用的查询，请参见第 4 章。


  ## 切换容器


  一旦你以公共用户身份连接到数据库中的任何容器（根容器或 PDB），你就可以使用`ALTER SESSION`命令切换到你已被授予访问权限的另一个容器。例如，要将当前容器设置为名为`SALESPDB`的
  PDB，你可以执行以下操作：


  ```sql

  SQL> alter session set container = salespdb;

  ```


  你可以通过指定`CDB$ROOT`切换回根容器：


  ```sql

  SQL> alter session set container = cdb$root;

  ```


  切换容器不需要监听器正在运行或密码文件。只要公共用户拥有权限，用户就会成功切换到新的容器上下文。拥有切换容器的能力在需要连接到 PDB 以排查问题然后再连接回根容器时特别有用。




  '
- '# 在 CDB 中创建可插拔数据库


  创建 CDB 后，就可以开始在其内部创建 PDB。当你指示 Oracle 创建 PDB 时，其底层过程实际上是复制现有数据库（种子数据库、PDB 或非 CDB）的数据文件，然后使用新
  PDB 的元数据实例化 CDB。这里的关键是正确指定你希望 Oracle 用作模板来创建新 PDB 的源数据库。


  有多种工具可用于创建（克隆）PDB：即`CREATE PLUGGABLE DATABASE` SQL 语句、`DBCA`实用程序和 Enterprise Manager
  Cloud Control。本章重点介绍使用 SQL 和`DBCA`实用程序。如果你理解了如何使用 SQL 和`DBCA`创建 PDB，那么你应该能轻松地使用
  Enterprise Manager 界面来实现相同的目标。


  使用`CREATE PLUGGABLE DATABASE`语句时，你可以使用以下任何来源来创建 PDB：


  *   种子数据库

  *   现有 PDB（本地或远程）

  *   非 CDB 数据库

  *   已拔出的 PDB


  使用`DBCA`时，你可以从以下任何来源创建 PDB：


  *   种子数据库

  *   RMAN 备份

  *   已拔出的 PDB


  在以下章节中，将介绍所有`CREATE PLUGGABLE DATABASE`变体来创建 PDB。对于`DBCA`，我仅展示如何从种子数据库创建 PDB。你应该能够根据你的各种需求修改该示例。


  ## 克隆种子数据库


  `CREATE PLUGGABLE DATABASE`语句可用于通过复制种子数据库的数据文件来创建 PDB。为此，首先以`SYS`用户（或具有创建 PDB 权限的公共用户）连接到根容器数据库：


  ```

  $ sqlplus sysuser/pass@CDB1 as sysdba

  ```


  以下 SQL 语句创建一个名为`SALESPDB`的可插拔数据库：


  ```

  SQL> CREATE PLUGGABLE DATABASE salespdb

  ADMIN USER salesadm IDENTIFIED BY foo

  FILE_NAME_CONVERT = (''/u01/app/oracle/oradata/CDB/pdbseed'',

  ''/u01/app/oracle/oradata/CDB/salespdb'');

  ```


  运行前面的代码后，你应该会看到类似以下的输出：


  ```

  Pluggable database created.

  ```


  > **注意**

  > 如果你使用的是`OMF`，在创建可插拔数据库时不需要指定`FILE_NAME_CONVERT`子句，因为 Oracle 会自动确定可插拔数据库数据文件的名称和位置。


  请注意，此示例中的`FILE_NAME_CONVERT`子句有两个字符串。一个指定种子数据库数据文件的位置：


  ```

  /u01/app/oracle/oradata/CDB/pdbseed

  ```


  第二个字符串是你希望创建新 PDB 数据文件的位置：


  ```

  /u01/app/oracle/oradata/CDB/salespdb

  ```


  你需要将这些字符串修改为适合你环境的适当值。


  使用`CREATE PLUGGABLE DATABASE`语句创建 PDB 时，有几个可用选项。表 22-2 总结了各种子句的含义。


  **表 22-2 可插拔数据库创建选项**


  | 参数 | 描述 |

  | :--- | :--- |

  | `ADMIN USER` | 创建的用于管理任务的本地用户。该用户被分配`PDB_DBA`角色。 |

  | `MAXSIZE` | 可插拔数据库可消耗的最大存储空间；如果未指定，则对 PDB 可使用的存储量没有限制。 |

  | `MAX_SHARED_TEMP_SIZE` | 连接到 PDB 的会话可以使用的共享临时表空间的最大量。 |

  | `DEFAULT TABLESPACE` | 指定在可插拔数据库内创建的新用户的默认永久表空间。 |

  | `DATAFILE` | 与默认表空间关联的数据文件的路径和文件名。 |

  | `PATH_PREFIX` | 指定添加到可插拔数据库的任何新数据文件必须存在于此目录或其子目录中。 |

  | `FILE_NAME_CONVERT` | 指定种子数据库数据文件的位置以及它们应被复制到的目标位置。 |


  ## 克隆现有 PDB


  你可以从当前连接的（本地）CDB 中的现有 PDB 创建 PDB，也可以将远程 CDB 中的 PDB 复制为副本来创建 PDB。这两种技术将在接下来的两个小节中详细介绍。


  ### 本地


  在此示例中，使用现有 PDB（`SALESPDB`）来创建新 PDB（`SALESPDB2`）。首先，连接到根容器，并将现有的源 PDB 置于只读模式：


  ```

  $ sqlplus sysuser/pass@CDB1 as sysdba

  SQL> alter pluggable database salespdb close;

  SQL> alter pluggable database salespdb open read only;

  ```


  现在，运行以下 SQL 以创建新的 PDB：


  ```

  SQL> CREATE PLUGGABLE DATABASE salespdb2

  FROM salespdb

  FILE_NAME_CONVERT = (''/u01/app/oracle/oradata/CDB/salespdb'',

  ''/u01/dbfile/CDB/salespb2'')

  STORAGE (MAXSIZE 6G MAX_SHARED_TEMP_SIZE 100M);

  ```


  在前面的示例中，位于`/u01/app/oracle/oradata/CDB/salespdb`目录中与`SALESPDB`关联的数据文件被用来在`/u01/dbfile/CDB/salespdb2`目录中创建数据文件。如果目标目录事先不存在，系统会为你创建。你还可以对克隆的
  PDB 指定管理限制，例如将其最大大小限制为 6GB，以及限制其在共享临时表空间中可消耗的共享资源最大量为 100MB。


  ### 远程


  你也可以将远程 PDB 克隆为副本以创建 PDB。首先，你需要创建一个从 CDB 到将用作克隆源的 PDB 的数据库链接。本地用户和在数据库链接中指定的用户都必须具有`CREATE
  PLUGGABLE DATABASE`权限。


  此示例显示以`SYS`身份本地连接到根容器。这是将在其中创建新 PDB 的数据库：


  ```

  $ sqlplus sysuser/pass@CDB1 as sysdba

  ```


  在此数据库中，创建一个到远程 CDB 中 PDB 的数据库链接。远程 CDB 包含一个名为`SALESPDB`的 PDB，其中有一个用户已被授予`CREATE
  PLUGGABLE DATABASE`权限。该用户将用于数据库链接：


  ```

  create database link salespdb

  connect to mv_maint identified by foo

  using ''speed2:1521/salespdb'';

  ```


  接下来，连接到包含将被克隆的 PDB 的远程数据库：


  ```

  $ sqlplus sysuser/foo@speed2:1521/salespdb as sysdba

  ```


  关闭 PDB 并以只读模式打开它：


  ```

  SQL> alter pluggable database salespdb close;

  SQL> alter pluggable database salespdb open read only;

  ```


  现在，以`SYS`身份连接到目标 CDB，并如所示克隆远程 PDB 来创建新的 PDB：


  ```

  $ sqlplus sysuser/pass@CDB1 as sysdba

  SQL> CREATE PLUGGABLE DATABASE salespdb3

  FROM salespdb@salespdb

  FILE_NAME_CONVERT = (''/u01/app/oracle/oradata/CDB/salespdb'',

  ''/u01/dbfile/CDB2/salespdb3'');

  ```


  ## 从非 CDB 数据库克隆


  有三种方式可以从现有的非 CDB 创建 PDB：


  *   使用`DBMS_PDB`包生成元数据，然后使用`CREATE PLUGGABLE DATABASE` SQL 语句创建 PDB。

  *   数据泵（使用可传输表空间功能）。

  *   GoldenGate 复制。


  以下示例使用`DBMS_PDB`包从非 CDB 创建 PDB。有关数据泵和 GoldenGate 的详细信息，请分别参阅 Oracle 数据库实用程序指南和 GoldenGate
  特定文档，这些文档可从 Oracle 网站（ [`http://otn.oracle.com`](http://otn.oracle.com) ）的技术网络区域获取。


  > **注意**

  > 使用`DBMS_PDB`包将非 CDB 转换为 PDB 时，非 CDB 必须是 Oracle 12c 或更高版本。


  首先，将非 CDB 置于只读模式：


  ```

  SQL> startup mount;

  SQL> alter database open read only;

  ```


  然后，运行`DBMS_PDB`包以创建描述非 CDB 数据库结构的 XML 文件：


  ```

  BEGIN

  DBMS_PDB.DESCRIBE(pdb_descr_file => ''/orahome/oracle/ncdb.xml'');

  END;

  /

  ```


  创建 XML 文件后，关闭非 CDB 数据库：


  ```

  SQL> shutdown immediate;

  ```



  ## 将非 CDB 转换为 PDB


  ### 准备环境并检查兼容性


  接下来，设置您的 Oracle OS 变量（如 `ORACLE_SID` 和 `ORACLE_HOME`），然后连接到将容纳非 CDB 作为 PDB 的 CDB
  数据库：


  ```

  $ sqlplus / as sysdba

  ```


  现在，您可以选择检查非 CDB 是否与它将插入的 CDB 兼容。运行此代码时，请提供先前创建的 XML 文件的目录和名称：


  ```

  SQL> SET SERVEROUTPUT ON

  SQL> DECLARE

  hold_var boolean;

  begin

  hold_var := DBMS_PDB.CHECK_PLUG_COMPATIBILITY(pdb_descr_file=>''/orahome/oracle/ncdb.xml'');

  if hold_var then

  dbms_output.put_line(''YES'');

  else

  dbms_output.put_line(''NO'');

  end if;

  end;

  /

  ```


  如果没有兼容性问题，上述代码将显示 `YES`；如果 PDB 不兼容，则会显示 `NO`。您可以查询 `PDB_PLUG_IN_VIOLATIONS` 视图以获取
  PDB 与 CDB 不兼容的详细原因。


  ### 创建 PDB


  接下来，使用以下 SQL 从非 CDB 创建 PDB。您必须指定详细信息，例如先前创建的 XML 文件的名称和位置、非 CDB 数据文件的位置以及您希望创建新数据文件的位置：


  ```

  SQL> CREATE PLUGGABLE DATABASE dkpdb

  USING ''/orahome/oracle/ncdb.xml''

  COPY

  FILE_NAME_CONVERT = (''/u01/dbfile/dk/'',

  ''/u01/dbfile/CDB/dkpdb/'');

  ```


  如果成功，您应该会看到：


  ```

  Pluggable database created.

  ```


  现在，以 `SYS` 用户身份连接到新创建的 PDB：


  ```

  $ sqlplus sys/foo@''speed2:1521/dkpdb'' as sysdba

  ```


  作为最后一步，运行以下脚本：


  ```

  SQL> @?/rdbms/admin/noncdb_to_pdb.sql

  ```


  您现在应该可以打开 PDB 并开始使用它。


  ## 从 CDB 中拔出 PDB


  在将 PDB 插入另一个 CDB 之前，必须先将其拔出。拔出意味着将 PDB 与 CDB 解除关联，并生成一个描述被拔出 PDB 的 XML 文件。此 XML
  文件将来可用于将 PDB 插入另一个 CDB。


  以下是拔出 PDB 所需的步骤：


  1.  关闭 PDB（这会将其打开模式更改为 `MOUNTED`）

  2.  通过 `ALTER PLUGGABLE DATABASE ... UNPLUG` 命令拔出可插拔数据库


  首先，以 `SYS` 用户身份连接到根容器，然后关闭 PDB：


  ```

  $ sqlplus sysuser/pass@CDB1 as sysdba

  SQL> alter pluggable database dkpdb close immediate;

  ```


  接下来，拔出 PDB。请确保为您环境中 XML 文件的位置指定一个存在的目录：


  ```

  SQL> alter pluggable database dkpdb unplug into

  ''/orahome/oracle/dba/dkpdb.xml'';

  ```


  XML 文件包含有关 PDB 的元数据，例如其数据文件。如果您想将 PDB 插入另一个 CDB，则需要此 XML 文件。


  > **注意**

  > 一旦 PDB 被拔出，在可以将其插回原始 CDB 之前，必须先将其删除。


  ## 将拔出的 PDB 插入 CDB


  ### 检查兼容性


  在 PDB 可以插入 CDB 之前，它必须在数据文件字节顺序和已安装的兼容数据库选项方面与 CDB 兼容。从 18c 开始，PDB 中的字符集可以与源 PDB
  不同。您可以通过 `DBMS_PDB` 包来验证兼容性。您必须向该包提供 PDB 被拔出时创建的 XML 文件的目录和名称作为输入。以下是一个示例：


  ```

  SQL> SET SERVEROUTPUT ON

  SQL> DECLARE

  hold_var boolean;

  begin

  hold_var := DBMS_PDB.CHECK_PLUG_COMPATIBILITY(pdb_descr_file=>''/orahome/oracle/dba/dkpdb.xml'');

  if hold_var then

  dbms_output.put_line(''YES'');

  else

  dbms_output.put_line(''NO'');

  end if;

  end;

  /

  ```


  如果没有兼容性问题，上述代码将显示 `YES`；如果 PDB 不兼容，则会显示 `NO`。您可以查询 `PDB_PLUG_IN_VIOLATIONS` 视图以获取
  PDB 与 CDB 不兼容的详细原因。


  ### 插入 PDB


  插入 PDB 使用 `CREATE PLUGGABLE DATABASE` 命令。当您将 PDB 插入 CDB 时，必须提供一些关键信息，使用以下两个子句：


  *   `USING` 子句：指定 PDB 被拔出时创建的 XML 文件的位置。

  *   `COPY FILE_NAME_CONVERT` 子句：指定 PDB 数据文件的源以及 PDB 数据文件将在目标 CDB 内创建的位置。


  要插入 PDB，请以特权用户身份连接到 CDB，然后运行以下命令：


  ```

  SQL> CREATE PLUGGABLE DATABASE dkpdb

  USING ''/orahome/oracle/dba/dkpdb.xml''

  COPY

  FILE_NAME_CONVERT = (''/u01/app/oracle/oradata/CDB1/dkpdb'',

  ''/u01/dbfile/CDB2/dkpdb'');

  ```


  您现在可以打开 PDB 并开始使用它。


  ## 使用 DBCA 从种子库创建 PDB


  您可以使用 DBCA 实用程序通过指定 `-createPDBFrom DEFAULT` 子句从种子数据库创建 PDB。以下示例在名为 `CDB` 的 CDB
  中创建一个名为 `HRPDB` 的可插拔数据库：


  ```

  $ dbca -silent -createPluggableDatabase -sourceDB CDB -pdbName hrpdb

  -createPDBFrom DEFAULT

  -pdbAdminUserName adminplug -pdbAdminPassword foo

  -pdbDatafileDestination /u01/dbfile/CDB/hrpdb

  ```


  上面的代码行必须在一行中输入。此外，如果 PDB 目标目录不存在，DBCA 将自动创建它。随着命令的进行，您应该会看到类似于以下内容的输出：


  ```

  Creating Pluggable Database

  4% complete

  12% complete

  ...

  Completing Pluggable Database Creation

  100% complete

  Look at the log file "/orahome/app/oracle/cfgtoollogs/dbca/CDB.log" for further
  details.

  ```


  作为最后一步，您应该检查日志文件并确保 PDB 的创建没有问题。


  ## 检查可插拔数据库的状态


  创建 PDB 后，您可能需要检查其状态。连接到根容器时，您可以查看 CDB 中所有 PDB 的状态。例如，具有 DBA 权限的用户可以通过此查询报告所有 PDB
  的状态：


  ```

  SQL> select pdb_id, pdb_name, status from cdb_pdbs;

  ```


  以下是一些示例输出：


  ```

  PDB_ID PDB_NAME             STATUS

  ---------- -------------------- -------------

  2 PDB$SEED             NORMAL

  3 SALESPDB             NORMAL

  4 HRPDB                NORMAL

  ```


  下一个查询报告可插拔数据库是否已打开：


  ```

  SQL> select con_id, name, open_mode from v$pdbs;

  ```


  以下是一些示例输出：


  ```

  CON_ID NAME                           OPEN_MODE

  ---------- ------------------------------ ----------

  2 PDB$SEED                       READ ONLY

  3 SALESPDB                       READ WRITE

  4 HRPDB                          READ WRITE

  ```


  如果您直接连接到 PDB 时运行上述查询，则 `CDB_PDBS` 中不会显示任何信息。此外，`V$PDBS` 将仅显示当前连接的 PDB 的信息。


  ## 管理可插拔数据库


  您可以直接连接到 PDB 执行许多数据库管理任务。您可以打开/关闭 PDB、检查其状态、显示当前连接的用户等等。您可以以特权连接到根容器来管理可插拔数据库，也可以以特权用户身份直接连接到
  PDB 本身执行任务。


  请记住，当您以 `SYS` 用户身份连接到 CDB 中的 PDB 时，您只能对所连接的 PDB 执行 `SYS` 特权操作。您无法启动/停止容器实例或查看与 CDB
  中其他 PDB 相关的数据字典信息。职责分离可以让一个团队或 DBA 仅管理一个或多个 PDB，而另一个团队或 DBA 负责 CDB 管理。


  ### 连接到 PDB


  您可以以 `SYS` 用户身份本地或通过网络连接到 PDB。

  要进行本地连接，首先以具有 PDB 权限的普通用户身份连接到根容器，然后使用 `SET CONTAINER` 命令连接到所需的 PDB：


  ```

  SQL> alter session set container=salespdb;

  ```



  先前的连接不需要监听器或密码文件；而通过网络的连接则两者都需要。以下示例通过 SQL*Plus 建立网络连接，并在连接时指定 PDB 的主机、监听器端口和服务名：


  ```bash

  $ sqlplus pdbsys/foo@speed2:1521/salespdb as sysdba

  ```


  如果你不确定如何设置监听器和密码文件，请参阅第 2 章。如果你使用 DBCA 实用程序创建 PDB，其监听器将被自动设置。关于如何向监听器注册 PDB 服务名的说明，请参见下一节。


  ## 在 PDB 环境中管理监听器


  回顾第 2 章可知，监听器是支持远程网络连接到数据库的进程。大多数数据库环境都需要一个监听器才能运行。当客户端尝试连接到远程数据库时，它会提供三条关键信息：监听器所在的主机、监听器正在监听的主机端口以及数据库服务名。


  每个数据库都分配有一个或多个服务名。默认情况下，通常会有一个源自数据库唯一名称和域名的服务名。你可以手动为数据库创建一个或多个服务名。DBA 有时会创建多个服务，以便可以针对每个服务控制或监控资源使用情况。例如，可能为销售应用创建一个服务，为人力资源应用创建另一个服务。每个应用通过其服务名连接到数据库。该服务的连接信息会出现在每个会话的
  `V$SESSION` 视图的 `SERVICE_NAME` 列中。


  如果你在没有 `listener.ora` 文件的情况下启动默认监听器，PMON 后台进程会自动将任何数据库（包括任何可插拔数据库）作为服务进行注册：


  ```bash

  $ lsnrctl start

  ```


  最终，你应该能看到数据库（包括任何 PDB）已注册到默认监听器。


  注意：启动监听器时，如果存在 `listener.ora` 文件，监听器将尝试静态注册该文件中出现的所有服务名。


  默认情况下，PDB 使用与 PDB 名相同的服务名进行注册。这个默认服务通常是你用来建立连接的服务：


  ```bash

  $ sqlplus pdbsys/foo@speed2:1521/salespdb as sysdba

  ```


  你可以通过以 `SYS` 身份连接到根容器并查询来验证哪些服务正在运行：


  ```sql

  SQL> select name, network_name, pdb from v$services order by pdb, name;

  ```


  你也可以通过 `lsnrctl` 实用程序验证监听器正在监听哪些服务：


  ```bash

  $ lsnrctl services

  ```


  Oracle 建议你为任何需要访问 PDB 的应用程序配置一个额外的服务（除了默认服务）。你可以通过 `SRVCTL` 实用程序或 `DBMS_SERVICE`
  包手动配置服务。此示例展示了如何通过 `DBMS_SERVICE` 包配置一个服务。首先，通过默认服务以 `SYS` 身份连接到你想要在其中创建服务的 PDB：


  ```bash

  $ sqlplus pdbsys/foo@speed2:1521/salespdb as sysdba

  ```


  确保 PDB 处于读写模式打开状态：


  ```sql

  SQL> SELECT con_id, name, open_mode FROM v$pdbs;

  ```


  接下来，创建一个服务。此代码创建并启动了一个名为 `SALESWEST` 的服务：


  ```sql

  SQL> exec DBMS_SERVICE.CREATE_SERVICE(service_name => ''SALESWEST'', network_name
  => ''SALESWEST'');

  SQL> exec DBMS_SERVICE.START_SERVICE(service_name => ''SALESWEST'');

  ```


  现在，应用用户可以通过该服务连接到 `SALESPDB` 可插拔数据库：


  ```bash

  $ sqlplus appuser/pass@speed2:1521/saleswest

  ```


  注意：如果你的服务器上有多个 CDB 数据库，请确保 PDB 服务名在该服务器上的所有 CDB 数据库中是唯一的。不建议将两个同名的 PDB 数据库注册到一个公共监听器。这将导致混淆你实际连接到的是哪个
  PDB。


  ## 显示当前连接的 PDB


  从 SQL*Plus 中，有几种简单的方法可以显示你当前连接的 PDB 的名称。此示例使用 `SHOW` 命令来显示容器 ID、名称和用户：


  ```sql

  SQL> show con_id con_name user

  ```


  这是一些示例输出：


  ```text

  CON_ID

  ---------

  3

  CON_NAME

  ---------

  SALESPDB

  USER is "SYS"

  ```


  你也可以通过 SQL 查询显示相同的信息：


  ```sql

  SELECT SYS_CONTEXT(''USERENV'', ''CON_ID'') AS con_id,

  SYS_CONTEXT(''USERENV'', ''CON_NAME'') AS cur_container,

  SYS_CONTEXT(''USERENV'', ''SESSION_USER'') AS cur_user

  FROM DUAL;

  ```


  这是一些示例输出：


  ```text

  CON_ID     CUR_CONTAINER   CUR_USER

  ---------- --------------- ----------

  3          SALESPDB        SYS

  ```


  请记住，`SYS_CONTEXT` 函数可用于显示其他有用的信息，例如 `SERVICE_NAME`、`DB_UNIQUE_NAME`、`INSTANCE_NAME`
  和 `SERVER_HOST`；例如：


  ```sql

  SELECT

  SYS_CONTEXT(''USERENV'', ''SERVICE_NAME'') as service_name,

  SYS_CONTEXT(''USERENV'', ''DB_UNIQUE_NAME'') as db_unique_name,

  SYS_CONTEXT(''USERENV'', ''INSTANCE_NAME'') as instance_name,

  SYS_CONTEXT(''USERENV'', ''SERVER_HOST'') as server_host

  from dual ;

  ```


  ## 启动/停止 PDB


  当你启动/停止一个 PDB 时，你并不是在启动/停止一个实例。相反，你是在使 PDB 可用或不可用，打开或关闭。你可以从以 `SYS` 身份连接到根容器或直接以
  `SYS` 身份连接到 PDB 来更改 PDB 的打开模式。


  ### 从根容器


  要从根容器更改 PDB 的打开模式，请按如下方式操作：


  ```sql

  SQL> alter pluggable database salespdb open;

  ```


  你也可以以特定状态启动可插拔数据库，例如只读：


  ```sql

  SQL> startup pluggable database salespdb open read only;

  ```


  要关闭 PDB，你可以指定 PDB 的名称：


  ```sql

  SQL> alter pluggable database salespdb close immediate;

  ```


  你也可以在连接到根容器时打开或关闭所有可插拔数据库。在实际的生产系统中，不建议这样做，因为这些可能都是不同的应用程序，除非正在进行服务器维护，否则可能没有理由关闭所有
  PDB。


  ```sql

  SQL> alter pluggable database all open;

  SQL> alter pluggable database all close immediate ;

  ```


  ### 从可插拔数据库


  要打开/启动可插拔数据库，以 `SYS` 身份连接到该可插拔数据库：


  ```bash

  $ sqlplus pdbsys/foo@salespdb as sysdba

  SQL> startup;

  ```


  要关闭数据库，请发出以下命令：


  ```sql

  SQL> shutdown immediate;

  ```


  ## 修改特定于 PDB 的初始化参数


  Oracle 允许在以特权用户身份连接到 PDB 时修改某些初始化参数。你可以通过以下查询查看这些参数：


  ```sql

  SQL> SELECT name

  FROM v$parameter

  WHERE ispdb_modifiable=''TRUE''

  ORDER BY name;

  ```


  这是输出的一小部分：


  ```text

  NAME

  --------------------------------

  sort_area_size

  sql_trace

  sqltune_category

  star_transformation_enabled

  statistics_level

  ```


  当你直接连接到 PDB 并进行初始化参数更改时，这些更改仅影响当前连接的 PDB。参数更改不会影响根容器或其他 PDB。例如，假设你想更改 `OPEN_CURSORS`
  的值。首先，以特权用户身份直接连接到 PDB，并发出 `ALTER SYSTEM` 语句：


  ```bash

  $ sqlplus pdbsys/foo@speed2:1521/salespdb as sysdba

  SQL> alter system set open_cursors=100;

  ```


  先前的修改仅针对 `SALESPDB` PDB 更改了 `OPEN_CURSORS` 的值。此外，`SALESPDB` 的 `OPEN_CURSORS` 设置将在数据库重启后持续有效。


  ## 重命名 PDB



  '
- "# PDB 管理操作\n\n## 重命名 PDB\n\n偶尔，你可能需要重命名一个 PDB。例如，数据库最初可能被错误命名，或者你不再使用该数据库并希望在其名称后附加一个`_OLD`。要重命名一个可插拔数据库，首先以具有`SYSDBA`权限的账户连接到它：\n\
  \n```sql\n$ sqlplus pdbsys/foo@invpdb as sysdba\n```\n\n接下来，停止 PDB 并以受限模式重新启动它：\n\
  \n```sql\nSQL> shutdown immediate;\nSQL> startup restrict;\n```\n\n现在，可以重命名该可插拔数据库：\n\
  \n```sql\nSQL> alter pluggable database INVPDB rename global_name to INVPDB_OLD;\n\
  ```\n\n## 限制 PDB 的空间消耗\n\n你可以对一个 PDB 可以消耗的磁盘空间总量设置限制。虽然 PDB 数据文件的最大尺寸可以做到这一点，但这涉及到多个表空间和数据文件的情况。数据库的尺寸应可通过\
  \ ASM 磁盘组或文件系统容量得知。\n\n在此示例中，对一个可插拔数据库设置了 100GB 的总体限制。首先，以`SYS`身份连接到该可插拔数据库：\n\n\
  ```sql\n$ sqlplus pdbsys/foo@speed2:1521/salespdb as sysdba\n```\n\n然后，修改可插拔数据库的最大尺寸限制。此命令将可插拔数据库的大小限制为最大\
  \ 100GB：\n\n```sql\nSQL> alter pluggable database salespdb storage(maxsize 100G);\n\
  ```\n\n空间并不是唯一可以被 PDB 限制的资源。CPU 和内存可以通过在 PDB 中使用参数或使用资源管理器计划来限制。作为 PDB 中的特权用户，你可以修改系统设置，使`CPU_COUNT`等于小于\
  \ CDB 总`CPU_COUNT`的值。这将不允许该 PDB 使用超过那些 CPU 资源。对于内存也是如此，在 PDB 中设置内存限制参数，同样小于 CDB\
  \ 的设置。连接到 PDB 并使用以下修改语句：\n\n```sql\nSQL> alter system set CPU_COUNT = 2 scope =\
  \ both;\nSQL> alter system set SGA_TARGET = 16GB scope = both;\n```\n\n## 限制在 PDB\
  \ 级别对 SYSTEM 的更改\n\n在管理 PDB 时，可以在 PDB 级别更改参数，如上所述。你也可以在 CDB 级别为 PDB 更改这些参数。可以限制这些更改，使得只有\
  \ CDB 管理员才能修改 PDB 的这些设置。这将允许 CDB DBA 了解 CDB 中有多少个 PDB 并进行管理。即使每个 PDB 中的`sysdba`用户在\
  \ PDB 中拥有 DBA 权限并可以管理 PDB，这些更改也将被保留。\n\n这是通过`PDB_LOCKDOWN`完成的。创建锁定配置文件，为其设置 PDB，并将命令添加到配置文件中以限制\
  \ PDB DBA 更改诸如 CPU、内存等设置的配置。\n\n在 CDB 中，以下是创建`PDB_LOCKDOWN`的快速概览：\n\n```sql\nSQL>\
  \ CREATE LOCKDOWN PROFILE pdbprofile1;\nSQL> ALTER SYSTEM SET PDB_LOCKDOWN=pdbprofile1;\n\
  ```\n\n并且你可以查看`PDB_LOCKDOWN`中的参数：\n\n```sql\nSQL> SHOW PARAMETER PDB_LOCKDOWN\n\
  ```\n\nOracle 18c 具有动态锁定配置文件，允许额外的参数设置、资源管理器计划和选项。它们是动态的，因为不需要重启 PDB 并立即生效。\n\n\
  ## 查看 PDB 历史记录\n\n如果你需要查看 PDB 的创建时间，可以查询`CDB_PDB_HISTORY`视图，如下所示：\n\n```sql\nSQL>\
  \ COL db_name FORM A10\nSQL> COL con_id FORM 999\nSQL> COL pdb_name FORM A15\nSQL>\
  \ COL operation FORM A16\nSQL> COL op_timestamp FORM A10\nSQL> COL cloned_from_pdb_name\
  \ FORMAT A15\n--\nSQL> SELECT db_name, con_id, pdb_name, operation,\n    op_timestamp,\
  \ cloned_from_pdb_name\n    FROM cdb_pdb_history\n    WHERE con_id > 2\n    ORDER\
  \ BY con_id;\n```\n\n以下是一些示例输出：\n\n```\nDB_NAME    CON_ID PDB_NAME       OPERATION\
  \      OP_TIMESTA  CLONED_FROM_PDB\n---------- ------ -------------- --------------\
  \ ----------- ---------------\nCDB             3 SALESPDB       CREATE         04-DEC-12\
  \   PDB$SEED\nCDB             4 HRPDB          CREATE         10-FEB-13   PDB$SEED\n\
  ```\n\n通过这种方式，你可以确定 PDB 是何时创建的以及来自什么源。\n\n## 删除 PDB\n\n偶尔，你可能需要删除一个 PDB。你可能这样做是因为不再需要该\
  \ PDB，或者因为你正在将其传输（拔出/插入）到不同的 CDB，并希望从原始 CDB 中删除该 PDB。如果需要移除 PDB，可以通过两种方式完成：\n\n\
  *   删除 PDB 及其数据文件。\n*   删除 PDB 但将其数据文件保留在原地。\n\n如果你计划不再使用该 PDB，则可以将其删除并指定同时删除数据文件。如果你计划将该\
  \ PDB 插入不同的 CDB，那么当然不要删除数据文件，因为这样做会将其从磁盘上移除。\n\n要删除 PDB，首先以特权账户连接到根容器，并关闭 PDB：\n\
  \n```sql\nSQL> alter pluggable database dkpdb close immediate;\n```\n\n此示例删除 PDB\
  \ 及其数据文件：\n\n```sql\nSQL> drop pluggable database dkpdb including datafiles;\n```\n\
  \n如果成功，你将看到此消息：\n\n```\nPluggable database dropped.\n```\n\n下一个示例删除 PDB 但不移除数据文件。如果你要将可插拔数据库移动到不同的\
  \ CDB，可能需要这样做：\n\n```sql\nSQL> drop pluggable database dkpdb;\n```\n\n通过这种方式，PDB\
  \ 与 CDB 解除关联，但其数据文件在磁盘上保持完整。\n\n## 可刷新克隆 PDB\n\n在 Oracle 18c 中，PDB 可以定期从源 PDB 刷新。这有助于克隆那些需要很长时间创建的情况，并为故障转移、负载均衡以及只需管理两个\
  \ CDB 而更新另一个 CDB 中的 PDB。角色也可以互换，使源 PDB 成为克隆，克隆成为源 PDB。这基本上取代了 PDB 的 Data Guard 故障转移。\n\
  \nPDB 以刷新模式创建并配置克隆。这允许自动刷新克隆 PDB 并为其设置发生间隔。也可以手动触发刷新。要创建克隆：\n\n```sql\nSQL> CREATE\
  \ PLUGGABLE DATABASE pdbclone1 REFRESH MODE EVERY 5 MINUTES\n```\n\n将刷新模式更改为手动：\n\
  \n```sql\nSQL> ALTER PLUGGABLE DATABASE pdbclone1 REFRESH MODE MANUAL;\n```\n\n\
  可以在克隆 PDB 容器中使用以下命令切换克隆：\n\n```sql\nSQL> ALTER PLUGGABLE DATABASE REFRESH MODE MANUAL\
  \ FROM pdb1@CDB1_dblink SWITCHOVER ;\n```\n\n## 云中的数据库\n\nOracle 数据库可以在不同的云平台上创建。有模板、容器和其他方式来安装\
  \ Oracle 软件，作为基础设施即服务(IaaS)或平台即服务(PaaS)的一部分，以创建数据库和管理环境。\n\nOracle 自治数据库云是 Oracle\
  \ 在其公有云中提供的自治数据库产品。它由 Oracle 18c 驱动，最初是自治数据仓库云(ADWC)，现在包括自治事务处理数据库(ATP)。这个自驾驶数据库通过修补的形式提供了维护、性能和安全方面的若干自动化流程。使用\
  \ Oracle Cloud 的优势在于，Oracle 软件和选项可用并已实施，随时可用。快速版为你提供了本章前面讨论的 PDB。建议在云实现中创建 CDB 服务和多个\
  \ PDB。云中的访问可能不包括服务器访问，这就是为什么通过网络使用`sysdba`用户连接对于 CDB 和 PDB 很重要。在云中或本地管理用户、对象和其他容器的其他任务将是相同的。\n\
  \n自治数据库实际上可以进行试驾，理解 CDB 和 PDB 概念以及用户和管理将简化云中的测试，并支持任何迁移和未来的云环境。\n\n## 总结\n\nOracle\
  \ Database 12c 新引入的 PDB 是存在于 CDB 内部的一组数据文件和元数据。PDB 具有几个有趣的架构特性：\n\n\n"
- "# PDB 特性\n\n*   当连接到 PDB 时，您无法看到 CDB 中存在的其他 PDB。这就像您连接到一个隔离的数据库。\n*   多个 PDB 在\
  \ CDB 内共享通用数据库资源（内存结构、后台进程等）。从根容器级别，您可以像管理单个数据库一样管理许多 DBA 数据库。\n*   您可以关闭一个 PDB，而不会影响\
  \ CDB 内的其他 PDB。\n*   可以通过克隆种子数据库、现有 PDB 或非 CDB 来快速创建新的 PDB。\n*   PDB 可以创建并设置为自动刷新。\n\
  *   PDB 可以通过从一个 CDB 拔出并插入另一个 CDB 来轻松地从一个 CDB 传输到另一个 CDB。\n\n## 功能与优势\n\n这些特性提供了创建和管理数据库的新方法。PDB\
  \ 技术的主要优点是它允许您将许多数据库整合到一个总括性数据库中。这产生了规模经济，因为可以在更少的服务器上由更少的支持人员实施和维护更多的数据库。作为 DBA，理解此技术及其实施方法使您对公司更有价值。本地配置的数据库环境在云中同样可用。了解如何管理本地数据库将适用于云中的管理。拥有数据库的\
  \ PDB 级别允许进行单独管理，而无需管理 CDB 或数据库服务器。\n即使在 Oracle Cloud 的自主数据库中，DBA 仍然需要处理应用程序数据、集成和数据安全策略。当您理解数据库、数据以及如何使用它们时，总有足够的工作要做。\n\
