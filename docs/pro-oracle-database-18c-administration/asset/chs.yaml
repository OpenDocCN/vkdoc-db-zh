  \n*献给我的女儿们。*\n\n*她们相信我，正如我相信她们一样。*\n\n## 引言\n\n云计算、自动化、人工智能和机器学习都是描述技术方向的关键词。这些领域的有趣之处在于，数据仍然扮演着非常重要的角色。显然，这对于数据库管理员或数据的守护者来说是件好事。\n\
  \n随着这些新环境以及 Oracle 的自治数据库在云端出现，人们开始质疑是否还需要 DBA。自我驾驶、自我调优和自动配置数据库是未来的趋势。然而，DBA 肯定会执行不同的任务，同时他们也是负责迁移到云端和自动化流程的关键人员。\n\
  \n那么，为什么要写一本关于 `Oracle 18c` 数据库管理的书呢？这个问题很容易回答。尽管任务在变化，但理解数据库至关重要。即使流程自动化了，也可能需要排除故障和建立自动化机制。应用程序需要设计、创建和维护数据库对象，并为性能进行调优。现在的工作就只是排除故障和自动化其余部分吗？不，还包括数据、应用程序和安全性的设计与策略。但这本书不仅关于\
  \ DBA 角色的转变，还旨在提供在数据库环境中仍然相关的管理技能。同样重要的是，要了解对数据库内部的理解有助于处理所有这些领域，包括之前的版本。\n\n数据正被集成、迁移和维护在多个数据库中。这些环境的结构是创建一致、可靠且始终可访问的数据所必需的。这些系统需要管理，并需要通过数据库设计和支持应用程序开发来提供支持。\n\
  \n本书详细介绍了创建 `Oracle 18c` 数据库和管理环境所需的任务，因为这不仅仅是构建数据库，还要管理数据和活跃的应用程序。它提供了对运行 Oracle\
  \ 所需的 Oracle 数据库、硬件、存储和服务器的内部视角。书中介绍的一些任务现在应该通过自动化流程完成，但书中陈述的方式有助于解决问题和排除故障。\n\n\
  本书在包含哪些章节和部分方面经过了仔细考虑，以确保它提供了正确的主题，以理解数据库及其之前的版本，支持数据库对象的设计和性能调优，并为 DBA 提供成功所需的工具。\n\
  \n备份和恢复被重点讨论，因为恢复场景很难自动化。书中贯穿始终的主题是寻求创建可重复的自动化任务、确保环境安全以及利用新版本数据库附带的新特性和工具。DBA 在制定备份和安全策略方面扮演着重要角色，书中有多处讨论支持这一点。\n\
  \n无论数据库是在本地还是在云端，许多主题都是相同的。书中在章节的注释和部分中包含了对差异的理解以及 DBA 如何支持迁移到云端。云端数据库在企业中有多种用途，DBA\
  \ 是协助迁移并确保数据在云环境中安全和集成的完美资源。\n\n本书提供了许多示例、技巧和说明，为任何使用 Oracle 数据库的 DBA 提供了设计、实施和管理\
  \ `Oracle 18c` 数据库环境所需的工具。\n\n## 致谢\n\n每当我坐下来写作或准备演讲时，我都会花几分钟时间反思自己是如何走到职业生涯的这个阶段的。我感谢许多人：感谢他们在我的生活中给予的影响、指导和鼓励。其中一些人，我可能告诉过他们我已经写完书了，那是在四本书之前。我很喜欢看到他们的微笑，当他们听说我又完成一本时，会取笑我。\n\
  \n在数据库社区建立的友谊鼓励我学习和分享更多。我感谢这些有趣的数据库人士，他们对自己所做的事情充满热情，并通过教学、指导和帮助他人来享受带给他人的快乐。在这个职业生涯中，与其他对数据库充满热情并成为最佳数据守护者的人一起工作，是多么好的机会啊！谢谢你们！\n\
  \n## 关于作者和关于技术审校者\n\n### 关于作者\n\n### 关于技术审校者\n\n过去的 Oracle 安装可能体积庞大、复杂且笨重。Oracle\
  \ 数据库管理员（DBA）计划和执行安装，因为他或她知道如何在步骤中出现问题时进行故障排除和解决。有几个配置和安装选项需要审查，因此安装 Oracle 软件（二进制文件）是每个\
  \ DBA 都需要熟练掌握的任务。现在有了 `Oracle 18c`，甚至 `12c`，Oracle 软件安装已经变得更加自动化，但理解安装的步骤和配置对 DBA\
  \ 来说仍然很重要。Oracle 二进制文件的安装对于大型环境应该是可重复的，DBA 需要设置安装过程以便能够按需和一致地配置数据库。\n\n## 提示\n\n\
  DBA（数据库管理员）的任务正在发生变化。在云环境中，DBA 的任务可能转变为准备自助数据库，甚至可能不再需要安装 Oracle 二进制文件。此外，如果你对 Oracle\
  \ 相对陌生，那么 Oracle 安装中一些令人望而生畏的部分已经得到简化。很可能另一位 DBA 已经安装好了 Oracle 二进制文件，你只需要根据需要创建数据库即可。然而，理解安装的组成部分以及下一节“理解最佳灵活架构”仍然很有价值。\n\
  \n许多 DBA 不使用自动化安装技术。有些人不知道这些方法；另一些人则认为它们不可靠。因此，大多数 DBA 通常使用 Oracle 通用安装程序 (`OUI`)\
  \ 的图形界面模式。虽然图形安装程序是一个好工具，但它不利于重复性和自动化操作。运行图形安装程序是一个手动过程，过程中你需要在多个屏幕上选择各种选项。即使你知道该选择哪些选项，仍然可能无意中点错。\n\
  \n当进行远程安装且网络带宽不足时，图形安装程序也可能出现问题。在这种情况下，你可能会发现需要等待几十分钟，才能让屏幕在本地重新绘制出来。因此，你需要一种不同的技术来实现远程服务器上的高效安装。\n\
  \n本章重点介绍以高效且可重复的方式安装 Oracle 的技术。这包括依赖响应文件的静默安装。响应文件是一个文本文件，你可以在其中为控制安装的变量赋值。DBA\
  \ 们通常没有意识到使用响应文件所能实现的强大可重复性和高效率。\n\n## 注意\n\n本章仅涵盖安装 Oracle 软件。创建数据库的任务在第 2 章中介绍。云环境也改变了软件和数据库创建的任务及视角，这将在本章后面的“在云中安装及\
  \ DBA 的职责”一节中讨论。\n\n## 理解 OFA\n\n在安装 Oracle 并开始创建数据库之前，你必须理解 Oracle 的最佳灵活架构 (`OFA`)\
  \ 标准。该标准被广泛用于指定一致的目录结构以及在安装和创建 Oracle 数据库时使用的文件命名约定。\n\n## 注意\n\n这个无处不在的 `OFA` “标准”有一个讽刺之处：几乎每个\
  \ DBA 都会在某种程度上对其进行定制，以满足其环境的独特需求。\n\n`OFA` 标准提供了在一致的基础上查找日志文件位置的方法。如果遵循了这些标准，由于环境之间的一致性，安全性、迁移和自动化将更容易实现。日志文件的一致位置允许其他工具使用这些文件，同时也便于对其进行保护。18c\
  \ 中的 `ORACLE_BASE` 目录提供了一种将只读目录的 `ORACLE_HOME` 目录与可写文件分离并将其放在 `ORACLE_BASE` 下的方法。只读的\
  \ `ORACLE_HOME` 目录允许实现安装与配置的分离，这对于云环境和保护环境非常重要。这简化了补丁过程，因为一个映像可用于大规模部署，并将补丁分发到许多服务器，从而减少了打补丁和更新\
  \ Oracle 软件的停机时间。\n\n由于大多数企业都实现了某种形式的 `OFA` 标准，因此理解这种结构至关重要。图 1-1 展示了 `OFA` 标准所使用的目录结构和文件名。并非\
  \ Oracle 环境中的所有目录和文件都出现在此图中（篇幅有限）。但是，显示了关键且最常用的目录和文件。\n\n![../images/214899_3_En_1_Chapter/214899_3_En_1_Fig1_HTML.jpg](img/214899_3_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1 Oracle 的 OFA 标准\n\n`OFA` 标准包含几个你应该熟悉的目录：\n\n*   Oracle 清单目录\n*   Oracle\
  \ 基础目录 (`ORACLE_BASE`)\n*   Oracle 主目录 (`ORACLE_HOME`)\n*   Oracle 网络文件目录 (`TNS_ADMIN`)\n\
  *   自动诊断存储库 (`ADR_HOME`)\n\n这些目录将在以下各节中讨论。\n\n## Oracle 清单目录\n\nOracle 清单目录存储服务器上安装的\
  \ Oracle 软件清单。此目录是必需的，并在服务器上的所有 Oracle 软件安装之间共享。当你首次安装 Oracle 时，安装程序会检查是否存在格式为 `/u[01–09]/app`\
  \ 的现有符合 `OFA` 的目录结构。如果存在这样的目录，则安装程序会创建一个 Oracle 清单目录，例如：\n\n```\n/u01/app/oraInventory\n\
  ```\n\n如果为 `oracle` 操作系统 (`OS`) 用户定义了 `ORACLE_BASE` 变量，则安装程序会为 Oracle 清单的位置创建一个目录，如下所示：\n\
  \n```\nORACLE_BASE/../oraInventory\n```\n\n例如，如果 `ORACLE_BASE` 定义为 `/ora01/app/oracle`，则安装程序会将\
  \ Oracle 清单的位置定义为：\n\n```\n/ora01/app/oraInventory\n```\n\n如果安装程序找不到可识别的符合 `OFA`\
  \ 的目录结构或 `ORACLE_BASE` 变量，则 Oracle 清单的位置会在 `oracle` 用户的 `HOME` 目录下创建。例如，如果 `HOME`\
  \ 目录是 `/home/oracle`，则 Oracle 清单的位置是：\n\n```\n/home/oracle/oraInventory\n```\n\n\
  ### Oracle 基础目录\n\nOracle 基础目录是 Oracle 软件安装的顶层目录。你可以在此目录下安装一个或多个版本的 Oracle 软件。Oracle\
  \ 基础目录的 `OFA` 标准如下：\n\n```\n<挂载点>/app/<软件所有者>\n```\n\n挂载点的典型名称包括 `/u01`、`/ora01`、`/oracle`\
  \ 和 `/oracle01`。你可以根据环境的任何标准来命名挂载点。我更喜欢使用像 `/ora01` 这样的挂载点名称。它很短，当我查看数据库服务器上的挂载点时，我可以立即分辨出哪些是用于\
  \ Oracle 数据库的。此外，在查询数据字典以报告数据库物理方面的信息时，较短的挂载点名称更易于使用。另外，在通过 `OS` 命令浏览目录时，较短的挂载点名称可以减少输入量。\n\
  \n软件所有者通常命名为 `oracle`。这是你用来安装 Oracle 软件（二进制文件）的 `OS` 用户。下面列出了一个完整形成的 Oracle 基础目录路径示例：\n\
  \n```\n/u01/app/oracle\n```\n\n## Oracle 主目录\n\nOracle 主目录定义了特定产品（如 Oracle Database\
  \ 18c 或 Oracle Database 12c）的软件安装位置。你必须将不同产品或同一产品的不同版本安装在不同的 Oracle 主目录中。推荐的符合 `OFA`\
  \ 的 Oracle 主目录如下：\n\n```\nORACLE_BASE/product/<版本>/<安装名称>\n```\n\n在前面的代码行中，可能的版本包括\
  \ `18.1.0.1` 和 `12.2.0.1`。可能的 `安装名称` 值包括 `db_1`、`devdb1`、`test2` 和 `prod1`。这是一个用于\
  \ 18c 数据库的 Oracle 主目录名称示例：\n\n```\n/u01/app/oracle/product/18.1.0.1/dbhome_1/db1\n\
  ```\n\n## 注意\n\n一些 DBA 不喜欢 `ORACLE_HOME` 目录末尾的 `db1` 字符串，并认为没有必要。添加 `db1` 的原因是，你可能有两个独立的二进制文件安装：一个开发安装和一个测试安装。如果你的环境不需要这种配置，可以随意去掉这个额外的字符串\
  \ (`db1`)。\n\n\n## Oracle 网络文件目录\n\n一些 Oracle 工具使用 `TNS_ADMIN` 环境变量的值来定位网络配置文件。此目录定义为\
  \ `ORACLE_HOME/network/admin`。它通常包含 `tnsnames.ora` 和 `listener.ora` 这两个 Oracle Net\
  \ 配置文件。如今，`listener.ora` 文件通常随 Oracle Grid Infrastructure 安装，而不是在数据库主目录中。监听器通常由管理网格、集群和\
  \ ASM 软件的系统维护。`tnsnames.ora` 提供了连接到其他数据库的方式，因此这些文件是集中式目录或数据库网络文件的一部分。\n\n## 提示\n\
  \n有时，DBA 会设置 `TNS_ADMIN` 环境变量指向一个集中的目录位置（如 `/etc` 或 `/var/opt/oracle`）。这允许他们维护一套\
  \ Oracle 网络文件（而不是每个 `ORACLE_HOME` 都有一套）。这种方法还有另一个优点，即在数据库升级（可能改变 `ORACLE_HOME` 的位置）时，不需要复制或移动文件。\n\
  \n## 自动诊断仓库\n\n从 Oracle Database 11g 开始，`ADR_HOME` 目录指定了与 Oracle 相关的诊断文件的位置。这些文件对于排查\
  \ Oracle 数据库问题至关重要。此目录定义为 `ORACLE_BASE/diag/rdbms/lower(db_unique_name)/instance_name`。您可以查询\
  \ `V$PARAMETER` 视图来获取 `db_unique_name` 和 `instance_name` 的值。\n\n例如，在下一行中，小写的数据库唯一名称是\
  \ `db18c`，实例名称是 `DB18C`：\n\n```\n/u01/app/oracle/diag/rdbms/db18c/DB18C\n```\n\n\
  或者在集群环境中，小写的数据库唯一名称是 `db18c`，实例名称是 `DB18C01`：\n\n```\n/u01/app/oracle/diag/rdbms/db18c/DB18C01\n\
  ```\n\n您可以通过此查询验证 `ADR_HOME` 目录的位置：\n\n```\nSQL> select value from v$diag_info where\
  \ name='ADR Home';\n```\n\n这是一些示例输出：\n\n```\nVALUE\n--------------------------------------------------\n\
  /u01/app/oracle/diag/rdbms/db18c/DB18C\n```\n\n既然您已经了解了 OFA 标准，接下来将看到在安装 Oracle\
  \ 二进制文件时如何使用它。例如，在运行 Oracle 安装程序时，您需要为 `ORACLE_BASE` 和 `ORACLE_HOME` 目录指定目录值。\n\n\
  ## 提示\n\n有关 OFA 的完整详细信息，请参阅 *Oracle Database Installation Guide*。该文档可以从 Oracle 网站的\
  \ Technology Network 区域（[`http://otn.oracle.com`](http://otn.oracle.com)）免费下载。\n\
  \n## 安装 Oracle\n\n假设您是新员工，您的经理问您在新服务器上安装一套新的 Oracle Database 18c 软件需要多长时间。您回复说需要不到一个小时。您的老板表示怀疑，并说之前的\
  \ DBA 估计至少需要一天时间在新服务器上安装 Oracle 二进制文件。您回答：“实际上，这没那么复杂，但 DBA 确实倾向于高估安装时间，因为很难预测所有可能出错的问题。”\n\
  \n当您被交给一台新服务器并负责安装 Oracle 二进制文件时，这通常指的是下载并安装在创建 Oracle 数据库之前所需的软件的过程。此过程涉及几个步骤：\n\
  \n1.  创建适当的操作系统组。在 Oracle Database 18c 中，有几个操作系统组可以形成并用于管理 `SYSDBA` 权限的粒度级别。至少，您需要创建一个\
  \ OS `dba` 组和 OS `oracle` 用户。\n2.  确保操作系统已为 Oracle 数据库进行充分配置。\n3.  从 Oracle 获取数据库安装软件。\n\
  4.  解压缩数据库安装软件。\n5.  如果首次在服务器上安装 Oracle 软件时使用静默安装程序，则需要创建一个 `oraInst.loc` 文件。此步骤每台服务器只需执行一次。后续安装不需要执行此步骤。\n\
  6.  配置响应文件并运行 Oracle 静默安装程序。\n7.  对任何问题进行故障排除。\n8.  应用任何额外的补丁。\n\n这些步骤将在以下部分详述。\n\
  \n## 注意\n\nOracle 指定的任何基础版本（10.1.0.2、10.2.0.1、11.1.0.6、11.2.0.1、12.1.0.1、18.1.0.1\
  \ 等）的数据库都可以从 Oracle 网站的 Technology Network 区域（[`http://otn.oracle.com`](http://otn.oracle.com)）免费下载。但是，请注意，任何后续补丁的下载都需要购买许可证。换句话说，下载基础软件需要\
  \ Oracle Technology Network (OTN) 登录（免费），而下载补丁集则需要 My Oracle Support 账户（付费）。\n\n\
  ### 步骤 1. 创建操作系统组和用户\n\n如果您所在的商店有系统管理员 (SA)，那么步骤 1 和 2 通常由 SA 执行。如果您没有 SA，那么您必须自己执行这些步骤（这在小型商店中很常见，您可能需要执行许多不同的工作职能）。您需要\
  \ `root` 权限来完成这些步骤。\n\n过去，典型的 Oracle 安装包含一个操作系统组 (`dba`) 和一个操作系统用户 (`oracle`)。您仍然可以使用这种极简的、一组一户的方法来安装\
  \ Oracle 软件；它可以正常工作。如果您的商店中只有一名 DBA，并且您不需要在团队成员之间进行更精细的权限划分，那么请继续，只创建 `dba` 组和 `oracle`\
  \ OS 用户。这种方法没有任何问题。\n\n如今，Oracle 建议您创建多个操作系统组——其理念是您可以根据需要添加不同的操作系统用户，并根据工作职能将他们分配到不同的组中。当操作系统用户被分配到某个组时，该分配为用户提供了特定的数据库权限。表\
  \ 1-1 记录了操作系统组以及每个组如何映射到相应的数据库权限。例如，如果您有一个用户只负责监控数据库，并且只需要启动和关闭数据库的权限，那么该用户将被分配到\
  \ `oper` 组（这确保后续可以使用 `sysoper` 权限连接到数据库）。\n\n表 1-1\n操作系统组与备份恢复相关权限的映射\n\n| **操作系统组**\
  \ | **数据库系统权限** | **授权操作** | **引用位置** |\n| --- | --- | --- | --- |\n| `oinstall`\
  \ | 无 | 安装和升级 Oracle 二进制文件的操作系统权限 | `oraInst.loc` 文件中的 `inst_group` 变量；也由响应文件中的\
  \ `UNIX_GROUP_NAME` 变量定义 |\n| `dba` | `sysdba` | 所有数据库权限：启动、关闭、更改数据库、创建和删除数据库、切换归档日志模式、备份和恢复数据库\
  \ | 响应文件中的 `DBA_GROUP` 变量或 OUI 图形安装程序提示时 |\n| `oper` | `sysoper` | 启动、关闭、更改数据库、切换归档日志模式、备份和恢复数据库\
  \ | 响应文件中的 `OPER_GROUP` 变量或 OUI 图形安装程序提示时 |\n| `asmdba` | `sysdba for asm` | 对 Oracle\
  \ 自动存储管理 (ASM) 实例的管理权限 | 不适用 |\n| `asmoper` | `sysoper for asm` | 启动和停止 Oracle ASM\
  \ 实例 | 不适用 |\n| `asmadmin` | `sysasm` | 磁盘组的挂载和卸载以及其他存储管理 | 不适用 |\n| `backupdba`\
  \ | `sysbackup` | 12c 新增；允许用户启动、关闭并执行所有备份和恢复操作的权限 | 响应文件中的 `BACKUPDBA_GROUP` 变量或\
  \ OUI 图形安装程序提示时 |\n| `dgdba` | `sysdg` | 12c 新增；与管理 Data Guard 环境相关的权限 | 响应文件中的\
  \ `DGDBA_GROUP` 变量或 OUI 图形安装程序提示时 |\n| `kmdba` | `syskm` | 12c 新增；与加密管理相关的权限 | 响应文件中的\
  \ `KMDBA_GROUP` 变量或 OUI 图形安装程序提示时 |\n\n\n表`Table 1-1`包含了推荐的组名。你不必使用列出的组名；可以根据需求进行调整。例如，如果有两个独立的组使用同一台服务器，你可能希望创建两个独立的\
  \ Oracle 安装，每个由不同的数据库管理员管理；开发数据库管理员组可能使用名为`dbadev`的组来创建和安装 Oracle 二进制文件，而使用同一台机器的测试组可能安装一套独立的\
  \ Oracle 二进制文件，并使用名为`dbatest`的组进行管理。每个组将仅拥有操作其对应二进制文件的权限。或者，如前所述，你可能决定仅为所有内容使用一个组（`dba`）。这完全取决于你的环境。\n\
  \n一旦决定了需要哪些组，你将需要访问`root`用户以运行`groupadd`命令。作为`root`，添加你需要的操作系统组。这里，我添加了我预见将会需要的三个组：\n\
  \n```\n# groupadd oinstall\n# groupadd dba\n# groupadd oper\n```\n\n如果你无法访问`root`账户，则需要让系统管理员运行上述命令。你可以通过检查`/etc/group`文件的内容来验证每个组是否已成功添加。以下是`/etc/group`文件中创建的典型条目：\n\
  \n```\noinstall:x:500:\ndba:x:501:\noper:x:502:\n```\n\n现在，创建`oracle`操作系统用户。以下示例显式地将组\
  \ ID 设置为 500（你的公司可能要求所有安装使用相同的组 ID），将主组设为`oinstall`，并将`dba`和`oper`组分配给新创建的`oracle`用户：\n\
  \n```\n# useradd -u 500 -g oinstall -G dba,oper oracle\n```\n\n你可以通过查看`/etc/passwd`文件来验证用户账户信息。对于`oracle`用户，你预期会看到如下内容：\n\
  \n```\noracle:x:500:500::/home/oracle:/bin/bash\n```\n\n如果需要修改一个组，作为`root`，使用`groupmod`命令。如果出于任何原因需要删除一个组（作为`root`），使用`groupdel`命令。\n\
  \n如果需要修改一个用户，作为`root`，使用`usermod`命令。如果需要删除一个操作系统用户，使用`userdel`命令。运行`userdel`命令需要`root`权限。此示例从服务器中删除`oracle`用户：\n\
  \n```\n# userdel oracle\n```\n\n### 步骤 2. 确保操作系统已充分配置\n\n与此步骤相关的任务因每个数据库版本和操作系统而略有不同。你必须参考针对数据库版本和操作系统供应商的\
  \ Oracle 安装手册以获取确切要求。要执行此步骤，你需要验证和配置操作系统组件，例如：\n\n*   内存和交换空间\n*   系统架构（处理器）\n*\
  \   可用磁盘空间（Oracle 现在几乎需要 5GB 的安装空间）\n*   操作系统版本和内核\n*   操作系统软件（所需的软件包和补丁）\n\n在 Linux\
  \ 服务器上运行以下命令以确认内存大小：\n\n```\n$ grep MemTotal /proc/meminfo\n```\n\n要验证内存和交换空间的大小，请运行以下命令：\n\
  \n```\n$ free -t\n```\n\n要验证`/tmp`目录的空间大小，请输入此命令：\n\n```\n$ df -h /tmp\n```\n\n\
  要显示可用磁盘空间，请执行此命令：\n\n```\n$ df -h\n```\n\n要验证操作系统版本，请输入此命令：\n\n```\n$ cat /proc/version\n\
  ```\n\n要验证内核信息，请运行以下命令：\n\n```\n$ uname -r\n```\n\n要确定是否安装了所需的软件包，请执行此查询，并提供所需的软件包名称：\n\
  \n```\n$ rpm -q \n```\n\n再次强调，数据库服务器的要求因操作系统和数据库版本而异。你可以从 Oracle 网站的文档页面（[`www.oracle.com/documentation`](http://www.oracle.com/documentation)）下载特定的安装手册。\n\
  \n## 注意\n\nOUI（Oracle Universal Installer）会显示操作系统软件和硬件的任何不足。运行安装程序在步骤 6 中介绍。\n\n\
  ### 步骤 3. 获取 Oracle 安装软件\n\n通常，获取 Oracle 软件最简单的方法是从 Oracle 网站下载。导航到软件下载页面（[`www.oracle.com/technology/software`](http://www.oracle.com/technology/software)），并下载适用于你希望安装它的操作系统和硬件类型（Linux、Solaris、Windows\
  \ 等）的 Oracle 数据库版本。\n\n### 步骤 4. 解压缩文件\n\n对于之前的版本，建议将文件解压缩到可以放置 Oracle 安装介质的标准目录中。现在对于\
  \ Oracle 18c，介质的呈现方式有所不同，包括基于映像的方式或通过 RPM 的方式。映像软件现在必须解压缩到`ORACLE_HOME`目录中。压缩文件可以放在临时目录中，但必须解压到`ORACLE_HOME`。安装将从`ORACLE_HOME`目录运行`runInstaller`。\n\
  \n为`ORACLE_HOME`创建目录：\n\n```\n$ mkdir -p /u01/app/oracle/product/18.1.0/dbhome_1\n\
  $ chown oracle:oinstall /u01/app/oracle/product/18.1.0/dbhome_1\n```\n\n可以将 zip\
  \ 文件下载或复制到临时目录，例如`/tmp`或`/home/oracle`。\n\n使用`unzip`命令将文件解压到新创建的`ORACLE_HOME`目录：\n\
  \n```\n$ cd /u01/app/oracle/product/18.1.0/dbhome_1\n$ unzip -q /tmp/db_home.zip\n\
  ```\n\n现在可以使用 RPM 与 Oracle 18c 来为单个数据库实例执行安装。RPM 以前用于预安装检查，现在也可用于安装，甚至包括 Oracle\
  \ 客户端。这需要以`root`身份执行。\n\n```\n$ yum -y install oracle-database-server-18c-preinstall\n\
  $ ls -lt /opt\n$ chown -R oracle:oinstall /opt\n```\n\n现在进入 rpm 所在目录并运行命令以执行基于 RPM\
  \ 的安装。`ORACLE_HOME`目录将在`/opt/oracle/product/18.1.0.0.0-1/dbhome_1`创建。\n\n```\n$\
  \ cd /tmp/rpm\n$ rpm -ivh oracle-ee-db-18.1.0.0.0-1.x86_64.rpm  -- rpm 名称可能因版本而异\n\
  ```\n\n## 提示\n\n在某些先前版本的 Oracle 安装中，你可能会发现分发文件是以压缩的`cpio`文件形式提供的。你可以使用一个命令来解压缩和解包文件，如下所示：\n\
  ```\n$ cat 10gr2_db_sol.cpio.gz | gunzip | cpio -idvm\n```\n\n### 步骤 5. 创建 oraInst.loc\
  \ 文件\n\n如果您的服务器上已存在 `oraInst.loc` 文件，则可以跳过此步骤。仅当您首次使用静默安装方法在服务器上安装二进制文件时，才需要执行创建\
  \ `oraInst.loc` 文件这一步骤。如果您使用的是 OUI 图形安装程序，则 `oraInst.loc` 文件会自动为您创建。\n\n在 Linux\
  \ 服务器上，`oraInst.loc` 文件通常位于 `/etc` 目录中。在其他 Unix 系统（如 Solaris）上，此文件位于 `/var/opt/oracle`\
  \ 目录中。`oraInst.loc` 文件包含以下信息：\n\n*   Oracle 清单目录路径\n*   拥有安装和升级 Oracle 软件权限的操作系统组名称\n\
  \nOracle 清单目录路径是与管理 Oracle 安装和升级相关的文件所在的位置。通常，每个主机有一个 Oracle 清单。在此目录结构中是 `inventory.xml`\
  \ 文件，其中记录了服务器上安装的各种 Oracle 版本的位置。\n\nOracle 清单操作系统组拥有安装和升级 Oracle 软件所需的操作系统权限。Oracle\
  \ 建议您将此组命名为 `oinstall`。您会发现有时 DBA 会将清单组分配给 `dba` 组。如果您的环境不需要单独的组（如 `oinstall`），那么使用\
  \ `dba` 组也是可以的。\n\n您可以使用 `vi` 等实用程序创建 `oraInst.loc` 文件。以下是该文件中的一些示例条目：\n\n```\n\
  inventory_loc=/u01/app/oraInventory\ninst_group=oinstall\n```\n\n以 root 用户身份，确保响应文件的所有者为\
  \ oracle 操作系统用户，并且具有适当的文件访问权限：\n\n```\n# chown oracle:oinstall oraInst.loc\n# chmod\
  \ 664 oraInst.loc\n```\n\n### 步骤 6. 配置响应文件，并运行安装程序\n\n您可以以两种模式之一运行 OUI：图形化或静默模式。通常，DBA\
  \ 使用图形化安装程序。但是，我强烈倾向于使用静默安装选项，原因如下：\n\n*   静默安装不需要 X Window System 软件可用。\n*   避免了远程图形化安装可能遇到的性能问题，尤其是在本地绘制屏幕时可能非常缓慢。\n\
  *   静默安装可以编写脚本并实现自动化。这意味着每次安装都可以按照相同、一致的标准执行，无论由哪个团队成员执行安装（我甚至让系统管理员以这种方式安装 Oracle\
  \ 二进制文件）。\n\n执行静默安装的关键是使用响应文件。\n\n解压缩 Oracle 软件后，导航到 ORACLE_HOME 目录；例如，\n\n```\n\
  $ cd /u01/app/oracle/product/18.1.0/dbhome_1\n```\n\n接下来，查找 Oracle 提供的示例响应文件：\n\n\
  ```\n$ find . -name \"*.rsp\"\n```\n\n根据 Oracle 版本和操作系统的不同，您找到的响应文件的名称和数量可能会有很大差异。接下来的两节展示了两个场景：Oracle\
  \ Database 12c 第 1 版静默安装和 Oracle Database 18c 第 1 版静默安装。\n\n请记住，响应文件的格式可能因 Oracle\
  \ 数据库版本的不同而有很大差异。例如，Oracle Database 11g 和 12c 之间甚至在它们各自的第 2 版之间也存在重大差异。安装新版本时，您必须检查响应文件并确定必须设置哪些参数。请务必根据您的环境修改相应的参数。如果不确定如何设置\
  \ `ORACLE_HOME` 和 `ORACLE_BASE` 的值，请参阅本章前面的“理解最优灵活架构”部分，了解 OFA 标准目录的说明。\n\n有时这些参数存在特定于版本的特殊性。例如，如果您不想指定您的\
  \ My Oracle Support (MOS) 登录信息，则需要按如下方式设置以下参数：\n\n```\nDECLINE_SECURITY_UPDATES=true\n\
  ```\n\n如果您未将 `DECLINE_SECURITY_UPDATES` 设置为 `TRUE`，则系统将要求您提供 MOS 登录信息。未能提供此信息将导致安装失败。配置好响应文件后，您可以在静默模式下运行\
  \ Oracle 安装程序。请注意，您必须输入响应文件位置的完整目录路径。\n\n**注意**\n\n在 Windows 上，`setup.exe` 命令等同于\
  \ Linux/Unix 上的 `runInstaller` 命令。\n\n如果安装过程中遇到错误，您可以查看相关的日志文件。每次尝试运行安装程序时，它都会创建一个包含时间戳的唯一名称的日志文件。日志文件位于\
  \ `oraInventory/logs` 目录中。您可以在 OUI 写入日志时，将输出流式传输到屏幕上：\n\n```\n$ tail -f \n```\n\n\
  这是一个日志文件名示例：\n\n```\ninstallActions2012-04-33 11-42-52AM.log\n```\n\n#### Oracle\
  \ Database 12c 第 1 版场景\n\n导航到 `database` 目录并执行 `find` 命令以查找示例响应文件。以下是 Linux 服务器上\
  \ Oracle Database 12c 第 1 版提供的响应文件：\n\n```\n$ find . -name \"*.rsp\"\n./response/db_install.rsp\n\
  ./response/netca.rsp\n./response/dbca.rsp\n```\n\n复制其中一个响应文件以便进行修改。此示例将 `db_install.rsp`\
  \ 文件复制到当前工作目录，并将文件命名为 `inst.rsp`：\n\n```\n$ cp response/db_install.rsp inst.rsp\n\
  ```\n\n修改 `inst.rsp` 文件。以下是 Oracle Database 12c 第 1 版响应文件的部分列表（前两行实际上是单行代码，但为了适应页面而放在了两行中）。这些代码行是我修改的唯一变量。我删除了注释，以便您可以更清楚地看到修改了哪些变量：\n\
  \n```\noracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v12.1.0\n\
  oracle.install.option=INSTALL_DB_SWONLY\nORACLE_HOSTNAME=oraserv1\nUNIX_GROUP_NAME=oinstall\n\
  INVENTORY_LOCATION=/home/oracle/orainst/12.1.0.1/database/stage/products.xml\nSELECTED_LANGUAGES=en\n\
  ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\nORACLE_BASE=/u01/app/oracle\n\
  oracle.install.db.InstallEdition=EE\noracle.install.db.DBA_GROUP=dba\noracle.install.db.OPER_GROUP=oper\n\
  oracle.install.db.BACKUPDBA_GROUP=dba\noracle.install.db.DGDBA_GROUP=dba\noracle.install.db.KMDBA_GROUP=dba\n\
  DECLINE_SECURITY_UPDATES=true\n```\n\n请务必根据您的环境修改相应的参数。如果不确定如何设置 `ORACLE_HOME` 和\
  \ `ORACLE_BASE` 的值，请参阅本章前面的“理解最优灵活架构”部分，了解 OFA 标准目录的说明。\n\n配置好响应文件后，您可以在静默模式下运行\
  \ Oracle 安装程序。请注意，您必须输入响应文件位置的完整目录路径：\n\n```\n$ ./runInstaller -ignoreSysPrereqs\
  \ -force -silent -responseFile \\\n/home/oracle/orainst/12.1.0.1/database/inst.rsp\n\
  ```\n\n前面的命令输入在两行中。第一行通过反斜杠 (`\\`) 延续到第二行。\n\n如果安装过程中遇到错误，您可以查看相关的日志文件。每次尝试运行安装程序时，它都会创建一个包含时间戳的唯一名称的日志文件。日志文件创建在\
  \ `oraInventory/logs` 目录中。您可以在 OUI 写入日志时，将输出流式传输到屏幕上：\n\n```\n$ tail -f \n```\n\n\
  这是一个日志文件名示例：\n\n```\ninstallActions2012-11-04_02-57-29PM.log\n```\n\n如果一切运行成功，输出中会通知您需要以\
  \ `root` 用户身份运行 `root.sh` 脚本：\n\n```\n/u01/app/oracle/product/12.1.0.1/db_1/root.sh\n\
  ```\n\n以 root 操作系统用户身份运行 `root.sh` 脚本。然后，您应该能够创建 Oracle 数据库（数据库创建在章节 2 中介绍）。\n\n\
  ## Oracle Database 18c Release 1 场景\n\n导航到 `database` 目录并使用 `find` 命令查找示例响应文件。以下是在\
  \ Linux 服务器上 Oracle Database 18c Release 1 提供的响应文件：\n\n```\n$ find . -name \"*.rsp\"\
  \n./response/db_install.rsp\n./response/netca.rsp\n./response/dbca.rsp\n```\n\n\
  复制其中一个响应文件以便修改。此示例将 `db_install.rsp` 文件复制到当前工作目录，并将文件命名为 `inst.rsp`：\n\n```\n$ cp\
  \ response/db_install.rsp inst.rsp\n```\n\n修改 `inst.rsp` 文件。以下是 Oracle Database\
  \ 18c Release 1 响应文件的部分列表（前两行实际上是一行代码，但为了适应页面而放在了两行上）。这些代码行是唯一需要修改的变量。为了让你能更清楚地看到修改了哪些变量，我删除了注释：\n\
  \n```\noracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v18.0.0\n\
  oracle.install.option=INSTALL_DB_SWONLY\nORACLE_HOSTNAME=oraserv1\nUNIX_GROUP_NAME=oinstall\n\
  INVENTORY_LOCATION=/home/oracle/orainst/18.1.0.1/database/stage/products.xml\nSELECTED_LANGUAGES=en\n\
  ORACLE_HOME=/u01/app/oracle/product/18.1.0.1/db_1\nORACLE_BASE=/u01/app/oracle\n\
  oracle.install.db.InstallEdition=EE\noracle.install.db.DBA_GROUP=dba\noracle.install.db.OPER_GROUP=oper\n\
  oracle.install.db.BACKUPDBA_GROUP=dba\noracle.install.db.DGDBA_GROUP=dba\noracle.install.db.KMDBA_GROUP=dba\n\
  DECLINE_SECURITY_UPDATES=true\n```\n\n请务必根据你的环境修改相应的参数。如果你不确定如何设置 `ORACLE_HOME`\
  \ 和 `ORACLE_BASE` 的值，请参阅本章前面的“理解最优灵活架构”一节，了解 OFA 标准目录的描述。\n\n配置好响应文件后，可以以静默模式运行\
  \ Oracle 安装程序。注意，你需要输入响应文件位置的完整目录路径：\n\n```\n$ ./runInstaller -ignoreSysPrereqs\
  \ -force -silent -responseFile \\\n/home/oracle/orainst/18.1.0.1/database/inst.rsp\n\
  ```\n\n上述命令分两行输入。第一行通过反斜杠（`\\`）延续到第二行。\n\n如果在安装过程中遇到错误，可以查看相关的日志文件。每次尝试运行安装程序时，它都会创建一个包含时间戳的唯一名称的日志文件。日志文件创建在\
  \ `oraInventory/logs` 目录中。当 OUI 写入日志时，你可以将输出流式传输到屏幕上：\n\n```\n$ tail -f\n```\n\n\
  以下是一个日志文件名的示例：\n\n```\ninstallActions2017-11-04_02-57-29PM.log\n```\n\n如果一切运行成功，输出中会通知你需要以\
  \ `root` 用户身份运行 `root.sh` 脚本：\n\n```\n/u01/app/oracle/product/18.1.0.1/db_1/root.sh\n\
  ```\n\n以 `root` OS 用户身份运行 `root.sh` 脚本。然后，你应该就能够创建 Oracle 数据库了（数据库创建在第 2 章介绍）。配置助手可以在响应文件或静默模式下运行，以执行网络配置和数据库配置助手。\n\
  \n### 步骤 7. 故障排除\n\n如果你在使用响应文件时遇到错误，90% 的情况是由于文件中变量的设置方式有问题。仔细检查这些变量并确保它们设置正确。此外，如果你没有完整指定响应文件的命令行路径，会收到如下错误：\n\
  \n```\nOUI-10203: The specified response file ... is not found.\n```\n\n当响应文件的路径或名称指定不正确时，会出现另一个常见错误：\n\
  \n```\nOUI-10202: No response file is specified for this session.\n```\n\n如果你在响应文件的\
  \ `FROM_LOCATION` 变量中输入了错误的 `products.xml` 文件路径，会收到以下错误消息：\n\n```\nOUI-10133: Invalid\
  \ staging area\n```\n\n另外，在运行响应文件时，请确保提供正确的命令行语法。如果错误指定或拼写错误一个选项，可能会收到误导性的错误消息，例如\
  \ `DISPLAY not set`。使用响应文件时，你不需要设置 `DISPLAY` 变量。此消息令人困惑，因为在这种情况下，错误是由错误指定的命令行选项引起的，与\
  \ `DISPLAY` 变量无关。请检查从命令行输入的所有选项，确保没有拼写错误。\n\n当你指定了 `ORACLE_HOME`，而静默安装“认为”给定的主目录已存在时，也可能出现问题：\n\
  \n```\nCheck complete: Failed <<<<\nRecommendation: Choose a new Oracle Home for\
  \ installing this product.\n```\n\n检查你的 `inventory.xml` 文件（在 `oraInventory/ContentsXML`\
  \ 目录中），确保与已有的 Oracle 主目录名称没有冲突。\n\n安装过程中会生成日志文件，这些文件也是清单的一部分。`/tmp` 目录将包含基于安装执行时间戳的日志文件。在尝试故障排除时，请确保检查所有日志文件；如果在安装过程中遇到进程或内存问题，即使是系统日志也很有用。当你在对\
  \ Oracle 安装问题进行故障排除时，请记住安装程序使用两个关键文件来跟踪已安装的软件及其位置：`oraInst.loc` 和 `inventory.xml`。表\
  \ 1-2 描述了 Oracle 安装程序使用的文件。\n\n表 1-2\n\n用于故障排除 Oracle 安装问题的有用文件\n\n| 文件名 | 目录位置\
  \ | 内容 |\n| --- | --- | --- |\n| `oraInst.loc` | 此文件的位置因操作系统而异。在 Linux 上，文件位于 `/etc`；在\
  \ Solaris 上，位于 `/var/opt/oracle`。 | `oraInventory` 目录位置和安装 OS 组 |\n| `inst.loc`\
  \ | `\\\\HKEY_LOCAL_MACHINE\\\\Software\\Oracle` (Windows 注册表) | 清单信息 |\n| `inventory.xml`\
  \ | `oraInventory/ContentsXML/inventory.xml` | Oracle 主目录名称和相应的目录位置 |\n| `.log`\
  \ 文件 | `oraInventory/logs` | 安装日志文件，对故障排除非常有用 |\n\n### 步骤 8. 应用任何额外的补丁\n\n如第一步之前所述，Oracle\
  \ 软件在基础发行版中可用。但是，如果有额外的发行版、补丁集和安全补丁可用，所有这些都应在推出一组新的 Oracle 二进制文件之前应用。安装在服务器或环境中出于不同的原因，安装应与其他环境相同，可能的例外是安全补丁。\n\
  \n本章后面的“升级 Oracle 软件”和“应用临时补丁”部分提供了应用补丁的详细信息，但重要的是在此步骤中确保在发布使用前达到软件的最新版本。在安装二进制文件后，是确保所有内容都已更新并准备好创建数据库的好时机。\n\
  \n## 通过复制现有安装进行安装\n\n数据库管理员有时会使用`tar`等工具，将 Oracle 二进制文件的现有安装复制到其他服务器（或同一服务器的不同位置），来安装\
  \ Oracle 软件。这种方法快速而简单（特别是与下载并运行 Oracle 安装程序相比）。该技术使得数据库管理员能够轻松地在多台服务器上安装 Oracle\
  \ 软件，同时确保每次安装都完全相同。\n\n新的介质文件交付方式提供了在`ORACLE_HOME`目录中解压缩，或直接运行`rpm`包来进行安装的方法。使用此方法的优势在于能够复制经过修补的二进制文件集。在将文件复制为静态副本期间，不得有任何数据库或\
  \ Oracle 进程正在运行。\n\n使用现有的二进制文件副本安装 Oracle 是一个两步过程：\n\n1.  使用操作系统工具复制二进制文件。\n\n2.\
  \  挂接 Oracle 主目录。\n\n这些步骤将在接下来的两个小节中详细说明。\n\n## 提示\n\n有关如何克隆现有 Oracle 安装的说明，请参阅`MOS`注释`300062.1`。\n\
  \n### 步骤 1. 使用操作系统工具复制二进制文件\n\n您可以使用任何`OS`复制工具来执行此步骤。Linux/Unix 的`tar`、`scp`和`rsync`工具是`DBAs`常用的文件复制工具。本示例展示了如何使用\
  \ Linux/Unix 的`tar`工具将一组现有的 Oracle 二进制文件复制到另一台服务器。首先，定位您想要复制的目标 Oracle 主目录二进制文件：\n\
  \n```\n$ echo $ORACLE_HOME\n/ora01/app/oracle/product/18.1.0.1/db_1\n```\n\n在此示例中，`tar`工具复制`db_1`目录内或其下的所有文件和子目录：\n\
  \n```\n$ cd $ORACLE_HOME\n$ cd ..\n$ tar -cvf orahome.tar db_1\n```\n\n现在，将`orahome.tar`文件复制到您想要安装\
  \ Oracle 软件的服务器。在此示例中，tar 文件被复制到另一台服务器的`/u01/app/oracle/product/18.1.0.1`目录。tar\
  \ 文件在此处解压，并在解压时创建`db_1`目录：\n\n```\n$ cd /u01/app/oracle/product/18.1.0.1\n```\n\n\
  确保您有足够的磁盘空间来解压文件。一个典型的 Oracle 安装至少会占用`3–4GB`的空间。使用 Linux/Unix 的`df`命令来验证您是否有足够的空间：\n\
  \n```\n$ df -h | sort\n```\n\n接下来，解压文件：\n\n```\n$ tar -xvf orahome.tar\n```\n\n\
  `tar`命令会在`/u01/app/oracle/product/18.1.0.1`目录下创建`db_1`目录。\n\n## 提示\n\n使用`tar -tvf\
  \ <tarfile_name>`命令可以预览哪些目录和文件将被还原，而不实际执行还原操作。\n\n下面列出了一个强大的单行命令组合，它允许您打包 Oracle\
  \ 文件，将它们复制到远程服务器，并在远程解压：\n\n```\n$ tar -cvf -  | ssh  \"cd ; tar -xvf -\"\n```\n\
  \n例如，以下命令将`dev_1`目录中的所有内容复制到远程`ora03`服务器的`/home/oracle`目录：\n\n```\n$ tar -cvf -\
  \ dev_1 | ssh ora03 \"cd /home/oracle; tar -xvf -\"\n```\n\n### 绝对路径与相对路径\n\n一些较旧的、非\
  \ GNU 版本的`tar`在解压文件时会使用绝对路径。下一行代码展示了在创建归档文件时指定绝对路径的示例：\n\n```\n$ tar -cvf orahome.tar\
  \ /home/oracle\n```\n\n在非 GNU 版本的`tar`中使用绝对路径可能是危险的。这些旧版本的`tar`会使用与复制时完全相同的目录和文件名来恢复内容。这意味着磁盘上任何已存在的目录和文件名都会被覆盖。\n\
  \n使用旧版本的`tar`时，使用相对路径名要安全得多。此示例首先切换到`/home`目录，然后创建`oracle`目录的归档（相对于当前工作目录）：\n\n\
  ```\n$ cd /home\n$ tar -cvf orahome.tar oracle\n```\n\n前面的示例使用了相对路径名。\n\n在大多数 Linux\
  \ 系统上，您不必担心绝对路径与相对路径的问题。这是因为这些系统使用的是`GNU`版本的`tar`。该版本会去掉前导斜杠（`/`），并将文件解压到您当前工作目录所在的位置。\n\
  \n如果您不确定您的`tar`工具是否是`GNU`版本，可以使用`man tar`命令查看。您也可以使用`tar -tvf <tarfile name>`命令来预览哪些目录和文件将被还原到什么位置。\n\
  \n\n### 步骤二：附加 Oracle 主目录\n\n使用现有安装的副本来安装 Oracle 软件存在一个问题：如果后续尝试升级该软件，升级过程会出错并中止。这是因为复制的安装并未在\
  \ `oraInventory` 中注册。在升级通过复制方式安装的二进制文件之前，必须先注册 Oracle 主目录，使其出现在 `inventory.xml`\
  \ 文件中。这被称为**附加** Oracle 主目录。\n\n要附加 Oracle 主目录，你需要知道服务器上 `oraInst.loc` 文件的位置。在 Linux\
  \ 服务器上，该文件通常位于 `/etc` 目录下。在 Solaris 上，该文件通常可以在 `/var/opt/oracle` 目录中找到。\n\n找到 `oraInst.loc`\
  \ 文件后，导航到 `ORACLE_HOME/oui/bin` 目录（即你从副本安装 Oracle 二进制文件的服务器上）：\n\n```\n$ cd $ORACLE_HOME/oui/bin\n\
  ```\n\n现在，通过运行 `runInstaller` 实用程序来附加 Oracle 主目录，如下所示：\n\n```\n$ ./runInstaller\
  \ -silent -attachHome -invPtrLoc /etc/oraInst.loc \\\nORACLE_HOME=\"/u01/app/oracle/product/18.1.0.1/db_1\"\
  \ ORACLE_HOME_NAME=\"ONEW\"\n```\n\n如果成功，你应该会在输出的最后看到这条消息：\n\n```\n'AttachHome'\
  \ was successful.\n```\n\n你也可以检查 `oraInventory/ContentsXML/inventory.xml` 文件的内容。以下是由于运行带有\
  \ `attachHome` 选项的 `runInstaller` 实用程序而插入到 `inventory.xml` 文件中的一行内容片段：\n\n```\n\
  ```\n\n### 安装只读 Oracle 主目录\n\nOracle 18c 的一个新特性是为二进制文件提供只读的 Oracle 主目录。数据库工具和进程将位于\
  \ `ORACLE_BASE` 路径下，而非 `ORACLE_HOME` 路径下。`ORACLE_HOME` 目录将包含为所创建数据库的配置和日志。\n\n只读的\
  \ Oracle 二进制主目录将软件与数据库信息分离，并允许在多个部署间共享软件。这实现了二进制文件的无缝打补丁和更新，以最大程度减少数据库停机时间，并允许将补丁应用于一个镜像以分发到多个服务器。这种分离还简化了供应过程，因为可以专注于数据库配置。\n\
  \n现在有了额外的环境变量来包含 Oracle 主目录的目录路径，如 `ORACLE_BASE_HOME`、`ORACLE_BASE_CONFIG`。\n\n\
  要启用只读 Oracle 主目录，软件需要按描述仅安装二进制文件，而不安装配置助手。然后运行以下命令：\n\n```\n$ cd /u01/app/oracle/product/18.1.0.1/dbhome18c/bin\n\
  $ roohctl -enable\n```\n\n启用只读主目录后，可以运行 `DBCA` 来创建数据库。有一个检查可以确定数据库是否位于只读主目录中：\n\n\
  ```\n$ cd $ORACLE_HOME/bin\n$ ./orabasehome\n```\n\n如果返回一个目录，则 Oracle 主目录是只读的。\n\
  \n### 升级 Oracle 软件\n\n你也可以使用静默安装方法升级 Oracle 软件版本。首先从 MOS 网站（[`http://support.oracle.com`](http://support.oracle.com)）下载升级版本（需要有效的支持合同）。阅读新软件附带的升级文档。升级过程可能因你使用的\
  \ Oracle 版本而有很大差异。\n\n根据我最近执行的升级，该过程很像安装一套新的 Oracle 二进制文件。你可以使用 `OUI` 的图形或静默模式来安装软件。有关使用静默模式安装方法的信息，请参阅本章前面的“安装\
  \ Oracle”部分。\n\n使用数据库升级助手 (`DBUA`) 可以成功将数据库迁移到新版本。这将执行到数据库最新版本的迁移并升级服务。18c 的新特性是必须使用此方法升级服务，安装最新版本的软件，然后运行\
  \ `DBUA` 完成迁移。\n\n> **注意**\n> 升级 Oracle 软件与升级 Oracle 数据库不同。本节仅涉及使用静默安装方法升级 Oracle\
  \ 软件。升级数据库需要额外的步骤。有关如何升级数据库的说明，请参阅 MOS 笔记 730365.1。\n\n根据升级的版本，你可能会遇到两种不同的场景。以下是场景\
  \ A：\n\n1.  关闭使用要升级的 Oracle 主目录的所有数据库。\n2.  升级 Oracle 主目录的二进制文件。\n3.  启动数据库并运行任何必需的升级脚本。\n\
  \n以下是采用场景 B 方法进行升级的步骤：\n\n1.  保持现有的 Oracle 主目录原样——不要升级它。\n2.  安装一个与旧 Oracle 主目录相同版本的新\
  \ Oracle 主目录。\n3.  将新 Oracle 主目录升级到所需版本。\n4.  准备就绪后，关闭使用旧 Oracle 主目录的数据库；设置操作系统变量指向新的、已升级的\
  \ Oracle 主目录；启动数据库；并运行任何必需的升级脚本。\n\n上述两种场景中哪一种更好？场景 B 的优势在于保留了旧的 Oracle 主目录；因此，如果由于任何原因需要切回旧的\
  \ Oracle 主目录，那些二进制文件仍然可用。场景 B 的缺点是需要额外的磁盘空间来容纳两份 Oracle 主目录的安装。这通常不是问题，因为在升级完成后，你可以在方便时删除旧的\
  \ Oracle 主目录。\n\n在多租户环境中，数据库也可以升级到新的容器数据库。这将在第 22 章中详细讨论，但可插拔数据库可以移动到已经升级的容器数据库中。\n\
  \n> **提示**\n> 考虑使用数据库升级助手 (`DBUA`) 来升级 Oracle 数据库。\n\n### 安装失败后重新安装\n\n你可能会遇到尝试安装\
  \ Oracle 时因某种原因安装失败的情况。你纠正了问题并尝试重新运行 Oracle 安装程序。但是，你收到了这条消息：\n\n```\nCAUSE: The\
  \ chosen installation conflicted with software already\ninstalled in the given Oracle\
  \ home.\nACTION: Install into a different Oracle home.\n```\n\n在这种情况下，Oracle 认为软件已经安装，原因如下：\n\
  \n*   `ORACLE_HOME` 目录中指定的文件已在响应文件中列出。\n*   你的 `oraInventory/ContentsXML/inventory.xml`\
  \ 文件中现有的 Oracle 主目录和位置与你在响应文件中指定的相匹配。\n\nOracle 不允许你在现有的 Oracle 主目录之上安装一套新的二进制文件。如果你确定不需要\
  \ `ORACLE_HOME` 目录中的任何文件，可以删除它们（务必非常小心——确保你绝对想这么做）。此示例导航到 `ORACLE_HOME`，然后删除 `db_1`\
  \ 目录及其内容：\n\n```\n$ cd $ORACLE_HOME\n$ cd ..\n$ rm -rf db_1\n```\n\n此外，即使 `ORACLE_HOME`\
  \ 目录中没有文件，安装程序也会检查 `inventory.xml` 文件以查找以前的 Oracle 主目录名称和位置。在 `inventory.xml` 文件中，你必须删除与你要尝试安装到的\
  \ Oracle 主目录位置相匹配的条目。要删除该条目，首先找到你的 `oraInst.loc` 文件，该文件包含你的 `oraInventory` 的目录。接下来，导航到\
  \ `oraInventory/ContentsXML` 目录。在修改之前，先备份 `inventory.xml`：\n\n```\n$ cp inventory.xml\
  \ inventory.xml.old\n```\n\n然后，使用操作系统实用程序（如 `vi`）编辑 `inventory.xml` 文件，并删除包含先前失败安装的\
  \ Oracle 主目录信息的那一行。现在你可以尝试再次执行 `runInstaller` 实用程序。\n\n### 应用临时补丁\n\n有时，你需要应用补丁来解决数据库问题或消除错误。通常可以从\
  \ MOS 网站获取补丁，并使用 `opatch` 实用程序进行安装。应用补丁的基本步骤如下：\n\n1.  从 MOS 获取补丁（需要有效的支持合同）。\n\
  2.  解压补丁文件。\n3.  仔细阅读 `README.txt` 文件以获取特殊说明。\n4.  关闭使用要应用补丁的 Oracle 主目录的所有数据库和进程。\n\
  5.  应用补丁。\n6.  验证补丁是否安装成功。\n\n一个简短的示例将有助于说明应用补丁的过程。此处，将补丁号 14390252 应用于 Solaris\
  \ 系统上的 11.2.0.3 数据库。首先，从 MOS ([`https://support.oracle.com`](https://support.oracle.com))\
  \ 下载 `p14390252_112030_SOLARIS64.zip` 文件。接下来，在要应用补丁的服务器上解压该文件：\n\n```\n$ unzip p14390252_112030_SOLARIS64.zip\n\
  ```\n\n`README.txt` 指示你更改目录，如下所示：\n\n```\n$ cd 14390252\n```\n\n确保你遵循 `README.txt`\
  \ 中包含的说明，例如关闭使用要应用补丁的 Oracle 主目录的所有数据库：\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown\
  \ immediate;\n```\n\n接下来，应用补丁。确保以 Oracle 软件的所有者（通常是操作系统账户 `oracle`）身份执行此步骤。同时确保你的\
  \ `ORACLE_HOME` 变量已设置为指向你要应用补丁的 Oracle 主目录。在此示例中，由于 `opatch` 实用程序不在 `PATH` 目录包含的路径中，因此你需要指定完整路径：\n\
  \n```\n$ $ORACLE_HOME/OPatch/opatch napply -skip_subset -skip_duplicate\n```\n\n\
  最后，通过列出补丁清单来验证补丁是否已应用：\n\n```\n$ $ORACLE_HOME/OPatch/opatch lsinventory\n```\n\n\
  以下是此示例的一些输出样本：\n\n```\nPatch  13742433     : applied on Sun Nov 04 13:49:07 MST\
  \ 2012\nUnique Patch ID:  15427576\n```\n\n> **提示**\n> 有关 `opatch` 实用程序的更多信息，请参阅\
  \ MOS 笔记 242993.1。\n\n### 使用图形安装程序进行远程安装\n\n可以使用 GUI 为只读 Oracle 主目录执行一次安装。在当今的全球化环境中，DBA\
  \ 们经常需要在远程 Linux/Unix 服务器上安装 Oracle 软件。在这种情况下，我强烈建议你使用带有响应文件的静默安装模式（如前所述）。但是，如果你想通过图形安装程序在远程服务器上安装\
  \ Oracle，本章的此部分描述了所需的步骤。\n\n> **注意**\n> 如果你处于基于 Windows 的环境中，请使用远程桌面连接或虚拟网络计算 (`VNC`)\
  \ 来远程安装软件。\n\n经常出现的一个问题是如何在远程服务器上运行 Oracle 安装程序，并将图形输出显示到你的本地计算机。图 1-2 显示了远程运行 Oracle\
  \ 图形安装程序所需的基本组件和实用程序。\n\n![../images/214899_3_En_1_Chapter/214899_3_En_1_Fig2_HTML.jpg](img/214899_3_En_1_Fig2_HTML.jpg)\n\
  \n*图 1-2 远程 Oracle 图形安装所需的组件*\n\n接下来列出了设置环境以在远程运行 Oracle 安装程序时将图形屏幕显示在本地计算机上的步骤：\n\
  \n1.  在本地计算机上安装允许 X Window 系统仿真和安全网络的软件。\n2.  在本地计算机上启动 X 会话并发出 `startx` 命令。\n3.\
  \  将 Oracle 安装文件复制到远程服务器。\n4.  运行 `xhost` 命令。\n5.  从 X 终端登录到远程计算机。\n6.  确保在远程计算机上正确设置了\
  \ `DISPLAY` 变量。\n7.  在远程服务器上执行 `runInstaller` 实用程序。\n8.  故障排除。\n\n这些步骤将在以下部分中说明。\n\
  \n#### 步骤一：在本地 PC 上安装 X 软件和网络实用程序\n\n如果你要在远程服务器上安装 Oracle，并且使用的是家用个人计算机 (`PC`)，那么你首先需要在你的\
  \ `PC` 上安装允许你运行 X Window 系统软件以及运行诸如 `ssh`（安全外壳）和 `scp`（安全复制）等命令的软件。有几个免费工具提供此功能。其中一个工具是\
  \ `Cygwin`，你可以从 Cygwin 网站 ([`http://x.cygwin.com`](http://x.cygwin.com)) 下载。请务必安装提供\
  \ X 仿真和安全网络实用程序（如 `ssh` 和 `scp`）的软件包。\n\n#### 步骤二：在本地计算机上启动 X 会话\n\n在本地计算机上安装了允许你运行\
  \ X Window 系统软件的软件后，你可以打开一个 X 终端窗口并通过 `startx` 命令启动 X 服务器：\n\n```\n$ startx\n```\n\
  \n以下是输出片段：\n\n```\nxauth:  creating new authority file /home/test/.serverauth.3012\n\
  waiting for X server to begin accepting connections.\n```\n\n当 X 软件启动后，运行一个实用程序（如\
  \ `xeyes`）来确定 X 是否正常工作：\n\n```\n$ xeyes\n```\n\n图 1-3 显示了使用 `Cygwin` X 终端会话工具时本地终端会话的样子。\n\
  \n![../images/214899_3_En_1_Chapter/214899_3_En_1_Fig3_HTML.jpg](img/214899_3_En_1_Fig3_HTML.jpg)\n\
  \n*图 1-3 在本地计算机上运行 `xeyes` 实用程序*\n\n如果你无法让 `xeyes` 这样的实用程序执行，请在此步骤暂停，直到它能运行为止。在你能够使用图形安装程序远程安装\
  \ Oracle 之前，你必须拥有功能正常的 X 软件。\n\n#### 步骤三：将 Oracle 安装介质复制到远程服务器\n\n从 X 终端运行 `scp`\
  \ 命令，将 Oracle 安装介质复制到远程服务器。以下是使用 `scp` 的基本语法：\n\n```\n$ scp <local_file> <user>@<remote_host>:<remote_path>\n\
  ```\n\n下一行代码将 Oracle 安装介质复制到远程服务器上的 Oracle 操作系统用户 `oracle` 的主目录：\n\n```\n$ scp linux_18cR1_database_1of2.zip\
  \ oracle@shrek2:.\n```\n\n#### 步骤四：运行 xhost 命令\n\n从 X 屏幕，通过 `xhost` 命令启用对远程主机的访问。此命令必须从你的本地计算机运行：\n\
  \n```\n$ xhost +\naccess control disabled, clients can connect from any host.\n\
  ```\n\n前面的命令允许任何客户端连接到本地 X 服务器。如果你想专门为你要在其中安装软件的远程计算机启用访问，请提供互联网协议 (`IP`) 地址或主机名（远程服务器的）。在此示例中，远程主机名是\
  \ `tst-z1.central.sun.com`：\n\n```\n$ xhost +tst-z1.central.sun.com\ntst-z1.central.sun.com\
  \ being added to access control list\n```\n\n#### 步骤五：从 X 登录到远程计算机\n\n从你的本地 X 终端，使用\
  \ `ssh` 实用程序登录到你要在其中安装 Oracle 软件的远程服务器：\n\n```\n$ ssh -Y -l oracle <remote_host>\n\
  ```\n\n#### 步骤六：确保在远程计算机上正确设置了 DISPLAY 变量\n\n登录到远程主机后，验证你的 `DISPLAY` 变量是否已设置：\n\n\
  ```\n$ echo $DISPLAY\n```\n\n你应该会看到类似这样的内容：\n\n```\nlocalhost:10.0\n```\n\n如果你的\
  \ `DISPLAY` 变量设置为 `localhost:10.0`，那么请进行下一步。否则，请遵循下一组建议。\n\n如果你的 `DISPLAY` 变量未设置，你必须确保它设置为反映你本地家用计算机位置的值。在你的本地家用计算机上，你可以使用\
  \ `ping` 或 `arp` 实用程序来确定标识你本地计算机的 `IP` 地址。在你的家用计算机上运行以下命令：\n\n```\nC:\\> ping <your_local_computer_name>\n\
  ```\n\n> **提示**\n> 如果你不知道你的本地家用计算机名称，在 Windows 上你可以查看控制面板，然后系统，然后参考计算机名称。\n\n现在，从远程服务器执行此命令，将\
  \ `DISPLAY` 变量设置为包含本地计算机的 `IP` 地址：\n\n```\n$ export DISPLAY=129.151.31.147:0.0\n\
  ```\n\n请注意，你必须在 `IP` 地址末尾附加 `:0.0`。如果你使用的是 C shell，请使用 `setenv` 命令设置 `DISPLAY` 变量：\n\
  \n```\n$ setenv DISPLAY 129.151.31.147:0.0\n```\n\n如果你不确定正在使用哪个 shell，请使用 `echo`\
  \ 命令显示 `SHELL` 变量：\n\n```\n$ echo $SHELL\n```\n\n#### 步骤七：执行 runInstaller 实用程序\n\
  \n导航到你在远程服务器上复制并解压 Oracle 软件的目录。找到 `runInstaller` 实用程序并运行它，如下所示：\n\n```\n$ ./runInstaller\n\
  ```\n\n如果一切顺利，你应该会看到一个屏幕出现，引导你完成安装步骤。从这里，你可以通过点击来完成 Oracle 软件的安装。许多 DBA 更习惯通过图形屏幕安装软件。如果你不熟悉\
  \ Oracle 的安装过程，并希望有输入提示和合理的默认值，这尤其是一个好方法。\n\n#### 步骤八：故障排除\n\n远程安装的大多数问题出现在步骤 4、5\
  \ 和 6。确保你已通过 `xhost` 命令正确启用了远程客户端对本地 X 服务器（运行在家用计算机上）的访问。`xhost` 命令必须在你要显示图形的本地计算机上运行。将\
  \ `+`（加号）与远程主机名一起使用会将一个主机添加到本地访问列表中。这使得远程服务器可以在本地主机上显示 X 窗口。如果你单独输入 `xhost` 命令（不带参数），它会显示所有可以在本地计算机上显示\
  \ X 会话的远程主机：\n\n```\n$ xhost\naccess control disabled, clients can connect from\
  \ any host\n```\n\n在远程服务器上设置 `DISPLAY` 操作系统变量也至关重要。这允许你远程登录到另一台主机，并将 X 应用程序显示回你的本地计算机。`DISPLAY`\
  \ 变量必须在远程数据库服务器上设置，包含指向你想要显示图形屏幕的本地计算机的信息。\n\n### 在云中安装\n\nOracle 18c 是首个为云而发布的数据库。Oracle\
  \ 18c 用于服务器的安装在能够在云中使用和执行安装几个月后才可用。Oracle 为云中的数据库提供了几种不同的选项，常见的一个是基础架构即服务 (`IaaS`)。`IaaS`\
  \ 提供安装你自己的软件然后创建数据库所需的基础架构、服务器、`OS` 和用户。数据库供应是另一个选项，平台即服务 (`PaaS`) 可以提供 Oracle 二进制文件，只需要在该云服务上创建数据库。\n\
  \n由于我们一直在讨论在服务器和现有 `OS` 上的软件安装，这将是在云中的 `IaaS` 上进行安装。数据库二进制文件将经历本章所述的相同步骤。所提供的云服务的配置将基于请求的存储、CPU\
  \ 和内存量。在云中可以灵活地请求 CPU 和内存的数量，并可以快速高效地为未来需求进行扩展。\n\nOracle 也可以在 `AWS` 中使用，可以从商店中选择作为\
  \ `AMI` 进行安装。除了此选项和其他平台外，Oracle 可以作为 `IaaS` 的一部分进行安装。`IaaS` 在不同的云产品、`AWS` 和其他平台中可用，但某些服务器配置将在\
  \ Oracle Cloud 上进行优化，并且许可的不同选项可能可用。这些需要与 Oracle 销售团队讨论以获得许可证并规划需求，但迁移到云的决定需要与业务部门讨论，并确定灵活的资源和部署时间是否具有价值。\n\
  \n在 Oracle Cloud 中，选择数据库部署，根据 CPU 和其他资源选择可用的域和裸机机器的形状，用于 `IaaS` 服务器。软件版本是下一个选择，这也与非云的二进制文件安装相同。在云中使用\
  \ `IaaS` 时，其 `ssh` 密钥、根访问权限以及其他访问权限（如仅客户可用而 Oracle 云提供商无法访问的 `SYS`）都是针对已请求的服务器设置的。配置助手可以在二进制文件安装后运行，或选择在二进制文件安装后立即运行。\n\
  \n做出这些基本选择后，安装在云中进行。然后服务器就可以用于创建数据库并设置管理和监控。这些步骤将在后续章节中讨论，包括如何在云中管理数据库。\n\n## 总结\n\
  \n本章详细介绍了高效安装 Oracle 二进制文件的技术。Oracle 18c 提供了部署 Oracle 二进制文件的新方法，包括只读 Oracle 主目录。如果你工作在地理上与数据库服务器分离的环境中，这些方法尤其有用。Oracle\
  \ 静默安装方法效率高，因为它不需要图形软件，并且使用响应文件有助于确保一次安装与下一次安装的一致性。在混乱和不断变化的环境中工作时，你应能从这里描述的安装技巧和流程中受益。\n\
  \n当使用基础架构即服务 (`IaaS`) 时，Oracle 二进制文件安装在云环境中，这使得供应服务器和数据库非常高效。`IaaS` 允许 DBA 拥有对供应服务器的完全访问权限以执行数据库创建，但数据库二进制文件的安装被简化，并且类似于响应文件安装。许多\
  \ DBA 更习惯使用 Oracle 的图形安装程序来安装数据库软件。然而，当服务器位于远程位置或深嵌在安全网络中时，图形安装程序可能会很麻烦。缓慢的网络或安全功能会极大地阻碍图形安装过程。在这些情况下，请确保正确配置所需的\
  \ X 软件和 `OS` 变量（如 `DISPLAY`）。\n\n作为一名 DBA，精通 Oracle 安装流程至关重要。如果 Oracle 安装软件没有正确安装，你将无法成功创建数据库。一旦正确安装了\
  \ Oracle，你就可以进行下一步：启动后台进程并创建数据库。启动 Oracle 以及发出和创建数据库的主题接下来在第 2 章中讨论。\n\n\n\n"
- '# 设置 Oracle 环境变量


  ## 安装设置


  1. 将 oraset 文件置于 `/etc` (Linux 系统) 或 `/var/opt/oracle` (Solaris 系统) 目录中

  2. 确保 `/etc` 或 `/var/opt/oracle` 目录位于 `$PATH` 环境变量中


  ## 使用方法


  - 批处理模式：`. oraset`

  - 菜单模式：`. oraset`


  ---


  ```

  if [ -f /etc/oratab ]; then

  OTAB=/etc/oratab

  elif [ -f /var/opt/oracle/oratab ]; then

  OTAB=/var/opt/oracle/oratab

  else

  echo ''oratab file not found.''

  exit

  fi

  #

  if [ -z $1 ]; then

  SIDLIST=$(egrep -v ''#|\*'' ${OTAB} | cut -f1 -d:)

  ```




  ## PS3 指示了 Bash `select` 命令要使用的提示符。

  `PS3=''SID? ''`

  `select` sid in `${SIDLIST}`; do

  if [ -n `$sid` ]; then

  `HOLD_SID=$sid`

  `break`

  fi

  `done`

  `else`

  if `egrep -v ''#|\*'' ${OTAB}` | `grep -w "${1}:">/dev/null`; then

  `HOLD_SID=$1`

  else

  echo "SID: `$1` not found in `$OTAB"`

  fi

  `shift`

  `fi`

  #

  `export ORACLE_SID=$HOLD_SID`

  `export ORACLE_HOME=$(egrep -v ''#|\*'' $OTAB|grep -w $ORACLE_SID:|cut -f2 -d:)`

  `export ORACLE_BASE=${ORACLE_HOME%%/product*}`

  `export TNS_ADMIN=$ORACLE_HOME/network/admin`

  `export ADR_BASE=$ORACLE_BASE/diag`

  `export PATH=$ORACLE_HOME/bin:/usr/ccs/bin:/opt/SENSsshc/bin/\

  :/bin:/usr/bin:.:/var/opt/oracle:/usr/sbin`

  `export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib`


  ## 使用 oraset 脚本


  你可以从命令行或启动文件（如 `.profile`、`.bash_profile` 或 `.bashrc`）中运行 `oraset` 脚本。要从命令行运行 `oraset`，请将
  `oraset` 文件放置在标准位置，例如 `/var/opt/oracle`（Solaris）或 `/etc`（Linux），并按如下方式运行：


  ```

  $ . /etc/oraset

  ```


  请注意，从命令行运行此命令的语法要求点号 (`.`) 与命令的其余部分之间有一个空格。当你从命令行运行 `oraset` 时，应该会看到类似以下的菜单：


  ```

  1) o18c

  2) rcat

  SID?

  ```


  在此示例中，你现在可以输入 `1` 或 `2` 来为要使用的任何数据库设置所需的 OS 变量。这允许你以交互方式设置 OS 变量，无论服务器上有多少个数据库安装。


  你也可以从 OS 启动文件中调用 `oraset` 文件。以下是 `.bashrc` 文件中的一个示例条目：


  ```

  . /etc/oraset

  ```


  现在，每次登录服务器时，系统都会显示一个选择菜单，你可以使用该菜单来指示要为其设置 OS 变量的数据库。如果希望 OS 变量自动设置为特定数据库，请在 `.bashrc`
  文件中放入如下条目：


  ```

  . /etc/oraset o18c

  ```


  前面的行将为 `o18c` 数据库运行 `oraset` 文件，并相应地设置 OS 变量。


  ## 创建数据库


  本节说明如何使用 SQL*Plus 的 `CREATE DATABASE` 语句手动创建 Oracle 数据库。创建数据库需要以下步骤：


  1.  设置 OS 变量。

  2.  配置初始化文件。

  3.  创建所需的目录。

  4.  创建数据库。

  5.  创建数据字典。


  以下各节将详细介绍这些步骤中的每一步。


  ### 步骤 1. 设置 OS 变量


  如前所述，在运行 SQL*Plus（或任何其他 Oracle 实用程序）之前，必须设置几个 OS 变量。你可以手动设置这些变量，也可以结合使用文件和脚本来设置变量。以下是一个手动设置这些变量的示例：


  ```

  $ export ORACLE_HOME=/u01/app/oracle/product/18.0.0.0/db_1

  $ export ORACLE_SID=o18c

  $ export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib

  $ export PATH=$ORACLE_HOME/bin:$PATH

  ```


  有关这些变量的完整说明以及设置它们的技术，请参阅本章前面的“设置 OS 变量”部分。


  ### 步骤 2. 配置初始化文件


  Oracle 要求在尝试启动实例之前准备好一个初始化文件。初始化文件用于配置内存和控制文件位置等特性。你可以使用两种类型的初始化文件：


  *   服务器参数二进制文件 (`spfile`)

  *   `init.ora` 文本文件


  Oracle 建议你使用 `spfile`，原因如下：


  *   你可以使用 SQL `ALTER SYSTEM` 语句修改 `spfile` 的内容。

  *   你可以使用远程客户端 SQL 会话启动数据库，而无需本地（客户端）初始化文件。

  *   有更多的动态参数可以使用 spfile 设置，且无需任何停机时间。


  这些是使用 `spfile` 的充分理由。然而，一些站点仍然使用传统的 `init.ora` 文件。`init.ora` 文件也有优点：


  *   你可以使用 OS 文本编辑器直接编辑它。

  *   你可以在其中添加注释，详细说明修改历史。


  当我第一次创建数据库时，我发现使用 `init.ora` 文件更容易。如果需要，这个文件以后可以轻松转换为 `spfile`（通过 `CREATE SPFILE
  FROM PFILE` 语句）。在此示例中，我的数据库名称是 `o18c`，因此我将以下内容放入名为 `inito18c.ora` 的文件中，并将文件放在 `ORACLE_HOME/dbs`
  目录中：


  ```

  db_name=o18c

  db_block_size=8192

  memory_target=300M

  memory_max_target=300M

  processes=200

  control_files=(/u01/dbfile/o18c/control01.ctl,/u02/dbfile/o18c/control02.ctl)

  job_queue_processes=10

  open_cursors=500

  fast_start_mttr_target=500

  undo_management=AUTO

  undo_tablespace=UNDOTBS1

  remote_login_passwordfile=EXCLUSIVE

  ```


  确保初始化文件命名正确并位于适当的目录中。这很关键，因为在启动实例时，Oracle 首先在 `ORACLE_HOME/dbs` 目录中按以下顺序查找特定格式的参数文件：


  *   `spfile<SID>.ora`

  *   `spfile.ora`

  *   `init<SID>.ora`


  换句话说，Oracle 首先查找名为 `spfile<SID>.ora` 的文件。如果找到，则启动实例；如果未找到，Oracle 会查找 `spfile.ora`，然后是
  `init<SID>.ora`。如果这些文件都未找到，Oracle 将抛出错误。如果你不知道 Oracle 查找哪些文件以及查找顺序，这可能会造成一些混淆。例如，你可能对
  `init<SID>.ora` 文件进行了更改，并期望在停止并启动实例后实例化该参数。如果存在 `spfile<SID>.ora`，则 `init<SID>.ora`
  将被完全忽略。


  > **注意**

  > 你可以使用 `startup` 命令的 `pfile=<directory/filename>` 子句手动指示 Oracle 在目录中查找文本参数文件；在正常情况下，你不需要这样做。你需要默认行为，即
  Oracle 在 `ORACLE_HOME/dbs` 目录（对于 Linux/Unix）中查找参数文件。Windows 上的默认目录是 `ORACLE_HOME/database`。


  表 2-1 列出了配置 Oracle 初始化文件时需要考虑的最佳实践。


  **表 2-1：初始化文件最佳实践**


  | 最佳实践 | 推理依据 |

  | :--- | :--- |

  | Oracle 建议你使用二进制服务器参数文件 (`spfile`)。 | Spfile 允许对参数进行动态更改。如果存在可接受的维护窗口，那么使用 init.ora
  文件也是可以的。 |

  | 一般来说，如果你不确定初始化参数的预期用途，就不要设置它们。如有疑问，请使用默认值。 | 设置初始化参数可能对数据库性能产生深远影响。只有在知道结果行为是什么的情况下才修改参数。
  |

  | 对于 11g 及更高版本，设置 `memory_target` 和 `memory_max_target` 初始化参数。 | 这样做允许 Oracle 为你管理所有内存组件。
  |

  | 对于 10g，设置 `sga_target` 和 `sga_target_max` 初始化参数。 | 这样做让 Oracle 为你管理大多数内存组件。 |

  | 对于 10g，设置 `pga_aggregate_target` 和 `workarea_size_policy`。 | 这样做允许 Oracle 管理用于排序空间的内存。
  |

  | 从 10g 开始，使用自动 `UNDO` 功能。这通过 `undo_management` 和 `undo_tablespace` 参数设置。 | 这样做允许
  Oracle 管理 `UNDO` 表空间的大多数特性。 |

  | 将 `open_cursors` 设置为比默认值更高的值。我通常将其设置为 500。活跃的在线事务处理 (OLTP) 数据库可能需要高得多的值。 | 默认值
  50 几乎永远不够。即使是一个小型、单用户应用程序也可能超过 50 个打开游标的默认值。 |

  | 使用模式 `/<mount_point>/dbfile/<database_name>/control0N.ctl` 命名控制文件。 | 这与 OFA 标准略有不同。我发现这个位置比位于
  `ORACLE_BASE` 下更容易导航。 |

  | 使用至少两个控制文件，最好位于不同位置、使用不同的磁盘。 | 如果一个控制文件损坏，至少还有一个其他控制文件可用总是一个好主意。 |


  ### 步骤 3. 创建所需的目录


  在尝试创建数据库之前，必须在服务器上创建参数文件或 `CREATE DATABASE` 语句中引用的任何 OS 目录。例如，在上一节的初始化文件中，控制文件定义为：


  ```

  control_files=(/u01/dbfile/o18c/control01.ctl,/u02/dbfile/o18c/control02.ctl)

  ```


  根据前一行，确保你已创建目录 `/u01/dbfile/o18c` 和 `/u02/dbfile/o18c`（根据你的环境进行修改）。在 Linux/Unix
  中，你可以使用带有 `-p` 选项的 `mkdir` 命令创建目录（包括所需的任何父目录）：


  ```

  $ mkdir -p /u01/dbfile/o18c

  $ mkdir -p /u02/dbfile/o18c

  ```


  同时确保为 `CREATE DATABASE` 语句中引用的数据文件和联机重做日志创建任何所需的目录（参见步骤 4）。对于此示例，需要额外创建以下目录：


  ```

  $ mkdir -p /u01/oraredo/o18c

  $ mkdir -p /u02/oraredo/o18c

  ```


  如果你以 `root` 用户身份创建了上述目录，请确保 `oracle` 用户和 `dba` 组已正确设置为目录、子目录和文件的所有者。此示例递归地更改以下目录的所有者和组：




  ### 步骤 4. 创建数据库


  在您设置了操作系统变量、配置了初始化文件并创建了所需的目录之后，现在就可以创建数据库了。本步骤将说明如何使用 `CREATE DATABASE` 语句来创建一个数据库。


  在运行 `CREATE DATABASE` 语句之前，您必须通过 `STARTUP NOMOUNT` 语句启动后台进程并分配内存：


  ```bash

  $ sqlplus / as sysdba

  SQL> startup nomount;

  ```


  当您发出 `STARTUP NOMOUNT` 语句时，SQL*Plus 会尝试读取 `ORACLE_HOME/dbs` 目录中的初始化文件（参见步骤 2）。`STARTUP
  NOMOUNT` 语句会实例化 Oracle 使用的后台进程和内存区域。此时，您拥有一个 Oracle 实例，但还没有数据库。


  > **注意**

  > Oracle 实例被定义为后台进程和内存区域。Oracle 数据库则被定义为磁盘上的物理文件（数据文件、控制文件、在线重做日志）。


  下面列出的是一个典型的 Oracle `CREATE DATABASE` 语句：


  ```sql

  CREATE DATABASE o18c

  MAXLOGFILES 16

  MAXLOGMEMBERS 4

  MAXDATAFILES 1024

  MAXINSTANCES 1

  MAXLOGHISTORY 680

  CHARACTER SET AL32UTF8

  DATAFILE

  ''/u01/dbfile/o18c/system01.dbf''

  SIZE 500M REUSE

  EXTENT MANAGEMENT LOCAL

  UNDO TABLESPACE undotbs1 DATAFILE

  ''/u01/dbfile/o18c/undotbs01.dbf''

  SIZE 800M

  SYSAUX DATAFILE

  ''/u01/dbfile/o18c/sysaux01.dbf''

  SIZE 500M

  DEFAULT TEMPORARY TABLESPACE TEMP TEMPFILE

  ''/u01/dbfile/o18c/temp01.dbf''

  SIZE 500M

  DEFAULT TABLESPACE USERS DATAFILE

  ''/u01/dbfile/o18c/users01.dbf''

  SIZE 20M

  LOGFILE GROUP 1

  (''/u01/oraredo/o18c/redo01a.rdo'',

  ''/u02/oraredo/o18c/redo01b.rdo'') SIZE 50M,

  GROUP 2

  (''/u01/oraredo/o18c/redo02a.rdo'',

  ''/u02/oraredo/o18c/redo02b.rdo'') SIZE 50M,

  GROUP 3

  (''/u01/oraredo/o18c/redo03a.rdo'',

  ''/u02/oraredo/o18c/redo03b.rdo'') SIZE 50M

  USER sys    IDENTIFIED BY foo

  USER system IDENTIFIED BY foo;

  ```


  在此示例中，脚本被放置在一个名为 `credb.sql` 的文件中，并以 `SYS` 用户身份从 SQL*Plus 提示符运行：


  ```sql

  SQL> @credb.sql

  ```


  如果执行成功，您应该会看到以下消息：


  ```

  Database created.

  ```


  > **注意**

  > 有关创建可插拔数据库的详细信息，请参见第 22 章。


  如果在 `CREATE DATABASE` 语句运行时抛出任何错误，请检查警报日志文件。错误通常发生在所需目录不存在、内存分配不足或超出操作系统限制时。如果您不确定警报日志的位置，请执行以下查询：


  ```sql

  SQL> select value from v$diag_info where name = ''Diag Trace'';

  ```


  即使数据库处于 nomount 状态，前面的查询也应该有效。另一种快速找到警报日志文件的方法是从操作系统入手：


  ```bash

  $ cd $ORACLE_BASE

  $ find . -name "alert*.log"

  ```


  > **提示**

  > 警报日志文件的默认命名格式为 `alert_<SID>.log`。


  关于前面的 `CREATE DATABASE` 语句示例，有几点关键内容需要指出。请注意，`SYSTEM` 数据文件被定义为本地管理的。这意味着在此数据库中创建的任何表空间都必须是本地管理的（相对于字典管理）。如果您尝试在此数据库中创建字典管理的表空间，Oracle
  将抛出错误。这是期望的行为。


  字典管理的表空间使用 Oracle 数据字典来管理区和可用空间，而本地管理的表空间则使用每个数据文件中的位图来管理其区和可用空间。本地管理的表空间具有以下优点：


  *   性能得到提升。

  *   不需要合并。

  *   减少了数据字典中的资源争用。

  *   减少了递归空间管理。


  另请注意，`TEMP` 表空间被定义为默认临时表空间。这意味着在此数据库中创建的任何用户都会自动分配 `TEMP` 表空间作为其默认临时表空间。在创建数据字典后（参见步骤
  5），您可以通过以下查询验证默认临时表空间：


  ```sql

  select *

  from database_properties

  where property_name = ''DEFAULT_TEMP_TABLESPACE'';

  ```


  最后，请注意 `USERS` 表空间被定义为任何未在 `CREATE USER` 语句中定义默认表空间的用户的默认永久表空间。在创建数据字典后（参见步骤 5），您可以通过运行此查询来确定默认表空间：


  ```sql

  select *

  from database_properties

  where property_name = ''DEFAULT_PERMANENT_TABLESPACE'';

  ```


  表 2-2 列出了创建 Oracle 数据库时应考虑的最佳实践。


  **表 2-2**

  **创建 Oracle 数据库的最佳实践**


  | 最佳实践 | 原因说明 |

  | --- | --- |

  | 谨慎使用 `REUSE` 子句。通常，仅应在重新创建数据库时使用它。 | `REUSE` 子句指示 Oracle 覆盖现有文件，无论它们是否正在使用中。这是危险的。
  |

  | 使用名称中包含 `TEMP` 的表空间创建默认临时表空间。 | 每个用户都应被分配一个类型为 `TEMP` 的临时表空间，包括 `SYS` 用户。如果未指定默认临时表空间，则将使用
  `SYSTEM` 表空间。您绝不希望用户被分配到 `SYSTEM` 作为临时表空间。如果您的数据库没有默认临时表空间，请使用 `ALTER DATABASE DEFAULT
  TEMPORARY TABLESPACE` 语句来指定一个。 |

  | 创建名为 `USERS` 的默认永久表空间。 | 这确保用户被分配一个除 `SYSTEM` 之外的默认永久表空间。如果您的数据库没有默认永久表空间，请使用
  `ALTER DATABASE DEFAULT TABLESPACE` 语句来指定一个。 |

  | 使用 `USER SYS` 和 `USER SYSTEM` 子句来指定非默认密码。 | 这样做会在创建数据库时为通常是黑客首要目标的数据库账户设置非默认密码。
  |

  | 创建至少三个重做日志组，每组两个成员。 | 至少三个重做日志组为归档进程在日志切换之间写出归档重做日志提供了时间。两个成员可以镜像在线重做日志成员，提供一定的容错能力。
  |

  | 给重做日志命名，例如 `redoNA.rdo`。 | 这与 OFA 标准略有不同，但我曾多次遇到扩展名为 `.log` 的文件被意外删除（这本不应发生，但确实发生了）。
  |

  | 使数据库名称具有一定意义，例如 `PAPRD`、`PADEV1` 或 `PATST1`。 | 这有助于您确定正在操作的是哪个数据库，以及它是生产、开发还是测试环境。
  |

  | 在创建数据字典时（参见步骤 5）使用 `?` 变量。不要硬编码目录路径。 | SQL*Plus 将 `?` 解释为操作系统 `ORACLE_HOME` 变量中包含的目录。这可以防止您意外地从错误的
  `ORACLE_HOME` 版本运行脚本。 |


  > **提示**

  > 使用 `dbca` 会为您完成 `CREATE DATABASE` 中的许多此类设置。可以设置表空间或使用默认设置，同时确保用户不会在 `SYSTEM` 表空间中创建对象，且不使用默认密码。使用
  `dbca` 会将新特性和安全选项作为数据库创建的一部分进行处理。




  '
- '# 第 5 步：创建数据字典


  在数据库成功创建后，您可以通过运行两个脚本来实例化数据字典。这些脚本在您安装 Oracle 二进制文件时创建。您必须以 `SYS` 方案用户身份运行这些脚本：


  ```

  SQL> show user

  USER is "SYS"

  ```


  在创建数据字典之前，我喜欢先生成一个输出文件，以便在出现意外错误时进行检查：


  ```

  SQL> spool create_dd.lis

  ```


  现在，创建数据字典：


  ```

  SQL> @?/rdbms/admin/catalog.sql

  SQL> @?/rdbms/admin/catproc.sql

  ```


  成功创建数据字典后，以 `SYSTEM` 方案用户身份创建产品用户配置文件表：


  ```

  SQL> connect system/

  SQL> @?/sqlplus/admin/pupbld

  ```


  这些表允许 SQL*Plus 按用户禁用命令。如果未运行 `pupbld.sql` 脚本，则所有非 `sys` 用户在登录 SQL*Plus 时会看到以下警告：


  ```

  Error accessing PRODUCT_USER_PROFILE

  Warning: Product user profile information not loaded!

  You may need to run PUPBLD.SQL as SYSTEM

  ```


  这些错误可以忽略。如果您不希望在登录 SQL*Plus 时看到它们，请确保运行了 `pupbld.sql` 脚本。

  至此，您应该拥有一个功能齐全的数据库。接下来，您需要配置并实现监听器以支持远程连接，并可选择设置密码文件。这些任务将在接下来的两节中描述。


  '
- '# 配置和实现监听器


  在安装了二进制文件并创建了数据库之后，您需要使数据库能够接受远程客户端连接。这通过配置和启动 Oracle 监听器来实现。顾名思义，监听器是数据库服务器上“监听”来自远程客户端连接请求的进程。如果数据库服务器上没有启动监听器，则无法从远程客户端连接。

  监听器可以包含在数据库主目录或网格主目录中。监听器只需要存在一次，因为只能有一个活动的网格主目录，并且可能存在多个数据库主目录。这是一个管理和维护监听器的地方。将监听器作为网格环境的一部分，允许其补丁更新独立于数据库，并与网格作为基础设施补丁过程的一部分进行。同时，在维护监听器时，请注意设置正确的
  `ORACLE_HOME`，以确保监听器在所需的环境中运行。接下来的两种方法展示了在数据库中配置监听器，但同样可以轻松地应用于网格环境。

  设置监听器有两种方法：Oracle Net 配置助手 (`netca`) 或手动配置 `listener.ora` 文件。


  ## 使用网络配置助手实现监听器


  `netca` 实用程序可帮助您完成实现监听器的各个方面。您可以在图形模式或静默模式下运行 `netca` 工具。在图形模式下使用 `netca` 简单直观。要在图形模式下使用
  `netca`，请确保安装了适当的 X 软件，然后发出 `xhost +` 命令，并检查您的 `DISPLAY` 变量是否已设置；例如，


  ```

  $ xhost +

  $ echo $DISPLAY

  :0.0

  ```


  现在可以运行 `netca` 实用程序：


  ```

  $ netca

  ```


  接下来，您将被引导通过几个屏幕，从中可以选择监听器名称、所需端口等选项。


  您也可以使用响应文件以静默模式运行 `netca` 实用程序。此模式允许您编写脚本并确保创建和实施监听器时的可重复性。首先，在包含 Oracle 安装介质的目录结构中找到默认的监听器响应文件：


  ```

  $  find . -name "netca.rsp"

  ./18.0.0.0/database/response/netca.rsp

  ```


  现在，复制该文件以便修改：


  ```

  $ cp 18.0.0.0/database/response/netca.rsp mynet.rsp

  ```


  如果要更改默认名称或其他属性，请使用 `vi` 等操作系统实用程序编辑 `mynet.rsp` 文件：


  ```

  $ vi mynet.rsp

  ```


  在此示例中，我没有修改 `mynet.rsp` 文件中的任何值。换句话说，我使用了响应文件中已包含的所有默认值。接下来，以静默模式运行 `netca` 实用程序：


  ```

  $ netca -silent -responsefile /home/oracle/orainst/mynet.rsp

  ```


  该实用程序会在 `ORACLE_HOME/network/admin` 目录中创建 `listener.ora` 和 `sqlnet.ora` 文件，并启动一个默认监听器。


  ## 手动配置监听器


  在设置新环境时，手动配置监听器是一个两步过程：


  1.  配置 `listener.ora` 文件。

  2.  启动监听器。


  `listener.ora` 文件默认位于 `ORACLE_HOME/network/admin` 目录中。这也应该是 `TNS_ADMIN` 操作系统变量设置指向的目录。手动配置监听器和更新
  `listener.ora` 文件时，请注意括号和任何特殊字符，配置错误的 `listener.ora` 将导致无法启动，而同一端口上运行的另一个监听器是首先需要检查的地方。


  以下是一个 `listener.ora` 文件示例，其中包含一个数据库的网络配置信息：


  ```

  LISTENER =

  (DESCRIPTION_LIST =

  (DESCRIPTION =

  (ADDRESS_LIST =

  (ADDRESS = (PROTOCOL = TCP)(HOST = oracle18c)(PORT = 1521))

  )

  )

  )

  SID_LIST_LISTENER =

  (SID_LIST =

  (SID_DESC =

  (GLOBAL_DBNAME = o18c)

  (ORACLE_HOME = /u01/app/oracle/product/18.0.0.0/db_1)

  (SID_NAME = o18c)

  )

  )

  ```


  此代码清单包含两个部分。第一部分定义了监听器名称和服务；在此示例中，监听器名称为 `LISTENER`。第二部分定义了监听器正在监听传入连接（到数据库）的 SID
  列表。SID 列表名称的格式为 `SID_LIST_<监听器名称>`。监听器的名称必须出现在 SID 列表名称中。此示例中的 SID 列表名称为 `SID_LIST_LISTENER`。

  此外，您不必在上面的代码清单中显式指定 `SID_LIST_LISTENER` 部分（第二部分）。这是因为进程监控器（`PMON`）后台进程会自动将任何正在运行的数据库作为服务注册到监听器；这称为动态注册。然而，一些
  DBA 偏好显式列出应注册到监听器的数据库，因此包含第二部分；这称为静态注册。


  在 `listener.ora` 文件就位后，您可以使用 `lsnrctl` 实用程序启动监听器后台进程：


  ```

  $ lsnrctl start

  ```


  您应该会看到信息性消息，例如：


  ```

  Listening Endpoints Summary...

  (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST = oracle18c)(PORT=1521)))

  Services Summary...

  Service "o18c" has 1 instance(s).

  ```




  '
- '# 监听器配置与状态


  你可以通过以下命令验证监听器正在监听的服务：


  ```bash

  $ lsnrctl services

  ```


  你可以使用以下查询来检查监听器的状态：


  ```bash

  $ lsnrctl status

  ```


  要获取监听器命令的完整列表，请执行此命令：


  ```bash

  $ lsnrctl help

  ```


  > **提示**

  > 使用 Linux/Unix 的 `ps -ef | grep tns` 命令可以查看服务器上运行的任何监听器进程。


  '
- '# 通过网络连接到数据库


  一旦监听器配置并启动后，你可以从 SQL*Plus 客户端测试远程连接，如下所示：


  ```bash

  $ sqlplus user/pass@''server:port/service_name''

  ```


  在下一行代码中，用户和密码是 `system/foo`，连接到 `oracle18c` 服务器、端口 1521 上名为 `o18c` 的数据库：


  ```bash

  $ sqlplus system/foo@''oracle18c:1521/o18c''

  ```


  这个示例演示了连接到数据库的所谓**简易连接命名方法**。它之所以“简易”，是因为它不依赖于任何设置文件或工具。你唯一需要知道的信息是用户名、密码、服务器、端口和服务名（SID）。


  ## 简易连接命名方法


  另一种常见的连接方法是**本地命名**。此方法依赖于 `ORACLE_HOME/network/admin/tnsnames.ora` 文件中的连接信息。在此示例中，编辑了
  `tnsnames.ora` 文件，并添加了以下透明网络底层（TNS）（Oracle 的网络架构）条目：


  ```text

  o18c =

  (DESCRIPTION =

  (ADDRESS = (PROTOCOL = TCP)(HOST = oracle18c)(PORT = 1521))

  (CONNECT_DATA = (SERVICE_NAME = o18c)))

  ```


  现在，从操作系统命令行，你可以通过引用已放入 `tnsnames.ora` 文件的 `o18c` TNS 信息来建立连接：


  ```bash

  $ sqlplus system/foo@o18c

  ```


  ## 本地命名方法


  此连接方法被称为“本地”，是因为它依赖于本地客户端的 `tnsnames.ora` 文件副本来确定 Oracle Net 连接详情。默认情况下，SQL*Plus
  会检查由 `TNS_ADMIN` 变量定义的目录中名为 `tnsnames.ora` 的文件。如果未找到，则会搜索由 `ORACLE_HOME/network/admin`
  定义的目录。如果找到了 `tnsnames.ora` 文件，并且该文件包含在 SQL*Plus 连接字符串中指定的别名（本例中为 `o18c`），那么连接详情将从该
  `tnsnames.ora` 文件的条目中获取。


  Oracle 使用的其他连接命名方法包括外部命名和目录命名。更多详细信息，请参阅《Oracle Net Services 管理员指南》，该指南可以从 Oracle
  网站（`http://otn.oracle.com`）的技术网络区域免费下载。


  > **提示**

  > 你可以使用 `netca` 实用程序来创建 `tnsnames.ora` 文件。启动该实用程序并选择“本地网络服务名配置”选项。系统将提示你输入 SID、主机名和端口等信息。


  '
- '# 创建密码文件


  创建密码文件是可选的。要求使用密码文件有一些充分的理由：


  *   你想为非 `sys` 用户分配 `sys*` 权限（如 `sysdba`、`sysoper`、`sysbackup` 等）。

  *   你想通过 Oracle Net 使用 `sys*` 权限远程连接到你的数据库。

  *   设置 Oracle Data Guard 并且需要在备用服务器上使用密码文件。

  *   某个 Oracle 特性或工具要求使用密码文件。


  请执行以下步骤来实现密码文件：


  1.  使用 `orapwd` 工具创建密码文件。

  2.  将初始化参数 `REMOTE_LOGIN_PASSWORDFILE` 设置为 `EXCLUSIVE`。


  在 Linux/Unix 环境中，使用 `orapwd` 工具创建密码文件，如下所示：


  ```bash

  $ cd $ORACLE_HOME/dbs

  $ orapwd file=orapw<SID> password=<password>

  ```


  在 Linux/Unix 环境中，密码文件通常存储在 `ORACLE_HOME/dbs` 中；在 Windows 中，它通常放置在 `ORACLE_HOME\database`
  目录中。


  你在前一条命令中指定的文件名格式可能因操作系统而异。例如，在 Windows 中，格式是 `PWD<ORACLE_SID>.ora`。以下示例展示了在 Windows
  环境中的语法：


  ```bash

  c:\> cd %ORACLE_HOME%\database

  c:\> orapwd file=PWD<SID>.ora password=<password>

  ```


  要启用密码文件的使用，请将初始化参数 `REMOTE_LOGIN_PASSWORDFILE` 设置为 `EXCLUSIVE`（这是默认值）。如果该参数未设置为
  `EXCLUSIVE`，那么你需要修改你的参数文件：


  ```sql

  SQL> alter system set remote_login_passwordfile=''EXCLUSIVE'' scope=spfile;

  ```


  你需要停止并启动实例以使上述设置生效。


  你可以通过 `GRANT <any SYS privilege>` 语句向密码文件添加用户。使用这些权限和密码文件进行安全配置时需要谨慎。只有需要这些权限的账户才应被授予访问密码文件的权限。以下示例授予
  `heera` 用户 `SYSDBA` 权限（从而将 `heera` 添加到密码文件）：


  ```sql

  SQL> grant sysdba to heera;

  Grant succeeded.

  ```


  启用密码文件还允许你通过 Oracle Net 连接，使用 `SYS*` 级别的权限远程连接到你的数据库。此示例展示了使用 `SYSDBA` 级别权限进行远程连接的语法：


  ```bash

  $ sqlplus /@<db_name> as sysdba

  ```


  这允许你执行远程维护，使用 `sys*` 权限（`sysdba`、`sysoper`、`sysbackup` 等），否则你需要物理登录到数据库服务器。你可以通过查询
  `V$PWFILE_USERS` 视图来验证哪些用户拥有 `sys*` 权限：


  ```sql

  SQL> select * from v$pwfile_users;

  ```


  以下是一些示例输出：


  ```text

  USERNAME                   SYSDB SYSOP SYSAS SYSBA SYSDG SYSKM     CON_ID

  -------------------------- ----- ----- ----- ----- ----- ----- ----------

  SYS                        TRUE  TRUE  FALSE FALSE FALSE FALSE          0

  ```


  特权用户的概念对于 RMAN 备份和恢复也很重要。与 SQL*Plus 类似，RMAN 使用操作系统认证和密码文件来允许特权用户连接到数据库。只有特权账户才允许备份、恢复和恢复数据库。


  '
- '# 启动和停止数据库


  在启动和停止 Oracle 实例之前，你必须设置正确的操作系统变量（本章前面已介绍）。你还需要有权访问特权操作系统账户或特权数据库用户账户。以特权用户身份连接允许你执行管理任务，例如启动、停止和创建数据库。你可以使用操作系统认证或密码文件以特权用户身份连接到你的数据库。


  ## 理解操作系统认证


  操作系统认证意味着，如果你能通过授权的操作系统账户登录到数据库服务器，你将被允许连接到你的数据库，而无需额外的密码。一个简单的示例演示了这一概念。首先，使用 `id`
  命令显示 `oracle` 用户所属的操作系统组：


  ```bash

  $ id

  uid=500(oracle) gid=506(oinstall) groups=506(oinstall),507(dba),508(oper)

  ```


  接下来，使用 `SYSDBA` 权限连接到数据库，特意使用了错误（无效）的用户名和密码：


  ```bash

  $ sqlplus bad/notgood as sysdba

  ```


  我现在可以验证已成功以 `SYS` 用户建立连接：


  ```sql

  SYS@o18c> show user

  USER is "SYS"

  ```




  怎么可能使用错误的用户名和密码连接到数据库呢？实际上，这并非坏事（可能你最初会这样认为）。之前的连接之所以有效，是因为 Oracle 忽略了提供的用户名/密码，用户首先是通过
  **操作系统认证** 进行验证的。在该示例中，`oracle` 操作系统用户属于 `dba` 操作系统组，因此无需提供正确的用户名和密码，即可使用 `SYSDBA`
  权限建立与数据库的本地连接。关于操作系统组及其与相应数据库权限映射的完整描述，请参见第 1 章中的表 1-1。典型的组包括 `dba` 和 `oper`；这些组分别对应
  `sysdba` 和 `sysoper` 数据库权限。`sysdba` 和 `sysoper` 权限允许您执行管理任务，例如启动和停止数据库。


  在 Windows 环境中，会自动创建一个操作系统组（通常命名为 `ora_dba`），并将其分配给安装 Oracle 软件的操作系统用户。您可以按照以下方式验证哪些操作系统用户属于
  `ora_dba` 组：选择 开始 ➤ 控制面板 ➤ 管理工具 ➤ 计算机管理 ➤ 本地用户和组 ➤ 组。您应该会看到一个名为 `ora_dba` 的组。您可以单击该组并查看哪些操作系统用户被分配到其中。此外，为了使操作系统认证在
  Windows 环境中生效，您的 `sqlnet.ora` 文件中必须包含以下条目：


  ```

  SQLNET.AUTHENTICATION_SERVICES=(NTS)

  ```


  `sqlnet.ora` 文件通常位于 `ORACLE_HOME/network/admin` 目录中。


  #### 启动数据库


  启动和停止数据库是您需要频繁执行的任务。要启动/停止数据库，请使用具有 `sysdba` 或 `sysoper` 权限的用户帐户连接，并执行 `startup`
  和 `shutdown` 语句。以下示例使用操作系统认证连接到数据库：


  ```

  $ sqlplus / as sysdba

  ```


  以特权帐户连接后，您可以启动数据库，如下所示：


  ```

  SQL> startup;

  ```


  要使前述命令生效，`ORACLE_HOME/dbs` 目录中需要存在 `spfile` 或 `init.ora` 文件。有关详细信息，请参阅本章前面的“步骤 2：配置初始化文件”部分。


  ## 注意


  在 DBA 圈内，快速连续地停止并重启数据库俗称“重启数据库”。


  当您的实例成功启动时，您应该会看到 Oracle 的消息，表明系统全局区 (`SGA`) 已分配。数据库将被挂载然后打开：


  ```

  ORACLE instance started.

  Total System Global Area  313159680 bytes

  Fixed Size                  2259912 bytes

  Variable Size             230687800 bytes

  Database Buffers           75497472 bytes

  Redo Buffers                4714496 bytes

  Database mounted.

  Database opened.

  ```


  从前述输出可以看出，在打开 Oracle 数据库时，数据库启动操作经历了三个不同的阶段：


  1.  启动实例


  2.  挂载数据库


  3.  打开数据库


  在启动数据库时，您可以逐步执行这些阶段。首先，启动 Oracle 实例（后台进程和内存结构）：


  ```

  SQL> startup nomount;

  ```


  接下来，挂载数据库。此时，Oracle 会读取控制文件：


  ```

  SQL> alter database mount;

  ```


  最后，打开数据文件和联机重做日志文件：


  ```

  SQL> alter database open;

  ```


  此启动过程如图 2-2 所示。


  ![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig2_HTML.jpg](img/214899_3_En_2_Fig2_HTML.jpg)


  图 2-2 Oracle 启动阶段


  当您发出不带任何参数的 `STARTUP` 语句时，Oracle 会自动逐步执行三个启动阶段（nomount、mount、open）。在大多数情况下，您将发出不带参数的
  `STARTUP` 语句来启动数据库。表 2-3 描述了可与数据库 `STARTUP` 语句一起使用的参数的含义。


  表 2-3 `startup` 命令可用参数


  | 参数 | 含义 |

  | --- | --- |

  | `FORCE` | 在重启之前使用 `ABORT` 关闭实例；对于排查启动问题很有用；通常不使用 |

  | `RESTRICT` | 仅允许具有 `RESTRICTED SESSION` 权限的用户连接到数据库 |

  | `PFILE` | 指定启动实例时要使用的客户端参数文件 |

  | `QUIET` | 在启动实例时抑制 `SGA` 信息的显示 |

  | `NOMOUNT` | 启动后台进程并分配内存；不读取控制文件 |

  | `MOUNT` | 启动后台进程，分配内存，并读取控制文件 |

  | `OPEN` | 启动后台进程，分配内存，读取控制文件，并打开联机重做日志和数据文件 |

  | `OPEN RECOVER` | 在打开数据库之前尝试进行介质恢复 |

  | `OPEN READ ONLY` | 以只读模式打开数据库 |

  | `UPGRADE` | 在升级数据库时使用 |

  | `DOWNGRADE` | 在降级数据库时使用 |


  #### 停止数据库


  通常，您使用 `SHUTDOWN IMMEDIATE` 语句来停止数据库。`IMMEDIATE` 参数指示 Oracle 停止数据库活动并回滚所有未完成的事务：


  ```

  SQL> shutdown immediate;

  Database closed.

  Database dismounted.

  ORACLE instance shut down.

  ```


  表 2-4 详细定义了可与 `SHUTDOWN` 语句一起使用的参数。在大多数情况下，`SHUTDOWN IMMEDIATE` 是一种可接受的关闭数据库方法。如果您发出不带参数的
  `SHUTDOWN` 命令，则等同于发出 `SHUTDOWN NORMAL`。


  表 2-4 `SHUTDOWN` 命令可用参数


  | 参数 | 含义 |

  | --- | --- |

  | `NORMAL` | 等待用户退出活动会话后再关闭。 |

  | `TRANSACTIONAL` | 等待事务完成，然后终止会话。 |

  | `TRANSACTIONAL LOCAL` | 仅对本地实例执行事务性关闭。 |

  | `IMMEDIATE` | 立即终止活动会话。未完成的事务将被回滚。 |

  | `ABORT` | 立即终止实例。事务将被终止但不会回滚。 |


  启动和停止数据库是一个相当简单的过程。如果环境设置正确，您应该能够连接到数据库并发出适当的 `STARTUP` 和 `SHUTDOWN` 语句。


  ## 提示


  如果您在启动或停止数据库时遇到任何问题，请查看告警日志以获取详细信息。告警日志通常包含与任何问题相关的重要消息。


  您很少需要使用 `SHUTDOWN ABORT` 语句。通常，`SHUTDOWN IMMEDIATE` 就足够了。话虽如此，使用 `SHUTDOWN ABORT`
  并没有错。如果 `SHUTDOWN IMMEDIATE` 因任何原因无法工作，那么就使用 `SHUTDOWN ABORT`。同时请记住，在 `SHUTDOWN
  ABORT` 命令之后启动时，数据库将需要恢复介质文件，并且可能需要相当长的时间来处理这些文件。


  在极少数情况下，`SHUTDOWN ABORT` 可能会失败。在这些情况下，您可以使用 `ps -ef | grep smon` 来定位 Oracle 系统监控进程，然后使用
  Linux/Unix 的 `kill` 命令来终止实例。当您杀死必需的 Oracle 后台进程时，这会导致实例中止。显然，您应该只在最后 resort 时才使用操作系统
  `kill` 命令。




  '
- '# 数据库 vs. 实例


  虽然数据库管理员（DBA）经常将 `database` 和 `instance` 这两个术语互换使用，但它们指的是架构中截然不同的组成部分。在 Oracle 中，`database`
  一词指的是构成数据库的物理文件：数据文件、在线重做日志文件和控制文件。而 `instance` 一词则指代后台进程和内存结构。


  例如，你可以先创建一个实例而无需存在数据库。在物理创建数据库之前，你必须使用 `STARTUP NOMOUNT` 语句启动实例。在此状态下，你拥有后台进程和内存结构，但没有任何关联的数据文件、在线重做日志或控制文件。数据库文件直到你发出
  `CREATE DATABASE` 语句后才会创建。


  另一个需要记住的重点是，一个实例只能关联一个数据库，而一个数据库可以关联许多不同的实例（如 Oracle Real Application Clusters [RAC]）。实例只能挂载并打开一个数据库一次。每次你停止并启动一个数据库时，都会有一个新的实例与之关联。先前创建的后台进程和内存结构永远不会与一个数据库关联。


  为了演示这个概念，使用 `ALTER DATABASE CLOSE` 语句关闭一个数据库：


  ```

  SQL> alter database close;

  ```


  如果你尝试重新打开数据库，会收到错误：


  ```

  SQL> alter database open;

  ERROR at line 1:

  ORA-16196: database has been previously opened and closed

  ```


  这是因为一个实例只能挂载并打开一个数据库。你必须停止并启动一个新实例，然后才能挂载并打开该数据库。


  ## 使用 dbca 创建数据库


  你也可以使用 `dbca` 实用程序来创建数据库。该实用程序有两种模式：图形模式和静默模式。要使用图形模式的 `dbca`，请确保已安装合适的 X 软件，然后发出
  `xhost +` 命令，并确认你的 `DISPLAY` 变量已设置；例如，


  ```

  $ xhost +

  $ echo $DISPLAY

  :0.0

  ```


  要以图形模式运行 `dbca`，请在操作系统命令行中输入 `dbca`：


  ```

  $ dbca

  ```


  图形模式非常直观，它会引导你完成创建数据库的所有方面。如果你是 Oracle 新手并希望有明确的选项提示，可能会更喜欢使用此模式。


  你也可以使用响应文件以静默模式运行 `dbca`。在某些情况下，使用图形模式的 `dbca` 并不可行。这可能是由于网络缓慢或缺少 X 软件造成的。要使用静默模式的
  `dbca` 创建数据库，请执行以下步骤：


  1.  找到 `dbca.rsp` 文件。

  2.  复制一份 `dbca.rsp` 文件。

  3.  修改这份 `dbca.rsp` 文件副本以适应你的环境。

  4.  以静默模式运行 `dbca` 实用程序。


  首先，导航到你复制 Oracle 数据库安装软件的位置，并使用 `find` 命令定位 `dbca.rsp`：


  ```

  $ find . -name dbca.rsp

  ./18.0.0.0/database/response/dbca.rsp

  ```


  复制文件，这样你就不会修改原始文件（这样，你始终会有一个完好的原始文件）：


  ```

  $ cp dbca.rsp mydb.rsp

  ```


  现在，编辑 `mydb.rsp` 文件。至少，你需要修改以下参数：`GDBNAME`、`SID`、`SYSPASSWORD`、`SYSTEMPASSWORD`、`SYSMANPASSWORD`、`DBSNMPPASSWORD`、`DATAFILEDESTINATION`、`STORAGETYPE`、`CHARACTERSET`
  和 `NATIONALCHARACTERSET`。以下是 `mydb.rsp` 文件中修改后的值示例：


  ```

  [CREATEDATABASE]

  GDBNAME = "O18DEV"

  SID = "O18DEV"

  TEMPLATENAME = "General_Purpose.dbc"

  SYSPASSWORD = "foo"

  SYSTEMPASSWORD = "foo"

  SYSMANPASSWORD = "foo"

  DBSNMPPASSWORD = "foo"

  DATAFILEDESTINATION ="/u01/dbfile"

  STORAGETYPE="FS"

  CHARACTERSET = "AL32UTF8"

  NATIONALCHARACTERSET= "UTF8"

  ```


  接下来，使用响应文件以静默模式运行 `dbca` 实用程序：


  ```

  $ dbca -silent -responseFile /home/oracle/orainst/mydb.rsp

  ```


  你应该会看到类似以下的输出：


  ```

  Copying database files

  1% complete

  ...

  Creating and starting Oracle instance

  ...

  62% complete

  Completing Database Creation

  ...

  100% complete

  Look at the log file ... for further details.

  ```


  如果你查看日志文件，请注意 `dbca` 实用程序使用 `rman` 实用程序来恢复数据库所需的数据文件。然后，它会创建实例并执行安装后步骤。在 Linux 服务器上，你还应该在
  `/etc/oratab` 文件中为你的新数据库有一个条目。


  许多 DBA 会启动 `dbca` 并在图形模式下配置数据库，但只有少数人利用响应文件提供的选项。通过有效利用响应文件，你可以持续自动化数据库创建过程。你可以修改响应文件以在
  ASM 上构建数据库，甚至创建 RAC 数据库。此外，你几乎可以控制响应文件的每个方面，类似于在图形模式下启动 `dbca`。


  **提示**

  你可以通过 help 参数查看 `dbca` 的所有选项：`dbca -help`


  ## 使用 dbca 生成创建数据库语句


  你可以使用 `dbca` 实用程序来生成 `CREATE DATABASE` 语句。你可以通过图形界面交互式地执行此操作，也可以通过静默模式执行。关键在于选择“自定义数据库模板”并同时指定“生成数据库创建脚本”选项。此示例使用静默模式生成一个包含
  `CREATE DATABASE` 语句的脚本：


  ```

  $ dbca -silent -generateScripts -customCreate -templateName New_Database.dbt \

  -gdbName DKDEV

  ```


  上面的代码指示 `dbca` 创建一个名为 `CreateDB.sql` 的脚本，并将其放置在 `ORACLE_BASE/admin/DKDEV/scripts`
  目录中。`CreateDB.sql` 文件中包含一个 `CREATE DATABASE` 语句。同时还会创建一个用于初始化实例的 `init.ora` 文件。


  在此示例中，创建数据库所需的脚本已为你生成。直到你手动运行这些脚本，才会实际创建数据库。


  此技术为你提供了一种生成 `CREATE DATABASE` 语句的自动化方法。如果你是 Oracle 新手，不确定如何构造 `CREATE DATABASE`
  语句，或者你使用的是数据库的新版本并希望由 Oracle 实用程序生成一个有效的 `CREATE DATABASE` 语句，这将特别有用。


  ## 删除数据库


  如果你有一个不再使用的数据库需要删除，可以使用 `DROP DATABASE` 语句来完成此操作。这样做会移除与该数据库关联的所有数据文件、控制文件和在线重做日志。


  不用说，在删除数据库时要极其谨慎。在删除数据库之前，请确保你在正确的服务器上，并且连接到正确的数据库。在 Linux/Unix 系统上，在操作系统提示符下发出以下
  OS 命令：


  ```

  $ uname -a

  ```


  接下来，连接到 SQL*Plus，并确保你连接到要删除的数据库：


  ```

  SQL> select name from v$database;

  ```


  验证你处于正确的数据库环境后，从具有 `SYSDBA` 权限的账户发出以下 SQL 命令：


  ```

  SQ> shutdown immediate;

  SQL> startup mount exclusive restrict;

  SQL> drop database;

  ```


  **注意**

  显然，在删除数据库时要非常小心。删除数据库时不会出现提示，并且在撰写本文时，没有 `UNDROP ACCIDENTALLY DROPPED DATABASE`（意外删除数据库后撤消删除）命令。删除数据库时要极其谨慎，因为此操作会移除数据文件、控制文件和在线重做日志文件。


  `DROP DATABASE` 命令在你需要移除一个数据库时非常有用。它可能是一个测试数据库或一个不再使用的旧数据库。`DROP DATABASE` 命令不会移除旧的归档重做日志文件。你必须使用操作系统命令（例如
  Linux/Unix 中的 `rm`，或 Windows 命令提示符下的 `del`）手动删除这些文件。你也可以指示 RMAN 删除归档重做日志文件。


  ## 一个服务器上有多少个数据库？




  有时，在创建新数据库时，会遇到这样一个问题：应该在一台服务器上放置多少个数据库？一种极端情况是每个数据库服务器只运行一个数据库。图 2-3 展示了这种架构，其中显示了两台不同的数据库服务器，每台服务器都有自己的`Oracle`二进制文件安装。这种设置对硬件供应商有利，但在许多环境中并非资源的经济利用方式。


  ![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig3_HTML.jpg](img/214899_3_En_2_Fig3_HTML.jpg)


  **图 2-3** 一个服务器对应一个数据库的架构


  如果您有足够的内存、中央处理器（CPU）和磁盘资源，那么应考虑在一台服务器上创建多个数据库。您可以为每个数据库创建一个新的`Oracle`二进制文件安装，也可以让多个数据库共享一套`Oracle`二进制文件。图
  2-4 展示了一台服务器上多个数据库共享一套`Oracle`二进制文件的配置。当然，如果您有使用不同版本`Oracle`二进制文件的需求，您就必须拥有多个`Oracle
  主目录`来容纳这些安装。


  ![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig4_HTML.jpg](img/214899_3_En_2_Fig4_HTML.jpg)


  **图 2-4** 一台服务器上的多个数据库共享一套`Oracle`二进制文件


  如果您没有足够的 CPU、内存或磁盘资源来在一台服务器上创建多个数据库，可以考虑使用一个数据库来托管多个应用程序和用户，如图 2-5 所示。在此类环境中，请注意不要使用公共同义词，因为应用程序之间可能会发生冲突。在这种环境中，通常会为不同的应用程序创建不同的方案和表空间。


  ![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig5_HTML.jpg](img/214899_3_En_2_Fig5_HTML.jpg)


  **图 2-5** 一个数据库被多个应用程序和用户使用


  使用`Oracle 数据库 18c`，您可以选择使用`可插拔数据库`功能。该技术允许您在一个`容器数据库`中容纳多个`可插拔数据库`。这些`可插拔数据库`共享实例、后台进程、`撤销`和`Oracle`二进制文件，但作为完全独立的数据库运行。每个`可插拔数据库`都有自己的一组表空间（包括`SYSTEM`表空间），这些表空间对于同一`容器数据库`内的任何其他`可插拔数据库`都不可见。这使您能够安全地实现一个与其他数据库共享资源的隔离数据库。图
  2-6 描绘了这种架构（有关如何实现`可插拔数据库`的详细信息，请参见第 23 章）。


  ![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig6_HTML.jpg](img/214899_3_En_2_Fig6_HTML.jpg)


  **图 2-6** 一个包含多个`可插拔数据库`的`容器数据库`


  在决定是否使用一个数据库托管多个应用程序和用户时，必须考虑几个架构方面：


  *   应用程序生成的重做量是否差异巨大，以至于可能需要不同大小的在线重做日志？

  *   应用程序使用的查询是否差异足够大，需要不同数量的撤销空间、排序空间和内存？

  *   应用程序类型是否需要不同的数据库块大小，例如联机事务处理（OLTP）数据库使用 8KB，而数据仓库使用 32KB？

  *   是否有任何安全性、可用性、复制或性能要求需要将某个应用程序隔离？

  *   应用程序是否需要`Oracle`企业版才有的功能？

  *   应用程序是否需要使用任何特殊的`Oracle`特性，例如`Data Guard`、分区、`Streams`或`RAC`？

  *   每个应用程序的备份和恢复要求是什么？一个应用程序需要联机备份而另一个不需要吗？一个应用程序需要磁带备份吗？

  *   任何应用程序是否依赖于特定的`Oracle`数据库版本？是否会有不同的数据库升级计划和要求？


  表 2-5 描述了关于如何使用`Oracle`数据库和应用程序的这些架构考虑因素的优缺点。这仅是查看数据库实例，而未使用包含`容器`和`可插拔数据库`的多租户技术。当我们利用`容器`时（这允许您整合到更少的服务器上），我们将重新审视这些缺点。这将在第
  22 章讨论。


  **表 2-5** `Oracle`数据库配置的优缺点


  | 配置 | 优点 | 缺点 |

  | :--- | :--- | :--- |

  | 每台服务器一个数据库 | 为使用数据库的应用程序提供专用资源；将应用程序彼此完全隔离； | 最昂贵；需要更多硬件 |

  | 每台服务器多个数据库和多个`Oracle 主目录` | 需要更少的服务器 | 多个数据库竞争磁盘、内存和 CPU 资源 |

  | 一台服务器上多个数据库和一套`Oracle`二进制文件安装 | 需要更少的服务器；不需要多个`Oracle`二进制文件安装 | 多个数据库竞争磁盘、内存和
  CPU 资源 |

  | 一个数据库和一个`Oracle 主目录`服务于多个应用程序 | 只需要一台服务器和一个数据库；成本低 | 多个数据库竞争磁盘、内存和 CPU 资源；多个应用程序依赖于一个数据库；存在单点故障
  |

  | 包含多个`可插拔数据库`的`容器数据库` | 成本最低；允许多个`可插拔数据库`安全地共享一个父`容器数据库`的基础设施 | 多个数据库竞争磁盘、内存和 CPU
  资源；多个应用程序依赖于一个数据库；存在单点故障 |


  ### 理解`Oracle`架构


  本章介绍了一些概念，例如数据库（数据文件、在线重做日志文件、控制文件）、实例（后台进程和内存结构）、参数文件、密码文件和监听器。现在是一个展示`Oracle`架构图的好时机，该图展示了构成数据库和实例的各种文件及进程。图
  2-7 中描绘的一些概念已经详细讲解过：例如，数据库与实例。图 2-7 的其他方面将在后续章节中介绍。然而，在此处包含一个如此类高层级的图表是合适的，以便直观地表示已讨论的概念，并为理解本书后续主题奠定基础。


  ![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig7_HTML.jpg](img/214899_3_En_2_Fig7_HTML.jpg)


  **图 2-7** `Oracle`数据库架构




