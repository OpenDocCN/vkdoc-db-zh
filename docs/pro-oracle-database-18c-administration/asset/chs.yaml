  \ |\n\n\n## 创建基本物化视图\n\n本节介绍如何创建物化视图（MV）。最常用的两种配置如下：\n\n*   创建按需刷新的完全刷新物化视图\n* \
  \  创建按需刷新的快速刷新物化视图\n\n理解这些基本配置非常重要。它们为你后续使用物化视图功能的所有操作奠定基础。因此，本节从这些基本配置开始讲解。稍后，本节将涵盖更高级的配置。\n\
  \n### 创建完全可刷新的物化视图\n\n本节解释如何设置一个定期进行完全刷新的物化视图，这可能是最简单的例子了。完全刷新适用于基表中的大部分行在每次刷新间隔内发生变化的物化视图。在某些情况下，由于\
