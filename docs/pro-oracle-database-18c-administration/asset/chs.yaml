  # 创建可快速刷新的物化视图\n\n当你创建一个可快速刷新的物化视图时，它首先使用物化视图查询的完整结果集填充物化视图表。初始结果集就位后，只需将自上次刷新以来基础表中修改的数据应用到物化视图。换句话说，自上次刷新以来对主表进行的任何更新、插入或删除都会被复制过来。当你有一段时间内对基础表的修改数量相对于表中的总行数较少时，此功能非常合适。\n\
  \n以下是实现快速刷新物化视图的步骤：\n\n1.  创建基础表（如果尚未创建）。\n2.  在基础表上创建物化视图日志。\n3.  创建一个可快速刷新的物化视图。\n\
  \n此示例使用先前创建的 `SALES` 表。一个可快速刷新的物化视图需要在基础表上创建物化视图日志。当发生快速刷新时，物化视图日志必须有一种唯一的方法来识别哪些记录已被修改，因此需要刷新。你可以用两种不同的方法来做到这一点。一种方法是在创建物化视图日志时指定\
  \ `PRIMARY KEY` 子句；另一种是使用 `ROWID` 子句。如果底层基础表有主键，则使用基于主键的物化视图日志。如果底层基础表没有主键，则必须使用\
  \ `ROWID` 创建物化视图日志。在大多数情况下，你可能会为每个基础表定义一个主键。然而，现实情况是，有些系统设计不佳，或者有某些罕见原因导致表没有主键。\n\
  \n在此示例中，基础表上定义了主键，因此你使用 `PRIMARY KEY` 子句创建物化视图日志：\n\n```sql\nSQL> create materialized\
  \ view log on sales with primary key;\n```\n\n如果基础表上没有定义主键，在尝试创建物化视图日志时会抛出此错误：\n\
  \n```\nORA-12014: table does not contain a primary key constraint\n```\n\n如果基础表没有主键，并且你没有添加主键的选项，则必须在创建物化视图日志时指定\
  \ `ROWID`：\n\n```sql\nSQL> create materialized view log on sales with rowid;\n```\n\
  \n当你使用基于主键的快速刷新物化视图时，基础表的主键列必须是快速刷新物化视图 `SELECT` 语句的一部分（参见本章后面的“基于复杂查询创建快速刷新物化视图”一节）。对于此示例，物化视图中不会有聚合列。这种类型的物化视图通常用于将数据从一个环境复制到另一个环境：物化视图中不会有聚合列。这种类型的物化视图通常用于将数据从一个环境复制到另一个环境：\n\
  \n```sql\nSQL> create materialized view sales_rep_mv\nsegment creation immediate\n\
  refresh\nwith primary key\nfast\non demand\nas\nselect\nsales_id\n,sales_amt\n,trunc(sales_dtt)\
  \ sales_dtt\nfrom sales;\n```\n\n此时，检查与物化视图关联的对象非常有用。以下查询从 `USER_OBJECTS` 中选择：\n\
  \n```sql\nSQL> select object_name, object_type\nfrom user_objects\nwhere object_name\
  \ like '%SALES%'\norder by object_name;\n```\n\n已创建的对象如下：\n\n```\nOBJECT_NAME  \
  \        OBJECT_TYPE\n-------------------- -----------------------\nMLOG$_SALES\
  \          TABLE\nRUPD$_SALES          TABLE\nSALES                TABLE\nSALES_PK\
  \             INDEX\nSALES_PK1            INDEX\nSALES_REP_MV         TABLE\nSALES_REP_MV\
  \         MATERIALIZED VIEW\n```\n\n前面输出中的一些对象需要一些解释：\n\n*   `MLOG$_SALES`\n*  \
  \ `RUPD$_SALES`\n*   `SALES_PK1`\n```\n\n\n## 架构组件\n\n首先，当创建一个物化视图日志时，也会创建一个对应的表，用于存储基础表中发生变化的行及其变化方式（插入、更新或删除）。物化视图日志表的名称遵循格式\
  \ `MLOG$_<base table name>`。\n\n同样会创建一个格式为 `RUPD$_<base table name>` 的表。当您使用主键创建可快速刷新的物化视图时，Oracle\
  \ 会自动创建这个 `RUPD$` 表。该表的存在是为了支持可更新物化视图功能。除非您正在处理可更新物化视图（有关可更新物化视图的更多详细信息，请参阅《Oracle\
  \ Advanced Replication Guide》），否则您无需担心此表。如果您没有使用可更新物化视图功能，则可以忽略 `RUPD$` 表。\n\n此外，Oracle\
  \ 会创建一个格式为 `<base table name>_PK1` 的索引。此索引会自动为主键物化视图创建，并基于基础表的主键列。如果这是基于 `ROWID`\
  \ 而不是主键，则索引名称格式为 `I_SNAP$_<table_name>` 并基于 `ROWID`。如果您没有显式地为基础表的主键索引命名，Oracle 将为物化视图表的主键索引分配一个系统生成的名称，例如\
  \ `SYS_C008780`。\n\n## 查看数据\n\n现在您了解了底层的架构组件，让我们看看物化视图中的数据：\n\n```sql\nSQL> select\
  \ sales_amt, to_char(sales_dtt,'dd-mon-yyyy')\nfrom sales_rep_mv\norder by 2;\n\
  ```\n\n输出如下：\n\n```\nSALES_AMT TO_CHAR(SALES_DTT,'D\n---------- --------------------\n\
  511 10-jan-2013\n101 20-jan-2013\n127 30-jan-2013\n99 30-jan-2013\n11 31-dec-2012\n\
  ```\n\n## 刷新物化视图\n\n让我们向基础 `SALES` 表添加两条记录：\n\n```sql\nSQL> insert into sales values(6,99,20,sysdate-6);\n\
  SQL> insert into sales values(7,127,30,sysdate-7);\nSQL> commit;\n```\n\n此时，检查 `MLOG$`\
  \ 表很有指导意义。您应该看到两条记录，它们标识了 `SALES` 表中数据是如何变化的：\n\n```sql\nSQL> select count(*) from\
  \ mlog$_sales;\n```\n\n有两条记录：\n\n```\nCOUNT(*)\n----------\n2\n```\n\n接下来，让我们刷新物化视图。此物化视图可快速刷新，因此您需要调用\
  \ `DBMS_MVIEW` 包的 `REFRESH` 过程并使用 `F`（代表快速）参数：\n\n```sql\nSQL> exec dbms_mview.refresh('SALES_REP_MV','F');\n\
  ```\n\n快速检查物化视图会显示两条新记录：\n\n```sql\nSQL> select sales_amt, to_char(sales_dtt,'dd-mon-yyyy')\n\
  from sales_rep_mv\norder by 2;\n```\n\n示例输出如下：\n\n```\nSALES_AMT TO_CHAR(SALES_DTT,'D\n\
  ---------- --------------------\n511 10-jan-2013\n101 20-jan-2013\n127 23-jan-2013\n\
  99 24-jan-2013\n127 30-jan-2013\n99 30-jan-2013\n11 31-dec-2012\n```\n\n此外，`MLOG$`\
  \ 的计数已降为零。物化视图刷新完成后，就不再需要这些记录了：\n\n```sql\nSQL> select count(*) from mlog$_sales;\n\
  ```\n\n输出如下：\n\n```\nCOUNT(*)\n----------\n0\n```\n\n## 验证刷新方法\n\n您可以通过查询 `USER_MVIEWS`\
  \ 视图来验证物化视图最近一次的刷新方法：\n\n```sql\nSQL> select mview_name, last_refresh_type, last_refresh_date\n\
  from user_mviews\norder by 1,3;\n```\n\n示例输出如下：\n\n```\nMVIEW_NAME             \
  \   LAST_REF LAST_REFR\n------------------------- -------- ---------\nSALES_REP_MV\
  \              FAST     30-JAN-13\n```\n\n## 架构流程\n\n图 15-2 展示了物化视图新的架构组件；再次强调，理解这些组件很重要，请在此处暂停几分钟。\n\
  \n![../images/214899_3_En_15_Chapter/214899_3_En_15_Fig2_HTML.jpg](img/214899_3_En_15_Fig2_HTML.jpg)\n\
  \n**图 15-2** 可快速刷新物化视图的架构组件\n\n图中的数字描述了可快速刷新物化视图的数据流：\n\n1.  用户创建事务。\n2.  数据在基础表中提交。\n\
  3.  基础表上的内部触发器填充物化视图日志表。\n4.  通过 `DBMS_MVIEW` 包发起快速刷新。\n5.  自上次刷新以来产生的 DML 更改被应用到物化视图。物化视图不再需要的行从物化视图日志中删除。\n\
  6.  用户可以从物化视图查询数据，其中包含基础表数据的时间点快照。\n\n当您很好地理解了快速刷新的架构后，学习高级物化视图概念就不会有困难。如果这是您第一次接触物化视图，重要的是要认识到物化视图的数据存储在一个常规的数据库表中。这将帮助您从架构上理解什么是可能的，什么是不可能的。在很大程度上，由于物化视图和物化视图日志是基于表的，大多数适用于常规数据库表的特性也可以应用于物化视图表和物化视图日志表。例如，以下\
  \ Oracle 特性可轻松应用于物化视图：\n\n*   存储和表空间放置\n*   索引\n*   分区\n*   压缩\n*   加密\n*   日志记录\n\
  *   并行性\n\n下一节将展示如何创建具有各种特性的物化视图的示例。\n\n## 超越基础\n\n有许多物化视图特性可用。许多特性与您可以应用于任何表的属性相关，例如存储、索引、压缩和加密。其他特性与创建的物化视图类型及其刷新方式相关。接下来的几个部分将描述这些特性。\n\
  \n## 创建物化视图并为物化视图和索引指定表空间\n\n每个物化视图都有一个与之关联的基础表。此外，根据物化视图的类型，可能会自动创建一个索引。在创建物化视图时，您可以为基础表和索引指定表空间和存储特性。下一个示例展示了如何为物化视图表和索引指定要使用的表空间：\n\
  \n```sql\nSQL> create materialized view sales_mv\ntablespace users\nusing index\
  \ tablespace users\nrefresh with primary key\nfast on demand\nas\nselect sales_id\
  \ ,sales_amt, sales_dtt\nfrom sales;\n```\n\n## 在物化视图上创建索引\n\n物化视图将其数据存储在常规数据库表中。因此，您可以在基础表上创建索引（就像对任何其他表一样）。通常，遵循与在常规表上创建索引相同的准则（有关创建索引的更多详细信息，请参见第\
  \ 8 章）。请记住，虽然索引可以显著提高查询性能，但维护索引（针对任何插入、更新和删除操作）会带来开销。索引也会消耗磁盘空间。\n\n下面是一个在物化视图的列上创建索引的示例。语法与在常规表上创建索引相同：\n\
  \n```sql\nSQL> create index sales_mv_idx1 on sales_mv(sales_dtt) tablespace users;\n\
  ```\n\n您可以通过查询 `USER_INDEXES` 视图来显示为物化视图创建的索引：\n\n```sql\nSQL> select a.table_name,\
  \ a.index_name\nfrom user_indexes a\n,user_mviews  b\nwhere a.table_name = b.mview_name;\n\
  ```\n\n**注意**\n\n如果您使用 `WITH PRIMARY KEY` 子句创建一个简单的物化视图，该视图从一个具有主键的基础表中选择，Oracle\
  \ 会自动在物化视图中相应的主键列上创建一个索引。如果您使用 `WITH ROWID` 子句创建一个简单的物化视图，该视图从一个具有主键的基础表中选择，Oracle\
  \ 会自动在名为 `M_ROW$$` 的隐藏列上创建一个名为 `I_SNAP$_<table_name>` 的索引。\n\n## 分区物化视图\n\n您可以像对数据库中的任何其他表一样对物化视图表进行分区。如果您处理大型物化视图，可能需要考虑分区以便更好地管理和维护大型表。在创建物化视图时使用\
  \ `PARTITION` 子句。此示例构建了一个按 `SALES_ID` 进行哈希分区的物化视图：\n\n```sql\nSQL> create materialized\
  \ view sales_mv\npartition by hash (sales_id)\npartitions 4\nrefresh on demand complete\
  \ with rowid\nas\nselect sales_id, sales_amt, region_id, sales_dtt\nfrom sales;\n\
  ```\n\n## 查询结果分区存储\n\n查询的结果集存储在一个分区表中。您可以像查看数据库中任何其他分区表一样，在 `USER_TAB_PARTITIONS`\
  \ 和 `USER_PART_TABLES` 中查看此表的分区详细信息。有关分区策略和维护的更多详细信息，请参见第 12 章。\n\n## 压缩物化视图\n\n\
  如前所述，当您创建物化视图时，会创建一个底层表来存储数据。因为此表是一个常规数据库表，所以您可以实现诸如压缩之类的功能；例如，\n\n```\nSQL> create\
  \ materialized view sales_mv\ncompress\nas\nselect sales_id, sales_amt\nfrom sales;\n\
  ```\n\n您可以使用以下查询确认压缩详细信息：\n\n```\nSQL> select table_name, compression, compress_for\n\
  from user_tables\nwhere table_name='SALES_MV';\n```\n\n输出如下：\n\n```\nTABLE_NAME\
  \                     COMPRESS  COMPRESS_FOR\n------------------------------ --------\
  \  ------------\nSALES_MV                       ENABLED   BASIC\n```\n\n> **注意**\n\
  > 基本表压缩不需要 Oracle 的额外许可，而 `ROW STORE COMPRESS ADVANCED` 压缩（12c 之前；通过 `COMPRESS FOR\
  \ OLTP` 启用）则需要高级压缩选项，这确实需要 Oracle 的额外许可。有关详细信息，请参阅 Oracle 数据库许可信息，可从 Oracle 网站（[`http://otn.oracle.com`](http://otn.oracle.com)）的技术网络区域获取。\n\
  \n## 加密物化视图列\n\n如前所述，当您创建物化视图时，会创建一个底层表来存储数据。因为此表是一个常规数据库表，所以您可以实现诸如列加密之类的功能；例如，\n\
  \n```\nSQL> create materialized view sales_mv\n(sales_id   encrypt no salt\n,sales_amt\
  \  encrypt)\nas\nselect\nsales_id\n,sales_amt\nfrom sales;\n```\n\n要使前一条语句生效，您必须为数据库创建并打开一个安全钱包。此功能需要\
  \ Oracle 的高级安全选项。由于物化视图存储在表空间中，也可以在表空间级别进行加密，而不仅仅是在列级别。\n\n您可以通过描述物化视图来验证加密是否到位：\n\
  \n```\nSQL> desc sales_mv\nName                        Null?    Type\n-----------------------------------\
  \ ----------------------------\nSALES_ID                   NOT NULL NUMBER ENCRYPT\n\
  SALES_AMT                           NUMBER ENCRYPT\n```\n\n## 启用 Oracle 钱包\n\nOracle\
  \ 钱包是 Oracle 用于实现加密的机制。钱包是一个包含加密密钥的操作系统文件。钱包通过以下步骤启用：\n\n1.  修改 `SQLNET.ORA` 文件以包含钱包的位置：\n\
  \n```\n    ENCRYPTION_WALLET_LOCATION=\n    (SOURCE=(METHOD=FILE) (METHOD_DATA=\n\
  \    (DIRECTORY=/ora01/app/oracle/product/18.1.0.1/db_1/network/admin)))\n```\n\n\
  2.  使用 `ALTER SYSTEM` 命令创建钱包文件（`ewallet.p18`）：\n\n```\n    SQL> alter system set\
  \ encryption key identified by foo;\n```\n\n3.  启用加密：\n\n```\n    SQL> alter system\
  \ set encryption wallet open identified by foo;\n```\n\n有关实现加密的完整详细信息，请参阅 Oracle\
  \ 高级安全管理员指南，该指南可从 Oracle 网站（[`http://otn.oracle.com`](http://otn.oracle.com)）的技术网络区域免费下载。\n\
  \n## 在预建表上构建物化视图\n\n在数据仓库环境中，有时您需要创建一个表，用大量数据填充它，然后将其转换为物化视图。或者，您可能正在复制一个大表，并发现最初使用\
  \ Data Pump 通过预建表填充远程物化视图更有效。以下是在预建表上构建物化视图的步骤：\n\n1.  创建一个表。\n2.  用数据填充它。\n3. \
  \ 在步骤 1 中创建的表上创建物化视图。\n\n这里有一个简单的例子来说明这个过程。首先，创建一个表：\n\n```\nSQL> create table sales_mv\n\
  (sales_id    number\n,sales_amt number);\n```\n\n现在，用数据填充该表。例如，在数据仓库环境中，可以使用 Data\
  \ Pump、SQL*Loader 或外部表加载表。\n\n最后，运行 `CREATE MATERIALIZED VIEW...ON PREBUILT TABLE`\
  \ 语句将表变为物化视图。物化视图名称和表名称必须相同。此外，查询中的每个列必须对应表中的一个列；例如，\n\n```\nSQL> create materialized\
  \ view sales_mv\non prebuilt table\nusing index tablespace users\nas\nselect sales_id,\
  \ sales_amt\nfrom sales;\n```\n\n现在，`SALES_MV` 对象是一个物化视图。如果您尝试删除 `SALES_MV` 表，将抛出以下错误，表明\
  \ `SALES_MV` 现在是一个物化视图：\n\n```\nSQL> drop table sales_mv;\nORA-12083: must use DROP\
  \ MATERIALIZED VIEW to drop \"MV_MAINT\".\"SALES_MV\"\n```\n\n预建表功能在数据仓库环境中非常有用，这些环境中通常有很长一段时间基础表没有被主动更新。这使您有时间加载预建表并确保其内容与基础表完全相同。在预建表上创建物化视图后，您可以快速刷新该物化视图，使其与基础表保持同步。\n\
  如果您的基础表（在物化视图的 `SELECT` 子句中指定）正在持续更新，那么在预建表上创建物化视图可能不是一个可行的选择。这是因为无法确保预建表与基础表保持同步。\n\
  \n> **注意**\n> 对于在预建表上创建的物化视图，如果您随后发出 `DROP MATERIALIZED VIEW` 语句，底层表不会被删除。当您需要修改基础表（例如添加列）时，这有一些有趣的影响。有关详细信息，请参阅本章后面的“修改基础表\
  \ DDL 并传播到物化视图”部分。\n\n## 创建未填充的物化视图\n\n创建物化视图时，您可以选择指示 Oracle 是否最初用数据填充该物化视图。例如，如果最初构建物化视图需要几个小时，您可能希望首先定义物化视图，然后将其作为单独的作业进行填充。\n\
  \n此示例使用 `BUILD DEFERRED` 子句指示 Oracle 不要最初用查询结果填充物化视图：\n\n```\nSQL> create materialized\
  \ view sales_mv\ntablespace users\nbuild deferred\nrefresh complete on demand\n\
  as\nselect sales_id, sales_amt\nfrom sales;\n```\n\n此时，查询物化视图将返回零行。在稍后的某个时间点，您可以启动完全刷新以用数据填充物化视图。\n\
  \n## 创建在提交时刷新的物化视图\n\n当主表中的数据被修改时，您可能需要立即将它们复制到物化视图。在这种情况下，在创建物化视图时使用 `ON COMMIT`\
  \ 子句。主表上必须创建物化视图日志，此技术才能工作：\n\n```\nSQL> create materialized view log on sales with\
  \ primary key;\n```\n\n接下来，创建一个在提交时刷新的物化视图：\n\n```\nSQL> create materialized view\
  \ sales_mv\nrefresh\non commit\nas\nselect sales_id, sales_amt from sales;\n```\n\
  \n当在主表中插入并提交数据时，任何更改也会在由物化视图查询选择的物化视图中可用。\n\n`ON COMMIT` 可刷新物化视图有一些限制您需要注意：\n\n\
  *   主表和物化视图必须在同一数据库中。\n*   您不能在基础表上执行分布式事务。\n*   此方法不适用于包含对象类型或 Oracle 提供类型的物化视图。\n\
  \n同时还要考虑在两个地方同时提交数据的相关开销；这会影响高事务 OLTP 系统的性能。此外，如果在更新物化视图时出现任何问题，则基础表无法提交事务。例如，如果创建物化视图的表空间已满（并且无法再分配另一个区），当您尝试插入基础表时会看到如下错误：\n\
  \n\n"
- '# 物化视图高级主题


  ## 错误处理与注意事项


  ```

  ORA-12008: error in materialized view refresh path

  ORA-01653: unable to extend table MV_MAINT.SALES_MV by 16 in tablespace...

  ```


  基于这些原因，只有当您确信它不会影响性能或可用性时，才应使用此功能。


  ## 注意

  您不能同时为物化视图指定 `ON COMMIT` 和 `ON DEMAND` 刷新。此外，`ON COMMIT` 与 `CREATE MATERIALIZED
  VIEW` 语句中的 `START WITH` 和 `NEXT` 子句不兼容。


  ## 创建永不刷新的物化视图


  您可能永远不希望某个物化视图被刷新。例如，您可能希望为了审计目的，保证拥有某个时间点上的表快照。在创建物化视图时指定 `NEVER REFRESH` 子句即可实现：


  ```

  SQL> create materialized view sales_mv

  never refresh

  as

  select sales_id, sales_amt

  from sales;

  ```


  如果您尝试刷新一个设置为永不刷新的物化视图，将会收到此错误：


  ```

  ORA-23538: cannot explicitly refresh a NEVER REFRESH materialized view

  ```


  您可以将永不刷新的视图更改为可刷新。使用 `ALTER MATERIALIZED VIEW` 语句来完成：


  ```

  SQL> alter materialized view sales_mv refresh on demand complete;

  ```


  ### 验证刷新模式与方法

  您可以使用以下查询来验证刷新模式与方法：


  ```

  SQL> select mview_name, refresh_mode, refresh_method from user_mviews;

  ```


  ## 为查询重写创建物化视图


  查询重写允许优化器识别出可以使用物化视图来满足查询需求，而无需使用底层的主表（基础表）。如果您所处的环境中用户经常编写自己的查询，并且不了解可用的物化视图，此功能可以极大地提升性能。


  ### 启用查询重写的先决条件

  启用查询重写有三个先决条件：


  - Oracle 企业版

  - 将数据库初始化参数 `QUERY_REWRITE_ENABLED` 设置为 `TRUE`

  - 物化视图在创建或修改时使用了 `ENABLE QUERY REWRITE` 子句


  此示例创建了一个启用查询重写的物化视图：


  ```

  SQL> create materialized view sales_daily_mv

  segment creation immediate

  refresh

  complete

  on demand

  enable query rewrite

  as

  select

  sum(sales_amt) sales_amt

  ,trunc(sales_dtt) sales_dtt

  from sales

  group by trunc(sales_dtt);

  ```


  ### 验证查询重写

  您可以通过 autotrace 工具检查查询的执行计划来验证查询重写是否生效：


  ```

  SQL> set autotrace trace explain

  ```


  现在，假设一个用户运行了以下查询，并不知道已经存在一个物化视图聚合了所需数据：


  ```

  SQL> select

  sum(sales_amt) sales_amt

  ,trunc(sales_dtt) sales_dtt

  from sales

  group by trunc(sales_dtt);

  ```


  以下是 autotrace 输出的部分内容，验证了查询重写正在使用中：


  ```

  | Id  | Operation                    | Name           | Cost (%CPU)| Time    |

  |   0 | SELECT STATEMENT             |                |     3   (0)| 00:00:01 |

  |   1 |  MAT_VIEW REWRITE ACCESS FULL| SALES_DAILY_MV |     3   (0)| 00:00:01 |

  ```


  从前面的输出可以看出，尽管用户直接从 `SALES` 表中选择，但优化器判定通过访问物化视图可以更高效地满足查询结果。


  ### 检查物化视图的查询重写状态

  您可以通过查询 `USER_MVIEWS` 中的 `REWRITE_ENABLED` 列来判断物化视图是否启用了查询重写：


  ```

  SQL> select mview_name, rewrite_enabled, rewrite_capability

  from user_mviews

  where mview_name = ''SALES_DAILY_MV'';

  ```


  ### 诊断问题

  如果出于任何原因，某个查询没有使用查询重写功能，而您认为它应该使用，请使用 `DBMS_MVIEW` 包的 `EXPLAIN_REWRITE` 过程来诊断问题。


  ## 创建基于复杂查询的快速刷新物化视图


  在许多情况下，当您基于连接多个表的查询创建物化视图时，它会被视为复杂物化视图，因此只能进行完全刷新。然而，在某些场景下，当物化视图查询中引用了两个连接在一起的表时，您可以创建快速刷新的物化视图。


  本节介绍如何使用 `DBMS_MVIEW` 包的 `EXPLAIN_MVIEW` 过程来确定是否可以对复杂查询进行快速刷新。


  ### 准备基础表与物化视图日志

  为了帮助您完全理解此示例，本节展示了用于创建基础表的 SQL。假设有两个基础表，定义如下：


  ```

  SQL> create table region(

  region_id number

  ,reg_desc varchar2(30)

  ,constraint region_pk primary key(region_id));

  --

  SQL> create table sales(

  sales_id  number

  ,sales_amt number

  ,region_id number

  ,sales_dtt date

  ,constraint sales_pk primary key(sales_id)

  ,constraint sales_fk1 foreign key (region_id) references region(region_id));

  ```


  此外，已为 `REGION` 和 `SALES` 创建了物化视图日志，如下所示：


  ```

  SQL> create materialized view log on region with primary key;

  SQL> create materialized view log on sales with primary key;

  ```


  同时，为此示例，基础表中插入了以下数据：


  ```

  SQL> insert into region values(10,''East'');

  SQL> insert into region values(20,''West'');

  SQL> insert into region values(30,''South'');

  SQL> insert into region values(40,''North'');

  --

  SQL> insert into sales values(1,100,10,sysdate);

  SQL> insert into sales values(2,200,20,sysdate-20);

  SQL> insert into sales values(3,300,30,sysdate-30);

  ```


  ### 创建并测试物化视图

  假设您想创建一个连接 `REGION` 和 `SALES` 基础表的物化视图，如下所示：


  ```

  SQL> create materialized view sales_mv

  as

  select

  a.sales_id

  ,b.reg_desc

  from sales  a

  ,region b

  where a.region_id = b.region_id;

  ```


  接下来，让我们尝试快速刷新该物化视图：


  ```

  SQL> exec dbms_mview.refresh(''SALES_MV'',''F'');

  ```


  此时会抛出此错误：


  ```

  ORA-12032: cannot use rowid column from materialized view log...

  ```


  该错误表明物化视图存在问题，无法进行快速刷新。


  ### 使用 EXPLAIN_MVIEW 诊断问题

  要确定此物化视图是否可以变得可快速刷新，请使用 `DBMS_MVIEW` 包的 `EXPLAIN_MVIEW` 过程的输出。此过程要求您首先创建一个 `MV_CAPABILITIES_TABLE`。Oracle
  提供了一个脚本来完成此操作。请以物化视图所有者的身份运行此脚本：


  ```

  SQL> @?/rdbms/admin/utlxmv.sql

  ```


  创建表后，运行 `EXPLAIN_MVIEW` 过程来填充它：


  ```

  SQL> exec dbms_mview.explain_mview(mv=>''SALES_MV'',stmt_id=>''100'');

  ```


  现在，查询 `MV_CAPABILITIES_TABLE` 以查看此物化视图可能存在哪些潜在问题：


  ```

  SQL> select capability_name, possible, msgtxt, related_text

  from mv_capabilities_table

  where capability_name like ''REFRESH_FAST_AFTER%''

  and statement_id = ''100''

  order by 1;

  ```


  接下来是输出的部分列表。`P`（代表可能）列对于每个快速刷新的可能性都包含一个 `N`（代表否）：


  ```

  CAPABILITY_NAME            P  MSGTXT                        RELATED_TEXT

  -------------------------  -  ----------------------------  ---------------

  REFRESH_FAST_AFTER_INSERT  N  the SELECT list does not have  B

  the rowids of all the detail tables

  REFRESH_FAST_AFTER_INSERT  N  mv log must have ROWID        MV_MAINT.REGION

  REFRESH_FAST_AFTER_INSERT  N  mv log must have ROWID        MV_MAINT.SALES

  ```


  `MSGTXT` 指出了问题：物化视图日志需要基于 `ROWID`，并且表的 `ROWID` 必须出现在 `SELECT` 子句中。


  ### 重新创建物化视图与日志

  因此，首先删除并使用 `ROWID`（而不是主键）重新创建物化视图日志：


  ```

  SQL> drop materialized view log on region;

  SQL> drop materialized view log on sales;

  --

  SQL> create materialized view log on region with rowid;

  SQL> create materialized view log on sales with rowid;

  --

  SQL> drop materialized view sales_mv;

  --

  SQL> create materialized view sales_mv

  as

  select

  a.rowid sales_rowid

  ,b.rowid region_rowid

  ,a.sales_id

  ,b.reg_desc

  from sales  a

  ,region b

  where a.region_id = b.region_id;

  ```


  接下来，重置 `MV_CAPABILITIES_TABLE`，并通过 `EXPLAIN_MVIEW` 过程重新填充它：


  ```

  SQL> delete from mv_capabilities_table where statement_id=100;

  SQL> exec dbms_mview.explain_mview(mv=>''SALES_MV'',stmt_id=>''100'');

  ```


  输出显示，现在可以快速刷新该物化视图了。




  '
- '# 物化视图的维护操作


  ## 检查刷新能力

  以下表格展示了刷新能力的相关信息：

  ```

  CAPABILITY_NAME                P MSGTXT                     RELATED_TEXT

  ------------------------------ - -------------------------- ------------

  REFRESH_FAST_AFTER_ANY_DML     Y

  REFRESH_FAST_AFTER_INSERT      Y

  REFRESH_FAST_AFTER_ONETAB_DML  Y

  ```


  执行以下语句来检查快速刷新是否有效：

  ```

  SQL> exec dbms_mview.refresh(''SALES_MV'',''F'');

  PL/SQL procedure successfully completed.

  ```


  `EXPLAIN_MVIEW`过程是一个强大的工具，用于确定刷新能力是否可行。如果不可行，它可以解释原因以及如何潜在地解决问题。


  ## 查看物化视图定义

  要快速查看物化视图所基于的 SQL 查询，可以从`DBA/ALL/USER_MVIEWS`的`QUERY`列中进行选择。如果使用 SQL*Plus，首先需要将`LONG`变量设置为足够大的值以显示`LONG`列的完整内容：

  ```

  SQL> set long 5000

  SQL> select query from dba_mviews where mview_name=UPPER(''&&mview_name'');

  ```


  要查看重新创建物化视图所需的完整 DDL，可以使用`DBMS_METADATA`包（如果使用 SQL*Plus，同样需要将`LONG`变量设置为较大的值）：

  ```

  SQL> select dbms_metadata.get_ddl(''MATERIALIZED_VIEW'',''SALES_MV'') from dual;

  ```


  以下是此示例的部分输出：

  ```

  DBMS_METADATA.GET_DDL(''MATERIALIZED_VIEW'',''SALES_MV'')


  CREATE MATERIALIZED VIEW "MV_MAINT"."SALES_MV" ("SALES_ROWID", "REGION_ROWID",

  "SALES_ID", "REG_DESC")

  ORGANIZATION HEAP PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255

  ```


  此输出显示了 Oracle 认为重新创建物化视图所需的 DDL。这通常是生成与物化视图关联的最可靠方法。


  ## 删除物化视图

  有时可能需要删除一个物化视图。也许某个视图不再使用，或者可能需要删除并重新创建物化视图以更改其所基于的基础查询（例如添加列）。使用`DROP MATERIALIZED
  VIEW`命令来删除物化视图；例如：

  ```

  SQL> drop materialized view sales_mv;

  ```


  删除物化视图时，物化视图对象、表对象以及任何相应的索引也会被删除。删除物化视图不会影响任何物化视图日志——物化视图日志仅依赖于主表。


  也可以指定保留底层表。如果在排除故障时需要删除物化视图定义但保留物化视图表和数据，可能需要这样做；例如：

  ```

  SQL> drop materialized view sales_mv preserve table;

  ```


  在此场景中，后续也可以通过使用`ON PREBUILT TABLE`子句构建物化视图，将底层表用作物化视图的基础。


  如果物化视图最初是使用`ON PREBUILT TABLE`子句创建的，那么当删除物化视图时，底层表不会被删除。如果希望同时删除底层表，则必须使用`DROP TABLE`语句：

  ```

  SQL> drop materialized view sales_mv;

  SQL> drop table sales_mv;

  ```


  ## 修改物化视图

  以下部分描述了与物化视图相关的一些常见维护任务。涵盖的主题包括如何修改物化视图以反映在物化视图初始创建后某个时间点应用于基表的列更改，以及修改诸如日志记录和并行度等属性。


  ### 修改基表 DDL 并传播到物化视图

  一个常见的任务涉及向基表添加列或从基表删除列（因为业务需求已变更）。在向基表添加列或从中删除列后，希望这些 DDL 更改能反映在所有依赖的物化视图中。有几种选项可以将基表列更改传播到依赖的物化视图：


  *   使用新的列定义删除并重新创建物化视图。

  *   删除物化视图但保留底层表，修改物化视图表，然后使用`ON PREBUILT TABLE`子句重新创建物化视图（包含新的列更改）。

  *   如果物化视图最初是使用`ON PREBUILT TABLE`子句创建的，则删除物化视图对象，修改物化视图表，然后使用`ON PREBUILT TABLE`子句重新创建物化视图（包含新的列更改）。


  采用上述任何选项，都需要删除并重新创建物化视图，以使其包含基表中的新列更改。接下来将描述这些方法。


  ### 重新创建物化视图以反映基表修改

  使用之前创建的`SALES`表，假设已创建了一个物化视图日志和一个物化视图，如下所示：

  ```

  SQL> create materialized view log on sales with primary key;

  --

  SQL> create materialized view sales_mv

  refresh with primary key

  fast on demand as

  select sales_id ,sales_amt, sales_dtt

  from sales;

  ```


  之后，向基表添加了一个列：

  ```

  SQL> alter table sales add(sales_loc varchar2(30));

  ```


  希望基表的修改能反映在物化视图中。如何完成这个任务？我们知道物化视图包含一个存储结果的底层表。决定直接修改底层物化视图表：

  ```

  SQL> alter table sales_mv add(sales_loc varchar2(30));

  ```


  修改成功。接下来刷新物化视图，但发现新增的列并未被刷新。要理解原因，回想一下物化视图是一个将其结果存储在底层表中的 SQL 查询。因此，要修改物化视图，必须更改其所基于的
  SQL 查询。因为没有`ALTER MATERIALIZED VIEW ADD/DROP/MODIFY <column>`语句，所以必须执行以下操作来在物化视图中添加/删除列：


  1.  修改基表。

  2.  删除并重新创建物化视图以反映基表的更改。

  ```

  SQL> drop materialized view sales_mv;

  --

  SQL> create materialized view sales_mv

  refresh with primary key

  complete on demand as

  select sales_id, sales_amt, sales_dtt, sales_loc

  from sales;

  ```


  如果涉及大量数据，此方法可能需要很长时间。在物化视图重建期间，任何访问该物化视图的应用程序都将面临停机时间。如果工作在数据仓库环境中，由于完全刷新物化视图所需的时间很长，可能需要考虑不删除底层表。下一节将讨论此选项。


  ### 修改物化视图但保留底层表

  删除物化视图时，可以选择保留底层表及其数据。在数据仓库环境中处理大型物化视图时，这种方法可能是有利的。步骤如下：


  1.  修改基表。

  2.  删除物化视图，但保留底层表。

  3.  修改底层表。

  4.  使用`ON PREBUILT TABLE`子句重新创建物化视图。


  以下是一个简单的示例来说明此过程：

  ```

  SQL> alter table sales add(sales_loc varchar2(30));

  ```


  删除物化视图，但指定要保留底层表：

  ```

  SQL> drop materialized view sales_mv preserve table;

  ```


  现在，修改底层表：

  ```

  SQL> alter table sales_mv add(sales_loc varchar2(30));

  ```


  接下来，使用`ON PREBUILT TABLE`子句创建物化视图：

  ```

  SQL> create materialized view sales_mv

  on prebuilt table

  refresh with primary key

  complete on demand as

  select sales_id, sales_amt, sales_dtt, sales_loc

  from sales;

  ```


  这样就可以在不删除并完全刷新数据的情况下重新定义物化视图。需要注意的是，如果在物化视图重建操作期间有任何针对基表的 DML 活动，那么当尝试刷新物化视图时，这些事务不会反映在物化视图中。在数据仓库环境中，通常有一个已知的基表加载计划，因此应该能够在维护窗口内执行物化视图的修改，此时基表中没有事务发生。


  ### 在预建表上修改物化视图



  '
- '# 修改和管理物化视图


  ## 使用 `ON PREBUILT TABLE` 子句修改物化视图


  如果您最初使用 `ON PREBUILT TABLE` 子句创建了物化视图（MV），那么在保留基表时，可以执行与上一节类似的操作。以下是修改使用 `ON PREBUILT
  TABLE` 子句创建的物化视图的步骤：


  1.  更改基表。

  2.  删除物化视图。对于建立在预建表上的物化视图，此操作不会删除底层表。

  3.  更改预建表。

  4.  在预建表上重新创建物化视图。


  下面是一个简单的示例来说明此过程。首先，更改基表：

  ```sql

  SQL> alter table sales add(sales_loc varchar2(30));

  ```


  然后，删除物化视图：

  ```sql

  SQL> drop materialized view sales_mv;

  ```


  对于在预建表上创建的物化视图，此操作不会删除底层表——只会删除物化视图对象。接下来，向预建表添加列：

  ```sql

  SQL> alter table sales_mv add(sales_loc varchar2(30));

  ```


  现在，您可以重新构建物化视图，使用添加了新列的预建表：

  ```sql

  SQL> create materialized view sales_mv

  on prebuilt table

  refresh with primary key

  complete on demand as

  select sales_id, sales_amt, sales_dtt, sales_loc

  from sales;

  ```


  此过程的优点是允许您修改物化视图定义而无需删除底层表。您需要删除物化视图、更改底层表，然后使用新定义重新创建物化视图。如果底层表包含大量数据，此方法可以避免不必要的停机时间。


  正如上一节提到的，您需要注意，如果在重新构建物化视图操作期间有任何针对基表的 DML 活动，当您尝试刷新物化视图时，这些事务不会反映在物化视图中。


  ## 切换物化视图的重做日志记录


  回想一下，物化视图有一个底层数据库表。当您刷新物化视图时，这会启动底层表中的事务，从而生成重做（就像常规数据库表一样）。如果发生数据库故障，您可以恢复与物化视图关联的所有事务。


  默认情况下，创建物化视图时启用重做日志记录。您可以指定在刷新物化视图时不记录重做。要启用 `nologging`，请使用 `NOLOGGING` 选项创建物化视图：

  ```sql

  SQL> create materialized view sales_mv

  nologging

  refresh with primary key

  fast on demand as

  select sales_id ,sales_amt, sales_dtt

  from sales;

  ```


  您也可以将现有物化视图更改为 `nologging` 模式：

  ```sql

  SQL> alter materialized view sales_mv nologging;

  ```


  如果要重新启用记录，请执行以下操作：

  ```sql

  SQL> alter materialized view sales_mv logging;

  ```


  要验证物化视图是否已切换到 `NOLOGGING`，可以查询 `USER_TABLES` 视图：

  ```sql

  SQL> select a.table_name, a.logging

  from user_tables a

  ,user_mviews b

  where a.table_name = b.mview_name;

  ```


  启用 `nologging` 的优点是刷新操作执行得更快。刷新机制使用直接路径插入，当与 `NOLOGGING` 结合使用时，可以消除大部分重做生成。最大的缺点是，如果在物化视图刷新后不久发生介质故障，您将无法恢复物化视图中的数据。在这种情况下，首次尝试访问物化视图时，您会收到类似以下的错误：

  ```sql

  ORA-01578: ORACLE data block corrupted (file # 5, block # 899)

  ORA-01110: data file 5: ''/u01/dbfile/o12c/users02.dbf''

  ORA-26040: Data block was loaded using the NOLOGGING option

  ```


  如果收到上述错误，那么您很可能必须重新构建物化视图才能再次访问数据。在许多环境中，这可能是可以接受的。您通过不为物化视图生成重做来节省数据库资源，但缺点是发生故障时恢复过程更长，需要您重新构建物化视图。


  > **注意**

  > 如果您的数据库处于 `force logging` 模式，则 `NOLOGGING` 子句无效。`force logging` 模式在使用 Data Guard
  的环境中是必需的。


  ## 调整并行度


  有时，创建物化视图时设置了较高的并行度以提高创建过程的性能：

  ```sql

  SQL> create materialized view sales_mv

  parallel 4

  refresh with primary key

  fast on demand as

  select sales_id ,sales_amt, sales_dtt

  from sales;

  ```


  创建物化视图后，您可能不需要与底层表关联的相同并行度。这很重要，因为针对物化视图的查询将启动并行执行线程。换句话说，您可能需要并行度来快速构建物化视图，但不希望后续查询物化视图时使用并行度。您可以按如下方式更改物化视图的并行度：

  ```sql

  SQL> alter materialized view sales_mv parallel 1;

  ```


  您可以通过查询 `USER_TABLES` 来检查并行度：

  ```sql

  SQL> select table_name, degree from user_tables where table_name= upper(''&mv_name'');

  ```


  ## 移动物化视图


  随着操作系统环境条件的变化，您可能需要将物化视图从一个表空间移动到另一个表空间。在这些情况下，请使用 `ALTER MATERIALIZED VIEW...MOVE
  TABLESPACE` 语句。此示例将与物化视图关联的表移动到不同的表空间：

  ```sql

  SQL> alter materialized view sales_mv move tablespace users;

  ```


  如果与物化视图表关联有任何索引，移动操作会使这些索引不可用。您可以按如下方式检查索引状态：

  ```sql

  SQL> select a.table_name, a.index_name, a.status

  from user_indexes a

  ,user_mviews  b

  where a.table_name = b.mview_name;

  ```


  移动表后，必须重新构建任何关联的索引；例如：

  ```sql

  SQL> alter index sales_pk2 rebuild;

  ```


  ## 管理物化视图日志


  快速刷新物化视图需要物化视图日志。物化视图日志是一个表，用于存储主（基）表的 DML 信息。物化视图日志与主表在同一个数据库中创建，由拥有主表的同一用户创建。您需要
  `CREATE TABLE` 权限才能创建物化视图日志。


  物化视图日志由 Oracle 内部触发器填充（您无法控制此触发器）。在对主表执行 `INSERT`、`UPDATE` 或 `DELETE` 后，此内部触发器会向物化视图日志插入一行。您可以通过查询
  `DBA/ALL/USER_INTERNAL_TRIGGERS` 来查看正在使用的内部触发器。


  一个物化视图日志仅与一个表关联，并且每个主表只能为其定义一个物化视图日志。您可以在表或其他物化视图上创建物化视图日志。多个快速刷新物化视图可以使用一个物化视图日志。


  在物化视图执行快速刷新后，物化视图日志中不再需要的任何记录都将被删除。如果多个物化视图使用一个物化视图日志，则只有当所有快速刷新物化视图都不再需要记录时，才会从物化视图日志中清除记录。


  下表定义了与物化视图日志相关的术语。本章后续与物化视图日志相关的章节中会引用这些术语。


  **表 15-3 物化视图日志术语和功能**


  | 术语 | 含义 |

  | :--- | :--- |

  | 物化视图 (MV) 日志 | 跟踪 MV 基表 DML 更改的数据库对象；快速刷新所必需 |

  | 主键 MV 日志 | 使用基表主键跟踪 DML 更改的 MV 日志 |

  | `ROWID` MV 日志 | 使用基表 `ROWID` 跟踪 DML 更改的 MV 日志 |

  | `Commit SCN MV log` | 基于提交 SCN 而不是时间戳的 MV 日志 |

  | `Object ID` | 用于跟踪 DML 更改的对象标识符 |

  | `Filter column` | 由 MV 子查询引用的非主键列；某些快速刷新场景所必需 |

  | `Join column` | 在子查询 `WHERE` 子句中定义连接的非主键列；某些快速刷新场景所必需 |

  | `Sequence` | 某些快速刷新场景所需的序列值 |

  | `New values` | 指定在 MV 日志中记录旧值和新值；单表聚合视图符合快速刷新条件所必需 |


  ## 创建物化视图日志


  '
- '# 物化视图日志的创建与管理


  快速刷新的物化视图需要在主（基）表上创建物化视图（MV）日志。使用 `CREATE MATERIALIZED VIEW LOG` 命令来创建 MV 日志。此示例在
  `SALES` 表上创建 MV 日志，并指定使用主键来标识日志中的行：


  ```sql

  SQL> create materialized view log on sales with primary key;

  ```


  您也可以指定存储信息，例如表空间名称：


  ```sql

  SQL> create materialized view log on sales

  pctfree 5

  tablespace users

  with primary key;

  ```


  当您在表上创建 MV 日志时，Oracle 会创建一个表来存储自上次刷新以来对主表的更改。MV 日志表的名称遵循此格式：`MLOG$_<master_table_name>`。您可以使用
  SQL*Plus 的 `DESCRIBE` 语句查看 MV 日志的列：


  ```sql

  SQL> desc mlog$_sales;

  Name                              Null?    Type

  -------------------------------- -------- ----------------------------

  SALES_ID                                  NUMBER

  SNAPTIME$$                                DATE

  DMLTYPE$$                                 VARCHAR2(1)

  OLD_NEW$$                                 VARCHAR2(1)

  CHANGE_VECTOR$$                           RAW(255)

  XID$$                                     NUMBER

  ```


  您可以查询这个底层的 `MLOG$` 表，以确定自上次刷新以来的事务数量。每次刷新后，MV 日志表都会被清除。如果多个物化视图使用同一个 MV 日志，则直到所有相关的物化视图都刷新后，日志表才会被清除。


  如果您在具有主键的表上创建 MV 日志，则还会创建一个 `RUPD$_<master_table_name>` 表。此表用于可更新的物化视图。如果您不使用可更新物化视图功能，则此表永远不会被使用，可以忽略它。


  创建 MV 日志时，您可以指定使用以下子句之一来唯一标识 MV 日志表中的行：


  *   `WITH PRIMARY KEY`

  *   `WITH ROWID`

  *   `WITH OBJECT ID`


  如果主表有主键，请在创建 MV 日志时使用 `WITH PRIMARY KEY`。如果主表没有主键，则必须使用 `WITH ROWID` 来指定使用 `ROWID`
  值唯一标识 MV 日志记录。在对象表上创建 MV 日志时，可以使用 `WITH OBJECT ID`。


  Oracle 使用 `SNAPTIME$$` 列来确定哪些记录需要刷新或清除，或两者都需要。您可以选择创建基于 `COMMIT SCN` 的 MV 日志（而非基于时间戳）。这种类型的
  MV 日志使用事务的 SCN 来确定哪些记录需要应用于任何相关的物化视图。基于 `COMMIT SCN` 的 MV 日志比基于时间戳的 MV 日志更高效。使用
  `WITH COMMIT SCN` 子句来实现：


  ```sql

  SQL> create materialized view log on sales with commit scn;

  ```


  您可以通过查询 `USER_MVIEW_LOGS` 来查看 MV 日志是否基于 SCN：


  ```sql

  SQL> select log_table, commit_scn_based from user_mview_logs;

  ```


  > **注意**

  > 使用 COMMIT SCN 创建的 MV 日志没有 `SNAPTIME$$` 列。


  ## 索引 MV 日志列


  有时，您可能需要您的快速刷新物化视图具有更好的性能。一种方法是对 MV 日志表的列创建索引。特别是，Oracle 在刷新或清除时会使用 `SNAPTIME$$`
  列或主键列，或两者。因此，对这些列创建索引可以提高性能：


  ```sql

  SQL> create index mlog$_sales_idx1 on mlog$_sales(snaptime$$);

  SQL> create index mlog$_sales_idx2 on mlog$_sales(sales_id);

  ```


  您不应该仅仅因为认为可能有益就添加索引。只有在已知快速刷新存在性能问题时，才在 MV 日志表上添加索引。请记住，添加索引会消耗数据库中的资源。Oracle 必须为表上的
  DML 操作维护索引，并且索引会占用磁盘空间。


  ## 查看 MV 日志使用的空间


  您应考虑定期检查 MV 日志占用的空间。如果使用的空间在增长（并且从未缩小），您可能遇到了物化视图刷新不成功的问题，从而导致 MV 日志从未被清除。以下是检查
  MV 日志空间的查询：


  ```sql

  SQL> select segment_name, tablespace_name

  ,bytes/1024/1024 meg_bytes, extents

  from dba_segments

  where segment_name like ''MLOG$%''

  order by meg_bytes;

  ```


  以下是一些示例输出：


  ```sql

  SEGMENT_NAME         TABLESPACE_NAME                 MEG_BYTES    EXTENTS

  -------------------- ------------------------------ ---------- ----------

  MLOG$_USERS          MV_DATA                              1609       3218

  MLOG$_ASSET_ATTRS    MV_DATA                            3675.5       7351

  ```


  此输出表明几个 MV 日志很可能存在清除问题。在这种情况下，可能有多个物化视图正在使用该 MV 日志，并且其中一个没有按日志清除。


  您可能会遇到 MV 日志很长时间未被清除的情况。这可能是因为您有多个物化视图使用同一个 MV 日志，而其中一个物化视图不再成功刷新。当 DBA 构建开发环境并将开发物化视图连接到生产环境时（这不应该发生，但确实会发生），就可能发生这种情况。在之后的某个时间点，DBA
  删除了开发数据库。生产环境仍然有关于远程开发物化视图的信息，并且不会清除 MV 日志记录，因为它需要为快速刷新物化视图保留日志数据，而实际上并非如此。


  在这些场景中，您应确定哪些物化视图正在使用该日志（请参阅本章后面的“[确定有多少物化视图引用中央 MV 日志](https://example.org/referencing_mviews)”一节），并解决任何问题。问题解决后，检查日志使用的空间，并查看是否可以收缩（请参阅下一节“收缩
  MV 日志中的空间”）。在这种情况下，监控物化视图和 MV 日志的空间非常重要，可以提供对这些问题的洞察。


  ## 收缩 MV 日志中的空间


  如果 MV 日志未能成功删除记录，它会变得很大。在您解决问题并从 MV 日志中删除记录后，您可以将 MV 日志表的高水位线设置为一个较高的值。但是，这样做可能会导致性能问题，并且会不必要地消耗磁盘空间。在这种情况下，请考虑收缩
  MV 日志使用的空间。


  在此示例中，由于关联的物化视图未能成功刷新，`MLOG$_SALES` 在清除记录方面存在问题。此 MV 日志随后变得很大。问题已被识别并解决，现在需要减少日志的空间。要收缩
  MV 日志中的空间，首先对相应的 MV 日志 `MLOG$` 表启用行移动：


  ```sql

  SQL> alter table mlog$_sales enable row movement;

  ```


  接下来，发出 `ALTER MATERIALIZED VIEW LOG ON...SHRINK` 语句。请注意，关键字 `ON` 后面的表名是主表的名称：


  ```sql

  SQL> alter materialized view log on sales shrink space;

  ```


  根据收缩的空间量，此语句可能需要很长时间。语句完成后，您可以禁用行移动：


  ```sql

  SQL> alter table mlog$_sales disable row movement;

  ```


  您可以通过运行上一节的查询（从 `DBA_SEGMENTS` 中选择）来验证空间是否已减少。


  ## 检查 MV 日志的行数


  如前所述，有时物化视图的刷新会出现问题，这会导致相应的 MV 日志表中积累大量行。当多个物化视图使用一个 MV 日志，并且其中一个物化视图无法执行快速刷新时，就可能发生这种情况。在这种情况下，MV
  日志会持续增长，直到问题得到解决。



  '
- '# 物化视图日志管理


  ## 检测 MV 日志是否被清理


  检测 MV 日志未被清理的一种方法是定期检查 MV 日志表的行数。以下查询使用 SQL 生成一个用于检查当前连接用户所拥有的 MV 日志表行数的脚本：


  ```sql

  SQL> set head off pages 0 lines 132 trimspool on

  SQL> spo mvcount_dyn.sql

  SQL> select ''select count(*) || '' || "''||: ''" || table_name || "''" || '' from
  '' || table_name || '';''

  from user_tables

  where table_name like ''MLOG%'';

  SQL> spo off;

  ```


  此脚本生成一个名为`mvcount_dyn.sql`的文件，其中包含从`MLOG$`表中选择行数的 SQL 语句。检查行数时，你必须对应用程序有一定了解，并清楚正常的行数应该是多少。以下是前面脚本生成的一些示例代码：


  ```sql

  SQL> select count(*) || '': MLOG$_SALES'' from MLOG$_SALES;

  SQL> select count(*) || '': MLOG$_REGION'' from MLOG$_REGION;

  ```


  ## 移动 MV 日志


  你可能需要移动 MV 日志，因为初始创建脚本未指定正确的表空间。一种常见情况是未指定表空间，MV 日志默认被放置在诸如`USERS`之类的表空间中。你可以通过以下查询验证表空间信息：


  ```sql

  SQL> select table_name, tablespace_name

  from user_tables

  where table_name like ''MLOG%'';

  ```


  如果任何 MV 日志表需要重新定位，请使用`ALTER MATERIALIZED VIEW LOG ON <table_name> MOVE`语句。请注意，你需要指定在其上创建
  MV 的主表名称（而不是底层的`MLOG$`表）：


  ```sql

  SQL> alter materialized view log on sales move tablespace users;

  ```


  同时请记住，移动表时，所有关联的索引都会变得不可用（因为表中每条记录的`ROWID`刚刚发生了变化）。你可以按如下方式检查索引状态：


  ```sql

  SQL> select a.table_name, a.index_name, a.status

  from user_indexes a

  ,user_mview_logs b

  where a.table_name = b.log_table;

  ```


  任何不可用的索引都必须重建。以下是重建索引的示例：


  ```sql

  SQL> alter index mlog$_sales_idx2 rebuild;

  ```


  ## 删除 MV 日志


  你可能出于以下几个原因想要删除 MV 日志：


  *   你最初创建了一个 MV 日志，但需求发生了变化，你不再需要它。

  *   MV 日志变得很大并导致性能问题，你想通过删除它来重置大小。


  在删除 MV 日志之前，你可以通过以下查询验证所有者、主表和 MV 日志表：


  ```sql

  SQL> select

  log_owner

  ,master     -- master table

  ,log_table

  from user_mview_logs;

  ```


  使用`DROP MATERIALIZED VIEW LOG ON`语句来删除 MV 日志。你不需要知道 MV 日志的名称，但需要知道在其上创建日志的主表名称。此示例删除`SALES`表上的
  MV 日志：


  ```sql

  SQL> drop materialized view log on sales;

  ```


  如果成功，你将看到以下消息：


  ```sql

  Materialized view log dropped.

  ```


  如果你有权限，并且不是创建 MV 日志的表的所有者，可以在删除 MV 日志时指定模式名称：


  ```sql

  SQL> drop materialized view log on .;

  ```


  如果你想清理环境并删除与某个用户关联的所有 MV 日志，可以使用 SQL 生成相应的 SQL 来实现。以下脚本创建用于删除当前连接用户拥有的所有 MV 日志所需的
  SQL：


  ```sql

  SQL> set lines 132 pages 0 head off trimspool on

  SQL> spo drop_dyn.sql

  SQL> select ''drop materialized view log on '' || master || '';''

  from user_mview_logs;

  SQL> spo off;

  ```


  前面的 SQL*Plus 代码创建了一个名为`drop_dyn.sql`的脚本，其中包含可用于删除用户所有 MV 日志的 SQL 语句。


  ## 刷新 MV


  通常，你会定期刷新 MV。你可以手动刷新 MV 或自动化此任务。以下部分涵盖了这些相关主题：


  *   从 SQL*Plus 手动刷新 MV

  *   使用 shell 脚本和调度工具自动化刷新

  *   使用内置的 Oracle 作业调度器自动化刷新


  > **注意：** 如果你需要将一组 MV 作为一个集合进行刷新，请参阅本章后面的“管理组中的 MV”部分。


  ### 从 SQL*Plus 手动刷新 MV


  你需要定期刷新 MV，以使其与基础表同步。为此，可以使用 SQL*Plus 调用`DBMS_MVIEW`包的`REFRESH`过程。该过程接受两个参数：MV 名称和刷新方法。此示例使用`EXEC[UTE]`语句调用该过程。正在刷新的
  MV 是`SALES_MV`，刷新方法是`F`（快速）：


  ```sql

  SQL> exec dbms_mview.refresh(''SALES_MV'',''F'');

  ```


  你也可以从 SQL*Plus 手动运行刷新，使用一个 PL/SQL 匿名块。此示例执行快速刷新：


  ```sql

  SQL> begin

  dbms_mview.refresh(''SALES_MV'',''F'');

  end;

  /

  ```


  此外，你可以使用问号（`?`）来调用强制刷新方法。这指示 Oracle 在可能的情况下执行快速刷新。如果无法进行快速刷新，则 Oracle 将执行完全刷新：


  ```sql

  SQL> exec dbms_mview.refresh(''SALES_MV'',''?'');

  ```


  你也可以使用`C`（完全）来明确执行完全刷新方法：


  ```sql

  SQL> exec dbms_mview.refresh(''SALES_MV'',''C'');

  ```


  ## MV 与结果缓存


  Oracle 有一个结果缓存功能，它将查询的结果存储在内存中，并使该结果集可用于后续发出的任何相同查询。如果发出了后续相同的查询，并且自原始查询发出以来基础表数据未发生变化，Oracle
  会将结果提供给后续查询。对于数据相对静态且发出许多相同查询的数据库，使用结果缓存可以显著提高性能。


  MV 与结果缓存相比如何？回想一下，MV 将查询的结果存储在表中，并使该结果可用于报告应用程序。这两个功能听起来相似，但在几个重要方面有所不同：


  1.  结果缓存将结果存储在内存中。MV 将结果存储在表中。

  2.  表中的基础数据发生变化时，结果缓存需要立即刷新。MV 在提交时或在定期间隔（例如每天）刷新。因此，如果未刷新，MV 可能拥有过时的数据。


  如果你有在相对静态数据上运行的长时间查询，结果缓存可以显著提高性能。MV 更适合复制数据和存储仅在定期基础上（如每天、每周或每月）需要新结果的复杂查询的结果。


  ## 创建带刷新间隔的 MV


  最初创建 MV 时，你可以选择指定`START WITH`和`NEXT`子句，指示 Oracle 设置一个内部数据库作业（通过`DBMS_SCHEDULER`包）以定期启动
  MV 的刷新。`START WITH`参数指定你希望 MV 首次刷新发生的日期。`NEXT`参数指定一个日期表达式，Oracle 用它来计算刷新之间的间隔。例如，此
  MV 在未来的 1 分钟（`sysdate+1/1440`）首次刷新，随后每天刷新（`sysdate+1`）：


  ```sql

  SQL> create materialized view sales_mv

  refresh

  with primary key

  fast on demand

  start with sysdate+1/1440

  next sysdate+1

  as

  select sales_id, sales_amt, sales_dtt

  from sales;

  ```


  你可以通过查询`USER_JOBS`来查看已调度作业的详细信息：


  ```sql

  SQL> select job, schema_user

  ,to_char(last_date,''dd-mon-yyyy hh24:mi:ss'') last_date

  ,to_char(next_date,''dd-mon-yyyy hh24:mi:ss'') next_date

  ,interval, broken

  from user_jobs;

  ```


  以下是一些示例输出：



  '
