  您可以通过查询`USER_JOBS`视图来查看作业的详细信息。


  ```

  JOB  SCHEMA_USE  LAST_DATE            NEXT_DATE            INTERVAL      B

  ---- ----------  -------------------- -------------------- ------------ -

  1  MV_MAINT    28-1 月-2013 14:55:33 29-1 月-2013 14:55:33  sysdate+1    N

