  SQL> exec dbms_job.remove(1);

  ```


  > 注意：对于设置为`ON COMMIT`刷新的物化视图，您不能同时使用`START WITH`或`NEXT`子句。


  ## 高效执行完全刷新


  当物化视图执行完全刷新时，默认行为是使用`DELETE`语句从物化视图表中移除所有记录。删除完成后，从主表中选择记录并插入到物化视图表中。删除和插入作为一个事务完成；这意味着在完全刷新过程中，任何从物化视图查询的用户看到的都是执行`DELETE`语句之前的数据。而在`INSERT`提交后立即访问物化视图的用户则能看到数据的最新视图。


  在某些场景下，您可能希望修改此行为。如果刷新的数据量很大，`DELETE`语句可能耗时很长。您可以选择通过`ATOMIC_REFRESH`参数指示 Oracle
  尽可能高效地执行数据移除操作。当此参数设置为`FALSE`时，它允许 Oracle 在执行完全刷新时使用`TRUNCATE`语句代替`DELETE`：


  ```

  SQL> exec dbms_mview.refresh(''SALES_MV'',method=>''C'',atomic_refresh=>false);

  ```


  对于大数据集，`TRUNCATE`比`DELETE`工作得更快，因为`TRUNCATE`没有生成重做日志的开销。使用`TRUNCATE`语句的缺点是，在刷新过程中，查询物化视图的用户可能看到零行数据。


  ## 处理 ORA-12034 错误


  当您尝试对物化视图执行快速刷新时，有时可能会遇到`ORA-12034`错误；例如：


  ```

  SQL> exec dbms_mview.refresh(''SALES_MV'',''F'');

  ```


  该语句随后会抛出以下错误消息：


  ```

  ORA-12034: materialized view log on "MV_MAINT"."SALES" younger than last refresh

  ```


  要解决此错误，请尝试完全刷新物化视图：


  ```

  SQL> exec dbms_mview.refresh(''SALES_MV'',''C'');

  ```


  完全刷新完成后，您应该能够执行快速刷新而不会收到错误：


  ```

  SQL> exec dbms_mview.refresh(''SALES_MV'',''F'');

  ```


  当 Oracle 确定物化视图日志是在关联物化视图中上次刷新之后创建时，就会抛出`ORA-12034`错误。换句话说，物化视图日志比物化视图的上次刷新时间更“年轻”。有几种可能的原因：


  *   物化视图日志被删除并重新创建。

  *   物化视图日志被清除。

  *   主表被重组。

  *   主表被截断。

  *   上一次刷新失败。


  在这种情况下，事务可能是在物化视图的上次刷新时间与物化视图日志创建时间之间创建的。在此场景中，您必须先执行一次完全刷新，然后才能开始使用快速刷新机制。


  ## 监控物化视图刷新


  以下部分包含一些非常方便的示例，演示如何监控物化视图刷新作业。示例包括如何查看上次刷新时间、确定作业是否正在执行、确定刷新作业的进度以及检查物化视图在过去一天内是否未刷新。这样的脚本对于排查和诊断刷新问题非常宝贵。


  ### 查看物化视图的上次刷新时间


  当您排查物化视图的问题时，通常首先检查的是`DBA/ALL/USER_MVIEWS`视图中的`LAST_REFRESH_DATE`列。查看此信息可以让您了解物化视图是否按计划刷新。以物化视图所有者身份运行此查询，以显示上次刷新日期：


  ```

  SQL> select mview_name

  ,to_char(last_refresh_date,''dd-mon-yy hh24:mi:ss'')

  ,refresh_mode, refresh_method

  from user_mviews;

  ```


  `DBA/ALL/USER_MVIEWS`视图的`LAST_REFRESH_DATE`列显示物化视图上次成功完成刷新的日期和时间。如果物化视图从未成功刷新过，则`LAST_REFRESH_DATE`为`NULL`。


  ### 确定刷新是否正在进行


  如果您需要知道哪些物化视图正在运行，请使用此查询：


  ```

  SQL> select sid, serial#, currmvowner, currmvname from v$mvrefresh;

  ```


  示例输出如下：


  ```

  SID   SERIAL#  CURRMVOWNER              CURRMVNAME

  ---------- ---------  -----------------------  -------------------

  108      3037  MV_MAINT                 SALES_MV

  ```


  ### 监控实时刷新进度


  如果您处理大型物化视图，下一个查询可以显示刷新操作的实时进度。在排查问题时，此查询可能非常有用。作为拥有内部 SYS 表权限的用户运行以下脚本：


  ```

  SQL> column "MVIEW BEING REFRESHED" format a25

  SQL> column inserts format 9999999

  SQL> column updates format 9999999

  SQL> column deletes format 9999999

  --

  SQL> select

  currmvowner_knstmvr || ''.'' || currmvname_knstmvr "MVIEW BEING REFRESHED",

  decode(reftype_knstmvr, 1, ''FAST'', 2, ''COMPLETE'', ''UNKNOWN'') reftype,

  decode(groupstate_knstmvr, 1, ''SETUP'', 2, ''INSTANTIATE'',

  3, ''WRAPUP'', ''UNKNOWN'') STATE,

  total_inserts_knstmvr inserts,

  total_updates_knstmvr updates,

  total_deletes_knstmvr deletes

  from x$knstmvr x

  where type_knst = 6

  and exists (select 1

  from v$session s

  where s.sid=x.sid_knst

  and s.serial#=x.serial_knst);

  ```


  当物化视图刚开始刷新时，您会看到此输出：


  ```

  MVIEW BEING REFRESHED     REFTYPE  STATE        INSERTS  UPDATES  DELETES

  ------------------------- -------- ----------- -------- -------- --------

  MV_MAINT.SALES_MV         UNKNOWN  SETUP              0        0        0

  ```


  几秒钟后，物化视图达到`INSTANTIATE`状态：


  ```

  MV_MAINT.SALES_MV         FAST     INSTANTIATE        0        0        0

  ```


  随着物化视图刷新，`INSERTS`、`UPDATES`和`DELETES`列会相应更新：


  ```

  MV_MAINT.SALES_MV         FAST     INSTANTIATE      860      274        0

  ```


  当物化视图几乎完成刷新时，它达到`WRAPUP`状态：


  ```

  MV_MAINT.SALES_MV         FAST     WRAPUP          5284     1518        0

  ```


  物化视图完成刷新后，查询将返回零行：


  ```

  no rows selected

  ```


  正如您所想，此查询对于排查和诊断物化视图刷新问题非常有用。


  ### 检查物化视图是否在指定时间段内刷新


  处理物化视图时，拥有一个自动化的方法来确定刷新是否正在发生是很好的。使用以下 Shell 脚本检测哪些物化视图在过去一天内未刷新，然后如果检测到任何未刷新的物化视图，则发送电子邮件：


  ```

  #!/bin/bash

  # Source oracle OS variables, see Chapter 2 for details

  . /etc/oraset $1

  #

  crit_var=$(sqlplus -s  1;

  EOF)

  #

  if [ $crit_var -ne 0 ]; then

  echo $crit_var

  echo "mv_ref refresh problem with $1" | mailx -s "mv_ref problem" \

  dkuhn@gmail.com

  else

  echo $crit_var

  echo "MVs ok"

  fi

  #

  exit 0

  ```


  '
- '# Oracle 物化视图的远程刷新与管理


  此脚本接收 SQL*Plus 语句的输出并将其返回给 shell 的 `crit_var` 变量。如果 `REP_MV` 用户的任何物化视图在过去一天内未刷新，则
  `crit_var` 变量将具有一个非零值。如果 `crit_var` 不等于零，则会发送一封电子邮件，指示存在问题。


  ## 创建远程物化视图刷新


  您可以创建从远程表、物化视图或视图中选择的物化视图，或这些对象的组合。这样做可以快速高效地复制数据。基于远程对象创建物化视图的设置如下：


  1.  确保从复制的数据库环境到包含主表的数据库之间存在 Oracle Net 连接。如果没有此连接，则无法使用物化视图进行复制。

  2.  获取对远程数据库中用户帐户的访问权限，该帐户应有权访问您想要复制的远程表、物化视图或视图。

  3.  对于快速刷新，请在主（基）表上创建物化视图日志。仅当您打算执行快速刷新时才需要执行此操作。

  4.  在复制的数据库环境中创建一个数据库链接，指向主数据库。

  5.  在复制的数据库环境中创建物化视图，通过步骤 4 中创建的数据库链接访问远程主对象。


  这里是一个简单的示例。首先，确保您可以从复制环境建立到主数据库的 Oracle Net 连接。您可以通过从复制的数据库环境使用 `SQL*Plus` 连接到远程主数据库来验证连接并确保可以登录到主数据库。在将要包含物化视图的数据库的命令提示符下，尝试连接到名为
  `ENGDEV`、位于 `XENGDB` 服务器上的主数据库中的用户 `REP_MV`：


  ```

  $ sqlplus rep_mv/foo@''xengdb:1522/engdev''

  ```


  当您连接到远程主数据库后，您就可以访问作为物化视图基础的表。在此示例中，远程主表的名称是 `SALES`：


  ```

  SQL> select count(*) from sales;

  ```


  接下来，在将包含物化视图的数据库中创建一个数据库链接。该数据库链接指向远程主数据库中的用户：


  ```

  SQL> create database link engdev

  connect to rep_mv identified by foo

  using ''xengdb:1522/engdev'';

  ```


  现在，创建一个访问主 `SALES` 表的物化视图：


  ```

  SQL> create materialized view sales_mv

  refresh complete on demand

  as

  select

  sales_id

  ,sales_amt

  from sales@engdev;

  ```


  您可以通过在表名后附加 `@<database_link_name>` 来访问远程数据库。这指示 Oracle 从远程表中进行选择。远程表的位置在 `CREATE
  DATABASE LINK` 语句中定义。


  ## 理解远程刷新架构


  您可以使用多种配置进行远程刷新的物化视图。本节详细介绍了三种常见场景；您可以基于它们进行构建以满足大多数远程复制需求。


  图 15-3 展示了一种常见配置，它在主 OLTP 数据库上使用物化视图日志。远程数据库使用物化视图日志来实现快速刷新。当您担心报表活动会严重阻碍生产性能而无法直接从
  OLTP 数据库进行报表时，通常使用此配置。当您在地球另一端有用户，并且希望将数据复制到物理上更靠近他们的数据库以获得可接受的报表性能时，此架构也很有用。


  ![../images/214899_3_En_15_Chapter/214899_3_En_15_Fig3_HTML.jpg](img/214899_3_En_15_Fig3_HTML.jpg)

  图 15-3 在主站点使用物化视图日志的远程刷新


  图 15-4 说明了一种场景，您不被允许在主基表上创建物化视图日志。这可能是因为另一个团队或组织拥有主（基础）数据库，并且所有者不愿意让您在主环境中创建物化视图日志。在这种情况下，您必须对远程报表数据库使用完全物化视图刷新。当基表记录中很大比例每天被修改时，此架构也是合适的。在这种情况下，完全刷新可能比快速刷新更有效（因为您正在复制大部分数据，而不仅仅是一小部分）。


  ![../images/214899_3_En_15_Chapter/214899_3_En_15_Fig4_HTML.jpg](img/214899_3_En_15_Fig4_HTML.jpg)

  图 15-4 使用完全物化视图刷新的远程刷新


  图 15-5 展示了一种场景，您将基表复制到一个临时数据库，然后从临时数据库复制到报表数据库。当网络架构配置使得报表数据库位于无法直接连接到加固的生产环境的网段上时，这种情况很常见。在这种情况下，您可以构建一个中间数据库，该数据库驻留在可以连接到
  OLTP 数据库和报表数据库的网络中。请注意，物化视图日志是构建在安全临时数据库中的物化视图上的。在此配置中刷新时，您必须协调临时数据库和报表数据库的刷新时间，以确保在刷新期间没有重叠。


  ![../images/214899_3_En_15_Chapter/214899_3_En_15_Fig5_HTML.jpg](img/214899_3_En_15_Fig5_HTML.jpg)

  图 15-5 两跳远程快速物化视图刷新


  > 注意：有时，建立在另一个物化视图上的物化视图被称为嵌套物化视图。


  ## 查看物化视图基表信息


  当您诊断物化视图的问题时，查看物化视图及其关联的远程主表很有用。在包含物化视图的数据库上运行以下查询以提取主所有者和表信息：


  ```

  SQL> select

  owner        mv_owner

  ,name         mv_name

  ,master_owner mast_owner

  ,master       mast_table

  from dba_mview_refresh_times

  order by 1,2;

  ```


  前面的查询报告每个物化视图及其所基于的主表。基表可以是本地的，也可以是远程的。


  ## 确定有多少物化视图引用中央物化视图日志


  假设您有一个带物化视图日志的主表。此外，多个远程物化视图使用中央主物化视图日志。图 15-6 说明了这种配置。


  ![../images/214899_3_En_15_Chapter/214899_3_En_15_Fig6_HTML.jpg](img/214899_3_En_15_Fig6_HTML.jpg)

  图 15-6 多个远程物化视图使用同一集中式物化视图日志


  在这种情况下，Oracle 会在物化视图日志中保留记录，直到所有物化视图都已刷新。例如，假设物化视图 `A` 的 `LAST_REFRESH_DATE` 为 2013
  年 7 月 1 日，物化视图 `B` 的 `LAST_REFRESH_DATE` 为 2013 年 9 月 1 日。然后，物化视图 `A` 在 2013 年 10
  月 1 日刷新。主日志仅清除早于 2013 年 9 月 1 日的记录（因为较新的日志记录仍被物化视图 `B` 需要）。


  如果某个物化视图被删除并且无法从主物化视图日志表中注销自己，那么主物化视图日志表中的记录将无限增长。要解决此问题，您需要有关哪些物化视图与哪些物化视图日志相关联的信息。此查询显示所有依赖物化视图的主表所有者信息和
  `SNAPID`（物化视图 ID）：


  ```

  SQL> select mowner

  ,master base_table

  ,snapid, snaptime

  from sys.slog$;

  ```


  以下是一些示例输出，显示两个物化视图连接到一个物化视图日志：


  ```

  MOWNER          BASE_TABLE               SNAPID SNAPTIME

  --------------- -------------------- ---------- ---------

  INV_MGMT        PRODUCT_TAXONOMY            653 28-JAN-13

  INV_MGMT        COMPANY_ACCOUNTS            650 28-JAN-13

  INV_MGMT        CMP_GRP_ASSOC               651 28-JAN-13

  ```


  '
- '# 管理物化视图日志和组


  ## 显示已注册到日志的物化视图


  下一个查询显示所有已创建并关联到物化视图日志的物化视图的信息。请在主站点运行此查询：


  ```sql

  SQL> select a.log_table, a.log_owner

  ,b.master mast_tab

  ,c.owner  mv_owner

  ,c.name   mview_name

  ,c.mview_site, c.mview_id

  from dba_mview_logs a

  ,dba_base_table_mviews b

  ,dba_registered_mviews c

  where b.mview_id = c.mview_id

  and   b.owner    = a.log_owner

  and   b.master   = a.master

  order by a.log_table;

  ```


  以下是一些示例输出：


  ```

  LOG_TABLE             LOG_OWNE   MAST_TAB        MV_OWN   MVIEW_NAME

  -------------------   --------   -------------   ------   ---------------- MVIEW_S   MVIEW_ID-------   -------

  MLOG$_CMP_GRP_ASSOC   INV_MGMT   CMP_GRP_ASSOC   REP_MV   CMP_GRP_ASSOC_MV DWREP     651

  MLOG$_CMP_GRP_ASSOC   INV_MGMT   CMP_GRP_ASSOC   TSTDEV   CMP_GRP_ASSOC_MV ENGDEV    541

  ```


  ## 从日志中清除未注册的物化视图


  当你删除一个远程物化视图时，它应该从主数据库中注销。然而，这并不总是发生。远程数据库可能会被清除（例如，一个短期的开发数据库），而物化视图没有机会通过 `DROP
  MATERIALIZED VIEW` 语句自行注销。在这种情况下，物化视图日志并不知道一个依赖的物化视图已不再可用，因此会无限期地保留记录。


  要从包含物化视图日志的数据库中清除不需要的物化视图信息，请执行 `DBMS_MVIEW` 的 `PURGE_MVIEW_FROM_LOG` 过程。此示例传入了要清除的物化视图的
  ID：


  ```sql

  SQL> exec dbms_mview.purge_mview_from_log(541);

  ```


  此语句应更新数据字典，并从内部表 `SLOG$` 和 `DBA_REGISTERED_MVIEWS` 中删除信息。如果要清除的物化视图是关联到该物化视图日志表的最旧物化视图，那么相关的旧记录也会从物化视图日志中删除。


  ## 手动注销物化视图


  如果某个远程物化视图已不可用但仍注册在物化视图日志表中，你可以在主站点手动将其注销。使用 `DBMS_MVIEW` 包的 `UNREGISTER_MVIEW`
  过程来注销远程物化视图。为此，你需要知道远程物化视图的所有者、名称和站点（可从上一节查询的输出中获得）：


  ```sql

  SQL> exec dbms_mview.unregister_mview(''TSTDEV'',''CMP_GRP_ASSOC_MV'',''ENGDEV'');

  ```


  如果成功，上述操作将从 `DBA_REGISTERED_MVIEWS` 中移除一条记录。


  ## 在组中管理物化视图


  物化视图组是一个有用的功能，它使你能够在一致的事务时间点刷新一组物化视图。如果你刷新的物化视图所基于的主表之间存在父子关系，那么你很可能应该使用一个刷新组。这种方法可以保证你刷新的物化视图集合中不会有任何孤立的子记录。以下部分描述了如何创建和维护物化视图刷新组。


  > **注意**

  > 你使用 `DBMS_REFRESH` 包来完成管理物化视图刷新组的大部分任务。该包在《Oracle 高级复制管理 API 参考指南》中有完整记录，可从 Oracle
  网站的技术网络区域下载（ [`http://otn.oracle.com`](http://otn.oracle.com) ）。


  ### 创建物化视图组


  你使用 `DBMS_REFRESH` 包的 `MAKE` 过程来创建物化视图组。创建物化视图组时，必须指定一个名称、组中物化视图的逗号分隔列表、下次刷新的日期以及用于计算下次刷新时间的时间间隔。以下是一个包含两个物化视图的组的示例：


  ```sql

  SQL> begin

  dbms_refresh.make(

  name      => ''SALES_GROUP'',

  list      => ''SALES_MV, SALES_DAILY_MV'',

  next_date => sysdate-100,

  interval  => ''sysdate+1''

  );

  end;

  /

  ```


  当你创建物化视图组时，Oracle 会自动创建一个数据库作业来管理该组的刷新。你可以通过查询 `DBA/ALL/USER_REFRESH` 来查看物化视图组的详细信息：


  ```sql

  SQL> select rname, job, next_date, interval from user_refresh;

  ```


  以下是一些示例输出：


  ```

  RNAME            JOB   NEXT_DATE            INTERVAL

  ---------------  ----  -------------------  --------------

  SALES_GROUP        3   20-OCT-12            sysdate+1

  ```


  ### 更改物化视图刷新组


  你可以更改刷新组的特性，例如刷新日期或时间间隔。如果你依赖数据库作业作为刷新机制，那么你偶尔可能需要调整刷新特性。使用 `DBMS_REFRESH` 包的 `CHANGE`
  函数来实现这一点。以下示例更改了 `INTERVAL` 计算：


  ```sql

  SQL> exec dbms_refresh.change(name=>''SALES_GROUP'',interval=>''SYSDATE+2'');

  ```


  再次强调，仅当你使用内部数据库作业来启动物化组刷新时，才需要更改刷新时间间隔。你可以使用以下查询验证刷新组的时间间隔和作业信息的详细信息：


  ```sql

  SQL> select a.job, a.broken, b.rowner, b.rname, b.interval

  from dba_jobs    a

  ,dba_refresh b

  where a.job = b.job

  order by a.job;

  ```


  此示例的输出如下：


  ```

  JOB  B ROWNER     RNAME           INTERVAL

  ---- - ---------- --------------- ---------------

  3 N MV_MAINT   SALES_GROUP     SYSDATE+2

  ```


  ### 刷新物化视图组


  创建组后，你可以使用 `DBMS_REFRESH` 包的 `REFRESH` 函数手动刷新它。此示例刷新你之前创建的组：


  ```sql

  SQL> exec dbms_refresh.refresh(''SALES_GROUP'');

  ```


  如果你检查 `USER_MVIEWS` 的 `LAST_REFRESH_DATE` 列，你会发现组中的所有物化视图都有相同的刷新时间。这是预期的行为，因为组中的物化视图都是在一致的事务时间点刷新的。


  ### DBMS_MVIEW 与 DBMS_REFRESH


  你可能已经注意到，可以使用 `DBMS_MVIEW` 包来刷新一组物化视图。例如，你可以使用 `DBMS_MVIEW` 按如下方式刷新列表中的物化视图集合：


  ```sql

  SQL> exec dbms_mview.refresh(list=>''SALES_MV,SALES_DAILY_MV'');

  ```


  此方法在一个事务中刷新列表中的每个物化视图。它等同于使用物化视图组。然而，当你使用 `DBMS_MVIEW` 时，你可以选择将 `ATOMIC_REFRESH`
  参数设置为 `TRUE`（默认值）或 `FALSE`。例如，此处将 `ATOMIC_REFRESH` 参数设置为 `FALSE`：


  ```sql

  SQL> exec dbms_mview.refresh(list=>''SALES_MV,SALES_DAILY_MV'',atomic_refresh=>false);

  ```


  此设置指示 `DBMS_MVIEW` 将列表中的每个物化视图作为一个单独的事务刷新。上面一行代码等同于以下两行：


  ```sql

  SQL> exec dbms_mview.refresh(list=>''SALES_MV'', atomic_refresh=>false);

  SQL> exec dbms_mview.refresh(list=>''SALES_DAILY_MV'', atomic_refresh=>false);

  ```


  将此与 `DBMS_REFRESH` 的行为进行比较，后者是你用于设置和维护物化视图组的包。`DBMS_REFRESH` 包总是将一组物化视图作为一个一致的事务进行刷新。如果你总是需要将一组物化视图作为一个事务一致的组来刷新，请使用
  `DBMS_REFRESH`。如果你在是否将物化视图列表作为一个一致事务刷新方面需要一些灵活性，请使用 `DBMS_MVIEW`。


  ### 确定组中的物化视图


  当你调查物化视图刷新组的问题时，一个很好的起点是显示该组包含哪些物化视图。查询数据字典视图 `DBA_RGROUP` 和 `DBA_RCHILD`，查看刷新组中的物化视图：


  ```sql

  SQL> select a.owner

  ,a.name mv_group

  ,b.name mv_name

  from dba_rgroup a

  ,dba_rchild b

  where a.refgroup = b.refgroup

  and   a.owner    = b.owner

  order by a.owner, a.name, b.name;

  ```


  输出片段如下：


  ```

  OWNER      MV_GROUP             MV_NAME

  ---------- -------------------- --------------------

  MV_MAINT   SALES_GROUP          SALES_DAILY_MV

  MV_MAINT   SALES_GROUP          SALES_MV

  ```


  在 `DBA_RGROUP` 视图中，`NAME` 列代表刷新组的名称。`DBA_RCHILD` 视图包含刷新组中每个物化视图的名称。


  ### 将物化视图添加到刷新组



  '
- '# 管理物化视图刷新组


  随着业务需求的变化，您偶尔需要向一个组中添加一个物化视图（MV）。使用 `DBMS_REFRESH` 包的 `ADD` 过程来完成此任务：


  ```

  SQL> exec dbms_refresh.add(name=>''SALES_GROUP'',list=>''PRODUCTS_MV,USERS_MV'');

  ```


  您必须指定组名，并提供一个逗号分隔的物化视图名称列表以进行添加。新添加的物化视图将在组下一次刷新时被刷新。


  另一种向组中添加物化视图的方法是删除该组，然后使用新的物化视图重新创建它。然而，通常更推荐直接添加物化视图。


  ## 从刷新组中移除物化视图


  有时，您需要从组中移除一个物化视图。为此，请使用 `DBMS_REFRESH` 包的 `SUBTRACT` 函数。

  此示例从组中移除一个物化视图：


  ```

  SQL> exec dbms_refresh.subtract(name=>''SALES_GROUP'',list=>''SALES_MV'');

  ```


  您必须指定物化视图组的名称，并提供一个包含要移除的物化视图名称的逗号分隔列表。

  另一种从组中移除物化视图的方法是删除该组，然后在不包含不想要的物化视图（们）的情况下重新创建它。然而，通常更推荐直接移除物化视图。


  ## 删除物化视图刷新组


  如果您需要删除一个物化视图刷新组，请使用 `DBMS_REFRESH` 包的 `DESTROY` 过程。

  此示例删除名为 `SALES_GROUP` 的物化视图组：


  ```

  SQL> exec dbms_refresh.destroy(''SALES_GROUP'');

  ```


  此方法仅删除物化视图刷新组对象——它不会删除任何实际的物化视图。如果您还需要删除物化视图，请使用 `DROP MATERIALIZED VIEW` 语句。


  ## 总结


  有时，术语 *物化视图* 会让刚接触这项技术的人感到困惑。也许 Oracle 本应该将此功能命名为“定期清除并重新填充包含查询结果的表”，但这个短语可能太长了。无论如何，当您理解了这个工具的强大功能后，就可以利用它来复制和聚合大量数据。通过定期计算和存储复杂数据聚合的结果，您可以极大地提高查询性能。


  物化视图可以是快速可刷新的，这意味着它们仅复制自上次刷新以来主表中发生的更改。要使用这种类型的物化视图，您必须在主表上创建一个物化视图日志。并非总是能够创建物化视图日志；在这些场景中，物化视图必须执行完全刷新。


  如果需要，您还可以使用物化视图来压缩和加密数据。这有助于更好的空间管理和安全性。此外，您可以对物化视图使用的底层表进行分区，以实现更好的可扩展性、性能和可用性。


  物化视图有许多选项能够将这些数据用于报告、其他数据库、集成和数据 API。讨论数据的使用方式非常重要，以便为物化视图提供正确的刷新计划，并理解其中提供的数据。


  前面几章重点介绍 DBA 经常使用的专门数据库功能。这些功能包括大对象、分区、Data Pump、外部表和物化视图。本书现在将重点转向 DBA 必须熟悉的最重要主题之一：备份与恢复。接下来的几章将涵盖用户管理的备份和
  RMAN。


  '
- '# 配置 RMAN


  Oracle Recovery Manager (RMAN) 在您安装 Oracle 软件（标准版和企业版）时默认提供。RMAN 提供了一套健壮且灵活的备份与恢复功能。以下列表突出了一些最显著的特点：


  *   易于使用的备份、恢复和恢复命令。

  *   能够跟踪哪些文件已备份以及备份到何处。

  *   管理过时备份和归档日志的删除。

  *   并行化：可以使用多个进程进行备份、恢复和恢复。

  *   增量备份，仅备份自上次备份以来的更改。

  *   能够将增量备份应用到映像副本。

  *   支持在数据库、表空间、数据文件、表或块级别进行恢复。

  *   高级压缩和加密功能。

  *   与介质管理器集成以进行磁带备份。

  *   备份验证和测试。恢复验证和测试。

  *   跨平台数据转换。

  *   数据恢复顾问，可协助诊断故障并提出解决方案。

  *   能够检测数据文件中的损坏块。

  *   来自 RMAN 命令行的高级报告功能。


  本章的目标是提供足够的关于 RMAN 的信息，使您能够就如何实施可靠的备份策略做出合理的决策。首先描述基本的 RMAN 组件，之后您将逐步了解实施 RMAN 涉及的许多决策点。


  > 注意

  > 本书中与 RMAN 相关的章节并非旨在作为所有备份和恢复方面的完整参考。那将需要一整本书。这些章节包含了成功使用 RMAN 所需的基本信息。如果您需要有关备份、恢复和恢复的高级
  RMAN 信息，请参阅 Darl Kuhn, Sam Alapati 和 Arup Nanda 所著的 *RMAN Recipes for Oracle Database
  12c* 第二版 (Apress, 2013)。


  ## 理解 RMAN


  RMAN 生态系统由许多不同的组件组成。图 17-1 显示了主要 RMAN 组件的交互。在阅读本节时请参考此图。


  ![../images/214899_3_En_17_Chapter/214899_3_En_17_Fig1_HTML.jpg](img/214899_3_En_17_Fig1_HTML.jpg)


  图 17-1 RMAN 架构组件


  以下列表描述了 RMAN 架构组件：


  *   **DBA**：人工交互以确保备份和恢复成功。

  *   **目标数据库**：被 RMAN 备份的数据库。您使用 RMAN 命令行的 `TARGET` 参数连接到目标数据库（有关更多详细信息，请参见下一节）。

  *   **RMAN 客户端**：您从中发出 `BACKUP`、`RESTORE` 和 `RECOVER` 命令的 `rman` 实用程序。在大多数数据库服务器上，`rman`
  实用程序位于 `ORACLE_HOME/bin` 目录中（与其他所有 Oracle 实用程序一起，例如 `sqlplus` 和 `expdp`）。

  *   **Oracle 服务器进程**：当您执行 `rman` 客户端并连接到目标数据库时，将启动两个 Oracle 服务器后台进程。第一个默认服务器进程与
  PL/SQL 包交互以协调备份活动。辅助轮询进程偶尔更新 Oracle 数据字典结构。

  *   **通道**：用于处理正在备份（或恢复）的文件与备份设备（磁盘或磁带）之间 I/O 的 Oracle 服务器进程。

  *   **PL/SQL 包**：RMAN 使用两个内部 PL/SQL 包（由 `SYS` 拥有）来执行备份和恢复任务：`DBMS_RCVMAN` 和 `DBMS_BACKUP_RESTORE`。`DBMS_RCVMAN`
  访问控制文件中的信息并将其传递给 RMAN 服务器进程。`DBMS_BACKUP_RESTORE` 包执行了 RMAN 的大部分工作。例如，此包创建系统调用，指导通道进程执行
  B&R 操作。

  *   **内存缓冲区（PGA 或 SGA）**：RMAN 在 PGA（有时在 SGA）中使用一个内存区域作为缓冲区，用于从数据文件读取并将后续块复制到备份文件。

  *   **辅助数据库**：一个数据库，RMAN 将目标数据库数据文件恢复到此数据库，用于复制数据库、创建 Data Guard 备用数据库或执行数据库时间点恢复（DBPITR）。

  *   **备份**：可以是名词或动词。存储备份文件的物理文件（备份）；或者，复制和归档（备份）文件的行为。备份可以由备份集和备份片或映像副本组成。




  '
- '# RMAN 架构组件与备份类型


  ## 关键术语


  *   **备份集 (Backup set)**：当你运行 RMAN 的 `BACKUP` 命令时，默认会创建一个或多个备份集。备份集是 RMAN 的一种逻辑结构，用于分组备份片文件。你可以将备份集与备份片的关系，类比为表空间与数据文件的关系：一个是逻辑结构，另一个是物理文件。


  *   **备份片文件 (Backup piece file)**：RMAN 的二进制备份文件。每个逻辑备份集由一个或多个备份片文件组成。这些是 RMAN 在磁盘或磁带上创建的物理文件。它们是专有的二进制格式文件，只有
  RMAN 能够读写。一个备份片可以包含来自许多不同数据文件的块。备份片文件通常比数据文件小，因为备份片只包含数据文件中已使用的块。


  *   **映像副本 (Image copy)**：通过 `BACKUP AS COPY` 命令发起。这是一种备份类型，其中 RMAN 创建数据文件、归档日志文件或控制文件的完全相同的副本。映像副本可以被操作系统实用程序（如
  Linux 的 `cp` 和 `mv` 命令）操作。映像副本是增量更新映像备份的一部分。有时，如果你需要快速恢复，使用映像副本比备份集更可取。


  *   **恢复目录 (Recovery catalog)**：一个可选的数据库模式，包含用于存储 RMAN 备份操作相关元数据信息的表。Oracle 强烈建议使用恢复目录，因为它提供了更多的备份和恢复选项。该目录通常是远程的，不必存在于每个数据库中。


  *   **介质管理器 (Media manager)**：允许 RMAN 直接备份文件到磁带的第三方软件。当磁盘空间不足无法直接备份，或者灾难恢复要求必须备份到易于运离现场的存储时，备份到磁带是理想的选择。


  *   **快速恢复区 (Fast Recovery Area, FRA)**：RMAN 可用于备份的磁盘区域。你还可以使用 FRA 来多路复用控制文件和在线重做日志。你通过数据库初始化参数
  `DB_RECOVERY_FILE_DEST_SIZE` 和 `DB_RECOVERY_FILE_DEST` 来实例化一个快速恢复区。


  *   **快照控制文件 (Snapshot control file)**：当备份控制文件或与恢复目录（如果使用）同步时，RMAN 需要控制文件的一致性视图。在这种情况下，RMAN
  首先创建控制文件的临时副本（快照）。这允许 RMAN 在备份控制文件或与恢复目录同步期间，使用一个保证不会更改的控制文件版本。


  你可以使用 RMAN 制作几种类型的备份：


  *   **完全备份 (Full backup)**：备份与数据文件相关的所有已修改块。完全备份并非整个数据库的备份。例如，你可以对一个数据文件进行完全备份。


  *   **增量级别 0 备份 (Incremental level 0 backup)**：备份的块与完全备份相同。级别 0 备份与完全备份的唯一区别在于，级别
  0 备份可以与其他增量备份一起使用，而完全备份不行。


  *   **增量级别 1 备份 (Incremental level 1 backup)**：仅备份自上次备份以来修改过的块。级别 1 增量备份可以是差异备份或累积备份。差异级别
  1 备份是默认选项，备份自上次级别 0 或级别 1 备份以来所有修改过的块。累积级别 1 备份则备份自上次级别 0 备份以来所有更改过的块。


  *   **增量更新备份 (Incrementally updated backup)**：首先创建数据文件的映像副本，随后的备份是增量备份，并与该映像副本合并。这是使用映像副本进行备份的一种高效方式。使用增量更新备份进行介质恢复速度很快，因为恢复时使用的是数据文件的映像副本。


  *   **块更改跟踪 (Block change tracking)**：跟踪数据库中已更改块的数据库功能。已更改块的记录保存在一个二进制文件中。RMAN 可以利用该二进制文件的内容来提高增量备份的性能：无需扫描数据文件中的所有已修改块，RMAN
  即可通过二进制块更改跟踪确定哪些块已更改。


  *   **归档日志备份 (Archivelog backups)**：此操作备份归档日志并允许释放归档日志目录中的空间。归档日志备份通常作为数据文件备份的一部分，但也可以单独运行以管理归档日志的磁盘空间。


  ## 启动 RMAN


  既然你已经了解了 RMAN 架构组件和可制作的备份类型，现在可以启动 RMAN 并根据你的环境进行配置。


  要连接到 RMAN，你需要建立：


  *   操作系统环境变量

  *   访问有特权的操作系统账户或具有 `SYSBACKUP` 权限的数据库用户


  连接到 RMAN 最简单的方法是，以 Oracle 软件所有者（在 Linux/Unix 系统上通常名为 `oracle`）的身份登录到目标数据库所在的服务器。当你以
  `oracle` 登录时，在使用 `rman` 和 `sqlplus` 等实用程序之前，需要建立几个操作系统变量。设置这些必需的操作系统变量在第 2 章中有详细说明。RMAN
  也可以从安装了 Oracle 软件的另一台服务器运行。连接到目标数据库执行备份需要服务名或 SID 名。


  至少需要设置 `ORACLE_HOME` 和 `ORACLE_SID`。此外，如果 `PATH` 变量包含 `ORACLE_HOME/bin` 目录会很方便。该目录包含
  Oracle 实用程序。


  建立操作系统变量后，可以从操作系统调用 RMAN，如下所示：


  ```

  $ rman target /

  或者

  $ rman target backupuser@ora18c

  ```


  连接到 RMAN 时，无需指定 `AS SYSDBA` 子句（就像在 SQL*Plus 中以特权用户连接数据库时那样）。这是因为 RMAN 始终要求你以具有 `SYSDBA`
  权限的数据库用户身份连接。任何用户都需要被授予 `SYSBACKUP` 角色才能执行备份操作。


  **提示**：Oracle Database 12c 新增的 `SYSBACKUP` 权限允许你仅向用户分配执行备份和恢复操作所需的权限。`SYSBACKUP`
  权限包含执行此类操作所需的 `SYSDBA` 权限子集。




  之前的 RMAN 登录示例使用了操作系统（OS）认证。这类认证意味着，如果您能登录到一个授权的 OS 账户（例如 Oracle 软件的所有者，通常是`oracle`），那么您无需提供用户名和密码即可连接到数据库。您通过为
  OS 账户分配特殊组来管理 OS 认证。在 Linux/Unix 环境中安装 Oracle 二进制文件时，需要在安装时指定被授予`SYSDBA`、`SYSOPER`、`SYSBACKUP`数据库特权的
  OS 组名称——通常分别是`dba`、`oper`和`backupdba`组（详见章节 1）。作为企业备份解决方案的一部分，建议创建一个单独的备份用户，以便执行到磁盘或磁带的备份并安排自动运行。


  ## （不）从 SQL*PLUS 调用 RMAN

  在 SQL*PLUS 会话中意外尝试 RMAN 命令，或者试图从 SQL*PLUS 中运行 RMAN，这种情况非常典型。然而，这行不通：

  ```sql

  SQL> rman

  SP2-0042: unknown command "rman" - rest of line ignored.

  ```

  答案很简单：`rman`客户端是一个 OS 实用程序，而非 SQL*Plus 函数。您必须从 OS 命令行提示符调用`rman`客户端。


  ## RMAN 架构决策


  如果您的数据库启用了归档（关于归档的详细信息，请参见章节 5），您可以开箱即用地使用 RMAN 运行如下命令来备份整个目标数据库：


  ```

  $ rman target /

  RMAN> backup database;

  ```


  如果遇到介质故障，您可以按如下方式还原所有数据文件：


  ```

  RMAN> shutdown immediate;

  RMAN> startup mount;

  RMAN> restore database;

  ```


  数据库还原后，您可以进行完全恢复：


  ```

  RMAN> recover database;

  RMAN> alter database open;

  ```


  这样就万事大吉了，对吗？不，不完全如此。对于简单的备份需求，RMAN 的默认属性设置是相当合理的。RMAN 的开箱即用设置可能适用于小型开发或测试数据库。但是，对于任何类型的业务关键型数据库，您需要仔细考虑备份存储的位置、在磁盘或磁带上存储备份的时长、哪些
  RMAN 功能适用于该数据库等等。本章接下来的几节将引导您了解在生产环境中实施 RMAN 所需的许多备份和恢复架构决策。RMAN 拥有丰富而强大的选项，可用于自定义备份、管理备份文件以及执行恢复；通常，您并不需要实施
  RMAN 的许多功能。然而，每次您实施 RMAN 来备份生产数据库时，都应该仔细考虑每个决策点，并决定是否需要某个属性。


  表 17-1 总结了后续章节中的 RMAN 实施内容。许多 DBA 对其中的一些建议会有不同意见；这没关系。关键在于您需要考虑每个架构方面，并确定什么最适合您的业务需求。


  ### 表 17-1 架构决策与建议概览


  | 决策点 | 建议 |

  | :--- | :--- |

  | 1. 远程还是本地运行 RMAN 客户端 | 在目标数据库服务器上本地运行客户端。 |

  | 2. 指定备份用户 | 创建一个用于执行备份的用户。 |

  | 3. 使用联机还是脱机备份 | 取决于您的业务需求。大多数生产数据库需要联机备份，这意味着您必须启用归档。 |

  | 4. 设置归档日志目标位置和文件格式 | 如果您使用了 FRA（快速恢复区），归档日志将以默认格式写入其中。若要使用`LOG_ARCHIVE_DEST_N`初始化参数明确地将位置设置在
  FRA 之外。 |

  | 5. 配置 RMAN 备份位置和文件格式 | 取决于您的业务需求。有些环境要求磁带备份。如果使用磁盘，请将备份放在 FRA 中，或通过通道设置指定位置。使用
  FRA 可以动态增加存储大小。在创建备份集后可以运行到磁带的备份，这通常效率更高。 |

  | 6. 设置控制文件的自动备份 | 始终启用控制文件的自动备份。 |

  | 7. 指定控制文件自动备份的位置 | 将其放在 FRA 中，或配置一个位置。将控制文件的自动备份写入与数据库备份相同的位置是合理的。 |

  | 8. 备份归档日志 | 取决于您的业务需求。对于许多环境，归档日志的备份可以每天进行一次，使用与备份数据库相同的命令，或者在空间需要时触发。 |

  | 9. 确定快照控制文件的位置 | 使用默认位置。 |

  | 10. 使用恢复目录 | 取决于您的业务需求。Oracle 建议您使用恢复目录。如果 RMAN 的保留策略时间大于`CONTROL_FILE_RECORD_KEEP_TIME`，那么我建议您使用恢复目录。
  |

  | 11. 使用介质管理器 | 这是直接备份到磁带所必需的。 |

  | 12. 设置`CONTROL_FILE_RECORD_KEEP_TIME`初始化参数 | 通常，默认的 7 天是足够的。 |

  | 13. 配置 RMAN 的备份保留策略 | 取决于您的数据库和业务需求。对于许多环境，我使用 1 或 2 的备份保留冗余度。 |

  | 14. 配置归档日志的删除策略 | 取决于您的数据库和业务需求。在许多场景中，将备份保留策略应用于归档日志就足够了（这是默认行为）。 |

  | 15. 设置并行度 | 取决于可用的硬件资源和业务需求。对于大多数具有多个 CPU 的生产服务器，基于可用的 CPU 数量，配置 2 或更高的并行度。 |

  | 16. 使用备份集还是镜像副本 | 备份集通常比镜像副本更小，且更易于管理。 |

  | 17. 使用增量备份 | 当大型数据库在两次备份之间只有很小比例的数据发生变化，并且您希望节省磁盘空间时，请使用增量备份。在大型数据库和数据仓库类数据库中使用增量备份。
  |

  | 18. 使用增量更新备份 | 如果您需要数据文件的镜像副本，请使用此方法。 |

  | 19. 使用块更改跟踪 | 使用此功能来提高增量备份的性能。对于大型数据仓库类数据库，块更改跟踪可以显著节省备份时间，因为它跟踪发生更改的数据块，因此备份不必读取块头来确定块是否已更改。
  |

  | 20. 配置二进制压缩 | 取决于您的业务需求。压缩备份占用空间更少，但在备份和恢复操作中需要更多的 CPU 资源（和时间）。 |

  | 21. 配置加密 | 取决于您的业务需求。 |

  | 22. 配置其他设置 | 您可以设置许多与通道相关的属性，例如备份集大小和备份片大小。根据需要配置。 |

  | 23. 配置信息输出 | 配置 OS 变量`NLS_DATE_FORMAT`以显示日期和时间。使用`SET ECHO ON`和`SHOW ALL`来显示 RMAN
  命令和设置。 |


  ## 1. 远程还是本地运行 RMAN 客户端


  可以从远程服务器运行`rman`实用程序，并通过 Oracle Net 连接到目标数据库：


  ```

  $ rman target sys/foo@remote_db

  ```


  这允许您从一个中心位置在不同的远程服务器上运行 RMAN 备份。当您远程运行 RMAN 时，备份文件总是在目标数据库服务器上创建。




  '
- '# Oracle RMAN 备份配置与实践指南


  ## 1. 本地与远程运行 RMAN

  当在本地运行并且数据库环境变量配置完成后，可以像这样运行 RMAN：


  ```

  $ rman target /

  ```


  如果您远程运行 RMAN，需要确保远程的 `rman` 可执行文件与目标数据库兼容。例如，您可能确认正在运行的远程 `rman` 可执行文件是 Oracle Database
  12c 版本的 RMAN 客户端，并且它与几个早期版本的 Oracle 数据库兼容。如果您在目标服务器上本地运行 `rman` 客户端，则永远不会出现兼容性问题，因为
  `rman` 客户端总是与目标数据库版本相同。


  ## 2. 指定备份用户

  如前所述，RMAN 要求您使用具有 `SYSDBA` 权限的数据库用户。无论我是从命令行运行 RMAN 还是在脚本中调用 RMAN，在大多数场景下，使用一个备份用户是合适的。例如，以下是如何从命令行连接到
  RMAN：


  ```

  $ rman target BACKUPUSER/$password

  ```


  一些 DBA 不使用这种方法；他们选择设置一个独立于 `SYS` 的用户，并以安全考虑作为理由。密码变量可以从一个安全的加密文件中读取密码，或者使用其他方法来获取密码。本章的其他示例可能会展示
  `SYS` 用户的用法：


  ```

  $ rman target

  ```


  ## 3. 使用联机或脱机备份

  大多数生产数据库都有 24-7 的可用性要求。因此，您唯一的选择是联机 RMAN 备份。您的数据库必须处于归档日志模式才能进行联机备份。您需要仔细考虑如何放置归档日志、如何格式化它们、备份频率以及删除前保留多长时间。这些主题将在后续章节中讨论。


  > **注意**

  > 如果您进行脱机备份，您必须使用 `IMMEDIATE`、`NORMAL` 或 `TRANSACTIONAL` 选项关闭数据库，然后将其置于加载模式。RMAN
  需要数据库处于加载模式才能读写控制文件。


  ## 4. 设置归档日志目标位置与文件格式

  启用归档重做日志模式是进行联机备份的先决条件（有关归档日志目标位置和格式的架构决策以及如何启用/禁用归档日志模式的完整讨论，请参见第 5 章）。


  当启用归档日志模式时，Oracle 会将归档日志写入以下一个或多个位置（您可以配置归档日志写入 FRA 以及通过初始化参数手动设置的其他几个位置）：


  *   默认位置

  *   FRA（快速恢复区）

  *   通过 `LOG_ARCHIVE_DEST_N` 初始化参数指定的位置


  如果您不使用 FRA，并且也没有通过 `LOG_ARCHIVE_DEST_N` 初始化参数显式设置归档日志目标位置，那么默认情况下，归档日志将被写入一个依赖于操作系统的默认位置。在许多
  Linux/Unix 系统上，默认位置是 `ORACLE_HOME/dbs` 目录。归档日志的默认文件名格式是 `%t_%s_%r.dbf`。这个格式是引用日期、备份集编号等的简写。其中
  `%t` 是时间戳，`%s` 是日志序列号，`%r` 是重置日志 ID。


  如果您启用了 FRA（并且没有设置 `LOG_ARCHIVE_DEST_N`），那么默认情况下，归档日志会被写入 FRA 中的一个目录。在 FRA 中创建的归档日志文件的默认文件名格式是
  Oracle 托管文件格式。这些文件存储在一个与数据库唯一名同名的子目录中；例如：


  ```

  ///archivelog//o1_mf_1_1078_68dx5dyj_.arc

  ```


  推荐使用 FRA。要使用 `LOG_ARCHIVE_DEST_N` 参数设置归档日志文件的位置，请遵循以下示例：


  ```

  log_archive_dest_1=''LOCATION=/oraarch1/CHNPRD''

  ```


  这里还有一个推荐的默认归档日志文件名格式：


  ```

  log_archive_format=''%t_%s_%r.arc''

  ```


  有时，DBA 对数据文件和归档日志文件都使用 `.dbf` 作为扩展名。我更喜欢对归档日志文件使用 `.arc`。`.arc` 扩展名避免了将文件识别为归档日志文件还是实时数据库数据文件的潜在混淆任务。


  ## 5. 配置 RMAN 备份位置与文件格式

  当您为基于磁盘的备份运行 `BACKUP` 命令时，RMAN 会在以下位置之一创建备份片：


  *   默认位置

  *   FRA

  *   通过 `BACKUP...FORMAT` 命令指定的位置

  *   通过 `CONFIGURE CHANNEL...FORMAT` 命令指定的位置


  ### 5.1 默认位置

  如果您没有配置任何 RMAN 变量，也没有设置 FRA，默认情况下 RMAN 会分配一个基于磁盘的通道，并将备份文件写入默认位置。例如，您可以不配置任何 RMAN
  参数直接运行以下命令：


  ```

  RMAN> backup database;

  ```


  默认位置因操作系统而异。在许多 Linux/Unix 环境中，默认位置是 `ORACLE_HOME/dbs`。所创建备份文件的默认名称格式是 OMF 格式；例如：


  ```

  /dbs/01ln9g7e_1_1

  ```


  > **提示**

  > 默认位置对于小型开发数据库来说是可以的。然而，对于大多数其他环境（尤其是生产环境），您需要提前规划备份所需的磁盘空间，并通过其他方法之一（例如实施 FRA
  或 `CONFIGURE CHANNEL`）显式设置备份位置。


  ### 5.2 FRA

  当备份到磁盘时，如果您没有明确指示 RMAN 将备份写入特定位置（通过 `FORMAT` 或 `CONFIGURE` 命令），并且您正在使用 FRA，RMAN
  会自动将备份文件写入 FRA 中的目录。当您使用 FRA 时，RMAN 在给定日期首次备份数据库时会自动创建单独的目录。这些文件存储在一个与数据库唯一名同名的子目录中。此外，在
  FRA 中创建的备份文件的默认名称格式是 OMF 格式；例如：


  ```

  ///backupset//o1_mf_nnndf_TAG20100907T025402_68czfbdf_.bkp

  ```


  可以使用 `SYSTEM` 动态参数设置 FRA 的大小或位置。这在备份集仍在被清除或归档日志填满空间时非常有用；与其等待备份或文件移动完成，不如调整 FRA
  的大小，然后再将其缩小回原始大小。


  ### 5.3 BACKUP...FORMAT

  如果您已配置了 FRA，但不希望 RMAN 备份文件自动放入 FRA，您可以在发出 `BACKUP` 命令时直接指定希望备份放置的位置；例如：


  ```

  RMAN> backup database format ''/u01/O18C/rman/rman_%U.bkp'';

  ```


  以下是 RMAN 生成的一个对应文件：


  ```

  /u01/O18C/rman/rman_0jnv0557_1_1.bkp

  ```


  其中的 `%U` 指示 RMAN 为备份文件名动态构造一个唯一字符串。在大多数情况下需要唯一的名称，因为 RMAN 不会覆盖已存在的文件。这一点很重要，因为如果您指示
  RMAN 并行写入，它需要为每个通道创建唯一的文件名；例如：


  ```

  RMAN> configure device type disk parallelism 2;

  ```


  现在，当您运行 `BACKUP` 命令时，会看到这条消息：


  ```

  RMAN> backup database format ''/u01/O18C/rman/rman_%U.bkp'';

  ```


  RMAN 分配多个通道并并行写入两个不同的备份文件。格式字符串中的 `%U` 保证创建的文件名是唯一的。


