- '# 19. RMAN 恢复与还原


  关于恢复操作，甚至每月为执行还原而进行的演练，我可以给你讲不少故事。备份是否有效，关键在于你能否成功还原；希望你永远用不上它，但还原过程必须被记录、测试和演练。通过演练，可以暴露错误并记录可能出现的异常情况，这样在压力下需要紧急完成还原的关键时刻，多年的练习将派上用场。这也有助于验证是否有可用的有效备份，正如合著者在一位
  DBA 的故事中所描述的：


  几年前的一个周六上午，我正在进行一次长距离的自行车骑行。骑行到一半时，手机响了。是数据中心的一位运维支持技术员。他告诉我一个关键任务数据库服务器行为异常，我应该尽快登录并确保一切正常。我告诉他大约
  15 分钟后我才能登录。于是，我以最快速度赶回家检查生产服务器。到家后，我登录到数据库服务器，尝试启动`SQL*Plus`，立刻收到一个错误，指示`SQL*Plus`二进制文件已损坏。太棒了。我甚至无法登录`SQL*Plus`。情况不妙。


  我让系统管理员从操作系统备份中恢复了 Oracle 二进制文件。然后启动了`SQL*Plus`。数据库已经崩溃，所以我尝试启动它。输出显示所有数据文件都存在介质故障。经过一些分析，发现存在一些文件系统问题，导致磁盘上的所有这些文件都已损坏：

  *   数据文件

  *   控制文件

  *   归档重做日志

  *   在线重做日志文件

  *   RMAN 备份片


  这几乎是一场全面的灾难。我的总监询问我们的选择。我回答说：“我们只需从最后一次磁带备份中还原数据库，我们会丢失那些尚未备份到磁带的归档重做日志中的数据。”


  存储管理员被召集来，指示他们还原最近一次写入磁带的 RMAN 备份集。大约 15 分钟后，我们能听到磁带管理员们在压低声音交谈。其中一人说：“我们完蛋了。这台服务器上任何数据库的
  RMAN 备份，我们都没有磁带备份。”


  那是一个黑暗的时刻。最坏的情况是从 DDL 脚本重建数据库，并丢失 3 年的生产数据。这不是一个令人愉快的选择。


  在检查生产服务器后，我发现之前的一位生产支持 DBA（讽刺的是，他因预算削减在几天前刚被解雇）已经实施了一个作业，将 RMAN 备份复制到生产环境中的另一台服务器。那台服务器上的
  RMAN 备份完好无损。我得以从这些备份中还原并恢复了生产数据库。我们丢失了大约一天的数据（介于损坏的归档日志和停机时间之间，期间不允许传入任何交易），但在接到第一个电话后大约
  20 个小时，我们成功完成了数据库的还原和恢复。那真是漫长的一天。


  大多数需要还原和恢复的情况都不会像刚才描述的那样糟糕。即使在那些有安全保障且自然灾害很少的地方，似乎也总会发生一些事情，促使你想测试恢复过程并验证备份的有效性。然而，前面的场景确实突显了以下需求的必要性：

  *   备份策略

  *   具备备份与恢复技能的 DBA

  *   还原与恢复策略，包括定期测试还原和恢复的要求


  本章将引导你使用 RMAN 完成还原和恢复过程。本章涵盖了处理介质故障时你将必须执行的许多常见任务。


  ## 确定是否需要介质恢复


  术语*介质恢复*是指还原因底层存储介质（通常是某种磁盘）故障或文件被意外删除而丢失或损坏的文件。通常，你会通过类似以下错误知道需要进行介质恢复：


  ```

  ORA-01157: cannot identify/lock data file 1 - see DBWR trace file

  ORA-01110: data file 1: ''/u01/dbfile/o12c/system01.dbf''

  ```


  在执行 DBA 任务（如停止和启动数据库）时，此错误可能会显示在屏幕上。或者，你可能在跟踪文件或`alert.log`文件中看到此类错误。也有可能由于文件未被写入或操作系统的原因，错误显示可能会延迟。如果你没有立即注意到问题，一旦发生严重的介质故障，数据库将停止处理交易，用户会开始打电话找你。


  要理解 Oracle 如何确定需要介质恢复，你必须首先了解 Oracle 如何确定一切正常。当 Oracle 正常关闭（`IMMEDIATE`、`TRANSACTIONAL`、`NORMAL`）时，关闭过程的一部分是将内存中所有已修改的块刷新到磁盘，在每个数据文件的头部标记当前
  SCN，并用当前 SCN 信息更新控制文件。


  启动时，Oracle 会检查控制文件中的 SCN 是否与数据文件头部的 SCN 匹配。如果匹配，Oracle 会尝试打开数据文件和在线重做日志文件。如果所有文件都可用且可以打开，Oracle
  将正常启动。以下查询比较控制文件中（针对每个数据文件）的 SCN 与数据文件头部的 SCN：


  ```

  SQL> SET LINES 132

  SQL> COL name             FORM a40

  SQL> COL status           FORM A8

  SQL> COL file#            FORM 9999

  SQL> COL control_file_SCN FORM 999999999999999

  SQL> COL datafile_SCN     FORM 999999999999999

  --

  SQL> SELECT

  a.name

  ,a.status

  ,a.file#

  ,a.checkpoint_change# control_file_SCN

  ,b.checkpoint_change# datafile_SCN

  ,CASE

  WHEN ((a.checkpoint_change# - b.checkpoint_change#) = 0) THEN ''Startup Normal''

  WHEN ((b.checkpoint_change#) = 0)                        THEN ''File Missing?''

  WHEN ((a.checkpoint_change# - b.checkpoint_change#) > 0) THEN ''Media Rec. Req.''

  WHEN ((a.checkpoint_change# - b.checkpoint_change#) < 0) THEN ''Old Control File''

  ELSE ''what the ?''

  END datafile_status

  FROM v$datafile        a -- control file SCN for datafile

  ,v$datafile_header b -- datafile header SCN

  WHERE a.file# = b.file#

  ORDER BY a.file#;

  ```


  如果控制文件 SCN 值大于数据文件 SCN 值，则很可能需要进行介质恢复。如果你从备份中还原了数据文件，并且还原的数据文件的 SCN 小于当前控制文件中的数据文件
  SCN，就会出现这种情况。


  提示

  `V$DATAFILE_HEADER`视图以磁盘上的物理数据文件作为其数据源。`V$DATAFILE`视图以控制文件作为其数据源。


  你也可以直接查询`V$DATAFILE_HEADER`以获取更多信息。`ERROR`和`RECOVER`列报告任何潜在问题。例如，`RECOVER`列中的`YES`或`null`值表示存在问题：


  ```

  SQL> select file#, status, error, recover from v$datafile_header;

  ```


  这是一些示例输出：


  ```

  FILE# STATUS  ERROR                REC

  ---------- ------- -------------------- ---

  1 ONLINE  FILE NOT FOUND

  2 ONLINE                       NO

  3 ONLINE                       NO

  ```


  ## 确定要还原什么


  介质恢复要求你执行手动任务，以使数据库恢复完整。这些任务通常涉及`RESTORE`和`RECOVER`命令的组合。如果由于某种原因（文件被意外删除、磁盘故障等），你的数据文件发生了介质故障，你将不得不发出
  RMAN `RESTORE`命令。


  ## 过程如何工作



  '
- '# RMAN 数据库恢复概述


  ## 恢复过程


  当您发出 `RESTORE` 命令时，RMAN 会自动决定如何从以下任何可用备份中提取数据文件：


  *   全量数据库备份

  *   增量 0 级备份

  *   由 `BACKUP AS COPY` 命令生成的映像副本备份


  文件从备份中恢复后，您需要通过 `RECOVER` 命令将重做日志应用于它们。当您发出 `RECOVER` 命令时，Oracle 会检查受影响数据文件中的 SCN，并判断是否有任何文件需要恢复。如果数据文件中的
  SCN 小于控制文件中对应的 SCN，则需要进行介质恢复。


  Oracle 检索数据文件的 SCN，然后在重做流中查找对应的 SCN，以确定从何处开始恢复过程。如果起始恢复 SCN 位于在线重做日志文件中，则不需要归档日志文件用于恢复。


  在恢复期间，RMAN 会自动决定如何应用重做。首先，RMAN 会应用任何大于 0 级的可用增量备份，例如增量 1 级备份。接下来，应用磁盘上的任何归档日志文件。如果磁盘上不存在归档日志文件，RMAN
  会尝试从备份集中检索它们。


  ## 执行完全恢复的条件


  要能够执行完全恢复，所有以下条件都需要满足：


  *   您的数据库处于归档日志模式。

  *   您有一个良好的数据库基线备份。

  *   您拥有自备份以来生成的任何必需重做（归档日志文件、在线重做日志文件或 RMAN 可以用于恢复而无需应用重做的增量备份）。


  ## 恢复与恢复场景


  恢复和恢复的场景多种多样。如何恢复和恢复直接取决于您的备份策略以及哪些文件已损坏。以下是面对介质故障时的一般步骤：


  1.  确定需要恢复哪些文件。

  2.  根据损坏情况，将数据库模式设置为 `nomount`、`mount` 或 `open`。

  3.  使用 `RESTORE` 命令从 RMAN 备份中检索文件。

  4.  对需要恢复的数据文件使用 `RECOVER` 命令。

  5.  打开您的数据库。


  您特定的恢复和恢复场景可能不需要执行所有上述步骤。例如，您可能只想恢复您的 `spfile`，这不需要恢复步骤。


  恢复与恢复过程的第一步是确定哪些文件经历了介质故障。您通常可以从以下来源确定需要恢复的文件：


  *   屏幕上显示的错误消息，来自 RMAN 或 SQL*Plus

  *   `Alert.log` 文件和对应的跟踪文件

  *   数据字典视图


  此外，除了前面列出的方法，您还应考虑使用数据恢复顾问来获取有关故障范围和相应纠正措施的信息。


  ## 数据恢复顾问


  数据恢复顾问工具在 Oracle Database 11g 中引入。在发生介质故障时，此工具将显示故障的详细信息、建议纠正措施，如果您指定，它还可以执行推荐的措施。这就像在恢复和恢复情况下拥有另一双眼睛来提供反馈。数据恢复顾问有四种模式：


  *   列出故障

  *   建议纠正措施

  *   运行命令以修复故障

  *   更改故障状态


  数据恢复顾问从 RMAN 中调用。您可以将数据恢复顾问视为一组在处理介质故障时可以协助您的 RMAN 命令。


  ### 列出故障


  使用数据恢复顾问时，`LIST FAILURE` 命令用于显示数据文件、控制文件或在线重做日志的任何问题：


  ```

  RMAN> list failure;

  ```


  如果没有检测到故障，您将看到一条指示没有故障的消息。以下是一些示例输出，表明数据文件可能存在问题：


  ```

  List of Database Failures

  =========================

  Failure ID Priority Status    Time Detected Summary

  ---------- -------- --------- ------------- -------

  6222       CRITICAL OPEN      12-JAN-18     System datafile 1:

  ''/u01/dbfile/o18c/system01.dbf'' is missing

  ```


  要显示有关故障的更多信息，请使用 `DETAIL` 子句：


  ```

  RMAN> list failure 6222 detail;

  ```


  以下是此示例的附加输出：


  ```

  Impact: Database cannot be opened

  ```


  对于这种类型的故障，前面的输出表明数据库无法打开。


  > 提示

  > 如果您怀疑存在介质故障，但数据恢复顾问没有报告任何问题，请运行 `VALIDATE DATABASE` 命令来验证数据库是否完整。


  ### 建议纠正措施


  `ADVISE FAILURE` 命令提供关于如何从数据恢复顾问检测到的潜在问题中恢复的建议。如果您的数据库有多个故障，您可以直接指定故障 ID 以获取对特定故障的建议，如下所示：


  ```

  RMAN> advise failure 6222;

  ```


  以下是此特定问题的输出片段：


  ```

  Optional Manual Actions

  =======================

  1. If file /u01/dbfile/o18c/system01.dbf was unintentionally renamed or moved,

  restore it

  Automated Repair Options

  ========================

  Option Repair Description

  ------ ------------------

  1      Restore and recover datafile 1

  Strategy: The repair includes complete media recovery with no data loss

  Repair script: /ora01/app/oracle/diag/rdbms/o18c/o18c/hm/reco_4116328280.hm

  ```


  在这种情况下，数据恢复顾问创建了一个可用于潜在修复问题的脚本。可以使用操作系统实用程序查看修复脚本的内容；例如，


  ```

  $ cat /ora01/app/oracle/diag/rdbms/o18c/o18c/hm/reco_4116328280.hm

  ```


  以下是此示例脚本的内容：


  ```

  # restore and recover datafile

  restore ( datafile 1 );

  recover datafile 1;

  sql ''alter database datafile 1 online'';

  ```


  查看脚本后，您可以决定手动运行建议的命令，或者让数据恢复顾问通过 `REPAIR` 命令运行该脚本（详见下一节）。


  ### 修复故障


  如果您已识别故障并查看了建议，可以着手进行修复工作。如果您想在不实际运行命令的情况下检查 `REPAIR FAILURE` 命令将执行的操作，请使用 `PREVIEW`
  子句：


  ```

  RMAN> repair failure preview;

  ```


  在运行 `REPAIR FAILURE` 命令之前，请确保您首先在同一连接会话中运行了 `LIST FAILURE` 和 `ADVISE FAILURE` 命令。换句话说，您所在的
  RMAN 会话必须在同一会话中运行 `LIST` 和 `ADVISE` 命令，然后才能运行 `REPAIR` 命令。


  如果您对修复建议满意，则运行 `REPAIR FAILURE` 命令：


  ```

  RMAN> repair failure;

  ```


  此时您将收到确认提示：


  ```

  Do you really want to execute the above repair (enter YES or NO)?

  ```


  输入 `YES` 以继续：


  ```

  YES

  ```


  如果一切顺利，您应该在输出中看到类似这样的最终消息：


  ```

  repair failure complete

  ```


  > 注意

  > 您可以从 RMAN 命令提示符或 Enterprise Manager 运行数据恢复顾问命令。


  通过这种方式，您可以使用 RMAN 命令 `LIST FAILURE`、`ADVISE FAILURE` 和 `REPAIR FAILURE` 来解决介质故障。


  ### 更改故障状态


  关于数据恢复顾问的最后一点说明：如果您知道您发生了一个故障并且它不是关键性的（例如，从不再使用的表空间中丢失了数据文件），那么使用 `CHANGE FAILURE`
  命令来更改故障的优先级。在此示例中，有一个属于非关键表空间的缺失数据文件。首先，通过 `LIST FAILURE` 命令获取故障优先级：


  ```

  RMAN> list failure;

  ```


  以下是一些示例输出：


  '
- '# 使用 RMAN 管理 Oracle 数据库


  ## 故障优先级更改


  ```

  Failure ID Priority Status    Time Detected Summary

  ---------- -------- --------- ------------- -------

  5          HIGH     OPEN      12-JAN-18     One or more non-system datafiles

  are missing

  ```


  接下来，使用 `CHANGE FAILURE` 命令将优先级从 `HIGH` 更改为 `LOW`：


  ```

  RMAN> change failure 5 priority low;

  ```


  系统将提示您确认是否真的要更改优先级：


  ```

  Do you really want to change the above failures (enter YES or NO)?

  ```


  如果您确实要更改优先级，请键入 `YES` 并按 Enter 键。如果您再次运行 `LIST FAILURE` 命令，您将看到优先级现已更改为 `LOW`：


  ```

  RMAN> list failure low ;

  ```


  ## 使用 RMAN 停止/启动 Oracle


  您可以使用 RMAN 以几乎与 SQL*Plus 相同的方法来停止和启动数据库。在执行还原和恢复操作时，通常在 RMAN 内部停止和启动数据库更为方便。以下 RMAN
  命令可用于停止和启动数据库：


  *   `SHUTDOWN`

  *   `STARTUP`

  *   `ALTER DATABASE`


  ### 关闭数据库


  RMAN 中的 `SHUTDOWN` 命令与 SQL*Plus 中的工作方式相同。有四种类型的关闭模式：`ABORT`、`IMMEDIATE`、`NORMAL`
  和 `TRANSACTIONAL`。我通常首先尝试使用 `SHUTDOWN IMMEDIATE` 来停止数据库。以下是一些示例：


  ```

  RMAN> shutdown immediate;

  RMAN> shutdown abort;

  ```


  如果您未指定关闭选项，则默认为 `NORMAL`。使用 `NORMAL` 模式关闭数据库很少可行，因为此模式会等待当前连接的用户在闲暇时断开连接。


  #### 启动数据库


  与 SQL*Plus 一样，您可以组合使用 RMAN 中的 `STARTUP` 和 `ALTER DATABASE` 命令来逐步引导数据库通过启动阶段，如下所示：


  ```

  RMAN> startup nomount;

  RMAN> alter database mount;

  RMAN> alter database open;

  ```


  这是另一个示例：


  ```

  RMAN> startup mount;

  RMAN> alter database open;

  ```


  如果要以受限访问模式启动数据库，请使用 `DBA` 选项：


  ```

  RMAN> startup dba;

  ```


  提示：从 Oracle Database 12c 开始，您可以直接在 RMAN 内运行所有 SQL 语句，而无需指定 RMAN `sql` 命令。


  ## 完整恢复


  如第 16 章所述，术语 `complete recovery` 表示您可以还原在故障发生前已提交的所有事务。`Complete recovery` 并不意味着要还原和恢复数据库中的所有数据文件。例如，如果您有一个数据文件发生介质故障，并且您还原并恢复了该数据文件，那么您正在执行的就是完全恢复。对于完全恢复，必须满足以下条件：


  *   您的数据库处于归档日志模式。

  *   您拥有发生介质故障的数据文件的良好基线备份。

  *   您拥有自上次备份以来生成的任何必需重做。

  *   所有归档重做日志从上次备份开始时起都存在。

  *   RMAN 可用于恢复的任何增量备份均可用（如果使用）。

  *   包含尚未归档的事务的联机重做日志可用。


  如果您遇到了介质故障，并且拥有执行完全恢复所需的文件，那么您就可以还原和恢复数据库。


  ## 测试恢复与恢复


  您可以在实际执行还原和恢复之前，确定 RMAN 将使用哪些文件进行还原和恢复。您还可以指示 RMAN 验证将用于还原和恢复的备份文件的完整性。


  ### 预览恢复所用备份


  使用 `RESTORE...PREVIEW` 命令列出 RMAN 将用于还原和恢复数据库数据文件的备份和归档重做日志文件。`RESTORE...PREVIEW`
  命令不会实际还原任何文件，而是列出将用于还原操作的备份文件。此示例详细预览了整个数据库还原和恢复所需的备份：


  ```

  RMAN> restore database preview;

  ```


  您还可以在摘要详细信息级别预览所需的备份文件：


  ```

  RMAN> restore database preview summary;

  ```


  以下是部分输出片段：


  ```

  List of Backup Sets

  ===================

  BS Key  Type LV Size       Device Type Elapsed Time Completion Time

  ------- ---- -- ---------- ----------- ------------ ---------------

  224     Full    775.37M    DISK        00:02:22     12-JAN-18

  BP Key: 229  Status: AVAILABLE  Compressed: NO  Tag: TAG20130112T120713

  Piece Name: /u02/O18C/rman/r29gnv7q7i_1_1.bk

  List of Datafiles in backup set 224

  File LV Type Ckp SCN    Ckp Time  Name

  ---- -- ---- ---------- --------- ----

  1       Full 4586940    12-JAN-18 /u01/dbfile/o18c/system01.dbf

  3       Full 4586940    12-JAN-18 /u01/dbfile/o18c/undotbs01.dbf

  4       Full 4586940    12-JAN-18 /u01/dbfile/o18c/users01.dbf

  ```


  以下是预览还原和恢复所需备份的更多示例：


  ```

  RMAN> restore tablespace system preview;

  RMAN> restore archivelog from time ''sysdate -1'' preview;

  RMAN> restore datafile 1, 2, 3 preview ;

  ```


  ### 恢复前验证备份文件


  您可以在不实际还原任何内容的情况下，对备份文件执行多个级别的验证。如果您只想让 RMAN 验证文件是否存在并检查文件头，请使用 `RESTORE...VALIDATE
  HEADER` 命令，如下所示：


  ```

  RMAN> restore database validate header;

  ```


  此命令仅验证备份文件的存在并检查文件头。您可以通过 `RESTORE...VALIDATE` 命令（不带 `HEADER` 子句）进一步指示 RMAN 验证还原数据库数据文件所需的备份文件中块的完整性。同样，RMAN
  在此模式下不会还原任何数据文件：


  ```

  RMAN> restore database validate;

  ```


  此命令仅检查备份文件中的物理损坏。您还可以检查逻辑损坏（以及物理损坏），如下所示：


  ```

  RMAN> restore database validate check logical;

  ```


  以下是使用 `RESTORE...VALIDATE` 的其他一些示例：


  ```

  RMAN> restore datafile 1,2,3 validate;

  RMAN> restore archivelog all validate;

  RMAN> restore controlfile validate;

  RMAN> restore tablespace system validate;

  ```


  ### 测试介质恢复


  前面的部分介绍了报告和验证还原操作。您还可以通过 `RECOVER...TEST` 命令指示 RMAN 验证恢复过程。在执行测试恢复之前，您需要确保要恢复的数据文件处于脱机状态。对于处于测试模式下恢复的任何联机数据文件，Oracle
  都会抛出错误。


  在此示例中，首先还原表空间 `USERS`，然后执行试用恢复：


  ```

  RMAN> connect target /

  RMAN> startup mount;

  RMAN> restore tablespace users;

  RMAN> recover tablespace users test;

  ```


  如果恢复所需的任何归档重做日志缺失，则会抛出以下错误：


  ```

  RMAN-06053: unable to perform media recovery because of missing log

  RMAN-06025: no backup of archived log for thread 1 with sequence 6 ...

  ```


  如果恢复测试成功，您将看到类似以下的消息，表明重做的应用已通过测试但未实际应用：


  ```

  ORA-10574: Test recovery did not corrupt any data block

  ORA-10573: Test recovery tested redo from change 4586939 to 4588462

  ORA-10572: Test recovery canceled due to errors

  ORA-10585: Test recovery can not apply redo that may modify control file

  ```


  以下是测试恢复过程的一些其他示例：


  '
- '# RMAN 数据库恢复与还原指南


  ## 还原与恢复整个数据库


  ### `RESTORE DATABASE` 命令


  `RESTORE DATABASE` 命令将还原数据库中的每个数据文件。例外情况是当 RMAN 检测到数据文件已被还原时；在那种情况下，它不会再次还原它们。如果你想覆盖该行为，请使用
  `FORCE` 命令。


  当你执行 `RECOVER DATABASE` 命令时，RMAN 会自动将重做日志应用到任何需要恢复的数据文件上。恢复过程包括应用在以下文件中找到的更改：


  *   增量备份片（仅在使用增量备份时适用）

  *   归档日志文件（自上次备份或应用的增量备份以来生成的）

  *   在线重做日志文件（当前且未归档的）


  在还原和恢复过程完成后，你可以打开你的数据库。完全数据库恢复仅在你拥有数据库的良好备份以及备份后生成的所有重做日志访问权限时才有效。你需要所有恢复数据库数据文件所需的重做日志。如果你没有所有必需的重做日志，那么你很可能必须执行不完全恢复（参见本章后面的“不完全恢复”部分）。


  > **注意**

  > 你的数据库必须至少处于 `MOUNT` 状态才能使用 RMAN 还原数据文件。这是因为在还原和恢复过程中，RMAN 从控制文件中读取信息。


  你可以使用当前控制文件或备份控制文件来执行完整的数据库级恢复。


  ### 使用当前控制文件


  你必须首先将数据库置于 `MOUNT` 模式以执行数据库范围的还原和恢复。这是因为 Oracle 不允许你在与 `SYSTEM` 表空间关联的数据文件正在被还原和恢复时以
  `OPEN` 模式操作数据库。在这种情况下，以 `MOUNT` 模式启动数据库，发出 `RESTORE` 和 `RECOVER` 命令，然后打开数据库，如下所示：


  ```bash

  $ rman target /

  RMAN> startup mount;

  RMAN> restore database;

  RMAN> recover database;

  RMAN> alter database open;

  ```


  如果一切按预期进行，你最后应该看到的消息是：


  ```

  Statement processed

  ```


  ### 使用备份控制文件


  此技术使用从快速恢复区（FRA）检索的控制文件的自动备份（有关如何还原控制文件的更多示例，请参阅本章后面的“还原控制文件”部分）。在这种情况下，控制文件首先从备份中检索，然后再还原和恢复数据库：


  ```bash

  $ rman target /

  RMAN> startup nomount;

  RMAN> restore controlfile from autobackup;

  RMAN> alter database mount;

  RMAN> restore database;

  RMAN> recover database;

  RMAN> alter database open resetlogs;

  ```


  如果成功，你最后应该看到的消息是：


  ```

  Statement processed

  ```


  ## 还原与恢复表空间


  有时，你会遇到仅限于特定表空间或一组表空间的介质故障。在这种情况下，适合在表空间粒度级别进行还原和恢复。RMAN 的 `RESTORE TABLESPACE`
  和 `RECOVER TABLESPACE` 命令将还原和恢复与指定表空间关联的所有数据文件。


  ### 数据库打开时还原表空间


  如果你的数据库是打开的，那么你必须将要还原和恢复的表空间脱机。除了 `SYSTEM` 和 `UNDO` 表空间，你可以对任何表空间执行此操作。此示例在数据库打开时还原和恢复
  `USERS` 表空间：


  ```bash

  $ rman target /

  RMAN> alter tablespace users offline immediate;

  RMAN> restore tablespace users;

  RMAN> recover tablespace users;

  RMAN> alter tablespace users online;

  ```


  在表空间联机后，你应该会看到类似这样的消息：


  ```

  sql statement: alter tablespace users online

  ```


  ### 数据库处于 MOUNT 模式时还原表空间


  通常，在执行还原和恢复时，DBA 会关闭数据库并以 `MOUNT` 模式重新启动它，为执行恢复做准备。将数据库置于 `MOUNT` 模式可确保没有用户连接到数据库，并且没有事务正在进行。


  此外，如果你正在还原和恢复 `SYSTEM` 表空间，则必须以 `MOUNT` 模式启动数据库。Oracle 不允许在数据库打开时还原和恢复 `SYSTEM`
  表空间数据文件。下一个示例在数据库处于 `MOUNT` 模式时还原 `SYSTEM` 表空间：


  ```bash

  $ rman target /

  RMAN> shutdown immediate;

  RMAN> startup mount;

  RMAN> restore tablespace system;

  RMAN> recover tablespace system;

  RMAN> alter database open;

  ```


  如果成功，你最后应该看到的消息是：


  ```

  Statement processed

  ```


  ### 还原只读表空间


  当你发出 `RESTORE DATABASE` 命令时，RMAN 会与数据库的其余部分一起还原只读表空间。例如，以下命令将还原所有数据文件（包括那些处于只读模式的数据文件）：


  ```bash

  RMAN> restore database;

  ```


  > **注意**

  > 如果你使用的是在只读表空间置于只读模式之后创建的备份，则无需对只读数据文件进行恢复。在这种情况下，自备份以来，只读表空间没有生成任何重做日志。


  ## 还原临时表空间


  你不必还原或重新创建丢失的本地管理临时表空间临时文件。当你为使用而打开数据库时，Oracle 会自动检测并重新创建本地管理临时表空间临时文件。


  当 Oracle 自动重新创建临时表空间时，它会将一条消息记录到你的目标数据库 `alert.log` 中，如下所示：


  ```

  Re-creating tempfile

  ```


  如果由于任何原因，你的临时表空间变得不可用，你也可以自己重新创建它。因为临时表空间中从来没有永久对象，所以你可以根据需要简单地重新创建它们。以下是如何创建本地管理临时表空间的示例：


  ```sql

  SQL> CREATE TEMPORARY TABLESPACE temp TEMPFILE

  ''/u01/dbfile/o18c/temp01.dbf'' SIZE 1000M

  EXTENT MANAGEMENT

  LOCAL UNIFORM SIZE 512K;

  ```


  如果你的临时表空间存在，但临时数据文件丢失，你可以直接添加它们，如下所示：


  ```sql

  SQL> alter tablespace temp

  add tempfile ''/u01/dbfile/o18c/temp02.dbf'' SIZE 5000M REUSE;

  ```


  ## 还原与恢复数据文件


  当介质故障仅限于一小部分数据文件时，数据文件级别的恢复和恢复非常有效。对于数据文件级别的恢复，你可以指示 RMAN 使用数据文件名或数据文件号进行还原和恢复。对于不与
  `SYSTEM` 或 `UNDO` 表空间关联的数据文件，你可以在数据库保持打开状态时选择进行还原和恢复。但是，当数据库打开时，你必须首先将任何正在还原和恢复的数据文件脱机。


  ### 数据库打开时还原和恢复数据文件


  使用 `RESTORE DATAFILE` 和 `RECOVER DATAFILE` 命令在数据文件级别进行还原和恢复。当数据库打开时，要求你将任何试图还原和恢复的数据文件脱机。此示例在数据库打开时还原和恢复数据文件：


  ```bash

  RMAN> alter database datafile 4, 5 offline;

  RMAN> restore datafile 4, 5;

  RMAN> recover datafile 4, 5;

  RMAN> alter database datafile 4, 5 online;

  ```


  > **提示**

  > 使用 RMAN 的 `REPORT SCHEMA` 命令列出数据文件名称和文件编号。你也可以查询 `V$DATAFILE` 的 `NAME` 和 `FILE#`
  列来获取名称和编号。


  你也可以指定要还原和恢复的数据文件的名称；例如，


  '
- '# Oracle RMAN 数据文件恢复与介质恢复技术


  ## 在数据库未打开时恢复与恢复数据文件


  在此场景中，数据库首先被关闭，然后在 `mount` 模式下启动。你可以在数据库未打开时恢复和恢复任何数据文件。此示例展示了恢复与 `SYSTEM` 表空间相关联的数据文件
  1：


  ```bash

  $ rman target /

  RMAN> shutdown abort;

  RMAN> startup mount;

  RMAN> restore datafile 1;

  RMAN> recover datafile 1;

  RMAN> alter database open;

  ```


  在执行数据文件恢复时，你也可以指定文件名：


  ```bash

  $ rman target /

  RMAN> shutdown abort;

  RMAN> startup mount;

  RMAN> restore datafile ''/u01/dbfile/o18c/system01.dbf'';

  RMAN> recover datafile ''/u01/dbfile/o18c/system01.dbf'';

  RMAN> alter database open ;

  ```


  ## 将数据文件恢复到非默认位置


  有时会发生故障，导致与某个挂载点关联的磁盘无法操作。在这些情况下，你需要将数据文件恢复和恢复到与其原始位置不同的位置。另一个需要将数据文件恢复到非默认位置的典型场景是，将文件恢复到不同的数据库服务器上，该服务器的挂载点与备份来源服务器的挂载点完全不同。


  使用 `SET NEWNAME` 和 `SWITCH` 命令将数据文件恢复到非默认位置。这两个命令都必须在 RMAN `run{}` 块内运行。你可以将使用 `SET
  NEWNAME` 和 `SWITCH` 视为重命名数据文件的一种方式（类似于 SQL*Plus 的 `ALTER DATABASE RENAME FILE` 语句）。


  此示例展示了在恢复和恢复时更改数据文件的位置。首先，将数据库置于 `mount` 模式：


  ```bash

  $ rman target /

  RMAN> startup mount;

  ```


  然后，运行以下 RMAN 代码块：


  ```bash

  run{

  set newname for datafile 4 to ''/u02/dbfile/o18c/users01.dbf'';

  set newname for datafile 5 to ''/u02/dbfile/o18c/users02.dbf'';

  restore datafile 4, 5;

  switch datafile all; # 使用新数据文件位置更新仓库。

  recover datafile 4, 5;

  alter database open;

  }

  ```


  以下是部分输出列表：


  ```text

  datafile 4 switched to datafile copy

  input datafile copy RECID=79 STAMP=804533148 file name=/u02/dbfile/o18c/users01.dbf

  datafile 5 switched to datafile copy

  input datafile copy RECID=80 STAMP=804533148 file name=/u02/dbfile/o18c/users02.dbf

  ```


  如果数据库是打开的，你可以将数据文件脱机，然后设置它们的新名称以进行恢复和恢复，如下所示：


  ```bash

  run{

  alter database datafile 4, 5 offline;

  set newname for datafile 4 to ''/u02/dbfile/o18c/users01.dbf'';

  set newname for datafile 5 to ''/u02/dbfile/o18c/users02.dbf'';

  restore datafile 4, 5;

  switch datafile all; # 使用新数据文件位置更新仓库。

  recover datafile 4, 5;

  alter database datafile 4, 5 online;

  }

  ```


  ## 执行块级恢复


  块级损坏很少发生，通常由某种 I/O 错误引起。它可以帮助你避免对数据文件进行完整的恢复。我以前确实遇到过这个问题，现在有了块检查和 ASM 自动修复，这种情况可能变得更加罕见。但是，如果你在一个大型数据文件中确实存在孤立的损坏块，能够选择执行块级恢复是很有用的。块级恢复在数据文件中只有少量块损坏时非常有用。如果整个数据文件都需要介质恢复，则块恢复不合适。


  每当运行 `BACKUP`、`VALIDATE` 或 `BACKUP VALIDATE` 命令时，RMAN 会自动检测损坏的块。有关损坏块的详细信息可以在 `V$DATABASE_BLOCK_CORRUPTION`
  视图中查看。在以下示例中，常规备份作业在输出中报告了一个损坏块：


  ```text

  ORA-19566: exceeded limit of 0 corrupt blocks for file...

  ```


  查询 `V$DATABASE_BLOCK_CORRUPTION` 视图可以指示哪个文件包含损坏：


  ```sql

  SQL> select * from v$database_block_corruption;

  FILE#     BLOCK#     BLOCKS CORRUPTION_CHANGE# CORRUPTIO     CON_ID

  ---------- ---------- ---------- ------------------ --------- ----------

  4         20          1                  0 ALL ZERO           0

  ```


  执行块级恢复时，数据库可以处于 `mount` 或 `open` 状态。你不必将要恢复的数据文件脱机。你可以指示 RMAN 恢复在 `V$DATABASE_BLOCK_CORRUPTION`
  中报告的所有块，如下所示：


  ```bash

  RMAN> recover corruption list;

  ```


  如果成功，将显示以下消息：


  ```text

  media recovery complete...

  ```


  另一种恢复块的方法是指定数据文件和块号，如下所示：


  ```bash

  RMAN> recover datafile 4 block 20;

  ```


  最好使用 `RECOVER CORRUPTION LIST` 语法，因为它将从 `V$DATABASE_BLOCK_CORRUPTION` 视图中清除已恢复的任何块。


  > 注意：RMAN 无法对数据文件头（块 1）执行块级恢复。


  块级介质恢复允许你保持数据库可用，并减少了平均恢复时间，因为在恢复期间只有损坏的块处于脱机状态。你的数据库必须处于归档日志模式才能执行块级恢复。RMAN 可以从闪回日志（如果可用）中恢复块。如果闪回日志不可用，RMAN
  将尝试从完整备份、0 级备份或由 `BACKUP AS COPY` 命令生成的映像副本备份中恢复块。块恢复后，必须有所需的归档日志才能恢复块。RMAN 无法使用增量
  1 级（或更高）备份执行块介质恢复。


  ## 恢复容器数据库及其关联的可插拔数据库


  从 Oracle Database 12c 开始，你可以在一个容器数据库中创建可插拔数据库（详见第 22 章）。在处理容器和关联的可插拔数据库时，有三种基本场景：


  *   所有数据文件都经历了介质故障（容器根数据文件以及所有关联的可插拔数据库数据文件）。

  *   仅与容器根数据库关联的数据文件经历了介质故障。

  *   仅与某个可插拔数据库关联的数据文件经历了介质故障。


  前面的场景将在以下部分中介绍。


  ### 恢复和恢复所有数据文件


  要恢复和恢复与容器数据库关联的所有数据文件（包括根容器、种子容器和所有关联的可插拔数据库），请使用 RMAN 以具有 `sysdba` 或 `sysbackup`
  权限的用户身份连接到容器数据库。由于正在恢复与根系统表空间关联的数据文件，数据库必须在 `mount` 模式（而不是 `open`）下启动：


  ```bash

  $ rman target /

  RMAN> startup mount;

  RMAN> restore database;

  RMAN> recover database;

  RMAN> alter database open;

  ```


  请记住，当你打开容器数据库时，默认情况下不会打开关联的可插拔数据库。你可以从根容器中打开它们，如下所示：


  ```bash

  RMAN> alter pluggable database all open;

  ```


  ### 恢复和恢复根容器数据文件


  '
- '# 恢复与恢复操作


  如果只有与根容器关联的数据文件受损，那么你可以在根级别进行恢复与恢复操作。在此示例中，正在恢复根容器的系统数据文件，因此数据库不得处于打开状态。以下命令通过关键字
  `root` 指示 RMAN 仅恢复与根容器数据库关联的数据文件：


  ```bash

  $ rman target /

  RMAN> startup mount;

  RMAN> restore database root;

  RMAN> recover database root;

  RMAN> alter database open;

  ```


  在前面的代码中，`restore database root` 命令指示 RMAN 仅恢复与根容器数据库关联的数据文件。容器数据库打开后，你必须打开所有关联的可插拔数据库。你可以从根容器执行此操作，如下所示：


  ```sql

  RMAN> alter pluggable database all open;

  ```


  你可以通过此查询检查可插拔数据库的状态：


  ```sql

  SQL> select name, open_mode from v$pdbs;

  ```


  ## 恢复与恢复可插拔数据库


  你有两个选项来恢复与恢复可插拔数据库：


  *   以容器根用户身份连接，并指定要恢复与恢复的可插拔数据库。

  *   直接以特权可插拔级别用户身份连接到可插拔数据库，并发出 `RESTORE` 和 `RECOVER` 命令。


  第一个示例连接到根容器，并恢复与 `salespdb` 可插拔数据库关联的数据文件。为此，可插拔数据库不得处于打开状态（因为可插拔数据库的系统数据文件也将被恢复与恢复）：


  ```bash

  $ rman target /

  RMAN> alter pluggable database salespdb close;

  RMAN> restore pluggable database salespdb;

  RMAN> recover pluggable database salespdb;

  RMAN> alter pluggable database salespdb open;

  ```


  你也可以直接连接到可插拔数据库并执行恢复与恢复操作。直接连接到可插拔数据库时，用户仅能访问与该可插拔数据库关联的数据文件：


  ```bash

  $ rman target sys/foo@salespdb

  RMAN> shutdown immediate;

  RMAN> restore database;

  RMAN> recover database;

  RMAN> alter database open;

  ```


  > **注意**

  > 当你直接连接到可插拔数据库时，无法在 `RESTORE` 和 `RECOVER` 命令中指定可插拔数据库的名称。这种情况下，你会收到 `RMAN-07536:
  command not allowed when connected to a Pluggable Database` 错误。


  前面的代码仅影响你所连接的可插拔数据库关联的数据文件。可插拔数据库需要关闭才能执行此操作。但是，根容器数据库可以处于打开或已装载状态。此外，你必须使用以特权用户身份连接到可插拔数据库时创建的备份。特权可插拔数据库用户无法访问由根容器数据库特权用户启动的数据文件备份。


  ## 恢复归档日志文件


  RMAN 会在恢复过程中自动恢复其所需的任何归档日志文件。通常你无需手动恢复归档日志文件。但是，在以下任何情况下，你可能需要这样做：


  *   你预期稍后执行恢复操作，需要先恢复归档日志文件；思路是如果归档日志文件已恢复，将加快恢复操作。

  *   由于介质故障或存储空间问题，需要将归档日志文件恢复到非默认位置。

  *   你需要恢复特定的归档日志文件，以便通过 LogMiner 检查它们。


  如果你启用了 FRA，则 RMAN 默认将归档日志文件恢复到由初始化参数 `DB_RECOVERY_FILE_DEST` 定义的目标位置。否则，RMAN 使用
  `LOG_ARCHIVE_DEST_N` 初始化参数（其中 `N` 通常为 1）来确定恢复归档日志文件的位置。

  如果你将归档日志文件恢复到非默认位置，RMAN 会知道它们被恢复到的位置，并在你发出任何后续 `RECOVER` 命令时自动找到这些文件。RMAN 不会恢复它判定磁盘上已有的归档日志文件。即使你指定了非默认位置，如果文件已存在，RMAN
  也不会将归档日志文件恢复到磁盘。在这种情况下，RMAN 仅返回一条消息，说明归档日志文件已恢复。使用 `FORCE` 选项可覆盖此行为。

  如果你不确定恢复日志文件时要使用的序列号，可以查询 `V$LOG_HISTORY` 视图。


  > **提示**

  > 请记住，你无法恢复从未备份过的归档日志。另外，如果包含归档日志的备份文件不再可用，你也无法恢复该归档日志。运行 `LIST ARCHIVELOG ALL`
  命令可查看磁盘上当前的归档日志，运行 `LIST BACKUP OF ARCHIVELOG ALL` 可验证哪些归档日志文件位于可用的 RMAN 备份中。


  ### 恢复到默认位置


  以下命令将恢复 RMAN 已备份的所有归档日志文件：


  ```sql

  RMAN> restore archivelog all ;

  ```


  如果你想从指定的序列开始恢复，请使用 `FROM SEQUENCE` 子句。你可能希望先运行此查询以确定已生成的最新日志文件和序列号：


  ```sql

  SQL> select sequence#, first_time from v$log_history order by 2;

  ```


  此示例从序列 68 开始恢复所有归档日志文件：


  ```sql

  RMAN> restore archivelog from sequence 68;

  ```


  如果你想恢复一系列归档日志文件，请使用 `FROM SEQUENCE` 和 `UNTIL SEQUENCE` 子句或 `SEQUENCE BETWEEN` 子句，如下所示。以下命令使用线程
  1，恢复从序列 68 到序列 78 的归档日志文件：


  ```sql

  RMAN> restore archivelog from sequence 68 until sequence 78 thread 1;

  RMAN> restore archivelog sequence between 68 and 78 thread 1;

  ```


  默认情况下，如果归档日志文件已在磁盘上，RMAN 将不会恢复它。你可以使用 `FORCE` 覆盖此行为，如下所示：


  ```sql

  RMAN> restore archivelog from sequence 1 force ;

  ```


  ### 恢复到非默认位置


  如果你想将归档日志文件恢复到与默认位置不同的位置，请使用 `SET ARCHIVELOG DESTINATION` 子句。以下示例恢复到非默认位置 `/u01/archtemp`。`SET`
  命令的选项必须在 RMAN `run{}` 块内执行。


  ```sql

  run{

  set archivelog destination to ''/u01/archtemp'';

  restore archivelog from sequence 8 force;

  }

  ```


  空间是执行此操作的主要原因，但这类恢复是非常好的测试和实践案例，可用于体验此行为并为“以防万一”的场景记录文档。


  ## 恢复控制文件


  如果你缺少一个控制文件，并且你有多个副本，那么你可以关闭数据库，并通过将一个好的控制文件复制到缺失控制文件的正确位置和名称来简单地恢复缺失或损坏的控制文件（详情参见第
  5 章）。如果除了一个文件之外的所有文件都损坏，并且多个副本确实位于不同的磁盘上，此方法有效。如果存在磁盘或控制器故障，则至少有一个控制文件可能仍然可用。RMAN
  策略的一部分是针对这些问题对控制文件进行备份。


  下面列出了恢复控制文件时的三种典型场景：


  *   使用恢复目录

  *   使用自动备份

  *   指定备份文件名


  ### 使用恢复目录



  '
- '# Oracle 数据库控制文件与 SPFILE 恢复


  ## 控制文件恢复


  当您连接到恢复目录时，即使目标数据库处于 `nomount` 模式，您也可以查看控制文件的备份信息。要列出控制文件的备份，请使用 `LIST` 命令，如下所示：


  ```bash

  $ rman target / catalog rcat/foo@rcat

  RMAN> startup nomount;

  RMAN> list backup of controlfile;

  ```


  如果您丢失了所有控制文件，并且正在使用恢复目录，请发出 `STARTUP NOMOUNT` 和 `RESTORE CONTROLFILE` 命令：


  ```sql

  RMAN> startup nomount;

  RMAN> restore controlfile;

  ```


  RMAN 将控制文件恢复到由 `CONTROL_FILES` 初始化参数定义的位置。您应该会看到一条消息，指示您的控制文件已成功从 RMAN 备份片复制回来。现在，您可以将数据库更改为
  `mount` 模式，并执行数据库所需的任何其他恢复和恢复命令。


  > **注意**

  > 当您从备份还原控制文件时，需要对整个数据库执行介质恢复，并使用 `OPEN RESETLOGS` 命令打开数据库，即使您没有还原任何数据文件。您可以通过查询
  `V$DATABASE` 视图的 `CONTROLFILE_TYPE` 列来确定您的控制文件是否是备份。


  ## 使用自动备份


  当您启用控制文件的自动备份并使用快速恢复区（FRA）时，还原控制文件相当简单。首先，连接到目标数据库，然后发出 `STARTUP NOMOUNT` 命令，接着是
  `RESTORE CONTROLFILE FROM AUTOBACKUP` 命令，如下所示：


  ```bash

  $ rman target /

  RMAN> startup nomount;

  RMAN> restore controlfile from autobackup;

  ```


  RMAN 将控制文件恢复到由 `CONTROL_FILES` 初始化参数定义的位置。您应该会看到一条消息，指示您的控制文件已成功从 RMAN 备份片复制回来。以下是输出片段：


  ```

  channel ORA_DISK_1: control file restore from AUTOBACKUP complete

  ```


  现在，您可以将数据库更改为 `mount` 模式，并执行数据库所需的任何其他恢复和恢复命令。在测试环境中练习此示例的一种方法是将控制文件移动到另一个目录，并逐步完成还原选项。复制文件允许您通过将其移回来快速恢复运行，但这确实能让您练习这些还原操作。


  ## 指定备份文件名


  当将数据库还原到不同的服务器时，这些通常是过程中的最初几个步骤：对目标数据库进行备份，复制到远程服务器，然后从 RMAN 备份还原控制文件。在这些场景中，已知包含控制文件的备份片名称。以下是一个示例，其中您指示
  RMAN 从特定的备份片文件还原控制文件：


  ```sql

  RMAN> startup nomount ;

  RMAN> restore controlfile from

  ''/u01/O18C/rman/rman_ctl_c-3423216220-20130113-01.bk'';

  ```


  控制文件将被恢复到由 `CONTROL_FILES` 初始化参数定义的位置。


  ## 恢复 SPFILE


  您可能出于几个不同的原因想要恢复 `spfile`：


  *   您意外地在 `spfile` 中设置了一个导致实例无法启动的值。

  *   您意外删除了 `spfile`。

  *   您需要查看 `spfile` 在过去某个时间点的样子。


  一个场景（这在我身上发生过不止一次）是您正在使用 `spfile`，而您团队中的一位 DBA 做了一些莫名其妙的操作，例如：


  ```sql

  SQL> alter system set processes=1000000 scope=spfile;

  ```


  该参数在磁盘上的 `spfile` 中被更改，但在内存中没有。一段时间后，数据库因维护而停止。尝试启动数据库时，您甚至无法让实例在 `nomount` 状态下启动。这是因为一个参数被设置为一个荒谬的值，将消耗盒子上的所有内存。在这种情况下，实例可能会挂起，或者您可能会看到以下一条或多条消息：


  ```

  ORA-01078: failure in processing system parameters

  ORA-00838: Specified value of ... is too small

  ```


  如果您有一个 RMAN 备份可用，其中包含修改前的 `spfile` 副本，您可以简单地恢复 `spfile`。如果您使用的是恢复目录，以下是恢复 `spfile`
  的过程：


  *   如果您不使用恢复目录，有多种方法可以恢复您的 `spfile`。您采取的方法取决于几个变量，例如您是否使用快速恢复区（FRA）。

  *   您已为自动备份配置了通道备份位置。

  *   您使用自动备份的默认位置。


  ```bash

  $ rman target / catalog rcat/foo@rcat

  RMAN> startup nomount;

  RMAN> restore spfile;

  ```


  这只是一个概述，显示了需要采取的步骤，但并非所有细节都列在这里。确定包含 `spfile` 备份的备份片的位置并执行还原，如下所示：


  ```sql

  RMAN> startup nomount force;

  RMAN> restore spfile to ''/tmp/spfile.ora''

  from ''/u01/O18C/rman/rman_ctl_c-3423216220-20130113-00.bk'';

  ```


  您应该会看到类似这样的消息：


  ```

  channel ORA_DISK_1: SPFILE restore from AUTOBACKUP complete

  ```


  在此示例中，`spfile` 被恢复到 `/tmp` 目录。恢复后，您可以将 `spfile` 以正确的名称复制到 `ORACLE_HOME/dbs`。对于我的环境（数据库名称：`o18c`），操作如下：


  ```bash

  $ cp /tmp/spfile.ora $ORACLE_HOME/dbs/spfileo18c.ora

  ```


  > **注意**

  > 有关所有可能的 `spfile` 和控制文件恢复场景的完整描述，请参阅 Darl Kuhn、Sam Alapati 和 Arup Nanda 所著的 *RMAN
  Recipes for Oracle Database 12c, second edition*（Apress, 2013）。


  ## 不完全恢复


  术语 *不完全数据库恢复* 意味着您无法恢复所有已提交的事务。*不完全* 意味着您不应用所有重做日志来恢复到最后一个已提交事务发生的点。换句话说，您是在还原和恢复到过去的一个时间点。因此，不完全数据库恢复也称为数据库时间点恢复（DBPITR）。通常，您出于以下原因之一执行不完全数据库恢复：


  *   您没有执行完全恢复所需的所有重做日志。您丢失了完全恢复所需的归档日志文件或在线重做日志文件。这种情况可能由于所需的重做文件损坏或丢失而发生。

  *   您故意希望将数据库回滚到过去的一个时间点。例如，如果有人意外截断了一个表，而您希望将数据库回滚到发出 `truncate table` 命令之前，您就会这样做。


  不完全数据库恢复包括两个主要步骤：还原和恢复。还原步骤重新创建数据文件，恢复步骤应用重做日志直到指定的时间点。可以通过以下几种方式在 RMAN 中启动还原过程：


  *   `RESTORE DATABASE UNTIL`

  *   `FLASHBACK DATABASE`（根据 `UNDO` 信息可能不需要还原）


  对于大多数不完全数据库恢复的情况，您可以使用 `RESTORE DATABASE UNTIL` 命令来指示 RMAN 从 RMAN 备份文件中检索数据文件。本章本节主要关注这种类型的不完全数据库恢复。Flashback
  Database 功能将在本章后面的“闪回数据库”一节中介绍。




  '
- '# RMAN `UNTIL` 命令与不完全恢复概述


  `RMAN` 的 `RESTORE DATABASE UNTIL` 命令指导 `RMAN` 从过去的一个时间点检索数据文件，该时间点基于以下方法之一确定：


  *   时间 (Time)

  *   SCN

  *   日志序列号 (Log sequence number)

  *   还原点 (Restore point)


  `RMAN` 的 `RESTORE DATABASE UNTIL` 命令将从最近的备份集或映像副本中检索所有数据文件。`RMAN` 会根据 `UNTIL` 子句自动确定哪个备份集包含所需的数据文件。如果省略
  `RESTORE` 命令的 `UNTIL` 子句，`RMAN` 将从最新可用的备份集或映像副本中检索数据文件。在某些情况下，这可能正是您期望的行为。建议使用 `UNTIL`
  子句以确保 `RMAN` 从正确的备份集还原。


  当您发出 `RESTORE DATABASE UNTIL` 命令时，`RMAN` 将确定如何从以下类型的备份中提取数据文件：


  *   完全数据库备份 (Full database backup)

  *   增量级别 0 备份 (Incremental level-0 backup)

  *   由 `BACKUP AS COPY` 命令生成的映像副本备份 (Image copy backup)


  您无法对数据库在线数据文件的子集执行不完全恢复。在执行不完全数据库恢复时，所有在线数据文件的检查点 SCN 必须同步，然后才能使用 `ALTER DATABASE
  OPEN RESETLOGS` 命令打开数据库。您可以通过以下 SQL 查询查看数据文件头 SCN 和每个数据文件的状态：


  ```

  SQL> select file#, status, fuzzy,

  error, checkpoint_change#,

  to_char(checkpoint_time,''dd-mon-rrrr hh24:mi:ss'') as checkpoint_time

  from v$datafile_header;

  ```


  **注意**：`V$DATAFILE_HEADER` 视图的 `FUZZY` 列包含那些有一个或多个块的 SCN 值大于或等于数据文件头中检查点 SCN 的数据文件。如果还原的数据文件的
  `FUZZY` 值为 `YES`，则需要进行介质恢复。


  此规则（不在数据库文件的子集上执行不完全恢复）的唯一例外是**表空间时间点恢复 (TSPITR)**，它使用 `RECOVER TABLESPACE UNTIL`
  命令。TSPITR 用于罕见情况；它仅还原和恢复您指定的表空间。


  不完全数据库恢复的**恢复部分**总是使用 `RECOVER DATABASE UNTIL` 命令启动。`RMAN` 将自动将您的数据库恢复到使用 `UNTIL`
  子句指定的点。与 `RESTORE` 命令类似，您可以恢复到特定时间、SCN、日志序列号或还原点。当 `RMAN` 达到指定点时，它将自动终止恢复过程。


  **注意**：无论您在 `UNTIL` 子句中指定什么，`RMAN` 都会将其转换为相应的 `UNTIL SCN` 子句并分配适当的 SCN。这是为了避免任何时序问题，特别是由夏令时引起的问题。


  在恢复期间，`RMAN` 将自动确定如何应用重做。首先，`RMAN` 将应用任何可用的增量备份。接下来，将应用磁盘上的任何归档日志文件。如果归档日志文件不在磁盘上，则
  `RMAN` 将尝试从备份集中检索它们。如果希望作为不完全数据库恢复的一部分应用重做，则必须满足以下条件：


  *   您的数据库处于归档日志模式 (archivelog mode)。

  *   您拥有所有数据文件的良好备份。

  *   您拥有恢复到指定点所需的所有重做日志。


  使用 `RMAN` 执行不完全数据库恢复时，必须将数据库置于装载 (mount) 模式。`RMAN` 需要数据库处于装载模式才能读写控制文件。此外，在不完全数据库恢复期间，任何
  `SYSTEM` 表空间的数据文件总是会被恢复。Oracle 不允许在还原 `SYSTEM` 表空间数据文件时打开数据库。


  **注意**：执行不完全数据库恢复后，您必须使用 `ALTER DATABASE OPEN RESETLOGS` 命令打开数据库。在执行 `ALTER DATABASE
  OPEN RESETLOGS` 后的任何时间，请确保进行新的备份，以便在此时间点之后可用，因为如果尝试还原到 resetlogs 之后的时间点，其他备份可能会失效。


  根据具体场景，您可以使用 `RMAN` 执行各种不完全恢复方法。下一节讨论如何确定要执行的不完全恢复类型。


  ## 确定不完全恢复的类型


  基于时间的还原和恢复通常在您知道要恢复数据库的大致日期和时间时使用。例如，您可能大致知道希望停止恢复过程的时间，但不知道具体的 SCN。


  基于日志序列和基于取消的恢复在您有丢失或损坏的日志文件时很有效。在这种情况下，您只能恢复到最后一个好的归档日志文件。


  基于 SCN 的恢复在您能够精确定位希望停止恢复过程的 SCN 时很有效。您可以从 `V$LOG` 和 `V$LOG_HISTORY` 等视图中检索 SCN 信息。您也可以使用
  LogMiner 等工具来检索特定 SQL 语句的 SCN。


  还原点恢复仅在您已建立还原点的情况下有效。在这些情况下，您还原并恢复到与指定还原点关联的 SCN。


  TSPITR 用于需要仅还原和恢复少数几个表空间的情况。您可以使用 `RMAN` 自动化与此类不完全恢复相关的许多任务。


  ## 执行基于时间的恢复


  要将数据库还原并恢复到过去的某个时间点，您可以使用 `RESTORE` 和 `RECOVER` 命令的 `UNTIL TIME` 子句，也可以使用 `run{}`
  块内的 `SET UNTIL TIME` 子句。拥有语法正确的 `run{}` 代码块非常有用，您可以替换其中的时间值来执行还原，而无需搜索语法。使用本书中的这些示例并运行测试和练习还原，将为您提供准备好的代码块。`RMAN`
  将还原并恢复数据库到但不包括指定的时间。换句话说，`RMAN` 将还原在指定时间之前提交的任何事务。`RMAN` 在达到您指定的时间时自动停止恢复过程。


  `RMAN` 期望的默认日期格式是 `YYYY-MM-DD:HH24:MI:SS`。但是，建议使用 `TO_DATE` 函数并指定格式掩码。这消除了不同国家日期格式的歧义，也无需设置操作系统
  `NLS_DATE_FORMAT` 变量。以下示例在发出 `restore` 和 `recover` 命令时指定了时间：


  ```

  $ rman target /

  RMAN> startup mount;

  RMAN> restore database until time

  "to_date(''15-jan-2018 12:20:00'', ''dd-mon-rrrr hh24:mi:ss'')";

  RMAN> recover database until time

  "to_date(''15-jan-2018 12:20:00'', ''dd-mon-rrrr hh24:mi:ss'')";

  RMAN> alter database open resetlogs;

  ```


  如果一切顺利，您应该看到类似这样的输出：


  ```

  Statement processed

  ```


  ## 执行基于日志序列的恢复


  通常，这种类型的不完全数据库恢复是因为您有一个丢失或损坏的归档日志文件而启动的。如果是这种情况，您只能恢复到最后一个好的归档日志文件，因为您不能跳过丢失的归档日志。


  您如何确定要还原到（但不包括）哪个归档日志文件会有所不同。例如，如果您物理上丢失了一个归档日志文件，并且 `RMAN` 无法在备份集中找到它，那么在尝试应用丢失的文件时，您将收到类似这样的消息：


  ```

  RMAN-06053: unable to perform media recovery because of missing log

  RMAN-06025: no backup of archived log for thread 1 with sequence 19...

  ```




  ## 基于日志序列的恢复


  根据之前的错误消息，您将恢复到（但不包括）日志序列号 19。


  ```

  $ rman target /

  RMAN> startup mount;

  RMAN> restore database until sequence 19;

  RMAN> recover database until sequence 19;

  RMAN> alter database open resetlogs;

  ```


  如果成功，您应该会看到类似以下的输出：


  ```

  Statement processed

  ```


  注意

  基于日志序列的恢复类似于用户管理的基于取消的恢复。有关用户管理的基于取消的恢复的详细信息，请参见第 16 章。


  '
- '# 执行基于 SCN 的恢复


  基于 SCN 的不完全数据库恢复适用于您知道希望恢复会话结束的 SCN 值的情况。RMAN 将恢复到但不包括指定的 SCN。当恢复过程达到指定的 SCN 时，RMAN
  会自动终止恢复过程。


  您可以通过多种方式查看数据库 SCN 信息：


  *   使用 LogMiner 确定与 DDL 或 DML 语句关联的 SCN

  *   查看 `alert.log` 文件

  *   查看您的跟踪文件

  *   查询 `V$LOG`、`V$LOG_HISTORY` 和 `V$ARCHIVED_LOG` 的 `FIRST_CHANGE#` 列


  确定要恢复到的 SCN 后，使用 `UNTIL SCN` 子句恢复到但不包括指定的 SCN。以下示例恢复所有 SCN 小于 95019865425 的事务：


  ```

  $ rman target /

  RMAN> startup mount;

  RMAN> restore database until scn 95019865425;

  RMAN> recover database until scn 95019865425;

  RMAN> alter database open resetlogs;

  ```


  如果一切顺利，您应该会看到类似以下的输出：


  ```

  Statement processed

  ```


  '
- '# 恢复到某个恢复点


  恢复点有两种类型：普通恢复点和保证恢复点。保证恢复点与普通恢复点之间的主要区别在于，保证恢复点最终不会从控制文件中老化清除；保证恢复点将一直保留，直到您删除它。保证恢复点确实需要一个闪回恢复区（FRA）。但是，对于使用保证恢复点进行不完全恢复，您无需启用闪回数据库。


  您可以使用 SQL*Plus 创建普通恢复点，如下所示：


  ```

  SQL> create restore point MY_RP;

  ```


  此命令创建一个名为 `MY_RP` 的恢复点，该恢复点与命令发出时数据库的 SCN 相关联。您可以查看数据库的当前 SCN，如下所示：


  ```

  SQL> select current_scn from v$database;

  ```


  您可以在 `V$RESTORE_POINT` 视图中查看恢复点信息，如下所示：


  ```

  SQL> select name, scn from v$restore_point;

  ```


  恢复点类似于特定 SCN 的别名。恢复点允许您恢复和恢复到某个 SCN，而无需指定一个数字。RMAN 将恢复和恢复到但不包括与恢复点关联的 SCN。


  以下示例恢复并恢复到 `MY_RP` 恢复点：


  ```

  $ rman target /

  RMAN> startup mount;

  RMAN> restore database until restore point MY_RP;

  RMAN> recover database until restore point MY_RP;

  RMAN> alter database open resetlogs;

  ```


  '
- '# 将表恢复到之前的某个时间点


  从 Oracle Database 12c 开始，您可以通过 `RECOVER TABLE` 命令从 RMAN 备份中恢复单个表。这使您能够将表恢复并恢复到过去某个时间点。


  表级恢复功能使用临时辅助实例和 Data Pump 实用程序。辅助实例和 Data Pump 在恢复表时都会创建临时文件。在启动表级恢复之前，首先创建两个目录：一个用于存放辅助实例使用的文件，另一个用于存储
  Data Pump 转储文件：


  ```

  $ mkdir /tmp/oracle

  $ mkdir /tmp/recover

  ```


  前面的两个目录在 `RECOVER TABLE` 命令中通过 `AUXILIARY DESTINATION` 和 `DATAPUMP DESTINATION`
  子句引用。在以下代码片段中，`MV_MAINT` 拥有的 `INV` 表被恢复到之前某个 SCN 的状态：


  ```

  RMAN> recover table mv_maint.inv

  until scn 4689805

  auxiliary destination ''/tmp/oracle''

  datapump destination ''/tmp/recover'';

  ```


  只要存在包含该表在指定 SCN 时状态的 RMAN 备份，就会执行表级恢复和恢复。


  注意

  您也可以将表恢复到某个 SCN、时间点或日志序列号。


  当 RMAN 执行表级恢复时，它会自动创建一个临时辅助数据库，使用 Data Pump 导出该表，然后将该表作为它在指定恢复点时的状态导入回目标数据库。恢复完成后，辅助数据库会被删除，Data
  Pump 转储文件也会被移除。


  提示

  虽然 `RECOVER TABLE` 命令是一个不错的增强功能，但我建议，如果您意外删除了一个表，首先探索使用回收站或“闪回表到删除前”功能来恢复该表。或者，如果表被错误地删除了数据，则使用“闪回表”功能将表闪回到过去的某个时间点。甚至可以使用
  CTAS（创建表为查询）从 `FLASHBACK QUERY` 恢复。如果以上选项都不可行，则考虑使用 RMAN 的“恢复表”功能。


  '
- '# 闪回表


  为了简化意外删除表的恢复，Oracle 引入了“闪回表”功能。Oracle 提供两种不同类型的闪回表操作：


  *   `FLASHBACK TABLE TO BEFORE DROP` 快速取消删除之前删除的表。此功能使用一个名为回收站的逻辑容器。

  *   `FLASHBACK TABLE` 将表闪回到最近的某个时间点，以撤消不期望的 DML 语句的影响。您可以闪回到某个 SCN、时间戳或恢复点。


  Oracle 引入 `FLASHBACK TABLE TO BEFORE DROP` 是为了让您能够快速恢复已删除的表。当您删除表时，如果没有指定 `PURGE`
  子句，Oracle 不会删除该表——而是重命名该表。您删除的任何表（Oracle 重命名的）都会被放入回收站。回收站为您提供了一种高效查看和管理已删除对象的方法。


  注意

  要使用“闪回表”功能，您不需要实现 FRA，也不需要启用闪回数据库。


  `FLASHBACK TABLE TO BEFORE DROP` 操作仅在您的数据库启用了回收站功能（默认情况下是启用的）时才有效。您可以检查回收站的状态，如下所示：


  ```

  SQL> show parameter recyclebin

  NAME                                 TYPE        VALUE

  ------------------------------------ ----------- --------------------------

  recyclebin                           string      on

  ```


  ## FLASHBACK TABLE TO BEFORE DROP


  以下是一个示例。假设 `INV` 表被意外删除：


  ```

  SQL> drop table inv;

  ```


  通过查看回收站的内容来验证表已被重命名：


  ```

  SQL> show recyclebin;

  ORIGINAL NAME   RECYCLEBIN NAME                OBJECT TYPE  DROP TIME

  --------------- ------------------------------ ------------ --------------

  INV             BIN$0zIqhEFlcprgQ4TQTwq2uA==$0 TABLE        2018-01-11:12:16:49

  ```


  `SHOW RECYCLEBIN` 语句仅显示已删除的表。要获取重命名对象的更完整视图，请查询 `RECYCLEBIN` 视图：


  ```

  select object_name, original_name, type

  from recyclebin;

  ```


  输出如下：


  ```

  OBJECT_NAME                         ORIGINAL_NAM TYPE

  ----------------------------------- ------------ -------------------------

  BIN$0zIqhEFjcprgQ4TQTwq2uA==$0      INV_PK       INDEX

  BIN$0zIqhEFkcprgQ4TQTwq2uA==$0      INV_TRIG     TRIGGER

  BIN$0zIqhEFlcprgQ4TQTwq2uA==$0      INV          TABLE

  ```




  '
- "# Oracle 闪回技术详解\n\n## 闪回表到删除前\n\n在输出中，当对象被删除时，其对应的表也会有一个被重命名的主键。要撤销表的删除操作，可以执行：\n\
  \n```\nSQL> flashback table inv to before drop;\n```\n\n前面的命令将表恢复为其原始名称。但是，此语句不会将索引恢复为其原始名称：\n\
  \n```\nSQL> select index_name from user_indexes where table_name='INV';\nINDEX_NAME\n\
  ------------------------------\nBIN$0zIqhEFjcprgQ4TQTwq2uA==$0\n```\n\n在这种情况下，你必须重命名索引：\n\
  \n```\nSQL> alter index \"BIN$0zIqhEFjcprgQ4TQTwq2uA==$0\" rename to inv_pk;\n```\n\
  \n你还需要以相同方式重命名任何触发器对象。如果在表删除前存在引用约束，则必须手动重新创建它们。\n\n如果出于某种原因，你需要将表闪回到与原始名称不同的名称，可以按如下方式操作：\n\
  \n```\nSQL> flashback table inv to before drop rename to inv_bef;\n```\n\n## 闪回表到之前的时间点\n\
  \n如果表被错误地删除或修改，你可以选择将表闪回到之前的时间点。闪回表功能使用回滚表空间中的信息来恢复表。过去的时间点取决于你的回滚表空间保留周期，该周期指定了回滚信息被保留的最短时间。\n\
  \n如果所需的闪回信息不在回滚表空间中，你将收到如下错误：\n\n```\nORA-01555: snapshot too old\n```\n\n换句话说，要能够闪回到过去的某个时间点，回滚表空间中所需的信息不能已被覆盖。\n\
  \n### 闪回表到 SCN\n\n假设你正在测试一个应用程序功能，并希望快速将表恢复到特定的系统变更号。作为应用程序测试的一部分，你在测试开始前记录下 SCN：\n\
  \n```\nSQL> select current_scn from v$database;\nCURRENT_SCN\n-----------\n    4760089\n\
  ```\n\n你执行了一些测试，然后希望将表闪回到之前记录的 SCN。首先，确保为表启用了行移动：\n\n```\nSQL> alter table inv enable\
  \ row movement;\nSQL> flashback table inv to scn 4760089;\n```\n\n现在，表应该反映了在 `FLASHBACK`\
  \ 语句中指定的历史 SCN 值时已提交的事务。\n\n### 闪回表到时间戳\n\n你也可以将表闪回到过去的时间点。例如，要将表闪回到 15 分钟前，首先启用行移动，然后使用\
  \ `FLASHBACK TABLE`：\n\n```\nSQL> alter table inv enable row movement;\nSQL> flashback\
  \ table inv to timestamp(sysdate-1/96);\n```\n\n你提供的时间戳必须可以计算为 Oracle 时间戳的有效格式。你也可以显式指定时间，如下所示：\n\
  \n```\nSQL> flashback table inv to timestamp\n    to_timestamp('14-jan-18 12:07:33','dd-mon-yy\
  \ hh24:mi:ss');\n```\n\n### 闪回表到还原点\n\n还原点是与数据库中的时间戳或 SCN 关联的名称。你可以创建一个包含数据库当前 SCN\
  \ 的还原点，如下所示：\n\n```\nSQL> create restore point point_a;\n```\n\n之后，如果你决定将表闪回到该还原点，首先启用行移动：\n\
  \n```\nSQL> alter table inv enable row movement;\nSQL> flashback table inv to restore\
  \ point point_a;\n```\n\n现在，表应该包含与指定还原点关联的 SCN 时的事务。\n\n## 闪回数据库\n\n闪回数据库功能可以将整个数据库闪回到过去的时间点。闪回数据库使用存储在闪回日志中的信息；它不依赖于还原数据库文件（与冷备份、热备份和\
  \ RMAN 不同）。\n\n> **提示**\n> 闪回数据库不能替代你的数据库备份。如果你遇到数据文件的介质故障，不能使用闪回数据库闪回到故障之前。如果数据文件损坏，你必须使用物理备份（热备份、冷备份或\
  \ RMAN）进行还原和恢复。\n\n在需要一致地将数据库重置到过去某个时间点的情况下，闪回数据库功能可能非常有用。例如，你可能希望定期将测试或培训数据库重置为已知基线。或者，你可能正在升级应用程序，在对应用程序数据库对象进行大规模更改之前，标记起始点。升级后，如果情况不理想，你希望能够快速将数据库重置到升级发生前的时间点。\n\
  \n闪回数据库有几个先决条件：\n\n*   数据库必须处于归档日志模式。\n*   你必须使用闪回恢复区。\n*   必须启用闪回数据库功能。\n\n有关启用归档日志模式和/或启用\
  \ FRA 的详细信息，请参见第 5 章。你可以使用以下 SQL*Plus 语句验证这些功能的状态：\n\n```\nSQL> archive log list;\n\
  SQL> show parameter db_recovery_file_dest;\n```\n\n要启用闪回数据库功能，需将数据库切换到闪回模式，如下所示：\n\
  \n```\nSQL> alter database flashback on;\n```\n\n你可以按如下方式验证闪回状态：\n\n```\nSQL> select\
  \ flashback_on from v$database;\n```\n\n启用闪回数据库后，你可以使用此查询查看 FRA 中的闪回日志：\n\n```\n\
  SQL> select name, log#, thread#, sequence#, bytes\n    from v$flashback_database_logfile;\n\
  ```\n\n你可以闪回的时间范围由 `DB_FLASHBACK_RETENTION_TARGET` 参数决定。该参数以分钟为单位，指定了你的数据库可以闪回的最长时间上限。\n\
  \n你可以通过运行以下 SQL 来查看可以闪回到的最旧 SCN 和时间：\n\n```\nSQL> select\n        oldest_flashback_scn,\n\
  \        to_char(oldest_flashback_time,'dd-mon-yy hh24:mi:ss')\n    from v$flashback_database_log;\n\
  ```\n\n如果出于任何原因需要禁用闪回数据库，可以将其关闭，如下所示：\n\n```\nSQL> alter database flashback off;\n\
  ```\n\n你可以使用 RMAN 或 SQL*Plus 来闪回数据库。你可以指定过去的某个时间点，使用以下方法之一：\n\n*   SCN\n*   时间戳\n\
  *   还原点\n*   上次 `RESETLOGS` 操作（仅适用于 RMAN）\n\n此示例创建一个还原点：\n\n```\nSQL> create restore\
  \ point flash_1;\n```\n\n接下来，应用程序执行一些测试，之后数据库被闪回到该还原点，以便开始新一轮测试：\n\n```\nSQL> shutdown\
  \ immediate;\nSQL> startup mount;\nSQL> flashback database to restore point flash_1;\n\
  SQL> alter database open resetlogs;\n```\n\n此时，你的数据库应该与关联该还原点的 SCN 时的状态在事务上保持一致。\n\
  \n## 恢复到不同的服务器\n\n当你考虑设计备份策略时，作为过程的一部分，你还必须考虑将如何还原和恢复。你的备份只有在上次测试还原和恢复时才是可靠的。如果没有良好的还原和恢复策略，备份策略可能会变得毫无价值。你最不希望发生的情况是：遇到介质故障，去还原数据库，然后发现缺少关键部分、没有足够的空间来还原、某些东西已损坏等等。\n\
  \n测试 RMAN 备份的最佳方法之一是将其还原和恢复到不同的数据库服务器。这将全面锻炼你备份、还原和恢复的 DBA 技能。如果你能在不同的服务器上成功还原和恢复\
  \ RMAN 备份，那么在真正的灾难发生时，这将给你带来信心。你可以将本书前面的所有材料视为备份和恢复工作原理的基础构建块。\n\n\n\n\n## 注意\n\n\
  RMAN 确实有一个 ``DUPLICATE DATABASE`` 命令，它能很好地将数据库从一台服务器复制到另一台。如果你需要经常执行此类任务，我建议你使用\
  \ RMAN 的复制数据库功能。然而，你可能仍然需要手动将数据库备份从一台服务器复制到另一台，特别是在安全策略要求生产服务器不能直接连接到开发环境的情况下。你可以使用\
  \ RMAN，基于从目标服务器复制到辅助服务器的备份来复制数据库。有关无目标复制的详细信息，请参阅 MOS 注释 874352.1。\n\n## 高级步骤\n\n\
  在此示例中，源服务器和目标服务器的挂载点不同。接下来列出了所需的高级步骤，以便执行 RMAN 备份并在独立的服务器上重新创建数据库：\n\n1.  在源数据库上创建\
  \ RMAN 备份。\n2.  将 RMAN 备份复制到目标服务器。接下来的所有步骤都在目标数据库服务器上执行。\n3.  确保已安装 Oracle。\n4.\
  \  设置所需的 OS 变量。\n5.  为要还原的数据库创建一个 `init.ora` 文件。\n6.  为数据文件、控制文件和转储/跟踪文件创建所有必需的目录。\n\
  7.  以 nomount 模式启动数据库。\n8.  从 RMAN 备份中还原控制文件。\n9.  以 mount 模式启动数据库。\n10. 使控制文件知晓\
  \ RMAN 备份的位置。\n11. 重命名并还原数据文件以反映新的目录位置。\n12. 恢复数据库。\n13. 设置联机重做日志的新位置。\n14. 打开数据库。\n\
  15. 添加临时文件。\n16. 重命名数据库（可选）。\n\n前面的每个步骤都将在接下来的几个小节中详细说明。步骤 1 和 2 在源数据库服务器上执行。所有剩余步骤在目标服务器上执行。在本示例中，源数据库名为\
  \ `o18c`，目标数据库将命名为 `DEVDB`。\n\n此外，源服务器和目标服务器的挂载点名称不同。在源数据库上，数据文件和控制文件位于此处：\n```\n\
  /u01/dbfile/o18c\n```\n在目标数据库上，数据文件和控制文件将被重命名并还原到此目录：\n```\n/ora01/dbfile/DEVDB\n\
  ```\n目标数据库的联机重做日志将放置在此目录中：\n```\n/ora01/oraredo/DEVDB\n```\n目标数据库的归档重做日志文件位置将设置如下：\n\
  ```\n/ora01/arc/DEVDB\n```\n请记住，这些是我测试环境中使用的目录。你需要调整这些目录名称以反映你数据库服务器上的目录结构。\n\n\
  ### 步骤 1. 在源数据库上创建 RMAN 备份\n备份数据库时，请确保已开启控制文件自动备份功能。同时，将归档重做日志作为备份的一部分包含进来，如下所示：\n\
  ```\nRMAN> backup database plus archivelog;\n```\n你可以通过 `LIST BACKUP` 命令来验证备份片的名称和位置。例如，源数据库的备份片如下所示：\n\
  ```\nrman1_bonvb2js_1_1.bk\nrman1_bqnvb2k5_1_1.bk\nrman1_bsnvb2p3_1_1.bk\nrman_ctl_c-3423216220-20130113-06.bk\n\
  ```\n在上面的输出中，文件名中包含 `c-3423216220` 字符串的那个是包含控制文件的备份片。你需要检查 `LIST BACKUP` 命令的输出，以确定哪个备份片包含控制文件。在步骤\
  \ 8 中，你将需要引用该备份片。\n\n### 步骤 2. 将 RMAN 备份复制到目标服务器\n对于此步骤，使用 `rsync` 或 `scp` 等实用程序将备份片从一台服务器复制到另一台。此示例使用\
  \ `scp` 命令复制备份片：\n```\n$ scp rman*  oracle@DEVBOX:/ora01/rman/DEVDB\n```\n在此示例中，必须在复制备份文件之前在目标服务器上创建\
  \ `/ora01/rman/DEVDB` 目录。根据你的环境，此步骤可能需要复制 RMAN 备份两次：一次从生产服务器到安全服务器，另一次从安全服务器到测试服务器。\n\
  \n**注意**\n如果 RMAN 备份在磁带上而不是在磁盘上，那么目标服务器上必须安装/配置相同的介质管理器软件。此外，该服务器必须能直接访问磁带上的 RMAN\
  \ 备份。\n\n### 步骤 3. 确保已安装 Oracle\n确保在目标服务器上安装了与源数据库上相同版本的 Oracle 二进制文件。\n\n### 步骤\
  \ 4. 设置所需的 OS 变量\n你需要设置 OS 变量，例如 `ORACLE_SID`、`ORACLE_HOME` 和 `PATH`。通常，`ORACLE_SID`\
  \ 变量最初设置为与原始数据库上的名称匹配。数据库名称将作为此配方最后一步的一部分（可选）进行更改。以下是目标服务器上 `ORACLE_SID` 和 `ORACLE_HOME`\
  \ 的设置：\n```\n$ echo $ORACLE_SID\no18c\n$ echo $ORACLE_HOME\n/ora01/app/oracle/product/18.1.0.1/db_1\n\
  ```\n此时，还要考虑将 Oracle SID 添加到 `oratab` 文件中。如果你计划在复制后使用此数据库，那么你应该有一个自动设置所需 OS 变量的方法。有关结合\
  \ `oratab` 文件设置 OS 变量的详细信息，请参见第 2 章。\n\n### 步骤 5. 为要还原的数据库创建 init.ora 文件\n将 `init.ora`\
  \ 文件从原始服务器复制到目标服务器，并对其进行修改，使其在目录路径方面与目标服务器匹配。确保你更改了参数，例如 `CONTROL_FILES`，以反映目标服务器上的新路径目录（在本示例中为\
  \ `/ora01/dbfile/DEVDB`）。\n\n最初，`init.ora` 文件名为 `ORACLE_HOME/dbs/inito18c.ora`，数据库名称为\
  \ `o18c`。两者都将在后面的步骤中重命名。以下是 `init.ora` 文件的内容：\n```\ncontrol_files='/ora01/dbfile/DEVDB/control01.ctl',\n\
  '/ora01/dbfile/DEVDB/control02.ctl'\ndb_block_size=8192\ndb_name='o18c'\nlog_archive_dest_1='location=/ora01/arc/DEVDB'\n\
  job_queue_processes=10\nmemory_max_target=300000000\nmemory_target=300000000\nopen_cursors=100\n\
  os_authent_prefix=\"\nprocesses=100\nremote_login_passwordfile='EXCLUSIVE'\nresource_limit=true\n\
  shared_pool_size=80M\nsql92_security=TRUE\nundo_management='AUTO'\nundo_tablespace='UNDOTBS1'\n\
  workarea_size_policy='AUTO'\n```\n\n### 步骤 6. 为数据文件、控制文件和转储/跟踪文件创建所有必需的目录\n对于本示例，需要创建目录\
  \ `/ora01/dbfile/DEVDB` 和 `/ora01/oraredo/DEVDB`：\n```\n$ mkdir -p /ora01/dbfile/DEVDB\n\
  $ mkdir -p /ora01/oraredo/DEVDB\n$ mkdir -p /ora01/arc/DEVDB\n```\n\n### 步骤 7. 以\
  \ nomount 模式启动数据库\n你现在应该能够以 nomount 模式启动数据库：\n```\n$ rman target /\nRMAN> startup\
  \ nomount ;\n```\n\n### 步骤 8. 从 RMAN 备份中还原控制文件\n接下来，从先前复制的备份中还原控制文件；例如，\n```\nRMAN>\
  \ restore controlfile from\n'/ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk';\n\
  ```\n控制文件将被还原到 `CONTROL_FILES` 初始化参数指定的所有位置。以下是一些示例输出：\n```\nchannel ORA_DISK_1:\
  \ restore complete, elapsed time: 00:00:03\noutput file name=/ora01/dbfile/DEVDB/control01.ctl\n\
  output file name=/ora01/dbfile/DEVDB/control02.ctl\n```\n\n### 步骤 9. 以 mount 模式启动数据库\n\
  你现在应该能够以 mount 模式启动你的数据库：\n```\nRMAN> alter database mount ;\n```\n此时，你的控制文件已存在并已打开，但数据文件或联机重做日志都还不存在。\n\
  \n### 步骤 10. 使控制文件知晓 RMAN 备份的位置\n\n\n\n## 第 11 步\\. 重命名并恢复数据文件以反映新的目录位置\n\n首先，使用\
  \ `CROSSCHECK` 命令让控制文件知道，没有备份或归档重做日志位于原始服务器上的相同位置：\n\n```\nRMAN> crosscheck backup;\
  \ # 交叉校验备份\nRMAN> crosscheck copy;   # 交叉校验映像副本和归档日志\n```\n\n然后，使用 `CATALOG` 命令，让控制文件知晓复制到目标服务器的备份片的名称和位置。\n\
  \n> **注意**\n> 请勿将 `CATALOG` 命令与恢复目录模式混淆。`CATALOG` 命令将 RMAN 元数据添加到控制文件，而恢复目录模式是一个用户（通常在单独的数据库中创建），用于存储\
  \ RMAN 元数据。\n\n在此示例中，位于 `/ora01/rman/DEVDB` 目录中的所有 RMAN 文件都将被编录到控制文件中：\n\n```\n\
  RMAN> catalog start with '/ora01/rman/DEVDB';\n```\n\n以下是一些示例输出：\n\n```\n数据库未知的文件列表\n\
  =====================================\n文件名: /ora01/rman/DEVDB/rman1_bqnvb2k5_1_1.bk\n\
  文件名: /ora01/rman/DEVDB/rman1_bonvb2js_1_1.bk\n文件名: /ora01/rman/DEVDB/rman_ctl_c-3423216220-20130113-06.bk\n\
  文件名: /ora01/rman/DEVDB/rman1_bsnvb2p3_1_1.bk\n您确实要编录以上文件吗（输入 YES 或 NO）？\n```\n\n\
  现在，输入 `YES`（如果一切看起来正常）。之后，您应该能够使用 RMAN 的 `LIST BACKUP` 命令查看新编录的备份片：\n\n```\nRMAN>\
  \ list backup;\n```\n\n如果您的目标服务器目录结构与原始服务器目录完全相同，您可以直接发出 `RESTORE` 命令：\n\n```\n\
  RMAN> restore database;\n```\n\n但是，当将数据文件恢复到与原始目录不同的位置时，您必须使用 `SET NEWNAME` 命令。创建一个包含适当\
  \ `SET NEWNAME` 和 `RESTORE` 命令的 RMAN `run{}` 块文件。以下是一个用于生成 `run{}` 块起始点的 SQL 脚本示例：\n\
  \n```\nSQL> set head off feed off verify off echo off pages 0 trimspool on\nSQL>\
  \ set lines 132 pagesize 0\nSQL> spo newname.sql\n--\nSQL> select 'run{' from dual;\n\
  --\nSQL> select\n'set newname for datafile ' || file# || ' to ' || \"\" || name\
  \ || \"\" || ';'\nfrom v$datafile;\n--\nSQL> select\n'restore database;' || chr(10)\
  \ ||\n'switch datafile all;' || chr(10) ||\n'}'\nfrom dual;\n--\nSQL> spo off;\n\
  ```\n\n运行该脚本后，生成的 `newname.sql` 脚本内容如下：\n\n```\nrun{\nset newname for datafile 1\
  \ to '/u01/dbfile/o18c/system01.dbf';\nset newname for datafile 2 to '/u01/dbfile/o18c/sysaux01.dbf';\n\
  set newname for datafile 3 to '/u01/dbfile/o18c/undotbs01.dbf';\nset newname for\
  \ datafile 4 to '/u01/dbfile/o18c/users01.dbf';\nrestore database;\nswitch datafile\
  \ all;\n}\n```\n\n然后，修改 `newname.sql` 脚本的内容，以反映目标数据库服务器上的目录。在此示例中，最终编辑后的 `newname.sql`\
  \ 脚本如下所示：\n\n```\nrun{\nset newname for datafile 1 to '/ora01/dbfile/DEVDB/system01.dbf';\n\
  set newname for datafile 2 to '/ora01/dbfile/DEVDB/sysaux01.dbf';\nset newname for\
  \ datafile 3 to '/ora01/dbfile/DEVDB/undotbs01.dbf';\nset newname for datafile 4\
  \ to '/ora01/dbfile/DEVDB/users01.dbf';\nrestore database;\nswitch datafile all;\n\
  }\n```\n\n现在，连接到 RMAN，并运行前面的脚本，将数据文件恢复到新位置：\n\n```\n$ rman target /\nRMAN> @newname.sql\n\
  ```\n\n以下是输出片段：\n\n```\n数据文件 1 已切换为数据文件副本\n输入的数据文件副本 RECID=5 STAMP=790357985 文件名=/ora01/dbfile/DEVDB/system01.dbf\n\
  ```\n\n所有数据文件都已恢复到新的数据库服务器。您可以使用 RMAN 的 `REPORT SCHEMA` 命令来验证文件是否已恢复并处于正确的位置：\n\n\
  ```\nRMAN> report schema;\n```\n\n以下是一些示例输出：\n\n```\nRMAN-06139: 警告: 用于 REPORT SCHEMA\
  \ 的控制文件不是当前的\n数据库模式报告 (数据库唯一名称: O12C)\n永久数据文件列表\n===========================\n文件\
  \ 大小(MB) 表空间           RB 段 数据文件名\n---- -------- -------------------- ------- ------------------------\n\
  1    500      SYSTEM               ***     /ora01/dbfile/DEVDB/system01.dbf\n2 \
  \   500      SYSAUX               ***     /ora01/dbfile/DEVDB/sysaux01.dbf\n3  \
  \  800      UNDOTBS1             ***     /ora01/dbfile/DEVDB/undotbs01.dbf\n4  \
  \  50       USERS                ***     /ora01/dbfile/DEVDB/users01.dbf\n临时文件列表\n\
  =======================\n文件 大小(MB) 表空间           最大大小(MB) 临时文件名\n---- -------- --------------------\
  \ ----------- --------------------\n1    500      TEMP                 500     \
  \    /u01/dbfile/o12c/temp01.dbf\n```\n\n从前面的输出可以看到，数据库名称和临时表空间数据文件仍未反映目标数据库 (`DEVDB`)。这些将在后续步骤中进行修改。\n\
  \n## 第 12 步\\. 恢复数据库\n\n接下来，您需要应用备份期间生成的任何归档重做文件。由于备份时使用了 `ARCHIVELOG ALL` 子句，这些文件应包含在备份中。通过\
  \ `RECOVER DATABASE` 命令启动重做应用：\n\n```\nRMAN> recover database ;\n```\n\nRMAN 将恢复并应用备份片中包含的所有归档重做日志，当遇到一个不存在的归档重做日志时，可能会抛出错误；例如，\n\
  \n```\nRMAN-06054: 媒体恢复正在请求未知的归档日志，用于...\n```\n\n该错误信息是正常的。恢复过程将恢复并应用备份中包含的归档重做日志，这应该足以打开数据库。恢复过程不知道应在何处停止应用归档重做日志，因此将继续尝试，直到找不到下一个日志为止。话虽如此，现在正是验证您的数据文件是否联机且不处于模糊状态的好时机：\n\
  \n```\nSQL> select file#, status, fuzzy, error, checkpoint_change#,\nto_char(checkpoint_time,'dd-mon-rrrr\
  \ hh24:mi:ss') as checkpoint_time\nfrom v$datafile_header;\n```\n\n## 第 13 步\\.\
  \ 为联机重做日志设置新位置\n\n如果您的源服务器和目标服务器的目录结构完全相同，那么您无需为联机重做日志设置新位置（因此可以跳过此步骤）。\n\n但是，如果目录结构不同，那么您将需要更新控制文件以反映联机重做日志的新目录。我有时会使用一个生成\
  \ SQL 的 SQL 脚本来辅助完成此步骤：\n\n```\nSQL> set head off feed off verify off echo off pages\
  \ 0 trimspool on\nSQL> set lines 132 pagesize 0\nSQL> spo renlog.sql\nSQL> select\n\
  'alter database rename file ' || chr(10)\n|| \"\" || member || \"\" || ' to ' ||\
  \ chr(10) || \"\" || member || \"\" ||';'\nfrom v$logfile;\nSQL> spo off;\n```\n\
  \n对于此示例，生成的 `renlog.sql` 文件片段如下：\n\n```\nSQL> alter database rename file\n'/u01/oraredo/o18c/redo01a.rdo'\
  \ to\n'/u01/oraredo/o18c/redo01a.rdo';\n...\nSQL> alter database rename file\n'/u02/oraredo/o18c/redo03b.rdo'\
  \ to\n'/u02/oraredo/o18c/redo03b.rdo';\n```\n\n`renlog.sql` 的内容需要被修改以反映目标服务器上的目录结构。编辑后的\
  \ `renlog.sql` 如下所示：\n\n```\nSQL> alter database rename file\n'/u01/oraredo/o18c/redo01a.rdo'\
  \ to\n'/ora01/oraredo/DEVDB/redo01a.rdo';\n...\nSQL> alter database rename file\n\
  '/u02/oraredo/o18c/redo03b.rdo' to\n'/ora01/oraredo/DEVDB/redo03b.rdo';\n```\n\n\
  通过运行 `renlog.sql` 脚本来更新控制文件：\n\n```\nSQL> @renlog.sql\n```\n\n您可以从 `V$LOGFILE` 中选择数据以验证联机重做日志名称是否正确：\n\
  \n```\nSQL> select member from v$logfile;\n```\n\n以下是此示例的输出：\n\n\n\n\n## 14. 打开数据库\n\
  \n必须使用 `OPEN RESETLOGS` 命令打开数据库（因为此时没有重做日志，必须重新创建）：\n\n```\nSQL> alter database\
  \ open resetlogs ;\n```\n\n如果成功，您应该会看到此消息：\n\n```\nStatement processed\n```\n\n\
  ## 注意\n请记住，新恢复副本中的所有密码都与源数据库中的相同。您会希望在复制的数据库中更改密码，特别是如果它是从生产环境复制的。\n\n## 15. 添加临时文件\n\
  \n当您启动数据库时，Oracle 会自动尝试将任何缺失的临时文件添加到数据库中。如果目标服务器上的目录结构与源服务器不同，Oracle 将无法执行此操作。在此场景中，您必须手动添加任何缺失的临时文件。为此，首先将临时表空间的临时文件脱机。来自源数据库的文件定义如下脱机：\n\
  \n```\nSQL> alter database tempfile '/u01/dbfile/o18c/temp01.dbf' offline;\nSQL>\
  \ alter database tempfile '/u01/dbfile/o18c/temp01.dbf' drop;\n```\n\n接下来，向 `TEMP`\
  \ 表空间添加一个临时表空间文件，该文件与目标数据库服务器的目录结构相匹配：\n\n```\nSQL> alter tablespace temp add tempfile\
  \ '/ora01/dbfile/DEVDB/temp01.dbf'\nsize 100m;\n```\n\n您可以运行 `REPORT SCHEMA` 命令来验证所有文件是否位于正确的位置。\n\
  \n## 16. 重命名数据库\n\n此步骤是可选的。如果您需要重命名数据库以反映开发或测试数据库的名称，请创建一个包含 `CREATE CONTROLFILE`\
  \ 语句的跟踪文件，并使用它来重命名您的数据库。\n\n## 提示\n如果您不重命名数据库，请注意连接和重新同步到原始/源数据库使用的同一个恢复目录的操作。这会导致恢复目录混淆哪个是真正的源数据库，并可能危及您恢复和还原真正源数据库的能力。\n\
  \n重命名数据库的步骤如下：\n\n1.  生成包含重新创建控制文件 SQL 命令的跟踪文件：\n\n    ```\n    SQL> alter database\
  \ backup controlfile to trace as '/tmp/cf.sql' resetlogs;\n    ```\n\n2.  关闭数据库：\n\
  \n    ```\n    SQL> shutdown immediate;\n    ```\n\n3.  修改 `/tmp/cf.sql` 跟踪文件；务必在输出的顶部指定\
  \ `SET DATABASE \"<NEW DATABASE NAME>\"`：\n\n    ```\n    CREATE CONTROLFILE REUSE\
  \ SET DATABASE \"DEVDB\" RESETLOGS ARCHIVELOG\n    MAXLOGFILES 16\n    MAXLOGMEMBERS\
  \ 4\n    MAXDATAFILES 1024\n    MAXINSTANCES 1\n    MAXLOGHISTORY 876\n    LOGFILE\n\
  \    GROUP 1 (\n    '/ora01/oraredo/DEVDB/redo01a.rdo',\n    '/ora01/oraredo/DEVDB/redo01b.rdo'\n\
  \    ) SIZE 50M BLOCKSIZE 512,\n    GROUP 2 (\n    '/ora01/oraredo/DEVDB/redo02a.rdo',\n\
  \    '/ora01/oraredo/DEVDB/redo02b.rdo'\n    ) SIZE 50M BLOCKSIZE 512,\n    GROUP\
  \ 3 (\n    '/ora01/oraredo/DEVDB/redo03a.rdo',\n    '/ora01/oraredo/DEVDB/redo03b.rdo'\n\
  \    ) SIZE 50M BLOCKSIZE 512\n    DATAFILE\n    '/ora01/dbfile/DEVDB/system01.dbf',\n\
  \    '/ora01/dbfile/DEVDB/sysaux01.dbf',\n    '/ora01/dbfile/DEVDB/undotbs01.dbf',\n\
  \    '/ora01/dbfile/DEVDB/users01.dbf'\n    CHARACTER SET AL32UTF8;\n    ```\n\n\
  \    如果您未在脚本的顶部指定 `SET DATABASE`，那么当您运行该脚本时（如本示例稍后所示），您将收到如下错误：\n\n    ```\n   \
  \ ORA-01161: database name ... in file header does not match...\n    ```\n\n4. \
  \ 创建一个与新数据库名称匹配的 `init.ora` 文件：\n\n    ```\n    $ cd $ORACLE_HOME/dbs\n    $ cp\
  \ init.ora init.ora\n    $ cp inito18c.ora initDEVDB.ora\n    ```\n\n5.  修改新的 `init.ora`\
  \ 文件中的 `DB_NAME` 变量（在此示例中，它被设置为 `DEVDB`）：\n\n    ```\n    db_name='DEVDB'\n    ```\n\
  \n6.  将 `ORACLE_SID` 操作系统变量设置为新的 `SID` 名称（在此示例中，设置为 `DEVDB`）：\n\n    ```\n    $\
  \ echo $ORACLE_SID\n    DEVDB\n    ```\n\n7.  在 nomount 模式下启动实例：\n\n    ```\n  \
  \  SQL> startup nomount;\n    ```\n\n8.  运行跟踪文件（来自步骤 2）以重新创建控制文件：\n\n    ```\n \
  \   SQL> @/tmp/cf.sql\n    ```\n\n## 注意\n在此示例中，控制文件已存在于 `CONTROL_FILES` 初始化参数指定的位置；因此，在\
  \ `CREATE CONTROL FILE` 语句中使用了 `REUSE` 参数。\n\n9.  使用 `OPEN RESETLOGS` 打开数据库：\n\n\
  \    ```\n    SQL> alter database open resetlogs;\n    ```\n\n    如果成功，您应该拥有一个作为原始数据库副本的数据库。所有数据文件、控制文件、归档重做日志和在线重做日志都在新位置，并且数据库具有一个新名称。\n\
  \n10. 最后一步，确保您的临时表空间存在：\n\n    ```\n    ALTER TABLESPACE TEMP ADD TEMPFILE '/ora01/dbfile/DEVDB/temp01.dbf'\n\
  \    SIZE 104857600  REUSE AUTOEXTEND OFF;\n    ```\n\n## 提示\n您也可以使用 `NID` 实用程序来更改数据库名称和数据库标识符（DBID）。有关更多详细信息，请参阅\
  \ MOS 注释 863800.1。\n\n## 总结\n\nRMAN 是 Recovery Manager 的缩写。值得注意的是，Oracle 并未将此工具命名为\
  \ Backup Manager。Oracle 团队认识到，尽管备份很重要，但备份和恢复工具的真正价值在于其恢复和还原数据库的能力。能够管理恢复过程是关键技能。当数据库损坏需要恢复时，每个人都指望\
  \ DBA 来执行平稳快速的数据库恢复。Oracle DBA 应该使用 RMAN 来保护、确保和维护公司数据资产的可用性。\n\n还原和恢复过程类似于骨骼断裂时的愈合过程。从备份还原数据文件并将其放回原始目录，可以比作将骨骼复位到其原始位置。恢复数据文件类似于断裂骨骼的愈合——将骨骼恢复到断裂前的状态。但是，数据库恢复不会像骨骼愈合那样耗时。当您恢复数据文件时，您应用事务（从归档重做和在线重做中获得）以将还原的数据文件转换回介质故障发生前的状态。\n\
  \nRMAN 可用于任何类型的还原和恢复场景。根据具体情况，可以使用 RMAN 还原整个数据库、特定数据文件、控制文件、服务器参数文件、归档重做日志，或者仅还原特定的数据块。您可以指示\
  \ RMAN 执行完全恢复或不完全恢复。设置场景并练习每一个场景非常重要。这不仅可以测试备份，还可以验证可以使用备份成功进行恢复。定期安排的练习，或者甚至使用备份文件恢复到可安排的\
  \ DEV 环境，都将提供这些重要的测试。一旦您可以成功地将数据库恢复到与原始服务器不同的服务器，您将获得极大的信心并完全理解备份和恢复的内部原理。\n\n##\
  \ 20. 自动化作业\n\n在几乎任何类型的数据库环境中——从开发、测试到生产——DBA 都严重依赖 SQL 语句、代码块和脚本来执行任务。DBA 自动化的典型作业包括：\n\
  \n*   数据库和监听器的关闭和启动\n*   备份\n*   验证备份的完整性\n*   检查错误\n*   删除旧的跟踪或日志文件\n*   检查异常进程\n\
  *   检查异常情况\n\n\n\n"
- '# 数据库自动化与 Oracle Scheduler


  自动化在以下场景中发挥作用：当这些脚本（即代码块）成为不需要数据库管理员（DBA）干预即可运行的过程的一部分时。任务由按计划运行的进程或工作流定期执行，这些进程或工作流无需直接交互即可运行必要的脚本。例行维护作业通常是最容易自动化的工作，并且会产生一个成功完成或可能失败的检查结果以供验证。有时会变得复杂的是那些需要更改或理解故障原因以进行纠正，且无需人工交互即可继续的过程。Oracle
  18c 数据库已发展成为支持数据库自我修复、调整和打补丁的系统。Oracle 18c 在 Oracle Cloud 中提供了自治数据库。这些任务按预期发生，以便
  DBA 可以专注于其他领域，并在数据集成、开发和数据策略方面提供咨询。


  自动化例行任务使 DBA 能够更有效和高效。自动化环境本质上比手动管理系统运行更流畅、更高效。从脚本自动运行的 DBA 作业每次执行相同的命令集，因此不易出现人为错误和失误。使用本地部署的
  Oracle 18c 也允许将许多任务以及应用程序和其他维护作业所需的少量脚本自动化。本章将介绍两种调度实用程序：


  *   Oracle Scheduler


  *   Linux/Unix `cron` 实用程序


  当然，也可以选择使用替代`cron`实用程序的企业解决方案。这允许对作业进行集中管理。由于这里的选项很多，本章将不涵盖使用企业工具的内容，但在`cron`和 Oracle
  实用程序中调度的脚本和作业也可以利用企业工具。本章首先详细介绍 Oracle Scheduler 实用程序的基本方面。只要安装了 Oracle 数据库，就可以使用这个调度程序。Oracle
  Scheduler 可用于在各种配置中调度作业。


  本章还介绍了如何使用 Linux/Unix `cron`调度工具。

  在 Linux/Unix 环境中，DBA 经常使用`cron`调度实用程序来自动运行作业。`cron`实用程序无处不在，易于实现和使用。如果你是一名 Oracle
  DBA，你必须熟悉`cron`，因为迟早你会发现自己身处一个严重依赖此工具来自动化数据库作业的环境中。其他环境可能不允许访问`cron`调度，因此，本章中自动化的作业策略很重要，并且可以基于策略（可能是安全策略）在另一个工具中实现。


  本章最后几节将向你展示如何实施许多现实世界的 DBA 作业，例如自动启动/停止数据库、监控和操作系统文件维护。你应该能够扩展这些脚本以满足你环境的自动化要求。


  **注意**

  Enterprise Manager Grid/Cloud Control 也可用于调度和管理自动化作业。如果你在使用 Enterprise Manager 的环境中工作，那么使用此工具来自动化你的环境是合适的。


  ## 使用 Oracle Scheduler 自动化作业


  Oracle Scheduler 是一个提供自动化作业调度方法的工具。Oracle Scheduler 通过`DBMS_SCHEDULER`内部 PL/SQL
  包实现。Oracle Scheduler 为调度作业提供了一套复杂的功能。`DBMS_JOB`是用于在数据库上运行作业的较旧的软件包。它们都针对数据库调度和执行作业，但调度器提供了额外的功能，例如日志记录、基于权限的模型、更详细的调度以及调度信息的存储。有了这些功能，使用`DBMS_SCHEDULER`比使用`DBMS_JOBS`更有利。本章接下来的几节将介绍使用
  Oracle Scheduler 自动化具有简单需求的作业的基础知识。


  **提示**

  `DBMS_SCHEDULER`包中目前有超过 70 个可用的过程和函数。有关完整详细信息，请参阅《Oracle Database PL/SQL Packages
  and Types Reference Guide》，该指南可从 Oracle 网站的技术网络区域（ [`http://otn.oracle.com`](http://otn.oracle.com)
  ）下载。


  ### 创建和调度作业


  本节中的示例展示了如何使用`DBMS_SCHEDULER`来每天运行一个操作系统 shell 脚本。首先，创建一个包含 RMAN 备份命令的 shell 脚本。在此示例中，shell
  脚本名为`rmanback.bsh`，位于`/orahome/oracle/bin`目录下。该 shell 脚本还假定存在一个`/orahome/oracle/bin/log`目录可用。以下是
  shell 脚本内容：


  ```bash

  #!/bin/bash

  # source oracle OS variables; see chapter 2 for an example of oraset script

  . /etc/oraset o18c

  rman target / <<EOF

  spool log to ''/orahome/oracle/bin/log/rmanback.log''

  backup database;

  spool log off;

  EOF

  exit 0

  ```


  接下来，使用`DBMS_SCHEDULER`包的`CREATE_JOB`过程来创建一个每日作业。然后，以`SYS`或具有`CREATE`和`ALTER JOB`权限的`SYSBACKUP`用户身份连接，并执行以下命令：


  ```sql

  SQL> BEGIN

  DBMS_SCHEDULER.CREATE_JOB(

  job_name => ''RMAN_BACKUP'',

  job_type => ''EXECUTABLE'',

  job_action => ''/orahome/oracle/bin/rmanback.bsh'',

  repeat_interval => ''FREQ=DAILY;BYHOUR=9;BYMINUTE=35'',

  start_date => to_date(''17-01-2018'',''dd-mm-yyyy''),

  job_class => ''"DEFAULT_JOB_CLASS"'',

  auto_drop => FALSE,

  comments => ''RMAN backup job'',

  enabled => TRUE);

  END;

  /

  ```


  在之前的代码中，`JOB_TYPE`参数可以是以下类型之一：`STORED_PROCEDURE`、`PLSQL_BLOCK`、`EXTERNAL_SCRIPT`、`SQL_SCRIPT`或`EXECUTABLE`。在此示例中，执行的是一个外部
  shell 脚本，因此作业类型为`EXTERNAL`。


  `REPEAT_INTERVAL`参数设置为`FREQ=DAILY;BYHOUR=9;BYMINUTE=35`。这指示作业在每天上午 9:35 运行。`CREATE_JOB`的`REPEAT_INTERVAL`参数能够实现复杂的日历频率。例如，它支持各种每年、每月、每周、每天、每小时、每分钟和每秒钟的调度计划。《Oracle
  Database PL/SQL Packages and Types Reference Guide》中仅`REPEAT_INTERVAL`参数的语法细节就占了好几页。


  `JOB_CLASS`参数指定将作业分配到哪个作业类。通常，你会创建一个作业类并将作业分配给该类，然后该作业将继承该特定类的属性。例如，你可能希望特定类中的所有作业具有相同的日志记录级别或以相同的方式清除日志文件。如果你尚未创建任何作业类，则可以使用默认的作业类。前面的示例使用了默认的作业类。



  '
- '# Oracle Scheduler 任务管理与配置


  ## 提示


  为本地和远程外部作业设置凭据。Oracle 可以使用默认用户，但出于安全策略和捕获作业执行情况的考虑，最好创建一个用户来验证外部作业。`DBMS_CREDENTIAL`
  存储用户详细信息，并且可以存储 Windows 域用户（例如服务帐户）来执行这些作业。凭据由 `SYS` 拥有，也可以使用 `DBMS_CREDENTIAL`
  进行管理。


  在此示例中，`AUTO_DROP` 参数被设置为 `FALSE`。这指示 Oracle 调度程序在作业运行后不要自动删除它（默认值为 `TRUE`）。


  ## 查看作业详情


  要查看作业的配置方式，请查询 `DBA_SCHEDULER_JOBS` 视图。此查询选择 `RMAN_BACKUP` 作业的信息：


  ```sql

  SQL> SELECT job_name

  ,last_start_date

  ,last_run_duration

  ,next_run_date

  ,repeat_interval

  FROM dba_scheduler_jobs

  WHERE job_name=''RMAN_BACKUP'';

  ```


  每次作业运行时，其执行记录都会记录在数据字典中。要检查作业执行的状态，请查询 `DBA_SCHEDULER_JOB_LOG` 视图。对于作业每次运行，都应有一个条目：


  ```sql

  SQL> SELECT job_name

  ,log_date

  ,operation

  ,status

  FROM dba_scheduler_job_log

  WHERE job_name=''RMAN_BACKUP'';

  ```


  ## 修改作业日志历史记录


  默认情况下，Oracle 调度程序保留 30 天的日志历史记录。你可以通过 `SET_SCHEDULER_ATTRIBUTE` 过程修改默认的保留期。例如，此命令将默认天数更改为
  15：


  ```sql

  SQL> exec dbms_scheduler.set_scheduler_attribute(''log_history'',15);

  ```


  要完全清除日志历史记录的内容，请使用 `PURGE_LOG` 过程：


  ```sql

  SQL> exec dbms_scheduler.purge_log();

  ```


  ## 修改作业


  你可以通过 `SET_ATTRIBUTE` 过程修改作业的各种属性。此示例将 `RMAN_BACKUP` 作业修改为每周一运行：


  ```sql

  SQL> BEGIN

  dbms_scheduler.set_attribute(

  name=>''RMAN_BACKUP''

  ,attribute=>''repeat_interval''

  ,value=>''freq=weekly; byday=mon'');

  END;

  /

  ```


  你可以通过从 `DBA_SCHEDULER_JOBS` 视图中选择 `REPEAT_INTERVAL` 列来验证更改。以下是 `RMAN_BACKUP` 作业的
  `REPEAT_INTERVAL` 列现在的显示内容：


  ```

  21-JAN-18 12.00.00.200000 AM -07:00 freq=weekly; byday=mon

  ```


  从先前的输出中，你可以看到作业将在下一个星期一运行，并且由于没有指定 `BYHOUR` 和 `BYMINUTE` 选项（在修改作业时），作业被安排在默认时间 12:00
  AM 运行。


  ## 停止作业


  如果某个作业运行时间异常长，你可能希望中止它。使用 `STOP_JOB` 过程来停止当前正在运行的作业。此示例在 `RMAN_BACKUP` 作业运行时将其停止：


  ```sql

  SQL> exec dbms_scheduler.stop_job(job_name=>''RMAN_BACKUP'');

  ```


  `DBA_SCHEDULER_JOB_LOG` 的 `STATUS` 列将为使用 `STOP_JOB` 过程停止的作业显示 `STOPPED`。


  ## 禁用作业


  你可能希望临时禁用一个运行不正确的作业。在排除故障时，你需要确保该作业不会运行。使用 `DISABLE` 过程来禁用作业：


  ```sql

  SQL> exec dbms_scheduler.disable(''RMAN_BACKUP'');

  ```


  如果作业当前正在运行，请考虑先停止作业或使用 `DISABLE` 过程的 `FORCE` 选项：


  ```sql

  SQL> exec dbms_scheduler.disable(name=>''RMAN_BACKUP'',force=>true);

  ```


  ## 启用作业


  你可以通过 `DBMS_SCHEDULER` 包的 `ENABLE` 过程来启用先前禁用的作业。此示例重新启用 `RMAN_BACKUP` 作业：


  ```sql

  SQL> exec dbms_scheduler.enable(name=>''RMAN_BACKUP'');

  ```


  ## 提示


  你可以通过从 `DBA_SCHEDULER_JOBS` 视图中选择 `ENABLED` 列来检查作业是被禁用还是已启用。


  ## 复制作业


  如果你想克隆一个当前的作业，可以使用 `COPY_JOB` 过程来完成。该过程接受两个参数：旧作业名和新作业名。以下是一个复制作业的示例，其中 `RMAN_BACKUP`
  是先前创建的作业，`RMAN_NEW_BACK` 是将要创建的新作业：


  ```sql

  begin

  dbms_scheduler.copy_job(''RMAN_BACKUP'',''RMAN_NEW_BACK'');

  end;

  /

  ```


  复制的作业将被创建但处于禁用状态。在运行之前，你必须先启用该作业（参见前一节的示例）。


  ## 手动运行作业


  你可以在其常规计划之外手动运行作业。你可能想这样做以测试作业，确保其正常工作。使用 `RUN_JOB` 过程手动启动作业。此示例手动运行先前创建的 `RMAN_BACKUP`
  作业：


  ```sql

  SQL> BEGIN

  DBMS_SCHEDULER.RUN_JOB(

  JOB_NAME => ''RMAN_BACKUP'',

  USE_CURRENT_SESSION => FALSE);

  END;

  /

  ```


  `USE_CURRENT_SESSION` 参数指示 Oracle 调度程序是否以当前用户身份运行作业（或不）。值为 `FALSE` 指示调度程序以最初创建和安排作业的用户身份运行作业。


  ## 删除作业


  如果你不再需要某个作业，应将其从调度程序中删除。使用 `DROP_JOB` 过程永久删除作业。此示例移除 `RMAN_BACKUP` 作业：


  ```sql

  SQL> BEGIN

  dbms_scheduler.drop_job(job_name=>''RMAN_BACKUP'');

  END;

  /

  ```


  该代码将删除作业，并从 `DBA_SCHEDULER_JOBS` 视图中移除有关已删除作业的任何信息。


