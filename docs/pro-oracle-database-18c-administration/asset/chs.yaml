  在阅读本章后续内容时，请随时参考 **表 15-1**。后续章节将对这些术语和概念进行解释和阐述。\n\n## 引用有用的视图\n\n当您处理 MV 时，有时可能很难记住在特定情况下应查询哪个数据字典视图。系统提供了多种数据字典视图。**表\
