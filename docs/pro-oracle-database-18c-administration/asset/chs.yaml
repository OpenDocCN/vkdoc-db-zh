  ## 6. 设置控制文件的自动备份


  你应始终配置 RMAN，使其在以下任一操作后自动备份控制文件：运行任何 RMAN `BACKUP` 或 `COPY` 命令后，或在你对数据库进行物理更改（例如添加/删除数据文件）并导致控制文件更新后。使用
  `SHOW` 命令可以显示控制文件自动备份的当前设置：


  ```

  RMAN> show controlfile autobackup;

  ```


  以下是一些示例输出：


  ```

  RMAN configuration parameters for database with db_unique_name O18C are:

  CONFIGURE CONTROLFILE AUTOBACKUP ON;

  ```


  下面这行代码展示了如何启用控制文件的自动备份功能：


  ```

  RMAN> configure controlfile autobackup on;

  ```


  控制文件的自动备份总是存储在它自己的备份集中。当启用了控制文件的自动备份时，如果你正在使用 `spfile`，它将随控制文件一起被自动备份。


  如果出于任何原因，你希望禁用控制文件的自动备份，可以按如下方式操作：


  ```

  RMAN> configure controlfile autobackup off;

  ```


  注意

  如果控制文件的自动备份处于关闭状态，那么每当你备份数据文件 1 (`SYSTEM` 表空间数据文件) 时，RMAN 会自动备份控制文件。


  ## 7. 指定控制文件自动备份的位置


  当你启用控制文件的自动备份时，RMAN 会在以下位置之一创建控制文件的备份：


  *   默认位置

  *   FRA

  *   通过 `CONFIGURE CONTROLFILE AUTOBACKUP FORMAT` 命令指定的位置


  如果你未使用 FRA，或者未指定控制文件自动备份的位置，则控制文件自动备份会被写入一个依赖于操作系统的默认位置。在 Linux/Unix 环境中，默认位置是 `ORACLE_HOME/dbs`；例如，


  ```

  /u01/app/oracle/product/18.1.0.1/db_1/dbs/c-3423216220-20130109-01

  ```


  如果你已启用 FRA，那么 RMAN 会使用 OMF 格式作为文件名，自动将控制文件自动备份文件写入 FRA 中的目录；例如，


  ```

  ///autobackup//o1_mf_s_729103049_68fho9z2_.bkp

  ```


  控制文件的备份可以放置在数据库备份所在的同一目录中。下面是一个示例：


  ```

  RMAN> configure controlfile autobackup format for device type disk to ''/u01/O18C/rman/rman_ctl_%F.bk'';

  ```




  如果要将自动备份格式设置回默认值，请按如下方式操作：

  ```sql

  RMAN> configure controlfile autobackup format for device type disk clear ;

  ```


  ## 8. 备份归档日志


  您应该定期备份归档日志。在至少备份一次之前，不应从磁盘中删除归档日志文件。我通常喜欢保留在上次成功的`RMAN`备份之后生成的所有归档日志。


  通常，我会指示`RMAN`在备份数据文件的同时备份归档日志。这在大多数情况下是一个足够的策略。以下是与数据文件一起备份归档日志的命令：

  ```sql

  RMAN> backup database plus archivelog;

  ```


  有时，如果您的数据库生成大量重做日志，您可能需要以与数据文件不同的频率备份归档日志。DBA 可能会每天备份归档日志两到三次；在日志备份后，DBA 会删除它们，以便为更新的归档日志文件腾出空间。


  在大多数情况下，您不需要上次成功备份之前生成的任何归档日志。例如，如果某个数据文件经历了介质故障，您需要从备份中恢复该数据文件，然后应用在该数据文件备份期间及之后生成的任何归档日志。


  在某些情况下，您可能需要上次备份之前生成的归档日志。例如，您可能遇到介质故障，尝试从上次成功的备份中恢复数据库，但发现该备份已损坏，因此需要从更早的备份中恢复。此时，您需要自该旧备份制作以来生成的所有归档日志的副本。


  ## 9. 确定快照控制文件的位置


  `RMAN`需要控制文件的读一致性视图来完成以下任务：

  *   与恢复目录同步

  *   备份当前控制文件


  `RMAN`会创建当前控制文件的快照副本，在执行这些任务时将其用作读一致性副本。这确保了`RMAN`使用的是一个未被修改的控制文件副本。


  快照控制文件的默认位置是操作系统特定的。在 Linux 平台上，默认位置/格式是`ORACLE_HOME/dbs/snapcf_@.f`。请注意，默认位置不在`FRA`中。


  您可以使用`SHOW`命令显示当前快照控制文件的详细信息：

  ```sql

  RMAN> show snapshot controlfile name;

  ```


  以下是一些示例输出：

  ```

  CONFIGURE SNAPSHOT CONTROLFILE NAME TO

  ''/ora01/app/oracle/product/18.1.0.1/db_1/dbs/snapcf_o18c.f''; # default

  ```


  在大多数情况下，快照控制文件的默认位置和格式是足够的。此文件占用空间不大，也没有密集的`I/O`要求。我建议您使用默认设置。


  如果您有充分的理由需要将快照控制文件配置到非默认位置，可以按如下方式操作：

  ```sql

  RMAN> configure snapshot controlfile name to ''/u01/O18C/rman/snapcf.ctl'';

  ```


  如果您不小心将快照控制文件位置配置到了一个不存在的目录，那么在运行`BACKUP`或`COPY`命令时，控制文件的自动备份将失败，并出现此错误：

  ```

  ORA-01580: error creating control backup file ...

  ```


  您可以将快照控制文件设置回默认值，如下所示：

  ```sql

  RMAN> configure snapshot controlfile name clear;

  ```


  ## 10. 使用恢复目录


  `RMAN`总是将其最新的备份操作存储在目标数据库控制文件中。您可以设置一个可选的恢复目录来存储有关`RMAN`备份的元数据。恢复目录是一个独立的模式（通常位于与目标数据库不同的数据库中），它包含存储`RMAN`备份信息的数据库对象（表、索引等）。恢复目录不存储`RMAN`备份片——只存储备份元数据。


  使用恢复目录的主要优点如下：

  *   为`RMAN`元数据提供了一个辅助存储库。如果您丢失了所有控制文件及其备份，仍然可以从恢复目录中检索`RMAN`元数据。

  *   存储`RMAN`元数据的时间比仅使用控制文件作为存储库可能的时间要长得多。

  *   提供对所有`RMAN`功能的访问。使用恢复目录时，某些恢复功能会更简单。


  使用恢复目录的缺点是，这是另一个需要您设置、维护和备份的数据库。此外，当您开始备份并尝试连接到恢复目录时，如果恢复目录因任何原因（服务器宕机、网络问题等）不可用，您仍然可以继续进行备份，而不使用恢复目录。


  使用恢复目录时，您还必须注意版本问题。您需要确保用于存储恢复目录的数据库版本与目标数据库的版本兼容。升级目标数据库时，请确保（如果需要）恢复目录也已升级。


  > **注意**

  > 有关如何实现恢复目录的详细信息，请参见第 18 章。


  ## 11. 使用介质管理器


  `RMAN`要直接备份到磁带需要介质管理器。多家供应商提供此功能（需付费）。介质管理器用于大型数据库环境，例如数据仓库，在这些环境中可能没有足够的空间将数据库备份到磁盘。您也可能有直接备份到磁带的灾难恢复要求。


  如果您有此类要求，则应购买并实施介质管理软件包。如果不需要直接备份到磁带，则无需实现介质管理器。`RMAN`直接备份到磁盘工作良好。备份文件可以复制到磁带以进行异地存储，并且根据保留策略进行管理。如果复制到磁带，您可以安排一个作业运行`RMAN`备份，然后启动复制到磁带的操作。备份文件需要是完整的，而不是处于备份过程中；否则，存在仅将部分文件复制到磁带的风险。


  > **提示**

  > 有关如何实现 Oracle Secure Backup 作为介质管理层的详细信息，请参见第 20 章。


  ## 12. 设置 CONTROL_FILE_RECORD_KEEP_TIME 初始化参数


  `CONTROL_FILE_RECORD_KEEP_TIME`初始化参数指定了控制文件中可重用记录在可被覆盖之前保留的最短天数。`RMAN`元数据存储在控制文件的可重用部分中，因此最终会被覆盖。


  如果您正在使用恢复目录，那么您不需要担心此参数，因为`RMAN`元数据在恢复目录中是无限期存储的。因此，当您使用恢复目录时，您可以访问任何历史的`RMAN`元数据。


  如果您仅使用控制文件作为`RMAN`元数据存储库，那么存储在那里的信息最终将被覆盖。`CONTROL_FILE_RECORD_KEEP_TIME`的默认值为 7
  天：

  ```sql

  SQL> show parameter control_file_record_keep_time

  NAME                                 TYPE        VALUE

  ------------------------------------ ----------- --------------------------

  control_file_record_keep_time        integer     7

  ```



  '
- '# 13. 配置 RMAN 的备份保留策略


  你可以将该值设置为 0 到 365 天之间的任何值。将值设置为 0 意味着 RMAN 元数据信息可以在任何时候被覆盖。

  `CONTROL_FILE_RECORD_KEEP_TIME`参数在旧版 Oracle 中更为关键，在那些版本中，如果元数据被覆盖，用 RMAN 信息重新填充控制文件并非易事。`CROSSCHECK`命令可用于快速让控制文件感知到
  RMAN 备份文件。

  如果你进行每日备份，那么我建议你将此参数保留为 7 天。但是，如果你每月只备份一次数据库，或者由于某种原因，你的保留策略大于 7 天，并且你没有使用恢复目录，那么你可能需要考虑增加此值。增加此参数的缺点是，如果你有大量
  RMAN 备份活动，这可能会增加控制文件的大小。


  RMAN 保留策略允许你指定希望保留备份多长时间。RMAN 有两种相互排斥的方法来指定保留策略：


  *   恢复窗口

  *   备份数量（冗余度）


  ## 恢复窗口


  通过恢复窗口，你可以指定一个过去的天数，以便能够恢复到该窗口内的任何时间点。例如，如果你指定一个 5 天的保留策略窗口，那么 RMAN 不会将那些能够恢复到该
  5 天窗口内任何时间点所需的数据文件和归档日志备份标记为过时：


  ```

  RMAN> configure retention policy to recovery window of 5 days;

  ```


  对于指定的恢复窗口，RMAN 可能需要比 5 天窗口更早的备份，因为它可能需要一个更早的备份作为起点，才能恢复到指定的恢复点。例如，假设你上一次良好的备份是 6
  天前进行的，而现在你想恢复到 4 天前。对于这个恢复窗口，RMAN 需要 6 天前的备份来还原并恢复到指定的点。


  ## 冗余度


  你还可以指定 RMAN 保留的最小备份数量。例如，如果将冗余度设置为 2，那么 RMAN 不会将数据文件和归档日志文件的最新两个备份标记为过时：


  ```

  RMAN> configure retention policy to redundancy 2;

  ```


  我发现，基于冗余度的保留策略更容易操作，并且在备份保留时间方面更具可预测性。如果我设置冗余度为 2，我知道 RMAN 不会将最新的两个备份标记为过时。相比之下，恢复窗口保留策略依赖于备份频率和窗口长度来确定备份是否过时。


  ## 基于保留策略删除备份


  你可以报告 RMAN 根据保留策略已确定为过时的备份，如下所示：


  ```

  RMAN> report obsolete;

  ```


  要删除过时的备份，请运行 `DELETE OBSOLETE` 命令：


  ```

  RMAN> delete obsolete;

  ```


  系统会提示你：


  ```

  Do you really want to delete the above objects (enter YES or NO)?

  ```


  如果你在编写脚本执行该过程，可以指定删除操作不提示输入：


  ```

  RMAN> delete noprompt obsolete;

  ```


  我通常将 `DELETE NOPROMPT OBSOLETE` 命令编码到备份数据库的 Shell 脚本中。这指示 RMAN 根据保留策略删除任何过时的备份和过时的归档日志（有关如何使用
  Shell 脚本自动删除过时备份的示例，请参阅本章后面的“从决策到行动的过渡”部分）。


  ## 清除保留策略


  默认的保留策略是冗余度为 1。你可以通过 `TO NONE` 命令完全禁用 RMAN 保留策略。


  ```

  RMAN> configure retention policy to none;

  ```


  当策略设置为 `NONE` 时，没有任何备份会被视为过时，因此无法通过 `DELETE OBSOLETE` 命令移除。这通常不是你想要的行为。你希望让 RMAN
  根据窗口或备份数量的保留策略删除备份。


  要将保留策略设置回默认值，请使用 `CLEAR` 命令：


  ```

  RMAN> configure retention policy clear;

  ```


  '
- '# 14. 配置归档日志删除策略


  在大多数情况下，我让 RMAN 根据数据库备份的保留策略删除归档日志。这是默认行为。你可以使用 `SHOW` 命令查看数据库保留策略：


  ```

  RMAN> show retention policy;

  CONFIGURE RETENTION POLICY TO REDUNDANCY 1; # default

  ```


  要基于数据库保留策略删除归档日志（和备份片），请运行以下命令：


  ```

  RMAN> delete obsolete;

  ```


  从 Oracle Database 11g 开始，你可以指定一个独立于数据库备份的归档日志删除策略。此删除策略适用于 FRA（快速恢复区）之外和之内的归档日志。


  > 注意

  > 在 Oracle Database 11g 之前，归档删除策略仅适用于与备用数据库关联的归档日志。


  要配置归档日志删除策略，请使用 `CONFIGURE ARCHIVELOG DELETION` 命令。以下命令配置归档重做日志删除策略，使得归档日志在被备份到磁盘两次之前不会被删除：


  ```

  RMAN> configure archivelog deletion policy to backed up 2 times to device type disk;

  ```


  要让 RMAN 根据归档日志删除策略删除过时的归档日志，请发出以下命令：


  ```

  RMAN> delete archivelog all;

  ```


  > 提示

  > 在运行 `DELETE` 命令之前先运行 `CROSSCHECK` 命令。这样做可以确保 RMAN 知晓文件是否在磁盘上。


  要查看是否为归档日志文件设置了特定的保留策略，请使用以下命令：


  ```

  RMAN> show archivelog deletion policy ;

  ```


  要清除归档删除策略，请执行以下操作：


  ```

  RMAN> configure archivelog deletion policy clear;

  ```


  '
- '# 15. 设置并行度


  如果你的数据库服务器配备了支持多通道的硬件，你可以显著提高 RMAN 备份和恢复操作的性能。如果你的服务器有多个 CPU 和多个存储设备（磁盘或磁带设备），那么可以通过启用多个备份通道来提高性能。

  如果你需要从备份和恢复操作中获得更好的性能，并且拥有支持并行操作的硬件，那么你应该启用并行度并进行测试以确定最佳程度。如果你的硬件可以利用并行 RMAN 通道，启用并行度几乎没有缺点。


  如果你有多个 CPU，但只有一个存储设备位置，你可以启用多个通道向一个位置写入和读取。例如，如果你备份到 FRA，仍然可以通过启用并行度来利用多个通道。假设你的服务器上有四个
  CPU，并希望启用相应的并行度：


  ```

  RMAN> configure device type disk parallelism 4;

  ```


  你还可以通过配置与不同挂载点关联的多个通道来并行写入单独的位置；例如，


  ```

  RMAN> configure device type disk parallelism 4;

  RMAN> configure channel 1 device type disk format ''/u01/O18C/rman/rman1_%U.bk'';

  RMAN> configure channel 2 device type disk format ''/u02/O18C/rman/rman2_%U.bk'';

  RMAN> configure channel 3 device type disk format ''/u03/O18C/rman/rman3_%U.bk'';

  RMAN> configure channel 4 device type disk format ''/u04/O18C/rman/rman4_%U.bk'';

  ```



  此代码配置了四个通道，分别写入磁盘上的不同位置。当为不同位置配置单独通道时，请确保启用并行度以匹配已配置的设备通道数量。如果分配的通道数超过指定的并行度，RMAN
  将仅向并行度指定数量的通道写入数据，并忽略其他通道。


  如果需要清除并行度，可以按如下方式操作：

  ```

  RMAN> configure device type disk clear;

  ```


  类似地，要清除通道设备类型，请使用 `CLEAR` 命令。此示例清除通道 4：

  ```

  RMAN> configure channel 4 device type disk clear;

  ```


  ## 16. 使用备份集或映像副本


  当你发出 RMAN `BACKUP` 命令时，可以指定备份为以下类型之一：

  *   备份集

  *   映像副本


  备份集是默认的 RMAN 备份类型。一个备份集包含备份片段，这些是只有 RMAN 才能写入或读取的二进制文件。备份集通常是可取的，因为它们通常比正在备份的数据文件要小。RMAN
  会自动尝试创建带有未使用块压缩的备份片段。在此模式下，RMAN 读取位图以确定哪些块已分配，并且只从数据文件中读取这些块。此功能仅适用于基于磁盘的备份集和 Oracle
  Secure Backup 磁带备份。


  注意：RMAN 也可以使用真正的二进制压缩来创建备份集。这是你从操作系统压缩实用程序（如 `zip`）获得的那种压缩。Oracle 支持多个级别的二进制压缩。`BASIC`
  压缩算法无需额外许可即可使用。Oracle 通过 Oracle Advanced Compression 选项提供了进一步的压缩功能（有关如何启用二进制压缩的详细信息，请参阅本章后面的“配置二进制压缩”部分）。


  当你创建备份集形式的备份时，二进制备份片段文件只能由 RMAN 进程操作。一些数据库管理员认为这是一个缺点，因为他们必须使用 RMAN 来备份和恢复这些文件（你无法直接访问或控制备份片段）。但这些看法是没有根据的。除非你遇到一个罕见的错误，否则
  RMAN 是可靠的，并且在所有备份和恢复情况下都能可靠地工作。


  将备份集与映像副本进行对比。映像副本为每个数据文件创建逐字节相同的副本。创建映像副本的优点是（如有必要）你可以不使用 RMAN 而操作映像副本（如使用操作系统复制实用程序）。此外，发生介质故障时，映像副本是恢复数据文件的快速方法，因为
  RMAN 只需将文件从备份位置复制回来（无需重构数据文件，因为它是一个精确副本）。


  备份到磁盘的大小几乎总是需要关注的问题。备份集在磁盘空间消耗方面更高效。因为备份集可以利用 RMAN 压缩，与映像副本相比，涉及的 I/O 也更少。在许多环境中，减少
  I/O 以免影响其他应用程序是一个需要考虑的问题。但是，如果你觉得需要直接控制 RMAN 创建的备份文件，或者你所处的环境中恢复过程的速度至关重要，请考虑使用映像副本。


  ## 17. 使用增量备份


  增量备份策略适用于大型数据库，其中只有一小部分数据库块在从一次备份到下一次备份之间发生变化。如果你处于数据仓库环境中，可能需要考虑增量备份策略，因为它可以大大减小备份的大小。例如，你可能希望运行每周一次的
  0 级备份，然后运行每日一次的 1 级增量备份。


  术语 `RMAN level 0 incremental backup` 本身描述得也不是很确切。0 级增量备份备份的块与完全备份相同。换句话说，以下两个命令备份数据库中的相同块：

  ```

  RMAN> backup as backupset full database;

  RMAN> backup as backupset incremental level=0 database;

  ```


  之前两个命令之间的唯一区别是，增量 0 级备份可以与其他增量备份结合使用，而完全备份不能参与增量备份策略。因此，我几乎总是更喜欢使用 `INCREMENTAL
  LEVEL=0` 语法（而不是完全备份）；它让我可以灵活地将 0 级增量备份与后续的 1 级增量备份一起使用。


  ## 18. 使用增量更新备份


  增量更新备份是实现映像副本备份策略的一种高效方法。此技术指示 RMAN 首先创建数据文件的映像副本；然后，下次备份运行时，RMAN 不是创建一组新的映像副本，而是进行一次增量备份（自映像副本创建以来块的更改），并将该增量备份应用到映像副本上。


  如果你有足够的磁盘空间存放数据库的完整映像副本，并且希望在发生介质故障时能够直接使用映像副本的灵活性，请考虑此备份策略。


  这种方法的一个潜在缺点是，如果要求你恢复并恢复到过去的某个时间点，你只能恢复并恢复到映像副本上次使用增量备份更新的时间点。


  ## 19. 使用块更改跟踪


  此功能跟踪数据库块何时发生更改。其思想是，如果你正在使用增量备份策略，则可以提升性能，因为通过实施此功能，RMAN 无需扫描数据文件中的每个块（在高水位线下）以确定是否需要备份。相反，RMAN
  只需访问块更改跟踪文件，即可找出自上次备份以来哪些块已更改，并直接访问这些块。如果你在大型数据仓库环境中工作并且正在使用增量备份策略，请考虑启用块更改跟踪以提升性能。


  注意：有关实施增量和块更改备份及恢复的更多详细信息，请参见第 18 章。


  ## 20. 配置二进制压缩


  你可以配置 RMAN 在生成备份集时使用真正的二进制压缩。你可以通过以下两种方式之一启用压缩：

  *   在 `BACKUP` 命令中指定 `AS COMPRESSED BACKUPSET`。

  *   使用一次性的 `CONFIGURE` 命令。


  以下是在发出 `BACKUP` 命令时使用压缩进行备份的示例：

  ```

  RMAN> backup as compressed backupset database;

  ```


  此示例为磁盘设备配置了压缩：

  ```

  RMAN> configure device type disk backup type to compressed backupset;

  ```


  如果需要清除设备类型压缩，请发出此命令：

  ```

  RMAN> configure device type disk clear;

  ```


  事实证明，默认的压缩算法非常高效。对于典型的数据库，备份通常比常规备份小大约四到五倍。当然，你的压缩结果可能会有所不同，具体取决于你的数据。


  为什么不压缩所有备份？压缩备份消耗更多 CPU 资源，并且创建和从中恢复所需时间更长，但它们导致的 I/O 更少，并且分布在更长的时间段内。如果你有多个 CPU，并且制作备份的速度不是问题，那么你应该考虑压缩你的备份。


  你可以使用 `SHOW` 命令查看启用的压缩类型：

  ```

  RMAN> show compression algorithm;

  ```


  以下是一些示例输出：

  ```

  CONFIGURE COMPRESSION ALGORITHM ''BASIC'' AS OF RELEASE ''DEFAULT''

  OPTIMIZE FOR LOAD TRUE ; # default

  ```



  '
- '# 压缩算法


  基本压缩算法不需要 Oracle 的额外许可。如果您拥有高级压缩选项的许可，那么您还可以使用三个额外的可配置二进制压缩级别；例如：


  ```

  RMAN> configure compression algorithm ''HIGH'';

  RMAN> configure compression algorithm ''MEDIUM'';

  RMAN> configure compression algorithm ''LOW'';

  ```


  根据我的经验，之前的压缩算法在压缩比和创建备份所需时间方面都非常高效。


  您可以查询 `V$RMAN_COMPRESSION_ALGORITHM` 来查看您数据库版本可用的压缩算法详情。要将当前压缩算法重置为默认的 `BASIC`，请使用
  `CLEAR` 命令：


  ```

  RMAN> configure compression algorithm clear;

  ```


  '
- '# 配置加密


  您可能被要求加密备份。某些场所尤其需要对包含敏感数据并且存储在异地的备份进行加密。要在备份时使用加密，您必须使用 Oracle 企业版并拥有高级安全选项的许可。


  如果您已配置了安全钱包（详情请参阅可从 Oracle 网站技术网络区域（[`http://otn.oracle.com`](http://otn.oracle.com)）免费下载的《Oracle
  高级安全管理员指南》），您可以为备份配置透明加密，如下所示：


  ```

  RMAN> configure encryption for database on;

  ```


  现在您进行的任何备份都将被加密。如果您需要从备份中恢复，它会自动解密（假设与您加密备份时相同的安全钱包仍在使用）。要禁用加密，请使用 `CLEAR` 命令：


  ```

  RMAN> configure encryption for database off;

  ```


  加密的表空间在备份集中将保持加密状态。备份加密的配置不需要开启，只有那些被加密的表空间才会保持加密。


  您也可以使用 `CLEAR` 清除加密设置：


  ```

  RMAN> configure encryption for database clear;

  ```


  您可以查询 `V$RMAN_ENCRYPTION_ALGORITHMS` 来查看您数据库版本可用的加密算法详情。


  '
- '# 在 RMAN 中运行 SQL


  从 Oracle 数据库 12c 开始，您可以直接在 RMAN 中运行 SQL 语句（并查看结果）：


  ```

  RMAN> select * from v$rman_encryption_algorithms;

  ```


  在 12c 之前，您可以使用 RMAN 的 `sql` 命令运行之前的 SQL 语句，但不会显示结果：


  ```

  RMAN> sql ''select * from v$rman_encryption_algorithms'';

  ```


  RMAN 的 `sql` 命令更常用于运行诸如 `ALTER SYSTEM` 之类的命令：


  ```

  RMAN> sql ''alter system switch logfile'';

  ```


  现在，在 12c 中，您可以直接运行 SQL：


  ```

  RMAN> alter system switch logfile;

  ```


  能够在 RMAN 中运行 SQL 是一个非常实用的增强；它允许您查看 SQL 查询的结果，并且不再需要指定 `sql` 关键字以及在 SQL 命令本身周围加上引号。


  '
- '# 配置杂项设置


  RMAN 提供了灵活的通道配置命令。根据特殊情况和数据库要求，您偶尔需要使用它们。以下是一些选项：


  *   备份集最大大小

  *   备份片最大大小

  *   最大速率

  *   最大打开文件数


  默认情况下，备份集最大大小是无限制的。您可以使用 `CONFIGURE` 或 `BACKUP` 命令中的 `MAXSETSIZE` 参数来指定备份集的整体最大大小。请确保此参数的值至少与
  RMAN 正在备份的最大数据文件一样大。示例如下：


  ```

  RMAN> configure maxsetsize to 2g;

  ```


  有时，由于存储设备的物理限制，您可能希望限制备份片的总体大小。使用 `CONFIGURE CHANNEL` 或 `ALLOCATE CHANNEL` 命令的 `MAXPIECESIZE`
  参数来实现；例如：


  ```

  RMAN> configure channel device type disk maxpiecesize = 2g;

  ```


  如果您需要设置 RMAN 每秒在通道上读取的最大字节数，可以使用 `RATE` 参数。这会将通道 1 的最大读取速率配置为每秒 200MB：


  ```

  configure channel 1 device type disk rate 200M;

  ```


  如果您对可同时打开的文件数量有限制，可以通过 `MAXOPENFILES` 参数指定一个最大打开文件数：


  ```

  RMAN> configure channel 1 device type disk maxopenfiles 32;

  ```


  当您需要让 RMAN 意识到某些操作系统或硬件限制时，您可能需要配置这些设置中的任何一个。您很少需要使用这些参数，但应该了解它们。


  '
- '# 配置信息输出


  一个好的做法是始终设置操作系统 `NLS_DATE_FORMAT` 变量（在运行 RMAN 之前），以便在 RMAN 日志中同时显示日期和时间信息，而不是像默认的那样只显示日期：


  ```

  export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''

  ```


  这在故障排除时非常有用，尤其是在 RMAN 失败时，因为我们可以使用 RMAN 错误发生时的确切日期/时间信息，并与 `alert.log` 和操作系统/MML
  日志进行比较，以验证数据库/服务器中还发生了哪些其他事件。另外，请考虑执行 `SET ECHO ON` 以确保 RMAN 命令在执行前显示在日志中。同时执行 `SHOW
  ALL` 以显示 RMAN 变量的当前设置。这些设置在故障排除和调优时非常有用。


  '
- '# 清除所有 RMAN 配置


  没有 `CLEAR ALL` 命令可以将所有的 RMAN 配置重置为默认值。但是，您可以通过运行一个包含 `CONFIGURE...CLEAR` 命令的脚本来轻松模拟此操作：


  ```

  CONFIGURE RETENTION POLICY clear;

  CONFIGURE BACKUP OPTIMIZATION clear;

  CONFIGURE DEFAULT DEVICE TYPE clear;

  CONFIGURE CONTROLFILE AUTOBACKUP clear;

  CONFIGURE CONTROLFILE AUTOBACKUP FORMAT FOR DEVICE TYPE DISK clear;

  CONFIGURE DEVICE TYPE DISK clear;

  CONFIGURE DATAFILE BACKUP COPIES FOR DEVICE TYPE DISK clear;

  CONFIGURE CHANNEL 1 DEVICE TYPE DISK clear;

  CONFIGURE CHANNEL 2 DEVICE TYPE DISK clear;

  CONFIGURE CHANNEL 3 DEVICE TYPE DISK clear;

  CONFIGURE ARCHIVELOG BACKUP COPIES FOR DEVICE TYPE DISK clear;

  CONFIGURE MAXSETSIZE clear;

  CONFIGURE ENCRYPTION FOR DATABASE clear;

  CONFIGURE ENCRYPTION ALGORITHM clear;

  CONFIGURE COMPRESSION ALGORITHM clear;

  CONFIGURE RMAN OUTPUT clear; # 12c

  CONFIGURE ARCHIVELOG DELETION POLICY clear;

  CONFIGURE SNAPSHOT CONTROLFILE NAME clear;

  ```


  根据您已设置的内容（以及您的数据库版本），您可能需要设置额外的配置。


  '
- '# 从决策到行动


  既然您已经很好地理解了在实施 RMAN 之前应该做出哪些类型的决策，那么查看一个实现了其中一些组件的脚本是很有指导意义的。脚本可用于自动化 RMAN 备份。这些
  shell 脚本通过诸如 `cron` 之类的调度工具实现自动化。RMAN 也可以从 Oracle 企业管理器运行。此外，如果有用于将文件复制到磁带或其他调度程序的工具，RMAN
  脚本可以包含在这些作业中；但是，如果 RMAN 脚本没有保留在数据库端，灵活性就会降低。


  本节包含一个典型的用于 RMAN 备份的 shell 脚本。该脚本在输出中带有行号，以便在讨论编写脚本时所做的架构决策时参考。（如果您复制该脚本，请在运行前删除行号。）



  以下是脚本内容。表 17-2 详细列出了本章涵盖的每个 RMAN 架构决策点、它在 shell 脚本中的实现（或未实现）方式，以及在 shell 脚本中对应的行号。该脚本并未涵盖
  RMAN 使用的方方面面。如果您要使用此脚本，请务必根据您自身环境的需求和 RMAN 标准对其进行修改：


  ## 表 17-2 架构决策的实现


  | 决策点 | 脚本中的实现方式 | 脚本中的行号 |

  | :--- | :--- | :--- |

  | 1. 远程或本地运行 RMAN 客户端 | 在数据库服务器上本地运行脚本 | 第 26 行，本地连接（非网络连接） |

  | 2. 指定备份用户 | 使用 `SYS` 用户连接 | 第 27 行，使用斜杠 (`/`) 启动 `rman` 连接 |

  | 3. 使用联机或脱机备份 | 联机备份 | 不适用。假设备份期间数据库处于运行状态 |

  | 4. 设置归档日志目的地和文件格式 | 在数据库参数文件中、脚本外部设置 `LOG_ARCHIVE_DEST_N` 和 `LOG_ARCHIVE_FORMAT`
  初始化参数 | 不适用；在脚本外部设置 |

  | 5. 配置 RMAN 备份位置和文件格式 | 直接在脚本中使用 `CONFIGURE` 命令 | 第 33–37 行 |

  | 6. 设置控制文件的自动备份 | 在脚本中启用 | 第 32 行 |

  | 7. 指定控制文件自动备份的位置 | 存放在与备份相同的目录中 | 第 33 行 |

  | 8. 备份归档日志 | 与其他数据库一起备份；具体使用 `PLUS ARCHIVELOG` 子句 | 第 38 行 |

  | 9. 确定快照控制文件的位置 | 使用默认位置 | 不适用 |

  | 10. 使用恢复目录 | 未使用 | 第 26 行，以 `nocatalog` 方式连接 |

  | 11. 使用介质管理器 | 未使用 | 第 35–37 行，`device type disk` |

  | 12. 设置 `CONTROL_FILE_RECORD_KEEP_TIME` 初始化参数 | 使用默认值 | 不适用 |

  | 13. 配置 RMAN 的备份保留策略 | 配置为冗余度为 1，进行交叉检查，并删除过时的备份和归档日志文件 | 第 34 行，配置；第 30 和 31 行，交叉检查；第
  39 行，使用 RMAN 删除旧文件 |

  | 14. 配置归档日志的删除策略 | 使用与备份相同的保留策略 | 不适用 |

  | 15. 设置并行度 | 设置并行度为 2 | 第 35–37 行 |

  | 16. 使用备份集或映像副本 | 使用备份集 | 第 38 行 |

  | 17. 使用增量备份 | 增量级别 0，等同于完全备份 | 第 38 行 |

  | 18. 使用增量更新的备份 | 未使用 | 不适用 |

  | 19. 使用块更改跟踪 | 未使用 | 不适用 |

  | 20. 配置二进制压缩 | 使用基本压缩 | 第 38 行 |

  | 21. 配置加密 | 未使用 | 不适用 |

  | 22. 配置其他设置 | 未使用 | 不适用 |

  | 23. 配置信息输出 | 已设置 | 第 15、28 和 29 行 |


  ```bash

  1 #!/bin/bash

  2 HOLDSID=${1}  # SID 名称

  3 PRG=`basename $0`

  4 USAGE="用法: ${PRG}  "

  5 if [ -z "${HOLDSID}" ]; then

  6    echo "${USAGE}"

  7    exit 1

  8 fi

  9 #----------------------------------------------

  10 # 源环境变量（关于 oraset 的详细信息请参见第 2 章）

  11 . /etc/oraset $HOLDSID

  12 BOX=`uname -a | awk ''{print$2}''`

  13 MAILX=''/bin/mailx''

  14 MAIL_LIST=''dkuhn@gmail.com''

  15 export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''

  16 date

  17 #----------------------------------------------

  18 LOCKFILE=/tmp/$PRG.lock

  19 if [ -f $LOCKFILE ]; then

  20   echo "锁文件已存在，退出..."

  21   exit 1

  22 else

  23   echo "请勿删除，$LOCKFILE" > $LOCKFILE

  24 fi

  25 #----------------------------------------------

  26 rman nocatalog <<EOF

  27 connect target /

  28 set echo on;

  29 show all;

  30 crosscheck backup;

  31 crosscheck copy;

  32 configure controlfile autobackup on;

  33 configure controlfile autobackup format for device type disk to

  ''/u01/O18C/rman/o18c_ctl_%F.bk'';

  34 configure retention policy to redundancy 1;

  35 configure           device type disk parallelism 2;

  36 configure channel 1 device type disk format ''/u01/O18C/rman/o18c_%U.bk'';

  37 configure channel 2 device type disk format ''/u02/O18C/rman/o18c_%U.bk'';

  38 backup as compressed backupset incremental level=0 database plus archivelog;

  39 delete noprompt obsolete;

  40 EOF

  41 #----------------------------------------------

  42 if [ $? -ne 0 ]; then

  43   echo "RMAN 出现问题..."

  44   echo "请检查 RMAN 备份" | $MAILX -s "RMAN 问题: $ORACLE_SID 于 $BOX" $MAIL_LIST

  45 else

  46   echo "RMAN 运行正常..."

  47 fi

  48 #----------------------------------------------

  49 if [ -f $LOCKFILE ]; then

  50   rm $LOCKFILE

  51 fi

  52 #----------------------------------------------

  53 date

  54 exit 0

  ```




  关于此脚本，有几个方面需要进一步讨论。


  ## 设置操作系统变量


  第 11 行通过运行名为`oraset`的脚本来设置所需的 OS 变量（有关运行`oraset`和获取操作系统变量的详细信息，请参见第 2 章）。许多 DBA
  选择将 OS 变量（如`ORACLE_HOME`和`ORACLE_SID`）硬编码到脚本中。但是，您应该避免硬编码变量，而应使用脚本来获取所需的变量。运行脚本要灵活得多，尤其是在一台服务器上安装了多个不同版本
  Oracle 的数据库时。


  ## 设置 `NLS_DATE_FORMAT`


  第 15 行设置了 `NLS_DATE_FORMAT` OS 变量。这在调试和诊断问题时特别有用。默认情况下，RMAN 只显示日期部分。仅知道命令运行的日期通常不足以确定命令实际执行的时间点。至少，您需要看到小时和分钟（连同日期）。


  ## 使用锁文件


  第 18 至 24 行检查锁文件是否存在。如果脚本已经在运行，您不希望再次执行它。脚本会检查锁文件，如果存在，则脚本退出。备份完成后，锁文件会被删除（第 49
  至 51 行）。


  ## 配置 RMAN 以进行调试


  第 28 行将 `ECHO` 参数设置为 `on`。这指示 RMAN 在运行命令前在输出中显示该命令。这对于调试问题可能非常宝贵。第 29 行显示所有可配置变量。这对于故障排除也很有用，因为您可以在执行任何命令之前查看
  RMAN 变量被设置为什么值。


  ## `CONFIGURE` 命令的作用


  第 32 至 37 行使用了 `CONFIGURE` 命令。这些命令在每次脚本执行时都会运行。为什么要这样做？`CONFIGURE` 命令只需要运行一次，它就会存储在控制文件中——您不必再次运行它，对吧？没错。然而，我曾偶尔因此吃亏：当一个有不良习惯的
  DBA 为数据库配置了某个设置却没有告诉任何人，而我直到尝试进行另一次备份时才发现这个错误配置。我强烈倾向于将 `CONFIGURE` 命令放在脚本中，这样无论其他
  DBA 在脚本之外做了什么，行为都能保持一致。脚本中的 `CONFIGURE` 设置也充当了一种文档形式：我可以轻松查看脚本并确定设置是如何配置的。


  ## 运行 `CROSSCHECK` 命令


  第 30 和 31 行运行了 `CROSSCHECK` 命令。为什么要这样做？有时，文件会丢失，或者某个“不走寻常路”的 DBA 可能通过 RMAN 之外的操作系统命令从磁盘上删除了归档日志文件。当
  RMAN 运行时，如果它找不到它认为应该存在的文件，就会抛出错误并停止备份。我更倾向于运行 `CROSSCHECK` 命令，让 RMAN 调和它认为应该在磁盘上的文件与实际在磁盘上的文件。这能保持
  RMAN 顺畅运行。


  ## 删除过时的备份


  您在第 39 行运行 `DELETE NOPROMPT OBSOLETE`。这将删除所有被 RMAN 根据保留策略标记为 `OBSOLETE` 的备份文件和归档日志文件。这使得
  RMAN 可以管理哪些文件应该保留在磁盘上。我倾向于在备份完成后运行 `DELETE` 命令（而不是在备份之前运行）。保留策略定义为 1，因此如果您在备份后运行
  `DELETE`，RMAN 会在磁盘上保留一份备份副本。如果您在备份前运行 `DELETE`，RMAN 会在磁盘上保留一份备份副本。备份运行后，磁盘上会有两份备份副本，而我的服务器上没有足够空间存放。


  ## 使用 `cron` 进行调度


  您可以从 Linux/Unix 的调度工具 `cron` 执行此 shell 脚本，如下所示：


  ```

  0 16 * * * $HOME/bin/rmanback.bsh INVPRD >$HOME/bin/log/INVPRDRMAN.log 2>&1

  ```


  该脚本在数据库服务器上每天 16:00（24 小时制）运行。会创建一个日志文件 (`INVPRDRMAN.log`) 来捕获与 RMAN 作业相关的所有输出和错误。有关通过
  `cron` 自动化作业的详细信息，请参见第 21 章。


  再次说明，本节中的脚本是基础版；您无疑会希望根据您的需求对其进行增强和修改。此脚本为您提供了一个起点，包含了具体的 RMAN 建议及其实现方法。


  ## 小结


  RMAN 不仅是 Oracle 数据库的备份工具，还是恢复管理器。如果您仍在使用较旧的、用户管理的备份技术，那么我强烈建议您切换到 RMAN。RMAN 包含一组强大的功能，是其他任何可用的备份工具都无法比拟的。RMAN
  易于使用和配置。在实施一个坚如磐石的恢复和备份策略时，它将为您节省时间和精力，并让您高枕无忧。


  如果您是 RMAN 的新手，可能并不清楚哪些功能应该始终启用和实施，同样，哪些方面您很少需要。本章包含一个清单，引导您完成每个架构决策点。许多策略需要进行讨论，以确保满足业务需求。关键在于，您应该仔细考虑每个组件以及如何实现有意义的各项功能。


  本章最后给出了一个在生产环境中实施 RMAN 脚本的真实世界示例。既然您已经对 RMAN 的功能及其使用方法有了很好的了解，就可以开始进行备份了。下一章将介绍
  RMAN 备份场景。


  '
- '# 18. RMAN 备份与报告


  第 17 章详细介绍了如何配置 RMAN 以及使用专门的功能来控制 RMAN 的行为。在考虑了您需要的功能之后，就可以创建备份了。RMAN 可以备份以下类型的文件：


  *   数据文件

  *   控制文件

  *   已归档的重做日志文件

  *   `spfile`（服务器参数文件）

  *   备份片


  在大多数情况下，您将使用 RMAN 备份数据文件、控制文件和归档日志文件。如果您启用了控制文件的自动备份功能，那么当发出 `BACKUP` 或 `COPY` 命令时，RMAN
  会自动备份控制文件和 `spfile`。您也可以备份 RMAN 创建的备份片文件。


  RMAN 不备份 Oracle Net 文件、密码文件、块更改跟踪文件、闪回日志或 Oracle 二进制文件（安装 Oracle 时创建的文件）。如果需要，您应制定包含这些文件的操作系统备份。


  另请注意，RMAN 不备份在线重做日志文件。如果您备份了在线重做日志文件，恢复它们也是没有意义的。在线重做日志文件包含数据库生成的最新重做信息。您不会希望从备份中用旧的重做信息覆盖它们。当您的数据库处于归档日志模式时，在线重做日志文件包含执行完全恢复所需的最新生成的事务。


  本章详细介绍了与运行 RMAN `BACKUP` 命令相关的许多功能。同时还涵盖了创建恢复目录、记录输出和对 RMAN 备份操作进行报告的技术。本章首先讨论一些用于增强运行命令时
  RMAN 输出的常见做法。


  ## 准备运行 RMAN 备份命令


  在运行 RMAN 备份之前，通常需要设置一些东西以增强输出内容。您不需要每次登录并运行 RMAN 命令时都设置这些变量。然而，在进行故障排除或调试问题时，执行以下任务几乎总是一个好主意：


  *   设置 `NLS_DATE_FORMAT` OS 变量

  *   设置 `ECHO`

  *   显示 RMAN 变量


  以下各节将讨论这些要点。




  '
- '# 设置 NLS_DATE_FORMAT


  在运行任何 RMAN 作业之前，请设置操作系统变量 `NLS_DATE_FORMAT` 以包含时间（时、分、秒）组成部分；例如，


  ```bash

  $ export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''

  ```


  此外，如果一个 Shell 脚本调用了 RMAN，请将上述行直接放入 Shell 脚本中（示例请参见第 17 章末尾的 shell 脚本）：


  ```bash

  NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:ss''

  ```


  这确保了当 RMAN 显示日期时，其输出始终包含小时、分钟和秒钟。默认情况下，RMAN 的输出中只包含日期部分（`DD-MON-YY`）。例如，未设置 `NLS_DATE_FORMAT`
  时，开始备份时 RMAN 显示如下：


  ```

  Starting backup at 11-JAN-13

  ```


  当你将操作系统变量 `NLS_DATE_FORMAT` 设置为包含时间部分后，输出将变为：


  ```

  Starting backup at 11-jan-2013 16:43:04

  ```


  在故障排除时，拥有时间部分至关重要，因为这样你可以确定一个命令运行了多久，或者一个命令在失败前运行了多长时间。Oracle 技术支持几乎总是要求你在捕获输出并发送给他们之前，将此变量设置为包含时间部分。


  设置 `NLS_DATE_FORMAT` 的唯一缺点是，如果将其设置为 RMAN 无法识别的值，可能会导致连接问题。例如，这里 `NLS_DATE_FORMAT`
  被设置为一个无效值：


  ```bash

  $ export NLS_DATE_FORMAT=''dd-mon-yyyy hh24:mi:sd''

  $ rman target /

  ```


  当设置为无效值时，登录 RMAN 会遇到此错误：


  ```

  RMAN-03999: Oracle error occurred while converting a date: ORA-01821:

  ```


  要取消设置 `NLS_DATE_FORMAT` 变量，请将其设置为空值，如下所示：


  ```bash

  $ export NLS_DATE_FORMAT="

  ```


  '
- '# 设置 ECHO


  另一个应在 RMAN 脚本中设置的值是 `ECHO` 命令，如下所示：


  ```

  RMAN> set echo on;

  ```


  这指示 RMAN 在其输出中显示正在运行的命令，因此你可以看到正在运行的 RMAN 命令，以及与该命令相关的任何错误或输出消息。当你在脚本中运行 RMAN 命令时，这一点尤其重要，因为你不是直接输入命令（并且可能不知道在
  shell 脚本中发出了什么命令）。例如，未使用 `SET ECHO ON` 时，命令的输出显示如下：


  ```

  Starting backup at...

  ```


  使用 `SET ECHO ON` 后，此输出会显示实际运行的命令：


  ```

  backup datafile 4;

  Starting backup at...

  ```


  从之前的输出中，你可以看到正在运行哪个命令、它何时开始等等。


  '
- '# 显示变量


  另一个良好实践是在任何脚本中运行 `SHOW ALL` 命令，如下所示：


  ```

  RMAN> show all;

  ```


  这会显示所有 RMAN 可配置的变量。在故障排除时，你可能不知道其他 DBA 配置了什么。这让你能一览 RMAN 会话执行时这些设置的快照。


  '
- '# 运行备份


  在运行 RMAN 备份之前，请务必阅读第 17 章，了解如何为生产环境配置 RMAN 设置。对于生产数据库，应从 Oracle Cloud Control 或类似于第
  17 章末尾所示的 shell 脚本来运行 RMAN。在 shell 脚本中，为特定数据库配置 RMAN 的每个使用方面是很有用的。如果你使用其默认设置开箱即用地运行
  RMAN，你将能够备份你的数据库。然而，对于大多数生产数据库应用来说，这些设置是不够的。


  ## 备份整个数据库


  如果你不确定 RMAN 会将数据库文件备份到哪里，你需要阅读第 17 章，因为它描述了如何配置 RMAN 以在你选择的位置创建备份文件。要配置 RMAN 写入磁盘上的特定位置（请注意，`CONFIGURE`
  命令必须在运行 `BACKUP` 命令之前执行）：


  ```

  RMAN> configure channel 1 device type disk format ''/u01/O18C/rman/rman1_%U.bk'';

  ```


  配置好备份位置后，使用类似于下面显示的命令来备份整个数据库：


  ```

  RMAN> backup incremental level=0 database plus archivelog;

  ```


  此命令确保 RMAN 将备份数据库中的所有数据文件、备份前生成的所有可用归档日志，以及备份期间生成的所有归档日志。此命令还确保你拥有恢复和修复数据库所需的所有数据文件和归档日志。


  如果你启用了控制文件的自动备份功能，请接着运行此命令：


  ```

  RMAN> configure controlfile autobackup on;

  ```


  RMAN 作为备份一部分执行的最后一项任务是生成一个包含控制文件备份的备份集。此控制文件将包含有关已发生的备份以及备份期间生成的任何归档日志的所有信息。


  **提示**

  始终启用控制文件的自动备份功能。


  RMAN 的 `BACKUP` 命令有许多细微差别。对于生产数据库，通常建议使用 `BACKUP INCREMENTAL LEVEL=0 DATABASE PLUS
  ARCHIVELOG` 命令备份数据库。这通常是足够的。然而，你会遇到许多情况，需要运行使用特定 RMAN 功能的备份，或者你可能需要排查一个要求你了解调用 RMAN
  备份的其他方法的问题。这些方面将在接下来的几个部分中讨论。


  ## 完整备份 vs. 增量级别=0


  术语 *RMAN full backup*（RMAN 完整备份）有时会引起混淆。更贴切地描述这个任务的方式是 *RMAN 备份一个或多个数据文件中所有已修改的块*。术语
  *full*（完整）并不意味着所有块都被备份或所有数据文件都被备份。它仅仅意味着备份了重建数据文件（在发生故障时）所需的所有块。你可以对单个数据文件进行完整备份，而该备份片的内容可能比数据文件本身小得多。


  ## 备份集 vs. 镜像副本


  RMAN 的默认备份模式指示其仅备份数据文件中已使用的块；这些被称为备份集。RMAN 还可以对数据文件进行字节对字节的复制；这些被称为镜像副本。创建备份集是 RMAN
  创建的默认备份类型。下一个命令创建数据库的备份集备份：


  ```

  RMAN> backup database;

  ```


  如果你愿意，可以在创建备份时显式放置 `AS BACKUPSET` 命令：


  ```

  RMAN> backup as backupset database;

  ```


  你可以通过使用 `AS COPY` 命令指示 RMAN 创建镜像副本。此命令为数据库中的每个数据文件创建镜像副本：


  ```

  RMAN> backup as copy database;

  ```




  由于映像副本是数据文件的完全相同副本，DBA 可以通过操作系统命令直接访问它们。例如，假设发生了介质故障，而你不想使用 `RMAN` 来还原映像副本。你可以使用操作系统命令将数据文件的映像副本复制到数据库可以使用的位置。相反，备份集由二进制文件组成，只有
  `RMAN` 工具能够写入或读取这些文件。


  使用 `RMAN` 时，更推荐使用备份集。备份集往往比数据文件更小，并且可以应用真正的二进制压缩。此外，使用 `RMAN` 作为创建只有 `RMAN` 才能还原的备份文件的机制，并非不便。将
  `RMAN` 与备份集结合使用，高效、非常可靠，并且在恢复时极其有用。


  ## 备份表空间


  `RMAN` 能够在数据库级别（如前一节所示）、表空间级别，或者更细粒度地在数据文件级别进行备份。当你备份表空间时，`RMAN` 会备份与你所指定的表空间相关联的任何数据文件。例如，以下命令将备份与
  `SYSTEM` 和 `SYSAUX` 表空间相关联的所有数据文件：


  ```

  RMAN> backup tablespace system, sysaux;

  ```


  使用表空间级别备份的一种场景是，如果最近添加了一个新的表空间，而你只想备份与这个新添加表空间相关联的数据文件。请注意，在处理还原和备份问题时，通常更高效的方法是针对一个表空间，尤其是一个数据块进行操作（因为备份一个表空间通常比备份整个数据库快得多）。


  ## 备份数据文件


  你可能偶尔需要备份单个数据文件。例如，在排查备份问题时，尝试成功备份一个数据文件通常很有帮助。你可以通过文件名或文件号来指定数据文件，如下所示：


  ```

  RMAN> backup datafile ''/u01/dbfile/o18c/system01.dbf'';

  ```


  在这个例子中，指定了文件号：


  ```

  RMAN> backup datafile 1,4;

  ```


  以下是使用各种功能备份数据文件的其他示例：


  ```

  RMAN> backup as copy datafile 4;

  RMAN> backup incremental level 1 datafile 4;

  ```


  提示：使用 `RMAN` 的 `REPORT SCHEMA` 命令来列出表空间、数据文件名和数据文件编号信息。


  ## 备份控制文件


  备份控制文件最可靠的方法是配置自动备份功能：


  ```

  RMAN> configure controlfile autobackup on;

  ```


  此命令确保在发出 `BACKUP` 或 `COPY` 命令时自动备份控制文件。启用控制文件的自动备份功能后，你就不必再担心需要显式发出单独的命令来备份控制文件。在此模式下，控制文件总是在数据文件备份片创建完成后，在其自己的备份集和备份片中创建。


  如果你需要手动备份控制文件，可以这样做：


  ```

  RMAN> backup current controlfile;

  ```


  备份的位置可以是默认的操作系统位置、FRA（快速恢复区），或者是手动配置的位置：


  ```

  RMAN> configure controlfile autobackup format for device type disk to ''/u01/O18C/rman/rman_ctl_%F.bk'';

  ```


  ## 备份 spfile


  如果你启用了控制文件的自动备份功能，那么每当发出 `BACKUP` 或 `COPY` 命令时，`spfile` 也会（随控制文件一起）被自动备份。如果你需要手动备份
  `spfile`，请使用以下命令：


  ```

  RMAN> backup spfile;

  ```


  包含 `spfile` 备份的文件位置取决于你为控制文件自动备份所配置的设置（请参阅上一节中的示例）。默认情况下，如果你没有使用 FRA，并且也没有通过通道显式配置位置，那么对于
  Linux/Unix 服务器，备份将写入 `ORACLE_HOME/dbs` 目录。




  ## 注意


  RMAN 只有在实例使用 `spfile` 启动的情况下，才能备份该 `spfile`。


  ## 备份归档日志


  归档日志可以单独于数据库备份运行，也可以与备份一起运行。由于快速恢复区的空间以及生成的归档日志数量，归档日志备份可能每天运行多次。即使它是单独运行的，也应该使用以下命令与数据库备份一起运行：


  ```

  RMAN> backup incremental level=0 database plus archivelog;

  ```


  然而，您偶尔会遇到需要进行特殊的、一次性的归档日志备份的情况。您可以使用以下命令来备份归档日志文件：


  ```

  RMAN> backup archivelog all;

  ```


  如果您有一个即将满载的挂载点，并且您确定想要备份归档日志（以便它们存在于备份文件中），但随后又想立即将这些刚备份的文件从磁盘上删除，您可以使用以下语法来备份归档日志，然后让
  RMAN 将它们从存储介质中删除：


  ```

  RMAN> backup archivelog all delete input;

  ```


  接下来列出的是您可以备份归档日志文件的其他一些方法：


  ```

  RMAN> backup archivelog sequence 300;

  RMAN> backup archivelog sequence between 300 and 400 thread 1;

  RMAN> backup archivelog from time "sysdate-7" until time "sysdate-1";

  ```


  如果某个归档日志已通过操作系统删除命令从磁盘上手动移除，那么在尝试备份这个不存在的归档日志文件时，RMAN 将抛出以下错误：


  ```

  RMAN-06059: expected archived log not found, loss of archived log compromises recoverability

  ```


  在这种情况下，首先运行 `CROSSCHECK` 命令，让 RMAN 知道哪些文件在磁盘上是物理可用的：


  ```

  RMAN> crosscheck archivelog all;

  ```


  ## 备份快速恢复区


  如果您使用了快速恢复区，RMAN 的一个便利功能是您可以通过一条命令备份该位置的所有文件。如果您使用了介质管理器并启用了磁带备份通道，您可以将快速恢复区中的所有内容备份到磁带，如下所示：


  ```

  RMAN> backup device type sbt_tape recovery area;

  ```


  您也可以将快速恢复区备份到磁盘上的某个位置。使用 `TO DESTINATION` 命令来实现这一点：


  ```

  RMAN> backup recovery area to destination ''/u01/O18C/fra_back'';

  ```


  RMAN 会在 `TO DESTINATION` 命令指定的目录下，根据需要自动创建目录。


  **注意**

  `TO_DESTINATION>` 目录下的子目录格式为 `db_uniuqe_name/backupset/YYYY_MM_DD`。


  RMAN 将备份完全备份、增量备份、控制文件自动备份以及归档日志文件。请记住，闪回日志、在线重做日志文件和当前控制文件不会被备份。


  ## 从备份中排除表空间


  假设您有一个包含非关键数据的表空间，并且您永远不想备份它。可以配置 RMAN 从备份中排除此类表空间。要确定 RMAN 当前是否被配置为排除任何表空间，请运行此命令：


  ```

  RMAN> show exclude;

  RMAN configuration parameters for database with db_unique_name O18C are:

  RMAN configuration has no stored or default parameters

  ```


  使用 `EXCLUDE` 命令指示 RMAN 哪些表空间不需备份：


  ```

  RMAN> configure exclude for tablespace users;

  ```


  现在，对于任何数据库级别的备份，RMAN 都将排除与 `USERS` 表空间关联的数据文件。您可以使用以下命令指示 RMAN 备份所有数据文件以及任何被排除的表空间：


  ```

  RMAN> backup database noexclude;

  ```


  您可以通过以下命令清除排除设置：


  ```

  RMAN> configure exclude for tablespace users clear;

  ```


  ## 备份尚未备份的数据文件


  假设您刚刚向数据库添加了几个数据文件，并且希望确保有它们的备份。您可以发出以下命令来指示 Oracle 备份尚未备份的数据文件：


  ```

  RMAN> backup database not backed up;

  ```


  您还可以为这些尚未备份的文件指定一个时间范围。假设您发现备份在过去几天没有运行，而您想备份在过去 24 小时内未备份的所有内容。以下命令将备份在过去一天内未备份的所有数据文件：


  ```

  RMAN> backup database not backed up since time=''sysdate-1'';

  ```


  如果由于任何原因（数据中心断电、备份期间备份目录变满，等等）导致您的备份中止，前面的命令也很有用。在您解决了导致备份作业失败的问题后，可以发出前一个命令，RMAN
  将仅备份在指定时间段内未备份的数据文件。


  ## 跳过只读表空间


  由于只读表空间中的数据不会更改，您可能只想备份只读表空间一次，然后在后续备份中跳过它们。使用 `SKIP READONLY` 命令来实现这一点：


  ```

  RMAN> backup database skip readonly;

  ```


  请记住，当您跳过只读表空间时，您将需要保留一个包含这些表空间的可用备份。只要您只发出 RMAN 命令 `DELETE OBSOLETE`，包含只读表空间的 RMAN
  备份集就会被保留而不会被删除，即使该备份集也包含其他可读写表空间。


  ## 跳过离线或不可访问的文件


  假设您有一个数据文件丢失或损坏，并且您没有它的备份，因此无法还原和恢复它。在这种情况下，您无法启动数据库：


  ```

  SQL> startup;

  ORA-01157: cannot identify/lock data file 6 - see DBWR trace file

  ORA-01110: data file 6: ''/u01/dbfile/o18c/reg_data01.dbf''

  ```


  在这种场景下，您必须将该数据文件脱机才能启动数据库：


  ```

  SQL> alter database datafile ''/u01/dbfile/o18c/reg_data01.dbf'' offline for drop;

  ```


  现在，您可以打开数据库了：


  ```

  SQL> alter database open;

  ```


  假设您随后尝试运行 RMAN 备份：


  ```

  RMAN> backup database;

  ```


  当 RMAN 遇到一个无法备份的数据文件时，会抛出以下错误：


  ```

  RMAN-03002: failure of backup command at ...

  RMAN-06056: could not access datafile 6

  ```


  在这种情况下，您必须指示 RMAN 从备份中排除该离线数据文件。`SKIP OFFLINE` 命令指示 RMAN 忽略状态为离线的数据文件：


  ```

  RMAN> backup database skip offline;

  ```


  如果文件已完全丢失，请使用 `SKIP INACCESSIBLE` 指示 RMAN 忽略磁盘上不可用的文件。如果数据文件是使用操作系统命令删除的，可能会发生这种情况。以下是从
  RMAN 备份中排除不可访问数据文件的示例：


  ```

  RMAN> backup database skip inaccessible;

  ```


  您可以通过一条命令跳过只读、离线和不可访问的数据文件：


  ```

  RMAN> backup database skip readonly skip offline skip inaccessible;

  ```


  在处理离线和不可访问的文件时，您应该找出文件离线或不可访问的原因，并尝试解决任何问题。


  ## 并行备份大文件


  通常，RMAN 只会使用一个通道来备份单个数据文件。当您启用并行性时，它允许 RMAN 生成多个进程来备份多个文件。然而，即使启用了并行性，RMAN 也不会使用并行通道同时备份一个数据文件。


  您可以指示 RMAN 使用多个通道并行备份一个数据文件。这称为多段备份。此功能可以加快非常大的数据文件的备份速度。使用 `SECTION SIZE` 参数进行多段备份。以下示例配置两个并行通道来备份一个文件：




  ## 将 RMAN 备份信息添加到存储库


  假设您不得不重新创建了控制文件。重新创建控制文件的过程会清除所有关于 RMAN 备份的信息。然而，您希望让新创建的控制文件能够识别磁盘上已有的 RMAN 备份。在这种情况下，可以使用
  `CATALOG` 命令将 RMAN 元数据填充到控制文件中。例如，如果所有 RMAN 备份文件都保存在 `/u01/O18C/rman` 目录中，您可以使控制文件识别该目录中的这些备份文件，操作如下：


  ```

  RMAN> configure device type disk parallelism 2;

  RMAN> configure channel 1 device type disk format ''/u01/O18C/rman/r1%U.bk'';

  RMAN> configure channel 2 device type disk format ''/u02/O18C/rman/r2%U.bk'';

  RMAN> backup section size 2500M datafile 10;

  ```


  当这段代码运行时，RMAN 将分配两个通道来并行备份指定的数据文件。


  **注意**

  如果您指定的节区大小大于数据文件的大小，RMAN 将不会并行备份该文件。


  ```

  RMAN> catalog start with ''/u01/O18C/rman'';

  ```


  这会指示 RMAN 在指定目录中查找任何备份片、映像副本、控制文件副本和归档日志，如果找到，则使用相应的元数据填充控制文件。对于此示例，在给定目录中找到了两个备份片文件：


  ```

  searching for all files that match the pattern /u01/O18C/rman

  List of Files Unknown to the Database

  =====================================

  File Name: /u01/O18C/rman/r1otlns90o_1_1.bk

  File Name: /u01/O18C/rman/r1xyklnrveg_1_1.bk

  Do you really want to catalog the above files (enter YES or NO)?

  ```


  如果您输入 `YES`，则有关备份文件的元数据将被添加到控制文件中。通过这种方式，`CATALOG` 命令允许您让 RMAN 存储库（控制文件和恢复目录）知晓
  RMAN 可用于备份和恢复操作的文件。


  您还可以指示 RMAN 编目快速恢复区（FRA）中任何控制文件当前未知的文件，如下所示：


  ```

  RMAN> catalog recovery area;

  ```


  此外，您可以编目特定的文件。此示例指示 RMAN 为一个特定的备份片文件添加元数据到控制文件：


  ```

  RMAN> catalog backuppiece ''/u01/O18C/rman/r159nv562v_1_1.bk'';

  ```


  ## 对可插拔数据库进行备份


  从 Oracle Database 12c 开始，您可以在根容器数据库内创建可插拔数据库（更多详情请参见第 22 章）。如果您使用此选项，关于备份有几个需要注意的功能点：


  *   连接到根容器时，您可以备份数据库内的所有数据文件或仅根数据库数据文件；特定的可插拔数据库；或特定的表空间或数据文件，或这些的组合。

  *   连接到可插拔数据库时，您只能备份与该可插拔数据库相关联的数据文件。


  上述要点将在以下两个小节中详细说明。


  ### 连接到根容器时


  假设您以 `SYS` 身份连接到根容器，并希望备份所有数据文件（包括与可插拔数据库关联的任何数据文件）。首先，确认您确实是以 `SYS` 身份连接到根容器：


  ```

  RMAN> SELECT SYS_CONTEXT(''USERENV'', ''CON_ID'')   AS con_id,

  SYS_CONTEXT(''USERENV'', ''CON_NAME'')       AS cur_container,

  SYS_CONTEXT(''USERENV'', ''CURRENT_SCHEMA'') AS cur_user

  FROM DUAL;

  ```


  以下是一些示例输出：


  ```

  CON_ID               CUR_CONTAINER        CUR_USER

  -------------------- -------------------- --------------------

  1                    CDB$ROOT             SYS

  ```


  现在，要备份根容器及任何关联的可插拔数据库中的所有数据文件，请按如下方式操作：


  ```

  RMAN> backup database;

  ```


  如果您只想备份与根容器关联的数据文件，请指定 `ROOT`：


  ```

  RMAN> backup database root;

  ```




  您也可以备份特定的可插拔数据库：


  ```

  RMAN> backup pluggable database salespdb;

  ```


  此外，您可以备份可插拔数据库内的特定表空间：


  ```

  RMAN> backup tablespace SALESPDB:SALES;

  ```


  同时，您可以通过指定文件名来备份根容器或关联可插拔数据库中的任何数据文件：


  ```

  RMAN> backup datafile ''/ora01/app/oracle/oradata/CDB/salespdb/sales01.dbf'';

  ```


  ## 连接到可插拔数据库时


  首先，启动 RMAN，并连接到您要备份的可插拔数据库。您必须以具有 `SYSDBA` 或 `SYSBACKUP` 权限的用户身份连接。此外，必须有一个针对 PDB
  服务的监听器正在运行。此示例连接到 `SALESPDB` 可插拔数据库：


  ```

  $ rman target sys/foo@salespdb

  ```


  一旦连接到可插拔数据库，您只能备份特定于该数据库的数据文件。因此，在此示例中，以下命令仅备份与 `SALESPDB` 可插拔数据库关联的数据文件：


  ```

  RMAN> backup database;

  ```


  此示例备份与可插拔数据库 `SYSTEM` 表空间关联的数据文件：


  ```

  RMAN> backup tablespace system;

  ```


  我需要再次强调，当您直接连接到可插拔数据库时，您只能备份与该数据库关联的数据文件。您无法备份与根容器或容器内任何其他可插拔数据库关联的数据文件。图 18-1 说明了这一概念。作为
  `SYSDBA` 连接到 `SALESPDB` 可插拔数据库只能备份和查看与该数据库相关的数据文件。在数据文件以及数据文件的 RMAN 备份方面，`SYSDBA`
  连接无法“看到”其可插拔框之外的内容。相比之下，连接到根容器的 `SYSDBA` 连接可以备份所有数据文件（根、种子和所有可插拔数据库），并可以访问从可插拔数据库连接发起的
  RMAN 备份。


  ![../images/214899_3_En_18_Chapter/214899_3_En_18_Fig1_HTML.jpg](img/214899_3_En_18_Fig1_HTML.jpg)


  图 18-1 连接到根容器的 `SYSDBA` 连接与连接到可插拔数据库的 `SYSDBA` 连接的权限范围


  ## 创建增量备份


  RMAN 有三个独立且不同的增量备份功能：


  *   增量级别备份

  *   增量更新备份

  *   块变化跟踪


  使用增量级别备份，RMAN 仅备份自上次备份以来已修改的块。增量备份可应用于整个数据库、表空间或数据文件。增量级别备份是 RMAN 中最常用的增量功能。


  增量更新备份是与增量级别备份独立的功能。这些备份首先对数据文件进行映像副本，然后使用增量备份来更新这些映像副本。这为您提供了一种高效的方法来实施和维护映像副本，作为备份策略的一部分。您只需进行一次映像副本备份，然后使用增量备份来使映像副本保持最新事务的状态。


  块变化跟踪是另一个旨在加速增量备份性能的功能。其理念是使用一个操作系统文件来记录自上次备份以来哪些块发生了变化。在执行增量备份时，RMAN 可以使用块变化跟踪文件快速识别需要备份的块。此功能可以显著提升增量备份的性能。


  ### 执行增量级别备份


  RMAN 通过级别来实现增量备份。只有两个有文档记载的增量备份级别：级别 0 和级别 1。在 Oracle 10g 版本之前，提供了五个级别，0 到 4。这些级别（0-4）仍然可用，但未在
  Oracle 文档中指定。您必须首先进行级别 0 增量备份以建立基线，之后才能进行级别 1 增量备份。


  注意

  完全备份备份的块与级别 0 备份相同。但是，您不能将完全备份与增量备份一起使用。此外，您必须从级别 0 备份开始增量备份策略。如果您尝试进行级别 1 备份，但不存在级别
  0 备份，RMAN 将自动进行级别 0 备份。


  以下是一个进行增量级别 0 备份的示例：


  ```

  RMAN> backup incremental level=0 database;

  ```


  假设在接下来的几次备份中，您只想备份自上次增量备份以来发生变化的块。这行代码进行级别 1 备份：


  ```

  RMAN> backup incremental level=1 database;

  ```


  增量备份有两种不同的类型：差异增量备份和累积增量备份。您使用哪种类型取决于您的需求。差异备份（默认）较小，但恢复需要更多时间。累积备份比差异备份大，但需要的恢复时间较少。


  差异增量级别 1 备份指示 RMAN 备份自上次级别 1 或级别 0 备份以来发生变化的块，而累积增量级别 1 备份指示 RMAN 备份自上次级别 0 备份以来发生变化的块。累积增量备份实际上会忽略任何级别
  1 增量备份。


  注意

  RMAN 增量级别 0 备份用于还原数据文件，而 RMAN 增量级别 1 备份用于恢复数据文件。


  使用增量备份时，默认是差异模式。如果您需要累积备份，则必须指定关键字 `CUMULATIVE`。以下是一个进行累积级别 1 备份的示例：


  ```

  RMAN> backup incremental level=1 cumulative database;

  ```


  以下是在比数据库更细粒度的级别上进行增量备份的一些示例：


  ```

  RMAN> backup incremental level=0 tablespace sysaux;

  RMAN> backup incremental level=1 tablespace sysaux plus archivelog;

  RMAN> backup incremental from scn 4343352 datafile 3;

  ```


  ### 进行增量更新备份


  增量更新备份的基本思路是创建数据文件的映像副本，然后使用增量备份来更新这些映像副本。这样，您就能拥有基本保持最新的数据库映像副本。这可以是一种将映像副本备份与增量备份相结合的高效方式。


  要了解这种备份技术的工作原理，您需要检查执行增量更新备份的命令。需要以下 RMAN 代码行来启用此功能：


  ```

  run{recover copy of database with tag ''incupdate'';

  backup incremental level 1 for recover of copy with tag ''incupdate'' database;}

  ```


  在第一行中指定了一个标签（此示例使用 `incupdate`）。您可以使用任何您想要的标签名称；该标签名称让 RMAN 在每次运行命令时关联所使用的备份文件。首次运行脚本时，此代码将按如下方式执行：


  *   `RECOVER COPY` 生成一条消息，称其无需执行任何操作。

  *   如果不存在映像副本，`BACKUP INCREMENTAL` 会创建数据库数据文件的映像副本。


  当 `RECOVER COPY` 和 `BACKUP INCREMENTAL` 命令第一次运行时，您应在输出中看到类似这样的消息：


  ```

  no copy of datafile 1 found to recover

  ...

  no parent backup or copy of datafile 1 found

  ...

  ```


  第二次运行增量更新备份时，它执行以下操作：


  *   `RECOVER COPY` 再次生成一条消息，称其无需执行任何操作。

  *   `BACKUP INCREMENTAL` 进行一次增量级别 1 备份，并分配指定的标签名称；此备份随后将被 `RECOVER COPY` 命令使用。


  第三次运行增量更新备份时，它执行以下操作：


  *   既然已经创建了增量备份，`RECOVER COPY` 会将增量备份应用到映像副本。




