- "# 9. 视图、同义词和序列\n\n本章重点介绍视图、同义词和序列。视图广泛应用于报表应用程序中，也用于向用户展示数据的子集。同义词提供了一种透明的方式，允许用户显示和使用其他用户的对象。序列通常用于生成唯一的整数，以填充主键和外键值。\n\
  \n**注意**\n尽管视图、同义词和序列看起来不如表和索引重要，但事实是，理解它们几乎同样重要。任何具有一定复杂度的应用程序都会涉及本章所讨论的内容。\n\n\
  ## 实现视图\n\n从某种意义上说，你可以将视图视为存储在数据库中的 SQL 语句。从概念上讲，当你从视图中选择时，Oracle 会在数据字典中查找视图定义，执行该视图所基于的查询，并返回结果。\n\
  \n除了从视图中选择数据，在某些场景下，还可以对视图执行 `INSERT`、`UPDATE` 和 `DELETE` 语句，这会导致对基础表数据的修改。因此，在这个意义上，与其简单地将视图描述为存储的\
  \ SQL 语句，不如将其概念化为建立在其他表或视图（或两者兼有）之上的逻辑表，这样更为准确。\n\n话虽如此，以下是视图的常见用途：\n\n*   创建一种高效存储\
  \ SQL 查询以供重用的方法。\n*   在应用程序和物理表之间提供一个接口层。\n*   向应用程序隐藏 SQL 查询的复杂性。\n*   仅向用户报告列或行的子集，或两者兼有。\n\
  \n考虑到这一切，下一步是创建一个视图并观察其一些特性。\n\n### 创建视图\n\n你可以在表、物化视图或其他视图上创建视图。要创建视图，你的用户帐户必须具有\
  \ `CREATE VIEW` 系统权限。如果你想在另一个用户的模式中创建视图，那么你必须具有 `CREATE ANY VIEW` 权限。\n\n作为参考，本节中的视图创建示例依赖于以下基表：\n\
  \n```\nSQL> create table sales(\nsales_id number primary key\n,amnt    number\n\
  ,state   varchar2(2)\n,sales_person_id number);\n```\n\n同时假设表初始插入了以下数据：\n\n```\n\
  SQL> insert into sales values(1, 222, 'CO', 8773);\nSQL> insert into sales values(20,\
  \ 827, 'FL', 9222);\n```\n\n然后，使用 `CREATE VIEW` 语句来创建视图。以下代码创建了一个视图（如果视图已存在则替换它），该视图从\
  \ `SALES` 表中选择列和行的子集：\n\n```\nSQL> create or replace view sales_rockies as\nselect\
  \ sales_id, amnt, state\nfrom sales\nwhere state in ('CO','UT','WY','ID','AZ');\n\
  ```\n\n**注意**\n如果你不想意外替换现有的视图定义，请使用 `CREATE VIEW view`，而不是 `CREATE OR REPLACE VIEW\
  \ view`。如果视图已存在，`CREATE VIEW <view>` 语句将抛出 `ORA-00955` 错误，而 `CREATE OR REPLACE VIEW\
  \ view` 会覆盖现有定义。\n\n现在，当你从 `SALES_ROCKIES` 中选择时，它会执行视图查询并从 `SALES` 表返回相应的数据：\n\n\
  ```\nSQL> select * from sales_rockies;\n```\n\n根据视图查询，直观可见输出仅显示以下列和一行：\n\n```\n\
  SALES_ID       AMNT ST\n---------- ---------- --\n        1        222 CO\n```\n\
  \n不那么明显的是，你还可以对视图发出 `UPDATE`、`INSERT` 和 `DELETE` 语句，这会导致基础表数据的修改。例如，以下针对视图的插入语句会导致在\
  \ `SALES` 表中插入一条记录：\n\n```\nSQL> insert into sales_rockies(\nsales_id, amnt, state)\n\
  values\n(2,100,'CO');\n```\n\n此外，作为表和视图的所有者（或作为 DBA），你可以将 DML 权限授予视图的其他用户。例如，你可以将视图的\
  \ `SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 权限授予另一个用户，这将允许该用户通过视图选择和修改数据。但是，拥有视图上的权限并不会给予用户直接\
  \ SQL 访问底层表的权限。因此，任何被授予视图权限的用户都将能够通过视图操作数据，但不能对视图所基于的对象发出 SQL。\n\n请注意，你可以向视图插入一个值，导致基础表中出现一行该视图无法选择的数据：\n\
  \n\n## SQL 视图操作与限制\n\n### 基本查询与插入\n\n```\nSQL> insert into sales_rockies(\nsales_id,\
  \ amnt, state)\nvalues (3,123,'CA');\nSQL> select * from sales_rockies;\nSALES_ID\
  \       AMNT ST\n---------- ---------- --\n1        222 CO\n2        100 CO\n```\n\
  \n对比之下，对基表的查询显示存在一些视图无法返回的行：\n\n```\nSQL> select * from sales;\nSALES_ID       AMNT\
  \ ST SALES_PERSON_ID\n---------- ---------- -- ---------------\n1        222 CO\
  \            8773\n20        827 FL            9222\n2        100 CO\n3        123\
  \ CA\n```\n\n如果你希望视图只允许那些最终能被该视图查询到的数据修改的插入和更新语句，那么可以使用`WITH CHECK OPTION`（参见下一节“检查更新”）。\n\
  \n### 检查更新\n\n你可以指定，仅当底层表中的数据能被视图查询到时，才允许通过该视图修改这些数据。此行为通过`WITH CHECK OPTION`启用：\n\
  \n```\nSQL> create or replace view sales_rockies as\nselect sales_id, amnt, state\n\
  from sales\nwhere state in ('CO','UT','WY','ID','AZ')\nwith check option;\n```\n\
  \n使用`WITH CHECK OPTION`意味着你只能插入或更新那些能被视图查询返回的行。例如，以下`UPDATE`语句能成功执行，因为它没有以导致该行无法被视图查询返回的方式修改底层数据：\n\
  \n```\nSQL> update sales_rockies set state='ID' where sales_id=1;\n```\n\n然而，下一个更新语句会失败，因为它试图将`STATE`列更新为一个无法被视图查询选中的值：\n\
  \n```\nSQL> update sales_rockies set state='CA' where sales_id=1;\n```\n\n在此例中，会抛出以下错误：\n\
  \n```\nORA-01402: view WITH CHECK OPTION where-clause violation\n```\n\n我很少看到`WITH\
  \ CHECK OPTION`被使用。话虽如此，如果你的业务需求要求可更新视图只能更新能被其查询选中的数据，那么请务必使用此特性。\n\n### 创建只读视图\n\
  \n如果你不希望用户能对视图执行`INSERT`、`UPDATE`或`DELETE`操作，那么不要将该视图的相应对象权限授予该用户。此外，对于任何你不希望底层表被修改的视图，你还应该使用`WITH\
  \ READ ONLY`子句来创建它。默认行为是视图是可更新的（假设对象权限存在）。\n\n此示例创建一个带有`WITH READ ONLY`子句的视图：\n\n\
  ```\nSQL> create or replace view sales_rockies as\nselect sales_id, amnt, state\n\
  from sales\nwhere state in ('CO','UT','WY','ID','AZ')\nwith read only;\n```\n\n\
  即使用户（包括所有者）拥有删除、插入或更新该视图的权限，如果尝试进行此类操作，也会抛出以下错误：\n\n```\nORA-42399: cannot perform\
  \ a DML operation on a read-only view\n```\n\n如果你使用视图进行报表展示，并且从未打算将视图用作修改底层表数据的机制，那么你应该总是使用`WITH\
  \ READ ONLY`子句创建视图。这样做可以防止通过本不打算用于修改数据的视图意外修改底层表。\n\n### 可更新连接视图\n\n如果视图基于的 SQL\
  \ 查询的`FROM`子句中定义了多个表，仍然有可能更新底层的表。这被称为可更新连接视图。\n\n作为参考，以下是本节示例中使用的两个表的`CREATE TABLE`语句：\n\
  \n```\nSQL> create table emp(\nemp_id number primary key\n,emp_name varchar2(15)\n\
  ,dept_id number);\n--\nSQL> create table dept(\ndept_id number primary key\n,dept_name\
  \ varchar2(15),\nconstraint emp_dept_fk\nforeign key(dept_id) references dept(dept_id));\n\
  ```\n\n以下是为这两个表准备的一些种子数据：\n\n```\nSQL> insert into dept values(1,'HR');\nSQL> insert\
  \ into dept values(2,'IT');\nSQL> insert into dept values(3,'SALES');\nSQL> insert\
  \ into emp values(10,'John',2);\nSQL> insert into emp values(20,'Bob',1);\nSQL>\
  \ insert into emp values(30,'Craig',2);\nSQL> insert into emp values(40,'Joe',3);\n\
  SQL> insert into emp values(50,'Jane',1);\nSQL> insert into emp values(60,'Mark',2);\n\
  ```\n\n这是一个基于上述基表的可更新连接视图示例：\n\n```\nSQL> create or replace view emp_dept_v\nas\n\
  select a.emp_id, a.emp_name, b.dept_name, b.dept_id\nfrom emp a, dept b\nwhere a.dept_id\
  \ = b.dept_id;\n```\n\n关于允许执行 DML 操作的列，存在一些限制。例如，仅当满足以下条件时，才能更新底层表中的列：\n\n*   DML\
  \ 语句必须只修改一个底层表。\n*   创建视图时未使用`READ ONLY`子句。\n*   被更新的列属于连接视图中的键保留表（一个连接视图中只有一个键保留表）。\n\
  \n如果表的主键也可用于唯一标识视图返回的行，则视图中的该底层表是键保留的。数据示例将有助于说明底层表是否是键保留的。在此场景中，`EMP`表的主键是`EMP_ID`列；`DEPT`表的主键是`DEPT_ID`列。以下是查询本节前面列出的视图所返回的一些示例数据：\n\
  \n```\nEMP_ID EMP_NAME        DEPT_NAME          DEPT_ID\n---------- ---------------\
  \ --------------- ----------\n10 John            IT                       2\n20\
  \ Bob             HR                       1\n30 Craig           IT            \
  \           2\n40 Joe             SALES                    3\n50 Jane          \
  \  HR                       1\n60 Mark            IT                       2\n```\n\
  \n从视图的输出可以看出，`EMP_ID`列始终是唯一的。因此，`EMP`表是键保留的（并且其列可以被更新）。相比之下，视图的输出显示`DEPT_ID`列可能不唯一。因此，`DEPT`表不是键保留的（并且其列不能被更新）。\n\
  \n当你更新视图时，任何导致映射到底层`EMP`表的列的修改都应被允许，因为`EMP`表在此视图中是键保留的。例如，此`UPDATE`语句会成功：\n\n```\n\
  SQL> update emp_dept_v set emp_name = 'Jon' where emp_name = 'John';\n```\n\n但是，导致更新`DEPT`表列的语句则不被允许。下一条语句尝试更新视图中映射到`DEPT`表的一列：\n\
  \n```\nSQL> update emp_dept_v set dept_name = 'HR West' where dept_name = 'HR';\n\
  ```\n\n以下是抛出的错误信息：\n\n```\nORA-01779: cannot modify a column which maps to a non\
  \ key-preserved table\n```\n\n总结一下，一个可更新连接视图可以从多个表中选择数据，但连接视图中只有一个表是键保留的。查询中表的主键和外键关系决定了哪个表是键保留的。\n\
  \n\n\n## 创建 INSTEAD OF 触发器\n对于非只读的视图，当你对视图发出 DML 语句时，Oracle 会尝试修改该视图所基于的表中的数据。也可以指示\
  \ Oracle 忽略 DML 语句，转而执行一个 PL/SQL 代码块。此功能被称为 `INSTEAD OF` 触发器。它允许你以常规连接视图无法实现的方式修改底层基础表。\n\
  \n我并不是 `INSTEAD OF` 触发器的忠实拥护者。在我看来，如果你正在考虑使用它们，你应该重新思考一下如何发出 DML 语句来修改基础表。也许你应该允许应用程序直接对基础表执行\
  \ `INSERT`、`UPDATE` 和 `DELETE` 语句，而不是试图在视图上构建 PL/SQL `INSTEAD OF` 触发器。\n\n请思考一下你将如何维护和排查\
  \ `INSTEAD OF` 触发器引发的问题。下一位数据库管理员弄清楚基础表是如何被修改的，是否会很困难？下一位数据库管理员或开发人员修改 `INSTEAD\
  \ OF` 触发器是否容易？当 `INSTEAD OF` 触发器抛出错误时，能否明显看出是哪段代码抛出的错误以及如何解决该问题？\n\n话虽如此，如果你确定需要在视图上使用\
  \ `INSTEAD OF` 触发器，请使用 `INSTEAD OF` 子句来创建它，并将所需的 PL/SQL 嵌入其中。此示例在 `EMP_DEPT_V` 视图上创建了一个\
  \ `INSTEAD OF` 触发器：\n\n```sql\nSQL> create or replace trigger emp_dept_v_updt\n\
  instead of update on emp_dept_v\nfor each row\nbegin\nupdate emp set emp_name=UPPER(:new.emp_name)\n\
  where emp_id=:old.emp_id;\nend;\n/\n```\n\n现在，当对 `EMP_DEPT_V` 执行更新时，DML 语句不会被执行，Oracle\
  \ 会拦截该语句并运行 `INSTEAD OF` PL/SQL 代码；例如，\n\n```sql\nSQL> update emp_dept_v set emp_name='Jonathan'\
  \ where emp_id = 10;\n1 row updated.\n```\n\n然后，你可以通过查询数据来验证触发器是否正确地更新了表：\n\n```sql\n\
  SQL> select * from emp_dept_v;\nEMP_ID EMP_NAME        DEPT_NAME          DEPT_ID\n\
  ---------- --------------- --------------- ----------\n10 JONATHAN        IT   \
  \                    2\n20 Bob             HR                       1\n30 Craig\
  \           IT                       2\n40 Joe             SALES               \
  \     3\n50 Jane            HR                       1\n60 Mark            IT  \
  \                     2\n```\n\n这段代码是一个简单的例子，但它说明了你可以让 PL/SQL 代码代替在视图上运行的 DML 来执行。再次强调，使用\
  \ `INSTEAD OF` 触发器时要谨慎；务必确保你有信心能够高效地诊断和解决可能出现的任何相关问题。\n\n## 实现不可见列\n从 Oracle Database\
  \ 12c 开始，你可以创建或修改表或视图中的列为不可见列（有关向表添加不可见列的详细信息，请参见第 7 章）。不可见列的一个优点是确保向表或视图添加列不会破坏任何现有的应用程序代码。如果应用程序代码没有显式访问不可见列，那么对于应用程序来说，就好像该列不存在一样。\n\
  \n一个小例子将展示不可见列的用处。假设你有一个表已创建并填充了一些数据，如下所示：\n\n```sql\nSQL> create table sales(\n\
  sales_id number primary key\n,amnt    number\n,state   varchar2(2)\n,sales_person_id\
  \ number);\n--\nSQL> insert into sales values(1, 222, 'CO', 8773);\nSQL> insert\
  \ into sales values(20, 827, 'FL', 9222);\n```\n\n此外，你还有一个基于前面表的视图，创建方式如下：\n\n```sql\n\
  SQL> create or replace view sales_co as\nselect sales_id, amnt, state\nfrom sales\
  \ where state = 'CO';\n```\n\n为此示例的目的，假设你还有一个这样的报表表：\n\n```sql\nSQL> create table\
  \ rep_co(\nsales_id number\n,amnt    number\n,state   varchar2(2));\n```\n\n并且，它使用\
  \ `SELECT *` 通过这个插入语句进行填充：\n\n```sql\nSQL> insert into rep_co select * from sales_co;\n\
  ```\n\n一段时间后，视图中添加了一个新列：\n\n```sql\nSQL> create or replace view sales_co as\nselect\
  \ sales_id, amnt, state, sales_person_id\nfrom sales where state = 'CO';\n```\n\n\
  现在，考虑一下插入到 `REP_CO` 中的语句会发生什么。因为它使用了 `SELECT *`，所以会中断，因为 `REP_CO` 表中没有添加相应的列：\n\n\
  ```sql\nSQL> insert into rep_co select * from sales_co;\nORA-00913: too many values\n\
  ```\n\n之前的插入语句不再能够填充 `REP_CO` 表，因为该语句没有考虑到已添加到视图中的额外列。\n\n现在，考虑相同的场景，但使用不可见列将列添加到\
  \ `SALES_CO` 视图中：\n\n```sql\nSQL> create or replace view sales_co\n(sales_id, amnt,\
  \ state, sales_person_id invisible)\nas\nselect\nsales_id, amnt, state, sales_person_id\n\
  from sales\nwhere state = 'CO';\n```\n\n当视图列被定义为不可见时，这意味着在描述视图或在 `SELECT *` 的输出中不会显示该列。这确保了基于\
  \ `SELECT *` 的插入语句将继续有效。\n\n有人可以成功地辩称，你永远不应该创建基于 `SELECT *` 的插入语句，因此你永远不会遇到此问题。或者，有人可能会争辩说，此示例中的\
  \ `REP_CO` 表也应该添加一个列以避免此问题。然而，在处理第三方应用程序时，你通常无法控制编写不佳的代码。在这种情况下，你可以向视图添加不可见列，而不必担心破坏任何现有代码。\n\
  \n话虽如此，不可见列并非完全不可见。如果你知道不可见列的名称，你可以直接从中选择；例如，\n\n```sql\nSQL> select sales_id, amnt,\
  \ state, sales_person_id from sales_co;\n```\n\n从这个意义上说，不可见列只是对编写不佳的应用程序代码或不知道该列存在的用户不可见。\n\
  \n## 修改视图定义\n如果你需要修改视图所基于的 SQL 查询，那么可以删除并重新创建视图，或者使用 `CREATE OR REPLACE` 语法，如前面的示例所示。例如，假设你向\
  \ `SALES` 表添加了一个 `REGION` 列：\n\n```sql\nSQL> alter table sales add (region varchar2(30));\n\
  ```\n\n现在，要将 `REGION` 列添加到 `SALES_ROCKIES` 视图中，请运行以下命令来替换现有的视图定义：\n\n```sql\nSQL>\
  \ create or replace view sales_rockies as\nselect sales_id, amnt, state, region\n\
  from sales\nwhere state in ('CO','UT','WY','ID','AZ')\nwith read only;\n```\n\n\
  使用 `CREATE OR REPLACE` 方法的优势在于，你不必为先前已授予权限的用户重新建立对视图的访问权限。`CREATE OR REPLACE` 的替代方法是删除并使用新定义重新创建视图。如果你删除并重新创建视图，则必须向先前被授予对该已删除并重新创建的对象访问权限的任何用户或角色重新授予权限。因此，在更改视图结构时，我几乎从不使用删除并重新创建的方法。\n\
  \n如果你从表中删除一个列，并且有一个相应的视图引用了被删除的列，会发生什么？例如，\n\n```sql\nSQL> alter table sales drop\
  \ (region);\n```\n\n如果你尝试从视图中选择数据，将会收到 `ORA-04063` 错误。在修改基础表时，你可以通过编译视图来检查视图是否受到表更改的影响；例如，\n\
  \n```sql\nSQL> alter view sales_rockies compile;\nWarning: View altered with compilation\
  \ errors.\n```\n\n通过这种方式，你可以主动确定表更改是否影响依赖的视图。在这种情况下，你应该重新创建不包含被删除表列的视图。\n\n\n\n\
  ## 显示用于创建视图的 SQL\n\n有时，在排查视图返回信息的问题时，你需要查看视图所基于的 SQL 查询。视图定义存储在 `DBA/USER/ALL_VIEWS`\
  \ 视图的 `TEXT` 列中。请注意，`DBA/USER/ALL_VIEWS` 视图的 `TEXT` 列是 `LONG` 数据类型，默认情况下，SQL*Plus\
  \ 只显示此类型的 80 个字符。你可以按如下方式将其设置得更长：\n\n```\nSQL> set long 5000\n```\n\n现在，使用以下脚本显示特定用户视图的关联文本：\n\
  \n```\nSQL> select view_name, text\nfrom dba_views\nwhere owner = upper('&owner')\n\
  and view_name like upper('&view_name');\n```\n\n你也可以查询 `ALL_VIEWS` 来获取你有权访问的任何视图的文本：\n\
  \n```\nSQL> select text\nfrom all_views\nwhere owner='MV_MAINT'\nand view_name='SALES_ROCKIES';\n\
  ```\n\n如果你想显示当前模式中存在的视图文本，请使用 `USER_VIEWS`：\n\n```\nSQL> select text\nfrom user_views\n\
  where view_name=upper('&view_name');\n```\n\n注意\n`DBA/ALL/USER_VIEWS` 的 `TEXT` 列不会隐藏被定义为不可见列的相关信息。\n\
  \n你也可以使用 `DBMS_METADATA` 包的 `GET_DDL` 函数来显示视图的代码。从 `GET_DDL` 返回的数据类型是 `CLOB`；因此，如果你从\
  \ SQL*Plus 运行它，请确保先将 `LONG` 变量设置为足够大的尺寸以显示所有文本。例如，以下是将 `LONG` 设置为 5,000 个字符的方法：\n\
  \n```\nSQL> set long 5000\n```\n\n现在，你可以通过使用 `SELECT` 语句调用 `DBMS_METADATA.GET_DDL`\
  \ 来显示视图定义，如下所示：\n\n```\nSQL> select dbms_metadata.get_ddl('VIEW','SALES_ROCKIES')\
  \ from dual;\n```\n\n如果你想显示当前连接用户所有视图的 DDL，请运行此 SQL：\n\n```\nSQL> select dbms_metadata.get_ddl('VIEW',\
  \ view_name) from user_views;\n```\n\n## 重命名视图\n\n重命名视图有几个充分的理由。你可能希望更改名称以使其更好地符合某个标准，或者你可能希望在删除视图前对其重命名，以便更好地确定它是否正在被使用。使用\
  \ `RENAME` 语句来更改视图的名称。此示例重命名了一个视图：\n\n```\nSQL> rename sales_rockies to sales_rockies_old;\n\
  ```\n\n你应该看到此消息：\n\n```\nTable renamed.\n```\n\n如果上述消息显示为 “View renamed” 会更合理；请注意，在此情况下，消息与操作并不完全匹配。\n\
  \n## 删除视图\n\n在删除视图之前，请考虑先对其重命名。如果你确定一个视图不再被使用，那么保持你的模式尽可能整洁并删除任何未使用的对象是有意义的。使用 `DROP\
  \ VIEW` 语句来删除视图：\n\n```\nSQL> drop view sales_rockies_old;\n```\n\n请记住，当你删除一个视图时，任何依赖于它的视图、物化视图和同义词都会变为无效。此外，与被删除视图相关的任何授权也会被移除。\n\
  \n## 管理同义词\n\n同义词提供了一种为对象创建替代名称或别名的机制。例如，假设 `USER1` 是当前连接的用户，并且 `USER1` 对 `USER2`\
  \ 的 `EMP` 表拥有 select 访问权限。如果没有同义词，`USER1` 必须像下面这样从 `USER2` 的 `EMP` 表中进行选择：\n\n```\n\
  SQL> select * from user2.emp;\n```\n\n假设 `USER1` 拥有 `CREATE SYNONYM` 系统权限，它可以执行以下操作：\n\
  \n```\nSQL> create synonym emp for user2.emp;\n```\n\n现在，`USER1` 可以透明地从 `USER2`\
  \ 的 `EMP` 表中进行选择：\n\n```\nSQL> select * from emp;\n```\n\n你可以为以下类型的数据库对象创建同义词：\n\
  \n*   表\n*   视图、对象视图\n*   其他同义词\n*   通过数据库链接的远程对象\n*   PL/SQL 包、过程和函数\n*   物化视图\n\
  *   序列\n*   Java 类模式对象\n*   用户定义的对象类型\n\n创建一个指向另一个对象的同义词消除了指定模式所有者的需要，并且还允许你指定一个与对象名称不匹配的同义词名称。这让你可以在对象和用户之间创建一个抽象层，通常称为对象透明性。同义词允许你透明地管理对象，并与访问对象的用户分开管理。你还可以将对象无缝地重新定位到不同的模式甚至不同的数据库。引用这些序列的应用程序代码不需要更改——只需更改同义词的定义。现在，借助仅模式账户，同义词将允许引用对象，因为没有账户登录到这些模式中。\n\
  \n提示\n你可以使用同义词在一个数据库内设置多个应用程序环境。每个环境都有自己的同义词，这些同义词指向不同用户的对象，允许你针对一个数据库内的几个不同模式运行相同的代码。你可能会这样做，因为你无法负担为开发、测试、质量保证、生产等构建单独的服务器或数据库。\n\
  \n### 创建同义词\n\n用户在创建同义词之前必须被授予 `CREATE SYNONYM` 系统权限。一旦授予该权限，就可以使用 `CREATE SYNONYM`\
  \ 命令为另一个数据库对象创建别名。如果你想让该语句在同义词不存在时创建同义词，或者在同义词已存在时替换同义词定义，可以指定 `CREATE OR REPLACE\
  \ SYNONYM`。这通常是可接受的行为。\n\n在此示例中，将创建一个提供对视图访问权限的同义词。首先，视图的所有者必须授予对该视图的 select 访问权限。这里，视图的所有者是\
  \ `MV_MAINT`：\n\n```\nSQL> show user;\nUSER is \"MV_MAINT\"\nSQL> grant select on\
  \ sales_rockies to app_user;\n```\n\n接下来，以将要创建同义词的用户身份连接到数据库。\n\n```\nSQL> conn\
  \ app_user/foo\n```\n\n以 `APP_USER` 身份连接后，创建一个指向 `MV_MAINT` 拥有的名为 `SALES_ROCKIES`\
  \ 的视图的同义词：\n\n```\nSQL> create or replace synonym sales_rockies for mv_maint.sales_rockies;\n\
  ```\n\n现在，`APP_USER` 可以直接引用 `SALES_ROCKIES` 视图：\n\n```\nSQL> select * from sales_rockies;\n\
  ```\n\n使用 `CREATE SYNONYM` 命令时，如果你没有指定 `OR REPLACE`（如示例所示），并且同义词已经存在，则会抛出 `ORA-00955`\
  \ 错误。如果覆盖任何先前存在的同义词定义是可以接受的，那么请指定 `OR REPLACE` 子句。\n\n同义词的创建并不会同时创建访问对象的权限。此类权限必须单独授予，通常在你创建同义词之前授予（如示例所示）。\n\
  \n默认情况下，当你创建同义词时，它是一个私有同义词。这意味着它由创建该同义词的用户拥有，并且其他用户无法访问它，除非他们被授予了适当的对象权限。\n\n###\
  \ 创建公共同义词\n\n你也可以将同义词定义为公共的（有关私有同义词的讨论，请参阅前面的“创建同义词”部分），这意味着数据库中的任何用户都可以访问该同义词。有时，缺乏经验的\
  \ DBA 会执行以下操作：\n\n```\nSQL> grant all on sales to public;\nSQL> create public synonym\
  \ sales for mv_maint.sales;\n```\n\n现在，任何能够连接到数据库的用户都可以对存在于 `MV_MAINT` 模式中的 `SALES`\
  \ 表执行任何 `INSERT`、`UPDATE`、`DELETE` 或 `SELECT` 操作。你可能倾向于这样做，这样你就不必为每个需要访问的模式单独设置授权和同义词。这几乎总是一个坏主意。使用公共同义词存在一些问题：\n\
  \n*   如果你没有意识到全局定义的（公共）同义词，故障排除可能会很麻烦；DBA 往往会忘记或不知道已经创建了公共同义词。\n\n\n\n"
- '# 公共同义词的使用与管理


  共享同一个数据库的多个应用程序，如果都使用在数据库内非唯一的公共同义词，可能会导致对象名称冲突。


  安全应根据需要进行管理，而非一刀切。


  我通常尽量避免使用公共同义词。然而，有些场景可能值得使用它们。例如，Oracle 创建数据字典时，就使用公共同义词来简化对内部数据库对象的访问管理。要显示数据库中的任何公共同义词，请运行此查询：


  ```sql

  SQL> select owner, synonym_name

  from dba_synonyms

  where owner=''PUBLIC'';

  ```


  ### 动态生成同义词


  有时，为需要私有同义词的某个模式（schema）的所有表或视图动态生成同义词是很有用的。以下脚本使用 `SQL*Plus` 命令来格式化和捕获一个 SQL 脚本的输出，该脚本为模式内的所有表生成同义词：


  ```sql

  SQL> CONNECT &&master_user/&&master_pwd

  --

  SQL> SET LINESIZE 132 PAGESIZE 0 ECHO OFF FEEDBACK OFF

  SQL> SET VERIFY OFF HEAD OFF TERM OFF TRIMSPOOL ON

  --

  SQL> SPO gen_syns_dyn.sql

  --

  SQL> select ''create or replace synonym '' || table_name ||

  '' for '' || ''&&master_user..'' ||

  table_name || '';''

  from user_tables;

  --

  SQL> SPO OFF;

  --

  SQL> SET ECHO ON FEEDBACK ON VERIFY ON HEAD ON TERM ON;

  ```


  请看 `SELECT` 语句中带有两个点的 `&master_user` 变量：双点语法的目的是什么？在 `&` 变量末尾放置一个点，会指示 `SQL*Plus`
  将该点之后的任何内容连接到该 `&` 变量。当你放两个点在一起时，那就告诉 `SQL*Plus` 将一个点连接到 `&` 变量所包含的字符串。


  ### 显示同义词元数据


  `DBA_SYNONYMS`、`ALL_SYNONYMS` 和 `USER_SYNONYMS` 视图包含数据库中同义词的信息。使用以下 SQL 查看当前连接用户的同义词元数据：


  ```sql

  SQL> select synonym_name, table_owner, table_name, db_link

  from user_synonyms

  order by 1;

  ```


  `ALL_SYNONYMS` 视图显示所有私有同义词、所有公共同义词，以及不同用户拥有的、当前连接用户对其基础表具有 SELECT 访问权限的任何私有同义词。你可以通过查询
  `DBA_SYNONYMS` 视图来显示数据库中所有私有和公共同义词的信息。


  `DBA_SYNONYMS`、`ALL_SYNONYMS` 和 `USER_SYNONYMS` 视图中的 `TABLE_NAME` 列名有点误导，因为 `TABLE_NAME`
  可以引用多种类型的数据库对象，如同义词、视图、包、函数、过程或物化视图。类似地，`TABLE_OWNER` 指的是对象的所有者（而该对象不一定是一张表）。


  当你诊断数据完整性问题时，有时首先要确定正在访问的是哪张表或哪个对象。你可能从看似是表的东西进行选择，但实际上，它可能是一个指向视图的同义词，而该视图又从另一个同义词进行选择，后者最终指向另一个数据库中的一张表。


  以下查询通常是确定一个对象是同义词、视图还是表的起点：


  ```sql

  SQL> select owner, object_name, object_type, status

  from dba_objects

  where object_name like upper(''&object_name%'');

  ```


  请注意，在此查询中使用通配符百分号 (`%`) 允许你输入对象名称的一部分。因此，该查询有可能返回与你输入的文本字符串部分匹配的任何对象的信息。


  你也可以使用 `DBMS_METADATA` 包的 `GET_DDL()` 函数来显示同义词元数据。如果你想为当前连接用户显示所有同义词的 DDL，请运行此 SQL：


  ```sql

  SQL> set long 5000

  SQL> select dbms_metadata.get_ddl(''SYNONYM'', synonym_name) from user_synonyms;

  ```


  你也可以显示特定用户的 DDL。你必须为 `GET_DDL()` 函数提供对象类型、对象名称和模式作为输入。




  ## 重命名同义词


  您可能希望重命名一个同义词，以便使其符合命名规范，或者确定它是否正在被使用。使用 `RENAME` 语句来更改同义词的名称：


  ```sql

  SQL> rename inv_s to inv_st;

  ```


  请注意，输出会显示此消息：


  ```

  Table renamed.

  ```


  先前的提示有些误导性。它指示一个表已被重命名，但在该场景下，实际被重命名的是一个同义词。


  ## 删除同义词


  如果您确定不再需要某个同义词，则可以将其删除。未使用的同义词可能会对需要增强或调试现有应用程序的其他人员造成困惑。使用 `DROP SYNONYM` 语句来删除私有同义词：


  ```sql

  SQL> drop synonym inv;

  ```


  如果它是一个公共同义词，则在删除时需要指定 `PUBLIC`：


  ```sql

  SQL> drop public synonym inv_pub;

  ```


  如果成功，您应该会看到此消息：


  ```

  Synonym dropped.

  ```


  ## 管理序列


  序列是一种数据库对象，用户可以访问它以选择唯一的整数。序列通常用于生成整数来填充主键和外键列。您可以通过 `SELECT`、`INSERT` 或 `UPDATE`
  语句访问序列来使其递增。Oracle 保证在选择时序列号是唯一的；没有任何两个用户会话可以选择相同的序列号。无法保证序列生成的数字中不会偶尔出现间隔。通常，一定数量的序列值会缓存在内存中，如果发生实例故障（断电、异常关闭），内存中任何未使用的值都会丢失。即使您不缓存序列，也无法阻止用户在事务中获取一个序列值然后回滚该事务（事务被回滚，但序列值不会回滚）。对于大多数应用程序来说，拥有一个基本无间隔的唯一整数生成器是可以接受的。只需意识到间隔是可能存在的。


  ### 创建序列


  对于许多应用程序，创建一个序列可以像这样简单：


  ```sql

  SQL> create sequence inv_seq;

  ```


  默认情况下，起始数字是 1，增量是 1，内存中缓存的默认序列数量是 20，最大值是 10²⁷。您可以通过此查询验证默认值：


  ```sql

  SQL> select sequence_name, min_value, increment_by, cache_size, max_value

  from user_sequences;

  ```


  在创建序列时，您有很大的自由度来改变其各个方面。例如，以下命令创建一个起始值为 1,000、最大值为 1,000,000 的序列：


  ```sql

  SQL> create sequence inv_seq2 start with 10000 maxvalue 1000000;

  ```


  表 9-1 列出了创建序列时可用的各种选项。


  **表 9-1 序列创建选项**


  | 选项 | 描述 |

  | --- | --- |

  | `INCREMENT BY` | 指定序列号之间的间隔。 |

  | `START WITH` | 指定生成的第一个序列号。 |

  | `MAXVALUE` | 指定序列的最大值。 |

  | `NOMAXVALUE` | 将序列的最大值设置为一个非常大的数字 (10²⁸ -1)。 |

  | `MINVALUE` | 指定序列的最小值。 |

  | `NOMINVALUE` | 对于升序序列，将最小值设置为 1；对于降序序列，将最小值设置为 –(10²⁸–1)。 |

  | `CYCLE` | 指定当序列达到最大值或最小值时，应开始从最小值（对于升序序列）或最大值（对于降序序列）重新生成数字。 |

  | `NOCYCLE` | 指示序列在达到最大值或最小值后停止生成数字。 |

  | `CACHE` | 指定要预分配并保留在内存中的序列号数量。如果未指定 `CACHE` 和 `NOCACHE`，默认为 `CACHE 20`。 |

  | `NOCACHE` | 指定序列号不应被缓存。 |

  | `ORDER` | 保证数字按请求顺序生成。 |

  | `NOORDER` | 如果不需要保证序列号按请求顺序生成，则使用此选项。通常这是可接受的，并且是默认设置。 |

  | `SCALE` | 通过使用数字偏移量（可消除所有重复项）来启用序列可伸缩性。建议在使用 `SCALE` 时不要使用 `ORDER`。 |

  | `EXTEND` | 默认值为 6，是可伸缩偏移量的值。 |

  | `NOEXTEND` | `SCALE` 子句的默认设置。序列的宽度只能与序列中数字的最大位数相同。 |

  | `NOSCALE` | 禁用序列可伸缩性。 |


  ### 使用序列伪列


  创建序列后，您可以使用两个伪列来访问序列的值：


  *   `NEXTVAL`

  *   `CURRVAL`


  您可以在任何 `SELECT`、`INSERT` 或 `UPDATE` 语句中引用这些伪列。要从 `INV_SEQ` 序列中检出一个值，请访问 `NEXTVAL`
  值，如下所示：


  ```sql

  SQL> select inv_seq.nextval from dual;

  ```


  现在，此会话已检索到一个序列号，您可以通过多次访问 `CURRVAL` 值来重复使用它：


  ```sql

  SQL> select inv_seq.currval from dual;

  ```


  以下示例使用一个序列来填充父表的主键值，然后使用同一个序列来填充子表中相应的外键值。可以直接在 `INSERT` 语句中访问序列。首次访问序列时，请使用 `NEXTVAL`
  伪列。


  ```sql

  SQL> insert into inv(inv_id, inv_desc) values (inv_seq.nextval, ''Book'');

  ```


  如果您想重用同一个序列值，可以通过 `CURRVAL` 伪列来引用它。接下来，向子表中插入一条记录，该记录的外键列使用与其父表主键值相同的值：


  ```sql

  SQL> insert into inv_lines

  (inv_line_id,inv_id,inv_item_desc)

  values

  (1, inv_seq.currval, ''Tome1'');

  --

  SQL> insert into inv_lines

  (inv_line_id,inv_id,inv_item_desc)

  values

  (2, inv_seq.currval, ''Tome2'');

  ```


  ### 自动递增列


  **提示：** 从 Oracle Database 12c 开始，您可以创建具有标识列的表，这些列会自动填充序列值。详情请参见第 7 章。


  如果您无法使用标识列，则可以通过使用触发器来模拟这种自动递增功能。例如，假设您创建了一个表和一个序列，如下所示：


  ```sql

  SQL> create table inv(inv_id number, inv_desc varchar2(30));

  SQL> create sequence inv_seq;

  ```


  接下来，在 `INV` 表上创建一个触发器，该触发器会自动从序列中为 `INV_ID` 列填充值：


  ```sql

  SQL> create or replace trigger inv_bu_tr

  before insert on inv

  for each row

  begin

  select inv_seq.nextval into :new.inv_id from dual;

  end;

  /

  ```


  现在，向 `INV` 表中插入几条记录：


  ```sql

  SQL> insert into inv (inv_desc) values( ''Book'');

  SQL> insert into inv (inv_desc) values( ''Pen'');

  ```


  从表中查询以验证 `INV_ID` 列确实是由序列自动填充的：


  ```sql

  SQL> select * from inv;

  INV_ID INV_DESC

  ---------- ------------------------------

  1 Book

  2 Pen

  ```


  我通常不喜欢使用这种技术。是的，它使开发人员的工作更容易，因为他们不必担心填充键列。然而，DBA 需要生成更多代码来维护那些需要自动填充的列。因为我就是 DBA，并且我喜欢保持我所维护的数据库代码尽可能简单，所以我通常会告诉开发人员，我们不使用这种自动递增列的方法，而是使用在
  DML 语句中直接调用序列的技术（如前一节“使用序列伪列”所示）。



  ## 可伸缩序列


  一项新功能是可伸缩序列，它允许为序列添加唯一的数字偏移量前缀。与第 8 章讨论的反向键索引类似，这有助于避免热点问题，并确保每个服务器使用相同的偏移量，使数字集中在一起。


  可伸缩序列使用 `SCALE`、`EXTEND`、`NOEXTEND` 和 `NOSCALE` 选项。


  ```

  SQL> create sequence inv_seq scale;

  ```


  关于 `scale` 选项的信息存储在序列字典列 `SCALE_FLAG` 和 `EXTEND_FLAG` 中。


  ```

  SQL> select sequence_name, scale_flag, extend_flag from dba_sequences

  where sequence_name=''INV_SEQ'';

  SEQUENCE_NAME                  SCALE_FLAG   EXTEND_FLAG


  INV_SEQ                        Y            N

  SQL> select inv_seq.nextval from dual;

  NEXTVAL

  ```


  前三个数字值基于实例，接下来的三个基于会话，最后一个数字是序列的下一个值。


  ### 无间隙序列


  人们有时会过分担心确保在向表中插入行时不会丢失任何一个序列值。在少数情况下，我见过应用程序因为序列值中的间隙而失败。我对这些问题有两个想法：


  *   如果你担心间隙，那么你就没有正确思考你正在解决的问题。

  *   如果你的应用程序因为间隙而失败，那么你的做法是错误的。


  我的话很直白，我知道，但几乎没有（如果有的话）应用程序需要无间隙序列。如果你真的需要无间隙序列，那么使用 Oracle 序列对象就是错误的方法。你必须自己实现一个序列生成器。你将不得不经历痛苦的折腾来确保不存在间隙。这些折腾会损害你代码的性能。而且，最终你可能会失败。


  ### 实现生成唯一值的多个序列


  我曾遇到一个开发者询问是否可以为应用程序创建多个序列，并保证每个序列生成的数字在所有序列中都是唯一的。如果你有这种类型的需求，可以通过几种不同的方式处理：


  *   如果你心情不好，可以告诉开发者这是不可能的，并且标准是每个应用程序使用一个序列（这通常是我采取的方法）。

  *   将序列设置为从不同的点开始并以不同的步长递增。

  *   使用序列号范围。


  如果你心情好，你可以通过指定奇数或偶数的起始数字，然后以 2 递增序列，来设置少量有限数量的序列，使其始终生成唯一值。例如，你可以设置两个奇数和两个偶数序列生成器；例如，


  ```

  SQL> create sequence inv_seq_odd start with 1 increment by 2;

  SQL> create sequence inv_seq_even start with 2 increment by 2;

  SQL> create sequence inv_seq_odd_dwn start with -1 increment by -2;

  SQL> create sequence inv_seq_even_dwn start with -2 increment by -2;

  ```


  这四个序列生成的数字应该*永远不会*相交。然而，这种方法受限于只能使用四个序列。


  如果你需要超过四个唯一序列，可以使用数字范围；例如，


  ```

  SQL> create sequence inv_seq_low start with 1 increment by 1 maxvalue 10000000;

  SQL> create sequence inv_seq_ml  start with 10000001 increment by 1 maxvalue 20000000;

  SQL> create sequence inv_seq_mh  start with 20000001 increment by 1 maxvalue 30000000;

  SQL> create sequence inv_seq_high start with 30000001 increment by 1 maxvalue 40000000;

  ```


  使用这种技术，你可以设置许多不同的数字范围供每个序列使用。缺点是每个序列可以生成的唯一值数量是有限的。


  ### 创建单个序列还是多个序列


  假设你有一个包含 20 个表的应用程序。一个常见的问题是，应该使用 20 个不同的序列来填充每个表的主键和外键列，还是只使用 1 个序列。


  我建议只使用 1 个序列；1 个序列比多个序列更容易管理，并且意味着需要管理的 DDL 代码更少，出现问题时需要排查的地方也更少。


  有时，开发者会提出诸如以下问题：


  *   只使用 1 个序列存在性能问题。

  *   序列号变得太高。


  如果你缓存序列值，通常访问序列不会存在性能问题。序列的最大值是 `10²⁸–1`，所以如果序列每次递增 1，你将永远达不到最大值（至少，在这一生中不会）。


  然而，在为父表和子表生成代理键的场景中，使用多个序列有时更方便。在这些情况下，可能有必要为每个应用程序使用多个序列。当你使用这种方法时，必须记住在添加表时添加序列，并在删除表时可能删除序列。这不是什么大事，但这意味着
  DBA 需要多一点维护工作，并且开发者必须确保为每个表使用正确的序列。


  ### 查看序列元数据


  如果你有 `DBA` 权限，可以查询 `DBA_SEQUENCES` 视图以显示数据库中所有序列的信息。要查看你模式拥有的序列，请查询 `USER_SEQUENCES`
  视图：


  ```

  SQL> select sequence_name, min_value, max_value, increment_by

  from user_sequences;

  ```


  要查看重新创建序列所需的 DDL 代码，请访问 `DBMS_METADATA` 视图。如果你使用 SQL*Plus 来执行 `DBMS_METADATA`，首先要确保设置了
  `LONG` 变量：


  ```

  SQL> set long 5000

  ```


  此示例提取 `INV_SEQ` 的 DDL：


  ```

  SQL> select dbms_metadata.get_ddl(''SEQUENCE'',''INV_SEQ'') from dual;

  ```


  如果你想显示当前连接用户的所有序列的 DDL，请运行此 SQL：


  ```

  SQL> select dbms_metadata.get_ddl(''SEQUENCE'',sequence_name) from user_sequences;

  ```


  你还可以通过提供 `SCHEMA` 参数来生成特定用户拥有序列的 DDL：


  ```

  SQL> select

  dbms_metadata.get_ddl(object_type=>''SEQUENCE'', name=>''INV_SEQ'', schema=>''INV_APP'')

  from dual;

  ```


  ### 重命名序列


  偶尔，你可能需要重命名一个序列。例如，序列可能以错误的名称创建，或者你可能想在从数据库中删除序列之前先重命名它。使用 `RENAME` 语句来完成此操作。此示例将
  `INV_SEQ` 重命名为 `INV_SEQ_OLD`：


  ```

  SQL> rename inv_seq to inv_seq_old;

  ```


  你应该会看到以下消息：


  ```

  Table renamed.

  ```


  在这种情况下，即使消息显示“Table renamed”，实际被重命名的是序列。


  ### 删除序列


  通常，你希望删除序列是因为它未被使用，或者你希望用新的起始数字重新创建它。要删除序列，请使用 `DROP SEQUENCE` 语句：


  ```

  SQL> drop sequence inv_seq;

  ```


  当对象被删除时，与该对象相关的所有权限也会被删除。因此，如果你需要重新创建序列，请记住重新授予其他可能需要使用该序列的用户的 `SELECT` 权限。


  > **提示**

  > 参见下一节“重置序列”，了解删除和重新创建序列的替代方法。


  ## 重置序列


  您可能偶尔需要更改序列的当前值。例如，您可能工作在一个测试环境中，开发人员周期性地希望将数据库重置到之前的状态。一个典型的场景是，开发人员拥有用于截断表并用测试数据重新填充的脚本，并且作为该操作的一部分，希望将序列重置回像
  1 这样的值。


  Oracle 的文档指出，“要从不同的数字重新启动序列，必须删除并重新创建它。” 这并不完全准确。在大多数情况下，您应该避免删除序列，因为您必须为当前对该序列具有选择权限的用户重新授予对象权限。这可能导致您的应用程序在等待这些权限时出现临时停机。


  以下技术演示了如何使用 `ALTER SEQUENCE` 语句将当前值设置为更高或更低的值。基本步骤如下：


  1.  将 `INCREMENT BY` 子句更改为一个很大的数字。

  2.  从序列中选择一次，以应用这个很大的正数或负数增量。

  3.  将 `INCREMENT BY` 设置回其原始值（通常为 1）。


  此示例将序列的下一个值设置为比当前值高 1000：


  ```

  SQL> alter sequence myseq increment by 1000;

  SQL> select myseq.nextval from dual;

  SQL> alter sequence myseq increment by 1;

  ```


  验证序列是否已设置为您期望的值：


  ```

  SQL> select myseq.nextval from dual;

  ```


  您也可以使用此技术将序列设置为比当前值小得多的数字。区别在于 `INCREMENT BY` 设置是一个很大的负数。例如，此示例将序列减少 1000：


  ```

  SQL> alter sequence myseq increment by -1000;

  SQL> select myseq.nextval from dual;

  SQL> alter sequence myseq increment by 1;

  ```


  验证序列是否已设置为您期望的值：


  ```

  SQL> select myseq.nextval from dual;

  ```


  此外，您可以通过 SQL 脚本自动执行将序列重置回某个值的任务。该技术在接下来的几行 SQL 代码中展示。该代码将提示您输入序列名称和希望序列重置到的值：


  ```

  SQL> UNDEFINE seq_name

  SQL> UNDEFINE reset_to

  SQL> PROMPT "sequence name" ACCEPT ''&&seq_name''

  SQL> PROMPT "reset to value" ACCEPT &&reset_to

  SQL> COL seq_id NEW_VALUE hold_seq_id

  SQL> COL min_id NEW_VALUE hold_min_id

  --

  SQL> SELECT &&reset_to - &&seq_name..nextval - 1 seq_id

  FROM dual;

  --

  SQL> SELECT &&hold_seq_id - 1 min_id FROM dual;

  --

  SQL> ALTER SEQUENCE &&seq_name INCREMENT BY &hold_seq_id MINVALUE &hold_min_id;

  --

  SQL> SELECT &&seq_name..nextval FROM dual;

  --

  SQL> ALTER SEQUENCE &&seq_name INCREMENT BY 1;

  ```


  为确保序列已设置为您想要的值，请从中选择 `NEXTVAL`：


  ```

  SQL> select &&seq_name..nextval from dual;

  ```


  当您将应用程序在各种开发、测试和生产环境之间迁移时，这种方法非常有用。它允许您重置序列，而无需重新授予对象权限。


  ## 总结


  视图、同义词和序列在 Oracle 数据库应用程序中被广泛使用。这些对象（连同表和索引）为创建复杂的应用程序提供了技术支持。


  视图提供了一种创建和存储复杂多表连接查询的方法，然后这些查询可以被数据库用户和应用程序使用。视图可用于更新底层基表，也可以创建为只读以满足报表需求。


  同义词（以及适当的权限）提供了一种机制，可以透明地允许用户访问属于另一个模式的对象。访问同义词的用户只需要知道同义词名称，而不管底层对象类型和所有者如何。这使得应用程序设计者可以无缝地将对象所有者与访问对象的用户分开。


  序列生成唯一整数，这些整数通常被应用程序用来填充主键和外键列。Oracle 保证当访问序列时，它总是向选择的用户返回一个唯一值。


  在安装 Oracle 二进制文件并创建数据库和表空间后，您通常会创建一个应用程序，该应用程序由所有者用户以及相应的表、约束、索引、视图、同义词和序列组成。有关这些对象的元数据存储在内部数据字典中。数据字典被广泛用于监控、故障排除和诊断问题。您必须非常熟练地从数据字典中检索信息。检索和分析数据字典信息是下一章的主题。


  '
- '# 10. 数据字典基础


  本书前面的章节重点介绍了诸如创建数据库、策略性地实施表空间、管理用户、基本安全性、表、索引和约束等主题。在这些章节中，您看到了几个 SQL 查询，这些查询访问数据字典视图以：


  *   显示数据库中有哪些用户，以及他们的密码是否已过期

  *   显示每个表的所有者及相关权限

  *   显示各种数据库参数的设置

  *   确定哪些列定义了外键约束

  *   显示表空间及相关数据文件和空间使用情况


  在这方面，Oracle 的数据字典是广泛而强大的。几乎所有可以想象到的关于您数据库的信息都可以检索到。数据字典存储有关数据库物理特征、用户、对象和动态性能指标的关键信息。高级
  DBA 必须具备数据字典方面的专家知识。


  本书的这一章是一个转折点，将它分为基本 DBA 任务和更高级的主题。现在深入探讨数据字典内部工作原理的细节是合适的。了解这些工作原理将为理解您的环境、提取相关信息以及完成您的工作奠定基础。


  本章的前几节详细介绍了数据字典的架构及其创建方式。还展示了逻辑对象和物理结构之间的关系，以及它们与特定数据字典视图的关系。这些理解将作为编写 SQL 查询的基础，以提取您需要的信息，从而成为一名更高效、更有效的
  DBA。最后，提供了几个示例，说明 DBA 如何使用数据字典。


  ## 数据字典架构


  如果您继承了一个数据库并被要求维护和管理它，通常您会检查数据字典的内容以确定数据库的物理结构，并查看当前正在发生哪些事件。为此，Oracle 提供了两大类只读数据字典视图：



  *   您的数据库内容，例如用户、表、索引、约束和权限。这些有时被称为静态的 `CDB/DBA/ALL/USER` 数据字典视图，它们基于存储在 `SYSTEM`
  表空间中的内部表。这里的“静态”一词意味着这些视图中的信息仅在您对数据库进行更改时才会变化，例如添加用户、创建表或修改列。


  *   数据库活动的实时视图，例如连接到数据库的用户、当前正在执行的 SQL、内存使用情况、锁和 I/O 统计信息。这些视图基于虚拟内存表，被称为动态性能视图。这些视图中的信息会随着数据库中事件的发生而由
  Oracle 持续更新。这些视图有时也被称为 `V$` 或 `GV$` 视图。


  这些类型的数据字典视图将在接下来的两节中详细描述。


  ### 静态视图

  Oracle 将一部分数据字典视图称为静态视图。这些视图基于由 Oracle 内部维护的物理表。Oracle 的文档指出，从数据变化不快的意义上说（至少与动态的
  `V$` 和 `GV$` 视图相比），这些视图是静态的。


  “静态”这个术语有时可能并不准确。例如，`DBA_SEGMENTS` 和 `DBA_EXTENTS` 视图会随着数据库中数据量的增长和收缩而动态变化。尽管如此，Oracle
  已经做出了静态和动态之间的区分，在查询数据字典时理解这一架构细微差别非常重要。在 Oracle Database 12c 之前，只有三个级别的静态视图：


  *   `USER`

  *   `ALL`

  *   `DBA`


  从 Oracle Database 12c 开始，当使用容器/可插拔数据库特性时，引入了第四个级别：


  *   `CDB`


  `USER` 视图包含当前用户可用的信息。例如，`USER_TABLES` 视图包含关于当前用户所拥有表的信息。查询 `USER` 级别的视图不需要特殊权限。


  下一个级别是 `ALL` 静态视图。`ALL` 视图显示当前用户有权限访问的所有对象信息。例如，`ALL_TABLES` 视图显示了当前用户可以对之执行任何类型
  DML 操作的所有数据库表。查询 `ALL` 级别的视图不需要特殊权限。


  接下来是 `DBA` 静态视图。`DBA` 视图包含描述数据库中所有对象的元数据（不论所有权或访问权限）。要访问 `DBA` 视图，必须授予当前用户 `DBA`
  角色或 `SELECT_CATALOG_ROLE`。


  `CDB` 级别的视图仅在您使用可插拔数据库特性时才适用。此级别提供关于容器数据库内所有可插拔数据库的信息（因此缩写为 `CDB`）。您会注意到，许多静态数据字典和动态性能视图都有一个新列
  `CON_ID`。此列唯一标识容器数据库内的每个可插拔数据库。


  > **提示**

  > 关于可插拔数据库的完整讨论，请参见第 22 章。除非另有说明，本章重点介绍 `DBA/ALL/USER` 级别的视图。请记住，如果您正在使用可插拔数据库，在报告容器数据库内所有可插拔数据库的信息时，您可能需要访问
  `CDB` 级别的视图。


  静态视图基于 Oracle 内部表，例如 `USER$`、`TAB$` 和 `IND$`。如果您有权访问 `SYS` 方案，可以通过 SQL 直接查看底层表。在大多数情况下，您只需要访问基于这些底层内部表的静态视图。


  数据字典表（如 `USER$`、`TAB$`、`IND$`）是在执行 `CREATE DATABASE` 命令时创建的。作为创建数据库的一部分，会执行 `sql.bsq`
  文件，该文件构建了这些内部数据字典表。`sql.bsq` 文件通常位于 `ORACLE_HOME/rdbms/admin` 目录中；您可以通过操作系统编辑实用程序（例如
  Linux/Unix 中的 `vi` 或 Windows 中的 Notepad）查看它。


  静态视图是在您运行 `catalog.sql` 脚本时创建的（通常在 `CREATE DATABASE` 操作成功后运行此脚本）。`catalog.sql` 脚本位于
  `ORACLE_HOME/rdbms/admin` 目录中。图 10-1 显示了创建静态数据字典视图的过程。


  ![图 10-1 创建静态数据字典视图](img/214899_3_En_10_Fig1_HTML.jpg)


  您可以通过查询 `DBA_VIEWS` 的 `TEXT` 列来查看静态视图的创建脚本；例如，


  ```

  SQL> set long 5000

  SQL> select text from dba_views where view_name=''DBA_VIEWS'';

  ```


  输出如下：


  ```

  SQL> select u.name, o.name, v.textlength, v.text, t.typetextlength, t.typetext,

  t.oidtextlength, t.oidtext, t.typeowner, t.typename,

  decode(bitand(v.property, 134217728), 134217728,

  (select sv.name from superobj$ h, "_CURRENT_EDITION_OBJ" sv

  where h.subobj# = o.obj# and h.superobj# = sv.obj#), null),

  decode(bitand(v.property, 32), 32, ''Y'', ''N''),

  decode(bitand(v.property, 16384), 16384, ''Y'', ''N''),

  decode(bitand(v.property/4294967296, 134217728), 134217728, ''Y'', ''N''),

  decode(bitand(o.flags,8),8,''CURRENT_USER'',''DEFINER'')

  from sys."_CURRENT_EDITION_OBJ" o, sys.view$ v, sys.user$ u, sys.typed_view$ t

  where o.obj# = v.obj#

  and o.obj# = t.obj#(+)

  and o.owner# = u.user#

  ```


  > **注意**

  > 如果您手动创建数据库（不使用 `dbca` 实用程序），则在运行 `catalog.sql` 和 `catproc.sql` 脚本时，必须以 `SYS` 方案连接。`SYS`
  方案是数据字典中所有对象的所有者。


  ### 动态性能视图

  动态性能数据字典视图通常被称为 `V$` 和 `GV$` 视图。这些视图由 Oracle 持续更新，反映了实例和数据库的当前状态。动态视图对于诊断实时性能问题至关重要。


  `V$` 和 `GV$` 视图间接基于底层的 `X$` 表，这些是启动 Oracle 实例时实例化的内部内存结构。一些 `V$` 视图在 Oracle 实例启动后即可用。例如，`V$PARAMETER`
  在发出 `STARTUP NOMOUNT` 命令后就包含有意义的数据，而不需要数据库处于装载或打开状态。其他动态视图（例如 `V$CONTROLFILE`）依赖于控制文件中的信息，因此只有在数据库装载后才包含重要信息。一些
  `V$` 视图（例如 `V$BH`）提供内核处理信息，因此只有在数据库打开后才能产生有用的结果。


  在最上层，`V$` 视图实际上是同义词，指向底层的 `SYS.V_$` 视图。在下一层，`SYS.V_$` 对象是基于另一层 `SYS.V$` 视图创建的视图。`SYS.V$`
  视图又基于 `SYS.GV$` 视图。在最底层，`SYS.GV$` 视图基于 `X$` 内存结构。



  ## 动态性能视图与数据字典


  ### 动态性能视图的创建与访问


  顶级同义词 `V$` 和视图 `SYS.V_$` 是在运行 `catalog.sql` 脚本时创建的，该脚本通常在数据库初始创建后执行。图 10-2 展示了创建
  `V$` 动态性能视图的过程。


  ![../images/214899_3_En_10_Chapter/214899_3_En_10_Fig2_HTML.jpg](img/214899_3_En_10_Fig2_HTML.jpg)


  **图 10-2** 创建 `V$` 动态性能数据字典视图


  通过最顶层的同义词访问 `V$` 视图通常足以满足动态性能信息需求。在极少数情况下，您可能需要查询无法通过 `V$` 视图获取的内部信息。在这些情况下，理解底层的
  `X$` 表至关重要。如果您使用 Oracle RAC，则应该熟悉 `GV$` 全局视图。这些视图提供有关集群中所有实例的全局动态性能信息（而 `V$` 视图是实例特定的）。`GV$`
  视图包含一个 `INST_ID` 列，用于识别集群环境中的特定实例。


  您可以通过查询 `V$FIXED_VIEW_DEFINITION` 视图的 `VIEW_DEFINITION` 列来显示 `V$` 和 `GV$` 视图的定义。例如，以下查询显示
  `V$CONTROLFILE` 的定义：


  ```sql

  SQL> select view_definition

  from v$fixed_view_definition

  where view_name=''V$CONTROLFILE'';

  ```


  输出如下：


  ```sql

  select STATUS, NAME, IS_RECOVERY_DEST_FILE, BLOCK_SIZE, FILE_SIZE_BLKS,

  CON_ID from GV$CONTROLFILE where inst_id = USERENV(''Instance'')

  ```


  ### 元数据的另一种视角


  DBA 通常会面临以下类型的数据库问题：


  *   向表中插入数据失败，因为表空间无法扩展。

  *   数据库拒绝连接，因为会话数超过上限。

  *   应用程序挂起，显然是由于某种锁定问题。

  *   PL/SQL 语句失败，出现内存错误。

  *   RMAN 备份两天内未能成功。

  *   用户尝试更新记录，但抛出唯一键约束冲突。

  *   SQL 语句的运行时间比正常情况长了数小时。

  *   应用程序用户报告性能似乎很慢，数据库肯定有问题。


  以上列表是 DBA 日常遇到的典型问题的一小部分样本。要高效地诊断和处理这类问题，需要一定量的知识。该知识的一个基本部分是理解 Oracle 的物理结构和相应的逻辑组件。


  例如，如果表因为表空间已满而无法扩展，您依靠什么知识来解决这个问题？您需要理解：创建数据库时，它包含多个称为表空间的逻辑空间容器。每个表空间由一个或多个物理数据文件组成。每个数据文件由许多操作系统块组成。每个表对应一个段，每个段包含一个或多个区。当段需要空间时，它会在物理数据文件中分配额外的区。


  一旦理解了所涉及的逻辑和物理概念，您就会直观地查看诸如 `DBA_TABLES`、`DBA_SEGMENTS`、`DBA_TABLESPACES` 和 `DBA_DATA_FILES`
  等数据字典视图，以定位问题并根据需要添加空间。在各种各样的故障排除场景中，您对各种逻辑和物理结构之间关系的理解将使您能够专注于查询那些能帮助您快速解决手头问题的视图。


  为此，请查看图 10-3。该图描述了 Oracle 数据库中逻辑结构和物理结构之间的关系。圆角矩形代表逻辑结构，尖角矩形代表物理文件。


  ![../images/214899_3_En_10_Chapter/214899_3_En_10_Fig3_HTML.jpg](img/214899_3_En_10_Fig3_HTML.jpg)


  **图 10-3** Oracle 数据库逻辑和物理结构关系


  > **提示：** 逻辑对象只能在数据库启动后从 SQL 中查看。相反，即使实例未启动，也可以通过操作系统工具查看物理对象。


  图 10-3 并未显示 Oracle 数据库所有逻辑和物理方面的所有关系。相反，它专注于您最有可能在日常工作中遇到的组件。这个基本的关系图为利用 Oracle
  的数据字典基础设施奠定了基础。


  在脑海中保留图 10-3 的图像；现在，将其与图 10-4 并列对照。


  ![../images/214899_3_En_10_Chapter/214899_3_En_10_Fig4_HTML.jpg](img/214899_3_En_10_Fig4_HTML.jpg)


  **图 10-4** 常用数据字典视图的关系


  瞧，这些数据字典视图几乎映射了 Oracle 数据库的所有逻辑和物理元素。图 10-4 并未展示每一个数据字典视图。实际上，该图只是触及了皮毛。然而，该图确实为您提供了一个坚实的基础，您可以在此基础上构建如何利用数据字典视图来获取您工作所需数据的理解。


  该图显示了视图之间的关系，但没有指定在连接视图时应使用哪些列。您必须描述表并做出合理的猜测，以确定应如何连接视图。例如，假设您想要显示与非本地管理的表空间关联的数据文件。这需要将
  `DBA_TABLESPACES` 连接到 `DBA_DATA_FILES`。如果您检查这两个视图，会注意到每个视图都包含一个 `TABLESPACE_NAME`
  列，这允许您编写如下查询：


  ```sql

  SQL> select a.tablespace_name, a.extent_management, b.file_name

  from dba_tablespaces a,

  dba_data_files  b

  where a.tablespace_name = b.tablespace_name

  and a.extent_management != ''LOCAL'';

  ```


  连接视图的方式通常比较明显。使用该图作为指南，指导您从何处开始查找信息以及如何编写 SQL 查询，以提供问题的答案并扩展您对 Oracle 内部架构和工作机制的了解。这将您的问题解决技能锚定在坚实的基础上。一旦您牢固地理解了
  Oracle 逻辑和物理组件之间的关系，以及这与数据字典的关联，您就能自信地处理任何类型的数据库问题。


  > **注意：** 有数千个 `CDB/DBA/ALL/USER` 静态视图和超过 700 个 `V$` 动态性能视图。


  ### 数据字典的几种创造性用法


  在本书的几乎每一章中，您都会找到几个 SQL 示例，说明如何利用数据字典来更好地理解概念和解决问题。话虽如此，值得展示一些 DBA 如何利用数据字典的非常规示例。接下来的几节就是做这个的。请记住，这只是冰山一角：DBA
  们运用了无数的查询和技巧来提取和使用数据字典信息。


  #### 可推导的文档


  有时，如果您在排除问题时压力很大，需要快速从数据字典中提取信息来帮助解决问题。然而，您可能不知道数据字典视图或其相关列的确切名称。如果您像我一样，不可能将所有数据字典视图名和列名都记在脑子里。此外，我使用从版本
  8 到 12c 的数据库，很难跟踪哪个特定的视图在给定的 Oracle 发行版中可用。


  ## 查询数据字典视图


  书籍和海报可以提供信息，但如果你无法找到完全符合需求的内容，可以使用数据字典本身包含的文档。你可以从三个视图中查询，特别是：


  *   `DBA_OBJECTS`

  *   `DICTIONARY`

  *   `DICT_COLUMNS`


  如果你大致知道要从中选择信息的视图名称，可以先从 `DBA_OBJECTS` 查询。例如，如果你正在排查与物化视图相关的问题，并且不记得与物化视图关联的数据字典视图的确切名称，可以这样做：


  ```sql

  SQL> select object_name

  from dba_objects

  where object_name like ''%MV%''

  and owner=''SYS'';

  ```


  这可能足以让你接近目标。但通常你需要关于每个视图的更多信息。这就是 `DICTIONARY` 和 `DICT_COLUMNS` 视图变得非常有价值的时候。`DICTIONARY`
  视图存储数据字典视图的名称。它有两个列：


  ```sql

  SQL> desc dictionary

  Name                                      Null?    Type

  ----------------------------------------- -------- ------------------------

  TABLE_NAME                                         VARCHAR2(30)

  COMMENTS                                           VARCHAR2(4000)

  ```


  例如，假设你正在排查物化视图的问题，并想确定与物化视图功能相关的数据字典视图的名称。你可以运行如下查询：


  ```sql

  SQL> select table_name, comments

  from dictionary

  where table_name like ''%MV%'';

  ```


  以下是输出的一个片段：


  ```

  TABLE_NAME             COMMENTS

  ---------------------- ---------------------------------------------

  DBA_MVIEW_LOGS         All materialized view logs in the database

  DBA_MVIEWS             All materialized views in the database

  DBA_MVIEW_ANALYSIS     Description of the materialized views accessible to dba

  DBA_MVIEW_COMMENTS     Comments on all materialized views in the database

  ```


  通过这种方式，你可以快速确定需要访问哪个视图。如果你想要关于该视图的更多信息，可以描述它；例如：


  ```sql

  SQL> desc dba_mviews

  ```


  如果这没有提供足够的关于列名的信息，你可以查询 `DICT_COLUMNS` 视图。这个视图提供数据字典视图列的注释；例如：


  ```sql

  SQL> select column_name, comments

  from dict_columns

  where table_name=''DBA_MVIEWS'';

  ```


  以下是输出的一部分：


  ```

  COLUMN_NAME            COMMENTS

  ---------------------- ---------------------------------------------

  OWNER                  Owner of the materialized view

  MVIEW_NAME             Name of the materialized view

  CONTAINER_NAME         Name of the materialized view container table

  QUERY                  The defining query that the materialized view instantiates

  ```


  通过这种方式，你可以生成并查看关于大多数数据字典对象的文档。该技术允许你快速识别在故障排除情况下可能对你有帮助的适当视图和列。


  ### 显示用户信息


  你可能会发现自己处在一个包含数百个数据库、分布在数十台不同服务器上的环境中。在这种情况下，你希望确保不会运行错误的命令或连接到错误的数据库，或者两者兼而有之。在执行
  DBA 任务时，谨慎的做法是验证你是否以适当的账户连接到正确的数据库。你可以运行以下类型的 SQL 命令来验证当前连接的用户和数据库信息：


  ```sql

  SQL> show user;

  SQL> select * from user_users;

  SQL> select name from v$database;

  SQL> select instance_name, host_name from v$instance;

  ```


  如第 3 章所示，保持对环境认知的一个有效方法是通过 `login.sql` 脚本自动设置你的 SQL*Plus 提示符，以显示用户和实例信息。此示例手动设置
  SQL 提示符：


  ```sql

  SQL> set sqlprompt ''&_USER.@&_CONNECT_IDENTIFIER.> ''

  ```


  以下是 SQL 提示符现在的样子：


  ```

  SYS@O18C>

  ```


  你还可以使用 `SYS_CONTEXT` 内置 SQL 函数从数据字典中提取关于你当前连接会话详细信息的信息。此函数的一般语法如下：


  ```sql

  SYS_CONTEXT('''','''',[length])

  ```


  此示例显示用户、身份验证方法、主机和实例：


  ```sql

  SYS@O18C> select

  sys_context(''USERENV'',''CURRENT_USER'') usr

  ,sys_context(''USERENV'',''AUTHENTICATION_METHOD'') auth_mth

  ,sys_context(''USERENV'',''HOST'') host

  ,sys_context(''USERENV'',''INSTANCE_NAME'') inst

  from dual;

  ```


  `USERENV` 是一个内置的 Oracle 命名空间。当你将 `USERENV` 命名空间与 `SYS_CONTEXT` 函数一起使用时，有超过 50 个可用参数。表
  10-1 描述了一些更有用的参数。有关参数的完整列表，请参阅 Oracle SQL 语言参考指南，该指南可从 Oracle 网站（`http://otn.oracle.com`）的技术网络区域免费下载。


  表 10-1 可用 `SYS_CONTEXT` 的有用 `USERENV` 参数


  | 参数名 | 描述 |

  | --- | --- |

  | `AUTHENTICATED_IDENTITY` | 身份验证中使用的身份 |

  | `AUTHENTICATION_METHOD` | 身份验证方法 |

  | `CDB_NAME` | 返回 CDB 的名称；否则返回 null |

  | `CLIENT_IDENTIFIER` | 返回由应用程序设置的标识符 |

  | `CLIENT_INFO` | 用户会话信息 |

  | `CON_ID` | 容器标识符 |

  | `CON_NAME` | 容器名称 |

  | `CURRENT_USER` | 当前活动会话的用户名 |

  | `DB_NAME` | 由 `DB_NAME` 初始化参数指定的名称 |

  | `DB_UNIQUE_NAME` | 由 `DB_UNIQUE_NAME` 初始化参数指定的名称 |

  | `HOST` | 客户端发起数据库连接的机器的主机名 |

  | `INSTANCE_NAME` | 实例名称 |

  | `IP_ADDRESS` | 客户端发起数据库连接的机器的 IP 地址 |

  | `ISDBA` | 如果用户通过操作系统或密码文件以 DBA 特权身份验证，则为 `TRUE` |

  | `NLS_DATE_FORMAT` | 会话的日期格式 |

  | `OS_USER` | 客户端发起数据库连接的机器的操作系统用户 |

  | `SERVER_HOST` | 运行数据库实例的机器的主机名 |

  | `SERVICE_NAME` | 连接的服务名称 |

  | `SID` | 会话标识符 |

  | `TERMINAL` | 客户端终端的操作系统标识符 |


  ### 确定环境细节


  有时，在各种开发、测试、测试版和生产环境中部署代码时，提示你是否处于正确的环境中会很方便。完成此操作的技术需要两个文件：`answer_yes.sql` 和 `answer_no.sql`。以下是
  `answer_yes.sql` 的内容：


  ```sql

  -- answer_yes.sql

  PROMPT

  PROMPT Continuing...

  ```


  而这是 `answer_no.sql`：


  ```sql

  -- answer_no.sql

  PROMPT

  PROMPT Quitting and discarding changes...

  ROLLBACK;

  EXIT;

  ```


  现在，你可以将以下代码插入到部署脚本的第一部分；该代码将提示你是否处于正确的环境以及是否要继续：


  ```sql

  WHENEVER SQLERROR EXIT FAILURE ROLLBACK;

  WHENEVER OSERROR EXIT FAILURE ROLLBACK;

  select host_name from v$instance;

  select name as db_name from v$database;

  SHOW user;

  SET ECHO OFF;

  PROMPT

  ACCEPT answer PROMPT ''Correct environment? Enter yes to continue: ''

  @@answer_&answer..sql

  ```


  如果你输入 `yes`，则将执行 `answer_yes.sql` 脚本，你将可以继续运行你调用的任何其他脚本。如果你输入 `no`，则将运行 `answer_no.sql`
  脚本，你将从 SQL*Plus 退出并返回到操作系统提示符。如果你直接按回车键而未输入任何内容，你也会退出并返回到操作系统提示符。


  ### 显示表行数


  ## 使用 SQL 生成 SQL 进行数据库管理与统计


  ### 统计表行数


  当您调查性能或空间问题时，显示每个表的行数非常有用。要手动计算行数，您需要为每个拥有的表编写如下查询：


  ```

  SQL> select count(*) from ;

  ```


  手动编写 SQL 既耗时又容易出错。在这种情况下，使用 SQL 生成解决问题所需的 SQL 更为高效。为此，下一个示例基于 `DBA_TABLES` 视图中的信息动态选择所需文本。将生成一个包含动态
  SQL 的输出文件。请以 `DBA` 特权用户身份运行以下 SQL 代码。请注意，此脚本包含 SQL*Plus 特定命令，例如 `UNDEFINE` 和 `SPOOL`。脚本会每次提示您输入用户名：


  ```

  UNDEFINE user

  SPOOL tabcount_&&user..sql

  SET LINESIZE 132 PAGESIZE 0 TRIMSPO OFF VERIFY OFF FEED OFF TERM OFF

  SELECT

  ''SELECT RPAD('' || "" || table_name || "" ||'',30)''

  || '','' || '' COUNT(*) FROM &&user..'' || table_name || '';''

  FROM dba_tables

  WHERE owner = UPPER(''&&user'')

  ORDER BY 1;

  SPO OFF;

  SET TERM ON

  @@tabcount_&&user..sql

  SET VERIFY ON FEED ON

  ```


  此代码生成一个名为 `tabcount_<user>.sql` 的文件，其中包含从指定方案中所有表选择行数的 SQL 语句。如果您提供给脚本的用户名是 `INVUSER`，则可以手动运行生成的脚本，如下所示：


  ```

  SQL> @tabcount_invuser.sql

  ```


  请记住，如果表的行数很高，此脚本可能需要很长时间（几分钟）才能运行。


  ### 使用 SQL 生成 SQL 语句


  开发人员和 DBA 经常使用 SQL 生成 SQL 语句。当您需要将相同的 SQL 过程（重复地）应用于许多不同的对象（例如方案中的所有表）时，这是一种非常有用的技术。


  如果您没有 `DBA` 级视图的访问权限，可以查询 `USER_TABLES` 视图；例如：


  ```

  SPO tabcount.sql

  SET LINESIZE 132 PAGESIZE 0 TRIMSPO OFF VERIFY OFF FEED OFF TERM OFF

  SELECT

  ''SELECT RPAD('' || "" || table_name || "" ||'',30)''

  || '','' || '' COUNT(*) FROM '' || table_name || '';''

  FROM user_tables

  ORDER BY 1;

  SPO OFF;

  SET TERM ON

  @@tabcount.sql

  SET VERIFY ON FEED ON

  ```


  ### 从统计数据估算行数


  如果您有准确的统计信息，可以查询 `CDB/DBA/ALL/USER_TABLES` 视图中的 `NUM_ROWS` 列。如果定期生成统计信息，此列通常具有接近的行数。以下查询从
  `USER_TABLES` 视图中选择 `NUM_ROWS`：


  ```

  SQL> select table_name, num_rows from user_tables;

  ```


  ### 统计分区表的行数


  最后一点说明：如果您有分区表并希望按分区显示行数，请使用以下几行 SQL 和 PL/SQL 代码来生成所需的 SQL：


  ```

  SQL> UNDEFINE user

  SQL> SET SERVEROUT ON SIZE 1000000 VERIFY OFF

  SQL> SPO part_count_&&user..txt

  SQL> DECLARE

  counter  NUMBER;

  sql_stmt VARCHAR2(1000);

  CURSOR c1 IS

  SELECT table_name, partition_name

  FROM dba_tab_partitions

  WHERE table_owner = UPPER(''&&user'');

  BEGIN

  FOR r1 IN c1 LOOP

  sql_stmt := ''SELECT COUNT(*) FROM &&user..'' || r1.table_name

  ||'' PARTITION ( ''||r1.partition_name ||'' )'';

  EXECUTE IMMEDIATE sql_stmt INTO counter;

  DBMS_OUTPUT.PUT_LINE(RPAD(r1.table_name

  ||''(''||r1.partition_name||'')'',30) ||'' ''||TO_CHAR(counter));

  END LOOP;

  END;

  /

  SPO OFF

  ```


  ### 手动生成统计信息


  如果要为表生成统计信息，请使用 `DBMS_STATS` 包。此示例为用户和表生成统计信息：


  ```

  SQL> exec dbms_stats.gather_table_stats(ownname=>''MV_MAINT'',-

  tabname=>''F_SALES'',-

  cascade=>true,estimate_percent=>20,degree=>4);

  ```


  您可以使用以下代码为用户的所有对象生成统计信息：


  ```

  SQL> exec dbms_stats.gather_schema_stats(ownname => ''MV_MAINT'',-

  estimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE,-

  degree => DBMS_STATS.AUTO_DEGREE,-

  cascade => true);

  ```


  前面的代码指示 Oracle 使用 `ESTIMATE_PERCENT` 参数，通过 `DBMS_STATS.AUTO_SAMPLE_SIZE` 估算要采样的表的百分比。Oracle
  还通过 `DEGREE` 参数设置为 `DBMS_STATS.AUTO_DEGREE` 来选择适当的并行度。`CASCADE` 参数指示 Oracle 为索引生成统计信息。


  请记住，Oracle 可能不会选择最佳的自动样本大小。Oracle 可能会选择 10%，但您可能有设置较低百分比（例如 5%）的经验，并且知道这是一个可接受的数字。在这些情况下，请不要使用
  `AUTO_SAMPLE_SIZE`；而是明确提供一个数字。


  ### 显示主键和外键关系


  有时在诊断约束问题时，显示有关外键约束关联的主键约束的数据字典信息非常有用。例如，您可能尝试向子表插入数据，并抛出错误指出父键不存在，而您希望显示有关父键约束的更多信息。


  以下脚本查询 `DBA_CONSTRAINTS` 数据字典视图以确定与子外键约束相关的父主键约束。您需要向脚本提供表的所有者以及您希望显示主键约束的子表：


  ```

  SQL> select

  a.constraint_type cons_type

  ,a.table_name      child_table

  ,a.constraint_name child_cons

  ,b.table_name      parent_table

  ,b.constraint_name parent_cons

  ,b.constraint_type cons_type

  from dba_constraints a

  ,dba_constraints b

  where a.owner    = upper(''&owner'')

  and a.table_name = upper(''&table_name'')

  and a.constraint_type = ''R''

  and a.r_owner = b.owner

  and a.r_constraint_name = b.constraint_name;

  ```


  前面的脚本会提示您输入两个 SQL*Plus 和号变量（`OWNER`，`TABLE_NAME`）；如果您不使用 SQL*Plus，则可能需要在运行脚本前使用适当的值修改脚本。


  以下输出显示有两个外键约束。它还显示了父表的主键约束：


  ```

  C CHILD_TABLE     CHILD_CONS          PARENT_TABLE    PARENT_CONS         C

  - --------------- ------------------- --------------- ------------------- -

  R REG_COMPANIES   REG_COMPANIES_FK2   D_COMPANIES     D_COMPANIES_PK      P

  R REG_COMPANIES   REG_COMPANIES_FK1   CLUSTER_BUCKETS CLUSTER_BUCKETS_PK  P

  ```


  当 `CONSTRAINT_TYPE` 列（来自 `DBA/ALL/USER_CONSTRAINTS`）包含 `R` 值时，这表示该行描述了一个引用完整性约束，即子表约束引用了主键约束。您使用连接到同一表两次的技术来检索主键约束信息。子约束列（`R_OWNER`，`R_CONSTRAINT_NAME`）与
  `DBA_CONSTRAINTS` 视图中包含主键信息的另一行匹配。


  ### 从主键查找外键


  您还可以执行与本节前面查询相反的操作；对于主键约束，您希望找到与之关联的任何外键列（如果存在）。下一个脚本获取主键记录，并查看它是否有约束类型为 `R` 的子记录。运行此脚本时，系统会提示您输入主键表的所有者和名称：


  ```

  SQL> select

  b.table_name        primary_key_table

  ,a.table_name        fk_child_table

  ,a.constraint_name   fk_child_table_constraint

  from dba_constraints a

  ,dba_constraints b

  where a.r_constraint_name = b.constraint_name

  and   a.r_owner           = b.owner

  and   a.constraint_type   = ''R''

  and   b.owner             = upper(''&table_owner'')

  and   b.table_name        = upper(''&table_name'');

  ```


