  \n**注意**\n要创建物化视图，你需要同时拥有 `CREATE MATERIALIZED VIEW` 系统特权和 `CREATE TABLE` 系统特权。如果创建物化视图的用户不是基表的所有者，那么要执行提交时刷新（`ON\
  \ COMMIT REFRESH`），还需要对基表具有 `SELECT` 访问权限。\n\n本节中的物化视图示例基于之前创建的 `SALES` 表。假设你想创建一个报告每日销售额的物化视图。使用\
