- '# 数据库连接与实例


  关于图 2-7，有几个需要注意的方面。与数据库的通信由 `sqlplus` 用户进程启动。通常，用户进程通过网络连接到数据库，这要求配置并启动一个监听器进程。监听器进程将传入的连接请求移交给一个
  Oracle 服务器进程，该进程处理与客户端进程的所有后续通信。如果远程连接是以 `sys*` 级别用户发起的，则需要一个密码文件。对于不使用操作系统认证的本地
  `sys*` 连接，同样需要密码文件。


  实例由内存结构和后台进程组成。当实例启动时，它会读取参数文件，这有助于确定内存结构的大小以及实例的其他特征。启动数据库时，实例经历三个阶段：`nomount`（实例已启动）、`mount`（控制文件已打开）和
  `open`（数据文件和联机重做日志已打开）。


  ## 后台进程


  后台进程的数量因数据库版本而异（在最新版 Oracle 中超过 30 个）。你可以通过此查询查看进程的名称和描述：


  ```

  SQL> select name, description from v$bgprocess;

  ```


  主要的后台进程包括：


  *   `DBWn`：数据库写入器将数据块从数据库缓冲区高速缓存写入数据文件。

  *   `CKPT`：检查点进程将检查点信息写入控制文件和数据文件头。

  *   `LGWR`：日志写入器将重做信息从日志缓冲区写入联机重做日志。

  *   `ARCn`：归档器将联机重做日志的内容复制到归档重做日志文件。

  *   `RVWR`：恢复写入器在快速恢复区中维护数据块的前像。

  *   `MMON`：可管理性监视器进程收集自动工作量存储库统计信息。

  *   `MMNL`：可管理性监视器精简进程将活动会话历史缓冲区中的统计信息写入磁盘。

  *   `SMON`：系统监视器执行系统级清理操作，包括实例失败时的实例恢复、合并空闲空间以及清理临时空间。

  *   `PMON`：进程监视器清理异常终止的数据库连接，并将数据库实例自动注册到监听器进程。

  *   `RECO`：恢复进程自动解析失败的分布式事务。


  ## SGA 内存结构


  系统全局区（SGA）的结构因 Oracle 版本而异。你可以通过此查询查看每个组件的详细信息：


  ```

  SQL> select pool, name from v$sgastat;

  ```


  主要的 SGA 内存结构包括：


  *   `SGA`：SGA 是主要的可读写内存区，由多个缓冲区组成，例如数据库缓冲区高速缓存、重做日志缓冲区、共享池、大池、Java 池和流池。

  *   数据库缓冲区高速缓存：缓冲区高速缓存存储从数据文件读取的数据块的副本。

  *   日志缓冲区：日志缓冲区存储对已修改数据块的更改。

  *   共享池：共享池包含关于最近执行的 SQL 和 PL/SQL 代码的库缓存信息。共享池还包含数据字典缓存，其中存储有关数据库、对象和用户的结构信息。


  最后，程序全局区（PGA）是一个独立于 SGA 的内存区域。PGA 是一个进程特定的内存区，包含会话变量信息。


  '
- '# 总结与环境配置


  ## 总结


  在安装好 Oracle 二进制文件后，你就可以创建数据库了。在创建数据库之前，请确保已正确设置必需的操作系统变量。你还需要一个初始化文件并预先创建任何必要的目录。你应仔细考虑哪些初始化参数应设置为非默认值。通常，我尝试尽可能多地使用默认值，仅在有充分理由时才更改初始化参数。如果执行过多手动流程和步骤，则需要重新审视该流程。对于最新版本的数据库，许多环境变量已设置好；使用配置助手（如
  `dbca` 和 `netca`）时会自动创建目录。使用响应文件是自动化创建流程的另一种方式。


  本章重点介绍了使用 SQL*Plus 创建数据库。这是一种高效且可重复的创建数据库方法。在编写 `CREATE DATABASE` 语句时，请考虑数据文件和联机重做日志的大小，以满足数据库的放置和存储需求。内部参数和大小调整应作为数据库内部知识的一部分被理解，以便于后续故障排除和其他配置。使用最新版本的新特性将提高数据库的效率。某些环境可能仍在使用旧版本，这使得理解创建数据库所需的内部知识变得更加重要。


  我曾在一些环境中工作，管理层规定每台服务器只能有一个数据库；除非这是一个包含多个可插拔数据库的容器数据库，否则服务器上存在未利用的资源。一台内存容量大、CPU
  多的快速服务器应能托管几个不同的数据库。在决定一台服务器上放置多少个数据库时，你必须确定哪种架构能满足你的业务需求。


  创建数据库后，下一步是配置环境，以便能够高效地导航、操作和监控数据库。这些任务将在下一章中描述。


  ## 3. 配置高效环境


  安装好 Oracle 二进制文件并创建数据库后，你应该配置你的环境以实现高效操作。无论图形化数据库管理工具的功能如何，DBA 仍然需要从操作系统命令行执行许多任务并手动执行
  SQL 语句。善于利用操作系统和 SQL 的 DBA 比不善利用的 DBA 具有明显的优势。


  在任何数据库环境（Oracle、MySQL 等）中，有效的 DBA 会利用高级操作系统特性来快速导航目录、定位文件、重复命令、显示系统瓶颈等。要实现这种效率，你必须熟悉承载数据库的操作系统。


  除了精通操作系统，你还必须熟练掌握进入数据库的 SQL 接口。尽管你可以从图形界面获取大量诊断信息，但 SQL 使你能够更深入地探索内部机制，进行高级故障排除并获取数据库情报。


  本章为高效使用操作系统和 SQL 来管理数据库奠定了基础。你可以使用以下操作系统和数据库特性来配置你的环境以提高效率：


  *   操作系统变量

  *   Shell 别名

  *   Shell 函数

  *   Shell 脚本

  *   SQL 脚本



  '
- '# OS 效率工具：在压力下快速定位环境


  当你处于一个紧张的环境时，拥有一个能让你快速辨别当前位置、所用账户的环境，以及拥有能帮助你快速识别问题的工具至关重要。本章所描述的技术就像杠杆：它们为快速完成大量工作提供了助力。这些工具让你能够专注于可能面临的问题，而不是验证你的位置或担心命令语法。


  本章首先详细介绍实现最高效率的操作系统技术。后续章节将展示如何使用这些工具自动显示环境细节、导航文件系统、主动监控数据库以及进行故障分诊。


  > **提示**

  > 在数据库服务器上工作时，请始终使用一个操作系统 Shell。

  > 我推荐使用 Bash Shell；它包含了其他 Shell（如 Korn 和 C）的所有最有用功能，并且还有一些额外功能，进一步增强了其易用性。


  ## 定制操作系统命令提示符


  通常，数据库管理员（DBA）需要操作多个服务器和多个数据库。在这种情况下，你的屏幕上可能打开了许多终端会话。你可以运行以下类型的命令来识别当前工作环境：


  ```bash

  $ hostname -a

  $ id

  $ who am i

  $ echo $ORACLE_SID

  $ pwd

  ```


  为了避免混淆正在操作的服务器，通常需要将命令提示符配置为显示有关其环境的信息，例如主机名和数据库 SID。在这个示例中，命令提示符被自定义为包含主机名、用户和
  Oracle SID：


  ```bash

  $ PS1=''[\h:\u:${ORACLE_SID}]$ ''

  ```


  `\h` 指定了主机名。`\u` 指定了当前操作系统用户。`${ORACLE_SID}` 包含了你的 Oracle 实例标识符的当前设置。以下是此示例的命令提示符：


  ```

  [oracle18c:oracle:o18c]$

  ```


  该命令提示符包含了关于环境的三个重要信息：服务器名、操作系统用户名和数据库名。当你在多个环境之间导航时，设置命令提示符可以成为一个宝贵的工具，帮助你跟踪所在位置和所处环境。


  如果你希望登录时操作系统提示符能自动配置，则需要在启动文件中进行设置。在 Bash Shell 环境中，通常使用 `.bashrc` 文件。该文件通常位于你的
  `$HOME` 目录中。在 `.bashrc` 文件中添加以下代码行：


  ```bash

  PS1=''[\h:\u:${ORACLE_SID}]$ ''

  ```


  当将此代码行放入启动文件后，每次登录服务器时，你的操作系统提示符都会自动设置好。在其他 Shell（如 Korn Shell）中，启动文件是 `.profile`。


  根据个人偏好，你可能需要修改命令提示符以满足特定需求。例如，许多 DBA 喜欢在命令提示符中显示当前工作目录。要显示当前工作目录信息，可以添加 `\w` 变量：


  ```bash

  $ PS1=''[\h:\u:\w:${ORACLE_SID}]$ ''

  ```


  可以想象，命令提示符中显示的信息有多种选项。这是另一种流行的格式：


  ```bash

  $ PS1=''[\u@${ORACLE_SID}@\h:\W]$ ''

  ```


  表 3-1 列出了许多可用于自定义操作系统命令提示符的 Bash Shell 变量。


  **表 3-1** 用于自定义命令提示符的 Bash Shell 反斜杠转义变量


  | **变量** | **描述** |

  | --- | --- |

  | `\a` | ASCII 响铃字符 |

  | `\d` | “星期 月份 日期”格式的日期 |

  | `\h` | 主机名 |

  | `\e` | ASCII 转义字符 |

  | `\j` | Shell 管理的作业数量 |

  | `\l` | Shell 终端设备的基本名称 |

  | `\n` | 换行符 |

  | `\r` | 回车符 |

  | `\s` | Shell 的名称 |

  | `\t` | 24 小时制 HH:MM:SS 格式的时间 |

  | `\T` | 12 小时制 HH:MM:SS 格式的时间 |

  | `\@` | 12 小时制 am/pm 格式的时间 |

  | `\A` | 24 小时制 HH:MM 格式的时间 |

  | `\u` | 当前 Shell 用户的用户名 |

  | `\w` | 当前工作目录的完整路径 |

  | `\W` | 当前工作目录的基本名称 |

  | `\!` | 此 Shell 中的历史命令编号 |

  | `\#` | 此 Shell 的命令编号 |

  | `\$` | 如果有效用户 ID 为 0，则为 `#`；否则为 `$` |

  | `\\` | 反斜杠本身 |

  | `\[` | 非打印字符序列的开始（用于在提示符中包装颜色转义码） |

  | `\]` | 非打印字符序列的结束 |


