- "# 使用块更改跟踪\n\n`BACKUP INCREMENTAL` 命令会创建一个增量级别 1 的备份，并为其分配指定的标签名称；此备份随后将由 `RECOVER\
  \ COPY` 命令使用。\n\n此后，每次运行这两行代码时，你都会得到一个定期重复的备份模式。如果你使用映像副本进行备份，可以考虑采用增量更新备份策略，因为使用该策略可以避免在每次备份运行时都创建完整的映像副本。映像副本会在每次备份运行时，根据前一次备份以来的增量更改进行更新。\n\
  \n## 启用块更改跟踪\n\n块更改跟踪是利用一个二进制文件来记录数据库数据文件块更改的过程。其原理在于可以提升增量备份的性能，因为 RMAN 能够利用块更改跟踪文件来准确定位自上次备份以来哪些块发生了更改。这节省了大量时间，否则\
  \ RMAN 将不得不扫描所有已备份的块以确定它们是否自上次备份以来发生了变化。\n\n以下是启用块更改跟踪的步骤：\n\n1.  如果尚未启用，请将 `DB_CREATE_FILE_DEST`\
  \ 参数设置为磁盘上已存在的一个位置；例如，\n    ```\n    SQL> alter system set db_create_file_dest='/u01/O18C/bct'\
  \ scope=both;\n    ```\n\n2.  通过 `ALTER DATABASE` 命令启用块更改跟踪：\n    ```\n    SQL>\
  \ alter database enable block change tracking;\n    ```\n\n此示例在 `DB_CREATE_FILE_DEST`\
  \ 指定的目录中创建了一个使用 OMF 名称的文件。在此示例中，创建的文件被赋予以下名称：\n```\n/u01/O18C/bct/O18C/changetracking/o1_mf_8h0wmng1_.chg\n\
  ```\n\n你也可以通过直接指定文件名来启用块更改跟踪，这不需要设置 `DB_CREATE_FILE_DEST`；例如，\n```\nSQL> alter database\
  \ enable block change tracking using file '/u01/O18C/bct/btc.bt';\n```\n\n你可以通过运行以下查询来验证块更改跟踪的详细信息：\n\
  ```\nSQL> select * from v$block_change_tracking;\n```\n\n出于空间规划目的，块更改跟踪文件的大小约为数据库中被跟踪块总大小的\
  \ 1/30,000。因此，块更改跟踪文件的大小与数据库的大小成正比，而与生成的重做日志量无关。\n\n要禁用块更改跟踪，请运行此命令：\n```\nSQL>\
  \ alter database disable block change tracking;\n```\n\n**注意**\n当你禁用块更改跟踪时，Oracle\
  \ 会自动删除块更改跟踪文件。\n\n"
- '# 检查数据文件和备份中的损坏情况


  你可以使用 RMAN 来检查数据文件、归档日志和控制文件中的损坏情况。你还可以验证备份集是否可以恢复。RMAN 的 `VALIDATE` 命令用于执行这类完整性检查。运行
  `VALIDATE` 命令有三种方式：

  *   `VALIDATE`

  *   `BACKUP...VALIDATE`

  *   `RESTORE...VALIDATE`


  **注意**

  独立的 `VALIDATE` 命令在 Oracle Database 11g 及更高版本中可用。`BACKUP...VALIDATE` 和 `RESTORE...VALIDATE`
  命令在 Oracle Database 10g 及更高版本中可用。


  ## 使用 VALIDATE


  `VALIDATE` 命令可以作为独立命令使用，用于检查数据库数据文件、归档日志文件、控制文件、`spfile` 以及备份集片中是否存在丢失文件或物理损坏。例如，此命令将验证所有数据文件和控制文件：

  ```

  RMAN> validate database;

  ```


  你也可以仅验证控制文件，如下所示：

  ```

  RMAN> validate current controlfile;

  ```


  你可以像这样验证归档日志文件：

  ```

  RMAN> validate archivelog all;

  ```


  你可能希望将所有先前的完整性检查合并到一个命令中，如下所示：

  ```

  RMAN> validate database include current controlfile plus archivelog;

  ```


  在正常情况下，`VALIDATE` 命令仅检查物理损坏。你可以通过使用 `CHECK LOGICAL` 子句来指定同时检查逻辑损坏：

  ```

  RMAN> validate check logical database include current controlfile plus archivelog;

  ```


  `VALIDATE` 有多种用途。这里还有一些例子：

  ```

  RMAN> validate database skip offline;

  RMAN> validate copy of database;

  RMAN> validate tablespace system;

  RMAN> validate datafile 3 block 20 to 30;

  RMAN> validate spfile;

  RMAN> validate backupset ;

  RMAN> validate recovery area;

  ```


  如果你正在使用 Oracle Database 12c 的可插拔数据库功能，你可以验证容器内的特定数据库。在以 `SYS` 身份连接到根容器时，验证任何关联的可插拔数据库：

  ```

  RMAN> validate pluggable database salespdb;

  ```


  如果 RMAN 检测到任何损坏的块，`V$DATABASE_BLOCK_CORRUPTION` 视图会被填充。此视图包含有关文件号、块号以及受影响块数的信息。你可以使用此信息来执行块级别的恢复（详见第
  19 章）。


  **注意**

  物理损坏是指对块的更改导致其内容与 Oracle 预期的物理格式不匹配。默认情况下，RMAN 在备份、恢复和验证数据文件时会检查物理损坏。对于逻辑损坏，块的格式是正确的，但其内容与
  Oracle 预期的不一致，例如在行片段或索引条目中。


  ## 使用 BACKUP...VALIDATE


  `BACKUP...VALIDATE` 命令与 `VALIDATE` 命令非常相似，它也可以检查数据文件是否可用以及数据文件是否包含任何损坏的块；例如，

  ```

  RMAN> backup validate database;

  ```


  此命令实际上并不创建任何备份文件；它只读取数据文件并检查损坏情况。与 `VALIDATE` 命令类似，`BACKUP VALIDATE` 默认只检查物理损坏。你也可以指示它同时检查逻辑损坏，如下所示：

  ```

  RMAN> backup validate check logical database;

  ```


  以下是 `BACKUP...VALIDATE` 命令的一些变体：

  ```

  RMAN> backup validate database current controlfile;

  RMAN> backup validate check logical database current controlfile plus archivelog;

  ```


  同样与 `VALIDATE` 命令类似，如果 `BACKUP...VALIDATE` 检测到任何损坏块，也会填充 `V$DATABASE_BLOCK_CORRUPTION`。此视图中的信息可用于确定哪些块可能通过块级别恢复来还原（详见第
  19 章）。


  ## 使用 RESTORE...VALIDATE


  `RESTORE...VALIDATE` 命令用于验证将在恢复操作中使用的备份文件。此命令验证备份集、数据文件副本和归档日志文件：

  ```

  RMAN> restore validate database;

  ```


  使用 `RESTORE...VALIDATE` 时不会实际恢复任何文件。这意味着你可以在数据库联机且可用时运行该命令。


  ### 使用恢复目录


  当你使用恢复目录时，可以在与目标数据库相同的数据库、同一台服务器上创建恢复目录用户。但是，不建议采用这种方法，因为你肯定不希望目标数据库或其所在服务器的可用性影响到恢复目录。因此，你应该在与目标数据库服务器不同的服务器上创建恢复目录数据库。根据规模大小，恢复目录可以用于整个数据库环境，但请记住它通常存储的是控制文件中保存的信息。


  ## 创建恢复目录


  当我使用恢复目录时，我倾向于拥有一个专门仅用于恢复目录的数据库。这确保了恢复目录不会受到其他应用程序所需的维护或停机时间的影响（反之亦然）。




  '
- '# 创建与管理 Oracle 恢复目录


  ## 创建恢复目录


  以下步骤概述了创建恢复目录的过程：


  ### 1. 准备目录数据库

  在独立于目标数据库服务器的服务器上创建一个数据库，专门用于恢复目录。确保数据库大小适当；Oracle 推荐的大小通常偏小。以下是初始大小的充分建议：


  - `SYSTEM` 表空间：500MB

  - `SYSAUX` 表空间：500MB

  - `TEMP` 表空间：500MB

  - `UNDO` 表空间：500MB

  - 在线重做日志：每个 25MB；三组，每组有两个成员，进行多路复用

  - `RECCAT` 表空间：500MB


  ### 2. 创建目录表空间

  为恢复目录用户创建一个专用表空间。将其命名为 `RECCAT` 可使其作为恢复目录元数据的容器易于识别。


  ```sql

  SQL> CREATE TABLESPACE reccat

  DATAFILE ''/u01/dbfile/O12C/reccat01.dbf'' SIZE 500M

  EXTENT MANAGEMENT LOCAL UNIFORM SIZE 128k

  SEGMENT SPACE MANAGEMENT AUTO;

  ```


  ### 3. 创建目录所有者用户

  创建一个用户来拥有恢复目录对象。一个像 `RCAT` 这样的名称易于识别。授予必要的 `RECOVERY_CATALOG_OWNER` 角色和 `CREATE
  SESSION` 权限。


  ```sql

  SQL> CREATE USER rcat IDENTIFIED BY foo

  TEMPORARY TABLESPACE temp

  DEFAULT TABLESPACE reccat

  QUOTA UNLIMITED ON reccat;

  --

  GRANT RECOVERY_CATALOG_OWNER TO rcat;

  GRANT CREATE SESSION TO rcat;

  ```


  ### 4. 创建目录并验证

  通过 `RMAN` 以 `RCAT` 身份连接并创建恢复目录对象。


  ```sql

  $ rman catalog rcat/foo

  ```


  运行 `CREATE CATALOG` 命令。


  ```sql

  RMAN> create catalog;

  RMAN> exit;

  ```


  此命令可能需要几分钟。完成后，验证表是否已创建。


  ```sql

  $ sqlplus rcat/foo

  SQL> select table_name from user_tables;

  ```


  输出的一小部分示例：


  ```

  TABLE_NAME

  ------------------------------

  DB

  NODE

  CONF

  DBINC

  ```


  ## 注册目标数据库

  将你的目标数据库注册到恢复目录。确保你可以建立到目录数据库的 Oracle Net 连接，例如通过配置 `TNS_ADMIN/tnsnames.ora` 文件。然后，按如下方式注册：


  ```sql

  $ rman target / catalog rcat/foo@rcat

  ```


  连接后，你应该会看到类似于以下内容的验证消息：


  ```

  connected to target database: O18C (DBID=3423216220)

  connected to recovery catalog database

  ```


  运行 `REGISTER DATABASE` 命令：


  ```sql

  RMAN> register database;

  ```


  你现在可以运行备份操作，元数据将同时写入控制文件和恢复目录。请记住每次都要连接到目标和目录：


  ```sql

  $ rman target / catalog rcat/foo@rcat

  RMAN> backup database;

  ```


  ## 备份恢复目录

  确保你包含了备份和恢复恢复目录数据库本身的策略。为了获得最大保护，请将目录数据库运行在 `ARCHIVELOG` 模式下，并使用 `RMAN` 进行备份。

  你也可以使用像 Data Pump 这样的工具进行快照。缺点是在 Data Pump 导出之后创建的目录信息可能会丢失。

  请注意，如果目录数据库服务器发生故障，你仍然可以使用 `RMAN` 来备份你的目标数据库；你只是无法连接到目录。因此，任何指示 `RMAN` 同时连接到两者的脚本都必须进行修改。

  如果你完全丢失了恢复目录且没有备份，你可以从头重新创建它并重新注册目标数据库，但你将丢失所有长期的历史恢复目录元数据。


  ## 同步恢复目录

  如果网络问题导致在你执行备份时目录无法访问，则必须在连接性恢复后重新同步目录。这确保目录知晓任何未存储在其中的操作。


  运行以下命令进行同步：


  ```sql

  $ rman target / catalog rcat/foo@rcat

  RMAN> resync catalog;

  ```


  仅当你在未连接到目录的情况下执行了备份时才需要重新同步目录。在正常情况下，使用 `RESYNC` 命令是没有必要的。


  ## 恢复目录版本

  为你正在备份的每个目标数据库版本创建一个恢复目录。这可以避免兼容性问题和升级麻烦。当 `rman` 客户端版本与目录版本匹配时，兼容性更顺畅。

  拥有多个目录版本可能会导致混淆，但在具有多个不同 Oracle 数据库版本的环境中，通常更为方便。


  ## 删除恢复目录

  如果你不再需要恢复目录，可以将其删除。


  ### 删除目录对象

  以目录所有者身份连接并发出 `DROP CATALOG` 命令：


  ```sql

  $ rman catalog rcat/foo

  RMAN> drop catalog;

  ```


  系统将提示你：


  ```

  recovery catalog owner is RCAT

  enter DROP CATALOG command again to confirm catalog removal

  ```


  再次输入 `DROP CATALOG` 命令将从目录数据库中删除所有对象。建议在删除操作之前备份目录。


  ### 删除目录所有者

  或者，删除所有者用户。使用 `DBA` 权限连接并发出 `DROP USER` 语句：


  ```sql

  $ sqlplus system/manager

  SQL> drop user rcat cascade;

  ```


  `SQL*Plus` 会立即执行，没有第二次提示。请谨慎操作，因为此操作是永久性的。一个好的做法是在删除目录所有者之前对其执行 Data Pump 导出。


  ## 记录 RMAN 输出



  '
- '# 记录与报告 RMAN 操作


  ## 记录 RMAN 输出


  在对 RMAN 输出进行故障排查或检查备份作业状态时，记录 RMAN 的执行内容及每条命令的状态至关重要。有多种方法可用于记录 RMAN 输出。其中一些是 Linux/Unix
  操作系统的内置功能，另一些是 RMAN 特有的功能：


  *   Linux/Unix 重定向输出到文件

  *   Linux/Unix 日志记录命令

  *   RMAN `SPOOL LOG` 命令

  *   `V$RMAN_OUTPUT` 视图


  这些日志记录功能将在后续章节中讨论。


  ### 将输出重定向到文件


  Shell 脚本通常通过 `cron` 等调度工具自动运行。以这种方式运行 RMAN 命令时，可以通过指示 Shell 命令将标准输出消息和标准错误消息重定向到日志文件来捕获输出。这通过重定向
  (`>`) 字符完成。此示例运行一个 Shell 脚本 (`rmanback.bsh`)，并将标准输出和标准错误输出都重定向到名为 `rmanback.log`
  的日志文件：


  ```

  $ rmanback.bsh 1>/home/oracle/bin/log/rmanback.log 2>&1

  ```


  此处，`1>` 指示将标准输出重定向到指定文件。`2>&1` 指示 Shell 脚本将标准错误输出发送到与标准输出相同的位置。


  > **提示**

  > 有关 DBA 如何使用 Shell 脚本和 Linux 功能的更多详细信息，请参阅 Darl Kuhn 所著的 *Linux Recipes for Oracle
  DBAs* (Apress, 2008)。


  ### 使用 Linux/Unix 日志记录命令捕获输出


  你可以指示 Linux/Unix 创建一个日志文件，以捕获同时显示在屏幕上的任何输出。这可以通过两种方式之一完成：


  *   `tee`

  *   `script`


  #### 使用 tee 捕获输出


  启动 RMAN 时，你可以使用 `tee` 命令将屏幕上看到的输出同时发送到操作系统文本文件：


  ```

  $ rman | tee /tmp/rman.log

  ```


  现在，你可以连接到目标数据库并运行命令。所有在屏幕上看到的输出都将被记录到 `/tmp/rman.log` 文件中：


  ```

  RMAN> connect target /

  RMAN> backup database;

  RMAN> exit;

  ```


  当你退出 RMAN 时，`tee` 会话停止写入日志文件。


  #### 使用 script 捕获输出


  `script` 命令很有用，因为它指示操作系统将终端上出现的任何输出记录到日志文件中。要捕获所有输出，请在连接到 RMAN 之前运行 `script` 命令：


  ```

  $ script /tmp/rman.log

  Script started, file is /tmp/rman.log

  $ rman target /

  RMAN> backup database;

  RMAN> exit;

  ```


  要结束 `script` 会话，请按 Ctrl+D 或键入 `exit`。`/tmp/rman.log` 文件将包含显示在屏幕上的所有输出。当你需要捕获特定时间范围内的所有输出时，`script`
  命令非常有用。例如，你可能正在运行 RMAN 命令、退出 RMAN、运行 SQL*Plus 命令等等。`script` 会话从启动 `script` 开始，直到你按下
  Ctrl+D 结束。


  ### 将输出记录到文件


  捕获 RMAN 输出的一个简单方法是使用 `SPOOL LOG` 命令将输出发送到文件。此示例从 RMAN 内部启动日志文件：


  ```

  RMAN> spool log to ''/tmp/rmanout.log''

  RMAN> set echo on;

  RMAN>

  RMAN> spool log off;

  ```


  默认情况下，`SPOOL LOG` 命令会覆盖现有文件。如果要追加到日志文件，请使用关键字 `APPEND`：


  ```

  RMAN> spool log to ''/tmp/rmanout.log'' append

  ```


  你也可以在命令行启动 RMAN 时将输出定向到日志文件，这将覆盖现有文件：


  ```

  $ rman target / log /tmp/rmanout.log

  ```


  你也可以追加到日志文件，如下所示：


  ```

  $ rman target / log /tmp/rmanout.log append

  ```


  当你使用前面示例中所示的 `SPOOL LOG` 时，输出会进入文件而不是你的终端。因此，在交互式运行 RMAN 时，我很少使用 `SPOOL LOG`。该命令主要是在从脚本运行
  RMAN 时捕获输出的工具。


  ### 在数据字典中查询输出


  如果你没有捕获任何 RMAN 输出，仍然可以通过查询数据字典来查看最近的 RMAN 输出。`V$RMAN_OUTPUT` 视图包含 RMAN 最近报告的消息：


  ```

  SQL> select sid, recid, output

  from v$rman_output

  order by recid;

  ```


  `V$RMAN_OUTPUT` 视图是一个内存中对象，最多可保存 32,768 行。当你停止并重启数据库时，此视图中的信息会被清除。当你使用 RMAN `SPOOL
  LOG` 命令将输出假脱机到文件而无法在终端查看正在发生的情况时，此视图非常方便。


  ## RMAN 报告


  有几种不同的方法来报告 RMAN 环境：


  *   `LIST` 命令

  *   `REPORT` 命令

  *   通过数据字典视图查询元数据


  初次学习 RMAN 时，`LIST` 和 `REPORT` 命令之间的区别可能令人困惑，因为两者的界限并非泾渭分明。通常，我使用 `LIST` 命令查看有关现有备份的信息，而使用
  `REPORT` 命令来确定哪些文件需要备份，或显示有关过期或废弃备份的信息。


  SQL 查询可以为专门的报告（无法通过 `LIST` 或 `REPORT` 获得）或自动化报告提供详细信息：例如，通常通过 Shell 脚本和 SQL 实现自动化检查，报告
  RMAN 备份在过去一天内是否已运行。


  ### 使用 LIST


  在调查 RMAN 备份问题时，我首先执行的任务之一通常是连接到目标数据库并运行 `LIST BACKUP` 命令。此命令允许你查看备份集、备份片以及备份中包含的文件：


  ```

  RMAN> list backup;

  ```


  该命令显示存储库中记录的所有 RMAN 备份。你可能希望将备份假脱机到输出文件，以便保存输出，然后使用操作系统编辑器在输出中搜索特定字符串。


  要获取备份信息的汇总视图，请使用 `LIST BACKUP SUMMARY` 命令：


  ```

  RMAN> list backup summary;

  ```


  你也可以使用 `LIST` 命令仅报告映像副本信息：


  ```

  RMAN> list copy;

  ```


  要列出所有已备份的文件以及相关的备份集，请发出以下命令：


  ```

  RMAN> list backup by file;

  ```


  以下命令显示磁盘上的归档日志：


  ```

  RMAN> list archivelog all;

  RMAN> list copy of archivelog all;

  ```


  此外，此命令列出归档日志的备份（以及哪些归档日志包含在哪个备份片中）：


  ```

  RMAN> list backup of archivelog all;

  ```


  运行 `LIST` 命令（同样，`REPORT` 命令将在下一节介绍）的方式有很多种。前面的方法是你大多数时间会使用的。有关完整选项列表，请参阅 Oracle
  网站技术网络区域 ( [`http://otn.oracle.com`](http://otn.oracle.com) ) 提供的 *Oracle Database
  Backup and Recovery Reference Guide*。


  ### 使用 REPORT


  RMAN `REPORT` 命令可用于报告各种详细信息。你可以快速查看与数据库关联的所有数据文件，如下所示：


  ```

  RMAN> report schema;

  ```


  `REPORT` 命令提供有关通过 RMAN 保留策略标记为废弃的备份的详细信息；例如，


  ```

  RMAN> report obsolete;

  ```


  你可以报告根据保留策略需要备份的数据文件，像这样：


  ```

  RMAN> report need backup;

  ```


  报告需要备份的数据文件有几种方式。以下是一些其他示例：


  ```

  RMAN> report need backup redundancy 2;

  RMAN> report need backup redundancy 2 datafile 2;

  ```


  `REPORT` 命令也可用于从未备份过的数据文件，或可能包含由 `NOLOGGING` 操作创建的数据的数据文件。例如，假设你直接路径加载数据到一个表中，而该表所在的数据文件尚未备份。以下命令将检测这些情况：



  '
