- '# Oracle Scheduler 与 cron 对比


  DBA 们经常争论在安排和自动化任务时应该使用 Oracle Scheduler 还是 Linux/Unix 的 `cron` 实用程序。以下是 Oracle
  Scheduler 相对于 `cron` 的一些优势：


  *   可以使作业的执行依赖于另一个作业的完成

  *   健壮的资源平衡和灵活的调度功能

  *   可以基于数据库事件运行作业

  *   作业不需要检查数据库是否启动并运行

  *   程序的 `DBMS_SCHEDULER` PL/SQL 包语法无论操作系统如何都保持一致

  *   可以使用数据字典运行状态报告

  *   作业不需要通过 cron 作业传递密码

  *   如果在集群环境中工作，无需担心同步集群中每个节点的多个 `con` 表

  *   可以通过企业管理器进行维护和监控


  Oracle Scheduler 通过 `DBMS_SCHEDULER` PL/SQL 包实现。如前所述，使用此实用程序创建和维护作业相当简单。然而，尽管 Oracle
  Scheduler 有许多优点，许多 DBA 仍倾向于使用诸如 `cron` 之类的调度实用程序。以下是 `cron` 的一些优势：


  *   易于使用；简单、久经考验；创建或修改作业只需几秒钟

  *   几乎在所有 Linux/Unix 机器上普遍可用；在很大程度上，无论 Linux/Unix 平台如何，其运行方式几乎相同（是的，存在细微差异）

  *   与数据库无关；独立于数据库运行，并且无论数据库供应商或版本如何，其工作方式相同

  *   无论数据库是否可用都可以工作


  先前的列表并非详尽无遗，但应能让你了解每种调度工具的用途。最好让所有服务器上的作业保持一致，但更好的是拥有集中管理作业和执行的方式，例如 Cloud Control
  或企业调度工具。本章后续部分提供了有关如何通过 `cron` 实现和调度自动作业的信息。


  ## 注意


  如果你在 Windows 环境中，请使用任务计划程序实用程序来自动运行批处理作业。你可以通过控制面板，然后进入管理工具来访问任务计划程序。




  '
- '# 通过 cron 实现作业自动化


  `cron` 程序是一个作业调度实用工具，在 Linux/Unix 环境中无处不在。其名称来源于希腊语中的 "chrónos"（意为“时间”）。`cron`（极客们对“调度程序”的称呼）允许你安排脚本或命令在指定时间运行，并以设定的频率重复执行。


  ## cron 工作原理


  当你的 Linux 服务器启动时，一个 `cron` 后台进程会自动启动，以管理所有系统中的 `cron` 作业。该 `cron` 后台进程也称为 `cron`
  守护进程。此进程由 `/etc/init.d/crond` 脚本在系统启动时启动。你可以使用 `ps` 命令检查 `cron` 守护进程是否正在运行：


  ```

  $ ps -ef | grep crond | grep -v grep

  root      3081     1  0  2012 ?        00:00:18 crond

  ```


  在 Linux 系统上，你也可以使用 `service` 命令检查 `cron` 守护进程是否在运行：


  ```

  $ /sbin/service crond status

  crond (pid  3081) is running...

  ```


  `root` 用户在执行系统 `cron` 作业时会使用到若干文件和目录。`/etc/crontab` 文件包含了运行系统 `cron` 作业的命令。以下是 `/etc/crontab`
  文件内容的典型示例：


  ```

  SHELL=/bin/bash

  PATH=/sbin:/bin:/usr/sbin:/usr/bin

  MAILTO=root

  HOME=/

  # run-parts

  01 * * * * root run-parts /etc/cron.hourly

  02 4 * * * root run-parts /etc/cron.daily

  22 4 * * 0 root run-parts /etc/cron.weekly

  42 4 1 * * root run-parts /etc/cron.monthly

  ```


  这个 `/etc/crontab` 文件使用 `run-parts` 实用工具来运行位于以下目录中的脚本：`/etc/cron.hourly`、`/etc/cron.daily`、`/etc/cron.weekly`
  和 `/etc/cron.monthly`。如果有一个需要运行的系统实用工具，其执行频率不是每小时、每天、每周或每月一次，那么它可以被放置在 `/etc/cron.d`
  目录中。


  每个用户都可以创建一个 `crontab`（也称为 `cron` 表）文件。该文件包含了你希望在特定时间和间隔运行的程序列表。这个文件通常位于 `/var/spool/cron`
  目录中。对于每个创建了 `cron` 表的用户，`/var/spool/cron` 目录中都会有一个以该用户名命名的文件。作为 `root` 用户，你可以列出该目录中的文件，如下所示：


  ```

  # ls /var/spool/cron

  oracle root

  ```


  `cron` 后台进程大部分时间处于空闲状态。它每分钟唤醒一次，检查 `/etc/crontab`、`/etc/cron.d` 以及用户 `cron` 表文件，并确定是否有任何作业需要执行。


  表 20-1 总结了 `cron` 所使用的各种文件和目录的用途。了解这些文件和目录将有助于你排查问题，并更好地理解 `cron`。


  ### 表 20-1 cron 实用工具使用的文件和目录描述


  | 文件 | 用途 |

  | :--- | :--- |

  | `/etc/init.d/crond` | 在系统启动时启动 `cron` 守护进程 |

  | `/var/log/cron` | 与 `cron` 进程相关的系统消息；对故障排除很有用 |

  | `/var/spool/cron/<username>` | 用户的 `crontab` 文件存储在 `/var/spool/cron` 目录中 |

  | `/etc/cron.allow` | 指定可以创建 `cron` 表的用户 |

  | `/etc/cron.deny` | 指定不允许创建 `cron` 表的用户 |

  | `/etc/crontab` | 系统 `cron` 表，其中包含运行以下目录中脚本的命令：`/etc/cron.hourly`、`/etc/cron.daily`、`/etc/cron.weekly`
  和 `/etc/cron.monthly` |

  | `/etc/cron.d` | 包含 `cron` 表的目录，用于需要以非每小时、每天、每周或每月频率运行的作业 |

  | `/etc/cron.hourly` | 包含每小时运行一次系统脚本的目录 |

  | `/etc/cron.daily` | 包含每天运行一次系统脚本的目录 |

  | `/etc/cron.weekly` | 包含每周运行一次系统脚本的目录 |

  | `/etc/cron.monthly` | 包含每月运行一次系统脚本的目录 |




  '
- '# 启用对 Cron 的访问权限


  有时，系统管理员在设置新服务器时，默认不会为系统上的所有用户启用 `cron` 功能。要验证你是否拥有对 `cron` 的访问权限，请按如下方式调用该工具：


  ```

  $ crontab -e

  ```


  如果你收到以下错误信息，则表示你没有访问权限：


  ```

  You (oracle) are not allowed to use this program (crontab)

  ```


  要以 `root` 用户身份启用 cron 访问权限，可以使用 `echo` 命令将 `oracle` 添加到 `/etc/cron.allow` 文件中：


  ```

  # echo oracle >> /etc/cron.allow

  ```


  一旦 `oracle` 条目被添加到 `/etc/cron.allow` 文件中，你就可以使用 `crontab` 工具来安排任务了。


  > **注意**

  > 你也可以使用编辑工具（如 `vi`）向 `cron.allow` 文件中添加条目。


  `root` 用户总是可以使用 `crontab` 工具安排任务。其他用户必须被列在 `/etc/cron.allow` 文件中。如果 `/etc/cron.allow`
  文件不存在，那么操作系统用户则不能出现在 `/etc/cron.deny` 文件中。如果 `/etc/cron.allow` 和 `/etc/cron.deny`
  文件都不存在，那么只有 `root` 用户可以访问 `crontab` 工具。（这些规则可能因你使用的 Linux/Unix 版本而略有不同。）


  在某些 Unix 操作系统（如 Solaris）上，`cron.allow` 和 `cron.deny` 文件位于 `/etc/cron.d` 目录中。这些文件通常只能由
  `root` 用户修改。


  > **提示**

  > 在某些 Linux/Unix 平台上，可以使用更新、更灵活的 `cron` 变体，例如 `anacron` 工具。使用 `man anacron` 命令可以查看该工具在你的系统上的实现细节。


  '
- '# 理解 Cron 表条目


  你的 `cron` 表是一个包含数字和命令的列表，`cron` 后台进程（`cron` 守护进程）将按照指定的时间和计划运行它们。`crontab` 工具要求条目遵循明确定义的格式。在你的
  `crontab` 文件开头添加一个注释行来记录所需格式是个好主意，像这样：


  ```

  # 分(0-59) 时(0-23) 日(1-31) 月(1-12) 周(0/7-6) 命令或脚本

  ```


  在上面的例子中，`cron` 文件中的井号 (`#`) 代表注释的开始。在 `#` 之后输入的任何文本都会被 `cron` 忽略。


  `crontab` 中的每个条目是一个由六个字段组成的单行。前五个字段指定了执行时间和频率。这些字段中的条目可以用逗号或连字符分隔。逗号表示一个条目的多个值，而连字符表示一个值范围。条目也可以是一个星号
  (`*`)，表示所有可能的值都生效。这里有一个例子来帮助你理解。下面的条目在每周一至周五，从早上 8 点到下午 4:30，每半小时发送一封内容为“Wake up”的电子邮件：


  ```

  0,30 8-16 * * 1-5 echo "wake up" | mailx -s "wake up" dkuhn@gmail.com

  ```


  在某些 Linux 系统上，你可以在范围内的值后面跟上 `/<整数>` 来跳过一个值。例如，如果你想每隔一分钟运行一次任务，可以在分钟列中使用 `0-59/2`。你也可以将斜杠
  (`/`) 与星号一起使用来跳过值。例如，要每四分钟运行一次任务，你可以在分钟列中使用 `*/4`。


  `crontab` 中的第六个字段可以是一个或多个 Linux 命令或一个 shell 脚本。或者换句话说，第六列可以是任何你能在 Linux 命令行上在一行中运行的命令或脚本的组合。


  `cron` 工具有几个需要进一步解释的特殊之处。第五列是星期几。星期日用 0 或 7 表示；星期一用 1 表示；星期二用 2 表示；依此类推，星期六用 6 表示。


  第二列中的小时数采用军用时间格式，范围从 0 到 23。第四列（月份）和第五列（星期几）可以用数值或三个字母的缩写来表示。例如，下面的 `crontab` 条目使用了月份和星期几的三字母缩写：


  ```

  0,30 8-16 * Jan-Dec Mon-Fri echo "wake up" | mailx -s "get up" dkuhn@gmail.com

  ```


  此外，列之间似乎有重叠，比如第三列（日期）和第五列（星期几）。这些列允许你为需要在每月 1 号和 15 号或每周二等时间表上运行的任务创建灵活的计划。在你没有使用的列中填入一个星号。如果你需要在
  1 号、15 号以及每周二运行一个任务，那么就同时填写这两列。


  如果你从 `cron` 运行一个包含对 Oracle 实用程序（如 `sqlplus` 或 `rman`）调用的 shell 脚本，请确保你在脚本内实例化任何所需的
  OS 变量，例如 `ORACLE_SID` 和 `ORACLE_HOME`。如果你没有源引（source）这些变量，当你的 shell 脚本从 `cron` 运行时，你会看到如下错误：


  ```

  sqlplus: command not found

  ```


  当 `cron` 运行一个脚本（在用户的 `crontab` 中）时，它不会运行用户的启动或登录文件（例如 `.bashrc`）。因此，任何（从 `cron`
  运行的）脚本都需要显式设置任何所需的变量。你可以直接在脚本中设置变量，或者调用另一个导出这些变量的脚本（例如 Oracle 的 `oraenv` 脚本）。


  > **提示**

  > 不要将你在 `cron` 中设置的任务都安排在同一时间运行。相反，将它们分散开，以免在任何特定时间点拖慢 `cron` 或系统。


  '
- "# 安排任务自动运行\n\n要安排一个任务，你必须在你的 `cron` 表中添加一行，指定你希望任务执行的时间。有两种方法可以在你的 `cron` 表中添加条目：\n\
  \n- 直接编辑 `cron` 表文件\n- 从文件加载 `cron` 表\n\n这两种技术将在以下部分中描述。\n\n## 直接编辑 Cron 表\n\n你可以使用\
  \ `crontab` 命令的 `-e`（编辑器）选项直接编辑你的 `cron` 表：\n\n```\n$ crontab -e\n```\n\n发出上述命令后，你将看到一个要编辑的文件。这个文件被称为你的\
  \ `cron` 表（`crontab`）。要安排一个名为 `backup.bsh` 的脚本在每天晚上 11:05 运行，请将以下行输入到你的 `cron` 表中：\n\
  \n```\n5 23 * * * /home/oracle/bin/backup.bsh\n```\n\n这里，5 指定任务将在整点过 5 分时运行。23 是军用时间，指定任务应该在\
  \ 2300 时段运行（在此示例中，是整点过 5 分）。三个星号 (`* * *`) 表示任务应该在每月的每一天、每年的每一个月和每周的每一天运行。\n\n退出\
  \ `cron` 表文件。如果你的默认编辑器是 `vi`，则输入 `wq` 退出。当你退出 `crontab` 时，你的 `cron` 表会为你保存。要查看你的\
  \ `cron` 条目，请使用 `crontab` 命令的 `-l`（列表）选项：\n\n```\n$ crontab -l\n```\n\n要完全移除你的 `cron`\
  \ 表，请使用 `r` 选项：\n\n```\n$ crontab -r\n```\n\n在运行上述命令之前，你应该将你的 `cron` 表保存到一个文本文件中，如下所示：\n\
  \n```\n$ crontab -l > saved.cron\n```\n\n这样，如果你并非有意删除 `cron` 表，可以参考已保存的文件。\n\n>\
  \ **提示**\n> “我曾经和一位认为 `crontab -r` 意思是‘读取 cron 表’的 DBA 共事过。千万别犯那个错误。总是将你的 crontab\
  \ 备份到文本文件是个好习惯，这样可以通过 `crontab -l > crontab.backup` 来确保计划表在这些 `crontab -r` 引起的问题中是安全的。这个备份文件也可以用于加载到其他服务器上。”\n\
  \n## 设置默认编辑器\n\n用于修改 `cron` 表的默认编辑器取决于你的 `VISUAL` 操作系统变量的值。在我当前的环境中，`VISUAL` 变量被设置为\
  \ `vi`：\n\n```\n$ echo $VISUAL\nvi\n```\n\n\n## 从文件加载 Cron 表\n\n修改 `cron` 表的另一种方法是通过文件名直接加载。这样你可以保存\
  \ `cron` 作业，并通过直接加载文件来确保每台服务器上的作业保持一致，语法如下：\n\n```bash\n$ crontab\n```\n\n在此，`crontab`\
  \ 实用程序会将指定文件的内容加载到你的 `cron` 表中。使用此方法修改 `cron` 表的建议步骤如下：\n\n1.  修改 `cron` 表前，先将当前\
  \ `cron` 表内容填充到一个文件中；例如，\n2.  接下来，复制先前创建的文件（`mycron.txt`）。这样，如果你引入了错误且无法轻易找出问题所在，可以回退到原始文件。同时，这也为你提供了\
  \ `cron` 表变更的审计跟踪：\n\n    ```bash\n    $ crontab -l > mycron.txt\n    ```\n\n3.\
  \  现在，用你喜欢的文本编辑器编辑 `mycron.txt` 文件：\n\n    ```bash\n    $ cp mycron.txt mycron.jul29.txt\n\
  \    ```\n\n    ```bash\n    $ vi mycron.txt\n    ```\n\n    例如，要将一个名为 `backup.bsh`\
  \ 的脚本安排在每天晚上 11:05 运行，请添加以下几行：\n\n    ```bash\n    #--------------------------------------------------------------------------\n\
  \    # 文件备份，dk：2014 年 1 月 20 日，插入。\n    5 23 * * * /home/oracle/bin/backup.bsh\n\
  \    #--------------------------------------------------------------------------\n\
  \    ```\n\n4.  当你编辑完成后，将 `mycron.txt` 的内容加载到 `cron` 表中，如下所示：\n\n    ```bash\n \
  \   $ crontab mycron.txt\n    ```\n\n如果你的文件不符合 `cron` 语法，你将收到类似以下的错误：\n\n```bash\n\
  \"mycron.txt\":6: bad day-of-week\nerrors in crontab file, cannot install.\n```\n\
  \n在这种情况下，要么更正语法错误，要么重新加载原始的 `cron` 表副本。\n\n## 典型的 Cron 表示例\n\n这里列出了数据库服务器上 `cron`\
  \ 表的一个示例条目：\n\n```bash\n#----------------------------------------------------------------------------\n\
  # 分(0-59) 时(0-23) 日(1-31) 月(1-12) 周(0/7-6) 命令或脚本\n#----------------------------------------------------------------------------\n\
  # RMAN 备份，dk：2012 年 5 月 1 日，更新。\n1 16 * * * /u01/oracle/bin/rmanback.bsh INV >/u01/oracle/bin/log/bck.log\
  \ 2>&1\n#-----------------------------------------------------------------\n# 表空间检查，sp：2012\
  \ 年 12 月 17 日，创建。\n5 * * * * /u01/oracle/bin/tbsp_chk.bsh INV 10 1>/u01/oracle/bin/log/tbsp.log\
  \ 2>&1\n#-----------------------------------------------------------------\n```\n\
  \n请注意此条目中的几个方面。在每个 `cron` 表（以及每个数据库服务器）的顶部放置一行，简要解释日期调度特性的含义：\n\n```bash\n# 分(0-59)\
  \ 时(0-23) 日(1-31) 月(1-12) 周(0/7-6) 命令或脚本\n```\n\n用注释行分隔每个条目。这使条目更易读：\n\n```bash\n\
  #-----------------------------------------------------------------\n```\n\n此外，包含一个简短的注释（附上作者或修改者的姓名首字母），描述\
  \ `cron` 作业以及编辑的时间：\n\n```bash\n# RMAN 备份，dk：2018 年 1 月 1 日，更新。\n```\n\n如果你管理着数十台数据库服务器（每台都有自己的\
  \ `cron` 表），并且有多位数据库管理员，你将需要某种机制（不一定是复杂的）来跟踪谁在何时进行了更改。\n\n## 重定向 cron 输出\n\n每当你运行一个\
  \ Linux shell 命令时，默认情况下，（该命令的）标准输出将显示在你的屏幕上。同样，如果产生任何错误消息，它们默认也会显示在你的屏幕上。你可以使用 `>`\
  \ 或 `1>`（它们是同义词）将任何标准输出重定向到操作系统文件。此外，你可以使用 `2>` 将任何错误消息重定向到文件。符号 `2>&1` 指示 shell\
  \ 将任何错误消息发送到与标准输出相同的位置。即使在发送脚本执行的输出时，也要确保脚本具有适当的日志记录和报告功能，无论是记录到日志文件还是数据库表中，以反映成功或失败。\n\
  \n当你创建 `cron` 作业时，你可以使用这些重定向功能将 shell 脚本的输出发送到日志文件。例如，在下面的 `cron` 表条目中，`backup.bsh`\
  \ shell 脚本生成的任何标准输出和错误消息都被捕获到一个名为 `bck.log` 的文件中：\n\n```bash\n11 12 * * * /home/oracle/bin/backup.bsh\
  \ 1>/home/oracle/bin/log/bck.log 2>&1\n```\n\n如果你不重定向 `cron` 作业的输出，那么任何输出都会通过电子邮件发送给拥有该\
  \ `cron` 表的用户。你可以通过直接在 `cron` 表中指定 `MAILTO` 变量来覆盖此行为。通过以下几行代码，`cron` 的输出将发送给 `root`\
  \ 用户：\n\n```bash\nMAILTO=oraclebkup\n11 12 * * * /home/oracle/bin/backup.bsh\n```\n\
  \n如果你不希望输出发送到任何地方，那么将其重定向到众所周知的“位桶”。以下条目将标准输出和标准错误发送到 `/dev/null` 设备：\n\n```bash\n\
  11 12 * * * /home/oracle/bin/backup.bsh 1>/dev/null 2>&1\n```\n\n## 排查 cron 故障\n\
  \n如果你有一个运行不正常的 `cron` 作业，请按照以下步骤排查问题：\n\n1.  复制你的 `cron` 条目，将其粘贴到操作系统命令行中，然后手动运行该命令。通常，目录或文件名中一个轻微的拼写错误可能就是问题的根源。手动运行命令会突出显示此类错误。\n\
  \n2.  如果脚本运行的是 Oracle 实用程序，请确保你在脚本内为所需的 OS 变量进行了 source（设置）操作，例如 `ORACLE_HOME` 和\
  \ `ORACLE_SID`。通常，这些变量在你登录时由启动脚本（例如 `HOME/.bashrc`）设置。因为 `cron` 不会运行用户的启动脚本，所以任何所需的变量都必须在脚本中显式设置。\n\
  \n3.  确保任何从 `cron` 调用的 shell 脚本的第一行指定了用于解释脚本中命令的程序名称。例如，`#!/bin/bash` 应该是 Bash shell\
  \ 脚本的第一条条目。因为 `cron` 不运行用户的启动脚本（如 `HOME/.bashrc`），你不能假设操作系统的默认 shell 将被用来运行从 `cron`\
  \ 调用的命令或脚本。\n\n4.  确保 `cron` 后台进程正在运行。从操作系统发出以下命令进行验证：\n\n    ```bash\n    $ ps\
  \ -ef | grep cron\n    ```\n\n    如果 `cron` 守护进程（后台进程）正在运行，你应该看到类似以下的内容：\n\n   \
  \ ```bash\n    root      2969     1  0 Mar23 ?        00:00:00 crond\n    ```\n\n\
  5.  检查你在服务器上的电子邮件。当有 `cron` 作业运行不正常时，`cron` 实用程序通常会向操作系统账户发送一封电子邮件。\n\n6.  检查 `/var/log/cron`\
  \ 文件的内容是否有错误。有时，此文件包含有关未能运行的 `cron` 作业的相关信息。\n\n7.  验证作业设置的运行时间，并确保所有列都与日期、时间等对齐。\n\
  \n\n"
- '# 自动化 DBA 任务示例


  在当今往往混乱的商业环境中，自动化任务几乎是强制性的。如果不进行自动化，你可能会忘记执行某项任务；或者，如果手动执行工作，可能会在过程中引入错误。如果不自动化，你可能会发现自己被一个更高效或更便宜的
  DBA 团队所取代。


  当脚本失败时，收到一封电子邮件是合理的，但太多的成功任务邮件可能会造成干扰并导致错过失败通知。然而，无论成功或失败都收不到邮件，这实际上是一种失败，因为它处于一种不确定的状态。一种报告数据库运行脚本的方式是集中式报告，它从合并的日志或输出表的查询中显示成功或失败。审查每日邮件可以验证所有任务是否正常运行。


  DBA 自动化执行各种各样的任务。几乎任何类型的环境都需要你创建某种操作系统脚本，这些脚本封装了操作系统命令、SQL 语句和 PL/SQL 块的组合。


  本章中的以下脚本是 DBA 自动化的各种不同类型任务的一个示例。这套脚本绝非完整。其中许多脚本在你的环境中可能并不需要。重点是让你很好地了解自动化的任务类型以及完成特定任务所使用的技术。


  **注意**

  第 3 章包含 DBA 所需的一些核心脚本的基础示例。本节提供 DBA 通常自动化的任务和脚本示例。


  ## 启动和停止数据库及监听器


  如果数据库服务器需要重启或重新启动，理想情况是 Oracle 数据库和监听器能随服务器自动重启。过去，这部分功能是通过`/etc/oratab`文件中的一个参数来实现数据库自动重启的。它会在`dbstart`和`dbshut`命令中被调用，设置为‘Y’表示重启，‘N’表示需要人工干预。


  现在有了 Oracle Restart，它对于包含 RAC 和 ASM 的多组件环境尤其有用，但添加数据库作为重启的一部分也很简单。当使用`dbca`创建数据库时，数据库会被添加到
  Oracle Restart 配置中。同样，当你使用`dbca`删除数据库时，数据库也会从 Oracle Restart 中移除。如果你使用 Oracle Net
  配置助手（`netca`）创建或删除监听器，`netca`会将其添加到 Oracle Restart 或从中移除。


  如果你不使用`dbca`，而是通过脚本或手动`createdb`步骤等其他方法添加数据库和监听器到 Oracle Restart，也有几种方式。数据库软件安装中包含一个版本的
  Enterprise Manager 数据库控制，它只能将数据库和监听器添加到 Oracle Restart 配置。`srvctl`工具允许使用命令添加、修改和删除数据库及监听器。这些命令可以成为数据库创建脚本的一部分，从而使这个任务成为步骤之一，而不是之后的手动任务。


  对于监听器，需要根据监听器是在 GRID 还是`ORACLE_HOME`中启动来设置`GRID_HOME`或`ORACLE_HOME`。默认监听器通过以下方式添加：


  ```bash

  # cd $GRID_HOME/bin

  # ./srvctl add listener

  ```


  要添加另一个监听器，需要提供监听器的名称。


  添加数据库：


  ```bash

  # cd $ORACLE_HOME/bin

  # ./srvctl add service -d o18c -o /u01/app/oracle/product/18.1.0/db_1

  # -o 是 ORACLE_HOME 目录

  # -d 是数据库名称

  ```


  移除数据库：


  ```bash

  # srvctl remove database -d o18c

  ```


  也可以禁用某个服务，使其仍然可用但不随自动重启运行。禁用或启用数据库：


  ```bash

  # srvctl disable database -d o18c

  ```


  `srvctl`工具是 Oracle 软件的一部分，位于`ORACLE_HOME`中，因此不需要安装基础架构即可使用此方法将数据库和服务添加到 Oracle Restart。只要在重启配置中启用，Oracle
  Restart 将确保数据库在服务器重启时自动重启。


  ## 检查归档日志目标空间是否已满


  有时，DBA 和系统管理员没有充分规划和实施磁盘上存储归档日志文件的位置。在这些情况下，通常需要一个脚本来检查主要位置的空间，并在归档日志目标空间即将填满前发出警告。此外，你可能还希望在脚本中实现，在归档日志位置自动启动一个
  RMAN 任务来备份并删除归档日志以释放空间。


  这类脚本在归档日志目标以不可预测的频率填满的混乱环境中非常有用。如果归档日志目标空间已满，数据库将挂起。在某些环境中，这是完全不可接受的。你可能会争辩说，永远不应该让自己陷入这种情况。因此，如果你被请来维护一个不可预测的环境，并且你是那个在凌晨
  2 点接到电话的人，你可能需要考虑实现一个本节提供的脚本。


  在使用以下脚本之前，请将脚本中的变量更改为与你的环境匹配。当空间低于`THRESH_GET_WORRIED`变量指定的数量时，脚本将发送警告邮件，并运行 RMAN
  备份归档日志。


  ```bash

  #!/bin/bash

  PRG=`basename $0`

  DB=$1

  USAGE="Usage: ${PRG} "

  if [ -z "$DB" ]; then

  echo "${USAGE}"

  exit 1

  fi

  # source OS 变量

  . /var/opt/oracle/oraset ${DB}

  # 设置开始关注的阈值

  THRESH_GET_WORRIED=2000000 # df -k 显示的 2GB

  MAILX="/bin/mailx"

  MAIL_LIST="dkuhn@gmail.com "

  BOX=`uname -a | awk ''{print$2}''`

  #

  loc=`sqlplus -s <<EOF

  CONNECT / AS sysdba

  SET HEAD OFF FEEDBACK OFF

  SELECT SUBSTR(destination,1,INSTR(destination,''/'',1,2)-1)

  FROM v\\$archive_dest WHERE dest_name=''LOG_ARCHIVE_DEST_1'';

  EOF`

  # df 的输出取决于你的 Linux/Unix 版本，

  # 你可能需要根据输出调整下一行。

  free_space=`df -k | grep ${loc} | awk ''{print $4}''`

  echo box = ${BOX}, sid = ${DB}, Arch Log Mnt Pnt = ${loc}

  echo "free_space        = ${free_space} K"

  echo "THRESH_GET_WORRIED= ${THRESH_GET_WORRIED} K"

  #

  if [ $free_space -le $THRESH_GET_WORRIED ]; then

  $MAILX -s "Arch Redo Space Low ${DB} on $BOX" $MAIL_LIST <<EOF

  Archive log dest space low running backup now,

  box: $BOX, sid: ${DB}, free space: $free_space

  EOF

  # 运行 RMAN 备份归档日志并在备份后删除

  rman nocatalog <<EOF

  connect target /

  backup archivelog all delete input;

  EOF

  else

  echo no need to backup and delete, ${free_space} KB free on ${loc}

  fi

  #

  exit 0

  ```


  如果你使用 FRA（快速恢复区）作为归档日志文件的位置，可以从`V$ARCHIVED_LOG`视图中获取归档位置；例如，


  ```sql

  SQL> select

  substr(name,1,instr(name,''/'',1,2)-1)

  from v$archived_log

  where first_time =

  (select max(first_time) from v$archived_log);

  ```


  使用 FRA 时，还有其他几种方法可以管理此空间，这绝对是使用 FRA 而不是仅仅设置目录的另一个原因。可以使用 SQL 从`v$recovery_file_dest`获取阈值，而不是查看文件系统。


  ```sql

  SQL> select name, space_limit, space_used from v$recovery_file_dest;

  NAME                SPACE_LIMIT  SPACE_USED

  -------------------- ----------- ----------

  /u02/oradata/FRA        1048576      48576

  ```




  可以增加**快速恢复区**的大小，以容纳更多归档日志，直到通过备份和删除或清除旧备份释放空间。也可以更改快速恢复区的位置。自动化增加快速恢复区大小并运行备份的过程，以确保归档日志目录不会被填满，会更容易。可以在前面的脚本中的
  RMAN 脚本之前插入以下内容：


  ```sql

  SQL> alter system set DB_RECOVERY_FILE_DEST_SIZE=20G scope=both;

  ```


  通常，检查归档日志目的地的脚本每小时运行一次。这是一个典型的 `cron` 条目（此条目实际上应为单行代码，但为了适应页面已放置在两行）：


  ```bash

  38 * * * * /u01/oracle/bin/arch_check.bsh DWREP

  1>/u01/oracle/bin/log/arch_check.log 2>&1

  ```


  ## 截断大型日志文件


  有时日志文件可能变得非常大，并通过填满关键挂载点而导致问题。`listener.log` 将记录有关数据库传入连接的信息。`alert.log` 是另一个记录数据库错误、更改和活动的文件。对于活跃系统，此文件可能迅速增长到数千兆字节。对于许多环境，`listener.log`
  文件中的信息无需保留。如果存在 Oracle Net 连接问题，则可以检查该文件以帮助排除故障。


  `listener.log` 和 `alert.log` 文件正在被写入，因此不应直接删除它们。如果删除该文件，监听器进程不会重新创建该文件并开始再次写入；你必须停止并重新启动监听器以重新开始写入
  `listener.log` 文件。`alert.log` 会被重新创建，但应按照以下 `listener.log` 示例中的相同方式处理。但是，你可以将 `listener.log`
  文件置空或截断。在 Linux/Unix 环境中，通过以下技术完成：


  ```bash

  $ cat /dev/null >listener.log

  ```


  前面的命令将 `listener.log` 文件的内容替换为 `/dev/null` 的内容（Linux/Unix 系统上的一个默认文件，不包含任何内容）。此命令的结果是
  `listener.log` 文件被截断，监听器可以继续主动写入它。


  下面列出了一个 shell 脚本，该脚本在备份后截断默认的 `listener.log` 文件，备份保留至下次运行时被覆盖。此脚本依赖于设置操作系统变量 `ORACLE_BASE`。如果在环境中未设置该变量，则必须在脚本中硬编码目录路径：


  ```bash

  #!/bin/bash

  #

  if [ $# -ne 1 ]; then

  echo "Usage: $0 SID"

  exit 1

  fi

  # 有关设置操作系统变量的详细信息，请参见第 2 章

  # 使用 oraset 脚本设置 oracle 操作系统变量

  . /etc/oraset $1

  #

  MAILX=''/bin/mailx''

  MAIL_LIST=''dkuhn@gmail.com''

  BOX=$(uname -a | awk ''{print $2}'' | cut -f 1 -d''.'')

  #

  if [ -f $ORACLE_BASE/diag/tnslsnr/$BOX/listener/trace/listener.log ]; then

  cp $ORACLE_BASE/diag/tnslsnr/$BOX/listener/trace/listener.log $ORACLE_BASE/diag/tnslsnr/$BOX/listener/trace/listener.bkup

  cat /dev/null > $ORACLE_BASE/diag/tnslsnr/$BOX/listener/trace/listener.log

  fi

  if [ $? -ne 0 ]; then

  echo "trunc list. problem" | $MAILX -s "trunc list. problem $1" $MAIL_LIST

  else

  echo "no problem..."

  fi

  exit 0

  ```


  以下 `cron` 条目每月运行一次前面的脚本（此条目应全部在一行，但为了适应页面已放置在两行）：


  ```bash

  30 6 1 * * /orahome/oracle/bin/trunc_log.bsh DWREP

  1>/orahome/oracle/bin/log/trunc_log.log 2>&1

  ```


  ## 检查被锁定的生产账户


  通常应有一个数据库配置文件，指定数据库账户在指定次数的失败登录尝试后被锁定。例如，将 `DEFAULT` 配置文件的 `FAILED_LOGIN_ATTEMPTS`
  设置为 5。然而，有时恶意用户或开发人员会尝试猜测生产账户密码，经过五次尝试后，会锁定生产账户。发生这种情况时，需要尽快收到警报，以便调查是否存在安全事件或用户问题，然后解锁账户。


  以下 shell 脚本检查 `DBA_USERS` 中生产数据库账户列表的 `LOCK_DATE` 值：


  ```bash

  #!/bin/bash

  if [ $# -ne 1 ]; then

  echo "Usage: $0 SID"

  exit 1

  fi

  # 设置 oracle 操作系统变量

  . /etc/oraset $1

  #

  crit_var=$(sqlplus -s <<EOF

  / as sysdba

  SET HEAD OFF FEED OFF

  SELECT count(*)

  FROM dba_users

  WHERE lock_date IS NOT NULL

  AND username in (''CIAP'',''REPV'',''CIAL'',''STARPROD'');

  EOF)

  #

  if [ $crit_var -ne 0 ]; then

  echo $crit_var

  echo "locked acct. issue with $1" | mailx -s "locked acct. issue" dkuhn@sun.com

  else

  echo $crit_var

  echo "no locked accounts"

  fi

  exit 0

  ```


  此 shell 脚本由调度工具（如 `cron`）调用。例如，此 `cron` 条目指示作业每 10 分钟运行一次（此条目实际上应为单行代码，但为了适应页面已放置在两行）：


  ```bash

  0,10,20,30,40,50 * * * * /home/oracle/bin/lock.bsh DWREP

  1>/home/oracle/bin/log/lock.log 2>&1

  ```


  这样，当其中一个生产数据库账户被锁定时，就会发出电子邮件通知。如果风险水平可接受，作为此脚本的一部分，应有一个步骤在设定的时间后解锁账户，并记录失败的登录尝试。


  ## 检查进程过多


  在某些数据库服务器上，你可能有许多后台 SQL*Plus 作业。这些批处理作业可能执行诸如从远程数据库复制数据和大型每日更新作业等任务。在这些环境中，了解在任何给定时间数据库服务器上是否有异常数量的
  shell 脚本或 SQL*Plus 进程运行是有用的。异常数量的作业可能表明某些内容已损坏或挂起。


  下一个 shell 脚本中有两个检查：一个用于确定名称以 `bsh` 结尾的 shell 脚本的数量，另一个用于确定包含字符串 `sqlplus` 的进程数量：


  ```bash

  #!/bin/bash

  #

  if [ $# -ne 0 ]; then

  echo "Usage: $0"

  exit 1

  fi

  #

  crit_var=$(ps -ef | grep -v grep | grep bsh | wc -l)

  if [ $crit_var -lt 20 ]; then

  echo $crit_var

  echo "processes running normal"

  else

  echo "too many processes"

  echo $crit_var | mailx -s "too many bsh procs: $1" dkuhn@gmail.com

  fi

  #

  crit_var=$(ps -ef | grep -v grep | grep sqlplus | wc -l)

  if [ $crit_var -lt 30 ]; then

  echo $crit_var

  echo "processes running normal"

  else

  echo "too many processes"

  echo $crit_var | mailx -s "too many sqlplus procs: $1" dkuhn@gmail.com

  fi

  #

  exit 0

  ```


  前面的 shell 脚本名为 `proc_count.bsh`，由 `cron` 作业每小时运行一次（此条目实际上应为单行代码，但为了适应页面已放置在两行）：


  ```bash

  33 * * * * /home/oracle/bin/proc_count.bsh

  1>/home/oracle/bin/log/proc_count.log 2>&1

  ```


  ## 验证 RMAN 备份的完整性


  作为备份和恢复策略的一部分，你应定期验证备份文件的完整性。这也包含在使用 RMAN 备份数据库的过程中，但可以针对它们运行单独的作业以验证是否可以恢复。RMAN
  提供了一个 `RESTORE...VALIDATE` 命令，用于检查备份文件内的物理损坏。以下脚本启动 RMAN 并假脱机一个日志文件。随后在日志文件中搜索关键字
  error。如果日志文件中有任何错误，则会发送电子邮件：



  ```

  #!/bin/bash

  #

  if [ $# -ne 1 ]; then

  echo "用法: $0 SID"

  exit 1

  fi

  # 加载 Oracle 操作系统变量

  . /etc/oraset $1

  #

  date

  BOX=`uname -a | awk ''{print$2}''`

  rman nocatalog <<EOF

  connect target /

  spool log to $HOME/bin/log/rman_val.log

  set echo on;

  restore database validate;

  EOF

  grep -i error $HOME/bin/log/rman_val.log

  if [ $? -eq 0 ]; then

  echo "RMAN 验证问题 $BOX, $1" | \

  mailx -s "RMAN 验证问题 $BOX, $1" dkuhn@sun.com

  else

  echo "没有问题..."

  fi

  #

  date

  exit 0

  ```


  `RESTORE...VALIDATE` 命令实际上不会恢复任何文件；它只验证恢复数据库所需的文件是否可用，并检查物理损坏。


  如果还需要检查逻辑损坏，请指定 `CHECK LOGICAL` 子句。例如，要检查逻辑损坏，之前的 Shell 脚本中应包含这一行：


  ```

  restore database validate check logical;

  ```


  对于大型数据库，验证过程可能需要很长时间（因为脚本会检查备份文件中的每个数据块）。如果只想验证备份文件是否存在，请指定 `VALIDATE HEADER` 子句，如下所示：


  ```

  restore database validate header;

  ```


  此命令仅检查每个恢复和恢复所需文件的头部是否包含有效信息。


  **Autonomous Database（自主数据库）**

  前述的脚本和任务在调度时，仅仅是触及了 Oracle 数据库自动化作业的皮毛。开始获取这些脚本的结果并应用修复、执行下一步操作的流程，才更接近真正的自动化。Oracle
  18c 数据库拥有许多允许环境配置更深度自动化的流程和钩子。Oracle 18c 本身并非自主数据库，但在 Oracle Cloud 环境中，它成为了 Oracle
  Autonomous Database。这就是所谓的自修复、自修补和自驱动数据库。


  在 Oracle Cloud 中，数据库由自动化流程管理、备份，并在需要时执行故障转移和基本问题排查以处理问题。问题可能是需要增加处理能力或额外存储。如果数据库使用率不高，它可以缩减规模以节省成本。数据库了解活动发生的时间，并通过学习来监控性能问题并采取措施进行修复。


  在 Oracle Cloud 中，默认会实施安全配置以及安全选项。Autonomous Database 启用了威胁检测和加密，以保护其存储的数据。修补也是自动化的，因此当出现漏洞时，修补流程可以应用修复。这些步骤无需人工干预即可发生，并且在高可用性环境中，数据库不会经历停机。


  在这种云环境中，DBA 该做什么？在开发、数据集成、质量、安全和商业智能等其他领域，都有大量机会可以为企业增加价值。这不正是我们一直在讨论的——自动化基本任务并寻找方法来修复问题，以实现更一致、更稳定的数据库环境吗？


  数据库有很多功能可以用于管理业务的其他领域，甚至还有应该构建到应用程序中的数据库新特性。DBA 可以成为推动这一切的人。本章不会深入探讨 Oracle Cloud
  的细节，因为我们讨论的仍然是 Oracle 18c 数据库。区别在于运行数据库的位置或硬件。Oracle Cloud 和 Oracle Cloud Machine（在你的数据中心内）为数据库的配置和修补备份流程提供了监控、支持和自动化。


  Oracle Cloud 数据库甚至可以使用 DBA 已经熟悉的工具（如 SQL Developer 和 Cloud Control，即前 Enterprise
  Manager）进行与本地数据库相同的管理。用户通过云服务进行管理，DBA 可以帮助管理这些资源，并为迁移到云环境提供意见。


  随着 Autonomous Database 持续收集有关性能和活动的信息以进行安全预防，它会提供查询计划和索引的变更，以改进和检测安全异常。Oracle 18c
  数据库正被用于改变数据库环境的实施方式。数据库只是可以按需为业务需求提供的服务。使该服务可用的流程和步骤需要减少人工操作，增加自动化流程以及修复能力。




