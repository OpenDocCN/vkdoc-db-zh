- "# 1. 安装 Oracle 二进制文件\n\n过去的 Oracle 安装可能庞大、复杂且笨重。Oracle 数据库管理员负责规划和执行安装，因为他或她知道如何在步骤中出现的问题进行故障排除和解决。有多个配置和安装选项需要审查，因此安装\
  \ Oracle 软件（二进制文件）是一项要求每位数据库管理员都熟练掌握的任务。现在，随着 Oracle 18c 乃至 12c 的推出，Oracle 软件安装已变得更加自动化，但理解安装的步骤和配置对于数据库管理员来说仍然很重要。对于大型环境，Oracle\
  \ 二进制文件的安装应该是可重复的，数据库管理员需要设置安装程序，以便能够按需并一致地配置数据库。\n\n\n\n#### 提示\n\nDBA 的职责正在发生变化。在云环境中，DBA\
  \ 的任务可能是准备自助数据库，甚至可能不再需要安装 Oracle 二进制文件。此外，如果你对 Oracle 还比较陌生，那么安装过程中一些令人望而生畏的环节已经得到了简化。很可能另一位\
  \ DBA 已经安装了 Oracle 二进制文件，你只需要根据需要创建数据库即可。然而，理解安装的组成部分以及下一节“理解最佳灵活架构（OFA）”仍然很有价值。\n\
  \n许多 DBA 不使用自动化安装技术。有些人不了解这些方法；另一些人则认为它们不可靠。因此，大多数 DBA 通常使用 Oracle 通用安装程序 (OUI)\
  \ 的图形界面模式。虽然图形安装程序是一个好工具，但它本身不具备可重复性和自动化能力。运行图形安装程序是一个手动过程，期间你需要在多个屏幕上选择选项。即使你知道该选择哪些选项，仍然可能无意中点击了错误的选项。\n\
  \n当你进行远程安装且网络带宽不足时，图形安装程序也可能出现问题。在这种情况下，你可能会发现自己需要等待数十分钟，以便屏幕在本地重新绘制。你需要一种不同的技术来在远程服务器上进行高效安装。\n\
  \n本章重点介绍以高效且可重复的方式安装 Oracle 的技术。这包括依赖响应文件进行的静默安装。响应文件是一个文本文件，你在其中为控制安装的变量赋值。DBA\
  \ 们常常没有意识到使用响应文件所能实现的强大可重复性和效率。\n\n## 注意\n\n本章仅涵盖安装 Oracle 软件。创建数据库的任务在第 2 章中介绍。云环境也改变了软件和数据库创建的任务及观点，这将在本章后面的“在云中安装及\
  \ DBA 的职责”一节中讨论。\n\n## 理解 OFA\n\n在安装 Oracle 并开始创建数据库之前，你必须理解 Oracle 的最佳灵活架构 (OFA)\
  \ 标准。该标准被广泛用于指定一致的目录结构以及安装和创建 Oracle 数据库时使用的文件命名约定。\n\n## 注意\n\n这个无处不在的 OFA “标准”的一个讽刺之处在于，几乎每个\
  \ DBA 都会以某种方式对其进行定制，以适应其环境的独特需求。\n\nOFA 标准提供了在一致的基础上定位日志文件的方法。如果遵循了这些标准，由于环境间的一致性，安全性、迁移和自动化将更容易实施。日志文件的一致位置也允许被其他工具使用以及确保其安全。18c\
  \ 中的 `ORACLE_BASE` 目录提供了一种将 `ORACLE_HOME` 目录分离为只读目录，并将可写文件放在 `ORACLE_BASE` 中的方法。只读的\
  \ `ORACLE_HOME` 目录允许实施安装与配置的分离，这对于云环境和保护环境非常重要。这简化了修补过程，因为一个镜像可以用于大规模部署，并将补丁分发到许多服务器，减少了修补和更新\
  \ Oracle 软件的停机时间。\n\n由于大多数企业都实施了某种形式的 OFA 标准，理解这种结构至关重要。图 1-1 显示了 OFA 标准使用的目录结构和文件名。并非\
  \ Oracle 环境中的所有目录和文件都出现在此图中（没有足够的空间）。然而，关键且最常用的目录和文件都已显示。\n\n![../images/214899_3_En_1_Chapter/214899_3_En_1_Fig1_HTML.jpg](img/214899_3_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n\nOracle 的 OFA 标准\n\nOFA 标准包括几个你应该熟悉的目录：\n\n*   Oracle 清单目录\n*   Oracle\
  \ 基目录 (`ORACLE_BASE`)\n*   Oracle 主目录 (`ORACLE_HOME`)\n*   Oracle 网络文件目录 (`TNS_ADMIN`)\n\
  *   自动诊断库 (`ADR_HOME`)\n\n这些目录将在以下部分中讨论。\n\n### Oracle 清单目录\n\nOracle 清单目录存储服务器上安装的\
  \ Oracle 软件的清单。此目录是必需的，并在服务器上所有 Oracle 软件安装之间共享。当你首次安装 Oracle 时，安装程序会检查是否存在格式为 `/u[01–09]/app`\
  \ 的现有符合 OFA 的目录结构。如果存在这样的目录，则安装程序会创建一个 Oracle 清单目录，例如：\n\n```\n/u01/app/oraInventory\n\
  ```\n\n如果为 `oracle` 操作系统 (OS) 用户定义了 `ORACLE_BASE` 变量，则安装程序会为 Oracle 清单的位置创建一个目录，如下所示：\n\
  \n```\nORACLE_BASE/../oraInventory\n```\n\n例如，如果 `ORACLE_BASE` 定义为 `/ora01/app/oracle`，则安装程序将\
  \ Oracle 清单的位置定义为：\n\n```\n/ora01/app/oraInventory\n```\n\n如果安装程序找不到可识别的符合 OFA 的目录结构或\
  \ `ORACLE_BASE` 变量，则 Oracle 清单的位置将在 `oracle` 用户的 `HOME` 目录下创建。例如，如果 `HOME` 目录是 `/home/oracle`，则\
  \ Oracle 清单的位置是：\n\n```\n/home/oracle/oraInventory\n```\n\n### Oracle 基目录\n\nOracle\
  \ 基目录是 Oracle 软件安装的最高级目录。你可以在此目录下安装一个或多个版本的 Oracle 软件。Oracle 基目录的 OFA 标准如下：\n\n\
  ```\n/<mount_point>/app/<software_owner>\n```\n\n挂载点的典型名称包括 `/u01`、`/ora01`、`/oracle`\
  \ 和 `/oracle01`。你可以根据环境的标准为挂载点命名。我更喜欢使用诸如 `/ora01` 之类的挂载点名称。它很短，当我查看数据库服务器上的挂载点时，我可以立即分辨出哪些用于\
  \ Oracle 数据库。此外，较短的挂载点名称在通过操作系统命令浏览目录时更容易输入。\n\n软件所有者通常名为 `oracle`。这是你用来安装 Oracle\
  \ 软件（二进制文件）的 OS 用户。下面列出了一个完整形成的 Oracle 基目录路径示例：\n\n```\n/u01/app/oracle\n```\n\n\
  ### Oracle 主目录\n\nOracle 主目录定义了特定产品的软件安装位置，例如 Oracle Database 18c 或 Oracle Database\
  \ 12c。你必须将不同产品或产品的不同版本安装在单独的 Oracle 主目录中。推荐的符合 OFA 的 Oracle 主目录如下：\n\n```\nORACLE_BASE/product/<version>/<install_name>\n\
  ```\n\n在前面的代码行中，可能的版本包括 `18.1.0.1` 和 `12.2.0.1`。可能的 `install_name` 值包括 `db_1`、`devdb1`、`test2`\
  \ 和 `prod1`。以下是 18c 数据库的 Oracle 主目录名称示例：\n\n```\n/u01/app/oracle/product/18.1.0.1/dbhome_1/db1\n\
  ```\n\n## 注意\n\n一些 DBA 不喜欢 `ORACLE_HOME` 目录末尾的 `db1` 字符串，认为没有必要。`db1` 存在的原因是，你可能有两个独立的二进制安装：一个开发安装和一个测试安装。如果你的环境不需要这种配置，可以随意去掉额外的字符串（`db1`）。\n\
  \n\n\n## Oracle 网络文件目录\n\n一些 Oracle 工具使用`TNS_ADMIN`的值来定位网络配置文件。该目录定义为`ORACLE_HOME/network/admin`。它通常包含\
  \ Oracle Net 的`tnsnames.ora`和`listener.ora`文件。`listener.ora`文件现在通常随 Oracle Grid\
  \ 安装，而不是在数据库主目录中。监听器通常由管理网格、集群和 ASM 软件的系统维护。`tnsnames`提供了连接到其他数据库的方法，因此这些文件是集中目录的一部分，或是数据库网络文件的一部分。\n\
  \n#### 提示\n\n有时 DBA 会将`TNS_ADMIN`设置为指向一个中央目录位置（如`/etc`或`/var/opt/oracle`）。这使他们能够维护一套\
  \ Oracle 网络文件（而不是为每个`ORACLE_HOME`维护一套）。这种方法还有一个优点，就是在数据库升级（可能会改变`ORACLE_HOME`的位置）时，不需要复制或移动文件。\n\
  \n## 自动诊断存储库\n\n从 Oracle Database 11g 开始，`ADR_HOME`目录指定了与 Oracle 相关的诊断文件的位置。这些文件对于排查\
  \ Oracle 数据库问题至关重要。该目录定义为`ORACLE_BASE/diag/rdbms/lower(db_unique_name)/instance_name`。你可以查询`V$PARAMETER`视图以获取`db_unique_name`和`instance_name`的值。\n\
  \n例如，在下一行中，小写的数据库唯一名是`db18c`，实例名是`DB18C`：\n\n```\n/u01/app/oracle/diag/rdbms/db18c/DB18C\n\
  ```\n\n或者在集群环境中，小写的数据库唯一名是`db18c`，实例名是`DB18C01`：\n\n```\n/u01/app/oracle/diag/rdbms/db18c/DB18C01\n\
  ```\n\n你可以通过此查询验证`ADR_HOME`目录的位置：\n\n```\nSQL> select value from v$diag_info where\
  \ name='ADR Home';\n```\n\n以下是一些示例输出：\n\n```\nVALUE\n\n/u01/app/oracle/diag/rdbms/db18c/DB18C\n\
  ```\n\n现在你了解了 OFA 标准，接下来你将看到在安装 Oracle 二进制文件时如何使用它。例如，在运行 Oracle 安装程序时，你需要为`ORACLE_BASE`和`ORACLE_HOME`目录指定目录值。\n\
  \n#### 提示\n\n有关 OFA 的完整详情，请参阅*Oracle Database Installation Guide*。该文档可以从 Oracle\
  \ 网站的技术网络区域免费下载（[`http://otn.oracle.com`](http://otn.oracle.com)）。\n\n## 安装 Oracle\n\
  \n假设你是新来的，你的经理问你在服务器上安装一套新的 Oracle Database 18c 软件需要多长时间。你回答说不到一个小时。你的老板表示怀疑，并说之前的\
  \ DBA 总是估计至少需要一天时间在新服务器上安装 Oracle 二进制文件。你回答：“其实没那么复杂，但 DBA 们确实倾向于高估安装时间，因为很难预料所有可能出错的事情。”\n\
  \n当你拿到一台新服务器并被分配安装 Oracle 二进制文件的任务时，这通常指的是在创建 Oracle 数据库之前，下载和安装所需软件的过程。此过程涉及几个步骤：\n\
  \n1.  创建适当的操作系统组。在 Oracle Database 18c 中，有几个你可以创建并使用的操作系统组来管理`SYSDBA`权限的粒度级别。至少，你需要创建一个操作系统`dba`组和操作系统`oracle`用户。\n\
  2.  确保操作系统已为 Oracle 数据库进行充分配置。\n3.  从 Oracle 获取数据库安装软件。\n4.  解压数据库安装软件。\n5.  如果在首次在服务器上安装\
  \ Oracle 软件时使用静默安装程序，请创建一个`oraInst.loc`文件。此步骤每个服务器只需执行一次。后续安装不需要执行此步骤。\n6.  配置响应文件并运行\
  \ Oracle 静默安装程序。\n7.  对任何问题进行故障排除。\n8.  应用任何额外的补丁。\n\n这些步骤将在以下小节中详细说明。\n\n## 注意\n\
  \nOracle 指定的任何基础版本（10.1.0.2、10.2.0.1、11.1.0.6、11.2.0.1、12.1.0.1、18.1.0.1 等）的数据库都可以从\
  \ Oracle 网站的技术网络区域（[`http://otn.oracle.com`](http://otn.oracle.com)）免费下载。但是，请注意，任何后续补丁的下载都需要购买许可。换句话说，下载基础软件需要\
  \ Oracle 技术网络（OTN）登录（免费），而下载补丁集则需要 My Oracle Support 账户（收费）。\n\n### 步骤 1. 创建操作系统组和用户\n\
  \n如果你所在的机构有系统管理员（SA），那么步骤 1 和 2 通常由 SA 执行。如果你没有 SA，那么你必须自己执行这些步骤（这在小型机构中很常见，你可能需要执行许多不同的工作职能）。你需要`root`访问权限来完成这些步骤。\n\
  \n过去，典型的 Oracle 安装包含一个操作系统组（`dba`）和一个操作系统用户（`oracle`）。你仍然可以使用这种极简的、一组一用户的方法安装 Oracle\
  \ 软件；它工作正常。如果你的机构只有一名 DBA，并且你不需要在团队成员之间进行更精细的权限划分，那么尽管去创建`dba`组和`oracle`操作系统用户。这种方法没有任何问题。\n\
  \n如今，Oracle 建议你创建多个操作系统组——其思想是你可以根据工作职能的需要，添加不同的操作系统用户并将他们分配到组中。当一个操作系统用户被分配到一个组时，该分配会为用户提供特定的数据库权限。表\
  \ 1-1 记录了操作系统组以及每个组如何映射到相应的数据库权限。例如，如果你有一个用户只负责监控数据库，并且只需要启动和关闭数据库的权限，那么该用户将被分配到`oper`组（这确保后续可以以`sysoper`权限连接到数据库）。\n\
  \n**表 1-1**\n操作系统组与备份恢复相关权限的映射\n\n| **操作系统组** | **数据库系统权限** | **授权操作** | **引用位置**\
  \ |\n| --- | --- | --- | --- |\n| `oinstall` | 无 | 安装和升级 Oracle 二进制文件的操作系统权限 | `oraInst.loc`文件中的`inst_group`变量；也由响应文件中的`UNIX_GROUP_NAME`变量定义\
  \ |\n| `dba` | `sysdba` | 所有数据库权限：启动、关闭、修改数据库、创建和删除数据库、切换归档日志模式、备份和恢复数据库 | 响应文件中的`DBA_GROUP`变量或在\
  \ OUI 图形安装程序提示时 |\n| `oper` | `sysoper` | 启动、关闭、修改数据库、切换归档日志模式、备份和恢复数据库 | 响应文件中的`OPER_GROUP`变量或在\
  \ OUI 图形安装程序提示时 |\n| `asmdba` | `sysdba for asm` | Oracle 自动存储管理（ASM）实例的管理权限 | 不适用\
  \ |\n| `asmoper` | `sysoper for asm` | 启动和停止 Oracle ASM 实例 | 不适用 |\n| `asmadmin`\
  \ | `sysasm` | 磁盘组的挂载和卸载以及其他存储管理 | 不适用 |\n| `backupdba` | `sysbackup` | 12c 新增；允许用户启动、关闭以及执行所有备份和恢复操作的权限\
  \ | 响应文件中的`BACKUPDBA_GROUP`变量或在 OUI 图形安装程序提示时 |\n| `dgdba` | `sysdg` | 12c 新增；与管理\
  \ Data Guard 环境相关的权限 | 响应文件中的`DGDBA_GROUP`变量或在 OUI 图形安装程序提示时 |\n| `kmdba` | `syskm`\
  \ | 12c 新增；与加密管理相关的权限 | 响应文件中的`KMDBA_GROUP`变量或在 OUI 图形安装程序提示时 |\n\n\n\n### Oracle\
  \ 数据库安装前的系统准备\n\n表 1-1 包含推荐的组名。您不一定必须使用列出的组名；可以根据您的需求进行调整。例如，如果您有两组独立的用户共用同一台服务器，您可能希望创建两个独立的\
  \ Oracle 安装，分别由不同的 DBA 管理；开发 DBA 组可以使用名为 `dbadev` 的组来创建和安装 Oracle 二进制文件，而使用同一台机器的测试组可能安装另一套由\
  \ `dbatest` 组管理的 Oracle 二进制文件。每组仅拥有操作其对应二进制文件的权限。或者，如前所述，您也可以决定只为所有操作使用一个组 (`dba`)。这完全取决于您的环境。\n\
  \n一旦决定了需要哪些组，您就需要获取 `root` 用户权限来运行 `groupadd` 命令。以 `root` 身份，添加您需要的操作系统组。这里，我添加三个预估需要的组：\n\
  \n```\n#### groupadd oinstall\n#### groupadd dba\n#### groupadd oper\n```\n\n如果您无法访问\
  \ `root` 帐户，那么您需要请您的系统管理员（SA）运行上述命令。您可以通过检查 `/etc/group` 文件的内容来验证每个组是否已成功添加。以下是\
  \ `/etc/group` 文件中创建的典型条目：\n\n```\noinstall:x:500:\ndba:x:501:\noper:x:502:\n```\n\
  \n现在，创建 `oracle` 操作系统用户。以下示例显式地将组 ID 设置为 500（您的公司可能要求所有安装使用相同的组 ID），将主组设为 `oinstall`，并将\
  \ `dba` 和 `oper` 组分配给新创建的 `oracle` 用户：\n\n```\n#### useradd -u 500 -g oinstall -G\
  \ dba,oper oracle\n```\n\n您可以通过查看 `/etc/passwd` 文件来验证用户帐户信息。以下是 `oracle` 用户的预期条目：\n\
  \n```\noracle:x:500:500::/home/oracle:/bin/bash\n```\n\n如果您需要修改一个组，请以 `root` 身份使用\
  \ `groupmod` 命令。如果出于任何原因需要删除一个组（以 `root` 身份），请使用 `groupdel` 命令。\n\n如果您需要修改一个用户，请以\
  \ `root` 身份使用 `usermod` 命令。如果您需要删除一个操作系统用户，请使用 `userdel` 命令。运行 `userdel` 命令需要 `root`\
  \ 权限。此示例从服务器中移除 `oracle` 用户：\n\n```\n#### userdel oracle\n```\n\n### 步骤 2. 确保操作系统配置充分\n\
  \n此步骤相关的任务因数据库版本和操作系统的不同而有所差异。您必须查阅针对数据库版本和操作系统供应商的 Oracle 安装手册以获取确切要求。执行此步骤需要验证和配置以下操作系统组件：\n\
  \n*   内存和交换空间\n*   系统架构（处理器）\n*   可用磁盘空间（Oracle 现在安装几乎需要 5GB 空间）\n*   操作系统版本和内核\n\
  *   操作系统软件（所需的软件包和补丁）\n\n在 Linux 服务器上运行以下命令确认内存大小：\n\n```\n$ grep MemTotal /proc/meminfo\n\
  ```\n\n要验证内存和交换空间的总量，请运行以下命令：\n\n```\n$ free -t\n```\n\n要验证 `/tmp` 目录的空间量，请输入此命令：\n\
  \n```\n$ df -h /tmp\n```\n\n要显示可用磁盘空间量，请执行此命令：\n\n```\n$ df -h\n```\n\n要验证操作系统版本，请输入此命令：\n\
  \n```\n$ cat /proc/version\n```\n\n要验证内核信息，请运行以下命令：\n\n```\n$ uname -r\n```\n\n\
  要确定是否已安装所需的软件包，请执行此查询，并提供所需的软件包名称：\n\n```\n$ rpm -q \n```\n\n再次强调，数据库服务器的要求因操作系统和数据库版本差异很大。您可以从\
  \ Oracle 网站的文档页面 ([`www.oracle.com/documentation`](http://www.oracle.com/documentation))\
  \ 下载特定的安装手册。\n\n## 注意\n\nOUI（Oracle Universal Installer）会显示操作系统软件和硬件的任何不足。运行安装程序将在步骤\
  \ 6 中介绍。\n\n### 步骤 3. 获取 Oracle 安装软件\n\n通常，获取 Oracle 软件最简单的方法是从 Oracle 网站下载。导航到软件下载页面\
  \ ([`www.oracle.com/technology/software`](http://www.oracle.com/technology/software))，并下载适合您计划安装它的操作系统和硬件类型（Linux、Solaris、Windows\
  \ 等）的 Oracle 数据库版本。\n\n### 步骤 4. 解压缩文件\n\n对于之前的版本，建议将文件解压缩到可以放置 Oracle 安装介质的标准目录中。现在对于\
  \ Oracle 18c，介质的提供方式有所不同，可以基于映像或通过 RPM。映像软件现在必须解压到 `ORACLE_HOME` 目录中。压缩文件可以放在临时目录中，但必须解压到\
  \ `ORACLE_HOME`。`runInstaller` 将从 `ORACLE_HOME` 目录运行以进行安装。\n\n为 `ORACLE_HOME` 创建目录：\n\
  \n```\n$ mkdir -p /u01/app/oracle/product/18.1.0/dbhome_1\n$ chown oracle:oinstall\
  \ /u01/app/oracle/product/18.1.0/dbhome_1\n```\n\n可以将 zip 文件下载或复制到临时目录，例如 `/tmp`\
  \ 或 `/home/oracle`。\n\n使用 `unzip` 命令解压到新创建的 `ORACLE_HOME` 目录：\n\n```\n$ cd /u01/app/oracle/product/18.1.0/dbhome_1\n\
  $ unzip -q /tmp/db_home.zip\n```\n\n现在可以使用 RPM 与 Oracle 18c 来执行单数据库实例的安装。RPM 以前用作预安装检查，现在可用于安装，甚至适用于\
  \ Oracle 客户端。这需要以 `root` 身份执行。\n\n```\n$ yum -y install oracle-database-server-18c-preinstall\n\
  $ ls -lt /opt\n$ chown -R oracle:oinstall /opt\n```\n\n现在进入 rpm 的目录并运行命令执行基于 RPM\
  \ 的安装。`ORACLE_HOME` 目录将在 `/opt/oracle/product/18.1.0.0.0-1/dbhome_1` 创建。\n\n```\n\
  $ cd /tmp/rpm\n$ rpm -ivh oracle-ee-db-18.1.0.0.0-1.x86_64.rpm  -- rpm 名称可能因版本而异\n\
  ```\n\n#### 提示\n\n在某些早期版本的 Oracle 安装中，您可能会发现分发文件是作为压缩的 `cpio` 文件提供的。您可以使用一个命令解压缩和解包该文件，如下所示：\n\
  \n```\n$ cat 10gr2_db_sol.cpio.gz | gunzip | cpio -idvm\n```\n\n\n#### 第 5 步：创建\
  \ oraInst.loc 文件\n\n如果您的服务器上已经存在 `oraInst.loc` 文件，则可以跳过此步骤。创建 `oraInst.loc` 文件仅在首次使用静默安装方法在服务器上安装二进制文件时才需要执行。如果您使用\
  \ `OUI` 图形安装程序，则 `oraInst.loc` 文件会自动为您创建。\n\n在 Linux 服务器上，`oraInst.loc` 文件通常位于 `/etc`\
  \ 目录中。在其他 Unix 系统（如 `Solaris`）上，此文件位于 `/var/opt/oracle` 目录中。`oraInst.loc` 文件包含以下信息：\n\
  \n*   Oracle 清单目录路径\n*   拥有安装和升级 Oracle 软件权限的操作系统组名称\n\nOracle 清单目录路径是用于管理 Oracle\
  \ 安装和升级的相关文件的存储位置。通常，每个主机有一个 Oracle 清单。在此目录结构中包含 `inventory.xml` 文件，该文件记录了服务器上安装的各种\
  \ Oracle 版本的位置。\n\nOracle 清单操作系统组拥有安装和升级 Oracle 软件所需的操作系统权限。Oracle 建议您将此组命名为 `oinstall`。您会发现有时\
  \ DBA 会将清单组分配给 `dba` 组。如果您的环境不需要单独的组（如 `oinstall`），那么使用 `dba` 组也可以。\n\n您可以使用 `vi`\
  \ 等实用程序创建 `oraInst.loc` 文件。以下是该文件中的一些示例条目：\n```\ninventory_loc=/u01/app/oraInventory\n\
  inst_group=oinstall\n```\n\n以 `root` 用户身份，确保响应文件的所有者为 `oracle` 操作系统用户，并且具有适当的文件访问权限：\n\
  ```\n#### chown oracle:oinstall oraInst.loc\n#### chmod 664 oraInst.loc\n```\n\n\
  #### 第 6 步：配置响应文件并运行安装程序\n\n您可以在两种模式之一运行 `OUI`：图形模式或静默模式。通常，DBA 使用图形安装程序。然而，我强烈倾向于使用静默安装选项，原因如下：\n\
  \n*   静默安装不需要 `X Window System` 软件的可用性。\n*   您可以避免远程图形安装的性能问题，这在尝试在本地绘制屏幕时可能非常缓慢。\n\
  *   静默安装可以编写脚本并实现自动化。这意味着无论由哪位团队成员执行安装，每次安装都可以按照相同、一致的标准进行（我甚至让 `SA` 这样安装 Oracle\
  \ 二进制文件）。\n\n执行静默安装的关键是使用响应文件。\n\n解压缩 Oracle 软件后，导航到 `ORACLE_HOME` 目录；例如，\n```\n\
  $ cd /u01/app/oracle/product/18.1.0/dbhome_1\n```\n\n接下来，查找 Oracle 提供的示例响应文件：\n\
  ```\n$ find . -name \"*.rsp\"\n```\n\n根据 Oracle 版本和操作系统平台，您找到的响应文件名称和数量可能大不相同。接下来的两节展示了两种场景：Oracle\
  \ Database 12c 第 1 版静默安装和 Oracle Database 18c 第 1 版静默安装。\n\n请记住，响应文件的格式可能因 Oracle\
  \ 数据库版本的不同而有很大差异。例如，Oracle Database 11g 和 12c 之间甚至在这些版本的第 2 版之间也存在重大差异。安装新版本时，您必须检查响应文件并确定必须设置哪些参数。请务必根据您的环境修改相应的参数。如果您不确定\
  \ `ORACLE_HOME` 和 `ORACLE_BASE` 的值应设置为何值，请参阅本章前面的“理解最佳灵活架构”部分，了解 `OFA` 标准目录的描述。\n\
  \n这些参数有时存在特定于某个版本的特性。例如，如果您不想指定您的 My Oracle Support (`MOS`) 登录信息，则需要按如下方式设置参数：\n\
  ```\nDECLINE_SECURITY_UPDATES=true\n```\n\n如果您未将 `DECLINE_SECURITY_UPDATES` 设置为\
  \ `TRUE`，则系统将要求您提供 `MOS` 登录信息。未能这样做将导致安装失败。配置好响应文件后，您可以在静默模式下运行 Oracle 安装程序。请注意，您必须输入响应文件位置的完整目录路径。\n\
  \n**注意**\n在 Windows 上，`setup.exe` 命令等同于 Linux/Unix 上的 `runInstaller` 命令。\n\n如果您在安装过程中遇到错误，可以查看相关的日志文件。每次尝试运行安装程序时，它都会创建一个具有唯一名称（包含时间戳）的日志文件。日志文件位于\
  \ `oraInventory/logs` 目录中。您可以在 `OUI` 写入日志文件时，将输出流式传输到您的屏幕：\n```\n$ tail -f \n```\n\
  \n以下是一个日志文件名示例：\n```\ninstallActions2012-04-33 11-42-52AM.log\n```\n\n##### Oracle\
  \ Database 12c 第 1 版场景\n\n导航到 `database` 目录并发出 `find` 命令以定位示例响应文件。以下是 Oracle Database\
  \ 12c 第 1 版在 Linux 服务器上提供的响应文件：\n```\n$ find . -name \"*.rsp\"\n./response/db_install.rsp\n\
  ./response/netca.rsp\n./response/dbca.rsp\n```\n\n复制其中一个响应文件以便修改。此示例将 `db_install.rsp`\
  \ 文件复制到当前工作目录，并将文件命名为 `inst.rsp`：\n```\n$ cp response/db_install.rsp inst.rsp\n\
  ```\n\n修改 `inst.rsp` 文件。以下是 Oracle Database 12c 第 1 版响应文件的部分列表（前两行实际上是一行代码，但为了适应页面而放在了两行）。这些代码行是我唯一修改过的变量。我删除了注释，以便您更清楚地看到修改了哪些变量：\n\
  ```\noracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v12.1.0\n\
  oracle.install.option=INSTALL_DB_SWONLY\nORACLE_HOSTNAME=oraserv1\nUNIX_GROUP_NAME=oinstall\n\
  INVENTORY_LOCATION=/home/oracle/orainst/12.1.0.1/database/stage/products.xml\nSELECTED_LANGUAGES=en\n\
  ORACLE_HOME=/u01/app/oracle/product/12.1.0.1/db_1\nORACLE_BASE=/u01/app/oracle\n\
  oracle.install.db.InstallEdition=EE\noracle.install.db.DBA_GROUP=dba\noracle.install.db.OPER_GROUP=oper\n\
  oracle.install.db.BACKUPDBA_GROUP=dba\noracle.install.db.DGDBA_GROUP=dba\noracle.install.db.KMDBA_GROUP=dba\n\
  DECLINE_SECURITY_UPDATES=true\n```\n\n请务必根据您的环境修改相应的参数。如果您不确定 `ORACLE_HOME` 和 `ORACLE_BASE`\
  \ 的值应设置为何值，请参阅本章前面的“理解最佳灵活架构”部分，了解 `OFA` 标准目录的描述。\n\n配置好响应文件后，您可以在静默模式下运行 Oracle\
  \ 安装程序。请注意，您必须输入响应文件位置的完整目录路径：\n```\n$ ./runInstaller -ignoreSysPrereqs -force -silent\
  \ -responseFile \\\n/home/oracle/orainst/12.1.0.1/database/inst.rsp\n```\n\n前面的命令分两行输入。第一行通过反斜杠\
  \ (`\\`) 续接到第二行。\n\n如果您在安装过程中遇到错误，可以查看相关的日志文件。每次尝试运行安装程序时，它都会创建一个具有唯一名称（包含时间戳）的日志文件。日志文件创建在\
  \ `oraInventory/logs` 目录中。您可以在 `OUI` 写入日志文件时，将输出流式传输到您的屏幕：\n```\n$ tail -f \n```\n\
  \n以下是一个日志文件名示例：\n```\ninstallActions2012-11-04_02-57-29PM.log\n```\n\n如果一切运行成功，输出中会通知您需要以\
  \ `root` 用户身份运行 `root.sh` 脚本：\n```\n/u01/app/oracle/product/12.1.0.1/db_1/root.sh\n\
  ```\n\n以 `root` 操作系统用户身份运行 `root.sh` 脚本。然后，您应该能够创建 Oracle 数据库（数据库创建在第 2 章中介绍）。\n\
  \n\n##### Oracle Database 18c Release 1 场景示例\n\n导航至 `database` 目录并使用 `find` 命令查找示例响应文件。以下是\
  \ Oracle Database 18c Release 1 在 Linux 服务器上提供的响应文件：\n\n```bash\n$ find . -name\
  \ \"*.rsp\"\n./response/db_install.rsp\n./response/netca.rsp\n./response/dbca.rsp\n\
  ```\n\n复制其中一个响应文件以便修改。本例将 `db_install.rsp` 文件复制到当前工作目录并重命名为 `inst.rsp`：\n\n```bash\n\
  $ cp response/db_install.rsp inst.rsp\n```\n\n修改 `inst.rsp` 文件。以下是 Oracle Database\
  \ 18c Release 1 响应文件的部分内容（前两行实际是一行代码，为适应页面分为两行显示）。以下代码行是我唯一修改的变量。我移除了注释，以便您更清楚地看到哪些变量被修改：\n\
  \n```\noracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v18.0.0\n\
  oracle.install.option=INSTALL_DB_SWONLY\nORACLE_HOSTNAME=oraserv1\nUNIX_GROUP_NAME=oinstall\n\
  INVENTORY_LOCATION=/home/oracle/orainst/18.1.0.1/database/stage/products.xml\nSELECTED_LANGUAGES=en\n\
  ORACLE_HOME=/u01/app/oracle/product/18.1.0.1/db_1\nORACLE_BASE=/u01/app/oracle\n\
  oracle.install.db.InstallEdition=EE\noracle.install.db.DBA_GROUP=dba\noracle.install.db.OPER_GROUP=oper\n\
  oracle.install.db.BACKUPDBA_GROUP=dba\noracle.install.db.DGDBA_GROUP=dba\noracle.install.db.KMDBA_GROUP=dba\n\
  DECLINE_SECURITY_UPDATES=true\n```\n\n请务必根据您的环境修改相应的参数。如果您不确定 `ORACLE_HOME` 和 `ORACLE_BASE`\
  \ 的值应设置为何值，请参阅本章前面的“理解最佳灵活架构”部分，了解 OFA 标准目录的描述。\n\n配置好响应文件后，您可以以静默模式运行 Oracle 安装程序。请注意，您必须输入响应文件位置的完整目录路径：\n\
  \n```bash\n$ ./runInstaller -ignoreSysPrereqs -force -silent -responseFile \\\n\
  /home/oracle/orainst/18.1.0.1/database/inst.rsp\n```\n\n上述命令分两行输入。第一行通过反斜杠 (`\\\
  `) 连接到第二行。\n\n如果在安装过程中遇到错误，您可以查看相关的日志文件。每次尝试运行安装程序时，它都会创建一个包含时间戳的唯一名称的日志文件。日志文件创建在\
  \ `oraInventory/logs` 目录中。当 OUI 写入日志时，您可以将其输出流式传输到屏幕上：\n\n```bash\n$ tail -f\n```\n\
  \n以下是日志文件名的示例：\n\n```\ninstallActions2017-11-04_02-57-29PM.log\n```\n\n如果一切运行成功，输出中会通知您需要以\
  \ `root` 用户身份运行 `root.sh` 脚本：\n\n```bash\n/u01/app/oracle/product/18.1.0.1/db_1/root.sh\n\
  ```\n\n以 `root` 操作系统用户身份运行 `root.sh` 脚本。然后，您应该就能创建 Oracle 数据库了（数据库创建将在第 2 章介绍）。配置助手可以在响应文件或静默模式下运行，以执行网络配置和数据库配置助手。\n\
  \n### 步骤 7. 排查任何问题\n\n如果在使用响应文件时遇到错误，90% 的情况是由于文件中变量设置方式有问题。请仔细检查这些变量并确保它们设置正确。此外，如果您没有完全指定响应文件的命令行路径，您会收到类似以下错误：\n\
  \n```\nOUI-10203: The specified response file ... is not found.\n```\n\n当响应文件的路径或名称指定错误时，另一个常见错误如下：\n\
  \n```\nOUI-10202: No response file is specified for this session.\n```\n\n接下来列出的是，如果您在响应文件的\
  \ `FROM_LOCATION` 变量中输入了错误的 `products.xml` 文件路径时会收到的错误消息：\n\n```\nOUI-10133: Invalid\
  \ staging area\n```\n\n此外，请确保在运行响应文件时提供正确的命令行语法。如果您错误指定或拼错了某个选项，您可能会收到误导性的错误消息，例如\
  \ `DISPLAY not set`。使用响应文件时，您无需设置 `DISPLAY` 变量。此消息令人困惑，因为在此场景中，错误是由错误指定的命令行选项引起的，与\
  \ `DISPLAY` 变量无关。请检查从命令行输入的所有选项，确保您没有拼错选项。\n\n当您指定了 `ORACLE_HOME`，而静默安装“认为”给定的主目录已存在时，也可能出现问题：\n\
  \n```\nCheck complete: Failed <<<<\nRecommendation: Choose a new Oracle Home for\
  \ installing this product.\n```\n\n检查您的 `inventory.xml` 文件（位于 `oraInventory/ContentsXML`\
  \ 目录中），确保与现有 Oracle 主目录名称没有冲突。\n\n安装过程中会生成日志文件，以及作为清单一部分的文件。`/tmp` 目录将包含基于安装执行时间戳的日志文件。在尝试排查问题时，请确保检查所有日志文件；即使在过程中遇到进程或内存问题，系统日志也很有用。当您对\
  \ Oracle 安装问题进行故障排除时，请记住安装程序使用两个关键文件来跟踪已安装的软件及其位置：`oraInst.loc` 和 `inventory.xml`。表\
  \ 1-2 描述了 Oracle 安装程序使用的文件。\n\n#### 表 1-2\n用于排查 Oracle 安装问题的有用文件\n\n| 文件名 | 目录位置\
  \ | 内容 |\n| --- | --- | --- |\n| `oraInst.loc` | 此文件的位置因操作系统而异。在 Linux 上，文件位于 `/etc`；在\
  \ Solaris 上，位于 `/var/opt/oracle`。 | `oraInventory` 目录位置和安装操作系统组 |\n| `inst.loc`\
  \ | `\\\\HKEY_LOCAL_MACHINE\\\\Software\\Oracle` (Windows 注册表) | 清单信息 |\n| `inventory.xml`\
  \ | `oraInventory/ContentsXML/inventory.xml` | Oracle 主目录名称及相应的目录位置 |\n| `.log`\
  \ 文件 | `oraInventory/logs` | 安装日志文件，对于故障排除极其有用 |\n\n### 步骤 8. 应用任何额外的补丁\n\n正如第一步之前所述，Oracle\
  \ 软件在基础发行版中可用。但是，如果有额外的发行版、补丁集和安全补丁可用，则应在推出新的 Oracle 二进制文件之前全部应用。安装在服务器或环境中的原因可能不同，但安装应与其他环境相同，安全补丁可能例外。\n\
  \n本章后面的“升级 Oracle 软件”和“应用临时补丁”部分详细介绍了如何应用补丁，但在此步骤中确保在软件投入使用前达到最新版本非常重要。在二进制文件安装完成后，是确保所有内容已更新并准备好创建数据库的绝佳时机。\n\
  \n\n\n\n## 通过复制现有安装进行安装\n\n数据库管理员有时会使用诸如 `tar` 之类的实用程序，通过复制 Oracle 二进制文件的现有安装到另一台服务器（或同一服务器上的不同位置）来安装\
  \ Oracle 软件。这种方法快速而简单（尤其是与下载并运行 Oracle 安装程序相比）。该技术允许数据库管理员轻松地在多台服务器上安装 Oracle 软件，同时确保每次安装都完全相同。\n\
  \n交付媒体文件的新方式提供了在 `ORACLE_HOME` 目录中解压缩的方法，或者直接运行 `rpm` 软件包来进行安装。使用此方法的优势在于能够复制一组已打补丁的二进制文件。在将文件复制为静态副本期间，不得有任何数据库或\
  \ Oracle 进程正在运行。\n\n使用现有的二进制文件副本来安装 Oracle 是一个两步过程：\n\n1.  使用操作系统实用程序复制二进制文件。\n\
  2.  附加 Oracle 主目录。\n\n这些步骤将在接下来的两节中详细介绍。\n\n#### 提示\n\n有关如何克隆现有 Oracle 安装的说明，请参阅\
  \ MOS 注释 300062.1。\n\n### 步骤 1：使用操作系统实用程序复制二进制文件\n\n您可以使用任何操作系统复制实用程序来执行此步骤。Linux/Unix\
  \ 的 `tar`、`scp` 和 `rsync` 实用程序是数据库管理员常用的文件复制工具。此示例展示了如何使用 Linux/Unix 的 `tar` 实用程序将一组现有的\
  \ Oracle 二进制文件复制到另一台服务器。首先，定位您要复制的目标 Oracle 主目录二进制文件：\n\n```bash\n$ echo $ORACLE_HOME\n\
  /ora01/app/oracle/product/18.1.0.1/db_1\n```\n\n在此示例中，`tar` 实用程序复制 `db_1` 目录内或其下的所有文件和子目录：\n\
  \n```bash\n$ cd $ORACLE_HOME\n$ cd ..\n$ tar -cvf orahome.tar db_1\n```\n\n现在，将\
  \ `orahome.tar` 文件复制到您要在其上安装 Oracle 软件的服务器。在此示例中，tar 文件被复制到另一台服务器上的 `/u01/app/oracle/product/18.1.0.1`\
  \ 目录中。tar 文件在该目录下被提取，并作为提取过程的一部分创建一个 `db_1` 目录：\n\n```bash\n$ cd /u01/app/oracle/product/18.1.0.1\n\
  ```\n\n确保您有足够的磁盘空间来提取文件。典型的 Oracle 安装至少会占用 3-4GB 的空间。使用 Linux/Unix 的 `df` 命令验证您是否有足够的空间：\n\
  \n```bash\n$ df -h | sort\n```\n\n接下来，提取文件：\n\n```bash\n$ tar -xvf orahome.tar\n\
  ```\n\n`tar` 命令会将文件提取到 `/u01/app/oracle/product/18.1.0.1` 目录下的 `db_1` 目录中。\n\n####\
  \ 提示\n\n使用 `tar -tvf <tarfile_name>` 命令可以在不恢复文件的情况下预览哪些目录和文件将被恢复。\n\n下面列出了一个强大的单行组合命令，它允许您捆绑\
  \ Oracle 文件，将它们复制到远程服务器，并在远程进行提取：\n\n```bash\n$ tar -cvf -  | ssh  \"cd ; tar -xvf\
  \ -\"\n```\n\n例如，以下命令将 `dev_1` 目录中的所有内容复制到远程 `ora03` 服务器的 `/home/oracle` 目录：\n\n\
  ```bash\n$ tar -cvf - dev_1 | ssh ora03 \"cd /home/oracle; tar -xvf -\"\n```\n\n\
  ### 绝对路径与相对路径\n\n一些较旧的非 GNU 版本的 `tar` 在提取文件时会使用绝对路径。下一行代码展示了在创建归档文件时指定绝对路径的示例：\n\
  \n```bash\n$ tar -cvf orahome.tar /home/oracle\n```\n\n对非 GNU 版本的 `tar` 指定绝对路径可能是危险的。这些旧版本的\
  \ `tar` 会按照它们被复制时相同的目录和文件名来恢复内容。这意味着磁盘上先前存在的任何目录和文件名都会被覆盖。\n\n当使用旧版本的 `tar` 时，使用相对路径名要安全得多。此示例首先切换到\
  \ `/home` 目录，然后创建 `oracle` 目录的归档文件（相对于当前工作目录）：\n\n```bash\n$ cd /home\n$ tar -cvf\
  \ orahome.tar oracle\n```\n\n前面的示例使用了相对路径名。\n\n在大多数 Linux 系统上，您不必担心绝对路径与相对路径的问题。这是因为这些系统使用\
  \ GNU 版本的 `tar`。此版本会剥离前导斜杠 (`/`)，并将文件恢复到相对于您当前工作目录的位置。\n\n如果您不确定是否拥有 GNU 版本的 `tar`\
  \ 实用程序，请使用 `man tar` 命令。您也可以使用 `tar -tvf <tarfile name>` 命令来预览哪些目录和文件将被恢复到什么位置。\n\
  \n\n\n\n## 步骤 2. 附加 Oracle 主目录\n\n使用现有安装的副本来安装 Oracle 软件时存在一个问题：如果您后续尝试升级该软件，升级过程将会报错并中止。这是因为副本安装并未在\
  \ `oraInventory` 中注册。在升级通过副本安装的一组二进制文件之前，您必须先注册 Oracle 主目录，使其出现在 `inventory.xml`\
  \ 文件中。这称为附加 Oracle 主目录。\n\n要附加 Oracle 主目录，您需要知道服务器上 `oraInst.loc` 文件的位置。在 Linux\
  \ 服务器上，此文件通常位于 `/etc` 目录。在 Solaris 上，此文件通常可以在 `/var/opt/oracle` 目录中找到。\n\n定位到 `oraInst.loc`\
  \ 文件后，导航至 `ORACLE_HOME/oui/bin` 目录（在您从副本安装 Oracle 二进制文件的服务器上）：\n\n```\n$ cd $ORACLE_HOME/oui/bin\n\
  ```\n\n现在，通过运行 `runInstaller` 实用程序来附加 Oracle 主目录，如下所示：\n\n```\n$ ./runInstaller\
  \ -silent -attachHome -invPtrLoc /etc/oraInst.loc \\\nORACLE_HOME=\"/u01/app/oracle/product/18.1.0.1/db_1\"\
  \ ORACLE_HOME_NAME=\"ONEW\"\n```\n\n如果成功，您应该在输出的最后看到这条消息：\n\n```\n'AttachHome' was\
  \ successful.\n```\n\n您也可以检查 `oraInventory/ContentsXML/inventory.xml` 文件的内容。以下是由于运行带有\
  \ `attachHome` 选项的 `runInstaller` 实用程序而插入到 `inventory.xml` 文件中的一行内容片段：\n\n## 安装只读\
  \ Oracle 主目录\n\nOracle 18c 的一个新特性是为二进制文件提供只读的 Oracle 主目录。数据库工具和进程将位于 `ORACLE_BASE`\
  \ 路径下，而不是 `ORACLE_HOME` 路径。`ORACLE_HOME` 目录将包含为创建的数据库准备的数据库配置和日志。\n\n只读的 Oracle\
  \ 二进制文件主目录将软件与数据库信息分离，并允许在多个部署之间共享软件。这使得二进制文件的无缝修补和更新成为可能，从而最大限度地减少了数据库停机时间，并允许将补丁应用到一个映像以分发到多台服务器。这种分离还简化了配置过程，因为可以专注于数据库配置。\n\
  \n现在有了额外的环境变量来包含 Oracle 主目录的目录路径，即 `ORACLE_BASE_HOME` 和 `ORACLE_BASE_CONFIG`。\n\n\
  要启用只读 Oracle 主目录，需要如前所述仅安装软件（二进制文件），而不安装配置助手。然后运行以下命令：\n\n```\n$ cd /u01/app/oracle/product/18.1.0.1/dbhome18c/bin\n\
  $ roohctl -enable\n```\n\n启用只读主目录后，可以运行 DBCA 来创建数据库。有一个检查可以了解数据库是否位于只读主目录中：\n\n\
  ```\n$ cd $ORACLE_HOME/bin\n$ ./orabasehome\n```\n\n如果返回一个目录，则表示 Oracle 主目录是只读的。\n\
  \n## 升级 Oracle 软件\n\n您也可以使用静默安装方法来升级 Oracle 软件的版本。首先从 MOS 网站 ([`http://support.oracle.com`](http://support.oracle.com))\
  \ 下载升级版本（您需要有效的支持合同才能执行此操作）。阅读新软件附带的升级文档。升级过程可能因您使用的 Oracle 版本而有很大差异。\n\n根据我最近执行的升级经验，该过程与安装一组新的\
  \ Oracle 二进制文件非常相似。您可以使用 OUI（图形或静默模式）来安装软件。有关使用静默模式安装方法的信息，请参阅本章前面的“安装 Oracle”部分。\n\
  \n使用数据库升级助手 (`DBUA`) 可成功将数据库迁移到新版本。这将执行到最新版本数据库的迁移并升级服务。18c 的新特性是服务必须通过此方法升级：安装最新版本的软件，然后运行\
  \ `DBUA` 完成迁移。\n\n> **注意**\n> 升级 Oracle 软件不同于升级 Oracle 数据库。本节仅涉及使用静默安装方法升级 Oracle\
  \ 软件。升级数据库涉及额外的步骤。有关如何升级数据库的说明，请参阅 MOS 笔记 730365.1。\n\n根据要升级的版本，您可能会遇到两种不同的场景。以下是场景\
  \ A：\n\n1.  关闭所有使用要升级的 Oracle 主目录的数据库。\n2.  升级 Oracle 主目录二进制文件。\n3.  启动数据库并运行任何必需的升级脚本。\n\
  \n以下是场景 B 升级方法的步骤：\n\n1.  保持现有的 Oracle 主目录不变——不升级它。\n2.  安装一个与旧 Oracle 主目录版本相同的新\
  \ Oracle 主目录。\n3.  将新 Oracle 主目录升级到所需版本。\n4.  当您准备就绪时，关闭使用旧 Oracle 主目录的数据库；设置操作系统变量以指向新的、已升级的\
  \ Oracle 主目录；启动数据库；并运行任何必需的升级脚本。\n\n上述两种场景中哪一种更好？场景 B 的优点在于保持旧的 Oracle 主目录不变；因此，如果由于任何原因您需要切换回旧的\
  \ Oracle 主目录，那些二进制文件仍然可用。场景 B 的缺点是需要额外的磁盘空间来容纳两个 Oracle 主目录的安装。这通常不是问题，因为升级完成后，您可以在方便时删除旧的\
  \ Oracle 主目录。\n\n在云环境中，使用基础设施即服务 (`IaaS`) 时，也会安装 Oracle 二进制文件，这使得服务器和数据库的配置非常高效。`IaaS`\
  \ 允许 DBA 拥有对配置服务器的完全访问权限以执行数据库创建，但数据库二进制文件的安装被简化，并且类似于响应文件安装。许多 DBA 更习惯使用 Oracle\
  \ 的图形安装程序来安装数据库软件。但是，当服务器位于远程位置或深嵌在安全网络中时，图形安装程序可能会很麻烦。缓慢的网络或安全功能会严重阻碍图形安装过程。在这些情况下，请确保正确配置所需的\
  \ X 软件和操作系统变量（如 `DISPLAY`）。\n\n作为 DBA，精通 Oracle 安装过程至关重要。如果 Oracle 安装软件未正确安装，您将无法成功创建数据库。一旦正确安装了\
  \ Oracle，您就可以进入下一步：启动后台进程并创建数据库。接下来，在第 [2] 章中讨论启动 Oracle 以及发出和创建数据库的主题。\n\n## 2.\
  \ 创建数据库\n\n第 [1] 章详细介绍了如何高效安装 Oracle 二进制文件。安装 Oracle 软件后，下一个逻辑任务是创建数据库。有几种创建 Oracle\
  \ 数据库的标准方法：\n\n*   使用数据库配置助手 (`dbca`) 实用程序。\n*   从 SQL*Plus 运行 `CREATE DATABASE`\
  \ 语句。\n*   从现有数据库克隆数据库。\n\nOracle 的 `dbca` 实用程序具有图形界面，您可以通过它配置和创建数据库。这个可视化工具易于使用，界面非常直观。如果您需要创建开发数据库并快速开始工作，那么这个工具绰绰有余。话虽如此，我通常不使用\
  \ `dbca` 实用程序来创建数据库。在 Linux/Unix 环境中，`dbca` 工具依赖于 X 软件和操作系统 `DISPLAY` 变量的适当设置。因此，`dbca`\
  \ 实用程序需要一些设置，如果您在远程服务器上安装且网络吞吐量较慢时，其性能可能会很差。\n\n`dbca` 实用程序还允许您以静默模式创建数据库，无需图形组件。使用带有响应文件的\
  \ `dbca` 静默模式是创建一致且可重复数据库的高效方法。`dbca` 工具可以在二进制文件安装后以静默模式运行，也可以单独启动。当您在远程服务器上安装时，这种方法也很有效，因为远程服务器的网络连接可能较慢，或者可能未安装适当的\
  \ X 软件。\n\n在远程服务器上创建数据库时，通常使用 SQL*Plus 更简单、更高效。SQL*Plus 方法简单且本质上是可编写脚本的。此外，无论网络连接速度有多慢，SQL*Plus\
  \ 都能工作，并且它不依赖于图形组件。然而，`dbca` 实用程序允许在创建的数据库中快速采用新特性。本章首先向您展示如何使用 SQL*Plus 快速创建数据库，以及如何通过启用监听器进程使您的数据库可供远程访问。稍后，本章将演示如何使用带有响应文件的\
  \ `dbca` 静默模式来创建数据库。\n\n## 设置操作系统变量\n\n在创建数据库之前，您需要了解一些关于操作系统变量（通常称为环境变量）的知识。在运行\
  \ SQL*Plus（或任何其他 Oracle 实用程序）之前，您必须设置几个操作系统变量：\n\n*   `ORACLE_HOME`\n*   `ORACLE_SID`\n\
  *   `LD_LIBRARY_PATH`\n*   `PATH`\n\n`ORACLE_HOME` 变量定义了默认初始化文件位置的起始目录，在 Linux/Unix\
  \ 上是 `ORACLE_HOME/dbs`。在 Windows 上，此目录通常是 `ORACLE_HOME\\database`。`ORACLE_HOME`\
  \ 变量也很重要，因为它定义了定位 Oracle 二进制文件（如 `sqlplus`、`dbca`、`netca`、`rman` 等）的起始目录，这些文件位于\
  \ `ORACLE_HOME/bin` 中。\n\n`ORACLE_SID` 变量定义了您尝试创建的数据库的默认名称。`ORACLE_SID` 也用作参数文件的默认名称，即\
  \ `init<ORACLE_SID>.ora` 或 `spfile<ORACLE_SID>.ora`。\n\n`LD_LIBRARY_PATH` 变量很重要，因为它指定了在\
  \ Linux/Unix 机器上搜索库的位置。此变量的值通常设置为包含 `ORACLE_HOME/lib`。\n\n`PATH` 变量指定了当您从操作系统提示符键入命令时默认查找的目录。在几乎所有情况下，`ORACLE_HOME/bin`（Oracle\
  \ 二进制文件的位置）都必须包含在您的 `PATH` 变量中。\n\n您可以采用几种不同的方法来设置上述变量。本章讨论三种方法，从硬编码的手动方法开始，以我个人喜欢的方法结束：利用\
  \ `oratab` 文件。为什么要讨论不同的方法？因为了解环境配置各不相同很重要。理解需要这些步骤才能连接到数据库将有助于故障排除并验证二进制文件是否已安装并可用。由于策略和服务器配置的不同，也有不同的工具可用，例如进行静默安装与使用\
  \ UI。\n\n### 手动方法\n\n在 Linux/Unix 中，当您使用 Bourne、Bash 或 Korn shell 时，可以使用 `export`\
  \ 命令从操作系统命令行手动设置操作系统变量：\n\n```\n$ export ORACLE_HOME=/u01/app/oracle/product/18.0.0.0/db_1\n\
  $ export ORACLE_SID=o12c\n$ export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib\n$\
  \ export PATH=$ORACLE_HOME/bin:$PATH\n```\n\n对于 C 或 tcsh shell，使用 `setenv` 命令设置变量：\n\
  \n```\n$ setenv ORACLE_HOME \n$ setenv ORACLE_SID \n$ setenv LD_LIBRARY_PATH \n\
  $ setenv PATH \n```\n\nDBA 设置这些变量的另一种方法是将前面的 `export` 或 `setenv` 命令放入 Linux/Unix\
  \ 启动文件中，例如 `.bash_profile`、`.bashrc` 或 `.profile`。这样，变量会在登录时自动设置。这只需编辑启动文件或配置文件插入变量即可完成。即使有其他选项，在启动文件中设置默认的\
  \ `ORACLE_HOME` 仍然是好的做法。\n\n然而，手动设置操作系统变量（无论是从命令行还是通过将值硬编码到启动文件中）并不是实例化这些变量的最佳方式。例如，如果一台机器上有多个数据库和多个\
  \ Oracle 主目录，手动设置这些变量很快就会变得难以管理且不可维护。\n\n### Oracle 的方法\n\n设置操作系统变量的一种好得多的方法是使用脚本，该脚本利用一个包含服务器上所有\
  \ Oracle 数据库名称及其关联 Oracle 主目录的文件。这种方法灵活且可维护。例如，如果某个数据库的 `ORACLE_HOME` 发生变化（例如升级后），您只需在服务器上修改一个文件，而无需费力寻找\
  \ `ORACLE_HOME` 变量可能被硬编码到脚本中的位置。\n\nOracle 提供了一种自动设置所需操作系统变量的机制。Oracle 的方法依赖于两个文件：`oratab`\
  \ 和 `oraenv`。\n\n### 理解 oratab\n\n您可以将 `oratab` 文件中的条目视为一个注册表，记录了机器上安装了哪些数据库及其对应的\
  \ Oracle 主目录。`oratab` 文件在您安装 Oracle 软件时会自动创建。在 Linux 机器上，`oratab` 通常放在 `/etc` 目录中。在\
  \ Solaris 服务器上，`oratab` 文件位于 `/var/opt/oracle` 目录中。如果由于某种原因 `oratab` 文件没有自动创建，您可以手动创建目录和文件。\n\
  \n`oratab` 文件在 Linux/Unix 环境中用于以下目的：\n\n*   自动获取所需的操作系统变量\n*   自动启动和停止服务器上的 Oracle\
  \ 数据库\n\n`oratab` 文件有三列，格式如下：\n\n```\n::Y|N\n```\n\n`Y` 或 `N` 表示您是否希望 Oracle 在系统重启时自动重启；`Y`\
  \ 表示是，`N` 表示否。数据库的自动启动和关闭将在第 [20] 章中详细讨论。Oracle `srvctl` 也有管理策略，可以为不使用 `oratab`\
  \ 的数据库设置自动重启。\n\n`oratab` 文件中的注释以井号 (`#`) 开头。以下是一个典型的 `oratab` 文件条目：\n\n```\no12c:/u01/app/oracle/product/18.0.0.0/db_1:N\n\
  rcat:/u01/app/oracle/product/18.0.0.0/db_1:N\n```\n\n前面几行中的数据库名称是 `o12c` 和 `rcat`。每行接下来是数据库\
  \ `ORACLE_HOME` 目录的路径（与数据库名称用冒号 [`:`] 分隔）。\n\n几个 Oracle 提供的实用程序使用 `oratab` 文件：\n\
  \n*   `oraenv` 使用 `oratab` 来设置操作系统变量。\n*   `dbstart` 使用它来在服务器重启时自动启动数据库（如果 `oratab`\
  \ 中的第三个字段为 `Y`）。\n*   `dbshut` 使用它来在服务器重启时自动停止数据库（如果 `oratab` 中的第三个字段为 `Y`）。\n\n\
  `oraenv` 工具将在下一节中讨论。\n\n### 使用 oraenv\n\n如果您没有为 Oracle 环境正确设置所需的操作系统变量，那么诸如 SQL*Plus、Oracle\
  \ Recovery Manager (`RMAN`)、Data Pump 等实用程序将无法正常工作。`oraenv` 实用程序自动在 Oracle 数据库服务器上设置所需的操作系统变量（如\
  \ `ORACLE_HOME`、`ORACLE_SID` 和 `PATH`）。此实用程序用于 Bash、Korn 和 Bourne shell 环境（如果您在\
  \ C shell 环境中，有一个对应的 `coraenv` 实用程序）。\n\n`oraenv` 实用程序位于 `ORACLE_HOME/bin` 目录中。您可以手动运行它，如下所示：\n\
  \n```\n$ . oraenv\n```\n\n请注意，从命令行运行此命令的语法要求在点 (`.`) 和 `oraenv` 工具之间有一个空格。系统会提示您输入\
  \ `ORACLE_SID`，如果 `ORACLE_SID` 不在 `oratab` 文件中，它将提示输入 `ORACLE_HOME` 值：\n\n```\n\
  ORACLE_SID = [oracle] ?\nORACLE_HOME = [/home/oracle] ?\n```\n\n您也可以在运行 `oraenv`\
  \ 实用程序之前设置操作系统变量，以非交互方式运行。这在脚本编写中很有用，当您不想被提示输入时：\n\n```\n$ export ORACLE_SID=o18c\n\
  $ export ORAENV_ASK=NO\n$ . oraenv\n```\n\n请记住，如果您将 `ORACLE_SID` 设置为在 `oratab` 文件中找不到的值，那么您可能会被提示输入诸如\
  \ `ORACLE_HOME` 之类的值。\n\n### 我设置操作系统变量的方法\n\n我不使用 Oracle 的 `oraenv` 文件来设置操作系统变量（有关\
  \ Oracle 方法的详细信息，请参阅上一节“使用 oraenv”）。相反，我使用一个名为 `oraset` 的脚本。`oraset` 脚本依赖于 `oratab`\
  \ 文件位于正确的目录和预期的格式中：\n\n```\n::Y|N\n```\n\n如前一节所述，Oracle 安装程序应在正确的目录中为您创建一个 `oratab`\
  \ 文件。如果没有，您可以手动创建并填充该文件。在 Linux 中，`oratab` 文件通常创建在 `/etc` 目录中。在 Solaris 服务器上，`oratab`\
  \ 文件位于 `/var/opt/oracle` 目录中。\n\n接下来，使用一个读取 `oratab` 文件并设置操作系统变量的脚本。以下是一个 `oraset`\
  \ 脚本的示例，该脚本读取 `oratab` 文件并呈现一个选择菜单（基于 `oratab` 文件中的数据库名称）：\n\n```\n#!/bin/bash\n\
  ```\n\n\n#### 设置 Oracle 环境变量。\n\n## 安装设置\n\n1.  将 `oraset` 文件置于 `/etc`（Linux 系统）或\
  \ `/var/opt/oracle`（Solaris 系统）\n2.  确保 `/etc` 或 `/var/opt/oracle` 路径已添加到 `$PATH`\
  \ 变量中\n\n## 使用方法\n\n-   批处理模式：`. oraset`\n-   菜单模式：`. oraset`\n\n```\nif [ -f /etc/oratab\
  \ ]; then\nOTAB=/etc/oratab\nelif [ -f /var/opt/oracle/oratab ]; then\nOTAB=/var/opt/oracle/oratab\n\
  else\necho 'oratab file not found.'\nexit\nfi\n#\nif [ -z $1 ]; then\nSIDLIST=$(egrep\
  \ -v '#|\\*' ${OTAB} | cut -f1 -d:)\n```\n\n\n\n#### PS3 指示了用于 Bash `select` 命令的提示符。\n\
  `PS3='SID? '`\n`select sid in ${SIDLIST}; do`\n`if [ -n $sid ]; then`\n`HOLD_SID=$sid`\n\
  `break`\n`fi`\n`done`\n`else`\n`if egrep -v '#|\\*' ${OTAB} | grep -w \"${1}:\"\
  >/dev/null; then`\n`HOLD_SID=$1`\n`else`\n`echo \"SID: $1 not found in $OTAB\"`\n\
  `fi`\n`shift`\n`fi`\n#\n`export ORACLE_SID=$HOLD_SID`\n`export ORACLE_HOME=$(egrep\
  \ -v '#|\\*' $OTAB|grep -w $ORACLE_SID:|cut -f2 -d:)`\n`export ORACLE_BASE=${ORACLE_HOME%%/product*}`\n\
  `export TNS_ADMIN=$ORACLE_HOME/network/admin`\n`export ADR_BASE=$ORACLE_BASE/diag`\n\
  `export PATH=$ORACLE_HOME/bin:/usr/ccs/bin:/opt/SENSsshc/bin/\\\n:/bin:/usr/bin:.:/var/opt/oracle:/usr/sbin`\n\
  `export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib`\n\n你可以从命令行或启动文件（如`.profile`、`.bash_profile`或`.bashrc`）中运行`oraset`脚本。要从命令行运行`oraset`，请将`oraset`文件放置在一个标准位置，例如`/var/opt/oracle`（Solaris）或`/etc`（Linux），并按如下方式运行：\n\
  \n```\n$ . /etc/oraset\n```\n\n请注意，从命令行运行此命令的语法要求在点号（`.`）和命令的其余部分之间有一个空格。当你从命令行运行`oraset`时，系统应显示如下菜单：\n\
  \n```\n1) o18c\n2) rcat\nSID?\n```\n\n在此示例中，你现在可以输入`1`或`2`来设置你想要使用的数据库所需的操作系统变量。这允许你以交互方式设置操作系统变量，而不管服务器上有多少个数据库安装。\n\
  \n你也可以从操作系统启动文件中调用`oraset`文件。以下是在`.bashrc`文件中的一个示例条目：\n\n```\n. /etc/oraset\n```\n\
  \n现在，每次登录服务器时，系统都会显示一个选项菜单，你可以使用该菜单来指定要为其设置操作系统变量的数据库。如果你想将操作系统变量自动设置为特定数据库，那么请在`.bashrc`文件中添加如下条目：\n\
  \n```\n. /etc/oraset o18c\n```\n\n前面这行将为`o18c`数据库运行`oraset`文件，并相应地设置操作系统变量。\n\n\
  ## 创建数据库\n\n本节说明如何使用 SQL*Plus 的 `CREATE DATABASE` 语句手动创建 Oracle 数据库。创建数据库需要以下步骤：\n\
  \n1.  设置操作系统变量。\n2.  配置初始化文件。\n3.  创建所需的目录。\n4.  创建数据库。\n5.  创建数据字典。\n\n接下来的部分将详细介绍这些步骤。\n\
  \n### 步骤 1. 设置操作系统变量\n\n如前所述，在运行 SQL*Plus（或任何其他 Oracle 实用程序）之前，必须设置几个操作系统变量。你可以手动设置这些变量，也可以结合使用文件和脚本来设置变量。以下是手动设置这些变量的示例：\n\
  \n```\n$ export ORACLE_HOME=/u01/app/oracle/product/18.0.0.0/db_1\n$ export ORACLE_SID=o18c\n\
  $ export LD_LIBRARY_PATH=/usr/lib:$ORACLE_HOME/lib\n$ export PATH=$ORACLE_HOME/bin:$PATH\n\
  ```\n\n有关这些变量以及设置技术的完整说明，请参阅本章前面的“设置操作系统变量”部分。\n\n### 步骤 2. 配置初始化文件\n\nOracle 要求在尝试启动实例之前必须有一个初始化文件。初始化文件用于配置诸如内存和控制文件位置等特性。你可以使用两种类型的初始化文件：\n\
  \n*   服务器参数二进制文件 (`spfile`)\n*   `init.ora` 文本文件\n\nOracle 建议你使用 `spfile`，原因如下：\n\
  \n*   你可以使用 SQL `ALTER SYSTEM` 语句修改 `spfile` 的内容。\n*   你可以使用远程客户端 SQL 会话来启动数据库，而不需要本地（客户端）初始化文件。\n\
  *   有更多可以使用 spfile 设置的动态参数，而无需任何停机时间。\n\n这些是使用 `spfile` 的充分理由。然而，一些公司仍然使用传统的 `init.ora`\
  \ 文件。`init.ora` 文件也有其优势：\n\n*   你可以直接用操作系统文本编辑器编辑它。\n*   你可以在其中添加注释，详细记录修改历史。\n\n\
  当我第一次创建数据库时，我发现使用 `init.ora` 文件更容易。如果需要，这个文件以后可以轻松转换为 `spfile`（通过 `CREATE SPFILE\
  \ FROM PFILE` 语句）。在此示例中，我的数据库名称是 `o18c`，因此我将以下内容放入一个名为 `inito18c.ora` 的文件中，并将该文件放在\
  \ `ORACLE_HOME/dbs` 目录下：\n\n```\ndb_name=o18c\ndb_block_size=8192\nmemory_target=300M\n\
  memory_max_target=300M\nprocesses=200\ncontrol_files=(/u01/dbfile/o18c/control01.ctl,/u02/dbfile/o18c/control02.ctl)\n\
  job_queue_processes=10\nopen_cursors=500\nfast_start_mttr_target=500\nundo_management=AUTO\n\
  undo_tablespace=UNDOTBS1\nremote_login_passwordfile=EXCLUSIVE\n```\n\n确保初始化文件命名正确并位于适当的目录中。这一点至关重要，因为在启动实例时，Oracle\
  \ 首先会在 `ORACLE_HOME/dbs` 目录中按以下特定格式和顺序查找参数文件：\n\n*   `spfile<SID>.ora`\n*   `spfile.ora`\n\
  *   `init<SID>.ora`\n\n换句话说，Oracle 首先查找名为 `spfile<SID>.ora` 的文件。如果找到，则启动实例；如果未找到，Oracle\
  \ 会查找 `spfile.ora`，然后查找 `init<SID>.ora`。如果这些文件都未找到，Oracle 将抛出错误。如果你不了解 Oracle 查找的文件及其顺序，这可能会导致一些困惑。例如，你可能更改了\
  \ `init<SID>.ora` 文件，并期望在停止并启动实例后生效。但如果存在 `spfile<SID>.ora`，则 `init<SID>.ora` 将被完全忽略。\n\
  \n> 注意：你可以使用 `startup` 命令的 `pfile=<directory/filename>` 子句，手动指示 Oracle 在特定目录中查找文本参数文件；在正常情况下，你不需要这样做。你希望使用默认行为，即让\
  \ Oracle 在 `ORACLE_HOME/dbs` 目录中查找参数文件（对于 Linux/Unix）。Windows 上的默认目录是 `ORACLE_HOME/database`。\n\
  \n表 2-1 列出了配置 Oracle 初始化文件时需要考虑的最佳实践。\n\n#### 表 2-1：初始化文件最佳实践\n\n| 最佳实践 | 理由 |\n\
  | --- | --- |\n| Oracle 建议你使用二进制服务器参数文件 (`spfile`)。 | Spfile 允许动态更改参数。如果有可接受的维护窗口，那么使用\
  \ init.ora 文件也可以。 |\n| 一般来说，如果不确定初始化参数的用途，就不要设置它们。如有疑问，请使用默认值。 | 设置初始化参数可能会对数据库性能产生深远影响。只有在知道最终行为的情况下才修改参数。\
  \ |\n| 对于 11g 及更高版本，设置 `memory_target` 和 `memory_max_target` 初始化参数。 | 这样做允许 Oracle\
  \ 为你管理所有内存组件。 |\n| 对于 10g，设置 `sga_target` 和 `sga_target_max` 初始化参数。 | 这样做可以让 Oracle\
  \ 为你管理大部分内存组件。 |\n| 对于 10g，设置 `pga_aggregate_target` 和 `workarea_size_policy`。 |\
  \ 这样做允许 Oracle 管理用于排序空间的内存。 |\n| 从 10g 开始，使用自动 `UNDO` 功能。这通过 `undo_management` 和\
  \ `undo_tablespace` 参数设置。 | 这样做允许 Oracle 管理 `UNDO` 表空间的大部分特性。 |\n| 将 `open_cursors`\
  \ 设置为比默认值更高的值。我通常将其设置为 500。活跃的在线事务处理 (OLTP) 数据库可能需要高得多的值。 | 默认值 50 几乎从来不够。即使是一个单用户的小型应用程序也可能超过\
  \ 50 个开放游标的默认值。 |\n| 使用 `/<mount_point>/dbfile/<database_name>/control0N.ctl` 模式命名控制文件。\
  \ | 这与 OFA 标准略有不同。我发现这个位置比位于 `ORACLE_BASE` 下更容易导航。 |\n| 至少使用两个控制文件，最好位于不同的位置，使用不同的磁盘。\
  \ | 如果一个控制文件损坏，至少还有另一个可用的控制文件总是一个好主意。 |\n\n### 步骤 3. 创建所需的目录\n\n在尝试创建数据库之前，必须在服务器上创建参数文件或\
  \ `CREATE DATABASE` 语句中引用的任何操作系统目录。例如，在上一节的初始化文件中，控制文件定义为：\n\n```\ncontrol_files=(/u01/dbfile/o18c/control01.ctl,/u02/dbfile/o18c/control02.ctl)\n\
  ```\n\n根据上一行，确保你已经创建了目录 `/u01/dbfile/o18c` 和 `/u02/dbfile/o18c`（请根据你的环境进行修改）。在 Linux/Unix\
  \ 中，你可以使用带有 `-p` 开关的 `mkdir` 命令创建目录（包括所需的任何父目录）：\n\n```\n$ mkdir -p /u01/dbfile/o18c\n\
  $ mkdir -p /u02/dbfile/o18c\n```\n\n同时，确保你为 `CREATE DATABASE` 语句中引用的数据文件和联机重做日志创建了所需的目录（参见步骤\
  \ 4）。对于此示例，以下是所需的附加目录：\n\n```\n$ mkdir -p /u01/oraredo/o18c\n$ mkdir -p /u02/oraredo/o18c\n\
  ```\n\n如果你以 `root` 用户身份创建了上述目录，请确保 `oracle` 用户和 `dba` 组被正确设置为拥有这些目录、子目录和文件。此示例递归地更改以下目录的所有者和组：\n\
  \n\n#### chown -R oracle:dba /u01\n#### chown -R oracle:dba /u02\n\n"
- "# 步骤 4\\. 创建数据库\n\n在设定好操作系统变量、配置初始化文件并创建了所需目录后，你现在可以创建数据库了。本步骤将说明如何使用 `CREATE DATABASE`\
  \ 语句来创建一个数据库。\n\n在执行 `CREATE DATABASE` 语句之前，你必须通过 `STARTUP NOMOUNT` 语句启动后台进程并分配内存：\n\
  \n```bash\n$ sqlplus / as sysdba\nSQL> startup nomount;\n```\n\n当你发出 `STARTUP NOMOUNT`\
  \ 语句时，SQL\\*Plus 会尝试读取 `ORACLE_HOME/dbs` 目录下的初始化文件（参见步骤 2）。`STARTUP NOMOUNT` 语句会实例化\
  \ Oracle 所使用的后台进程和内存区域。此时，你拥有一个 Oracle **实例**，但还没有**数据库**。\n\n## 注意\nOracle **实例**\
  \ 定义为后台进程和内存区域。Oracle **数据库** 定义为磁盘上的物理文件（数据文件、控制文件、在线重做日志）。\n\n下面列出了一个典型的 Oracle\
  \ `CREATE DATABASE` 语句：\n\n```sql\nCREATE DATABASE o18c\nMAXLOGFILES 16\nMAXLOGMEMBERS\
  \ 4\nMAXDATAFILES 1024\nMAXINSTANCES 1\nMAXLOGHISTORY 680\nCHARACTER SET AL32UTF8\n\
  DATAFILE\n'/u01/dbfile/o18c/system01.dbf'\nSIZE 500M REUSE\nEXTENT MANAGEMENT LOCAL\n\
  UNDO TABLESPACE undotbs1 DATAFILE\n'/u01/dbfile/o18c/undotbs01.dbf'\nSIZE 800M\n\
  SYSAUX DATAFILE\n'/u01/dbfile/o18c/sysaux01.dbf'\nSIZE 500M\nDEFAULT TEMPORARY TABLESPACE\
  \ TEMP TEMPFILE\n'/u01/dbfile/o18c/temp01.dbf'\nSIZE 500M\nDEFAULT TABLESPACE USERS\
  \ DATAFILE\n'/u01/dbfile/o18c/users01.dbf'\nSIZE 20M\nLOGFILE GROUP 1\n('/u01/oraredo/o18c/redo01a.rdo',\n\
  '/u02/oraredo/o18c/redo01b.rdo') SIZE 50M,\nGROUP 2\n('/u01/oraredo/o18c/redo02a.rdo',\n\
  '/u02/oraredo/o18c/redo02b.rdo') SIZE 50M,\nGROUP 3\n('/u01/oraredo/o18c/redo03a.rdo',\n\
  '/u02/oraredo/o18c/redo03b.rdo') SIZE 50M\nUSER sys    IDENTIFIED BY foo\nUSER system\
  \ IDENTIFIED BY foo;\n```\n\n在这个例子中，脚本被放在一个名为 `credb.sql` 的文件中，并以 `SYS` 用户身份在 SQL\\\
  *Plus 提示符下运行：\n\n```sql\nSQL> @credb.sql\n```\n\n如果执行成功，你应该会看到以下消息：\n\n```\nDatabase\
  \ created.\n```\n\n## 注意\n有关创建可插拔数据库的详细信息，请参见第 22 章。\n\n如果在 `CREATE DATABASE` 语句运行期间出现任何错误，请检查警报日志文件。通常，错误发生在所需目录不存在、内存分配不足或超出操作系统限制时。如果你不确定警报日志的位置，请执行以下查询：\n\
  \n```sql\nSQL> select value from v$diag_info where name = 'Diag Trace';\n```\n\n\
  即使你的数据库处于 nomount 状态，前面的查询也应该有效。另一种快速查找警报日志文件的方法是从操作系统入手：\n\n```bash\n$ cd $ORACLE_BASE\n\
  $ find . -name \"alert*.log\"\n```\n\n#### 提示\n警报日志文件的默认命名格式是 `alert_<SID>.log`。\n\
  \n关于前面的 `CREATE DATABASE` 语句示例，有几点关键之处需要指出。注意，`SYSTEM` 数据文件被定义为**本地管理**。这意味着在此数据库中创建的任何表空间都必须是本地管理的（相对于字典管理）。如果你尝试在此数据库中创建字典管理的表空间，Oracle\
  \ 会抛出错误。这是期望的行为。\n\n字典管理的表空间使用 Oracle 数据字典来管理区和空闲空间，而本地管理的表空间使用每个数据文件中的位图来管理其区和空闲空间。本地管理的表空间具有以下优势：\n\
  \n*   性能得到提升。\n*   不需要合并。\n*   减少了数据字典中的资源争用。\n*   减少了递归空间管理。\n\n另外请注意，`TEMP` 表空间被定义为**默认临时表空间**。这意味着在数据库中创建的任何用户都会自动被分配\
  \ `TEMP` 表空间作为其默认临时表空间。在创建数据字典之后（参见步骤 5），你可以使用此查询来验证默认临时表空间：\n\n```sql\nselect *\n\
  from database_properties\nwhere property_name = 'DEFAULT_TEMP_TABLESPACE';\n```\n\
  \n最后，注意 `USERS` 表空间被定义为任何在 `CREATE USER` 语句中未指定默认表空间的用户的**默认永久表空间**。在创建数据字典之后（参见步骤\
  \ 5），你可以运行此查询来确定默认表空间：\n\n```sql\nselect *\nfrom database_properties\nwhere property_name\
  \ = 'DEFAULT_PERMANENT_TABLESPACE';\n```\n\n表 2-2 列出了在创建 Oracle 数据库时需要考虑的最佳实践。\n\
  \n**表 2-2 创建 Oracle 数据库的最佳实践**\n\n| 最佳实践 | 原因 |\n| :--- | :--- |\n| 谨慎使用 `REUSE`\
  \ 子句。通常，只应在重新创建数据库时使用它。 | `REUSE` 子句指示 Oracle 覆盖现有文件，无论它们是否正在使用。这是危险的。 |\n| 创建一个名称中包含\
  \ `TEMP` 的默认临时表空间。 | 每个用户都应被分配一个类型为 `TEMP` 的临时表空间，包括 `SYS` 用户。如果不指定默认临时表空间，则会使用\
  \ `SYSTEM` 表空间。你绝不希望用户被分配 `SYSTEM` 作为临时表空间。如果你的数据库没有默认临时表空间，请使用 `ALTER DATABASE\
  \ DEFAULT TEMPORARY TABLESPACE` 语句来分配一个。 |\n| 创建一个名为 `USERS` 的默认永久表空间。 | 这确保用户被分配一个除\
  \ `SYSTEM` 之外的默认永久表空间。如果你的数据库没有默认永久表空间，请使用 `ALTER DATABASE DEFAULT TABLESPACE` 语句来分配一个。\
  \ |\n| 使用 `USER SYS` 和 `USER SYSTEM` 子句来指定非默认密码。 | 这样做可以使用非默认密码创建数据库账户，而这些账户通常是黑客的首要目标。\
  \ |\n| 至少创建三个重做日志组，每组两个成员。 | 至少三个重做日志组为归档进程在日志切换之间写出归档重做日志提供了时间。两个成员镜像了在线重做日志成员，提供了一定的容错能力。\
  \ |\n| 给重做日志命名如 `redoNA.rdo`。 | 这与 OFA 标准略有偏差，但我曾不止一次意外删除过扩展名为 `.log` 的文件（虽然本不应该发生，但它确实发生了）。\
  \ |\n| 使数据库名称具有一定的意义，例如 `PAPRD`、`PADEV1` 或 `PATST1`。 | 这有助于你确定正在操作的数据库以及它是生产、开发还是测试环境。\
  \ |\n| 在创建数据字典时（参见步骤 5）使用 `?` 变量。不要硬编码目录路径。 | SQL\\*Plus 将 `?` 解释为操作系统 `ORACLE_HOME`\
  \ 变量中包含的目录。这可以防止你意外地从错误的 `ORACLE_HOME` 版本运行脚本。 |\n\n#### 提示\n使用 `dbca` 可以完成创建数据库中的许多此类设置。表空间可以设置或使用默认值，同时确保用户不会在\
  \ `SYSTEM` 表空间中创建对象，并且不使用默认密码。使用 `dbca` 会将新特性和安全选项作为数据库创建的一部分。\n\n\n请注意，此步骤中使用的\
  \ `CREATE DATABASE` 语句在目录结构方面略微偏离了 OFA 标准。我倾向于不将 Oracle 数据文件、在线重做日志和控制文件放在 `ORACLE_BASE`\
  \ 下（正如 OFA 标准所规定）。相反，我直接将这些文件放在名为 `/<挂载点>/<文件类型>/<数据库名>` 的目录下，因为路径名短得多。更短的路径名使得通过命令行导航到目录更加容易，并且名称在\
  \ SQL `SELECT` 语句的输出中也显示得更清晰。图 2-1 展示了这种对 OFA 标准的偏离。\n\n![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig1_HTML.jpg](img/214899_3_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n一种用于布局数据库文件的、略微偏离 OFA 标准的方式\n\n我的本意并非让您使用非标准的 OFA 结构。而是，做任何对您的环境和需求有意义的事情。应用能够促进可管理性、可维护性和可扩展性的合理标准。\n\
  \n### 步骤 5. 创建数据字典\n\n数据库成功创建后，您可以通过运行两个脚本来实例化数据字典。这些脚本在您安装 Oracle 二进制文件时创建。您必须以\
  \ `SYS` 方案用户身份运行这些脚本：\n\n```\nSQL> show user\nUSER is \"SYS\"\n```\n\n在创建数据字典之前，我喜欢将输出假脱机到一个文件中，以便在出现意外错误时进行检查：\n\
  \n```\nSQL> spool create_dd.lis\n```\n\n现在，创建数据字典：\n\n```\nSQL> @?/rdbms/admin/catalog.sql\n\
  SQL> @?/rdbms/admin/catproc.sql\n```\n\n成功创建数据字典后，以 `SYSTEM` 方案用户身份，创建产品用户配置文件表：\n\
  \n```\nSQL> connect system/\nSQL> @?/sqlplus/admin/pupbld\n```\n\n这些表允许 SQL*Plus\
  \ 按用户禁用命令。如果未运行 `pupbld.sql` 脚本，那么所有非 `sys` 用户登录 SQL*Plus 时都会看到以下警告：\n\n```\nError\
  \ accessing PRODUCT_USER_PROFILE\nWarning: Product user profile information not\
  \ loaded!\nYou may need to run PUPBLD.SQL as SYSTEM\n```\n\n这些错误可以忽略。如果您不想在登录 SQL*Plus\
  \ 时看到它们，请确保运行了 `pupbld.sql` 脚本。至此，您应该拥有一个功能齐全的数据库了。接下来，您需要配置并实现您的监听器以启用远程连接，并可选地设置一个密码文件。这些任务将在接下来的两个章节中描述。\n\
  \n## 配置和实现监听器\n\n安装完二进制文件并创建数据库后，您需要使数据库可供远程客户端连接访问。这通过配置并启动 Oracle 监听器来实现。恰如其名，监听器是数据库服务器上的一个进程，用于“监听”来自远程客户端的连接请求。如果您的数据库服务器上没有启动监听器，那么您将无法从远程客户端连接。监听器可以作为数据库主目录的一部分，也可以作为网格主目录的一部分。监听器只需要存在一次，因为只有一个活动的网格主目录，但可能有多个数据库主目录。这是管理和维护监听器的一个位置。将监听器作为网格环境的一部分，允许在打补丁时与数据库分开，并且作为基础设施打补丁过程的一部分。在维护监听器时，还需注意设置正确的\
  \ `ORACLE_HOME`，以使监听器在期望的主目录中运行。接下来的两种方法展示了在数据库中配置监听器，但同样可以轻松地应用于网格主目录。设置监听器有两种方法：使用\
  \ Oracle Net 配置助手 (`netca`) 或手动配置 `listener.ora` 文件。\n\n### 使用 Net 配置助手实现监听器\n\n\
  `netca` 实用程序可以协助您完成实现监听器的所有方面。您可以在图形模式或静默模式下运行 `netca` 工具。在图形模式下使用 `netca` 简单直观。要在图形模式下使用\
  \ `netca`，请确保安装了正确的 X 软件，然后发出 `xhost +` 命令，并检查您的 `DISPLAY` 变量是否已设置；例如，\n\n```\n\
  $ xhost +\n$ echo $DISPLAY\n:0.0\n```\n\n现在您可以运行 `netca` 实用程序：\n\n```\n$ netca\n\
  ```\n\n接下来，您将被引导通过几个屏幕，您可以在其中选择选项，例如监听器的名称、所需的端口等。\n\n您也可以使用响应文件在静默模式下运行 `netca`\
  \ 实用程序。这种模式允许您编写脚本，并在创建和实现监听器时确保可重复性。首先，在包含 Oracle 安装介质的目录结构中找到默认的监听器响应文件：\n\n```\n\
  $  find . -name \"netca.rsp\"\n./18.0.0.0/database/response/netca.rsp\n```\n\n现在，复制该文件以便进行修改：\n\
  \n```\n$ cp 18.0.0.0/database/response/netca.rsp mynet.rsp\n```\n\n如果您想更改默认名称或其他属性，请使用操作系统实用程序（如\
  \ `vi`）编辑 `mynet.rsp` 文件：\n\n```\n$ vi mynet.rsp\n```\n\n在本例中，我没有修改 `mynet.rsp`\
  \ 文件中的任何值。换句话说，我使用了响应文件中已包含的所有默认值。接下来，以静默模式运行 `netca` 实用程序：\n\n```\n$ netca -silent\
  \ -responsefile /home/oracle/orainst/mynet.rsp\n```\n\n该实用程序会在 `ORACLE_HOME/network/admin`\
  \ 目录中创建一个 `listener.ora` 和一个 `sqlnet.ora` 文件，并启动一个默认监听器。\n\n### 手动配置监听器\n\n当您设置新环境时，手动配置监听器是一个两步过程：\n\
  \n1.  配置 `listener.ora` 文件。\n2.  启动监听器。\n\n`listener.ora` 文件默认位于 `ORACLE_HOME/network/admin`\
  \ 目录中。这也是 `TNS_ADMIN` 操作系统变量应设置为指向的同一目录。手动配置监听器并更新 `listener.ora` 文件时，请注意括号和任何特殊字符，配置错误的\
  \ `listener.ora` 将导致无法启动，并且当同一端口上存在另一个监听器时，这是首要的排查点。\n\n以下是一个 `listener.ora` 文件示例，其中包含一个数据库的网络配置信息：\n\
  \n```\nLISTENER =\n(DESCRIPTION_LIST =\n(DESCRIPTION =\n(ADDRESS_LIST =\n(ADDRESS\
  \ = (PROTOCOL = TCP)(HOST = oracle18c)(PORT = 1521))\n)\n)\n)\nSID_LIST_LISTENER\
  \ =\n(SID_LIST =\n(SID_DESC =\n(GLOBAL_DBNAME = o18c)\n(ORACLE_HOME = /u01/app/oracle/product/18.0.0.0/db_1)\n\
  (SID_NAME = o18c)\n)\n)\n```\n\n此代码清单包含两个部分。第一部分定义了监听器名称和服务；在本例中，监听器名称为 `LISTENER`。第二部分定义了监听器正在监听其传入连接（到数据库）的\
  \ SID 列表。SID 列表名称的格式为 `SID_LIST_<监听器名称>`。监听器的名称必须出现在 SID 列表名称中。本例中的 SID 列表名称是 `SID_LIST_LISTENER`。另外，您不必在前面的代码清单中显式指定\
  \ `SID_LIST_LISTENER` 部分（第二部分）。这是因为进程监控器 (`PMON`) 后台进程会自动将任何正在运行的数据库作为服务注册到监听器；这称为动态注册。然而，一些\
  \ DBA 更喜欢显式列出应注册到监听器的数据库，因此会包含第二部分；这称为静态注册。\n\n在 `listener.ora` 文件就位后，您可以使用 `lsnrctl`\
  \ 实用程序启动监听器后台进程：\n\n```\n$ lsnrctl start\n```\n\n您应该会看到信息性消息，例如：\n\n```\nListening\
  \ Endpoints Summary...\n(DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST = oracle18c)(PORT\
  \ = 1521)))\nServices Summary...\nService \"o18c\" has 1 instance(s).\n```\n\n\n\
  ## 监听器管理\n\n您可以验证监听器正在监听的服务：\n\n```\n$ lsnrctl services\n```\n\n您可以使用以下查询检查监听器的状态：\n\
  \n```\n$ lsnrctl status\n```\n\n要获取完整的监听器命令列表，请执行此命令：\n\n```\n$ lsnrctl help\n```\n\
  \n> **提示**\n> 使用 Linux/Unix 命令 `ps -ef | grep tns` 可以查看服务器上正在运行的监听器进程。\n\n## 通过网络连接到数据库\n\
  \n一旦监听器被配置并启动，您就可以从 SQL*Plus 客户端测试远程连接，如下所示：\n\n```\n$ sqlplus user/pass@'server:port/service_name'\n\
  ```\n\n在下一行代码中，用户名和密码是 `system/foo`，连接到名为 `oracle18c` 的服务器，端口 1521，数据库名为 `o18c`：\n\
  \n```\n$ sqlplus system/foo@'oracle18c:1521/o18c'\n```\n\n此示例演示了所谓的“轻松连接命名方法”。它之所以简单，是因为它不依赖于任何设置文件或工具。您唯一需要知道的信息是用户名、密码、服务器、端口和服务名（SID）。\n\
  \n另一种常见的连接方法是“本地命名”。此方法依赖于 `ORACLE_HOME/network/admin/tnsnames.ora` 文件中的连接信息。在此示例中，编辑了\
  \ `tnsnames.ora` 文件，并添加了以下透明网络底层（TNS，Oracle 的网络架构）条目：\n\n```\no18c =\n  (DESCRIPTION\
  \ =\n    (ADDRESS = (PROTOCOL = TCP)(HOST = oracle18c)(PORT = 1521))\n    (CONNECT_DATA\
  \ = (SERVICE_NAME = o18c)))\n```\n\n现在，从操作系统命令行，您可以通过引用 `o18c` TNS 信息（该信息已放置在 `tnsnames.ora`\
  \ 文件中）来建立连接：\n\n```\n$ sqlplus system/foo@o18c\n```\n\n这种连接方法是本地的，因为它依赖于本地客户端的 `tnsnames.ora`\
  \ 副本来确定 Oracle Net 连接细节。默认情况下，SQL*Plus 会检查由 `TNS_ADMIN` 变量定义的目录中是否存在名为 `tnsnames.ora`\
  \ 的文件。如果未找到，则会搜索由 `ORACLE_HOME/network/admin` 定义的目录。如果找到了 `tnsnames.ora` 文件，并且它包含在\
  \ SQL*Plus 连接字符串中指定的别名（在此示例中为 `o18c`），则连接详情将从该 `tnsnames.ora` 文件的条目中派生。\n\nOracle\
  \ 使用的其他连接命名方法包括外部命名和目录命名。有关更多详细信息，请参阅《Oracle Net Services Administrator’s Guide》，可从\
  \ Oracle 网站的技术网络区域（`http://otn.oracle.com`）免费下载。\n\n> **提示**\n> 您可以使用 `netca` 实用程序创建\
  \ tnsnames.ora 文件。启动该实用程序并选择“本地网络服务名配置”选项。系统将提示您输入 SID、主机名和端口等信息。\n\n## 创建密码文件\n\
  \n创建密码文件是可选的。要求密码文件有一些充分的理由：\n\n*   您希望为非 `sys` 用户分配 `sys*` 权限（`sysdba`、`sysoper`、`sysbackup`\
  \ 等）。\n*   您希望通过 Oracle Net 以 `sys*` 权限远程连接到您的数据库。\n*   Oracle Data Guard 设置以及需要在备用服务器上拥有密码文件。\n\
  *   某个 Oracle 特性或实用程序要求使用密码文件。\n\n执行以下步骤来实现密码文件：\n\n1.  使用 `orapwd` 实用程序创建密码文件。\n\
  2.  将初始化参数 `REMOTE_LOGIN_PASSWORDFILE` 设置为 `EXCLUSIVE`。\n\n在 Linux/Unix 环境中，使用 `orapwd`\
  \ 实用程序创建密码文件，如下所示：\n\n```\n$ cd $ORACLE_HOME/dbs\n$ orapwd file=orapw password=<password>\n\
  ```\n\n在 Linux/Unix 环境中，密码文件通常存储在 `ORACLE_HOME/dbs` 中；在 Windows 中，它通常放置在 `ORACLE_HOME\\\
  database` 目录中。\n\n您在上一条命令中指定的文件名格式可能因操作系统而异。例如，在 Windows 中，格式是 `PWD<ORACLE_SID>.ora`。以下示例展示了\
  \ Windows 环境中的语法：\n\n```\nc:\\> cd %ORACLE_HOME%\\database\nc:\\> orapwd file=PWD<ORACLE_SID>.ora\
  \ password=<password>\n```\n\n要启用密码文件的使用，请将初始化参数 `REMOTE_LOGIN_PASSWORDFILE` 设置为\
  \ `EXCLUSIVE`（这是默认值）。如果该参数未设置为 `EXCLUSIVE`，则您需要修改您的参数文件：\n\n```\nSQL> alter system\
  \ set remote_login_passwordfile='EXCLUSIVE' scope=spfile;\n```\n\n您需要停止并启动实例以使上述设置生效。\n\
  \n您可以通过 `GRANT <any SYS privilege>` 语句向密码文件添加用户。在安全配置中使用这些权限和密码文件时需要谨慎。只有需要这些权限的账户才应被授予访问密码文件的权限。以下示例授予\
  \ `SYSDBA` 权限给 `heera` 用户（从而将 `heera` 添加到密码文件中）：\n\n```\nSQL> grant sysdba to heera;\n\
  Grant succeeded.\n```\n\n启用密码文件还允许您通过 Oracle Net 连接以 `SYS*` 级权限远程连接到您的数据库。此示例展示了具有\
  \ `SYSDBA` 级权限的远程连接语法：\n\n```\n$ sqlplus /@<db_name> as sysdba\n```\n\n这允许您执行需要物理登录到数据库服务器的远程维护操作，这些操作原本需要使用\
  \ `sys*` 权限（`sysdba`、`sysoper`、`sysbackup` 等）。您可以通过查询 `V$PWFILE_USERS` 视图来验证哪些用户拥有\
  \ `sys*` 权限：\n\n```\nSQL> select * from v$pwfile_users;\n```\n\n以下是一些示例输出：\n\n```\n\
  USERNAME                   SYSDB SYSOP SYSAS SYSBA SYSDG SYSKM     CON_ID\n--------------------------\
  \ ----- ----- ----- ----- ----- ----- ----------\nSYS                        TRUE\
  \  TRUE  FALSE FALSE FALSE FALSE          0\n```\n\n特权用户的概念对于 RMAN 备份和恢复也很重要。与 SQL*Plus\
  \ 一样，RMAN 使用操作系统认证和密码文件来允许特权用户连接到数据库。只有特权账户才被允许备份、恢复数据库。\n\n## 启动和停止数据库\n\n在启动和停止\
  \ Oracle 实例之前，您必须设置正确的操作系统变量（本章前面已介绍）。您还需要访问特权操作系统账户或特权数据库用户账户。以特权用户身份连接允许您执行管理任务，例如启动、停止和创建数据库。您可以使用操作系统认证或密码文件以特权用户身份连接到您的数据库。\n\
  \n### 理解操作系统认证\n\n操作系统认证意味着，如果您可以通过授权的操作系统账户登录到数据库服务器，则允许您连接到数据库，而无需额外的密码。一个简单的例子演示了这个概念。首先，使用\
  \ `id` 命令显示 `oracle` 用户所属的操作系统组：\n\n```\n$ id\nuid=500(oracle) gid=506(oinstall)\
  \ groups=506(oinstall),507(dba),508(oper)\n```\n\n接下来，使用 `SYSDBA` 特权连接到数据库，故意使用错误（无效）的用户名和密码：\n\
  \n```\n$ sqlplus bad/notgood as sysdba\n```\n\n我现在可以验证是否已建立与 `SYS` 的连接：\n\n```\n\
  SYS@o18c> show user\nUSER is \"SYS\"\n```\n\n\n## Oracle 数据库连接、启动与停止指南\n\n### 数据库连接认证\n\
  \n如何能够使用错误的用户名和密码连接到数据库？实际上，这并非坏事（正如你最初可能认为的那样）。之前的连接之所以有效，是因为 Oracle 忽略了所提供的用户名/密码，因为用户首先通过操作系统认证被验证。在该示例中，`oracle`操作系统用户属于`dba`操作系统组，因此被允许在不提供正确用户名和密码的情况下，以`SYSDBA`权限进行本地数据库连接。\n\
  请参见第 1 章中的表 1-1，了解操作系统组及其映射到相应数据库权限的完整描述。典型的组包括`dba`和`oper`；这些组分别对应`sysdba`和`sysoper`数据库权限。`sysdba`和`sysoper`权限允许你执行管理任务，例如启动和停止数据库。\n\
  \n在 Windows 环境中，操作系统组会被自动创建（通常命名为`ora_dba`）并分配给安装 Oracle 软件的操作系统用户。你可以按如下方式验证哪些操作系统用户属于`ora_dba`组：选择“开始”>“控制面板”>“管理工具”>“计算机管理”>“本地用户和组”>“组”。你应该会看到一个名为`ora_dba`的组。你可以单击该组并查看分配给它的操作系统用户。此外，为了使操作系统认证在\
  \ Windows 环境中工作，必须在`sqlnet.ora`文件中包含以下条目：\n\n```\nSQLNET.AUTHENTICATION_SERVICES=(NTS)\n\
  ```\n\n`sqlnet.ora`文件通常位于`ORACLE_HOME/network/admin`目录中。\n\n### 启动数据库\n\n启动和停止数据库是你经常执行的任务。要启动/停止数据库，请使用具有`sysdba`或`sysoper`权限的用户账户连接，并发出`startup`和`shutdown`语句。\n\
  以下示例使用操作系统认证连接到数据库：\n\n```\n$ sqlplus / as sysdba\n```\n\n以特权账户连接后，可以如下启动数据库：\n\n\
  ```\nSQL> startup;\n```\n\n要使前面的命令生效，需要在`ORACLE_HOME/dbs`目录中有一个`spfile`或`init.ora`文件。详情请参阅本章前面的“步骤\
  \ 2：配置初始化文件”部分。\n\n**注意：** 在 DBA 领域中，快速连续地停止和重启数据库俗称“bouncing your database”。\n\n\
  当实例成功启动时，你应该会看到来自 Oracle 的消息，表明系统全局区（SGA）已分配。数据库被装载然后打开：\n\n```\nORACLE instance\
  \ started.\nTotal System Global Area  313159680 bytes\nFixed Size              \
  \    2259912 bytes\nVariable Size             230687800 bytes\nDatabase Buffers\
  \           75497472 bytes\nRedo Buffers                4714496 bytes\nDatabase\
  \ mounted.\nDatabase opened.\n```\n\n从前面的输出来看，打开 Oracle 数据库的启动操作经历了三个不同的阶段：\n\n\
  1.  启动实例\n2.  装载数据库\n3.  打开数据库\n\n在启动数据库时，可以逐步执行这些阶段。首先，启动 Oracle 实例（后台进程和内存结构）：\n\
  \n```\nSQL> startup nomount;\n```\n\n接下来，装载数据库。此时，Oracle 读取控制文件：\n\n```\nSQL> alter\
  \ database mount;\n```\n\n最后，打开数据文件和联机重做日志文件：\n\n```\nSQL> alter database open;\n\
  ```\n\n这个启动过程如图 2-2 所示。\n\n![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig2_HTML.jpg](img/214899_3_En_2_Fig2_HTML.jpg)\n\
  \n*图 2-2 Oracle 启动阶段*\n\n当你发出不带任何参数的`STARTUP`语句时，Oracle 会自动逐步执行三个启动阶段（nomount、mount、open）。在大多数情况下，你会发出不带参数的`STARTUP`语句来启动数据库。表\
  \ 2-3 描述了可与数据库`STARTUP`语句一起使用的参数含义。\n\n*表 2-3 `startup`命令可用参数*\n\n| 参数 | 含义 |\n\
  | :--- | :--- |\n| `FORCE` | 在重新启动前以`ABORT`模式关闭实例；对于排查启动问题很有用；通常不使用 |\n| `RESTRICT`\
  \ | 仅允许具有`RESTRICTED SESSION`权限的用户连接到数据库 |\n| `PFILE` | 指定启动实例时要使用的客户端参数文件 |\n|\
  \ `QUIET` | 抑制启动实例时显示 SGA 信息 |\n| `NOMOUNT` | 启动后台进程并分配内存；不读取控制文件 |\n| `MOUNT` |\
  \ 启动后台进程、分配内存并读取控制文件 |\n| `OPEN` | 启动后台进程、分配内存、读取控制文件，并打开联机重做日志和数据文件 |\n| `OPEN\
  \ RECOVER` | 在打开数据库之前尝试介质恢复 |\n| `OPEN READ ONLY` | 以只读模式打开数据库 |\n| `UPGRADE` |\
  \ 在升级数据库时使用 |\n| `DOWNGRADE` | 在降级数据库时使用 |\n\n### 停止数据库\n\n通常，使用`SHUTDOWN IMMEDIATE`语句来停止数据库。`IMMEDIATE`参数指示\
  \ Oracle 停止数据库活动并回滚所有打开的事务：\n\n```\nSQL> shutdown immediate;\nDatabase closed.\n\
  Database dismounted.\nORACLE instance shut down.\n```\n\n表 2-4 提供了`SHUTDOWN`语句可用参数的详细定义。在大多数情况下，`SHUTDOWN\
  \ IMMEDIATE`是关闭数据库的可接受方法。如果你发出不带参数的`SHUTDOWN`命令，则等同于发出`SHUTDOWN NORMAL`。\n\n*表 2-4\
  \ `SHUTDOWN`命令可用参数*\n\n| 参数 | 含义 |\n| :--- | :--- |\n| `NORMAL` | 等待用户注销活动会话后再关闭。\
  \ |\n| `TRANSACTIONAL` | 等待事务完成，然后终止会话。 |\n| `TRANSACTIONAL LOCAL` | 仅对本地实例执行事务性关闭。\
  \ |\n| `IMMEDIATE` | 立即终止活动会话。打开的事务将被回滚。 |\n| `ABORT` | 立即终止实例。事务被终止且不会被回滚。 |\n\n\
  启动和停止数据库是一个相当简单的过程。如果环境设置正确，你应该能够连接到数据库并发出适当的`STARTUP`和`SHUTDOWN`语句。\n\n**提示：**\
  \ 如果在启动或停止数据库时遇到任何问题，请查看告警日志以获取详细信息。告警日志通常包含有关任何问题的相关消息。\n\n你很少需要使用`SHUTDOWN ABORT`语句。通常，`SHUTDOWN\
  \ IMMEDIATE`就足够了。话虽如此，使用`SHUTDOWN ABORT`并没有什么错。如果`SHUTDOWN IMMEDIATE`由于任何原因不起作用，那么就使用`SHUTDOWN\
  \ ABORT`。还要记住，在`SHUTDOWN ABORT`命令之后启动时，数据库将需要恢复介质文件，并且可能需要相当长的时间来处理这些文件。\n\n在少数极少数情况下，`SHUTDOWN\
  \ ABORT`会失效。在这些情况下，你可以使用`ps -ef | grep smon`来定位 Oracle 系统监控进程，然后使用 Linux/Unix 的`kill`命令来终止实例。当你杀死一个必需的\
  \ Oracle 后台进程时，这会导致实例中止。显然，应仅将操作系统`kill`命令作为最后手段使用。\n\n\n\n## 数据库与实例\n\n虽然数据库管理员（DBA）经常将\
  \ `database` 和 `instance` 这两个术语互换使用，但它们指的是架构中截然不同的组成部分。在 Oracle 中，`database` 一词指的是构成数据库的物理文件：数据文件、在线重做日志文件和控制文件。而\
  \ `instance` 一词则指后台进程和内存结构。\n\n例如，你可以在没有数据库的情况下创建一个实例。在物理创建数据库之前，你必须使用 `STARTUP\
  \ NOMOUNT` 语句来启动实例。在此状态下，你拥有后台进程和内存结构，但没有任何关联的数据文件、在线重做日志或控制文件。数据库文件直到你执行 `CREATE\
  \ DATABASE` 语句才会创建。\n\n另一个需要记住的重点是，一个实例只能与一个数据库关联，而一个数据库可以与许多不同的实例关联（例如 Oracle 真正应用集群\
  \ [RAC]）。一个实例只能挂载并打开一个数据库一次。每次你停止并启动数据库时，都会有一个新的实例与之关联。先前创建的后台进程和内存结构永远不会与数据库关联。\n\
  \n为了演示这个概念，使用 `ALTER DATABASE CLOSE` 语句关闭一个数据库：\n\n```\nSQL> alter database close;\n\
  ```\n\n如果你尝试重新打开数据库，会收到一个错误：\n\n```\nSQL> alter database open;\nERROR at line 1:\n\
  ORA-16196: database has been previously opened and closed\n```\n\n这是因为一个实例只能挂载并打开一个数据库。在挂载并打开数据库之前，你必须停止并启动一个新的实例。\n\
  \n## 使用 dbca 创建数据库\n\n你也可以使用 `dbca` 实用程序来创建数据库。该实用程序有两种模式：图形模式和静默模式。要以图形模式使用 `dbca`，请确保安装了正确的\
  \ X 软件，然后执行 `xhost +` 命令，并确认你的 `DISPLAY` 变量已设置；例如，\n\n```\n$ xhost +\n$ echo $DISPLAY\n\
  :0.0\n```\n\n要以图形模式运行 `dbca`，请在操作系统命令行中输入 `dbca`：\n\n```\n$ dbca\n```\n\n图形模式非常直观，将引导你完成创建数据库的所有方面。如果你刚接触\
  \ Oracle 并希望获得明确的选项提示，可能会更喜欢使用此模式。\n\n你也可以使用响应文件以静默模式运行 `dbca`。在某些情况下，使用图形模式运行 `dbca`\
  \ 并不可行。这可能是由于网络缓慢或 X 软件不可用。要使用 `dbca` 的静默模式创建数据库，请执行以下步骤：\n\n1.  定位 `dbca.rsp` 文件。\n\
  2.  复制一份 `dbca.rsp` 文件。\n3.  根据你的环境修改 `dbca.rsp` 文件的副本。\n4.  以静默模式运行 `dbca` 实用程序。\n\
  \n首先，导航到你复制 Oracle 数据库安装软件的位置，并使用 `find` 命令定位 `dbca.rsp`：\n\n```\n$ find . -name\
  \ dbca.rsp\n./18.0.0.0/database/response/dbca.rsp\n```\n\n复制该文件，这样你就不会修改原始文件（这样，你始终会有一个完好的原始文件）：\n\
  \n```\n$ cp dbca.rsp mydb.rsp\n```\n\n现在，编辑 `mydb.rsp` 文件。至少，你需要修改以下参数：`GDBNAME`、`SID`、`SYSPASSWORD`、`SYSTEMPASSWORD`、`SYSMANPASSWORD`、`DBSNMPPASSWORD`、`DATAFILEDESTINATION`、`STORAGETYPE`、`CHARACTERSET`\
  \ 和 `NATIONALCHARACTERSET`。以下是 `mydb.rsp` 文件中修改后的值示例：\n\n```\n[CREATEDATABASE]\n\
  GDBNAME = \"O18DEV\"\nSID = \"O18DEV\"\nTEMPLATENAME = \"General_Purpose.dbc\"\n\
  SYSPASSWORD = \"foo\"\nSYSTEMPASSWORD = \"foo\"\nSYSMANPASSWORD = \"foo\"\nDBSNMPPASSWORD\
  \ = \"foo\"\nDATAFILEDESTINATION =\"/u01/dbfile\"\nSTORAGETYPE=\"FS\"\nCHARACTERSET\
  \ = \"AL32UTF8\"\nNATIONALCHARACTERSET= \"UTF8\"\n```\n\n接下来，使用响应文件以静默模式运行 `dbca`\
  \ 实用程序：\n\n```\n$ dbca -silent -responseFile /home/oracle/orainst/mydb.rsp\n```\n\
  \n你应该会看到类似下面的输出：\n\n```\nCopying database files\n1% complete\n...\nCreating and\
  \ starting Oracle instance\n...\n62% complete\nCompleting Database Creation\n...\n\
  100% complete\nLook at the log file ... for further details.\n```\n\n如果你查看日志文件，请注意\
  \ `dbca` 实用程序使用 `rman` 实用程序来恢复用于数据库的数据文件。然后，它创建实例并执行安装后步骤。在 Linux 服务器上，你的新数据库也应该在\
  \ `/etc/oratab` 文件中有一个条目。\n\n许多 DBA 启动 `dbca` 并以图形模式配置数据库，但很少有人利用响应文件提供的选项。通过有效利用响应文件，你可以持续地自动化数据库创建过程。你可以修改响应文件以在\
  \ ASM 上构建数据库，甚至创建 RAC 数据库。此外，你几乎可以控制响应文件的每个方面，类似于以图形模式启动 `dbca`。\n\n> 提示\n> 你可以通过\
  \ help 参数查看 `dbca` 的所有选项：`dbca -help`\n\n## 使用 dbca 生成创建数据库语句\n\n你可以使用 `dbca` 实用程序生成\
  \ `CREATE DATABASE` 语句。你可以通过图形界面交互进行，也可以通过静默模式进行。关键在于选择“自定义数据库模板”并同时指定“生成数据库创建脚本”选项。此示例使用静默模式生成一个包含\
  \ `CREATE DATABASE` 语句的脚本：\n\n```\n$ dbca -silent -generateScripts -customCreate\
  \ -templateName New_Database.dbt \\\n-gdbName DKDEV\n```\n\n上面的代码指示 `dbca` 创建一个名为\
  \ `CreateDB.sql` 的脚本，并将其放置在 `ORACLE_BASE/admin/DKDEV/scripts` 目录中。`CreateDB.sql`\
  \ 文件内包含一个 `CREATE DATABASE` 语句。同时还会创建一个用于初始化实例的 `init.ora` 文件。\n\n在此示例中，创建数据库所需的脚本已为你生成。在你手动运行这些脚本之前，不会创建任何数据库。\n\
  \n此技术为你提供了一种自动化生成 `CREATE DATABASE` 语句的方法。如果你刚接触 Oracle 且不确定如何构造 `CREATE DATABASE`\
  \ 语句，或者如果你正在使用新版本的数据库并希望获得由 Oracle 实用程序生成的有效 `CREATE DATABASE` 语句，此方法尤其有用。\n\n##\
  \ 删除数据库\n\n如果你有一个不再使用的数据库需要删除，可以使用 `DROP DATABASE` 语句来完成。这样做将删除与该数据库关联的所有数据文件、控制文件和在线重做日志。\n\
  \n不用说，删除数据库时要极其谨慎。在删除数据库之前，请确保你在正确的服务器上并连接到了正确的数据库。在 Linux/Unix 系统上，在操作系统提示符下执行以下操作系统命令：\n\
  \n```\n$ uname -a\n```\n\n接下来，连接到 SQL*Plus，并确保连接到你想要删除的数据库：\n\n```\nSQL> select\
  \ name from v$database;\n```\n\n确认你处于正确的数据库环境后，从具有 `SYSDBA` 权限的帐户执行以下 SQL 命令：\n\n\
  ```\nSQ> shutdown immediate;\nSQL> startup mount exclusive restrict;\nSQL> drop\
  \ database;\n```\n\n> 警告\n> 显然，删除数据库时要格外小心。在删除数据库时不会提示你，并且截至本文撰写时，没有 `UNDROP ACCIDENTALLY\
  \ DROPPED DATABASE` 命令。删除数据库时请极度谨慎，因为此操作会删除数据文件、控制文件和在线重做日志文件。\n\n`DROP DATABASE`\
  \ 命令在你有一个需要移除的数据库时非常有用。它可能是一个测试数据库或一个不再使用的旧数据库。`DROP DATABASE` 命令不会删除旧的归档重做日志文件。你必须使用操作系统命令（例如\
  \ Linux/Unix 中的 `rm`，或 Windows 命令提示符下的 `del`）手动删除这些文件。你也可以指示 RMAN 删除归档重做日志文件。\n\n\
  ## 一台服务器上可以有多少个数据库？\n\n\n\n## Oracle 数据库架构部署选项\n\n在创建新数据库时，一个常见的问题是：一台服务器上应该放置多少个数据库？一个极端情况是每台数据库服务器上只运行一个数据库。这种架构如图\
  \ 2-3 所示，展示了两台不同的数据库服务器，每台都有自己的 Oracle 二进制文件安装。这种设置对硬件供应商有利，但在许多环境中并非经济的资源利用方式。\n\
  \n![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig3_HTML.jpg](img/214899_3_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3 每个数据库使用一台服务器的架构\n\n如果你有足够的内存、中央处理器（CPU）和磁盘资源，那么应考虑在一台服务器上创建多个数据库。你可以为每个数据库创建一个新的\
  \ Oracle 二进制文件安装，或者让多个数据库共享一套 Oracle 二进制文件。图 2-4 展示了一个使用一套共享的 `Oracle binaries`，由一台服务器上的多个数据库共享的配置。当然，如果你需要不同版本的\
  \ `Oracle binaries`，则必须有多个 `Oracle homes` 来容纳这些安装。\n\n![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig4_HTML.jpg](img/214899_3_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4 一台服务器上的多个数据库共享一套 `Oracle binaries`\n\n如果你没有足够的 CPU、内存或磁盘资源在一台服务器上创建多个数据库，可以考虑使用一个数据库来承载多个应用程序和用户，如图\
  \ 2-5 所示。在此类环境中，注意不要使用公共同义词，因为应用程序之间可能存在冲突。通常的做法是为不同的应用程序创建不同的 `schemas` 和 `tablespaces`。\n\
  \n![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig5_HTML.jpg](img/214899_3_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5 一个数据库被多个应用程序和用户使用\n\n从 Oracle Database 18c 开始，你可以选择使用可插拔数据库功能。该技术允许你将多个可插拔数据库置于一个容器数据库中。这些\
  \ `pluggable databases` 共享实例、后台进程、`undo` 和 `Oracle binaries`，但作为完全独立的数据库运行。每个 `pluggable\
  \ database` 都有自己的表空间集合（包括 `SYSTEM`），这些表空间对容器内的其他 `pluggable databases` 不可见。这使你能够安全地实现一个与其他数据库共享资源的隔离数据库。图\
  \ 2-6 描述了此架构（有关如何实现可插棒数据库的详细信息，请参见第[23](https://doi.org/10.1007/978-1-4842-4424-1_23)章）。\n\
  \n![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig6_HTML.jpg](img/214899_3_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6 包含多个可插拔数据库的一个容器数据库\n\n在决定是否使用一个数据库来承载多个应用程序和用户时，必须考虑以下几个架构方面：\n\n*   应用程序生成的重做日志量是否差异巨大，这可能需要不同大小的在线重做日志？\n\
  *   应用程序使用的查询是否差异足够大，以至于需要不同数量的 `undo`、排序空间和内存？\n*   应用程序类型是否需要不同的数据库块大小，例如用于 OLTP\
  \ 数据库的 8KB，或用于数据仓库的 32KB？\n*   是否有安全、可用性、复制或性能要求需要将某个应用程序隔离？\n*   某个应用程序是否需要仅在 Oracle\
  \ 企业版中可用的功能？\n*   某个应用程序是否需要使用任何特殊的 Oracle 功能，如 `Data Guard`、分区、`Streams` 或 `RAC`？\n\
  *   每个应用程序的备份和恢复要求是什么？是否一个应用程序需要联机备份而另一个不需要？是否一个应用程序需要磁带备份？\n*   是否有任何应用程序依赖于特定的\
  \ Oracle 数据库版本？是否会有不同的数据库升级计划和要求？\n\n表 2-5 描述了关于如何使用 Oracle 数据库和应用程序的这些架构考量的优缺点。这仅仅是查看数据库实例，而没有使用包含容器和可插棒数据库的多租户架构。当我们利用容器时（这允许你在更少的服务器上整合），我们将重新审视这些缺点。这将在第\
  \ 22 章讨论。\n\n表 2-5 Oracle 数据库配置的优缺点\n\n配置 | 优点 | 缺点\n--- | --- | ---\n每个数据库一台服务器\
  \ | 为使用数据库的应用程序提供专用资源；将应用程序彼此完全隔离； | 最昂贵；需要更多硬件\n每台服务器多个数据库和多个 Oracle home | 需要更少的服务器\
  \ | 多个数据库竞争磁盘、内存和 CPU 资源\n每台服务器多个数据库和一套 Oracle binaries 安装 | 需要更少的服务器；不需要多个 Oracle\
  \ binaries 安装 | 多个数据库竞争磁盘、内存和 CPU 资源\n一个数据库和一个 Oracle home 服务多个应用程序 | 只需要一台服务器和一个数据库；成本低廉\
  \ | 多个应用程序依赖于一个数据库；单一故障点\n容器数据库包含多个可插棒数据库 | 成本最低；允许多个可插棒数据库安全地使用一个父容器数据库的基础设施 |\
  \ 多个数据库竞争磁盘、内存和 CPU 资源；多个应用程序依赖于一个数据库；单一故障点\n\n### 理解 Oracle 架构\n\n本章介绍了诸如数据库（数据文件、在线重做日志文件、控制文件）、实例（后台进程和内存结构）、参数文件、密码文件和监听器等概念。现在是一个好时机来展示一个\
  \ Oracle 架构图，展示构成数据库和实例的各种文件和过程。图 2-7 中描绘的一些概念已经详细涵盖：例如，数据库与实例。图 2-7 的其他方面将在未来的章节中介绍。然而，在此处包含这样一个高级别的图表是合适的，以便可视化地表示已经讨论过的概念，并为理解本书接下来的主题奠定基础。\n\
  \n![../images/214899_3_En_2_Chapter/214899_3_En_2_Fig7_HTML.jpg](img/214899_3_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7 Oracle 数据库架构\n\n\n\n关于图 2-7，有几个方面需要注意。与数据库的通信是通过一个`sqlplus`用户进程发起的。通常，用户进程通过网络连接到数据库。这要求你配置并启动一个**监听器**进程。监听器进程将传入连接请求转交给一个\
  \ Oracle 服务器进程，该进程处理与客户端进程的所有后续通信。如果远程连接是以`sys*`级别用户发起的，则需要一个**密码文件**。对于不使用操作系统认证的本地`sys*`连接，也需要一个密码文件。\n\
  \n实例由内存结构和后台进程组成。实例启动时，会读取参数文件，该文件有助于确定内存进程的大小及实例的其他特性。启动数据库时，实例会经历三个阶段：`nomount`（实例已启动）、`mount`（控制文件已打开）和`open`（数据文件和联机重做日志已打开）。\n\
  \n#### 后台进程\n\n后台进程的数量因数据库版本而异（在最新版 Oracle 中超过 30 个）。你可以通过以下查询查看进程的名称和描述：\n\n```\n\
  SQL> select name, description from v$bgprocess;\n```\n\n主要的后台进程包括\n\n*   `DBWn`：数据库写入器将数据块从数据库缓冲区缓存写入数据文件。\n\
  *   `CKPT`：检查点进程将检查点信息写入控制文件和数据文件头。\n*   `LGWR`：日志写入器将重做信息从日志缓冲区写入联机重做日志。\n*   `ARCn`：归档器将联机重做日志的内容复制到归档重做日志文件。\n\
  *   `RVWR`：恢复写入器在快速恢复区中维护数据块的前映像。\n*   `MMON`：可管理性监视器进程收集自动工作量存储库统计信息。\n*   `MMNL`：可管理性监视器轻量级进程将活动会话历史缓冲区中的统计信息写入磁盘。\n\
  *   `SMON`：系统监视器执行系统级清理操作，包括实例失败时的实例恢复、合并空闲空间以及清理临时空间。\n*   `PMON`：进程监视器清理异常终止的数据库连接，并自动将数据库实例注册到监听器进程。\n\
  *   `RECO`：恢复进程自动解决失败的分布式事务。\n\n#### SGA 内存结构\n\nSGA 的结构因 Oracle 版本而异。你可以通过以下查询查看每个组件的详细信息：\n\
  \n```\nSQL> select pool, name from v$sgastat;\n```\n\n主要的 SGA 内存结构包括\n\n*   `SGA`：SGA\
  \ 是主要的可读写内存区域，由多个缓冲区组成，例如数据库缓冲区缓存、重做日志缓冲区、共享池、大池、Java 池和流池。\n*   数据库缓冲区缓存：缓冲区缓存存储从数据文件读取的数据块的副本。\n\
  *   日志缓冲区：日志缓冲区存储对已修改数据块的更改。\n*   `Shared pool`：共享池包含有关最近执行的`SQL`和`PL/SQL`代码的库缓存信息。共享池还容纳数据字典缓存，其中包含有关数据库、对象和用户的结构信息。\n\
  \n最后，程序全局区（`PGA`）是一个独立于 SGA 的内存区域。`PGA`是特定于进程的内存区域，包含会话变量信息。\n\n## 总结\n\n安装好 Oracle\
  \ 二进制文件后，你就可以创建数据库了。在创建数据库之前，请确保已正确设置所需的**操作系统变量**。你还需要一个初始化文件，并预先创建任何必要的目录。你应该仔细考虑哪些初始化参数应设置为非默认值。一般来说，我尽量使用尽可能多的默认值，只有在有充分理由时才更改初始化参数。如果执行了太多手动流程和步骤，则需要重新审视该流程。对于最新版本的数据库，许多环境变量已设置好；当使用配置助手`dbca`和`netca`时，目录会自动创建。使用响应文件是自动化创建流程的另一种方法。\n\
  \n本章重点介绍如何使用`SQL*Plus`来创建数据库。这是一种高效且可重复的数据库创建方法。在编写`CREATE DATABASE`语句时，请考虑数据文件和联机重做日志的大小，以确定数据库的放置和存储需求。内部参数和大小调整应作为数据库内部知识的一部分来理解，以便于后续故障排除和其他配置。使用最新版本的新特性将提高数据库的效率。有些环境可能仍在使用之前的版本，这使得理解创建数据库所需的内部知识变得更加重要。\n\
  \n我曾在一些环境中工作，管理层要求每台服务器只有一个数据库；除非这是一个包含多个可插拔数据库的容器数据库，否则服务器上存在未利用的资源。一台拥有大内存区域和多\
  \ CPU 的快速服务器应该能够托管多个不同的数据库。在决定一台服务器上放置多少个数据库时，你必须确定哪种架构符合你的业务需求。\n\n创建数据库后，下一步是配置环境，以便能够高效地导航、操作和监控数据库。这些任务将在下一章中描述。\n\
  \n## 3. 配置高效环境\n\n安装好 Oracle 二进制文件并创建数据库后，你应该配置你的环境，以实现高效操作。无论图形化数据库管理工具的功能如何，DBA\
  \ 仍然需要从操作系统命令行执行许多任务并手动执行`SQL`语句。善于利用操作系统和`SQL`的 DBA 相比不擅长的 DBA 具有明显的优势。\n\n在任何数据库环境（Oracle、MySQL\
  \ 等）中，高效的 DBA 会利用先进的操作系统特性，以便快速导航目录、定位文件、重复命令、显示系统瓶颈等。要实现这种效率，你必须对承载数据库的操作系统有深入了解。\n\
  \n除了熟练掌握操作系统外，你还必须精通用于访问数据库的`SQL`接口。虽然你可以从图形界面获取大量诊断信息，但`SQL`使你能够深入内部进行高级故障排除并获取数据库情报。\n\
  \n本章为高效使用操作系统和`SQL`来管理数据库奠定了基础。你可以使用以下操作系统和数据库特性来配置一个高效的环境：\n\n*   操作系统变量\n*   Shell\
  \ 别名\n*   Shell 函数\n*   Shell 脚本\n*   `SQL` 脚本\n\n\n\n## 面向数据库管理员的高效环境管理\n\n当你处于高压环境时，拥有一个能够让你快速辨识当前位置、所用账户的环境，并配备有助于快速定位问题的工具，是至关重要的。本章描述的技术如同杠杆：它们为快速完成大量工作提供助力。这些工具让你能够专注于可能面临的问题，而不是验证当前位置或担心命令语法。\n\
  \n本章首先详细介绍实现最高效率的操作系统技术。后续章节将展示如何使用这些工具自动显示环境详情、导航文件系统、主动监控数据库以及进行问题分级处理。\n\n###\
  \ 提示：使用一致的 Shell\n\n在数据库服务器上工作时，请始终使用同一种操作系统 Shell。我推荐你使用 Bash Shell；它包含了其他 Shell（如\
  \ Korn Shell 和 C Shell）中所有最实用的特性，并且还拥有额外的功能，使其更易于使用。\n\n### 自定义操作系统命令提示符\n\n通常，数据库管理员需要操作多台服务器和多个数据库。在这种情况下，你的屏幕上可能会打开大量的终端会话。你可以运行以下类型的命令来识别当前工作环境：\n\
  \n```\n$ hostname -a\n$ id\n$ who am i\n$ echo $ORACLE_SID\n$ pwd\n```\n\n为避免混淆你正在哪台服务器上工作，通常需要配置你的命令提示符，以显示有关其环境的信息，例如机器名和数据库\
  \ SID。在此示例中，命令提示符名称被自定义为包含主机名、用户和 Oracle SID：\n\n```\n$ PS1='[\\h:\\u:${ORACLE_SID}]$\
  \ '\n```\n\n`\\h` 用于指定主机名。`\\u` 用于指定当前操作系统用户。`$ORACLE_SID` 包含了你的 Oracle 实例标识符的当前设置。这是此示例的命令提示符：\n\
  \n```\n[oracle18c:oracle:o18c]$\n```\n\n该命令提示符包含了关于环境的三条重要信息：服务器名、操作系统用户名和数据库名。当你在多个环境之间导航时，设置命令提示符可以成为追踪你所在位置和所处环境的宝贵工具。\n\
  \n如果你希望在登录时操作系统提示符被自动配置，那么你需要在启动文件中进行设置。在 Bash Shell 环境中，通常使用`.bashrc`文件。此文件通常位于你的`HOME`目录中。将以下代码行放入`.bashrc`文件：\n\
  \n```\nPS1='[\\h:\\u:${ORACLE_SID}]$ '\n```\n\n当你将这行代码放入启动文件后，那么每次登录服务器时，你的操作系统提示符都会为你自动设置好。在其他\
  \ Shell 中，例如 Korn Shell，`.profile`文件是启动文件。\n\n根据个人偏好，你可能希望根据特定需求修改命令提示符。例如，许多 DBA\
  \ 喜欢在命令提示符中显示当前工作目录。要显示当前工作目录信息，请添加`\\w`变量：\n\n```\n$ PS1='[\\h:\\u:\\w:${ORACLE_SID}]$\
  \ '\n```\n\n如你所想，命令提示符中显示的信息有多种多样的选项。这是另一种流行的格式：\n\n```\n$ PS1='[\\u@${ORACLE_SID}@\\\
  h:\\W]$ '\n```\n\n表 3-1 列出了许多可用于自定义操作系统命令提示符的 Bash Shell 变量。\n\n#### 表 3-1：用于自定义命令提示符的\
  \ Bash Shell 转义变量\n\n| 变量 | 描述 |\n| :--- | :--- |\n| `\\a` | ASCII 铃声字符 |\n| `\\\
  d` | 日期，格式为“星期 月份 日期” |\n| `\\h` | 主机名 |\n| `\\e` | ASCII 转义字符 |\n| `\\j` | 当前 Shell\
  \ 管理的作业数量 |\n| `\\l` | Shell 终端设备的基本名称 |\n| `\\n` | 换行符 |\n| `\\r` | 回车符 |\n| `\\\
  s` | Shell 的名称 |\n| `\\t` | 时间，格式为 24 小时制 HH:MM:SS |\n| `\\T` | 时间，格式为 12 小时制 HH:MM:SS\
  \ |\n| `\\@` | 时间，格式为 12 小时制 am/pm |\n| `\\A` | 时间，格式为 24 小时制 HH:MM |\n| `\\u` |\
  \ 当前 Shell 用户 |\n\n\n## Bash Shell 与 SQL*Plus 提示符的自定义\n\n### Bash Shell 变量\n\n以下是一些可用于自定义\
  \ Bash 提示符 (`PS1`) 的特殊变量：\n\n| 变量 | 描述 |\n| :--- | :--- |\n| `\\v` | Bash shell\
  \ 的版本 |\n| `\\V` | Bash shell 的发布版本 |\n| `\\w` | 当前工作目录 |\n| `\\W` | 当前工作目录的基本名称（非完整路径）\
  \ |\n| `\\!` | 命令的历史编号 |\n| `\\$` | 如果有效用户标识符 (UID) 为 0，则显示 `#`；否则显示 `$` |\n\n可供命令提示符使用的变量在操作系统和\
  \ shell 之间有所不同。例如，在 Korn shell 环境中，`hostname` 变量会在操作系统提示符中显示服务器名称：\n\n```bash\n\
  $ export PS1=\"[`hostname`]$ \"\n```\n\n如果想在该字符串中包含 `ORACLE_SID` 变量，可以按如下方式设置：\n\
  \n```bash\n$ export PS1=[`hostname`':\"${ORACLE_SID}\"]$ '\n```\n\n尽量不要在操作系统提示符中显示过多信息。过多信息会限制您在单行输入和查看命令的能力。作为经验法则，您至少应该在操作系统提示符中包含服务器名称和数据库名称。随时拥有这些信息可以避免您误以为处于一个环境而实际上处于另一个环境的错误。\n\
  \n### 自定义 SQL 提示符\n\nDBA 经常使用 SQL*Plus 来执行日常管理任务。通常，您会在包含多个数据库的服务器上工作。显然，每个数据库包含多个用户账户。连接到数据库时，可以运行以下命令来验证用户名、数据库连接和主机名等信息：\n\
  \n```sql\nSQL> show user;\nSQL> select name from v$database;\n```\n\n这对于验证开发账户与生产账户以保持它们分离非常有用。除了查询数据库之外，使用\
  \ SQLPROMPT 提供快速的视觉提示，将确保为任何查询、更改等使用正确的环境。\n\n一个更高效的方法是设置 SQL 提示符来显示这些信息；例如：\n\n\
  ```sql\nSQL> SET SQLPROMPT '&_USER.@&_CONNECT_IDENTIFIER.> '\n```\n\n更有效的配置 SQL\
  \ 提示符的方法是在登录 SQL*Plus 时自动运行 `SET SQLPROMPT` 命令。请按照以下步骤完全自动化此过程：\n\n1.  创建一个名为 `login.sql`\
  \ 的文件，并在其中放入 `SET SQLPROMPT` 命令。\n2.  设置您的 `SQLPATH` 操作系统变量以包含 `login.sql` 的目录位置。在此示例中，`SQLPATH`\
  \ 操作系统变量在 `.bashrc` 操作系统文件中设置，该文件在每次登录或启动新 shell 时都会执行。以下是该条目：\n\n    ```bash\n\
  \    export SQLPATH=$HOME/scripts\n    ```\n\n3.  在 `$HOME/scripts` 目录中创建一个名为 `login.sql`\
  \ 的文件。在文件中放入以下行：\n\n    ```sql\n    SET SQLPROMPT '&_USER.@&_CONNECT_IDENTIFIER.>\
  \ '\n    ```\n\n4.  要查看结果，您可以注销然后重新登录到服务器，或者直接 source `.bashrc` 文件：\n\n    ```bash\n\
  \    $ . ./.bashrc\n    ```\n\n现在，登录到 SQL。以下是 SQL*Plus 提示符的示例：\n\n```sql\nSYS@devdb1>\n\
  ```\n\n如果连接到不同的用户，这应该反映在提示符中：\n\n```sql\nSQL> conn system/foo\n```\n\nSQL*Plus 提示符现在显示：\n\
  \n```sql\nSYSTEM@devdb1>\n```\n\n设置 SQL 提示符是一种简单的方法，可以提醒您当前连接的环境和用户。这将有助于防止您意外地在错误环境中运行\
  \ SQL 语句。您最不希望发生的事情就是误以为自己处于开发环境，却发现在连接到生产环境时运行了删除对象的脚本。\n\n表 3-2 包含您可以用来自定义提示符的\
  \ SQL*Plus 变量的完整列表。\n\n**表 3-2** 预定义的 SQL*Plus 变量\n\n| 变量 | 描述 |\n| :--- | :---\
  \ |\n| `_CONNECT_IDENTIFIER` | 连接标识符，例如 Oracle SID |\n| `_DATE` | 当前日期 |\n| `_EDITOR`\
  \ | SQL `EDIT` 命令使用的编辑器 |\n| `_O_VERSION` | Oracle 版本 |\n| `_O_RELEASE` | Oracle\
  \ 发布版本 |\n| `_PRIVILEGE` | 当前连接会话的权限级别 |\n| `_SQLPLUS_RELEASE` | SQL*Plus 发布号 |\n\
  | `_USER` | 当前连接的用户 |\n\n## 为常用命令创建快捷方式\n\n在 Linux/Unix 环境中，您可以使用两种常见方法为其他命令创建快捷方式：为经常重复的命令创建别名，以及使用函数为命令组形成快捷方式。以下部分描述了您可以部署这两种技术的方法。\n\
  \n### 使用别名\n\n别名是一种简单的机制，用于创建一小段文本，该文本将执行其他 shell 命令。一般语法如下：\n\n```bash\n$ alias\
  \ name='command'\n```\n\n例如，在遇到数据库问题时，创建一个别名来运行 `cd` 命令，将您置于包含数据库警报日志的目录中通常很有用。此示例创建一个别名（名为\
  \ `bdump`），将当前工作目录更改为警报日志所在的位置：\n\n```bash\n$ alias bdump='cd /u01/app/oracle/diag/rdbms/o18c/o18c/trace'\n\
  ```\n\n现在，您无需键入 `cd` 命令以及冗长（且容易忘记）的目录路径，只需键入 `bdump`，即可进入指定目录：\n\n```bash\n$ bdump\n\
  $ pwd\n/u01/app/oracle/diag/rdbms/o18c/o18c/trace\n```\n\n上述技术允许您高效准确地导航到目标目录。当您在许多不同服务器上管理许多不同的数据库时，这尤其方便。您只需设置一套标准的别名，让您能更高效地导航和工作。\n\
  \n要显示所有已定义的别名，请使用不带参数的 `alias` 命令：\n\n```bash\n$ alias\n```\n\n下面列出了一些您可以使用的常见别名定义示例：\n\
  \n```bash\nalias l.='ls -d .*'\nalias ll='ls -l'\nalias lsd='ls -altr | grep ^d'\n\
  alias sqlp='sqlplus \"/ as sysdba\"'\nalias shutdb='echo \"shutdown immediate;\"\
  \ | sqlp'\nalias startdb='echo \"startup;\" | sqlp'\n```\n\n如果要从当前环境中删除别名定义，请使用\
  \ `unalias` 命令。以下示例删除了 `lsd` 的别名：\n\n```bash\n$ unalias lsd\n```\n\n### 定位警报日志\n\
  \n在 Oracle Database 11g 及更高版本中，警报日志目录路径具有以下结构：\n\n```\nORACLE_BASE/diag/rdbms/db_unique_name/ORACLE_SID/trace\n\
  ```\n\n通常（但并非总是）`db_unique_name` 与 `instance_name` 相同。在 Data Guard 环境中，`db_unique_name`\
  \ 通常与 `instance_name` 不同。您可以使用以下查询验证目录路径：\n\n```sql\nSQL> select value from v$diag_info\
  \ where name = 'Diag Trace';\n```\n\n警报日志的名称遵循以下格式：\n\n```\nalert_<ORACLE_SID>.log\n\
  ```\n\n您也可以通过这些操作系统命令（无论数据库是否已启动）从操作系统定位警报日志：\n\n```bash\n$ cd $ORACLE_BASE\n$ find\
  \ . -name alert_<ORACLE_SID>.log\n```\n\n在上面的 `find` 命令中，您需要将 `<ORACLE_SID>` 值替换为您的数据库名称。\n\
  \n### 使用函数\n\n与别名类似，您也可以使用函数来形成命令快捷方式。函数使用以下通用语法定义：\n\n```bash\n$ function name\
  \ {\nshell commands\n}\n```\n\n例如，以下代码创建了一个简单的函数（名为 `bdump`），允许您根据传入的数据库名称更改当前工作目录：\n\
  \n```bash\nfunction bdump {\nif [ \"$1\" = \"engdev\" ]; then\ncd /orahome/app/oracle/diag/rdbms/engdev/ENGDEV/trace\n\
  elif [ \"$1\" = \"stage\" ]; then\ncd /orahome/app/oracle/diag/rdbms/stage/STAGE/trace\n\
  fi\necho \"Changing directories to $1 Diag Trace directory\"\npwd\n}\n```\n\n您现在可以在命令行键入\
  \ `bdump`，后跟数据库名称，以将工作目录更改为 Oracle 后台转储目录：\n\n```bash\n$ bdump stage\nChanging directories\
  \ to stage Diag Trace directory\n/orahome/app/oracle/diag/rdbms/stage/STAGE/trace\n\
  ```\n\n\n## 使用函数通常优于使用别名\n\n使用函数通常优于使用别名。函数比别名更强大，因为函数具备诸如能够处理从命令行传入的参数、允许多行代码从而实现更复杂编程等特性。\n\
  \n### 管理函数\n\n数据库管理员通常通过将函数设置在 `$HOME/.bashrc` 文件中来建立函数。更好的管理函数方式是创建一个专门存储函数代码的文件，并在\
  \ `.bashrc` 文件中调用该文件。将特殊用途的文件存储在您为其创建的目录中也更好。例如，在 `$HOME` 下创建一个名为 `bin` 的目录。然后，在\
  \ `bin` 目录中，创建一个名为 `dba_fcns` 的文件，并将您的函数代码放入其中。现在，从 `.bashrc` 文件中调用 `dba_fcns` 文件。以下是在\
  \ `.bashrc` 文件中的一个条目示例：\n\n```\n. $HOME/bin/dba_fcns\n```\n\n### 函数示例\n\n下面列出了您可以使用的一些函数类型的小样本：\n\
  \n```\n#### 按排序列表显示环境变量\nfunction envs {\nif test -z \"$1\"\nthen /bin/env | /bin/sort\n\
  else /bin/env | /bin/sort | /bin/grep -i $1\nfi\n} # envs\n#-----------------------------------------------------------#\n\
  \n#### 查找当前位置下最大的文件\nfunction flf {\nfind . -ls | sort -nrk7 | head -10\n}\n#-----------------------------------------------------------#\n\
  \n\n\n## Bash Shell 命令编辑与脚本编写\n\n### 查找最大目录\n```bash\n#### 查找占用空间最大的目录\nfunction\
  \ fld {\ndu -S . | sort -nr | head -10\n}\n```\n\n### Oracle 警报日志导航函数\n```bash\n\
  #-----------------------------------------------------------#\nfunction bdump {\n\
  if [ $ORACLE_SID = \"o18c\" ]; then\ncd /u01/app/oracle/diag/rdbms/o18c/o18c/trace\n\
  elif [ $ORACLE_SID = \"CDB1\" ]; then\ncd /u01/app/oracle/diag/rdbms/cdb1/CDB1/trace\n\
  elif [ $ORACLE_SID = \"rcat\" ]; then\ncd /u01/app/oracle/diag/rdbms/rcat/rcat/trace\n\
  fi\npwd\n} # bdump\n```\n\n如果你曾经想知道一个快捷方式是别名还是函数，可以使用 `type` 命令来验证命令的来源。此示例验证 `bdump`\
  \ 是一个函数：\n```bash\n$ type bdump\n```\n\n### 快速重新运行命令\n当数据库服务器出现问题时，你需要能够从操作系统提示符快速运行命令。你可能遇到某种性能问题，需要运行命令来导航到包含日志文件的目录，或者你可能需要不时地显示资源消耗最高的进程。在这些情况下，你不想浪费时间重新输入命令序列。\n\
  \nBash shell 的一个省时特性是它提供了多种方法来编辑和重新运行先前执行过的命令。以下列表突出显示了可用于操作先前输入命令的几个选项：\n*   使用向上（`↑`）和向下（`↓`）箭头键滚动\n\
  *   使用 `Ctrl+P` 和 `Ctrl+N`\n*   列出命令历史记录\n*   进行反向搜索\n*   设置命令编辑器\n\n以下各节简要描述了这些技术。\n\
  \n#### 使用上下箭头键滚动\n你可以使用向上箭头键在最近的命令历史中向上滚动。当你在先前运行的命令中滚动时，可以通过按 `Enter` 或 `Return`\
  \ 键重新运行所需的命令。如果要编辑命令，请使用 `Backspace` 键删除字符，或使用左箭头键在命令文本中导航到所需位置。在命令堆栈中向上滚动后，使用向下箭头键向下滚动回先前查看的命令。\n\
  \n> **注意**\n> 如果你熟悉 Windows，滚动命令堆栈类似于使用 `DOSKEY` 实用程序。\n\n#### 使用 Ctrl+P 和 Ctrl+N\n\
  `Ctrl+P` 按键（同时按下 `Ctrl` 和 `P` 键）显示你先前输入的命令。如果你多次按下了 `Ctrl+P`，可以通过按 `Ctrl+N`（同时按下\
  \ `Ctrl` 和 `N` 键）向下滚动回命令堆栈。\n\n#### 列出命令历史记录\n你可以使用 `history` 命令来显示用户先前输入的命令：\n\
  ```bash\n$ history\n```\n根据之前执行的命令数量，你可能会看到一个很长的堆栈。你可以通过提供一个数字作为命令参数来限制输出为最后 `n`\
  \ 条命令。例如，以下查询列出最后运行的五条命令：\n```bash\n$ history 5\n```\n以下是一些示例输出：\n```\n273  cd -\n\
  274  grep -i ora alert.log\n275  ssh -Y -l oracle 65.217.177.98\n276  pwd\n277 \
  \ history 5\n```\n要运行输出中先前列出的命令，使用感叹号（`!`）（有时称为 bang）后跟历史编号。在此示例中，要运行第 `276` 行的\
  \ `pwd` 命令，按如下方式使用 `!`：\n```bash\n$ !276\n```\n要运行你最后运行的那条命令，请使用 `!!`，如下所示：\n```bash\n\
  $ !!\n```\n\n#### 反向搜索\n按 `Ctrl+R`，你会看到 Bash shell 的反向搜索实用程序：\n```\n$ (reverse-i-search)`':\n\
  ```\n在 `reverse-i-search` 提示符下，当你键入每个字母时，工具会自动搜索先前运行的、包含与你输入的字符串类似文本的命令。一旦显示出你想要的匹配命令，你可以通过按\
  \ `Enter` 或 `Return` 键重新运行该命令。要查看匹配字符串的所有命令，请重复按 `Ctrl+R`。要退出反向搜索，请按 `Ctrl+C`。\n\
  \n#### 设置命令编辑器\n你可以使用 `set -o` 命令将命令行编辑器设置为 `vi` 或 `emacs`。此示例将命令行编辑器设置为 `vi`：\n\
  ```bash\n$ set -o vi\n```\n现在，当你按 `Esc+K` 时，你会进入一种模式，在该模式下可以使用 `vi` 命令来搜索先前输入的命令堆栈。例如，如果你想在命令堆栈中向上滚动，可以使用\
  \ `K` 键；同样，你可以使用 `J` 键向下滚动。在此模式下，你可以使用斜杠（`/`）键，然后键入要在整个命令堆栈中搜索的字符串。\n\n> **提示**\n\
  > 在尝试使用命令编辑器功能之前，请确保你非常熟悉 `vi` 或 `emacs` 编辑器。\n\n一个简短的例子将说明此功能的强大之处。假设你知道大约一小时前运行了\
  \ `ls -altr` 命令。你想再次运行它，但这次不带 `r`（反向排序）选项。要进入命令堆栈，请按 `Esc+K`：\n```bash\n$ Esc+K\n\
  ```\n你现在应该看到你最后执行的命令。要在命令堆栈中搜索 `ls` 命令，键入 `/ls`，然后按 `Enter` 或 `Return`：\n```bash\n\
  $ /ls\n```\n最近执行的 `ls` 命令出现在提示符处：\n```\n$ ls -altr\n```\n要移除 `r` 选项，请使用右箭头键将光标移动到屏幕上的\
  \ `r` 上，然后按 `X` 键将 `r` 从命令末尾删除。编辑完命令后，按 `Enter` 或 `Return` 键执行它。\n\n## 开发标准脚本\n\
  我曾在这样的环境中工作：数据库管理团队开发了数百个脚本和实用程序来帮助管理环境。有一家公司有一小批 DBA，他们的工作职责就是维护环境脚本。我认为这有点过头了。我倾向于使用少量专注的脚本，每个脚本通常不超过\
  \ 50 行。如果你开发的脚本其他 DBA 无法理解或维护，那么它就失去了效力。此外，如果你必须执行某个命令超过几次，就应该创建一个脚本来执行它。如果它现在是标准的、定期的检查或任务，那么该脚本可以用来自动化这个过程。这些脚本非常适合放入将自动运行的任务中，或用于故障排除期间，因为它需要快速完成。还有其他工具也可以维护数据库，并提供针对多个数据库的主动警报和监控，而不是一次对一个数据库运行脚本。\n\
  \n> **注意**\n> 本章中的所有脚本都可以从 Apress 网站的源代码/下载区域下载（[`www.apress.com`](http://www.apress.com)）。\n\
  \n本节包含几个简短的 shell 函数、shell 脚本和 SQL 脚本，它们可以帮助你管理数据库环境。这绝不是一个完整的脚本列表——相反，它提供了一个你可以在此基础上进行构建的起点。每个小节的标题都是脚本的名称。\n\
  \n> **注意**\n> 在尝试运行 shell 脚本之前，请确保它是可执行的。使用 `chmod` 命令来实现这一点：`chmod 750 <script>`\n\
  \n### dba_setup\n通常，你会为每个数据库服务器以相同的方式建立一组常见的操作系统变量和别名。在服务器之间导航时，你应该以一致且可重复的方式设置这些变量和别名。这样做有助于你（或你的团队）在每个环境中高效工作。例如，当你处理几十台不同的服务器时，将操作系统提示符设置为一致的方式非常有用。这有助于你快速识别你所在的机器、你以哪个操作系统用户登录等等。\n\
  \n一种技术是将这些标准设置存储在一个脚本中，然后在你登录服务器时自动执行该脚本。我通常会创建一个名为 `dba_setup` 的脚本来设置这些操作系统变量和别名。你可以将此脚本放在诸如\
  \ `HOME/bin` 之类的目录中，并通过启动脚本自动执行它（请参阅本章后面的“组织脚本”部分）。以下是一个典型的 `dba_setup` 脚本的内容：\n\
  ```bash\n```\n\n\n\n#### 配置 Shell 环境\n\n设置命令提示符：\n\n```bash\nPS1='[\\h:\\u:${ORACLE_SID}]$\
  \ '\n```\n\n设置环境变量和编辑器：\n\n```bash\nexport EDITOR=vi\nexport VISUAL=$EDITOR\nexport\
  \ SQLPATH=$HOME/scripts\nset -o vi\n```\n\n#### 常用别名\n\n```bash\n#### 仅列出目录\nalias\
  \ lsd=\"ls -p | grep /\"\n\n#### 显示消耗 CPU 最多的进程\nalias topc=\"ps -e -o pcpu,pid,user,tty,args\
  \ | sort -n -k 1 -r | head\"\n\n#### 显示消耗内存最多的进程\nalias topm=\"ps -e -o pmem,pid,user,tty,args\
  \ | sort -n -k 1 -r | head\"\n\n#### 以 sysdba 身份登录 SQL*Plus\nalias sqlp='sqlplus\
  \ \"/ as sysdba\"'\n\n#### 立即关闭数据库\nalias shutdb='echo \"shutdown immediate;\" |\
  \ sqlp'\n\n### 启动数据库\nalias startdb='echo \"startup;\" | sqlp'\n```\n\n# `dba_fcns`\n\
  \n使用此脚本来存储有助于在数据库环境中导航和操作的操作系统函数。函数往往比别名具有更多功能。在函数数量和复杂性方面，您可以发挥很大的创意。关键在于，无论您登录到哪个数据库服务器，都希望有一组一致且标准的函数可供调用。\n\
  \n将此脚本放置在诸如 `HOME/bin` 之类的目录中。通常，您会在通过启动脚本登录到服务器时自动调用此脚本（参见本章后面的“组织脚本”部分）。以下是一些您可以使用的典型函数：\n\
  \n```bash\n#-----------------------------------------------------------#\n#### 以排序列表显示环境变量\n\
  function envs {\n  if test -z \"$1\"\n  then /bin/env | /bin/sort\n  else /bin/env\
  \ | /bin/sort | /bin/grep -i $1\n  fi\n} # envs\n#-----------------------------------------------------------#\n\
  \n#### 登录 SQL*Plus\nfunction sp {\n  time sqlplus \"/ as sysdba\"\n} # sp\n#-----------------------------------------------------------#\n\
  \n#### 查找当前目录下最大的文件\nfunction flf {\n  find . -ls | sort -nrk7 | head -10\n}\n#-----------------------------------------------------------#\n\
  \n#### 查找当前目录下占用空间最大的目录\nfunction fld {\n  du -S . | sort -nr | head -10\n}\n#-----------------------------------------------------------#\n\
  \n#### 切换到包含告警日志文件的目录\nfunction bdump {\n  cd /u01/app/oracle/diag/rdbms/o18c/o18c/trace\n\
  } # bdump\n#-----------------------------------------------------------#\n```\n\n\
  # `tbsp_chk.bsh`\n\n此脚本用于检查是否有表空间超过了某个满阈值。将此脚本存储在诸如 `HOME/bin` 之类的目录中。确保修改脚本，使其包含适用于您环境的用户名、密码和电子邮件地址。\n\
  \n您还需要建立所需的 OS 变量，例如 `ORACLE_SID` 和 `ORACLE_HOME`。您可以将这些变量硬编码到脚本中，也可以调用一个为您设置这些变量的脚本。下一个脚本调用了一个名为\
  \ `oraset` 的脚本，该脚本用于设置 OS 变量（有关此脚本的详细信息，请参见第 2 章）。您不必使用此脚本——关键在于为您的环境建立一种一致且可重复的方式来设置\
  \ OS 变量。\n\n您可以从命令行运行此脚本。在此示例中，我传递了数据库名称 (`o18c`)，并希望查看剩余空间少于 20% 的表空间：\n\n```bash\n\
  $ tbsp_chk.bsh o18c 20\n```\n\n输出表明此数据库有两个表空间剩余空间少于 20%：\n\n```text\nspace not okay\n\
  0 % free UNDOTBS1, 17 % free SYSAUX,\n```\n\n以下是 `tbsp_chk.bsh` 脚本的内容：\n\n```bash\n\
  #!/bin/bash\n#\nif [ $# -ne 2 ]; then\n  echo \"Usage: $0 SID threshold\"\n  exit\
  \ 1\nfi\n\n#### 硬编码 OS 变量或从脚本中获取。\n#### 有关使用 oraset 获取 Oracle OS 变量的详细信息，请参见第 2\
  \ 章\n. /var/opt/oracle/oraset $1\n#\ncrit_var=$(\nsqlplus -s <<EOF\nsystem/foo\n\
  SET HEAD OFF TERM OFF FEED OFF VERIFY OFF\nCOL pct_free FORMAT 999\nSELECT (f.bytes/a.bytes)*100\
  \ pct_free,'% free',a.tablespace_name||','\nFROM\n  (SELECT NVL(SUM(bytes),0) bytes,\
  \ x.tablespace_name\n   FROM dba_free_space y, dba_tablespaces x\n   WHERE x.tablespace_name\
  \ = y.tablespace_name(+)\n   AND x.contents != 'TEMPORARY' AND x.status != 'READ\
  \ ONLY'\n   AND x.tablespace_name  NOT LIKE 'UNDO%'\n   GROUP BY x.tablespace_name)\
  \ f,\n  (SELECT SUM(bytes) bytes, tablespace_name\n   FROM dba_data_files\n   GROUP\
  \ BY tablespace_name) a\nWHERE a.tablespace_name = f.tablespace_name\nAND  (f.bytes/a.bytes)*100\
  \ <= $2\nORDER BY 1;\nEXIT;\nEOF)\nif [ \"$crit_var\" = \"\" ]; then\n  echo \"\
  space okay\"\nelse\n  echo \"space not okay\"\n  echo $crit_var\n  echo $crit_var\
  \ | mailx -s \"tbsp getting full on $1\" dkuhn@gmail.com\nfi\nexit 0\n```\n\n通常，您会从调度实用程序（如\
  \ `cron`）自动定期运行此类脚本。以下是一个典型的 `cron` 条目，它每小时运行一次该脚本：\n\n```bash\n#### 表空间检查\n2 *\
  \ * * * /orahome/bin/tbsp_chk.bsh INVPRD 10 1>/orahome/bin/log/tbsp_chk.log 2>&1\n\
  ```\n\n此 `cron` 条目运行作业，并将任何信息性输出存储在 `tbsp_chk.log` 文件中。\n\n当在 Oracle Database 12c\
  \ 可插拔数据库环境中的根容器中运行 `tbsp_chk.bsh` 时，您需要引用 `CDB_*` 视图而不是 `DBA_*` 视图，以便脚本能够正确报告所有可插拔数据库（在容器数据库内）的空间情况。您还应该考虑在查询中添加\
  \ `NAME` 和 `CON_ID`，以便可以查看哪个可插拔数据库可能存在空间问题；例如：\n\n```sql\nSELECT a.name, (f.bytes/a.bytes)*100\
  \ pct_free,'% free',a.tablespace_name||','\nFROM\n  (SELECT c.name, NVL(SUM(bytes),0)\
  \ bytes, x.tablespace_name\n   FROM cdb_free_space y, cdb_tablespaces x, v$containers\
  \ c\n   WHERE x.tablespace_name = y.tablespace_name(+)\n   AND x.contents != 'TEMPORARY'\
  \ AND x.status != 'READ ONLY'\n   AND x.tablespace_name  NOT LIKE 'UNDO%'\n   AND\
  \ x.con_id = y.con_id\n   AND x.con_id = c.con_id\n   GROUP BY c.name, x.tablespace_name)\
  \ f,\n  (SELECT c.name, SUM(d.bytes) bytes, d.tablespace_name\n   FROM cdb_data_files\
  \ d, v$containers c\n   WHERE d.con_id = c.con_id\n   GROUP BY c.name, tablespace_name)\
  \ a\nWHERE a.tablespace_name = f.tablespace_name\nAND  (f.bytes/a.bytes)*100 <=\
  \ 50\nAND   a.name NOT IN ('PDB$SEED')\nAND   a.name = f.name\nORDER BY 1;\n```\n\
  \n# `conn.bsh`\n\n如果数据库连接出现问题，您需要收到警报。此脚本用于检查是否可以建立到数据库的连接。如果无法建立连接，则会发送电子邮件。将此脚本放置在诸如\
  \ `HOME/bin` 之类的目录中。确保修改脚本，使其包含适用于您环境的用户名、密码和电子邮件地址。\n\n您还需要建立所需的 OS 变量，例如 `ORACLE_SID`\
  \ 和 `ORACLE_HOME`。您可以将这些变量硬编码到脚本中，也可以调用一个为您设置这些变量的脚本。与上一个脚本类似，此脚本调用了一个名为 `oraset`\
  \ 的脚本，该脚本用于设置 OS 变量（请参见第 2 章）。\n\n此脚本需要将 `ORACLE_SID` 传递给它；例如：\n\n```bash\n$ conn.bsh\
  \ INVPRD\n```\n\n如果脚本能够建立到数据库的连接，则会显示以下消息：\n\n```text\nsuccess\ndb ok\n```\n\n以下是\
  \ `conn.bsh` 脚本的内容：\n\n```bash\n#!/bin/bash\nif [ $# -ne 1 ]; then\n  echo \"Usage:\
  \ $0 SID\"\n  exit 1\nfi\n\n#### 硬编码 OS 变量或从脚本中获取。\n#### 有关用于获取 OS 变量的 oraset 脚本的详细信息，请参见第\
  \ 2 章\n. /etc/oraset $1\n#\necho \"select 'success' from dual;\" | sqlplus -s system/foo@o18c\
  \ | grep success\nif [[ $? -ne 0 ]]; then\n  echo \"problem with $1\" | mailx -s\
  \ \"db problem\" dkuhn@gmail.com\nelse\n  echo \"db ok\"\nfi\n#\nexit 0\n```\n\n\
  此脚本通常通过 `cron` 等实用程序实现自动化。以下是一个典型的 `cron` 条目：\n\n\n\n#### 检查数据库连接状态。\n\n这是一个`cron`条目：\n\
  ```\n18 * * * * /home/oracle/bin/conn.bsh o18c 1>/home/oracle/bin/log/conn.log 2>&1\n\
  ```\n\n这个`cron`条目每小时运行一次脚本。根据你的可用性需求，你可能需要更频繁地运行类似这样的脚本。\n\n### filesp.bsh\n\n使用以下脚本检查正在使用的挂载点是否即将填满。将脚本放在如`HOME/bin`这样的目录中。你需要修改脚本，使`mntlist`变量包含数据库服务器上存在的挂载点列表。因为这个脚本不运行任何\
  \ Oracle 实用程序，所以没有必要设置 Oracle 相关的 OS 变量（就像之前的 shell 脚本那样）：\n\n```bash\n#!/bin/bash\n\
  mntlist=\"/orahome /ora01 /ora02 /ora03\"\nfor ml in $mntlist\ndo\necho $ml\nusedSpc=$(df\
  \ -h $ml | awk '{print $5}' | grep -v capacity | cut -d \"%\" -f1 -)\nBOX=$(uname\
  \ -a | awk '{print $2}')\n#\ncase $usedSpc in\n[0-9])\narcStat=\"relax, lots of\
  \ disk space: $usedSpc\"\n;;\n[1-7][0-9])\narcStat=\"disk space okay: $usedSpc\"\
  \n;;\n[8][0-9])\narcStat=\"space getting low: $usedSpc\"\necho $arcStat | mailx\
  \ -s \"space on: $BOX\" dkuhn@gmail.com\n;;\n[9][0-9])\narcStat=\"warning, running\
  \ out of space: $usedSpc\"\necho $arcStat | mailx -s \"space on: $BOX\" dkuhn@gmail.com\n\
  ;;\n[1][0][0])\narcStat=\"update resume, no space left: $usedSpc\"\necho $arcStat\
  \ | mailx -s \"space on: $BOX\" dkuhn@gmail.com\n;;\n*)\narcStat=\"huh?: $usedSpc\"\
  \nesac\n#\nBOX=$(uname -a | awk '{print $2}')\necho $arcStat\n#\ndone\n#\nexit 0\n\
  ```\n\n你可以从命令行手动运行此脚本，像这样：\n\n```bash\n$ filesp.bsh\n```\n\n以下是此数据库服务器的输出：\n\n```\n\
  /orahome\ndisk space okay: 79\n/ora01\nspace getting low: 84\n/ora02\ndisk space\
  \ okay: 41\n/ora03\nrelax, lots of disk space: 9\n```\n\n这是你应该从调度工具（如`cron`）自动运行的脚本类型。这是一个典型的`cron`条目：\n\
  \n```\n\n\n\n#### 文件系统检查\n\n```\n7 * * * * /orahome/bin/filesp.bsh 1>/orahome/bin/log/filesp.log\
  \ 2>&1\n```\n\n请记住，本节中使用的 shell 脚本（`filesp.bsh`）可能需要根据您的环境进行修改。该 shell 脚本依赖于`df\
  \ -h`命令的输出，而该输出因操作系统和版本而异。例如，在 Solaris 系统上，`df -h`的输出如下所示：\n\n```\n$ df -h\nFilesystem\
  \             size   used  avail capacity  Mounted on\n/ora01                  50G\
  \    42G   8.2G    84%    /ora01\n/ora02                  50G    20G    30G    41%\
  \    /ora02\n/ora03                  50G   4.5G    46G     9%    /ora03\n/orahome\
  \                30G    24G   6.5G    79%    /orahome\n```\n\nshell 脚本中的以下行根据`df\
  \ -h`命令输出中有选择地报告“容量”：\n\n```\nusedSpc=$(df -h $ml | awk '{print $5}' | grep -v capacity\
  \ | cut -d \"%\" -f1 -)\n```\n\n对于您的环境，您需要修改前面的行以正确提取与每个挂载点磁盘剩余空间相关的信息。例如，假设您在 Linux\
  \ 系统上执行`df -h`命令，并观察到以下输出：\n\n```\nFilesystem            Size  Used Avail Use% Mounted\
  \ on\n/dev/mapper/VolGroup00-LogVol00\n222G  162G   49G  77% /\n```\n\n这里只有一个挂载点，磁盘空间百分比与“使用率%”列相关联。因此，要提取相关信息，您需要修改与\
  \ shell 脚本中`usedSpc`相关的代码；例如，\n\n```\ndf -h / | grep % | grep -v Use | awk '{print\
  \ $4}' | cut -d \"%\" -f1 -\n```\n\n因此，shell 脚本需要修改以下几行，如下所示：\n\n```\nmntlist=\"\
  /\"\nfor ml in $mntlist\ndo\necho $ml\nusedSpc=$(df -h / | grep % | grep -v Use\
  \ | awk '{print $4}' | cut -d \"%\" -f1 -)\n```\n\n### login.sql\n\n使用此脚本自定义 SQL*Plus\
  \ 环境的各个方面。在 Linux/Unix 中登录 SQL*Plus 时，如果`login.sql`脚本存在于`SQLPATH`变量所包含的目录中，则会自动执行。如果未定义`SQLPATH`变量，则\
  \ SQL*Plus 会在调用 SQL*Plus 的当前工作目录中查找`login.sql`。例如，以下是我环境中`SQLPATH`变量的定义方式：\n\n```\n\
  $ echo $SQLPATH\n/home/oracle/scripts\n```\n\n我在`/ home/oracle/scripts`目录中创建了`login.sql`脚本。它包含以下内容：\n\
  \n```\n-- set SQL prompt\nSET SQLPROMPT '&_USER.@&_CONNECT_IDENTIFIER.> '\n```\n\
  \n现在，当我登录到 SQL*Plus 时，我的提示符会自动设置：\n\n```\n$ sqlplus / as sysdba\nSYS@o12c>\n```\n\
  \n### top.sql\n\n以下脚本列出消耗 CPU 最多的 SQL 进程。它对于识别有问题的 SQL 语句非常有用。将此脚本放在诸如`HOME/scripts`之类的目录中：\n\
  \n```\nselect * from(\nselect\nsql_text\n,buffer_gets\n,disk_reads\n,sorts\n,cpu_time/1000000\
  \ cpu_sec\n,executions\n,rows_processed\nfrom v$sqlstats\norder by cpu_time DESC)\n\
  where rownum < 11;\n```\n\n执行此脚本的方法如下：\n\n```\nSQL> @top\n```\n\n以下是一段输出片段，显示了一个消耗大量数据库资源的\
  \ SQL 语句：\n\n```\nINSERT INTO \"REP_MV\".\"GEM_COMPANY_MV\"\nSELECT   CASE GROUPING_ID(trim(upper(nvl(ad.organization_name,u.company))))\n\
  WHEN 0 THEN\ntrim(upper(nvl(ad.organization_name,u.company)))\n11004839   20937562\
  \        136   21823.59         17       12926019\n```\n\n### lock.sql\n\n此脚本显示那些持有表锁并阻止其他会话完成工作的会话。该脚本显示有关阻塞会话和等待会话的详细信息。您应将此脚本放在诸如`HOME/scripts`之类的目录中。以下是`lock.sql`的内容：\n\
  \n```\nSET LINES 83 PAGES 30\nCOL blkg_user    FORM a10\nCOL blkg_machine FORM a10\n\
  COL blkg_sid     FORM 99999999\nCOL wait_user    FORM a10\nCOL wait_machine FORM\
  \ a10\nCOL wait_sid     FORM 9999999\nCOL obj_own      FORM a10\nCOL obj_name  \
  \   FORM a10\n--\nSELECT\ns1.username    blkg_user\n,s1.machine     blkg_machine\n\
  ,s1.sid         blkg_sid\n,s1.serial#     blkg_serialnum\n,s1.sid || ',' || s1.serial#\
  \ kill_string\n,s2.username    wait_user\n,s2.machine     wait_machine\n,s2.sid\
  \         wait_sid\n,s2.serial#     wait_serialnum\n,lo.object_id   blkd_obj_id\n\
  ,do.owner       obj_own\n,do.object_name obj_name\nFROM v$lock l1\n,v$session s1\n\
  ,v$lock l2\n,v$session s2\n,v$locked_object lo\n,dba_objects do\nWHERE s1.sid =\
  \ l1.sid\nAND   s2.sid = l2.sid\nAND   l1.id1 = l2.id1\nAND   s1.sid = lo.session_id\n\
  AND   lo.object_id = do.object_id\nAND   l1.block = 1\nAND   l2.request > 0;\n```\n\
  \n`lock.sql`脚本对于确定哪个会话持有对象锁以及显示被阻塞的会话非常有用。您可以从 SQL*Plus 运行此脚本，如下所示：\n\n```\nSQL>\
  \ @lock.sql\n```\n\n以下是输出的部分列表（已截断以便在一页上显示）：\n\n```\nBLKG_USER  BLKG_MACHI  BLKG_SID\
  \ BLKG_SERIALNUM\n---------- ---------- --------- --------------\nKILL_STRING\n\n\
  WAIT_USER  WAIT_MACHI WAIT_SID WAIT_SERIALNUM BLKD_OBJ_ID OBJ_OWN    OBJ_NAME\n\
  ---------- ---------- -------- -------------- ----------- ---------- ----------\n\
  MV_MAINT   speed            24             11\n24,11\nMV_MAINT   speed         \
  \   87              7       19095 MV_MAINT   INV\n```\n\n当在 Oracle 数据库 18c 可插拔数据库环境中，从根容器运行`lock.sql`时，您需要将`DBA_OBJECTS`更改为`CDB_OBJECTS`，以便脚本能够正确地报告整个数据库范围内的锁。您还应该考虑向查询中添加`NAME`和`CON_ID`，以便查看发生锁的容器。以下是修改后的查询片段（您需要用您想要报告的列替换“...”）：\n\
  \n```\nSELECT\nu.name\n,s1.username    blkg_user\n...\n,do.object_name obj_name\n\
  FROM v$lock l1\n,v$session s1\n,v$lock l2\n,v$session s2\n,v$locked_object lo\n\
  ,cdb_objects do\n,v$containers u\nWHERE s1.sid = l1.sid\nAND   s2.sid = l2.sid\n\
  AND   l1.id1 = l2.id1\nAND   s1.sid = lo.session_id\nAND   lo.object_id = do.object_id\n\
  AND   l1.block = 1\nAND   l2.request > 0\nAND   do.con_id = u.con_id;\n```\n\n###\
  \ users.sql\n\n此脚本显示有关用户创建时间及其账户是否被锁定的信息。当您对连接问题进行故障排除时，此脚本非常有用。将脚本放在诸如`HOME/scripts`之类的目录中。以下是用于显示用户账户信息的典型`users.sql`脚本：\n\
  \n```\nSELECT\nusername\n,account_status\n,lock_date\n,created\nFROM dba_users\n\
  ORDER BY username;\n```\n\n您可以从 SQL*Plus 执行此脚本，如下所示：\n\n```\nSQL> @users.sql\n```\n\
  \n以下是一些示例输出：\n\n```\nUSERNAME        ACCOUNT_ST LOCK_DATE    CREATED\n---------------\
  \ ---------- ------------ ------------\nSYS             OPEN                   \
  \ 09-NOV-12\nSYSBACKUP       OPEN                    09-NOV-12\nSYSDG          \
  \ OPEN                    09-NOV-12\n```\n\n当在 Oracle 数据库 18c 可插拔数据库环境中，从根容器运行`users.sql`时，您需要将`DBA_USERS`更改为`CDB_USERS`并添加`NAME`和`CON_ID`列以报告所有可插拔数据库中的所有用户；例如，\n\
  \n```\nSELECT\nc.name\n,u.username\n,u.account_status\n,u.lock_date\n,u.created\n\
  FROM cdb_users    u\n,v$containers c\nWHERE u.con_id = c.con_id\nORDER BY c.name,\
  \ u.username;\n```\n\n## 组织脚本\n\n当您有一组脚本和实用程序时，应该对它们进行组织，以便为每个数据库服务器一致地实施。它们应成为您安装\
  \ Oracle 二进制文件后步骤的一部分。\n这些脚本不仅能够作为此过程的一部分一致部署，还可用于测试数据库的安装和设置。请遵循以下步骤为环境中的每个数据库服务器实现前述的\
  \ DBA 实用程序：\n\n1.  创建用于存储脚本的操作系统目录。\n\n2.  将您的脚本和实用程序复制到步骤 1 中创建的目录中。\n\n3.  配置您的启动文件以初始化环境。\n\
  \n这些步骤在以下各节中详述。\n\n### 步骤 1. 创建目录\n\n在每个数据库服务器上创建一组标准目录来存储您的自定义脚本。`oracle`用户`HOME`目录下的目录通常是一个不错的位置。我通常创建以下三个目录：\n\
  \n*   `HOME/bin`。shell 脚本的标准位置，这些脚本以自动方式运行（例如从`cron`）。\n\n*   `HOME/bin/log`。由计划\
  \ shell 脚本生成的日志文件的标准位置。\n\n*   `HOME/scripts`。存储 SQL 脚本的标准位置。\n\n您可以使用`mkdir`命令创建上述目录，如下所示：\n\
  \n```\n$ mkdir -p $HOME/bin/log\n$ mkdir $HOME/scripts\n```\n\n脚本放在哪里或目录如何命名并不重要，只要您有一个标准位置，这样当您在服务器之间导航时，总能在相同位置找到相同的文件。换句话说，标准是什么并不重要，重要的是您有一个标准。\n\
  \n### 步骤 2. 将文件复制到目录\n\n将您的实用程序和脚本放在相应的目录中。将以下文件复制到`HOME/bin`目录：\n\n```\ndba_setup\n\
  dba_fcns\ntbsp_chk.bsh\nconn.bsh\nfilesp.bsh\n```\n\n将以下 SQL 脚本放入`HOME/scripts`目录：\n\
  \n```\nlogin.sql\ntop.sql\nlock.sql\nusers.sql\n```\n\n### 步骤 3. 配置启动文件\n\n将以下代码放入`.bashrc`文件或您所用\
  \ shell 的等效启动文件（Korn shell 的`.profile`）中。以下是配置`. bashrc`文件的示例：\n\n```\n```\n\n\n\
  \n## 加载全局定义\n\n```bash\nif [ -f /etc/bashrc ]; then\n. /etc/bashrc\nfi\n```\n\n\
  ## 加载 Oracle 操作系统变量\n\n```bash\n. /etc/oraset\n```\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。以下是翻译结果：\n\
  \n\n### 用户特定别名和函数\n\n`. $HOME/bin/dba_setup`\n`. $HOME/bin/dba_fcns`\n\n现在，每次登录环境时，您都拥有对在\
  \ `dba_setup` 和 `dba_fcns` 文件中建立的所有操作系统变量、别名和函数的完全访问权限。如果您不想注销并重新登录，可以使用点号（`.`）命令手动运行该文件。此命令执行文件中包含的命令行。以下示例运行了\
  \ `. bashrc` 文件：\n\n```bash\n$ . $HOME/.bashrc\n```\n\n点号指示 shell **源引**（source）脚本。源引告诉当前登录的\
  \ shell 进程继承在执行的脚本中通过 `export` 命令设置的任何变量。如果您不使用点号表示法，那么在脚本内设置的变量仅在执行脚本时产生的子 shell\
  \ 上下文中可见。\n\n**注意**\n在 Bash shell 中，`source` 命令等同于点号（`.`）命令。\n\n## 脚本自动化\n\n在您的工具库中拥有这些脚本，可以快速解决问题或执行任务。它还提供了一个标准流程来针对数据库运行这些操作，而不是使用不同的\
  \ SQL 或任务。这是实现针对数据库工作自动化的第一步。\n\n目标是拥有一个能够提供信息并执行必要任务以解决这些问题的数据库。现在在本章中讨论这些脚本可能看起来没有意义；然而，拥有这些脚本可以为自动化或工具提供基础。理解需要监控和警报的内容有助于设置一个主动的环境，而不需要\
  \ DBA 在全天候手动运行脚本。\n\n这些脚本大多能很好地与 Oracle Enterprise Management 工具配合使用，因为它们可以插入到计划作业中，并以不同的权限级别运行。这些脚本也适用于在通过更自动化的响应文件或云控制配置数据库环境时进行初始测试。这些测试可以验证创建步骤是否仍然正确设置并适用于每个版本。\n\
  \n## 本章小结\n\n本章描述了如何配置一个高效的环境。这对于管理多台服务器上多个数据库的 DBA 尤其重要。常规维护和故障排除活动要求您直接登录到数据库服务器。为了提高效率和保持理智，您应该开发一套标准的操作系统工具和\
  \ SQL 脚本，以帮助您维护多个环境。您可以使用操作系统的标准功能来辅助导航、重复命令、显示系统瓶颈、快速查找关键文件等。\n\n配置标准操作系统的技术在您处理多台服务器上的多个数据库时特别有用。当您同时运行多个终端会话时，很容易迷失方向，忘记哪个会话与特定服务器和数据库相关联。只需少量设置，您就可以确保操作系统提示符始终显示诸如主机和数据库等信息。同样，您总是可以设置\
  \ SQL 提示符以显示用户名和数据库连接。这些技术有助于确保您不会在错误的环境中意外运行命令或脚本。\n\n任何需要针对数据库运行几次的操作都是自动化的完美候选者。这些脚本可用于开始配置计划作业，并可用于围绕多个数据库开发主动监控。\n\
  \n在安装了 Oracle 二进制文件、创建了数据库并配置了环境之后，您就可以执行额外的数据库管理任务了，例如为应用程序创建表空间。表空间创建和维护的主题将在下一章讨论。\n\
  \n"
- "# 第 4 章 表空间和数据文件\n\n术语 `tablespace`（表空间）有点用词不当，因为它不仅仅是表的空间。相反，表空间是一个逻辑容器，允许您管理磁盘上消耗空间的物理文件——数据文件组。一旦创建了表空间，您就可以在其中创建数据库对象（表和索引），这会导致在关联的数据文件中为磁盘分配空间。\n\
  \n表空间是逻辑的，因为它仅通过数据字典视图（如 `DBA_TABLESPACES`）可见；您可以通过 `SQL*Plus` 或图形工具（如 Enterprise\
  \ Manager）或两者兼用来管理表空间。表空间仅在数据库启动并运行时存在。\n\n数据文件也可以通过数据字典视图（`DBA_DATA_FILES`）查看，但此外还具有物理存在，因为它们可以通过操作系统实用程序（如列出文件的\
  \ `ls` 命令）在数据库外部查看。无论数据库是打开还是关闭，数据文件都持续存在。\n\nOracle 数据库通常包含多个表空间。一个表空间可以有一个或多个与之关联的数据文件，但一个数据文件只能与一个表空间相关联。换句话说，一个数据文件不能在多个（或两个以上）表空间之间共享。\n\
  \n对象（如表和索引）由用户拥有，并在表空间内创建。一个对象在逻辑上被实例化为一个段（segment）。段由表空间内的空间区（extent）组成。一个区由一组数据库块组成。图\
  \ 4-1 显示了用于管理 Oracle 数据库内空间的这些逻辑和物理结构之间的关系。\n\n![逻辑存储对象与物理存储的关系](img/214899_3_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1**\n逻辑存储对象与物理存储的关系\n\n正如您在第 2 章中看到的，当您执行 `CREATE DATABASE` 语句创建数据库时，通常会创建五个表空间：\n\
  \n*   `SYSTEM`\n*   `SYSAUX`\n*   `UNDO`\n*   `TEMP`\n*   `USERS`\n\n这五个表空间是运行数据库所需的最小存储容器集合（然而，有人可能认为您不需要\
  \ `USERS` 表空间；更多内容将在下一节中介绍）。`SYSTEM` 和 `SYSAUX` 实际上是唯一必需的表空间，因为 `UNDO` 和 `TEMP`\
  \ 可以用不同的名称命名。在容器数据库（CDB）中，可插拔数据库（PDB）有与其关联的用户表空间。在创建 PDB 时，表空间是配置的一部分。当您打开数据库使用时，应迅速创建额外的表空间来存储应用程序数据。本章讨论标准表空间集的用途、对额外表空间的需求以及如何管理这些关键的数据库存储容器。本章重点介绍与创建和维护表空间及数据文件相关的最常见和关键任务，并逐步深入到更高级的主题，例如移动和重命名数据文件。\n\
  \n## 理解前五个表空间\n\n`SYSTEM` 表空间为 Oracle 数据字典对象提供存储。所有由 `SYS` 用户拥有的对象都存储在此表空间中。`SYS`\
  \ 用户应该是唯一在 `SYSTEM` 表空间中拥有对象的用户。\n\n`SYSAUX`（系统辅助）表空间在您创建数据库时创建。这是一个辅助表空间，用作 Oracle\
  \ 数据库工具（如 Enterprise Manager、Statspack、LogMiner、Logical Standby 等）的数据存储库。默认情况下，审计日志收集在\
  \ `SYSAUX` 表空间中，但应配置为使用为审计记录创建的另一个表空间。甚至其中一些工具也可以配置为使用额外的表空间，具体取决于保留和分离规则，并将数据保存在默认系统表空间之外。\n\
  \n`UNDO` 表空间存储撤销事务（`insert`、`update`、`delete` 或 `merge`）效果所需的信息。在事务被有意回滚（通过 `ROLLBACK`\
  \ 语句）时需要此信息。撤销信息还被 Oracle 用于从意外实例崩溃中恢复，并为 SQL 语句提供读一致性。此外，一些数据库功能（如 Flashback Query）使用撤销信息。\n\
  \n一些 Oracle SQL 语句需要排序区（sort area），无论是在内存中还是在磁盘上。例如，查询结果在返回给用户之前可能需要排序。Oracle 首先使用内存对查询结果进行排序，当内存不再足够时，`TEMP`\
  \ 表空间的额外临时存储也可能在创建或重建索引时需要。该空间仅用于会话的临时数据，不能在 `TEMP` 表空间中存储永久对象。如果某个进程需要在单个会话之外的临时对象，则应将该对象存储在永久用户表空间中。创建数据库时，通常会创建\
  \ `TEMP` 表空间并将其指定为您创建的任何用户的默认临时表空间。可以有多个具有不同名称的临时表空间，可以分配给不同的用户组或应用程序，以避免临时空间使用冲突。\n\
  \n`USERS` 表空间不是绝对必需的，但通常用作用户表和索引数据的默认永久表空间。如第 2 章所示，您可以在创建数据库时为用户创建默认永久表空间。这意味着当用户尝试创建表或索引时，如果在对象创建期间未指定表空间，默认情况下将在默认永久表空间中创建该对象。\n\
  \n## 理解对更多表空间的需求\n\n虽然您可以将所有数据库用户的数据放在 `USERS` 表空间中，但这对于任何类型的严肃数据库应用程序来说通常不是可扩展或可维护的。相反，为应用程序用户创建额外的表空间更有效。您通常为使用数据库的每个应用程序创建至少两个特定的表空间：一个用于应用程序表数据，另一个用于应用程序索引数据。例如，对于\
  \ `APP` 用户，您可能会创建 `APP_DATA` 和 `APP_INDEX` 分别用于表和索引数据。\n\nDBA 过去出于性能原因分离表数据和索引数据。当时的思路是将表数据与索引数据分离将减少输入/输出（I/O）争用。这是因为数据文件（每个表空间的）可以放置在由不同控制器管理的不同磁盘上。\n\
  \n对于现代存储配置，其应用程序和底层物理存储设备之间存在多层抽象，通过创建多个独立的表空间是否能实现任何性能提升是值得商榷的。但是，仍然有创建多个表空间用于表和索引数据的有效理由：\n\
  \n*   备份和恢复要求可能因表和索引而异。\n*   索引可能具有与表数据不同的存储要求。\n*   通过逻辑上分别对表和索引进行分组来简化对象管理。\n\n\
  除了为数据和索引创建单独的表空间外，有时还为不同大小的对象创建单独的表空间。例如，如果一个应用程序有非常大的表，您可以创建一个具有较大区大小的 `APP_DATA_LARGE`\
  \ 表空间和一个具有较小区大小的单独 `APP_DATA_SMALL` 表空间。这个概念也扩展到二进制大对象（LOB）数据类型。您可能希望将 LOB 列分离到自己的表空间中，因为您希望管理\
  \ LOB 表空间的存储特性与常规表数据不同。自动段空间管理（ASSM）将基于存储的对象信息分配区大小。即使不手动设置大小区并使用 ASSM，以这种方式对对象分组也将有助于对象管理以及自动空间管理。\n\
  \n**注意**\n由于物理存储设备和内存的进步，按类型和区大小分离对象变得不那么重要了。存储技术的进步将有助于数据库在没有对象配置的情况下也能更好地运行。根据您的要求，您应该考虑为使用数据库的每个应用程序创建单独的表空间。现在有应用程序容器和\
  \ PDB 用于这种表空间分离。尽管这将在第 22 章中更详细地讨论，但图 4-2 显示了 CDB 和 PDB 中的不同表空间。\n\n![CDB 和 PDB\
  \ 中的表空间](img/214899_3_En_4_Fig2_HTML.png)\n\n**图 4-2**\nCDB 和 PDB 中的表空间\n\n然而，为了看一个单独的表空间示例，对于一个库存应用程序，创建\
  \ `INV_DATA` 和 `INV_INDEX`；对于一个人力资源应用程序，创建 `HR_DATA` 和 `HR_INDEX`。以下是一些考虑为使用数据库的每个应用程序创建单独表空间的理由：\n\
  \n*   应用程序可能有不同的可用性要求。单独的表空间允许您将一个应用程序的表空间脱机而不影响另一个应用程序。\n*   应用程序可能有不同的备份和恢复要求。单独的表空间允许独立地备份和恢复表空间。\n\
  *   应用程序可能有不同的存储要求。单独的表空间允许为空间配额、区大小和段管理设置不同的参数。\n*   您可能有一些数据是纯只读的。单独的表空间允许您将仅包含只读数据的表空间置于只读模式。\n\
  *   您可能有安全设置，例如对表空间加密，而其他表空间不加密。\n\n下一节讨论创建表空间。\n\n## 创建表空间\n\n您使用 `CREATE TABLESPACE`\
  \ 语句来创建表空间。*Oracle SQL 参考手册* 包含十几页关于创建表空间的语法和示例。在大多数场景中，您只需要使用可用功能中的一小部分，即本地管理的区分配和自动段空间管理。以下代码片段演示了如何创建一个采用最常用功能的表空间：\n\
  \n```sql\ncreate tablespace tools\ndatafile '/u01/dbfile/o18c/tools01.dbf'\nsize\
  \ 100m\nextent management local\nuniform size 128k\nsegment space management auto;\n\
  ```\n\n您需要根据您的环境修改此脚本。例如，目录路径、数据文件大小和统一区大小应根据环境要求进行更改。\n\n您使用 `EXTENT MANAGEMENT\
  \ LOCAL` 子句创建本地管理的表空间。本地管理的表空间使用数据文件中的位图来高效地确定区是否正在使用。存储参数 `NEXT`、`PCTINCREASE`、`MINEXTENTS`、`MAXEXTENTS`\
  \ 和 `DEFAULT` 对于本地管理的表空间中的区选项无效。\n\n**注意**\n具有统一区的本地管理的表空间必须至少为每个区分配五个数据库块的最小大小。\n\
  \n当您向表空间中的对象添加数据时，Oracle 会根据需要自动向关联的表空间数据文件分配更多区以适应增长。您可以通过 `UNIFORM SIZE [size]`\
  \ 子句指示 Oracle 为每个区分配统一的大小。如果您未指定大小，则默认的统一区大小为 1MB。\n\n您使用的统一区大小根据表和索引的存储需求而变化。在某些场景中，我为给定的应用程序创建多个表空间。例如，您可以为小对象创建一个区大小为\
  \ 512KB 的表空间，为中等大小对象创建一个区大小为 4MB 的表空间，为大对象创建一个区大小为 16MB 的表空间，依此类推。\n\n或者，您可以通过 `AUTOALLOCATE`\
  \ 子句指定 Oracle 确定区大小。Oracle 分配 64KB、1MB、8MB 或 64MB 的区大小。当您认为一个表空间中的对象大小各异时，使用 `AUTOALLOCATE`\
  \ 是合适的。\n\n`SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的空间。使用此子句时，无需指定参数，如 `PCTUSED`、`FREELISTS`\
  \ 和 `FREELIST GROUPS`。与 `AUTO` 空间管理相对的是 `MANUAL`。当您使用 `MANUAL` 时，您可以根据应用程序的要求调整参数。我建议您使用\
  \ `AUTO` 而不是 `MANUAL`。使用 `AUTO` 极大地减少了需要配置和管理的参数数量。\n\n当数据文件填满时，您可以使用 `AUTOEXTEND`\
  \ 功能指示 Oracle 自动增大数据文件的大小。使用 `AUTOEXTEND` 允许进程在接近空间用尽时无需 DBA 干预即可运行。但是，您必须监控表空间增长并规划额外空间。这包括监视可能加载大量数据的进程。手动添加空间可能会限制出现失控的\
  \ SQL 进程意外增长表空间直至消耗完挂载点上所有空间的情况，但如果一个加载进程比另一个月份更大，如果在额外空间需求上失败，它可能会被回滚。在数据库中使用 `RESUMABLE`\
  \ 参数，您将被允许设置响应表空间问题的时间。如果您无意中填满了包含控制文件或 Oracle 二进制文件的挂载点，可能会导致数据库挂起。使用自动存储管理（ASM）也将有助于通过向磁盘组添加另一个磁盘来避免填满挂载点，并且与\
  \ `RESUMABLE` 结合使用，提供了管理时间。监控和规划存储及增长仍然是管理表空间大小以主动添加所需空间的最佳方法。\n\n如果您确实使用了 `AUTOEXTEND`\
  \ 功能，我建议您始终指定相应的 `MAXSIZE`，这样失控的 SQL 进程就不会意外地填满表空间，进而填满挂载点。以下是一个创建具有最大大小限制的自动扩展表空间的示例：\n\
  \n```sql\ncreate tablespace tools\ndatafile '/u01/dbfile/o18c/tools01.dbf'\nsize\
  \ 100m\nautoextend on maxsize 1000m\nextent management local\nuniform size 128k\n\
  segment space management auto;\n```\n\n出于安全考虑，表空间可以透明加密。透明意味着应用程序不需要更改即可使用加密表空间。这将允许数据文件中静态的数据被加密，并且当数据库打开时，使用数据库钱包中的加密密钥对表空间进行解密，以便通过查询查看数据。使用加密使得数据文件无法以纯文本形式查看，数据文件的备份也是如此。如前所述，创建表空间有很多选项，这个安全选项确实需要管理加密密钥，密钥可以集中定位，也可以与数据库本地存放。创建表空间的命令很简单：\n\
  \n```sql\ncreate tablespace HRDATA encryption using 'AES256' default storage(encrypt);\n\
  ```\n\n当您在不同环境中使用 `CREATE TABLESPACE` 脚本时，能够对脚本的部分进行参数化非常有用。例如，在开发环境中您可能将数据文件大小设置为\
  \ 100MB，而在生产环境中数据文件可能是 100GB。使用 & 变量（`&`）使 `CREATE TABLESPACE` 脚本在不同环境中更具可移植性。\n\
  \n下一个列表在脚本顶部定义了 & 变量，这些变量决定为表空间创建的数据文件的大小：\n\n```sql\ndefine tbsp_large=5G\ndefine\
  \ tbsp_med=500M\n--\ncreate tablespace reg_data\ndatafile '/u01/dbfile/o18c/reg_data01.dbf'\n\
  size &&tbsp_large\nextent management local\nuniform size 128k\nsegment space management\
  \ auto;\n--\ncreate tablespace reg_index\ndatafile '/u01/dbfile/o18c/reg_index01.dbf'\n\
  size &&tbsp_med\nextent management local\nuniform size 128k\nsegment space management\
  \ auto;\n```\n\n使用 & 变量允许您修改脚本一次，然后在整个脚本中重复使用这些变量。您可以对脚本的所有方面进行参数化，包括数据文件挂载点和区大小。\n\
  \n您也可以从 `SQL*Plus` 命令行将 & 变量的值传递到 `CREATE TABLESPACE` 脚本中。这使您可以避免在脚本中硬编码特定大小，而是在运行时提供大小。为此，首先在脚本顶部定义\
  \ & 变量以接受传入的值：\n\n```sql\ndefine tbsp_large=&1\ndefine tbsp_med=&2\n--\ncreate tablespace\
  \ reg_data\ndatafile '/u01/dbfile/o12c/reg_data01.dbf'\nsize &&tbsp_large\nextent\
  \ management local\nuniform size 128k\nsegment space management auto;\n--\ncreate\
  \ tablespace reg_index\ndatafile '/u01/dbfile/o12c/reg_index01.dbf'\nsize &&tbsp_med\n\
  extent management local\nuniform size 128k\nsegment space management auto;\n```\n\
  \n现在，您可以从 `SQL*Plus` 命令行将变量传递到脚本中。以下示例执行名为 `cretbsp.sql` 的脚本，并传入两个值，分别将 & 变量设置为\
  \ `5G` 和 `500M`：\n\n```sql\nSQL> @cretbsp  5G  500M\n```\n\n自动存储管理（ASM）也简化了表空间的创建，因为它将采用磁盘组的默认值和设置为使用\
  \ ASM 的参数。这将在本章后面讨论，但这里有一个简单的示例：\n\n```sql\nSQL> create tablespace HRDATA;\n```\n\
  \n表 4-1 总结了创建和管理表空间的最佳实践。\n\n**表 4-1**\n创建和管理表空间的最佳实践\n\n| 最佳实践 | 推理 |\n| --- |\
  \ --- |\n| 为使用同一数据库的不同应用程序创建单独的表空间。 | 如果某个表空间需要脱机，它只影响一个应用程序。 |\n| 对于一个应用程序，将表数据与索引数据分离在不同的表空间中。\
  \ | 表和索引数据可能有不同的存储要求，并简化对象管理。 |\n| 使用 `AUTOEXTEND` 时，指定最大大小。 | 指定最大大小可以防止失控的 SQL\
  \ 语句填满存储设备。 |\n| 创建表空间为本地管理的。您不应创建字典管理的表空间。 | 这提供了更好的性能和可管理性。 |\n| 对于表空间的数据文件命名约定，使用包含表空间名称后跟两位数字的名称，该数字在该表空间的数据文件中是唯一的。\
  \ | 这样可以轻松识别哪些数据文件与哪些表空间相关联。 |\n| 尽量减少与一个表空间关联的数据文件数量。 | 您需要管理的数据文件更少。 |\n| 在表空间\
  \ `CREATE` 脚本中，使用 & 变量定义诸如存储特性等方面。 | 这使得脚本在各种环境中更具可重用性。 |\n\n如果您需要验证重新创建现有表空间所需的\
  \ SQL，可以使用 `DBMS_METADATA` 包。首先，将 `LONG` 变量设置为一个较大的值：\n\n```sql\nSQL> set long 1000000\n\
  ```\n\n接下来，使用 `DBMS_METADATA` 包显示数据库中所有表空间的 `CREATE TABLESPACE` 数据定义语言（DDL）：\n\n\
  ```sql\nselect dbms_metadata.get_ddl('TABLESPACE',tablespace_name)\nfrom dba_tablespaces;\n\
  ```\n\n**提示**\n您也可以使用 Data Pump 提取数据库对象的 DDL。详情请参见第 13 章。\n\n## 重命名表空间\n\n有时您需要重命名表空间。您可能希望这样做，因为表空间最初被错误命名，或者您希望表空间名称更好地符合您的数据库命名标准。使用\
  \ `ALTER TABLESPACE` 语句重命名表空间。此示例将表空间从 `TOOLS` 重命名为 `TOOLS_DEV`：\n\n```sql\nSQL>\
  \ alter tablespace tools rename to tools_dev;\n```\n\n当您重命名表空间时，Oracle 会更新数据字典、控制文件和数据文件头中的表空间名称。请记住，重命名表空间不会重命名任何关联的数据文件。有关重命名数据文件的信息，请参阅本章后面的“重命名或重新定位数据文件”部分。\n\
  \n**注意**\n您不能重命名 `SYSTEM` 表空间或 `SYSAUX` 表空间。\n\n## 更改表空间的写入模式\n\n在数据仓库等环境中，您可能需要将数据加载到表中，然后永远不再修改。为了强制表空间中的任何对象都无法修改，您可以将表空间更改为只读。为此，请使用\
  \ `ALTER TABLESPACE` 语句：\n\n```sql\nSQL> alter tablespace inv_mgmt_rep read only;\n\
  ```\n\n只读表空间的一个优点是您只需备份一次。无论备份是在多久之前进行的，您都应该能够从只读表空间还原数据文件。\n\n如果您需要将表空间从只读模式修改回来，可以按如下方式进行：\n\
  \n```sql\nSQL> alter tablespace inv_mgmt_rep read write;\n```\n\n确保在将表空间置于读/写模式后重新启用备份。\n\
  \n**注意**\n您不能使包含活动回滚段的表空间变为只读。因此，`SYSTEM` 表空间不能设为只读，因为它包含 `SYSTEM` 回滚段。\n\n请注意，个别表可以修改为只读。这允许您在更细粒度的级别（而不是表空间级别）控制只读；例如，\n\
  \n```sql\nSQL> alter table my_tab read only;\n```\n\n在只读模式下，您不能在表上发出任何 `insert`、`update`\
  \ 或 `delete` 语句。在进行维护（例如数据迁移）并希望确保用户不更新数据时，将单个表设为读/写可能很有用。\n\n此示例将表修改回读/写模式：\n\n\
  ```sql\nSQL> alter table my_tab read write;\n```\n\n## 删除表空间\n\n如果您有一个未使用的表空间，最好将其删除，这样它不会使数据库混乱、消耗不必要的资源，并可能混淆不熟悉数据库的\
  \ DBA。在删除表空间之前，最好先将其脱机：\n\n```sql\nSQL> alter tablespace inv_data offline;\n```\n\
  \n您可能想等待看看是否有人抱怨应用程序因无法再写入要删除的表空间中的表或索引而损坏。根据删除表空间的原因，可以先将对象移动到另一个表空间，然后再删除。当您确定不需要该表空间时，将其删除并删除其数据文件：\n\
  \n```sql\nSQL> drop tablespace inv_data including contents and datafiles;\n```\n\
  \n**提示**\n无论表空间是联机还是脱机，您都可以删除它。例外是 `SYSTEM` 和 `SYSAUX` 表空间，它们不能被删除。在删除表空间之前将其脱机始终是一个好主意。通过这样做，您可以更好地确定应用程序是否正在使用表空间中的任何对象。如果您尝试查询脱机表空间中的表，会收到此错误：`ORA-00376:\
  \ file can't be read at this time`。\n\n使用 `INCLUDING CONTENTS AND DATAFILES` 删除表空间会永久删除该表空间及其任何数据文件。在删除之前，请确保表空间不包含您想要保留的任何数据。\n\
  \n如果您尝试删除包含被与要删除的表空间不同的表空间中的表关联的外键引用的主键的表空间，您会收到此错误：\n\n```\nORA-02449: unique/primary\
  \ keys in table referenced by foreign keys\n```\n\n首先运行此查询以确定是否有任何外键约束将受到影响：\n\n\
  ```sql\nselect p.owner,\np.table_name,\np.constraint_name,\nf.table_name referencing_table,\n\
  f.constraint_name foreign_key_name,\nf.status fk_status\nfrom   dba_constraints\
  \ p,\ndba_constraints f,\ndba_tables      t\nwhere  p.constraint_name = f.r_constraint_name\n\
  and    f.constraint_type = 'R'\nand    p.table_name = t.table_name\nand    t.tablespace_name\
  \ = UPPER('&tablespace_name')\norder by 1,2,3,4,5;\n```\n\n如果存在引用的约束，您需要首先删除这些约束，或者使用\
  \ `DROP TABLESPACE` 语句的 `CASCADE CONSTRAINTS` 子句。此语句使用 `CASCADE CONSTRAINTS` 自动删除任何受影响的约束：\n\
  \n```sql\nSQL> drop tablespace inv_data including contents and data files cascade\
  \ constraints;\n```\n\n此语句删除从被删除表空间外部的表引用到被删除表空间内部表的任何引用完整性约束。\n\n如果您删除了生产系统中具有必需对象的表空间，后果可能是灾难性的。您必须执行某种恢复才能使表空间及其对象恢复。不用说，在删除表空间时要非常小心。表\
  \ 4-2 列出了执行此操作时要考虑的建议。\n\n**表 4-2**\n删除表空间的最佳实践\n\n| 最佳实践 | 推理 |\n| --- | --- |\n\
  | 在删除表空间之前，运行如下脚本以确定表空间中是否存在任何对象：<br>`select owner, segment_name, segment_type`<br>`from\
  \ dba_segments`<br>`where tablespace_name=upper('&&tbsp_name');` | 这样做可确保在删除表空间之前不存在任何表或索引。\
  \ |\n| 考虑在删除表空间之前重命名表空间中的表。 | 如果任何应用程序正在使用要删除的表空间中的表，当所需的表被重命名时，应用程序会抛出错误。 |\n|\
  \ 如果表空间中没有对象，则将关联的数据文件调整为一个非常小的数字，例如 10MB。 | 将数据文件大小减小到极小的空间量，可以快速显示是否有任何应用程序尝试访问需要该表空间空间的对象。\
  \ |\n| 在删除表空间之前备份数据库。 | 这确保您有一种方法可以在删除表空间后发现有正在使用的对象时恢复这些对象。 |\n| 在删除表空间之前将表空间和数据文件脱机。使用\
  \ `ALTER TABLESPACE` 语句使表空间脱机。 | 这有助于确定是否有任何应用程序或用户正在使用表空间中的对象。如果表空间和数据文件脱机，它们就无法访问对象。\
  \ |\n| 当您确定表空间未被使用时，使用 `DROP TABLESPACE ... INCLUDING CONTENTS AND DATAFILES` 语句。\
  \ | 这将删除表空间并物理删除与其关联的任何数据文件。一些 DBA 不喜欢这种方法，但如果您已采取必要的预防措施，应该没问题。 |\n\n## 使用 Oracle\
  \ 托管文件\n\nOracle 托管文件（OMF）功能自动化了表空间管理的许多方面，例如文件放置、命名和大小调整。您通过设置以下初始化参数来控制 OMF：\n\
  \n*   `DB_CREATE_FILE_DEST`\n*   `DB_CREATE_ONLINE_LOG_DEST_N`\n*   `DB_RECOVERY_FILE_DEST`\n\
  \n如果您在创建数据库之前设置这些参数，Oracle 会使用它们来放置数据文件、控制文件和在线重做日志。您也可以在创建数据库后启用 OMF。Oracle 使用初始化参数的值作为任何新添加文件的位置。Oracle\
  \ 还确定新添加文件的名称。这些参数作为输入在 `dbca` 中设置以创建数据库。\n\n使用 OMF 的优点是创建表空间被简化了。例如，`CREATE TABLESPACE`\
  \ 语句除了表空间名称外不需要指定任何内容。首先，通过设置 `DB_CREATE_FILE_DEST` 参数启用 OMF 功能：\n\n```sql\nSQL>\
  \ alter system set db_create_file_dest='/u01';\n```\n\n现在，发出 `CREATE TABLESPACE`\
  \ 语句：\n\n```sql\nSQL> create tablespace inv1;\n```\n\n此语句创建一个名为 `INV1` 的表空间，默认数据文件大小为\
  \ 100MB。请记住，您可以通过指定大小来覆盖默认的 100MB 大小：\n\n```sql\nSQL> create tablespace inv2 datafile\
  \ size 20m;\n```\n\n要查看关联数据文件的详细信息，请查询 `V$DATAFILE` 视图，并注意 Oracle 已在 `/u01` 目录下创建了子目录，并使用\
  \ OMF 格式命名了文件：\n\n```sql\nSQL> select name from v$datafile where name like '%inv%';\n\
  NAME\n------------------------------------------------------------\n/u01/O18C/datafile/o1_mf_inv1_8b5l63q6_.dbf\n\
  /u01/O18C/datafile/o1_mf_inv2_8b5lflfc_.dbf\n```\n\nOMF 的一个限制是您仅限于一个目录用于放置数据文件。如果您想将数据文件添加到不同的目录，您可以动态更改位置：\n\
  \n```sql\nSQL> alter system set db_create_file_dest='/u02';\n```\n\n## 创建大文件表空间\n\
  \n大文件（bigfile）功能允许您创建一个分配了非常大数据文件的表空间。使用大文件功能的优点是可能创建非常大的文件。对于 8KB 块大小，您可以创建最大为\
  \ 32TB 的数据文件。对于 32KB 块大小，您可以创建最大为 128TB 的数据文件。\n\n使用 `BIGFILE` 子句创建大文件表空间：\n\n```sql\n\
  create bigfile tablespace inv_big_data\ndatafile '/u01/dbfile/o18c/inv_big_data01.dbf'\n\
  size 10g\nextent management local\nuniform size 128k\nsegment space management auto;\n\
  ```\n\n只要支持大文件表空间数据文件的关联文件系统有充足的空间，您就可以在表空间中存储海量数据。\n\n使用大文件表空间的一个潜在缺点是，如果由于任何原因支持大文件关联数据文件的文件系统空间用尽，您无法扩展表空间的大小（除非您可以向文件系统添加空间）。如果数据文件放置在单独的挂载点上，您无法向大文件表空间添加更多数据文件。大文件表空间只允许一个数据文件与之关联。\n\
  \n您可以使用 `ALTER DATABASE SET DEFAULT BIGFILE TABLESPACE` 语句将大文件表空间设为数据库的默认表空间类型。但是，不建议这样做。您可能会在不知道它是大文件表空间的情况下创建表空间，当您发现需要更多空间时，您将不知道无法为此表空间在另一个挂载点上添加另一个数据文件。使用\
  \ ASM 问题较少，因为可以动态地将新磁盘添加到此表空间的 DISKGROUP。\n\n## 在表空间内启用默认表压缩\n\n在处理大型数据库时，您可能需要考虑压缩数据。压缩数据导致更少的磁盘空间、更少的内存和更少的\
  \ I/O 操作。读取压缩数据的查询可能执行得更快，因为满足查询结果所需的块更少。但压缩确实有成本；它在读写时压缩和解压缩数据，需要更多的 CPU 资源。\n\n\
  在创建表空间时，您可以启用数据压缩功能。这样做并不会压缩表空间。相反，您在表空间中创建的任何表都会继承表空间的压缩特性。此示例创建一个具有 `ROW STORE\
  \ COMPRESS ADVANCED` 的表空间：\n\n```sql\nCREATE TABLESPACE tools_comp\nDATAFILE '/u01/dbfile/o18c/tools_comp01.dbf'\n\
  SIZE 100m\nEXTENT MANAGEMENT LOCAL\nUNIFORM SIZE 512k\nSEGMENT SPACE MANAGEMENT\
  \ AUTO\nDEFAULT ROW STORE COMPRESS ADVANCED;\n```\n\n**注意**\n如果您使用的是 Oracle Database\
  \ 11g，请使用 `COMPRESS FOR OLTP` 子句代替 `ROW STORE COMPRESS ADVANCED`。\n\n现在，当在此表空间中创建表时，它将自动创建为具有\
  \ `ROW STORE COMPRESS ADVANCED` 功能。您可以通过以下查询验证表空间的压缩特性：\n\n```sql\nselect tablespace_name,\
  \ def_tab_compression, compress_for\nfrom dba_tablespaces;\n```\n\n**提示**\n有关表压缩的完整详细信息，请参见第\
  \ 7 章。\n\n如果表空间已经创建，您可以更改其压缩特性，如下所示：\n\n```sql\nSQL> alter tablespace tools_comp\
  \ default row store compress advanced;\n```\n\n以下示例将表空间的默认压缩更改为 `BASIC`：\n\n```sql\n\
  SQL> alter tablespace tools_comp default compress basic;\n```\n\n您可以通过 `NOCOMPRESS`\
  \ 子句禁用表空间压缩：\n\n```sql\nSQL> alter tablespace tools_comp default nocompress;\n```\n\
  \n**注意**\n大多数压缩功能需要 Oracle 企业版和高级压缩选项（需付费）。使用压缩率和现有数据量、增长和保留情况可以显示此选项的价值。\n\n##\
  \ 显示表空间大小\n\nDBA 通常使用监控脚本在需要增加分配给表空间的空间时发出警报。根据您是否处于多租户容器数据库环境，用于确定空间使用情况的 SQL 会有所不同。对于常规数据库（非容器），您可以使用\
  \ DBA 级别的视图来确定空间使用情况。以下脚本显示表空间和数据文件的剩余可用空间百分比：\n\n```sql\nSET PAGESIZE 100 LINES\
  \ 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP ON\nCOMPUTE SUM OF a_byt t_byt\
  \ f_byt ON REPORT\nBREAK ON REPORT ON tablespace_name ON pf\nCOL tablespace_name\
  \ FOR A17   TRU HEAD 'Tablespace|Name'\nCOL file_name       FOR A40   TRU HEAD 'Filename'\n\
  COL a_byt           FOR 9,990.999 HEAD 'Allocated|GB'\nCOL t_byt           FOR 9,990.999\
  \ HEAD 'Current|Used GB'\nCOL f_byt           FOR 9,990.999 HEAD 'Current|Free GB'\n\
  COL pct_free        FOR 990.0     HEAD 'File %|Free'\nCOL pf              FOR 990.0\
  \     HEAD 'Tbsp %|Free'\nCOL seq NOPRINT\nDEFINE b_div=1073741824\n--\nSELECT 1\
  \ seq, b.tablespace_name, nvl(x.fs,0)/y.ap*100 pf, b.file_name file_name,\nb.bytes/&&b_div\
  \ a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div) t_byt,\nNVL(SUM(f.bytes)/&&b_div,0)\
  \ f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free\nFROM dba_free_space f, dba_data_files\
  \ b\n,(SELECT y.tablespace_name, SUM(y.bytes) fs\nFROM dba_free_space y GROUP BY\
  \ y.tablespace_name) x\n,(SELECT x.tablespace_name, SUM(x.bytes) ap\nFROM dba_data_files\
  \ x GROUP BY x.tablespace_name) y\nWHERE f.file_id(+) = b.file_id\nAND   x.tablespace_name(+)\
  \ = y.tablespace_name\nand   y.tablespace_name =  b.tablespace_name\nAND   f.tablespace_name(+)\
  \ = b.tablespace_name\nGROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name,\
  \ b.bytes\nUNION\nSELECT 2 seq, tablespace_name,\nj.bf/k.bb*100 pf, b.name file_name,\
  \ b.bytes/&&b_div a_byt,\na.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt,\n\
  a.bytes_free/b.bytes*100 pct_free\nFROM v$temp_space_header a, v$tempfile b\n,(SELECT\
  \ SUM(bytes_free) bf FROM v$temp_space_header) j\n,(SELECT SUM(bytes) bb FROM v$tempfile)\
  \ k\nWHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n```\n\n如果您没有任何监控措施，当尝试执行插入或更新操作的\
  \ SQL 语句因表空间需要更多空间但无法分配更多空间而失败时，您会收到警报。此时，会抛出 `ORA-01653` 错误，指示对象无法扩展。\n\n在确定表空间需要更多空间后，您需要增大数据文件的大小或向表空间添加数据文件。有关这些主题的讨论，请参阅本章后面的“更改表空间大小”部分。\n\
  \n**提示**\n有关在可插拔数据库环境中使用容器数据库（CDB）级视图报告空间的完整详细信息，请参见第 22 章。\n\n## 显示 Oracle 错误消息和操作\n\
  \n您可以使用 `oerr` 实用程序快速显示错误原因以及应采取操作的简要说明；例如，\n\n```bash\n$ oerr ora 01653\n```\n\n\
  以下是此示例的输出：\n\n```\n01653, 00000, \"unable to extend table %s.%s by %s in tablespace\
  \ %s\"\n// *Cause:  Failed to allocate an extent of the required number of blocks\
  \ for\n//          a table segment in the tablespace indicated.\n// *Action: Use\
  \ ALTER TABLESPACE ADD DATAFILE statement to add one or more\n//          files\
  \ to the tablespace indicated.\n```\n\n`oerr` 实用程序的输出为您提供了一种快速简便的故障分类方法。如果提供的信息不够，那么\
  \ Google 是一个好的备选方案。\n\n## 更改表空间大小\n\n当您确定要调整大小的数据文件后，首先确保在数据文件所在的挂载点上有足够的磁盘空间来增大数据文件的大小：\n\
  \n```bash\n$ df -h | sort\n```\n\n使用 `ALTER DATABASE DATAFILE ... RESIZE` 命令增大数据文件的大小。此示例将数据文件大小调整为\
  \ 1GB：\n\n```sql\nSQL> alter database datafile '/u01/dbfile/o18c/users01.dbf' resize\
  \ 1g;\n```\n\n如果您在现有挂载点上没有空间来增大数据文件的大小，则必须添加数据文件。要向现有表空间添加数据文件，请使用 `ALTER TABLESPACE\
  \ ... ADD DATAFILE` 语句：\n\n```sql\nSQL> alter tablespace users\nadd datafile '/u02/dbfile/o18c/users02.dbf'\
  \ size 100m;\n```\n\n对于大文件表空间，您可以选择使用 `ALTER TABLESPACE` 语句来调整数据文件的大小。这适用于大文件表空间，因为只能有一个数据文件与之关联：\n\
  \n```sql\nSQL> alter tablespace inv_big_data resize 1P;\n```\n\n在管理具有高事务负载的数据库时，调整数据文件大小可能是日常任务。增大数据文件的大小允许您在不添加更多数据文件的情况下向表空间添加空间。如果包含现有数据文件的存储设备上没有足够的磁盘空间，您可以向现有表空间添加位于不同位置的数据文件。\n\
  \n要向临时表空间添加空间，首先查询 `V$TEMPFILE` 视图以验证临时数据文件的当前位置和大小：\n\n```sql\nSQL> select name,\
  \ bytes from v$tempfile;\n```\n\n然后，使用 `ALTER DATABASE` 语句的 `TEMPFILE` 选项：\n\n```sql\n\
  SQL> alter database tempfile '/u01/dbfile/o18c/temp01.dbf' resize 500m;\n```\n\n\
  您也可以通过 `ALTER TABLESPACE` 语句向临时表空间添加文件：\n\n```sql\nSQL> alter tablespace temp add\
  \ tempfile '/u01/dbfile/o18c/temp02.dbf' size 5000m;\n```\n\n## 切换数据文件脱机和联机\n\n\
  有时在执行维护操作（例如重命名数据文件）时，您可能需要先将数据文件脱机。您可以使用 `ALTER TABLESPACE` 或 `ALTER DATABASE DATAFILE`\
  \ 语句来切换数据文件的脱机和联机状态。\n\n**提示**\n从 Oracle Database 12c 开始，您可以在数据文件联机并打开使用时移动和重命名它们。有关此内容的讨论，请参见本章后面的“重命名或重新定位数据文件”。\n\
  \n使用 `ALTER TABLESPACE ... OFFLINE NORMAL` 语句使数据文件脱机。您不需要指定 `NORMAL`，因为它是默认值：\n\n\
  ```sql\nSQL> alter tablespace users offline;\n```\n\n当您以正常模式使表空间脱机时，Oracle 会对与该表空间关联的数据文件执行检查点（checkpoint）。这确保与表空间关联的所有已修改内存块都被刷新并写入数据文件。当您将表空间及其关联的数据文件重新联机时，不需要执行介质恢复。\n\
  \n当数据库处于加载（mount）模式时，您不能使用 `ALTER TABLESPACE` 语句使表空间脱机。如果您尝试在数据库已加载（但未打开）时使表空间脱机，您会收到以下错误：\n\
  \n```\nORA-01109: database not open\n```\n\n**注意**\n在加载模式下，您必须使用 `ALTER DATABASE\
  \ DATAFILE` 语句使数据文件脱机。这可能不是必需的，但表空间可能有多个数据文件，每个文件都需要单独脱机。\n\n在使表空间脱机时，您也可以指定 `ALTER\
  \ TABLESPACE ... OFFLINE TEMPORARY`。在这种情况下，Oracle 会启动对与表空间关联的所有联机数据文件的检查点。Oracle\
  \ 不会对与表空间关联的脱机数据文件启动检查点。\n\n在使表空间脱机时，您可以指定 `ALTER TABLESPACE ... OFFLINE IMMEDIATE`。在这种情况下，您的数据库必须处于归档日志模式，否则会抛出以下错误：\n\
  \n```\nORA-01145: offline immediate disallowed unless media recovery enabled\n```\n\
  \n使用 `OFFLINE IMMEDIATE` 时，Oracle 不会对数据文件发出检查点。在将其重新联机之前，您必须对表空间执行介质恢复。\n\n**注意**\n\
  当数据库打开时，您不能使 `SYSTEM` 或 `UNDO` 表空间脱机。但是，`SYSAUX` 可以脱机；某些功能可能不可用，或者可能出现错误。\n\n您也可以使用\
  \ `ALTER DATABASE DATAFILE` 语句使数据文件脱机。如果您使用 `ALTER DATABASE DATAFILE` 语句使数据文件脱机，并且您的数据库未处于归档日志模式，则会抛出\
  \ `ORA-01145` 错误。\n\n如果您的数据库未处于归档日志模式，您必须在使数据文件脱机时指定 `ALTER DATABASE DATAFILE ...\
  \ OFFLINE FOR DROP`。您可以指定完整的文件名或提供文件号。在此示例中，数据文件 6 被脱机：\n\n```sql\nSQL> alter database\
  \ datafile 4 offline for drop;\n```\n\n现在，如果您尝试将脱机的数据文件联机，会收到以下错误：\n\n```sql\nSQL>\
  \ alter database datafile 4 online;\nORA-01113: file 4 needs media recovery\n```\n\
  \n当您使用 `OFFLINE FOR DROP` 子句时，不会对数据文件执行检查点。这意味着在将其联机之前，您需要对数据文件执行介质恢复。执行介质恢复会将记录在联机重做日志中但不在数据文件本身中的任何更改应用到数据文件。在您可以将在脱机时使用\
  \ `OFFLINE FOR DROP` 子句的数据文件联机之前，您必须对其执行介质恢复。您可以指定完整的文件名或文件号：\n\n```sql\nSQL> recover\
  \ datafile 4;\n```\n\n如果 Oracle 需要的重做信息包含在联机重做日志中，您应该看到此消息：\n\n```\nMedia recovery\
  \ complete.\n```\n\n如果您的数据库未处于归档日志模式，并且如果 Oracle 需要联机重做日志中未包含的重做信息来恢复数据文件，那么您将无法恢复数据文件并将其重新联机。\n\
  \n如果您的数据库处于归档日志模式，您可以在没有 `FOR DROP` 子句的情况下使其脱机。在这种情况下，Oracle 会忽略 `FOR DROP` 子句。即使您的数据库处于归档日志模式，对于使用\
  \ `ALTER DATABASE DATAFILE` 语句脱机的数据文件，您也需要执行介质恢复。表 4-3 总结了在使表空间/数据文件脱机时必须考虑的选项。\n\
  \n**注意**\n当数据库处于加载模式（且未打开）时，您可以使用 `ALTER DATABASE DATAFILE` 命令使任何数据文件脱机，包括 `SYSTEM`\
  \ 和 `UNDO`。\n\n**表 4-3**\n使表空间/数据文件脱机的选项\n\n| 语句 | 需要归档日志模式？ | 切换联机时是否需要介质恢复？ |\
  \ 在加载模式下工作？ |\n| --- | --- | --- | --- |\n| `ALTER TABLESPACE ... OFFLINE NORMAL`\
  \ | 否 | 否 | 否 |\n| `ALTER TABLESPACE ... OFFLINE TEMPORARY` | 否 | 可能：取决于是否有数据文件已处于脱机状态\
  \ | 否 |\n| `ALTER TABLESPACE ... OFFLINE IMMEDIATE` | 否 | 是 | 否 |\n| `ALTER DATABASE\
  \ DATAFILE ... OFFLINE` | 是 | 是 | 是 |\n| `ALTER DATABASE DATAFILE ... OFFLINE FOR\
  \ DROP` | 否 | 是 | 是 |\n\n这些使数据文件和表空间脱机的步骤提供了练习介质恢复的机会，并可以在新数据库或测试数据库中演练这些场景。这种实践对于记录笔记、记录错误消息以及收集关于发生情况和结果的说明非常有用，以便在出现这些错误的压力情况下使用。\n\
  \n## 重命名或重新定位数据文件\n\n您可能偶尔需要移动或重命名数据文件。例如，您可能需要移动数据文件，因为存储设备发生了变化，或者文件是在错误的位置创建的或使用了非标准名称。从\
  \ Oracle Database 12c 开始，您可以在数据文件联机时选择重命名或移动数据文件，或者两者兼而有之。否则，您将必须使数据文件脱机以进行维护操作。\n\
  \n### 执行联机数据文件操作\n\nOracle Database 12c 的新功能是 `ALTER DATABASE MOVE DATAFILE` 命令。此命令允许您在没有任何停机的情况下重命名或移动数据文件。这极大地简化了移动或重命名数据文件的任务，因为无需手动将数据文件脱机/联机并使用操作系统命令物理移动文件。这个曾经手动密集（且容易出错）的操作现在已简化为单个\
  \ SQL 命令。\n\n数据文件必须处于联机状态才能进行联机移动或重命名。以下是一个重命名联机数据文件的示例：\n\n```sql\nSQL> alter database\
  \ move datafile '/u01/dbfile/o18c/users01.dbf' to\n'/u01/dbfile/o18c/users_dev01.dbf';\n\
  ```\n\n以下是一个将数据文件移动到新挂载点的示例：\n\n```sql\nSQL> alter database move datafile '/u01/dbfile/o18c/hrdata01.dbf'\
  \ to\n'/u02/dbfile/o18c/hrdata01.dbf';\n```\n\n您也可以在重命名或移动数据文件时指定数据文件编号；例如，\n\n\
  ```sql\nSQL> alter database move datafile 2 to '/u02/dbfile/o18c/sysuax01.dbf';\n\
  ```\n\n在前面的示例中，您指定移动数据文件 2。\n\n如果您正在移动数据文件，并且出于任何原因希望保留原始文件的副本，可以使用 `KEEP` 选项：\n\
  \n```sql\nSQL> alter database move datafile 4 to '/u02/dbfile/o18c/users01.dbf'\
  \ keep;\n```\n\n您可以指定 `REUSE` 子句来覆盖现有文件：\n\n```sql\nSQL> alter database move datafile\
  \ 4 to '/u01/dbfile/o18c/users01.dbf' reuse;\n```\n\nOracle 不允许您覆盖（重用）数据库当前正在使用的数据文件。这是一件好事。\n\
  \n### 执行脱机数据文件操作\n\n在 12c 之前，要重命名或移动数据文件，您必须使数据文件脱机。移动和重命名脱机数据文件有两种稍有不同的方法：\n\n\
  *   结合使用 SQL 命令和操作系统命令。\n*   结合使用重新创建控制文件和操作系统命令。\n\n由于这些是脱机功能，我通常计划在需要一些停机时间的补丁或升级维护活动之前或之后进行这些步骤。除非是紧急步骤需要从磁盘或挂载点移出，否则这通常可以在该时间段内发生。如果此类活动成为常规情况，那么值得花时间和精力研究使用\
  \ ASM，因为它提供了移动文件的其他选项。这两种技术将在接下来的两个小节中讨论。\n\n#### 使用 SQL 和操作系统命令\n\n以下是使用 SQL 命令和操作系统命令重命名数据文件的步骤：\n\
  \n1.  使用以下查询确定现有数据文件的名称：\n\n    ```sql\n    SQL> select name from v$datafile;\n\
  \    ```\n\n2.  使用 `ALTER TABLESPACE` 或 `ALTER DATABASE DATAFILE` 语句使数据文件脱机（有关如何执行此操作的详细信息，请参阅前面的“执行脱机数据文件操作”部分）。您也可以关闭数据库然后以加载模式启动；在此模式下可以移动数据文件，因为它们尚未打开供使用。\n\
  \n3.  使用操作系统命令（如 `mv` 或 `cp`）或内置 PL/SQL 包 `DBMS_FILE_TRANSFER` 的 `COPY_FILE` 过程将数据文件物理移动到新位置。\n\
  \n4.  使用 `ALTER TABLESPACE ... RENAME DATAFILE ... TO` 语句或 `ALTER DATABASE RENAME\
  \ FILE ... TO` 语句更新控制文件中的数据文件名称。\n\n5.  使数据文件联机。\n\n**注意**\n如果您需要重命名与 `SYSTEM` 或\
  \ `UNDO` 表空间关联的数据文件，必须关闭数据库并以加载模式启动。当数据库处于加载模式时，您可以通过 `ALTER DATABASE RENAME FILE`\
  \ 语句重命名这些数据文件。\n\n以下示例演示如何移动与单个表空间关联的数据文件。首先，使用 `ALTER TABLESPACE` 语句使数据文件脱机：\n\n\
  ```sql\nSQL> alter tablespace users offline;\n```\n\n现在，在操作系统提示符下，使用 Linux/Unix\
  \ `mv` 命令将数据文件移动到新位置：\n\n```bash\n$ mv /u01/dbfile/o18c/users01.dbf /u02/dbfile/o18c/users01.dbf\n\
  ```\n\n使用 `ALTER TABLESPACE` 语句更新控制文件：\n\n```sql\nalter tablespace users\nrename\
  \ datafile\n'/u01/dbfile/o18c/users01.dbf'\nto\n'/u02/dbfile/o18c/users01.dbf';\n\
  ```\n\n最后，将表空间内的数据文件重新联机：\n\n```sql\nSQL> alter tablespace users online;\n```\n\n\
  如果您想在一次操作中重命名多个表空间的数据文件，可以使用 `ALTER DATABASE RENAME FILE` 语句（而不是 `ALTER TABLESPACE...RENAME\
  \ DATAFILE` 语句）。以下示例重命名数据库中的多个数据文件。由于正在移动 `SYSTEM` 和 `UNDO` 表空间的数据文件，您必须先关闭数据库，然后将其置于加载模式：\n\
  \n```sql\nSQL> conn / as sysdba\nSQL> shutdown immediate;\nSQL> startup mount;\n\
  ```\n\n由于数据库处于加载模式，数据文件未打开供使用，因此无需使数据文件脱机。接下来，通过 Linux `mv` 命令物理移动文件：\n\n```bash\n\
  $ mv /u01/dbfile/o18c/system01.dbf /u02/dbfile/o18c/system01.dbf\n$ mv /u01/dbfile/o18c/sysaux01.dbf\
  \ /u02/dbfile/o18c/sysaux01.dbf\n$ mv /u01/dbfile/o18c/undotbs01.dbf /u02/dbfile/o18c/undotbs01.dbf\n\
  ```\n\n**注意**\n您必须在更新控制文件之前移动文件。`ALTER DATABASE RENAME FILE` 命令期望文件位于重命名后的位置。如果文件不在那里，会抛出错误：`ORA-27037:\
  \ unable to obtain file status`。\n\n现在，您可以更新控制文件以知晓新文件名：\n\n```sql\nalter database\
  \ rename file\n'/u01/dbfile/o18c/system01.dbf',\n'/u01/dbfile/o18c/sysaux01.dbf',\n\
  '/u01/dbfile/o18c/undotbs01.dbf'\nto\n'/u02/dbfile/o18c/system01.dbf',\n'/u02/dbfile/o18c/sysaux01.dbf',\n\
  '/u02/dbfile/o18c/undotbs01.dbf';\n```\n\n您应该能够打开数据库：\n\n```sql\nSQL> alter database\
  \ open;\n```\n\n#### 重新创建控制文件和操作系统命令\n\n重新定位数据库中所有数据文件的另一种方法是使用重新创建的控制文件和操作系统命令的组合。此操作的步骤如下：\n\
  \n1.  创建一个包含 `CREATE CONTROLFILE` 语句的跟踪文件。\n2.  修改跟踪文件以显示数据文件的新位置。\n3.  关闭数据库。\n\
  4.  使用操作系统命令物理移动数据文件。\n5.  以 nomount 模式启动数据库。\n6.  运行 `CREATE CONTROLFILE` 命令。\n\
  \n**注意**\n重新创建控制文件时，请注意文件中包含的任何 RMAN 信息都将丢失。如果您不使用恢复目录，可以使用 `RMAN CATALOG` 命令用 RMAN\
  \ 备份信息重新填充控制文件。\n\n以下示例逐步完成了前面的步骤。首先，通过 `ALTER DATABASE BACKUP CONTROLFILE TO TRACE`\
  \ 语句将 `CREATE CONTROLFILE` 语句写入跟踪文件：\n\n```sql\nSQL> alter database backup controlfile\
  \ to trace as '/tmp/mvctrlfile.sql' noresetlogs;\n```\n\n关于前面的语句有几点需要注意。首先，在 `/tmp`\
  \ 目录中创建了一个名为 `mvctrlfile.sql` 的文件；此文件包含一个 `CREATE CONTROLFILE` 语句。其次，前面的语句使用了 `NORESETLOGS`\
  \ 子句；这指示 Oracle 仅向跟踪文件写入一个 SQL 语句。如果您不指定 `NORESETLOGS`，Oracle 会向跟踪文件写入两个 SQL 语句：一个用于使用\
  \ `NORESETLOGS` 选项重新创建控制文件，另一个用于使用 `RESETLOGS` 重新创建控制文件。通常，您知道是否要在重新创建控制文件时重置联机重做日志。在这种情况下，您知道在重新创建控制文件时不需要重置联机重做日志（因为联机重做日志未损坏并且仍在数据库的正常位置）。\n\
  \n接下来，编辑 `/tmp/mvctrlfile.sql` 文件，并将目录路径的名称更改为新位置。以下是此示例的 `CREATE CONTROLFILE` 语句：\n\
  \n```sql\nCREATE CONTROLFILE REUSE DATABASE \"O18C\" NORESETLOGS  NOARCHIVELOG\n\
  MAXLOGFILES 16\nMAXLOGMEMBERS 4\nMAXDATAFILES 1024\nMAXINSTANCES 1\nMAXLOGHISTORY\
  \ 876\nLOGFILE\nGROUP 1 (\n'/u01/oraredo/o18c/redo01a.rdo',\n'/u02/oraredo/o18c/redo01b.rdo'\n\
  ) SIZE 50M BLOCKSIZE 512,\nGROUP 2 (\n'/u01/oraredo/o18c/redo02a.rdo',\n'/u02/oraredo/o18c/redo02b.rdo'\n\
  ) SIZE 50M BLOCKSIZE 512,\nGROUP 3 (\n'/u01/oraredo/o18c/redo03a.rdo',\n'/u02/oraredo/o18c/redo03b.rdo'\n\
  ) SIZE 50M BLOCKSIZE 512\nDATAFILE\n'/u01/dbfile/o18c/system01.dbf',\n'/u01/dbfile/o18c/sysaux01.dbf',\n\
  '/u01/dbfile/o18c/undotbs01.dbf',\n'/u01/dbfile/o18c/users01.dbf'\nCHARACTER SET\
  \ AL32UTF8;\n```\n\n现在，关闭数据库：\n\n```sql\nSQL> shutdown immediate;\n```\n\n在操作系统提示符下物理移动文件。此示例使用\
  \ Linux `mv` 命令移动文件：\n\n```bash\n$ mv /u02/dbfile/o18c/system01.dbf /u01/dbfile/o18c/system01.dbf\n\
  $ mv /u02/dbfile/o18c/sysaux01.dbf /u01/dbfile/o18c/sysaux01.dbf\n$ mv /u02/dbfile/o18c/undotbs01.dbf\
  \ /u01/dbfile/o18c/undotbs01.dbf\n$ mv /u02/dbfile/o18c/users01.dbf /u01/dbfile/o18c/users01.dbf\n\
  ```\n\n以 nomount 模式启动数据库：\n\n```sql\nSQL> startup nomount;\n```\n\n然后，执行包含 `CREATE\
  \ CONTROLFILE` 语句的文件（在此示例中为 `mvctrlfile.sql`）：\n\n```sql\nSQL> @/tmp/mvctrlfile.sql\n\
  ```\n\n如果语句成功，您会看到以下消息：\n\n```\nControl file created.\n```\n\n最后，打开您的数据库：\n\n```sql\n\
  SQL> alter database open;\n```\n\n## 将 ASM 用于表空间\n\nASM 是一种管理物理磁盘和 Oracle 数据库及文件系统存储分配的方法。添加存储变成向磁盘组添加磁盘，并允许额外的空间动态地对表空间可用。随着存储硬件的进步，也有方法向挂载点添加磁盘。这取决于数据库和环境的管理方式以及\
  \ ASM 是否是环境的一部分。\n\n使用 ASM 相对于共享存储有很多优势，从易于磁盘管理到数据文件修复，以及针对数据库的特定验证。ASM 通常命名为 `+ASM`，是另一个需要可用的实例，以便数据库能够使用磁盘组。这是为多个数据库共享存储、重新平衡工作负载以及为数据库存储提供更高可用性的一种方式。\n\
  \n默认存储空间的参数已经讨论过，而不是命名可能随着数据库增长或移动而改变的挂载点，使用 `+ASM` 的数据库可以使用磁盘组，而不必担心挂载点的名称。创建了一个名为\
  \ `oradata` 的磁盘组用于数据库存储。使用以下命令设置文件目标参数：\n\n```sql\nSQL> alter system set DB_CREATE_FILE_DEST\
  \ = '+oradata';\n```\n\n要创建表空间：\n\n```sql\nSQL> create tablespace hrdata;\n```\n\
  \n这将在 `oradata` 磁盘组上创建一个表空间 `hrdata`。文件名由 `+ASM` 生成，并且默认情况下，`+ASM` 中有一个用于文件名的模板。如果使用了模板，`DB_CREATE_FILE_DEST`\
  \ 参数将指向该模板以及磁盘组。\n\n```sql\nSQL> alter system set DB_CREATE_FILE_DEST = '+oradata(datatemplate)';\n\
  ```\n\n数据文件和表空间视图仍然可用，用于查看创建了哪些表空间以及属于数据库的数据文件。视图 `v$datafile` 和 `dba_data_files`\
  \ 将显示以磁盘组 `+oradata` 开头的文件。`dba_tablespaces` 视图仍将像非 ASM 数据库一样显示 `hrdata` 表空间。还有一些额外的视图将显示磁盘组中的文件。要查看磁盘组视图中的\
  \ ASM 磁盘，应查询 `v$asm_disk`。磁盘组中的文件可以在 `v$asm_file` 和 `v$asm_alias` 视图中看到。\n\n从 `v$asm_file`\
  \ 中可以获得文件编号、类型和空间信息，而 `v$asm_alias` 提供数据文件名：\n\n```sql\nSQL> select file.file_number,\
  \ alias.name, file.type\nFrom v$asm_file file, v$asm_alias alias\nWhere file.group_number=alias.group_number\
  \ and file.file_number=alias.file_number;\n```\n\nOracle 云使用 ASM 和 ASM 集群文件系统（ACFS）来呈现存储。它确实简化并自动化了存储管理。不需要另一个卷或文件管理器工具。同样，使用\
  \ Oracle 数据库附带的存储管理工具有很多优势。有大量的参考资料展示如何创建磁盘组、添加或删除磁盘、执行维护以及管理 ASM 存储和文件系统。\n\n##\
  \ 本章小结\n\n本章讨论了管理表空间和数据文件。表空间是数据文件组的逻辑容器。数据文件是磁盘上包含数据的物理文件。在创建表空间和相应的数据文件时，您应该仔细规划。\n\
  \n表空间允许您分离不同应用程序的数据。您还可以将表与索引分离。这些允许您为每个应用程序自定义表空间的存储特性。此外，表空间提供了一种更好地管理具有不同可用性以及备份和恢复要求的应用程序的方法。尽管有很多选项可以配置表空间，但存储技术的进步已经可以满足分离数据文件、区和自动扩展的许多需求。使用存储特性和工具（如\
  \ ASM）将有助于管理数据库所需磁盘和存储的性能。通过这些步骤简化了表空间选项。因此，存储规划在于数据增长领域以及监控空间使用情况以主动增加表空间的空间分配。\n\
  \n安全选项允许对表空间中的静态数据进行透明加密。表空间使用加密选项创建，并且钱包和密钥在数据库打开时可用，允许查看数据库中的数据，但不能通过服务器上的文件查看。\n\
  \n作为 DBA，您必须精通管理表空间和数据文件。在任何类型的环境中，您都必须添加、重命名、重新定位和删除这些存储容器。这些是在首次创建数据库或在测试环境中练习命令和恢复数据文件的理想测试。可以将命令、错误和问题记录下来，以供将来在数据文件损坏和恢复的压力情况下参考。\n\
  \nOracle 需要三种类型的文件才能运行数据库：数据文件、控制文件和联机重做日志文件。下一章重点介绍控制文件和联机重做日志文件管理以及实现归档日志。\n\n"
- "# 第 5 章 管理控制文件、联机重做日志和归档日志\n\nOracle 数据库由三种类型的必需文件组成：数据文件、控制文件和联机重做日志。第 4 章重点介绍了表空间和数据文件。本章介绍管理控制文件和联机重做日志以及实现归档日志。本章第一部分讨论典型的控制文件维护任务，例如添加、移动和删除控制文件。本章中间部分探讨与联机重做日志文件相关的\
  \ DBA 活动，例如重命名、添加、删除和重新定位这些关键文件。最后，涵盖了启用和实现归档的体系结构方面。\n\n## 管理控制文件\n\n控制文件是一个小的二进制文件，存储以下类型的信息：\n\
  \n*   数据库名称\n*   数据文件的名称和位置\n*   联机重做日志文件的名称和位置\n*   当前联机重做日志序列号\n*   检查点信息\n* \
  \  RMAN 备份文件的名称和位置\n\n您可以从数据字典视图查询存储在控制文件中的许多信息。此示例通过查询 `v$controlfile_record_section`\
  \ 显示存储在控制文件中的信息类型：\n\n```sql\nSQL> select distinct type from v$controlfile_record_section;\n\
  ```\n\n以下是部分输出列表：\n\n```\nTYPE\n------------------------------------------------------------\n\
  FILENAME\nTABLESPACE\nRMAN CONFIGURATION\nBACKUP CORRUPTION\nPROXY COPY\nFLASHBACK\
  \ LOG\nREMOVABLE RECOVERY FILES\nAUXILIARY DATAFILE COPY\nDATAFILE\n```\n\n您可以通过\
  \ `v$database` 视图查看存储在控制文件中的数据库相关信息。`v$` 视图基于 `x$` 表或视图，`v$database` 基于 `x$database`，后者只是读取控制文件：\n\
  \n```sql\nSQL> select name, open_mode, created, current_scn from v$database;\n```\n\
  \n以下是此示例的输出：\n\n```\nNAME      OPEN_MODE            CREATED   CURRENT_SCN\n---------\
  \ -------------------- --------- -----------\nO18C      READ WRITE           28-SEP-12\
  \     2573820\n```\n\n每个 Oracle 数据库必须至少有一个控制文件。当您以 `nomount` 模式启动数据库时，实例通过 `spfile`\
  \ 或 `init.ora` 文件中的 `CONTROL_FILES` 初始化参数知晓控制文件的位置。当您发出 `STARTUP NOMOUNT` 命令时，Oracle\
  \ 读取参数文件，启动后台进程并分配内存结构：\n\n```sql\n-- 实例知晓控制文件的位置\nSQL> startup nomount;\n```\n\n\
  此时，任何进程都尚未访问控制文件。当您将数据库更改为加载（mount）模式时，控制文件被读取并打开供使用：\n\n```sql\n-- 控制文件已打开\nSQL>\
  \ alter database mount;\n```\n\n如果 `CONTROL_FILES` 初始化参数中列出的任何控制文件不可用，则无法加载数据库。\n\
  \n当您成功加载数据库时，实例知晓数据文件和联机重做日志的位置，但尚未打开它们。在将数据库更改为打开模式后，数据文件和联机重做日志被打开：\n\n```sql\n\
  -- 数据文件和联机重做日志已打开\nSQL> alter database open;\n```\n\n**注意**\n请记住，当您发出 `STARTUP`\
  \ 命令（无选项）时，将按此顺序自动执行前面描述的三个阶段：nomount、mount、open。当您发出 `SHUTDOWN` 命令时，阶段会反转：关闭数据库、卸载控制文件、停止实例。\n\
  \n控制文件在创建数据库时创建。正如您在第 2 章中看到的，在创建数据库时，应创建至少两个控制文件（以避免单点故障）。以前，您应该将多个控制文件存储在由不同控制器控制的单独存储设备上，但由于存储设备，可能很难知道是否是单独的设备，因此具有容错设备和镜像功能非常重要。控制文件是数据库非常重要的一部分，需要可用或在需要时非常快速地恢复。\n\
  \n控制文件也可以在 ASM 磁盘组上。这允许一个控制文件位于 `+ORADATA` 磁盘组中，另一个文件位于 `+FRA` 磁盘组中。管理控制文件及其内部细节与在文件系统上相同，只是控制文件使用\
  \ ASM 磁盘组。\n\n数据库打开后，Oracle 会频繁地将信息写入控制文件，例如当您进行任何物理修改时（例如，创建表空间、添加/删除/调整数据文件大小）。Oracle\
  \ 写入由 `CONTROL_FILES` 初始化参数指定的所有控制文件。如果 Oracle 无法写入其中一个控制文件，则会抛出错误：\n\n```\nORA-00210:\
  \ cannot open the specified control file\n```\n\n如果其中一个控制文件变得不可用，请关闭数据库，并在重新启动之前解决问题（有关使用\
  \ RMAN 还原控制文件的信息，请参见第 19 章）。解决问题可能意味着解决存储设备故障或修改 `CONTROL_FILES` 初始化参数以删除不可用控制文件的条目。\n\
  \n### 显示控制文件的内容\n\n您可以使用 `ALTER SESSION` 语句显示控制文件的物理内容；例如，\n\n```sql\nSQL> oradebug\
  \ setmypid\nSQL> oradebug unlimit\nSQL> alter session set events 'immediate trace\
  \ name controlf level 9';\nSQL> oradebug tracefile_name\n```\n\n前面的代码行显示跟踪文件的名称如下：\n\
  \n```\n/ora01/app/oracle/diag/rdbms/o18c/o18c/trace/o18c_ora_4153.trc\n```\n\n跟踪文件写入到\
  \ `$ADR_HOME/trace` 目录。您也可以通过以下查询查看跟踪目录名称：\n\n```sql\nSQL> select value from v$diag_info\
  \ where name='Diag Trace';\n```\n\n以下是跟踪文件的部分内容：\n\n```\n***************************************************************************\n\
  DATABASE ENTRY\n***************************************************************************\n\
  (size = 316, compat size = 316, section max = 1, section in-use = 1,\nlast-recid=\
  \ 0, old-recno = 0, last-recno = 0)\n(extent = 1, blkno = 1, numrecs = 1)\n09/28/2012\
  \ 16:04:54\nDB Name \"O18C\"\nDatabase flags = 0x00404001 0x00001200\nControlfile\
  \ Creation Timestamp  09/28/2012 16:04:57\nIncmplt recovery scn: 0x0000.00000000\n\
  ```\n\n在故障排除或试图更好地了解 Oracle 内部结构时，您可以检查控制文件的内容。\n\n### 查看控制文件名称和位置\n\n如果您的数据库处于\
  \ `nomount`、`mounted` 或 `open` 状态，您可以查看控制文件的名称和位置，如下所示：\n\n```sql\nSQL> show parameter\
  \ control_files\n```\n\n您也可以通过查询 `V$CONTROLFILE` 视图查看控制文件位置和名称信息。此查询在数据库已加载或打开时有效：\n\
  \n```sql\nSQL> select name from v$controlfile;\n```\n\n如果由于某种原因您根本无法启动数据库，并且需要知道控制文件的名称和位置，您可以检查初始化（参数）文件的内容以查看其位置。如果您使用的是\
  \ `spfile`，即使它是二进制文件，您仍然可以使用文本编辑器打开它。最安全的方法是制作 `spfile` 的副本，然后使用操作系统编辑器检查其内容：\n\n\
  ```bash\n$ cp $ORACLE_HOME/dbs/spfileo18c.ora $ORACLE_HOME/dbs/spfileo18c.copy\n\
  $ vi $ORACLE_HOME/dbs/spfileo18c.copy\n```\n\n您也可以使用 `strings` 命令在二进制文件中搜索值：\n\n\
  ```bash\n$ strings spfileo18c.ora | grep -i control_files\n```\n\n如果您使用的是基于文本的初始化文件，您可以直接使用操作系统编辑器查看文件，或使用\
  \ `grep` 命令：\n\n```bash\n$ grep -i control_files $ORACLE_HOME/dbs/inito18c.ora\n\
  ```\n\n### 添加控制文件\n\n添加控制文件意味着复制现有的控制文件，并通过修改 `CONTROL_FILES` 参数让您的数据库知晓该副本。此任务必须在数据库关闭时完成。此过程仅在您有一个可以复制的良好现有控制文件时才有效。添加控制文件与创建或恢复控制文件不同。\n\
  \n**提示**\n有关为重命名和移动数据文件的目的重新创建控制文件的示例，请参见第 4 章。有关为重命名数据库的目的重新创建控制文件的示例，请参见第 19 章。\n\
  \n如果您的数据库只使用一个控制文件，并且该控制文件损坏，您需要从备份（如果可用）恢复一个控制文件并执行恢复，或者重新创建控制文件。如果您使用两个或更多控制文件，并且其中一个损坏，您可以使用剩余的良好控制文件快速使数据库进入可操作状态。\n\
  \n如果数据库仅使用一个控制文件，添加控制文件的基本过程如下：\n\n1.  修改初始化文件 `CONTROL_FILES` 参数以包含控制文件的新位置和名称。\n\
  2.  关闭数据库。\n3.  使用操作系统命令将现有控制文件复制到新位置和名称。\n4.  重新启动数据库。\n\n根据您使用的是 `spfile` 还是 `init.ora`\
  \ 文件，前面的步骤略有不同。接下来的两个小节详细介绍了这些不同的场景。\n\n#### Spfile 场景\n\n如果您的数据库是打开的，您可以使用以下 SQL\
  \ 语句快速确定是否使用了 `spfile`：\n\n```sql\nSQL> show parameter spfile\n```\n\n以下是一些示例输出：\n\
  \n```\nNAME                            TYPE        VALUE\n-------------------------------\
  \ ----------- ------------------------------\nspfile                          string\
  \      /ora01/app/oracle/product/18.1.0.1/db_1/dbs/spfileo18c.ora\n```\n\n当您确定使用的是\
  \ `spfile` 时，请使用以下步骤添加控制文件：\n\n1.  确定 `CONTROL_FILES` 参数的当前值：\n\n    ```sql\n  \
  \  SQL> show parameter control_files\n    ```\n\n    输出显示此数据库仅使用一个控制文件：\n\n    ```\n\
  \    NAME                            TYPE        VALUE\n    -------------------------------\
  \ ----------- ------------------------------\n    control_files                \
  \   string      /u01/dbfile/o18c/control01.ctl\n    ```\n\n2.  修改您的 `CONTROL_FILES`\
  \ 参数以包含要添加的新控制文件，但将操作范围限制在 `spfile`（您无法在内存中修改此参数）。确保您也包括步骤 1 中列出的所有控制文件：\n\n   \
  \ ```sql\n    SQL> alter system set control_files='/u01/dbfile/o18c/control01.ctl',\n\
  \    '/u01/dbfile/o18c/control02.ctl' scope=spfile;\n    ```\n\n3.  关闭数据库：\n\n \
  \   ```sql\n    SQL> shutdown immediate;\n    ```\n\n4.  将现有控制文件复制到新位置和名称。在此示例中，通过操作系统\
  \ `cp` 命令创建了一个名为 `control02.ctl` 的新控制文件：\n\n    ```bash\n    $ cp /u01/dbfile/o18c/control01.ctl\
  \ /u01/dbfile/o18c/control02.ctl\n    ```\n\n5.  启动数据库：\n\n    ```sql\n    SQL>\
  \ startup;\n    ```\n\n您可以通过显示 `CONTROL_FILES` 参数来验证是否正在使用新的控制文件：\n\n```sql\nSQL>\
  \ show parameter control_files\n```\n\n以下是此示例的输出：\n\n```\nNAME                 \
  \ TYPE        VALUE\n--------------------- ----------- ------------------------------\n\
  control_files         string      /u01/dbfile/o18c/control01.ctl\n,/u01/dbfile/o18c/control02.ctl\n\
  ```\n\n#### Init.ora 场景\n\n运行以下语句以验证您是否使用 `init.ora` 文件。如果您未使用 `spfile`，`VALUE`\
  \ 列为空：\n\n```sql\nSQL> show parameter spfile\nNAME                            TYPE\
  \        VALUE\n------------------------------- ----------- ------------------------------\n\
  spfile                          string\n```\n\n要在使用文本 `init.ora` 文件时添加控制文件，请执行以下步骤：\n\
  \n1.  关闭数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n    ```\n\n2.  使用操作系统实用程序（如\
  \ `vi`）编辑您的 `init.ora` 文件，并将新的控制文件位置和名称添加到 `CONTROL_FILES` 参数。此示例使用 `vi` 打开 `init.ora`\
  \ 文件，并将 `control02.ctl` 添加到 `CONTROL_FILES` 参数：\n\n    ```bash\n    $ vi $ORACLE_HOME/dbs/inito18c.ora\n\
  \    ```\n\n    在添加 `control02.ctl` 之后，`CONTROL_FILES` 参数如下：\n\n    ```\n    control_files='/u01/dbfile/o18c/control01.ctl',\n\
  \    '/u01/dbfile/o18c/control02.ctl'\n    ```\n\n3.  从操作系统，将现有控制文件复制到要添加的控制文件的位置和名称：\n\
  \n    ```bash\n    $ cp /u01/dbfile/o18c/control01.ctl /u01/dbfile/o18c/control02.ctl\n\
  \    ```\n\n4.  启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n您可以通过显示 `CONTROL_FILES`\
  \ 参数来查看正在使用的控制文件：\n\n```sql\nSQL> show parameter control_files\n```\n\n对于此示例，输出如下：\n\
  \n```\nNAME                       TYPE        VALUE\n--------------------------\
  \ ----------- ------------------------------\ncontrol_files              string\
  \      /u01/dbfile/o18c/control01.ctl\n,/u01/dbfile/o18c/control02.ctl\n```\n\n\
  ### 移动控制文件\n\n您可能偶尔需要将控制文件从一个位置移动到另一个位置。例如，如果数据库服务器添加了新存储，您可能希望将现有控制文件移动到新可用的位置。\n\
  \n移动控制文件的过程与添加控制文件非常相似。唯一的区别是您重命名控制文件而不是复制它。此示例显示了在使用 `spfile` 时如何移动控制文件：\n\n1.\
  \  确定 `CONTROL_FILES` 参数的当前值：\n\n    ```sql\n    SQL> show parameter control_files\n\
  \    ```\n\n    输出显示此数据库仅使用一个控制文件：\n\n    ```\n    NAME                        \
  \    TYPE        VALUE\n    ------------------------------- ----------- ------------------------------\n\
  \    control_files                   string      /u01/dbfile/o18c/control01.ctl\n\
  \    ```\n\n2.  修改您的 `CONTROL_FILES` 参数以反映您正在移动控制文件。在此示例中，控制文件当前在此位置：\n\n    ```\n\
  \    /u01/dbfile/o18c/control01.ctl\n    ```\n\n    您正在将控制文件移动到此位置：\n\n    ```\n\
  \    /u02/dbfile/o18c/control01.ctl\n    ```\n\n    修改 `spfile` 以反映控制文件的新位置。您必须指定\
  \ `SCOPE=SPFILE`，因为 `CONTROL_FILES` 参数无法在内存中修改：\n\n    ```sql\n    SQL> alter system\
  \ set\n    control_files='/u02/dbfile/o18c/control01.ctl' scope=spfile;\n    ```\n\
  \n3.  关闭数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n    ```\n\n4.  在操作系统提示符下，将控制文件移动到新位置。此示例使用操作系统\
  \ `mv` 命令：\n\n    ```bash\n    $ mv /u01/dbfile/o18c/control01.ctl /u02/dbfile/o18c/control01.ctl\n\
  \    ```\n\n5.  启动数据库：\n\n    ```sql\n    SQL> startup;\n    ```\n\n您可以通过显示 `CONTROL_FILES`\
  \ 参数来验证是否正在使用新的控制文件：\n\n```sql\nSQL> show parameter control_files\n```\n\n以下是此示例的输出：\n\
  \n```\nNAME                            TYPE        VALUE\n-------------------------------\
  \ ----------- ------------------------------\ncontrol_files                   string\
  \      /u02/dbfile/o18c/control01.ctl\n```\n\n### 删除控制文件\n\n您可能会遇到这样的情况：包含您一个多路复用控制文件之一的存储设备发生了介质故障：\n\
  \n```\nORA-00205: error in identifying control file, check alert log for more info\n\
  ```\n\n在这种情况下，您仍然至少有一个良好的控制文件。要删除控制文件，请按照以下步骤操作：\n\n1.  通过检查 `alert.log` 中的信息来确定哪个控制文件经历了介质故障：\n\
  \n    ```\n    ORA-00210: cannot open the specified control file\n    ORA-00202:\
  \ control file: '/u01/dbfile/o18c/control02.ctl'\n    ```\n\n2.  从 `CONTROL_FILES`\
  \ 参数中删除不可用的控制文件名。如果您使用的是 `init.ora` 文件，请直接使用操作系统编辑器（如 `vi`）修改该文件。如果您使用的是 `spfile`，请使用\
  \ `ALTER SYSTEM` 语句修改 `CONTROL_FILES` 参数。在此 `spfile` 示例中，从 `CONTROL_FILES` 参数中删除了\
  \ `control02.ctl` 控制文件：\n\n    ```sql\n    SQL> alter system set control_files='/u01/dbfile/o18c/control01.ctl'\n\
  \    scope=spfile;\n    ```\n\n    此数据库现在只有一个控制文件与之关联。您永远不应该仅使用一个控制文件运行生产数据库。有关如何向数据库添加更多控制文件的详细信息，请参阅本章前面的“添加控制文件”部分。\n\
  \n3.  停止并启动数据库：\n\n    ```sql\n    SQL> shutdown immediate;\n    SQL> startup;\n\
  \    ```\n\n**注意**\n如果 `SHUTDOWN IMMEDIATE` 不起作用，请使用 `SHUTDOWN ABORT` 来关闭数据库。当 `SHUTDOWN\
  \ IMMEDIATE` 挂起时，使用 `SHUTDOWN ABORT` 快速关闭数据库没有任何问题；但是，请记住，数据库正在回滚更改，可能并没有挂起。根据处于回滚状态的事务，启动可能需要一些时间或影响性能。\n\
  \n控制文件可以位于 ASM 磁盘组中。这将允许您在不移动数据文件或控制文件的情况下移动后端磁盘和存储。如果使用 ASM 层，存储设备和磁盘对数据库文件变得透明。这不能防止文件损坏或文件被删除时可能需要的恢复，但它确实防止了因位置和使用的磁盘而移动文件。文件将在\
  \ ASM 视图中显示为 `CONTROLFILE` 类型，以了解文件的位置。\n\n### 联机重做日志\n\n联机重做日志存储数据库中发生的事务记录。这些日志服务于以下目的：\n\
  \n*   提供一种记录数据库更改的机制，以便在发生介质故障时，您有一种恢复事务的方法。\n*   确保在发生完全实例故障时，已提交的事务可以被恢复（崩溃恢复），即使已提交的数据更改尚未写入数据文件。\n\
  *   允许管理员通过 Oracle LogMiner 实用程序检查历史数据库事务。\n*   它们被 Oracle 工具（如 GoldenGate 或 Streams）读取以复制数据。\n\
  \n您的数据库中必须至少有两个联机重做日志组。每个联机重做日志组必须至少包含一个联机重做日志 `成员`（member）。`成员` 是磁盘上存在的 `物理文件`。您可以在每个重做日志组中创建多个成员，这称为多路复用（multiplexing）您的联机重做日志组。\n\
  \n**提示**\n我强烈建议您多路复用联机重做日志组，并且如果可能，将每个成员放在由单独控制器管理的单独物理设备上。\n\n日志写入器进程（log-writer\
  \ process）从日志缓冲区（在 SGA 中）写入联机重做日志文件（在磁盘上）。重做记录被分配一个系统更改号（SCN）以标识事务重做信息。有已提交和未提交的记录写入重做日志。当以下任何情况为真时，日志写入器会刷新重做日志缓冲区的内容：\n\
  \n*   发出 `COMMIT`。\n*   发生日志切换。\n*   过去三秒钟。\n*   重做日志缓冲区已满三分之一。\n\n由于这是一个数据库进程，容器数据库（CDB）将管理重做日志。PDB\
  \ 没有自己的重做日志，这也意味着重做日志的空间规划和大小调整是在 CDB 级别进行的，并包括所有 PDB 事务。该架构将在第 22 章中更详细地讨论，但事务大小调整基于\
  \ CDB 的所有 PDB。\n\n日志写入器正在主动写入的联机重做日志组是当前联机重做日志组。日志写入器同时写入重做日志组的所有成员。日志写入器只需要成功写入一个成员，数据库就能继续运行。如果日志写入器无法成功写入当前组的至少一个成员，数据库将停止运行。\n\
  \n当当前联机重做日志组填满时，会发生日志切换，日志写入器开始写入下一个联机重做日志组。发生切换时，会为每个重做日志分配一个日志序列号，用于归档。日志写入器以轮询方式写入联机重做日志组。由于您有有限数量的联机重做日志组，最终每个联机重做日志组的内容将被覆盖。如果您想保存事务信息的历史记录，必须将数据库置于归档日志模式（请参阅本章后面的“实现归档日志模式”部分）。\n\
  \n当您的数据库处于归档日志模式时，每次日志切换后，归档器后台进程（archiver background process）将联机重做日志文件的内容复制到归档重做日志文件。在发生故障时，归档重做日志文件允许您还原自上次数据库备份以来发生的所有事务的完整历史记录。\n\
  \n图 5-1 显示了联机重做日志文件的典型设置。此图显示了三个联机重做日志组，每组包含两个成员。数据库处于归档日志模式。图中，组 2 最近已填满事务，发生了日志切换，日志写入器现在正在写入组\
  \ 3。归档器进程正在将组 2 的内容复制到归档重做日志文件。当组 3 填满时，将发生另一次日志切换，日志写入器将开始写入组 1。同时，归档器进程将组 3 的内容复制到归档日志序列\
  \ 3（依此类推）。\n\n![联机重做日志配置](img/214899_3_En_5_Fig1_HTML.jpg)\n\n**图 5-1**\n联机重做日志配置\n\
  \n联机重做日志文件不是用于备份的。这些文件仅包含数据库生成的最新重做事务信息。当您启用归档时，归档重做日志文件是保护数据库事务历史记录的机制。\n\n当前联机重做日志文件的内容在发生日志切换之前不会被归档。这意味着如果您丢失了当前联机重做日志文件的所有成员，您将丢失事务。以下是帮助保护联机重做日志文件的几种机制：\n\
  \n*   多路复用组。\n*   考虑设置 `ARCHIVE_LAG_TARGET` 初始化参数，以确保联机重做日志定期切换。\n*   如果可能，切勿允许同一组的两个成员共享同一物理磁盘。\n\
  *   确保操作系统文件权限设置得当（限制为只有 Oracle 二进制文件的所有者具有写入和读取权限）。\n*   使用冗余的物理存储设备（即 RAID [廉价磁盘冗余阵列]）。\n\
  *   适当调整日志文件大小，以便它们定期切换和归档。\n\n**注意**\nOracle 提供的唯一可以在您丢失当前联机重做日志组的所有成员时保护您并保留所有已提交事务的工具是\
  \ Oracle Data Guard，以最大保护模式实施。有关 Oracle Data Guard 保护模式的更多详细信息，请参阅 MOS 说明 239100.1。\n\
  \n闪存（Flash）是重做日志的另一个选择。由于日志写入归档日志并需要快速写入，闪存驱动器是提高重性能的一种方法。如果闪存不可用，选项是将重做日志放在物理磁盘上，并根据之前的列表最小化故障。固态磁盘可能无法提供更快的写入，因此它们不是重做日志的理想选择。\n\
  \n联机重做日志文件永远不会由 RMAN 备份或用户管理的热备份备份。如果您确实备份了联机重做日志文件，还原它们将是无意义的。联机重做日志文件包含数据库生成的最新重做信息。您不希望从备份中用旧的重做信息覆盖它们。对于处于归档日志模式的数据库，联机重做日志文件包含执行完全恢复所需的最新生成的事务。重做日志文件也应与其他数据文件一起排除在其他系统备份（非数据库）之外。\n\
  \n### 显示联机重做日志信息\n\n使用 `V$LOG` 和 `V$LOGFILE` 视图显示有关联机重做日志组及其相应成员的信息：\n\n```sql\n\
  COL group#     FORM 99999\nCOL thread#    FORM 99999\nCOL grp_status FORM a10\n\
  COL member     FORM a30\nCOL mem_status FORM a10\nCOL mbytes     FORM 999999\n--\n\
  SELECT\na.group#\n,a.thread#\n,a.status grp_status\n,b.member member\n,b.status\
  \ mem_status\n,a.bytes/1024/1024 mbytes\nFROM v$log     a,\nv$logfile b\nWHERE a.group#\
  \ = b.group#\nORDER BY a.group#, b.member;\n```\n\n以下是一些示例输出：\n\n```\nGROUP# THREAD#\
  \ GRP_STATUS MEMBER                         MEM_STATUS  MBYTES\n------ ------- ----------\
  \ ------------------------------ ---------- -------\n1       1 INACTIVE   /u01/oraredo/o18c/redo01a.rdo\
  \                  50\n1       1 INACTIVE   /u02/oraredo/o18c/redo01b.rdo      \
  \            50\n2       1 CURRENT    /u01/oraredo/o18c/redo02a.rdo            \
  \      50\n2       1 CURRENT    /u02/oraredo/o18c/redo02b.rdo                  50\n\
  ```\n\n当您诊断联机重做日志问题时，`V$LOG` 和 `V$LOGFILE` 视图特别有用。您可以在数据库已加载或打开时查询这些视图。表 5-1 简要描述了每个视图。\n\
  \n**表 5-1**\n与联机重做日志相关的有用视图\n\n| 视图 | 描述 |\n| --- | --- |\n| `V$LOG` | 显示存储在控制文件中的联机重做日志组信息\
  \ |\n| `V$LOGFILE` | 显示联机重做日志文件成员信息 |\n\n`V$LOG` 视图的 `STATUS` 列在处理联机重做日志组时特别有用。表\
  \ 5-2 描述了 `V$LOG` 视图中每个状态及其含义。\n\n**表 5-2**\n`V$LOG` 视图中联机重做日志组的状态\n\n| 状态 | 含义\
  \ |\n| --- | --- |\n| `CURRENT` | 日志组当前正被日志写入器写入。 |\n| `ACTIVE` | 日志组是崩溃恢复所必需的，可能已被归档，也可能未被归档。\
  \ |\n| `CLEARING` | 日志组正被 `ALTER DATABASE CLEAR LOGFILE` 命令清除。 |\n| `CLEARING_CURRENT`\
  \ | 当前日志组正在清除已关闭的线程。 |\n| `INACTIVE` | 日志组不是崩溃恢复所必需的，可能已被归档，也可能未被归档。 |\n| `UNUSED`\
  \ | 日志组从未被写入；它是最近创建的。 |\n\n`V$LOGFILE` 视图的 `STATUS` 列也包含有用的信息。此视图提供有关日志组中每个物理联机重做日志文件成员的信息。表\
  \ 5-3 提供了每个日志文件成员的状态描述及其含义。\n\n**表 5-3**\n`V$LOGFILE` 视图中联机重做日志文件成员的状态\n\n| 状态 |\
  \ 含义 |\n| --- | --- |\n| `INVALID` | 日志文件成员无法访问或最近创建。 |\n| `DELETED` | 日志文件成员不再使用。\
  \ |\n| `STALE` | 日志文件成员的内容不完整。 |\n| `NULL` | 日志文件成员正被数据库使用。 |\n\n区分 `V$LOG` 中的 `STATUS`\
  \ 列和 `V$LOGFILE` 中的 `STATUS` 列非常重要。`V$LOG` 中的 `STATUS` 列反映日志组的状态。`V$LOGFILE` 中的\
  \ `STATUS` 列报告物理联机重做日志文件成员的状态。在诊断联机重做日志问题时，请参考这些表。\n\n### 确定联机重做日志组的最佳大小\n\n尝试将联机重做日志的大小调整为每小时切换两到六次。`V$LOG_HISTORY`\
  \ 包含联机重做日志切换频率的历史记录。执行此查询以查看每小时的日志切换次数：\n\n```sql\nselect count(*)\n,to_char(first_time,'YYYY:MM:DD:HH24')\n\
  from v$log_history\ngroup by to_char(first_time,'YYYY:MM:DD:HH24')\norder by 2;\n\
  ```\n\n以下是输出片段：\n\n```\nCOUNT(*) TO_CHAR(FIRST\n---------- -------------\n1 2012:10:23:23\n\
  3 2012:10:24:03\n28 2012:10:24:04\n23 2012:10:24:05\n68 2012:10:24:06\n84 2012:10:24:07\n\
  15 2012:10:24:08\n```\n\n从前面的输出中，您可以看到大约在凌晨 4:00 到 7:00 之间发生了大量的日志切换活动。这可能是由于夜间批处理作业或不同时区的用户更新数据造成的。对于此数据库，应增加联机重做日志的大小。您应尝试调整联机重做日志的大小以适应数据库上的峰值事务负载。\n\
  \n`V$LOG_HISTORY` 视图显示系统更改号（SCN）。如前所述，一个经验法则是，您应该调整联机重做日志文件的大小，以便它们大约每小时切换两到六次。您不希望它们切换得太频繁，因为日志切换有开销；然而，将事务信息留在重做日志中而不归档会在恢复时产生问题。如果灾难导致当前联机重做日志发生介质故障，您可能会丢失尚未归档的那些事务。如果灾难导致当前联机重做日志发生介质故障，您可能会丢失尚未归档的那些事务。\n\
  \nOracle 在日志切换期间启动检查点。在检查点期间，数据库写入器后台进程将已修改（也称为脏）块写入磁盘，这是资源密集型的。警告日志中的检查点消息也将是查看日志切换速度或是否存在与归档相关的等待的一种方式。\n\
  \n**提示**\n使用 `ARCHIVE_LAG_TARGET` 初始化参数设置日志切换之间的最大时间（以秒为单位）。此参数的典型设置为 1,800 秒（30\
  \ 分钟）。值为 0（默认值）会禁用此功能。此参数通常用于 Oracle Data Guard 环境中，以强制在指定的时间量过去后进行日志切换。\n\n您也可以从\
  \ `V$INSTANCE_RECOVERY` 视图中查询 `OPTIMAL_LOGFILE_SIZE` 列，以确定您的联机重做日志文件大小是否正确：\n\n\
  ```sql\nSQL> select optimal_logfile_size from v$instance_recovery;\n```\n\n以下是一些示例输出：\n\
  \n```\nOPTIMAL_LOGFILE_SIZE\n--------------------\n                 300\n```\n\n\
  此列报告重做日志文件的大小（以兆字节为单位），根据 `FAST_START_MTTR_TARGET` 的初始化参数设置，该大小被认为是最佳的。Oracle 建议您将所有联机重做日志配置为至少为\
  \ `OPTIMAL_LOGFILE_SIZE` 的值。然而，在调整联机重做日志大小时，您必须考虑有关您的环境的信息（例如切换的频率）。\n\n### 确定重做日志组的最佳数量\n\
  \nOracle 需要至少两个重做日志组才能运行。但是，只有两个组有时是不够的。要理解为什么是这样，请记住每次发生日志切换时，都会启动一个检查点。作为检查点的一部分，数据库写入器将所有已修改（脏）块从\
  \ SGA 写入磁盘上的数据文件。还要记住，联机重做日志是以轮询方式写入的，并且最终给定日志中的信息将被覆盖。在日志写入器可以开始覆盖联机重做日志中的信息之前，必须先将\
  \ SGA 中与该重做日志关联的所有已修改块写入数据文件。如果不是这样，所有已修改块都已写入数据文件，您会在 `alert.log` 文件中看到此消息：\n\n\
  ```\nThread 1 cannot allocate new log, sequence \nCheckpoint not complete\n```\n\
  \n解释此问题的另一种方式是，Oracle 需要在联机重做日志中存储执行崩溃恢复所需的任何信息。为了帮助您可视化，请参见图 5-2。\n\n![重做受到保护，直到修改的（脏）缓冲区写入磁盘](img/214899_3_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2**\n重做受到保护，直到修改的（脏）缓冲区写入磁盘\n\n在时间 1，块 A 从数据文件 AA 读入缓冲区高速缓存并被修改。在时间 2，重做更改向量信息（块如何更改）被写入日志缓冲区。在时间\
  \ 3，日志写入器进程将块 A 更改向量信息写入联机重做日志 1。在时间 4，发生日志切换，联机重做日志 2 成为当前联机重做日志。\n\n现在，假设联机重做日志\
  \ 2 很快被填满，并且发生了另一次日志切换，此时日志写入器尝试写入联机重做日志 1。在数据库写入器将块 A 写入数据文件 AA 之前，日志写入器不允许覆盖联机重做日志\
  \ 1 中的信息。在块 A 写入数据文件 AA 之前，Oracle 需要联机重做日志中的信息来在发生断电或关闭异常（shutdown abort）时恢复此块。在\
  \ Oracle 覆盖联机重做日志中的信息之前，它会确保受重做保护的块已写入磁盘。如果这些修改的块尚未写入磁盘，Oracle 会暂时挂起处理，直到此操作完成。有几种方法可以解决此问题：\n\
  \n*   添加更多重做日志组。\n*   降低 `FAST_START_MTTR_TARGET` 的值。这样做会使数据库写入器进程在更短的时间内将较旧的已修改块写入磁盘。\n\
  *   调优数据库写入器进程（修改 `DB_WRITER_PROCESSES`）。\n\n如果您注意到 `Checkpoint not complete` 消息经常出现（比如每天几次），我建议您添加一个或多个日志组来解决此问题。添加额外的重做日志使数据库写入器有更多时间在关联的块重做被覆盖之前，将数据库缓冲区高速缓存中的已修改块写入数据文件。添加更多重做日志组几乎没有缺点。主要问题是您可能会达到创建数据库时使用的\
  \ `MAXLOGFILES` 值。如果您需要添加更多组并且已超过 `MAXLOGFILES` 的值，则必须重新创建控制文件并为此参数指定更高的值。\n\n如果添加更多重做日志组不能解决问题，您应仔细考虑降低\
  \ `FAST_START_MTTR_TARGET` 的值。当您降低此值时，可能会看到更多的 I/O，因为数据库写入器进程更积极地将已修改块写入数据文件。理想情况下，在生产环境中进行更改之前，最好在测试环境中验证修改\
  \ `FAST_START_MTTR_TARGET` 的影响。您可以在实例启动时修改此参数；这意味着如果有不可预见的副作用，您可以快速将其修改回原始设置。\n\n\
  最后，考虑增加 `DB_WRITER_PROCESSES` 参数的值。在应用到生产环境之前，请在测试环境中仔细分析修改此参数的影响。此值需要停止并启动数据库；因此，如果有不利影响，需要停机时间才能将此值更改回原始设置。\n\
  \n### 添加联机重做日志组\n\n如果您确定需要添加联机重做日志组，请使用 `ADD LOGFILE GROUP` 语句。在此示例中，数据库已包含两个大小为\
  \ 50M 的联机重做日志组。添加了一个包含两个成员且大小为 50MB 的额外日志组：\n\n```sql\nalter database add logfile\
  \ group 3\n('/u01/oraredo/o18c/redo03a.rdo',\n'/u02/oraredo/o18c/redo03b.rdo') SIZE\
  \ 50M;\n```\n\n在这种情况下，我强烈建议您添加的日志组与现有联机重做日志具有相同的大小和相同数量的成员。如果新添加的组与现有组具有不同的物理特性，则更难以准确确定性能问题。如果需要更大的大小，可以以更大的大小添加新组，然后删除其他组并以更大的大小值重新创建它们，以保持重做日志大小相同（下一节将提供此示例）。\n\
  \n例如，如果您有两个大小为 50MB 的日志组，并且添加了一个大小为 500MB 的新日志组，这很可能会产生前一节中描述的 `Checkpoint not complete`\
  \ 问题。这是因为将 SGA 中所有受 500MB 日志文件中重做保护的已修改块刷新可能比将 SGA 中受 50MB 日志文件保护的已修改块刷新花费更长的时间。\n\
  \n### 调整大小和删除联机重做日志组\n\n您可能需要更改联机重做日志的大小（请参阅本章前面的“确定联机重做日志组的最佳大小”部分）。您不能直接修改现有联机重做日志的大小（就像对数据文件那样）。要调整联机重做日志的大小，您必须首先添加大小符合您要求的联机重做日志组，然后删除旧大小的联机重做日志。\n\
  \n假设您希望将联机重做日志的大小调整为每个 200MB。首先，使用 `ADD LOGFILE GROUP` 语句添加大小为 200MB 的新组。以下示例添加了日志组\
  \ 4，包含两个大小为 200MB 的成员：\n\n```sql\nalter database add logfile group 4\n('/u01/oraredo/o18c/redo04a.rdo',\n\
  '/u02/oraredo/o18c/redo04b.rdo') SIZE 200M;\n```\n\n**注意**\n您可以以字节、千字节、兆字节或千兆字节为单位指定日志文件的大小。\n\
  \n添加了新大小的日志文件后，您可以删除旧的联机重做日志。日志组必须具有 `INACTIVE` 状态才能被删除。您可以检查日志组的状态，如下所示：\n\n```sql\n\
  SQL> select group#, status, archived, thread#, sequence# from v$log;\n```\n\n您可以使用\
  \ `ALTER DATABASE DROP LOGFILE GROUP` 语句删除不活动的日志组：\n\n```sql\nSQL> alter database\
  \ drop logfile group ;\n```\n\n如果您尝试删除当前联机日志组，Oracle 会返回 `ORA-01623` 错误，指出您无法删除当前组。使用\
  \ `ALTER SYSTEM SWITCH LOGFILE` 语句切换日志并使下一个组成为当前组：\n\n```sql\nSQL> alter system\
  \ switch logfile;\n```\n\n日志切换后，先前为当前组的日志组只要包含 Oracle 执行崩溃恢复所需的重做，就会保持活动状态。如果您尝试删除处于活动状态的日志组，Oracle\
  \ 会抛出 `ORA-01624` 错误，指出该日志组是崩溃恢复所必需的。发出 `ALTER SYSTEM CHECKPOINT` 命令使日志组变为非活动状态：\n\
  \n```sql\nSQL> alter system checkpoint ;\n```\n\n此外，如果删除操作会使数据库只剩下一个日志组，您不能删除联机重做日志组。如果您尝试这样做，Oracle\
  \ 会抛出 `ORA-01567` 错误，并告知不允许删除日志组，因为它会使您的数据库只剩下一个日志组（如前所述，Oracle 需要至少两个重做日志组才能运行）。\n\
  \n删除联机重做日志组不会从操作系统中删除日志文件。您必须使用操作系统命令来执行此操作（例如 Linux/Unix 的 `rm` 命令）。在从操作系统中删除文件之前，请确保它未被使用，并且您不会删除活动的联机重做日志文件。对于服务器上的每个数据库，发出此查询以查看正在使用的联机重做日志文件：\n\
  \n```sql\nSQL> select member from v$logfile;\n```\n\n在物理删除日志文件之前，首先切换联机重做日志足够多次，以便所有联机重做日志组最近都已切换；这样做会导致操作系统写入文件，从而为其提供新的时间戳。例如，如果您有三个组，请确保执行至少三次日志切换：\n\
  \n```sql\nSQL> alter system switch logfile;\nSQL> /\nSQL> /\n```\n\n**提示**\n这些添加和删除重做日志的步骤是在移交新数据库或安排定期测试期间进行练习和测试生产数据库脚本的另一个实践。\n\
  \n现在，在操作系统提示符下验证您打算删除的日志文件是否没有新的时间戳。首先，转到包含联机重做日志文件的目录：\n\n```bash\n$ cd  /u01/oraredo/o18c\n\
  ```\n\n然后，列出文件以查看最新的修改日期：\n\n```bash\n$ ls -altr\n```\n\n当您绝对确定文件未被使用时，可以将其删除。删除文件的危险在于，如果它恰好是一个正在使用的联机重做日志，并且是一个组的唯一成员，您可能会对数据库造成严重损坏。确保您有数据库的良好备份，并且您删除的文件未被服务器上的任何数据库使用。\n\
  \n### 向组添加联机重做日志文件\n\n您可能偶尔需要向现有组添加日志文件。例如，如果您有一个仅包含一个成员的联机重做日志组，您应考虑添加一个日志文件（以提供更高程度的单个日志文件成员故障保护）。使用\
  \ `ALTER DATABASE ADD LOGFILE MEMBER` 语句向现有联机重做日志组添加成员文件。您需要指定新成员文件的位置、名称以及要向其添加文件的组：\n\
  \n```sql\nSQL> alter database add logfile member '/u02/oraredo/o18c/redo01b.rdo'\n\
  to group 1;\n``\n\n请确保您遵循有关任何新添加的重做日志文件的位置和名称的标准。\n\n### 从组中删除联机重做日志文件\n\n偶尔，您可能需要从组中删除日志文件。例如，您的数据库可能经历了多路复用组中一个成员的故障，并且您希望删除该故障成员。首先，确保您要删除的日志文件不在当前组中：\n\
  \n```sql\nSELECT a.group#, a.member, b.status, b.archived, SUM(b.bytes)/1024/1024\
  \ mbytes\nFROM v$logfile a, v$log b\nWHERE a.group# = b.group#\nGROUP BY a.group#,\
  \ a.member, b.status, b.archived\nORDER BY 1, 2;\n```\n\n如果您尝试删除具有 `CURRENT` 状态的组中的日志文件，会收到以下错误：\n\
  \n```\nORA-01623: log 2 is current log for instance o18c (thread 1) - cannot drop\n\
  ```\n\n如果您尝试从当前联机重做日志组中删除成员，则强制切换，如下所示：\n\n```sql\nSQL> alter system switch logfile\
  \ ;\n```\n\n使用 `ALTER DATABASE DROP LOGFILE MEMBER` 语句从日志组中删除日志文件。您不需要指定组号，因为您正在删除特定文件：\n\
  \n```sql\nSQL> alter database drop logfile member '/u01/oraredo/o18c/redo04a.rdo';\n\
  ```\n\n您也不能删除组中最后一个剩余的日志文件。一个组必须至少包含一个日志文件。如果您尝试删除组中最后一个剩余的日志文件，您会收到以下错误：\n\n```\n\
  ORA-00361: cannot remove last log member ...\n```\n\n### 移动或重命名重做日志文件\n\n有时您需要移动或重命名联机重做日志文件。例如，您可能已向系统添加了一些新的挂载点，并且您希望将联机重做日志移动到新存储。您可以使用两种方法来完成此任务：\n\
  \n*   在新位置添加新日志文件并删除旧日志文件。\n*   从操作系统物理重命名文件。\n\n如果您无法承受任何停机时间，请考虑在新位置添加新日志文件，然后删除旧日志文件。有关如何添加日志组的详细信息，请参阅本章前面的“添加联机重做日志组”部分。另请参阅本章前面的“调整大小和删除联机重做日志组”部分，了解如何删除日志组。\n\
  \n或者，您可以从操作系统物理移动文件。您可以在数据库打开或关闭时执行此操作。如果您的数据库是打开的，请确保您移动的文件不是当前联机重做日志组的一部分（因为这些文件正被日志写入器后台进程主动写入）。在数据库打开时尝试执行此任务是危险的，因为在活动系统上，联机重做日志可能正在快速切换，这会产生在文件切换为当前联机重做日志时尝试移动文件的可能性。因此，我建议您仅在数据库关闭时尝试执行此操作。\n\
  \n下一个示例显示如何在数据库关闭时移动联机重做日志文件。步骤如下：\n\n1.  关闭数据库：\n\n    ```sql\n    SQL> shutdown\
  \ immediate;\n    ```\n\n2.  在操作系统提示符下，移动文件。此示例使用 `mv` 命令完成此任务：\n\n    ```bash\n\
  \    $ mv /u02/oraredo/o18c/redo02b.rdo /u01/oraredo/o18c/redo02b.rdo\n    ```\n\
  \n3.  以加载模式启动数据库：\n\n    ```sql\n    SQL> startup mount;\n    ```\n\n4.  使用新文件位置和名称更新控制文件：\n\
  \n    ```sql\n    SQL> alter database rename file '/u02/oraredo/o18c/redo02b.rdo'\n\
  \    to '/u01/oraredo/o18c/redo02b.rdo';\n    ```\n\n5.  打开数据库：\n\n    ```sql\n\
  \    SQL> alter database open;\n    ```\n\n您可以通过查询 `V$LOGFILE` 视图来验证您的联机重做日志是否位于新位置。我还建议您切换联机重做日志几次，然后从操作系统验证文件是否具有最近的时间戳。同时检查\
  \ `alert.log` 文件是否有任何相关错误。\n\n### 控制重做的生成\n\n对于某些类型的应用程序，您可能事先知道可以轻松重新创建数据。例如，在数据仓库环境中，您执行直接路径插入或使用\
  \ `SQL*Loader` 加载数据。在这些场景中，您可以关闭直接路径加载的重做生成。您使用 `NOLOGGING` 子句来完成此操作：\n\n```sql\n\
  create tablespace inv_mgmt_data\ndatafile '/u01/dbfile/o12c/inv_mgmt_data01.dbf'\
  \ size 100m\nextent management local\nuniform size 128k\nsegment space management\
  \ auto\nnologging;\n```\n\n如果您有一个现有的表空间并希望更改其日志记录模式，请使用 `ALTER TABLESPACE` 语句：\n\
  \n```sql\nSQL> alter tablespace inv_mgmt_data nologging;\n```\n\n您可以通过查询 `DBA_TABLESPACES`\
  \ 视图来确认表空间日志记录模式：\n\n```sql\nSQL> select tablespace_name, logging from dba_tablespaces;\n\
  ```\n\n对于常规的 `INSERT`、`UPDATE` 和 `DELETE` 语句，无法抑制重做日志记录。对于常规数据操作语言（DML）语句，`NOLOGGING`\
  \ 子句被忽略。但是，`NOLOGGING` 子句适用于以下类型的 DML：\n\n*   直接路径 `INSERT` 语句\n*   直接路径 `SQL*Loader`\n\
  \n`NOLOGGING` 子句也适用于以下类型的 DDL 语句：\n\n*   `CREATE TABLE ... AS SELECT`（`NOLOGGING`\
  \ 仅影响初始创建，不影响后续针对表的常规 DML 语句）\n*   `ALTER TABLE ... MOVE`\n*   `ALTER TABLE ...\
  \ ADD/MERGE/SPLIT/MOVE/MODIFY PARTITION`\n*   `CREATE INDEX`\n*   `ALTER INDEX ...\
  \ REBUILD`\n*   `CREATE MATERIALIZED VIEW`\n*   `ALTER MATERIALIZED VIEW ... MOVE`\n\
  *   `CREATE MATERIALIZED VIEW LOG`\n*   `ALTER MATERIALIZED VIEW LOG ... MOVE`\n\
  \n请注意，如果未记录表或索引的重做，并且在对象备份之前发生介质故障，那么您将无法恢复数据；您会收到 `ORA-01578` 错误，指示数据存在逻辑损坏。\n\n\
  **注意**\n您也可以在对象级别覆盖表空间级别的日志记录。例如，即使表空间指定为 `NOLOGGING`，您也可以使用 `LOGGING` 子句创建表。\n\n\
  ## 实现归档日志模式\n\n回想一下本章前面的讨论，只有当您的数据库处于归档日志模式时，才会创建归档重做日志。如果您想保留数据库事务历史记录以促进时间点恢复和其他类型的恢复，则需要启用该模式。\n\
  \n在正常操作中，对数据的更改会在数据库重做日志文件中生成条目。当每个联机重做日志组填满时，会启动日志切换。当发生日志切换时，日志写入器停止写入最近填满的联机重做日志组，并开始写入新的联机重做日志组。联机重做日志组以轮询方式写入——这意味着任何给定联机重做日志组的内容最终将被覆盖。归档日志模式通过使用归档器后台进程（archiver\
  \ background process）将填满的联机重做日志的内容复制到所谓的 *归档重做日志文件* 来长期保留重做数据。归档重做日志文件的跟踪对于您恢复数据库并将所有更改完整保留到故障发生的确切时间点的能力至关重要。\n\
  \n### 做出体系结构决策\n\n当您实现归档日志模式时，您还需要一个管理归档日志文件的策略。归档重做日志会消耗磁盘空间。如果置之不理，这些文件最终将用完分配给它们的所有空间。如果发生这种情况，归档器无法将新的归档重做日志文件写入磁盘，您的数据库将停止处理事务。此时，您的数据库将挂起。然后，您需要手动干预，为归档器创建空间以恢复工作。由于这些原因，在启用归档之前，您必须仔细考虑几个体系结构决策：\n\
  \n*   将归档重做日志放在哪里，以及是否使用快速恢复区（FRA）存储它们\n*   如何命名归档重做日志\n*   为归档重做日志位置分配多少空间\n* \
  \  多久备份一次归档重做日志\n*   何时可以永久删除磁盘上的归档重做日志\n*   如何删除归档重做日志（例如，让 RMAN 根据保留策略删除日志）\n\
  *   是否应启用多个归档重做日志位置\n*   何时安排所需的少量停机时间（如果是生产数据库）\n\n根据经验，您的主要归档重做位置应有足够的空间来保存至少一天的归档重做日志。这允许您每天备份它们，然后在备份后将它们从磁盘中删除。\n\
  \n如果您决定为归档重做日志位置使用快速恢复区（FRA），您必须确保它包含足够的空间来保存两次备份之间生成的归档重做日志数量。请记住，FRA 通常包含其他类型的文件，例如\
  \ RMAN 备份文件、闪回日志等。如果您使用 FRA，请注意其他类型文件的生成可能会影响归档重做日志文件所需的空间。可以设置一些参数来管理 FRA 并提供一种方法来调整恢复空间的大小，以便数据库能够继续运行，而不必增加文件系统上的空间。\n\
  \n参数 `DB_RECOVERY_FILE_DEST` 和 `DB_RECOVERY_FILE_DEST_SIZE` 设置了 FRA 的文件位置和数据库要使用的空间大小。这些参数还可以防止一个数据库填满同一服务器上其他数据库的空间。可以创建\
  \ ASM 磁盘组 FRA 来使用 ASM 管理空间。`DB_RECOVERY_FILE_DEST = '+FRA'` 将允许该区域使用 FRA 磁盘组。同样，在填满空间的情况下，在幕后管理空间具有优势。使用这些参数以及\
  \ ASM 移除了特定的文件系统，并提供了更多选项来快速解决归档日志和使用恢复区域的问题。FRA 是推荐的，因为这些参数是动态的，并且可以允许进行更改以防止数据库挂起。这应包含在数据库归档模式的规划和架构中。\n\
  \n您需要一个自动化备份和删除归档重做日志文件的策略。对于用户管理的备份，这可以通过一个 shell 脚本来实现，该脚本定期将归档重做日志复制到备份位置，然后从主位置删除它们。正如您将在后面的章节中看到的，RMAN\
  \ 自动化了归档重做日志文件的备份和删除。\n\n如果您的业务要求您必须具有某种程度的高可用性和冗余，那么您应该考虑将归档重做日志写入多个位置。一些站点设置作业定期将归档重做日志复制到磁盘上的不同位置，甚至复制到不同的服务器。\n\
  \n### 设置归档重做文件位置\n\n在将数据库模式设置为归档之前，您应明确指示 Oracle 您希望将归档重做日志放置在哪里。您可以通过以下技术设置归档重做日志文件目标：\n\
  \n*   设置 `LOG_ARCHIVE_DEST_N` 数据库初始化参数。\n*   实现 FRA。\n\n这两种方法将在以下各节中详细讨论。\n\n**提示**\n\
  如果您未通过初始化参数或启用 FRA 显式设置归档重做日志位置，则归档重做日志将写入默认位置。对于 Linux/Unix，默认位置是 `ORACLE_HOME/dbs`。对于\
  \ Windows，默认位置是 `ORACLE_HOME\\database`。对于活动的生产数据库系统，默认的归档重做日志位置很少合适。\n\n### 将归档位置设置为用户定义的磁盘位置（非\
  \ FRA）\n\n如果您使用的是 `init<SID>.ora` 文件，请使用操作系统实用程序（如 `vi`）修改该文件。在此示例中，归档重做日志位置设置为\
  \ `/u01/oraarch/o18c`：\n\n```\nlog_archive_dest_1='location=/u01/oraarch/o18c'\n\
  log_archive_format='o12c_%t_%s_%r.arc'\n```\n\n在前面的代码行中，我的命名归档重做日志文件的标准包括 `ORACLE_SID`（在此示例中，以\
  \ `o18c` 开头）；强制参数 `%t`、`%s` 和 `%r`；以及以 `.arc` 结尾的字符串。我喜欢将 `ORACLE_SID` 的名称嵌入字符串中，以避免当多个数据库驻留在一个服务器上时产生混淆。我喜欢使用扩展名\
  \ `.arc` 来区别于其他类型的数据库文件。\n\n**提示**\n如果您未为 `LOG_ARCHIVE_FORMAT` 指定值，Oracle 会使用默认值，例如\
  \ `%t_%s_%r.dbf`。我不喜欢默认格式的一个方面是它以扩展名 `.dbf` 结尾，该扩展名广泛用于数据文件。这可能会导致混淆，因为无法确定特定文件是否可以安全删除（因为它是旧的归档重做日志文件）还是不应触摸（因为它是活动的数据文件）。大多数\
  \ DBA 不愿发出诸如 `rm *.dbf` 之类的命令，担心意外删除活动的数据文件。\n\n如果您使用的是 `spfile`，请使用 `ALTER SYSTEM`\
  \ 修改相应的初始化变量：\n\n```sql\nSQL> alter system set log_archive_dest_1='location=/u01/oraarch/o18c'\
  \ scope=both;\nSQL> alter system set log_archive_format='o12c_%t_%s_%r.arc' scope=spfile;\n\
  ```\n\n您可以在数据库打开时动态更改 `LOG_ARCHIVE_DEST_n` 参数。但是，您必须停止并启动数据库才能使 `LOG_ARCHIVE_FORMAT`\
  \ 参数生效。\n\n### 从设置错误的 spfile 参数中恢复\n\n注意不要将 `LOG_ARCHIVE_FORMAT` 设置为无效值；例如，\n\n\
  ```sql\nSQL> alter system set log_archive_format='%r_%y_%dk.arc' scope=spfile;\n\
  ```\n\n如果您这样做，当您尝试停止并启动数据库时，您甚至无法进入 nomount 阶段（因为 `spfile` 包含无效参数）：\n\n```sql\n\
  SQL> startup nomount;\nORA-19905: log_archive_format must contain %s, %t and %r\n\
  ```\n\n在这种情况下，如果您使用的是 `spfile`，则无法启动实例。您有几个选择。如果您使用 RMAN 并备份了 `spfile`，那么从备份中还原\
  \ `spfile`。\n\n如果您不使用 RMAN，您也可以尝试直接使用操作系统编辑器（如 `vi`）编辑 `spfile`，但 Oracle 不推荐或支持此方法。\n\
  \n替代方法是从 `spfile` 的内容手动创建 `init.ora` 文件。首先，重命名包含错误值的 `spfile`：\n\n```bash\n$ cd\
  \ $ORACLE_HOME/dbs\n$ mv spfile.ora spfile.old\n```\n\n在 SQL*Plus 中，从 `spfile` 创建\
  \ `init.ora` 文件。\n\n```sql\nSQL> create pfile=inito18c.ora from spfile;\n```\n\n\
  然后，使用文本编辑器（如 `vi`）打开 `pfile`：\n\n```bash\n$ vi inito18c.ora\n```\n\n将错误的参数修改为包含有效值。退出\
  \ `pfile`。您现在应该能够使用 `pfile` 启动数据库。然后您可以将 `pfile` 复制到新的 `spfile`。\n\n```sql\nSQL>\
  \ create spfile from pfile;\n```\n\n然后您可以使用修复后的 `spfile` 启动数据库。\n\n当您指定 `LOG_ARCHIVE_FORMAT`\
  \ 时，必须在格式字符串中包含 `%t`（或 `%T`）、`%s`（或 `%S`）和 `%r`。表 5-4 列出了可以与 `LOG_ARCHIVE_FORMAT`\
  \ 初始化参数一起使用的有效变量。\n\n**表 5-4**\n日志归档格式字符串的有效变量\n\n| 格式字符串 | 含义 |\n| --- | --- |\n\
  | `%s` | 日志序列号 |\n| `%S` | 日志序列号，左侧补零 |\n| `%t` | 线程号 |\n| `%T` | 线程号，左侧补零 |\n|\
  \ `%a` | 激活 ID |\n| `%d` | 数据库 ID |\n| `%r` | `Resetlogs` ID，需要确保跨多个数据库化身的唯一性 |\n\
  \n您可以通过运行以下命令查看 `LOG_ARCHIVE_DEST_N` 参数的值：\n\n```sql\nSQL> show parameter log_archive_dest\n\
  ```\n\n以下是输出的部分列表：\n\n```\nNAME                             TYPE        VALUE\n\
  -------------------------------- ----------- --------------------------\nlog_archive_dest\
  \                 string\nlog_archive_dest_1               string      location=/u01/oraarch/o18c\n\
  log_archive_dest_10              string\n```\n\n您可以启用最多 31 个不同的位置作为归档重做日志文件目标。对于大多数生产系统，一个归档重做日志目标位置通常就足够了。如果您需要更高程度的保护，可以启用多个目标。请记住，当您使用多个目标时，归档器必须能够成功写入至少一个位置。如果您启用了多个强制位置并将\
  \ `LOG_ARCHIVE_MIN_SUCCEED_DEST` 设置为大于 1，那么如果归档器无法写入所有强制位置，您的数据库可能会挂起。\n\n您可以通过此查询检查有关归档重做日志位置状态的详细信息：\n\
  \n```sql\nselect\ndest_name\n,destination\n,status\n,binding\nfrom v$archive_dest;\n\
  ```\n\n以下是输出的一小部分：\n\n```\nDEST_NAME            DESTINATION                    STATUS\
  \    BINDING\n-------------------- ------------------------------ --------- ---------\n\
  LOG_ARCHIVE_DEST_1   /u01/oraarch/o18c              VALID     OPTIONAL\nLOG_ARCHIVE_DEST_2\
  \                                  INACTIVE  OPTIONAL\n```\n\n### 将 FRA 用于归档日志文件\n\
  \nFRA 是磁盘上的一个区域——通过数据库初始化参数指定——可用于存储文件，例如归档重做日志、RMAN 备份文件、闪回日志以及多路复用的控制文件和联机重做日志。要启用\
  \ FRA 的使用，必须设置两个初始化参数（按此顺序）：\n\n1.  `DB_RECOVERY_FILE_DEST_SIZE` 指定数据库在 FRA 中存储的所有文件使用的最大空间。\n\
  2.  `DB_RECOVERY_FILE_DEST` 指定 FRA 的基本目录。\n\n当您创建 FRA 时，您并不是真正在创建任何东西——您是在告诉 Oracle\
  \ 在存储进入 FRA 的文件时使用哪个目录。例如，假设在挂载点上保留了 200GB 的空间，并且您希望 FRA 的基本目录为 `/u01/fra`。要启用 FRA，首先设置\
  \ `DB_RECOVERY_FILE_DEST_SIZE`：\n\n```sql\nSQL> alter system set db_recovery_file_dest_size=200g\
  \ scope=both;\n```\n\n接下来，设置 `DB_RECOVERY_FILE_DEST` 参数：\n\n```sql\nSQL> alter system\
  \ set db_recovery_file_dest='/u01/fra' scope=both;\n```\n\n如果您使用的是 `init.ora` 文件，请使用操作系统实用程序（如\
  \ `vi`）对其进行修改，并包含适当的条目。\n\n启用 FRA 后，默认情况下，Oracle 将归档重做日志写入 FRA 中的子目录。\n\n**注意**\n\
  如果您已将 `LOG_ARCHIVE_DEST_N` 参数设置为磁盘上的某个位置，则归档重做日志不会写入 FRA。\n\n您可以验证归档位置是否正在使用 FRA：\n\
  \n```sql\nSQL> archive log list;\n```\n\n如果归档文件正在写入 FRA，您应该看到如下输出：\n\n```\nDatabase\
  \ log mode              Archive Mode\nAutomatic archival             Enabled\nArchive\
  \ destination            USE_DB_RECOVERY_FILE_DEST\n```\n\n您可以显示与 FRA 关联的目录，如下所示：\n\
  \n```sql\nSQL> show parameter db_recovery_file_dest\n```\n\n当您首次实现 FRA 时，基本 FRA\
  \ 目录（使用 `DB_RECOVERY_FILE_DEST` 指定）下没有子目录。当 Oracle 首次需要将文件写入 FRA 时，它会在基本目录下创建任何必需的目录。例如，实现\
  \ FRA 后，如果为您的数据库启用了归档，那么在第一次发生日志切换时，Oracle 会在基本 FRA 目录下创建以下目录：\n\n```\n/archivelog/\n\
  ```\n\n每天生成的归档重做日志都会导致在 FRA 中创建一个新目录，使用目录名格式 `YYYY_MM_DD`。写入 FRA 的归档重做日志使用 OMF 格式命名约定（无论您是否设置了\
  \ `LOG_ARCHIVE_FORMAT` 参数）。\n\n如果您希望归档重做日志同时写入 FRA 和非 FRA 位置，您可以启用该功能，如下所示：\n\n\
  ```sql\nSQL> alter system set log_archive_dest_1='location=/u01/oraarch/o18c';\n\
  SQL> alter system set log_archive_dest_2='location=USE_DB_RECOVERY_FILE_DEST' ;\n\
  ```\n\n### 启用归档日志模式\n\n在设置归档重做日志文件的位置后，您可以启用归档日志模式。以 `SYS`（或具有 `SYSDBA` 权限的用户）身份连接并执行以下操作：\n\
  \n```sql\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\nSQL> startup mount;\n\
  SQL> alter database archivelog;\nSQL> alter database open;\n```\n\n您可以通过此查询确认归档日志模式：\n\
  \n```sql\nSQL> archive log list;\n```\n\n您也可以通过以下方式确认：\n\n```sql\nSQL> select log_mode\
  \ from v$database;\nLOG_MODE\n------------\nARCHIVELOG\n```\n\n### 禁用归档日志模式\n\n\
  通常，您不会为生产数据库禁用归档日志模式。但是，您可能正在执行大数据量加载，并希望减少与归档过程相关的任何开销，因此您希望在加载开始前关闭归档日志模式，然后在加载后重新启用它。如果您这样做，请务必在重新启用归档后尽快进行备份。\n\
  \n要禁用归档，请以 `SYS`（或具有 `SYSDBA` 权限的用户）身份执行以下操作：\n\n```sql\n$ sqlplus / as sysdba\n\
  SQL> shutdown immediate;\nSQL> startup mount;\nSQL> alter database noarchivelog;\n\
  SQL> alter database open;\n```\n\n您可以通过此查询确认归档日志模式：\n\n```sql\nSQL> archive log\
  \ list;\n```\n\n您也可以通过以下方式确认日志模式：\n\n```sql\nSQL> select log_mode from v$database;\n\
  LOG_MODE\n------------\nNOARCHIVELOG\n```\n\n### 对归档日志目标磁盘空间不足的反应\n\n归档器后台进程将归档重做日志写入您指定的位置。如果由于任何原因归档器进程无法写入归档位置，您的数据库将挂起。任何尝试连接的用户都会收到此错误：\n\
  \n```\nORA-00257: archiver error. Connect internal only, until freed.\n```\n\n作为生产支持\
  \ DBA，您永远不希望您的数据库进入该状态。有时，不可预测的事件会发生，您必须处理不可预见的问题。\n\n**注意**\n支持生产数据库的 DBA 的心态与架构师\
  \ DBA 完全不同。获得新想法或学习新技术是与生产 DBA 和架构师一起工作和沟通在您的环境中可能有效或无效的内容的完美时机。在故障排除生产问题之外安排时间进行规划并为环境设置策略。\n\
  \n在这种情况下，您的数据库相当于宕机并且完全不可用。要解决此问题，您必须迅速采取行动：\n\n*   将文件移动到不同的位置。\n*   压缩归档重做日志位置中的旧文件。\n\
  *   永久删除旧文件。\n*   将归档重做日志目标切换到不同的位置（这可以在数据库运行时动态更改）。\n*   如果使用 FRA，增加 `DB_RECOVERY_FILE_DEST_SIZE`\
  \ 的空间分配。\n*   如果使用 FRA，将参数 `DB_RECOVERY_FILE_DEST` 中的目标更改为不同的位置。\n*   RMAN 备份并删除归档日志文件。\n\
  *   使用 RMAN 从目录中删除过期的文件。\n\n移动文件通常是解决归档器错误以及增加分配或目录（使用 `DB_RECOVERY_FILE_DEST` 参数）的最快、最安全的方法。您可以使用操作系统实用程序（如\
  \ `mv`）将旧的归档重做日志移动到不同的位置。如果后续恢复需要它们，您可以让恢复过程知道新位置。注意不要移动当前正在写入的归档重做日志。如果归档重做日志文件出现在\
  \ `V$ARCHIVED_LOG` 中，则表示它已被完全归档。\n\n您可以使用操作系统实用程序（如 `gzip`）压缩当前归档目标中的归档重做日志文件。如果您这样做，您必须记住解压缩任何以后可能用于恢复的文件。注意不要压缩当前正在写入的归档重做日志。\n\
  \n另一个选项是使用操作系统实用程序（如 `rm`）从磁盘中永久删除归档重做日志。这种方法很危险，因为您可能需要这些归档重做日志进行后续恢复。如果您确实删除了归档重做日志文件，并且您没有它们的备份，您应尽快对数据库进行完整备份。\n\
  \n使用 RMAN 备份和删除文件是一种更安全的方法，并确保在执行另一个备份之前可以进行恢复。同样，这种方法有风险，只能作为最后手段执行；如果您删除了尚未备份的归档重做日志，那么您可能无法执行完全恢复。\n\
  \n如果您服务器上的另一个位置有足够的空间，您可以考虑更改归档重做日志的写入位置。您可以在数据库运行时执行此操作；例如，\n\n```sql\nSQL> alter\
  \ system set log_archive_dest_1='location=/u02/oraarch/o18c';\n```\n\n在解决主要位置的问题后，您可以切换回原始位置。\n\
  \n**注意**\n当发生日志切换时，归档器根据当前的 FRA 设置或 `LOG_ARCHIVE_DEST_N` 参数确定归档重做日志的写入位置。归档器不关心目标是否最近发生了变化。\n\
  \n当归档重做日志文件目标已满时，您必须争分夺秒地解决问题。这就是为什么在为 24-7 生产数据库启用归档之前，应该进行大量思考的原因。\n\n对于大多数数据库，将归档重做日志写入一个位置就足够了。但是，如果您有任何类型的灾难恢复或高可用性要求，那么您应该写入多个位置。有时，DBA\
  \ 设置一个作业，每小时备份一次归档重做日志，并将其复制到备用位置甚至备用服务器。\n\n### 备份归档重做日志文件\n\n根据您的业务要求，您可能需要一个备份归档重做日志文件的策略。至少，您应该备份在归档日志模式下备份数据库期间生成的任何归档重做日志。其他策略可能包括：\n\
  \n*   定期将归档重做日志复制到备用位置，然后从主目标中删除它们。\n*   将归档重做日志复制到磁带，然后从磁盘中删除它们。\n*   使用两个归档重做日志位置。\n\
  *   使用 Data Guard 实现强大的灾难恢复解决方案。\n\n请记住，您需要自上次良好备份开始时间以来生成的所有归档重做日志，以确保能够完全恢复数据库。只有在确定拥有数据库的良好备份后，才应考虑删除备份之前生成的归档重做日志。\n\
  \n如果您使用 RMAN 作为备份和恢复策略，则应使用 RMAN 备份归档重做日志。此外，您应为这些文件指定 RMAN 保留策略，并仅在满足保留策略要求后（例如，在从磁盘删除之前至少备份一次文件）让\
  \ RMAN 删除归档重做日志（有关使用 RMAN 的详细信息，请参见第 18 章）。\n\n## 本章小结\n\n本章描述了如何配置和管理控制文件和联机重做日志文件以及启用归档。控制文件和联机重做日志是关键的数据库文件；正常运行的数据库离不开它们。\n\
  \n控制文件是包含数据库结构信息的小型二进制文件。参数文件中指定的任何控制文件都必须可用才能加载数据库。如果控制文件变得不可用，那么您的数据库将在下一次日志切换或需要写入控制文件时停止运行，直到您解决问题。我强烈建议您将数据库配置为至少有三个控制文件。如果一个控制文件变得不可用，您可以用一个良好现有控制文件的副本替换它。了解如何配置、添加和删除这些文件至关重要。\n\
  \n联机重做日志是记录数据库事务历史的关键文件。如果您有多个实例连接到一个数据库，那么每个实例都会生成自己的重做线程。每个数据库必须创建两个或更多联机重做日志组。您可以使用每个组仅包含一个联机重做日志成员的数据库运行。但是，我强烈建议您为每个联机重做日志组创建两个成员。如果联机重做日志至少有一个可以写入的成员，您的数据库将继续运行。如果联机重做日志组的所有成员都不可用，那么您的数据库将停止运行。作为\
  \ DBA，您必须非常精通创建、添加、移动和删除这些关键的数据库文件。使用闪存等存储选项将允许更快地写入重做日志。固态磁盘可能无法提供更快的写入，因此它们不是重做日志的理想选择。\n\
  \n归档是确保您拥有恢复数据库所需的所有事务的机制。启用后，归档器需要在日志切换发生后成功复制联机重做日志。如果归档器无法写入主归档目标，那么您的数据库将挂起。因此，您需要仔细规划所需的磁盘空间量以及备份和后续删除这些文件的频率。\n\
  \n使用快速恢复区（FRA）提供了管理归档日志的额外方法，并允许在规划磁盘增长和大小调整方面具有一定的灵活性。\n\n到目前为止，本书的章节涵盖了安装 Oracle\
  \ 软件、创建数据库以及管理表空间、数据文件、控制文件、联机重做日志文件和归档等任务。接下来的几章将重点介绍如何为应用程序使用配置数据库，包括创建用户和数据库对象等主题。\n\
  \n# 第 6 章 用户和基本安全\n\n在安装了二进制文件、实现了数据库并创建了表空间之后，下一个逻辑任务是保护数据库并开始创建新用户。创建数据库时，默认会创建几个默认用户帐户。作为\
  \ DBA，您必须了解这些帐户以及如何管理它们。默认帐户通常是黑客试图获取数据库访问权限的第一个地方；因此，您必须采取预防措施来保护这些用户。根据您安装的选项和实现的数据库版本，可能会有\
  \ 20 个或更多默认帐户。\n\n随着应用程序和用户需要访问数据库，您将需要创建和管理新帐户。这包括选择适当的身份验证方法、实施密码安全性以及为用户分配权限。本章将详细讨论这些主题。\n\
  \n## 管理默认用户\n\n如前所述，当您创建数据库时，Oracle 会创建几个默认数据库用户。在早期版本中，这些默认用户要么设置默认密码，要么从数据库创建中获取输入。使用\
  \ Oracle 18c，除 `SYS` 和 `SYSTEM` 外，所有默认帐户在安装时都被锁定。可以为每个帐户设置密码或自定义解锁；但是，建议仅解锁绝对需要的帐户。作为\
  \ `dbca` 的步骤之一，所有帐户都列出并可供更改，而不仅仅是 `SYS` 和 `SYSTEM` 帐户，如图 6-1 所示。\n\n![默认帐户和密码管理](img/214899_3_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1**\n默认帐户和密码管理\n\n创建的特定用户因数据库版本而异。如果您刚创建了数据库，可以查看默认用户帐户，如下所示：\n\n```sql\n\
  SQL> select username from dba_users order by 1;\n```\n\n以下是部分默认数据库用户帐户列表：\n\n```\n\
  USERNAME\n------------------------------------------------------------\nANONYMOUS\n\
  APPQOSSYS\nAUDSYS\nDBSNMP\nDIP\nGSMADMIN_INTERNAL\nGSMCATUSER\nGSMUSER\nORACLE_OCM\n\
  OUTLN\nSYS\nSYSTEM\n...\n```\n\nDBA 对前面的列表感到沮丧的是，很难跟踪默认帐户是什么以及它们是否真的需要。一些 DBA 可能会试图删除默认帐户以避免数据库混乱。我不建议这样做。更改密码并锁定这些帐户更安全（如下一节所示）。如果您删除了一个帐户，可能很难弄清楚它最初是如何创建的，而如果您锁定一个帐户，您可以简单地解锁它以重新激活它。\n\
  \n**注意**\n如果您在可插拔数据库环境中工作，可以作为特权帐户连接到根容器，通过查询 `CDB_USERS` 查看所有用户。除非本章另有说明，否则查询假设您不在可插拔环境中（因此您使用的是\
  \ `DBA` 级别的视图）。如果您在可插拔环境中，要跨所有可插拔数据库查看信息，您需要在连接到根容器时使用 `CDB` 级别的视图。\n\n### SYS 与\
  \ SYSTEM\n\nOracle 新手有时会问：“`SYS` 和 `SYSTEM` 模式之间有什么区别？”`SYS` 模式是数据库的超级用户；拥有所有内部数据字典对象；用于诸如创建数据库、启动或停止实例、备份和恢复以及添加或移动数据文件等任务。这些类型的任务通常需要\
  \ `SYSDBA` 或 `SYSOPER` 角色。这些角色的安全性通常通过访问 Oracle 软件所有者的操作系统帐户来控制。此外，可以通过密码文件管理这些角色的安全性，允许远程客户端/服务器访问。从\
  \ 12c 开始，`SYS` 帐户在某些数据库中也可以被锁定。锁定帐户可以防止来自服务器和另一个操作系统帐户的未经授权的访问，但 `SYSDBA` 权限需要首先授予授权用户。尽管锁定\
  \ `SYS` 帐户可以防止使用共享的默认帐户，但有些选项或系统可能需要 `SYS` 保持解锁状态。密码应\n\n\n\n#### 通过 oraset 脚本设置\
  \ Oracle 操作系统变量。\n\n#### 有关设置操作系统变量的更多详细信息，请参见第 2 章。\n`. /etc/oraset $1`\n#\n`userlist=\"\
  system sys dbsnmp dip oracle_ocm outln\"`\nfor `u1` in `$userlist`\ndo\n#\ncase\
  \ `$u1` in\nsystem)\n`pwd=manager`\n`cdb=$1`\n;;\nsys)\n`pwd=\"change_on_install\"\
  `\n`cdb=\"$1 as sysdba\"`\n;;\n*)\n`pwd=$u1`\n`cdb=$1`\nesac\n#\n`echo \"select\
  \ 'default' from dual;\" | \\\nsqlplus -s $u1/$pwd@$cdb | grep default >/dev/null`\n\
  if `[[ $? -eq 0 ]]`; then\n`echo \"ALERT: $u1/$pwd@$cdb default password\"`\n`echo\
  \ \"def pwd $u1 on $cdb\" | mailx -s \"$u1 pwd default\" dkuhn@gmail.com`\nelse\n\
  `echo \"cannot connect to $u1 with default password.\"`\nfi\ndone\nexit 0\n```\n\
  \n如果脚本检测到默认密码，将会向相应的 DBA 发送一封电子邮件。这个脚本只是一个简单的示例，关键在于你需要某种机制来检测默认密码。你可以创建自己的脚本，或者修改前面的脚本以满足你的需求。\n\
  \n## 创建用户\n\n在创建用户时，你需要考虑以下因素：\n\n*   用户名和身份验证方法\n*   基本权限\n*   默认永久表空间和空间配额\n*\
  \   默认临时表空间\n\n创建用户的这些方面将在后续章节中讨论。\n\n**注意**\nOracle 数据库 12c 的新特性是，在可插拔数据库环境中存在公用用户和本地用户。公用用户可跨越容器数据库内的所有可插拔数据库。本地用户则存在于单个可插拔数据库中。有关管理公用用户和本地用户的详细信息，请参见第\
  \ 22 章。\n\n### 选择用户名和身份验证方法\n\n选择一个能让人联想到该用户将使用何种应用程序的用户名。例如，如果你有一个库存管理应用程序，一个好的用户名选择是\
  \ `INV_MGMT`。选择有意义的用户名有助于识别用户的用途。如果系统文档记录不完善，这一点尤其有用。\n\n身份验证是用于确认用户有权使用该账户的方法。Oracle\
  \ 支持一套强大的身份验证方法：\n\n*   数据库身份验证（用户名和密码存储在数据库中）\n*   操作系统身份验证\n*   网络身份验证\n*   全局用户身份验证和授权\n\
  *   外部服务身份验证\n\n一种简单、易用且可靠的身份验证形式是通过数据库实现的。在这种身份验证形式中，用户名和密码存储在数据库内。密码不是以纯文本形式存储；而是以安全的加密格式存储。当连接到数据库时，用户提供用户名和密码。数据库根据数据库中存储的信息检查输入的用户名和密码，如果匹配，则允许用户使用该账户关联的权限连接到数据库。\n\
  \n另一种常用的身份验证方法是通过操作系统。操作系统身份验证意味着，如果你能成功登录到服务器，那么无需提供用户名和密码详细信息，就可以建立到本地数据库的连接。换句话说，你可以将数据库权限与一个操作系统账户或一个关联的操作系统组相关联，或两者兼有。从\
  \ 18c 开始，你可以在 Active Directory 中集中管理用户，并作为用户或全局用户集成到数据库中。\n\n数据库和操作系统身份验证以及全局用户的示例将在接下来的两节中讨论。如果你有更复杂的身份验证需求，那么你应该研究网络、全局或外部服务身份验证。有关这些方法的更多详细信息，请参阅《Oracle\
  \ 数据库安全指南》和《Oracle 数据库高级安全管理员指南》，这些文档可以从 Oracle 网站的技术网络区域（[`http://otn.oracle.com`](http://otn.oracle.com)）免费下载。\n\
  \n### 使用数据库身份验证创建用户\n\n数据库身份验证通过 `CREATE USER` SQL 语句建立。作为 DBA 创建用户，你的账户必须具有 `CREATE\
  \ USER` 系统权限。此示例创建一个名为 `HEERA` 的用户，密码为 `CHAYA`，并分配默认永久表空间 `USERS`、默认临时表空间 `TEMP`，以及在\
  \ `USERS` 表空间上的无限空间配额：\n\n```\ncreate user heera identified by chaya\ndefault tablespace\
  \ users\ntemporary tablespace temp\nquota unlimited on users;\n```\n\n这创建了一个没有任何权限的极简模式（schema）。要使该用户有用，你至少必须授予其\
  \ `CREATE SESSION` 系统权限：\n\n```\nSQL> grant create session to heera;\n```\n\n如果新模式需要能够创建表，则需要授予其额外权限，例如\
  \ `CREATE TABLE`：\n\n```\nSQL> grant create table to heera;\n```\n\n你也可以使用 `GRANT...IDENTIFIED\
  \ BY` 语句来创建用户；例如：\n\n```\ngrant create table, create session\nto heera identified\
  \ by chaya;\n```\n\n如果该用户不存在，则通过前面的语句创建该账户。如果用户已存在，则密码将更改为 `IDENTIFIED BY` 子句指定的密码（并且任何指定的权限也会被应用）。\n\
  \n**注意**\n有时，DBA 在创建用户时，会为模式分配默认角色，例如 `CONNECT` 和 `RESOURCE`。这些角色包含系统权限，如 `CREATE\
  \ SESSION` 和 `CREATE TABLE`（以及其他一些权限，具体因数据库版本而异）。我建议不要这样做，因为 Oracle 已声明这些角色在未来版本中可能不可用。出于安全和审计原因，应创建所需的具体角色，并仅将这些角色授予数据库中的用户。\n\
  \n### 使用操作系统身份验证创建用户\n\n操作系统身份验证假设，如果用户能够登录到数据库服务器，那么数据库权限可以与操作系统用户账户相关联并从中派生。有两种类型的操作系统身份验证：\n\
  \n*   通过为用户分配特定的操作系统角色进行身份验证（允许将数据库权限映射到用户）\n*   通过 `IDENTIFIED EXTERNALLY` 子句为常规数据库用户进行身份验证\n\
  \n通过操作系统角色的身份验证在第 2 章中有详细说明。这种类型的身份验证由 DBA 使用，允许他们连接到操作系统账户（例如 `oracle`），然后以 `SYSDBA`\
  \ 权限连接到数据库，而无需指定用户名和密码。\n\n登录到数据库服务器后，使用 `IDENTIFIED EXTERNALLY` 子句创建的用户可以连接到数据库，而无需指定用户名或密码。这种类型的身份验证有一些有趣的优势：\n\
  \n*   有权访问服务器的用户无需维护数据库用户名和密码。\n*   如果由操作系统身份验证的用户执行，登录到数据库的脚本不必使用硬编码的密码。\n*   其他数据库用户无法通过猜测用户名和密码连接字符串来侵入用户。登录操作系统身份验证用户的唯一方式是从操作系统登录。\n\
  \n使用操作系统身份验证时，Oracle 会将 `OS_AUTHENT_PREFIX` 数据库初始化参数中包含的值作为前缀，添加到连接到数据库的操作系统用户名之前。此参数的默认值为\
  \ `OPS$`。Oracle 强烈建议你将 `OS_AUTHENT_PREFIX` 参数设置为空字符串；例如：\n\n```\nSQL> alter system\
  \ set os_authent_prefix=\"\" scope=spfile;\n```\n\n你必须停止并启动数据库才能使此修改生效。设置 `OS_AUTHENT_PREFIX`\
  \ 参数后，你可以创建外部身份验证用户。例如，假设你有一个名为 `jsmith` 的操作系统用户，并且你希望任何有权访问此操作系统的用户都能够登录数据库而无需提供密码。使用\
  \ `CREATE EXTERNALLY` 语句来实现：\n\n\n## 配置集中管理用户\n\n```\nSQL> create user jsmith identified\
  \ externally;\nSQL> grant create session to jsmith ;\n```\n\n现在，当 `jsmith` 登录到数据库服务器时，该用户可以连接到\
  \ `SQL*Plus`，如下所示：\n\n```\n$ sqlplus /\n```\n\n不需要用户名或密码，因为该用户已经通过操作系统认证。\n\n集中管理用户被视为位于单一位置（如\
  \ Active Directory 或其他 LDAP 服务）的用户。可以集中管理用户的认证和授权，例如，Active Directory 中的用户将通过密码或其他类型的密钥进行认证管理，并通过安全组的使用来管理授权。如果用户更改了安全组，其权限将随之改变；如果用户在\
  \ Active Directory 中变为非活跃状态，则该用户无法再认证访问其他应用程序或数据库。\n\n可以在数据库中创建一个全局用户，这意味着数据库将主动联系\
  \ Active Directory 以获取用户详细信息，首先是验证密码，然后是验证所属的组以进行授权。数据库配置一个连接到 Active Directory\
  \ 的用户，并且 `ldap.ora` 文件会更新相关信息以用于针对 Active Directory 进行认证。配置完成后，可以使用以下语法创建用户：\n\n\
  ```\nSQL> create user jsmithdba identified globally as\n'cn=jsmithdba group,ou=dbateam,dc=example,dc=com';\n\
  ```\n\n这使得 Oracle 数据库能够识别 Active Directory 中的用户 `jsmithdba` 为允许访问此数据库的用户。密码与 Active\
  \ Directory 中的密码相同，并且该组可用于映射到数据库角色以获取权限。\n\n身份管理对企业至关重要，它允许个人根据其在企业中的职能拥有角色和任务。当这些职能发生变化或员工离职时，账户会被集中管理，而不是分散在各个数据库中。Oracle\
  \ 云提供了身份管理服务，用于配置角色并允许添加用户，这些用户作为身份管理服务的一部分进行管理，而非在各数据库中单独管理。\n\n注意\n用户可以导入到 Oracle\
  \ Cloud 中，这样就不必逐个输入账户。即使不导入所有企业用户，采用这种方式工作也有助于考虑哪些用户应该迁移过来，然后验证其角色。\n\n## 理解模式与用户\n\
  \n模式是数据库对象（如表和索引）的集合。模式通常并不重要，但两者之间存在一些细微差别。\n\n当你登录 Oracle 数据库时，你使用用户名和密码进行连接。在此示例中，用户是\
  \ `INV_MGMT`，密码是 `f00bar`：\n\n```\nSQL> connect inv_mgmt/f00bar\n```\n\n当你以用户身份连接时，默认情况下，你可以操作与你连接数据库时所用用户对应的模式中的对象。例如，当你尝试描述一个表时，Oracle\
  \ 默认访问当前用户的模式。因此，无需在表名前添加当前连接用户（所有者）作为前缀。\n\n假设当前连接的用户是 `INV_MGMT`。考虑以下 `DESCRIBE`\
  \ 命令：\n\n```\nSQL> describe inventory;\n```\n\n前述语句在功能上等同于以下语句：\n\n```\nSQL> desc\
  \ inv_mgmt.inventory;\n```\n\n你可以通过 `ALTER SESSION` 语句更改当前用户的会话以指向不同的模式：\n\n```\n\
  SQL> alter session set current_schema = hr;\n```\n\n此语句**不**授予当前用户（本例中为 `INV_MGMT`）任何额外的权限。该语句指示\
  \ Oracle 对后续引用数据库对象的任何 SQL 语句使用模式限定符 `HR`。如果已授予适当的权限，`INV_MGMT` 用户可以访问 `HR` 用户的对象，而无需在对象名前加上模式名。\n\
  \n正如 `describe` 和 `desc` 是功能相同的命令，描述表 `EMPLOYEES` 与使用 `HR.EMPLOYEES` 是相同的。\n\n```\n\
  SQL>  desc HR.EMPLOYEES\n如果会话已通过 alter session 设置为 HR，则结果相同：\nSQL> desc EMPLOYEES\n\
  ```\n\n注意\nOracle 确实有一个 `CREATE SCHEMA` 语句。讽刺的是，`CREATE SCHEMA` 并不创建模式或用户。相反，该语句提供了一种在模式中以单个事务创建多个对象（表、视图、授权）的方法。我很少见到\
  \ `CREATE SCHEMA` 语句被使用，但如果你所在环境确实使用它，你需要了解这一点。\n\n## 分配默认永久和临时表空间\n\n确保用户具有正确的默认永久表空间和临时表空间，有助于防止无意中填满\
  \ `SYSTEM` 或 `SYSAUX` 表空间的问题，这可能导致数据库不可用并引发性能问题。需要注意的是，如果你没有为数据库定义默认永久和临时表空间，那么在创建用户时，默认会使用\
  \ `SYSTEM` 表空间。这绝不是一件好事。\n\n如第 2 章所述，在创建数据库时，你应该建立一个默认永久表空间和临时表空间。第 2 章也展示了用于识别和更改默认永久表空间及临时表空间的\
  \ SQL 语句。这确保了当你创建用户且未指定默认永久和临时表空间时，将应用数据库的默认设置。因此，`SYSTEM` 表空间永远不会被用作默认永久和临时表空间。\n\
  \n话虽如此，现实情况是你很可能会遇到并非如此设置的数据库。在维护数据库时，你应该验证默认永久和临时表空间的设置，以确保它们符合你的数据库标准。你可以通过查询\
  \ `DBA_USERS` 视图来查看用户信息：\n\n```\nselect\nusername\n,password\n,default_tablespace\n\
  ,temporary_tablespace\nfrom dba_users;\n```\n\n以下是输出的一小部分示例：\n\n```\nUSERNAME  \
  \       PASSWORD   DEFAULT_TABLESPACE        TEMPORARY_TABLESPACE\n----------------\
  \ ---------- ------------------------- --------------------\nJSMITH           EXTERNAL\
  \   USERS                     TEMP\nMV_MAINT                    USERS          \
  \           TEMP\nAUDSYS                      USERS                     TEMP\nGSMUSER\
  \                     USERS                     TEMP\nXS$NULL                  \
  \   USERS                     TEMP\n```\n\n除了 `SYS` 用户外，你的任何用户都不应将默认永久表空间设置为 `SYSTEM`。你不希望除\
  \ `SYS` 外的任何用户在 `SYSTEM` 表空间中创建对象。`SYSTEM` 表空间应保留给 `SYS` 用户的对象。\n\n如果其他用户的对象存在于\
  \ `SYSTEM` 表空间中，你将面临填满该表空间并危及数据库可用性的风险。这也意味着，如果你使用 `SYS` 账户登录，在创建表和其他对象时应谨慎指定特定的表空间。\n\
  \n你所有的用户都应被分配一个已创建为临时类型的临时表空间。通常，这个表空间被命名为 `TEMP`（更多详情请参见第 4 章）。\n\n如果你发现任何用户的默认表空间设置不当，可以使用\
  \ `ALTER USER` 语句进行修改：\n\n```\nSQL> alter user inv_mgmt default tablespace users\
  \ temporary tablespace temp;\n```\n\n\n#### 临时表空间与用户管理\n\n### 避免 SYSTEM 临时表空间\n\n\
  你绝不希望任何用户的临时表空间是`SYSTEM`。如果一个用户的临时表空间是`SYSTEM`，那么该用户需要临时磁盘存储的任何排序区域都将在`SYSTEM`表空间中获取区。这可能导致`SYSTEM`表空间被填满。你绝不希望这种情况发生，因为`SYS`\
  \ schema 对象增长时无法获取更多空间可能导致数据库无法运行。要检查哪些用户的临时表空间是`SYSTEM`，请运行此脚本：\n\n```sql\nSQL>\
  \ select username from dba_users where temporary_tablespace='SYSTEM';\n```\n\n###\
  \ 创建用户脚本示例\n\n通常，我在创建用户时使用脚本名`creuser.sql`。此脚本使用定义用户名、密码、默认表空间等的变量。对于执行该脚本的每个环境（开发、测试、质量保证(QA)、Beta、生产），你可以根据需要更改&符号变量。例如，你可以为每个独立环境使用不同的密码和不同的表空间。\n\
  \n以下是一个`creuser.sql`脚本示例：\n\n```sql\nDEFINE cre_user=inv_mgmt\nDEFINE cre_user_pwd=inv_mgmt_pwd\n\
  DEFINE def_tbsp=inv_data\nDEFINE idx_tbsp=inv_index\nDEFINE def_temp_tbsp=temp\n\
  DEFINE smk_ttbl=zzzzzzz\n--\nCREATE USER &&cre_user IDENTIFIED BY &&cre_user_pwd\n\
  DEFAULT TABLESPACE &&def_tbsp\nTEMPORARY TABLESPACE &&def_temp_tbsp;\n--\nGRANT\
  \ CREATE SESSION TO &&cre_user;\nGRANT CREATE TABLE   TO &&cre_user;\n--\nALTER\
  \ USER &&cre_user QUOTA UNLIMITED ON &&def_tbsp;\nALTER USER &&cre_user QUOTA UNLIMITED\
  \ ON &&idx_tbsp;\n--\n-- 冒烟测试\nCONN &&cre_user/&&cre_user_pwd\nCREATE TABLE &&smk_ttbl(test_id\
  \ NUMBER) TABLESPACE &&def_tbsp;\nCREATE INDEX &&smk_ttbl._idx1 ON &&smk_ttbl(test_id)\
  \ TABLESPACE &&idx_tbsp;\nINSERT INTO &&smk_ttbl VALUES(1);\nDROP TABLE &&smk_ttbl;\n\
  ```\n\n### 冒烟测试\n\n`冒烟测试`是一个在管道、电子和软件开发等行业中使用的术语。该术语指的是在初次组装或修复后进行的第一次检查，以提供系统正常工作的某种程度的保证。\n\
  在管道中，冒烟测试迫使烟雾通过排水管道。强制的烟雾有助于快速识别系统中的裂缝或泄漏。\n在电子中，当电源首次连接到电路时会发生冒烟测试。如果布线有故障，有时会产生烟雾。\n\
  在软件开发中，冒烟测试是对系统进行的一个简单测试，以确保其具有某种程度的可工作性。据报道，许多经理在冒烟测试失败时被看到耳朵冒烟。\n\n### 修改密码\n\n\
  使用`ALTER USER`命令来修改现有用户的密码。此示例将`HEERA`用户的密码更改为`FOOBAR`：\n\n```sql\nSQL> alter user\
  \ HEERA identified by FOOBAR;\n```\n\n只有授予你的用户`ALTER USER`特权，你才能更改另一个账户的密码。此特权授予`DBA`角色。在你为用户更改密码后，该用户之后连接到数据库都需要`ALTER\
  \ USER`语句所指示的密码。\n在 Oracle Database 11g 或更高版本中，修改密码时它是区分大小写的。如果你使用的是 Oracle Database\
  \ 10g 或更低版本，密码不区分大小写。大小写行为由参数`SEC_CASE_SENSITIVE_LOGON`设置，默认为`TRUE`。这是一个应该检查的参数，以确保它未被更改，从而保证使用区分大小写的密码，除非遗留应用程序需要并允许使用，直到可以调整密码。\n\
  \n### SQL*Plus 密码命令\n\n你可以使用 SQL*Plus `PASSWORD`命令更改用户的密码。发出命令后，系统会提示你输入新密码：\n\n\
  ```sql\nSQL> passw heera\nChanging password for heera\nNew password:\nRetype new\
  \ password:\nPassword changed\n```\n\n此方法的优点是在屏幕上不显示新密码即可更改用户密码。\n\n### 仅 Schema\
  \ 账户\n\n以前没有仅 Schema 账户时，DBA 必须以不同用户身份登录才能执行某些建表脚本并授予权限。从 18c 开始，可以创建无需密码的新仅 Schema\
  \ 账户。这适用于包含所有对象的应用程序 Schema，因此如果被授予访问这些账户的权限，就可以对这些对象进行更改。这些账户没有直接登录数据库的权限。所以即使没有密码，也无法登录，并且会发生错误。\n\
  \n```sql\nSQL> create user app1 NO AUTHENTICATION;\n```\n\n在`dba_users`表中，此用户的`AUTHENTICATION_TYPE`将为`NONE`，密码列也将为`NULL`。仅\
  \ Schema 账户可以被授予创建表和其他对象的权限；但是，它不能被分配任何管理权限。即使将`CONNECT SESSION`授予仅 Schema 账户，也不允许你直接登录到此\
  \ Schema 账户。\n\n```sql\nSQL> grant create session to app1 ;\nGrant succeeded.\n\
  SQL> connect app1\nEnter password:\nERROR:\nORA-01005: null password given; logon\
  \ denied\nWarning: You are no longer connected to ORACLE.\nSQL> connect app1\nEnter\
  \ password:\nERROR:\nORA-01017: invalid username/password; logon denied\n```\n\n\
  为了在其他账户（包括仅 Schema 账户）中执行 DDL 语句，可以使用代理连接。即使在 18c 之前，使用代理连接也是可能的，并且使用仅 Schema 账户，为了执行该\
  \ Schema 的任何必要代码，它仍然是可能的。以下是一个示例，使用`jsmithdba`作为我们的账户登录数据库，而仅 Schema 账户是`app1`。\n\
  \n```sql\nSQL> alter user app1 grant connect through jsmithdba;\nSQL> connect jsmithdba/password1\n\
  SQL> select sys_context('USERENV','SESSION_USER') as session_user,\nsys_context('USERENV','SESSION_SCHEMA')\
  \ as session_schema,\nsys_context('USERENV','PROXY_USER') as proxy_id,\nuser\nfrom\
  \ dual;\nSESSION_USER SESSION_SCHEMA     PROXY_ID     USER\n-----------------------\
  \  ------------------------------------ -------------\nAPP1         APP1       \
  \        JSMITHDBA    APP1\n```\n\n这个没有密码的 Schema 可以简单地用于应用程序 Schema，并允许将权限授予对象或成为此\
  \ Schema 来运行代码。这是应用程序 Schema 需要考虑的一点；并且，正如我们将在接下来的“管理权限”部分中看到的，这些对象的授权和权限仍然可以通过角色来处理。\n\
  \n### 修改用户\n\n有时你需要修改现有用户，原因如下：\n\n*   更改用户密码\n*   锁定或解锁用户\n*   更改默认永久或临时表空间，或两者\n\
  *   更改配置文件或角色\n*   更改系统或对象权限\n*   修改表空间上的配额\n\n使用`ALTER USER`语句来修改用户。接下来列出了一些修改用户的\
  \ SQL 语句。此示例使用`IDENTIFIED BY`子句更改用户密码：\n\n```sql\nSQL> alter user inv_mgmt identified\
  \ by i2jy22a;\n```\n\n如果你在最初创建用户时未设置默认永久表空间和临时表空间，可以在创建后修改它们，如下所示：\n\n```sql\nSQL>\
  \ alter user inv_mgmt default tablespace users temporary tablespace temp;\n```\n\
  \n此示例锁定用户账户：\n\n```sql\nSQL> alter user inv_mgmt account lock;\n```\n\n而此示例更改用户在`USERS`表空间上的配额：\n\
  \n```sql\nSQL> alter user inv_mgmt quota 500m on users;\n```\n\n> 注意\n> 由于`ALTER\
  \ USER`是一个高权限命令，并且有许多使用它的理由，它现在可能掌握在安全团队手中执行。可以编写其他命令和过程来执行此操作，然后将权限授予执行者。此外，数据库保险库限制了更改用户的能力，并允许安全团队执行这些操作。\n\
  \n### 删除用户\n\n\n\n## 数据库用户管理与安全\n\n在删除用户之前，建议先锁定该用户。锁定用户可以防止他人连接到已锁定的数据库账户，这有助于您更好地在删除账户前确认是否有人正在使用它。以下是锁定用户的示例：\n\
  \n```\nSQL> alter user heera account lock;\n```\n\n任何尝试连接到此用户的用户或应用程序现在都会收到以下错误：\n\
  \n```\nORA-28000: the account is locked\n```\n\n要查看数据库中的用户及锁定日期，可以执行此查询：\n\n```\n\
  SQL> select username, lock_date from dba_users;\n```\n\n要解锁账户，请执行此命令：\n\n```\nSQL>\
  \ alter user heera account unlock;\n```\n\n锁定用户是一种非常方便的技术，可用于保护数据库安全并发现哪些用户是活跃的。\n\
  请注意，锁定用户并不会锁定对其所属对象的访问。例如，如果用户`USER_A`对`USER_B`拥有的表具有`select`、`insert`、`update`和`delete`权限，即使您锁定了`USER_B`账户，`USER_A`仍然可以对`USER_B`拥有的对象发出\
  \ DML 语句。要确定对象是否正在被使用，请参阅第 20 章关于审计的部分。\n\n> 提示\n> 如果用户的对象没有占用过多磁盘空间，那么在删除用户之前，进行快速备份是审慎的做法。有关使用\
  \ Data Pump 备份单个用户的详细信息，请参阅第 13 章。\n\n当您确认某个用户及其对象不再需要时，使用`DROP USER`语句来移除数据库账户。以下示例删除了用户`HEERA`：\n\
  \n```\nSQL> drop user heera;\n```\n\n如果用户拥有任何数据库对象，前面的命令将无法工作。使用`CASCADE`子句来移除用户并同时删除其所属对象：\n\
  \n```\nSQL> drop user heera cascade;\n```\n\n> 注意\n> 如果被删除的用户拥有大量数据库对象，`DROP USER`语句可能需要很长时间来执行。在这种情况下，您可能需要考虑在删除用户之前先删除其对象。\n\
  \n关联的模式也会被删除。Oracle 会使依赖于被删除用户对象的视图、同义词、过程、函数或包失效，但不会删除它们。这就是为什么将应用程序对象放在不同的模式中，而不是在单个账户下创建所有对象非常重要。如果要停用应用程序，还应考虑备份和保留策略。\n\
  \n### 强制密码安全与资源限制\n\n在创建用户时，有时需求要求密码遵循一组安全规则：例如，要求密码具有一定长度并包含数字字符。此外，在设置数据库用户时，您可能希望确保某个用户不会消耗过量的\
  \ CPU 资源。\n\n您可以使用数据库配置文件来满足这类需求。Oracle 配置文件是一个数据库对象，有两个用途：\n\n*   强制执行密码安全设置\n\
  *   限制用户消耗的系统资源\n\n接下来的几个部分将讨论这些主题。\n\n> 提示\n> 不要混淆数据库配置文件与 SQL 配置文件。数据库配置文件是分配给用户的一个对象，用于强制执行密码安全并约束数据库资源使用；而\
  \ SQL 配置文件与 SQL 语句关联，包含对统计信息的修正，有助于优化器生成更高效的执行计划。\n\n#### 基本密码安全\n\n当您创建用户时，如果未指定配置文件，则`DEFAULT`配置文件将被分配给新创建的用户。要查看配置文件的当前设置，请执行以下\
  \ SQL：\n\n```\nselect profile, resource_name, resource_type, limit\nfrom dba_profiles\n\
  order by profile, resource_type;\n```\n\n以下是部分输出结果：\n\n```\nPROFILE      RESOURCE_NAME\
  \                  RESOURCE_TYPE       LIMIT\n------------ ---------------------------\
  \ -------- -------------------------\nDEFAULT      CONNECT_TIME                \
  \          KERNEL       UNLIMITED\nDEFAULT      PRIVATE_SGA                    \
  \       KERNEL       UNLIMITED\nDEFAULT      COMPOSITE_LIMIT                   \
  \    KERNEL       UNLIMITED\nDEFAULT      SESSIONS_PER_USER                    \
  \ KERNEL       UNLIMITED\nDEFAULT      LOGICAL_READS_PER_SESSION             KERNEL\
  \       UNLIMITED\nDEFAULT      CPU_PER_CALL                          KERNEL   \
  \    UNLIMITED\nDEFAULT      IDLE_TIME                             KERNEL      \
  \ UNLIMITED\nDEFAULT      LOGICAL_READS_PER_CALL                KERNEL       UNLIMITED\n\
  DEFAULT      CPU_PER_SESSION                       KERNEL       UNLIMITED\nDEFAULT\
  \      PASSWORD_LIFE_TIME                    PASSWORD     180\nDEFAULT      PASSWORD_GRACE_TIME\
  \                   PASSWORD     7\nDEFAULT      PASSWORD_REUSE_TIME           \
  \        PASSWORD     UNLIMITED\nDEFAULT      PASSWORD_REUSE_MAX               \
  \     PASSWORD     UNLIMITED\nDEFAULT      PASSWORD_LOCK_TIME                  \
  \  PASSWORD     1\nDEFAULT      FAILED_LOGIN_ATTEMPTS                 PASSWORD \
  \    10\nDEFAULT      PASSWORD_VERIFY_FUNCTION              PASSWORD     NULL\n\
  DEFAULT      INACTIVE_ACCOUNT_TIME                 PASSWORD     UNLIMITED\nORA_STIG_PROFILE\
  \   CONNECT_TIME                    KERNEL       DEFAULT\nORA_STIG_PROFILE   IDLE_TIME\
  \                       KERNEL       15\nORA_STIG_PROFILE   LOGICAL_READS_PER_CALL\
  \          KERNEL       DEFAULT\nORA_STIG_PROFILE   CPU_PER_CALL               \
  \     KERNEL       DEFAULT\nORA_STIG_PROFILE   PASSWORD_GRACE_TIME             PASSWORD\
  \     5\nORA_STIG_PROFILE   PASSWORD_LOCK_TIME              PASSWORD     UNLIMITED\n\
  ORA_STIG_PROFILE   PASSWORD_VERIFY_FUNCTION        PASSWORD     ORA12C_STIG_VERIFY_FUNCTION\n\
  ORA_STIG_PROFILE   PASSWORD_REUSE_MAX              PASSWORD     10\nORA_STIG_PROFILE\
  \   PASSWORD_REUSE_TIME             PASSWORD     365\nORA_STIG_PROFILE   PASSWORD_LIFE_TIME\
  \              PASSWORD     60\nORA_STIG_PROFILE   FAILED_LOGIN_ATTEMPTS       \
  \    PASSWORD     3\nORA_STIG_PROFILE   INACTIVE_ACCOUNT_TIME           PASSWORD\
  \     35\n```\n\n配置文件的密码限制在分配给用户后立即生效。例如，从前面的输出来看，如果您已将`DEFAULT`配置文件分配给一个用户，则该用户只允许连续十次登录尝试失败，之后用户账户将被\
  \ Oracle 自动锁定。有关密码配置文件安全设置的描述，请参见表 6-1。\n\n**表 6-1 密码安全设置**\n\n| 密码设置 | 描述 | 默认值\
  \ |\n| :--- | :--- | :--- |\n| `FAILED_LOGIN_ATTEMPTS` | 模式被锁定前的失败登录尝试次数 | 10 次\
  \ |\n| `PASSWORD_GRACE_TIME` | 密码过期后，所有者仍可使用旧密码登录的天数 | 7 天 |\n| `PASSWORD_LIFE_TIME`\
  \ | 密码有效的天数 | 180 天 |\n| `PASSWORD_LOCK_TIME` | 达到`FAILED_LOGIN_ATTEMPTS`后账户被锁定的天数\
  \ | 1 天 |\n| `PASSWORD_REUSE_MAX` | 密码可以被重用前需要变化的次数 | 无限制 |\n| `PASSWORD_REUSE_TIME`\
  \ | 密码可以被重用前的天数 | 无限制 |\n| `PASSWORD_VERIFY_FUNCTION` | 用于验证密码的数据库函数 | Null |\n\
  | `INACTIVE_ACCOUNT_TIME` | 用户未登录账户的天数，之后将锁定账户 | 无限制 |\n\n> 提示\n> 有关 Oracle 数据库`DEFAULT`配置文件更改的详细信息，请参阅\
  \ MOS 注释 454635.1。\n\n\n\n#### Oracle 数据库密码与资源管理配置指南\n\n### 修改默认配置文件\n\n您可以修改 `DEFAULT`\
  \ 配置文件以适应您的环境。例如，假设您希望强制设置密码可使用的最大天数上限。以下代码行将 `DEFAULT` 配置文件的 `PASSWORD_LIFE_TIME`\
  \ 设置为 300 天：\n\n```\nSQL> alter profile default limit password_life_time 300;\n\
  ```\n\n### 密码重用设置\n\n`PASSWORD_REUSE_TIME` 和 `PASSWORD_REUSE_MAX` 设置必须结合使用。如果您为一个参数指定整数值（无论哪一个），并为另一个参数指定\
  \ `UNLIMITED`，则当前密码永远无法被重用。\n\n如果您希望指定 `DEFAULT` 配置文件的密码在 100 天内必须更改 10 次后才能重用，请使用类似以下的代码行：\n\
  \n```\nSQL> alter profile default limit password_reuse_time 100 password_reuse_max\
  \ 10;\n```\n\n### 创建自定义安全配置文件\n\n尽管在许多环境中使用 `DEFAULT` 配置文件已足够，但您可能需要更严格的安全管理。我建议您根据需要创建自定义的安全配置文件并将其分配给用户。例如，专门为应用程序用户创建一个配置文件：\n\
  \n```\nCREATE PROFILE SECURE_APP LIMIT\nPASSWORD_LIFE_TIME 200\nPASSWORD_GRACE_TIME\
  \ 10\nPASSWORD_REUSE_TIME 1\nPASSWORD_REUSE_MAX 1\nFAILED_LOGIN_ATTEMPTS 3\nPASSWORD_LOCK_TIME\
  \ 1\nINACTIVE_ACCOUNT_TIME 60;\n```\n\n创建配置文件后，您可以酌情将其分配给用户。以下 SQL 会生成一个名为 `alt_prof_dyn.sql`\
  \ 的 SQL 脚本，可用于将新创建的配置文件分配给用户：\n\n```\nset head off;\nspo alt_prof_dyn.sql\nselect\
  \ 'alter user ' || username || ' profile secure_app;'\nfrom dba_users where username\
  \ like '%APP%';\nspo off;\n```\n\n### 应用程序账户注意事项\n\n在将配置文件分配给使用数据库的应用程序账户时要小心。如果您想强制密码定期更改，请务必了解这对生产系统的影响。密码往往会被硬编码到响应文件和代码中。在这些环境中强制更改密码可能会带来巨大的混乱，因为您需要追踪所有引用密码的地方。如果您不想强制定期更改密码，可以将\
  \ `PASSWORD_LIFE_TIME` 设置为一个较大的值，例如 10000 或 `UNLIMITED`。\n\n### 密码是否曾被更改\n\n在确定密码是否安全时，检查用户的密码是否曾经被更改是有用的。如果一个用户的密码从未被更改，这可能被视为安全风险。此示例执行此类检查：\n\
  \n```\nselect\nname\n,to_char(ctime,'dd-mon-yy hh24:mi:ss')\n,to_char(ptime,'dd-mon-yy\
  \ hh24:mi:ss')\n,length(password)\nfrom user$\nwhere password is not null\nand password\
  \ not in ('GLOBAL','EXTERNAL')\nand ctime=ptime;\n```\n\n在此脚本中，`CTIME` 列包含用户创建时的时间戳。`PTIME`\
  \ 列包含密码被更改时的时间戳。如果 `CTIME` 和 `PTIME` 相同，则密码从未更改过。\n\n### 密码强度\n\n不易被猜出的密码被认为是强密码。密码的强度可以根据长度、大小写字母的使用、非字典单词、数字字符等方面进行量化。例如，密码\
  \ `L5K0ta890g` 会被认为是强密码，而密码 `pass` 则会被认为是弱密码。关于强制密码强度有两种思路：\n\n*   使用容易记住的密码，这样您就不需要将它们写下来或记录在某个文件中。因为密码不复杂，所以安全性不高。\n\
  *   强制密码达到一定的复杂程度（强度）。这样的密码不易记住，因此必须记录在某处，这并不安全。\n\n您可能选择强制一定程度的密码强度，因为您认为这是最安全的选项。或者，您的公司安全团队可能要求您强制执行密码安全复杂度（因此您别无选择）。本节并非讨论前述哪种方法更可取。如果您选择强制密码达到一定强度，本节将描述如何强制执行这些规则。\n\
  \n### 强制密码复杂度\n\n您可以通过将密码验证函数分配给用户的配置文件来强制执行最低密码复杂度标准。Oracle 提供了一个默认的密码验证函数，您可以通过以\
  \ `SYS` 模式运行以下脚本来创建它：\n\n```\nSQL> @?/rdbms/admin/utlpwdmg\n```\n\n之前的脚本会创建以下密码验证函数：\n\
  \n*   `ora12c_verify_function` (Oracle Database 12c 和 18c)\n*   `ora12c_strong_verify_function`\
  \ (非常安全的 Oracle Database 12c 和 18c)\n*   `verify_function_11G` (Oracle Database\
  \ 11g)\n*   `verify_function` (Oracle Database 10g)\n\n一旦创建了密码验证函数，您可以使用 `ALTER\
  \ PROFILE` 命令将该密码验证函数与所有分配了给定配置文件的用户关联起来。18c 没有新的密码函数，因此密码复杂度函数与 12c 使用的相同。例如，在\
  \ Oracle Database 18c 中，要设置 `DEFAULT` 配置文件的密码验证函数，请发出此命令：\n\n```\nSQL> alter profile\
  \ default limit PASSWORD_VERIFY_FUNCTION ora12c_verify_function;\n```\n\n如果由于任何原因，您需要撤消新的安全修改，请运行此语句以禁用密码函数：\n\
  \n```\nSQL> alter profile default limit PASSWORD_VERIFY_FUNCTION null;\n```\n\n\
  ### 验证函数行为与自定义\n\n启用后，密码验证函数可确保用户正确创建或修改其密码。`utlpwdmgsql` 脚本创建一个函数来检查密码，以确保其满足基本的安全标准，例如最小密码长度以及密码不能与用户名相同。您可以通过尝试更改已分配\
  \ `DEFAULT` 配置文件的用户的密码来验证新的安全函数是否生效。此示例尝试将密码更改为小于最小长度：\n\n```\nSQL> password\nChanging\
  \ password for HEERA\nOld password:\nNew password:\nRetype new password:\nERROR:\n\
  ORA-28003: password verification for the specified password failed\nORA-20001: Password\
  \ length less than 8\n```\n\n> 注意\n> 对于 Oracle Database 18c、12c 和 11g，当使用标准密码验证函数时，最小密码长度为八个字符。对于\
  \ Oracle Database 10g，最小长度为四个字符。\n\n请记住，可以修改用于创建密码验证函数的代码。例如，您可以打开并修改用于创建此函数的脚本：\n\
  \n```\n$ vi $ORACLE_HOME/rdbms/admin/utlpwdmg.sql\n```\n\n如果您觉得 Oracle 提供的验证函数太强或限制过多，您可以创建自己的函数并将适当的数据库配置文件分配给它。\n\
  \n> 注意\n> 从 Oracle Database 12g 开始，`SEC_CASE_SENSITIVE_LOGON` 参数已被弃用。将此初始化参数设置为\
  \ `FALSE` 可使密码不区分大小写。\n\n### 限制数据库资源使用\n\n如前所述，密码配置文件设置在您将配置文件分配给用户后立即生效。与密码设置不同，内核资源配置文件限制直到您为数据库将\
  \ `RESOURCE_LIMIT` 初始化参数设置为 `TRUE` 才会生效；例如，\n\n```\nSQL> alter system set resource_limit=true\
  \ scope=both;\n```\n\n要查看 `RESOURCE_LIMIT` 参数的当前设置，请发出此查询：\n\n```\nSQL> select name,\
  \ value from v$parameter where name='resource_limit';\n```\n\n\n\n当你创建一个用户时，如果未指定配置文件，则会将\
  \ `DEFAULT` 配置文件分配给该用户。你可以使用 `ALTER PROFILE` 语句修改 `DEFAULT` 配置文件。下面的例子修改了 `DEFAULT`\
  \ 配置文件，将 `CPU_PER_SESSION` 限制为 240,000（以百分之一秒为单位）：\n\n```sql\nSQL> alter profile\
  \ default limit cpu_per_session 240000;\n```\n\n这将任何使用 `DEFAULT` 配置文件的用户的 CPU 使用时间限制在\
  \ 2,400 秒。你可以在配置文件中设置各种限制。表 6-2 描述了可以通过配置文件限制的数据库资源设置。\n\n#### 表 6–2 数据库资源配置文件设置\n\
  \n| 配置文件资源                   | 含义                                              \
  \                                                                             |\n\
  | :----------------------------- | :-----------------------------------------------------------------------------------------------------------------------------\
  \ |\n| `COMPOSITE_LIMIT`              | 限制，基于以下资源的加权和算法：`CPU_PER_SESSION`、`CONNECT_TIME`、`LOGICAL_READS_PER_SESSION`\
  \ 和 `PRIVATE_SGA`              |\n| `CONNECT_TIME`                 | 连接时间，以分钟为单位\
  \                                                                              \
  \                           |\n| `CPU_PER_CALL`                 | 每次调用的 CPU 时间限制，以百分之一秒为单位\
  \                                                                              \
  \      |\n| `CPU_PER_SESSION`              | 每个会话的 CPU 时间限制，以百分之一秒为单位          \
  \                                                                          |\n|\
  \ `IDLE_TIME`                    | 空闲时间，以分钟为单位                                 \
  \                                                                        |\n| `LOGICAL_READS_PER_CALL`\
  \       | 每次调用读取的数据块数                                                          \
  \                                               |\n| `LOGICAL_READS_PER_SESSION`\
  \    | 每个会话读取的数据块数                                                             \
  \                                            |\n| `PRIVATE_SGA`                \
  \  | 在共享池中消耗的空间量                                                               \
  \                                          |\n| `SESSIONS_PER_USER`            |\
  \ 并发会话数量                                                                       \
  \                                            |\n\n你也可以通过 `CREATE PROFILE` 语句创建自定义配置文件并分配给用户。然后，你可以将该配置文件分配给任何现有的数据库用户。下面的\
  \ SQL 语句创建了一个配置文件，用于限制资源，例如单个会话可以消耗的 CPU 量：\n\n```sql\ncreate profile user_profile_limit\n\
  limit\nsessions_per_user 20\ncpu_per_session 240000\nlogical_reads_per_session 1000000\n\
  connect_time 480\nidle_time 120;\n```\n\n创建配置文件后，你可以将其分配给用户。在下一个示例中，用户 `HEERA` 被分配了\
  \ `USER_PROFILE_LIMIT`：\n\n```sql\nSQL> alter user heera profile user_profile_limit;\n\
  ```\n\n> **注意：** Oracle 建议你使用数据库资源管理器来管理数据库资源限制。然而，对于基本的资源管理需求，我发现通过 SQL 实现的数据库配置文件是一种有效且简单的机制来管理资源使用。如果你有更复杂的资源管理需求，请研究数据库资源管理器功能。\n\
  \n作为 `CREATE USER` 语句的一部分，你可以指定一个非 `DEFAULT` 的配置文件：\n\n```sql\nSQL> create user\
  \ heera identified by foo profile user_profile_limit;\n```\n\n你何时应该使用数据库配置文件？你应该始终利用\
  \ `DEFAULT` 配置文件的密码安全设置。你可以根据业务规则轻松修改此配置文件的默认设置。\n\n当你需要高级用户直接连接到数据库并运行查询时，配置文件的内核资源限制非常有用。例如，你可以使用内核资源设置来限制用户消耗的\
  \ CPU 时间量，这在用户编写了错误查询并意外消耗过多数据库资源时非常方便。\n\n> **注意：** 你只能为一个用户分配一个数据库配置文件，因此，如果你需要同时管理密码安全性和资源限制，请确保在同一个配置文件中设置这两者。\n\
  \n## 管理权限\n\n必须先授予数据库用户权限，用户才能在数据库中执行任何任务。在 Oracle 中，你可以通过向用户授予特定权限，或先将权限授予角色，再将包含该权限的角色授予用户来分配权限。权限有两种类型：系统权限和对象权限。以下部分将详细讨论这些权限。\n\
  \n### 分配数据库系统权限\n\n数据库系统权限允许你执行连接到数据库以及创建和修改对象等任务。有数百种不同的系统权限。你可以通过查询 `DBA_SYS_PRIVS`\
  \ 视图来查看系统权限：\n\n```sql\nSQL> select distinct privilege from dba_sys_privs;\n```\n\
  \n你可以将权限授予其他用户或角色。要能够授予权限，用户需要 `GRANT ANY PRIVILEGE` 权限，或者必须已被授予带有 `ADMIN OPTION`\
  \ 的系统权限。\n\n使用 `GRANT` 语句将系统权限分配给用户。例如，用户至少需要 `CREATE SESSION` 才能连接到数据库。授予此系统权限的方式如下：\n\
  \n```sql\nSQL> grant create session to inv_mgmt;\n```\n\n通常，用户需要做的不仅仅是连接到数据库。例如，用户可能需要创建表和其他类型的数据库对象。此示例授予用户\
  \ `CREATE TABLE` 和 `CREATE DATABASE LINK` 系统权限：\n\n```sql\nSQL> grant create table,\
  \ create database link to inv_mgmt;\n```\n\n对于仅限于特定模式的账户，操作相同：\n\n```sql\nSQL> grant\
  \ create table, create database link to app1;\n```\n\n如果需要撤销权限，请使用 `REVOKE` 语句：\n\
  \n```sql\nSQL> revoke create table from inv_mgmt;\n```\n\nOracle 有一个功能，允许你在向用户授予系统权限的同时，赋予该用户管理权限的能力。你可以使用\
  \ `WITH ADMIN OPTION` 子句来实现：\n\n```sql\nSQL> grant create table to inv_mgmt with\
  \ admin option;\n```\n\n在授予权限时，我很少使用 `WITH ADMIN OPTION`。通常，具有 `DBA` 角色的用户被用来授予权限，并且该权限通常不会授予数据库中的非\
  \ DBA 用户。这是因为很难跟踪谁在何时出于何种原因分配了哪些系统权限。在生产环境中，这是不可行的。\n\n你也可以将系统权限授予 `PUBLIC` 用户组（我不建议这样做）。例如，你可以如下所示向所有需要连接到数据库的用户授予\
  \ `CREATE SESSION` 权限：\n\n```sql\nSQL> grant create session to public;\n```\n\n\
  现在，每个创建的用户都可以自动连接到数据库。将系统权限授予 `PUBLIC` 用户组几乎总是一个坏主意。作为 DBA，你的主要职责之一是确保数据库中数据的安全。将权限授予\
  \ `PUBLIC` 角色肯定会导致无法管理谁被授权在数据库内执行特定操作。换句话说，不要将系统权限授予 public。\n\n### 分配数据库对象权限\n\n\
  数据库对象权限允许你访问和操作其他用户的对象。你可以授予权限的数据库对象类型包括表、视图、物化视图、序列、包、函数、过程、用户定义类型和目录。要能够授予对象权限，必须满足以下条件之一：\n\
  \n*   你拥有该对象。\n*   你已被授予带有 `GRANT OPTION` 的对象权限。\n*   你拥有 `GRANT ANY OBJECT PRIVILEGE`\
  \ 系统权限。\n\n此示例（作为对象所有者）向 `INV_MGMT_APP` 用户授予对象权限：\n\n```sql\nSQL> grant insert,\
  \ update, delete, select on registrations to inv_mgmt_app;\n```\n\n`GRANT ALL` 语句等同于向对象授予\
  \ `INSERT`、`UPDATE`、`DELETE` 和 `SELECT` 权限。下一个语句等同于前面的语句：\n\n```sql\nSQL> grant\
  \ all on registrations to inv_mgmt_app;\n```\n\n你还可以在列级别向表授予 `INSERT` 和 `UPDATE`\
  \ 权限。下一个示例向 `INVENTORY` 表中的特定列授予 `INSERT` 权限：\n\n```sql\nSQL> grant insert (inv_id,\
  \ inv_name, inv_desc) on inventory to inv_mgmt_app;\n```\n\n如果你希望被授予对象权限的用户能够随后将相同的对象权限授予其他用户，请使用\
  \ `WITH GRANT OPTION` 子句：\n\n```sql\nSQL> grant insert on registrations to inv_mgmt_app\
  \ with grant option;\n```\n\n\n\n## 权限管理与角色\n\n`INV_MGMT_APP` 用户现在可以授予其他用户对 `REGISTRATIONS`\
  \ 表的插入权限。\n我很少在授予对象权限时使用 `WITH GRANT OPTION`。允许其他用户将对象权限传播给其他用户，这使得很难追踪谁在何时、为何授予了何种对象权限。在生产环境中，这是不可接受的。当你在管理生产环境时，如果出现问题，你需要知道发生了什么变化、何时发生的以及原因。\n\
  \n你也可以将对象权限授予 `PUBLIC` 用户组（我**不**推荐这样做）。例如，你可以将表的 `SELECT` 权限授予 `PUBLIC`：\n\n```\n\
  SQL> grant select on registrations to public;\n```\n\n现在，每个用户都可以从 `REGISTRATIONS`\
  \ 表中进行选择。将对象权限授予 `PUBLIC` 角色几乎总是一个坏主意。作为 DBA，你的主要优先事项之一是确保数据库中的数据安全。将对象权限授予 `PUBLIC`\
  \ 角色绝对是无法管理谁能访问数据库中什么数据的一种方式。再次强调，**不要**将对象权限授予 `PUBLIC`。\n\n如果你需要**撤销**对象权限，请使用\
  \ `REVOKE` 语句。此示例从 `INV_MGMT_APP` 用户撤销 DML 权限：\n\n```\nSQL> revoke insert, update,\
  \ delete, select on registrations from inv_mgmt_app;\n```\n\n### 分组和分配权限\n\n角色是一个数据库对象，它允许你将系统或对象权限，或两者以逻辑方式分组在一起，以便你可以通过一次操作将这些权限分配给用户。角色有助于你管理数据库安全的各个方面，因为它们提供了一个中心对象，权限被分配给它。然后你可以将该角色分配给多个用户或其他角色。\n\
  \n要创建角色，请以具有 `CREATE ROLE` 系统权限的用户身份连接到数据库。接下来，创建一个角色并将你想要分组的系统或对象权限分配给它。此示例使用 `CREATE\
  \ ROLE` 语句创建 `JR_DBA` 角色：\n\n```\nSQL> create role jr_dba ;\n```\n\n接下来的几行 SQL 将系统权限授予新创建的角色：\n\
  \n```\nSQL> grant select any table to jr_dba;\nSQL> grant create any table to jr_dba;\n\
  SQL> grant create any view to jr_dba;\nSQL> grant create synonym to jr_dba;\nSQL>\
  \ grant create database link to jr_dba;\n```\n\n然后，将该角色授予你希望拥有这些权限的任何用户：\n\n```\n\
  SQL> grant jr_dba to lellison;\nSQL> grant jr_dba to mhurd;\n```\n\n用户 `LELLISON`\
  \ 和 `MHURD` 现在可以执行创建同义词和视图等任务。要查看角色被授予给了哪些用户，请查询 `DBA_ROLE_PRIVS` 视图：\n\n```\nSQL>\
  \ select grantee, granted_role from dba_role_privs order by 1;\n```\n\n要查看授予当前连接用户的角色，请从\
  \ `USER_ROLE_PRIVS` 视图查询：\n\n```\nSQL> select * from user_role_privs;\n```\n\n要从角色撤销权限，请使用\
  \ `REVOKE` 命令：\n\n```\nSQL> revoke create database link from jr_dba;\n```\n\n同样，使用\
  \ `REVOKE` 命令从用户移除角色：\n\n```\nSQL> revoke jr_dba from lellison;\n```\n\n> 注意\n>\
  \ 与其他数据库对象不同，角色没有所有者。角色由分配给它的权限定义。\n\n### PL/SQL 与角色\n\n如果你使用 PL/SQL，有时在尝试编译过程或函数时会遇到此错误：\n\
  \n```\nPL/SQL: ORA-00942: table or view does not exist\n```\n\n令人困惑的是，你可以描述该表：\n\
  \n```\nSQL> desc app_table;\n```\n\n为什么 PL/SQL 似乎无法识别该表？这是因为 PL/SQL 要求包、过程或函数的所有者必须被显式授予代码中引用的任何对象的权限。PL/SQL\
  \ 代码的所有者不能通过角色获得授权。\n\n当遇到此问题时，作为 PL/SQL 代码的所有者，请尝试：\n\n```\nSQL> set role none;\n\
  ```\n\n现在，尝试运行访问该表的 SQL 语句：\n\n```\nSQL> select count(*) from app_table;\n```\n\n\
  如果你不再能访问该表，那么你之前是通过角色获得访问权限的。要解决此问题，请显式授予对表的访问权限给 PL/SQL 代码的所有者（作为表的所有者）：\n\n```\n\
  SQL> connect owner/pass\nSQL> grant select on app_table to proc_owner;\n```\n\n\
  然后，你应该能够以 PL/SQL 代码所有者的身份连接并成功编译你的代码。\n\n角色将提供一种为用户执行功能或任务所需授予权限的方式。由于用户映射到安全组，角色是管理权限的最佳方式。基于角色的对不同对象和系统权限的访问将允许简单的审计，以了解谁拥有角色，并验证没有授予个人权限。\n\
  \n## 总结\n\n创建数据库后，你的首要任务之一是保护任何默认用户帐户。默认帐户在数据库创建后被锁定，一种有效的方法是仅在需要时才打开它们。其他方法包括更改或使密码过期，或两者兼有。在默认用户帐户被保护后，你负责创建需要访问数据库的用户。这通常包括应用程序用户、DBA\
  \ 和开发人员。\n\n对于你创建的任何用户，应考虑使用安全配置文件。此外，创建用户时要考虑密码安全性。Oracle 提供了一个强制执行一定密码强度的密码函数。我建议你将配置文件与密码函数结合作为创建安全数据库的第一步。\n\
  \n仅使用模式帐户和通过角色管理权限将加强数据库中的用户安全，并提供有效的方法来审计和验证用户是否获得了适当的权限。\n\n随着数据库的使用，你需要维护用户帐户。通常，数据库帐户的需求会随时间变化。你负责确保为每个帐户维护正确的系统和对象权限。对于任何遗留系统，你最终将需要锁定和删除用户。删除未使用的帐户有助于确保你的环境更安全且易于维护。\n\
  \n使用集中管理的用户简化了这些步骤，因为帐户密码在一个目录中更改并设置为非活动状态，而不是在每个数据库中。此外，安全组作为数据库角色的映射，以匹配其工作职能的权限。\n\
  \n在创建用户之后的下一个逻辑步骤是创建数据库对象。第 7 章涉及与表创建相关的概念。\n\n"
- "# 7. 表与约束\n\n本书前面的章节涵盖了为你准备创建数据库对象的下一个逻辑步骤的主题。例如，在开始创建表之前，你需要安装 Oracle 二进制文件并创建数据库、表空间和用户。通常，为应用程序创建的第一个对象是表、约束和索引。本章重点介绍表和约束的管理。索引的管理在第\
  \ 8 章中介绍。\n\n表是数据库中数据的基本存储容器。你通过 DDL 语句（如 `CREATE TABLE` 和 `ALTER TABLE`）创建和修改表结构。\n\
  你通过 DML 语句（`INSERT`、`UPDATE`、`DELETE`、`MERGE`、`SELECT`）访问和操作表数据。\n\n> 提示\n> DDL\
  \ 和 DML 语句之间的一个重要区别是，对于 DML 语句，你必须显式发出 `COMMIT` 或 `ROLLBACK` 来结束事务。\n\n\n\n\n####\
  \ 约束\n\n约束是一种强制数据遵守业务规则的机制。例如，你可能有一个业务要求：客户表中的所有客户 ID 必须唯一。在这种情况下，你可以使用主键约束来保证插入或更新到`CUSTOMER`表中的所有客户\
  \ ID 都是唯一的。约束会在数据被插入、更新和删除时进行检查，以确保没有违反任何业务规则。\n\n本章介绍创建和维护表及约束的常用技术。通常，当你创建一个表时，该表需要定义一个或多个约束；因此，将约束管理与表一起介绍是合理的。本章第一部分重点关注常见的表创建和维护任务，后半部分则详细讨论约束管理。\n\
  \n### 理解表类型\n\nOracle 数据库支持多种强大且稳健的表类型。这些不同的类型在表 7-1 中描述。\n\n表 7-1 Oracle 表类型描述\n\
  \n| 表类型 | 描述 | 典型用途 |\n| :--- | :--- | :--- |\n| 堆组织表 | 默认表类型，也是最常用的 | 除非有特定原因，否则应使用的表类型\
  \ |\n| 临时表 | 会话私有数据，在会话或事务期间存储；空间在临时段中分配 | 程序需要临时表结构来存储和排序数据；程序结束后不再需要该表 |\n| 索引组织表\
  \ | 数据存储在按主键排序的 B 树（平衡树）索引结构中 | 主要按主键列查询的表；提供快速的随机访问 |\n| 分区表 | 由独立物理段组成的逻辑表 | 用于拥有数百万行数据的大表\
  \ |\n| 外部表 | 使用存储在数据库外部操作系统文件中的数据的表 | 用于高效访问数据库外部文件（如 CSV 文件）中的数据 |\n| 内存外部表 | 不需要加载到\
  \ Oracle 存储中，作为大数据集扫描一部分使用的数据 | 可以同时用于 RDBMS 和 Hadoop 内存扫描的数据 |\n| 聚簇表 | 共享相同数据块的一组表\
  \ | 用于减少经常在同一列上连接的表的 I/O 操作 |\n| 散列聚簇表 | 使用散列函数存储和检索数据的表 | 用于基本静态（初始加载后不再增长）的表以减少\
  \ I/O |\n| 嵌套表 | 包含另一表作为数据类型的列的表 | 很少使用 |\n| 对象表 | 包含对象类型作为数据类型的列的表 | 很少使用 |\n\n\
  本章重点介绍最常用的表类型：特别是堆组织表、索引组织表和临时表。分区表在数据仓库环境中广泛使用，将在第 12 章单独介绍。外部表在第 14 章介绍。有关本书未涵盖的表类型的详细信息，请参阅《SQL\
  \ 语言参考指南》，该指南可从 Oracle 技术网络网站（`http://otn.oracle.com`）下载。\n\n### 理解数据类型\n\n创建表时，必须指定列名和相应的数据类型。作为\
  \ DBA，你应该理解每种数据类型的适当用法。我见过许多因选择了错误数据类型而导致的应用程序问题（性能和数据准确性）。例如，当应该使用日期数据类型时却使用了字符串，这会导致在进行日期计算和报告时出现不必要的转换和麻烦。更糟糕的是，一旦错误的数据类型在生产环境中实现，修改数据类型可能非常困难，因为这会引入可能破坏现有代码的更改。一旦走错路，再回头选择正确的道路将极其困难。更有可能的情况是，你会在试图迫使选择不当的数据类型去完成它本不该做的工作时，不得不进行一次又一次的修补。\n\
  \n说到这里，Oracle 支持以下几组数据类型：\n\n*   字符型\n*   数值型\n*   日期/时间型\n*   `RAW`\n*   `ROWID`\n\
  *   LOB\n*   JSON\n\n以下各节将提供简要描述和使用建议。\n\n> 注意：本书不涵盖专业数据类型、任意类型、空间类型、媒体类型和用户定义类型。有关这些数据类型的更多详细信息，请参阅可从\
  \ Oracle 技术网络网站（`http://otn.oracle.com`）获取的《SQL 语言参考指南》。JSON 将作为 Oracle 18c 的新特性和增强功能简要介绍。\n\
  \n#### 字符型\n\n使用字符数据类型来存储字符和字符串数据。Oracle 中可用的字符数据类型如下：\n\n*   `VARCHAR2`\n*   `CHAR`\n\
  *   `NVARCHAR2`和`NCHAR`\n\n##### VARCHAR2\n\n`VARCHAR2`数据类型是在大多数情况下用于保存字符/字符串数据的类型。`VARCHAR2`仅根据字符串中的字符数分配空间。如果你将一个单字符字符串插入到定义为`VARCHAR2(30)`的列中，Oracle\
  \ 只会消耗一个字符的空间。以下示例验证了此行为：\n\n```sql\nSQL> create table d(d varchar2(30));\ninsert\
  \ into d values ('a');\nselect dump(d) from d;\n```\n\n以下是输出片段，验证了只分配了 1 字节（1B）：\n\
  \n```\nDUMP(D)\n\nTyp=1 Len=1\n```\n\n> 注意：Oracle 确实有另一个数据类型`VARCHAR`（没有“2”）。我提到这一点是因为你肯定会在\
  \ Oracle DBA 职业生涯的某个时刻遇到这种数据类型。Oracle 目前将`VARCHAR`定义为`VARCHAR2`的同义词。Oracle 强烈建议你使用`VARCHAR2`（而不是`VARCHAR`），因为\
  \ Oracle 的文档指出`VARCHAR`将来可能会有不同的用途。\n\n当你定义`VARCHAR2`列时，必须指定长度。有两种方式：`BYTE`和`CHAR`。`BYTE`指定以字节为单位的最大字符串长度，而`CHAR`指定最大字符数。例如，要指定一个最多包含\
  \ 30 字节的字符串，定义如下：\n\n```sql\nvarchar2(30 byte)\n```\n\n要指定一个最多可以包含 30 个字符的字符串，定义如下：\n\
  \n```sql\nvarchar2(30 char)\n```\n\n许多 DBA 没有意识到，如果你既不指定`BYTE`也不指定`CHAR`，那么默认长度是以字节计算的。换句话说，`VARCHAR2(30)`等同于`VARCHAR2(30\
  \ byte)`。在几乎所有情况下，使用`CHAR`来指定长度更安全。使用多字节字符集时，如果你指定长度为`VARCHAR2(30 byte)`，可能无法得到可预测的结果，因为某些字符需要多于\
  \ 1 字节的存储空间。相比之下，如果你指定`VARCHAR2(30 char)`，无论某些字符是否需要多于 1 字节，你总是可以在字符串中存储 30 个字符。\n\
  \n##### CHAR\n\n（此处原文结束，后续内容未提供）\n\n\n#### VARCHAR2 vs CHAR\n\n在几乎所有场景中，`VARCHAR2`都比`CHAR`更可取。`VARCHAR2`数据类型比`CHAR`更灵活且空间效率更高。这是因为`CHAR`是固定长度的字符字段。如果你定义一个`CHAR(30)`并插入一个仅包含一个字符的字符串，Oracle\
  \ 将分配 30 字节的空间。这可能是一种低效的空间使用方式。如果确实使用`CHAR`，那么只应在值的大小不会改变且绝对静态的情况下使用。我通常只在长度小于 8\
  \ 且大小绝对固定时才使用`CHAR`。以下示例验证了这一行为：\n\n```sql\nSQL> create table d(d char(30));\ninsert\
  \ into d values ('a');\nselect dump(d) from d;\n```\n\n以下是输出片段，验证了已消耗 30 字节：\n\n\
  ```sql\nDUMP(D)\n\nTyp=96 Len=30\n```\n\n#### NVARCHAR2 and NCHAR\n\n如果你的数据库最初是用单字节、固定宽度字符集创建的，但后来需要在同一数据库中存储多字节字符集数据，那么`NVARCHAR2`和`NCHAR`数据类型就很有用。你可以使用`NVARCHAR2`和`NCHAR`数据类型来满足此需求。更简单的做法是标准化使用`VARCHAR2`并提供足够的长度来处理多字节字符，或使用以字符为单位的长度，而不是使用`NVARCHAR2`和`NCHAR`。\n\
  \n> 注意\n> 对于 Oracle Database 11g 及更低版本，`VARCHAR2`或`NVARCHAR2`数据类型允许的最大大小为 4,000。在\
  \ Oracle Database 12c 及更高版本中，你可以在`VARCHAR2`或`NVARCHAR2`数据类型中指定最多 32,767 个字符。\n>\
  \ 在 12c 之前，如果你想存储大于 4,000 个字符的字符数据，逻辑上的选择是`CLOB`（更多详情请参见本章后面的“LOB”部分）。\n\n#### Numeric\n\
  \n使用数值数据类型来存储可能需要使用数学函数（如`SUM`、`AVG`、`MAX`和`MIN`）的数据。切勿在字符数据类型中存储数值信息。当你使用`VARCHAR2`来存储本质上是数字的数据时，你就是在给系统引入未来的故障。最终，你会希望报告或对数字数据运行计算，而如果它们不是数值数据类型，你将得到不可预测且通常是错误的结果。\n\
  \nOracle 支持三种数值数据类型：\n\n*   `NUMBER`\n*   `BINARY_DOUBLE`\n*   `BINARY_FLOAT`\n\n\
  对于大多数情况，你会使用`NUMBER`数据类型来处理任何类型的数字数据。其语法为`NUMBER(scale, precision)`，其中`scale`是总位数，`precision`是小数点右侧的位数。因此，对于定义为`NUMBER(5,\
  \ 2)`的数字，你可以存储值+/-999.99。总共五位数字，其中两位用于小数点右侧的精度。如果定义为`NUMBER(5)`，则值可以位于小数点右侧或左侧，总位数为五位，2.4563\
  \ 可以存入，55,555 同样可以。\n\n> 提示\n> Oracle 允许`NUMBER`数据类型最多 38 位数字。这对于几乎任何类型的数值应用都足够了。\n\
  \n有时让 DBA 困惑的是，你可以创建一个表，其列定义为`INT`、`INTEGER`、`REAL`、`DECIMAL`等。这些数据类型在 Oracle 中都是通过`NUMBER`数据类型实现的。例如，指定为`INTEGER`的列被实现为`NUMBER(38)`。`BINARY_DOUBLE`和`BINARY_FLOAT`数据类型用于科学计算。它们映射到\
  \ Java 数据类型`DOUBLE`和`FLOAT`。除非你的应用程序正在进行火箭科学计算，否则请使用`NUMBER`数据类型来满足所有数值需求。\n\n####\
  \ Date/Time\n\n在捕获和报告与日期相关的信息时，你应始终使用`DATE`或`TIMESTAMP`数据类型（而不是`VARCHAR2`）。使用正确的与日期相关的数据类型允许你执行准确的\
  \ Oracle 日期计算和聚合，以及用于报告的可靠排序。如果你对包含日期信息的字段使用`VARCHAR2`，你就是在保证未来的报告不一致和不必要的转换函数（如`TO_DATE`和`TO_CHAR`）。\n\
  \nOracle 支持三种与日期相关的数据类型：\n\n*   `DATE`\n*   `TIMESTAMP`\n*   `INTERVAL`\n\n`DATE`数据类型包含一个日期成分和一个粒度到秒的时间成分。默认情况下，如果在插入数据时未指定时间成分，则时间值默认为午夜（0\
  \ 时 0 秒）。如果你需要跟踪比秒更细粒度的时间，则使用`TIMESTAMP`；否则，请随意使用`DATE`。\n\n`TIMESTAMP`数据类型包含一个日期成分和一个粒度到秒小数的时间成分。定义`TIMESTAMP`时，可以指定小数秒精度部分。例如，如果你想要小数点右侧五位的分数精度，可以指定为：\n\
  \n```sql\nTIMESTAMP(5)\n```\n\n最大分数精度为 9；默认值为 6。如果你指定 0 分数精度，则等同于`DATE`数据类型。\n\n\
  `TIMESTAMP`数据类型还有两种额外变体：`TIMESTAMP WITH TIME ZONE`和`TIMESTAMP WITH LOCAL TIME ZONE`。这些是时区感知的数据类型，意味着当用户选择数据时，时间值会调整到用户会话的时区。\n\
  \nOracle 还提供了一种`INTERVAL`数据类型。这旨在存储一段持续时间或时间间隔。有两种类型：`INTERVAL YEAR TO MONTH`和`INTERVAL\
  \ DAY TO SECOND`。当需要年份和月份的精度时使用前者。当需要存储粒度到天和秒的间隔数据时使用后者。\n\n> 选择你的间隔类型\n> 在选择间隔类型时，让你的选择由你希望结果具有的粒度级别驱动。例如，你可以使用`INTERVAL\
  \ DAY TO SECOND`来存储长达数年的间隔——只是你会用天数来表示这样的间隔，也许是数百天。如果你只记录年份和月份数，那么你永远无法得到正确的天数，因为一年或一个月所代表的天数取决于所讨论的具体年份和月份。\n\
  > 同样，如果你需要以月为单位的粒度，你无法根据天数反推正确月数。因此，请选择与你应用所需粒度相匹配的类型。\n\n#### RAW\n\n`RAW`数据类型允许你在列中存储二进制数据。此类数据有时用于存储全局唯一标识符或少量加密数据。\n\
  \n> 注意\n> 在 Oracle Database 12c 之前，`RAW`列的最大大小为 2,000 字节。从 Oracle Database 12c 开始，你可以声明`RAW`的最大大小为\
  \ 32,767 字节。如果你有大量二进制数据要存储，请使用`BLOB`。\n\n如果你从`RAW`列中选择数据，SQL*Plus 会隐式地对检索到的数据应用内置的`RAWTOHEX`函数。数据以十六进制格式显示，使用字符\
  \ 0-9 和 A-F。当向`RAW`列插入数据时，会隐式应用内置的`HEXTORAW`。\n\n这很重要，因为如果你在`RAW`列上创建索引，优化器可能会忽略该索引，因为\
  \ SQL*Plus 在 SQL 引用`RAW`列的位置隐式地应用了函数。普通索引可能无用，而使用`RAWTOHEX`的基于函数的索引可能会带来显著的性能改进。\n\
  \n\n## ROWID\n当 DBA 听到 **ROWID** 这个词时，他们通常会想到为每一行提供的、包含该行在磁盘上物理位置的伪列；这是正确的。然而，许多\
  \ DBA 并未意识到 Oracle 支持一种实际的 `ROWID` 数据类型，这意味着你可以创建一个表，其列被定义为 `ROWID` 类型。\n\n`ROWID`\
  \ 数据类型有一些实际用途。一个有效的应用场景是，当你在尝试启用引用完整性约束遇到问题时，希望捕获违反约束的行的 `ROWID`。在这种情况下，你可以创建一个包含\
  \ `ROWID` 类型列的表，并在其中存储违规记录的 `ROWID`。这为你提供了一种捕获和解决违规数据问题的有效方法（有关详细信息，请参阅本章后面的“启用约束”一节）。\n\
  \n**提示**\n永远不要试图在表中使用 `ROWID` 数据类型以及行的 `ROWID` 作为主键值。这是因为表中行的 `ROWID` 可能会改变。例如，一个\
  \ `ALTER TABLE...MOVE` 命令可能会改变表中的每一个 `ROWID`。通常，表中行的主键值绝不应该改变。因此，不要使用 `ROWID` 作为主键值，而应使用序列生成的非有意义数字（有关进一步讨论，请参阅本章后面的“创建带有自增（标识）列的表”一节）。\n\
  \n## LOB\nOracle 支持通过 LOB 数据类型在列中存储大量数据。Oracle 支持以下类型的 LOB：\n\n*   `CLOB`\n*   `NCLOB`\n\
  *   `BLOB`\n*   `BFILE`\n\n#### 提示\n`LONG` 和 `LONG RAW` 数据类型已弃用，不应再使用。\n\n如果你的文本数据无法容纳在\
  \ `VARCHAR2` 的限制内，那么你应该使用 `CLOB` 来存储这些数据。`CLOB` 对于存储大量字符数据（例如日志文件）非常有用。`NCLOB` 与\
  \ `CLOB` 类似，但允许存储以数据库国家字符集编码的信息。\n`BLOB` 是大量通常不适合人类阅读的二进制数据。典型的 `BLOB` 数据包括图像、音频和视频文件。\n\
  `CLOB`、`NCLOB` 和 `BLOB` 被称为内部 LOB。这是因为它们存储在 Oracle 数据库内部。这些数据类型驻留在与数据库关联的数据文件中。\n\
  `BFILE` 被称为外部 LOB。`BFILE` 列存储指向数据库外部操作系统文件的指针。当无法将大型二进制文件存储在数据库中时，请使用 `BFILE`。`BFILE`\
  \ 不参与数据库事务，也不受 Oracle 安全或备份与恢复的保护。如果你需要这些功能，请使用 `BLOB` 而不是 `BFILE`。\n\n**提示**\n\
  有关 LOB 的完整讨论，请参见第 11 章。\n\n## JSON\n以前的 Oracle 版本有过程可以将表数据转换为 JSON 或将 JSON 读入数据库。现在，JSON\
  \ 可以通过 JSON 列放入数据库表中。不需要知道 JSON 数据的模式或任何其他详细信息，它可以与其他数据一起存储在表中，并使用 SQL 进行查询。\n\n\
  以下是一个创建带有 JSON 列的表示例：\n\n```sql\nSQL> CREATE TABLE dept\n(deptno     NUMBER(10)\n\
  ,dname      VARCHAR2(14 CHAR)\n,dprojects        VARCHAR2(32767)\nCONSTRAINT ensure_json\
  \ CHECK (dprojects is JSON));\n```\n\n可以使用 SQL `INSERT` 语句将 JSON 与其他列一起插入到列中，也可以使用\
  \ SQL 查询 JSON 数据。\n\n```sql\nSELECT dept.deptno, dept.dprojects.projectID, dept.dprojects.projectName\
  \ from dept;\n```\n\n这将从 JSON 数据中提取每个项目的 `projectID` 和 `projectName`。使用 JSON 当然还有更多内容，并且有程序包可以简化数据库中数据的处理。它允许提取和放入数据库的\
  \ JSON 数据 API。将 JSON 数据存储在列中，可以针对数据库运行简单查询以处理其他数据列。\n\n## 创建表\nOracle 的每个新版本都扩展了表的特性。试想一下：Oracle\
  \ 12c 版本的 *Oracle SQL 语言参考指南* 提供了超过 80 页与 `CREATE TABLE` 语句相关的语法。此外，`ALTER TABLE`\
  \ 语句又占用了 90 多页与表维护相关的详细信息。在大多数情况下，你通常只需要使用可用表选项的一小部分。\n\n以下是创建表时应考虑的一般因素：\n\n* \
  \  表类型（堆表、临时表、索引组织表、分区表等）\n*   命名约定\n*   列数据类型和长度\n*   约束（主键、外键等）\n*   索引要求（详见第\
  \ 8 章）\n*   初始存储要求\n*   特殊功能（虚拟列、只读、并行、压缩、无日志、不可见列等）\n*   增长需求\n*   表及其索引的表空间\n\n\
  在运行 `CREATE TABLE` 语句之前，你需要仔细考虑上一个列表中的每个项目。为此，DBA 通常使用数据建模工具来帮助管理用于创建数据库对象的 DDL\
  \ 脚本。数据建模工具允许你以可视化方式定义表、关系以及底层的数据库特性。\n\n### 创建堆表\n你使用 `CREATE TABLE` 语句来创建表，并指定列的名称、数据类型和长度。Oracle\
  \ 默认的表类型是堆表。术语“堆”意味着数据在表中不是按特定顺序存储的（相反，它们是一堆数据）。以下是一个创建堆表的简单示例：\n\n```sql\nSQL>\
  \ CREATE TABLE dept\n(deptno     NUMBER(10)\n,dname      VARCHAR2(14 CHAR)\n,loc\
  \        VARCHAR2(14 CHAR));\n```\n\n如果未指定表空间，则表将在创建该表的用户的默认永久表空间中创建。对于少数小型测试表，允许表在默认永久表空间中创建是可以的。对于更复杂的情况，你应该显式指定希望表创建在哪个表空间中。作为参考（在后续示例中），以下是两个示例表空间\
  \ `HR_DATA` 和 `HR_INDEX` 的创建脚本：\n\n```sql\nSQL> CREATE TABLESPACE hr_data\nDATAFILE\
  \ '/u01/dbfile/O18C/hr_data01.dbf' SIZE 1000m\nEXTENT MANAGEMENT LOCAL\nUNIFORM\
  \ SIZE 512k SEGMENT SPACE MANAGEMENT AUTO;\n--\nSQL> CREATE TABLESPACE hr_index\n\
  DATAFILE '/u01/dbfile/O18C/hr_index01.dbf' SIZE 100m\nEXTENT MANAGEMENT LOCAL\n\
  UNIFORM SIZE 512k SEGMENT SPACE MANAGEMENT AUTO;\n```\n\n通常，在创建表时，你还应指定约束，例如主键。以下代码显示了创建表时最常用的功能。此\
  \ DDL 定义了主键、外键、表空间信息和注释：\n\n\n\n## 数据库表设计指南与最佳实践\n\n### 建表 SQL 示例\n\n```sql\nSQL>\
  \ CREATE TABLE dept\n(deptno     NUMBER(10)\n,dname      VARCHAR2(14 CHAR)\n,loc\
  \        VARCHAR2(14 CHAR)\n,CONSTRAINT dept_pk PRIMARY KEY (deptno)\nUSING INDEX\
  \ TABLESPACE hr_index\n) TABLESPACE hr_data;\n--\nSQL> COMMENT ON TABLE dept IS\
  \ 'Department table';\n--\nSQL> CREATE UNIQUE INDEX dept_uk1 ON dept(dname)\nTABLESPACE\
  \ hr_index;\n--\nSQL> CREATE TABLE emp\n(empno      NUMBER(10)\n,ename      VARCHAR2(10\
  \ CHAR)\n,job        VARCHAR2(9 CHAR)\n,mgr        NUMBER(4)\n,hiredate   DATE\n\
  ,sal        NUMBER(7,2)\n,comm       NUMBER(7,2)\n,deptno     NUMBER(10)\n,CONSTRAINT\
  \ emp_pk PRIMARY KEY (empno)\nUSING INDEX TABLESPACE hr_index\n) TABLESPACE hr_data;\n\
  --\nSQL> COMMENT ON TABLE emp IS 'Employee table';\n--\nSQL> ALTER TABLE emp ADD\
  \ CONSTRAINT emp_fk1\nFOREIGN KEY (deptno)\nREFERENCES dept(deptno);\n--\nSQL> CREATE\
  \ INDEX emp_fk1 ON emp(deptno)\nTABLESPACE hr_index;\n```\n\n### 设计考虑\n\n创建表时，我通常不指定表级的物理空间属性。表会从创建它的表空间继承其空间属性。这简化了管理和维护。如果你有需要不同物理空间属性的表，那么可以创建独立的表空间来容纳具有不同需求的表。例如，你可以创建一个具有\
  \ 16MB 区大小的`HR_DATA_LARGE`表空间和一个具有 128KB 区大小的`HR_DATA_SMALL`表空间，并根据表的存储需求选择在何处创建表。有关创建表空间的详细信息，请参见第\
  \ 4 章。\n\n表 7-2 列出了一些指导原则，它们并非硬性规定；请根据你的环境需要调整。其中一些建议可能看起来显而易见。然而，在多年来继承了许多数据库之后，我见过每一条建议都以某种方式被违反，这使得数据库维护变得困难和笨拙。\n\
  \n**表 7-2 创建表时需考虑的指导原则**\n\n| 建议 | 理由 |\n| :--- | :--- |\n| 在命名表、列、约束、触发器、索引等时使用标准。\
  \ | 有助于记录应用程序并简化维护。 |\n| 如果列总是包含数字数据，请将其设为数字数据类型。 | 强制执行业务规则，并在使用 Oracle SQL 数学函数（对于字符“01”和数字“1”行为可能不同）时提供最大的灵活性、性能和一致性。\
  \ |\n| 如果你有定义数字字段长度和精度的业务规则，请强制执行；例如，`NUMBER(7,2)`。如果你没有业务规则，请使用`NUMBER(38)`。 |\
  \ 强制执行业务规则并保持数据整洁。 |\n| 对于可变长度的字符数据，使用`VARCHAR2`（而不是`VARCHAR`）。 | 遵循 Oracle 的建议，对字符数据使用`VARCHAR2`（而不是`VARCHAR`）。Oracle\
  \ 文档指出，未来`VARCHAR`将被重新定义为一个独立的数据类型。 |\n| 对于字符数据，在`CHAR`中指定大小；例如，`VARCHAR2(30 CHAR)`。\
  \ | 在处理多字节数据时，你将获得更可预测的结果，因为多字节字符通常存储在超过 1 个字节中。 |\n| 如果你有指定列最大长度的业务规则，请使用该长度，而不是将所有列都设为`VARCHAR2(4000)`。\
  \ | 强制执行业务规则并保持数据整洁。 |\n| 适当地使用`DATE`和`TIMESTAMP`数据类型。 | 强制执行业务规则，确保数据格式适当，并在使用\
  \ SQL 日期函数时提供最大的灵活性。 |\n| 为表和索引指定独立的表空间。让表和索引从表空间继承存储属性。 | 简化管理和维护。 |\n| 大多数表应创建主键。\
  \ | 强制执行业务规则，并允许你唯一标识每一行。 |\n| 创建一个数字代理键作为每个表的主键。使用代理键的标识列或序列来填充。 | 使连接更简单、更高效。\
  \ |\n| 脱线创建主键约束。 | 在创建主键时提供更大的灵活性，尤其是在主键由多列组成的情况下。 |\n| 为逻辑用户（可识别的列组合，使行独一无二）创建唯一键。\
  \ | 强制执行业务规则并保持数据整洁。 |\n| 为表和列创建注释。 | 有助于记录应用程序并简化维护。 |\n| 尽可能避免使用 LOB 数据类型。 | 防止与\
  \ LOB 列相关的维护问题，例如意外增长和复制时的性能问题。 |\n| 如果一个列应该总是有值，请使用`NOT NULL`约束来强制执行。 | 强制执行业务规则并保持数据整洁。\
  \ |\n| 创建审计类列，例如`CREATE_DTT`和`UPDATE_DTT`，这些列通过默认值或触发器或两者自动填充。 | 有助于维护和确定数据何时被插入或更新，或两者。其他类型的审计列包括插入和更新行的用户。\
  \ |\n| 在适当的地方使用检查约束。 | 强制执行业务规则并保持数据整洁。 |\n| 在适当的地方定义外键。 | 强制执行业务规则并保持数据整洁。 |\n\n\
  ### 实现虚拟列\n\n从 Oracle 数据库 11g 及更高版本开始，你可以在表定义中创建虚拟列。虚拟列基于同一表中的一个或多个现有列，或常量、SQL 函数和用户定义的\
  \ PL/SQL 函数的组合，或两者。虚拟列不存储在磁盘上；它们在运行时 SQL 查询执行时进行评估。虚拟列可以被索引并存储统计信息。\n\n在 Oracle\
  \ 数据库 11g 之前，你可以通过`SELECT`语句或视图定义来模拟虚拟列。例如，以下 SQL `SELECT`语句在查询执行时生成一个虚拟值：\n\n```sql\n\
  SQL> select inv_id, inv_count,\ncase when inv_count < 100 then 'GETTING LOW'\nwhen\
  \ inv_count = 100 then 'OKAY'\nend inv_status\nfrom inv;\n```\n\n为什么要使用虚拟列？这样做有以下优点：\n\
  *   你可以在虚拟列上创建索引；Oracle 在内部会创建一个基于函数的索引。\n*   你可以在虚拟列中存储统计信息，这些信息可被基于成本的优化器（CBO）使用。\n\
  *   虚拟列可以在`WHERE`子句中被引用。\n*   虚拟列在数据库中永久定义；这样的列只有一个中心定义。\n\n以下是一个创建包含虚拟列的表的示例：\n\
  \n```sql\nSQL> create table inv(\ninv_id number\n,inv_count number\n,inv_status\
  \ generated always as (\ncase when inv_count < 100 then 'GETTING LOW'\nwhen inv_count\
  \ = 100 then 'OKAY'\nend)\n);\n```\n\n在前面的代码清单中，指定`GENERATED ALWAYS`是可选的。例如，以下清单与前一个等效：\n\
  \n```sql\nSQL> create table inv(\ninv_id number\n,inv_count number\n,inv_status\
  \ as (\ncase when inv_count < 100 then 'GETTING LOW'\nwhen inv_count = 100 then\
  \ 'OKAY'\nend)\n);\n```\n\n我更喜欢添加`GENERATED ALWAYS`，因为它在我心中强化了该列始终是虚拟的这一概念。`GENERATED\
  \ ALWAYS`有助于内联记录你所做的操作。这对你之后长期维护的其他 DBA 有帮助。\n\n要查看虚拟列生成的值，首先向表中插入一些数据：\n\n```sql\n\
  SQL> insert into inv (inv_id, inv_count) values (1,99);\n```\n\n接下来，从表中选择以查看生成的值：\n\
  \n```sql\nSQL> select * from inv;\n```\n\n以下是一些示例输出：\n\n```\n    INV_ID  INV_COUNT\
  \ INV_STATUS\n---------- ---------- --------------------\n         1         99\
  \ GETTING LOW\n```\n\n> **注意**\n> 如果你向表中插入数据，在设置为`GENERATED ALWAYS AS`的列中不会存储任何内容。虚拟值在你从表中选择时生成。\n\
  \n你也可以修改表以包含一个虚拟列：\n\n\n\n## Oracle 数据库高级表特性\n\n### 虚拟列\n\n```\nSQL> alter table\
  \ inv add(\ninv_comm generated always as(inv_count * 0.1) virtual\n);\n```\n\n您可以修改现有虚拟列的定义：\n\
  \n```\nSQL> alter table inv modify inv_status generated always as(\ncase when inv_count\
  \ > 50 and inv_count < 200 then 'OKAY'\nend);\n```\n\n虚拟列可以在 SQL 查询（DML 或 DDL）中访问。例如，假设您想根据虚拟列的值更新一个永久列：\n\
  \n```\nSQL> update inv set inv_count=100 where inv_status='OKAY';\n```\n\n虚拟列本身无法通过\
  \ `UPDATE` 语句的 `SET` 子句进行更新。但是，您可以在 `UPDATE` 或 `DELETE` 语句的 `WHERE` 子句中引用虚拟列。\n\n\
  您可以选择性地指定虚拟列的数据类型。如果省略数据类型，Oracle 会从定义虚拟列的表达式中推导出数据类型。\n\n虚拟列有几个注意事项：\n\n*   只能在常规的堆组织表上定义虚拟列。无法在索引组织表、外部表、临时表、对象表或集群表上定义虚拟列。\n\
  *   虚拟列不能引用其他虚拟列。\n*   虚拟列只能引用其定义所在表中的列。\n*   虚拟列的输出必须是标量值（即单个值，而非值集合）。\n\n要查看虚拟列的定义，请使用\
  \ `DBMS_METADATA` 包来获取与表关联的 DDL。如果您在 SQL*Plus 中进行选择，需要将 `LONG` 变量设置为足够大的值以显示所有返回的数据：\n\
  \n```\nSQL> set long 10000;\nSQL> select dbms_metadata.get_ddl('TABLE','INV') from\
  \ dual;\n```\n\n以下是输出片段：\n\n```\nSQL> CREATE TABLE \"INV_MGMT\".\"INV\"\n(    \"\
  INV_ID\" NUMBER,\n\"INV_COUNT\" NUMBER,\n\"INV_STATUS\" VARCHAR2(11) GENERATED ALWAYS\
  \ AS (CASE  WHEN \"INV_COUNT\">50 AND \"INV_COUNT\"<200 THEN 'OKAY' END) VIRTUAL\
  \ ...\n```\n\n## 实现不可见列\n\n从 Oracle Database 12c 开始，您可以创建不可见列。当列不可见时，无法通过以下方式查看：\n\
  \n*   `DESCRIBE` 命令\n*   `SELECT *` （用于访问表的所有列）\n*   PL/SQL 中的 `%ROWTYPE`\n*   Oracle\
  \ 调用接口 (OCI) 内的描述\n\n但是，如果在 `SELECT` 子句中显式指定或在 DML 语句（`INSERT`、`UPDATE`、`DELETE`\
  \ 或 `MERGE`）中直接引用，仍然可以访问该列。不可见列也可以像可见列一样被索引。\n\n不可见列的主要用途是确保向表中添加列不会破坏任何现有的应用程序代码。如果应用程序代码没有显式访问不可见列，那么对于应用程序来说，就好像该列不存在一样。\n\
  \n可以创建包含不可见列的表，也可以添加或更改列使其不可见。定义为不可见的列也可以更改为可见。以下是创建包含不可见列的表的示例：\n\n```\nSQL> create\
  \ table inv\n(inv_id     number\n,inv_desc   varchar2(30 char)\n,inv_profit number\
  \ invisible);\n```\n\n现在，当描述该表时，请注意不可见列不会显示：\n\n```\nSQL> desc inv\nName       \
  \                        Null?    Type\n---------------------------------- --------\
  \ ----------------------------\nINV_ID                                      NUMBER\n\
  INV_DESC                                    VARCHAR2(30 CHAR)\n```\n\n定义为不可见的列，如果在\
  \ `SELECT` 语句或任何 DML 操作中直接指定，仍然可以访问。例如，从表中选择时，可以通过在 `SELECT` 子句中指定它来查看不可见列：\n\n\
  ```\nSQL> select inv_id, inv_desc, inv_profit from inv;\n```\n\n注意：创建包含不可见列的表时，至少必须有一个可见列。\n\
  \n### 创建只读表\n\n您可以将单个表置于只读模式。这样做可以防止任何 `INSERT`、`UPDATE` 或 `DELETE` 语句在表上运行。另一种方法是将表空间设为只读，并将此表用于静态的只读表。\n\
  \n在表级别需要只读功能有几个原因：\n\n*   表中的数据是历史数据，在正常情况下永远不应更新。\n*   您正在对表执行某些维护，并希望确保在更新过程中表不会发生变化。\n\
  *   您想要删除该表，但在删除之前，希望更好地确定是否有任何用户试图更新该表。\n\n使用 `ALTER TABLE` 语句将表置于只读模式：\n\n```\n\
  SQL> alter table inv read only;\n```\n\n您可以通过执行以下查询来验证只读表的状态：\n\n```\nSQL> select\
  \ table_name, read_only from user_tables where read_only='YES';\n```\n\n要将只读表修改为读写模式，请执行以下\
  \ SQL：\n\n```\nSQL> alter table inv read write ;\n```\n\n注意：只读表功能要求数据库初始化参数 `COMPATIBLE`\
  \ 设置为 11.1.0 或更高。\n\n### 理解延迟段创建\n\n从 Oracle Database 11g Release 2 开始，当您创建表时，关联段的创建会延迟到向表中插入第一行时进行。这个特性有一些有趣的影响。例如，如果您最初为应用程序创建数千个对象（例如首次安装时），在向应用程序表插入数据之前，任何表（或关联索引）都不会消耗空间。这意味着创建表时初始\
  \ DDL 运行速度更快，但第一条 `INSERT` 语句运行速度稍慢。\n\n为了说明延迟段的概念，首先创建一个表：\n\n```\nSQL> create\
  \ table inv(inv_id number, inv_desc varchar2(30 CHAR));\n```\n\n您可以通过检查 `USER_TABLES`\
  \ 来验证表是否已创建：\n\n```\nSQL> select\ntable_name\n,segment_created\nfrom user_tables\n\
  where table_name='INV';\n```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                  \
  \   SEG\n------------------------------ ---\nINV                            NO\n\
  ```\n\n接下来，查询 `USER_SEGMENTS` 以验证是否尚未为表分配段：\n\n```\nSQL> select\nsegment_name\n\
  ,segment_type\n,bytes\nfrom user_segments\nwhere segment_name='INV'\nand segment_type='TABLE';\n\
  ```\n\n此示例的相应输出为：\n\n```\nno rows selected\n```\n\n现在，向表中插入一行：\n\n```\nSQL> insert\
  \ into inv values(1,'BOOK');\n```\n\n重新运行查询，从 `USER_SEGMENTS` 中选择，并注意已创建段：\n\n```\n\
  SEGMENT_NAME    SEGMENT_TYPE            BYTES\n--------------- ------------------\
  \ ----------\nINV             TABLE                   65536\n```\n\n如果您习惯于使用旧版本的\
  \ Oracle，延迟段创建特性可能会导致混淆。例如，如果您有查询 `DBA_SEGMENTS` 或 `DBA_EXTENTS` 的与空间相关的监控报告，请注意，在向表插入第一行之前，这些视图不会填充表或与表关联的任何索引的信息。\n\
  \n注意：您可以通过将数据库初始化参数 `DEFERRED_SEGMENT_CREATION` 设置为 `FALSE` 来禁用延迟段创建功能。此参数的默认值为\
  \ `TRUE`。\n\n### 创建具有自增（Identity）列的表\n\n从 Oracle Database 12c 开始，您可以定义一个在插入数据时自动填充并递增的列。此功能非常适合自动填充主键列。\n\
  \n\n\n## Oracle 数据库中的自增列（Identity Columns）\n\n### 介绍\n在 Oracle Database 12c 之前，您必须手动创建序列（sequence），然后在插入表数据时引用该序列。有时，数据库管理员（DBA）会在表上创建触发器（trigger），以模拟基于序列的自增列（详见第\
  \ 9 章）。\n\n### 使用 `GENERATED AS IDENTITY` 子句\n您可以使用 `GENERATED AS IDENTITY` 子句来定义一个自增（identity）列。此示例创建了一个表，其主键列将自动填充并递增：\n\
  \n```\nSQL> create table inv(\ninv_id number generated as identity\n,inv_desc varchar2(30\
  \ char));\n--\nSQL> alter table inv add constraint inv_pk primary key (inv_id);\n\
  ```\n\n现在，您无需指定主键值即可填充表：\n\n```\nSQL> insert into inv (inv_desc) values ('Book');\n\
  SQL> insert into inv (inv_desc) values ('Table');\n```\n\n从表中查询显示，`INV_ID` 列已被自动填充：\n\
  \n```\nSQL> select * from inv;\n```\n\n以下是此示例的样本输出：\n\n```\nINV_ID INV_DESC\n----------\
  \ ------------------------------\n1 Book\n2 Table\n```\n\n### 底层机制\n当您创建一个身份列时，Oracle\
  \ 会自动创建一个序列（sequence）并将该序列与列关联。您可以在 `USER_SEQUENCES` 中查看序列信息：\n\n```\nSQL> select\
  \ sequence_name, min_value, increment_by from user_sequences;\n```\n\n以下是此示例的样本输出：\n\
  \n```\nSEQUENCE_NAME         MIN_VALUE INCREMENT_BY\n-------------------- ----------\
  \ ------------\nISEQ$$_43216                  1            1\n```\n\n您可以通过以下查询来识别身份列：\n\
  \n```\nSQL> select table_name, identity_column\nfrom user_tab_columns\nwhere identity_column='YES';\n\
  ```\n\n### 插入行为与注意事项\n当您创建一个带有身份列的表时（如前面的示例），您不能直接为身份列指定值。例如，如果您尝试：\n\n```\nSQL>\
  \ insert into inv values(3,'Chair');\n```\n\n您将收到错误：\n\n```\nORA-32795: cannot insert\
  \ into a generated always identity column\n```\n\n如果出于某种原因，您需要偶尔向身份列插入值，那么在创建表时请使用以下语法：\n\
  \n```\nSQL> create table inv(\ninv_id number generated by default on null as identity\n\
  ,inv_desc varchar2(30 char));\n```\n\n### 自定义序列\n由于填充身份列的底层机制是一个序列，因此您可以控制序列的创建方式（就像手动创建序列一样）。例如，您可以指定序列的起始数字以及每次递增的量。此示例指定底层序列从数字\
  \ 50 开始，每次递增 2：\n\n```\nSQL> create table inv(\ninv_id number generated as identity\
  \ (start with 50 increment by 2)\n,inv_desc varchar2(30 char));\n```\n\n### 使用自增列的注意事项\n\
  使用自增（identity）列时，需要注意以下几点：\n\n*   每个表只允许一个自增列。\n*   它们必须是数值类型。\n*   它们不能有默认值。\n\
  *   `NOT NULL` 和 `NOT DEFERRABLE` 约束会被隐式应用。\n*   `CREATE TABLE ... AS SELECT` 不会继承身份列属性。\n\
  \n同时请记住，在向自增列插入数据后，如果您执行回滚（rollback），事务会被回滚，但来自序列的自增值不会回滚。这是序列的预期行为。您可以回滚这样的插入操作，但序列值一旦被使用就会消耗掉。\n\
  \n> **提示**\n> 有关如何管理序列的详细信息，请参阅第 9 章。\n\n## 允许默认并行 SQL 执行\n如果您处理大型表，可以考虑将表创建为 `PARALLEL`。这指示\
  \ Oracle 为查询以及后续的 `INSERT`、`UPDATE`、`DELETE`、`MERGE` 和查询语句设置并行度。此示例创建了一个 `PARALLEL`\
  \ 子句为 `2` 的表：\n\n```\nSQL> create table inv\n(inv_id     number,\ninv_desc   varchar2(30\
  \ char),\ncreate_dtt date default sysdate)\nparallel 2;\n```\n\n\n\n您可以指定 `PARALLEL`、`NOPARALLEL`\
  \ 或 `PARALLEL N`。如果您未指定 `N`，Oracle 将根据 `PARALLEL_THREADS_PER_CPU` 初始化参数设置并行度。您可以通过此查询验证并行度：\n\
  \n```\nSQL> select table_name, degree from user_tables;\n```\n\n这里需要注意的主要问题是，如果表创建时使用了默认的并行度，任何后续的查询都将使用并行线程执行。您可能会疑惑为什么某个查询或\
  \ DML 语句会在未显式调用并行操作的情况下并行执行。\n\n### 这些 P_0 进程是从哪里来的？\n\n有一次，我接到一个生产支持人员的电话，他报告说由于\
  \ `ORA-00020 maximum number of processes` 错误，没有人能连接到数据库。我登录到服务器，注意到有数百个 `ora_p`\
  \ 并行查询进程正在运行。\n\n我不得不手动终止一些进程，以便能够连接到数据库。经过进一步检查，我将这些并行查询会话追踪到一条 SQL 语句和一个表。在这个案例中，该表创建时设置了默认并行度为\
  \ 64（别问我为什么），这反过来在查询该表时产生了数百个进程和会话。这达到了数据库允许的最大连接数，并导致了问题。可以通过将并行设置为 `NOPARALLEL`\
  \ 或 1 来解决此问题。此外，资源管理器也会限制允许的连接数。\n\n您也可以修改表来更改其默认并行度：\n\n```\nSQL> alter table inv\
  \ parallel 1;\n```\n\n从 Oracle 18c 开始，资源参数 `PQ_TIMEOUT_ACTION` 可用于超时不活动的并行查询。这将允许高优先级的并行查询获得执行所需的资源。还有一种更简单的方法来取消失控的\
  \ SQL，而无需使用 `ALTER SYSTEM CANCEL SQL` 语句手动终止进程。\n\n**提示**：请记住，`PARALLEL_THREADS_PER_CPU`\
  \ 是平台相关的，并且在开发环境和生产环境之间可能有所不同。因此，如果您未指定并行度，并行操作的行为可能会因环境而异。\n\n## 压缩表数据\n\n随着数据库的增长，您可能需要考虑表级压缩。压缩数据的好处是使用更少的磁盘空间和内存，并减少\
  \ I/O。读取压缩数据的查询可能运行得更快，因为需要处理的块更少。但是，在写入和读取发生时，由于数据被压缩和解压缩，CPU 使用率会增加，因此需要权衡取舍。\n\
  \n从 Oracle Database 12c 开始，有四种可用的压缩类型：\n\n*   基本压缩\n*   高级行压缩（以前称为 OLTP 压缩）\n* \
  \  数据仓库压缩（混合列压缩）\n*   归档压缩（混合列压缩）\n\n基本压缩通过 `COMPRESS` 或 `COMPRESS BASIC` 子句启用（它们是同义的）。此示例创建一个使用基本压缩的表：\n\
  \n```\nSQL> create table inv\n(inv_id     number,\ninv_desc   varchar2(300 char),\n\
  create_dtt timestamp)\ncompress basic;\n```\n\n基本压缩在数据直接路径插入表时提供压缩。默认情况下，使用 `COMPRESS\
  \ BASIC` 创建的表的 `PCTFREE` 设置为 0。您可以在创建表时指定 `PCTFREE` 来覆盖此设置。\n\n**注意**：基本压缩需要 Oracle\
  \ 企业版，但不需要额外许可。其他类型的压缩是数据库的额外许可选项。与数据库选项一样，需要评估存储成本和压缩比，以提供此选项的正确成本分析。\n\n高级行压缩通过\
  \ `ROW STORE COMPRESS ADVANCED` 子句启用：\n\n```\nSQL> create table inv\n(inv_id   \
  \  number,\ninv_desc   varchar2(300 char),\ncreate_dtt timestamp)\nrow store compress\
  \ advanced;\n```\n\n高级行压缩在最初将数据插入表中以及任何后续 DML 操作时提供压缩。您可以通过以下 `SELECT` 语句验证表的压缩情况：\n\
  \n```\nSQL> select table_name, compression, compress_for\nfrom user_tables\nwhere\
  \ table_name='INV';\n```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME           COMPRESS COMPRESS_FOR\n\
  -------------------- -------- ------------------------------\nINV              \
  \    ENABLED  ADVANCED\n```\n\n**注意**：OLTP 表压缩是 Oracle 高级压缩选项的一项功能。此选项需要从 Oracle\
  \ 获得额外许可，并且仅在 Oracle 企业版中可用。\n\n您也可以使用压缩子句创建表空间。在该表空间中创建的任何表都将继承表空间的压缩设置。例如，以下是如何为表空间设置默认压缩级别：\n\
  \n```\nSQL> CREATE TABLESPACE hr_data\nDEFAULT ROW STORE COMPRESS ADVANCED\nDATAFILE\
  \ '/u01/dbfile/O12C/hr_data01.dbf' SIZE 100m\nEXTENT MANAGEMENT LOCAL\nUNIFORM SIZE\
  \ 512k SEGMENT SPACE MANAGEMENT AUTO;\n```\n\n如果有一个已存在的表，您可以修改它以允许压缩（基本或高级）：\n\n\
  ```\nSQL> alter table inv row store compress advanced;\n```\n\n**注意**：Oracle 不支持对超过\
  \ 255 列的表进行压缩。\n\n修改为允许压缩并不会压缩表中的现有数据。您需要使用 Data Pump 重建表或移动表，以压缩启用压缩之前存在于其中的数据：\n\
  \n```\nSQL> alter table inv move;\n```\n\n**注意**：如果您移动了表，那么您还需要重建任何相关的索引。\n\n您可以通过\
  \ `NOCOMPRESS` 子句禁用压缩。这不会影响表中现有的数据。相反，它会影响未来的插入（基本和高级行压缩）和未来的 DML（高级行压缩）；例如：\n\n\
  ```\nSQL> alter table inv nocompress;\n```\n\nOracle 还具有仓库和归档混合列压缩功能，当使用某些类型的存储（如\
  \ Exadata）时可用。这种类型的压缩通过 `COLUMN STORE COMPRESS FOR QUERY LOW|HIGH` 或 `COLUMN STORE\
  \ COMPRESS FOR ARCHIVE LOW|HIGH` 子句启用。有关此类压缩的更多详细信息，请参阅 Oracle 技术网络网站 ([`http://otn.oracle.com`](http://otn.oracle.com))。\n\
  \n## 避免重做日志生成\n\n在创建表时，您可以选择指定 `NOLOGGING` 子句。`NOLOGGING` 功能可以显著减少某些类型操作的重做日志生成量。有时，当您处理大量数据时，出于性能原因，在最初创建表并将数据插入表中时减少重做日志生成是可取的。\n\
  \n消除重做日志生成的缺点是，在数据加载后（并且在您能够备份表之前）发生故障的情况下，您无法通过 `NOLOGGING` 恢复创建的数据。如果您能容忍一定的数据丢失风险，那么可以使用\
  \ `NOLOGGING`，但在数据加载后应尽快备份表。如果您的数据至关重要，请不要使用 `NOLOGGING`。如果您的数据可以轻松重新创建，那么 `NOLOGGING`\
  \ 在尝试提高大型数据加载的性能时是可取的。\n\n一种看法是 `NOLOGGING` 会消除表上所有 DML 操作的重做日志生成。这是不正确的。`NOLOGGING`\
  \ 功能从不影响常规 DML 语句（普通的 `INSERT`、`UPDATE` 和 `DELETE`）的重做日志生成。\n\n`NOLOGGING` 功能可以显著减少以下类型操作的重做日志生成：\n\
  \n*   SQL*Loader 直接路径加载\n*   直接路径 `INSERT /*+ append */`\n*   `CREATE TABLE AS SELECT`\n\
  *   `ALTER TABLE MOVE`\n*   创建或重建索引\n\n\n### NOLOGGING 注意事项与使用级别\n\n使用 `NOLOGGING`\
  \ 时需要注意一些特性（或称为“功能”）。如果你的数据库处于 `FORCE LOGGING` 模式，那么所有操作都会生成重做日志，无论你是否指定了 `NOLOGGING`。同样地，当你加载一个表时，如果该表定义了引用外键约束，那么无论是否指定\
  \ `NOLOGGING`，都会生成重做日志。\n\n你可以在以下级别之一指定 `NOLOGGING`：\n\n*   语句级\n*   `CREATE TABLE`\
  \ 或 `ALTER TABLE`\n*   `CREATE TABLESPACE` 或 `ALTER TABLESPACE`\n\n我倾向于在语句或表级别指定\
  \ `NOLOGGING` 子句。在这些场景下，执行语句或 DDL 的 DBA 很明显知道使用了 `NOLOGGING`。如果你在表空间级别指定 `NOLOGGING`，那么在该表空间内创建对象的每个\
  \ DBA 都必须了解这个表空间级别的设置。在有多个 DBA 的团队中，很容易出现一个 DBA 不知道另一个 DBA 已创建了一个带有 `NOLOGGING`\
  \ 的表空间。\n\n### 在创建表时使用 NOLOGGING\n\n以下示例首先创建一个带有 `NOLOGGING` 选项的表：\n```\nSQL> create\
  \ table inv(inv_id number)\ntablespace users\nnologging;\n```\n\n接下来，使用一些测试数据进行直接路径插入，并提交数据：\n\
  ```\nSQL> insert /*+ append */ into inv select level from dual\nconnect by level\
  \ <= 10000; commit;\n```\n\n#### NOLOGGING 模式下的恢复场景\n\n如果你在以 `NOLOGGING` 模式填充表之后（并且在备份该表之前）发生介质故障，会发生什么？在恢复和还原操作之后，表看起来可能已被还原：\n\
  ```\nSQL> desc inv\nName                               Null?    Type\n----------------------------------\
  \ -------- ----------------------------\nINV_ID                                \
  \      NUMBER\n```\n\n但是，尝试执行一个扫描表中所有数据块的查询：\n```\nSQL> select * from inv;\n```\n\
  \n这里会抛出一个错误，指示数据文件中存在逻辑损坏：\n```\nORA-01578: ORACLE data block corrupted (file #\
  \ 5, block # 203)\nORA-01110: data file 5: '/u01/dbfile/O18C/users01.dbf'\nORA-26040:\
  \ Data block was loaded using the NOLOGGING option\n```\n\n换句话说，数据是不可恢复的，因为没有重做日志来还原它们。再次强调，`NOLOGGING`\
  \ 选项适用于那些可以轻松重新生成的大批量数据加载场景，尤其是在 `NOLOGGING` 操作之后、备份数据库之前发生故障的情况。\n\n#### NOLOGGING\
  \ 设置的优先级\n\n如果你在语句级别指定了日志子句，它会覆盖任何表或表空间设置。如果你在表级别指定了日志子句，它会为任何未指定日志子句的语句设置默认模式，并覆盖表空间的日志设置。如果你在表空间级别指定了日志子句，它会为任何未指定日志子句的\
  \ `CREATE TABLE` 语句设置默认日志记录方式。\n\n#### 验证日志记录模式\n\n你可以通过以下方式验证数据库的日志模式：\n```\nSQL>\
  \ select name, log_mode, force_logging from v$database;\n```\n\n下一个语句验证表空间的日志模式：\n\
  ```\nSQL> select tablespace_name, logging from dba_tablespaces;\n```\n\n并且，此示例验证表的日志模式：\n\
  ```\nSQL> select owner, table_name, logging from dba_tables where logging = 'NO';\n\
  ```\n\n#### 查看 NOLOGGING 的效果\n\n你可以通过几种不同的方式查看 `NOLOGGING` 的效果。一种是启用带有统计信息的自动跟踪，并查看重做日志大小：\n\
  ```\nSQL> set autotrace trace statistics;\n```\n\n然后，运行一个直接路径 `INSERT` 语句，并查看重做大小统计信息：\n\
  ```\ninsert /*+ append */ into inv select level from dual\nconnect by level <= 10000;\n\
  ```\n\n这是输出片段：\n```\nStatistics\n----------------------------------------------------------\n\
  \          0  recursive calls\n          0  db block gets\n        109  consistent\
  \ gets\n          0  physical reads\n      13772  redo size\n...\n```\n\n禁用日志记录后，对于直接路径操作，你应该会看到比常规\
  \ `INSERT` 语句小得多的重做大小数字，例如：\n```\nSQL> insert into inv select level from dual\n\
  connect by level <= 10000;\n```\n\n这是部分输出，表明重做大小要大得多：\n```\nStatistics\n----------------------------------------------------------\n\
  \          0  recursive calls\n        108  db block gets\n     28479  consistent\
  \ gets\n          0  physical reads\n     159152  redo size\n...\n```\n\n确定 `NOLOGGING`\
  \ 效果的另一种方法是，测量启用日志记录和在 `NOLOGGING` 模式下操作所生成的重做日志量。如果你有一个可以进行测试的开发环境，你可以监控在操作进行时重做日志切换的频率。另一个简单的测试是计时操作在有日志记录和没有日志记录的情况下分别需要多长时间。在\
  \ `NOLOGGING` 模式下执行的操作应该更快（因为只生成了最少量的重做日志）。\n\n## 基于查询创建表 (CTAS)\n\n有时，基于现有表的定义创建表是很方便的。例如，假设你想在修改表的结构或数据之前快速创建一个表的备份。使用\
  \ `CREATE TABLE AS SELECT` 语句（CTAS）来实现这一点；例如：\n```\ncreate table inv_backup\nas\
  \ select * from inv;\n```\n\n前面的语句创建了一个完全相同的表，包含所有数据。如果你不想要包含数据——你只想复制表的结构——那么提供一个永远评估为假的\
  \ `WHERE` 子句（在这个例子中，1 永远不等于 2）：\n```\nSQL> create table inv_empty\nas select * from\
  \ inv\nwhere 1=2;\n```\n\n你也可以在创建 CTAS 表时指定不记录重做日志。对于大型数据集，这可以减少创建表所需的时间：\n```\n\
  SQL> create table inv_backup\nnologging\nas select * from inv;\n```\n\n请注意，使用带有\
  \ `NOLOGGING` 子句的 CTAS 技术会将表创建为 `NOLOGGING`，并且不会生成作为 `SELECT` 语句结果填充表的数据恢复所需的重做日志。此外，如果创建\
  \ CTAS 表的表空间被定义为 `NOLOGGING`，则不会生成重做日志。在这些场景中，如果你在能够备份表之前发生故障，你将无法恢复和还原你的表。如果你的数据至关重要，请不要使用\
  \ `NOLOGGING` 子句。\n\n你也可以指定并行度和存储参数。根据 CPU 的数量，你可能会看到一些性能提升：\n```\nSQL> create table\
  \ inv_backup\nnologging\ntablespace hr_data\nparallel 2\nas select * from inv;\n\
  ```\n\n> **注意**\n> CTAS 技术不会创建任何索引、约束或触发器。如果你需要原始表中的这些对象，必须单独创建索引和触发器。\n\n## 启用\
  \ DDL 日志记录\n\nOracle 允许你将 DDL 语句的日志记录到一个日志文件中。这种类型的日志记录通过 `ENABLE_DDL_LOGGING` 参数（默认为\
  \ `FALSE`）开启。你可以在会话或系统级别设置此参数。此功能为你提供了关于已发出哪些 DDL 语句以及它们何时运行的审计跟踪。以下是在系统级别设置此参数的示例：\n\
  ```\nSQL> alter system set enable_ddl_logging=true scope=both;\n```\n\n将此参数设置为 `TRUE`\
  \ 后，DDL 语句将被记录到日志文件中。Oracle 不会记录每种类型的 DDL 语句，只将最常见的类型记录到日志文件中。DDL 日志文件的确切位置和文件数量因数据库版本而异。可以通过此查询确定此文件的位置（目录路径）：\n\
  ```\nSQL> select value from v$diag_info where name='Diag Alert';\nVALUE\n--------------------------------------------------------------------------------\n\
  /ora01/app/oracle/diag/rdbms/o18c/O18C/alert\n```\n\n根据审计的类型，有多个文件捕获 DDL 日志记录。要找到这些文件，首先确定你的诊断主目录位置：\n\
  ```\nSQL> select value from v$diag_info where name='ADR Home';\nVALUE\n--------------------------------------------------------------------------------\n\
  /ora01/app/oracle/diag/rdbms/o18c/O18C\n```\n\n现在，将你当前的工作目录更改为前面的目录和 `log` 子目录；例如：\n\
  ```\n$ cd /ora01/app/oracle/diag/rdbms/o18c/O18C/log\n```\n\n\n## 修改表\n\n在此目录中，将有一个格式为\
  \ `ddl_<SID>.log` 的文件。\n该文件记录了启用 DDL 日志后所发出的 DDL 语句。您也可以在 `log.xml` 文件中查看 DDL 日志。该文件位于之前提到的\
  \ `log` 目录下的 `ddl` 子目录中；例如，\n\n```\n$ cd /ora01/app/oracle/diag/rdbms/o18c/O18C/log/ddl\n\
  ```\n\n导航到前述目录后，您可以使用 `vi` 等操作系统实用程序查看 `log.xml` 文件。\n\n## 修改表\n\n修改表是一项常见的任务。新的需求通常意味着您需要重命名、添加、删除或更改列的数据类型。在开发环境中，更改表可能是一项微不足道的任务：您通常不需要处理大量数据或数百个用户同时访问一个表。然而，对于活跃的生产系统，您需要理解尝试更改当前正在访问或已填充数据的表所带来的影响。\n\
  \n### 获取所需锁\n\n当您修改表时，必须对该表持有排他锁。一个问题是，如果某个 DML 事务已持有该表的锁，您就无法更改它。在这种情况下，您会收到此错误：\n\
  \n```\nORA-00054: resource busy and acquire with NOWAIT specified or timeout expired\n\
  ```\n\n前面的错误消息有些令人困惑，因为它让您认为可以通过使用 `NOWAIT` 获取锁来解决此问题。然而，这是一个通用消息，在您发出的 DDL 无法获得表的排他锁时生成。在这种情况下，您有几个选项：\n\
  \n*   发出 DDL 命令并收到 `ORA-00054` 错误后，快速反复按斜杠键（`/`），希望能在事务间隙修改表。\n*   等待维护窗口来安排更改表，以免锁住用户。关闭数据库并以受限模式启动，修改表，然后打开数据库供正常使用。\n\
  *   设置 `DDL_LOCK_TIMEOUT` 参数。\n\n前面列表中的最后一项指示 Oracle 反复尝试运行 DDL 语句，直到获得表上的所需锁。您可以在系统或会话级别设置\
  \ `DDL_LOCK_TIMEOUT` 参数。下面的示例指示 Oracle 反复尝试获取锁 100 秒：\n\n```\nSQL> alter session\
  \ set ddl_lock_timeout=100;\n```\n\n系统级别 `DDL_LOCK_TIMEOUT` 初始化参数的默认值为 `0`。如果您想修改系统中每个会话的默认行为，请发出\
  \ `ALTER SYSTEM SET` 语句。以下命令将系统默认超时值设置为 10 秒：\n\n```\nSQL> alter system set ddl_lock_timeout=10\
  \ scope=both;\n```\n\n> **注意**\n> 使用 `DBMS_REDEFINITION` 包进行在线表操作，允许更改列类型、名称、大小等，以及重命名表。使用此包还可以进行在线操作，而无需中断数据库用户来实施其他选项。这也是在进行切换前验证新过程和表更改的好方法。\n\
  \n### 重命名表\n\n重命名表有几个原因：\n\n*   使表符合标准。\n*   在删除表之前更好地确定它是否正在被使用。\n\n此示例将表从 `INV`\
  \ 重命名为 `INV_OLD`：\n\n```\nSQL> rename inv to inv_old;\n```\n\n如果成功，您应该会看到此消息：\n\n\
  ```\nTable renamed.\n```\n\n### 添加列\n\n使用 `ALTER TABLE ... ADD` 语句向表中添加列。此示例向 `INV`\
  \ 表添加一列：\n\n```\nSQL> alter table inv add(inv_count number);\n```\n\n如果成功，您应该会看到此消息：\n\
  \n```\nTable altered.\n```\n\n### 修改列\n\n有时，您需要修改列以调整其大小或更改其数据类型。使用 `ALTER TABLE\
  \ ... MODIFY` 语句调整列的大小。此示例将列的大小更改为 256 个字符：\n\n```\nSQL> alter table inv modify\
  \ inv_desc varchar2(256 char);\n```\n\n如果减小列的大小，请首先确保不存在大于减小后大小的值：\n\n```\nSQL>\
  \ select max(length(<column_name>)) from <table_name>;\n```\n\n当您将列更改为 `NOT NULL`\
  \ 时，每列都必须有有效值。首先，验证没有 `NULL` 值：\n\n```\nSQL> select <column_name> from <table_name>\
  \ where <column_name> is null;\n```\n\n如果您要修改为 `NOT NULL` 的列的任何行具有 `NULL` 值，则必须首先更新该列以包含一个值。以下是修改列为\
  \ `NOT NULL` 的示例：\n\n```\nSQL> alter table inv modify(inv_desc not null);\n```\n\
  \n您还可以修改列以具有默认值。每当向表插入记录但未为列提供值时，都会使用默认值：\n\n```\nSQL> alter table inv modify(inv_desc\
  \ default 'No Desc');\n```\n\n如果想删除列的默认值，请将其设置为 `NULL`：\n\n```\nSQL> alter table\
  \ inv modify(inv_desc default NULL);\n```\n\n有时，您需要更改表的数据类型；例如，原本错误地定义为 `VARCHAR2`\
  \ 的列需要更改为 `NUMBER`。在更改列的数据类型之前，首先验证现有列的所有值是否为有效的数字值。以下是一个简单的 PL/SQL 脚本：\n\n```\n\
  SQL> create or replace function isnum(v_in varchar2)\nreturn varchar is\nval_err\
  \ exception;\npragma exception_init(val_err, -6502); -- char to num conv. error\n\
  scrub_num number;\nbegin\nscrub_num := to_number(v_in);\nreturn 'Y';\nexception\
  \ when val_err then\nreturn 'N';\nend;\n/\n```\n\n您可以使用 `ISNUM` 函数来检测列中的数据是否为数字。该函数定义了一个\
  \ PL/SQL 编译指示异常，用于处理 `ORA-06502` 字符到数字的转换错误。当遇到此错误时，异常处理器会捕获它并返回 `N`。如果传递给 `ISNUM`\
  \ 函数的值是数字，则返回 `Y`。如果该值无法转换为数字，则返回 `N`。以下是一个演示前述概念的简单示例：\n\n```\nSQL> create table\
  \ stage(hold_col varchar2(30));\nSQL> insert into stage values(1);\nSQL> insert\
  \ into stage values('x');\nSQL> select hold_col from stage where isnum(hold_col)='N';\n\
  HOLD_COL\n------------------------------\nx\n```\n\n同样，当您将字符列修改为 `DATE` 或 `TIMESTAMP`\
  \ 数据类型时，最好先检查数据是否可以成功转换。以下是一个执行此操作的函数：\n\n```\nSQL> create or replace function isdate(p_in\
  \ varchar2, f_in varchar2)\nreturn varchar is\nscrub_dt date;\nbegin\nscrub_dt :=\
  \ to_date(p_in, f_in);\nreturn 'Y';\nexception when others then\nreturn 'N';\nend;\n\
  /\n```\n\n当您调用 `ISDATE` 函数时，需要传递一个有效的日期格式掩码，例如 `YYYYMMDD`。以下是一个演示前述概念的简单示例：\n\n\
  ```\nSQL> create table stage2 (hold_col varchar2(30));\nSQL> insert into stage2\
  \ values('20130103');\nSQL> insert into stage2 values('03-JAN-13');\nSQL> select\
  \ hold_col from stage2 where isdate(hold_col,'YYYYMMDD')='N';\nHOLD_COL\n------------------------------\n\
  03-JAN-13\n```\n\n### 重命名列\n\n重命名列有几个原因：\n\n*   有时需求会变化，您可能希望修改列名以更好地反映该列的用途。\n\
  *   如果您计划删除列，先重命名该列有助于更好地确定是否有用户或应用程序正在访问它。\n\n使用 `ALTER TABLE ... RENAME` 语句重命名列：\n\
  \n```\nSQL> alter table inv rename column inv_count to inv_amt;\n```\n\n\n\n## 丢弃列\n\
  表有时会包含从未使用过的列。这可能是由于最初的需求发生了变化或不够准确。如果表中包含未使用的列，应考虑将其丢弃。如果保留未使用的列，可能会导致未来的数据库管理员不清楚该列的用途，并且该列可能会不必要地消耗空间。\n\
  \n在丢弃列之前，建议先对其进行重命名。这样可以有机会确定是否有任何用户或应用程序正在使用该列。当确信该列未被使用后，首先使用数据泵导出工具备份表，然后再丢弃该列。这些策略为您提供了补救选项，以防在丢弃列后又发现需要它。\n\
  \n要丢弃列，请使用`ALTER TABLE ... DROP`语句：\n```sql\nSQL> alter table inv drop (inv_name);\n\
  ```\n\n请注意，如果要从中移除列的表包含大量数据，`DROP`操作可能需要一些时间。这种延迟可能导致在表被修改期间事务被延迟（因为`ALTER TABLE`语句会锁定表）。在这种情况下，您可能希望先将列标记为未使用，然后在维护窗口时再丢弃它：\n\
  ```sql\nSQL> alter table inv set unused (inv_name);\n```\n当列被标记为未使用后，它将不再出现在表描述中。`SET\
  \ UNUSED`子句不会产生与丢弃列相关的开销。此技术允许您快速阻止 SQL 查询或应用程序看到或使用该列。任何试图访问未使用列的查询都会收到以下错误：\n\
  ```sql\nORA-00904: ... invalid identifier\n```\n之后，您可以在为应用程序安排了一些停机时间时丢弃任何未使用的列。使用`DROP\
  \ UNUSED`子句来移除所有标记为`UNUSED`的列：\n```sql\nSQL> alter table inv drop unused columns;\n\
  ```\n\n### 显示表 DDL\n有时，数据库管理员在记录创建或修改表时所使用的 DDL 方面做得不够好。通常，应将数据库 DDL 代码维护在源代码控制仓库或某种建模工具中。如果您的团队没有\
  \ DDL 源代码，有几种方法可以手动重现 DDL：\n*   查询数据字典。\n*   使用数据泵。\n*   使用`DBMS_METADATA`包。\n\n\
  在过去，比如版本 7 及更早的时候，数据库管理员经常编写查询数据字典的 SQL，试图提取重新创建对象所需的 DDL。虽然这种方法比没有要好，但常常容易出错，因为\
  \ SQL 没有考虑到所有的对象创建特性。\n\n数据泵实用程序是生成用于创建数据库对象的 DDL 的绝佳方法。使用数据泵生成 DDL 的方法在第 13 章有详细说明。\n\
  \n`DBMS_METADATA`包的`GET_DDL`函数通常是显示创建对象所需 DDL 的最快方法。此示例展示了如何为名为`INV`的表生成 DDL：\n\
  ```sql\nSQL> set long 10000\nSQL> select dbms_metadata.get_ddl('TABLE','INV') from\
  \ dual;\n```\n以下是一些示例输出：\n```\nDBMS_METADATA.GET_DDL('TABLE','INV')\n\nSQL>  CREATE\
  \ TABLE \"MV_MAINT\".\"INV\"\n(    \"INV_ID\" NUMBER,\n\"INV_DESC\" VARCHAR2(30\
  \ CHAR),\n\"INV_COUNT\" NUMBER\n) SEGMENT CREATION DEFERRED\nPCTFREE 10 PCTUSED\
  \ 40 INITRANS 1 MAXTRANS 255\nNOCOMPRESS LOGGING\nTABLESPACE \"USERS\";\n```\n以下\
  \ SQL 语句显示了模式中所有表的 DDL：\n```sql\nSQL> select\ndbms_metadata.get_ddl('TABLE',table_name)\n\
  from user_tables;\n```\n如果要显示其他用户拥有的表的 DDL，请向`GET_DDL`过程添加`SCHEMA`参数：\n```sql\n\
  SQL> select\ndbms_metadata.get_ddl(object_type=>'TABLE', name=>'INV', schema=>'INV_APP')\n\
  from dual;\n```\n> **注意**\n> 您可以显示几乎任何数据库对象类型的 DDL，例如`INDEX`、`FUNCTION`、`ROLE`、`PACKAGE`、`MATERIALIZED\
  \ VIEW`、`PROFILE`、`CONSTRAINT`、`SEQUENCE`和`SYNONYM`。\n\n### 丢弃表\n如果要从用户中移除对象（如表），请使用`DROP\
  \ TABLE`语句。此示例丢弃名为`INV`的表：\n```sql\nSQL> drop table inv;\n```\n您应该会看到以下确认信息：\n```\n\
  Table dropped.\n```\n如果您尝试丢弃父表（其主键或唯一键在子表中被引用为外键），您会看到类似以下错误：\n```sql\nORA-02449:\
  \ unique/primary keys in table referenced by foreign keys\n```\n您需要先丢弃引用的外键约束，或者在丢弃父表时使用`CASCADE\
  \ CONSTRAINTS`选项：\n```sql\nSQL> drop table inv cascade constraints;\n```\n必须是表的所有者或具有`DROP\
  \ ANY TABLE`系统权限才能丢弃表。如果您拥有`DROP ANY TABLE`权限，则可以通过在表名前加上模式名来丢弃其他模式中的表：\n```sql\n\
  SQL> drop table inv_mgmt.inv;\n```\n如果不在表名前加上用户名，Oracle 会假定您要丢弃当前模式中的表。\n\n> **提示**\n\
  > 如果启用了闪回查询或闪回数据库，请记住，对于意外丢弃的表，您可以将其闪回到丢弃前的状态。\n\n### 恢复表\n假设您意外丢弃了一个表，并希望恢复它。首先，验证要恢复的表是否在回收站中：\n\
  ```sql\nSQL> show recyclebin;\n```\n以下是一些示例输出：\n```\nORIGINAL NAME  RECYCLEBIN NAME\
  \                OBJECT TYPE         DROP TIME\n-------------  --------------- \
  \               -----------  ----------------\nINV            BIN$0F27WtJGbXngQ4TQTwq5Hw==$0\
  \ TABLE      2012-12-08:12:56:45\n```\n接下来，使用`FLASHBACK TABLE...TO BEFORE DROP`语句来恢复被丢弃的表：\n\
  ```sql\nSQL> flashback table inv to before drop;\n```\n> **注意**\n> 对于在`SYSTEM`表空间中创建的表，不能使用`FLASHBACK\
  \ TABLE...TO BEFORE DROP`语句。\n\n当您执行`DROP TABLE`语句（不带`PURGE`）时，表实际上被重命名（以`BIN$`开头）并放入回收站。回收站是一种机制，允许您查看与被丢弃对象相关的一些元数据。您可以通过查询`DBA_SEGMENTS`来查看重命名对象的完整元数据：\n\
  ```sql\nSQL> select\nowner\n,segment_name\n,segment_type\n,tablespace_name\nfrom\
  \ dba_segments\nwhere segment_name like 'BIN$%';\n```\n`FLASHBACK TABLE`语句只是将表重命名为其原始名称。默认情况下，`RECYCLEBIN`功能是启用的。您可以通过将`RECYCLEBIN`初始化参数设置为`OFF`来更改默认值。\n\
  \n我建议不要禁用`RECYCLEBIN`功能。更安全的做法是保持此功能启用，并清除`RECYCLEBIN`以永久删除您想要删除的对象。这意味着与被丢弃表关联的空间直到您清除`RECYCLEBIN`才会被释放。如果要清除当前连接用户的回收站中的所有内容，请使用`PURGE\
  \ RECYCLEBIN`语句：\n```sql\nSQL> purge recyclebin;\n```\n如果要清除数据库中所有用户的回收站，请以具有 DBA\
  \ 权限的用户执行以下操作：\n```sql\nSQL> purge dba_recyclebin;\n```\n如果要绕过`RECYCLEBIN`功能并永久丢弃表，请使用`DROP\
  \ TABLE`语句的`PURGE`选项：\n```sql\nSQL> drop table inv purge;\n```\n您不能使用`FLASHBACK\
  \ TABLE`语句来检索使用`PURGE`选项丢弃的表。表使用的所有空间都会被释放，任何相关的索引和触发器也会被丢弃。\n\n### 从表中移除数据\n\n\n\
  \n## DELETE 与 TRUNCATE 语句对比\n\n您可以使用 `DELETE` 语句或 `TRUNCATE` 语句从表中删除记录。您需要了解这两种方法之间的一些重要区别。表\
  \ 7-3 总结了 `DELETE` 和 `TRUNCATE` 语句的属性。\n\n### 表 7-3 `DELETE` 与 `TRUNCATE` 的特性\n\n\
  | 特性 | DELETE | TRUNCATE |\n| :--- | :--- | :--- |\n| 可选择 `COMMIT` 或 `ROLLBACK`\
  \ | YES | NO |\n| 生成 undo | YES | NO |\n| 将高水位线重置为 0 | NO | YES |\n| 受外键约束影响 | NO\
  \ | YES |\n| 处理大量数据时性能良好 | NO | YES |\n\n### 使用 DELETE\n\n一个很大的区别是 `DELETE` 语句可以被提交或回滚。提交\
  \ `DELETE` 语句会使更改永久生效：\n\n```\nSQL> delete from inv;\nSQL> commit;\n```\n\n如果您发出\
  \ `ROLLBACK` 语句而不是 `COMMIT`，则表中的数据将恢复到执行 `DELETE` 之前的状态。\n\n### 使用 TRUNCATE\n\n\
  `TRUNCATE` 是一个 DDL 语句。这意味着 Oracle 在运行后会自动提交该语句（以及当前事务），因此无法回滚 `TRUNCATE` 语句。如果您在删除数据时需要选择回滚（而不是提交）的选项，则应使用\
  \ `DELETE` 语句。然而，`DELETE` 语句的缺点是会生成大量的 undo 和 redo 信息。因此，对于大表，`TRUNCATE` 语句通常是删除数据最有效的方法。\n\
  \n> 注意：可能可以使用 CTAS 语句运行闪回查询，以查询 truncate 之前的数据，并将这些数据恢复到另一个表中。您可以 `CREATE TABLE\
  \ tableflashback as SELECT * from table as of TIMESTAMP….`。这取决于 UNDO 的大小和保留时间，但在从备份恢复之前是值得研究的方法。\n\
  \n此示例使用 `TRUNCATE` 语句从 `COMPUTER_SYSTEMS` 表中删除所有数据：\n\n```\nSQL> truncate table\
  \ computer_systems;\n```\n\n默认情况下，Oracle 会释放表使用的所有空间，除了由 `MINEXTENTS` 表存储参数定义的空间。如果您不希望\
  \ `TRUNCATE` 语句释放区，请使用 `REUSE STORAGE` 参数：\n\n```\nSQL> truncate table computer_systems\
  \ reuse storage;\n```\n\n`TRUNCATE` 语句将表的高水位线重置为 0。当您使用 `DELETE` 语句从表中删除数据时，高水位线不会改变。使用\
  \ `TRUNCATE` 语句并重置高水位线的一个优点是，全表扫描只会搜索高水位线以下的块中的行。这可能会对性能产生显著影响。\n\n您不能截断一个已定义主键且该主键被子表中一个启用的外键约束引用的表——即使子表包含零行。Oracle\
  \ 会阻止您这样做，因为在多用户系统中，在您截断子表和随后截断父表之间的时间段内，另一个会话有可能向子表中填充数据。在这种情况下，您必须暂时禁用引用的外键约束，发出\
  \ `TRUNCATE` 语句，然后重新启用约束。\n\n因为 `TRUNCATE` 语句是 DDL，您不能将两个独立的表的截断作为一个事务来处理。将此行为与\
  \ `DELETE` 进行比较。Oracle 允许您在约束启用（这些约束引用了一个子表）的情况下，使用 `DELETE` 语句从父表中删除行。这是因为 `DELETE`\
  \ 生成 undo，是读一致的，并且可以被回滚。\n\n> 注意：另一种从表中删除数据的方法是删除并重新创建表。然而，这意味着您还必须重新创建属于该表的任何索引、约束、授权和触发器。此外，当您删除表时，在重新创建它并重新发出任何所需的授权之前，该表是不可用的。通常，删除并重新创建表仅在开发或测试环境中是可接受的。\n\
  \n## 查看与调整高水位线\n\nOracle 将表的高水位线定义为段中已使用空间和未使用空间之间的边界。当您创建一个表时，Oracle 会为该表分配一定数量的区，由\
  \ `MINEXTENTS` 表存储参数定义。每个区包含一定数量的块。在数据插入表之前，没有任何块被使用，高水位线为 0。\n\n随着数据被插入表中，以及区的分配，高水位线边界会上升。`DELETE`\
  \ 语句不会重置高水位线。\n\n您需要了解关于高水位线的几个性能相关问题：\n\n*   SQL 查询全表扫描\n*   直接路径加载的空间使用\n\nOracle\
  \ 在执行查询时有时需要扫描表的每个块（在高水位线以下）。这称为全表扫描。如果从表中删除了大量数据，即使对于零行的表，全表扫描也可能需要很长时间才能完成。\n\n\
  此外，在进行直接路径加载时，Oracle 在高水位线之上插入数据。您最终可能会在一个经常被删除数据并通过直接路径机制加载的表中，留下大量未使用的空间。\n\n\
  有几种方法可以检测高水位线以下的空间：\n\n*   Autotrace 工具\n*   `DBMS_SPACE` 包\n*   从数据字典 `extents`\
  \ 视图中查询\n\nAutotrace 工具提供了一种检测高水位线问题的简单方法。Autotrace 的优势在于它易于使用，并且输出易于解释。\n\n您可以使用\
  \ `DBMS_SPACE` 包来确定在使用自动段空间管理的表空间中创建的对象的高水位线。`DBMS_SPACE` 包允许您以编程方式检查高水位线问题。这种方法的缺点是输出有些晦涩，难以得出具体的答案。\n\
  \n从 `DBA/ALL/USER_EXTENTS` 中查询为您提供了诸如消耗的区数和字节数等信息。这是检测高水位线问题的一种快速简便的方法。\n\n### 通过跟踪检测高水位线以下的空间\n\
  \n您可以运行这个简单的测试来检测是否存在高水位线以下未使用空间的问题：\n\n1.  `SQL> set autotrace trace statistics`。\n\
  2.  执行进行全表扫描的查询。\n3.  比较处理的行数与逻辑 I/O 数（内存和磁盘访问）。\n\n如果处理的行数很少，但逻辑 I/O 数很高，则可能存在高水位线以下的空闲块问题。下面是一个说明此技术的简单示例：\n\
  \n```\nSQL> set autotrace trace statistics\n```\n\n下一个查询在 `INV` 表上生成全表扫描：\n\n```\n\
  SQL> select * from inv;\n```\n\n这是 `AUTOTRACE` 输出的一个片段：\n\n```\nno rows selected\n\
  Statistics\n----------------------------------------------------------\n       \
  \   4  recursive calls\n          0  db block gets\n       7371  consistent gets\n\
  \       2311  physical reads\n```\n\n返回的行数为零，但有 7,371 次一致读取（内存访问）和 2,311 次物理磁盘读取，表明高水位线以下有空闲空间。\n\
  \n接下来，截断该表，并再次运行查询：\n\n```\nSQL> truncate table inv;\nSQL> select * from inv;\n\
  ```\n\n这是 `AUTOTRACE` 输出的部分列表：\n\n```\nno rows selected\nStatistics\n----------------------------------------------------------\n\
  \          6  recursive calls\n          0  db block gets\n         12  consistent\
  \ gets\n          0  physical reads\n```\n\n请注意，内存访问和物理读取的次数现在非常小。\n\n\n\n#### 使用\
  \ DBMS_SPACE 检测高水位标记之下的空间\n\n你可以使用 `DBMS_SPACE` 包来检测高水位标记之下的空闲块。以下是一个可以从 SQL*Plus\
  \ 调用的 PL/SQL 匿名块：\n\n```\nSQL> set serverout on size 1000000\nSQL> declare\np_fs1_bytes\
  \ number;\np_fs2_bytes number;\np_fs3_bytes number;\np_fs4_bytes number;\np_fs1_blocks\
  \ number;\np_fs2_blocks number;\np_fs3_blocks number;\np_fs4_blocks number;\np_full_bytes\
  \ number;\np_full_blocks number;\np_unformatted_bytes number;\np_unformatted_blocks\
  \ number;\nbegin\ndbms_space.space_usage(\nsegment_owner      => user,\nsegment_name\
  \       => 'INV',\nsegment_type       => 'TABLE',\nfs1_bytes          => p_fs1_bytes,\n\
  fs1_blocks         => p_fs1_blocks,\nfs2_bytes          => p_fs2_bytes,\nfs2_blocks\
  \         => p_fs2_blocks,\nfs3_bytes          => p_fs3_bytes,\nfs3_blocks     \
  \    => p_fs3_blocks,\nfs4_bytes          => p_fs4_bytes,\nfs4_blocks         =>\
  \ p_fs4_blocks,\nfull_bytes         => p_full_bytes,\nfull_blocks        => p_full_blocks,\n\
  unformatted_blocks => p_unformatted_blocks,\nunformatted_bytes  => p_unformatted_bytes\n\
  );\ndbms_output.put_line('FS1: blocks = '||p_fs1_blocks);\ndbms_output.put_line('FS2:\
  \ blocks = '||p_fs2_blocks);\ndbms_output.put_line('FS3: blocks = '||p_fs3_blocks);\n\
  dbms_output.put_line('FS4: blocks = '||p_fs4_blocks);\ndbms_output.put_line('Full\
  \ blocks = '||p_full_blocks);\nend;\n/\n```\n\n在这个场景中，你想要检查 `INV` 表在高水位标记之下的空闲空间。以下是上述\
  \ PL/SQL 的输出结果：\n\n```\nFS1: blocks = 0\nFS2: blocks = 0\nFS3: blocks = 0\nFS4:\
  \ blocks = 3646\nFull blocks = 0\n```\n\n在上面的输出中，`FS1` 参数显示有 0 个块具有 0 到 25% 的空闲空间。`FS2`\
  \ 参数显示有 0 个块具有 25 到 50% 的空闲空间。`FS3` 参数显示有 0 个块具有 50 到 75% 的空闲空间。`FS4` 参数显示有 3，646\
  \ 个块具有 75 到 100% 的空闲空间。最后，有 0 个满块。因为没有满块，并且大量块几乎是空的，你可以看到高水位标记之下确实存在空闲空间。\n\n###\
  \ 从数据字典 Extents 视图中查询\n\n你也可以通过查询 `DBA/ALL/USER_EXTENTS` 视图来检测存在高水位标记问题的表。如果一个表分配了大量区间（extent），但行数为零，这表明有大量数据已从该表中删除；例如：\n\
  \n```\nSQL> select count(*) from user_extents where segment_name='INV';\nCOUNT(*)\n\
  ```\n\n现在，检查表中的行数：\n\n```\nSQL> select count(*) from inv;\nCOUNT(*)\n```\n\n上面的表很可能曾经插入过数据，从而导致了区间的分配。随后，数据被删除，但这些区间仍然保留着。\n\
  \n### 降低高水位标记\n\n如何降低表的高水位标记？你可以使用几种技术将高水位标记重置为 0：\n\n*   `TRUNCATE` 语句\n*   `ALTER\
  \ TABLE ... SHRINK SPACE`\n*   `ALTER TABLE ... MOVE`\n\n使用 `TRUNCATE` 语句已在本章前面讨论过（参见“使用\
  \ TRUNCATE”一节）。缩小表和移动表将在以下章节中讨论。\n\n#### 缩小表\n\n要重新调整高水位标记，你必须为该表启用行移动（row movement），然后使用\
  \ `ALTER TABLE...SHRINK SPACE` 语句。创建表的表空间必须是在创建时启用了自动段空间管理（automatic segment space\
  \ management）。你可以通过此查询来确定表空间的段空间管理类型：\n\n```\nSQL> select tablespace_name, segment_space_management\
  \ from dba_tablespaces;\n```\n\n表所属表空间的 `SEGMENT_SPACE_MANAGEMENT` 值必须是 `AUTO`。接下来，你需要为要缩小的表启用行移动。此示例为\
  \ `INV` 表启用行移动：\n\n```\nSQL> alter table inv enable row movement;\n```\n\n现在，你可以缩小该表使用的空间：\n\
  \n```\nSQL> alter table inv shrink space;\n```\n\n你还可以通过 `CASCADE` 子句来缩小与任何索引段相关的空间：\n\
  \n```\nSQL> alter table inv shrink space cascade;\n```\n\n#### 移动表\n\n移动表意味着在当前表空间中重建表，或者在另一个表空间中构建它。你可能想要移动表，因为其当前表空间存在磁盘空间存储问题，或者因为你想降低该表的高水位标记。\n\
  \n使用 `ALTER TABLE ... MOVE` 语句将表从一个表空间移动到另一个表空间。此示例将 `INV` 表移动到 `USERS` 表空间：\n\n\
  ```\nSQL> alter table inv move tablespace users;\n```\n\n你可以通过查询 `USER_TABLES` 来验证表是否已被移动：\n\
  \n```\nSQL> select table_name, tablespace_name from user_tables where table_name='INV';\n\
  TABLE_NAME           TABLESPACE_NAME\n-------------------- ------------------------------\n\
  INV                  USERS\n```\n\n注意：`ALTER TABLE ... MOVE` 语句在执行期间不允许 DML 操作。虽然存在一些限制，但有一个\
  \ `ALTER TABLE ... ONLINE MOVE` 命令不会限制对表的访问，或者你可以使用 `DBMS_REDEFINITION` 包。\n\n你也可以在移动表时指定\
  \ `NOLOGGING`：\n\n```\nSQL> alter table inv move tablespace users nologging;\n```\n\
  \n使用 `NOLOGGING` 移动表会消除表重定位时通常会生成的大部分重做日志。使用 `NOLOGGING` 的缺点是，如果在表移动后立即发生故障（并且你没有表移动后的备份），那么你将无法恢复表的内容。如果表中的数据至关重要，则在移动时不要使用\
  \ `NOLOGGING`。\n\n当你移动一个表时，它的所有索引都会变得不可用。这是因为表的索引在结构中包含 `ROWID`。表 `ROWID` 包含物理位置信息。鉴于表从一个表空间移动到另一个表空间时，其\
  \ `ROWID` 会发生变化（因为表行现在物理上位于不同的数据文件中），表上的任何索引都包含不正确信息。要重建索引，请使用 `ALTER INDEX ...\
  \ REBUILD` 命令。\n\n## Oracle ROWID\n\n每个表中的每一行都有一个地址。行的地址由以下组合确定：\n\n```\n数据文件号\n\
  块号\n行在块内的位置\n对象号\n```\n\n你可以通过查询 `ROWID` 伪列来显示表中某一行的地址；例如：\n\n```\nSQL> select rowid,\
  \ emp_id from emp;\n```\n\n以下是一些示例输出：\n\n```\nROWID                  EMP_ID\n------------------\
  \ ----------\nAAAFJAAAFAAAAJfAAA          1\n```\n\n`ROWID` 伪列值并未物理存储在数据库中。Oracle\
  \ 在你查询时计算其值。`ROWID` 的内容显示为 Base64 值，可能包含字符 A–Z、a–z、0–9、+ 和 /。你可以使用 `DBMS_ROWID`\
  \ 包将 `ROWID` 值转换为有意义的信息。例如，要显示行存储的相对文件号，请执行此语句：\n\n```\nSQL> select dbms_rowid.rowid_relative_fno(rowid),\
  \ emp_id from emp;\n```\n\n以下是一些示例输出：\n\n```\nDBMS_ROWID.ROWID_RELATIVE_FNO(ROWID)\
  \     EMP_ID\n------------------------------------ ----------\n5               \
  \                         1\n```\n\n你可以在 SQL 语句的 `SELECT` 和 `WHERE` 子句中使用 `ROWID`\
  \ 值。在大多数情况下，`ROWID` 唯一地标识一行。然而，不同表中的行可能存储在同一个簇中，因此可能包含具有相同 `ROWID` 的行。\n\n## 创建临时表\n\
  \n\n## 使用临时表\n\n使用 `CREATE GLOBAL TEMPORARY TABLE` 语句创建一个仅临时存储数据的表。您可以指定该临时表是保留数据直至会话结束，还是直至事务提交。使用\
  \ `ON COMMIT PRESERVE ROWS` 来指定数据在用户会话结束时删除。在此示例中，行将被保留，直到用户显式删除数据或终止会话：\n\n```sql\n\
  SQL> create global temporary table today_regs\non commit preserve rows\nas select\
  \ * from f_registrations\nwhere create_dtt > sysdate - 1;\n```\n\n指定 `ON COMMIT\
  \ DELETE ROWS` 以指示数据应在事务结束时删除。以下示例创建了一个名为 `TEMP_OUTPUT` 的临时表，并指定记录应在每个提交的事务结束时被删除：\n\
  \n```sql\ncreate global temporary table temp_output(\ntemp_row varchar2(30))\non\
  \ commit delete rows;\n```\n\n> **注意**\n> 如果您未为全局临时表指定提交方法，则默认为 `ON COMMIT DELETE\
  \ ROWS`。\n\n您可以创建临时表并授予其他用户访问权限。但是，一个会话只能查看其自身插入到表中的数据。换句话说，如果两个会话正在使用同一个临时表，一个会话无法查询由另一个会话插入到临时表中的任何数据。\n\
  \n全局临时表对于需要在表结构中短暂存储数据的应用程序非常有用。创建临时表后，它将一直存在，直到您将其删除。换句话说，临时表的定义是“永久的”——短暂的是数据（在这个意义上，“临时表”这个术语可能会产生误导）。\n\
  \n您可以通过查询 `DBA/ALL/USER_TABLES` 的 `TEMPORARY` 列来查看表是否是临时的：\n\n```sql\nSQL> select\
  \ table_name, temporary from user_tables;\n```\n\n临时表在 `TEMPORARY` 列中被标记为 `Y`。常规表在\
  \ `TEMPORARY` 列中包含 `N`。\n\n当您在临时表中创建记录时，空间会在您的默认临时表空间中分配。您可以通过运行以下 SQL 进行验证：\n\n\
  ```sql\nSQL> select username, contents, segtype from v$sort_usage;\n```\n\n如果您处理大量行并且需要更好的选择性检索行的性能，可以考虑在临时表的相应列上创建索引：\n\
  \n```sql\nSQL> create index temp_index on temp_output(temp_row);\n```\n\n使用 `DROP\
  \ TABLE` 命令来删除临时表：\n\n```sql\nSQL> drop table temp_output;\n```\n\n## 临时表与重做日志\n\
  \n对全局临时表的数据块所做的更改不会生成重做数据。但是，针对临时表的事务会生成回滚（撤销）数据。由于回滚数据会生成重做，因此与临时表事务相关联的会有一些重做数据。您可以通过打开统计信息跟踪并查看向临时表插入记录时的重做大小来验证这一点：\n\
  \n```sql\nSQL> set autotrace on\n```\n\n接下来，向临时表中插入几条记录：\n\n```sql\nSQL> insert\
  \ into temp_output values(1);\n```\n\n以下是输出的一个片段（仅显示重做大小）：\n\n```\n140 redo size\n\
  ```\n\n临时表的重做负载小于常规表，因为生成的重做仅与临时表事务的回滚（撤销）数据相关联。此外，从 Oracle Database 12c 开始，临时对象的撤销存储在临时表空间中，而不是撤销表空间中。\n\
  \n## 创建索引组织表\n\n索引组织表（IOT）在表数据通常通过主键查询访问时是高效的对象。使用 `ORGANIZATION INDEX` 子句来创建 IOT：\n\
  \n```sql\nSQL> create table prod_sku\n(prod_sku_id number,\nsku varchar2(256),\n\
  create_dtt timestamp(5),\nconstraint prod_sku_pk primary key(prod_sku_id)\n)\norganization\
  \ index\nincluding sku\npctthreshold 30\ntablespace inv_data\noverflow\ntablespace\
  \ inv_data;\n```\n\nIOT 将表行的全部内容存储在 B-tree 索引结构中。IOT 为具有主键上的精确匹配或范围搜索（或两者）的查询提供快速访问。所有指定的列，直到并包括\
  \ `INCLUDING` 子句中指定的列，都存储在与 `PROD_SKU_ID` 主键列相同的块中。换句话说，`INCLUDING` 子句指定了在表段中保留的最后一个列。在\
  \ `INCLUDING` 子句中指定的列之后的列存储在溢出数据段中。在上面的示例中，`CREATE_DTT` 列存储在溢出段中。`PCTTHRESHOLD`\
  \ 指定了在索引块中为 IOT 行保留的空间百分比。该值可以是 1 到 50，如果未指定值，则默认为 50。索引块中必须有足够的空间来存储主键。\n\n`OVERFLOW`\
  \ 子句详细说明了哪个表空间应用于存储溢出数据段。请注意，`DBA/ALL/USER_TABLES` 包含创建 IOT 时使用的表名的条目。此外，`DBA/ALL/USER_INDEXES`\
  \ 包含指定的主键约束名称的记录。对于 IOT，`INDEX_TYPE` 列包含值 `IOT - TOP`：\n\n```sql\nSQL> select index_name,table_name,index_type\
  \ from user_indexes;\n```\n\n## 管理约束\n\n接下来的几节将讨论约束。约束提供了一种确保数据符合特定业务规则的机制。您必须了解可用的约束类型以及何时适合使用它们。Oracle\
  \ 提供了几种类型的约束：\n\n*   主键\n*   唯一键\n*   外键\n*   检查约束\n*   `NOT NULL`\n\n以下部分将讨论如何实现和管理这些约束。\n\
  \n### 创建主键约束\n\n在实现数据库时，您创建的大多数表都需要一个主键约束，以保证表中的每条记录都可以被唯一标识。有多种技术可以向表添加主键约束。第一个示例在列定义中内联创建主键：\n\
  \n```sql\nSQL> create table dept(\ndept_id number primary key\n,dept_desc varchar2(30));\n\
  ```\n\n如果您从 `USER_CONSTRAINTS` 中选择 `CONSTRAINT_NAME`，请注意 Oracle 会为约束生成一个隐晦的名称（例如\
  \ `SYS_C003682`）。使用以下语法显式地为主键约束命名：\n\n```sql\nSQL> create table dept(\ndept_id number\
  \ constraint dept_pk primary key using index tablespace users,\ndept_desc varchar2(30));\n\
  ```\n\n> **注意**\n> 创建主键约束时，Oracle 还会创建一个与约束同名的唯一索引。您可以通过 `USING INDEX TABLESPACE`\
  \ 子句控制唯一索引放置在哪个表空间中。\n\n您也可以在定义列之后再指定主键约束定义。这样做的好处是可以跨多列定义约束。下一个示例在创建表时创建主键，但不内联于列定义：\n\
  \n```sql\nSQL> create table dept(\ndept_id number,\ndept_desc varchar2(30),\nconstraint\
  \ dept_pk primary key (dept_id)\nusing index tablespace users);\n```\n\n如果表已经创建，并且您想添加主键约束，请使用\
  \ `ALTER TABLE` 语句。此示例在 `DEPT` 表的 `DEPT_ID` 列上放置一个主键约束：\n\n```sql\nSQL> alter table\
  \ dept\nadd constraint dept_pk primary key (dept_id)\nusing index tablespace users;\n\
  ```\n\n启用主键约束时，Oracle 会自动创建一个与主键约束关联的唯一索引。一些 DBA 更喜欢先在主键列上创建一个非唯一索引，然后再定义主键约束：\n\
  \n```sql\nSQL> create index dept_pk on dept(dept_id) tablespace users;\nSQL> alter\
  \ table dept add constraint dept_pk primary key (dept_id);\n```\n\n\n### 优化主键约束方法\n\
  \n这种方法的优势在于，你可以独立于索引禁用或删除主键约束。当你处理大型数据集时，这种灵活性可能非常有用。如果你在创建主键约束之前没有创建索引，那么每当禁用或删除主键约束时，关联的索引也会被自动删除。\n\
  \n对于使用哪种方法创建主键感到困惑吗？所有方法都是有效的，并各有其优点。表 7-4 总结了主键和唯一键约束的创建方法。我曾在不同场景下使用所有这些方法来创建主键约束。通常，我会使用`ALTER\
  \ TABLE`语句，它在表创建之后添加约束。\n\n#### 表 7-4 主键和唯一键约束创建方法\n\n| 约束创建方法 | 优点 | 缺点 |\n| :---\
  \ | :--- | :--- |\n| 内联，无名称 | 非常简单 | Oracle 生成的名称使故障排除更难；对存储属性控制较少；仅应用于单个列 |\n|\
  \ 内联，带名称 | 简单；用户定义的名称使故障排除更容易 | 比内联无名称需要更多思考 |\n| 内联，带名称和表空间定义 | 用户定义的名称和表空间；使故障排除更容易\
  \ | 不那么简单 |\n| 在列定义之后（行外） | 用户定义的名称和表空间；可对多个列操作 | 不那么简单 |\n| `ALTER TABLE add just\
  \ constraint` | 允许你在独立于表创建脚本的语句（和文件）中管理约束；可对多个列操作 | 更复杂 |\n| `CREATE INDEX`，然后`ALTER\
  \ TABLE add constraint` | 分离索引和约束，因此你可以在不影响索引的情况下删除/禁用约束；可对多个列操作 | 最复杂：需要维护的部分更多，活动组件更多\
  \ |\n\n### 强制唯一键值\n\n除了创建主键约束外，你还应该在那些在表内应始终保持唯一的列组合上创建唯一约束。例如，对于一个表的主键，常见做法是使用一个通过序列填充的数字键（有时称为代理键）。除了代理主键，有时用户还会有一个（或多个）业务上用于唯一标识记录的列（也称为逻辑键）。同时使用代理键和逻辑键可以做到：\n\
  \n*   允许你通过单个数字列高效地连接父表和子表\n*   允许更新逻辑键列而不改变代理键\n\n唯一键保证了在定义列（或列组合）上的唯一性。主键和唯一键约束之间存在一些细微差别。例如，每个表只能定义一个主键，但可以有多个唯一键。此外，主键不允许其任何列包含`NULL`值，而唯一键允许`NULL`值。\n\
  \n与主键约束类似，你可以使用多种方法来创建唯一列约束。此方法使用`UNIQUE`关键字与列内联定义：\n\n```sql\nSQL> create table\
  \ dept(\ndept_id number\n,dept_desc varchar2(30) unique);\n```\n\n如果你想显式命名约束，可以使用`CONSTRAINT`关键字：\n\
  \n```sql\nSQL> create table dept(\ndept_id number\n,dept_desc varchar2(30) constraint\
  \ dept_desc_uk1 unique);\n```\n\n与主键类似，Oracle 会自动创建一个与唯一键约束关联的索引。你可以内联指定用于关联唯一索引的表空间信息：\n\
  \n```sql\nSQL> create table dept(\ndept_id number\n,dept_desc varchar2(30) constraint\
  \ dept_desc_uk1\nunique using index tablespace users);\n```\n\n你也可以修改表以添加唯一约束：\n\
  \n```sql\nSQL> alter table dept\nadd constraint dept_desc_uk1 unique (dept_desc)\n\
  using index tablespace users;\n```\n\n你还可以在定义唯一键约束之前，先对目标列创建索引：\n\n```sql\nSQL>\
  \ create index dept_desc_uk1 on dept(dept_desc) tablespace users;\nSQL> alter table\
  \ dept add constraint dept_desc_uk1 unique(dept_desc);\n```\n\n当你处理大型数据集，并且希望在删除或禁用唯一约束时不删除关联的索引时，这种方法会很有帮助。\n\
  \n> 提示：你也可以通过唯一索引来强制执行唯一键约束。有关使用唯一索引强制执行唯一约束的详细信息，请参见第 8 章。\n\n### 创建外键约束\n\n外键约束用于确保某个列值包含在一组预定义的值列表中。使用外键约束是在插入或更新操作允许之前，强制数据为预定义值的有效方法。此技术适用于以下场景：\n\
  \n*   值列表包含大量条目。\n*   需要存储关于查找值的其他信息。\n*   通过 SQL 选择、插入、更新或删除值很容易。\n\n例如，假设创建`EMP`表时包含一个`DEPT_ID`列。为确保每个员工都被分配到一个有效的部门，你可以创建一个外键约束，强制要求`EMP`表中的每个`DEPT_ID`都必须存在于`DEPT`表中。\n\
  \n> 提示：如果你要检查的条件是一个变化不频繁的小列表，请考虑使用检查约束而不是外键约束。例如，如果你有一个列将始终定义为只包含 0 或 1，那么检查约束是一个高效的解决方案。\n\
  \n作为参考，以下是这些示例中父表`DEPT`的创建方式：\n\n```sql\nSQL> create table dept(\ndept_id number\
  \ primary key,\ndept_desc varchar2(30));\n```\n\n外键必须引用父表中已定义了主键或唯一键的列。`DEPT`是父表，其`DEPT_ID`上定义了主键。\n\
  \n你可以使用几种方法来创建外键约束。以下示例在`EMP`表的`DEPT_ID`列上创建了一个外键约束：\n\n```sql\nSQL> create table\
  \ emp(\nemp_id number,\nname varchar2(30),\ndept_id constraint emp_dept_fk references\
  \ dept(dept_id));\n```\n\n注意，`DEPT_ID`数据类型未显式定义。外键约束从被引用的`DEPT`表的`DEPT_ID`列派生数据类型。你也可以在定义列时显式指定数据类型（无论是否有外键定义）：\n\
  \n```sql\nSQL> create table emp(\nemp_id number,\nname varchar2(30),\ndept_id number\
  \ constraint emp_dept_fk references dept(dept_id));\n```\n\n你还可以在`CREATE TABLE`语句中，将外键定义与列定义分开（行外）指定：\n\
  \n```sql\nSQL> create table emp(\nemp_id number,\nname varchar2(30),\ndept_id number,\n\
  constraint emp_dept_fk foreign key (dept_id) references dept(dept_id)\n);\n```\n\
  \n并且，你可以修改现有表来添加外键约束：\n\n```sql\nSQL> alter table emp\nadd constraint emp_dept_fk\
  \ foreign key (dept_id)\nreferences dept(dept_id);\n```\n\n> 注意：与主键和唯一键约束不同，Oracle\
  \ 不会自动为外键列添加索引；你必须显式地在它们上创建索引。有关为什么在创建外键列索引很重要以及如何检测没有关联索引的外键列的讨论，请参见第 8 章。\n\n\n\
  \n## 检查特定的数据条件\n\n当你有一个简短、相对静态的值列表时（例如，一个列的值只能是 `Y` 或 `N`），使用 `CHECK` 约束进行查找非常合适。在这种情况下，值列表很可能不会改变，并且除了\
  \ `Y` 或 `N` 之外不需要存储任何其他信息，因此 `CHECK` 约束是合适的解决方案。如果你有一个需要定期更新的长值列表，那么使用表和外键约束是更好的解决方案。\n\
  \n此外，对于必须始终强制执行且可以用简单 SQL 表达式编写的业务规则，`CHECK` 约束也很有效。如果你有需要验证的复杂业务逻辑，那么应用程序代码更合适。\n\
  \n你可以在创建表时定义 `CHECK` 约束。以下语句强制 `ST_FLG` 列只能包含 `0` 或 `1`：\n\n```sql\nSQL> create\
  \ table emp(\nemp_id number,\nemp_name varchar2(30),\nst_flg number(1) CHECK (st_flg\
  \ in (0,1))\n);\n```\n\n一个稍好的方法是给 `CHECK` 约束起一个名字：\n\n```sql\nSQL> create table\
  \ emp(\nemp_id number,\nemp_name varchar2(30),\nst_flg number(1) constraint st_flg_chk\
  \ CHECK (st_flg in (0,1))\n);\n```\n\n一种更具描述性的约束命名方式是在约束名中嵌入描述违反条件的信息；例如，\n\n```sql\n\
  SQL> create table emp(\nemp_id number,\nemp_name varchar2(30),\nst_flg number(1)\
  \ constraint \"st_flg must be 0 or 1\" check (st_flg in (0,1))\n);\n```\n\n你也可以通过\
  \ `ALTER` 修改现有列来添加约束。该列不能包含任何违反即将启用的约束的值：\n\n```sql\nSQL> alter table emp add constraint\n\
  \"st_flg must be 0 or 1\" check (st_flg in (0,1));\n```\n\n## 注意\n\n在插入或更新的行中，`CHECK`\
  \ 约束的求值结果必须为 `TRUE` 或未知（`NULL`）值。你不能在 `CHECK` 约束中使用子查询或序列。另外，你不能引用 SQL 函数 `UID`、`USER`、`SYSDATE`\
  \ 或 `USERENV`，也不能引用伪列 `LEVEL` 或 `ROWNUM`。\n\n## 强制非空条件\n\n另一个需要检查的常见条件是列是否为 `null`；你可以使用\
  \ `NOT NULL` 约束来实现。`NOT NULL` 约束可以通过多种方式定义。这里展示的是最简单的技术：\n\n```sql\nSQL> create\
  \ table emp(\nemp_id number,\nemp_name varchar2(30) not null);\n```\n\n一个稍好的方法是给\
  \ `NOT NULL` 约束起一个对你有意义的名字。为约束命名可以让你看清约束的用途，而不是使用系统生成的约束名称，后者可能会与主键或外键约束混淆：\n\n\
  ```sql\nSQL> create table emp(\nemp_id number,\nemp_name varchar2(30) constraint\
  \ emp_name_nn not null);\n```\n\n如果你需要修改现有表的列，请使用 `ALTER TABLE` 命令。要使以下命令生效，被定义为\
  \ `NOT NULL` 的列中不能存在任何 `NULL` 值：\n\n```sql\nSQL> alter table emp modify(emp_name\
  \ not null);\n```\n\n## 注意\n\n如果当前正在定义为 `NOT NULL` 的列中存在 `NULL` 值，你必须首先更新表，使该列的每一行都有值。\n\
  \n## 禁用约束\n\nOracle 的一个很好的特性是，你可以在不删除和重新创建约束的情况下 `禁用` 和 `启用` 约束。这意味着你不必了解重新创建已删除约束所需的\
  \ DDL 语句。\n\n有时，你需要禁用约束。例如，你可能正尝试 `TRUNCATE` 一个表，但收到以下错误消息：\n\n```\nORA-02266: unique/primary\
  \ keys in table referenced by enabled foreign keys\n```\n\nOracle 不允许对父表执行 `TRUNCATE`\
  \ 操作，如果该父表的主键被子表中的一个启用外键所引用。如果你需要 `TRUNCATE` 一个父表，你必须首先 `禁用` 所有引用该父表主键的已启用外键约束。运行此查询以确定需要禁用的约束的名称：\n\
  \n```sql\nSQL> col primary_key_table form a18\nSQL> col primary_key_constraint form\
  \ a18\nSQL> col fk_child_table form a18\nSQL> col fk_child_table_constraint form\
  \ a18\n--\nSQL> select\nb.table_name primary_key_table\n,b.constraint_name primary_key_constraint\n\
  ,a.table_name fk_child_table\n,a.constraint_name fk_child_table_constraint\nfrom\
  \ dba_constraints a\n,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\n\
  and a.r_owner = b.owner\nand a.constraint_type = 'R'\nand b.owner = upper('&table_owner')\n\
  and b.table_name = upper('&pk_table_name');\n```\n\n对于此示例，只有一个外键依赖项：\n\n```\nPRIMARY_KEY_TAB\
  \ PRIMARY_KEY_CON FK_CHILD_TABLE  FK_CHILD_TABLE_\n--------------- ---------------\
  \ --------------- ---------------\nDEPT            DEPT_PK         EMP         \
  \    EMP_DEPT_FK\n```\n\n使用 `ALTER TABLE` 语句来 `禁用` 表上的约束。在本例中，只有一个外键需要禁用：\n\n```sql\n\
  SQL> alter table emp disable constraint emp_dept_fk;\n```\n\n你现在可以 `TRUNCATE` 父表了：\n\
  \n```sql\nSQL> truncate table dept;\n```\n\n不要忘记在 `TRUNCATE` 操作完成后 `重新启用` 外键约束，如下所示：\n\
  \n```sql\nSQL> alter table emp enable constraint emp_dept_fk;\n```\n\n你可以使用 `DISABLE`\
  \ 子句的 `CASCADE` 选项来 `禁用` 主键及其所有相关的外键约束。例如，下一行代码禁用了与主键约束相关的所有外键约束：\n\n```sql\nSQL>\
  \ alter table dept disable constraint dept_pk cascade;\n```\n\n此语句不会级联通过所有依赖层级；它仅禁用直接依赖于\
  \ `DEPT_PK` 的外键约束。还要记住，没有 `ENABLE...CASCADE` 语句。要重新启用约束，你必须查询数据字典以确定哪些约束已被禁用，然后逐一重新启用它们。\n\
  \n有时，在加载数据时，你会遇到这样的情况：在加载数据之前禁用所有外键很方便。在这些情况下，`imp` 实用程序按字母顺序导入表，并不确保子表在父表之前导入。你可能还希望并行运行多个导入作业以利用并行硬件。在这种情况下，你可以\
  \ `禁用` 外键，执行导入，然后重新启用外键。\n\n以下是一个使用 SQL 生成 SQL 脚本来为用户 `禁用` 所有外键约束的脚本：\n\n```sql\n\
  SQL> set lines 132 trimsp on head off feed off verify off echo off pagesize 0\n\
  SQL> spo dis_dyn.sql\nSQL> select 'alter table ' || a.table_name\n|| ' disable constraint\
  \ ' || a.constraint_name || ';'\nfrom dba_constraints a\n,dba_constraints b\nwhere\
  \ a.r_constraint_name = b.constraint_name\nand a.r_owner = b.owner\nand a.constraint_type\
  \ = 'R'\nand b.owner = upper('&table_owner');\nSQL> spo off;\n```\n\n此脚本生成一个名为 `dis_dyn.sql`\
  \ 的文件，其中包含为用户禁用所有外键约束的 SQL 语句。\n\n## 启用约束\n\n本节包含一些脚本，可帮助你 `启用` 已禁用的约束。下面列出的是一个脚本，它创建一个文件，其中包含为指定用户的所有表重新启用任何外键约束所需的\
  \ SQL 语句：\n\n```sql\nSQL> set lines 132 trimsp on head off feed off verify off echo\
  \ off pagesize 0\nSQL> spo enable_dyn.sql\nSQL> select 'alter table ' || a.table_name\n\
  || ' enable constraint ' || a.constraint_name || ';'\nfrom dba_constraints a\n,dba_constraints\
  \ b\nwhere a.r_constraint_name = b.constraint_name\nand a.r_owner = b.owner\nand\
  \ a.constraint_type = 'R'\nand b.owner = upper('&table_owner');\nSQL> spo off;\n\
  ```\n\n\n## 约束管理\n\n启用约束时，默认情况下 Oracle 会检查数据是否违反约束定义。如果您相当确定数据完整性良好，并且不想因重新验证约束而带来性能开销，可以在重新启用约束时使用\
  \ `NOVALIDATE` 子句。示例如下：\n\n```sql\nSQL> select 'alter table ' || a.table_name\n\
  || ' modify constraint ' || a.constraint_name || ' enable novalidate;'\nfrom dba_constraints\
  \ a\n,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\nand a.r_owner\
  \ = b.owner\nand a.constraint_type = 'R'\nand b.owner = upper('&table_owner');\n\
  ```\n\n`NOVALIDATE` 子句指示 Oracle 不对正在启用的约束进行验证，但它确实会强制执行任何新的 DML 活动都遵守约束定义。\n\n在多用户系统中，存在另一种可能性：在外键约束被禁用期间，另一个会话已向子表插入了数据。如果发生这种情况，当您尝试重新启用外键时，会看到以下错误：\n\
  \n```sql\nORA-02298: cannot validate (.) - parent keys not found\n```\n\n在这种情况下，您可以使用\
  \ `ENABLE NOVALIDATE` 子句：\n\n```sql\nSQL> alter table emp enable novalidate constraint\
  \ emp_dept_fk;\n```\n\n要清理违反约束的行，首先请确保您在当前连接的模式中创建了一个 `EXCEPTIONS` 表。如果您没有 `EXCEPTIONS`\
  \ 表，请使用此脚本创建一个：\n\n```sql\nSQL> @?/rdbms/admin/utlexcpt.sql\n```\n\n接下来，使用 `EXCEPTIONS\
  \ INTO` 子句将违反约束的行填充到 `EXCEPTIONS` 表中：\n\n```sql\nSQL> alter table emp modify constraint\
  \ emp_dept_fk validate\nexceptions into exceptions;\n```\n\n只要存在违反约束的行，此语句仍会抛出 `ORA-02298`\
  \ 错误。该语句还会将任何有问题的行的记录插入到 `EXCEPTIONS` 表中。现在，您可以使用 `EXCEPTIONS` 表的 `ROW_ID` 列来删除任何违反约束的记录。\n\
  \n此处，您可以看到需要从 `EMP` 表中删除一行：\n\n```sql\nSQL> select * from exceptions;\n```\n\n以下是一些示例输出：\n\
  \n```sql\nROW_ID             OWNER    TABLE_NAME CONSTRAINT\n------------------\
  \ -------- ---------- --------------------\nAAAFKQAABAAAK8JAAB MV_MAINT EMP    \
  \    EMP_DEPT_FK\n```\n\n要删除违规记录，请发出 `DELETE` 语句：\n\n```sql\nSQL> delete from emp\
  \ where rowid = 'AAAFKQAABAAAK8JAAB';\n```\n\n如果 `EXCEPTIONS` 表包含许多记录，您可以运行如下查询，按\
  \ `OWNER` 和 `TABLE_NAME` 删除：\n\n```sql\nSQL> delete from emp where rowid in\n(select\
  \ row_id\nfrom exceptions\nwhere owner=upper('&owner') and table_name = upper('&table_name'));\n\
  ```\n\n您也可能会遇到需要禁用主键或唯一键约束（或两者）的情况。例如，您可能希望执行大型数据加载，并且出于性能原因希望禁用主键和唯一键约束。您不希望因为每一行插入时都需要检查而产生开销。\n\
  \n用于禁用外键的相同通用技术也适用于禁用主键和唯一键。运行此查询以显示用户的主键和唯一键约束：\n\n```sql\nSQL> select\na.table_name\n\
  ,a.constraint_name\n,a.constraint_type\nfrom dba_constraints a\nwhere a.owner =\
  \ upper('&table_owner')\nand a.constraint_type in ('P','U')\norder by a.table_name;\n\
  ```\n\n当表名和约束名确定后，使用 `ALTER TABLE` 语句禁用约束：\n\n```sql\nSQL> alter table dept disable\
  \ constraint dept_pk;\n```\n\n> **注意**\n> Oracle 不允许您禁用在已启用的外键约束中引用的主键或唯一键约束。您必须先禁用外键约束。\n\
  \n## 总结\n\n本章重点介绍了与创建和维护表相关的基本活动。表是在数据库中存储数据的容器。关键的表管理任务包括修改、移动、删除、收缩和删除表。您还必须熟悉如何实现和使用特殊表类型，例如临时表、索引组织表（IOT）和只读表。\n\
  \nOracle 还提供了各种约束来帮助您管理表中的数据。约束是数据完整性的基石。在大多数情况下，每个表都应包含一个主键约束，以确保每一行都是唯一可识别的。此外，任何父子关系都应通过外键约束来强制执行。您可以使用唯一约束来实现要求列或列组合具有唯一性的业务规则。检查约束和\
  \ `NOT NULL` 约束可确保列包含业务指定的数据要求。\n\n可以使用 `DBMS_REDEFINITION` 包在线修改表，并且可以生成脚本来准备表更改。这需要通过开发环境进行测试，以便将所有部分（如索引和启用约束）作为一个脚本一起运行，这样就不会忘记启用或创建键和索引。\n\
  \n创建表后，下一个合乎逻辑的活动是在适当的地方创建索引。索引是可选的数据库对象，有助于提高性能。索引的创建和维护任务将在下一章中介绍。\n\n"
- "# 8. 索引\n\n索引是一种可选创建的数据库对象，主要用于提高查询性能。索引还可以限制结果中返回的数据量，而无需检索表的所有数据列。这有助于将结果保留在内存中并更快地返回结果。数据库索引的目的类似于书籍末尾的索引。书籍索引将主题与页码关联起来。当您在书中查找信息时，通常先检查索引，找到感兴趣的主-题，然后识别相关的页码会快得多。有了这些信息，您可以直接导航到书中的特定页码。\n\
  \n如果某个主题在书中只出现在几页上，那么需要阅读的页数是最少的。通过这种方式，索引的有用性随着主题在书中出现的次数增加而降低。换句话说，如果某个主题条目出现在书的每一页上，为其创建索引将毫无益处。在这种情况下，无论是否存在索引，扫描书的每一页对读者来说都会更有效率。\n\
  \n> **注意**\n> 在数据库术语中，搜索表的所有块称为全表扫描。当没有可用索引或查询优化器确定全表扫描是比使用现有索引更高效的访问路径时，就会发生全表扫描。\n\
  \n类似于书籍索引（主题和页码），数据库索引存储感兴趣的列值及其行标识符（`ROWID`）。`ROWID` 包含存储该列值的表行在磁盘上的物理位置。有了 `ROWID`，Oracle\
  \ 可以通过最少的磁盘读取高效地检索表数据。通过这种方式，索引充当了通往表数据的快捷方式。如果没有可用的索引，则 Oracle 会读取表中的每一行以确定该行是否包含所需的信息。\n\
  \n> **注意**\n> 除了提高性能外，Oracle 还使用索引来帮助强制执行已启用的主键和唯一键约束。此外，当在外键列上放置索引时，Oracle 可以更好地管理某些表锁定场景。\n\
  \n\n## 决定何时创建索引\n\n数据库管理员和开发人员通常在两种不同的情况下决定创建索引：\n\n*   **主动创建**，即在首次部署应用程序时；数据库管理员/开发人员会对要对哪些表和哪些列建立索引做出有根据的猜测。\n\
  *   **被动创建**，即当应用程序性能下降，用户抱怨性能不佳时；此时，数据库管理员/开发人员会尝试识别执行缓慢的 SQL 查询，并考虑索引可能如何成为解决方案。\n\
  \n接下来的两个小节将讨论上述两种情况。\n\n### 主动创建索引\n\n在创建一个新的数据库应用程序时，流程的一部分涉及确定主键、唯一键和外键。与这些键关联的列通常是索引的候选列。以下是一些指导原则：\n\
  \n*   为每个表定义一个主键约束。这会在主键指定的列上自动创建一个索引。\n*   在需要保持唯一性且与主键列不同的列上创建唯一键约束。每个唯一键约束都会在约束指定的列上自动创建一个索引。\n\
  *   在外键列上手动创建索引。这样做是为了获得更好的性能，并避免某些锁问题。\n\n换句话说，在确定表约束的过程中，关于对哪些表和列建立索引的部分决策会自动为您完成。在创建主键和唯一键约束时，Oracle\
  \ 会自动为您创建索引。关于是否要为外键列创建索引，存在一些争论。本章后面的“索引外键列”一节有进一步的讨论。\n\n这些索引可以自动化为随表创建运行，或作为数据库中对象构建的一部分运行。此外，如果是新创建的外键，可以将索引生成作为代码的一部分，以确保在更改时创建索引；这样，代替手动检查所有约束、索引和键，可以根据新对象生成\
  \ DDL 语句，并将其作为主动创建索引的一部分添加。\n\n除了创建与约束相关的索引之外，如果您对应用程序中的 SQL 有足够的了解，您还可以在`SELECT`、`FROM`和`WHERE`子句中引用的表和列上创建相关索引。根据我的经验，数据库管理员和开发人员并不擅长主动识别此类索引。相反，这些索引需求通常是在被动情况下识别的。\n\
  \n### 被动创建索引\n\n数据库管理员和开发人员在首次部署应用程序时很少能准确创建出正确的索引组合。而且，这并非坏事或出乎意料；在一个大型数据库系统中预测所有可能发生的事情是很困难的。此外，随着应用程序的成熟，数据库会引入变更（新表、新列、新约束、增加了新特性/行为的数据库升级等）。现实情况是，您将不得不对数据库中出现的、需要添加索引以提升性能的意外情况做出反应。\n\
  \n对于主要的数据库版本发布或系统资源变更，也需要重新审视索引策略。例如，服务器上更多的内存会使表扫描执行得更好，也许会消除对某个索引的需求。或者，对于一个原本因优化器计算成本的方式而有益的索引，升级可能使得一个不同的查询计划能够更好地提升性能。\n\
  \n> **注意**\n> 索引策略不仅仅是创建索引，还包括清理那些由于统计信息更优和优化器在没有索引的情况下也能生成良好查询计划而不再使用的索引。\n\n以下是一个典型的被动识别性能不佳的\
  \ SQL 语句并通过索引改进性能的流程：\n\n1.  识别出一个性能不佳的 SQL 语句（用户投诉某个特定语句，数据库管理员运行自动数据库诊断监视器 (`ADDM`)\
  \ 或自动工作负载仓库 (`AWR`) 报告以识别消耗资源的 SQL 等）。\n2.  数据库管理员检查表和索引统计信息，确保过时的统计信息没有导致优化器做出糟糕的选择。\n\
  3.  数据库管理员/开发人员确定无法以缓解性能问题的方式重写该查询。\n4.  数据库管理员/开发人员检查 SQL 语句，通过检查`SELECT`、`FROM`和`WHERE`子句，确定正在访问哪些表和列。\n\
  5.  数据库管理员/开发人员执行测试，并基于一个表和一个或多个列，建议创建索引。\n\n一旦您识别出一个性能不佳的 SQL 查询，请考虑在以下情况下创建索引：\n\
  \n*   在`WHERE`子句中常用作谓词的列上创建索引；当`WHERE`子句中使用了一个表的多个列时，考虑使用连接（多列）索引。\n*   在`SELECT`子句的所有列上创建一个覆盖索引（即，索引包含查询涉及的所有列）。\n\
  *   在用于`ORDER BY`、`GROUP BY`、`UNION`和`DISTINCT`子句的列上创建索引。\n\n\n\n## Oracle 索引的创建与优化\n\
  \nOracle 允许你创建包含多于一列的索引。这种多列索引被称为拼接索引（也称为复合索引）。当你在访问表时经常在 `WHERE` 子句中使用多个列时，这些索引尤其有效。在许多情况下，拼接索引比创建独立的单列索引效率更高（更多细节请参阅本章后面的“创建拼接索引”部分）。\n\
  \n包含在 `SELECT` 和 `WHERE` 子句中的列也是索引的潜在候选。有时，`SELECT` 子句中的覆盖索引会使 Oracle 直接使用索引结构本身（而不是表）来满足查询结果。此外，如果列值具有足够的区分度，Oracle\
  \ 可以使用对 `WHERE` 子句中引用列建立的索引来提高查询性能。\n\n还需考虑对用于 `ORDER BY`、`GROUP BY`、`UNION` 和 `DISTINCT`\
  \ 子句的列创建索引。这可能会提高频繁使用这些 SQL 结构的查询的效率。\n\n一个表拥有多个索引是可以的。然而，在一个表上放置的索引越多，DML 语句的执行速度就越慢。不要陷入盲目地向表添加索引，直到偶然找到正确的索引列组合的陷阱。相反，应在生产环境创建索引之前验证其性能。Oracle\
  \ 18c 改进了其对索引使用情况的审查方式，在决定保留索引或是否需要不同索引时，可以考虑这些统计信息。\n\n同时请谨记，添加一个索引可能会提高某条语句的性能，同时损害其他语句的性能。你必须确保性能得到提升的语句值得对其他语句施加的性能损耗。只有在确定索引会提高性能时，才应添加它。\n\
  \n### 规划健壮性\n\n在决定需要创建索引后，做出一些将影响可维护性和可用性的基础性决策是审慎的做法。Oracle 提供了广泛的索引特性和选项。作为 DBA\
  \ 或开发人员，你需要了解各种特性以及如何使用它们。如果选择了错误的索引类型或错误地使用了某个特性，可能会产生严重且有害的性能影响。在创建索引之前，需要考虑的管理特性列举如下：\n\
  \n*   索引类型\n*   所需初始空间及增长\n*   创建索引时的临时表空间使用情况（针对大型索引）\n*   表空间放置\n*   命名约定\n* \
  \  包含哪些列\n*   是使用单列还是列的组合\n*   特殊特性，例如 `PARALLEL` 子句、`NOLOGGING`、压缩和不可见索引\n*   唯一性\n\
  *   对 `SELECT` 语句性能的影响（提升）\n*   对 `INSERT`、`UPDATE` 和 `DELETE` 语句性能的影响\n\n这些主题将在本章后续章节中讨论。\n\
  \n### 确定要使用的索引类型\n\nOracle 提供了广泛的索引类型和特性。正确使用索引可以带来性能良好且可扩展的数据库应用程序。相反，如果错误或不明智地实现某个特性，可能会产生有害的性能影响。表\
  \ 8-1 总结了可用的各种 Oracle 索引类型。乍一看，这个列表很长，对于 Oracle 新手来说可能有点难以承受。然而，决定使用哪种索引类型并不像最初看起来那么令人生畏。对于大多数应用程序，你应简单地使用默认的\
  \ B 树索引类型。\n\n**表 8-1 Oracle 索引类型及使用描述**\n\n| 索引类型 | 使用描述 |\n| --- | --- |\n| B\
  \ 树 | 默认索引；适用于高基数（即高区分度）的列。除非有具体理由使用不同的索引类型或特性，否则请使用普通的 B 树索引。 |\n| IOT | 当大部分列值都包含在主键中时，此索引效率很高。你访问索引就像访问表一样。数据存储在类似\
  \ B 树的结构中。有关此索引类型的详细信息，请参见第 7 章。 |\n| 唯一索引 | B 树索引的一种形式；用于强制列值的唯一性；常与主键和唯一键约束一起使用，但也可以独立于约束创建。\
  \ |\n| 反向键索引 | B 树索引的一种形式；对于平衡具有许多顺序插入的索引的 I/O 非常有用。 |\n| 键压缩 | 适用于前导列经常重复的拼接索引；压缩叶块条目；适用于\
  \ B 树和 IOT 索引。 |\n| 降序索引 | B 树索引的一种形式；用于索引中相应列值按降序排序的情况（默认顺序是升序）。你不能为反向键索引指定降序，如果索引类型是位图，Oracle\
  \ 会忽略降序。 |\n| 位图索引 | 在数据仓库环境中，对于低基数（即低区分度）的列以及 `WHERE` 子句中使用许多 `AND` 或 `OR` 运算符的\
  \ SQL 语句非常出色。位图索引不适用于行频繁更新的 OLTP 数据库。你无法创建唯一的位图索引。 |\n| 位图连接索引 | 在数据仓库环境中，对于使用连接事实表和维度表的星型模式结构的查询非常有用。\
  \ |\n| 基于函数的索引 | 适用于应用了 SQL 函数的列；可与 B 树或位图索引一起使用。 |\n| 索引虚拟列 | 在表的虚拟列上定义的索引；适用于应用了\
  \ SQL 函数的列；是函数索引的一种可行替代方案。 |\n| 虚拟索引 | 通过 `CREATE INDEX` 的 `NOSEGMENT` 子句创建没有物理段或区间的索引；对于在不消耗构建物理索引所需资源的情况下调整\
  \ SQL 非常有用。任何索引类型都可以创建为虚拟索引。 |\n| 不可见索引 | 索引对查询优化器不可见。然而，随着表数据的修改，索引的结构会被维护。在将索引对应用程序可见之前进行测试时非常有用。任何索引类型都可以创建为不可见索引。\
  \ |\n| 全局分区索引 | 跨越分区表或常规表中所有分区的全局索引；可以是 B 树索引类型，不能是位图索引类型。 |\n| 本地分区索引 | 基于分区表中各个分区的本地索引；可以是\
  \ B 树或位图索引类型。 |\n| 域索引 | 特定于应用程序或专用组件。 |\n| B 树集群索引 | 与集群表一起使用。 |\n| 哈希集群索引 | 与哈希集群一起使用。\
  \ |\n\n> 注意 表 8-1 中列出的几种索引类型实际上只是 B 树索引的变体。例如，反向键索引仅仅是一种 B 树索引，它针对当索引值是顺序生成并以相似值插入时，优化了\
  \ I/O 的均匀分布。\n\n本章重点介绍最常用的索引和特性——B 树、基于函数的索引、唯一索引、位图索引、反向键索引和键压缩索引——以及最常用的选项。IOT\
  \ 在第 7 章介绍，分区索引在第 12 章介绍。如果你需要更多关于索引类型或特性的信息，请参阅《Oracle SQL 参考指南》，该指南可从 Oracle 网站技术网络区域（\
  \ [`http://otn.oracle.com`](http://otn.oracle.com) ）下载。\n\n\n## 估算索引创建前的大小\n\n如果你不处理大型数据库，那么无需担心估算索引最初将消耗的空间量。然而，对于大型数据库，你绝对需要估算创建索引将占用多少空间。如果在数据仓库环境中有一个大型表，对应的索引可能轻松达到数百\
  \ GB 的大小。在这种情况下，你需要确保数据库有足够的磁盘空间可用。\n\n预测索引大小的最佳方法是在一个具有代表性生产数据的测试环境中创建它。如果你无法构建完整的生产数据副本，通常可以使用数据子集来推断生产所需的空间。如果没有使用生产数据切片的便利，你也可以使用\
  \ `DBMS_SPACE.CREATE_INDEX_COST` 过程来估算索引的大小。\n\n**注意：**\n\n我见过大小达数百 GB 的表，但索引空间是表空间的两倍。这不是因为索引有更多列，而是因为它有如此多的不同索引。为每个非常大的表设置三个或更多索引很快就会累加起来。\n\
  \n作为参考，以下是后续示例所基于的索引所使用的表创建脚本：\n\n```sql\nSQL> CREATE TABLE cust\n(cust_id    NUMBER\n\
  ,last_name  VARCHAR2(30)\n,first_name VARCHAR2(30)\n) TABLESPACE users;\n```\n\n\
  接下来，向前面的表中插入数千条记录。以下是插入语句的片段：\n\n```sql\nSQL> insert into cust values(7,'ACER','SCOTT');\n\
  SQL> insert into cust values(5,'STARK','JIM');\nSQL> insert into cust values(3,'GREY','BOB');\n\
  SQL> insert into cust values(11,'KAHN','BRAD');\nSQL> insert into cust values(21,'DEAN','ANN');\n\
  ...\n```\n\n现在，假设你想在 `CUST` 表上创建一个索引，如下所示：\n\n```sql\nSQL> create index cust_idx1\
  \ on cust(last_name);\n```\n\n以下是估算索引最初将消耗空间量的过程：\n\n```sql\nSQL> set serverout\
  \ on\nSQL> exec dbms_stats.gather_table_stats(user,'CUST');\nSQL> variable used_bytes\
  \ number\nSQL> variable alloc_bytes number\nSQL> exec dbms_space.create_index_cost(\
  \ 'create index cust_idx1 on cust(last_name)', -\n:used_bytes, :alloc_bytes );\n\
  SQL> print :used_bytes\n```\n\n这是此示例的一些示例输出：\n\n```sql\nUSED_BYTES\n----------\n\
  ...\n\nSQL> print :alloc_bytes\nALLOC_BYTES\n-----------\n...\n```\n\n`used_bytes`\
  \ 变量为你提供索引数据所需空间量的估算值。`alloc_bytes` 变量提供将在表空间内分配的空间量的估算值。\n\n接下来，继续创建索引。\n\n```sql\n\
  SQL> create index cust_idx1 on cust(last_name);\n```\n\n实际消耗的空间量由此查询显示：\n\n```sql\n\
  SQL> select bytes from user_segments where segment_name='CUST_IDX1';\n```\n\n输出表明，估算的分配字节数与实际消耗的空间量大致相当：\n\
  \n```sql\nBYTES\n----------\n...\n```\n\n你的结果可能会有所不同，具体取决于记录数量、列数量、数据类型和统计信息的准确性。\n\
  \n除了初始大小调整，请记住随着记录插入到表中，索引将会增长。你将必须监控索引消耗的空间，并确保存在足够的磁盘空间以适应未来的增长需求。\n\n## 创建索引与临时表空间空间\n\
  \n与空间使用相关，有时 DBA 会忘记 Oracle 在创建索引时通常需要在内存或磁盘中进行排序的空间。如果可用内存区域被耗尽，那么 Oracle 会在默认临时表空间中根据需要分配磁盘空间。如果你正在创建一个大型索引，可能需要增加临时表空间的大小。\n\
  \n另一种方法是创建一个额外的临时表空间，然后将其指定为创建索引的用户的默认临时表空间。索引创建后，你可以删除临时表空间（专为新索引创建的那个），并将用户的默认临时表空间重新分配回原始的临时表空间。\n\
  \n## 为索引创建独立的表空间\n\n对于关键应用，你必须考虑表和索引将消耗多少空间以及它们增长的速度。空间消耗和对象增长对数据库可用性有直接影响。如果空间耗尽，你的数据库将变得不可用。管理数据库中空间的最佳方法是创建根据空间需求定制的表空间，然后将对象创建在你为这些对象设计的指定表空间中。考虑到这一点，我建议你将表和索引分离到不同的表空间中。考虑以下原因：\n\
  \n*   这样做允许不同的备份和恢复要求。你可能希望拥有比表更灵活的索引备份频率。或者，你可能选择不备份索引，因为你知道可以重新创建它们。\n*   如果你让表或索引从表空间继承其存储特性，那么在使用独立表空间时，你可以为在表空间内创建的对象定制存储属性。表和索引通常有不同的存储要求（例如区大小和日志记录）。\n\
  *   在运行维护报告时，当报告按表空间分隔部分时，管理表和索引有时会更容易。\n\n如果这些原因在你的环境中是有效的，那么为表和索引使用不同的表空间可能值得付出额外的努力。如果你没有任何前述需求，那么将表和索引放在同一个表空间中也是可以的。\n\
  \n我应该指出，DBA 经常出于性能考虑而考虑将索引放在独立的表空间中。如果你有幸从头开始创建存储系统，并可以设置拥有自己的磁盘和控制器的挂载点，那么通过将表和索引分离到不同的表空间，你可能会看到一些\
  \ I/O 优势。如今，存储管理员通常会在存储区域网络（SAN）中给你一大块存储，并且无法保证数据和索引会物理存储在独立的磁盘（和控制器）上。因此，通过将表和索引分离到不同的表空间，你通常不会获得任何性能优势。\n\
  \n以下代码展示了为表和索引构建独立表空间的示例。它创建了本地管理的表空间，使用固定区大小和自动段空间管理：\n\n```sql\nSQL> CREATE TABLESPACE\
  \ reporting_data\nDATAFILE '/u01/dbfile/O18C/reporting_data01.dbf' SIZE 1G\nEXTENT\
  \ MANAGEMENT LOCAL\nUNIFORM SIZE 1M\nSEGMENT SPACE MANAGEMENT AUTO;\n--\nSQL> CREATE\
  \ TABLESPACE reporting_index\nDATAFILE '/u01/dbfile/O18C/reporting_index01.dbf'\
  \ SIZE 500M\nEXTENT MANAGEMENT LOCAL\nUNIFORM SIZE 128K\nSEGMENT SPACE MANAGEMENT\
  \ AUTO;\n```\n\n\n我倾向于使用统一的区大小，因为这能确保表空间中的所有区都具有相同的大小，从而在创建和删除对象时减少碎片。自动段空间管理功能使得\
  \ Oracle 能够自动管理许多以前需要 DBA 手动监控和维护的存储属性。\n\n### 从表空间继承存储参数\n\n创建表或索引时，有几个与表空间相关的技术细节需要注意。例如，如果在创建表和索引时没有指定存储参数，那么它们将从表空间继承存储参数。在大多数情况下，这是期望的行为；它节省了您手动指定这些参数的麻烦。如果您需要创建一个存储参数与其表空间不同的对象，则可以在\
  \ `CREATE TABLE/INDEX` 语句中进行设置。\n\n另外请记住，如果您没有显式指定表空间，默认情况下，索引将创建在用户的默认永久表空间中。这对于开发和测试环境是可以接受的。对于生产环境，您应该考虑在\
  \ `CREATE TABLE/INDEX` 语句中显式指定表空间名称。\n\n### 根据区大小将索引放置在表空间中\n\n如果您知道索引初始可能有多大或其增长需求是什么，可以考虑将索引放置在表空间大小和区大小都合适的表空间中。我有时会为每个应用程序创建两个或更多的索引表空间。以下是一个示例：\n\
  \n```\nSQL> create tablespace inv_idx_small\ndatafile '/u01/dbfile/O18C/inv_idx_small01.dbf'\
  \ size 100m\nextent management local\nuniform size 128k\nsegment space management\
  \ auto;\n--\nSQL> create tablespace inv_idx_med\ndatafile '/u01/dbfile/O18C/inv_idx_med01.dbf'\
  \ size 1000m\nextent management local\nuniform size 4m\nsegment space management\
  \ auto;\n```\n\n具有小空间和增长需求的索引被放置在 `INV_IDX_SMALL` 表空间中，具有中等存储需求的索引则创建在 `INV_IDX_MED`\
  \ 表空间中。如果您发现某个索引以未预期的速度增长，考虑删除该索引并在不同的表空间中重新创建，或者在更合适的表空间中重建索引。\n\n### 创建可移植的脚本\n\
  \n我经常发现自己在多个数据库环境中工作，例如开发、测试和生产。通常，我会先在开发环境中创建表空间，然后在测试环境中创建，最后在生产环境中创建。脚本在通过各个环境升级时，通常需要更改某些方面。例如，开发环境可能只需要\
  \ 100MB 空间，而生产环境可能需要 10GB。\n\n在这些情况下，使用&符号变量可以使脚本在不同环境间具有一定的可移植性。例如，下面的脚本在脚本顶部使用一个&符号变量来定义表空间大小。然后在\
  \ `CREATE TABLESPACE` 语句中引用这个&符号变量：\n\n```\nSQL> define reporting_index_size=100m\n\
  --\nSQL> create tablespace reporting_index\ndatafile '/u01/dbfile/O18C/reporting_index01.dbf'\
  \ size &&reporting_index_size\nextent management local\nuniform size 128k\nsegment\
  \ space management auto;\n```\n\n如果您只处理一个表空间，那么使用前述技术的好处不大。但是，如果您要在众多环境中创建数十个表空间，那么构建可重用性就很有价值。请记住，您可以在脚本中的任何位置使用&符号变量来定义您认为可能因环境而异的任何值。\n\
  \n### 建立命名标准\n\n在创建和管理索引时，制定一些命名标准是非常可取的。考虑以下动机：\n\n*   当错误消息包含指示表、索引类型等信息时，问题诊断得以简化。\n\
  *   显示索引信息的报告更容易分组，因此更具可读性，从而更容易发现模式和问题。\n\n考虑到这些需求，以下是一些索引命名指南示例：\n\n*   主键索引名称应包含表名和后缀，例如\
  \ `_PK`。\n*   唯一键索引名称应包含表名和后缀，例如 `_UKN`，其中 `N` 是一个数字。\n*   外键列上的索引应包含外键表名和后缀，例如\
  \ `_FKN`，其中 `N` 是一个数字。\n*   不用于约束的索引应包含表名和后缀，例如 `_IDXN`，其中 `N` 是一个数字。\n*   基于函数的索引名称应包含表名和后缀，例如\
  \ `_FNXN`，其中 `N` 是一个数字。\n*   位图索引名称应包含表名和后缀，例如 `_BMXN`，其中 `N` 是一个数字。\n\n有些机构在命名索引时使用前缀。例如，主键索引会被命名为\
  \ `PK_CUST`（而不是 `CUST_PK`）。所有这些不同的命名标准都是有效的。\n\n> **提示**\n> 标准是什么并不重要，只要团队中的每个人都遵循相同的标准即可。\n\
  \n## 创建索引\n\n如前所述，当您考虑创建表时，必须考虑相应的索引架构。创建适当的索引并使用正确的索引功能通常会带来显著的性能提升。相反，在错误的列上创建索引或在错误的情况下使用功能可能会导致显著的性能下降。\n\
  \n话虽如此，在考虑了您需要哪种索引之后，下一个合乎逻辑的步骤就是创建索引。创建索引和实现特定功能将在接下来的几个部分中讨论。\n\n### 创建 B 树索引\n\
  \nOracle 中的默认索引类型是 B 树索引。要在现有表上创建 B 树索引，请使用 `CREATE INDEX` 语句。此示例在 `CUST` 表上创建一个索引，指定\
  \ `LAST_NAME` 作为列：\n\n```\nSQL> CREATE INDEX cust_idx1 ON cust(last_name);\n```\n\
  \n默认情况下，Oracle 将在您的默认永久表空间中创建索引。有时，这可能是期望的行为。但通常，出于可管理性的原因，您希望在特定表空间中创建索引。使用以下语法指示\
  \ Oracle 在特定表空间中构建索引：\n\n```\nSQL> CREATE INDEX cust_idx1 ON cust(last_name) TABLESPACE\
  \ reporting_index ;\n```\n\n> **提示**\n> 如果您没有为索引指定任何物理存储属性，索引将从其创建的表空间继承属性。这通常是管理索引存储的可接受方法。\n\
  \n由于 B 树索引是默认类型并在 Oracle 应用程序中广泛使用，值得花些时间解释这种特定类型的索引是如何工作的。理解索引工作原理的一个好方法是展示其概念结构，以及它与表的关系（索引不能脱离表而存在）。看看图\
  \ 8-1；顶部部分说明了 `CUST` 表及其一些数据。表数据存储在两个独立的数据文件中，每个数据文件包含两个块。图表底部显示了一个名为 `CUST_IDX1`\
  \ 的 B 树索引的平衡树状结构，该索引创建在 `CUST` 表的 `LAST_NAME` 上。索引存储在一个数据文件中，由四个块组成。\n\n![Oracle\
  \ B 树层次索引结构及关联表](img/214899_3_En_8_Fig1_HTML.jpg)\n\n**图 8-1** Oracle B 树层次索引结构及关联表\n\
  \n\n\n## 索引结构与工作原理\n\n索引被定义为与表及其列相关联。索引结构存储了表的 `ROWID` 与构建索引所在列的数据之间的映射关系。`ROWID`\
  \ 通常唯一地标识数据库中的一行，并包含用于物理定位该行的信息（数据文件、块以及行在块内的位置）。图 8-1 中的两条虚线描绘了（索引结构中的）`ROWID`\
  \ 如何指向表中对应列值为 `ACER` 的物理行。\n\nB-tree 索引具有层次化的树状结构。当 Oracle 访问索引时，它从顶部节点（称为根块或头块）开始。Oracle\
  \ 使用此块来确定接下来要读取的哪个二级块（也称为分支块）。二级块指向多个三级块（叶节点），这些叶节点包含 `ROWID` 和名称值。在此结构中，查找 `ROWID`\
  \ 需要三次 I/O 操作。一旦确定了 `ROWID`，Oracle 将使用它来读取包含该 `ROWID` 的表块。\n\n几个例子将有助于说明索引的工作原理。考虑以下查询：\n\
  \n```sql\nSQL> select last_name from cust where last_name = 'ACER';\n```\n\nOracle\
  \ 访问索引，首先读取块 20（根块）；然后确定需要读取块 30（分支块）；最后从叶节点块 39 读取索引值。从概念上讲，这需要三次 I/O 操作。在本例中，Oracle\
  \ 不需要读取表，因为索引包含足够的信息来满足查询结果。你可以使用 `autotrace` 工具验证查询的访问路径；例如：\n\n```sql\nSQL> set\
  \ autotrace trace explain;\nSQL> select last_name from cust where last_name = 'ACER';\n\
  ```\n\n请注意，只访问了索引（而不是表）来返回数据：\n\n```\n| Id  | Operation        | Name     | Rows\
  \ | Bytes | Cost (%CPU)| Time     |\n|---|---|---|---|---|---|---|\n|   0 | SELECT\
  \ STATEMENT |          |    1 |     6 |     1   (0)| 00:00:01 |\n|*  1 |  INDEX\
  \ RANGE SCAN| CUST_IDX1|    1 |     6 |     1   (0)| 00:00:01 |\n```\n\n再考虑这个查询：\n\
  \n```sql\nSQL> select first_name, last_name from cust where last_name = 'ACER';\n\
  ```\n\n在这里，Oracle 会遵循相同的索引访问路径，读取块 20、30 和 39。然而，由于索引结构不包含 `FIRST_NAME` 的值，Oracle\
  \ 还必须使用 `ROWID` 来读取 `CUST` 表中相应的行（块 11 和 2500）。以下是 `autotrace` 输出的片段，表明表也被访问了：\n\
  \n```\n| Id  | Operation                           | Name     | Rows | Bytes | Cost\
  \ |\n|---|---|---|---|---|---|\n|   0 | SELECT STATEMENT                    |  \
  \        |    1 |    44 |    2 |\n|   1 |  TABLE ACCESS BY INDEX ROWID BATCHED|\
  \ CUST     |    1 |    44 |    2 |\n|*  2 |   INDEX RANGE SCAN                 \
  \ | CUST_IDX1|    1 |      |    1 |\n```\n\n另请注意图 8-1 底部叶节点之间的双向箭头。这说明叶节点通过双向链表连接，从而使索引范围扫描成为可能。例如，假设你有这个查询：\n\
  \n```sql\nSQL> select last_name from cust where last_name >= 'A' and last_name <=\
  \ 'J';\n```\n\n为了确定从哪里开始范围扫描，Oracle 会读取块 20（根块）、块 30（分支块），最后是块 39（叶节点块）。由于叶节点块是链接的，Oracle\
  \ 可以根据需要向前导航以找到所有必需的块（而无需通过分支块上下导航）。这是一种非常高效的范围扫描遍历机制。\n\n### 索引视图\n\nOracle 提供两种包含\
  \ B-tree 索引结构详细信息的视图：\n\n*   `INDEX_STATS`\n*   `DBA/ALL/USER_INDEXES`\n\n`INDEX_STATS`\
  \ 视图包含有关 `HEIGHT`（从根块到叶块的块数）、`LF_ROWS`（索引条目数）等信息。`INDEX_STATS` 视图仅在分析索引结构后才会填充；例如：\n\
  \n```sql\nSQL> analyze index cust_idx1 validate structure;\n```\n\n`DBA/ALL/USER_INDEXES`\
  \ 视图包含统计信息，例如 `BLEVEL`（从根块到分支块的块数；这等于 `HEIGHT – 1`）、`LEAF_BLOCKS`（叶块数）等。这些视图在索引创建时自动填充，并通过\
  \ `DBMS_STATS` 包进行刷新。\n\n### 创建复合索引\n\nOracle 允许你创建包含多列的索引。多列索引被称为复合索引。当你经常在访问表时在\
  \ `WHERE` 子句中使用多列时，这些索引尤其有效。\n\n假设你遇到以下场景，其中同一表的两个列用于 `WHERE` 子句：\n\n```sql\nSQL>\
  \ select first_name, last_name\nfrom cust\nwhere first_name = 'JIM'\nand last_name\
  \ = 'STARK';\n```\n\n因为 `FIRST_NAME` 和 `LAST_NAME` 经常一起用于 `WHERE` 子句检索数据，所以为这两列创建复合索引可能更高效：\n\
  \n```sql\nSQL> create index cust_idx2 on cust(first_name, last_name);\n```\n\n通常，很难确定复合索引是否比单列索引更高效。对于前面的\
  \ SQL 语句，你可能想知道创建两个分别在 `FIRST_NAME` 和 `LAST_NAME` 上的单列索引是否更有效，例如：\n\n```sql\nSQL>\
  \ create index cust_idx3 on cust(first_name);\nSQL> create index cust_idx4 on cust(last_name);\n\
  ```\n\n在此场景中，如果你持续使用出现在 `WHERE` 子句中的列组合，那么优化器很可能会使用复合索引而不是单列索引。在这些情况下，使用复合索引通常高效得多。你可以通过生成执行计划来验证优化器是否选择了复合索引；例如：\n\
  \n```sql\nSQL> set autotrace trace explain;\n```\n\n然后，运行此查询：\n\n```sql\nSQL> select\
  \ first_name, last_name\nfrom cust\nwhere first_name = 'JIM'\nand last_name = 'STARK';\n\
  ```\n\n以下是一些示例输出，表明优化器使用了 `CUST_IDX2` 上的复合索引来检索数据：\n\n```\n| Id  | Operation   \
  \     | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n|---|---|---|---|---|---|---|\n\
  |   0 | SELECT STATEMENT |           |     1 |    44 |     1   (0)| 00:00:01 |\n\
  |*  1 |  INDEX RANGE SCAN| CUST_IDX2 |     1 |    44 |     1   (0)| 00:00:01 |\n\
  ```\n\n在较旧版本的 Oracle（大约版本 8）中，只有当前导列（或列组）出现在 `WHERE` 子句中时，才能使用复合索引。在现代版本中，即使 `WHERE`\
  \ 子句中没有出现前导列（或列组），优化器也可以使用复合索引。这种无需引用前导列即可使用索引的能力被称为跳跃扫描特性。\n\n在特定情况下，用于跳跃扫描的复合索引可能比全表扫描更高效。但是，你应该尝试创建使用前导列的复合索引。如果你持续只使用复合索引的后随列，那么请考虑在后随列上创建单列索引。\n\
  \n### 在同一列集上创建多个索引\n\n在 Oracle Database 12c 之前，不能在一个表的完全相同的列组合上定义多个索引。这一点在 12c 中发生了变化。你现在可以在同一组列上拥有多个索引。但是，只有当索引在物理上存在差异时，你才能这样做，例如，一个索引创建为\
  \ B-tree 索引，第二个创建为位图索引。\n\n此外，对于相同的列组合，只能有一个可见索引。在同一组列上创建的任何其他索引都必须声明为不可见；例如：\n\n\
  \n\n## Oracle 数据库索引实现指南\n\n### 实现不可见索引\n\n在 Oracle Database 12c 之前，如果你尝试执行之前的操作，第二个创建语句会抛出类似于\
  \ `ORA-01408: such column list already indexed` 的错误。\n\n为什么要在同一组列上定义两个索引？如果你最初实现了\
  \ B-tree 索引，而现在想将其更改为位图索引，你可能会这样做——思路是，你将新索引创建为不可见的，然后删除原始索引，并使新索引可见。在大型数据库环境中，这能使你快速完成更改。更多信息请参阅\"\
  实现不可见索引\"部分。\n\n### 实现基于函数的索引\n\n基于函数的索引在其定义中使用了 SQL 函数或表达式。当查询使用 SQL 函数时，有时需要基于函数的索引。例如，考虑以下使用了\
  \ SQL `UPPER` 函数的查询：\n\n```sql\nSQL> select first_name from cust where UPPER(first_name)\
  \ = 'JIM';\n```\n\n在这种情况下，`FIRST_NAME` 列上可能存在一个普通的 B-tree 索引，但当对列应用函数时，Oracle 不会使用该列上存在的常规索引。\n\
  \n在这种情况下，你可以创建一个基于函数的索引，以提高在 `WHERE` 子句中使用 SQL 函数的查询的性能。以下示例创建了一个基于函数的索引：\n\n```sql\n\
  SQL> create index cust_fnx1 on cust(upper(first_name));\n```\n\n基于函数的索引允许对 SQL 查询\
  \ `WHERE` 子句中由函数引用的列进行索引查找。该索引可以像前面的例子一样简单，也可以基于存储在 PL/SQL 函数中的复杂逻辑。\n\n**注意**\n\
  任何用户创建的 SQL 函数必须声明为确定性的，才能在基于函数的索引中使用。*确定性*意味着对于给定的输入集，函数总是返回相同的结果。当你创建一个要在基于函数的索引中使用的用户定义函数时，必须使用\
  \ `DETERMINISTIC` 关键字。\n\n如果你想查看基于函数的索引的定义，可以从 `DBA/ALL/USER_IND_EXPRESSIONS` 视图中选择以显示与索引关联的\
  \ SQL。如果你正在使用 SQL*Plus，请务必先执行 `SET LONG` 命令；例如，\n\n```sql\nSQL> SET LONG 500\nSQL>\
  \ select index_name, column_expression from user_ind_expressions;\n```\n\n此示例中的\
  \ `SET LONG` 命令告诉 SQL*Plus 从 `COLUMN_EXPRESSION` 列（其类型为 `LONG`）中显示最多 500 个字符。\n\n\
  ### 创建唯一索引\n\n创建 B-tree 索引时，还可以指定索引为唯一的。这样做可以确保在插入或更新表中的列时，非 `NULL` 值是唯一的。\n\n假设你已确定表中的一个列（或列组合）（主键之外）在\
  \ `WHERE` 子句中被大量使用。此外，该列（或列组合）要求在表中是唯一的。这是使用唯一索引的一个很好的场景。使用 `UNIQUE` 子句创建唯一索引：\n\
  \n```sql\nSQL> create unique index cust_uk1 on cust(first_name, last_name);\n```\n\
  \n**注意**\n唯一索引不会强制对插入表中的 `NULL` 值保持唯一性。换句话说，你可以在索引列中为多行插入 `NULL` 值。\n\n你必须注意关于唯一索引、主键约束和唯一键约束的一些有趣细微差别（有关主键约束和唯一键约束的详细讨论，请参见第\
  \ 7 章）。当你创建主键约束或唯一键约束时，Oracle 会自动创建一个唯一索引和一个在 `DBA/ALL/USER_CONSTRAINTS` 中可见的相应约束。\n\
  \n当你仅显式创建唯一索引时（如本节示例所示），Oracle 会创建唯一索引，但不会在 `DBA/ALL/USER_CONSTRAINTS` 中添加约束条目。为什么这很重要？考虑以下场景：\n\
  \n```sql\nSQL> create unique index cust_uk1 on cust(first_name, last_name);\nSQL>\
  \ insert into cust values(500,'JOHN','DEERE');\nSQL> insert into cust values(501,'JOHN','DEERE');\n\
  ```\n\n这是抛出的相应错误消息：\n\n```\nERROR at line 1:\nORA-00001: unique constraint (MV_MAINT.CUST_UK1)\
  \ violated\n```\n\n如果要求你排查此问题，你首先会查找 `DBA_CONSTRAINTS` 中名为 `CUST_UK1` 的约束。然而，没有信息：\n\
  \n```sql\nSQL> select constraint_name\nfrom dba_constraints\nwhere constraint_name='CUST_UK1';\n\
  ```\n\n输出如下：\n\n```\nno rows selected\n```\n\n`no rows selected` 消息可能令人困惑：插入表时抛出的错误消息表明违反了唯一约束，但约束相关的数据字典视图中却没有信息。在这种情况下，你必须查看\
  \ `DBA_INDEXES` 和 `DBA_IND_COLUMNS` 以查看已创建的唯一索引的详细信息：\n\n```sql\nSQL> select a.owner,\
  \ a.index_name, a.uniqueness, b.column_name\nfrom dba_indexes a, dba_ind_columns\
  \ b\nwhere a.index_name='CUST_UK1'\nand   a.table_owner = b.table_owner\nand   a.index_name\
  \ = b.index_name;\n```\n\n如果你希望在 `DBA/ALL/USER_CONSTRAINTS` 视图中有与约束相关的信息，可以在索引创建后显式关联一个约束：\n\
  \n```sql\nSQL> alter table cust add constraint cust_idx1 unique(first_name, last_name);\n\
  ```\n\n在这种情况下，你可以独立于索引来启用和禁用约束。但是，由于索引是作为唯一索引创建的，无论约束是否被禁用，索引仍然强制执行唯一性。\n\n何时应该显式创建唯一索引，而不是创建约束并让\
  \ Oracle 自动创建索引？没有硬性规定。我倾向于创建唯一键约束并让 Oracle 自动创建唯一索引，因为这样我可以在 `DBA/ALL/USER_CONSTRAINTS`\
  \ 和 `DBA/ALL/USER_INDEXES` 视图中都获得信息。\n\n但是，Oracle 的文档建议，如果你的情况是严格使用唯一约束来提高查询性能，则最好只创建唯一索引。这是合适的。如果你采用这种方法，只需意识到在约束相关的数据字典视图中可能找不到任何信息。\n\
  \n### 实现位图索引\n\n位图索引推荐用于具有相对较低不同值数量（低基数）的列。由于锁问题，你不应在具有高 `INSERT`/`UPDATE`/`DELETE`\
  \ 活动的 OLTP 数据库中使用位图索引；位图索引的结构导致在 DML 操作期间可能锁定许多行，这会引起高事务处理量的 OLTP 系统的锁定问题。\n\n位图索引通常用于数据仓库环境。一个典型的星型模式结构由一个大的事实表和许多小的维度（查找）表组成。在这些场景中，在事实表的外键列上创建位图索引是常见的做法。事实表通常每天插入数据，并且通常不会更新或删除。\n\
  \n下面是一个简单的示例，演示位图索引的创建和结构。首先，创建一个 `LOCATIONS` 表：\n\n```sql\nSQL> create table locations(\n\
  location_id number\n,region      varchar2(10));\n```\n\n现在，将以下行插入表中：\n\n\n### 位图索引\n\
  \n```\nSQL> insert into locations values(1,'NORTH');\nSQL> insert into locations\
  \ values(2,'EAST');\nSQL> insert into locations values(3,'NORTH');\nSQL> insert\
  \ into locations values(4,'WEST');\nSQL> insert into locations values(5,'EAST');\n\
  SQL> insert into locations values(6,'NORTH');\nSQL> insert into locations values(7,'NORTH');\n\
  ```\n\n你使用 `BITMAP` 关键字来创建位图索引。下面的代码在 `LOCATIONS` 表的 `REGION` 列上创建了一个位图索引：\n\n```\n\
  SQL> create bitmap index locations_bmx1 on locations(region);\n```\n\n当 `WHERE`\
  \ 子句中出现多个 `AND` 和 `OR` 条件时，位图索引在检索行时非常有效。例如，要执行任务 `find all rows with a region of\
  \ EAST or WEST`，会对 `EAST` 和 `WEST` 的位图执行布尔代数 `OR` 操作，以快速返回行 2、4 和 5。表 8-2 的最后一行显示了\
  \ `EAST` 和 `WEST` 位图上的 `OR` 操作结果。\n\n**表 8-2 `OR` 操作的结果**\n\n| 值/行 | 行 1 | 行 2 |\
  \ 行 3 | 行 4 | 行 5 | 行 6 | 行 7 |\n| :--- | :--- | :--- | :--- | :--- | :--- | :---\
  \ | :--- |\n| `EAST` | 0 | 1 | 0 | 0 | 1 | 0 | 0 |\n| `WEST` | 0 | 0 | 0 | 1 | 0\
  \ | 0 | 0 |\n| `EAST` 和 `WEST` 上的布尔 `OR` | 0 | 1 | 0 | 1 | 1 | 0 | 0 |\n\n> **注意**：位图索引和位图连接索引仅在\
  \ Oracle 数据库的企业版中可用。此外，你无法创建唯一的位图索引。\n\n#### 创建位图连接索引\n\n位图连接索引在两个表之间连接的结果存储在索引中。位图连接索引很有益，因为它们避免了为了检索结果而连接表。位图连接索引的语法与常规位图索引的不同之处在于它包含\
  \ `FROM` 和 `WHERE` 子句。以下是创建位图连接索引的基本语法：\n\n```\nSQL> create bitmap index <index_name>\n\
  on <fact_table>(<dimension_table>.<column>)\nfrom <fact_table>, <dimension_table>\n\
  where <fact_table>.<foreign_key_column> = <dimension_table>.<primary_key_column>;\n\
  ```\n\n位图连接索引适用于你正在连接两个表，使用一个表中的外键列（或多个列）关联到另一个表中的主键列（或多个列）的情况。例如，假设你通常从 `CUST`\
  \ 维度表中检索 `FIRST_NAME` 和 `LAST_NAME`，同时连接到一个大型的 `F_SHIPMENTS` 事实表。下面的例子在 `F_SHIPMENTS`\
  \ 和 `CUST` 表之间创建了一个位图连接索引：\n\n```\nSQL> create bitmap index f_shipments_bmx1\non\
  \ f_shipments(cust.first_name, cust.last_name)\nfrom f_shipments, cust\nwhere f_shipments.cust_id\
  \ = cust.cust_id;\n```\n\n现在，考虑这样一个查询：\n\n```\nSQL> select c.first_name, c.last_name\n\
  from f_shipments s, cust c\nwhere s.cust_id = c.cust_id\nand c.first_name = 'JIM'\n\
  and c.last_name = 'STARK';\n```\n\n优化器可以选择使用位图连接索引，从而避免连接表的开销。对于少量数据，优化器很可能选择不使用位图连接索引，但随着表中数据的增长，使用位图连接索引比全表扫描或其他索引更具成本效益。\n\
  \n### 实现反向键索引\n\n反向键索引类似于 B-tree 索引，只是在创建索引条目时，索引键的字节会被反转。例如，如果索引值是 201、202 和 203，则反向键索引值是\
  \ 102、202 和 302：\n\n```\n索引值              反向键值\n-------------            --------------------\n\
  201                      102\n202                      202\n203                \
  \      302\n```\n\n在需要一种方法来均匀分布索引数据的场景中，反向键索引可以表现得更好，否则这些具有相似值的数据会聚集在一起。因此，当使用反向键索引时，你可以避免在插入大量顺序值期间\
  \ I/O 集中在索引中的一个物理磁盘位置。\n\n使用 `REVERSE` 子句来创建反向键索引：\n\n```\nSQL> create index cust_idx1\
  \ on cust(cust_id) reverse;\n```\n\n你可以运行以下查询来验证索引是否是反向键的：\n\n```\nSQL> select index_name,\
  \ index_type from user_indexes;\n```\n\n以下是一些示例输出，显示 `CUST_IDX1` 索引是反向键的：\n\n```\n\
  INDEX_NAME           INDEX_TYPE\n-------------------- ---------------------------\n\
  CUST_IDX1            NORMAL/REV\n```\n\n> **注意**：你无法为位图索引或 IOT（索引组织表）指定 `REVERSE`。\n\
  \n### 创建键压缩索引\n\n索引压缩对于包含多个列且前导索引列值经常重复的索引非常有用。压缩索引在这些情况下具有以下优势：\n\n*   减少存储空间\n\
  *   在叶子块中存储更多行，这可能导致访问压缩索引时 I/O 更少\n\n假设你有一个如下定义的表：\n\n```\nSQL> create table users(\n\
  last_name  varchar2(30)\n,first_name varchar2(30)\n,address_id number);\n```\n\n\
  你希望在 `LAST_NAME` 和 `FIRST_NAME` 列上创建一个拼接索引。通过检查数据，你知道 `LAST_NAME` 列中有重复值。使用 `COMPRESS\
  \ N` 子句来创建压缩索引：\n\n```\nSQL> create index users_idx1 on users(last_name, first_name)\
  \ compress 2;\n```\n\n前面的代码指示 Oracle 在两列上创建压缩索引。你可以如下验证索引是否被压缩：\n\n```\nSQL> select\
  \ index_name, compression\nfrom user_indexes\nwhere index_name like 'USERS%';\n\
  ```\n\n以下是一些示例输出，表明该索引启用了压缩：\n\n```\nINDEX_NAME                     COMPRESS\n------------------------------\
  \ --------\nUSERS_IDX1                     ENABLED\n```\n\n> **注意**：你无法在位图索引上创建键压缩索引。\n\
  \n### 并行化索引创建\n\n在大型数据库环境中，当你尝试在填充了大量行的表上创建索引时，使用 `PARALLEL` 子句可以显著提高索引创建速度：\n\n\
  ```\nSQL> create index cust_idx1 on cust(cust_id)\nparallel 2\ntablespace reporting_index;\n\
  ```\n\n如果你未指定并行度，Oracle 会根据机器上的 CPU 数量乘以 `PARALLEL_THREADS_PER_CPU` 的值来选择一个并行度。\n\
  \n你可以运行此查询来验证与索引关联的并行度：\n\n```\nSQL> select index_name, degree from user_indexes;\n\
  ```\n\n### 在创建索引时避免重做日志生成\n\n你可以选择使用 `NOLOGGING` 子句创建索引。这样做有以下影响：\n\n*   不会生成在发生介质故障时恢复索引所需的重做日志。\n\
  *   后续的直接路径操作也不会生成在发生介质故障时恢复索引信息所需的重做日志。\n\n以下是一个使用 `NOLOGGING` 子句创建索引的示例：\n\n```\n\
  SQL> create index cust_idx1 on cust(cust_id)\nnologging\ntablespace users;\n```\n\
  \n`NOLOGGING` 的主要优点是在创建索引时，生成的重做信息量最少，这对于大型索引可能具有显著的性能影响。缺点是，如果在索引创建后不久（或通过直接路径操作插入记录后）发生介质故障，并且你从索引创建之前拍摄的备份中恢复和恢复数据库，则在访问索引时会看到此错误：\n\
  \n```\nORA-01578: ORACLE data block corrupted (file # 4, block # 1044)\nORA-01110:\
  \ data file 4: '/u01/dbfile/O18C/users01.dbf'\nORA-26040: Data block was loaded\
  \ using the NOLOGGING option\n```\n\n此错误表明索引在逻辑上已损坏。在此场景中，你必须在索引可用之前重新创建它。在大多数场景中，创建索引时使用\
  \ `NOLOGGING` 子句是可以接受的，因为可以在不影响索引所基于的表的情况下重新创建索引。\n\n\n## 实施不可见索引\n\n如在相同列上创建索引时仅设置一个为可见的讨论中所述，您可以选择使索引对优化器不可见。Oracle\
  \ 仍会维护不可见索引（当在表上发生 DML 操作时），但不会使其可供优化器使用。您可以使用 `OPTIMIZER_USE_INVISIBLE_INDEXES`\
  \ 数据库参数使不可见索引对优化器可见。\n\n不可见索引有几个有趣的用途：\n\n*   在删除索引前将其更改为不可见，可以让您在以后确定需要该索引时快速恢复。\n\
  *   您或许可以向第三方应用程序添加一个不可见索引，而不影响现有代码或支持协议。\n\n这两种场景将在以下部分中讨论。\n\n### 使现有索引不可见\n\n\
  假设您已识别出一个未被使用的索引，并正在考虑删除它。在 Oracle 的早期版本中，您可以将索引标记为 `UNUSABLE`，然后在确定某些索引确实不再使用时再删除它们。如果您后来确定需要一个不可用的索引，重新启用它的唯一方法是重建它。对于大型索引，这可能耗费大量的时间和数据库资源。\n\
  \n使索引不可见的优势在于仅告知优化器不要使用该索引。当底层表的记录被插入、更新和删除时，不可见索引仍会被维护。如果您决定以后需要该索引，则无需重建它；只需使其再次可见即可。\n\
  \n您可以创建索引时将其设为不可见，或将现有索引更改为不可见；例如，\n\n```\nSQL> create index cust_idx2 on cust(first_name)\
  \ invisible;\nSQL> alter index cust_idx1 invisible;\n```\n\n您可以通过此查询验证索引的可见性：\n\n\
  ```\nSQL> select index_name, status, visibility from user_indexes;\n```\n\n这是一些示例输出：\n\
  \n```\nINDEX_NAME           STATUS   VISIBILITY\n-------------------- -------- ----------\n\
  CUST_IDX1            VALID    INVISIBLE\nCUST_IDX2            VALID    INVISIBLE\n\
  USERS_IDX1           VALID    VISIBLE\n```\n\n使用 `VISIBLE` 子句可以使不可见的索引再次对优化器可见：\n\
  \n```\nSQL> alter index cust_idx1 visible ;\n```\n\n**注意**\n如果您在外键列上有一个 B 树索引，并且决定使其不可见，Oracle\
  \ 仍可以使用该索引来防止某些锁定问题。在删除与外键约束关联的列上的索引之前，请确保它未被 Oracle 用来防止锁定问题。详情请参阅本章后面的“索引外键列”部分。\n\
  \n### 确保添加索引时应用程序行为不变\n\n在使用第三方应用程序时，您也可以使用不可见索引。通常，第三方供应商不支持客户向其应用程序添加自己的索引。但是，在某些情况下，您确信可以提高某个查询的性能而不影响应用程序中的其他查询。\n\
  \n您可以将索引创建为不可见，然后使用 `OPTIMIZER_USE_INVISIBLE_INDEXES` 参数指示优化器考虑不可见索引。此参数可以在系统或会话级别设置。这里有一个例子：\n\
  \n```\nSQL> create index cust_idx1 on cust(cust_id) invisible;\n```\n\n现在，将 `OPTIMIZER_USE_INVISIBLE_INDEXES`\
  \ 数据库参数设置为 `TRUE`。这会指示优化器为当前连接的会话考虑不可见索引：\n\n```\nSQL> alter session set optimizer_use_invisible_indexes=true;\n\
  ```\n\n您可以通过设置 `AUTOTRACE` 为 `on` 并运行 `SELECT` 语句来验证索引是否正在被使用：\n\n```\nSQL> set\
  \ autotrace trace explain;\nSQL> select cust_id from cust where cust_id = 3;\n```\n\
  \n\n\n以下是一些示例输出，表明优化器选择使用不可见索引：\n\n```\n| Id  | Operation        | Name      | Rows\
  \  | Bytes | Cost (%CPU)| Time     |\n|   0 | SELECT STATEMENT |           |   \
  \  1 |     5 |     1   (0)| 00:00:01 |\n|*  1 |  INDEX RANGE SCAN| CUST_IDX1 | \
  \    1 |     5 |     1   (0)| 00:00:01 |\n```\n\n请记住，`不可见索引`仅指优化器无法看到的索引。与任何其他索引一样，不可见索引在\
  \ DML 语句期间也会消耗空间和资源。\n\n## 维护索引\n\n随着应用程序的演进，您不可避免地需要对现有索引执行一些维护活动。您可能需要重命名索引以符合新实施的标准，或者可能需要重建大型索引，将其移动到更符合索引存储需求的另一个表空间。以下列表显示了与索引维护相关的常见任务：\n\
  \n*   重命名索引\n*   显示索引的 DDL\n*   重建索引\n*   将索引设置为 `unusable`\n*   监控索引\n*   删除索引\n\
  \n以下各节将讨论这些项目。\n\n### 重命名索引\n\n有时您需要重命名索引。索引可能在创建时被错误命名，或者您可能想要一个更符合命名标准的名称。使用 `ALTER\
  \ INDEX ... RENAME TO` 语句来重命名索引：\n\n```sql\nSQL> alter index cust_idx1 rename to\
  \ cust_index1;\n```\n\n您可以通过查询数据字典来验证索引是否已重命名：\n\n```sql\nSQL> select\n  table_name\n\
  \ ,index_name\n ,index_type\n ,tablespace_name\n ,status\nfrom user_indexes\norder\
  \ by table_name, index_name;\n```\n\n### 显示重建索引的代码\n\n您可能正在执行例行维护活动，例如将索引移动到不同的表空间，在此操作之前，您希望验证当前的存储设置。您可以使用\
  \ `DBMS_METADATA` 包来显示重建索引所需的 DDL。如果您使用的是 SQL*Plus，请确保将 `LONG` 变量设置为足够大的值以显示所有输出。以下是一个示例：\n\
  \n```sql\nSQL> set long 10000\nSQL> select dbms_metadata.get_ddl('INDEX','CUST_IDX1')\
  \ from dual;\n```\n\n以下是部分输出列表：\n\n```\nSQL> CREATE INDEX \"MV_MAINT\".\"CUST_IDX1\"\
  \ ON \"MV_MAINT\".\"CUST\" (\"CUST_ID\")\nPCTFREE 10 INITRANS 2 MAXTRANS 255 INVISIBLE\
  \ COMPUTE STATISTICS\n```\n\n要显示某个用户的所有索引 DDL，请运行此查询：\n\n```sql\nSQL> select dbms_metadata.get_ddl('INDEX',index_name)\
  \ from user_indexes;\n```\n\n您也可以显示特定用户的 DDL。您必须为 `GET_DDL` 函数提供对象类型、对象名称和模式作为输入；例如，\n\
  \n```sql\nSQL> select\n  dbms_metadata.get_ddl(object_type=>'INDEX', name=>'CUST_IDX1',\
  \ schema=>'INV')\nfrom dual;\n```\n\n### 重建索引\n\n有几个充分的理由需要重建索引：\n\n*   修改存储特性，例如更改表空间\n\
  *   重建之前标记为 `unusable` 的索引，使其重新可用\n\n使用 `REBUILD` 子句来重建索引。此示例重建一个名为 `CUST_IDX1`\
  \ 的索引：\n\n```sql\nSQL> alter index cust_idx1 rebuild;\n```\n\nOracle 尝试获取表上的锁并在线重建索引。如果有任何未提交的活动事务，Oracle\
  \ 将无法获取锁，并会抛出以下错误：\n\n```\nORA-00054: resource busy and acquire with NOWAIT specified\
  \ or timeout expired\n```\n\n在这种情况下，您可以等到数据库活动较少时再操作，或者尝试设置 `DDL_LOCK_TIMEOUT` 参数：\n\
  \n```sql\nSQL> alter session set ddl_lock_timeout=15;\n```\n\n`DDL_LOCK_TIMEOUT`\
  \ 初始化参数指示 Oracle 重复尝试获取锁（在此示例中为 15 秒）。\n\n如果未指定表空间，Oracle 会在索引当前所在的表空间中重建它。如果您希望索引在另一个表空间中重建，请指定表空间：\n\
  \n```sql\nSQL> alter index cust_idx1 rebuild tablespace reporting_index;\n```\n\n\
  \n\n如果你正在处理一个大型索引，可能需要考虑使用`NOLOGGING`或`PARALLEL`等特性，或者两者兼用。下面的示例展示了并行重建索引同时生成最少重做日志的方法：\n\
  \n```\nSQL> alter index cust_idx1 rebuild parallel nologging ;\n```\n\n> **注意**\n\
  > 有关在索引中使用这些特性的详细信息，请参阅本章前面的“避免在创建索引时生成重做日志”和“并行创建索引”章节。\n\n### 因性能原因重建索引\n\n在早年间（大约\
  \ Oracle 版本 7 时期），出于性能考虑，数据库管理员会定期虔诚地重建索引。几乎每位 DBA 及其团队都会拥有类似下面的脚本，该脚本使用 SQL 生成为某个模式重建索引所需的\
  \ SQL 语句：\n\n```\nSPO ind_build_dyn.sql\nSET HEAD OFF PAGESIZE 0 FEEDBACK OFF;\n\
  SELECT 'ALTER INDEX ' || index_name || ' REBUILD;'\nFROM user_indexes;\nSPO OFF;\n\
  SET FEEDBACK ON;\n```\n\n然而，对于较新版本的 Oracle，重建索引是否能带来任何性能提升尚有争议。通常，重建索引的唯一有效理由是索引已损坏、不可用，或者你想要修改存储特性（例如表空间）。\n\
  \n### 将索引标记为不可用\n\n如果你已识别出某个不再使用的索引，可以将其标记为`UNUSABLE`。从此，Oracle 将不再维护该索引，优化器也不会在`SELECT`语句中考虑使用该索引。将索引标记为`UNUSABLE`（而不是直接删除）的优势在于，如果你后来确定该索引仍被使用，可以将其更改为`USABLE`状态并重建它，而无需手头有重新创建该索引的\
  \ DDL 语句。\n\n以下是将索引标记为`UNUSABLE`的示例：\n\n```\nSQL> alter index cust_idx1 unusable;\n\
  ```\n\n你可以通过此查询验证其是否不可用：\n\n```\nSQL> select index_name, status from user_indexes;\n\
  ```\n\n该索引将显示`UNUSABLE`状态：\n\n```\nINDEX_NAME           STATUS\n--------------------\
  \ --------\nCUST_IDX1            UNUSABLE\n```\n\n如果你确定需要该索引（在删除它之前），则必须重建它才能使其再次可用：\n\
  \n```\nSQL> alter index cust_idx1 rebuild;\n```\n\n另一个将索引标记为`UNUSABLE`的常见场景是当你执行大规模数据加载时。当你想要最大化表加载性能时，可以在执行加载前将索引标记为`UNUSABLE`。加载完表后，你必须重建索引以使它们再次可用。\n\
  \n> **注意**\n> 将索引设置为`UNUSABLE`的替代方法是删除并重新创建它。此方法需要`CREATE INDEX` DDL 语句。\n\n###\
  \ 监控索引使用情况\n\n你可能继承了一个数据库，作为了解该数据库和应用程序的一部分，你想要确定哪些索引正在被使用（或未被使用）。其思路是，你可以识别未使用的索引并将其删除，从而消除额外的开销和所需的存储空间。\n\
  \n使用`ALTER INDEX...MONITORING USAGE`语句来启用基本的索引监控。以下示例启用了对一个索引的监控：\n\n```\nSQL> alter\
  \ index cust_idx1 monitoring usage;\n```\n\n首次访问该索引时，Oracle 会记录此操作；你可以通过`v$index_usage_info`或`DBA_INDEX_USAGE`视图查看索引是否已被访问。要报告哪些被监控的索引已被使用，请运行此查询：\n\
  \n```\nSQL> select * from dba_index_usage;\n```\n\n很可能，你不会只监控一个索引。相反，你可能希望监控某个用户的所有索引。在这种情况下，使用\
  \ SQL 生成 SQL 来创建一个可以运行以开启所有索引监控的脚本。以下就是这样一个脚本：\n\n```\nSQL> select\n'alter index\
  \ ' || index_name || ' monitoring usage;'\nfrom user_indexes;\n```\n\n`DBA_OBJECT_USAGE`视图仅显示当前连接用户的信息。如果你检查`DBA_VIEWS`的`TEXT`列，请注意以下行：\n\
  \n```\nwhere io.owner# = userenv('SCHEMAID')\n```\n\n如果你以具有 DBA 权限的用户登录，并希望查看所有已启用监控的索引的状态（无论属于哪个用户），请执行此查询：\n\
  \n```\nSQL> select io.name, t.name,\ndecode(bitand(i.flags, 65536), 0, 'NO', 'YES'),\n\
  decode(bitand(ou.flags, 1), 0, 'NO', 'YES'),\nou.start_monitoring,\nou.end_monitoring\n\
  from sys.obj$ io, sys.obj$ t, sys.ind$ i, sys.object_usage ou\nwhere i.obj# = ou.obj#\n\
  and io.obj# = ou.obj#\nand t.obj# = i.bo#;\n```\n\n前面的查询移除了原查询中限制当前登录用户的那一行。这为你提供了一种便捷的方式来查看所有受监控的索引。\n\
  \n> **注意**\n> 请记住，Oracle 可以使用定义在外键列上的索引来防止某些锁定问题（有关详细讨论，请参阅本章后面的“确定外键列是否已建索引”和“在外键列上实现索引”章节）。Oracle\
  \ 对索引的内部使用不会记录在`DBA_INDEX_USAGE`或`V$INDEX_USAGE_INFO`中。在删除定义在外键列上的索引之前，请务必非常小心。\n\
  \n### 删除索引\n\n如果你已确定某个索引未被使用，那么将其删除是个好主意。未使用的索引会占用空间，并且可能潜在地减慢 DML 语句的执行速度（因为这些\
  \ DML 操作必须维护索引）。使用`DROP INDEX`语句来删除索引：\n\n```\nSQL> drop index cust_idx1;\n```\n\
  \n删除索引是一个永久性的 DDL 操作；除了重建索引之外，没有其他方法可以撤销删除索引的操作。在删除索引之前，快速捕获重建该索引所需的 DDL 语句是有益无害的。这样做将允许你在随后发现你确实仍然需要该索引时重新创建它。\n\
  \n### 为外键列创建索引\n\n外键约束确保在向子表插入记录时，对应的父表记录存在。这是保证数据符合父子业务关系规则的机制。外键也被称为引用完整性约束。\n\
  \n与主键和唯一键约束不同，Oracle 不会自动在外键列上创建索引。因此，你必须基于定义为外键约束的列手动创建外键索引。在大多数情况下，你应该在与外键关联的列上创建索引。原因有二：\n\
  \n*   Oracle 通常可以利用外键列上的索引来提高连接父表和子表（使用外键列）的查询性能。\n*   如果外键列上没有 B 树索引，当你从子表插入或删除记录时，父表中的所有行都将被锁定。对于频繁修改父表和子表的应用程序，这将导致锁定和死锁问题（有关此锁定问题的示例，请参阅本章后面的“确定外键列是否已建索引”章节）。\n\
  \n\n有人可能会认为，如果你对应用程序足够了解，并且能够预测不会发出在键列上连接表的查询，并且某些更新/删除场景永远不会遇到（这些场景会导致整个表被锁），那么，当然可以不在外键列上放置索引。然而，根据我的经验，情况往往并非如此：开发人员很少考虑“黑盒数据库”可能会如何锁表；一些数据库管理员同样不了解锁的常见原因；团队人员流动率高，而当日的数据库管理员不得不为数据库性能差和会话挂起的问题背锅。考虑到追查锁定和性能问题所花费的时间和精力，在应用程序的每个外键列上放置索引的成本并不算高。我知道一些纯粹主义者会反对这一点，但我倾向于避免痛苦，而未加索引的外键列就像一个定时炸弹。\n\
  \n提出我的建议后，我将首先介绍如何在 B 树索引上外键列。然后，我将展示一些检测未加索引的外键列的技术。\n\n### 在外键列上实现索引\n\n假设你有一个需求，要求\
  \ `ADDRESS` 表中的每条记录都分配一个来自 `CUST` 表的相应 `CUST_ID` 列。为了强制实施这种关系，你创建 `ADDRESS` 表和一个外键约束，如下所示：\n\
  \n```sql\nSQL> create table address(address_id number\n,cust_address varchar2(2000)\n\
  ,cust_id number);\n--\nSQL> alter table address add constraint addr_fk1\nforeign\
  \ key (cust_id) references cust(cust_id);\n```\n\n**注意**\n外键列必须引用父表中已定义了主键或唯一键约束的列。否则，你将收到错误\
  \ `ORA-02270: no matching unique or primary key for this column-list`。\n\n你意识到外键列在连接\
  \ `CUST` 和 `ADDRESS` 表时被广泛使用，并且在外键列上建立索引将提高性能。在这种情况下，你必须手动创建索引。例如，在 `ADDRESS` 表的\
  \ `CUST_ID` 外键列上创建一个常规的 B 树索引。\n\n```sql\nSQL> create index addr_fk1\non address(cust_id);\n\
  ```\n\n你不必将索引命名为与外键相同的名称（正如我在这些代码行中所做的那样）。是否这样做是个人偏好。我觉得当约束和相应的索引同名时，维护环境更容易。\n\n\
  创建索引时，如果你未指定表空间名称，Oracle 会将索引放在用户的默认表空间中。通常，最好明确指定索引应放置在哪个表空间；例如，\n\n```sql\nSQL>\
  \ create index addr_fk1\non address(cust_id)\ntablespace reporting_index;\n```\n\
  \n**注意**\n外键列上的索引不必是 B 树类型。在数据仓库环境中，在星型模式事实表的外键列上使用位图索引很常见。与 B 树索引不同，外键列上的位图索引不能解决父-子表锁定问题。使用星型模式的应用程序通常不会从事实表中删除或修改子记录；因此，无论是否在外键列上使用位图索引，在这种情况下锁定都不是大问题。\n\
  \n### 确定外键列是否已加索引\n\n如果你是从头开始创建应用程序，编写代码并确保每个外键约束都有对应的索引是相当容易的。然而，如果你继承了一个数据库，谨慎的做法是检查外键列是否已加索引。\n\
  \n你可以使用数据字典视图来验证外键约束的所有列是否都有对应的索引。这项任务并不像乍看起来那么简单。例如，以下是一个可以让你朝着正确方向开始的查询：\n\n```sql\n\
  SQL> SELECT DISTINCT\na.owner                                 owner\n,a.constraint_name\
  \                       cons_name\n,a.table_name                            tab_name\n\
  ,b.column_name                           cons_column\n,NVL(c.column_name,'***Check\
  \ index****') ind_column\nFROM dba_constraints  a\n,dba_cons_columns b\n,dba_ind_columns\
  \  c\nWHERE constraint_type = 'R'\nAND a.owner           = UPPER('&&user_name')\n\
  AND a.owner           = b.owner\nAND a.constraint_name = b.constraint_name\nAND\
  \ b.column_name     = c.column_name(+)\nAND b.table_name      = c.table_name(+)\n\
  AND b.position        = c.column_position(+)\nORDER BY tab_name, ind_column;\n```\n\
  \n这个查询虽然简单易懂，但并不能在所有情况下都正确报告未加索引的外键。例如，对于多列外键的情况，只要约束中定义的列位于索引的前导边缘，那么约束定义的顺序与索引列的顺序不同也没关系。换句话说，如果约束定义为\
  \ `COL1` 然后 `COL2`，那么有一个 B 树索引定义在前导边缘 `COL2` 然后 `COL1` 上也是可以的。另一个问题是，B 树索引可以防止锁定问题，但位图索引不能。在这种情况下，查询还应该检查索引类型。\n\
  \n在这些场景中，你需要一个更复杂的查询来检测与外键列相关的索引问题。以下示例是一个更复杂的查询，它使用 `LISTAGG` 分析函数将外键约束中的列（作为一行中的字符串返回）与相应的索引列进行比较：\n\
  \n```sql\nSQL> SELECT\nCASE WHEN ind.index_name IS NOT NULL THEN\nCASE WHEN ind.index_type\
  \ IN ('BITMAP') THEN\n'** Bitmp idx **'\nELSE\n'indexed'\nEND\nELSE\n'** Check idx\
  \ **'\nEND checker\n,ind.index_type\n,cons.owner, cons.table_name, ind.index_name,\
  \ cons.constraint_name, cons.cols\nFROM (SELECT\nc.owner, c.table_name, c.constraint_name\n\
  ,LISTAGG(cc.column_name, ',' ) WITHIN GROUP (ORDER BY cc.column_name) cols\nFROM\
  \ dba_constraints  c\n,dba_cons_columns cc\nWHERE c.owner           = cc.owner\n\
  AND   c.owner = UPPER('&&schema')\nAND   c.constraint_name = cc.constraint_name\n\
  AND   c.constraint_type = 'R'\nGROUP BY c.owner, c.table_name, c.constraint_name)\
  \ cons\nLEFT OUTER JOIN\n(SELECT\ntable_owner, table_name, index_name, index_type,\
  \ cbr\n,LISTAGG(column_name, ',' ) WITHIN GROUP (ORDER BY column_name) cols\nFROM\
  \ (SELECT\nic.table_owner, ic.table_name, ic.index_name\n,ic.column_name, ic.column_position,\
  \ i.index_type\n,CONNECT_BY_ROOT(ic.column_name) cbr\nFROM dba_ind_columns ic\n\
  ,dba_indexes     i\nWHERE ic.table_owner = UPPER('&&schema')\nAND   ic.table_owner\
  \ = i.table_owner\nAND   ic.table_name  = i.table_name\nAND   ic.index_name  = i.index_name\n\
  CONNECT BY PRIOR ic.column_position-1 = ic.column_position\nAND PRIOR ic.index_name\
  \ = ic.index_name)\nGROUP BY table_owner, table_name, index_name, index_type, cbr)\
  \ ind\nON  cons.cols       = ind.cols\nAND cons.table_name = ind.table_name\nAND\
  \ cons.owner      = ind.table_owner\nORDER BY checker, cons.owner, cons.table_name;\n\
  ```\n\n此查询将提示你输入一个模式名称，然后显示没有对应索引的外键约束。此查询还会检查索引类型；如前所述，位图索引可能存在于外键列上，但不能防止锁定问题。\n\
  \n### 表锁与外键\n\n这里有一个简单的例子，演示了当外键列未加索引时出现的锁定问题。首先，创建两个表（`DEPT` 和 `EMP`），并使用外键约束关联它们：\n\
  \n```sql\nSQL> create table emp(emp_id number primary key, dept_id number);\nSQL>\
  \ create table dept(dept_id number primary key);\nSQL> alter table emp add constraint\
  \ emp_fk1 foreign key (dept_id) references dept(dept_id);\n```\n\n接下来，插入一些数据：\n\n\
  \n## 索引与备份恢复指南\n\n### 实验：索引对锁定的影响\n\n```sql\nSQL> insert into dept values(10);\n\
  SQL> insert into dept values(20);\nSQL> insert into dept values(30);\nSQL> insert\
  \ into emp values(1,10);\nSQL> insert into emp values(2,20);\nSQL> insert into emp\
  \ values(3,10);\nSQL> commit;\n```\n\n打开两个终端会话。从其中一个终端，从子表中删除一条记录（不提交）：\n\n```sql\n\
  SQL> delete from emp where dept_id = 10;\n```\n\n然后，尝试从父表中删除一些不受子表删除操作影响的数据：\n\n\
  ```sql\nSQL> delete from dept where dept_id = 30;\n```\n\n对父表的删除操作会挂起，直到子表的事务被提交。如果子表的外键列上没有常规的\
  \ `B 树` 索引，任何时候你尝试在子表中插入或删除数据，都会在父表上放置一个表级锁；这会阻止在子表事务完成前对父表进行删除或更新操作。\n\n现在，运行之前的实验，但这次额外在子表的外键列上创建一个索引：\n\
  \n```sql\nSQL> create index emp_fk1 on emp(dept_id);\n```\n\n你应该能够独立运行之前的两条删除语句。当外键列上有\
  \ `B 树` 索引时，如果从子表删除数据，`Oracle` 不会过度锁定父表中的所有行。\n\n## 索引总结\n\n索引是独立于表的关键对象；它们极大地提升了数据库应用程序的性能。你的索引架构应该经过良好规划、实施和维护。谨慎选择哪些表和列需要创建索引。虽然索引能极大提高查询速度，但它们会减慢\
  \ `DML` 语句的速度，因为随着表数据的变化，索引也必须被维护。索引也会消耗磁盘空间。因此，索引只应在需要时创建。\n\n`Oracle` 的新版本和更多资源改进了索引或表扫描的执行方式。随着数据库系统的升级和变更，应该重新评估旧的索引是否仍然需要。验证索引的\
  \ `SQL` 调优步骤非常重要，使用诸如使索引不可见（`*invisible*`）之类的工具有助于在删除索引前验证其是否必要。\n\n`Oracle` 的 `B\
  \ 树` 索引是默认的索引类型，对大多数应用来说已经足够。然而，你应该了解其他索引类型及其用途。特定功能，如位图索引和基于函数的索引，应在适用的地方加以实施。本章讨论了实施和维护索引的各个方面。表\
  \ 8-3 总结了本章涵盖的准则和技术。\n\n### 表 8-3：创建索引准则总结\n\n| 准则 | 原因 |\n| --- | --- |\n| 创建你需要的尽可能多的索引，但尽量将数量保持在最低限度。审慎添加索引。首先进行测试以确定可量化的性能提升。\
  \ | 索引提升性能，但也消耗磁盘空间以及 `DML` 语句的处理资源和时间。不要不必要地添加索引。 |\n| 你针对表执行的查询所需的性能应构成你索引策略的基础。\
  \ | 对 `SQL` 查询中使用的列创建索引对性能提升最有帮助。 |\n| 考虑使用 `SQL 调优顾问` 或 `SQL 访问顾问` 获取索引建议。 | 这些工具提供建议，为你的索引决策提供另一双“眼睛”。\
  \ |\n| 为所有表创建主键约束。 | 这将自动创建一个 `B 树` 索引（如果主键中的列尚未被索引）。 |\n| 在适当的地方创建唯一键约束。 | 这将自动创建一个\
  \ `B 树` 索引（如果唯一键中的列尚未被索引）。 |\n| 在外键列上创建索引。 | 当连接表时，外键列通常包含在 `WHERE` 子句中，从而提升 `SQL\
  \ SELECT` 语句的性能。在外键列上创建 `B 树` 索引也能在更新和插入子表时减少锁定问题。 |\n| 仔细选择和测试小表上的索引（小表指少于几千行的表）。\
  \ | 即使在小表上，索引有时也能比全表扫描表现得更好。 |\n| 使用正确的索引类型。 | 正确使用索引能最大化性能。更多细节参见表 8-1。 |\n| 如果你没有可验证的性能提升理由，就使用基本的\
  \ `B 树` 索引类型。 | `B 树` 索引适用于大多数具有高基数列值的应用。 |\n| 考虑在数据仓库环境中使用位图索引。 | 这些索引非常适合低基数、且其值不经常更新的列。位图索引在星型模型事实表的外键列上表现良好，尤其是在你经常运行使用\
  \ `AND` 和 `OR` 连接条件的查询时。 |\n| 考虑为索引使用单独的表空间（即与表分开）。 | 表和索引数据可能有不同的存储或备份和恢复要求，或者两者都有。使用单独的表空间可以让你将索引与表分开管理。\
  \ |\n| 让索引继承其表空间的存储属性。 | 这使得管理和维护索引存储更加容易。 |\n| 使用一致的命名标准。 | 这使得维护和故障排除更加容易。 |\n\
  | 除非有充分的理由，否则不要重建索引。 | 除非索引损坏或不可用，或者你想将索引移动到不同的表空间，否则重建索引通常是不必要的。 |\n| 监控你的索引，并删除那些未使用的索引。\
  \ | 这样做可以释放物理空间并提升 `DML` 语句的性能。 |\n| 在删除索引之前，考虑将其标记为 `*invisible*`。 | 这让你能在删除索引前更好地确定是否存在任何性能问题。这些选项让你可以重建或重新启用索引，而不需要\
  \ `DDL` 创建语句。 |\n\n在你的数据库中创建和管理索引时，请参考这些准则。这些建议旨在帮助你正确使用索引技术。使用自动调优过程和 `Oracle`\
  \ 数据库的统计信息将提供有关索引需求和使用的信息。结合对使用索引策略的理解，这些工具有助于管理对象并利用索引来提升查询性能。\n\n在你构建数据库和用户，并用表和索引配置好数据库之后，下一步是创建应用程序和用户所需的其他对象。除了表和索引，典型的对象还包括视图、同义词和序列。构建这些数据库对象将在下一章中详细介绍。\n\
  \n## 16. 用户管理的备份与恢复\n\n所有 `DBA` 都应该知道如何备份数据库。更为关键的是，`DBA` 必须能够恢复和复原数据库。当发生介质故障时，所有人都会指望\
  \ `DBA` 让数据库重新启动并运行。`Oracle` 有两种常见但非常不同的备份和恢复方法：\n\n*   用户管理的方法\n*   [`RMAN`](https://example.org/rman)\
  \ 方法\n\n用户管理的备份恰如其名，因为你手动执行与备份或恢复（或两者）相关的所有步骤。用户管理的备份有两种类型：冷备份和热备份。冷备份有时称为离线备份，因为在备份过程中数据库是关闭的。热备份也称为在线备份，因为在备份过程中数据库是可用的。\n\
  \n\n\nRMAN 是 Oracle 的备份与恢复工具，它简化并管理了备份与恢复的大多数方面。对于 Oracle 的备份与恢复，您应该使用 RMAN。RMAN\
  \ 会自动确定需要备份哪些数据文件、备份位置以及如何恢复。那么，为何还要在本书中包含一章关于用户管理备份的内容呢，尤其是在这种方法已经“过时”十多年之后？以下是理解用户管理备份与恢复的一些原因：\n\
  \n*   您仍然会发现许多地方在使用用户管理的备份与恢复技术。因此，您需要掌握这项技术的知识。\n*   在恢复或备份失败时，使用这种方法可能有助于排查问题或解决备份故障。\n\
  *   巩固您对 Oracle 备份与恢复架构的理解。这在您排查任何备份与恢复工具的问题时非常有帮助，并为 RMAN 和 Data Guard 等关键 Oracle\
  \ 工具奠定了核心知识基础。\n*   您将更加充分地领略 RMAN 及其特性的价值。\n*   老 DBA 们讲述的那些噩梦般的数据库恢复故事现在也能说得通了。\n\
  \n基于这些原因，您应该熟悉用户管理的备份与恢复技术。手动演练本章中的场景将极大地加深您对哪些文件被备份以及它们如何在恢复中使用的理解。您将能更好地准备使用 RMAN。RMAN\
  \ 使备份与恢复的大部分工作实现了自动化和“一键式”操作。然而，了解如何手动备份和恢复数据库，有助于您思考和排查任何备份技术中的问题。\n\n本章从冷备份开始。这类备份被视为最简单的用户管理备份形式，因为即使是系统管理员也能实施。接下来，本章将讨论热备份。您还将研究几个常见的恢复场景。这些示例将构建您关于\
  \ Oracle 备份与恢复内部机制的基础知识。\n\n> **提示**\n> 在 Oracle Database 12c 中，您可以对可插拔数据库执行用户管理的热备份和冷备份；用户管理的备份与恢复技术运行良好。但与其他\
  \ Oracle 数据库一样，强烈建议您在可插拔环境中使用 RMAN 来管理备份与恢复。用户管理的备份任务很快会变得难以驾驭，DBA 必须为根容器以及可能的众多可插拔数据库管理这些信息。\n\
  \n## 实施冷备份策略\n\n您通过在数据库关闭后复制文件来执行用户管理的冷备份。此类备份也称为离线备份。进行冷备份时，您的数据库可以处于`NOARCHIVELOG`模式或`ARCHIVELOG`模式。\n\
  \nDBA 倾向于认为冷备份等同于对处于`NOARCHIVELOG`模式的数据库进行备份。这不正确。您可以对处于`ARCHIVELOG`模式的数据库进行冷备份，例如在数据中心迁移或需要停机的大规模迁移之前使用。冷备份是数据库关闭时的备份，这意味着无论数据库处于`ARCHIVELOG`还是`NOARCHIVELOG`模式都没有区别。它是某个时间点的备份，如果用于恢复，则只能恢复到该时间点。\n\
  \n### 对数据库进行冷备份\n\n对处于`NOARCHIVELOG`模式的数据库进行冷备份的一个主要原因是，为您提供一种将数据库恢复到过去某个时间点的方法。仅当您不需要恢复备份之后发生的事务时，才应使用此类备份。不可能在数据库启动并运行时（即热备份）对处于`NOARCHIVELOG`模式的数据库进行备份，因为更改无法作为备份的一部分被捕获。仅当您的业务要求允许数据丢失和停机时，此类备份和恢复策略才是可接受的。对于生产业务数据库，您很少会实施此类备份和恢复解决方案，因为生产数据库通常处于`ARCHIVELOG`模式是常态。\n\
  \n尽管如此，实施此类备份也有一些充分的理由。一个常见用途是对开发/测试/培训数据库进行冷备份，并定期将数据库重置回基线。这为您提供了一种以相同的时间点数据库快照重新启动性能测试或培训课程的方式。\n\
  \n> **提示**\n> 考虑使用“闪回数据库”功能将您的数据库设置回过去的某个时间点（详见第 19 章了解更多信息）。\n\n本节中的示例展示了如何备份数据库中的每个关键文件：所有控制文件、数据文件和在线重做日志文件。通过此类备份，您可以轻松地将数据库恢复到进行备份的时间点。这种方法的主要优点是概念简单且易于实施。以下是进行数据库冷备份所需的步骤：\n\
  \n1.  确定将备份文件复制到何处以及需要多少空间。\n2.  确定要复制的数据库文件的位置和名称。\n3.  使用`IMMEDIATE`、`TRANSACTIONAL`或`NORMAL`子句关闭数据库。\n\
  4.  将文件（在步骤 2 中确定）复制到备份位置（在步骤 1 中确定）。\n5.  重新启动数据库。\n\n以下各节将详细阐述这些步骤。\n\n### 步骤\
  \ 1. 确定将备份文件复制到何处以及需要多少空间\n\n理想情况下，备份位置应位于与您实时数据文件位置不同的一组磁盘上。然而，在许多环境中，您可能没有选择权，并且会被告知数据库将使用哪些挂载点。在此示例中，备份位置是目录`/u01/cbackup/o18c`。要粗略估计存储备份副本所需的空间量，您可以运行此查询：\n\
  \n```sql\nSQL> select sum(sum_bytes)/1024/1024 m_bytes\nfrom(\nselect sum(bytes)\
  \ sum_bytes from v$datafile\nunion\nselect (sum(bytes) * members) sum_bytes from\
  \ v$log\ngroup by members);\n```\n\n您可以使用 Linux/Unix 的`df`命令验证操作系统有多少可用磁盘空间。确保操作系统可用的磁盘空间量大于上一个查询返回的总和：\n\
  \n```bash\n$ df -h\n```\n\n> **提示**\n> 临时文件仅在数据库版本早于 10g 时才需要备份。\n\n### 步骤 2. 确定要复制的数据库文件的位置和名称\n\
  \n运行此查询以列出处于`NOARCHIVELOG`模式的数据库冷备份中包含的文件的名称（和路径）：\n\n```sql\nSQL> select name from\
  \ v$datafile\nunion\nselect name from v$controlfile\nunion\nselect member from v$logfile;\n\
  ```\n\n\n### 备份（或不备份）在线重做日志\n\n你需要备份在线重做日志吗？不需要；你永远不需要将在线重做日志作为任何类型备份的一部分进行备份。那么，为什么数据库管理员会在冷备份中备份在线重做日志呢？一个原因是它使得在非归档模式场景下的恢复过程稍微容易一些。在线重做日志是正常打开数据库所必需的。\n\
  如果你备份了所有文件（包括在线重做日志），那么为了将数据库恢复到备份时的状态，你需要还原所有文件（包括在线重做日志）并启动数据库。\n\n### 步骤 3. 关闭数据库\n\
  \n以 `SYS`（或具有 `SYSDBA` 权限的用户）身份连接到你的数据库，并使用 `IMMEDIATE`、`TRANSACTIONAL` 或 `NORMAL`\
  \ 选项关闭你的数据库。在几乎所有情况下，使用 `IMMEDIATE` 是首选方法。此模式会断开用户连接、回滚未完成的事务并关闭数据库：\n\n```\n$ sqlplus\
  \ / as sysdba\nSQL> shutdown immediate;\n```\n\n### 步骤 4. 创建文件的备份副本\n\n对于步骤 2 中识别出的每个文件，使用操作系统实用程序将文件复制到备份目录（在步骤\
  \ 1 中标识）。在这个简单的例子中，所有数据文件、控制文件、临时数据库文件和在线重做日志都在同一个目录中。在生产环境中，你的文件很可能会分布在几个不同的目录中。此示例使用\
  \ Linux/Unix 的 `cp` 命令将数据库文件从 `/u01/dbfile/o18c` 复制到 `/u01/cbackup/o18c` 目录：\n\n\
  ```\n$ cp /u01/dbfile/o18c/*.*  /u01/cbackup/o18c\n```\n\n### 步骤 5. 重新启动数据库\n\n\
  所有文件复制完成后，你可以启动你的数据库：\n\n```\n$ sqlplus / as sysdba\nSQL> startup;\n```\n\n## 在非归档模式下使用在线重做日志还原冷备份\n\
  \n下一个示例解释了如何从数据库的冷备份中还原，该数据库处于非归档模式。如果你在冷备份时包含了在线重做日志，那么在还原文件时也可以包含它们。以下是此过程涉及的步骤：\n\
  \n1.  关闭实例。\n2.  将数据文件、在线重做日志和控制文件从备份复制回活动数据库的数据文件位置。\n3.  启动数据库。\n\n这些步骤在以下部分中有详细说明。\n\
  \n### 步骤 1. 关闭实例\n\n如果实例正在运行，请将其关闭。在此场景中，如何关闭数据库并不重要，因为你正在还原到某个时间点（不恢复任何事务）。当备份文件被复制回来时，活动数据库目录位置中的任何文件都会被覆盖。如果你的实例正在运行，你可以强行中止它。作为具有\
  \ `SYSDBA` 权限的用户，请执行以下操作：\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n\
  ```\n\n### 步骤 2. 从备份复制文件回来\n\n此步骤执行备份的逆操作：你正在将文件从备份位置复制到活动数据库文件位置。在此示例中，所有备份文件都位于\
  \ `/u01/cbackup/o18c` 目录中，并且所有文件都将被复制到 `/u01/dbfile/o18c` 目录：\n\n```\n$ cp /u01/cbackup/o18c/*.*\
  \  /u01/dbfile/o18c\n```\n\n### 步骤 3. 启动数据库\n\n以 `SYS`（或具有 `SYSDBA` 权限的用户）身份连接到你的数据库，并启动你的数据库：\n\
  \n```\n$ sqlplus / as sysdba\nSQL> startup;\n```\n\n完成这些步骤后，你应该拥有与进行冷备份时完全相同的数据库副本。这就像你将数据库设置回进行备份的时间点一样。\n\
  \n## 在非归档模式下不使用在线重做日志还原冷备份\n\n如前所述，在从冷备份还原时，你永远不需要在线重做日志。如果你在非归档模式下进行了数据库的冷备份，并且没有将在线重做日志作为备份的一部分包含在内，那么还原步骤与上一节中的步骤几乎完全相同。主要区别在于最后一步需要你使用\
  \ `OPEN RESETLOGS` 子句来打开数据库。步骤如下：\n\n1.  关闭实例。\n2.  从备份复制控制文件和数据文件回来。\n3.  以装载模式启动数据库。\n\
  4.  使用 `OPEN RESETLOGS` 子句打开数据库。\n\n### 步骤 1. 关闭实例\n\n如果实例正在运行，请将其关闭。在此场景中，如何关闭数据库并不重要，因为你正在还原到某个时间点。作为具有\
  \ `SYSDBA` 权限的用户，请执行以下操作：\n\n```\n$ sqlplus / as sysdba\nSQL> shutdown abort;\n\
  ```\n\n### 步骤 2. 从备份复制文件回来\n\n将控制文件和数据文件从备份位置复制到活动数据文件位置：\n\n```\n$ cp /*.*\n```\n\
  \n### 步骤 3. 以装载模式启动数据库\n\n以 `SYS` 或具有 `SYSDBA` 权限的用户身份连接到你的数据库，并以装载模式启动数据库：\n\n\
  ```\n$ sqlplus / as sysdba\nSQL> startup mount\n```\n\n### 步骤 4. 使用 OPEN RESETLOGS\
  \ 子句打开数据库\n\n使用 `OPEN RESETLOGS` 子句打开你的数据库以供使用：\n\n```\nSQL> alter database open\
  \ resetlogs;\n```\n\n如果你看到 `Database altered` 消息，则命令成功。但是，你可能会看到此错误：\n\n```\nORA-01139:\
  \ RESETLOGS option only valid after an incomplete database recovery\n```\n\n在这种情况下，请发出以下命令：\n\
  \n```\nSQL> recover database until cancel;\n```\n\n你应该看到此消息：\n\n```\nMedia recovery\
  \ complete.\n```\n\n现在，尝试使用 `OPEN RESETLOGS` 子句打开你的数据库：\n\n```\nSQL> alter database\
  \ open resetlogs;\n```\n\n此语句指示 Oracle 重新创建在线重做日志。Oracle 使用控制文件中的信息来确定重做日志的位置、名称和大小。如果这些位置存在旧的在线重做日志文件，它们将被覆盖。\n\
  如果你在此过程中监控 `alert.log`，你可能会看到 `ORA-00312` 和 `ORA-00313`。这意味着 Oracle 找不到在线重做日志文件；这没关系，因为这些文件在\
  \ `OPEN RESETLOGS` 命令重新创建它们之前，在物理上是不可用的。\n\n## 将冷备份和还原编写为脚本\n\n将冷备份编写为脚本具有指导意义。基本思路是动态查询数据字典以确定要备份的文件的位置和名称。这比在脚本中硬编码目录位置和文件名更可取。动态生成脚本更不容易出错和出现意外情况（例如，向数据库添加了新数据文件，但未添加到旧的、硬编码的备份脚本中）。\n\
  \n**注意**\n本节中的脚本并非用于生产强度的备份和恢复脚本。相反，它们说明了将冷备份和后续还原编写为脚本的基本概念。\n\n本节中的第一个脚本对数据库进行冷备份。在使用冷备份脚本之前，你需要修改脚本中的这些变量以匹配你的数据库环境：\n\
  \n*   `ORACLE_SID`\n*   `ORACLE_HOME`\n*   `cbdir`\n\n`cbdir` 变量指定了备份目录位置的名称。该脚本创建一个名为\
  \ `coldback.sql` 的文件，从 SQL*Plus 执行该文件以启动数据库的冷备份：\n\n\n## Oracle 数据库冷备份与恢复脚本\n\n\
  ### 冷备份脚本\n\n以下的 bash 脚本用于生成一个 SQL*Plus 脚本，以执行数据库的冷备份。\n\n```bash\n#!/bin/bash\n\
  ORACLE_SID=o18c\nORACLE_HOME=/u01/app/oracle/product/18.1.0.1/db_1\nPATH=$PATH:$ORACLE_HOME/bin\n\
  #\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0 lines 132 verify off feed\
  \ off trimsp on\ndefine cbdir=/u01/cbackup/o18c\nspool coldback.sql\nselect 'shutdown\
  \ immediate;' from dual;\nselect '!cp ' || name || ' ' || '&&cbdir'   from v\\$datafile;\n\
  select '!cp ' || member || ' ' || '&&cbdir' from v\\$logfile;\nselect '!cp ' ||\
  \ name || ' ' || '&&cbdir'   from v\\$controlfile;\nselect 'startup;' from dual;\n\
  spool off;\n@@coldback.sql\nEOF\nexit 0\n```\n\n该脚本生成的命令将在 SQL*Plus 脚本中执行，以进行数据库的冷备份。您在\
  \ Unix `cp` 命令前放置感叹号（`!`），以指示 SQL*Plus 调用操作系统来运行 `cp` 命令。在引用 `v$` 数据字典视图时，还需要在每个美元符号（`$`）前放置一个反斜杠（`\\\
  `）；这在 Linux/Unix shell 脚本中是必需的。`\\` 转义了 `$`，并告诉 shell 脚本不要将 `$` 视为特殊字符（`$` 通常表示\
  \ shell 变量）。\n\n运行此脚本后，写入 `coldback.sql` 脚本的复制命令示例如下：\n\n```\nshutdown immediate;\n\
  !cp /u01/dbfile/o18c/system01.dbf /u01/cbackup/o18c\n!cp /u01/dbfile/o18c/sysaux01.dbf\
  \ /u01/cbackup/o18c\n!cp /u01/dbfile/o18c/undotbs01.dbf /u01/cbackup/o18c\n!cp /u01/dbfile/o18c/users01.dbf\
  \ /u01/cbackup/o18c\n!cp /u01/dbfile/o18c/tools01.dbf /u01/cbackup/o18c\n!cp /u01/oraredo/o18c/redo02a.rdo\
  \ /u01/cbackup/o18c\n!cp /u02/oraredo/o18c/redo02b.rdo /u01/cbackup/o18c\n!cp /u01/oraredo/o18c/redo01a.rdo\
  \ /u01/cbackup/o18c\n!cp /u02/oraredo/o18c/redo01b.rdo /u01/cbackup/o18c\n!cp /u01/oraredo/o18c/redo03a.rdo\
  \ /u01/cbackup/o18c\n!cp /u02/oraredo/o18c/redo03b.rdo /u01/cbackup/o18c\n!cp /u01/dbfile/o18c/control01.ctl\
  \ /u01/cbackup/o18c\n!cp /u01/dbfile/o18c/control02.ctl /u01/cbackup/o18c\nstartup;\n\
  ```\n\n### 恢复脚本\n\n在进行冷备份时，您还应该生成一个脚本，用于提供将数据文件、日志文件和控制文件复制回其原始位置的命令。您可以使用此脚本从冷备份中恢复。本节中的下一个脚本会动态创建一个\
  \ `coldrest.sql` 脚本，该脚本将文件从备份位置复制回原始数据文件位置。您需要以修改冷备份脚本的相同方式修改此脚本（即，将 `ORACLE_SID`、`ORACLE_HOME`\
  \ 和 `cbdir` 变量更改为与您的环境匹配）：\n\n```bash\n#!/bin/bash\nORACLE_SID=o18c\nORACLE_HOME=/u01/app/oracle/product/18.1.0.1/db_1\n\
  PATH=$PATH:$ORACLE_HOME/bin\n#\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0\
  \ lines 132 verify off feed off trimsp on\ndefine cbdir=/u01/cbackup/o18c\ndefine\
  \ dbname=$ORACLE_SID\nspo coldrest.sql\nselect 'shutdown abort;' from dual;\nselect\
  \ '!cp ' || '&&cbdir/' || substr(name, instr(name,'/',-1,1)+1) ||\n' ' || name \
  \  from v\\$datafile;\nselect '!cp ' || '&&cbdir/' || substr(member, instr(member,'/',-1,1)+1)\
  \ ||\n' ' || member from v\\$logfile;\nselect '!cp ' || '&&cbdir/' || substr(name,\
  \ instr(name,'/',-1,1)+1) ||\n' ' || name   from v\\$controlfile;\nselect 'startup;'\
  \ from dual;\nspo off;\nEOF\nexit 0\n```\n\n此脚本创建一个名为 `coldrest.sql` 的脚本，该脚本生成用于将数据文件、日志文件和控制文件恢复回其原始位置的复制命令。运行此\
  \ shell 脚本后，`coldrest.sql` 文件中的代码片段如下：\n\n```\nshutdown abort;\n!cp /u01/cbackup/o18c/system01.dbf\
  \ /u01/dbfile/o18c/system01.dbf\n!cp /u01/cbackup/o18c/sysaux01.dbf /u01/dbfile/o18c/sysaux01.dbf\n\
  !cp /u01/cbackup/o18c/undotbs01.dbf /u01/dbfile/o18c/undotbs01.dbf\n!cp /u01/cbackup/o18c/users01.dbf\
  \ /u01/dbfile/o18c/users01.dbf\n!cp /u01/cbackup/o18c/tools01.dbf /u01/dbfile/o18c/tools01.dbf\n\
  ...\n!cp /u01/cbackup/o18c/redo03b.rdo /u02/oraredo/o18c/redo03b.rdo\n!cp /u01/cbackup/o18c/control01.ctl\
  \ /u01/dbfile/o18c/control01.ctl\n!cp /u01/cbackup/o18c/control02.ctl /u01/dbfile/o18c/control02.ctl\n\
  startup;\n```\n\n\n\n如果需要使用此脚本从冷备份中恢复，请以 `SYS` 用户身份登录 SQL*Plus，并执行脚本：\n\n1.  对于处于归档日志模式下的数据库恢复，无论是从冷备份还是热备份恢复，步骤相同。本章后续的“执行归档日志模式数据库的完全恢复”和“执行归档日志模式数据库的不完全恢复”两节将介绍这些恢复示例。\n\
  \n```\n$ sqlplus / as sysdba\nSQL> @coldrest.sql\n```\n\n### 理解机制至关重要\n\n了解热备份的工作原理也有助于厘清并应对复杂的\
  \ RMAN 场景。RMAN 是一个复杂的工具，却提供了简化的备份和恢复管理。只需几条命令，您就可以备份、恢复和还原数据库。然而，如果任何 RMAN 命令或步骤出现故障，了解\
  \ Oracle 底层的内部恢复架构将带来巨大回报。详细了解如何从热备份中恢复和还原，能帮助您从逻辑上梳理并解决任何 RMAN 场景。理解 RMAN 正在从备份还原文件并能执行恢复，这与不使用\
  \ RMAN 时如何通过复制命令还原数据文件是相关联的。在恢复过程中，RMAN 可能出错的少数情况应被列为测试文档的一部分，以便解决这些问题，从而继续恢复；如果不行，则通过命令行记录命令来复制文件并恢复数据文件。同样，您投入在理解备份和恢复实现方式上的努力，长远来看是值得的。您实际上需要记忆的东西更少——因为您对底层操作的理解使您能够思考问题并以检查清单无法实现的方式解决问题。\n\
  \n## 实施热备份策略\n\n如前所述，RMAN 应是您进行任何类型 Oracle 数据库备份（无论是联机还是脱机）的首选工具。RMAN 比用户管理的备份更高效，改进了流程，并提供了一个调度和维护备份与恢复任务的框架。实施热备份策略的关键是进行热备份，然后使用该备份来恢复和还原数据库。手动执行热备份所涉及的命令，然后进行恢复和还原，有助于您理解每种文件（控制文件、数据文件、归档重做日志、联机重做日志）在恢复和还原场景中的作用。以下章节首先向您展示如何实施热备份。它们还提供了可用于自动化热备份过程的基本脚本。后面的章节解释了热备份的一些内部机制，并阐明了为什么在进行热备份之前必须将表空间置于备份模式。\n\
  \n### 进行热备份\n\n执行热备份需要以下步骤：\n\n1.  确保数据库处于归档日志模式。\n2.  确定要将备份文件复制到何处。\n3.  确定需要备份哪些文件。\n\
  4.  记录联机重做日志的最大序列号。\n5.  将数据库/表空间切换到备份模式。\n6.  使用操作系统实用程序将数据文件复制到步骤 2 确定的位置。\n7.\
  \  将数据库/表空间退出备份模式。\n8.  归档当前的联机重做日志，并记录联机重做日志的最大序列号。\n9.  备份控制文件。\n10. 备份备份期间产生的所有归档重做日志。\n\
  \n以下各节将详细说明这些步骤。\n\n#### 步骤 1. 确保数据库处于归档日志模式\n\n运行以下命令检查数据库的归档日志模式状态：\n\n```\nSQL>\
  \ archive log list;\n```\n\n输出显示该数据库处于归档日志模式：\n\n```\nDatabase log mode        \
  \      Archive Mode\nAutomatic archival             Enabled\nArchive destination\
  \            /u01/oraarch/o18c\n```\n\n如果不确定如何启用归档，请参阅第 5 章了解详情。\n\n\n**第 2 步：确定备份文件的存放位置**\n\
  \n现在，确定备份位置。在本例中，备份位置是目录 `/u01/hbackup/o18c`。要大致了解所需空间，您可以运行此查询：\n\n```sql\nSQL>\
  \ select sum(bytes) from dba_data_files;\n```\n\n理想情况下，备份位置应位于与您活动数据文件不同的一组磁盘上。但在实践中，很多时候您只获得\
  \ SAN 上分配的一部分空间，且不清楚底层的磁盘布局。在这些情况下，您依赖于 SAN 硬件内置的冗余机制（如 RAID 磁盘、多个控制器等）来确保高可用性和可恢复性。\n\
  \n**第 3 步：确定需要备份的文件**\n\n对于此步骤，您只需知道数据文件的位置：\n\n```sql\nSQL> select name from v$datafile;\n\
  ```\n\n当您进行到第 5 步时，可能需要考虑逐个将表空间切换到备份模式。如果您采用这种方法，则需要知道哪些数据文件与哪个表空间相关联：\n\n```sql\n\
  SQL> select tablespace_name, file_name\nfrom dba_data_files\norder by 1,2;\n```\n\
  \n**第 4 步：记下联机重做日志的最大序列号**\n\n要使用热备份成功恢复，您至少需要备份期间生成的所有归档重做日志。因此，在开始热备份之前，您需要记下归档日志序列号：\n\
  \n```sql\nSQL> select thread#, max(sequence#)\nfrom v$log\ngroup by thread#\norder\
  \ by thread#;\n```\n\n**第 5 步：将数据库/表空间切换到备份模式**\n\n您可以使用 `ALTER DATABASE BEGIN BACKUP`\
  \ 语句将所有表空间同时切换到备份模式：\n\n```sql\nSQL> alter database begin backup;\n```\n\n如果这是一个活跃的\
  \ OLTP 数据库，这样做会大大降低性能。这是因为当表空间处于备份模式时，Oracle 会将任何数据块（在首次修改时）的完整映像复制到重做流中（更多详细信息，请参阅本章后面的“理解拆分块问题”部分）。\n\
  \n另一种方法是每次只将一个表空间切换到备份模式。将表空间切换到备份模式后，您可以复制相关的数据文件（第 6 步），然后将表空间切换出备份模式（第 7 步）。您必须对每个表空间执行此操作：\n\
  \n```sql\nSQL> alter tablespace <tablespace_name> begin backup;\n```\n\n**第 6 步：使用操作系统实用程序复制数据文件**\n\
  \n使用操作系统实用程序（Linux/Unix 的 `cp` 命令）将数据文件复制到备份位置。在此示例中，所有数据文件都在一个目录中，并且都复制到同一个备份目录：\n\
  \n```bash\n$ cp /u01/dbfile/o18c/*.dbf  /u01/hbackup/o18c\n```\n\n**第 7 步：将数据库/表空间切换出备份模式**\n\
  \n将所有数据文件复制到备份目录后，您需要将表空间切换出备份模式。此示例将所有表空间同时切换出备份模式：\n\n```sql\nSQL> alter database\
  \ end backup;\n```\n\n如果您是逐个将表空间切换到备份模式，则需要在复制完其数据文件后，将每个表空间切换出备份模式：\n\n```sql\n\
  SQL> alter tablespace <tablespace_name> end backup;\n```\n\n如果您不将表空间切换出备份模式，可能会严重降低性能并损害数据库的可恢复性。我还遇到过\
  \ RMAN 故障导致表空间或数据文件停留在备份模式，并使得后续备份也失败的情况，而此检查可以显示是否有对象仍处于备份模式。您可以通过以下查询验证没有数据文件处于\
  \ `ACTIVE` 状态：\n\n```sql\nSQL> alter session set nls_date_format = 'DD-MON-RRRR\
  \ HH24:MI:SS';\nSQL> select * from v$backup where status='ACTIVE';\n```\n\n注意：正确设置\
  \ `NLS_DATE_FORMAT` 参数将使您能够看到数据文件被置于备份模式的确切日期/时间。在需要恢复数据文件时，这对于确定所需的归档日志起始序列号很有用。\n\
  \n**第 8 步：归档当前联机重做日志，并记下联机重做日志的最大序列号**\n\n以下语句指示 Oracle 归档所有未归档的联机重做日志并启动日志切换。这确保将备份结束标记写入归档重做日志：\n\
  \n```sql\nSQL> alter system archive log current;\n```\n\n同时，记下联机重做日志的最大序列号。如果在热备份后立即发生故障，您需要热备份期间生成的所有归档重做日志才能完全恢复数据库：\n\
  \n```sql\nSQL> select thread#, max(sequence#)\nfrom v$log\ngroup by thread#\norder\
  \ by thread#;\n```\n\n**第 9 步：备份控制文件**\n\n对于热备份，您不能使用操作系统复制命令来备份控制文件。Oracle 的热备份过程规定您必须使用\
  \ `ALTER DATABASE BACKUP CONTROLFILE` 语句。此示例备份控制文件并将其放置在与数据库备份文件相同的位置：\n\n```sql\n\
  SQL> alter database backup controlfile\nto '/u01/hbackup/o18c/controlbk.ctl' reuse;\n\
  ```\n\n`REUSE` 子句指示 Oracle 如果该文件已存在于备份位置，则覆盖它。\n\n**第 10 步：备份备份期间生成的任何归档重做日志**\n\
  \n备份热备份期间生成的归档重做日志。您可以使用操作系统复制命令完成此操作：\n\n```bash\n$ cp /u01/arch/o18c/*.arc /u01/hbackup/o18c\n\
  ```\n\n此过程保证您拥有这些日志，即使在热备份完成后不久发生故障。请确保不要备份正在被归档进程写入的归档重做日志——这样做会导致该文件复制不完整。有时，DBA\
  \ 通过检查 `V$ARCHIVED_LOG` 视图中的最大 `SEQUENCE#` 和最大 `RESETLOGS_ID` 来编写此过程的脚本。Oracle 在完成归档重做日志到磁盘的复制后会更新该视图。因此，出现在\
  \ `V$ARCHIVED_LOG` 视图中的任何归档重做日志文件都应该是安全的，可以复制。\n\n**编写热备份脚本**\n\n本节中的脚本涵盖了与热备份相关的最小任务集。对于生产环境，热备份脚本可能相当复杂。此处提供的脚本为您提供了应在热备份脚本中包含内容的基线。您需要修改脚本中的这些变量以使其在您的环境中工作：\n\
  \n*   `ORACLE_SID`\n*   `ORACLE_HOME`\n*   `hbdir`\n\n`ORACLE_SID` 操作系统变量定义您的数据库名称。`ORACLE_HOME`\
  \ 操作系统变量定义您安装 Oracle 软件的位置。SQL*Plus `hbdir` 变量指向热备份的目录。\n\n```bash\n#!/bin/bash\n\
  ORACLE_SID=o18c\nORACLE_HOME=/u01/app/oracle/product/18.1.0.1/db_1\nPATH=$PATH:$ORACLE_HOME/bin\n\
  #\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0 lines 132 verify off feed\
  \ off trimsp on\ndefine hbdir=/u01/hbackup/o18c\nspo hotback.sql\nselect 'spo &&hbdir/hotlog.txt'\
  \ from dual;\nselect 'select max(sequence#) from v\\$log;' from dual;\nselect 'alter\
  \ database begin backup;' from dual;\nselect '!cp ' || name || ' ' || '&&hbdir'\
  \ from v\\$datafile;\nselect 'alter database end backup;' from dual;\nselect 'alter\
  \ database backup controlfile to ' || \"\" || '&&hbdir'\n|| '/controlbk.ctl'  ||\
  \ \"\" || ' reuse;' from dual;\nselect 'alter system archive log current;' from\
  \ dual;\nselect 'select max(sequence#) from v\\$log;' from dual;\nselect 'select\
  \ member from v\\$logfile;' from dual;\nselect 'spo off;' from dual;\nspo off;\n\
  @@hotback.sql\nEOF\n```\n\n该脚本生成一个 `hotback.sql` 脚本。此脚本包含执行热备份的命令。以下是一个测试数据库的 `hotback.sql`\
  \ 脚本清单：\n\n\n```\nspo /u01/hbackup/o18c/hotlog.txt\nselect max(sequence#) from v$log;\n\
  alter database begin backup;\n!cp /u01/dbfile/o18c/system01.dbf /u01/hbackup/o18c\n\
  !cp /u01/dbfile/o18c/sysaux01.dbf /u01/hbackup/o18c\n!cp /u01/dbfile/o18c/undotbs01.dbf\
  \ /u01/hbackup/o18c\n!cp /u01/dbfile/o18c/users01.dbf /u01/hbackup/o18c\n!cp /u01/dbfile/o18c/tools01.dbf\
  \ /u01/hbackup/o18c\nalter database end backup;\nalter database backup controlfile\
  \ to '/u01/hbackup/o18c/controlbk.ctl' reuse;\nalter system archive log current;\n\
  select max(sequence#) from v$log;\nselect member from v$logfile;\nspo off;\n```\n\
  \n你可以从 `SQL*Plus` 手动运行此脚本，像这样：\n\n```\nSQL> @hotback.sql\n```\n\n#### 注意事项\n\n如果之前的脚本在执行到\
  \ `ALTER DATABASE END BACKUP` 语句之前失败，你必须通过从 `SQL*Plus`（以 `SYS` 用户身份）手动运行 `ALTER\
  \ DATABASE END BACKUP` 来将数据库（表空间）退出备份模式。\n\n在生成热备份脚本时，生成一个可用于从备份目录复制数据文件的脚本是明智的。你必须修改此脚本中的\
  \ `hbdir` 变量，以匹配你环境中热备份的位置。以下是一个生成复制命令的脚本：\n\n```\n#!/bin/bash\nORACLE_SID=o18c\n\
  ORACLE_HOME=/u01/app/oracle/product/18.1.0.1/db_1\nPATH=$PATH:$ORACLE_HOME/bin\n\
  #\nsqlplus -s <<EOF\n/ as sysdba\nset head off pages0 lines 132 verify off feed\
  \ off trimsp on\ndefine hbdir=/u01/hbackup/o18c/\ndefine dbname=$ORACLE_SID\nspo\
  \ hotrest.sql\nselect '!cp ' || '&&hbdir' || substr(name,instr(name,'/',-1,1)+1)\n\
  || ' ' || name from v\\$datafile;\nspo off;\nEOF\n#\nexit 0\n```\n\n对于我的环境，以下是从\
  \ `SQL*Plus` 执行以从备份目录复制回数据文件的生成代码（如果发生故障）：\n\n```\n!cp /u01/hbackup/o18c/system01.dbf\
  \ /u01/dbfile/o18c/system01.dbf\n!cp /u01/hbackup/o18c/sysaux01.dbf /u01/dbfile/o18c/sysaux01.dbf\n\
  !cp /u01/hbackup/o18c/undotbs01.dbf /u01/dbfile/o18c/undotbs01.dbf\n!cp /u01/hbackup/o18c/users01.dbf\
  \ /u01/dbfile/o18c/users01.dbf\n!cp /u01/hbackup/o18c/tools01.dbf /u01/dbfile/o18c/tools01.dbf\n\
  ```\n\n在此输出中，如果你愿意从操作系统提示符运行命令，可以从每行中删除感叹号 (`!`)。主要思路是，这些命令在发生故障时可用，这样你就知道哪些文件备份到了哪个位置以及如何将它们复制回来。\n\
  \n#### 提示\n\n对于联机备份，不要使用用户管理的热备份技术；请使用 `RMAN`。`RMAN` 无需将表空间置于备份模式，并且自动化了几乎所有与备份和恢复相关的操作。\n\
  \n### 理解分割块问题\n\n要执行热备份，一个关键步骤是在使用操作系统实用程序复制与表空间关联的任何数据文件之前，将该表空间更改为备份模式。要理解为什么必须将表空间更改为备份模式，你必须熟悉有时被称为分割块（或断裂块）的问题。\n\
  \n回想一下，数据库块的大小通常与操作系统块的大小不同。例如，数据库块大小可能为 8KB，而操作系统块大小为 4KB。作为热备份的一部分，你使用操作系统实用程序复制活动的数据文件。在操作系统实用程序复制数据文件期间，存在数据库写入器同时写入某个块的可能性。由于\
  \ Oracle 块和操作系统块的大小不同，可能会发生以下情况：\n\n1.  操作系统实用程序复制了 Oracle 块的一部分。\n2.  片刻之后，数据库写入器更新了整个块。\n\
  3.  瞬间之后，操作系统实用程序复制了 Oracle 块的后半部分。\n\n这可能导致操作系统复制的块与 Oracle 写入操作系统的内容不一致。图 16-1\
  \ 说明了这个概念。\n\n![../images/214899_3_En_16_Chapter/214899_3_En_16_Fig1_HTML.png](img/214899_3_En_16_Fig1_HTML.png)\n\
  \n*图 16-1 热备份中的分割块（或断裂块）问题*\n\n查看图 16-1，在时间 3 复制到磁盘的块，就 Oracle 而言是损坏的。块的前半部分来自时间\
  \ 1，而后半部分是在时间 3 复制的。当你进行热备份时，你是在保证数据文件备份中存在块级别的损坏。\n\n要理解 Oracle 如何解决分割块问题，首先考虑一个在正常模式下（非备份模式）运行的数据库。写入联机重做日志的重做信息仅是\
  \ Oracle 为重做事务所需的内容。重做流包含完整的数据块。Oracle 只在重做流中记录一个更改向量，该向量指定了哪个块被更改以及如何被更改。图 16-2\
  \ 显示了 Oracle 在正常条件下的操作。\n\n![../images/214899_3_En_16_Chapter/214899_3_En_16_Fig2_HTML.png](img/214899_3_En_16_Fig2_HTML.png)\n\
  \n*图 16-2 Oracle 通常只将更改向量写入重做流*\n\n现在，考虑热备份期间发生的情况。对于热备份，在复制与表空间关联的数据文件之前，必须首先将该表空间更改为备份模式。在此模式下，Oracle\
  \ 在修改一个块之前，会将整个块复制到重做流中。对该块的任何后续更改只需要将正常的重做更改向量写入重做流。如图 16-3 所示。\n\n![../images/214899_3_En_16_Chapter/214899_3_En_16_Fig3_HTML.png](img/214899_3_En_16_Fig3_HTML.png)\n\
  \n*图 16-3 整个块被写入重做流*\n\n要理解为什么 Oracle 将整个块记录到重做流中，请考虑在还原和恢复期间发生的情况。首先，从热备份中还原备份文件。如前所述，这些备份文件由于分割块问题而包含损坏的块。但这无关紧要，因为一旦\
  \ Oracle 恢复了数据文件，对于热备份期间被修改的任何块，Oracle 都拥有该块在修改前的映像副本。Oracle 使用其在重做流中拥有的该块副本作为恢复（该块）的起点。此过程如图\
  \ 16-4 所示。\n\n![../images/214899_3_En_16_Chapter/214899_3_En_16_Fig4_HTML.png](img/214899_3_En_16_Fig4_HTML.png)\n\
  \n*图 16-4 分割块的还原和恢复*\n\n这样，热备份文件中是否存在损坏的块就无关紧要了。Oracle 始终从重做流中该块的副本（修改前的状态）开始块的恢复过程。\n\
  \n### 理解备份期间生成重做日志的必要性\n\n如果你在刚进行热备份后不久就遇到故障，会发生什么？Oracle 知道表空间何时被置于备份模式（开始备份的系统\
  \ `SCN` 写入重做流），并且知道表空间何时退出备份模式（备份结束标记写入重做流）。Oracle 需要该时间段内生成的每个归档重做日志才能成功恢复数据文件。\n\
  \n图 16-5 显示，至少需要序列号从 100 到 102 的归档重做日志来恢复该表空间。这些归档重做日志是在热备份期间生成的。\n\n![../images/214899_3_En_16_Chapter/214899_3_En_16_Fig5_HTML.png](img/214899_3_En_16_Fig5_HTML.png)\n\
  \n*图 16-5 应用的恢复*\n\n如果你尝试在开始和结束标记之间的所有重做日志都应用到数据文件之前停止恢复过程，Oracle 会抛出此错误：\n\n```\n\
  ORA-01195: online backup of file 1 needs more recovery to be consistent\n```\n\n\
  \n\n### 应用重做日志\n\n在热备份一个表空间期间产生的所有重做日志，必须在数据文件可以被打开之前应用到这些数据文件上。Oracle 至少需要应用介于开始备份\
  \ SCN 标记和结束备份标记之间的一切重做数据，以涵盖表空间处于备份模式时被修改的所有数据块。这些重做数据存在于归档重做日志文件中；或者，如果故障恰好发生在备份结束后，部分重做数据可能尚未归档，可能存在于在线重做日志中。因此，你需要指示\
  \ Oracle 应用在线重做日志中的内容。\n\n### 理解数据文件的更新方式\n\n请注意，在图表 16-2 和 16-3 中，数据库写入器的行为在整个备份过程中基本保持不变。数据库写入器会持续将数据块写入数据文件，无论数据库处于何种备份模式。数据库写入器并不关心是否正在进行热备份；它的工作就是将缓冲区缓存中的数据块写入数据文件。\n\
  \n偶尔，你会遇到声称在用户管理的热备份期间数据库写入器不会写入数据文件的 DBA。这是一种普遍的误解。运用一些常识：如果数据库写入器在热备份期间不写入数据文件，那么变更被写到哪里去了？如果事务被写到数据文件以外的地方，那么备份完成后这些数据文件如何被重新同步？这说不通。\n\
  \n有些 DBA 说：“数据文件头被冻结了，这意味着数据文件没有变更。”Oracle 确实会冻结数据文件头中表示热备份开始的 SCN，并且在该表空间退出备份模式之前不会更新那个\
  \ SCN。这个“冻结的 SCN”并不意味着在备份期间数据块没有被写入数据文件。你可以通过以下操作轻松证明数据文件在备份模式下被写入：\n\n1.  将一个表空间至于备份模式：\n\
  \    ```\n    SQL> alter tablespace users begin backup;\n    ```\n\n2.  创建一个包含字符字段的表：\n\
  \    ```\n    SQL> create table cc(cc varchar2(20)) tablespace users;\n    ```\n\
  \n3.  向该表中插入一个字符串：\n    ```\n    SQL> insert into cc values('DBWR does write');\n\
  \    ```\n\n4.  强制执行一个检查点（确保所有被修改的缓冲区都被写入磁盘）：\n    ```\n    SQL> alter system checkpoint;\n\
  \    ```\n\n5.  从操作系统层面，使用`strings`和`grep`命令在数据文件中搜索该字符串：\n    ```\n    $ strings\
  \ /u01/dbfile/o18c/users01.dbf | grep \"DBWR does write\"\n    ```\n\n6.  以下是输出结果，证明数据库写入器确实将数据写入了磁盘：\n\
  \    ```\n    DBWR does write\n    ```\n\n7.  别忘了将表空间退出备份模式：\n    ```\n    SQL>\
  \ alter tablespace users end backup;\n    ```\n\n## 执行归档日志模式数据库的完整恢复\n\n术语“完整恢复”意味着你可以恢复在故障发生前所有已提交的事务。“完整恢复”并不意味着你需要完全恢复和还原整个数据库。例如，如果只有一个数据文件遭遇了介质故障，你只需要还原并恢复那个损坏的数据文件即可完成一次完整恢复。\n\
  \n> **提示**：如果你可以访问一个测试或开发数据库，请花时间演练接下来每个示例中的每一个步骤。实践这些步骤可以比任何文档教你更多关于备份和恢复的知识。\n\
  \n这里概述的步骤适用于任何在归档日志模式下备份的数据库。无论你进行的是冷备份还是热备份都没关系。只要数据库在备份时处于归档日志模式，还原和恢复数据文件的步骤是相同的。对于一次完整恢复，你需要以下条件：\n\
  \n- 能够还原那些遭遇了介质故障的数据文件\n- 能够访问自上次备份开始以来产生的所有归档重做日志\n\n\n## 数据库完整恢复\n\n以下是完整恢复的基本步骤：\n\
  \n1.  将数据库置于`mount`模式；这可以防止正常的用户事务处理读取或写入正在恢复的数据文件。（如果您正在恢复的不是`SYSTEM`或`UNDO`表空间，您可以选择打开数据库并在恢复数据文件之前手动将其离线。如果您这样做，请确保在恢复完成后将数据文件重新在线。）\n\
  \n2.  使用操作系统复制实用程序还原损坏的数据文件。\n\n3.  执行相应的 SQL*Plus `RECOVER`命令，以应用归档重做日志和在线重做日志中所需的任何信息。\n\
  \n4.  将数据库打开。\n\n接下来的几个部分将演示一些常见的完整还原与恢复场景。您应该能够将这些基本场景应用于诊断和恢复您可能遇到的任何复杂情况。\n\n\
  ### 数据库离线时的还原与恢复\n\n本节详细介绍了一个简单的还原与恢复场景。接下来描述的是模拟故障然后执行完整还原和恢复的步骤。请在开发数据库中尝试此场景。确保您有一个良好的备份，并且不是在包含关键业务数据的数据库中进行此实验。\n\
  \n在开始此示例之前，请创建一个表并插入一些数据。在完整恢复过程结束时会查询此表和数据，以证明恢复成功：\n\n```sql\nSQL> create table\
  \ foo(foo number) tablespace users;\nSQL> insert into foo values(1);\nSQL> commit;\n\
  ```\n\n现在，多次切换在线日志。这样做可确保您必须在恢复过程中应用归档重做日志：\n\n```sql\nSQL> alter system switch\
  \ logfile;\n```\n\n正斜杠（`/`）会重新执行最近执行的 SQL 语句：\n\n```sql\nSQL> /\nSQL> /\nSQL> /\n\
  ```\n\n接下来，通过重命名与`USERS`表空间关联的数据文件来模拟介质故障。您可以通过以下查询确定此文件的名称：\n\n```sql\nSQL> select\
  \ file_name from dba_data_files where tablespace_name='USERS';\nFILE_NAME\n\n/u01/dbfile/o18c/users01.dbf\n\
  ```\n\n在操作系统中，重命名该文件：\n\n```bash\n$ mv /u01/dbfile/o18c/users01.dbf /u01/dbfile/o18c/users01.dbf.old\n\
  ```\n\n然后，尝试停止数据库：\n\n```bash\n$ sqlplus / as sysdba\nSQL> shutdown immediate;\n\
  ```\n\n您应该会看到类似这样的错误：\n\n```\nORA-01116: error in opening database file ...\n```\n\
  \n如果这是一次真正的灾难，审慎的做法是导航到数据文件目录，列出文件，并查看目标文件是否在其正确的位置。您还应该检查`alert.log`文件，查看 Oracle\
  \ 是否在那里记录了任何相关信息。\n\n现在您已经模拟了介质故障，接下来的几个步骤将引导您完成还原和完整恢复。\n\n#### 步骤 1：将数据库置于`mount`模式\n\
  \n在将数据库置于`mount`模式之前，您可能需要先使用`ABORT`选项将其关闭：\n\n```bash\n$ sqlplus / as sysdba\n\
  SQL> shutdown abort;\nSQL> startup mount;\n```\n\n#### 步骤 2：从备份还原数据文件\n\n下一步是从备份中复制与发生故障的文件相对应的数据文件：\n\
  \n```bash\n$ cp /u01/hbackup/o18c/users01.dbf /u01/dbfile/o18c/users01.dbf\n```\n\
  \n此时，思考一下如果您尝试启动数据库，Oracle 会做什么是很有指导意义的。当您发出`ALTER DATABASE OPEN`语句时，Oracle 会检查控制文件中每个数据文件的\
  \ SCN。您可以通过查询`V$DATAFILE`来检查此 SCN：\n\n```sql\nSQL> select checkpoint_change# from\
  \ v$datafile where file#=4;\nCHECKPOINT_CHANGE#\n\n```\n\nOracle 将控制文件中的 SCN 与数据文件头中的\
  \ SCN 进行比较。您可以通过查询`V$DATAFILE_HEADER`来检查数据文件头中的 SCN；例如，\n\n```sql\nSQL> select file#,\
  \ fuzzy, checkpoint_change#\nfrom v$datafile_header\nwhere file#=4;\nFILE# FUZ CHECKPOINT_CHANGE#\n\
  ---------- --- ------------------\n4 YES            3502285\n```\n\n请注意，`V$DATAFILE_HEADER`中记录的\
  \ SCN 小于`V$DATAFILE`中相同数据文件的 SCN。如果您尝试打开数据库，Oracle 会抛出一个错误，指出需要介质恢复（意味着您需要应用重做）来同步数据文件中的\
  \ SCN 与控制文件中的 SCN。`FUZZY`列被设置为`YES`。这表明在打开数据文件以供使用之前，必须对其应用重做。以下是此时尝试打开数据库时发生的情况：\n\
  \n```sql\nSQL> alter database open;\nalter database open;\nalter database open\n\
  *\nERROR at line 1:\nORA-01113: file 4 needs media recovery...\n```\n\n在`V$DATAFILE_HEADER`中的所有\
  \ SCN 与控制文件中对应的 SCN 匹配之前，Oracle 不会让您打开数据库。\n\n#### 步骤 3：执行相应的`RECOVER`语句\n\n归档重做日志和在线重做日志具有将数据文件\
  \ SCN 追赶至控制文件 SCN 所需的信息。您可以通过执行以下 SQL*Plus 语句之一，对需要介质恢复的数据文件应用重做：\n\n*   `RECOVER\
  \ DATAFILE`\n*   `RECOVER TABLESPACE`\n*   `RECOVER DATABASE`\n\n由于在此示例中只有一个数据文件需要恢复，因此`RECOVER\
  \ DATAFILE`语句是合适的。但是，请记住，您可以运行上述任何`RECOVER`语句，Oracle 会弄清楚需要恢复什么。在此特定场景中，您可能会发现记住包含已还原数据文件的表空间名称比记住数据文件名更容易。接下来，恢复`USERS`表空间中所有需要恢复的数据文件：\n\
  \n```sql\nSQL> recover tablespace users;\n```\n\n此时，Oracle 使用数据文件头中的 SCN 来确定使用哪个归档重做日志或在线重做日志开始应用重做。您可以通过以下查询查看\
  \ RMAN 将用来开始恢复过程的起始日志序列号：\n\n```sql\nSQL> select\nHXFNM file_name\n,HXFIL file_num\n\
  ,FHTNM tablespace_name\n,FHTHR thread\n,FHRBA_SEQ sequence\nfrom X$KCVFH\nwhere\
  \ FHTNM = 'USERS';\n```\n\n如果所有需要的重做都在在线重做日志中，Oracle 应用该重做并显示此消息：\n\n```\nMedia\
  \ recovery complete.\n```\n\n如果 Oracle 需要应用仅存在于归档重做日志中的重做（意味着包含相应重做的在线重做日志已被覆盖），Oracle\
  \ 会提示您建议首先应用哪个归档重做日志：\n\n```\nORA-00279: change 3502285 generated at 11/02/2018\
  \ 10:49:39 needed for thread 1\nORA-00289: suggestion : /u01/oraarch/o18c/1_1_798283209.dbf\n\
  ORA-00280: change 3502285 for thread 1 is in sequence #1\nSpecify log: {=suggested\
  \ | filename | AUTO | CANCEL}\n```\n\n您可以按回车键（`<RET>`）让 Oracle 应用建议的归档重做日志文件，指定一个文件名，指定`AUTO`以指示\
  \ Oracle 自动应用所有建议的文件，或者键入`CANCEL`以取消恢复操作。\n\n在此示例中，指定`AUTO`。Oracle 应用所有归档重做日志文件和在线重做日志文件中的所有重做以执行完整恢复：\n\
  \n```sql\nAUTO\n```\n\n应用完所有必需的归档重做和在线重做后显示的最后一条消息是：\n\n```\nLog applied.\nMedia\
  \ recovery complete.\n```\n\n#### 步骤 4：打开数据库\n\n介质恢复完成后，您可以打开数据库：\n\n```sql\nSQL>\
  \ alter database open;\n```\n\n您现在可以验证在介质故障之前提交的事务是否已被还原和恢复：\n\n```sql\nSQL> select\
  \ * from foo;\nFOO\n\n```\n\n### 数据库在线时的还原与恢复\n\n\n## 在线恢复和还原控制文件\n\n### 在线恢复数据文件\n\
  \n如果你丢失了除 `SYSTEM` 和 `UNDO` 之外的某个表空间关联的数据文件，你可以在保持数据库在线的状态下恢复和修复该损坏的数据文件。为此，任何需要恢复的数据文件必须先被离线。你可能会收到关于数据文件的问题警报，用户在尝试更新表时会看到类似这样的错误：\n\
  \n```\nSQL> insert into foo values(2);\nORA-01116: error in opening database file\
  \ ...\n```\n\n你导航到包含该数据文件的操作系统目录，并确认它已被系统管理员错误地删除。\n\n在本例中，与 `USERS` 表空间关联的数据文件被离线，随后在数据库其余部分保持在线的情况下进行了恢复和修复。首先，将数据文件离线：\n\
  \n```\nSQL> alter database datafile '/u01/dbfile/o18c/users01.dbf' offline;\n```\n\
  \n现在，从备份位置恢复相应的数据文件：\n\n```\n$ cp /u01/hbackup/o18c/users01.dbf /u01/dbfile/o18c/users01.dbf\n\
  ```\n\n在这种情况下，你不能使用 `RECOVER DATABASE`。`RECOVER DATABASE` 语句尝试恢复数据库中的所有数据文件，而 `SYSTEM`\
  \ 表空间是其中的一部分。`SYSTEM` 表空间无法在数据库在线时恢复。如果你使用 `RECOVER TABLESPACE`，则与该表空间关联的所有数据文件都必须离线。在这种情况下，更合适的粒度是在数据文件级别进行恢复：\n\
  \n```\nSQL> recover datafile '/u01/dbfile/o18c/users01.dbf';\n```\n\nOracle 检查数据文件头中的\
  \ SCN，并确定使用哪个归档重做日志或在线重做日志来开始应用重做。如果所有需要的重做都在在线重做日志中，你将看到此消息：\n\n```\nMedia recovery\
  \ complete.\n```\n\n如果重做的起始点仅包含在归档重做日志文件中，Oracle 会建议从哪个文件开始：\n\n```\nORA-00279:\
  \ change 3502285 generated at 11/02/2018 10:49:39 needed for thread 1\nORA-00289:\
  \ suggestion : /u01/oraarch/o18c/1_1_798283209.dbf\nORA-00280: change 3502285 for\
  \ thread 1 is in sequence #1\nSpecify log: {=suggested | filename | AUTO | CANCEL}\n\
  ```\n\n你可以输入 `AUTO`，让 Oracle 自动应用归档重做日志文件和在线重做日志文件中所有需要的重做：\n\n```\nAUTO\n```\n\n\
  如果成功，你应该会看到此消息：\n\n```\nLog applied.\nMedia recovery complete.\n```\n\n现在你可以将数据文件重新联机：\n\
  \n```\nSQL> alter database datafile '/u01/dbfile/o18c/users01.dbf' online;\n```\n\
  \n如果成功，你应该会看到：\n\n```\nDatabase altered.\n```\n\n### 还原控制文件\n\n在处理用户管理的备份时，你通常会在以下情况之一还原控制文件：\n\
  \n*   控制文件损坏，且该文件是多路复用的。\n*   所有控制文件都损坏。\n\n这两种情况将在以下部分中介绍。\n\n#### 多路复用时还原损坏的控制文件\n\
  \n如果你配置了数据库有多个控制文件，你可以关闭数据库并使用操作系统命令将现有的控制文件复制到丢失控制文件的位置。例如，从初始化文件中，你知道此数据库使用了两个控制文件：\n\
  \n```\nSQL> show parameter control_files\nNAME                         TYPE    \
  \    VALUE\n---------------------------- ----------- ------------------------------\n\
  control_files                string      /u01/dbfile/o18c/control01.ctl\n,/u02/dbfile/o18c/control02.ctl\n\
  ```\n\n假设 `control02.ctl` 文件已损坏。在查询数据字典时，Oracle 会抛出此错误：\n\n```\nORA-00210: cannot\
  \ open the specified control file...\n```\n\n当有一个完好的控制文件可用时，你可以关闭数据库，移动旧的/损坏的控制文件（这保留了它，以备将来需要进行根本原因分析），然后将现有的完好控制文件复制到损坏控制文件的名称和位置：\n\
  \n```\nSQL> shutdown abort;\n$ mv /u02/dbfile/o18c/control02.ctl /u02/dbfile/o18c/control02.ctl.old\n\
  $ cp /u01/dbfile/o18c/control01.ctl /u02/dbfile/o18c/control02.ctl\n```\n\n现在，重新启动数据库：\n\
  \n```\nSQL> startup;\n```\n\n通过这种方式，你可以从现有的控制文件还原一个控制文件。\n\n#### 所有控制文件损坏时进行还原\n\
  \n如果你丢失了所有控制文件，你可以从备份中还原一个，或者重新创建控制文件。只要你有所有数据文件和任何需要的重做（归档重做和在线重做），你应该能够完全恢复你的数据库。此场景的步骤如下：\n\
  \n1.  关闭数据库。\n2.  从备份中还原一个控制文件。\n3.  以装载模式启动数据库，并使用 `RECOVER DATABASE USING BACKUP\
  \ CONTROLFILE` 子句启动数据库恢复。\n4.  对于完全恢复，手动应用在线重做日志中包含的重做。\n5.  使用 `OPEN RESETLOGS`\
  \ 子句打开数据库。\n\n在本例中，数据库的所有控制文件被意外删除，Oracle 随后报告此错误：\n\n```\nORA-00210: cannot open\
  \ the specified control file...\n```\n\n**步骤 1. 关闭数据库**\n\n首先，关闭数据库：\n\n```\nSQL>\
  \ shutdown abort;\n```\n\n**步骤 2. 从备份中还原控制文件**\n\n此数据库配置为仅有一个控制文件，你从备份位置将其复制回来，如下所示：\n\
  \n```\n$ cp /u01/hbackup/o18c/controlbk.ctl /u01/dbfile/o18c/control01.ctl\n```\n\
  \n如果使用了多个控制文件，你必须将备份控制文件复制到 `CONTROL_FILES` 初始化参数中列出的每个控制文件和位置名称。\n\n**步骤 3. 以装载模式启动数据库，并启动数据库恢复**\n\
  \n接下来，以装载模式启动数据库：\n\n```\nSQL> startup mount;\n```\n\n在控制文件和数据文件被复制回来后，你可以执行恢复。Oracle\
  \ 知道控制文件来自备份（因为它是用 `ALTER DATABASE BACKUP CONTROLFILE` 语句创建的），因此恢复必须使用 `USING BACKUP\
  \ CONTROLFILE` 子句执行：\n\n```\nSQL> recover database using backup controlfile;\n```\n\
  \n此时，系统会提示你应用归档重做日志文件：\n\n```\nORA-00279: change 3584431 generated at 11/02/2018\
  \ 11:48:46 needed for thread 1\nORA-00289: suggestion : /u01/oraarch/o18c/1_8_798283209.dbf\n\
  ORA-00280: change 3584431 for thread 1 is in sequence #8\nSpecify log: {=suggested\
  \ | filename | AUTO | CANCEL}\n```\n\n输入 `AUTO` 以指示恢复过程自动应用所有归档重做日志：\n\n```\nAUTO\n\
  ```\n\n恢复过程会应用所有可用的归档重做日志。恢复过程无法确定归档重做流的结束位置，因此会尝试应用一个不存在的归档重做日志，导致如下消息：\n\n```\n\
  ORA-00308: cannot open archived log '/u01/oraarch/o18c/1_10_798283209.dbf'\nORA-27037:\
  \ unable to obtain file status\n```\n\n预期会出现前面的消息。现在，尝试打开数据库：\n\n```\nSQL> alter\
  \ database open resetlogs;\n```\n\nOracle 在此情况下会抛出以下错误：\n\n```\nORA-01113: file\
  \ 1 needs media recovery\nORA-01110: data file 1: '/u01/dbfile/o18c/system01.dbf'\n\
  ```\n\n**步骤 4. 应用在线重做日志中包含的重做**\n\nOracle 需要应用更多重做以将控制文件中的 SCN 与数据文件头中的 SCN 同步。在此场景中，在线重做日志仍然完好无损并包含所需的重做。要应用在线重做日志中包含的重做，首先识别在线重做日志文件的位置和名称：\n\
  \n```\nSQL> select a.sequence#, a.status, a.first_change#, b.member\nfrom v$log\
  \ a, v$logfile b\nwhere a.group# = b.group#\norder by a.sequence#;\n```\n\n以下是此示例的部分输出：\n\
  \n\n"
- '# 第 5 步。使用 RESETLOGS 打开数据库


  ```

  SEQUENCE#  STATUS          FIRST_CHANGE#   MEMBER

  ---------- --------------- --------------- ----------------------

  6  INACTIVE        3543960         /u01/oraredo/o12c/redo03a.rdo

  6  INACTIVE        3543960         /u02/oraredo/o12c/redo03b.rdo

  7  INACTIVE        3543963         /u02/oraredo/o12c/redo01b.rdo

  7  INACTIVE        3543963         /u01/oraredo/o12c/redo01a.rdo

  8  CURRENT         3583986         /u02/oraredo/o12c/redo02b.rdo

  8  CURRENT         3583986         /u01/oraredo/o12c/redo02a.rdo

  ```


  现在，重新启动恢复过程：


  ```sql

  SQL> recover database using backup controlfile;

  ```


  恢复过程提示需要一个不存在的归档重做日志：


  ```

  ORA-00279: change 3584513 generated at 11/02/2018 11:50:50 needed for thread 1

  ORA-00289: suggestion : /u01/oraarch/o18c/1_10_798283209.dbf

  ORA-00280: change 3584513 for thread 1 is in sequence #10

  Specify log: {=suggested | filename | AUTO | CANCEL}

  ```


  不要向恢复过程提供归档重做日志文件，而是输入当前联机重做日志文件的名称（您可能需要尝试每个联机重做日志，直到找到 Oracle 需要的那一个）。这会指示恢复过程应用联机重做日志中的任何重做信息：


  ```

  /u01/oraredo/o18c/redo01a.rdo

  ```


  当应用了正确的联机重做日志时，您应该看到此消息：


  ```

  Log applied.

  介质恢复完成。

  ```


  此时数据库已完全恢复。在此类恢复之后，重要的是对数据库执行新的备份。但是，由于恢复过程使用了备份控制文件，因此必须使用 `RESETLOGS` 子句打开数据库：


  ```sql

  SQL> alter database open resetlogs;

  ```


  成功后，您应该看到：


  ```

  Database altered.

  ```


  ## 执行归档日志模式数据库的不完全恢复


  不完全恢复意味着您没有恢复故障发生前已提交的所有事务。对于此类恢复，您是恢复到过去的一个时间点，而事务将会丢失。这就是为什么不完全恢复也被称为数据库时间点恢复。


  不完全恢复并不意味着您只恢复和还原部分数据文件。事实上，在大多数不完全恢复场景中，作为过程的一部分，您必须从备份中还原所有数据文件。如果您不想恢复所有数据文件，则首先需要将不打算参与不完全恢复过程的任何数据文件脱机。当您启动恢复时，Oracle
  将仅恢复 `V$DATAFILE_HEADER` 的 `STATUS` 列中值为 `ONLINE` 的数据文件。


  您可能出于许多不同原因希望执行不完全恢复：


  *   您尝试执行完全恢复，但缺少所需的归档重做日志或未归档的联机重做日志信息。

  *   您希望将数据库恢复到用户错误（如删除数据、删除表等）发生之前的某个时间点。

  *   您有一个测试环境。（闪回数据库可能是此处的一个选项。）


  您可以通过三种方式执行用户管理的不完全恢复：


  ### 基于取消的恢复


  基于取消的恢复允许您应用归档重做，并在基于归档重做日志文件的边界处暂停过程。例如，假设您正在尝试还原和恢复数据库，并且意识到缺少一个归档重做日志。您必须在最后一个完好的归档重做日志处停止恢复过程。您使用
  `RECOVER DATABASE` 语句的 `CANCEL` 子句启动基于取消的不完全恢复：


  ```sql

  SQL> recover database until cancel;

  ```


  ## 基于 SCN 的恢复


  如果您希望恢复到并包括某个 SCN 号，请使用基于 SCN 的不完全恢复。您可能从警报日志或 LogMiner 的输出中知道要恢复到的某个 SCN 点。使用 `UNTIL
  CHANGE` 子句执行此类不完全恢复：


  ```sql

  SQL> recover database until change 12345;

  ```


  ### 基于时间的恢复


  如果您知道要停止恢复过程的时间，请使用基于时间的不完全恢复。例如，您可能知道某个表在特定时间被删除，并希望将数据库恢复并恢复到指定时间。基于时间的恢复格式始终如下：`YYYY-MM-DD:HH24:MI:SS`。这是一个示例：


  ```sql

  SQL> recover database until time ''2018-10-21:02:00:00'';

  ```


  执行不完全恢复时，必须还原所有计划在不完全恢复完成后联机的数据文件。以下是进行不完全恢复的步骤：


  1.  关闭数据库。

  2.  从备份中还原所有数据文件。

  3.  在加载模式下启动数据库。

  4.  应用重做（前滚）到所需点，并停止恢复过程（使用基于取消、SCN 或时间的恢复）。

  5.  使用 `OPEN RESETLOGS` 子句打开数据库。


  以下示例执行基于取消的不完全恢复。如果数据库是打开的，请将其关闭：


  ```bash

  $ sqlplus / as sysdba

  SQL> shutdown abort;

  ```


  接下来，从备份中复制所有数据文件（冷备份或热备份均可）。此示例从热备份还原所有数据文件。在此示例中，当前控制文件完好无损，无需还原。以下是用于还原数据库的操作系统复制命令片段：


  ```bash

  cp /u01/hbackup/o18c/system01.dbf /u01/dbfile/o18c/system01.dbf

  cp /u01/hbackup/o18c/sysaux01.dbf /u01/dbfile/o18c/sysaux01.dbf

  cp /u01/hbackup/o18c/undotbs01.dbf /u01/dbfile/o18c/undotbs01.dbf

  cp /u01/hbackup/o18c/users01.dbf /u01/dbfile/o18c/users01.dbf

  cp /u01/hbackup/o18c/tools01.dbf /u01/dbfile/o18c/tools01.dbf

  ```


  数据文件复制回来后，即可启动恢复过程。此示例执行基于取消的不完全恢复：


  ```bash

  $ sqlplus / as sysdba

  SQL> startup mount;

  SQL> recover database until cancel;

  ```


  此时，Oracle 恢复过程建议应用一个归档重做日志：


  ```

  ORA-00279: change 3584872 generated at 11/02/2018 12:02:32 needed for thread 1

  ORA-00289: suggestion : /u01/oraarch/o18c/1_1_798292887.dbf

  ORA-00280: change 3584872 for thread 1 is in sequence #1

  Specify log: {=suggested | filename | AUTO | CANCEL}

  ```


  应用日志到您想要停止的点，然后键入 `CANCEL`：


  ```

  CANCEL

  ```


  这将停止恢复过程。现在，您可以使用 `RESETLOGS` 子句打开数据库：


  ```sql

  SQL> alter database open resetlogs;

  ```


  数据库已打开到过去的一个时间点。由于并非所有重做都已应用，因此该恢复被视为不完全恢复。


  **提示**

  现在是对数据库进行良好备份的好时机。如果您在打开数据库后不久发生故障，这将为您提供一个干净的点来启动还原和恢复。


  ## OPEN RESETLOGS 的用途


  有时，你需要使用 `OPEN RESETLOGS` 子句来打开数据库。当你重建控制文件、使用备份控制文件执行恢复与还原，或者执行不完全恢复时，可能就需要这样做。当你使用
  `OPEN RESETLOGS` 子句打开数据库时，它会清除所有现有的联机重做日志文件，或者如果文件不存在，则会重新创建它们。你可以查询 `V$LOGFILE`
  的 `MEMBER` 列，以查看哪些文件涉及 `OPEN RESETLOGS` 操作。


  为什么你会想要清除联机重做日志中的内容呢？以不完全恢复为例，在这种情况下，数据库被有意地打开到过去的某个时间点。此时，联机重做日志中的 SCN（系统变更号）信息包含了一些永远无法恢复的事务数据。Oracle
  强制你使用 `OPEN RESETLOGS` 打开数据库，就是为了特意清除这些信息。


  当你使用 `OPEN RESETLOGS` 打开数据库时，你创建了数据库的一个新化身（incarnation），并将日志序列号重置回 1。Oracle 要求一个新的化身，以避免在需要再次执行还原与恢复时，意外使用任何旧的归档重做日志（这些日志关联于数据库的另一个独立化身）。


  ## 概要


  一些研究表明，过度依赖自动驾驶技术的飞机飞行员，在处理灾难性飞行中问题的能力上，不如那些花费大量时间在没有自动驾驶辅助下飞行的飞行员。过度依赖自动驾驶的飞行员在遇到严重问题时往往忘记关键程序，而那些不那么依赖自动驾驶的飞行员则更擅长诊断和解决令人紧张的飞行中故障。


  同样，理解如何使用用户管理技术手动备份、还原和恢复数据库的 DBA，在故障排除和解决严重的备份与恢复问题方面，比那些仅通过屏幕界面操作备份与恢复技术的 DBA
  更为熟练。这就是本章被纳入本书的原因。理解每个步骤发生的事情以及为什么需要该步骤，对于全面掌握 Oracle 备份与恢复架构至关重要。在紧张的恢复场景中，拥有额外的知识和工具极具价值。这种意识会转化为关键的故障排除技能，尤其是在使用
  Oracle 工具如 RMAN（备份与恢复）、Enterprise Manager 和 Data Guard（灾难恢复、高可用性和复制）时。


  本章涵盖的用户管理备份与恢复技术现在已较少被教授或使用。大多数 DBA 正在（并且应该）使用 RMAN 来满足其 Oracle 备份与恢复需求。然而，理解冷备份和热备份的工作原理对你来说至关重要。你可能会受雇于一个仍在使用旧技术的公司，需要还原和恢复数据库、进行故障排除，或协助迁移到
  RMAN。在这些场景中，你必须完全理解旧的备份技术。


  既然你已经深入理解了 Oracle 备份与恢复机制，现在已准备好研究 RMAN。接下来的几章将探讨如何配置和使用 RMAN 进行生产级备份与恢复。


