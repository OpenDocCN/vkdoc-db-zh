    ## 性能与权衡


    当经常只需要表中的一小部分数据子集时，过滤索引是管理查询的绝佳方法。在非常大的表上，性能差异可能是巨大的！但需要谨慎，因为过滤索引有两个注意事项：


    *   `WHERE`子句必须精确。虽然查询优化器会尽力使用过滤索引，但它只能在查询的`WHERE`子句与索引重叠时利用它。如果查询变化很大导致过滤器不匹配，SQL
    Server将忽略该过滤索引并尝试使用其他索引。

    *   当数据写入带有过滤索引的表时，SQL Server必须检查更改的数据是否匹配过滤器。这意味着在修改数据时可能需要进行少量额外的读取，以正确维护过滤索引。虽然此成本通常很低，但在处理大型数据集时认识到这一点很重要。对于本例，任何修改`status`的`UPDATE`操作都需要验证这些更改是否会导致数据被添加或从过滤索引中移除。在带有复合`WHERE`子句的过滤索引中，修改其任何列都会导致类似的检查。


    在考虑为索引添加过滤器时，好处通常会超过成本。如果一个表包含1亿行，其中1万行包含当前或相关数据，那么你可以预期索引上的读取以及存储空间将减少到原始量的大约0.01%。这是一个显著的改进！


    ### 基数


    在讨论性能问题时，讨论基数及其对你执行的查询意味着什么是很重要的。基数指的是一个操作影响的行数。在优化查询时，SQL Server必须确定执行计划的每个部分将影响多少行。这个计数将决定重要的决策，例如是扫描还是查找表，或者是使用合并连接还是哈希连接。对基数的解释如果没有对统计信息的简要概述将是不完整的。'
