    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Product''. Scan count 1, logical reads 15, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    This time, reads were significantly higher than you’d expect for this stored procedure.
    The execution plan chosen was reused from the previous one that was used for the
    narrow range of IDs (index seek on `ProductModel`), rather than one that is optimal
    for a large result set (index scan on `ProductModel`). Reading the plan cache
    helps to understand what happened:


    ```

    EXEC dbo.read_query_plan_cache ''get_products_by_model'';

    ```


    The results in Figure [8-8](#A371168_1_En_8_Chapter.html#Fig8) show that the execution
    plan that was created for the narrow range of IDs was reused for the second run,
    despite providing parameters that resulted in a very different cardinality.


    ![A371168_1_En_8_Fig8_HTML.jpg](A371168_1_En_8_Fig8_HTML.jpg)


    Figure 8-8.


    Metrics returned by dbo.read_query_plan_cache illustrate parameter sniffing


    Note that `ExecutionCount` is 2. This is proof that the initial execution plan
    was reused for the second execution of the search proc. The rest of the metrics
    returned confirm the poor performance viewed previously:


    *   CPU: 2474 microseconds

    *   Reads: 607

    *   Duration: 90ms (90,353 microseconds)

    *   Rows Returned: 295


    This is an example of parameter sniffing when it directly harms query execution
    performance. A suboptimal execution plan was chosen and the result was significantly
    higher reads, CPU utilization, and a longer query runtime.


    Before discussing ways in which you can resolve performance problems with parameter
    sniffing, let’s look at an additional example that shows how parameter sniffing
    can potentially interfere when working with Dynamic SQL. These examples will use
    sales orders and will take advantage of a new salesperson in order to illustrate
    the effects of poor cardinality estimates on execution plans:


    ```

    INSERT INTO Sales.SalesPerson

    (BusinessEntityID, TerritoryID, SalesQuota, Bonus, CommissionPct, SalesYTD, SalesLastYear,
    rowguid, ModifiedDate)

    VALUES

    (1, 1, 1000000, 289, 0.17, 0, 0, NEWID(), CURRENT_TIMESTAMP);

    UPDATE Sales.SalesOrderHeader

    SET SalesPersonID = 1

    WHERE SalesPersonID IS NULL;

    UPDATE STATISTICS Sales.SalesOrderHeader;

    GO

    ```


    These statements will create a new salesperson and assign her to all sales orders
    that currently have no one assigned to them. In addition, it updates statistics
    on the table to ensure that the optimizer is aware of the new data when making
    optimization decisions. This will provide you with a salesperson with 27,659 sales
    orders assigned to her. Let’s introduce a new stored procedure that will search
    sales orders based on a `SalesPersonID` that is provided as a parameter. In addition,
    the number of rows returned and offset can be provided, if you want to page the
    results, as shown in Listing [8-3](#A371168_1_En_8_Chapter.html#Par59).'
