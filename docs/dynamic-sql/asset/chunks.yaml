    # 参数嗅探问题排查概述


    在将参数嗅探视为性能问题的罪魁祸首之前，务必先核实没有其他更严重的问题需要优先处理。除了统计信息、索引和 T-SQL 错误之外，SQL Server 配置设置也可能影响查询性能。并行度、跟踪标志以及内存/CPU
    压力都可能导致意外的性能下降。


    尽管存在所有这些可能性，始终应从最简单的解决方案开始，然后在其被证伪后再探索更复杂的方案。与计划重用不当相关的性能问题，其更可能仅仅是经典的参数嗅探所致，而非其他神秘原因。如果不是，则应考虑统计信息、索引和查询结构的影响。只有在其他所有方法都失败时，才有必要深入探查
    SQL Server 安装的内部以寻找更多线索。这种情况即使发生也会很少见，但做好准备并了解在何处寻找解决性能问题的方法，可以为将来节省大量时间。


    ## 参数值


    调查参数嗅探的一个好方法是检查参数本身以及通常传递给它们的值。某个值或一组值是否非常常见？这些值是否总是不同，表明一个从不重复的过程？参数通常接收的值是随机的，还是遵循某种明显的模式？


    这些知识有助于确定最佳行动方案。如果只有一小组值始终传递给存储过程，您可能能够对它们做出假设，并设计 T-SQL 以考虑这些人为的限制。一些有用的观察包括：


    *   参数是否始终是 `NOT NULL`？

    *   参数是否会始终设置为当前日期或某个重要指标的当前值？

    *   参数的取值范围是否非常有限？

    *   参数值是否看似随机？

    *   某个特定值是否极其常见，或者该值是否比其他值更重要或更相关？


    如前所述，考虑到变化的可能性很重要。如果应用程序更改可能影响参数值，则必须预见这些更改，不要编写会被未来这些更改损害的 T-SQL。如果可以验证这一点，则使用简化假设来重写存储过程，使其更短、更简单，并让优化器尽可能多地做出正确的决策。


    此外，了解结果集的基数会极大地影响您编写存储过程的方式。例如，如果某个存储过程始终返回单行，您可以确保其每个部分都针对该小型结果集进行了优化。类似地，如果您正在分页数据并且将始终返回
    25 或 50 行，则可以利用此信息确保存储过程被编写为返回该行数，不多也不少。


    如第 3 章所示，当不太可能请求更多数据时，可以对分页数据集进行小型结果集的优化。如果您知道用户将一页一页地请求数据，您可以编写查询以返回更多数据，为下一次点击做准备。让您得出这些结论的应用程序知识也提供了编写符合您试图满足的业务逻辑的
    T-SQL 所需的信息。


    ## 局部变量


    为了准备此示例，请向 `Production.Product` 添加一个索引，这将有助于支持您即将运行的查询：


