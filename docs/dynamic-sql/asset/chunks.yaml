    ## 9. 动态 PIVOT 与 UNPIVOT


    `PIVOT` 是一种极其高效的方法，用于更改结果集的结构，将单列值扩展为一组独立的列。`UNPIVOT` 则执行完全相反的操作，将一组列解析为单个输出列。这两种操作符在报表、分析或需要将现有数据格式化为应用程序所需的特定结构时非常有用。


    这两种操作符的一个显著限制是，在 TSQL 运行时之前，必须预先定义每种操作的列或名称列表。如果名称列表是静态的或足够可预测，以至于您不需要频繁修改代码即可使其正常工作，那么这是可以接受的。然而，如果此列表发生变化，您将被迫创建许多不同的存储过程或函数来处理众多的列表值，或者在代码中强制施加限制以避免这样做。


    有一个有趣的替代方案可以解决这两种问题，那就是使用动态 SQL 来动态生成名称列表。一旦为此操作符引入了动态性，您就可以编写 TSQL，将一列中的所有值、变量列表或用户输入提供的值都整合进来。如果不使用动态
    SQL，要完成此类任务将非常困难且效率低下，除非编写更长或更复杂的 TSQL 才能达到类似的结果集。


    ## PIVOT


    `PIVOT` 在分析中很常见，当您希望将事务数据解析为列式结构以用于报表或指标时。通过示例来介绍上述挑战最为简单。考虑清单 9-1 中的 TSQL，它返回一些数据量，以及库存中产品的颜色。


    ![A371168_1_En_9_Fig1_HTML.jpg](img/A371168_1_En_9_Fig1_HTML.jpg)


    图 9-1.


    清单 9-1 中的查询足够简单，并将返回这些结果。


    ```sql

    SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT_INVENTORY.LocationID,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID;

    清单 9-1.

    从 AdventureWorks 返回特定产品数据的查询

    ```


    请注意，单个产品可能在多个位置有数量。如果管理层希望跨所有这些位置，分析不同产品的受欢迎程度、库存与颜色之间的相关性呢？他们要求一份报表，其中不是每个产品（包含颜色）一行，而是每个产品名称一行，并为每种指定颜色增加额外的列。这将便于按产品和颜色进行分析。`PIVOT`
    是完成此任务的最简单方法，如清单 9-2 所示。


    ```sql

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (    SUM(product_quantity)

    FOR product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],
    [White], [Yellow])

    ) PIVOT_DATA;

    清单 9-2.

    使用 PIVOT 按颜色报告产品的常见用法

    ```


    在此示例中，您将先前的查询移入 `FROM` 子句中，该子句将用于数据透视。`PIVOT` 的正确语法需要两个新组件：


    *   一个聚合函数，当存在多个值时将进行聚合。在返回产品数据的初始 `SELECT` 语句中，存在许多重复行。此示例在此情况下使用 `SUM`，如果存在多行具有相同的产品名称，则将产品数量相加。

    *   一个值列表，包含所有将从行数据更改为列标题的值。在本例中，列表是 `Product.Color` 中的颜色。


    该语句在图 9-2 中的输出说明了新列的创建。


    ![A371168_1_En_9_Fig2_HTML.jpg](img/A371168_1_En_9_Fig2_HTML.jpg)


    图 9-2.

    清单 9-2 中 PIVOT 查询的输出


    结果显示了九个新列，它们与原始查询中定义的列相同。在原始查询的多行共享相同产品名称的情况下，数量被相加了。例如，对于产品 `Road-250 Black,
    48`，原始查询返回了两行，黑色的数量分别为 116 和 49。在 `PIVOT` 生成的输出中，您可以看到这两行被合并为一行，相同颜色的数量为 165。如果存在多个产品名称相同但颜色不同的产品，那么在应用
    `PIVOT` 后，单个产品将填充多个列的数量数据。


    这种方法存在一个唯一的弱点，那就是必须在运行时之前，在 `PIVOT` 语句中显式提供列列表。任何尝试重写 `PIVOT` 以在不使用动态 SQL 的情况下使用动态列表的操作都将失败，如清单
    9-3 和 9-4 所示。'
- fmt: '# SQL PIVOT 操作与动态列列表


    以下代码示例展示了尝试将更灵活的输入融入 `PIVOT` 查询的不同方法。


    ## 尝试使用子查询 (Listing 9-3)


    ```sql

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN (SELECT Color FROM Production.Product)

    ) PIVOT_DATA;

    ```

    *Listing 9-3. 尝试在 PIVOT 语句中使用子查询（未成功）*


    ## 尝试使用表变量 (Listing 9-4)


    ```sql

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    VALUES (''Black''), (''Blue''), (''Grey''), (''Multi''), (''Red''), (''Silver''),
    (''Silver/Black''), (''White''), (''Yellow'');

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN (SELECT color_name FROM @colors)

    ) PIVOT_DATA;

    ```

    *Listing 9-4. 尝试在 PIVOT 语句中使用表变量（也未成功）*


    这两个例子都是试图将更可定制的输入融入查询的合理尝试。第一个例子尝试输入 `Production.Product` 中的所有颜色。如果此方法有效，您就可以总是对列中的所有值使用
    `PIVOT`，而无需提前硬编码它们。第二个尝试使用表变量在执行 `PIVOT` 语句前存储一组颜色。如果此方法有效，您就可以通过应用程序或人员的输入在运行时之前自定义颜色列表。


    不幸的是，两种语法都不起作用，并会产生类似的错误消息：


    ```

    Msg 156, Level 15, State 1, Line 50

    Incorrect syntax near the keyword ''SELECT''.

    Msg 102, Level 15, State 1, Line 50

    Incorrect syntax near '')''.

    ```


    此消息不是特别有帮助，但暗示语法不正确。这个解决问题的巧妙尝试没有奏效，但有另一种方法可以绕过 `PIVOT` 语法中的这个限制：**动态 SQL**！列名列表必须在运行时之前就存在于
    T-SQL 中，这可以通过构建一个命令字符串并在构建字符串时添加列列表详细信息来实现。这将允许您拥有来自您选择的任何源的动态列列表。


    Listing 9-5 展示了一个新版本的 `PIVOT`，它使用一个表变量存储颜色列表，并将其输入到动态 SQL 中，以便在运行时输出到您指定的列列表。


    ## 使用动态 SQL 和表变量 (Listing 9-5)


    ```sql

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    VALUES (''Black''), (''Grey''), (''Silver/Black''), (''White'');

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    EXEC sp_executesql @sql_command;

    ```

    *Listing 9-5. 使用动态 SQL 和表变量在运行时创建可变列列表*


    `PIVOT` T-SQL 与之前完全相同，但它包含了本书前面的一些动态 SQL 方法来实现其目标。首先，它生成一个动态颜色列表并将其添加到命令字符串中：


    ```sql

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    ```


    对于表变量中的任意数量的颜色，此代码会将它们附加到命令字符串中，用方括号括起来并用逗号分隔。额外的 `SELECT` 语句删除了列表生成后留下的尾随逗号。


    一旦颜色列表被附加，您就可以完成命令字符串并执行它以获取结果集，如图 9-3 所示。


    ![A371168_1_En_9_Fig3_HTML.jpg](A371168_1_En_9_Fig3_HTML.jpg)

    *图 9-3. Listing 9-5 中动态 PIVOT 的结果*


    请注意，列只为您包含在表变量中的颜色存在。对于列标题中未给出的颜色的任何产品，由 `PIVOT` 操作添加的所有新列都将为 `NULL`。


    有了这个框架，您就可以处理以前不可能的场景。首先，让我们重写这个查询，使其包含所有颜色，无论底层数据中随时间推移添加或删除了哪些颜色。为了实现这一点，您只需将插入表变量的
    `INSERT` 替换为使用对 `Production.Product` 的查询，而不是静态值列表，如 Listing 9-6 所示。


    ## 使用所有颜色值的动态 PIVOT (Listing 9-6)


    ```sql

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT DISTINCT

    Product.Color

    FROM Production.Product

    WHERE Product.Color IS NOT NULL;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```

    *Listing 9-6. 使用 Production.Product 中所有颜色值的动态 PIVOT*


    执行前的命令字符串文本显示，它与原始硬编码的 `PIVOT` 查询完全相同：


    ```sql

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],
    [White], [Yellow])) PIVOT_DATA

    ```


    最终测试是向 `Production.Product` 添加几种颜色，然后再次运行动态 `PIVOT`，看看命令字符串和输出会发生什么变化：


    ```sql

    UPDATE Production.Product

    SET Product.Color = ''Fuschia''

    WHERE Product.ProductID = 325 -- Decal 1

    UPDATE Production.Product

    SET Product.Color = ''Aquamarine''

    WHERE Product.ProductID = 326 -- Decal 2

    ```


    这将两个产品更新为使用 `AdventureWorks` 中最初不存在的新颜色：Fuschia 和 Aquamarine。添加这些颜色后，让我们运行动态 `PIVOT`
    并查看新的命令字符串：


    ```sql

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ([Aquamarine], [Black], [Blue], [Fuschia], [Grey], [Multi],
    [Red], [Silver], [Silver/Black], [White], [Yellow]   )) PIVOT_DATA

    ```'
  raw: '```

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN (SELECT Color FROM Production.Product)

    ) PIVOT_DATA;

    Listing 9-3.

    Attempt to Use a Sub-SELECT Within a PIVOT Statement (Unsuccessfully)

    ```


    ```

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    VALUES (''Black''), (''Blue''), (''Grey''), (''Multi''), (''Red''), (''Silver''),
    (''Silver/Black''), (''White''), (''Yellow'');

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN (SELECT color_name FROM @colors)

    ) PIVOT_DATA;

    Listing 9-4.

    Attempt to Use a Table Variable Within a PIVOT Statement (also Unsuccessfully)

    ```


    Both examples are logical attempts to incorporate more customizable inputs into
    the query. The first example tries to feed in all colors from `Production.Product`.
    If this worked, you could always use `PIVOT` for all values in a column, without
    the need to hard-code them ahead of time. The second attempt uses a table variable
    to store a set of colors prior to executing the `PIVOT` statement. If this worked,
    you could then customize a color list prior to runtime using input from an application
    or person.


    Unfortunately, neither syntax works and they generate similar error messages:


    ```

    Msg 156, Level 15, State 1, Line 50

    Incorrect syntax near the keyword ''SELECT''.

    Msg 102, Level 15, State 1, Line 50

    Incorrect syntax near '')''.

    ```


    This message isn’t terribly helpful, but does imply that the syntax is incorrect.
    This slick attempt at solving a problem didn’t work, but there is another way
    to get past this limitation in the syntax of `PIVOT`: Dynamic SQL! The column
    name list must be present in the TSQL prior to runtime, and that can be accomplished
    by building a command string with the column list details added in when the string
    is built. This will allow you to have a dynamic column list available from any
    source you choose. Listing [9-5](#A371168_1_En_9_Chapter.html#Par20) shows a new
    version of the `PIVOT` that uses a table variable to store a list of colors and
    feeds it into Dynamic SQL in order to output to a column list that you specify
    at runtime.


    ```

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    VALUES (''Black''), (''Grey''), (''Silver/Black''), (''White'');

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    EXEC sp_executesql @sql_command;

    Listing 9-5.

    Use of Dynamic SQL and a Table Variable to Create a Variable Column List at Runtime

    ```


    The `PIVOT` TSQL is exactly the same as it was before, but it includes several
    dynamic SQL methods from earlier in this book in order to accomplish its goal.
    First, it generates a dynamic list of colors and adds it to the command string:


    ```

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    ```


    For any number of colors in the table variable, this will append them to the command
    string, contained in brackets and delimited by commas. The additional `SELECT`
    statement removes the trailing comma that remains from the list generation.


    Once the list of colors has been appended, you can complete the command string
    and execute it in order to get the result set, as shown in Figure [9-3](#A371168_1_En_9_Chapter.html#Fig3).


    ![A371168_1_En_9_Fig3_HTML.jpg](A371168_1_En_9_Fig3_HTML.jpg)


    Figure 9-3.


    Results of the dynamic PIVOT in Listing [9-5](#A371168_1_En_9_Chapter.html#Par20)


    Note that columns only exist for the colors that you included in the table variable.
    Any products for which the color is not given in a column header will have NULLs
    for all new columns added by the `PIVOT` operation.


    With this framework in place, you can tackle scenarios that were previously impossible.
    First, let’s rewrite this query so that it includes all colors, regardless of
    which are added or removed in the underlying data over time. In order to accomplish
    this, all you need to do is replace the `INSERT` into the table variable to use
    a query of `Production.` `Product` , rather than a static list of values, as shown
    in Listing [9-6](#A371168_1_En_9_Chapter.html#Par27).


    ```

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT DISTINCT

    Product.Color

    FROM Production.Product

    WHERE Product.Color IS NOT NULL;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    Listing 9-6.

    Dynamic PIVOT that Uses All Color Values in Production.Product

    ```


    The text of the command string prior to execution shows that it looks identical
    to the original hard-coded `PIVOT` query:


    ```

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],
    [White], [Yellow])) PIVOT_DATA

    ```


    The ultimate test is to add a few colors to `Production.Product` and see what
    happens to the command string and output when you run the dynamic `PIVOT` again:


    ```

    UPDATE Production.Product

    SET Product.Color = ''Fuschia''

    WHERE Product.ProductID = 325 -- Decal 1

    UPDATE Production.Product

    SET Product.Color = ''Aquamarine''

    WHERE Product.ProductID = 326 -- Decal 2

    ```


    This updates two products to use new colors that were not present in `AdventureWorks`
    originally: Fuschia and Aquamarine. With these colors added, let’s run the dynamic
    `PIVOT` and review the new command string:


    ```

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ([Aquamarine], [Black], [Blue], [Fuschia], [Grey], [Multi],
    [Red], [Silver], [Silver/Black], [White], [Yellow]   )) PIVOT_DATA

    ```'
  trans: '

    # SQL PIVOT 操作与动态列列表


    以下代码示例展示了尝试将更灵活的输入融入 `PIVOT` 查询的不同方法。


    ## 尝试使用子查询 (Listing 9-3)


    ```sql

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN (SELECT Color FROM Production.Product)

    ) PIVOT_DATA;

    ```

    *Listing 9-3. 尝试在 PIVOT 语句中使用子查询（未成功）*


    ## 尝试使用表变量 (Listing 9-4)


    ```sql

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    VALUES (''Black''), (''Blue''), (''Grey''), (''Multi''), (''Red''), (''Silver''),
    (''Silver/Black''), (''White''), (''Yellow'');

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN (SELECT color_name FROM @colors)

    ) PIVOT_DATA;

    ```

    *Listing 9-4. 尝试在 PIVOT 语句中使用表变量（也未成功）*


    这两个例子都是试图将更可定制的输入融入查询的合理尝试。第一个例子尝试输入 `Production.Product` 中的所有颜色。如果此方法有效，您就可以总是对列中的所有值使用
    `PIVOT`，而无需提前硬编码它们。第二个尝试使用表变量在执行 `PIVOT` 语句前存储一组颜色。如果此方法有效，您就可以通过应用程序或人员的输入在运行时之前自定义颜色列表。


    不幸的是，两种语法都不起作用，并会产生类似的错误消息：


    ```

    Msg 156, Level 15, State 1, Line 50

    Incorrect syntax near the keyword ''SELECT''.

    Msg 102, Level 15, State 1, Line 50

    Incorrect syntax near '')''.

    ```


    此消息不是特别有帮助，但暗示语法不正确。这个解决问题的巧妙尝试没有奏效，但有另一种方法可以绕过 `PIVOT` 语法中的这个限制：**动态 SQL**！列名列表必须在运行时之前就存在于
    T-SQL 中，这可以通过构建一个命令字符串并在构建字符串时添加列列表详细信息来实现。这将允许您拥有来自您选择的任何源的动态列列表。


    Listing 9-5 展示了一个新版本的 `PIVOT`，它使用一个表变量存储颜色列表，并将其输入到动态 SQL 中，以便在运行时输出到您指定的列列表。


    ## 使用动态 SQL 和表变量 (Listing 9-5)


    ```sql

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    VALUES (''Black''), (''Grey''), (''Silver/Black''), (''White'');

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    EXEC sp_executesql @sql_command;

    ```

    *Listing 9-5. 使用动态 SQL 和表变量在运行时创建可变列列表*


    `PIVOT` T-SQL 与之前完全相同，但它包含了本书前面的一些动态 SQL 方法来实现其目标。首先，它生成一个动态颜色列表并将其添加到命令字符串中：


    ```sql

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    ```


    对于表变量中的任意数量的颜色，此代码会将它们附加到命令字符串中，用方括号括起来并用逗号分隔。额外的 `SELECT` 语句删除了列表生成后留下的尾随逗号。


    一旦颜色列表被附加，您就可以完成命令字符串并执行它以获取结果集，如图 9-3 所示。


    ![A371168_1_En_9_Fig3_HTML.jpg](img/A371168_1_En_9_Fig3_HTML.jpg)

    *图 9-3. Listing 9-5 中动态 PIVOT 的结果*


    请注意，列只为您包含在表变量中的颜色存在。对于列标题中未给出的颜色的任何产品，由 `PIVOT` 操作添加的所有新列都将为 `NULL`。


    有了这个框架，您就可以处理以前不可能的场景。首先，让我们重写这个查询，使其包含所有颜色，无论底层数据中随时间推移添加或删除了哪些颜色。为了实现这一点，您只需将插入表变量的
    `INSERT` 替换为使用对 `Production.Product` 的查询，而不是静态值列表，如 Listing 9-6 所示。


    ## 使用所有颜色值的动态 PIVOT (Listing 9-6)


    ```sql

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT DISTINCT

    Product.Color

    FROM Production.Product

    WHERE Product.Color IS NOT NULL;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```

    *Listing 9-6. 使用 Production.Product 中所有颜色值的动态 PIVOT*


    执行前的命令字符串文本显示，它与原始硬编码的 `PIVOT` 查询完全相同：


    ```sql

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],
    [White], [Yellow])) PIVOT_DATA

    ```


    最终测试是向 `Production.Product` 添加几种颜色，然后再次运行动态 `PIVOT`，看看命令字符串和输出会发生什么变化：


    ```sql

    UPDATE Production.Product

    SET Product.Color = ''Fuschia''

    WHERE Product.ProductID = 325 -- Decal 1

    UPDATE Production.Product

    SET Product.Color = ''Aquamarine''

    WHERE Product.ProductID = 326 -- Decal 2

    ```


    这将两个产品更新为使用 `AdventureWorks` 中最初不存在的新颜色：Fuschia 和 Aquamarine。添加这些颜色后，让我们运行动态 `PIVOT`
    并查看新的命令字符串：


    ```sql

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ([Aquamarine], [Black], [Blue], [Fuschia], [Grey], [Multi],
    [Red], [Silver], [Silver/Black], [White], [Yellow]   )) PIVOT_DATA

    ```

    '
- fmt: "Note that the new colors are now present in the `PIVOT`. Reviewing the output\
    \ in Figure [9-4](#A371168_1_En_9_Chapter.html#Fig4), you can confirm that the\
    \ columns are in the result set and are correctly populated based on the changes\
    \ you made.\n\n![A371168_1_En_9_Fig4_HTML.jpg](A371168_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4. Dynamic PIVOT with the inclusion of two new colors\n\nWith this\
    \ syntax, you can make any `PIVOT` dynamic and supply a list of values from user\
    \ input, a TSQL query, or anywhere that data can be queried from in SQL Server.\
    \ This reduces the need to hard-code specific column headings into stored procedure,\
    \ thereby reducing maintenance costs over time. The last thing you want to worry\
    \ about is adjusting TSQL or application code whenever a new color bike is added\
    \ to the product inventory!\n\nThe following TSQL will clean up the changes and\
    \ remove the new colors, returning them to their original `NULL`:\n\n```sql\n\
    UPDATE Production.Product\nSET Product.Color = NULL\nWHERE Product.ProductID =\
    \ 325 -- Decal 1\nUPDATE Production.Product\nSET Product.Color = NULL\nWHERE Product.ProductID\
    \ = 326 -- Decal 2\n```\n\n## UNPIVOT\n\n`PIVOT` has its counterpart called `UNPIVOT`,\
    \ which takes a query with a column list and reconstructs it into row data. In\
    \ order to demonstrate this using familiar data, you will output the results of\
    \ the previous example into a table for use in this section using the TSQL in\
    \ Listing [9-7](#A371168_1_En_9_Chapter.html#Par39).\n\n```sql\nSELECT @sql_command\
    \ = '\nSELECT\n    *\nINTO dbo.Products_By_Color\nFROM\n    (      SELECT\n  \
    \          PRODUCT.Name AS product_name,\n            PRODUCT.Color AS product_color,\n\
    \            PRODUCT.ReorderPoint,\n            PRODUCT_INVENTORY.Quantity AS\
    \ product_quantity\n        FROM Production.Product PRODUCT\n        LEFT JOIN\
    \ Production.ProductInventory PRODUCT_INVENTORY\n            ON PRODUCT.ProductID\
    \ = PRODUCT_INVENTORY.ProductID\n    ) PRODUCT_DATA\n    PIVOT\n    (      SUM(product_quantity)\n\
    \        FOR product_color IN (';\n```\n\nListing 9-7. Query to Store Data for\
    \ Use in a Dynamic UNPIVOT Demonstration\n\nBy adding an `INTO` to the `SELECT`,\
    \ the output reviewed above will be stored in the table `dbo.Products_By_Color`,\
    \ which will be used in the `UNPIVOT` testing.\n\nThe syntax for `UNPIVOT` is\
    \ similar to `PIVOT` and involves the use of a similar column list, with the exception\
    \ that the data will be reverted to rows, removing all additional columns listed.\
    \ This can be seen in Listing [9-8](#A371168_1_En_9_Chapter.html#Par42).\n\n```sql\n\
    SELECT\n    *\nFROM\n    (SELECT\n        *\n    FROM dbo.Products_By_Color) AS\
    \ PRODUCTS_BY_COLOR\nUNPIVOT\n    (product_quantity FOR Color IN\n        ([Black],\
    \ [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])\n\
    \    ) AS UNPIVOT_DATA;\n```\n\nListing 9-8. Using UNPIVOT to Revert Column Headers\
    \ into Row Data\n\nFigure [9-5](#A371168_1_En_9_Chapter.html#Fig5) shows a subset\
    \ of the output from this statement.\n\n![A371168_1_En_9_Fig5_HTML.jpg](A371168_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5. Output from the UNPIVOT statement in Listing [9-8](#A371168_1_En_9_Chapter.html#Par42)\n\
    \nAll of the new columns introduced in the last section have been removed and\
    \ their corresponding names inserted into the new `Color` column. The syntax for\
    \ `UNPIVOT` involves three additional bits of syntax that are worth describing\
    \ in detail:\n\n*   A new column for the unpivoted quantity data. In this case,\
    \ we called the new column `product_quantity`, though any name could be used.\
    \ When using `UNPIVOT`, there is no need to provide an aggregation, as any duplicate\
    \ values will become distinct rows in the result.\n*   The new column that will\
    \ contain the column names must be provided. In this example, we name it `Color`.\n\
    *   A column list must be provided, similar to when you wrote a `PIVOT` statement.\
    \ Each column in this list will be included in rows of the result set. Any omitted\
    \ column names will not be represented in the result set.\n\nThe results from\
    \ this query are not the same as the original data. It is important to emphasize\
    \ that `UNPIVOT` is not simply the opposite of `PIVOT` and that applying one after\
    \ the other will rarely result in identical sets of data. In the previous example,\
    \ there are two important differences between this data and what you began with\
    \ at the start of the chapter.\n\nFirst, `NULL`s have been eliminated. Any product\
    \ with no color defined was dropped out of the result set. The results show all\
    \ product-color combinations for which a color in the list was present and had\
    \ a quantity defined. The second difference involves the quantities themselves.\
    \ When you apply `PIVOT` to a set of data, you supply an aggregate in order to\
    \ process multiple rows with the same value. Once quantities have been summed,\
    \ there is no way to \"un-sum\" them. The results of the `UNPIVOT` contain product\
    \ quantity totals that represent multiple products from the original data in `production.Product`.\
    \ Now that you understand the important differences between `PIVOT` and `UNPIVOT`,\
    \ and get the ways in which data is handled by each, you can work on making `UNPIVOT`\
    \ more flexible."
