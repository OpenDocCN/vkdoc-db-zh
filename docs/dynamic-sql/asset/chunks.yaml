    ### Filtered Indexes


    By default, an index will apply to all rows in a given table. On large tables,
    indexes can become expensive to read as well as time-consuming and resource-intensive
    to maintain. If you have a common query or a set of queries that all rely on the
    same filters, you can create an index that only applies to those filter conditions.
    This filtered index will only apply when those exact filters are used, so it is
    important to get it right the first time!


    A common use of filtered indexes is when you have a table for which a particular
    status or flag signifies data that you are interested in, whereas the remainder
    of the data will consistently be ignored. Consider the stored procedure in Listing
    6-14, which executes a search of purchase orders.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_in_process_purchasing_data'')

    BEGIN

    DROP PROCEDURE dbo.get_in_process_purchasing_data;

    END

    GO

    CREATE PROCEDURE dbo.get_in_process_purchasing_data

    @return_detail_data BIT

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    PurchaseOrderHeader.PurchaseOrderID,

    PurchaseOrderHeader.OrderDate,

    PurchaseOrderHeader.ShipDate,

    PurchaseOrderHeader.SubTotal,

    PurchaseOrderHeader.Freight'';

    IF @return_detail_data = 1

    SELECT @sql_command = @sql_command + '',

    PurchaseOrderDetail.PurchaseOrderDetailID,

    PurchaseOrderDetail.OrderQTY,

    PurchaseOrderDetail.UnitPrice,

    Product.Name,

    Product.ProductNumber'';

    SELECT @sql_command = @sql_command + ''

    FROM purchasing.PurchaseOrderHeader

    INNER JOIN purchasing.PurchaseOrderDetail

    ON PurchaseOrderHeader.PurchaseOrderID = PurchaseOrderDetail.PurchaseOrderID'';

    IF @return_detail_data = 1

    SELECT @sql_command = @sql_command + ''

    INNER JOIN Production.Product

    ON Product.ProductID = PurchaseOrderDetail.ProductID'';

    SELECT @sql_command = @sql_command + ''

    WHERE PurchaseOrderHeader.Status = 2'';

    EXEC sp_executesql @sql_command;

    END

    GO

    ```

    Listing 6-14. Simple Dynamic Search with a Common Status Filter


    This stored procedure performs a search using a parameter that determines if detailed
    data can be returned or not. More importantly, a common filter exists in all executions:


    `WHERE PurchaseOrderHeader.Status = 2`


    To illustrate a baseline for performance, you could add a standard covering index
    that will help reduce reads on `PurchaseOrderHeader`:


    ```sql

    CREATE NONCLUSTERED INDEX IX_PurchaseOrderHeader_status_INC

    ON Purchasing.PurchaseOrderHeader (OrderDate, status)

    INCLUDE (PurchaseOrderID, ShipDate, SubTotal, Freight);

    GO

    ```


    Now you can execute this for a detailed run:


    ```sql

    EXEC dbo.get_in_process_purchasing_data @return_detail_data = 1;

    ```


    The result set is comprised of 57 rows, containing all columns that could be returned
    by the Dynamic SQL within the stored procedure. The performance for this execution
    is as follows:


    ```

    Table ''Product''. Scan count 0, logical reads 114, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''PurchaseOrderDetail''. Scan count 12, logical reads 24, physical reads
    0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''PurchaseOrderHeader''. Scan count 1, logical reads 24, physical reads
    0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


