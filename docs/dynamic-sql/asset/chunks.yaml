  trans: '## 基于集合的字符串构建


    虽然 XML 解决方案更好，但它并不完美。其执行计划有些令人困惑，并说明了 XML 的 CPU 消耗可能很高。让我们考虑另一种选项，如清单 7-3 所示。


    ```

    DECLARE @myIDs NVARCHAR(MAX) = '''';

    SELECT TOP 100 @myIDs = @myIDs + CAST(BusinessEntityID AS NVARCHAR) + '',''

    FROM Person.Person

    ORDER BY LastName;

    SET @myIDs = LEFT(@myIDs, LEN(@myIDs) - 1);

    SELECT @myIDs;

    ```

    清单 7-3.

    通过直接将字符串构建到变量中来生成 ID 列表


    这段 T-SQL 代码在美观上要好得多。它如此简单，可能会让你挠头并问：“它是如何工作的？” 当你执行它时，结果与之前的示例相同：


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    SQL Server 允许你通过单个步骤将字符串数据直接 `SELECT` 到一个标量变量中。这种字符串构建让人想起动态 SQL，即使你并非为了生成它而执行命令字符串。该语句的一般结构如下：


    声明一个字符串，通常是 `VARCHAR(MAX)` 或 `NVARCHAR(MAX)`。将字符串变量设置为等于空字符串（或任何你想要的起始字符）。`SELECT
    @variable = @variable` 加上列和字符串数据的组合。从字符串末尾移除尾随逗号。根据需要处理逗号分隔的列表。


    首先，让我们看看 IO 统计信息，以确定为了生成此列表读取了多少数据：


    ```

    表 ''Person''。扫描计数 1，逻辑读取 3，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。

    ```


    与 XML 解决方案一样，读取次数与单独执行 `SELECT` 查询所需的次数相同。三次读取来生成该列表是非常出色的。图 7-4 显示了执行计划。


    ![A371168_1_En_7_Fig4_HTML.jpg](img/A371168_1_En_7_Fig4_HTML.jpg)

    图 7-4.

    使用基于字符串的 SELECT 生成列表的性能


    这个执行计划可以说是简单到极致：对目标表的一次扫描，以及一些用于组装字符串的低成本操作。此操作的子树成本为 0.004，显著低于你目前为止看到的所有其他字符串构建技术。移除
    XML 元素大大降低了 XML 阅读器为了将数据处理成所需输出格式所需的开销。此外，SQL Server 可以在完全基于集合的操作中构建字符串，无需迭代、临时表或其他任何昂贵的介质。


    这种方法异常快速、高效，并且易于编码和维护。没有循环或 XML，使得生成的 T-SQL 代码足够简单，初学者也可以尝试和理解。只需要最少的文档就可以解释其作用以及为何选择此方法。


    动态构建的列表不限于单个列或标量字符串值。你可以自由地根据需要构建尽可能多的数据元素，无论是列数据、标量变量、字符串字面量还是从其他数据类型转换而来的字符串。清单
    7-4 展示了如何生成包含多个变量的列表。


    ```

    DECLARE @myData NVARCHAR(MAX) = '''';

    SELECT @myData =

    @myData + ''ContactTypeID: '' + CAST(ContactTypeID AS NVARCHAR) + '',Name: ''
    + Name + '',''

    FROM person.ContactType

    SET @myData = LEFT(@myData, LEN(@myData) - 1);

    SELECT @myData;

    ```

    清单 7-4.

    使用多列和字符串字面量构建列表


    此示例与上一个类似，但包含了 `Name` 列以及值之前的列名。此 T-SQL 的语法与前面的示例几乎相同，唯一的区别在于 `SELECT` 语句中连接的列和字面量。`@myData`
    的值最终为：


    ```

    ContactTypeID: 1,Name: Accounting Manager,ContactTypeID: 2,Name: Assistant Sales
    Agent,ContactTypeID: 3,Name: Assistant Sales Representative,ContactTypeID: 4,Name:
    Coordinator Foreign Markets,ContactTypeID: 5,Name: Export Administrator,...

    ```


    如果你希望为数据添加标题、额外的列、标签或任何其他有用的信息嵌入到字符串中，将其放入其中相对简单。你可以包含在字符串中的内容没有限制，尽管值得检查输出的长度，以确保接收数据的任何应用程序、报表或文件能够处理预期的最大尺寸。


    你可以做的最后一个简化是通过巧妙使用 `ISNULL` 来消除在末尾移除尾随逗号的需要。清单 7-5 展示了这个简短的示例。


    ```

    DECLARE @myData NVARCHAR(MAX);

    SELECT @myData =

    ISNULL(@myData + '','','''') + ''ContactTypeID: '' + CAST(ContactTypeID AS NVARCHAR)
    + '',Name: '' + Name

    FROM person.ContactType;

    SELECT @myData;

    ```

    清单 7-5.

    使用 `ISNULL` 在 `SELECT` 语句中消除前导逗号


    `ISNULL` 可以通过检查 `@myData` 的值是否为 `NULL` 来实现这一点：


    不要为 `@myData` 分配初始的空字符串值。如果 `@myData` 是 `NULL`（这只发生在第一个值时），则插入一个空字符串。如果 `@myData`
    不是 `NULL`，则插入一个逗号。


    这种逻辑将隐式消除本会引入的前导逗号，从而将 SQL 语句的数量减少一条。此查询的结果与上一个示例相同。T-SQL 的性能也相同。也可以使用 `COALESCE`
    代替 `ISNULL`，效果相同：


    ```

    DECLARE @myData NVARCHAR(MAX);

    SELECT @myData =

    COALESCE(@myData + '','','''') + ''ContactTypeID: '' + CAST(ContactTypeID AS NVARCHAR)
    + '',Name: '' + Name

    FROM person.ContactType;

    SELECT @myData;

    ```


    使用 `ISNULL`、`LEFT` 还是 `COALESCE` 语句是个人偏好问题，但可以说，这些选项明显优于循环或 XML，后两者都会带来额外的复杂性和性能问题。'
- fmt: '## Revisiting Security


    While the various string building methods presented here are not Dynamic SQL in
    the traditional sense, they share many of the strengths and weaknesses found when
    creating command strings for use in Dynamic SQL. The lengthy list of security
    concerns presented in previous chapters are as relevant here as they were before.


    Anytime you are building strings using at least one parameter that is entered
    from an outside source, the threat of SQL injection becomes as real as it was
    when you performed an open-ended web search. The example in Listing 7-6 illustrates
    string building using a stored procedure that accepts parameters from an external
    source.


    ```sql

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT'';

    SELECT @sql_command = ''

    SELECT

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE ''''%'' + @last_name + ''%'''''';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE ''''%'' + @first_name + ''%'''''';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT;

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    ```


    Listing 7-6. A Reminder of SQL Injection when Building a List with Dynamic SQL


    This stored procedure combines Dynamic SQL and list building to generate a comma-separated
    list of IDs and names. It also manages to create several glaring security risks.
    Let’s consider some executions of this proc:


    ```sql

    EXEC dbo.return_person_data @first_name = ''Edward'';

    ```


    The results of this execution are what you’d expect:


    ```

    ID: 3731, Name: Edward Adams,ID: 13658, Name: Edward Alexander,ID: 4241, Name:
    Edward Anderson,ID: 3732, Name: Edward Baker,ID: 13631, Name: Edward Barnes,ID:
    4229, Name: Edward Brown,ID: 13657, Name: Edward Bryant...

    ```


    The list is truncated after the seventh value, as there’s no need to list the
    extensive list of people from `AdventureWorks` with the first name of “Edward”.
    The generated string contains an ID and a name, which is the combination of each
    person’s first name, last name, and a space inserted in between. Commas separate
    each field, with the trailing comma removed from the final `LEFT` statement.


    What happens when the user passes in a blank?


    ```sql

    EXEC dbo.return_person_data @first_name = '''';

    ```


    In this scenario, my server churns for 2:58 before returning results. With 19,972
    rows in `Person.Person`, it turns out that it takes a significant amount of time
    to render all of those IDs and names. While you often get used to memory being
    significantly faster than disk, it is not infinitely so. SQL Server needs to temporarily
    cache data to disk while the query completes. The results are the following IO
    statistics:


    ```

    Table ''Person''. Scan count 1, logical reads 109, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 758369, physical reads 0, read-ahead
    reads 0, lob logical reads 244941773, lob physical reads 0, lob read-ahead reads
    3909272.

    ```


    Where did 244,941,773 reads come from? That unbelievable number comes from the
    volume of data being returned in conjunction with the blank search string. SQL
    Server cannot manage this operation on-the-fly in memory and is forced to use
    TempDB instead, which is significantly slower. Reads on `Person.Person` are not
    significant, but `Worktable` reads are very, very impressive!


    This is an important call-out to quality assurance that testing is critically
    important in any application. If a search can theoretically return tens of thousands
    of rows, be sure to implement some method of paging or to limit the data set so
    that a lazy or careless user doesn’t bring your server down with an empty search.


    Let’s return to the malicious example that caused you to lose sleep in an earlier
    chapter:


    ```sql

    EXEC dbo.return_person_data @first_name = ''whatever''''; SELECT * FROM Person.Password;
    SELECT '''''';

    ```


    Here, you intentionally close the search string with arbitrary text (`whatever`)
    and begin a new SQL statement with a `SELECT` from `Person.Password`. This situation
    is as dangerous as it was earlier, as the intended query returns an empty set
    of people and instead the `Person.Password` table is returned. The resulting command
    string for this parameter value is as unfortunate as it appears to be:


    ```sql

    SELECT

    @output_data = @output_data + ''ID: '' + CAST(BusinessEntityID AS NVARCHAR) +
    '', Name: '' + FirstName + '' '' + LastName + '',''

    FROM Person.Person

    WHERE 1 = 1

    AND FirstName LIKE ''%whatever''; SELECT * FROM Person.Password; SELECT ''%''

    ```


    This TSQL throws an error as well, on top of this already messy result set:


    ```

    Msg 537, Level 16, State 3, Procedure return_person_data, Line 204

    Invalid length parameter passed to the LEFT or SUBSTRING function.

    ```


    Since `@output_data` is `NULL`, its length is `NULL`, which is not a valid input
    for the `LEFT` function. Despite this, the password list was returned prior to
    the error message generating. Depending on application and error-handling settings,
    the hackers who entered this TSQL may have gotten the data they wanted.


    Whenever inputs are provided by an outside source, be sure to parameterize your
    `sp_executesql` statement to ensure that there is no way for dangerous TSQL to
    be inserted into your command string. This is shown in Listing 7-7.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''return_person_data'')

    BEGIN

    DROP PROCEDURE dbo.return_person_data;

    END

    GO

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SELECT @last_name = ''%'' + @last_name + ''%'';

    SELECT @first_name = ''%'' + @first_name + ''%'';

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT, @first_name NVARCHAR(MAX),
    @last_name NVARCHAR(MAX)'';

    SELECT @sql_command = ''

    SELECT

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE @last_name'';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE @first_name'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT, @first_name,
    @last_name;

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    ```


    Listing 7-7. Dynamic SQL List Generation Using Parameters for Inputs


    This updated stored procedure contains parameters for `@first_name` and `@last_name`.
    When you execute the examples again, what happens?


    ```sql

    EXEC dbo.return_person_data @first_name = ''Edward'';

    ```


    The results from this execution are the same as earlier. All data for people with
    the first name of “Edward” are returned as expected.


    ```sql

    EXEC dbo.return_person_data @first_name = '''';

    ```


    The blank search still takes three minutes to run, but at least it does so securely!


    ```sql

    EXEC dbo.return_person_data @first_name = ''Edward''''; SELECT * FROM Person.Password;
    SELECT '''''';

    ```'
  raw: '## Revisiting Security


    While the various string building methods presented here are not Dynamic SQL in
    the traditional sense, they share many of the strengths and weaknesses found when
    creating command strings for use in Dynamic SQL. The lengthy list of security
    concerns presented in previous chapters are as relevant here as they were before.


    Anytime you are building strings using at least one parameter that is entered
    from an outside source, the threat of SQL injection becomes as real as it was
    when you performed an open-ended web search. The example in Listing [7-6](#A371168_1_En_7_Chapter.html#Par68)
    illustrates string building using a stored procedure that accepts parameters from
    an external source.


    ```

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT'';

    SELECT @sql_command = ''

    SELECT

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE ''''%'' + @last_name + ''%'''''';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE ''''%'' + @first_name + ''%'''''';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT;

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    Listing 7-6.

    A Reminder of SQL Injection when Building a List with Dynamic SQL

    ```


    This stored procedure combines Dynamic SQL and list building to generate a comma-separated
    list of IDs and names . It also manages to create several glaring security risks.
    Let’s consider some executions of this proc:


    ```

    EXEC dbo.return_person_data @first_name = ''Edward'';

    ```


    The results of this execution are what you’d expect:


    ```

    ID: 3731, Name: Edward Adams,ID: 13658, Name: Edward Alexander,ID: 4241, Name:
    Edward Anderson,ID: 3732, Name: Edward Baker,ID: 13631, Name: Edward Barnes,ID:
    4229, Name: Edward Brown,ID: 13657, Name: Edward Bryant...

    ```


    The list is truncated after the seventh value, as there’s no need to list the
    extensive list of people from `AdventureWorks` with the first name of “Edward”.
    The generated string contains an ID and a name, which is the combination of each
    person’s first name, last name, and a space inserted in between. Commas separate
    each field, with the trailing comma removed from the final `LEFT` statement.


    What happens when the user passes in a blank?


    ```

    EXEC dbo.return_person_data @first_name = '''';

    ```


    In this scenario, my server churns for 2:58 before returning results. With 19,972
    rows in `Person.Person`, it turns out that it takes a significant amount of time
    to render all of those IDs and names . While you often get used to memory being
    significantly faster than disk, it is not infinitely so. SQL Server needs to temporarily
    cache data to disk while the query completes. The results are the following IO
    statistics:


    ```

    Table ''Person''. Scan count 1, logical reads 109, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 758369, physical reads 0, read-ahead
    reads 0, lob logical reads 244941773, lob physical reads 0, lob read-ahead reads
    3909272.

    ```


    Where did 244,941,773 reads come from? That unbelievable number comes from the
    volume of data being returned in conjunction with the blank search string. SQL
    Server cannot manage this operation on-the-fly in memory and is forced to use
    TempDB instead, which is significantly slower. Reads on `Person.Person` are not
    significant, but `Worktable` reads are very, very impressive!


    This is an important call-out to quality assurance that testing is critically
    important in any application. If a search can theoretically return tens of thousands
    of rows, be sure to implement some method of paging or to limit the data set so
    that a lazy or careless user doesn’t bring your server down with an empty search.


    Let’s return to the malicious example that caused you to lose sleep in an earlier
    chapter:


    ```

    EXEC dbo.return_person_data @first_name = ''whatever''''; SELECT * FROM Person.Password;
    SELECT '''''';

    ```


    Here, you intentionally close the search string with arbitrary text (`whatever`)
    and begin a new SQL statement with a `SELECT` from `Person.Password`. This situation
    is as dangerous as it was earlier, as the intended query returns an empty set
    of people and instead the `Person.Password` table is returned. The resulting command
    string for this parameter value is as unfortunate as it appears to be:


    ```

    SELECT

    @output_data = @output_data + ''ID: '' + CAST(BusinessEntityID AS NVARCHAR) +
    '', Name: '' + FirstName + '' '' + LastName + '',''

    FROM Person.Person

    WHERE 1 = 1

    AND FirstName LIKE ''%whatever''; SELECT * FROM Person.Password; SELECT ''%''

    ```


    This TSQL throws an error as well, on top of this already messy result set:


    ```

    Msg 537, Level 16, State 3, Procedure return_person_data, Line 204

    Invalid length parameter passed to the LEFT or SUBSTRING function.

    ```


    Since `@output_data` is `NULL`, its length is `NULL`, which is not a valid input
    for the `LEFT` function. Despite this, the password list was returned prior to
    the error message generating. Depending on application and error-handling settings,
    the hackers who entered this TSQL may have gotten the data they wanted.


    Whenever inputs are provided by an outside source, be sure to parameterize your
    `sp_executesql` statement to ensure that there is no way for dangerous TSQL to
    be inserted into your command string. This is shown in Listing [7-7](#A371168_1_En_7_Chapter.html#Par88).


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''return_person_data'')

    BEGIN

    DROP PROCEDURE dbo.return_person_data;

    END

    GO

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SELECT @last_name = ''%'' + @last_name + ''%'';

    SELECT @first_name = ''%'' + @first_name + ''%'';

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT, @first_name NVARCHAR(MAX),
    @last_name NVARCHAR(MAX)'';

    SELECT @sql_command = ''

    SELECT

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE @last_name'';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE @first_name'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT, @first_name,
    @last_name;

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    Listing 7-7.

    Dynamic SQL List Generation Using Parameters for Inputs

    ```


    This updated stored procedure contains parameters for `@first_name` and `@last_name`.
    When you execute the examples again, what happens?


    ```

    EXEC dbo.return_person_data @first_name = ''Edward'';

    ```


    The results from this execution are the same as earlier. All data for people with
    the first name of “`Edward`” are returned as expected.


    ```

    EXEC dbo.return_person_data @first_name = '''';

    ```


    The blank search still takes three minutes to run, but at least it does so securely!


    ```

    EXEC dbo.return_person_data @first_name = ''Edward''''; SELECT * FROM Person.Password;
    SELECT '''''';

    ```'
  trans: '

    ## 重新审视安全性


    虽然这里介绍的各种字符串构建方法并非传统意义上的动态 SQL，但它们与构建用于动态 SQL 的命令字符串具有许多相同的优点和缺点。前面章节中列出的冗长安全顾虑清单在这里依然和以前一样重要。


    任何时候，当你使用至少一个来自外部源的参数来构建字符串时，SQL 注入的威胁就变得与执行开放式网络搜索时一样真实。清单 7-6 中的示例说明了如何使用一个接受外部源参数的存储过程来构建字符串。


    ```sql

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT'';

    SELECT @sql_command = ''

    SELECT

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE ''''%'' + @last_name + ''%'''''';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE ''''%'' + @first_name + ''%'''''';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT;

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    ```


    清单 7-6。使用动态 SQL 构建列表时的 SQL 注入提醒


    这个存储过程结合了动态 SQL 和列表构建，以生成一个以逗号分隔的 ID 和姓名列表。它还成功地制造了几个明显的安全风险。让我们考虑一下这个过程的一些执行情况：


    ```sql

    EXEC dbo.return_person_data @first_name = ''Edward'';

    ```


    这次执行的结果如你所料：


    ```

    ID: 3731, Name: Edward Adams,ID: 13658, Name: Edward Alexander,ID: 4241, Name:
    Edward Anderson,ID: 3732, Name: Edward Baker,ID: 13631, Name: Edward Barnes,ID:
    4229, Name: Edward Brown,ID: 13657, Name: Edward Bryant...

    ```


    列表在第七个值后被截断，因为没有必要列出`AdventureWorks`中所有名为“Edward”的人的详尽列表。生成的字符串包含一个 ID 和一个姓名，这是每个人的名字、姓氏以及中间插入的一个空格的组合。字段之间用逗号分隔，最后的`LEFT`语句移除了末尾的逗号。


    当用户传入一个空值时会发生什么？


    ```sql

    EXEC dbo.return_person_data @first_name = '''';

    ```


    在这种情况下，我的服务器运行了 2 分 58 秒才返回结果。`Person.Person`表中有 19,972 行，事实证明，渲染所有这些 ID 和姓名需要相当长的时间。虽然你通常习惯于内存比磁盘快得多，但它并不是无限快的。SQL
    Server 需要在查询完成时将数据临时缓存到磁盘。结果是以下 IO 统计数据：


    ```

    Table ''Person''. Scan count 1, logical reads 109, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 758369, physical reads 0, read-ahead
    reads 0, lob logical reads 244941773, lob physical reads 0, lob read-ahead reads
    3909272.

    ```


    244,941,773 次读取是从哪里来的？这个令人难以置信的数字来自于返回的数据量与空搜索字符串相结合。SQL Server 无法在内存中动态管理此操作，被迫使用
    TempDB，而后者速度要慢得多。对`Person.Person`的读取并不显著，但对`Worktable`的读取却非常、非常惊人！


    这是对质量保证部门的一个重要提醒：在任何应用程序中，测试都至关重要。如果一个搜索理论上可以返回数万行数据，请务必实现某种分页方法或限制数据集，以防止懒惰或粗心的用户用空搜索拖垮你的服务器。


    让我们回到那个让你在之前的章节中夜不能寐的恶意示例：


    ```sql

    EXEC dbo.return_person_data @first_name = ''whatever''''; SELECT * FROM Person.Password;
    SELECT '''''';

    ```


    在这里，你故意用任意文本（`whatever`）关闭了搜索字符串，并使用`SELECT * FROM Person.Password`开始了一个新的 SQL
    语句。这种情况和之前一样危险，因为预期的查询返回了一个空的人集，而`Person.Password`表却被返回了。对于这个参数值，生成的命令字符串不幸如所示：


    ```sql

    SELECT

    @output_data = @output_data + ''ID: '' + CAST(BusinessEntityID AS NVARCHAR) +
    '', Name: '' + FirstName + '' '' + LastName + '',''

    FROM Person.Person

    WHERE 1 = 1

    AND FirstName LIKE ''%whatever''; SELECT * FROM Person.Password; SELECT ''%''

    ```


    这个 TSQL 除了已经混乱的结果集之外，还抛出了一个错误：


    ```

    Msg 537, Level 16, State 3, Procedure return_person_data, Line 204

    Invalid length parameter passed to the LEFT or SUBSTRING function.

    ```


    因为`@output_data`是`NULL`，其长度也是`NULL`，这不是`LEFT`函数的有效输入。尽管如此，在错误消息生成之前，密码列表已经被返回了。根据应用程序和错误处理设置，输入此
    TSQL 的黑客可能已经获得了他们想要的数据。


    每当输入来自外部源时，请务必对你的`sp_executesql`语句进行参数化，以确保没有危险的 TSQL 可以插入到你的命令字符串中。如清单 7-7 所示。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''return_person_data'')

    BEGIN

    DROP PROCEDURE dbo.return_person_data;

    END

    GO

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SELECT @last_name = ''%'' + @last_name + ''%'';

    SELECT @first_name = ''%'' + @first_name + ''%'';

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT, @first_name NVARCHAR(MAX),
    @last_name NVARCHAR(MAX)'';

    SELECT @sql_command = ''

    SELECT

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE @last_name'';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE @first_name'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT, @first_name,
    @last_name;

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    ```


    清单 7-7。使用参数作为输入的动态 SQL 列表生成


    这个更新后的存储过程包含了`@first_name`和`@last_name`的参数。当你再次执行这些示例时，会发生什么？


    ```sql

    EXEC dbo.return_person_data @first_name = ''Edward'';

    ```


    这次执行的结果与之前相同。所有名字为“Edward”的人的数据都按预期返回。


    ```sql

    EXEC dbo.return_person_data @first_name = '''';

    ```


    空搜索仍然需要三分钟才能运行，但至少它是安全地运行的！


    ```sql

    EXEC dbo.return_person_data @first_name = ''Edward''''; SELECT * FROM Person.Password;
    SELECT '''''';

    ```

    '
- fmt: '# 7. 动态列表构建


    尝试使用 SQL 注入来检索密码的操作仍然会导致错误，因为零值被作为输入长度传递给了 `LEFT` 函数。幸运的是，参数化移除了最终用户向任何参数注入他们自己的
    TSQL 的能力，因此他们无法像之前那样访问 `Person.Password`。


    重要的是要勤勉并修复此示例中潜伏的错误。让 SQL 服务器在一个大型查询上运行几分钟可能与错误消息或 SQL 注入尝试一样对服务器具有破坏性。让我们修补清单
    [7-8](#A371168_1_En_7_Chapter.html#Par97) 中的漏洞，并希望 QA 不会再发现更多问题。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''return_person_data'')

    BEGIN

    DROP PROCEDURE dbo.return_person_data;

    END

    GO

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SELECT @last_name = ''%'' + @last_name + ''%'';

    SELECT @first_name = ''%'' + @first_name + ''%'';

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT, @first_name NVARCHAR(MAX),
    @last_name NVARCHAR(MAX)'';

    SELECT @sql_command = ''

    SELECT TOP 25

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE @last_name'';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE @first_name'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT, @first_name,
    @last_name;

    IF LEN(@return_data) > 0 AND @return_data IS NOT NULL

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    ```


    清单 7-8.

    列表生成存储过程，用于修复长时间等待和错误消息


    这个存储过程的变体在列表构建的 `SELECT` 语句中引入了 `TOP 25`。这将结果集限制为 25 个人，防止了一个可能消耗巨大服务器资源的失控查询。此外，在存储过程末尾附近的
    `LEFT` 函数上放置了一个检查，以检查 `@return_data` 的长度是否为 `NULL` 或 0。这确保了如果没有结果集，在尝试操作它时不会抛出错误。


    你在这里逐步经历的步骤是一个重要的提醒：安全是一个始终存在的 concerns，而可能使服务器陷入困境的情况可能并不总是显而易见的。质量保证极其重要！确保你编写的任何软件都经过了所有可能值的彻底测试，无论它们是正常的用例还是古怪的边界情况。空搜索、空结果集和
    SQL 注入尝试都是很容易处理的情况，但你必须识别这些威胁才能有效地应对它们。


    ## 结论


    这里介绍的动态列表构建与本书迄今为止讨论的动态 SQL 不是同一种类型。虽然它通常更简单并且不需要单独执行来获取结果集，但它与之前构建的命令字符串之间存在许多共同点。


    在任何你接受用户输入来构建字符串的场景中，都可以立即在你之前处理的 SQL 注入威胁与当你想要列出姓名或 ID 号时可以类似识别的威胁之间找到相似之处。


    除了 SQL 注入，动态列表在语法、字符串操作、格式、安全性以及将它们与额外的动态 SQL 结合以创建更大灵活性的能力方面具有相似性。随着复杂性的增加，对仔细测试的需求也随之增加，既要测试意外输入，也要测试
    SQL 注入尝试。虽然动态生成的列表可能并不总是带有与外部用户输入相关的威胁，但始终如一地关注参数化和质量保证方面的最佳实践，可以确保你的 TSQL 是最高质量和最安全的。


    # 8. 参数嗅闻


    第 [6](#A371168_1_En_6_Chapter.html) 章介绍了一些用于性能优化的工具、方法和技巧。一个被简要讨论的关键组件是查询计划缓存。每当首次执行查询时，查询优化器会生成一个执行计划。这个过程开销很大，因此尽量减少由其执行的工作是有益的。执行计划在优化完成后被放入查询计划缓存中，它们将一直保留，直到执行、可用内存或底层数据发生足够变化将该计划推出缓存。


    保存执行计划的这个过程对于优化 SQL Server 性能至关重要。每当执行与缓存中查询匹配的查询时，将使用现有计划。这使得 SQL Server 可以绕过优化器并直接跳转到执行，从而节省时间和资源！如果没有这个功能，你将被迫为繁忙的服务器添加大量资源，以满足持续优化每个执行的查询所需的资源。


    ## 什么是参数嗅闻？


    执行计划根据查询生成时分配给它的查询哈希值放入缓存中。此哈希值基于查询的确切文本，如果查询的任何部分不同，哈希值也会不同。因此，参数化查询将允许你一遍又一遍地重用相同的计划，而不管参数的值如何。执行计划将根据查询首次执行期间传递的参数值创建。随后的每次执行都将重用相同的计划，而不管值如何。


    这就引出了一个准确性问题：在查询第一次执行期间选择的计划是否是所有未来可能值的最佳计划？如果传递给存储过程的参数相对一致，则最初创建的计划对于所有未来执行来说很可能足够好。在这种情况下，查询计划缓存工作得非常完美，因此没有理由考虑性能问题。但是，如果参数值是零散的并导致各种可能的结果呢？假以时日，将会生成一个对其他参数值来说并非最佳的执行计划。


    针对不同参数的执行计划重用就是参数嗅闻的定义，它是 SQL Server 使用查询计划缓存的一个无意副作用。次优计划重用是这种行为可能导致性能问题的一种潜在方式。在开始之前，让我们介绍一个存储过程，该过程将根据查询文本的字符串搜索从查询计划缓存中读取一些数据。这将为你以后研究计划缓存的内容及其与以下示例查询性能的关系节省时间。清单
    [8-1](#A371168_1_En_8_Chapter.html#Par6) 显示了本章中使用的存储过程。'
  raw: 'The attempt to use SQL injection to retrieve passwords still generates an
    error with the zero being passed to the `LEFT` function as the input length. Luckily,
    parameterization removes the ability for the end users to inject their own TSQL
    into any of the parameters, so they do not gain access to `Person.Password` as
    they did previously.


    It’s important to be diligent and fix the looming errors in this example. Letting
    SQL server grind away for minutes on a big query could be as destructive to the
    server as error messages or SQL injection attempts could be. Let’s patch the holes
    in Listing [7-8](#A371168_1_En_7_Chapter.html#Par97) and hope that QA doesn’t
    find any more.


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''return_person_data'')

    BEGIN

    DROP PROCEDURE dbo.return_person_data;

    END

    GO

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SELECT @last_name = ''%'' + @last_name + ''%'';

    SELECT @first_name = ''%'' + @first_name + ''%'';

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT, @first_name NVARCHAR(MAX),
    @last_name NVARCHAR(MAX)'';

    SELECT @sql_command = ''

    SELECT TOP 25

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE @last_name'';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE @first_name'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT, @first_name,
    @last_name;

    IF LEN(@return_data) > 0 AND @return_data IS NOT NULL

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    Listing 7-8.

    List Generation Stored Procedure, with Fixes for Long Waits and Error Messages

    ```


    This variation on the stored procedure introduces a Top 25 to the list building
    `SELECT` statement. This limits the result set to 25 people, preventing a runaway
    query that could consume immense server resources. In addition, a check was placed
    on the `LEFT` function near the end of the stored procedure that checks if the
    length of `@return_data` is `NULL` or 0\. This ensures that if there is no result
    set, it won’t throw errors when trying to manipulate it.


    The steps that you walked through here are an important reminder that security
    is an ever-present concern and that the situations that could bring a server to
    its knees may not always be the obvious ones. Quality assurance is extremely important!
    Ensure that any software that you are writing is thoroughly tested for all possible
    values, regardless of whether they are normal use-cases or oddball edge cases.
    Empty searches, empty result sets, and SQL injection attempts are all situations
    that can be easily dealt with, but you must identify these threats in order to
    effectively respond to them.


    ## Conclusion


    The dynamic list building presented here is not the same sort of Dynamic SQL discussed
    thus far in this book. While it is generally simpler and does not require a separate
    execution to get the result set, many commonalities exist between it and the command
    strings that you built earlier.


    In any scenario where you are accepting user input in order to build a string,
    parallels can immediately be drawn between the SQL injection threats that you
    tackled earlier and the ones that can be similarly identified when you want to
    list names or ID numbers.


    In addition to SQL injection, dynamic lists share similarities in syntax, string
    manipulation, formatting, security, and the ability to combine them with additional
    Dynamic SQL in order to create even greater flexibility. With added complexity
    is an added need for careful testing, both for unexpected input as well as SQL
    injection attempts. While dynamically generated lists may not always carry the
    threats associated with external user input, being consistently aware of best
    practices regarding parameterization and QA can ensure that your TSQL is the highest
    quality and most secure possible.


    # 8. Parameter Sniffing


    Chapter [6](#A371168_1_En_6_Chapter.html) introduced a number of tools, methods,
    and tips for performance optimization. A critical component that was briefly discussed
    was the query plan cache. Whenever a query is executed for the first time, an
    execution plan is generated by the query optimizer. This process is expensive
    and therefore it is beneficial to minimize the work that is performed by it. Execution
    plans are placed into the query plan cache when optimization is complete, where
    they will remain until sufficient changes occur in execution, available memory,
    or the underlying data to push that plan out of cache.


    This process by which execution plans are saved is critical to optimal SQL Server
    performance. Whenever a query is executed that matches a query in cache, the existing
    plan will be used. This allows SQL Server to bypass the optimizer and jump directly
    to execution, saving time and resources along the way! Without this feature, you
    would be forced to add significant resources to busy servers in order to account
    for the resources needed to constantly optimize every query that is executed.


    ## What Is Parameter Sniffing?


    Execution plans are placed in cache based on a query hash that is assigned to
    it when the plan is generated. This hash is based on the exact text of the query
    and will be different if any part of a query is different. As a result, parameterizing
    queries will allow you to reuse the same plan over and over, regardless of the
    value of the parameter. The execution plan will be created based on the parameter
    value that is passed into the query during its first execution. Each subsequent
    execution will reuse the same plan, regardless of the value.


    This leads to a question of accuracy: Will the plan that was chosen during the
    first execution of a query be the best plan for all possible values going forward?
    If parameters that are passed into a stored procedure are somewhat consistent,
    odds are very good that the initially created plan will be good enough for all
    future executions. In this scenario, query plan caching is working perfectly,
    so there is no reason to consider performance concerns. What if parameter values
    are sporadic and lead to a wide variety of possible results? Given enough time,
    an execution plan will be generated that will not be the best plan for other parameter
    values.


    Execution plan reuse for different parameters is the definition of parameter sniffing
    and is an inadvertent side-effect of SQL Server’s use of the query plan cache.
    Suboptimal plan reuse is a potential way in which this behavior can cause performance
    troubles. Before getting started, let’s introduce a stored procedure that will
    read some data from the query plan cache based on a string search of the query
    text. This will save you time later when researching the contents of the plan
    cache and how they relate to the performance of the following example queries.
    Listing [8-1](#A371168_1_En_8_Chapter.html#Par6) shows the stored procedure that’s
    used throughout this chapter.'
  trans: '# 7. 动态列表构建


    尝试使用 SQL 注入来检索密码的操作仍然会导致错误，因为零值被作为输入长度传递给了 `LEFT` 函数。幸运的是，参数化移除了最终用户向任何参数注入他们自己的
    TSQL 的能力，因此他们无法像之前那样访问 `Person.Password`。


    重要的是要勤勉并修复此示例中潜伏的错误。让 SQL 服务器在一个大型查询上运行几分钟可能与错误消息或 SQL 注入尝试一样对服务器具有破坏性。让我们修补清单
    7-8 中的漏洞，并希望 QA 不会再发现更多问题。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''return_person_data'')

    BEGIN

    DROP PROCEDURE dbo.return_person_data;

    END

    GO

    CREATE PROCEDURE dbo.return_person_data

    @last_name NVARCHAR(MAX) = NULL, @first_name NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SELECT @last_name = ''%'' + @last_name + ''%'';

    SELECT @first_name = ''%'' + @first_name + ''%'';

    DECLARE @return_data NVARCHAR(MAX) = '''';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @parameter_list = ''@output_data NVARCHAR(MAX) OUTPUT, @first_name NVARCHAR(MAX),
    @last_name NVARCHAR(MAX)'';

    SELECT @sql_command = ''

    SELECT TOP 25

    @output_data = @output_data + ''''ID: '''' + CAST(BusinessEntityID AS NVARCHAR)
    + '''', Name: '''' + FirstName + '''' '''' + LastName + '''',''''

    FROM Person.Person

    WHERE 1 = 1''

    IF @last_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND LastName LIKE @last_name'';

    IF @first_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND FirstName LIKE @first_name'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @return_data OUTPUT, @first_name,
    @last_name;

    IF LEN(@return_data) > 0 AND @return_data IS NOT NULL

    SELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);

    SELECT @return_data;

    END

    ```


    清单 7-8.

    列表生成存储过程，用于修复长时间等待和错误消息


    这个存储过程的变体在列表构建的 `SELECT` 语句中引入了 `TOP 25`。这将结果集限制为 25 个人，防止了一个可能消耗巨大服务器资源的失控查询。此外，在存储过程末尾附近的
    `LEFT` 函数上放置了一个检查，以检查 `@return_data` 的长度是否为 `NULL` 或 0。这确保了如果没有结果集，在尝试操作它时不会抛出错误。


    你在这里逐步经历的步骤是一个重要的提醒：安全是一个始终存在的关切点，而可能使服务器陷入困境的情况可能并不总是显而易见的。质量保证极其重要！确保你编写的任何软件都经过了所有可能值的彻底测试，无论它们是正常的用例还是古怪的边界情况。空搜索、空结果集和
    SQL 注入尝试都是很容易处理的情况，但你必须识别这些威胁才能有效地应对它们。


    ## 结论


    这里介绍的动态列表构建与本书迄今为止讨论的动态 SQL 不是同一种类型。虽然它通常更简单并且不需要单独执行来获取结果集，但它与之前构建的命令字符串之间存在许多共同点。


    在任何你接受用户输入来构建字符串的场景中，都可以立即在你之前处理的 SQL 注入威胁与当你想要列出姓名或 ID 号时可以类似识别的威胁之间找到相似之处。


    除了 SQL 注入，动态列表在语法、字符串操作、格式、安全性以及将它们与额外的动态 SQL 结合以创建更大灵活性的能力方面具有相似性。随着复杂性的增加，对仔细测试的需求也随之增加，既要测试意外输入，也要测试
    SQL 注入尝试。虽然动态生成的列表可能并不总是带有与外部用户输入相关的威胁，但始终如一地关注参数化和质量保证方面的最佳实践，可以确保你的 TSQL 是最高质量和最安全的。


    # 8. 参数嗅探


    第 6 章介绍了一些用于性能优化的工具、方法和技巧。一个被简要讨论的关键组件是查询计划缓存。每当首次执行查询时，查询优化器会生成一个执行计划。这个过程开销很大，因此尽量减少由其执行的工作是有益的。执行计划在优化完成后被放入查询计划缓存中，它们将一直保留，直到执行、可用内存或底层数据发生足够变化将该计划推出缓存。


    保存执行计划的这个过程对于优化 SQL Server 性能至关重要。每当执行与缓存中查询匹配的查询时，将使用现有计划。这使得 SQL Server 可以绕过优化器并直接跳转到执行，从而节省时间和资源！如果没有这个功能，你将被迫为繁忙的服务器添加大量资源，以满足持续优化每个执行的查询所需的资源。


    ## 什么是参数嗅探？


    执行计划根据查询生成时分配给它的查询哈希值放入缓存中。此哈希值基于查询的确切文本，如果查询的任何部分不同，哈希值也会不同。因此，参数化查询将允许你一遍又一遍地重用相同的计划，而不管参数的值如何。执行计划将根据查询首次执行期间传递的参数值创建。随后的每次执行都将重用相同的计划，而不管值如何。


    这就引出了一个准确性问题：在查询第一次执行期间选择的计划是否是所有未来可能值的最佳计划？如果传递给存储过程的参数相对一致，则最初创建的计划对于所有未来执行来说很可能足够好。在这种情况下，查询计划缓存工作得非常完美，因此没有理由考虑性能问题。但是，如果参数值是零散的并导致各种可能的结果呢？假以时日，将会生成一个对其他参数值来说并非最佳的执行计划。


    针对不同参数的执行计划重用就是参数嗅探的定义，它是 SQL Server 使用查询计划缓存的一个无意副作用。次优计划重用是这种行为可能导致性能问题的一种潜在方式。在开始之前，让我们介绍一个存储过程，该过程将根据查询文本的字符串搜索从查询计划缓存中读取一些数据。这将为你以后研究计划缓存的内容及其与以下示例查询性能的关系节省时间。清单
    8-1 显示了本章中使用的存储过程。'
- fmt: '## Listing 8-1.

    ### Stored Procedure to Read Optimization and Execution Data from the Query Plan
    Cache


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''read_query_plan_cache'')

    BEGIN

    DROP PROCEDURE dbo.read_query_plan_cache;

    END

    GO

    CREATE PROCEDURE dbo.read_query_plan_cache

    @text_string NVARCHAR(MAX) = NULL

    AS

    BEGIN

    SELECT @text_string = ''%'' + @text_string + ''%'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@text_string NVARCHAR(MAX)'';

    IF @text_string IS NULL

    SELECT @sql_command = ''

    SELECT TOP 25

    DB_NAME(execution_plan.dbid) AS database_name,

    cached_plans.objtype AS ObjectType,

    OBJECT_NAME(sql_text.objectid, sql_text.dbid) AS ObjectName,

    query_stats.creation_time,

    query_stats.last_execution_time,

    query_stats.last_worker_time AS cpu_last_execution,

    query_stats.last_logical_reads AS reads_last_execution,

    query_stats.last_elapsed_time AS duration_last_execution,

    query_stats.last_rows AS rows_last_execution,

    cached_plans.size_in_bytes,

    cached_plans.usecounts AS ExecutionCount,

    sql_text.TEXT AS QueryText,

    execution_plan.query_plan,

    cached_plans.plan_handle

    FROM sys.dm_exec_cached_plans cached_plans

    INNER JOIN sys.dm_exec_query_stats query_stats

    ON cached_plans.plan_handle = query_stats.plan_handle

    CROSS APPLY sys.dm_exec_sql_text(cached_plans.plan_handle) AS sql_text

    CROSS APPLY sys.dm_exec_query_plan(cached_plans.plan_handle) AS execution_plan'';

    ELSE

    SELECT @sql_command = ''

    SELECT TOP 25

    DB_NAME(execution_plan.dbid) AS database_name,

    cached_plans.objtype AS ObjectType,

    OBJECT_NAME(sql_text.objectid, sql_text.dbid) AS ObjectName,

    query_stats.creation_time,

    query_stats.last_execution_time,

    query_stats.last_worker_time AS cpu_last_execution,

    query_stats.last_logical_reads AS reads_last_execution,

    query_stats.last_elapsed_time AS duration_last_execution,

    query_stats.last_rows AS rows_last_execution,

    cached_plans.size_in_bytes,

    cached_plans.usecounts AS ExecutionCount,

    sql_text.TEXT AS QueryText,

    execution_plan.query_plan,

    cached_plans.plan_handle

    FROM sys.dm_exec_cached_plans cached_plans

    INNER JOIN sys.dm_exec_query_stats query_stats

    ON cached_plans.plan_handle = query_stats.plan_handle

    CROSS APPLY sys.dm_exec_sql_text(cached_plans.plan_handle) AS sql_text

    CROSS APPLY sys.dm_exec_query_plan(cached_plans.plan_handle) AS execution_plan

    WHERE sql_text.TEXT LIKE @text_string'';

    EXEC sp_executesql @sql_command, @parameter_list, @text_string

    END

    GO

    ```


    这个存储过程将极大地简化你的研究，因为你可以向它传递任何查询文本，它会返回关于缓存中的查询、其执行计划以及上次执行的性能指标的各种数据。你将在测试时使用它来收集查询信息，但它可以在任何你想在查询缓存中搜索特定信息的情况下被重用。`SELECT`语句中使用`TOP
    25`是为了限制结果集。在繁忙的服务器上，否则可能返回非常大量的数据，这可能会对服务器或客户端性能产生不利影响。


    ## Parameter Sniffing Examples


    为了确保你获得干净的测试结果，你应该清除查询计划缓存。如本书前面所建议的，不要在生产环境或任何期望性能一致的地方运行此操作。清除查询计划缓存是通过强制查询在每次执行时创建新计划来调试查询的好方法，但由于优化器执行其工作需要大量资源，你应该只在隔离环境中这样做：


    ```sql

    DBCC FREEPROCCACHE;

    ```


    你也可以向此`DBCC`命令提供一个特定的计划句柄作为参数。这将允许你仅清除缓存中的单个选定计划，而不是全部。为简单起见，我们在这里将清除整个缓存，但清除单个查询的语法如下所示：


    ```sql

    DBCC FREEPROCCACHE (0x06000700E8C6530730F36E6B0300000001000000000000000000000000000000000000000000000000000000);

    ```


    计划句柄包含在查询计划缓存搜索查询中，以防需要用于进一步研究。现在，为了说明参数嗅探，你需要创建一个简单的存储过程，该过程基于`ProductModelID`搜索`Production.Product`，如清单[8-2](#A371168_1_En_8_Chapter.html#Par13)所示。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_products_by_model'')

    BEGIN

    DROP PROCEDURE dbo.get_products_by_model;

    END

    GO

    CREATE PROCEDURE dbo.get_products_by_model (@firstProductModelID INT, @lastProductModelID
    INT)

    AS

    BEGIN

    SELECT

    PRODUCT.Name,

    PRODUCT.ProductID,

    PRODUCT.ProductModelID,

    PRODUCT.ProductNumber,

    MODEL.Name

    FROM Production.Product PRODUCT

    INNER JOIN Production.ProductModel MODEL

    ON MODEL.ProductModelID = PRODUCT.ProductModelID

    WHERE PRODUCT.ProductModelID BETWEEN @firstProductModelID AND @lastProductModelID;

    END

    ```


    ### Listing 8-2.

    #### Example Stored Procedure to Be Used to Test Parameter Sniffing


    请注意，有两个参数被传递到存储过程中：`@firstProductModelID`和`@lastProductModelID`。如果你为一小部分产品ID执行此操作，如下所示：


    ```sql

    EXEC get_products_by_model 120, 12

    ```


    它返回六行数据，如图[8-1](#A371168_1_En_8_Chapter.html#Fig1)所示。


    ![A371168_1_En_8_Fig1_HTML.jpg](A371168_1_En_8_Fig1_HTML.jpg)


    ### Figure 8-1.

    #### Result set for a restrictive product search that returns only six rows


    此执行的性能指标如下：


    ![A371168_1_En_8_Fig2_HTML.jpg](A371168_1_En_8_Fig2_HTML.jpg)


    ### Figure 8-2.

    #### Performance of a product search returning a small amount of data


    ```text

    Table ''ProductModel''. Scan count 0, logical reads 12, physical reads 0, read-ahead
