- fmt: 'SELECT

    is_auto_update_stats_on,

    is_auto_create_stats_on,

    is_auto_update_stats_async_on

    FROM sys.databases WHERE name = ''AdventureWorks2014'';


    Removing the filter will return info on all databases on this SQL Server. The
    results of this query are as follows:


    | is_auto_update_stats_on | is_auto_create_stats_on | is_auto_update_stats_async_on
    |

    | --- | --- | --- |

    | 1 | 1 | 0 |


    What do these values mean?


    `Auto_update_stats_on` tells you if SQL Server will automatically update stale
    statistics, which by default is on. This does not guarantee statistics that will
    give you accurate execution plans, but handles a few use-cases when statistics
    are deemed stale. More on this coming up!


    `Auto_create_stats_on` indicates if statistics will be automatically created on
    columns and indexes as needed, which is on by default. This is useful and should
    only be turned off if you are very confident about maintaining statistics manually.
    This setting does not apply to views, for which you will need to manually create
    statistics when needed.


    `Auto_update_stats_async_on` determines if statistics should be updated before
    or after a query’s execution and is off by default. Turning this on speeds up
    query execution, but can lead to inaccurate execution plans. It’s therefore recommended
    to keep this off.


    For these settings, the defaults are generally best unless you have a very compelling
    reason to make changes. What does auto-updating statistics entail, and when does
    it happen?


    By default, a database is set with `AUTO_UPDATE_STATISTICS` on. This will cause
    statistics to update whenever:


    *   An empty table has rows inserted into it.

    *   The row count in a table increases from less than 500 rows to more than 500
    rows by a count of at least 500.

    *   The row count in a table increases from greater than 500 rows by 500 rows,
    plus 20%.


    These scenarios update statistics when row counts change significantly, but are
    not necessarily comprehensive enough for a complex production environment. In
    order to ensure that statistics are completely up-to-date, even if this criteria
    is not met, you can consider updating statistics manually or on a maintenance
    schedule. All statistics can be updated on a database in one fell swoop as follows:


    ```sql

    EXEC sys.sp_updatestats ;

    ```


    This will recalculate all statistics on every table in your database. This is
    generally unadvised, as the volume of data that needs to be scanned can be quite
    large, take a long time, and cause contention for important production loads.
    If you cannot update everything all at once, what alternatives are there?


    Updating statistics can be a very IO intensive operation. Only perform this maintenance
    when necessary, and only on objects where it is needed.


    Statistics can be updated on any single object with the following syntax:


    ```sql

    UPDATE STATISTICS Production.Product ;

    ```


    This will update all statistics on the table `Production.Product`. Additionally,
    a single statistics can be updated:


    ```sql

    UPDATE STATISTICS Production.Product PK_Product_ProductID;

    ```


    This statement updates only the statistics on the primary key for `Production.Product`


    The next logical question to ask is, “How do you know when you should update statistics
    manually?” Generally, you don’t need to worry about this process unless there
    is a specific reason. SQL Server’s default settings tend to be reliable for most
    common database designs. If you don’t need to perform expensive maintenance, then
    you certainly shouldn’t! What happens when statistics do become stale, though?


    To help facilitate this example, we’ll turn off the automatic updating of statistics.
    This should never be done in a production environment! For testing purposes, though,
    it’s an excellent way to watch the effect of stale statistics on query optimization
    and execution:


    ```sql

    ALTER DATABASE AdventureWorks2014

    SET AUTO_UPDATE_STATISTICS OFF;

    ```


    After executing this, you can verify the statistics settings on the database using
    the query from earlier:


    | is_auto_update_stats_on | is_auto_create_stats_on | is_auto_update_stats_async_on
    |

    | --- | --- | --- |

    | 0 | 1 | 0 |


    ```sql

    SELECT

    is_auto_update_stats_on,

    is_auto_create_stats_on,

    is_auto_update_stats_async_on

    FROM sys.databases WHERE name = ''AdventureWorks2014'';

    ```


    Note that `is_auto_update_stats_on` is now disabled, and as a result, statistics
    will update only if you do it manually. This example uses a new index on `Production.Product`
    on the `Weight` column:


    ```sql

    CREATE NONCLUSTERED INDEX IX_Product_Weight ON Production.Product (Weight);

    ```


    Consider the following query:


    ```sql

    SELECT

    ProductID,

    Weight,

    Name

    FROM Production.Product

    WHERE Weight = 170

    ```


    This returns a single row (out of 504) from the table. The performance metrics
    are shown in Figure [6-19](#A371168_1_En_6_Chapter.html#Fig19).


    ![A371168_1_En_6_Fig19_HTML.jpg](A371168_1_En_6_Fig19_HTML.jpg)


    Figure 6-19.


    Performance of a simple index seek operation


    ```

    Table ''Product''. Scan count 1, logical reads 4, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    This is a relatively straight-forward example! Four reads on `Production.Product`
    and an execution plan that performs a seek on the new index, as well as a key
    lookup to retrieve the `Name` column, which is not in the index you created above.
    Let’s now insert a large number of new data into the table, as shown in Listing
    [6-15](#A371168_1_En_6_Chapter.html#Par207).


    ```sql

    -- Turn off execution plan here

    SET STATISTICS IO OFF

    SET STATISTICS TIME OFF

    DECLARE @count INT = 1

    WHILE @count < 2000

    BEGIN

    INSERT INTO Production.Product

    ( Name ,

    ProductNumber ,

    MakeFlag ,

    FinishedGoodsFlag ,

    Color ,

    SafetyStockLevel ,

    ReorderPoint ,

    StandardCost ,

    ListPrice ,

    Size ,

    SizeUnitMeasureCode ,

    WeightUnitMeasureCode ,

    Weight ,

    DaysToManufacture ,

    ProductLine ,

    Class ,

    Style ,

    ProductSubcategoryID ,

    ProductModelID ,

    SellStartDate ,

    SellEndDate ,

    DiscontinuedDate ,

    rowguid ,

    ModifiedDate

    )

    SELECT

    ''Hoverboard'' + CAST(@count AS VARCHAR(25)),

    ''HOV-'' + CAST(@count AS VARCHAR(25)),

    1 AS MakeFlag ,

    1 AS FinishedGoodsFlag ,

    NULL AS Color ,

    500 AS SafetyStockLevel ,

    375 AS ReorderPoint ,

    55 AS StandardCost ,

    100 AS ListPrice ,

    NULL AS Size ,

    NULL AS SizeUnitMeasureCode ,

    ''G'' AS WeightUnitMeasureCode ,

    170 AS Weight ,

    5 AS DaysToManufacture ,

    NULL AS ProductLine ,

    ''H'' AS Class ,

    NULL AS Style ,

    5 AS ProductSubcategoryID ,

    97 AS ProductModelID ,

    ''1/1/2015'' AS SellStartDate ,

    NULL AS SellEndDate ,

    NULL AS DiscontinuedDate ,

    NEWID() AS rowguid,

    CURRENT_TIMESTAMP AS ModifiedDate

    SET @count = @count + 1

    END

    ```


    Listing 6-15.

    TSQL to Populate the Product Table with 1,999 New Products


    This query will insert 1,999 rows into `Production.Product`, all with the same
    weight (170). Turning off the execution plan and the statistics metrics will greatly
    speed up the insert, since you are using a quick and dirty loop to complete the
    task. Once this is complete, you can rerun the query that previously ran very
    efficiently:


    ```sql

    SET STATISTICS IO ON;

    SET STATISTICS TIME ON;

    SET NOCOUNT ON;

    SELECT

    ProductID,

    Weight,

    Name

    FROM Production.Product

    WHERE Weight = 170;

    ```


    Execution completes quickly enough, but looking under the covers at performance
    reveals another story altogether. This can be shown in Figure [6-20](#A371168_1_En_6_Chapter.html#Fig20).


    ![A371168_1_En_6_Fig20_HTML.jpg](A371168_1_En_6_Fig20_HTML.jpg)


    Figure 6-20.


    Performance of the search query against a larger result set


    ```

    Table ''Product''. Scan count 1, logical reads 4008, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```'
