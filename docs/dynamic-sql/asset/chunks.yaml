- fmt: '### Query Hints


    There are many ways that you can nudge the query optimizer in order to get it
    to do exactly what you want. Consider one of the most common hints used in SQL
    Server, the `NOLOCK` hint, as shown in Listing 6-16.


    ```

    SELECT

    SalesOrderDetail.SalesOrderDetailID,

    SalesOrderDetail.SalesOrderID,

    SalesOrderDetail.ProductID

    FROM Sales.SalesOrderDetail WITH (NOLOCK)

    WHERE ProductID = 713;

    ```


    Listing 6-16.

    Example of the `NOLOCK` Query Hint


    `NOLOCK` is a commonly used hint that can be used on `SELECT` statements that
    will avoid contention by reading existing data (dirty pages) from memory, even
    if other transactions are operating on the data involved. At first glance, this
    sounds spectacular—no contention! It’s a double-edged sword, though, as it is
    very possible to run a `SELECT` while an `UPDATE` is in progress and never return
    data that was changed or not committed in that `UPDATE` statement.


    `NOLOCK` is an example of a query hint, and this is a somewhat poorly named feature
    as it is more a command than a hint. Hints are often used as ways to fix performance
    problems when they arise. For example, a DBA that sees frequent locking or deadlocking
    may use `NOLOCK` to stop that contention from occurring. This hint can be useful
    in a reporting-style environment where the timeliness of data is not critical
    and you simply need an idea of what data looked like at a given time. Even then,
    you would want to ask yourself why you are running reporting queries in a highly
    transactional environment. Only when that question is answered should you be comfortable
    in making this change.


    The downside to using query hints is that you are telling the query optimizer
    exactly what to do, as though you are smarter than it. While there are times when
    you may know better, things can change in any busy production environment. The
    hint that works perfectly today may be useless tomorrow or even hinder performance.


    Liberal use of join hints will often be a mistake, as shown in Listing 6-17.


    ```

    DECLARE @ProductID INT = 713;

    SELECT

    SalesOrderDetail.SalesOrderDetailID,

    SalesOrderDetail.SalesOrderID,

    SalesOrderDetail.ProductID,

    SalesOrderHeader.OrderDate

    FROM Sales.SalesOrderDetail

    INNER LOOP JOIN Sales.SalesOrderHeader

    ON SalesOrderDetail.SalesOrderID = SalesOrderHeader.SalesOrderID

    WHERE ProductID = @ProductID;

    SELECT

    SalesOrderDetail.SalesOrderDetailID,

    SalesOrderDetail.SalesOrderID,

    SalesOrderDetail.ProductID,

    SalesOrderHeader.OrderDate

    FROM Sales.SalesOrderDetail

    INNER MERGE JOIN Sales.SalesOrderHeader

    ON SalesOrderDetail.SalesOrderID = SalesOrderHeader.SalesOrderID

    WHERE ProductID = @ProductID;

    SELECT

    SalesOrderDetail.SalesOrderDetailID,

    SalesOrderDetail.SalesOrderID,

    SalesOrderDetail.ProductID,

    SalesOrderHeader.OrderDate

    FROM Sales.SalesOrderDetail

    INNER HASH JOIN Sales.SalesOrderHeader

    ON SalesOrderDetail.SalesOrderID = SalesOrderHeader.SalesOrderID

    WHERE ProductID = @ProductID;

    ```


    Listing 6-17.

    Using Join Hints to Force a Particular Join by the Optimizer


    The query optimizer will choose what it considers the best join type when you
    join two tables together in a query. Sometimes you may find that if you override
    the default and force a particular join, you can get better performance. This
    may not always work, though, and if you review the performance above, you’ll see
    a variety of results:


    ```

    Warning: The join order has been enforced because a local join hint is used.

    Table ''SalesOrderHeader''. Scan count 0, logical reads 1322, physical reads 0,
    read-ahead reads 19, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderDetail''. Scan count 1, logical reads 3, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Warning: The join order has been enforced because a local join hint is used.

    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 688, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderDetail''. Scan count 1, logical reads 3, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Warning: The join order has been enforced because a local join hint is used.

    Table ''Workfile''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderDetail''. Scan count 1, logical reads 3, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    When you review the IO statistics, you can see that forcing a `LOOP` join resulted
    in much higher reads than a `HASH` or `MERGE` join. Different values of `@ProductID`
    may result in different joins, thereby producing better or worse performance results.
    Note that SQL Server reminds you that the join order has been enforced by the
    query hint. This is its way of gently telling you that whatever happens next is
    your fault and you cannot call up Microsoft and complain if the results aren’t
    what you expect.


    Similarly, the execution plans for these queries look different and each reflects
    different subtree costs. You can see these by reviewing the three execution plans
    in Figure 6-25.


    ![A371168_1_En_6_Fig25_HTML.jpg](A371168_1_En_6_Fig25_HTML.jpg)


    Figure 6-25.

    Execution plans when different joins are forced with query hints


    Forcing specific joins is going to eventually backfire. Perhaps a `HASH` join
    seems like the best choice right now, as you see a large table joining a small
    table, but data and application usage can change. When your tweaks eventually
    become irrelevant, you will not remember or notice the problem until it is too
    late and performance degrades as the use-case for the changes no longer applies.
    Change is a constant in database design and management and you must write scripts
    that are nimble enough to be relevant in months or even years from now. Query
    hints put constraints on your design, reducing the options that the optimizer
    has to choose from. If those options would be useful in the future, then your
    hints will prevent their usage.


    Another frequently used query hint is `RECOMPILE`, which will force SQL Server
    to create a new execution plan for a query, even if an adequate one already exists
    in the query plan cache. This is often used as a way to sidestep bad execution
    plans or ensure that the best plan is found each time. The optimization process
    is expensive, though, and on a busy production server, the costs associated with
    frequently recompiling large volumes of queries could result in unusually high
    CPU utilization and query latency. Consider the last test query with a hint added
    to it, as shown in Listing 6-18.'
