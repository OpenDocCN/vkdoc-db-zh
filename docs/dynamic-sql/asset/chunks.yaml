  trans: '# 多个 UNPIVOT 操作符


    作为本章的最后一个示例，你将基于目前的工作，对结果集执行 `UNPIVOT`。这将通过使用多个 `UNPIVOT` 操作符来完成。请记住，此操作的结果集不会与上一个示例开始时的原始输入数据相同。虽然
    `UNPIVOT` 的结果将是有意义的，但重要的是要记住，对数据集应用 `PIVOT` 和 `UNPIVOT` 不太可能返回与该数据等价的结果。粒度信息常常会丢失且无法复原，无论你的
    TSQL 技巧多么高超！


    第一步是将上一个示例中的数据存储到一个表中，以便在 `UNPIVOT` 中重用：


    ```

    SELECT @sql_command = ''

    SELECT

    *

    INTO dbo.Products_By_Color_and_Stock_Level

    FROM

    (      SELECT

    ```


    创建了表 `Products_By_Color_and_Stock_Level` 用于存储透视后的输出，在本章的剩余部分你都将使用它。首次尝试 `UNPIVOT`
    如代码清单 9-16 所示。


    ```

    SELECT

    *

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL

    UNPIVOT

    (product_quantity FOR Color IN

    ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])

    ) AS UNPIVOT_DATA_COLOR

    UNPIVOT

    (safety_stock_level FOR SafetyStockLevel IN

    ([4], [60], [100], [500], [800], [1000])

    ) AS UNPIVOT_DATA_STOCK_LEVEL;

    ```


    代码清单 9-16. 首次尝试在单个语句中使用两个 UNPIVOT 操作符


    代码清单 9-16 中的查询返回了结果，但这些结果有点可疑，如图 9-8 中的结果集所示。


    ![A371168_1_En_9_Fig8_HTML.jpg](img/A371168_1_En_9_Fig8_HTML.jpg)


    图 9-8. 使用两个 UNPIVOT 操作符但构造不当的查询结果


    请注意，每个产品返回了六行。由于安全库存水平被定义为非 `NULL` 的计数，`UNPIVOT` 操作将所有值视为有效值，并为每个值返回行。理想情况下，你希望将颜色和库存水平的列名都透视为行值，但假设所有库存水平的零值都被省略。有多种方法可以解决这个问题，你将使用额外的
    `WHERE` 子句完全移除零值，如代码清单 9-17 所示。


    ```

    SELECT

    product_name,

    ReorderPoint,

    product_quantity,

    Color,

    SafetyStockLevel

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL

    UNPIVOT

    (product_quantity FOR Color IN

    ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])

    ) AS UNPIVOT_DATA_COLOR

    UNPIVOT

    (safety_stock_level FOR SafetyStockLevel IN

    ([4], [60], [100], [500], [800], [1000])

    ) AS UNPIVOT_DATA_STOCK_LEVEL

    WHERE safety_stock_level <> 0;

    ```


    代码清单 9-17. 移除了零值的 UNPIVOT 示例


    通过过滤 `safety_stock_level <> 0`，你移除了零值。此外，你显式地为输出集选择了列，使得 `safety_stock_level`
    不被包含在内，因为它对结果集不再重要（结果将只包含一）。现在结果看起来更干净，更接近你最初预期的样子，如图 9-9 所示。


    ![A371168_1_En_9_Fig9_HTML.jpg](img/A371168_1_En_9_Fig9_HTML.jpg)


    图 9-9. 代码清单 9-17 中修正后的 UNPIVOT 查询结果


    现在每一列都填充了有意义的值，零值和额外的占位符 `safety_stock_level` 列已被移除。


    现在你已经有了一个使用多个 `UNPIVOT` 操作符的有效查询，你可以对其应用动态 SQL，以便返回在 `Products_By_Color_and_Stock_Level`
    表中找到的任何 `Color` 或 `SafetyStockLevel` 值的结果。这个有趣的查询可以在代码清单 9-18 中找到。


    ```

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT

    columns.name

    FROM sys.tables

    INNER JOIN sys.columns

    ON columns.object_id = tables.object_id

    WHERE tables.name = ''Products_By_Color_and_Stock_Level''

    AND columns.name NOT IN (''product_name'', ''ReorderPoint'')

    AND ISNUMERIC(columns.name) = 0;

    DECLARE @stock_levels TABLE

    (safety_stock_level SMALLINT);

    INSERT INTO @stock_levels

    SELECT

    columns.name

    FROM sys.tables

    INNER JOIN sys.columns

    ON columns.object_id = tables.object_id

    WHERE tables.name = ''Products_By_Color_and_Stock_Level''

    AND columns.name NOT IN (''product_name'', ''ReorderPoint'')

    AND ISNUMERIC(columns.name) = 1;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    product_name,

    ReorderPoint,

    product_quantity,

    Color,

    SafetyStockLevel

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL

    UNPIVOT

    (product_quantity FOR Color IN

    ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) AS UNPIVOT_DATA_COLOR

    UNPIVOT

    (safety_stock_level FOR SafetyStockLevel IN

    (''

    SELECT @sql_command = @sql_command + ''['' + CAST(safety_stock_level AS NVARCHAR)
    + ''], ''

    FROM @stock_levels;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) AS UNPIVOT_DATA_STOCK_LEVEL

    WHERE safety_stock_level <> 0;'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    代码清单 9-18. 与多个 UNPIVOT 操作符结合使用的动态 SQL


    这里的第一个挑战是将列名解析到每个表变量中以供后续使用。在这种情况下，你很幸运，因为颜色都是字符串数据，而库存水平都是数字。通过检查列名是否为数字，你可以将列名拆分为两个有意义的列表。如果列名不易分离，你可以将初始数据分离到多个临时表中，而不是全部放入
    `Products_By_Color_and_Stock_Level`。


    为了避免增加更多复杂性，划分列的一个可能更好的方法是为每列标记一个有意义的名称。对于此示例，颜色可以用 `Color:` 作为前缀，库存水平用 `StockLevel:`
    作为前缀。当你为每个表变量的可能值筛选列名时，可以轻松检查这些前缀。由于你确定了这些前缀的结构，因此可以确保它们是唯一、有意义的，并允许你将数据维护在单个临时表中。


    这样的 `UNPIVOT` 操作的命令字符串将如下所示：


    ```

    SELECT

    product_name,

    ReorderPoint,

    product_quantity,

    Color,

    SafetyStockLevel

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL

    UNPIVOT

    (product_quantity FOR Color IN

    ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],

    [White], [Yellow])) AS UNPIVOT_DATA_COLOR

    UNPIVOT

    (safety_stock_level FOR SafetyStockLevel IN

    ([4], [60], [100], [500], [800], [1000])) AS UNPIVOT_DATA_STOCK_LEVEL

    WHERE safety_stock_level <> 0;

    ```


    这段 TSQL（除了细微的格式差异）与你未使用动态 SQL 时测试的语句完全相同。结果集也与之前返回的完全相同。请注意生成结果的行数，如图 9-10 所示。


    ![A371168_1_En_9_Fig10_HTML.jpg](img/A371168_1_En_9_Fig10_HTML.jpg)


    图 9-10. 代码清单 9-18 中 UNPIVOT 查询的行数'
- fmt: 'There were a total of 184 rows returned, which is far smaller than the size
    of the original data set that you worked with. The original data set, taken from
    `Production.Product` and `Production.ProductInventory`, contained 1,141 rows.
    The results of the `PIVOT` operations reduced that count to 504 rows. With each
    operation, the granularity of the data set is reduced as you aggregate the results.
    As such, it is important to remember that `PIVOT` and `UNPIVOT`, even when used
    one after the other, will generally not restore a data set to its original form.
    Therefore, use these transformations as methods to acquire reporting data efficiently,
    but not to reconstruct or validate data. While it is possible to build sequences
    of `PIVOT` and `UNPIVOT` operations that can reverse data into its original structure
    and contents, it is unlikely to be a useful exercise.


    Utilizing multiple `UNPIVOT` operations can allow a complex reporting data set
    to be reverted into summary data for use in further reports, or as a way to input
    columnar data into a transactional system instead of as row data. Utilizing Dynamic
    SQL allows for all possible column values to be efficiently accounted for, even
    if the set of columns can change over time!


    # 结论


    `PIVOT` and `UNPIVOT` are often seen by DBAs and developers as advanced or finicky
    operators to be avoided whenever possible. For the use-cases presented, though,
    they can provide large amounts of data quickly in an atomic and set-based approach.
    As a performance bonus, there is no need to implement loops, cursors, or other
    iterative solutions that could run slowly or be resource-intensive on larger volumes
    of data.


    The biggest challenge with these operators is that column lists must be explicitly
    provided prior to runtime. Hard-coding these values greatly increases related
    technical debt by forcing you to keep track of and update these values whenever
    related application or database changes occur. This maintenance cost is high and
    presents opportunities for software bugs to manifest themselves that would be
    difficult to avoid and frustrating to diagnose.


    Implementing Dynamic SQL in conjunction with `PIVOT` or `UNPIVOT` allows you to
    generate column lists at runtime based on whatever criteria the developer chooses
    to apply. So long as this logic is relevant, there will be no need to adjust stored
    procedures or code when new values are added or old ones removed.


    # 10. Solving Common Problems


    Dynamic SQL presents a unique opportunity to take common database problems or
    limitations and solve them quickly. Oftentimes, you’ll run into frustrating situations
    where you are managing different databases, schemas, or settings, and there is
    no easy way to make changes to a mixed set of objects. This chapter attempt to
    show you how Dynamic SQL can resolve complex situations such as these. In addition,
    this chapter provides general guidelines and techniques that could apply to any
    similar database problem.


    ## Collation Conflicts


    ### The Problem


    Database collations are often used as a way to manage multiple languages or character
    sets within SQL Server in a meaningful fashion. The order in which characters
    are sorted in Spanish is different than in English or Japanese, and using an English
    collation on either of the other languages may result in strings being ordered
    incorrectly. In fact, SQL Server will prevent direct assignments or comparisons
    between string data of different collations. If you are working with data in multiple
    collations, you must account for the differences to ensure that you act on it
    according to the correct business logic.


    To test collations, you will create a new database and table, populated with data
    from `AdventureWorks`, as shown in Listing 10-1.


    ```sql

    IF EXISTS (SELECT * FROM sys.databases WHERE name = ''Collation_Test'')

    BEGIN

    DROP DATABASE Collation_Test;

    END

    GO

    CREATE DATABASE Collation_Test COLLATE Traditional_Spanish_CI_AS;

    GO

    USE Collation_Test;

    GO

    CREATE TABLE dbo.Spanish_Employees

    (       BusinessEntityID INT NOT NULL,

    NationalIDNumber NVARCHAR(15) NOT NULL,

    LoginID NVARCHAR(256) NOT NULL,

    OrganizationNode HIERARCHYID NULL,

    OrganizationLevel SMALLINT NULL,

    JobTitle NVARCHAR(50) NOT NULL,

    BirthDate DATE NOT NULL,

    MaritalStatus NCHAR(1) NOT NULL,

    Gender NCHAR(1) NOT NULL,

    HireDate DATE NOT NULL,

    SalariedFlag BIT NOT NULL,

    VacationHours SMALLINT NOT NULL,

    SickLeaveHours SMALLINT NOT NULL,

    CurrentFlag BIT NOT NULL,

    rowguid UNIQUEIDENTIFIER ROWGUIDCOL  NOT NULL,

    ModifiedDate DATETIME NOT NULL,);

    GO

    INSERT INTO Collation_Test.dbo.Spanish_Employees

    SELECT

    *

    FROM AdventureWorks2014.HumanResources.Employee;

    ```

    Listing 10-1. Building a Test Database for Collation Testing


    Note that when the database `Collation_Test` was created, it was explicitly given
    the collation `Traditional_Spanish_CI_AS`. All strings in this database will,
    by default, be stored and sorted in this new collation, rather than the instance
    default or the settings found on other databases. On my SQL Server, the default
    collation is `SQL_Latin1_General_CP1_CI_AS`. This can be verified in the server
    properties in the GUI, as shown in Figure 10-1.


    ![A371168_1_En_10_Fig1_HTML.jpg](A371168_1_En_10_Fig1_HTML.jpg)

    Figure 10-1. Default server collation, as shown in the SQL Server Properties window


    Under the Server Collation option, you can find the default for your server. This
    is the collation that will be used on any new database that is created in which
    another collation is not supplied. This can also be verified with TSQL:


    ```sql

    SELECT SERVERPROPERTY(''Collation'') AS ServerDefaultCollation;

    ```


    The resulting collation is the same as shown in the GUI and can be verified in
    Figure 10-2.


    ![A371168_1_En_10_Fig2_HTML.jpg](A371168_1_En_10_Fig2_HTML.jpg)

    Figure 10-2. The default collation on my test server


    In order to illustrate one of the differences between different collations, you
    will take a look at the `HumanResources.Employee` table, focusing on the `JobTitle`
    column within the original table and the newly created one that is collated using
    traditional Spanish. Listing 10-2 shows each of these queries.


    ```sql

    SELECT

    *

    FROM AdventureWorks2014.HumanResources.Employee

    WHERE JobTitle LIKE ''C%''

    ORDER BY JobTitle;

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle LIKE ''C%''

    ORDER BY JobTitle;

    ```

    Listing 10-2. Two Test Queries Illustrating the Differences in Two Distinct Collations


    The results of the queries are a bit unusual and indicate that there are significant
    differences between each collation, as shown in Figure 10-3.


    ![A371168_1_En_10_Fig3_HTML.jpg](A371168_1_En_10_Fig3_HTML.jpg)

    Figure 10-3. Different collations result in the same query providing different
    results'
