- fmt: '# Conclusion


    使用动态SQL创建灵活、高效的搜索例程，可以解锁无数种快速访问数据的方式，同时定制TSQL解决方案以应对应用程序可能带来的任何挑战。我们本可以轻松地用数百页的篇幅来举例说明，不同的参数组合与TSQL技术如何能够创造出新颖或创新的搜索方法。


    无需多言，这种灵活性本身就是创新的源泉。当你遇到挑战，不确定如何获取所需的所有可能结果集时，请尝试实验，将硬编码的约定转化为参数。虽然一个动态SQL存储过程乍看之下可能更为复杂，但所增加的控制逻辑行可以很容易地被格式化和文档化，以确保最终代码既易于阅读又便于维护。


    ## 4. 权限与安全


    第[2](#A371168_1_En_2_Chapter.html)章介绍了SQL注入，以及编写不当的TSQL可能成为恶意攻击目标的多种方式。本章退后一步，回顾SQL
    Server安全的最佳实践，重点关注动态SQL及其典型用例。安全是一个庞大的主题，如果展开讨论，很容易就能占据数千页的篇幅。它也在不断演变，随着每一天过去，新产品发布，旧产品被发现漏洞。此处的目标是涵盖在使用动态SQL开发数据库解决方案时，你需要格外注意的最重要和最常见的方面，而不会过多地深入特殊情况或边缘案例。


    ### 最小权限原则


    安全方面最重要的考量来自“最小权限原则”。该原则指出，对于任何应用程序，其可用的权限应恰好是执行其功能所必需的，不多也不少。在数据库层面，这一原则至关重要，因为数据库安全是防止数据被盗的最后屏障。一旦黑客获得了对您数据的无限制访问，就几乎没有什么可以保护的了。最重要的考量是确定应用程序应以哪个用户身份运行，以及应为该用户分配哪些权限。


    公司经常犯的最重大错误是为他们的应用程序使用`sysadmin`用户。这很方便，因为它总是有效，无论执行的是什么TSQL。无论应用程序做什么，这个用户都将提供对一切的完全访问权限。虽然方便，但它构成了一个安全噩梦，因为使用此帐户的应用程序可能执行不应被允许的操作。更糟糕的是，如果应用程序以某种方式被攻陷，并且恶意用户获得了执行TSQL命令的权限，他们将拥有一切的访问权。


    考虑以下假设的应用程序和功能列表：

    *   订单处理系统

    *   文件传输应用程序

    *   报告生成

    *   软件安装程序

    *   备份软件


    这些应用程序执行的功能非常不同，访问数据库服务器的方式也大相径庭。为了满足这些功能，SQL Server登录名和用户应被授予哪些类型的权限？应用程序需要读取权限吗？写入权限？它需要更改任何服务器配置或设置吗？应用程序是仅访问单个数据库还是一组数据库？可以将应用程序限制在对少数几个对象的权限上吗？显然，为所有内容创建具有细粒度访问权限的手动策略可能工作量过大，得不偿失，并且将构成最深入的解决方案。在不深入那么多细节的情况下，这些应用程序通常需要什么来运行？


    *   **订单处理系统**：对特定数据库或一组数据库的读写权限（`select`、`insert`、`update`和`delete`）将提供创建、更新、删除订单状态以及报告状态的能力。如果数据通过存储过程读/写，则需要执行这些例程的权限。应用程序不太可能有任何理由调整服务器设置、更改数据库架构、访问文件数据或访问其他数据库或服务器中不相关的数据。

    *   **文件传输应用程序**：对记录文件传输的表具有读写权限。用户可能还需要直接访问文件系统进行读写。如果可能，请不要使用`xp_cmdshell`执行文件访问。这个系统存储过程在数据库服务器上启用后，提供了对操作系统的巨大访问权限。一个拥有对数据和操作系统无限制访问权限的数据库登录名非常强大，对于任何试图攻陷此应用程序的黑客来说都是一个极具诱惑力的目标。

    *   **报告生成**：理想情况下，对单独的报告数据库具有只读访问权限。报告通常在从作为其整体数据源的事务数据中分离出来时运行效果最佳。将报告限制为只读访问的能力大大减少了这些应用程序被黑客攻击或破坏的方式。如果需要，可以进一步将读取访问权限细分为这些报告所需的表或存储过程。这确保了只有在需要时才会访问受保护或敏感的数据。

    *   **软件安装程序**：安装软件时，应用程序通常会请求尽可能多的权限，经常寻找`sysadmin`用户。重要的是，如果授予了这个级别的权限，它应该是临时的。通常，安装或升级软件是不频繁且不规则的事件。因此，如果需要一个具有高级别权限的单独用户，该用户永远不应被其他应用程序、用户或功能使用。不要使用`sa`或搭便车使用其他服务帐户，以免不同用途混淆。由DBA使用自己的帐户进行安装是可以接受的，只要他拥有安装所需的权限。

    *   **备份软件**：所需的主要权限是备份数据库。该软件可能还需要访问一些元数据来读取有关数据库的数据或写入日志数据，但这种访问权限可能是最小的。该软件可以仅在没有进一步权限需求的备份操作员帐户下运行。


    这些是基于您在开发或IT中常见的软件应用程序的一些典型示例，但每个环境都有其自己的一套应用程序和安全需求。只要权限被缩减到应用程序所需的最低水平，您就可以确保任何可能因额外权限而暴露的安全漏洞永远不会成为现实。


    然而，“最小权限原则”并不仅适用于数据库服务器。安全最好以分层方式组织，数据库是最低层，是最终用户最后访问的一层。确保任何最终可以访问数据库服务器的应用程序也仅以其所需的权限运行。安全性的每一层都为保护您数据的保险库增加了一把额外的锁。'
  raw: '## Conclusion


    Using Dynamic SQL to create flexible, efficient search routines creates a limitless
    number of ways in which you can access data quickly, while customizing the TSQL
    solution to match whatever challenges an application may send your way. We could
    easily have filled hundreds of pages with examples of how different combinations
    of parameters and TSQL techniques could create a new or innovative search methodology.


    Needless to say, the flexibility is, in of itself, the source of innovation. When
    you run into challenges and are unsure how to get every possible result set that
    you are looking for, experiment and try turning hard-coded conventions into parameters.
    While a Dynamic SQL stored procedure may appear at first glance to be more complex,
    the added lines of control logic can easily be formatted and documented to ensure
    that the resulting code is both easy to read and maintainable.


    # 4. Permissions and Security


    Chapter [2](#A371168_1_En_2_Chapter.html) covered SQL injection and the multitude
    of ways in which poorly written TSQL can become a target for malicious attacks.
    This chapter steps back and reviews best practices for SQL Server security, with
    a focus on Dynamic SQL and its typical use cases. Security is an immense topic,
    one that could easily consume thousands of pages given the opportunity. It also
    evolves with each day that passes, as new products are released and vulnerabilities
    are found in older ones. The goal here is to cover the most important and common
    places in which you need to take care while developing database solutions using
    Dynamic SQL, without veering too far into one-offs or edge cases.


    ## The Principle of Least Privilege


    The most important consideration in security comes from the “Principle of Least
    Privilege”. This says that for any application, the permissions available to it
    are exactly what are needed to perform its functions and nothing more. At the
    database level, this principle is critically important as database security is
    the last barrier against data theft. Once a hacker has gained unfettered access
    to your data, there is little left to protect against. The most important considerations
    are to determine what users an application should run under and what permissions
    that user should be assigned.


    The most significant mistake that companies often make is to use a sysadmin user
    for their applications. This is convenient as it will always work, regardless
    of the TSQL that is executed. No matter what the application does, this user will
    provide total access to everything. While convenient, it poses a security nightmare
    in that the application using this account could perform actions that shouldn’t
    be allowed. Worse, if the application were somehow compromised and malicious users
    gained access to execute TSQL commands, they would have access to everything.


    Consider the following list of hypothetical applications and functions:


    *   Order processing system

    *   File transfer application

    *   Report generation

    *   Software installer

    *   Backup software


    Each of these applications performs very different functions and will have to
    access a database server very differently. What types of permissions should the
    SQL Server login and user be given in order to satisfy these functions? Does the
    application need read access? Write access? Will it need to alter any server configurations
    or settings? Does the application only access a single database or a set of databases?
    Can the application be limited to permissions on a small set of objects? Obviously,
    creating a manual policy with granular access to everything may be more work than
    it is worth, and would constitute the most in-depth solution. Without going into
    that much detail, what would these applications generally need to operate?


    *   Order processing system : Read and write access to a specific database or
    set of databases (select, insert, update, and delete) would provide the ability
    to create, update, delete, and report on order statuses. If data were read/written
    via stored procedures, the ability to execute those routines would be necessary.
    It is unlikely that the application would have any reason to adjust server settings,
    alter database schema, access file data, or access unrelated data in other databases
    or servers.

    *   File transfer application : Read and write access to tables that document
    file transfers. The user will likely also need direct access to read and write
    to a file system. If possible, do not perform file access using `xp_cmdshell`.
    This system-stored procedure, when enabled on a database server, provides a huge
    amount of access to the operating system. A database login with unfettered access
    to data and the operating system is very powerful, and makes for a very tempting
    target for any hacker looking to compromise this application.

    *   Report generation : Read-only access ideally to only a separate reporting
    database. Reports generally run best when separated from the transactional data
    that is their overall data source. The ability to limit reports to read-only access
    greatly reduces the ways in which these applications can be hacked or broken.
    If desired, read access can be further broken down into the tables or stored procedures
    required for these reports. This ensures that protected or sensitive data is accessed
    only if needed.

    *   Software installer : When installing software, the application will often
    request as much in the way of permissions as possible, often looking for a sysadmin
    user. It’s important that if this level of permissions is given, it be temporary.
    Typically, installing or upgrading software is an infrequent and irregular event.
    As such, if a separate user with high levels of permissions is needed, that user
    should never used for other applications, users, or functions. Do not use `sa`
    or piggyback on other service accounts where different uses may get mixed up.
    A DBA installing under his own account is acceptable so long as he has the permissions
    required for the installation.

    *   Backup software : The primary permissions required will be to take backups
    of your databases. This software may also need to access some metadata in order
    to read data about the databases or write log data, but this access will likely
    be minimal. It’s possible that this software could run solely under a backup operator
    account with no need for any further permissions.


    These were some typical examples based on common software applications that you’ll
    see in development or IT, but with each environment comes its own suite of applications
    and security needs. As long as permissions are reduced to the minimum level required
    by an application, you can be assured that any security holes that could be exposed
    via extra permissions will never be realized.


    The “Principle of Least Privilege” does not only apply to a database server, though.
    Security is best organized in layers, with the database being the lowest layer
    and is the last one to be accessed by the end user. Ensure that any applications
    that ultimately can access the database server also run with only the permissions
    they need. Each layer of security provides an additional lock on the vault that
    is your data.'
