  trans: '# 动态 SQL 实战


    一个常见的维护需求是在服务器上的多个数据库上运行 T-SQL。这类维护可能包括备份数据库、重建索引、报告关键数据元素或许多其他可能性。如果数据库列表永不改变，也没有数据库被重命名，你可以将名称硬编码到每个存储过程中，而不必担心将来更改它们。这种方法在遇到那些不可避免的变化（移动或重命名数据库）之前一直有效——而这最终会导致所有那些宝贵的维护过程失效。至关重要的是，你的维护、监控和报告作业要以尽可能高的可靠性运行。


    清单 1-1 展示了一个常见的示例，该语句可用于针对单个数据库运行备份，并将其存储在本地驱动器上。


    ```

    BACKUP DATABASE AdventureWorks2014

    TO DISK=''E:\SQLBackups\AdventureWorks2014.bak''

    WITH COMPRESSION;

    清单 1-1.

    简单的 BACKUP 语句

    ```


    这段 T-SQL 将使用压缩功能将 `AdventureWorks2014` 数据库备份到 E 盘的 `SQLBackups` 文件夹中。例如，如果你想对一组名称以
    `AdventureWorks` 文本开头的数据库执行自定义备份，那么你需要构建能够适应性收集所有符合该名称的数据库列表，然后分别对它们进行备份的 T-SQL。以下的
    T-SQL 展示了使用动态 SQL 实现这一目标的一种方法。


    ```

    DECLARE @database_list TABLE

    (database_name SYSNAME);

    INSERT INTO @database_list

    (database_name)

    SELECT

    name

    FROM sys.databases

    WHERE name LIKE ''AdventureWorks%'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name SYSNAME;

    DECLARE database_cursor CURSOR LOCAL FAST_FORWARD FOR

    SELECT database_name FROM @database_list

    OPEN database_cursor

    FETCH NEXT FROM database_cursor INTO @database_name;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    SELECT @sql_command = ''

    BACKUP DATABASE '' + @database_name + ''

    TO DISK=''''E:\SQLBackups\'' + @database_name + ''.bak''''

    WITH COMPRESSION;''

    EXEC (@sql_command);

    FETCH NEXT FROM database_cursor INTO @database_name;

    END

    CLOSE database_cursor;

    DEALLOCATE database_cursor;

    清单 1-2.

    为备份所有以“AdventureWorks”开头的数据库而构建的动态 SQL

    ```


    这段 T-SQL 当然比你看到的第一个 `BACKUP` 语句要复杂得多。让我们将其分解，以理解这里发生了什么以及它为何有效。然后，你将重点关注构成这组语句支柱的动态
    SQL 部分。


    1.  用一个数据库名称列表填充一个表变量。

    2.  按每个数据库循环一次。

    3.  构建一个动态 SQL 命令字符串，该字符串会考虑当前的数据库名称。

    4.  执行动态的 `BACKUP` 语句。

    5.  继续迭代循环，直到所有相关数据库都已备份。


    你在这里声明了几个变量：


    *   `@database_list`：包含所有符合搜索条件的数据库。在本例中，任何以 `AdventureWorks` 一词开头的数据库都将被包括在内。

    *   `@sql_command`：这是将包含动态 SQL 语句的命令字符串。

    *   `@database_name`：保存当前正在备份的数据库的名称。

    *   `database_cursor`：一个游标，将用于遍历 `@database_list` 中列出的所有数据库。


    此示例的大部分内容是为循环设置的。关键部分是你用 `@database_name` 替换数据库名称和备份文件名的地方。这使你能够生成一个备份语句，该语句不仅会备份每个数据库（无论有多少个），而且还会使用该名称来命名备份文件。如果需要，你同样可以轻松地在文件名上附加其他信息，例如日期、时间或服务器名称。


    # 动态 SQL 的优势


    你希望将动态 SQL 纳入日常 SQL Server 工具库的原因有很多。此外，还有许多特定的挑战，动态 SQL 是其最佳解决方案。讨论这些场景将突显为何可以围绕这个主题撰写一整本书。


    ## 可选或自定义的搜索条件


    搜索框是网页或应用程序开发中最常用的工具之一。对于简单的搜索，你可能只需要传入一个变量进行评估。在更强大的网页搜索中，你可能需要从多个条件中进行选择，每个条件都可以用
    `AND` 或 `OR` 条件进行评估。虽然你可以编写一个非常长的 `SELECT` 语句，并与所有可能涉及的表进行左连接，但最终很可能会得到一个庞大、低效且难以处理的
    T-SQL 集合。相反，动态 SQL 允许你构建一个 `SELECT` 字符串，该字符串只查询满足给定搜索所需的表。


    ## 一切皆可定制


    添加连接或 `WHERE` 子句仅仅是个开始。借助动态 SQL，任何语句都可以被定制，从而为你的代码提供更大的灵活性。想根据动态搜索对列进行分组？解决方案是将
    `GROUP BY` 子句编写为动态 SQL，对其进行修改以适应每个特定情况的需求。想为数据集生成行号，但直到运行时才知道按哪些列进行分区或排序？没问题！


    前面的示例说明了如何使用动态 SQL 来自定义备份操作并自定义备份文件名。任何可想到的 T-SQL 语句都可以被修改以利用动态 SQL，这样做可以在应对日常众多挑战时提供更大的灵活性。


    ## 优化 SQL 性能


    到目前为止，动态 SQL 似乎使事情变得更加复杂，增加了对临时变量、循环和命令字符串的需求。尽管表面上增加了复杂性，但这种框架可以让你减少通常执行的 SQL
    语句的大小并提高性能。


    动态 SQL 提供了一个定制语句以满足性能需求的机会。移除多余的对象、调整连接和子查询以及减少 SQL 语句的大小，都可以带来更快的执行时间并减少资源消耗。


    ## 快速生成大量 T-SQL 或文本！


    有时你需要执行大型 SQL 语句，这些语句作用于一组众多对象。其他时候，你可能希望基于存储在特定表集中的数据生成输出文本。也许你想生成将用于从任意数量的源收集报告数据的
    `SELECT` 语句。


    手动编写所有这些 T-SQL 可能会花费很长时间，并且在你完成一项耗时、枯燥的任务时，会大大增加人为错误发生的机会。如果涉及的 SQL 语句需要定期运行，那么提前准备它们可能是不可能的，特别是当目标表或其他涉及的对象可能经常变化时。


    使用动态 SQL，你可以生成任意数量的命令或文本，且没有限制。SQL Server 不会厌倦这个过程，无论它看起来多么乏味。这是一个自动化繁琐任务并减少在最终成为机械性工作上的操作员干预的机会。结果是你的工作变得更轻松、更有趣，你可以专注于需要你关注的更重要的任务！'
- fmt: '# Execute SQL Statements on Other Servers or Databases


    A common challenge occurs when you want to run queries against other entities,
    but do not know ahead of time what all of those entities are. If those objects
    can vary or change at runtime, then Dynamic SQL is a great solution for managing
    these operations without having to hard-code object names that are likely to change
    over time. This reduces the chances of an application breaking after a software
    release, configuration change, or hardware upgrade.


    Similarly, in these scenarios, you may have an application with code that runs
    in many locations, with references to servers, databases, or other objects that
    vary based on environment. Writing slightly different code in each environment
    would be inefficient and would result in significantly higher maintenance needs
    over time. It’s far simpler to maintain configuration data and write code that
    processes those configurations, reading and writing to the database as needed.
    Dynamic SQL allows for that configuration data to be easily handled and acted
    upon, regardless of the complexity of the operations involved.


    # Do the Impossible!


    Simply put, there are many tasks in SQL Server that would be extremely difficult,
    or seemingly impossible, without Dynamic SQL. Many common maintenance scenarios
    that need to iterate across database objects become trivially easy with Dynamic
    SQL.


    Have you ever tried to `PIVOT` or `UNPIVOT` across a dynamic column list? The
    command is powerful, but it requires a definitive column list. If the list is
    not known until runtime, then the only way to get the data is to use Dynamic SQL
    to insert your customized column list into the statement and then execute it.


    There will be many examples of interesting, useful, and fun ways in which Dynamic
    SQL can make very difficult tasks easy. Stay tuned and enjoy!


    # Dynamic SQL Considerations


    As with any tool, Dynamic SQL shouldn’t be used everywhere blindly, nor is it
    the solution to every database problem you’ll encounter. With a discussion of
    any tool, it is imperative that you consider its challenges, pitfalls, and complexities
    prior to implementing it.


    ## Apostrophes Can Break Strings


    As you build Dynamic SQL commands, you incorporate other variables and strings
    into them. If any of these contain apostrophes, your command string will be broken.
    The resulting command will, if you are lucky, throw an error and not run. SQL
    injection is the process of using the variables in Dynamic SQL to intentionally
    close the string with an apostrophe, and then attempt to execute malicious code.
    If you do not cleanse all parameters and inputs prior to building the command
    statement, you risk introducing colossal security holes into your code.


    It is imperative that whenever you use Dynamic SQL, you ensure that your inputs
    are clean and that unexpected symbols in your parameters have no negative effect
    on the code operation. Failure to do so can result in broken application code,
    unexpected behavior, or catastrophic security holes.


    ## NULL Can Break Strings


    `NULL` is a complicated state of affairs. As an absence of value, any attempt
    to concatenate a string with `NULL` will result in `NULL`. If the Dynamic SQL
    command string that you build is passed a parameter that is `NULL`, the entire
    statement will become `NULL`. The result will likely be TSQL that does absolutely
    nothing. This can lead to troubleshooting nightmares as it becomes unclear why
    a SQL statement appears to do nothing. Further, the search for the `NULL` parameter
    may be a daunting task if the statement in question has many inputs.


    ## Difficult to Read and Debug


    TSQL loses the benefits of color-coding that exist in SQL Server Management Studio
    when you write standard SQL in the text editor. Within apostrophes, much of the
    text will be red, including keywords, strings, and variable names. In addition,
    the error-checking that is performed as you type does not occur as effectively
    within a Dynamic SQL string. A simple typo that would be underlined in red normally
    will not be as apparent when it is within a string.


    In order to combat these challenges, you must devise very well-written TSQL. In
    addition to writing very organized code, you have to be even more diligent when
    documenting your work. TSQL that may normally be trivially easy to understand
    can be harder to grasp when written as part of a string. Extra time and care must
    be used in order to ensure that when you revisit this code in the future, it is
    still easy to read and meaningful.


    Dynamic SQL always compiles correctly. To SQL Server, it is simply a character
    string. The contents of it are not checked for syntax or object validity until
    runtime. Effective testing and debugging are the key to ensuring that the TSQL
    you write executes as you expect it to.


    ## Permissions and Scope Are Different


    Dynamic SQL statements are executed in their own scope. Variables defined within
    the string will not normally be available outside of it. In addition, Dynamic
    SQL is executed with the permissions of the user executing the overall TSQL code
    (stored procedure, job, etc…). It does not execute with the permissions of the
    owner of the stored procedure or the user who happened to be testing it recently.


    In order to avoid unexpected errors, permissions conflicts, or other security
    concerns, it’s important to consider what users will be running any code that
    includes Dynamic SQL. If you need to save data from a Dynamic SQL statement, or
    pass parameters in from outside, then that needs to be explicitly managed in order
    to get the desired effect.


    ## Dynamic SQL Cannot Be Used in Functions


    Simply put, you can use Dynamic SQL in stored procedures, ad-hoc TSQL, and jobs,
    but it is not allowed within functions. Any attempt to include Dynamic SQL within
    functions will result in an error:


    ```

    Msg 443, Level 16, State 14, Procedure fn_test, Line 72

    Invalid use of a side-effecting operator ''EXECUTE STRING'' within a function.

    ```


    SQL Server functions must be deterministic. Inputs and outputs must be in the
    form given in the function definition. Dynamic SQL by nature is non-deterministic,
    and therefore cannot be used within functions.


    # Dynamic SQL Style


    Writing code that works is very important. Writing code that is easy to understand
    and maintainable is equally as important. As someone charged with the creation
    and upkeep of immense numbers of database objects, you must always consider how
    easy it will be to read, understand, troubleshoot, and upgrade these objects at
    any point in the future. Because Dynamic SQL tends to be harder to read, extra
    care should be taken to ensure that your TSQL is well-written, effectively documented,
    and that objects/variables are named according to reasonable conventions. These
    design considerations will save you considerable time, as well as show your colleagues
    that you care about their well-being and the future of your organization.


    The rules of good Dynamic SQL design begin here, but will continue to be built
    on throughout the rest of this book. Consider any efforts on your part to write
    maintainable code, whether it utilizes Dynamic SQL or not.'
  raw: '### Execute SQL Statements on Other Servers or Databases


    A common challenge occurs when you want to run queries against other entities,
    but do not know ahead of time what all of those entities are. If those objects
    can vary or change at runtime, then Dynamic SQL is a great solution for managing
    these operations without having to hard-code object names that are likely to change
    over time. This reduces the chances of an application breaking after a software
    release, configuration change, or hardware upgrade.


    Similarly, in these scenarios, you may have an application with code that runs
    in many locations, with references to servers, databases, or other objects that
    vary based on environment. Writing slightly different code in each environment
    would be inefficient and would result in significantly higher maintenance needs
    over time. It’s far simpler to maintain configuration data and write code that
    processes those configurations, reading and writing to the database as needed.
    Dynamic SQL allows for that configuration data to be easily handled and acted
    upon, regardless of the complexity of the operations involved.


    ### Do the Impossible!


    Simply put, there are many tasks in SQL Server that would be extremely difficult,
    or seemingly impossible, without Dynamic SQL. Many common maintenance scenarios
    that need to iterate across database objects become trivially easy with Dynamic
    SQL.


    Have you ever tried to `PIVOT` or `UNPIVOT` across a dynamic column list? The
    command is powerful, but it requires a definitive column list. If the list is
    not known until runtime, then the only way to get the data is to use Dynamic SQL
    to insert your customized column list into the statement and then execute it.


    There will be many examples of interesting, useful, and fun ways in which Dynamic
    SQL can make very difficult tasks easy. Stay tuned and enjoy!


    ## Dynamic SQL Considerations


    As with any tool, Dynamic SQL shouldn’t be used everywhere blindly, nor is it
    the solution to every database problem you’ll encounter. With a discussion of
    any tool, it is imperative that you consider its challenges, pitfalls, and complexities
    prior to implementing it.


    ### Apostrophes Can Break Strings


    As you build Dynamic SQL commands, you incorporate other variables and strings
    into them. If any of these contain apostrophes, your command string will be broken.
    The resulting command will, if you are lucky, throw an error and not run. SQL
    injection is the process of using the variables in Dynamic SQL to intentionally
    close the string with an apostrophe, and then attempt to execute malicious code.
    If you do not cleanse all parameters and inputs prior to building the command
    statement, you risk introducing colossal security holes into your code.


    It is imperative that whenever you use Dynamic SQL, you ensure that your inputs
    are clean and that unexpected symbols in your parameters have no negative effect
    on the code operation. Failure to do so can result in broken application code,
    unexpected behavior, or catastrophic security holes.


    ### NULL Can Break Strings


    `NULL` is a complicated state of affairs. As an absence of value, any attempt
    to concatenate a string with `NULL` will result in `NULL`. If the Dynamic SQL
    command string that you build is passed a parameter that is `NULL`, the entire
    statement will become `NULL`. The result will likely be TSQL that does absolutely
    nothing. This can lead to troubleshooting nightmares as it becomes unclear why
    a SQL statement appears to do nothing. Further, the search for the `NULL` parameter
    may be a daunting task if the statement in question has many inputs.


    ### Difficult to Read and Debug


    TSQL loses the benefits of color-coding that exist in SQL Server Management Studio
    when you write standard SQL in the text editor. Within apostrophes, much of the
    text will be red, including keywords, strings, and variable names. In addition,
    the error-checking that is performed as you type does not occur as effectively
    within a Dynamic SQL string. A simple typo that would be underlined in red normally
    will not be as apparent when it is within a string.


    In order to combat these challenges, you must devise very well-written TSQL. In
    addition to writing very organized code, you have to be even more diligent when
    documenting your work. TSQL that may normally be trivially easy to understand
    can be harder to grasp when written as part of a string. Extra time and care must
    be used in order to ensure that when you revisit this code in the future, it is
    still easy to read and meaningful.


    Dynamic SQL always compiles correctly. To SQL Server, it is simply a character
    string. The contents of it are not checked for syntax or object validity until
    runtime. Effective testing and debugging are the key to ensuring that the TSQL
    you write executes as you expect it to.


    ### Permissions and Scope Are Different


    Dynamic SQL statements are executed in their own scope. Variables defined within
    the string will not normally be available outside of it. In addition, Dynamic
    SQL is executed with the permissions of the user executing the overall TSQL code
    (stored procedure, job, etc…). It does not execute with the permissions of the
    owner of the stored procedure or the user who happened to be testing it recently.


    In order to avoid unexpected errors, permissions conflicts, or other security
    concerns, it’s important to consider what users will be running any code that
    includes Dynamic SQL. If you need to save data from a Dynamic SQL statement, or
    pass parameters in from outside, then that needs to be explicitly managed in order
    to get the desired effect.


    ### Dynamic SQL Cannot Be Used in Functions


    Simply put, you can use Dynamic SQL in stored procedures, ad-hoc TSQL, and jobs,
    but it is not allowed within functions. Any attempt to include Dynamic SQL within
    functions will result in an error:


    ```

    Msg 443, Level 16, State 14, Procedure fn_test, Line 72

    Invalid use of a side-effecting operator ''EXECUTE STRING'' within a function.

    ```


    SQL Server functions must be deterministic. Inputs and outputs must be in the
    form given in the function definition. Dynamic SQL by nature is non-deterministic,
    and therefore cannot be used within functions.


    ## Dynamic SQL Style


    Writing code that works is very important. Writing code that is easy to understand
    and maintainable is equally as important. As someone charged with the creation
    and upkeep of immense numbers of database objects, you must always consider how
    easy it will be to read, understand, troubleshoot, and upgrade these objects at
    any point in the future. Because Dynamic SQL tends to be harder to read, extra
    care should be taken to ensure that your TSQL is well-written, effectively documented,
    and that objects/variables are named according to reasonable conventions. These
    design considerations will save you considerable time, as well as show your colleagues
    that you care about their well-being and the future of your organization.


    The rules of good Dynamic SQL design begin here, but will continue to be built
    on throughout the rest of this book. Consider any efforts on your part to write
    maintainable code, whether it utilizes Dynamic SQL or not.'
  trans: '

    # 在其他服务器或数据库上执行 SQL 语句


    当您需要针对其他实体运行查询，但事先并不知道所有这些实体是什么时，通常会遇到一个常见的挑战。如果这些对象在运行时可能变化或改变，那么**动态 SQL** 是管理这些操作的绝佳解决方案，无需硬编码那些可能随时间变化的对象名称。这降低了应用程序在软件发布、配置更改或硬件升级后出现故障的可能性。


    同样，在这些场景中，您可能有一个应用程序，其代码在多个位置运行，但对服务器、数据库或其他对象的引用会根据环境而异。在每个环境中编写略有不同的代码是低效的，并且随着时间的推移会导致显著增加的维护需求。维护配置数据并编写处理这些配置的代码要简单得多，根据需要读写数据库。动态
    SQL 允许轻松处理和操作这些配置数据，无论所涉及的操作有多复杂。


    # 完成不可能之事！


    简而言之，SQL Server 中有许多任务如果没有动态 SQL，将会极其困难，甚至看似不可能。许多需要遍历数据库对象的常见维护场景，使用动态 SQL 后就变得轻而易举。


    您是否曾尝试在动态列列表上使用 `PIVOT` 或 `UNPIVOT`？这个命令功能强大，但它需要一个明确的列列表。如果该列表在运行时才能确定，那么获取数据的唯一方法就是使用动态
    SQL，将您定制的列列表插入语句中，然后执行它。


    后续将会展示许多示例，演示动态 SQL 如何让非常困难的任务变得简单有趣，这些示例既实用又好玩。敬请期待并享受学习过程吧！


    # 动态 SQL 注意事项


    与任何工具一样，不应盲目地到处使用动态 SQL，它也不是您遇到的每个数据库问题的解决方案。在讨论任何工具时，在实施之前必须考虑其挑战、陷阱和复杂性。


    ## 撇号会破坏字符串


    在构建动态 SQL 命令时，您会将其他变量和字符串合并到其中。如果其中任何内容包含撇号，您的命令字符串就会被破坏。结果命令在运气好的情况下会抛出错误并不执行。SQL
    注入是指利用动态 SQL 中的变量，故意用撇号关闭字符串，然后尝试执行恶意代码的过程。如果您在构建命令语句之前没有清除所有参数和输入，您可能会将巨大的安全漏洞引入您的代码。


    因此，每当使用动态 SQL 时，务必确保输入是干净的，并且参数中的意外符号不会对代码操作产生负面影响。未能做到这一点可能会导致应用程序代码中断、意外行为或灾难性的安全漏洞。


    ## NULL 会破坏字符串


    `NULL` 是一个复杂的状态。作为值的缺失，任何尝试将字符串与 `NULL` 连接的操作都将导致 `NULL`。如果您构建的动态 SQL 命令字符串被传递了一个为
    `NULL` 的参数，整个语句将变成 `NULL`。结果很可能是 T-SQL 语句完全不做任何事情。这可能导致排查故障的噩梦，因为不清楚为什么一个 SQL
    语句似乎什么都没做。此外，如果所讨论的语句有许多输入，寻找那个 `NULL` 参数可能是一项艰巨的任务。


    ## 难以阅读和调试


    当您在文本编辑器中编写标准 SQL 时，T-SQL 会失去 SQL Server Management Studio 中存在的颜色编码优势。在撇号内，大部分文本会显示为红色，包括关键字、字符串和变量名。此外，在动态
    SQL 字符串内部，您在键入时执行的错误检查效果会降低。一个通常会被红色下划线标记的简单拼写错误，在字符串内部可能就不那么明显了。


    为了应对这些挑战，您必须设计编写良好的 T-SQL。除了编写非常有组织的代码外，在记录您的工作时需要更加勤勉。通常容易理解的 T-SQL，当作为字符串的一部分编写时，可能更难以掌握。必须投入额外的时间和细心，以确保当您将来重新审视这段代码时，它仍然易于阅读且有意义。


    动态 SQL 总是能正确编译。对 SQL Server 而言，它只是一个字符串。其内容在运行时之前不会被检查语法或对象有效性。有效的测试和调试是确保您编写的
    T-SQL 按预期执行的关键。


    ## 权限和作用域不同


    动态 SQL 语句在它们自己的作用域中执行。在字符串内定义的变量通常在外部不可用。此外，动态 SQL 是以执行整体 T-SQL 代码（存储过程、作业等）的用户权限来执行的。它不是以存储过程所有者的权限或最近碰巧测试它的用户权限来执行。


    为了避免意外错误、权限冲突或其他安全问题，考虑哪些用户将运行包含动态 SQL 的任何代码非常重要。如果您需要从动态 SQL 语句中保存数据，或从外部传入参数，则需要显式管理以达到预期效果。


    ## 动态 SQL 不能在函数中使用


    简而言之，您可以在存储过程、即席 T-SQL 和作业中使用动态 SQL，但在函数中不允许。任何在函数中包含动态 SQL 的尝试都将导致错误：


    ```

    Msg 443, Level 16, State 14, Procedure fn_test, Line 72

    Invalid use of a side-effecting operator ''EXECUTE STRING'' within a function.

    ```


    SQL Server 函数必须是确定性的。输入和输出必须符合函数定义的形式。动态 SQL 本质上是非确定性的，因此不能在函数中使用。


    # 动态 SQL 风格


    编写能工作的代码非常重要。编写易于理解和维护的代码同样重要。作为负责创建和维护大量数据库对象的人，您必须始终考虑在未来的任何时间点，阅读、理解、排查故障和升级这些对象的难易程度。由于动态
    SQL 往往更难阅读，因此应格外小心，确保您的 T-SQL 编写良好、文档有效，并且对象/变量按照合理的约定命名。这些设计考虑将为您节省大量时间，并向您的同事表明您关心他们的福祉以及组织的未来。


    良好动态 SQL 设计的原则始于此，并将在本书的其余部分继续构建。无论是否使用动态 SQL，请考虑您为编写可维护代码所做的任何努力。

    '
- fmt: '### Document Thoroughly


    This is the mantra that is repeated to anyone who has ever written a line of code,
    a script, or a non-technical process. Your documentation explains how your code
    works and why it is written as it is, and it serves as a guide when changes are
    inevitably made. TSQL that may not normally warrant documentation will become
    harder to read when Dynamic SQL is applied. Consider creating additional documentation
    to supplement this added complexity.


    The first and simplest way to document your work is to include a header at the
    top of your file. This header provides basic information on who created this code,
    some revision notes, its purpose, and a quick overview of how it works. Understanding
    the reasons behind why a stored procedure was created can be as useful as knowing
    how it works. More importantly, it is possible to discern the function of code
    by reading through it and scratching one’s head a bit. It isn’t possible to figure
    out the original request that spurred the creation of that code without either
    having some existing application knowledge that others may not have or asking
    other developers for help.


    Consider the header for a simple backup script, shown in Listing [1-3](#A371168_1_En_1_Chapter.html#Par71).


    ```

    /*     9/8/2015 Edward Pollack

    Backup routing for AdventureWorks databases

    As a result of ticket T1234, logged on 8/20/2015, it became necessary

    to selectively back up a limited set of AdventureWorks databases via a

    SQL Server Agent job. The job can have its schedule adjusted as needed

    to fit the current needs of the business.

    Dynamic SQL is used to iterate through each database, performing the

    backup and naming the resulting file using the database name, date,

    time, and source server.    */

    Listing 1-3.

    Header Comments, Documenting a Hypothetical Backup Script

    ```


    This header tells the reader the following:


    - The date that this code was written, to provide context as to when it came about.

    - The author, which allows future developers to know where to go with questions.

    - Background into why this was written and the problem that was being addressed.

    - A brief description of how it works and any special features that are used.


    This short documentation block answers most of the common questions that a developer
    may have about your code. The things you might consider obvious while writing
    TSQL may not be so obvious to someone else reading this years later.


    When writing code that involves Dynamic SQL, you must consider documenting thoroughly,
    but also not go overboard and explain every single line of TSQL. Let’s take the
    backup routine from earlier and add some meaningful documentation to it.


    ```

    -- This will temporarily store the list of databases that we will back up below.

    DECLARE @database_list TABLE

    (database_name SYSNAME);

    INSERT INTO @database_list

    (database_name)

    SELECT

    name

    FROM sys.databases

    WHERE name LIKE ''AdventureWorks%'';

    -- This WHERE clause may be adjusted to back up other databases besides those
    starting with "AdventureWorks"

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name SYSNAME;

    DECLARE @date_string VARCHAR(17) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) +
    ''_'' + REPLACE(RIGHT(CONVERT(NVARCHAR, CURRENT_TIMESTAMP, 120), 8), '':'', '''');

    -- Use a cursor to iterate through databases, one by one.

    DECLARE database_cursor CURSOR FOR

    SELECT database_name FROM @database_list

    OPEN database_cursor

    FETCH NEXT FROM database_cursor INTO @database_name;

    WHILE @@FETCH_STATUS = 0 -- Continue looping until the cursor has reached the
    end of the database list.

    BEGIN

    -- Customize the backup file name to use the database name, as well as the date
    and time

    SELECT @sql_command = ''

    BACKUP DATABASE '' + @database_name + ''

    TO DISK=''''E:\SQLBackups\'' + @database_name + ''_'' + @date_string + ''.bak''''
    WITH COMPRESSION;''

    EXEC (@sql_command);

    FETCH NEXT FROM database_cursor INTO @database_name;

    END

    -- Clean up our cursor object.

    CLOSE database_cursor;

    DEALLOCATE database_cursor;

    Listing 1-4.

    Backup Script Sample, with Documentation Added

    ```


    This example shows the backup script from earlier with the addition of a timestamp
    on the file name. Documentation is added to explain each section. Note that the
    comments are short, simple, and explain the parts that I think may benefit from
    them. You don’t have to waste time with obvious comments that would take up extra
    space and distract from the task at hand. For example, I’d never include a comment
    like this, unless I was looking for some misplaced comic relief:


    ```

    -- This variable holds the database name.

    DECLARE @database_name SYSNAME;

    ```


    While amusing, my addition says nothing new. Whether it annoys or amuses, it doesn’t
    provide any useful information that wasn’t already obvious in the variable name.


    Documentation is often like choosing pizza toppings. Everyone has their own style,
    and it would be foolish to try and settle on a single style that is appropriate
    in all environments for all objects. If you are writing more complex code, especially
    if it involves Dynamic SQL, consider being as thorough as possible. Your bit of
    extra work now will save someone immense time in the future!'
