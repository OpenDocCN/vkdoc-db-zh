    GO

    •      Search with a check to avoid empty searches

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,

    @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50)
    = NULL,

    @product_weightunitmeasurecode NVARCHAR(50) = NULL,

    @show_color BIT = 0, @show_safetystocklevel BIT = 0, @show_reorderpoint BIT =
    0, @show_standard_cost BIT = 0,

    @show_catalog_description BIT = 0, @show_subcategory_modified_date BIT = 0, @show_product_model
    BIT = 0,

    @show_product_subcategory BIT = 0, @show_product_sizemeasurecode BIT = 0, @show_product_weightunitmeasurecode
    BIT = 0

    AS

    BEGIN

    SET NOCOUNT ON;

    IF COALESCE(@product_name, @product_number, @product_model, @product_subcategory,

    @product_sizemeasurecode, @product_weightunitmeasurecode) IS NULL

    RETURN;

    •     Add "%" delimiters to parameters that will be searched as wildcards.

    SET @product_name = ''%'' + @product_name + ''%'';

    SET @product_number = ''%'' + @product_number + ''%'';

    SET @product_model = ''%'' + @product_model + ''%'';

    DECLARE @sql_command NVARCHAR(MAX);

    •     Define the parameter list for filter criteria

    DECLARE @parameter_list NVARCHAR(MAX) = ''@product_name NVARCHAR(50), @product_number
    NVARCHAR(25),

    @product_model NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode
    NVARCHAR(50),

