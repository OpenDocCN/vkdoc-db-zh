    # SQL Server 安全实践：弃用功能与权限管理


    ## 弃用不安全功能与代码移除


    如果正在弃用使用动态 SQL、`xp_cmdshell` 或 SQL Server 中任何可能为数据库对象提供额外访问权限的功能，请考虑作为流程的一部分采取额外步骤来保护它们。如果应用程序不再使用该功能，请考虑移除动态
    SQL 部分，并用令牌占位符替换。这确保了任何一方，无论是组织内部还是外部，都无法以任何方式滥用它。此策略可用于任何不再使用但必须维护以确保软件构建成功完成的
    T-SQL。如果一个功能不再使用但无法被直接丢弃，请考虑将其缩减至开发流程所允许的最小范围。这不仅会降低安全风险，而且在需要移除时会使过程更容易，因为更多的功能可能已经不存在了。


    移除未使用和过时的代码可能是防止未来发生意外安全漏洞的最有效方法之一。


    移除功能时的一个常见错误是意外地让其部分仍在使用，或者某些组件仍在应用程序中运行。也许一个搜索过程在软件加载时仍然运行，即使结果未被应用程序捕获。另一种可能性是，存在一个不再被任何活动页面链接的网页，但通过手动输入
    URL 或通过收藏夹访问该页面仍可访问。在弃用过程中移除核心功能将突出显示这些被遗漏的机会，并提供简单的 QA 反馈，以便这些漏洞可以被迅速关闭。这可以简化停止使用的过程，并消除由于意外/隐藏代码路径导致的未来开发错误或安全漏洞的可能性。


    ## 登录与用户使用


    “**最小权限原则**”告诉您，只为登录名和用户完成其工作提供所需的权限，不多也不少。为了有效实施，一个隐含的步骤是不要在多个应用程序或用户之间共享登录名。每个单独的
    SQL Server 登录名，无论它使用 Windows 身份验证还是 SQL Server 身份验证，都应服务于一个独特且单一的目的。这通过以下方式大大提高了安全性：


    *   更容易禁用然后删除与旧应用程序或已离职员工相关的未使用登录名。

    *   为每个单独的应用程序提供更细粒度的权限控制。

    *   阻止不同员工，特别是来自不同部门或担任不同角色的员工，共享用户。

    *   通过保持对安全性的微妙关注，鼓励负责任的开发习惯。

    *   允许更轻松地将应用程序迁移到新的服务器或平台。

    *   提高对安全威胁、漏洞或攻击的响应速度。


    考虑这样一个场景：一个应用程序在三个数据库上拥有 `db_owner` 权限。一名新员工入职并将为您的组织维护此应用程序。她被提供了一个标准登录名、访问权限和关联账户。作为便利，该用户也被授予了应用程序所使用的登录名的凭据。这使得新员工可以立即开始她的应用程序开发工作，而无需任何额外的安全请求。一年后，应用程序扩展，需要额外的权限来访问一些系统视图和管理一些服务器设置。


    几年后，该员工离开了公司，IT 部门忘记了她拥有应用程序登录名的访问权限，因此他们未能更改密码或考虑这些事实带来的后果。该员工发现她通过应用程序登录名的访问权限仍然完好无损，并决定悄悄窃取一些组织数据。从这一点开始，该组织就被入侵了，而且极有可能直到采取某些引起他们注意的行动之前，她的访问都不会被发现。除了窃取数据，她还可以更改数据库设置、修改数据，甚至删除应用程序数据库。


    解决此问题的方法是从一开始就绝不让该员工共享登录名。创建新的登录名或修改其标准凭据以合并这些额外权限可能会花费一些额外时间。文档也将是关键，以确保任何可能需要审计、更改或禁用其访问权限的人员都可以访问该用户的额外访问权限。登录名共享的时间越长，就越容易忘记这种双重性的本质，并对其“正常工作”变得自满。


    一个同样令人沮丧的情况是，将个人的登录名用作应用程序的登录凭据。只要该员工在组织内工作，这种设置就可以正常工作，但一旦他离开，事情就变得棘手了。如果 IT
    注意到共享用户，他们将被迫快速计划一次临时权限更改。这可能涉及更改应用程序密码或创建新的应用程序用户。这两者都可能需要停机时间以促进更改。如果共享用户未被记录在案，并且在该员工离职时按照标准程序被禁用，应用程序将立即停止工作。结果将是计划外的停机时间，并且负责该应用程序的人员可能需要加班到深夜。

    '
- fmt: "# Auditing Users and Logins\n\nAn additional safeguard against any undesired\
    \ security situations is to schedule and implement regular audits of all SQL Server\
    \ logins and users. Verify that permissions are adequate and relevant given current\
    \ security policies and application needs. Ensure that all logins and users are\
    \ required and that permissions that map logins to users are needed. This process\
    \ may seem daunting, both from an organizational and technical standpoint, but\
    \ can be made easier with the right scripts and effective communication with all\
    \ stakeholders. Generally, managers and fellow employees will be happy to help\
    \ you ensure that their data is secure and that compliance with any related standards\
    \ is maintained.\n\nIn the realm of TSQL scripts, there are many possibilities\
    \ that can be useful. The chapter provides a few to get you started, but feel\
    \ free to modify these or search the web for more in-depth versions. The goal\
    \ is to identify all logins and users, customized securables, and mappings between\
    \ logins and users. To begin, let’s take a brief look at all logins and roles\
    \ on the server using the script in Listing 4-6.\n\n## Listing Server Logins and\
    \ Roles\n\n```sql\nSELECT\n    server_principals.name AS Login_Name,\n    server_principals.type_desc\
    \ AS Account_Type\nFROM sys.server_principals\nWHERE server_principals.name NOT\
    \ LIKE '%##%'\nORDER BY server_principals.name, server_principals.type_desc;\n\
    ```\n\n*Listing 4-6. Script to Retrieve a List of Server Logins and Roles*\n\n\
    This query will return results that look similar to Figure 4-8.\n\n![A371168_1_En_4_Fig8_HTML.jpg](A371168_1_En_4_Fig8_HTML.jpg)\n\
    \n*Figure 4-8. List of server logins and roles from TSQL in Listing 4-6*\n\nThe\
    \ results include all SQL logins, such as my own login, `Edward`, and my test\
    \ logins, `EdPollack` and `EdwardJr`. The Windows authentication user `SANDILE\\\
    Edward` also exists on this server. In addition are a variety of system logins\
    \ used by SQL Server services and server level roles. Type can be filtered in\
    \ order to limit the result set to non-system logins only. `U` indicates a Windows\
    \ login, `S` indicates a SQL login, and `G` indicates a Windows group. Filtering\
    \ to these types only will reduce the result set to what you are likely most interested\
    \ in auditing, as shown in Figure 4-9.\n\n![A371168_1_En_4_Fig9_HTML.jpg](A371168_1_En_4_Fig9_HTML.jpg)\n\
    \n*Figure 4-9. Login list with server roles removed*\n\nThis query can easily\
    \ be executed on all production servers and the results can be aggregated to provide\
    \ a quick peek into which logins exist on which server. This can quickly provide\
    \ insight into logins that shouldn’t exist, or that might be missing on a given\
    \ server.\n\n## Exposing Customized Securables\n\nThe next research will involve\
    \ exposing customized securables. If specific permissions were granted on an object,\
    \ you definitely want to know what they are and who they have been given to, and\
    \ verify that they are indeed necessary. This is an area that is particularly\
    \ vulnerable to carelessness or oversight, as it can be slow and cumbersome to\
    \ verify these details from the SQL Server Management Studio GUI.\n\nThe query\
    \ in Listing 4-7 returns a list of any object-level permissions that were explicitly\
    \ assigned, as shown in Figure 4-10. Any system securables were omitted to remove\
    \ a large amount of noise from the list.\n\n```sql\nSELECT\n    OBJECT_NAME(database_permissions.major_id)\
    \ AS object_name,\n    USER_NAME(database_permissions.grantee_principal_id) AS\
    \ role_name,\n    database_permissions.permission_name\nFROM sys.database_permissions\n\
    WHERE database_permissions.class = 1\n    AND OBJECTPROPERTY(database_permissions.major_id,\
    \ 'IsMSSHipped') = 0\nORDER BY OBJECT_NAME(database_permissions.major_id);\n```\n\
    \n*Listing 4-7. Script that Lists Any User-Created Securables*\n\n![A371168_1_En_4_Fig10_HTML.jpg](A371168_1_En_4_Fig10_HTML.jpg)\n\
    \n*Figure 4-10. Object-level permissions with system securables removed*\n\nOn\
    \ my local server, there are a handful of permissions granted to some stored procedures.\
    \ It may seem odd that my sysadmin user, `Edward`, is included, but in the event\
    \ that my user account ever has its permissions reduced, knowledge of any additional\
    \ securables I possess would be critical to completing that task in its entirety.\
    \ This query can be run across production servers to let you know what special\
    \ permissions were assigned over time to different users and roles. This can ensure\
    \ that any security changes that are implemented take into account any and all\
    \ exceptions that exist.\n\n## Collecting Login-to-User Mappings\n\nOne additional\
    \ task that you will often want to complete is to collect the associations between\
    \ server logins and users within each database. These relationships determine\
    \ additional permissions that a login may have within a given database. For example,\
    \ a login may have no explicit permissions assigned at the server level, but could\
    \ be given a variety of permissions at the database level that would coincide\
    \ with job or application responsibilities.\n\nThe script in Listing 4-8 collects\
    \ a list of login mappings using a SQL Server system-stored procedure, inserting\
    \ the results directly into a temp table. The results are then returned from the\
    \ temp table. The output of `sp_msloginmappings` is formatted as a single output\
    \ set per login name, and as a result would be very difficult to use in reporting\
    \ or analysis. By returning results directly into a temp table, you can get all\
    \ of the mapping data into a single result set, which you can filter, sort, or\
    \ read at your leisure. The result set on my local machine is shown in Figure\
    \ 4-11.\n\n```sql\nCREATE TABLE #login_user_mapping (\n    login_name NVARCHAR(MAX),\n\
    \    database_name NVARCHAR(MAX),\n    user_name NVARCHAR(MAX),\n    alias_name\
    \ NVARCHAR(MAX));\n\nINSERT INTO #login_user_mapping\nEXEC master.dbo.sp_msloginmappings;\n\
    \nSELECT\n    *\nFROM #login_user_mapping\nORDER BY database_name,\n    user_name;\n\
    \nDROP TABLE #login_user_mapping;\n```\n\n*Listing 4-8. TSQL to Return Relationships\
    \ Between Server Logins and Database Users*\n\n![A371168_1_En_4_Fig11_HTML.jpg](A371168_1_En_4_Fig11_HTML.jpg)\n\
    \n*Figure 4-11. Full list of all login/user mappings on this SQL Server*\n\nEach\
    \ login is associated with a database and user. If any aliases existed, they would\
    \ also be returned. This lets you keep track of which databases a given login\
    \ has permissions to. Typically, when a login is deleted, any users associated\
    \ with that login will remain in their respective databases until acted upon by\
    \ an administrator. The results returned by this query can ensure that you properly\
    \ clean up all database users when you disable or drop a server login.\n\nThere\
    \ are many other system views and stored procedures that can be used to analyze\
    \ SQL Server security, but the handful discussed in this chapter should provide\
    \ a solid starting point with which to take stock of your database environment\
    \ and identify any significant security flaws that could be easily addressed once\
    \ this information is known."
  raw: '## Auditing Users and Logins


    An additional safeguard against any undesired security situations is to schedule
    and implement regular audits of all SQL Server logins and users. Verify that permissions
    are adequate and relevant given current security policies and application needs.
    Ensure that all logins and users are required and that permissions that map logins
    to users are needed. This process may seem daunting, both from an organizational
    and technical standpoint, but can be made easier with the right scripts and effective
    communication with all stakeholders. Generally, managers and fellow employees
    will be happy to help you ensure that their data is secure and that compliance
    with any related standards is maintained.


    In the realm of TSQL scripts, there are many possibilities that can be useful.
    The chapter provides a few to get you started, but feel free to modify these or
    search the web for more in-depth versions. The goal is to identify all logins
    and users, customized securables, and mappings between logins and users. To begin,
    let’s take a brief look at all logins and roles on the server using the script
    in Listing [4-6](#A371168_1_En_4_Chapter.html#Par148).


    ```

    SELECT

    server_principals.name AS Login_Name,

    server_principals.type_desc AS Account_Type

    FROM sys.server_principals

    WHERE server_principals.name NOT LIKE ''%##%''

    ORDER BY server_principals.name, server_principals.type_desc;

    Listing 4-6.

    Script to Retrieve a List of Server Logins and Roles

    ```


    This query will return results that look similar to Figure [4-8](#A371168_1_En_4_Chapter.html#Fig8).


    ![A371168_1_En_4_Fig8_HTML.jpg](A371168_1_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    List of server logins and roles from TSQL in Listing [4-6](#A371168_1_En_4_Chapter.html#Par148)


    The results include all SQL logins, such as my own login, Edward, and my test
    logins, EdPollack and EdwardJr. The Windows authentication user `SANDILE\Edward`
    also exists on this server. In addition are a variety of system logins used by
    SQL Server services and server level roles. Type can be filtered in order to limit
    the result set to non-system logins only. `U` indicates a Windows login, `S` indicates
    a SQL login, and `G` indicates a Windows group. Filtering to these types only
    will reduce the result set to what you are likely most interested in auditing,
    as shown in Figure [4-9](#A371168_1_En_4_Chapter.html#Fig9).


    ![A371168_1_En_4_Fig9_HTML.jpg](A371168_1_En_4_Fig9_HTML.jpg)


    Figure 4-9.


    Login list with server roles removed


    This query can easily be executed on all production servers and the results can
    be aggregated to provide a quick peek into which logins exist on which server.
    This can quickly provide insight into logins that shouldn’t exist, or that might
    be missing on a given server.


    The next research will involve exposing customized securables. If specific permissions
    were granted on an object, you definitely want to know what they are and who they
    have been given to, and verify that they are indeed necessary. This is an area
    that is particularly vulnerable to carelessness or oversight, as it can be slow
    and cumbersome to verify these details from the SQL Server Management Studio GUI.


    The query in Listing [4-7](#A371168_1_En_4_Chapter.html#Par153) returns a list
    of any object-level permissions that were explicitly assigned, as shown in Figure
    [4-10](#A371168_1_En_4_Chapter.html#Fig10). Any system securables were omitted
    to remove a large amount of noise from the list.


    ![A371168_1_En_4_Fig10_HTML.jpg](A371168_1_En_4_Fig10_HTML.jpg)


    Figure 4-10.


    Object-level permissions with system securables removed


    ```

    SELECT

    OBJECT_NAME(database_permissions.major_id) AS object_name,

    USER_NAME(database_permissions.grantee_principal_id) AS role_name,

    database_permissions.permission_name

    FROM sys.database_permissions

    WHERE database_permissions.class = 1

    AND OBJECTPROPERTY(database_permissions.major_id, ''IsMSSHipped'') = 0

    ORDER BY OBJECT_NAME(database_permissions.major_id);

    Listing 4-7.

    Script that Lists Any User-Created Securables

    ```


    On my local server, there are a handful of permissions granted to some stored
    procedures. It may seem odd that my sysadmin user, Edward, is included, but in
    the event that my user account ever has its permissions reduced, knowledge of
    any additional securables I possess would be critical to completing that task
    in its entirety. This query can be run across production servers to let you know
    what special permissions were assigned over time to different users and roles.
    This can ensure that any security changes that are implemented take into account
    any and all exceptions that exist.


    One additional task that you will often want to complete is to collect the associations
    between server logins and users within each database. These relationships determine
    additional permissions that a login may have within a given database. For example,
    a login may have no explicit permissions assigned at the server level, but could
    be given a variety of permissions at the database level that would coincide with
    job or application responsibilities.


    The script in Listing [4-8](#A371168_1_En_4_Chapter.html#Par157) collects a list
    of login mappings using a SQL Server system-stored procedure, inserting the results
    directly into a temp table. The results are then returned from the temp table.
    The output of `sp_msloginmappings` is formatted as a single output set per login
    name, and as a result would be very difficult to use in reporting or analysis.
    By returning results directly into a temp table, you can get all of the mapping
    data into a single result set, which you can filter, sort, or read at your leisure.
    The result set on my local machine is shown in Figure [4-11](#A371168_1_En_4_Chapter.html#Fig11).


    ![A371168_1_En_4_Fig11_HTML.jpg](A371168_1_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Full list of all login/user mappings on this SQL Server


    ```

    CREATE TABLE #login_user_mapping (

    login_name NVARCHAR(MAX),

    database_name NVARCHAR(MAX),

    user_name NVARCHAR(MAX),

    alias_name NVARCHAR(MAX));

    INSERT INTO #login_user_mapping

    EXEC master.dbo.sp_msloginmappings;

    SELECT

    *

    FROM #login_user_mapping

    ORDER BY database_name,

    user_name;

    DROP TABLE #login_user_mapping;

    Listing 4-8.

    TSQL to Return Relationships Between Server Logins and Database Users

    ```


    Each login is associated with a database and user. If any aliases existed, they
    would also be returned. This lets you keep track of which databases a given login
    has permissions to. Typically, when a login is deleted, any users associated with
    that login will remain in their respective databases until acted upon by an administrator.
    The results returned by this query can ensure that you properly clean up all database
    users when you disable or drop a server login.


    There are many other system views and stored procedures that can be used to analyze
    SQL Server security, but the handful discussed in this chapter should provide
    a solid starting point with which to take stock of your database environment and
    identify any significant security flaws that could be easily addressed once this
    information is known.'
  trans: "\n# 审计用户与登录\n\n防范任何不期望的安全状况的一个额外保障措施，是定期安排并实施对所有 SQL Server 登录名和用户的审计。要验证权限在符合当前安全策略和应用需求方面是充分且相关的。确保所有登录名和用户都是必需的，并且将登录名映射到用户的权限也是必要的。这个过程从组织和技术层面看可能都令人望而生畏，但通过使用合适的脚本以及与所有相关方进行有效沟通，可以使其变得更容易。通常情况下，经理和同事们都会乐意帮助你确保他们的数据安全，并遵守任何相关标准。\n\
    \n在 TSQL 脚本领域，有许多可能有用的脚本。本章提供了一些作为起点，但你可以随意修改这些或在网上搜索更深入的版本。目标是识别所有登录名和用户、自定义的安全对象，以及登录名和用户之间的映射关系。首先，让我们使用清单\
    \ 4-6 中的脚本简要查看服务器上的所有登录名和角色。\n\n## 列出服务器登录名和角色\n\n```sql\nSELECT\n    server_principals.name\
    \ AS Login_Name,\n    server_principals.type_desc AS Account_Type\nFROM sys.server_principals\n\
    WHERE server_principals.name NOT LIKE '%##%'\nORDER BY server_principals.name,\
    \ server_principals.type_desc;\n```\n\n*清单 4-6. 用于检索服务器登录名和角色列表的脚本*\n\n此查询将返回类似于图\
    \ 4-8 的结果。\n\n![A371168_1_En_4_Fig8_HTML.jpg](img/A371168_1_En_4_Fig8_HTML.jpg)\n\
    \n*图 4-8. 来自清单 4-6 中 TSQL 的服务器登录名和角色列表*\n\n结果包含所有 SQL 登录名，例如我自己的登录名 `Edward`，以及我的测试登录名\
    \ `EdPollack` 和 `EdwardJr`。Windows 身份验证用户 `SANDILE\\Edward` 也在此服务器上。此外，还有 SQL\
    \ Server 服务和服务器级角色使用的各种系统登录名。可以按类型进行过滤，以将结果集限制为仅非系统登录名。`U` 表示 Windows 登录名，`S`\
    \ 表示 SQL 登录名，`G` 表示 Windows 组。仅过滤这些类型将使结果集减少到你最可能感兴趣审计的内容，如图 4-9 所示。\n\n![A371168_1_En_4_Fig9_HTML.jpg](img/A371168_1_En_4_Fig9_HTML.jpg)\n\
    \n*图 4-9. 移除服务器角色后的登录名列表*\n\n此查询可以轻松地在所有生产服务器上执行，并且可以聚合结果，以便快速查看哪些登录名存在于哪些服务器上。这可以快速洞察不应存在的登录名，或者在给定服务器上可能缺失的登录名。\n\
    \n## 暴露自定义安全对象\n\n接下来的研究将涉及暴露自定义的安全对象。如果对某个对象授予了特定权限，你肯定想知道这些权限是什么、授予了谁，并验证它们确实是必要的。这是一个特别容易因疏忽或遗漏而出错的领域，因为从\
    \ SQL Server Management Studio GUI 验证这些细节可能既缓慢又繁琐。\n\n清单 4-7 中的查询返回任何显式分配的对象级权限列表，如图\
    \ 4-10 所示。为了减少列表中的大量干扰信息，任何系统安全对象都被省略了。\n\n```sql\nSELECT\n    OBJECT_NAME(database_permissions.major_id)\
    \ AS object_name,\n    USER_NAME(database_permissions.grantee_principal_id) AS\
    \ role_name,\n    database_permissions.permission_name\nFROM sys.database_permissions\n\
    WHERE database_permissions.class = 1\n    AND OBJECTPROPERTY(database_permissions.major_id,\
    \ 'IsMSSHipped') = 0\nORDER BY OBJECT_NAME(database_permissions.major_id);\n```\n\
    \n*清单 4-7. 列出任何用户创建的安全对象的脚本*\n\n![A371168_1_En_4_Fig10_HTML.jpg](img/A371168_1_En_4_Fig10_HTML.jpg)\n\
    \n*图 4-10. 移除系统安全对象后的对象级权限*\n\n在我的本地服务器上，有一些权限授予了某些存储过程。我的 sysadmin 用户 `Edward`\
    \ 被包含在内可能看起来有些奇怪，但万一我的用户账户权限被降低，了解我拥有的任何额外安全对象对于完整地完成该任务将至关重要。此查询可以在生产服务器上运行，让你知道随着时间的推移分配给不同用户和角色的特殊权限。这可以确保实施的任何安全变更都考虑到了所有存在的例外情况。\n\
    \n## 收集登录名到用户的映射\n\n另一项你经常需要完成的任务是收集服务器登录名与每个数据库内用户之间的关联关系。这些关系决定了登录名在给定数据库内可能拥有的额外权限。例如，一个登录名在服务器级别可能没有被分配显式权限，但在数据库级别可能被授予各种与其工作或应用职责相符的权限。\n\
    \n清单 4-8 中的脚本使用 SQL Server 系统存储过程收集登录名映射列表，将结果直接插入到一个临时表中。然后从临时表中返回结果。`sp_msloginmappings`\
    \ 的输出格式为每个登录名一个输出集，因此非常难以用于报告或分析。通过将结果直接返回到临时表，你可以将所有映射数据放入单个结果集中，你可以随意对其进行筛选、排序或读取。我在本地计算机上的结果集如图\
    \ 4-11 所示。\n\n```sql\nCREATE TABLE #login_user_mapping (\n    login_name NVARCHAR(MAX),\n\
    \    database_name NVARCHAR(MAX),\n    user_name NVARCHAR(MAX),\n    alias_name\
    \ NVARCHAR(MAX));\n\nINSERT INTO #login_user_mapping\nEXEC master.dbo.sp_msloginmappings;\n\
    \nSELECT\n    *\nFROM #login_user_mapping\nORDER BY database_name,\n    user_name;\n\
    \nDROP TABLE #login_user_mapping;\n```\n\n*清单 4-8. 用于返回服务器登录名与数据库用户之间关系的 TSQL*\n\
    \n![A371168_1_En_4_Fig11_HTML.jpg](img/A371168_1_En_4_Fig11_HTML.jpg)\n\n*图 4-11.\
    \ 此 SQL Server 上所有登录名/用户映射的完整列表*\n\n每个登录名都与一个数据库和一个用户相关联。如果存在任何别名，它们也会被返回。这让你可以跟踪给定登录名有权访问哪些数据库。通常，当一个登录名被删除时，与该登录名关联的任何用户将保留在各自的数据库中，直到管理员进行处理。此查询返回的结果可以确保你在禁用或删除服务器登录名时，正确地清理所有数据库用户。\n\
    \n还有许多其他系统视图和存储过程可用于分析 SQL Server 安全性，但本章讨论的这几个应该提供了一个坚实的起点，让你能够评估数据库环境，并在了解这些信息后识别出任何可以轻松解决的重要安全缺陷。\n"
- fmt: '## Memory Consumption


    Earlier, the chapter briefly discussed the effects of string truncation on Dynamic
    SQL and how it can cause command strings to be executed incorrectly or throw errors.
    Most of the Dynamic SQL examples thus far have had relatively short command strings
    whose lengths were predetermined, based on the parameters that were passed in.
    In a scenario where the length of the command string is controlled by a specific
    number of objects or amount of data, the resulting string can potentially be very
    large. Like other scalar parameters you define in SQL server, the command string
    is stored in memory. Consider the Dynamic SQL in Listing [4-9](#A371168_1_En_4_Chapter.html#Par162).


    ```sql

    DECLARE @databases TABLE

    (database_name NVARCHAR(MAX));

    INSERT INTO @databases

    (database_name)

    SELECT

    databases.name

    FROM sys.databases;

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    SELECT @sql_command = @sql_command + ''

    DBCC CHECKDB ('' + database_name + '');''

    FROM @databases;

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    Listing 4-9. Dynamic SQL to Check Database Integrity on All Databases on this
    Instance


    This Dynamic SQL will create a command string that will run `DBCC CHECKDB` on
    all databases on this SQL Server instance. The command string will consist of
    one line per database, regardless of how many databases exist on the server. Since
    this particular command is short, the command string on my server will appear
    like this:


    ```sql

    DBCC CHECKDB (master);

    DBCC CHECKDB (tempdb);

    DBCC CHECKDB (model);

    DBCC CHECKDB (msdb);

    DBCC CHECKDB (AdventureWorks2012);

    DBCC CHECKDB (AdventureWorks2014);

    DBCC CHECKDB (AdventureWorks2008);

    ```


    While this example is short, consider what might happen if there were 500 databases
    on my server. In that scenario, the command string would be 500 lines long. This
    would still not be terribly large, but introduces a potential memory issue if
    the object count or text involved became too long. For example, what if you were
    to assemble a row count report for all tables in all databases on the server?
    In that scenario, on a server with 500 databases and 500 tables per database,
    you would have a command string that was 250,000 lines long. If the text of each
    command were similar to `SELECT COUNT(*) FROM schema_name.table_name`, each line
    of text would be about 300 bytes. The total command string size would be approximately
    75MB, which is well below the amount of memory that a server is likely to have,
    but illustrates a potential performance and security threat that unbounded statements
    can pose.


    When writing Dynamic SQL, be conscious of the length of a command string. In the
    event that it can grow unbounded, consider adding a cutoff to prevent it from
    getting excessively large. Alternatively, batch the statements so that sets of
    rows are processed, rather than all of them at one time. While it is rare that
    a command string would grow to be gigabytes in size, it is not out of the realm
    of possibilities, nor should it be ignored. Excessive growth could also occur
    due to developer error, such as if you forget to increment a counter or advance
    a cursor. If you allow the string to grow indefinitely, server memory would eventually
    run out. The result would likely be some variety of SQL Server crash that could
    influence other applications whose databases are hosted on this server.


    ```sql

    SET NOCOUNT ON;

    DECLARE @databases TABLE

    (database_name NVARCHAR(MAX));

    CREATE TABLE ##tables

    (database_name NVARCHAR(MAX),

    schema_name NVARCHAR(MAX),

    table_name NVARCHAR(MAX),

    row_count BIGINT);

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    INSERT INTO @databases

    (database_name)

    SELECT

    databases.name

    FROM sys.databases

    WHERE databases.name <> ''tempdb'';

    DECLARE @current_database NVARCHAR(MAX);

    WHILE EXISTS (SELECT * FROM @databases)

    BEGIN

    SELECT TOP 1 @current_database = database_name FROM @databases;

    SELECT @sql_command = @sql_command + ''

    USE ['' + @current_database + '']

    INSERT INTO ##tables

    (database_name, schema_name, table_name, row_count)

    SELECT

    '''''' + @current_database + '''''',

    schemas.name,

    tables.name,

    COUNT(*)

    FROM sys.tables

    INNER JOIN sys.schemas

    ON tables.schema_id = schemas.schema_id'';

    EXEC sp_executesql @sql_command;

    DELETE FROM @databases WHERE database_name = @current_database;

    END

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command + ''

    UPDATE ##tables

    SET row_count = (SELECT COUNT(*)

    FROM ['' + database_name + ''].['' + schema_name + ''].['' + table_name + ''])

    WHERE database_name = '''''' + database_name + ''''''

    AND schema_name = '''''' + schema_name + ''''''

    AND table_name = '''''' + table_name + '''''';''

    FROM ##tables;

    SELECT (LEN(@sql_command) * 2) AS length_of_large_sql_command

    EXEC sp_executesql @sql_command;

    SELECT

    *

    FROM ##tables;

    DROP TABLE ##tables;

    ```


    Listing 4-10. Dynamic SQL to Gather Row Counts of All Tables on this SQL Server
    Instance


    The TSQL in Listing [4-10](#A371168_1_En_4_Chapter.html#Par167) uses Dynamic SQL
    to construct a long command string that will gather row counts for all tables
    in all databases on the server (with the exception of `TempDB`). The more databases
    and the more tables on the server, the larger the string will be. Before executing
    the command string, you return the length in bytes, which is calculated as two
    times the number of characters in the string. The characters are multiplied by
    two in order to account for the fact that the command string is the `NVARCHAR`
    data type, which consists of double-byte UNICODE characters. On my local server
    with six databases, the length of this command string is 3.04MB. On a server with
    many more databases and tables, the length could become prohibitively long. Listing
    [4-11](#A371168_1_En_4_Chapter.html#Par169) shows an example of batching that
    limits the number of rows that are processed at one time, ensuring that the command
    string cannot grow too large. This specific example processes row counts for each
    database separately, which would generally be adequate in limiting the overall
    size of the command strings. The TSQL for this can be found in Listing [4-11](#A371168_1_En_4_Chapter.html#Par169).


    ```sql

    SET NOCOUNT ON;

    DECLARE @databases TABLE

    (database_name NVARCHAR(MAX));

    CREATE TABLE ##tables

    (database_name NVARCHAR(MAX),

    schema_name NVARCHAR(MAX),

    table_name NVARCHAR(MAX),

    row_count BIGINT);

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    INSERT INTO @databases

    (database_name)

    SELECT

    databases.name

    FROM sys.databases

    WHERE databases.name <> ''tempdb'';

    DECLARE @current_database NVARCHAR(MAX);

    WHILE EXISTS (SELECT * FROM @databases)

    BEGIN

    SELECT TOP 1 @current_database = database_name FROM @databases;

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command + ''

    USE ['' + @current_database + '']

    INSERT INTO ##tables

    (database_name, schema_name, table_name, row_count)

    SELECT

    '''''' + @current_database + '''''',

    schemas.name,

    tables.name,

    COUNT(*)

    FROM sys.tables

    INNER JOIN sys.schemas

    ON tables.schema_id = schemas.schema_id'';

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command + ''

    UPDATE ##tables

    SET row_count = (SELECT COUNT(*)

    FROM ['' + database_name + ''].['' + schema_name + ''].['' + table_name + ''])

    WHERE database_name = '''''' + database_name + ''''''

    AND schema_name = '''''' + schema_name + ''''''

    AND table_name = '''''' + table_name + '''''';''

    FROM ##tables

    WHERE database_name = @current_database;

    EXEC sp_executesql @sql_command;

    DELETE FROM @databases WHERE database_name = @current_database;

    END

    SELECT

    *

    FROM ##tables;

    DROP TABLE ##tables;

    ```


    Listing 4-11. Batched Dynamic SQL to Gather Row Counts of All Tables'
