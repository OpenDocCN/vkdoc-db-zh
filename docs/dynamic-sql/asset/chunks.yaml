  raw: '#### Statistics


    By default, statistics are created on all indexes and columns in any given table.
    Statistics provide a simple yet powerful list of values within a table. For example,
    you can view the statistics on a given index with the following statement:


    ```

    DBCC SHOW_STATISTICS (“Sales.SalesOrderheader”, IX_SalesOrderHeader_CustomerID);

    ```


    The output of this execution is comprised of three sets of data, as shown in Figure
    [6-18](#A371168_1_En_6_Chapter.html#Fig18).


    ![A371168_1_En_6_Fig18_HTML.jpg](A371168_1_En_6_Fig18_HTML.jpg)


    Figure 6-18.


    Sample output of DBCC SHOW_STATISTICS


    The first row returned is an overview of the statistics, including the name, last
    update time, total rows in the table, and sampled rows. The rows sampled will
    equal the row count for smaller tables, but in larger tables will be smaller.
    Updating statistics isn’t free, and scanning millions of rows to update may not
    be worth the effort if data is relatively uniform in nature. The steps are the
    number of ranges that the data was broken into, where 200 is the maximum SQL Server
    will use. For this example, a total of 31,465 rows were sampled (the entire table)
    and broken into 153 ranges in which values of `CustomerID` were counted.


    The second result set shows the density for each column involved in the index,
    including the clustered index column(s), which this index refers back to. Density
    is equal to 1/(# of distinct values). For the previous values:


    ```

    SELECT DISTINCT CustomerID FROM Sales.SalesOrderheader;

    ```


    This returns 19,119 distinct values for `CustomerID`. 1/19119 = 5.230399E-05,
    which is the value provided. The combination of `CustomerID` and `SalesOrderID`
    (the clustered primary key column) is as unique as the primary key in this case:


    ```

    SELECT DISTINCT CustomerID, SalesOrderID FROM Sales.SalesOrderheader;

    ```


    This query returns 31,465 values: 1/31465 = 3.178134E-05, the second value above.


    Density is an important metric for the query optimizer , as it provides quick
    insight into how unique a column is, and therefore how many potential values there
    will be on average for each individual value. To determine further details and
    to expand upon density, let’s review the last data set from above, which is the
    statistics histogram. The histogram shows ranges of values for `CustomerID` and
    the number of rows of values that fall into that range.


    For example, take a look at a single row of the histogram:


    | RANGE_HI_KEY | RANGE_ROWS | EQ_ROWS | DISTINCT_RANGE_ROWS | AVG_RANGE_ROWS |

    | --- | --- | --- | --- | --- |

    | 11331 | 84 | 27 | 30 | 2.8 |

    | 11417 | 173 | 7 | 85 | 2.035294 |

    | 11439 | 68 | 6 | 21 | 3.238095 |


    173 values are found in the range 11331 < X < 11417\. In addition to that range,
    there are seven values that are equal to the maximum value of the range (11417).
    There are 85 possible values within this range (11417 – 11331 - 1), and the average
    range rows per value is 2.035294.


    This is all well and good, but what does it mean? This data is somewhat esoteric,
    but it provides great value to the query optimizer. It can cross-check filters,
    groupings, and joins with this data very quickly and determine how to process
    a query. If a filter is very inclusive and it turns out that it will return most
    rows in a table, a table scan will likely be used. In scenarios like this, it’s
    faster to return everything than it is to selectively pick and choose a large
    volume of rows separately. If a filter is very exclusive, the optimizer will quickly
    realize that an index seek is the fastest way to return the results.


    The query optimizer is only as good as the data that is provided to it by statistics.
    If this data becomes inaccurate for any reason, the result can be suboptimal execution
    plans, poor performance, and users calling you at absurdly late hours of the night
    looking for help.


    There are three settings in SQL Server that guide how statistics are handled within
    a database. All are included in system views and can be reviewed for a given database
    like this:'
