  trans: "## 多个 PIVOT 操作符\n\n下一个示例展示了 `PIVOT` 更高级的用法。之前你只对单列（产品颜色或销售季度）使用 `PIVOT`，但实际上可以将此操作符应用于具有不同值的多个列。假设你想按颜色和安全库存级别对产品数据进行汇总分析？这可以通过单个查询完成，如代码清单\
    \ 9-14 所示。\n\n```sql\nSELECT\n    *\nFROM\n    (\n        SELECT\n           \
    \ PRODUCT.Name AS product_name,\n            PRODUCT.Color AS product_color,\n\
    \            PRODUCT.ReorderPoint,\n            PRODUCT_INVENTORY.Quantity AS\
    \ product_quantity,\n            PRODUCT.SafetyStockLevel\n        FROM Production.Product\
    \ PRODUCT\n        LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\n \
    \           ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n    ) PRODUCT_DATA\n\
    PIVOT\n    (\n        SUM(product_quantity)\n        FOR product_color IN ([Black],\
    \ [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])\n\
    \    ) PIVOT_DATA_COLOR\nPIVOT\n    (\n        COUNT(SafetyStockLevel)\n     \
    \   FOR SafetyStockLevel IN ([4], [60], [100], [500], [800], [1000])\n    ) PIVOT_DATA_LEVEL\n\
    ```\n\n代码清单 9-14. 在单条 T-SQL 语句中使用多个 PIVOT 操作符\n\n代码清单 9-14 中的查询将返回如图 9-7 所示的结果。\n\
    \n![A371168_1_En_9_Fig7_HTML.jpg](img/A371168_1_En_9_Fig7_HTML.jpg)\n\n图 9-7.\
    \ 使用两个 PIVOT 操作符进行数据聚合的查询结果\n\n结果集中添加了一组新的列，表示特定的 `SafetyStockLevel` 值与列表中提供的值匹配的次数。如果你想在单个查询中并排报告多个指标，而不是连接多个结果集，这会是一个非常方便的技巧。\n\
    \n### 结合动态 SQL 使用多个 PIVOT\n\n你可以像之前一样实现动态 SQL，以确保两个指标的所有列表值都被正确计算。这样做时，除了 `Color`\
    \ 的表变量外，你还需要为 `SafetyStockLevel` 值包含一个单独的表变量，如代码清单 9-15 所示。\n\n```sql\nDECLARE\
    \ @colors TABLE\n    (color_name VARCHAR(25));\nINSERT INTO @colors\n    (color_name)\n\
    SELECT DISTINCT\n    Product.Color\nFROM Production.Product\nWHERE Product.Color\
    \ IS NOT NULL;\n\nDECLARE @stock_levels TABLE\n    (safety_stock_level SMALLINT);\n\
    INSERT INTO @stock_levels\nSELECT DISTINCT\n    Product.SafetyStockLevel\nFROM\
    \ Production.Product;\n\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command\
    \ = '\nSELECT\n    *\nFROM\n    (\n        SELECT\n            PRODUCT.Name AS\
    \ product_name,\n            PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n\
    \            PRODUCT_INVENTORY.Quantity AS product_quantity,\n            PRODUCT.SafetyStockLevel\n\
    \        FROM Production.Product PRODUCT\n        LEFT JOIN Production.ProductInventory\
    \ PRODUCT_INVENTORY\n            ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n\
    \    ) PRODUCT_DATA\nPIVOT\n    (\n        SUM(product_quantity)\n        FOR\
    \ product_color IN (';\n\nSELECT @sql_command = @sql_command + '[' + color_name\
    \ + '], '\nFROM @colors;\n\nSELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command)\
    \ - 1);\n\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA_COLOR\nPIVOT\n\
    \    (\n        COUNT(SafetyStockLevel)\n        FOR SafetyStockLevel IN (';\n\
    \nSELECT @sql_command = @sql_command + '[' + CAST(safety_stock_level AS NVARCHAR)\
    \ + '], '\nFROM @stock_levels;\n\nSELECT @sql_command = SUBSTRING(@sql_command,\
    \ 1, LEN(@sql_command) - 1);\n\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA_LEVEL\n\
    ';\n\nPRINT @sql_command;\nEXEC sp_executesql @sql_command;\n```\n\n代码清单 9-15.\
    \ 使用动态 SQL 结合多个 PIVOT 操作符\n\n结果集与之前完全一致。你可以通过查看命令字符串文本来验证是否出错：\n\n```sql\nSELECT\n\
    \    *\nFROM\n    (\n        SELECT\n            PRODUCT.Name AS product_name,\n\
    \            PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n\
    \            PRODUCT_INVENTORY.Quantity AS product_quantity,\n            PRODUCT.SafetyStockLevel\n\
    \        FROM Production.Product PRODUCT\n        LEFT JOIN Production.ProductInventory\
    \ PRODUCT_INVENTORY\n            ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n\
    \    ) PRODUCT_DATA\nPIVOT\n    (\n        SUM(product_quantity)\n        FOR\
    \ product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],\
    \ [White], [Yellow])\n    ) PIVOT_DATA_COLOR\nPIVOT\n    (\n        COUNT(SafetyStockLevel)\n\
    \        FOR SafetyStockLevel IN ([4], [60], [100], [500], [800], [1000])\n  \
    \  ) PIVOT_DATA_LEVEL\n```\n\n将多个 `PIVOT` 操作符与动态 SQL 结合使用，在根据多列内容生成列式数据时提供了极大的灵活性。通过在单个查询中生成结果集，你能确保关系的完整性，并避免在将数据输出到中间位置时出错。其语法与单个\
    \ `PIVOT` 完全相同，并且随着你添加更多实例，复杂度并不会显著增加。"
- fmt: '# Multiple UNPIVOT Operators


    For the final example of this chapter, you’ll build on your work so far in order
    to `UNPIVOT` the result set. This will be accomplished using multiple `UNPIVOT`
    operators. Keep in mind that the result set for this operation will not be the
    same as the original input data from the start of the last example. While the
    results of the `UNPIVOT` will be meaningful, it is important to remember that
    applying `PIVOT` and `UNPIVOT` to a data set is unlikely to return equivalent
    results to that data. Granularity is often lost and cannot be reconstituted, regardless
    of how fancy you get with your TSQL skills!


    The first step is to take the data from the last example and store it in a table
    in order to reuse it in the `UNPIVOT`:


    ```

    SELECT @sql_command = ''

    SELECT

    *

    INTO dbo.Products_By_Color_and_Stock_Level

    FROM

    (      SELECT

    ```


    The table `Products_By_Color_and_Stock_Level` is created to store the pivoted
    output that you will work with for the duration of this chapter. The first attempt
    at an `UNPIVOT` is shown in Listing 9-16.


    ```

    SELECT

    *

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL

    UNPIVOT

    (product_quantity FOR Color IN

    ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])

    ) AS UNPIVOT_DATA_COLOR

    UNPIVOT

    (safety_stock_level FOR SafetyStockLevel IN

    ([4], [60], [100], [500], [800], [1000])

    ) AS UNPIVOT_DATA_STOCK_LEVEL;

    ```


    Listing 9-16. First Attempt at Using Two UNPIVOT Operators in a Single Statement


    The query in Listing 9-16 returns results, but they are a bit suspect, as shown
    in the result set in Figure 9-8.


    ![A371168_1_En_9_Fig8_HTML.jpg](A371168_1_En_9_Fig8_HTML.jpg)


    Figure 9-8. Results from an improperly constructed query with two UNPIVOT opetators


    Note that you receive six rows back for each product. Since the safety stock levels
    were defined as non-`NULL` counts, the `UNPIVOT` operation sees all as valid values
    and returns rows for each. Ideally, you want the column names pivoted into row
    values for both colors and stock levels, but with the assumption that zero values
    are omitted for all stock levels. There are a variety of ways to fix this, and
    you will do so using an additional `WHERE` clause to remove the zeroes altogether,
    as shown in Listing 9-17.


    ```

    SELECT

    product_name,

    ReorderPoint,

    product_quantity,

    Color,

    SafetyStockLevel

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL

    UNPIVOT

    (product_quantity FOR Color IN

    ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])

    ) AS UNPIVOT_DATA_COLOR

    UNPIVOT

    (safety_stock_level FOR SafetyStockLevel IN

    ([4], [60], [100], [500], [800], [1000])

    ) AS UNPIVOT_DATA_STOCK_LEVEL

    WHERE safety_stock_level <> 0;

    ```


    Listing 9-17. UNPIVOT Example with Zero Values Removed


    By filtering on `safety_stock_level <> 0`, you remove the zeroes. In addition,
    you explicitly choose the columns for the output set such that `safety_stock_level`
    is not included, as its contents are no longer important to the result set (they
    will only contain ones). The results now look cleaner and more like what you expected
    the first time, as shown in Figure 9-9.


    ![A371168_1_En_9_Fig9_HTML.jpg](A371168_1_En_9_Fig9_HTML.jpg)


    Figure 9-9. Results from the corrected UNPIVOT query in Listing 9-17


    Each column is now populated with meaningful values, with zero values and the
    extra placeholder `safety_stock_level` column removed.


    Now that you have a working query with multiple `UNPIVOT` operators, you can apply
    Dynamic SQL to it in order to return results for any values of `Color` or `SafetyStockLevel`
    found in the `Products_By_Color_and_Stock_Level` table. This fun query can be
    found in Listing 9-18.


    ```

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT

    columns.name

    FROM sys.tables

    INNER JOIN sys.columns

    ON columns.object_id = tables.object_id

    WHERE tables.name = ''Products_By_Color_and_Stock_Level''

    AND columns.name NOT IN (''product_name'', ''ReorderPoint'')

    AND ISNUMERIC(columns.name) = 0;

    DECLARE @stock_levels TABLE

    (safety_stock_level SMALLINT);

    INSERT INTO @stock_levels

    SELECT

    columns.name

    FROM sys.tables

    INNER JOIN sys.columns

    ON columns.object_id = tables.object_id

    WHERE tables.name = ''Products_By_Color_and_Stock_Level''

    AND columns.name NOT IN (''product_name'', ''ReorderPoint'')

    AND ISNUMERIC(columns.name) = 1;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    product_name,

    ReorderPoint,

    product_quantity,

    Color,

    SafetyStockLevel

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL

    UNPIVOT

    (product_quantity FOR Color IN

    ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) AS UNPIVOT_DATA_COLOR

    UNPIVOT

    (safety_stock_level FOR SafetyStockLevel IN

    (''

    SELECT @sql_command = @sql_command + ''['' + CAST(safety_stock_level AS NVARCHAR)
    + ''], ''

    FROM @stock_levels;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) AS UNPIVOT_DATA_STOCK_LEVEL

    WHERE safety_stock_level <> 0;'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    Listing 9-18. Dynamic SQL Used in Conjunction with Multiple UNPIVOT Operators


    The first challenge here is parsing the column names into each table variable
    for use later. In this case, you are fortunate in that the colors are all string
    data, whereas the stock levels are all numeric. By checking whether the column
    name is numeric, you can split the column names into two meaningful lists. In
    the event that the column names cannot easily be separated, you could separate
    the initial data into multiple holding tables, rather than putting it all into
    `Products_By_Color_and_Stock_Level`.


    In an effort to avoid adding more complexity, a likely better way to divide the
    columns would be to tag each with a meaningful name. For the example, colors could
    be prefixed with `Color:` and stock levels prefixed with `StockLevel:`. When you
    filter column names for each table variable of possible values, the prefixes could
    be easily checked instead. Since you determine the structure of those prefixes,
    you can ensure they are unique, meaningful, and allow you to maintain the data
    in a single holding table.


    The command string for such a `UNPIVOT` operation will look like this:


    ```

    SELECT

    product_name,

    ReorderPoint,

    product_quantity,

    Color,

    SafetyStockLevel

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL

    UNPIVOT

    (product_quantity FOR Color IN

    ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],

    [White], [Yellow])) AS UNPIVOT_DATA_COLOR

    UNPIVOT

    (safety_stock_level FOR SafetyStockLevel IN

    ([4], [60], [100], [500], [800], [1000])) AS UNPIVOT_DATA_STOCK_LEVEL

    WHERE safety_stock_level <> 0;

    ```


    This TSQL, with minor formatting differences, is identical to the statement that
    you tested in which Dynamic SQL was not used. The result set is also identical
    to what was returned previously. Note the row count of the generated results,
    as shown in Figure 9-10.


    ![A371168_1_En_9_Fig10_HTML.jpg](A371168_1_En_9_Fig10_HTML.jpg)


    Figure 9-10. Row count from the UNPIVOT query in Listing 9-18'
