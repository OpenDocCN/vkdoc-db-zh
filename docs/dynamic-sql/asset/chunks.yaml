    INSERT INTO #last_names

    (last_name)

    SELECT ''''Thomas'''';

    ''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

