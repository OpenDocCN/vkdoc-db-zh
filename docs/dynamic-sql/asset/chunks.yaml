  trans: '所有结果都表明，优化器选择了对 `SalesOrderHeader` 进行聚集索引扫描，对 `SalesOrderDetail` 进行聚集索引查找。查询此大型数据集需要进行
    3,926 次读取，查询指标结果如下：


    *   CPU：14 毫秒（13,726 微秒）

    *   读取次数：4062

    *   持续时间：115 毫秒（115,309 微秒）

    *   返回行数：1000


    你可以清空缓存，并为一位销售记录少得多销售人员重复此练习：


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_sales_orders_by_sales_person 285, 1000, 0;

    ```


    这次执行的结果集是 245 行，而不是 27,659 行。因此，将结果集限制为 1,000 行对 SQL Server 返回的内容没有影响。此次执行的性能指标如图
    8-11 所示。


    ![A371168_1_En_8_Fig11_HTML.jpg](img/A371168_1_En_8_Fig11_HTML.jpg)

    图 8-11. 结果集较小的参数化分页搜索的执行计划


    ```

    Table ''SalesOrderDetail''. Scan count 16, logical reads 53, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 50, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    返回这个较小子数据集只需要 103 次读取，优化器选择对 `SalesOrderHeader` 使用索引查找，对 `SalesOrderDetail` 使用聚集索引查找。尽管键查找是一项开销昂贵的随机
    I/O 操作，优化器仍然选择了它，而不是扫描整张表的替代方案。让我们回顾一下此次执行的附加查询统计数据，如图 8-12 所示。


    ![A371168_1_En_8_Fig12_HTML.jpg](img/A371168_1_En_8_Fig12_HTML.jpg)

    图 8-12. dbo.read_query_plan_cache 返回的、针对带分页且结果集较小的参数化搜索的度量指标


    ```

    EXEC dbo.read_query_plan_cache ''CTE_PRODUCTS'';

    ```


    这些数据与迄今为止审查的所有内容都一致。此次执行所需的读取次数显著减少，返回的行数也更少，并且速度比之前稍快一些。


    *   CPU：2127 微秒

    *   读取次数：103

    *   持续时间：95 毫秒（94,877 微秒）

    *   返回行数：245


    既然你已经为这个存储过程在大结果集与小结果集情况下的性能建立了基线，就可以针对与之前审查场景相反的情况来比较参数嗅探。你将最后一次清空查询计划缓存，并为那位被分配了极多订单的销售人员运行销售订单搜索：


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_sales_orders_by_sales_person 1, 1000, 0;

    ```


    快速回顾此次执行的性能指标证实，其执行方式与之前完全一样，如图 8-13 所示。


    ![A371168_1_En_8_Fig13_HTML.jpg](img/A371168_1_En_8_Fig13_HTML.jpg)

    图 8-13. 之前具有大结果集的搜索的性能表现


    ```

    Table ''SalesOrderDetail''. Scan count 1000, logical reads 3231, physical reads
    0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    I/O 统计信息和执行计划都与之前的第一次执行相符。现在，让我们针对第二个用例执行相同的存储过程，即该销售人员的销售订单要少得多（不清除计划缓存）：


    ```

    EXEC dbo.get_sales_orders_by_sales_person 285, 1000, 0;

    ```


    虽然返回的结果与你之前运行此相同查询时相同，但性能却有显著差异。图 8-14 通过 I/O 统计信息和执行计划说明了这一点。


    ![A371168_1_En_8_Fig14_HTML.jpg](img/A371168_1_En_8_Fig14_HTML.jpg)

    图 8-14. 当为大结果集生成的执行计划被重用于一个显著更小的结果集时的性能表现


    ```

    Table ''SalesOrderDetail''. Scan count 16, logical reads 74, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    由于你没有清空查询计划缓存，上面的执行计划被复用于此次存储过程执行。该执行计划与上一次执行完全相同。优化器对 `SalesOrderHeader` 使用了聚集索引扫描，即使对于本示例中展示的较小基数而言，这并非从表中检索数据的最佳方式。因此，`SalesOrderHeader`
    上的读取次数显著增加，而 `SalesOrderDetail` 上的读取次数增加了约 50%。为了证明发生了计划复用，最后一次运行 `read_query_plan_cache`
    存储过程。你可以在图 8-15 中查看结果。


    ![A371168_1_En_8_Fig15_HTML.jpg](img/A371168_1_En_8_Fig15_HTML.jpg)

    图 8-15. 当参数嗅探导致不期望的计划复用时，dbo.read_query_plan_cache 为带分页的参数化搜索返回的度量指标


    ```

    EXEC dbo.read_query_plan_cache ''CTE_PRODUCTS'';

    ```


    总结这些数据，我们可以提取最相关的细节进行审查：


    *   执行次数：2

    *   CPU：3402 微秒

    *   读取次数：777

    *   持续时间：98 毫秒（97,993 微秒）

    *   返回行数：245


    执行次数证明执行计划确实被复用了。在此场景中，复用并无益处，并导致查询消耗了显著更多的资源来执行。在一个更大、更繁忙的生产数据库上，这类参数嗅探可能会严重降低性能。


    接下来合乎逻辑的问题是，如何应对这种现象以及如何正确补偿参数嗅探。为了提供最佳答案，在深入探讨各种解决方案之前，你将先了解一些额外的注意事项。'
- fmt: '## Design Considerations


    Rule one for managing a phenomenon like parameter sniffing is to know your data!
    Since this is a SQL Server feature and not a bug, you need to carefully assess
    any scenario when it becomes problematic, before trying to implement a solution.


    Consider both of the previous examples: What was the precise cause of undesired
    plan reuse? Ultimately, it was the fact that multiple executions of the stored
    procedure resulted in wildly different cardinality estimates for the result set.
    One parameter value returned 245 rows whereas the other returned over 100 times
    as much data.


    When addressing parameter sniffing, you should ask a variety of questions in order
    to accurately gauge its severity, frequency, and effects of change:

    *   How often is the query executed?

    *   What is the most common order of magnitude for cardinality that will be returned
    by an execution? Was parameter sniffing helpful most of the time, or did it lead
    to poor execution plans more often than you would want?

    *   How will increasing data sizes over time affect these cardinality estimates?

    *   Are there other culprits involved, such as stale statistics, poorly written
    TSQL, or missing or fragmented indexes?

    *   What are the most frequent parameter values that are likely to be passed to
    the stored procedure?

    *   Do you already know the cardinality of the result set, regardless of inputs?
    For example, does a stored procedure always return one row?

    *   Can a complex query be broken up into multiple simpler queries?


    More often than not, queries that satisfy a business need will fit a regular pattern
    of use. Determining that pattern and then finding situations that fall well outside
    of the norm can help in figuring out if your TSQL is accommodating common use-cases
    or if you are inadvertently setting yourself up for poor performance by writing
    for the exceptions, rather than common occurrences.


    To properly answer these questions, let’s briefly review each one in more detail.


    ### Query Execution Details


    How often does a query execute overall and how often does it execute in such a
    way that parameter sniffing is a discernable problem? If it is run constantly,
    then you need to ensure that it is efficient, as something that executes thousands
    of times a minute cannot afford to be inefficient. You would need to determine
    the most common use-case and write TSQL to accommodate it. If there are multiple
    common scenarios that run constantly, you could consider separate stored procedures
    for each one, multiple code paths within a single proc, or other ways to make
    the most out of each situation.


    If a query executes infrequently, though, such as for a daily report or infrequent
    search, then recompiling the query plan each time would be a reasonable solution
    as it would ensure the best possible plan and not reuse an old plan. Since it
    is uncommonly run, the cost of recompilation would not be significant enough to
    cause the server any resource pressure due to the extra work the optimizer needs
    to perform each time. In these cases, you are at liberty to take a wider variety
    of actions to resolve the undesired plan reuse. Verify, though, that the query
    that is rarely executed today does not become more frequently used in the future.
    If the once-a-day query becomes popular and starts to be executed every five seconds
    throughout the day, then recompilation will become an expensive operation to perform
    so frequently.


    A query hint may be used to force a recompile every time it executes by using
    `OPTION (RECOMPILE)`. The syntax is shown in Listing 8-5.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_sales_orders_by_sales_person'')

    BEGIN

    DROP PROCEDURE dbo.get_sales_orders_by_sales_person;

    END

    GO

    CREATE PROCEDURE dbo.get_sales_orders_by_sales_person

    @SalesPersonID INT, @RowCount INT, @Offset INT

    AS

    BEGIN

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@SalesPersonID INT, @RowCount INT, @Offset
    INT'';

    SELECT @sql_command = ''

    WITH CTE_PRODUCTS AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,

    SalesOrderHeader.SalesOrderID,

    SalesOrderHeader.Status,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.LineTotal

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    WHERE SalesOrderHeader.SalesPersonID = @SalesPersonID

    )

    SELECT

    *

    FROM CTE_PRODUCTS

    WHERE rownum BETWEEN @Offset AND @Offset + @RowCount

    OPTION (RECOMPILE);'';

    EXEC sp_executesql @sql_command, @parameter_list, @SalesPersonID, @RowCount, @Offset;

    END

    ```


    Listing 8-5. Example of the RECOMPILE Query Hint


    The only difference between this stored procedure and the one you worked with
    earlier was the addition of the `RECOMPILE` hint at the end of the `SELECT` query.
    With this in place, you can run the last parameter sniffing example:


    ```sql

    DBCC FREEPROCCACHE;

    EXEC dbo.get_sales_orders_by_sales_person 1, 1000, 0;

    EXEC dbo.get_sales_orders_by_sales_person 285, 1000, 0;

    EXEC dbo.read_query_plan_cache ''CTE_PRODUCTS'';

    ```


    Last time you executed the stored procedure in this manner, the query execution
    plan was reused, resulting in poor performance. Let’s review the performance for
    the second execution in Figure 8-16, which was for the small result set:


    ![A371168_1_En_8_Fig16_HTML.jpg](A371168_1_En_8_Fig16_HTML.jpg)


    Figure 8-16. Performance when the execution plan is recompiled at runtime, preventing
    reuse of a suboptimal plan


    ```

    Table ''SalesOrderDetail''. Scan count 16, logical reads 53, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 50, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    This time around, SQL Server executed the query and recompiled the query plan
    at runtime to obtain the optimal plan for each set of parameters, rather than
    the one used for the large result set that preceded it.


    As always, query hints should be used cautiously and only when deemed necessary.
    The resources required by the optimizer to generate an execution plan are not
    trivial, and recompiling plans too frequently can result in additional CPU consumption
    and increased query latency. This tool is best used when you are certain that
    a query executes infrequently, or its cardinality is so sporadic that plan reuse
    often results in poor performance.


    An additional consideration is to determine if poor performance resulting from
    plan reuse is the rule or the exception. Adding recompilation to a query as a
    result of an occasional anomaly would not be beneficial. It may be best to tolerate
    undesired plan reuse if a query executes optimally for a majority of the time.
    Also worth investigating is if the anomaly is indicative of a bigger problem,
    such as a data validation error or illegitimate data being passed into your stored
    procedure.


    The tradeoff for recompiling an execution plan is to (hopefully) improve query
    execution performance at the cost of optimization performance. When determining
    if this tradeoff is worth it, consider the future: Will this query execute similarly
    in the future? Could the application or query source change, resulting in new,
    unexpected behavior that could turn this good decision into a bad one? In addition,
    has your research been exhaustive enough to ensure that all use-cases have been
    covered? If you can confidently answer these questions, then making the correct
    decision with regard to recompiling query execution plans should be straight-forward.'
