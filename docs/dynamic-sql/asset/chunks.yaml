  trans: '### 彻底编写文档


    这是对任何曾编写过一行代码、脚本或非技术流程的人反复强调的信条。你的文档解释了你的代码如何工作以及为何如此编写，并且在不可避免地进行修改时充当指南。通常可能不需要文档的
    TSQL，在应用了动态 SQL 后，会变得难以阅读。考虑创建额外的文档来补充这种增加的复杂性。


    文档化你工作的第一个也是最简单的方法是在文件顶部包含一个头部注释。这个头部提供了关于谁创建了此代码的基本信息、一些修订笔记、其目的以及其工作原理的快速概述。理解存储过程被创建的原因可能和了解其工作原理一样有用。更重要的是，通过通读代码并稍加思索，可能能够辨别出代码的功能。但是，若没有一些他人可能不具备的现有应用知识，或者没有向其他开发人员求助，就无法弄清激发该代码创建的原始需求。


    考虑一个简单备份脚本的头部注释，如清单 1-3 所示。


    ```

    /*     2015 年 9 月 8 日 Edward Pollack

    AdventureWorks 数据库的备份例程

    由于 2015 年 8 月 20 日记录的工单 T1234，需要通过 SQL Server 代理作业选择性地备份一组有限的 AdventureWorks 数据库。

    该作业的日程可以根据当前业务需求进行调整。

    使用了动态 SQL 来遍历每个数据库，执行备份，并使用数据库名称、日期、时间和源服务器命名结果文件。    */

    清单 1-3.

    头部注释，记录一个假设的备份脚本

    ```


    这个头部告诉读者以下信息：


    -   编写此代码的日期，以提供其产生时间的背景。

    -   作者，这使未来的开发人员知道有问题时该找谁。

    -   编写此代码的背景以及正在解决的问题。

    -   其工作方式以及所使用的任何特殊功能的简要描述。


    这个简短的文档块回答了开发人员可能对你的代码提出的大多数常见问题。你在编写 TSQL 时可能认为显而易见的事情，对于多年后阅读此代码的其他人来说，可能并非如此。


    当编写涉及动态 SQL 的代码时，你必须考虑彻底文档化，但也不要过度解释每一行 TSQL。让我们以之前的备份例程为例，并为其添加一些有意义的文档。


    ```

    -- 这将临时存储我们将在下面备份的数据库列表。

    DECLARE @database_list TABLE

    (database_name SYSNAME);

    INSERT INTO @database_list

    (database_name)

    SELECT

    name

    FROM sys.databases

    WHERE name LIKE ''AdventureWorks%'';

    -- 可以调整此 WHERE 子句以备份除以 "AdventureWorks" 开头的数据库之外的其他数据库

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name SYSNAME;

    DECLARE @date_string VARCHAR(17) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) +
    ''_'' + REPLACE(RIGHT(CONVERT(NVARCHAR, CURRENT_TIMESTAMP, 120), 8), '':'', '''');

    -- 使用游标逐一遍历数据库。

    DECLARE database_cursor CURSOR FOR

    SELECT database_name FROM @database_list

    OPEN database_cursor

    FETCH NEXT FROM database_cursor INTO @database_name;

    WHILE @@FETCH_STATUS = 0 -- 继续循环，直到游标到达数据库列表的末尾。

    BEGIN

    -- 自定义备份文件名，使用数据库名称以及日期和时间

    SELECT @sql_command = ''

    BACKUP DATABASE '' + @database_name + ''

    TO DISK=''''E:\SQLBackups\'' + @database_name + ''_'' + @date_string + ''.bak''''
    WITH COMPRESSION;''

    EXEC (@sql_command);

    FETCH NEXT FROM database_cursor INTO @database_name;

    END

    -- 清理我们的游标对象。

    CLOSE database_cursor;

    DEALLOCATE database_cursor;

    清单 1-4.

    添加了文档的备份脚本示例

    ```


    此示例展示了之前的备份脚本，并在文件名上添加了时间戳。添加了文档来解释每个部分。请注意，注释简短、明了，并且只解释我认为可能受益的部分。你不必浪费时间在那些显而易见的注释上，那只会占用额外空间并分散当前任务的注意力。例如，我绝不会包含像这样的注释，除非是寻找一些不合时宜的喜剧效果：


    ```

    -- 这个变量保存数据库名称。

    DECLARE @database_name SYSNAME;

    ```


    虽然有趣，但我的补充没有提供任何新信息。无论它惹人烦还是逗人乐，它都没有提供变量名本身未显而易见的任何有用信息。


    文档化常常像选择披萨配料。每个人都有自己的风格，试图确定一种适用于所有对象在所有环境中都合适的单一风格是愚蠢的。如果你正在编写更复杂的代码，尤其是涉及动态
    SQL 时，考虑尽可能彻底。你现在多花的一点时间，将在未来为别人节省大量时间！'
- fmt: '### Debugging Dynamic SQL


    Dynamic SQL benefits from debugging more than the standard queries that you write.
    Since SQL Server will always compile Dynamic SQL statements successfully, it’s
    important that you perform further testing on your code before executing it. Simple
    errors that would normally be obvious could easily be missed due to the lack of
    feedback in SQL Server Management Studio. In addition, your code will partially
    be obscured in a string, surrounded by apostrophes. The harder the code is to
    read, the harder it will be to debug and locate mistakes, whether they are syntax
    or logical mistakes.


    The easiest and most effective way to test and debug Dynamic SQL is to replace
    the `EXEC` with `PRINT`. When the TSQL is executed, the command string will print
    out, rather than be executed immediately. The printout can then be copied into
    another editor window and reviewed for syntax, logic, spelling, and any other
    considerations you may have. Many common Dynamic SQL typos are the result of misplaced
    quotation marks, which become quickly apparent when moved into a new window. For
    example, consider the following short command string:


    ```sql

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELLECT TOP 17 * FROM Person.Person'';

    EXEC (@CMD);

    ```


    This statement will compile successfully, but throw the following error:


    ```sql

    Msg 156, Level 15, State 1, Line 79

    Incorrect syntax near the keyword ''TOP''.

    ```


    The resulting error message is cryptic and tells you very little about what you
    did wrong. Print out the command string and paste it into an editor window, and
    the issue becomes obvious:


    ```sql

    SELLECT TOP 17 * FROM Person.Person

    ```


    `SELECT` is clearly misspelled, and in addition to being underlined in red in
    SQL Server Management Studio, it will not be highlighted in blue as a reserved
    keyword normally would be.


    For larger blocks of TSQL, there is great value in adding a debug bit into the
    code. When `@debug` is `1`, all statements will print, rather than execute. When
    `@debug` is `0`, then statements will execute. This allows you to control all
    blocks of code with a single bit that can easily be configured at the top. It
    is far easier to flip this one bit than to constantly write `PRINT` statements
    and comment out execute statements whenever debugging becomes necessary. Listing
    1-5 shows the backup script example from earlier, with a `debug` parameter added.


    ```sql

    DECLARE @debug BIT = 1;

    DECLARE @database_list TABLE

    (database_name SYSNAME);

    INSERT INTO @database_list

    (database_name)

    SELECT

    name

    FROM sys.databases

    WHERE name LIKE ''AdventureWorks%'';

    -- This WHERE clause may be adjusted to back up other databases besides those
    starting with "AdventureWorks"

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name SYSNAME;

    DECLARE @date_string VARCHAR(17) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) +
    ''_'' + REPLACE(RIGHT(CONVERT(NVARCHAR, CURRENT_TIMESTAMP, 120), 8), '':'', '''');

    -- Use a cursor to iterate through databases, one by one.

    DECLARE database_cursor CURSOR FOR

    SELECT database_name FROM @database_list

    OPEN database_cursor

    FETCH NEXT FROM database_cursor INTO @database_name;

    WHILE @@FETCH_STATUS = 0 -- Continue looping until the cursor has reached the
    end of the database list.

    BEGIN

    -- Customize the backup file name to use the database name, as well as the date
    and time

    SELECT @sql_command = ''

    BACKUP DATABASE '' + @database_name + ''

    TO DISK=''''E:\SQLBackups\'' + @database_name + ''_'' + @date_string + ''.bak''''

    WITH COMPRESSION;''

    IF @debug = 1

    PRINT @sql_command

    ELSE

    EXEC (@sql_command);

    FETCH NEXT FROM database_cursor INTO @database_name;

    END

    -- Clean up our cursor object.

    CLOSE database_cursor;

    DEALLOCATE database_cursor;

    ```


    **Listing 1-5.** Backup Script Sample, with Debug Parameter Added


    With the addition of four lines of TSQL, you have allowed execution to be controlled
    by a single bit. By copying the print output into a new window and reviewing it,
    you can quickly confirm if it compiles successfully and looks correct.


    Additionally, if the source of a problem is unclear, you can add `PRINT` statements
    into the code for some of your variables. For example, if you were unsure whether
    the `@date_string` was being populated correctly, you could print it out separately
    and verify that the value is what you expect:


    ```sql

    PRINT ''@date_string (line 20): '' + @date_string

    ```


    This is a very simple debugging action, but by including the variable name and
    line number, you make the code easier to understand. If the results were still
    perplexing, you could split up the result further, printing the date and time
    portions of the variable separately. By breaking a problem into smaller, simpler
    pieces, debugging becomes a much easier task and one that causes far less frustration
    along the way.


    When writing new Dynamic SQL, be sure to print the command string often, verifying
    that the resulting TQL is valid, both syntactically and logically.


    Lastly, for any code that will take inputs from other applications (or an end
    user), remember to test all possibilities. Ensure that either the application
    or the TSQL checks and validates inputs as needed. What happens if an input contains
    a special character? What if it has an apostrophe, underscore, or escape character?
    If humans are allowed to manually enter text, assume they will make mistakes,
    enter garbage, blanks, special characters, or in some way do the unexpected. Account
    for this and you will prevent untold numbers of potential errors and greatly improve
    the security of your application.


    ### Write Dynamic SQL Just Like Standard TSQL


    Just because your Dynamic SQL is enclosed in a string does not mean that it should
    be written any differently than your usual statements. Whatever your normal standards
    are for capitalization, indentation, and spacing should be used equally here.
    Too often is a Dynamic SQL statement written as one long line of code, with no
    spaces, newlines, capitalizations, or breaks. The result is often unintelligible,
    and far more prone to mistakes. If you were to copy the debug text from a `PRINT`
    statement into a new window, the result should look precisely like the TSQL you
    would normally write.


    ```sql

    DECLARE @CMD NVARCHAR(MAX) = ''''; -- This will hold the final SQL to execute

    DECLARE @first_name NVARCHAR(50) = ''Edward''; -- First name as entered in search
    box

    SET @CMD = ''SELECT PERSON.FirstName,PERSON.LastName,PHONE.PhoneNumber,PTYPE.Name
    FROM Person.Person PERSON INNER JOIN Person.PersonPhone PHONE ON PERSON.BusinessEntityID
    = PHONE.BusinessEntityID INNER JOIN Person.PhoneNumberType PTYPE ON PHONE.PhoneNumberTypeID
    = PTYPE.PhoneNumberTypeID WHERE PERSON.FirstName = '''''' + @first_name + '''''''';

    PRINT @CMD;

    EXEC (@CMD);

    ```


    **Listing 1-6.** Example of How to Annoy Future Developers with Poorly Formatted
    Dynamic SQL'
