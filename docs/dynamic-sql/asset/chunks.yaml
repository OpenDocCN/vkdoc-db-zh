- fmt: '## Granular Permissions vs. Role Permissions


    最常见的权限错误涉及服务器级别的 `sysadmin` 角色或数据库级别的 `db_owner` 角色。`Sysadmin` 为登录账户提供对 SQL Server
    所有功能的完全访问权限，是任何登录可用的最全面的权限。`db_owner` 用户角色则提供对单个数据库的所有维护和配置功能的访问权限，以及对该数据库内所有对象的访问权限。这两个角色通常会提供远超应用程序所需的访问权限。它们常被出于便利性而使用，但如果系统遭到入侵，可能会留下严重的安全漏洞。


    一般来说，应避免为任何应用程序登录分配 `sysadmin` 角色，尤其是当应用程序可从互联网和/或公众访问时。`db_owner` 通常被分配给访问其特定功能的数据库的应用程序，但该角色提供的权限很少是应用程序按预期工作所必需的。应用程序是否需要更改数据库配置设置、访问系统视图或拥有删除数据库的权限？很可能这些功能并不需要，在配置应用程序用户时应谨慎行事。


    虽然分配更精细的角色可能需要更多时间、精力和规划，但这样做可以确保你不会留下一个恶意行为可能针对数据库服务器的漏洞。如果一个应用程序只需要对一组20个表的读写权限，那么考虑分配
    `db_datareader` 和 `db_datawriter`，而不是 `db_owner`。如果数据库包含其他敏感数据，考虑仅将权限授予那20个表，而不是其他表。尽管人们倾向于信任他们使用的应用程序，但无论开源还是专有软件，每天都可能发现漏洞。如果任何漏洞可能被你所依赖的应用程序利用，那么确保它对数据库服务器的访问权限最小化，将大大减少攻击造成的损害，并确保数据尽可能安全。


    要审查此领域所有服务器和数据库角色，将会是一个冗长且有些偏离主题的题外话。微软为所有内置角色提供了详尽的文档，如果这些角色不够用，还提供了如何创建自定义角色的文档。以下
    MSDN 链接提供了关于服务器和数据库角色的当前文档，以及许多有用的相关主题的链接：


    *   服务器角色：[`https://msdn.microsoft.com/en-us/library/ms188659.aspx`](https://msdn.microsoft.com/en-us/library/ms188659.aspx)

    *   数据库角色：[`https://msdn.microsoft.com/en-us/library/ms189121.aspx`](https://msdn.microsoft.com/en-us/library/ms189121.aspx)


    ## Dynamic SQL and Ownership Chaining


    编写、测试和执行动态 SQL 时，其权限的运行方式与你通常体验到的不同。任何使用 `EXEC` 或 `EXECUTE` 执行的字符串都将在其自身的作用域下运行，尽管安全上下文不会改变。这起初可能会令人困惑，并可能导致运行动态
    SQL 时出现安全错误。清单 4-1 展示了一个说明此行为的示例。


    ```sql

    CREATE PROCEDURE dbo.ownership_chaining_example

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Select the current security context for reference

    SELECT SUSER_SNAME();

    SELECT COUNT(*) FROM Person.Person;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT SUSER_SNAME();

    SELECT COUNT(*) FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    END

    GO

    ```

    **清单 4-1.** 用于演示所有权链的简单存储过程


    当你执行此存储过程时，结果正是你所期望的：返回当前安全上下文的用户（我），然后使用标准 TSQL 返回 `Person.Person` 表中的行数。此后，使用动态
    SQL 执行相同的操作。结果如图 4-1 所示。


    ![A371168_1_En_4_Fig1_HTML.jpg](A371168_1_En_4_Fig1_HTML.jpg)


    **图 4-1.** 内联 TSQL 与动态 SQL 中的所有权链


    用户 Edward 是一个 `sysadmin`，这为他提供了对这台 SQL Server 上所有内容的完全访问权限。到目前为止的结果并不令人惊讶。安全上下文和来自
    `Person.Person` 的计数都被返回了，无论是在动态 SQL 部分之外还是之内。如果由一个不同用户执行该存储过程，一个权限比该用户少得多的用户，会发生什么？为了说明这一点，我们将创建一个名为
    `VeryLimitedUser` 的用户，默认情况下没有任何权限。


    ```sql

    CREATE USER VeryLimitedUser WITHOUT LOGIN;

    GO

    CREATE ROLE VeryLimitedRole;

    GO

    EXEC sys.sp_addrolemember ''VeryLimitedRole'', ''VeryLimitedUser'';

    GO

    ```


    接下来，我们将仅授予该用户对上述存储过程的执行权限：


    ```sql

    GRANT EXECUTE ON dbo.ownership_chaining_example TO VeryLimitedRole;

    GO

    ```


    权限分配完毕后，我们将临时切换安全上下文，并使用这个新用户执行存储过程：


    ```sql

    EXECUTE AS USER = ''VeryLimitedUser'';

    GO

    EXEC dbo.ownership_chaining_example;

    GO

    REVERT;

    GO

    ```


    执行的结果与之前的不相同。如图 4-2 所示，它们需要一些额外的解释才能理解。


    ![A371168_1_En_4_Fig2_HTML.jpg](A371168_1_En_4_Fig2_HTML.jpg)


    **图 4-2.** 因缺乏所有权链而导致权限错误之前的结果


    当尝试使用动态命令从 `Person.Person` 中选择计数时，SQL Server 返回了一个错误：


    ```sql

    Msg 229, Level 14, State 5, Line 40

    The SELECT permission was denied on the object ''Person'', database ''AdventureWorks2014'',
    schema ''Person''.

    ```


    通常，当用户对存储过程拥有 `execute` 权限时，存储过程中包含的任何 TSQL 都会正常运行，无论用户是否对其他对象拥有权限。在前面的例子中，`VeryLimitedUser`
    没有对 `Person.Person` 的读取权限。尽管有此限制，但被授予对存储过程的执行权限使其能够访问该表。但对于动态 SQL 语句内的 `SELECT`
    操作，情况并非如此。这里发生了什么！？'
  raw: '## Granular Permissions vs. Role Permissions


    The most common permissions mistakes involve the server-level role of sysadmin
    or the database-level role of `db_owner`. Sysadmin provides a login with complete
    access to all SQL Server functions and is the most all-encompassing permission
    available to any login. The `db_owner` user role provides access to all maintenance
    and configuration functionality for a single database, as well as access to all
    objects within it. Both of these roles will generally provide far more access
    than is required by an application. They often are used for convenience, but can
    leave gaping security holes if a system were ever compromised.


    In general, avoid giving any application login the sysadmin role, especially when
    an application is accessible to the Internet and/or the general public. `Db_owner`
    is often given to an application that accesses a database unique to its function,
    but rarely are the permissions provided by that role necessary for the application
    to work as intended. Does the application need to alter database configuration
    settings, access system views, or have the ability to drop the database? Odds
    are good that those functions are not needed, and discretion should be taken when
    configuring the application user.


    While assigning more granular roles may take more time, effort, and planning,
    doing so ensures that you don’t leave a gaping hole where malicious actions could
    be taken against the database server. If an application only requires read and
    write access to a set of 20 tables, then consider assigning `db_reader` and `db_writer`,
    instead of `db_owner`. If the database contains other sensitive data, consider
    assigning permissions exclusively to those 20 tables, and no others. While people
    tend to trust the applications they use, vulnerabilities are found every day in
    software, regardless of whether it is open source or proprietary. If any vulnerability
    could be exploited in an application you rely on, then ensuring it has minimal
    access to the database server will greatly reduce the damage caused by an attack
    and ensure the data is as safe as possible.


    To review all server and database roles in this space would be a lengthy and somewhat
    off-topic digression. Microsoft provides extensive documentation on all built-in
    roles, as well as how to create your own, if they are inadequate. The following
    MSDN links provide the current documentation on server and database roles, as
    well as links to many useful, related topics:


    *   Server roles: [`https://msdn.microsoft.com/en-us/library/ms188659.aspx`](https://msdn.microsoft.com/en-us/library/ms188659.aspx)

    *   Database roles: [`https://msdn.microsoft.com/en-us/library/ms189121.aspx`](https://msdn.microsoft.com/en-us/library/ms189121.aspx)


    ## Dynamic SQL and Ownership Chaining


    When writing, testing, and executing Dynamic SQL, permissions run differently
    than what you may typically experience. Any string that is executed with `EXEC`
    or `EXECUTE` will be run under its own scope, although security context will not
    be changed. This can be confusing at first and can lead to security errors while
    running Dynamic SQL. Listing [4-1](#A371168_1_En_4_Chapter.html#Par25) shows an
    example that illustrates this behavior.


    ```

    CREATE PROCEDURE dbo.ownership_chaining_example

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Select the current security context for reference

    SELECT SUSER_SNAME();

    SELECT COUNT(*) FROM Person.Person;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT SUSER_SNAME();

    SELECT COUNT(*) FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    END

    GO

    Listing 4-1.

    Simple Stored Procedure to Demonstrate Ownership Chaining

    ```


    When you execute this stored procedure, the results are exactly what you expect:
    The user (me) for the current security context is returned and then the count
    of rows in `Person.Person` is returned using standard TSQL. After this, the same
    operations are performed using Dynamic SQL. The results appear in Figure [4-1](#A371168_1_En_4_Chapter.html#Fig1).


    ![A371168_1_En_4_Fig1_HTML.jpg](A371168_1_En_4_Fig1_HTML.jpg)


    Figure 4-1.


    Ownership chaining in inline TSQL vs. Dynamic SQL


    The user Edward is a sysadmin, which provides him with complete access to everything
    on this SQL Server. The results so far are not surprising. The security context
    and count from `Person.Person` are returned, both outside and inside the Dynamic
    SQL sections. What happens if a different user executes the stored procedure,
    one with significantly fewer permissions than this user possesses? To illustrate
    this, we will create a user called `VeryLimitedUser` with no permissions by default.


    ```

    CREATE USER VeryLimitedUser WITHOUT LOGIN;

    GO

    CREATE ROLE VeryLimitedRole;

    GO

    EXEC sys.sp_addrolemember ''VeryLimitedRole'', ''VeryLimitedUser'';

    GO

    ```


    Next, we’ll assign that user to execute permissions only on the stored procedure
    from above:


    ```

    GRANT EXECUTE ON dbo.ownership_chaining_example TO VeryLimitedRole;

    GO

    ```


    With permissions assigned, we’ll switch security contexts temporarily and execute
    the stored procedure using this new user:


    ```

    EXECUTE AS USER = ''VeryLimitedUser'';

    GO

    EXEC dbo.ownership_chaining_example;

    GO

    REVERT;

    GO

    ```


    The results from the execution are not the same as the previous ones. As shown
    in Figure [4-2](#A371168_1_En_4_Chapter.html#Fig2), they require some additional
    explanation to make sense of them.


    ![A371168_1_En_4_Fig2_HTML.jpg](A371168_1_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    Results prior to a permissions error resulting from a lack of ownership chaining


    Upon trying to select the count from `Person.Person` with the `dynamic` command,
    an error is returned by SQL Server:


    ```

    Msg 229, Level 14, State 5, Line 40

    The SELECT permission was denied on the object ''Person'', database ''AdventureWorks2014'',
    schema ''Person''.

    ```


    Typically, when a user has `execute` permissions on a stored procedure, then any
    TSQL contained within the stored procedure will be run normally, regardless of
    what other objects the user has (or doesn’t have) permissions to. In the previous
    example, `VeryLimitedUser` does not have read access to `Person.Person`. Despite
    this limitation, being granted execute permissions on the stored procedure allowed
    it to access the table. This was not the case for the select within the Dynamic
    SQL statement. What happened here!?'
