    临时表怎么样？让我们重试初始示例，使用临时表代替表变量，如代码清单 5-7 所示。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    CREATE TABLE #last_names (

    last_name NVARCHAR(50));

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM #last_names)''

    EXEC sp_executesql @sql_command;

    DROP TABLE #last_names

    ```


    **代码清单 5-7. 在外部声明的动态 SQL 中使用临时表的结果**


    结果不是错误消息，而是一个结果集（虽然是空的）。如果你在动态 SQL 中修改临时表会怎样？代码清单 5-8 显示了生成的 T-SQL。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    CREATE TABLE #last_names (

    last_name NVARCHAR(50));

    INSERT INTO #last_names

    (last_name)

    SELECT ''Thomas''

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM #last_names);

    INSERT INTO #last_names

    (last_name)

    SELECT ''''Smith'''';

    ''

    EXEC sp_executesql @sql_command;

    SELECT * FROM #last_names;

    DROP TABLE #last_names;

    ```


    **代码清单 5-8. 在动态 SQL 中修改临时表的结果**


    结果表明临时表不仅可以在动态 SQL 中访问，而且成功写入了，如图 5-4 所示。


    ![A371168_1_En_5_Fig4_HTML.jpg](img/A371168_1_En_5_Fig4_HTML.jpg)


    **图 5-4. 在外部创建的临时表也可以在动态 SQL 内部访问**


    第一个结果集显示临时表在动态 SQL 中是可访问的。第二个结果集显示它可以在动态 SQL 内部被修改，并且这些结果在示例的后面部分被保留了下来。这非常有用，并提供了一种简单的方法来管理需要在动态
    SQL 和其他 T-SQL 之间无缝传递的数据。既然你正在兴头上，如果你在动态 SQL 内部声明一个临时表并尝试在后面的代码中访问它，会发生什么？代码清单
    5-9 显示了实现这一点的 T-SQL。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @sql_command = ''

    CREATE TABLE #last_names (

    last_name NVARCHAR(50));

    INSERT INTO #last_names

    (last_name)

    SELECT ''''Thomas'''';

    ''

    EXEC sp_executesql @sql_command;

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM #last_names);

    ```


    **代码清单 5-9. 在动态 SQL 中创建临时表并稍后访问的结果**


    你的运气用完了；此示例导致错误：


    ```

    Msg 208, Level 16, State 0, Line 316

    Invalid object name ''#last_names''.

    ```


    虽然在调用 T-SQL 中声明的临时表可以在动态 SQL 中访问，但反之则不成立。表 `#last_names` 仅存在于动态 SQL 的作用域内，在其他地方将不可用。类似地，在后面的代码中另一个动态
    SQL 块中引用该临时表也会导致相同的错误。换句话说，以下示例也会因相同的错误消息而失败，如代码清单 5-10 所示。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @sql_command = ''

    CREATE TABLE #last_names (

    last_name NVARCHAR(50));

    INSERT INTO #last_names

    (last_name)

    SELECT ''''Thomas'''';

    ''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM #last_names);''

    EXEC sp_executesql @sql_command;

    ```


    **代码清单 5-10. 在后续动态 SQL 中重用临时表同样无效**


    在创建和访问临时表时要小心，以确保它们在需要时可用，而在代码后面需要时不会超出作用域。还要记住，这些临时表仅在你当前的 SQL Server 连接中可用。如果你尝试从此连接从单独的应用程序或连接访问临时表，它也将不可用。


    最后，当连接结束时，临时表会自动删除。良好的做法是在你使用完临时表后删除它们，但如果你不这样做，SQL Server 会为你删除它们。此自动删除仅发生在创建临时表的连接结束时。如果该连接无限期保持，那么临时表也将无限期保留。如果在同一会话中稍后声明了同名的表，则将导致错误，因为该表已存在。

    '
- fmt: '# 全局临时表


    ## 概念


    一个最终可用的选项是全局临时表。这些表的声明方式与标准临时表类似，但使用 `##` 前缀而不是 `#`。全局临时表在服务器范围内对任何访问其创建所在的同一
    SQL Server 实例的 T-SQL 都可用。此访问不受连接或数据库访问限制。


    一旦创建，全局临时表将一直存在，直到所有与之的连接结束。该表可以在动态 SQL 或调用 T-SQL 的作用域内创建，并且仍然可在服务器上的任何其他作用域中使用。


    ## 使用示例


    考虑清单 [5-11](#A371168_1_En_5_Chapter.html#Par65) 中的示例，与前一个类似。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @sql_command = ''

    CREATE TABLE ##last_names (

    last_name NVARCHAR(50));

    INSERT INTO ##last_names

    (last_name)

    SELECT ''''Thomas'''';''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM ##last_names);''

    EXEC sp_executesql @sql_command;

    SELECT * FROM ##last_names;

    -- Listing 5-11.

    -- Example of Global Temporary Table Usage

    ```


    此 T-SQL 在动态 SQL 中声明了一个全局临时表。然后它使用该全局临时表从 `Person.Person` 中选择一些名字，之后再次在调用的 T-SQL
    中访问它。一切都按预期工作（有时确实如此）！请注意，在示例结束时，全局临时表没有被删除。因此，它将保持可用，直到使用它的所有连接都结束或者您显式删除它。如果您想再次访问它或从其他位置访问它，这可能是有益的。但如果您忘记了它，并在未来尝试声明同名的临时表，这也可能带来问题：


    ```sql

    CREATE TABLE ##last_names (

    last_name NVARCHAR(50));

    ```


    当您运行此表创建语句时，会生成错误：


    ```

    Msg 2714, Level 16, State 6, Line 351

    There is already an object named ''##last_names'' in the database.

    ```


    在创建或使用全局临时表的任何代码中，管理它们至关重要。忘记删除临时表可能碰巧没问题，如果您恰好结束了连接，它会被 SQL Server 自动删除。但如果另一个连接正在使用该表，它将不会被
    SQL Server 删除，因为它仍处于使用状态。处理临时表的最佳实践是在不再需要时删除它们。这消除了表持续存在并在之后被无意访问，或者在已存在时尝试创建的可能性。


    务必在不再需要时删除临时表。这确保它不会干扰未来的表创建，也不会在不再需要时被以某种方式访问。


    ## 服务器范围内的可用性


    既然有 `##last_names` 表可用，让我们看看全局临时表的另一个特性——它们在服务器任何位置的可用性：


    ```sql

    CREATE DATABASE temp_table_test;

    GO

    USE temp_table_test;

    GO

    SELECT

    *

    FROM ##last_names;

    ```


    即使在这个全新的数据库中，全局临时表仍然可用。由于您尚未删除此 SQL Server 连接，它将无限期地对服务器上的任何其他连接保持可用。这引出了关于全局临时表安全性的讨论，而它们恰好没有任何安全性。一旦创建，全局临时表对任何数据库中的任何登录名或用户在任何地方都是可用的，没有限制。


    ## 安全问题


    在上一章中，您创建了一个名为 `VeryLimitedUser` 的用户，该用户只能访问一个存储过程，而没有对任何其他数据库、表或 SQL Server 功能的显式访问权限。当此用户尝试访问全局临时表时会发生什么？


    ```sql

    EXECUTE AS USER = ''VeryLimitedUser'';

    GO

    SELECT

    *

    FROM ##last_names;

    REVERT;

    GO

    DROP TABLE ##last_names;

    GO

    ```


    尽管在服务器上几乎没有权限，但此用户可以毫无问题地从全局临时表中选择数据。这引发了全局临时表的一个潜在安全问题，因为根据设计，它们可被服务器上的任何其他人访问，无论其具体权限如何。此外，无法在全局临时表上设置权限来限制此行为。请注意您创建的任何全局临时表。请确保，如果另一个用户能够访问它，此访问不会带来问题。如果您的全局临时表包含任何敏感数据，请考虑以其他格式存储它，例如表变量、标准临时表或用于暂存或临时数据的永久表。对数据进行哈希处理或加密也是限制其访问的好方法，因为它将降低其他连接的可用性。


    ## 命名冲突


    另一个可能发生的问题是，当来自两个不同连接的两个全局临时表具有相同的名称时。由于这些表是全局的，并且在 SQL Server 实例的整个范围内有效，因此不能有两个这样的表共享相同的名称。如果发生这种情况，将抛出错误，第二个尝试声明新表的人将无法继续，除非重命名它。'
  raw: '### Global Temporary Tables


    One final option that is available is the global temporary table . These tables
    are declared just like standard temp tables, but with the `##` prefix instead
    of `#`. Global temp tables are available server-wide for any TSQL accessing the
    same SQL Server instance they are created on. This access is not restricted based
    on connection or by database access.


    Once created, a global temp table will persist until all connections to it end.
    The table may be created within the scope of Dynamic SQL or the calling TSQL,
    and will still be available within any other scope on the server.


    Consider the example in Listing [5-11](#A371168_1_En_5_Chapter.html#Par65), similar
    to the previous one.


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @sql_command = ''

    CREATE TABLE ##last_names (

    last_name NVARCHAR(50));

    INSERT INTO ##last_names

    (last_name)

    SELECT ''''Thomas'''';''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM ##last_names);''

    EXEC sp_executesql @sql_command;

    SELECT * FROM ##last_names;

    Listing 5-11.

    Example of Global Temporary Table Usage

    ```


    This TSQL declares a global temp table within Dynamic SQL. It then selects some
    first names from `Person.Person` using the global temp table, and later accesses
    it again in the calling TSQL. Everything works exactly as intended (this does
    happen sometimes)! Note that at the end of the example, the global temp table
    is not dropped. As a result, it will remain available until either all connections
    using it are ended or you explicitly drop it. This can be beneficial if you want
    to access it again or from another location. It can also be problematic if you
    forget about it and try to declare a temp table with the same name in the future:


    ```

    CREATE TABLE ##last_names (

    last_name NVARCHAR(50));

    ```


    When you run this table creation, an error is generated:


    ```

    Msg 2714, Level 16, State 6, Line 351

    There is already an object named ''##last_names'' in the database.

    ```


    It is critically important to manage global temp tables in any code that creates
    or uses them. Forgetting to drop a temp table may turn out okay if you happen
    to end the connection and it is automatically removed by SQL Server. In the event
    that another connection is made to the table, it will not be dropped by SQL Server
    as it will still be in use. The best practice for dealing with temporary tables
    is to drop them when they are no longer needed. This removes any possibility of
    the table persisting and being accessed inadvertently later on or of being created
    when it already exists.


    Always drop a temporary table when it is no longer needed. This ensures that it
    does not interfere with future table creation and is not somehow accessed when
    it’s no longer needed.


    Since there are the table `##last_names` available, take a look at another feature
    of global temporary tables—their availability anywhere on the server:


    ```

    CREATE DATABASE temp_table_test;

    GO

    USE temp_table_test;

    GO

    SELECT

    *

    FROM ##last_names;

    ```


    Even in this brand new database, the global temp table was still available. Since
    you’ve yet to drop this SQL Server connection, it will remain available indefinitely
    to any other connection on the server. This leads into a discussion of global
    temp table security, for which there happens to be none. Once created, a global
    temporary table is available everywhere to any login or user in any database,
    without restrictions.


    In the last chapter, you created a user called `VeryLimitedUser` that only had
    access to a single stored procedure and no explicit access to any other database,
    tables, or SQL Server functionality. What happens when this user tries to access
    the global temp table?


    ```

    EXECUTE AS USER = ''VeryLimitedUser'';

    GO

    SELECT

    *

    FROM ##last_names;

    REVERT;

    GO

    DROP TABLE ##last_names;

    GO

    ```


    Despite having nearly no permissions on the server, this user can select data
    from the global temp table without issue. This raises a potential security concern
    with global temporary tables because they are, by design, accessible by anyone
    else on the server, regardless of their specific permissions. In addition, it
    is not possible to place permissions on a global temp table to restrict this behavior.
    Be mindful of any global temp tables that you create. Be sure that, if another
    user were to somehow access it, this access would not be problematic. If your
    global temp table contains any sensitive data, consider storing it in another
    format such as a table variable, a standard temporary table, or a permanent table
    that is used for staging or temporary data. Hashing or encrypting the data can
    also be a good way to limit its access, because it will reduce usability from
    other connections.


    Another issue that can occur is when two global temp tables are created from two
    different connections that have the same name. Since these tables are global and
    in scope for the entire SQL Server instance, no two such tables may share the
    same name. If this occurs, an error will be thrown and the second person to attempt
    to declare the new table will be unable to continue without renaming it.'
