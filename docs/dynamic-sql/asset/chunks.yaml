    # 5. 管理作用域


    ## 结论


    所有这些安全建议可能看起来与动态 SQL 的主题相去甚远，但对于确保您所进行的开发既有效又安全至关重要。采纳并实施这些建议中的任何一条或全部最佳实践，可以大大降低
    SQL 注入的风险，以及其他可能无意中在您的系统中制造漏洞的攻击方式。如果您对此主题感兴趣，市面上有许多书籍和课程会更深入地探讨安全问题。本章旨在提供 SQL
    Server 安全性的入门介绍和概述，重点关注动态 SQL 及其面临的最重大安全威胁。


    当您继续探索动态 SQL 如何执行强大的搜索、维护或数据转换的进一步示例时，请牢记与安全相关的考虑因素可能对不仅您的查询，而且对您的整个 SQL Server
    的完整性产生持久影响。现在就做出正确的决定，远比日后回来清理先前开发工作留下的错误要容易得多。


    ## 清单 4-11.


    ```sql

    FROM sys.tables

    INNER JOIN sys.schemas

    ON tables.schema_id = schemas.schema_id'';

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command + ''

    UPDATE ##tables

    SET row_count = (SELECT COUNT(*)

    FROM ['' + database_name + ''].['' + schema_name + ''].['' + table_name + ''])

    WHERE database_name = '''''' + database_name + ''''''

    AND schema_name = '''''' + schema_name + ''''''

    AND table_name = '''''' + table_name + '''''';''

    FROM ##tables

    WHERE database_name = @current_database;

    SELECT (LEN(@sql_command) * 16) + 2 AS length_of_large_sql_command

    EXEC sp_executesql @sql_command;

    DELETE FROM @databases WHERE database_name = @current_database;

    END

    SELECT

    *

    FROM ##tables;

    DROP TABLE ##tables;

    ```


    使用批处理命令字符串创建的动态 SQL，用于收集此 SQL Server 实例上所有表的行数


    行数 T-SQL 重写版本中唯一的区别是，行数的收集发生在主循环中，在每个数据库的表被枚举之后。这将命令字符串的生成拆分为每个数据库一个。它没有创建一个 3MB
    的命令字符串，而是创建并执行了六个不同的命令字符串，每个都不超过 475KB。在由于要分析的对象数量庞大而导致命令字符串长度可能变得非常长的场景中，批处理可以确保内存压力永远不会成为安全或稳定性问题，即使在处理极大数据集时也是如此。


    ## 什么是作用域？


    为了尽可能容易地理解作用域，您需要理解这些术语，并将看几个为什么这是一个重要主题的例子。作用域可以定义为变量或对象在任何 SQL Server 对象内可用的位置和持续时间。考虑以下简单的
    T-SQL 语句：


    ```sql

    DECLARE @FirstName NVARCHAR(50) = ''Edward'';

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @FirstName;

    ```


    这是 T-SQL 最简单的形式之一，但上面定义的变量的作用域是什么？在这些语句中没有任何中断或控制流变更的情况下，`@FirstName` 在整个示例中都处于作用域内，并且可以（如您所期望的那样）被紧随其后的
    `SELECT` 语句使用。如果您在返回结果之前结束批处理会怎样？


    ```sql

    DECLARE @FirstName NVARCHAR(50) = ''Edward'';

    GO

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @FirstName;

    ```


    这个简单的更改，在 `SELECT` 之前添加一个 `GO`，将导致错误：


    ```

    Msg 137, Level 15, State 2, Line 20

    必须声明标量变量 "@FirstName"。

    ```


    当批处理结束时，所有局部定义的变量将不再可用，并且对于此 T-SQL 的剩余部分超出作用域。根据定义，`GO` 在任何时候使用都会结束一个批处理并触发此行为。任何封装在其自身对象中的
    T-SQL——例如触发器、函数或存储过程——也将在其自身的作用域内执行。任何从外部访问这些对象内定义变量的尝试都会导致类似于以下错误的错误：


    ```sql

    CREATE PROCEDURE dbo.get_people

    AS

    BEGIN

    DECLARE @FirstName NVARCHAR(50) = ''Edward'';

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @FirstName;

    END

    GO

    EXEC dbo.get_people;

    SELECT @FirstName;

    ```


    这个存储过程将执行与前一个相同的搜索。如所示执行它会得到完全相同的结果，但如果您尝试返回 `@FirstName` 的值，则会返回相同的错误。默认情况下，在存储过程中声明的变量从其外部的任何地方都不可用。同样的约定也适用于动态
    SQL。因此，在确定变量的声明、修改和返回位置时，理解这一点非常重要。


    可以向存储过程添加参数，以便于数据的进出自如，使其值能够保持作用域并在您工作的其他地方使用。清单 5-1 中的示例展示了变量如何传递到存储过程，以及值如何被显式返回。


    ## 清单 5-1.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_people'')

    BEGIN

    DROP PROCEDURE dbo.get_people;

    END

    GO

    CREATE PROCEDURE dbo.get_people

    @first_name NVARCHAR(50), @person_with_most_entries NVARCHAR(50) OUTPUT

    AS

    BEGIN

    DECLARE @person_count INT;

    SELECT TOP 1

    @person_with_most_entries = Person.FirstName

    FROM Person.Person

    GROUP BY Person.FirstName

    ORDER BY COUNT(*) DESC;

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name;

    RETURN @@ROWCOUNT;

    END

    GO

    ```


    说明输入和输出参数的存储过程


    此示例传入一个名字用于搜索。您还传入一个额外的字符串，该字符串将被 `Person.Person` 中最常见的名字覆盖。在存储过程中，将返回 `Person.Person`
    中具有传入名字的所有行。最后，具有该名字的行数将用作存储过程的返回值。一个执行示例如下所示：


    ```sql

    DECLARE @person_with_most_entries NVARCHAR(50);

    DECLARE @person_count INT;

    EXEC @person_count = dbo.get_people ''Edward'', @person_with_most_entries OUTPUT;

    SELECT @person_with_most_entries AS person_with_most_entries;

    SELECT @person_count AS person_count

    ```

