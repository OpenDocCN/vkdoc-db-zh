  trans: '

    在这些示例中，你正在从当前日期/时间字符串中剥离各种字符。单个 `REPLACE` 函数可用于移除特定字符，或者可以使用多个该函数来移除额外的字符。第一个示例将所有空格替换为空字符串，从而将其从字符串中移除。第二个查询还移除了冒号，最后一个则从时间戳中额外移除了
    `AM` 或 `PM`。这是在清洗用于文件名、标签或目录数据标准名称的字符串时常用的策略。查询结果如下：


    ```

    Sep1320152:40PM

    Sep132015240PM

    Sep132015240

    ```


    `SUBSTRING` 根据起始点和要返回的字符数，返回字符串的一个片段。它也可用于从字符串中移除字符、提取特定部分，或返回字符串的开头或结尾部分。


    ```

    DECLARE @string NVARCHAR(MAX) = CAST(CURRENT_TIMESTAMP AS NVARCHAR);

    SELECT SUBSTRING(@string, 1, 3);

    ```


    此示例从字符串中返回三位字母的月份：


    ```

    Sep

    ```


    `REPLICATE` 将一个字符串重复指定的次数。这可以是生成大量测试文本的快捷方式，或者在数据部分预期会经常重复时创建数据。


    ```

    SELECT ''Look, a robot'' + REPLICATE(''!'', 50)

    Look, a robot!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

    ```


    这个例子很简单（输出大量感叹号），但请看下面的示例，其中序列号被输入系统，但都应具有 20 位数字（带前导零）：


    ```

    DECLARE @serial_number NVARCHAR(MAX) = ''91542278'';

    SELECT REPLICATE(0, 20 - LEN(@serial_number)) + @serial_number;

    ```


    在此示例中，`LEN` 返回序列号中的字符数。通过从 20 中减去该值，你可以确定需要多少个额外字符才能达到 20 位。通过重复零字符这么多次，你可以快速用适当数量的零来填充序列号。此策略也适用于邮政编码、身份证号码或任何表示为字符串的数值，其中前导零可能会被省略。


    `REVERSE` 也是一个简单的函数，它接收一个字符串并反转其中的字符。如果你希望从字符串末尾开始操作（以相反顺序）或管理一个列表（从末尾开始），这会很有用。


    ```

    DECLARE @string NVARCHAR(MAX) = ''123456789'';

    SELECT REVERSE(@string);

    ```


    这个简单的示例接收一个数字字符串并将其反转，返回预期的结果：


    ```

    987654321

    ```


    ### 关于撇号的注意事项


    由于动态 SQL 是在字符串中构建的，在构建更复杂的字符串逻辑时，仔细考虑如何正确使用撇号非常重要。例如，假设你想查找所有名字以 Ed 开头的人。使用动态
    SQL 时，你需要包含一些额外的撇号以确保语法正确：


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @first_name NVARCHAR(20) = ''Ed'';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName LIKE '''''' + @first_name + ''%'''''';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    生成的命令字符串将如下所示：


    ```

    SELECT

    *

    FROM Person.Person

    WHERE FirstName LIKE ''Ed%''

    ```


    注意，这里使用了三个撇号而不是一个。在字符串内，一对撇号会被解析为单个撇号。每当在动态 SQL 命令字符串中处理字符串时，请务必经常调试和打印，以确保你构建的是有效的
    T-SQL 并且没有忘记任何字符串定界符。


    如果需要在动态 SQL 中修改参数内的字符串，则结果将是需要六个撇号而不是两个。如果这听起来很复杂，那么请以此复杂性作为警示，避免开发出比必要更难以理解和维护的应用程序。


    ## 结论


    动态 SQL 是一个强大的工具，能够快速有效地执行复杂请求。有许多数据库查询和任务如果没有动态定制查询的能力将难以完成。我们很快将深入探讨动态 SQL 的更多细节，并提供许多关于如何有效使用它的实用示例。


    不过，在深入之前，讨论安全性和编写及维护动态 SQL 的最佳实践非常重要。与任何工具一样，它可能被正确使用也可能被误用，了解如何有效利用安全措施不仅能提高开发质量，还能帮助保护你现有的应用程序和系统。


    # 2. 防范 SQL 注入


    很少有 SQL 漏洞像 SQL 注入那样被频繁利用。这种形式的数据库攻击已经摧毁了公司并毁掉了职业生涯，对数据库管理员来说是一个持续的挑战。作为数据库专业人员，数据是你最宝贵的资产，保护它是你高于一切的责任。SQL
    注入不仅限于动态 SQL，它是一种可以应用于 SQL Server 许多领域的技术。因此，在考虑 SQL Server 安全性时，理解并防御它是最重要的优先事项。

    '
- fmt: '# What Is SQL Injection?


    SQL injection is when a hacker attempts to insert malicious TSQL into the parameters
    used in Dynamic SQL. Consider the example shown in Listing [2-1](#A371168_1_En_2_Chapter.html#Par3).


    ```

    DECLARE @CMD NVARCHAR(MAX);

    DECLARE @search_criteria NVARCHAR(1000);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE FirstName = '''''';

    SELECT @search_criteria = ''Edward'';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    Listing 2-1.

    Dynamic SQL, Intro to SQL Injection

    ```


    We perform a search of `Person.Person` for anyone who has the first name of whatever
    `@search_criteria` was passed into this code. The resulting command string appears
    exactly as you’d expect it to:


    ```

    SELECT * FROM Person.Person

    WHERE FirstName = ''Edward''

    ```


    Over time, this search is used by many, many people and is expanded to also search
    for people by last name, middle initial, title, e-mail address, and more! Eventually,
    someone with the last name of “O’Brien” tries to search for their records, as
    shown in Listing [2-2](#A371168_1_En_2_Chapter.html#Par7).


    ```

    DECLARE @CMD NVARCHAR(MAX);

    DECLARE @search_criteria NVARCHAR(1000);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @search_criteria = ''O''''Brien'';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    EXEC sp_executesql @CMD;

    Listing 2-2.

    Use of Input Value with an Apostrophe

    ```


    The results are not what the user expected. Instead of getting their info, they
    get a SQL Server error:


    ```

    Msg 102, Level 15, State 1, Line 322

    Incorrect syntax near ''Brien''.

    Msg 105, Level 15, State 1, Line 322

    Unclosed quotation mark after the character string ''''.

    ```


    Returning to the command string and verifying that it looks correct, you would
    notice the following:


    ```

    SELECT * FROM Person.Person

    WHERE LastName = ''O''Brien''

    ```


    The apostrophe within “O’Brien” broke the command string, closing the string after
    the “O” in “O’Brien”. Instead of receiving the expected data, your friend O’Brien
    receives a cryptic error and contacts your help desk to determine why this web
    application is broken. This is a best-case scenario of what could happen. The
    user shrugs and submits an incident to your organization to fix this bug so he
    can search for his information without odd error messages.


    Let’s consider another example where the end user is more tech-savvy and a bit
    more malicious. She enters a string with apostrophes and are returned an error
    message. Instead of reporting the error to you, a light bulb goes off and she
    begins writing some TSQL of their own, as shown in Listing [2-3](#A371168_1_En_2_Chapter.html#Par7).


    ```

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @search_criteria = ''Smith'''' OR 1 = 1 AND '''''''' = '''''';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    EXEC sp_executesql @CMD;

    Listing 2-3.

    How a Hacker Can Begin to Use SQL Injection Against Unsecured Dynamic SQL

    ```


    This sneaky user realized immediately that this site was vulnerable to SQL injection
    and began tinkering with search parameters until she found one that allowed her
    to extract all of the personal data from this table, and not just hers. By adding
    two apostrophes after `Smith`, the uninvited guest has returned to the main TSQL
    query and appended `OR 1 = 1` to the end. Finally, she adds some additional apostrophes
    to the end in order to complete the command string correctly and avoid syntactical
    errors. The resulting command string is as follows:


    ```

    SELECT * FROM Person.Person

    WHERE LastName = ''Smith'' OR 1 = 1 AND '''' = ''''

    ```


    The last name of `Smith` is irrelevant to the attack. By adding a condition that
    is always true, the hacker has effectively bypassed the `WHERE` clause and have
    gained access to all of the data in the table. In a single statement, this hacker
    has stolen tens of thousands of rows of personal data and began a data breach
    that would cause great harm to any organization targeted by it!


    If a username and password prompt were managed via Dynamic SQL, then a similar
    attack would result in someone gaining access to a software application that they
    were not authorized to use. Consider the Dynamic SQL in Listing [2-4](#A371168_1_En_2_Chapter.html#Par19),
    which verifies a user’s ID and password.


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @id INT = 3;

    DECLARE @password NVARCHAR(128) = '''';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Password

    WHERE BusinessEntityID = '' + CAST(@id AS NVARCHAR(25)) + ''

    AND PasswordHash = '''''' + @password + ''''''''

    EXEC (@sql_command)

    Listing 2-4.

    Dynamic SQL that Verifies a User/Password Combination

    ```


    Any incorrect guess at a password will result in a failed login, and no results
    are returned. But what if a hacker tries to use SQL injection to bypass the login
    validation all together? The following string for `@password` would be all it
    would take to completely invalidate this security check:


    ```

    '''''' OR 1 = 1 AND '''''''' = ''''''

    ```


    By including an `OR` in the conditional, a malicious user could find ways to log
    in using any user, even the administrator. Since these logins may appear legitimate
    from the perspective of the application, it’s possible that this attack could
    go unnoticed until it was too late.


    Similarly, `UNION ALL` can allow additional data to be selected without triggering
    any errors, as shown in Listing [2-5](#A371168_1_En_2_Chapter.html#Par24).


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @id INT = 3;

    DECLARE @password NVARCHAR(128) = '''''' UNION ALL SELECT * FROM Person.Password
    WHERE '''''''' = '''''';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Password

    WHERE BusinessEntityID = '' + CAST(@id AS NVARCHAR(25)) + ''

    AND PasswordHash = '''''' + @password + ''''''''

    EXEC (@sql_command)

    Listing 2-5.

    Use of UNION ALL via SQL Injection to Collect Additional Secure Data

    ```


    In this example, the original query is allowed to execute with a blank password,
    but an additional `SELECT` statement is appended, which returns the entire contents
    of the `Password` table. The resulting command string looks like this:


    ```

    SELECT

    *

    FROM Person.Password

    WHERE BusinessEntityID = 3

    AND PasswordHash = '''' UNION ALL SELECT * FROM Person.Password WHERE '''' = ''''

    ```


    This is a bit trickier to pull off as both tables need to be of the same structure
    in order to prevent syntax errors when the columns from the first table don’t
    match the second. Given time, though, a hacker can figure out ways around this,
    such as adding dummy columns to the appended table, choosing specific columns,
    or using `COLLATE` to ensure that language and localization settings match up.
    Determining the names of tables in order to exploit them is a matter of guesswork
    here, but later on you will learn about ways in which a hacker can determine them
    through more covert means.


    A similar attack involving a username/password scenario would be to use comments
    to remove the remainder of the TSQL so that the username is validated, but the
    password is not. This database schema is hypothetical, but the use case very common,
    as shown in Listing [2-6](#A371168_1_En_2_Chapter.html#Par29).


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @username NVARCHAR(128) = ''edward'';

    DECLARE @password NVARCHAR(128) = ''my_password'';

    SELECT @sql_command = ''SELECT

    *

    FROM dbo.password

    WHERE username = '''''' + @username + '''''' AND Password = '''''' + @password
    + '''''''';

    EXEC(@sql_command);

    Listing 2-6.

    User/Password Verification Statement

    ```


    An attacker may see that SQL injection is possible here and try to remove the
    password from the equation altogether by entering the following for their username:'
