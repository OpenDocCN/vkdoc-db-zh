    # 全局临时表


    ## 概念


    一个最终可用的选项是全局临时表。这些表的声明方式与标准临时表类似，但使用 `##` 前缀而不是 `#`。全局临时表在服务器范围内对任何访问其创建所在的同一
    SQL Server 实例的 T-SQL 都可用。此访问不受连接或数据库访问限制。


    一旦创建，全局临时表将一直存在，直到所有与之的连接结束。该表可以在动态 SQL 或调用 T-SQL 的作用域内创建，并且仍然可在服务器上的任何其他作用域中使用。


    ## 使用示例


    考虑清单 5-11 中的示例，与前一个类似。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @sql_command = ''

    CREATE TABLE ##last_names (

    last_name NVARCHAR(50));

    INSERT INTO ##last_names

    (last_name)

    SELECT ''''Thomas'''';''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM ##last_names);''

    EXEC sp_executesql @sql_command;

    SELECT * FROM ##last_names;

    -- 清单 5-11.

    -- 全局临时表使用示例

    ```


    此 T-SQL 在动态 SQL 中声明了一个全局临时表。然后它使用该全局临时表从 `Person.Person` 中选择一些名字，之后再次在调用的 T-SQL
    中访问它。一切都按预期工作（有时确实如此）！请注意，在示例结束时，全局临时表没有被删除。因此，它将保持可用，直到使用它的所有连接都结束或者您显式删除它。如果您想再次访问它或从其他位置访问它，这可能是有益的。但如果您忘记了它，并在未来尝试声明同名的临时表，这也可能带来问题：


    ```sql

    CREATE TABLE ##last_names (

    last_name NVARCHAR(50));

    ```


    当您运行此表创建语句时，会生成错误：


    ```

    Msg 2714, Level 16, State 6, Line 351

    There is already an object named ''##last_names'' in the database.

    ```


    在创建或使用全局临时表的任何代码中，管理它们至关重要。忘记删除临时表可能碰巧没问题，如果您恰好结束了连接，它会被 SQL Server 自动删除。但如果另一个连接正在使用该表，它将不会被
    SQL Server 删除，因为它仍处于使用状态。处理临时表的最佳实践是在不再需要时删除它们。这消除了表持续存在并在之后被无意访问，或者在已存在时尝试创建的可能性。


    务必在不再需要时删除临时表。这确保它不会干扰未来的表创建，也不会在不再需要时被以某种方式访问。


    ## 服务器范围内的可用性


    既然有 `##last_names` 表可用，让我们看看全局临时表的另一个特性——它们在服务器任何位置的可用性：


    ```sql

    CREATE DATABASE temp_table_test;

    GO

    USE temp_table_test;

    GO

    SELECT

    *

    FROM ##last_names;

    ```


    即使在这个全新的数据库中，全局临时表仍然可用。由于您尚未删除此 SQL Server 连接，它将无限期地对服务器上的任何其他连接保持可用。这引出了关于全局临时表安全性的讨论，而它们恰好没有任何安全性。一旦创建，全局临时表对任何数据库中的任何登录名或用户在任何地方都是可用的，没有限制。


    ## 安全问题


    在上一章中，您创建了一个名为 `VeryLimitedUser` 的用户，该用户只能访问一个存储过程，而没有对任何其他数据库、表或 SQL Server 功能的显式访问权限。当此用户尝试访问全局临时表时会发生什么？


    ```sql

    EXECUTE AS USER = ''VeryLimitedUser'';

    GO

    SELECT

    *

    FROM ##last_names;

    REVERT;

    GO

    DROP TABLE ##last_names;

    GO

    ```


    尽管在服务器上几乎没有权限，但此用户可以毫无问题地从全局临时表中选择数据。这引发了全局临时表的一个潜在安全问题，因为根据设计，它们可被服务器上的任何其他人访问，无论其具体权限如何。此外，无法在全局临时表上设置权限来限制此行为。请注意您创建的任何全局临时表。请确保，如果另一个用户能够访问它，此访问不会带来问题。如果您的全局临时表包含任何敏感数据，请考虑以其他格式存储它，例如表变量、标准临时表或用于暂存或临时数据的永久表。对数据进行哈希处理或加密也是限制其访问的好方法，因为它将降低其他连接的可用性。


    ## 命名冲突


    另一个可能发生的问题是，当来自两个不同连接的两个全局临时表具有相同的名称时。由于这些表是全局的，并且在 SQL Server 实例的整个范围内有效，因此不能有两个这样的表共享相同的名称。如果发生这种情况，将抛出错误，第二个尝试声明新表的人将无法继续，除非重命名它。

    '
- fmt: '## 使用永久表进行临时存储


    当特定功能需要频繁存储临时数据时，创建永久表是一种高效且安全的方法。对于前面的例子，可以按照示例清单 [5-12](#A371168_1_En_5_Chapter.html#Par80)
    所示的另一种方式来管理姓氏列表。


    ```sql

    CREATE TABLE last_names_staging (

    last_name NVARCHAR(50) NOT NULL CONSTRAINT PK_last_names_staging    PRIMARY KEY
    CLUSTERED);

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @sql_command = ''

    INSERT INTO last_names_staging

    (last_name)

    SELECT ''''Thomas'''';''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM last_names_staging);''

    EXEC sp_executesql @sql_command;

    SELECT * FROM last_names_staging;

    ```

    *清单 5-12. 使用永久表进行临时存储*


    在此示例中，一切工作方式都与前面的例子相同，只是“临时存储”实际上是永久的。为了存储临时数据而创建永久对象可能看起来违反直觉，但这样做有很多好处：


    *   数据被永久保留，与连接无关。

    *   可以从服务器上的任何位置访问表，与数据库无关。

    *   可以对表应用安全性，确保只有授权访问。

    *   可以向表添加索引、统计信息、约束等。

    *   无需访问 `TempDB`。


    使用永久表的缺点很少，但很显著：


    *   它成为一个需要维护和文档记录的永久对象。

    *   必须管理其使用，以确保数据始终相关。


    总结以上所有要点：当数据需要更长期存储或优化变得重要时，请使用永久表。虽然可以在临时表和表变量上放置索引（存在限制），但拥有一个永久位置来暂存临时数据非常方便，并消除了不断管理临时对象的需要。


    同样重要的是，仅在有合理且高效的情况下才将表用于此目的。为所有临时数据创建/访问创建永久表可能会迅速导致大量需要关心和维护的对象。一个有助于组织的选项是在其自己的模式中创建表，从而将其与数据库中的其他对象分开。或者，对于较小的用例，给这些表添加前缀可能足以轻松组织和查找它们。


    当不再需要“永久临时表”时，可以轻松删除它。这个清理步骤很重要，因为您不希望用不需要的、临时的或未使用的对象弄乱服务器。创建任何永久数据库对象都隐含着有效记录和管理它的责任。当有一天不再需要它时，请花额外的时间将其弃用并最终移除。


    ## 从动态 SQL 直接将数据输出到表


    收集来自任何存储过程（包括动态 SQL）数据的最后一种方法是将其作为 `EXEC` 语句的一部分直接插入到表中。如示例清单 [5-13](#A371168_1_En_5_Chapter.html#Par94)
    所示，这是对临时存储的一种新变化，消除了在动态 SQL 中显式管理它的需要。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    CREATE TABLE #last_names (

    last_name NVARCHAR(50));

    SELECT @sql_command = ''

    SELECT

    LastName

    FROM Person.Person

    WHERE FirstName = ''''Edward'''';

    ''

    INSERT INTO #last_names

    (last_name)

    EXEC sp_executesql @sql_command;

    SELECT

    *

    FROM #last_names

    DROP TABLE #last_names;

    ```

    *清单 5-13. 将动态 SQL 输出直接插入另一个表*


    在此示例中，您在 TSQL 开头声明了临时表 `#last_names`。请注意，当您执行命令字符串时，输出直接放入临时表中，而无需传递参数或管理其他对象。这是一种非常方便且高效的方式，可以保存动态
    SQL 或任何其他存储过程的输出。这也是保存系统存储过程输出的绝佳方式，如示例清单 [5-14](#A371168_1_En_5_Chapter.html#Par96)
    所示。


    ```sql

    CREATE TABLE #sp_who_data

    (

    spid SMALLINT,

    ecid SMALLINT,

    status NCHAR(30),

    loginame NCHAR(128),

    hostname NCHAR(128),

    blk CHAR(5),

    dbname NCHAR(128),

    cmd NCHAR(16),

    request_id INT

    )

    INSERT INTO #sp_who_data

    (spid, ecid, status, loginame, hostname, blk, dbname, cmd, request_id)

    EXEC sp_who;

    SELECT * FROM #sp_who_data

    WHERE dbname = ''AdventureWorks2012''

    DROP TABLE #sp_who_data;

    ```

    *清单 5-14. 使用 INSERT…EXEC 语法收集 sp_who 的输出*


    一个非常常见的管理需求是查看当前的 SQL Server 连接，并收集有关谁连接到哪个数据库以及他们在做什么的详细信息。执行 `sp_who` 可以收集该数据，但它仅将结果输出到结果窗口。在连接繁忙的服务器上，您会希望通过数据库、用户或其他条件过滤该数据。您可能还希望将其永久记录以用于审计或其他安全目的。将该数据直接插入表中的能力使您能够高效地将其过滤到单个数据库，并仅获取该数据库的连接，而不是整个服务器的连接。请注意，`#sp_who_data`
    表中的数据类型取自 MSDN，并非我活跃想象力的产物：


    ```text

    https://msdn.microsoft.com/en-us/library/ms174313.aspx

    ```


    相同的语法可应用于任何存储过程、系统存储过程或动态 SQL 输出。虽然方便，但它也有些不灵活。数据要插入的表必须提前定义，并且必须与输出数据的结构完全相同。虽然在创建临时表的同时执行命令字符串会很方便，但
    SQL Server 不允许该语法：


    ```sql

    SELECT

    EXEC sp_who

    INTO #sp_who_data;

    SELECT INTO #sp_who_data

    EXEC sp_who;

    SELECT INTO #sp_who_data

    (EXEC sp_who);

    ```


    无论您多么有创意，都无法强迫 SQL Server 为您动态创建临时表。`SELECT INTO` 不允许与存储过程执行结合使用，任何重新排列 TSQL 都无法使其神奇地工作。因此，您必须始终提前定义输出的目标表。


    ## 结论


    尽管作用域阻止您在动态 SQL、其他 TSQL 和其他存储过程执行之间轻松移动数据，但存在许多工具，提供了多种方法来实现这一点。与任何工具箱一样，请始终为每项工作选择正确的工具。通常，数据越临时，就越不需要创建复杂的结构或方法来管理它。如果数据只需要一次，或者仅在特定存储过程的持续时间内需要，请考虑使用
    `INSERT..EXEC` 语法或临时表。如果将来其他连接可能需要数据，则全局临时表有助于确保在需要时可用。谨慎使用全局临时表，因为它们缺乏其他数据结构的安全性和作用域限制。仅在确定需要时才使用它们。最后，对于将来需要长期使用的数据，永久表可以是一种很好的方式来保存该数据，并在未来长时间内高效、安全地管理它。'
  raw: '## Using Permanent Tables for Temporary Storage


    When you need to store temporary data often for a specific functionality, creating
    a permanent table is an efficient and secure approach. For the previous example,
    you could alternatively manage the list of last names in the manner shown in Listing
    [5-12](#A371168_1_En_5_Chapter.html#Par80).


    ```

    CREATE TABLE last_names_staging (

    last_name NVARCHAR(50) NOT NULL CONSTRAINT PK_last_names_staging    PRIMARY KEY
    CLUSTERED);

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @sql_command = ''

    INSERT INTO last_names_staging

    (last_name)

    SELECT ''''Thomas'''';''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM last_names_staging);''

    EXEC sp_executesql @sql_command;

    SELECT * FROM last_names_staging;

    Listing 5-12.

    Using a Permanent Table for Temporary Storage

    ```


    In this example, everything works as it did in the previous examples, except that
    the “temporary storage” is rather permanent. It may seem counter-intuitive to
    create a permanent object in order to store temporary data, but there are many
    benefits in doing so:


    *   Data is persisted permanently, regardless of connection.

    *   Tables can be accessed from anywhere on the server, regardless of the database.

    *   Security can be applied to the table, ensuring only authorized access.

    *   Indexes, statistics, constraints, and so on, may be added to the table.

    *   There is no need to access TempDB.


    The drawbacks of using a permanent table are few, but significant:


    *   It becomes a permanent object that requires maintenance and documentation.

    *   Usage must be managed so that data is always relevant.


    To summarize all of the points above: Use permanent tables when data needs to
    be stored on a more long-term basis, or when optimization becomes important. While
    indexes can be placed on temporary tables and table variables (with limitations),
    having a permanent place to stage temporary data can be extremely convenient and
    remove the need to constantly manage temporary objects.


    Equally importantly, limit the use of tables for this purpose to only when it
    is sensible and efficient. Creating permanent tables for all temporary data creation/access
    could quickly result in a plethora of objects that require care and maintenance.
    One option to assist with organization is to create the table in its own schema,
    thus separating it from the rest of the objects in the database. Alternatively,
    for smaller use-cases, appending a prefix to these tables may be enough to organize
    and find them easily.


    When a “permanent temporary table ” is no longer needed, it can easily be dropped.
    This cleanup step is important, as you don’t want to clutter a server with unneeded,
    temporary, or unused objects. Creating any permanent database object carries with
    it the implicit responsibility to document and manage it effectively. When the
    day comes that it is no longer needed, take the added time to deprecate and ultimately
    remove it.


    ## Output Data Directly to a Table from Dynamic SQL


    One final way to collect data from any stored procedure, including Dynamic SQL,
    is to insert it directly into a table as a part of the `EXEC` statement. This
    example, as shown in Listing [5-13](#A371168_1_En_5_Chapter.html#Par94), is a
    new twist on the temporary storage and eliminates the need to explicitly manage
    it within Dynamic SQL.


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    CREATE TABLE #last_names (

    last_name NVARCHAR(50));

    SELECT @sql_command = ''

    SELECT

    LastName

    FROM Person.Person

    WHERE FirstName = ''''Edward'''';

    ''

    INSERT INTO #last_names

    (last_name)

    EXEC sp_executesql @sql_command;

    SELECT

    *

    FROM #last_names

    DROP TABLE #last_names;

    Listing 5-13.

    Inserting Dynamic SQL Output Directly into Another Table

    ```


    In this example, you declare the temporary table `#last_names` at the start of
    the TSQL. Note that when you execute the command string, the output is directly
    placed into the temp table, without the need for passing parameters or managing
    additional objects. This is a very convenient way to save the output from Dynamic
    SQL or any other stored procedure and to do so quickly and efficiently. This is
    also an excellent way to save the output from a system stored procedure, as shown
    in Listing [5-14](#A371168_1_En_5_Chapter.html#Par96).


    ```

    CREATE TABLE #sp_who_data

    (

    spid SMALLINT,

    ecid SMALLINT,

    status NCHAR(30),

    loginame NCHAR(128),

    hostname NCHAR(128),

    blk CHAR(5),

    dbname NCHAR(128),

    cmd NCHAR(16),

    request_id INT

    )

    INSERT INTO #sp_who_data

    (spid, ecid, status, loginame, hostname, blk, dbname, cmd, request_id)

    EXEC sp_who;

    SELECT * FROM #sp_who_data

    WHERE dbname = ''AdventureWorks2012''

    DROP TABLE #sp_who_data;

    Listing 5-14.

    Using the INSERT…EXEC Syntax to Collect Output from sp_who

    ```


    A very common administrative need is to view the current SQL Server connections
    and gather details about who is connected to what database and what they are up
    to. While executing `sp_who` gathers that data, it only outputs it to the results
    window. On a busy server with many connections, you will want to filter that data
    by database, user, or some other criteria. You may also want to log that data
    permanently for auditing or other security purposes. The ability to insert that
    data directly into a table allows you to efficiently filter it down to a single
    database and get only the connections there, rather than on the entire server.
    Note that the data types in the `#sp_who_data` table were taken from MSDN and
    are not a byproduct of my active imagination:


    ```

    https://msdn.microsoft.com/en-us/library/ms174313.aspx

    ```


    This same syntax can be applied to any stored procedure, system-stored procedure,
    or Dynamic SQL output. While it is convenient, it is also somewhat inflexible.
    The table that the data is to be inserted into must be defined ahead of time and
    must be exactly the same structure as the output data. While it would be convenient
    to execute the command string while also creating a temporary table, SQL Server
    does not allow that syntax:


    ```

    SELECT

    EXEC sp_who

    INTO #sp_who_data;

    SELECT INTO #sp_who_data

    EXEC sp_who;

    SELECT INTO #sp_who_data

    (EXEC sp_who);

    ```


    No matter how creative you get, there is no way to force SQL Server to create
    the temporary table on-the-fly for you. `SELECT INTO` is not allowed in conjunction
    with stored procedure execution, and no rearrangement of the TSQL will make this
    magically work. As a result, you must always define the target table for the output
    ahead of time.


    ## Conclusion


    While scope prevents you from effortlessly moving data among the Dynamic SQL,
    the other TSQL, and additional stored procedure executions, a number of tools
    exist that provide many ways in which to accomplish this anyway. As with any toolbox,
    always choose the correct tool for each job. Typically, the more temporary the
    data, the less need there is for creating elaborate structures or methodologies
    in order to manage it. If data is needed once, or only for the duration of a specific
    stored procedure, consider using the `INSERT..EXEC` syntax or a temporary table.
    If data may be needed in the future from other connections, then global temporary
    tables can be helpful in ensuring that it is available when needed. Use caution
    with global temp tables, as they lack the security and limitations in scope that
    other data structures have. Only use them when you are certain that they are needed.
    Lastly, for data that will be needed throughout the future, a permanent table
    can be a great way to save that data and manage it efficiently and securely for
    a long time to come.'
  trans: '

    ## 使用永久表进行临时存储


    当特定功能需要频繁存储临时数据时，创建永久表是一种高效且安全的方法。对于前面的例子，可以按照示例清单 5-12 所示的另一种方式来管理姓氏列表。


    ```sql

    CREATE TABLE last_names_staging (

    last_name NVARCHAR(50) NOT NULL CONSTRAINT PK_last_names_staging    PRIMARY KEY
    CLUSTERED);

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    SELECT @sql_command = ''

    INSERT INTO last_names_staging

    (last_name)

    SELECT ''''Thomas'''';''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM last_names_staging);''

    EXEC sp_executesql @sql_command;

    SELECT * FROM last_names_staging;

    ```

    *清单 5-12. 使用永久表进行临时存储*


    在此示例中，一切工作方式都与前面的例子相同，只是“临时存储”实际上是永久的。为了存储临时数据而创建永久对象可能看起来违反直觉，但这样做有很多好处：


    *   数据被永久保留，与连接无关。

    *   可以从服务器上的任何位置访问表，与数据库无关。

    *   可以对表应用安全性，确保只有授权访问。

    *   可以向表添加索引、统计信息、约束等。

    *   无需访问 `TempDB`。


    使用永久表的缺点很少，但很显著：


    *   它成为一个需要维护和文档记录的永久对象。

    *   必须管理其使用，以确保数据始终相关。


    总结以上所有要点：当数据需要更长期存储或优化变得重要时，请使用永久表。虽然可以在临时表和表变量上放置索引（存在限制），但拥有一个永久位置来暂存临时数据非常方便，并消除了不断管理临时对象的需要。


    同样重要的是，仅在有合理且高效的情况下才将表用于此目的。为所有临时数据创建/访问创建永久表可能会迅速导致大量需要关心和维护的对象。一个有助于组织的选项是在其自己的模式中创建表，从而将其与数据库中的其他对象分开。或者，对于较小的用例，给这些表添加前缀可能足以轻松组织和查找它们。


    当不再需要“永久临时表”时，可以轻松删除它。这个清理步骤很重要，因为您不希望用不需要的、临时的或未使用的对象弄乱服务器。创建任何永久数据库对象都隐含着有效记录和管理它的责任。当有一天不再需要它时，请花额外的时间将其弃用并最终移除。


    ## 从动态 SQL 直接将数据输出到表


    收集来自任何存储过程（包括动态 SQL）数据的最后一种方法是将其作为 `EXEC` 语句的一部分直接插入到表中。如示例清单 5-13 所示，这是对临时存储的一种新变化，消除了在动态
    SQL 中显式管理它的需要。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    CREATE TABLE #last_names (

    last_name NVARCHAR(50));

    SELECT @sql_command = ''

    SELECT

    LastName

    FROM Person.Person

    WHERE FirstName = ''''Edward'''';

    ''

    INSERT INTO #last_names

    (last_name)

    EXEC sp_executesql @sql_command;

    SELECT

    *

    FROM #last_names

    DROP TABLE #last_names;

    ```

    *清单 5-13. 将动态 SQL 输出直接插入另一个表*


    在此示例中，您在 TSQL 开头声明了临时表 `#last_names`。请注意，当您执行命令字符串时，输出直接放入临时表中，而无需传递参数或管理其他对象。这是一种非常方便且高效的方式，可以保存动态
    SQL 或任何其他存储过程的输出。这也是保存系统存储过程输出的绝佳方式，如示例清单 5-14 所示。


    ```sql

    CREATE TABLE #sp_who_data

    (

    spid SMALLINT,

    ecid SMALLINT,

    status NCHAR(30),

    loginame NCHAR(128),

    hostname NCHAR(128),

    blk CHAR(5),

    dbname NCHAR(128),

    cmd NCHAR(16),

    request_id INT

    )

    INSERT INTO #sp_who_data

    (spid, ecid, status, loginame, hostname, blk, dbname, cmd, request_id)

    EXEC sp_who;

    SELECT * FROM #sp_who_data

    WHERE dbname = ''AdventureWorks2012''

    DROP TABLE #sp_who_data;

    ```

    *清单 5-14. 使用 INSERT…EXEC 语法收集 sp_who 的输出*


    一个非常常见的管理需求是查看当前的 SQL Server 连接，并收集有关谁连接到哪个数据库以及他们在做什么的详细信息。执行 `sp_who` 可以收集该数据，但它仅将结果输出到结果窗口。在连接繁忙的服务器上，您会希望通过数据库、用户或其他条件过滤该数据。您可能还希望将其永久记录以用于审计或其他安全目的。将该数据直接插入表中的能力使您能够高效地将其过滤到单个数据库，并仅获取该数据库的连接，而不是整个服务器的连接。请注意，`#sp_who_data`
    表中的数据类型取自 MSDN，并非我活跃想象力的产物：


    ```text

    https://msdn.microsoft.com/en-us/library/ms174313.aspx

    ```


    相同的语法可应用于任何存储过程、系统存储过程或动态 SQL 输出。虽然方便，但它也有些不灵活。数据要插入的表必须提前定义，并且必须与输出数据的结构完全相同。虽然在创建临时表的同时执行命令字符串会很方便，但
    SQL Server 不允许该语法：


    ```sql

    SELECT

    EXEC sp_who

    INTO #sp_who_data;

    SELECT INTO #sp_who_data

    EXEC sp_who;

    SELECT INTO #sp_who_data

    (EXEC sp_who);

    ```


    无论您多么有创意，都无法强迫 SQL Server 为您动态创建临时表。`SELECT INTO` 不允许与存储过程执行结合使用，任何重新排列 TSQL 都无法使其神奇地工作。因此，您必须始终提前定义输出的目标表。


    ## 结论


    尽管作用域阻止您在动态 SQL、其他 TSQL 和其他存储过程执行之间轻松移动数据，但存在许多工具，提供了多种方法来实现这一点。与任何工具箱一样，请始终为每项工作选择正确的工具。通常，数据越临时，就越不需要创建复杂的结构或方法来管理它。如果数据只需要一次，或者仅在特定存储过程的持续时间内需要，请考虑使用
    `INSERT..EXEC` 语法或临时表。如果将来其他连接可能需要数据，则全局临时表有助于确保在需要时可用。谨慎使用全局临时表，因为它们缺乏其他数据结构的安全性和作用域限制。仅在确定需要时才使用它们。最后，对于将来需要长期使用的数据，永久表可以是一种很好的方式来保存该数据，并在未来长时间内高效、安全地管理它。

