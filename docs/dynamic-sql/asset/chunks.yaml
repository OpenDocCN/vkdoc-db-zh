  trans: '

    ## 使用 XML 创建动态列表


    很明显，除了最小的数据集外，使用任何形式的循环来生成字符串都是低效的。一种广泛使用的替代方法是从基础表中选择所需数据，并使用 XML 进行格式化。请看以下语法示例（如清单
    7-2 所示），它生成了与上一个例子中的循环相同的列表。


    ```

    DECLARE @myIDs NVARCHAR(MAX) = '''';

    SET @myIDs = STUFF((SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR)

    FROM Person.Person

    ORDER BY LastName

    FOR XML PATH(''''), TYPE

    ).value(''.'', ''NVARCHAR(MAX)''), 1, 1, '''');

    SELECT @myIDs;

    GO

    清单 7-2.

    使用 XML 生成 ID 列表

    ```


    你首先应该注意到，这个语法更复杂，可读性也稍差。结果集与预期相同：


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    要理解 XML 如何生成此列表，你可以分解查询，从最内层的 TSQL 开始，然后逐步构建：


    ```

    SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR) AS ID_CSV

    FROM Person.Person

    ORDER BY LastName;

    ```


    这个 `SELECT` 语句返回一个 ID 列表，每个 ID 前都有一个逗号，如图 7-2 所示。


    ![A371168_1_En_7_Fig2_HTML.jpg](img/A371168_1_En_7_Fig2_HTML.jpg)

    *图 7-2.*

    将用于 XML 生成列表的 ID 列表


    这里没什么特别的。下一步将把所有数据行连接成 XML 格式，在 SQL Server 中这将显示为逗号分隔的列表：


    ```

    SELECT (SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR)

    FROM Person.Person

    ORDER BY LastName

    FOR XML PATH(''''));

    ```


    这个 `SELECT` 的结果将显示一个接近成品的结果：


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    在你能认为这个查询被完全剖析和正确之前，还有两件未完成的事情需要处理。首先是确保 XML 输出是正确的数据类型：


    ```

    SELECT (SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR)

    FROM Person.Person

    ORDER BY LastName

    FOR XML PATH(''''), TYPE

    ).value(''.'', ''NVARCHAR(MAX)'');

    ```


    XML `value` 方法将 XML 结果转换为提供的数据类型，然后返回。如果这是一个非常长的列表，这种转换可以确保你不会在过程中遇到字符串截断的问题。如果区分很重要，它还可以让你在
    `VARCHAR` 和 `NVARCHAR` 之间进行选择。本例使用 `NVARCHAR(MAX)` 作为返回的数据类型。由于数据类型转换对你正在查看的 SQL
    Server 输出是不可见的，此查询的结果与上一步的输出相同。


    最后一步是移除左侧那个讨厌的逗号，这可以通过多种字符串处理技术来实现。上面使用 `STUFF` 将逗号分隔的列表内容塞入位置 1 的字符中，而该位置正好是你想要移除的逗号。这种方法很方便，因为它可以在一个步骤中完成，如果你不需要，不必将结果存储在变量中。另一种方法是使用
    `RIGHT` 或 `SUBSTRING` 来移除前导逗号：


    ```

    DECLARE @myIDs NVARCHAR(MAX) = '''';

    SET @myIDs = (SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR)

    FROM Person.Person

    ORDER BY LastName

    FOR XML PATH(''''), TYPE

    ).value(''.'', ''NVARCHAR(MAX)'');

    SELECT RIGHT(@myIDs, LEN(@myIDs) - 1);

    SELECT SUBSTRING(@myIDs, 2, LEN(@myIDs) - 1);

    ```


    每个 `SELECT` 的结果都是相同的，并且与你期望的输出匹配：


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    现在你已经看到 XML 可用于生成逗号分隔的列表，你应该采取额外的步骤对其进行性能测试，并确定其效率水平。首先，检查查询的 IO 统计信息：


    ```

    Table ''Person''. Scan count 1, logical reads 3, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    这看起来很棒！读取次数相当于你直接运行 `Person.Person` 上的 `SELECT` 语句而不应用任何额外格式化时的预期值。使用 XML 将读取次数从
    1019 次减少到了 3 次，我认为这在任何一天都是一笔极好的交易！接下来，让我们看看执行计划的样子，如图 7-3 所示。


    ![A371168_1_En_7_Fig3_HTML.jpg](img/A371168_1_En_7_Fig3_HTML.jpg)

    *图 7-3.*

    使用 XML 生成列表的性能


    对于一个获取 ID 列表的查询来说，这有点复杂。XML 读取器在幕后执行的魔法并非免费，在这里变得很清楚，因为它消耗了查询 97% 的资源。检查执行计划的子树成本，你会发现它大约是
    1.09，这与之前 `WHILE` 循环方法的查询成本相似。换句话说，XML 的成本与之前循环中的 100 次查询类似。虽然它大大减少了磁盘 IO，但如果你严重依赖
    XML，则有可能消耗大量的 CPU。

    '
- fmt: '## Set-Based String Building


    While the XML solution was better, it was not perfect. The execution plan was
    somewhat confusing and illustrated that CPU consumption by XML can be high. Let’s
    consider an additional option, as shown in Listing 7-3.


    ```

    DECLARE @myIDs NVARCHAR(MAX) = '''';

    SELECT TOP 100 @myIDs = @myIDs + CAST(BusinessEntityID AS NVARCHAR) + '',''

    FROM Person.Person

    ORDER BY LastName;

    SET @myIDs = LEFT(@myIDs, LEN(@myIDs) - 1);

    SELECT @myIDs;

    ```

    Listing 7-3.

    Generating a List of IDs by Building a String Directly into a Variable


    This TSQL is much more aesthetically pleasing. It is so simple that it might beg
    you to scratch your head and ask, “How does it work?” When you execute it, the
    results are the same as the previous examples:


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    SQL Server allows you to `SELECT` string data directly into a scalar variable
    in a single step. The string building is reminiscent of Dynamic SQL, even if you
    are not executing a command string in order to generate it. The general structure
    of this statement is as follows:


    Declare a string, typically `VARCHAR(MAX)` or `NVARCHAR(MAX)`. Set the string
    variable equal to an empty string (or any leading characters that you’d like).
    `SELECT @variable = @variable` plus a combination of columns and string data.
    Remove the trailing comma from the end of the string. Proceed with the comma-separated
    list as needed.


    First, let’s take a look at the IO statistics to determine how much data was read
    in order to generate this list:


    ```

    Table ''Person''. Scan count 1, logical reads 3, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    As with the XML solution, the reads are the same as that the `SELECT` query on
    its own would have required. Three reads to generate that list is excellent. Figure
    7-4 shows the execution plan.


    ![A371168_1_En_7_Fig4_HTML.jpg](A371168_1_En_7_Fig4_HTML.jpg)

    Figure 7-4.

    Performance of List-Generation Using a String-Based SELECT


    This execution plan is about as simple as it gets: A single scan of the target
    table and some inexpensive operations to assemble the string. The subtree cost
    for this is 0.004, which is significantly lower than all other string-building
    techniques that you’ve seen so far. Removing the element of XML greatly reduces
    the overhead that the XML reader requires in order to crunch data into the desired
    output format. Additionally, SQL Server can build the string in a completely set-based
    operation with no need for iteration, temporary tables, or any other expensive
    mediums.


    This method is exceptionally fast, efficient, and easy to code and maintain. The
    lack of loops or XML make the resulting TSQL easy enough for a beginner to experiment
    with and understand. Only minimal documentation would be required in order to
    explain what this does and why the method was chosen.


    The dynamically-built list is not limited to a single column or scalar string
    value. You are free to build the string out of as many data elements as you wish,
    whether they be column data, scalar variables, string literals, or strings converted
    from other data types. Listing 7-4 shows how to generate a list with multiple
    variables.


    ```

    DECLARE @myData NVARCHAR(MAX) = '''';

    SELECT @myData =

    @myData + ''ContactTypeID: '' + CAST(ContactTypeID AS NVARCHAR) + '',Name: ''
    + Name + '',''

    FROM person.ContactType

    SET @myData = LEFT(@myData, LEN(@myData) - 1);

    SELECT @myData;

    ```

    Listing 7-4.

    Building a List with Multiple Columns and String Literals


    This example is similar to the last, but includes the `Name` column and the column
    names preceding the values themselves. The syntax for this TSQL is nearly identical
    to the previous example, with the only difference being the columns and literals
    that are concatenated in the `SELECT` statement. The value of `@myData` ends up
    being:


    ```

    ContactTypeID: 1,Name: Accounting Manager,ContactTypeID: 2,Name: Assistant Sales
    Agent,ContactTypeID: 3,Name: Assistant Sales Representative,ContactTypeID: 4,Name:
    Coordinator Foreign Markets,ContactTypeID: 5,Name: Export Administrator,...

    ```


    In the event that you wanted headers for your data, additional columns, labels,
    or any other useful information embedded into the string, getting them there is
    relatively straightforward. There’s no limit to what you can include in the string,
    although it is worth examining the length of the output to ensure that whatever
    application, report, or file is accepting the data can handle whatever the maximum
    expected size could be.


    One final simplification that you can make is to eliminate the need to remove
    the trailing comma at the end with a clever use of `ISNULL`. Listing 7-5 shows
    this short example.


    ```

    DECLARE @myData NVARCHAR(MAX);

    SELECT @myData =

    ISNULL(@myData + '','','''') + ''ContactTypeID: '' + CAST(ContactTypeID AS NVARCHAR)
    + '',Name: '' + Name

    FROM person.ContactType;

    SELECT @myData;

    ```

    Listing 7-5.

    Using `ISNULL` to Eliminate the Leading Comma Within the `SELECT` Statement


    `ISNULL` can accomplish this by checking the value of `@myData` to see if it is
    `NULL`:


    Do not assign an initial empty string value to `@myData`. If `@myData` is `NULL`,
    which occurs on the first value only, then insert a blank. If `@myData` is not
    `NULL`, then insert a comma.


    This logic will implicitly eliminate the leading comma that would have been introduced,
    thereby reducing the number of SQL statements by one. The results of this query
    are identical to the previous example. The performance of the TSQL is also the
    same. `COALESCE` can also be used instead of `ISNULL` with the same effect:


    ```

    DECLARE @myData NVARCHAR(MAX);

    SELECT @myData =

    COALESCE(@myData + '','','''') + ''ContactTypeID: '' + CAST(ContactTypeID AS NVARCHAR)
    + '',Name: '' + Name

    FROM person.ContactType;

    SELECT @myData;

    ```


    Whether you use an `ISNULL`, `LEFT`, or `COALESCE` statement is a matter of personal
    preference, but suffice it to say that these options are significantly better
    than a loop or XML, each of which carries additional complexity and performance
    concerns.'
