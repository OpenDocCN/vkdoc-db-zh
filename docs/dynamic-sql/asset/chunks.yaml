    ## 9. Dynamic PIVOT and UNPIVOT


    `PIVOT` is an extremely efficient way to alter the structure of a result set,
    expanding a single column of values into a set of separate columns. `UNPIVOT`
    does the exact opposite, taking a set of columns and resolving them into a single
    output column. Both of these operators can be very useful in reporting, analytics,
    or when trying to format existing data into a specific structure as required by
    an application.


    A significant limitation of both operators is that the column or name list for
    each must be defined prior to runtime in your TSQL. This can be acceptable if
    the name list is static or predictable enough that you will not need to modify
    your code frequently in order for it to work. If this list changes, though, you
    are forced to create many different stored procedures or functions in order to
    handle the many list values, or force limitations into your code to prevent having
    to do this.


    There is a fun alternative to either of these issues, and that is to use Dynamic
    SQL in order to generate name lists on-the-fly. Once you introduce the dynamic
    aspect to this operator, you can write TSQL that incorporates all values in a
    column, a variable list, or those provided by user input. Without Dynamic SQL,
    it is very difficult and inefficient to accomplish tasks such as this without
    writing significantly longer or more complex TSQL to reach a similar result set.


    ## PIVOT


    `PIVOT` is common in analytics when you are looking to resolve transactional data
    into a columnar structure for use in reporting or metrics. The easiest way to
    introduce the challenge presented above is with an example. Consider the TSQL
    in Listing [9-1](#A371168_1_En_9_Chapter.html#Par5), which returns some quantity
    of data, as well as a color for products that are in inventory.


    ![A371168_1_En_9_Fig1_HTML.jpg](A371168_1_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    The query in Listing [9-1](#A371168_1_En_9_Chapter.html#Par5) is simple enough
    and will return these results


    ```sql

    SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT_INVENTORY.LocationID,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID;

    Listing 9-1.

    Query to Return Select Product Data from AdventureWorks

    ```


    Note that a single product may have quantities in multiple locations. What if
    management was looking to correlate popularity and inventory with the color of
    a variety of products across all of those locations? They request a report where,
    instead of a row per product that includes color, there is a row per product name,
    and additional columns for each specified color. This would allow easy analysis
    to take place per product per color. `PIVOT` is the simplest way to accomplish
    the task, as shown in Listing [9-2](#A371168_1_En_9_Chapter.html#Par7).


    ```sql

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (    SUM(product_quantity)

    FOR product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],
    [White], [Yellow])

    ) PIVOT_DATA;

    Listing 9-2.

    Common Use of PIVOT to Report on Products by Color

    ```


    In this example, you move the previous query into a `FROM` clause that will be
    used for pivoting. The correct syntax for `PIVOT` requires two new components:


    *   An aggregate function, which will aggregate if multiple values exist. In the
    initial `SELECT` statement that returns product data, there were many duplicate
    rows. This example uses `SUM` whenever this occurs, which will add up product
    quantities if there are multiple rows with the same product name.

    *   A value list for all values that will be changed from row data into column
    headers. In this case, the list is of colors from `Product.Color`.


    The output of this statement in Figure [9-2](#A371168_1_En_9_Chapter.html#Fig2)
    illustrates the creation of the new columns.


    ![A371168_1_En_9_Fig2_HTML.jpg](A371168_1_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    Output of the PIVOT query in Listing [9-2](#A371168_1_En_9_Chapter.html#Par7)


    The results show nine new columns , which are the same ones defined in the original
    query. In a scenario where multiple rows from the original query shared the same
    product name, the quantities were added. For example, for the product `Road-250
    Black, 48`, there were two rows returned by the original query, with quantities
    of 116 and 49 for the color black. In the output generated by the `PIVOT` output,
    you can see that the two rows were combined into one with a quantity of 165 for
    the same color. If multiple products existed with the same name, but in different
    colors, then multiple columns would be populated with quantity data for a single
    product after the `PIVOT` was applied.


    There is a single weakness in this approach, and that is that the column list
    must be explicitly provided in the `PIVOT` statement prior to runtime. Any attempt
    to rewrite the `PIVOT` to use a dynamic list without Dynamic SQL will fail, as
    shown in Listings [9-3](#A371168_1_En_9_Chapter.html#Par14) and [9-4](#A371168_1_En_9_Chapter.html#Par15).'
