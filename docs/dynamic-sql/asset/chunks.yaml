    IF @EmailPromotion IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND EmailPromotion = @EmailPromotion'';

    PRINT @CMD;

    EXEC sp_executesql @CMD, @parameter_list, @FirstName, @MiddleName, @LastName,
    @EmailPromotion;

    END

    Listing 2-13.

    Search Procedure with Multiple Optional Parameters

    ```


    There are a few interesting changes to the search proc here. First, there are
    now four parameters that are passed into the stored procedure. Note the syntax
    of the `sp_executesql` command: command string first, then the internal parameter
    list, and then each parameter passed in separately. It is important that the order
    of parameters in each list match; otherwise, you risk passing a first name in
    as a last name, or worse, passing a string where an integer is expected.


    The second significant change in this stored procedure is that all parameters
    are optional. In order to facilitate this, “`WHERE 1 = 1`” is the first `WHERE`
    clause, followed by each parameter. This ensures that, if all parameters are `NULL`,
    you aren’t left with a hanging `WHERE` keyword and no clauses following it; this
    would result in an error. Consider the following executions of the stored procedure:


    ```

    EXEC dbo.search_people ''Edward'', ''H'', ''Johnson'', 1

    EXEC dbo.search_people ''Edward'', NULL, NULL, 1

    EXEC dbo.search_people

    ```


    The first example provides values for all parameters and will return a single
    row from `Person.Person`. The TSQL command string will look like this:


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    AND FirstName = @FirstName

    AND MiddleName = @MiddleName

    AND LastName = @LastName

    AND EmailPromotion = @EmailPromotion

    ```


    The second example leaves the middle name and last name `NULL`, and the resulting
    command string is:


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    AND FirstName = @FirstName

    AND EmailPromotion = @EmailPromotion

    ```


    The final example provides no parameters, and illustrates the importance of the
    “`WHERE 1 = 1`” placeholder in order to maintain good syntax when you do not know
    what parameters (if any) will be supplied:


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    ```


    It is likely within any large application where the table you are searching contains
    thousands (or millions) of rows, that you would not want to allow an empty search
    like this. It is generally beneficial to require at least one search parameter,
    which prevents users from blindly returning everything. It is also worthwhile
    to limit the rows returned by the database to some relatively small number. Common
    defaults include 10, 25, 50, and 100, and this ensures that you never inadvertently
    allow users to query a table for millions of rows at one time.'
  trans: '

    # 参数化动态 SQL


    手动使用 `REPLACE` 或 `QUOTENAME` 清理输入，相比毫无防护是**巨大的进步**。这将有助于防范最常见的 SQL 注入攻击，但并不完美。手动输入清理确保某些字符组合被替换为更理想的选项，但其安全性仍取决于你是否在所有使用输入的地方都警惕地进行转义。这往往是一个手动过程，要求数据库开发者必须记住在所有的动态
    SQL 语句中正确结合使用 `REPLACE` 或 `QUOTENAME`。


    一个更可靠的选择是将责任从开发者转移到 `sp_executesql` 上。这个多功能的存储过程可以接受输入参数，并在执行过程中自动清理它们。考虑一下这个存储过程的新版本，如清单
    2-11 所示。


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(50) = NULL) -- 此参数来自用户输入

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = @search_criteria'';

    PRINT @CMD;

    EXEC sp_executesql @CMD, N''@search_criteria

    NVARCHAR(1000)'', @search_criteria;

    END

    Listing 2-11.

    带参数的搜索过程

    ```


    为 `sp_executesql` 进行参数化，其语法分为三部分：


    *   要执行的命令字符串 (`@CMD`)

    *   参数列表，包括每个参数的数据类型 (`N''@search_criteria NVARCHAR(1000)''`)

    *   从存储过程传入的参数 (`@search_criteria`)


    此存储过程的结果与之前所有的输入清理示例相同。在这种情况下，`sp_executesql` 将自行处理清理工作，确保输入被正确分隔，而无需你提供任何进一步的指令。参数列表也可以存储为一个单独的变量。当参数很多、希望在执行前修改此列表，或者希望
    `sp_executesql` 命令尽可能简短清晰时，这会非常有用。


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(1000) = NULL) -- 此参数来自用户输入

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = N''@search_criteria NVARCHAR(1000)'';

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = @search_criteria'';

    PRINT @CMD;

    EXEC sp_executesql @CMD, @parameter_list, @search_criteria;

    END

    Listing 2-12.

    使用单独参数变量的参数化搜索过程

    ```


    注意添加了变量 `@parameter_list`，它为存储输入参数列表提供了一个独立的位置。添加此参数是可选的，但有助于提高动态 SQL 执行语句的可读性。


    使用 `sp_executesql` 并将所有参数传递给它，可以确保所有输入都被正确分隔，从而防止通过这些输入进行 SQL 注入攻击。


    参数列表字符串 (`@parameter_list`) 包含所有与动态 SQL 命令字符串内文本相对应的参数名称。输入参数 (`@search_criteria`)
    对应于从动态 SQL 外部单独传入的参数。两个列表中的参数名称可以不同，命名约定由你决定。但请保持一致性，以免让未来的开发者面对每一行 T-SQL 都感到困惑。


    `sp_executesql` 语句中允许多少个参数？答案基于 SQL Server 内置的存储过程参数限制。任何存储过程的限制是 2100 个，但对于 `sp_executesql`，命令字符串和参数列表本身也算作参数，因此你实际上有
    2098 个参数的限制，这对于即使是最疯狂的程序员来说也应该是绰绰有余了！


    前面的例子展示了一个带单个参数的动态 SQL 语句。清单 2-13 展示了具有多个参数时的样子，并且内部和外部的名称是不同的。


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@FirstName NVARCHAR(50) = NULL,

    @MiddleName NVARCHAR(50) = NULL,

    @LastName NVARCHAR(50) = NULL,

    @EmailPromotion INT = NULL)

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = N''@FirstName NVARCHAR(50), @MiddleName
    NVARCHAR(50), @LastName NVARCHAR(50), @EmailPromotion INT'';

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE 1 = 1'';

    IF @FirstName IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND FirstName = @FirstName''

    IF @MiddleName IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND MiddleName = @MiddleName''

    IF @LastName IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND LastName = @LastName''

    IF @EmailPromotion IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND EmailPromotion = @EmailPromotion'';

    PRINT @CMD;

    EXEC sp_executesql @CMD, @parameter_list, @FirstName, @MiddleName, @LastName,
    @EmailPromotion;

    END

    Listing 2-13.

    具有多个可选参数的搜索过程

    ```


    这个搜索存储过程有一些有趣的变化。首先，现在有四个参数传入存储过程。注意 `sp_executesql` 命令的语法：首先是命令字符串，然后是内部参数列表，接着是每个单独传入的参数。确保每个列表中的参数顺序匹配至关重要；否则，你可能会将名字传成姓氏，或者更糟，在期望整数的地方传入了字符串。


    这个存储过程的第二个显著变化是所有参数都是可选的。为了实现这一点，`WHERE 1 = 1` 是第一个 `WHERE` 子句，后面跟着每个参数条件。这确保了如果所有参数都是
    `NULL`，你不会剩下一个悬空的 `WHERE` 关键字而后面没有任何子句；否则将导致错误。考虑以下存储过程的执行：


    ```

    EXEC dbo.search_people ''Edward'', ''H'', ''Johnson'', 1

    EXEC dbo.search_people ''Edward'', NULL, NULL, 1

    EXEC dbo.search_people

    ```


    第一个例子提供了所有参数的值，将从 `Person.Person` 表返回一行。TSQL 命令字符串将如下所示：


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    AND FirstName = @FirstName

    AND MiddleName = @MiddleName

    AND LastName = @LastName

    AND EmailPromotion = @EmailPromotion

    ```


    第二个例子将中间名和姓氏设为 `NULL`，得到的命令字符串是：


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    AND FirstName = @FirstName

    AND EmailPromotion = @EmailPromotion

    ```


    最后一个例子没有提供任何参数，并说明了 `WHERE 1 = 1` 占位符的重要性，当你不知道会提供哪些参数（如果有的话）时，它能保持良好的语法结构：


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    ```


    在任何大型应用程序中，如果你搜索的表包含数千（或数百万）行，你可能不希望允许这样的空搜索。通常要求至少一个搜索参数是有益的，这可以防止用户盲目地返回所有数据。将数据库返回的行数限制在一个相对较小的数字也是值得的。常见的默认值包括
    10、25、50 和 100，这确保你永远不会无意中允许用户一次查询表中的数百万行。

