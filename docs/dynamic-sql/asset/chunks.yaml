    OLTP, AlwaysOn, and others—may become configurable inadvertently under these roles.
    Always consider carefully when providing any application or employee with a login.
    Consider the access it has and the worst things they could possibly do and decide
    if those scenarios are acceptable. It cannot be overstated that users cannot cause
    trouble if their permissions don’t allow it. This is especially true if permissions
    are implicitly granted via database or server roles.


    Not all dangerous actions are technical in nature. Many, many terrible things
    happen as a result of human error, human nature, or some combination of the two.
    Consider this scenario that plays out daily at companies around the world: A support
    rep answers the phone. On the other end is a manager from another division. This
    person sounds knowledgeable and is requesting access to restricted data about
    one of your largest customers. The representative, fearful of questioning this
    person, provides the data, hangs up, and forgets this ever happened. Trouble is,
    the person who called didn’t work for the company at all and has gained access
    to important information. He only had to spend a few minutes to acquire it! This
    technique is known as social engineering and it poses a great threat. No amount
    of technology can stop people from using software as it is meant to be used, especially
    if they are motivated to do so.


    Some of the other earlier examples had a similar theme of accidental misfortune.
    The developer who forgets the `WHERE` clause or the disgruntled employee did not
    hack to cause trouble; they simply misused the tools they had at their disposal.
    There are two tactics to defend against these types of incidents. The first is
    utilizing the “Principle of Least Privilege”. It’s worth overstating what has
    already been discussed: Only provide users with the access they need to perform
    the daily functions of their job. An employee without production write-access
    cannot truncate or delete from a table. The new DBA cannot accidentally run a
    schema-altering script in production if he has no ability to make DDL changes.
    If an employee is to be fired, be sure to revoke her access immediately, in order
    to prevent any opportunity for retribution. Review security roles and user access
    annually (or more often if possible) to ensure that changes in your organization
    or software don’t necessitate permissions changes.


    The second defense against human nature is education. Make all employees aware
    of your company’s data and security policies. If these policies don’t exist, then
    work with the appropriate managers to create them. It is important to educate
    all employees, as anyone with access to data, whether via SQL Server Management
    Studio or terminal software at their desk, can potentially make mistakes that
    can cost a great deal in the long run. For developers, QA specialists, IT, and
    other technical folks, encourage accessing data safely. Many utilities exist that
    will highlight and color-code connection strings or warn against any TSQL statements
    that have no `WHERE` clause or affect an entire table. Knowing that you are connected
    to a production server can prevent the dreaded situation when a script was intended
    for the development database, but accidentally runs in production.'
  trans: '

    ## 安全灾难从何而来？


    这个问题的答案有很多，有些显而易见，另一些则更出人意料。让我们考虑一种可能的安全灾难定义：**任何非组织或其安全人员意愿所采取的行动**。这个定义故意较为宽泛，因为我们希望考虑所有可能导致“坏事”发生的方式。任何与数据库打交道足够久的人都经历过以下情况之一：


    *   有黑客试图（或疑似试图）攻击您的组织。

    *   心怀不满的员工在未获得适当授权的情况下修改了数据。

    *   开发人员在她临时编写的 T-SQL 中忘记了 `WHERE` 子句。

    *   一次计划的软件发布出了差错，导致数据丢失。

    *   硬件或软件故障导致基础设施进入非预期状态。

    *   通过应用程序的合法使用进行了非预期的更改。

    *   软件或硬件升级产生了意料之外的后果。


    您很可能还能列举出许多其他足以让您夜不能寐的灾难，但所有这一切的关键都可以归结为两个基本类别：**缺乏规划**和**人为失误**。如何以一种既有意义又不突兀的方式来管理每一种风险？为了不让讨论偏离动态
    SQL 太远，让我们简要回顾这些风险，并为管理它们提供一些起点。


    ### SQL 注入与纵深防御


    请记住之前的讨论：SQL 注入在最坏的情况下被利用时，可能会在错误的时间将服务器的完全控制权拱手交给错误的人。第 2 章针对这一特定的安全威胁提供了解决方案，并指出保护应用程序的最佳方式是在多个层面上提供足够的安全性，使得绕过这些安全措施的总成本变得极高。没有万无一失的方法能保护系统免受所有威胁。就像一个有足够动力的强盗很可能可以闯入任何人的房子一样，一个野心勃勃的黑客（或团队）也能找到办法给您制造麻烦。通过避免任何可能使您的应用程序成为诱人目标的明显安全漏洞，可以阻止攻击。看到坚固的锁、结实的窗户以及明显的安防系统标志的强盗，很可能会转向更容易的目标。


    ### 缺乏规划


    缺乏规划很少会显而易见，直到为时已晚。公司常常推迟高可用性和灾难恢复解决方案的实施，直到经历第一次灾难惊吓之后。渗透测试往往是在发现一次备受瞩目的黑客攻击企图后才首次进行。更严格的升级测试通常是在某次升级出问题之后才被计划和执行。应用程序中的确认提示功能，往往是在客户第一次意外删除了大量数据之后才被加入。适当的规划可以通过员工共同努力来实现，他们将审查应用程序、软件和硬件功能中的常见安全威胁作为其工作职责的一部分。理想情况下，一个由来自不同部门和背景的个人组成的团队会参与其中。虽然数据库专业人员很可能会在服务器中发现有问题的
    T-SQL，但开发人员会发现应用程序中的坏代码，而客服代表可能了解客户在数据方面遇到麻烦的主要方式。


    ### 最小权限原则


    除非用户绝对需要，否则不要为他们分配数据库角色。不惜一切代价避免使用 `sysadmin` 服务器角色。除非应用程序或用户确实需要，否则应尽量减少使用 `db_owner`
    数据库角色。


    如前所述，为应用程序和工具提供所需的最小权限（但不多给）是避免灾难的关键。考虑到 SQL Server 中有大量功能默认包含在 `sysadmin` 和 `db_owner`
    中。随着每个新版本的 SQL Server 发布，都会添加新功能，而这些特性通常也会被包含在这些角色中。因此，如果一个应用程序被分配了拥有这些角色之一的用户，它可能会在升级后获得新的权限。一些目前未使用的功能——如复制、内存
    OLTP、AlwaysOn 等——可能会在这些角色下被无意中变得可配置。在为任何应用程序或员工提供登录名时，务必仔细考虑。考虑它拥有的访问权限以及它可能造成的最坏情况，并判断这些情况是否可以接受。必须强调的是，如果用户的权限不允许，他们就无法制造麻烦。当权限是通过数据库或服务器角色隐式授予时，这一点尤其重要。


    ### 人为失误与社会工程学


    并非所有危险行为都是技术性的。许多许多可怕的事情是由于人为失误、人性弱点或两者结合而发生的。考虑这个每天在全球各地公司上演的情景：一名客服代表接起电话。电话那头是另一个部门的经理。此人听起来很在行，并要求访问有关您最大客户之一的受限数据。这位代表因害怕质疑此人，便提供了数据，挂断电话，并完全忘记了此事。麻烦在于，打电话的人根本不是公司员工，却已经获取了重要信息。他仅仅花了几分钟就得到了它！这种技术被称为**社会工程学**，它构成了巨大威胁。再多的技术也无法阻止人们按软件设计的方式使用软件，尤其当他们有动机这样做时。


    前面提到的其他一些例子也有类似的意外不幸主题。忘记 `WHERE` 子句的开发人员或心怀不满的员工并非通过黑客技术制造麻烦；他们只是误用了手头的工具有两种策略来防御这类事件。


    ### 防御策略：访问控制与教育


    第一种是运用“**最小权限原则**”。值得再次强调已经讨论过的内容：仅提供用户完成其日常工作职能所需的访问权限。没有生产环境写入权限的员工无法对表执行 `truncate`
    或 `delete` 操作。如果新的 DBA 没有进行数据定义语言更改的能力，他就不会意外地在生产环境中运行更改数据库结构的脚本。如果员工即将被解雇，请务必立即撤销其访问权限，以防止任何报复的机会。每年（或尽可能更频繁地）审查安全角色和用户访问权限，以确保组织或软件的变更不需要相应的权限变更。


    第二种针对人性弱点的防御手段是**教育**。让所有员工了解您公司的数据和安全政策。如果这些政策尚不存在，那么与相关经理合作创建它们。教育所有员工都很重要，因为任何能访问数据的人——无论是通过
    `SQL Server Management Studio` 还是他们办公桌上的终端软件——都可能犯下长远来看代价高昂的错误。对于开发人员、质量保证专家、IT
    人员和其他技术人员，鼓励他们安全地访问数据。存在许多工具可以高亮显示并颜色编码连接字符串，或者对任何没有 `WHERE` 子句或影响整张表的 T-SQL 语句发出警告。知道您连接的是生产服务器，可以避免脚本本意是用于开发数据库却意外地在生产环境中运行的可怕情况。

    '
- fmt: '编写结构良好、文档齐全且可维护的代码是维护数据安全的关键第一步。如果所有这些努力之后，数据却因为人为错误而遭到泄露，那对任何IT部门来说都是极大的讽刺。请务必在所有方面保持谨慎，确保应用程序可能遭受攻击的任何角度都得到妥善防御。数据库泄露是由于SQL注入黑客攻击、心怀恐惧的客服代表，还是因为数据库管理员误操作所致，对组织整体而言并无区别。最终结果是相似的，并且应提供所有必要的动力，尽最大可能将应用程序环境从人为因素中保护起来。


    ## 用户、密码与不便


    本章讨论了安全角色、所有权链以及所有可能导致灾难的人为错误方式。所有这些情况都涉及什么？用户。为了使任何这些情况发生，用户的账户必须以某种方式被不当使用。没有什么比定期更改密码更能引起抱怨的了，但强大且一致的密码策略是防御密码黑客攻击或旧账户被复活用于恶意目的的好方法。


    在使用Windows身份验证时，请确保为所有Windows用户配置了可接受的密码策略。要求密码满足一定级别的复杂性，不允许用户重复使用密码，并强制用户定期重置密码。这不仅会将账户被泄露的可能性降到最低，还会大大降低较少使用（或被遗忘）的账户在不知情的情况下被使用的可能性。还要确保Active
    Directory保持最新状态，并且所有员工的账户在离职时都被禁用。微软坚持认为Windows身份验证是SQL Server推荐的 security 形式，但要确保你的服务器尽可能安全，那些Windows账户本身也必须是安全的。当使用Windows身份验证时，你的SQL
    Server的安全性等同于被授予访问权限的Windows用户的安全性。必要时与你的网络或系统管理员合作，确保所有Windows账户都是安全的，然后确认只有必要的账户才能访问你的SQL服务器。


    如果使用SQL Server身份验证，请务必为每个服务器做出同样明智的决策，如图[4-4](#A371168_1_En_4_Chapter.html#Fig4)所示。


    ![A371168_1_En_4_Fig4_HTML.jpg](A371168_1_En_4_Fig4_HTML.jpg)


    图 4-4.


    典型的SQL Server用户身份验证选项


    创建用户时，你可以配置他们的安全设置。也可以随时通过选择用户属性来调整设置。请务必强制执行密码策略和过期策略，如图[4-4](#A371168_1_En_4_Chapter.html#Fig4)中的复选框所示。这些策略继承自Windows，可能来自服务器策略或Active
    Directory/组策略。此策略可以包含额外的安全功能，例如锁定登录尝试失败次数过多的用户。


    包括IT专业人员在内的用户都会抱怨更改密码和处理策略带来的不便。然而，这些规则带来的好处远远超过了不便。如果员工习惯了密码规则，并且有长期被公平应用的记录，他们的抱怨通常会降到最低。在处理安全规则时，往往是打破习惯最可能导致混淆和错误。提前规划并为你的数据库服务器配置强大、一致的用户安全策略，将有助于以很少的成本（对你或你的用户而言）在长期内保护你的数据。


    ## 动态SQL维护


    随着时间的推移，所有数据库对象都需要一定程度的维护。随着应用程序的发展、表的增长、对象的添加和删除以及软件的升级，存储过程、函数、视图、作业、维护计划等也需要更新。这种维护是任何软件生命周期的常规部分，但在动态SQL的情况下更为关键。每当创建或更改存储过程或函数等对象时，会检查其中的语法和对象是否有效。如果存在任何语法错误或任何对象不正确，将立即抛出错误，并且`CREATE/ALTER`语句将失败。由于动态SQL命令字符串不受解析或绑定约束，即使其内容无效，它们也会始终创建成功。


    这为开发人员和数据库管理员带来了重大的维护挑战。当对象的引用不受任何SQL Server限制强制执行时，如何维护它们？在设计和规划应用程序版本时，有几种解决方案可以让您的生活更轻松。第一个也是最基本的解决方案是记录存储过程、作业、函数和其他对象及其依赖关系。无需过度详细，但此文档应易于搜索，并允许任何人快速查找对象的基本功能并验证任何主要依赖关系。一些组织会在称为数据字典的数据库中实现此文档。数据字典没有硬性规定；它们只是将数据库模式组织成可管理的参考指南的一种方式。具体细节留待每个组织根据自己开发和维护流程的最佳实践进行管理。


    无论是作为数据库、电子表格、Wiki还是文本文档实现，以某种方式组织你的数据库对象都将为整个组织提供一个宝贵的工具。他们将能够轻松了解数据库对象，而无需追踪领域专家寻求帮助。此外，当计划应用程序变更时，确定依赖关系和受这些变更影响的区域将显著更容易。最简单的数据字典将是表、列、索引、存储过程等的列表。可以添加额外信息，描述每个对象的功能、最常处理它们的开发人员以及与其他对象或软件模块的关系。


    如果说文档是组织应用程序开发环境的方式，那么清理则是防止其不可避免地陷入无法维护的混乱状态的方法。组织非常重视在软件中创建新功能，并且通常对快速发布新功能表现出浓厚兴趣，特别是如果这些新功能能为组织赚钱的话。必须在新技术功能和技术债之间保持微妙的平衡。技术债是每个开发人员都再熟悉不过的累积待办事项清单。急需但没人有时间进行的升级、清理未使用的对象、旧代码的性能优化等等，都是技术债的例子。无论你的文档多么出色，要跟踪所有这些例外和遗留物都会变得困难。随着新项目成为焦点，资深开发人员退休或离职，开发人员会逐渐忘记它们。清理旧的数据库对象和对已弃用TSQL的引用对于保持代码可维护性至关重要。'
  raw: 'Writing well-structured, documented, and maintainable code is a critical first
    step toward maintaining data security. To take all of those efforts and have data
    compromised as a result of human error would be an example of the ultimate irony
    for any IT department. Take care to exercise diligence on all fronts so that any
    angle that your application could be attacked is well defended against. Whether
    a compromised database is due to a SQL injection hack, a fearful customer service
    representative, or a database administrator with a fat finger is irrelevant to
    the organization as a whole. The end results are similar and should provide all
    of the necessary motivation to secure the application environment as much as possible
    from the human factor.


    ## Users, Passwords, and Inconvenience


    The chapter has discussed security roles, ownership chaining, and all of the ways
    in which human error can lead to disaster. What do all of these situations involve?
    Users. In order for any of these situations to come to fruition, a user’s account
    must somehow be used improperly. There are few actions that elicit more groans
    than having to change your password regularly, but a strong and consistent password
    policy is a good defense against password hacking or old accounts that get resurrected
    for nefarious purposes.


    When using Windows authentication , be sure to have all Windows users configured
    with an acceptable password policy. Require passwords to meet some level of complexity,
    don’t allow users to reuse passwords, and force users to reset their passwords
    every so often. Not only will this minimize the chances that an account could
    be compromised, it greatly reduces the chance that a lesser used (or forgotten)
    account could somehow be used without your knowing. Also ensure that Active Directory
    is kept up-to-date and that all employees’ accounts are disabled when they leave
    the company. Microsoft is adamant that Windows authentication is the recommended
    form of security in SQL Server, but to be certain that your server is as secure
    as possible, those Windows accounts must also be secure. When using Windows authentication,
    your SQL Server is only as safe as the Windows users who are provided access to
    it. Work with your network or systems administrator as necessary to ensure that
    all Windows accounts are secure and then confirm that only necessary accounts
    have access to your SQL servers.


    If SQL Server authentication is used, be sure to make the same smart decisions
    for each server, as shown in Figure [4-4](#A371168_1_En_4_Chapter.html#Fig4).


    ![A371168_1_En_4_Fig4_HTML.jpg](A371168_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Typical SQL Server user authentication options


    When users are created, you can configure their security settings. You can also
    adjust settings at any time by selecting the properties for a user. Be sure to
    enforce the password policy and expiration policy, as indicated by the checkbox
    in Figure [4-4](#A371168_1_En_4_Chapter.html#Fig4). These policies are inherited
    from Windows, either from a server policy or from an Active Directory/group policy.
    This policy can include additional security features, such as locking out users
    who fail too many login attempts.


    Users, including IT professionals, will gripe about the inconvenience of changing
    passwords and dealing with policies. However, the benefits of these rules far
    outweigh the inconvenience. If employees are used to the password rules and have
    had a long history of them being applied fairly, their complaints will generally
    be minimized. It is often the breaking of habit that is most responsible for confusion
    and mistakes when dealing with security rules. Planning ahead and configuring
    your database servers with strong, consistent user security will help to safeguard
    your data in the long run at little cost to you or your users.


    ## Dynamic SQL Maintenance


    Over time, all database objects will require some amount of maintenance . As applications
    evolve, tables grow, objects are added and removed, and software is upgraded,
    stored procedures, functions, views, jobs, maintenance plans, and more will require
    updating as well. This maintenance is a regular part of any software lifecycle,
    but is even more critical in the case of Dynamic SQL. Whenever an object such
    as stored procedure or function is created or altered, syntax and objects within
    it are checked for validity. If there are any syntax errors or if any objects
    are incorrect, errors will be thrown immediately and the `CREATE/ALTER` statement
    will fail. Since Dynamic SQL command strings are not subject to parsing or binding,
    they will always be created successfully, even if their contents are invalid.


    This poses a significant maintenance challenge for both developers and database
    administrators. How are objects maintained when their references are not enforced
    by any SQL Server restrictions? There are several solutions that can make your
    life easier as application releases are being designed and planned. The first
    and most basic solution is to document stored procedures, jobs, functions, and
    other objects and their dependencies. There is no need to go into excessive detail,
    but this documentation should be easily searchable and allow anyone to quickly
    look up the basic functionality of an object and verify any major dependencies.
    Some organizations will implement this documentation in a database called a data
    dictionary. There are no codified rules for data dictionaries; they simply are
    a way to organize your database schema into a manageable reference guide. The
    details are left to each organization to manage as they see best for their own
    development and maintenance processes.


    Whether implemented as a database, spreadsheet, Wiki, or text document, organizing
    your database objects in some fashion will provide an invaluable tool for the
    entire organization. They will easily be able to learn about database objects
    without having to track down a domain expert for help. In addition, when application
    changes are planned, determining the dependencies and areas that are affected
    by those changes will be significantly easier. The simplest data dictionary would
    be a list of tables, columns, indexes, stored procedures, and so on. Additional
    information can be added that describes the functionality of each object, the
    developers who worked most on them, and relationships to other objects or software
    modules.


    If documentation is how you organize your application development environment,
    then cleanup is how you prevent an inevitable descent into an unmaintainable mess.
    Organizations greatly value the creation of new features in software and will
    generally show great interest in releasing new features rapidly, especially if
    those new features can earn money for the organization. A fine balance must be
    maintained between new features and technical debt. Technical debt is the accumulated
    to-do list that every developer knows all too well. The much-needed upgrade that
    no one has time for, cleaning up unused objects, performance optimization of old
    code, and so on, are all examples of technical debt. No matter how good your documentation
    is, it becomes difficult to keep track of all of these exceptions and relics.
    Developers slowly forget about them as newer projects take the forefront, and
    older developers retire or move on. Cleaning up old database objects and references
    to deprecated TSQL is critical to keeping code maintainable.'
  trans: '

    编写结构良好、文档齐全且可维护的代码是维护数据安全的关键第一步。如果在付出了所有这些努力之后，数据却因人为错误而泄露，那对任何 IT 部门来说都是极大的讽刺。请务必在所有方面保持谨慎，确保应用程序可能遭受攻击的任何角度都得到妥善防御。无论数据库泄露是源于
    SQL 注入黑客攻击、心怀恐惧的客服代表，还是数据库管理员的误操作，对组织整体而言并无区别。最终结果是相似的，这应当提供所有必要的动力，尽最大可能将应用程序环境中的人为因素隔离开来。


    ## 用户、密码与不便


    本章讨论了安全角色、所有权链以及所有可能导致灾难的人为错误方式。所有这些情况都涉及一个共同元素：用户。要使任何这些情况发生，用户的账户必须以某种方式被不当使用。没有什么比定期更改密码更能引起抱怨的了，但强大且一致的密码策略是防御密码黑客攻击或旧账户被复活用于恶意目的的好方法。


    在使用 Windows 身份验证时，请确保为所有 Windows 用户配置了可接受的密码策略。要求密码满足一定级别的复杂性，不允许用户重复使用密码，并强制用户定期重置密码。这不仅会将账户被泄露的可能性降到最低，还会大大降低较少使用（或被遗忘）的账户在不知情的情况下被使用的可能性。还要确保
    Active Directory 保持最新状态，并且所有员工的账户在离职时都被禁用。微软坚持认为 Windows 身份验证是 SQL Server 推荐的安全形式，但要确保你的服务器尽可能安全，那些
    Windows 账户本身也必须是安全的。当使用 Windows 身份验证时，你的 SQL Server 的安全性等同于被授予访问权限的 Windows 用户的安全性。必要时与你的网络或系统管理员合作，确保所有
    Windows 账户都是安全的，然后确认只有必要的账户才能访问你的 SQL 服务器。


    如果使用 SQL Server 身份验证，请务必为每个服务器做出同样明智的决策，如图 4-4 所示。


    ![A371168_1_En_4_Fig4_HTML.jpg](img/A371168_1_En_4_Fig4_HTML.jpg)


    图 4-4.

    典型的 SQL Server 用户身份验证选项


    创建用户时，你可以配置他们的安全设置。也可以随时通过选择用户属性来调整设置。请务必强制执行密码策略和过期策略，如图 4-4 中的复选框所示。这些策略继承自
    Windows，可能来自服务器策略或 Active Directory/组策略。此策略可以包含额外的安全功能，例如锁定登录尝试失败次数过多的用户。


    包括 IT 专业人员在内的用户都会抱怨更改密码和处理策略带来的不便。然而，这些规则带来的好处远远超过了不便。如果员工习惯了密码规则，并且有长期被公平应用的记录，他们的抱怨通常会降到最低。在处理安全规则时，往往是打破习惯最可能导致混淆和错误。提前规划并为你的数据库服务器配置强大、一致的用户安全策略，将有助于以很少的成本（对你或你的用户而言）在长期内保护你的数据。


    ## 动态 SQL 维护


    随着时间的推移，所有数据库对象都需要一定程度的维护。随着应用程序的发展、表的增长、对象的添加和删除以及软件的升级，存储过程、函数、视图、作业、维护计划等也需要更新。这种维护是任何软件生命周期的常规部分，但在动态
    SQL 的情况下更为关键。每当创建或更改存储过程或函数等对象时，系统会检查其中的语法和对象引用是否有效。如果存在任何语法错误或任何对象不正确，将立即抛出错误，并且`CREATE/ALTER`语句将失败。由于动态
    SQL 命令字符串不受解析或绑定约束，即使其内容无效，它们也会始终创建成功。


    这为开发人员和数据库管理员带来了重大的维护挑战。当对象的引用不受任何 SQL Server 限制强制执行时，如何维护它们？在设计和规划应用程序版本时，有几种解决方案可以让您的生活更轻松。第一个也是最基本的解决方案是记录存储过程、作业、函数和其他对象及其依赖关系。无需过度详细，但此文档应易于搜索，并允许任何人快速查找对象的基本功能并验证任何主要依赖关系。一些组织会在称为数据字典的数据库中实现此文档。数据字典没有硬性规定；它们只是将数据库模式组织成可管理的参考指南的一种方式。具体细节留待每个组织根据自己开发和维护流程的最佳实践进行管理。


    无论是作为数据库、电子表格、Wiki 还是文本文档实现，以某种方式组织你的数据库对象都将为整个组织提供一个宝贵的工具。他们将能够轻松了解数据库对象，而无需追踪领域专家寻求帮助。此外，当计划应用程序变更时，确定依赖关系和受这些变更影响的区域将显著更容易。最简单的数据字典将是表、列、索引、存储过程等的列表。可以添加额外信息，描述每个对象的功能、最常处理它们的开发人员以及与其他对象或软件模块的关系。


    如果说文档是组织应用程序开发环境的方式，那么清理则是防止其不可避免地陷入无法维护的混乱状态的方法。组织非常重视在软件中创建新功能，并且通常对快速发布新功能表现出浓厚兴趣，特别是如果这些新功能能为组织赚钱的话。必须在新技术功能和技术债之间保持微妙的平衡。技术债是每个开发人员都再熟悉不过的累积待办事项清单。急需升级但没人有时间进行的升级、清理未使用的对象、旧代码的性能优化等等，都是技术债的例子。无论你的文档多么出色，要跟踪所有这些例外和遗留物都会变得困难。随着新项目成为焦点，资深开发人员退休或离职，开发人员会逐渐忘记它们。清理旧的数据库对象和对已弃用
    TSQL 的引用对于保持代码可维护性至关重要。

    '
- fmt: 'The objects that you put out of sight and mind about today can easily become
    security holes in the future. The `Dynamic SQL` that everyone forgot about quickly
    becomes the giant blob of string text that nobody wants to decipher. The application
    works and no one wants to mess with a poorly documented unknown object. Prevent
    this situation by making it a regular part of the release cycle to review all
    potential dependencies and take the appropriate actions to address them. Make
    sure that all objects that are no longer needed are removed. Those that require
    updating should be analyzed and the correct updates applied. These relics become
    security concerns as your software, security, and policies change. Old encryption
    algorithms that used to be considered solid and effective are eventually deprecated
    as modern technology renders them too weak to rely on anymore. The new coding
    standards that apply to all new stored procedures provide no defense against a
    poorly written proc from ten years ago. The `TSQL` written back when the company
    was a startup by developers putting in 16-hour days needs to be given the same
    treatment as the new objects that are created by a better equipped development
    team.


    While documentation is extremely helpful in determining how to utilize, reference,
    and manage new and existing objects, how do you perform those initial searches
    to find out what those many references are? SQL Server provides a number of system
    views that provide extensive details on database objects, how they relate to each
    other, and the `TSQL` text that their `CREATE` statements contain. By leveraging
    these views, you can build a multi-purpose search stored procedure that uses a
    variety of system views and `Dynamic SQL` to return a list of objects that contain
    a given search term, as shown in Listing [4-5](#A371168_1_En_4_Chapter.html#Par110).'
