    This stored procedure illustrates a basic framework for building your own customized
    backup plan, providing complete control over all of the details. As an added bonus,
    you can accomplish your tasks using a single job and stored procedure, rather
    than potentially many maintenance plans and/or maintenance plan tasks.


    Some possibilities for additional functionality include:


    *   Logging of backup time and duration for each operation.

    *   Cleanup of old backup records in MSDB.

    *   Cleanup of old backup files from the output location.

    *   Customized alerts if backups fail or take longer than a specific time limit.

    *   Try/catch blocks in order to manage any errors in the stored procedure.


    There are certainly many other options available for your consideration. In this
    example, all databases (except for a handful of system ones) were backed up, but
    you could just as easily have omitted the `WHERE` clause or adjusted it so that
    you backed up a specific set of databases on the server. Additionally, system
    databases could be managed separately if they had a unique set of rules to follow.


    The backup times for this stored procedure were determined by the job run time,
    but could also be built in as stored proc parameters. Both scenarios work and
    which one you use depends on how you prefer to manage that data. An additional
    option that would go well with parameters is to store metadata in a permanent
    control table. This would provide information about databases to backup, frequency,
    and type and could easily be customized to fit the needs of your environment.


    If running a stored procedure in SQL Server seems limiting for the operations
    you are considering, then you could use PowerShell or SSIS to provide better access
    to the file system and Windows functionality. As with the index maintenance example,
    the limits to your success with this model are primarily time and creativity.


    ## Saving Generated Scripts


    Dynamic SQL can be written as part of stored procedures in order to execute as
    needed by an application, but it also be saved for later. Dynamic SQL can be used
    to generate a command string that is then saved to a file or a new stored procedure
    in order to be executed at a future time or as part of another application.


    This flexibility can be convenient when there is a process with many steps in
    which certain ones must execute on a rigid schedule. For example, you may wish
    to generate a script based on the schema in a database at midnight, but not return
    the data itself until a data load completes at 4AM. Alternatively, you may wish
    to review the SQL file or save it elsewhere for posterity, prior to or in addition
    to executing it. One other way to accomplish this and avoid moving data into the
    operating system is to store it in a table.


    ### Saving Scripts to a Table


    The simplest method of saving a command string is to insert it into a table. This
    allows for additional flexibility in that you could add timestamps to commands
    or save old commands. To facilitate this process, you will create a table to store
    the command data, as shown in Listing [11-4](#A371168_1_En_11_Chapter.html#Par69).


    ```sql

    CREATE TABLE dbo.sql_command

    (       command_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_sql_commands PRIMARY
    KEY CLUSTERED,

    sql_command NVARCHAR(MAX) NOT NULL,

    time_stamp DATETIME NOT NULL CONSTRAINT DF_sql_commands_time_stamp DEFAULT (CURRENT_TIMESTAMP)    );

    ```


    Listing 11-4.

    Table to Store Dynamic SQL Output


    Note that there is an additional column that stores a default timestamp. This
    ensures that any TSQL that is saved can be associated easily with the time it
    was generated. In order to demonstrate using this table, let’s modify the index
    defragmentation stored procedure from earlier in order to insert to it, rather
    than print to the GUI, as shown in Listing [11-5](#A371168_1_En_11_Chapter.html#Par71).'
