  trans: '```''administrator'''' --''```


    得到的命令字符串显示，`WHERE`子句的剩余部分被注释掉了，从而绕过了密码检查：


    ```SELECT

    *

    FROM dbo.password

    WHERE username = ''administrator'' --'' AND Password = ''my_password''```


    一个未闭合的注释分隔符 `/*` 可能会被尝试用于绕过多行查询，或那些已采取一些防护措施的查询。


    对于一个熟练的黑客来说，这仅仅是个开始。从这里起，他们可以开始测试你数据库的结构，了解表、存储过程、视图的名称，以及应用程序运行所使用的用户的安全权限。为了做到这一点，他们会不断改写搜索框的输入，试图获取更多信息，如代码清单
    2-7 所示。


    ```DECLARE @CMD NVARCHAR(MAX);

    DECLARE @search_criteria NVARCHAR(1000);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @search_criteria = ''Smith''''; SELECT * FROM sys.tables WHERE ''''''''
    = ''''''

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    EXEC sp_executesql @CMD;

    代码清单 2-7.

    从输入参数中闭合动态 SQL 字符串以探测模式对象```


    经过对撇号的一番尝试，黑客已经弄明白了如何闭合搜索语句并开始一个属于自己的新语句。通过从 `sys.tables` 选择数据，他现在已经收集了数据库中所有表的列表。如果他无法访问系统视图，那么猜测仍然会产生一些结果，因为大多数数据库的对象名称在某种程度上是可预测的。更多的猜测会导致更高的风险，因为许多失败的
    `TSQL` 语句或单个用户由此搜索产生的高活动量最终可能会引起怀疑。不幸的是，大多数公司没有时间或资源来持续监控和守护他们的网络日志。通常，这些漏洞在数据被盗后才被发现，为时已晚。


    黑客的下一步将是识别感兴趣的特定表：那些包含密码、信用卡号或其他有价值数据的表。此外，他现在可以运行应用程序用户有权限执行的任何 `SQL` 语句，而不会产生进一步的错误，如代码清单
    2-8 所示。


    ```DECLARE @CMD NVARCHAR(MAX);

    DECLARE @search_criteria NVARCHAR(1000);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @search_criteria = ''Smith''''; SELECT * FROM Person.Password WHERE ''''''''
    = ''''''

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    EXEC sp_executesql @CMD;

    代码清单 2-8.

    使用 SQL 注入自由收集密码数据```


    此时，黑客可以获取他能从数据库中收集的任何数据。如果你幸运的话，关键数据会被加密，这降低了立即访问敏感数据的可能性。然而，拥有这种级别的数据库访问权限，黑客可能能够收集足够的额外信息来访问其他系统，并最终解密那些数据。这是一个极好的例子，说明了为什么高权限账户（如
    `sa`）绝不应在应用程序登录的上下文中使用。


    有一个最坏的情况，在近代历史中已经多次上演。如果黑客想要搞破坏，他可以利用新发现的数据库访问权限来删除数据、截断（truncate）或删除（drop）表，甚至从磁盘删除备份文件。他如何访问磁盘上的文件？如果你的服务器上启用了
    `xp_cmdshell`，那么黑客可能能够使用它来访问从那里直接可访问的任何数据。他还可能调整服务器设置、更改数据库和服务器安全性、添加或删除用户等等。此时的限制只受限于你的想象力。


    请在所有可从内部网络外部访问的数据库服务器上禁用 `xp_cmdshell`。作为额外的安全措施，在任何非绝对需要的地方禁用它！


    除了 `xp_cmdshell`，其他系统存储过程也应该限制其安全性。`xp_regread`、`xp_regwrite`、`xp_servicecontrol`、`xp_loginconfig`、`sp_addextendedproc`
    以及许多其他过程可以提供远超你期望的对服务器和操作系统的访问权限。务必要限制对这些过程的访问，以便任何不需要它们的用户无法使用它们。其他可能危险的函数包括
    `HOST_NAME()`、`OPENQUERY()`、`OPENROWSET()`、`SHUTDOWN` 和 `KILL`。


    另一种使情况雪上加霜的情形是，黑客希望从他们的行动中获利。他们可能会试图敲诈你的公司，以图从其努力中获利：“付钱，否则就看着你珍贵的数据化为灰烬！”更复杂的情况是，黑客试图通过发起
    `DDOS`（分布式拒绝服务）攻击来掩盖其数据盗窃行为。大量涌入的 Web/数据请求会压垮你的 Web 服务器，使你无暇顾及他们的真实意图。


    还有额外的 `SQL` 注入攻击被记录在案，其中黑客并未窃取数据、删除表或以其他方式立即暴露自己的存在。相反，她会利用新发现的访问权限修改网页代码，插入指向病毒、恶意软件或其他恶意代码的链接，这些恶意代码可以攻击任何访问该网页的人。这极大地扩展了攻击范围，并可能导致重大损害，直到目标意识到发生了什么，移除恶意代码，并修补最初的
    `SQL` 注入目标。


    这些场景很可怕，但绝非睡前故事出了错。在本章的剩余部分，我们将讨论这种噩梦般的情况，包括你可以采取哪些步骤来缓解导致数据库服务器被外部人员渗透的每一个错误。'
- fmt: '## Cleansing Inputs


    The first step toward guarding against SQL injection is to ensure that all inputs
    are clean and that no invalid data can be passed in. This is a responsibility
    that is shared by developers (via code) and database administrators (via SQL).
    In an ideal environment, inputs are cleansed at all stages of execution. The web
    page or application that initially prompts for inputs should make efforts to ensure
    that invalid entries are not allowed. Some common methods are:


    *   Generate a custom error message for the user that indicates that invalid characters
    or text were entered.

    *   Strip out the invalid characters and allow execution to proceed.

    *   Define roles for input data and if the entry doesn’t fit that specific format,
    throw an error to the user. For example, a birthdate could be in the form MMDDYYYY,
    and all other entries disallowed.

    *   Implement a software framework that automatically handles the cleansing of
    inputs for you.


    These efforts will greatly enhance security and ensure that end users receive
    immediate feedback regarding the data they input. A good application will implement
    at least one, but likely several of these safeguards. A great application will
    implement all of them, regardless of those efforts seeming redundant or unnecessary.
    As a database professional, you’ll want these protections, but cannot rely on
    them. It is your responsibility to ensure that all parameters that are passed
    into your `TSQL` are cleansed with the same level of diligence. Doing so on all
    layers of a software application ensures the highest level of protection in the
    event that mistakes are made.


    SQL Server error messages should always be handled internally via code and never
    exposed to end users. Instead, provide them with a friendly error message and
    reporting instructions.


    The simplest way to cleanse inputs is to directly address them at the start of
    the code. In an attempt to keep the sample code as easy to read as possible, we’ll
    use stored procedures for any reusable code going forward. Listing [2-9](#A371168_1_En_2_Chapter.html#Par55)
    reconsiders the search from earlier and adds some basic input cleansing at the
    top.


    ```sql

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(1000) = NULL) -- This comes from user input

    AS

    BEGIN

    SELECT @search_criteria = REPLACE(@search_criteria, '''''''', '''''''''''');

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    END

    GO

    EXEC dbo.search_people ''Smith'';

    EXEC dbo.search_people ''O''''Brien'';

    EXEC dbo.search_people '''''' SELECT * FROM Person.Password; SELECT '''''';

    ```

    Listing 2-9. Basic Input-Cleansing Search Procedure


    This stored procedure contains a single addition at the top: all instances of
    an apostrophe are replaced with a pair of apostrophes. This guarantees that if
    anyone enters apostrophes, they will not break the string and cause immediate
    errors or obvious SQL injection vulnerabilities. The results of each of the three
    executions are as follows:


    ```sql

    SELECT * FROM Person.Person

    WHERE LastName = ''Smith''

    SELECT * FROM Person.Person

    WHERE LastName = ''O''''Brien''

    SELECT * FROM Person.Person

    WHERE LastName = '''''' SELECT * FROM Person.Password; SELECT ''''''

    ```


    In the first example, `Smith` is entered and all people with the last name of
    `Smith` are returned as usual. When an `O''Brien` enters their last name, the
    apostrophe is doubled, his name is searched, and results are found normally, without
    any error messages. When any malicious users try to access passwords within the
    database, they are given an empty result set. Since the apostrophes are doubled
    in all cases, this string of attempted SQL injection turns into a harmless string
    with no holes in it.


    SQL Server has a built-in function whose purpose is to ensure that string contents
    are correctly delimited. `QUOTENAME` takes two parameters: The string to be cleansed
    and the character that will be verified. The stored procedure in Listing [2-10](#A371168_1_En_2_Chapter.html#Par60)
    is similar to above, but the `REPLACE` operation has been updated to use `QUOTENAME`
    instead.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(1000) = NULL) -- This comes from user input

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '';

    SELECT @CMD = @CMD + QUOTENAME(@search_criteria, '''''''');

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    END

    GO

    EXEC dbo.search_people ''Smith'';

    EXEC dbo.search_people ''O''''Brien'';

    EXEC dbo.search_people '''''' SELECT * FROM Person.Password; SELECT '''''';

    ```

    Listing 2-10. Input-Cleansing Search Procedure, Implemented Using QUOTENAME


    `QUOTENAME` handles the apostrophe cleansing for you, and as a result, you no
    longer need to wrap the last name portion of the command string in additional
    apostrophes. The output of this stored procedure is exactly the same as in the
    last example. Each name is correctly delimited with apostrophes to ensure that
    the search criteria will not cause any opportunities for errors to occur. In addition
    to apostrophes, `QUOTENAME` can be used to delimit square brackets (`[`, `]`),
    as well as a quotation mark (`"`).'
  raw: '## Cleansing Inputs


    The first step toward guarding against SQL injection is to ensure that all inputs
    are clean and that no invalid data can be passed in. This is a responsibility
    that is shared by developers (via code) and database administrators (via SQL).
    In an ideal environment, inputs are cleansed at all stages of execution. The web
    page or application that initially prompts for inputs should make efforts to ensure
    that invalid entries are not allowed. Some common methods are:


    *   Generate a custom error message for the user that indicates that invalid characters
    or text were entered.

    *   Strip out the invalid characters and allow execution to proceed.

    *   Define roles for input data and if the entry doesn’t fit that specific format,
    throw an error to the user. For example, a birthdate could be in the form MMDDYYYY,
    and all other entries disallowed.

    *   Implement a software framework that automatically handles the cleansing of
    inputs for you.


    These efforts will greatly enhance security and ensure that end users receive
    immediate feedback regarding the data they input. A good application will implement
    at least one, but likely several of these safeguards. A great application will
    implement all of them, regardless of those efforts seeming redundant or unnecessary.
    As a database professional, you’ll want these protections, but cannot rely on
    them. It is your responsibility to ensure that all parameters that are passed
    into your TSQL are cleansed with the same level of diligence. Doing so on all
    layers of a software application ensures the highest level of protection in the
    event that mistakes are made.


    SQL Server error messages should always be handled internally via code and never
    exposed to end users. Instead, provide them with a friendly error message and
    reporting instructions.


    The simplest way to cleanse inputs is to directly address them at the start of
    the code. In an attempt to keep the sample code as easy to read as possible, we’ll
    use stored procedures for any reusable code going forward. Listing [2-9](#A371168_1_En_2_Chapter.html#Par55)
    reconsiders the search from earlier and adds some basic input cleansing at the
    top.


    ```

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(1000) = NULL) -- This comes from user input

    AS

    BEGIN

    SELECT @search_criteria = REPLACE(@search_criteria, '''''''', '''''''''''');

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    END

    GO

    EXEC dbo.search_people ''Smith'';

    EXEC dbo.search_people ''O''''Brien'';

    EXEC dbo.search_people '''''' SELECT * FROM Person.Password; SELECT '''''';

    Listing 2-9.

    Basic Input-Cleansing Search Procedure

    ```


    This stored procedure contains a single addition at the top: all instances of
    an apostrophe are replaced with a pair of apostrophes. This guarantees that if
    anyone enters apostrophes, they will not break the string and cause immediate
    errors or obvious SQL injection vulnerabilities. The results of each of the three
    executions are as follows:


    ```

    SELECT * FROM Person.Person

    WHERE LastName = ''Smith''

    SELECT * FROM Person.Person

    WHERE LastName = ''O''''Brien''

    SELECT * FROM Person.Person

    WHERE LastName = '''''' SELECT * FROM Person.Password; SELECT ''''''

    ```


    In the first example, `Smith` is entered and all people with the last name of
    Smith are returned as usual. When an `O''Brien` enters their last name, the apostrophe
    is doubled, his name is searched, and results are found normally, without any
    error messages. When any malicious users try to access passwords within the database,
    they are given an empty result set. Since the apostrophes are doubled in all cases,
    this string of attempted SQL injection turns into a harmless string with no holes
    in it.


    SQL Server has a built-in function whose purpose is to ensure that string contents
    are correctly delimited. `QUOTENAME` takes two parameters: The string to be cleansed
    and the character that will be verified. The stored procedure in Listing [2-10](#A371168_1_En_2_Chapter.html#Par60)
    is similar to above, but the `REPLACE` operation has been updated to use `QUOTENAME`
    instead.


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(1000) = NULL) -- This comes from user input

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '';

    SELECT @CMD = @CMD + QUOTENAME(@search_criteria, '''''''');

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    END

    GO

    EXEC dbo.search_people ''Smith'';

    EXEC dbo.search_people ''O''''Brien'';

    EXEC dbo.search_people '''''' SELECT * FROM Person.Password; SELECT '''''';

    Listing 2-10.

    Input-Cleansing Search Procedure, Implemented Using QUOTENAME

    ```


    `QUOTENAME` handles the apostrophe cleansing for you, and as a result, you no
    longer need to wrap the last name portion of the command string in additional
    apostrophes. The output of this stored procedure is exactly the same as in the
    last example. Each name is correctly delimited with apostrophes to ensure that
