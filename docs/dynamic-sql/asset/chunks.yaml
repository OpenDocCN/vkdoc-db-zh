    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductModel''. Scan count 1, logical reads 2, physical reads 0, read-ahead
    reads 0, lob logical reads 0, loc physical reads 0, lob read-ahead reads 0.

