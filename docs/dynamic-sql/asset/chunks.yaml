    ## 在动态 SQL 中管理作用域

    处理动态 SQL 中的作用域与处理存储过程中的作用域没有太大区别。可以将动态 SQL 语句中的所有内容想象成与你的其余 T-SQL 代码是分离的，并相应地处理。为了说明其相似之处，请考虑以下
    T-SQL 代码，它与之前的搜索示例类似：


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    DECLARE @FirstName NVARCHAR(50) = ''''Edward'''';

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @FirstName;''

    EXEC sp_executesql @sql_command;

    SELECT @FirstName

    ```


    在这个例子中，变量 `@FirstName` 在命令字符串内声明，因此它在动态 SQL 语句的作用域之外**不可用**。最后的 `SELECT` 语句将失败，因为
    `@FirstName` 不再存在：


    ```

    Msg 137, Level 15, State 2, Line 84

    必须声明标量变量 "@FirstName"。

    ```


    类似地，在命令字符串外部声明的变量也无法在内部使用。最后，多个命令字符串各自在自己的作用域中执行。在一个命令字符串中声明的变量在另一个动态 SQL 语句中将不可用。


    作用域的存在既是为了方便，也是作为一种安全特性。如果在代码中某处声明的变量在任何地方都可用，那么你需要非常仔细地跟踪每一个变量，以确保在打算使用新变量时不会意外地重用现有变量。将
    T-SQL 片段彼此分离并打破所有权链，有助于将不同的 SQL 语句分隔开来，并防止任何一个应用程序或函数越界。虽然一开始可能觉得需要更仔细地管理所有这些变量很不方便，但
    SQL Server 在任何情况下都提供了许多有效的工具来做到这一点。


    ## 在动态 SQL 中使用 OUTPUT

    默认情况下，任何传递到 `sp_executesql` 的变量都是**只读的**。也就是说，它们可以在需要时在动态 SQL 的作用域内使用，但当动态 SQL
    执行完毕，控制权返回到调用它的 T-SQL 时，对参数所做的任何更改都不会被保存。请考虑清单 5-2 中的 T-SQL 代码，重点关注对 `@FirstName`
    参数的 `UPDATE` 操作。


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    DECLARE @first_name NVARCHAR(50) = ''Edward'';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name;

    SELECT @first_name = ''''Xavier'''';

    SELECT @first_name;

    ''

    SELECT @parameter_list = ''@first_name NVARCHAR(50)''

    EXEC sp_executesql @sql_command, @parameter_list, @first_name;

    SELECT @first_name;

    GO

    清单 5-2. 动态 SQL：在命令字符串内重新分配参数

    ```


    在此示例中，命令字符串内执行的最后一个操作是将名称 "Xavier" 重新赋给参数 `@first_name`。尽管该参数是只读的，但你被允许在动态 SQL
    内更改其值。新值将保持有效且在作用域内，直到动态 SQL 结束。需要重点注意的是，尽管你在动态 SQL 内外使用了相同的变量名 `@first_name`，但它们仍然被视为完全独立的变量。根据你的应用程序需求，使用不同的变量名可能有助于区分不同的变量，而使用相同的变量名则可以在跨不同作用域的
    T-SQL 语句中更明显地看出一个不同的值正在被使用。输出结果如图 5-2 所示。


    ![A371168_1_En_5_Fig2_HTML.jpg](img/A371168_1_En_5_Fig2_HTML.jpg)

    图 5-2. 在没有 `OUTPUT` 操作符的情况下，在动态 SQL 内重新分配变量


    搜索结果如预期那样返回。从动态 SQL 内部对名字的 `SELECT` 操作表明，重新分配参数是被允许并且成功的。当你在动态 SQL 执行完毕后再次检查该变量时，你会发现
    `@first_name` 被设置为 "Edward" 而不是 "Xavier"。作为一个小调整，你可以更改变量名，如清单 5-3 所示，这有助于强调它们是彼此独立且不同的。


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    DECLARE @first_name_calling_sql NVARCHAR(50) = ''Edward'';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name_within_dynamic_sql;

    SELECT @first_name_within_dynamic_sql = ''''Xavier'''';

    SELECT @first_name_within_dynamic_sql;

    ''

    SELECT @parameter_list = ''@first_name_within_dynamic_sql NVARCHAR(50)''

    EXEC sp_executesql @sql_command, @parameter_list, @first_name_calling_sql;

    SELECT @first_name_calling_sql;

    清单 5-3. 重写清单 5-2 中的 T-SQL，其返回相同的结果

    ```


    这个稍有不同的版本产生的结果与上面完全相同。唯一的区别在于，调用 T-SQL 中的变量名改为 `@first_name_calling_sql`，而动态 SQL
    语句的参数改为 `@first_name_within_dynamic_sql`。


    如果你有意希望保存在动态 SQL 内部对参数所做的更改，并将其传回最初传入的原始参数怎么办？解决方案与存储过程几乎相同。只需为任何需要将其值传回调用 T-SQL
    的参数添加 `OUTPUT` 关键字，它就会像前面的例子一样工作，如清单 5-4 所示。

