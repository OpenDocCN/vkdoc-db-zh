    Listing 5-4. Using OUTPUT to Permanently Modify a Parameter


    This example explicitly flags the first name parameter as an `OUTPUT` parameter.
    This indicates that if the value is changes within the Dynamic SQL, that change
    will be persisted after the command string has been executed and you switch back
    to the scope of the calling TSQL. The output is shown in Figure 5-3.


    ![A371168_1_En_5_Fig3_HTML.jpg](A371168_1_En_5_Fig3_HTML.jpg)


    Figure 5-3. Results when OUTPUT was used to persist `@first_name_within_dynamic_sql`


    This time when you change the value of `@first_name_within_dynamic_sql` to `"Xavier"`,
    that value is passed from the Dynamic SQL back to `sp_executesql` and remains
    until you act on it again. This is immensely useful when you want a parameter
    to change within Dynamic SQL or would like to pass variables in and out seamlessly.


    Note that in this TSQL, the `OUTPUT` keyword is appended to both the parameter
    list and the parameter name in the `sp_executesql` statement. The keyword must
    be applied in both places or the parameter value will not be updated as expected.
    If `OUTPUT` is omitted from the parameter list, SQL Server does not know that
    it is intended to be persisted from the Dynamic SQL statement. The result is an
    explicit error message calling this out:


    ```

    Msg 8162, Level 16, State 2, Line 152

    The formal parameter "@first_name_within_dynamic_sql" was not declared as an OUTPUT
    parameter, but the actual parameter passed in requested output.

    ```


    Luckily the message is very easy to understand and makes it clear how to fix the
    error. SQL Server does not allow an `OUTPUT` parameter to be passed into a variable
    that is not declared in the same fashion.


    What happens if you declare the parameter within the parameter list as an `OUTPUT`
    variable, but do not declare it as such in the `sp_executesql` command? In this
    scenario, no error is thrown. It is perfectly legal to declare a parameter with
    the `OUTPUT` keyword within the parameter list and not include the same keyword
    when executing the command string. The result will be that the TSQL executes successfully
    and the value of the first name parameter will not be persisted from Dynamic SQL
    back to the calling TSQL. Table 5-1 sums up the results of each use of the `OUTPUT`
    variable.


    Table 5-1. Results of Different Uses of OUTPUT: Green Is Good, Red Is Bad


    | Parameter List | Input Variable | Result |

    | --- | --- | --- |

    |   |   | Parameter value is not persisted. |

    |   | `OUTPUT` | Error is thrown by SQL Server. |

    | `OUTPUT` |   | Parameter value is still not persisted. |

    | `OUTPUT` | `OUTPUT` | Parameter value persisted from Dynamic SQL. |


    The only way to successfully alter the value of a parameter and return it to the
    calling TSQL is to use `OUTPUT` on both the parameter list and the variable being
    passed in. In order to avoid confusion when writing Dynamic SQL, avoid the mixed
    scenarios where one variable is declared as `OUTPUT` but not the other. The results
    of one case will be an error message, which is certainly not desirable. The other
    ambiguous case will make for a difficult-to-understand piece of code whose purpose
    will not be clear to any other developer and could lead to coding mistakes in
    the future.


    Any parameter may be passed into Dynamic SQL that is allowed to be passed into
    a stored procedure, including tables and even cursors. Table variables, discussed
    in the next section, are read-only, though, and may not be set as `OUTPUT` parameters.


    ## Table Variables and Temporary Tables


    An additional way of persisting data in SQL Server is to create table variables
    or temporary tables and store data in them. The behavior of each of these is somewhat
    unique and offers an alternative way to manage data within Dynamic SQL. This section
    discusses each in a bit more detail and illustrates each behavior and how it can
    impact your TSQL.


    ### Table Variables


    Consider the TSQL in Listing 5-5.


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    DECLARE @last_names TABLE (

    last_name NVARCHAR(50));

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM @last_names)''

    EXEC sp_executesql @sql_command;

    ```

    Listing 5-5. Results of Using a Table Variable Within Dynamic SQL that Is Declared
    Outside of It


    Running this TSQL results immediately in an error:


    ```

    Msg 1087, Level 15, State 2, Line 197

    Must declare the table variable "@last_names".

    ```


    The `@last_names` table variable may be created at the start of this example,
    but does not exist within the scope of the Dynamic SQL. It tries to return a set
    of first names using that data, but it cannot be found. As a result, any attempt
    to access it will fail. You can pass a table variable into Dynamic SQL. It just
    requires the additional step of declaring a custom type and using it as the data
    type, as shown in Listing 5-6.


    ```sql

    CREATE TYPE last_name_table AS TABLE

    (last_name NVARCHAR(50));

    GO

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    DECLARE @first_name_calling_sql NVARCHAR(50) = ''Edward'';

    DECLARE @last_names AS last_name_table;

    INSERT INTO @last_names

    (last_name)

    SELECT

    LastName

    FROM Person.Person WHERE FirstName = @first_name_calling_sql;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM @last_name_table)

    ''

    SELECT @parameter_list = ''@first_name_within_dynamic_sql NVARCHAR(50), @last_name_table
    last_name_table READONLY''

    EXEC sp_executesql @sql_command, @parameter_list, @first_name_calling_sql, @last_names;

    ```

    Listing 5-6. Passing a Table Variable into Dynamic SQL


    The first step is to create a table type once that will be used for the remainder
    of this example. It’s passed as a parameter into `sp_executesql` just like any
    other parameter, but must be declared as `READONLY` within the parameter list.
    Table variables are always read-only and cannot be modified within the Dynamic
    SQL that they are passed into. If you were to try to delete from the table variable,
    or make any change to it at all, you would receive an error:


    ```

    Msg 10700, Level 16, State 1, Line 255

    The table-valued parameter "@last_name_table" is READONLY and cannot be modified.

    ```


    SQL Server provides a very direct error message, reminding you that attempting
    to alter the table variable will fail.'
