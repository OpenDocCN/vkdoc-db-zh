- fmt: '# Sorting Rules and Dynamic SQL Solutions


    The second result set only returns two rows, whereas the original `AdventureWorks`
    table includes two additional executives. Why were the results different? It turns
    out that in traditional Spanish, the letters “CH” are considered a separate letter
    of the alphabet. You can view those rows of data for which the job title begins
    in those characters like this:


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle LIKE ''CH%''

    ORDER BY JobTitle;

    ```


    This query returns the results shown in Figure [10-4](#A371168_1_En_10_Chapter.html#Fig4).


    ![A371168_1_En_10_Fig4_HTML.jpg](A371168_1_En_10_Fig4_HTML.jpg)


    Figure 10-4.

    Illustration of the difference between “C” and “CH” in a Spanish collation


    Because of the language differences, the filter `C%` does not include the results
    that are returned by the filter `CH%`. In addition, these letters will not sort
    as they normally would in a Latin collation:


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle BETWEEN ''C'' AND ''D''

    ORDER BY JobTitle;

    ```


    This query returns all four results, as shown in Figure [10-5](#A371168_1_En_10_Chapter.html#Fig5).


    ![A371168_1_En_10_Fig5_HTML.jpg](A371168_1_En_10_Fig5_HTML.jpg)


    Figure 10-5.

    Sorting differences in the traditional Spanish collation


    In this collation, “C” comes before “CH” in the alphabet. This may seem like a
    minor difference, but for a user running a web search, these results could easily
    lead to incorrect assumptions. For example, suppose the user searches as shown
    above, returns two results, and never realizes that there are two additional employees
    she may have been looking for in the table.


    It is possible to force collations on any result set, as shown in Listing [10-3](#A371168_1_En_10_Chapter.html#Par20).


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS LIKE ''C%''

    ORDER BY JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS;

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS BETWEEN ''C'' AND ''D''

    ORDER BY JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS;

    ```

    Listing 10-3.

    Forcing a Specific Collation on Filters and Sorts in a Result Set


    The results of these queries return the data you would typically expect, as shown
    in Figure [10-6](#A371168_1_En_10_Chapter.html#Fig6).


    ![A371168_1_En_10_Fig6_HTML.jpg](A371168_1_En_10_Fig6_HTML.jpg)


    Figure 10-6.

    Forcing a collation in order to return desired results


    One final example of collation conflict occurs when you try to directly compare
    columns from any one collation to another:


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    INNER JOIN AdventureWorks2014.HumanResources.Employee

    ON Spanish_Employees.LoginID = Employee.LoginID;

    ```


    This query will result in an error:


    ```

    Msg 468, Level 16, State 9, Line 94

    Cannot resolve the collation conflict between "SQL_Latin1_General_CP1_CI_AS" and
    "Traditional_Spanish_CI_AS" in the equal to operation.

    ```


    In order to make this query work, you must force the collation of one join column
    to match the other. Which collation you convert depends on the use-case, but without
    changing one of them, you will be unable to join, filter on, or compare results
    from either data set:


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    INNER JOIN AdventureWorks2014.HumanResources.Employee

    ON Spanish_Employees.LoginID = Employee.LoginID COLLATE Traditional_Spanish_CI_AS

    ```


    By forcing a collation onto the join predicate, you can ensure that each column
    can be compared to the other and that the results are properly returned. This
    is a specific solution to a specific scenario, but we can do far better by using
    dynamic SQL in order to solve this for all variants on this problem!


    ## The Solution


    Forcing a specific collation works when you know exactly what collations to expect
    when running queries. What if you are working with many different collations and
    do not know until runtime exactly which you want to sort by? If you manage many
    servers and databases, each with a different default collation, then you cannot
    make assumptions when converting collations at runtime. In addition, forcing all
    columns to a specific collation may affect the output in ways that users or applications
    would be intolerant of.


    Dynamic SQL can help you turn a six-page problem into a one-page solution! By
    returning the default collation of the server or database as above, you can always
    return or compare data in the correct collation. The script in Listing [10-4](#A371168_1_En_10_Chapter.html#Par31)
    will result in a collation conflict error.


    ```sql

    USE AdventureWorks2014

    GO

    DECLARE @temp_employees TABLE

    (       id INT NOT NULL IDENTITY(1,1),

    LoginID NVARCHAR(256) NOT NULL        );

    INSERT INTO @temp_employees

    (LoginID)

    SELECT TOP 50

    LoginID

    FROM AdventureWorks2014.HumanResources.Employee

    ORDER BY Employee.JobTitle;

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT LoginID FROM @temp_employees);

    ```

    Listing 10-4.

    Collation Conflict Example Using a Table Variable


    Temporary tables and table variables are created using the collation of the `TempDB`
    database, which will typically match the server’s default collation. In this case,
    the table variable is created in the Latin collation, whereas the `LoginID` you
    are checking is in the Spanish collation. This can be corrected permanently using
    the Dynamic SQL shown in Listing [10-5](#A371168_1_En_10_Chapter.html#Par33).


    ```sql

    USE AdventureWorks2014

    GO

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @server_collation NVARCHAR(50);

    SELECT @server_collation = CAST(SERVERPROPERTY(''Collation'') AS NVARCHAR(50));

    SELECT @sql_command = ''

    DECLARE @temp_employees TABLE

    (       id INT NOT NULL IDENTITY(1,1),

    LoginID NVARCHAR(256) NOT NULL        );

    INSERT INTO @temp_employees

    (LoginID)

    SELECT TOP 50

    LoginID

    FROM AdventureWorks2014.HumanResources.Employee

    ORDER BY Employee.JobTitle;

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT LoginID COLLATE '' + @server_collation + '' FROM @temp_employees);''

    EXEC sp_executesql @sql_command;

    ```

    Listing 10-5.

    Resolving a Collation Conflict with Dynamic SQL


    The method in Listing [10-5](#A371168_1_En_10_Chapter.html#Par33) can be reversed
    in order to work with data using the collation of a specific database. The script
    in Listing [10-6](#A371168_1_En_10_Chapter.html#Par35) will return data using
    the default collation of the test database, rather than the server collation.


    ```sql

    USE master

    GO

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name NVARCHAR(128) = ''Collation_Test'';

    DECLARE @collation_name NVARCHAR(50);

    SELECT @collation_name = collation_name

    FROM sys.databases WHERE databases.name = @database_name;

    SELECT @sql_command = ''

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT TOP 50 LoginID COLLATE '' + @collation_name + ''

    FROM AdventureWorks2014.HumanResources.Employee ORDER BY LoginID COLLATE '' +
    @collation_name + '')'';

    EXEC sp_executesql @sql_command;

    ```

    Listing 10-6.

    Using Dynamic SQL to Collate Data into a Specific Database’s Default Collation


    This example shows how to return a database’s default collation from `sys.databases`
    and use that data to quickly resolve what would otherwise be a collation conflict.'
  raw: 'The second result set only returns two rows, whereas the original `AdventureWorks`
    table includes two additional executives. Why were the results different? It turns
    out that in traditional Spanish, the letters “CH” are considered a separate letter
    of the alphabet. You can view those rows of data for which the job title begins
    in those characters like this:


    ```

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle LIKE ''CH%''

    ORDER BY JobTitle;

    ```


    This query returns the results shown in Figure [10-4](#A371168_1_En_10_Chapter.html#Fig4).


    ![A371168_1_En_10_Fig4_HTML.jpg](A371168_1_En_10_Fig4_HTML.jpg)


    Figure 10-4.


    Illustration of the difference between “C” and “CH” in a Spanish collation


    Because of the language differences, the filter `C%` does not include the results
    that are returned by the filter `CH%`. In addition, these letters will not sort
    as they normally would in a Latin collation:


    ```

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle BETWEEN ''C'' AND ''D''

    ORDER BY JobTitle;

    ```


    This query returns all four results, as shown in Figure [10-5](#A371168_1_En_10_Chapter.html#Fig5).


    ![A371168_1_En_10_Fig5_HTML.jpg](A371168_1_En_10_Fig5_HTML.jpg)


    Figure 10-5.


    Sorting differences in the traditional Spanish collation


    In this collation, “C” comes before “CH” in the alphabet. This may seem like a
    minor difference, but for a user running a web search, these results could easily
    lead to incorrect assumptions. For example, suppose the user searches as shown
    above, returns two results, and never realizes that there are two additional employees
    she may have been looking for in the table.


    It is possible to force collations on any result set, as shown in Listing [10-3](#A371168_1_En_10_Chapter.html#Par20).


    ```

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS LIKE ''C%''

    ORDER BY JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS;

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS BETWEEN ''C'' AND ''D''

    ORDER BY JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS;

    Listing 10-3.

    Forcing a Specific Collation on Filters and Sorts in a Result Set

    ```


    The results of these queries return the data you would typically expect, as shown
    in Figure [10-6](#A371168_1_En_10_Chapter.html#Fig6).


    ![A371168_1_En_10_Fig6_HTML.jpg](A371168_1_En_10_Fig6_HTML.jpg)


    Figure 10-6.


    Forcing a collation in order to return desired results


    One final example of collation conflict occurs when you try to directly compare
    columns from any one collation to another:


    ```

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    INNER JOIN AdventureWorks2014.HumanResources.Employee

    ON Spanish_Employees.LoginID = Employee.LoginID;

    ```


    This query will result in an error:


    ```

    Msg 468, Level 16, State 9, Line 94

    Cannot resolve the collation conflict between "SQL_Latin1_General_CP1_CI_AS" and
    "Traditional_Spanish_CI_AS" in the equal to operation.

    ```


    In order to make this query work, you must force the collation of one join column
    to match the other. Which collation you convert depends on the use-case, but without
    changing one of them, you will be unable to join, filter on, or compare results
    from either data set:


    ```

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    INNER JOIN AdventureWorks2014.HumanResources.Employee

    ON Spanish_Employees.LoginID = Employee.LoginID COLLATE Traditional_Spanish_CI_AS

    ```


    By forcing a collation onto the join predicate, you can ensure that each column
    can be compared to the other and that the results are properly returned. This
    is a specific solution to a specific scenario, but we can do far better by using
    dynamic SQL in order to solve this for all variants on this problem!


    ### The Solution


    Forcing a specific collation works when you know exactly what collations to expect
    when running queries. What if you are working with many different collations and
    do not know until runtime exactly which you want to sort by? If you manage many
    servers and databases, each with a different default collation, then you cannot
    make assumptions when converting collations at runtime. In addition, forcing all
    columns to a specific collation may affect the output in ways that users or applications
    would be intolerant of.


    Dynamic SQL can help you turn a six-page problem into a one-page solution! By
    returning the default collation of the server or database as above, you can always
    return or compare data in the correct collation. The script in Listing [10-4](#A371168_1_En_10_Chapter.html#Par31)
    will result in a collation conflict error.


    ```

    USE AdventureWorks2014

    GO

    DECLARE @temp_employees TABLE

    (       id INT NOT NULL IDENTITY(1,1),

    LoginID NVARCHAR(256) NOT NULL        );

    INSERT INTO @temp_employees

    (LoginID)

    SELECT TOP 50

    LoginID

    FROM AdventureWorks2014.HumanResources.Employee

    ORDER BY Employee.JobTitle;

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT LoginID FROM @temp_employees);

    Listing 10-4.

    Collation Conflict Example Using a Table Variable

    ```


    Temporary tables and table variables are created using the collation of the `TempDB`
    database, which will typically match the server’s default collation. In this case,
    the table variable is created in the Latin collation, whereas the `LoginID` you
    are checking is in the Spanish collation. This can be corrected permanently using
    the Dynamic SQL shown in Listing [10-5](#A371168_1_En_10_Chapter.html#Par33).


    ```

    USE AdventureWorks2014

    GO

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @server_collation NVARCHAR(50);

    SELECT @server_collation = CAST(SERVERPROPERTY(''Collation'') AS NVARCHAR(50));

    SELECT @sql_command = ''

    DECLARE @temp_employees TABLE

    (       id INT NOT NULL IDENTITY(1,1),

    LoginID NVARCHAR(256) NOT NULL        );

    INSERT INTO @temp_employees

    (LoginID)

    SELECT TOP 50

    LoginID

    FROM AdventureWorks2014.HumanResources.Employee

    ORDER BY Employee.JobTitle;

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT LoginID COLLATE '' + @server_collation + '' FROM @temp_employees);''

    EXEC sp_executesql @sql_command;

    Listing 10-5.

    Resolving a Collation Conflict with Dynamic SQL

    ```


    The method in Listing [10-5](#A371168_1_En_10_Chapter.html#Par33) can be reversed
    in order to work with data using the collation of a specific database. The script
    in Listing [10-6](#A371168_1_En_10_Chapter.html#Par35) will return data using
    the default collation of the test database, rather than the server collation.


    ```

    USE master

    GO

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name NVARCHAR(128) = ''Collation_Test'';

    DECLARE @collation_name NVARCHAR(50);

    SELECT @collation_name = collation_name

    FROM sys.databases WHERE databases.name = @database_name;

    SELECT @sql_command = ''

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT TOP 50 LoginID COLLATE '' + @collation_name + ''

    FROM AdventureWorks2014.HumanResources.Employee ORDER BY LoginID COLLATE '' +
    @collation_name + '')'';

    EXEC sp_executesql @sql_command;

    Listing 10-6.

    Using Dynamic SQL to Collate Data into a Specific Database’s Default Collation

    ```


    This example shows how to return a database’s default collation from `sys.databases`
    and use that data to quickly resolve what would otherwise be a collation conflict.


    ## Organizing and Archiving Data'
  trans: '

    # 排序规则与动态 SQL 解决方案


    第二个结果集只返回了两行数据，而原始的 `AdventureWorks` 表中还包含了另外两名高管。为什么结果会不同？事实证明，在传统西班牙语排序规则中，字母“CH”被视为一个独立的字母。你可以像这样查看那些职位名称以这些字符开头的数据行：


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle LIKE ''CH%''

    ORDER BY JobTitle;

    ```


    此查询返回的结果如图 10-4 所示。


    ![A371168_1_En_10_Fig4_HTML.jpg](img/A371168_1_En_10_Fig4_HTML.jpg)


    图 10-4.

    西班牙语排序规则中“C”和“CH”的区别说明


    由于语言差异，筛选条件 `C%` 不会包含由筛选条件 `CH%` 返回的结果。此外，这些字母的排序方式也与拉丁语排序规则下的通常情况不同：


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle BETWEEN ''C'' AND ''D''

    ORDER BY JobTitle;

    ```


    此查询返回了所有四个结果，如图 10-5 所示。


    ![A371168_1_En_10_Fig5_HTML.jpg](img/A371168_1_En_10_Fig5_HTML.jpg)


    图 10-5.

    传统西班牙语排序规则中的排序差异


    在这种排序规则下，“C”在字母表中排在“CH”之前。这看起来可能是个微小的差异，但对于进行网络搜索的用户来说，这些结果很容易导致错误的假设。例如，假设用户如上所示进行搜索，返回了两个结果，但她可能从未意识到表中还有另外两名员工可能是她要找的。


    可以如清单 10-3 所示，在任何结果集上强制应用排序规则。


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS LIKE ''C%''

    ORDER BY JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS;

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS BETWEEN ''C'' AND ''D''

    ORDER BY JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS;

    ```

    清单 10-3.

    在筛选和排序中对结果集强制应用特定排序规则


    这些查询的结果返回了通常期望的数据，如图 10-6 所示。


    ![A371168_1_En_10_Fig6_HTML.jpg](img/A371168_1_En_10_Fig6_HTML.jpg)


    图 10-6.

    强制应用排序规则以返回所需结果


    最后一个排序规则冲突的例子发生在你尝试直接比较来自任何一种排序规则与另一种排序规则的列时：


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    INNER JOIN AdventureWorks2014.HumanResources.Employee

    ON Spanish_Employees.LoginID = Employee.LoginID;

    ```


    此查询将导致错误：


    ```

    Msg 468, Level 16, State 9, Line 94

    Cannot resolve the collation conflict between "SQL_Latin1_General_CP1_CI_AS" and
    "Traditional_Spanish_CI_AS" in the equal to operation.

    ```


    为了使此查询生效，你必须强制将一个联接列的排序规则转换为与另一个相匹配。转换哪种排序规则取决于具体的用例场景，但如果不进行更改，你将无法对来自任一数据集的结果进行联接、筛选或比较：


    ```sql

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    INNER JOIN AdventureWorks2014.HumanResources.Employee

    ON Spanish_Employees.LoginID = Employee.LoginID COLLATE Traditional_Spanish_CI_AS

    ```


    通过强制在联接谓词上应用排序规则，你可以确保每一列都能与另一列进行比较，并且结果能够正确返回。这是针对特定场景的具体解决方案，但我们可以通过使用动态 SQL
    来解决此类问题的所有变体，从而做得更好！


    ## 解决方案


    当确切知道运行查询时会遇到什么排序规则时，强制应用特定排序规则是有效的。如果你正在处理许多不同的排序规则，并且直到运行时才知道要按哪种排序规则排序，该怎么办？如果你管理着许多服务器和数据库，每个都有不同的默认排序规则，那么在运行时转换排序规则时就无法做出假设。此外，将所有列强制转换为特定排序规则可能会以用户或应用程序无法接受的方式影响输出。


    动态 SQL 可以帮助你将一个六页长的问题变成一个一页长的解决方案！通过像上面那样返回服务器或数据库的默认排序规则，你总是能够以正确的排序规则返回或比较数据。清单
    10-4 中的脚本将导致排序规则冲突错误。


    ```sql

    USE AdventureWorks2014

    GO

    DECLARE @temp_employees TABLE

    (       id INT NOT NULL IDENTITY(1,1),

    LoginID NVARCHAR(256) NOT NULL        );

    INSERT INTO @temp_employees

    (LoginID)

    SELECT TOP 50

    LoginID

    FROM AdventureWorks2014.HumanResources.Employee

    ORDER BY Employee.JobTitle;

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT LoginID FROM @temp_employees);

    ```

    清单 10-4.

    使用表变量导致的排序规则冲突示例


    临时表和表变量是使用 `TempDB` 数据库的排序规则创建的，这通常与服务器的默认排序规则相匹配。在本例中，表变量是使用拉丁语排序规则创建的，而你要检查的
    `LoginID` 则是西班牙语排序规则。这可以使用清单 10-5 中所示的动态 SQL 进行永久修正。


    ```sql

    USE AdventureWorks2014

    GO

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @server_collation NVARCHAR(50);

    SELECT @server_collation = CAST(SERVERPROPERTY(''Collation'') AS NVARCHAR(50));

    SELECT @sql_command = ''

    DECLARE @temp_employees TABLE

    (       id INT NOT NULL IDENTITY(1,1),

    LoginID NVARCHAR(256) NOT NULL        );

    INSERT INTO @temp_employees

    (LoginID)

    SELECT TOP 50

    LoginID

    FROM AdventureWorks2014.HumanResources.Employee

    ORDER BY Employee.JobTitle;

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT LoginID COLLATE '' + @server_collation + '' FROM @temp_employees);''

    EXEC sp_executesql @sql_command;

    ```

    清单 10-5.

    使用动态 SQL 解决排序规则冲突


    清单 10-5 中的方法可以反过来使用，以处理具有特定数据库排序规则的数据。清单 10-6 中的脚本将使用测试数据库的默认排序规则（而不是服务器排序规则）返回数据。


    ```sql

    USE master

    GO

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name NVARCHAR(128) = ''Collation_Test'';

    DECLARE @collation_name NVARCHAR(50);

    SELECT @collation_name = collation_name

    FROM sys.databases WHERE databases.name = @database_name;

    SELECT @sql_command = ''

    SELECT

    Spanish_Employees.NationalIDNumber,

    Spanish_Employees.LoginID,

    Spanish_Employees.JobTitle,

    Spanish_Employees.BirthDate,

    Spanish_Employees.HireDate

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE Spanish_Employees.LoginID IN

    (SELECT TOP 50 LoginID COLLATE '' + @collation_name + ''

    FROM AdventureWorks2014.HumanResources.Employee ORDER BY LoginID COLLATE '' +
    @collation_name + '')'';

    EXEC sp_executesql @sql_command;

    ```

    清单 10-6.

    使用动态 SQL 将数据整理到特定数据库的默认排序规则中


    此示例展示了如何从 `sys.databases` 返回数据库的默认排序规则，并使用该数据快速解决原本会是排序规则冲突的问题。

    '
- fmt: '## The Problem


    When working with the archival or movement of data, you may want to name objects
    such as tables, databases, or schemas with customized names based on the date,
    time, or application. Using standard TSQL, this would be difficult without some
    complex application code to manage the process.


    What if you have a log table that grows very quickly, but you never need data
    older than a week? Partitioning the table such that the current week is isolated
    into a single partition is one solution, but is only available in Enterprise edition.
    In addition, you might want to move the old data to a different server or storage
    environment. If this, or any similar situations, are involved, then managing the
    process yourself may be an easier and more portable solution.


    This example populates a table with a variety of data based on date and time,
    as shown in Listing 10-7.


    ```sql

    CREATE TABLE dbo.Database_Log

    (log_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_Database_Log PRIMARY KEY CLUSTERED,

    Log_Time DATETIME,

    Log_Data NVARCHAR(1000));

    DECLARE @datetime DATETIME = CURRENT_TIMESTAMP;

    DECLARE @datediff TABLE

    (previous_hour SMALLINT);

    DECLARE @count SMALLINT = 0;

    WHILE @count <= 360

    BEGIN

    INSERT INTO @datediff

    (previous_hour)

    SELECT @count;

    SELECT @count = @count + 1

    END

    SELECT @count = 0;

    WHILE @count <= 1000

    BEGIN

    INSERT INTO Database_Log

    (Log_Time, Log_Data)

    SELECT

    DATEADD(HOUR, -1 * previous_hour, CURRENT_TIMESTAMP),

    CAST(DATEADD(HOUR, -1 * previous_hour, CURRENT_TIMESTAMP) AS NVARCHAR)

    FROM @datediff;

    SELECT @count = @count + 1;

    END

    ```

    Listing 10-7. Create Database Log Data for an Archiving Demonstration


    This script creates a table called `Database_Log` and populates it with 361,361
    rows of data containing a variety of log times, as well as the string conversion
    of those times. The data is shown in Figure 10-7.


    ![A371168_1_En_10_Fig7_HTML.jpg](A371168_1_En_10_Fig7_HTML.jpg)

    Figure 10-7. Sample of database log data created in Listing 10-7


    Say you want to archive data every week into a new table that contains a week’s
    worth of data. This would normally require quite a bit of manual labor in order
    to manage table names correctly. What if you also wanted to separate data into
    databases by year, so that each calendar year had its own unique database? This
    may seem like an unusual use-case, but the need to move large volumes of data
    around a time slice is very common. Dynamic SQL techniques can be applied to any
    similar problem, regardless of the specific objects or business rules.


    In order to provide some older data that will be archived into additional databases,
    let’s run one more data population script to increase the data size even further,
    as shown in Listing 10-8.


    ```sql

    DECLARE @year_offset TINYINT = 5;

    WHILE @year_offset > 0

    BEGIN

    INSERT INTO dbo.Database_Log

    (Log_Time, Log_Data)

    SELECT TOP 10000

    DATEADD(YEAR, -1 * @year_offset, Log_Time),

    CAST(DATEADD(YEAR, -1 * @year_offset, Log_Time) AS NVARCHAR)

    FROM Database_Log

    SELECT @year_offset = @year_offset - 1;

    END

    ```

    Listing 10-8. Script to Increase the Size of the Data in the Database_Log Table


    Now you have an additional 50,000 rows of data from up to five years ago, which
    will easily demonstrate the problem. Using this data, we can better understand
    the ways in which we could archive data and customize targets based on specific
    business needs.


    ## The Solution


    In order to process this data correctly, you need to perform the following tasks:

    1. Read data from the log table by time period.

    2. Create new database or table objects (if they do not already exist).

    3. Insert the data into those objects.

    4. Delete the archived data from the log table.


    The script in Listing 10-9 will accomplish the tasks outlined previously.


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@start_of_week DATETIME, @end_of_week
    DATETIME'';

    DECLARE @min_datetime DATETIME;

    SELECT @min_datetime = MIN(Log_Time) FROM Database_Log;

    DECLARE @previous_min_time DATETIME = ''1/1/1900'';

    DECLARE @start_of_week DATETIME = CAST(DATEADD(dd, -1 * (DATEPART(dw, @min_datetime)
    - 1), @min_datetime) AS DATE);

    DECLARE @end_of_week DATETIME = DATEADD(WEEK, 1, @start_of_week);

    DECLARE @current_year SMALLINT;

    DECLARE @current_week TINYINT;

    DECLARE @database_name NVARCHAR(128);

    DECLARE @table_name NVARCHAR(128);

    WHILE (@previous_min_time < @min_datetime)

    BEGIN

    SELECT @current_year = DATEPART(YEAR, @start_of_week);

    SELECT @current_week = DATEPART(WEEK, @start_of_week);

    SELECT @database_name = ''Database_Log_'' + CAST(@current_year AS NVARCHAR);

    SELECT @table_name = ''Database_Log_'' + CAST(@current_year AS NVARCHAR) + ''_''
    + CAST(@current_week AS NVARCHAR)

    -- Create the yearly database if it does not already exist

    IF NOT EXISTS (SELECT * FROM sys.databases WHERE databases.name = @database_name)

    BEGIN

    SELECT @sql_command = ''CREATE DATABASE ['' + @database_name + '']'';

    EXEC sp_executesql @sql_command;

    END

    -- Create the weekly table if it does not already exist

    SELECT @sql_command = ''

    USE ['' + @database_name + ''];

    IF NOT EXISTS (SELECT * FROM sys.tables WHERE tables.name = '''''' + @table_name
    + '''''')

    BEGIN

    CREATE TABLE [dbo].['' + @table_name + '']

    (Log_Id INT NOT NULL CONSTRAINT PK_Database_Log_'' + CAST(@current_year AS NVARCHAR)
    + ''_'' + CAST(@current_week AS NVARCHAR) + '' PRIMARY KEY CLUSTERED,

    Log_Time DATETIME,

    Log_Data NVARCHAR(1000));

    END''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    INSERT INTO ['' + @database_name + ''].[dbo].['' + @table_name + '']

    (Log_Id, Log_Time, Log_Data)

    SELECT

    Log_Id,

    Log_Time,

    Log_Data

    FROM AdventureWorks2014.dbo.Database_Log

    WHERE Log_Time >= @start_of_week

    AND Log_Time < @end_of_week

    AND Log_Time < DATEADD(WEEK, -1, CURRENT_TIMESTAMP);''

    EXEC sp_executesql @sql_command, @parameter_list, @start_of_week, @end_of_week

    SELECT @previous_min_time = @min_datetime;

    SELECT @min_datetime = MIN(Log_Time) FROM Database_Log;

    SELECT @start_of_week = CAST(DATEADD(dd, -1 * (DATEPART(dw, @min_datetime) - 1),
    @min_datetime) AS DATE);

    SELECT @end_of_week = DATEADD(WEEK, 1, @start_of_week);

    END

    ```

    Listing 10-9. Using Dynamic SQL to Archive Data into Dynamically Named Tables


    When the script completes running, you’ll be able to view some new databases on
    the server, as shown in Figure 10-8.


    ![A371168_1_En_10_Fig8_HTML.jpg](A371168_1_En_10_Fig8_HTML.jpg)

    Figure 10-8. New databases created when the script in Listing 10-9 is executed


    For each year represented by the `Log_Time` within `Database_Log`, a new database
    was created. In addition, tables were created in those databases for each week
    represented within that data, as shown in Figure 10-9.


    ![A371168_1_En_10_Fig9_HTML.jpg](A371168_1_En_10_Fig9_HTML.jpg)

    Figure 10-9. New tables created when the script in Listing 10-9 is executed'
  raw: '### The Problem


    When working with the archival or movement of data, you may want to name objects
    such as tables, databases, or schemas with customized names based on the date,
    time, or application. Using standard TSQL, this would be difficult without some
    complex application code to manage the process.


    What if you have a log table that grows very quickly, but you never need data
    older than a week? Partitioning the table such that the current week is isolated
    into a single partition is one solution, but is only available in Enterprise edition.
    In addition, you might want to move the old data to a different server or storage
    environment. If this, or any similar situations, are involved, then managing the
    process yourself may be an easier and more portable solution.


    This example populates a table with a variety of data based on date and time,
    as shown in Listing [10-7](#A371168_1_En_10_Chapter.html#Par40).


    ```

    CREATE TABLE dbo.Database_Log

    (log_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_Database_Log PRIMARY KEY CLUSTERED,

    Log_Time DATETIME,

    Log_Data NVARCHAR(1000));

    DECLARE @datetime DATETIME = CURRENT_TIMESTAMP;

    DECLARE @datediff TABLE

    (previous_hour SMALLINT);

    DECLARE @count SMALLINT = 0;

    WHILE @count <= 360

    BEGIN

    INSERT INTO @datediff

    (previous_hour)

    SELECT @count;

    SELECT @count = @count + 1

    END

    SELECT @count = 0;

    WHILE @count <= 1000

    BEGIN

    INSERT INTO Database_Log

    (Log_Time, Log_Data)

    SELECT

    DATEADD(HOUR, -1 * previous_hour, CURRENT_TIMESTAMP),

    CAST(DATEADD(HOUR, -1 * previous_hour, CURRENT_TIMESTAMP) AS NVARCHAR)

    FROM @datediff;

    SELECT @count = @count + 1;

    END

    Listing 10-7.

    Create Database Log Data for an Archiving Demonstration

    ```


    This script creates a table called `Database_Log` and populates it with 361,361
    rows of data containing a variety of log times, as well as the string conversion
    of those times. The data is shown in Figure [10-7](#A371168_1_En_10_Chapter.html#Fig7).


    ![A371168_1_En_10_Fig7_HTML.jpg](A371168_1_En_10_Fig7_HTML.jpg)


    Figure 10-7.


    Sample of database log data created in Listing [10-7](#A371168_1_En_10_Chapter.html#Par40)


    Say you want to archive data every week into a new table that contains a week’s
    worth of data. This would normally require quite a bit of manual labor in order
    to manage table names correctly. What if you also wanted to separate data into
    databases by year, so that each calendar year had its own unique database? This
    may seem like an unusual use-case, but the need to move large volumes of data
    around a time slice is very common. Dynamic SQL techniques can be applied to any
    similar problem, regardless of the specific objects or business rules.


    In order to provide some older data that will be archived into additional databases,
    let’s run one more data population script to increase the data size even further,
    as shown in Listing [10-8](#A371168_1_En_10_Chapter.html#Par44).


    ```

    DECLARE @year_offset TINYINT = 5;

    WHILE @year_offset > 0

    BEGIN

    INSERT INTO dbo.Database_Log

    (Log_Time, Log_Data)

    SELECT TOP 10000

    DATEADD(YEAR, -1 * @year_offset, Log_Time),

    CAST(DATEADD(YEAR, -1 * @year_offset, Log_Time) AS NVARCHAR)

    FROM Database_Log

    SELECT @year_offset = @year_offset - 1;

    END

    Listing 10-8.

    Script to Increase the Size of the Data in the Database_Log Table

    ```


    Now you have an additional 50,000 rows of data from up to five years ago, which
    will easily demonstrate the problem. Using this data, we can better understand
    the ways in which we could archive data and customize targets based on specific
    business needs.


    ### The Solution


    In order to process this data correctly, you need to perform the following tasks:


    Read data from the log table by time period.   Create new database or table objects
    (if they do not already exist).   Insert the data into those objects.   Delete
    the archived data from the log table.


    The script in Listing [10-9](#A371168_1_En_10_Chapter.html#Par52) will accomplish
    the tasks outlined previously.


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@start_of_week DATETIME, @end_of_week
    DATETIME'';

    DECLARE @min_datetime DATETIME;

    SELECT @min_datetime = MIN(Log_Time) FROM Database_Log;

    DECLARE @previous_min_time DATETIME = ''1/1/1900'';

    DECLARE @start_of_week DATETIME = CAST(DATEADD(dd, -1 * (DATEPART(dw, @min_datetime)
    - 1), @min_datetime) AS DATE);

    DECLARE @end_of_week DATETIME = DATEADD(WEEK, 1, @start_of_week);

    DECLARE @current_year SMALLINT;

    DECLARE @current_week TINYINT;

    DECLARE @database_name NVARCHAR(128);

    DECLARE @table_name NVARCHAR(128);

    WHILE (@previous_min_time  @min_datetime)

    BEGIN

    SELECT @current_year = DATEPART(YEAR, @start_of_week);

    SELECT @current_week = DATEPART(WEEK, @start_of_week);

    SELECT @database_name = ''Database_Log_'' + CAST(@current_year AS NVARCHAR);

    SELECT @table_name = ''Database_Log_'' + CAST(@current_year AS NVARCHAR) + ''_''
    + CAST(@current_week AS NVARCHAR)

    -- Create the yearly database if it does not already exist

    IF NOT EXISTS (SELECT * FROM sys.databases WHERE databases.name = @database_name)

    BEGIN

    SELECT @sql_command = ''CREATE DATABASE ['' + @database_name + '']'';

    EXEC sp_executesql @sql_command;

    END

    -- Create the weekly table if it does not already exist

    SELECT @sql_command = ''

    USE ['' + @database_name + ''];

    IF NOT EXISTS (SELECT * FROM sys.tables WHERE tables.name = '''''' + @table_name
    + '''''')

    BEGIN

    CREATE TABLE [dbo].['' + @table_name + '']

    (Log_Id INT NOT NULL CONSTRAINT PK_Database_Log_'' + CAST(@current_year AS NVARCHAR)
    + ''_'' + CAST(@current_week AS NVARCHAR) + '' PRIMARY KEY CLUSTERED,

    Log_Time DATETIME,

    Log_Data NVARCHAR(1000));

    END''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    INSERT INTO ['' + @database_name + ''].[dbo].['' + @table_name + '']

    (Log_Id, Log_Time, Log_Data)

    SELECT

    Log_Id,

    Log_Time,

    Log_Data

    FROM AdventureWorks2014.dbo.Database_Log

    WHERE Log_Time >= @start_of_week

    AND Log_Time = @start_of_week

    AND Log_Time <= @end_of_week

    AND Log_Time < DATEADD(WEEK, -1, CURRENT_TIMESTAMP);''

    EXEC sp_executesql @sql_command, @parameter_list, @start_of_week, @end_of_week

    SELECT @previous_min_time = @min_datetime;

    SELECT @min_datetime = MIN(Log_Time) FROM Database_Log;

    SELECT @start_of_week = CAST(DATEADD(dd, -1 * (DATEPART(dw, @min_datetime) - 1),
    @min_datetime) AS DATE);

    SELECT @end_of_week = DATEADD(WEEK, 1, @start_of_week);

    END

    Listing 10-9.

    Using Dynamic SQL to Archive Data into Dynamically Named Tables

    ```


    When the script completes running, you’ll be able to view some new databases on
    the server, as shown in Figure [10-8](#A371168_1_En_10_Chapter.html#Fig8).


    ![A371168_1_En_10_Fig8_HTML.jpg](A371168_1_En_10_Fig8_HTML.jpg)


    Figure 10-8.


    New databases created when the script in Listing [10-9](#A371168_1_En_10_Chapter.html#Par52)
    is executed


    For each year represented by the `Log_Time` within `Database_Log`, a new database
    was created. In addition, tables were created in those databases for each week
    represented within that data, as shown in Figure [10-9](#A371168_1_En_10_Chapter.html#Fig9).


    ![A371168_1_En_10_Fig9_HTML.jpg](A371168_1_En_10_Fig9_HTML.jpg)


    Figure 10-9.


    New tables created when the script in Listing [10-9](#A371168_1_En_10_Chapter.html#Par52)
    is executed'
  trans: '## 问题


    在处理数据的归档或迁移时，你可能希望根据日期、时间或应用程序，为表、数据库或架构等对象赋予自定义名称。若使用标准 TSQL，这将非常困难，除非编写复杂的应用程序代码来管理整个过程。


    假设你有一个增长非常迅速的日志表，但你永远不需要超过一周前的数据。将当前周的数据隔离到单个分区是一种解决方案，但这仅在企业版中可用。此外，你可能希望将旧数据移动到不同的服务器或存储环境。如果涉及这种情况或任何类似情况，那么自行管理流程可能是一个更简单且可移植性更强的解决方案。


    此示例使用基于日期和时间的各种数据填充一个表，如清单 10-7 所示。


    ```sql

    CREATE TABLE dbo.Database_Log

    (log_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_Database_Log PRIMARY KEY CLUSTERED,

    Log_Time DATETIME,

    Log_Data NVARCHAR(1000));

    DECLARE @datetime DATETIME = CURRENT_TIMESTAMP;

    DECLARE @datediff TABLE

    (previous_hour SMALLINT);

    DECLARE @count SMALLINT = 0;

    WHILE @count <= 360

    BEGIN

    INSERT INTO @datediff

    (previous_hour)

    SELECT @count;

    SELECT @count = @count + 1

    END

    SELECT @count = 0;

    WHILE @count <= 1000

    BEGIN

    INSERT INTO Database_Log

    (Log_Time, Log_Data)

    SELECT

    DATEADD(HOUR, -1 * previous_hour, CURRENT_TIMESTAMP),

    CAST(DATEADD(HOUR, -1 * previous_hour, CURRENT_TIMESTAMP) AS NVARCHAR)

    FROM @datediff;

    SELECT @count = @count + 1;

    END

    ```

    清单 10-7. 为归档演示创建数据库日志数据


    此脚本创建了一个名为 `Database_Log` 的表，并用 361,361 行数据填充它，这些数据包含各种日志时间以及这些时间的字符串转换。数据如图 10-7
    所示。


    ![A371168_1_En_10_Fig7_HTML.jpg](img/A371168_1_En_10_Fig7_HTML.jpg)

    图 10-7. 清单 10-7 中创建的数据库日志数据样本


    假设你想每周将数据归档到一个包含一周数据的新表中。这通常需要大量人工劳动才能正确管理表名。如果你还想按年份将数据分离到不同的数据库中，使得每个日历年都有其自己唯一的数据库呢？这可能看起来像是一个不寻常的用例，但围绕时间切片移动大量数据的需求非常普遍。动态
    SQL 技术可以应用于任何类似的问题，而不管具体的对象或业务规则如何。


    为了提供一些将归档到其他数据库的旧数据，让我们再运行一个数据填充脚本来进一步增加数据量，如清单 10-8 所示。


    ```sql

    DECLARE @year_offset TINYINT = 5;

    WHILE @year_offset > 0

    BEGIN

    INSERT INTO dbo.Database_Log

    (Log_Time, Log_Data)

    SELECT TOP 10000

    DATEADD(YEAR, -1 * @year_offset, Log_Time),

    CAST(DATEADD(YEAR, -1 * @year_offset, Log_Time) AS NVARCHAR)

    FROM Database_Log

    SELECT @year_offset = @year_offset - 1;

    END

    ```

    清单 10-8. 用于增加 Database_Log 表中数据大小的脚本


    现在，你又有了来自多达五年前的额外 50,000 行数据，这可以轻松地演示该问题。利用这些数据，我们可以更好地理解归档数据以及根据特定业务需求定制目标的方法。


    ## 解决方案


    为了正确处理这些数据，你需要执行以下任务：

    1.  按时间段从日志表中读取数据。

    2.  创建新的数据库或表对象（如果它们尚不存在）。

    3.  将数据插入这些对象中。

    4.  从日志表中删除已归档的数据。


    清单 10-9 中的脚本将完成前述任务。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@start_of_week DATETIME, @end_of_week
    DATETIME'';

    DECLARE @min_datetime DATETIME;

    SELECT @min_datetime = MIN(Log_Time) FROM Database_Log;

    DECLARE @previous_min_time DATETIME = ''1/1/1900'';

    DECLARE @start_of_week DATETIME = CAST(DATEADD(dd, -1 * (DATEPART(dw, @min_datetime)
    - 1), @min_datetime) AS DATE);

    DECLARE @end_of_week DATETIME = DATEADD(WEEK, 1, @start_of_week);

    DECLARE @current_year SMALLINT;

    DECLARE @current_week TINYINT;

    DECLARE @database_name NVARCHAR(128);

    DECLARE @table_name NVARCHAR(128);

    WHILE (@previous_min_time < @min_datetime)

    BEGIN

    SELECT @current_year = DATEPART(YEAR, @start_of_week);

    SELECT @current_week = DATEPART(WEEK, @start_of_week);

    SELECT @database_name = ''Database_Log_'' + CAST(@current_year AS NVARCHAR);

    SELECT @table_name = ''Database_Log_'' + CAST(@current_year AS NVARCHAR) + ''_''
    + CAST(@current_week AS NVARCHAR)

    -- Create the yearly database if it does not already exist

    IF NOT EXISTS (SELECT * FROM sys.databases WHERE databases.name = @database_name)

    BEGIN

    SELECT @sql_command = ''CREATE DATABASE ['' + @database_name + '']'';

    EXEC sp_executesql @sql_command;

    END

    -- Create the weekly table if it does not already exist

    SELECT @sql_command = ''

    USE ['' + @database_name + ''];

    IF NOT EXISTS (SELECT * FROM sys.tables WHERE tables.name = '''''' + @table_name
    + '''''')

    BEGIN

    CREATE TABLE [dbo].['' + @table_name + '']

    (Log_Id INT NOT NULL CONSTRAINT PK_Database_Log_'' + CAST(@current_year AS NVARCHAR)
    + ''_'' + CAST(@current_week AS NVARCHAR) + '' PRIMARY KEY CLUSTERED,

    Log_Time DATETIME,

    Log_Data NVARCHAR(1000));

    END''

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = ''

    INSERT INTO ['' + @database_name + ''].[dbo].['' + @table_name + '']

    (Log_Id, Log_Time, Log_Data)

    SELECT

    Log_Id,

    Log_Time,

    Log_Data

    FROM AdventureWorks2014.dbo.Database_Log

    WHERE Log_Time >= @start_of_week

    AND Log_Time < @end_of_week

    AND Log_Time < DATEADD(WEEK, -1, CURRENT_TIMESTAMP);''

    EXEC sp_executesql @sql_command, @parameter_list, @start_of_week, @end_of_week

    SELECT @previous_min_time = @min_datetime;

    SELECT @min_datetime = MIN(Log_Time) FROM Database_Log;

    SELECT @start_of_week = CAST(DATEADD(dd, -1 * (DATEPART(dw, @min_datetime) - 1),
    @min_datetime) AS DATE);

    SELECT @end_of_week = DATEADD(WEEK, 1, @start_of_week);

    END

    ```

    清单 10-9. 使用动态 SQL 将数据归档到动态命名的表中


    当脚本运行完成后，你将能在服务器上看到一些新的数据库，如图 10-8 所示。


    ![A371168_1_En_10_Fig8_HTML.jpg](img/A371168_1_En_10_Fig8_HTML.jpg)

    图 10-8. 执行清单 10-9 中的脚本时创建的新数据库


    对于 `Database_Log` 中 `Log_Time` 所代表的每一年，都创建了一个新数据库。此外，还在这些数据库中为数据所代表的每一周创建了表，如图
    10-9 所示。


    ![A371168_1_En_10_Fig9_HTML.jpg](img/A371168_1_En_10_Fig9_HTML.jpg)

    图 10-9. 执行清单 10-9 中的脚本时创建的新表'
- fmt: "The guts of the logic employed above revolves around creating databases and\
    \ tables dynamically based on the date and time provided by `Log_Time`. Once those\
    \ objects are created, data is inserted into them and then deleted from the source\
    \ table. You can review the data in a single table to verify that this script\
    \ did exactly what you intended it to do, as shown in Figure [10-10](#A371168_1_En_10_Chapter.html#Fig10).\n\
    \n![A371168_1_En_10_Fig10_HTML.jpg](A371168_1_En_10_Fig10_HTML.jpg)\n\nFigure\
    \ 10-10.\n\nSample data from a weekly log table\n\n```sql\nSELECT\n    *\nFROM\
    \ Database_Log_2011.dbo.Database_Log_2011_48\n```\n\nAll data within this new\
    \ table is identical to how it appeared in the original `Database_Log` table,\
    \ including the `Log_Id`. The only difference is the new database and table location\
    \ of the data.\n\nReorganizing data when the reference points change over time\
    \ can be a complex task. Dynamic SQL allows data to be organized and moved, and\
    \ new objects are created with relatively simple logic. In under 100 lines of\
    \ TSQL, you were able to take all old data from a log table and move it to any\
    \ number of new database objects that were created at runtime based on the age\
    \ of that data.\n\nEvery use-case for reorganizing, archiving, or moving data\
    \ will be different, but this general technique can be extremely useful when you\
    \ want to minimize the complexity and size of an important archiving process.\
    \ Always consider how the archived data will be used prior to building a new process.\
    \ Whether it is moved to separate databases, tables, or partitions, you now have\
    \ the luxury of being able to index it uniquely based on its new purpose. By treating\
    \ it as an archive repository and not transactional data, you gain the flexibility\
    \ to optimize it based on its new purpose.\n\nDynamic SQL can be used to manage\
    \ additional indexes, constraints, keys, views, and stored procedures that all\
    \ can allow the new data to be accessed efficiently and conveniently. Creating\
    \ those objects would be as easy as adding to the command string in the same way\
    \ as the primary keys were created.\n\n## Customized Database Objects\n\nThe ability\
    \ to create highly flexible custom objects is not a simple task unless some sort\
    \ of dynamic code or TSQL is implemented. Your needs in this area can be very\
    \ specific, but generalized techniques can be used to get exactly what you want\
    \ every time.\n\n### The Problem\n\nSometimes you’ll want to create objects with\
    \ specific use-cases, but where the tables or columns involved may not always\
    \ be the same. Generating a stored procedure, function, or view given those variables\
    \ would normally be a manually intensive process. You can implement Dynamic SQL\
    \ in order to create or modify existing objects in ways that are both scalable\
    \ and reliable.\n\nChapter [9](#A371168_1_En_9_Chapter.html) introduced using\
    \ Dynamic SQL in order to `PIVOT` or `UNPIVOT` data when the column lists were\
    \ not known until runtime. What if you wanted to summarize the table data output\
    \ by those processes into a view, which would provide a convenient data source\
    \ for an application to access? Once a view is created, you can consider additional\
    \ options, such as schemabinding in order to improve schema integrity.\n\nConsider\
    \ a scenario in which you want to provide insight into employee hire dates based\
    \ on job titles. For a specific company, this is data that is requested so often\
    \ that a request is made for a more permanent data structure based on it. There\
    \ are a number of ways to approach this, including a custom table, view, or an\
    \ ETL process to manage report data based on these needs. These processes could\
    \ be managed via triggers, stored procedures, or a variety of other methods.\n\
    \n### The Solution\n\nFor the scenario outlined previously, you’ll provide an\
    \ example solution using a schemabound view, although other methods could be used\
    \ if the report or data requirements were different. The following TSQL in Listing\
    \ [10-10](#A371168_1_En_10_Chapter.html#Par66) will return the raw data that you\
    \ are looking for.\n\n```sql\nDECLARE @hire_date_years TABLE\n    (hire_date_year\
    \ NVARCHAR(50));\nINSERT INTO @hire_date_years\n    (hire_date_year)\nSELECT DISTINCT\n\
    \    DATEPART(YEAR, Employee.HireDate)\nFROM HumanResources.Employee;\nDECLARE\
    \ @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\n    *\nFROM\n\
    \    (   SELECT\n            Employee.BusinessEntityID,\n            Employee.JobTitle,\n\
    \            DATEPART(YEAR, Employee.HireDate) AS HireDate_Year\n        FROM\
    \ HumanResources.Employee\n    ) EMPLOYEE_DATA\nPIVOT\n    (   COUNT(BusinessEntityID)\n\
    \        FOR HireDate_Year IN (';\nSELECT @sql_command = @sql_command + '[' +\
    \ hire_date_year + '], '\nFROM @hire_date_years;\nSELECT @sql_command = SUBSTRING(@sql_command,\
    \ 1, LEN(@sql_command) - 1);\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA';\n\
    PRINT @sql_command;\nEXEC sp_executesql @sql_command;\n```\n\nListing 10-10.\n\
    Dynamic PIVOT that Returns a Count of Hire Year by Job Title\n\nThe output of\
    \ this query returns a data set similar to that in Figure [10-11](#A371168_1_En_10_Chapter.html#Fig11).\n\
    \n![A371168_1_En_10_Fig11_HTML.jpg](A371168_1_En_10_Fig11_HTML.jpg)\n\nFigure\
    \ 10-11.\n\nHire data returned by the dynamic PIVOT query in Listing [10-10](#A371168_1_En_10_Chapter.html#Par66)\n\
    \nEach job title is listed as the first column followed by a list of columns for\
    \ each hire date year present in the `Employee` table. If employees are added\
    \ or removed from the underlying table, columns may be added or removed from this\
    \ data set as hire dates are added or removed.\n\nNow that you have a query that\
    \ returns the results you want in the columnar format that you are looking for,\
    \ you can move this data into a customized view. One technicality that you need\
    \ to overcome is that when you create a schemabound view, you cannot include `*`\
    \ in the column list. If you take the TSQL and add a `CREATE VIEW…WITH SCHEMABINDING`\
