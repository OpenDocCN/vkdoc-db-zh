  trans: '# 条件分页


    如果一个数据集的大小可能差异很大，那么在收集数据之前对其进行一些初步分析可能是有益的。例如，如果你知道一个数据集只包含 13 行，那么就没有必要对其进行分页。你可以用单条语句从这
    13 行结果中选择所有行，无需进一步处理。同样地，如果一个结果集有 30 行，你知道它会适合放在 1-2 个页面上，这取决于每页显示多少条结果。


    对于这两种情况，最终用户很可能会查看大部分（如果不是全部）结果。如果一次搜索返回了巨大的结果集，那么你就知道分页是必要的。此外，你几乎可以肯定用户不会查看结果集中的所有结果。如果结果是根据相关性分数返回的（例如网络搜索引擎），那么用户很可能只会查看前
    10 或 20 条结果，然后就会继续前进或调整他们的搜索条件。


    ## 动态页面大小


    如果希望的话，页面大小也可以是动态的，作为使结果集尽可能有用的另一种方式。例如，如果返回了 26 条结果，仅为一条结果而需要点击到新页面会有点浪费。相反，一次性返回全部
    26 条结果会更简单、更高效，也更方便用户。


    如果结果是冗长的，并且包含占用大量空间的额外详细信息，那么自动返回较少的结果（基于冗长程度）可能是有利的。


    ## 特定于应用的分页


    了解应用程序的工作方式有助于确定最佳的分页方法。下面是一个搜索示例，它根据跟踪号的通配符搜索返回订单的行项目详细信息。作为一项常见搜索，`CarrierTrackingNumber`
    很可能会被索引，并且大多数搜索只会针对单个跟踪号进行。然而，关于如何执行搜索，应用程序可能有不同的要求，如清单 3-7 所示。


    ```sql

    CREATE PROCEDURE dbo.search_sales_order_detail

    @tracking_number NVARCHAR(25), @offset_by_this_many_rows INT = 0, @row_count_to_return
    INT = 25, @return_all_results BIT = 0

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Add wildcard delimiters to the tracking number

    SELECT @tracking_number = ''%'' + @tracking_number + ''%'';

    -- If the result set is small, return all results to the application for display.

    IF @return_all_results = 1

    BEGIN

    SELECT

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderHeader.Status,

    SalesOrderHeader.PurchaseOrderNumber,

    SalesOrderDetail.CarrierTrackingNumber,

    SalesOrderDetail.OrderQty,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.UnitPriceDiscount,

    SalesOrderDetail.LineTotal,

    Product.Name,

    Product.ProductNumber

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID

    WHERE CarrierTrackingNumber LIKE @tracking_number

    ORDER BY SalesOrderDetail.SalesOrderDetailID;

    END

    ELSE

    BEGIN

    SELECT

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderHeader.Status,

    SalesOrderHeader.PurchaseOrderNumber,

    SalesOrderDetail.CarrierTrackingNumber,

    SalesOrderDetail.OrderQty,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.UnitPriceDiscount,

    SalesOrderDetail.LineTotal,

    Product.Name,

    Product.ProductNumber

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID

    WHERE CarrierTrackingNumber LIKE @tracking_number

    ORDER BY SalesOrderDetail.SalesOrderDetailID

    OFFSET @offset_by_this_many_rows ROWS

    FETCH NEXT @row_count_to_return ROWS ONLY;

    END

    END

    GO

    ```


    清单 3-7. 使用多种输入参数的销售订单明细搜索


    此搜索提供了四个选项。跟踪号输入（可以是全部或部分跟踪号）是唯一必需的选项。`@offset_by_this_many_rows` 决定你是否在搜索中向前跳过，而
    `@row_count_to_return` 表示要选择的行数。`@return_all_results` 参数可以设置为 `1`，以绕过分页逻辑并返回所有结果。


    如果输入是一个完整的跟踪号，返回 shipment 的所有部分在逻辑上是合理的，并且返回的数据不太可能异常庞大，这将很有用。在此示例中，应用程序负责检查输入格式以验证这一点，但如果一个完整的跟踪号总是导致返回所有数据是普遍恒定的，那么存储过程也可以这样做。


    ## 执行示例


    输入参数上设置了默认值以简化假设，但如果应用程序希望始终填充它们，则可以省略这些默认值。让我们考虑一些对这个新搜索的示例输入：


    ```sql

    EXEC dbo.search_sales_order_detail ''4911-403C-98'', NULL, NULL, 1;

    ```


    这次搜索是针对一个完整的跟踪号。因此，应用程序指示应返回所有结果，无论数据大小如何。这是通过将 `@return_all_results` 设置为 `1`
    来实现的。此执行返回 12 行，它们构成了所有承运商跟踪号为 `4911-403C-98` 的销售订单明细。


    ```sql

    EXEC dbo.search_sales_order_detail ''491'';

    ```


    这次搜索更加通用，只搜索跟踪号的三个字符。没有任何额外输入时，存储过程默认只选择前 25 行。如果需要更多行，应用程序将需要提供额外的参数值来解决此问题：


    ```sql

    EXEC dbo.search_sales_order_detail ''491'', 25, 50, 0;

    ```


    通过添加 25 行的偏移量和 50 行的行计数，此存储过程调用将返回此跟踪号搜索的接下来的 50 行。如果用户继续点击“下一页”，则可以通过增加偏移量来返回更多结果。或者，用户会细化他们的搜索，在跟踪号输入字符串中添加更多字符，以便更有效地找到他们想要的内容。


    ## 总结


    此示例不涉及任何动态 SQL，但所使用的技术可以应用于任何搜索机制，以在结果集中包含某种程度的分页。分页是一种常见且通常必要的方法，用于对数据集增加控制，通过最终用户提高定制化，并通过不一次返回过多数据来保持良好的性能。'
- fmt: '### Search Limitations


    If you’ve ever tried searching a folder on your computer using very generic search
    terms, you’ve experienced the latency associated with running a very generic search.
    When building a search procedure for any application, it’s important to disallow
    or limit any user input that could cause strain on the search experience, as well
    as on server performance. A common approach is to not allow blank searches. That
    is, if users try to click Go with no text in any search box, the program either
    does nothing or returns a message requesting more information. Alternatively,
    the search could simply grab the first `50` results, display them, and wait for
    further user input as to the next steps to take. At no point in the process do
    you want to return excessive amounts of data from the database server, nor do
    you want to make the end users wait forever for that data to appear.


    An additional way to limit data volume is to ensure that too many columns cannot
    be requested from a custom search grid. If a results grid could theoretically
    have `500` different columns, it would be in your best interest to limit them
    to a much smaller number. Depending on the application, ten columns may be enough,
    or `25`, or maybe even `50`. That limit would be based on average application
    usage as well as the size of the columns and the amount of resources needed to
    return the data. If the search begins to experience lag after the `30`th column,
    then capping the number of columns in the results grid to `25` would be sensible.


    ### Input-Based Search


    The previous example allowed parameters to be passed into a search stored procedure
    that allowed for quite a bit of customization. As an additional step, you can
    parse user input and determine from the format what sort of data is being searched
    for. This is useful for the corner search box found on many web pages. In these
    applications, there is sometimes an advanced search feature available, but the
    average user wants to enter text in a single place and receive immediate feedback.
    These searches can be a bit messy as they may need to search many types of data,
    and running a blanket search on many different columns at once will likely perform
    poorly and return false positives. If the search instructions indicate that the
    text can be entered in one of many forms before defaulting to a single text description,
    you can optimize the search to focus on a select few indexed columns, rather than
    every possible search criteria all at once. Listing [3-8](#A371168_1_En_3_Chapter.html#Par75)
    illustrates a sales order search that allows a variety of inputs to be entered.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_sales_order_detail'')

    BEGIN

    DROP PROCEDURE dbo.search_sales_order_detail;

    END

    GO

    CREATE PROCEDURE dbo.search_sales_order_detail

    @input_search_data NVARCHAR(25), @offset_by_this_many_rows INT = 0, @row_count_to_return
    INT = 25, @return_all_results BIT = 0

    AS

    BEGIN

    SET NOCOUNT ON;

    -- For this search procedure, do not allow blank input. If blank is entered, return
    immediately with no result set.

    -- Input parameter does not allow NULLs

    IF LTRIM(RTRIM(@input_search_data)) = ''''

    RETURN;

    -- Pad the input string with spaces, in case it isn''t 25 characters long. This
    will avoid string truncation below.

    SET @input_search_data = @input_search_data + REPLICATE('' '', 25 - LEN(@input_search_data));

    -- Parse the @input_search_data to determine the data it references

    DECLARE @input_type NVARCHAR(25);

    -- Search by Sales Order Number: Starts with "SO" and at least 5 numbers

    IF (LEFT(@input_search_data, 2) = ''SO'' AND ISNUMERIC(SUBSTRING(@input_search_data,
    3, 5)) = 1)

    SET @input_type = ''SalesOrderNumber'';

    ELSE

    -- Search by Purchase Order Number: Starts with "PO" and at least 10 numbers

    IF (LEFT(@input_search_data, 2) = ''PO'' AND ISNUMERIC(SUBSTRING(@input_search_data,
    3, 10)) = 1)

    SET @input_type = ''PurchaseOrderNumber'';

    ELSE

    -- Search by Account Number: Starts with two number, a hyphen, 4 numbers, a hyphen,
    and at least 6 additional numbers

    IF (ISNUMERIC(LEFT(@input_search_data, 2)) = 1 AND SUBSTRING(@input_search_data,
    3, 1) = ''-'' AND ISNUMERIC(SUBSTRING(@input_search_data, 4, 4)) = 1

    AND SUBSTRING(@input_search_data, 8, 1) = ''-'' AND ISNUMERIC(SUBSTRING(@input_search_data,
    9, 6)) = 1)

    SET @input_type = ''AccountNumber'';

    ELSE

    -- Search by Carrier Tracking Number: 4 Alphanumeric, 1 hyphen, 4 alphanumeric,
    one hyphen, and two alphanumeric

    IF (PATINDEX(''%[^a-zA-Z0-9]%'' , LEFT(@input_search_data, 4)) = 0 AND SUBSTRING(@input_search_data,
    5, 1) = ''-'' AND PATINDEX(''%[^a-zA-Z0-9]%'' , SUBSTRING(@input_search_data,
    6, 4)) = 0

    AND SUBSTRING(@input_search_data, 10, 1) = ''-'' AND PATINDEX(''%[^a-zA-Z0-9]%''
    , SUBSTRING(@input_search_data, 11, 2)) = 0)

    SET @input_type = ''CarrierTrackingNumber'';

    ELSE

    -- Search by Product Number: Starts with two letters, a dash, and four alphanumeric
    characters: AA-12YZ

    IF (PATINDEX(''%[^a-zA-Z]%'' , LEFT(@input_search_data, 2)) = 0 AND SUBSTRING(@input_search_data,
    3, 1) = ''-'' AND PATINDEX(''%[^a-zA-Z0-9]%'' , SUBSTRING(@input_search_data,
    4, 4)) = 0)

    SET @input_type = ''ProductNumber'';

    ELSE

    -- Default our input to carrier tracking number, if no other format is identified.

    SET @input_type = ''CarrierTrackingNumber'';

    -- Remove additional padding to prevent bad string matches.

    -- Add a wildcard delimiter to the end of the input, to account for additional
    characters at the end.

    SELECT @input_search_data = LTRIM(RTRIM(@input_search_data)) + ''%'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    -- Create the parameter list and initial command string

    SET @parameter_list = ''@input_search_data NVARCHAR(25), @offset_by_this_many_rows
    INT, @row_count_to_return INT'';

    SET @sql_command = ''

    SELECT

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderHeader.Status,

    SalesOrderHeader.PurchaseOrderNumber,

    SalesOrderHeader.AccountNumber,

    SalesOrderHeader.SalesOrderNumber,

    SalesOrderDetail.CarrierTrackingNumber,

    SalesOrderDetail.OrderQty,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.UnitPriceDiscount,

    SalesOrderDetail.LineTotal,

    Product.Name,

    Product.ProductNumber

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID'';

    -- Based on the value of @input_type, dynamically generate the WHERE clause.

    IF @input_type = ''ProductNumber''

    SET @sql_command = @sql_command + ''

    WHERE Product.ProductNumber LIKE @input_search_data'';

    ELSE IF @input_type = ''SalesOrderNumber''

    SET @sql_command = @sql_command + ''

    WHERE SalesOrderHeader.SalesOrderNumber LIKE @input_search_data'';

    ELSE IF @input_type = ''PurchaseOrderNumber''

    SET @sql_command = @sql_command + ''

    WHERE SalesOrderHeader.PurchaseOrderNumber LIKE @input_search_data'';

    ELSE IF @input_type = ''AccountNumber''

    SET @sql_command = @sql_command + ''

    WHERE SalesOrderHeader.AccountNumber LIKE @input_search_data'';

    ELSE IF @input_type = ''CarrierTrackingNumber''

    SET @sql_command = @sql_command + ''

    WHERE SalesOrderDetail.CarrierTrackingNumber LIKE @input_search_data'';

    SET @sql_command = @sql_command + ''

    ORDER BY SalesOrderDetail.SalesOrderDetailID'';

    -- If there are any row limitations, append them here

    SET @sql_command = @sql_command + ''

    OFFSET @offset_by_this_many_rows ROWS'';

    IF @return_all_results = 0

    SET @sql_command = @sql_command + ''

    FETCH NEXT @row_count_to_return ROWS ONLY;'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @input_search_data, @offset_by_this_many_rows,
    @row_count_to_return;

    END

    ```


    Listing 3-8. Sales Order Detail Search that Detects Input Type Based on String
    Form'
