- fmt: '# SQL Server 全文搜索存储过程与技术债务管理


    This stored procedure is somewhat extensive, but provides an excellent research
    tool that will search all databases on a server, as well as SQL Server Agent jobs,
    for any text provided as the `@searchString`. Since database level system views
    differ within each database, it is necessary to query these views on a database-by-database
    basis. Dynamic SQL is used in order to quickly iterate through all databases (except
    `msdb`, `model`, `tempdb`, and any offline databases). Three result sets are returned:
    database objects, indexes, and jobs. If desired, these output tables can be combined
    into a single output table using `UNION ALL`, but for the purposes of this demonstration,
    we’ll keep them separate, which makes each more readable.


    ## 搜索功能示例


    If you had a generic search to perform, perhaps to determine if the `BusinessEntityContact`
    table is referenced anywhere on the server, you could run the stored procedure
    as follows:


    ```

    EXEC dbo.search_all_schema N''BusinessEntityContact'';

    ```


    The resulting data set in Figure 4-5 includes four views, two table-valued functions,
    two tables, and eight indexes across two databases. No indexes or jobs were found
    with this name. If there was a desire to limit the database name so that you don’t
    expend extra resources and return results from all databases, another parameter
    could easily be added to specify a database search term as well.


    ![A371168_1_En_4_Fig5_HTML.jpg](A371168_1_En_4_Fig5_HTML.jpg)


    *Figure 4-5. Example output from execution of a schema search using a table name*


    This search capability can be extremely useful when researching software changes,
    existing objects, and dependencies. Finding all instances of a table name requires
    seconds, rather than hours, of research. This stored procedure can be used in
    order to search for more specific search terms, such as the name of a primary
    key:


    ```

    EXEC dbo.search_all_schema N''PK_Sales'';

    ```


    The results in Figure 4-6 show a limited set of primary keys, all starting with
    the search term provided.


    ![A371168_1_En_4_Fig6_HTML.jpg](A371168_1_En_4_Fig6_HTML.jpg)


    *Figure 4-6. Example output from execution of a schema search using a primary
    key name*


    This illustrates some noise as a number of primary keys happen to contain the
    specific name you were looking for. Removing the noise from the result set is
    a trivial task, although the additional results can be useful when looking for
    schema similar to the target search object. A final example in Figure 4-7 shows
    the results for a more specific search using the full schema and table name for
    an object.


    ![A371168_1_En_4_Fig7_HTML.jpg](A371168_1_En_4_Fig7_HTML.jpg)


    *Figure 4-7. Example output from execution of a schema search using a full table
    name*


    ```

    EXEC dbo.search_all_schema N''Production.Product'';

    ```


    This execution shows very specific results, as only two stored procedures and
    a lone job reference the full text of `Production.Product`.


    ## 应用与扩展


    Tools such as this can be invaluable ways in which to keep up with database schema
    maintenance effectively. If there are capabilities specific to your database environment
    that are not addressed by this stored procedure, consider modifying it to add
    further filters, search capabilities, or specific hard-coded needs for one application.
    There are many other objects in SQL Server that are not addressed here, but could
    be, such as replication publication names, linked server names, logins, users,
    or SSIS package details. Adding these (or others) would be a task in appending
    additional TSQL to the Dynamic SQL section to include whatever additional objects
    are needed.


    Use search capabilities to assist in removing deprecated functionality, updating
    dependencies, and ensuring that your team has the necessary knowledge to ensure
    that technical debt is addressed as effectively and efficiently as possible, before
    it becomes unmanageable. These regular searches can help ensure maximum security
    within your application as potential security holes can be quickly found and patched.
    A search for `sp_executesql` and `EXEC` could help uncover all uses of Dynamic
    SQL, which could be valuable in verifying that SQL injection is not possible from
    TSQL within the database server.


    # Cleaning House


    A task that is often overlooked in favor of pushing forward with new features
    is removing old columns, tables, stored procedures, or other TSQL. A typical development
    cycle involves deprecating unused features and essentially flagging them for future
    removal. What are often left out are the details as to how and when those objects
    are removed. Until such a time arrives, it is unlikely that they will be fully
    updated or maintained. For all intents and purposes, they are technical debt that
    will remain indefinitely unless special efforts are made to deal with them.


    Once you charge forward to work on upgrades, new features, and other research
    and development, cleanup becomes a distant memory. Even SQL Server itself is filled
    with a long list of deprecated features. A deprecated feature is one that is flagged
    for future removal, but remains in the interim for backward compatibility purposes.
    To provide context, at the time of this writing, SQL Server 2016 CTP contains
    a total of 254 deprecated features. In contrast, the number of discontinued features
    is 30. Discontinued features are those that are removed from the product and no
    longer usable. Clearly it is much easier to end support for a feature and cease
    upgrading it than to go through the trouble of removing it altogether. If this
    is a slow transition for Microsoft, then clearly it is a challenge for anyone!


    ## 管理功能废弃与移除


    An excellent way to manage the deprecation and removal of software features is
    to build the discontinuation process into the standard development lifecycle.
    When a feature is flagged as no longer needed, include a timeline by which it
    will be removed. Beyond just creating a schedule, be sure to include enough details
    that the discontinuation can be acted upon. Consider these questions:


    - What components need to be addressed in order for this feature to be completely
    removed?

    - How much effort is required to remove each component?

    - Who needs to be involved in each component’s removal?

    - Where in the development schedule for new features will this work fit?

    - What upkeep is required of these features in the interim, until they are removed?


    As technical debt, this work will often fall lower in priority than new features.
    Asking and answering these questions can help ensure that important maintenance
    work is not forgotten. The last point is critically important when advocating
    for this work: What constant work and upkeep is required to properly maintain
    old components? This can incorporate software licensing costs, extra hardware
    usage, cloud storage and processing power, documentation, and anything else that
    could conceivably cost time and money.


    ## 风险与影响


    In the same way that the tonsils or appendix might act as liabilities to your
    health, old features slowly impede progress over time. More importantly, they
    provide areas that are more likely to suffer from security vulnerabilities, as
    they are no longer in the forefront of your development efforts. Oftentimes deprecated
    features are maintained quickly and with minimal QA as they are no longer as critical
    to the application and may not even be used in the frontend anymore. These are
    facts that must be wrestled as part of the regular development of an application,
    but are of particular interest to DBAs when Dynamic SQL is involved, as it can
    provide additional access that may become undesirable over time.'
  raw: 'This stored procedure is somewhat extensive, but provides an excellent research
    tool that will search all databases on a server, as well as SQL Server Agent jobs,
    for any text provided as the `@searchString`. Since database level system views
    differ within each database, it is necessary to query these views on a database-by-database
    basis. Dynamic SQL is used in order to quickly iterate through all databases (except
    `msdb`, `model`, `tempdb`, and any offline databases). Three result sets are returned:
    database objects, indexes, and jobs. If desired, these output tables can be combined
    into a single output table using `UNION ALL`, but for the purposes of this demonstration,
    we’ll keep them separate, which makes each more readable.


    If you had a generic search to perform, perhaps to determine if the `BusinessEntityContact`
    table is referenced anywhere on the server, you could run the stored procedure
    as follows:


    ```

    EXEC dbo.search_all_schema N''BusinessEntityContact'';

    ```


    The resulting data set in Figure [4-5](#A371168_1_En_4_Chapter.html#Fig5) includes
    four views, two table-valued functions, two tables, and eight indexes across two
    databases. No indexes or jobs were found with this name. If there was a desire
    to limit the database name so that you don’t expend extra resources and return
    results from all databases, another parameter could easily be added to specify
    a database search term as well.


    ![A371168_1_En_4_Fig5_HTML.jpg](A371168_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    Example output from execution of a schema search using a table name


    This search capability can be extremely useful when researching software changes,
    existing objects, and dependencies. Finding all instances of a table name requires
    seconds, rather than hours, of research. This stored procedure can be used in
    order to search for more specific search terms, such as the name of a primary
    key:


    ```

    EXEC dbo.search_all_schema N''PK_Sales'';

    ```


    The results in Figure [4-6](#A371168_1_En_4_Chapter.html#Fig6) show a limited
    set of primary keys, all starting with the search term provided.


    ![A371168_1_En_4_Fig6_HTML.jpg](A371168_1_En_4_Fig6_HTML.jpg)


    Figure 4-6.


    Example output from execution of a schema search using a primary key name


    This illustrates some noise as a number of primary keys happen to contain the
    specific name you were looking for. Removing the noise from the result set is
    a trivial task, although the additional results can be useful when looking for
    schema similar to the target search object. A final example in Figure [4-7](#A371168_1_En_4_Chapter.html#Fig7)
    shows the results for a more specific search using the full schema and table name
    for an object.


    ![A371168_1_En_4_Fig7_HTML.jpg](A371168_1_En_4_Fig7_HTML.jpg)


    Figure 4-7.


    Example output from execution of a schema search using a full table name


    ```

    EXEC dbo.search_all_schema N''Production.Product'';

    ```


    This execution shows very specific results, as only two stored procedures and
    a lone job reference the full text of `Production.Product`.


    Tools such as this can be invaluable ways in which to keep up with database schema
    maintenance effectively. If there are capabilities specific to your database environment
    that are not addressed by this stored procedure, consider modifying it to add
    further filters, search capabilities, or specific hard-coded needs for one application.
    There are many other objects in SQL Server that are not addressed here, but could
    be, such as replication publication names, linked server names, logins, users,
    or SSIS package details. Adding these (or others) would be a task in appending
    additional TSQL to the Dynamic SQL section to include whatever additional objects
    are needed. Use search capabilities to assist in removing deprecated functionality,
    updating dependencies, and ensuring that your team has the necessary knowledge
    to ensure that technical debt is addressed as effectively and efficiently as possible,
    before it becomes unmanageable. These regular searches can help ensure maximum
    security within your application as potential security holes can be quickly found
    and patched. A search for `sp_executesql` and `EXEC` could help uncover all uses
    of Dynamic SQL, which could be valuable in verifying that SQL injection is not
    possible from TSQL within the database server.


    ## Cleaning House


    A task that is often overlooked in favor of pushing forward with new features
    is removing old columns, tables, stored procedures, or other TSQL. A typical development
    cycle involves deprecating unused features and essentially flagging them for future
    removal. What are often left out are the details as to how and when those objects
    are removed. Until such a time arrives, it is unlikely that they will be fully
    updated or maintained. For all intents and purposes, they are technical debt that
    will remain indefinitely unless special efforts are made to deal with them.


    Once you charge forward to work on upgrades, new features, and other research
    and development, cleanup becomes a distant memory. Even SQL Server itself is filled
    with a long list of deprecated features. A deprecated feature is one that is flagged
    for future removal, but remains in the interim for backward compatibility purposes.
    To provide context, at the time of this writing, SQL Server 2016 CTP contains
    a total of 254 deprecated features. In contrast, the number of discontinued features
    is 30\. Discontinued features are those that are removed from the product and
    no longer usable. Clearly it is much easier to end support for a feature and cease
    upgrading it than to go through the trouble of removing it altogether. If this
    is a slow transition for Microsoft, then clearly it is a challenge for anyone!


    An excellent way to manage the deprecation and removal of software features is
    to build the discontinuation process into the standard development lifecycle.
    When a feature is flagged as no longer needed, include a timeline by which it
    will be removed. Beyond just creating a schedule, be sure to include enough details
    that the discontinuation can be acted upon. Consider these questions:


    *   What components need to be addressed in order for this feature to be completely
    removed?

    *   How much effort is required to remove each component?

    *   Who needs to be involved in each component’s removal?

    *   Where in the development schedule for new features will this work fit?

    *   What upkeep is required of these features in the interim, until they are removed?


    As technical debt, this work will often fall lower in priority than new features.
    Asking and answering these questions can help ensure that important maintenance
    work is not forgotten. The last point is critically important when advocating
    for this work: What constant work and upkeep is required to properly maintain
    old components? This can incorporate software licensing costs, extra hardware
    usage, cloud storage and processing power, documentation, and anything else that
    could conceivably cost time and money.


    In the same way that the tonsils or appendix might act as liabilities to your
    health, old features slowly impede progress over time. More importantly, they
    provide areas that are more likely to suffer from security vulnerabilities, as
    they are no longer in the forefront of your development efforts. Oftentimes deprecated
    features are maintained quickly and with minimal QA as they are no longer as critical
    to the application and may not even be used in the frontend anymore. These are
    facts that must be wrestled as part of the regular development of an application,
    but are of particular interest to DBAs when Dynamic SQL is involved, as it can
    provide additional access that may become undesirable over time.'
  trans: '# SQL Server 全文搜索存储过程与技术债务管理


    此存储过程功能相当广泛，但提供了一个出色的研究工具，可以搜索服务器上的所有数据库以及 SQL Server Agent 作业，查找任何作为 `@searchString`
    参数提供的文本。由于数据库级别的系统视图在每个数据库中有所不同，因此有必要逐个数据库查询这些视图。使用动态 SQL 可以快速遍历所有数据库（`msdb`、`model`、`tempdb`
    以及任何脱机数据库除外）。它返回三个结果集：数据库对象、索引和作业。如果需要，可以使用 `UNION ALL` 将这些输出表合并为单个输出表，但为了本演示的目的，我们将它们分开，这样每个结果集的可读性更高。


    ## 搜索功能示例


    如果你需要执行一个通用的搜索，例如确定 `BusinessEntityContact` 表是否在服务器的任何地方被引用，你可以按如下方式运行存储过程：


    ```

    EXEC dbo.search_all_schema N''BusinessEntityContact'';

    ```


    图 4-5 中的结果数据集包括两个数据库中的四个视图、两个表值函数、两个表和八个索引。未找到以此名称命名的索引或作业。如果希望限制数据库名称，以免浪费额外资源并返回所有数据库的结果，可以轻松添加另一个参数来指定数据库搜索词。


    ![A371168_1_En_4_Fig5_HTML.jpg](img/A371168_1_En_4_Fig5_HTML.jpg)


    *图 4-5. 使用表名执行架构搜索的输出示例*


    这种搜索功能在研究软件变更、现有对象和依赖关系时极其有用。查找一个表名的所有实例只需要几秒钟的研究时间，而不是几个小时。此存储过程可用于搜索更具体的搜索词，例如主键的名称：


    ```

    EXEC dbo.search_all_schema N''PK_Sales'';

    ```


    图 4-6 中的结果显示了一组有限的主键，它们都以你提供的搜索词开头。


    ![A371168_1_En_4_Fig6_HTML.jpg](img/A371168_1_En_4_Fig6_HTML.jpg)


    *图 4-6. 使用主键名称执行架构搜索的输出示例*


    这产生了一些“噪音”，因为许多主键恰好包含了你正在寻找的特定名称。从结果集中清除噪音是一项微不足道的任务，尽管这些额外结果在寻找与目标搜索对象类似的模式时可能有用。图
    4-7 中的最后一个示例显示了使用对象的完整架构和表名进行更具体搜索的结果。


    ![A371168_1_En_4_Fig7_HTML.jpg](img/A371168_1_En_4_Fig7_HTML.jpg)


    *图 4-7. 使用完整表名执行架构搜索的输出示例*


    ```

    EXEC dbo.search_all_schema N''Production.Product'';

    ```


    此执行显示了非常具体的结果，因为只有两个存储过程和一个孤立的作业引用了 `Production.Product` 的完整文本。


    ## 应用与扩展


    像这样的工具是有效跟进数据库模式维护的宝贵方法。如果有一些针对你的数据库环境的功能是此存储过程未涉及的，请考虑修改它以添加进一步的过滤器、搜索能力，或针对特定应用程序的硬编码需求。SQL
    Server 中还有许多其他对象未在此处处理，但可以包括，例如复制发布名称、链接服务器名称、登录名、用户或 SSIS 包详情。添加这些（或其他）对象的任务将是向动态
    SQL 部分附加额外的 T-SQL 代码，以包含所需的任何其他对象。


    利用搜索功能协助移除废弃功能、更新依赖关系，并确保你的团队在技术债务变得难以管理之前，具备必要的知识，以尽可能高效有效地处理它。这些定期搜索有助于确保应用程序的最大安全性，因为潜在的安全漏洞可以被快速发现和修补。搜索
    `sp_executesql` 和 `EXEC` 有助于发现动态 SQL 的所有使用情况，这对于验证数据库服务器内的 T-SQL 是否存在 SQL 注入漏洞可能很有价值。


    # 清理 house


    一项经常被忽视，以便推进新功能的任务是移除旧的列、表、存储过程或其他 T-SQL。典型的开发周期包括废弃未使用的功能，并基本上将其标记为未来移除。常常被忽略的是关于这些对象如何以及何时被移除的细节。在时机到来之前，它们不太可能得到完全更新或维护。无论如何，它们都是技术债务，除非付出特殊努力来处理，否则将无限期存在。


    一旦你全力投入到升级、新功能和其他研发工作中，清理工作就变成了遥远的记忆。即使是 SQL Server 本身也充满了长长的废弃功能列表。废弃功能是指被标记为未来移除，但为了向后兼容目的而在过渡期间保留的功能。为了提供背景，在撰写本文时，SQL
    Server 2016 CTP 总共有 254 个废弃功能。相比之下，已中止的功能数量为 30。已中止的功能是从产品中移除且不再可用的功能。显然，结束对某个功能的支持并停止升级它，比完全移除它的麻烦要容易得多。如果这对微软来说是一个缓慢的过渡，那么对任何人来说显然都是一个挑战！


    ## 管理功能废弃与移除


    管理软件功能废弃和移除的一个好方法，是将中止过程纳入标准开发生命周期。当一个功能被标记为不再需要时，包含一个将其移除的时间表。除了创建时间表之外，还要确保包含足够的细节，以便可以执行中止操作。考虑以下问题：


    - 为了完全移除此功能，需要处理哪些组件？

    - 移除每个组件需要多少工作量？

    - 谁需要参与每个组件的移除工作？

    - 这项工作将如何适应新功能的开发时间表？

    - 在移除之前，这些功能需要什么维护？


    作为技术债务，这项工作的优先级通常低于新功能。提出并回答这些问题有助于确保重要的维护工作不会被遗忘。最后一点在倡导这项工作时至关重要：为了正确维护旧组件，需要哪些持续的工作和维护？这可能包括软件许可成本、额外的硬件使用、云存储和处理能力、文档，以及任何其他可能耗费时间和金钱的东西。


    ## 风险与影响


    正如扁桃体或阑尾可能成为你健康的负担一样，旧功能会随着时间的推移慢慢阻碍进展。更重要的是，它们提供了更容易遭受安全漏洞的区域，因为它们不再是你开发工作的前沿。通常，废弃功能的维护很快，质量保证最少，因为它们对应用程序不再那么关键，甚至可能不再在前端使用。这些事实必须作为应用程序常规开发的一部分来应对，但当涉及动态
    SQL 时，对 DBA 尤为重要，因为它可能提供额外的访问权限，这些权限随着时间的推移可能会变得不受欢迎。'
- fmt: '# SQL Server 安全实践：弃用功能与权限管理


    ## 弃用不安全功能与代码移除


    如果正在弃用使用动态 SQL、`xp_cmdshell` 或 SQL Server 中任何可能为数据库对象提供额外访问权限的功能，请考虑作为流程的一部分采取额外步骤来保护它们。如果应用程序不再使用该功能，请考虑移除动态
    SQL 部分，并用令牌占位符替换。这确保了任何一方，无论是组织内部还是外部，都无法以任何方式滥用它。此策略可用于任何不再使用但必须维护以确保软件构建成功完成的
    T-SQL。如果一个功能不再使用但无法被直接丢弃，请考虑将其缩减至开发流程所允许的最小范围。这不仅会降低安全风险，而且在需要移除时会使过程更容易，因为更多的功能可能已经不存在了。


    移除未使用和过时的代码可能是防止未来发生意外安全漏洞的最有效方法之一。


    移除功能时的一个常见错误是意外地让其部分仍在使用，或者某些组件仍在应用程序中运行。也许一个搜索过程在软件加载时仍然运行，即使结果未被应用程序捕获。另一种可能性是，存在一个不再被任何活动页面链接的网页，但通过手动输入
    URL 或通过收藏夹访问该页面仍可访问。在弃用过程中移除核心功能将突出显示这些被遗漏的机会，并提供简单的 QA 反馈，以便这些漏洞可以被迅速关闭。这可以简化停止使用的过程，并消除由于意外/隐藏代码路径导致的未来开发错误或安全漏洞的可能性。


    ## 登录与用户使用


    “最小权限原则”告诉您，只为登录名和用户完成其工作提供所需的权限，不多也不少。为了有效实施，一个隐含的步骤是不要在多个应用程序或用户之间共享登录名。每个单独的
    SQL Server 登录名，无论它使用 Windows 身份验证还是 SQL Server 身份验证，都应服务于一个独特且单一的目的。这通过以下方式大大提高了安全性：


    *   更容易禁用然后删除与旧应用程序或已离职员工相关的未使用登录名。

    *   为每个单独的应用程序提供更细粒度的权限控制。

    *   阻止不同员工，特别是来自不同部门或担任不同角色的员工，共享用户。

    *   通过保持对安全性的微妙关注，鼓励负责任的开发习惯。

    *   允许更轻松地将应用程序迁移到新的服务器或平台。

    *   提高对安全威胁、漏洞或攻击的响应速度。


    考虑这样一个场景：一个应用程序在三个数据库上拥有 `db_owner` 权限。一名新员工入职并将为您的组织维护此应用程序。她被提供了一个标准登录名、访问权限和关联账户。作为便利，该用户也被授予了应用程序所使用的登录名的凭据。这使得新员工可以立即开始她的应用程序开发工作，而无需任何额外的安全请求。一年后，应用程序扩展，需要额外的权限来访问一些系统视图和管理一些服务器设置。


    几年后，该员工离开了公司，IT 部门忘记了她拥有应用程序登录名的访问权限，因此他们未能更改密码或考虑这些事实带来的后果。该员工发现她通过应用程序登录名的访问权限仍然完好无损，并决定悄悄窃取一些组织数据。从这一点开始，该组织就被入侵了，而且极有可能直到采取某些引起他们注意的行动之前，她的访问都不会被发现。除了窃取数据，她还可以更改数据库设置、修改数据，甚至删除应用程序数据库。


    解决此问题的方法是从一开始就绝不让该员工共享登录名。创建新的登录名或修改其标准凭据以合并这些额外权限可能会花费一些额外时间。文档也将是关键，以确保任何可能需要审计、更改或禁用其访问权限的人员都可以访问该用户的额外访问权限。登录名共享的时间越长，就越容易忘记这种双重性的本质，并对其“正常工作”变得自满。


    一个同样令人沮丧的情况是，将个人的登录名用作应用程序的登录凭据。只要该员工在组织内工作，这种设置就可以正常工作，但一旦他离开，事情就变得棘手了。如果 IT
    注意到共享用户，他们将被迫快速计划一次临时权限更改。这可能涉及更改应用程序密码或创建新的应用程序用户。这两者都可能需要停机时间以促进更改。如果共享用户未被记录在案，并且在该员工离职时按照标准程序被禁用，应用程序将立即停止工作。结果将是计划外的停机时间，并且负责该应用程序的人员可能需要加班到深夜。'
  raw: 'If features are deprecated that use Dynamic SQL, `xp_cmdshell`, or any other
    features of SQL Server that can potentially provide extra access to database objects,
    consider additional steps to secure them as part of the process. If the feature
    is no longer used by the application, consider removing the Dynamic SQL portion
    and replacing it with a token placeholder. This ensures that it cannot be abused
    in any way by any party, internal or external to your organization. This tactic
    can be employed for any TSQL that is no longer used, but must be maintained so
    that software builds can complete successfully. If a feature is no longer used,
    but cannot be dropped, consider reducing it to the smallest footprint allowed
    by your development process. Not only will this reduce security risks, but it
    will make the removal process easier when the time comes, as more of the functionality
    would already be gone.


    Removing unused and outdated code can be one of the most effective ways to prevent
    unexpected security breaches in the future.


    A common error made when removing features is to accidentally leave it partially
    in use or have some component of it still running in the application. Maybe a
    search procedure still runs when software is loaded, even if the results are not
    captured by the application. Another possibility is that there is a web page that
    is no longer linked by any active pages, but can still be accessed by entering
    a URL manually or following a favorite to the same page. Removing core functionality
    as part of deprecation will highlight these missed opportunities and provide easy
    QA feedback so that these holes can be quickly closed. This can simplify the discontinuation
    process and remove the potential for future development errors or security breaches
    via unexpected/hidden code paths.


    ## Login and User Usage


    The “Principle of Least Privilege” tells you to provide logins and users with
    only what they need to do their jobs and nothing more. An additional implied step
    in order to be effective is to not share logins across multiple applications or
    users. Each individual SQL Server login, whether it uses Windows authentication
    or SQL Server authentication, should serve a distinct and singular purpose. This
    greatly improves security by:


    *   Making it easier to disable and later drop unused logins related to old applications
    or terminated employees.

    *   Providing more granular control over permissions for each individual application.

    *   Discouraging the sharing of users by different employees, especially if they
    are from different departments or in different roles.

    *   Encouraging responsible development habits by maintaining a subtle focus on
    security.

    *   Allowing for easier migration of applications to new servers or platforms.

    *   Improving the response time to security threats, breaches, or attacks.


    Consider a scenario in which an application has `db_owner` privileges on three
    databases. A new employee starts and will be maintaining this application for
    your organization. She is provided with a standard login, access, and associated
    accounts. As a convenience, this user is also given the credentials for the login
    that is used by the application. This allows the new employee to immediately begin
    work on her application development without any additional security requests.
    A year later, the application expands and requires additional privileges to access
    some system views and manage some server settings.


    Several years later, the employee leaves the company, and IT has forgotten that
    she had access to an application login, so they fail to change passwords or consider
    the repercussions of these facts. The employee discovers that her access is still
    intact via the application login and decides to quietly steal some organizational
    data. From this point on, this organization is compromised and it is highly unlikely
    that her access will be caught until some action is taken that gets their attention.
    In addition to stealing data, she could also alter database settings, change data,
    or even drop the application databases.


    The solution to this problem is to never let this employee share logins in the
    first place. This may have taken some additional time to create a new login or
    alter their standard-issue credentials to incorporate these added permissions.
    Documentation would also be key to ensuring that this user’s additional access
    is available by anyone who may need to audit, alter, or disable their access.
    The longer a login is shared, the easier it is to forget the nature of this duality
    and become complacent in its “just working”.


    An equally frustrating situation is when an individual’s login is used as the
    logins credentials for an application. This setup works as long as the employee
    is working for the organization, but as soon as he leaves, things get tricky.
    In the event that IT notices the shared user, they will be forced to quickly plan
    an ad-hoc change of permissions. This may involve changing application passwords
    or creating a new application user. Either of these could require downtime in
    order to facilitate the change. If the shared user is not documented and is disabled
    as per standard procedures when this employee departs, the application will immediately
    stop working. The result will be unplanned downtime and likely a late night for
    those in charge of the application.'
