  trans: '

    ## 盲注 SQL 注入


    即使黑客无法通过 SQL 注入获得对数据库服务器的完全访问权限，他们仍然可以利用某些查询元素来逐步获取有关服务器、其安全设置和数据的信息。这可以通过前面演示的
    SQL 注入方法实现，也可以通过修改直接传递给应用程序的 URL 或其他数据来实现。


    这种攻击最简单的例子是修改 HTTP 字符串以查看用户原本无法访问的数据，例如用户个人资料、私人图片或即将进行的旅行计划。这种攻击几乎不需要 TSQL 知识，因此非常常见，通常是针对
    Web 应用程序的首批尝试之一。防范这些数据窃取尝试的方法是确保网页本身不允许 URL 被随意修改。此外，如果对所有访问敏感数据的请求都验证用户、客户端或
    Web 浏览器数据，那么拒绝未授权访问就会变得容易得多。


    如果黑客能通过动态 SQL 获得部分 SQL Server 访问权限，但受到安全限制，他们可以利用有限的权限探测服务器，逐步发现限制、安全设置、数据元素等。他们会发送
    `IF` 语句形式的请求，这些语句的求值结果为真或假。或者，恶意用户可能提出导致错误消息的问题，从而根据语句是否抛出错误来判断结果。`TRY/CATCH`
    可用于管理错误消息，从而减少这些查询对 Web 或数据库日志的影响。还可以使用延迟，根据响应完成所需的时间来帮助诊断响应。即使显示的是友好错误信息，该信息也能确认他们拥有足够的权限来查询服务器信息并且成功了。


    清单 2-16 展示了一些可能针对易受攻击的服务器发起的盲注 SQL 查询的简单示例。


    ```

    IF CURRENT_USER = ''dbo'' SELECT 1 ELSE SELECT 0;

    IF @@VERSION LIKE ''%12.0%'' SELECT 1 ELSE SELECT 0;

    IF (SELECT COUNT(*) FROM Person.Person WHERE FirstName = ''Edward'' AND LastName
    = ''Pollack'') > 0

    WAITFOR DELAY ''00:00:05''

    ELSE

    WAITFOR DELAY ''00:00:00'';

    BEGIN TRY

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT COUNT(*) FROM dbo.password;''

    EXEC (@sql_command)

    END TRY

    BEGIN CATCH

    SELECT 0

    END CATCH;

    清单 2-16.

    可能在盲注 SQL 注入攻击中使用的示例查询

    ```


    前三个例子使用基本的“是/否”问题来尝试了解服务器信息。最后一个例子则更隐蔽，涉及创建额外的动态 SQL 来进一步探测数据库对象，而在此过程中不会引发数据库错误。如果存在语法错误，`TRY/CATCH`
    就不起作用，因此查询无效表会返回错误消息。注入或追加额外的动态 SQL 可以让攻击者验证表的存在，而不会导致语法或解析错误。


    盲注是一种较慢的攻击方法，但随着时间的推移，它可以揭示系统的关键数据。每个查询都揭示一小块信息，在拥有足够数据后，黑客可能能够更改/绕过安全限制，从而像没有采取任何安全预防措施一样执行查询。


    ## 检测与预防


    预防是防止 SQL 注入的最佳方式，但和任何大型软件系统一样，总会存在一些早于你编写的代码，其中可能包含安全漏洞。我们如何防御现有的威胁，或者那些我们尚未识别的威胁呢？


    ### 安全测试


    对于公司而言，让第三方供应商对其应用程序进行渗透测试已成为一项常规安全任务。这为公正的外部来源提供了一个机会，来探测你的环境中是否存在任何 SQL 注入（或其他漏洞）的常见迹象。或者，如果你有自己的工具集足以胜任，这些测试也可以内部进行。这是发现非常规、老旧或隐藏漏洞的绝佳方法。


    这类测试通常是为了满足合规标准而必须进行的，例如 HIPAA（健康保险流通与责任法案）。如果你在一家公司或一个行业中工作，其软件存储了敏感数据，请进行必要的研究，以确保你的安全测试和验证符合你所在行业的合规标准。如果你与其他国家的客户开展业务，可能还需要满足额外的合规要求。


    检测 SQL 注入漏洞最常见的方法包括：盲目地用各种注入语句填充应用程序输入，试图生成应用程序错误或诱导网页产生异常的 HTTP 响应。例如，执行一组有效的搜索并测量响应时间。接下来，向应用程序提供
    SQL 注入语句。通过比较这些响应时间，可以判断注入的 SQL 是否被执行了。


    检查错误消息也很常见。如果一组典型的 SQL 注入语句能导致异常的应用程序或 SQL 错误，那么就存在进一步被利用的可能性。


    重要的是要理解，虽然安全公司拥有各种工具来防御 SQL 注入攻击，但黑客也拥有自己的一套类似工具。只要能证明存在任何安全漏洞，无论其可能性多小或多隐蔽，黑客都很可能最终会发现并立即加以利用。


    ### 应用程序流量扫描


    可以部署轻量级监视器来扫描传入流量，查找异常的数据模式。例如，从预期仅发送文本的应用程序中，是否有常见的 SQL 命令或语法被发送到你的数据库服务器？搜索分号、撇号或
    TSQL 关键字（如 `SELECT`、`WHERE` 和 `FROM`）是定位和管理黑客攻击来源的有效方法。


    虽然这些扫描可能非常有用，但其价值完全取决于有效信息与干扰信息的比例。捕获 SQL 注入攻击的需求需要与应用程序流量中可能存在常见 SQL 字符或关键字的可能性进行权衡。实际上，任何对互联网开放的应用程序都会被黑客盲目地针对常见漏洞进行攻击。


    如果是这种情况，那么就需要你来确定正常一天的流量基线（在没有任何实际攻击发生的情况下）。一旦建立，你就可以将警报限制在可疑活动足够多、需要你进一步调查的场景。

    '
- fmt: '### Log Review


    Similar to monitoring network, application, or database traffic, you can regularly
    scan your web logs, application logs, or database error logs to determine if anything
    unusual or concerning is taking place. Similar searches can be made as with application
    traffic, and the results can be trended over time to produce an overview of SQL
    injection attempts, common targets, and sources.


    Using this data, you can review the most common targets and ensure they are not
    vulnerable to SQL injection. In addition, you can analyze the sources of attacks
    to determine if any patterns exist. Many companies will block web traffic from
    specific countries, domains, or IP ranges, in order to remove risks while not
    affecting legitimate end user activity.


    Note that password change requests are not logged by default, as a security precaution.
    As a result, if injected TSQL statements contain `sp_password`, they will evade
    the SQL Server logs (although they will still appear as normal in application
    or web logs). There are many available ways to audit password changes, a few of
    which will be covered in Chapter [4](#A371168_1_En_4_Chapter.html).


    ### Code Review


    All new application code should follow a review process by which an experienced
    developer reviews it, and all TSQL is reviewed by a DBA. If the database scripts
    include Dynamic SQL, it can be focused on, ensuring that no SQL injection vulnerabilities
    exist. Even if the review is quick and targeted, it is likely that any significant
    problems will be discovered and fixed. Even if only a single vulnerability were
    ever found, the process itself would be completely justified in its elimination.


    For larger and older applications, a sequential reviews of existing code can provide
    an additional defense against attacks. While it may sound time consuming to review
    all existing code, you can greatly reduce the volume by filtering based on the
    presence of common mistakes. For example, for SQL injection review, you could
    specifically single out database scripts/objects and review only those that contain
    `EXEC`, `sp_executesql`, or `xp_cmdshell`.


    ### Software Patching


    Be sure to keep your servers up to date! In addition to SQL Server, stay current
    with service packs and patches for your operating system, application software,
    and any commonly used tools or frameworks. Vulnerabilities are discovered daily
    in many commonly used software products, and some could potentially allow unauthorized
    access to your data.


    While SQL injection is typically associated with Dynamic SQL, it has been discovered
    in the past as a vulnerability where seemingly legitimate HTTP or command strings
    are passed from the web or another application directly to yours. The most readily
    available defense against unexpected attacks such as these is to regularly review
    application patch notes. If any relevant security holes are found, patch them
    immediately.


    ### Limiting URL Length


    As mentioned, it’s possible for malicious SQL or application requests to be passed
    into an application via an HTTP request. Some web servers will not log the complete
    URL if it is too long. This is one possible way in which a hacker can probe your
    system for vulnerabilities without their actions being immediately noticed. They
    can create an unusually long URL with the hope that it will either be truncated,
    or not logged at all.


    Most web servers allow you to set a limit on the allowable length of URL strings,
    and unless any applications require long URLs, setting that limit is beneficial.
    Although you can choose any limit, 2048 characters is common. As with security,
    only allow as much as is required for your application to operate normally (including
    future growth).


    For example, in Microsoft IIS, when this limit is set, a longer URL will return
    a 404 error to the client with no further detail. The server logs, though, will
    include additional information as to why the request was blocked, so that you
    can identify potential threats:


    *   `404.10: Request Header Too Long`

    *   `404.13: Content Length Too Long`

    *   `404.14: URL Too Long`

    *   `404.15: Query String Too Long`


    ### Use Views and/or Masking for Sensitive Data


    When encrypted sensitive data needs to be accessed, such as with passwords or
    credit card numbers, consider only supplying permissions to views that provide
    the fewest fields necessary to service those queries. Denying direct access to
    critical tables removes the ability of hackers to access them, and therefore to
    use SQL injection to infiltrate them.


    For example, a password table may have a variety of information that could not
    only give away password hash details, but also password policies, usernames, locked
    accounts, recent login times, and more. The application likely only needs access
    to the encrypted password (or hash) and positive identifying data (such as a user
    ID).


    SQL Server 2016 includes a new security feature: Dynamic Data Masking. This can
    be extremely effective for any scenarios where part of sensitive data is needed,
    such as the last four digits of a social security number or credit card number.
    For users without the `UNMASK` permission, a predetermined segment of the sensitive
    data will be obscured. This added layer of data obfuscation provides an extra
    defense against an unauthorized user gaining the complete details of your important
    data.


    Data masking, while convenient, is not intended to be a hardened security feature.
    As of SQL Server 2016 CTP 2.1, it is possible to partially unmask data using a
    `CAST` of the column to its underlying data type, which would partially defeat
    the process and revert it to default masking. There are a few other hacks available
    that involve joining masked tables to secondary tables and the data being unmasked
    as it is selected from the resulting join. These are very likely to be fixed in
    the public release of SQL Server 2016, but for the moment, they are legitimate
    concerns.


    Despite these limitations, Dynamic Data Masking is another lock on the vault that
    is critical data, and one that will either dissuade hackers from proceeding, or
    slow them down enough that your security team has extra time to respond to the
    threat head-on. When only data validation is needed, not full access to that data,
    this is an excellent tool for providing only what is needed and nothing more.'
