    清单 10-12. 用于创建动态生成视图的存储过程


    通过此存储过程，您现在可以轻松地重新创建动态视图：


    ```sql

    EXEC dbo.create_v_job_title_year_summary;

    ```


    当您检查视图内容时，可以验证其已正确更新，如图 10-14 所示。


    ![A371168_1_En_10_Fig14_HTML.jpg](img/A371168_1_En_10_Fig14_HTML.jpg)

    图 10-14. 一旦刷新，2014 和 2015 年的新数据就已包含在视图中


    ```sql

    SELECT

    *

    FROM dbo.v_job_title_year_summary

    ```


    已为 2014 和 2015 年数据添加了列，并且会根据自上次创建视图以来添加或删除的任何其他年份进行相应添加。请注意，基于 `PIVOT` 的视图无法创建索引，但动态生成的视图只要不包含
    `PIVOT` 或 `UNPIVOT` 并且是绑定到架构的，就可以正常创建索引。


    使用动态 SQL 生成架构是一种非常方便的方法，可以在运行时才可能获得完整架构知识时创建对象。它还允许使用相对简单的 TSQL 语法将复杂的业务逻辑汇总到数据库对象中。能够极大地简化应用程序或报表代码，有时比创建新数据库对象的负担更为重要。


    与创建任何新对象一样，请始终确保它们是必需的，并且没有更高效的方法可用。通常，新的 SQL Server 版本、应用程序版本或业务变更可以允许实现新的方法来高效检索数据。


    ## 结论


    本章回顾了一些动态 SQL 的应用，它们使您能够为通常不支持在运行时更改的流程增加灵活性。还存在更多的应用，唯一的限制是您的想象力。


    在创建任何新架构（无论是动态生成与否）时，始终考虑其影响和效率。所有数据库对象都必须维护，在考虑新对象时必须考虑这种累积的维护成本。使用动态 SQL 的目标，要么是实现原本不太可能实现的流程，要么是降低那些可能需要手动或资源密集型组件的流程的复杂性。


    出于这些目的使用动态 SQL 将由您自己的业务逻辑、数据库服务器版本以及开发团队使用的规则和策略决定。虽然一些解决方案对广大受众有用，但另一些可能被证明是百万个特定开发环境中的救星。无论解决方案多么通用，牢记这一工具将使您能够以创造性的方式解决困难的数据库挑战，否则这些挑战可能既耗时又昂贵。


    # 11. 其他应用


    这最后一章探讨一些更有趣的动态 SQL 应用。目的是为您提供各种实用的脚本，这些脚本可以引入任何数据库环境，并根据独特用途进行定制。对于许多现实世界的挑战，动态
    SQL 是一种高效的解决方案，您可以使用紧凑、可重用的代码完成大量工作。


    ### 数据库维护


    对于 DBA 和数据库开发人员来说，最具挑战性的领域之一是为其服务器、数据库和相关软件提供定期的维护。常见的任务，如索引碎片整理、维护统计信息和管理数据库备份，对任何应用程序都至关重要。由于每个数据库环境都不同，管理这些任务的脚本可以且应该在每个环境中有所不同。以下部分概述了一些常见的维护任务，以及如何使用动态
    SQL 为每个任务构建一个框架。一旦构建完成，这些脚本可以进行扩展和定制，以满足您自己的数据库服务器的需求。

    '
- fmt: '### Index Defragmentation


    索引是优化查询性能的关键。审查性能不佳的查询时，你应该立即提出的问题之一是：正确的索引是否到位且充足。另一个不应被忽略的问题是：这些索引是否得到了妥善维护。随着时间的推移，索引因插入、更新和删除操作，其构建所依赖的
    B 树会变得碎片化。时间越久，情况越糟，有效遍历 B 树并返回查询所需数据的时间就越长。


    定期运行检查索引碎片并采取必要措施的作业，将确保这种情况永远不会对应用程序性能造成损害。实现此目标的首要任务是识别索引的碎片程度，并且要能在服务器上的任何数据库集上执行此操作。


    此信息可以在 `sys.dm_db_index_physical_stats` 动态管理视图中找到。清单 [11-1](#A371168_1_En_11_Chapter.html#Par6)
    中的查询将此视图中的数据与几个系统视图连接，以包含涉及的数据库、表和索引的名称。


    ```sql

    USE AdventureWorks2014

    DECLARE @database_name VARCHAR(100) = ''AdventureWorks2014'';

    SELECT

    SD.name AS database_name,

    SO.name AS object_name,

    SI.name AS index_name,

    IPS.index_type_desc,

    IPS.page_count,

    IPS.avg_fragmentation_in_percent -- Be sure to filter as much as possible...this
    can return a lot of data if you don''t filter by database and table.

    FROM sys.dm_db_index_physical_stats(NULL, NULL, NULL, NULL , NULL) IPS

    INNER JOIN sys.databases SD

    ON SD.database_id = IPS.database_id

    INNER JOIN sys.indexes SI

    ON SI.index_id = IPS.index_id

    INNER JOIN sys.objects SO

    ON SO.object_id = SI.object_id

    AND IPS.object_id = SO.object_id

    WHERE alloc_unit_type_desc = ''IN_ROW_DATA''

    AND index_level = 0

    AND SD.name = @database_name

    ORDER BY IPS.avg_fragmentation_in_percent DESC;

    ```

    清单 11-1. 用于确定给定数据库中所有索引碎片情况的查询


    此查询在过滤器中专门针对一个数据库（基于顶部声明的参数），但可以调整为检查服务器上的任何或所有用户数据库。图 [11-1](#A371168_1_En_11_Chapter.html#Fig1)
    中的结果显示了每个索引，按碎片程度排序，并附带一些其他有用的信息。


    ![A371168_1_En_11_Fig1_HTML.jpg](A371168_1_En_11_Fig1_HTML.jpg)

    图 11-1. 清单 [11-1](#A371168_1_En_11_Chapter.html#Par6) 中查询产生的索引碎片结果


    现在你已经识别出碎片最严重的表，你需要找出修复它们的最佳方法。接下来讨论两种选择。


    #### Index Rebuild


    重建索引时，它会被一个全新的索引副本完全替换，如同刚刚新建一样。在 SQL Server 标准版中，这是一个离线操作，意味着运行时可能会导致资源争用。在标准版中重建索引时，请谨慎安排在中断可容忍的时间进行。在企业版中，重建可以在线运行，允许在其他事务同时发生时进行操作。无论是什么版本，重建索引都是资源密集型操作，应在服务器有额外资源可用的非高峰时段进行。


    如果取消索引重建，整个操作将需要回滚，这也可能耗时且消耗资源。


    #### Index Reorganization


    重新组织索引会在叶级进行清理、重新排序页面并根据需要重新应用填充因子。无论你运行的是哪个版本的 SQL Server，此操作始终在线，并且可以随时中断而不会产生不良影响。


    尽管过程相对简单，但对于非常宽的索引，索引重新组织可能花费与重建一样长的时间。跟踪这些时间可以让你定期审查索引维护任务，并确保它们运行得足够快。


    #### Creating an Index Maintenance Solution


    既然你已经知道问题所在以及可用的解决工具，就可以逐步构建一个示例解决方案。动态 SQL 的需求是立即存在的：你有多个数据库、表、索引和潜在的操作。在这种情况下，动态
    T-SQL 会比冗长的、过程化的解决方案更简单且更易于实现。


    让我们从一个存储过程开始，它会检查碎片级别，并根据用户输入选择重新组织还是重建。此示例使用 10% 作为重新组织的阈值，35% 作为重建的阈值，同时这些数字也作为默认参数值。它将有一个
    `@print_only` 标志，用于决定是打印结果供审查还是执行它们。该过程将包含实例上的所有数据库，除了 `model`、`master`、`msdb`
    和 `tempdb`。不过，这可以轻松自定义以作用于任何数据库集。最后的补充是包含了架构名称，添加它是为了支持除 `dbo` 之外的多个架构的数据库。此新脚本的完整内容可以在清单
    [11-2](#A371168_1_En_11_Chapter.html#Par15) 中查看。'
  raw: '### Index Defragmentation


    Indexes are the key to optimal query performance . One of the most immediate questions
    that you should ask when reviewing a poorly performing query is if the correct
    indexes are in place and if they are adequate. An additional question that should
    not need to be asked is if those indexes are being properly maintained. Over time
    as an index is inserted to, updated, and deleted from, the B-tree that it is built
    on becomes fragmented. The more time that passes, the worse the situation gets
    and the more time it takes to traverse the B-tree effectively and return the data
    requested by your queries.


    Running jobs regularly that check for index fragmentation and take action as necessary
    will ensure that this situation never becomes detrimental to application performance.
    The first task toward achieving this goal is to identify how fragmented your indexes
    are, and to do so on any set of databases on your server.


    This information can be found in the `sys.dm_db_index_physical_stats` dynamic
    management view. The query in Listing [11-1](#A371168_1_En_11_Chapter.html#Par6)
    joins data from this view into a handful of system views in order to include the
    name of the database, table, and indexes involved.


    ```

    USE AdventureWorks2014

    DECLARE @database_name VARCHAR(100) = ''AdventureWorks2014'';

    SELECT

    SD.name AS database_name,

    SO.name AS object_name,

    SI.name AS index_name,

    IPS.index_type_desc,

    IPS.page_count,

    IPS.avg_fragmentation_in_percent -- Be sure to filter as much as possible...this
    can return a lot of data if you don''t filter by database and table.

    FROM sys.dm_db_index_physical_stats(NULL, NULL, NULL, NULL , NULL) IPS

    INNER JOIN sys.databases SD

    ON SD.database_id = IPS.database_id

    INNER JOIN sys.indexes SI

    ON SI.index_id = IPS.index_id

    INNER JOIN sys.objects SO

    ON SO.object_id = SI.object_id

    AND IPS.object_id = SO.object_id

    WHERE alloc_unit_type_desc = ''IN_ROW_DATA''

    AND index_level = 0

    AND SD.name = @database_name

    ORDER BY IPS.avg_fragmentation_in_percent DESC;

    Listing 11-1.

    Query to Determine Index Fragmentation for All Indexes in a Given Database

    ```


    This query specifically targets one in the filter (based on the parameter declared
    at the top), but could be adjusted to check any or all user databases on a server.
    The results in Figure [11-1](#A371168_1_En_11_Chapter.html#Fig1) show each index,
    ordered by fragmentation, along with some additional useful information.


    ![A371168_1_En_11_Fig1_HTML.jpg](A371168_1_En_11_Fig1_HTML.jpg)


    Figure 11-1.


    Index fragmentation results from the query in Listing [11-1](#A371168_1_En_11_Chapter.html#Par6)


    Now that you have identified the most fragmented tables, you need to figure out
    the best way to fix them. There are two options, discussed next.


    #### Index Rebuild


    When an index is rebuilt , it is completely replaced with a new copy of the index,
    built from scratch as though it were just newly created. In SQL Server Standard
    edition, this is an offline operation, meaning that it can cause contention while
    running. When rebuilding indexes in Standard Edition, use caution to schedule
    them at a time when that interruption is tolerable. In Enterprise Edition, rebuilds
    can be run online, allowing them to operate while other transactions occur at
    the same time. Regardless of edition, rebuilding indexes is a resource-intensive
    operation and should be done during off hours when the server has extra resources
    to spare.


    If you cancel an index rebuild, the entire operation will need to roll back, which
    can also be time-consuming and resource-intensive.


    #### Index Reorganization


    Reorganizing an index results in cleanup at the leaf level, reordering pages and
    reapplying the fill factor as necessary. This operation is always online, regardless
    of the edition of SQL Server you are running and can be interrupted at any time
    with no ill effects.


    Despite being a somewhat simpler process, an index reorg can potentially take
    as long as an index rebuild for a very wide index. Keeping track of these times
    can allow you to periodically review index maintenance tasks and ensure they are
    running acceptably fast.


    #### Creating an Index Maintenance Solution


    Since you now know what the problem is and what tools are available to solve it,
    you can step through an example solution. The need for Dynamic SQL is immediate:
    You have multiple databases, tables, indexes, and potential operations. This is
    a scenario where the Dynamic TSQL will be simpler and easier to implement than
    a long, procedural solution.


    Let’s start with a stored procedure that checks the fragmentation level and will
    choose whether to reorganize or rebuild based on user input. This example uses
    10% for a reorg and 35% for a rebuild, as well as those numbers as default parameter
    values. It will have a `@print_only` flag that determines if you should print
    the results for review or execute them. The proc will include all databases on
    the instance, except for `model`, `master`, `msdb`, and `tempdb`. This can easily
    be customized to act on any set of databases, though. One last addition is the
    inclusion of the schema name, which is added so that you can support databases
    with multiple schemas aside from `dbo`. This new script can be viewed in its entirety
    in Listing [11-2](#A371168_1_En_11_Chapter.html#Par15).'
  trans: '### 索引碎片整理


    索引是优化查询性能的关键。审查性能不佳的查询时，你应该立即提出的问题之一是：正确的索引是否到位且充足。另一个不应被忽略的问题是：这些索引是否得到了妥善维护。随着时间的推移，索引因插入、更新和删除操作，其构建所依赖的
    B 树会变得碎片化。时间越久，情况越糟，有效遍历 B 树并返回查询所需数据的时间就越长。


    定期运行检查索引碎片并采取必要措施的作业，将确保这种情况永远不会对应用程序性能造成损害。实现此目标的首要任务是识别索引的碎片程度，并且要能在服务器上的任何数据库集上执行此操作。


    此信息可以在 `sys.dm_db_index_physical_stats` 动态管理视图中找到。清单 11-1 中的查询将此视图中的数据与几个系统视图连接，以包含涉及的数据库、表和索引的名称。


    ```sql

    USE AdventureWorks2014

    DECLARE @database_name VARCHAR(100) = ''AdventureWorks2014'';

    SELECT

    SD.name AS database_name,

    SO.name AS object_name,

    SI.name AS index_name,

    IPS.index_type_desc,

    IPS.page_count,

    IPS.avg_fragmentation_in_percent -- Be sure to filter as much as possible...this
    can return a lot of data if you don''t filter by database and table.

    FROM sys.dm_db_index_physical_stats(NULL, NULL, NULL, NULL , NULL) IPS

    INNER JOIN sys.databases SD

    ON SD.database_id = IPS.database_id

    INNER JOIN sys.indexes SI

    ON SI.index_id = IPS.index_id

    INNER JOIN sys.objects SO

    ON SO.object_id = SI.object_id

    AND IPS.object_id = SO.object_id

    WHERE alloc_unit_type_desc = ''IN_ROW_DATA''

    AND index_level = 0

    AND SD.name = @database_name

    ORDER BY IPS.avg_fragmentation_in_percent DESC;

    ```

    清单 11-1. 用于确定给定数据库中所有索引碎片情况的查询


    此查询在过滤器中专门针对一个数据库（基于顶部声明的参数），但可以调整为检查服务器上的任何或所有用户数据库。图 11-1 中的结果显示了每个索引，按碎片程度排序，并附带一些其他有用的信息。


    ![A371168_1_En_11_Fig1_HTML.jpg](img/A371168_1_En_11_Fig1_HTML.jpg)

    图 11-1. 清单 11-1 中查询产生的索引碎片结果


    现在你已经识别出碎片最严重的表，你需要找出修复它们的最佳方法。接下来讨论两种选择。


    #### 索引重建


    重建索引时，它会被一个全新的索引副本完全替换，如同刚刚新建一样。在 SQL Server 标准版中，这是一个离线操作，意味着运行时可能会导致资源争用。在标准版中重建索引时，请谨慎安排在中断可容忍的时间进行。在企业版中，重建可以在线运行，允许在其他事务同时发生时进行操作。无论是什么版本，重建索引都是资源密集型操作，应在服务器有额外资源可用的非高峰时段进行。


    如果取消索引重建，整个操作将需要回滚，这也可能耗时且消耗资源。


    #### 索引重新组织


    重新组织索引会在叶级进行清理、重新排序页面并根据需要重新应用填充因子。无论你运行的是哪个版本的 SQL Server，此操作始终在线，并且可以随时中断而不会产生不良影响。


    尽管过程相对简单，但对于非常宽的索引，索引重新组织可能花费与重建一样长的时间。跟踪这些时间可以让你定期审查索引维护任务，并确保它们运行得足够快。


    #### 创建索引维护解决方案


    既然你已经知道问题所在以及可用的解决工具，就可以逐步构建一个示例解决方案。动态 SQL 的需求是立即存在的：你有多个数据库、表、索引和潜在的操作。在这种情况下，动态
    T-SQL 会比冗长的、过程化的解决方案更简单且更易于实现。


    让我们从一个存储过程开始，它会检查碎片级别，并根据用户输入选择重新组织还是重建。此示例使用 10% 作为重新组织的阈值，35% 作为重建的阈值，同时这些数字也作为默认参数值。它将有一个
    `@print_only` 标志，用于决定是打印结果供审查还是执行它们。该过程将包含实例上的所有数据库，除了 `model`、`master`、`msdb`
    和 `tempdb`。不过，这可以轻松自定义以作用于任何数据库集。最后的补充是包含了架构名称，添加它是为了支持除 `dbo` 之外的多个架构的数据库。此新脚本的完整内容可以在清单
    11-2 中查看。'
- fmt: "# Listing 11-2: Simple Index Maintenance Solution Using Dynamic SQL\n\n```sql\n\
    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'index_maintenance_demo')\n\
    BEGIN\n    DROP PROCEDURE dbo.index_maintenance_demo;\nEND\nGO\nCREATE PROCEDURE\
    \ dbo.index_maintenance_demo\n    @reorganization_percentage TINYINT = 10,\n \
    \   @rebuild_percentage TINYINT = 35,\n    @print_results_only BIT = 1\nAS\nBEGIN\n\
    \    DECLARE @sql_command NVARCHAR(MAX) = '';\n    DECLARE @parameter_list NVARCHAR(MAX)\
    \ = '@reorganization_percentage TINYINT, @rebuild_percentage TINYINT'\n    DECLARE\
    \ @database_name NVARCHAR(MAX);\n    DECLARE @database_list TABLE\n        (database_name\
    \ NVARCHAR(MAX) NOT NULL);\n    INSERT INTO @database_list\n        (database_name)\n\
    \    SELECT\n        name\n    FROM sys.databases\n    WHERE databases.name NOT\
    \ IN ('msdb', 'master', 'TempDB', 'model');\n\n    CREATE TABLE #index_maintenance\n\
    \    (       database_name NVARCHAR(MAX),\n            schema_name NVARCHAR(MAX),\n\
    \            object_name NVARCHAR(MAX),\n            index_name NVARCHAR(MAX),\n\
    \            index_type_desc NVARCHAR(MAX),\n            page_count BIGINT,\n\
    \            avg_fragmentation_in_percent FLOAT,\n            index_operation\
    \ NVARCHAR(MAX));\n\n    SELECT @sql_command = @sql_command + '\n        USE ['\
    \ + database_name + ']\n        INSERT INTO #index_maintenance\n        (database_name,\
    \ schema_name, object_name, index_name, index_type_desc, page_count, avg_fragmentation_in_percent,\
    \ index_operation)\n        SELECT\n            CAST(SD.name AS NVARCHAR(MAX))\
    \ AS database_name,\n            CAST(SS.name AS NVARCHAR(MAX)) AS schema_name,\n\
    \            CAST(SO.name AS NVARCHAR(MAX)) AS object_name,\n            CAST(SI.name\
    \ AS NVARCHAR(MAX)) AS index_name,\n            IPS.index_type_desc,\n       \
    \     IPS.page_count,\n            IPS.avg_fragmentation_in_percent, -- Be sure\
    \ to filter as much as possible...this can return a lot of data if you dont filter\
    \ by database and table.\n            CAST(CASE\n                WHEN IPS.avg_fragmentation_in_percent\
    \ >= @rebuild_percentage THEN ''REBUILD''\n                WHEN IPS.avg_fragmentation_in_percent\
    \ >= @reorganization_percentage THEN ''REORGANIZE''\n            END AS NVARCHAR(MAX))\
    \ AS index_operation\n        FROM sys.dm_db_index_physical_stats(NULL, NULL,\
    \ NULL, NULL , NULL) IPS\n        INNER JOIN sys.databases SD\n            ON\
    \ SD.database_id = IPS.database_id\n        INNER JOIN sys.indexes SI\n      \
    \      ON SI.index_id = IPS.index_id\n        INNER JOIN sys.objects SO\n    \
    \        ON SO.object_id = SI.object_id\n            AND IPS.object_id = SO.object_id\n\
    \        INNER JOIN sys.schemas SS\n            ON SS.schema_id = SO.schema_id\n\
    \        WHERE alloc_unit_type_desc = ''IN_ROW_DATA''\n            AND index_level\
    \ = 0\n            AND SD.name = ''' + database_name + '''\n            AND IPS.avg_fragmentation_in_percent\
    \ >= @reorganization_percentage\n            AND SI.name IS NOT NULL -- Only review\
    \ index, not heap data.\n            AND SO.is_ms_shipped = 0 -- Do not perform\
    \ maintenance on system objects\n        ORDER BY SD.name ASC;'\n    FROM @database_list\n\
    \    WHERE database_name IN (SELECT name FROM sys.databases);\n\n    EXEC sp_executesql\
    \ @sql_command, @parameter_list, @reorganization_percentage, @rebuild_percentage;\n\
    \n    SELECT @sql_command = '';\n    SELECT @sql_command = @sql_command +\n  \
    \      '        USE [' + database_name + ']\n        ALTER INDEX [' + index_name\
    \ + '] ON [' + schema_name + '].[' + object_name + ']\n        ' + index_operation\
    \ + ';\n        '\n    FROM #index_maintenance;\n\n    SELECT * FROM #index_maintenance\n\
    \    ORDER BY avg_fragmentation_in_percent DESC;\n\n    IF @print_results_only\
    \ = 1\n        PRINT @sql_command;\n    ELSE\n        EXEC sp_executesql @sql_command;\n\
    \n    DROP TABLE #index_maintenance;\nEND\nGO\n```\n\nThis script builds a long\
    \ command string from a sequence of index rebuild or reorg operations. Note that\
    \ each set of Dynamic SQL operations builds strings using a dynamically generated\
    \ list prior to execution. This avoids the need for loops or cursors and accomplishes\
    \ the tasks very quickly and efficiently. Let’s execute this for the default parameters:\n\
    \n```sql\nEXEC dbo.index_maintenance_demo @reorganization_percentage = 10, @rebuild_percentage\
    \ = 35, @print_results_only = 1;\n```\n\nSince `@print_results_only` is set to\
    \ 1, no index actions will be taken. The command string will be printed out at\
    \ the end of the stored procedure, prior to dropping the temporary table. Here\
    \ is a subset of the results that printed on my server:\n\n```sql\nUSE [AdventureWorks2014]\n\
    ALTER INDEX [IX_vProductAndDescription] ON [Production].[vProductAndDescription]\n\
    REORGANIZE;\nUSE [AdventureWorks2014]\nALTER INDEX [IX_vStateProvinceCountryRegion]\
    \ ON [Person].[vStateProvinceCountryRegion]\nREBUILD;\nUSE [AdventureWorks2012]\n\
    ALTER INDEX [PK_ProductCostHistory_ProductID_StartDate] ON [Production].[ProductCostHistory]\n\
    REBUILD;\nUSE [AdventureWorks2012]\nALTER INDEX [AK_ProductDescription_rowguid]\
    \ ON [Production].[ProductDescription]\nREBUILD;\nUSE [AdventureWorks2012]\nALTER\
    \ INDEX [PK_DatabaseLog_DatabaseLogID] ON [dbo].[DatabaseLog]\nREBUILD;\nUSE [AdventureWorks2012]\n\
    ALTER INDEX [PK_ProductInventory_ProductID_LocationID] ON [Production].[ProductInventory]\n\
    REORGANIZE;\n```\n\nWhen working with long command strings, beware of truncation,\
    \ either in the string itself or by Management Studio’s results pane when printing\
    \ sample output. As a precaution against this, I’ve cast all strings in the temporary\
    \ table as `NVARCHAR(MAX)` to ensure that the command string is not converted\
    \ to any of the smaller string data types.\n\nIt is also important to note that\
    \ Dynamic SQL was used to gather index fragmentation data, because some of the\
    \ views, such as `sys.tables` and `dm_db_index_physical_stats`, are database-specific.\
    \ In order to collect all data for each database, it was necessary to `USE` each\
    \ database and then check the views within them independently of each other. Similarly,\
    \ to perform index maintenance, it is necessary to `USE` the appropriate database\
    \ first, before running a rebuild or reorganize statement.\n\nThe contents of\
    \ the temporary table are also output so you can further review the data returned,\
    \ as shown in Figure 11-2.\n\n![A371168_1_En_11_Fig2_HTML.jpg](A371168_1_En_11_Fig2_HTML.jpg)\n\
    \n## Figure 11-2\n\nFull fragmentation results as returned from the query in Listing\
    \ 11-2.\n\nHere you can review each index, its fragmentation level, and the operation\
    \ that was chosen based on the inputs. If you are confident that this stored procedure\
    \ does exactly what you want it to, you can allow it to execute the entire command\
    \ string and clean up all indexes in these databases:\n\n```sql\nEXEC dbo.index_maintenance_demo\
    \ @reorganization_percentage = 10, @rebuild_percentage = 35, @print_results_only\
    \ = 0;\n```\n\nAfter about 30 seconds of waiting, the script completes successfully\
    \ and your index maintenance is complete! You can add options and continue to\
    \ customize this script to your heart’s content. Some features to consider adding:\n\
    \n*   Add `WITH (ONLINE = ON)` to rebuild operations so they can run online (Enterprise\
    \ edition only).\n*   Add `WITH (SORT_IN_TEMP = ON)` to rebuild operations so\
    \ they can sort intermediary rebuild results in TempDB, which can speed up operations.\
    \ Keep in mind that enough space must be available in TempDB for this to work.\n\
    *   Adjust the fill factor on an index if one besides the default is needed.\n\
    *   Check the size of the index and take actions differently based on that information.\n\
    *   Add logging so that you can review the commands executed, as well as the time\
    \ needed to complete them.\n\nUse this script as a starting point and tailor it\
    \ to your environment’s needs, regardless of how they may differ from what’s presented\
    \ here. There are an infinite number of ways to customize and improve on this\
    \ concept, with your imagination being the only barrier between you and the perfect\
    \ index maintenance solution!"
  raw: '```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''index_maintenance_demo'')

    BEGIN

    DROP PROCEDURE dbo.index_maintenance_demo;

    END

    GO

    CREATE PROCEDURE dbo.index_maintenance_demo

    @reorganization_percentage TINYINT = 10,

    @rebuild_percentage TINYINT = 35,

    @print_results_only BIT = 1

    AS

    BEGIN

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    DECLARE @parameter_list NVARCHAR(MAX) = ''@reorganization_percentage TINYINT,
    @rebuild_percentage TINYINT''

    DECLARE @database_name NVARCHAR(MAX);

    DECLARE @database_list TABLE

    (database_name NVARCHAR(MAX) NOT NULL);

    INSERT INTO @database_list

    (database_name)

    SELECT

    name

    FROM sys.databases

    WHERE databases.name NOT IN (''msdb'', ''master'', ''TempDB'', ''model'');

    CREATE TABLE #index_maintenance

    (       database_name NVARCHAR(MAX),

    schema_name NVARCHAR(MAX),

    object_name NVARCHAR(MAX),

    index_name NVARCHAR(MAX),

    index_type_desc NVARCHAR(MAX),

    page_count BIGINT,

    avg_fragmentation_in_percent FLOAT,

    index_operation NVARCHAR(MAX));

    SELECT @sql_command = @sql_command + ''

    USE ['' + database_name + '']

    INSERT INTO #index_maintenance

    (database_name, schema_name, object_name, index_name, index_type_desc, page_count,
    avg_fragmentation_in_percent, index_operation)

    SELECT

    CAST(SD.name AS NVARCHAR(MAX)) AS database_name,

    CAST(SS.name AS NVARCHAR(MAX)) AS schema_name,

    CAST(SO.name AS NVARCHAR(MAX)) AS object_name,

    CAST(SI.name AS NVARCHAR(MAX)) AS index_name,

    IPS.index_type_desc,

    IPS.page_count,

    IPS.avg_fragmentation_in_percent, -- Be sure to filter as much as possible...this
    can return a lot of data if you dont filter by database and table.

    CAST(CASE

    WHEN IPS.avg_fragmentation_in_percent >= @rebuild_percentage THEN ''''REBUILD''''

    WHEN IPS.avg_fragmentation_in_percent >= @reorganization_percentage THEN ''''REORGANIZE''''

    END AS NVARCHAR(MAX)) AS index_operation

    FROM sys.dm_db_index_physical_stats(NULL, NULL, NULL, NULL , NULL) IPS

    INNER JOIN sys.databases SD

    ON SD.database_id = IPS.database_id

    INNER JOIN sys.indexes SI

    ON SI.index_id = IPS.index_id

    INNER JOIN sys.objects SO

    ON SO.object_id = SI.object_id

    AND IPS.object_id = SO.object_id

    INNER JOIN sys.schemas SS

    ON SS.schema_id = SO.schema_id

    WHERE alloc_unit_type_desc = ''''IN_ROW_DATA''''

    AND index_level = 0

    AND SD.name = '''''' + database_name + ''''''

    AND IPS.avg_fragmentation_in_percent >= @reorganization_percentage

    AND SI.name IS NOT NULL -- Only review index, not heap data.

    AND SO.is_ms_shipped = 0 -- Do not perform maintenance on system objects

    ORDER BY SD.name ASC;''

    FROM @database_list

    WHERE database_name IN (SELECT name FROM sys.databases);

    EXEC sp_executesql @sql_command, @parameter_list, @reorganization_percentage,
    @rebuild_percentage;

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command +

    ''        USE ['' + database_name + '']

    ALTER INDEX ['' + index_name + ''] ON ['' + schema_name + ''].['' + object_name
    + '']

    '' + index_operation + '';

    ''

    FROM #index_maintenance;

    SELECT * FROM #index_maintenance

    ORDER BY avg_fragmentation_in_percent DESC;

    IF @print_results_only = 1

    PRINT @sql_command;

    ELSE

    EXEC sp_executesql @sql_command;

    DROP TABLE #index_maintenance;

    END

    GO

    Listing 11-2.

    Simple Index Maintenance Solution Using Dynamic SQL

    ```


    This script builds a long command string from a sequence of index rebuild or reorg
    operations. Note that each set of Dynamic SQL operations builds strings using
    a dynamically generated list prior to execution. This avoids the need for loops
    or cursors and accomplishes the tasks very quickly and efficiently. Let’s execute
    this for the default parameters:


    ```

    EXEC dbo.index_maintenance_demo @reorganization_percentage = 10, @rebuild_percentage
    = 35, @print_results_only = 1;

    ```


    Since `@print_results_only` is set to 1, no index actions will be taken. The command
    string will be printed out at the end of the stored procedure, prior to dropping
    the temporary table. Here is a subset of the results that printed on my server:


    ```

    USE [AdventureWorks2014]

    ALTER INDEX [IX_vProductAndDescription] ON [Production].[vProductAndDescription]

    REORGANIZE;

    USE [AdventureWorks2014]

    ALTER INDEX [IX_vStateProvinceCountryRegion] ON [Person].[vStateProvinceCountryRegion]

    REBUILD;

    USE [AdventureWorks2012]

    ALTER INDEX [PK_ProductCostHistory_ProductID_StartDate] ON [Production].[ProductCostHistory]

    REBUILD;

    USE [AdventureWorks2012]

    ALTER INDEX [AK_ProductDescription_rowguid] ON [Production].[ProductDescription]

    REBUILD;

    USE [AdventureWorks2012]

    ALTER INDEX [PK_DatabaseLog_DatabaseLogID] ON [dbo].[DatabaseLog]

    REBUILD;

    USE [AdventureWorks2012]

    ALTER INDEX [PK_ProductInventory_ProductID_LocationID] ON [Production].[ProductInventory]

    REORGANIZE;

    ```


    When working with long command strings, beware of truncation, either in the string
    itself or by Management Studio’s results pane when printing sample output. As
    a precaution against this, I’ve cast all strings in the temporary table as `NVARCHAR(MAX)`
    to ensure that the command string is not converted to any of the smaller string
    data types.


    It is also important to note that Dynamic SQL was used to gather index fragmentation
    data, because some of the views, such as `sys.tables` and `dm_db_index_physical_stats`,
    are database-specific. In order to collect all data for each database, it was
    necessary to `USE` each database and then check the views within them independently
    of each other. Similarly, to perform index maintenance, it is necessary to `USE`
    the appropriate database first, before running a rebuild or reorganize statement.


    The contents of the temporary table are also output so you can further review
    the data returned, as shown in Figure [11-2](#A371168_1_En_11_Chapter.html#Fig2).


    ![A371168_1_En_11_Fig2_HTML.jpg](A371168_1_En_11_Fig2_HTML.jpg)


    Figure 11-2.


    Full fragmentation results as returned from the query in Listing [11-2](#A371168_1_En_11_Chapter.html#Par15)


    Here you can review each index, its fragmentation level, and the operation that
    was chosen based on the inputs. If you are confident that this stored procedure
    does exactly what you want it to, you can allow it to execute the entire command
    string and clean up all indexes in these databases:


    ```

    EXEC dbo.index_maintenance_demo @reorganization_percentage = 10, @rebuild_percentage
    = 35, @print_results_only = 0;

    ```


    After about 30 seconds of waiting, the script completes successfully and your
    index maintenance is complete! You can add options and continue to customize this
    script to your heart’s content. Some features to consider adding:


    *   Add `WITH (ONLINE = ON)` to rebuild operations so they can run online (Enterprise
    edition only).

    *   Add `WITH (SORT_IN_TEMP = ON)` to rebuild operations so they can sort intermediary
    rebuild results in TempDB, which can speed up operations. Keep in mind that enough
    space must be available in TempDB for this to work.

    *   Adjust the fill factor on an index if one besides the default is needed.

    *   Check the size of the index and take actions differently based on that information.

    *   Add logging so that you can review the commands executed, as well as the time
    needed to complete them.


    Use this script as a starting point and tailor it to your environment’s needs,
    regardless of how they may differ from what’s presented here. There are an infinite
    number of ways to customize and improve on this concept, with your imagination
    being the only barrier between you and the perfect index maintenance solution!'
