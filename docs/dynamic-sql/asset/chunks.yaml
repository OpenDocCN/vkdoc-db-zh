  trans: '# 1. 什么是动态 SQL？


    电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1811-2_​1](http://dx.doi.org/10.1007/978-1-4842-1811-2_1)）包含补充材料，可供授权用户使用。


    T-SQL 是一种脚本语言，随着 SQL Server 的每个新版本发布而不断扩展。在数据库开发和管理领域取得成功，需要灵活性以及不断适应新情况、新技术和新需求的能力。你将面临的许多挑战都是未知的，或者说是那些直到运行时你才确切知道将处理何种数据的场景。动态
    SQL 是在面对未知情况时解决问题的最佳工具之一。


    ## 理解动态 SQL


    动态 SQL 理解起来相当简单，一旦你熟悉了它，其能应用的场景数量会变得惊人。动态 SQL 旨在解决这样一类场景：你希望对一个或多个对象进行操作，但在编写代码时并不知道所有相关的细节。可以通过参数将重要的值集合传递到代码中，但如果
    T-SQL 的结构本身就是由这些值定义的，该怎么办呢？


    ### 一个简单示例


    从一个非常简单的 `select` 语句开始，我们将构建理解动态 SQL 的起点：


    ```

    SELECT TOP 10 * FROM Person.Person;

    ```


    此语句返回 `Person.Person` 表中 10 行数据的所有列。如果你想从某个表中选择数据，但直到运行时才知道表名，该怎么办？你如何将可变的表名代入
    T-SQL 中？在回答这个问题之前，让我们通过简单地重写上面的查询来介绍动态 SQL，以便你将其作为字符串执行，而不是作为标准的 T-SQL：


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT TOP 10 * FROM Person.Person'';

    EXEC (@sql_command);

    ```


    这个例子定义了一个名为 `@sql_command` 的字符串，用于保存动态 SQL。什么是动态 SQL？它就是你构建并随后执行的字符串。在这个例子中，它就是上面相同的
    `SELECT` 语句，没有改动。设置 `@sql_command` 后，它被执行，提供与之前相同的结果。


    ### EXEC 语句


    `EXEC` 用于执行 `@sql_command`。也可以使用 `EXECUTE`。本书后面还会介绍执行动态 SQL 的其他方式，以满足对进一步灵活性或安全性的需求。记得始终在
    `@sql_command` 字符串两边加上括号。下面是一个省略括号的示例：


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT TOP 10 * FROM Person.Person'';

    EXEC @sql_command;

    ```


    不这样做会导致一个有点奇怪的错误：


    ```

    Msg 2812, Level 16, State 62, Line 11

    Could not find stored procedure ''SELECT TOP 10 * FROM Person.Person''.

    ```


    当没有括号时，SQL Server 会将动态 SQL 命令字符串视为存储过程。省略括号将导致无法运行你的 SQL 字符串，并收到类似上面的错误。


    ### 应使用的数据类型


    请注意，命令字符串使用了 `NVARCHAR(MAX)` 作为数据类型。虽然你可以使用 `VARCHAR`，但如果处理的任何对象中包含扩展 Unicode
    字符，你可能会丢失数据。大小也可以缩短，但如果你的命令字符串变得比该大小更大，它将被截断，你的动态 SQL 将成为令人困惑的错误消息或逻辑错误的源头。


    为了保持一致性和可靠性，请使用 `NVARCHAR(MAX)` 作为动态 SQL 命令字符串的数据类型。


    ## 动态执行过程


    为了理解动态 SQL 的工作原理及其可应用于你将遇到的多种问题的各种方式，重要的是思考动态 SQL 是如何构建的。此外，熟悉 SQL Server 为解析和运行
    T-SQL 字符串所使用的执行过程，将使使用动态 SQL 变得容易得多。


    所有动态 SQL 都遵循三个基本步骤：


    创建一个用于存储动态 SQL 的字符串变量。可以使用任何变量名。构建命令字符串并将其存储在此变量中。执行命令字符串。


    将 T-SQL 命令存储为字符串的好处是，你可以自由地对它使用任何字符串操作命令，通过一个或多个步骤来构建它。现在来解决你最初的问题：如何从一个直到运行时才定义的表中选择数据。为此，你将
    `Person.Person` 从字符串中移除，并用一个你上面定义的变量来替换：


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @table_name NVARCHAR(100);

    SELECT @table_name = ''Person.Person'';

    SELECT @sql_command = ''SELECT TOP 10 * FROM '' + @table_name;

    EXEC (@sql_command);

    ```


    变量 `@table_name` 存储了你希望查询的表名。通常，这会作为一个参数传入，无论是来自其他存储过程还是直接调用它的应用程序。通过将其构建到 `@sql_command`
    中，你获得了查询任何所需表的灵活性，而无需事先硬编码。虽然这是一个简单的例子（你多久会想以这种方式选择数据？），但它为成千上万的应用提供了基础，每一个都可以节省大量的时间、资源和复杂性。在深入探讨动态
    SQL 及其众多用途的细节之前，让我们先看一个动态 SQL 实际应用中更实用（也更复杂）的例子。'
- fmt: '# Dynamic SQL in Action


    A common maintenance need is to run TSQL against many databases on a server. This
    maintenance could involve backing up databases, rebuilding indexes, reporting
    on critical data elements, or many other possibilities. If the database list never
    changes and no databases are ever renamed, you could hard-code names into each
    procedure and not worry about changing them in the future. This would work until
    the one day when you finally experience those inevitable changes—moving or renaming
    databases—which ultimately will break all of those valuable maintenance procedures.
    It’s critical that your maintenance, monitoring, and reporting jobs operate with
    the highest level of reliability possible.


    Listing [1-1](#A371168_1_En_1_Chapter.html#Par25) shows a common example of a
    statement that could be used to run a backup against a single database, storing
    it on a local drive.


    ```

    BACKUP DATABASE AdventureWorks2014

    TO DISK=''E:\SQLBackups\AdventureWorks2014.bak''

    WITH COMPRESSION;

    Listing 1-1.

    Simple BACKUP Statement

    ```


    This TSQL will back up the `AdventureWorks2014` database to the `SQLBackups` folder
    on the E drive, using compression. If you want to perform a custom database backup
    on a subset of databases that all begin with the text `AdventureWorks`, for example,
    you would need to build TSQL that could adapt to collect a list of all databases
    with that name, and then perform backups on each of them separately. The following
    TSQL shows one way that this could be accomplished, using Dynamic SQL.


    ```

    DECLARE @database_list TABLE

    (database_name SYSNAME);

    INSERT INTO @database_list

    (database_name)

    SELECT

    name

    FROM sys.databases

    WHERE name LIKE ''AdventureWorks%'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name SYSNAME;

    DECLARE database_cursor CURSOR LOCAL FAST_FORWARD FOR

    SELECT database_name FROM @database_list

    OPEN database_cursor

    FETCH NEXT FROM database_cursor INTO @database_name;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    SELECT @sql_command = ''

    BACKUP DATABASE '' + @database_name + ''

    TO DISK=''''E:\SQLBackups\'' + @database_name + ''.bak''''

    WITH COMPRESSION;''

    EXEC (@sql_command);

    FETCH NEXT FROM database_cursor INTO @database_name;

    END

    CLOSE database_cursor;

    DEALLOCATE database_cursor;

    Listing 1-2.

    Dynamic SQL Built to Back Up All Databases Starting with “AdventureWorks”

    ```


    This TSQL is certainly more complex than the first `BACKUP` statement that you
    looked at. Let’s break it apart in order to understand what is going on here,
    and why it works. You’ll then focus on the Dynamic SQL that provides the backbone
    of this set of statements.


    Populate a table variable with a list of database names.

    Go through a loop one time per database.

    Build a Dynamic SQL command string that takes into account the current database
    name.

    Execute the dynamic `BACKUP` statement.

    Continue iterating through the loop until all relevant databases have been backed
    up.


    You declare a number of variables here:


    *   `@database_list`: Contains all databases that match the search criteria. In
    this case, any database that starts with the word `AdventureWorks` will be included.

    *   `@sql_command`: This is the command string that will contain the Dynamic SQL
    statement.

    *   `@database_name`: Holds the name of the database that is currently being backed
    up.

    *   `database_cursor`: A cursor that will be used to iterate through all databases
    named in `@database_list`.


    Much of this example is set up for the loop. The critical portion is where you
    substitute the database name and backup file name with `@database_name`. This
    allows you to generate a backup statement that will not only back up each database,
    regardless of how many there are, but will also name the backup file using that
    name. You could just as easily append additional information onto the file name,
    such as the date, time, or server name, if it were important.


    # Advantages of Dynamic SQL


    There are many reasons why you would want to incorporate Dynamic SQL into your
    everyday arsenal of SQL Server tools. In addition, there are many specific challenges
    for which Dynamic SQL is the optimal solution. Discussing these scenarios will
    highlight why an entire book can be written on this topic.


    ## Optional or Customized Search Criteria


    Search boxes are one of the most common tools used in the development of web pages
    or applications. For simple searches, you may only need to pass in a single variable
    for evaluation. In more powerful web searches, you may be able to choose among
    many criteria, of which each could be evaluated with `AND` or `OR` conditions.
    While you could write a very long `SELECT` statement with left joins to every
    possible table involved, you would likely end up with an immense, inefficient,
    and unwieldy pile of TSQL. Instead, Dynamic SQL allows you to build a `SELECT`
    string that only queries the tables necessary to satisfy a given search.


    ## Customizable Everything


    Adding joins or `WHERE` clauses is only the beginning. With Dynamic SQL, any statement
    can be customized to provide greater flexibility to your code. Want to group by
    a column based on a dynamic search? The solution is to write the `GROUP BY` clause
    as Dynamic SQL, altering it to fit the needs of each specific situation. Want
    to generate row numbers for a data set, but won’t know which columns to partition
    by or order by until runtime? No problem!


    The previous example illustrated how you could use Dynamic SQL to customize a
    backup operation and customize the name of the backup file. Any conceivable TSQL
    statement can be altered to utilize Dynamic SQL, and in doing so, allow for greater
    flexibility in any number of day-to-day challenges.


    ## Optimize SQL Performance


    So far, Dynamic SQL has appeared to make things more complicated, adding the need
    for temporary variables, loops, and command strings. Despite the seemingly added
    complexity, this framework can allow you to reduce the size of the SQL statements
    that you typically execute and improve performance.


    Dynamic SQL provides an opportunity to customize our statements to match performance
    needs. Removing excess objects, adjusting joins and subqueries, and reducing the
    size of a SQL statement can result in faster executions times and reduce resource
    consumption.


    ## Generate Large Amounts of TSQL or Text, Fast!


    Sometimes you’ll need to execute large SQL statements that act on a set of many
    objects. Other times, you’ll want to generate output text based on data stored
    in a specific set of tables. Perhaps you want to generate `SELECT` statements
    that will be used to gather reporting data from any number of sources.


    Writing all of this TSQL by hand could take a very long time and lead to a significant
    opportunity for human error to occur as you trudge through a time-consuming, boring
    task. If the SQL statements involved are to be run on a regular basis, then preparing
    them in advance may be impossible, especially if the target tables or other objects
    involved can change on a regular basis.


    Using Dynamic SQL, you can generate any amount of commands or text without limit.
    SQL Server will not tire of this process, no matter how dull it may seem. This
    is an opportunity to automate tedious tasks and reduce operator intervention in
    tasks that would end up being busy work. The result is that your job becomes easier
    and more fun, and you can focus on more important tasks that demand your attention!'
