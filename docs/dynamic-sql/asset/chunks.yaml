    FROM Person.Person

    WHERE FirstName = @first_name_within_dynamic_sql;

    SELECT @first_name_within_dynamic_sql = ''''Xavier'''';

    SELECT @first_name_within_dynamic_sql;

    ''

    SELECT @parameter_list = ''@first_name_within_dynamic_sql NVARCHAR(50) OUTPUT''

    EXEC sp_executesql @sql_command, @parameter_list, @first_name_calling_sql OUTPUT;

    SELECT @first_name_calling_sql;

    ```

    代码清单 5-4. 使用 OUTPUT 永久修改参数


    此示例显式地将名字参数标记为 `OUTPUT` 参数。这表明，如果在动态 SQL 内更改了该值，那么在命令字符串执行完毕并切换回调用 TSQL 的作用域后，该更改将会持久化。输出结果如图
    5-3 所示。


    ![A371168_1_En_5_Fig3_HTML.jpg](img/A371168_1_En_5_Fig3_HTML.jpg)


    图 5-3. 使用 OUTPUT 来持久化 `@first_name_within_dynamic_sql` 的结果


    这次，当你将 `@first_name_within_dynamic_sql` 的值更改为 `"Xavier"` 时，该值会从动态 SQL 传回 `sp_executesql`，并一直保留，直到你再次对它进行操作。当你想让一个参数在动态
    SQL 内部改变，或者想无缝地传入传出变量时，这极其有用。


    请注意，在这段 TSQL 中，`OUTPUT` 关键字被同时附加到了参数列表和 `sp_executesql` 语句中的参数名上。该关键字必须在两个地方都应用，否则参数值将不会按预期更新。如果在参数列表中省略了
    `OUTPUT`，SQL Server 就不知道该参数意图从动态 SQL 语句中持久化。结果是会产生一条明确指出问题的错误信息：


    ```

    Msg 8162, Level 16, State 2, Line 152

    The formal parameter "@first_name_within_dynamic_sql" was not declared as an OUTPUT
    parameter, but the actual parameter passed in requested output.

    ```


    幸运的是，这条消息非常易于理解，并清楚地说明了如何修复错误。SQL Server 不允许将 `OUTPUT` 参数传递给一个未以相同方式声明的变量。


    如果你在参数列表中将参数声明为 `OUTPUT` 变量，但在 `sp_executesql` 命令中没有这样声明，会发生什么？在这种情况下，不会抛出错误。在参数列表中使用
    `OUTPUT` 关键字声明参数，而在执行命令字符串时不包含相同的关键字，是完全合法的。结果将是 TSQL 成功执行，但名字参数的值不会从动态 SQL 持久化回调用
    TSQL。表 5-1 总结了 `OUTPUT` 变量的不同使用方式的结果。


    表 5-1. OUTPUT 不同用法的结果：绿色为好，红色为坏


    | 参数列表 | 输入变量 | 结果 |

    | --- | --- | --- |

    |   |   | 参数值未持久化。 |

    |   | `OUTPUT` | SQL Server 抛出错误。 |

    | `OUTPUT` |   | 参数值仍未持久化。 |

    | `OUTPUT` | `OUTPUT` | 参数值从动态 SQL 持久化。 |


    成功更改参数值并将其返回给调用 TSQL 的唯一方法，是在参数列表和传入的变量上都使用 `OUTPUT`。为避免在编写动态 SQL 时产生混淆，请避免出现一个变量声明为
    `OUTPUT` 而另一个没有的混合情况。其中一种情况的结果将是错误信息，这当然不可取。另一种模糊情况将导致一段难以理解的代码，其目的对其他开发人员来说不清晰，并可能导致未来的编码错误。


    任何允许传递给存储过程的参数，包括表甚至游标，都可以传递给动态 SQL。不过，表变量（下一节讨论）是只读的，不能设置为 `OUTPUT` 参数。


    ## 表变量和临时表


    在 SQL Server 中持久化数据的另一种方法是创建表变量或临时表并将数据存储在其中。这两者的行为各有特点，提供了一种在动态 SQL 中管理数据的替代方法。本节将更详细地讨论每一种，并说明其行为以及它们如何影响你的
    TSQL。


    ### 表变量


    考虑代码清单 5-5 中的 TSQL。


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    DECLARE @last_names TABLE (

    last_name NVARCHAR(50));

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM @last_names)''

    EXEC sp_executesql @sql_command;

    ```

    代码清单 5-5. 在动态 SQL 中使用在其外部声明的表变量的结果


    运行此 TSQL 会立即导致错误：


    ```

    Msg 1087, Level 15, State 2, Line 197

    Must declare the table variable "@last_names".

    ```


    虽然 `@last_names` 表变量可能在此示例开头创建，但它不存在于动态 SQL 的作用域内。动态 SQL 试图使用该数据返回一组名字，但找不到它。因此，任何访问它的尝试都将失败。你可以将表变量传递给动态
    SQL。这只是需要额外的一步：声明一个自定义类型并将其用作数据类型，如代码清单 5-6 所示。


    ```sql

    CREATE TYPE last_name_table AS TABLE

    (last_name NVARCHAR(50));

    GO

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    DECLARE @first_name_calling_sql NVARCHAR(50) = ''Edward'';

    DECLARE @last_names AS last_name_table;

    INSERT INTO @last_names

    (last_name)

    SELECT

    LastName

    FROM Person.Person WHERE FirstName = @first_name_calling_sql;

    SELECT @sql_command = ''

    SELECT DISTINCT

    FirstName

    FROM Person.Person

    WHERE LastName IN (SELECT last_name FROM @last_name_table)

    ''

    SELECT @parameter_list = ''@first_name_within_dynamic_sql NVARCHAR(50), @last_name_table
    last_name_table READONLY''

    EXEC sp_executesql @sql_command, @parameter_list, @first_name_calling_sql, @last_names;

    ```

    代码清单 5-6. 将表变量传递给动态 SQL


    第一步是创建一个表类型，该类型只需创建一次，供此示例的其余部分使用。它像任何其他参数一样作为参数传递给 `sp_executesql`，但必须在参数列表中被声明为
    `READONLY`。表变量始终是只读的，不能在传递它们进入的动态 SQL 中被修改。如果你试图从表变量中删除记录，或对其进行任何更改，你将收到错误：


    ```

    Msg 10700, Level 16, State 1, Line 255

    The table-valued parameter "@last_name_table" is READONLY and cannot be modified.

    ```


    SQL Server 提供了一个非常直接的错误信息，提醒你试图更改表变量将会失败。

