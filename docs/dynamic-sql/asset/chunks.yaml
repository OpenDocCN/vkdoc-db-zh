  trans: '

    ## 设计注意事项


    管理像参数嗅探这样的现象，首要规则是了解你的数据！由于这是 SQL Server 的一个特性而非错误，在尝试实施解决方案之前，你需要仔细评估它在哪些场景下会成为问题。


    回顾一下前面的两个例子：导致计划非预期重用的确切原因是什么？最终，是因为存储过程的多次执行导致对结果集的**基数估计**差异巨大。一个参数值返回了 245
    行，而另一个返回的数据量是其 100 多倍。


    在解决参数嗅探问题时，你应该提出一系列问题，以准确评估其严重性、频率以及更改的影响：

    *   该查询执行的频率如何？

    *   执行通常返回的结果集数量级最常见的是什么？参数嗅探在大多数情况下是有帮助的，还是导致不良执行计划的频率超出了你的预期？

    *   随着时间的推移，数据量的增长将如何影响这些基数估计？

    *   是否还有其他因素参与其中，例如过时的统计信息、编写不良的 TSQL，或缺失/碎片化的索引？

    *   最可能传递给存储过程的常用参数值是什么？

    *   无论输入如何，你是否已经知道结果集的基数？例如，某个存储过程是否总是返回一行？

    *   能否将一个复杂查询拆分为多个更简单的查询？


    通常，满足业务需求的查询会符合一个常规的使用模式。确定该模式，然后找出明显偏离常规的情况，有助于判断你的 TSQL 是在适应常见的用例，还是在无意中为异常情况（而非常见情况）进行编码，从而导致了性能低下。


    为了正确回答这些问题，让我们更详细地逐一回顾。


    ### 查询执行详情


    一个查询总体执行频率如何？以及它以导致参数嗅探成为明显问题的方式执行的频率又如何？如果它持续不断地运行，那么你需要确保其效率，因为每分钟执行数千次的操作无法承受低效之重。你需要确定最常见的使用场景，并编写
    TSQL 来适应它。如果存在多个持续运行的常见场景，你可以考虑为每个场景单独编写存储过程，在单个过程中使用多个代码路径，或者其他充分利用每种情况的方法。


    然而，如果一个查询执行频率很低，例如用于每日报告或不常进行的搜索，那么每次重新编译查询计划将是一个合理的解决方案，因为它能确保获得最佳计划，而不会重用旧的计划。由于运行不频繁，重新编译的成本不会显著到因优化器每次执行所需的额外工作而给服务器带来资源压力。在这些情况下，你可以自由采取更多样的行动来解决非预期的计划重用问题。但要核实，目前很少执行的查询在未来是否不会变得更加频繁使用。如果原本一天一次的查询变得流行起来，并开始在白天每五秒执行一次，那么重新编译将成为一项昂贵的操作，无法如此频繁地执行。


    可以使用查询提示 `OPTION (RECOMPILE)` 来强制每次执行时重新编译。语法如代码清单 8-5 所示。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_sales_orders_by_sales_person'')

    BEGIN

    DROP PROCEDURE dbo.get_sales_orders_by_sales_person;

    END

    GO

    CREATE PROCEDURE dbo.get_sales_orders_by_sales_person

    @SalesPersonID INT, @RowCount INT, @Offset INT

    AS

    BEGIN

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@SalesPersonID INT, @RowCount INT, @Offset
    INT'';

    SELECT @sql_command = ''

    WITH CTE_PRODUCTS AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,

    SalesOrderHeader.SalesOrderID,

    SalesOrderHeader.Status,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.LineTotal

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    WHERE SalesOrderHeader.SalesPersonID = @SalesPersonID

    )

    SELECT

    *

    FROM CTE_PRODUCTS

    WHERE rownum BETWEEN @Offset AND @Offset + @RowCount

    OPTION (RECOMPILE);'';

    EXEC sp_executesql @sql_command, @parameter_list, @SalesPersonID, @RowCount, @Offset;

    END

    ```


    代码清单 8-5. RECOMPILE 查询提示示例


    这个存储过程与你之前使用过的那个唯一的区别是在 `SELECT` 查询末尾添加了 `RECOMPILE` 提示。有了这个，你可以运行最后一个参数嗅探示例：


    ```sql

    DBCC FREEPROCCACHE;

    EXEC dbo.get_sales_orders_by_sales_person 1, 1000, 0;

    EXEC dbo.get_sales_orders_by_sales_person 285, 1000, 0;

    EXEC dbo.read_query_plan_cache ''CTE_PRODUCTS'';

    ```


    上次你以这种方式执行存储过程时，查询执行计划被重用，导致了性能不佳。让我们在图 8-16 中回顾一下第二次执行（针对小结果集）的性能：


    ![A371168_1_En_8_Fig16_HTML.jpg](img/A371168_1_En_8_Fig16_HTML.jpg)


    图 8-16. 在运行时重新编译执行计划，防止重用次优计划时的性能


    ```

    Table ''SalesOrderDetail''. Scan count 16, logical reads 53, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 50, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    这次，SQL Server 执行了查询，并在运行时重新编译了查询计划，以获得针对每个参数集的最优计划，而不是使用之前为大结果集准备的那个计划。


    一如既往，应谨慎使用查询提示，且仅在必要时使用。优化器生成执行计划所需的资源并非微不足道，过于频繁地重新编译计划可能导致额外的 CPU 消耗和查询延迟增加。当你确信一个查询执行频率很低，或者其基数变化无常导致计划重用常常导致性能不佳时，这个工具最为适用。


    另一个需要考虑的是，要判断由计划重用导致的性能低下是普遍现象还是特例。因为偶尔出现的异常而给查询添加重新编译可能并无益处。如果一个查询在大多数时间都能以最优方式执行，那么容忍非预期的计划重用可能是最佳选择。同样值得研究的是，这个异常是否预示着更大的问题，例如数据验证错误或非法数据被传入了你的存储过程。


    重新编译执行计划的权衡是：（希望）以优化性能为代价来提高查询执行性能。在判断这个权衡是否值得时，要考虑未来：这个查询在未来是否会以类似方式执行？应用程序或查询源是否会改变，导致新的、意想不到的行为，从而使这个好决策变成坏决策？此外，你的研究是否足够详尽，确保涵盖了所有用例？如果你能自信地回答这些问题，那么就是否重新编译查询执行计划做出正确的决定应该是直接了当的。

    '
- fmt: '# The Red Herrings


    Sometimes, bad execution plans may arise from other sources. If statistics are
    out of date, then suboptimal query execution plans could be chosen prior to parameter
    sniffing occurring. In other words, plan reuse was perfectly fine, but the optimizer
    initially created a bad plan due to the lack of accurate statistics, and that
    bad plan was later reused. In this scenario, a bad plan would have likely been
    generated even if plan reuse had not occurred. Verifying the estimated vs. actual
    row counts in an execution plan is a good way to spot potential statistics inaccuracies.
    See Chapter [6](#A371168_1_En_6_Chapter.html) for details on viewing, using, and
    updating statistics.


    Realistically, any way in which `TSQL` can be poorly written could lead to accidentally
    blaming parameter sniffing for undesired plan reuse. The simple example in Listing
    [8-6](#A371168_1_En_8_Chapter.html#Par129) shows a query that was written in such
    a way that suboptimal performance was essentially guaranteed.


    ```

    SELECT DISTINCT

    PRODUCT.ProductID,

    PRODUCT.Name

    FROM Production.Product PRODUCT

    INNER JOIN Sales.SalesOrderDetail DETAIL

    ON PRODUCT.ProductID = DETAIL.ProductID

    OR PRODUCT.rowguid = DETAIL.rowguid

    ```


    **Listing 8-6.** An `AdventureWorks` Query Guaranteed to Perform Poorly


    This query, which returns 266 rows, yields the performance metrics shown in Figure
    [8-17](#A371168_1_En_8_Chapter.html#Fig17).


    ![A371168_1_En_8_Fig18_HTML.jpg](A371168_1_En_8_Fig18_HTML.jpg)


    **Figure 8-18.** Performance of the rewritten and optimized query in Listing [8-7](#A371168_1_En_8_Chapter.html#Par134)


    ![A371168_1_En_8_Fig17_HTML.jpg](A371168_1_En_8_Fig17_HTML.jpg)


    **Figure 8-17.** Performance of an (intentionally) poorly written query


    ```

    Table ''Product''. Scan count 5, logical reads 40, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''SalesOrderDetail''. Scan count 4, logical reads 4984, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''Worktable''. Scan count 4, logical reads 1209220, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    Check out that row count heading into the nested loops! 34.5 million rows! Since
    `SalesOrderDetail` contains only 121,317 rows, you clearly have a problem that
    needs to be resolved. It turns out that using an `OR` operator in a join can cause
    catastrophically bad performance, as the query optimizer has a very difficult
    time determining the best way to intersect the data sets efficiently.


    If this query plan were reused in the future, it would perform poorly, not because
    of parameter sniffing, but because the query itself is poorly designed. If you
    rewrote the query to remove the `OR`, such as by using two statements separated
    by a `UNION`, you could realize significantly better performance. Listing [8-7](#A371168_1_En_8_Chapter.html#Par134)
    shows this improved `TSQL`.


    ```

    SELECT

    PRODUCT.ProductID,

    PRODUCT.Name

    FROM Production.Product PRODUCT

    INNER JOIN Sales.SalesOrderDetail DETAIL

    ON PRODUCT.ProductID = DETAIL.ProductID

    UNION

    SELECT

    PRODUCT.ProductID,

    PRODUCT.Name

    FROM Production.Product PRODUCT

    INNER JOIN Sales.SalesOrderDetail DETAIL

    ON PRODUCT.rowguid = DETAIL.rowguid

    ```


    **Listing 8-7.** The Optimized Version of the Slow Query from Listing 8-6


    While this `TSQL` may seem longer and more complex, the query optimizer will have
    a significantly easier time finding a good plan for it:


    ```

    Table ''Product''. Scan count 2, logical reads 30, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''SalesOrderDetail''. Scan count 505, logical reads 1554, physical reads
    0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    While the execution plan may seem more complex, the `TSQL` syntax allowed the
    optimizer to break a complex problem into two simpler problems that could then
    be easily solved, combined, and the same result set returned. The reads were reduced
    by over 75x and the runtime went from 10 seconds down to 100ms.


    Dividing and conquering a complex query is often an excellent way to prevent the
    query optimizer from being unable to find the best possible plan. This simple-looking
    query was a performance bomb for the optimizer to deal with. Separating it into
    two sections is one solution and using a temporary table or table variable to
    store the data in intermediary steps is also a valid solution to this performance
    problem.


    If a query becomes large and unwieldy, consider breaking it into smaller, simpler
    queries. With each table that is joined into a query, the number of possible execution
    plans that the query optimizer must evaluate grows exponentially. Depending on
    the query style, the number of join orders that exist for `n` tables will either
    be `n!` (`n` factorial, for a query tree that is left-deep) or `(2n-2)!/(n-1)!`
    (an even larger number if the query tree is bushy). Consider for a moment the
    number of ways in which four tables in a left-deep join order can be ordered:


    ```

    Table A JOIN Table B JOIN Table C JOIN Table D

    ABCD ABDC ACBD ACDB ADBC ADCB BACD BADC BCAD BCDA BDAC BDCA

    CABD CADB CBAD CBDA CDAB CDBA DABC DACB DBAC DBCA DCAB DCBA

    ```


    The result is that there are 24 (`4! = 4 * 3 * 2 * 1`) possible ways to arrange
    the four tables involved in this example. Left-deep and bushy trees are ways to
    describe the query trees that are built by any query processor. Figure [8-19](#A371168_1_En_8_Chapter.html#Fig19)
    shows how each type looks when illustrated as a tree.


    ![A371168_1_En_8_Fig19_HTML.jpg](A371168_1_En_8_Fig19_HTML.jpg)


    **Figure 8-19.** Example of a left-deep query tree (left) and a bushy query tree
    (right)


    The left-deep tree consists of a sequence of tables that are joined one-at-a-time,
    while a bushy tree is composed of separately joined tables whose results are then
    joined together as each set of joins is completed. There are far more ways to
    express the ordering in a bushy tree, which is why the mathematical expression
    for the permutations of join orders is significantly larger than with a left-deep
    tree.


    Without entering into an in-depth discussion of each type of query tree, it is
    safe to say that with each table added into a query, the number of ways the joins
    can be ordered will increase significantly. Removing even one table from a complex
    query and collecting the data from it separately can result in major performance
    gains.


    Always test these changes and ensure that the refactored `TSQL` truly performs
    better. Equally important, be certain that the data returned is the same as it
    was earlier. Highly transactional data may change in between an initial data collection
    and the final query, resulting in inconsistent data. As a result, be comfortable
    with the data that is being queried and don’t blindly optimize without being certain
    that the output of the resulting query will be the same as the original.


    Investigating indexing is also worthwhile. Verify that correct indexes are being
    used and that they are not overly fragmented. Fragmentation will slow down all
    reads on an index and result in `SQL Server` needing to read more pages of data
    into memory before it has all of the index pages needed to execute the query.
    In addition, ensure that your query can take advantage of the correct index. Is
    the index that you expect the query to use enabled and if it is a filtered index,
    is that filter being correctly applied?'
  raw: '### The Red Herrings


    Sometimes, bad execution plans may arise from other sources. If statistics are
    out of date, then suboptimal query execution plans could be chosen prior to parameter
    sniffing occurring. In other words, plan reuse was perfectly fine, but the optimizer
    initially created a bad plan due to the lack of accurate statistics, and that
    bad plan was later reused. In this scenario, a bad plan would have likely been
    generated even if plan reuse had not occurred. Verifying the estimated vs. actual
    row counts in an execution plan is a good way to spot potential statistics inaccuracies.
    See Chapter [6](#A371168_1_En_6_Chapter.html) for details on viewing, using, and
    updating statistics.


