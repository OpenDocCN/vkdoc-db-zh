    This stored procedure will greatly simplify your research, as you can pass it
    any query text and it will return a variety of data about queries in cache, their
    execution plans, and performance metrics on the last execution. You will use this
    in order to collect information on queries as you test them here, but it can be
    reused in any circumstance where you want to search the query cache for specific
    information. TOP 25 is used on the `SELECT` statements in order to limit the result
    set. On a busy server, this could otherwise return a very large amount of data,
    which could adversely affect server or client performance.


    ## Parameter Sniffing Examples


    In order to be sure you are getting clean test results, you should clear the query
    plan cache. As advised earlier in this book, do not run this in a production environment
    or any place where consistent performance is expected. Clearing the query plan
    cache is an excellent way to debug queries by forcing them to create fresh new
    plans with each execution, but as the optimizer takes significant resources to
    do its job, you should only ever do this in isolated environments:


    ```

    DBCC FREEPROCCACHE;

    ```


    You may also provide a specific plan handle as a parameter to this DBCC command
    . This would allow you to clear only a single plan of choice from cache, rather
    than everything. For simplicity, we will clear the entire cache here, but the
    syntax to clear a single query would look like this:


    ```

    DBCC FREEPROCCACHE (0x06000700E8C6530730F36E6B0300000001000000000000000000000000000000000000000000000000000000);

    ```


    The plan handle is included in the query plan cache search query, in case it’s
    needed for further research. Now, in order to illustrate parameter sniffing, you
    need to create a simple stored procedure that searches `Production.Product` based
    on the `ProductModelID` , as shown in Listing [8-2](#A371168_1_En_8_Chapter.html#Par13)
    .


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_products_by_model'')

    BEGIN

    DROP PROCEDURE dbo.get_products_by_model;

    END

    GO

    CREATE PROCEDURE dbo.get_products_by_model (@firstProductModelID INT, @lastProductModelID
    INT)

    AS

    BEGIN

    SELECT

    PRODUCT.Name,

    PRODUCT.ProductID,

    PRODUCT.ProductModelID,

    PRODUCT.ProductNumber,

    MODEL.Name

    FROM Production.Product PRODUCT

    INNER JOIN Production.ProductModel MODEL

    ON MODEL.ProductModelID = PRODUCT.ProductModelID

    WHERE PRODUCT.ProductModelID BETWEEN @firstProductModelID AND @lastProductModelID;

    END

    Listing 8-2.

    Example Stored Procedure to Be Used to Test Parameter Sniffing

    ```


