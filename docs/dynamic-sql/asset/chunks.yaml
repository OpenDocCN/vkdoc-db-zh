- fmt: "## Cleanup\n\n以下TSQL将清理本章中创建的所有对象（如果存在）：\n\n```\nIF EXISTS (SELECT * FROM\
    \ sys.procedures WHERE procedures.name = 'get_people')\nBEGIN\n    DROP PROCEDURE\
    \ dbo.get_people;\nEND\nGO\nIF EXISTS (SELECT * FROM sys.databases WHERE databases.name\
    \ = 'temp_table_test')\nBEGIN\n    DROP DATABASE temp_table_test;\nEND\nGO\n```\n\
    \n# 6. Performance Optimization\n\n对动态SQL的讨论如果不深入其性能，那是不完整的。动态SQL可以极大地提高性能，但如果使用不当，也会增加复杂性。与安全方面的情况类似，优化是一个可以轻松占据比本书更大篇幅的主题。因此，本章重点讨论动态SQL及其相关的性能问题。\n\
    \n## Query Execution\n\n在深入探讨动态SQL的性能以及监控和调整性能的各种方法之前，有必要快速回顾一下查询执行的过程。当你执行一条TSQL语句时，从开始到结果返回并完成，中间发生了什么？查询执行通常分为四个步骤，将在以下各节中讨论。\n\
    \n### Parsing\n\n查询会被检查语法，如果有任何未识别或无效的TSQL命令，将抛出错误。此外，查询会被分解为一个非常高级的步骤列表，SQL Server将在后续过程中遵循这些步骤。这些步骤是简单的操作，例如从表中选择数据、连接另一个表或执行某些动态SQL或存储过程。\n\
    \n### Binding\n\n此步骤主要关注验证对象，并确保它们有效且在正确的上下文中使用。表、列、函数、存储过程以及任何其他命名对象都会对照SQL Server的系统目录进行检查，以验证名称是否正确以及使用是否正确。此时，如果没有收到错误，那么你就知道语法和对象名称都是正确的。在解析步骤中生成的列表会结合这个新信息，生成所谓的代数化树（algebrized\
    \ tree）。这个树是一个必须执行的步骤列表，以便查询能够正确执行。\n\n### Optimization\n\n这是执行过程中最复杂的部分，涉及SQL\
    \ Server需要获取来自绑定步骤的树，并非常非常快地为其找到一个好的执行计划。这个工作进行的方式类似于国际象棋程序如何在一局棋中尝试找到最佳走法。基本上，查询优化器会提出一个可能的执行计划并为其分配一个成本，然后评估更多的执行计划，直到它认为找到了一个足够好的计划。\n\
    \n查询优化是一场与时间的赛跑，因为查询本身需要时间来处理，但优化过程也需要时间。优化器需要权衡这一点，以便既不过多浪费时间来优化一个简单的查询，也要花费足够的时间来找到一个性能良好的计划。例如，如果你有一个需要两秒钟执行的查询，而优化器可以多花一秒钟来节省半秒钟的执行时间，那么这样做就是在浪费时间。如果它只需花费0.1秒的努力就能节省1.5秒，那将是一笔非常划算的交易。除了时间，还会考虑服务器资源（如CPU）。这个过程发生得非常快，并且是SQL\
    \ Server最复杂的组件之一。\n\n优化的结果是一个详细的步骤列表，SQL Server可以按照这个列表执行以返回原始查询中期望的结果。\n\n###\
    \ Execution\n\n执行来自优化过程的步骤，并采取任何必要的操作以完成它们。\n\n### Optimization Tools\n\n为了审查性能并基于此做出明智的决策，你需要定义一套你将继续使用的工具，以协助这个过程。如果没有你习惯使用的多个指标，就不可能就性能做出始终如一的良好决策。如果一个查询很慢，你需要知道它的哪个部分是瓶颈，并确定为什么会出现这种情况。\n\
    \n#### Query Execution Plan\n\n查询执行计划是可用工具中最直观也是最首要的。执行计划是优化器在优化步骤中提出的步骤，由SQL\
