- fmt: '# 统计信息、执行计划与性能优化


    执行计划与之前得到的相同，但对`Production.Product`表的读取次数显著增加！对于一个仅返回三列、大约有2，500行的表，4，004次读取似乎非常高。通过关闭统计信息自动更新，你移除了查询优化器寻找良好执行计划的最重要工具：准确的统计信息。让我们回顾一下你在图6-21中使用的索引的统计信息。


    ![A371168_1_En_6_Fig21_HTML.jpg](A371168_1_En_6_Fig21_HTML.jpg)


    图6-21.

    Production.Product表上`IX_Product_Weight`索引的过时统计信息


    ```sql

    DBCC SHOW_STATISTICS (“Production.Product”, IX_Product_Weight);

    ```


    注意，对于包含170的范围，尽管你添加了1,999行，但只有一个相等行。查询优化器无法根据如此不准确的数据做出明智的决策。为了说明这一点，你可以手动更新此索引上的统计信息：


    ```sql

    UPDATE STATISTICS Production.Product IX_Product_Weight;

    ```


    运行`DBCC`命令重新检查`IX_Product_Weight`索引的统计信息，会显示你期望看到的变化，如图6-22所示。


    ![A371168_1_En_6_Fig22_HTML.jpg](A371168_1_En_6_Fig22_HTML.jpg)


    图6-22.

    Production.Product表上`IX_Product_Weight`索引的更新后统计信息


    现在报告了2,000行权重等于170，这与插入后的预期相符。统计信息更新后，你可以最后一次运行测试查询：


    ```sql

    SELECT

    ProductID,

    Weight,

    Name

    FROM Production.Product

    WHERE Weight = 170

    ```


    这一次，性能指标看起来不那么令人担忧了，如图6-23所示。


    ![A371168_1_En_6_Fig23_HTML.jpg](A371168_1_En_6_Fig23_HTML.jpg)


    图6-23.

    使用更新后统计信息执行前述搜索查询的性能


    ```text

    Table ''Product''. Scan count 1, logical reads 58, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    现在只需要58次读取，而不是4004次，并且选择了聚集索引扫描作为最有效的数据检索方法。事实证明，当你希望返回表中很大一部分数据时，直接返回所有内容并丢弃不需要的部分，比遍历索引查找所有必要行更快。一旦查询优化器获得了关于索引内容的准确数据，它就能够选择扫描，知道这是最佳行动方案。


    ## Trace Flag 2371


    在SQL Server中，还有另一种管理自动更新统计信息的方法，即从SQL Server 2008 R2 Service Pack 1开始可用的跟踪标志。跟踪标志2371旨在满足超大表的需求，因为用于自动更新统计信息的度量标准通常不太适合这些表。对于拥有数百万行的表，等待20%的行发生变化，你可能被迫等待很长时间。


    当你启用此跟踪标志后，更新统计信息的触发时机公式会变得有些动态。当一个表超过25,000行时，触发统计信息更新所需的修改行百分比会降低。这解决了大表的需求，同时不会改变小表的功能。


    如果你负责一个包含数百万或数十亿行表的数据库，那么此跟踪标志可以显著提升性能，并避免手动管理统计信息。可以如下启用此跟踪标志：


    ```sql

    DBCC TRACEON (2371);

    ```


    一如既往，在对SQL Server跟踪标志进行更改之前，请务必对数据库环境进行彻底评估，并测试以确保此更改是有益的。虽然当你获得新的性能功能或选项时可能会非常兴奋，但对这些更改进行充分的质量保证对于确保它们既必要又有帮助至关重要。


    关于此跟踪标志的更多文档可以在MSDN上找到：


    ```text

    http://blogs.msdn.com/b/saponsqlserver/archive/2011/09/07/changes-to-automatic-update-statistics-in-sql-server-traceflag-2371.aspx

    ```


    ## 回到动态SQL


    我们已经讨论了统计信息、它们如何被使用，以及不准确的统计信息如何影响性能。这与动态SQL和你的日常任务有什么关系？基数是查询优化每一步中使用的数量度量。在每一步中，查询优化器必须使用统计信息来确定该步骤预期返回的行数，无论是查找、连接还是过滤。如果统计信息不准确，即使只在单一步骤中，也可能导致次优的执行计划，使得性能比应有的更差，或者（最坏情况）慢到无法接受。


    你可以通过将鼠标悬停在执行计划中的任何步骤上来检查基数，如图6-24所示。


    ![A371168_1_En_6_Fig24_HTML.jpg](A371168_1_En_6_Fig24_HTML.jpg)


    图6-24.

    在SQL Server Management Studio中查看行计数


    将鼠标悬停在聚集索引扫描和合并连接之间的箭头上，显示优化器估计有31,465行输出到连接。然而，执行时实际的行数是31,431。如此小的差异很少会引起性能问题，但如果你在审查查询执行计划时注意到实际行数和估计行数差异很大，那么一定要仔细检查统计信息并确保其准确性。


    动态SQL引入了查询可能经常变化，或在少数几个常见用例之间切换的场景。统计信息出错，或者执行计划以次优方式被使用或重用的可能性变得更高。第8章讨论了参数嗅探，并深入探讨了基数和不良估计如何导致性能问题。理解这些问题可以在它们出现时大大减少困惑。'
  raw: 'The execution plan is identical to what you got previously, but the reads
    on `Production.Product` are significantly higher! 4,004 reads on a table with
    about 2,500 rows seems very high for a query that only returns three columns.
    By turning off statistics auto-update, you removed the query optimizer’s most
    important tool in order to find good execution plans: accurate statistics. Let’s
    review the statistics for the index you used in Figure [6-21](#A371168_1_En_6_Chapter.html#Fig21).


    ![A371168_1_En_6_Fig21_HTML.jpg](A371168_1_En_6_Fig21_HTML.jpg)


    Figure 6-21.


    Stale statistics for the IX_Product_Weight index on Production.Product


    ```

    DBCC SHOW_STATISTICS (“Production.Product”, IX_Product_Weight);

    ```


    Note that for the range including 170, there is only a single equality row, despite
    the fact that you added 1,999 rows. The query optimizer cannot make a smart decision
    with data that is this inaccurate. To illustrate this, you can update the statistics
    on this index manually:


    ```

    UPDATE STATISTICS Production.Product IX_Product_Weight;

    ```


    Running the DBCC command to recheck the statistics on the `IX_Product_Weight`
    index reveals the changes you’d expect to see, as shown in Figure [6-22](#A371168_1_En_6_Chapter.html#Fig22).


    ![A371168_1_En_6_Fig22_HTML.jpg](A371168_1_En_6_Fig22_HTML.jpg)


    Figure 6-22.


    Updated statistics for the IX_Product_Weight index on Production.Product


    Now there are 2,000 rows reported with a weight equal to 170, which matches expectations
    after the inserts. With statistics updated, you can run the test query one last
    time:


    ```

    SELECT

    ProductID,

    Weight,

    Name

    FROM Production.Product

    WHERE Weight = 170

    ```


    This time, performance metrics look much less concerning, as shown in Figure [6-23](#A371168_1_En_6_Chapter.html#Fig23).


    ![A371168_1_En_6_Fig23_HTML.jpg](A371168_1_En_6_Fig23_HTML.jpg)


    Figure 6-23.


    Performance of the previous search query with updated statistics


    ```

    Table ''Product''. Scan count 1, logical reads 58, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    Only 58 reads were needed instead of 4004, and a clustered index scan was chosen
    as the most efficient data retrieval method. It turns out that when you are looking
    to return a very large portion of a table, it’s faster to simply return everything
    and discard what you don’t need, rather than traverse an index to find all of
    the necessary rows. As soon as the query optimizer had accurate data on the contents
    of the index, it was able to opt for a scan, knowing that this was the best course
    of action.


    #### Trace Flag 2371


    There is an additional way to manage auto-updating statistics in SQL Server, and
    that is a trace flag that became available in SQL Server 2008 R2 Service Pack
    1\. Trace Flag 2371 is intended to address the needs of very large tables, whereby
    the metrics used to auto-update statistics normally simply don’t fit well. Wait
    for changes to 20% of a table with millions of rows, and you may be forced to
    wait for a very long time.


    When you turn on this trace flag, the formula for when to update statistics becomes
    somewhat dynamic. When a table exceeds 25,000 rows, then the percentage of rows
    that need to be modified to trigger the update of statistics decreases. This addresses
    the needs of large tables while also not changing the functionality on smaller
    tables.


    If you are responsible for a database that contains tables with millions or billions
    of rows, then this trace flag can be a significant boon to performance and a way
    to avoid having to manually manage statistics. This trace flag can be enabled
    as follows:


    ```

    DBCC TRACEON (2371);

    ```


    As always, do not make changes to SQL Server trace flags until you have performed
    a thorough assessment of your database environment and tested to ensure that this
    change is beneficial. While you might get very excited when new performance features
    or options are available, performing adequate QA on these changes is critical
    to ensuring that they are both necessary and helpful.


    More documentation on this trace flag can be found on MSDN in a very well-written
    article:


    ```

    http://blogs.msdn.com/b/saponsqlserver/archive/2011/09/07/changes-to-automatic-update-statistics-in-sql-server-traceflag-2371.aspx

    ```


    #### Back to Dynamic SQL


    We’ve discussed statistics, how they are used, and how inaccurate statistics can
    affect performance. How does this relate to Dynamic SQL and your day-to-day tasks?
    Cardinality is a measure of quantity used in every step of query optimization.
    In each step, the query optimizer must use statistics in order to determine how
    many rows it expects to be returned in that step, whether it be a seek, join,
    or filter. If statistics are inaccurate, even in a single step, it could result
    in a suboptimal execution plan in which performance is worse than it need be or
    (worst case) unacceptably slow.


    You can check cardinality by hovering over any step in an execution plan, as shown
    in Figure [6-24](#A371168_1_En_6_Chapter.html#Fig24).


    ![A371168_1_En_6_Fig24_HTML.jpg](A371168_1_En_6_Fig24_HTML.jpg)


    Figure 6-24.


    Viewing row counts in SQL Server Management Studio


    Hovering over the arrow between the clustered index scan and merge join reveals
    that the optimizer estimated 31,465 rows to be output to the join. When executed,
    though, the actual number of rows was 31,431\. A difference this small will rarely
    present a performance concern, but if you are reviewing a query execution plan
    and notice that the actual and estimated number of rows differ greatly, then definitely
    take a closer look at statistics and ensure they are accurate.


    Dynamic SQL introduces scenarios where there can be queries that change all the
    time, or that shift between a handful of common use-cases. The potential for statistics
    to be wrong, or for execution plans to get used or reused in suboptimal ways,
    becomes higher. Chapter [8](#A371168_1_En_8_Chapter.html) discusses parameter
    sniffing and dives deeper into cardinality and the ways in which bad estimates
    can lead to performance headaches. Understanding these issues can greatly reduce
    the head-scratching when they arise.'
  trans: '

    # 统计信息、执行计划与性能优化


    执行计划与之前得到的相同，但对`Production.Product`表的读取次数显著增加！对于一个仅返回三列、大约有 2，500 行的表，4，004 次读取似乎非常高。通过关闭统计信息自动更新，你移除了查询优化器寻找良好执行计划的最重要工具：准确的统计信息。让我们回顾一下你在图
    6-21 中使用的索引的统计信息。


    ![A371168_1_En_6_Fig21_HTML.jpg](img/A371168_1_En_6_Fig21_HTML.jpg)


    图 6-21.

    Production.Product 表上`IX_Product_Weight`索引的过时统计信息


    ```sql

    DBCC SHOW_STATISTICS (“Production.Product”, IX_Product_Weight);

    ```


    注意，对于包含 170 的范围，尽管你添加了 1,999 行，但只有一个相等行。查询优化器无法根据如此不准确的数据做出明智的决策。为了说明这一点，你可以手动更新此索引上的统计信息：


    ```sql

    UPDATE STATISTICS Production.Product IX_Product_Weight;

    ```


    运行`DBCC`命令重新检查`IX_Product_Weight`索引的统计信息，会显示你期望看到的变化，如图 6-22 所示。


    ![A371168_1_En_6_Fig22_HTML.jpg](img/A371168_1_En_6_Fig22_HTML.jpg)


    图 6-22.

    Production.Product 表上`IX_Product_Weight`索引的更新后统计信息


    现在报告了 2,000 行权重等于 170，这与插入后的预期相符。统计信息更新后，你可以最后一次运行测试查询：


    ```sql

    SELECT

    ProductID,

    Weight,

    Name

    FROM Production.Product

    WHERE Weight = 170

    ```


    这一次，性能指标看起来不那么令人担忧了，如图 6-23 所示。


    ![A371168_1_En_6_Fig23_HTML.jpg](img/A371168_1_En_6_Fig23_HTML.jpg)


    图 6-23.

    使用更新后统计信息执行前述搜索查询的性能


    ```text

    Table ''Product''. Scan count 1, logical reads 58, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    现在只需要 58 次读取，而不是 4004 次，并且选择了聚集索引扫描作为最有效的数据检索方法。事实证明，当你希望返回表中很大一部分数据时，直接返回所有内容并丢弃不需要的部分，比遍历索引查找所有必要行更快。一旦查询优化器获得了关于索引内容的准确数据，它就能够选择扫描，知道这是最佳行动方案。


    ## Trace Flag 2371


    在 SQL Server 中，还有另一种管理自动更新统计信息的方法，即从 SQL Server 2008 R2 Service Pack 1 开始可用的跟踪标志。跟踪标志
    2371 旨在满足超大表的需求，因为用于自动更新统计信息的度量标准通常不太适合这些表。对于拥有数百万行的表，等待 20%的行发生变化，你可能被迫等待很长时间。


    当你启用此跟踪标志后，更新统计信息的触发时机公式会变得有些动态。当一个表超过 25,000 行时，触发统计信息更新所需的修改行百分比会降低。这解决了大表的需求，同时不会改变小表的功能。


    如果你负责一个包含数百万或数十亿行表的数据库，那么此跟踪标志可以显著提升性能，并避免手动管理统计信息。可以如下启用此跟踪标志：


    ```sql

    DBCC TRACEON (2371);

    ```


    一如既往，在对 SQL Server 跟踪标志进行更改之前，请务必对数据库环境进行彻底评估，并测试以确保此更改是有益的。虽然当你获得新的性能功能或选项时可能会非常兴奋，但对这些更改进行充分的质量保证对于确保它们既必要又有帮助至关重要。


    关于此跟踪标志的更多文档可以在 MSDN 上找到：


    ```text

    http://blogs.msdn.com/b/saponsqlserver/archive/2011/09/07/changes-to-automatic-update-statistics-in-sql-server-traceflag-2371.aspx

    ```


    ## 回到动态 SQL


    我们已经讨论了统计信息、它们如何被使用，以及不准确的统计信息如何影响性能。这与动态 SQL 和你的日常任务有什么关系？基数是查询优化每一步中使用的数量度量。在每一步中，查询优化器必须使用统计信息来确定该步骤预期返回的行数，无论是查找、连接还是过滤。如果统计信息不准确，即使只在单一步骤中，也可能导致次优的执行计划，使得性能比应有的更差，或者（最坏情况）慢到无法接受。


    你可以通过将鼠标悬停在执行计划中的任何步骤上来检查基数，如图 6-24 所示。


    ![A371168_1_En_6_Fig24_HTML.jpg](img/A371168_1_En_6_Fig24_HTML.jpg)


    图 6-24.

    在 SQL Server Management Studio 中查看行计数


    将鼠标悬停在聚集索引扫描和合并连接之间的箭头上，显示优化器估计有 31,465 行输出到连接。然而，执行时实际的行数是 31,431。如此小的差异很少会引起性能问题，但如果你在审查查询执行计划时注意到实际行数和估计行数差异很大，那么一定要仔细检查统计信息并确保其准确性。


    动态 SQL 引入了查询可能经常变化，或在少数几个常见用例之间切换的场景。统计信息出错，或者执行计划以次优方式被使用或重用的可能性变得更高。第 8 章讨论了参数嗅探，并深入探讨了基数和不良估计如何导致性能问题。理解这些问题可以在它们出现时大大减少困惑。

