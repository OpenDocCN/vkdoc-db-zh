- fmt: '## Blind SQL Injection


    Even if a hacker cannot gain complete access to the database server via SQL injection,
    they may still be able to use some query elements to slowly gain information about
    a server, its security settings, and data. This can be done through the SQL injection
    methods demonstrated previously, or by modifying URLs or other data that is passed
    directly to the application.


    The simplest example of this attack is to modify an HTTP string in order to view
    data that would otherwise be inaccessible to the user, such as a user profile,
    personal pictures, or upcoming travel plans. This attack requires little or no
    TSQL knowledge, and therefore it is very common, and often one of the first attempts
    made against a web application. The defense against these attempts to steal data
    is to ensure that the web page itself does not allow URLs to be blindly modified.
    In addition, if user, client, or web browser data is verified with all requests
    to sensitive data, then denying unauthorized access becomes much easier.


    If hackers can gain some SQL Server access via Dynamic SQL, but are limited by
    security restrictions, they can use their limited access to poke at the server
    and slowly discover limitations, security settings, data elements, and more. They
    will send requests in the form of `IF` statements that evaluate to true or false.
    Alternatively, the malicious users could ask questions that lead to error messages,
    and therefore determine the results by whether the statement throws an error or
    not. `TRY/CATCH` can be used to manage error messages, thereby reducing the impact
    of these queries on web or database logs. Delays can be used, as well, to help
    in diagnosing responses based on the time it takes for them to complete. Even
    if friendly errors are displayed, that information would confirm that they have
    enough access to query the server for information and succeed.


    Listing [2-16](#A371168_1_En_2_Chapter.html#Par114) illustrates some simple examples
    of the sorts of blind SQL injection queries that might get targeted at a vulnerable
    server.


    ```

    IF CURRENT_USER = ''dbo'' SELECT 1 ELSE SELECT 0;

    IF @@VERSION LIKE ''%12.0%'' SELECT 1 ELSE SELECT 0;

    IF (SELECT COUNT(*) FROM Person.Person WHERE FirstName = ''Edward'' AND LastName
    = ''Pollack'') > 0

    WAITFOR DELAY ''00:00:05''

    ELSE

    WAITFOR DELAY ''00:00:00'';

    BEGIN TRY

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT COUNT(*) FROM dbo.password;''

    EXEC (@sql_command)

    END TRY

    BEGIN CATCH

    SELECT 0

    END CATCH;

    Listing 2-16.

    Example Queries that May Be Used in Blind SQL Injection Attacks

    ```


    The first three examples use basic yes/no questions in an attempt to learn about
    the server. The last example is a bit sneaker and involves creating additional
    Dynamic SQL to probe database objects further without throwing database errors
    in the process. `TRY/CATCH` does not work if syntax errors are present, hence
    querying an invalid table would return error messages. Injecting or appending
    further Dynamic SQL allows an attacker to verify the existence of tables without
    causing syntax or parsing errors.


    Blind SQL injection is a slower attack method, but it can over time reveal critical
    data about a system. Each query reveals a new piece of information, and with enough
    data, hackers may be able to alter/bypass security restrictions in order to execute
    queries in the same way as they would have if no security precautions were in
    place.


    ## Detection and Prevention


    Prevention is the optimal way to prevent SQL injection, but as with any large
    software system, there will be code that predates you and could contain security
    holes. How do we guard ourselves against existing threats, or those we have yet
    to identify?


    ### Security Testing


    It has become a regular security task for companies to have third-party vendors
    run penetration tests against their applications. This provides an opportunity
    for an unbiased external source to probe your environments for any of the common
    signs of SQL injection (or other vulnerabilities). Alternatively, these tests
    can be run internally if you have your own set of tools that are up to the task.
    This is an excellent way to find uncommon, old, or hidden vulnerabilities.


    This sort of testing is often required in order to meet compliance standards,
    for example, with HIPAA (Health Insurance Portability and Accountability Act ).
    If you work for a company or in an industry where sensitive data is stored by
    your software, conduct the necessary research to ensure that your security testing
    and verification are meeting your industry’s compliance standards. Additional
    compliance may be necessary if you are doing business with customers in other
    countries.


    The most common methods for detecting SQL injection vulnerabilities involve blindly
    populating application inputs with a variety of injection statements, in an attempt
    to generate application errors or coax unusual HTTP responses from a web page.
    For example, a set of valid searches is performed and the response time is measured.
    Next, SQL injection statements are supplied to the application. By comparing those
    response times, it is possible to determine if the injected SQL was executed or
    not.


    Checking for error messages is also common. If a set of typical SQL injection
    statements can result in unusual application or SQL errors, then the possibility
    exists for further exploitation.


    It is important to understand that while security companies possess a variety
    of tools as a method of defending you from SQL injection attacks, hackers also
    possess their own sets of similar tools. If any security vulnerability can be
    demonstrated, regardless of how improbable or obscure, it is likely that a hacker
    will also eventually discover and immediately take advantage of it.


    ### Scanning of Application Traffic


    Lightweight monitors can be put in place that will scan incoming traffic for unusual
    data patterns. For example, are common SQL commands or syntax being sent to your
    database servers from applications where only text is expected? Searching for
    semicolons, apostrophes, or TSQL keywords, such as `SELECT`, `WHERE`, and `FROM`,
    are effective ways to locate and manage the sources of hacking attempts.


    While these scans can be very useful, their value is solely based on the ratio
    of valid information versus noise. The need to catch SQL injection attacks needs
    to be weighed against the potential that common SQL characters or keywords may
    be common amongst application traffic. Realistically, any application that is
    open to the Internet will be blindly targeted by hackers for common vulnerabilities.


    If this is the case, then it is up to you to determine a baseline for an average
    day of traffic (without any actual attacks occurring). Once that is established,
    you can limit alerts to scenarios where suspicious activity is high enough to
    make you want to investigate further.'
