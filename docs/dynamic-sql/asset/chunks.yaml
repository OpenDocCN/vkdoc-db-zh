    Now, let’s run the previous queries on `Person.Person` a few times, each one with
    a variety of different names. This is solely to add execution data to the cache
    for the upcoming demo, and therefore any queries that run on this table will end
    up in cache and visible below. Once it’s done, you can build a TSQL statement
    that will read query data from the cache, as shown in Listing [6-2](#A371168_1_En_6_Chapter.html#Par63).


    ```

    SELECT

    cached_plans.objtype AS ObjectType,

    OBJECT_NAME(sql_text.objectid, sql_text.dbid) AS ObjectName,

    cached_plans.usecounts AS ExecutionCount,

    sql_text.TEXT AS QueryText

    FROM sys.dm_exec_cached_plans AS cached_plans

    CROSS APPLY sys.dm_exec_sql_text(cached_plans.plan_handle) AS sql_text

    WHERE sql_text.TEXT LIKE ''%Person.Person%'';

    Listing 6-2.

    TSQL that Can Retrieve SQL Text from the Query Plan Cache

    ```


    This returns only a handful of relevant columns from the plan cache for your viewing
    pleasure, but could be altered to return quite a bit more data, if you wanted.
    The results of this query are shown in Figure [6-6](#A371168_1_En_6_Chapter.html#Fig6).


    ![A371168_1_En_6_Fig6_HTML.jpg](A371168_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Sample data from the query plan cache


    The results are every query that is currently in the plan cache with TSQL text
    that includes the string `"Person.Person"`. The first query is the one I just
    ran to collect this data. The second is the parameterized query, which I ran for
    a variety of different first names. Notice that the execution count indicates
    that it has been reused a number of times. The remaining six queries are the non-parameterized
    queries from earlier, executed for the names `Edward`, `Xavier`, `Thomas`, `Jesse`,
    `James`, and `T-Rex`!!!. Regardless of the results (or lack thereof) returned,
    a separate entry is in the plan cache for all of these, even though the queries
    are essentially the same.


    Note that under the object type, the parameterized query is listed as `Prepared`
    rather than `Adhoc`, which indicates that the TSQL that was executed had no variables
    that could alter the TSQL text within it. By being completely parameterized, the
    query plan also becomes deterministic. Changing the first name you are searching
    for doesn’t alter the SQL text, and therefore does not alter the execution plan.
    In the event that this query were executed very often for a large variety of first
    names, the non-parameterized query would quickly fill up the plan cache with a
    pile of entries for the same search. This would be very wasteful over time, not
    only consuming resources in constantly compiling query execution plans, but eventually
    bumping more important queries out of cache. As a result, whenever you’re working
    with any query that is to be executed often, make sure that it can execute over
    and over but only needs a single execution plan.


    #### Simplifying Queries


    In the earlier discussion of dynamic searches, you were able to use Dynamic SQL
    as a way to remove excessive joins or `WHERE` clauses from TSQL statements. While
    the Dynamic SQL was more complex, the resulting TSQL that was executed was simpler.
    Now that you have some performance evaluation tools at your disposal, you can
    put that claim to the test! See Listing [6-3](#A371168_1_En_6_Chapter.html#Par69)
    for this stored procedure.'
  trans: '### 执行计划缓存


    SQL Server 中执行的每一个唯一查询都会生成一个查询执行计划。是什么让一个查询成为“唯一”？这是由它的精确文本决定的。为了生成执行计划而优化查询需要消耗时间和服务器资源，这是一个相对昂贵的过程，尤其是对于更复杂的查询。考虑代码清单
    6-1 中的查询，假设它在服务器上频繁运行，每分钟 500 次。


    ```sql

    DECLARE @FirstName NVARCHAR(MAX) = ''Edward'';

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = "" + @FirstName + "";

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    代码清单 6-1. 一个将为每个名字生成新执行计划的 T-SQL 示例


    当它首次执行时，会为其精确文本创建一个执行计划，打印结果如下：


    ```sql

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = ''Edward'';

    ```


    注意名字 `Edward` 被包含在 SQL 文本中。假设该查询再次运行，但使用不同的名字：


    ```sql

    DECLARE @FirstName NVARCHAR(MAX) = ''Xavier'';

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = "" + @FirstName + "";

    ''

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    生成的 SQL 文本将与上次运行的查询不同：


    ```sql

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = ''Xavier'';

    ```


    因此，每个查询将获得一个不同的执行计划。检查时间统计信息的数据，你可以看到在执行前处理查询花费了一定的时间：


    ```sql

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 1 ms.

    ```


    一微秒看起来可能不多，但如果它每分钟执行 500 次，你每天最终会多出 720,000 毫秒的额外执行时间！对于一个更复杂的查询，这可能会累积成巨大的延迟。当执行计划被重用时，解析和编译时间指示的时间将为零，这对于频繁执行的查询来说是更理想的情况。


    这个困境的解决方案与你在前面章节中看到的许多安全问题和 SQL 注入问题的解决方案相同：**参数化查询**！重写查询将 `FirstName` 更改为一个可以反复使用同一执行计划的参数：


    ```sql

    DECLARE @FirstName NVARCHAR(MAX) = ''Edward'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@first_name NVARCHAR(MAX)'';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name;''

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @FIrstName;

    ```


    当这个版本的简单查询打印 `@sql_command` 时，结果文本如下：


    ```sql

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name;

    ```


    实际上，无论传递给动态 SQL 命令字符串的 `@FirstName` 值是什么，查询文本都将相同。因此，你只需为优化查询支付一次代价，之后执行计划将从那时起被反复重用。这相当于每天为此查询减少了
    12 分钟的延迟。如果它是一个更复杂的查询，需要 20 毫秒来解析和编译，那么节省的时间将是 4 小时的延迟！


    让我们快速证明这一点，并展示我所描述的行为是真实的，而不仅仅是理论上的。首先，你需要清除过程缓存，这将为你提供一个干净的工作环境，没有干扰：


    ```sql

    DBCC FREEPROCCACHE;

    ```


    执行此 `DBCC` 命令将清除缓存中的所有执行计划数据。这是创建干净测试环境的好方法，但应仅在与生产工作负载隔离的环境中使用！对于本地测试服务器上的测试目的，这是一种辅助工作的好方法。


    **除非你绝对确定，否则切勿在生产环境中清除过程缓存！** 这会从缓存中删除所有查询执行计划数据，在繁忙的服务器上可能导致巨大延迟，因为查询需要重新优化！


    现在，让我们在 `Person.Person` 上运行之前的查询几次，每次都使用各种不同的名字。这仅仅是为了向缓存添加执行数据以供后续演示，因此任何在此表上运行的查询最终都会进入缓存并在下方可见。完成后，你可以构建一个
    T-SQL 语句从缓存中读取查询数据，如代码清单 6-2 所示。


    ```sql

    SELECT

    cached_plans.objtype AS ObjectType,

    OBJECT_NAME(sql_text.objectid, sql_text.dbid) AS ObjectName,

    cached_plans.usecounts AS ExecutionCount,

    sql_text.TEXT AS QueryText

    FROM sys.dm_exec_cached_plans AS cached_plans

    CROSS APPLY sys.dm_exec_sql_text(cached_plans.plan_handle) AS sql_text

    WHERE sql_text.TEXT LIKE ''%Person.Person%'';

    ```


    代码清单 6-2. 可以从查询计划缓存中检索 SQL 文本的 T-SQL


    这仅返回计划缓存中少量相关列供你查看，但如果你想，也可以修改以返回更多数据。此查询的结果如图 6-6 所示。


    ![A371168_1_En_6_Fig6_HTML.jpg](img/A371168_1_En_6_Fig6_HTML.jpg)


    图 6-6. 查询计划缓存中的示例数据


    结果是当前计划缓存中所有 T-SQL 文本包含字符串 `"Person.Person"` 的查询。第一个查询是我刚刚运行以收集此数据的查询。第二个是参数化查询，我用多种不同的名字运行了它。请注意，执行计数表明它已被重用多次。剩下的六个查询是之前的非参数化查询，分别用于名字
    `Edward`、`Xavier`、`Thomas`、`Jesse`、`James` 和 `T-Rex`！！！。无论返回的结果如何（或者没有结果），所有这些查询在计划缓存中都有单独的条目，尽管这些查询本质上是相同的。


    请注意，在对象类型下，参数化查询被列为 `Prepared` 而不是 `Adhoc`，这表明执行的 T-SQL 中没有变量可以改变其内部的 T-SQL 文本。通过完全参数化，查询计划也变得确定。更改你正在搜索的名字不会改变
    SQL 文本，因此也不会改变执行计划。如果此查询非常频繁地执行，用于大量不同的名字，非参数化查询将很快用大量相同搜索的条目填满计划缓存。随着时间的推移，这将非常浪费，不仅消耗资源不断编译查询执行计划，最终还会将更重要的查询挤出缓存。因此，无论何时处理任何需要频繁执行的查询，请确保它可以重复执行但只需要一个执行计划。


    ### 简化查询


    在之前关于动态搜索的讨论中，你能够使用动态 SQL 来移除 T-SQL 语句中过多的连接或 `WHERE` 子句。虽然动态 SQL 更复杂，但执行的最终 T-SQL
    更简单。既然你已经掌握了一些性能评估工具，你可以验证这个说法！请参阅代码清单 6-3 了解此存储过程。'
- fmt: "# Dynamic Search Procedure\n\n## 代码逻辑说明\n\n`Listing 6-3`展示了一个动态搜索存储过程，它能够在需要时选择性地查询对象。\n\
    \n## SQL 代码实现\n\n以下代码块定义了存储过程 `dbo.search_products`：\n\n```sql\nIF EXISTS (SELECT\
    \ * FROM sys.procedures WHERE procedures.name = 'search_products')\nBEGIN\n  \
    \  DROP PROCEDURE dbo.search_products;\nEND\nGO\n\n-- Search with a check to avoid\
    \ empty searches\nCREATE PROCEDURE dbo.search_products\n    @product_name NVARCHAR(50)\
    \ = NULL,\n    @product_number NVARCHAR(25) = NULL,\n    @product_model NVARCHAR(50)\
    \ = NULL,\n    @product_subcategory NVARCHAR(50) = NULL,\n    @product_sizemeasurecode\
    \ NVARCHAR(50) = NULL,\n    @product_weightunitmeasurecode NVARCHAR(50) = NULL,\n\
    \    @show_color BIT = 0,\n    @show_safetystocklevel BIT = 0,\n    @show_reorderpoint\
    \ BIT = 0,\n    @show_standard_cost BIT = 0,\n    @show_catalog_description BIT\
    \ = 0,\n    @show_subcategory_modified_date BIT = 0,\n    @show_product_model\
    \ BIT = 0,\n    @show_product_subcategory BIT = 0,\n    @show_product_sizemeasurecode\
    \ BIT = 0,\n    @show_product_weightunitmeasurecode BIT = 0\nAS\nBEGIN\n    SET\
    \ NOCOUNT ON;\n\n    IF COALESCE(@product_name, @product_number, @product_model,\
    \ @product_subcategory,\n                 @product_sizemeasurecode, @product_weightunitmeasurecode)\
    \ IS NULL\n        RETURN;\n\n    -- Add \"%\" delimiters to parameters that will\
    \ be searched as wildcards.\n    SET @product_name = '%' + @product_name + '%';\n\
    \    SET @product_number = '%' + @product_number + '%';\n    SET @product_model\
    \ = '%' + @product_model + '%';\n\n    DECLARE @sql_command NVARCHAR(MAX);\n\n\
    \    -- Define the parameter list for filter criteria\n    DECLARE @parameter_list\
    \ NVARCHAR(MAX) = '@product_name NVARCHAR(50), @product_number NVARCHAR(25),\n\
    \        @product_model NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode\
    \ NVARCHAR(50),\n        @product_weightunitmeasurecode NVARCHAR(50)';\n\n   \
    \ -- Generate the simplified command string section for the SELECT columns\n \
    \   SELECT @sql_command = '\n        SELECT\n            Product.Name AS product_name,\n\
    \            Product.ProductNumber AS product_number,';\n\n    IF @show_product_model\
    \ = 1 OR @show_catalog_description = 1\n        SELECT @sql_command = @sql_command\
    \ + '\n            ProductModel.Name AS product_model_name,\n            ProductModel.CatalogDescription\
    \ AS productmodel_catalog_description,';\n\n    IF @show_product_subcategory =\
    \ 1 OR @show_subcategory_modified_date = 1\n        SELECT @sql_command = @sql_command\
    \ + '\n            ProductSubcategory.Name AS product_subcategory_name,\n    \
    \        ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,';\n\
    \n    IF @show_product_sizemeasurecode = 1\n        SELECT @sql_command = @sql_command\
    \ + '\n            SizeUnitMeasureCode.Name AS size_unit_measure_code,';\n\n \
    \   IF @show_product_weightunitmeasurecode = 1\n        SELECT @sql_command =\
    \ @sql_command + '\n            WeightUnitMeasureCode.Name AS weight_unit_measure_code,';\n\
    \n    IF @show_color = 1 OR @show_safetystocklevel = 1 OR @show_reorderpoint =\
    \ 1 OR @show_standard_cost = 1\n        SELECT @sql_command = @sql_command + '\n\
    \            Product.Color AS product_color,\n            Product.SafetyStockLevel\
    \ AS product_safety_stock_level,\n            Product.ReorderPoint AS product_reorderpoint,\n\
    \            Product.StandardCost AS product_standard_cost';\n\n    -- In the\
    \ event that there is a comma at the end of our command string, remove it before\
    \ continuing:\n    IF (SELECT SUBSTRING(@sql_command, LEN(@sql_command), 1)) =\
    \ ','\n        SELECT @sql_command = LEFT(@sql_command, LEN(@sql_command) - 1);\n\
    \n    SELECT @sql_command = @sql_command + '\n        FROM Production.Product'\n\
    \n    -- Put together the JOINs based on what tables are required by the search.\n\
    \    IF (@product_model IS NOT NULL OR @show_product_model = 1 OR @show_catalog_description\
    \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN\
    \ Production.ProductModel\n                ON Product.ProductModelID = ProductModel.ProductModelID';\n\
    \n    IF (@product_subcategory IS NOT NULL OR @show_subcategory_modified_date\
    \ = 1 OR @show_product_subcategory = 1)\n        SELECT @sql_command = @sql_command\
    \ + '\n            LEFT JOIN Production.ProductSubcategory\n                ON\
    \ Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID';\n\n\
    \    IF (@product_sizemeasurecode IS NOT NULL OR @show_product_sizemeasurecode\
    \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN\
    \ Production.UnitMeasure SizeUnitMeasureCode\n                ON Product.SizeUnitMeasureCode\
    \ = SizeUnitMeasureCode.UnitMeasureCode';\n\n    IF (@product_weightunitmeasurecode\
    \ IS NOT NULL OR @show_product_weightunitmeasurecode = 1)\n        SELECT @sql_command\
    \ = @sql_command + '\n            LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode\n\
    \                ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode';\n\
    \n    SELECT @sql_command = @sql_command + '\n        WHERE 1 = 1';\n\n    --\
    \ Build the WHERE clause based on which tables are referenced and required by\
    \ the search.\n    IF @product_name IS NOT NULL\n        SELECT @sql_command =\
    \ @sql_command + '\n            AND Product.Name LIKE @product_name';\n\n    IF\
    \ @product_number IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n\
    \            AND Product.ProductNumber LIKE @product_number';\n\n    IF @product_model\
    \ IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n            AND\
    \ ProductModel.Name LIKE @product_model';\n\n    IF @product_subcategory IS NOT\
    \ NULL\n        SELECT @sql_command = @sql_command + '\n            AND ProductSubcategory.Name\
    \ = @product_subcategory';\n\n    IF @product_sizemeasurecode IS NOT NULL\n  \
    \      SELECT @sql_command = @sql_command + '\n            AND SizeUnitMeasureCode.Name\
    \ = @product_sizemeasurecode';\n\n    IF @product_weightunitmeasurecode IS NOT\
    \ NULL\n        SELECT @sql_command = @sql_command + '\n            AND WeightUnitMeasureCode.Name\
    \ = @product_weightunitmeasurecode';\n\n    PRINT @sql_command;\n\n    EXEC sp_executesql\
    \ @sql_command, @parameter_list, @product_name, @product_number,\n        @product_model,\
    \ @product_subcategory, @product_sizemeasurecode,\n        @product_weightunitmeasurecode;\n\
    END\n```"
