    \ PRODUCT\n        LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\n \
    \           ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n    ) PRODUCT_DATA\n\
    \    PIVOT\n    (      SUM(product_quantity)\n        FOR product_color IN (';\n\
    ```\n\n清单 9-7. 用于存储数据以进行动态 UNPIVOT 演示的查询\n\n通过在 `SELECT` 语句中添加 `INTO`，上面审查的输出将被存储到表\
    \ `dbo.Products_By_Color` 中，该表将用于 `UNPIVOT` 测试。\n\n`UNPIVOT` 的语法与 `PIVOT` 类似，涉及使用类似的列列表，不同之处在于数据将被还原为行，并移除所有列出的附加列。这可以在清单\
    \ 9-8 中看到。\n\n```sql\nSELECT\n    *\nFROM\n    (SELECT\n        *\n    FROM dbo.Products_By_Color)\
    \ AS PRODUCTS_BY_COLOR\nUNPIVOT\n    (product_quantity FOR Color IN\n        ([Black],\
    \ [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])\n\
    \    ) AS UNPIVOT_DATA;\n```\n\n清单 9-8. 使用 UNPIVOT 将列标题还原为行数据\n\n图 9-5 显示了此语句输出的一个子集。\n\
    \n![A371168_1_En_9_Fig5_HTML.jpg](img/A371168_1_En_9_Fig5_HTML.jpg)\n\n图 9-5.\
    \ 清单 9-8 中 UNPIVOT 语句的输出\n\n上一节引入的所有新列都已被移除，它们对应的名称被插入到新的 `Color` 列中。`UNPIVOT`\
    \ 的语法涉及三个额外的语法点，值得详细描述：\n\n*   一个用于存放反透视的数量数据的新列。在本例中，我们将新列命名为 `product_quantity`，但可以使用任何名称。使用\
    \ `UNPIVOT` 时，无需提供聚合函数，因为任何重复值都将成为结果集中的不同行。\n*   必须提供将包含列名的新列。在此示例中，我们将其命名为 `Color`。\n\
    *   必须提供一个列列表，类似于编写 `PIVOT` 语句时。此列表中的每个列都将包含在结果集的行中。任何省略的列名都不会出现在结果集中。\n\n此查询的结果与原始数据不同。必须强调的是，`UNPIVOT`\
    \ 并不简单地是 `PIVOT` 的逆操作，先后应用两者很少会产生完全相同的数据集。在前面的示例中，这些数据与你在本章开始时拥有的数据有两个重要区别。\n\n\
    首先，`NULL` 值已被消除。任何未定义颜色的产品都从结果集中被剔除。结果显示了所有颜色在列表中存在且数量已定义的产品-颜色组合。第二个区别涉及数量本身。当你对一组数据应用\
    \ `PIVOT` 时，你提供了一个聚合来处理具有相同值的多行。一旦数量被求和，就无法“取消求和”。`UNPIVOT` 的结果包含产品数量总计，这些总计代表了\
    \ `production.Product` 原始数据中的多个产品。既然你已经理解了 `PIVOT` 和 `UNPIVOT` 之间的重要区别，并了解了每种操作处理数据的方式，你就可以着手让\
    \ `UNPIVOT` 变得更加灵活。\n"
- fmt: '# SQL PIVOT 和 UNPIVOT 高级用法


    ## 动态 UNPIVOT


    与之前一样，你希望能够从动态的列名列表应用 `UNPIVOT`，而不是被迫在代码中提前提供值。这使你可以随意进行数据或架构更改，而无需每次都为此处进行更改。第一个挑战是根据表中的列组（而非行数据）生成颜色列表。要获取所有列，有几个可用选项。第一种是回到
    `Production.Product` 并使用该表中的颜色为此查询提供数据，如清单 [9-9](#A371168_1_En_9_Chapter.html#Par51)
    所示。


    ```sql

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT DISTINCT

    Product.Color

    FROM Production.Product

    WHERE Product.Color IS NOT NULL;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color) AS PRODUCTS_BY_COLOR

    UNPIVOT

    (product_quantity FOR Color IN

    ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) AS UNPIVOT_DATA;

    '';

    EXEC sp_executesql @sql_command;

    ```


    清单 9-9.

    使用原始行数据提供颜色名称的动态 UNPIVOT


    这种方法有效，并将提供与之前相同的输出，但有一个明显的限制，即之前的颜色列表可能不适用于这里。如果确实不适用，那么你需要从表架构本身收集列名数据，并用它来驱动
    `UNPIVOT`。这可以通过查询系统视图 `sys.tables` 和 `sys.columns` 来实现，它们提供了有关表和列的结构与名称的信息。还有其他系统对象可以提供类似数据，例如
    `INFORMATION_SCHEMA.COLUMNS`，但对于此处的示例，我们将坚持使用前述的两个视图，它们引用了 `sys.objects` 中的数据。这可以在清单
    [9-10](#A371168_1_En_9_Chapter.html#Par53) 中看到。


    ```sql

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT

    columns.name

    FROM sys.tables

    INNER JOIN sys.columns

    ON columns.object_id = tables.object_id

    WHERE tables.name = ''Products_By_Color''

    AND columns.name NOT IN (''product_name'', ''ReorderPoint'');

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color) AS PRODUCTS_BY_COLOR

    UNPIVOT

    (product_quantity FOR Color IN

    ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) AS UNPIVOT_DATA;

    '';

    EXEC sp_executesql @sql_command;

    ```


    清单 9-10.

    使用架构元数据提供颜色名称的动态 UNPIVOT


    此示例中的一切都与上一个相同，唯一的区别在于颜色数据的收集，它使用了由 `sys.columns` 提供的表 `dbo.Products_By_Color`
    的列名。请注意，你需要在此处提供一个例外列表，其中包含你不想 `UNPIVOT` 的任何列。在此示例中，有两个额外的列不是颜色，并且你不想将它们转换为行数据：`product_name`
    和 `ReorderPoint`。如果忘记这些例外，你可能会收到意外的输出或类似以下的错误消息：


    ```

    Msg 8167, Level 16, State 1, Line 329

    The type of column "ReorderPoint" conflicts with the type of other columns specified
    in the UNPIVOT list.

    ```


    在这种情况下，我们将不同数据类型的列包含在了 `UNPIVOT` 中。虽然颜色下列出的数量都是 `INT` 类型，但 `ReorderPoint` 是 `SMALLINT`，而
    `product_name` 是 `NVARCHAR(50)`。例外可以像上面那样硬编码，也可以作为变量传递到运行 `UNPIVOT` TSQL 的任何地方。


    ## 动态 PIVOT


    ### 按季度分组


    到目前为止演示的功能非常适合教授 `PIVOT` 和 `UNPIVOT` 的基础知识，以及将动态 SQL 集成到它们的用法中。这些操作符在现实世界中一个非常常见的用途是生成按月、季度或年分布在列标题中的会计数据。例如，如果你希望返回按季度分列标题的销售数据该怎么办？你可以将
    `PIVOT` 集成到公共表表达式中，这允许你设置财务数据，然后你可以将其转换为列式数据以用于报告或进一步分析。此示例可以在清单 [9-11](#A371168_1_En_9_Chapter.html#Par58)
    中看到。


    ```sql

    WITH CTE_SALES AS (

    SELECT

    DATEPART(QUARTER, OrderDate) AS order_quarter,

    DATEPART(YEAR, OrderDate) AS order_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR order_quarter IN ([1], [2], [3], [4])

    ) PIVOT_DATA

    ORDER BY order_year ASC;

    ```


    清单 9-11.

    使用 PIVOT 按季度对销售数据进行分组


    清单 [9-11](#A371168_1_En_9_Chapter.html#Par58) 中查询的结果可以在图 [9-6](#A371168_1_En_9_Chapter.html#Fig6)
    中的小结果集中看到。


    ![A371168_1_En_9_Fig6_HTML.jpg](A371168_1_En_9_Fig6_HTML.jpg)


    图 9-6.

    使用 PIVOT 获取按季度划分的销售额


    每个季度都有自己的列，销售总额聚合在下面的每一行中。`NULL` 的实例表示那些特定时间段内没有数据的情况。你也可以编写 `PIVOT` 来返回包括年份在内的所有季度作为列标题，如清单
    [9-12](#A371168_1_En_9_Chapter.html#Par61) 所示。


    ### 按季度和年份分组


    ```sql

    WITH CTE_SALES AS (

    SELECT

    ''Totals'' AS Totals,

    ''Q'' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''-'' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4)) AS quarter_and_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR quarter_and_year IN ([Q2-2011], [Q3-2011], [Q4-2011], [Q1-2012],[Q2-2012],
    [Q3-2012], [Q4-2012],

    [Q1-2013],[Q2-2013], [Q3-2013], [Q4-2013], [Q1-2014], [Q2-2014])

    ) PIVOT_DATA

    ```


    清单 9-12.

    使用 PIVOT 在单个结果行中按季度和年份对销售数据进行分组


    通过将季度和年份组合成一个字符串，你可以将数据压缩为单行，每季度一列，包括年份。包含 `Totals` 列是为了让你有某种行标题，但对于成功检索结果集来说并非必需。


    此语法引入了你之前遇到的相同问题，即你被迫将季度列表硬编码到 TSQL 中。如果添加新数据，则查询将不再有效。动态 SQL 可以再次拯救你，它允许你提前声明一个季度列表，然后将其集成到命令字符串中，该字符串将使用
    `PIVOT` 来适当地处理源数据，而不管日期如何。这在清单 [9-13](#A371168_1_En_9_Chapter.html#Par64) 中展示。


    ### 动态季度列表


    ```sql

    DECLARE @quarters TABLE

    (quarter_and_year NVARCHAR(7));

    INSERT INTO @quarters

    (quarter_and_year)

    SELECT DISTINCT

    ''Q'' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''-'' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4))

    FROM Sales.SalesOrderHeader

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    WITH CTE_SALES AS (

    SELECT

    ''''Totals'''' AS Totals,

    ''''Q'''' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''''-'''' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4)) AS quarter_and_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR quarter_and_year IN (''

    SELECT @sql_command = @sql_command + ''['' + quarter_and_year + ''], ''

    FROM @quarters;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    清单 9-13.

    用于返回任意季度数财务数据的动态 PIVOT'
  raw: 'As before, you want to be able to apply `UNPIVOT` from a dynamic list of column
    names, and not be forced to supply values ahead of time in your code. This allows
    you to make data or schema changes at will without having to make changes here
    each and every time. The first challenge is to generate a list of colors given
    a group of columns in a table, rather than row data. To get all of the columns,
    there are a few options available. The first is to go back to `Production.Product`
    and use the colors from that table to fuel this query, as shown in Listing [9-9](#A371168_1_En_9_Chapter.html#Par51).


    ```

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT DISTINCT

    Product.Color

    FROM Production.Product

    WHERE Product.Color IS NOT NULL;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color) AS PRODUCTS_BY_COLOR

    UNPIVOT

    (product_quantity FOR Color IN

    ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) AS UNPIVOT_DATA;

    '';

    EXEC sp_executesql @sql_command;

    Listing 9-9.

    A Dynamic UNPIVOT Using Original Row Data to Supply Color Names

    ```


    This approach works and will provide the same output as earlier, but has a distinct
    limitation in that the color list from earlier may not apply here. If it doesn’t,
    then you need to collect column name data from the table schema itself and use
    that to power the `UNPIVOT`. This can be accomplished by querying the `sys.tables`
    and `sys.columns` system views, which provide information about the structure
    and names of the tables and columns. There are other system objects available
    that can provide similar data, such as `INFORMATION_SCHEMA.COLUMNS`, but for the
    example here, we’ll stick to the two aforementioned views, which reference data
    in `sys.objects`. This can be seen in Listing [9-10](#A371168_1_En_9_Chapter.html#Par53).


    ```

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT

    columns.name

    FROM sys.tables

    INNER JOIN sys.columns

    ON columns.object_id = tables.object_id

    WHERE tables.name = ''Products_By_Color''

    AND columns.name NOT IN (''product_name'', ''ReorderPoint'');

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color) AS PRODUCTS_BY_COLOR

    UNPIVOT

    (product_quantity FOR Color IN

    ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) AS UNPIVOT_DATA;

    '';

    EXEC sp_executesql @sql_command;

    Listing 9-10.

    A Dynamic UNPIVOT Using Schema Metadata to Supply Color Names

    ```


    Everything in this example is the same as the previous one, except for the collection
    of color data, which uses the column names for the table `dbo.Products_By_Color`
    as provided by `sys.columns`. Note that you need to provide an exceptions list
    here that includes any columns that you do not wish to `UNPIVOT`. In this example,
    there are two additional columns that are not colors and that you do not wish
    to convert into row data: `product_name` and `ReorderPoint`. If you forget these
    exceptions, you might get unexpected output or an error message such as this:


    ```

    Msg 8167, Level 16, State 1, Line 329

    The type of column "ReorderPoint" conflicts with the type of other columns specified
    in the UNPIVOT list.

    ```


    In this case, we included columns of different data types in the `UNPIVOT`. While
    the quantities listed under the color columns are all of type `INT`, `ReorderPoint`
    is a `SMALLINT` and `product_name` is `NVARCHAR(50)`. The exceptions can be hard-coded
    as you have done above, or passed in as variables into wherever the TSQL for the
    `UNPIVOT` runs from.


    ## Additional Examples


    The functionality demonstrated so far was perfect for teaching the basics of `PIVOT`
    and `UNPIVOT`, as well as integrating dynamic SQL into their usage. A very common
    real-world use of these operators is to produce accounting data that is distributed
    by month, quarter, or year in column headers. For example, what if you wanted
    to return sales data with column headings per quarter? You can integrate `PIVOT`
    into a common table expression, which allows you to set up financial data that
    you can then transform into columnar data for reporting or further analysis. This
    example can be seen in Listing [9-11](#A371168_1_En_9_Chapter.html#Par58).


    ```

    WITH CTE_SALES AS (

    SELECT

    DATEPART(QUARTER, OrderDate) AS order_quarter,

    DATEPART(YEAR, OrderDate) AS order_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR order_quarter IN ([1], [2], [3], [4])

    ) PIVOT_DATA

    ORDER BY order_year ASC;

    Listing 9-11.

    Using PIVOT to Group Sales Data by Quarter

    ```


    The result of the query in Listing [9-11](#A371168_1_En_9_Chapter.html#Par58)
    can be seen in the small result set in Figure [9-6](#A371168_1_En_9_Chapter.html#Fig6).


    ![A371168_1_En_9_Fig6_HTML.jpg](A371168_1_En_9_Fig6_HTML.jpg)


    Figure 9-6.


    Using PIVOT to obtain sales by quarter


    Each quarter is given its own column, with sales totals aggregated in each row
    below. Instances of `NULL` represent scenarios where there was no data for those
    specific time periods. You could also write the `PIVOT` to return all quarters,
    including year, as a column header, as shown in Listing [9-12](#A371168_1_En_9_Chapter.html#Par61).


    ```

    WITH CTE_SALES AS (

    SELECT

    ''Totals'' AS Totals,

    ''Q'' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''-'' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4)) AS quarter_and_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR quarter_and_year IN ([Q2-2011], [Q3-2011], [Q4-2011], [Q1-2012],[Q2-2012],
    [Q3-2012], [Q4-2012],

    [Q1-2013],[Q2-2013], [Q3-2013], [Q4-2013], [Q1-2014], [Q2-2014])

    ) PIVOT_DATA

    Listing 9-12.

    Using PIVOT to Group Sales Data by Quarter and Year in a Single Result Row

    ```


    By combining quarter and year into a single string, you can condense the data
    into a single row with one column per quarter, including the year. The column
    `Totals` is included so that you have some sort of row header, but it is not necessary
    in order to successfully retrieve the result set.


    This syntax introduces the same problem you had earlier, in that you were forced
    to hard-code a list of quarters into the TSQL. If new data is added, then the
    query will no longer be valid. Dynamic SQL can rescue you again, by allowing you
    to declare a list of quarters ahead of time and then integrate it into a command
    string that will use `PIVOT` to crunch the source data appropriately, regardless
    of the dates. This is shown in Listing [9-13](#A371168_1_En_9_Chapter.html#Par64).


    ```

    DECLARE @quarters TABLE

    (quarter_and_year NVARCHAR(7));

    INSERT INTO @quarters

    (quarter_and_year)

    SELECT DISTINCT

    ''Q'' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''-'' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4))

    FROM Sales.SalesOrderHeader

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    WITH CTE_SALES AS (

    SELECT

    ''''Totals'''' AS Totals,

    ''''Q'''' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''''-'''' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4)) AS quarter_and_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR quarter_and_year IN (''

    SELECT @sql_command = @sql_command + ''['' + quarter_and_year + ''], ''

    FROM @quarters;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    Listing 9-13.

    Dynamic PIVOT Used to Return Any Number of Quarters of Financial Data

    ```'
