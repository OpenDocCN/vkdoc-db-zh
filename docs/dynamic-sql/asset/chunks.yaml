  trans: '### 调试动态 SQL


    动态 SQL 比你编写的普通查询更需要调试。由于 SQL Server 总会成功编译动态 SQL 语句，因此在执行前对代码进行进一步测试就显得尤为重要。那些通常显而易见的简单错误，可能会因为
    SQL Server Management Studio 中缺乏反馈而被轻易忽略。此外，你的代码会部分隐藏在被引号包围的字符串中。代码越难阅读，调试和定位错误（无论是语法错误还是逻辑错误）的难度就越大。


    测试和调试动态 SQL 最简单有效的方法是将 `EXEC` 替换为 `PRINT`。当 T-SQL 被执行时，命令字符串将会被打印出来，而不是立即执行。然后，可以将打印出的内容复制到另一个编辑器窗口中，检查其语法、逻辑、拼写以及任何其他你关注的事项。许多常见的动态
    SQL 拼写错误是由于引号错放造成的，当代码被移到新窗口中时，这些问题会迅速显现。例如，考虑以下简短的命令字符串：


    ```sql

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELLECT TOP 17 * FROM Person.Person'';

    EXEC (@CMD);

    ```


    这条语句会编译成功，但会抛出以下错误：


    ```sql

    Msg 156, Level 15, State 1, Line 79

    Incorrect syntax near the keyword ''TOP''.

    ```


    产生的错误信息很隐晦，几乎没有告诉你错在哪里。将命令字符串打印出来并粘贴到编辑器窗口中，问题就变得一目了然：


    ```sql

    SELLECT TOP 17 * FROM Person.Person

    ```


    `SELECT` 明显拼写错误，除了在 SQL Server Management Studio 中会被标上红色下划线外，它也不会像通常那样被高亮显示为蓝色保留关键字。


    对于较大的 T-SQL 代码块，在代码中添加一个调试位（debug bit）非常有价值。当 `@debug` 为 `1` 时，所有语句将打印而非执行。当 `@debug`
    为 `0` 时，语句才会执行。这让你可以通过一个简单的位来轻松控制所有代码块，该位可以在代码顶部轻松配置。相比在需要调试时不断编写 `PRINT` 语句并注释掉执行语句，切换这一个位要容易得多。清单
    1-5 展示了之前备份脚本示例添加了 `debug` 参数后的样子。


    ```sql

    DECLARE @debug BIT = 1;

    DECLARE @database_list TABLE

    (database_name SYSNAME);

    INSERT INTO @database_list

    (database_name)

    SELECT

    name

    FROM sys.databases

    WHERE name LIKE ''AdventureWorks%'';

    -- 此 WHERE 子句可以调整，以备份除 "AdventureWorks" 开头之外的其他数据库。

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @database_name SYSNAME;

    DECLARE @date_string VARCHAR(17) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) +
    ''_'' + REPLACE(RIGHT(CONVERT(NVARCHAR, CURRENT_TIMESTAMP, 120), 8), '':'', '''');

    -- 使用游标逐个遍历数据库。

    DECLARE database_cursor CURSOR FOR

    SELECT database_name FROM @database_list

    OPEN database_cursor

    FETCH NEXT FROM database_cursor INTO @database_name;

    WHILE @@FETCH_STATUS = 0 -- 继续循环，直到游标到达数据库列表的末尾。

    BEGIN

    -- 自定义备份文件名，使用数据库名称以及日期和时间

    SELECT @sql_command = ''

    BACKUP DATABASE '' + @database_name + ''

    TO DISK=''''E:\SQLBackups\'' + @database_name + ''_'' + @date_string + ''.bak''''

    WITH COMPRESSION;''

    IF @debug = 1

    PRINT @sql_command

    ELSE

    EXEC (@sql_command);

    FETCH NEXT FROM database_cursor INTO @database_name;

    END

    -- 清理游标对象。

    CLOSE database_cursor;

    DEALLOCATE database_cursor;

    ```


    **清单 1-5.** 添加了调试参数的备份脚本示例


    通过添加四行 T-SQL 代码，你便能通过一个位来控制执行。将打印输出复制到新窗口并检查，你可以快速确认它是否编译成功并看起来正确。


    此外，如果问题的根源不明确，你可以在代码中添加 `PRINT` 语句来输出一些变量值。例如，如果不确定 `@date_string` 是否被正确填充，你可以单独打印它并验证其值是否符合预期：


    ```sql

    PRINT ''@date_string (line 20): '' + @date_string

    ```


    这是一个非常简单的调试操作，但通过包含变量名和行号，你使代码更易于理解。如果结果仍然令人困惑，你可以进一步拆分结果，分别打印变量的日期和时间部分。通过将问题分解成更小、更简单的部分，调试任务变得容易得多，整个过程中的挫败感也会大大减少。


    在编写新的动态 SQL 时，请务必经常打印命令字符串，验证生成的 T-SQL 在语法和逻辑上都是有效的。


    最后，对于任何需要从其他应用程序（或最终用户）接收输入的代码，请记住测试所有可能性。确保应用程序或 T-SQL 根据需要检查和验证输入。如果输入包含特殊字符会怎样？如果包含撇号、下划线或转义字符呢？如果允许手动输入文本，请假设他们会犯错、输入垃圾数据、空格、特殊字符，或者以某种方式做出意外行为。考虑到这些情况，你将能预防无数潜在的错误，并极大提升应用程序的安全性。


    ### 像编写标准 T-SQL 一样编写动态 SQL


    动态 SQL 被包裹在字符串中，并不意味着它的写法应该与你通常的语句有所不同。无论你通常的大小写、缩进和空格标准是什么，这里都应同样适用。动态 SQL 语句常常被写成一长串代码，没有空格、换行、大小写或断行。结果往往是难以理解，并且更容易出错。如果你将
    `PRINT` 语句中的调试文本复制到一个新窗口，其结果应该看起来完全就像你通常编写的 T-SQL。


    ```sql

    DECLARE @CMD NVARCHAR(MAX) = ''''; -- 这将保存最终要执行的 SQL

    DECLARE @first_name NVARCHAR(50) = ''Edward''; -- 在搜索框中输入的名字

    SET @CMD = ''SELECT PERSON.FirstName,PERSON.LastName,PHONE.PhoneNumber,PTYPE.Name
    FROM Person.Person PERSON INNER JOIN Person.PersonPhone PHONE ON PERSON.BusinessEntityID
    = PHONE.BusinessEntityID INNER JOIN Person.PhoneNumberType PTYPE ON PHONE.PhoneNumberTypeID
    = PTYPE.PhoneNumberTypeID WHERE PERSON.FirstName = '''''' + @first_name + '''''''';

    PRINT @CMD;

    EXEC (@CMD);

    ```


    **清单 1-6.** 如何用格式糟糕的动态 SQL 惹恼未来开发者的示例'
- fmt: '## String Sizes and Truncation


    When you attempt to store a string in a variable that is not large enough to hold
    it, the string will be automatically truncated. The result will be incomplete
    data that will likely cause headaches later on in your code. Consider the following
    T-SQL, which generates a timestamp and stores it in a string.


    ```sql

    DECLARE @date_string VARCHAR(10) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) +
    ''_'' + REPLACE(RIGHT(CONVERT(NVARCHAR, CURRENT_TIMESTAMP, 120), 8), '':'', '''');

    PRINT @date_string;

    ```


    Listing 1-7. Example of Truncation when Generating a Timestamp String


    You expect a timestamp with the date (MMDDYYYY) and time (HHMMSS). What you instead
    get is a string that is cut off at 10 characters: `20150908_1`. Always declare
    variables that are large enough to hold any valid data that could be stored there.
    If you are unsure of the potential data size, erring on the side of caution and
    providing extra characters is not a bad decision. Seventeen characters are required
    to get the full text output expected in this example. What if you were considering
    adding milliseconds to the timestamp, but were not going to do so until a future
    software release? Make the `@date_string` larger now, and there will be no need
    to make further changes in order to account for that change. The cost is tiny,
    and the potential for errors in the future are reduced.


    A more complex example of string truncation can occur when Dynamic SQL gets very,
    very large. If you write a command string that is greater than 8192 characters
    and are concatenating it with other strings (names, dates, input parameters, other
    Dynamic SQL strings, etc…), there is an implicit, undocumented risk of truncation.
    SQL Server will implicitly convert strings of different data types and sizes in
    an attempt to process them quickly and efficiently. The result will be a `NVARCHAR(MAX)`
    command string that seems to be truncated down to 8192 characters when executed.
    This truncation can be resolved in one of two ways:


    Split the Dynamic SQL statement into multiple statements, each less than 8192
    characters.

    Change all parameters and variables involved in the command string to `NVARCHAR(MAX)`.


    The first option can be difficult to guarantee. How do you split an extremely
    long command into pieces that are guaranteed to always be 8192 characters or less?
    The second option will always work when faced with this conundrum, and is an easy,
    inexpensive fix.


    When working with very large Dynamic SQL, consider using `NVARCHAR(MAX)` for all
    scalar parameters involved in the construction of the command string to avoid
    inadvertent string truncation.


    ## Management Studio Text Display


    An unrelated, but somewhat similar, problem can occur when you print output directly
    to the text window. You will do this frequently, either to debug new T-SQL or
    to manually execute Dynamic SQL that you have generated. By default, the text
    limit in the output window of SQL Server Management Studio is set to 256 characters.
    Any text printed from any SQL statements will be truncated at 256 characters,
    which will often be inconvenient.


    This limit only affects output that you print to the results window and has no
    bearing on the string sizes when you execute a command string. The text limit
    has no effect on actual query execution. For the sake of debugging, it is advantageous
    to modify your SQL editor options to increase this limit to 8192 characters.


    This setting can be found by navigating to `Tools` ➤ `Options` ➤ `Query Results`
    ➤ `SQL Server` ➤ `Results to Text` and modifying the maximum number of characters
    displayed in each column. See Figure 1-1 for an example.


    ![A371168_1_En_1_Fig1_HTML.jpg](A371168_1_En_1_Fig1_HTML.jpg)

    Figure 1-1. Results to Text settings in SQL Server Management Studio


    Change 256 to 8192 and you’ll have an easier time printing and debugging larger
    Dynamic SQL statements in the future.


    ## Sp_executesql


    Thus far, all Dynamic SQL statements have been executed using the `EXEC` keyword.
    This method of execution is simple, straightforward, and convenient for quick
    testing and debugging. Unfortunately, `EXEC` comes with a number of limitations
    and security concerns that encourage a better solution:


    - `EXEC` is vulnerable to SQL injection and the effects of unexpected input. Escape
    characters and apostrophes can easily wreck a Dynamic SQL statement.

    - There is no built-in way to manage input or output variables with `EXEC`.

    - When using `EXEC`, it is unlikely that execution plans will be reused. This
    reuse of execution plans, known as parameter sniffing, is a useful feature and
    generally something you’ll want to occur.


    Each of these topics is covered in extensive detail later in this book and can
    be addressed using the system stored procedure `sp_executesql`, instead of `EXEC`.


    The syntax for `sp_executesql` is straightforward:


    ```sql

    sp_executesql N''SELECT COUNT(*) FROM Person.Person'';

    ```


    Whatever T-SQL is provided in the string will be executed in the same way as the
    previous examples. The more common (and more useful) syntax is to store the command
    string in a variable and use `EXEC` in front of `sp_executesql`:


    ```sql

    DECLARE @sql_command NVARCHAR(MAX) = ''SELECT COUNT(*) FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    ```


    All examples going forward use `sp_executesql` instead of `EXEC`. This is considered
    a best practice in SQL Server, and one that will improve the reliability, security,
    and performance of your Dynamic SQL.


    In the world of databases, we rarely use the words “always” or “never”. Oftentimes,
    the answer to a question is “it depends,” followed by quite a bit of discussion.
    This is one of those rare scenarios where “always” is the best answer. When writing
    Dynamic SQL, always use `sp_executesql` and never use `EXEC`. The benefits far
    outweigh any inconvenience that you may face from using this new stored procedure.'
  raw: '### String Sizes and Truncation


    When you attempt to store a string in a variable that is not large enough to hold
    it, the string will be automatically truncated. The result will be incomplete
    data that will likely cause headaches later on in your code. Consider the following
    TSQL, which generates a timestamp and stores it in a string.


    ```

    DECLARE @date_string VARCHAR(10) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) +
    ''_'' + REPLACE(RIGHT(CONVERT(NVARCHAR, CURRENT_TIMESTAMP, 120), 8), '':'', '''');

    PRINT @date_string;

    Listing 1-7.

    Example of Truncation when Generating a Timestamp String

    ```


    You expect a timestamp with the date (MMDDYYYY) and time (HHMMSS). What you instead
    get is a string that is cut off at 10 characters: `20150908_1`. Always declare
    variables that are large enough to hold any valid data that could be stored there.
    If you are unsure of the potential data size, erring on the side of caution and
    providing extra characters is not a bad decision. Seventeen characters are required
    to get the full text output expected in this example. What if you were considering
    adding milliseconds to the timestamp, but were not going to do so until a future
    software release? Make the `@date_string` larger now, and there will be no need
    to make further changes in order to account for that change. The cost is tiny,
    and the potential for errors in the future are reduced.


    A more complex example of string truncation can occur when Dynamic SQL gets very,
    very large. If you write a command string that is greater than 8192 characters
    and are concatenating it with other strings (names, dates, input parameters, other
    Dynamic SQL strings, etc…), there is an implicit, undocumented risk of truncation.
    SQL Server will implicitly convert strings of different data types and sizes in
    an attempt to process them quickly and efficiently. The result will be a `NVARCHAR(MAX)`
    command string that seems to be truncated down to 8192 characters when executed.
    This truncation can be resolved in one of two ways:


    Split the Dynamic SQL statement into multiple statements, each less than 8192
    characters.   Change all parameters and variables involved in the command string
    to `NVARCHAR(MAX)`.  


    The first option can be difficult to guarantee. How do you split an extremely
    long command into pieces that are guaranteed to always be 8192 characters or less?
    The second option will always work when faced with this conundrum, and is an easy,
    inexpensive fix.


    When working with very large Dynamic SQL, consider using `NVARCHAR(MAX)` for all
    scalar parameters involved in the construction of the command string to avoid
    inadvertent string truncation.


    ### Management Studio Text Display


    An unrelated, but somewhat similar, problem can occur when you print output directly
    to the text window. You will do this frequently, either to debug new TSQL or to
    manually execute Dynamic SQL that you have generated. By default, the text limit
    in the output window of SQL Server Management Studio is set to 256 characters.
    Any text printed from any SQL statements will be truncated at 256 characters,
    which will often be inconvenient.


    This limit only affects output that you print to the results window and has no
    bearing on the string sizes when you execute a command string. The text limit
    has no effect on actual query execution. For the sake of debugging, it is advantageous
    to modify your SQL editor options to increase this limit to 8192 characters.


    This setting can be found by navigating to Tools ➤ Options ➤ Query Results ➤ SQL
    Server ➤ Results to Text and modifying the maximum number of characters displayed
    in each column. See Figure [1-1](#A371168_1_En_1_Chapter.html#Fig1) for an example.


    ![A371168_1_En_1_Fig1_HTML.jpg](A371168_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    Results to Text settings in SQL Server Management Studio


    Change 256 to 8192 and you’ll have an easier time printing and debugging larger
    Dynamic SQL statements in the future.


    ### Sp_executesql


    Thus far, all Dynamic SQL statements have been executed using the `EXEC` keyword.
    This method of execution is simple, straightforward, and convenient for quick
    testing and debugging. Unfortunately, `EXEC` comes with a number of limitations
    and security concerns that encourage a better solution:


    *   `EXEC` is vulnerable to SQL injection and the effects of unexpected input.
    Escape characters and apostrophes can easily wreck a Dynamic SQL statement.

    *   There is no built-in way to manage input or output variables with `EXEC`.

    *   When using `EXEC`, it is unlikely that execution plans will be reused. This
    reuse of execution plans, known as parameter sniffing, is a useful feature and
    generally something you’ll want to occur.


    Each of these topics is covered in extensive detail later in this book and can
    be addressed using the system stored procedure `sp_executesql`, instead of `EXEC`.


    The syntax for `sp_executesql` is straightforward:


    ```

    sp_executesql N''SELECT COUNT(*) FROM Person.Person'';

    ```


    Whatever TSQL is provided in the string will be executed in the same way as the
    previous examples. The more common (and more useful) syntax is to store the command
    string in a variable and use `EXEC` in front of `sp_executesql`:


    ```

    DECLARE @sql_command NVARCHAR(MAX) = ''SELECT COUNT(*) FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    ```


    All examples going forward use `sp_executesql` instead of `EXEC`. This is considered
    a best practice in SQL Server, and one that will improve the reliability, security,
    and performance of your Dynamic SQL.


    In the world of databases, we rarely use the words “always” or “never”. Oftentimes,
    the answer to a question is “it depends,” followed by quite a bit of discussion.
    This is one of those rare scenarios where “always” is the best answer. When writing
    Dynamic SQL, always use `sp_executesql` and never use `EXEC`. The benefits far
    outweigh any inconvenience that you may face from using this new stored procedure.'
  trans: '## 字符串大小与截断


    当你尝试将字符串存储到一个不足以容纳它的变量中时，字符串会被自动截断。结果将是不完整的数据，这很可能在你后续的代码中引发麻烦。考虑以下 T-SQL 代码，它生成一个时间戳并将其存储在一个字符串中。


    ```sql

    DECLARE @date_string VARCHAR(10) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) +
    ''_'' + REPLACE(RIGHT(CONVERT(NVARCHAR, CURRENT_TIMESTAMP, 120), 8), '':'', '''');

    PRINT @date_string;

    ```


    代码清单 1-7. 生成时间戳字符串时发生截断的示例


    你期望得到一个包含日期 (MMDDYYYY) 和时间 (HHMMSS) 的时间戳。然而，你实际得到的是一个被截断到 10 个字符的字符串：`20150908_1`。请始终声明足够大的变量，以容纳可能存储在其中的任何有效数据。如果你不确定潜在的数据大小，宁可谨慎一些，提供额外的字符空间，这并非坏主意。要得到本例中预期的完整文本输出，需要
    17 个字符。如果你正在考虑未来软件版本中才向时间戳添加毫秒呢？现在就将 `@date_string` 声明得更大一些，这样未来就无需为了适应这一改动而进行更多修改。其成本微乎其微，却能减少未来出错的可能性。


    字符串截断的一个更复杂的例子可能发生在动态 SQL 变得非常、非常大的时候。如果你编写了一个超过 8192 个字符的命令字符串，并且正在将其与其他字符串（名称、日期、输入参数、其他动态
    SQL 字符串等）拼接，那么就存在一种隐含的、未记录的截断风险。SQL Server 会隐式转换不同数据类型和大小的字符串，以尝试快速高效地处理它们。结果将是一个
    `NVARCHAR(MAX)` 类型的命令字符串，在执行时似乎被截断到了 8192 个字符。可以通过以下两种方式之一来解决此截断问题：


    1.  将动态 SQL 语句拆分为多个语句，每个语句少于 8192 个字符。

    2.  将命令字符串中涉及的所有参数和变量更改为 `NVARCHAR(MAX)`。


    第一种选项很难保证。你如何将一个极长的命令拆分成保证始终为 8192 个字符或更少的片段？当面临这个难题时，第二种选项总是有效，并且是一个简单、成本低的修复方法。


    在处理非常大的动态 SQL 时，考虑对构建命令字符串涉及的所有标量参数使用 `NVARCHAR(MAX)`，以避免无意中的字符串截断。


    ## Management Studio 文本显示


    一个不相关但有些类似的问题可能在你直接将输出打印到文本窗口时发生。你会经常这样做，无论是调试新的 T-SQL 还是手动执行你生成的动态 SQL。默认情况下，SQL
    Server Management Studio 输出窗口中的文本限制设置为 256 个字符。任何从任何 SQL 语句打印出的文本都会被截断到 256 个字符，这常常会带来不便。


    此限制仅影响你打印到结果窗口的输出，与你执行命令字符串时的字符串大小无关。文本限制对实际的查询执行没有影响。为了调试，修改 SQL 编辑器选项以将此限制增加到
    8192 个字符是有利的。


    此设置可以通过导航到 `工具` ➤ `选项` ➤ `查询结果` ➤ `SQL Server` ➤ `结果到文本` 并修改每列显示的最大字符数来找到。参见图
    1-1 的示例。


    ![A371168_1_En_1_Fig1_HTML.jpg](img/A371168_1_En_1_Fig1_HTML.jpg)

    图 1-1. SQL Server Management Studio 中的“结果到文本”设置


    将 256 改为 8192，将来打印和调试更大的动态 SQL 语句就会更容易。


    ## sp_executesql


    到目前为止，所有的动态 SQL 语句都是使用 `EXEC` 关键字执行的。这种执行方式简单、直接，便于快速测试和调试。不幸的是，`EXEC` 存在一些限制和安全问题，这促使我们寻求更好的解决方案：


    -   `EXEC` 容易受到 SQL 注入和意外输入的影响。转义字符和撇号很容易破坏动态 SQL 语句。

    -   使用 `EXEC` 没有内置的方法来管理输入或输出变量。

    -   使用 `EXEC` 时，执行计划不太可能被重用。这种执行计划的重用，称为“参数探测”，是一个有用的功能，通常也是你希望发生的。


    本书后面将详细讨论这些主题中的每一个，并且可以使用系统存储过程 `sp_executesql` 而不是 `EXEC` 来解决。


    `sp_executesql` 的语法很简单：


    ```sql

    sp_executesql N''SELECT COUNT(*) FROM Person.Person'';

    ```


    字符串中提供的任何 T-SQL 都将像前面的例子一样执行。更常见（也更有用）的语法是将命令字符串存储在变量中，并在 `sp_executesql` 前使用
    `EXEC`：


    ```sql

    DECLARE @sql_command NVARCHAR(MAX) = ''SELECT COUNT(*) FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    ```


    从现在开始，所有示例都将使用 `sp_executesql` 而不是 `EXEC`。这被认为是 SQL Server 中的最佳实践，并将提高动态 SQL 的可靠性、安全性和性能。


    在数据库领域，我们很少使用“总是”或“永不”这样的词。通常，问题的答案是“视情况而定”，接着会是相当多的讨论。但这是罕见的“总是”是最佳答案的场景之一。编写动态
    SQL 时，**总是**使用 `sp_executesql`，**永不**使用 `EXEC`。其好处远远超过你使用这个新存储过程可能面临的任何不便。'
- fmt: "### Building Strings via Concatenation\n\nThere are two straightforward ways\
    \ to combine strings in T-SQL. The first is to use the `+` operator, which has\
    \ been the method used thus far in this book. This is simple, easy and quick to\
    \ implement, and intuitive.\n\nRemember the brief introduction to how `NULL` can\
    \ break strings? When piecing many strings together, if any one of them happens\
    \ to be `NULL`, then the entire string output will become `NULL` as well. `NULL\
    \ + 1` is treated by SQL Server in a similar manner that infinity + 1 is handled\
    \ by mathematics. You can combat this by using `ISNULL` or `COALESCE`, or by performing\
    \ an explicit check of the variable for `NULL` and replacing it as needed. Consider\
    \ the following Dynamic SQL queries.\n\n```sql\nDECLARE @schema VARCHAR(25) =\
    \ NULL;\nDECLARE @table VARCHAR(25) = 'Person';\nDECLARE @sql_command VARCHAR(MAX);\n\
    \nSELECT @sql_command = 'SELECT COUNT(*) ' + 'FROM ' + @schema + '.' + @table;\n\
    PRINT @sql_command;\n\nSELECT @sql_command = 'SELECT COUNT(*) ' + 'FROM ' + ISNULL(@schema,\
    \ 'Person') + '.' + @table;\nPRINT @sql_command;\n\nSELECT @sql_command = 'SELECT\
    \ COUNT(*) ' + 'FROM ' + CASE WHEN @schema IS NULL THEN 'Person' ELSE @schema\
    \ END + '.' + @table;\nPRINT @sql_command;\n```\n\nListing 1-8. Examples of String\
    \ Concatenation Results when a Parameter Is `NULL`\n\nThe first query returns\
    \ `NULL`. Since `@schema` is `NULL`, anything you concatenate with it will also\
    \ become `NULL`. This will generally be undesired behavior, and you would immediately\
    \ be confounded by a command string that does nothing or generates errors when\
    \ executing.\n\nThe second query uses `ISNULL` to ensure that, if `@schema` is\
    \ `NULL`, something will be returned in place of it. In this case, the `Person`\
    \ schema is hard-coded there, which produced the same results as before. This\
    \ required assumptions, though. In the event that you do not have a default value,\
    \ you may be better served by throwing an error, rather than making up a value\
    \ that may not be accurate. Alternatively, you could simply never allow `@schema`\
    \ to be `NULL`, and exit immediately if it is.\n\nThe third query uses a `CASE`\
    \ statement to replace `NULL` with the `Person` schema. This is the same result\
    \ as the last query, although `CASE` provides some additional flexibility that\
    \ you could utilize. If necessary, you could alter the structure of the query\
    \ to account for missing variables, or have multiple code paths.\n\nThere is a\
    \ second way to concatenate strings that can be beneficial under circumstances\
    \ where the data types and values of the data are unpredictable. The built-in\
    \ function `CONCAT` allows you to combine strings using the following syntax:\n\
    \n```sql\nSELECT CONCAT ('SELECT COUNT(*) ', 'FROM ', 'Person.', 'Person');\n\
    ```\n\nVariables may be passed into this function as parameters as well:\n\n```sql\n\
    DECLARE @schema NVARCHAR(25) = 'Person';\nDECLARE @table NVARCHAR(25) = 'Person';\n\
    DECLARE @sql_command NVARCHAR(MAX);\n\nSELECT @sql_command = CONCAT ('SELECT COUNT(*)\
    \ ', 'FROM ', @schema, '.', @table);\nPRINT @sql_command;\n```\n\nThe results\
    \ of both of these SQL statements will be the same:\n\n```\nSELECT COUNT(*) FROM\
    \ Person.Person\n```\n\n`CONCAT` offers several features:\n\n`NULL` parameters\
    \ are always converted into empty strings.\nThe data type of the result is intelligently\
    \ determined based on the inputs. `NVARCHAR` parameters will yield `NVARCHAR`\
    \ results, `VARCHAR` will yield `VARCHAR`, and `MAX` inputs will yield an output\
    \ of `MAX` size.\nIf all inputs are `NULL`, then the output will be an empty string\
    \ of type `VARCHAR(1)`.\nIt will attempt to convert different data types in the\
    \ process of concatenation. This can be desirable with strings, but problematic\
    \ when concatenating text and numeric. Adding a `CAST` or `CONVERT` to manage\
    \ this will remove any doubts as to the accuracy of results.\n\nRemoving `NULL`\
    \ may not be desired behavior, though! Oftentimes, if a parameter is unintentionally\
    \ `NULL`, you may very well prefer that an error be thrown by the code than continue\
    \ processing with dummy values. Utilize this feature only if removing `NULL`s\
    \ is advantageous to your application.\n\n## Useful String Functions\n\n`CONCAT`\
    \ is a viable alternative to using the `+` operator. There are many other SQL\
    \ Server string-manipulation functions that are useful when generating Dynamic\
    \ SQL. We’ll continue to use `+` for the duration of this book, but it’s worth\
    \ the time to quickly review a handful of useful string functions that may prove\
    \ convenient:\n\n*   `LTRIM`, `RTRIM`: Removes any whitespace on the left (`LTRIM`)\
    \ or right (`RTRIM`) of an expression. This can be useful when dealing with unpredictable\
    \ inputs, or those that often have extra whitespaces attached to them:\n\n   \
    \ ```sql\n    DECLARE @string NVARCHAR(MAX) = '  This is a string with extra whitespaces\
    \   ';\n    SELECT @string;\n    SELECT LTRIM(@string);\n    SELECT RTRIM(@string);\n\
    \    ```\n\n    The above T-SQL returns the following:\n\n    ```\n    \"   This\
    \ is a string with extra whitespaces   \"\n    \"This is a string with extra whitespaces\
    \   \"\n    \"   This is a string with extra whitespaces\"\n    ```\n\n*   `CHARINDEX`:\
    \ This will return the first instance of a search expression within a string.\
    \ For example, if you wanted to return the first instance of `dinosaur` in a string,\
    \ then this would do the trick:\n\n    ```sql\n    DECLARE @string NVARCHAR(MAX)\
    \ = 'The stegosaurus is my favorite dinosaur';\n    SELECT CHARINDEX('dinosaur',\
    \ @string);\n    ```\n\n    The result of this query would be 32, the starting\
    \ character of the word `dinosaur`. An optional third parameter can specify where\
    \ in the string to begin looking for the search string. `CHARINDEX` returns `0`\
    \ if the search string isn’t found.\n\n*   `STUFF`: Allows you to insert a string\
    \ into the middle of another string and optionally delete characters from the\
    \ insertion point. This has many uses, and can be a convenient way to combine\
    \ SQL statements, text output, or input parameters in desired combinations. Here\
    \ are a few examples of how to use `STUFF`:\n\n    ```sql\n    DECLARE @string\
    \ NVARCHAR(MAX) = 'The stegosaurus is my favorite dinosaur';\n    SELECT STUFF(@string,\
    \ 5, 0, 'purple ');\n    SELECT STUFF(@string, 5, 11, 't-rex');\n    SELECT STUFF(@string,\
    \ 32, 8, 'animal!');\n    ```\n\n    The first parameter is the text to be modified\
    \ and the last is the string that is being inserted. The second is the insert\
    \ point (what character position number within the string to insert into). The\
    \ third parameter indicates how many characters will be deleted prior to the insertion\
    \ (enter `0` if you don’t want to delete any characters). The results of these\
    \ queries are as follows:\n\n    ```\n    \"The purple stegosaurus is my favorite\
    \ dinosaur\"\n    \"The t-rex is my favorite dinosaur\"\n    \"The stegosaurus\
    \ is my favorite animal!\"\n    ```\n\n*   `REPLACE`: Within a string, this will\
    \ replace all occurrences of a text pattern with another. This is often useful\
    \ for removing specific characters from a string, or for replacing undesirable\
    \ parts of input strings with a standard or consistent segment of text. The behavior\
    \ of `REPLACE` and `STUFF` can be very similar, so you can choose whichever is\
    \ convenient for the task at hand:\n\n    ```sql\n    DECLARE @string NVARCHAR(MAX)\
    \ = CAST(CURRENT_TIMESTAMP AS NVARCHAR);\n    SELECT REPLACE(@string, ' ', '');\n\
    \    SELECT REPLACE(REPLACE(@string, ' ', ''), ':', '');\n    SELECT REPLACE(REPLACE(REPLACE(REPLACE(@string,\
    \ ' ', ''), ':', ''), 'AM', ''), 'PM', '');\n    ```"
  raw: "### Building Strings via Concatenation\n\nThere are two straightforward ways\
    \ to combine strings in TSQL. The first is to use the `+` operator, which has\
    \ been the method used thus far in this book. This is simple, easy and quick to\
    \ implement, and intuitive.\n\nRemember the brief introduction to how `NULL` can\
    \ break strings? When piecing many strings together, if any one of them happens\
    \ to be `NULL`, then the entire string output will become `NULL` as well. `NULL\
    \ + 1` is treated by SQL Server in a similar manner that infinity + 1 is handled\
    \ by mathematics. You can combat this by using `ISNULL` or `COALESCE`, or by performing\
    \ an explicit check of the variable for `NULL` and replacing it as needed. Consider\
    \ the following Dynamic SQL queries.\n\n```\nDECLARE @schema VARCHAR(25) = NULL;\n\
    DECLARE @table VARCHAR(25) = 'Person';\nDECLARE @sql_command VARCHAR(MAX);\nSELECT\
    \ @sql_command = 'SELECT COUNT(*) ' + 'FROM ' + @schema + '.' + @table;\nPRINT\
    \ @sql_command;\nSELECT @sql_command = 'SELECT COUNT(*) ' + 'FROM ' + ISNULL(@schema,\
    \ 'Person') + '.' + @table;\nPRINT @sql_command;\nSELECT @sql_command = 'SELECT\
    \ COUNT(*) ' + 'FROM ' + CASE WHEN @schema IS NULL THEN 'Person' ELSE @schema\
    \ END + '.' + @table;\nPRINT @sql_command;\nListing 1-8.\nExamples of String Concatenation\
    \ Results when a Parameter Is NULL\n```\n\nThe first query returns `NULL`. Since\
    \ `@schema` is `NULL`, anything you concatenate with it will also become `NULL`.\
    \ This will generally be undesired behavior, and you would immediately be confounded\
    \ by a command string that does nothing or generates errors when executing.\n\n\
    The second query uses `ISNULL` to ensure that, if `@schema` is `NULL`, something\
    \ will be returned in place of it. In this case, the `Person` schema is hard-coded\
    \ there, which produced the same results as before. This required assumptions,\
    \ though. In the event that you do not have a default value, you may be better\
    \ served by throwing an error, rather than making up a value that may not be accurate.\
    \ Alternatively, you could simply never allow `@schema` to be `NULL`, and exit\
    \ immediately if it is.\n\nThe third query uses a `CASE` statement to replace\
    \ `NULL` with the `Person` schema. This is the same result as the last query,\
    \ although `CASE` provides some additional flexibility that you could utilize.\
    \ If necessary, you could alter the structure of the query to account for missing\
    \ variables, or have multiple code paths.\n\nThere is a second way to concatenate\
    \ strings that can be beneficial under circumstances where the data types and\
    \ values of the data are unpredictable. The built-in function `CONCAT` allows\
    \ you to combine strings using the following syntax:\n\n```\nSELECT CONCAT ('SELECT\
    \ COUNT(*) ', 'FROM ', 'Person.', 'Person');\n```\n\nVariables may be passed into\
    \ this function as parameters as well:\n\n```\nDECLARE @schema NVARCHAR(25) =\
    \ 'Person';\nDECLARE @table NVARCHAR(25)= 'Person';\nDECLARE @sql_command NVARCHAR(MAX);\n\
    SELECT @sql_command = CONCAT ('SELECT COUNT(*) ', 'FROM ', @schema, '.', @table);\n\
    PRINT @sql_command\n```\n\nThe results of both of these SQL statements will be\
    \ the same:\n\n```\nSELECT COUNT(*) FROM Person.Person\n```\n\n`CONCAT` offers\
    \ several features:\n\n`NULL` parameters are always converted into empty strings.\
    \   The data type of the result is intelligently determined based on the inputs.\
    \ `NVARCHAR` parameters will yield `NVARCHAR` results, `VARCHAR` will yield `VARCHAR`,\
    \ and `MAX` inputs will yield an output of `MAX` size.   If all inputs are `NULL`,\
    \ then the output will be an empty string of type `VARCHAR(1)`.   It will attempt\
    \ to convert different data types in the process of concatenation. This can be\
    \ desirable with strings, but problematic when concatenating text and numeric.\
    \ Adding a `CAST` or `CONVERT` to manage this will remove any doubts as to the\
    \ accuracy of results.\n\nRemoving `NULL` may not be desired behavior, though!\
    \ Oftentimes, if a parameter is unintentionally `NULL`, you may very well prefer\
    \ that an error be thrown by the code than continue processing with dummy values.\
    \ Utilize this feature only if removing `NULL`s is advantageous to your application.\n\
    \n`CONCAT` is a viable alternative to using the `+` operator. There are many other\
    \ SQL Server string-manipulation functions that are useful when generating Dynamic\
    \ SQL. We’ll continue to use `+` for the duration of this book, but it’s worth\
    \ the time to quickly review a handful of useful string functions that may prove\
    \ convenient:\n\n*   `LTRIM, RTRIM`: Removes any whitespace on the left (`LTRIM`)\
    \ or right (`RTRIM`) of an expression. This can be useful when dealing with unpredictable\
    \ inputs, or those that often have extra whitespaces attached to them:\n\n```\n\
    \    DECLARE @string NVARCHAR(MAX) = '  This is a string with extra whitespaces\
    \   ';\n    SELECT @string;\n    SELECT LTRIM(@string);\n    SELECT RTRIM(@string);\n\
    \    ```\n\n*   The above TSQL returns the following:\n\n```\n    \"   This is\
    \ a string with extra whitespaces   \"\n    \"This is a string with extra whitespaces\
    \   \"\n    \"   This is a string with extra whitespaces\"\n    ```\n\n*   `CHARINDEX`:\
    \ This will return the first instance of a search expression within a string.\
    \ For example, if you wanted to return the first instance of `dinosaur` in a string,\
    \ then this would do the trick:\n\n```\n    DECLARE @string NVARCHAR(MAX) = 'The\
    \ stegosaurus is my favorite dinosaur';\n    SELECT CHARINDEX('dinosaur', @string);\n\
    \    ```\n\n*   The result of this query would be 32, the starting character of\
    \ the word `dinosaur`. An optional third parameter can specify where in the string\
    \ to begin looking for the search string. `CHARINDEX` returns `0` if the search\
    \ string isn’t found.\n*   `STUFF`: Allows you to insert a string into the middle\
    \ of another string and optionally delete characters from the insertion point.\
    \ This has many uses, and can be a convenient way to combine SQL statements, text\
    \ output, or input parameters in desired combinations. Here are a few examples\
    \ of how to use `STUFF`:\n\n```\n    DECLARE @string NVARCHAR(MAX) = 'The stegosaurus\
    \ is my favorite dinosaur';\n    SELECT STUFF(@string, 5, 0, 'purple ');\n   \
    \ SELECT STUFF(@string, 5, 11, 't-rex');\n    SELECT STUFF(@string, 32, 8, 'animal!');\n\
    \    ```\n\n*   The first parameter is the text to be modified and the last is\
    \ the string that is being inserted. The second is the insert point (what character\
    \ position number within the string to insert into). The third parameter indicates\
    \ how many characters will be deleted prior to the insertion (enter `0` if you\
    \ don’t want to delete any characters). The results of these queries are as follows:\n\
    \n```\n    \"The purple stegosaurus is my favorite dinosaur\"\n    \"The t-rex\
    \ is my favorite dinosaur\"\n    \"The stegosaurus is my favorite animal!\"\n\
    \    ```\n\n*   `REPLACE`: Within a string, this will replace all occurrences\
    \ of a text pattern with another. This is often useful for removing specific characters\
    \ from a string, or for replacing undesirable parts of input strings with a standard\
    \ or consistent segment of text. The behavior of `REPLACE` and `STUFF` can be\
    \ very similar, so you can choose whichever is convenient for the task at hand:\n\
    \n```\n    DECLARE @string NVARCHAR(MAX) = CAST(CURRENT_TIMESTAMP AS NVARCHAR);\n\
    \    SELECT REPLACE(@string, ' ', '');\n    SELECT REPLACE(REPLACE(@string, '\
    \ ', ''), ':', '');\n    SELECT REPLACE(REPLACE(REPLACE(REPLACE(@string, ' ',\
    \ ''), ':', ''), 'AM', ''), 'PM', '');\n    ```"
  trans: "### 通过拼接构建字符串\n\n在 T-SQL 中，有两种直接的方法来组合字符串。第一种是使用 `+` 运算符，这也是本书至今所用的方法。它简单、易于快速实现且直观。\n\
    \n还记得关于 `NULL` 如何破坏字符串的简要介绍吗？当将多个字符串拼接在一起时，如果其中任何一个碰巧是 `NULL`，那么整个字符串输出也将变为 `NULL`。`NULL\
    \ + 1` 被 SQL Server 处理的方式，类似于数学中处理无穷大 + 1 的方式。你可以通过使用 `ISNULL` 或 `COALESCE`，或者通过显式检查变量是否为\
    \ `NULL` 并在需要时替换它来应对这种情况。考虑以下动态 SQL 查询。\n\n```sql\nDECLARE @schema VARCHAR(25)\
    \ = NULL;\nDECLARE @table VARCHAR(25) = 'Person';\nDECLARE @sql_command VARCHAR(MAX);\n\
    \nSELECT @sql_command = 'SELECT COUNT(*) ' + 'FROM ' + @schema + '.' + @table;\n\
    PRINT @sql_command;\n\nSELECT @sql_command = 'SELECT COUNT(*) ' + 'FROM ' + ISNULL(@schema,\
    \ 'Person') + '.' + @table;\nPRINT @sql_command;\n\nSELECT @sql_command = 'SELECT\
    \ COUNT(*) ' + 'FROM ' + CASE WHEN @schema IS NULL THEN 'Person' ELSE @schema\
    \ END + '.' + @table;\nPRINT @sql_command;\n```\n\n**代码清单 1-8. 当参数为 `NULL` 时的字符串拼接结果示例**\n\
    \n第一个查询返回 `NULL`。因为 `@schema` 是 `NULL`，任何与它拼接的内容也将变为 `NULL`。这通常是不期望的行为，你会立即被一个不起作用或执行时产生错误的命令字符串所困惑。\n\
    \n第二个查询使用 `ISNULL` 来确保，如果 `@schema` 是 `NULL`，则会返回某个值来替代它。这里，`Person` 架构是硬编码的，产生了与之前相同的结果。但这需要假设。如果你没有默认值，抛出错误可能比编造一个可能不准确的值更合适。或者，你可以简单地不允许\
    \ `@schema` 为 `NULL`，如果是 `NULL` 则立即退出。\n\n第三个查询使用 `CASE` 语句将 `NULL` 替换为 `Person`\
    \ 架构。这与上一个查询的结果相同，尽管 `CASE` 提供了一些你可以利用的额外灵活性。如有必要，你可以更改查询结构以处理缺失的变量，或拥有多条代码路径。\n\
    \n在数据类型和值不可预测的情况下，有第二种拼接字符串的方法可能很有益。内置函数 `CONCAT` 允许你使用以下语法组合字符串：\n\n```sql\n\
    SELECT CONCAT ('SELECT COUNT(*) ', 'FROM ', 'Person.', 'Person');\n```\n\n变量也可以作为参数传递给此函数：\n\
    \n```sql\nDECLARE @schema NVARCHAR(25) = 'Person';\nDECLARE @table NVARCHAR(25)\
    \ = 'Person';\nDECLARE @sql_command NVARCHAR(MAX);\n\nSELECT @sql_command = CONCAT\
    \ ('SELECT COUNT(*) ', 'FROM ', @schema, '.', @table);\nPRINT @sql_command;\n\
    ```\n\n这两条 SQL 语句的结果将是相同的：\n\n```\nSELECT COUNT(*) FROM Person.Person\n```\n\n\
    `CONCAT` 提供了几个特点：\n\n`NULL` 参数总是被转换为空字符串。\n结果的数据类型会根据输入智能确定。`NVARCHAR` 参数将产生 `NVARCHAR`\
    \ 结果，`VARCHAR` 将产生 `VARCHAR`，`MAX` 输入将产生 `MAX` 大小的输出。\n如果所有输入都是 `NULL`，则输出将是一个类型为\
    \ `VARCHAR(1)` 的空字符串。\n它将在拼接过程中尝试转换不同的数据类型。这对于字符串可能是可取的，但在拼接文本和数字时可能有问题。添加 `CAST`\
    \ 或 `CONVERT` 来管理这一点将消除对结果准确性的任何疑虑。\n\n但是，删除 `NULL` 可能并非你想要的行为！通常，如果一个参数无意中为 `NULL`，你可能更希望代码抛出错误，而不是使用虚拟值继续处理。只有当删除\
    \ `NULL` 对你的应用程序有利时，才利用此功能。\n\n## 有用的字符串函数\n\n`CONCAT` 是使用 `+` 运算符的一个可行替代方案。在生成动态\
    \ SQL 时，还有许多其他 SQL Server 字符串处理函数非常有用。在本书的剩余部分，我们将继续使用 `+`，但值得花点时间快速回顾一些可能很方便的实用字符串函数：\n\
    \n*   `LTRIM`, `RTRIM`: 删除表达式左侧 (`LTRIM`) 或右侧 (`RTRIM`) 的任何空白。这在处理不可预测的输入或经常附带多余空格的输入时非常有用：\n\
    \n    ```sql\n    DECLARE @string NVARCHAR(MAX) = '  This is a string with extra\
    \ whitespaces   ';\n    SELECT @string;\n    SELECT LTRIM(@string);\n    SELECT\
    \ RTRIM(@string);\n    ```\n\n    以上 T-SQL 返回：\n\n    ```\n    \"   This is a\
    \ string with extra whitespaces   \"\n    \"This is a string with extra whitespaces\
    \   \"\n    \"   This is a string with extra whitespaces\"\n    ```\n\n*   `CHARINDEX`:\
    \ 这将返回搜索表达式在字符串中首次出现的位置。例如，如果你想返回字符串中 `dinosaur` 首次出现的位置，这就可以做到：\n\n    ```sql\n\
    \    DECLARE @string NVARCHAR(MAX) = 'The stegosaurus is my favorite dinosaur';\n\
    \    SELECT CHARINDEX('dinosaur', @string);\n    ```\n\n    此查询的结果将是 32，即单词 `dinosaur`\
    \ 的起始字符位置。一个可选的第三参数可以指定从字符串中的哪个位置开始查找搜索字符串。如果未找到搜索字符串，`CHARINDEX` 返回 `0`。\n\n\
    *   `STUFF`: 允许你将一个字符串插入到另一个字符串的中间，并可选择删除插入点处的字符。这有许多用途，并且可以成为以所需组合拼接 SQL 语句、文本输出或输入参数的便捷方法。以下是使用\
    \ `STUFF` 的一些示例：\n\n    ```sql\n    DECLARE @string NVARCHAR(MAX) = 'The stegosaurus\
    \ is my favorite dinosaur';\n    SELECT STUFF(@string, 5, 0, 'purple ');\n   \
    \ SELECT STUFF(@string, 5, 11, 't-rex');\n    SELECT STUFF(@string, 32, 8, 'animal!');\n\
    \    ```\n\n    第一个参数是要修改的文本，最后一个是要插入的字符串。第二个参数是插入点（在字符串中的哪个字符位置号插入）。第三个参数指示在插入前将删除多少个字符（如果不想删除任何字符，则输入\
    \ `0`）。这些查询的结果如下：\n\n    ```\n    \"The purple stegosaurus is my favorite dinosaur\"\
    \n    \"The t-rex is my favorite dinosaur\"\n    \"The stegosaurus is my favorite\
    \ animal!\"\n    ```\n\n*   `REPLACE`: 在字符串中，这会将文本模式的所有出现替换为另一个。这对于从字符串中删除特定字符，或用标准或一致的文本段替换输入字符串中不需要的部分通常很有用。`REPLACE`\
    \ 和 `STUFF` 的行为可能非常相似，因此你可以根据任务方便性选择使用哪一个：\n\n    ```sql\n    DECLARE @string\
    \ NVARCHAR(MAX) = CAST(CURRENT_TIMESTAMP AS NVARCHAR);\n    SELECT REPLACE(@string,\
    \ ' ', '');\n    SELECT REPLACE(REPLACE(@string, ' ', ''), ':', '');\n    SELECT\
    \ REPLACE(REPLACE(REPLACE(REPLACE(@string, ' ', ''), ':', ''), 'AM', ''), 'PM',\
    \ '');\n    ```"
- fmt: 'In these examples, you are stripping out a variety of characters from the
    current date/time string. A single `REPLACE` can be used to remove a specific
    character, or several can be used to remove additional characters as well. The
    first example replaces all spaces with empty strings, thereby removing them from
    the string. The second query also removes colons, and the final additionally removes
    `AM` or `PM` from the timestamp. This is a frequent tactic used when cleansing
    strings to be used in file names, labels, or a standard name for catalog data.
    The query results are as follows:


    ```

    Sep1320152:40PM

    Sep132015240PM

    Sep132015240

    ```


    `SUBSTRING` returns a segment of a string, based on a starting point and the number
    of characters to return. This can also be used to remove characters from a string,
    to extract a specific portion, or to return the beginning or end of a string.


    ```

    DECLARE @string NVARCHAR(MAX) = CAST(CURRENT_TIMESTAMP AS NVARCHAR);

    SELECT SUBSTRING(@string, 1, 3);

    ```


    This example returns the three-letter month from the string:


    ```

    Sep

    ```


    `REPLICATE` repeats a string the number of times specified. This can be a quick
    way to generate a large volume of test text, or to create data when there are
    parts that are expected to repeat often.


    ```

    SELECT ''Look, a robot'' + REPLICATE(''!'', 50)

    Look, a robot!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

    ```


    The example is simple (outputting lots of exclamation marks), but consider the
    following example, where serial numbers are entered into a system, but should
    all have 20 digits (with leading zeroes):


    ```

    DECLARE @serial_number NVARCHAR(MAX) = ''91542278'';

    SELECT REPLICATE(0, 20 - LEN(@serial_number)) + @serial_number;

    ```


    In this example, `LEN` returns the number of characters in the serial number.
    By subtracting that from 20, you can determine how many additional characters
    you need to reach 20. By replicating zeroes this many times, you can quickly pad
    the serial number with the appropriate number of zeroes. This tactic is also useful
    with ZIP codes, identification numbers, or any numeric values represented as strings,
    where leading zeroes could be omitted.


    `REVERSE` is also a simple function that takes a string and reverses the characters.
    This can be useful if you are looking to operate on the end of the string (in
    reverse order) or to manage a list, starting at the end.


    ```

    DECLARE @string NVARCHAR(MAX) = ''123456789'';

    SELECT REVERSE(@string);

    ```


    This quick example takes a number string and reverses it, which returns the expected
    result:


    ```


    ```


    ### Notes on Apostrophes


    Because Dynamic SQL is built within strings, it’s important to carefully consider
    how to correctly use apostrophes when you build more complex string logic. For
    example, let’s say you wanted to locate all people with a first name that started
    with Ed. Using Dynamic SQL, you would need to include some extra apostrophes to
    ensure the syntax is correct:


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @first_name NVARCHAR(20) = ''Ed'';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName LIKE '''''' + @first_name + ''%'''''';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    The resulting command string will look like this:


    ```

    SELECT

    *

    FROM Person.Person

    WHERE FirstName LIKE ''Ed%''

    ```


    Note that three apostrophes are used instead of one. Within a string, a pair of
    apostrophes is translated into a single apostrophe. Whenever you are working with
    strings within a Dynamic SQL command string, be sure to debug and print often
    to ensure that you’re building valid TSQL and have not forgotten any string delimiters.


    If there was a need to modify a string within a parameter within Dynamic SQL,
    the result would be the need for six apostrophes instead of two. If this sounds
    complicated, then use that complexity as a caution against developing an application
    that is more difficult to understand and maintain than is necessary.


    ## Conclusion


    Dynamic SQL is a powerful tool that is capable of executing complex requests quickly
    and efficiently. There are many database queries and tasks that would be very
    difficult to accomplish without the ability to customize queries on the fly. We
    will soon delve into greater detail on Dynamic SQL features, as well as provide
    many practical examples of how to effectively use it.


    Before diving in, though, it is important to discuss security and the best practices
    for writing and maintaining Dynamic SQL. As with any tool, it can be used and
    misused, and knowing how to effectively utilize security will not only improve
    the quality of development, but will also help secure your existing applications
    and systems.


    # 2. Protecting Against SQL Injection


    There are few SQL vulnerabilities as commonly exploited as SQL injection. This
    form of database attack has destroyed companies and ruined careers, and is a constant
    challenge for database administrators. As a database professional, data is your
    greatest asset, and it is your responsibility to guard it above all else. SQL
    injection is not limited only to Dynamic SQL, but is a technique that can be applied
    to many areas of SQL Server. Therefore, understanding and defending against it
    are the most important priorities when considering SQL Server security.'
