- fmt: 'Once this script is run, you can look in the views list to quickly verify
    that the new view was created and that it contains the correct columns, as shown
    in Figure [10-12](#A371168_1_En_10_Chapter.html#Fig12).


    ![A371168_1_En_10_Fig12_HTML.jpg](A371168_1_En_10_Fig12_HTML.jpg)

    Figure 10-12. Columns contained in the custom view created in Listing [10-11](#A371168_1_En_10_Chapter.html#Par72)


    The view definition will not update automatically as data is updated, but since
    the underlying data is not likely to change constantly, you can manage this update
    daily (or at whatever interval is deemed necessary). Let’s say that you update
    a few hire dates to years that are not included in the current underlying employee
    data:


    ```sql

    UPDATE HumanResources.Employee

    SET HireDate = ''1/1/2015''

    WHERE BusinessEntityID = 282

    UPDATE HumanResources.Employee

    SET HireDate = ''1/1/2014''

    WHERE BusinessEntityID IN (260, 285)

    ```


    Now, if you select data from the view, you’ll notice that 2014 and 2015 have not
    been added to it, as shown in Figure [10-13](#A371168_1_En_10_Chapter.html#Fig13).


    ![A371168_1_En_10_Fig13_HTML.jpg](A371168_1_En_10_Fig13_HTML.jpg)

    Figure 10-13. Without refreshing the view, the 2014 and 2015 columns will not
    be returned


    ```sql

    SELECT

    *

    FROM dbo.v_job_title_year_summary

    ```


    In order for additional columns to be added to the view, it must be refreshed
    or recreated. In order to recreate it easily, you can encapsulate the TSQL view
    creation from earlier into a stored procedure, as shown in Listing [10-12](#A371168_1_En_10_Chapter.html#Par79).


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''create_v_job_title_year_summary'')

    BEGIN

    DROP PROCEDURE dbo.create_v_job_title_year_summary;

    END

    GO

    CREATE PROCEDURE dbo.create_v_job_title_year_summary

    AS

    BEGIN

    IF EXISTS (SELECT * FROM sys.views WHERE views.name = ''v_job_title_year_summary'')

    BEGIN

    DROP VIEW v_job_title_year_summary;

    END

    DECLARE @hire_date_years TABLE

    (hire_date_year NVARCHAR(50));

    INSERT INTO @hire_date_years

    (hire_date_year)

    SELECT DISTINCT

    DATEPART(YEAR, Employee.HireDate)

    FROM HumanResources.Employee;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    CREATE VIEW dbo.v_job_title_year_summary

    WITH SCHEMABINDING

    AS

    SELECT

    JobTitle,''

    SELECT @sql_command = @sql_command + ''

    ['' + hire_date_year + ''], ''

    FROM @hire_date_years;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + ''

    FROM

    (        SELECT

    Employee.BusinessEntityID,

    Employee.JobTitle,

    DATEPART(YEAR, Employee.HireDate) AS HireDate_Year

    FROM HumanResources.Employee

    ) EMPLOYEE_DATA

    PIVOT

    (        COUNT(BusinessEntityID)

    FOR HireDate_Year IN ('';

    SELECT @sql_command = @sql_command + ''['' + hire_date_year + ''], ''

    FROM @hire_date_years;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + ''        )) PIVOT_DATA'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    END

    ```

    Listing 10-12. Stored Procedure Used to Create a Dynamically Generated View


    With this stored procedure, you can now recreate the dynamic view with ease:


    ```sql

    EXEC dbo.create_v_job_title_year_summary;

    ```


    When you check the contents of the view, you can verify that it has been appropriately
    updated, as shown in Figure [10-14](#A371168_1_En_10_Chapter.html#Fig14).


    ![A371168_1_En_10_Fig14_HTML.jpg](A371168_1_En_10_Fig14_HTML.jpg)

    Figure 10-14. New data for 2014 and 2015 has been included in the view, once refreshed


    ```sql

    SELECT

    *

    FROM dbo.v_job_title_year_summary

    ```


    Columns have been added for the 2014 and 2015 data and would have been added in
    order to encompass any other years that were added or removed since the last time
    the view was created. Note that a view that is based on a `PIVOT` cannot be indexed,
    but dynamically generated views can be indexed normally, so long as they do not
    include `PIVOT` or `UNPIVOT` and are schema-bound.


    Generating schema using Dynamic SQL can be a very convenient way to create objects
    when schema knowledge may not be complete until runtime. It can also allow for
    complex business logic to be summarized into database objects using relatively
    simple TSQL syntax. The ability to greatly simplify application or report code
    can sometimes be more important than the burden of creating a new database object.


    As with creating any new objects, always ensure that they are needed and that
    there is not a more efficient method available. Oftentimes, new SQL Server versions,
    application releases, or business changes can allow for new methods to be implemented
    for efficiently retrieving data.


    ## Conclusion


    This chapter reviewed a handful of Dynamic SQL applications that allow you to
    add flexibility to processes that are normally not tolerant of changes at runtime.
    Many more applications exist, with the only limitation being your imagination.


    When creating any new schema, whether dynamically generated or not, always consider
    the impact and efficiency of doing so. All database objects must be maintained,
    and that cumulative upkeep must be considered when considering new objects. The
    goal of using Dynamic SQL is to either allow for processes that would otherwise
    not be easily possible or decrease complexity in processes that might require
    a manual or resource-intensive component.


    The use of Dynamic SQL for these purposes will be dictated by your own business
    logic, database server version, and the rules and policies used by your development
    team. While some solutions will be useful to a wide audience, others may prove
    to be the savior of one specific development environment out of a million. Regardless
    of how universal the solution is, keeping this tool in mind will allow for difficult
    database challenges to be solved in creative ways that otherwise could be costly
    and time-consuming to resolve.


    # 11. Additional Applications


    This final chapter takes a look at some more interesting applications of Dynamic
    SQL. The goal is to leave you with a variety of practical scripts that can be
    brought into any database environment and tailored to unique uses. There are many
    real-world challenges for which Dynamic SQL is an efficient solution and where
    you can accomplish a great deal of work in compact, reusable code.


    ### Database Maintenance


    One of the most challenging areas for DBAs and database developers is in providing
    regular care and maintenance to their servers, databases, and related software.
    Common tasks such as defragmenting indexes, maintaining statistics, and managing
    database backups are critically important to any application. Since every database
    environment is different, scripts to manage these tasks can and should vary in
    each. The following section outlines a handful of common maintenance tasks and
    how Dynamic SQL can be used to build a framework for each task. Once built, these
    scripts can be expanded upon and customized to meet the needs of your own database
    servers.'
  raw: 'Once this script is run, you can look in the views list to quickly verify
    that the new view was created and that it contains the correct columns, as shown
    in Figure [10-12](#A371168_1_En_10_Chapter.html#Fig12).


    ![A371168_1_En_10_Fig12_HTML.jpg](A371168_1_En_10_Fig12_HTML.jpg)


    Figure 10-12.


    Columns contained in the custom view created in Listing [10-11](#A371168_1_En_10_Chapter.html#Par72)


    The view definition will not update automatically as data is updated, but since
    the underlying data is not likely to change constantly, you can manage this update
    daily (or at whatever interval is deemed necessary). Let’s say that you update
    a few hire dates to years that are not included in the current underlying employee
    data:


    ```

    UPDATE HumanResources.Employee

    SET HireDate = ''1/1/2015''

    WHERE BusinessEntityID = 282

    UPDATE HumanResources.Employee

    SET HireDate = ''1/1/2014''

    WHERE BusinessEntityID IN (260, 285)

    ```


    Now, if you select data from the view, you’ll notice that 2014 and 2015 have not
    been added to it, as shown in Figure [10-13](#A371168_1_En_10_Chapter.html#Fig13).


    ![A371168_1_En_10_Fig13_HTML.jpg](A371168_1_En_10_Fig13_HTML.jpg)


    Figure 10-13.


    Without refreshing the view, the 2014 and 2015 columns will not be returned


    ```

    SELECT

    *

    FROM dbo.v_job_title_year_summary

    ```


    In order for additional columns to be added to the view, it must be refreshed
    or recreated. In order to recreate it easily, you can encapsulate the TSQL view
    creation from earlier into a stored procedure, as shown in Listing [10-12](#A371168_1_En_10_Chapter.html#Par79).


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''create_v_job_title_year_summary'')

    BEGIN

    DROP PROCEDURE dbo.create_v_job_title_year_summary;

    END

    GO

    CREATE PROCEDURE dbo.create_v_job_title_year_summary

    AS

    BEGIN

    IF EXISTS (SELECT * FROM sys.views WHERE views.name = ''v_job_title_year_summary'')

    BEGIN

    DROP VIEW v_job_title_year_summary;

    END

    DECLARE @hire_date_years TABLE

    (hire_date_year NVARCHAR(50));

    INSERT INTO @hire_date_years

    (hire_date_year)

    SELECT DISTINCT

    DATEPART(YEAR, Employee.HireDate)

    FROM HumanResources.Employee;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    CREATE VIEW dbo.v_job_title_year_summary

    WITH SCHEMABINDING

    AS

    SELECT

    JobTitle,''

    SELECT @sql_command = @sql_command + ''

    ['' + hire_date_year + ''], ''

    FROM @hire_date_years;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + ''

    FROM

    (        SELECT

    Employee.BusinessEntityID,

    Employee.JobTitle,

    DATEPART(YEAR, Employee.HireDate) AS HireDate_Year

    FROM HumanResources.Employee

    ) EMPLOYEE_DATA

    PIVOT

    (        COUNT(BusinessEntityID)

    FOR HireDate_Year IN ('';

    SELECT @sql_command = @sql_command + ''['' + hire_date_year + ''], ''

    FROM @hire_date_years;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + ''        )) PIVOT_DATA'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    END

    Listing 10-12.

    Stored Procedure Used to Create a Dynamically Generated View

    ```


    With this stored procedure, you can now recreate the dynamic view with ease:


    ```

    EXEC dbo.create_v_job_title_year_summary;

    ```


    When you check the contents of the view, you can verify that it has been appropriately
    updated, as shown in Figure [10-14](#A371168_1_En_10_Chapter.html#Fig14).


    ![A371168_1_En_10_Fig14_HTML.jpg](A371168_1_En_10_Fig14_HTML.jpg)


    Figure 10-14.


    New data for 2014 and 2015 has been included in the view, once refreshed


    ```

    SELECT

    *

    FROM dbo.v_job_title_year_summary

    ```


    Columns have been added for the 2014 and 2015 data and would have been added in
    order to encompass any other years that were added or removed since the last time
    the view was created. Note that a view that is based on a `PIVOT` cannot be indexed,
    but dynamically generated views can be indexed normally, so long as they do not
    include `PIVOT` or `UNPIVOT` and are schema-bound.


    Generating schema using Dynamic SQL can be a very convenient way to create objects
    when schema knowledge may not be complete until runtime. It can also allow for
    complex business logic to be summarized into database objects using relatively
    simple TSQL syntax. The ability to greatly simplify application or report code
    can sometimes be more important than the burden of creating a new database object.


    As with creating any new objects, always ensure that they are needed and that
    there is not a more efficient method available. Oftentimes, new SQL Server versions,
    application releases, or business changes can allow for new methods to be implemented
    for efficiently retrieving data.


    ## Conclusion


    This chapter reviewed a handful of Dynamic SQL applications that allow you to
    add flexibility to processes that are normally not tolerant of changes at runtime.
    Many more applications exist, with the only limitation being your imagination.


    When creating any new schema, whether dynamically generated or not, always consider
    the impact and efficiency of doing so. All database objects must be maintained,
    and that cumulative upkeep must be considered when considering new objects. The
    goal of using Dynamic SQL is to either allow for processes that would otherwise
    not be easily possible or decrease complexity in processes that might require
    a manual or resource-intensive component.


    The use of Dynamic SQL for these purposes will be dictated by your own business
    logic, database server version, and the rules and policies used by your development
    team. While some solutions will be useful to a wide audience, others may prove
    to be the savior of one specific development environment out of a million. Regardless
    of how universal the solution is, keeping this tool in mind will allow for difficult
    database challenges to be solved in creative ways that otherwise could be costly
    and time-consuming to resolve.


    # 11. Additional Applications


    This final chapter takes a look at some more interesting applications of Dynamic
    SQL. The goal is to leave you with a variety of practical scripts that can be
    brought into any database environment and tailored to unique uses. There are many
    real-world challenges for which Dynamic SQL is an efficient solution and where
    you can accomplish a great deal of work in compact, reusable code.


    ## Database Maintenance


    One of the most challenging areas for DBAs and database developers is in providing
    regular care and maintenance to their servers, databases, and related software.
    Common tasks such as defragmenting indexes, maintaining statistics, and managing
    database backups are critically important to any application. Since every database
    environment is different, scripts to manage these tasks can and should vary in
    each. The following section outlines a handful of common maintenance tasks and
    how Dynamic SQL can be used to build a framework for each task. Once built, these
    scripts can be expanded upon and customized to meet the needs of your own database
    servers.'
  trans: '

    一旦运行此脚本，您就可以查看视图列表，快速验证新视图是否已创建，并且是否包含正确的列，如图 10-12 所示。


    ![A371168_1_En_10_Fig12_HTML.jpg](img/A371168_1_En_10_Fig12_HTML.jpg)

    图 10-12. 清单 10-11 中创建的视图所包含的列


    视图定义不会随数据更新而自动更新，但由于基础数据不太可能不断变化，您可以每天（或以任何认为必要的间隔）管理此更新。假设您将一些雇佣日期更新为当前基础员工数据中未包含的年份：


