  trans: "\n# 动态搜索过程\n\n## 代码逻辑说明\n\n`代码清单 6-3` 展示了一个动态搜索存储过程，它能够在需要时选择性地查询对象。\n\n\
    ## SQL 代码实现\n\n以下代码块定义了存储过程 `dbo.search_products`：\n\n```sql\nIF EXISTS (SELECT\
    \ * FROM sys.procedures WHERE procedures.name = 'search_products')\nBEGIN\n  \
    \  DROP PROCEDURE dbo.search_products;\nEND\nGO\n\n-- 带检查的搜索，以避免空搜索\nCREATE PROCEDURE\
    \ dbo.search_products\n    @product_name NVARCHAR(50) = NULL,\n    @product_number\
    \ NVARCHAR(25) = NULL,\n    @product_model NVARCHAR(50) = NULL,\n    @product_subcategory\
    \ NVARCHAR(50) = NULL,\n    @product_sizemeasurecode NVARCHAR(50) = NULL,\n  \
    \  @product_weightunitmeasurecode NVARCHAR(50) = NULL,\n    @show_color BIT =\
    \ 0,\n    @show_safetystocklevel BIT = 0,\n    @show_reorderpoint BIT = 0,\n \
    \   @show_standard_cost BIT = 0,\n    @show_catalog_description BIT = 0,\n   \
    \ @show_subcategory_modified_date BIT = 0,\n    @show_product_model BIT = 0,\n\
    \    @show_product_subcategory BIT = 0,\n    @show_product_sizemeasurecode BIT\
    \ = 0,\n    @show_product_weightunitmeasurecode BIT = 0\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n\n    IF COALESCE(@product_name, @product_number, @product_model, @product_subcategory,\n\
    \                 @product_sizemeasurecode, @product_weightunitmeasurecode) IS\
    \ NULL\n        RETURN;\n\n    -- 为将作为通配符搜索的参数添加 \"%\" 分隔符。\n    SET @product_name\
    \ = '%' + @product_name + '%';\n    SET @product_number = '%' + @product_number\
    \ + '%';\n    SET @product_model = '%' + @product_model + '%';\n\n    DECLARE\
    \ @sql_command NVARCHAR(MAX);\n\n    -- 为筛选条件定义参数列表\n    DECLARE @parameter_list\
    \ NVARCHAR(MAX) = '@product_name NVARCHAR(50), @product_number NVARCHAR(25),\n\
    \        @product_model NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode\
    \ NVARCHAR(50),\n        @product_weightunitmeasurecode NVARCHAR(50)';\n\n   \
    \ -- 为 SELECT 列生成简化的命令字符串部分\n    SELECT @sql_command = '\n        SELECT\n   \
    \         Product.Name AS product_name,\n            Product.ProductNumber AS\
    \ product_number,';\n\n    IF @show_product_model = 1 OR @show_catalog_description\
    \ = 1\n        SELECT @sql_command = @sql_command + '\n            ProductModel.Name\
    \ AS product_model_name,\n            ProductModel.CatalogDescription AS productmodel_catalog_description,';\n\
    \n    IF @show_product_subcategory = 1 OR @show_subcategory_modified_date = 1\n\
    \        SELECT @sql_command = @sql_command + '\n            ProductSubcategory.Name\
    \ AS product_subcategory_name,\n            ProductSubcategory.ModifiedDate AS\
    \ product_subcategory_modified_date,';\n\n    IF @show_product_sizemeasurecode\
    \ = 1\n        SELECT @sql_command = @sql_command + '\n            SizeUnitMeasureCode.Name\
    \ AS size_unit_measure_code,';\n\n    IF @show_product_weightunitmeasurecode =\
    \ 1\n        SELECT @sql_command = @sql_command + '\n            WeightUnitMeasureCode.Name\
    \ AS weight_unit_measure_code,';\n\n    IF @show_color = 1 OR @show_safetystocklevel\
    \ = 1 OR @show_reorderpoint = 1 OR @show_standard_cost = 1\n        SELECT @sql_command\
    \ = @sql_command + '\n            Product.Color AS product_color,\n          \
    \  Product.SafetyStockLevel AS product_safety_stock_level,\n            Product.ReorderPoint\
    \ AS product_reorderpoint,\n            Product.StandardCost AS product_standard_cost';\n\
    \n    -- 如果命令字符串的末尾有逗号，在继续之前将其移除：\n    IF (SELECT SUBSTRING(@sql_command, LEN(@sql_command),\
    \ 1)) = ','\n        SELECT @sql_command = LEFT(@sql_command, LEN(@sql_command)\
    \ - 1);\n\n    SELECT @sql_command = @sql_command + '\n        FROM Production.Product'\n\
    \n    -- 根据搜索所需连接的表来组合 JOIN。\n    IF (@product_model IS NOT NULL OR @show_product_model\
    \ = 1 OR @show_catalog_description = 1)\n        SELECT @sql_command = @sql_command\
    \ + '\n            LEFT JOIN Production.ProductModel\n                ON Product.ProductModelID\
    \ = ProductModel.ProductModelID';\n\n    IF (@product_subcategory IS NOT NULL\
    \ OR @show_subcategory_modified_date = 1 OR @show_product_subcategory = 1)\n \
    \       SELECT @sql_command = @sql_command + '\n            LEFT JOIN Production.ProductSubcategory\n\
    \                ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID';\n\
    \n    IF (@product_sizemeasurecode IS NOT NULL OR @show_product_sizemeasurecode\
    \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN\
    \ Production.UnitMeasure SizeUnitMeasureCode\n                ON Product.SizeUnitMeasureCode\
    \ = SizeUnitMeasureCode.UnitMeasureCode';\n\n    IF (@product_weightunitmeasurecode\
    \ IS NOT NULL OR @show_product_weightunitmeasurecode = 1)\n        SELECT @sql_command\
    \ = @sql_command + '\n            LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode\n\
    \                ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode';\n\
    \n    SELECT @sql_command = @sql_command + '\n        WHERE 1 = 1';\n\n    --\
    \ 根据搜索引用和需要的表来构建 WHERE 子句。\n    IF @product_name IS NOT NULL\n        SELECT @sql_command\
    \ = @sql_command + '\n            AND Product.Name LIKE @product_name';\n\n  \
    \  IF @product_number IS NOT NULL\n        SELECT @sql_command = @sql_command\
    \ + '\n            AND Product.ProductNumber LIKE @product_number';\n\n    IF\
    \ @product_model IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n\
    \            AND ProductModel.Name LIKE @product_model';\n\n    IF @product_subcategory\
    \ IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n            AND\
    \ ProductSubcategory.Name = @product_subcategory';\n\n    IF @product_sizemeasurecode\
    \ IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n            AND\
    \ SizeUnitMeasureCode.Name = @product_sizemeasurecode';\n\n    IF @product_weightunitmeasurecode\
    \ IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n            AND\
    \ WeightUnitMeasureCode.Name = @product_weightunitmeasurecode';\n\n    PRINT @sql_command;\n\
    \n    EXEC sp_executesql @sql_command, @parameter_list, @product_name, @product_number,\n\
    \        @product_model, @product_subcategory, @product_sizemeasurecode,\n   \
    \     @product_weightunitmeasurecode;\nEND\n```\n"
- fmt: '# 动态搜索与静态搜索存储过程的对比


    以下是您在[第4章](#A371168_1_En_4_Chapter.html)中看到的动态搜索。这个存储过程可能看起来很长，但它的长度确保了只有在进行的搜索需要时，才会查询表并返回列。


    这个存储过程的设计使得只有当某个表的数据需要用于`WHERE`子句或连接时，才会查询该表。此外，只有当调用应用程序需要时，查询才会返回列。现在它已经创建好了，让我们为可能的用户搜索运行它，如清单[6-4](#A371168_1_En_6_Chapter.html#Par71)所示。


    ```sql

    EXEC dbo.search_products @product_name = ''Mountain Frame'', @product_number =
    ''FR-M21B'', @product_model = ''LL Mountain Frame'',

    @show_color = 0, @show_safetystocklevel = 0,

    @show_reorderpoint = 0, @show_standard_cost = 1, @show_catalog_description = 1,
    @show_subcategory_modified_date = 0,

    @show_product_model = 1, @show_product_subcategory = 1

    ```

    **清单 6-4.** 清单 6-3 中存储过程的执行示例


    这个搜索传入了各种参数，也有一些参数被省略了。用户对自行车架的尺寸没有兴趣，因此省略了这些变量的参数。结果集是图[6-7](#A371168_1_En_6_Chapter.html#Fig7)中显示的五个山地自行车架。


    ![A371168_1_En_6_Fig7_HTML.jpg](A371168_1_En_6_Fig7_HTML.jpg)

    **图 6-7.** 从清单[6-4](#A371168_1_En_6_Chapter.html#Par71)中的TSQL执行搜索过程得到的结果


    执行的命令字符串如清单[6-5](#A371168_1_En_6_Chapter.html#Par74)所示。


    ```sql

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductModel.CatalogDescription AS productmodel_catalog_description,

    ProductSubcategory.Name AS product_subcategory_name,

    ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,

    Product.Color AS product_color,

    Product.SafetyStockLevel AS product_safety_stock_level,

    Product.ReorderPoint AS product_reorderpoint,

    Product.StandardCost AS product_standard_cost

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    WHERE 1 = 1

    AND Product.Name LIKE @product_name

    AND Product.ProductNumber LIKE @product_number

    AND ProductModel.Name LIKE @product_model

    AND ProductSubcategory.Name = @product_subcategory

    ```

    **清单 6-5.** 执行清单 6-4 中的搜索过程生成的命令字符串


    由于传入的参数不需要，这个TSQL中省略了一些连接和`WHERE`子句。这对性能有什么影响？以下是本次执行的IO统计信息：


    ```

    Table ''ProductModel''. Scan count 0, logical reads 10, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductSubcategory''. Scan count 0, logical reads 10, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''Product''. Scan count 1, logical reads 14, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    总IO是34次读取：`ProductModel`上10次，`ProductSubcategory`上10次，`Product`上14次。同一执行的执行计划如图[6-8](#A371168_1_En_6_Chapter.html#Fig8)所示。


    ![A371168_1_En_6_Fig8_HTML.jpg](A371168_1_En_6_Fig8_HTML.jpg)

    **图 6-8.** 清单[6-4](#A371168_1_En_6_Chapter.html#Par71)中存储过程执行的执行计划


    该计划显示了对IO统计中引用的三个表的访问，以及将所有这些数据组合在一起所需的各种步骤。作为比较，整个查询的估计子树成本是0.014。


    动态搜索的替代方案是静态搜索，其中自动连接所有表并返回所有列以备需要。清单[6-6](#A371168_1_En_6_Chapter.html#Par80)中的存储过程展示了这一点。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_products'')

    BEGIN

    DROP PROCEDURE dbo.search_products;

    END

    GO

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,

    @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50)
    = NULL,

    @product_weightunitmeasurecode NVARCHAR(50) = NULL

    AS

    BEGIN

    SELECT @product_name = ''%'' + @product_name + ''%'';

    SELECT @product_number = ''%'' + @product_number + ''%'';

    SELECT @product_model = ''%'' + @product_model + ''%'';

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductModel.CatalogDescription AS productmodel_catalog_description,

    ProductSubcategory.Name AS product_subcategory_name,

    ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code,

    Product.Color AS product_color,

    Product.SafetyStockLevel AS product_safety_stock_level,

    Product.ReorderPoint AS product_reorderpoint,

    Product.StandardCost AS product_standard_cost

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE (Product.Name LIKE @product_name OR @product_name IS NULL)

    AND (Product.ProductNumber LIKE @product_number OR @product_number IS NULL)

    AND (ProductModel.Name LIKE @product_model OR @product_model IS NULL)

    AND (ProductSubcategory.Name = @product_subcategory OR @product_subcategory IS
    NULL)

    AND (SizeUnitMeasureCode.Name = @product_sizemeasurecode OR @product_sizemeasurecode
    IS NULL)

    AND (WeightUnitMeasureCode.Name = @product_weightunitmeasurecode OR @product_weightunitmeasurecode
    IS NULL);

    END

    ```

    **清单 6-6.** 无论参数如何都检查并返回所有数据的搜索过程


    这个TSQL更容易阅读和理解。搜索是直截了当的，返回你可能想要的所有可能的列，连接所有表，并在`WHERE`子句中检查所有搜索参数，即使它们没有在存储过程参数中指定。输出上的唯一差异是任何你在上一个版本中明确省略的额外列。你可以运行与之前相同的执行语句来评估性能：


    ```sql

    EXEC dbo.search_products @product_name = ''Mountain Frame'', @product_number =
    ''FR-M21B'', @product_model = ''LL Mountain Frame'',

    @product_subcategory = ''Mountain Frames''

    ```


    这个新版本的执行计划和IO统计信息如图[6-9](#A371168_1_En_6_Chapter.html#Fig9)所示。


    ![A371168_1_En_6_Fig9_HTML.jpg](A371168_1_En_6_Fig9_HTML.jpg)

    **图 6-9.** 更包容的搜索过程的执行计划'
  raw: 'The following is a dynamic search you saw in Chapter [4](#A371168_1_En_4_Chapter.html).
    This stored procedure may seem long, but its length ensures that no table is queried
    and no column returned unless needed for the search that is being performed.


    This stored procedure is written such that a table is queried only if data from
    it is needed for a `WHERE` clause or join. In addition, columns are returned by
    the query only if they are required by the calling application. Now that this
    is created, let’s run it for a possible user search, as shown in Listing [6-4](#A371168_1_En_6_Chapter.html#Par71).


    ```

    EXEC dbo.search_products @product_name = ''Mountain Frame'', @product_number =
    ''FR-M21B'', @product_model = ''LL Mountain Frame'',

    @product_subcategory = ''Mountain Frames'', @show_color = 0, @show_safetystocklevel
    = 0,

    @show_reorderpoint = 0, @show_standard_cost = 1, @show_catalog_description = 1,
    @show_subcategory_modified_date = 0,

    @show_product_model = 1, @show_product_subcategory = 1

    Listing 6-4.

    Execution Example for the Stored Procedure in Listing 6-3

    ```


    This search has a variety of parameters passed in, as well as a few that were
    omitted. The user has no interest in the measurements of the bike frames, and
    therefore left out parameters for those variables. The result set is for the five
    mountain bike frames shown in Figure [6-7](#A371168_1_En_6_Chapter.html#Fig7).


    ![A371168_1_En_6_Fig7_HTML.jpg](A371168_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Results from the search proc, as executed from the TSQL in Listing [6-4](#A371168_1_En_6_Chapter.html#Par71)


    The command string that was executed is shown in Listing [6-5](#A371168_1_En_6_Chapter.html#Par74).


    ```

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductModel.CatalogDescription AS productmodel_catalog_description,

    ProductSubcategory.Name AS product_subcategory_name,

    ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,

    Product.Color AS product_color,

    Product.SafetyStockLevel AS product_safety_stock_level,

    Product.ReorderPoint AS product_reorderpoint,

    Product.StandardCost AS product_standard_cost

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    HERE 1 = 1

    AND Product.Name LIKE @product_name

    AND Product.ProductNumber LIKE @product_number

    AND ProductModel.Name LIKE @product_model

    AND ProductSubcategory.Name = @product_subcategory

    Listing 6-5.

    The Command String Generated by the Execution of the Search Proc in Listing 6-4

    ```


    Some joins and `WHERE` clauses were omitted from this TSQL, as they were not required
    by the parameters passed in. How did this affect performance? Here are the IO
    statistics for this execution:


    ```

    Table ''ProductModel''. Scan count 0, logical reads 10, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductSubcategory''. Scan count 0, logical reads 10, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''Product''. Scan count 1, logical reads 14, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    The overall IO was 34 reads: 10 on `ProductModel`, 10 on `ProductSubcategory`,
    and 14 on `Product`. The execution plan for the same execution is shown in Figure
    [6-8](#A371168_1_En_6_Chapter.html#Fig8).


    ![A371168_1_En_6_Fig8_HTML.jpg](A371168_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Execution plan for the execution of the stored procedure in Listing [6-4](#A371168_1_En_6_Chapter.html#Par71)


    The plan shows access to the three tables referenced in the IO stats and the various
    steps required to put all of that data together. For comparison’s sake, the estimated
    subtree cost for the entire query is 0.014.


    The alternative to a dynamic search would be a static search, where all tables
    are automatically joined and all columns returned in case you need them. This
    is shown in the stored procedure in Listing [6-6](#A371168_1_En_6_Chapter.html#Par80).


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_products'')

    BEGIN

    DROP PROCEDURE dbo.search_products;

    END

    GO

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,

    @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50)
    = NULL,

    @product_weightunitmeasurecode NVARCHAR(50) = NULL

    AS

    BEGIN

    SELECT @product_name = ''%'' + @product_name + ''%'';

    SELECT @product_number = ''%'' + @product_number + ''%'';

    SELECT @product_model = ''%'' + @product_model + ''%'';

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductModel.CatalogDescription AS productmodel_catalog_description,

    ProductSubcategory.Name AS product_subcategory_name,

    ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code,

    Product.Color AS product_color,

    Product.SafetyStockLevel AS product_safety_stock_level,

    Product.ReorderPoint AS product_reorderpoint,

    Product.StandardCost AS product_standard_cost

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE (Product.Name LIKE @product_name OR @product_name IS NULL)

    AND (Product.ProductNumber LIKE @product_number OR @product_number IS NULL)

    AND (ProductModel.Name LIKE @product_model OR @product_model IS NULL)

    AND (ProductSubcategory.Name = @product_subcategory OR @product_subcategory IS
    NULL)

    AND (SizeUnitMeasureCode.Name = @product_sizemeasurecode OR @product_sizemeasurecode
    IS NULL)

    AND (WeightUnitMeasureCode.Name = @product_weightunitmeasurecode OR @product_weightunitmeasurecode
    IS NULL);

    END

    Listing 6-6.

    Search Procedure that Checks and Returns All Data Regardless of Parameters

    ```


    This TSQL is much easier to read and understand. The search is straight-forward,
    returning all possible columns that you may want, joining all tables, and checking
    all search parameters in the `WHERE` clause, even if they are not specified in
    the stored procedure parameters. The only differences in output are any extra
    columns that you explicitly left out in the previous version. You can run the
    same execution statement as before in order to evaluate performance:


    ```

    EXEC dbo.search_products @product_name = ''Mountain Frame'', @product_number =
    ''FR-M21B'', @product_model = ''LL Mountain Frame'',

    @product_subcategory = ''Mountain Frames''

    ```


    The execution plan and IO statistics for this new version are shown in Figure
    [6-9](#A371168_1_En_6_Chapter.html#Fig9).


    ![A371168_1_En_6_Fig9_HTML.jpg](A371168_1_En_6_Fig9_HTML.jpg)


    Figure 6-9.


    Execution plan for the more inclusive search proc'
  trans: '# 动态搜索与静态搜索存储过程的对比


    以下是您在第 4 章中看到的动态搜索。这个存储过程可能看起来很长，但它的长度确保了只有在进行的搜索需要时，才会查询表并返回列。


    这个存储过程的设计使得只有当某个表的数据需要用于`WHERE`子句或连接时，才会查询该表。此外，只有当调用应用程序需要时，查询才会返回列。现在它已经创建好了，让我们为可能的用户搜索运行它，如清单
    6-4 所示。


    ```sql

    EXEC dbo.search_products @product_name = ''Mountain Frame'', @product_number =
    ''FR-M21B'', @product_model = ''LL Mountain Frame'',

    @show_color = 0, @show_safetystocklevel = 0,

    @show_reorderpoint = 0, @show_standard_cost = 1, @show_catalog_description = 1,
    @show_subcategory_modified_date = 0,

    @show_product_model = 1, @show_product_subcategory = 1

    ```

    **清单 6-4.** 清单 6-3 中存储过程的执行示例


    这个搜索传入了各种参数，也有一些参数被省略了。用户对自行车架的尺寸没有兴趣，因此省略了这些变量的参数。结果集是图 6-7 中显示的五个山地自行车架。


    ![A371168_1_En_6_Fig7_HTML.jpg](img/A371168_1_En_6_Fig7_HTML.jpg)

    **图 6-7.** 从清单 6-4 中的 TSQL 执行搜索过程得到的结果


    执行的命令字符串如清单 6-5 所示。


    ```sql

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductModel.CatalogDescription AS productmodel_catalog_description,

    ProductSubcategory.Name AS product_subcategory_name,

    ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,

    Product.Color AS product_color,

    Product.SafetyStockLevel AS product_safety_stock_level,

    Product.ReorderPoint AS product_reorderpoint,

    Product.StandardCost AS product_standard_cost

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    WHERE 1 = 1

    AND Product.Name LIKE @product_name

    AND Product.ProductNumber LIKE @product_number

    AND ProductModel.Name LIKE @product_model

    AND ProductSubcategory.Name = @product_subcategory

    ```

    **清单 6-5.** 执行清单 6-4 中的搜索过程生成的命令字符串


    由于传入的参数不需要，这个 TSQL 中省略了一些连接和`WHERE`子句。这对性能有什么影响？以下是本次执行的 IO 统计信息：


    ```

    Table ''ProductModel''. Scan count 0, logical reads 10, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductSubcategory''. Scan count 0, logical reads 10, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''Product''. Scan count 1, logical reads 14, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    总 IO 是 34 次读取：`ProductModel`上 10 次，`ProductSubcategory`上 10 次，`Product`上 14 次。同一执行的执行计划如图
    6-8 所示。


    ![A371168_1_En_6_Fig8_HTML.jpg](img/A371168_1_En_6_Fig8_HTML.jpg)

    **图 6-8.** 清单 6-4 中存储过程执行的执行计划


    该计划显示了对 IO 统计中引用的三个表的访问，以及将所有这些数据组合在一起所需的各种步骤。作为比较，整个查询的估计子树成本是 0.014。


    动态搜索的替代方案是静态搜索，其中自动连接所有表并返回所有列以备需要。清单 6-6 中的存储过程展示了这一点。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_products'')

    BEGIN

    DROP PROCEDURE dbo.search_products;

    END

    GO

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,

    @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50)
    = NULL,

    @product_weightunitmeasurecode NVARCHAR(50) = NULL

    AS

    BEGIN

    SELECT @product_name = ''%'' + @product_name + ''%'';

    SELECT @product_number = ''%'' + @product_number + ''%'';

    SELECT @product_model = ''%'' + @product_model + ''%'';

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductModel.CatalogDescription AS productmodel_catalog_description,

    ProductSubcategory.Name AS product_subcategory_name,

    ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code,

    Product.Color AS product_color,

    Product.SafetyStockLevel AS product_safety_stock_level,

    Product.ReorderPoint AS product_reorderpoint,

    Product.StandardCost AS product_standard_cost

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE (Product.Name LIKE @product_name OR @product_name IS NULL)

    AND (Product.ProductNumber LIKE @product_number OR @product_number IS NULL)

    AND (ProductModel.Name LIKE @product_model OR @product_model IS NULL)

    AND (ProductSubcategory.Name = @product_subcategory OR @product_subcategory IS
    NULL)

    AND (SizeUnitMeasureCode.Name = @product_sizemeasurecode OR @product_sizemeasurecode
    IS NULL)

    AND (WeightUnitMeasureCode.Name = @product_weightunitmeasurecode OR @product_weightunitmeasurecode
    IS NULL);

    END

    ```

    **清单 6-6.** 无论参数如何都检查并返回所有数据的搜索过程


    这个 TSQL 更容易阅读和理解。搜索是直截了当的，返回你可能想要的所有可能的列，连接所有表，并在`WHERE`子句中检查所有搜索参数，即使它们没有在存储过程参数中指定。输出上的唯一差异是任何你在上一个版本中明确省略的额外列。你可以运行与之前相同的执行语句来评估性能：


    ```sql

    EXEC dbo.search_products @product_name = ''Mountain Frame'', @product_number =
    ''FR-M21B'', @product_model = ''LL Mountain Frame'',

    @product_subcategory = ''Mountain Frames''

    ```


    这个新版本的执行计划和 IO 统计信息如图 6-9 所示。


    ![A371168_1_En_6_Fig9_HTML.jpg](img/A371168_1_En_6_Fig9_HTML.jpg)

    **图 6-9.** 更包容的搜索过程的执行计划'
- fmt: '# SQL 性能对比与分页优化


    ```

    Table ''UnitMeasure''. Scan count 1, logical reads 21, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductSubcategory''. Scan count 0, logical reads 10, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''ProductModel''. Scan count 0, logical reads 10, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Product''. Scan count 1, logical reads 14, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    The primary difference in performance was that you had to access the `UnitMeasure`
    table twice in order to gather data on the size and weight measurements for the
    product. While those columns weren’t required for the search that was run, the
    simplified TSQL does not discern between what you do and don’t need. It trades
    simplicity in design for complexity in performance.


    The result is that the same search required an additional 21 reads, and the subtree
    cost was 0.022. How did execution time compare? In a trial of 20 executions on
    my local server, the Dynamic SQL approach took an average of 40ms to run. The
    “simplified” version took 50ms. These decreases in performance may not seem immense
    as they are querying tables that are relatively small. If the `UnitMeasure` table
    had been larger, then the extra work would have also become more significant.
    Additionally, what if instead of four tables, you had to query 100? What if the
    possible columns that were options for the user to select from numbered in the
    thousands? If you were forced to read from 100 tables frequently when not needed,
    the results would be very noticeable on a production server.


    Also keep in mind that each search that accesses different tables will result
    in a unique execution plan. In this case, that behavior is encouraged, as you
    would prefer a smaller and leaner execution when fewer objects need to be queried.
    Extra plans will not be created for different parameter values, though, but only
    in scenarios where the text of the query itself is changed. This would happen
    whenever joins are added, when the `WHERE` clause is given additional parameters,
    or when columns are added to the result set.


    When a very large number of tables, columns, filters, or other variables are involved,
    the resulting search needs to be intelligent enough to not query objects that
    are unneeded. The necessary logic to accomplish this can be executed in application
    code or in SQL Server, but must be dealt with in some manner that eliminates the
    extra resource overhead needed for querying those unneeded objects. Dynamic SQL
    is an excellent tool to accomplish this in SQL Server, although thorough documentation
    and clean coding are required so that the increased performance is not gained
    at the expense of maintainability.


    ## Paging Performance


    Paging can be an expensive process, especially when used frequently. Interactive
    searches often require additional aggregate data that may not exist at the row
    level, such as:


    *   Total row count

    *   Current row number

    *   Sum, average, min, or max values for a column

    *   Page size

    *   Related or correlated results


    Returning this data in-line with a result set presents many questions, such as
    whether to calculate the aggregates separately or with window functions. This
    is an area where there are no singular answers. The size, distribution, and indexing
    of the overall data sources matter. In addition, knowing what percentage of the
    result set is returned can influence the decision making process. To begin this
    analysis, let’s review a handful of different ways in which you can page data
    and dig into the performance of each method.


    The query in Listing 6-7 returns 25 search results as the user is paging through.


    ```sql

    WITH CTE_PRODUCTS AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,

    SalesOrderHeader.SalesOrderID,

    SalesOrderHeader.Status,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.LineTotal

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    WHERE SalesOrderHeader.SalesPersonID = 277

    )

    SELECT

    *

    FROM CTE_PRODUCTS

    WHERE rownum BETWEEN 51 AND 75

    ```


    **Listing 6-7.** Basic Data Paging Using Row Numbers Based on Order Date


    The performance of this query is relatively straight-forward, as shown in Figure
    6-10.


    ![A371168_1_En_6_Fig10_HTML.jpg](A371168_1_En_6_Fig10_HTML.jpg)


    **Figure 6-10.** Execution plan for the basic paging TSQL in Listing 6-7


    ```

    Table ''SalesOrderDetail''. Scan count 9, logical reads 42, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    The resulting execution plan is composed of a seek on `SalesOrderDetail` and a
    scan on `SalesOrderHeader` as you collect data on a specific sales person’s orders.
    Note that the reads on `SalesOrderDetail` are relatively low. Paging can improve
    read performance on your storage system, as it ultimately returns much less data
    than the total amount at one time.


    This leads to an important consideration: Do you return all data at once, saving
    it for when the user clicks Next, or do you only return 25 rows and wait for the
    user to ask for more before returning it? This question can be addressed by adjusting
    the number of rows returned in the outermost `SELECT` statement. The following
    is the `STATISTICS` IO output for scenarios that return rows 51-200, 51-500, and
    51-1000 rows, respectively:


    ```

