    The results are in line with what you saw previously:


    *   CPU: 1858 microseconds

    *   Reads: 19

    *   Duration: 80ms (80,324 microseconds)

    *   Rows Returned: 295


    Note that the execution count is six here. By running the query a number of times,
    we can illustrate plan reuse when it is desired. Once a plan was found, it will
    be retained and reused until it is eventually released from the plan cache. Despite
    the execution count, the results are almost identical for each execution.


    So far there have been no surprises. Each execution has returned the expected
    data and the optimizer did a great job of choosing the correct plan in order to
    minimize resource utilization. Let’s clear the cache one last time and run the
    search proc twice in a row, first for a small range of product models and then
    with the large range:


    ```

    DBCC FREEPROCCACHE;

    EXEC get_products_by_model 120, 125;

    EXEC get_products_by_model 0, 10000;

    ```


    When you run this TSQL, the first execution performs exactly as it did earlier.
    A plan is chosen with an index scan on `Product` and an index seek on `ProductModel`.
    The resulting execution plan and IO statistics are also exactly the same. When
    you run the second execution of the stored procedure, something unusual happens:
    it performs very poorly! The performance metrics for the second product search
    are shown in Figure [8-7](#A371168_1_En_8_Chapter.html#Fig7) for the scenario
    where a wide range of IDs was passed in:


    ![A371168_1_En_8_Fig7_HTML.jpg](A371168_1_En_8_Fig7_HTML.jpg)


