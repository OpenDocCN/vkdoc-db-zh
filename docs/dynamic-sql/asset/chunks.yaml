    \n子树成本是在优化步骤中确定的成本的指示，让你了解查询的哪些部分执行成本最高。\n\n步骤之间的线条宽度将指示该步骤处理的行数的相对多少。将鼠标悬停在其中一条线上将提供有关该线所代表的数据传输的一些基本信息。图6-3显示了这些详细信息的示例。\n\
