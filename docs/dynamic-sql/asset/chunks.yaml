    \ sub-select from the final query. This leads one to ask if you shouldn’t just\
    \ calculate the row count separately and reuse it for as long as necessary, as\
    \ shown in Listing 6-9.\n\n## Data Paging by Calculating the Row Count Separately\n\
    \n```sql\nSELECT COUNT(*) AS total_result_count\nFROM Sales.SalesOrderHeader\n\
    INNER JOIN Sales.SalesOrderDetail\n    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\n\
    WHERE SalesOrderHeader.SalesPersonID = 277;\n\nWITH CTE_PRODUCTS AS (\n    SELECT\n\
    \        ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,\n        SalesOrderHeader.SalesOrderID,\n\
    \        SalesOrderHeader.Status,\n        SalesOrderHeader.OrderDate,\n     \
    \   SalesOrderHeader.ShipDate,\n        SalesOrderDetail.UnitPrice,\n        SalesOrderDetail.LineTotal\n\
    \    FROM Sales.SalesOrderHeader\n    INNER JOIN Sales.SalesOrderDetail\n    \
    \    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\n    WHERE\
    \ SalesOrderHeader.SalesPersonID = 277\n)\nSELECT\n    *\nFROM CTE_PRODUCTS\n\
    WHERE rownum BETWEEN 51 AND 75;\n```\n\nListing 6-9. Data Paging by Calculating\
    \ the Row Count as a Separate Operation\n\nThis alternative calculates the total\
    \ row count prior to fetching the actual data. This can be returned to the application\
