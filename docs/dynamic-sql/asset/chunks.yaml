    five conditionals, instead of 10. Consider this an alternative for smaller searches,
    or those where the data sets are straightforward. If the number of columns required
    per table were to increase in the future, this might need to be redesigned to
    maintain efficient query execution. Alternatively, for very small tables, `SELECT
    TableName.*` could also be used to further reduce the size of the stored procedure.
    The following TSQL shows this change for the `ProductModel` table:


    ```

    IF @show_product_model = 1 OR @show_catalog_description = 1 SELECT @sql_command
    = @sql_command + ''

    ProductModel.*,'';

    ```


    While simple, this would return an indeterminate number of columns, which could
    become a bottleneck in the future if tables continue to add new columns. In addition,
    with this syntax, you lose control over the column names, which could result in
    duplicates in a case where many tables use the same column names for different
    data elements. In `AdventureWorks`, you would have no way to differentiate between
    the product name and the product model name, as both columns are simply called
    `Name`. Please use caution whenever returning all columns from a table using `*`.
    This can be a useful tool for a small table with a very predictable and unchanging
    structure. On the other hand, if the table changes, this stored procedure could
    easily break or return additional unexpected data.


    The joins in this dynamic search only happen when a column is required from a
    table. This occurs if a column is explicitly requested via an input parameter
    bit, or if it is filtered on.


    The combination of dynamic joins, dynamic `SELECT` statement, and dynamic `WHERE`
    ensures that you do not access any table that isn’t required for the search grid.
    While the stored procedure has become larger, the command strings generated by
    it are shrinking, which is the primary goal of this exercise.


    ## Search Grid Considerations


    The stored procedure presented in the previous section is a huge leap forward
