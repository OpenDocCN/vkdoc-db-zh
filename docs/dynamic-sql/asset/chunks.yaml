    ```


    Be mindful when creating and accessing temp tables to ensure that they are available
    where needed and not out of scope when required later in your code. Also keep
    in mind that these temp tables are only available within your current SQL Server
    connection. If you attempt to access a temp table created in this connection from
    a separate application or connection, it will also be unavailable.


    Lastly, a temporary table will be automatically dropped when its connection is
    ended. It is a good practice to drop temp tables when your work with them is complete,
    but if you don’t, SQL Server will remove them for you. This automatic removal
    only occurs when the connection under which the temp table was created ends. If
    that connection is maintained indefinitely, then the temp table will also remain
    indefinitely. If a table with the same name were later declared within the same
    session, an error would result as the table already exists.'
