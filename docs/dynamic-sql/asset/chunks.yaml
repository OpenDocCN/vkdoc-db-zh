- fmt: '# SQL Server中的所有权链


    SQL Server中的所有权链是一种重要的安全机制。其核心在于，为了在一个拥有众多对象的数据库中实现高效且有意义的安全性，初始调用T-SQL的用户的权限会通过其内部调用的任何其他T-SQL传递下去。例如，当您执行一个存储过程（并且拥有执行的权限）时，其中调用的所有额外T-SQL也会成功执行。同样，一个拥有视图权限的用户，不需要同时拥有该视图所基于的所有底层对象的权限。一旦授予了对视图的访问权限，也就隐式地授予了对其中所有表、视图和函数的后续权限。


    所有权链极大地简化了SQL Server内部的安全性，允许您快速、安全地将权限委托给存储过程或视图，而不必同时授予对其中每个被引用对象的访问权限。对于安全管理员来说，这节省了大量时间，并允许他们基于逻辑或业务需求来提供权限，而无需为每个被引用的对象分配精细的安全设置。


    ## 动态SQL对所有权链的打破


    然而，所有权链规则有一个重大例外，那就是动态SQL。一旦执行动态SQL字符串，链就会被打破，执行将重置为初始调用者的权限。在之前的例子中，用户`VeryLimitedUser`
    能够访问`Person.Person`表而无需对其拥有显式权限，这要归功于所有权链。但在动态SQL执行的那一刻，权限就恢复为`VeryLimitedUser`自身在存储过程上下文之外的权限。因此，该用户由于对`Person.Person`没有显式权限而无法访问它，并抛出了错误。


    请注意，当所有权链被打破时，安全上下文并不会改变。无论所有权链的状态如何，上面针对当前用户安全上下文返回的结果都是相同的。由于该用户没有登录名，安全上下文被返回为一个系统生成的数字字符串。


    请务必留意所有权链，并确保执行存储过程的用户对该过程本身以及其中调用的任何对象或动态SQL都拥有足够的权限。


    通常，这种所有权链的断裂不会造成问题——前提是分配给用户的权限与该用户执行的任何T-SQL（无论是动态的还是其他形式的）所需的权限相似。仔细测试那些使用动态SQL的存储过程和T-SQL语句，可以确保结果符合预期，并且不会意外抛出权限错误。务必抓住机会，使用最终将在生产环境中运行该存储过程的登录名或用户对其进行测试。同时，在一个与生产环境足够相似的环境中进行测试，以便提前发现任何所有权链问题。通常，开发者在沙盒环境中工作，他们的个人登录名拥有广泛的权限。因此，所有代码都能以`sysadmin`或`db_owner`的身份成功运行，但当代码移到生产环境且权限受到更多限制时，可能就无法顺利运行了。


    # 动态切换安全上下文


    通常，所有权链带来的这些场景不会在数据库开发中造成问题。但在某些孤立场景中，您可能希望允许特定的T-SQL语句或存储过程在另一个用户的安全上下文下运行。在以下两种情况下，默认权限可能不够：一个用户权限太少，由于所有权链被打破或对特定对象权限不足而触发各种安全错误；或者，您可能有一个拥有远超所需权限的用户，并希望在执行敏感存储过程时减少其权限。


    有多种方法可以更改特定对象或执行的安全性，我们将通过示例逐一演示。请注意，这些赋值操作应该是罕见的例外，而非规则。如果您发现越来越多的存储过程被赋予动态特殊权限，那可能表明您的整体安全方法存在缺陷。考虑为应用程序用户重新分配一组更合适的数据库角色，或者在必要时，创建一个提供所需一切权限的新角色。在T-SQL中手动调整权限难以记录和跟踪，因此会大大增加长期的复杂性。尽量减少这类例外情况将大大提高可维护性，并使理解代码更容易，尤其是在排查错误或调查异常行为时。


    之前展示过一个更改权限的例子，那就是使用 `EXECUTE AS` 来更改用户的安全上下文。这要求执行上下文更改的用户拥有模仿目标用户所需的权限。这一点很重要；否则，一个权限极小的用户可能会尝试模仿`sysadmin`或其他具有广泛服务器访问权限的账户。考虑以下T-SQL：


    ```sql

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    EXECUTE AS USER = ''VeryLimitedUser'';

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    ```


    这里，选择了一些关于当前用户的基本信息，包括原始登录名，它将返回此连接的初始登录名，无论之后权限如何变化。初始权限如下所示：


    ```

    Edward, dbo, Edward

    ```


    切换到受限用户后，当前安全信息变为：


    ```

    S-1-9-3-609289169-1216273702-1805054397-27368224, VeryLimitedUser, Edward

    ```


    这表明登录名和用户已更改为受限访问的测试用户，但原始登录名仍然是Edward。


    ```sql

    EXECUTE AS USER = ''Edward'';

    GO

    ```


    尝试切换回Edward的上下文将失败，并返回以下错误：


    ```

    Msg 15517, Level 16, State 1, Line 48

    Cannot execute as the database principal because the principal "Edward" does not
    exist, this type of principal cannot be impersonated, or you do not have permission.

    ```


    现在您正以`VeryLimitedUser`的身份执行，切换到Edward失败，因为该用户没有模仿系统管理员所需的权限。在此连接上返回到以Edward身份执行的唯一方法是使用`REVERT`命令：


    ```sql

    REVERT;

    GO

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    ```


    现在安全上下文回到了起点：


    ```

    Edward, dbo, Edward

    ```


    如果您想更改安全上下文并且之后不能再更改，`WITH NO REVERT`选项可以实现这一点：


    ```sql

    EXECUTE AS USER = ''VeryLimitedUser'' WITH NO REVERT;

    ```


    一旦添加了这个选项，权限就被锁定在`VeryLimitedUser`，直到此存储过程或连接结束。任何尝试`EXECUTE AS`另一个用户或恢复（revert）的操作都将失败。'
  raw: 'The phenomenon demonstrated here is called ownership chaining. In order to
    facilitate efficient and meaningful security within a database with many objects,
    the permissions of the initial caller of TSQL are passed along through any additional
    TSQL within it. For example, when you execute a stored procedure (and have the
    permissions to do so), any additional TSQL called from within will also execute
    successfully. Similarly, a user with permissions to a view does not require permissions
    to all of the underlying objects as well. Once access to the view is granted,
    all of the subsequent permissions to tables, views, and functions beneath it are
    implicitly granted as well.


    Ownership chaining greatly simplifies security within SQL Server and allows you
    to quickly and safely delegate permissions to a stored procedure or view without
    also having to grant access to every single object referenced within it. For security
    administrators, this is a huge time-saver, and allows them to provide permissions
    based on logical or business need, without having to assign granular security
    for every referenced object.


    There is one big exception to the rules of ownership chaining, though, and that
    is Dynamic SQL. As soon as a Dynamic SQL string is executed, the chain is broken,
    and execution resets to the permissions of the initial caller. In the previous
    example, `VeryLimitedUser` was able to access `Person.Person` without having explicit
    permissions to it, thanks to ownership chaining. The moment the Dynamic SQL was
    executed, permissions were reverted back to `VeryLimitedUser`, outside of the
    context of the stored procedure itself. As a result, the user, with no explicit
    permissions to `Person.Person`, was unable to access it and an error was thrown.


    Note that security contexts do not change when ownership chaining is broken. The
    same result was returned for the current user security context above, regardless
    of the state of the ownership chain. Since the user has no login, the security
    context is returned as a system-generated numeric string instead.


    Be aware of ownership chaining and ensure that the user who executes a stored
    procedure has adequate permissions for the proc itself, as well as any objects
    or Dynamic SQL called from within.


    Typically, this break of the ownership chain will not pose a problem, assuming
    the permissions that are assigned to the user are similar to those that are required
    for any TSQL (dynamic or otherwise) executed by it. Careful testing of stored
    procedures and TSQL statements that utilize Dynamic SQL can ensure that the results
    are desired and that permission errors are not thrown unexpectedly. Always take
    the opportunity to test a newly written stored procedure using the login or user
    who will ultimately run it in production. Also test in an environment that is
    similar enough to production that you would catch any ownership chaining problems
    ahead of time. Oftentimes, developers work in sandbox environments with extensive
    permissions on their personal logins. As a result, everything runs successfully
    as a sysadmin or `db_owner`, but might not run well when the code is moved to
    production and permissions are more limited.


    ## Changing Security Context On-the-Fly


    Typically, these scenarios presented with ownership chaining will not pose problems
    in database development. It is possible, though, that in an isolated scenario,
    you’ll want to allow a specific TSQL statement or stored procedure to run under
    a different user’s security context. One of two situations may arise in which
    the default permissions are not adequate. A user could have too few permissions
    and is triggering a variety of security errors due to the breaking of ownership
    chaining, or inadequate permissions for a specific object. Alternatively, you
    may have a user with far more permissions than are needed and want to reduce them
    when executing a sensitive stored procedure.


    There are a variety of ways to change security for a given object or execution,
    each of which we will demonstrate with examples. Please note that these assignments
    should be the rare exception, not the rule. If you find that more and more stored
    procedures are being given special permissions on-the-fly, it may be a sign that
    your overall security methodology is flawed. Consider reassigning the application
    user to a better set of database roles, or if necessary, create a new role that
    provides everything needed. Manually adjusting permissions in TSQL is difficult
    to document and track, and as a result will greatly increase complexity over time.
    Minimizing these exceptions will greatly increase maintainability and make understanding
    your code easier, especially when troubleshooting bugs or investigating unusual
    behavior.


    One example of changing permissions was presented previously, and that is to change
    the security context of a user by using `EXECUTE` `AS` . This requires that the
    user executing the context change to have the permissions necessary to impersonate
    the user. This is important; otherwise, a user with minimal permissions could
    try to impersonate a sysadmin or other account with extensive server access. Consider
    the following TSQL:


    ```

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    EXECUTE AS USER = ''VeryLimitedUser'';

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    ```


    Here, some basic information about the current user is selected, including the
    original login, which will return the initial login used for this connection,
    regardless of how permissions have changed since then. The initial permissions
    look like this:


    ```

    Edward, dbo, Edward

    ```


    After switching to the limited user, the current security info has changed to
    the following:


    ```

    S-1-9-3-609289169-1216273702-1805054397-27368224, VeryLimitedUser, Edward

    ```


    This shows that the login and user have changed to the limited access test user,
    but the original login is still Edward.


    ```

    EXECUTE AS USER = ''Edward'';

    GO

    ```


    Attempting to switch context back to Edward will fail and return the following
    error:


    ```

    Msg 15517, Level 16, State 1, Line 48

    Cannot execute as the database principal because the principal "Edward" does not
    exist, this type of principal cannot be impersonated, or you do not have permission.

    ```


    Now that you are executing as `VeryLimitedUser`, switching to Edward fails as
    this user does not have the necessary permissions to impersonate a system administrator.
    The only way to return to executing as Edward on this connection is to use the
    `REVERT` command:


    ```

    REVERT;

    GO

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    ```


    Now the security context is back where it started:


    ```

    Edward, dbo, Edward

    ```


    If you want to change security context and not be able to change again, the `WITH
    NO REVERT` option allows for this:


    ```

    EXECUTE AS USER = ''VeryLimitedUser'' WITH NO REVERT;

    ```


    As soon as this additional option is added, permissions are locked into `VeryLimitedUser`
    for the remainder of this stored procedure or connection. Any attempt to `EXECUTE
    AS` another user or revert will fail:'
  trans: '

    # SQL Server 中的所有权链


    SQL Server 中的所有权链是一种重要的安全机制。其核心在于，为了在一个拥有众多对象的数据库中实现高效且有意义的安全性，初始调用 T-SQL 的用户的权限会通过其内部调用的任何其他
    T-SQL 传递下去。例如，当您执行一个存储过程（并且拥有执行的权限）时，其中调用的所有额外 T-SQL 也会成功执行。同样，一个拥有视图权限的用户，不需要同时拥有该视图所基于的所有底层对象的权限。一旦授予了对视图的访问权限，也就隐式地授予了对其中所有表、视图和函数的后续权限。


    所有权链极大地简化了 SQL Server 内部的安全性，允许您快速、安全地将权限委托给存储过程或视图，而不必同时授予对其中每个被引用对象的访问权限。对于安全管理员来说，这节省了大量时间，并允许他们基于逻辑或业务需求来提供权限，而无需为每个被引用的对象分配精细的安全设置。


    ## 动态 SQL 对所有权链的打破


    然而，所有权链规则有一个重大例外，那就是动态 SQL。一旦执行动态 SQL 字符串，链就会被打破，执行将重置为初始调用者的权限。在之前的例子中，用户`VeryLimitedUser`
    能够访问`Person.Person`表而无需对其拥有显式权限，这要归功于所有权链。但在动态 SQL 执行的那一刻，权限就恢复为`VeryLimitedUser`自身在存储过程上下文之外的权限。因此，该用户由于对`Person.Person`没有显式权限而无法访问它，并抛出了错误。


    请注意，当所有权链被打破时，安全上下文并不会改变。无论所有权链的状态如何，上面针对当前用户安全上下文返回的结果都是相同的。由于该用户没有登录名，安全上下文被返回为一个系统生成的数字字符串。


    请务必留意所有权链，并确保执行存储过程的用户对该过程本身以及其中调用的任何对象或动态 SQL 都拥有足够的权限。


    通常，这种所有权链的断裂不会造成问题——前提是分配给用户的权限与该用户执行的任何 T-SQL（无论是动态的还是其他形式的）所需的权限相似。仔细测试那些使用动态
    SQL 的存储过程和 T-SQL 语句，可以确保结果符合预期，并且不会意外抛出权限错误。务必抓住机会，使用最终将在生产环境中运行该存储过程的登录名或用户对其进行测试。同时，在一个与生产环境足够相似的环境中进行测试，以便提前发现任何所有权链问题。通常，开发者在沙盒环境中工作，他们的个人登录名拥有广泛的权限。因此，所有代码都能以`sysadmin`或`db_owner`的身份成功运行，但当代码移到生产环境且权限受到更多限制时，可能就无法顺利运行了。


    # 动态切换安全上下文


    通常，所有权链带来的这些场景不会在数据库开发中造成问题。但在某些孤立场景中，您可能希望允许特定的 T-SQL 语句或存储过程在另一个用户的安全上下文下运行。在以下两种情况下，默认权限可能不够：一个用户权限太少，由于所有权链被打破或对特定对象权限不足而触发各种安全错误；或者，您可能有一个拥有远超所需权限的用户，并希望在执行敏感存储过程时减少其权限。


    有多种方法可以更改特定对象或执行的安全性，我们将通过示例逐一演示。请注意，这些赋值操作应该是罕见的例外，而非规则。如果您发现越来越多的存储过程被赋予动态特殊权限，那可能表明您的整体安全方法存在缺陷。考虑为应用程序用户重新分配一组更合适的数据库角色，或者在必要时，创建一个提供所需一切权限的新角色。在
    T-SQL 中手动调整权限难以记录和跟踪，因此会大大增加长期的复杂性。尽量减少这类例外情况将大大提高可维护性，并使理解代码更容易，尤其是在排查错误或调查异常行为时。


    之前展示过一个更改权限的例子，那就是使用 `EXECUTE AS` 来更改用户的安全上下文。这要求执行上下文更改的用户拥有模仿目标用户所需的权限。这一点很重要；否则，一个权限极小的用户可能会尝试模仿`sysadmin`或其他具有广泛服务器访问权限的账户。考虑以下
    T-SQL：


    ```sql

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    EXECUTE AS USER = ''VeryLimitedUser'';

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    ```


    这里，选择了一些关于当前用户的基本信息，包括原始登录名，它将返回此连接的初始登录名，无论之后权限如何变化。初始权限如下所示：


    ```

    Edward, dbo, Edward

    ```


    切换到受限用户后，当前安全信息变为：


    ```

    S-1-9-3-609289169-1216273702-1805054397-27368224, VeryLimitedUser, Edward

    ```


    这表明登录名和用户已更改为受限访问的测试用户，但原始登录名仍然是 Edward。


    ```sql

    EXECUTE AS USER = ''Edward'';

    GO

    ```


    尝试切换回 Edward 的上下文将失败，并返回以下错误：


    ```

    Msg 15517, Level 16, State 1, Line 48

    Cannot execute as the database principal because the principal "Edward" does not
    exist, this type of principal cannot be impersonated, or you do not have permission.

    ```


    现在您正以`VeryLimitedUser`的身份执行，切换到 Edward 失败，因为该用户没有模仿系统管理员所需的权限。在此连接上返回到以 Edward
    身份执行的唯一方法是使用`REVERT`命令：


    ```sql

    REVERT;

    GO

    SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()
    AS ORIGINAL_LOGIN;

    GO

    ```


    现在安全上下文回到了起点：


    ```

    Edward, dbo, Edward

    ```


    如果您想更改安全上下文并且之后不能再更改，`WITH NO REVERT`选项可以实现这一点：


    ```sql

    EXECUTE AS USER = ''VeryLimitedUser'' WITH NO REVERT;

    ```


    一旦添加了这个选项，权限就被锁定在`VeryLimitedUser`，直到此存储过程或连接结束。任何尝试`EXECUTE AS`另一个用户或恢复（revert）的操作都将失败。

    '
- fmt: '```

    REVERT;

    GO

    EXECUTE AS USER = ''Edward'';

    ```


    Running either of these statements will return the following errors:


    ```

    Msg 15196, Level 16, State 1, Line 55

    The current security context is non-revertible. The "Revert" statement failed.

    Msg 15517, Level 16, State 1, Line 56

    Cannot execute as the database principal because the principal "Edward" does not
    exist, this type of principal cannot be impersonated, or you do not have permission.

    ```


    ## Using REVERT and WITH NO REVERT


    The errors remind you that `REVERT` will not work and you can’t switch users.
    `WITH NO REVERT` is an excellent way to ensure that an entire stored procedure
    or connection is made with a single user and that there is no way for anyone to
    try to acquire more permissions than this. The only way to end an `EXECUTE AS`
    statement with this option is for the stored procedure to complete or the connection
    to end or be terminated.


    ## EXECUTE AS OWNER


    The next way to alter permissions is to assign a specific security context to
    a stored procedure. When this is done, that stored proc will always execute as
    this user when it executes, regardless of the user who calls it, as shown in Listing
    4-2.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''ownership_chaining_example'')

    BEGIN

    DROP PROCEDURE dbo.ownership_chaining_example;

    END

    GO

    CREATE PROCEDURE dbo.ownership_chaining_example

    WITH EXECUTE AS OWNER

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Select the current security context, for reference

    SELECT SUSER_SNAME() AS security_context_no_dynamic_sql;

    SELECT COUNT(*) AS table_count_no_dynamic_sql FROM Person.Person;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT SUSER_SNAME() AS security_context_in_dynamic_sql;

    SELECT COUNT(*) AS table_count_in_dynamic_sql FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    END

    GO

    ```

    Listing 4-2. Stored Procedure Demonstrating `EXECUTE AS OWNER`


    The `EXECUTE AS OWNER` option will cause the stored procedure to always execute
    with the permissions of its owner, regardless of which user runs it. This allows
    a user who normally would not have permission to access the objects internal to
    the stored procedure to run it. Alternatively, a user with more permissions than
    the owner will still execute it with the owner’s permissions. The owner of an
    object is typically its creator, unless changed at a future time.


    ## EXECUTE AS CALLER


    A potentially more restrictive and useful permissions change is to force a stored
    procedure to execute within the context of its caller. This is similar to breaking
    the ownership chain, as was shown in the Dynamic SQL in Listing 4-2. `EXECUTE
    AS CALLER` accomplishes this, as shown in Listing 4-3.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''ownership_chaining_example'')

    BEGIN

    DROP PROCEDURE dbo.ownership_chaining_example;

    END

    GO

    CREATE PROCEDURE dbo.ownership_chaining_example

    WITH EXECUTE AS CALLER

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Select the current security context, for reference

    SELECT SUSER_SNAME() AS security_context_no_dynamic_sql;

    SELECT COUNT(*) AS table_count_no_dynamic_sql FROM Person.Person;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT SUSER_SNAME() AS security_context_in_dynamic_sql;

    SELECT COUNT(*) AS table_count_in_dynamic_sql FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    END

    GO

    ```

    Listing 4-3. Stored Procedure Demonstrating `EXECUTE AS CALLER`


    When executed, the stored procedure will run under the permissions of whichever
    user calls it. As a result, all objects accessed within it will also check that
    user’s permissions. This ensures that the user who calls a stored procedure has
    permissions on all of the objects referenced from within.


    ## Handling Dynamic SQL


    It is important to remember that, regardless of any of these security adjustments,
    Dynamic SQL will still break the ownership chain. The only way to ensure that
    Dynamic SQL executes successfully is to run the calling TSQL with a user who has
    adequate permissions or to grant more granular permissions over the specific execution,
    which can be accomplished as shown in Listing 4-4.


    ```sql

    CREATE LOGIN EdwardJr WITH PASSWORD = ''AntiSemiJoin17'', DEFAULT_DATABASE = AdventureWorks2014;

    GO

    USE AdventureWorks2014

    GO

    CREATE USER EdwardJr FROM LOGIN EdwardJr;

    EXEC sp_addrolemember ''db_owner'', ''EdwardJr'';

    GO

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''ownership_chaining_example'')

    BEGIN

    DROP PROCEDURE dbo.ownership_chaining_example;

    END

    GO

    CREATE PROCEDURE dbo.ownership_chaining_example

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Select the current security context, for reference

    SELECT SUSER_SNAME() AS security_context_no_dynamic_sql;

    SELECT COUNT(*) AS table_count_no_dynamic_sql FROM Person.Person;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''EXECUTE AS LOGIN = ''''EdwardJr'''';

    SELECT SUSER_SNAME() AS security_context_in_dynamic_sql;

    SELECT COUNT(*) AS table_count_in_dynamic_sql FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    END

    GO

    ```

    Listing 4-4. Stored Procedure Embedding a Security Context Change in Dynamic SQL


    This code explicitly changes the security context within the Dynamic SQL. This
    is another way to ensure a specific set of permissions once the ownership chain
    has been broken. In this case, `EdwardJr` is a new user with read, write, and
    execute permissions on all objects within this `AdventureWorks` database. This
    user has no other server permissions. You could execute this stored procedure
    as the sysadmin Edward:


    ```sql

    EXEC dbo.ownership_chaining_example;

    ```


    The results are shown in Figure 4-3.


    ![A371168_1_En_4_Fig3_HTML.jpg](A371168_1_En_4_Fig3_HTML.jpg)

    Figure 4-3. Changing security context when executing Dynamic SQL


    Note that the security context within the Dynamic SQL is no longer the same as
    the stored procedure caller (Edward), but has been changed to the new user EdwardJr,
    which has far fewer permissions than a sysadmin. This is a great way to set a
    predictable level of permissions for Dynamic SQL, when the breaking of the ownership
    chain is a frequent problem.


    ## Handling Permission Errors


    If users with limited permissions attempt to run this stored procedure, they will
    run into trouble:


    ```sql

    GRANT EXECUTE ON dbo.ownership_chaining_example TO VeryLimitedRole;

    EXECUTE AS USER = ''VeryLimitedUser'';

    EXEC dbo.ownership_chaining_example;

    REVERT;

    GO

    ```


    This code grants execute permissions to `VeryLimitedUser`, switches security context,
    and runs the stored procedure. The initial `SELECT` succeeds as this user has
    adequate permissions via the `GRANT EXECUTE`, but the moment you attempt to switch
    to EdwardJr, an error is thrown:


    ```

    Msg 15406, Level 16, State 1, Line 142

    Cannot execute as the server principal because the principal "EdwardJr" does not
    exist, this type of principal cannot be impersonated, or you do not have permission.

    ```


    The limited user does not have the necessary permissions to impersonate EdwardJr,
    or any other user for that matter, and is stopped as soon as the permissions change
    is attempted. This behavior may be desirable if you want to limit who can execute
    a specific block of Dynamic SQL. As always, let the business needs for your code
    dictate the minimal level of permissions required for your data access and adjust
    as needed along the way, if necessary.'
  raw: '```

    REVERT;

    GO

    EXECUTE AS USER = ''Edward'';

    ```


    Running either of these statements will return the following errors:


    ```

    Msg 15196, Level 16, State 1, Line 55

    The current security context is non-revertible. The "Revert" statement failed.

    Msg 15517, Level 16, State 1, Line 56

    Cannot execute as the database principal because the principal "Edward" does not
    exist, this type of principal cannot be impersonated, or you do not have permission.

    ```


    The errors remind you that `REVERT` will not work and you can’t switch users.
    `WITH NO REVERT` is an excellent way to ensure that an entire stored procedure
    or connection is made with a single user and that there is no way for anyone to
    try to acquire more permissions than this. The only way to end an `EXECUTE AS`
    statement with this option is for the stored procedure to complete or the connection
    to end or be terminated.


    The next way to alter permissions is to assign a specific security context to
    a stored procedure. When this is done, that stored proc will always execute as
    this user when it executes, regardless of the user who calls it, as shown in Listing
    [4-2](#A371168_1_En_4_Chapter.html#Par67).


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''ownership_chaining_example'')

    BEGIN

    DROP PROCEDURE dbo.ownership_chaining_example;

    END

    GO

    CREATE PROCEDURE dbo.ownership_chaining_example

    WITH EXECUTE AS OWNER

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Select the current security context, for reference

    SELECT SUSER_SNAME() AS security_context_no_dynamic_sql;

    SELECT COUNT(*) AS table_count_no_dynamic_sql FROM Person.Person;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT SUSER_SNAME() AS security_context_in_dynamic_sql;

    SELECT COUNT(*) AS table_count_in_dynamic_sql FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    END

    GO

    Listing 4-2.

    Stored Procedure Demonstrating EXECUTE AS OWNER

    ```


    The `EXECUTE AS OWNER` option will cause the stored procedure to always execute
    with the permissions of its owner, regardless of which user runs it. This allows
    a user who normally would not have permission to access the objects internal to
    the stored procedure to run it. Alternatively, a user with more permissions than
    the owner will still execute it with the owner’s permissions. The owner of an
    object is typically its creator, unless changed at a future time.


    A potentially more restrictive and useful permissions change is to force a stored
    procedure to execute within the context of its caller. This is similar to breaking
    the ownership chain, as was shown in the Dynamic SQL in Listing [4-2](#A371168_1_En_4_Chapter.html#Par67).
    `EXECUTE AS CALLER` accomplishes this, as shown in Listing [4-3](#A371168_1_En_4_Chapter.html#Par70).


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''ownership_chaining_example'')

    BEGIN

    DROP PROCEDURE dbo.ownership_chaining_example;

    END

    GO

    CREATE PROCEDURE dbo.ownership_chaining_example

    WITH EXECUTE AS CALLER

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Select the current security context, for reference

    SELECT SUSER_SNAME() AS security_context_no_dynamic_sql;

    SELECT COUNT(*) AS table_count_no_dynamic_sql FROM Person.Person;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT SUSER_SNAME() AS security_context_in_dynamic_sql;

    SELECT COUNT(*) AS table_count_in_dynamic_sql FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    END

    GO

    Listing 4-3.

    Stored Procedure Demonstrating EXECUTE AS CALLER

    ```


    When executed, the stored procedure will run under the permissions of whichever
    user calls it. As a result, all objects accessed within it will also check that
    user’s permissions. This ensures that the user who calls a stored procedure has
    permissions on all of the objects referenced from within.


    It is important to remember that, regardless of any of these security adjustments,
    Dynamic SQL will still break the ownership chain. The only way to ensure that
    Dynamic SQL executes successfully is to run the calling TSQL with a user who has
    adequate permissions or to grant more granular permissions over the specific execution,
    which can be accomplished as shown in Listing [4-4](#A371168_1_En_4_Chapter.html#Par73).


    ```

    CREATE LOGIN EdwardJr WITH PASSWORD = ''AntiSemiJoin17'', DEFAULT_DATABASE = AdventureWorks2014;

    GO

    USE AdventureWorks2014

    GO

    CREATE USER EdwardJr FROM LOGIN EdwardJr;

    EXEC sp_addrolemember ''db_owner'', ''EdwardJr'';

    GO

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''ownership_chaining_example'')

    BEGIN

    DROP PROCEDURE dbo.ownership_chaining_example;

    END

    GO

    CREATE PROCEDURE dbo.ownership_chaining_example

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Select the current security context, for reference

    SELECT SUSER_SNAME() AS security_context_no_dynamic_sql;

    SELECT COUNT(*) AS table_count_no_dynamic_sql FROM Person.Person;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''EXECUTE AS LOGIN = ''''EdwardJr'''';

    SELECT SUSER_SNAME() AS security_context_in_dynamic_sql;

    SELECT COUNT(*) AS table_count_in_dynamic_sql FROM Person.Person'';

    EXEC sp_executesql @sql_command;

    END

    GO

    Listing 4-4.

    Stored Procedure Embedding a Security Context Change in Dynamic SQL

    ```


    This code explicitly changes the security context within the Dynamic SQL. This
    is another way to ensure a specific set of permissions once the ownership chain
    has been broken. In this case, `EdwardJr` is a new user with read, write, and
    execute permissions on all objects within this `AdventureWorks` database. This
    user has no other server permissions. You could execute this stored procedure
    as the sysadmin Edward:


    ```

    EXEC dbo.ownership_chaining_example;

    ```


    The results are shown in Figure [4-3](#A371168_1_En_4_Chapter.html#Fig3).


    ![A371168_1_En_4_Fig3_HTML.jpg](A371168_1_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    Changing security context when executing Dynamic SQL


    Note that the security context within the Dynamic SQL is no longer the same as
    the stored procedure caller (Edward), but has been changed to the new user EdwardJr,
    which has far fewer permissions than a sysadmin. This is a great way to set a
    predictable level of permissions for Dynamic SQL, when the breaking of the ownership
    chain is a frequent problem. If users with limited permissions attempt to run
    this stored procedure, they will run into trouble:


    ```

    GRANT EXECUTE ON dbo.ownership_chaining_example TO VeryLimitedRole;

    EXECUTE AS USER = ''VeryLimitedUser'';

    EXEC dbo.ownership_chaining_example;

    REVERT;

    GO

    ```


    This code grants execute permissions to `VeryLimitedUser`, switches security context,
    and runs the stored procedure. The initial `SELECT` succeeds as this user has
    adequate permissions via the `GRANT EXECUTE`, but the moment you attempt to switch
    to EdwardJr, an error is thrown:


    ```

    Msg 15406, Level 16, State 1, Line 142

    Cannot execute as the server principal because the principal "EdwardJr" does not
    exist, this type of principal cannot be impersonated, or you do not have permission.

    ```


    The limited user does not have the necessary permissions to impersonate EdwardJr,
    or any other user for that matter, and is stopped as soon as the permissions change
    is attempted. This behavior may be desirable if you want to limit who can execute
    a specific block of Dynamic SQL. As always, let the business needs for your code
    dictate the minimal level of permissions required for your data access and adjust
    as needed along the way, if necessary.'
