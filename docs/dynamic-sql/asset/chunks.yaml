    Metrics returned by dbo.read_query_plan_cache for a parameterized search with
    paging


    ```

    EXEC dbo.read_query_plan_cache ''CTE_PRODUCTS'';

    ```


    Note that since some parameters were defined locally for the Dynamic SQL, the
    stored procedure itself was not entered into the plan cache—instead only the Dynamic
    SQL statement was. The contents of `QueryText` are shown in Listing [8-4](#A371168_1_En_8_Chapter.html#Par67).


    ```

    (@SalesPersonID INT, @RowCount INT, @Offset INT)

    WITH CTE_PRODUCTS AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,

    SalesOrderHeader.SalesOrderID,

    SalesOrderHeader.Status,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.LineTotal

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    WHERE SalesOrderHeader.SalesPersonID = @SalesPersonID

    )

    SELECT

    *

    FROM CTE_PRODUCTS

    WHERE rownum BETWEEN @Offset AND @Offset + @RowCount;

    Listing 8-4.

    Resulting Query Text as Executed in the Dynamic Search with Paging

    ```


    The desired effect is still achieved in that the query that you intend to run
    is fully parameterized and an execution plan will be reused whenever the stored
    procedure is executed. Searching for it in cache, though, requires entering some
    text from the `SELECT` query, rather than the stored procedure name.'
  trans: "\n```\nIF EXISTS (SELECT * FROM `sys.procedures` WHERE `procedures.name`\
    \ = 'get_sales_orders_by_sales_person')\nBEGIN\n    DROP PROCEDURE `dbo.get_sales_orders_by_sales_person`;\n\
    END\nGO\nCREATE PROCEDURE `dbo.get_sales_orders_by_sales_person`\n    `@SalesPersonID`\
    \ INT, `@RowCount` INT, `@Offset` INT\nAS\nBEGIN\n    DECLARE `@sql_command` NVARCHAR(MAX);\n\
    \    DECLARE `@parameter_list` NVARCHAR(MAX) = '@SalesPersonID INT, @RowCount\
    \ INT, @Offset INT';\n    -- 将偏移量加 1 以获得正确的起始行\n    SELECT `@Offset` = `@Offset`\
    \ + 1;\n    SELECT `@sql_command` = '\n        WITH CTE_PRODUCTS AS (\n      \
    \      SELECT\n                ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,\n\
    \                SalesOrderHeader.SalesOrderID,\n                SalesOrderHeader.Status,\n\
    \                SalesOrderHeader.OrderDate,\n                SalesOrderHeader.ShipDate,\n\
    \                SalesOrderDetail.UnitPrice,\n                SalesOrderDetail.LineTotal\n\
    \            FROM Sales.SalesOrderHeader\n            INNER JOIN Sales.SalesOrderDetail\n\
    \                ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\n\
    \            WHERE SalesOrderHeader.SalesPersonID = @SalesPersonID\n        )\n\
    \        SELECT\n            *\n        FROM CTE_PRODUCTS\n        WHERE rownum\
    \ BETWEEN @Offset AND @Offset + @RowCount;';\n    EXEC `sp_executesql` `@sql_command`,\
    \ `@parameter_list`, `@SalesPersonID`, `@RowCount`, `@Offset`;\nEND\n```\n**代码清单\
    \ 8-3.** 演示参数嗅探的搜索存储过程\n\n这个存储过程是完全参数化的，允许你在执行时更改输入，而无需调整动态 SQL。让我们首先查看涉及新销售人员的搜索性能：\n\
    \n```\n`DBCC FREEPROCCACHE`;\n`EXEC dbo.get_sales_orders_by_sales_person 1, 1000,\
    \ 0`;\n```\n\n首先清除查询计划缓存，以确保结果不受此服务器上执行的任何其他查询的影响。设置附加参数以从结果集（包含 27,659 行）返回 1,000\
    \ 行，从第 1 行开始。此执行的性能指标见图 8-9。\n\n![A371168_1_En_8_Fig9_HTML.jpg](img/A371168_1_En_8_Fig9_HTML.jpg)\n\
    **图 8-9.** 使用参数化分页的搜索的执行计划\n\n```\nTable 'SalesOrderDetail'. Scan count 1000,\
    \ logical reads 3231, physical reads 0, read-ahead reads 0, lob logical reads\
    \ 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'SalesOrderHeader'.\
    \ Scan count 1, logical reads 689, physical reads 0, read-ahead reads 0, lob logical\
    \ reads 0, lob physical reads 0, lob read-ahead reads 0.\n```\n\n此外，计划缓存读取存储过程返回的执行指标见图\
    \ 8-10：\n\n![A371168_1_En_8_Fig10_HTML.jpg](img/A371168_1_En_8_Fig10_HTML.jpg)\n\
    **图 8-10.** `dbo.read_query_plan_cache` 针对带分页的参数化搜索返回的指标\n\n```\n`EXEC dbo.read_query_plan_cache\
    \ 'CTE_PRODUCTS'`;\n```\n\n请注意，由于为动态 SQL 本地定义了一些参数，存储过程本身并未进入计划缓存——只有动态 SQL 语句被缓存。`QueryText`\
    \ 的内容如代码清单 8-4 所示。\n\n```\n(@SalesPersonID INT, @RowCount INT, @Offset INT)\n\
    WITH CTE_PRODUCTS AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER BY OrderDate\
    \ ASC) AS rownum,\n        SalesOrderHeader.SalesOrderID,\n        SalesOrderHeader.Status,\n\
    \        SalesOrderHeader.OrderDate,\n        SalesOrderHeader.ShipDate,\n   \
    \     SalesOrderDetail.UnitPrice,\n        SalesOrderDetail.LineTotal\n    FROM\
    \ Sales.SalesOrderHeader\n    INNER JOIN Sales.SalesOrderDetail\n        ON SalesOrderHeader.SalesOrderID\
    \ = SalesOrderDetail.SalesOrderID\n    WHERE SalesOrderHeader.SalesPersonID =\
    \ @SalesPersonID\n)\nSELECT\n    *\nFROM CTE_PRODUCTS\nWHERE rownum BETWEEN @Offset\
    \ AND @Offset + @RowCount;\n```\n**代码清单 8-4.** 在带分页的动态搜索中执行时产生的查询文本\n\n预期的效果仍然达成：你打算运行的查询是完全参数化的，并且无论何时执行存储过程，执行计划都会被重用。然而，要在缓存中搜索它，需要输入\
    \ `SELECT` 查询中的某些文本，而不是存储过程名称。\n"
- fmt: 'All of these results show that the optimizer chose a clustered index scan
    on `SalesOrderHeader` and a clustered index seek on `SalesOrderDetail`. 3,926
    reads were needed in order to query this large data set and the results from the
    query metrics are as follows:


    *   CPU: 14ms (13,726 microseconds)

    *   Reads: 4062

    *   Duration: 115ms (115,309 microseconds)

    *   Rows Returned: 1000


    You could clear the cache and repeat this exercise for a salesperson with far
    fewer sales records:


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_sales_orders_by_sales_person 285, 1000, 0;

    ```


    The result set for this execution is 245 rows instead of 27,659. As such, limiting
    the result set to 1,000 rows will have no effect on what is returned by SQL Server.
    The performance metrics for this execution are shown in Figure [8-11](#A371168_1_En_8_Chapter.html#Fig11).


    ![A371168_1_En_8_Fig11_HTML.jpg](A371168_1_En_8_Fig11_HTML.jpg)

    Figure 8-11. Execution plan for a parameterized paged search with a small result
    set


    ```

    Table ''SalesOrderDetail''. Scan count 16, logical reads 53, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 50, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    Only 103 reads were required to return this smaller data set, and the optimizer
    chose to use an index seek on `SalesOrderHeader` and a clustered index seek on
    `SalesOrderDetail`. Despite the fact that a key lookup is an expensive random
    IO operation, the optimizer still chose that over the alternative of scanning
    the entire table. Let’s review the additional query stats for this execution,
    as shown in Figure [8-12](#A371168_1_En_8_Chapter.html#Fig12).


    ![A371168_1_En_8_Fig12_HTML.jpg](A371168_1_En_8_Fig12_HTML.jpg)

    Figure 8-12. Metrics returned by dbo.read_query_plan_cache for a parameterized
    search with paging and a small result set


    ```

    EXEC dbo.read_query_plan_cache ''CTE_PRODUCTS'';

    ```


    This data agrees with everything reviewed so far. This execution requires significantly
    fewer reads to return fewer rows and does so a bit faster than before.


    *   CPU: 2127 microseconds

    *   Reads: 103

    *   Duration: 95ms (94,877 microseconds)

    *   Rows Returned: 245


    Now that you have established a baseline for the performance of this stored procedure
    with regards to large vs. small result sets, you can compare parameter sniffing
    for a scenario that is the opposite of the one reviewed earlier. You would clear
    the query plan cache one last time and run the sales order search for the salesperson
    with the very large number of orders assigned to them:


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_sales_orders_by_sales_person 1, 1000, 0;

    ```


    A quick review of the performance metrics for this execution confirms that it
    executes exactly the way it did earlier, as shown in Figure [8-13](#A371168_1_En_8_Chapter.html#Fig13).


    ![A371168_1_En_8_Fig13_HTML.jpg](A371168_1_En_8_Fig13_HTML.jpg)

    Figure 8-13. Performance of the search from earlier with a large result set


    ```

    Table ''SalesOrderDetail''. Scan count 1000, logical reads 3231, physical reads
    0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    Both the IO statistics and execution plan match the first execution from earlier.
    Now, let’s execute the same stored procedure for the second use-case, where the
    salesperson has far fewer sales orders (without clearing the plan cache):


    ```

    EXEC dbo.get_sales_orders_by_sales_person 285, 1000, 0;

    ```


    While the results returned are the same as when you ran this same query earlier,
    the performance is significantly different. Figure [8-14](#A371168_1_En_8_Chapter.html#Fig14)
    illustrates this with the IO statistics and the execution plan.


    ![A371168_1_En_8_Fig14_HTML.jpg](A371168_1_En_8_Fig14_HTML.jpg)

    Figure 8-14. Performance when the execution plan for a large result set is reused
    with a significantly smaller one


    ```

    Table ''SalesOrderDetail''. Scan count 16, logical reads 74, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    Since you did not clear the query plan cache, the execution plan from above was
    reused for this execution of the stored procedure. The execution plan is exactly
    the same as the previous execution. The optimizer uses a clustered index scan
    on `SalesOrderHeader`, even though this is not the optimal way to retrieve data
    from the table for the smaller cardinality illustrated in this example. As a result,
    the reads on `SalesOrderHeader` are significantly higher, and the reads on `SalesOrderDetail`
    are about 50% higher. To show that plan reuse occurred, run the `read_query_plan_cache`
    stored procedure one last time. You can review the results in Figure [8-15](#A371168_1_En_8_Chapter.html#Fig15).


    ![A371168_1_En_8_Fig15_HTML.jpg](A371168_1_En_8_Fig15_HTML.jpg)

    Figure 8-15. Metrics returned by dbo.read_query_plan_cache for a parameterized
    search with paging when parameter sniffing results in undesired plan reuse


    ```

    EXEC dbo.read_query_plan_cache ''CTE_PRODUCTS'';

    ```


    Summarizing this data, let’s can pull out the most relevant details for review:


    *   Executions: 2

    *   CPU: 3402 microseconds

    *   Reads: 777

    *   Duration: 98ms (97,993 microseconds)

    *   Rows Returned: 245


    The execution count is the proof that the execution plan was indeed reused. In
    this scenario, reuse was not beneficial and caused the query to take significantly
    greater resources to execute. On a larger, busier production database, performance
    could be seriously degraded by this sort of parameter sniffing.


    The next logical question would be to ask how you deal with this phenomenon and
    how to correctly compensate for parameter sniffing. In order to provide the best
    answer possible, you’ll learn about a few additional considerations before diving
    into a variety of solutions.'
