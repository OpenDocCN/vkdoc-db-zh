    在讨论解决参数嗅引导致的性能问题的方法之前，让我们看一个额外的例子，展示在使用动态 SQL 时参数嗅探可能如何产生干扰。这些例子将使用销售订单，并利用一个新的销售员来说明不良基数估计对执行计划的影响：


