- fmt: "# Search Proc with a Simplified SELECT Statement Using Fewer Conditionals\n\
    \n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'search_products')\n\
    BEGIN\n    DROP PROCEDURE dbo.search_products;\nEND\nGO\n\n-- Search with a check\
    \ to avoid empty searches\nCREATE PROCEDURE dbo.search_products\n    @product_name\
    \ NVARCHAR(50) = NULL,\n    @product_number NVARCHAR(25) = NULL,\n    @product_model\
    \ NVARCHAR(50) = NULL,\n    @product_subcategory NVARCHAR(50) = NULL,\n    @product_sizemeasurecode\
    \ NVARCHAR(50) = NULL,\n    @product_weightunitmeasurecode NVARCHAR(50) = NULL,\n\
    \    @show_color BIT = 0,\n    @show_safetystocklevel BIT = 0,\n    @show_reorderpoint\
    \ BIT = 0,\n    @show_standard_cost BIT = 0,\n    @show_catalog_description BIT\
    \ = 0,\n    @show_subcategory_modified_date BIT = 0,\n    @show_product_model\
    \ BIT = 0,\n    @show_product_subcategory BIT = 0,\n    @show_product_sizemeasurecode\
    \ BIT = 0,\n    @show_product_weightunitmeasurecode BIT = 0\nAS\nBEGIN\n    SET\
    \ NOCOUNT ON;\n\n    IF COALESCE(@product_name, @product_number, @product_model,\
    \ @product_subcategory,\n        @product_sizemeasurecode, @product_weightunitmeasurecode)\
    \ IS NULL\n        RETURN;\n\n    -- Add \"%\" delimiters to parameters that will\
    \ be searched as wildcards.\n    SET @product_name = '%' + @product_name + '%';\n\
    \    SET @product_number = '%' + @product_number + '%';\n    SET @product_model\
    \ = '%' + @product_model + '%';\n\n    DECLARE @sql_command NVARCHAR(MAX);\n\n\
    \    -- Define the parameter list for filter criteria\n    DECLARE @parameter_list\
    \ NVARCHAR(MAX) = '@product_name NVARCHAR(50), @product_number NVARCHAR(25),\n\
    \        @product_model NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode\
    \ NVARCHAR(50),\n        @product_weightunitmeasurecode NVARCHAR(50)';\n\n   \
    \ -- Generate the simplified command string section for the SELECT columns\n \
    \   SELECT @sql_command = '\n        SELECT\n            Product.Name AS product_name,\n\
    \            Product.ProductNumber AS product_number,';\n\n    IF @show_product_model\
    \ = 1 OR @show_catalog_description = 1\n        SELECT @sql_command = @sql_command\
    \ + '\n            ProductModel.Name AS product_model_name,\n            ProductModel.CatalogDescription\
    \ AS productmodel_catalog_description,';\n\n    IF @show_product_subcategory =\
    \ 1 OR @show_subcategory_modified_date = 1\n        SELECT @sql_command = @sql_command\
    \ + '\n            ProductSubcategory.Name AS product_subcategory_name,\n    \
    \        ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,';\n\
    \n    IF @show_product_sizemeasurecode = 1\n        SELECT @sql_command = @sql_command\
    \ + '\n            SizeUnitMeasureCode.Name AS size_unit_measure_code,';\n\n \
    \   IF @show_product_weightunitmeasurecode = 1\n        SELECT @sql_command =\
    \ @sql_command + '\n            WeightUnitMeasureCode.Name AS weight_unit_measure_code,';\n\
    \n    IF @show_color = 1 OR @show_safetystocklevel = 1 OR @show_reorderpoint =\
    \ 1 OR @show_standard_cost = 1\n        SELECT @sql_command = @sql_command + '\n\
    \            Product.Color AS product_color,\n            Product.SafetyStockLevel\
    \ AS product_safety_stock_level,\n            Product.ReorderPoint AS product_reorderpoint,\n\
    \            Product.StandardCost AS product_standard_cost';\n\n    -- In the\
    \ event that there is a comma at the end of our command string, remove it before\
    \ continuing:\n    IF (SELECT SUBSTRING(@sql_command, LEN(@sql_command), 1)) =\
    \ ','\n        SELECT @sql_command = LEFT(@sql_command, LEN(@sql_command) - 1);\n\
    \n    SELECT @sql_command = @sql_command + '\n        FROM Production.Product'\n\
    \n    -- Put together the JOINs based on what tables are required by the search.\n\
    \    IF (@product_model IS NOT NULL OR @show_product_model = 1 OR @show_catalog_description\
    \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN\
    \ Production.ProductModel\n                ON Product.ProductModelID = ProductModel.ProductModelID';\n\
    \n    IF (@product_subcategory IS NOT NULL OR @show_subcategory_modified_date\
    \ = 1 OR @show_product_subcategory = 1)\n        SELECT @sql_command = @sql_command\
    \ + '\n            LEFT JOIN Production.ProductSubcategory\n                ON\
    \ Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID';\n\n\
    \    IF (@product_sizemeasurecode IS NOT NULL OR @show_product_sizemeasurecode\
    \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN\
    \ Production.UnitMeasure SizeUnitMeasureCode\n                ON Product.SizeUnitMeasureCode\
    \ = SizeUnitMeasureCode.UnitMeasureCode';\n\n    IF (@product_weightunitmeasurecode\
    \ IS NOT NULL OR @show_product_weightunitmeasurecode = 1)\n        SELECT @sql_command\
    \ = @sql_command + '\n            LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode\n\
    \                ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode'\n\
    \n    SELECT @sql_command = @sql_command + '\n        WHERE 1 = 1'\n\n    -- Build\
    \ the WHERE clause based on which tables are referenced and required by the search.\n\
    \    IF @product_name IS NOT NULL\n        SELECT @sql_command = @sql_command\
    \ + '\n            AND Product.Name LIKE @product_name'\n\n    IF @product_number\
    \ IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n            AND\
    \ Product.ProductNumber LIKE @product_number'\n\n    IF @product_model IS NOT\
    \ NULL\n        SELECT @sql_command = @sql_command + '\n            AND ProductModel.Name\
    \ LIKE @product_model'\n\n    IF @product_subcategory IS NOT NULL\n        SELECT\
    \ @sql_command = @sql_command + '\n            AND ProductSubcategory.Name = @product_subcategory'\n\
    \n    IF @product_sizemeasurecode IS NOT NULL\n        SELECT @sql_command = @sql_command\
    \ + '\n            AND SizeUnitMeasureCode.Name = @product_sizemeasurecode'\n\n\
    \    IF @product_weightunitmeasurecode IS NOT NULL\n        SELECT @sql_command\
    \ = @sql_command + '\n            AND WeightUnitMeasureCode.Name = @product_weightunitmeasurecode'\n\
    \n    PRINT @sql_command;\n    EXEC sp_executesql @sql_command, @parameter_list,\
    \ @product_name, @product_number,\n        @product_model, @product_subcategory,\
    \ @product_sizemeasurecode, @product_weightunitmeasurecode\nEND\nGO\n```\n\nThe\
    \ TSQL in Listing 3-6 shows the difference that using fewer conditionals makes.\
    \ The resulting command string will potentially contain some extra columns, but\
    \ the stored procedure has become simpler, with five conditionals, instead of\
    \ 10. Consider this an alternative for smaller searches, or those where the data\
    \ sets are straightforward. If the number of columns required per table were to\
    \ increase in the future, this might need to be redesigned to maintain efficient\
    \ query execution. Alternatively, for very small tables, `SELECT TableName.*`\
    \ could also be used to further reduce the size of the stored procedure. The following\
    \ TSQL shows this change for the `ProductModel` table:\n\n```sql\nIF @show_product_model\
    \ = 1 OR @show_catalog_description = 1\n    SELECT @sql_command = @sql_command\
    \ + '\n        ProductModel.*,';\n```\n\nWhile simple, this would return an indeterminate\
    \ number of columns, which could become a bottleneck in the future if tables continue\
    \ to add new columns. In addition, with this syntax, you lose control over the\
    \ column names, which could result in duplicates in a case where many tables use\
    \ the same column names for different data elements. In `AdventureWorks`, you\
    \ would have no way to differentiate between the product name and the product\
    \ model name, as both columns are simply called `Name`. Please use caution whenever\
    \ returning all columns from a table using `*`. This can be a useful tool for\
    \ a small table with a very predictable and unchanging structure. On the other\
    \ hand, if the table changes, this stored procedure could easily break or return\
    \ additional unexpected data.\n\nThe joins in this dynamic search only happen\
    \ when a column is required from a table. This occurs if a column is explicitly\
    \ requested via an input parameter bit, or if it is filtered on.\n\nThe combination\
    \ of dynamic joins, dynamic `SELECT` statement, and dynamic `WHERE` ensures that\
    \ you do not access any table that isn’t required for the search grid. While the\
    \ stored procedure has become larger, the command strings generated by it are\
    \ shrinking, which is the primary goal of this exercise.\n\n## Search Grid Considerations\n\
    \nThe stored procedure presented in the previous section is a huge leap forward\
    \ in terms of customization, but it is more complex than the previous searches.\
    \ With any added complexity comes a variety of considerations that will help in\
    \ making intelligent design decisions, as well as avoid pitfalls associated with\
    \ this level of flexibility."
