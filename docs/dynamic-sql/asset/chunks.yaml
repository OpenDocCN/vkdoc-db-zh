  trans: '

    仅使用 `sp_executesql` 并不足以确保防御 SQL 注入攻击。所有参数必须如最后几个示例所示，明确地传递到 `sp_executesql` 中。如果参数直接拼接到命令字符串中而未传递到
    `sp_executesql`，这些输入将可能通过利用撇号（如先前演示以及本章后续示例所示）而遭受 SQL 注入攻击。务必确保用户没有机会在未进行适当输入清洗的情况下，将其搜索文本直接并入命令字符串！


    ## 模式名与方括号


    此惯例同样适用于编写标准 SQL 和动态 SQL。当查询动态定义的数据库对象（如表、视图、列或存储过程）时，您无法对这些数据库对象进行参数化。缺乏这种保护，您的
    TSQL 将面临潜在的 SQL 注入攻击风险。请思考清单 2-14 中的 TSQL 查询。


    ```sql

    DECLARE @table_name SYSNAME = ''ErrorLog'';

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM '' + @table_name;

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    ```


    清单 2-14. 无 SQL 注入防护的动态表查询


    执行此代码将返回 `ErrorLog` 表中的所有行。与之前的示例类似，这个在运行时定义要查询的表的查询，很容易成为 SQL 注入的目标。以下针对 `@table_name`
    的恶意输入将导致除了 `ErrorLog` 表之外，`Person.Password` 表的内容也被返回给用户：


    ```sql

    ''ErrorLog; SELECT * FROM Person.Password WHERE '''''''' = '''''''''';

    ```


    一个简单的防御方法是显式包含模式名（即使是默认模式）。此外，为所有对象加上方括号，这将进一步限定 SQL 语句并限制攻击者的能力。


    ```sql

    DECLARE @table_name SYSNAME = ''ErrorLog; SELECT * FROM Person.Password WHERE
    '''''''' = '''''''''';

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM [dbo].['' + @table_name + '']'';

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    ```


    清单 2-15. 添加了模式和方括号的动态表查询


    执行这个新版本将产生如下命令字符串：


    ```sql

    SELECT * FROM [dbo].[ErrorLog; SELECT * FROM Person.Password WHERE '''' = '''']

    ```


    执行该 TSQL 将在运行时导致错误：


    ```sql

    Msg 208, Level 16, State 1, Line 142

    Invalid object name ''dbo.ErrorLog; SELECT * FROM Person.Password WHERE '''' =
    ''''''.

    ```


    添加模式名和使用方括号限定，使这个简单的 SQL 注入尝试失败了。假设错误消息被应用程序捕获并返回一个友好的错误，用户将无法确切知道发生了什么。当然，这并非万无一失，非常执着的黑客会继续尝试输入各种命令字符串，直到他们摸清规律并尝试以下输入：


    ```sql

    ''ErrorLog]; SELECT * FROM [Person].Password''

    ```


    通过闭合方括号，然后用他们的表名重新打开方括号，他们成功绕过了针对此查询的安全防护。虽然您可以采取进一步措施来复杂化命令字符串以挫败潜在的黑客，但这仍然会涉及安全风险。


    如前所述，任何未使用 `sp_executesql` 对所有输入进行参数化的命令字符串，都可能容易受到 SQL 注入攻击。一般来说，除非您确定不会有外部访问此系统，否则应避免将数据库对象用作动态
    SQL 参数。无论面向何种用户，都应使用 `QUOTENAME` 来正确限定您的参数。虽然它们无法直接传递到 `sp_executesql`，但这至少能确保它们不会像之前展示的那样被利用。


    对于仅供 DBA 或开发人员使用的内部过程，这类动态 SQL 语句是合理的，但仍应谨慎。一旦任何未知方（如非技术部门、终端用户或整个互联网）能够访问，风险级别将急剧上升。在以任何形式向外部方提供存储过程之前，务必考虑您的受众，并确保他们无法利用您的代码。即使这些过程是内部使用且被认为安全，运用每一种安全预防措施和
    TSQL 最佳实践仍然至关重要。看似不太可能发生的事件，如恶意用户、心怀不满的员工或社会工程攻击，其发生频率之高，足以在任何情况下都不应被视为无关紧要。


    ## 有效间距


    清单 [2-6 中的示例展示了一种场景：攻击者利用注释移除了登录脚本中的密码检查。此漏洞的主要原因是缺乏参数化或输入清洗，但次要原因是整个 `WHERE`
    子句位于单行上。


    我不确定是什么驱使任何人将动态 SQL 全部或大部分写在一行上，但这除了使其难以阅读外，还增加了 SQL 注入被用于攻击编写不当的查询的方式。以与标准 SQL
    相同的格式和细致程度来编写动态 SQL，不仅会使其更易于维护，而且还将从攻击者的武器库中移除一种非常简单的 SQL 注入攻击方法。


    ### 正确输入类型


    除了清洗输入外，始终为输入使用正确的数据类型也很重要。SQL 注入专门针对字符串输入，可以在其中插入撇号和恶意的 SQL 代码。非文本数据类型，如 `BIT`、`INT`
    或 `DATETIME`，不能成为 SQL 注入的目标。


    一些应用程序为了方便，将所有（或大多数）输入参数编写为字符串。使用字符串时，在将它们与动态 SQL 命令字符串拼接时，无需强制转换或转换为字符串。虽然这可能会略微减少开发时间，但它增加了理论上可能遭受
    SQL 注入的输入数量。


    如果正在评估的任何数据类型本质上不是字符串，请确保它至少在传递到您的存储过程之前存储为非字符串类型。一旦执行将这些参数传递到 TSQL 中，它们就可以被强制转换为字符串并在动态
    SQL 中使用，而不会有 SQL 注入的风险。如果需要，可以在存储过程中声明字符串变量，然后用上述转换后的类型填充。由于转换是 SQL Server 内部的，与存储过程外部无关，因此它也免受
    SQL 注入的影响。


    务必确保数据类型正确。将值存储为非字符串类型可确保它们不会成为 SQL 注入的目标。


    同样，确保应用程序始终验证输入，以确保它们符合预期类型。作为字符串传递到 TSQL 语句中的整数可能允许将算术运算安全地嵌入字符串中。如果恶意用户意识到他们可以将
    `"5"` 替换为 `"5 + 1"`，那么他们会立即开始探测其他非字符串输入，以确定它们是否被盲目转换为字符串。参数从用户输入的那一刻起，直到被存储过程使用，都应该具有正确的类型。这可以防止任何被操纵的机会，此外还能降低复杂性和开发人员因混淆数据类型而犯错的可能性。

