- fmt: '## Performance Analysis


    ```

    Table ''Worktable''. Scan count 3, logical reads 16130, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''SalesOrderDetail''. Scan count 473, logical reads 1626, physical reads
    0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    What happened!? The execution plan seems simple enough, with the two tables being
    accessed once. The IO statistics, though, tell a very different story! In order
    to calculate the count within the CTE, SQL Server recalculates it for every single
    row that is processed in the result set! The reads are many orders of magnitude
    higher than all of the previous examples and show that syntax that looks good
    doesn’t always perform well. You can simplify the TSQL in an attempt to improve
    performance, as shown in Listing 6-11.


    ## Simplified Window Function Approach


    ```tsql

    WITH CTE_PRODUCTS AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,

    COUNT(*) OVER () AS total_result_count,

    SalesOrderHeader.SalesOrderID,

    SalesOrderHeader.Status,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.LineTotal

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    WHERE SalesOrderHeader.SalesPersonID = 277

    )

    SELECT

    *

    FROM CTE_PRODUCTS

    WHERE rownum BETWEEN 51 AND 75;

    ```


    Listing 6-11. Data Paging with a Simplified Window Function


    The performance is almost exactly the same as before. Despite removing the additional
    syntax, this method preforms extremely inefficiently. In a larger data set, this
    method would result in significantly more reads and latency as SQL Server attempts
    to calculate the count on each row throughout the data.


    One final option is to persist the entire data set from the start. If the search
    results are not excessively large, or if you can limit them to a relatively compact
    segment, then you can optimize for this specific scenario, as shown in Listing
    6-12.


    ## Persisting the Full Data Set


    ```tsql

    SELECT

    ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,

    SalesOrderHeader.SalesOrderID,

    SalesOrderHeader.Status,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

