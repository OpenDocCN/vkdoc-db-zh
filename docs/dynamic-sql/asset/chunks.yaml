    *   使用 try/catch 块来管理存储过程中的任何错误。


    当然，还有许多其他选项可供你考虑。在此示例中，所有数据库（除了少数几个系统数据库）都进行了备份，但你同样可以省略 `WHERE` 子句或调整它，以便备份服务器上的特定数据库集。此外，如果系统数据库遵循一套独特的规则，也可以单独管理它们。


    此存储过程的备份时间由作业运行时间确定，但也可以内置为存储过程参数。两种场景都可行，使用哪种取决于你更倾向于如何管理这些数据。与参数配合良好的一个额外选项是将元数据存储在永久控制表中。这将提供有关要备份的数据库、频率和类型的信息，并且可以轻松定制以适应你的环境需求。


    如果在 SQL Server 中运行存储过程对你考虑的操作来说似乎有局限，那么你可以使用 PowerShell 或 SSIS 来提供对文件系统和 Windows
    功能的更好访问。与索引维护示例一样，你在此模型中取得成功的主要限制因素是时间和创造力。


    ## 保存生成的脚本


    动态 SQL 可以作为存储过程的一部分编写，以便按应用程序需要执行，但它也可以保存起来供以后使用。动态 SQL 可用于生成一个命令字符串，然后将其保存到文件或新的存储过程中，以便在将来或作为另一个应用程序的一部分执行。


    当某个流程包含许多步骤，而其中某些步骤必须在严格的时间表上执行时，这种灵活性会非常方便。例如，你可能希望在午夜基于数据库中的架构生成一个脚本，但直到凌晨 4
    点数据加载完成才返回数据本身。或者，你可能希望在执行 SQL 文件之前或之外，对其进行审核或将其保存到其他地方以供后用。另一种实现此目的并避免将数据移入操作系统的方法是将其存储在表中。


    ### 将脚本保存到表中


    保存命令字符串的最简单方法是将其插入表中。这提供了额外的灵活性，例如可以为命令添加时间戳或保存旧命令。为了便于此过程，你将创建一个表来存储命令数据，如清单
    11-4 所示。


    ```sql

    CREATE TABLE dbo.sql_command

    (       command_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_sql_commands PRIMARY
    KEY CLUSTERED,

    sql_command NVARCHAR(MAX) NOT NULL,

    time_stamp DATETIME NOT NULL CONSTRAINT DF_sql_commands_time_stamp DEFAULT (CURRENT_TIMESTAMP)    );

    ```


    清单 11-4.

    用于存储动态 SQL 输出的表


    注意，有一个额外的列存储默认时间戳。这确保了任何保存的 TSQL 都可以轻松地与生成时间相关联。为了演示如何使用此表，让我们修改之前的索引碎片整理存储过程，改为向该表插入数据，而不是打印到
    GUI，如清单 11-5 所示。

    '
- fmt: '## 存储过程：输出结果到表


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''index_maintenance_demo_output'')

    BEGIN

    DROP PROCEDURE dbo.index_maintenance_demo_output;

    END

    GO

    CREATE PROCEDURE dbo.index_maintenance_demo_output

    @reorganization_percentage TINYINT = 10,

    @rebuild_percentage TINYINT = 35,

    @print_results_to_file_only BIT = 1

    AS

    BEGIN

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    DECLARE @parameter_list NVARCHAR(MAX) = ''@reorganization_percentage TINYINT,
    @rebuild_percentage TINYINT''

    DECLARE @database_name NVARCHAR(MAX);

    DECLARE @database_list TABLE

    (database_name NVARCHAR(MAX) NOT NULL);

    INSERT INTO @database_list

    (database_name)

    VALUES

    (''AdventureWorks2012''),

    (''AdventureWorks2014''),

    (''AdventureWorksDW2012''),

    (''AdventureWorksDW2014'');

    CREATE TABLE #index_maintenance

    (       database_name NVARCHAR(MAX),

    schema_name NVARCHAR(MAX),

    object_name NVARCHAR(MAX),

    index_name NVARCHAR(MAX),

    index_type_desc NVARCHAR(MAX),

    page_count BIGINT,

    avg_fragmentation_in_percent FLOAT,

    index_operation NVARCHAR(MAX));

    SELECT @sql_command = @sql_command + ''

    USE ['' + database_name + '']

    INSERT INTO #index_maintenance

    (database_name, schema_name, object_name, index_name, index_type_desc, page_count,
    avg_fragmentation_in_percent, index_operation)

    SELECT

    CAST(SD.name AS NVARCHAR(MAX)) AS database_name,

    CAST(SS.name AS NVARCHAR(MAX)) AS schema_name,

    CAST(SO.name AS NVARCHAR(MAX)) AS object_name,

    CAST(SI.name AS NVARCHAR(MAX)) AS index_name,

    IPS.index_type_desc,

    IPS.page_count,

    IPS.avg_fragmentation_in_percent, -- Be sure to filter as much as possible...this
    can return a lot of data if you dont filter by database and table.

    CAST(CASE

    WHEN IPS.avg_fragmentation_in_percent >= @rebuild_percentage THEN ''''REBUILD''''

    WHEN IPS.avg_fragmentation_in_percent >= @reorganization_percentage THEN ''''REORGANIZE''''

    END AS NVARCHAR(MAX)) AS index_operation

    FROM sys.dm_db_index_physical_stats(NULL, NULL, NULL, NULL , NULL) IPS

    INNER JOIN sys.databases SD

    ON SD.database_id = IPS.database_id

    INNER JOIN sys.indexes SI

    ON SI.index_id = IPS.index_id

    INNER JOIN sys.objects SO

    ON SO.object_id = SI.object_id

    AND IPS.object_id = SO.object_id

    INNER JOIN sys.schemas SS

    ON SS.schema_id = SO.schema_id

    WHERE alloc_unit_type_desc = ''''IN_ROW_DATA''''

    AND index_level = 0

    AND SD.name = '''''' + database_name + ''''''

    AND IPS.avg_fragmentation_in_percent >= @reorganization_percentage

    AND SI.name IS NOT NULL -- Only review index, not heap data.

    AND SO.is_ms_shipped = 0 -- Do not perform maintenance on system objects

    ORDER BY SD.name ASC;''

    FROM @database_list

    WHERE database_name IN (SELECT name FROM sys.databases);

    EXEC sp_executesql @sql_command, @parameter_list, @reorganization_percentage,
    @rebuild_percentage;

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command +

    ''        USE ['' + database_name + '']

    ALTER INDEX ['' + index_name + ''] ON ['' + schema_name + ''].['' + object_name
    + '']

    '' + index_operation + '';

    ''

    FROM #index_maintenance;

    IF @print_results_to_file_only = 1

    INSERT INTO dbo.sql_command

    (sql_command)

    SELECT

    @sql_command

    ELSE

    EXEC sp_executesql @sql_command;

    DROP TABLE #index_maintenance;

    END

    ```


    ### 列表 11-5. 带有输出到表选项的索引维护存储过程


    请注意，除了重命名几个变量外，唯一的区别是执行 `INSERT` 到 `dbo.sql_command` 而不是打印输出。让我们执行几次存储过程，然后查看表的内容：


    ```sql

    EXEC dbo.index_maintenance_demo_output @reorganization_percentage = 10, @rebuild_percentage
    = 35, @print_results_to_file_only = 1;

    EXEC dbo.index_maintenance_demo_output @reorganization_percentage = 20, @rebuild_percentage
    = 50, @print_results_to_file_only = 1;

    EXEC dbo.index_maintenance_demo_output @reorganization_percentage = 30, @rebuild_percentage
    = 75, @print_results_to_file_only = 1;

    EXEC dbo.index_maintenance_demo_output @reorganization_percentage = 5, @rebuild_percentage
    = 10, @print_results_to_file_only = 1;

    ```


    这些都传递了不同的参数值，但其他方面是相同的。查看新表可以发现，命令字符串已按预期保存，并附有时间戳，如图 [11-7](#A371168_1_En_11_Chapter.html#Fig7)
    所示。


    ![A371168_1_En_11_Fig7_HTML.jpg](A371168_1_En_11_Fig7_HTML.jpg)


    #### 图 11-7.

    由列表 [11-5](#A371168_1_En_11_Chapter.html#Par71) 中的脚本创建的 `ALTER INDEX` 语句


    一旦保存在这里，它们可以在将来任何时候执行，或者由 DBA 或开发人员审查，以确保命令字符串的生成是正确的。除了延迟执行之外，此策略对于调试有问题的动态 SQL，或者仅仅允许在执行前记录命令字符串都非常有用。列表
