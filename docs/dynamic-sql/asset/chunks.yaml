    ## Managing Scope in Dynamic SQL

    Dealing with scope in Dynamic SQL isn’t terribly different than when working with
    a stored procedure. Imagine everything within the Dynamic SQL statement as being
    separate from the remainder of your TSQL and act accordingly. To illustrate the
    similarities, consider the following TSQL, which is similar to the previous search
    examples:


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    DECLARE @FirstName NVARCHAR(50) = ''''Edward'''';

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @FirstName;''

    EXEC sp_executesql @sql_command;

    SELECT @FirstName

    ```


    In this case, the variable `@FirstName` is declared within the command string,
    and as such is not available outside of the scope of the Dynamic SQL statement.
    The `SELECT` at the end will fail as `@FirstName` no longer exists:


    ```

    Msg 137, Level 15, State 2, Line 84

    Must declare the scalar variable "@FirstName".

    ```


    Similarly, a variable declared outside of a command string will be unavailable
    for use on the inside. Lastly, multiple command strings each execute in their
    own scope. A variable declared in one command string will not be available in
    another Dynamic SQL statement.


    Scope exists as a convenience and a security feature. If variables that were declared
    in one place within code were available everywhere, then you would need to keep
    track of each and every one very carefully to ensure you never accidentally reused
    an existing one when you intended to use a new one. Separating segments of TSQL
    from each other and breaking the ownership chain serve to compartmentalize distinct
    SQL statements and prevent any one application or function from over-reaching
    its bounds. While it may seem inconvenient at first to need to manage all of these
    variables more carefully, SQL Server provides many effective tools to do so under
    any circumstances.


    ## Using OUTPUT in Dynamic SQL

    By default, any variables that are passed into `sp_executesql` are read-only.
    That is, they can be used in the scope of the Dynamic SQL whenever needed, but
    when the Dynamic SQL is complete and execution returns to the calling TSQL, any
    changes to parameters are not saved. Consider the TSQL in Listing [5-2](#A371168_1_En_5_Chapter.html#Par24),
    focusing on the `UPDATE` of the `@FirstName` parameter.


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    DECLARE @first_name NVARCHAR(50) = ''Edward'';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name;

    SELECT @first_name = ''''Xavier'''';

    SELECT @first_name;

    ''

    SELECT @parameter_list = ''@first_name NVARCHAR(50)''

    EXEC sp_executesql @sql_command, @parameter_list, @first_name;

    SELECT @first_name;

    GO

    Listing 5-2. Dynamic SQL: Updating Parameters Within the Command String

    ```


    In this example, the last action taken within the command string is to reassign
    the name "Xavier" to the parameter `@first_name`. Even though the parameter is
    read-only, you are allowed to change the value of it within the Dynamic SQL. The
    new value will remain relevant and in scope until the end of the Dynamic SQL.
    It is important to note that, despite the fact that you used the same variable
    name for the first name both within and outside of Dynamic SQL, they are still
    treated as completely separate variables. Depending on your applications, there
    may be value in using different variable names, which would help differentiate
    between separate variables, or in using the same variable names, which would make
    it more obvious when a distinct value is being used across TSQL statements, each
    with a different scope. The output is shown in Figure [5-2](#A371168_1_En_5_Chapter.html#Fig2).


    ![A371168_1_En_5_Fig2_HTML.jpg](A371168_1_En_5_Fig2_HTML.jpg)

    Figure 5-2. Reassigning a variable within Dynamic SQL without the `OUTPUT` operator


    The results of the search are retuned as you would expected them to be. The `SELECT`
    of the first name from within the Dynamic SQL shows that reassigning the parameter
    is allowed and succeeded. When you check the variable again after the Dynamic
    SQL execution is complete, you can see that `@first_name` is set to "Edward" instead
    of "Xavier". As a slight adjustment, you can go ahead and change the variable
    names, as shown in Listing [5-3](#A371168_1_En_5_Chapter.html#Par27), which helps
    emphasize that they are distinct and separate from each other.


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    DECLARE @first_name_calling_sql NVARCHAR(50) = ''Edward'';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name_within_dynamic_sql;

    SELECT @first_name_within_dynamic_sql = ''''Xavier'''';

    SELECT @first_name_within_dynamic_sql;

    ''

    SELECT @parameter_list = ''@first_name_within_dynamic_sql NVARCHAR(50)''

    EXEC sp_executesql @sql_command, @parameter_list, @first_name_calling_sql;

    SELECT @first_name_calling_sql;

    Listing 5-3. Rewriting the TSQL from Listing 5-2, which Returns the Same Results

    ```


    The results from this slightly different version are exactly the same as above.
    The only difference was that the name of the variable in the calling TSQL changed
    to `@first_name_calling_sql` and the parameter for the Dynamic SQL statement changed
    to `@first_name_within_dynamic_sql`.


    What if you intentionally wanted changes to the parameters made within the Dynamic
    SQL to be saved and passed back to the original parameters that were passed in
    initially? The solution is nearly the same as with a stored procedure. Simply
    add `OUTPUT` to any parameter that is to pass its value back to the calling TSQL
    and it will work very similarly to the earlier examples, as shown in Listing [5-4](#A371168_1_En_5_Chapter.html#Par30).'
