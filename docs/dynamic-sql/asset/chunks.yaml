    is added to the product inventory!


    The following TSQL will clean up the changes and remove the new colors, returning
    them to their orignal `NULL`:


    ```

    UPDATE Production.Product

    SET Product.Color = NULL

    WHERE Product.ProductID = 325 -- Decal 1

    UPDATE Production.Product

    SET Product.Color = NULL

    WHERE Product.ProductID = 326 -- Decal 2

    ```


    ## UNPIVOT


    `PIVOT` has its counterpart called `UNPIVOT`, which takes a query with a column
    list and reconstructs it into row data. In order to demonstrate this using familiar
    data, you will output the results of the previous example into a table for use
    in this section using the TSQL in Listing [9-7](#A371168_1_En_9_Chapter.html#Par39).


    ```

    SELECT @sql_command = ''

    SELECT

    *

    INTO dbo.Products_By_Color

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ('';

    Listing 9-7.

    Query to Store Data for Use in a Dynamic UNPIVOT Demonstration

    ```


    By adding an `INTO` to the `SELECT`, the output reviewed above will be stored
    in the table `dbo.Products_By_Color`, which will be used in the `UNPIVOT` testing.


    The syntax for `UNPIVOT` is similar to `PIVOT` and involves the use of a similar
    column list, with the exception that the data will be reverted to rows, removing
    all additional columns listed. This can be seen in Listing [9-8](#A371168_1_En_9_Chapter.html#Par42).


    ```

    SELECT

    *

    FROM

    (SELECT

    *

    FROM dbo.Products_By_Color) AS PRODUCTS_BY_COLOR

    UNPIVOT

    (product_quantity FOR Color IN

    ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])

    ) AS UNPIVOT_DATA;

    Listing 9-8.

    Using UNPIVOT to Revert Column Headers into Row Data

    ```


    Figure [9-5](#A371168_1_En_9_Chapter.html#Fig5) shows a subset of the output from
    this statement.


    ![A371168_1_En_9_Fig5_HTML.jpg](A371168_1_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    Output from the UNPIVOT statement in Listing [9-8](#A371168_1_En_9_Chapter.html#Par42)


    All of the new columns introduced in the last section have been removed and their
    corresponding names inserted into the new Color column. The syntax for `UNPIVOT`
    involves three additional bits of syntax that are worth describing in detail:


    *   A new column for the unpivoted quantity data. In this case, we called the
    new column `product_quantity`, though any name could be used. When using `UNPIVOT`,
    there is no need to provide an aggregation, as any duplicate values will become
    distinct rows in the result.

    *   The new column that will contain the column names must be provided. In this
    example, we name it “`Color`”.

    *   A column list must be provided, similar to when you wrote a PIVOT statement.
    Each column in this list will be included in rows of the result set. Any omitted
    column names will not be represented in the result set.


    The results from this query are not the same as the original data. It is important
    to emphasize that `UNPIVOT` is not simply the opposite of `PIVOT` and that applying
    one after the other will rarely result in identical sets of data. In the previous
    example, there are two important differences between this data and what you began
    with at the start of the chapter.


    First, `NULL`s have been eliminated. Any product with no color defined was dropped
    out of the result set. The results show all product-color combinations for which
    a color in the list was present and had a quantity defined. The second difference
    involves the quantities themselves. When you apply `PIVOT` to a set of data, you
    supply an aggregate in order to process multiple rows with the same value. Once
    quantities have been summed, there is no way to “un-sum” them. The results of
    the `UNPIVOT` contain product quantity totals that represent multiple products
    from the original data in `production.Product`. Now that you understand the important
    differences between `PIVOT` and `UNPIVOT`, and get the ways in which data is handled
    by each, you can work on making `UNPIVOT` more flexible.'
