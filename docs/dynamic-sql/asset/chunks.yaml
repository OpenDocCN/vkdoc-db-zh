    Dynamic PIVOT with the inclusion of two new colors


    With this syntax, you can make any `PIVOT` dynamic and supply a list of values
    from user input, a TSQL query, or anywhere that data can be queried from in SQL
    Server. This reduces the need to hard-code specific column headings into stored
    procedure, thereby reducing maintenance costs over time. The last thing you want
