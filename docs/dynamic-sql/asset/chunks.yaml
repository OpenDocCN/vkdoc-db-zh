- fmt: '## Where Do Security Disasters Come From?


    There are many answers to this question, some obvious, others more unexpected.
    Let’s consider one possible definition of a security disaster: Any action that
    is taken but not desired by the organization and its security personnel. This
    is intentionally generic as we want to consider all of the ways in which “bad
    things” can happen. Everyone who has worked with databases long enough has experienced
    one of these situations:


    *   A hacking attempt (or suspected hacking attempt) is made against your organization.

    *   A disgruntled employee alters data without the appropriate authority to do
    so.

    *   A developer forgets the `WHERE` clause in her ad-hoc TSQL.

    *   A planned software release goes awry, resulting in lost data.

    *   Hardware or software failures result in infrastructure entering an undesirable
    state.

    *   Undesired changes are made via a legitimate use of the application.

    *   A software or hardware upgrade has unintended consequences.


    You could likely name many more disasters that would easily keep you awake at
    night, but the key to all of them can be boiled down to two basic categories:
    Lack of planning and human error. How do you manage each risk in a way that is
    meaningful and non-obtrusive? With the intention of keeping this from straying
    too far from Dynamic SQL, let’s briefly review these risks and provide starting
    points for managing them.


    ### SQL Injection and Defense in Depth


    Keep in mind from earlier discussions that SQL injection, when exploited in the
    worst possible ways, can quickly hand complete control of a server over to the
    wrong person at the wrong time. Chapter [2](#A371168_1_En_2_Chapter.html) provided
    a solution to this specific security threat and stated that the best way to defend
    an application is to provide adequate security on multiple levels so that the
    sum of these efforts becomes extremely expensive to circumvent. There is no fool-proof
    way to secure a system against all threats. In the same way that a sufficiently
    motivated robber could probably break into anyone’s house, a hacker (or group)
    who is ambitious enough can find ways to make your life difficult. Discouraging
    an attack can be achieved by avoiding any glaring security holes that would make
    your application a tempting target. The robber who sees solid locks, strong windows,
    and distinct signs of a security system is likely to move on to an easier target.


    ### Lack of Planning


    Lack of planning is rarely obvious until it’s too late. Companies often put off
    high availability and disaster recovery solutions until after their first disaster
    scare. The penetration test is performed for the first time after a high-profile
    hacking attempt is identified. More rigorous testing of upgrades is planned and
    conducted after an upgrade goes awry one day. Confirmations are added to the application
    after the first time a customer accidentally deletes a significant portion of
    the data. Proper planning can be achieved with a concerted effort by employees
    who, as part of their job responsibilities, review application, software, and
    hardware features for common security threats. Ideally, a team of individuals
    from different departments and backgrounds would be involved. While a database
    professional would likely catch bad TSQL within the server, a developer would
    find bad code in the application, and a customer service representative might
    know the top ways in which customers get in trouble with data.


    ### Principle of Least Privilege


    Do not assign database roles to users unless they absolutely need them. Avoid
    the `sysadmin` server role at all costs. Minimize use of the `db_owner` database
    role, unless truly required by an application or user.


    As discussed earlier, providing applications and utilities with the minimum needed
    permissions (but no more) is the key to avoiding disasters. Consider that there
    are a plethora of functions in SQL Server that are included in `sysadmin` and
    `db_owner` by default. With each new version of SQL Server, new functionality
    is added and those features are often included in those roles as well. As a result,
    if an application is assigned a user with one of these roles, it may gain new
    permissions after an upgrade. Features, even those not currently used—such as
    replication, in-memory OLTP, AlwaysOn, and others—may become configurable inadvertently
    under these roles. Always consider carefully when providing any application or
    employee with a login. Consider the access it has and the worst things they could
    possibly do and decide if those scenarios are acceptable. It cannot be overstated
    that users cannot cause trouble if their permissions don’t allow it. This is especially
    true if permissions are implicitly granted via database or server roles.


    ### Human Error and Social Engineering


    Not all dangerous actions are technical in nature. Many, many terrible things
    happen as a result of human error, human nature, or some combination of the two.
    Consider this scenario that plays out daily at companies around the world: A support
    rep answers the phone. On the other end is a manager from another division. This
    person sounds knowledgeable and is requesting access to restricted data about
    one of your largest customers. The representative, fearful of questioning this
    person, provides the data, hangs up, and forgets this ever happened. Trouble is,
    the person who called didn’t work for the company at all and has gained access
    to important information. He only had to spend a few minutes to acquire it! This
    technique is known as social engineering and it poses a great threat. No amount
    of technology can stop people from using software as it is meant to be used, especially
    if they are motivated to do so.


    Some of the other earlier examples had a similar theme of accidental misfortune.
    The developer who forgets the `WHERE` clause or the disgruntled employee did not
    hack to cause trouble; they simply misused the tools they had at their disposal.
    There are two tactics to defend against these types of incidents.


    ### Defense Tactics: Access Control and Education


    The first is utilizing the “Principle of Least Privilege”. It’s worth overstating
    what has already been discussed: Only provide users with the access they need
    to perform the daily functions of their job. An employee without production write-access
    cannot `truncate` or `delete` from a table. The new DBA cannot accidentally run
    a schema-altering script in production if he has no ability to make DDL changes.
    If an employee is to be fired, be sure to revoke her access immediately, in order
    to prevent any opportunity for retribution. Review security roles and user access
    annually (or more often if possible) to ensure that changes in your organization
    or software don’t necessitate permissions changes.


    The second defense against human nature is education. Make all employees aware
    of your company’s data and security policies. If these policies don’t exist, then
    work with the appropriate managers to create them. It is important to educate
    all employees, as anyone with access to data, whether via `SQL Server Management
    Studio` or terminal software at their desk, can potentially make mistakes that
    can cost a great deal in the long run. For developers, QA specialists, IT, and
    other technical folks, encourage accessing data safely. Many utilities exist that
    will highlight and color-code connection strings or warn against any TSQL statements
    that have no `WHERE` clause or affect an entire table. Knowing that you are connected
    to a production server can prevent the dreaded situation when a script was intended
    for the development database, but accidentally runs in production.'
