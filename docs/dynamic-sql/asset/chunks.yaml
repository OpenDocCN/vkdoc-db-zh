    ```

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity,

    PRODUCT.SafetyStockLevel

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],
    [White], [Yellow])) PIVOT_DATA_COLOR

    PIVOT

    (    COUNT(SafetyStockLevel)

    FOR SafetyStockLevel IN ([4], [60], [100], [500], [800], [1000] )) PIVOT_DATA_LEVEL

    ```


    Combining multiple `PIVOT` operators with Dynamic SQL provides lots of flexibility
    when generating columnar data given the contents of multiple columns. By producing
    a result set in a single query, you ensure relational integrity and guarantee
