- fmt: '# STATISTICS IO


    SQL Server can provide information about which tables were read and how many reads
    occurred against them. This can be turned on with the following TSQL:


    ```sql

    SET STATISTICS IO ON;

    ```


    This is very important information, as it indicates overall IO use. If a query
    is running slow, it could be the result of excessive reads against a table. The
    execution plan may not always convey the enormity of an IO bottleneck, but the
    knowledge that a query that returns two rows is taking a million reads to do so
    is an indication of a possible problem. Often, the two will correlate with each
    other, providing a solid foundation on which to understand why a query is slow.
    Once enabled, `STATISTICS IO` will add details to the text output screen, as shown
    in Figure [6-4](#A371168_1_En_6_Chapter.html#Fig4).


    ![A371168_1_En_6_Fig4_HTML.jpg](A371168_1_En_6_Fig4_HTML.jpg)


    **Figure 6-4.** Example output from STATISTICS IO


    While there are a number of operations detailed here, the discussion here is limited
    to the first four.


    ### Objects


    The name of the table or view that is being accessed.


    ### Scan Count


    This indicates if an object was read multiple times. A high number here can indicate
    that SQL Server is reading the same data over and over again, which can be a potential
    sign of an inefficient query.


    ### Logical Reads


    This is the number of reads made on the object indicated, regardless of whether
    the data is cached in memory or not. This will be the metric referred to throughout
    this chapter whenever you are concerned with IO read activity, as it will remain
    static for a given query even if the physical reads change.


    ### Physical Reads


    This is the number of reads where the data was not yet in the buffer cache. Whenever
    data is read for a query, it is placed into memory and remains there until it
    ages out or is replaced at a later time. The initial read of data into memory
    from your storage system can be very expensive. If queries are constantly making
    physical reads, that could be a sign that queries are reading too much data or
    that there is memory pressure on the server.


    When you execute a query and access data for the first time, this number will
    be the same as the logical reads, but all subsequent executions will show zero
    for this metric as the data will now be in memory from the first execution.


    # STATISTICS TIME


    What is likely the most important metric to any consumer of data is the time it
    takes for the server to return the data they are looking for. As database professionals,
    the most common complaint we will hear is, “It’s slow!” This metric breaks out
    the execution time for each step, which can be useful in determining which query
    in a stored procedure took the most time to execute. The following is the output
    for `STATISTICS TIME` for the same query used in the previous execution plan:


    ```sql

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms, elapsed time = 64 ms.

    ```


    Parse and compile time is the time spent by SQL Server to perform the parsing,
    binding, and optimization steps discussed earlier. Execution time is the actual
    time spent on running the query itself.


    These times are very useful, but must be taken with a grain of salt. Execution
    times are affected by many different variables. If an execution plan is cached
    and reused, the parse and compile time will be zero. If data is cached in memory,
    the execution time will be much faster. External factors, such as network latency,
    IO latency, or contention from other processes can all affect execution time.
    As a result, it’s important to base your optimization decisions on many trial
    executions of the query to ensure that you are not making decisions based on exceptions
    or edge-cases.


    As a rule of thumb, when timing a query’s execution, I will try to run it at least
    10-20 times to get a good idea of how it would perform in a production environment
    where it may be run over and over. How often you personally test a query will
    be based on its importance and complexity and on your organization’s QA policies.
    When in doubt, take the time to run enough trials so that you are comfortable
    with the results and confident in using those results when justifying your decisions
    to others, if necessary.


    # Use All of These Tools!


    It is important to use as many performance metrics as possible when analyzing
    a query’s performance. An execution plan by itself may not tell the entire story,
    nor would execution times give you all of the information needed to tune a query.
    While more tools exist, the three discussed here (when used in concert) provide
    a very solid understanding of how a query performs, where a bottleneck exists,
    and some hints as to where to begin tuning in order to improve performance.


    ## Dynamic vs. Standard SQL


    While the TSQL that executes within a command string will be handled by SQL Server
    like any other standard SQL statement, there are some potential differences that
    are important to point out regarding performance.


    ### Query Parsing and Binding


    A big piece of the first two stages of query execution are checking syntax and
    object names and verifying that you didn’t make any mistakes when writing your
    query that would prevent it from being executed. The contents of strings are evaluated
    at runtime and are not subject to these processes when you initially write and
    test a query. Since a Dynamic SQL command string is a string, it will not be checked
    for the validity of its contents until you’ve executed it. You can parse a query
    and verify its syntax by clicking the icon shown in Figure [6-5](#A371168_1_En_6_Chapter.html#Fig5).


    ![A371168_1_En_6_Fig5_HTML.jpg](A371168_1_En_6_Fig5_HTML.jpg)


    **Figure 6-5.** Manually parsing a query in SQL Server Management Studio


    This feature allows you to verify syntax and check for any obvious mistakes before
    trying to execute your TSQL. The following query will generate a syntax error
    when parsing:


    ```sql

    SELECT & FROM Person.Person;

    ```


    My typo replaced the asterisk (`*`) with an ampersand (`&`). When I clicked the
    parse icon to validate my syntax, the result was an error:


    ```sql

    Msg 102, Level 15, State 1, Line 18

    Incorrect syntax near ''&''.

    ```


    Alternatively, if this were written as Dynamic SQL, no such error would be thrown:


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT & FROM Person.Person;'';

    EXEC (@sql_command);

    ```


    The parser doesn’t check the contents of `@sql_command` until it is executed,
    and is then treated as a new query that needs to be parsed, bound, optimized,
    and executed. It parses without an error, but will throw a similar error when
    executed:


    ```sql

    Msg 102, Level 15, State 1, Line 19

    Incorrect syntax near ''&''.

    ```


    As a result, it is important to carefully print and test command strings prior
    to executing them.'
  raw: '#### STATISTICS IO


    SQL Server can provide information about which tables were read and how many reads
    occurred against them. This can be turned on with the following TSQL:


    ```

    SET STATISTICS IO ON;

    ```


    This is very important information, as it indicates overall IO use. If a query
    is running slow, it could be the result of excessive reads against a table. The
    execution plan may not always convey the enormity of an IO bottleneck, but the
    knowledge that a query that returns two rows is taking a million reads to do so
    is an indication of a possible problem. Often, the two will correlate with each
    other, providing a solid foundation on which to understand why a query is slow.
    Once enabled, `STATISTICS IO` will add details to the text output screen, as shown
    in Figure [6-4](#A371168_1_En_6_Chapter.html#Fig4).


    ![A371168_1_En_6_Fig4_HTML.jpg](A371168_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Example output from STATISTICS IO


    While there are a number of operations detailed here, the discussion here is limited
    to the first four.


    ### Objects


    The name of the table or view that is being accessed.


    ### Scan Count


    This indicates if an object was read multiple times. A high number here can indicate
    that SQL Server is reading the same data over and over again, which can be a potential
    sign of an inefficient query.


    ### Logical Reads


    This is the number of reads made on the object indicated, regardless of whether
    the data is cached in memory or not. This will be the metric referred to throughout
    this chapter whenever you are concerned with IO read activity, as it will remain
    static for a given query even if the physical reads change.


    ### Physical Reads


    This is the number of reads where the data was not yet in the buffer cache. Whenever
    data is read for a query, it is placed into memory and remains there until it
    ages out or is replaced at a later time. The initial read of data into memory
    from your storage system can be very expensive. If queries are constantly making
    physical reads, that could be a sign that queries are reading too much data or
    that there is memory pressure on the server.


    When you execute a query and access data for the first time, this number will
    be the same as the logical reads, but all subsequent executions will show zero
    for this metric as the data will now be in memory from the first execution.


    #### STATISTICS TIME


    What is likely the most important metric to any consumer of data is the time it
    takes for the server to return the data they are looking for. As database professionals,
    the most common complaint we will hear is, “It’s slow!” This metric breaks out
    the execution time for each step, which can be useful in determining which query
    in a stored procedure took the most time to execute. The following is the output
    for `STATISTICS TIME` for the same query used in the previous execution plan:


    ```

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms, elapsed time = 64 ms.

    ```


    Parse and compile time is the time spent by SQL Server to perform the parsing,
    binding, and optimization steps discussed earlier. Execution time is the actual
    time spent on running the query itself.


    These times are very useful, but must be taken with a grain of salt. Execution
    times are affected by many different variables. If an execution plan is cached
    and reused, the parse and compile time will be zero. If data is cached in memory,
    the execution time will be much faster. External factors, such as network latency,
    IO latency, or contention from other processes can all affect execution time.
    As a result, it’s important to base your optimization decisions on many trial
    executions of the query to ensure that you are not making decisions based on exceptions
    or edge-cases.


    As a rule of thumb, when timing a query’s execution, I will try to run it at least
    10-20 times to get a good idea of how it would perform in a production environment
    where it may be run over and over. How often you personally test a query will
    be based on its importance and complexity and on your organization’s QA policies.
    When in doubt, take the time to run enough trials so that you are comfortable
    with the results and confident in using those results when justifying your decisions
    to others, if necessary.


    #### Use All of These Tools!


    It is important to use as many performance metrics as possible when analyzing
    a query’s performance. An execution plan by itself may not tell the entire story,
    nor would execution times give you all of the information needed to tune a query.
    While more tools exist, the three discussed here (when used in concert) provide
    a very solid understanding of how a query performs, where a bottleneck exists,
    and some hints as to where to begin tuning in order to improve performance.


    ### Dynamic vs. Standard SQL


    While the TSQL that executes within a command string will be handled by SQL Server
    like any other standard SQL statement, there are some potential differences that
    are important to point out regarding performance.


    #### Query Parsing and Binding


    A big piece of the first two stages of query execution are checking syntax and
    object names and verifying that you didn’t make any mistakes when writing your
    query that would prevent it from being executed. The contents of strings are evaluated
    at runtime and are not subject to these processes when you initially write and
    test a query. Since a Dynamic SQL command string is a string, it will not be checked
    for the validity of its contents until you’ve executed it. You can parse a query
    and verify its syntax by clicking the icon shown in Figure [6-5](#A371168_1_En_6_Chapter.html#Fig5).


    ![A371168_1_En_6_Fig5_HTML.jpg](A371168_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    Manually parsing a query in SQL Server Management Studio


    This feature allows you to verify syntax and check for any obvious mistakes before
    trying to execute your TSQL. The following query will generate a syntax error
    when parsing:


    ```

    SELECT & FROM Person.Person;

    ```


    My typo replaced the asterisk (`*`) with an ampersand (`&`). When I clicked the
    parse icon to validate my syntax, the result was an error:


    ```

    Msg 102, Level 15, State 1, Line 18

    Incorrect syntax near ''&''.

    ```


    Alternatively, if this were written as Dynamic SQL, no such error would be thrown:


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT & FROM Person.Person;'';

    EXEC (@sql_command);

    ```


    The parser doesn’t check the contents of `@sql_command` until it is executed,
    and is then treated as a new query that needs to be parsed, bound, optimized,
    and executed. It parses without an error, but will throw a similar error when
    executed:


    ```

    Msg 102, Level 15, State 1, Line 19

    Incorrect syntax near ''&''.

    ```


    As a result, it is important to carefully print and test command strings prior
    to executing them.'
  trans: '# STATISTICS IO


    SQL Server 可以提供关于哪些表被读取以及针对这些表的读取次数等信息。可以通过以下 T-SQL 开启此功能：


    ```sql

    SET STATISTICS IO ON;

    ```


    这是非常重要的信息，因为它反映了整体的 I/O 使用情况。如果某个查询运行缓慢，可能是由于对某个表进行了过多的读取。执行计划可能并不总是能体现 I/O 瓶颈的严重性，但了解到一个仅返回两行的查询却需要进行一百万次读取，这就表明可能存在某个问题。通常，这两者会相互关联，从而为理解查询为何缓慢提供一个坚实的基础。一旦启用，`STATISTICS
    IO` 会在文本输出屏幕中添加详细信息，如图 6-4 所示。


    ![A371168_1_En_6_Fig4_HTML.jpg](img/A371168_1_En_6_Fig4_HTML.jpg)


    **图 6-4.** STATISTICS IO 的输出示例


    虽然这里详细列出了许多操作，但本节的讨论仅限于前四个。


    ### 对象 (Objects)


    正在访问的表或视图的名称。


    ### 扫描计数 (Scan Count)


    这表明一个对象是否被多次读取。此处的高数值可能表明 SQL Server 在反复读取相同的数据，这可能是查询效率低下的一个潜在迹象。


    ### 逻辑读取 (Logical Reads)


    这是针对所指示对象进行的读取次数，无论数据是否缓存在内存中。在本章中，凡是涉及到 I/O 读取活动的讨论，都将以此指标为参考，因为它即使在物理读取发生变化时，对于给定查询也保持不变。


    ### 物理读取 (Physical Reads)


    这是指数据尚未位于缓冲区高速缓存中的读取次数。每当为查询读取数据时，该数据会被放入内存，并一直保留在那里，直到其过期或稍后被替换。数据从存储系统首次读入内存的操作可能非常耗时。如果查询不断进行物理读取，这可能表明查询读取了过多数据，或者服务器上存在内存压力。


    当你执行一个查询并首次访问数据时，此数值将与逻辑读取次数相同，但所有后续执行都将显示此指标为零，因为数据在首次执行后已位于内存中。


    # STATISTICS TIME


    对于任何数据使用者而言，最重要的指标可能就是服务器返回他们所需数据所需的时间。作为数据库专业人员，我们最常听到的抱怨是：“太慢了！”该指标会分解每个步骤的执行时间，这对于确定存储过程中哪个查询花费了最多的执行时间非常有用。以下是与之前执行计划中使用的相同查询的
    `STATISTICS TIME` 输出：


    ```sql

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms, elapsed time = 64 ms.

    ```


    解析和编译时间是 SQL Server 执行前面讨论的解析、绑定和优化步骤所花费的时间。执行时间是实际运行查询本身所花费的时间。


    这些时间非常有用，但必须谨慎对待。执行时间受许多不同变量的影响。如果执行计划被缓存并重用，解析和编译时间将为零。如果数据缓存在内存中，执行时间将快得多。外部因素，如网络延迟、I/O
    延迟或其他进程的争用，都会影响执行时间。因此，重要的是基于查询的多次试执行来做出优化决策，以确保不是根据异常或边缘情况做出决定。


    根据经验，在对查询执行进行计时时，我会尝试至少运行 10-20 次，以便对其在生产环境（可能被反复运行）中的表现有一个良好的了解。你个人测试查询的频率应基于其重要性和复杂性，以及你所在组织的质量保证政策。如有疑问，请花时间运行足够的试验次数，直到你对结果感到满意，并且在必要时有信心使用这些结果来向他人证明你的决策是合理的。


    # 使用所有这些工具！


    在分析查询性能时，使用尽可能多的性能指标非常重要。执行计划本身可能无法说明全部情况，执行时间也不会提供调优查询所需的全部信息。虽然存在更多工具，但这里讨论的三种工具（当协同使用时）可以提供对查询性能、瓶颈所在以及开始调优以提高性能的线索等方面的非常扎实的理解。


    ## 动态 SQL 与标准 SQL


    虽然在命令字符串内执行的 T-SQL 将像任何其他标准 SQL 语句一样由 SQL Server 处理，但在性能方面存在一些值得注意的潜在差异。


    ### 查询解析与绑定


    查询执行的前两个阶段的一个重要部分是检查语法和对象名称，并验证你在编写查询时是否犯了任何会阻止其执行的错误。字符串的内容在运行时进行评估，在你最初编写和测试查询时不受这些过程的影响。由于动态
    SQL 命令字符串是一个字符串，直到你执行它之前，其内容的有效性都不会被检查。你可以通过点击图 6-5 所示的图标来解析查询并验证其语法。


    ![A371168_1_En_6_Fig5_HTML.jpg](img/A371168_1_En_6_Fig5_HTML.jpg)


    **图 6-5.** 在 SQL Server Management Studio 中手动解析查询


    此功能允许你在尝试执行 T-SQL 之前验证语法并检查任何明显的错误。以下查询在解析时将产生语法错误：


    ```sql

    SELECT & FROM Person.Person;

    ```


    我的笔误将星号 (`*`) 替换成了与号 (`&`)。当我点击解析图标来验证语法时，结果是一个错误：


    ```sql

    Msg 102, Level 15, State 1, Line 18

    Incorrect syntax near ''&''.

    ```


    相反，如果这是作为动态 SQL 编写的，则不会抛出此类错误：


    ```sql

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''SELECT & FROM Person.Person;'';

    EXEC (@sql_command);

    ```


    解析器在执行 `@sql_command` 之前不会检查其内容，执行时它被当作一个新的查询，需要经历解析、绑定、优化和执行过程。它解析时没有错误，但在执行时会抛出类似的错误：


    ```sql

    Msg 102, Level 15, State 1, Line 19

    Incorrect syntax near ''&''.

    ```


    因此，在执行命令字符串之前，仔细打印并进行测试非常重要。'
- fmt: '### Execution Plan Caching


    A query execution plan is generated for every unique query that executes in SQL
    Server. What makes a query unique? This is determined by its exact text. Optimizing
    a query in order to generate an execution plan takes time and server resources
    and is a relatively expensive process, especially for more complex queries. Consider
    the query in Listing [6-1](#A371168_1_En_6_Chapter.html#Par43), which hypothetically
    runs frequently on a server, 500 times per minute.


    ```sql

    DECLARE @FirstName NVARCHAR(MAX) = ''Edward'';

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = "" + @FirstName + "";

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    Listing 6-1. Example TSQL that Will Generate a New Execution Plan for Each First
    Name


    When this is executed for the first time, an execution plan is created for its
    exact text, which will print out as follows:


    ```sql

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = ''Edward'';

    ```


    Note that the name `Edward` is included in the SQL text. Let’s say that the query
    runs again, but for a different name:


    ```sql

    DECLARE @FirstName NVARCHAR(MAX) = ''Xavier'';

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = "" + @FirstName + "";

    ''

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    The resulting SQL text will be different than the previous run of the query:


    ```sql

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = ''Xavier'';

    ```


    As a result, each will receive a different execution plan. Checking the data from
    the time statistics, you can see that some finite amount of time was spent on
    handling the query prior to execution:


    ```sql

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 1 ms.

    ```


    One microsecond may not seem like much, but if it executed 500 times per minute,
    you would end up with 720,000ms of extra execution time every day! For a more
    complex query, this could add up to a huge amount of latency. When an execution
    plan is reused, the time indicated for the parse and compile time will be zero,
    which is much more desirable for a query that is executed often.


    The fix for this dilemma is the same as the fix for many of the security and SQL
    injection concerns you saw in earlier chapters: parameterize the query! Rewriting
    the query changes `FirstName` into a parameter that can be used over and over
    with the same execution plan:


    ```sql

    DECLARE @FirstName NVARCHAR(MAX) = ''Edward'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@first_name NVARCHAR(MAX)'';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name;''

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @FIrstName;

    ```


    When `@sql_command` is printed out for this version of the simple query, the resulting
    text is as follows:


    ```sql

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name;

    ```


    In fact, the query text will be the same, no matter what value of `@FirstName`
    is passed in to the Dynamic SQL command string. As a result, you will only pay
    the price of optimizing the query once, and then the execution plan will be reused
    over and over from that point on. That’s 12 minutes of latency shaved off of this
    query per day. If it were a more complex query that required 20ms to parse and
    compile, then the savings would be four hours of latency!


    Let’s quickly prove this and show that the behavior I am describing is true and
    not just theoretical. First, you’d clear out the procedure cache, which will provide
    you with a clean slate to work on with no distractions:


    ```sql

    DBCC FREEPROCCACHE;

    ```


    Executing this `DBCC` command will clear all execution plan data out of cache.
    This is an excellent way to create a clean environment to test in, but should
    only be used in isolated environments where important workloads cannot be affected!
    For the test purposes on local test servers here, this is a fine way to aid your
    work.


    **Never clear out the procedure cache in production unless you absolutely mean
    it!** This removes all query execution plan data from cache, and on a busy server
    could cause immense latency as queries will need to be re-optimized!


    Now, let’s run the previous queries on `Person.Person` a few times, each one with
    a variety of different names. This is solely to add execution data to the cache
    for the upcoming demo, and therefore any queries that run on this table will end
    up in cache and visible below. Once it’s done, you can build a TSQL statement
    that will read query data from the cache, as shown in Listing [6-2](#A371168_1_En_6_Chapter.html#Par63).


    ```sql

    SELECT

    cached_plans.objtype AS ObjectType,

    OBJECT_NAME(sql_text.objectid, sql_text.dbid) AS ObjectName,

    cached_plans.usecounts AS ExecutionCount,

    sql_text.TEXT AS QueryText

    FROM sys.dm_exec_cached_plans AS cached_plans

    CROSS APPLY sys.dm_exec_sql_text(cached_plans.plan_handle) AS sql_text

    WHERE sql_text.TEXT LIKE ''%Person.Person%'';

    ```


    Listing 6-2. TSQL that Can Retrieve SQL Text from the Query Plan Cache


    This returns only a handful of relevant columns from the plan cache for your viewing
    pleasure, but could be altered to return quite a bit more data, if you wanted.
    The results of this query are shown in Figure [6-6](#A371168_1_En_6_Chapter.html#Fig6).


    ![A371168_1_En_6_Fig6_HTML.jpg](A371168_1_En_6_Fig6_HTML.jpg)


    Figure 6-6. Sample data from the query plan cache


    The results are every query that is currently in the plan cache with TSQL text
    that includes the string `"Person.Person"`. The first query is the one I just
    ran to collect this data. The second is the parameterized query, which I ran for
    a variety of different first names. Notice that the execution count indicates
    that it has been reused a number of times. The remaining six queries are the non-parameterized
    queries from earlier, executed for the names `Edward`, `Xavier`, `Thomas`, `Jesse`,
    `James`, and `T-Rex`!!!. Regardless of the results (or lack thereof) returned,
    a separate entry is in the plan cache for all of these, even though the queries
    are essentially the same.


    Note that under the object type, the parameterized query is listed as `Prepared`
    rather than `Adhoc`, which indicates that the TSQL that was executed had no variables
    that could alter the TSQL text within it. By being completely parameterized, the
    query plan also becomes deterministic. Changing the first name you are searching
    for doesn’t alter the SQL text, and therefore does not alter the execution plan.
    In the event that this query were executed very often for a large variety of first
    names, the non-parameterized query would quickly fill up the plan cache with a
    pile of entries for the same search. This would be very wasteful over time, not
    only consuming resources in constantly compiling query execution plans, but eventually
    bumping more important queries out of cache. As a result, whenever you’re working
    with any query that is to be executed often, make sure that it can execute over
    and over but only needs a single execution plan.


    ### Simplifying Queries


    In the earlier discussion of dynamic searches, you were able to use Dynamic SQL
    as a way to remove excessive joins or `WHERE` clauses from TSQL statements. While
    the Dynamic SQL was more complex, the resulting TSQL that was executed was simpler.
    Now that you have some performance evaluation tools at your disposal, you can
    put that claim to the test! See Listing [6-3](#A371168_1_En_6_Chapter.html#Par69)
    for this stored procedure.'
