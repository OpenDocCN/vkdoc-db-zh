    ORDER BY LastName;

    OPEN idcursor;

    FETCH NEXT FROM idcursor INTO @nextid;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    SET @myIDs = @myIDs + CAST(@nextid AS NVARCHAR) + '','';

    FETCH NEXT FROM idcursor INTO @nextid;

    END

    SET @myIDs = LEFT(@myIDs, LEN(@myIDs) - 1);

    CLOSE idcursor;

    DEALLOCATE idcursor;

    SELECT @myIDs AS comma_separated_output;

    Listing 7-1.

    Example of a Cursor-Based Approach to Building a Comma-Delimited List of IDs

    ```


    In this TSQL, a `CURSOR` is declared for 100 IDs and is looped through, one-by-one,
    as the string `@myIDs` is slowly built up with IDs and commas. The last string
    modification uses the `LEFT` function to remove the trailing comma that is leftover
    from the loop. The result will be 100 `BusinessEntityID`s, separated by commas.
    The text output will appear like this:


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    We’ll cut off the list here after 16 IDs, as there’s no need to waste space with
    that... ![A371168_1_En_7_Figa_HTML.jpg](A371168_1_En_7_Figa_HTML.jpg)


    In general, iteration should be avoided when writing TSQL in any scenario where
    a set-based approach could be applied. SQL Server is built to efficiently process
    sets of data, and when you try to pull data a row at a time, you will often see
    poor performance as a result. This is an example of where TSQL that involves loops
    can be extremely inefficient. First look at the execution plan shown in Figure
    [7-1](#A371168_1_En_7_Chapter.html#Fig1).


    ![A371168_1_En_7_Fig1_HTML.jpg](A371168_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    Execution plan for a Simple SELECT Query that Iterates Through a Loop


    The execution plan is cut off after the first two queries, as the next 99 are
    exactly the same as the second one. It’s immediately clear that you have to consider
    101 execution plans in order to determine the overall effort expended by SQL Server
    when generating this list. As a result, it is necessary to read from `Person.Person`
    over 100 times, in addition to reading from the cursor itself, which is not a
    free operation. On my SQL Server, this took a total of 10 seconds to run. For
    a TSQL application whose purpose it is to read 100 IDs, this is quite slow! While
    much of this execution time results from generating 100 extra execution plans,
    it illustrates how any seemingly simple task performed often enough can become
    cumulatively painful.


    To gain more insight into the inefficiency introduced here, let’s review the IO
    statistics as well:


    ```

    Table ''Worktable''. Scan count 0, logical reads 201, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Person''. Scan count 1, logical reads 318, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 2, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Person''. Scan count 0, logical reads 3, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    The first set of IO statistics covers the initial cursor declaration. The second
    represents a single iteration of the `WHILE` loop, which will be repeated another
    99 times. If you add the total logical reads for all of the queries involved,
    you get 1019 reads, which is quite a lot given that it only intends to return
    100 integer values.


    While the output of this example was exactly what you were looking for, it took
    a relatively immense amount of computing resources to get there. Imagine if you
    wanted a list of a thousand or a million IDs. What if instead of IDs, you wanted
    a list of large strings? The result could easily be millions of reads and a query
    that grinds the server to a halt! Correct output is desirable, but with unscalable
    and unmaintainable performance, code like this will come back to haunt you in
    the future as software changes and your assumptions about data size or acceptable
    performance metrics become invalid.'
  trans: '## 什么是动态列表


    介绍这个主题最简单的方式是通过一个例子。假设你想要输出一个人员的 ID 列表，并以逗号分隔。一种常用的方法是通过使用一个 `CURSOR`（游标）来逐段构建这个字符串，如代码清单
    7-1 所示。


    ```

    DECLARE @nextid INT;

    DECLARE @myIDs NVARCHAR(MAX) = '''';

    DECLARE idcursor CURSOR FOR

    SELECT TOP 100

    BusinessEntityID

    FROM Person.Person

    ORDER BY LastName;

    OPEN idcursor;

    FETCH NEXT FROM idcursor INTO @nextid;

    WHILE @@FETCH_STATUS = 0

    BEGIN

    SET @myIDs = @myIDs + CAST(@nextid AS NVARCHAR) + '','';

    FETCH NEXT FROM idcursor INTO @nextid;

    END

    SET @myIDs = LEFT(@myIDs, LEN(@myIDs) - 1);

    CLOSE idcursor;

    DEALLOCATE idcursor;

    SELECT @myIDs AS comma_separated_output;

    ```


    ### 代码清单 7-1.

    使用游标方法构建逗号分隔的 ID 列表的示例


    在这段 T-SQL 中，声明了一个用于 100 个 ID 的 `CURSOR`，并逐个遍历循环，同时使用 ID 和逗号逐步构建字符串 `@myIDs`。最后的字符串修改使用了
    `LEFT` 函数来移除循环遗留下来的末尾逗号。结果将是 100 个以逗号分隔的 `BusinessEntityID`。文本输出将类似这样：


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    我们在这里将列表截断到 16 个 ID 之后，因为没有必要浪费空间展示全部...


    ![A371168_1_En_7_Figa_HTML.jpg](img/A371168_1_En_7_Figa_HTML.jpg)


    一般来说，在任何可以使用基于集合的方法的场景中编写 T-SQL 时，都应避免使用迭代。SQL Server 被设计为高效地处理数据集，当你尝试逐行提取数据时，通常会导致性能低下。这是涉及循环的
    T-SQL 可能极其低效的一个例子。首先看一下图 7-1 所示的执行计划。


    ![A371168_1_En_7_Fig1_HTML.jpg](img/A371168_1_En_7_Fig1_HTML.jpg)


    ### 图 7-1.

    一个遍历循环的简单 SELECT 查询的执行计划


    执行计划在前两个查询后被截断，因为接下来的 99 个查询与第二个完全相同。很明显，为了确定 SQL Server 在生成此列表时付出的总体努力，你必须考虑
    101 个执行计划。因此，除了读取游标本身（这不是一个免费的操作）之外，还需要从 `Person.Person` 读取超过 100 次。在我的 SQL Server
    上，总共花了 10 秒来运行。对于一个旨在读取 100 个 ID 的 T-SQL 应用程序来说，这相当慢！虽然大部分执行时间是由于生成了 100 个额外的执行计划，但这说明任何看似简单的任务，只要执行次数足够多，累积起来也会变得非常痛苦。


    为了更深入地了解这里引入的低效性，让我们也查看一下 IO 统计信息：


    ```

    Table ''Worktable''. Scan count 0, logical reads 201, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Person''. Scan count 1, logical reads 318, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 2, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Person''. Scan count 0, logical reads 3, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    第一组 IO 统计信息涵盖了初始的游标声明。第二组代表了 `WHILE` 循环的单次迭代，这将被重复另外 99 次。如果把所有涉及查询的逻辑读取总数相加，你会得到
    1019 次读取，这对于一个仅打算返回 100 个整数值的操作来说是相当多的。


    虽然这个例子的输出正是你想要的，但为了达到目的，它消耗了相对巨大的计算资源。想象一下，如果你想要一个包含一千或一百万个 ID 的列表会怎样？如果你要的不是
    ID 列表，而是大型字符串列表呢？结果很容易导致数百万次读取，并且查询会使服务器陷入停顿！正确的输出是可取的，但如果性能不可扩展且难以维护，像这样的代码将来会随着软件变更以及你对数据规模或可接受性能指标的假设失效而重新困扰你。'
- fmt: '## Using XML to Create a Dynamic List


    It’s clear that generating a string using any form of loop is going to be inefficient
    for all but the tiniest data sets. An alternative that is widely used is to select
    the desired data from the underlying table and format it using XML. Consider the
    following example of this syntax, shown in Listing [7-2](#A371168_1_En_7_Chapter.html#Par16),
    that generates the same list as the loop introduced in the last example.


    ```

    DECLARE @myIDs NVARCHAR(MAX) = '''';

    SET @myIDs = STUFF((SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR)

    FROM Person.Person

    ORDER BY LastName

    FOR XML PATH(''''), TYPE

    ).value(''.'', ''NVARCHAR(MAX)''), 1, 1, '''');

    SELECT @myIDs;

    GO

    Listing 7-2.

    Generating a List of IDs Using XML

    ```


    The first thing you should notice is that the syntax is more complicated and somewhat
    less readable. The result set is the same, as intended:


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    To understand how XML generates this list, you can break the query up, starting
    with the innermost TSQL and then building on it as you move forward:


    ```

    SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR) AS ID_CSV

    FROM Person.Person

    ORDER BY LastName;

    ```


    This `SELECT` statement returns a list of IDs with a comma preceding each, as
    shown in Figure [7-2](#A371168_1_En_7_Chapter.html#Fig2).


    ![A371168_1_En_7_Fig2_HTML.jpg](A371168_1_En_7_Fig2_HTML.jpg)

    *Figure 7-2.*

    ID List that Will Be Used in an XML-Generated List


    Nothing out of the ordinary here. The next step will concatenate all of the rows
    of data into an XML format, which in SQL Server will display as a comma-delimited
    list:


    ```

    SELECT (SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR)

    FROM Person.Person

    ORDER BY LastName

    FOR XML PATH(''''));

    ```


    The result of this `SELECT` will show a result that is on its way to being the
    finished product:


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    There are two pieces of unfinished business that you need to deal with before
    you can consider this query fully dissected and correct. The first is to ensure
    that the XML output is the correct data type:


    ```

    SELECT (SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR)

    FROM Person.Person

    ORDER BY LastName

    FOR XML PATH(''''), TYPE

    ).value(''.'', ''NVARCHAR(MAX)'');

    ```


    The XML `value` method converts the XML results to the data type provided prior
    to returning it. In the event that this is a very long list, the conversion makes
    sure that you don’t suffer from string truncation along the way. It also lets
    you choose between `VARCHAR` and `NVARCHAR`, if the distinction is important.
    This example uses `NVARCHAR(MAX)` as the data type to return. The results of this
    query are identical to the output from the last step as the data type conversion
    is invisible to the SQL Server output you are viewing.


    The last step is to remove that pesky comma from the left, which can be accomplished
    via a number of string-manipulation techniques. `STUFF` is used above to cram
    the contents of the comma-delimited list into the character at position 1, which
    happens to be the comma you are looking to remove anyway. This method is convenient
    as it can be accomplished in a single step, without having to store the results
    in a variable, if you don’t need to. An alternative is to use `RIGHT` or `SUBSTRING`
    to remove the leading comma:


    ```

    DECLARE @myIDs NVARCHAR(MAX) = '''';

    SET @myIDs = (SELECT TOP 100 '','' + CAST(BusinessEntityID AS NVARCHAR)

    FROM Person.Person

    ORDER BY LastName

    FOR XML PATH(''''), TYPE

    ).value(''.'', ''NVARCHAR(MAX)'');

    SELECT RIGHT(@myIDs, LEN(@myIDs) - 1);

    SELECT SUBSTRING(@myIDs, 2, LEN(@myIDs) - 1);

    ```


    The results of each `SELECT` are identical and they match what you were looking
    for in the output:


    ```

    285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...

    ```


    Now that you see that XML can be used to generate a comma-delimited list, you
    should take the additional steps to performance test it and determine its level
    of efficiency. First, examine the IO statistics for the query:


    ```

    Table ''Person''. Scan count 1, logical reads 3, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    This looks great! The reads are the equivalent of what you would expect if were
    to simply run the `SELECT` statement from `Person.Person` with no additional formatting
    applied to it. Using XML reduced the reads from 1019 to 3, which I consider an
    excellent deal any day of the week! Next, let’s see how the execution plan looks,
    as in Figure [7-3](#A371168_1_En_7_Chapter.html#Fig3).


    ![A371168_1_En_7_Fig3_HTML.jpg](A371168_1_En_7_Fig3_HTML.jpg)

    *Figure 7-3.*

    Performance of List-Generation Using XML


    For a query that is grabbing a list of IDs, this is a bit complex. The magic that
    is performed behind-the-scenes by the XML reader isn’t free, and that becomes
    clear here, as it consumes 97 percent of the resources of the query. Examining
    the subtree cost of the execution plan, you’ll find that it is about 1.09, which
    is similar to the query cost of the `WHILE` loop method. In other words, the XML
    cost is similar to 100 queries in the loop from earlier. While it has reduced
    disk IO greatly, you risk consuming hefty amounts of CPU if you rely heavily on
    XML.'
