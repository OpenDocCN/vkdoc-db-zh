    ## Introduction


    Dynamic SQL is often described in bits and pieces, often when a need for code
    arises and time is limited. This book is an opportunity to put as many of those
    fragments together into a meaningful journey, from defining the technology to
    delving into its deepest and most complex aspects. This is a dive into many topics
    that are extremely important when working with any database. It will intentionally
    delve deeper into performance optimization, application development, and security
    than may seem necessary.


    ### What Is This Book?


    This is meant to be a discussion of smart database design and architecture, with
    a focus on Dynamic SQL. If any topic that is covered in an aside feels incomplete,
    it is because there simply isn''t room in these pages for a thorough analysis
    of all of them without losing focus on why you are here. Dynamic SQL is often
    underused, misused, or overused. The many tangents into other arenas of design
    and development serve as guides to keep you on track and emphasize the value of
    well-written database queries as well as ensuring that you use Dynamic SQL for
    the correct applications.


    Each chapter delves into a specific topic and attempts to go into as much detail
    as possible, while also providing multiple examples to demonstrate it in the simplest
    way possible. If you have never written a line of Dynamic SQL, this will be an
    opportunity to learn, practice, and immediately apply it. If you already have
    experience in writing and using Dynamic SQL, this will be a chance to learn new
    applications while getting a refresher on those you have worked with in the past.


    ### Intended Audience


    Anyone with a healthy interest in database administration or development can benefit
    from the topics covered in this book. Each chapter starts out with basic definitions
    and examples, providing an easy entry point for professionals with any level of
    experience. The book transitions into more advanced techniques, allowing you to
    not only learn the basics of an important subject, but also to gain access to
    scripts and ideas that could be tested and used to solve problems you may face
    in your everyday experiences.


    If you have a particular interest in database security or optimization, you will
    appreciate the focus on these topics in each chapter. SQL Injection gets an exhaustive
    review, with many different aspects and examples presented to ensure a thorough
    explanation of this important topic! Every chapter, regardless of topic, will
    reference performance whenever possible. It is an oft-made mistake that a database
    is designed with little data and few users, ignoring the possibility that it will
    one day grow into a behemoth. Reminders are placed throughout this book to consider
    query performance at all times, even when performance may seem “good enough”.


    ### Contacting the Author


    We can only grow personally and professionally if we are willing to consider other
    viewpoints and revise our own to improve.


    I love hearing from anyone who has ideas, questions, applications, video game
    recommendations, or criticism. Please contact me at `ed7@alum.rpi.edu` and let
    me know what I can do to improve the content of this book or address any questions
    or problems you may have.


    ### Acknowledgments


    The SQL Server community is vast, made up of user groups, companies, professionals,
    colleges, and organizations that create a network of like-minded individuals all
    looking to further their knowledge, while at the same time helping others.


    My interest in database administration was borne of some masochistic curiosity,
    but the resources to learn, grow, and share that knowledge were made possible
    by more people than I can count, each of whom has volunteered countless hours
    for the betterment of others.


    Thank you to the Professional Association of SQL Server; the Capital Area SQL
    Server Group and its founders, Dan Bowlin and Joe Barth; to CommerceHub and Autotask,
    companies that have given me great amounts of professional freedom to explore
    database technologies in my free time; Matt Slocum, for organizing and letting
    me be a part of the Rochester SQL Saturday (the first I spoke at); Apress, for
    the opportunity to write and for the support throughout the process; my friends,
    who are always there for me no matter what life has thrown at us; to the many
    volunteers who organize, speak, write, blog, and otherwise improve the world in
    their free time; and to my family for having immense patience when I''ve come
    up with crazy ideas like this one.'
