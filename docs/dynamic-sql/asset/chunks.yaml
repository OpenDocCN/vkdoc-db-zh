    \            IPS.avg_fragmentation_in_percent, -- Be sure to filter as much as\
    \ possible...this can return a lot of data if you dont filter by database and\
    \ table.\n            CAST(CASE\n                WHEN IPS.avg_fragmentation_in_percent\
    \ >= @rebuild_percentage THEN ''REBUILD''\n                WHEN IPS.avg_fragmentation_in_percent\
    \ >= @reorganization_percentage THEN ''REORGANIZE''\n            END AS NVARCHAR(MAX))\
    \ AS index_operation\n        FROM sys.dm_db_index_physical_stats(NULL, NULL,\
    \ NULL, NULL , NULL) IPS\n        INNER JOIN sys.databases SD\n            ON\
    \ SD.database_id = IPS.database_id\n        INNER JOIN sys.indexes SI\n      \
    \      ON SI.index_id = IPS.index_id\n        INNER JOIN sys.objects SO\n    \
    \        ON SO.object_id = SI.object_id\n            AND IPS.object_id = SO.object_id\n\
    \        INNER JOIN sys.schemas SS\n            ON SS.schema_id = SO.schema_id\n\
    \        WHERE alloc_unit_type_desc = ''IN_ROW_DATA''\n            AND index_level\
    \ = 0\n            AND SD.name = ''' + database_name + '''\n            AND IPS.avg_fragmentation_in_percent\
    \ >= @reorganization_percentage\n            AND SI.name IS NOT NULL -- Only review\
    \ index, not heap data.\n            AND SO.is_ms_shipped = 0 -- Do not perform\
    \ maintenance on system objects\n        ORDER BY SD.name ASC;'\n    FROM @database_list\n\
    \    WHERE database_name IN (SELECT name FROM sys.databases);\n\n    EXEC sp_executesql\
    \ @sql_command, @parameter_list, @reorganization_percentage, @rebuild_percentage;\n\
    \n    SELECT @sql_command = '';\n    SELECT @sql_command = @sql_command +\n  \
    \      '        USE [' + database_name + ']\n        ALTER INDEX [' + index_name\
    \ + '] ON [' + schema_name + '].[' + object_name + ']\n        ' + index_operation\
    \ + ';\n        '\n    FROM #index_maintenance;\n\n    SELECT * FROM #index_maintenance\n\
    \    ORDER BY avg_fragmentation_in_percent DESC;\n\n    IF @print_results_only\
    \ = 1\n        PRINT @sql_command;\n    ELSE\n        EXEC sp_executesql @sql_command;\n\
    \n    DROP TABLE #index_maintenance;\nEND\nGO\n```\n\n此脚本从一系列索引重建或重组操作中构建一个长命令字符串。请注意，每组动态\
    \ SQL 操作在执行前都使用动态生成的列表来构建字符串。这避免了循环或游标的需求，并能非常快速高效地完成任务。让我们使用默认参数来执行它：\n\n```sql\n\
    EXEC dbo.index_maintenance_demo @reorganization_percentage = 10, @rebuild_percentage\
    \ = 35, @print_results_only = 1;\n```\n\n由于 `@print_results_only` 设置为 1，因此不会执行任何索引操作。命令字符串将在存储过程结束时、删除临时表之前打印出来。以下是在我的服务器上打印出的结果的一部分：\n\
    \n```sql\nUSE [AdventureWorks2014]\nALTER INDEX [IX_vProductAndDescription] ON\
    \ [Production].[vProductAndDescription]\nREORGANIZE;\nUSE [AdventureWorks2014]\n\
    ALTER INDEX [IX_vStateProvinceCountryRegion] ON [Person].[vStateProvinceCountryRegion]\n\
    REBUILD;\nUSE [AdventureWorks2012]\nALTER INDEX [PK_ProductCostHistory_ProductID_StartDate]\
    \ ON [Production].[ProductCostHistory]\nREBUILD;\nUSE [AdventureWorks2012]\nALTER\
    \ INDEX [AK_ProductDescription_rowguid] ON [Production].[ProductDescription]\n\
    REBUILD;\nUSE [AdventureWorks2012]\nALTER INDEX [PK_DatabaseLog_DatabaseLogID]\
    \ ON [dbo].[DatabaseLog]\nREBUILD;\nUSE [AdventureWorks2012]\nALTER INDEX [PK_ProductInventory_ProductID_LocationID]\
    \ ON [Production].[ProductInventory]\nREORGANIZE;\n```\n\n当处理长命令字符串时，要小心截断，无论是字符串本身被截断，还是\
    \ Management Studio 的结果窗格在打印示例输出时截断。作为预防措施，我将临时表中的所有字符串都强制转换为 `NVARCHAR(MAX)`，以确保命令字符串不会被转换为任何较小的字符串数据类型。\n\
    \n同样重要的是要注意，使用动态 SQL 来收集索引碎片数据，是因为某些视图，如 `sys.tables` 和 `dm_db_index_physical_stats`，是数据库特定的。为了收集每个数据库的所有数据，需要先\
    \ `USE` 每个数据库，然后独立地检查它们内部的视图。类似地，要执行索引维护，也需要先 `USE` 相应的数据库，然后再运行重建或重组语句。\n\n临时表的内容也会输出，以便您可以进一步查看返回的数据，如图\
    \ 11-2 所示。\n\n![A371168_1_En_11_Fig2_HTML.jpg](img/A371168_1_En_11_Fig2_HTML.jpg)\n\
    \n## 图 11-2\n\n从清单 11-2 的查询返回的完整碎片结果。\n\n在这里，您可以查看每个索引、其碎片级别以及根据输入选择的操作。如果您确信此存储过程完全符合您的要求，您可以允许它执行整个命令字符串，并清理这些数据库中的所有索引：\n\
    \n```sql\nEXEC dbo.index_maintenance_demo @reorganization_percentage = 10, @rebuild_percentage\
    \ = 35, @print_results_only = 0;\n```\n\n等待大约 30 秒后，脚本成功完成，您的索引维护就完成了！您可以随心所欲地添加选项并继续自定义此脚本。一些值得考虑添加的功能：\n\
    \n*   向重建操作添加 `WITH (ONLINE = ON)`，以便它们可以在线运行（仅限企业版）。\n*   向重建操作添加 `WITH (SORT_IN_TEMP\
    \ = ON)`，以便它们可以在 TempDB 中排序中间重建结果，这可以加快操作速度。请记住，TempDB 中必须有足够的空间才能使其工作。\n*   如果需要除默认值以外的填充因子，则调整索引的填充因子。\n\
    *   检查索引的大小，并根据该信息采取不同的操作。\n*   添加日志记录，以便您可以查看执行的命令以及完成它们所需的时间。\n\n将此脚本作为起点，并根据您环境的需求进行定制，无论它们与这里呈现的可能有多大差异。定制和改进这个概念的方法有无数种，您的想象力是您与完美的索引解决方案之间的唯一障碍！\n"
- fmt: "### Database Backups\n\n另一个必要的数据库维护任务是确保所有重要数据都能定期备份。维护计划常被用于此任务，但它们缺乏灵活性，如果想为各种用例进行定制，可能会变得非常复杂。如果你管理许多数据库服务器，而每台服务器的备份需求都不同，结果可能会产生几十个（或更多）不同的维护计划。每一个都需要同等水平的关心和维护，因此为了确保长期正常运行，也会积累同等水平的技术负债。\n\
    \n通常更可取的方法是创建一个根据环境定制的备份脚本，该脚本能够随着时间的推移进行扩展、定制和调整。本节涵盖了备份计划的三个常见需求：完整备份、差异备份和事务日志备份。一个常见的配置是每周运行一次完整备份，每隔一天运行一次差异备份，并在一天中间歇性地运行事务日志备份。与索引碎片整理的情况一样，较大的备份（完整备份和差异备份）应在系统使用较少的非高峰时段运行，因为备份操作可能需要大量的\
    \ I/O 来处理。\n\n这个存储过程将按照你希望运行事务日志备份的频率执行。当它在与 `@differential_and_full_backup_time`\
    \ 对应的时间运行时，将改为运行其中一种备份。`@full_backup_day` 指示应在哪一天进行完整备份。`@backup_location` 提供备份应保存到的磁盘位置。最后，`@print_output_only`\
    \ 决定是实际进行备份，还是只打印出命令字符串。这个存储过程可见于清单 [11-3](#A371168_1_En_11_Chapter.html#Par35)。\n\
    \n```\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'backup_plan')\n\
    BEGIN\n    DROP PROCEDURE dbo.backup_plan;\nEND\nGO\nCREATE PROCEDURE dbo.backup_plan\n\
    \    @differential_and_full_backup_time TIME = '00:00:00', -- Default to midnight\n\
    \    @full_backup_day TINYINT = 1, -- Default to Sunday\n    @backup_location\
    \ NVARCHAR(MAX) = 'E:\\SQLBackups\\', -- Default to my backup folder\n    @print_output_only\
    \ BIT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @current_time TIME = CAST(CURRENT_TIMESTAMP\
    \ AS TIME);\n    DECLARE @current_day TINYINT = DATEPART(DW, CURRENT_TIMESTAMP);\n\
    \    DECLARE @datetime_string NVARCHAR(MAX) = FORMAT(CURRENT_TIMESTAMP , 'MMddyyyyHHmmss');\n\
    \    DECLARE @sql_command NVARCHAR(MAX) = '';\n    DECLARE @database_list TABLE\n\
    \        (database_name NVARCHAR(MAX) NOT NULL, recovery_model_desc NVARCHAR(MAX));\n\
    \    INSERT INTO @database_list\n        (database_name, recovery_model_desc)\n\
    \    SELECT\n        name,\n        recovery_model_desc\n    FROM sys.databases\n\
    \    WHERE databases.name NOT IN ('msdb', 'master', 'TempDB', 'model');\n    --\
    \ Check if a full backup is to be taken now.\n    IF (@current_day = @full_backup_day)\
    \ AND (@current_time BETWEEN @differential_and_full_backup_time AND DATEADD(MINUTE,\
    \ 10, @differential_and_full_backup_time))\n    BEGIN\n        SELECT @sql_command\
    \ = @sql_command +\n        '\n        BACKUP DATABASE [' + database_name + ']\n\
    \        TO DISK = ''' + @backup_location + database_name + '_' + @datetime_string\
    \ + '.bak'';\n        '\n        FROM @database_list;\n        IF @print_output_only\
    \ = 1\n            PRINT @sql_command;\n        ELSE\n            EXEC sp_executesql\
    \ @sql_command;\n    END\n    ELSE -- Check if a differential backup is to be\
    \ taken now.\n        IF (@current_day <> @full_backup_day) AND (@current_time\
    \ BETWEEN @differential_and_full_backup_time AND DATEADD(MINUTE, 10, @differential_and_full_backup_time))\n\
    \        BEGIN\n            SELECT @sql_command = '';\n            SELECT @sql_command\
    \ = @sql_command +\n            '\n            BACKUP DATABASE [' + database_name\
    \ + ']\n            TO DISK = ''' + @backup_location + database_name + '_' + @datetime_string\
    \ + '.dif''\n            WITH DIFFERENTIAL;\n            '\n            FROM @database_list;\n\
    \            IF @print_output_only = 1\n                PRINT @sql_command;\n\
    \            ELSE\n                EXEC sp_executesql @sql_command;\n        END\n\
    \        ELSE -- If neither full or differential, then take a transaction log\
    \ backup\n        BEGIN\n            SELECT @sql_command = '';\n            SELECT\
    \ @sql_command = @sql_command +\n            '\n            BACKUP LOG [' + database_name\
    \ + ']\n            TO DISK = ''' + @backup_location + database_name + '_' + @datetime_string\
    \ + '.trn''\n            '\n            FROM @database_list\n            WHERE\
    \ recovery_model_desc = 'FULL';\n            IF @print_output_only = 1\n     \
    \           PRINT @sql_command;\n            ELSE\n                EXEC sp_executesql\
    \ @sql_command;\n        END\nEND\nListing 11-3.\nDatabase Backup Stored Procedure\
    \ Using Dynamic SQL\n```\n\n请注意，与索引维护脚本一样，这将对除 `msdb`、`tempdb`、`master` 和 `model`\
    \ 之外的所有数据库执行备份。与之前的所有脚本一样，数据库列表可以轻松调整以满足任何自定义需求。此脚本可以按任何计划执行，并且将执行数据库的事务日志备份，除非在为其分配的时间和日期进行差异备份或完整备份。假设当前时间是星期二晚上\
    \ 7:53，你可以针对每种备份用例测试该脚本：\n\n```\nEXEC dbo.backup_plan @differential_and_full_backup_time\
    \ = '19:50:00', @full_backup_day = 3, @backup_location = 'E:\\SQLBackups\\', @print_output_only\
    \ = 1;\n```\n\n这将执行完整备份，因为当前时间在指定的完整备份时间的 10 分钟范围内，完整备份日已设置为星期二 (3)，并且备份语句将被打印而不是执行。命令字符串输出如下：\n\
    \n```\nBACKUP DATABASE [AdventureWorks2012]\nTO DISK = 'E:\\SQLBackups\\AdventureWorks2012_12012015195529.bak';\n\
    BACKUP DATABASE [AdventureWorks2014]\nTO DISK = 'E:\\SQLBackups\\AdventureWorks2014_12012015195529.bak';\n\
    BACKUP DATABASE [AdventureWorksDW2012]\nTO DISK = 'E:\\SQLBackups\\AdventureWorksDW2012_12012015195529.bak';\n\
    BACKUP DATABASE [AdventureWorksDW2014]\nTO DISK = 'E:\\SQLBackups\\AdventureWorksDW2014_12012015195529.bak';\n\
    ```"
  raw: '### Database Backups


    Another necessary database maintenance task is to ensure that all important data
    is backed up on a regular basis. Maintenance plans are often used for this task,
    but they lack flexibility and can become very complex if you want to customize
    them for a variety of use-cases. If you are managing many database servers, all
    of which have different backup needs, the result can be dozens (or more) of different
    maintenance plans. Each of these will require the same level of care and maintenance,
    and hence the same level of technical debt to ensure normal operation over time.


    What can often be preferable is to create a backup script tailored to an environment
    that is capable of being expanded, customized, and adjusted as needed over time.
    This section covers the three common needs of a backup plan: Full backups, differential
    backups, and transaction log backups. A common configuration is to run full backups
    once a week, differentials every other day, and transaction log backups intermittently
    throughout the day. As was the case with index defragmentation, the larger backups
    (full and differential) should be run off hours when the system is less used,
    as backup operations can require significant IO to process.


    This stored procedure will execute as often as you want transaction log backups
    to run. When it is run at the time of day corresponding to `@differential_and_full_backup_time`,
    one of those will be run instead. `@full_backup_day` indicates which day of the
    week the full backup should be taken. `@backup_location` provides the location
    on disk where backups should be saved. Lastly, `@print_output_only` determines
    if backups should be taken or if the command string should be printed out instead.
    This stored procedure can be seen in Listing [11-3](#A371168_1_En_11_Chapter.html#Par35).


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''backup_plan'')

    BEGIN

    DROP PROCEDURE dbo.backup_plan;

    END

    GO

    CREATE PROCEDURE dbo.backup_plan

    @differential_and_full_backup_time TIME = ''00:00:00'', -- Default to midnight

    @full_backup_day TINYINT = 1, -- Default to Sunday

    @backup_location NVARCHAR(MAX) = ''E:\SQLBackups\'', -- Default to my backup folder

    @print_output_only BIT = 1

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @current_time TIME = CAST(CURRENT_TIMESTAMP AS TIME);

    DECLARE @current_day TINYINT = DATEPART(DW, CURRENT_TIMESTAMP);

    DECLARE @datetime_string NVARCHAR(MAX) = FORMAT(CURRENT_TIMESTAMP , ''MMddyyyyHHmmss'');

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    DECLARE @database_list TABLE

    (database_name NVARCHAR(MAX) NOT NULL, recovery_model_desc NVARCHAR(MAX));

    INSERT INTO @database_list

    (database_name, recovery_model_desc)

    SELECT

    name,

    recovery_model_desc

    FROM sys.databases

    WHERE databases.name NOT IN (''msdb'', ''master'', ''TempDB'', ''model'');

    -- Check if a full backup is to be taken now.

    IF (@current_day = @full_backup_day) AND (@current_time BETWEEN @differential_and_full_backup_time
    AND DATEADD(MINUTE, 10, @differential_and_full_backup_time))

    BEGIN

    SELECT @sql_command = @sql_command +

    ''

    BACKUP DATABASE ['' + database_name + '']

    TO DISK = '''''' + @backup_location + database_name + ''_'' + @datetime_string
    + ''.bak'''';

    ''

    FROM @database_list;

    IF @print_output_only = 1

    PRINT @sql_command;

    ELSE

    EXEC sp_executesql @sql_command;

    END

    ELSE -- Check if a differential backup is to be taken now.

    IF (@current_day  @full_backup_day) AND (@current_time BETWEEN @differential_and_full_backup_time
    AND DATEADD(MINUTE, 10, @differential_and_full_backup_time))

    BEGIN

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command +

    ''

    BACKUP DATABASE ['' + database_name + '']

    TO DISK = '''''' + @backup_location + database_name + ''_'' + @datetime_string
    + ''.dif''''

    WITH DIFFERENTIAL;

    ''

    FROM @database_list;

    IF @print_output_only = 1

    PRINT @sql_command;

    ELSE

    EXEC sp_executesql @sql_command;

    END

    ELSE -- If neither full or differential, then take a transaction log backup

    BEGIN

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command +

    ''

    BACKUP LOG ['' + database_name + '']

    TO DISK = '''''' + @backup_location + database_name + ''_'' + @datetime_string
    + ''.trn''''

    ''

    FROM @database_list

    WHERE recovery_model_desc = ''FULL'';

    IF @print_output_only = 1

    PRINT @sql_command;

    ELSE

    EXEC sp_executesql @sql_command;

    END

    END

    Listing 11-3.

    Database Backup Stored Procedure Using Dynamic SQL

    ```


    Note that as with the index maintenance script, this will perform backups on all
    databases except for `msdb`, `tempdb`, `master`, and `model`. As was the case
    in all previous scripts, the database list can easily be adjusted to cater to
    any custom needs. This script can be executed on any schedule and will perform
    transaction log backups of the database except when it is the allotted time and
    date for a differential backup or full backup. Assuming that the current time
    is 7:53pm on Tuesday, you can test the script for each backup use-case:


    ```

    EXEC dbo.backup_plan @differential_and_full_backup_time = ''19:50:00'', @full_backup_day
    = 3, @backup_location = ''E:\SQLBackups\'', @print_output_only = 1;

    ```


    This will perform a full backup as the current time is within 10 minutes of the
    designated full backup time, the full backup day has been set to Tuesday (3),
    and the backup statements will be printed rather than executed. The command string
    output is as follows:


    ```

    BACKUP DATABASE [AdventureWorks2012]

    TO DISK = ''E:\SQLBackups\AdventureWorks2012_12012015195529.bak'';

    BACKUP DATABASE [AdventureWorks2014]

    TO DISK = ''E:\SQLBackups\AdventureWorks2014_12012015195529.bak'';

    BACKUP DATABASE [AdventureWorksDW2012]

    TO DISK = ''E:\SQLBackups\AdventureWorksDW2012_12012015195529.bak'';

    BACKUP DATABASE [AdventureWorksDW2014]

    TO DISK = ''E:\SQLBackups\AdventureWorksDW2014_12012015195529.bak'';

    ```'
  trans: "\n### 数据库备份\n\n另一项必要的数据库维护任务是确保所有重要数据都能定期备份。维护计划常被用于此任务，但它们缺乏灵活性，若想针对各种用例进行定制，可能会变得异常复杂。如果你管理着许多数据库服务器，而每台服务器的备份需求各不相同，结果可能会产生数十个（甚至更多）不同的维护计划。每个计划都需要同等程度的关注和维护，因此为了确保系统长期正常运行，也会累积同等量级的技术负债。\n\
    \n通常更可取的方法是创建一个可根据环境定制的备份脚本，该脚本能够随着时间的推移进行扩展、定制和调整。本节涵盖了备份方案的三种常见需求：**完整备份**、*差异备份*和事务日志备份。一种常见的配置是每周运行一次完整备份，每隔一天运行一次差异备份，并在一天中间歇性地运行事务日志备份。与索引碎片整理的情况一样，较大的备份（完整备份和差异备份）应在系统使用较少的非高峰时段运行，因为备份操作可能需要大量的\
    \ I/O 来处理。\n\n这个存储过程将按照你希望运行事务日志备份的频率执行。当它在与 `@differential_and_full_backup_time`\
    \ 对应的时间运行时，将改为运行其中一种备份。`@full_backup_day` 指示应在哪一天进行完整备份。`@backup_location` 提供备份应保存到的磁盘位置。最后，`@print_output_only`\
    \ 决定是实际进行备份，还是只打印出命令字符串。此存储过程参见清单 11-3。\n\n```\nIF EXISTS (SELECT * FROM sys.procedures\
    \ WHERE procedures.name = 'backup_plan')\nBEGIN\n    DROP PROCEDURE dbo.backup_plan;\n\
    END\nGO\nCREATE PROCEDURE dbo.backup_plan\n    @differential_and_full_backup_time\
    \ TIME = '00:00:00', -- 默认午夜\n    @full_backup_day TINYINT = 1, -- 默认为周日\n   \
    \ @backup_location NVARCHAR(MAX) = 'E:\\SQLBackups\\', -- 默认备份文件夹\n    @print_output_only\
    \ BIT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @current_time TIME = CAST(CURRENT_TIMESTAMP\
    \ AS TIME);\n    DECLARE @current_day TINYINT = DATEPART(DW, CURRENT_TIMESTAMP);\n\
    \    DECLARE @datetime_string NVARCHAR(MAX) = FORMAT(CURRENT_TIMESTAMP , 'MMddyyyyHHmmss');\n\
    \    DECLARE @sql_command NVARCHAR(MAX) = '';\n    DECLARE @database_list TABLE\n\
    \        (database_name NVARCHAR(MAX) NOT NULL, recovery_model_desc NVARCHAR(MAX));\n\
    \    INSERT INTO @database_list\n        (database_name, recovery_model_desc)\n\
    \    SELECT\n        name,\n        recovery_model_desc\n    FROM sys.databases\n\
    \    WHERE databases.name NOT IN ('msdb', 'master', 'TempDB', 'model');\n    --\
    \ 检查是否应执行完整备份\n    IF (@current_day = @full_backup_day) AND (@current_time BETWEEN\
    \ @differential_and_full_backup_time AND DATEADD(MINUTE, 10, @differential_and_full_backup_time))\n\
    \    BEGIN\n        SELECT @sql_command = @sql_command +\n        '\n        BACKUP\
    \ DATABASE [' + database_name + ']\n        TO DISK = ''' + @backup_location +\
    \ database_name + '_' + @datetime_string + '.bak'';\n        '\n        FROM @database_list;\n\
