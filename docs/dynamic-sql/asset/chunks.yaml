    END

    GO

    CREATE PROCEDURE dbo.get_products_by_model_local (@firstProductModelID INT, @lastProductModelID
    INT)

    AS

    BEGIN

    DECLARE @ProductModelID1 INT = @firstProductModelID;

    DECLARE @ProductModelID2 INT = @lastProductModelID;

