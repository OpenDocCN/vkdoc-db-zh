    使用架构元数据提供颜色名称的动态 UNPIVOT


    此示例中的一切都与上一个相同，唯一的区别在于颜色数据的收集，它使用了由 `sys.columns` 提供的表 `dbo.Products_By_Color`
    的列名。请注意，你需要在此处提供一个例外列表，其中包含你不想 `UNPIVOT` 的任何列。在此示例中，有两个额外的列不是颜色，并且你不想将它们转换为行数据：`product_name`
    和 `ReorderPoint`。如果忘记这些例外，你可能会收到意外的输出或类似以下的错误消息：


    ```

    Msg 8167, Level 16, State 1, Line 329

    The type of column "ReorderPoint" conflicts with the type of other columns specified
    in the UNPIVOT list.

    ```


    在这种情况下，我们将不同数据类型的列包含在了 `UNPIVOT` 中。虽然颜色下列出的数量都是 `INT` 类型，但 `ReorderPoint` 是 `SMALLINT`，而
    `product_name` 是 `NVARCHAR(50)`。例外可以像上面那样硬编码，也可以作为变量传递到运行 `UNPIVOT` TSQL 的任何地方。


    ## 动态 PIVOT


    ### 按季度分组


    到目前为止演示的功能非常适合教授 `PIVOT` 和 `UNPIVOT` 的基础知识，以及将动态 SQL 集成到它们的用法中。这些操作符在现实世界中一个非常常见的用途是生成按月、季度或年分布在列标题中的会计数据。例如，如果你希望返回按季度分列标题的销售数据该怎么办？你可以将
    `PIVOT` 集成到公共表表达式中，这允许你设置财务数据，然后你可以将其转换为列式数据以用于报告或进一步分析。此示例可以在清单 9-11 中看到。


    ```sql

    WITH CTE_SALES AS (

    SELECT

    DATEPART(QUARTER, OrderDate) AS order_quarter,

    DATEPART(YEAR, OrderDate) AS order_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR order_quarter IN ([1], [2], [3], [4])

    ) PIVOT_DATA

    ORDER BY order_year ASC;

    ```


    清单 9-11.

    使用 PIVOT 按季度对销售数据进行分组


    清单 9-11 中查询的结果可以在图 9-6 中的小结果集中看到。


    ![A371168_1_En_9_Fig6_HTML.jpg](img/A371168_1_En_9_Fig6_HTML.jpg)


    图 9-6.

    使用 PIVOT 获取按季度划分的销售额


    每个季度都有自己的列，销售总额聚合在下面的每一行中。`NULL` 的实例表示那些特定时间段内没有数据的情况。你也可以编写 `PIVOT` 来返回包括年份在内的所有季度作为列标题，如清单
    9-12 所示。


    ### 按季度和年份分组


    ```sql

    WITH CTE_SALES AS (

    SELECT

    ''Totals'' AS Totals,

    ''Q'' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''-'' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4)) AS quarter_and_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR quarter_and_year IN ([Q2-2011], [Q3-2011], [Q4-2011], [Q1-2012],[Q2-2012],
    [Q3-2012], [Q4-2012],

    [Q1-2013],[Q2-2013], [Q3-2013], [Q4-2013], [Q1-2014], [Q2-2014])

    ) PIVOT_DATA

    ```


    清单 9-12.

    使用 PIVOT 在单个结果行中按季度和年份对销售数据进行分组


    通过将季度和年份组合成一个字符串，你可以将数据压缩为单行，每季度一列，包括年份。包含 `Totals` 列是为了让你有某种行标题，但对于成功检索结果集来说并非必需。


    此语法引入了你之前遇到的相同问题，即你被迫将季度列表硬编码到 TSQL 中。如果添加新数据，则查询将不再有效。动态 SQL 可以再次拯救你，它允许你提前声明一个季度列表，然后将其集成到命令字符串中，该字符串将使用
    `PIVOT` 来适当地处理源数据，而不管日期如何。这在清单 9-13 中展示。


    ### 动态季度列表


    ```sql

    DECLARE @quarters TABLE

    (quarter_and_year NVARCHAR(7));

    INSERT INTO @quarters

    (quarter_and_year)

    SELECT DISTINCT

    ''Q'' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''-'' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4))

    FROM Sales.SalesOrderHeader

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    WITH CTE_SALES AS (

    SELECT

    ''''Totals'''' AS Totals,

    ''''Q'''' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + ''''-'''' +

    CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4)) AS quarter_and_year,

    TotalDue

    FROM Sales.SalesOrderHeader)

    SELECT

    *

    FROM

    (      SELECT

    *

    FROM CTE_SALES

    ) PRODUCT_DATA

    PIVOT

    (      SUM(TotalDue)

    FOR quarter_and_year IN (''

    SELECT @sql_command = @sql_command + ''['' + quarter_and_year + ''], ''

    FROM @quarters;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    ```


    清单 9-13.

    用于返回任意季度数财务数据的动态 PIVOT

    '
- fmt: "## Multiple PIVOT Operators\n\nThis next example illustrates a more advanced\
    \ use of `PIVOT`. Whereas previously you used `PIVOT` to operate on only a single\
    \ column—product color or sales quarter—it is possible to apply this operator\
    \ to multiple columns of distinct values. Let’s say that you wanted to crunch\
    \ your product data by color and also by safety stock level? This can be done\
    \ using a single query, as shown in Listing 9-14.\n\n```sql\nSELECT\n    *\nFROM\n\
    \    (\n        SELECT\n            PRODUCT.Name AS product_name,\n          \
    \  PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n      \
    \      PRODUCT_INVENTORY.Quantity AS product_quantity,\n            PRODUCT.SafetyStockLevel\n\
    \        FROM Production.Product PRODUCT\n        LEFT JOIN Production.ProductInventory\
    \ PRODUCT_INVENTORY\n            ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n\
    \    ) PRODUCT_DATA\nPIVOT\n    (\n        SUM(product_quantity)\n        FOR\
    \ product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],\
    \ [White], [Yellow])\n    ) PIVOT_DATA_COLOR\nPIVOT\n    (\n        COUNT(SafetyStockLevel)\n\
    \        FOR SafetyStockLevel IN ([4], [60], [100], [500], [800], [1000])\n  \
    \  ) PIVOT_DATA_LEVEL\n```\n\nListing 9-14. Using Multiple PIVOT Operators in\
    \ a Single TSQL Statement\n\nThe query in Listing 9-14 will return the results\
    \ shown in Figure 9-7.\n\n![A371168_1_En_9_Fig7_HTML.jpg](A371168_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7. Results of a query that uses two PIVOT operators for data aggregation\n\
    \nA new set of columns has been added to the result set, indicating the number\
    \ of times a particular `SafetyStockLevel` value matches the ones provided in\
    \ the list. This can be a very handy trick if you want to report on multiple metrics\
    \ side-by-side in a single query, rather than having to join multiple result sets.\n\
    \n### Using Dynamic SQL with Multiple PIVOTs\n\nYou can implement Dynamic SQL\
    \ just as you did before in order to ensure that all list values for both metrics\
    \ are correctly accounted for. When you do this, you will need to include a separate\
    \ table variable for `SafetyStockLevel` values, in addition to those for `Color`,\
    \ as shown in Listing 9-15.\n\n```sql\nDECLARE @colors TABLE\n    (color_name\
    \ VARCHAR(25));\nINSERT INTO @colors\n    (color_name)\nSELECT DISTINCT\n    Product.Color\n\
    FROM Production.Product\nWHERE Product.Color IS NOT NULL;\n\nDECLARE @stock_levels\
    \ TABLE\n    (safety_stock_level SMALLINT);\nINSERT INTO @stock_levels\nSELECT\
    \ DISTINCT\n    Product.SafetyStockLevel\nFROM Production.Product;\n\nDECLARE\
    \ @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\n    *\nFROM\n\
    \    (\n        SELECT\n            PRODUCT.Name AS product_name,\n          \
    \  PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n      \
    \      PRODUCT_INVENTORY.Quantity AS product_quantity,\n            PRODUCT.SafetyStockLevel\n\
    \        FROM Production.Product PRODUCT\n        LEFT JOIN Production.ProductInventory\
    \ PRODUCT_INVENTORY\n            ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n\
    \    ) PRODUCT_DATA\nPIVOT\n    (\n        SUM(product_quantity)\n        FOR\
    \ product_color IN (';\n\nSELECT @sql_command = @sql_command + '[' + color_name\
    \ + '], '\nFROM @colors;\n\nSELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command)\
    \ - 1);\n\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA_COLOR\nPIVOT\n\
    \    (\n        COUNT(SafetyStockLevel)\n        FOR SafetyStockLevel IN (';\n\
    \nSELECT @sql_command = @sql_command + '[' + CAST(safety_stock_level AS NVARCHAR)\
    \ + '], '\nFROM @stock_levels;\n\nSELECT @sql_command = SUBSTRING(@sql_command,\
    \ 1, LEN(@sql_command) - 1);\n\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA_LEVEL\n\
    ';\n\nPRINT @sql_command;\nEXEC sp_executesql @sql_command;\n```\n\nListing 9-15.\
    \ Using Multiple PIVOT Operators with Dynamic SQL\n\nThe result set is exactly\
    \ the same as it was previously. You can verify that you didn’t make any mistakes\
    \ by reviewing the text of the command string:\n\n```sql\nSELECT\n    *\nFROM\n\
    \    (\n        SELECT\n            PRODUCT.Name AS product_name,\n          \
    \  PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n      \
    \      PRODUCT_INVENTORY.Quantity AS product_quantity,\n            PRODUCT.SafetyStockLevel\n\
    \        FROM Production.Product PRODUCT\n        LEFT JOIN Production.ProductInventory\
    \ PRODUCT_INVENTORY\n            ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n\
    \    ) PRODUCT_DATA\nPIVOT\n    (\n        SUM(product_quantity)\n        FOR\
    \ product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],\
    \ [White], [Yellow])\n    ) PIVOT_DATA_COLOR\nPIVOT\n    (\n        COUNT(SafetyStockLevel)\n\
    \        FOR SafetyStockLevel IN ([4], [60], [100], [500], [800], [1000])\n  \
    \  ) PIVOT_DATA_LEVEL\n```\n\nCombining multiple `PIVOT` operators with Dynamic\
    \ SQL provides lots of flexibility when generating columnar data given the contents\
    \ of multiple columns. By producing a result set in a single query, you ensure\
    \ relational integrity and guarantee that you didn’t make any mistakes when outputting\
    \ data to intermediate locations. The syntax is exactly the same as it was for\
    \ a single `PIVOT` and does not become much more complex as you add instances\
    \ of it."
  raw: '## Multiple PIVOT Operators


    This next example illustrates a more advanced use of `PIVOT` . Whereas previously
    you used `PIVOT` to operate on only a single column—product color or sales quarter—it
    is possible to apply this operator to multiple columns of distinct values. Let’s
    say that you wanted to crunch your product data by color and also by safety stock
    level? This can be done using a single query, as shown in Listing [9-14](#A371168_1_En_9_Chapter.html#Par66).


    ```

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity,

    PRODUCT.SafetyStockLevel

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],
    [White], [Yellow])

    ) PIVOT_DATA_COLOR

    PIVOT

    (      COUNT(SafetyStockLevel)

    FOR SafetyStockLevel IN ([4], [60], [100], [500], [800], [1000])

    ) PIVOT_DATA_LEVEL

    Listing 9-14.

    Using Multiple PIVOT Operators in a Single TSQL Statement

    ```


    The query in Listing [9-14](#A371168_1_En_9_Chapter.html#Par66) will return the
