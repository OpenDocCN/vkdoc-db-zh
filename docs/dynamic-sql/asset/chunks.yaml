    \n    IF @product_sizemeasurecode IS NOT NULL\n        SELECT @sql_command = @sql_command\
    \ + '\n            AND SizeUnitMeasureCode.Name = @product_sizemeasurecode'\n\n\
    \    IF @product_weightunitmeasurecode IS NOT NULL\n        SELECT @sql_command\
    \ = @sql_command + '\n            AND WeightUnitMeasureCode.Name = @product_weightunitmeasurecode'\n\
    \n    PRINT @sql_command;\n    EXEC sp_executesql @sql_command, @parameter_list,\
    \ @product_name, @product_number,\n        @product_model, @product_subcategory,\
    \ @product_sizemeasurecode, @product_weightunitmeasurecode\nEND\nGO\n```\n\n清单\
    \ 3-6 中的 TSQL 显示了使用较少条件语句所带来的差异。生成的命令字符串可能包含一些额外的列，但存储过程变得更简单了，只有五个条件，而不是十个。这可以视为较小规模搜索或数据集相对直接的情况下的替代方案。如果将来每个表所需的列数增加，可能需要重新设计以保持高效的查询执行。或者，对于非常小的表，也可以使用\
    \ `SELECT TableName.*` 来进一步减小存储过程的大小。以下 TSQL 展示了针对 `ProductModel` 表的这一改动：\n\n\
    ```sql\nIF @show_product_model = 1 OR @show_catalog_description = 1\n    SELECT\
    \ @sql_command = @sql_command + '\n        ProductModel.*,';\n```\n\n虽然简单，但这将返回数量不确定的列，如果表持续添加新列，这可能成为未来的瓶颈。此外，使用这种语法，你会失去对列名的控制，这可能导致在许多表为不同数据元素使用相同列名的情况下出现重复项。在\
    \ `AdventureWorks` 中，你将无法区分产品名称和产品模型名称，因为两列都简单地称为 `Name`。在使用 `*` 返回表中所有列时请务必谨慎。对于结构非常可预测且不会发生变化的小型表，这可能是一个有用的工具。另一方面，如果表发生变化，此存储过程很容易中断或返回额外的意外数据。\n\
    \n在这个动态搜索中，连接只在需要从某个表中获取列时才会发生。这发生在通过输入参数位显式请求了某个列，或者对其进行了筛选时。\n\n动态连接、动态 `SELECT`\
    \ 语句和动态 `WHERE` 子句的组合确保了你不会访问任何对搜索网格非必需的表。虽然存储过程本身变大了，但它生成的命令字符串却在缩小，这是本次练习的主要目标。\n\
    \n## 搜索网格注意事项\n\n上一节介绍的存储过程在可定制性方面是一个巨大的进步，但它比之前的搜索更复杂。任何增加的复杂性都伴随着一系列考量，这些考量有助于做出明智的设计决策，并避免与此灵活性级别相关的陷阱。\n"
- fmt: "### Disallowing Blank Searches\n\nA common theme throughout all of the searches\
    \ so far has been to provide the end users with as much control as possible over\
    \ what they see and can filter on. This can potentially be dangerous, though,\
    \ if the data set is large and users request a huge amount of that data. It’s\
    \ generally a good practice to not allow users to perform a blank search unless\
    \ the data set is sufficiently small, or paged in such a way that it won’t be\
    \ a strain on the database server. That is, if they go to the search page and\
    \ click Go without providing any additional details, the program should either\
    \ do nothing or return an error:\n\n```sql\nIF COALESCE(@product_name, @product_number,\
    \ @product_model, @product_subcategory, @product_sizemeasurecode, @product_weightunitmeasurecode)\
    \ IS NULL\nRETURN;\n```\n\nThis additional `COALESCE` statement at the start of\
    \ the stored procedure will immediately exit if none of the filter criteria is\
    \ populated. Consider these `EXEC` statements:\n\n```sql\nEXEC dbo.search_products\
    \ @show_product_model = 1;\nEXEC dbo.search_products;\n```\n\nFor both of these\
    \ search attempts, the stored procedure will exit as soon as it reaches the `COALESCE`\
    \ check. If preferred, `RAISEERROR` can be used to throw a specific error back\
    \ to the application that the search originated from. Regardless, it’s up the\
    \ application to handle scenarios where no data set is returned or an error is\
    \ thrown and to ensure that the end users receive a friendly and helpful message\
    \ that explains why their search was invalid.\n\n### Data Paging\n\nIt is rare\
    \ that you would want to blindly return all rows in a result set. Consider your\
    \ favorite internet search engine: It’s unlikely that any will return more than\
    \ 25 results at a time by default. In a web search scenario, a single search could\
    \ return millions of hits. For the sake of the search provider and your own computer,\
    \ avoiding returning millions of rows is definitely beneficial!\n\nPaging can\
    \ be accomplished in a number of ways, depending on the version of SQL Server\
    \ that you are using. The simplest method is for the application to request a\
    \ specific set of IDs and then request additional sets of IDs whenever the user\
    \ clicks Next. Since users typically won’t click through hundreds of pages of\
    \ search results, querying the database each time they click isn’t likely to be\
    \ a significant drain on resources. If a data set is such that the end user will\
    \ want to eventually view everything, then selecting all of the data and allowing\
    \ the application to page through it as necessary will likely be more efficient\
    \ than selecting 25 rows over and over again. The following TSQL will return 25\
    \ products when the color is `NULL`:\n\n```sql\nSELECT  Name,\n        ProductNumber,\n\
    \        Color,\n        Size,\n        DaysToManufacture\nFROM    Production.Product\n\
    WHERE   Product.Color IS NULL\n        AND ProductID BETWEEN 316 AND 359\n```\n\
    \nAlternatively, a CTE can be used so that row numbers can be compared, instead\
    \ of directly pulling IDs for a set of products:\n\n```sql\nWITH CTE_PRODUCTS\
    \ AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER BY ProductID ASC) AS rownum,\n\
    \        Name,\n        ProductNumber,\n        Color,\n        Size,\n      \
    \  DaysToManufacture\n    FROM Production.Product\n    WHERE Product.Color IS\
    \ NULL)\nSELECT\n    Name,\n    ProductNumber,\n    Color,\n    Size,\n    DaysToManufacture\n\
    FROM CTE_PRODUCTS\nWHERE rownum BETWEEN 5 AND 29\n```\n\nThe results returned\
    \ by each of these queries are the same. While the second query is easier for\
    \ the application to process (as it doesn’t need to manage `ProductID`s), it will\
    \ be less efficient as it needs to reorder the data each time a search is performed.\
    \ The ID search simply grabs 25 rows using a clustered index seek, rather than\
    \ adding row numbers to the entire data set, prior to paging.\n\nStarting in SQL\
    \ Server 2012, the `OFFSET` functionality was added, which allows for paging without\
    \ the need for window functions or explicit ID references. The following statement\
    \ will return 25 products, starting at the 51^(st) product, based on the `ProductID`:\n\
    \n```sql\nSELECT  Name,\n        ProductNumber,\n        Color,\n        Size,\n\
    \        DaysToManufacture\nFROM    Production.Product\nWHERE   Product.Color\
    \ IS NULL\nORDER BY ProductID ASC\nOFFSET 50 ROWS\nFETCH NEXT 25 ROWS ONLY\n```\n\
    \nUsing this syntax, an `ORDER BY` clause must be present as it is necessary to\
    \ determine the column to page off of. The `OFFSET` determines how many rows to\
    \ skip before selecting the data you are interested in. Lastly, `FETCH NEXT` tells\
    \ SQL Server how many rows to retrieve from that starting point. `FETCH NEXT`\
    \ is optional and if omitted, all data after the offset will be returned. This\
    \ syntax is the simplest and easiest to use from an application perspective as\
    \ the `OFFSET` and `FETCH NEXT` row counts can be provided by an application,\
    \ TSQL, or user input, in order to quickly return exactly the result set desired.\n\
    \nYou will investigate performance in further detail in a later chapter, but for\
    \ now, it is worth mentioning that paging performance can vary greatly based on\
    \ the TSQL syntax used. Different use cases will lend themselves to different\
    \ approaches, though each option mentioned here is capable of effectively returning\
    \ paged results based on whatever user input is provided."
  raw: '### Disallowing Blank Searches


    A common theme throughout all of the searches so far has been to provide the end
    users with as much control as possible over what they see and can filter on. This
    can potentially be dangerous, though, if the data set is large and users request
    a huge amount of that data. It’s generally a good practice to not allow users
    to perform a blank search unless the data set is sufficiently small, or paged
    in such a way that it won’t be a strain on the database server. That is, if they
    go to the search page and click Go without providing any additional details, the
    program should either do nothing or return an error:


    ```

    IF COALESCE(@product_name, @product_number, @product_model, @product_subcategory,
    @product_sizemeasurecode, @product_weightunitmeasurecode) IS NULL

    RETURN;

    ```


    This additional `COALESCE` statement at the start of the stored procedure will
    immediately exit if none of the filter criteria is populated. Consider these `EXEC`
    statements:


    ```

    EXEC dbo.search_products @show_product_model = 1;

    EXEC dbo.search_products;

    ```


    For both of these search attempts, the stored procedure will exit as soon as it
    reaches the `COALESCE` check. If preferred, `RAISEERROR` can be used to throw
    a specific error back to the application that the search originated from. Regardless,
    it’s up the application to handle scenarios where no data set is returned or an
    error is thrown and to ensure that the end users receive a friendly and helpful
    message that explains why their search was invalid.


    ### Data Paging


    It is rare that you would want to blindly return all rows in a result set. Consider
    your favorite internet search engine: It’s unlikely that any will return more
    than 25 results at a time by default. In a web search scenario, a single search
    could return millions of hits. For the sake of the search provider and your own
    computer, avoiding returning millions of rows is definitely beneficial!


    Paging can be accomplished in a number of ways, depending on the version of SQL
    Server that you are using. The simplest method is for the application to request
    a specific set of IDs and then request additional sets of IDs whenever the user
    clicks Next. Since users typically won’t click through hundreds of pages of search
    results, querying the database each time they click isn’t likely to be a significant
    drain on resources. If a data set is such that the end user will want to eventually
    view everything, then selecting all of the data and allowing the application to
    page through it as necessary will likely be more efficient than selecting 25 rows
    over and over again. The following TSQL will return 25 products when the color
    is `NULL`:


    ```

    SELECT  Name,

    ProductNumber,

    Color,

    Size,

    DaysToManufacture

    FROM Production.Product

    WHERE Product.Color IS NULL

    AND ProductID BETWEEN 316 AND 359

    ```


    Alternatively, a CTE can be used so that row numbers can be compared, instead
    of directly pulling IDs for a set of products:


    ```

    WITH CTE_PRODUCTS AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY ProductID ASC) AS rownum,

    Name,

    ProductNumber,

    Color,

    Size,

    DaysToManufacture

    FROM Production.Product

    WHERE Product.Color IS NULL)

    SELECT

    Name,

    ProductNumber,

    Color,

    Size,

    DaysToManufacture

    FROM CTE_PRODUCTS

    WHERE rownum BETWEEN 5 AND 29

    ```


    The results returned by each of these queries are the same. While the second query
    is easier for the application to process (as it doesn’t need to manage `ProductID`s),
    it will be less efficient as it needs to reorder the data each time a search is
    performed. The ID search simply grabs 25 rows using a clustered index seek, rather
    than adding row numbers to the entire data set, prior to paging.


    Starting in SQL Server 2012, the `OFFSET` functionality was added, which allows
    for paging without the need for window functions or explicit ID references. The
    following statement will return 25 products, starting at the 51^(st) product,
    based on the `ProductID`:


    ```

    SELECT  Name,

    ProductNumber,

    Color,

    Size,

    DaysToManufacture

    FROM Production.Product

    WHERE Product.Color IS NULL

    ORDER BY ProductID ASC

    OFFSET 50 ROWS

    FETCH NEXT 25 ROWS ONLY

    ```


    Using this syntax, an `ORDER BY` clause must be present as it is necessary to
    determine the column to page off of. The `OFFSET` determines how many rows to
    skip before selecting the data you are interested in. Lastly, `FETCH NEXT` tells
    SQL Server how many rows to retrieve from that starting point. `FETCH NEXT` is
    optional and if omitted, all data after the offset will be returned. This syntax
    is the simplest and easiest to use from an application perspective as the `OFFSET`
    and `FETCH NEXT` row counts can be provided by an application, TSQL, or user input,
    in order to quickly return exactly the result set desired.


    You will investigate performance in further detail in a later chapter, but for
    now, it is worth mentioning that paging performance can vary greatly based on
    the TSQL syntax used. Different use cases will lend themselves to different approaches,
    though each option mentioned here is capable of effectively returning paged results
    based on whatever user input is provided.'
  trans: "\n### 禁止空白搜索\n\n到目前为止，所有搜索的一个共同主题是尽可能赋予最终用户对其查看和筛选内容的最大控制权。然而，如果数据集庞大且用户请求大量数据，这可能带来潜在风险。通常，除非数据集足够小，或以不会给数据库服务器造成压力的方式进行了分页，否则不应允许用户执行空白搜索。也就是说，如果用户转到搜索页面并直接点击\"\
    搜索\"而没有提供任何附加条件，程序应要么不执行操作，要么返回错误：\n\n```sql\nIF COALESCE(@product_name, @product_number,\
    \ @product_model, @product_subcategory, @product_sizemeasurecode, @product_weightunitmeasurecode)\
    \ IS NULL\nRETURN;\n```\n\n这个位于存储过程开头的额外 `COALESCE` 语句会在所有筛选条件都未填充时立即退出。考虑以下 `EXEC`\
    \ 语句：\n\n```sql\nEXEC dbo.search_products @show_product_model = 1;\nEXEC dbo.search_products;\n\
    ```\n\n对于这两种搜索尝试，存储过程一旦执行到 `COALESCE` 检查就会退出。如果需要，可以使用 `RAISEERROR` 向发起搜索的应用程序抛回特定错误。无论如何，由应用程序负责处理未返回数据集或抛出错误的情况，并确保最终用户收到友好且有用的提示信息，说明其搜索为何无效。\n\
    \n### 数据分页\n\n你很少会希望盲目地返回结果集中的所有行。想想你最喜欢的互联网搜索引擎：默认情况下，几乎没有哪个引擎会一次性返回超过 25 个结果。在网络搜索场景中，一次搜索可能返回数百万条结果。对搜索服务提供商和你自己的计算机而言，避免返回数百万行数据无疑是有益的！\n\
    \n根据所使用的 SQL Server 版本，分页可以通过多种方式实现。最简单的方法是应用程序请求一组特定的 ID，然后在用户点击\"下一页\"时请求额外的\
    \ ID 集。由于用户通常不会点击浏览数百页的搜索结果，每次点击时查询数据库不太可能对资源造成显著消耗。如果数据集的特点是最终用户最终希望查看所有内容，那么一次性选择所有数据并允许应用程序根据需要进行分页，可能会比反复选择\
    \ 25 行数据更高效。以下 TSQL 语句在颜色为 `NULL` 时返回 25 种产品：\n\n```sql\nSELECT  Name,\n     \
    \   ProductNumber,\n        Color,\n        Size,\n        DaysToManufacture\n\
    FROM    Production.Product\nWHERE   Product.Color IS NULL\n        AND ProductID\
    \ BETWEEN 316 AND 359\n```\n\n或者，可以使用 CTE，以便比较行号，而不是直接提取一组产品的 ID：\n\n```sql\n\
    WITH CTE_PRODUCTS AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER BY ProductID\
    \ ASC) AS rownum,\n        Name,\n        ProductNumber,\n        Color,\n   \
    \     Size,\n        DaysToManufacture\n    FROM Production.Product\n    WHERE\
    \ Product.Color IS NULL)\nSELECT\n    Name,\n    ProductNumber,\n    Color,\n\
    \    Size,\n    DaysToManufacture\nFROM CTE_PRODUCTS\nWHERE rownum BETWEEN 5 AND\
    \ 29\n```\n\n这两个查询返回的结果是相同的。虽然第二个查询对应用程序来说更容易处理（因为它不需要管理 `ProductID`），但它的效率会较低，因为每次执行搜索时都需要重新排序数据。ID\
    \ 搜索只是使用聚集索引查找直接获取 25 行，而不是在分页前为整个数据集添加行号。\n\n从 SQL Server 2012 开始，新增了 `OFFSET`\
    \ 功能，允许在不需要窗口函数或显式 ID 引用的情况下进行分页。以下语句将返回 25 种产品，从基于 `ProductID` 的第 51^(个)产品开始：\n\
    \n```sql\nSELECT  Name,\n        ProductNumber,\n        Color,\n        Size,\n\
    \        DaysToManufacture\nFROM    Production.Product\nWHERE   Product.Color\
    \ IS NULL\nORDER BY ProductID ASC\nOFFSET 50 ROWS\nFETCH NEXT 25 ROWS ONLY\n```\n\
    \n使用此语法时，必须存在 `ORDER BY` 子句，因为需要确定用于分页的列。`OFFSET` 决定在选择您感兴趣的数据之前跳过多少行。最后，`FETCH\
    \ NEXT` 告诉 SQL Server 从该起始点开始检索多少行。`FETCH NEXT` 是可选的，如果省略，将返回偏移量之后的所有数据。从应用程序的角度来看，这种语法是最简单、最易用的，因为\
    \ `OFFSET` 和 `FETCH NEXT` 的行数可以由应用程序、TSQL 或用户输入提供，以便快速返回恰好所需的结果集。\n\n你将在后续章节中更详细地研究性能问题，但这里值得指出的是，根据所使用的\
    \ TSQL 语法，分页性能可能会有很大差异。不同的用例会适合不同的方法，但这里提到的每个选项都能够基于提供的任何用户输入，有效地返回分页结果。\n"
- fmt: '# Conditional Paging


    If the size of a data set can vary greatly, then it may be beneficial to perform
    some initial intelligence on the data prior to gathering it. For example, if you
    know that a data set contains only 13 rows, then there is no need to page it.
    You can select all rows from the 13 row results in a single statement and have
    no further work to do. Similarly, if a result set is 30 rows, you know that it
    will fit on 1-2 pages, depending on how many results are displayed per page.


    For both of those scenarios, it is likely that the end user will view most, if
    not all, the results most of the time. If a search returns a huge set of results,
    then you know that paging is necessary. In addition, you know that the users will
    almost certainly not view all results in the set. If results are returned based
    on a relevance score, such as with a web search engine, then it’s very likely
    the users will only view the first 10 or 20 before either moving on or adjusting
    their search criteria.


    ## Dynamic Page Size


    The page size can also be dynamic, if desired, as an additional way to make the
    result set as useful as possible. For example, if 26 results are returned, having
    to click to a new page for a single result would be somewhat wasteful. Instead,
    simply returning all 26 at once would be easier, more efficient, and convenient
    for the users.


    If results are verbose and include additional details that consume a large amount
    of space, then returning fewer results automatically (based on how verbose) could
    be advantageous.


    ## Application-Specific Paging


    Knowing how an application works can help in determining the optimal method of
    paging. The following is an example of a search that returns line item details
    for orders based on a tracking number wildcard search. As a common search, it’s
    likely that `CarrierTrackingNumber` will be indexed and that most searches will
    be for a single tracking number only. However, the application may have different
    requirements with regards to how to execute the search, as shown in Listing [3-7](#A371168_1_En_3_Chapter.html#Par62).


    ```sql

    CREATE PROCEDURE dbo.search_sales_order_detail

    @tracking_number NVARCHAR(25), @offset_by_this_many_rows INT = 0, @row_count_to_return
    INT = 25, @return_all_results BIT = 0

    AS

    BEGIN

    SET NOCOUNT ON;

    -- Add wildcard delimiters to the tracking number

    SELECT @tracking_number = ''%'' + @tracking_number + ''%'';

    -- If the result set is small, return all results to the application for display.

    IF @return_all_results = 1

    BEGIN

    SELECT

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderHeader.Status,

    SalesOrderHeader.PurchaseOrderNumber,

    SalesOrderDetail.CarrierTrackingNumber,

    SalesOrderDetail.OrderQty,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.UnitPriceDiscount,

    SalesOrderDetail.LineTotal,

    Product.Name,

    Product.ProductNumber

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID

    WHERE CarrierTrackingNumber LIKE @tracking_number

    ORDER BY SalesOrderDetail.SalesOrderDetailID;

    END

    ELSE

    BEGIN

    SELECT

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderHeader.Status,

    SalesOrderHeader.PurchaseOrderNumber,

    SalesOrderDetail.CarrierTrackingNumber,

    SalesOrderDetail.OrderQty,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.UnitPriceDiscount,

    SalesOrderDetail.LineTotal,

    Product.Name,

    Product.ProductNumber

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID

    WHERE CarrierTrackingNumber LIKE @tracking_number

    ORDER BY SalesOrderDetail.SalesOrderDetailID

    OFFSET @offset_by_this_many_rows ROWS

    FETCH NEXT @row_count_to_return ROWS ONLY;

    END

    END

    GO

    ```


    Listing 3-7. Sales Order Detail Search with a Variety of Input Parameters


    This search provides four options. The tracking number input, which can be all
    or part of a tracking number, is the only required option. `@offset_by_this_many_rows`
    determines if you are skipping ahead in the search and `@row_count_to_return`
    indicates the number of rows to select. The `@return_all_results` parameter can
    be set to `1` in order to bypass all paging logic and return everything.


    This can be useful if the input is a complete tracking number, where returning
    all parts of the shipment would make logical sense and it’s unlikely that the
    data returned would be unusually large. In this example, the application handles
    the check for the input format to verify this, but the stored procedure could
    do this as well, if it were universally constant that a full tracking number results
    in all data being returned.


    ## Execution Examples


    Defaults are placed on the input parameters to simplify assumptions, but could
    be left off if the application wanted to always populate them. Let’s consider
    some sample input to this new search:


    ```sql

    EXEC dbo.search_sales_order_detail ''4911-403C-98'', NULL, NULL, 1;

    ```


    This search is for a complete tracking number. As a result, the application indicated
    that all results should be returned, regardless of the data size. This is accomplished
    by setting `@return_all_results` to `1`. This execution returns 12 rows, which
    constitute every sales order detail that has a carrier tracking number of `4911-403C-98`.


    ```sql

    EXEC dbo.search_sales_order_detail ''491'';

    ```


    This search is much more generic, only searching for three characters of a tracking
    number. Without any additional input, the stored procedure defaults to selecting
    the first 25 rows only. If more are required, the application will need to provide
    additional parameter values to account for this:


    ```sql

    EXEC dbo.search_sales_order_detail ''491'', 25, 50, 0;

    ```


    By adding an offset of 25 rows and a row count of 50, this stored procedure call
    will return the next 50 rows of this tracking number search. If the user continues
    to click Next, then more results would be returned by increasing the offset. Alternatively,
    the users would refine their search, adding more characters to their tracking
    number input string in order to more effectively find what they are looking for.


    ## Summary


    This example did not involve any Dynamic SQL, but the techniques used can be applied
    to any searching mechanism to include some level of pagination in the result set.
    Paging is a common and often necessary way to add control over a data set, increase
    customization by the end user, and maintain good performance by not returning
    too much data at one time.'
