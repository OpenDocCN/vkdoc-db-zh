    # 3. Large Scale Searching


    One of the most common, versatile, and useful ways to implement Dynamic SQL is
    when performing complex searches. Consider your favorite web sites and the search
    functionality provided in each. For some, the search may be simple: You go to
    the single text box in the top-right corner, enter some text, and get your results.
    Other searches—such as searching for a hotel, flight, or car rental—can involve
    dozens (or more) of optional parameters. Dynamic SQL can allow you to pare down
    your search queries in order to only process what is needed. In addition, you
    can greatly customize the search, as well as the data returned. You can even analyze
    the input to determine the correct course of action, based on its structure.


    ## Why Use Dynamic Searches?


    Let’s say you want to search through a table of products, but need to join this
    data to other tables along the way. Depending on the application, the number of
    tables could be small, or they could be immense. For the hotel search, you may
    very well need to join 50 tables if you wanted to query on every single possible
    search parameter. Listing [3-1](#A371168_1_En_3_Chapter.html#Par3) is an example
    of a relatively small product search that could benefit from the use of Dynamic
    SQL.


    ```

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,   @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode
    NVARCHAR(50) = NULL, @product_weightunitmeasurecode NVARCHAR(50) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SET @product_name = ''%'' + @product_name + ''%'';

    SET @product_number = ''%'' + @product_number + ''%'';

    SET @product_model = ''%'' + @product_model + ''%'';

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductSubcategory.Name AS product_subcategory_name,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = WeightUnitMeasureCode.UnitMeasureCode

    WHERE (Product.Name LIKE @product_name OR @product_name IS NULL)

    AND (Product.ProductNumber LIKE @product_number OR @product_number IS NULL)

    AND (ProductModel.Name LIKE @product_model OR @product_model IS NULL)

    AND (ProductSubcategory.Name = @product_subcategory OR @product_subcategory IS
    NULL)

    AND (SizeUnitMeasureCode.Name = @product_sizemeasurecode OR @product_sizemeasurecode
    IS NULL)

    AND (WeightUnitMeasureCode.Name = @product_weightunitmeasurecode OR @product_weightunitmeasurecode
    IS NULL);

    END

    Listing 3-1.

    Search Stored Procedure , with Six Optional Parameters (No Dynamic SQL)

    ```


    This stored procedure will search for products and has a variety of search options
    available for the users to choose from. Product name, product number, product
    model, product subcategory, size measure, and weight measure may all be provided
    or omitted from the user’s input. It is assumed for this specific example that
    product name, product number, and product model are wildcard searches, hence the
    addition of `%` to each parameter after it is passed in. The other parameters
    are assumed to be selected from a pre-populated menu, ensuring that any values
    passed in will be exact, and therefore there is no need to make those into wildcard
    searches.


    In the case of this search, we will always return the same six columns, regardless
    of the parameters passed in. As a result, we will `LEFT JOIN` all participating
    tables to ensure that we get a row per product, even if any join criteria are
    `NULL`. In order to ensure that no results are omitted for unused parameters,
    an additional check is added to all `WHERE` clauses such that, if the input is
    `NULL`, it will evaluate to true. The resulting logic allows you to choose one
    of the following:


    *   A parameter is passed in from user input and should be evaluated against the
    appropriate column. The `NULL` check evaluates to `FALSE` and has no bearing on
    this logic.

    *   A parameter is not passed in from the user, and therefore the comparison against
    it is irrelevant. Instead, the `NULL` check evaluates to true, which means the
    entire `WHERE` clause evaluates to `TRUE`.


    The following three examples illustrate how this works:'
  trans: '## 结论


    SQL 注入是贯穿应用程序开发生命周期中最常被利用的漏洞之一。事实上，许多政府、企业和独立调查都持续将 SQL 注入列为整个计算领域的 **头号** 漏洞。这显然是一个非常严肃的话题，也是在设计、开发、测试、部署和维护软件应用程序时必须时刻牢记的一点。


    防范 SQL 注入最简单有效的方法是积极主动地编写安全的 T-SQL 和代码。思考用户输入将如何整合到搜索参数中，并最终用于数据库查询。一旦定位到这些敏感区域，就要通过多层次的安全措施来处理。实施
    `sp_executesql` 是一个良好的开端，但结合输入验证、参数化和显式架构引用会更加有效。根据你的应用程序，尽可能多地采取额外步骤，因为每一步都是为你的数据保险库加的一把锁。


    如果管理层质疑这些额外步骤所需的时间和精力，请随时向他们解释你正在应对的漏洞。列出潜在的威胁以及它们一旦成为现实的后果。安全常常被视为一种不便，但作为数据库专业人员，证明其必要性并确保你的数据尽可能安全是你的责任。永远不要让关乎安全的“正确”做法与发布日期、效率或资源纠缠在一起。忽视这些相对简单的开发步骤，其后果之严重，不容忽视。


    第 4 章将更详细地讨论安全问题。SQL 注入如此重要，值得在 SQL Server 安全层级中占据一个独立而特殊的位置。从长远来看，记录你的安全努力及其所应对的威胁，其价值将不言自明。


    # 3. 大规模搜索


    实现动态 SQL 最常见、最通用且最有用的场景之一是在执行复杂搜索时。想想你喜欢的网站以及它们各自提供的搜索功能。有些搜索可能很简单：你前往右上角的单个文本框，输入一些文字，然后获得结果。其他的搜索——例如搜索酒店、航班或租车——可能涉及数十个（甚至更多）可选参数。动态
    SQL 可以让你精简搜索查询，只处理必要的部分。此外，你还可以高度自定义搜索以及返回的数据。你甚至可以分析输入，根据其结构来确定正确的操作步骤。


    ## 为何使用动态搜索？


    假设你想在产品表中进行搜索，但在此过程中需要将这些数据与其他表连接起来。根据应用程序的不同，涉及的表数量可能很少，也可能非常庞大。以酒店搜索为例，如果你想针对每一个可能的搜索参数进行查询，很可能需要连接
    50 张表。清单 3-1 是一个相对较小的产品搜索示例，它可以从使用动态 SQL 中受益。


    ```sql

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,   @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode
    NVARCHAR(50) = NULL, @product_weightunitmeasurecode NVARCHAR(50) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SET @product_name = ''%'' + @product_name + ''%'';

    SET @product_number = ''%'' + @product_number + ''%'';

    SET @product_model = ''%'' + @product_model + ''%'';

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductSubcategory.Name AS product_subcategory_name,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = WeightUnitMeasureCode.UnitMeasureCode

    WHERE (Product.Name LIKE @product_name OR @product_name IS NULL)

    AND (Product.ProductNumber LIKE @product_number OR @product_number IS NULL)

    AND (ProductModel.Name LIKE @product_model OR @product_model IS NULL)

    AND (ProductSubcategory.Name = @product_subcategory OR @product_subcategory IS
    NULL)

    AND (SizeUnitMeasureCode.Name = @product_sizemeasurecode OR @product_sizemeasurecode
    IS NULL)

    AND (WeightUnitMeasureCode.Name = @product_weightunitmeasurecode OR @product_weightunitmeasurecode
    IS NULL);

    END

    ```

    清单 3-1.

    带六个可选参数的搜索存储过程（未使用动态 SQL）


    此存储过程用于搜索产品，并提供了多种搜索选项供用户选择。用户输入中可以提供或省略产品名称、产品编号、产品型号、产品子类别、尺寸度量和重量度量。在此特定示例中，假设产品名称、产品编号和产品型号是通配符搜索，因此在传入参数后为每个参数添加了
    `%`。其他参数假设是从预先填充的菜单中选择的，确保传入的值是精确的，因此无需将它们转换为通配符搜索。


    对于此搜索，无论传入的参数如何，我们都将始终返回相同的六个列。因此，我们对所有参与连接的表使用 `LEFT JOIN`，以确保每个产品都有一行数据，即使任何连接条件为
    `NULL`。为了确保未使用的参数不会遗漏结果，所有 `WHERE` 子句中都添加了一个额外的检查，使得如果输入为 `NULL`，该检查将评估为 true。由此产生的逻辑允许你选择以下情况之一：


    *   参数来自用户输入，应针对相应的列进行评估。`NULL` 检查评估为 `FALSE`，并且不影响此逻辑。

    *   参数未从用户处传入，因此针对它的比较无关紧要。相反，`NULL` 检查评估为 true，这意味着整个 `WHERE` 子句评估为 `TRUE`。


    以下三个示例说明了其工作原理：'
- fmt: '# 动态 SQL 示例：带可选参数的存储过程


    ## 参数搜索示例


    ```

    EXEC dbo.search_products @product_number = ''BK-M18'', @product_model = ''Mountain'',
    @product_subcategory = ''Mountain Bikes'';

    ```


    在这个搜索中，提供了三个参数，您将搜索产品编号包含 `BK-M18`、产品型号包含单词 “Mountain” 且必须在 “Mountain Bikes” 子类别中的任何产品。其他三个参数不参与
    `WHERE` 子句，而是针对第二个 `NULL` 检查进行评估。返回了十个符合这些规格的结果。


    ```

    EXEC dbo.search_products @product_name = ''Mountain-500 Black, 48'';

    ```


    在这里，用户确切知道他们要查找的内容，并输入了特定的产品名称。所有其他参数均为 `NULL`，并从搜索逻辑中丢弃。返回一行包含他们搜索的产品。


    ```

    EXEC dbo.search_products;

    ```


    在这个最后的示例中，用户没有输入任何搜索条件，只是运行一个空搜索。存储过程允许这样做；返回所有产品。所有输入均为 `NULL`，因此它们绕过了 `WHERE`
    子句谓词。


    ## 讨论与动态 SQL 介绍


    在回顾这个存储过程时，它是准确的，返回了预期的结果，但也有些冗长，并且为了达成目标评估了相当多的 `WHERE` 子句谓词。无论提供什么参数，执行的 T-SQL
    都非常相似，这在评估许多参数时可能会出现问题。


    随着业务逻辑随时间增长并变得更加复杂，这些查询无疑也会增长并增加规模和复杂性。一个简单的单列 `LEFT JOIN` 可能不再足以处理这个新逻辑。`WHERE`
    子句可能会附加更多选项，例如能够进行通配符搜索、相等搜索、包含 `AND/OR` 逻辑等。虽然这个存储过程可能会随着时间的推移而不断增长以涵盖所有这些新需求，但您绝对不希望最终执行的
    T-SQL 无限增长。当您连接数十个表、发出子查询、运行存在性检查以及发出复杂的 `WHERE` 子句时，性能将成为问题。这就是动态 SQL 的用武之地！有关使用参数限制连接的示例，请参见清单
    [3-2](#A371168_1_En_3_Chapter.html#Par17)。


    ## 使用动态 SQL 的存储过程实现


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_products'')

    BEGIN

    DROP PROCEDURE dbo.search_products;

    END

    GO

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,

    @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50)
    = NULL,

    @product_weightunitmeasurecode NVARCHAR(50) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SET @product_name = ''%'' + @product_name + ''%'';

    SET @product_number = ''%'' + @product_number + ''%'';

    SET @product_model = ''%'' + @product_model + ''%'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@product_name NVARCHAR(50), @product_number
    NVARCHAR(25),

    @product_model NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode
    NVARCHAR(50),

    @product_weightunitmeasurecode NVARCHAR(50)'';

    SELECT @sql_command = ''

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductSubcategory.Name AS product_subcategory_name,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE 1 = 1''

    IF @product_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND Product.Name LIKE @product_name''

    IF @product_number IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND Product.ProductNumber LIKE @product_number''

    IF @product_model IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND ProductModel.Name LIKE @product_model''

    IF @product_subcategory IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND ProductSubcategory.Name = @product_subcategory''

    IF @product_sizemeasurecode IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND SizeUnitMeasureCode.Name = @product_sizemeasurecode''

    IF @product_weightunitmeasurecode IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND WeightUnitMeasureCode.Name = @product_weightunitmeasurecode''

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @product_name, @product_number,

    @product_model, @product_subcategory, @product_sizemeasurecode,      @product_weightunitmeasurecode

    END

    ```

    清单 3-2. 使用动态 SQL 的带六个可选参数的搜索存储过程


    ## 动态 SQL 优势说明


    这个存储过程使用动态 SQL 为您提供对 `WHERE` 子句的完全控制。现在，您不再总是对所有列进行六次检查，而是在提供相关参数时才包含检查。考虑之前第一个示例：


    ```

    EXEC dbo.search_products @product_number = ''BK-M18'', @product_model = ''Mountain'',
    @product_subcategory = ''Mountain Bikes'';

    ```


    之前，搜索使用了所有六个 `WHERE` 子句部分（每个参数一个），即使参数为 `NULL`。使用新的动态 SQL 版本，生成的命令字符串将仅包含参数不为
    `NULL` 的 `WHERE` 子句部分，如清单 [3-3](#A371168_1_En_3_Chapter.html#Par21) 所示。


    ```

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductSubcategory.Name AS product_subcategory_name,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE 1 = 1

    AND Product.ProductNumber LIKE @product_number

    AND ProductModel.Name LIKE @product_model

    AND ProductSubcategory.Name = @product_subcategory

    ```

    清单 3-3. 清单 3-2 中存储过程的输出


    请注意，只包含了必要的 `WHERE` 子句段。`WHERE 1 = 1` 始终存在，与输入参数无关。虽然可以添加一些逻辑来移除默认 `WHERE` 子句的需求，但包含它没有显著成本，并避免为不断增长的存储过程添加任何更复杂的逻辑。'
  raw: '```

    EXEC dbo.search_products @product_number = ''BK-M18'', @product_model = ''Mountain'',
    @product_subcategory = ''Mountain Bikes'';

    ```


    In this search, three parameters are provided and you will search for any product
    that has a product number that includes `BK-M18`, a product model that includes
    the word “Mountain” and must be in the sub-category of “Mountain Bikes”. The other
    three parameters do not participate in the `WHERE` clause and are evaluated against
    the second `NULL` check instead. Ten results are returned that fit these specifications.


    ```

    EXEC dbo.search_products @product_name = ''Mountain-500 Black, 48'';

    ```


    Here, the user knows exactly what they are looking for, and enter a specific product
    name. All other parameters are NULL and are discarded from the search logic. A
    single row is returned with the product they were searching for.


    ```

    EXEC dbo.search_products;

    ```


    In this last example, the user enters no search criteria and simply runs an empty
    search. The stored procedure allows this; every product is returned. All inputs
    are `NULL` and therefore they bypass the `WHERE` clause predicate.


    In reviewing this stored procedure, it is accurate, returning the expected results,
    but it is also somewhat lengthy and evaluates quite a few `WHERE` clause predicates
    in order to accomplish its goals. The TSQL that is executed is very similar, regardless
    of what parameters are provided, which could be problematic when you are evaluating
    many parameters.


    As business logic grows and becomes more complex over time, it is a given that
    these queries will also grow and increase in size and complexity. A simple `LEFT
    JOIN` on one column may no longer be enough to handle this new logic. `WHERE`
    clauses may have additional options attached to them, such as the ability to be
    wildcard searches, equality searches, include `AND/OR` logic, and more. While
    this stored procedure may continue to grow over time in order to encompass all
    of these new requirements, you definitely do not want the resulting TSQL that
    is executed to grow indefinitely. Performance will become problematic when you
    are joining dozens of tables, issuing subqueries, running existence checks, and
    issuing complex `WHERE` clauses. This is where Dynamic SQL comes in! See Listing
    [3-2](#A371168_1_En_3_Chapter.html#Par17) for an example of using parameters to
    limit joins.


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_products'')

    BEGIN

    DROP PROCEDURE dbo.search_products;

    END

    GO

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,

    @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50)
    = NULL,

    @product_weightunitmeasurecode NVARCHAR(50) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SET @product_name = ''%'' + @product_name + ''%'';

    SET @product_number = ''%'' + @product_number + ''%'';

    SET @product_model = ''%'' + @product_model + ''%'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@product_name NVARCHAR(50), @product_number
    NVARCHAR(25),

    @product_model NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode
    NVARCHAR(50),

    @product_weightunitmeasurecode NVARCHAR(50)'';

    SELECT @sql_command = ''

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductSubcategory.Name AS product_subcategory_name,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE 1 = 1''

    IF @product_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND Product.Name LIKE @product_name''

    IF @product_number IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND Product.ProductNumber LIKE @product_number''

    IF @product_model IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND ProductModel.Name LIKE @product_model''

    IF @product_subcategory IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND ProductSubcategory.Name = @product_subcategory''

    IF @product_sizemeasurecode IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND SizeUnitMeasureCode.Name = @product_sizemeasurecode''

    IF @product_weightunitmeasurecode IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND WeightUnitMeasureCode.Name = @product_weightunitmeasurecode''

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @product_name, @product_number,

    @product_model, @product_subcategory, @product_sizemeasurecode,      @product_weightunitmeasurecode

    END

    Listing 3-2.

    Search Stored Procedure with Six Optional Parameters (Using Dynamic SQL)

    ```


    This stored procedure uses Dynamic SQL to provide you with complete control over
    the `WHERE` clause. Instead of there always being six checks on all columns, you
    now only include a check when the relevant parameter is supplied. Consider the
    first example from earlier:


    ```

    EXEC dbo.search_products @product_number = ''BK-M18'', @product_model = ''Mountain'',
    @product_subcategory = ''Mountain Bikes'';

    ```


    Earlier, the search used all six `WHERE` clause sections, one per parameter, even
    when the parameter was `NULL`. With the new Dynamic SQL version, the resulting
    command string will only include `WHERE` clause sections for parameters that are
    not `NULL`, as shown in Listing [3-3](#A371168_1_En_3_Chapter.html#Par21).


    ```

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductSubcategory.Name AS product_subcategory_name,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE 1 = 1

    AND Product.ProductNumber LIKE @product_number

    AND ProductModel.Name LIKE @product_model

    AND ProductSubcategory.Name = @product_subcategory

    Listing 3-3.

    Output from the Stored Procedure in Listing 3-2

    ```


    Note that only the necessary `WHERE` clause segments are included. `WHERE 1 =
    1` is always present, regardless of the input parameters. While it’s possible
    to add some logic to remove the need for the default `WHERE` clause, its inclusion
    comes at no significant cost and avoids adding any further complex logic to the
    growing stored procedure.'
  trans: '

    # 动态 SQL 示例：带可选参数的存储过程


    ## 参数搜索示例


    ```

    EXEC dbo.search_products @product_number = ''BK-M18'', @product_model = ''Mountain'',
    @product_subcategory = ''Mountain Bikes'';

    ```


    在此搜索中，提供了三个参数，您将搜索产品编号包含 `BK-M18`、产品型号包含单词 "Mountain" 且必须属于 "Mountain Bikes" 子类别的任何产品。其余三个参数不参与
    `WHERE` 子句的构造，而是用于第二个 `NULL` 检查的评估。返回了十个符合这些规格的结果。


    ```

    EXEC dbo.search_products @product_name = ''Mountain-500 Black, 48'';

    ```


    在这里，用户确切知道要查找的内容，并输入了特定的产品名称。所有其他参数均为 `NULL`，并从搜索逻辑中丢弃。返回一行包含其搜索的产品。


    ```

    EXEC dbo.search_products;

    ```


    在此最后一个示例中，用户未输入任何搜索条件，仅运行了一个空搜索。存储过程允许这样做；它返回了所有产品。所有输入均为 `NULL`，因此它们绕过了 `WHERE`
    子句谓词。


    ## 讨论与动态 SQL 介绍


    回顾这个存储过程时，它是准确的，返回了预期的结果，但也有些冗长，并且为了达成目标评估了相当多的 `WHERE` 子句谓词。无论提供什么参数，所执行的 T-SQL
    都非常相似，这在评估许多参数时可能会成为问题。


    随着业务逻辑随时间增长并变得更加复杂，这些查询无疑也会增长并增加规模和复杂性。一个简单的单列 `LEFT JOIN` 可能不再足以处理这个新逻辑。`WHERE`
    子句可能会附加更多选项，例如能够进行通配符搜索、相等搜索、包含 `AND/OR` 逻辑等。虽然这个存储过程可能会随着时间的推移而不断增长以涵盖所有这些新需求，但您绝对不希望最终执行的
    T-SQL 无限增长。当您连接数十个表、发出子查询、运行存在性检查以及构造复杂的 `WHERE` 子句时，性能将成为问题。而这正是动态 SQL 的用武之地！有关使用参数限制连接的示例，请参见清单
    3-2。


    ## 使用动态 SQL 的存储过程实现


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_products'')

    BEGIN

    DROP PROCEDURE dbo.search_products;

    END

    GO

    CREATE PROCEDURE dbo.search_products

    @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model
    NVARCHAR(50) = NULL,

    @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50)
    = NULL,

    @product_weightunitmeasurecode NVARCHAR(50) = NULL

    AS

    BEGIN

    SET NOCOUNT ON;

    SET @product_name = ''%'' + @product_name + ''%'';

    SET @product_number = ''%'' + @product_number + ''%'';

    SET @product_model = ''%'' + @product_model + ''%'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = ''@product_name NVARCHAR(50), @product_number
    NVARCHAR(25),

    @product_model NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode
    NVARCHAR(50),

    @product_weightunitmeasurecode NVARCHAR(50)'';

    SELECT @sql_command = ''

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductSubcategory.Name AS product_subcategory_name,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE 1 = 1''

    IF @product_name IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND Product.Name LIKE @product_name''

    IF @product_number IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND Product.ProductNumber LIKE @product_number''

    IF @product_model IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND ProductModel.Name LIKE @product_model''

    IF @product_subcategory IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND ProductSubcategory.Name = @product_subcategory''

    IF @product_sizemeasurecode IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND SizeUnitMeasureCode.Name = @product_sizemeasurecode''

    IF @product_weightunitmeasurecode IS NOT NULL

    SELECT @sql_command = @sql_command + ''

    AND WeightUnitMeasureCode.Name = @product_weightunitmeasurecode''

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @product_name, @product_number,

    @product_model, @product_subcategory, @product_sizemeasurecode,      @product_weightunitmeasurecode

    END

    ```

    清单 3-2. 使用动态 SQL 的带六个可选参数的搜索存储过程


    ## 动态 SQL 优势说明


    此存储过程使用动态 SQL 为您提供对 `WHERE` 子句的完全控制。现在，您不再总是对所有列进行六次检查，而是在提供相关参数时才包含相应的检查。考虑之前的第一个示例：


    ```

    EXEC dbo.search_products @product_number = ''BK-M18'', @product_model = ''Mountain'',
    @product_subcategory = ''Mountain Bikes'';

    ```


    之前，搜索使用了所有六个 `WHERE` 子句部分（每个参数一个），即使某些参数为 `NULL`。使用新的动态 SQL 版本，生成的命令字符串将仅包含那些参数不为
    `NULL` 的 `WHERE` 子句部分，如清单 3-3 所示。


    ```

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    ProductSubcategory.Name AS product_subcategory_name,

    SizeUnitMeasureCode.Name AS size_unit_measure_code,

    WeightUnitMeasureCode.Name AS weight_unit_measure_code

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    LEFT JOIN Production.ProductSubcategory

    ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID

    LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode

    ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    LEFT JOIN Production.UnitMeasure WeightUnitMeasureCode

    ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode

    WHERE 1 = 1

    AND Product.ProductNumber LIKE @product_number

    AND ProductModel.Name LIKE @product_model

    AND ProductSubcategory.Name = @product_subcategory

    ```

    清单 3-3. 清单 3-2 中存储过程的输出


    请注意，只包含了必要的 `WHERE` 子句部分。`WHERE 1 = 1` 始终存在，与输入参数无关。虽然可以添加一些逻辑来移除对这个默认 `WHERE`
    子句的需求，但包含它成本微不足道，并避免了为不断增长的存储过程添加任何更复杂的逻辑。

    '
- fmt: '## Custom Search Grids


    At the moment, it may seem as though all this trouble to shrink the `WHERE` clause
    isn’t worth it, but this is only the beginning! The next logical step is to examine
    another common use case for large-scale searching: Custom search grids. In this
    slightly different search, the output columns are controlled by the user as well.
    Above, you returned the same six columns for every search, but this is an unlikely
    scenario for any large application that wants to incorporate any level of flexibility
    into its search functionality.


    There are two fundamental ways in which to approach these types of searches. The
    first is to include all columns and joins in every query. The application can
    then pick and choose which are needed and which ones to discard. For this option,
    instead of selecting six output columns, you would add every possible one that
    could be requested by the end users in their custom results grid. For very small
    tables, this would be functional and relatively maintainable, but consider when
    there are immense numbers of possible columns to choose from, such as in the File
    Explorer window shown in `Figure 3-1`.


    ![A371168_1_En_3_Fig1_HTML.jpg](A371168_1_En_3_Fig1_HTML.jpg)


    `Figure 3-1`. Windows File Explorer column chooser


    In this column chooser, there are hundreds of columns to choose from, and the
    idea of always collecting all of this data, regardless of the user’s needs, is
    quite scary. There are many file types for which only a small number of these
    choices would make sense to include, and collecting all of this data for every
    folder accessed would be inefficient and difficult to effective maintain.


    If you were to apply this logic to the stored procedure and include all possible
    columns from each of the six tables you queried, you would have to list 38 columns
    to ensure that the end user had everything they could potentially need from these
    entities. If every table relating to products in `AdventureWorks` was added to
    the search query, the end result would contain hundreds of columns and be quite
    the challenge to ensure good performance. The downside of selecting everything
    extends to network IO, disk IO, memory, and server CPU, in addition to the performance
    of SQL Server in processing the query. All of this extra data would need to be
    moved from the database to the application before it could finally be sorted out
    and the extra columns removed from the data set.


    The second and more versatile solution for implementing a search grid is to make
    each part of the query dynamic. In addition to the `WHERE` clause, make the joins
    and the columns selected dynamic. This ensures that the command string that you
    ultimately execute is relatively small, only reads from the tables you need, and
    only returns the columns you want. To keep this example easy to read, assume that
    the product name and product number will always be returned. There will also be
    a set of bits that can be passed in that will determine what other columns are
    chosen, which include some of the filter columns, as shown in `Listing 3-4`.'
