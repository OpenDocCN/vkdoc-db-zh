    总共返回了 184 行数据，这远小于你最初处理的数据集大小。原始数据集取自 `Production.Product` 和 `Production.ProductInventory`
    表，包含 1,141 行数据。`PIVOT` 操作的结果将其减少到 504 行。随着每次操作，由于对结果进行了聚合，数据集的粒度会降低。因此，需要记住的是，即使
    `PIVOT` 和 `UNPIVOT` 交替使用，通常也无法将数据集恢复为其原始形式。因此，请将这些转换操作视为高效获取报表数据的方法，而非用于重构或验证数据。虽然有可能构建一系列
    `PIVOT` 和 `UNPIVOT` 操作，将数据逆向转换为其原始结构和内容，但这不太可能是一个有用的练习。


    利用多个 `UNPIVOT` 操作，可以将复杂的报表数据集回退为汇总数据，以便用于进一步的报表，或者作为一种将列式数据输入事务系统而非行数据的方式。使用动态
    SQL 可以高效地考虑所有可能的列值，即使这些列的集合会随时间而变化！


    # 结论


    `PIVOT` 和 `UNPIVOT` 操作符常被 DBA 和开发者视为高级或难用的操作符，应尽可能避免使用。然而，针对所提出的用例，它们能够以原子化和基于集合的方式快速提供大量数据。作为性能上的额外好处，无需实现循环、游标或其他迭代解决方案，这些方案在处理较大数据量时可能运行缓慢或耗费资源。


    这些操作符面临的最大挑战是，必须在运行时之前明确提供列列表。硬编码这些值会大大增加相关的技术债务，因为每当相关应用程序或数据库发生更改时，你都需要跟踪并更新这些值。这种维护成本很高，并且为软件
    Bug 的显现提供了机会，而这些 Bug 很难避免且难以诊断。


    将动态 SQL 与 `PIVOT` 或 `UNPIVOT` 结合使用，允许开发者根据选择的任何标准在运行时生成列列表。只要此逻辑是相关的，当添加新值或删除旧值时，就无需调整存储过程或代码。


    # 10. 解决常见问题


    动态 SQL 提供了一个独特的机会，可以快速解决常见的数据库问题或限制。通常，你会遇到令人沮丧的情况，即你管理着不同的数据库、架构或设置，却没有简单的方法对混合的对象集合进行更改。本章试图向你展示如何使用动态
    SQL 来解决此类复杂情况。此外，本章还提供了适用于任何类似数据库问题的一般准则和技术。


    ## 排序规则冲突


    ### 问题描述


    数据库排序规则通常被用作在 SQL Server 中管理多种语言或字符集的一种有意义的方式。西班牙语中的字符排序顺序与英语或日语不同，对其中任何一种语言使用英语排序规则都可能导致字符串排序不正确。实际上，SQL
    Server 会阻止对具有不同排序规则的字符串数据进行直接赋值或比较。如果你正在处理多种排序规则的数据，则必须考虑这些差异，以确保根据正确的业务逻辑对其进行操作。


    为了测试排序规则，你将创建一个新的数据库和表，并使用来自 `AdventureWorks` 的数据进行填充，如代码清单 10-1 所示。


    ```sql

    IF EXISTS (SELECT * FROM sys.databases WHERE name = ''Collation_Test'')

    BEGIN

    DROP DATABASE Collation_Test;

    END

    GO

    CREATE DATABASE Collation_Test COLLATE Traditional_Spanish_CI_AS;

    GO

    USE Collation_Test;

    GO

    CREATE TABLE dbo.Spanish_Employees

    (       BusinessEntityID INT NOT NULL,

    NationalIDNumber NVARCHAR(15) NOT NULL,

    LoginID NVARCHAR(256) NOT NULL,

    OrganizationNode HIERARCHYID NULL,

    OrganizationLevel SMALLINT NULL,

    JobTitle NVARCHAR(50) NOT NULL,

    BirthDate DATE NOT NULL,

    MaritalStatus NCHAR(1) NOT NULL,

    Gender NCHAR(1) NOT NULL,

    HireDate DATE NOT NULL,

    SalariedFlag BIT NOT NULL,

    VacationHours SMALLINT NOT NULL,

    SickLeaveHours SMALLINT NOT NULL,

    CurrentFlag BIT NOT NULL,

    rowguid UNIQUEIDENTIFIER ROWGUIDCOL  NOT NULL,

    ModifiedDate DATETIME NOT NULL,);

    GO

    INSERT INTO Collation_Test.dbo.Spanish_Employees

    SELECT

    *

    FROM AdventureWorks2014.HumanResources.Employee;

    ```

    代码清单 10-1. 为排序规则测试构建测试数据库


    注意，当创建数据库 `Collation_Test` 时，它被显式指定了排序规则 `Traditional_Spanish_CI_AS`。默认情况下，该数据库中的所有字符串都将以此新的排序规则存储和排序，而不是使用实例默认值或其他数据库上的设置。在我的
    SQL Server 上，默认排序规则是 `SQL_Latin1_General_CP1_CI_AS`。这可以在 GUI 的服务器属性中验证，如图 10-1
    所示。


    ![A371168_1_En_10_Fig1_HTML.jpg](img/A371168_1_En_10_Fig1_HTML.jpg)

    图 10-1. SQL Server 属性窗口中显示的默认服务器排序规则


    在“服务器排序规则”选项下，你可以找到服务器的默认值。这是在任何未提供其他排序规则的新创建数据库上将使用的排序规则。这也可以使用 TSQL 进行验证：


    ```sql

    SELECT SERVERPROPERTY(''Collation'') AS ServerDefaultCollation;

    ```


    得到的排序规则与 GUI 中显示的相同，可以在图 10-2 中验证。


    ![A371168_1_En_10_Fig2_HTML.jpg](img/A371168_1_En_10_Fig2_HTML.jpg)

    图 10-2. 我测试服务器上的默认排序规则


    为了说明不同排序规则之间的差异之一，我们将查看 `HumanResources.Employee` 表，重点关注原始表和使用传统西班牙语排序规则新创建表中的
    `JobTitle` 列。代码清单 10-2 显示了这两个查询。


    ```sql

    SELECT

    *

    FROM AdventureWorks2014.HumanResources.Employee

    WHERE JobTitle LIKE ''C%''

    ORDER BY JobTitle;

    SELECT

    *

    FROM Collation_Test.dbo.Spanish_Employees

    WHERE JobTitle LIKE ''C%''

    ORDER BY JobTitle;

    ```

    代码清单 10-2. 展示两种不同排序规则差异的两个测试查询


    查询结果有点不寻常，表明每种排序规则之间存在显著差异，如图 10-3 所示。


    ![A371168_1_En_10_Fig3_HTML.jpg](img/A371168_1_En_10_Fig3_HTML.jpg)

    图 10-3. 不同的排序规则导致相同的查询给出不同的结果

