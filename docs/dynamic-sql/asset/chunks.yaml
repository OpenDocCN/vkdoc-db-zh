    Since you were selecting such a large number of rows from the table, the query
    optimizer decided that an index scan on `ProductModel` would be more efficient.
    This is often a good decision as it becomes expensive to seek through an index
    when the number of rows being returned approaches a large portion of the table.
    The exact turning point will typically depend on the data size, but this is an
    excellent example of a situation where an index scan offers superior performance
    to an index seek.


    Before reading the plan cache, run `get_products_by_model` five more times, which
    will add data into the cache that will be useful to review:


    ```

    EXEC get_products_by_model 0, 10000;

    EXEC get_products_by_model 0, 10000;

    EXEC get_products_by_model 0, 10000;

    EXEC get_products_by_model 0, 10000;

    EXEC get_products_by_model 0, 10000;

