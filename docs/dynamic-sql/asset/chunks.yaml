- fmt: '# 参数嗅探与本地变量


    如上所述，为存储过程的新版本选择了一个不同（且更复杂）的执行计划。这个版本为了返回相同的数据也需要进行更多的IO操作。事实上，查询优化器为两组参数选择了相同的执行计划。这在处理小结果集时始终能带来良好的性能，但在处理大结果集时性能却很差。参数嗅探似乎不再发生，因为对两组参数值都使用了相同的计划。但是，如果你连续执行几次存储过程，可以确认计划实际上正在被重用：


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model_local 120, 125;

    EXEC dbo.get_products_by_model_local 0, 10000;

    EXEC dbo.get_products_by_model_local 120, 125;

    EXEC dbo.get_products_by_model_local 0, 10000;

    ```


    让我们查看此存储过程的查询计划缓存中的数据，如图 [8-22](#A371168_1_En_8_Chapter.html#Fig22) 所示。


    ![A371168_1_En_8_Fig22_HTML.jpg](A371168_1_En_8_Fig22_HTML.jpg)


    **图 8-22.**


    当参数被重新分配给本地变量时，`dbo.read_query_plan_cache` 针对产品搜索返回的度量值。


    ```

    EXEC dbo.read_query_plan_cache ''get_products_by_model_local'';

    ```


    你可以看到唯一返回的计划被执行了四次，因此发生了计划重用。由于为每组参数选择的执行计划相同，所以重用发生与否并不重要。无论你执行存储过程多少次或以何种顺序执行，结果都是一样的。尽管在本地重新声明了变量，参数嗅探仍然发生了，由此产生的性能仍然不是最优的。


    这里发生了什么？为什么相同的执行计划被用于两组非常不同的数据？答案在于查询优化器如何使用统计信息。当查询执行时，优化器必须利用当时可用的任何统计信息来快速而明智地做出决定。任何在运行时才可用的信息对优化器来说也将是不可用的。如前所述，统计信息提供的三类信息是：


    *   摘要数据，提供行数、平均键长和统计信息对象的概述

    *   密度数据，提供关于所跟踪的每个对象唯一性的信息

    *   直方图数据，给出统计信息对象样本范围内不同值的行数


    为了让查询优化器做出最准确的决定，它需要所有这些信息。不幸的是，一些 TSQL 技术会强制参数数据在运行时之前变为不可用或无法使用。这导致了次优的执行计划，因为优化器被迫在无法利用直方图、密度数据或两者的情况下做出决策。


    在上面的示例中，你声明了本地变量并将参数重新赋值给它们，从而剥夺了优化器使用直方图的能力。之前，你执行存储过程时，参数被用来确定首次执行的执行计划。然后该计划在之后每次执行时被重用。而在本例中，你首次执行存储过程时，只有摘要和密度数据可供优化器用来创建执行计划。由于本地变量的值在运行时之前是未知的，因此无法检查直方图以获取基数数据，它因此从优化过程中被省略了。结果，生成并重用的执行计划不得不基于假设来创建。此外，选择的执行计划将对任何传入的参数值都相同，而不仅仅是你检查的那两个示例，因为这些值在运行时之前是不可用的。


    总之，这意味着无论何时在存储过程里使用本地变量，查询优化器都需要做出假设，而这最终可能导致较差的基数估计。在这种情况下，DBA 往往会发现被选中的执行计划碰巧性能更好，但这在很大程度上是运气使然，以及优化器偶然找到了一个对正在审查的用例有效的计划。


    为了充分说明发生了什么，让我们更仔细地查看存储过程每个版本的单次执行的执行计划，重点关注基数估计与每个IO步骤的实际行数。首先，原始存储过程（运行大结果集）如图
    [8-23](#A371168_1_En_8_Chapter.html#Fig23) 所示。


    ![A371168_1_En_8_Fig23_HTML.jpg](A371168_1_En_8_Fig23_HTML.jpg)


    **图 8-23.**


    参数化存储过程的执行计划详情。


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model 0, 10000;

    ```


    注意，对于两个IO操作，实际行数和估计行数是相同的。这表明优化器有足够的统计数据来正确估计每个步骤的行数，并选择了一个合适的执行计划。执行后，结果证实了优化器的工作。你可以为这项出色的工作给它一点鼓励。


    以下是当你声明本地变量并用它们代替存储过程参数时，IO步骤的执行计划详情，如图 [8-24](#A371168_1_En_8_Chapter.html#Fig24)
    所示。


    ![A371168_1_En_8_Fig24_HTML.jpg](A371168_1_En_8_Fig24_HTML.jpg)


    **图 8-24.**


    使用本地变量的存储过程的执行计划详情。


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model_local 0, 10000;

    ```


    在这个例子中，虽然实际行数与之前所示相同，但估计值却相差甚远！对`ProductModel`的IO操作估计为11.52行，对`Product`的估计为1行。这就是你之前看到的次优执行计划的根源。在`ProductModel`表上，由于该操作是一个没有参数的不等式，优化器没有任何信息可以参考。对于`Product`表，优化器可以使用密度数据来尝试获得一个良好的估计，但如果没有直方图，它将无法做到。


    在评估执行计划的不同部分时，查询优化器可能做出糟糕的基数估计的原因有很多。虽然其中一些可能性是正常且符合设计的，但你肯定不想人为地限制其可用的信息，从而导致更糟糕的估计。声明本地变量可能看起来可以修复糟糕的执行计划或消除参数嗅探，但最终它会通过限制优化器访问有价值的信息而使情况恶化。除非对所涉及的数据和查询进行了大量研究，否则从长远来看，在存储过程中局部化变量很可能是一个冒险的决定，即使它现在看起来解决了业务需求。'
  raw: 'As above, a different (and more complex) execution plan was chosen for the
    new version of the stored procedure. This version also required far more IO in
    order to return the same data. In fact, the same execution plan was chosen by
    the query optimizer for both sets of parameters. This consistently leads to good
    performance when working with the small result set, but poor performance on the
    large result set. Parameter sniffing appears to no longer occur here, since the
    same plan is used for either set of parameter values, but if you execute your
    stored procedure a few times on a row , you can confirm that the plan is in fact
    being reused:


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model_local 120, 125;

    EXEC dbo.get_products_by_model_local 0, 10000;

    EXEC dbo.get_products_by_model_local 120, 125;

    EXEC dbo.get_products_by_model_local 0, 10000;

    ```


    Let’s review the data from the query plan cache for this stored procedure, as
    shown in Figure [8-22](#A371168_1_En_8_Chapter.html#Fig22).


    ![A371168_1_En_8_Fig22_HTML.jpg](A371168_1_En_8_Fig22_HTML.jpg)


    Figure 8-22.


    Metrics returned by dbo.read_query_plan_cache for the product search where parameters
    are reassigned to local variables


    ```

    EXEC dbo.read_query_plan_cache ''get_products_by_model_local'';

    ```


    You can see that the only plan returned was executed four times, so there was
    plan reuse. Since the execution plan chosen for each set of parameters was the
    same, it did not matter that reuse occurred. The results would be the same, regardless
    of how many times you executed the stored procedure or the order of those executions.
    Despite redeclaring variables locally, parameter sniffing still occurred, and
    the resulting performance was still not optimal.


    What happened here? Why was the same execution plan used for two very different
    sets of data? The answer lies in how the query optimizer uses statistics. The
    optimizer must make quick and intelligent decisions using whatever statistics
    are available to it when a query is executed. Any information that is unavailable
    until runtime will be also be unavailable to the optimizer. The three pieces of
    information provided by statistics as introduced earlier were:


    *   Summary data, which provides row count, average key length, and an overview
    of the statistics object

    *   Density data, which provides information on the uniqueness of each object
    bring tracked

    *   Histogram data, which gives row counts for different values over the sample
    range of the statistics object


    For the query optimizer to make the most accurate decision possible, it requires
    all of this information. Unfortunately, some TSQL techniques will force parameter
    data to become unavailable or unusable until runtime. This results in suboptimal
    execution plans as the optimizer is forced to make decisions without the benefit
    of the histogram, density data, or both.


    In the the example above, where you declared local variables and reassigned the
    parameters to them, you took away the optimizer’s ability to use the histogram.
    Previously, you executed the stored procedure and the parameters were used to
    determine the execution plan the first time. Then the plan was reused each time
    thereafter. In this case, you executed the stored procedure the first time and
    the summary and density data were all that was available for the optimizer to
    create an execution plan. Since local variables have unknown values until runtime,
    there is no way to check the histogram for cardinality data and it is therefore
    omitted from the optimization process. As a result, the execution plan that was
    generated and reused had to be created based on assumptions. In addition, the
    execution plan chosen would be the same for any parameter values passed in, not
    just the two examples that you reviewed, since those values were unavailable until
    runtime.


    In summary, this means that whenever you use local variables in a stored procedure,
    the query optimizer will need to make assumptions, and ultimately this can lead
    to poor cardinality estimates. Oftentimes in this situation, a DBA may find that
    the execution plan that is chosen happens to perform better, but this is largely
    due to luck and the optimizer stumbling upon a plan that works well for the use-cases
    that are being scrutinized.


    To fully illustrate what is happening, take a closer look at the execution plans
    for a single execution of each version of the stored procedure, focusing on cardinality
    estimates versus the actual row counts from each IO step. First, the original
    stored procedure (running for the large result set) is shown in Figure [8-23](#A371168_1_En_8_Chapter.html#Fig23).


    ![A371168_1_En_8_Fig23_HTML.jpg](A371168_1_En_8_Fig23_HTML.jpg)


    Figure 8-23.


    Execution plan details for the parameterized stored procedure


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model 0, 10000;

    ```


    Note that the actual and estimated number of rows are identical for both IO operations.
    This indicates that the optimizer had sufficient statistics data to correctly
    estimate the row counts for each step and choose a suitable execution plan. Once
    executed, the results confirmed the optimizer’s work. You can give it a pat on
    the back for a job well done.


    Here are the execution plan details for the IO steps when you declare local variables
    and use them instead of the stored procedure parameters, as shown in Figure [8-24](#A371168_1_En_8_Chapter.html#Fig24).


    ![A371168_1_En_8_Fig24_HTML.jpg](A371168_1_En_8_Fig24_HTML.jpg)


    Figure 8-24.


    Execution plan details for the stored procedure using local variables


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model_local 0, 10000;

    ```


    In this example, while the actual number of rows was the same as previously shown,
    the estimates are way off! 11.52 rows were estimated for the IO operation on `ProductModel`
    and 1 row estimated on `Product`. This is the source of the suboptimal execution
    plan that you saw previously. On the `ProductModel` table, the optimizer has no
    information to go on as the operation is an inequality with no parameters. For
    the `Product` table, the optimizer can use the density data in order to try to
    get a good estimate, but without the histogram, will fall short.


    There are many reasons why the query optimizer may make poor cardinality estimates
    when evaluating different parts of an execution plan. While some of those possibilities
    are normal and by-design, you certainly do not want to artificially limit the
    information available to it and cause even worse estimations to be made. Declaring
    local variables may appear to fix bad execution plans or eliminate parameter sniffing,
    but ultimately it will worsen the situation by limiting the optimizer’s access
    to valuable information. Unless significant research has been done on the data
    and queries involved, localizing variables in a stored procedure will likely be
    a risky decision in the long run, even if it appears to solve a business need
    right now.'
  trans: '# 参数嗅探与本地变量


    如上所述，存储过程的新版本被选择了一个不同（且更复杂）的执行计划。这个版本为了返回相同的数据需要进行更多的 IO 操作。事实上，查询优化器为两组参数选择了相同的执行计划。这在处理小结果集时始终能带来良好的性能，但在处理大结果集时性能却很差。参数嗅探似乎不再发生，因为对两组参数值都使用了相同的计划。但是，如果你连续执行几次存储过程，可以确认计划实际上正在被重用：


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model_local 120, 125;

    EXEC dbo.get_products_by_model_local 0, 10000;

    EXEC dbo.get_products_by_model_local 120, 125;

    EXEC dbo.get_products_by_model_local 0, 10000;

    ```


    让我们查看此存储过程的查询计划缓存中的数据，如图 8-22 所示。


    ![A371168_1_En_8_Fig22_HTML.jpg](img/A371168_1_En_8_Fig22_HTML.jpg)


    **图 8-22.**


    当参数被重新分配给本地变量时，`dbo.read_query_plan_cache` 针对产品搜索返回的度量值。


    ```

    EXEC dbo.read_query_plan_cache ''get_products_by_model_local'';

    ```


    你可以看到唯一返回的计划被执行了四次，因此发生了计划重用。由于为每组参数选择的执行计划相同，所以重用发生与否并不重要。无论你执行存储过程多少次或以何种顺序执行，结果都是一样的。尽管在本地重新声明了变量，参数嗅探仍然发生了，由此产生的性能仍然不是最优的。


    这里发生了什么？为什么相同的执行计划被用于两组非常不同的数据？答案在于查询优化器如何使用统计信息。当查询执行时，优化器必须利用当时可用的任何统计信息来快速而明智地做出决定。任何在运行时才可用的信息对优化器来说也将是不可用的。如前所述，统计信息提供的三类信息是：


    *   摘要数据，提供行数、平均键长和统计信息对象的概述

    *   密度数据，提供关于所跟踪的每个对象唯一性的信息

    *   直方图数据，给出统计信息对象样本范围内不同值的行数


    为了让查询优化器做出最准确的决定，它需要所有这些信息。不幸的是，一些 TSQL 技术会强制参数数据在运行时之前变为不可用或无法使用。这导致了次优的执行计划，因为优化器被迫在无法利用直方图、密度数据或两者的情况下做出决策。


    在上面的示例中，你声明了本地变量并将参数重新赋值给它们，从而剥夺了优化器使用直方图的能力。之前，你执行存储过程时，参数被用来确定首次执行的执行计划。然后该计划在之后每次执行时被重用。而在本例中，你首次执行存储过程时，只有摘要和密度数据可供优化器用来创建执行计划。由于本地变量的值在运行时之前是未知的，因此无法检查直方图以获取基数数据，它因此从优化过程中被省略了。结果，生成并重用的执行计划不得不基于假设来创建。此外，选择的执行计划将对任何传入的参数值都相同，而不仅仅是你检查的那两个示例，因为这些值在运行时之前是不可用的。


    总之，这意味着无论何时在存储过程里使用本地变量，查询优化器都需要做出假设，而这最终可能导致较差的基数估计。在这种情况下，DBA 往往会发现被选中的执行计划碰巧性能更好，但这在很大程度上是运气使然，以及优化器偶然找到了一个对正在审查的用例有效的计划。


    为了充分说明发生了什么，让我们更仔细地查看存储过程每个版本的单次执行的执行计划，重点关注基数估计与每个 IO 步骤的实际行数。首先，原始存储过程（运行大结果集）如图
    8-23 所示。


    ![A371168_1_En_8_Fig23_HTML.jpg](img/A371168_1_En_8_Fig23_HTML.jpg)


    **图 8-23.**


    参数化存储过程的执行计划详情。


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model 0, 10000;

    ```


    注意，对于两个 IO 操作，实际行数和估计行数是相同的。这表明优化器有足够的统计数据来正确估计每个步骤的行数，并选择了一个合适的执行计划。执行后，结果证实了优化器的工作。你可以为这项出色的工作给它一点鼓励。


    以下是当你声明本地变量并用它们代替存储过程参数时，IO 步骤的执行计划详情，如图 8-24 所示。


    ![A371168_1_En_8_Fig24_HTML.jpg](img/A371168_1_En_8_Fig24_HTML.jpg)


    **图 8-24.**


    使用本地变量的存储过程的执行计划详情。


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model_local 0, 10000;

    ```


    在这个例子中，虽然实际行数与之前所示相同，但估计值却相差甚远！对 `ProductModel` 的 IO 操作估计为 11.52 行，对 `Product`
    的估计为 1 行。这就是你之前看到的次优执行计划的根源。在 `ProductModel` 表上，由于该操作是一个没有参数的不等式，优化器没有任何信息可以参考。对于
    `Product` 表，优化器可以使用密度数据来尝试获得一个良好的估计，但如果没有直方图，它将无法做到。


    在评估执行计划的不同部分时，查询优化器可能做出糟糕的基数估计的原因有很多。虽然其中一些可能性是正常且符合设计的，但你肯定不想人为地限制其可用的信息，从而导致更糟糕的估计。声明本地变量可能看起来可以修复糟糕的执行计划或消除参数嗅探，但最终它会通过限制优化器访问有价值的信息而使情况恶化。除非对所涉及的数据和查询进行了大量研究，否则从长远来看，在存储过程中局部化变量很可能是一个冒险的决定，即使它现在看起来解决了业务需求。'
- fmt: '### Forcing Cardinalities to the Optimizer


    You have experimented with the query optimizer, recompiling plans or altering
    variable scope in order to try to improve query performance. An additional option
    is available when you have very complete knowledge of your data and want to instruct
    the query optimizer on cardinality directly. In a query, you can use the `OPTIMIZE
    FOR` hint in order to directly instruct the optimizer on what value to accept
    as the cardinality for a parameter.


    Let’s reconsider the product model search from earlier in which you declared local
    variables to try to manage cardinality. When you used local variables, you robbed
    the query optimizer of the ability to use the histogram data, thus forcing it
    to use less accurate estimates based on the remaining data. If you always returned
    a large data set and knew that as fact, you could consider telling the query optimizer
    to base cardinality on specific values, as shown in Listing 8-9.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_products_by_model_local'')

    BEGIN

    DROP PROCEDURE dbo.get_products_by_model;

    END

    GO

    CREATE PROCEDURE dbo.get_products_by_model (@firstProductModelID INT, @lastProductModelID
    INT)

    AS

    BEGIN

    SELECT

    PRODUCT.Name,

    PRODUCT.ProductID,

    PRODUCT.ProductModelID,

    PRODUCT.ProductNumber,

    MODEL.Name

    FROM Production.Product PRODUCT

    INNER JOIN Production.ProductModel MODEL

    ON MODEL.ProductModelID = PRODUCT.ProductModelID

    WHERE PRODUCT.ProductModelID BETWEEN @firstProductModelID AND @lastProductModelID

    OPTION (OPTIMIZE FOR (@firstProductModelID = 0, @lastProductModelID = 10000));

    END

    ```


    **Listing 8-9.** Example of Using the `OPTIMIZE FOR` Query Hint


    In this example, you force the optimizer to base all analysis on the values that
    you provide, rather than turning to statistics to determine the best way to proceed.
    When you do this, the performance returns to what you saw earlier when it was
    using the optimal plan, as shown in Figure 8-25.


    ![A371168_1_En_8_Fig25_HTML.jpg](A371168_1_En_8_Fig25_HTML.jpg)


    **Figure 8-25.** Execution plan when you force the cardinality for each parameter
    in the query


    ```sql

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model 0, 10000;

    Table ''Workfile''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Product''. Scan count 1, logical reads 16, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductModel''. Scan count 1, logical reads 2, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    The result is the optimal execution plan and only 18 reads. When you use this
    hint, it will choose this plan regardless of what values are passed in. `OPTIMIZE
    FOR` is intended for a use-case in which you have extensive knowledge of the input
    parameters. This is an infrequent scenario, but one that can exist in stored procedures
    or code where the inputs and outputs are very predictable.


    There is one additional way that you can use the `OPTIMIZE FOR` hint, and that
    is to take away parameter values altogether and instruct the optimizer to make
    its decisions using only statistics, with no insight into parameter values. Let’s
    try this method with the same stored procedure, as shown in Listing 8-10.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_products_by_model_local'')

    BEGIN

    DROP PROCEDURE dbo.get_products_by_model;

    END

    GO

    CREATE PROCEDURE dbo.get_products_by_model (@firstProductModelID INT, @lastProductModelID
    INT)

    AS

    BEGIN

    SELECT

    PRODUCT.Name,

    PRODUCT.ProductID,

    PRODUCT.ProductModelID,

    PRODUCT.ProductNumber,

    MODEL.Name

    FROM Production.Product PRODUCT

    INNER JOIN Production.ProductModel MODEL

    ON MODEL.ProductModelID = PRODUCT.ProductModelID

    WHERE PRODUCT.ProductModelID BETWEEN @firstProductModelID AND @lastProductModelID

    OPTION (OPTIMIZE FOR (@firstProductModelID UNKNOWN, @lastProductModelID UNKNOWN));

    END

    ```


    **Listing 8-10.** Example of Using the `OPTIMIZE FOR UNKNOWN` Query Hint


    In this example, instead of providing static values, you use `UNKNOWN`, which
    instructs the optimizer to not base its analysis on any particular parameter value
    and instead determine cardinality based solely on statistics. Let’s check out
    the performance for this version of the stored procedure when you use this new
    hint, which is shown in Figure 8-26.


    ![A371168_1_En_8_Fig26_HTML.jpg](A371168_1_En_8_Fig26_HTML.jpg)


    **Figure 8-26.** Performance metrics when you use `OPTIMIZE FOR UNKNOWN`


    ```sql

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model 0, 10000;

    Table ''Product''. Scan count 128, logical reads 849, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductModel''. Scan count 1, logical reads 2, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    When you leave the optimizer to its own devices, it will resort to statistics
    in order to determine the best execution plan. In this case, the results are exactly
    what you got previously, when a poor plan was chosen. Typically, when the optimizer
    relies on statistics only with no parameter guidance, it will typically create
    an execution plan that is geared toward the most common parameter values that
    could be passed in. In this example, you are returning an unusually large amount
    of data, which the optimizer was not prepared for. The result was very similar
    to when you used local variables to bypass the optimizer’s standard parameter
    analysis.


    `OPTIMIZE FOR`, like all hints, can be very useful when applied to very specific
    or unusual circumstances. Use it with caution, as it may help performance for
    a select set of parameter values, but could also greatly harm performance if other
    unexpected values are passed in. Query hints should always be applied conservatively,
    and only when you are certain that you have full knowledge of the queries involved,
    the parameter values, and a good handle on cardinality.


    ## Conclusion


    Query execution plan reuse is an important feature in SQL Server that conserves
    memory and CPU while allowing common queries to execute quickly and efficiently.
    When parameter sniffing leads to poor performance, this side-effect should be
    diagnosed carefully to ensure that it is indeed the cause and not a symptom of
    another, bigger problem.


    When suboptimal parameter sniffing is found, analyze the data to determine metrics
    that describe the parameters, data, and usage patterns. This research will greatly
    help in determining the best course of action (if any) that should be taken. Test
    potential solutions for all use-cases and ensure as much as possible that application
    or query changes in the future will not invalidate your changes.


    Query tuning and refactoring can be a more useful tool than query hints. Consider
    different ways that a query can be written in order to execute more efficiently.
    In addition, look for simplifying assumptions that may allow for a query to be
    reduced or rewritten into something simpler and easier for the optimizer to digest.
    Sometimes that effort will completely remove parameter sniffing as a problem,
    thus eliminating the need for further research or the need to resort to query
    hints or hacks in order to achieve success.'
