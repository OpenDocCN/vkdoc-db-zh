    There are only two logical reads on `PurchaseOrderHeader`, a fraction of what
    you saw before! This improved execution plan is shown in Figure [6-17](#A371168_1_En_6_Chapter.html#Fig17).


    ![A371168_1_En_6_Fig17_HTML.jpg](A371168_1_En_6_Fig17_HTML.jpg)


    Figure 6-17.


    Performance when a filtered covering index is utilized


    Note that even though the execution plan looks similar to before, the cost of
    the index scan on `PurchaseOrderHeader` has decreased, and the overall subtree
    cost has decreased by 25%.


    Filtered indexes are excellent ways to manage queries on tables when only a small
    subset is regularly needed. On very large tables, the performance difference can
    be dramatic! Use caution though, as filtered indexes come with two caveats:


    *   `WHERE` clauses must be precise. While the query optimizer will try its best
    to use a filtered index, it can only make use of it when the query’s `WHERE` clause
    overlaps the index. If the query changes enough so that the filters don’t match,
    SQL Server will ignore the filtered index and try to use another instead.

    *   When data is written to a table with a filtered index, SQL Server must check
    to see whether the changed data matches the filter. This means that small numbers
    of extra reads may be required when altering data in order to properly maintain
    the filtered index. While this cost is generally low, it is important to recognize
    it when working on large data sets. For the example, any `UPDATE` that modifies
    status will need to verify if those changes will result in data being added or
    removed from the filtered index. In filtered indexes with a compound `WHERE` clause,
    modifications to any column of it will result in similar checks.


    The benefits will typically outweigh the costs when considering a filter on an
    index. If a table contains 100 million rows, of which 10,000 contain current or
    relevant data, then you could expect reads on the index, as well as storage to
    be reduced to about 0.01% of the original amount. This is a significant improvement!


    ### Cardinality


    When discussing performance concerns, it is important to discuss cardinality and
    what it means for the queries you execute. Cardinality refers to the number of
    rows affected by an operation. When optimizing a query, SQL Server must determine
    how many rows will be affected by each part of the execution plan. That count
    will determine important decisions, such as whether to scan or seek a table, or
    whether to use a merge or hash join. An explanation of cardinality would be incomplete
    without a brief overview of statistics.'
