  trans: '### 搜索限制


    如果你曾尝试在电脑上使用非常宽泛的搜索词来搜索一个文件夹，那么你已经体验过运行此类宽泛搜索所带来的延迟。在为任何应用程序构建搜索过程时，重要的是要禁止或限制任何可能对搜索体验以及服务器性能造成压力的用户输入。一种常见的方法是不允许空白搜索。也就是说，如果用户尝试在搜索框中没有任何文本的情况下点击“执行”，程序要么不执行任何操作，要么返回一条请求更多信息的消息。或者，搜索可以简单地抓取前`50`个结果显示，并等待用户进一步输入以决定后续步骤。在此过程的任何环节，你都不希望从数据库服务器返回过多的数据，也不希望让最终用户永远等待数据出现。


    另一种限制数据量的方法是确保无法从自定义搜索网格中请求过多列。如果一个结果网格理论上可以有`500`个不同的列，那么将其限制在一个小得多的数字是符合你最大利益的。根据应用程序的不同，十列可能足够，或者`25`列，甚至可能是`50`列。这个限制将基于平均应用程序使用情况以及列的宽度和返回数据所需的资源量。如果搜索在超过`30`列后开始出现延迟，那么将结果网格中的列数上限设为`25`将是明智之举。


    ### 基于输入的搜索


    前面的例子允许将参数传递给搜索存储过程，从而实现了相当程度的定制化。作为额外的步骤，你可以解析用户输入，并根据格式判断正在搜索的数据类型。这对于许多网页上常见的角落搜索框非常有用。在这些应用程序中，有时会提供高级搜索功能，但普通用户希望在一个地方输入文本并立即获得反馈。这些搜索可能有点混乱，因为它们可能需要搜索多种类型的数据，并且同时对许多不同列进行宽泛搜索很可能会表现不佳并返回错误结果。如果搜索说明指出文本在默认为单一文本描述之前可以以多种形式输入，你就可以优化搜索，使其专注于少数几个已编制索引的列，而不是一次搜索所有可能的搜索条件。代码清单
    3-8 展示了一个允许输入多种格式的销售订单搜索。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_sales_order_detail'')

    BEGIN

    DROP PROCEDURE dbo.search_sales_order_detail;

    END

    GO

    CREATE PROCEDURE dbo.search_sales_order_detail

    @input_search_data NVARCHAR(25), @offset_by_this_many_rows INT = 0, @row_count_to_return
    INT = 25, @return_all_results BIT = 0

    AS

    BEGIN

    SET NOCOUNT ON;

    -- For this search procedure, do not allow blank input. If blank is entered, return
    immediately with no result set.

    -- Input parameter does not allow NULLs

    IF LTRIM(RTRIM(@input_search_data)) = ''''

    RETURN;

    -- Pad the input string with spaces, in case it isn''t 25 characters long. This
    will avoid string truncation below.

    SET @input_search_data = @input_search_data + REPLICATE('' '', 25 - LEN(@input_search_data));

    -- Parse the @input_search_data to determine the data it references

    DECLARE @input_type NVARCHAR(25);

    -- Search by Sales Order Number: Starts with "SO" and at least 5 numbers

    IF (LEFT(@input_search_data, 2) = ''SO'' AND ISNUMERIC(SUBSTRING(@input_search_data,
    3, 5)) = 1)

    SET @input_type = ''SalesOrderNumber'';

    ELSE

    -- Search by Purchase Order Number: Starts with "PO" and at least 10 numbers

    IF (LEFT(@input_search_data, 2) = ''PO'' AND ISNUMERIC(SUBSTRING(@input_search_data,
    3, 10)) = 1)

    SET @input_type = ''PurchaseOrderNumber'';

    ELSE

    -- Search by Account Number: Starts with two number, a hyphen, 4 numbers, a hyphen,
    and at least 6 additional numbers

    IF (ISNUMERIC(LEFT(@input_search_data, 2)) = 1 AND SUBSTRING(@input_search_data,
    3, 1) = ''-'' AND ISNUMERIC(SUBSTRING(@input_search_data, 4, 4)) = 1

    AND SUBSTRING(@input_search_data, 8, 1) = ''-'' AND ISNUMERIC(SUBSTRING(@input_search_data,
    9, 6)) = 1)

    SET @input_type = ''AccountNumber'';

    ELSE

    -- Search by Carrier Tracking Number: 4 Alphanumeric, 1 hyphen, 4 alphanumeric,
    one hyphen, and two alphanumeric

    IF (PATINDEX(''%[^a-zA-Z0-9]%'' , LEFT(@input_search_data, 4)) = 0 AND SUBSTRING(@input_search_data,
    5, 1) = ''-'' AND PATINDEX(''%[^a-zA-Z0-9]%'' , SUBSTRING(@input_search_data,
    6, 4)) = 0

    AND SUBSTRING(@input_search_data, 10, 1) = ''-'' AND PATINDEX(''%[^a-zA-Z0-9]%''
    , SUBSTRING(@input_search_data, 11, 2)) = 0)

    SET @input_type = ''CarrierTrackingNumber'';

    ELSE

    -- Search by Product Number: Starts with two letters, a dash, and four alphanumeric
    characters: AA-12YZ

    IF (PATINDEX(''%[^a-zA-Z]%'' , LEFT(@input_search_data, 2)) = 0 AND SUBSTRING(@input_search_data,
    3, 1) = ''-'' AND PATINDEX(''%[^a-zA-Z0-9]%'' , SUBSTRING(@input_search_data,
    4, 4)) = 0)

    SET @input_type = ''ProductNumber'';

    ELSE

    -- Default our input to carrier tracking number, if no other format is identified.

    SET @input_type = ''CarrierTrackingNumber'';

    -- Remove additional padding to prevent bad string matches.

    -- Add a wildcard delimiter to the end of the input, to account for additional
    characters at the end.

    SELECT @input_search_data = LTRIM(RTRIM(@input_search_data)) + ''%'';

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX);

    -- Create the parameter list and initial command string

    SET @parameter_list = ''@input_search_data NVARCHAR(25), @offset_by_this_many_rows
    INT, @row_count_to_return INT'';

    SET @sql_command = ''

    SELECT

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderHeader.Status,

    SalesOrderHeader.PurchaseOrderNumber,

    SalesOrderHeader.AccountNumber,

    SalesOrderHeader.SalesOrderNumber,

    SalesOrderDetail.CarrierTrackingNumber,

    SalesOrderDetail.OrderQty,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.UnitPriceDiscount,

    SalesOrderDetail.LineTotal,

    Product.Name,

    Product.ProductNumber

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID'';

    -- Based on the value of @input_type, dynamically generate the WHERE clause.

    IF @input_type = ''ProductNumber''

    SET @sql_command = @sql_command + ''

    WHERE Product.ProductNumber LIKE @input_search_data'';

    ELSE IF @input_type = ''SalesOrderNumber''

    SET @sql_command = @sql_command + ''

    WHERE SalesOrderHeader.SalesOrderNumber LIKE @input_search_data'';

    ELSE IF @input_type = ''PurchaseOrderNumber''

    SET @sql_command = @sql_command + ''

    WHERE SalesOrderHeader.PurchaseOrderNumber LIKE @input_search_data'';

    ELSE IF @input_type = ''AccountNumber''

    SET @sql_command = @sql_command + ''

    WHERE SalesOrderHeader.AccountNumber LIKE @input_search_data'';

    ELSE IF @input_type = ''CarrierTrackingNumber''

    SET @sql_command = @sql_command + ''

    WHERE SalesOrderDetail.CarrierTrackingNumber LIKE @input_search_data'';

    SET @sql_command = @sql_command + ''

    ORDER BY SalesOrderDetail.SalesOrderDetailID'';

    -- If there are any row limitations, append them here

    SET @sql_command = @sql_command + ''

    OFFSET @offset_by_this_many_rows ROWS'';

    IF @return_all_results = 0

    SET @sql_command = @sql_command + ''

    FETCH NEXT @row_count_to_return ROWS ONLY;'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command, @parameter_list, @input_search_data, @offset_by_this_many_rows,
    @row_count_to_return;

    END

    ```


    代码清单 3-8. 基于字符串形式检测输入类型的销售订单明细搜索'
- fmt: '# 动态SQL输入处理


    字符串比较在存储过程的早期检查 `@input_search_data`，并确定字符串中字母数字 `&` 符号的位置。通过解析此参数，可以评估其中存储的数据类型，并分配
    `@input_type`。构建动态 SQL 语句时，`WHERE` 子句完全基于所提供的输入类型。`PATINDEX` 用于确定字符串中是否存在特定范围之外的任何字符。如果想验证一个由四个字符组成的字符串是否是字母数字，那么检查是否存在不在
    a-z、A-Z 或 0-9 范围内的字符即可实现该目标。脱字符 `^` 表示逻辑 `NOT`，因此如果输入字符串中存在任何非字母数字字符，比较字符串 `''%[^a-zA-Z0-9]%''`
    将返回非零结果。


    或者，也可以在搜索框旁边出现一个下拉菜单，指示输入类型是什么。这也有效，但前面的示例侧重于一键式解决方案的理念，这在潜在输入数量（及其结构）有限时是有利的。对于最终用户来说，这也是一种更简单、更快速的界面，便于学习和利用。如果更可取，输入解析也可以在应用程序中管理。


    # 输入解析的权衡


    先前实现的主要缺点是灵活性，但如果应用程序控制了可以提供的输入类型，则无需检查每种可能的字母和数字组合。虽然此处未演示，但也可以使用更通用的检查来处理不同的数据类型。例如，任何以
    `PO` 开头的字符串都是采购订单号，任何以 `SO` 开头的字符串都是销售订单号。在此实现中，如果输入字符串与任何类型检查都不匹配，我们默认使用承运人跟踪号。这是任意的，也可以默认为任何格式，或者返回无结果（如果那样更可取）。


    # 存储过程执行示例


    以下是示例存储过程的一些执行示例：


    ```

    EXEC dbo.search_sales_order_detail @input_search_data = ''BK-M82B-42'';

    ```


    这表示基于产品编号搜索特定产品。命令字符串中生成的 `WHERE` 子句将仅显示为对此列的检查：


    ```

    WHERE Product.ProductNumber LIKE @input_search_data

    ORDER BY SalesOrderDetail.SalesOrderDetailID

    OFFSET @offset_by_this_many_rows ROWS

    FETCH NEXT @row_count_to_return ROWS ONLY;

    ```


    该语句的剩余部分对于任何不显式希望返回所有结果（使用 `@return_all_results` 参数）的执行都是恒定的。


    ```

    EXEC dbo.search_sales_order_detail @input_search_data = ''PO125'', @offset_by_this_many_rows
    = 0, @row_count_to_return = 50, @return_all_results = 0;

    ```


    此语句搜索采购订单号的一部分，同时一次返回 50 行，而不是默认的 25 行：


    ```

    WHERE SalesOrderHeader.PurchaseOrderNumber LIKE @input_search_data

    ORDER BY SalesOrderDetail.SalesOrderDetailID

    OFFSET @offset_by_this_many_rows ROWS

    FETCH NEXT @row_count_to_return ROWS ONLY;

    ```


    此 TSQL 段与上一个段之间唯一的区别是筛选基于 `PurchaseOrderNumber`，而不是 `ProductNumber`。无论传入的值如何，行偏移量和要返回的行计数都由其各自的参数指定。


    ```

    EXEC dbo.search_sales_order_detail @input_search_data = ''SO43662'', @return_all_results
    = 1;

    ```


    这是一个基于特定销售订单号的搜索。通过将 `@return_all_results` 设置为 `1`，省略了 `FETCH NEXT` 部分，从而生成以下命令字符串：


    ```

    WHERE SalesOrderHeader.SalesOrderNumber LIKE @input_search_data

    ORDER BY SalesOrderDetail.SalesOrderDetailID

    OFFSET @offset_by_this_many_rows ROWS

    ```


    偏移量仍然被指定，但由于未提供值，默认为零。


    ### Result Row Counts


    即使只返回 25（或 10 或 50）行的分页集，返回查询的总行数也是有益的。你可能想知道结果集包含 118 行，而当前仅显示了 25 行。通常，最终用户需要知道，除了当前正在查看第
    51-75 行之外，他们正在查看的是总共 118 行中的一部分。这提供了关于其搜索词有效性的即时反馈，以及对结果集是否符合其预期的一些验证。如果总行数过高，反应将是优化搜索以使其更具体。如果行数太少，那么用户会想验证他们输入的是有效数据，并且他们正在搜索的数据肯定在系统中，并且可以根据搜索条件获得。


    这个计数可以作为一个单独的操作提前计算，这将导致使用与数据检索本身相同的过滤器执行一个额外的查询。清单 [3-9](#A371168_1_En_3_Chapter.html#Par94)
    是一个使用简单采购订单搜索的示例。


    ```

    SELECT

    COUNT(*)

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID

    WHERE SalesOrderHeader.PurchaseOrderNumber LIKE ''PO125%'';

    Listing 3-9.

    检索特定结果集的行数

    ```


    这个计数可以作为一个单独的查询执行，并缓存以供以后使用，以防用户继续分页浏览其当前结果集。这允许你执行一次昂贵的计数操作，而不是每次访问相同数据集时都执行一次。清单
    [3-10](#A371168_1_En_3_Chapter.html#Par96) 中的查询返回 `290` 作为匹配指定条件的行数。


    ```

    SELECT

    COUNT(SalesOrderDetailID) OVER (ORDER BY SalesOrderDetailID ROWS BETWEEN UNBOUNDED
    PRECEDING AND CURRENT ROW) AS row_count_current,

    COUNT(SalesOrderDetailID) OVER (ORDER BY SalesOrderDetailID ROWS BETWEEN UNBOUNDED
    PRECEDING AND UNBOUNDED FOLLOWING) AS row_count_total,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderHeader.Status,

    SalesOrderHeader.PurchaseOrderNumber,

    SalesOrderHeader.AccountNumber,

    SalesOrderHeader.SalesOrderNumber,

    SalesOrderDetail.CarrierTrackingNumber,

    SalesOrderDetail.OrderQty,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.UnitPriceDiscount,

    SalesOrderDetail.LineTotal,

    Product.Name,

    Product.ProductNumber

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID

    WHERE SalesOrderHeader.PurchaseOrderNumber LIKE ''PO125%''

    ORDER BY SalesOrderDetail.SalesOrderDetailID;

    Listing 3-10.

    在结果集旁检索当前和总行数

    ```


    此查询返回相同的结果集，但包含一些额外的计数。第一个计数 `row_count_current` 是按 `SalesOrderDetailID` 排序的当前销售订单明细记录的行号。另一方面，`row_count_total`
    将返回结果集的总行数，而不管当前行号是什么（如前所述，它是 `290`）。`ROWS` 子句是 SQL Server 2012 及更高版本独有的语法，允许你更具体地确定窗口函数处理数据行的范围。`ROWS
    UNBOUNDED PRECEEDING AND CURRENT ROW` 将从结果集的开始处计数到当前行，因此根据 `ORDER BY` 子句返回递增的行计数。另一方面，`ROWS
    UNBOUNDED PRECEEDING AND UNBOUNDED FOLLOWING` 将返回数据集中所有行的计数，而不管当前行号如何。`UNBOUNDED
    PRECEEDING` 引用结果集的开始，而 `UNBOUNDED FOLLOWING` 引用结果集的结束。'
  raw: 'String comparisons early in the stored procedure check `@input_search_data`
    and determine the alphanumeric `&` symbol locations within the string. Based on
    parsing this parameter, the type of data stored in it is assessed, and the `@input_type`
    is assigned. When you build the Dynamic SQL statement, the `WHERE` clause is completely
    based on the type of input provided. `PATINDEX` is used to determine if any characters
    not in a specific range are present in a string. If you want to verify that a
    string of four characters is alphanumeric, then checking to see if any characters
    not in the ranges of a-z, A-Z, or 0-9 will accomplish that goal. The carat `^`
    is used to indicate a logical `NOT`, so the comparison string `''%[^a-zA-Z0-9]%''`
    will return a nonzero result if any non-alphanumeric characters are present in
    the input string.


    Alternatively, a drop-down menu could appear along with the search box, indicating
    what the input type is. This is also effective, but the previous example was focused
    on the idea of a one-click solution, which is advantageous when the number of
    potential inputs (and their structure) is limited. It’s also a simpler and faster
    interface for the end user to learn and utilize. The input parsing could be managed
    in the application as well, if that was preferable.


    The main downside to the previous implementation is flexibility, but if the application
    controls what types of input can be provided, then there will be no need to check
    for every possible combination of letters and numbers. While not demonstrated
    here, it would also be possible to use more generic checks for different data
    types. For example, any string with `PO` in front is a purchase order number,
    or any that begins with `SO` is a sales order number. In this implementation,
    we defaulted to carrier tracking number in the event that the input string did
    not match up with any of the type checks. This is arbitrary and could default
    to any format, or return with no results (if that were preferable).


    The following are a handful of example executions of the example stored procedure:


    ```

    EXEC dbo.search_sales_order_detail @input_search_data = ''BK-M82B-42'';

    ```


    This represents a search for a specific product, based on the product number.
    The resulting `WHERE` clause in the command string will appear as a check only
    against this column:


    ```

    WHERE Product.ProductNumber LIKE @input_search_data

    ORDER BY SalesOrderDetail.SalesOrderDetailID

    OFFSET @offset_by_this_many_rows ROWS

    FETCH NEXT @row_count_to_return ROWS ONLY;

    ```


    The remainder of the statement is constant for any executions where you do not
    explicitly want to return all results (using the `@return_all_results` parameter).


    ```

    EXEC dbo.search_sales_order_detail @input_search_data = ''PO125'', @offset_by_this_many_rows
    = 0, @row_count_to_return = 50, @return_all_results = 0;

    ```


    This statement searches for a portion of a purchase order number while returning
    50 rows at a time, instead of the default of 25:


    ```

    WHERE SalesOrderHeader.PurchaseOrderNumber LIKE @input_search_data

    ORDER BY SalesOrderDetail.SalesOrderDetailID

    OFFSET @offset_by_this_many_rows ROWS

    FETCH NEXT @row_count_to_return ROWS ONLY;

    ```


    The only difference between this TSQL segment and the last is the filtering on
    `PurchaseOrderNumber`, rather than `ProductNumber`. The row offset and row count
    to return are specified by their respective parameters, regardless of the values
    passed in.


    ```

    EXEC dbo.search_sales_order_detail @input_search_data = ''SO43662'', @return_all_results
    = 1;

    ```


    This is a search based on a specific sales order number. By setting `@return_all_results`
    to `1`, the `FETCH NEXT` section is omitted, resulting in the following command
    string:


    ```

    WHERE SalesOrderHeader.SalesOrderNumber LIKE @input_search_data

    ORDER BY SalesOrderDetail.SalesOrderDetailID

    OFFSET @offset_by_this_many_rows ROWS

    ```


    The offset is still specified, but will default to zero as no value was provided.


    ### Result Row Counts


    It can be advantageous to return the total row count of a query, even if you are
    only returning a paged set of 25 (or 10 or 50) rows. You may want to know that
    a result set contains 118 rows and that only 25 are being displayed at the moment.
    Oftentimes the end users will need to know that, in addition to currently viewing
    rows 51-75, they are viewing those rows out of a total set of 118\. This provides
    immediate feedback on the effectiveness of their search terms, as well as some
    validation that the result set is what they expected. If the total row count were
    too high, the response would be to refine the search to be more specific. If the
    row count was too low, then users would want to verify that they are entering
    valid data and that the data they are searching for is definitely in the system
    and available given the search criteria.


    This count can be calculated ahead of time as a separate operation, which would
    result in an additional query using the same filters as the data retrieval itself.
    Listing [3-9](#A371168_1_En_3_Chapter.html#Par94) is an example that uses a simple
    purchase order search.


    ```

    SELECT

    COUNT(*)

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID

    WHERE SalesOrderHeader.PurchaseOrderNumber LIKE ''PO125%'';

    Listing 3-9.

    Retrieving a Count of Rows for a Specific Result Set

    ```


    This count can be executed as a separate query and cached for later use, in the
    event that the users continue to page through their current result set. This allows
    you to perform an expensive count only once, rather than each time the same data
    set is accessed. The query in Listing [3-10](#A371168_1_En_3_Chapter.html#Par96)
    returns `290` as the count of rows matching the criteria specified.


    ```

    SELECT

    COUNT(SalesOrderDetailID) OVER (ORDER BY SalesOrderDetailID ROWS BETWEEN UNBOUNDED
    PRECEDING AND CURRENT ROW) AS row_count_current,

    COUNT(SalesOrderDetailID) OVER (ORDER BY SalesOrderDetailID ROWS BETWEEN UNBOUNDED
    PRECEDING AND UNBOUNDED FOLLOWING) AS row_count_total,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderHeader.Status,

    SalesOrderHeader.PurchaseOrderNumber,

    SalesOrderHeader.AccountNumber,

    SalesOrderHeader.SalesOrderNumber,

    SalesOrderDetail.CarrierTrackingNumber,

    SalesOrderDetail.OrderQty,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.UnitPriceDiscount,

    SalesOrderDetail.LineTotal,

    Product.Name,

    Product.ProductNumber

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    INNER JOIN Production.Product

    ON SalesOrderDetail.ProductID = Product.ProductID

    WHERE SalesOrderHeader.PurchaseOrderNumber LIKE ''PO125%''

    ORDER BY SalesOrderDetail.SalesOrderDetailID;

    Listing 3-10.

    Retrieving Current and Total Row Counts Alongside the Result Set

    ```


    This query returns the same result set, but includes a few counts alongside that
    data. The first count, `row_count_current`, is the row number of the current sales
    order detail record as ordered by the `SalesOrderDetailID. row_count_total`, on
    the other hand, will return the total row count for the result set, regardless
    of the current row number (which is `290`, as it was previously). The `ROWS` addition
    is syntax exclusive to SQL Server 2012 and later and allows you to determine the
    window over which the window function processes rows of data over more specifically.
    `ROWS UNBOUNDED PRECEEDING AND CURRENT ROW` will count from the start of the result
    set through the current row, hence returning an increasing row count based on
    the `ORDER BY` clause. `ROWS UNBOUNDED PRECEEDING AND UNBOUNDED FOLLOWING`, on
    the other hand, will return a count of all rows in the data set, regardless of
    the current row number. `UNBOUNDED PRECEEDING` references the start of the result
    set, whereas `UNBOUNDED FOLLOWING` references the end of the result set.'
