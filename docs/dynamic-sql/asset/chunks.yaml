  trans: '# 什么是 SQL 注入？


    SQL 注入是指黑客试图将恶意的 T-SQL 代码插入到动态 SQL 所使用的参数中。请考虑清单 2-1 中所示的示例。


    ```

    DECLARE @CMD NVARCHAR(MAX);

    DECLARE @search_criteria NVARCHAR(1000);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE FirstName = '''''';

    SELECT @search_criteria = ''Edward'';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    清单 2-1.

    动态 SQL，SQL 注入入门

    ```


    我们对 `Person.Person` 表执行搜索，查找名字与传入此代码的 `@search_criteria` 值匹配的任何人。生成的命令字符串正如您所期望的那样：


    ```

    SELECT * FROM Person.Person

    WHERE FirstName = ''Edward''

    ```


    随着时间的推移，这个搜索被非常非常多的人使用，并扩展到也可以按姓氏、中间名首字母、称谓、电子邮件地址等搜索人！最终，一个姓“O''Brien”的人尝试搜索他们的记录，如清单
    2-2 所示。


    ```

    DECLARE @CMD NVARCHAR(MAX);

    DECLARE @search_criteria NVARCHAR(1000);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @search_criteria = ''O''''Brien'';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    EXEC sp_executesql @CMD;

    清单 2-2.

    使用带有撇号的输入值

    ```


    结果并非用户所期望的。他们没有得到自己的信息，而是得到了一个 SQL Server 错误：


    ```

    Msg 102, Level 15, State 1, Line 322

    Incorrect syntax near ''Brien''.

    Msg 105, Level 15, State 1, Line 322

    Unclosed quotation mark after the character string ''''.

    ```


    回到命令字符串并验证其外观是否正确，您会注意到以下情况：


    ```

    SELECT * FROM Person.Person

    WHERE LastName = ''O''Brien''

    ```


    “O''Brien”中的撇号破坏了命令字符串，在“O''Brien”的“O”之后关闭了字符串。您的朋友 O''Brien 没有收到预期的数据，而是收到了一个令人费解的错误，并联系您的服务台以查明这个
    Web 应用程序为何损坏。这是可能发生情况的最佳场景。用户耸耸肩，并向您的组织提交一个事件来修复此错误，以便他可以在没有奇怪错误消息的情况下搜索他的信息。


    让我们考虑另一个例子，其中最终用户更懂技术并且更具恶意。她输入一个带撇号的字符串并返回一条错误消息。她没有向您报告错误，而是灵光一现，开始编写自己的 T-SQL，如清单
    2-3 所示。


    ```

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @search_criteria = ''Smith'''' OR 1 = 1 AND '''''''' = '''''';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    EXEC sp_executesql @CMD;

    清单 2-3.

    黑客如何开始对不安全的动态 SQL 使用 SQL 注入

    ```


    这个狡猾的用户立即意识到该站点容易受到 SQL 注入攻击，并开始修改搜索参数，直到找到一个允许她从该表中提取所有个人数据的参数，而不仅仅是她自己的。通过在
    `Smith` 后添加两个撇号，这位不速之客已返回到主 T-SQL 查询，并在末尾附加了 `OR 1 = 1`。最后，她在末尾添加了一些额外的撇号，以正确完成命令字符串并避免语法错误。生成的命令字符串如下：


    ```

    SELECT * FROM Person.Person

    WHERE LastName = ''Smith'' OR 1 = 1 AND '''' = ''''

    ```


    `Smith` 这个姓氏与攻击无关。通过添加一个始终为真的条件，黑客有效地绕过了 `WHERE` 子句，并获得了对表中所有数据的访问权限。仅用一条语句，这个黑客就窃取了数万行个人数据，并开始了一次数据泄露，这将对任何被其针对的组织造成巨大伤害！


    如果用户名和密码提示是通过动态 SQL 管理的，那么类似的攻击将导致某人获得对未经授权使用的软件应用程序的访问权限。考虑清单 2-4 中的动态 SQL，它验证用户的
    ID 和密码。


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @id INT = 3;

    DECLARE @password NVARCHAR(128) = '''';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Password

    WHERE BusinessEntityID = '' + CAST(@id AS NVARCHAR(25)) + ''

    AND PasswordHash = '''''' + @password + ''''''''

    EXEC (@sql_command)

    清单 2-4.

    验证用户/密码组合的动态 SQL

    ```


    任何不正确的密码猜测都将导致登录失败，并且不返回结果。但是，如果黑客尝试使用 SQL 注入来完全绕过登录验证怎么办？以下用于 `@password` 的字符串将足以完全使此安全检查失效：


    ```

    '''''' OR 1 = 1 AND '''''''' = ''''''

    ```


    通过在条件中包含 `OR`，恶意用户可以找到使用任何用户登录的方法，甚至是管理员。由于这些登录从应用程序的角度看可能是合法的，因此这种攻击可能在为时已晚之前一直未被察觉。


    类似地，`UNION ALL` 可以在不触发任何错误的情况下选择额外的数据，如清单 2-5 所示。


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @id INT = 3;

    DECLARE @password NVARCHAR(128) = '''''' UNION ALL SELECT * FROM Person.Password
    WHERE '''''''' = '''''';

    SELECT @sql_command = ''

    SELECT

    *

    FROM Person.Password

    WHERE BusinessEntityID = '' + CAST(@id AS NVARCHAR(25)) + ''

    AND PasswordHash = '''''' + @password + ''''''''

    EXEC (@sql_command)

    清单 2-5.

    通过 SQL 注入使用 UNION ALL 来收集额外的安全数据

    ```


    在此示例中，允许使用空白密码执行原始查询，但附加了一个额外的 `SELECT` 语句，该语句返回 `Password` 表的全部内容。生成的命令字符串如下所示：


    ```

    SELECT

    *

    FROM Person.Password

    WHERE BusinessEntityID = 3

    AND PasswordHash = '''' UNION ALL SELECT * FROM Person.Password WHERE '''' = ''''

    ```


    这要更难实现一些，因为两个表需要具有相同的结构，以便在第一个表的列与第二个表不匹配时防止语法错误。不过，如果有时间，黑客可以找到解决此问题的方法，例如向附加表中添加虚拟列、选择特定列或使用
    `COLLATE` 来确保语言和区域设置匹配。在此处确定表名以利用它们是猜测的问题，但稍后您将了解黑客如何通过更隐蔽的方式确定它们的方法。


    涉及用户名/密码场景的类似攻击是使用注释来删除剩余的 T-SQL，以便用户名被验证，但密码不被验证。此数据库模式是假设的，但用例非常常见，如清单 2-6 所示。


    ```

    DECLARE @sql_command NVARCHAR(MAX);

    DECLARE @username NVARCHAR(128) = ''edward'';

    DECLARE @password NVARCHAR(128) = ''my_password'';

    SELECT @sql_command = ''SELECT

    *

    FROM dbo.password

    WHERE username = '''''' + @username + '''''' AND Password = '''''' + @password
    + '''''''';

    EXEC(@sql_command);

    清单 2-6.

    用户/密码验证语句

    ```


    攻击者可能看到这里可能存在 SQL 注入，并尝试通过为用户名输入以下内容来完全移除密码因素：'
- fmt: '```''administrator'''' --''```


    The resulting command string shows that the remainder of the `WHERE` clause is
    commented out, therefore bypassing the password check:


    ```SELECT

    *

    FROM dbo.password

    WHERE username = ''administrator'' --'' AND Password = ''my_password''```


    An open comment delimiter, `/*` may be used in an attempt to bypass multi-line
    queries, or those that have some precautions in place.


    For a skilled hacker, this would only be the beginning. From here, they could
    begin testing the structure of your database, learning the names of tables, stored
    procedures, views, and the security permissions granted to the user whom the application
    runs under. In order to do this, they would continue to rewrite their search box
    entry in an attempt to learn more, as shown in Listing [2-7](#A371168_1_En_2_Chapter.html#Par36).


    ```DECLARE @CMD NVARCHAR(MAX);

    DECLARE @search_criteria NVARCHAR(1000);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @search_criteria = ''Smith''''; SELECT * FROM sys.tables WHERE ''''''''
    = ''''''

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    EXEC sp_executesql @CMD;

    Listing 2-7.

    Closing a Dynamic SQL String from an Input Parameter to Probe Schema Objects```


    After a bit of experimenting with apostrophes, the hacker has figured out how
    to close the search statement and start a new one of his own. By selecting data
    from `sys.tables`, he has now collected a list of all tables in the database.
    If he did not have access to system views, then guesswork would still yield some
    results as most databases have somewhat predictable object names. More guessing
    would result in more risk, as many failed `TSQL` statements or high activity from
    this search by a single user may eventually arouse suspicion. Unfortunately, most
    companies do not have the time or resources to vigilantly monitor and guard their
    web logs. Oftentimes, these vulnerabilities are discovered too late, after data
    has been stolen.


    The hacker’s next step would be to identify specific tables of interest: those
    with passwords, credit card numbers, or other valuable data. In addition, he can
    now run any `SQL` statements for which the application user has permissions without
    generating any further errors, as shown in Listing [2-8](#A371168_1_En_2_Chapter.html#Par39).


    ```DECLARE @CMD NVARCHAR(MAX);

    DECLARE @search_criteria NVARCHAR(1000);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @search_criteria = ''Smith''''; SELECT * FROM Person.Password WHERE ''''''''
    = ''''''

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    EXEC sp_executesql @CMD;

    Listing 2-8.

    Using SQL Injection to Freely Gather Password Data```


    At this point, the hacker can have whatever data he can collect from the database.
    If you’re lucky, then critical data will be encrypted, reducing the ability to
    immediately gain access to sensitive data. With this level of database access,
    though, the hacker may be able to collect enough additional information to access
    other systems and eventually decrypt that data. This is an excellent example of
    why highly privileged accounts, such as `sa`, should never be used in the context
    of an application login.


    There is a single worst-case scenario that has played out many times in recent
    history. If the hacker was feeling destructive, he could use his newly found database
    access to delete data, truncate or drop tables, or even delete backup files from
    disk. How could he access files on disk? If `xp_cmdshell` is enabled on your server,
    then the hacker may be able to use it to access any data that is directly accessible
    from there. He could also potentially adjust server settings, change database
    and server security, add or remove users, and more. The limits at this point are
    restricted only by your imagination.


    Disable `xp_cmdshell` on all database servers that could be accessed from outside
    of your internal network. As an additional safety measure, disable it anywhere
    that it isn’t absolutely needed!


    In addition to `xp_cmdshell`, other system stored procedures should have their
    security limited. `xp_regread`, `xp_regwrite`, `xp_servicecontrol`, `xp_loginconfig`,
    `sp_addextendedproc`, and many others can provide far more access to the server
    and operating system than you would ever want. Be sure to limit access to these
    so that any user who doesn’t need them doesn’t have them. Other functions that
    can be dangerous include `HOST_NAME()`, `OPENQUERY()`, `OPENROWSET()`, `SHUTDOWN`,
    and `KILL`.


    Another scenario that has added further insult to injury has been the desire of
    hackers to profit off of their escapades. They may try to blackmail your company
    in an attempt to profit off of their efforts: “Pay up, or watch your precious
    data go up in flames!” More complicated situations have arisen when hackers attempt
    to cover their data theft by issuing a `DDOS` (distributed denial of service attack)
    attack. The influx of web/data requests overwhelm your web servers and distract
    you from their true intentions.


    Additional `SQL` injection attacks have been documented in which the hacker did
    not steal data, drop tables, or otherwise make her presence immediately known.
    Instead, she would use the newfound access to modify web page code, inserting
    links to viruses, malware, or other malicious code that could exploit anyone visiting
    this web page. This expands the scope of the attack greatly and could result in
    significant damage, until the target realizes what has happened, removes the malicious
    code, and patches the original `SQL` injection target.


    These scenarios are scary, but are far from a bedtime story gone wrong. We will
    spend the rest of this chapter discussing this nightmare situation, including
    the steps you can take to alleviate each and every mistake that led to the database
    server being infiltrated by an outside party.'
