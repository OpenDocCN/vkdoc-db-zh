- fmt: 'The first change here is that there are ten new parameters that correspond
    to each column that can be added to the search results grid. This looks a bit
    haphazard, although an explicit parameter list is convenient for easy troubleshooting.
    Each is explicitly named and easy to understand and document. One alternative
    to the use of individual bits is to implement a bitmap and adjust individual bits
    within a single parameter. This reduces the parameter list from one per parameter
    down to one, but will also reduce readability and maintainability, as the parameter
    will now be a hexadecimal number instead of a set of bits. For example, if bit
    1, bit 6, and bit 7 were selected, the resulting `VARBINARY` representation of
    that bitmap would be `0x00000061`. In order to make this usable and maintainable,
    each bit would need to be documented so that anyone who modifies or works with
    this stored procedure would know exactly how it works.


    While this stored procedure has many parameters, most will not be needed at any
    one time, unless the end user truly wants to filter on and display everything.
    Note that the additional bit columns are not included in the parameters for `sp_executesql`.
    These bit columns are used in building the command string only, but are not required
    within the Dynamic SQL. As a result, adding additional bits does not cause the
    `sp_executesql` statement to grow, although it will add more parameters to the
    `search_products` stored procedure. As a result, the `sp_executesql` statement
    is the same in this example as it was in the previous one.


    The column list has been broken into a series of parameter checks as well. Any
    optional column is included only if its respective bit column is set. For example,
    if `@show_product_model` is set to 1, then the `ProductModel.Name` column will
    be included in the `SELECT` statement. The following `EXEC` statement illustrates
    a single filter on `ProductModel.Name` and the inclusion of that name, as well
    as the product color:


    ```

    EXEC dbo.search_products @product_model = ''Mountain'', @show_product_model =
    1, @show_color = 1

    ```


    The resulting command string for this search is shown in Listing [3-5](#A371168_1_En_3_Chapter.html#Par34).


    ```

    SELECT

    Product.Name AS product_name,

    Product.ProductNumber AS product_number,

    ProductModel.Name AS product_model_name,

    Product.Color AS product_color

    FROM Production.Product

    LEFT JOIN Production.ProductModel

    ON Product.ProductModelID = ProductModel.ProductModelID

    WHERE 1 = 1

    AND ProductModel.Name LIKE @product_model

    Listing 3-5.

    Command String Generated from Stored Procedure in Listing 3-4

    ```


    Note that the actual TSQL executed is only what is needed to service the user’s
    request and nothing more. All sections of the query were customized in order to
    meet the exact search that was requested.


    The example here only returns columns that are explicitly called out by the user.
    If desired, the TSQL can be written such that you return all columns in a table
    if any one of them is selected, or just the columns that could be selected by
    the end user. Using this methodology, if `@show_product_model = 1`, then `ProductModel.Name`
    and `ProductModel.CatalogDescription` would be selected. The application could
    then remove any unneeded columns. This alternative would be easier to maintain
    and update over time, but would sacrifice a small amount of performance, as more
    data would be returned than is needed, as shown in Listing [3-6](#A371168_1_En_3_Chapter.html#Par37).'
