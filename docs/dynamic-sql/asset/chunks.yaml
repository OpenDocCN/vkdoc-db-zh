    Figure 9-7.


    Results of a query that uses two PIVOT operators for data aggregation


    A new set of columns has been added to the result set, indicating the number of
    times a particular `SafetyStockLevel` value matches the ones provided in the list.
    This can be a very handy trick if you want to report on multiple metrics side-by-side
    in a single query, rather than having to join multiple result sets.


    You can implement Dynamic SQL just as you did before in order to ensure that all
    list values for both metrics are correctly accounted for. When you do this, you
    will need to include a separate table variable for `SafetyStockLevel` values,
    in addition to those for `Color`, as shown in Listing [9-15](#A371168_1_En_9_Chapter.html#Par70).


    ```

    DECLARE @colors TABLE

    (color_name VARCHAR(25));

    INSERT INTO @colors

    (color_name)

    SELECT DISTINCT

    Product.Color

    FROM Production.Product

    WHERE Product.Color IS NOT NULL;

    DECLARE @stock_levels TABLE

    (safety_stock_level SMALLINT);

    INSERT INTO @stock_levels

    SELECT DISTINCT

    Product.SafetyStockLevel

    FROM Production.Product;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (      SELECT

    PRODUCT.Name AS product_name,

    PRODUCT.Color AS product_color,

    PRODUCT.ReorderPoint,

    PRODUCT_INVENTORY.Quantity AS product_quantity,

    PRODUCT.SafetyStockLevel

    FROM Production.Product PRODUCT

    LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY

    ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID

    ) PRODUCT_DATA

    PIVOT

    (      SUM(product_quantity)

    FOR product_color IN ('';

    SELECT @sql_command = @sql_command + ''['' + color_name + ''], ''

    FROM @colors;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA_COLOR

    PIVOT

    (      COUNT(SafetyStockLevel)

    FOR SafetyStockLevel IN ('';

    SELECT @sql_command = @sql_command + ''['' + CAST(safety_stock_level AS NVARCHAR)
    + ''], ''

    FROM @stock_levels;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA_LEVEL

    '';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    Listing 9-15.

    Using Multiple PIVOT Operators with Dynamic SQL

