  trans: '

    ## 输入净化


    防范 SQL 注入的第一步是确保所有输入都是干净的，不会传入无效数据。这是开发人员（通过代码）和数据库管理员（通过 SQL）共同承担的责任。在理想的环境下，输入应在执行的各个阶段都得到净化。最初提示输入的网页或应用程序应努力确保不允许无效条目。一些常见的方法包括：


    *   为用户生成自定义错误消息，提示其输入了无效字符或文本。

    *   剥离无效字符，并允许执行继续进行。

    *   为输入数据定义角色，如果条目不符合特定格式，则向用户抛出错误。例如，出生日期可以是 MMDDYYYY 格式，并禁止所有其他条目。

    *   实施一个软件框架，自动为你处理输入净化。


    这些努力将极大增强安全性，并确保最终用户能立即收到关于其输入数据的反馈。一个好的应用程序至少会实施其中一种保护措施，但很可能是几种。一个出色的应用程序会实施所有这些措施，即使这些努力看起来冗余或不必要。作为数据库专业人员，你会希望有这些保护措施，但不能依赖它们。确保所有传递到你的`TSQL`中的参数都以同样的勤勉程度进行净化，是你的责任。在软件应用程序的所有层上都这样做，可以在发生错误时确保最高级别的保护。


    SQL Server 错误消息应始终在内部通过代码进行处理，永远不要暴露给最终用户。相反，应向他们提供友好的错误消息和报告说明。


    净化输入的最简单方法是在代码开头直接处理它们。为了使示例代码尽可能易于阅读，对于任何可重用代码，我们将继续使用存储过程。清单 2-9 重新审视了之前的搜索，并在开头添加了一些基本的输入净化。


    ```sql

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(1000) = NULL) -- This comes from user input

    AS

    BEGIN

    SELECT @search_criteria = REPLACE(@search_criteria, '''''''', '''''''''''');

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '''''';

    SELECT @CMD = @CMD + @search_criteria;

    SELECT @CMD = @CMD + '''''''';

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    END

    GO

    EXEC dbo.search_people ''Smith'';

    EXEC dbo.search_people ''O''''Brien'';

    EXEC dbo.search_people '''''' SELECT * FROM Person.Password; SELECT '''''';

    ```

    清单 2-9. 基本输入净化的搜索过程


    此存储过程在顶部包含一个补充：所有撇号实例都被替换为一对撇号。这保证了如果有人输入撇号，它们不会破坏字符串并导致立即错误或明显的 SQL 注入漏洞。三次执行的结果如下：


    ```sql

    SELECT * FROM Person.Person

    WHERE LastName = ''Smith''

    SELECT * FROM Person.Person

    WHERE LastName = ''O''''Brien''

    SELECT * FROM Person.Person

    WHERE LastName = '''''' SELECT * FROM Person.Password; SELECT ''''''

    ```


    在第一个例子中，输入了`Smith`，所有姓氏为`Smith`的人都像往常一样被返回。当一个姓`O''Brien`的人输入其姓氏时，撇号被加倍，搜索他的名字，并且结果正常找到，没有任何错误消息。当任何恶意用户试图访问数据库中的密码时，他们得到的是一个空的结果集。由于在所有情况下撇号都被加倍，这一串试图进行的
    SQL 注入就变成了一个没有漏洞的无害字符串。


    SQL Server 有一个内置函数，其目的是确保字符串内容被正确分隔。`QUOTENAME`接受两个参数：要净化的字符串和将被验证的字符。清单 2-10
    中的存储过程与上面类似，但`REPLACE`操作已更新为使用`QUOTENAME`。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(1000) = NULL) -- This comes from user input

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = '';

    SELECT @CMD = @CMD + QUOTENAME(@search_criteria, '''''''');

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    END

    GO

    EXEC dbo.search_people ''Smith'';

    EXEC dbo.search_people ''O''''Brien'';

    EXEC dbo.search_people '''''' SELECT * FROM Person.Password; SELECT '''''';

    ```

    清单 2-10. 使用 QUOTENAME 实现的输入净化搜索过程


    `QUOTENAME`为你处理了撇号净化，因此你不再需要用额外的撇号包裹命令字符串的姓氏部分。此存储过程的输出与上一个例子完全相同。每个姓名都用撇号正确分隔，以确保搜索条件不会导致任何错误发生的机会。除了撇号，`QUOTENAME`还可用于分隔方括号（`[`、`]`）以及引号（`"`）。

    '
- fmt: '# Parameterizing Dynamic SQL


    Manually cleansing inputs using `REPLACE` or `QUOTENAME` is leaps and bounds better
    than having no protection at all. This will help prevent the most common SQL injection
    attacks, but is not perfect. Manual input cleansing ensures that certain character
    combinations are replaced with more desirable options, but they are still subject
    to your vigilance in escaping inputs everywhere they exist. This tends toward
    a manual process where the database developer must remember to correctly use `REPLACE`
    or `QUOTENAME` in conjunction with all Dynamic SQL statements.


    A more reliable choice is to shift the responsibility from the developer to `sp_executesql`.
    This versatile stored procedure can accept input parameters, and in the process
    of doing so, will cleanse them automatically. Consider the new version of the
    stored procedure, as shown in Listing 2-11.


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(50) = NULL) -- This comes from user input

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = @search_criteria'';

    PRINT @CMD;

    EXEC sp_executesql @CMD, N''@search_criteria

    NVARCHAR(1000)'', @search_criteria;

    END

    Listing 2-11.

    Parameterized Search Procedure

    ```


    The syntax for parameterizing `sp_executesql` is broken into three parts:


    *   The command string to execute (`@CMD`)

    *   The parameter list, including data types for each (`N''@search_criteria NVARCHAR(1000)''`)

    *   The parameters that are being passed in from the stored procedure (`@search_criteria`)


    The results of this stored procedure are identical to each of the previous input
    cleansing examples. In this case, `sp_executesql` will handle the cleansing itself,
    ensuring that the inputs are correctly delimited, without the need from any further
    instruction from you. The parameter list may be stored as a separate variable
    as well. This can prove useful when there are many parameters, when you want to
    modify this list prior to execution, or when you want the `sp_executesql` command
    to be as short and clean as possible.


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@search_criteria NVARCHAR(1000) = NULL) -- This comes from user input

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = N''@search_criteria NVARCHAR(1000)'';

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE LastName = @search_criteria'';

    PRINT @CMD;

    EXEC sp_executesql @CMD, @parameter_list, @search_criteria;

    END

    Listing 2-12.

    Parameterized Search Procedure Using a Separate Parameter Variable

    ```


    Notice the addition of the variable `@parameter_list`, which provides a separate
    place in which to store the list of input parameters. Adding this parameter is
    optional, but can help improve the readability of your Dynamic SQL execution statement.


    Using `sp_executesql` and passing all parameters into it ensures that all inputs
    are properly delimited and that SQL injection will not be possible using those
    inputs.


    The parameter list string (`@parameter_list`) contains all of the parameter names
    that correspond to the text within the Dynamic SQL command string. The input parameters
    (`@search_criteria`) correspond to the parameters that are being passed in from
    outside of the Dynamic SQL, listed individually. The parameter names in each list
    may be different, and the naming convention used is up to you. Exercise consistency,
    though, so that future developers are not left guessing with each line of TSQL.


    How many parameters are allowed in an `sp_executesql` statement? The answer is
    based on the SQL Server built-in limit for parameters in a stored procedure. The
    limit for any stored procedure is 2100, but in the case of `sp_executesql`, the
    command string and parameter list count as parameters, leaving you with a 2098
    parameter limit, which should be more than enough for even the wildest programmers!


    The previous example illustrated a Dynamic SQL statement with a single parameter.
    Listing 2-13 shows how this would look with many parameters, naming the internal
    and external names differently.


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_people'')

    DROP PROCEDURE search_people;

    GO

    CREATE PROCEDURE dbo.search_people

    (@FirstName NVARCHAR(50) = NULL,

    @MiddleName NVARCHAR(50) = NULL,

    @LastName NVARCHAR(50) = NULL,

    @EmailPromotion INT = NULL)

    AS

    BEGIN

    DECLARE @CMD NVARCHAR(MAX);

    DECLARE @parameter_list NVARCHAR(MAX) = N''@FirstName NVARCHAR(50), @MiddleName
    NVARCHAR(50), @LastName NVARCHAR(50), @EmailPromotion INT'';

    SELECT @CMD = ''SELECT * FROM Person.Person

    WHERE 1 = 1'';

    IF @FirstName IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND FirstName = @FirstName''

    IF @MiddleName IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND MiddleName = @MiddleName''

    IF @LastName IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND LastName = @LastName''

    IF @EmailPromotion IS NOT NULL

    SELECT @CMD = @CMD + ''

    AND EmailPromotion = @EmailPromotion'';

    PRINT @CMD;

    EXEC sp_executesql @CMD, @parameter_list, @FirstName, @MiddleName, @LastName,
    @EmailPromotion;

    END

    Listing 2-13.

    Search Procedure with Multiple Optional Parameters

    ```


    There are a few interesting changes to the search proc here. First, there are
    now four parameters that are passed into the stored procedure. Note the syntax
    of the `sp_executesql` command: command string first, then the internal parameter
    list, and then each parameter passed in separately. It is important that the order
    of parameters in each list match; otherwise, you risk passing a first name in
    as a last name, or worse, passing a string where an integer is expected.


    The second significant change in this stored procedure is that all parameters
    are optional. In order to facilitate this, `WHERE 1 = 1` is the first `WHERE`
    clause, followed by each parameter. This ensures that, if all parameters are `NULL`,
    you aren’t left with a hanging `WHERE` keyword and no clauses following it; this
    would result in an error. Consider the following executions of the stored procedure:


    ```

    EXEC dbo.search_people ''Edward'', ''H'', ''Johnson'', 1

    EXEC dbo.search_people ''Edward'', NULL, NULL, 1

    EXEC dbo.search_people

    ```


    The first example provides values for all parameters and will return a single
    row from `Person.Person`. The TSQL command string will look like this:


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    AND FirstName = @FirstName

    AND MiddleName = @MiddleName

    AND LastName = @LastName

    AND EmailPromotion = @EmailPromotion

    ```


    The second example leaves the middle name and last name `NULL`, and the resulting
    command string is:


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    AND FirstName = @FirstName

    AND EmailPromotion = @EmailPromotion

    ```


    The final example provides no parameters, and illustrates the importance of the
    `WHERE 1 = 1` placeholder in order to maintain good syntax when you do not know
    what parameters (if any) will be supplied:


    ```

    SELECT * FROM Person.Person

    WHERE 1 = 1

    ```


    It is likely within any large application where the table you are searching contains
    thousands (or millions) of rows, that you would not want to allow an empty search
    like this. It is generally beneficial to require at least one search parameter,
    which prevents users from blindly returning everything. It is also worthwhile
    to limit the rows returned by the database to some relatively small number. Common
    defaults include 10, 25, 50, and 100, and this ensures that you never inadvertently
    allow users to query a table for millions of rows at one time.'
