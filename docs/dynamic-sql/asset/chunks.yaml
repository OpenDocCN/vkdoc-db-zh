  raw: 'Before investigating parameter sniffing as the culprit to a performance problem,
    always verify that there are no other bigger problems that require tackling first.
    In addition to statistics, indexing, and TSQL mistakes, it is possible that SQL
    Server configuration settings may also affect query performance. Parallelism,
    trace flags, and memory/CPU pressure could all lead to unexpected performance
    degradation.


    Despite all of these possibilities, always start with the simplest solutions first,
    and then explore more complex ones when they are disproven. It is significantly
    more likely that a performance problem related to undesired plan reuse is simply
    the result of classic parameter sniffing, and not of some other mysterious origin.
    If not, then consider the impact of statistics, indexing, and query structure.
    Only when all else fails is it necessary to investigate the guts of your SQL Server
    installation for further clues. This will be a rare scenario if it ever happens,
    but being prepared and knowing where to look to solve performance problems can
    save a lot of time in the future.


    ### Parameter Values


    A good way to investigate parameter sniffing is to inspect the parameters themselves
    and the typical values that are being passed into them. Is a certain value or
    set of values very common? Are the values always different and indicative of a
    process that never repeats? Does a parameter typically receive a value that seems
    random, or do they follow a distinct pattern?


    This knowledge can help determine the best course of action. If a small set of
    values is always passed into a stored procedure, you may be able to make assumptions
    about them and design the TSQL to take into account those artificial limits. Some
    useful observations include:


    *   Is a parameter always `NOT NULL`?

    *   Will a parameter always be set to the current date or a current value for
    an important metric?

    *   Is there a very limited set of values for a parameter?

    *   Are parameter values seemingly random?

    *   Is a particular value extremely common, or is that value more important or
    relevant than other values?


    As noted earlier, it’s important to take into account the possibility of change.
    If application changes could impact parameter values, it is necessary to anticipate
    those changes and not write TSQL that will be harmed by those changes in the future.
    If this can be verified, then use simplifying assumptions to rewrite stored procedures
    to be shorter, simpler, and easier for the optimizer to make the correct decisions
    as often as possible.


    Additionally, knowing the cardinality of a result set can greatly affect how you
    write a stored procedure. For example, if a single row is always returned from
    a given stored proc, you can ensure that each section of it is optimized for that
    small result set. Similarly, if you are paging data and will always return 25
    or 50 rows, that information can be used to make sure the stored proc is written
    to return that row count and no more or less.


    As was illustrated in Chapter [3](#A371168_1_En_3_Chapter.html), paging data sets
    can be optimized for a small result set when it is unlikely that you will request
    more data. If you know that a user will request page after page, you can write
    your queries to return more data, in anticipation of the next click. The application
    knowledge that allows you to draw these conclusions also provides the information
    you need to write TSQL that aligns with the business logic you are trying to satisfy.


    ### Local Variables


    In order to prepare for this example, add an index to `Production.Product`, which
    will help support the queries that you are about to run:


    ```

    CREATE NONCLUSTERED INDEX NCI_production_product_ProductModelID ON Production.Product
    (ProductModelID) INCLUDE (Name);

    ```


    A tactic that is sometimes used to try to eliminate parameter sniffing is to redeclare
    all variables locally, rather than using the parameters passed into a stored procedure.
    The effect of this may seem similar to the use of the `RECOMPILE` hint, but there
    can be some subtle differences that can result in worse performance in the long
    run. To demonstrate this effect, let’s create a new version of the stored procedure
    from the start of this chapter and redefine all stored procedure parameters as
    local variables within it, as shown in Listing [8-8](#A371168_1_En_8_Chapter.html#Par161).


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_products_by_model_local'')

    BEGIN

    DROP PROCEDURE dbo.get_products_by_model_local;

    END

    GO

    CREATE PROCEDURE dbo.get_products_by_model_local (@firstProductModelID INT, @lastProductModelID
    INT)

    AS

    BEGIN

    DECLARE @ProductModelID1 INT = @firstProductModelID;

    DECLARE @ProductModelID2 INT = @lastProductModelID;

    SELECT

    PRODUCT.Name,

    PRODUCT.ProductID,

    PRODUCT.ProductModelID,

    PRODUCT.ProductNumber,

    MODEL.Name

    FROM Production.Product PRODUCT

    INNER JOIN Production.ProductModel MODEL

    ON MODEL.ProductModelID = PRODUCT.ProductModelID

    WHERE PRODUCT.ProductModelID BETWEEN @ProductModelID1 AND @ProductModelID2;

    END

    Listing 8-8.

    Stored Procedure that Redeclares Parameters as Local Variables

    ```


    Note that `@firstProductModelID` and `@secondProductModelID` have been assigned
    to `@ProductModelID1` and `@ProductModelID2`, respectively. These new variables
    are then used in the final `SELECT` statement at the end of the stored procedure.
    Using this new version of the proc, let’s test performance using the example from
    earlier in this chapter:


    ```

    DBCC FREEPROCCACHE;

    EXEC dbo.get_products_by_model_local 120, 125;

    EXEC dbo.get_products_by_model_local 0, 10000;

    ```


    Here, you establish a baseline for what the optimizer believes to the best plan
    for the product search. For the first execution, which covers a small range of
    product models and therefore carries with it a small result set (only six rows),
    the performance is different from the original version of the stored proc. The
    new IO statistics and execution plans for both are found in Figure [8-20](#A371168_1_En_8_Chapter.html#Fig20),
    with the new on top, and the old one below:


    ![A371168_1_En_8_Fig20_HTML.jpg](A371168_1_En_8_Fig20_HTML.jpg)


    Figure 8-20.


    Performance of a query with a small result set when variables are declared and
    the stored proc parameters are reassigned locally


    ```

    Table ''Product''. Scan count 6, logical reads 24, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductModel''. Scan count 1, logical reads 2, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    Declaring local variables and using them in the query resulted in a different
    execution plan, as well as different IO statistics. Now let’s compare the new
    and old for the second scenario, where the result set is much larger. Figure [8-21](#A371168_1_En_8_Chapter.html#Fig21)
    shows these performance metrics.


    ![A371168_1_En_8_Fig21_HTML.jpg](A371168_1_En_8_Fig21_HTML.jpg)


    Figure 8-21.


    Performance metrics for a large result set when variables are declared and the
    stored proc parameters are reassigned locally


    ```

    Table ''Product''. Scan count 128, logical reads 849, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductModel''. Scan count 1, logical reads 2, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```'
