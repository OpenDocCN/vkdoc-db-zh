    在`PurchaseOrderHeader`上只有两次逻辑读取，比你之前看到的少了很多！这个改进后的执行计划如图[6-17](#A371168_1_En_6_Chapter.html#Fig17)所示。


    ![A371168_1_En_6_Fig17_HTML.jpg](A371168_1_En_6_Fig17_HTML.jpg)


