  raw: 'The guts of the logic employed above revolves around creating databases and
    tables dynamically based on the date and time provided by `Log_Time`. Once those
    objects are created, data is inserted into them and then deleted from the source
    table. You can review the data in a single table to verify that this script did
    exactly what you intended it to do, as shown in Figure [10-10](#A371168_1_En_10_Chapter.html#Fig10).


    ![A371168_1_En_10_Fig10_HTML.jpg](A371168_1_En_10_Fig10_HTML.jpg)


    Figure 10-10.


    Sample data from a weekly log table


    ```

    SELECT

    *

    FROM Database_Log_2011.dbo.Database_Log_2011_48

    ```


    All data within this new table is identical to how it appeared in the original
    `Database_Log` table, including the `Log_Id`. The only difference is the new database
    and table location of the data.


    Reorganizing data when the reference points change over time can be a complex
    task. Dynamic SQL allows data to be organized and moved, and new objects are created
    with relatively simple logic. In under 100 lines of TSQL, you were able to take
    all old data from a log table and move it to any number of new database objects
    that were created at runtime based on the age of that data.


    Every use-case for reorganizing, archiving, or moving data will be different,
    but this general technique can be extremely useful when you want to minimize the
    complexity and size of an important archiving process. Always consider how the
    archived data will be used prior to building a new process. Whether it is moved
    to separate databases, tables, or partitions, you now have the luxury of being
    able to index it uniquely based on its new purpose. By treating it as an archive
    repository and not transactional data, you gain the flexibility to optimize it
    based on its new purpose.


    Dynamic SQL can be used to manage additional indexes, constraints, keys, views,
    and stored procedures that all can allow the new data to be accessed efficiently
    and conveniently. Creating those objects would be as easy as adding to the command
    string in the same way as the primary keys were created.


    ## Customized Database Objects


    The ability to create highly flexible custom objects is not a simple task unless
    some sort of dynamic code or TSQL is implemented. Your needs in this area can
    be very specific, but generalized techniques can be used to get exactly what you
    want every time.


    ### The Problem


    Sometimes you’ll want to create objects with specific use-cases, but where the
    tables or columns involved may not always be the same. Generating a stored procedure,
    function, or view given those variables would normally be a manually intensive
    process. You can implement Dynamic SQL in order to create or modify existing objects
    in ways that are both scalable and reliable.


    Chapter [9](#A371168_1_En_9_Chapter.html) introduced using Dynamic SQL in order
    to `PIVOT` or `UNPIVOT` data when the column lists were not known until runtime.
    What if you wanted to summarize the table data output by those processes into
    a view, which would provide a convenient data source for an application to access?
    Once a view is created, you can consider additional options, such as schemabinding
    in order to improve schema integrity.


    Consider a scenario in which you want to provide insight into employee hire dates
    based on job titles. For a specific company, this is data that is requested so
    often that a request is made for a more permanent data structure based on it.
    There are a number of ways to approach this, including a custom table, view, or
    an ETL process to manage report data based on these needs. These processes could
    be managed via triggers, stored procedures, or a variety of other methods.


    ### The Solution


    For the scenario outlined previously, you’ll provide an example solution using
    a schemabound view, although other methods could be used if the report or data
    requirements were different. The following TSQL in Listing [10-10](#A371168_1_En_10_Chapter.html#Par66)
    will return the raw data that you are looking for.


    ```

    DECLARE @hire_date_years TABLE

    (hire_date_year NVARCHAR(50));

    INSERT INTO @hire_date_years

    (hire_date_year)

    SELECT DISTINCT

    DATEPART(YEAR, Employee.HireDate)

    FROM HumanResources.Employee;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    SELECT

    *

    FROM

    (       SELECT

    Employee.BusinessEntityID,

    Employee.JobTitle,

    DATEPART(YEAR, Employee.HireDate) AS HireDate_Year

    FROM HumanResources.Employee

    ) EMPLOYEE_DATA

    PIVOT

    (       COUNT(BusinessEntityID)

    FOR HireDate_Year IN ('';

    SELECT @sql_command = @sql_command + ''['' + hire_date_year + ''], ''

    FROM @hire_date_years;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + '' )) PIVOT_DATA'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    Listing 10-10.

    Dynamic PIVOT that Returns a Count of Hire Year by Job Title

    ```


    The output of this query returns a data set similar to that in Figure [10-11](#A371168_1_En_10_Chapter.html#Fig11).


    ![A371168_1_En_10_Fig11_HTML.jpg](A371168_1_En_10_Fig11_HTML.jpg)


    Figure 10-11.


    Hire data returned by the dynamic PIVOT query in Listing [10-10](#A371168_1_En_10_Chapter.html#Par66)


    Each job title is listed as the first column followed by a list of columns for
    each hire date year present in the `Employee` table. If employees are added or
    removed from the underlying table, columns may be added or removed from this data
    set as hire dates are added or removed.


    Now that you have a query that returns the results you want in the columnar format
    that you are looking for, you can move this data into a customized view. One technicality
    that you need to overcome is that when you create a schemabound view, you cannot
    include `*` in the column list. If you take the TSQL and add a `CREATE VIEW…WITH
    SCHEMABINDING` to the query, you will get the following error:


    ```

    Msg 1054, Level 15, State 6, Procedure v_job_title_year_summary, Line 6

    Syntax ''*'' is not allowed in schema-bound objects.

    Msg 102, Level 15, State 1, Procedure v_job_title_year_summary, Line 13

    Incorrect syntax near ''EMPLOYEE_DATA''.

    ```


    In order to make this syntax work, you need to make the column list dynamic, in
    addition to the `PIVOT` details. The TSQL in Listing [10-11](#A371168_1_En_10_Chapter.html#Par72)
    is the view creation script with that alteration included.


    ```

    IF EXISTS (SELECT * FROM sys.views WHERE views.name = ''v_job_title_year_summary'')

    BEGIN

    DROP VIEW v_job_title_year_summary

    END

    GO

    DECLARE @hire_date_years TABLE

    (hire_date_year NVARCHAR(50));

    INSERT INTO @hire_date_years

    (hire_date_year)

    SELECT DISTINCT

    DATEPART(YEAR, Employee.HireDate)

    FROM HumanResources.Employee;

    DECLARE @sql_command NVARCHAR(MAX);

    SELECT @sql_command = ''

    CREATE VIEW dbo.v_job_title_year_summary

    WITH SCHEMABINDING

    AS

    SELECT

    JobTitle,''

    SELECT @sql_command = @sql_command + ''

    ['' + hire_date_year + ''], ''

    FROM @hire_date_years;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + ''

    FROM

    (       SELECT

    Employee.BusinessEntityID,

    Employee.JobTitle,

    DATEPART(YEAR, Employee.HireDate) AS HireDate_Year

    FROM HumanResources.Employee

    ) EMPLOYEE_DATA

    PIVOT

    (       COUNT(BusinessEntityID)

    FOR HireDate_Year IN ('';

    SELECT @sql_command = @sql_command + ''['' + hire_date_year + ''], ''

    FROM @hire_date_years;

    SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);

    SELECT @sql_command = @sql_command + ''        )) PIVOT_DATA'';

    PRINT @sql_command;

    EXEC sp_executesql @sql_command;

    Listing 10-11.

    Dynamic SQL Used to Create a Customized View with a Variable Column List

    ```'
