    to the index will alter its structure to only include data pertaining to rows
    that match the filter. When you are interested in consistently querying a very
    small portion of a table, a filtered index can greatly improve performance. A
    smaller index:


    *   Is faster for SQL Server to read, which means it returns data faster with
    fewer logical reads

    *   Reduces the time it takes to perform index maintenance on it

    *   Requires less disk space to store


    The performance metrics returned by executing the stored procedure with the new
