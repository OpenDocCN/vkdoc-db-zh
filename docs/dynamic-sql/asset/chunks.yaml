  raw: '## Cleanup


    The following TSQL will clean up any objects created in this chapter, if they
    exist:


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_people'')

    BEGIN

    DROP PROCEDURE dbo.get_people;

    END

    GO

    IF EXISTS (SELECT * FROM sys.databases WHERE databases.name =

    ''temp_table_test'')

    BEGIN

    DROP DATABASE temp_table_test;

    END

    GO

    ```


    # 6. Performance Optimization


    No discussion of Dynamic SQL would be complete without diving into its performance.
    Dynamic SQL can greatly improve performance, but can also increase complexity
    if not used effectively. As was the case with security, optimization is a topic
    that could easily occupy significantly larger books than this one. As such, this
    chapter focuses on Dynamic SQL and any performance concerns that relate to it.


    ## Query Execution


    Before jumping into the performance of Dynamic SQL and a variety of ways to monitor
    and tune performance, it is necessary to quickly review the process of query execution.
    What happens when you execute a TSQL statement through the moment that the results
    are returned and it is complete? Query execution is typically broken into four
    steps, discussed in the following sections.


    ### Parsing


    A query is checked for syntax and if there are any unidentified or invalid TSQL
    commands, an error will be thrown. In addition, the query is broken into a list
    of very high-level steps that will be followed by SQL Server throughout the remainder
    of this process. These steps are simple operations, such as selecting data from
    a table, joining another table, or executing some Dynamic SQL or stored procedure.


    ### Binding


    This step is primarily concerned with validating objects and ensuring that they
    are valid and used in the correct context. Tables, columns, functions, stored
    procedures, and any other named objects are checked against SQL Server’s system
    catalogs to verify that the names are correct and that they are being used correctly.
    At this point, if no error has been received, then you know that syntax and object
    names are all correct. The list generated in the parsing step is used with this
    new information to generate what is known as an algebrized tree. This tree is
    a listing of steps that must be performed in order for the query to execute correctly.


    ### Optimization


    This is the most complex part of the execution process and involves SQL Server
    needing to take the tree from the binding step and find a good execution plan
    for it very, very quickly. This work proceeds similarly to the way a chess program
    attempts to find the best move in a game of chess. Basically, the query optimizer
    comes up with a possible execution plan and assigns a cost to it, then evaluates
    more execution plans until it decides that it has found a plan that is good enough.


    Query optimization is a race against time as the query itself will take time to
    process, but the optimization process also takes time. The optimizer needs to
    weigh this in order to not waste too much time optimizing a simple query, but
    also take enough time that it finds a plan that performs well. For example, if
    you had a query that took two seconds to execute, and the optimizer could spend
    one more second in order to save half a second during execution, then it would
    have wasted that time in doing so. If it could save 1.5 seconds using only 0.1
    seconds of effort, then it would be a great deal. In addition to time, server
    resources such as CPU are taken into account. This process happens very quickly
    and is one of the most complex components of SQL Server.


    The result of optimization is a list of detailed steps that SQL Server can execute
    in order to return the results desired in the original query.


    ### Execution


    The steps from the optimization process are executed and any required actions
    are taken in order to complete them.


    ### Optimization Tools


    In order to review performance and make intelligent decisions based on it, you
    need to define a set of tools that you will use going forward that will assist
    in this process. It is impossible to make consistently good decisions regarding
    performance without multiple metrics that you are comfortable using. If a query
    is slow, you need to know which part of it is the bottleneck and identify why
    this is the case.


    #### Query Execution Plan


    Query execution plans are the first and most visual of the tools available. Execution
    plans are the steps that the optimizer came up with during the optimization step
    and are executed by SQL Server.


    The actual execution plan from a query can be viewed in SQL Server by clicking
    on the Include Actual Execution Plan icon in SQL Server Management Studio or by
    using the keyboard shortcut Ctrl+M, as shown in Figure [6-1](#A371168_1_En_6_Chapter.html#Fig1).


    ![A371168_1_En_6_Fig1_HTML.jpg](A371168_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Turning on and using query execution plans in SQL Server Management Studio


    The icon to turn on the actual execution plan is circled in Figure [6-1](#A371168_1_En_6_Chapter.html#Fig1).
    When you click this icon, you’ll see an additional tab in the results window labeled
    Execution Plan. Included in this tab is a section for every query executed, including
    the query text. The graphical portion is read from right to left and is made of
    icons that represent operations performed by SQL Server, such as reading a table,
    joining data sets, sorting, and so on. If SQL Server thinks that a new index could
    help query performance, it will suggest it in green between the query text and
    the graphical plan. Hovering over an icon will produce details on the step, including
    rows processed, estimated IO, CPU, and subtree cost, as shown in Figure [6-2](#A371168_1_En_6_Chapter.html#Fig2).


    ![A371168_1_En_6_Fig2_HTML.jpg](A371168_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    Viewing detailed properties for any step within an execution plan


    Subtree cost is an indication of the cost determined during the optimization step
    and provides an idea of which parts of the query are most expensive to execute.


    The width of the lines in between steps will indicate the relative number of rows
    processed by that step. Hovering over one of these lines will provide some basic
    information about the data transfer represented by the line. Figure [6-3](#A371168_1_En_6_Chapter.html#Fig3)
    shows an example of these details.


    ![A371168_1_En_6_Fig3_HTML.jpg](A371168_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Viewing details of the output from one step of the execution plan


    Execution plans may also include warnings, errors, or other issues that SQL Server
    ran into while executing a query. When in doubt, take a closer look at any troublesome
    steps, which could reveal useful information about why a query is performing poorly.
    Hovering over any part of an execution plan will provide additional details on
    the step. Opening the properties for a step will return an additional array of
    information regarding how the step performed.'
