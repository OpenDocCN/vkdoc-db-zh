    \ 51 AND 75;\n```\n\n代码清单 6-8. 数据分页，在最外层 SELECT 中以子查询形式包含总结果数\n\n这第一个示例在最终的 `SELECT`\
    \ 中创建了一个子查询，该子查询返回公共表表达式中的总行数。在这种情况下，每次用户请求更多结果时，都会返回整个结果集并重新计算行数。此方法的性能如图 6-11\
    \ 所示。\n\n![A371168_1_En_6_Fig13_HTML.jpg](img/A371168_1_En_6_Fig13_HTML.jpg)\n\
