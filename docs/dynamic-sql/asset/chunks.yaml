    \ = 1\n        SELECT @sql_command = @sql_command + '\n            SizeUnitMeasureCode.Name\
    \ AS size_unit_measure_code,';\n\n    IF @show_product_weightunitmeasurecode =\
    \ 1\n        SELECT @sql_command = @sql_command + '\n            WeightUnitMeasureCode.Name\
    \ AS weight_unit_measure_code,';\n\n    IF @show_color = 1 OR @show_safetystocklevel\
    \ = 1 OR @show_reorderpoint = 1 OR @show_standard_cost = 1\n        SELECT @sql_command\
    \ = @sql_command + '\n            Product.Color AS product_color,\n          \
    \  Product.SafetyStockLevel AS product_safety_stock_level,\n            Product.ReorderPoint\
    \ AS product_reorderpoint,\n            Product.StandardCost AS product_standard_cost';\n\
    \n    -- 如果命令字符串的末尾有逗号，在继续之前将其移除：\n    IF (SELECT SUBSTRING(@sql_command, LEN(@sql_command),\
    \ 1)) = ','\n        SELECT @sql_command = LEFT(@sql_command, LEN(@sql_command)\
    \ - 1);\n\n    SELECT @sql_command = @sql_command + '\n        FROM Production.Product'\n\
    \n    -- 根据搜索所需的表来组合 JOIN。\n    IF (@product_model IS NOT NULL OR @show_product_model\
