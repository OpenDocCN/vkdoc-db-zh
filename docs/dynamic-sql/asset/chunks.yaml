- fmt: 'Using `sp_executesql` is not enough to ensure protection against SQL injection.
    All parameters must explicitly be passed into `sp_executesql` as shown in the
    last few examples. If parameters are concatenated directly to the command string
    without passing them into `sp_executesql`, those inputs will be subject to SQL
    injection attacks by exploiting apostrophes as previously demonstrated, and as
    you will see in further examples later in this chapter. Always verify that there
    is no opportunity for users to have their search text directly incorporated into
    a command string without the appropriate input sanitation first!


    ## Schema Name and Square Brackets


    This convention applies to writing standard SQL as well as Dynamic SQL. When querying
    against dynamically defined database schema, such as tables, views, columns, or
    stored procedures, you can’t parameterize the database objects. Without this protection,
    your TSQL is opened up to the potential for SQL injection attacks. Consider the
    TSQL search in Listing [2-14](#A371168_1_En_2_Chapter.html#Par89).


    ```sql

    DECLARE @table_name SYSNAME = ''ErrorLog'';

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM '' + @table_name;

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    ```


    Listing 2-14. Dynamic Table Search with No SQL Injection Protection


    When executed, this returns all rows in the table `ErrorLog`. As with the earlier
    examples, this search, which defines the table to be queried at runtime, can easily
    be targeted by SQL injection. The following sinister input for `@table_name` would
    result in the contents of `Person.Password` to be returned to the user, in addition
    to `ErrorLog`:


    ```sql

    ''ErrorLog; SELECT * FROM Person.Password WHERE '''''''' = '''''''''';

    ```


    An easy defense against this is to explicitly include the schema name, even if
    it is the default. In addition, include square brackets around all objects, which
    will further delimit the SQL statement and restrict the ability.


    ```sql

    DECLARE @table_name SYSNAME = ''ErrorLog; SELECT * FROM Person.Password WHERE
    '''''''' = '''''''''';

    DECLARE @CMD NVARCHAR(MAX);

    SELECT @CMD = ''SELECT * FROM [dbo].['' + @table_name + '']'';

    PRINT @CMD;

    EXEC sp_executesql @CMD;

    ```


    Listing 2-15. Dynamic Table Search with Added Schema and Brackets


    Executing this new version will result in the following command string:


    ```sql

    SELECT * FROM [dbo].[ErrorLog; SELECT * FROM Person.Password WHERE '''' = '''']

    ```


    Executing that TSQL results in an error at runtime:


    ```sql

    Msg 208, Level 16, State 1, Line 142

    Invalid object name ''dbo.ErrorLog; SELECT * FROM Person.Password WHERE '''' =
    ''''''.

    ```


    Adding the schema and delimiting brackets caused that simple SQL injection attempt
    to fail. Assuming that the error message is caught by an application, and a friendly
    error returned, then the users will not know for certain what happened. This,
    of course, isn’t foolproof, and very persistent hackers will continue entering
    attempts at command strings until they figure out the pattern and try this input:


    ```sql

    ''ErrorLog]; SELECT * FROM [Person].[Password''

    ```


    By closing the square brackets and then reopening them with their table name,
    they’ve defeated the attempts to secure this query. While you could take further
    measures to complicate the command string to thwart a potential hacker, there
    would still be a security risk involved.


    As stated earlier, any command string where all inputs are not parameterized using
    `sp_executesql` will be potentially vulnerable to SQL injection attacks. In general,
    avoid using database objects as Dynamic SQL parameters unless you are certain
    that there will be no external access to this system. Regardless of the audience,
    use `QUOTENAME` in order to properly delimit your parameters. While they cannot
    be passed in to `sp_executesql` directly, this will at least ensure that they
    cannot be exploited as shown previously.


    For internal procedures to be used exclusively by DBAs or developers, these sorts
    of Dynamic SQL statements are reasonable, although caution should still be exercised.
    As soon as any unknown parties have access, such as non-technical departments,
    end users, or the Internet as a whole, the level of risk increases immensely.
    Always consider your audience before making stored procedures available to outside
    parties in any form, and ensure there is no way for them to exploit your code.
    Even if those procedures are internal and deemed safe, it is still important to
    utilize every security precaution and TSQL best practice. Seemingly unlikely events,
    such as rogue users, disgruntled employees, or social engineering attempts, happen
    far too often to be considered irrelevant under any conditions.


    ## Effective Spacing


    The example in Listing [2-6](#A371168_1_En_2_Chapter.html#Par29) showed a scenario
    where an attacker used comments to remove the password check in a login script.
    The primary cause of this vulnerability was the lack of parameterization or input
    sanitation, but a secondary cause was that the entire `WHERE` clause was on a
    single line.


    I am unsure what possesses anyone to write Dynamic SQL mostly or all on a single
    line, but in addition to rendering it illegible, it also increases the ways in
    which SQL injection could be used to exploit a poorly written query. Writing Dynamic
    SQL with the same formatting and care that standard SQL is given will not only
    make it more maintainable, but will also remove a very simple SQL injection attack
    method from an attacker’s arsenal.


    ### Properly Type Inputs


    In addition to sanitizing inputs, it is important to always use the correct data
    type for inputs. SQL injection specifically targets string inputs, in which apostrophes
    and malicious SQL can be inserted. Non-text data types, such as `BIT`, `INT`,
    or `DATETIME`, cannot be the target of SQL injection.


    Some applications are written with all (or most) input parameters as strings,
    for convenience. When working with strings, there is no need to cast or convert
    them to strings when concatenating them with your Dynamic SQL command string.
    While this may reduce development time slightly, it increases the number of inputs
    in which SQL injection is theoretically possible.


    If any data type is being evaluated that is not inherently a string, ensure that
    it is stored as a non-string at least until it has been passed into your stored
    procedure. Once execution has passed these parameters into TSQL, they can then
    be cast as strings and used in Dynamic SQL with no risk of SQL injection. If desired,
    string variables can be declared within a stored procedure, and then populated
    with the converted types from above. Since the conversion is internal to SQL Server
    and has no connection to outside of the stored procedure, it too is safe from
    SQL injection.


    Always ensure that data is properly typed. Storing values as non-strings ensures
    that they cannot be the target of SQL injection.


    Similarly, ensure that applications always verify inputs to ensure that they match
    the expected type. An integer that is passed into a TSQL statement as a string
    may allow arithmetic to be embedded safely in the string. If malicious users realize
    that they can replace `"5"` with `"5 + 1"`, then they will immediately begin to
    probe other non-string inputs to determine if they are converted blindly to strings.
    A parameter should be typed correctly from the moment it is entered by a user
    until it is consumed be a stored procedure. This prevents any opportunities for
    manipulation, in addition to reducing complexity and the chance that developers
    may make mistakes as a result of confusing data types.'
