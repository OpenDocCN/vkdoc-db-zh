    DECLARE @ProductID INT = 713;

    SELECT

    SalesOrderDetail.SalesOrderDetailID,

    SalesOrderDetail.SalesOrderID,

    SalesOrderDetail.ProductID,

    SalesOrderHeader.OrderDate

    FROM Sales.SalesOrderDetail

    INNER JOIN Sales.SalesOrderHeader

    ON SalesOrderDetail.SalesOrderID = SalesOrderHeader.SalesOrderID

    WHERE ProductID = @ProductID

    OPTION (RECOMPILE);

    ```

    Listing 6-18.

    Using a `RECOMPILE` Hint to Force a New Execution Plan to Be Created and Used


    Running this query, you’ll find that nearly everything appears normal in the execution
    plan and IO statistics. Where you’ll find a seemingly minor, yet significant,
    difference is in the `STATISTICS TIME` results:


    ```

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 1 ms.

    ```


    Within the output, notice that no matter how many times you run the query, the
    parse and compile time is always non-zero. This is the price for forcing the execution
    plan to recompile. A millisecond may seem small, but for more complex queries
    with many tables and joins, the time can be much higher. Combine increased times
    with frequent execution and performance will be significantly impacted by the
    time and effort required to continuously create new execution plans.


    Query hints should be used sparingly, only when necessary, and when all alternatives
    have been exhausted. Change over time can render hints destructive to database
    performance, rather than helpful.


    You could easily review dozens of query hints, highlighting common usage, as well
    as potential pitfalls, but generally it is important to recognize that query hints
    are often ways to cheat your way past bigger problems. Very often, hints are used
    to cover up poorly designed tables, inefficiently written queries, bad indexing,
    or other mistakes that could be resolved to fix the performance problem.


    Don’t get me wrong, there are legitimate uses for query hints. However, it is
    important to view them as last resorts rather than tools that should be implemented
    frequently. Only implement them after extremely thorough testing and assurances
    that the likelihood of breaking changes is very low. A list of available query
    and table hints can be found on MSDN:


    ```

    https://msdn.microsoft.com/en-us/library/ms181714.aspx

    ```


    Note the warning provided near the top of the article:


    ```

    If one or more query hints cause the query optimizer not to generate a valid plan,
    error 8622 is raised.

    ```


    Some hints can remove the only valid transforms available from the query optimizer.
    If this happens, then a query can fail to execute, generate an error, and likely
    wake you up at an uncomfortably late hour. Knowledge of these options is important,
    but use caution when implementing them. Use hints when deemed necessary and safe
    and utilize all alternatives first. If a query can be rewritten, an index added,
    or a view altered, consider those and similar changes first before bossing around
    the query optimizer.


    ## Conclusion


    Performance optimization is a huge topic, and this sprint through many important
    topics only scratches the surface. There is no shortage of ways in which you can
    dig deeper into query tuning, indexing, statistics, or other ways to improve performance.


    Approach each problem with a plan in mind and research it thoroughly. SQL Server
    provides many tools that allow you to easily assess performance and resource consumption
    and find ways to get your most important queries to execute faster. Always test
    and confirm the expected results of any change and be certain that your predictions
    match the test results. While it can be humbling to have your performance hypothesis
    struck down by other metrics that you didn’t consider, this is still much better
    than releasing suboptimal changes into a production environment.


    The duration of this book will dig further into performance in many of its examples.
    This will allow you to apply what you have read thus far and learn a variety of
    ways in which to test some of these conclusions. Look forward to many more examples
    of execution plans, statistics, and query comparisons that will aid in your exploration
    of Dynamic SQL.


    ## CLEANUP


    The `TSQL` in Listing [6-19](#A371168_1_En_6_Chapter.html#Par261) will clean up
    any objects created in this chapter, if they exist.


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''search_products'')

    BEGIN

    DROP PROCEDURE dbo.search_products;

    END

    GO

    IF EXISTS (SELECT * FROM sys.indexes WHERE indexes.name = ''IX_PurchaseOrderHeader_status_INC'')

    BEGIN

    DROP INDEX IX_PurchaseOrderHeader_status_INC ON Purchasing.PurchaseOrderHeader

    END

    GO

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_in_process_purchasing_data'')

    BEGIN

    DROP PROCEDURE dbo.get_in_process_purchasing_data;

    END

    ```

    Listing 6-19.

    Script to Clean Up Any Objects Created in this Chapter


    # 7. Scalable Dynamic Lists


    Generating lists of data is a common task with a wide variety of use-cases. Perhaps
    you want to output data to an application or file with a specific formatting or
    syntax. Maybe the best format to read a list of data is in a single line, rather
    than a tabular format. Maybe you want to store data in a table using a particular
    string format that needs to be quickly built prior to storing it.


    While this is not an often-advertised feature of SQL Server, it is one that can
    be implemented in ways that perform quite well. Alternatively, it is very easy
    to concoct list generation in ways that are unbelievably inefficient. This chapter
    will serve as a discussion of many different ways in which lists can be generated.
    In addition to syntax, the chapter reviews performance and maintainability in
    order to ensure that there is no question as to which method is the best for the
    job.


    Performance tuning will be referenced frequently in this chapter. Refer to Chapter
    [6](#A371168_1_En_6_Chapter.html) for details on reading execution plans, reviewing
    IO statistics, and other considerations with regards to Dynamic SQL and query
    tuning and optimization.'
