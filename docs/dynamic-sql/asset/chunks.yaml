    \ SQL，以可扩展且可靠的方式创建或修改现有对象。\n\n第 9 章介绍了当列列表直到运行时才知道时，如何使用动态 SQL 来 `PIVOT`（旋转）或\
    \ `UNPIVOT`（逆旋转）数据。如果你希望将这些过程的表数据输出汇总到一个视图中，为应用程序提供一个方便的数据源，该怎么办呢？一旦创建了视图，你就可以考虑其他选项，例如使用架构绑定来提高架构完整性。\n\
