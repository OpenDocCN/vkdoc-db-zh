  trans: '# SQL 性能对比与分页优化


    ```

    Table ''UnitMeasure''. Scan count 1, logical reads 21, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''ProductSubcategory''. Scan count 0, logical reads 10, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''ProductModel''. Scan count 0, logical reads 10, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    Table ''Product''. Scan count 1, logical reads 14, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    性能上的主要区别在于，你必须访问 `UnitMeasure` 表两次才能收集产品的尺寸和重量度量数据。尽管对于已运行的搜索来说，这些列并非必需，但简化的 TSQL
    并不会区分你需要什么和不需要什么。它用设计的简单性换取了性能上的复杂性。


    结果是，同样的搜索需要额外进行 21 次读取，并且子树成本为 0.022。执行时间对比如何？在我本地服务器上进行的 20 次执行试验中，动态 SQL 方法平均耗时
    40ms。而那个“简化版”则耗时 50ms。这些性能下降可能看起来并不巨大，因为它们查询的是相对较小的表。如果 `UnitMeasure` 表更大，那么额外的工作量也会变得更加显著。此外，如果你不是需要查询
    4 个表，而是 100 个呢？如果用户可以选择的可能列数以千计呢？如果你经常被迫在不需要时也从 100 个表中读取数据，在生产服务器上结果将会非常明显。


    另外请记住，每次访问不同表的搜索都会导致一个独特的执行计划。在这种情况下，这种行为是可取的，因为当需要查询的对象较少时，你希望得到一个更小、更精简的执行。不过，对于不同的参数值不会创建额外的计划，只有在查询文本本身发生改变的情况下才会。这种情况会在添加连接、`WHERE`
    子句被赋予额外参数，或者列被添加到结果集时发生。


    当涉及非常大量的表、列、过滤器或其他变量时，最终的搜索需要足够智能，不去查询不需要的对象。实现这一点所需的逻辑可以在应用程序代码中执行，也可以在 SQL Server
    中执行，但必须以某种方式处理，以消除查询那些不需要对象所需的额外资源开销。动态 SQL 是在 SQL Server 中实现此目标的绝佳工具，尽管需要详尽的文档和干净的代码，以确保性能的提升不是以可维护性为代价换来的。


    ## 分页性能


    分页可能是一个开销很大的过程，尤其是在频繁使用时。交互式搜索通常需要额外的聚合数据，而这些数据可能不存在于行级别，例如：


    *   总行数

    *   当前行号

    *   列的总和、平均值、最小值或最大值

    *   页面大小

    *   相关或关联的结果


    将这些数据与结果集内联返回会引发许多问题，例如是单独计算聚合还是使用窗口函数计算。这是一个没有单一答案的领域。整体数据源的大小、分布和索引情况都很重要。此外，了解结果集的返回百分比也会影响决策过程。为了开始这项分析，让我们回顾几种不同的数据分页方式，并深入探讨每种方法的性能。


    清单 6-7 中的查询返回 25 条搜索结果，供用户分页浏览。


    ```sql

    WITH CTE_PRODUCTS AS (

    SELECT

    ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,

    SalesOrderHeader.SalesOrderID,

    SalesOrderHeader.Status,

    SalesOrderHeader.OrderDate,

    SalesOrderHeader.ShipDate,

    SalesOrderDetail.UnitPrice,

    SalesOrderDetail.LineTotal

    FROM Sales.SalesOrderHeader

    INNER JOIN Sales.SalesOrderDetail

    ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID

    WHERE SalesOrderHeader.SalesPersonID = 277

    )

    SELECT

    *

    FROM CTE_PRODUCTS

    WHERE rownum BETWEEN 51 AND 75

    ```


    **清单 6-7.** 使用基于订单日期的行号进行基本数据分页


    如图 6-10 所示，此查询的性能相对直接。


    ![A371168_1_En_6_Fig10_HTML.jpg](img/A371168_1_En_6_Fig10_HTML.jpg)


    **图 6-10.** 清单 6-7 中基本分页 TSQL 的执行计划


    ```

    Table ''SalesOrderDetail''. Scan count 9, logical reads 42, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    生成的执行计划由对 `SalesOrderDetail` 的查找和对 `SalesOrderHeader` 的扫描组成，因为你正在收集特定销售人员的订单数据。请注意，对
    `SalesOrderDetail` 的读取量相对较低。分页可以提高存储系统的读取性能，因为它最终一次返回的数据量远小于总量。


    这就引出了一个重要考量：你是立即返回所有数据，在用户点击“下一步”时使用，还是只返回 25 行，在用户请求更多时才返回？这个问题可以通过调整最外层 `SELECT`
    语句中返回的行数来解决。以下是分别返回第 51-200 行、第 51-500 行和第 51-1000 行时的 `STATISTICS` IO 输出：


    ```

    Table ''SalesOrderDetail''. Scan count 19, logical reads 79, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    ```

    Table ''SalesOrderDetail''. Scan count 41, logical reads 157, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```


    ```

    Table ''SalesOrderDetail''. Scan count 77, logical reads 277, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    Table ''SalesOrderHeader''. Scan count 1, logical reads 689, physical reads 0,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    ```'
- fmt: "These reads increase as you commit to returning more data from `SalesOrderDetail`.\
    \ In order to make a smart decision about performance, you must decide how many\
    \ times users will click Next on average. If they typically only view a page or\
    \ two and move on to other work, then returning a small data set each time is\
    \ optimal. If the users will eventually page through most or all the data set,\
    \ simply returning everything to a temporary table or to the application makes\
    \ more sense.\n\n## Data Paging with Total Result Count\n\nLet’s add some complexity\
    \ to this query. What if you want to include the total result count along with\
    \ the search results? There are many ways you could do this. Listing 6-8 shows\
    \ a few examples along with performance metrics and notes.\n\n```sql\nWITH CTE_PRODUCTS\
    \ AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,\n\
    \        SalesOrderHeader.SalesOrderID,\n        SalesOrderHeader.Status,\n  \
    \      SalesOrderHeader.OrderDate,\n        SalesOrderHeader.ShipDate,\n     \
    \   SalesOrderDetail.UnitPrice,\n        SalesOrderDetail.LineTotal\n    FROM\
    \ Sales.SalesOrderHeader\n    INNER JOIN Sales.SalesOrderDetail\n        ON SalesOrderHeader.SalesOrderID\
    \ = SalesOrderDetail.SalesOrderID\n    WHERE SalesOrderHeader.SalesPersonID =\
    \ 277\n)\nSELECT\n    *,\n    (SELECT COUNT(*) FROM CTE_PRODUCTS) AS total_result_count\n\
    FROM CTE_PRODUCTS\nWHERE rownum BETWEEN 51 AND 75;\n```\n\nListing 6-8. Data Paging,\
    \ Including Total Result Count as a Subquery in the Outermost SELECT\n\nThis first\
    \ example creates a subquery in the final `SELECT` that returns the total count\
    \ of rows in the common table expression. In this case, the entire result set\
    \ is returned and the row count is recalculated every time the user requests more\
    \ results. The performance for this method is shown in Figure 6-11.\n\n![A371168_1_En_6_Fig13_HTML.jpg](A371168_1_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13. Performance when determining row counts using a window function\n\
    \n![A371168_1_En_6_Fig12_HTML.jpg](A371168_1_En_6_Fig12_HTML.jpg)\n\nFigure 6-12.\
    \ Performance of the search when you cache the row count prior to execution\n\n\
    ![A371168_1_En_6_Fig11_HTML.jpg](A371168_1_En_6_Fig11_HTML.jpg)\n\nFigure 6-11.\
    \ Search query performance when the row count is returned with each execution\n\
    \n```\nTable 'SalesOrderDetail'. Scan count 10, logical reads 318, physical reads\
    \ 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
    \ reads 0.\nTable 'SalesOrderHeader'. Scan count 2, logical reads 692, physical\
    \ reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob\
    \ read-ahead reads 0.\nTable 'Workfile'. Scan count 0, logical reads 0, physical\
    \ reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob\
    \ read-ahead reads 0.\nTable 'Worktable'. Scan count 0, logical reads 0, physical\
    \ reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob\
    \ read-ahead reads 0.\n```\n\nIn order to calculate the count, additional access\
    \ to each table was required, and now the query must scan each table once and\
