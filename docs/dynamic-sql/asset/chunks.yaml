    ## Conclusion


    All of this security advice may seem distant to the topic of Dynamic SQL, but
    it’s important in ensuring that the development you do is both effective and secure.
    Taking any or all of these best practices and suggestions and implementing them
    greatly reduces the risk of SQL injection, as well as other exploits that could
    inadvertently create vulnerabilities in your system. If this topic interests you,
    there are many books and courses out there that will dive into security in much
    greater detail. This chapter is intended to provide an introduction and overview
    of SQL Server security, with a focus on Dynamic SQL and the greatest security
    threats to it.


    As you charge forward with further examples of how Dynamic SQL can perform powerful
    searches, maintenance, or data transformations, keep in mind how security related
    considerations can have lasting repercussions for the integrity of not only your
    queries, but your SQL Server as a whole. It is far easier to make the correct
    decisions now than to return at a later date and clean up the mistakes of previous
    development efforts.


    ## Listing 4-11.


    ```sql

    FROM sys.tables

    INNER JOIN sys.schemas

    ON tables.schema_id = schemas.schema_id'';

    EXEC sp_executesql @sql_command;

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command + ''

    UPDATE ##tables

    SET row_count = (SELECT COUNT(*)

    FROM ['' + database_name + ''].['' + schema_name + ''].['' + table_name + ''])

    WHERE database_name = '''''' + database_name + ''''''

    AND schema_name = '''''' + schema_name + ''''''

    AND table_name = '''''' + table_name + '''''';''

    FROM ##tables

    WHERE database_name = @current_database;

    SELECT (LEN(@sql_command) * 16) + 2 AS length_of_large_sql_command

    EXEC sp_executesql @sql_command;

    DELETE FROM @databases WHERE database_name = @current_database;

    END

    SELECT

    *

    FROM ##tables;

    DROP TABLE ##tables;

    ```


    Dynamic SQL to Gather Row Counts of All Tables on this SQL Server Instance Using
    Batched Command String Creation


    The only difference in the rewrite of the row count TSQL is that the collection
    of row counts happens in the main loop, after each database’s tables are enumerated.
    This breaks up the command string generation into one per database. Instead of
    creating a 3MB command string, it creates and executes six different ones, none
    of which are more than 475KB. In a scenario where the length of a command string
    could become very long due to a large number of objects being analyzed, batching
    can ensure that memory pressure never becomes a security or stability concern,
    even when executed on extremely large data sets.


    ## What Is Scope?


    To make understanding scope as easy as possible, you need to understand the terms
    and will also look at a few examples of why this is an important topic. Scope
    can be defined as where and how long a variable or object is available for within
    any SQL Server object. Consider the following simple TSQL statement:


    ```sql

    DECLARE @FirstName NVARCHAR(50) = ''Edward'';

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @FirstName;

    ```


    This is about as simple as TSQL gets, but what is the scope of the variable defined
    above? Without any interruptions or changes in control within these statements,
    `@FirstName` is in scope throughout the example and can be used (as you expect
    it could be) by the `SELECT` statement immediately after it. What happens if you
    end the batch prior to returning the results?


    ```sql

    DECLARE @FirstName NVARCHAR(50) = ''Edward'';

    GO

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @FirstName;

    ```


    This simple change, adding a `GO` before the `SELECT`, will result in an error:


    ```

    Msg 137, Level 15, State 2, Line 20

    Must declare the scalar variable "@FirstName".

    ```


    When the batch ends, all locally defined variables are no longer available and
    in scope for the remainder of this TSQL. `GO`, by definition, will end a batch
    and trigger this behavior whenever used. Any TSQL that is encapsulated in its
    own object—such as a trigger, function, or stored procedure—will also execute
    within their own scope. Any attempt to access variables defined within these objects
    from outside of them will result in errors similar to this:


    ```sql

    CREATE PROCEDURE dbo.get_people

    AS

    BEGIN

    DECLARE @FirstName NVARCHAR(50) = ''Edward'';

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @FirstName;

    END

    GO

    EXEC dbo.get_people;

    SELECT @FirstName;

    ```


    This stored procedure will perform the same search as the previous one. Executing
    it as shown yields the exact same results, but if you try to return the value
    of `@FirstName`, the same error is returned. By default, variables declared within
    a stored procedure are not available from anywhere outside of it. The same convention
    also applies to Dynamic SQL. It’s therefore important to understand this when
    determining where variables are to be declared, modified, and returned.


    Parameters can be added to stored procedures in order to facilitate the easy movement
    of data in and out of them so that their values can remain in scope and be used
    elsewhere in your work. The example in Listing 5-1 shows how variables can be
    passed into a stored procedure, and how values can be explicitly returned as well.


    ## Listing 5-1.


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_people'')

    BEGIN

    DROP PROCEDURE dbo.get_people;

    END

    GO

    CREATE PROCEDURE dbo.get_people

    @first_name NVARCHAR(50), @person_with_most_entries NVARCHAR(50) OUTPUT

    AS

    BEGIN

    DECLARE @person_count INT;

    SELECT TOP 1

    @person_with_most_entries = Person.FirstName

    FROM Person.Person

    GROUP BY Person.FirstName

    ORDER BY COUNT(*) DESC;

    SELECT

    *

    FROM Person.Person

    WHERE FirstName = @first_name;

    RETURN @@ROWCOUNT;

    END

    GO

    ```


    Stored Procedure Illustrating Input and Output Parameters


    This example passes in a first name that will be used in the search. You also
    pass in an additional string that will be overwritten with the most common first
    name in `Person.Person`. Within the stored procedure, all rows in `Person.Person`
    will be returned that have the first name passed in. Lastly, the count of rows
    with that first name will be used as the return value from the stored proc. An
    example execution would look like this:


    ```sql

    DECLARE @person_with_most_entries NVARCHAR(50);

    DECLARE @person_count INT;

    EXEC @person_count = dbo.get_people ''Edward'', @person_with_most_entries OUTPUT;

    SELECT @person_with_most_entries AS person_with_most_entries;

    SELECT @person_count AS person_count

    ```'
