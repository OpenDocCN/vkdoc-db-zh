- fmt: '## 备份维护脚本：将命令字符串输出到文件


    下面的存储过程展示了另一种思路：不直接执行备份，而是将生成的命令字符串输出到文件。由于 BCP 工具默认会覆盖目标文件，因此每个新命令字符串都需要先插入到一个中间文件
    `TempOutput.sql` 中，然后再追加到最终文件 `QueryOutput.sql`。文件路径和服务器名称都已参数化，这使得此存储过程更加通用。让我们运行一些前面的例子：


    ```sql

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''13:55:00'',
    @full_backup_day = 3, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''13:55:00'',
    @full_backup_day = 1, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''10:00:00'',
    @full_backup_day = 1, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    ```


    运行后，并不执行实际的备份操作。命令字符串会被发送到指定的文本文件。以下是 `QueryOutput.sql` 文件的内容：


    ```sql

    BACKUP DATABASE [AdventureWorks2012] TO DISK = ''e:\SQLBackups\AdventureWorks2012_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorksDW2012] TO DISK = ''e:\SQLBackups\AdventureWorksDW2012_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorksDW2014] TO DISK = ''e:\SQLBackups\AdventureWorksDW2014_12062015140236.dif''
    WITH DIFFERENTIAL;

    BACKUP DATABASE [AdventureWorks2012] TO DISK = ''e:\SQLBackups\AdventureWorks2012_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorksDW2012] TO DISK = ''e:\SQLBackups\AdventureWorksDW2012_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorksDW2014] TO DISK = ''e:\SQLBackups\AdventureWorksDW2014_12062015140236.bak'';

    BACKUP LOG [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.trn''

    ```


    输出文件缺少空格和换行，这是因为 BCP 最适合处理单行的 T-SQL 查询。如果想改善格式，可以轻松地在 BCP 命令中插入中间步骤，以便在文件中添加换行符。无论如何，输出在功能上是正确的，将按要求执行备份到指定的输出文件夹。


    请注意存储过程中对 `xp_cmdshell` 的使用。当需要从 SQL Server 内部运行文件操作或操作系统命令时，通常会使用此功能。通常，这只在受限制或私有环境中使用，因为它在公共服务器上启用时可能构成安全威胁。在实施前请仔细考虑您的用例，如果您的服务器处于公共环境中，请改用
    SSIS、PowerShell 或其他工具。


    默认情况下，`xp_cmdshell` 是禁用的，但你可以使用以下 T-SQL 启用它：


    ```sql

    EXEC sp_configure ''show advanced options'', 1

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''xp_cmdshell'', 1

    GO

    RECONFIGURE

    GO

    ```


    关于 `xp_cmdshell` 的利弊，更多信息请参阅第 2 章（涵盖 SQL 注入）和第 4 章（涵盖安全性）。或者，可以使用 PowerShell 来控制操作系统操作，以避免使用它。'
  raw: '```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''backup_plan_output'')

    BEGIN

    DROP PROCEDURE dbo.backup_plan_output;

    END

    GO

    CREATE PROCEDURE dbo.backup_plan_output

    @differential_and_full_backup_time TIME = ''00:00:00'', -- Default to midnight

    @full_backup_day TINYINT = 1, -- Default to Sunday

    @backup_location NVARCHAR(MAX) = ''E:\SQLBackups\'', -- Default to my backup folder

    @sql_data_location NVARCHAR(MAX) = ''E:\SQLData\'', -- Default to my SQL data
    file folder

    @sql_server_name NVARCHAR(MAX) = ''SSANDILE\EDSQLSERVER14'', -- Server name to
    operate on

    @print_output_to_file_only BIT = 1

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @current_time TIME = CAST(CURRENT_TIMESTAMP AS TIME);

    DECLARE @current_day TINYINT = DATEPART(DW, CURRENT_TIMESTAMP);

    DECLARE @datetime_string NVARCHAR(MAX) = FORMAT(CURRENT_TIMESTAMP , ''MMddyyyyHHmmss'');

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    DECLARE @bcp_command VARCHAR(4000);

    DECLARE @database_list TABLE

    (database_name NVARCHAR(MAX) NOT NULL, recovery_model_desc NVARCHAR(MAX));

    INSERT INTO @database_list

    (database_name, recovery_model_desc)

    SELECT

    name,

    recovery_model_desc

    FROM sys.databases

    WHERE databases.name NOT IN (''msdb'', ''master'', ''TempDB'', ''model'');

    -- Check if a full backup is to be taken now.

    IF (@current_day = @full_backup_day) AND (@current_time BETWEEN @differential_and_full_backup_time
    AND DATEADD(MINUTE, 10, @differential_and_full_backup_time))

    BEGIN

    SELECT @sql_command = @sql_command +

    ''BACKUP DATABASE ['' + database_name + ''] TO DISK = '''''''''' + @backup_location
    + database_name + ''_'' + @datetime_string + ''.bak'''''''';''

    FROM @database_list;

    IF @print_output_to_file_only = 1

    BEGIN

    SELECT @bcp_command =

    ''bcp "SELECT '''''' + @sql_command + ''''''" queryout '' + @sql_data_location
    + ''TempOutput.sql -c -T -S'' + @sql_server_name + '' -dAdventureWorks2014'';

    EXEC xp_cmdshell @bcp_command;

    SELECT @bcp_command = ''type "'' + @sql_data_location + ''TempOutput.sql" >> "''
    + @sql_data_location + ''QueryOutput.sql"'';

    EXEC xp_cmdshell @bcp_command;

    END

    ELSE

    EXEC sp_executesql @sql_command;

    END

    ELSE -- Check if a differential backup is to be taken now.

    IF (@current_day  @full_backup_day) AND (@current_time BETWEEN @differential_and_full_backup_time
    AND DATEADD(MINUTE, 10, @differential_and_full_backup_time))

    BEGIN

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command +

    ''BACKUP DATABASE ['' + database_name + ''] TO DISK = '''''''''' + @backup_location
    + database_name + ''_'' + @datetime_string + ''.dif'''''''' WITH DIFFERENTIAL;''

    FROM @database_list;

    IF @print_output_to_file_only = 1

    BEGIN

    SELECT @bcp_command =

    ''bcp "SELECT '''''' + @sql_command + ''''''" queryout '' + @sql_data_location
    + ''TempOutput.sql -c -T -S'' + @sql_server_name + '' -dAdventureWorks2014'';

    EXEC xp_cmdshell @bcp_command;

    SELECT @bcp_command = ''type "'' + @sql_data_location + ''TempOutput.sql" >> "''
    + @sql_data_location + ''QueryOutput.sql"'';

    EXEC xp_cmdshell @bcp_command;

    END

    ELSE

    EXEC sp_executesql @sql_command;

    END

    ELSE -- If neither full or differential, then take a transaction log backup

    BEGIN

    SELECT @sql_command = '''';

    SELECT @sql_command = @sql_command +

    ''BACKUP LOG ['' + database_name + ''] TO DISK = '''''''''' + @backup_location
    + database_name + ''_'' + @datetime_string + ''.trn''''''''''

    FROM @database_list

    WHERE recovery_model_desc = ''FULL'';

    IF @print_output_to_file_only = 1

    BEGIN

    SELECT @bcp_command =

    ''bcp "SELECT '''''' + @sql_command + ''''''" queryout '' + @sql_data_location
    + ''TempOutput.sql -c -T -S'' + @sql_server_name + '' -dAdventureWorks2014'';

    EXEC xp_cmdshell @bcp_command;

    SELECT @bcp_command = ''type "'' + @sql_data_location + ''TempOutput.sql" >> "''
    + @sql_data_location + ''\QueryOutput.sql"'';

    EXEC xp_cmdshell @bcp_command;

    END

    ELSE

    EXEC sp_executesql @sql_command;

    END

    END

    GO

    Listing 11-6.

    Backup Maintenance Script that Outputs the Command String to a File

    ```


    Instead of printing the command string, this script outputs it to a file. Note
    that since BCP will by default overwrite the destination file, you must insert
    each new command string to an intermediary file, `TempOutput.sql`, prior to appending
    the output to its final destination, `QueryOutput.sql`. File paths and the server
    name have been parameterized in order to make this proc more versatile. Let’s
    run some examples from earlier:


    ```

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''13:55:00'',
    @full_backup_day = 3, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''13:55:00'',
    @full_backup_day = 1, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''10:00:00'',
    @full_backup_day = 1, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    ```


    When run, no backups are taken. Instead, the command strings are sent to the indicated
    text files. The following are the contents of `QueryOutput.sql`:


    ```

    BACKUP DATABASE [AdventureWorks2012] TO DISK = ''e:\SQLBackups\AdventureWorks2012_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorksDW2012] TO DISK = ''e:\SQLBackups\AdventureWorksDW2012_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorksDW2014] TO DISK = ''e:\SQLBackups\AdventureWorksDW2014_12062015140236.dif''
    WITH DIFFERENTIAL;

    BACKUP DATABASE [AdventureWorks2012] TO DISK = ''e:\SQLBackups\AdventureWorks2012_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorksDW2012] TO DISK = ''e:\SQLBackups\AdventureWorksDW2012_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorksDW2014] TO DISK = ''e:\SQLBackups\AdventureWorksDW2014_12062015140236.bak'';

    BACKUP LOG [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.trn''

    ```


    The output file lacks spacing, as BCP works best with single-line TSQL queries.
    If you wanted to improve the spacing, you could easily add intermediary steps
    into the BCP commands in order to insert newlines into the file. Regardless, the
    output is functionally correct and will perform the requested backups to the specified
    output folder.


    Note the use of `xp_cmdshell` in the stored procedure. This is typically used
    when it is necessary to run file operations or OS commands from within SQL Server.
    Typically, this is only used in restricted or private environments, as it can
    be a security threat when allowed on a public server. Consider your use-case carefully
    before implementing it, and if your server is in a public environment, use SSIS,
    PowerShell, or another tool instead.


    By default, `xp_cmdshell` is disabled, but you can enable it with the TSQL in
    Listing [11-7](#A371168_1_En_11_Chapter.html#Par84).


    ```

    EXEC sp_configure ''show advanced options'', 1

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''xp_cmdshell'', 1

    GO

    RECONFIGURE

    GO

    Listing 11-7.

    Enabling xp_cmdshell

    ```


    For more information on the pros and cons of `xp_cmdshell`, see Chapters [2](#A371168_1_En_2_Chapter.html)
    and [4](#A371168_1_En_4_Chapter.html), which cover SQL Injection and security,
    respectively. Alternatively, PowerShell can be used to control OS operations in
    order to avoid its use.'
  trans: '## 备份维护脚本：将命令字符串输出到文件


    下面的存储过程展示了另一种思路：不直接执行备份，而是将生成的命令字符串输出到文件。由于 BCP 工具默认会覆盖目标文件，因此每个新命令字符串都需要先插入到一个中间文件
    `TempOutput.sql` 中，然后再追加到最终文件 `QueryOutput.sql`。文件路径和服务器名称都已参数化，这使得此存储过程更加通用。让我们运行一些前面的例子：


    ```sql

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''13:55:00'',
    @full_backup_day = 3, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''13:55:00'',
    @full_backup_day = 1, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    EXEC dbo.backup_plan_output @differential_and_full_backup_time = ''10:00:00'',
    @full_backup_day = 1, @backup_location = ''E:\SQLBackups\'',

    @sql_data_location = ''E:\SQLData\'', @sql_server_name = ''SSANDILE\EDSQLSERVER14'',
    @print_output_to_file_only = 1;

    ```


    运行后，并不执行实际的备份操作。命令字符串会被发送到指定的文本文件。以下是 `QueryOutput.sql` 文件的内容：


    ```sql

    BACKUP DATABASE [AdventureWorks2012] TO DISK = ''e:\SQLBackups\AdventureWorks2012_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorksDW2012] TO DISK = ''e:\SQLBackups\AdventureWorksDW2012_12062015140236.dif''
    WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorksDW2014] TO DISK = ''e:\SQLBackups\AdventureWorksDW2014_12062015140236.dif''
    WITH DIFFERENTIAL;

    BACKUP DATABASE [AdventureWorks2012] TO DISK = ''e:\SQLBackups\AdventureWorks2012_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorksDW2012] TO DISK = ''e:\SQLBackups\AdventureWorksDW2012_12062015140236.bak'';BACKUP
    DATABASE [AdventureWorksDW2014] TO DISK = ''e:\SQLBackups\AdventureWorksDW2014_12062015140236.bak'';

    BACKUP LOG [AdventureWorks2014] TO DISK = ''e:\SQLBackups\AdventureWorks2014_12062015140236.trn''

    ```


    输出文件缺少空格和换行，这是因为 BCP 最适合处理单行的 T-SQL 查询。如果想改善格式，可以轻松地在 BCP 命令中插入中间步骤，以便在文件中添加换行符。无论如何，输出在功能上是正确的，将按要求执行备份到指定的输出文件夹。


    请注意存储过程中对 `xp_cmdshell` 的使用。当需要从 SQL Server 内部运行文件操作或操作系统命令时，通常会使用此功能。通常，这只在受限制或私有环境中使用，因为它在公共服务器上启用时可能构成安全威胁。在实施前请仔细考虑您的用例，如果您的服务器处于公共环境中，请改用
    SSIS、PowerShell 或其他工具。


    默认情况下，`xp_cmdshell` 是禁用的，但你可以使用以下 T-SQL 启用它：


    ```sql

    EXEC sp_configure ''show advanced options'', 1

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''xp_cmdshell'', 1

    GO

    RECONFIGURE

    GO

    ```


    关于 `xp_cmdshell` 的利弊，更多信息请参阅第 2 章（涵盖 SQL 注入）和第 4 章（涵盖安全性）。或者，可以使用 PowerShell 来控制操作系统操作，以避免使用它。'
- fmt: '# 在其他服务器上执行TSQL


    在管理多台服务器时，经常会遇到需要从当前服务器执行TSQL以远程运行到另一台SQL Server上的情况。虽然这些TSQL语句不是用动态SQL执行的，但其语句的创建和执行过程非常相似，值得进行一个简短的演示。


    考虑这样一个场景：你有一个中心报告服务器，并希望从本地服务器以及其他现场服务器中提取数据。你可能需要遍历每个服务器，从每个服务器提取数据并将其返回到本地的目标数据存储。首先，让我们为下一个示例创建一个简单的日志表：


    ```sql

    CREATE TABLE dbo.recent_product_counts

    (       count_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_recent_product_counts
    PRIMARY KEY CLUSTERED,

    product_count INT NOT NULL,

    server_name NVARCHAR(128),

    sample_time DATETIME NOT NULL CONSTRAINT DF_recent_product_counts DEFAULT (CURRENT_TIMESTAMP));

    ```


    有了存储结果的地方后，你将创建一个存储过程来说明如何使用 `OPENQUERY` 从远程服务器返回特定的行数，并将结果存储在此表中。这可以在清单 [11-8](#A371168_1_En_11_Chapter.html#Par90)
    中看到。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_product_count_all_servers'')

    BEGIN

    DROP PROCEDURE dbo.get_product_count_all_servers;

    END

    GO

    CREATE PROCEDURE dbo.get_product_count_all_servers

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    SELECT

    name AS server_name

    INTO #servers

    FROM sys.servers;

    SELECT @sql_command = @sql_command + ''

    INSERT INTO AdventureWorks2014.dbo.recent_product_counts

    (product_count, server_name)

    SELECT

    product_count,

    '''''' + server_name + ''''''

    FROM OPENQUERY(['' + server_name + ''], ''''SELECT COUNT(*) AS product_count FROM
    AdventureWorks2014.Production.Product WHERE ModifiedDate >= ''''''''2/8/2014'''''''''''');''

    FROM #servers

    WHERE server_name  @@SERVERNAME;

    SELECT @sql_command = @sql_command + ''

    INSERT INTO AdventureWorks2014.dbo.recent_product_counts

    (product_count, server_name)

    SELECT

    COUNT(*),

    @@SERVERNAME

    FROM AdventureWorks2014.Production.Product WHERE ModifiedDate >= ''''2/8/2014'''''';

    EXEC sp_executesql @sql_command;

    DROP TABLE #servers;

    END

    ```

    清单 11-8.

    使用动态SQL和OPENQUERY从远程服务器检索数据


    此存储过程分为两个部分：第一部分将生成TSQL来访问 `sys.servers` 中所有不是本地服务器的服务器。第二部分仅管理本地服务器，因为访问它不需要
    `OPENQUERY` 语法。运行此查询两次后，`recent_product_counts` 的内容如图 [11-8](#A371168_1_En_11_Chapter.html#Fig8)
    所示。


    ![A371168_1_En_11_Fig8_HTML.jpg](A371168_1_En_11_Fig8_HTML.jpg)


    图 11-8.

    使用清单 [11-8](#A371168_1_En_11_Chapter.html#Par90) 中的存储过程从多个服务器收集的产品计数


    在我的计算机案例中，只有另一台服务器可供查询，但如果有更多，每一台都会包含在结果集中。存储过程中使用的 `ModifiedDate` 通常是基于当前日期和时间的当前日、周或月，但由于
    `AdventureWorks` 中的数据是静态的，你需要往回看更久一点才能收集到有意义的计数。


    也没有必要查询 `sys.servers` 中的所有SQL Server。可以创建一个自定义列表，或者创建并访问一个服务器表来管理任意数量的本地或远程服务器。还要注意命令字符串文本中大量使用了撇号。由于
    `OPENQUERY` 要求一个用撇号分隔的字符串，`sp_executesql` 也是如此，因此你需要将使用的撇号数量加倍。这确保在最终查询传递给每个SQL
    Server执行时，字符串分隔符的数量是正确的。


    在以这种方式嵌套字符串时，经常进行调试以确保撇号数量正确。在执行前打印命令字符串有助于确保输出符合预期。如有疑问，请从头开始，一次构建一级语句，直到完成。在此示例中，由于整个TSQL语句嵌套在另一个字符串中，撇号的数量加倍了，但动态SQL的不同应用可能会导致略有不同的结果。


    仔细编写这类动态SQL所获得的回报将超过嵌套字符串的复杂性。在寻找此类数据访问需求的简单解决方案时，能够高效地从其他服务器检索重要数据，而无需使用循环、维护计划或SSIS包，可能是有益的。


    ## 结论


    本章介绍了多种应用，它们运用了本书中介绍的许多技术。其中许多脚本都非常开放，在构建和实现时允许进行大量定制。列表生成允许在构建命令字符串时避免使用游标和循环，从而使执行非常高效。


    随着时间的推移，会出现无数其他任务，动态SQL或其许多相关主题对于解决这些任务将具有不可估量的价值。即使你不是在开发新应用程序，了解这些工具也能让你在审查他人工作或排查性能或应用程序问题时保持警惕。


    要有创造力并愿意编写新东西，即使只有很少的内容可以让你开始。许多伟大的工具都是由于“为什么还没有人做这个呢？！”这个问题而构建的。本书提供了一个起点，但随着SQL
    Server和其他数据库工具新版本的发布，以及软件应用程序复杂性随时间的增加，新颖解决方案的机会也在增加。


    即使你认为一个想法是死胡同，也要探索它，特别是如果别人声称它是死胡同的话。我敢打赌，我想出的“绝妙解决方案”中，超过一半最终毫无用处。剩下的那些让我在整个职业生涯中对数据库开发和优化保持乐观。'
  raw: '## Executing TSQL on Other Servers


    When managing multiple servers, there often are times when you’ll need to execute
    TSQL from the current server that will run remotely on another SQL Server. While
    these TSQL statements are not being executed with Dynamic SQL , the statement
    creation and execution is very similar and worth a short demonstration.


    Consider a scenario in which you have a centralized reporting server and want
    to pull data from the local server, in addition to others that you have onsite.
    You would want to loop through each server, pulling data from each and returning
    it to the target data store locally. First, let’s create a simple log table for
    the next example:


    ```

    CREATE TABLE dbo.recent_product_counts

    (       count_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_recent_product_counts
    PRIMARY KEY CLUSTERED,

    product_count INT NOT NULL,

    server_name NVARCHAR(128),

    sample_time DATETIME NOT NULL CONSTRAINT DF_recent_product_counts DEFAULT (CURRENT_TIMESTAMP));

    ```


    With a place to store the results, you’ll create a stored procedure that illustrates
    using `OPENQUERY` in order to return a specific row count from a remote server
    and store the results in this table. This can be seen in Listing [11-8](#A371168_1_En_11_Chapter.html#Par90).


    ```

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_product_count_all_servers'')

    BEGIN

    DROP PROCEDURE dbo.get_product_count_all_servers;

    END

    GO

    CREATE PROCEDURE dbo.get_product_count_all_servers

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    SELECT

    name AS server_name

    INTO #servers

    FROM sys.servers;

    SELECT @sql_command = @sql_command + ''

    INSERT INTO AdventureWorks2014.dbo.recent_product_counts

    (product_count, server_name)

    SELECT

    product_count,

    '''''' + server_name + ''''''

    FROM OPENQUERY(['' + server_name + ''], ''''SELECT COUNT(*) AS product_count FROM
    AdventureWorks2014.Production.Product WHERE ModifiedDate >= ''''''''2/8/2014'''''''''''');''

    FROM #servers

    WHERE server_name  @@SERVERNAME;

    SELECT @sql_command = @sql_command + ''

    INSERT INTO AdventureWorks2014.dbo.recent_product_counts

    (product_count, server_name)

    SELECT

    COUNT(*),

    @@SERVERNAME

    FROM AdventureWorks2014.Production.Product WHERE ModifiedDate >= ''''2/8/2014'''''';

    EXEC sp_executesql @sql_command;

    DROP TABLE #servers;

    END

    Listing 11-8.

    Using Dynamic SQL and OPENQUERY to Retrieve Data from Remote Servers

    ```


    There are two sections in this stored procedure: The first will generate TSQL
    to access all servers in `sys.servers` that are not the local server. The second
    manages the local server only, as the syntax to access it does not require `OPENQUERY`.
    After running this query twice, the contents of `recent_product_counts` are shown
    in Figure [11-8](#A371168_1_En_11_Chapter.html#Fig8).


    ![A371168_1_En_11_Fig8_HTML.jpg](A371168_1_En_11_Fig8_HTML.jpg)


    Figure 11-8.


    Product counts collected from multiple servers, using the proc in Listing [11-8](#A371168_1_En_11_Chapter.html#Par90)


    In the case of my computer, there is only one other server available to query,
    but if there were more, each would be included in the result set. The `ModifiedDate`
    used in the stored procedure would typically be a current day, week, or month
    of interest based on the current date and time, but since the data in `AdventureWorks`
    is static, you need to look back a bit further in order to collect meaningful
    counts.


    It is not necessary to query for all SQL Servers in `sys.servers` either. A custom
    list could be created, or a server table could be created and accessed in order
    to manage any number of local or remove servers. Also note the use of many apostrophes
    in the command string text. Since `OPENQUERY` requires an apostrophe-delimited
    string, as does `sp_executesql`, you need to double the number of apostrophes
    used. This ensures that you maintain the correct number of string delimiters when
    the final queries are passed to each SQL Server for execution.


    Debug often when nesting strings in a manner like this to ensure that you get
    the apostrophe count correct. Printing the command string prior to execution will
    help to ensure that the output is as expected. When in doubt, start from scratch
    and build the statement up one level at a time, until it is complete. In this
    example, the number of apostrophes is doubled as the entire TSQL statement is
    nested in another string, but different applications of Dynamic SQL may result
    in slightly different results.


    The rewards for writing this sort of Dynamic SQL carefully will outweigh any of
    the complexities of nesting strings within each other. Being able to efficiently
    retrieve important data from other servers without loops, maintenance plans, or
    SSIS packages can be beneficial when looking for a simple solution to a data access
    need such as this.


    ## Conclusion


    This chapter presented a variety of applications that used many of the techniques
    presented in this book. Many of these scripts were very open-ended, allowing for
    a great deal of customization as they are built and implemented. List generation
    allowed for the avoidance of cursors and loops when building command strings,
    making execution very efficient.


    There are countless other tasks that will present themselves over time in which
    Dynamic SQL or many of its related topics will be invaluable for solving. Even
    when you’re not developing new applications, knowledge of these tools allows you
    to be vigilant when reviewing others’ work or when troubleshooting performance
    or application problems.


    Be creative and willing to write something new, even if little content is available
    to get you started. Many great tools have been built as a result of the question,
    “Why hasn’t anyone done this yet?!” This book has provided a starting point, but
    as new versions of SQL Server and other database tools are released, and as the
    complexity of software applications increases with time, the opportunity for novel
    solutions increases.


    Even if you think an idea is a dead end, explore it anyway and doubly so if someone
    else is claiming it’s a dead end. I would wager that over half of the “brilliant
    solutions” I’ve come up with have lead to absolutely nothing of use. The remainder
    are what keep me optimistic about database development and optimization throughout
    my career.'
  trans: '# 在其他服务器上执行 TSQL


    在管理多台服务器时，经常会遇到需要从当前服务器执行 TSQL 以远程运行到另一台 SQL Server 上的情况。虽然这些 TSQL 语句不是用动态 SQL
    执行的，但其语句的创建和执行过程非常相似，值得进行一个简短的演示。


    考虑这样一个场景：你有一个中心报告服务器，并希望从本地服务器以及其他现场服务器中提取数据。你可能需要遍历每个服务器，从每个服务器提取数据并将其返回到本地的目标数据存储。首先，让我们为下一个示例创建一个简单的日志表：


    ```sql

    CREATE TABLE dbo.recent_product_counts

    (       count_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_recent_product_counts
    PRIMARY KEY CLUSTERED,

    product_count INT NOT NULL,

    server_name NVARCHAR(128),

    sample_time DATETIME NOT NULL CONSTRAINT DF_recent_product_counts DEFAULT (CURRENT_TIMESTAMP));

    ```


    有了存储结果的地方后，你将创建一个存储过程来说明如何使用 `OPENQUERY` 从远程服务器返回特定的行数，并将结果存储在此表中。这可以在清单 11-8
    中看到。


    ```sql

    IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = ''get_product_count_all_servers'')

    BEGIN

    DROP PROCEDURE dbo.get_product_count_all_servers;

    END

    GO

    CREATE PROCEDURE dbo.get_product_count_all_servers

    AS

    BEGIN

    SET NOCOUNT ON;

    DECLARE @sql_command NVARCHAR(MAX) = '''';

    SELECT

    name AS server_name

    INTO #servers

    FROM sys.servers;

    SELECT @sql_command = @sql_command + ''

    INSERT INTO AdventureWorks2014.dbo.recent_product_counts

    (product_count, server_name)

    SELECT

    product_count,

    '''''' + server_name + ''''''

    FROM OPENQUERY(['' + server_name + ''], ''''SELECT COUNT(*) AS product_count FROM
    AdventureWorks2014.Production.Product WHERE ModifiedDate >= ''''''''2/8/2014'''''''''''');''

    FROM #servers

    WHERE server_name  @@SERVERNAME;

    SELECT @sql_command = @sql_command + ''

    INSERT INTO AdventureWorks2014.dbo.recent_product_counts

    (product_count, server_name)

    SELECT

    COUNT(*),

    @@SERVERNAME

    FROM AdventureWorks2014.Production.Product WHERE ModifiedDate >= ''''2/8/2014'''''';

    EXEC sp_executesql @sql_command;

    DROP TABLE #servers;

    END

    ```

    清单 11-8.

    使用动态 SQL 和 OPENQUERY 从远程服务器检索数据


    此存储过程分为两个部分：第一部分将生成 TSQL 来访问 `sys.servers` 中所有不是本地服务器的服务器。第二部分仅管理本地服务器，因为访问它不需要
    `OPENQUERY` 语法。运行此查询两次后，`recent_product_counts` 的内容如图 11-8 所示。


    ![A371168_1_En_11_Fig8_HTML.jpg](img/A371168_1_En_11_Fig8_HTML.jpg)


    图 11-8.

    使用清单 11-8 中的存储过程从多个服务器收集的产品计数


    在我的计算机案例中，只有另一台服务器可供查询，但如果有更多，每一台都会包含在结果集中。存储过程中使用的 `ModifiedDate` 通常是基于当前日期和时间的当前日、周或月，但由于
    `AdventureWorks` 中的数据是静态的，你需要往回看更久一点才能收集到有意义的计数。


    也没有必要查询 `sys.servers` 中的所有 SQL Server。可以创建一个自定义列表，或者创建并访问一个服务器表来管理任意数量的本地或远程服务器。还要注意命令字符串文本中大量使用了撇号。由于
    `OPENQUERY` 要求一个用撇号分隔的字符串，`sp_executesql` 也是如此，因此你需要将使用的撇号数量加倍。这确保在最终查询传递给每个 SQL
    Server 执行时，字符串分隔符的数量是正确的。


    在以这种方式嵌套字符串时，经常进行调试以确保撇号数量正确。在执行前打印命令字符串有助于确保输出符合预期。如有疑问，请从头开始，一次构建一级语句，直到完成。在此示例中，由于整个
    TSQL 语句嵌套在另一个字符串中，撇号的数量加倍了，但动态 SQL 的不同应用可能会导致略有不同的结果。


    仔细编写这类动态 SQL 所获得的回报将超过嵌套字符串的复杂性。在寻找此类数据访问需求的简单解决方案时，能够高效地从其他服务器检索重要数据，而无需使用循环、维护计划或
    SSIS 包，可能是有益的。


    ## 结论


    本章介绍了多种应用，它们运用了本书中介绍的许多技术。其中许多脚本都非常开放，在构建和实现时允许进行大量定制。列表生成允许在构建命令字符串时避免使用游标和循环，从而使执行非常高效。


    随着时间的推移，会出现无数其他任务，动态 SQL 或其许多相关主题对于解决这些任务将具有不可估量的价值。即使你不是在开发新应用程序，了解这些工具也能让你在审查他人工作或排查性能或应用程序问题时保持警惕。


    要有创造力并愿意编写新东西，即使只有很少的内容可以让你开始。许多伟大的工具都是由于“为什么还没有人做这个呢？！”这个问题而构建的。本书提供了一个起点，但随着
    SQL Server 和其他数据库工具新版本的发布，以及软件应用程序复杂性随时间的增加，新颖解决方案的机会也在增加。


    即使你认为一个想法是死胡同，也要探索它，特别是如果别人声称它是死胡同的话。我敢打赌，我想出的“绝妙解决方案”中，超过一半最终毫无用处。剩下的那些让我在整个职业生涯中对数据库开发和优化保持乐观。'
