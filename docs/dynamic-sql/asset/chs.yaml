- "# 1. 什么是动态 SQL？\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-1811-2_​1](http://dx.doi.org/10.1007/978-1-4842-1811-2_1)）包含补充材料，可供授权用户使用。\n\
  \nT-SQL 是一种脚本语言，随着 SQL Server 的每个新版本发布而不断扩展。在数据库开发和管理领域取得成功，需要灵活性以及不断适应新情况、新技术和新需求的能力。你将面临的许多挑战都是未知的，或者说是那些直到运行时你才确切知道将处理何种数据的场景。动态\
  \ SQL 是在面对未知情况时解决问题的最佳工具之一。\n\n### 理解动态 SQL\n\n动态 SQL 理解起来相当简单，一旦你熟悉了它，其能应用的场景数量会变得惊人。动态\
  \ SQL 旨在解决这样一类场景：你希望对一个或多个对象进行操作，但在编写代码时并不知道所有相关的细节。可以通过参数将重要的值集合传递到代码中，但如果 T-SQL\
  \ 的结构本身就是由这些值定义的，该怎么办呢？\n\n#### 一个简单示例\n\n从一个非常简单的 `select` 语句开始，我们将构建理解动态 SQL 的起点：\n\
  \n```\nSELECT TOP 10 * FROM Person.Person;\n```\n\n此语句返回 `Person.Person` 表中 10 行数据的所有列。如果你想从某个表中选择数据，但直到运行时才知道表名，该怎么办？你如何将可变的表名代入\
  \ T-SQL 中？在回答这个问题之前，让我们通过简单地重写上面的查询来介绍动态 SQL，以便你将其作为字符串执行，而不是作为标准的 T-SQL：\n\n```\n\
  DECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = 'SELECT TOP 10 * FROM\
  \ Person.Person';\nEXEC (@sql_command);\n```\n\n这个例子定义了一个名为 `@sql_command` 的字符串，用于保存动态\
  \ SQL。什么是动态 SQL？它就是你构建并随后执行的字符串。在这个例子中，它就是上面相同的 `SELECT` 语句，没有改动。设置 `@sql_command`\
  \ 后，它被执行，提供与之前相同的结果。\n\n#### EXEC 语句\n\n`EXEC` 用于执行 `@sql_command`。也可以使用 `EXECUTE`。本书后面还会介绍执行动态\
  \ SQL 的其他方式，以满足对进一步灵活性或安全性的需求。记得始终在 `@sql_command` 字符串两边加上括号。下面是一个省略括号的示例：\n\n```\n\
  DECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = 'SELECT TOP 10 * FROM\
  \ Person.Person';\nEXEC @sql_command;\n```\n\n不这样做会导致一个有点奇怪的错误：\n\n```\nMsg 2812,\
  \ Level 16, State 62, Line 11\nCould not find stored procedure 'SELECT TOP 10 *\
  \ FROM Person.Person'.\n```\n\n当没有括号时，SQL Server 会将动态 SQL 命令字符串视为存储过程。省略括号将导致无法运行你的\
  \ SQL 字符串，并收到类似上面的错误。\n\n#### 应使用的数据类型\n\n请注意，命令字符串使用了 `NVARCHAR(MAX)` 作为数据类型。虽然你可以使用\
  \ `VARCHAR`，但如果处理的任何对象中包含扩展 Unicode 字符，你可能会丢失数据。大小也可以缩短，但如果你的命令字符串变得比该大小更大，它将被截断，你的动态\
  \ SQL 将成为令人困惑的错误消息或逻辑错误的源头。\n\n为了保持一致性和可靠性，请使用 `NVARCHAR(MAX)` 作为动态 SQL 命令字符串的数据类型。\n\
  \n### 动态执行过程\n\n为了理解动态 SQL 的工作原理及其可应用于你将遇到的多种问题的各种方式，重要的是思考动态 SQL 是如何构建的。此外，熟悉 SQL\
  \ Server 为解析和运行 T-SQL 字符串所使用的执行过程，将使使用动态 SQL 变得容易得多。\n\n所有动态 SQL 都遵循三个基本步骤：\n\n\
  创建一个用于存储动态 SQL 的字符串变量。可以使用任何变量名。构建命令字符串并将其存储在此变量中。执行命令字符串。\n\n将 T-SQL 命令存储为字符串的好处是，你可以自由地对它使用任何字符串操作命令，通过一个或多个步骤来构建它。现在来解决你最初的问题：如何从一个直到运行时才定义的表中选择数据。为此，你将\
  \ `Person.Person` 从字符串中移除，并用一个你上面定义的变量来替换：\n\n```\nDECLARE @sql_command NVARCHAR(MAX);\n\
  DECLARE @table_name NVARCHAR(100);\nSELECT @table_name = 'Person.Person';\nSELECT\
  \ @sql_command = 'SELECT TOP 10 * FROM ' + @table_name;\nEXEC (@sql_command);\n\
  ```\n\n变量 `@table_name` 存储了你希望查询的表名。通常，这会作为一个参数传入，无论是来自其他存储过程还是直接调用它的应用程序。通过将其构建到\
  \ `@sql_command` 中，你获得了查询任何所需表的灵活性，而无需事先硬编码。虽然这是一个简单的例子（你多久会想以这种方式选择数据？），但它为成千上万的应用提供了基础，每一个都可以节省大量的时间、资源和复杂性。在深入探讨动态\
  \ SQL 及其众多用途的细节之前，让我们先看一个动态 SQL 实际应用中更实用（也更复杂）的例子。\n\n### 动态 SQL 实战\n\n一个常见的维护需求是在服务器上的多个数据库上运行\
  \ T-SQL。这类维护可能包括备份数据库、重建索引、报告关键数据元素或许多其他可能性。如果数据库列表永不改变，也没有数据库被重命名，你可以将名称硬编码到每个存储过程中，而不必担心将来更改它们。这种方法在遇到那些不可避免的变化（移动或重命名数据库）之前一直有效——而这最终会导致所有那些宝贵的维护过程失效。至关重要的是，你的维护、监控和报告作业要以尽可能高的可靠性运行。\n\
  \n清单 1-1 展示了一个常见的示例，该语句可用于针对单个数据库运行备份，并将其存储在本地驱动器上。\n\n```\nBACKUP DATABASE AdventureWorks2014\n\
  TO DISK='E:\\SQLBackups\\AdventureWorks2014.bak'\nWITH COMPRESSION;\n清单 1-1.\n简单的\
  \ BACKUP 语句\n```\n\n这段 T-SQL 将使用压缩功能将 `AdventureWorks2014` 数据库备份到 E 盘的 `SQLBackups`\
  \ 文件夹中。例如，如果你想对一组名称以 `AdventureWorks` 文本开头的数据库执行自定义备份，那么你需要构建能够适应性收集所有符合该名称的数据库列表，然后分别对它们进行备份的\
  \ T-SQL。以下的 T-SQL 展示了使用动态 SQL 实现这一目标的一种方法。\n\n```\nDECLARE @database_list TABLE\n\
  (database_name SYSNAME);\nINSERT INTO @database_list\n(database_name)\nSELECT\n\
  name\nFROM sys.databases\nWHERE name LIKE 'AdventureWorks%';\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @database_name SYSNAME;\nDECLARE database_cursor CURSOR\
  \ LOCAL FAST_FORWARD FOR\nSELECT database_name FROM @database_list\nOPEN database_cursor\n\
  FETCH NEXT FROM database_cursor INTO @database_name;\nWHILE @@FETCH_STATUS = 0\n\
  BEGIN\nSELECT @sql_command = '\nBACKUP DATABASE ' + @database_name + '\nTO DISK=''E:\\\
  SQLBackups\\' + @database_name + '.bak''\nWITH COMPRESSION;'\nEXEC (@sql_command);\n\
  FETCH NEXT FROM database_cursor INTO @database_name;\nEND\nCLOSE database_cursor;\n\
  DEALLOCATE database_cursor;\n清单 1-2.\n为备份所有以“AdventureWorks”开头的数据库而构建的动态 SQL\n```\n\
  \n这段 T-SQL 当然比你看到的第一个 `BACKUP` 语句要复杂得多。让我们将其分解，以理解这里发生了什么以及它为何有效。然后，你将重点关注构成这组语句支柱的动态\
  \ SQL 部分。\n\n1.  用一个数据库名称列表填充一个表变量。\n2.  按每个数据库循环一次。\n3.  构建一个动态 SQL 命令字符串，该字符串会考虑当前的数据库名称。\n\
  4.  执行动态的 `BACKUP` 语句。\n5.  继续迭代循环，直到所有相关数据库都已备份。\n\n你在这里声明了几个变量：\n\n*   `@database_list`：包含所有符合搜索条件的数据库。在本例中，任何以\
  \ `AdventureWorks` 一词开头的数据库都将被包括在内。\n*   `@sql_command`：这是将包含动态 SQL 语句的命令字符串。\n\
  *   `@database_name`：保存当前正在备份的数据库的名称。\n*   `database_cursor`：一个游标，将用于遍历 `@database_list`\
  \ 中列出的所有数据库。\n\n此示例的大部分内容是为循环设置的。关键部分是你用 `@database_name` 替换数据库名称和备份文件名的地方。这使你能够生成一个备份语句，该语句不仅会备份每个数据库（无论有多少个），而且还会使用该名称来命名备份文件。如果需要，你同样可以轻松地在文件名上附加其他信息，例如日期、时间或服务器名称。\n\
  \n### 动态 SQL 的优势\n\n你希望将动态 SQL 纳入日常 SQL Server 工具库的原因有很多。此外，还有许多特定的挑战，动态 SQL 是其最佳解决方案。讨论这些场景将突显为何可以围绕这个主题撰写一整本书。\n\
  \n#### 可选或自定义的搜索条件\n\n搜索框是网页或应用程序开发中最常用的工具之一。对于简单的搜索，你可能只需要传入一个变量进行评估。在更强大的网页搜索中，你可能需要从多个条件中进行选择，每个条件都可以用\
  \ `AND` 或 `OR` 条件进行评估。虽然你可以编写一个非常长的 `SELECT` 语句，并与所有可能涉及的表进行左连接，但最终很可能会得到一个庞大、低效且难以处理的\
  \ T-SQL 集合。相反，动态 SQL 允许你构建一个 `SELECT` 字符串，该字符串只查询满足给定搜索所需的表。\n\n#### 一切皆可定制\n\n\
  添加连接或 `WHERE` 子句仅仅是个开始。借助动态 SQL，任何语句都可以被定制，从而为你的代码提供更大的灵活性。想根据动态搜索对列进行分组？解决方案是将\
  \ `GROUP BY` 子句编写为动态 SQL，对其进行修改以适应每个特定情况的需求。想为数据集生成行号，但直到运行时才知道按哪些列进行分区或排序？没问题！\n\
  \n前面的示例说明了如何使用动态 SQL 来自定义备份操作并自定义备份文件名。任何可想到的 T-SQL 语句都可以被修改以利用动态 SQL，这样做可以在应对日常众多挑战时提供更大的灵活性。\n\
  \n#### 优化 SQL 性能\n\n到目前为止，动态 SQL 似乎使事情变得更加复杂，增加了对临时变量、循环和命令字符串的需求。尽管表面上增加了复杂性，但这种框架可以让你减少通常执行的\
  \ SQL 语句的大小并提高性能。\n\n动态 SQL 提供了一个定制语句以满足性能需求的机会。移除多余的对象、调整连接和子查询以及减少 SQL 语句的大小，都可以带来更快的执行时间并减少资源消耗。\n\
  \n#### 快速生成大量 T-SQL 或文本！\n\n有时你需要执行大型 SQL 语句，这些语句作用于一组众多对象。其他时候，你可能希望基于存储在特定表集中的数据生成输出文本。也许你想生成将用于从任意数量的源收集报告数据的\
  \ `SELECT` 语句。\n\n手动编写所有这些 T-SQL 可能会花费很长时间，并且在你完成一项耗时、枯燥的任务时，会大大增加人为错误发生的机会。如果涉及的\
  \ SQL 语句需要定期运行，那么提前准备它们可能是不可能的，特别是当目标表或其他涉及的对象可能经常变化时。\n\n使用动态 SQL，你可以生成任意数量的命令或文本，且没有限制。SQL\
  \ Server 不会厌倦这个过程，无论它看起来多么乏味。这是一个自动化繁琐任务并减少在最终成为机械性工作上的操作员干预的机会。结果是你的工作变得更轻松、更有趣，你可以专注于需要你关注的更重要的任务！\n\
  \n\n### 在其他服务器或数据库上执行 SQL 语句\n\n当您需要针对其他实体运行查询，但事先并不知道所有这些实体是什么时，通常会遇到一个常见的挑战。如果这些对象在运行时可能变化或改变，那么**动态\
  \ SQL** 是管理这些操作的绝佳解决方案，无需硬编码那些可能随时间变化的对象名称。这降低了应用程序在软件发布、配置更改或硬件升级后出现故障的可能性。\n\n\
  同样，在这些场景中，您可能有一个应用程序，其代码在多个位置运行，但对服务器、数据库或其他对象的引用会根据环境而异。在每个环境中编写略有不同的代码是低效的，并且随着时间的推移会导致显著增加的维护需求。维护配置数据并编写处理这些配置的代码要简单得多，根据需要读写数据库。动态\
  \ SQL 允许轻松处理和操作这些配置数据，无论所涉及的操作有多复杂。\n\n### 完成不可能之事！\n\n简而言之，SQL Server 中有许多任务如果没有动态\
  \ SQL，将会极其困难，甚至看似不可能。许多需要遍历数据库对象的常见维护场景，使用动态 SQL 后就变得轻而易举。\n\n您是否曾尝试在动态列列表上使用 `PIVOT`\
  \ 或 `UNPIVOT`？这个命令功能强大，但它需要一个明确的列列表。如果该列表在运行时才能确定，那么获取数据的唯一方法就是使用动态 SQL，将您定制的列列表插入语句中，然后执行它。\n\
  \n后续将会展示许多示例，演示动态 SQL 如何让非常困难的任务变得简单有趣，这些示例既实用又好玩。敬请期待并享受学习过程吧！\n\n### 动态 SQL 注意事项\n\
  \n与任何工具一样，不应盲目地到处使用动态 SQL，它也不是您遇到的每个数据库问题的解决方案。在讨论任何工具时，在实施之前必须考虑其挑战、陷阱和复杂性。\n\n\
  #### 撇号会破坏字符串\n\n在构建动态 SQL 命令时，您会将其他变量和字符串合并到其中。如果其中任何内容包含撇号，您的命令字符串就会被破坏。结果命令在运气好的情况下会抛出错误并不执行。SQL\
  \ 注入是指利用动态 SQL 中的变量，故意用撇号关闭字符串，然后尝试执行恶意代码的过程。如果您在构建命令语句之前没有清除所有参数和输入，您可能会将巨大的安全漏洞引入您的代码。\n\
  \n因此，每当使用动态 SQL 时，务必确保输入是干净的，并且参数中的意外符号不会对代码操作产生负面影响。未能做到这一点可能会导致应用程序代码中断、意外行为或灾难性的安全漏洞。\n\
  \n#### NULL 会破坏字符串\n\n`NULL` 是一个复杂的状态。作为值的缺失，任何尝试将字符串与 `NULL` 连接的操作都将导致 `NULL`。如果您构建的动态\
  \ SQL 命令字符串被传递了一个为 `NULL` 的参数，整个语句将变成 `NULL`。结果很可能是 T-SQL 语句完全不做任何事情。这可能导致排查故障的噩梦，因为不清楚为什么一个\
  \ SQL 语句似乎什么都没做。此外，如果所讨论的语句有许多输入，寻找那个 `NULL` 参数可能是一项艰巨的任务。\n\n#### 难以阅读和调试\n\n当您在文本编辑器中编写标准\
  \ SQL 时，T-SQL 会失去 SQL Server Management Studio 中存在的颜色编码优势。在撇号内，大部分文本会显示为红色，包括关键字、字符串和变量名。此外，在动态\
  \ SQL 字符串内部，您在键入时执行的错误检查效果会降低。一个通常会被红色下划线标记的简单拼写错误，在字符串内部可能就不那么明显了。\n\n为了应对这些挑战，您必须设计编写良好的\
  \ T-SQL。除了编写非常有组织的代码外，在记录您的工作时需要更加勤勉。通常容易理解的 T-SQL，当作为字符串的一部分编写时，可能更难以掌握。必须投入额外的时间和细心，以确保当您将来重新审视这段代码时，它仍然易于阅读且有意义。\n\
  \n动态 SQL 总是能正确编译。对 SQL Server 而言，它只是一个字符串。其内容在运行时之前不会被检查语法或对象有效性。有效的测试和调试是确保您编写的\
  \ T-SQL 按预期执行的关键。\n\n#### 权限和作用域不同\n\n动态 SQL 语句在它们自己的作用域中执行。在字符串内定义的变量通常在外部不可用。此外，动态\
  \ SQL 是以执行整体 T-SQL 代码（存储过程、作业等）的用户权限来执行的。它不是以存储过程所有者的权限或最近碰巧测试它的用户权限来执行。\n\n为了避免意外错误、权限冲突或其他安全问题，考虑哪些用户将运行包含动态\
  \ SQL 的任何代码非常重要。如果您需要从动态 SQL 语句中保存数据，或从外部传入参数，则需要显式管理以达到预期效果。\n\n#### 动态 SQL 不能在函数中使用\n\
  \n简而言之，您可以在存储过程、即席 T-SQL 和作业中使用动态 SQL，但在函数中不允许。任何在函数中包含动态 SQL 的尝试都将导致错误：\n\n```\n\
  Msg 443, Level 16, State 14, Procedure fn_test, Line 72\nInvalid use of a side-effecting\
  \ operator 'EXECUTE STRING' within a function.\n```\n\nSQL Server 函数必须是确定性的。输入和输出必须符合函数定义的形式。动态\
  \ SQL 本质上是非确定性的，因此不能在函数中使用。\n\n### 动态 SQL 风格\n\n编写能工作的代码非常重要。编写易于理解和维护的代码同样重要。作为负责创建和维护大量数据库对象的人，您必须始终考虑在未来的任何时间点，阅读、理解、排查故障和升级这些对象的难易程度。由于动态\
  \ SQL 往往更难阅读，因此应格外小心，确保您的 T-SQL 编写良好、文档有效，并且对象/变量按照合理的约定命名。这些设计考虑将为您节省大量时间，并向您的同事表明您关心他们的福祉以及组织的未来。\n\
  \n良好动态 SQL 设计的原则始于此，并将在本书的其余部分继续构建。无论是否使用动态 SQL，请考虑您为编写可维护代码所做的任何努力。\n\n\n#### 彻底编写文档\n\
  \n这是对任何曾编写过一行代码、脚本或非技术流程的人反复强调的信条。你的文档解释了你的代码如何工作以及为何如此编写，并且在不可避免地进行修改时充当指南。通常可能不需要文档的\
  \ TSQL，在应用了动态 SQL 后，会变得难以阅读。考虑创建额外的文档来补充这种增加的复杂性。\n\n文档化你工作的第一个也是最简单的方法是在文件顶部包含一个头部注释。这个头部提供了关于谁创建了此代码的基本信息、一些修订笔记、其目的以及其工作原理的快速概述。理解存储过程被创建的原因可能和了解其工作原理一样有用。更重要的是，通过通读代码并稍加思索，可能能够辨别出代码的功能。但是，若没有一些他人可能不具备的现有应用知识，或者没有向其他开发人员求助，就无法弄清激发该代码创建的原始需求。\n\
  \n考虑一个简单备份脚本的头部注释，如清单 1-3 所示。\n\n```\n/*     2015 年 9 月 8 日 Edward Pollack\nAdventureWorks\
  \ 数据库的备份例程\n由于 2015 年 8 月 20 日记录的工单 T1234，需要通过 SQL Server 代理作业选择性地备份一组有限的 AdventureWorks\
  \ 数据库。\n该作业的日程可以根据当前业务需求进行调整。\n使用了动态 SQL 来遍历每个数据库，执行备份，并使用数据库名称、日期、时间和源服务器命名结果文件。\
  \    */\n清单 1-3.\n头部注释，记录一个假设的备份脚本\n```\n\n这个头部告诉读者以下信息：\n\n-   编写此代码的日期，以提供其产生时间的背景。\n\
  -   作者，这使未来的开发人员知道有问题时该找谁。\n-   编写此代码的背景以及正在解决的问题。\n-   其工作方式以及所使用的任何特殊功能的简要描述。\n\
  \n这个简短的文档块回答了开发人员可能对你的代码提出的大多数常见问题。你在编写 TSQL 时可能认为显而易见的事情，对于多年后阅读此代码的其他人来说，可能并非如此。\n\
  \n当编写涉及动态 SQL 的代码时，你必须考虑彻底文档化，但也不要过度解释每一行 TSQL。让我们以之前的备份例程为例，并为其添加一些有意义的文档。\n\n\
  ```\n-- 这将临时存储我们将在下面备份的数据库列表。\nDECLARE @database_list TABLE\n(database_name SYSNAME);\n\
  INSERT INTO @database_list\n(database_name)\nSELECT\nname\nFROM sys.databases\n\
  WHERE name LIKE 'AdventureWorks%';\n-- 可以调整此 WHERE 子句以备份除以 \"AdventureWorks\" 开头的数据库之外的其他数据库\n\
  DECLARE @sql_command NVARCHAR(MAX);\nDECLARE @database_name SYSNAME;\nDECLARE @date_string\
  \ VARCHAR(17) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) + '_' + REPLACE(RIGHT(CONVERT(NVARCHAR,\
  \ CURRENT_TIMESTAMP, 120), 8), ':', '');\n-- 使用游标逐一遍历数据库。\nDECLARE database_cursor\
  \ CURSOR FOR\nSELECT database_name FROM @database_list\nOPEN database_cursor\nFETCH\
  \ NEXT FROM database_cursor INTO @database_name;\nWHILE @@FETCH_STATUS = 0 -- 继续循环，直到游标到达数据库列表的末尾。\n\
  BEGIN\n-- 自定义备份文件名，使用数据库名称以及日期和时间\nSELECT @sql_command = '\nBACKUP DATABASE ' +\
  \ @database_name + '\nTO DISK=''E:\\SQLBackups\\' + @database_name + '_' + @date_string\
  \ + '.bak'' WITH COMPRESSION;'\nEXEC (@sql_command);\nFETCH NEXT FROM database_cursor\
  \ INTO @database_name;\nEND\n-- 清理我们的游标对象。\nCLOSE database_cursor;\nDEALLOCATE database_cursor;\n\
  清单 1-4.\n添加了文档的备份脚本示例\n```\n\n此示例展示了之前的备份脚本，并在文件名上添加了时间戳。添加了文档来解释每个部分。请注意，注释简短、明了，并且只解释我认为可能受益的部分。你不必浪费时间在那些显而易见的注释上，那只会占用额外空间并分散当前任务的注意力。例如，我绝不会包含像这样的注释，除非是寻找一些不合时宜的喜剧效果：\n\
  \n```\n-- 这个变量保存数据库名称。\nDECLARE @database_name SYSNAME;\n```\n\n虽然有趣，但我的补充没有提供任何新信息。无论它惹人烦还是逗人乐，它都没有提供变量名本身未显而易见的任何有用信息。\n\
  \n文档化常常像选择披萨配料。每个人都有自己的风格，试图确定一种适用于所有对象在所有环境中都合适的单一风格是愚蠢的。如果你正在编写更复杂的代码，尤其是涉及动态\
  \ SQL 时，考虑尽可能彻底。你现在多花的一点时间，将在未来为别人节省大量时间！\n\n#### 调试动态 SQL\n\n动态 SQL 比你编写的普通查询更需要调试。由于\
  \ SQL Server 总会成功编译动态 SQL 语句，因此在执行前对代码进行进一步测试就显得尤为重要。那些通常显而易见的简单错误，可能会因为 SQL Server\
  \ Management Studio 中缺乏反馈而被轻易忽略。此外，你的代码会部分隐藏在被引号包围的字符串中。代码越难阅读，调试和定位错误（无论是语法错误还是逻辑错误）的难度就越大。\n\
  \n测试和调试动态 SQL 最简单有效的方法是将 `EXEC` 替换为 `PRINT`。当 T-SQL 被执行时，命令字符串将会被打印出来，而不是立即执行。然后，可以将打印出的内容复制到另一个编辑器窗口中，检查其语法、逻辑、拼写以及任何其他你关注的事项。许多常见的动态\
  \ SQL 拼写错误是由于引号错放造成的，当代码被移到新窗口中时，这些问题会迅速显现。例如，考虑以下简短的命令字符串：\n\n```sql\nDECLARE @CMD\
  \ NVARCHAR(MAX);\nSELECT @CMD = 'SELLECT TOP 17 * FROM Person.Person';\nEXEC (@CMD);\n\
  ```\n\n这条语句会编译成功，但会抛出以下错误：\n\n```sql\nMsg 156, Level 15, State 1, Line 79\nIncorrect\
  \ syntax near the keyword 'TOP'.\n```\n\n产生的错误信息很隐晦，几乎没有告诉你错在哪里。将命令字符串打印出来并粘贴到编辑器窗口中，问题就变得一目了然：\n\
  \n```sql\nSELLECT TOP 17 * FROM Person.Person\n```\n\n`SELECT` 明显拼写错误，除了在 SQL Server\
  \ Management Studio 中会被标上红色下划线外，它也不会像通常那样被高亮显示为蓝色保留关键字。\n\n对于较大的 T-SQL 代码块，在代码中添加一个调试位（debug\
  \ bit）非常有价值。当 `@debug` 为 `1` 时，所有语句将打印而非执行。当 `@debug` 为 `0` 时，语句才会执行。这让你可以通过一个简单的位来轻松控制所有代码块，该位可以在代码顶部轻松配置。相比在需要调试时不断编写\
  \ `PRINT` 语句并注释掉执行语句，切换这一个位要容易得多。清单 1-5 展示了之前备份脚本示例添加了 `debug` 参数后的样子。\n\n```sql\n\
  DECLARE @debug BIT = 1;\nDECLARE @database_list TABLE\n(database_name SYSNAME);\n\
  INSERT INTO @database_list\n(database_name)\nSELECT\nname\nFROM sys.databases\n\
  WHERE name LIKE 'AdventureWorks%';\n-- 此 WHERE 子句可以调整，以备份除 \"AdventureWorks\" 开头之外的其他数据库。\n\
  DECLARE @sql_command NVARCHAR(MAX);\nDECLARE @database_name SYSNAME;\nDECLARE @date_string\
  \ VARCHAR(17) = CONVERT(VARCHAR, CURRENT_TIMESTAMP, 112) + '_' + REPLACE(RIGHT(CONVERT(NVARCHAR,\
  \ CURRENT_TIMESTAMP, 120), 8), ':', '');\n-- 使用游标逐个遍历数据库。\nDECLARE database_cursor\
  \ CURSOR FOR\nSELECT database_name FROM @database_list\nOPEN database_cursor\nFETCH\
  \ NEXT FROM database_cursor INTO @database_name;\nWHILE @@FETCH_STATUS = 0 -- 继续循环，直到游标到达数据库列表的末尾。\n\
  BEGIN\n-- 自定义备份文件名，使用数据库名称以及日期和时间\nSELECT @sql_command = '\nBACKUP DATABASE ' +\
  \ @database_name + '\nTO DISK=''E:\\SQLBackups\\' + @database_name + '_' + @date_string\
  \ + '.bak''\nWITH COMPRESSION;'\nIF @debug = 1\nPRINT @sql_command\nELSE\nEXEC (@sql_command);\n\
  FETCH NEXT FROM database_cursor INTO @database_name;\nEND\n-- 清理游标对象。\nCLOSE database_cursor;\n\
  DEALLOCATE database_cursor;\n```\n\n**清单 1-5.** 添加了调试参数的备份脚本示例\n\n通过添加四行 T-SQL 代码，你便能通过一个位来控制执行。将打印输出复制到新窗口并检查，你可以快速确认它是否编译成功并看起来正确。\n\
  \n此外，如果问题的根源不明确，你可以在代码中添加 `PRINT` 语句来输出一些变量值。例如，如果不确定 `@date_string` 是否被正确填充，你可以单独打印它并验证其值是否符合预期：\n\
  \n```sql\nPRINT '@date_string (line 20): ' + @date_string\n```\n\n这是一个非常简单的调试操作，但通过包含变量名和行号，你使代码更易于理解。如果结果仍然令人困惑，你可以进一步拆分结果，分别打印变量的日期和时间部分。通过将问题分解成更小、更简单的部分，调试任务变得容易得多，整个过程中的挫败感也会大大减少。\n\
  \n在编写新的动态 SQL 时，请务必经常打印命令字符串，验证生成的 T-SQL 在语法和逻辑上都是有效的。\n\n最后，对于任何需要从其他应用程序（或最终用户）接收输入的代码，请记住测试所有可能性。确保应用程序或\
  \ T-SQL 根据需要检查和验证输入。如果输入包含特殊字符会怎样？如果包含撇号、下划线或转义字符呢？如果允许手动输入文本，请假设他们会犯错、输入垃圾数据、空格、特殊字符，或者以某种方式做出意外行为。考虑到这些情况，你将能预防无数潜在的错误，并极大提升应用程序的安全性。\n\
  \n#### 像编写标准 T-SQL 一样编写动态 SQL\n\n动态 SQL 被包裹在字符串中，并不意味着它的写法应该与你通常的语句有所不同。无论你通常的大小写、缩进和空格标准是什么，这里都应同样适用。动态\
  \ SQL 语句常常被写成一长串代码，没有空格、换行、大小写或断行。结果往往是难以理解，并且更容易出错。如果你将 `PRINT` 语句中的调试文本复制到一个新窗口，其结果应该看起来完全就像你通常编写的\
  \ T-SQL。\n\n```sql\nDECLARE @CMD NVARCHAR(MAX) = ''; -- 这将保存最终要执行的 SQL\nDECLARE\
  \ @first_name NVARCHAR(50) = 'Edward'; -- 在搜索框中输入的名字\nSET @CMD = 'SELECT PERSON.FirstName,PERSON.LastName,PHONE.PhoneNumber,PTYPE.Name\
  \ FROM Person.Person PERSON INNER JOIN Person.PersonPhone PHONE ON PERSON.BusinessEntityID\
  \ = PHONE.BusinessEntityID INNER JOIN Person.PhoneNumberType PTYPE ON PHONE.PhoneNumberTypeID\
  \ = PTYPE.PhoneNumberTypeID WHERE PERSON.FirstName = ''' + @first_name + '''';\n\
  PRINT @CMD;\nEXEC (@CMD);\n```\n\n**清单 1-6.** 如何用格式糟糕的动态 SQL 惹恼未来开发者的示例\n\n### 字符串大小与截断\n\
  \n当你尝试将字符串存储到一个不足以容纳它的变量中时，字符串会被自动截断。结果将是不完整的数据，这很可能在你后续的代码中引发麻烦。考虑以下 T-SQL 代码，它生成一个时间戳并将其存储在一个字符串中。\n\
  \n```sql\nDECLARE @date_string VARCHAR(10) = CONVERT(VARCHAR, CURRENT_TIMESTAMP,\
  \ 112) + '_' + REPLACE(RIGHT(CONVERT(NVARCHAR, CURRENT_TIMESTAMP, 120), 8), ':',\
  \ '');\nPRINT @date_string;\n```\n\n代码清单 1-7. 生成时间戳字符串时发生截断的示例\n\n你期望得到一个包含日期 (MMDDYYYY)\
  \ 和时间 (HHMMSS) 的时间戳。然而，你实际得到的是一个被截断到 10 个字符的字符串：`20150908_1`。请始终声明足够大的变量，以容纳可能存储在其中的任何有效数据。如果你不确定潜在的数据大小，宁可谨慎一些，提供额外的字符空间，这并非坏主意。要得到本例中预期的完整文本输出，需要\
  \ 17 个字符。如果你正在考虑未来软件版本中才向时间戳添加毫秒呢？现在就将 `@date_string` 声明得更大一些，这样未来就无需为了适应这一改动而进行更多修改。其成本微乎其微，却能减少未来出错的可能性。\n\
  \n字符串截断的一个更复杂的例子可能发生在动态 SQL 变得非常、非常大的时候。如果你编写了一个超过 8192 个字符的命令字符串，并且正在将其与其他字符串（名称、日期、输入参数、其他动态\
  \ SQL 字符串等）拼接，那么就存在一种隐含的、未记录的截断风险。SQL Server 会隐式转换不同数据类型和大小的字符串，以尝试快速高效地处理它们。结果将是一个\
  \ `NVARCHAR(MAX)` 类型的命令字符串，在执行时似乎被截断到了 8192 个字符。可以通过以下两种方式之一来解决此截断问题：\n\n1.  将动态\
  \ SQL 语句拆分为多个语句，每个语句少于 8192 个字符。\n2.  将命令字符串中涉及的所有参数和变量更改为 `NVARCHAR(MAX)`。\n\n\
  第一种选项很难保证。你如何将一个极长的命令拆分成保证始终为 8192 个字符或更少的片段？当面临这个难题时，第二种选项总是有效，并且是一个简单、成本低的修复方法。\n\
  \n在处理非常大的动态 SQL 时，考虑对构建命令字符串涉及的所有标量参数使用 `NVARCHAR(MAX)`，以避免无意中的字符串截断。\n\n### Management\
  \ Studio 文本显示\n\n一个不相关但有些类似的问题可能在你直接将输出打印到文本窗口时发生。你会经常这样做，无论是调试新的 T-SQL 还是手动执行你生成的动态\
  \ SQL。默认情况下，SQL Server Management Studio 输出窗口中的文本限制设置为 256 个字符。任何从任何 SQL 语句打印出的文本都会被截断到\
  \ 256 个字符，这常常会带来不便。\n\n此限制仅影响你打印到结果窗口的输出，与你执行命令字符串时的字符串大小无关。文本限制对实际的查询执行没有影响。为了调试，修改\
  \ SQL 编辑器选项以将此限制增加到 8192 个字符是有利的。\n\n此设置可以通过导航到 `工具` ➤ `选项` ➤ `查询结果` ➤ `SQL Server`\
  \ ➤ `结果到文本` 并修改每列显示的最大字符数来找到。参见图 1-1 的示例。\n\n![A371168_1_En_1_Fig1_HTML.jpg](img/A371168_1_En_1_Fig1_HTML.jpg)\n\
  图 1-1. SQL Server Management Studio 中的“结果到文本”设置\n\n将 256 改为 8192，将来打印和调试更大的动态 SQL\
  \ 语句就会更容易。\n\n### sp_executesql\n\n到目前为止，所有的动态 SQL 语句都是使用 `EXEC` 关键字执行的。这种执行方式简单、直接，便于快速测试和调试。不幸的是，`EXEC`\
  \ 存在一些限制和安全问题，这促使我们寻求更好的解决方案：\n\n-   `EXEC` 容易受到 SQL 注入和意外输入的影响。转义字符和撇号很容易破坏动态 SQL\
  \ 语句。\n-   使用 `EXEC` 没有内置的方法来管理输入或输出变量。\n-   使用 `EXEC` 时，执行计划不太可能被重用。这种执行计划的重用，称为“参数探测”，是一个有用的功能，通常也是你希望发生的。\n\
  \n本书后面将详细讨论这些主题中的每一个，并且可以使用系统存储过程 `sp_executesql` 而不是 `EXEC` 来解决。\n\n`sp_executesql`\
  \ 的语法很简单：\n\n```sql\nsp_executesql N'SELECT COUNT(*) FROM Person.Person';\n```\n\
  \n字符串中提供的任何 T-SQL 都将像前面的例子一样执行。更常见（也更有用）的语法是将命令字符串存储在变量中，并在 `sp_executesql` 前使用\
  \ `EXEC`：\n\n```sql\nDECLARE @sql_command NVARCHAR(MAX) = 'SELECT COUNT(*) FROM\
  \ Person.Person';\nEXEC sp_executesql @sql_command;\n```\n\n从现在开始，所有示例都将使用 `sp_executesql`\
  \ 而不是 `EXEC`。这被认为是 SQL Server 中的最佳实践，并将提高动态 SQL 的可靠性、安全性和性能。\n\n在数据库领域，我们很少使用“总是”或“永不”这样的词。通常，问题的答案是“视情况而定”，接着会是相当多的讨论。但这是罕见的“总是”是最佳答案的场景之一。编写动态\
  \ SQL 时，**总是**使用 `sp_executesql`，**永不**使用 `EXEC`。其好处远远超过你使用这个新存储过程可能面临的任何不便。\n\n\
  #### 通过拼接构建字符串\n\n在 T-SQL 中，有两种直接的方法来组合字符串。第一种是使用 `+` 运算符，这也是本书至今所用的方法。它简单、易于快速实现且直观。\n\
  \n还记得关于 `NULL` 如何破坏字符串的简要介绍吗？当将多个字符串拼接在一起时，如果其中任何一个碰巧是 `NULL`，那么整个字符串输出也将变为 `NULL`。`NULL\
  \ + 1` 被 SQL Server 处理的方式，类似于数学中处理无穷大 + 1 的方式。你可以通过使用 `ISNULL` 或 `COALESCE`，或者通过显式检查变量是否为\
  \ `NULL` 并在需要时替换它来应对这种情况。考虑以下动态 SQL 查询。\n\n```sql\nDECLARE @schema VARCHAR(25) =\
  \ NULL;\nDECLARE @table VARCHAR(25) = 'Person';\nDECLARE @sql_command VARCHAR(MAX);\n\
  \nSELECT @sql_command = 'SELECT COUNT(*) ' + 'FROM ' + @schema + '.' + @table;\n\
  PRINT @sql_command;\n\nSELECT @sql_command = 'SELECT COUNT(*) ' + 'FROM ' + ISNULL(@schema,\
  \ 'Person') + '.' + @table;\nPRINT @sql_command;\n\nSELECT @sql_command = 'SELECT\
  \ COUNT(*) ' + 'FROM ' + CASE WHEN @schema IS NULL THEN 'Person' ELSE @schema END\
  \ + '.' + @table;\nPRINT @sql_command;\n```\n\n**代码清单 1-8. 当参数为 `NULL` 时的字符串拼接结果示例**\n\
  \n第一个查询返回 `NULL`。因为 `@schema` 是 `NULL`，任何与它拼接的内容也将变为 `NULL`。这通常是不期望的行为，你会立即被一个不起作用或执行时产生错误的命令字符串所困惑。\n\
  \n第二个查询使用 `ISNULL` 来确保，如果 `@schema` 是 `NULL`，则会返回某个值来替代它。这里，`Person` 架构是硬编码的，产生了与之前相同的结果。但这需要假设。如果你没有默认值，抛出错误可能比编造一个可能不准确的值更合适。或者，你可以简单地不允许\
  \ `@schema` 为 `NULL`，如果是 `NULL` 则立即退出。\n\n第三个查询使用 `CASE` 语句将 `NULL` 替换为 `Person`\
  \ 架构。这与上一个查询的结果相同，尽管 `CASE` 提供了一些你可以利用的额外灵活性。如有必要，你可以更改查询结构以处理缺失的变量，或拥有多条代码路径。\n\
  \n在数据类型和值不可预测的情况下，有第二种拼接字符串的方法可能很有益。内置函数 `CONCAT` 允许你使用以下语法组合字符串：\n\n```sql\nSELECT\
  \ CONCAT ('SELECT COUNT(*) ', 'FROM ', 'Person.', 'Person');\n```\n\n变量也可以作为参数传递给此函数：\n\
  \n```sql\nDECLARE @schema NVARCHAR(25) = 'Person';\nDECLARE @table NVARCHAR(25)\
  \ = 'Person';\nDECLARE @sql_command NVARCHAR(MAX);\n\nSELECT @sql_command = CONCAT\
  \ ('SELECT COUNT(*) ', 'FROM ', @schema, '.', @table);\nPRINT @sql_command;\n```\n\
  \n这两条 SQL 语句的结果将是相同的：\n\n```\nSELECT COUNT(*) FROM Person.Person\n```\n\n`CONCAT`\
  \ 提供了几个特点：\n\n`NULL` 参数总是被转换为空字符串。\n结果的数据类型会根据输入智能确定。`NVARCHAR` 参数将产生 `NVARCHAR`\
  \ 结果，`VARCHAR` 将产生 `VARCHAR`，`MAX` 输入将产生 `MAX` 大小的输出。\n如果所有输入都是 `NULL`，则输出将是一个类型为\
  \ `VARCHAR(1)` 的空字符串。\n它将在拼接过程中尝试转换不同的数据类型。这对于字符串可能是可取的，但在拼接文本和数字时可能有问题。添加 `CAST`\
  \ 或 `CONVERT` 来管理这一点将消除对结果准确性的任何疑虑。\n\n但是，删除 `NULL` 可能并非你想要的行为！通常，如果一个参数无意中为 `NULL`，你可能更希望代码抛出错误，而不是使用虚拟值继续处理。只有当删除\
  \ `NULL` 对你的应用程序有利时，才利用此功能。\n\n### 有用的字符串函数\n\n`CONCAT` 是使用 `+` 运算符的一个可行替代方案。在生成动态\
  \ SQL 时，还有许多其他 SQL Server 字符串处理函数非常有用。在本书的剩余部分，我们将继续使用 `+`，但值得花点时间快速回顾一些可能很方便的实用字符串函数：\n\
  \n*   `LTRIM`, `RTRIM`: 删除表达式左侧 (`LTRIM`) 或右侧 (`RTRIM`) 的任何空白。这在处理不可预测的输入或经常附带多余空格的输入时非常有用：\n\
  \n    ```sql\n    DECLARE @string NVARCHAR(MAX) = '  This is a string with extra\
  \ whitespaces   ';\n    SELECT @string;\n    SELECT LTRIM(@string);\n    SELECT\
  \ RTRIM(@string);\n    ```\n\n    以上 T-SQL 返回：\n\n    ```\n    \"   This is a string\
  \ with extra whitespaces   \"\n    \"This is a string with extra whitespaces   \"\
  \n    \"   This is a string with extra whitespaces\"\n    ```\n\n*   `CHARINDEX`:\
  \ 这将返回搜索表达式在字符串中首次出现的位置。例如，如果你想返回字符串中 `dinosaur` 首次出现的位置，这就可以做到：\n\n    ```sql\n\
  \    DECLARE @string NVARCHAR(MAX) = 'The stegosaurus is my favorite dinosaur';\n\
  \    SELECT CHARINDEX('dinosaur', @string);\n    ```\n\n    此查询的结果将是 32，即单词 `dinosaur`\
  \ 的起始字符位置。一个可选的第三参数可以指定从字符串中的哪个位置开始查找搜索字符串。如果未找到搜索字符串，`CHARINDEX` 返回 `0`。\n\n* \
  \  `STUFF`: 允许你将一个字符串插入到另一个字符串的中间，并可选择删除插入点处的字符。这有许多用途，并且可以成为以所需组合拼接 SQL 语句、文本输出或输入参数的便捷方法。以下是使用\
  \ `STUFF` 的一些示例：\n\n    ```sql\n    DECLARE @string NVARCHAR(MAX) = 'The stegosaurus\
  \ is my favorite dinosaur';\n    SELECT STUFF(@string, 5, 0, 'purple ');\n    SELECT\
  \ STUFF(@string, 5, 11, 't-rex');\n    SELECT STUFF(@string, 32, 8, 'animal!');\n\
  \    ```\n\n    第一个参数是要修改的文本，最后一个是要插入的字符串。第二个参数是插入点（在字符串中的哪个字符位置号插入）。第三个参数指示在插入前将删除多少个字符（如果不想删除任何字符，则输入\
  \ `0`）。这些查询的结果如下：\n\n    ```\n    \"The purple stegosaurus is my favorite dinosaur\"\
  \n    \"The t-rex is my favorite dinosaur\"\n    \"The stegosaurus is my favorite\
  \ animal!\"\n    ```\n\n*   `REPLACE`: 在字符串中，这会将文本模式的所有出现替换为另一个。这对于从字符串中删除特定字符，或用标准或一致的文本段替换输入字符串中不需要的部分通常很有用。`REPLACE`\
  \ 和 `STUFF` 的行为可能非常相似，因此你可以根据任务方便性选择使用哪一个：\n\n    ```sql\n    DECLARE @string NVARCHAR(MAX)\
  \ = CAST(CURRENT_TIMESTAMP AS NVARCHAR);\n    SELECT REPLACE(@string, ' ', '');\n\
  \    SELECT REPLACE(REPLACE(@string, ' ', ''), ':', '');\n    SELECT REPLACE(REPLACE(REPLACE(REPLACE(@string,\
  \ ' ', ''), ':', ''), 'AM', ''), 'PM', '');\n    ```\n\n\n在这些示例中，你正在从当前日期/时间字符串中剥离各种字符。单个\
  \ `REPLACE` 函数可用于移除特定字符，或者可以使用多个该函数来移除额外的字符。第一个示例将所有空格替换为空字符串，从而将其从字符串中移除。第二个查询还移除了冒号，最后一个则从时间戳中额外移除了\
  \ `AM` 或 `PM`。这是在清洗用于文件名、标签或目录数据标准名称的字符串时常用的策略。查询结果如下：\n\n```\nSep1320152:40PM\n\
  Sep132015240PM\nSep132015240\n```\n\n`SUBSTRING` 根据起始点和要返回的字符数，返回字符串的一个片段。它也可用于从字符串中移除字符、提取特定部分，或返回字符串的开头或结尾部分。\n\
  \n```\nDECLARE @string NVARCHAR(MAX) = CAST(CURRENT_TIMESTAMP AS NVARCHAR);\nSELECT\
  \ SUBSTRING(@string, 1, 3);\n```\n\n此示例从字符串中返回三位字母的月份：\n\n```\nSep\n```\n\n`REPLICATE`\
  \ 将一个字符串重复指定的次数。这可以是生成大量测试文本的快捷方式，或者在数据部分预期会经常重复时创建数据。\n\n```\nSELECT 'Look, a robot'\
  \ + REPLICATE('!', 50)\nLook, a robot!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!\n\
  ```\n\n这个例子很简单（输出大量感叹号），但请看下面的示例，其中序列号被输入系统，但都应具有 20 位数字（带前导零）：\n\n```\nDECLARE\
  \ @serial_number NVARCHAR(MAX) = '91542278';\nSELECT REPLICATE(0, 20 - LEN(@serial_number))\
  \ + @serial_number;\n```\n\n在此示例中，`LEN` 返回序列号中的字符数。通过从 20 中减去该值，你可以确定需要多少个额外字符才能达到\
  \ 20 位。通过重复零字符这么多次，你可以快速用适当数量的零来填充序列号。此策略也适用于邮政编码、身份证号码或任何表示为字符串的数值，其中前导零可能会被省略。\n\
  \n`REVERSE` 也是一个简单的函数，它接收一个字符串并反转其中的字符。如果你希望从字符串末尾开始操作（以相反顺序）或管理一个列表（从末尾开始），这会很有用。\n\
  \n```\nDECLARE @string NVARCHAR(MAX) = '123456789';\nSELECT REVERSE(@string);\n\
  ```\n\n这个简单的示例接收一个数字字符串并将其反转，返回预期的结果：\n\n```\n987654321\n```\n\n#### 关于撇号的注意事项\n\
  \n由于动态 SQL 是在字符串中构建的，在构建更复杂的字符串逻辑时，仔细考虑如何正确使用撇号非常重要。例如，假设你想查找所有名字以 Ed 开头的人。使用动态\
  \ SQL 时，你需要包含一些额外的撇号以确保语法正确：\n\n```\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE\
  \ @first_name NVARCHAR(20) = 'Ed';\nSELECT @sql_command = '\nSELECT\n*\nFROM Person.Person\n\
  WHERE FirstName LIKE ''' + @first_name + '%''';\nPRINT @sql_command;\nEXEC sp_executesql\
  \ @sql_command;\n```\n\n生成的命令字符串将如下所示：\n\n```\nSELECT\n*\nFROM Person.Person\nWHERE\
  \ FirstName LIKE 'Ed%'\n```\n\n注意，这里使用了三个撇号而不是一个。在字符串内，一对撇号会被解析为单个撇号。每当在动态 SQL 命令字符串中处理字符串时，请务必经常调试和打印，以确保你构建的是有效的\
  \ T-SQL 并且没有忘记任何字符串定界符。\n\n如果需要在动态 SQL 中修改参数内的字符串，则结果将是需要六个撇号而不是两个。如果这听起来很复杂，那么请以此复杂性作为警示，避免开发出比必要更难以理解和维护的应用程序。\n\
  \n### 结论\n\n动态 SQL 是一个强大的工具，能够快速有效地执行复杂请求。有许多数据库查询和任务如果没有动态定制查询的能力将难以完成。我们很快将深入探讨动态\
  \ SQL 的更多细节，并提供许多关于如何有效使用它的实用示例。\n\n不过，在深入之前，讨论安全性和编写及维护动态 SQL 的最佳实践非常重要。与任何工具一样，它可能被正确使用也可能被误用，了解如何有效利用安全措施不仅能提高开发质量，还能帮助保护你现有的应用程序和系统。\n\
  \n"
- "# 2. 防范 SQL 注入\n\n很少有 SQL 漏洞像 SQL 注入那样被频繁利用。这种形式的数据库攻击已经摧毁了公司并毁掉了职业生涯，对数据库管理员来说是一个持续的挑战。作为数据库专业人员，数据是你最宝贵的资产，保护它是你高于一切的责任。SQL\
  \ 注入不仅限于动态 SQL，它是一种可以应用于 SQL Server 许多领域的技术。因此，在考虑 SQL Server 安全性时，理解并防御它是最重要的优先事项。\n\
  \n\n### 什么是 SQL 注入？\n\nSQL 注入是指黑客试图将恶意的 T-SQL 代码插入到动态 SQL 所使用的参数中。请考虑清单 2-1 中所示的示例。\n\
  \n```\nDECLARE @CMD NVARCHAR(MAX);\nDECLARE @search_criteria NVARCHAR(1000);\nSELECT\
  \ @CMD = 'SELECT * FROM Person.Person\nWHERE FirstName = ''';\nSELECT @search_criteria\
  \ = 'Edward';\nSELECT @CMD = @CMD + @search_criteria;\nSELECT @CMD = @CMD + '''';\n\
  PRINT @CMD;\nEXEC sp_executesql @CMD;\n清单 2-1.\n动态 SQL，SQL 注入入门\n```\n\n我们对 `Person.Person`\
  \ 表执行搜索，查找名字与传入此代码的 `@search_criteria` 值匹配的任何人。生成的命令字符串正如您所期望的那样：\n\n```\nSELECT\
  \ * FROM Person.Person\nWHERE FirstName = 'Edward'\n```\n\n随着时间的推移，这个搜索被非常非常多的人使用，并扩展到也可以按姓氏、中间名首字母、称谓、电子邮件地址等搜索人！最终，一个姓“O'Brien”的人尝试搜索他们的记录，如清单\
  \ 2-2 所示。\n\n```\nDECLARE @CMD NVARCHAR(MAX);\nDECLARE @search_criteria NVARCHAR(1000);\n\
  SELECT @CMD = 'SELECT * FROM Person.Person\nWHERE LastName = ''';\nSELECT @search_criteria\
  \ = 'O''Brien';\nSELECT @CMD = @CMD + @search_criteria;\nSELECT @CMD = @CMD + '''';\n\
  EXEC sp_executesql @CMD;\n清单 2-2.\n使用带有撇号的输入值\n```\n\n结果并非用户所期望的。他们没有得到自己的信息，而是得到了一个\
  \ SQL Server 错误：\n\n```\nMsg 102, Level 15, State 1, Line 322\nIncorrect syntax\
  \ near 'Brien'.\nMsg 105, Level 15, State 1, Line 322\nUnclosed quotation mark after\
  \ the character string ''.\n```\n\n回到命令字符串并验证其外观是否正确，您会注意到以下情况：\n\n```\nSELECT *\
  \ FROM Person.Person\nWHERE LastName = 'O'Brien'\n```\n\n“O'Brien”中的撇号破坏了命令字符串，在“O'Brien”的“O”之后关闭了字符串。您的朋友\
  \ O'Brien 没有收到预期的数据，而是收到了一个令人费解的错误，并联系您的服务台以查明这个 Web 应用程序为何损坏。这是可能发生情况的最佳场景。用户耸耸肩，并向您的组织提交一个事件来修复此错误，以便他可以在没有奇怪错误消息的情况下搜索他的信息。\n\
  \n让我们考虑另一个例子，其中最终用户更懂技术并且更具恶意。她输入一个带撇号的字符串并返回一条错误消息。她没有向您报告错误，而是灵光一现，开始编写自己的 T-SQL，如清单\
  \ 2-3 所示。\n\n```\nDECLARE @CMD NVARCHAR(MAX);\nSELECT @CMD = 'SELECT * FROM Person.Person\n\
  WHERE LastName = ''';\nSELECT @search_criteria = 'Smith'' OR 1 = 1 AND '''' = ''';\n\
  SELECT @CMD = @CMD + @search_criteria;\nSELECT @CMD = @CMD + '''';\nEXEC sp_executesql\
  \ @CMD;\n清单 2-3.\n黑客如何开始对不安全的动态 SQL 使用 SQL 注入\n```\n\n这个狡猾的用户立即意识到该站点容易受到 SQL 注入攻击，并开始修改搜索参数，直到找到一个允许她从该表中提取所有个人数据的参数，而不仅仅是她自己的。通过在\
  \ `Smith` 后添加两个撇号，这位不速之客已返回到主 T-SQL 查询，并在末尾附加了 `OR 1 = 1`。最后，她在末尾添加了一些额外的撇号，以正确完成命令字符串并避免语法错误。生成的命令字符串如下：\n\
  \n```\nSELECT * FROM Person.Person\nWHERE LastName = 'Smith' OR 1 = 1 AND '' = ''\n\
  ```\n\n`Smith` 这个姓氏与攻击无关。通过添加一个始终为真的条件，黑客有效地绕过了 `WHERE` 子句，并获得了对表中所有数据的访问权限。仅用一条语句，这个黑客就窃取了数万行个人数据，并开始了一次数据泄露，这将对任何被其针对的组织造成巨大伤害！\n\
  \n如果用户名和密码提示是通过动态 SQL 管理的，那么类似的攻击将导致某人获得对未经授权使用的软件应用程序的访问权限。考虑清单 2-4 中的动态 SQL，它验证用户的\
  \ ID 和密码。\n\n```\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @id INT = 3;\nDECLARE\
  \ @password NVARCHAR(128) = '';\nSELECT @sql_command = '\nSELECT\n*\nFROM Person.Password\n\
  WHERE BusinessEntityID = ' + CAST(@id AS NVARCHAR(25)) + '\nAND PasswordHash = '''\
  \ + @password + ''''\nEXEC (@sql_command)\n清单 2-4.\n验证用户/密码组合的动态 SQL\n```\n\n任何不正确的密码猜测都将导致登录失败，并且不返回结果。但是，如果黑客尝试使用\
  \ SQL 注入来完全绕过登录验证怎么办？以下用于 `@password` 的字符串将足以完全使此安全检查失效：\n\n```\n''' OR 1 = 1 AND\
  \ '''' = '''\n```\n\n通过在条件中包含 `OR`，恶意用户可以找到使用任何用户登录的方法，甚至是管理员。由于这些登录从应用程序的角度看可能是合法的，因此这种攻击可能在为时已晚之前一直未被察觉。\n\
  \n类似地，`UNION ALL` 可以在不触发任何错误的情况下选择额外的数据，如清单 2-5 所示。\n\n```\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @id INT = 3;\nDECLARE @password NVARCHAR(128) = ''' UNION\
  \ ALL SELECT * FROM Person.Password WHERE '''' = ''';\nSELECT @sql_command = '\n\
  SELECT\n*\nFROM Person.Password\nWHERE BusinessEntityID = ' + CAST(@id AS NVARCHAR(25))\
  \ + '\nAND PasswordHash = ''' + @password + ''''\nEXEC (@sql_command)\n清单 2-5.\n\
  通过 SQL 注入使用 UNION ALL 来收集额外的安全数据\n```\n\n在此示例中，允许使用空白密码执行原始查询，但附加了一个额外的 `SELECT`\
  \ 语句，该语句返回 `Password` 表的全部内容。生成的命令字符串如下所示：\n\n```\nSELECT\n*\nFROM Person.Password\n\
  WHERE BusinessEntityID = 3\nAND PasswordHash = '' UNION ALL SELECT * FROM Person.Password\
  \ WHERE '' = ''\n```\n\n这要更难实现一些，因为两个表需要具有相同的结构，以便在第一个表的列与第二个表不匹配时防止语法错误。不过，如果有时间，黑客可以找到解决此问题的方法，例如向附加表中添加虚拟列、选择特定列或使用\
  \ `COLLATE` 来确保语言和区域设置匹配。在此处确定表名以利用它们是猜测的问题，但稍后您将了解黑客如何通过更隐蔽的方式确定它们的方法。\n\n涉及用户名/密码场景的类似攻击是使用注释来删除剩余的\
  \ T-SQL，以便用户名被验证，但密码不被验证。此数据库模式是假设的，但用例非常常见，如清单 2-6 所示。\n\n```\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @username NVARCHAR(128) = 'edward';\nDECLARE @password\
  \ NVARCHAR(128) = 'my_password';\nSELECT @sql_command = 'SELECT\n*\nFROM dbo.password\n\
  WHERE username = ''' + @username + ''' AND Password = ''' + @password + '''';\n\
  EXEC(@sql_command);\n清单 2-6.\n用户/密码验证语句\n```\n\n攻击者可能看到这里可能存在 SQL 注入，并尝试通过为用户名输入以下内容来完全移除密码因素：\n\
  \n```'administrator'' --'```\n\n得到的命令字符串显示，`WHERE`子句的剩余部分被注释掉了，从而绕过了密码检查：\n\n```SELECT\n\
  *\nFROM dbo.password\nWHERE username = 'administrator' --' AND Password = 'my_password'```\n\
  \n一个未闭合的注释分隔符 `/*` 可能会被尝试用于绕过多行查询，或那些已采取一些防护措施的查询。\n\n对于一个熟练的黑客来说，这仅仅是个开始。从这里起，他们可以开始测试你数据库的结构，了解表、存储过程、视图的名称，以及应用程序运行所使用的用户的安全权限。为了做到这一点，他们会不断改写搜索框的输入，试图获取更多信息，如代码清单\
  \ 2-7 所示。\n\n```DECLARE @CMD NVARCHAR(MAX);\nDECLARE @search_criteria NVARCHAR(1000);\n\
  SELECT @CMD = 'SELECT * FROM Person.Person\nWHERE LastName = ''';\nSELECT @search_criteria\
  \ = 'Smith''; SELECT * FROM sys.tables WHERE '''' = '''\nSELECT @CMD = @CMD + @search_criteria;\n\
  SELECT @CMD = @CMD + '''';\nEXEC sp_executesql @CMD;\n代码清单 2-7.\n从输入参数中闭合动态 SQL\
  \ 字符串以探测模式对象```\n\n经过对撇号的一番尝试，黑客已经弄明白了如何闭合搜索语句并开始一个属于自己的新语句。通过从 `sys.tables` 选择数据，他现在已经收集了数据库中所有表的列表。如果他无法访问系统视图，那么猜测仍然会产生一些结果，因为大多数数据库的对象名称在某种程度上是可预测的。更多的猜测会导致更高的风险，因为许多失败的\
  \ `TSQL` 语句或单个用户由此搜索产生的高活动量最终可能会引起怀疑。不幸的是，大多数公司没有时间或资源来持续监控和守护他们的网络日志。通常，这些漏洞在数据被盗后才被发现，为时已晚。\n\
  \n黑客的下一步将是识别感兴趣的特定表：那些包含密码、信用卡号或其他有价值数据的表。此外，他现在可以运行应用程序用户有权限执行的任何 `SQL` 语句，而不会产生进一步的错误，如代码清单\
  \ 2-8 所示。\n\n```DECLARE @CMD NVARCHAR(MAX);\nDECLARE @search_criteria NVARCHAR(1000);\n\
  SELECT @CMD = 'SELECT * FROM Person.Person\nWHERE LastName = ''';\nSELECT @search_criteria\
  \ = 'Smith''; SELECT * FROM Person.Password WHERE '''' = '''\nSELECT @CMD = @CMD\
  \ + @search_criteria;\nSELECT @CMD = @CMD + '''';\nEXEC sp_executesql @CMD;\n代码清单\
  \ 2-8.\n使用 SQL 注入自由收集密码数据```\n\n此时，黑客可以获取他能从数据库中收集的任何数据。如果你幸运的话，关键数据会被加密，这降低了立即访问敏感数据的可能性。然而，拥有这种级别的数据库访问权限，黑客可能能够收集足够的额外信息来访问其他系统，并最终解密那些数据。这是一个极好的例子，说明了为什么高权限账户（如\
  \ `sa`）绝不应在应用程序登录的上下文中使用。\n\n有一个最坏的情况，在近代历史中已经多次上演。如果黑客想要搞破坏，他可以利用新发现的数据库访问权限来删除数据、截断（truncate）或删除（drop）表，甚至从磁盘删除备份文件。他如何访问磁盘上的文件？如果你的服务器上启用了\
  \ `xp_cmdshell`，那么黑客可能能够使用它来访问从那里直接可访问的任何数据。他还可能调整服务器设置、更改数据库和服务器安全性、添加或删除用户等等。此时的限制只受限于你的想象力。\n\
  \n请在所有可从内部网络外部访问的数据库服务器上禁用 `xp_cmdshell`。作为额外的安全措施，在任何非绝对需要的地方禁用它！\n\n除了 `xp_cmdshell`，其他系统存储过程也应该限制其安全性。`xp_regread`、`xp_regwrite`、`xp_servicecontrol`、`xp_loginconfig`、`sp_addextendedproc`\
  \ 以及许多其他过程可以提供远超你期望的对服务器和操作系统的访问权限。务必要限制对这些过程的访问，以便任何不需要它们的用户无法使用它们。其他可能危险的函数包括\
  \ `HOST_NAME()`、`OPENQUERY()`、`OPENROWSET()`、`SHUTDOWN` 和 `KILL`。\n\n另一种使情况雪上加霜的情形是，黑客希望从他们的行动中获利。他们可能会试图敲诈你的公司，以图从其努力中获利：“付钱，否则就看着你珍贵的数据化为灰烬！”更复杂的情况是，黑客试图通过发起\
  \ `DDOS`（分布式拒绝服务）攻击来掩盖其数据盗窃行为。大量涌入的 Web/数据请求会压垮你的 Web 服务器，使你无暇顾及他们的真实意图。\n\n还有额外的\
  \ `SQL` 注入攻击被记录在案，其中黑客并未窃取数据、删除表或以其他方式立即暴露自己的存在。相反，她会利用新发现的访问权限修改网页代码，插入指向病毒、恶意软件或其他恶意代码的链接，这些恶意代码可以攻击任何访问该网页的人。这极大地扩展了攻击范围，并可能导致重大损害，直到目标意识到发生了什么，移除恶意代码，并修补最初的\
  \ `SQL` 注入目标。\n\n这些场景很可怕，但绝非睡前故事出了错。在本章的剩余部分，我们将讨论这种噩梦般的情况，包括你可以采取哪些步骤来缓解导致数据库服务器被外部人员渗透的每一个错误。\n\
  \n\n### 输入净化\n\n防范 SQL 注入的第一步是确保所有输入都是干净的，不会传入无效数据。这是开发人员（通过代码）和数据库管理员（通过 SQL）共同承担的责任。在理想的环境下，输入应在执行的各个阶段都得到净化。最初提示输入的网页或应用程序应努力确保不允许无效条目。一些常见的方法包括：\n\
  \n*   为用户生成自定义错误消息，提示其输入了无效字符或文本。\n*   剥离无效字符，并允许执行继续进行。\n*   为输入数据定义角色，如果条目不符合特定格式，则向用户抛出错误。例如，出生日期可以是\
  \ MMDDYYYY 格式，并禁止所有其他条目。\n*   实施一个软件框架，自动为你处理输入净化。\n\n这些努力将极大增强安全性，并确保最终用户能立即收到关于其输入数据的反馈。一个好的应用程序至少会实施其中一种保护措施，但很可能是几种。一个出色的应用程序会实施所有这些措施，即使这些努力看起来冗余或不必要。作为数据库专业人员，你会希望有这些保护措施，但不能依赖它们。确保所有传递到你的`TSQL`中的参数都以同样的勤勉程度进行净化，是你的责任。在软件应用程序的所有层上都这样做，可以在发生错误时确保最高级别的保护。\n\
  \nSQL Server 错误消息应始终在内部通过代码进行处理，永远不要暴露给最终用户。相反，应向他们提供友好的错误消息和报告说明。\n\n净化输入的最简单方法是在代码开头直接处理它们。为了使示例代码尽可能易于阅读，对于任何可重用代码，我们将继续使用存储过程。清单\
  \ 2-9 重新审视了之前的搜索，并在开头添加了一些基本的输入净化。\n\n```sql\nCREATE PROCEDURE dbo.search_people\n\
  (@search_criteria NVARCHAR(1000) = NULL) -- This comes from user input\nAS\nBEGIN\n\
  SELECT @search_criteria = REPLACE(@search_criteria, '''', '''''');\nDECLARE @CMD\
  \ NVARCHAR(MAX);\nSELECT @CMD = 'SELECT * FROM Person.Person\nWHERE LastName = ''';\n\
  SELECT @CMD = @CMD + @search_criteria;\nSELECT @CMD = @CMD + '''';\nPRINT @CMD;\n\
  EXEC sp_executesql @CMD;\nEND\nGO\nEXEC dbo.search_people 'Smith';\nEXEC dbo.search_people\
  \ 'O''Brien';\nEXEC dbo.search_people ''' SELECT * FROM Person.Password; SELECT\
  \ ''';\n```\n清单 2-9. 基本输入净化的搜索过程\n\n此存储过程在顶部包含一个补充：所有撇号实例都被替换为一对撇号。这保证了如果有人输入撇号，它们不会破坏字符串并导致立即错误或明显的\
  \ SQL 注入漏洞。三次执行的结果如下：\n\n```sql\nSELECT * FROM Person.Person\nWHERE LastName = 'Smith'\n\
  SELECT * FROM Person.Person\nWHERE LastName = 'O''Brien'\nSELECT * FROM Person.Person\n\
  WHERE LastName = ''' SELECT * FROM Person.Password; SELECT '''\n```\n\n在第一个例子中，输入了`Smith`，所有姓氏为`Smith`的人都像往常一样被返回。当一个姓`O'Brien`的人输入其姓氏时，撇号被加倍，搜索他的名字，并且结果正常找到，没有任何错误消息。当任何恶意用户试图访问数据库中的密码时，他们得到的是一个空的结果集。由于在所有情况下撇号都被加倍，这一串试图进行的\
  \ SQL 注入就变成了一个没有漏洞的无害字符串。\n\nSQL Server 有一个内置函数，其目的是确保字符串内容被正确分隔。`QUOTENAME`接受两个参数：要净化的字符串和将被验证的字符。清单\
  \ 2-10 中的存储过程与上面类似，但`REPLACE`操作已更新为使用`QUOTENAME`。\n\n```sql\nIF EXISTS (SELECT *\
  \ FROM sys.procedures WHERE procedures.name = 'search_people')\nDROP PROCEDURE search_people;\n\
  GO\nCREATE PROCEDURE dbo.search_people\n(@search_criteria NVARCHAR(1000) = NULL)\
  \ -- This comes from user input\nAS\nBEGIN\nDECLARE @CMD NVARCHAR(MAX);\nSELECT\
  \ @CMD = 'SELECT * FROM Person.Person\nWHERE LastName = ';\nSELECT @CMD = @CMD +\
  \ QUOTENAME(@search_criteria, '''');\nPRINT @CMD;\nEXEC sp_executesql @CMD;\nEND\n\
  GO\nEXEC dbo.search_people 'Smith';\nEXEC dbo.search_people 'O''Brien';\nEXEC dbo.search_people\
  \ ''' SELECT * FROM Person.Password; SELECT ''';\n```\n清单 2-10. 使用 QUOTENAME 实现的输入净化搜索过程\n\
  \n`QUOTENAME`为你处理了撇号净化，因此你不再需要用额外的撇号包裹命令字符串的姓氏部分。此存储过程的输出与上一个例子完全相同。每个姓名都用撇号正确分隔，以确保搜索条件不会导致任何错误发生的机会。除了撇号，`QUOTENAME`还可用于分隔方括号（`[`、`]`）以及引号（`\"\
  `）。\n\n\n\n### 参数化动态 SQL\n\n手动使用 `REPLACE` 或 `QUOTENAME` 清理输入，相比毫无防护是**巨大的进步**。这将有助于防范最常见的\
  \ SQL 注入攻击，但并不完美。手动输入清理确保某些字符组合被替换为更理想的选项，但其安全性仍取决于你是否在所有使用输入的地方都警惕地进行转义。这往往是一个手动过程，要求数据库开发者必须记住在所有的动态\
  \ SQL 语句中正确结合使用 `REPLACE` 或 `QUOTENAME`。\n\n一个更可靠的选择是将责任从开发者转移到 `sp_executesql`\
  \ 上。这个多功能的存储过程可以接受输入参数，并在执行过程中自动清理它们。考虑一下这个存储过程的新版本，如清单 2-11 所示。\n\n```\nIF EXISTS\
  \ (SELECT * FROM sys.procedures WHERE procedures.name = 'search_people')\nDROP PROCEDURE\
  \ search_people;\nGO\nCREATE PROCEDURE dbo.search_people\n(@search_criteria NVARCHAR(50)\
  \ = NULL) -- 此参数来自用户输入\nAS\nBEGIN\nDECLARE @CMD NVARCHAR(MAX);\nSELECT @CMD = 'SELECT\
  \ * FROM Person.Person\nWHERE LastName = @search_criteria';\nPRINT @CMD;\nEXEC sp_executesql\
  \ @CMD, N'@search_criteria\nNVARCHAR(1000)', @search_criteria;\nEND\nListing 2-11.\n\
  带参数的搜索过程\n```\n\n为 `sp_executesql` 进行参数化，其语法分为三部分：\n\n*   要执行的命令字符串 (`@CMD`)\n*\
  \   参数列表，包括每个参数的数据类型 (`N'@search_criteria NVARCHAR(1000)'`)\n*   从存储过程传入的参数 (`@search_criteria`)\n\
  \n此存储过程的结果与之前所有的输入清理示例相同。在这种情况下，`sp_executesql` 将自行处理清理工作，确保输入被正确分隔，而无需你提供任何进一步的指令。参数列表也可以存储为一个单独的变量。当参数很多、希望在执行前修改此列表，或者希望\
  \ `sp_executesql` 命令尽可能简短清晰时，这会非常有用。\n\n```\nIF EXISTS (SELECT * FROM sys.procedures\
  \ WHERE procedures.name = 'search_people')\nDROP PROCEDURE search_people;\nGO\n\
  CREATE PROCEDURE dbo.search_people\n(@search_criteria NVARCHAR(1000) = NULL) --\
  \ 此参数来自用户输入\nAS\nBEGIN\nDECLARE @CMD NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX)\
  \ = N'@search_criteria NVARCHAR(1000)';\nSELECT @CMD = 'SELECT * FROM Person.Person\n\
  WHERE LastName = @search_criteria';\nPRINT @CMD;\nEXEC sp_executesql @CMD, @parameter_list,\
  \ @search_criteria;\nEND\nListing 2-12.\n使用单独参数变量的参数化搜索过程\n```\n\n注意添加了变量 `@parameter_list`，它为存储输入参数列表提供了一个独立的位置。添加此参数是可选的，但有助于提高动态\
  \ SQL 执行语句的可读性。\n\n使用 `sp_executesql` 并将所有参数传递给它，可以确保所有输入都被正确分隔，从而防止通过这些输入进行 SQL\
  \ 注入攻击。\n\n参数列表字符串 (`@parameter_list`) 包含所有与动态 SQL 命令字符串内文本相对应的参数名称。输入参数 (`@search_criteria`)\
  \ 对应于从动态 SQL 外部单独传入的参数。两个列表中的参数名称可以不同，命名约定由你决定。但请保持一致性，以免让未来的开发者面对每一行 T-SQL 都感到困惑。\n\
  \n`sp_executesql` 语句中允许多少个参数？答案基于 SQL Server 内置的存储过程参数限制。任何存储过程的限制是 2100 个，但对于 `sp_executesql`，命令字符串和参数列表本身也算作参数，因此你实际上有\
  \ 2098 个参数的限制，这对于即使是最疯狂的程序员来说也应该是绰绰有余了！\n\n前面的例子展示了一个带单个参数的动态 SQL 语句。清单 2-13 展示了具有多个参数时的样子，并且内部和外部的名称是不同的。\n\
  \n```\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'search_people')\n\
  DROP PROCEDURE search_people;\nGO\nCREATE PROCEDURE dbo.search_people\n(@FirstName\
  \ NVARCHAR(50) = NULL,\n@MiddleName NVARCHAR(50) = NULL,\n@LastName NVARCHAR(50)\
  \ = NULL,\n@EmailPromotion INT = NULL)\nAS\nBEGIN\nDECLARE @CMD NVARCHAR(MAX);\n\
  DECLARE @parameter_list NVARCHAR(MAX) = N'@FirstName NVARCHAR(50), @MiddleName NVARCHAR(50),\
  \ @LastName NVARCHAR(50), @EmailPromotion INT';\nSELECT @CMD = 'SELECT * FROM Person.Person\n\
  WHERE 1 = 1';\nIF @FirstName IS NOT NULL\nSELECT @CMD = @CMD + '\nAND FirstName\
  \ = @FirstName'\nIF @MiddleName IS NOT NULL\nSELECT @CMD = @CMD + '\nAND MiddleName\
  \ = @MiddleName'\nIF @LastName IS NOT NULL\nSELECT @CMD = @CMD + '\nAND LastName\
  \ = @LastName'\nIF @EmailPromotion IS NOT NULL\nSELECT @CMD = @CMD + '\nAND EmailPromotion\
  \ = @EmailPromotion';\nPRINT @CMD;\nEXEC sp_executesql @CMD, @parameter_list, @FirstName,\
  \ @MiddleName, @LastName, @EmailPromotion;\nEND\nListing 2-13.\n具有多个可选参数的搜索过程\n\
  ```\n\n这个搜索存储过程有一些有趣的变化。首先，现在有四个参数传入存储过程。注意 `sp_executesql` 命令的语法：首先是命令字符串，然后是内部参数列表，接着是每个单独传入的参数。确保每个列表中的参数顺序匹配至关重要；否则，你可能会将名字传成姓氏，或者更糟，在期望整数的地方传入了字符串。\n\
  \n这个存储过程的第二个显著变化是所有参数都是可选的。为了实现这一点，`WHERE 1 = 1` 是第一个 `WHERE` 子句，后面跟着每个参数条件。这确保了如果所有参数都是\
  \ `NULL`，你不会剩下一个悬空的 `WHERE` 关键字而后面没有任何子句；否则将导致错误。考虑以下存储过程的执行：\n\n```\nEXEC dbo.search_people\
  \ 'Edward', 'H', 'Johnson', 1\nEXEC dbo.search_people 'Edward', NULL, NULL, 1\n\
  EXEC dbo.search_people\n```\n\n第一个例子提供了所有参数的值，将从 `Person.Person` 表返回一行。TSQL 命令字符串将如下所示：\n\
  \n```\nSELECT * FROM Person.Person\nWHERE 1 = 1\nAND FirstName = @FirstName\nAND\
  \ MiddleName = @MiddleName\nAND LastName = @LastName\nAND EmailPromotion = @EmailPromotion\n\
  ```\n\n第二个例子将中间名和姓氏设为 `NULL`，得到的命令字符串是：\n\n```\nSELECT * FROM Person.Person\nWHERE\
  \ 1 = 1\nAND FirstName = @FirstName\nAND EmailPromotion = @EmailPromotion\n```\n\
  \n最后一个例子没有提供任何参数，并说明了 `WHERE 1 = 1` 占位符的重要性，当你不知道会提供哪些参数（如果有的话）时，它能保持良好的语法结构：\n\n\
  ```\nSELECT * FROM Person.Person\nWHERE 1 = 1\n```\n\n在任何大型应用程序中，如果你搜索的表包含数千（或数百万）行，你可能不希望允许这样的空搜索。通常要求至少一个搜索参数是有益的，这可以防止用户盲目地返回所有数据。将数据库返回的行数限制在一个相对较小的数字也是值得的。常见的默认值包括\
  \ 10、25、50 和 100，这确保你永远不会无意中允许用户一次查询表中的数百万行。\n\n\n\n仅使用 `sp_executesql` 并不足以确保防御\
  \ SQL 注入攻击。所有参数必须如最后几个示例所示，明确地传递到 `sp_executesql` 中。如果参数直接拼接到命令字符串中而未传递到 `sp_executesql`，这些输入将可能通过利用撇号（如先前演示以及本章后续示例所示）而遭受\
  \ SQL 注入攻击。务必确保用户没有机会在未进行适当输入清洗的情况下，将其搜索文本直接并入命令字符串！\n\n#### 模式名与方括号\n\n此惯例同样适用于编写标准\
  \ SQL 和动态 SQL。当查询动态定义的数据库对象（如表、视图、列或存储过程）时，您无法对这些数据库对象进行参数化。缺乏这种保护，您的 TSQL 将面临潜在的\
  \ SQL 注入攻击风险。请思考清单 2-14 中的 TSQL 查询。\n\n```sql\nDECLARE @table_name SYSNAME = 'ErrorLog';\n\
  DECLARE @CMD NVARCHAR(MAX);\nSELECT @CMD = 'SELECT * FROM ' + @table_name;\nPRINT\
  \ @CMD;\nEXEC sp_executesql @CMD;\n```\n\n清单 2-14. 无 SQL 注入防护的动态表查询\n\n执行此代码将返回\
  \ `ErrorLog` 表中的所有行。与之前的示例类似，这个在运行时定义要查询的表的查询，很容易成为 SQL 注入的目标。以下针对 `@table_name`\
  \ 的恶意输入将导致除了 `ErrorLog` 表之外，`Person.Password` 表的内容也被返回给用户：\n\n```sql\n'ErrorLog;\
  \ SELECT * FROM Person.Password WHERE '''' = ''''';\n```\n\n一个简单的防御方法是显式包含模式名（即使是默认模式）。此外，为所有对象加上方括号，这将进一步限定\
  \ SQL 语句并限制攻击者的能力。\n\n```sql\nDECLARE @table_name SYSNAME = 'ErrorLog; SELECT *\
  \ FROM Person.Password WHERE '''' = ''''';\nDECLARE @CMD NVARCHAR(MAX);\nSELECT\
  \ @CMD = 'SELECT * FROM [dbo].[' + @table_name + ']';\nPRINT @CMD;\nEXEC sp_executesql\
  \ @CMD;\n```\n\n清单 2-15. 添加了模式和方括号的动态表查询\n\n执行这个新版本将产生如下命令字符串：\n\n```sql\nSELECT\
  \ * FROM [dbo].[ErrorLog; SELECT * FROM Person.Password WHERE '' = '']\n```\n\n\
  执行该 TSQL 将在运行时导致错误：\n\n```sql\nMsg 208, Level 16, State 1, Line 142\nInvalid object\
  \ name 'dbo.ErrorLog; SELECT * FROM Person.Password WHERE '' = '''.\n```\n\n添加模式名和使用方括号限定，使这个简单的\
  \ SQL 注入尝试失败了。假设错误消息被应用程序捕获并返回一个友好的错误，用户将无法确切知道发生了什么。当然，这并非万无一失，非常执着的黑客会继续尝试输入各种命令字符串，直到他们摸清规律并尝试以下输入：\n\
  \n```sql\n'ErrorLog]; SELECT * FROM [Person].Password'\n```\n\n通过闭合方括号，然后用他们的表名重新打开方括号，他们成功绕过了针对此查询的安全防护。虽然您可以采取进一步措施来复杂化命令字符串以挫败潜在的黑客，但这仍然会涉及安全风险。\n\
  \n如前所述，任何未使用 `sp_executesql` 对所有输入进行参数化的命令字符串，都可能容易受到 SQL 注入攻击。一般来说，除非您确定不会有外部访问此系统，否则应避免将数据库对象用作动态\
  \ SQL 参数。无论面向何种用户，都应使用 `QUOTENAME` 来正确限定您的参数。虽然它们无法直接传递到 `sp_executesql`，但这至少能确保它们不会像之前展示的那样被利用。\n\
  \n对于仅供 DBA 或开发人员使用的内部过程，这类动态 SQL 语句是合理的，但仍应谨慎。一旦任何未知方（如非技术部门、终端用户或整个互联网）能够访问，风险级别将急剧上升。在以任何形式向外部方提供存储过程之前，务必考虑您的受众，并确保他们无法利用您的代码。即使这些过程是内部使用且被认为安全，运用每一种安全预防措施和\
  \ TSQL 最佳实践仍然至关重要。看似不太可能发生的事件，如恶意用户、心怀不满的员工或社会工程攻击，其发生频率之高，足以在任何情况下都不应被视为无关紧要。\n\
  \n#### 有效间距\n\n清单 [2-6 中的示例展示了一种场景：攻击者利用注释移除了登录脚本中的密码检查。此漏洞的主要原因是缺乏参数化或输入清洗，但次要原因是整个\
  \ `WHERE` 子句位于单行上。\n\n我不确定是什么驱使任何人将动态 SQL 全部或大部分写在一行上，但这除了使其难以阅读外，还增加了 SQL 注入被用于攻击编写不当的查询的方式。以与标准\
  \ SQL 相同的格式和细致程度来编写动态 SQL，不仅会使其更易于维护，而且还将从攻击者的武器库中移除一种非常简单的 SQL 注入攻击方法。\n\n#####\
  \ 正确输入类型\n\n除了清洗输入外，始终为输入使用正确的数据类型也很重要。SQL 注入专门针对字符串输入，可以在其中插入撇号和恶意的 SQL 代码。非文本数据类型，如\
  \ `BIT`、`INT` 或 `DATETIME`，不能成为 SQL 注入的目标。\n\n一些应用程序为了方便，将所有（或大多数）输入参数编写为字符串。使用字符串时，在将它们与动态\
  \ SQL 命令字符串拼接时，无需强制转换或转换为字符串。虽然这可能会略微减少开发时间，但它增加了理论上可能遭受 SQL 注入的输入数量。\n\n如果正在评估的任何数据类型本质上不是字符串，请确保它至少在传递到您的存储过程之前存储为非字符串类型。一旦执行将这些参数传递到\
  \ TSQL 中，它们就可以被强制转换为字符串并在动态 SQL 中使用，而不会有 SQL 注入的风险。如果需要，可以在存储过程中声明字符串变量，然后用上述转换后的类型填充。由于转换是\
  \ SQL Server 内部的，与存储过程外部无关，因此它也免受 SQL 注入的影响。\n\n务必确保数据类型正确。将值存储为非字符串类型可确保它们不会成为\
  \ SQL 注入的目标。\n\n同样，确保应用程序始终验证输入，以确保它们符合预期类型。作为字符串传递到 TSQL 语句中的整数可能允许将算术运算安全地嵌入字符串中。如果恶意用户意识到他们可以将\
  \ `\"5\"` 替换为 `\"5 + 1\"`，那么他们会立即开始探测其他非字符串输入，以确定它们是否被盲目转换为字符串。参数从用户输入的那一刻起，直到被存储过程使用，都应该具有正确的类型。这可以防止任何被操纵的机会，此外还能降低复杂性和开发人员因混淆数据类型而犯错的可能性。\n\
  \n\n\n### 盲注 SQL 注入\n\n即使黑客无法通过 SQL 注入获得对数据库服务器的完全访问权限，他们仍然可以利用某些查询元素来逐步获取有关服务器、其安全设置和数据的信息。这可以通过前面演示的\
  \ SQL 注入方法实现，也可以通过修改直接传递给应用程序的 URL 或其他数据来实现。\n\n这种攻击最简单的例子是修改 HTTP 字符串以查看用户原本无法访问的数据，例如用户个人资料、私人图片或即将进行的旅行计划。这种攻击几乎不需要\
  \ TSQL 知识，因此非常常见，通常是针对 Web 应用程序的首批尝试之一。防范这些数据窃取尝试的方法是确保网页本身不允许 URL 被随意修改。此外，如果对所有访问敏感数据的请求都验证用户、客户端或\
  \ Web 浏览器数据，那么拒绝未授权访问就会变得容易得多。\n\n如果黑客能通过动态 SQL 获得部分 SQL Server 访问权限，但受到安全限制，他们可以利用有限的权限探测服务器，逐步发现限制、安全设置、数据元素等。他们会发送\
  \ `IF` 语句形式的请求，这些语句的求值结果为真或假。或者，恶意用户可能提出导致错误消息的问题，从而根据语句是否抛出错误来判断结果。`TRY/CATCH`\
  \ 可用于管理错误消息，从而减少这些查询对 Web 或数据库日志的影响。还可以使用延迟，根据响应完成所需的时间来帮助诊断响应。即使显示的是友好错误信息，该信息也能确认他们拥有足够的权限来查询服务器信息并且成功了。\n\
  \n清单 2-16 展示了一些可能针对易受攻击的服务器发起的盲注 SQL 查询的简单示例。\n\n```\nIF CURRENT_USER = 'dbo' SELECT\
  \ 1 ELSE SELECT 0;\nIF @@VERSION LIKE '%12.0%' SELECT 1 ELSE SELECT 0;\nIF (SELECT\
  \ COUNT(*) FROM Person.Person WHERE FirstName = 'Edward' AND LastName = 'Pollack')\
  \ > 0\nWAITFOR DELAY '00:00:05'\nELSE\nWAITFOR DELAY '00:00:00';\nBEGIN TRY\nDECLARE\
  \ @sql_command NVARCHAR(MAX);\nSELECT @sql_command = 'SELECT COUNT(*) FROM dbo.password;'\n\
  EXEC (@sql_command)\nEND TRY\nBEGIN CATCH\nSELECT 0\nEND CATCH;\n清单 2-16.\n可能在盲注\
  \ SQL 注入攻击中使用的示例查询\n```\n\n前三个例子使用基本的“是/否”问题来尝试了解服务器信息。最后一个例子则更隐蔽，涉及创建额外的动态 SQL\
  \ 来进一步探测数据库对象，而在此过程中不会引发数据库错误。如果存在语法错误，`TRY/CATCH` 就不起作用，因此查询无效表会返回错误消息。注入或追加额外的动态\
  \ SQL 可以让攻击者验证表的存在，而不会导致语法或解析错误。\n\n盲注是一种较慢的攻击方法，但随着时间的推移，它可以揭示系统的关键数据。每个查询都揭示一小块信息，在拥有足够数据后，黑客可能能够更改/绕过安全限制，从而像没有采取任何安全预防措施一样执行查询。\n\
  \n### 检测与预防\n\n预防是防止 SQL 注入的最佳方式，但和任何大型软件系统一样，总会存在一些早于你编写的代码，其中可能包含安全漏洞。我们如何防御现有的威胁，或者那些我们尚未识别的威胁呢？\n\
  \n#### 安全测试\n\n对于公司而言，让第三方供应商对其应用程序进行渗透测试已成为一项常规安全任务。这为公正的外部来源提供了一个机会，来探测你的环境中是否存在任何\
  \ SQL 注入（或其他漏洞）的常见迹象。或者，如果你有自己的工具集足以胜任，这些测试也可以内部进行。这是发现非常规、老旧或隐藏漏洞的绝佳方法。\n\n这类测试通常是为了满足合规标准而必须进行的，例如\
  \ HIPAA（健康保险流通与责任法案）。如果你在一家公司或一个行业中工作，其软件存储了敏感数据，请进行必要的研究，以确保你的安全测试和验证符合你所在行业的合规标准。如果你与其他国家的客户开展业务，可能还需要满足额外的合规要求。\n\
  \n检测 SQL 注入漏洞最常见的方法包括：盲目地用各种注入语句填充应用程序输入，试图生成应用程序错误或诱导网页产生异常的 HTTP 响应。例如，执行一组有效的搜索并测量响应时间。接下来，向应用程序提供\
  \ SQL 注入语句。通过比较这些响应时间，可以判断注入的 SQL 是否被执行了。\n\n检查错误消息也很常见。如果一组典型的 SQL 注入语句能导致异常的应用程序或\
  \ SQL 错误，那么就存在进一步被利用的可能性。\n\n重要的是要理解，虽然安全公司拥有各种工具来防御 SQL 注入攻击，但黑客也拥有自己的一套类似工具。只要能证明存在任何安全漏洞，无论其可能性多小或多隐蔽，黑客都很可能最终会发现并立即加以利用。\n\
  \n#### 应用程序流量扫描\n\n可以部署轻量级监视器来扫描传入流量，查找异常的数据模式。例如，从预期仅发送文本的应用程序中，是否有常见的 SQL 命令或语法被发送到你的数据库服务器？搜索分号、撇号或\
  \ TSQL 关键字（如 `SELECT`、`WHERE` 和 `FROM`）是定位和管理黑客攻击来源的有效方法。\n\n虽然这些扫描可能非常有用，但其价值完全取决于有效信息与干扰信息的比例。捕获\
  \ SQL 注入攻击的需求需要与应用程序流量中可能存在常见 SQL 字符或关键字的可能性进行权衡。实际上，任何对互联网开放的应用程序都会被黑客盲目地针对常见漏洞进行攻击。\n\
  \n如果是这种情况，那么就需要你来确定正常一天的流量基线（在没有任何实际攻击发生的情况下）。一旦建立，你就可以将警报限制在可疑活动足够多、需要你进一步调查的场景。\n\
  \n\n#### 日志审查\n\n与监控网络、应用程序或数据库流量类似，您可以定期扫描 Web 日志、应用程序日志或数据库错误日志，以确定是否有任何异常或值得关注的活动发生。可以进行与应用程序流量类似的搜索，结果可以随时间进行趋势分析，从而生成关于\
  \ SQL 注入尝试、常见目标和来源的概览。\n\n利用这些数据，您可以审查最常见的目标，并确保它们不易受 SQL 注入攻击。此外，您可以分析攻击来源，以确定是否存在任何模式。许多公司会阻止来自特定国家、域名或\
  \ IP 范围的 Web 流量，以便在不影响合法终端用户活动的情况下消除风险。\n\n请注意，出于安全考虑，密码更改请求默认情况下不会被记录。因此，如果注入的\
  \ TSQL 语句包含 `sp_password`，它们将避开 SQL Server 日志（尽管在应用程序或 Web 日志中它们仍会正常显示）。有许多可用的方法来审核密码更改，其中一些将在第\
  \ 4 章中介绍。\n\n#### 代码审查\n\n所有新的应用程序代码都应遵循一个审查流程，由经验丰富的开发人员进行审查，并且所有 TSQL 都应由数据库管理员进行审查。如果数据库脚本包含动态\
  \ SQL，则可以重点关注，确保不存在 SQL 注入漏洞。即使审查快速且有针对性，也有可能发现并修复任何重大问题。即使只发现了一个漏洞，该流程本身在消除该漏洞方面也是完全合理的。\n\
  \n对于更大、更旧的应用程序，对现有代码进行顺序审查可以提供额外的防御层以抵御攻击。虽然审查所有现有代码听起来很耗时，但您可以通过基于常见错误的存在进行过滤来大大减少审查量。例如，对于\
  \ SQL 注入审查，您可以特别筛选出数据库脚本/对象，并仅审查那些包含 `EXEC`、`sp_executesql` 或 `xp_cmdshell` 的脚本/对象。\n\
  \n#### 软件补丁\n\n务必保持您的服务器处于最新状态！除了 SQL Server，还要及时更新您的操作系统、应用软件以及任何常用工具或框架的服务包和补丁。许多常用软件产品中每天都会发现漏洞，其中一些可能允许对您的数据进行未授权访问。\n\
  \n虽然 SQL 注入通常与动态 SQL 相关联，但过去也曾发现过一种漏洞，即看似合法的 HTTP 或命令字符串从 Web 或其他应用程序直接传递到您的应用程序中。抵御此类意外攻击最现成的方法是定期审查应用程序的补丁说明。如果发现任何相关的安全漏洞，请立即修补。\n\
  \n#### 限制 URL 长度\n\n如前所述，恶意的 SQL 或应用程序请求有可能通过 HTTP 请求传递到应用程序中。如果 URL 过长，某些 Web 服务器可能不会记录完整的\
  \ URL。这是黑客可能探测您的系统漏洞而其行为不会立即被注意到的一种方式。他们可以创建一个异常长的 URL，希望它要么被截断，要么根本不被记录。\n\n大多数\
  \ Web 服务器允许您设置允许的 URL 字符串长度限制，除非任何应用程序需要长 URL，否则设置该限制是有益的。虽然您可以选择任何限制值，但 2048 个字符是常见的。与安全策略一样，只允许您的应用程序正常运行（包括未来增长）所必需的长度。\n\
  \n例如，在 Microsoft IIS 中，当设置了此限制时，较长的 URL 将向客户端返回一个 404 错误，不提供进一步的详细信息。但是，服务器日志将包含有关请求被阻止原因的附加信息，以便您可以识别潜在威胁：\n\
  \n*   `404.10: 请求标头过长`\n*   `404.13: 内容长度过长`\n*   `404.14: URL 过长`\n*   `404.15:\
  \ 查询字符串过长`\n\n#### 对敏感数据使用视图和/或脱敏\n\n当需要访问加密的敏感数据时（如密码或信用卡号码），考虑仅向提供这些查询所需最少字段的视图授予权限。拒绝直接访问关键表，可以消除黑客访问它们并利用\
  \ SQL 注入渗透其中的能力。\n\n例如，一个密码表可能包含各种信息，不仅可能泄露密码哈希细节，还可能泄露密码策略、用户名、锁定的账户、最近登录时间等。应用程序可能只需要访问加密的密码（或哈希）和用于身份验证的数据（例如用户\
  \ ID）。\n\nSQL Server 2016 包含一项新的安全功能：动态数据脱敏。这对于需要部分敏感数据的任何场景都非常有效，例如社会安全号码或信用卡号码的最后四位数字。对于没有\
  \ `UNMASK` 权限的用户，敏感数据的预定部分将被模糊处理。这一额外的数据混淆层提供了额外的防御，防止未授权用户获取您重要数据的完整详情。\n\n数据脱敏虽然方便，但并非设计为一种坚固的安全功能。截至\
  \ SQL Server 2016 CTP 2.1，可以通过使用 `CAST` 将列转换为其基础数据类型来部分取消脱敏数据，这会部分破解该过程并将其恢复为默认脱敏状态。还存在一些其他技巧，涉及将脱敏表与辅助表连接，并在从结果连接中选择数据时取消数据脱敏。这些漏洞很可能在\
  \ SQL Server 2016 的正式发布版中得到修复，但目前它们是合理的担忧。\n\n尽管存在这些限制，动态数据脱敏仍然是保护关键数据这座“保险库”的另一道锁，它要么会阻止黑客继续尝试，要么会足够地减慢他们的速度，让您的安全团队有额外的时间正面应对威胁。当只需要数据验证而不需要完全访问该数据时，这是一个绝佳的工具，可以只提供所需的内容，不多不少。\n\
  \n### 结论\n\nSQL 注入是贯穿应用程序开发生命周期中最常被利用的漏洞之一。事实上，许多政府、企业和独立调查都持续将 SQL 注入列为整个计算领域的\
  \ **头号** 漏洞。这显然是一个非常严肃的话题，也是在设计、开发、测试、部署和维护软件应用程序时必须时刻牢记的一点。\n\n防范 SQL 注入最简单有效的方法是积极主动地编写安全的\
  \ T-SQL 和代码。思考用户输入将如何整合到搜索参数中，并最终用于数据库查询。一旦定位到这些敏感区域，就要通过多层次的安全措施来处理。实施 `sp_executesql`\
  \ 是一个良好的开端，但结合输入验证、参数化和显式架构引用会更加有效。根据你的应用程序，尽可能多地采取额外步骤，因为每一步都是为你的数据保险库加的一把锁。\n\n\
  如果管理层质疑这些额外步骤所需的时间和精力，请随时向他们解释你正在应对的漏洞。列出潜在的威胁以及它们一旦成为现实的后果。安全常常被视为一种不便，但作为数据库专业人员，证明其必要性并确保你的数据尽可能安全是你的责任。永远不要让关乎安全的“正确”做法与发布日期、效率或资源纠缠在一起。忽视这些相对简单的开发步骤，其后果之严重，不容忽视。\n\
  \n第 4 章将更详细地讨论安全问题。SQL 注入如此重要，值得在 SQL Server 安全层级中占据一个独立而特殊的位置。从长远来看，记录你的安全努力及其所应对的威胁，其价值将不言自明。\n\
  \n# 3. 大规模搜索\n\n实现动态 SQL 最常见、最通用且最有用的场景之一是在执行复杂搜索时。想想你喜欢的网站以及它们各自提供的搜索功能。有些搜索可能很简单：你前往右上角的单个文本框，输入一些文字，然后获得结果。其他的搜索——例如搜索酒店、航班或租车——可能涉及数十个（甚至更多）可选参数。动态\
  \ SQL 可以让你精简搜索查询，只处理必要的部分。此外，你还可以高度自定义搜索以及返回的数据。你甚至可以分析输入，根据其结构来确定正确的操作步骤。\n\n###\
  \ 为何使用动态搜索？\n\n假设你想在产品表中进行搜索，但在此过程中需要将这些数据与其他表连接起来。根据应用程序的不同，涉及的表数量可能很少，也可能非常庞大。以酒店搜索为例，如果你想针对每一个可能的搜索参数进行查询，很可能需要连接\
  \ 50 张表。清单 3-1 是一个相对较小的产品搜索示例，它可以从使用动态 SQL 中受益。\n\n```sql\nCREATE PROCEDURE dbo.search_products\n\
  @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model\
  \ NVARCHAR(50) = NULL,   @product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode\
  \ NVARCHAR(50) = NULL, @product_weightunitmeasurecode NVARCHAR(50) = NULL\nAS\n\
  BEGIN\nSET NOCOUNT ON;\nSET @product_name = '%' + @product_name + '%';\nSET @product_number\
  \ = '%' + @product_number + '%';\nSET @product_model = '%' + @product_model + '%';\n\
  SELECT\nProduct.Name AS product_name,\nProduct.ProductNumber AS product_number,\n\
  ProductModel.Name AS product_model_name,\nProductSubcategory.Name AS product_subcategory_name,\n\
  SizeUnitMeasureCode.Name AS size_unit_measure_code,\nWeightUnitMeasureCode.Name\
  \ AS weight_unit_measure_code\nFROM Production.Product\nLEFT JOIN Production.ProductModel\n\
  ON Product.ProductModelID = ProductModel.ProductModelID\nLEFT JOIN Production.ProductSubcategory\n\
  ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID\nLEFT\
  \ JOIN Production.UnitMeasure SizeUnitMeasureCode\nON Product.SizeUnitMeasureCode\
  \ = SizeUnitMeasureCode.UnitMeasureCode\nLEFT JOIN Production.UnitMeasure WeightUnitMeasureCode\n\
  ON Product.WeightUnitMeasureCode = WeightUnitMeasureCode.UnitMeasureCode\nWHERE\
  \ (Product.Name LIKE @product_name OR @product_name IS NULL)\nAND (Product.ProductNumber\
  \ LIKE @product_number OR @product_number IS NULL)\nAND (ProductModel.Name LIKE\
  \ @product_model OR @product_model IS NULL)\nAND (ProductSubcategory.Name = @product_subcategory\
  \ OR @product_subcategory IS NULL)\nAND (SizeUnitMeasureCode.Name = @product_sizemeasurecode\
  \ OR @product_sizemeasurecode IS NULL)\nAND (WeightUnitMeasureCode.Name = @product_weightunitmeasurecode\
  \ OR @product_weightunitmeasurecode IS NULL);\nEND\n```\n清单 3-1.\n带六个可选参数的搜索存储过程（未使用动态\
  \ SQL）\n\n此存储过程用于搜索产品，并提供了多种搜索选项供用户选择。用户输入中可以提供或省略产品名称、产品编号、产品型号、产品子类别、尺寸度量和重量度量。在此特定示例中，假设产品名称、产品编号和产品型号是通配符搜索，因此在传入参数后为每个参数添加了\
  \ `%`。其他参数假设是从预先填充的菜单中选择的，确保传入的值是精确的，因此无需将它们转换为通配符搜索。\n\n对于此搜索，无论传入的参数如何，我们都将始终返回相同的六个列。因此，我们对所有参与连接的表使用\
  \ `LEFT JOIN`，以确保每个产品都有一行数据，即使任何连接条件为 `NULL`。为了确保未使用的参数不会遗漏结果，所有 `WHERE` 子句中都添加了一个额外的检查，使得如果输入为\
  \ `NULL`，该检查将评估为 true。由此产生的逻辑允许你选择以下情况之一：\n\n*   参数来自用户输入，应针对相应的列进行评估。`NULL` 检查评估为\
  \ `FALSE`，并且不影响此逻辑。\n*   参数未从用户处传入，因此针对它的比较无关紧要。相反，`NULL` 检查评估为 true，这意味着整个 `WHERE`\
  \ 子句评估为 `TRUE`。\n\n以下三个示例说明了其工作原理：\n\n\n### 动态 SQL 示例：带可选参数的存储过程\n\n#### 参数搜索示例\n\
  \n```\nEXEC dbo.search_products @product_number = 'BK-M18', @product_model = 'Mountain',\
  \ @product_subcategory = 'Mountain Bikes';\n```\n\n在此搜索中，提供了三个参数，您将搜索产品编号包含 `BK-M18`、产品型号包含单词\
  \ \"Mountain\" 且必须属于 \"Mountain Bikes\" 子类别的任何产品。其余三个参数不参与 `WHERE` 子句的构造，而是用于第二个\
  \ `NULL` 检查的评估。返回了十个符合这些规格的结果。\n\n```\nEXEC dbo.search_products @product_name =\
  \ 'Mountain-500 Black, 48';\n```\n\n在这里，用户确切知道要查找的内容，并输入了特定的产品名称。所有其他参数均为 `NULL`，并从搜索逻辑中丢弃。返回一行包含其搜索的产品。\n\
  \n```\nEXEC dbo.search_products;\n```\n\n在此最后一个示例中，用户未输入任何搜索条件，仅运行了一个空搜索。存储过程允许这样做；它返回了所有产品。所有输入均为\
  \ `NULL`，因此它们绕过了 `WHERE` 子句谓词。\n\n#### 讨论与动态 SQL 介绍\n\n回顾这个存储过程时，它是准确的，返回了预期的结果，但也有些冗长，并且为了达成目标评估了相当多的\
  \ `WHERE` 子句谓词。无论提供什么参数，所执行的 T-SQL 都非常相似，这在评估许多参数时可能会成为问题。\n\n随着业务逻辑随时间增长并变得更加复杂，这些查询无疑也会增长并增加规模和复杂性。一个简单的单列\
  \ `LEFT JOIN` 可能不再足以处理这个新逻辑。`WHERE` 子句可能会附加更多选项，例如能够进行通配符搜索、相等搜索、包含 `AND/OR` 逻辑等。虽然这个存储过程可能会随着时间的推移而不断增长以涵盖所有这些新需求，但您绝对不希望最终执行的\
  \ T-SQL 无限增长。当您连接数十个表、发出子查询、运行存在性检查以及构造复杂的 `WHERE` 子句时，性能将成为问题。而这正是动态 SQL 的用武之地！有关使用参数限制连接的示例，请参见清单\
  \ 3-2。\n\n#### 使用动态 SQL 的存储过程实现\n\n```\nIF EXISTS (SELECT * FROM sys.procedures\
  \ WHERE procedures.name = 'search_products')\nBEGIN\nDROP PROCEDURE dbo.search_products;\n\
  END\nGO\nCREATE PROCEDURE dbo.search_products\n@product_name NVARCHAR(50) = NULL,\
  \ @product_number NVARCHAR(25) = NULL, @product_model NVARCHAR(50) = NULL,\n@product_subcategory\
  \ NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50) = NULL,\n@product_weightunitmeasurecode\
  \ NVARCHAR(50) = NULL\nAS\nBEGIN\nSET NOCOUNT ON;\nSET @product_name = '%' + @product_name\
  \ + '%';\nSET @product_number = '%' + @product_number + '%';\nSET @product_model\
  \ = '%' + @product_model + '%';\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list\
  \ NVARCHAR(MAX) = '@product_name NVARCHAR(50), @product_number NVARCHAR(25),\n@product_model\
  \ NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode NVARCHAR(50),\n\
  @product_weightunitmeasurecode NVARCHAR(50)';\nSELECT @sql_command = '\nSELECT\n\
  Product.Name AS product_name,\nProduct.ProductNumber AS product_number,\nProductModel.Name\
  \ AS product_model_name,\nProductSubcategory.Name AS product_subcategory_name,\n\
  SizeUnitMeasureCode.Name AS size_unit_measure_code,\nWeightUnitMeasureCode.Name\
  \ AS weight_unit_measure_code\nFROM Production.Product\nLEFT JOIN Production.ProductModel\n\
  ON Product.ProductModelID = ProductModel.ProductModelID\nLEFT JOIN Production.ProductSubcategory\n\
  ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID\nLEFT\
  \ JOIN Production.UnitMeasure SizeUnitMeasureCode\nON Product.SizeUnitMeasureCode\
  \ = SizeUnitMeasureCode.UnitMeasureCode\nLEFT JOIN Production.UnitMeasure WeightUnitMeasureCode\n\
  ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode\nWHERE 1\
  \ = 1'\nIF @product_name IS NOT NULL\nSELECT @sql_command = @sql_command + '\nAND\
  \ Product.Name LIKE @product_name'\nIF @product_number IS NOT NULL\nSELECT @sql_command\
  \ = @sql_command + '\nAND Product.ProductNumber LIKE @product_number'\nIF @product_model\
  \ IS NOT NULL\nSELECT @sql_command = @sql_command + '\nAND ProductModel.Name LIKE\
  \ @product_model'\nIF @product_subcategory IS NOT NULL\nSELECT @sql_command = @sql_command\
  \ + '\nAND ProductSubcategory.Name = @product_subcategory'\nIF @product_sizemeasurecode\
  \ IS NOT NULL\nSELECT @sql_command = @sql_command + '\nAND SizeUnitMeasureCode.Name\
  \ = @product_sizemeasurecode'\nIF @product_weightunitmeasurecode IS NOT NULL\nSELECT\
  \ @sql_command = @sql_command + '\nAND WeightUnitMeasureCode.Name = @product_weightunitmeasurecode'\n\
  PRINT @sql_command;\nEXEC sp_executesql @sql_command, @parameter_list, @product_name,\
  \ @product_number,\n@product_model, @product_subcategory, @product_sizemeasurecode,\
  \      @product_weightunitmeasurecode\nEND\n```\n清单 3-2. 使用动态 SQL 的带六个可选参数的搜索存储过程\n\
  \n#### 动态 SQL 优势说明\n\n此存储过程使用动态 SQL 为您提供对 `WHERE` 子句的完全控制。现在，您不再总是对所有列进行六次检查，而是在提供相关参数时才包含相应的检查。考虑之前的第一个示例：\n\
  \n```\nEXEC dbo.search_products @product_number = 'BK-M18', @product_model = 'Mountain',\
  \ @product_subcategory = 'Mountain Bikes';\n```\n\n之前，搜索使用了所有六个 `WHERE` 子句部分（每个参数一个），即使某些参数为\
  \ `NULL`。使用新的动态 SQL 版本，生成的命令字符串将仅包含那些参数不为 `NULL` 的 `WHERE` 子句部分，如清单 3-3 所示。\n\n\
  ```\nSELECT\nProduct.Name AS product_name,\nProduct.ProductNumber AS product_number,\n\
  ProductModel.Name AS product_model_name,\nProductSubcategory.Name AS product_subcategory_name,\n\
  SizeUnitMeasureCode.Name AS size_unit_measure_code,\nWeightUnitMeasureCode.Name\
  \ AS weight_unit_measure_code\nFROM Production.Product\nLEFT JOIN Production.ProductModel\n\
  ON Product.ProductModelID = ProductModel.ProductModelID\nLEFT JOIN Production.ProductSubcategory\n\
  ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID\nLEFT\
  \ JOIN Production.UnitMeasure SizeUnitMeasureCode\nON Product.SizeUnitMeasureCode\
  \ = SizeUnitMeasureCode.UnitMeasureCode\nLEFT JOIN Production.UnitMeasure WeightUnitMeasureCode\n\
  ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode\nWHERE 1\
  \ = 1\nAND Product.ProductNumber LIKE @product_number\nAND ProductModel.Name LIKE\
  \ @product_model\nAND ProductSubcategory.Name = @product_subcategory\n```\n清单 3-3.\
  \ 清单 3-2 中存储过程的输出\n\n请注意，只包含了必要的 `WHERE` 子句部分。`WHERE 1 = 1` 始终存在，与输入参数无关。虽然可以添加一些逻辑来移除对这个默认\
  \ `WHERE` 子句的需求，但包含它成本微不足道，并避免了为不断增长的存储过程添加任何更复杂的逻辑。\n\n\n\n#### 自定义搜索网格\n\n目前看来，费这么大劲精简`WHERE`子句似乎并不值得，但这仅仅是个开始！下一步合乎逻辑的举措是审视另一个大规模搜索的常见用例：自定义搜索网格。在这种略有不同的搜索中，输出列同样由用户控制。此前，每次搜索都返回相同的六个列，但对于任何希望在搜索功能中融入灵活性的大型应用程序来说，这种场景并不常见。\n\
  \n处理这类搜索有两种基本方法。第一种是在每个查询中包含所有列和联接。然后应用程序可以挑选出需要的列，舍弃不需要的。对于这个选项，你不是选择六个输出列，而是将所有最终用户可能在其自定义结果网格中请求的列都添加进来。对于非常小的表，这种方式尚可运行且相对容易维护，但想象一下，当有海量列可供选择时，比如`图\
  \ 3-1`所示的文件资源管理器窗口中的情况。\n\n![A371168_1_En_3_Fig1_HTML.jpg](img/A371168_1_En_3_Fig1_HTML.jpg)\n\
  \n`图 3-1`. Windows 文件资源管理器列选择器\n\n在这个列选择器中，有数百个列可供选择。始终收集所有这些数据，而不顾用户需求，这个想法相当可怕。对于许多文件类型，只有一小部分列选择是有意义的，为每个访问的文件夹收集所有这些数据会效率低下，且难以有效维护。\n\
  \n如果你将此逻辑应用于存储过程，并包含所查询的六个表中所有可能的列，你将不得不列出 38 列，以确保最终用户拥有他们可能从这些实体中需要的一切。如果搜索查询中加入了`AdventureWorks`中所有与产品相关的表，最终结果将包含数百列，确保良好性能将是一项艰巨的任务。选择所有列的弊端不仅体现在\
  \ SQL Server 处理查询的性能上，还延伸到网络 IO、磁盘 IO、内存和服务器 CPU。所有这些额外的数据都需要先从数据库移动到应用程序，然后才能最终被整理，并从数据集中移除多余的列。\n\
  \n实现搜索网格的第二种且更通用的解决方案是使查询的每个部分都动态化。除了`WHERE`子句，使联接和选择的列也动态化。这确保了你最终执行的命令字符串相对较小，只读取你需要的表，并且只返回你想要的列。为使此示例易于阅读，假设产品名称和产品编号将始终被返回。另外，还会传入一组比特位，用于决定选择哪些其他列，其中包括一些筛选列，如`清单\
  \ 3-4`所示。\n\n\n\n### 清单 3-4. 使用动态 SQL 的搜索网格存储过程\n\n```sql\nIF EXISTS (SELECT * FROM\
  \ sys.procedures WHERE procedures.name = 'search_products')\nBEGIN\nDROP PROCEDURE\
  \ dbo.search_products;\nEND\nCREATE PROCEDURE dbo.search_products\n@product_name\
  \ NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model NVARCHAR(50)\
  \ = NULL,\n@product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode NVARCHAR(50)\
  \ = NULL,\n@product_weightunitmeasurecode NVARCHAR(50) = NULL,\n@show_color BIT\
  \ = 0, @show_safetystocklevel BIT = 0, @show_reorderpoint BIT = 0, @show_standard_cost\
  \ BIT = 0,\n@show_catalog_description BIT = 0, @show_subcategory_modified_date BIT\
  \ = 0, @show_product_model BIT = 0,\n@show_product_subcategory BIT = 0, @show_product_sizemeasurecode\
  \ BIT = 0, @show_product_weightunitmeasurecode BIT = 0\nAS\nBEGIN\nSET NOCOUNT ON;\n\
  -- 为将作为通配符搜索的参数添加 \"%\" 分隔符。\nSET @product_name = '%' + @product_name + '%';\nSET\
  \ @product_number = '%' + @product_number + '%';\nSET @product_model = '%' + @product_model\
  \ + '%';\nDECLARE @sql_command NVARCHAR(MAX);\n-- 为筛选条件定义参数列表\nDECLARE @parameter_list\
  \ NVARCHAR(MAX) = '@product_name NVARCHAR(50), @product_number NVARCHAR(25),\n@product_model\
  \ NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode NVARCHAR(50),\n\
  @product_weightunitmeasurecode NVARCHAR(50)';\n-- 为 SELECT 列生成命令字符串部分\nSELECT @sql_command\
  \ = '\nSELECT\nProduct.Name AS product_name,\nProduct.ProductNumber AS product_number,';\n\
  IF @show_product_model = 1 SELECT @sql_command = @sql_command + '\nProductModel.Name\
  \ AS product_model_name,';\nIF @show_product_subcategory = 1 SELECT @sql_command\
  \ = @sql_command + '\nProductSubcategory.Name AS product_subcategory_name,';\nIF\
  \ @show_product_sizemeasurecode = 1 SELECT @sql_command = @sql_command + '\nSizeUnitMeasureCode.Name\
  \ AS size_unit_measure_code,';\nIF @show_product_weightunitmeasurecode = 1 SELECT\
  \ @sql_command = @sql_command + '\nWeightUnitMeasureCode.Name AS weight_unit_measure_code,';\n\
  IF @show_color = 1 SELECT @sql_command = @sql_command + '\nProduct.Color AS product_color,';\n\
  IF @show_safetystocklevel = 1 SELECT @sql_command = @sql_command + '\nProduct.SafetyStockLevel\
  \ AS product_safety_stock_level,';\nIF @show_reorderpoint = 1 SELECT @sql_command\
  \ = @sql_command + '\nProduct.ReorderPoint AS product_reorderpoint,';\nIF @show_standard_cost\
  \ = 1 SELECT @sql_command = @sql_command + '\nProduct.StandardCost AS product_standard_cost,';\n\
  IF @show_catalog_description = 1 SELECT @sql_command = @sql_command + '\nProductModel.CatalogDescription\
  \ AS productmodel_catalog_description,';\nIF @show_subcategory_modified_date = 1\
  \ SELECT @sql_command = @sql_command + '\nProductSubcategory.ModifiedDate AS product_subcategory_modified_date';\n\
  -- 如果命令字符串末尾有逗号，在继续之前移除它：\nIF (SELECT SUBSTRING(@sql_command, LEN(@sql_command),\
  \ 1)) = ','\nSELECT @sql_command = LEFT(@sql_command, LEN(@sql_command) - 1);\n\
  SELECT @sql_command = @sql_command + '\nFROM Production.Product'\n-- 根据搜索所需的表组合\
  \ JOIN。\nIF (@product_model IS NOT NULL OR @show_product_model = 1 OR @show_catalog_description\
  \ = 1)\nSELECT @sql_command = @sql_command + '\nLEFT JOIN Production.ProductModel\n\
  ON Product.ProductModelID = ProductModel.ProductModelID';\nIF (@product_subcategory\
  \ IS NOT NULL OR @show_subcategory_modified_date = 1 OR @show_product_subcategory\
  \ = 1)\nSELECT @sql_command = @sql_command + '\nLEFT JOIN Production.ProductSubcategory\n\
  ON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID';\nIF\
  \ (@product_sizemeasurecode IS NOT NULL OR @show_product_sizemeasurecode = 1)\n\
  SELECT @sql_command = @sql_command + '\nLEFT JOIN Production.UnitMeasure SizeUnitMeasureCode\n\
  ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode';\nIF (@product_weightunitmeasurecode\
  \ IS NOT NULL OR @show_product_weightunitmeasurecode = 1)\nSELECT @sql_command =\
  \ @sql_command + '\nLEFT JOIN Production.UnitMeasure WeightUnitMeasureCode\nON Product.WeightUnitMeasureCode\
  \ = SizeUnitMeasureCode.UnitMeasureCode'\nSELECT @sql_command = @sql_command + '\n\
  WHERE 1 = 1'\n-- 根据搜索引用和所需的表构建 WHERE 子句。\nIF @product_name IS NOT NULL\nSELECT @sql_command\
  \ = @sql_command + '\nAND Product.Name LIKE @product_name'\nIF @product_number IS\
  \ NOT NULL\nSELECT @sql_command = @sql_command + '\nAND Product.ProductNumber LIKE\
  \ @product_number'\nIF @product_model IS NOT NULL\nSELECT @sql_command = @sql_command\
  \ + '\nAND ProductModel.Name LIKE @product_model'\nIF @product_subcategory IS NOT\
  \ NULL\nSELECT @sql_command = @sql_command + '\nAND ProductSubcategory.Name = @product_subcategory'\n\
  IF @product_sizemeasurecode IS NOT NULL\nSELECT @sql_command = @sql_command + '\n\
  AND SizeUnitMeasureCode.Name = @product_sizemeasurecode'\nIF @product_weightunitmeasurecode\
  \ IS NOT NULL\nSELECT @sql_command = @sql_command + '\nAND WeightUnitMeasureCode.Name\
  \ = @product_weightunitmeasurecode'\nPRINT @sql_command;\nEXEC sp_executesql @sql_command,\
  \ @parameter_list, @product_name, @product_number,\n@product_model, @product_subcategory,\
  \ @product_sizemeasurecode,    @product_weightunitmeasurecode\nEND\nGO\nEXEC dbo.search_products\
  \ @product_number = 'BK-M18', @product_model = 'Mountain', @product_subcategory\
  \ = 'Mountain Bikes';\nEXEC dbo.search_products @product_name = 'Mountain-500 Black,\
  \ 48';\nEXEC dbo.search_products;\nGO\n```\n\n\n\n此处的第一项改动是：为可添加到搜索结果网格中的每个列，新增了十个对应的参数。这种做法看起来略显随意，不过显式的参数列表便于轻松排查故障。每个参数都命名明确、易于理解和记录。另一种替代方案是采用位图实现，在单个参数内调整各个位。这虽然能将参数列表从每个参数一个缩减到仅需一个，但也会降低可读性和可维护性——因为此时参数将变为一个十六进制数字而非一组位值。例如，若选中了第\
  \ 1 位、第 6 位和第 7 位，生成的位图对应的`VARBINARY`表示形式将是`0x00000061`。为确保其可用性和可维护性，每个位都需要详细记录，以便任何修改或使用此存储过程的人都能清楚了解其工作机制。\n\
  \n尽管此存储过程参数众多，但除非终端用户确实需要筛选并显示全部内容，否则大部分参数在单一场景下并不会被同时使用。请注意，附加的位位列并未包含在`sp_executesql`的参数中。这些位位列仅用于构建命令字符串，并非动态\
  \ SQL 所必需。因此，增加更多位不会导致`sp_executesql`语句膨胀，尽管它会为`search_products`存储过程添加更多参数。正因如此，本示例中的`sp_executesql`语句与前一示例保持相同。\n\
  \n列列表也被拆分为一系列参数检查。可选列仅在其对应的位位列被设置时才会包含。例如，若`@show_product_model`设为 1，则`ProductModel.Name`列将被纳入`SELECT`语句。以下`EXEC`语句演示了针对`ProductModel.Name`的单一筛选，并包含该名称及产品颜色：\n\
  \n```\nEXEC dbo.search_products @product_model = 'Mountain', @show_product_model\
  \ = 1, @show_color = 1\n```\n\n此次搜索生成的命令字符串如清单 3-5 所示。\n\n```\nSELECT\nProduct.Name\
  \ AS product_name,\nProduct.ProductNumber AS product_number,\nProductModel.Name\
  \ AS product_model_name,\nProduct.Color AS product_color\nFROM Production.Product\n\
  LEFT JOIN Production.ProductModel\nON Product.ProductModelID = ProductModel.ProductModelID\n\
  WHERE 1 = 1\nAND ProductModel.Name LIKE @product_model\n清单 3-5.\n根据清单 3-4 中的存储过程生成的命令字符串\n\
  ```\n\n请注意，实际执行的 T-SQL 仅包含满足用户请求所必需的内容。查询的所有部分都经过定制化处理，以精确匹配所请求的搜索条件。\n\n本示例仅返回用户明确调用的列。如果需要，也可以编写\
  \ T-SQL，使得当任何一列被选中时返回表中所有列，或者仅返回终端用户可能选择的列。采用这种方法，若`@show_product_model = 1`，则`ProductModel.Name`和`ProductModel.CatalogDescription`将被选中。应用程序随后可以移除不需要的列。这种替代方案更便于长期维护和更新，但会牺牲少量性能，因为返回的数据量将超出实际需求，如清单\
  \ 3-6 所示。\n\n\n\n### 使用较少条件语句的简化 SELECT 语句搜索过程\n\n```sql\nIF EXISTS (SELECT * FROM\
  \ sys.procedures WHERE procedures.name = 'search_products')\nBEGIN\n    DROP PROCEDURE\
  \ dbo.search_products;\nEND\nGO\n\n-- 通过检查避免空搜索\nCREATE PROCEDURE dbo.search_products\n\
  \    @product_name NVARCHAR(50) = NULL,\n    @product_number NVARCHAR(25) = NULL,\n\
  \    @product_model NVARCHAR(50) = NULL,\n    @product_subcategory NVARCHAR(50)\
  \ = NULL,\n    @product_sizemeasurecode NVARCHAR(50) = NULL,\n    @product_weightunitmeasurecode\
  \ NVARCHAR(50) = NULL,\n    @show_color BIT = 0,\n    @show_safetystocklevel BIT\
  \ = 0,\n    @show_reorderpoint BIT = 0,\n    @show_standard_cost BIT = 0,\n    @show_catalog_description\
  \ BIT = 0,\n    @show_subcategory_modified_date BIT = 0,\n    @show_product_model\
  \ BIT = 0,\n    @show_product_subcategory BIT = 0,\n    @show_product_sizemeasurecode\
  \ BIT = 0,\n    @show_product_weightunitmeasurecode BIT = 0\nAS\nBEGIN\n    SET\
  \ NOCOUNT ON;\n\n    IF COALESCE(@product_name, @product_number, @product_model,\
  \ @product_subcategory,\n        @product_sizemeasurecode, @product_weightunitmeasurecode)\
  \ IS NULL\n        RETURN;\n\n    -- 为将要作为通配符搜索的参数添加 \"%\" 分隔符。\n    SET @product_name\
  \ = '%' + @product_name + '%';\n    SET @product_number = '%' + @product_number\
  \ + '%';\n    SET @product_model = '%' + @product_model + '%';\n\n    DECLARE @sql_command\
  \ NVARCHAR(MAX);\n\n    -- 定义筛选条件的参数列表\n    DECLARE @parameter_list NVARCHAR(MAX)\
  \ = '@product_name NVARCHAR(50), @product_number NVARCHAR(25),\n        @product_model\
  \ NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode NVARCHAR(50),\n\
  \        @product_weightunitmeasurecode NVARCHAR(50)';\n\n    -- 为 SELECT 列生成简化的命令字符串部分\n\
  \    SELECT @sql_command = '\n        SELECT\n            Product.Name AS product_name,\n\
  \            Product.ProductNumber AS product_number,';\n\n    IF @show_product_model\
  \ = 1 OR @show_catalog_description = 1\n        SELECT @sql_command = @sql_command\
  \ + '\n            ProductModel.Name AS product_model_name,\n            ProductModel.CatalogDescription\
  \ AS productmodel_catalog_description,';\n\n    IF @show_product_subcategory = 1\
  \ OR @show_subcategory_modified_date = 1\n        SELECT @sql_command = @sql_command\
  \ + '\n            ProductSubcategory.Name AS product_subcategory_name,\n      \
  \      ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,';\n\
  \n    IF @show_product_sizemeasurecode = 1\n        SELECT @sql_command = @sql_command\
  \ + '\n            SizeUnitMeasureCode.Name AS size_unit_measure_code,';\n\n   \
  \ IF @show_product_weightunitmeasurecode = 1\n        SELECT @sql_command = @sql_command\
  \ + '\n            WeightUnitMeasureCode.Name AS weight_unit_measure_code,';\n\n\
  \    IF @show_color = 1 OR @show_safetystocklevel = 1 OR @show_reorderpoint = 1\
  \ OR @show_standard_cost = 1\n        SELECT @sql_command = @sql_command + '\n \
  \           Product.Color AS product_color,\n            Product.SafetyStockLevel\
  \ AS product_safety_stock_level,\n            Product.ReorderPoint AS product_reorderpoint,\n\
  \            Product.StandardCost AS product_standard_cost';\n\n    -- 如果命令字符串的末尾有逗号，在继续之前将其移除：\n\
  \    IF (SELECT SUBSTRING(@sql_command, LEN(@sql_command), 1)) = ','\n        SELECT\
  \ @sql_command = LEFT(@sql_command, LEN(@sql_command) - 1);\n\n    SELECT @sql_command\
  \ = @sql_command + '\n        FROM Production.Product'\n\n    -- 根据搜索所需的表来组合 JOIN。\n\
  \    IF (@product_model IS NOT NULL OR @show_product_model = 1 OR @show_catalog_description\
  \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN Production.ProductModel\n\
  \                ON Product.ProductModelID = ProductModel.ProductModelID';\n\n \
  \   IF (@product_subcategory IS NOT NULL OR @show_subcategory_modified_date = 1\
  \ OR @show_product_subcategory = 1)\n        SELECT @sql_command = @sql_command\
  \ + '\n            LEFT JOIN Production.ProductSubcategory\n                ON Product.ProductSubcategoryID\
  \ = ProductSubcategory.ProductSubcategoryID';\n\n    IF (@product_sizemeasurecode\
  \ IS NOT NULL OR @show_product_sizemeasurecode = 1)\n        SELECT @sql_command\
  \ = @sql_command + '\n            LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode\n\
  \                ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode';\n\
  \n    IF (@product_weightunitmeasurecode IS NOT NULL OR @show_product_weightunitmeasurecode\
  \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN Production.UnitMeasure\
  \ WeightUnitMeasureCode\n                ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode'\n\
  \n    SELECT @sql_command = @sql_command + '\n        WHERE 1 = 1'\n\n    -- 根据搜索所引用和需要的表构建\
  \ WHERE 子句。\n    IF @product_name IS NOT NULL\n        SELECT @sql_command = @sql_command\
  \ + '\n            AND Product.Name LIKE @product_name'\n\n    IF @product_number\
  \ IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n            AND Product.ProductNumber\
  \ LIKE @product_number'\n\n    IF @product_model IS NOT NULL\n        SELECT @sql_command\
  \ = @sql_command + '\n            AND ProductModel.Name LIKE @product_model'\n\n\
  \    IF @product_subcategory IS NOT NULL\n        SELECT @sql_command = @sql_command\
  \ + '\n            AND ProductSubcategory.Name = @product_subcategory'\n\n    IF\
  \ @product_sizemeasurecode IS NOT NULL\n        SELECT @sql_command = @sql_command\
  \ + '\n            AND SizeUnitMeasureCode.Name = @product_sizemeasurecode'\n\n\
  \    IF @product_weightunitmeasurecode IS NOT NULL\n        SELECT @sql_command\
  \ = @sql_command + '\n            AND WeightUnitMeasureCode.Name = @product_weightunitmeasurecode'\n\
  \n    PRINT @sql_command;\n    EXEC sp_executesql @sql_command, @parameter_list,\
  \ @product_name, @product_number,\n        @product_model, @product_subcategory,\
  \ @product_sizemeasurecode, @product_weightunitmeasurecode\nEND\nGO\n```\n\n清单 3-6\
  \ 中的 TSQL 显示了使用较少条件语句所带来的差异。生成的命令字符串可能包含一些额外的列，但存储过程变得更简单了，只有五个条件，而不是十个。这可以视为较小规模搜索或数据集相对直接的情况下的替代方案。如果将来每个表所需的列数增加，可能需要重新设计以保持高效的查询执行。或者，对于非常小的表，也可以使用\
  \ `SELECT TableName.*` 来进一步减小存储过程的大小。以下 TSQL 展示了针对 `ProductModel` 表的这一改动：\n\n```sql\n\
  IF @show_product_model = 1 OR @show_catalog_description = 1\n    SELECT @sql_command\
  \ = @sql_command + '\n        ProductModel.*,';\n```\n\n虽然简单，但这将返回数量不确定的列，如果表持续添加新列，这可能成为未来的瓶颈。此外，使用这种语法，你会失去对列名的控制，这可能导致在许多表为不同数据元素使用相同列名的情况下出现重复项。在\
  \ `AdventureWorks` 中，你将无法区分产品名称和产品模型名称，因为两列都简单地称为 `Name`。在使用 `*` 返回表中所有列时请务必谨慎。对于结构非常可预测且不会发生变化的小型表，这可能是一个有用的工具。另一方面，如果表发生变化，此存储过程很容易中断或返回额外的意外数据。\n\
  \n在这个动态搜索中，连接只在需要从某个表中获取列时才会发生。这发生在通过输入参数位显式请求了某个列，或者对其进行了筛选时。\n\n动态连接、动态 `SELECT`\
  \ 语句和动态 `WHERE` 子句的组合确保了你不会访问任何对搜索网格非必需的表。虽然存储过程本身变大了，但它生成的命令字符串却在缩小，这是本次练习的主要目标。\n\
  \n#### 搜索网格注意事项\n\n上一节介绍的存储过程在可定制性方面是一个巨大的进步，但它比之前的搜索更复杂。任何增加的复杂性都伴随着一系列考量，这些考量有助于做出明智的设计决策，并避免与此灵活性级别相关的陷阱。\n\
  \n\n\n##### 禁止空白搜索\n\n到目前为止，所有搜索的一个共同主题是尽可能赋予最终用户对其查看和筛选内容的最大控制权。然而，如果数据集庞大且用户请求大量数据，这可能带来潜在风险。通常，除非数据集足够小，或以不会给数据库服务器造成压力的方式进行了分页，否则不应允许用户执行空白搜索。也就是说，如果用户转到搜索页面并直接点击\"\
  搜索\"而没有提供任何附加条件，程序应要么不执行操作，要么返回错误：\n\n```sql\nIF COALESCE(@product_name, @product_number,\
  \ @product_model, @product_subcategory, @product_sizemeasurecode, @product_weightunitmeasurecode)\
  \ IS NULL\nRETURN;\n```\n\n这个位于存储过程开头的额外 `COALESCE` 语句会在所有筛选条件都未填充时立即退出。考虑以下 `EXEC`\
  \ 语句：\n\n```sql\nEXEC dbo.search_products @show_product_model = 1;\nEXEC dbo.search_products;\n\
  ```\n\n对于这两种搜索尝试，存储过程一旦执行到 `COALESCE` 检查就会退出。如果需要，可以使用 `RAISEERROR` 向发起搜索的应用程序抛回特定错误。无论如何，由应用程序负责处理未返回数据集或抛出错误的情况，并确保最终用户收到友好且有用的提示信息，说明其搜索为何无效。\n\
  \n##### 数据分页\n\n你很少会希望盲目地返回结果集中的所有行。想想你最喜欢的互联网搜索引擎：默认情况下，几乎没有哪个引擎会一次性返回超过 25 个结果。在网络搜索场景中，一次搜索可能返回数百万条结果。对搜索服务提供商和你自己的计算机而言，避免返回数百万行数据无疑是有益的！\n\
  \n根据所使用的 SQL Server 版本，分页可以通过多种方式实现。最简单的方法是应用程序请求一组特定的 ID，然后在用户点击\"下一页\"时请求额外的 ID\
  \ 集。由于用户通常不会点击浏览数百页的搜索结果，每次点击时查询数据库不太可能对资源造成显著消耗。如果数据集的特点是最终用户最终希望查看所有内容，那么一次性选择所有数据并允许应用程序根据需要进行分页，可能会比反复选择\
  \ 25 行数据更高效。以下 TSQL 语句在颜色为 `NULL` 时返回 25 种产品：\n\n```sql\nSELECT  Name,\n       \
  \ ProductNumber,\n        Color,\n        Size,\n        DaysToManufacture\nFROM\
  \    Production.Product\nWHERE   Product.Color IS NULL\n        AND ProductID BETWEEN\
  \ 316 AND 359\n```\n\n或者，可以使用 CTE，以便比较行号，而不是直接提取一组产品的 ID：\n\n```sql\nWITH CTE_PRODUCTS\
  \ AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER BY ProductID ASC) AS rownum,\n\
  \        Name,\n        ProductNumber,\n        Color,\n        Size,\n        DaysToManufacture\n\
  \    FROM Production.Product\n    WHERE Product.Color IS NULL)\nSELECT\n    Name,\n\
  \    ProductNumber,\n    Color,\n    Size,\n    DaysToManufacture\nFROM CTE_PRODUCTS\n\
  WHERE rownum BETWEEN 5 AND 29\n```\n\n这两个查询返回的结果是相同的。虽然第二个查询对应用程序来说更容易处理（因为它不需要管理\
  \ `ProductID`），但它的效率会较低，因为每次执行搜索时都需要重新排序数据。ID 搜索只是使用聚集索引查找直接获取 25 行，而不是在分页前为整个数据集添加行号。\n\
  \n从 SQL Server 2012 开始，新增了 `OFFSET` 功能，允许在不需要窗口函数或显式 ID 引用的情况下进行分页。以下语句将返回 25 种产品，从基于\
  \ `ProductID` 的第 51^(个)产品开始：\n\n```sql\nSELECT  Name,\n        ProductNumber,\n\
  \        Color,\n        Size,\n        DaysToManufacture\nFROM    Production.Product\n\
  WHERE   Product.Color IS NULL\nORDER BY ProductID ASC\nOFFSET 50 ROWS\nFETCH NEXT\
  \ 25 ROWS ONLY\n```\n\n使用此语法时，必须存在 `ORDER BY` 子句，因为需要确定用于分页的列。`OFFSET` 决定在选择您感兴趣的数据之前跳过多少行。最后，`FETCH\
  \ NEXT` 告诉 SQL Server 从该起始点开始检索多少行。`FETCH NEXT` 是可选的，如果省略，将返回偏移量之后的所有数据。从应用程序的角度来看，这种语法是最简单、最易用的，因为\
  \ `OFFSET` 和 `FETCH NEXT` 的行数可以由应用程序、TSQL 或用户输入提供，以便快速返回恰好所需的结果集。\n\n你将在后续章节中更详细地研究性能问题，但这里值得指出的是，根据所使用的\
  \ TSQL 语法，分页性能可能会有很大差异。不同的用例会适合不同的方法，但这里提到的每个选项都能够基于提供的任何用户输入，有效地返回分页结果。\n\n\n###\
  \ 条件分页\n\n如果一个数据集的大小可能差异很大，那么在收集数据之前对其进行一些初步分析可能是有益的。例如，如果你知道一个数据集只包含 13 行，那么就没有必要对其进行分页。你可以用单条语句从这\
  \ 13 行结果中选择所有行，无需进一步处理。同样地，如果一个结果集有 30 行，你知道它会适合放在 1-2 个页面上，这取决于每页显示多少条结果。\n\n对于这两种情况，最终用户很可能会查看大部分（如果不是全部）结果。如果一次搜索返回了巨大的结果集，那么你就知道分页是必要的。此外，你几乎可以肯定用户不会查看结果集中的所有结果。如果结果是根据相关性分数返回的（例如网络搜索引擎），那么用户很可能只会查看前\
  \ 10 或 20 条结果，然后就会继续前进或调整他们的搜索条件。\n\n#### 动态页面大小\n\n如果希望的话，页面大小也可以是动态的，作为使结果集尽可能有用的另一种方式。例如，如果返回了\
  \ 26 条结果，仅为一条结果而需要点击到新页面会有点浪费。相反，一次性返回全部 26 条结果会更简单、更高效，也更方便用户。\n\n如果结果是冗长的，并且包含占用大量空间的额外详细信息，那么自动返回较少的结果（基于冗长程度）可能是有利的。\n\
  \n#### 特定于应用的分页\n\n了解应用程序的工作方式有助于确定最佳的分页方法。下面是一个搜索示例，它根据跟踪号的通配符搜索返回订单的行项目详细信息。作为一项常见搜索，`CarrierTrackingNumber`\
  \ 很可能会被索引，并且大多数搜索只会针对单个跟踪号进行。然而，关于如何执行搜索，应用程序可能有不同的要求，如清单 3-7 所示。\n\n```sql\nCREATE\
  \ PROCEDURE dbo.search_sales_order_detail\n@tracking_number NVARCHAR(25), @offset_by_this_many_rows\
  \ INT = 0, @row_count_to_return INT = 25, @return_all_results BIT = 0\nAS\nBEGIN\n\
  SET NOCOUNT ON;\n-- Add wildcard delimiters to the tracking number\nSELECT @tracking_number\
  \ = '%' + @tracking_number + '%';\n-- If the result set is small, return all results\
  \ to the application for display.\nIF @return_all_results = 1\nBEGIN\nSELECT\nSalesOrderHeader.OrderDate,\n\
  SalesOrderHeader.ShipDate,\nSalesOrderHeader.Status,\nSalesOrderHeader.PurchaseOrderNumber,\n\
  SalesOrderDetail.CarrierTrackingNumber,\nSalesOrderDetail.OrderQty,\nSalesOrderDetail.UnitPrice,\n\
  SalesOrderDetail.UnitPriceDiscount,\nSalesOrderDetail.LineTotal,\nProduct.Name,\n\
  Product.ProductNumber\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nINNER JOIN Production.Product\n\
  ON SalesOrderDetail.ProductID = Product.ProductID\nWHERE CarrierTrackingNumber LIKE\
  \ @tracking_number\nORDER BY SalesOrderDetail.SalesOrderDetailID;\nEND\nELSE\nBEGIN\n\
  SELECT\nSalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\nSalesOrderHeader.Status,\n\
  SalesOrderHeader.PurchaseOrderNumber,\nSalesOrderDetail.CarrierTrackingNumber,\n\
  SalesOrderDetail.OrderQty,\nSalesOrderDetail.UnitPrice,\nSalesOrderDetail.UnitPriceDiscount,\n\
  SalesOrderDetail.LineTotal,\nProduct.Name,\nProduct.ProductNumber\nFROM Sales.SalesOrderHeader\n\
  INNER JOIN Sales.SalesOrderDetail\nON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\n\
  INNER JOIN Production.Product\nON SalesOrderDetail.ProductID = Product.ProductID\n\
  WHERE CarrierTrackingNumber LIKE @tracking_number\nORDER BY SalesOrderDetail.SalesOrderDetailID\n\
  OFFSET @offset_by_this_many_rows ROWS\nFETCH NEXT @row_count_to_return ROWS ONLY;\n\
  END\nEND\nGO\n```\n\n清单 3-7. 使用多种输入参数的销售订单明细搜索\n\n此搜索提供了四个选项。跟踪号输入（可以是全部或部分跟踪号）是唯一必需的选项。`@offset_by_this_many_rows`\
  \ 决定你是否在搜索中向前跳过，而 `@row_count_to_return` 表示要选择的行数。`@return_all_results` 参数可以设置为\
  \ `1`，以绕过分页逻辑并返回所有结果。\n\n如果输入是一个完整的跟踪号，返回 shipment 的所有部分在逻辑上是合理的，并且返回的数据不太可能异常庞大，这将很有用。在此示例中，应用程序负责检查输入格式以验证这一点，但如果一个完整的跟踪号总是导致返回所有数据是普遍恒定的，那么存储过程也可以这样做。\n\
  \n#### 执行示例\n\n输入参数上设置了默认值以简化假设，但如果应用程序希望始终填充它们，则可以省略这些默认值。让我们考虑一些对这个新搜索的示例输入：\n\
  \n```sql\nEXEC dbo.search_sales_order_detail '4911-403C-98', NULL, NULL, 1;\n```\n\
  \n这次搜索是针对一个完整的跟踪号。因此，应用程序指示应返回所有结果，无论数据大小如何。这是通过将 `@return_all_results` 设置为 `1`\
  \ 来实现的。此执行返回 12 行，它们构成了所有承运商跟踪号为 `4911-403C-98` 的销售订单明细。\n\n```sql\nEXEC dbo.search_sales_order_detail\
  \ '491';\n```\n\n这次搜索更加通用，只搜索跟踪号的三个字符。没有任何额外输入时，存储过程默认只选择前 25 行。如果需要更多行，应用程序将需要提供额外的参数值来解决此问题：\n\
  \n```sql\nEXEC dbo.search_sales_order_detail '491', 25, 50, 0;\n```\n\n通过添加 25 行的偏移量和\
  \ 50 行的行计数，此存储过程调用将返回此跟踪号搜索的接下来的 50 行。如果用户继续点击“下一页”，则可以通过增加偏移量来返回更多结果。或者，用户会细化他们的搜索，在跟踪号输入字符串中添加更多字符，以便更有效地找到他们想要的内容。\n\
  \n#### 总结\n\n此示例不涉及任何动态 SQL，但所使用的技术可以应用于任何搜索机制，以在结果集中包含某种程度的分页。分页是一种常见且通常必要的方法，用于对数据集增加控制，通过最终用户提高定制化，并通过不一次返回过多数据来保持良好的性能。\n\
  \n##### 搜索限制\n\n如果你曾尝试在电脑上使用非常宽泛的搜索词来搜索一个文件夹，那么你已经体验过运行此类宽泛搜索所带来的延迟。在为任何应用程序构建搜索过程时，重要的是要禁止或限制任何可能对搜索体验以及服务器性能造成压力的用户输入。一种常见的方法是不允许空白搜索。也就是说，如果用户尝试在搜索框中没有任何文本的情况下点击“执行”，程序要么不执行任何操作，要么返回一条请求更多信息的消息。或者，搜索可以简单地抓取前`50`个结果显示，并等待用户进一步输入以决定后续步骤。在此过程的任何环节，你都不希望从数据库服务器返回过多的数据，也不希望让最终用户永远等待数据出现。\n\
  \n另一种限制数据量的方法是确保无法从自定义搜索网格中请求过多列。如果一个结果网格理论上可以有`500`个不同的列，那么将其限制在一个小得多的数字是符合你最大利益的。根据应用程序的不同，十列可能足够，或者`25`列，甚至可能是`50`列。这个限制将基于平均应用程序使用情况以及列的宽度和返回数据所需的资源量。如果搜索在超过`30`列后开始出现延迟，那么将结果网格中的列数上限设为`25`将是明智之举。\n\
  \n##### 基于输入的搜索\n\n前面的例子允许将参数传递给搜索存储过程，从而实现了相当程度的定制化。作为额外的步骤，你可以解析用户输入，并根据格式判断正在搜索的数据类型。这对于许多网页上常见的角落搜索框非常有用。在这些应用程序中，有时会提供高级搜索功能，但普通用户希望在一个地方输入文本并立即获得反馈。这些搜索可能有点混乱，因为它们可能需要搜索多种类型的数据，并且同时对许多不同列进行宽泛搜索很可能会表现不佳并返回错误结果。如果搜索说明指出文本在默认为单一文本描述之前可以以多种形式输入，你就可以优化搜索，使其专注于少数几个已编制索引的列，而不是一次搜索所有可能的搜索条件。代码清单\
  \ 3-8 展示了一个允许输入多种格式的销售订单搜索。\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE\
  \ procedures.name = 'search_sales_order_detail')\nBEGIN\nDROP PROCEDURE dbo.search_sales_order_detail;\n\
  END\nGO\nCREATE PROCEDURE dbo.search_sales_order_detail\n@input_search_data NVARCHAR(25),\
  \ @offset_by_this_many_rows INT = 0, @row_count_to_return INT = 25, @return_all_results\
  \ BIT = 0\nAS\nBEGIN\nSET NOCOUNT ON;\n-- For this search procedure, do not allow\
  \ blank input. If blank is entered, return immediately with no result set.\n-- Input\
  \ parameter does not allow NULLs\nIF LTRIM(RTRIM(@input_search_data)) = ''\nRETURN;\n\
  -- Pad the input string with spaces, in case it isn't 25 characters long. This will\
  \ avoid string truncation below.\nSET @input_search_data = @input_search_data +\
  \ REPLICATE(' ', 25 - LEN(@input_search_data));\n-- Parse the @input_search_data\
  \ to determine the data it references\nDECLARE @input_type NVARCHAR(25);\n-- Search\
  \ by Sales Order Number: Starts with \"SO\" and at least 5 numbers\nIF (LEFT(@input_search_data,\
  \ 2) = 'SO' AND ISNUMERIC(SUBSTRING(@input_search_data, 3, 5)) = 1)\nSET @input_type\
  \ = 'SalesOrderNumber';\nELSE\n-- Search by Purchase Order Number: Starts with \"\
  PO\" and at least 10 numbers\nIF (LEFT(@input_search_data, 2) = 'PO' AND ISNUMERIC(SUBSTRING(@input_search_data,\
  \ 3, 10)) = 1)\nSET @input_type = 'PurchaseOrderNumber';\nELSE\n-- Search by Account\
  \ Number: Starts with two number, a hyphen, 4 numbers, a hyphen, and at least 6\
  \ additional numbers\nIF (ISNUMERIC(LEFT(@input_search_data, 2)) = 1 AND SUBSTRING(@input_search_data,\
  \ 3, 1) = '-' AND ISNUMERIC(SUBSTRING(@input_search_data, 4, 4)) = 1\nAND SUBSTRING(@input_search_data,\
  \ 8, 1) = '-' AND ISNUMERIC(SUBSTRING(@input_search_data, 9, 6)) = 1)\nSET @input_type\
  \ = 'AccountNumber';\nELSE\n-- Search by Carrier Tracking Number: 4 Alphanumeric,\
  \ 1 hyphen, 4 alphanumeric, one hyphen, and two alphanumeric\nIF (PATINDEX('%[^a-zA-Z0-9]%'\
  \ , LEFT(@input_search_data, 4)) = 0 AND SUBSTRING(@input_search_data, 5, 1) = '-'\
  \ AND PATINDEX('%[^a-zA-Z0-9]%' , SUBSTRING(@input_search_data, 6, 4)) = 0\nAND\
  \ SUBSTRING(@input_search_data, 10, 1) = '-' AND PATINDEX('%[^a-zA-Z0-9]%' , SUBSTRING(@input_search_data,\
  \ 11, 2)) = 0)\nSET @input_type = 'CarrierTrackingNumber';\nELSE\n-- Search by Product\
  \ Number: Starts with two letters, a dash, and four alphanumeric characters: AA-12YZ\n\
  IF (PATINDEX('%[^a-zA-Z]%' , LEFT(@input_search_data, 2)) = 0 AND SUBSTRING(@input_search_data,\
  \ 3, 1) = '-' AND PATINDEX('%[^a-zA-Z0-9]%' , SUBSTRING(@input_search_data, 4, 4))\
  \ = 0)\nSET @input_type = 'ProductNumber';\nELSE\n-- Default our input to carrier\
  \ tracking number, if no other format is identified.\nSET @input_type = 'CarrierTrackingNumber';\n\
  -- Remove additional padding to prevent bad string matches.\n-- Add a wildcard delimiter\
  \ to the end of the input, to account for additional characters at the end.\nSELECT\
  \ @input_search_data = LTRIM(RTRIM(@input_search_data)) + '%';\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\n-- Create the parameter\
  \ list and initial command string\nSET @parameter_list = '@input_search_data NVARCHAR(25),\
  \ @offset_by_this_many_rows INT, @row_count_to_return INT';\nSET @sql_command =\
  \ '\nSELECT\nSalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\nSalesOrderHeader.Status,\n\
  SalesOrderHeader.PurchaseOrderNumber,\nSalesOrderHeader.AccountNumber,\nSalesOrderHeader.SalesOrderNumber,\n\
  SalesOrderDetail.CarrierTrackingNumber,\nSalesOrderDetail.OrderQty,\nSalesOrderDetail.UnitPrice,\n\
  SalesOrderDetail.UnitPriceDiscount,\nSalesOrderDetail.LineTotal,\nProduct.Name,\n\
  Product.ProductNumber\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nINNER JOIN Production.Product\n\
  ON SalesOrderDetail.ProductID = Product.ProductID';\n-- Based on the value of @input_type,\
  \ dynamically generate the WHERE clause.\nIF @input_type = 'ProductNumber'\nSET\
  \ @sql_command = @sql_command + '\nWHERE Product.ProductNumber LIKE @input_search_data';\n\
  ELSE IF @input_type = 'SalesOrderNumber'\nSET @sql_command = @sql_command + '\n\
  WHERE SalesOrderHeader.SalesOrderNumber LIKE @input_search_data';\nELSE IF @input_type\
  \ = 'PurchaseOrderNumber'\nSET @sql_command = @sql_command + '\nWHERE SalesOrderHeader.PurchaseOrderNumber\
  \ LIKE @input_search_data';\nELSE IF @input_type = 'AccountNumber'\nSET @sql_command\
  \ = @sql_command + '\nWHERE SalesOrderHeader.AccountNumber LIKE @input_search_data';\n\
  ELSE IF @input_type = 'CarrierTrackingNumber'\nSET @sql_command = @sql_command +\
  \ '\nWHERE SalesOrderDetail.CarrierTrackingNumber LIKE @input_search_data';\nSET\
  \ @sql_command = @sql_command + '\nORDER BY SalesOrderDetail.SalesOrderDetailID';\n\
  -- If there are any row limitations, append them here\nSET @sql_command = @sql_command\
  \ + '\nOFFSET @offset_by_this_many_rows ROWS';\nIF @return_all_results = 0\nSET\
  \ @sql_command = @sql_command + '\nFETCH NEXT @row_count_to_return ROWS ONLY;';\n\
  PRINT @sql_command;\nEXEC sp_executesql @sql_command, @parameter_list, @input_search_data,\
  \ @offset_by_this_many_rows, @row_count_to_return;\nEND\n```\n\n代码清单 3-8. 基于字符串形式检测输入类型的销售订单明细搜索\n\
  \n\n### 动态 SQL 输入处理\n\n字符串比较在存储过程的早期检查 `@input_search_data`，并确定字符串中字母数字 `&` 符号的位置。通过解析此参数，可以评估其中存储的数据类型，并分配\
  \ `@input_type`。构建动态 SQL 语句时，`WHERE` 子句完全基于所提供的输入类型。`PATINDEX` 用于确定字符串中是否存在特定范围之外的任何字符。如果想验证一个由四个字符组成的字符串是否是字母数字，那么检查是否存在不在\
  \ a-z、A-Z 或 0-9 范围内的字符即可实现该目标。脱字符 `^` 表示逻辑 `NOT`，因此如果输入字符串中存在任何非字母数字字符，比较字符串 `'%[^a-zA-Z0-9]%'`\
  \ 将返回非零结果。\n\n或者，也可以在搜索框旁边出现一个下拉菜单，指示输入类型是什么。这也有效，但前面的示例侧重于一键式解决方案的理念，这在潜在输入数量（及其结构）有限时是有利的。对于最终用户来说，这也是一种更简单、更快速的界面，便于学习和利用。如果更可取，输入解析也可以在应用程序中管理。\n\
  \n### 输入解析的权衡\n\n先前实现的主要缺点是灵活性，但如果应用程序控制了可以提供的输入类型，则无需检查每种可能的字母和数字组合。虽然此处未演示，但也可以使用更通用的检查来处理不同的数据类型。例如，任何以\
  \ `PO` 开头的字符串都是采购订单号，任何以 `SO` 开头的字符串都是销售订单号。在此实现中，如果输入字符串与任何类型检查都不匹配，我们默认使用承运人跟踪号。这是任意的，也可以默认为任何格式，或者返回无结果（如果那样更可取）。\n\
  \n### 存储过程执行示例\n\n以下是示例存储过程的一些执行示例：\n\n```\nEXEC dbo.search_sales_order_detail @input_search_data\
  \ = 'BK-M82B-42';\n```\n\n这表示基于产品编号搜索特定产品。命令字符串中生成的 `WHERE` 子句将仅显示为对此列的检查：\n\n```\n\
  WHERE Product.ProductNumber LIKE @input_search_data\nORDER BY SalesOrderDetail.SalesOrderDetailID\n\
  OFFSET @offset_by_this_many_rows ROWS\nFETCH NEXT @row_count_to_return ROWS ONLY;\n\
  ```\n\n该语句的剩余部分对于任何不显式希望返回所有结果（使用 `@return_all_results` 参数）的执行都是恒定的。\n\n```\nEXEC\
  \ dbo.search_sales_order_detail @input_search_data = 'PO125', @offset_by_this_many_rows\
  \ = 0, @row_count_to_return = 50, @return_all_results = 0;\n```\n\n此语句搜索采购订单号的一部分，同时一次返回\
  \ 50 行，而不是默认的 25 行：\n\n```\nWHERE SalesOrderHeader.PurchaseOrderNumber LIKE @input_search_data\n\
  ORDER BY SalesOrderDetail.SalesOrderDetailID\nOFFSET @offset_by_this_many_rows ROWS\n\
  FETCH NEXT @row_count_to_return ROWS ONLY;\n```\n\n此 TSQL 段与上一个段之间唯一的区别是筛选基于 `PurchaseOrderNumber`，而不是\
  \ `ProductNumber`。无论传入的值如何，行偏移量和要返回的行计数都由其各自的参数指定。\n\n```\nEXEC dbo.search_sales_order_detail\
  \ @input_search_data = 'SO43662', @return_all_results = 1;\n```\n\n这是一个基于特定销售订单号的搜索。通过将\
  \ `@return_all_results` 设置为 `1`，省略了 `FETCH NEXT` 部分，从而生成以下命令字符串：\n\n```\nWHERE SalesOrderHeader.SalesOrderNumber\
  \ LIKE @input_search_data\nORDER BY SalesOrderDetail.SalesOrderDetailID\nOFFSET\
  \ @offset_by_this_many_rows ROWS\n```\n\n偏移量仍然被指定，但由于未提供值，默认为零。\n\n#### 结果行计数\n\n\
  即使只返回 25（或 10 或 50）行的分页集，返回查询的总行数也是有益的。你可能想知道结果集包含 118 行，而当前仅显示了 25 行。通常，最终用户需要知道，除了当前正在查看第\
  \ 51-75 行之外，他们正在查看的是总共 118 行中的一部分。这提供了关于其搜索词有效性的即时反馈，以及对结果集是否符合其预期的一些验证。如果总行数过高，反应将是优化搜索以使其更具体。如果行数太少，那么用户会想验证他们输入的是有效数据，并且他们正在搜索的数据肯定在系统中，并且可以根据搜索条件获得。\n\
  \n这个计数可以作为一个单独的操作提前计算，这将导致使用与数据检索本身相同的过滤器执行一个额外的查询。清单 3-9 是一个使用简单采购订单搜索的示例。\n\n\
  ```\nSELECT\nCOUNT(*)\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nINNER JOIN Production.Product\n\
  ON SalesOrderDetail.ProductID = Product.ProductID\nWHERE SalesOrderHeader.PurchaseOrderNumber\
  \ LIKE 'PO125%';\n清单 3-9.\n检索特定结果集的行数\n```\n\n这个计数可以作为一个单独的查询执行，并缓存以供以后使用，以防用户继续分页浏览其当前结果集。这允许你执行一次昂贵的计数操作，而不是每次访问相同数据集时都执行一次。清单\
  \ 3-10 中的查询返回 `290` 作为匹配指定条件的行数。\n\n```\nSELECT\nCOUNT(SalesOrderDetailID) OVER\
  \ (ORDER BY SalesOrderDetailID ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)\
  \ AS row_count_current,\nCOUNT(SalesOrderDetailID) OVER (ORDER BY SalesOrderDetailID\
  \ ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING) AS row_count_total,\n\
  SalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\nSalesOrderHeader.Status,\n\
  SalesOrderHeader.PurchaseOrderNumber,\nSalesOrderHeader.AccountNumber,\nSalesOrderHeader.SalesOrderNumber,\n\
  SalesOrderDetail.CarrierTrackingNumber,\nSalesOrderDetail.OrderQty,\nSalesOrderDetail.UnitPrice,\n\
  SalesOrderDetail.UnitPriceDiscount,\nSalesOrderDetail.LineTotal,\nProduct.Name,\n\
  Product.ProductNumber\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nINNER JOIN Production.Product\n\
  ON SalesOrderDetail.ProductID = Product.ProductID\nWHERE SalesOrderHeader.PurchaseOrderNumber\
  \ LIKE 'PO125%'\nORDER BY SalesOrderDetail.SalesOrderDetailID;\n清单 3-10.\n在结果集旁检索当前和总行数\n\
  ```\n\n此查询返回相同的结果集，但包含一些额外的计数。第一个计数 `row_count_current` 是按 `SalesOrderDetailID`\
  \ 排序的当前销售订单明细记录的行号。另一方面，`row_count_total` 将返回结果集的总行数，而不管当前行号是什么（如前所述，它是 `290`）。`ROWS`\
  \ 子句是 SQL Server 2012 及更高版本独有的语法，允许你更具体地确定窗口函数处理数据行的范围。`ROWS UNBOUNDED PRECEDING\
  \ AND CURRENT ROW` 将从结果集的开始处计数到当前行，因此根据 `ORDER BY` 子句返回递增的行计数。另一方面，`ROWS UNBOUNDED\
  \ PRECEDING AND UNBOUNDED FOLLOWING` 将返回数据集中所有行的计数，而不管当前行号如何。`UNBOUNDED PRECEDING`\
  \ 引用结果集的开始，而 `UNBOUNDED FOLLOWING` 引用结果集的结束。\n\n\n\n最后一步是将这些努力结合起来，以便在对数据集进行分页的同时也能检索行数，如代码清单\
  \ 3-11 所示。\n\n```sql\nWITH CTE_SEARCH_DATA AS (\nSELECT\nCOUNT(SalesOrderDetailID)\
  \ OVER (ORDER BY SalesOrderDetailID ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT\
  \ ROW) AS row_count_current,\nCOUNT(SalesOrderDetailID) OVER (ORDER BY SalesOrderDetailID\
  \ ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING) AS row_count_total,\n\
  SalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\nSalesOrderHeader.Status,\n\
  SalesOrderHeader.PurchaseOrderNumber,\nSalesOrderHeader.AccountNumber,\nSalesOrderHeader.SalesOrderNumber,\n\
  SalesOrderDetail.CarrierTrackingNumber,\nSalesOrderDetail.OrderQty,\nSalesOrderDetail.UnitPrice,\n\
  SalesOrderDetail.UnitPriceDiscount,\nSalesOrderDetail.LineTotal,\nProduct.Name,\n\
  Product.ProductNumber\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nINNER JOIN Production.Product\n\
  ON SalesOrderDetail.ProductID = Product.ProductID\nWHERE SalesOrderHeader.PurchaseOrderNumber\
  \ LIKE 'PO125%')\nSELECT\n*\nFROM CTE_SEARCH_DATA\nORDER BY CTE_SEARCH_DATA.row_count_current\n\
  OFFSET 25 ROWS\nFETCH NEXT 50 ROWS ONLY;\n```\n**代码清单 3-11.** 在带数据分页的结果集旁边检索当前和总行数\n\
  \n最后一个示例将之前的查询放入了一个公用表表达式中，并使用 `row_count_current` 执行分页操作，以确定结果集从何处开始偏移。将数据收集、行数统计和分页全部集中在一条语句中的便利性可能非常有用，但必须权衡性能。你将在后面的章节中了解更多关于这些语句性能的知识，但与此同时，一如既往，在发布前务必彻底测试所有新的\
  \ T-SQL，以避免任何无意中造成的性能问题。\n\n也可以使用动态 SQL 来确定是否需要在结果集中包含行数统计。当结果集较小，或者你不需要行数统计来进行任何进一步的操作时，这有助于减少所需的工作量。代码清单\
  \ 3-12 说明了这种用法。\n\n```sql\nDECLARE @include_row_counts BIT = 0;\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nSELECT @sql_command = '\nWITH CTE_SEARCH_DATA AS (\nSELECT';\n\
  IF @include_row_counts = 1\nSELECT @sql_command = @sql_command + '\nCOUNT(SalesOrderDetailID)\
  \ OVER (ORDER BY SalesOrderDetailID ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT\
  \ ROW) AS row_count_current,\nCOUNT(SalesOrderDetailID) OVER (ORDER BY SalesOrderDetailID\
  \ ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING) AS row_count_total,';\n\
  SELECT @sql_command = @sql_command + '\nSalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\n\
  SalesOrderHeader.Status,\nSalesOrderHeader.PurchaseOrderNumber,\nSalesOrderHeader.AccountNumber,\n\
  SalesOrderHeader.SalesOrderNumber,\nSalesOrderDetail.CarrierTrackingNumber,\nSalesOrderDetail.OrderQty,\n\
  SalesOrderDetail.UnitPrice,\nSalesOrderDetail.UnitPriceDiscount,\nSalesOrderDetail.LineTotal,\n\
  Product.Name,\nProduct.ProductNumber\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nINNER JOIN Production.Product\n\
  ON SalesOrderDetail.ProductID = Product.ProductID\nWHERE SalesOrderHeader.PurchaseOrderNumber\
  \ LIKE ''PO125%'')\nSELECT\n*\nFROM CTE_SEARCH_DATA';\nIF @include_row_counts =\
  \ 1\nSELECT @sql_command = @sql_command + '\nORDER BY CTE_SEARCH_DATA.row_count_current';\n\
  ELSE\nSELECT @sql_command = @sql_command + '\nORDER BY CTE_SEARCH_DATA.OrderDate';\n\
  SELECT @sql_command = @sql_command + '\nOFFSET 25 ROWS\nFETCH NEXT 50 ROWS ONLY;';\n\
  PRINT @sql_command;\nEXEC sp_executesql @sql_command;\n```\n**代码清单 3-12.** 使用动态\
  \ SQL 使行数统计成为结果集的可选组件\n\n参数 `@include_row_counts` 决定是否将窗口函数包含在命令字符串中，并相应地更新 `ORDER\
  \ BY` 子句。在这个特定示例中，它被设置为零，生成的命令字符串如代码清单 3-13 所示。\n\n```sql\nWITH CTE_SEARCH_DATA\
  \ AS (\nSELECT\nSalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\nSalesOrderHeader.Status,\n\
  SalesOrderHeader.PurchaseOrderNumber,\nSalesOrderHeader.AccountNumber,\nSalesOrderHeader.SalesOrderNumber,\n\
  SalesOrderDetail.CarrierTrackingNumber,\nSalesOrderDetail.OrderQty,\nSalesOrderDetail.UnitPrice,\n\
  SalesOrderDetail.UnitPriceDiscount,\nSalesOrderDetail.LineTotal,\nProduct.Name,\n\
  Product.ProductNumber\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nINNER JOIN Production.Product\n\
  ON SalesOrderDetail.ProductID = Product.ProductID\nWHERE SalesOrderHeader.PurchaseOrderNumber\
  \ LIKE 'PO125%')\nSELECT\n*\nFROM CTE_SEARCH_DATA\nORDER BY CTE_SEARCH_DATA.OrderDate\n\
  OFFSET 25 ROWS\nFETCH NEXT 50 ROWS ONLY;\n```\n**代码清单 3-13.** 代码清单 3-12 中生成的命令字符串（省略了行数统计）\n\
  \n### 其他过滤考虑因素\n\n为了实现特定的功能，可以对任何这些搜索方法应用无数的修改。例如，动态 SQL 可以用来控制报表查询中使用的分组，以快速检索特定的总和或计数，同时省略其他部分。代码清单\
  \ 3-14 是一个简单的 T-SQL 语句示例，该语句将根据输入参数包括两种不同汇总中的一种（或两种，或都不包括）。\n\n```sql\nDECLARE @start_date\
  \ DATE = '2014-06-01';\nDECLARE @end_date DATE = '2014-06-30';\nDECLARE @include_order_count\
  \ BIT = 1;\nDECLARE @include_order_total BIT = 1;\nIF @include_order_count = 0 AND\
  \ @include_order_total = 0\nRETURN;\nDECLARE @parameter_list NVARCHAR(MAX);\nDECLARE\
  \ @sql_command NVARCHAR(MAX);\nSELECT @parameter_list = '@start_date DATE, @end_date\
  \ DATE'\nSELECT @sql_command = '\nSELECT';\nIF @include_order_count = 1\nSELECT\
  \ @sql_command = @sql_command + '\nCOUNT(DISTINCT SalesOrderDetail.SalesOrderDetailID)\
  \ AS sales_order_count,';\nIF @include_order_total = 1\nSELECT @sql_command = @sql_command\
  \ + '\nSUM(SalesOrderDetail.LineTotal) AS total_revenue,';\nSELECT @sql_command\
  \ = @sql_command + '\n1 AS place_holder\nFROM Sales.SalesOrderHeader\nINNER JOIN\
  \ Sales.SalesOrderDetail\nON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\n\
  WHERE OrderDate BETWEEN @start_date AND @end_date';\nPRINT @sql_command;\nEXEC sp_executesql\
  \ @sql_command, @parameter_list, @start_date, @end_date;\n```\n**代码清单 3-14.** 使用动态\
  \ SQL 根据输入参数返回总和/计数\n\n两个输入参数决定是否应包含所有销售订单明细行的数量统计，或所有行费用的总和，或两者都包含，或都不包含。这可以极大地扩展，以减少存储过程中必要的复杂操作数量。或者，也可以使用\
  \ `IF…THEN` 语句来分别检查是否应该评估每个指标。这对于少量变量来说效果很好，但对于可能涉及许多不同表的复杂数据集，将它们全部收集在一个高效步骤中，可能比逐个获取每个指标更快、更有效。\n\
  \n\n### 结论\n\n使用动态 SQL 创建灵活、高效的搜索例程，可以解锁无数种快速访问数据的方式，同时定制 TSQL 解决方案以应对应用程序可能带来的任何挑战。我们本可以轻松地用数百页的篇幅来举例说明，不同的参数组合与\
  \ TSQL 技术如何能够创造出新颖或创新的搜索方法。\n\n无需多言，这种灵活性本身就是创新的源泉。当你遇到挑战，不确定如何获取所需的所有可能结果集时，请尝试实验，将硬编码的约定转化为参数。虽然一个动态\
  \ SQL 存储过程乍看之下可能更为复杂，但所增加的控制逻辑行可以很容易地被格式化和文档化，以确保最终代码既易于阅读又便于维护。\n\n## 4. 权限与安全\n\
  \n第 2 章介绍了 SQL 注入，以及编写不当的 TSQL 可能成为恶意攻击目标的多种方式。本章退后一步，回顾 SQL Server 安全的最佳实践，重点关注动态\
  \ SQL 及其典型用例。安全是一个庞大的主题，如果展开讨论，很容易就能占据数千页的篇幅。它也在不断演变，随着每一天过去，新产品发布，旧产品被发现漏洞。此处的目标是涵盖在使用动态\
  \ SQL 开发数据库解决方案时，你需要格外注意的最重要和最常见的方面，而不会过多地深入特殊情况或边缘案例。\n\n#### 最小权限原则\n\n安全方面最重要的考量来自“最小权限原则”。该原则指出，对于任何应用程序，其可用的权限应恰好是执行其功能所必需的，不多也不少。在数据库层面，这一原则至关重要，因为数据库安全是防止数据被盗的最后屏障。一旦黑客获得了对您数据的无限制访问，就几乎没有什么可以保护的了。最重要的考量是确定应用程序应以哪个用户身份运行，以及应为该用户分配哪些权限。\n\
  \n公司经常犯的最重大错误是为他们的应用程序使用 `sysadmin` 用户。这很方便，因为它总是有效，无论执行的是什么 TSQL。无论应用程序做什么，这个用户都将提供对一切的完全访问权限。虽然方便，但它构成了一个安全噩梦，因为使用此帐户的应用程序可能执行不应被允许的操作。更糟糕的是，如果应用程序以某种方式被攻陷，并且恶意用户获得了执行\
  \ TSQL 命令的权限，他们将拥有一切的访问权。\n\n考虑以下假设的应用程序和功能列表：\n*   订单处理系统\n*   文件传输应用程序\n*   报告生成\n\
  *   软件安装程序\n*   备份软件\n\n这些应用程序执行的功能非常不同，访问数据库服务器的方式也大相径庭。为了满足这些功能，SQL Server 登录名和用户应被授予哪些类型的权限？应用程序需要读取权限吗？写入权限？它需要更改任何服务器配置或设置吗？应用程序是仅访问单个数据库还是一组数据库？可以将应用程序限制在对少数几个对象的权限上吗？显然，为所有内容创建具有细粒度访问权限的手动策略可能工作量过大，得不偿失，并将构成最深入的解决方案。在不深入那么多细节的情况下，这些应用程序通常需要什么来运行？\n\
  \n*   **订单处理系统**：对特定数据库或一组数据库的读写权限（`select`、`insert`、`update` 和 `delete`）将提供创建、更新、删除订单状态以及报告状态的能力。如果数据通过存储过程读/写，则需要执行这些例程的权限。应用程序不太可能有任何理由调整服务器设置、更改数据库架构、访问文件数据或访问其他数据库或服务器中不相关的数据。\n\
  *   **文件传输应用程序**：对记录文件传输的表具有读写权限。用户可能还需要直接访问文件系统进行读写。如果可能，请不要使用 `xp_cmdshell` 执行文件访问。这个系统存储过程在数据库服务器上启用后，提供了对操作系统的巨大访问权限。一个拥有对数据和操作系统无限制访问权限的数据库登录名非常强大，对于任何试图攻陷此应用程序的黑客来说都是一个极具诱惑力的目标。\n\
  *   **报告生成**：理想情况下，对单独的报告数据库具有只读访问权限。报告通常在从作为其整体数据源的事务数据中分离出来时运行效果最佳。将报告限制为只读访问的能力大大减少了这些应用程序被黑客攻击或破坏的方式。如果需要，可以进一步将读取访问权限细分为这些报告所需的表或存储过程。这确保了只有在需要时才会访问受保护或敏感的数据。\n\
  *   **软件安装程序**：安装软件时，应用程序通常会请求尽可能多的权限，经常寻找 `sysadmin` 用户。重要的是，如果授予了这个级别的权限，它应该是临时的。通常，安装或升级软件是不频繁且不规则的事件。因此，如果需要一个具有高级别权限的单独用户，该用户永远不应被其他应用程序、用户或功能使用。不要使用\
  \ `sa` 或搭便车使用其他服务帐户，以免不同用途混淆。由 DBA 使用自己的帐户进行安装是可以接受的，只要他拥有安装所需的权限。\n*   **备份软件**：所需的主要权限是备份数据库。该软件可能还需要访问一些元数据来读取有关数据库的数据或写入日志数据，但这种访问权限可能是最小的。该软件可以仅在没有进一步权限需求的备份操作员帐户下运行。\n\
  \n这些是基于您在开发或 IT 中常见的软件应用程序的一些典型示例，但每个环境都有其自己的一套应用程序和安全需求。只要权限被缩减到应用程序所需的最低水平，您就可以确保任何可能因额外权限而暴露的安全漏洞永远不会成为现实。\n\
  \n然而，“最小权限原则”并不仅适用于数据库服务器。安全最好以分层方式组织，数据库是最低层，是最终用户最后访问的一层。确保任何最终可以访问数据库服务器的应用程序也仅以其所需的权限运行。安全性的每一层都为保护您数据的保险库增加了一把额外的锁。\n\
  \n\n### 细粒度权限 vs. 角色权限\n\n最常见的权限错误涉及服务器级别的 `sysadmin` 角色或数据库级别的 `db_owner` 角色。`Sysadmin`\
  \ 为登录账户提供对 SQL Server 所有功能的完全访问权限，是任何登录可用的最全面的权限。`db_owner` 用户角色则提供对单个数据库的所有维护和配置功能的访问权限，以及对该数据库内所有对象的访问权限。这两个角色通常会提供远超应用程序所需的访问权限。它们常被出于便利性而使用，但如果系统遭到入侵，可能会留下严重的安全漏洞。\n\
  \n一般来说，应避免为任何应用程序登录分配 `sysadmin` 角色，尤其是当应用程序可从互联网和/或公众访问时。`db_owner` 通常被分配给访问其特定功能的数据库的应用程序，但该角色提供的权限很少是应用程序按预期工作所必需的。应用程序是否需要更改数据库配置设置、访问系统视图或拥有删除数据库的权限？很可能这些功能并不需要，在配置应用程序用户时应谨慎行事。\n\
  \n虽然分配更精细的角色可能需要更多时间、精力和规划，但这样做可以确保你不会留下一个恶意行为可能针对数据库服务器的漏洞。如果一个应用程序只需要对一组 20 个表的读写权限，那么考虑分配\
  \ `db_datareader` 和 `db_datawriter`，而不是 `db_owner`。如果数据库包含其他敏感数据，考虑仅将权限授予那 20 个表，而不是其他表。尽管人们倾向于信任他们使用的应用程序，但无论开源还是专有软件，每天都可能发现漏洞。如果任何漏洞可能被你所依赖的应用程序利用，那么确保它对数据库服务器的访问权限最小化，将大大减少攻击造成的损害，并确保数据尽可能安全。\n\
  \n要审查此领域所有服务器和数据库角色，将会是一个冗长且有些偏离主题的题外话。微软为所有内置角色提供了详尽的文档，如果这些角色不够用，还提供了如何创建自定义角色的文档。以下\
  \ MSDN 链接提供了关于服务器和数据库角色的当前文档，以及许多有用的相关主题的链接：\n\n*   服务器角色：[`https://msdn.microsoft.com/en-us/library/ms188659.aspx`](https://msdn.microsoft.com/en-us/library/ms188659.aspx)\n\
  *   数据库角色：[`https://msdn.microsoft.com/en-us/library/ms189121.aspx`](https://msdn.microsoft.com/en-us/library/ms189121.aspx)\n\
  \n### 动态 SQL 与所有权链\n\n编写、测试和执行动态 SQL 时，其权限的运行方式与你通常体验到的不同。任何使用 `EXEC` 或 `EXECUTE`\
  \ 执行的字符串都将在其自身的作用域下运行，尽管安全上下文不会改变。这起初可能会令人困惑，并可能导致运行动态 SQL 时出现安全错误。清单 4-1 展示了一个说明此行为的示例。\n\
  \n```sql\nCREATE PROCEDURE dbo.ownership_chaining_example\nAS\nBEGIN\nSET NOCOUNT\
  \ ON;\n-- Select the current security context for reference\nSELECT SUSER_SNAME();\n\
  SELECT COUNT(*) FROM Person.Person;\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT\
  \ @sql_command = 'SELECT SUSER_SNAME();\nSELECT COUNT(*) FROM Person.Person';\n\
  EXEC sp_executesql @sql_command;\nEND\nGO\n```\n**清单 4-1.** 用于演示所有权链的简单存储过程\n\n\
  当你执行此存储过程时，结果正是你所期望的：返回当前安全上下文的用户（我），然后使用标准 TSQL 返回 `Person.Person` 表中的行数。此后，使用动态\
  \ SQL 执行相同的操作。结果如图 4-1 所示。\n\n![A371168_1_En_4_Fig1_HTML.jpg](img/A371168_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1.** 内联 TSQL 与动态 SQL 中的所有权链\n\n用户 Edward 是一个 `sysadmin`，这为他提供了对这台 SQL Server\
  \ 上所有内容的完全访问权限。到目前为止的结果并不令人惊讶。安全上下文和来自 `Person.Person` 的计数都被返回了，无论是在动态 SQL 部分之外还是之内。如果由一个不同用户执行该存储过程，一个权限比该用户少得多的用户，会发生什么？为了说明这一点，我们将创建一个名为\
  \ `VeryLimitedUser` 的用户，默认情况下没有任何权限。\n\n```sql\nCREATE USER VeryLimitedUser WITHOUT\
  \ LOGIN;\nGO\nCREATE ROLE VeryLimitedRole;\nGO\nEXEC sys.sp_addrolemember 'VeryLimitedRole',\
  \ 'VeryLimitedUser';\nGO\n```\n\n接下来，我们将仅授予该用户对上述存储过程的执行权限：\n\n```sql\nGRANT EXECUTE\
  \ ON dbo.ownership_chaining_example TO VeryLimitedRole;\nGO\n```\n\n权限分配完毕后，我们将临时切换安全上下文，并使用这个新用户执行存储过程：\n\
  \n```sql\nEXECUTE AS USER = 'VeryLimitedUser';\nGO\nEXEC dbo.ownership_chaining_example;\n\
  GO\nREVERT;\nGO\n```\n\n执行的结果与之前的不相同。如图 4-2 所示，它们需要一些额外的解释才能理解。\n\n![A371168_1_En_4_Fig2_HTML.jpg](img/A371168_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2.** 因缺乏所有权链而导致权限错误之前的结果\n\n当尝试使用动态命令从 `Person.Person` 中选择计数时，SQL Server\
  \ 返回了一个错误：\n\n```sql\nMsg 229, Level 14, State 5, Line 40\nThe SELECT permission\
  \ was denied on the object 'Person', database 'AdventureWorks2014', schema 'Person'.\n\
  ```\n\n通常，当用户对存储过程拥有 `execute` 权限时，存储过程中包含的任何 TSQL 都会正常运行，无论用户是否对其他对象拥有权限。在前面的例子中，`VeryLimitedUser`\
  \ 没有对 `Person.Person` 的读取权限。尽管有此限制，但被授予对存储过程的执行权限使其能够访问该表。但对于动态 SQL 语句内的 `SELECT`\
  \ 操作，情况并非如此。这里发生了什么！？\n\n\n\n#### SQL Server 中的所有权链\n\nSQL Server 中的所有权链是一种重要的安全机制。其核心在于，为了在一个拥有众多对象的数据库中实现高效且有意义的安全性，初始调用\
  \ T-SQL 的用户的权限会通过其内部调用的任何其他 T-SQL 传递下去。例如，当您执行一个存储过程（并且拥有执行的权限）时，其中调用的所有额外 T-SQL\
  \ 也会成功执行。同样，一个拥有视图权限的用户，不需要同时拥有该视图所基于的所有底层对象的权限。一旦授予了对视图的访问权限，也就隐式地授予了对其中所有表、视图和函数的后续权限。\n\
  \n所有权链极大地简化了 SQL Server 内部的安全性，允许您快速、安全地将权限委托给存储过程或视图，而不必同时授予对其中每个被引用对象的访问权限。对于安全管理员来说，这节省了大量时间，并允许他们基于逻辑或业务需求来提供权限，而无需为每个被引用的对象分配精细的安全设置。\n\
  \n#### 动态 SQL 对所有权链的打破\n\n然而，所有权链规则有一个重大例外，那就是动态 SQL。一旦执行动态 SQL 字符串，链就会被打破，执行将重置为初始调用者的权限。在之前的例子中，用户`VeryLimitedUser`\
  \ 能够访问`Person.Person`表而无需对其拥有显式权限，这要归功于所有权链。但在动态 SQL 执行的那一刻，权限就恢复为`VeryLimitedUser`自身在存储过程上下文之外的权限。因此，该用户由于对`Person.Person`没有显式权限而无法访问它，并抛出了错误。\n\
  \n请注意，当所有权链被打破时，安全上下文并不会改变。无论所有权链的状态如何，上面针对当前用户安全上下文返回的结果都是相同的。由于该用户没有登录名，安全上下文被返回为一个系统生成的数字字符串。\n\
  \n请务必留意所有权链，并确保执行存储过程的用户对该过程本身以及其中调用的任何对象或动态 SQL 都拥有足够的权限。\n\n通常，这种所有权链的断裂不会造成问题——前提是分配给用户的权限与该用户执行的任何\
  \ T-SQL（无论是动态的还是其他形式的）所需的权限相似。仔细测试那些使用动态 SQL 的存储过程和 T-SQL 语句，可以确保结果符合预期，并且不会意外抛出权限错误。务必抓住机会，使用最终将在生产环境中运行该存储过程的登录名或用户对其进行测试。同时，在一个与生产环境足够相似的环境中进行测试，以便提前发现任何所有权链问题。通常，开发者在沙盒环境中工作，他们的个人登录名拥有广泛的权限。因此，所有代码都能以`sysadmin`或`db_owner`的身份成功运行，但当代码移到生产环境且权限受到更多限制时，可能就无法顺利运行了。\n\
  \n### 动态切换安全上下文\n\n通常，所有权链带来的这些场景不会在数据库开发中造成问题。但在某些孤立场景中，您可能希望允许特定的 T-SQL 语句或存储过程在另一个用户的安全上下文下运行。在以下两种情况下，默认权限可能不够：一个用户权限太少，由于所有权链被打破或对特定对象权限不足而触发各种安全错误；或者，您可能有一个拥有远超所需权限的用户，并希望在执行敏感存储过程时减少其权限。\n\
  \n有多种方法可以更改特定对象或执行的安全性，我们将通过示例逐一演示。请注意，这些赋值操作应该是罕见的例外，而非规则。如果您发现越来越多的存储过程被赋予动态特殊权限，那可能表明您的整体安全方法存在缺陷。考虑为应用程序用户重新分配一组更合适的数据库角色，或者在必要时，创建一个提供所需一切权限的新角色。在\
  \ T-SQL 中手动调整权限难以记录和跟踪，因此会大大增加长期的复杂性。尽量减少这类例外情况将大大提高可维护性，并使理解代码更容易，尤其是在排查错误或调查异常行为时。\n\
  \n之前展示过一个更改权限的例子，那就是使用 `EXECUTE AS` 来更改用户的安全上下文。这要求执行上下文更改的用户拥有模仿目标用户所需的权限。这一点很重要；否则，一个权限极小的用户可能会尝试模仿`sysadmin`或其他具有广泛服务器访问权限的账户。考虑以下\
  \ T-SQL：\n\n```sql\nSELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME,\
  \ ORIGINAL_LOGIN() AS ORIGINAL_LOGIN;\nGO\nEXECUTE AS USER = 'VeryLimitedUser';\n\
  SELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()\
  \ AS ORIGINAL_LOGIN;\nGO\n```\n\n这里，选择了一些关于当前用户的基本信息，包括原始登录名，它将返回此连接的初始登录名，无论之后权限如何变化。初始权限如下所示：\n\
  \n```\nEdward, dbo, Edward\n```\n\n切换到受限用户后，当前安全信息变为：\n\n```\nS-1-9-3-609289169-1216273702-1805054397-27368224,\
  \ VeryLimitedUser, Edward\n```\n\n这表明登录名和用户已更改为受限访问的测试用户，但原始登录名仍然是 Edward。\n\n```sql\n\
  EXECUTE AS USER = 'Edward';\nGO\n```\n\n尝试切换回 Edward 的上下文将失败，并返回以下错误：\n\n```\nMsg\
  \ 15517, Level 16, State 1, Line 48\nCannot execute as the database principal because\
  \ the principal \"Edward\" does not exist, this type of principal cannot be impersonated,\
  \ or you do not have permission.\n```\n\n现在您正以`VeryLimitedUser`的身份执行，切换到 Edward\
  \ 失败，因为该用户没有模仿系统管理员所需的权限。在此连接上返回到以 Edward 身份执行的唯一方法是使用`REVERT`命令：\n\n```sql\nREVERT;\n\
  GO\nSELECT SUSER_SNAME() AS SUSER_SNAME, USER_NAME() AS USER_NAME, ORIGINAL_LOGIN()\
  \ AS ORIGINAL_LOGIN;\nGO\n```\n\n现在安全上下文回到了起点：\n\n```\nEdward, dbo, Edward\n```\n\
  \n如果您想更改安全上下文并且之后不能再更改，`WITH NO REVERT`选项可以实现这一点：\n\n```sql\nEXECUTE AS USER = 'VeryLimitedUser'\
  \ WITH NO REVERT;\n```\n\n一旦添加了这个选项，权限就被锁定在`VeryLimitedUser`，直到此存储过程或连接结束。任何尝试`EXECUTE\
  \ AS`另一个用户或恢复（revert）的操作都将失败。\n\n\n\n```\nREVERT;\nGO\nEXECUTE AS USER = 'Edward';\n\
  ```\n\n执行以上任一语句都将返回以下错误：\n\n```\nMsg 15196, Level 16, State 1, Line 55\nThe current\
  \ security context is non-revertible. The \"Revert\" statement failed.\nMsg 15517,\
  \ Level 16, State 1, Line 56\nCannot execute as the database principal because the\
  \ principal \"Edward\" does not exist, this type of principal cannot be impersonated,\
  \ or you do not have permission.\n```\n\n#### 使用 `REVERT` 和 `WITH NO REVERT`\n\n\
  这些错误提醒你 `REVERT` 将不起作用，并且你无法切换用户。`WITH NO REVERT` 是一种极佳的方式，可以确保整个存储过程或连接都使用单一用户身份执行，并且任何人都无法尝试获取比此身份更多的权限。使用此选项结束\
  \ `EXECUTE AS` 语句的唯一方式是存储过程完成，或者连接结束或被终止。\n\n#### `EXECUTE AS OWNER`\n\n下一种更改权限的方法是为存储过程分配特定的安全上下文。完成此操作后，该存储过程在执行时，无论调用者是谁，都将始终以此用户身份执行，如清单\
  \ 4-2 所示。\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name\
  \ = 'ownership_chaining_example')\nBEGIN\nDROP PROCEDURE dbo.ownership_chaining_example;\n\
  END\nGO\nCREATE PROCEDURE dbo.ownership_chaining_example\nWITH EXECUTE AS OWNER\n\
  AS\nBEGIN\nSET NOCOUNT ON;\n-- Select the current security context, for reference\n\
  SELECT SUSER_SNAME() AS security_context_no_dynamic_sql;\nSELECT COUNT(*) AS table_count_no_dynamic_sql\
  \ FROM Person.Person;\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command\
  \ = 'SELECT SUSER_SNAME() AS security_context_in_dynamic_sql;\nSELECT COUNT(*) AS\
  \ table_count_in_dynamic_sql FROM Person.Person';\nEXEC sp_executesql @sql_command;\n\
  END\nGO\n```\n清单 4-2. 演示 `EXECUTE AS OWNER` 的存储过程\n\n`EXECUTE AS OWNER` 选项将导致存储过程始终以其所有者的权限执行，无论哪个用户运行它。这使得通常无权访问存储过程内部对象的用户能够运行它。或者，拥有比所有者更多权限的用户仍将使用所有者的权限执行它。对象的所有者通常是其创建者，除非日后被更改。\n\
  \n#### `EXECUTE AS CALLER`\n\n一个可能限制性更强且更有用的权限更改是强制存储过程在其调用者的上下文中执行。这类似于打破所有权链，如清单\
  \ 4-2 中的动态 SQL 所示。`EXECUTE AS CALLER` 实现了这一点，如清单 4-3 所示。\n\n```sql\nIF EXISTS (SELECT\
  \ * FROM sys.procedures WHERE procedures.name = 'ownership_chaining_example')\n\
  BEGIN\nDROP PROCEDURE dbo.ownership_chaining_example;\nEND\nGO\nCREATE PROCEDURE\
  \ dbo.ownership_chaining_example\nWITH EXECUTE AS CALLER\nAS\nBEGIN\nSET NOCOUNT\
  \ ON;\n-- Select the current security context, for reference\nSELECT SUSER_SNAME()\
  \ AS security_context_no_dynamic_sql;\nSELECT COUNT(*) AS table_count_no_dynamic_sql\
  \ FROM Person.Person;\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command\
  \ = 'SELECT SUSER_SNAME() AS security_context_in_dynamic_sql;\nSELECT COUNT(*) AS\
  \ table_count_in_dynamic_sql FROM Person.Person';\nEXEC sp_executesql @sql_command;\n\
  END\nGO\n```\n清单 4-3. 演示 `EXECUTE AS CALLER` 的存储过程\n\n执行时，存储过程将以调用它的任何用户的权限运行。因此，其中访问的所有对象也将检查该用户的权限。这确保了调用存储过程的用户对内部引用的所有对象都具有权限。\n\
  \n#### 处理动态 SQL\n\n重要的是要记住，无论进行任何此类安全调整，动态 SQL 仍会打破所有权链。确保动态 SQL 成功执行的唯一方法是使用具有足够权限的用户运行调用的\
  \ TSQL，或者为特定的执行授予更精细的权限，如清单 4-4 所示。\n\n```sql\nCREATE LOGIN EdwardJr WITH PASSWORD\
  \ = 'AntiSemiJoin17', DEFAULT_DATABASE = AdventureWorks2014;\nGO\nUSE AdventureWorks2014\n\
  GO\nCREATE USER EdwardJr FROM LOGIN EdwardJr;\nEXEC sp_addrolemember 'db_owner',\
  \ 'EdwardJr';\nGO\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name\
  \ = 'ownership_chaining_example')\nBEGIN\nDROP PROCEDURE dbo.ownership_chaining_example;\n\
  END\nGO\nCREATE PROCEDURE dbo.ownership_chaining_example\nAS\nBEGIN\nSET NOCOUNT\
  \ ON;\n-- Select the current security context, for reference\nSELECT SUSER_SNAME()\
  \ AS security_context_no_dynamic_sql;\nSELECT COUNT(*) AS table_count_no_dynamic_sql\
  \ FROM Person.Person;\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command\
  \ = 'EXECUTE AS LOGIN = ''EdwardJr'';\nSELECT SUSER_SNAME() AS security_context_in_dynamic_sql;\n\
  SELECT COUNT(*) AS table_count_in_dynamic_sql FROM Person.Person';\nEXEC sp_executesql\
  \ @sql_command;\nEND\nGO\n```\n清单 4-4. 在动态 SQL 中嵌入安全上下文更改的存储过程\n\n此代码在动态 SQL 内显式更改安全上下文。这是在所有权链被打破后确保特定权限集的另一种方法。在此例中，`EdwardJr`\
  \ 是一个新用户，对 `AdventureWorks` 数据库中的所有对象拥有读取、写入和执行权限。该用户没有其他服务器权限。你可以以系统管理员 Edward\
  \ 的身份执行此存储过程：\n\n```sql\nEXEC dbo.ownership_chaining_example;\n```\n\n结果如图 4-3 所示。\n\
  \n![A371168_1_En_4_Fig3_HTML.jpg](img/A371168_1_En_4_Fig3_HTML.jpg)\n图 4-3. 执行动态\
  \ SQL 时更改安全上下文\n\n请注意，动态 SQL 中的安全上下文不再与存储过程调用者（Edward）相同，而是更改为新用户 EdwardJr，该用户的权限远少于系统管理员。当所有权链频繁被打破时，这是为动态\
  \ SQL 设置可预测权限级别的绝佳方法。\n\n#### 处理权限错误\n\n如果权限有限的用户尝试运行此存储过程，他们会遇到问题：\n\n```sql\n\
  GRANT EXECUTE ON dbo.ownership_chaining_example TO VeryLimitedRole;\nEXECUTE AS\
  \ USER = 'VeryLimitedUser';\nEXEC dbo.ownership_chaining_example;\nREVERT;\nGO\n\
  ```\n\n此代码授予 `VeryLimitedUser` 执行权限，切换安全上下文，并运行存储过程。初始的 `SELECT` 成功，因为该用户通过 `GRANT\
  \ EXECUTE` 拥有足够的权限，但一旦你尝试切换到 EdwardJr，就会抛出错误：\n\n```\nMsg 15406, Level 16, State\
  \ 1, Line 142\nCannot execute as the server principal because the principal \"EdwardJr\"\
  \ does not exist, this type of principal cannot be impersonated, or you do not have\
  \ permission.\n```\n\n该受限用户没有必要的权限来模拟 EdwardJr 或任何其他用户，因此在尝试更改权限时立即被阻止。如果你希望限制谁可以执行特定的动态\
  \ SQL 块，这种行为可能是可取的。一如既往，让你的代码业务需求决定数据访问所需的最低权限级别，并在必要时据此调整。\n\n\n\n### 安全灾难从何而来？\n\
  \n这个问题的答案有很多，有些显而易见，另一些则更出人意料。让我们考虑一种可能的安全灾难定义：**任何非组织或其安全人员意愿所采取的行动**。这个定义故意较为宽泛，因为我们希望考虑所有可能导致“坏事”发生的方式。任何与数据库打交道足够久的人都经历过以下情况之一：\n\
  \n*   有黑客试图（或疑似试图）攻击您的组织。\n*   心怀不满的员工在未获得适当授权的情况下修改了数据。\n*   开发人员在她临时编写的 T-SQL\
  \ 中忘记了 `WHERE` 子句。\n*   一次计划的软件发布出了差错，导致数据丢失。\n*   硬件或软件故障导致基础设施进入非预期状态。\n*   通过应用程序的合法使用进行了非预期的更改。\n\
  *   软件或硬件升级产生了意料之外的后果。\n\n您很可能还能列举出许多其他足以让您夜不能寐的灾难，但所有这一切的关键都可以归结为两个基本类别：**缺乏规划**和**人为失误**。如何以一种既有意义又不突兀的方式来管理每一种风险？为了不让讨论偏离动态\
  \ SQL 太远，让我们简要回顾这些风险，并为管理它们提供一些起点。\n\n#### SQL 注入与纵深防御\n\n请记住之前的讨论：SQL 注入在最坏的情况下被利用时，可能会在错误的时间将服务器的完全控制权拱手交给错误的人。第\
  \ 2 章针对这一特定的安全威胁提供了解决方案，并指出保护应用程序的最佳方式是在多个层面上提供足够的安全性，使得绕过这些安全措施的总成本变得极高。没有万无一失的方法能保护系统免受所有威胁。就像一个有足够动力的强盗很可能可以闯入任何人的房子一样，一个野心勃勃的黑客（或团队）也能找到办法给您制造麻烦。通过避免任何可能使您的应用程序成为诱人目标的明显安全漏洞，可以阻止攻击。看到坚固的锁、结实的窗户以及明显的安防系统标志的强盗，很可能会转向更容易的目标。\n\
  \n#### 缺乏规划\n\n缺乏规划很少会显而易见，直到为时已晚。公司常常推迟高可用性和灾难恢复解决方案的实施，直到经历第一次灾难惊吓之后。渗透测试往往是在发现一次备受瞩目的黑客攻击企图后才首次进行。更严格的升级测试通常是在某次升级出问题之后才被计划和执行。应用程序中的确认提示功能，往往是在客户第一次意外删除了大量数据之后才被加入。适当的规划可以通过员工共同努力来实现，他们将审查应用程序、软件和硬件功能中的常见安全威胁作为其工作职责的一部分。理想情况下，一个由来自不同部门和背景的个人组成的团队会参与其中。虽然数据库专业人员很可能会在服务器中发现有问题的\
  \ T-SQL，但开发人员会发现应用程序中的坏代码，而客服代表可能了解客户在数据方面遇到麻烦的主要方式。\n\n#### 最小权限原则\n\n除非用户绝对需要，否则不要为他们分配数据库角色。不惜一切代价避免使用\
  \ `sysadmin` 服务器角色。除非应用程序或用户确实需要，否则应尽量减少使用 `db_owner` 数据库角色。\n\n如前所述，为应用程序和工具提供所需的最小权限（但不多给）是避免灾难的关键。考虑到\
  \ SQL Server 中有大量功能默认包含在 `sysadmin` 和 `db_owner` 中。随着每个新版本的 SQL Server 发布，都会添加新功能，而这些特性通常也会被包含在这些角色中。因此，如果一个应用程序被分配了拥有这些角色之一的用户，它可能会在升级后获得新的权限。一些目前未使用的功能——如复制、内存\
  \ OLTP、AlwaysOn 等——可能会在这些角色下被无意中变得可配置。在为任何应用程序或员工提供登录名时，务必仔细考虑。考虑它拥有的访问权限以及它可能造成的最坏情况，并判断这些情况是否可以接受。必须强调的是，如果用户的权限不允许，他们就无法制造麻烦。当权限是通过数据库或服务器角色隐式授予时，这一点尤其重要。\n\
  \n#### 人为失误与社会工程学\n\n并非所有危险行为都是技术性的。许多许多可怕的事情是由于人为失误、人性弱点或两者结合而发生的。考虑这个每天在全球各地公司上演的情景：一名客服代表接起电话。电话那头是另一个部门的经理。此人听起来很在行，并要求访问有关您最大客户之一的受限数据。这位代表因害怕质疑此人，便提供了数据，挂断电话，并完全忘记了此事。麻烦在于，打电话的人根本不是公司员工，却已经获取了重要信息。他仅仅花了几分钟就得到了它！这种技术被称为**社会工程学**，它构成了巨大威胁。再多的技术也无法阻止人们按软件设计的方式使用软件，尤其当他们有动机这样做时。\n\
  \n前面提到的其他一些例子也有类似的意外不幸主题。忘记 `WHERE` 子句的开发人员或心怀不满的员工并非通过黑客技术制造麻烦；他们只是误用了手头的工具有两种策略来防御这类事件。\n\
  \n#### 防御策略：访问控制与教育\n\n第一种是运用“**最小权限原则**”。值得再次强调已经讨论过的内容：仅提供用户完成其日常工作职能所需的访问权限。没有生产环境写入权限的员工无法对表执行\
  \ `truncate` 或 `delete` 操作。如果新的 DBA 没有进行数据定义语言更改的能力，他就不会意外地在生产环境中运行更改数据库结构的脚本。如果员工即将被解雇，请务必立即撤销其访问权限，以防止任何报复的机会。每年（或尽可能更频繁地）审查安全角色和用户访问权限，以确保组织或软件的变更不需要相应的权限变更。\n\
  \n第二种针对人性弱点的防御手段是**教育**。让所有员工了解您公司的数据和安全政策。如果这些政策尚不存在，那么与相关经理合作创建它们。教育所有员工都很重要，因为任何能访问数据的人——无论是通过\
  \ `SQL Server Management Studio` 还是他们办公桌上的终端软件——都可能犯下长远来看代价高昂的错误。对于开发人员、质量保证专家、IT\
  \ 人员和其他技术人员，鼓励他们安全地访问数据。存在许多工具可以高亮显示并颜色编码连接字符串，或者对任何没有 `WHERE` 子句或影响整张表的 T-SQL 语句发出警告。知道您连接的是生产服务器，可以避免脚本本意是用于开发数据库却意外地在生产环境中运行的可怕情况。\n\
  \n\n\n编写结构良好、文档齐全且可维护的代码是维护数据安全的关键第一步。如果在付出了所有这些努力之后，数据却因人为错误而泄露，那对任何 IT 部门来说都是极大的讽刺。请务必在所有方面保持谨慎，确保应用程序可能遭受攻击的任何角度都得到妥善防御。无论数据库泄露是源于\
  \ SQL 注入黑客攻击、心怀恐惧的客服代表，还是数据库管理员的误操作，对组织整体而言并无区别。最终结果是相似的，这应当提供所有必要的动力，尽最大可能将应用程序环境中的人为因素隔离开来。\n\
  \n### 用户、密码与不便\n\n本章讨论了安全角色、所有权链以及所有可能导致灾难的人为错误方式。所有这些情况都涉及一个共同元素：用户。要使任何这些情况发生，用户的账户必须以某种方式被不当使用。没有什么比定期更改密码更能引起抱怨的了，但强大且一致的密码策略是防御密码黑客攻击或旧账户被复活用于恶意目的的好方法。\n\
  \n在使用 Windows 身份验证时，请确保为所有 Windows 用户配置了可接受的密码策略。要求密码满足一定级别的复杂性，不允许用户重复使用密码，并强制用户定期重置密码。这不仅会将账户被泄露的可能性降到最低，还会大大降低较少使用（或被遗忘）的账户在不知情的情况下被使用的可能性。还要确保\
  \ Active Directory 保持最新状态，并且所有员工的账户在离职时都被禁用。微软坚持认为 Windows 身份验证是 SQL Server 推荐的安全形式，但要确保你的服务器尽可能安全，那些\
  \ Windows 账户本身也必须是安全的。当使用 Windows 身份验证时，你的 SQL Server 的安全性等同于被授予访问权限的 Windows 用户的安全性。必要时与你的网络或系统管理员合作，确保所有\
  \ Windows 账户都是安全的，然后确认只有必要的账户才能访问你的 SQL 服务器。\n\n如果使用 SQL Server 身份验证，请务必为每个服务器做出同样明智的决策，如图\
  \ 4-4 所示。\n\n![A371168_1_En_4_Fig4_HTML.jpg](img/A371168_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4.\n典型的 SQL Server 用户身份验证选项\n\n创建用户时，你可以配置他们的安全设置。也可以随时通过选择用户属性来调整设置。请务必强制执行密码策略和过期策略，如图\
  \ 4-4 中的复选框所示。这些策略继承自 Windows，可能来自服务器策略或 Active Directory/组策略。此策略可以包含额外的安全功能，例如锁定登录尝试失败次数过多的用户。\n\
  \n包括 IT 专业人员在内的用户都会抱怨更改密码和处理策略带来的不便。然而，这些规则带来的好处远远超过了不便。如果员工习惯了密码规则，并且有长期被公平应用的记录，他们的抱怨通常会降到最低。在处理安全规则时，往往是打破习惯最可能导致混淆和错误。提前规划并为你的数据库服务器配置强大、一致的用户安全策略，将有助于以很少的成本（对你或你的用户而言）在长期内保护你的数据。\n\
  \n### 动态 SQL 维护\n\n随着时间的推移，所有数据库对象都需要一定程度的维护。随着应用程序的发展、表的增长、对象的添加和删除以及软件的升级，存储过程、函数、视图、作业、维护计划等也需要更新。这种维护是任何软件生命周期的常规部分，但在动态\
  \ SQL 的情况下更为关键。每当创建或更改存储过程或函数等对象时，系统会检查其中的语法和对象引用是否有效。如果存在任何语法错误或任何对象不正确，将立即抛出错误，并且`CREATE/ALTER`语句将失败。由于动态\
  \ SQL 命令字符串不受解析或绑定约束，即使其内容无效，它们也会始终创建成功。\n\n这为开发人员和数据库管理员带来了重大的维护挑战。当对象的引用不受任何 SQL\
  \ Server 限制强制执行时，如何维护它们？在设计和规划应用程序版本时，有几种解决方案可以让您的生活更轻松。第一个也是最基本的解决方案是记录存储过程、作业、函数和其他对象及其依赖关系。无需过度详细，但此文档应易于搜索，并允许任何人快速查找对象的基本功能并验证任何主要依赖关系。一些组织会在称为数据字典的数据库中实现此文档。数据字典没有硬性规定；它们只是将数据库模式组织成可管理的参考指南的一种方式。具体细节留待每个组织根据自己开发和维护流程的最佳实践进行管理。\n\
  \n无论是作为数据库、电子表格、Wiki 还是文本文档实现，以某种方式组织你的数据库对象都将为整个组织提供一个宝贵的工具。他们将能够轻松了解数据库对象，而无需追踪领域专家寻求帮助。此外，当计划应用程序变更时，确定依赖关系和受这些变更影响的区域将显著更容易。最简单的数据字典将是表、列、索引、存储过程等的列表。可以添加额外信息，描述每个对象的功能、最常处理它们的开发人员以及与其他对象或软件模块的关系。\n\
  \n如果说文档是组织应用程序开发环境的方式，那么清理则是防止其不可避免地陷入无法维护的混乱状态的方法。组织非常重视在软件中创建新功能，并且通常对快速发布新功能表现出浓厚兴趣，特别是如果这些新功能能为组织赚钱的话。必须在新技术功能和技术债之间保持微妙的平衡。技术债是每个开发人员都再熟悉不过的累积待办事项清单。急需升级但没人有时间进行的升级、清理未使用的对象、旧代码的性能优化等等，都是技术债的例子。无论你的文档多么出色，要跟踪所有这些例外和遗留物都会变得困难。随着新项目成为焦点，资深开发人员退休或离职，开发人员会逐渐忘记它们。清理旧的数据库对象和对已弃用\
  \ TSQL 的引用对于保持代码可维护性至关重要。\n\n\n\n那些你今天视而不见、抛之脑后的对象，未来很容易成为安全漏洞。人人都已忘却的 `Dynamic\
  \ SQL`，很快就会变成无人愿去解读的、巨大而杂乱的文本字符串。应用程序运行正常，没人愿意去碰一个文档匮乏的未知对象。要防止这种情况，应将其作为发布周期的常规环节，定期审查所有潜在依赖项，并采取适当措施加以处理。确保所有不再需要的对象都被移除。那些需要更新的对象，应进行分析并应用正确的更新。随着你的软件、安全策略和规定的改变，这些遗留物会变成安全隐患。过去被认为坚固有效的旧加密算法，最终会因现代技术使其过于薄弱而遭弃用。适用于所有新存储过程的新编码标准，无法防范十年前写下的糟糕存储过程。当年公司初创时，由每天工作\
  \ 16 小时的开发者所编写的 `TSQL`，需要与更专业开发团队所创建的新对象一视同仁地进行处理。\n\n虽然文档对于如何利用、引用和管理新旧对象极为有用，但你如何进行最初的搜索，以找出那繁多的引用呢？SQL\
  \ Server 提供了许多系统视图，这些视图详细提供了数据库对象、它们之间的关系，以及其 `CREATE` 语句中包含的 `TSQL` 文本。通过利用这些视图，你可以构建一个多功能的搜索存储过程，该过程使用各种系统视图和\
  \ `Dynamic SQL` 来返回包含给定搜索项的对象列表，如清单 4-5 所示。\n\n\n\n### 清单 4-5. 架构搜索存储过程\n\n####\
  \ 架构搜索存储过程\n\n```sql\nCREATE PROCEDURE dbo.search_all_schema\n@searchString NVARCHAR(MAX)\n\
  AS\nBEGIN\nSET NOCOUNT ON;\n-- 这是您想要在数据库和作业中搜索的字符串。MSDB、model 以及任何名称类似于 tempDB 的数据库将被忽略\n\
  SET @searchString = '%' + @searchString + '%';\nDECLARE @sql NVARCHAR(MAX);\nDECLARE\
  \ @database_name NVARCHAR(MAX);\nDECLARE @databases TABLE (database_name NVARCHAR(MAX));\n\
  IF EXISTS (SELECT * FROM tempdb.sys.tables WHERE name = '##object_data')\nBEGIN\n\
  DROP TABLE ##object_data;\nEND\nCREATE TABLE ##object_data\n(\ndatabase_name NVARCHAR(MAX),\n\
  table_name SYSNAME,\nobjectname SYSNAME,\nobject_type NVARCHAR(MAX)\n);\nIF EXISTS\
  \ (SELECT * FROM tempdb.sys.tables WHERE name = '##index_data')\nBEGIN\nDROP TABLE\
  \ ##index_data;\nEND\nCREATE TABLE ##index_data\n(\ndatabase_name NVARCHAR(MAX),\n\
  table_name SYSNAME,\nindex_name SYSNAME,\nkey_column_list NVARCHAR(MAX),\ninclude_column_list\
  \ NVARCHAR(MAX)\n);\nINSERT INTO @databases\n(database_name)\nSELECT\nname\nFROM\
  \ sys.databases\nWHERE name NOT IN ('msdb', 'model', 'tempdb')\nAND state_desc \
  \ 'OFFLINE';\nDECLARE DBCURSOR CURSOR FOR SELECT database_name FROM @databases;\n\
  OPEN DBCURSOR;\nFETCH NEXT FROM DBCURSOR INTO @database_name;\nWHILE @@FETCH_STATUS\
  \ = 0\nBEGIN\nSET @sql = '\nUSE ' + @database_name + ';\nWITH CTE_SCHEMA_METADATA\
  \ AS (\nSELECT db_name() AS database_name, '''' AS table_name, o.Name AS objectname,\
  \ CASE o.Type\nWHEN ''P'' THEN ''存储过程'' WHEN ''TR'' THEN ''触发器'' WHEN ''V'' THEN\
  \ ''视图'' WHEN ''C'' THEN ''检查约束'' WHEN ''D'' THEN ''默认值'' WHEN ''FN'' THEN ''标量函数''\
  \ WHEN ''IF'' THEN ''内联函数''\nWHEN ''F'' THEN ''外键'' WHEN ''PK'' THEN ''主键'' WHEN\
  \ ''R'' THEN ''规则'' WHEN ''TA'' THEN ''程序集触发器'' WHEN ''UQ'' THEN ''唯一约束'' WHEN ''TF''\
  \ THEN ''表值函数'' ELSE o.Type END AS object_type\n-- 视图、存储过程、触发器、检查约束、默认约束和规则。\nFROM\n\
  (\nSELECT id,\nCAST(COALESCE(MIN(CASE WHEN sc.colId = 1 THEN sc.text END), '''')\
  \ AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE WHEN sc.colId = 2 THEN sc.text END),\
  \ '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE WHEN sc.colId = 3 THEN sc.text\
  \ END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE WHEN sc.colId = 4 THEN\
  \ sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE WHEN sc.colId\
  \ = 5 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE WHEN\
  \ sc.colId = 6 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 7 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 8 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 9 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 10 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 11 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 12 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 13 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 14 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 15 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 16 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 17 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 18 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 19 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 20 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 21 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 22 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 23 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 24 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 25 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 26 THEN sc.text END), '''') AS NVARCHAR(max)) +\nCAST(COALESCE(MIN(CASE\
  \ WHEN sc.colId = 27 THEN sc.text END), '''') AS NVARCHAR(max)) [text]\nFROM syscomments\
  \ SC\nWHERE SC.colId IS NOT NULL\nGROUP BY id\n) C\nINNER JOIN sysobjects O\nON\
  \ C.id = O.id\nWHERE C.text LIKE ''' + @searchString + '''\nAND NAME NOT LIKE ''%syncobj%''\n\
  UNION ALL\nSELECT db_name() AS database_name, ST.name AS table_name, '''' AS objectname,\
  \ ''表'' AS object_type -- 表（仅名称）\nFROM sys.tables ST\nWHERE ST.name LIKE ''' + @searchString\
  \ + '''\nUNION ALL\nSELECT db_name() AS database_name, ST.name AS table_name, SC.name\
  \ AS column_name, ''列'' AS object_type -- 列\nFROM sys.tables ST\nINNER JOIN sys.columns\
  \ SC\nON ST.object_id = SC.object_id\nWHERE SC.name LIKE ''' + @searchString + '''\n\
  UNION ALL\nSELECT\ndb_name() AS database_name, ST.name AS table_name, SI.name AS\
  \ column_name, ''索引'' AS object_type -- 索引（仅名称）\nFROM sys.indexes SI\nINNER JOIN\
  \ sys.tables ST\nON ST.object_id = SI.object_id\nWHERE SI.name LIKE ''' + @searchString\
  \ + ''')\nINSERT INTO ##object_data\n(database_name, table_name, objectname, object_type)\n\
  SELECT\n*\nFROM CTE_SCHEMA_METADATA\nORDER BY object_type ASC, objectname ASC;\n\
  WITH CTE_INDEX_COLUMNS AS (\nSELECT -- 用户索引（列名匹配搜索字符串）\ndb_name() AS database_name,\n\
  TABLE_DATA.name AS table_name,\nINDEX_DATA.name AS index_name,\nSTUFF(( SELECT '',\
  \ '' + SC.name\nFROM sys.tables AS ST\nINNER JOIN sys.indexes SI\nON ST.object_id\
  \ = SI.object_id\nINNER JOIN sys.index_columns IC\nON SI.object_id = IC.object_id\n\
  AND SI.index_id = IC.index_id\nINNER JOIN sys.all_columns SC\nON ST.object_id =\
  \ SC.object_id\nAND IC.column_id = SC.column_id\nWHERE INDEX_DATA.object_id = SI.object_id\n\
  AND INDEX_DATA.index_id = SI.index_id\nAND IC.is_included_column = 0\nORDER BY IC.key_ordinal\n\
  FOR XML PATH('''')), 1, 2, '''') AS key_column_list,\nSTUFF(( SELECT ', ' + SC.name\n\
  FROM sys.tables AS ST\nINNER JOIN sys.indexes SI\nON ST.object_id = SI.object_id\n\
  INNER JOIN sys.index_columns IC\nON SI.object_id = IC.object_id\nAND SI.index_id\
  \ = IC.index_id\nINNER JOIN sys.all_columns SC\nON ST.object_id = SC.object_id\n\
  AND IC.column_id = SC.column_id\nWHERE INDEX_DATA.object_id = SI.object_id\nAND\
  \ INDEX_DATA.index_id = SI.index_id\nAND IC.is_included_column = 1\nORDER BY IC.key_ordinal\n\
  FOR XML PATH('''')), 1, 2, '''') AS include_column_list,\n''索引列'' AS object_type\n\
  FROM sys.indexes INDEX_DATA\nINNER JOIN sys.tables TABLE_DATA\nON TABLE_DATA.object_id\
  \ = INDEX_DATA.object_id\nWHERE TABLE_DATA.is_ms_shipped = 0       )\nINSERT INTO\
  \ ##index_data\n(database_name, table_name, index_name, key_column_list, include_column_list)\n\
  SELECT\ndatabase_name, table_name, index_name, key_column_list, ISNULL(include_column_list,\
  \ '''') AS include_column_list\nFROM CTE_INDEX_COLUMNS\nWHERE CTE_INDEX_COLUMNS.key_column_list\
  \ LIKE ''' + @searchString + '''\nOR CTE_INDEX_COLUMNS.include_column_list LIKE\
  \ ''' + @searchString + ''';'\nEXEC sp_executesql @sql;\nFETCH NEXT FROM DBCURSOR\
  \ INTO @database_name;\nEND\nSELECT\n*\nFROM ##object_data;\nSELECT\n*\nFROM ##index_data\n\
  -- 搜索以查看任何作业步骤中是否存在文本\nSELECT\nj.job_id,\ns.srvname,\nj.name,\njs.step_id,\njs.command,\n\
  j.enabled\nFROM msdb.dbo.sysjobs j\nINNER JOIN msdb.dbo.sysjobsteps js\nON js.job_id\
  \ = j.job_id\nINNER JOIN master.dbo.sysservers s\nON s.srvid = j.originating_server_id\n\
  WHERE js.command LIKE @searchString;\nDROP TABLE ##object_data;\nDROP TABLE ##index_data;\n\
  END\nGO\n```\n\n\n### SQL Server 全文搜索存储过程与技术债务管理\n\n此存储过程功能相当广泛，但提供了一个出色的研究工具，可以搜索服务器上的所有数据库以及\
  \ SQL Server Agent 作业，查找任何作为 `@searchString` 参数提供的文本。由于数据库级别的系统视图在每个数据库中有所不同，因此有必要逐个数据库查询这些视图。使用动态\
  \ SQL 可以快速遍历所有数据库（`msdb`、`model`、`tempdb` 以及任何脱机数据库除外）。它返回三个结果集：数据库对象、索引和作业。如果需要，可以使用\
  \ `UNION ALL` 将这些输出表合并为单个输出表，但为了本演示的目的，我们将它们分开，这样每个结果集的可读性更高。\n\n#### 搜索功能示例\n\n\
  如果你需要执行一个通用的搜索，例如确定 `BusinessEntityContact` 表是否在服务器的任何地方被引用，你可以按如下方式运行存储过程：\n\n\
  ```\nEXEC dbo.search_all_schema N'BusinessEntityContact';\n```\n\n图 4-5 中的结果数据集包括两个数据库中的四个视图、两个表值函数、两个表和八个索引。未找到以此名称命名的索引或作业。如果希望限制数据库名称，以免浪费额外资源并返回所有数据库的结果，可以轻松添加另一个参数来指定数据库搜索词。\n\
  \n![A371168_1_En_4_Fig5_HTML.jpg](img/A371168_1_En_4_Fig5_HTML.jpg)\n\n*图 4-5. 使用表名执行架构搜索的输出示例*\n\
  \n这种搜索功能在研究软件变更、现有对象和依赖关系时极其有用。查找一个表名的所有实例只需要几秒钟的研究时间，而不是几个小时。此存储过程可用于搜索更具体的搜索词，例如主键的名称：\n\
  \n```\nEXEC dbo.search_all_schema N'PK_Sales';\n```\n\n图 4-6 中的结果显示了一组有限的主键，它们都以你提供的搜索词开头。\n\
  \n![A371168_1_En_4_Fig6_HTML.jpg](img/A371168_1_En_4_Fig6_HTML.jpg)\n\n*图 4-6. 使用主键名称执行架构搜索的输出示例*\n\
  \n这产生了一些“噪音”，因为许多主键恰好包含了你正在寻找的特定名称。从结果集中清除噪音是一项微不足道的任务，尽管这些额外结果在寻找与目标搜索对象类似的模式时可能有用。图\
  \ 4-7 中的最后一个示例显示了使用对象的完整架构和表名进行更具体搜索的结果。\n\n![A371168_1_En_4_Fig7_HTML.jpg](img/A371168_1_En_4_Fig7_HTML.jpg)\n\
  \n*图 4-7. 使用完整表名执行架构搜索的输出示例*\n\n```\nEXEC dbo.search_all_schema N'Production.Product';\n\
  ```\n\n此执行显示了非常具体的结果，因为只有两个存储过程和一个孤立的作业引用了 `Production.Product` 的完整文本。\n\n#### 应用与扩展\n\
  \n像这样的工具是有效跟进数据库模式维护的宝贵方法。如果有一些针对你的数据库环境的功能是此存储过程未涉及的，请考虑修改它以添加进一步的过滤器、搜索能力，或针对特定应用程序的硬编码需求。SQL\
  \ Server 中还有许多其他对象未在此处处理，但可以包括，例如复制发布名称、链接服务器名称、登录名、用户或 SSIS 包详情。添加这些（或其他）对象的任务将是向动态\
  \ SQL 部分附加额外的 T-SQL 代码，以包含所需的任何其他对象。\n\n利用搜索功能协助移除废弃功能、更新依赖关系，并确保你的团队在技术债务变得难以管理之前，具备必要的知识，以尽可能高效有效地处理它。这些定期搜索有助于确保应用程序的最大安全性，因为潜在的安全漏洞可以被快速发现和修补。搜索\
  \ `sp_executesql` 和 `EXEC` 有助于发现动态 SQL 的所有使用情况，这对于验证数据库服务器内的 T-SQL 是否存在 SQL 注入漏洞可能很有价值。\n\
  \n# 清理 house\n\n一项经常被忽视，以便推进新功能的任务是移除旧的列、表、存储过程或其他 T-SQL。典型的开发周期包括废弃未使用的功能，并基本上将其标记为未来移除。常常被忽略的是关于这些对象如何以及何时被移除的细节。在时机到来之前，它们不太可能得到完全更新或维护。无论如何，它们都是技术债务，除非付出特殊努力来处理，否则将无限期存在。\n\
  \n一旦你全力投入到升级、新功能和其他研发工作中，清理工作就变成了遥远的记忆。即使是 SQL Server 本身也充满了长长的废弃功能列表。废弃功能是指被标记为未来移除，但为了向后兼容目的而在过渡期间保留的功能。为了提供背景，在撰写本文时，SQL\
  \ Server 2016 CTP 总共有 254 个废弃功能。相比之下，已中止的功能数量为 30。已中止的功能是从产品中移除且不再可用的功能。显然，结束对某个功能的支持并停止升级它，比完全移除它的麻烦要容易得多。如果这对微软来说是一个缓慢的过渡，那么对任何人来说显然都是一个挑战！\n\
  \n#### 管理功能废弃与移除\n\n管理软件功能废弃和移除的一个好方法，是将中止过程纳入标准开发生命周期。当一个功能被标记为不再需要时，包含一个将其移除的时间表。除了创建时间表之外，还要确保包含足够的细节，以便可以执行中止操作。考虑以下问题：\n\
  \n- 为了完全移除此功能，需要处理哪些组件？\n- 移除每个组件需要多少工作量？\n- 谁需要参与每个组件的移除工作？\n- 这项工作将如何适应新功能的开发时间表？\n\
  - 在移除之前，这些功能需要什么维护？\n\n作为技术债务，这项工作的优先级通常低于新功能。提出并回答这些问题有助于确保重要的维护工作不会被遗忘。最后一点在倡导这项工作时至关重要：为了正确维护旧组件，需要哪些持续的工作和维护？这可能包括软件许可成本、额外的硬件使用、云存储和处理能力、文档，以及任何其他可能耗费时间和金钱的东西。\n\
  \n#### 风险与影响\n\n正如扁桃体或阑尾可能成为你健康的负担一样，旧功能会随着时间的推移慢慢阻碍进展。更重要的是，它们提供了更容易遭受安全漏洞的区域，因为它们不再是你开发工作的前沿。通常，废弃功能的维护很快，质量保证最少，因为它们对应用程序不再那么关键，甚至可能不再在前端使用。这些事实必须作为应用程序常规开发的一部分来应对，但当涉及动态\
  \ SQL 时，对 DBA 尤为重要，因为它可能提供额外的访问权限，这些权限随着时间的推移可能会变得不受欢迎。\n\n\n### SQL Server 安全实践：弃用功能与权限管理\n\
  \n#### 弃用不安全功能与代码移除\n\n如果正在弃用使用动态 SQL、`xp_cmdshell` 或 SQL Server 中任何可能为数据库对象提供额外访问权限的功能，请考虑作为流程的一部分采取额外步骤来保护它们。如果应用程序不再使用该功能，请考虑移除动态\
  \ SQL 部分，并用令牌占位符替换。这确保了任何一方，无论是组织内部还是外部，都无法以任何方式滥用它。此策略可用于任何不再使用但必须维护以确保软件构建成功完成的\
  \ T-SQL。如果一个功能不再使用但无法被直接丢弃，请考虑将其缩减至开发流程所允许的最小范围。这不仅会降低安全风险，而且在需要移除时会使过程更容易，因为更多的功能可能已经不存在了。\n\
  \n移除未使用和过时的代码可能是防止未来发生意外安全漏洞的最有效方法之一。\n\n移除功能时的一个常见错误是意外地让其部分仍在使用，或者某些组件仍在应用程序中运行。也许一个搜索过程在软件加载时仍然运行，即使结果未被应用程序捕获。另一种可能性是，存在一个不再被任何活动页面链接的网页，但通过手动输入\
  \ URL 或通过收藏夹访问该页面仍可访问。在弃用过程中移除核心功能将突出显示这些被遗漏的机会，并提供简单的 QA 反馈，以便这些漏洞可以被迅速关闭。这可以简化停止使用的过程，并消除由于意外/隐藏代码路径导致的未来开发错误或安全漏洞的可能性。\n\
  \n#### 登录与用户使用\n\n“**最小权限原则**”告诉您，只为登录名和用户完成其工作提供所需的权限，不多也不少。为了有效实施，一个隐含的步骤是不要在多个应用程序或用户之间共享登录名。每个单独的\
  \ SQL Server 登录名，无论它使用 Windows 身份验证还是 SQL Server 身份验证，都应服务于一个独特且单一的目的。这通过以下方式大大提高了安全性：\n\
  \n*   更容易禁用然后删除与旧应用程序或已离职员工相关的未使用登录名。\n*   为每个单独的应用程序提供更细粒度的权限控制。\n*   阻止不同员工，特别是来自不同部门或担任不同角色的员工，共享用户。\n\
  *   通过保持对安全性的微妙关注，鼓励负责任的开发习惯。\n*   允许更轻松地将应用程序迁移到新的服务器或平台。\n*   提高对安全威胁、漏洞或攻击的响应速度。\n\
  \n考虑这样一个场景：一个应用程序在三个数据库上拥有 `db_owner` 权限。一名新员工入职并将为您的组织维护此应用程序。她被提供了一个标准登录名、访问权限和关联账户。作为便利，该用户也被授予了应用程序所使用的登录名的凭据。这使得新员工可以立即开始她的应用程序开发工作，而无需任何额外的安全请求。一年后，应用程序扩展，需要额外的权限来访问一些系统视图和管理一些服务器设置。\n\
  \n几年后，该员工离开了公司，IT 部门忘记了她拥有应用程序登录名的访问权限，因此他们未能更改密码或考虑这些事实带来的后果。该员工发现她通过应用程序登录名的访问权限仍然完好无损，并决定悄悄窃取一些组织数据。从这一点开始，该组织就被入侵了，而且极有可能直到采取某些引起他们注意的行动之前，她的访问都不会被发现。除了窃取数据，她还可以更改数据库设置、修改数据，甚至删除应用程序数据库。\n\
  \n解决此问题的方法是从一开始就绝不让该员工共享登录名。创建新的登录名或修改其标准凭据以合并这些额外权限可能会花费一些额外时间。文档也将是关键，以确保任何可能需要审计、更改或禁用其访问权限的人员都可以访问该用户的额外访问权限。登录名共享的时间越长，就越容易忘记这种双重性的本质，并对其“正常工作”变得自满。\n\
  \n一个同样令人沮丧的情况是，将个人的登录名用作应用程序的登录凭据。只要该员工在组织内工作，这种设置就可以正常工作，但一旦他离开，事情就变得棘手了。如果 IT\
  \ 注意到共享用户，他们将被迫快速计划一次临时权限更改。这可能涉及更改应用程序密码或创建新的应用程序用户。这两者都可能需要停机时间以促进更改。如果共享用户未被记录在案，并且在该员工离职时按照标准程序被禁用，应用程序将立即停止工作。结果将是计划外的停机时间，并且负责该应用程序的人员可能需要加班到深夜。\n\
  \n\n\n### 审计用户与登录\n\n防范任何不期望的安全状况的一个额外保障措施，是定期安排并实施对所有 SQL Server 登录名和用户的审计。要验证权限在符合当前安全策略和应用需求方面是充分且相关的。确保所有登录名和用户都是必需的，并且将登录名映射到用户的权限也是必要的。这个过程从组织和技术层面看可能都令人望而生畏，但通过使用合适的脚本以及与所有相关方进行有效沟通，可以使其变得更容易。通常情况下，经理和同事们都会乐意帮助你确保他们的数据安全，并遵守任何相关标准。\n\
  \n在 TSQL 脚本领域，有许多可能有用的脚本。本章提供了一些作为起点，但你可以随意修改这些或在网上搜索更深入的版本。目标是识别所有登录名和用户、自定义的安全对象，以及登录名和用户之间的映射关系。首先，让我们使用清单\
  \ 4-6 中的脚本简要查看服务器上的所有登录名和角色。\n\n#### 列出服务器登录名和角色\n\n```sql\nSELECT\n    server_principals.name\
  \ AS Login_Name,\n    server_principals.type_desc AS Account_Type\nFROM sys.server_principals\n\
  WHERE server_principals.name NOT LIKE '%##%'\nORDER BY server_principals.name, server_principals.type_desc;\n\
  ```\n\n*清单 4-6. 用于检索服务器登录名和角色列表的脚本*\n\n此查询将返回类似于图 4-8 的结果。\n\n![A371168_1_En_4_Fig8_HTML.jpg](img/A371168_1_En_4_Fig8_HTML.jpg)\n\
  \n*图 4-8. 来自清单 4-6 中 TSQL 的服务器登录名和角色列表*\n\n结果包含所有 SQL 登录名，例如我自己的登录名 `Edward`，以及我的测试登录名\
  \ `EdPollack` 和 `EdwardJr`。Windows 身份验证用户 `SANDILE\\Edward` 也在此服务器上。此外，还有 SQL Server\
  \ 服务和服务器级角色使用的各种系统登录名。可以按类型进行过滤，以将结果集限制为仅非系统登录名。`U` 表示 Windows 登录名，`S` 表示 SQL 登录名，`G`\
  \ 表示 Windows 组。仅过滤这些类型将使结果集减少到你最可能感兴趣审计的内容，如图 4-9 所示。\n\n![A371168_1_En_4_Fig9_HTML.jpg](img/A371168_1_En_4_Fig9_HTML.jpg)\n\
  \n*图 4-9. 移除服务器角色后的登录名列表*\n\n此查询可以轻松地在所有生产服务器上执行，并且可以聚合结果，以便快速查看哪些登录名存在于哪些服务器上。这可以快速洞察不应存在的登录名，或者在给定服务器上可能缺失的登录名。\n\
  \n#### 暴露自定义安全对象\n\n接下来的研究将涉及暴露自定义的安全对象。如果对某个对象授予了特定权限，你肯定想知道这些权限是什么、授予了谁，并验证它们确实是必要的。这是一个特别容易因疏忽或遗漏而出错的领域，因为从\
  \ SQL Server Management Studio GUI 验证这些细节可能既缓慢又繁琐。\n\n清单 4-7 中的查询返回任何显式分配的对象级权限列表，如图\
  \ 4-10 所示。为了减少列表中的大量干扰信息，任何系统安全对象都被省略了。\n\n```sql\nSELECT\n    OBJECT_NAME(database_permissions.major_id)\
  \ AS object_name,\n    USER_NAME(database_permissions.grantee_principal_id) AS role_name,\n\
  \    database_permissions.permission_name\nFROM sys.database_permissions\nWHERE\
  \ database_permissions.class = 1\n    AND OBJECTPROPERTY(database_permissions.major_id,\
  \ 'IsMSSHipped') = 0\nORDER BY OBJECT_NAME(database_permissions.major_id);\n```\n\
  \n*清单 4-7. 列出任何用户创建的安全对象的脚本*\n\n![A371168_1_En_4_Fig10_HTML.jpg](img/A371168_1_En_4_Fig10_HTML.jpg)\n\
  \n*图 4-10. 移除系统安全对象后的对象级权限*\n\n在我的本地服务器上，有一些权限授予了某些存储过程。我的 sysadmin 用户 `Edward`\
  \ 被包含在内可能看起来有些奇怪，但万一我的用户账户权限被降低，了解我拥有的任何额外安全对象对于完整地完成该任务将至关重要。此查询可以在生产服务器上运行，让你知道随着时间的推移分配给不同用户和角色的特殊权限。这可以确保实施的任何安全变更都考虑到了所有存在的例外情况。\n\
  \n#### 收集登录名到用户的映射\n\n另一项你经常需要完成的任务是收集服务器登录名与每个数据库内用户之间的关联关系。这些关系决定了登录名在给定数据库内可能拥有的额外权限。例如，一个登录名在服务器级别可能没有被分配显式权限，但在数据库级别可能被授予各种与其工作或应用职责相符的权限。\n\
  \n清单 4-8 中的脚本使用 SQL Server 系统存储过程收集登录名映射列表，将结果直接插入到一个临时表中。然后从临时表中返回结果。`sp_msloginmappings`\
  \ 的输出格式为每个登录名一个输出集，因此非常难以用于报告或分析。通过将结果直接返回到临时表，你可以将所有映射数据放入单个结果集中，你可以随意对其进行筛选、排序或读取。我在本地计算机上的结果集如图\
  \ 4-11 所示。\n\n```sql\nCREATE TABLE #login_user_mapping (\n    login_name NVARCHAR(MAX),\n\
  \    database_name NVARCHAR(MAX),\n    user_name NVARCHAR(MAX),\n    alias_name\
  \ NVARCHAR(MAX));\n\nINSERT INTO #login_user_mapping\nEXEC master.dbo.sp_msloginmappings;\n\
  \nSELECT\n    *\nFROM #login_user_mapping\nORDER BY database_name,\n    user_name;\n\
  \nDROP TABLE #login_user_mapping;\n```\n\n*清单 4-8. 用于返回服务器登录名与数据库用户之间关系的 TSQL*\n\
  \n![A371168_1_En_4_Fig11_HTML.jpg](img/A371168_1_En_4_Fig11_HTML.jpg)\n\n*图 4-11.\
  \ 此 SQL Server 上所有登录名/用户映射的完整列表*\n\n每个登录名都与一个数据库和一个用户相关联。如果存在任何别名，它们也会被返回。这让你可以跟踪给定登录名有权访问哪些数据库。通常，当一个登录名被删除时，与该登录名关联的任何用户将保留在各自的数据库中，直到管理员进行处理。此查询返回的结果可以确保你在禁用或删除服务器登录名时，正确地清理所有数据库用户。\n\
  \n还有许多其他系统视图和存储过程可用于分析 SQL Server 安全性，但本章讨论的这几个应该提供了一个坚实的起点，让你能够评估数据库环境，并在了解这些信息后识别出任何可以轻松解决的重要安全缺陷。\n\
  \n\n\n#### 内存消耗\n\n之前，本章简要讨论了字符串截断对动态 SQL 的影响，以及它如何导致命令字符串执行错误或引发错误。迄今为止的大多数动态 SQL\
  \ 示例的命令字符串都相对较短，其长度是根据传入的参数预先确定的。在命令字符串的长度由特定数量的对象或数据量控制的情况下，生成的字符串可能非常大。与在 SQL\
  \ Server 中定义的其他标量参数一样，命令字符串也存储在内存中。考虑清单 4-9 中的动态 SQL。\n\n```sql\nDECLARE @databases\
  \ TABLE\n(database_name NVARCHAR(MAX));\nINSERT INTO @databases\n(database_name)\n\
  SELECT\ndatabases.name\nFROM sys.databases;\nDECLARE @sql_command NVARCHAR(MAX)\
  \ = '';\nSELECT @sql_command = @sql_command + '\nDBCC CHECKDB (' + database_name\
  \ + ');'\nFROM @databases;\nPRINT @sql_command;\nEXEC sp_executesql @sql_command;\n\
  ```\n\n清单 4-9. 用于检查此实例上所有数据库完整性的动态 SQL\n\n此动态 SQL 将创建一个命令字符串，该字符串将在此 SQL Server\
  \ 实例上对所有数据库运行 `DBCC CHECKDB`。命令字符串将为每个数据库包含一行，无论服务器上存在多少个数据库。由于此特定命令很短，因此在我的服务器上，命令字符串将如下所示：\n\
  \n```sql\nDBCC CHECKDB (master);\nDBCC CHECKDB (tempdb);\nDBCC CHECKDB (model);\n\
  DBCC CHECKDB (msdb);\nDBCC CHECKDB (AdventureWorks2012);\nDBCC CHECKDB (AdventureWorks2014);\n\
  DBCC CHECKDB (AdventureWorks2008);\n```\n\n虽然此示例很短，但试想一下，如果我的服务器上有 500 个数据库会发生什么。在这种情况下，命令字符串将长达\
  \ 500 行。这仍然不算特别大，但如果对象数量或涉及的文本变得太长，就会引入潜在的内存问题。例如，如果你要为服务器上所有数据库中的所有表组装一个行数报告怎么办？在这种情况下，在一个有\
  \ 500 个数据库且每个数据库有 500 个表的服务器上，你将拥有一个长达 250,000 行的命令字符串。如果每个命令的文本类似于 `SELECT COUNT(*)\
  \ FROM schema_name.table_name`，那么每行文本大约为 300 字节。总的命令字符串大小将约为 75MB，这远低于服务器可能拥有的内存量，但它说明了无界语句可能带来的潜在性能和安全性威胁。\n\
  \n编写动态 SQL 时，请注意命令字符串的长度。如果它可能无界地增长，请考虑添加一个截止点以防止其变得过大。或者，分批处理语句，以便一次处理一组行，而不是一次性处理所有行。虽然命令字符串增长到千兆字节大小的情况很少见，但这并非不可能，也不应被忽视。过度的增长也可能由于开发人员的错误而发生，例如，如果你忘记递增计数器或推进游标。如果你允许字符串无限增长，服务器内存最终将耗尽。结果很可能是某种形式的\
  \ SQL Server 崩溃，这可能会影响其数据库托管在此服务器上的其他应用程序。\n\n```sql\nSET NOCOUNT ON;\nDECLARE @databases\
  \ TABLE\n(database_name NVARCHAR(MAX));\nCREATE TABLE ##tables\n(database_name NVARCHAR(MAX),\n\
  schema_name NVARCHAR(MAX),\ntable_name NVARCHAR(MAX),\nrow_count BIGINT);\nDECLARE\
  \ @sql_command NVARCHAR(MAX) = '';\nINSERT INTO @databases\n(database_name)\nSELECT\n\
  databases.name\nFROM sys.databases\nWHERE databases.name <> 'tempdb';\nDECLARE @current_database\
  \ NVARCHAR(MAX);\nWHILE EXISTS (SELECT * FROM @databases)\nBEGIN\nSELECT TOP 1 @current_database\
  \ = database_name FROM @databases;\nSELECT @sql_command = @sql_command + '\nUSE\
  \ [' + @current_database + ']\nINSERT INTO ##tables\n(database_name, schema_name,\
  \ table_name, row_count)\nSELECT\n''' + @current_database + ''',\nschemas.name,\n\
  tables.name,\nCOUNT(*)\nFROM sys.tables\nINNER JOIN sys.schemas\nON tables.schema_id\
  \ = schemas.schema_id';\nEXEC sp_executesql @sql_command;\nDELETE FROM @databases\
  \ WHERE database_name = @current_database;\nEND\nSELECT @sql_command = '';\nSELECT\
  \ @sql_command = @sql_command + '\nUPDATE ##tables\nSET row_count = (SELECT COUNT(*)\n\
  FROM [' + database_name + '].[' + schema_name + '].[' + table_name + '])\nWHERE\
  \ database_name = ''' + database_name + '''\nAND schema_name = ''' + schema_name\
  \ + '''\nAND table_name = ''' + table_name + ''';'\nFROM ##tables;\nSELECT (LEN(@sql_command)\
  \ * 2) AS length_of_large_sql_command\nEXEC sp_executesql @sql_command;\nSELECT\n\
  *\nFROM ##tables;\nDROP TABLE ##tables;\n```\n\n清单 4-10. 用于收集此 SQL Server 实例上所有表的行数的动态\
  \ SQL\n\n清单 4-10 中的 TSQL 使用动态 SQL 构建了一个很长的命令字符串，该字符串将收集服务器上所有数据库（`TempDB` 除外）中所有表的行数。服务器上的数据库和表越多，字符串就越大。在执行命令字符串之前，你返回了其长度（以字节为单位），该长度计算为字符串中字符数的两倍。字符乘以二，是为了说明命令字符串是\
  \ `NVARCHAR` 数据类型这一事实，该类型由双字节 UNICODE 字符组成。在我本地有六个数据库的服务器上，此命令字符串的长度为 3.04MB。在数据库和表多得多的服务器上，其长度可能会变得过长。清单\
  \ 4-11 展示了一个分批处理的示例，该示例限制了一次处理的行数，确保命令字符串不会变得太大。此特定示例分别处理每个数据库的行数，这通常足以限制命令字符串的总体大小。相应的\
  \ TSQL 见清单 4-11。\n\n```sql\nSET NOCOUNT ON;\nDECLARE @databases TABLE\n(database_name\
  \ NVARCHAR(MAX));\nCREATE TABLE ##tables\n(database_name NVARCHAR(MAX),\nschema_name\
  \ NVARCHAR(MAX),\ntable_name NVARCHAR(MAX),\nrow_count BIGINT);\nDECLARE @sql_command\
  \ NVARCHAR(MAX) = '';\nINSERT INTO @databases\n(database_name)\nSELECT\ndatabases.name\n\
  FROM sys.databases\nWHERE databases.name <> 'tempdb';\nDECLARE @current_database\
  \ NVARCHAR(MAX);\nWHILE EXISTS (SELECT * FROM @databases)\nBEGIN\nSELECT TOP 1 @current_database\
  \ = database_name FROM @databases;\nSELECT @sql_command = '';\nSELECT @sql_command\
  \ = @sql_command + '\nUSE [' + @current_database + ']\nINSERT INTO ##tables\n(database_name,\
  \ schema_name, table_name, row_count)\nSELECT\n''' + @current_database + ''',\n\
  schemas.name,\ntables.name,\nCOUNT(*)\nFROM sys.tables\nINNER JOIN sys.schemas\n\
  ON tables.schema_id = schemas.schema_id';\nEXEC sp_executesql @sql_command;\nSELECT\
  \ @sql_command = '';\nSELECT @sql_command = @sql_command + '\nUPDATE ##tables\n\
  SET row_count = (SELECT COUNT(*)\nFROM [' + database_name + '].[' + schema_name\
  \ + '].[' + table_name + '])\nWHERE database_name = ''' + database_name + '''\n\
  AND schema_name = ''' + schema_name + '''\nAND table_name = ''' + table_name + ''';'\n\
  FROM ##tables\nWHERE database_name = @current_database;\nEXEC sp_executesql @sql_command;\n\
  DELETE FROM @databases WHERE database_name = @current_database;\nEND\nSELECT\n*\n\
  FROM ##tables;\nDROP TABLE ##tables;\n```\n\n清单 4-11. 用于收集所有表行数的分批处理动态 SQL\n\n\n\
  \n# 5. 管理作用域\n\n### 结论\n\n所有这些安全建议可能看起来与动态 SQL 的主题相去甚远，但对于确保您所进行的开发既有效又安全至关重要。采纳并实施这些建议中的任何一条或全部最佳实践，可以大大降低\
  \ SQL 注入的风险，以及其他可能无意中在您的系统中制造漏洞的攻击方式。如果您对此主题感兴趣，市面上有许多书籍和课程会更深入地探讨安全问题。本章旨在提供 SQL\
  \ Server 安全性的入门介绍和概述，重点关注动态 SQL 及其面临的最重大安全威胁。\n\n当您继续探索动态 SQL 如何执行强大的搜索、维护或数据转换的进一步示例时，请牢记与安全相关的考虑因素可能对不仅您的查询，而且对您的整个\
  \ SQL Server 的完整性产生持久影响。现在就做出正确的决定，远比日后回来清理先前开发工作留下的错误要容易得多。\n\n## 清单 4-11.\n\n\
  ```sql\nFROM sys.tables\nINNER JOIN sys.schemas\nON tables.schema_id = schemas.schema_id';\n\
  EXEC sp_executesql @sql_command;\nSELECT @sql_command = '';\nSELECT @sql_command\
  \ = @sql_command + '\nUPDATE ##tables\nSET row_count = (SELECT COUNT(*)\nFROM ['\
  \ + database_name + '].[' + schema_name + '].[' + table_name + '])\nWHERE database_name\
  \ = ''' + database_name + '''\nAND schema_name = ''' + schema_name + '''\nAND table_name\
  \ = ''' + table_name + ''';'\nFROM ##tables\nWHERE database_name = @current_database;\n\
  SELECT (LEN(@sql_command) * 16) + 2 AS length_of_large_sql_command\nEXEC sp_executesql\
  \ @sql_command;\nDELETE FROM @databases WHERE database_name = @current_database;\n\
  END\nSELECT\n*\nFROM ##tables;\nDROP TABLE ##tables;\n```\n\n使用批处理命令字符串创建的动态 SQL，用于收集此\
  \ SQL Server 实例上所有表的行数\n\n行数 T-SQL 重写版本中唯一的区别是，行数的收集发生在主循环中，在每个数据库的表被枚举之后。这将命令字符串的生成拆分为每个数据库一个。它没有创建一个\
  \ 3MB 的命令字符串，而是创建并执行了六个不同的命令字符串，每个都不超过 475KB。在由于要分析的对象数量庞大而导致命令字符串长度可能变得非常长的场景中，批处理可以确保内存压力永远不会成为安全或稳定性问题，即使在处理极大数据集时也是如此。\n\
  \n### 什么是作用域？\n\n为了尽可能容易地理解作用域，您需要理解这些术语，并将看几个为什么这是一个重要主题的例子。作用域可以定义为变量或对象在任何 SQL\
  \ Server 对象内可用的位置和持续时间。考虑以下简单的 T-SQL 语句：\n\n```sql\nDECLARE @FirstName NVARCHAR(50)\
  \ = 'Edward';\nSELECT\n*\nFROM Person.Person\nWHERE FirstName = @FirstName;\n```\n\
  \n这是 T-SQL 最简单的形式之一，但上面定义的变量的作用域是什么？在这些语句中没有任何中断或控制流变更的情况下，`@FirstName` 在整个示例中都处于作用域内，并且可以（如您所期望的那样）被紧随其后的\
  \ `SELECT` 语句使用。如果您在返回结果之前结束批处理会怎样？\n\n```sql\nDECLARE @FirstName NVARCHAR(50) =\
  \ 'Edward';\nGO\nSELECT\n*\nFROM Person.Person\nWHERE FirstName = @FirstName;\n\
  ```\n\n这个简单的更改，在 `SELECT` 之前添加一个 `GO`，将导致错误：\n\n```\nMsg 137, Level 15, State 2,\
  \ Line 20\n必须声明标量变量 \"@FirstName\"。\n```\n\n当批处理结束时，所有局部定义的变量将不再可用，并且对于此 T-SQL 的剩余部分超出作用域。根据定义，`GO`\
  \ 在任何时候使用都会结束一个批处理并触发此行为。任何封装在其自身对象中的 T-SQL——例如触发器、函数或存储过程——也将在其自身的作用域内执行。任何从外部访问这些对象内定义变量的尝试都会导致类似于以下错误的错误：\n\
  \n```sql\nCREATE PROCEDURE dbo.get_people\nAS\nBEGIN\nDECLARE @FirstName NVARCHAR(50)\
  \ = 'Edward';\nSELECT\n*\nFROM Person.Person\nWHERE FirstName = @FirstName;\nEND\n\
  GO\nEXEC dbo.get_people;\nSELECT @FirstName;\n```\n\n这个存储过程将执行与前一个相同的搜索。如所示执行它会得到完全相同的结果，但如果您尝试返回\
  \ `@FirstName` 的值，则会返回相同的错误。默认情况下，在存储过程中声明的变量从其外部的任何地方都不可用。同样的约定也适用于动态 SQL。因此，在确定变量的声明、修改和返回位置时，理解这一点非常重要。\n\
  \n可以向存储过程添加参数，以便于数据的进出自如，使其值能够保持作用域并在您工作的其他地方使用。清单 5-1 中的示例展示了变量如何传递到存储过程，以及值如何被显式返回。\n\
  \n### 清单 5-1.\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name\
  \ = 'get_people')\nBEGIN\nDROP PROCEDURE dbo.get_people;\nEND\nGO\nCREATE PROCEDURE\
  \ dbo.get_people\n@first_name NVARCHAR(50), @person_with_most_entries NVARCHAR(50)\
  \ OUTPUT\nAS\nBEGIN\nDECLARE @person_count INT;\nSELECT TOP 1\n@person_with_most_entries\
  \ = Person.FirstName\nFROM Person.Person\nGROUP BY Person.FirstName\nORDER BY COUNT(*)\
  \ DESC;\nSELECT\n*\nFROM Person.Person\nWHERE FirstName = @first_name;\nRETURN @@ROWCOUNT;\n\
  END\nGO\n```\n\n说明输入和输出参数的存储过程\n\n此示例传入一个名字用于搜索。您还传入一个额外的字符串，该字符串将被 `Person.Person`\
  \ 中最常见的名字覆盖。在存储过程中，将返回 `Person.Person` 中具有传入名字的所有行。最后，具有该名字的行数将用作存储过程的返回值。一个执行示例如下所示：\n\
  \n```sql\nDECLARE @person_with_most_entries NVARCHAR(50);\nDECLARE @person_count\
  \ INT;\nEXEC @person_count = dbo.get_people 'Edward', @person_with_most_entries\
  \ OUTPUT;\nSELECT @person_with_most_entries AS person_with_most_entries;\nSELECT\
  \ @person_count AS person_count\n```\n\n\n\n请注意 `OUTPUT` 关键字的使用。这个 T-SQL 保留字有多种用法，但在处理存储过程时，它表示传入的参数在其值发生变化时，将在存储过程执行期间**保留这些更改**。为了使其正常工作，`OUTPUT`\
  \ 也必须在存储过程的参数列表中明确指定。\n\n执行时，将执行搜索并返回所有名为 \"Edward\" 的人。此外，`@person_with_most_entries`\
  \ 变量将作为一个输出变量被更新。最后，所提供名字的人数将从存储过程返回并存储在 `@person_count` 中。当这些变量在最后被选中时，将返回预期的值，如图\
  \ 5-1 所示。\n\n![A371168_1_En_5_Fig1_HTML.jpg](img/A371168_1_En_5_Fig1_HTML.jpg)\n\
  图 5-1. `dbo.get_people` 存储过程的执行结果\n\n### 在动态 SQL 中管理作用域\n处理动态 SQL 中的作用域与处理存储过程中的作用域没有太大区别。可以将动态\
  \ SQL 语句中的所有内容想象成与你的其余 T-SQL 代码是分离的，并相应地处理。为了说明其相似之处，请考虑以下 T-SQL 代码，它与之前的搜索示例类似：\n\
  \n```\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nDECLARE @FirstName\
  \ NVARCHAR(50) = ''Edward'';\nSELECT\n*\nFROM Person.Person\nWHERE FirstName = @FirstName;'\n\
  EXEC sp_executesql @sql_command;\nSELECT @FirstName\n```\n\n在这个例子中，变量 `@FirstName`\
  \ 在命令字符串内声明，因此它在动态 SQL 语句的作用域之外**不可用**。最后的 `SELECT` 语句将失败，因为 `@FirstName` 不再存在：\n\
  \n```\nMsg 137, Level 15, State 2, Line 84\n必须声明标量变量 \"@FirstName\"。\n```\n\n类似地，在命令字符串外部声明的变量也无法在内部使用。最后，多个命令字符串各自在自己的作用域中执行。在一个命令字符串中声明的变量在另一个动态\
  \ SQL 语句中将不可用。\n\n作用域的存在既是为了方便，也是作为一种安全特性。如果在代码中某处声明的变量在任何地方都可用，那么你需要非常仔细地跟踪每一个变量，以确保在打算使用新变量时不会意外地重用现有变量。将\
  \ T-SQL 片段彼此分离并打破所有权链，有助于将不同的 SQL 语句分隔开来，并防止任何一个应用程序或函数越界。虽然一开始可能觉得需要更仔细地管理所有这些变量很不方便，但\
  \ SQL Server 在任何情况下都提供了许多有效的工具来做到这一点。\n\n### 在动态 SQL 中使用 OUTPUT\n默认情况下，任何传递到 `sp_executesql`\
  \ 的变量都是**只读的**。也就是说，它们可以在需要时在动态 SQL 的作用域内使用，但当动态 SQL 执行完毕，控制权返回到调用它的 T-SQL 时，对参数所做的任何更改都不会被保存。请考虑清单\
  \ 5-2 中的 T-SQL 代码，重点关注对 `@FirstName` 参数的 `UPDATE` 操作。\n\n```\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\nDECLARE @first_name NVARCHAR(50)\
  \ = 'Edward';\nSELECT @sql_command = '\nSELECT\n*\nFROM Person.Person\nWHERE FirstName\
  \ = @first_name;\nSELECT @first_name = ''Xavier'';\nSELECT @first_name;\n'\nSELECT\
  \ @parameter_list = '@first_name NVARCHAR(50)'\nEXEC sp_executesql @sql_command,\
  \ @parameter_list, @first_name;\nSELECT @first_name;\nGO\n清单 5-2. 动态 SQL：在命令字符串内重新分配参数\n\
  ```\n\n在此示例中，命令字符串内执行的最后一个操作是将名称 \"Xavier\" 重新赋给参数 `@first_name`。尽管该参数是只读的，但你被允许在动态\
  \ SQL 内更改其值。新值将保持有效且在作用域内，直到动态 SQL 结束。需要重点注意的是，尽管你在动态 SQL 内外使用了相同的变量名 `@first_name`，但它们仍然被视为完全独立的变量。根据你的应用程序需求，使用不同的变量名可能有助于区分不同的变量，而使用相同的变量名则可以在跨不同作用域的\
  \ T-SQL 语句中更明显地看出一个不同的值正在被使用。输出结果如图 5-2 所示。\n\n![A371168_1_En_5_Fig2_HTML.jpg](img/A371168_1_En_5_Fig2_HTML.jpg)\n\
  图 5-2. 在没有 `OUTPUT` 操作符的情况下，在动态 SQL 内重新分配变量\n\n搜索结果如预期那样返回。从动态 SQL 内部对名字的 `SELECT`\
  \ 操作表明，重新分配参数是被允许并且成功的。当你在动态 SQL 执行完毕后再次检查该变量时，你会发现 `@first_name` 被设置为 \"Edward\"\
  \ 而不是 \"Xavier\"。作为一个小调整，你可以更改变量名，如清单 5-3 所示，这有助于强调它们是彼此独立且不同的。\n\n```\nDECLARE\
  \ @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\nDECLARE @first_name_calling_sql\
  \ NVARCHAR(50) = 'Edward';\nSELECT @sql_command = '\nSELECT\n*\nFROM Person.Person\n\
  WHERE FirstName = @first_name_within_dynamic_sql;\nSELECT @first_name_within_dynamic_sql\
  \ = ''Xavier'';\nSELECT @first_name_within_dynamic_sql;\n'\nSELECT @parameter_list\
  \ = '@first_name_within_dynamic_sql NVARCHAR(50)'\nEXEC sp_executesql @sql_command,\
  \ @parameter_list, @first_name_calling_sql;\nSELECT @first_name_calling_sql;\n清单\
  \ 5-3. 重写清单 5-2 中的 T-SQL，其返回相同的结果\n```\n\n这个稍有不同的版本产生的结果与上面完全相同。唯一的区别在于，调用 T-SQL\
  \ 中的变量名改为 `@first_name_calling_sql`，而动态 SQL 语句的参数改为 `@first_name_within_dynamic_sql`。\n\
  \n如果你有意希望保存在动态 SQL 内部对参数所做的更改，并将其传回最初传入的原始参数怎么办？解决方案与存储过程几乎相同。只需为任何需要将其值传回调用 T-SQL\
  \ 的参数添加 `OUTPUT` 关键字，它就会像前面的例子一样工作，如清单 5-4 所示。\n\n\n\n```sql\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\nDECLARE @first_name_calling_sql\
  \ NVARCHAR(50) = 'Edward';\nSELECT @sql_command = '\nSELECT\n*\nFROM Person.Person\n\
  WHERE FirstName = @first_name_within_dynamic_sql;\nSELECT @first_name_within_dynamic_sql\
  \ = ''Xavier'';\nSELECT @first_name_within_dynamic_sql;\n'\nSELECT @parameter_list\
  \ = '@first_name_within_dynamic_sql NVARCHAR(50) OUTPUT'\nEXEC sp_executesql @sql_command,\
  \ @parameter_list, @first_name_calling_sql OUTPUT;\nSELECT @first_name_calling_sql;\n\
  ```\n代码清单 5-4. 使用 OUTPUT 永久修改参数\n\n此示例显式地将名字参数标记为 `OUTPUT` 参数。这表明，如果在动态 SQL 内更改了该值，那么在命令字符串执行完毕并切换回调用\
  \ TSQL 的作用域后，该更改将会持久化。输出结果如图 5-3 所示。\n\n![A371168_1_En_5_Fig3_HTML.jpg](img/A371168_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3. 使用 OUTPUT 来持久化 `@first_name_within_dynamic_sql` 的结果\n\n这次，当你将 `@first_name_within_dynamic_sql`\
  \ 的值更改为 `\"Xavier\"` 时，该值会从动态 SQL 传回 `sp_executesql`，并一直保留，直到你再次对它进行操作。当你想让一个参数在动态\
  \ SQL 内部改变，或者想无缝地传入传出变量时，这极其有用。\n\n请注意，在这段 TSQL 中，`OUTPUT` 关键字被同时附加到了参数列表和 `sp_executesql`\
  \ 语句中的参数名上。该关键字必须在两个地方都应用，否则参数值将不会按预期更新。如果在参数列表中省略了 `OUTPUT`，SQL Server 就不知道该参数意图从动态\
  \ SQL 语句中持久化。结果是会产生一条明确指出问题的错误信息：\n\n```\nMsg 8162, Level 16, State 2, Line 152\n\
  The formal parameter \"@first_name_within_dynamic_sql\" was not declared as an OUTPUT\
  \ parameter, but the actual parameter passed in requested output.\n```\n\n幸运的是，这条消息非常易于理解，并清楚地说明了如何修复错误。SQL\
  \ Server 不允许将 `OUTPUT` 参数传递给一个未以相同方式声明的变量。\n\n如果你在参数列表中将参数声明为 `OUTPUT` 变量，但在 `sp_executesql`\
  \ 命令中没有这样声明，会发生什么？在这种情况下，不会抛出错误。在参数列表中使用 `OUTPUT` 关键字声明参数，而在执行命令字符串时不包含相同的关键字，是完全合法的。结果将是\
  \ TSQL 成功执行，但名字参数的值不会从动态 SQL 持久化回调用 TSQL。表 5-1 总结了 `OUTPUT` 变量的不同使用方式的结果。\n\n表 5-1.\
  \ OUTPUT 不同用法的结果：绿色为好，红色为坏\n\n| 参数列表 | 输入变量 | 结果 |\n| --- | --- | --- |\n|   |  \
  \ | 参数值未持久化。 |\n|   | `OUTPUT` | SQL Server 抛出错误。 |\n| `OUTPUT` |   | 参数值仍未持久化。\
  \ |\n| `OUTPUT` | `OUTPUT` | 参数值从动态 SQL 持久化。 |\n\n成功更改参数值并将其返回给调用 TSQL 的唯一方法，是在参数列表和传入的变量上都使用\
  \ `OUTPUT`。为避免在编写动态 SQL 时产生混淆，请避免出现一个变量声明为 `OUTPUT` 而另一个没有的混合情况。其中一种情况的结果将是错误信息，这当然不可取。另一种模糊情况将导致一段难以理解的代码，其目的对其他开发人员来说不清晰，并可能导致未来的编码错误。\n\
  \n任何允许传递给存储过程的参数，包括表甚至游标，都可以传递给动态 SQL。不过，表变量（下一节讨论）是只读的，不能设置为 `OUTPUT` 参数。\n\n###\
  \ 表变量和临时表\n\n在 SQL Server 中持久化数据的另一种方法是创建表变量或临时表并将数据存储在其中。这两者的行为各有特点，提供了一种在动态 SQL\
  \ 中管理数据的替代方法。本节将更详细地讨论每一种，并说明其行为以及它们如何影响你的 TSQL。\n\n#### 表变量\n\n考虑代码清单 5-5 中的 TSQL。\n\
  \n```sql\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\n\
  DECLARE @last_names TABLE (\nlast_name NVARCHAR(50));\nSELECT @sql_command = '\n\
  SELECT DISTINCT\nFirstName\nFROM Person.Person\nWHERE LastName IN (SELECT last_name\
  \ FROM @last_names)'\nEXEC sp_executesql @sql_command;\n```\n代码清单 5-5. 在动态 SQL 中使用在其外部声明的表变量的结果\n\
  \n运行此 TSQL 会立即导致错误：\n\n```\nMsg 1087, Level 15, State 2, Line 197\nMust declare\
  \ the table variable \"@last_names\".\n```\n\n虽然 `@last_names` 表变量可能在此示例开头创建，但它不存在于动态\
  \ SQL 的作用域内。动态 SQL 试图使用该数据返回一组名字，但找不到它。因此，任何访问它的尝试都将失败。你可以将表变量传递给动态 SQL。这只是需要额外的一步：声明一个自定义类型并将其用作数据类型，如代码清单\
  \ 5-6 所示。\n\n```sql\nCREATE TYPE last_name_table AS TABLE\n(last_name NVARCHAR(50));\n\
  GO\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\n\
  DECLARE @first_name_calling_sql NVARCHAR(50) = 'Edward';\nDECLARE @last_names AS\
  \ last_name_table;\nINSERT INTO @last_names\n(last_name)\nSELECT\nLastName\nFROM\
  \ Person.Person WHERE FirstName = @first_name_calling_sql;\nSELECT @sql_command\
  \ = '\nSELECT DISTINCT\nFirstName\nFROM Person.Person\nWHERE LastName IN (SELECT\
  \ last_name FROM @last_name_table)\n'\nSELECT @parameter_list = '@first_name_within_dynamic_sql\
  \ NVARCHAR(50), @last_name_table last_name_table READONLY'\nEXEC sp_executesql @sql_command,\
  \ @parameter_list, @first_name_calling_sql, @last_names;\n```\n代码清单 5-6. 将表变量传递给动态\
  \ SQL\n\n第一步是创建一个表类型，该类型只需创建一次，供此示例的其余部分使用。它像任何其他参数一样作为参数传递给 `sp_executesql`，但必须在参数列表中被声明为\
  \ `READONLY`。表变量始终是只读的，不能在传递它们进入的动态 SQL 中被修改。如果你试图从表变量中删除记录，或对其进行任何更改，你将收到错误：\n\n\
  ```\nMsg 10700, Level 16, State 1, Line 255\nThe table-valued parameter \"@last_name_table\"\
  \ is READONLY and cannot be modified.\n```\n\nSQL Server 提供了一个非常直接的错误信息，提醒你试图更改表变量将会失败。\n\
  \n\n\n#### 临时表\n\n临时表怎么样？让我们重试初始示例，使用临时表代替表变量，如代码清单 5-7 所示。\n\n```sql\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\nCREATE TABLE #last_names\
  \ (\nlast_name NVARCHAR(50));\nSELECT @sql_command = '\nSELECT DISTINCT\nFirstName\n\
  FROM Person.Person\nWHERE LastName IN (SELECT last_name FROM #last_names)'\nEXEC\
  \ sp_executesql @sql_command;\nDROP TABLE #last_names\n```\n\n**代码清单 5-7. 在外部声明的动态\
  \ SQL 中使用临时表的结果**\n\n结果不是错误消息，而是一个结果集（虽然是空的）。如果你在动态 SQL 中修改临时表会怎样？代码清单 5-8 显示了生成的\
  \ T-SQL。\n\n```sql\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list\
  \ NVARCHAR(MAX);\nCREATE TABLE #last_names (\nlast_name NVARCHAR(50));\nINSERT INTO\
  \ #last_names\n(last_name)\nSELECT 'Thomas'\nSELECT @sql_command = '\nSELECT DISTINCT\n\
  FirstName\nFROM Person.Person\nWHERE LastName IN (SELECT last_name FROM #last_names);\n\
  INSERT INTO #last_names\n(last_name)\nSELECT ''Smith'';\n'\nEXEC sp_executesql @sql_command;\n\
  SELECT * FROM #last_names;\nDROP TABLE #last_names;\n```\n\n**代码清单 5-8. 在动态 SQL\
  \ 中修改临时表的结果**\n\n结果表明临时表不仅可以在动态 SQL 中访问，而且成功写入了，如图 5-4 所示。\n\n![A371168_1_En_5_Fig4_HTML.jpg](img/A371168_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4. 在外部创建的临时表也可以在动态 SQL 内部访问**\n\n第一个结果集显示临时表在动态 SQL 中是可访问的。第二个结果集显示它可以在动态\
  \ SQL 内部被修改，并且这些结果在示例的后面部分被保留了下来。这非常有用，并提供了一种简单的方法来管理需要在动态 SQL 和其他 T-SQL 之间无缝传递的数据。既然你正在兴头上，如果你在动态\
  \ SQL 内部声明一个临时表并尝试在后面的代码中访问它，会发生什么？代码清单 5-9 显示了实现这一点的 T-SQL。\n\n```sql\nDECLARE\
  \ @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\nSELECT @sql_command\
  \ = '\nCREATE TABLE #last_names (\nlast_name NVARCHAR(50));\nINSERT INTO #last_names\n\
  (last_name)\nSELECT ''Thomas'';\n'\nEXEC sp_executesql @sql_command;\nSELECT DISTINCT\n\
  FirstName\nFROM Person.Person\nWHERE LastName IN (SELECT last_name FROM #last_names);\n\
  ```\n\n**代码清单 5-9. 在动态 SQL 中创建临时表并稍后访问的结果**\n\n你的运气用完了；此示例导致错误：\n\n```\nMsg 208,\
  \ Level 16, State 0, Line 316\nInvalid object name '#last_names'.\n```\n\n虽然在调用\
  \ T-SQL 中声明的临时表可以在动态 SQL 中访问，但反之则不成立。表 `#last_names` 仅存在于动态 SQL 的作用域内，在其他地方将不可用。类似地，在后面的代码中另一个动态\
  \ SQL 块中引用该临时表也会导致相同的错误。换句话说，以下示例也会因相同的错误消息而失败，如代码清单 5-10 所示。\n\n```sql\nDECLARE\
  \ @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\nSELECT @sql_command\
  \ = '\nCREATE TABLE #last_names (\nlast_name NVARCHAR(50));\nINSERT INTO #last_names\n\
  (last_name)\nSELECT ''Thomas'';\n'\nEXEC sp_executesql @sql_command;\nSELECT @sql_command\
  \ = '\nSELECT DISTINCT\nFirstName\nFROM Person.Person\nWHERE LastName IN (SELECT\
  \ last_name FROM #last_names);'\nEXEC sp_executesql @sql_command;\n```\n\n**代码清单\
  \ 5-10. 在后续动态 SQL 中重用临时表同样无效**\n\n在创建和访问临时表时要小心，以确保它们在需要时可用，而在代码后面需要时不会超出作用域。还要记住，这些临时表仅在你当前的\
  \ SQL Server 连接中可用。如果你尝试从此连接从单独的应用程序或连接访问临时表，它也将不可用。\n\n最后，当连接结束时，临时表会自动删除。良好的做法是在你使用完临时表后删除它们，但如果你不这样做，SQL\
  \ Server 会为你删除它们。此自动删除仅发生在创建临时表的连接结束时。如果该连接无限期保持，那么临时表也将无限期保留。如果在同一会话中稍后声明了同名的表，则将导致错误，因为该表已存在。\n\
  \n\n\n### 全局临时表\n\n#### 概念\n\n一个最终可用的选项是全局临时表。这些表的声明方式与标准临时表类似，但使用 `##` 前缀而不是 `#`。全局临时表在服务器范围内对任何访问其创建所在的同一\
  \ SQL Server 实例的 T-SQL 都可用。此访问不受连接或数据库访问限制。\n\n一旦创建，全局临时表将一直存在，直到所有与之的连接结束。该表可以在动态\
  \ SQL 或调用 T-SQL 的作用域内创建，并且仍然可在服务器上的任何其他作用域中使用。\n\n#### 使用示例\n\n考虑清单 5-11 中的示例，与前一个类似。\n\
  \n```sql\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\n\
  SELECT @sql_command = '\nCREATE TABLE ##last_names (\nlast_name NVARCHAR(50));\n\
  INSERT INTO ##last_names\n(last_name)\nSELECT ''Thomas'';'\nEXEC sp_executesql @sql_command;\n\
  SELECT @sql_command = '\nSELECT DISTINCT\nFirstName\nFROM Person.Person\nWHERE LastName\
  \ IN (SELECT last_name FROM ##last_names);'\nEXEC sp_executesql @sql_command;\n\
  SELECT * FROM ##last_names;\n-- 清单 5-11.\n-- 全局临时表使用示例\n```\n\n此 T-SQL 在动态 SQL 中声明了一个全局临时表。然后它使用该全局临时表从\
  \ `Person.Person` 中选择一些名字，之后再次在调用的 T-SQL 中访问它。一切都按预期工作（有时确实如此）！请注意，在示例结束时，全局临时表没有被删除。因此，它将保持可用，直到使用它的所有连接都结束或者您显式删除它。如果您想再次访问它或从其他位置访问它，这可能是有益的。但如果您忘记了它，并在未来尝试声明同名的临时表，这也可能带来问题：\n\
  \n```sql\nCREATE TABLE ##last_names (\nlast_name NVARCHAR(50));\n```\n\n当您运行此表创建语句时，会生成错误：\n\
  \n```\nMsg 2714, Level 16, State 6, Line 351\nThere is already an object named '##last_names'\
  \ in the database.\n```\n\n在创建或使用全局临时表的任何代码中，管理它们至关重要。忘记删除临时表可能碰巧没问题，如果您恰好结束了连接，它会被\
  \ SQL Server 自动删除。但如果另一个连接正在使用该表，它将不会被 SQL Server 删除，因为它仍处于使用状态。处理临时表的最佳实践是在不再需要时删除它们。这消除了表持续存在并在之后被无意访问，或者在已存在时尝试创建的可能性。\n\
  \n务必在不再需要时删除临时表。这确保它不会干扰未来的表创建，也不会在不再需要时被以某种方式访问。\n\n#### 服务器范围内的可用性\n\n既然有 `##last_names`\
  \ 表可用，让我们看看全局临时表的另一个特性——它们在服务器任何位置的可用性：\n\n```sql\nCREATE DATABASE temp_table_test;\n\
  GO\nUSE temp_table_test;\nGO\nSELECT\n*\nFROM ##last_names;\n```\n\n即使在这个全新的数据库中，全局临时表仍然可用。由于您尚未删除此\
  \ SQL Server 连接，它将无限期地对服务器上的任何其他连接保持可用。这引出了关于全局临时表安全性的讨论，而它们恰好没有任何安全性。一旦创建，全局临时表对任何数据库中的任何登录名或用户在任何地方都是可用的，没有限制。\n\
  \n#### 安全问题\n\n在上一章中，您创建了一个名为 `VeryLimitedUser` 的用户，该用户只能访问一个存储过程，而没有对任何其他数据库、表或\
  \ SQL Server 功能的显式访问权限。当此用户尝试访问全局临时表时会发生什么？\n\n```sql\nEXECUTE AS USER = 'VeryLimitedUser';\n\
  GO\nSELECT\n*\nFROM ##last_names;\nREVERT;\nGO\nDROP TABLE ##last_names;\nGO\n```\n\
  \n尽管在服务器上几乎没有权限，但此用户可以毫无问题地从全局临时表中选择数据。这引发了全局临时表的一个潜在安全问题，因为根据设计，它们可被服务器上的任何其他人访问，无论其具体权限如何。此外，无法在全局临时表上设置权限来限制此行为。请注意您创建的任何全局临时表。请确保，如果另一个用户能够访问它，此访问不会带来问题。如果您的全局临时表包含任何敏感数据，请考虑以其他格式存储它，例如表变量、标准临时表或用于暂存或临时数据的永久表。对数据进行哈希处理或加密也是限制其访问的好方法，因为它将降低其他连接的可用性。\n\
  \n#### 命名冲突\n\n另一个可能发生的问题是，当来自两个不同连接的两个全局临时表具有相同的名称时。由于这些表是全局的，并且在 SQL Server 实例的整个范围内有效，因此不能有两个这样的表共享相同的名称。如果发生这种情况，将抛出错误，第二个尝试声明新表的人将无法继续，除非重命名它。\n\
  \n\n\n### 使用永久表进行临时存储\n\n当特定功能需要频繁存储临时数据时，创建永久表是一种高效且安全的方法。对于前面的例子，可以按照示例清单 5-12\
  \ 所示的另一种方式来管理姓氏列表。\n\n```sql\nCREATE TABLE last_names_staging (\nlast_name NVARCHAR(50)\
  \ NOT NULL CONSTRAINT PK_last_names_staging    PRIMARY KEY CLUSTERED);\nDECLARE\
  \ @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX);\nSELECT @sql_command\
  \ = '\nINSERT INTO last_names_staging\n(last_name)\nSELECT ''Thomas'';'\nEXEC sp_executesql\
  \ @sql_command;\nSELECT @sql_command = '\nSELECT DISTINCT\nFirstName\nFROM Person.Person\n\
  WHERE LastName IN (SELECT last_name FROM last_names_staging);'\nEXEC sp_executesql\
  \ @sql_command;\nSELECT * FROM last_names_staging;\n```\n*清单 5-12. 使用永久表进行临时存储*\n\
  \n在此示例中，一切工作方式都与前面的例子相同，只是“临时存储”实际上是永久的。为了存储临时数据而创建永久对象可能看起来违反直觉，但这样做有很多好处：\n\n\
  *   数据被永久保留，与连接无关。\n*   可以从服务器上的任何位置访问表，与数据库无关。\n*   可以对表应用安全性，确保只有授权访问。\n*   可以向表添加索引、统计信息、约束等。\n\
  *   无需访问 `TempDB`。\n\n使用永久表的缺点很少，但很显著：\n\n*   它成为一个需要维护和文档记录的永久对象。\n*   必须管理其使用，以确保数据始终相关。\n\
  \n总结以上所有要点：当数据需要更长期存储或优化变得重要时，请使用永久表。虽然可以在临时表和表变量上放置索引（存在限制），但拥有一个永久位置来暂存临时数据非常方便，并消除了不断管理临时对象的需要。\n\
  \n同样重要的是，仅在有合理且高效的情况下才将表用于此目的。为所有临时数据创建/访问创建永久表可能会迅速导致大量需要关心和维护的对象。一个有助于组织的选项是在其自己的模式中创建表，从而将其与数据库中的其他对象分开。或者，对于较小的用例，给这些表添加前缀可能足以轻松组织和查找它们。\n\
  \n当不再需要“永久临时表”时，可以轻松删除它。这个清理步骤很重要，因为您不希望用不需要的、临时的或未使用的对象弄乱服务器。创建任何永久数据库对象都隐含着有效记录和管理它的责任。当有一天不再需要它时，请花额外的时间将其弃用并最终移除。\n\
  \n### 从动态 SQL 直接将数据输出到表\n\n收集来自任何存储过程（包括动态 SQL）数据的最后一种方法是将其作为 `EXEC` 语句的一部分直接插入到表中。如示例清单\
  \ 5-13 所示，这是对临时存储的一种新变化，消除了在动态 SQL 中显式管理它的需要。\n\n```sql\nDECLARE @sql_command NVARCHAR(MAX);\n\
  DECLARE @parameter_list NVARCHAR(MAX);\nCREATE TABLE #last_names (\nlast_name NVARCHAR(50));\n\
  SELECT @sql_command = '\nSELECT\nLastName\nFROM Person.Person\nWHERE FirstName =\
  \ ''Edward'';\n'\nINSERT INTO #last_names\n(last_name)\nEXEC sp_executesql @sql_command;\n\
  SELECT\n*\nFROM #last_names\nDROP TABLE #last_names;\n```\n*清单 5-13. 将动态 SQL 输出直接插入另一个表*\n\
  \n在此示例中，您在 TSQL 开头声明了临时表 `#last_names`。请注意，当您执行命令字符串时，输出直接放入临时表中，而无需传递参数或管理其他对象。这是一种非常方便且高效的方式，可以保存动态\
  \ SQL 或任何其他存储过程的输出。这也是保存系统存储过程输出的绝佳方式，如示例清单 5-14 所示。\n\n```sql\nCREATE TABLE #sp_who_data\n\
  (\nspid SMALLINT,\necid SMALLINT,\nstatus NCHAR(30),\nloginame NCHAR(128),\nhostname\
  \ NCHAR(128),\nblk CHAR(5),\ndbname NCHAR(128),\ncmd NCHAR(16),\nrequest_id INT\n\
  )\nINSERT INTO #sp_who_data\n(spid, ecid, status, loginame, hostname, blk, dbname,\
  \ cmd, request_id)\nEXEC sp_who;\nSELECT * FROM #sp_who_data\nWHERE dbname = 'AdventureWorks2012'\n\
  DROP TABLE #sp_who_data;\n```\n*清单 5-14. 使用 INSERT…EXEC 语法收集 sp_who 的输出*\n\n一个非常常见的管理需求是查看当前的\
  \ SQL Server 连接，并收集有关谁连接到哪个数据库以及他们在做什么的详细信息。执行 `sp_who` 可以收集该数据，但它仅将结果输出到结果窗口。在连接繁忙的服务器上，您会希望通过数据库、用户或其他条件过滤该数据。您可能还希望将其永久记录以用于审计或其他安全目的。将该数据直接插入表中的能力使您能够高效地将其过滤到单个数据库，并仅获取该数据库的连接，而不是整个服务器的连接。请注意，`#sp_who_data`\
  \ 表中的数据类型取自 MSDN，并非我活跃想象力的产物：\n\n```text\nhttps://msdn.microsoft.com/en-us/library/ms174313.aspx\n\
  ```\n\n相同的语法可应用于任何存储过程、系统存储过程或动态 SQL 输出。虽然方便，但它也有些不灵活。数据要插入的表必须提前定义，并且必须与输出数据的结构完全相同。虽然在创建临时表的同时执行命令字符串会很方便，但\
  \ SQL Server 不允许该语法：\n\n```sql\nSELECT\nEXEC sp_who\nINTO #sp_who_data;\nSELECT\
  \ INTO #sp_who_data\nEXEC sp_who;\nSELECT INTO #sp_who_data\n(EXEC sp_who);\n```\n\
  \n无论您多么有创意，都无法强迫 SQL Server 为您动态创建临时表。`SELECT INTO` 不允许与存储过程执行结合使用，任何重新排列 TSQL 都无法使其神奇地工作。因此，您必须始终提前定义输出的目标表。\n\
  \n### 结论\n\n尽管作用域阻止您在动态 SQL、其他 TSQL 和其他存储过程执行之间轻松移动数据，但存在许多工具，提供了多种方法来实现这一点。与任何工具箱一样，请始终为每项工作选择正确的工具。通常，数据越临时，就越不需要创建复杂的结构或方法来管理它。如果数据只需要一次，或者仅在特定存储过程的持续时间内需要，请考虑使用\
  \ `INSERT..EXEC` 语法或临时表。如果将来其他连接可能需要数据，则全局临时表有助于确保在需要时可用。谨慎使用全局临时表，因为它们缺乏其他数据结构的安全性和作用域限制。仅在确定需要时才使用它们。最后，对于将来需要长期使用的数据，永久表可以是一种很好的方式来保存该数据，并在未来长时间内高效、安全地管理它。\n\
  \n\n\n### 清理\n\n以下 TSQL 将清理本章中创建的所有对象（如果存在）：\n\n```\nIF EXISTS (SELECT * FROM sys.procedures\
  \ WHERE procedures.name = 'get_people')\nBEGIN\n    DROP PROCEDURE dbo.get_people;\n\
  END\nGO\nIF EXISTS (SELECT * FROM sys.databases WHERE databases.name = 'temp_table_test')\n\
  BEGIN\n    DROP DATABASE temp_table_test;\nEND\nGO\n```\n\n# 6. 性能优化\n\n如果对动态 SQL\
  \ 的讨论不深入其性能，那是不完整的。动态 SQL 可以极大地提高性能，但如果使用不当，也会增加复杂性。与安全方面的情况类似，优化是一个可以轻松占据比本书更大篇幅的主题。因此，本章重点讨论动态\
  \ SQL 及其相关的性能问题。\n\n### 查询执行过程\n\n在深入探讨动态 SQL 的性能以及监控和调整性能的各种方法之前，有必要快速回顾一下查询执行的过程。当你执行一条\
  \ TSQL 语句时，从开始到结果返回并完成，中间发生了什么？查询执行通常分为四个步骤，将在以下各节中讨论。\n\n#### 解析\n\n查询会被检查语法，如果有任何未识别或无效的\
  \ TSQL 命令，将抛出错误。此外，查询会被分解为一个非常高级的步骤列表，SQL Server 将在后续过程中遵循这些步骤。这些步骤是简单的操作，例如从表中选择数据、连接另一个表或执行某些动态\
  \ SQL 或存储过程。\n\n#### 绑定\n\n此步骤主要关注验证对象，并确保它们有效且在正确的上下文中使用。表、列、函数、存储过程以及任何其他命名对象都会对照\
  \ SQL Server 的系统目录进行检查，以验证名称是否正确以及使用是否正确。此时，如果没有收到错误，那么你就知道语法和对象名称都是正确的。在解析步骤中生成的列表会结合这个新信息，生成所谓的代数化树（algebrized\
  \ tree）。这个树是一个必须执行的步骤列表，以便查询能够正确执行。\n\n#### 优化\n\n这是执行过程中最复杂的部分，涉及 SQL Server 需要获取来自绑定步骤的树，并非常非常快地为其找到一个好的执行计划。这个工作进行的方式类似于国际象棋程序如何在一局棋中尝试找到最佳走法。基本上，查询优化器会提出一个可能的执行计划并为其分配一个成本，然后评估更多的执行计划，直到它认为找到了一个足够好的计划。\n\
  \n查询优化是一场与时间的赛跑，因为查询本身需要时间来处理，但优化过程也需要时间。优化器需要权衡这一点，以便既不过多浪费时间来优化一个简单的查询，也要花费足够的时间来找到一个性能良好的计划。例如，如果你有一个需要两秒钟执行的查询，而优化器可以多花一秒钟来节省半秒钟的执行时间，那么这样做就是在浪费时间。如果它只需花费\
  \ 0.1 秒的努力就能节省 1.5 秒，那将是一笔非常划算的交易。除了时间，还会考虑服务器资源（如 CPU）。这个过程发生得非常快，并且是 SQL Server\
  \ 最复杂的组件之一。\n\n优化的结果是一个详细的步骤列表，SQL Server 可以按照这个列表执行以返回原始查询中期望的结果。\n\n#### 执行\n\n\
  执行来自优化过程的步骤，并采取任何必要的操作以完成它们。\n\n#### 优化工具\n\n为了审查性能并基于此做出明智的决策，你需要定义一套你将继续使用的工具，以协助这个过程。如果没有你习惯使用的多个指标，就不可能就性能做出始终如一的良好决策。如果一个查询很慢，你需要知道它的哪个部分是瓶颈，并确定为什么会出现这种情况。\n\
  \n##### 查询执行计划\n\n查询执行计划是可用工具中最直观也是最首要的。执行计划是优化器在优化步骤中提出的步骤，由 SQL Server 执行。\n\n\
  可以通过在 SQL Server Management Studio 中单击“包含实际执行计划”图标或使用键盘快捷键`Ctrl+M`来查看查询的实际执行计划，如图\
  \ 6-1 所示。\n\n![A371168_1_En_6_Fig1_HTML.jpg](img/A371168_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1。在 SQL Server Management Studio 中启用和使用查询执行计划\n\n图 6-1 中圈出了启用实际执行计划的图标。单击此图标后，你会在结果窗口中看到一个名为“执行计划”的附加选项卡。此选项卡中包含每个已执行查询的部分，包括查询文本。图形部分从右向左阅读，由表示\
  \ SQL Server 执行的操作（如读取表、连接数据集、排序等）的图标组成。如果 SQL Server 认为新索引可能有助于查询性能，它会在查询文本和图形计划之间用绿色建议该索引。将鼠标悬停在图标上将显示该步骤的详细信息，包括处理的行数、估计的\
  \ I/O、CPU 和子树成本，如图 6-2 所示。\n\n![A3711168_1_En_6_Fig2_HTML.jpg](img/A3711168_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2。查看执行计划中任何步骤的详细属性\n\n子树成本是在优化步骤中确定的成本的指示，让你了解查询的哪些部分执行成本最高。\n\n步骤之间的线条宽度将指示该步骤处理的行数的相对多少。将鼠标悬停在其中一条线上将提供有关该线所代表的数据传输的一些基本信息。图\
  \ 6-3 显示了这些详细信息的示例。\n\n![A371168_1_En_6_Fig3_HTML.jpg](img/A371168_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3。查看执行计划一个步骤的输出详情\n\n执行计划还可能包括警告、错误或 SQL Server 在执行查询时遇到的其他问题。如有疑问，请仔细检查任何有问题的步骤，这可能揭示查询性能不佳的有用原因。将鼠标悬停在执行计划的任何部分都将提供有关该步骤的更多详细信息。打开一个步骤的属性将返回有关该步骤执行情况的额外信息数组。\n\
  \n\n##### STATISTICS IO\n\nSQL Server 可以提供关于哪些表被读取以及针对这些表的读取次数等信息。可以通过以下 T-SQL 开启此功能：\n\
  \n```sql\nSET STATISTICS IO ON;\n```\n\n这是非常重要的信息，因为它反映了整体的 I/O 使用情况。如果某个查询运行缓慢，可能是由于对某个表进行了过多的读取。执行计划可能并不总是能体现\
  \ I/O 瓶颈的严重性，但了解到一个仅返回两行的查询却需要进行一百万次读取，这就表明可能存在某个问题。通常，这两者会相互关联，从而为理解查询为何缓慢提供一个坚实的基础。一旦启用，`STATISTICS\
  \ IO` 会在文本输出屏幕中添加详细信息，如图 6-4 所示。\n\n![A371168_1_En_6_Fig4_HTML.jpg](img/A371168_1_En_6_Fig4_HTML.jpg)\n\
  \n**图 6-4.** STATISTICS IO 的输出示例\n\n虽然这里详细列出了许多操作，但本节的讨论仅限于前四个。\n\n###### 对象 (Objects)\n\
  \n正在访问的表或视图的名称。\n\n###### 扫描计数 (Scan Count)\n\n这表明一个对象是否被多次读取。此处的高数值可能表明 SQL Server\
  \ 在反复读取相同的数据，这可能是查询效率低下的一个潜在迹象。\n\n###### 逻辑读取 (Logical Reads)\n\n这是针对所指示对象进行的读取次数，无论数据是否缓存在内存中。在本章中，凡是涉及到\
  \ I/O 读取活动的讨论，都将以此指标为参考，因为它即使在物理读取发生变化时，对于给定查询也保持不变。\n\n###### 物理读取 (Physical Reads)\n\
  \n这是指数据尚未位于缓冲区高速缓存中的读取次数。每当为查询读取数据时，该数据会被放入内存，并一直保留在那里，直到其过期或稍后被替换。数据从存储系统首次读入内存的操作可能非常耗时。如果查询不断进行物理读取，这可能表明查询读取了过多数据，或者服务器上存在内存压力。\n\
  \n当你执行一个查询并首次访问数据时，此数值将与逻辑读取次数相同，但所有后续执行都将显示此指标为零，因为数据在首次执行后已位于内存中。\n\n##### STATISTICS\
  \ TIME\n\n对于任何数据使用者而言，最重要的指标可能就是服务器返回他们所需数据所需的时间。作为数据库专业人员，我们最常听到的抱怨是：“太慢了！”该指标会分解每个步骤的执行时间，这对于确定存储过程中哪个查询花费了最多的执行时间非常有用。以下是与之前执行计划中使用的相同查询的\
  \ `STATISTICS TIME` 输出：\n\n```sql\nSQL Server parse and compile time:\nCPU time\
  \ = 0 ms, elapsed time = 0 ms.\nSQL Server Execution Times:\nCPU time = 0 ms, elapsed\
  \ time = 64 ms.\n```\n\n解析和编译时间是 SQL Server 执行前面讨论的解析、绑定和优化步骤所花费的时间。执行时间是实际运行查询本身所花费的时间。\n\
  \n这些时间非常有用，但必须谨慎对待。执行时间受许多不同变量的影响。如果执行计划被缓存并重用，解析和编译时间将为零。如果数据缓存在内存中，执行时间将快得多。外部因素，如网络延迟、I/O\
  \ 延迟或其他进程的争用，都会影响执行时间。因此，重要的是基于查询的多次试执行来做出优化决策，以确保不是根据异常或边缘情况做出决定。\n\n根据经验，在对查询执行进行计时时，我会尝试至少运行\
  \ 10-20 次，以便对其在生产环境（可能被反复运行）中的表现有一个良好的了解。你个人测试查询的频率应基于其重要性和复杂性，以及你所在组织的质量保证政策。如有疑问，请花时间运行足够的试验次数，直到你对结果感到满意，并且在必要时有信心使用这些结果来向他人证明你的决策是合理的。\n\
  \n##### 使用所有这些工具！\n\n在分析查询性能时，使用尽可能多的性能指标非常重要。执行计划本身可能无法说明全部情况，执行时间也不会提供调优查询所需的全部信息。虽然存在更多工具，但这里讨论的三种工具（当协同使用时）可以提供对查询性能、瓶颈所在以及开始调优以提高性能的线索等方面的非常扎实的理解。\n\
  \n### 动态 SQL 与标准 SQL\n\n虽然在命令字符串内执行的 T-SQL 将像任何其他标准 SQL 语句一样由 SQL Server 处理，但在性能方面存在一些值得注意的潜在差异。\n\
  \n#### 查询解析与绑定\n\n查询执行的前两个阶段的一个重要部分是检查语法和对象名称，并验证你在编写查询时是否犯了任何会阻止其执行的错误。字符串的内容在运行时进行评估，在你最初编写和测试查询时不受这些过程的影响。由于动态\
  \ SQL 命令字符串是一个字符串，直到你执行它之前，其内容的有效性都不会被检查。你可以通过点击图 6-5 所示的图标来解析查询并验证其语法。\n\n![A371168_1_En_6_Fig5_HTML.jpg](img/A371168_1_En_6_Fig5_HTML.jpg)\n\
  \n**图 6-5.** 在 SQL Server Management Studio 中手动解析查询\n\n此功能允许你在尝试执行 T-SQL 之前验证语法并检查任何明显的错误。以下查询在解析时将产生语法错误：\n\
  \n```sql\nSELECT & FROM Person.Person;\n```\n\n我的笔误将星号 (`*`) 替换成了与号 (`&`)。当我点击解析图标来验证语法时，结果是一个错误：\n\
  \n```sql\nMsg 102, Level 15, State 1, Line 18\nIncorrect syntax near '&'.\n```\n\
  \n相反，如果这是作为动态 SQL 编写的，则不会抛出此类错误：\n\n```sql\nDECLARE @sql_command NVARCHAR(MAX);\n\
  SELECT @sql_command = 'SELECT & FROM Person.Person;';\nEXEC (@sql_command);\n```\n\
  \n解析器在执行 `@sql_command` 之前不会检查其内容，执行时它被当作一个新的查询，需要经历解析、绑定、优化和执行过程。它解析时没有错误，但在执行时会抛出类似的错误：\n\
  \n```sql\nMsg 102, Level 15, State 1, Line 19\nIncorrect syntax near '&'.\n```\n\
  \n因此，在执行命令字符串之前，仔细打印并进行测试非常重要。\n\n#### 执行计划缓存\n\nSQL Server 中执行的每一个唯一查询都会生成一个查询执行计划。是什么让一个查询成为“唯一”？这是由它的精确文本决定的。为了生成执行计划而优化查询需要消耗时间和服务器资源，这是一个相对昂贵的过程，尤其是对于更复杂的查询。考虑代码清单\
  \ 6-1 中的查询，假设它在服务器上频繁运行，每分钟 500 次。\n\n```sql\nDECLARE @FirstName NVARCHAR(MAX) =\
  \ 'Edward';\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\n\
  *\nFROM Person.Person\nWHERE FirstName = \"\" + @FirstName + \"\";\n';\nPRINT @sql_command;\n\
  EXEC sp_executesql @sql_command;\n```\n\n代码清单 6-1. 一个将为每个名字生成新执行计划的 T-SQL 示例\n\n\
  当它首次执行时，会为其精确文本创建一个执行计划，打印结果如下：\n\n```sql\nSELECT\n*\nFROM Person.Person\nWHERE\
  \ FirstName = 'Edward';\n```\n\n注意名字 `Edward` 被包含在 SQL 文本中。假设该查询再次运行，但使用不同的名字：\n\
  \n```sql\nDECLARE @FirstName NVARCHAR(MAX) = 'Xavier';\nDECLARE @sql_command NVARCHAR(MAX);\n\
  SELECT @sql_command = '\nSELECT\n*\nFROM Person.Person\nWHERE FirstName = \"\" +\
  \ @FirstName + \"\";\n'\nPRINT @sql_command;\nEXEC sp_executesql @sql_command;\n\
  ```\n\n生成的 SQL 文本将与上次运行的查询不同：\n\n```sql\nSELECT\n*\nFROM Person.Person\nWHERE FirstName\
  \ = 'Xavier';\n```\n\n因此，每个查询将获得一个不同的执行计划。检查时间统计信息的数据，你可以看到在执行前处理查询花费了一定的时间：\n\n\
  ```sql\nSQL Server parse and compile time:\nCPU time = 0 ms, elapsed time = 1 ms.\n\
  ```\n\n一微秒看起来可能不多，但如果它每分钟执行 500 次，你每天最终会多出 720,000 毫秒的额外执行时间！对于一个更复杂的查询，这可能会累积成巨大的延迟。当执行计划被重用时，解析和编译时间指示的时间将为零，这对于频繁执行的查询来说是更理想的情况。\n\
  \n这个困境的解决方案与你在前面章节中看到的许多安全问题和 SQL 注入问题的解决方案相同：**参数化查询**！重写查询将 `FirstName` 更改为一个可以反复使用同一执行计划的参数：\n\
  \n```sql\nDECLARE @FirstName NVARCHAR(MAX) = 'Edward';\nDECLARE @sql_command NVARCHAR(MAX);\n\
  DECLARE @parameter_list NVARCHAR(MAX) = '@first_name NVARCHAR(MAX)';\nSELECT @sql_command\
  \ = '\nSELECT\n*\nFROM Person.Person\nWHERE FirstName = @first_name;'\nPRINT @sql_command;\n\
  EXEC sp_executesql @sql_command, @parameter_list, @FIrstName;\n```\n\n当这个版本的简单查询打印\
  \ `@sql_command` 时，结果文本如下：\n\n```sql\nSELECT\n*\nFROM Person.Person\nWHERE FirstName\
  \ = @first_name;\n```\n\n实际上，无论传递给动态 SQL 命令字符串的 `@FirstName` 值是什么，查询文本都将相同。因此，你只需为优化查询支付一次代价，之后执行计划将从那时起被反复重用。这相当于每天为此查询减少了\
  \ 12 分钟的延迟。如果它是一个更复杂的查询，需要 20 毫秒来解析和编译，那么节省的时间将是 4 小时的延迟！\n\n让我们快速证明这一点，并展示我所描述的行为是真实的，而不仅仅是理论上的。首先，你需要清除过程缓存，这将为你提供一个干净的工作环境，没有干扰：\n\
  \n```sql\nDBCC FREEPROCCACHE;\n```\n\n执行此 `DBCC` 命令将清除缓存中的所有执行计划数据。这是创建干净测试环境的好方法，但应仅在与生产工作负载隔离的环境中使用！对于本地测试服务器上的测试目的，这是一种辅助工作的好方法。\n\
  \n**除非你绝对确定，否则切勿在生产环境中清除过程缓存！** 这会从缓存中删除所有查询执行计划数据，在繁忙的服务器上可能导致巨大延迟，因为查询需要重新优化！\n\
  \n现在，让我们在 `Person.Person` 上运行之前的查询几次，每次都使用各种不同的名字。这仅仅是为了向缓存添加执行数据以供后续演示，因此任何在此表上运行的查询最终都会进入缓存并在下方可见。完成后，你可以构建一个\
  \ T-SQL 语句从缓存中读取查询数据，如代码清单 6-2 所示。\n\n```sql\nSELECT\ncached_plans.objtype AS ObjectType,\n\
  OBJECT_NAME(sql_text.objectid, sql_text.dbid) AS ObjectName,\ncached_plans.usecounts\
  \ AS ExecutionCount,\nsql_text.TEXT AS QueryText\nFROM sys.dm_exec_cached_plans\
  \ AS cached_plans\nCROSS APPLY sys.dm_exec_sql_text(cached_plans.plan_handle) AS\
  \ sql_text\nWHERE sql_text.TEXT LIKE '%Person.Person%';\n```\n\n代码清单 6-2. 可以从查询计划缓存中检索\
  \ SQL 文本的 T-SQL\n\n这仅返回计划缓存中少量相关列供你查看，但如果你想，也可以修改以返回更多数据。此查询的结果如图 6-6 所示。\n\n![A371168_1_En_6_Fig6_HTML.jpg](img/A371168_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6. 查询计划缓存中的示例数据\n\n结果是当前计划缓存中所有 T-SQL 文本包含字符串 `\"Person.Person\"` 的查询。第一个查询是我刚刚运行以收集此数据的查询。第二个是参数化查询，我用多种不同的名字运行了它。请注意，执行计数表明它已被重用多次。剩下的六个查询是之前的非参数化查询，分别用于名字\
  \ `Edward`、`Xavier`、`Thomas`、`Jesse`、`James` 和 `T-Rex`！！！。无论返回的结果如何（或者没有结果），所有这些查询在计划缓存中都有单独的条目，尽管这些查询本质上是相同的。\n\
  \n请注意，在对象类型下，参数化查询被列为 `Prepared` 而不是 `Adhoc`，这表明执行的 T-SQL 中没有变量可以改变其内部的 T-SQL 文本。通过完全参数化，查询计划也变得确定。更改你正在搜索的名字不会改变\
  \ SQL 文本，因此也不会改变执行计划。如果此查询非常频繁地执行，用于大量不同的名字，非参数化查询将很快用大量相同搜索的条目填满计划缓存。随着时间的推移，这将非常浪费，不仅消耗资源不断编译查询执行计划，最终还会将更重要的查询挤出缓存。因此，无论何时处理任何需要频繁执行的查询，请确保它可以重复执行但只需要一个执行计划。\n\
  \n#### 简化查询\n\n在之前关于动态搜索的讨论中，你能够使用动态 SQL 来移除 T-SQL 语句中过多的连接或 `WHERE` 子句。虽然动态 SQL\
  \ 更复杂，但执行的最终 T-SQL 更简单。既然你已经掌握了一些性能评估工具，你可以验证这个说法！请参阅代码清单 6-3 了解此存储过程。\n\n\n###\
  \ 动态搜索过程\n\n#### 代码逻辑说明\n\n`代码清单 6-3` 展示了一个动态搜索存储过程，它能够在需要时选择性地查询对象。\n\n#### SQL\
  \ 代码实现\n\n以下代码块定义了存储过程 `dbo.search_products`：\n\n```sql\nIF EXISTS (SELECT * FROM\
  \ sys.procedures WHERE procedures.name = 'search_products')\nBEGIN\n    DROP PROCEDURE\
  \ dbo.search_products;\nEND\nGO\n\n-- 带检查的搜索，以避免空搜索\nCREATE PROCEDURE dbo.search_products\n\
  \    @product_name NVARCHAR(50) = NULL,\n    @product_number NVARCHAR(25) = NULL,\n\
  \    @product_model NVARCHAR(50) = NULL,\n    @product_subcategory NVARCHAR(50)\
  \ = NULL,\n    @product_sizemeasurecode NVARCHAR(50) = NULL,\n    @product_weightunitmeasurecode\
  \ NVARCHAR(50) = NULL,\n    @show_color BIT = 0,\n    @show_safetystocklevel BIT\
  \ = 0,\n    @show_reorderpoint BIT = 0,\n    @show_standard_cost BIT = 0,\n    @show_catalog_description\
  \ BIT = 0,\n    @show_subcategory_modified_date BIT = 0,\n    @show_product_model\
  \ BIT = 0,\n    @show_product_subcategory BIT = 0,\n    @show_product_sizemeasurecode\
  \ BIT = 0,\n    @show_product_weightunitmeasurecode BIT = 0\nAS\nBEGIN\n    SET\
  \ NOCOUNT ON;\n\n    IF COALESCE(@product_name, @product_number, @product_model,\
  \ @product_subcategory,\n                 @product_sizemeasurecode, @product_weightunitmeasurecode)\
  \ IS NULL\n        RETURN;\n\n    -- 为将作为通配符搜索的参数添加 \"%\" 分隔符。\n    SET @product_name\
  \ = '%' + @product_name + '%';\n    SET @product_number = '%' + @product_number\
  \ + '%';\n    SET @product_model = '%' + @product_model + '%';\n\n    DECLARE @sql_command\
  \ NVARCHAR(MAX);\n\n    -- 为筛选条件定义参数列表\n    DECLARE @parameter_list NVARCHAR(MAX)\
  \ = '@product_name NVARCHAR(50), @product_number NVARCHAR(25),\n        @product_model\
  \ NVARCHAR(50), @product_subcategory NVARCHAR(50), @product_sizemeasurecode NVARCHAR(50),\n\
  \        @product_weightunitmeasurecode NVARCHAR(50)';\n\n    -- 为 SELECT 列生成简化的命令字符串部分\n\
  \    SELECT @sql_command = '\n        SELECT\n            Product.Name AS product_name,\n\
  \            Product.ProductNumber AS product_number,';\n\n    IF @show_product_model\
  \ = 1 OR @show_catalog_description = 1\n        SELECT @sql_command = @sql_command\
  \ + '\n            ProductModel.Name AS product_model_name,\n            ProductModel.CatalogDescription\
  \ AS productmodel_catalog_description,';\n\n    IF @show_product_subcategory = 1\
  \ OR @show_subcategory_modified_date = 1\n        SELECT @sql_command = @sql_command\
  \ + '\n            ProductSubcategory.Name AS product_subcategory_name,\n      \
  \      ProductSubcategory.ModifiedDate AS product_subcategory_modified_date,';\n\
  \n    IF @show_product_sizemeasurecode = 1\n        SELECT @sql_command = @sql_command\
  \ + '\n            SizeUnitMeasureCode.Name AS size_unit_measure_code,';\n\n   \
  \ IF @show_product_weightunitmeasurecode = 1\n        SELECT @sql_command = @sql_command\
  \ + '\n            WeightUnitMeasureCode.Name AS weight_unit_measure_code,';\n\n\
  \    IF @show_color = 1 OR @show_safetystocklevel = 1 OR @show_reorderpoint = 1\
  \ OR @show_standard_cost = 1\n        SELECT @sql_command = @sql_command + '\n \
  \           Product.Color AS product_color,\n            Product.SafetyStockLevel\
  \ AS product_safety_stock_level,\n            Product.ReorderPoint AS product_reorderpoint,\n\
  \            Product.StandardCost AS product_standard_cost';\n\n    -- 如果命令字符串的末尾有逗号，在继续之前将其移除：\n\
  \    IF (SELECT SUBSTRING(@sql_command, LEN(@sql_command), 1)) = ','\n        SELECT\
  \ @sql_command = LEFT(@sql_command, LEN(@sql_command) - 1);\n\n    SELECT @sql_command\
  \ = @sql_command + '\n        FROM Production.Product'\n\n    -- 根据搜索所需连接的表来组合 JOIN。\n\
  \    IF (@product_model IS NOT NULL OR @show_product_model = 1 OR @show_catalog_description\
  \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN Production.ProductModel\n\
  \                ON Product.ProductModelID = ProductModel.ProductModelID';\n\n \
  \   IF (@product_subcategory IS NOT NULL OR @show_subcategory_modified_date = 1\
  \ OR @show_product_subcategory = 1)\n        SELECT @sql_command = @sql_command\
  \ + '\n            LEFT JOIN Production.ProductSubcategory\n                ON Product.ProductSubcategoryID\
  \ = ProductSubcategory.ProductSubcategoryID';\n\n    IF (@product_sizemeasurecode\
  \ IS NOT NULL OR @show_product_sizemeasurecode = 1)\n        SELECT @sql_command\
  \ = @sql_command + '\n            LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode\n\
  \                ON Product.SizeUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode';\n\
  \n    IF (@product_weightunitmeasurecode IS NOT NULL OR @show_product_weightunitmeasurecode\
  \ = 1)\n        SELECT @sql_command = @sql_command + '\n            LEFT JOIN Production.UnitMeasure\
  \ WeightUnitMeasureCode\n                ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode';\n\
  \n    SELECT @sql_command = @sql_command + '\n        WHERE 1 = 1';\n\n    -- 根据搜索引用和需要的表来构建\
  \ WHERE 子句。\n    IF @product_name IS NOT NULL\n        SELECT @sql_command = @sql_command\
  \ + '\n            AND Product.Name LIKE @product_name';\n\n    IF @product_number\
  \ IS NOT NULL\n        SELECT @sql_command = @sql_command + '\n            AND Product.ProductNumber\
  \ LIKE @product_number';\n\n    IF @product_model IS NOT NULL\n        SELECT @sql_command\
  \ = @sql_command + '\n            AND ProductModel.Name LIKE @product_model';\n\n\
  \    IF @product_subcategory IS NOT NULL\n        SELECT @sql_command = @sql_command\
  \ + '\n            AND ProductSubcategory.Name = @product_subcategory';\n\n    IF\
  \ @product_sizemeasurecode IS NOT NULL\n        SELECT @sql_command = @sql_command\
  \ + '\n            AND SizeUnitMeasureCode.Name = @product_sizemeasurecode';\n\n\
  \    IF @product_weightunitmeasurecode IS NOT NULL\n        SELECT @sql_command\
  \ = @sql_command + '\n            AND WeightUnitMeasureCode.Name = @product_weightunitmeasurecode';\n\
  \n    PRINT @sql_command;\n\n    EXEC sp_executesql @sql_command, @parameter_list,\
  \ @product_name, @product_number,\n        @product_model, @product_subcategory,\
  \ @product_sizemeasurecode,\n        @product_weightunitmeasurecode;\nEND\n```\n\
  \n\n### 动态搜索与静态搜索存储过程的对比\n\n以下是您在第 4 章中看到的动态搜索。这个存储过程可能看起来很长，但它的长度确保了只有在进行的搜索需要时，才会查询表并返回列。\n\
  \n这个存储过程的设计使得只有当某个表的数据需要用于`WHERE`子句或连接时，才会查询该表。此外，只有当调用应用程序需要时，查询才会返回列。现在它已经创建好了，让我们为可能的用户搜索运行它，如清单\
  \ 6-4 所示。\n\n```sql\nEXEC dbo.search_products @product_name = 'Mountain Frame',\
  \ @product_number = 'FR-M21B', @product_model = 'LL Mountain Frame',\n@show_color\
  \ = 0, @show_safetystocklevel = 0,\n@show_reorderpoint = 0, @show_standard_cost\
  \ = 1, @show_catalog_description = 1, @show_subcategory_modified_date = 0,\n@show_product_model\
  \ = 1, @show_product_subcategory = 1\n```\n**清单 6-4.** 清单 6-3 中存储过程的执行示例\n\n这个搜索传入了各种参数，也有一些参数被省略了。用户对自行车架的尺寸没有兴趣，因此省略了这些变量的参数。结果集是图\
  \ 6-7 中显示的五个山地自行车架。\n\n![A371168_1_En_6_Fig7_HTML.jpg](img/A371168_1_En_6_Fig7_HTML.jpg)\n\
  **图 6-7.** 从清单 6-4 中的 TSQL 执行搜索过程得到的结果\n\n执行的命令字符串如清单 6-5 所示。\n\n```sql\nSELECT\n\
  Product.Name AS product_name,\nProduct.ProductNumber AS product_number,\nProductModel.Name\
  \ AS product_model_name,\nProductModel.CatalogDescription AS productmodel_catalog_description,\n\
  ProductSubcategory.Name AS product_subcategory_name,\nProductSubcategory.ModifiedDate\
  \ AS product_subcategory_modified_date,\nProduct.Color AS product_color,\nProduct.SafetyStockLevel\
  \ AS product_safety_stock_level,\nProduct.ReorderPoint AS product_reorderpoint,\n\
  Product.StandardCost AS product_standard_cost\nFROM Production.Product\nLEFT JOIN\
  \ Production.ProductModel\nON Product.ProductModelID = ProductModel.ProductModelID\n\
  LEFT JOIN Production.ProductSubcategory\nON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID\n\
  WHERE 1 = 1\nAND Product.Name LIKE @product_name\nAND Product.ProductNumber LIKE\
  \ @product_number\nAND ProductModel.Name LIKE @product_model\nAND ProductSubcategory.Name\
  \ = @product_subcategory\n```\n**清单 6-5.** 执行清单 6-4 中的搜索过程生成的命令字符串\n\n由于传入的参数不需要，这个\
  \ TSQL 中省略了一些连接和`WHERE`子句。这对性能有什么影响？以下是本次执行的 IO 统计信息：\n\n```\nTable 'ProductModel'.\
  \ Scan count 0, logical reads 10, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'ProductSubcategory'.\
  \ Scan count 0, logical reads 10, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Product'. Scan\
  \ count 1, logical reads 14, physical reads 0, read-ahead reads 0, lob logical reads\
