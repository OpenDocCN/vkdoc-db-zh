  \ 10 次，`ProductSubcategory`上 10 次，`Product`上 14 次。同一执行的执行计划如图 6-8 所示。\n\n![A371168_1_En_6_Fig8_HTML.jpg](img/A371168_1_En_6_Fig8_HTML.jpg)\n\
  **图 6-8.** 清单 6-4 中存储过程执行的执行计划\n\n该计划显示了对 IO 统计中引用的三个表的访问，以及将所有这些数据组合在一起所需的各种步骤。作为比较，整个查询的估计子树成本是\
  \ 0.014。\n\n动态搜索的替代方案是静态搜索，其中自动连接所有表并返回所有列以备需要。清单 6-6 中的存储过程展示了这一点。\n\n```sql\n\
  IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'search_products')\n\
  BEGIN\nDROP PROCEDURE dbo.search_products;\nEND\nGO\nCREATE PROCEDURE dbo.search_products\n\
  @product_name NVARCHAR(50) = NULL, @product_number NVARCHAR(25) = NULL, @product_model\
  \ NVARCHAR(50) = NULL,\n@product_subcategory NVARCHAR(50) = NULL, @product_sizemeasurecode\
  \ NVARCHAR(50) = NULL,\n@product_weightunitmeasurecode NVARCHAR(50) = NULL\nAS\n\
  BEGIN\nSELECT @product_name = '%' + @product_name + '%';\nSELECT @product_number\
  \ = '%' + @product_number + '%';\nSELECT @product_model = '%' + @product_model +\
  \ '%';\nSELECT\nProduct.Name AS product_name,\nProduct.ProductNumber AS product_number,\n\
  ProductModel.Name AS product_model_name,\nProductModel.CatalogDescription AS productmodel_catalog_description,\n\
  ProductSubcategory.Name AS product_subcategory_name,\nProductSubcategory.ModifiedDate\
  \ AS product_subcategory_modified_date,\nSizeUnitMeasureCode.Name AS size_unit_measure_code,\n\
  WeightUnitMeasureCode.Name AS weight_unit_measure_code,\nProduct.Color AS product_color,\n\
  Product.SafetyStockLevel AS product_safety_stock_level,\nProduct.ReorderPoint AS\
  \ product_reorderpoint,\nProduct.StandardCost AS product_standard_cost\nFROM Production.Product\n\
  LEFT JOIN Production.ProductModel\nON Product.ProductModelID = ProductModel.ProductModelID\n\
  LEFT JOIN Production.ProductSubcategory\nON Product.ProductSubcategoryID = ProductSubcategory.ProductSubcategoryID\n\
  LEFT JOIN Production.UnitMeasure SizeUnitMeasureCode\nON Product.SizeUnitMeasureCode\
  \ = SizeUnitMeasureCode.UnitMeasureCode\nLEFT JOIN Production.UnitMeasure WeightUnitMeasureCode\n\
  ON Product.WeightUnitMeasureCode = SizeUnitMeasureCode.UnitMeasureCode\nWHERE (Product.Name\
  \ LIKE @product_name OR @product_name IS NULL)\nAND (Product.ProductNumber LIKE\
  \ @product_number OR @product_number IS NULL)\nAND (ProductModel.Name LIKE @product_model\
  \ OR @product_model IS NULL)\nAND (ProductSubcategory.Name = @product_subcategory\
  \ OR @product_subcategory IS NULL)\nAND (SizeUnitMeasureCode.Name = @product_sizemeasurecode\
  \ OR @product_sizemeasurecode IS NULL)\nAND (WeightUnitMeasureCode.Name = @product_weightunitmeasurecode\
  \ OR @product_weightunitmeasurecode IS NULL);\nEND\n```\n**清单 6-6.** 无论参数如何都检查并返回所有数据的搜索过程\n\
  \n这个 TSQL 更容易阅读和理解。搜索是直截了当的，返回你可能想要的所有可能的列，连接所有表，并在`WHERE`子句中检查所有搜索参数，即使它们没有在存储过程参数中指定。输出上的唯一差异是任何你在上一个版本中明确省略的额外列。你可以运行与之前相同的执行语句来评估性能：\n\
  \n```sql\nEXEC dbo.search_products @product_name = 'Mountain Frame', @product_number\
  \ = 'FR-M21B', @product_model = 'LL Mountain Frame',\n@product_subcategory = 'Mountain\
  \ Frames'\n```\n\n这个新版本的执行计划和 IO 统计信息如图 6-9 所示。\n\n![A371168_1_En_6_Fig9_HTML.jpg](img/A371168_1_En_6_Fig9_HTML.jpg)\n\
  **图 6-9.** 更包容的搜索过程的执行计划\n\n### SQL 性能对比与分页优化\n\n```\nTable 'UnitMeasure'. Scan\
  \ count 1, logical reads 21, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'ProductSubcategory'.\
  \ Scan count 0, logical reads 10, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'ProductModel'.\
  \ Scan count 0, logical reads 10, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Product'. Scan\
  \ count 1, logical reads 14, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 0, lob physical reads 0, lob read-ahead reads 0.\n```\n\n性能上的主要区别在于，你必须访问 `UnitMeasure`\
  \ 表两次才能收集产品的尺寸和重量度量数据。尽管对于已运行的搜索来说，这些列并非必需，但简化的 TSQL 并不会区分你需要什么和不需要什么。它用设计的简单性换取了性能上的复杂性。\n\
  \n结果是，同样的搜索需要额外进行 21 次读取，并且子树成本为 0.022。执行时间对比如何？在我本地服务器上进行的 20 次执行试验中，动态 SQL 方法平均耗时\
  \ 40ms。而那个“简化版”则耗时 50ms。这些性能下降可能看起来并不巨大，因为它们查询的是相对较小的表。如果 `UnitMeasure` 表更大，那么额外的工作量也会变得更加显著。此外，如果你不是需要查询\
  \ 4 个表，而是 100 个呢？如果用户可以选择的可能列数以千计呢？如果你经常被迫在不需要时也从 100 个表中读取数据，在生产服务器上结果将会非常明显。\n\
  \n另外请记住，每次访问不同表的搜索都会导致一个独特的执行计划。在这种情况下，这种行为是可取的，因为当需要查询的对象较少时，你希望得到一个更小、更精简的执行。不过，对于不同的参数值不会创建额外的计划，只有在查询文本本身发生改变的情况下才会。这种情况会在添加连接、`WHERE`\
  \ 子句被赋予额外参数，或者列被添加到结果集时发生。\n\n当涉及非常大量的表、列、过滤器或其他变量时，最终的搜索需要足够智能，不去查询不需要的对象。实现这一点所需的逻辑可以在应用程序代码中执行，也可以在\
  \ SQL Server 中执行，但必须以某种方式处理，以消除查询那些不需要对象所需的额外资源开销。动态 SQL 是在 SQL Server 中实现此目标的绝佳工具，尽管需要详尽的文档和干净的代码，以确保性能的提升不是以可维护性为代价换来的。\n\
  \n#### 分页性能\n\n分页可能是一个开销很大的过程，尤其是在频繁使用时。交互式搜索通常需要额外的聚合数据，而这些数据可能不存在于行级别，例如：\n\n\
  *   总行数\n*   当前行号\n*   列的总和、平均值、最小值或最大值\n*   页面大小\n*   相关或关联的结果\n\n将这些数据与结果集内联返回会引发许多问题，例如是单独计算聚合还是使用窗口函数计算。这是一个没有单一答案的领域。整体数据源的大小、分布和索引情况都很重要。此外，了解结果集的返回百分比也会影响决策过程。为了开始这项分析，让我们回顾几种不同的数据分页方式，并深入探讨每种方法的性能。\n\
  \n清单 6-7 中的查询返回 25 条搜索结果，供用户分页浏览。\n\n```sql\nWITH CTE_PRODUCTS AS (\nSELECT\nROW_NUMBER()\
  \ OVER (ORDER BY OrderDate ASC) AS rownum,\nSalesOrderHeader.SalesOrderID,\nSalesOrderHeader.Status,\n\
  SalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\nSalesOrderDetail.UnitPrice,\n\
  SalesOrderDetail.LineTotal\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nWHERE SalesOrderHeader.SalesPersonID\
  \ = 277\n)\nSELECT\n*\nFROM CTE_PRODUCTS\nWHERE rownum BETWEEN 51 AND 75\n```\n\n\
  **清单 6-7.** 使用基于订单日期的行号进行基本数据分页\n\n如图 6-10 所示，此查询的性能相对直接。\n\n![A371168_1_En_6_Fig10_HTML.jpg](img/A371168_1_En_6_Fig10_HTML.jpg)\n\
