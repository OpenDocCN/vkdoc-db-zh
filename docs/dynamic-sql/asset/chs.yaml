  \n#### 使用窗口函数进行数据分页\n\n下一个示例将计数操作移入公共表表达式中，如代码清单 6-10 所示。\n\n```sql\nWITH CTE_PRODUCTS\
  \ AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,\n\
  \        COUNT(SalesOrderDetail.SalesOrderDetailID) OVER (ORDER BY SalesOrderDetail.SalesOrderDetailID\
  \ ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING) AS total_result_count,\n\
  \        SalesOrderHeader.SalesOrderID,\n        SalesOrderHeader.Status,\n    \
  \    SalesOrderHeader.OrderDate,\n        SalesOrderHeader.ShipDate,\n        SalesOrderDetail.UnitPrice,\n\
  \        SalesOrderDetail.LineTotal\n    FROM Sales.SalesOrderHeader\n    INNER\
  \ JOIN Sales.SalesOrderDetail\n        ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\n\
  \    WHERE SalesOrderHeader.SalesPersonID = 277\n)\nSELECT\n    *\nFROM CTE_PRODUCTS\n\
  WHERE rownum BETWEEN 51 AND 75;\n```\n\n代码清单 6-10. 使用窗口函数计算总行数进行数据分页\n\n`ORDER BY`\
  \ 后的语法表示行数应针对整个数据集（`UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING`）。再次，行数计算被包含在数据检索中，但它的性能如何呢？\n\
  \n\n\n#### 性能分析\n\n```\n表 'Worktable'。扫描计数 3，逻辑读取 16130，物理读取 0，预读 0，lob 逻辑读取 0，lob\
  \ 物理读取 0，lob 预读 0。\n表 'SalesOrderDetail'。扫描计数 473，逻辑读取 1626，物理读取 0，预读 0，lob 逻辑读取\
  \ 0，lob 物理读取 0，lob 预读 0。\n表 'SalesOrderHeader'。扫描计数 1，逻辑读取 689，物理读取 0，预读 0，lob 逻辑读取\
  \ 0，lob 物理读取 0，lob 预读 0。\n```\n\n怎么回事！？执行计划看起来足够简单，两个表似乎只访问了一次。然而，IO 统计数据却讲述了一个截然不同的故事！为了计算\
  \ CTE 中的计数，SQL Server 会为结果集中处理的**每一行**重新计算它！读取次数比之前所有例子高出数个数量级，这表明看起来不错的语法并不总是表现良好。你可以尝试简化\
  \ TSQL 来改进性能，如清单 6-11 所示。\n\n#### 简化窗口函数方法\n\n```tsql\nWITH CTE_PRODUCTS AS (\n\
  SELECT\nROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,\nCOUNT(*) OVER ()\
  \ AS total_result_count,\nSalesOrderHeader.SalesOrderID,\nSalesOrderHeader.Status,\n\
  SalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\nSalesOrderDetail.UnitPrice,\n\
  SalesOrderDetail.LineTotal\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\n\
  ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nWHERE SalesOrderHeader.SalesPersonID\
  \ = 277\n)\nSELECT\n*\nFROM CTE_PRODUCTS\nWHERE rownum BETWEEN 51 AND 75;\n```\n\
  \n清单 6-11. 使用简化窗口函数进行数据分页\n\n性能与之前几乎完全相同。尽管移除了额外的语法，这种方法的执行效率极低。在更大的数据集上，当 SQL Server\
  \ 试图在遍历数据的每一行上计算计数时，这种方法会导致显著更多的读取和延迟。\n\n最后一个选项是从一开始就持久化整个数据集。如果搜索结果不是特别大，或者你可以将其限制在一个相对紧凑的范围内，那么你可以针对这种特定场景进行优化，如清单\
  \ 6-12 所示。\n\n#### 持久化完整数据集\n\n```tsql\nSELECT\nROW_NUMBER() OVER (ORDER BY OrderDate\
  \ ASC) AS rownum,\nSalesOrderHeader.SalesOrderID,\nSalesOrderHeader.Status,\nSalesOrderHeader.OrderDate,\n\
  SalesOrderHeader.ShipDate,\nSalesOrderDetail.UnitPrice,\nSalesOrderDetail.LineTotal\n\
  INTO #orders\nFROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\nON\
  \ SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\nWHERE SalesOrderHeader.SalesPersonID\
  \ = 277;\nSELECT @@ROWCOUNT AS total_result_count;\nCREATE CLUSTERED INDEX IX_temp_orders_rownum\
  \ ON #orders (rownum);\nSELECT * FROM #orders WHERE rownum BETWEEN 1 AND 25;\nSELECT\
  \ * FROM #orders WHERE rownum BETWEEN 26 AND 50;\nSELECT * FROM #orders WHERE rownum\
  \ BETWEEN 51 AND 75;\nSELECT * FROM #orders WHERE rownum BETWEEN 76 AND 100;\nDROP\
  \ TABLE #orders;\n```\n\n清单 6-12. 在数据被选中后使用行计数计算进行数据分页\n\n此示例将整个数据集选入一个临时表。然后使用\
  \ `@@ROWCOUNT` 获取总行数，这不需要访问任何数据即可返回。由于你假设需要访问返回的大部分数据，接下来的操作是在临时表的 `rownum` 上创建聚集索引。这确保了每个在\
  \ `rownum` 上进行筛选的查询都将非常高效。以下是此搜索版本的 IO 统计数据：\n\n```\n表 'SalesOrderDetail'。扫描计数 473，逻辑读取\
  \ 1626，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n表 'SalesOrderHeader'。扫描计数 1，逻辑读取\
  \ 689，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n表 '#orders'。扫描计数 1，逻辑读取 62，物理读取\
  \ 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n表 '#orders'。扫描计数 1，逻辑读取 2，物理读取 0，预读 0，lob\
  \ 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n表 '#orders'。扫描计数 1，逻辑读取 2，物理读取 0，预读 0，lob 逻辑读取 0，lob\
  \ 物理读取 0，lob 预读 0。\n表 '#orders'。扫描计数 1，逻辑读取 2，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob\
  \ 预读 0。\n表 '#orders'。扫描计数 1，逻辑读取 2，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n\
  ```\n\n你在收集搜索中所有数据的前期付出了高昂的代价，累计了 2,315 次读取！添加索引在临时表上又花费了 62 次读取，但从这一点开始，所有分页结果的获取都变得非常廉价，因为你可以有效地使用该索引。基于\
  \ IO，这一切努力值得吗？原始搜索需要 731 次读取。基于这个数字，在第四次对结果集进行分页浏览后，这种新方法就会开始显现优势。如前所述，当数据集不是特别大，并且你平均知道需要多次分页浏览时，一次性检索所有数据是有效的。\n\
  \n查询执行计划也讲述了类似的故事，如图 6-14 所示。\n\n![A371168_1_En_6_Fig14_HTML.jpg](img/A371168_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14. 为后续重复查询提前收集所有数据时的性能\n\n对于针对现有数据集执行的后续每次分页搜索结果，都会重复第三个执行计划。数据收集查询的子树成本为\
  \ 1.99，索引创建成本为 0.8，返回分页搜索结果的成本为 0.003。这些结果与 IO 统计数据吻合良好。为了检索整个结果集中的 7,825 行数据，前期投入了相当多的精力，但从那时起，访问成本相比之下就非常低了。\n\
  \n请注意，通过保存和重用计数，如果底层数据发生变化，它不会更新。在某些搜索场景中这可以容忍，即结果集在再次运行搜索之前必须保持不变，但这可能并非在所有用例中都可接受。如果数据集需要在每次点击浏览结果时刷新，那么存储结果和计数以供后续使用可能不足以满足该业务需求。在此类场景中，请考虑数据的结构。如果新数据被追加到数据集的末尾，则可以将其作为对现有搜索的额外操作进行检索。例如，在前面的例子中，你可以检查临时表中最大的\
  \ `SalesOrderDetailID`，然后将任何更新的、在 `SalesOrderHeader` 和 `SalesOrderDetail` 中的额外新数据添加到数据集中。或者，如果数据具有最后修改日期和/或最后创建日期，你可以使用这些日期来快速收集自初始搜索完成以来发生更改的数据。\n\
  \n#### 用于分页的 OFFSET 函数\n\n你尚未见到的最后一个分页选项是 `OFFSET` 功能。它允许你对结果集进行排序，偏移到该排序中的任意行号，并从该点开始选择任意数量的行。此\
  \ TSQL 如清单 6-13 所示。\n\n\n\n#### 使用 OFFSET 实现数据分页\n\n```sql\nSELECT\nSalesOrderHeader.SalesOrderID,\n\
  SalesOrderHeader.Status,\nSalesOrderHeader.OrderDate,\nSalesOrderHeader.ShipDate,\n\
  SalesOrderDetail.UnitPrice,\nSalesOrderDetail.LineTotal\nFROM Sales.SalesOrderHeader\n\
  INNER JOIN Sales.SalesOrderDetail\nON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\n\
  WHERE SalesOrderHeader.SalesPersonID = 277\nORDER BY SalesOrderDetailID ASC\nOFFSET\
  \ 50 ROWS\nFETCH NEXT 25 ROWS ONLY\n```\n代码清单 6-13. 使用 OFFSET 实现数据分页\n\n`OFFSET`\
  \ 的语法很简单，它让你能够对数据集进行分页，而无需自行计算行号。此示例的 I/O 统计信息和执行计划如图 6-15 所示。\n\n![A371168_1_En_6_Fig15_HTML.jpg](img/A371168_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15. 使用 OFFSET 运算符进行分页的性能\n\n```\n表 'SalesOrderDetail'。扫描计数 9，逻辑读取 45，物理读取\
  \ 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n表 'SalesOrderHeader'。扫描计数 1，逻辑读取 689，物理读取\
  \ 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n```\n\n执行计划与之前见过的类似，读取次数也与第一个使用 `ROW_NUMBER`\
  \ 的示例大致相当。使用 `OFFSET` 的关键在于确保 `ORDER BY` 子句是基于你想要用来分页的列。在前面的例子中，使用了 `OrderDate`\
  \ 来确定结果集的顺序，但根据业务需求，也可以使用其他列。\n\n##### 过滤索引\n\n默认情况下，索引会应用于给定表中的所有行。在大型表上，索引的读取成本可能变得很高，维护起来也耗时且耗费资源。如果你有一个或一组查询都依赖于相同的筛选条件，你可以创建一个仅适用于这些筛选条件的索引。这个过滤索引只会在使用那些完全相同的筛选条件时生效，因此首次创建时确保其正确性至关重要！\n\
  \n过滤索引的一个常见用途是，当你有一个表，其中特定的状态或标志表示你感兴趣的数据，而其余的数据则总是被忽略。考虑代码清单 6-14 中的存储过程，它执行采购订单的搜索。\n\
  \n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'get_in_process_purchasing_data')\n\
  BEGIN\nDROP PROCEDURE dbo.get_in_process_purchasing_data;\nEND\nGO\nCREATE PROCEDURE\
  \ dbo.get_in_process_purchasing_data\n@return_detail_data BIT\nAS\nBEGIN\nSET NOCOUNT\
  \ ON;\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\nPurchaseOrderHeader.PurchaseOrderID,\n\
  PurchaseOrderHeader.OrderDate,\nPurchaseOrderHeader.ShipDate,\nPurchaseOrderHeader.SubTotal,\n\
  PurchaseOrderHeader.Freight';\nIF @return_detail_data = 1\nSELECT @sql_command =\
  \ @sql_command + ',\nPurchaseOrderDetail.PurchaseOrderDetailID,\nPurchaseOrderDetail.OrderQTY,\n\
  PurchaseOrderDetail.UnitPrice,\nProduct.Name,\nProduct.ProductNumber';\nSELECT @sql_command\
  \ = @sql_command + '\nFROM purchasing.PurchaseOrderHeader\nINNER JOIN purchasing.PurchaseOrderDetail\n\
  ON PurchaseOrderHeader.PurchaseOrderID = PurchaseOrderDetail.PurchaseOrderID';\n\
  IF @return_detail_data = 1\nSELECT @sql_command = @sql_command + '\nINNER JOIN Production.Product\n\
  ON Product.ProductID = PurchaseOrderDetail.ProductID';\nSELECT @sql_command = @sql_command\
  \ + '\nWHERE PurchaseOrderHeader.Status = 2';\nEXEC sp_executesql @sql_command;\n\
  END\nGO\n```\n代码清单 6-14. 带有常用状态筛选器的简单动态搜索\n\n这个存储过程使用一个参数来决定是否返回详细数据，从而执行搜索。更重要的是，所有执行中都存在一个共同的筛选条件：\n\
  \n`WHERE PurchaseOrderHeader.Status = 2`\n\n为了说明性能基线，你可以添加一个标准的覆盖索引来帮助减少对 `PurchaseOrderHeader`\
  \ 的读取：\n\n```sql\nCREATE NONCLUSTERED INDEX IX_PurchaseOrderHeader_status_INC\n\
  ON Purchasing.PurchaseOrderHeader (OrderDate, status)\nINCLUDE (PurchaseOrderID,\
  \ ShipDate, SubTotal, Freight);\nGO\n```\n\n现在，你可以执行一次详细的查询：\n\n```sql\nEXEC dbo.get_in_process_purchasing_data\
  \ @return_detail_data = 1;\n```\n\n结果集包含 57 行，包含了存储过程中动态 SQL 可能返回的所有列。此执行的性能如下：\n\
  \n```\n表 'Product'。扫描计数 0，逻辑读取 114，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读 0。\n\
  表 'PurchaseOrderDetail'。扫描计数 12，逻辑读取 24，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob 预读\
  \ 0。\n表 'PurchaseOrderHeader'。扫描计数 1，逻辑读取 24，物理读取 0，预读 0，lob 逻辑读取 0，lob 物理读取 0，lob\
  \ 预读 0。\n```\n\n请注意，即使使用了覆盖索引，`PurchaseOrderHeader` 仍然有 24 次读取。执行计划如图 6-16 所示。\n\
  \n![A371168_1_En_6_Fig16_HTML.jpg](img/A371168_1_En_6_Fig16_HTML.jpg)\n\n图 6-16.\
  \ 为搜索查询使用覆盖索引时的执行计划\n\n整个查询的子树成本是 0.095894。由于这个存储过程有一个自动的 `status = 2` 筛选器，你可以通过将该筛选器直接添加到索引中来改进索引：\n\
  \n\n\n### 过滤索引：性能优化与注意事项\n\n#### 创建与示例\n\n```sql\nIF EXISTS (SELECT * FROM sys.indexes\
  \ WHERE indexes.name = 'IX_PurchaseOrderHeader_status_INC')\nBEGIN\nDROP INDEX IX_PurchaseOrderHeader_status_INC\
  \ ON Purchasing.PurchaseOrderHeader\nEND\nGO\nCREATE NONCLUSTERED INDEX IX_PurchaseOrderHeader_status_INC\n\
  ON Purchasing.PurchaseOrderHeader (OrderDate, status)\nINCLUDE (PurchaseOrderID,\
  \ ShipDate, SubTotal, Freight)\nWHERE status = 2;\n```\n\n请注意索引`INCLUDE`部分下方的过滤器。为索引添加过滤器会改变其结构，使其仅包含与过滤器匹配的行数据。当你需要始终如一地查询表中很小一部分数据时，过滤索引能极大地提升性能。一个更小的索引：\n\
  \n*   使 SQL Server 的读取速度更快，这意味着它可以用更少的逻辑读取操作更快地返回数据\n*   减少在其上执行索引维护所需的时间\n*   占用更少的磁盘存储空间\n\
  \n使用新的过滤索引执行存储过程后，返回的性能指标如下：\n\n```\nTable 'Product'. Scan count 0, logical reads\
  \ 114, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
  \ 0, lob read-ahead reads 0.\nTable 'PurchaseOrderDetail'. Scan count 12, logical\
  \ reads 24, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\nTable 'PurchaseOrderHeader'. Scan count 1, logical\
  \ reads 2, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\n```\n\n在`PurchaseOrderHeader`上只有两次逻辑读取，比你之前看到的少了很多！这个改进后的执行计划如图\
  \ 6-17 所示。\n\n![A371168_1_En_6_Fig17_HTML.jpg](img/A371168_1_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17. 使用过滤覆盖索引时的性能\n\n请注意，尽管执行计划看起来和之前相似，但`PurchaseOrderHeader`上的索引扫描成本已经降低，整体子树成本降低了\
  \ 25%。\n\n#### 性能与权衡\n\n当经常只需要表中的一小部分数据子集时，过滤索引是管理查询的绝佳方法。在非常大的表上，性能差异可能是巨大的！但需要谨慎，因为过滤索引有两个注意事项：\n\
  \n*   `WHERE`子句必须精确。虽然查询优化器会尽力使用过滤索引，但它只能在查询的`WHERE`子句与索引过滤条件重叠时才能利用它。如果查询变化很大导致过滤器不匹配，SQL\
  \ Server 将忽略该过滤索引并尝试使用其他索引。\n*   当数据写入带有过滤索引的表时，SQL Server 必须检查更改的数据是否匹配过滤器。这意味着在修改数据时可能需要进行少量额外的读取操作，以正确维护过滤索引。虽然此成本通常很低，但在处理大型数据集时认识到这一点很重要。对于本例，任何修改`status`的`UPDATE`操作都需要验证这些更改是否会导致数据被添加或从过滤索引中移除。在带有复合`WHERE`子句的过滤索引中，修改其任何列都会导致类似的检查。\n\
  \n在考虑为索引添加过滤器时，好处通常会超过成本。如果一个表包含 1 亿行，其中 1 万行包含当前或相关数据，那么你可以预期索引上的读取以及存储空间将减少到原始量的大约\
  \ 0.01%。这是一个显著的改进！\n\n##### 基数\n\n在讨论性能问题时，讨论基数及其对你执行的查询意味着什么是很重要的。基数指的是一个操作影响的行数。在优化查询时，SQL\
  \ Server 必须确定执行计划的每个部分将影响多少行。这个计数将决定重要的决策，例如是扫描还是查找表，或者是使用合并连接还是哈希连接。对基数的解释如果不简要概述统计信息，将是不完整的。\n\
  \n\n\n### 统计信息\n\n默认情况下，系统会在给定表的所有索引和列上创建统计信息。统计信息提供了表中一组简单而强大的值列表。例如，您可以使用以下语句查看给定索引的统计信息：\n\
  \n```sql\nDBCC SHOW_STATISTICS (“Sales.SalesOrderheader”, IX_SalesOrderHeader_CustomerID);\n\
  ```\n\n此执行的结果由三组数据组成，如图 6-18 所示。\n\n![A371168_1_En_6_Fig18_HTML.jpg](img/A371168_1_En_6_Fig18_HTML.jpg)\n\
  \n**图 6-18. `DBCC SHOW_STATISTICS` 的示例输出**\n\n返回的第一行是统计信息的概览，包括名称、最后更新时间、表中的总行数以及采样的行数。对于较小的表，采样的行数将等于行数，但在较大的表中会变少。更新统计信息并非没有成本，如果数据在性质上相对均匀，扫描数百万行来更新可能不值得。步骤（Steps）是将数据划分为的范围数量，其中\
  \ 200 是 SQL Server 将使用的最大值。在此示例中，总共采样了 31,465 行（整个表），并被划分为 153 个范围，其中计算了 `CustomerID`\
  \ 的值。\n\n第二个结果集显示了索引中涉及的每个列（包括此索引引用回的聚集索引列）的密度（Density）。密度等于 1 / （唯一值的数量）。对于前面的值：\n\
  \n```sql\nSELECT DISTINCT CustomerID FROM Sales.SalesOrderheader;\n```\n\n此查询为 `CustomerID`\
  \ 返回 19,119 个唯一值。1/19119 = 5.230399E-05，这正是提供的值。`CustomerID` 和 `SalesOrderID`（聚集主键列）的组合在本例中与主键一样唯一：\n\
  \n```sql\nSELECT DISTINCT CustomerID, SalesOrderID FROM Sales.SalesOrderheader;\n\
  ```\n\n此查询返回 31,465 个值：1/31465 = 3.178134E-05，即上面的第二个值。\n\n密度是查询优化器的一个重要指标，因为它快速提供了列唯一性的洞察，从而可以推断出每个独立值平均可能有多少个潜在值。为了进一步确定细节并扩展密度的概念，让我们回顾上面最后一个数据集，即统计信息直方图。直方图显示了\
  \ `CustomerID` 的值范围以及落入该范围的行数。\n\n例如，查看直方图的一行：\n\n| RANGE_HI_KEY | RANGE_ROWS |\
  \ EQ_ROWS | DISTINCT_RANGE_ROWS | AVG_RANGE_ROWS |\n| --- | --- | --- | --- | ---\
  \ |\n| 11331 | 84 | 27 | 30 | 2.8 |\n| 11417 | 173 | 7 | 85 | 2.035294 |\n| 11439\
  \ | 68 | 6 | 21 | 3.238095 |\n\n在范围 11331 < X < 11417 中找到了 173 个值。此外，还有七个值等于该范围的最大值（11417）。在此范围内有\
  \ 85 个可能的值（11417 – 11331 - 1），平均范围行数（每值）为 2.035294。\n\n这一切都很好，但它意味着什么？这些数据有些深奥，但它为查询优化器提供了巨大的价值。它可以使用这些数据非常快速地交叉检查筛选条件、分组和连接，并确定如何处理查询。如果一个筛选条件非常宽泛，并且最终会返回表中的大部分行，则很可能使用表扫描。在这种情况下，返回所有内容比有选择性地挑选大量行更快。如果筛选条件非常严格，优化器会很快意识到索引查找是返回结果的最快方式。\n\
  \n查询优化器的好坏完全取决于统计信息提供的数据。如果这些数据因任何原因变得不准确，结果可能是次优的执行计划、糟糕的性能，以及用户在深夜荒谬的时间打电话向你寻求帮助。\n\
  \nSQL Server 中有三个设置指导如何在数据库中处理统计信息。它们都包含在系统视图中，可以像这样查看给定数据库的设置：\n\n\n\nSELECT\n\
  is_auto_update_stats_on,\nis_auto_create_stats_on,\nis_auto_update_stats_async_on\n\
  FROM sys.databases WHERE name = 'AdventureWorks2014';\n\n移除过滤器将返回此 SQL Server 上所有数据库的信息。此查询的结果如下：\n\
  \n| is_auto_update_stats_on | is_auto_create_stats_on | is_auto_update_stats_async_on\
  \ |\n| --- | --- | --- |\n| 1 | 1 | 0 |\n\n这些值代表什么？\n\n`Auto_update_stats_on` 告诉你\
  \ SQL Server 是否会自动更新过时的统计信息，默认情况下是开启的。这并不能保证统计信息一定能带来准确的执行计划，但能处理统计信息被判定为过时的几种用例。关于这一点，后面还会有更多介绍！\n\
  \n`Auto_create_stats_on` 指示是否会在需要时自动在列和索引上创建统计信息，默认情况下是开启的。这个功能很有用，除非你对手动维护统计信息非常有信心，否则不应将其关闭。此设置不适用于视图，对于视图，你需要在需要时手动创建统计信息。\n\
  \n`Auto_update_stats_async_on` 决定统计信息是在查询执行之前还是之后更新，默认是关闭的。开启此选项可以加快查询执行速度，但可能导致不准确的执行计划。因此建议保持关闭。\n\
  \n对于这些设置，通常默认值就是最佳选择，除非你有非常充分的理由进行更改。自动更新统计信息涉及什么，它在何时发生？\n\n默认情况下，数据库设置为开启 `AUTO_UPDATE_STATISTICS`。这将在以下情况发生时导致统计信息更新：\n\
  \n*   向空表中插入行时。\n*   表中的行数从少于 500 行增加到超过 500 行，且增量至少为 500 行时。\n*   表中的行数从超过 500\
  \ 行的基础上增加了 500 行，再加 20% 时。\n\n这些场景会在行数发生显著变化时更新统计信息，但对于复杂的生产环境来说，可能不够全面。为了确保统计信息完全是最新的，即使未满足上述标准，你也可以考虑手动或在维护计划中更新统计信息。可以一次性更新数据库中的所有统计信息，如下所示：\n\
  \n```sql\nEXEC sys.sp_updatestats ;\n```\n\n这将重新计算数据库中每个表上的所有统计信息。通常不建议这样做，因为需要扫描的数据量可能非常大，耗时很长，并且可能导致重要的生产负载争用。如果不能一次性更新所有内容，还有哪些替代方案？\n\
  \n更新统计信息可能是一项非常消耗 I/O 的操作。仅在必要时执行此维护，并且仅针对需要更新的对象进行。\n\n可以使用以下语法更新任何单个对象上的统计信息：\n\
  \n```sql\nUPDATE STATISTICS Production.Product ;\n```\n\n这将更新表 `Production.Product`\
  \ 上的所有统计信息。此外，也可以更新单个统计信息：\n\n```sql\nUPDATE STATISTICS Production.Product PK_Product_ProductID;\n\
  ```\n\n此语句仅更新 `Production.Product` 上主键的统计信息。\n\n下一个合乎逻辑的问题是，“你怎么知道什么时候应该手动更新统计信息？”\
  \ 通常，除非有特定原因，否则你无需担心这个过程。SQL Server 的默认设置对于大多数常见的数据库设计来说是可靠的。如果你不需要执行昂贵的维护操作，那当然不应该做！但是，当统计信息确实变得过时时会发生什么？\n\
  \n为了便于演示此示例，我们将关闭统计信息的自动更新。**切勿在生产环境中这样做！** 但是，出于测试目的，这是观察过时统计信息对查询优化和执行影响的好方法：\n\
  \n```sql\nALTER DATABASE AdventureWorks2014\nSET AUTO_UPDATE_STATISTICS OFF;\n```\n\
  \n执行此操作后，你可以使用之前的查询验证数据库上的统计信息设置：\n\n| is_auto_update_stats_on | is_auto_create_stats_on\
  \ | is_auto_update_stats_async_on |\n| --- | --- | --- |\n| 0 | 1 | 0 |\n\n```sql\n\
  SELECT\nis_auto_update_stats_on,\nis_auto_create_stats_on,\nis_auto_update_stats_async_on\n\
  FROM sys.databases WHERE name = 'AdventureWorks2014';\n```\n\n请注意，`is_auto_update_stats_on`\
  \ 现在已禁用，因此，统计信息只有在你手动更新时才会更新。此示例使用 `Production.Product` 表上 `Weight` 列的一个新索引：\n\n\
  ```sql\nCREATE NONCLUSTERED INDEX IX_Product_Weight ON Production.Product (Weight);\n\
  ```\n\n考虑以下查询：\n\n```sql\nSELECT\nProductID,\nWeight,\nName\nFROM Production.Product\n\
  WHERE Weight = 170\n```\n\n这从表中返回一行（总共 504 行）。性能指标如图 6-19 所示。\n\n![A371168_1_En_6_Fig19_HTML.jpg](img/A371168_1_En_6_Fig19_HTML.jpg)\n\
  \n图 6-19.\n简单索引查找操作的性能\n\n```\nTable 'Product'. Scan count 1, logical reads 4, physical\
  \ reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\n```\n\n这是一个相对简单的例子！在 `Production.Product` 上进行了 4 次读取，执行计划对新索引执行了查找，并且为了检索\
  \ `Name` 列（它不在你上面创建的索引中）执行了键查找。现在，让我们向表中插入大量新数据，如清单 6-15 所示。\n\n```sql\n-- Turn\
  \ off execution plan here\nSET STATISTICS IO OFF\nSET STATISTICS TIME OFF\nDECLARE\
  \ @count INT = 1\nWHILE @count < 2000\nBEGIN\nINSERT INTO Production.Product\n(\
  \ Name ,\nProductNumber ,\nMakeFlag ,\nFinishedGoodsFlag ,\nColor ,\nSafetyStockLevel\
  \ ,\nReorderPoint ,\nStandardCost ,\nListPrice ,\nSize ,\nSizeUnitMeasureCode ,\n\
  WeightUnitMeasureCode ,\nWeight ,\nDaysToManufacture ,\nProductLine ,\nClass ,\n\
  Style ,\nProductSubcategoryID ,\nProductModelID ,\nSellStartDate ,\nSellEndDate\
  \ ,\nDiscontinuedDate ,\nrowguid ,\nModifiedDate\n)\nSELECT\n'Hoverboard' + CAST(@count\
  \ AS VARCHAR(25)),\n'HOV-' + CAST(@count AS VARCHAR(25)),\n1 AS MakeFlag ,\n1 AS\
  \ FinishedGoodsFlag ,\nNULL AS Color ,\n500 AS SafetyStockLevel ,\n375 AS ReorderPoint\
  \ ,\n55 AS StandardCost ,\n100 AS ListPrice ,\nNULL AS Size ,\nNULL AS SizeUnitMeasureCode\
  \ ,\n'G' AS WeightUnitMeasureCode ,\n170 AS Weight ,\n5 AS DaysToManufacture ,\n\
  NULL AS ProductLine ,\n'H' AS Class ,\nNULL AS Style ,\n5 AS ProductSubcategoryID\
  \ ,\n97 AS ProductModelID ,\n'1/1/2015' AS SellStartDate ,\nNULL AS SellEndDate\
  \ ,\nNULL AS DiscontinuedDate ,\nNEWID() AS rowguid,\nCURRENT_TIMESTAMP AS ModifiedDate\n\
  SET @count = @count + 1\nEND\n```\n\n清单 6-15.\n向 Product 表填充 1,999 个新产品的 T-SQL\n\
  \n此查询将向 `Production.Product` 表插入 1,999 行数据，所有行的重量 (Weight) 都相同（170）。关闭执行计划和统计信息指标将大大加快插入速度，因为你正在使用一个快速而粗略的循环来完成任务。完成后，你可以重新运行之前运行非常高效的查询：\n\
  \n```sql\nSET STATISTICS IO ON;\nSET STATISTICS TIME ON;\nSET NOCOUNT ON;\nSELECT\n\
  ProductID,\nWeight,\nName\nFROM Production.Product\nWHERE Weight = 170;\n```\n\n\
  执行完成得足够快，但深入查看性能指标则揭示了另一个情况。如图 6-20 所示。\n\n![A371168_1_En_6_Fig20_HTML.jpg](img/A371168_1_En_6_Fig20_HTML.jpg)\n\
  \n图 6-20.\n针对更大结果集的搜索查询的性能\n\n```\nTable 'Product'. Scan count 1, logical reads\
  \ 4008, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\n```\n\n\n\n### 统计信息、执行计划与性能优化\n\n执行计划与之前得到的相同，但对`Production.Product`表的读取次数显著增加！对于一个仅返回三列、大约有\
  \ 2，500 行的表，4，004 次读取似乎非常高。通过关闭统计信息自动更新，你移除了查询优化器寻找良好执行计划的最重要工具：准确的统计信息。让我们回顾一下你在图\
  \ 6-21 中使用的索引的统计信息。\n\n![A371168_1_En_6_Fig21_HTML.jpg](img/A371168_1_En_6_Fig21_HTML.jpg)\n\
  \n图 6-21.\nProduction.Product 表上`IX_Product_Weight`索引的过时统计信息\n\n```sql\nDBCC SHOW_STATISTICS\
  \ (“Production.Product”, IX_Product_Weight);\n```\n\n注意，对于包含 170 的范围，尽管你添加了 1,999\
  \ 行，但只有一个相等行。查询优化器无法根据如此不准确的数据做出明智的决策。为了说明这一点，你可以手动更新此索引上的统计信息：\n\n```sql\nUPDATE\
  \ STATISTICS Production.Product IX_Product_Weight;\n```\n\n运行`DBCC`命令重新检查`IX_Product_Weight`索引的统计信息，会显示你期望看到的变化，如图\
  \ 6-22 所示。\n\n![A371168_1_En_6_Fig22_HTML.jpg](img/A371168_1_En_6_Fig22_HTML.jpg)\n\
  \n图 6-22.\nProduction.Product 表上`IX_Product_Weight`索引的更新后统计信息\n\n现在报告了 2,000 行权重等于\
  \ 170，这与插入后的预期相符。统计信息更新后，你可以最后一次运行测试查询：\n\n```sql\nSELECT\nProductID,\nWeight,\n\
  Name\nFROM Production.Product\nWHERE Weight = 170\n```\n\n这一次，性能指标看起来不那么令人担忧了，如图\
  \ 6-23 所示。\n\n![A371168_1_En_6_Fig23_HTML.jpg](img/A371168_1_En_6_Fig23_HTML.jpg)\n\
  \n图 6-23.\n使用更新后统计信息执行前述搜索查询的性能\n\n```text\nTable 'Product'. Scan count 1, logical\
  \ reads 58, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\n```\n\n现在只需要 58 次读取，而不是 4004 次，并且选择了聚集索引扫描作为最有效的数据检索方法。事实证明，当你希望返回表中很大一部分数据时，直接返回所有内容并丢弃不需要的部分，比遍历索引查找所有必要行更快。一旦查询优化器获得了关于索引内容的准确数据，它就能够选择扫描，知道这是最佳行动方案。\n\
  \n#### Trace Flag 2371\n\n在 SQL Server 中，还有另一种管理自动更新统计信息的方法，即从 SQL Server 2008 R2\
  \ Service Pack 1 开始可用的跟踪标志。跟踪标志 2371 旨在满足超大表的需求，因为用于自动更新统计信息的度量标准通常不太适合这些表。对于拥有数百万行的表，等待\
  \ 20%的行发生变化，你可能被迫等待很长时间。\n\n当你启用此跟踪标志后，更新统计信息的触发时机公式会变得有些动态。当一个表超过 25,000 行时，触发统计信息更新所需的修改行百分比会降低。这解决了大表的需求，同时不会改变小表的功能。\n\
  \n如果你负责一个包含数百万或数十亿行表的数据库，那么此跟踪标志可以显著提升性能，并避免手动管理统计信息。可以如下启用此跟踪标志：\n\n```sql\nDBCC\
  \ TRACEON (2371);\n```\n\n一如既往，在对 SQL Server 跟踪标志进行更改之前，请务必对数据库环境进行彻底评估，并测试以确保此更改是有益的。虽然当你获得新的性能功能或选项时可能会非常兴奋，但对这些更改进行充分的质量保证对于确保它们既必要又有帮助至关重要。\n\
  \n关于此跟踪标志的更多文档可以在 MSDN 上找到：\n\n```text\nhttp://blogs.msdn.com/b/saponsqlserver/archive/2011/09/07/changes-to-automatic-update-statistics-in-sql-server-traceflag-2371.aspx\n\
  ```\n\n### 回到动态 SQL\n\n我们已经讨论了统计信息、它们如何被使用，以及不准确的统计信息如何影响性能。这与动态 SQL 和你的日常任务有什么关系？基数是查询优化每一步中使用的数量度量。在每一步中，查询优化器必须使用统计信息来确定该步骤预期返回的行数，无论是查找、连接还是过滤。如果统计信息不准确，即使只在单一步骤中，也可能导致次优的执行计划，使得性能比应有的更差，或者（最坏情况）慢到无法接受。\n\
  \n你可以通过将鼠标悬停在执行计划中的任何步骤上来检查基数，如图 6-24 所示。\n\n![A371168_1_En_6_Fig24_HTML.jpg](img/A371168_1_En_6_Fig24_HTML.jpg)\n\
  \n图 6-24.\n在 SQL Server Management Studio 中查看行计数\n\n将鼠标悬停在聚集索引扫描和合并连接之间的箭头上，显示优化器估计有\
  \ 31,465 行输出到连接。然而，执行时实际的行数是 31,431。如此小的差异很少会引起性能问题，但如果你在审查查询执行计划时注意到实际行数和估计行数差异很大，那么一定要仔细检查统计信息并确保其准确性。\n\
  \n动态 SQL 引入了查询可能经常变化，或在少数几个常见用例之间切换的场景。统计信息出错，或者执行计划以次优方式被使用或重用的可能性变得更高。第 8 章讨论了参数嗅探，并深入探讨了基数和不良估计如何导致性能问题。理解这些问题可以在它们出现时大大减少困惑。\n\
  \n\n#### 查询提示\n\n你可以通过多种方式来引导查询优化器，使其精确执行你想要的操作。以 SQL Server 中最常用的提示之一 `NOLOCK`\
  \ 为例，如代码清单 6-16 所示。\n\n```\nSELECT\nSalesOrderDetail.SalesOrderDetailID,\nSalesOrderDetail.SalesOrderID,\n\
  SalesOrderDetail.ProductID\nFROM Sales.SalesOrderDetail WITH (NOLOCK)\nWHERE ProductID\
  \ = 713;\n```\n\n代码清单 6-16.\n`NOLOCK` 查询提示示例\n\n`NOLOCK` 是一个常用提示，可用于 `SELECT` 语句，通过从内存中读取现有数据（脏页）来避免争用，即使其他事务正在操作相关数据。乍一看，这似乎很出色——没有争用！但它是一把双刃剑，因为你很可能在\
  \ `UPDATE` 操作进行时执行 `SELECT`，却永远无法返回在该 `UPDATE` 语句中被更改或未提交的数据。\n\n`NOLOCK` 是查询提示的一个例子，这个功能的命名有些不当，因为它更像是一条命令而非提示。提示通常用作解决性能问题的手段。例如，如果数据库管理员观察到频繁的锁定或死锁，可能会使用\
  \ `NOLOCK` 来阻止此类争用的发生。在数据及时性不关键、你只需了解特定时间点数据概况的报表类环境中，这个提示可能很有用。即便如此，你也需要反思为何要在高度事务性的环境中运行报表查询。只有在回答了这个问题后，你才可以放心地进行这项更改。\n\
  \n使用查询提示的缺点在于，你是在明确指示查询优化器该做什么，就好像你比它更聪明一样。虽然有时你可能确实更了解情况，但在任何繁忙的生产环境中，情况都可能发生变化。今天完美运行的提示，明天可能就毫无用处，甚至会阻碍性能。\n\
  \n滥用连接提示往往是一个错误，如代码清单 6-17 所示。\n\n```\nDECLARE @ProductID INT = 713;\nSELECT\nSalesOrderDetail.SalesOrderDetailID,\n\
  SalesOrderDetail.SalesOrderID,\nSalesOrderDetail.ProductID,\nSalesOrderHeader.OrderDate\n\
  FROM Sales.SalesOrderDetail\nINNER LOOP JOIN Sales.SalesOrderHeader\nON SalesOrderDetail.SalesOrderID\
  \ = SalesOrderHeader.SalesOrderID\nWHERE ProductID = @ProductID;\nSELECT\nSalesOrderDetail.SalesOrderDetailID,\n\
  SalesOrderDetail.SalesOrderID,\nSalesOrderDetail.ProductID,\nSalesOrderHeader.OrderDate\n\
  FROM Sales.SalesOrderDetail\nINNER MERGE JOIN Sales.SalesOrderHeader\nON SalesOrderDetail.SalesOrderID\
  \ = SalesOrderHeader.SalesOrderID\nWHERE ProductID = @ProductID;\nSELECT\nSalesOrderDetail.SalesOrderDetailID,\n\
  SalesOrderDetail.SalesOrderID,\nSalesOrderDetail.ProductID,\nSalesOrderHeader.OrderDate\n\
  FROM Sales.SalesOrderDetail\nINNER HASH JOIN Sales.SalesOrderHeader\nON SalesOrderDetail.SalesOrderID\
  \ = SalesOrderHeader.SalesOrderID\nWHERE ProductID = @ProductID;\n```\n\n代码清单 6-17.\n\
  使用连接提示强制优化器采用特定连接方式\n\n当在查询中连接两个表时，查询优化器会选择其认为最佳的连接类型。有时你可能会发现，如果覆盖默认设置并强制使用某种特定连接，可以获得更好的性能。然而，这并不总是有效，如果你回顾上面的性能数据，会看到各种不同的结果：\n\
  \n```\nWarning: The join order has been enforced because a local join hint is used.\n\
  Table 'SalesOrderHeader'. Scan count 0, logical reads 1322, physical reads 0, read-ahead\
  \ reads 19, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Table 'SalesOrderDetail'. Scan count 1, logical reads 3, physical reads 0, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Warning: The join order has been enforced because a local join hint is used.\nTable\
  \ 'Worktable'. Scan count 0, logical reads 0, physical reads 0, read-ahead reads\
  \ 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'SalesOrderHeader'.\
  \ Scan count 1, logical reads 688, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'SalesOrderDetail'.\
  \ Scan count 1, logical reads 3, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nWarning: The join order\
  \ has been enforced because a local join hint is used.\nTable 'Workfile'. Scan count\
  \ 0, logical reads 0, physical reads 0, read-ahead reads 0, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan count 0,\
  \ logical reads 0, physical reads 0, read-ahead reads 0, lob logical reads 0, lob\
  \ physical reads 0, lob read-ahead reads 0.\nTable 'SalesOrderHeader'. Scan count\
  \ 1, logical reads 689, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'SalesOrderDetail'. Scan\
  \ count 1, logical reads 3, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 0, lob physical reads 0, lob read-ahead reads 0.\n```\n\n当你查看 IO 统计信息时，可以发现强制使用\
  \ `LOOP` 连接导致的读取次数远高于 `HASH` 或 `MERGE` 连接。`@ProductID` 的不同值可能导致不同的连接方式，从而产生更好或更差的性能结果。请注意，SQL\
  \ Server 会提醒你连接顺序已被查询提示强制执行。这是它委婉地告诉你，接下来发生的一切都是你造成的，如果结果不如预期，你不能打电话向微软投诉。\n\n类似地，这些查询的执行计划看起来也不同，每个计划都反映了不同的子树开销。你可以在图\
  \ 6-25 的三个执行计划中看到这些差异。\n\n![A371168_1_En_6_Fig25_HTML.jpg](img/A371168_1_En_6_Fig25_HTML.jpg)\n\
  \n图 6-25.\n使用查询提示强制不同连接时的执行计划\n\n强制使用特定连接最终会适得其反。也许 `HASH` 连接现在看起来是最佳选择，因为你看到一个大表与一个小表连接，但数据和应用程序的使用情况可能会改变。当你的调整最终变得无关紧要时，你可能要到为时已晚、性能下降时才会记起或注意到问题，因为当初进行更改的用例已不再适用。变化是数据库设计和管理中的常态，你必须编写足够灵活的脚本，以确保它们在数月甚至数年后仍然适用。查询提示对你的设计施加了限制，减少了优化器可选择的选项。如果这些选项在未来可能有用，那么你的提示将会阻止它们的使用。\n\
  \n另一个常用的查询提示是 `RECOMPILE`，它会强制 SQL Server 为查询创建新的执行计划，即使查询计划缓存中已存在合适的计划。这通常用作规避不良执行计划或确保每次都找到最佳计划的方法。然而，优化过程开销很大，在繁忙的生产服务器上，频繁重新编译大量查询所产生的成本可能导致\
  \ CPU 利用率异常高以及查询延迟。考虑在最后一个测试查询中添加提示，如代码清单 6-18 所示。\n\n```\nDECLARE @ProductID INT\
  \ = 713;\nSELECT\nSalesOrderDetail.SalesOrderDetailID,\nSalesOrderDetail.SalesOrderID,\n\
  SalesOrderDetail.ProductID,\nSalesOrderHeader.OrderDate\nFROM Sales.SalesOrderDetail\n\
  INNER JOIN Sales.SalesOrderHeader\nON SalesOrderDetail.SalesOrderID = SalesOrderHeader.SalesOrderID\n\
  WHERE ProductID = @ProductID\nOPTION (RECOMPILE);\n```\n清单 6-18.\n使用 `RECOMPILE`\
  \ 提示来强制创建并使用新的执行计划\n\n运行此查询，你会发现执行计划和 IO 统计信息中，几乎所有内容似乎都正常。而你会在 `STATISTICS TIME`\
  \ 结果中发现一个看似微小却意义重大的差异：\n\n```\nSQL Server parse and compile time:\nCPU time = 0\
  \ ms, elapsed time = 1 ms.\n```\n\n在输出中请注意，无论你运行查询多少次，解析和编译时间总是非零的。这就是强制重新编译执行计划所付出的代价。一毫秒可能看起来微不足道，但对于涉及许多表和连接的更复杂查询，这个时间可能会高得多。增加的耗时如果再加上频繁的执行，那么持续创建新执行计划所需的时间和开销将显著影响性能。\n\
  \n查询提示应谨慎使用，仅在必要时，并且所有其他替代方案都已穷尽后才考虑使用。随着时间的推移，提示可能会从有益变为对数据库性能造成破坏。\n\n你可以轻松查阅数十种查询提示，了解其常见用法以及潜在的陷阱，但通常重要的是要认识到，查询提示往往是绕过更大问题的权宜之计。很多时候，提示被用来掩盖设计不良的表、编写低效的查询、糟糕的索引或其他本可以通过修复来解决性能问题的错误。\n\
  \n别误会，查询提示确实有其正当的用途。然而，重要的是要将它们视为最后手段，而不是应该频繁使用的工具。只有在经过极其彻底的测试并确信发生破坏性更改的可能性极低后，才应实施它们。可用的查询和表提示列表可以在\
  \ MSDN 上找到：\n\n```\nhttps://msdn.microsoft.com/en-us/library/ms181714.aspx\n```\n\
  \n请注意文章顶部附近的警告：\n\n```\n如果一个或多个查询提示导致查询优化器无法生成有效的计划，则会引发错误 8622。\n```\n\n有些提示可能会移除查询优化器可用的唯一有效转换。如果发生这种情况，查询可能无法执行，产生错误，并且很可能在一个令人不适的深夜把你吵醒。了解这些选项很重要，但在实施时要谨慎。只有在认为必要且安全时才使用提示，并首先利用所有替代方案。如果可以重写查询、添加索引或修改视图，请首先考虑这些类似的更改，然后再对查询优化器发号施令。\n\
  \n### 结论\n\n性能优化是一个庞大的主题，而本章对这些重要主题的快速浏览只是触及了皮毛。在查询调优、索引、统计信息或其他提高性能的方法方面，还有许多可以深入挖掘的途径。\n\
  \n在着手处理每个问题时，都要心中有计划并进行彻底的研究。SQL Server 提供了许多工具，使你可以轻松评估性能和资源消耗，并找到让你的关键查询执行更快的方法。始终测试并确认任何更改的预期结果，并确保你的预测与测试结果相符。虽然你的性能假设被你未曾考虑的其他指标推翻可能会令人惭愧，但这仍然比将次优的更改发布到生产环境中要好得多。\n\
  \n本书后续的许多示例将进一步深入探讨性能。这将使你能够应用迄今为止所学的知识，并学习多种测试其中一些结论的方法。期待看到更多关于执行计划、统计信息和查询比较的示例，这些将有助于你探索动态\
  \ SQL。\n\n### 清理\n\n清单 6-19 中的 `TSQL` 会清理本章中创建的任何对象（如果它们存在的话）。\n\n```\nIF EXISTS\
  \ (SELECT * FROM sys.procedures WHERE procedures.name = 'search_products')\nBEGIN\n\
  DROP PROCEDURE dbo.search_products;\nEND\nGO\nIF EXISTS (SELECT * FROM sys.indexes\
  \ WHERE indexes.name = 'IX_PurchaseOrderHeader_status_INC')\nBEGIN\nDROP INDEX IX_PurchaseOrderHeader_status_INC\
  \ ON Purchasing.PurchaseOrderHeader\nEND\nGO\nIF EXISTS (SELECT * FROM sys.procedures\
  \ WHERE procedures.name = 'get_in_process_purchasing_data')\nBEGIN\nDROP PROCEDURE\
  \ dbo.get_in_process_purchasing_data;\nEND\n```\n清单 6-19.\n用于清理本章所创建对象的脚本\n\n# 7.\
  \ 可扩展的动态列表\n\n生成数据列表是一项常见的任务，具有广泛的用例。也许你想以特定的格式或语法将数据输出到应用程序或文件。也许阅读数据列表的最佳格式是单行文本，而不是表格格式。也许你想在存储数据之前，使用需要快速构建的特定字符串格式将其存入表中。\n\
  \n虽然这不是 SQL Server 经常宣传的功能，但它可以通过性能相当好的方式来实现。另一方面，以难以置信的低效方式来构建列表生成也非常容易。本章将讨论生成列表的许多不同方法。除了语法，本章还回顾了性能和可维护性，以确保哪种方法最适合这项工作毫无疑问。\n\
  \n本章将频繁引用性能调优。有关读取执行计划、查看 IO 统计信息以及动态 SQL 和查询调优与优化方面的其他注意事项的详细信息，请参阅第 6 章。\n\n###\
  \ 什么是动态列表\n\n介绍这个主题最简单的方式是通过一个例子。假设你想要输出一个人员的 ID 列表，并以逗号分隔。一种常用的方法是通过使用一个 `CURSOR`（游标）来逐段构建这个字符串，如代码清单\
  \ 7-1 所示。\n\n```\nDECLARE @nextid INT;\nDECLARE @myIDs NVARCHAR(MAX) = '';\nDECLARE\
  \ idcursor CURSOR FOR\nSELECT TOP 100\nBusinessEntityID\nFROM Person.Person\nORDER\
  \ BY LastName;\nOPEN idcursor;\nFETCH NEXT FROM idcursor INTO @nextid;\nWHILE @@FETCH_STATUS\
  \ = 0\nBEGIN\nSET @myIDs = @myIDs + CAST(@nextid AS NVARCHAR) + ',';\nFETCH NEXT\
  \ FROM idcursor INTO @nextid;\nEND\nSET @myIDs = LEFT(@myIDs, LEN(@myIDs) - 1);\n\
  CLOSE idcursor;\nDEALLOCATE idcursor;\nSELECT @myIDs AS comma_separated_output;\n\
  ```\n\n#### 代码清单 7-1.\n使用游标方法构建逗号分隔的 ID 列表的示例\n\n在这段 T-SQL 中，声明了一个用于 100 个 ID 的\
  \ `CURSOR`，并逐个遍历循环，同时使用 ID 和逗号逐步构建字符串 `@myIDs`。最后的字符串修改使用了 `LEFT` 函数来移除循环遗留下来的末尾逗号。结果将是\
  \ 100 个以逗号分隔的 `BusinessEntityID`。文本输出将类似这样：\n\n```\n285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...\n\
  ```\n\n我们在这里将列表截断到 16 个 ID 之后，因为没有必要浪费空间展示全部...\n\n![A371168_1_En_7_Figa_HTML.jpg](img/A371168_1_En_7_Figa_HTML.jpg)\n\
  \n一般来说，在任何可以使用基于集合的方法的场景中编写 T-SQL 时，都应避免使用迭代。SQL Server 被设计为高效地处理数据集，当你尝试逐行提取数据时，通常会导致性能低下。这是涉及循环的\
  \ T-SQL 可能极其低效的一个例子。首先看一下图 7-1 所示的执行计划。\n\n![A371168_1_En_7_Fig1_HTML.jpg](img/A371168_1_En_7_Fig1_HTML.jpg)\n\
  \n#### 图 7-1.\n一个遍历循环的简单 SELECT 查询的执行计划\n\n执行计划在前两个查询后被截断，因为接下来的 99 个查询与第二个完全相同。很明显，为了确定\
  \ SQL Server 在生成此列表时付出的总体努力，你必须考虑 101 个执行计划。因此，除了读取游标本身（这不是一个免费的操作）之外，还需要从 `Person.Person`\
  \ 读取超过 100 次。在我的 SQL Server 上，总共花了 10 秒来运行。对于一个旨在读取 100 个 ID 的 T-SQL 应用程序来说，这相当慢！虽然大部分执行时间是由于生成了\
  \ 100 个额外的执行计划，但这说明任何看似简单的任务，只要执行次数足够多，累积起来也会变得非常痛苦。\n\n为了更深入地了解这里引入的低效性，让我们也查看一下\
  \ IO 统计信息：\n\n```\nTable 'Worktable'. Scan count 0, logical reads 201, physical\
  \ reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\nTable 'Person'. Scan count 1, logical reads 318, physical reads 0, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Table 'Worktable'. Scan count 0, logical reads 2, physical reads 0, read-ahead reads\
  \ 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'Person'.\
  \ Scan count 0, logical reads 3, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\n```\n\n第一组 IO 统计信息涵盖了初始的游标声明。第二组代表了\
  \ `WHILE` 循环的单次迭代，这将被重复另外 99 次。如果把所有涉及查询的逻辑读取总数相加，你会得到 1019 次读取，这对于一个仅打算返回 100 个整数值的操作来说是相当多的。\n\
  \n虽然这个例子的输出正是你想要的，但为了达到目的，它消耗了相对巨大的计算资源。想象一下，如果你想要一个包含一千或一百万个 ID 的列表会怎样？如果你要的不是\
  \ ID 列表，而是大型字符串列表呢？结果很容易导致数百万次读取，并且查询会使服务器陷入停顿！正确的输出是可取的，但如果性能不可扩展且难以维护，像这样的代码将来会随着软件变更以及你对数据规模或可接受性能指标的假设失效而重新困扰你。\n\
  \n\n### 使用 XML 创建动态列表\n\n很明显，除了最小的数据集外，使用任何形式的循环来生成字符串都是低效的。一种广泛使用的替代方法是从基础表中选择所需数据，并使用\
  \ XML 进行格式化。请看以下语法示例（如清单 7-2 所示），它生成了与上一个例子中的循环相同的列表。\n\n```\nDECLARE @myIDs NVARCHAR(MAX)\
  \ = '';\nSET @myIDs = STUFF((SELECT TOP 100 ',' + CAST(BusinessEntityID AS NVARCHAR)\n\
  FROM Person.Person\nORDER BY LastName\nFOR XML PATH(''), TYPE\n).value('.', 'NVARCHAR(MAX)'),\
  \ 1, 1, '');\nSELECT @myIDs;\nGO\n清单 7-2.\n使用 XML 生成 ID 列表\n```\n\n你首先应该注意到，这个语法更复杂，可读性也稍差。结果集与预期相同：\n\
  \n```\n285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...\n\
  ```\n\n要理解 XML 如何生成此列表，你可以分解查询，从最内层的 TSQL 开始，然后逐步构建：\n\n```\nSELECT TOP 100 ','\
  \ + CAST(BusinessEntityID AS NVARCHAR) AS ID_CSV\nFROM Person.Person\nORDER BY LastName;\n\
  ```\n\n这个 `SELECT` 语句返回一个 ID 列表，每个 ID 前都有一个逗号，如图 7-2 所示。\n\n![A371168_1_En_7_Fig2_HTML.jpg](img/A371168_1_En_7_Fig2_HTML.jpg)\n\
  *图 7-2.*\n将用于 XML 生成列表的 ID 列表\n\n这里没什么特别的。下一步将把所有数据行连接成 XML 格式，在 SQL Server 中这将显示为逗号分隔的列表：\n\
  \n```\nSELECT (SELECT TOP 100 ',' + CAST(BusinessEntityID AS NVARCHAR)\nFROM Person.Person\n\
  ORDER BY LastName\nFOR XML PATH(''));\n```\n\n这个 `SELECT` 的结果将显示一个接近成品的结果：\n\n```\n\
  285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...\n\
  ```\n\n在你能认为这个查询被完全剖析和正确之前，还有两件未完成的事情需要处理。首先是确保 XML 输出是正确的数据类型：\n\n```\nSELECT (SELECT\
  \ TOP 100 ',' + CAST(BusinessEntityID AS NVARCHAR)\nFROM Person.Person\nORDER BY\
  \ LastName\nFOR XML PATH(''), TYPE\n).value('.', 'NVARCHAR(MAX)');\n```\n\nXML `value`\
  \ 方法将 XML 结果转换为提供的数据类型，然后返回。如果这是一个非常长的列表，这种转换可以确保你不会在过程中遇到字符串截断的问题。如果区分很重要，它还可以让你在\
  \ `VARCHAR` 和 `NVARCHAR` 之间进行选择。本例使用 `NVARCHAR(MAX)` 作为返回的数据类型。由于数据类型转换对你正在查看的 SQL\
  \ Server 输出是不可见的，此查询的结果与上一步的输出相同。\n\n最后一步是移除左侧那个讨厌的逗号，这可以通过多种字符串处理技术来实现。上面使用 `STUFF`\
  \ 将逗号分隔的列表内容塞入位置 1 的字符中，而该位置正好是你想要移除的逗号。这种方法很方便，因为它可以在一个步骤中完成，如果你不需要，不必将结果存储在变量中。另一种方法是使用\
  \ `RIGHT` 或 `SUBSTRING` 来移除前导逗号：\n\n```\nDECLARE @myIDs NVARCHAR(MAX) = '';\nSET\
  \ @myIDs = (SELECT TOP 100 ',' + CAST(BusinessEntityID AS NVARCHAR)\nFROM Person.Person\n\
  ORDER BY LastName\nFOR XML PATH(''), TYPE\n).value('.', 'NVARCHAR(MAX)');\nSELECT\
  \ RIGHT(@myIDs, LEN(@myIDs) - 1);\nSELECT SUBSTRING(@myIDs, 2, LEN(@myIDs) - 1);\n\
  ```\n\n每个 `SELECT` 的结果都是相同的，并且与你期望的输出匹配：\n\n```\n285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...\n\
  ```\n\n现在你已经看到 XML 可用于生成逗号分隔的列表，你应该采取额外的步骤对其进行性能测试，并确定其效率水平。首先，检查查询的 IO 统计信息：\n\n\
  ```\nTable 'Person'. Scan count 1, logical reads 3, physical reads 0, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  ```\n\n这看起来很棒！读取次数相当于你直接运行 `Person.Person` 上的 `SELECT` 语句而不应用任何额外格式化时的预期值。使用 XML\
  \ 将读取次数从 1019 次减少到了 3 次，我认为这在任何一天都是一笔极好的交易！接下来，让我们看看执行计划的样子，如图 7-3 所示。\n\n![A371168_1_En_7_Fig3_HTML.jpg](img/A371168_1_En_7_Fig3_HTML.jpg)\n\
  *图 7-3.*\n使用 XML 生成列表的性能\n\n对于一个获取 ID 列表的查询来说，这有点复杂。XML 读取器在幕后执行的魔法并非免费，在这里变得很清楚，因为它消耗了查询\
  \ 97% 的资源。检查执行计划的子树成本，你会发现它大约是 1.09，这与之前 `WHILE` 循环方法的查询成本相似。换句话说，XML 的成本与之前循环中的\
  \ 100 次查询类似。虽然它大大减少了磁盘 IO，但如果你严重依赖 XML，则有可能消耗大量的 CPU。\n\n\n### 基于集合的字符串构建\n\n虽然\
  \ XML 解决方案更好，但它并不完美。其执行计划有些令人困惑，并说明了 XML 的 CPU 消耗可能很高。让我们考虑另一种选项，如清单 7-3 所示。\n\n\
  ```\nDECLARE @myIDs NVARCHAR(MAX) = '';\nSELECT TOP 100 @myIDs = @myIDs + CAST(BusinessEntityID\
  \ AS NVARCHAR) + ','\nFROM Person.Person\nORDER BY LastName;\nSET @myIDs = LEFT(@myIDs,\
  \ LEN(@myIDs) - 1);\nSELECT @myIDs;\n```\n清单 7-3.\n通过直接将字符串构建到变量中来生成 ID 列表\n\n这段\
  \ T-SQL 代码在美观上要好得多。它如此简单，可能会让你挠头并问：“它是如何工作的？” 当你执行它时，结果与之前的示例相同：\n\n```\n285,293,295,2170,38,211,2357,297,291,299,121,16867,16901,16724,10263,10312,...\n\
  ```\n\nSQL Server 允许你通过单个步骤将字符串数据直接 `SELECT` 到一个标量变量中。这种字符串构建让人想起动态 SQL，即使你并非为了生成它而执行命令字符串。该语句的一般结构如下：\n\
  \n声明一个字符串，通常是 `VARCHAR(MAX)` 或 `NVARCHAR(MAX)`。将字符串变量设置为等于空字符串（或任何你想要的起始字符）。`SELECT\
  \ @variable = @variable` 加上列和字符串数据的组合。从字符串末尾移除尾随逗号。根据需要处理逗号分隔的列表。\n\n首先，让我们看看 IO\
  \ 统计信息，以确定为了生成此列表读取了多少数据：\n\n```\n表 'Person'。扫描计数 1，逻辑读取 3，物理读取 0，预读 0，lob 逻辑读取\
  \ 0，lob 物理读取 0，lob 预读 0。\n```\n\n与 XML 解决方案一样，读取次数与单独执行 `SELECT` 查询所需的次数相同。三次读取来生成该列表是非常出色的。图\
  \ 7-4 显示了执行计划。\n\n![A371168_1_En_7_Fig4_HTML.jpg](img/A371168_1_En_7_Fig4_HTML.jpg)\n\
  图 7-4.\n使用基于字符串的 SELECT 生成列表的性能\n\n这个执行计划可以说是简单到极致：对目标表的一次扫描，以及一些用于组装字符串的低成本操作。此操作的子树成本为\
  \ 0.004，显著低于你目前为止看到的所有其他字符串构建技术。移除 XML 元素大大降低了 XML 阅读器为了将数据处理成所需输出格式所需的开销。此外，SQL\
  \ Server 可以在完全基于集合的操作中构建字符串，无需迭代、临时表或其他任何昂贵的介质。\n\n这种方法异常快速、高效，并且易于编码和维护。没有循环或 XML，使得生成的\
  \ T-SQL 代码足够简单，初学者也可以尝试和理解。只需要最少的文档就可以解释其作用以及为何选择此方法。\n\n动态构建的列表不限于单个列或标量字符串值。你可以自由地根据需要构建尽可能多的数据元素，无论是列数据、标量变量、字符串字面量还是从其他数据类型转换而来的字符串。清单\
  \ 7-4 展示了如何生成包含多个变量的列表。\n\n```\nDECLARE @myData NVARCHAR(MAX) = '';\nSELECT @myData\
  \ =\n@myData + 'ContactTypeID: ' + CAST(ContactTypeID AS NVARCHAR) + ',Name: ' +\
  \ Name + ','\nFROM person.ContactType\nSET @myData = LEFT(@myData, LEN(@myData)\
  \ - 1);\nSELECT @myData;\n```\n清单 7-4.\n使用多列和字符串字面量构建列表\n\n此示例与上一个类似，但包含了 `Name`\
  \ 列以及值之前的列名。此 T-SQL 的语法与前面的示例几乎相同，唯一的区别在于 `SELECT` 语句中连接的列和字面量。`@myData` 的值最终为：\n\
  \n```\nContactTypeID: 1,Name: Accounting Manager,ContactTypeID: 2,Name: Assistant\
  \ Sales Agent,ContactTypeID: 3,Name: Assistant Sales Representative,ContactTypeID:\
  \ 4,Name: Coordinator Foreign Markets,ContactTypeID: 5,Name: Export Administrator,...\n\
  ```\n\n如果你希望为数据添加标题、额外的列、标签或任何其他有用的信息嵌入到字符串中，将其放入其中相对简单。你可以包含在字符串中的内容没有限制，尽管值得检查输出的长度，以确保接收数据的任何应用程序、报表或文件能够处理预期的最大尺寸。\n\
  \n你可以做的最后一个简化是通过巧妙使用 `ISNULL` 来消除在末尾移除尾随逗号的需要。清单 7-5 展示了这个简短的示例。\n\n```\nDECLARE\
  \ @myData NVARCHAR(MAX);\nSELECT @myData =\nISNULL(@myData + ',','') + 'ContactTypeID:\
  \ ' + CAST(ContactTypeID AS NVARCHAR) + ',Name: ' + Name\nFROM person.ContactType;\n\
  SELECT @myData;\n```\n清单 7-5.\n使用 `ISNULL` 在 `SELECT` 语句中消除前导逗号\n\n`ISNULL` 可以通过检查\
  \ `@myData` 的值是否为 `NULL` 来实现这一点：\n\n不要为 `@myData` 分配初始的空字符串值。如果 `@myData` 是 `NULL`（这只发生在第一个值时），则插入一个空字符串。如果\
  \ `@myData` 不是 `NULL`，则插入一个逗号。\n\n这种逻辑将隐式消除本会引入的前导逗号，从而将 SQL 语句的数量减少一条。此查询的结果与上一个示例相同。T-SQL\
  \ 的性能也相同。也可以使用 `COALESCE` 代替 `ISNULL`，效果相同：\n\n```\nDECLARE @myData NVARCHAR(MAX);\n\
  SELECT @myData =\nCOALESCE(@myData + ',','') + 'ContactTypeID: ' + CAST(ContactTypeID\
  \ AS NVARCHAR) + ',Name: ' + Name\nFROM person.ContactType;\nSELECT @myData;\n```\n\
  \n使用 `ISNULL`、`LEFT` 还是 `COALESCE` 语句是个人偏好问题，但可以说，这些选项明显优于循环或 XML，后两者都会带来额外的复杂性和性能问题。\n\
  \n\n### 重新审视安全性\n\n虽然这里介绍的各种字符串构建方法并非传统意义上的动态 SQL，但它们与构建用于动态 SQL 的命令字符串具有许多相同的优点和缺点。前面章节中列出的冗长安全顾虑清单在这里依然和以前一样重要。\n\
  \n任何时候，当你使用至少一个来自外部源的参数来构建字符串时，SQL 注入的威胁就变得与执行开放式网络搜索时一样真实。清单 7-6 中的示例说明了如何使用一个接受外部源参数的存储过程来构建字符串。\n\
  \n```sql\nCREATE PROCEDURE dbo.return_person_data\n@last_name NVARCHAR(MAX) = NULL,\
  \ @first_name NVARCHAR(MAX) = NULL\nAS\nBEGIN\nSET NOCOUNT ON;\nDECLARE @return_data\
  \ NVARCHAR(MAX) = '';\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list\
  \ NVARCHAR(MAX);\nSELECT @parameter_list = '@output_data NVARCHAR(MAX) OUTPUT';\n\
  SELECT @sql_command = '\nSELECT\n@output_data = @output_data + ''ID: '' + CAST(BusinessEntityID\
  \ AS NVARCHAR) + '', Name: '' + FirstName + '' '' + LastName + '',''\nFROM Person.Person\n\
  WHERE 1 = 1'\nIF @last_name IS NOT NULL\nSELECT @sql_command = @sql_command + '\n\
  AND LastName LIKE ''%' + @last_name + '%''';\nIF @first_name IS NOT NULL\nSELECT\
  \ @sql_command = @sql_command + '\nAND FirstName LIKE ''%' + @first_name + '%''';\n\
  PRINT @sql_command;\nEXEC sp_executesql @sql_command, @parameter_list, @return_data\
  \ OUTPUT;\nSELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);\nSELECT\
  \ @return_data;\nEND\n```\n\n清单 7-6。使用动态 SQL 构建列表时的 SQL 注入提醒\n\n这个存储过程结合了动态 SQL\
  \ 和列表构建，以生成一个以逗号分隔的 ID 和姓名列表。它还成功地制造了几个明显的安全风险。让我们考虑一下这个过程的一些执行情况：\n\n```sql\nEXEC\
  \ dbo.return_person_data @first_name = 'Edward';\n```\n\n这次执行的结果如你所料：\n\n```\nID:\
  \ 3731, Name: Edward Adams,ID: 13658, Name: Edward Alexander,ID: 4241, Name: Edward\
  \ Anderson,ID: 3732, Name: Edward Baker,ID: 13631, Name: Edward Barnes,ID: 4229,\
  \ Name: Edward Brown,ID: 13657, Name: Edward Bryant...\n```\n\n列表在第七个值后被截断，因为没有必要列出`AdventureWorks`中所有名为“Edward”的人的详尽列表。生成的字符串包含一个\
  \ ID 和一个姓名，这是每个人的名字、姓氏以及中间插入的一个空格的组合。字段之间用逗号分隔，最后的`LEFT`语句移除了末尾的逗号。\n\n当用户传入一个空值时会发生什么？\n\
  \n```sql\nEXEC dbo.return_person_data @first_name = '';\n```\n\n在这种情况下，我的服务器运行了\
  \ 2 分 58 秒才返回结果。`Person.Person`表中有 19,972 行，事实证明，渲染所有这些 ID 和姓名需要相当长的时间。虽然你通常习惯于内存比磁盘快得多，但它并不是无限快的。SQL\
  \ Server 需要在查询完成时将数据临时缓存到磁盘。结果是以下 IO 统计数据：\n\n```\nTable 'Person'. Scan count 1,\
  \ logical reads 109, physical reads 0, read-ahead reads 0, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan count 0,\
  \ logical reads 758369, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 244941773, lob physical reads 0, lob read-ahead reads 3909272.\n```\n\n244,941,773\
  \ 次读取是从哪里来的？这个令人难以置信的数字来自于返回的数据量与空搜索字符串相结合。SQL Server 无法在内存中动态管理此操作，被迫使用 TempDB，而后者速度要慢得多。对`Person.Person`的读取并不显著，但对`Worktable`的读取却非常、非常惊人！\n\
  \n这是对质量保证部门的一个重要提醒：在任何应用程序中，测试都至关重要。如果一个搜索理论上可以返回数万行数据，请务必实现某种分页方法或限制数据集，以防止懒惰或粗心的用户用空搜索拖垮你的服务器。\n\
  \n让我们回到那个让你在之前的章节中夜不能寐的恶意示例：\n\n```sql\nEXEC dbo.return_person_data @first_name\
  \ = 'whatever''; SELECT * FROM Person.Password; SELECT ''';\n```\n\n在这里，你故意用任意文本（`whatever`）关闭了搜索字符串，并使用`SELECT\
  \ * FROM Person.Password`开始了一个新的 SQL 语句。这种情况和之前一样危险，因为预期的查询返回了一个空的人集，而`Person.Password`表却被返回了。对于这个参数值，生成的命令字符串不幸如所示：\n\
  \n```sql\nSELECT\n@output_data = @output_data + 'ID: ' + CAST(BusinessEntityID AS\
  \ NVARCHAR) + ', Name: ' + FirstName + ' ' + LastName + ','\nFROM Person.Person\n\
  WHERE 1 = 1\nAND FirstName LIKE '%whatever'; SELECT * FROM Person.Password; SELECT\
  \ '%'\n```\n\n这个 TSQL 除了已经混乱的结果集之外，还抛出了一个错误：\n\n```\nMsg 537, Level 16, State 3,\
  \ Procedure return_person_data, Line 204\nInvalid length parameter passed to the\
  \ LEFT or SUBSTRING function.\n```\n\n因为`@output_data`是`NULL`，其长度也是`NULL`，这不是`LEFT`函数的有效输入。尽管如此，在错误消息生成之前，密码列表已经被返回了。根据应用程序和错误处理设置，输入此\
  \ TSQL 的黑客可能已经获得了他们想要的数据。\n\n每当输入来自外部源时，请务必对你的`sp_executesql`语句进行参数化，以确保没有危险的 TSQL\
  \ 可以插入到你的命令字符串中。如清单 7-7 所示。\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE\
  \ procedures.name = 'return_person_data')\nBEGIN\nDROP PROCEDURE dbo.return_person_data;\n\
  END\nGO\nCREATE PROCEDURE dbo.return_person_data\n@last_name NVARCHAR(MAX) = NULL,\
  \ @first_name NVARCHAR(MAX) = NULL\nAS\nBEGIN\nSET NOCOUNT ON;\nSELECT @last_name\
  \ = '%' + @last_name + '%';\nSELECT @first_name = '%' + @first_name + '%';\nDECLARE\
  \ @return_data NVARCHAR(MAX) = '';\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE\
  \ @parameter_list NVARCHAR(MAX);\nSELECT @parameter_list = '@output_data NVARCHAR(MAX)\
  \ OUTPUT, @first_name NVARCHAR(MAX), @last_name NVARCHAR(MAX)';\nSELECT @sql_command\
  \ = '\nSELECT\n@output_data = @output_data + ''ID: '' + CAST(BusinessEntityID AS\
  \ NVARCHAR) + '', Name: '' + FirstName + '' '' + LastName + '',''\nFROM Person.Person\n\
  WHERE 1 = 1'\nIF @last_name IS NOT NULL\nSELECT @sql_command = @sql_command + '\n\
  AND LastName LIKE @last_name';\nIF @first_name IS NOT NULL\nSELECT @sql_command\
  \ = @sql_command + '\nAND FirstName LIKE @first_name';\nPRINT @sql_command;\nEXEC\
  \ sp_executesql @sql_command, @parameter_list, @return_data OUTPUT, @first_name,\
  \ @last_name;\nSELECT @return_data = LEFT(@return_data, LEN(@return_data) - 1);\n\
  SELECT @return_data;\nEND\n```\n\n清单 7-7。使用参数作为输入的动态 SQL 列表生成\n\n这个更新后的存储过程包含了`@first_name`和`@last_name`的参数。当你再次执行这些示例时，会发生什么？\n\
  \n```sql\nEXEC dbo.return_person_data @first_name = 'Edward';\n```\n\n这次执行的结果与之前相同。所有名字为“Edward”的人的数据都按预期返回。\n\
  \n```sql\nEXEC dbo.return_person_data @first_name = '';\n```\n\n空搜索仍然需要三分钟才能运行，但至少它是安全地运行的！\n\
  \n```sql\nEXEC dbo.return_person_data @first_name = 'Edward''; SELECT * FROM Person.Password;\
  \ SELECT ''';\n```\n\n\n# 7. 动态列表构建\n\n尝试使用 SQL 注入来检索密码的操作仍然会导致错误，因为零值被作为输入长度传递给了\
  \ `LEFT` 函数。幸运的是，参数化移除了最终用户向任何参数注入他们自己的 TSQL 的能力，因此他们无法像之前那样访问 `Person.Password`。\n\
  \n重要的是要勤勉并修复此示例中潜伏的错误。让 SQL 服务器在一个大型查询上运行几分钟可能与错误消息或 SQL 注入尝试一样对服务器具有破坏性。让我们修补清单\
  \ 7-8 中的漏洞，并希望 QA 不会再发现更多问题。\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures\
  \ WHERE procedures.name = 'return_person_data')\nBEGIN\nDROP PROCEDURE dbo.return_person_data;\n\
  END\nGO\nCREATE PROCEDURE dbo.return_person_data\n@last_name NVARCHAR(MAX) = NULL,\
  \ @first_name NVARCHAR(MAX) = NULL\nAS\nBEGIN\nSET NOCOUNT ON;\nSELECT @last_name\
  \ = '%' + @last_name + '%';\nSELECT @first_name = '%' + @first_name + '%';\nDECLARE\
  \ @return_data NVARCHAR(MAX) = '';\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE\
  \ @parameter_list NVARCHAR(MAX);\nSELECT @parameter_list = '@output_data NVARCHAR(MAX)\
  \ OUTPUT, @first_name NVARCHAR(MAX), @last_name NVARCHAR(MAX)';\nSELECT @sql_command\
  \ = '\nSELECT TOP 25\n@output_data = @output_data + ''ID: '' + CAST(BusinessEntityID\
  \ AS NVARCHAR) + '', Name: '' + FirstName + '' '' + LastName + '',''\nFROM Person.Person\n\
  WHERE 1 = 1'\nIF @last_name IS NOT NULL\nSELECT @sql_command = @sql_command + '\n\
  AND LastName LIKE @last_name';\nIF @first_name IS NOT NULL\nSELECT @sql_command\
  \ = @sql_command + '\nAND FirstName LIKE @first_name';\nPRINT @sql_command;\nEXEC\
  \ sp_executesql @sql_command, @parameter_list, @return_data OUTPUT, @first_name,\
  \ @last_name;\nIF LEN(@return_data) > 0 AND @return_data IS NOT NULL\nSELECT @return_data\
  \ = LEFT(@return_data, LEN(@return_data) - 1);\nSELECT @return_data;\nEND\n```\n\
  \n清单 7-8.\n列表生成存储过程，用于修复长时间等待和错误消息\n\n这个存储过程的变体在列表构建的 `SELECT` 语句中引入了 `TOP 25`。这将结果集限制为\
  \ 25 个人，防止了一个可能消耗巨大服务器资源的失控查询。此外，在存储过程末尾附近的 `LEFT` 函数上放置了一个检查，以检查 `@return_data`\
  \ 的长度是否为 `NULL` 或 0。这确保了如果没有结果集，在尝试操作它时不会抛出错误。\n\n你在这里逐步经历的步骤是一个重要的提醒：安全是一个始终存在的关切点，而可能使服务器陷入困境的情况可能并不总是显而易见的。质量保证极其重要！确保你编写的任何软件都经过了所有可能值的彻底测试，无论它们是正常的用例还是古怪的边界情况。空搜索、空结果集和\
  \ SQL 注入尝试都是很容易处理的情况，但你必须识别这些威胁才能有效地应对它们。\n\n### 结论\n\n这里介绍的动态列表构建与本书迄今为止讨论的动态 SQL\
  \ 不是同一种类型。虽然它通常更简单并且不需要单独执行来获取结果集，但它与之前构建的命令字符串之间存在许多共同点。\n\n在任何你接受用户输入来构建字符串的场景中，都可以立即在你之前处理的\
  \ SQL 注入威胁与当你想要列出姓名或 ID 号时可以类似识别的威胁之间找到相似之处。\n\n除了 SQL 注入，动态列表在语法、字符串操作、格式、安全性以及将它们与额外的动态\
  \ SQL 结合以创建更大灵活性的能力方面具有相似性。随着复杂性的增加，对仔细测试的需求也随之增加，既要测试意外输入，也要测试 SQL 注入尝试。虽然动态生成的列表可能并不总是带有与外部用户输入相关的威胁，但始终如一地关注参数化和质量保证方面的最佳实践，可以确保你的\
  \ TSQL 是最高质量和最安全的。\n\n# 8. 参数嗅探\n\n第 6 章介绍了一些用于性能优化的工具、方法和技巧。一个被简要讨论的关键组件是查询计划缓存。每当首次执行查询时，查询优化器会生成一个执行计划。这个过程开销很大，因此尽量减少由其执行的工作是有益的。执行计划在优化完成后被放入查询计划缓存中，它们将一直保留，直到执行、可用内存或底层数据发生足够变化将该计划推出缓存。\n\
  \n保存执行计划的这个过程对于优化 SQL Server 性能至关重要。每当执行与缓存中查询匹配的查询时，将使用现有计划。这使得 SQL Server 可以绕过优化器并直接跳转到执行，从而节省时间和资源！如果没有这个功能，你将被迫为繁忙的服务器添加大量资源，以满足持续优化每个执行的查询所需的资源。\n\
  \n### 什么是参数嗅探？\n\n执行计划根据查询生成时分配给它的查询哈希值放入缓存中。此哈希值基于查询的确切文本，如果查询的任何部分不同，哈希值也会不同。因此，参数化查询将允许你一遍又一遍地重用相同的计划，而不管参数的值如何。执行计划将根据查询首次执行期间传递的参数值创建。随后的每次执行都将重用相同的计划，而不管值如何。\n\
  \n这就引出了一个准确性问题：在查询第一次执行期间选择的计划是否是所有未来可能值的最佳计划？如果传递给存储过程的参数相对一致，则最初创建的计划对于所有未来执行来说很可能足够好。在这种情况下，查询计划缓存工作得非常完美，因此没有理由考虑性能问题。但是，如果参数值是零散的并导致各种可能的结果呢？假以时日，将会生成一个对其他参数值来说并非最佳的执行计划。\n\
  \n针对不同参数的执行计划重用就是参数嗅探的定义，它是 SQL Server 使用查询计划缓存的一个无意副作用。次优计划重用是这种行为可能导致性能问题的一种潜在方式。在开始之前，让我们介绍一个存储过程，该过程将根据查询文本的字符串搜索从查询计划缓存中读取一些数据。这将为你以后研究计划缓存的内容及其与以下示例查询性能的关系节省时间。清单\
  \ 8-1 显示了本章中使用的存储过程。\n\n\n### 清单 8-1.\n#### 用于从查询计划缓存中读取优化和执行数据的存储过程\n\n```sql\n\
  IF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'read_query_plan_cache')\n\
  BEGIN\nDROP PROCEDURE dbo.read_query_plan_cache;\nEND\nGO\nCREATE PROCEDURE dbo.read_query_plan_cache\n\
  @text_string NVARCHAR(MAX) = NULL\nAS\nBEGIN\nSELECT @text_string = '%' + @text_string\
  \ + '%';\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX)\
  \ = '@text_string NVARCHAR(MAX)';\nIF @text_string IS NULL\nSELECT @sql_command\
  \ = '\nSELECT TOP 25\nDB_NAME(execution_plan.dbid) AS database_name,\ncached_plans.objtype\
  \ AS ObjectType,\nOBJECT_NAME(sql_text.objectid, sql_text.dbid) AS ObjectName,\n\
  query_stats.creation_time,\nquery_stats.last_execution_time,\nquery_stats.last_worker_time\
  \ AS cpu_last_execution,\nquery_stats.last_logical_reads AS reads_last_execution,\n\
  query_stats.last_elapsed_time AS duration_last_execution,\nquery_stats.last_rows\
  \ AS rows_last_execution,\ncached_plans.size_in_bytes,\ncached_plans.usecounts AS\
  \ ExecutionCount,\nsql_text.TEXT AS QueryText,\nexecution_plan.query_plan,\ncached_plans.plan_handle\n\
  FROM sys.dm_exec_cached_plans cached_plans\nINNER JOIN sys.dm_exec_query_stats query_stats\n\
  ON cached_plans.plan_handle = query_stats.plan_handle\nCROSS APPLY sys.dm_exec_sql_text(cached_plans.plan_handle)\
  \ AS sql_text\nCROSS APPLY sys.dm_exec_query_plan(cached_plans.plan_handle) AS execution_plan';\n\
  ELSE\nSELECT @sql_command = '\nSELECT TOP 25\nDB_NAME(execution_plan.dbid) AS database_name,\n\
  cached_plans.objtype AS ObjectType,\nOBJECT_NAME(sql_text.objectid, sql_text.dbid)\
  \ AS ObjectName,\nquery_stats.creation_time,\nquery_stats.last_execution_time,\n\
  query_stats.last_worker_time AS cpu_last_execution,\nquery_stats.last_logical_reads\
  \ AS reads_last_execution,\nquery_stats.last_elapsed_time AS duration_last_execution,\n\
  query_stats.last_rows AS rows_last_execution,\ncached_plans.size_in_bytes,\ncached_plans.usecounts\
  \ AS ExecutionCount,\nsql_text.TEXT AS QueryText,\nexecution_plan.query_plan,\n\
  cached_plans.plan_handle\nFROM sys.dm_exec_cached_plans cached_plans\nINNER JOIN\
  \ sys.dm_exec_query_stats query_stats\nON cached_plans.plan_handle = query_stats.plan_handle\n\
  CROSS APPLY sys.dm_exec_sql_text(cached_plans.plan_handle) AS sql_text\nCROSS APPLY\
  \ sys.dm_exec_query_plan(cached_plans.plan_handle) AS execution_plan\nWHERE sql_text.TEXT\
  \ LIKE @text_string';\nEXEC sp_executesql @sql_command, @parameter_list, @text_string\n\
  END\nGO\n```\n\n这个存储过程将极大地简化你的研究，因为你可以向它传递任何查询文本，它会返回关于缓存中的查询、其执行计划以及上次执行的性能指标的各种数据。你将在测试时使用它来收集查询信息，但它可以在任何你想在查询缓存中搜索特定信息的情况下被重用。`SELECT`语句中使用`TOP\
  \ 25`是为了限制结果集。在繁忙的服务器上，否则可能返回非常大量的数据，这可能会对服务器或客户端性能产生不利影响。\n\n### 参数嗅探示例\n\n为了确保你获得干净的测试结果，你应该清除查询计划缓存。如本书前面所建议的，不要在生产环境或任何期望性能一致的地方运行此操作。清除查询计划缓存是通过强制查询在每次执行时创建新计划来调试查询的好方法，但由于优化器执行其工作需要大量资源，你应该只在隔离环境中这样做：\n\
  \n```sql\nDBCC FREEPROCCACHE;\n```\n\n你也可以向此`DBCC`命令提供一个特定的计划句柄作为参数。这将允许你仅清除缓存中的单个选定计划，而不是全部。为简单起见，我们在这里将清除整个缓存，但清除单个查询的语法如下所示：\n\
  \n```sql\nDBCC FREEPROCCACHE (0x06000700E8C6530730F36E6B0300000001000000000000000000000000000000000000000000000000000000);\n\
  ```\n\n计划句柄包含在查询计划缓存搜索查询中，以防需要用于进一步研究。现在，为了说明参数嗅探，你需要创建一个简单的存储过程，该过程基于`ProductModelID`搜索`Production.Product`，如清单\
  \ 8-2 所示。\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name\
  \ = 'get_products_by_model')\nBEGIN\nDROP PROCEDURE dbo.get_products_by_model;\n\
  END\nGO\nCREATE PROCEDURE dbo.get_products_by_model (@firstProductModelID INT, @lastProductModelID\
  \ INT)\nAS\nBEGIN\nSELECT\nPRODUCT.Name,\nPRODUCT.ProductID,\nPRODUCT.ProductModelID,\n\
  PRODUCT.ProductNumber,\nMODEL.Name\nFROM Production.Product PRODUCT\nINNER JOIN\
  \ Production.ProductModel MODEL\nON MODEL.ProductModelID = PRODUCT.ProductModelID\n\
  WHERE PRODUCT.ProductModelID BETWEEN @firstProductModelID AND @lastProductModelID;\n\
  END\n```\n\n#### 清单 8-2.\n##### 用于测试参数嗅探的示例存储过程\n\n请注意，有两个参数被传递到存储过程中：`@firstProductModelID`和`@lastProductModelID`。如果你为一小部分产品\
  \ ID 执行此操作，如下所示：\n\n```sql\nEXEC get_products_by_model 120, 12\n```\n\n它返回六行数据，如图\
  \ 8-1 所示。\n\n![A371168_1_En_8_Fig1_HTML.jpg](img/A371168_1_En_8_Fig1_HTML.jpg)\n\
  \n##### 图 8-1.\n###### 限制性产品搜索的结果集，仅返回六行\n\n此执行的性能指标如下：\n\n![A371168_1_En_8_Fig2_HTML.jpg](img/A371168_1_En_8_Fig2_HTML.jpg)\n\
  \n##### 图 8-2.\n###### 返回少量数据的产品搜索的性能\n\n```text\nTable 'ProductModel'. Scan count\
  \ 0, logical reads 12, physical reads 0, read-ahead reads 0, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\nTable 'Product'. Scan count 1,\
  \ logical reads 15, physical reads 0, read-ahead reads 0, lob logical reads 0, lob\
  \ physical reads 0, lob read-ahead reads 0.\n```\n\n此执行总共有 27 次逻辑读取，SQL Server 使用扫描和查找从`Product`和`ProductModel`中获取必要的数据以返回结果。为了确认你在这里看到的内容并添加一些额外的指标，你可以使用之前的查询计划缓存存储过程来了解更多关于此执行的信息：\n\
  \n```sql\nEXEC dbo.read_query_plan_cache 'get_products_by_model';\n```\n\n这将返回关于此存储过程单次执行的各种有用信息，如图\
  \ 8-3 所示。\n\n![A371168_1_En_8_Fig3_HTML.jpg](img/A371168_1_En_8_Fig3_HTML.jpg)\n\
  \n##### 图 8-3.\n###### dbo.read_query_plan_cache 针对限制性搜索查询返回的指标\n\n为了便于阅读图 8-3，我将查询结果的图像包装成了多行，而不是试图将其挤在单个查询结果行中。从这些结果中可以得出以下信息：\n\
  \n*   CPU: 936 微秒\n*   读取次数: 29\n*   持续时间: 26 毫秒 (26,329 微秒)\n*   返回行数: 6\n\n\n\n\
  ### 参数嗅探示例\n\n查询文本和执行计划在需要时也可在此处获取。现在，让我们清除计划缓存并执行相同的存储过程，但针对不同的 ID 范围：\n\n```\n\
  DBCC FREEPROCCACHE;\nEXEC get_products_by_model 0, 10000;\n```\n\n此次执行返回了 295 条结果，而不是\
  \ 6 条，如图 8-4 所示。\n\n![A371168_1_En_8_Fig4_HTML.jpg](img/A371168_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4. 限制性较小的搜索返回 295 行的产品结果\n\n性能差异并不显著，但选择了不同的执行计划，如图 8-5 所示。\n\n![A371168_1_En_8_Fig5_HTML.jpg](img/A371168_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5. 执行限制性较小的搜索查询时的性能\n\n```\nTable 'Workfile'. Scan count 0, logical reads\
  \ 0, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
  \ 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan count 0, logical reads 0,\
  \ physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
  \ 0, lob read-ahead reads 0.\nTable 'Product'. Scan count 1, logical reads 15, physical\
  \ reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\nTable 'ProductModel'. Scan count 1, logical reads 2, physical reads\
  \ 1, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\n```\n\n由于你从表中选择了如此大量的行，查询优化器认为对 `ProductModel` 进行索引扫描会更高效。这通常是一个好的决策，因为当返回的行数接近表的很大一部分时，通过索引进行查找的成本会变得很高。确切的转折点通常取决于数据大小，但这是一个极好的例子，说明在某些情况下索引扫描比索引查找具有更优的性能。\n\
  \n在读取计划缓存之前，再运行五次 `get_products_by_model`，这将向缓存中添加一些有用的数据以供审查：\n\n```\nEXEC get_products_by_model\
  \ 0, 10000;\nEXEC get_products_by_model 0, 10000;\nEXEC get_products_by_model 0,\
  \ 10000;\nEXEC get_products_by_model 0, 10000;\nEXEC get_products_by_model 0, 10000;\n\
  ```\n\n像之前一样，你可以运行存储过程从计划缓存中读取这次新的搜索过程执行的信息。得到的指标可以在图 8-6 中找到。\n\n![A371168_1_En_8_Fig6_HTML.jpg](img/A371168_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6. `dbo.read_query_plan_cache` 为限制性较小的搜索查询返回的指标\n\n```\nEXEC dbo.read_query_plan_cache\
  \ 'get_products_by_model';\n```\n\n结果与你之前看到的一致：\n\n*   CPU: 1858 微秒\n*   读取次数: 19\n\
  *   持续时间: 80ms (80,324 微秒)\n*   返回行数: 295\n\n请注意，这里的执行计数是 6。通过多次运行查询，我们可以在需要时说明计划重用。一旦找到一个计划，它将被保留并重用，直到最终从计划缓存中释放。尽管执行计数增加，但每次执行的结果几乎相同。\n\
  \n到目前为止，没有意外情况发生。每次执行都返回了预期的数据，优化器在选择正确计划以最小化资源利用方面做得非常出色。让我们最后一次清除缓存，然后连续运行两次搜索过程，第一次针对一小段产品型号范围，第二次针对大范围：\n\
  \n```\nDBCC FREEPROCCACHE;\nEXEC get_products_by_model 120, 125;\nEXEC get_products_by_model\
  \ 0, 10000;\n```\n\n当你运行这段 T-SQL 时，第一次执行与之前完全一样。选择了一个在 `Product` 上进行索引扫描、在 `ProductModel`\
  \ 上进行索引查找的计划。产生的执行计划和 IO 统计信息也完全相同。当你运行存储过程的第二次执行时，发生了一些不寻常的事情：性能非常差！第二次产品搜索的性能指标如图\
  \ 8-7 所示，这是针对传入了大范围 ID 的场景：\n\n![A371168_1_En_8_Fig7_HTML.jpg](img/A371168_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7. 重用次优计划时的搜索性能\n\n```\nTable 'ProductModel'. Scan count 0, logical reads\
  \ 590, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
  \ 0, lob read-ahead reads 0.\nTable 'Product'. Scan count 1, logical reads 15, physical\
  \ reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\n```\n\n这一次，读取次数远高于你对该存储过程的预期。选择的执行计划是从之前用于窄范围 ID（在 `ProductModel` 上进行索引查找）的计划中重用的，而不是针对大结果集最优的计划（在\
  \ `ProductModel` 上进行索引扫描）。读取计划缓存有助于理解发生了什么：\n\n```\nEXEC dbo.read_query_plan_cache\
  \ 'get_products_by_model';\n```\n\n图 8-8 中的结果显示，为窄范围 ID 创建的执行计划被重用于第二次运行，尽管提供的参数导致了非常不同的基数。\n\
  \n![A371168_1_En_8_Fig8_HTML.jpg](img/A371168_1_En_8_Fig8_HTML.jpg)\n\n图 8-8. `dbo.read_query_plan_cache`\
  \ 返回的指标说明了参数嗅探\n\n请注意 `ExecutionCount` 为 2。这证明初始的执行计划被重用于搜索过程的第二次执行。返回的其余指标证实了之前观察到的不良性能：\n\
  \n*   CPU: 2474 微秒\n*   读取次数: 607\n*   持续时间: 90ms (90,353 微秒)\n*   返回行数: 295\n\n\
  这是参数嗅探直接损害查询执行性能的一个例子。选择了次优的执行计划，导致读取次数、CPU 利用率和查询运行时间显著增加。\n\n在讨论解决参数嗅引导致的性能问题的方法之前，让我们看一个额外的例子，展示在使用动态\
  \ SQL 时参数嗅探可能如何产生干扰。这些例子将使用销售订单，并利用一个新的销售员来说明不良基数估计对执行计划的影响：\n\n```\nINSERT INTO\
  \ Sales.SalesPerson\n(BusinessEntityID, TerritoryID, SalesQuota, Bonus, CommissionPct,\
  \ SalesYTD, SalesLastYear, rowguid, ModifiedDate)\nVALUES\n(1, 1, 1000000, 289,\
  \ 0.17, 0, 0, NEWID(), CURRENT_TIMESTAMP);\nUPDATE Sales.SalesOrderHeader\nSET SalesPersonID\
  \ = 1\nWHERE SalesPersonID IS NULL;\nUPDATE STATISTICS Sales.SalesOrderHeader;\n\
  GO\n```\n\n这些语句将创建一个新的销售员并将她分配给所有当前没有分配负责人的销售订单。此外，它会更新表上的统计信息，以确保优化器在做出优化决策时能感知到新数据。这将为你提供一个拥有\
  \ 27,659 个已分配销售订单的销售员。现在，让我们引入一个新的存储过程，它将根据作为参数提供的 `SalesPersonID` 来搜索销售订单。此外，如果希望对结果进行分页，可以提供返回的行数和偏移量，如清单\
  \ 8-3 所示。\n\n\n\n```\nIF EXISTS (SELECT * FROM `sys.procedures` WHERE `procedures.name`\
  \ = 'get_sales_orders_by_sales_person')\nBEGIN\n    DROP PROCEDURE `dbo.get_sales_orders_by_sales_person`;\n\
  END\nGO\nCREATE PROCEDURE `dbo.get_sales_orders_by_sales_person`\n    `@SalesPersonID`\
  \ INT, `@RowCount` INT, `@Offset` INT\nAS\nBEGIN\n    DECLARE `@sql_command` NVARCHAR(MAX);\n\
  \    DECLARE `@parameter_list` NVARCHAR(MAX) = '@SalesPersonID INT, @RowCount INT,\
  \ @Offset INT';\n    -- 将偏移量加 1 以获得正确的起始行\n    SELECT `@Offset` = `@Offset` + 1;\n\
  \    SELECT `@sql_command` = '\n        WITH CTE_PRODUCTS AS (\n            SELECT\n\
  \                ROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,\n       \
  \         SalesOrderHeader.SalesOrderID,\n                SalesOrderHeader.Status,\n\
  \                SalesOrderHeader.OrderDate,\n                SalesOrderHeader.ShipDate,\n\
  \                SalesOrderDetail.UnitPrice,\n                SalesOrderDetail.LineTotal\n\
  \            FROM Sales.SalesOrderHeader\n            INNER JOIN Sales.SalesOrderDetail\n\
  \                ON SalesOrderHeader.SalesOrderID = SalesOrderDetail.SalesOrderID\n\
  \            WHERE SalesOrderHeader.SalesPersonID = @SalesPersonID\n        )\n\
  \        SELECT\n            *\n        FROM CTE_PRODUCTS\n        WHERE rownum\
  \ BETWEEN @Offset AND @Offset + @RowCount;';\n    EXEC `sp_executesql` `@sql_command`,\
  \ `@parameter_list`, `@SalesPersonID`, `@RowCount`, `@Offset`;\nEND\n```\n**代码清单\
  \ 8-3.** 演示参数嗅探的搜索存储过程\n\n这个存储过程是完全参数化的，允许你在执行时更改输入，而无需调整动态 SQL。让我们首先查看涉及新销售人员的搜索性能：\n\
  \n```\n`DBCC FREEPROCCACHE`;\n`EXEC dbo.get_sales_orders_by_sales_person 1, 1000,\
  \ 0`;\n```\n\n首先清除查询计划缓存，以确保结果不受此服务器上执行的任何其他查询的影响。设置附加参数以从结果集（包含 27,659 行）返回 1,000\
  \ 行，从第 1 行开始。此执行的性能指标见图 8-9。\n\n![A371168_1_En_8_Fig9_HTML.jpg](img/A371168_1_En_8_Fig9_HTML.jpg)\n\
  **图 8-9.** 使用参数化分页的搜索的执行计划\n\n```\nTable 'SalesOrderDetail'. Scan count 1000, logical\
  \ reads 3231, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\nTable 'SalesOrderHeader'. Scan count 1, logical\
  \ reads 689, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\n```\n\n此外，计划缓存读取存储过程返回的执行指标见图 8-10：\n\n![A371168_1_En_8_Fig10_HTML.jpg](img/A371168_1_En_8_Fig10_HTML.jpg)\n\
  **图 8-10.** `dbo.read_query_plan_cache` 针对带分页的参数化搜索返回的指标\n\n```\n`EXEC dbo.read_query_plan_cache\
  \ 'CTE_PRODUCTS'`;\n```\n\n请注意，由于为动态 SQL 本地定义了一些参数，存储过程本身并未进入计划缓存——只有动态 SQL 语句被缓存。`QueryText`\
  \ 的内容如代码清单 8-4 所示。\n\n```\n(@SalesPersonID INT, @RowCount INT, @Offset INT)\nWITH\
  \ CTE_PRODUCTS AS (\n    SELECT\n        ROW_NUMBER() OVER (ORDER BY OrderDate ASC)\
  \ AS rownum,\n        SalesOrderHeader.SalesOrderID,\n        SalesOrderHeader.Status,\n\
  \        SalesOrderHeader.OrderDate,\n        SalesOrderHeader.ShipDate,\n     \
  \   SalesOrderDetail.UnitPrice,\n        SalesOrderDetail.LineTotal\n    FROM Sales.SalesOrderHeader\n\
  \    INNER JOIN Sales.SalesOrderDetail\n        ON SalesOrderHeader.SalesOrderID\
  \ = SalesOrderDetail.SalesOrderID\n    WHERE SalesOrderHeader.SalesPersonID = @SalesPersonID\n\
  )\nSELECT\n    *\nFROM CTE_PRODUCTS\nWHERE rownum BETWEEN @Offset AND @Offset +\
  \ @RowCount;\n```\n**代码清单 8-4.** 在带分页的动态搜索中执行时产生的查询文本\n\n预期的效果仍然达成：你打算运行的查询是完全参数化的，并且无论何时执行存储过程，执行计划都会被重用。然而，要在缓存中搜索它，需要输入\
  \ `SELECT` 查询中的某些文本，而不是存储过程名称。\n\n\n所有结果都表明，优化器选择了对 `SalesOrderHeader` 进行聚集索引扫描，对\
  \ `SalesOrderDetail` 进行聚集索引查找。查询此大型数据集需要进行 3,926 次读取，查询指标结果如下：\n\n*   CPU：14 毫秒（13,726\
  \ 微秒）\n*   读取次数：4062\n*   持续时间：115 毫秒（115,309 微秒）\n*   返回行数：1000\n\n你可以清空缓存，并为一位销售记录少得多销售人员重复此练习：\n\
  \n```\nDBCC FREEPROCCACHE;\nEXEC dbo.get_sales_orders_by_sales_person 285, 1000,\
  \ 0;\n```\n\n这次执行的结果集是 245 行，而不是 27,659 行。因此，将结果集限制为 1,000 行对 SQL Server 返回的内容没有影响。此次执行的性能指标如图\
  \ 8-11 所示。\n\n![A371168_1_En_8_Fig11_HTML.jpg](img/A371168_1_En_8_Fig11_HTML.jpg)\n\
  图 8-11. 结果集较小的参数化分页搜索的执行计划\n\n```\nTable 'SalesOrderDetail'. Scan count 16, logical\
  \ reads 53, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\nTable 'SalesOrderHeader'. Scan count 1, logical\
  \ reads 50, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\n```\n\n返回这个较小子数据集只需要 103 次读取，优化器选择对 `SalesOrderHeader`\
  \ 使用索引查找，对 `SalesOrderDetail` 使用聚集索引查找。尽管键查找是一项开销昂贵的随机 I/O 操作，优化器仍然选择了它，而不是扫描整张表的替代方案。让我们回顾一下此次执行的附加查询统计数据，如图\
  \ 8-12 所示。\n\n![A371168_1_En_8_Fig12_HTML.jpg](img/A371168_1_En_8_Fig12_HTML.jpg)\n\
  图 8-12. dbo.read_query_plan_cache 返回的、针对带分页且结果集较小的参数化搜索的度量指标\n\n```\nEXEC dbo.read_query_plan_cache\
  \ 'CTE_PRODUCTS';\n```\n\n这些数据与迄今为止审查的所有内容都一致。此次执行所需的读取次数显著减少，返回的行数也更少，并且速度比之前稍快一些。\n\
  \n*   CPU：2127 微秒\n*   读取次数：103\n*   持续时间：95 毫秒（94,877 微秒）\n*   返回行数：245\n\n既然你已经为这个存储过程在大结果集与小结果集情况下的性能建立了基线，就可以针对与之前审查场景相反的情况来比较参数嗅探。你将最后一次清空查询计划缓存，并为那位被分配了极多订单的销售人员运行销售订单搜索：\n\
  \n```\nDBCC FREEPROCCACHE;\nEXEC dbo.get_sales_orders_by_sales_person 1, 1000, 0;\n\
  ```\n\n快速回顾此次执行的性能指标证实，其执行方式与之前完全一样，如图 8-13 所示。\n\n![A371168_1_En_8_Fig13_HTML.jpg](img/A371168_1_En_8_Fig13_HTML.jpg)\n\
  图 8-13. 之前具有大结果集的搜索的性能表现\n\n```\nTable 'SalesOrderDetail'. Scan count 1000, logical\
  \ reads 3231, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\nTable 'SalesOrderHeader'. Scan count 1, logical\
  \ reads 689, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\n```\n\nI/O 统计信息和执行计划都与之前的第一次执行相符。现在，让我们针对第二个用例执行相同的存储过程，即该销售人员的销售订单要少得多（不清除计划缓存）：\n\
  \n```\nEXEC dbo.get_sales_orders_by_sales_person 285, 1000, 0;\n```\n\n虽然返回的结果与你之前运行此相同查询时相同，但性能却有显著差异。图\
  \ 8-14 通过 I/O 统计信息和执行计划说明了这一点。\n\n![A371168_1_En_8_Fig14_HTML.jpg](img/A371168_1_En_8_Fig14_HTML.jpg)\n\
  图 8-14. 当为大结果集生成的执行计划被重用于一个显著更小的结果集时的性能表现\n\n```\nTable 'SalesOrderDetail'. Scan\
  \ count 16, logical reads 74, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'SalesOrderHeader'.\
  \ Scan count 1, logical reads 689, physical reads 0, read-ahead reads 0, lob logical\
  \ reads 0, lob physical reads 0, lob read-ahead reads 0.\n```\n\n由于你没有清空查询计划缓存，上面的执行计划被复用于此次存储过程执行。该执行计划与上一次执行完全相同。优化器对\
  \ `SalesOrderHeader` 使用了聚集索引扫描，即使对于本示例中展示的较小基数而言，这并非从表中检索数据的最佳方式。因此，`SalesOrderHeader`\
  \ 上的读取次数显著增加，而 `SalesOrderDetail` 上的读取次数增加了约 50%。为了证明发生了计划复用，最后一次运行 `read_query_plan_cache`\
  \ 存储过程。你可以在图 8-15 中查看结果。\n\n![A371168_1_En_8_Fig15_HTML.jpg](img/A371168_1_En_8_Fig15_HTML.jpg)\n\
  图 8-15. 当参数嗅探导致不期望的计划复用时，dbo.read_query_plan_cache 为带分页的参数化搜索返回的度量指标\n\n```\nEXEC\
  \ dbo.read_query_plan_cache 'CTE_PRODUCTS';\n```\n\n总结这些数据，我们可以提取最相关的细节进行审查：\n\n\
  *   执行次数：2\n*   CPU：3402 微秒\n*   读取次数：777\n*   持续时间：98 毫秒（97,993 微秒）\n*   返回行数：245\n\
  \n执行次数证明执行计划确实被复用了。在此场景中，复用并无益处，并导致查询消耗了显著更多的资源来执行。在一个更大、更繁忙的生产数据库上，这类参数嗅探可能会严重降低性能。\n\
  \n接下来合乎逻辑的问题是，如何应对这种现象以及如何正确补偿参数嗅探。为了提供最佳答案，在深入探讨各种解决方案之前，你将先了解一些额外的注意事项。\n\n\n\
  #### 设计注意事项\n\n管理像参数嗅探这样的现象，首要规则是了解你的数据！由于这是 SQL Server 的一个特性而非错误，在尝试实施解决方案之前，你需要仔细评估它在哪些场景下会成为问题。\n\
  \n回顾一下前面的两个例子：导致计划非预期重用的确切原因是什么？最终，是因为存储过程的多次执行导致对结果集的**基数估计**差异巨大。一个参数值返回了 245\
  \ 行，而另一个返回的数据量是其 100 多倍。\n\n在解决参数嗅探问题时，你应该提出一系列问题，以准确评估其严重性、频率以及更改的影响：\n*   该查询执行的频率如何？\n\
  *   执行通常返回的结果集数量级最常见的是什么？参数嗅探在大多数情况下是有帮助的，还是导致不良执行计划的频率超出了你的预期？\n*   随着时间的推移，数据量的增长将如何影响这些基数估计？\n\
  *   是否还有其他因素参与其中，例如过时的统计信息、编写不良的 TSQL，或缺失/碎片化的索引？\n*   最可能传递给存储过程的常用参数值是什么？\n* \
  \  无论输入如何，你是否已经知道结果集的基数？例如，某个存储过程是否总是返回一行？\n*   能否将一个复杂查询拆分为多个更简单的查询？\n\n通常，满足业务需求的查询会符合一个常规的使用模式。确定该模式，然后找出明显偏离常规的情况，有助于判断你的\
  \ TSQL 是在适应常见的用例，还是在无意中为异常情况（而非常见情况）进行编码，从而导致了性能低下。\n\n为了正确回答这些问题，让我们更详细地逐一回顾。\n\
  \n##### 查询执行详情\n\n一个查询总体执行频率如何？以及它以导致参数嗅探成为明显问题的方式执行的频率又如何？如果它持续不断地运行，那么你需要确保其效率，因为每分钟执行数千次的操作无法承受低效之重。你需要确定最常见的使用场景，并编写\
  \ TSQL 来适应它。如果存在多个持续运行的常见场景，你可以考虑为每个场景单独编写存储过程，在单个过程中使用多个代码路径，或者其他充分利用每种情况的方法。\n\
  \n然而，如果一个查询执行频率很低，例如用于每日报告或不常进行的搜索，那么每次重新编译查询计划将是一个合理的解决方案，因为它能确保获得最佳计划，而不会重用旧的计划。由于运行不频繁，重新编译的成本不会显著到因优化器每次执行所需的额外工作而给服务器带来资源压力。在这些情况下，你可以自由采取更多样的行动来解决非预期的计划重用问题。但要核实，目前很少执行的查询在未来是否不会变得更加频繁使用。如果原本一天一次的查询变得流行起来，并开始在白天每五秒执行一次，那么重新编译将成为一项昂贵的操作，无法如此频繁地执行。\n\
  \n可以使用查询提示 `OPTION (RECOMPILE)` 来强制每次执行时重新编译。语法如代码清单 8-5 所示。\n\n```sql\nIF EXISTS\
  \ (SELECT * FROM sys.procedures WHERE procedures.name = 'get_sales_orders_by_sales_person')\n\
  BEGIN\nDROP PROCEDURE dbo.get_sales_orders_by_sales_person;\nEND\nGO\nCREATE PROCEDURE\
  \ dbo.get_sales_orders_by_sales_person\n@SalesPersonID INT, @RowCount INT, @Offset\
  \ INT\nAS\nBEGIN\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX)\
  \ = '@SalesPersonID INT, @RowCount INT, @Offset INT';\nSELECT @sql_command = '\n\
  WITH CTE_PRODUCTS AS (\nSELECT\nROW_NUMBER() OVER (ORDER BY OrderDate ASC) AS rownum,\n\
  SalesOrderHeader.SalesOrderID,\nSalesOrderHeader.Status,\nSalesOrderHeader.OrderDate,\n\
  SalesOrderHeader.ShipDate,\nSalesOrderDetail.UnitPrice,\nSalesOrderDetail.LineTotal\n\
  FROM Sales.SalesOrderHeader\nINNER JOIN Sales.SalesOrderDetail\nON SalesOrderHeader.SalesOrderID\
  \ = SalesOrderDetail.SalesOrderID\nWHERE SalesOrderHeader.SalesPersonID = @SalesPersonID\n\
  )\nSELECT\n*\nFROM CTE_PRODUCTS\nWHERE rownum BETWEEN @Offset AND @Offset + @RowCount\n\
  OPTION (RECOMPILE);';\nEXEC sp_executesql @sql_command, @parameter_list, @SalesPersonID,\
  \ @RowCount, @Offset;\nEND\n```\n\n代码清单 8-5. RECOMPILE 查询提示示例\n\n这个存储过程与你之前使用过的那个唯一的区别是在\
  \ `SELECT` 查询末尾添加了 `RECOMPILE` 提示。有了这个，你可以运行最后一个参数嗅探示例：\n\n```sql\nDBCC FREEPROCCACHE;\n\
  EXEC dbo.get_sales_orders_by_sales_person 1, 1000, 0;\nEXEC dbo.get_sales_orders_by_sales_person\
  \ 285, 1000, 0;\nEXEC dbo.read_query_plan_cache 'CTE_PRODUCTS';\n```\n\n上次你以这种方式执行存储过程时，查询执行计划被重用，导致了性能不佳。让我们在图\
  \ 8-16 中回顾一下第二次执行（针对小结果集）的性能：\n\n![A371168_1_En_8_Fig16_HTML.jpg](img/A371168_1_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16. 在运行时重新编译执行计划，防止重用次优计划时的性能\n\n```\nTable 'SalesOrderDetail'. Scan count\
  \ 16, logical reads 53, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'SalesOrderHeader'. Scan\
  \ count 1, logical reads 50, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 0, lob physical reads 0, lob read-ahead reads 0.\n```\n\n这次，SQL Server 执行了查询，并在运行时重新编译了查询计划，以获得针对每个参数集的最优计划，而不是使用之前为大结果集准备的那个计划。\n\
  \n一如既往，应谨慎使用查询提示，且仅在必要时使用。优化器生成执行计划所需的资源并非微不足道，过于频繁地重新编译计划可能导致额外的 CPU 消耗和查询延迟增加。当你确信一个查询执行频率很低，或者其基数变化无常导致计划重用常常导致性能不佳时，这个工具最为适用。\n\
  \n另一个需要考虑的是，要判断由计划重用导致的性能低下是普遍现象还是特例。因为偶尔出现的异常而给查询添加重新编译可能并无益处。如果一个查询在大多数时间都能以最优方式执行，那么容忍非预期的计划重用可能是最佳选择。同样值得研究的是，这个异常是否预示着更大的问题，例如数据验证错误或非法数据被传入了你的存储过程。\n\
  \n重新编译执行计划的权衡是：（希望）以优化性能为代价来提高查询执行性能。在判断这个权衡是否值得时，要考虑未来：这个查询在未来是否会以类似方式执行？应用程序或查询源是否会改变，导致新的、意想不到的行为，从而使这个好决策变成坏决策？此外，你的研究是否足够详尽，确保涵盖了所有用例？如果你能自信地回答这些问题，那么就是否重新编译查询执行计划做出正确的决定应该是直接了当的。\n\
  \n\n\n### 红鲱鱼\n\n有时，糟糕的执行计划可能源于其他因素。如果统计信息已过时，那么在参数嗅探发生之前，就可能选择了次优的查询执行计划。换句话说，计划重用本身没有问题，但优化器最初由于缺乏准确的统计信息而创建了一个坏计划，而这个坏计划随后被重用了。在这种情况下，即使没有发生计划重用，也很可能会生成一个坏计划。在执行计划中核实预估行数与实际行数是发现潜在统计信息不准确的好方法。有关查看、使用和更新统计信息的详细信息，请参见第\
  \ 6 章。\n\n实际上，`TSQL` 编写不当的任何方式都可能导致人们错误地将不理想的计划重用归咎于参数嗅探。代码清单 8-6 中的简单示例展示了一个查询，其编写方式本质上就保证了次优性能。\n\
  \n```\nSELECT DISTINCT\nPRODUCT.ProductID,\nPRODUCT.Name\nFROM Production.Product\
  \ PRODUCT\nINNER JOIN Sales.SalesOrderDetail DETAIL\nON PRODUCT.ProductID = DETAIL.ProductID\n\
  OR PRODUCT.rowguid = DETAIL.rowguid\n```\n\n**代码清单 8-6.** 一个保证性能糟糕的 `AdventureWorks`\
  \ 查询\n\n这个返回 266 行的查询，其性能指标如图 8-17 所示。\n\n![A371168_1_En_8_Fig18_HTML.jpg](img/A371168_1_En_8_Fig18_HTML.jpg)\n\
  \n**图 8-18.** 代码清单 8-7 中重写和优化后的查询性能\n\n![A371168_1_En_8_Fig17_HTML.jpg](img/A371168_1_En_8_Fig17_HTML.jpg)\n\
  \n**图 8-17.** 一个（故意）编写不当的查询的性能\n\n```\nTable 'Product'. Scan count 5, logical reads\
  \ 40, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
  \ 0, lob read-ahead reads 0.\nTable 'SalesOrderDetail'. Scan count 4, logical reads\
  \ 4984, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan count 4, logical reads\
  \ 1209220, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\nTable 'Worktable'. Scan count 0, logical reads\
  \ 0, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads\
  \ 0, lob read-ahead reads 0.\n```\n\n看看进入嵌套循环前的那个行数！高达 3450 万行！由于 `SalesOrderDetail`\
  \ 表仅包含 121,317 行，显然这里存在一个需要解决的问题。事实证明，在连接中使用 `OR` 运算符可能导致灾难性的糟糕性能，因为查询优化器很难确定高效交集数据集的最佳方式。\n\
  \n如果将来重用此查询计划，性能也会很差，但原因并非参数嗅探，而是查询本身设计不佳。如果重写查询以移除 `OR`，例如使用由 `UNION` 分隔的两个语句，就能实现显著更好的性能。代码清单\
  \ 8-7 展示了改进后的 `TSQL`。\n\n```\nSELECT\nPRODUCT.ProductID,\nPRODUCT.Name\nFROM Production.Product\
  \ PRODUCT\nINNER JOIN Sales.SalesOrderDetail DETAIL\nON PRODUCT.ProductID = DETAIL.ProductID\n\
  UNION\nSELECT\nPRODUCT.ProductID,\nPRODUCT.Name\nFROM Production.Product PRODUCT\n\
  INNER JOIN Sales.SalesOrderDetail DETAIL\nON PRODUCT.rowguid = DETAIL.rowguid\n\
  ```\n\n**代码清单 8-7.** 对代码清单 8-6 中慢速查询的优化版本\n\n尽管这个 `TSQL` 看起来更长更复杂，但查询优化器会更容易为其找到一个好的执行计划：\n\
  \n```\nTable 'Product'. Scan count 2, logical reads 30, physical reads 0, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Table 'SalesOrderDetail'. Scan count 505, logical reads 1554, physical reads 0,\
  \ read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\n```\n\n虽然执行计划可能看起来更复杂，但 `TSQL` 语法允许优化器将一个复杂问题分解为两个更简单的问题，这些问题可以轻松解决、合并，并返回相同的结果集。读取次数减少了\
  \ 75 倍以上，运行时间从 10 秒缩短到 100 毫秒。\n\n分而治之复杂查询通常是防止查询优化器无法找到最佳计划的绝佳方法。这个看似简单的查询对于优化器来说是一个性能炸弹。将其拆分为两部分是一种解决方案，使用临时表或表变量将数据存储在中间步骤中也是解决此性能问题的有效方案。\n\
  \n如果查询变得庞大且难以处理，请考虑将其分解为更小、更简单的查询。随着每个表连接到查询中，查询优化器必须评估的可能执行计划数量呈指数级增长。根据查询风格，`n`\
  \ 个表的连接顺序数量可能是 `n!`（`n` 的阶乘，适用于左深查询树）或 `(2n-2)!/(n-1)!`（如果查询树是浓密的，这个数字甚至更大）。试想一下，四个表以左深连接顺序排列的方式有多少种：\n\
  \n```\nTable A JOIN Table B JOIN Table C JOIN Table D\nABCD ABDC ACBD ACDB ADBC\
  \ ADCB BACD BADC BCAD BCDA BDAC BDCA\nCABD CADB CBAD CBDA CDAB CDBA DABC DACB DBAC\
  \ DBCA DCAB DCBA\n```\n\n结果是共有 24 种（`4! = 4 * 3 * 2 * 1`）可能的方式来排列此示例中涉及的四个表。左深树和浓密树是描述任何查询处理器构建的查询树的方式。图\
  \ 8-19 展示了每种类型以树形图表示时的样子。\n\n![A371168_1_En_8_Fig19_HTML.jpg](img/A371168_1_En_8_Fig19_HTML.jpg)\n\
  \n**图 8-19.** 左深查询树（左）和浓密查询树（右）示例\n\n左深树由一次连接一个表的序列组成，而浓密树则由单独连接的表组成，其结果在每组连接完成后再连接在一起。浓密树的排序方式要多得多，这就是为什么连接顺序排列组合的数学表达式远大于左深树的原因。\n\
  \n在不深入讨论每种查询树类型的情况下，可以肯定地说，随着每个表添加到查询中，连接顺序的排列方式将显著增加。即使从复杂查询中移除一个表并单独收集其数据，也可能带来重大的性能提升。\n\
  \n务必测试这些更改，并确保重构后的 `TSQL` 确实性能更优。同样重要的是，确保返回的数据与之前相同。高度事务性的数据可能在初始数据收集和最终查询之间发生变化，导致数据不一致。因此，要熟悉所查询的数据，不要在不确认最终查询输出将与原查询相同的情况下盲目进行优化。\n\
  \n研究索引也值得一做。验证是否使用了正确的索引，以及这些索引是否过度碎片化。碎片化会减慢索引上的所有读取速度，并导致 `SQL Server` 在执行查询前需要将更多数据页读入内存。此外，确保您的查询能够利用正确的索引。您期望查询使用的索引是否启用？如果它是筛选索引，该筛选条件是否被正确应用？\n\
  \n\n\n### 参数嗅探问题排查概述\n\n在将参数嗅探视为性能问题的罪魁祸首之前，务必先核实没有其他更严重的问题需要优先处理。除了统计信息、索引和 T-SQL\
  \ 错误之外，SQL Server 配置设置也可能影响查询性能。并行度、跟踪标志以及内存/CPU 压力都可能导致意外的性能下降。\n\n尽管存在所有这些可能性，始终应从最简单的解决方案开始，然后在其被证伪后再探索更复杂的方案。与计划重用不当相关的性能问题，其更可能仅仅是经典的参数嗅探所致，而非其他神秘原因。如果不是，则应考虑统计信息、索引和查询结构的影响。只有在其他所有方法都失败时，才有必要深入探查\
  \ SQL Server 安装的内部以寻找更多线索。这种情况即使发生也会很少见，但做好准备并了解在何处寻找解决性能问题的方法，可以为将来节省大量时间。\n\n\
  #### 参数值\n\n调查参数嗅探的一个好方法是检查参数本身以及通常传递给它们的值。某个值或一组值是否非常常见？这些值是否总是不同，表明一个从不重复的过程？参数通常接收的值是随机的，还是遵循某种明显的模式？\n\
  \n这些知识有助于确定最佳行动方案。如果只有一小组值始终传递给存储过程，您可能能够对它们做出假设，并设计 T-SQL 以考虑这些人为的限制。一些有用的观察包括：\n\
  \n*   参数是否始终是 `NOT NULL`？\n*   参数是否会始终设置为当前日期或某个重要指标的当前值？\n*   参数的取值范围是否非常有限？\n\
  *   参数值是否看似随机？\n*   某个特定值是否极其常见，或者该值是否比其他值更重要或更相关？\n\n如前所述，考虑到变化的可能性很重要。如果应用程序更改可能影响参数值，则必须预见这些更改，不要编写会被未来这些更改损害的\
  \ T-SQL。如果可以验证这一点，则使用简化假设来重写存储过程，使其更短、更简单，并让优化器尽可能多地做出正确的决策。\n\n此外，了解结果集的基数会极大地影响您编写存储过程的方式。例如，如果某个存储过程始终返回单行，您可以确保其每个部分都针对该小型结果集进行了优化。类似地，如果您正在分页数据并且将始终返回\
  \ 25 或 50 行，则可以利用此信息确保存储过程被编写为返回该行数，不多也不少。\n\n如第 3 章所示，当不太可能请求更多数据时，可以对分页数据集进行小型结果集的优化。如果您知道用户将一页一页地请求数据，您可以编写查询以返回更多数据，为下一次点击做准备。让您得出这些结论的应用程序知识也提供了编写符合您试图满足的业务逻辑的\
  \ T-SQL 所需的信息。\n\n#### 局部变量\n\n为了准备此示例，请向 `Production.Product` 添加一个索引，这将有助于支持您即将运行的查询：\n\
  \n```sql\nCREATE NONCLUSTERED INDEX NCI_production_product_ProductModelID ON Production.Product\
  \ (ProductModelID) INCLUDE (Name);\n```\n\n有时用来尝试消除参数嗅探的一种策略是，在局部重新声明所有变量，而不是使用传递给存储过程的参数。这样做的效果可能类似于使用\
  \ `RECOMPILE` 提示，但可能会存在一些细微差异，从长远来看可能导致更差的性能。为了演示这种效果，让我们创建本章开头的存储过程的新版本，并在其中将所有存储过程参数重新定义为局部变量，如清单\
  \ 8-8 所示。\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name\
  \ = 'get_products_by_model_local')\nBEGIN\nDROP PROCEDURE dbo.get_products_by_model_local;\n\
  END\nGO\nCREATE PROCEDURE dbo.get_products_by_model_local (@firstProductModelID\
  \ INT, @lastProductModelID INT)\nAS\nBEGIN\nDECLARE @ProductModelID1 INT = @firstProductModelID;\n\
  DECLARE @ProductModelID2 INT = @lastProductModelID;\nSELECT\nPRODUCT.Name,\nPRODUCT.ProductID,\n\
  PRODUCT.ProductModelID,\nPRODUCT.ProductNumber,\nMODEL.Name\nFROM Production.Product\
  \ PRODUCT\nINNER JOIN Production.ProductModel MODEL\nON MODEL.ProductModelID = PRODUCT.ProductModelID\n\
  WHERE PRODUCT.ProductModelID BETWEEN @ProductModelID1 AND @ProductModelID2;\nEND\n\
  Listing 8-8.\n将参数重新声明为局部变量的存储过程\n```\n\n请注意，`@firstProductModelID` 和 `@secondProductModelID`\
  \ 已分别分配给 `@ProductModelID1` 和 `@ProductModelID2`。这些新变量随后在存储过程末尾的最终 `SELECT` 语句中使用。使用这个新版本的存储过程，让我们使用本章前面的示例来测试性能：\n\
  \n```sql\nDBCC FREEPROCCACHE;\nEXEC dbo.get_products_by_model_local 120, 125;\n\
  EXEC dbo.get_products_by_model_local 0, 10000;\n```\n\n在这里，您为优化器认为的最佳产品搜索计划建立了一个基线。对于第一次执行（涵盖一小部分产品模型范围，因此结果集很小，只有六行），其性能与原始版本的存储过程不同。两者的新\
  \ IO 统计信息和执行计划见图 8-20，新的在上方，旧的在下方：\n\n![A371168_1_En_8_Fig20_HTML.jpg](img/A371168_1_En_8_Fig20_HTML.jpg)\n\
  \n图 8-20.\n当声明变量并在本地重新分配存储过程参数时，小型结果集查询的性能\n\n```text\nTable 'Product'. Scan count\
  \ 6, logical reads 24, physical reads 0, read-ahead reads 0, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\nTable 'ProductModel'. Scan count\
  \ 1, logical reads 2, physical reads 0, read-ahead reads 0, lob logical reads 0,\
  \ loc physical reads 0, lob read-ahead reads 0.\n```\n\n声明局部变量并在查询中使用它们导致了不同的执行计划以及不同的\
  \ IO 统计信息。现在让我们比较第二种情况（结果集大得多时）的新旧版本。图 8-21 显示了这些性能指标。\n\n![A371168_1_En_8_Fig21_HTML.jpg](img/A371168_1_En_8_Fig21_HTML.jpg)\n\
  \n图 8-21.\n当声明变量并在本地重新分配存储过程参数时，大型结果集的性能指标\n\n```text\nTable 'Product'. Scan count\
  \ 128, logical reads 849, physical reads 0, read-ahead reads 0, lob logical reads\
  \ 0, lob physical reads 0, lob read-ahead reads 0.\nTable 'ProductModel'. Scan count\
  \ 1, logical reads 2, physical reads 0, read-ahead reads 0, lob logical reads 0,\
  \ lob physical reads 0, lob read-ahead reads 0.\n```\n\n\n### 参数嗅探与本地变量\n\n如上所述，存储过程的新版本被选择了一个不同（且更复杂）的执行计划。这个版本为了返回相同的数据需要进行更多的\
  \ IO 操作。事实上，查询优化器为两组参数选择了相同的执行计划。这在处理小结果集时始终能带来良好的性能，但在处理大结果集时性能却很差。参数嗅探似乎不再发生，因为对两组参数值都使用了相同的计划。但是，如果你连续执行几次存储过程，可以确认计划实际上正在被重用：\n\
  \n```\nDBCC FREEPROCCACHE;\nEXEC dbo.get_products_by_model_local 120, 125;\nEXEC\
  \ dbo.get_products_by_model_local 0, 10000;\nEXEC dbo.get_products_by_model_local\
  \ 120, 125;\nEXEC dbo.get_products_by_model_local 0, 10000;\n```\n\n让我们查看此存储过程的查询计划缓存中的数据，如图\
  \ 8-22 所示。\n\n![A371168_1_En_8_Fig22_HTML.jpg](img/A371168_1_En_8_Fig22_HTML.jpg)\n\
  \n**图 8-22.**\n\n当参数被重新分配给本地变量时，`dbo.read_query_plan_cache` 针对产品搜索返回的度量值。\n\n```\n\
  EXEC dbo.read_query_plan_cache 'get_products_by_model_local';\n```\n\n你可以看到唯一返回的计划被执行了四次，因此发生了计划重用。由于为每组参数选择的执行计划相同，所以重用发生与否并不重要。无论你执行存储过程多少次或以何种顺序执行，结果都是一样的。尽管在本地重新声明了变量，参数嗅探仍然发生了，由此产生的性能仍然不是最优的。\n\
  \n这里发生了什么？为什么相同的执行计划被用于两组非常不同的数据？答案在于查询优化器如何使用统计信息。当查询执行时，优化器必须利用当时可用的任何统计信息来快速而明智地做出决定。任何在运行时才可用的信息对优化器来说也将是不可用的。如前所述，统计信息提供的三类信息是：\n\
  \n*   摘要数据，提供行数、平均键长和统计信息对象的概述\n*   密度数据，提供关于所跟踪的每个对象唯一性的信息\n*   直方图数据，给出统计信息对象样本范围内不同值的行数\n\
  \n为了让查询优化器做出最准确的决定，它需要所有这些信息。不幸的是，一些 TSQL 技术会强制参数数据在运行时之前变为不可用或无法使用。这导致了次优的执行计划，因为优化器被迫在无法利用直方图、密度数据或两者的情况下做出决策。\n\
  \n在上面的示例中，你声明了本地变量并将参数重新赋值给它们，从而剥夺了优化器使用直方图的能力。之前，你执行存储过程时，参数被用来确定首次执行的执行计划。然后该计划在之后每次执行时被重用。而在本例中，你首次执行存储过程时，只有摘要和密度数据可供优化器用来创建执行计划。由于本地变量的值在运行时之前是未知的，因此无法检查直方图以获取基数数据，它因此从优化过程中被省略了。结果，生成并重用的执行计划不得不基于假设来创建。此外，选择的执行计划将对任何传入的参数值都相同，而不仅仅是你检查的那两个示例，因为这些值在运行时之前是不可用的。\n\
  \n总之，这意味着无论何时在存储过程里使用本地变量，查询优化器都需要做出假设，而这最终可能导致较差的基数估计。在这种情况下，DBA 往往会发现被选中的执行计划碰巧性能更好，但这在很大程度上是运气使然，以及优化器偶然找到了一个对正在审查的用例有效的计划。\n\
  \n为了充分说明发生了什么，让我们更仔细地查看存储过程每个版本的单次执行的执行计划，重点关注基数估计与每个 IO 步骤的实际行数。首先，原始存储过程（运行大结果集）如图\
  \ 8-23 所示。\n\n![A371168_1_En_8_Fig23_HTML.jpg](img/A371168_1_En_8_Fig23_HTML.jpg)\n\
  \n**图 8-23.**\n\n参数化存储过程的执行计划详情。\n\n```\nDBCC FREEPROCCACHE;\nEXEC dbo.get_products_by_model\
  \ 0, 10000;\n```\n\n注意，对于两个 IO 操作，实际行数和估计行数是相同的。这表明优化器有足够的统计数据来正确估计每个步骤的行数，并选择了一个合适的执行计划。执行后，结果证实了优化器的工作。你可以为这项出色的工作给它一点鼓励。\n\
  \n以下是当你声明本地变量并用它们代替存储过程参数时，IO 步骤的执行计划详情，如图 8-24 所示。\n\n![A371168_1_En_8_Fig24_HTML.jpg](img/A371168_1_En_8_Fig24_HTML.jpg)\n\
  \n**图 8-24.**\n\n使用本地变量的存储过程的执行计划详情。\n\n```\nDBCC FREEPROCCACHE;\nEXEC dbo.get_products_by_model_local\
  \ 0, 10000;\n```\n\n在这个例子中，虽然实际行数与之前所示相同，但估计值却相差甚远！对 `ProductModel` 的 IO 操作估计为 11.52\
  \ 行，对 `Product` 的估计为 1 行。这就是你之前看到的次优执行计划的根源。在 `ProductModel` 表上，由于该操作是一个没有参数的不等式，优化器没有任何信息可以参考。对于\
  \ `Product` 表，优化器可以使用密度数据来尝试获得一个良好的估计，但如果没有直方图，它将无法做到。\n\n在评估执行计划的不同部分时，查询优化器可能做出糟糕的基数估计的原因有很多。虽然其中一些可能性是正常且符合设计的，但你肯定不想人为地限制其可用的信息，从而导致更糟糕的估计。声明本地变量可能看起来可以修复糟糕的执行计划或消除参数嗅探，但最终它会通过限制优化器访问有价值的信息而使情况恶化。除非对所涉及的数据和查询进行了大量研究，否则从长远来看，在存储过程中局部化变量很可能是一个冒险的决定，即使它现在看起来解决了业务需求。\n\
  \n\n#### 强制向优化器指定基数\n\n你已经尝试过查询优化器，通过重新编译计划或修改变量作用域来试图改进查询性能。当你对自身数据有非常详尽的了解，并希望直接指示查询优化器处理基数时，还有一个额外的选项可用。在查询中，你可以使用\
  \ `OPTIMIZE FOR` 提示来直接指示优化器接受某个值作为参数的基数。\n\n让我们重新考虑之前关于产品型号搜索的示例，在那个例子中你声明了局部变量来尝试管理基数。当你使用局部变量时，你剥夺了查询优化器使用直方图数据的能力，从而迫使其使用基于剩余数据的不太准确的估算。如果你总是返回大型数据集并且知道这是事实，你可以考虑告诉查询优化器基于特定值来确定基数，如清单\
  \ 8-9 所示。\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name\
  \ = 'get_products_by_model_local')\nBEGIN\nDROP PROCEDURE dbo.get_products_by_model;\n\
  END\nGO\nCREATE PROCEDURE dbo.get_products_by_model (@firstProductModelID INT, @lastProductModelID\
  \ INT)\nAS\nBEGIN\nSELECT\nPRODUCT.Name,\nPRODUCT.ProductID,\nPRODUCT.ProductModelID,\n\
  PRODUCT.ProductNumber,\nMODEL.Name\nFROM Production.Product PRODUCT\nINNER JOIN\
  \ Production.ProductModel MODEL\nON MODEL.ProductModelID = PRODUCT.ProductModelID\n\
  WHERE PRODUCT.ProductModelID BETWEEN @firstProductModelID AND @lastProductModelID\n\
  OPTION (OPTIMIZE FOR (@firstProductModelID = 0, @lastProductModelID = 10000));\n\
  END\n```\n\n**清单 8-9.** 使用 `OPTIMIZE FOR` 查询提示的示例\n\n在此示例中，你强制优化器基于你提供的值进行所有分析，而不是求助于统计数据来决定最佳执行方式。当你这样做时，性能会恢复到之前使用最优计划时看到的情况，如图\
  \ 8-25 所示。\n\n![A371168_1_En_8_Fig25_HTML.jpg](img/A371168_1_En_8_Fig25_HTML.jpg)\n\
  \n**图 8-25.** 当你在查询中强制为每个参数指定基数时的执行计划\n\n```sql\nDBCC FREEPROCCACHE;\nEXEC dbo.get_products_by_model\
  \ 0, 10000;\nTable 'Workfile'. Scan count 0, logical reads 0, physical reads 0,\
  \ read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\nTable 'Worktable'. Scan count 0, logical reads 0, physical reads 0,\
  \ read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\nTable 'Product'. Scan count 1, logical reads 16, physical reads 0, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Table 'ProductModel'. Scan count 1, logical reads 2, physical reads 0, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  ```\n\n结果是最优的执行计划且仅有 18 次读取。当你使用此提示时，无论传入什么值，它都会选择这个计划。`OPTIMIZE FOR` 适用于你对输入参数有广泛了解的用例。这种情况并不常见，但在存储过程或代码中可能存在，那里的输入和输出是非常可预测的。\n\
  \n还有一种额外的方式可以使用 `OPTIMIZE FOR` 提示，那就是完全取消参数值，并指示优化器仅使用统计数据进行决策，而不考虑任何参数值。让我们在同一个存储过程中尝试这种方法，如清单\
  \ 8-10 所示。\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name\
  \ = 'get_products_by_model_local')\nBEGIN\nDROP PROCEDURE dbo.get_products_by_model;\n\
  END\nGO\nCREATE PROCEDURE dbo.get_products_by_model (@firstProductModelID INT, @lastProductModelID\
  \ INT)\nAS\nBEGIN\nSELECT\nPRODUCT.Name,\nPRODUCT.ProductID,\nPRODUCT.ProductModelID,\n\
  PRODUCT.ProductNumber,\nMODEL.Name\nFROM Production.Product PRODUCT\nINNER JOIN\
  \ Production.ProductModel MODEL\nON MODEL.ProductModelID = PRODUCT.ProductModelID\n\
  WHERE PRODUCT.ProductModelID BETWEEN @firstProductModelID AND @lastProductModelID\n\
  OPTION (OPTIMIZE FOR (@firstProductModelID UNKNOWN, @lastProductModelID UNKNOWN));\n\
  END\n```\n\n**清单 8-10.** 使用 `OPTIMIZE FOR UNKNOWN` 查询提示的示例\n\n在此示例中，你不是提供静态值，而是使用\
  \ `UNKNOWN`，它指示优化器不要基于任何特定的参数值进行分析，而应仅根据统计数据确定基数。让我们检查一下当你使用这个新提示时，此版本存储过程的性能，如图\
  \ 8-26 所示。\n\n![A371168_1_En_8_Fig26_HTML.jpg](img/A371168_1_En_8_Fig26_HTML.jpg)\n\
  \n**图 8-26.** 当你使用 `OPTIMIZE FOR UNKNOWN` 时的性能指标\n\n```sql\nDBCC FREEPROCCACHE;\n\
  EXEC dbo.get_products_by_model 0, 10000;\nTable 'Product'. Scan count 128, logical\
  \ reads 849, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\nTable 'ProductModel'. Scan count 1, logical\
  \ reads 2, physical reads 0, read-ahead reads 0, lob logical reads 0, lob physical\
  \ reads 0, lob read-ahead reads 0.\n```\n\n当你让优化器自行其是时，它会求助于统计数据以确定最佳执行计划。在这种情况下，结果与你之前得到的结果完全相同，即选择了糟糕的计划。通常，当优化器仅依赖统计数据而没有参数指导时，它通常会创建一个针对可能传入的最常见的参数值进行优化的执行计划。在此示例中，你返回了异常大量的数据，这是优化器没有准备好的。结果与使用局部变量绕过优化器的标准参数分析时非常相似。\n\
  \n`OPTIMIZE FOR` 与所有提示一样，在应用于非常具体或特殊的情况下时可能非常有用。请谨慎使用它，因为它可能对特定的参数值集有性能帮助，但如果传入其他意外值，也可能严重损害性能。查询提示应始终保守地应用，并且仅在你确定完全了解涉及的查询、参数值以及对基数有良好掌握时才使用。\n\
  \n### 结论\n\n查询执行计划重用是 SQL Server 中的一项重要功能，它可以节省内存和 CPU，同时允许常见查询快速高效地执行。当参数探测导致性能不佳时，应仔细诊断这种副作用，以确保它确实是根本原因，而不是另一个更大问题的征兆。\n\
  \n当发现次优的参数探测时，应分析数据以确定描述参数、数据和使用模式的指标。这项研究将极大地有助于确定应采取的最佳行动方案（如果有的话）。针对所有用例测试潜在的解决方案，并尽可能确保未来的应用程序或查询更改不会使你的修改失效。\n\
  \n查询调优和重构可能比查询提示更有用。考虑以不同方式编写查询，以实现更高效的执行。此外，寻找可以简化查询的假设，使其更简单、更容易被优化器理解。有时，这些努力会完全消除参数探测问题，从而无需进一步研究或诉诸查询提示或技巧来取得成功。\n\
  \n\n### 清理\n\n以下 TSQL 代码（参见清单 8-11）将清理本章创建的任何对象（如果它们存在），但存储过程 `read_query_plan_cache`\
  \ 除外，它可能在后续派上用场。\n\n```sql\nIF EXISTS (SELECT * FROM sys.indexes WHERE indexes.name\
  \ = 'NCI_production_product_ProductModelID')\nBEGIN\nDROP INDEX NCI_production_product_ProductModelID\
  \ ON Production.Product;\nEND\nGO\nIF EXISTS (SELECT * FROM sys.procedures WHERE\
  \ procedures.name = 'get_products_by_model_local')\nBEGIN\nDROP PROCEDURE dbo.get_products_by_model;\n\
  END\nGO\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'get_sales_orders_by_sales_person')\n\
  BEGIN\nDROP PROCEDURE dbo.get_sales_orders_by_sales_person;\nEND\nGO\n清单 8-11.\n\
  清理本章所创建对象的脚本\n```\n\n## 9. 动态 PIVOT 与 UNPIVOT\n\n`PIVOT` 是一种极其高效的方法，用于更改结果集的结构，将单列值扩展为一组独立的列。`UNPIVOT`\
  \ 则执行完全相反的操作，将一组列解析为单个输出列。这两种操作符在报表、分析或需要将现有数据格式化为应用程序所需的特定结构时非常有用。\n\n这两种操作符的一个显著限制是，在\
  \ TSQL 运行时之前，必须预先定义每种操作的列或名称列表。如果名称列表是静态的或足够可预测，以至于您不需要频繁修改代码即可使其正常工作，那么这是可以接受的。然而，如果此列表发生变化，您将被迫创建许多不同的存储过程或函数来处理众多的列表值，或者在代码中强制施加限制以避免这样做。\n\
  \n有一个有趣的替代方案可以解决这两种问题，那就是使用动态 SQL 来动态生成名称列表。一旦为此操作符引入了动态性，您就可以编写 TSQL，将一列中的所有值、变量列表或用户输入提供的值都整合进来。如果不使用动态\
  \ SQL，要完成此类任务将非常困难且效率低下，除非编写更长或更复杂的 TSQL 才能达到类似的结果集。\n\n### PIVOT\n\n`PIVOT` 在分析中很常见，当您希望将事务数据解析为列式结构以用于报表或指标时。通过示例来介绍上述挑战最为简单。考虑清单\
  \ 9-1 中的 TSQL，它返回一些数据量，以及库存中产品的颜色。\n\n![A371168_1_En_9_Fig1_HTML.jpg](img/A371168_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1.\n\n清单 9-1 中的查询足够简单，并将返回这些结果。\n\n```sql\nSELECT\nPRODUCT.Name AS product_name,\n\
  PRODUCT.Color AS product_color,\nPRODUCT_INVENTORY.LocationID,\nPRODUCT.ReorderPoint,\n\
  PRODUCT_INVENTORY.Quantity AS product_quantity\nFROM Production.Product PRODUCT\n\
  LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\nON PRODUCT.ProductID =\
  \ PRODUCT_INVENTORY.ProductID;\n清单 9-1.\n从 AdventureWorks 返回特定产品数据的查询\n```\n\n请注意，单个产品可能在多个位置有数量。如果管理层希望跨所有这些位置，分析不同产品的受欢迎程度、库存与颜色之间的相关性呢？他们要求一份报表，其中不是每个产品（包含颜色）一行，而是每个产品名称一行，并为每种指定颜色增加额外的列。这将便于按产品和颜色进行分析。`PIVOT`\
  \ 是完成此任务的最简单方法，如清单 9-2 所示。\n\n```sql\nSELECT\n*\nFROM\n(      SELECT\nPRODUCT.Name\
  \ AS product_name,\nPRODUCT.Color AS product_color,\nPRODUCT.ReorderPoint,\nPRODUCT_INVENTORY.Quantity\
  \ AS product_quantity\nFROM Production.Product PRODUCT\nLEFT JOIN Production.ProductInventory\
  \ PRODUCT_INVENTORY\nON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n) PRODUCT_DATA\n\
  PIVOT\n(    SUM(product_quantity)\nFOR product_color IN ([Black], [Blue], [Grey],\
  \ [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])\n) PIVOT_DATA;\n\
  清单 9-2.\n使用 PIVOT 按颜色报告产品的常见用法\n```\n\n在此示例中，您将先前的查询移入 `FROM` 子句中，该子句将用于数据透视。`PIVOT`\
  \ 的正确语法需要两个新组件：\n\n*   一个聚合函数，当存在多个值时将进行聚合。在返回产品数据的初始 `SELECT` 语句中，存在许多重复行。此示例在此情况下使用\
  \ `SUM`，如果存在多行具有相同的产品名称，则将产品数量相加。\n*   一个值列表，包含所有将从行数据更改为列标题的值。在本例中，列表是 `Product.Color`\
  \ 中的颜色。\n\n该语句在图 9-2 中的输出说明了新列的创建。\n\n![A371168_1_En_9_Fig2_HTML.jpg](img/A371168_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2.\n清单 9-2 中 PIVOT 查询的输出\n\n结果显示了九个新列，它们与原始查询中定义的列相同。在原始查询的多行共享相同产品名称的情况下，数量被相加了。例如，对于产品\
  \ `Road-250 Black, 48`，原始查询返回了两行，黑色的数量分别为 116 和 49。在 `PIVOT` 生成的输出中，您可以看到这两行被合并为一行，相同颜色的数量为\
  \ 165。如果存在多个产品名称相同但颜色不同的产品，那么在应用 `PIVOT` 后，单个产品将填充多个列的数量数据。\n\n这种方法存在一个唯一的弱点，那就是必须在运行时之前，在\
  \ `PIVOT` 语句中显式提供列列表。任何尝试重写 `PIVOT` 以在不使用动态 SQL 的情况下使用动态列表的操作都将失败，如清单 9-3 和 9-4\
  \ 所示。\n\n\n### SQL PIVOT 操作与动态列列表\n\n以下代码示例展示了尝试将更灵活的输入融入 `PIVOT` 查询的不同方法。\n\n##\
  \ 尝试使用子查询 (Listing 9-3)\n\n```sql\nSELECT\n*\nFROM\n(      SELECT\nPRODUCT.Name\
  \ AS product_name,\nPRODUCT.Color AS product_color,\nPRODUCT.ReorderPoint,\nPRODUCT_INVENTORY.Quantity\
  \ AS product_quantity\nFROM Production.Product PRODUCT\nLEFT JOIN Production.ProductInventory\
  \ PRODUCT_INVENTORY\nON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n) PRODUCT_DATA\n\
  PIVOT\n(      SUM(product_quantity)\nFOR product_color IN (SELECT Color FROM Production.Product)\n\
  ) PIVOT_DATA;\n```\n*Listing 9-3. 尝试在 PIVOT 语句中使用子查询（未成功）*\n\n## 尝试使用表变量 (Listing\
  \ 9-4)\n\n```sql\nDECLARE @colors TABLE\n(color_name VARCHAR(25));\nINSERT INTO\
  \ @colors\n(color_name)\nVALUES ('Black'), ('Blue'), ('Grey'), ('Multi'), ('Red'),\
  \ ('Silver'), ('Silver/Black'), ('White'), ('Yellow');\nSELECT\n*\nFROM\n(     \
  \ SELECT\nPRODUCT.Name AS product_name,\nPRODUCT.Color AS product_color,\nPRODUCT.ReorderPoint,\n\
  PRODUCT_INVENTORY.Quantity AS product_quantity\nFROM Production.Product PRODUCT\n\
  LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\nON PRODUCT.ProductID =\
  \ PRODUCT_INVENTORY.ProductID\n) PRODUCT_DATA\nPIVOT\n(      SUM(product_quantity)\n\
  FOR product_color IN (SELECT color_name FROM @colors)\n) PIVOT_DATA;\n```\n*Listing\
  \ 9-4. 尝试在 PIVOT 语句中使用表变量（也未成功）*\n\n这两个例子都是试图将更可定制的输入融入查询的合理尝试。第一个例子尝试输入 `Production.Product`\
  \ 中的所有颜色。如果此方法有效，您就可以总是对列中的所有值使用 `PIVOT`，而无需提前硬编码它们。第二个尝试使用表变量在执行 `PIVOT` 语句前存储一组颜色。如果此方法有效，您就可以通过应用程序或人员的输入在运行时之前自定义颜色列表。\n\
  \n不幸的是，两种语法都不起作用，并会产生类似的错误消息：\n\n```\nMsg 156, Level 15, State 1, Line 50\nIncorrect\
  \ syntax near the keyword 'SELECT'.\nMsg 102, Level 15, State 1, Line 50\nIncorrect\
  \ syntax near ')'.\n```\n\n此消息不是特别有帮助，但暗示语法不正确。这个解决问题的巧妙尝试没有奏效，但有另一种方法可以绕过 `PIVOT`\
  \ 语法中的这个限制：**动态 SQL**！列名列表必须在运行时之前就存在于 T-SQL 中，这可以通过构建一个命令字符串并在构建字符串时添加列列表详细信息来实现。这将允许您拥有来自您选择的任何源的动态列列表。\n\
  \nListing 9-5 展示了一个新版本的 `PIVOT`，它使用一个表变量存储颜色列表，并将其输入到动态 SQL 中，以便在运行时输出到您指定的列列表。\n\
  \n## 使用动态 SQL 和表变量 (Listing 9-5)\n\n```sql\nDECLARE @colors TABLE\n(color_name VARCHAR(25));\n\
  INSERT INTO @colors\n(color_name)\nVALUES ('Black'), ('Grey'), ('Silver/Black'),\
  \ ('White');\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\n\
  *\nFROM\n(      SELECT\nPRODUCT.Name AS product_name,\nPRODUCT.Color AS product_color,\n\
  PRODUCT.ReorderPoint,\nPRODUCT_INVENTORY.Quantity AS product_quantity\nFROM Production.Product\
  \ PRODUCT\nLEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\nON PRODUCT.ProductID\
  \ = PRODUCT_INVENTORY.ProductID\n) PRODUCT_DATA\nPIVOT\n(      SUM(product_quantity)\n\
  FOR product_color IN (';\nSELECT @sql_command = @sql_command + '[' + color_name\
  \ + '], '\nFROM @colors;\nSELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command)\
  \ - 1);\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA\n';\nEXEC sp_executesql\
  \ @sql_command;\n```\n*Listing 9-5. 使用动态 SQL 和表变量在运行时创建可变列列表*\n\n`PIVOT` T-SQL 与之前完全相同，但它包含了本书前面的一些动态\
  \ SQL 方法来实现其目标。首先，它生成一个动态颜色列表并将其添加到命令字符串中：\n\n```sql\nSELECT @sql_command = @sql_command\
  \ + '[' + color_name + '], '\nFROM @colors;\nSELECT @sql_command = SUBSTRING(@sql_command,\
  \ 1, LEN(@sql_command) - 1);\n```\n\n对于表变量中的任意数量的颜色，此代码会将它们附加到命令字符串中，用方括号括起来并用逗号分隔。额外的\
  \ `SELECT` 语句删除了列表生成后留下的尾随逗号。\n\n一旦颜色列表被附加，您就可以完成命令字符串并执行它以获取结果集，如图 9-3 所示。\n\n\
  ![A371168_1_En_9_Fig3_HTML.jpg](img/A371168_1_En_9_Fig3_HTML.jpg)\n*图 9-3. Listing\
  \ 9-5 中动态 PIVOT 的结果*\n\n请注意，列只为您包含在表变量中的颜色存在。对于列标题中未给出的颜色的任何产品，由 `PIVOT` 操作添加的所有新列都将为\
  \ `NULL`。\n\n有了这个框架，您就可以处理以前不可能的场景。首先，让我们重写这个查询，使其包含所有颜色，无论底层数据中随时间推移添加或删除了哪些颜色。为了实现这一点，您只需将插入表变量的\
  \ `INSERT` 替换为使用对 `Production.Product` 的查询，而不是静态值列表，如 Listing 9-6 所示。\n\n## 使用所有颜色值的动态\
  \ PIVOT (Listing 9-6)\n\n```sql\nDECLARE @colors TABLE\n(color_name VARCHAR(25));\n\
  INSERT INTO @colors\n(color_name)\nSELECT DISTINCT\nProduct.Color\nFROM Production.Product\n\
  WHERE Product.Color IS NOT NULL;\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command\
  \ = '\nSELECT\n*\nFROM\n(      SELECT\nPRODUCT.Name AS product_name,\nPRODUCT.Color\
  \ AS product_color,\nPRODUCT.ReorderPoint,\nPRODUCT_INVENTORY.Quantity AS product_quantity\n\
  FROM Production.Product PRODUCT\nLEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\n\
  ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n) PRODUCT_DATA\nPIVOT\n(   \
  \   SUM(product_quantity)\nFOR product_color IN (';\nSELECT @sql_command = @sql_command\
  \ + '[' + color_name + '], '\nFROM @colors;\nSELECT @sql_command = SUBSTRING(@sql_command,\
  \ 1, LEN(@sql_command) - 1);\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA\n\
  ';\nPRINT @sql_command;\nEXEC sp_executesql @sql_command;\n```\n*Listing 9-6. 使用\
  \ Production.Product 中所有颜色值的动态 PIVOT*\n\n执行前的命令字符串文本显示，它与原始硬编码的 `PIVOT` 查询完全相同：\n\
  \n```sql\nSELECT\n*\nFROM\n(      SELECT\nPRODUCT.Name AS product_name,\nPRODUCT.Color\
  \ AS product_color,\nPRODUCT.ReorderPoint,\nPRODUCT_INVENTORY.Quantity AS product_quantity\n\
  FROM Production.Product PRODUCT\nLEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\n\
  ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n) PRODUCT_DATA\nPIVOT\n(   \
  \   SUM(product_quantity)\nFOR product_color IN ([Black], [Blue], [Grey], [Multi],\
  \ [Red], [Silver], [Silver/Black], [White], [Yellow])) PIVOT_DATA\n```\n\n最终测试是向\
  \ `Production.Product` 添加几种颜色，然后再次运行动态 `PIVOT`，看看命令字符串和输出会发生什么变化：\n\n```sql\nUPDATE\
  \ Production.Product\nSET Product.Color = 'Fuschia'\nWHERE Product.ProductID = 325\
  \ -- Decal 1\nUPDATE Production.Product\nSET Product.Color = 'Aquamarine'\nWHERE\
  \ Product.ProductID = 326 -- Decal 2\n```\n\n这将两个产品更新为使用 `AdventureWorks` 中最初不存在的新颜色：Fuschia\
  \ 和 Aquamarine。添加这些颜色后，让我们运行动态 `PIVOT` 并查看新的命令字符串：\n\n```sql\nSELECT\n*\nFROM\n\
  (      SELECT\nPRODUCT.Name AS product_name,\nPRODUCT.Color AS product_color,\n\
  PRODUCT.ReorderPoint,\nPRODUCT_INVENTORY.Quantity AS product_quantity\nFROM Production.Product\
  \ PRODUCT\nLEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\nON PRODUCT.ProductID\
  \ = PRODUCT_INVENTORY.ProductID\n) PRODUCT_DATA\nPIVOT\n(      SUM(product_quantity)\n\
  FOR product_color IN ([Aquamarine], [Black], [Blue], [Fuschia], [Grey], [Multi],\
  \ [Red], [Silver], [Silver/Black], [White], [Yellow]   )) PIVOT_DATA\n```\n\n\n\n\
  请注意，新的颜色现在已出现在 `PIVOT` 语法中。查看图 9-4 中的输出，你可以确认这些列已存在于结果集中，并且根据你所做的更改被正确地填充。\n\n![A371168_1_En_9_Fig4_HTML.jpg](img/A371168_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4. 包含两种新颜色的动态 PIVOT\n\n通过这种语法，你可以让任何 `PIVOT` 变为动态的，并从用户输入、T-SQL 查询或 SQL Server\
  \ 中任何可查询数据的地方提供一个值列表。这减少了将特定列标题硬编码到存储过程中的需要，从而降低了长期的维护成本。你最不想担心的就是每当产品库存中添加了新颜色的自行车时，都要调整\
  \ T-SQL 或应用程序代码！\n\n以下的 T-SQL 语句将清除所做的更改，并移除新颜色，将它们恢复为原来的 `NULL`：\n\n```sql\nUPDATE\
  \ Production.Product\nSET Product.Color = NULL\nWHERE Product.ProductID = 325 --\
  \ Decal 1\nUPDATE Production.Product\nSET Product.Color = NULL\nWHERE Product.ProductID\
  \ = 326 -- Decal 2\n```\n\n### UNPIVOT\n\n`PIVOT` 有一个对应的操作，称为 `UNPIVOT`，它接收一个带列列表的查询，并将其重构为行数据。为了使用熟悉的数据来演示这一点，你将使用清单\
  \ 9-7 中的 T-SQL 将上一个示例的结果输出到一个表中，供本节使用。\n\n```sql\nSELECT @sql_command = '\nSELECT\n\
  \    *\nINTO dbo.Products_By_Color\nFROM\n    (      SELECT\n            PRODUCT.Name\
  \ AS product_name,\n            PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n\
  \            PRODUCT_INVENTORY.Quantity AS product_quantity\n        FROM Production.Product\
  \ PRODUCT\n        LEFT JOIN Production.ProductInventory PRODUCT_INVENTORY\n   \
  \         ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n    ) PRODUCT_DATA\n\
  \    PIVOT\n    (      SUM(product_quantity)\n        FOR product_color IN (';\n\
  ```\n\n清单 9-7. 用于存储数据以进行动态 UNPIVOT 演示的查询\n\n通过在 `SELECT` 语句中添加 `INTO`，上面审查的输出将被存储到表\
  \ `dbo.Products_By_Color` 中，该表将用于 `UNPIVOT` 测试。\n\n`UNPIVOT` 的语法与 `PIVOT` 类似，涉及使用类似的列列表，不同之处在于数据将被还原为行，并移除所有列出的附加列。这可以在清单\
  \ 9-8 中看到。\n\n```sql\nSELECT\n    *\nFROM\n    (SELECT\n        *\n    FROM dbo.Products_By_Color)\
  \ AS PRODUCTS_BY_COLOR\nUNPIVOT\n    (product_quantity FOR Color IN\n        ([Black],\
  \ [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])\n\
  \    ) AS UNPIVOT_DATA;\n```\n\n清单 9-8. 使用 UNPIVOT 将列标题还原为行数据\n\n图 9-5 显示了此语句输出的一个子集。\n\
  \n![A371168_1_En_9_Fig5_HTML.jpg](img/A371168_1_En_9_Fig5_HTML.jpg)\n\n图 9-5. 清单\
  \ 9-8 中 UNPIVOT 语句的输出\n\n上一节引入的所有新列都已被移除，它们对应的名称被插入到新的 `Color` 列中。`UNPIVOT` 的语法涉及三个额外的语法点，值得详细描述：\n\
  \n*   一个用于存放反透视的数量数据的新列。在本例中，我们将新列命名为 `product_quantity`，但可以使用任何名称。使用 `UNPIVOT`\
  \ 时，无需提供聚合函数，因为任何重复值都将成为结果集中的不同行。\n*   必须提供将包含列名的新列。在此示例中，我们将其命名为 `Color`。\n*  \
  \ 必须提供一个列列表，类似于编写 `PIVOT` 语句时。此列表中的每个列都将包含在结果集的行中。任何省略的列名都不会出现在结果集中。\n\n此查询的结果与原始数据不同。必须强调的是，`UNPIVOT`\
  \ 并不简单地是 `PIVOT` 的逆操作，先后应用两者很少会产生完全相同的数据集。在前面的示例中，这些数据与你在本章开始时拥有的数据有两个重要区别。\n\n\
  首先，`NULL` 值已被消除。任何未定义颜色的产品都从结果集中被剔除。结果显示了所有颜色在列表中存在且数量已定义的产品-颜色组合。第二个区别涉及数量本身。当你对一组数据应用\
  \ `PIVOT` 时，你提供了一个聚合来处理具有相同值的多行。一旦数量被求和，就无法“取消求和”。`UNPIVOT` 的结果包含产品数量总计，这些总计代表了\
  \ `production.Product` 原始数据中的多个产品。既然你已经理解了 `PIVOT` 和 `UNPIVOT` 之间的重要区别，并了解了每种操作处理数据的方式，你就可以着手让\
  \ `UNPIVOT` 变得更加灵活。\n\n\n\n### SQL PIVOT 和 UNPIVOT 高级用法\n\n#### 动态 UNPIVOT\n\n和之前一样，你希望能够从动态的列名列表应用\
  \ `UNPIVOT`，而不是被迫在代码中提前提供值。这使你可以随意进行数据或架构更改，而无需每次都为此处进行更改。第一个挑战是根据表中的列组（而非行数据）生成颜色列表。要获取所有列，有几个可用选项。第一种是回到\
  \ `Production.Product` 并使用该表中的颜色为此查询提供数据，如清单 9-9 所示。\n\n```sql\nDECLARE @colors\
  \ TABLE\n(color_name VARCHAR(25));\nINSERT INTO @colors\n(color_name)\nSELECT DISTINCT\n\
  Product.Color\nFROM Production.Product\nWHERE Product.Color IS NOT NULL;\nDECLARE\
  \ @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\n*\nFROM\n(SELECT\n\
  *\nFROM dbo.Products_By_Color) AS PRODUCTS_BY_COLOR\nUNPIVOT\n(product_quantity\
  \ FOR Color IN\n(';\nSELECT @sql_command = @sql_command + '[' + color_name + '],\
  \ '\nFROM @colors;\nSELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command)\
  \ - 1);\nSELECT @sql_command = @sql_command + ' )) AS UNPIVOT_DATA;\n';\nEXEC sp_executesql\
  \ @sql_command;\n```\n\n清单 9-9.\n使用原始行数据提供颜色名称的动态 UNPIVOT\n\n这种方法有效，并将提供与之前相同的输出，但有一个明显的限制，即之前的颜色列表可能不适用于这里。如果确实不适用，那么你需要从表架构本身收集列名数据，并用它来驱动\
  \ `UNPIVOT`。这可以通过查询系统视图 `sys.tables` 和 `sys.columns` 来实现，它们提供了有关表和列的结构与名称的信息。还有其他系统对象可以提供类似数据，例如\
  \ `INFORMATION_SCHEMA.COLUMNS`，但对于此处的示例，我们将坚持使用前述的两个视图，它们引用了 `sys.objects` 中的数据。这可以在清单\
  \ 9-10 中看到。\n\n```sql\nDECLARE @colors TABLE\n(color_name VARCHAR(25));\nINSERT\
  \ INTO @colors\n(color_name)\nSELECT\ncolumns.name\nFROM sys.tables\nINNER JOIN\
  \ sys.columns\nON columns.object_id = tables.object_id\nWHERE tables.name = 'Products_By_Color'\n\
  AND columns.name NOT IN ('product_name', 'ReorderPoint');\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\n*\nFROM\n(SELECT\n*\nFROM dbo.Products_By_Color)\
  \ AS PRODUCTS_BY_COLOR\nUNPIVOT\n(product_quantity FOR Color IN\n(';\nSELECT @sql_command\
  \ = @sql_command + '[' + color_name + '], '\nFROM @colors;\nSELECT @sql_command\
  \ = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);\nSELECT @sql_command = @sql_command\
  \ + ' )) AS UNPIVOT_DATA;\n';\nEXEC sp_executesql @sql_command;\n```\n\n清单 9-10.\n\
  使用架构元数据提供颜色名称的动态 UNPIVOT\n\n此示例中的一切都与上一个相同，唯一的区别在于颜色数据的收集，它使用了由 `sys.columns` 提供的表\
  \ `dbo.Products_By_Color` 的列名。请注意，你需要在此处提供一个例外列表，其中包含你不想 `UNPIVOT` 的任何列。在此示例中，有两个额外的列不是颜色，并且你不想将它们转换为行数据：`product_name`\
  \ 和 `ReorderPoint`。如果忘记这些例外，你可能会收到意外的输出或类似以下的错误消息：\n\n```\nMsg 8167, Level 16, State\
  \ 1, Line 329\nThe type of column \"ReorderPoint\" conflicts with the type of other\
  \ columns specified in the UNPIVOT list.\n```\n\n在这种情况下，我们将不同数据类型的列包含在了 `UNPIVOT`\
  \ 中。虽然颜色下列出的数量都是 `INT` 类型，但 `ReorderPoint` 是 `SMALLINT`，而 `product_name` 是 `NVARCHAR(50)`。例外可以像上面那样硬编码，也可以作为变量传递到运行\
  \ `UNPIVOT` TSQL 的任何地方。\n\n#### 动态 PIVOT\n\n##### 按季度分组\n\n到目前为止演示的功能非常适合教授 `PIVOT`\
  \ 和 `UNPIVOT` 的基础知识，以及将动态 SQL 集成到它们的用法中。这些操作符在现实世界中一个非常常见的用途是生成按月、季度或年分布在列标题中的会计数据。例如，如果你希望返回按季度分列标题的销售数据该怎么办？你可以将\
  \ `PIVOT` 集成到公共表表达式中，这允许你设置财务数据，然后你可以将其转换为列式数据以用于报告或进一步分析。此示例可以在清单 9-11 中看到。\n\n\
  ```sql\nWITH CTE_SALES AS (\nSELECT\nDATEPART(QUARTER, OrderDate) AS order_quarter,\n\
  DATEPART(YEAR, OrderDate) AS order_year,\nTotalDue\nFROM Sales.SalesOrderHeader)\n\
  SELECT\n*\nFROM\n(      SELECT\n*\nFROM CTE_SALES\n) PRODUCT_DATA\nPIVOT\n(    \
  \  SUM(TotalDue)\nFOR order_quarter IN ([1], [2], [3], [4])\n) PIVOT_DATA\nORDER\
  \ BY order_year ASC;\n```\n\n清单 9-11.\n使用 PIVOT 按季度对销售数据进行分组\n\n清单 9-11 中查询的结果可以在图\
  \ 9-6 中的小结果集中看到。\n\n![A371168_1_En_9_Fig6_HTML.jpg](img/A371168_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6.\n使用 PIVOT 获取按季度划分的销售额\n\n每个季度都有自己的列，销售总额聚合在下面的每一行中。`NULL` 的实例表示那些特定时间段内没有数据的情况。你也可以编写\
  \ `PIVOT` 来返回包括年份在内的所有季度作为列标题，如清单 9-12 所示。\n\n##### 按季度和年份分组\n\n```sql\nWITH CTE_SALES\
  \ AS (\nSELECT\n'Totals' AS Totals,\n'Q' + CAST(DATEPART(QUARTER, OrderDate) AS\
  \ VARCHAR(1)) + '-' +\nCAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4)) AS quarter_and_year,\n\
  TotalDue\nFROM Sales.SalesOrderHeader)\nSELECT\n*\nFROM\n(      SELECT\n*\nFROM\
  \ CTE_SALES\n) PRODUCT_DATA\nPIVOT\n(      SUM(TotalDue)\nFOR quarter_and_year IN\
  \ ([Q2-2011], [Q3-2011], [Q4-2011], [Q1-2012],[Q2-2012], [Q3-2012], [Q4-2012],\n\
  [Q1-2013],[Q2-2013], [Q3-2013], [Q4-2013], [Q1-2014], [Q2-2014])\n) PIVOT_DATA\n\
  ```\n\n清单 9-12.\n使用 PIVOT 在单个结果行中按季度和年份对销售数据进行分组\n\n通过将季度和年份组合成一个字符串，你可以将数据压缩为单行，每季度一列，包括年份。包含\
  \ `Totals` 列是为了让你有某种行标题，但对于成功检索结果集来说并非必需。\n\n此语法引入了你之前遇到的相同问题，即你被迫将季度列表硬编码到 TSQL\
  \ 中。如果添加新数据，则查询将不再有效。动态 SQL 可以再次拯救你，它允许你提前声明一个季度列表，然后将其集成到命令字符串中，该字符串将使用 `PIVOT`\
  \ 来适当地处理源数据，而不管日期如何。这在清单 9-13 中展示。\n\n##### 动态季度列表\n\n```sql\nDECLARE @quarters\
  \ TABLE\n(quarter_and_year NVARCHAR(7));\nINSERT INTO @quarters\n(quarter_and_year)\n\
  SELECT DISTINCT\n'Q' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1)) + '-' +\n\
  CAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4))\nFROM Sales.SalesOrderHeader\nDECLARE\
  \ @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nWITH CTE_SALES AS (\nSELECT\n\
  ''Totals'' AS Totals,\n''Q'' + CAST(DATEPART(QUARTER, OrderDate) AS VARCHAR(1))\
  \ + ''-'' +\nCAST(DATEPART(YEAR, OrderDate) AS VARCHAR(4)) AS quarter_and_year,\n\
  TotalDue\nFROM Sales.SalesOrderHeader)\nSELECT\n*\nFROM\n(      SELECT\n*\nFROM\
  \ CTE_SALES\n) PRODUCT_DATA\nPIVOT\n(      SUM(TotalDue)\nFOR quarter_and_year IN\
  \ ('\nSELECT @sql_command = @sql_command + '[' + quarter_and_year + '], '\nFROM\
  \ @quarters;\nSELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command)\
  \ - 1);\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA\n';\nPRINT @sql_command;\n\
  EXEC sp_executesql @sql_command;\n```\n\n清单 9-13.\n用于返回任意季度数财务数据的动态 PIVOT\n\n\n\
  #### 多个 PIVOT 操作符\n\n下一个示例展示了 `PIVOT` 更高级的用法。之前你只对单列（产品颜色或销售季度）使用 `PIVOT`，但实际上可以将此操作符应用于具有不同值的多个列。假设你想按颜色和安全库存级别对产品数据进行汇总分析？这可以通过单个查询完成，如代码清单\
  \ 9-14 所示。\n\n```sql\nSELECT\n    *\nFROM\n    (\n        SELECT\n            PRODUCT.Name\
  \ AS product_name,\n            PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n\
  \            PRODUCT_INVENTORY.Quantity AS product_quantity,\n            PRODUCT.SafetyStockLevel\n\
  \        FROM Production.Product PRODUCT\n        LEFT JOIN Production.ProductInventory\
  \ PRODUCT_INVENTORY\n            ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n\
  \    ) PRODUCT_DATA\nPIVOT\n    (\n        SUM(product_quantity)\n        FOR product_color\
  \ IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White],\
  \ [Yellow])\n    ) PIVOT_DATA_COLOR\nPIVOT\n    (\n        COUNT(SafetyStockLevel)\n\
  \        FOR SafetyStockLevel IN ([4], [60], [100], [500], [800], [1000])\n    )\
  \ PIVOT_DATA_LEVEL\n```\n\n代码清单 9-14. 在单条 T-SQL 语句中使用多个 PIVOT 操作符\n\n代码清单 9-14 中的查询将返回如图\
  \ 9-7 所示的结果。\n\n![A371168_1_En_9_Fig7_HTML.jpg](img/A371168_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7. 使用两个 PIVOT 操作符进行数据聚合的查询结果\n\n结果集中添加了一组新的列，表示特定的 `SafetyStockLevel` 值与列表中提供的值匹配的次数。如果你想在单个查询中并排报告多个指标，而不是连接多个结果集，这会是一个非常方便的技巧。\n\
  \n##### 结合动态 SQL 使用多个 PIVOT\n\n你可以像之前一样实现动态 SQL，以确保两个指标的所有列表值都被正确计算。这样做时，除了 `Color`\
  \ 的表变量外，你还需要为 `SafetyStockLevel` 值包含一个单独的表变量，如代码清单 9-15 所示。\n\n```sql\nDECLARE @colors\
  \ TABLE\n    (color_name VARCHAR(25));\nINSERT INTO @colors\n    (color_name)\n\
  SELECT DISTINCT\n    Product.Color\nFROM Production.Product\nWHERE Product.Color\
  \ IS NOT NULL;\n\nDECLARE @stock_levels TABLE\n    (safety_stock_level SMALLINT);\n\
  INSERT INTO @stock_levels\nSELECT DISTINCT\n    Product.SafetyStockLevel\nFROM Production.Product;\n\
  \nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\n    *\n\
  FROM\n    (\n        SELECT\n            PRODUCT.Name AS product_name,\n       \
  \     PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n     \
  \       PRODUCT_INVENTORY.Quantity AS product_quantity,\n            PRODUCT.SafetyStockLevel\n\
  \        FROM Production.Product PRODUCT\n        LEFT JOIN Production.ProductInventory\
  \ PRODUCT_INVENTORY\n            ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n\
  \    ) PRODUCT_DATA\nPIVOT\n    (\n        SUM(product_quantity)\n        FOR product_color\
  \ IN (';\n\nSELECT @sql_command = @sql_command + '[' + color_name + '], '\nFROM\
  \ @colors;\n\nSELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command)\
  \ - 1);\n\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA_COLOR\nPIVOT\n \
  \   (\n        COUNT(SafetyStockLevel)\n        FOR SafetyStockLevel IN (';\n\n\
  SELECT @sql_command = @sql_command + '[' + CAST(safety_stock_level AS NVARCHAR)\
  \ + '], '\nFROM @stock_levels;\n\nSELECT @sql_command = SUBSTRING(@sql_command,\
  \ 1, LEN(@sql_command) - 1);\n\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA_LEVEL\n\
  ';\n\nPRINT @sql_command;\nEXEC sp_executesql @sql_command;\n```\n\n代码清单 9-15. 使用动态\
  \ SQL 结合多个 PIVOT 操作符\n\n结果集与之前完全一致。你可以通过查看命令字符串文本来验证是否出错：\n\n```sql\nSELECT\n  \
  \  *\nFROM\n    (\n        SELECT\n            PRODUCT.Name AS product_name,\n \
  \           PRODUCT.Color AS product_color,\n            PRODUCT.ReorderPoint,\n\
  \            PRODUCT_INVENTORY.Quantity AS product_quantity,\n            PRODUCT.SafetyStockLevel\n\
  \        FROM Production.Product PRODUCT\n        LEFT JOIN Production.ProductInventory\
  \ PRODUCT_INVENTORY\n            ON PRODUCT.ProductID = PRODUCT_INVENTORY.ProductID\n\
  \    ) PRODUCT_DATA\nPIVOT\n    (\n        SUM(product_quantity)\n        FOR product_color\
  \ IN ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White],\
  \ [Yellow])\n    ) PIVOT_DATA_COLOR\nPIVOT\n    (\n        COUNT(SafetyStockLevel)\n\
  \        FOR SafetyStockLevel IN ([4], [60], [100], [500], [800], [1000])\n    )\
  \ PIVOT_DATA_LEVEL\n```\n\n将多个 `PIVOT` 操作符与动态 SQL 结合使用，在根据多列内容生成列式数据时提供了极大的灵活性。通过在单个查询中生成结果集，你能确保关系的完整性，并避免在将数据输出到中间位置时出错。其语法与单个\
  \ `PIVOT` 完全相同，并且随着你添加更多实例，复杂度并不会显著增加。\n\n### 多个 UNPIVOT 操作符\n\n作为本章的最后一个示例，你将基于目前的工作，对结果集执行\
  \ `UNPIVOT`。这将通过使用多个 `UNPIVOT` 操作符来完成。请记住，此操作的结果集不会与上一个示例开始时的原始输入数据相同。虽然 `UNPIVOT`\
  \ 的结果将是有意义的，但重要的是要记住，对数据集应用 `PIVOT` 和 `UNPIVOT` 不太可能返回与该数据等价的结果。粒度信息常常会丢失且无法复原，无论你的\
  \ TSQL 技巧多么高超！\n\n第一步是将上一个示例中的数据存储到一个表中，以便在 `UNPIVOT` 中重用：\n\n```\nSELECT @sql_command\
  \ = '\nSELECT\n*\nINTO dbo.Products_By_Color_and_Stock_Level\nFROM\n(      SELECT\n\
  ```\n\n创建了表 `Products_By_Color_and_Stock_Level` 用于存储透视后的输出，在本章的剩余部分你都将使用它。首次尝试 `UNPIVOT`\
  \ 如代码清单 9-16 所示。\n\n```\nSELECT\n*\nFROM\n(SELECT\n*\nFROM dbo.Products_By_Color_and_Stock_Level)\
  \ AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL\nUNPIVOT\n(product_quantity FOR Color IN\n\
  ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])\n\
  ) AS UNPIVOT_DATA_COLOR\nUNPIVOT\n(safety_stock_level FOR SafetyStockLevel IN\n\
  ([4], [60], [100], [500], [800], [1000])\n) AS UNPIVOT_DATA_STOCK_LEVEL;\n```\n\n\
  代码清单 9-16. 首次尝试在单个语句中使用两个 UNPIVOT 操作符\n\n代码清单 9-16 中的查询返回了结果，但这些结果有点可疑，如图 9-8 中的结果集所示。\n\
  \n![A371168_1_En_9_Fig8_HTML.jpg](img/A371168_1_En_9_Fig8_HTML.jpg)\n\n图 9-8. 使用两个\
  \ UNPIVOT 操作符但构造不当的查询结果\n\n请注意，每个产品返回了六行。由于安全库存水平被定义为非 `NULL` 的计数，`UNPIVOT` 操作将所有值视为有效值，并为每个值返回行。理想情况下，你希望将颜色和库存水平的列名都透视为行值，但假设所有库存水平的零值都被省略。有多种方法可以解决这个问题，你将使用额外的\
  \ `WHERE` 子句完全移除零值，如代码清单 9-17 所示。\n\n```\nSELECT\nproduct_name,\nReorderPoint,\n\
  product_quantity,\nColor,\nSafetyStockLevel\nFROM\n(SELECT\n*\nFROM dbo.Products_By_Color_and_Stock_Level)\
  \ AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL\nUNPIVOT\n(product_quantity FOR Color IN\n\
  ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black], [White], [Yellow])\n\
  ) AS UNPIVOT_DATA_COLOR\nUNPIVOT\n(safety_stock_level FOR SafetyStockLevel IN\n\
  ([4], [60], [100], [500], [800], [1000])\n) AS UNPIVOT_DATA_STOCK_LEVEL\nWHERE safety_stock_level\
  \ <> 0;\n```\n\n代码清单 9-17. 移除了零值的 UNPIVOT 示例\n\n通过过滤 `safety_stock_level <> 0`，你移除了零值。此外，你显式地为输出集选择了列，使得\
  \ `safety_stock_level` 不被包含在内，因为它对结果集不再重要（结果将只包含一）。现在结果看起来更干净，更接近你最初预期的样子，如图 9-9\
  \ 所示。\n\n![A371168_1_En_9_Fig9_HTML.jpg](img/A371168_1_En_9_Fig9_HTML.jpg)\n\n图\
  \ 9-9. 代码清单 9-17 中修正后的 UNPIVOT 查询结果\n\n现在每一列都填充了有意义的值，零值和额外的占位符 `safety_stock_level`\
  \ 列已被移除。\n\n现在你已经有了一个使用多个 `UNPIVOT` 操作符的有效查询，你可以对其应用动态 SQL，以便返回在 `Products_By_Color_and_Stock_Level`\
  \ 表中找到的任何 `Color` 或 `SafetyStockLevel` 值的结果。这个有趣的查询可以在代码清单 9-18 中找到。\n\n```\nDECLARE\
  \ @colors TABLE\n(color_name VARCHAR(25));\nINSERT INTO @colors\n(color_name)\n\
  SELECT\ncolumns.name\nFROM sys.tables\nINNER JOIN sys.columns\nON columns.object_id\
  \ = tables.object_id\nWHERE tables.name = 'Products_By_Color_and_Stock_Level'\n\
  AND columns.name NOT IN ('product_name', 'ReorderPoint')\nAND ISNUMERIC(columns.name)\
  \ = 0;\nDECLARE @stock_levels TABLE\n(safety_stock_level SMALLINT);\nINSERT INTO\
  \ @stock_levels\nSELECT\ncolumns.name\nFROM sys.tables\nINNER JOIN sys.columns\n\
  ON columns.object_id = tables.object_id\nWHERE tables.name = 'Products_By_Color_and_Stock_Level'\n\
  AND columns.name NOT IN ('product_name', 'ReorderPoint')\nAND ISNUMERIC(columns.name)\
  \ = 1;\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\nproduct_name,\n\
  ReorderPoint,\nproduct_quantity,\nColor,\nSafetyStockLevel\nFROM\n(SELECT\n*\nFROM\
  \ dbo.Products_By_Color_and_Stock_Level) AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL\n\
  UNPIVOT\n(product_quantity FOR Color IN\n(';\nSELECT @sql_command = @sql_command\
  \ + '[' + color_name + '], '\nFROM @colors;\nSELECT @sql_command = SUBSTRING(@sql_command,\
  \ 1, LEN(@sql_command) - 1);\nSELECT @sql_command = @sql_command + ' )) AS UNPIVOT_DATA_COLOR\n\
  UNPIVOT\n(safety_stock_level FOR SafetyStockLevel IN\n('\nSELECT @sql_command =\
  \ @sql_command + '[' + CAST(safety_stock_level AS NVARCHAR) + '], '\nFROM @stock_levels;\n\
  SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);\nSELECT\
  \ @sql_command = @sql_command + ' )) AS UNPIVOT_DATA_STOCK_LEVEL\nWHERE safety_stock_level\
  \ <> 0;';\nPRINT @sql_command;\nEXEC sp_executesql @sql_command;\n```\n\n代码清单 9-18.\
  \ 与多个 UNPIVOT 操作符结合使用的动态 SQL\n\n这里的第一个挑战是将列名解析到每个表变量中以供后续使用。在这种情况下，你很幸运，因为颜色都是字符串数据，而库存水平都是数字。通过检查列名是否为数字，你可以将列名拆分为两个有意义的列表。如果列名不易分离，你可以将初始数据分离到多个临时表中，而不是全部放入\
  \ `Products_By_Color_and_Stock_Level`。\n\n为了避免增加更多复杂性，划分列的一个可能更好的方法是为每列标记一个有意义的名称。对于此示例，颜色可以用\
  \ `Color:` 作为前缀，库存水平用 `StockLevel:` 作为前缀。当你为每个表变量的可能值筛选列名时，可以轻松检查这些前缀。由于你确定了这些前缀的结构，因此可以确保它们是唯一、有意义的，并允许你将数据维护在单个临时表中。\n\
  \n这样的 `UNPIVOT` 操作的命令字符串将如下所示：\n\n```\nSELECT\nproduct_name,\nReorderPoint,\nproduct_quantity,\n\
  Color,\nSafetyStockLevel\nFROM\n(SELECT\n*\nFROM dbo.Products_By_Color_and_Stock_Level)\
  \ AS PRODUCTS_BY_COLOR_AND_STOCK_LEVEL\nUNPIVOT\n(product_quantity FOR Color IN\n\
  ([Black], [Blue], [Grey], [Multi], [Red], [Silver], [Silver/Black],\n[White], [Yellow]))\
  \ AS UNPIVOT_DATA_COLOR\nUNPIVOT\n(safety_stock_level FOR SafetyStockLevel IN\n\
  ([4], [60], [100], [500], [800], [1000])) AS UNPIVOT_DATA_STOCK_LEVEL\nWHERE safety_stock_level\
  \ <> 0;\n```\n\n这段 TSQL（除了细微的格式差异）与你未使用动态 SQL 时测试的语句完全相同。结果集也与之前返回的完全相同。请注意生成结果的行数，如图\
  \ 9-10 所示。\n\n![A371168_1_En_9_Fig10_HTML.jpg](img/A371168_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10. 代码清单 9-18 中 UNPIVOT 查询的行数\n\n\n总共返回了 184 行数据，这远小于你最初处理的数据集大小。原始数据集取自 `Production.Product`\
  \ 和 `Production.ProductInventory` 表，包含 1,141 行数据。`PIVOT` 操作的结果将其减少到 504 行。随着每次操作，由于对结果进行了聚合，数据集的粒度会降低。因此，需要记住的是，即使\
  \ `PIVOT` 和 `UNPIVOT` 交替使用，通常也无法将数据集恢复为其原始形式。因此，请将这些转换操作视为高效获取报表数据的方法，而非用于重构或验证数据。虽然有可能构建一系列\
  \ `PIVOT` 和 `UNPIVOT` 操作，将数据逆向转换为其原始结构和内容，但这不太可能是一个有用的练习。\n\n利用多个 `UNPIVOT` 操作，可以将复杂的报表数据集回退为汇总数据，以便用于进一步的报表，或者作为一种将列式数据输入事务系统而非行数据的方式。使用动态\
  \ SQL 可以高效地考虑所有可能的列值，即使这些列的集合会随时间而变化！\n\n### 结论\n\n`PIVOT` 和 `UNPIVOT` 操作符常被 DBA\
  \ 和开发者视为高级或难用的操作符，应尽可能避免使用。然而，针对所提出的用例，它们能够以原子化和基于集合的方式快速提供大量数据。作为性能上的额外好处，无需实现循环、游标或其他迭代解决方案，这些方案在处理较大数据量时可能运行缓慢或耗费资源。\n\
  \n这些操作符面临的最大挑战是，必须在运行时之前明确提供列列表。硬编码这些值会大大增加相关的技术债务，因为每当相关应用程序或数据库发生更改时，你都需要跟踪并更新这些值。这种维护成本很高，并且为软件\
  \ Bug 的显现提供了机会，而这些 Bug 很难避免且难以诊断。\n\n将动态 SQL 与 `PIVOT` 或 `UNPIVOT` 结合使用，允许开发者根据选择的任何标准在运行时生成列列表。只要此逻辑是相关的，当添加新值或删除旧值时，就无需调整存储过程或代码。\n\
  \n# 10. 解决常见问题\n\n动态 SQL 提供了一个独特的机会，可以快速解决常见的数据库问题或限制。通常，你会遇到令人沮丧的情况，即你管理着不同的数据库、架构或设置，却没有简单的方法对混合的对象集合进行更改。本章试图向你展示如何使用动态\
  \ SQL 来解决此类复杂情况。此外，本章还提供了适用于任何类似数据库问题的一般准则和技术。\n\n### 排序规则冲突\n\n#### 问题描述\n\n数据库排序规则通常被用作在\
  \ SQL Server 中管理多种语言或字符集的一种有意义的方式。西班牙语中的字符排序顺序与英语或日语不同，对其中任何一种语言使用英语排序规则都可能导致字符串排序不正确。实际上，SQL\
  \ Server 会阻止对具有不同排序规则的字符串数据进行直接赋值或比较。如果你正在处理多种排序规则的数据，则必须考虑这些差异，以确保根据正确的业务逻辑对其进行操作。\n\
  \n为了测试排序规则，你将创建一个新的数据库和表，并使用来自 `AdventureWorks` 的数据进行填充，如代码清单 10-1 所示。\n\n```sql\n\
  IF EXISTS (SELECT * FROM sys.databases WHERE name = 'Collation_Test')\nBEGIN\nDROP\
  \ DATABASE Collation_Test;\nEND\nGO\nCREATE DATABASE Collation_Test COLLATE Traditional_Spanish_CI_AS;\n\
  GO\nUSE Collation_Test;\nGO\nCREATE TABLE dbo.Spanish_Employees\n(       BusinessEntityID\
  \ INT NOT NULL,\nNationalIDNumber NVARCHAR(15) NOT NULL,\nLoginID NVARCHAR(256)\
  \ NOT NULL,\nOrganizationNode HIERARCHYID NULL,\nOrganizationLevel SMALLINT NULL,\n\
  JobTitle NVARCHAR(50) NOT NULL,\nBirthDate DATE NOT NULL,\nMaritalStatus NCHAR(1)\
  \ NOT NULL,\nGender NCHAR(1) NOT NULL,\nHireDate DATE NOT NULL,\nSalariedFlag BIT\
  \ NOT NULL,\nVacationHours SMALLINT NOT NULL,\nSickLeaveHours SMALLINT NOT NULL,\n\
  CurrentFlag BIT NOT NULL,\nrowguid UNIQUEIDENTIFIER ROWGUIDCOL  NOT NULL,\nModifiedDate\
  \ DATETIME NOT NULL,);\nGO\nINSERT INTO Collation_Test.dbo.Spanish_Employees\nSELECT\n\
  *\nFROM AdventureWorks2014.HumanResources.Employee;\n```\n代码清单 10-1. 为排序规则测试构建测试数据库\n\
  \n注意，当创建数据库 `Collation_Test` 时，它被显式指定了排序规则 `Traditional_Spanish_CI_AS`。默认情况下，该数据库中的所有字符串都将以此新的排序规则存储和排序，而不是使用实例默认值或其他数据库上的设置。在我的\
  \ SQL Server 上，默认排序规则是 `SQL_Latin1_General_CP1_CI_AS`。这可以在 GUI 的服务器属性中验证，如图 10-1\
  \ 所示。\n\n![A371168_1_En_10_Fig1_HTML.jpg](img/A371168_1_En_10_Fig1_HTML.jpg)\n图\
  \ 10-1. SQL Server 属性窗口中显示的默认服务器排序规则\n\n在“服务器排序规则”选项下，你可以找到服务器的默认值。这是在任何未提供其他排序规则的新创建数据库上将使用的排序规则。这也可以使用\
  \ TSQL 进行验证：\n\n```sql\nSELECT SERVERPROPERTY('Collation') AS ServerDefaultCollation;\n\
  ```\n\n得到的排序规则与 GUI 中显示的相同，可以在图 10-2 中验证。\n\n![A371168_1_En_10_Fig2_HTML.jpg](img/A371168_1_En_10_Fig2_HTML.jpg)\n\
  图 10-2. 我测试服务器上的默认排序规则\n\n为了说明不同排序规则之间的差异之一，我们将查看 `HumanResources.Employee` 表，重点关注原始表和使用传统西班牙语排序规则新创建表中的\
  \ `JobTitle` 列。代码清单 10-2 显示了这两个查询。\n\n```sql\nSELECT\n*\nFROM AdventureWorks2014.HumanResources.Employee\n\
  WHERE JobTitle LIKE 'C%'\nORDER BY JobTitle;\nSELECT\n*\nFROM Collation_Test.dbo.Spanish_Employees\n\
  WHERE JobTitle LIKE 'C%'\nORDER BY JobTitle;\n```\n代码清单 10-2. 展示两种不同排序规则差异的两个测试查询\n\
  \n查询结果有点不寻常，表明每种排序规则之间存在显著差异，如图 10-3 所示。\n\n![A371168_1_En_10_Fig3_HTML.jpg](img/A371168_1_En_10_Fig3_HTML.jpg)\n\
  图 10-3. 不同的排序规则导致相同的查询给出不同的结果\n\n\n\n### 排序规则与动态 SQL 解决方案\n\n第二个结果集只返回了两行数据，而原始的\
  \ `AdventureWorks` 表中还包含了另外两名高管。为什么结果会不同？事实证明，在传统西班牙语排序规则中，字母“CH”被视为一个独立的字母。你可以像这样查看那些职位名称以这些字符开头的数据行：\n\
  \n```sql\nSELECT\n*\nFROM Collation_Test.dbo.Spanish_Employees\nWHERE JobTitle LIKE\
  \ 'CH%'\nORDER BY JobTitle;\n```\n\n此查询返回的结果如图 10-4 所示。\n\n![A371168_1_En_10_Fig4_HTML.jpg](img/A371168_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4.\n西班牙语排序规则中“C”和“CH”的区别说明\n\n由于语言差异，筛选条件 `C%` 不会包含由筛选条件 `CH%` 返回的结果。此外，这些字母的排序方式也与拉丁语排序规则下的通常情况不同：\n\
  \n```sql\nSELECT\n*\nFROM Collation_Test.dbo.Spanish_Employees\nWHERE JobTitle BETWEEN\
  \ 'C' AND 'D'\nORDER BY JobTitle;\n```\n\n此查询返回了所有四个结果，如图 10-5 所示。\n\n![A371168_1_En_10_Fig5_HTML.jpg](img/A371168_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5.\n传统西班牙语排序规则中的排序差异\n\n在这种排序规则下，“C”在字母表中排在“CH”之前。这看起来可能是个微小的差异，但对于进行网络搜索的用户来说，这些结果很容易导致错误的假设。例如，假设用户如上所示进行搜索，返回了两个结果，但她可能从未意识到表中还有另外两名员工可能是她要找的。\n\
  \n可以如清单 10-3 所示，在任何结果集上强制应用排序规则。\n\n```sql\nSELECT\n*\nFROM Collation_Test.dbo.Spanish_Employees\n\
  WHERE JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS LIKE 'C%'\nORDER BY JobTitle\
  \ COLLATE SQL_Latin1_General_CP1_CI_AS;\nSELECT\n*\nFROM Collation_Test.dbo.Spanish_Employees\n\
  WHERE JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS BETWEEN 'C' AND 'D'\nORDER BY\
  \ JobTitle COLLATE SQL_Latin1_General_CP1_CI_AS;\n```\n清单 10-3.\n在筛选和排序中对结果集强制应用特定排序规则\n\
  \n这些查询的结果返回了通常期望的数据，如图 10-6 所示。\n\n![A371168_1_En_10_Fig6_HTML.jpg](img/A371168_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6.\n强制应用排序规则以返回所需结果\n\n最后一个排序规则冲突的例子发生在你尝试直接比较来自任何一种排序规则与另一种排序规则的列时：\n\n\
  ```sql\nSELECT\n*\nFROM Collation_Test.dbo.Spanish_Employees\nINNER JOIN AdventureWorks2014.HumanResources.Employee\n\
  ON Spanish_Employees.LoginID = Employee.LoginID;\n```\n\n此查询将导致错误：\n\n```\nMsg 468,\
  \ Level 16, State 9, Line 94\nCannot resolve the collation conflict between \"SQL_Latin1_General_CP1_CI_AS\"\
  \ and \"Traditional_Spanish_CI_AS\" in the equal to operation.\n```\n\n为了使此查询生效，你必须强制将一个联接列的排序规则转换为与另一个相匹配。转换哪种排序规则取决于具体的用例场景，但如果不进行更改，你将无法对来自任一数据集的结果进行联接、筛选或比较：\n\
  \n```sql\nSELECT\n*\nFROM Collation_Test.dbo.Spanish_Employees\nINNER JOIN AdventureWorks2014.HumanResources.Employee\n\
  ON Spanish_Employees.LoginID = Employee.LoginID COLLATE Traditional_Spanish_CI_AS\n\
  ```\n\n通过强制在联接谓词上应用排序规则，你可以确保每一列都能与另一列进行比较，并且结果能够正确返回。这是针对特定场景的具体解决方案，但我们可以通过使用动态\
  \ SQL 来解决此类问题的所有变体，从而做得更好！\n\n#### 解决方案\n\n当确切知道运行查询时会遇到什么排序规则时，强制应用特定排序规则是有效的。如果你正在处理许多不同的排序规则，并且直到运行时才知道要按哪种排序规则排序，该怎么办？如果你管理着许多服务器和数据库，每个都有不同的默认排序规则，那么在运行时转换排序规则时就无法做出假设。此外，将所有列强制转换为特定排序规则可能会以用户或应用程序无法接受的方式影响输出。\n\
  \n动态 SQL 可以帮助你将一个六页长的问题变成一个一页长的解决方案！通过像上面那样返回服务器或数据库的默认排序规则，你总是能够以正确的排序规则返回或比较数据。清单\
  \ 10-4 中的脚本将导致排序规则冲突错误。\n\n```sql\nUSE AdventureWorks2014\nGO\nDECLARE @temp_employees\
  \ TABLE\n(       id INT NOT NULL IDENTITY(1,1),\nLoginID NVARCHAR(256) NOT NULL\
  \        );\nINSERT INTO @temp_employees\n(LoginID)\nSELECT TOP 50\nLoginID\nFROM\
  \ AdventureWorks2014.HumanResources.Employee\nORDER BY Employee.JobTitle;\nSELECT\n\
  Spanish_Employees.NationalIDNumber,\nSpanish_Employees.LoginID,\nSpanish_Employees.JobTitle,\n\
  Spanish_Employees.BirthDate,\nSpanish_Employees.HireDate\nFROM Collation_Test.dbo.Spanish_Employees\n\
  WHERE Spanish_Employees.LoginID IN\n(SELECT LoginID FROM @temp_employees);\n```\n\
  清单 10-4.\n使用表变量导致的排序规则冲突示例\n\n临时表和表变量是使用 `TempDB` 数据库的排序规则创建的，这通常与服务器的默认排序规则相匹配。在本例中，表变量是使用拉丁语排序规则创建的，而你要检查的\
  \ `LoginID` 则是西班牙语排序规则。这可以使用清单 10-5 中所示的动态 SQL 进行永久修正。\n\n```sql\nUSE AdventureWorks2014\n\
  GO\nDECLARE @sql_command NVARCHAR(MAX);\nDECLARE @server_collation NVARCHAR(50);\n\
  SELECT @server_collation = CAST(SERVERPROPERTY('Collation') AS NVARCHAR(50));\n\
  SELECT @sql_command = '\nDECLARE @temp_employees TABLE\n(       id INT NOT NULL\
  \ IDENTITY(1,1),\nLoginID NVARCHAR(256) NOT NULL        );\nINSERT INTO @temp_employees\n\
  (LoginID)\nSELECT TOP 50\nLoginID\nFROM AdventureWorks2014.HumanResources.Employee\n\
  ORDER BY Employee.JobTitle;\nSELECT\nSpanish_Employees.NationalIDNumber,\nSpanish_Employees.LoginID,\n\
  Spanish_Employees.JobTitle,\nSpanish_Employees.BirthDate,\nSpanish_Employees.HireDate\n\
  FROM Collation_Test.dbo.Spanish_Employees\nWHERE Spanish_Employees.LoginID IN\n\
  (SELECT LoginID COLLATE ' + @server_collation + ' FROM @temp_employees);'\nEXEC\
  \ sp_executesql @sql_command;\n```\n清单 10-5.\n使用动态 SQL 解决排序规则冲突\n\n清单 10-5 中的方法可以反过来使用，以处理具有特定数据库排序规则的数据。清单\
  \ 10-6 中的脚本将使用测试数据库的默认排序规则（而不是服务器排序规则）返回数据。\n\n```sql\nUSE master\nGO\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @database_name NVARCHAR(128) = 'Collation_Test';\nDECLARE\
  \ @collation_name NVARCHAR(50);\nSELECT @collation_name = collation_name\nFROM sys.databases\
  \ WHERE databases.name = @database_name;\nSELECT @sql_command = '\nSELECT\nSpanish_Employees.NationalIDNumber,\n\
  Spanish_Employees.LoginID,\nSpanish_Employees.JobTitle,\nSpanish_Employees.BirthDate,\n\
  Spanish_Employees.HireDate\nFROM Collation_Test.dbo.Spanish_Employees\nWHERE Spanish_Employees.LoginID\
  \ IN\n(SELECT TOP 50 LoginID COLLATE ' + @collation_name + '\nFROM AdventureWorks2014.HumanResources.Employee\
  \ ORDER BY LoginID COLLATE ' + @collation_name + ')';\nEXEC sp_executesql @sql_command;\n\
  ```\n清单 10-6.\n使用动态 SQL 将数据整理到特定数据库的默认排序规则中\n\n此示例展示了如何从 `sys.databases` 返回数据库的默认排序规则，并使用该数据快速解决原本会是排序规则冲突的问题。\n\
  \n\n#### 问题\n\n在处理数据的归档或迁移时，你可能希望根据日期、时间或应用程序，为表、数据库或架构等对象赋予自定义名称。若使用标准 TSQL，这将非常困难，除非编写复杂的应用程序代码来管理整个过程。\n\
  \n假设你有一个增长非常迅速的日志表，但你永远不需要超过一周前的数据。将当前周的数据隔离到单个分区是一种解决方案，但这仅在企业版中可用。此外，你可能希望将旧数据移动到不同的服务器或存储环境。如果涉及这种情况或任何类似情况，那么自行管理流程可能是一个更简单且可移植性更强的解决方案。\n\
  \n此示例使用基于日期和时间的各种数据填充一个表，如清单 10-7 所示。\n\n```sql\nCREATE TABLE dbo.Database_Log\n\
  (log_id INT NOT NULL IDENTITY(1,1) CONSTRAINT PK_Database_Log PRIMARY KEY CLUSTERED,\n\
  Log_Time DATETIME,\nLog_Data NVARCHAR(1000));\nDECLARE @datetime DATETIME = CURRENT_TIMESTAMP;\n\
  DECLARE @datediff TABLE\n(previous_hour SMALLINT);\nDECLARE @count SMALLINT = 0;\n\
  WHILE @count <= 360\nBEGIN\nINSERT INTO @datediff\n(previous_hour)\nSELECT @count;\n\
  SELECT @count = @count + 1\nEND\nSELECT @count = 0;\nWHILE @count <= 1000\nBEGIN\n\
  INSERT INTO Database_Log\n(Log_Time, Log_Data)\nSELECT\nDATEADD(HOUR, -1 * previous_hour,\
  \ CURRENT_TIMESTAMP),\nCAST(DATEADD(HOUR, -1 * previous_hour, CURRENT_TIMESTAMP)\
  \ AS NVARCHAR)\nFROM @datediff;\nSELECT @count = @count + 1;\nEND\n```\n清单 10-7.\
  \ 为归档演示创建数据库日志数据\n\n此脚本创建了一个名为 `Database_Log` 的表，并用 361,361 行数据填充它，这些数据包含各种日志时间以及这些时间的字符串转换。数据如图\
  \ 10-7 所示。\n\n![A371168_1_En_10_Fig7_HTML.jpg](img/A371168_1_En_10_Fig7_HTML.jpg)\n\
  图 10-7. 清单 10-7 中创建的数据库日志数据样本\n\n假设你想每周将数据归档到一个包含一周数据的新表中。这通常需要大量人工劳动才能正确管理表名。如果你还想按年份将数据分离到不同的数据库中，使得每个日历年都有其自己唯一的数据库呢？这可能看起来像是一个不寻常的用例，但围绕时间切片移动大量数据的需求非常普遍。动态\
  \ SQL 技术可以应用于任何类似的问题，而不管具体的对象或业务规则如何。\n\n为了提供一些将归档到其他数据库的旧数据，让我们再运行一个数据填充脚本来进一步增加数据量，如清单\
  \ 10-8 所示。\n\n```sql\nDECLARE @year_offset TINYINT = 5;\nWHILE @year_offset > 0\n\
  BEGIN\nINSERT INTO dbo.Database_Log\n(Log_Time, Log_Data)\nSELECT TOP 10000\nDATEADD(YEAR,\
  \ -1 * @year_offset, Log_Time),\nCAST(DATEADD(YEAR, -1 * @year_offset, Log_Time)\
  \ AS NVARCHAR)\nFROM Database_Log\nSELECT @year_offset = @year_offset - 1;\nEND\n\
  ```\n清单 10-8. 用于增加 Database_Log 表中数据大小的脚本\n\n现在，你又有了来自多达五年前的额外 50,000 行数据，这可以轻松地演示该问题。利用这些数据，我们可以更好地理解归档数据以及根据特定业务需求定制目标的方法。\n\
  \n#### 解决方案\n\n为了正确处理这些数据，你需要执行以下任务：\n1.  按时间段从日志表中读取数据。\n2.  创建新的数据库或表对象（如果它们尚不存在）。\n\
  3.  将数据插入这些对象中。\n4.  从日志表中删除已归档的数据。\n\n清单 10-9 中的脚本将完成前述任务。\n\n```sql\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nDECLARE @parameter_list NVARCHAR(MAX) = '@start_of_week DATETIME,\
  \ @end_of_week DATETIME';\nDECLARE @min_datetime DATETIME;\nSELECT @min_datetime\
  \ = MIN(Log_Time) FROM Database_Log;\nDECLARE @previous_min_time DATETIME = '1/1/1900';\n\
  DECLARE @start_of_week DATETIME = CAST(DATEADD(dd, -1 * (DATEPART(dw, @min_datetime)\
  \ - 1), @min_datetime) AS DATE);\nDECLARE @end_of_week DATETIME = DATEADD(WEEK,\
  \ 1, @start_of_week);\nDECLARE @current_year SMALLINT;\nDECLARE @current_week TINYINT;\n\
  DECLARE @database_name NVARCHAR(128);\nDECLARE @table_name NVARCHAR(128);\nWHILE\
  \ (@previous_min_time < @min_datetime)\nBEGIN\nSELECT @current_year = DATEPART(YEAR,\
  \ @start_of_week);\nSELECT @current_week = DATEPART(WEEK, @start_of_week);\nSELECT\
  \ @database_name = 'Database_Log_' + CAST(@current_year AS NVARCHAR);\nSELECT @table_name\
  \ = 'Database_Log_' + CAST(@current_year AS NVARCHAR) + '_' + CAST(@current_week\
  \ AS NVARCHAR)\n-- Create the yearly database if it does not already exist\nIF NOT\
  \ EXISTS (SELECT * FROM sys.databases WHERE databases.name = @database_name)\nBEGIN\n\
  SELECT @sql_command = 'CREATE DATABASE [' + @database_name + ']';\nEXEC sp_executesql\
  \ @sql_command;\nEND\n-- Create the weekly table if it does not already exist\n\
  SELECT @sql_command = '\nUSE [' + @database_name + '];\nIF NOT EXISTS (SELECT *\
  \ FROM sys.tables WHERE tables.name = ''' + @table_name + ''')\nBEGIN\nCREATE TABLE\
  \ [dbo].[' + @table_name + ']\n(Log_Id INT NOT NULL CONSTRAINT PK_Database_Log_'\
  \ + CAST(@current_year AS NVARCHAR) + '_' + CAST(@current_week AS NVARCHAR) + '\
  \ PRIMARY KEY CLUSTERED,\nLog_Time DATETIME,\nLog_Data NVARCHAR(1000));\nEND'\n\
  EXEC sp_executesql @sql_command;\nSELECT @sql_command = '\nINSERT INTO [' + @database_name\
  \ + '].[dbo].[' + @table_name + ']\n(Log_Id, Log_Time, Log_Data)\nSELECT\nLog_Id,\n\
  Log_Time,\nLog_Data\nFROM AdventureWorks2014.dbo.Database_Log\nWHERE Log_Time >=\
  \ @start_of_week\nAND Log_Time < @end_of_week\nAND Log_Time < DATEADD(WEEK, -1,\
  \ CURRENT_TIMESTAMP);'\nEXEC sp_executesql @sql_command, @parameter_list, @start_of_week,\
  \ @end_of_week\nSELECT @previous_min_time = @min_datetime;\nSELECT @min_datetime\
  \ = MIN(Log_Time) FROM Database_Log;\nSELECT @start_of_week = CAST(DATEADD(dd, -1\
  \ * (DATEPART(dw, @min_datetime) - 1), @min_datetime) AS DATE);\nSELECT @end_of_week\
  \ = DATEADD(WEEK, 1, @start_of_week);\nEND\n```\n清单 10-9. 使用动态 SQL 将数据归档到动态命名的表中\n\
  \n当脚本运行完成后，你将能在服务器上看到一些新的数据库，如图 10-8 所示。\n\n![A371168_1_En_10_Fig8_HTML.jpg](img/A371168_1_En_10_Fig8_HTML.jpg)\n\
  图 10-8. 执行清单 10-9 中的脚本时创建的新数据库\n\n对于 `Database_Log` 中 `Log_Time` 所代表的每一年，都创建了一个新数据库。此外，还在这些数据库中为数据所代表的每一周创建了表，如图\
  \ 10-9 所示。\n\n![A371168_1_En_10_Fig9_HTML.jpg](img/A371168_1_En_10_Fig9_HTML.jpg)\n\
  图 10-9. 执行清单 10-9 中的脚本时创建的新表\n\n\n上述逻辑的核心在于根据 `Log_Time` 提供的日期和时间动态创建数据库和表。一旦这些对象被创建，数据就会被插入其中，然后从源表中删除。你可以查看单个表中的数据，以验证此脚本是否完全按照你的意图执行，如图\
  \ 10-10 所示。\n\n![A371168_1_En_10_Fig10_HTML.jpg](img/A371168_1_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10.\n每周日志表示例数据\n\n```sql\nSELECT\n    *\nFROM Database_Log_2011.dbo.Database_Log_2011_48\n\
  ```\n\n这张新表内的所有数据都与原始的 `Database_Log` 表完全相同，包括 `Log_Id`。唯一的区别是数据现在位于新的数据库和表中。\n\n\
  当参考点随时间变化时，重组数据可能是一项复杂的任务。动态 SQL 允许以相对简单的逻辑来组织和移动数据，并创建新的对象。在不到 100 行的 TSQL 代码中，你就能够将日志表中的所有旧数据移动到任意数量的新数据库对象中，这些对象是在运行时根据数据的“年龄”动态创建的。\n\
  \n重组、归档或移动数据的每种用例都会有所不同，但当你希望最小化重要归档过程的复杂性和规模时，这种通用技术可能非常有用。在构建新流程之前，务必考虑归档数据将如何被使用。无论数据是被移动到单独的数据库、表还是分区，你现在都可以根据其新用途对其进行独特的索引。通过将其视为归档存储库而非事务性数据，你获得了根据其新用途进行优化的灵活性。\n\
  \n动态 SQL 可用于管理额外的索引、约束、键、视图和存储过程，这些都能让新数据被高效且方便地访问。创建这些对象将与添加主键的方式一样简单，只需在命令字符串中进行添加即可。\n\
  \n### 自定义数据库对象\n\n除非实现了某种动态代码或 TSQL，否则创建高度灵活的自定义对象并非易事。你在这方面的需求可能非常具体，但可以使用通用技术来精确地获得你想要的结果。\n\
  \n#### 问题\n\n有时，你需要创建具有特定用例的对象，但所涉及的表或列可能并不总是相同的。根据这些变量生成存储过程、函数或视图通常是一个手动密集型的过程。你可以实施动态\
  \ SQL，以可扩展且可靠的方式创建或修改现有对象。\n\n第 9 章介绍了当列列表直到运行时才知道时，如何使用动态 SQL 来 `PIVOT`（旋转）或 `UNPIVOT`（逆旋转）数据。如果你希望将这些过程的表数据输出汇总到一个视图中，为应用程序提供一个方便的数据源，该怎么办呢？一旦创建了视图，你就可以考虑其他选项，例如使用架构绑定来提高架构完整性。\n\
  \n考虑这样一个场景：你想根据职位提供员工入职日期的洞察。对于一家特定公司，这是一个经常被请求的数据，因此有人要求基于它创建一个更永久的数据结构。有多种方法可以解决这个问题，包括自定义表、视图或基于这些需求管理报表数据的\
  \ ETL 过程。这些流程可以通过触发器、存储过程或其他各种方法来管理。\n\n#### 解决方案\n\n对于前面概述的场景，尽管如果报表或数据需求不同也可以使用其他方法，但我们将提供一个使用架构绑定视图的示例解决方案。清单\
  \ 10-10 中的 TSQL 将返回你正在查找的原始数据。\n\n```sql\nDECLARE @hire_date_years TABLE\n    (hire_date_year\
  \ NVARCHAR(50));\nINSERT INTO @hire_date_years\n    (hire_date_year)\nSELECT DISTINCT\n\
  \    DATEPART(YEAR, Employee.HireDate)\nFROM HumanResources.Employee;\nDECLARE @sql_command\
  \ NVARCHAR(MAX);\nSELECT @sql_command = '\nSELECT\n    *\nFROM\n    (   SELECT\n\
  \            Employee.BusinessEntityID,\n            Employee.JobTitle,\n      \
  \      DATEPART(YEAR, Employee.HireDate) AS HireDate_Year\n        FROM HumanResources.Employee\n\
  \    ) EMPLOYEE_DATA\nPIVOT\n    (   COUNT(BusinessEntityID)\n        FOR HireDate_Year\
  \ IN (';\nSELECT @sql_command = @sql_command + '[' + hire_date_year + '], '\nFROM\
  \ @hire_date_years;\nSELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command)\
  \ - 1);\nSELECT @sql_command = @sql_command + ' )) PIVOT_DATA';\nPRINT @sql_command;\n\
  EXEC sp_executesql @sql_command;\n```\n\n清单 10-10.\n按职位返回入职年份计数的动态 PIVOT 查询\n\n\
  此查询的输出返回一个类似于图 10-11 中的数据集。\n\n![A371168_1_En_10_Fig11_HTML.jpg](img/A371168_1_En_10_Fig11_HTML.jpg)\n\
  \n图 10-11.\n清单 10-10 中的动态 PIVOT 查询返回的入职数据\n\n每个职位都列为第一列，其后是 `Employee` 表中存在的每个入职年份的列列表。如果基础表中添加或删除了员工，随着入职日期的添加或删除，此数据集中的列也可能被添加或删除。\n\
  \n现在你有了一个查询，它能以你想要的列式格式返回你想要的结果，你可以将这些数据移入一个自定义视图中。你需要克服的一个技术细节是：当创建架构绑定视图时，你不能在列列表中包含\
  \ `*`。如果你使用 TSQL 并添加 `CREATE VIEW…WITH SCHEMABINDING` 到查询中，你将得到以下错误：\n\n```\nMsg\
  \ 1054, Level 15, State 6, Procedure v_job_title_year_summary, Line 6\nSyntax '*'\
  \ is not allowed in schema-bound objects.\nMsg 102, Level 15, State 1, Procedure\
  \ v_job_title_year_summary, Line 13\nIncorrect syntax near 'EMPLOYEE_DATA'.\n```\n\
  \n为了使此语法生效，除了 `PIVOT` 详情外，你还需要使列列表动态化。清单 10-11 中的 TSQL 是包含了此修改的视图创建脚本。\n\n```sql\n\
  IF EXISTS (SELECT * FROM sys.views WHERE views.name = 'v_job_title_year_summary')\n\
  BEGIN\n    DROP VIEW v_job_title_year_summary\nEND\nGO\nDECLARE @hire_date_years\
  \ TABLE\n    (hire_date_year NVARCHAR(50));\nINSERT INTO @hire_date_years\n    (hire_date_year)\n\
  SELECT DISTINCT\n    DATEPART(YEAR, Employee.HireDate)\nFROM HumanResources.Employee;\n\
  DECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command = '\nCREATE VIEW dbo.v_job_title_year_summary\n\
  WITH SCHEMABINDING\nAS\nSELECT\n    JobTitle,'\nSELECT @sql_command = @sql_command\
  \ + '\n    [' + hire_date_year + '], '\nFROM @hire_date_years;\nSELECT @sql_command\
  \ = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);\nSELECT @sql_command = @sql_command\
  \ + '\nFROM\n    (   SELECT\n            Employee.BusinessEntityID,\n          \
  \  Employee.JobTitle,\n            DATEPART(YEAR, Employee.HireDate) AS HireDate_Year\n\
  \        FROM HumanResources.Employee\n    ) EMPLOYEE_DATA\nPIVOT\n    (   COUNT(BusinessEntityID)\n\
  \        FOR HireDate_Year IN (';\nSELECT @sql_command = @sql_command + '[' + hire_date_year\
  \ + '], '\nFROM @hire_date_years;\nSELECT @sql_command = SUBSTRING(@sql_command,\
  \ 1, LEN(@sql_command) - 1);\nSELECT @sql_command = @sql_command + '        )) PIVOT_DATA';\n\
  PRINT @sql_command;\nEXEC sp_executesql @sql_command;\n```\n\n清单 10-11.\n用于创建具有可变列列表的自定义视图的动态\
  \ SQL\n\n\n\n一旦运行此脚本，您就可以查看视图列表，快速验证新视图是否已创建，并且是否包含正确的列，如图 10-12 所示。\n\n![A371168_1_En_10_Fig12_HTML.jpg](img/A371168_1_En_10_Fig12_HTML.jpg)\n\
  图 10-12. 清单 10-11 中创建的视图所包含的列\n\n视图定义不会随数据更新而自动更新，但由于基础数据不太可能不断变化，您可以每天（或以任何认为必要的间隔）管理此更新。假设您将一些雇佣日期更新为当前基础员工数据中未包含的年份：\n\
  \n```sql\nUPDATE HumanResources.Employee\nSET HireDate = '1/1/2015'\nWHERE BusinessEntityID\
  \ = 282\nUPDATE HumanResources.Employee\nSET HireDate = '1/1/2014'\nWHERE BusinessEntityID\
  \ IN (260, 285)\n```\n\n现在，如果您从视图中选择数据，您会注意到 2014 和 2015 年尚未添加到其中，如图 10-13 所示。\n\
  \n![A371168_1_En_10_Fig13_HTML.jpg](img/A371168_1_En_10_Fig13_HTML.jpg)\n图 10-13.\
  \ 如果不刷新视图，将不会返回 2014 和 2015 年列\n\n```sql\nSELECT\n*\nFROM dbo.v_job_title_year_summary\n\
  ```\n\n为了将额外的列添加到视图中，必须刷新或重新创建它。为了便于重新创建，您可以将之前创建视图的 TSQL 封装到存储过程中，如清单 10-12 所示。\n\
  \n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'create_v_job_title_year_summary')\n\
  BEGIN\nDROP PROCEDURE dbo.create_v_job_title_year_summary;\nEND\nGO\nCREATE PROCEDURE\
  \ dbo.create_v_job_title_year_summary\nAS\nBEGIN\nIF EXISTS (SELECT * FROM sys.views\
  \ WHERE views.name = 'v_job_title_year_summary')\nBEGIN\nDROP VIEW v_job_title_year_summary;\n\
  END\nDECLARE @hire_date_years TABLE\n(hire_date_year NVARCHAR(50));\nINSERT INTO\
  \ @hire_date_years\n(hire_date_year)\nSELECT DISTINCT\nDATEPART(YEAR, Employee.HireDate)\n\
  FROM HumanResources.Employee;\nDECLARE @sql_command NVARCHAR(MAX);\nSELECT @sql_command\
  \ = '\nCREATE VIEW dbo.v_job_title_year_summary\nWITH SCHEMABINDING\nAS\nSELECT\n\
  JobTitle,'\nSELECT @sql_command = @sql_command + '\n[' + hire_date_year + '], '\n\
  FROM @hire_date_years;\nSELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command)\
  \ - 1);\nSELECT @sql_command = @sql_command + '\nFROM\n(        SELECT\nEmployee.BusinessEntityID,\n\
  Employee.JobTitle,\nDATEPART(YEAR, Employee.HireDate) AS HireDate_Year\nFROM HumanResources.Employee\n\
  ) EMPLOYEE_DATA\nPIVOT\n(        COUNT(BusinessEntityID)\nFOR HireDate_Year IN (';\n\
  SELECT @sql_command = @sql_command + '[' + hire_date_year + '], '\nFROM @hire_date_years;\n\
  SELECT @sql_command = SUBSTRING(@sql_command, 1, LEN(@sql_command) - 1);\nSELECT\
  \ @sql_command = @sql_command + '        )) PIVOT_DATA';\nPRINT @sql_command;\n\
  EXEC sp_executesql @sql_command;\nEND\n```\n清单 10-12. 用于创建动态生成视图的存储过程\n\n通过此存储过程，您现在可以轻松地重新创建动态视图：\n\
  \n```sql\nEXEC dbo.create_v_job_title_year_summary;\n```\n\n当您检查视图内容时，可以验证其已正确更新，如图\
  \ 10-14 所示。\n\n![A371168_1_En_10_Fig14_HTML.jpg](img/A371168_1_En_10_Fig14_HTML.jpg)\n\
  图 10-14. 一旦刷新，2014 和 2015 年的新数据就已包含在视图中\n\n```sql\nSELECT\n*\nFROM dbo.v_job_title_year_summary\n\
  ```\n\n已为 2014 和 2015 年数据添加了列，并且会根据自上次创建视图以来添加或删除的任何其他年份进行相应添加。请注意，基于 `PIVOT` 的视图无法创建索引，但动态生成的视图只要不包含\
  \ `PIVOT` 或 `UNPIVOT` 并且是绑定到架构的，就可以正常创建索引。\n\n使用动态 SQL 生成架构是一种非常方便的方法，可以在运行时才可能获得完整架构知识时创建对象。它还允许使用相对简单的\
  \ TSQL 语法将复杂的业务逻辑汇总到数据库对象中。能够极大地简化应用程序或报表代码，有时比创建新数据库对象的负担更为重要。\n\n与创建任何新对象一样，请始终确保它们是必需的，并且没有更高效的方法可用。通常，新的\
  \ SQL Server 版本、应用程序版本或业务变更可以允许实现新的方法来高效检索数据。\n\n### 结论\n\n本章回顾了一些动态 SQL 的应用，它们使您能够为通常不支持在运行时更改的流程增加灵活性。还存在更多的应用，唯一的限制是您的想象力。\n\
  \n在创建任何新架构（无论是动态生成与否）时，始终考虑其影响和效率。所有数据库对象都必须维护，在考虑新对象时必须考虑这种累积的维护成本。使用动态 SQL 的目标，要么是实现原本不太可能实现的流程，要么是降低那些可能需要手动或资源密集型组件的流程的复杂性。\n\
  \n出于这些目的使用动态 SQL 将由您自己的业务逻辑、数据库服务器版本以及开发团队使用的规则和策略决定。虽然一些解决方案对广大受众有用，但另一些可能被证明是百万个特定开发环境中的救星。无论解决方案多么通用，牢记这一工具将使您能够以创造性的方式解决困难的数据库挑战，否则这些挑战可能既耗时又昂贵。\n\
  \n# 11. 其他应用\n\n这最后一章探讨一些更有趣的动态 SQL 应用。目的是为您提供各种实用的脚本，这些脚本可以引入任何数据库环境，并根据独特用途进行定制。对于许多现实世界的挑战，动态\
  \ SQL 是一种高效的解决方案，您可以使用紧凑、可重用的代码完成大量工作。\n\n### 数据库维护\n\n对于 DBA 和数据库开发人员来说，最具挑战性的领域之一是为其服务器、数据库和相关软件提供定期的维护。常见的任务，如索引碎片整理、维护统计信息和管理数据库备份，对任何应用程序都至关重要。由于每个数据库环境都不同，管理这些任务的脚本可以且应该在每个环境中有所不同。以下部分概述了一些常见的维护任务，以及如何使用动态\
  \ SQL 为每个任务构建一个框架。一旦构建完成，这些脚本可以进行扩展和定制，以满足您自己的数据库服务器的需求。\n\n\n#### 索引碎片整理\n\n索引是优化查询性能的关键。审查性能不佳的查询时，你应该立即提出的问题之一是：正确的索引是否到位且充足。另一个不应被忽略的问题是：这些索引是否得到了妥善维护。随着时间的推移，索引因插入、更新和删除操作，其构建所依赖的\
  \ B 树会变得碎片化。时间越久，情况越糟，有效遍历 B 树并返回查询所需数据的时间就越长。\n\n定期运行检查索引碎片并采取必要措施的作业，将确保这种情况永远不会对应用程序性能造成损害。实现此目标的首要任务是识别索引的碎片程度，并且要能在服务器上的任何数据库集上执行此操作。\n\
  \n此信息可以在 `sys.dm_db_index_physical_stats` 动态管理视图中找到。清单 11-1 中的查询将此视图中的数据与几个系统视图连接，以包含涉及的数据库、表和索引的名称。\n\
  \n```sql\nUSE AdventureWorks2014\nDECLARE @database_name VARCHAR(100) = 'AdventureWorks2014';\n\
  SELECT\nSD.name AS database_name,\nSO.name AS object_name,\nSI.name AS index_name,\n\
  IPS.index_type_desc,\nIPS.page_count,\nIPS.avg_fragmentation_in_percent -- Be sure\
  \ to filter as much as possible...this can return a lot of data if you don't filter\
  \ by database and table.\nFROM sys.dm_db_index_physical_stats(NULL, NULL, NULL,\
  \ NULL , NULL) IPS\nINNER JOIN sys.databases SD\nON SD.database_id = IPS.database_id\n\
  INNER JOIN sys.indexes SI\nON SI.index_id = IPS.index_id\nINNER JOIN sys.objects\
  \ SO\nON SO.object_id = SI.object_id\nAND IPS.object_id = SO.object_id\nWHERE alloc_unit_type_desc\
  \ = 'IN_ROW_DATA'\nAND index_level = 0\nAND SD.name = @database_name\nORDER BY IPS.avg_fragmentation_in_percent\
  \ DESC;\n```\n清单 11-1. 用于确定给定数据库中所有索引碎片情况的查询\n\n此查询在过滤器中专门针对一个数据库（基于顶部声明的参数），但可以调整为检查服务器上的任何或所有用户数据库。图\
  \ 11-1 中的结果显示了每个索引，按碎片程度排序，并附带一些其他有用的信息。\n\n![A371168_1_En_11_Fig1_HTML.jpg](img/A371168_1_En_11_Fig1_HTML.jpg)\n\
  图 11-1. 清单 11-1 中查询产生的索引碎片结果\n\n现在你已经识别出碎片最严重的表，你需要找出修复它们的最佳方法。接下来讨论两种选择。\n\n#####\
  \ 索引重建\n\n重建索引时，它会被一个全新的索引副本完全替换，如同刚刚新建一样。在 SQL Server 标准版中，这是一个离线操作，意味着运行时可能会导致资源争用。在标准版中重建索引时，请谨慎安排在中断可容忍的时间进行。在企业版中，重建可以在线运行，允许在其他事务同时发生时进行操作。无论是什么版本，重建索引都是资源密集型操作，应在服务器有额外资源可用的非高峰时段进行。\n\
  \n如果取消索引重建，整个操作将需要回滚，这也可能耗时且消耗资源。\n\n##### 索引重新组织\n\n重新组织索引会在叶级进行清理、重新排序页面并根据需要重新应用填充因子。无论你运行的是哪个版本的\
  \ SQL Server，此操作始终在线，并且可以随时中断而不会产生不良影响。\n\n尽管过程相对简单，但对于非常宽的索引，索引重新组织可能花费与重建一样长的时间。跟踪这些时间可以让你定期审查索引维护任务，并确保它们运行得足够快。\n\
  \n##### 创建索引维护解决方案\n\n既然你已经知道问题所在以及可用的解决工具，就可以逐步构建一个示例解决方案。动态 SQL 的需求是立即存在的：你有多个数据库、表、索引和潜在的操作。在这种情况下，动态\
  \ T-SQL 会比冗长的、过程化的解决方案更简单且更易于实现。\n\n让我们从一个存储过程开始，它会检查碎片级别，并根据用户输入选择重新组织还是重建。此示例使用\
  \ 10% 作为重新组织的阈值，35% 作为重建的阈值，同时这些数字也作为默认参数值。它将有一个 `@print_only` 标志，用于决定是打印结果供审查还是执行它们。该过程将包含实例上的所有数据库，除了\
  \ `model`、`master`、`msdb` 和 `tempdb`。不过，这可以轻松自定义以作用于任何数据库集。最后的补充是包含了架构名称，添加它是为了支持除\
  \ `dbo` 之外的多个架构的数据库。此新脚本的完整内容可以在清单 11-2 中查看。\n\n\n### 清单 11-2：使用动态 SQL 的简单索引维护解决方案\n\
  \n```sql\nIF EXISTS (SELECT * FROM sys.procedures WHERE procedures.name = 'index_maintenance_demo')\n\
  BEGIN\n    DROP PROCEDURE dbo.index_maintenance_demo;\nEND\nGO\nCREATE PROCEDURE\
  \ dbo.index_maintenance_demo\n    @reorganization_percentage TINYINT = 10,\n   \
  \ @rebuild_percentage TINYINT = 35,\n    @print_results_only BIT = 1\nAS\nBEGIN\n\
  \    DECLARE @sql_command NVARCHAR(MAX) = '';\n    DECLARE @parameter_list NVARCHAR(MAX)\
  \ = '@reorganization_percentage TINYINT, @rebuild_percentage TINYINT'\n    DECLARE\
  \ @database_name NVARCHAR(MAX);\n    DECLARE @database_list TABLE\n        (database_name\
  \ NVARCHAR(MAX) NOT NULL);\n    INSERT INTO @database_list\n        (database_name)\n\
  \    SELECT\n        name\n    FROM sys.databases\n    WHERE databases.name NOT\
  \ IN ('msdb', 'master', 'TempDB', 'model');\n\n    CREATE TABLE #index_maintenance\n\
  \    (       database_name NVARCHAR(MAX),\n            schema_name NVARCHAR(MAX),\n\
  \            object_name NVARCHAR(MAX),\n            index_name NVARCHAR(MAX),\n\
  \            index_type_desc NVARCHAR(MAX),\n            page_count BIGINT,\n  \
  \          avg_fragmentation_in_percent FLOAT,\n            index_operation NVARCHAR(MAX));\n\
  \n    SELECT @sql_command = @sql_command + '\n        USE [' + database_name + ']\n\
  \        INSERT INTO #index_maintenance\n        (database_name, schema_name, object_name,\
  \ index_name, index_type_desc, page_count, avg_fragmentation_in_percent, index_operation)\n\
  \        SELECT\n            CAST(SD.name AS NVARCHAR(MAX)) AS database_name,\n\
  \            CAST(SS.name AS NVARCHAR(MAX)) AS schema_name,\n            CAST(SO.name\
  \ AS NVARCHAR(MAX)) AS object_name,\n            CAST(SI.name AS NVARCHAR(MAX))\
  \ AS index_name,\n            IPS.index_type_desc,\n            IPS.page_count,\n\
  \            IPS.avg_fragmentation_in_percent, -- Be sure to filter as much as possible...this\
  \ can return a lot of data if you dont filter by database and table.\n         \
  \   CAST(CASE\n                WHEN IPS.avg_fragmentation_in_percent >= @rebuild_percentage\
  \ THEN ''REBUILD''\n                WHEN IPS.avg_fragmentation_in_percent >= @reorganization_percentage\
  \ THEN ''REORGANIZE''\n            END AS NVARCHAR(MAX)) AS index_operation\n  \
  \      FROM sys.dm_db_index_physical_stats(NULL, NULL, NULL, NULL , NULL) IPS\n\
  \        INNER JOIN sys.databases SD\n            ON SD.database_id = IPS.database_id\n\
  \        INNER JOIN sys.indexes SI\n            ON SI.index_id = IPS.index_id\n\
  \        INNER JOIN sys.objects SO\n            ON SO.object_id = SI.object_id\n\
  \            AND IPS.object_id = SO.object_id\n        INNER JOIN sys.schemas SS\n\
  \            ON SS.schema_id = SO.schema_id\n        WHERE alloc_unit_type_desc\
  \ = ''IN_ROW_DATA''\n            AND index_level = 0\n            AND SD.name =\
  \ ''' + database_name + '''\n            AND IPS.avg_fragmentation_in_percent >=\
  \ @reorganization_percentage\n            AND SI.name IS NOT NULL -- Only review\
  \ index, not heap data.\n            AND SO.is_ms_shipped = 0 -- Do not perform\
  \ maintenance on system objects\n        ORDER BY SD.name ASC;'\n    FROM @database_list\n\
  \    WHERE database_name IN (SELECT name FROM sys.databases);\n\n    EXEC sp_executesql\
  \ @sql_command, @parameter_list, @reorganization_percentage, @rebuild_percentage;\n\
  \n    SELECT @sql_command = '';\n    SELECT @sql_command = @sql_command +\n    \
  \    '        USE [' + database_name + ']\n        ALTER INDEX [' + index_name +\
  \ '] ON [' + schema_name + '].[' + object_name + ']\n        ' + index_operation\
  \ + ';\n        '\n    FROM #index_maintenance;\n\n    SELECT * FROM #index_maintenance\n\
  \    ORDER BY avg_fragmentation_in_percent DESC;\n\n    IF @print_results_only =\
  \ 1\n        PRINT @sql_command;\n    ELSE\n        EXEC sp_executesql @sql_command;\n\
  \n    DROP TABLE #index_maintenance;\nEND\nGO\n```\n\n此脚本从一系列索引重建或重组操作中构建一个长命令字符串。请注意，每组动态\
  \ SQL 操作在执行前都使用动态生成的列表来构建字符串。这避免了循环或游标的需求，并能非常快速高效地完成任务。让我们使用默认参数来执行它：\n\n```sql\n\
  EXEC dbo.index_maintenance_demo @reorganization_percentage = 10, @rebuild_percentage\
  \ = 35, @print_results_only = 1;\n```\n\n由于 `@print_results_only` 设置为 1，因此不会执行任何索引操作。命令字符串将在存储过程结束时、删除临时表之前打印出来。以下是在我的服务器上打印出的结果的一部分：\n\
  \n```sql\nUSE [AdventureWorks2014]\nALTER INDEX [IX_vProductAndDescription] ON [Production].[vProductAndDescription]\n\
  REORGANIZE;\nUSE [AdventureWorks2014]\nALTER INDEX [IX_vStateProvinceCountryRegion]\
  \ ON [Person].[vStateProvinceCountryRegion]\nREBUILD;\nUSE [AdventureWorks2012]\n\
  ALTER INDEX [PK_ProductCostHistory_ProductID_StartDate] ON [Production].[ProductCostHistory]\n\
  REBUILD;\nUSE [AdventureWorks2012]\nALTER INDEX [AK_ProductDescription_rowguid]\
  \ ON [Production].[ProductDescription]\nREBUILD;\nUSE [AdventureWorks2012]\nALTER\
  \ INDEX [PK_DatabaseLog_DatabaseLogID] ON [dbo].[DatabaseLog]\nREBUILD;\nUSE [AdventureWorks2012]\n\
  ALTER INDEX [PK_ProductInventory_ProductID_LocationID] ON [Production].[ProductInventory]\n\
  REORGANIZE;\n```\n\n当处理长命令字符串时，要小心截断，无论是字符串本身被截断，还是 Management Studio 的结果窗格在打印示例输出时截断。作为预防措施，我将临时表中的所有字符串都强制转换为\
  \ `NVARCHAR(MAX)`，以确保命令字符串不会被转换为任何较小的字符串数据类型。\n\n同样重要的是要注意，使用动态 SQL 来收集索引碎片数据，是因为某些视图，如\
  \ `sys.tables` 和 `dm_db_index_physical_stats`，是数据库特定的。为了收集每个数据库的所有数据，需要先 `USE` 每个数据库，然后独立地检查它们内部的视图。类似地，要执行索引维护，也需要先\
  \ `USE` 相应的数据库，然后再运行重建或重组语句。\n\n临时表的内容也会输出，以便您可以进一步查看返回的数据，如图 11-2 所示。\n\n![A371168_1_En_11_Fig2_HTML.jpg](img/A371168_1_En_11_Fig2_HTML.jpg)\n\
  \n### 图 11-2\n\n从清单 11-2 的查询返回的完整碎片结果。\n\n在这里，您可以查看每个索引、其碎片级别以及根据输入选择的操作。如果您确信此存储过程完全符合您的要求，您可以允许它执行整个命令字符串，并清理这些数据库中的所有索引：\n\
  \n```sql\nEXEC dbo.index_maintenance_demo @reorganization_percentage = 10, @rebuild_percentage\
  \ = 35, @print_results_only = 0;\n```\n\n等待大约 30 秒后，脚本成功完成，您的索引维护就完成了！您可以随心所欲地添加选项并继续自定义此脚本。一些值得考虑添加的功能：\n\
  \n*   向重建操作添加 `WITH (ONLINE = ON)`，以便它们可以在线运行（仅限企业版）。\n*   向重建操作添加 `WITH (SORT_IN_TEMP\
  \ = ON)`，以便它们可以在 TempDB 中排序中间重建结果，这可以加快操作速度。请记住，TempDB 中必须有足够的空间才能使其工作。\n*   如果需要除默认值以外的填充因子，则调整索引的填充因子。\n\
  *   检查索引的大小，并根据该信息采取不同的操作。\n*   添加日志记录，以便您可以查看执行的命令以及完成它们所需的时间。\n\n将此脚本作为起点，并根据您环境的需求进行定制，无论它们与这里呈现的可能有多大差异。定制和改进这个概念的方法有无数种，您的想象力是您与完美的索引解决方案之间的唯一障碍！\n\
  \n\n\n#### 数据库备份\n\n另一项必要的数据库维护任务是确保所有重要数据都能定期备份。维护计划常被用于此任务，但它们缺乏灵活性，若想针对各种用例进行定制，可能会变得异常复杂。如果你管理着许多数据库服务器，而每台服务器的备份需求各不相同，结果可能会产生数十个（甚至更多）不同的维护计划。每个计划都需要同等程度的关注和维护，因此为了确保系统长期正常运行，也会累积同等量级的技术负债。\n\
  \n通常更可取的方法是创建一个可根据环境定制的备份脚本，该脚本能够随着时间的推移进行扩展、定制和调整。本节涵盖了备份方案的三种常见需求：**完整备份**、*差异备份*和事务日志备份。一种常见的配置是每周运行一次完整备份，每隔一天运行一次差异备份，并在一天中间歇性地运行事务日志备份。与索引碎片整理的情况一样，较大的备份（完整备份和差异备份）应在系统使用较少的非高峰时段运行，因为备份操作可能需要大量的\
  \ I/O 来处理。\n\n这个存储过程将按照你希望运行事务日志备份的频率执行。当它在与 `@differential_and_full_backup_time`\
  \ 对应的时间运行时，将改为运行其中一种备份。`@full_backup_day` 指示应在哪一天进行完整备份。`@backup_location` 提供备份应保存到的磁盘位置。最后，`@print_output_only`\
  \ 决定是实际进行备份，还是只打印出命令字符串。此存储过程参见清单 11-3。\n\n```\nIF EXISTS (SELECT * FROM sys.procedures\
  \ WHERE procedures.name = 'backup_plan')\nBEGIN\n    DROP PROCEDURE dbo.backup_plan;\n\
  END\nGO\nCREATE PROCEDURE dbo.backup_plan\n    @differential_and_full_backup_time\
  \ TIME = '00:00:00', -- 默认午夜\n    @full_backup_day TINYINT = 1, -- 默认为周日\n    @backup_location\
  \ NVARCHAR(MAX) = 'E:\\SQLBackups\\', -- 默认备份文件夹\n    @print_output_only BIT = 1\n\
  AS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @current_time TIME = CAST(CURRENT_TIMESTAMP\
  \ AS TIME);\n    DECLARE @current_day TINYINT = DATEPART(DW, CURRENT_TIMESTAMP);\n\
  \    DECLARE @datetime_string NVARCHAR(MAX) = FORMAT(CURRENT_TIMESTAMP , 'MMddyyyyHHmmss');\n\
  \    DECLARE @sql_command NVARCHAR(MAX) = '';\n    DECLARE @database_list TABLE\n\
  \        (database_name NVARCHAR(MAX) NOT NULL, recovery_model_desc NVARCHAR(MAX));\n\
  \    INSERT INTO @database_list\n        (database_name, recovery_model_desc)\n\
  \    SELECT\n        name,\n        recovery_model_desc\n    FROM sys.databases\n\
  \    WHERE databases.name NOT IN ('msdb', 'master', 'TempDB', 'model');\n    --\
  \ 检查是否应执行完整备份\n    IF (@current_day = @full_backup_day) AND (@current_time BETWEEN\
  \ @differential_and_full_backup_time AND DATEADD(MINUTE, 10, @differential_and_full_backup_time))\n\
  \    BEGIN\n        SELECT @sql_command = @sql_command +\n        '\n        BACKUP\
  \ DATABASE [' + database_name + ']\n        TO DISK = ''' + @backup_location + database_name\
  \ + '_' + @datetime_string + '.bak'';\n        '\n        FROM @database_list;\n\
  \        IF @print_output_only = 1\n            PRINT @sql_command;\n        ELSE\n\
  \            EXEC sp_executesql @sql_command;\n    END\n    ELSE -- 检查是否应执行差异备份\n\
  \        IF (@current_day <> @full_backup_day) AND (@current_time BETWEEN @differential_and_full_backup_time\
  \ AND DATEADD(MINUTE, 10, @differential_and_full_backup_time))\n        BEGIN\n\
  \            SELECT @sql_command = '';\n            SELECT @sql_command = @sql_command\
  \ +\n            '\n            BACKUP DATABASE [' + database_name + ']\n      \
  \      TO DISK = ''' + @backup_location + database_name + '_' + @datetime_string\
  \ + '.dif''\n            WITH DIFFERENTIAL;\n            '\n            FROM @database_list;\n\
  \            IF @print_output_only = 1\n                PRINT @sql_command;\n  \
  \          ELSE\n                EXEC sp_executesql @sql_command;\n        END\n\
  \        ELSE -- 如果既非完整也非差异备份，则执行事务日志备份\n        BEGIN\n            SELECT @sql_command\
  \ = '';\n            SELECT @sql_command = @sql_command +\n            '\n     \
  \       BACKUP LOG [' + database_name + ']\n            TO DISK = ''' + @backup_location\
  \ + database_name + '_' + @datetime_string + '.trn''\n            '\n          \
  \  FROM @database_list\n            WHERE recovery_model_desc = 'FULL';\n      \
  \      IF @print_output_only = 1\n                PRINT @sql_command;\n        \
  \    ELSE\n                EXEC sp_executesql @sql_command;\n        END\nEND\n\
  清单 11-3.\n使用动态 SQL 的数据库备份存储过程\n```\n\n请注意，与索引维护脚本一样，这将对除 `msdb`、`tempdb`、`master`\
  \ 和 `model` 之外的所有数据库执行备份。与之前的所有脚本一样，数据库列表可以轻松调整以满足任何自定义需求。此脚本可以按任何计划执行，并且将执行数据库的事务日志备份，除非在为其分配的时间和日期进行差异备份或完整备份。假设当前时间是星期二晚上\
  \ 7:53，你可以针对每种备份用例测试该脚本：\n\n```\nEXEC dbo.backup_plan @differential_and_full_backup_time\
  \ = '19:50:00', @full_backup_day = 3, @backup_location = 'E:\\SQLBackups\\', @print_output_only\
  \ = 1;\n```\n\n这将执行完整备份，因为当前时间在指定的完整备份时间的 10 分钟范围内，完整备份日已设置为星期二 (3)，并且备份语句将被打印而不是执行。命令字符串输出如下：\n\
  \n```\nBACKUP DATABASE [AdventureWorks2012]\nTO DISK = 'E:\\SQLBackups\\AdventureWorks2012_12012015195529.bak';\n\
  BACKUP DATABASE [AdventureWorks2014]\nTO DISK = 'E:\\SQLBackups\\AdventureWorks2014_12012015195529.bak';\n\
  BACKUP DATABASE [AdventureWorksDW2012]\nTO DISK = 'E:\\SQLBackups\\AdventureWorksDW2012_12012015195529.bak';\n\
  BACKUP DATABASE [AdventureWorksDW2014]\nTO DISK = 'E:\\SQLBackups\\AdventureWorksDW2014_12012015195529.bak';\n\
  ```\n\n\n\n如果你将 `@print_output_only` 改为零并再次执行该存储过程，你可以验证目录中的备份文件已如图 11-3 所示输出。\n\
  \n![A371168_1_En_11_Fig3_HTML.jpg](img/A371168_1_En_11_Fig3_HTML.jpg)\n\n图 11-3.\n\
  \n清单 11-3 中的动态备份脚本所创建的完整备份文件\n\n所有四个完整备份都在那里，名称正是你分配的。现在，让我们执行针对差异备份情况的存储过程：\n\n\
  ```sql\nEXEC dbo.backup_plan @differential_and_full_backup_time = '19:50:00', @full_backup_day\
  \ = 3, @backup_location = 'E:\\SQLBackups\\', @print_output_only = 1;\n```\n\n生成的命令字符串如下：\n\
  \n```sql\nBACKUP DATABASE [AdventureWorks2012]\nTO DISK = 'E:\\SQLBackups\\AdventureWorks2012_12012015200242.dif'\n\
  WITH DIFFERENTIAL;\nBACKUP DATABASE [AdventureWorks2014]\nTO DISK = 'E:\\SQLBackups\\\
  AdventureWorks2014_12012015200242.dif'\nWITH DIFFERENTIAL;\nBACKUP DATABASE [AdventureWorksDW2012]\n\
  TO DISK = 'E:\\SQLBackups\\AdventureWorksDW2012_12012015200242.dif'\nWITH DIFFERENTIAL;\n\
  BACKUP DATABASE [AdventureWorksDW2014]\nTO DISK = 'E:\\SQLBackups\\AdventureWorksDW2014_12012015200242.dif'\n\
  WITH DIFFERENTIAL;\n```\n\n在此情况下，今天不是进行完整备份的正确日期，但却是进行差异备份的时间。如果你将 `@print_output_only`\
  \ 设为零并执行此命令，可以验证备份文件已在图 11-4 所示的位置正确生成。\n\n![A371168_1_En_11_Fig4_HTML.jpg](img/A371168_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4.\n\n清单 11-3 中的动态备份脚本所创建的差异备份文件\n\n除了之前创建的四个完整备份外，你现在可以确认在同一文件夹中又创建了四个差异备份。最后，让我们运行一个将触发事务日志备份的命令：\n\
  \n```sql\nEXEC dbo.backup_plan @differential_and_full_backup_time = '00:00:00',\
  \ @full_backup_day = 1, @backup_location = 'E:\\SQLBackups\\', @print_output_only\
  \ = 1;\n```\n\n这里，完整备份日是星期日，完整/差异备份时间是午夜。由于当前时间均不符合，因此改为执行事务日志备份。生成的命令字符串如下：\n\n\
  ```sql\nBACKUP LOG [AdventureWorks2014]\nTO DISK = 'E:\\SQLBackups\\AdventureWorks2014_12012015200631.trn'\n\
  ```\n\n注意，只有一个数据库得到了备份。这乍一看可能像是个错误，因为你明确告诉这个存储过程要对四个数据库执行备份，但实际上这是正确的。你不能对处于简单恢复模式的任何数据库运行事务日志备份。在我的服务器上，此备份计划中包含的四个数据库中有三个处于简单恢复模式，因此在该步骤中被明确排除。你可以通过以下查询进行验证：\n\
  \n```sql\nSELECT\nname,\nrecovery_model_desc\nfrom sys.databases\nWHERE name IN\
  \ ('AdventureWorks2012', 'AdventureWorks2014', 'AdventureWorksDW2012', 'AdventureWorksDW2014');\n\
  ```\n\n此查询的结果证实了这一发现，如图 11-5 所示。\n\n![A371168_1_En_11_Fig5_HTML.jpg](img/A371168_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5.\n\n验证特定数据库集合的恢复模式\n**注意**\n\n生产数据库应设置为完整恢复模式或给予特殊处理，以确保重要数据能按需频繁备份！\n\n\
  当你将 `@print_output_only` 设为零来执行该存储过程时，可以检查输出文件夹并在图 11-6 中验证相应的结果。\n\n![A371168_1_En_11_Fig6_HTML.jpg](img/A371168_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6.\n\n使用清单 11-3 中的脚本执行的额外事务日志备份\n\n添加了一个新文件：恰好处于 `FULL` 恢复模式的 `AdventureWorks2014`\
  \ 的事务日志备份，如图所示。\n\n这个存储过程展示了一个构建你自己的定制备份计划的基本框架，让你能完全控制所有细节。额外的好处是，你可以使用单个作业和存储过程来完成任务，而不是潜在地使用多个维护计划和/或维护计划任务。\n\
  \n一些可考虑的扩展功能包括：\n\n*   记录每次操作的备份时间和持续时间。\n*   清理 MSDB 中的旧备份记录。\n*   从输出位置清理旧的备份文件。\n\
  *   如果备份失败或耗时超过特定时限，则发出定制警报。\n*   使用 try/catch 块来管理存储过程中的任何错误。\n\n当然，还有许多其他选项可供你考虑。在此示例中，所有数据库（除了少数几个系统数据库）都进行了备份，但你同样可以省略\
  \ `WHERE` 子句或调整它，以便备份服务器上的特定数据库集。此外，如果系统数据库遵循一套独特的规则，也可以单独管理它们。\n\n此存储过程的备份时间由作业运行时间确定，但也可以内置为存储过程参数。两种场景都可行，使用哪种取决于你更倾向于如何管理这些数据。与参数配合良好的一个额外选项是将元数据存储在永久控制表中。这将提供有关要备份的数据库、频率和类型的信息，并且可以轻松定制以适应你的环境需求。\n\
  \n如果在 SQL Server 中运行存储过程对你考虑的操作来说似乎有局限，那么你可以使用 PowerShell 或 SSIS 来提供对文件系统和 Windows\
  \ 功能的更好访问。与索引维护示例一样，你在此模型中取得成功的主要限制因素是时间和创造力。\n\n### 保存生成的脚本\n\n动态 SQL 可以作为存储过程的一部分编写，以便按应用程序需要执行，但它也可以保存起来供以后使用。动态\
  \ SQL 可用于生成一个命令字符串，然后将其保存到文件或新的存储过程中，以便在将来或作为另一个应用程序的一部分执行。\n\n当某个流程包含许多步骤，而其中某些步骤必须在严格的时间表上执行时，这种灵活性会非常方便。例如，你可能希望在午夜基于数据库中的架构生成一个脚本，但直到凌晨\
  \ 4 点数据加载完成才返回数据本身。或者，你可能希望在执行 SQL 文件之前或之外，对其进行审核或将其保存到其他地方以供后用。另一种实现此目的并避免将数据移入操作系统的方法是将其存储在表中。\n\
  \n#### 将脚本保存到表中\n\n保存命令字符串的最简单方法是将其插入表中。这提供了额外的灵活性，例如可以为命令添加时间戳或保存旧命令。为了便于此过程，你将创建一个表来存储命令数据，如清单\
  \ 11-4 所示。\n\n```sql\nCREATE TABLE dbo.sql_command\n(       command_id INT NOT NULL\
  \ IDENTITY(1,1) CONSTRAINT PK_sql_commands PRIMARY KEY CLUSTERED,\nsql_command NVARCHAR(MAX)\
  \ NOT NULL,\ntime_stamp DATETIME NOT NULL CONSTRAINT DF_sql_commands_time_stamp\
  \ DEFAULT (CURRENT_TIMESTAMP)    );\n```\n\n清单 11-4.\n用于存储动态 SQL 输出的表\n\n注意，有一个额外的列存储默认时间戳。这确保了任何保存的\
  \ TSQL 都可以轻松地与生成时间相关联。为了演示如何使用此表，让我们修改之前的索引碎片整理存储过程，改为向该表插入数据，而不是打印到 GUI，如清单 11-5\
  \ 所示。\n\n\n\n### 存储过程：输出结果到表\n\n```sql\nIF EXISTS (SELECT * FROM sys.procedures\
  \ WHERE procedures.name = 'index_maintenance_demo_output')\nBEGIN\nDROP PROCEDURE\
  \ dbo.index_maintenance_demo_output;\nEND\nGO\nCREATE PROCEDURE dbo.index_maintenance_demo_output\n\
  @reorganization_percentage TINYINT = 10,\n@rebuild_percentage TINYINT = 35,\n@print_results_to_file_only\
  \ BIT = 1\nAS\nBEGIN\nDECLARE @sql_command NVARCHAR(MAX) = '';\nDECLARE @parameter_list\
  \ NVARCHAR(MAX) = '@reorganization_percentage TINYINT, @rebuild_percentage TINYINT'\n\
  DECLARE @database_name NVARCHAR(MAX);\nDECLARE @database_list TABLE\n(database_name\
  \ NVARCHAR(MAX) NOT NULL);\nINSERT INTO @database_list\n(database_name)\nVALUES\n\
  ('AdventureWorks2012'),\n('AdventureWorks2014'),\n('AdventureWorksDW2012'),\n('AdventureWorksDW2014');\n\
  CREATE TABLE #index_maintenance\n(       database_name NVARCHAR(MAX),\nschema_name\
  \ NVARCHAR(MAX),\nobject_name NVARCHAR(MAX),\nindex_name NVARCHAR(MAX),\nindex_type_desc\
  \ NVARCHAR(MAX),\npage_count BIGINT,\navg_fragmentation_in_percent FLOAT,\nindex_operation\
  \ NVARCHAR(MAX));\nSELECT @sql_command = @sql_command + '\nUSE [' + database_name\
  \ + ']\nINSERT INTO #index_maintenance\n(database_name, schema_name, object_name,\
  \ index_name, index_type_desc, page_count, avg_fragmentation_in_percent, index_operation)\n\
  SELECT\nCAST(SD.name AS NVARCHAR(MAX)) AS database_name,\nCAST(SS.name AS NVARCHAR(MAX))\
  \ AS schema_name,\nCAST(SO.name AS NVARCHAR(MAX)) AS object_name,\nCAST(SI.name\
  \ AS NVARCHAR(MAX)) AS index_name,\nIPS.index_type_desc,\nIPS.page_count,\nIPS.avg_fragmentation_in_percent,\
  \ -- 务必尽可能多地进行筛选...如果不按数据库和表筛选，这可能会返回大量数据。\nCAST(CASE\nWHEN IPS.avg_fragmentation_in_percent\
  \ >= @rebuild_percentage THEN ''REBUILD''\nWHEN IPS.avg_fragmentation_in_percent\
  \ >= @reorganization_percentage THEN ''REORGANIZE''\nEND AS NVARCHAR(MAX)) AS index_operation\n\
  FROM sys.dm_db_index_physical_stats(NULL, NULL, NULL, NULL , NULL) IPS\nINNER JOIN\
  \ sys.databases SD\nON SD.database_id = IPS.database_id\nINNER JOIN sys.indexes\
  \ SI\nON SI.index_id = IPS.index_id\nINNER JOIN sys.objects SO\nON SO.object_id\
  \ = SI.object_id\nAND IPS.object_id = SO.object_id\nINNER JOIN sys.schemas SS\n\
  ON SS.schema_id = SO.schema_id\nWHERE alloc_unit_type_desc = ''IN_ROW_DATA''\nAND\
  \ index_level = 0\nAND SD.name = ''' + database_name + '''\nAND IPS.avg_fragmentation_in_percent\
  \ >= @reorganization_percentage\nAND SI.name IS NOT NULL -- 仅检查索引，而非堆数据。\nAND SO.is_ms_shipped\
  \ = 0 -- 不对系统对象执行维护\nORDER BY SD.name ASC;'\nFROM @database_list\nWHERE database_name\
  \ IN (SELECT name FROM sys.databases);\nEXEC sp_executesql @sql_command, @parameter_list,\
  \ @reorganization_percentage, @rebuild_percentage;\nSELECT @sql_command = '';\n\
  SELECT @sql_command = @sql_command +\n'        USE [' + database_name + ']\nALTER\
  \ INDEX [' + index_name + '] ON [' + schema_name + '].[' + object_name + ']\n' +\
  \ index_operation + ';\n'\nFROM #index_maintenance;\nIF @print_results_to_file_only\
  \ = 1\nINSERT INTO dbo.sql_command\n(sql_command)\nSELECT\n@sql_command\nELSE\n\
  EXEC sp_executesql @sql_command;\nDROP TABLE #index_maintenance;\nEND\n```\n\n###\
  \ 列表 11-5. 带有输出到表选项的索引维护存储过程\n\n请注意，除了重命名几个变量外，唯一的区别是执行 `INSERT` 到 `dbo.sql_command`\
  \ 而不是打印输出。让我们执行几次存储过程，然后查看表的内容：\n\n```sql\nEXEC dbo.index_maintenance_demo_output\
  \ @reorganization_percentage = 10, @rebuild_percentage = 35, @print_results_to_file_only\
  \ = 1;\nEXEC dbo.index_maintenance_demo_output @reorganization_percentage = 20,\
  \ @rebuild_percentage = 50, @print_results_to_file_only = 1;\nEXEC dbo.index_maintenance_demo_output\
  \ @reorganization_percentage = 30, @rebuild_percentage = 75, @print_results_to_file_only\
  \ = 1;\nEXEC dbo.index_maintenance_demo_output @reorganization_percentage = 5, @rebuild_percentage\
  \ = 10, @print_results_to_file_only = 1;\n```\n\n这些都传递了不同的参数值，但其他方面是相同的。查看新表可以发现，命令字符串已按预期保存，并附有时间戳，如图\
  \ 11-7 所示。\n\n![A371168_1_En_11_Fig7_HTML.jpg](img/A371168_1_En_11_Fig7_HTML.jpg)\n\
  \n##### 图 11-7.\n由列表 11-5 中的脚本创建的 `ALTER INDEX` 语句\n\n一旦保存在这里，它们可以在将来任何时候执行，或者由\
  \ DBA 或开发人员审查，以确保命令字符串的生成是正确的。除了延迟执行之外，此策略对于调试有问题的动态 SQL，或者仅仅允许在执行前记录命令字符串都非常有用。列表\
  \ 11-6 中的脚本是早前备份脚本的改编，它会将生成的命令字符串写入物理 SQL 文件。\n\n\n### 备份维护脚本：将命令字符串输出到文件\n\n下面的存储过程展示了另一种思路：不直接执行备份，而是将生成的命令字符串输出到文件。由于\
  \ BCP 工具默认会覆盖目标文件，因此每个新命令字符串都需要先插入到一个中间文件 `TempOutput.sql` 中，然后再追加到最终文件 `QueryOutput.sql`。文件路径和服务器名称都已参数化，这使得此存储过程更加通用。让我们运行一些前面的例子：\n\
  \n```sql\nEXEC dbo.backup_plan_output @differential_and_full_backup_time = '13:55:00',\
  \ @full_backup_day = 3, @backup_location = 'E:\\SQLBackups\\',\n@sql_data_location\
  \ = 'E:\\SQLData\\', @sql_server_name = 'SSANDILE\\EDSQLSERVER14', @print_output_to_file_only\
  \ = 1;\nEXEC dbo.backup_plan_output @differential_and_full_backup_time = '13:55:00',\
  \ @full_backup_day = 1, @backup_location = 'E:\\SQLBackups\\',\n@sql_data_location\
  \ = 'E:\\SQLData\\', @sql_server_name = 'SSANDILE\\EDSQLSERVER14', @print_output_to_file_only\
  \ = 1;\nEXEC dbo.backup_plan_output @differential_and_full_backup_time = '10:00:00',\
  \ @full_backup_day = 1, @backup_location = 'E:\\SQLBackups\\',\n@sql_data_location\
  \ = 'E:\\SQLData\\', @sql_server_name = 'SSANDILE\\EDSQLSERVER14', @print_output_to_file_only\
  \ = 1;\n```\n\n运行后，并不执行实际的备份操作。命令字符串会被发送到指定的文本文件。以下是 `QueryOutput.sql` 文件的内容：\n\n\
  ```sql\nBACKUP DATABASE [AdventureWorks2012] TO DISK = 'e:\\SQLBackups\\AdventureWorks2012_12062015140236.dif'\
  \ WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorks2014] TO DISK = 'e:\\SQLBackups\\\
  AdventureWorks2014_12062015140236.dif' WITH DIFFERENTIAL;BACKUP DATABASE [AdventureWorksDW2012]\
  \ TO DISK = 'e:\\SQLBackups\\AdventureWorksDW2012_12062015140236.dif' WITH DIFFERENTIAL;BACKUP\
  \ DATABASE [AdventureWorksDW2014] TO DISK = 'e:\\SQLBackups\\AdventureWorksDW2014_12062015140236.dif'\
  \ WITH DIFFERENTIAL;\nBACKUP DATABASE [AdventureWorks2012] TO DISK = 'e:\\SQLBackups\\\
  AdventureWorks2012_12062015140236.bak';BACKUP DATABASE [AdventureWorks2014] TO DISK\
  \ = 'e:\\SQLBackups\\AdventureWorks2014_12062015140236.bak';BACKUP DATABASE [AdventureWorksDW2012]\
  \ TO DISK = 'e:\\SQLBackups\\AdventureWorksDW2012_12062015140236.bak';BACKUP DATABASE\
  \ [AdventureWorksDW2014] TO DISK = 'e:\\SQLBackups\\AdventureWorksDW2014_12062015140236.bak';\n\
  BACKUP LOG [AdventureWorks2014] TO DISK = 'e:\\SQLBackups\\AdventureWorks2014_12062015140236.trn'\n\
  ```\n\n输出文件缺少空格和换行，这是因为 BCP 最适合处理单行的 T-SQL 查询。如果想改善格式，可以轻松地在 BCP 命令中插入中间步骤，以便在文件中添加换行符。无论如何，输出在功能上是正确的，将按要求执行备份到指定的输出文件夹。\n\
  \n请注意存储过程中对 `xp_cmdshell` 的使用。当需要从 SQL Server 内部运行文件操作或操作系统命令时，通常会使用此功能。通常，这只在受限制或私有环境中使用，因为它在公共服务器上启用时可能构成安全威胁。在实施前请仔细考虑您的用例，如果您的服务器处于公共环境中，请改用\
  \ SSIS、PowerShell 或其他工具。\n\n默认情况下，`xp_cmdshell` 是禁用的，但你可以使用以下 T-SQL 启用它：\n\n```sql\n\
  EXEC sp_configure 'show advanced options', 1\nGO\nRECONFIGURE\nGO\nEXEC sp_configure\
  \ 'xp_cmdshell', 1\nGO\nRECONFIGURE\nGO\n```\n\n关于 `xp_cmdshell` 的利弊，更多信息请参阅第 2\
  \ 章（涵盖 SQL 注入）和第 4 章（涵盖安全性）。或者，可以使用 PowerShell 来控制操作系统操作，以避免使用它。\n\n### 在其他服务器上执行\
  \ TSQL\n\n在管理多台服务器时，经常会遇到需要从当前服务器执行 TSQL 以远程运行到另一台 SQL Server 上的情况。虽然这些 TSQL 语句不是用动态\
  \ SQL 执行的，但其语句的创建和执行过程非常相似，值得进行一个简短的演示。\n\n考虑这样一个场景：你有一个中心报告服务器，并希望从本地服务器以及其他现场服务器中提取数据。你可能需要遍历每个服务器，从每个服务器提取数据并将其返回到本地的目标数据存储。首先，让我们为下一个示例创建一个简单的日志表：\n\
  \n```sql\nCREATE TABLE dbo.recent_product_counts\n(       count_id INT NOT NULL\
  \ IDENTITY(1,1) CONSTRAINT PK_recent_product_counts PRIMARY KEY CLUSTERED,\nproduct_count\
  \ INT NOT NULL,\nserver_name NVARCHAR(128),\nsample_time DATETIME NOT NULL CONSTRAINT\
  \ DF_recent_product_counts DEFAULT (CURRENT_TIMESTAMP));\n```\n\n有了存储结果的地方后，你将创建一个存储过程来说明如何使用\
  \ `OPENQUERY` 从远程服务器返回特定的行数，并将结果存储在此表中。这可以在清单 11-8 中看到。\n\n```sql\nIF EXISTS (SELECT\
  \ * FROM sys.procedures WHERE procedures.name = 'get_product_count_all_servers')\n\
  BEGIN\nDROP PROCEDURE dbo.get_product_count_all_servers;\nEND\nGO\nCREATE PROCEDURE\
  \ dbo.get_product_count_all_servers\nAS\nBEGIN\nSET NOCOUNT ON;\nDECLARE @sql_command\
  \ NVARCHAR(MAX) = '';\nSELECT\nname AS server_name\nINTO #servers\nFROM sys.servers;\n\
  SELECT @sql_command = @sql_command + '\nINSERT INTO AdventureWorks2014.dbo.recent_product_counts\n\
  (product_count, server_name)\nSELECT\nproduct_count,\n''' + server_name + '''\n\
  FROM OPENQUERY([' + server_name + '], ''SELECT COUNT(*) AS product_count FROM AdventureWorks2014.Production.Product\
  \ WHERE ModifiedDate >= ''''2/8/2014'''''');'\nFROM #servers\nWHERE server_name\
  \  @@SERVERNAME;\nSELECT @sql_command = @sql_command + '\nINSERT INTO AdventureWorks2014.dbo.recent_product_counts\n\
  (product_count, server_name)\nSELECT\nCOUNT(*),\n@@SERVERNAME\nFROM AdventureWorks2014.Production.Product\
  \ WHERE ModifiedDate >= ''2/8/2014''';\nEXEC sp_executesql @sql_command;\nDROP TABLE\
  \ #servers;\nEND\n```\n清单 11-8.\n使用动态 SQL 和 OPENQUERY 从远程服务器检索数据\n\n此存储过程分为两个部分：第一部分将生成\
  \ TSQL 来访问 `sys.servers` 中所有不是本地服务器的服务器。第二部分仅管理本地服务器，因为访问它不需要 `OPENQUERY` 语法。运行此查询两次后，`recent_product_counts`\
  \ 的内容如图 11-8 所示。\n\n![A371168_1_En_11_Fig8_HTML.jpg](img/A371168_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8.\n使用清单 11-8 中的存储过程从多个服务器收集的产品计数\n\n在我的计算机案例中，只有另一台服务器可供查询，但如果有更多，每一台都会包含在结果集中。存储过程中使用的\
  \ `ModifiedDate` 通常是基于当前日期和时间的当前日、周或月，但由于 `AdventureWorks` 中的数据是静态的，你需要往回看更久一点才能收集到有意义的计数。\n\
  \n也没有必要查询 `sys.servers` 中的所有 SQL Server。可以创建一个自定义列表，或者创建并访问一个服务器表来管理任意数量的本地或远程服务器。还要注意命令字符串文本中大量使用了撇号。由于\
  \ `OPENQUERY` 要求一个用撇号分隔的字符串，`sp_executesql` 也是如此，因此你需要将使用的撇号数量加倍。这确保在最终查询传递给每个 SQL\
  \ Server 执行时，字符串分隔符的数量是正确的。\n\n在以这种方式嵌套字符串时，经常进行调试以确保撇号数量正确。在执行前打印命令字符串有助于确保输出符合预期。如有疑问，请从头开始，一次构建一级语句，直到完成。在此示例中，由于整个\
  \ TSQL 语句嵌套在另一个字符串中，撇号的数量加倍了，但动态 SQL 的不同应用可能会导致略有不同的结果。\n\n仔细编写这类动态 SQL 所获得的回报将超过嵌套字符串的复杂性。在寻找此类数据访问需求的简单解决方案时，能够高效地从其他服务器检索重要数据，而无需使用循环、维护计划或\
  \ SSIS 包，可能是有益的。\n\n### 结论\n\n本章介绍了多种应用，它们运用了本书中介绍的许多技术。其中许多脚本都非常开放，在构建和实现时允许进行大量定制。列表生成允许在构建命令字符串时避免使用游标和循环，从而使执行非常高效。\n\
  \n随着时间的推移，会出现无数其他任务，动态 SQL 或其许多相关主题对于解决这些任务将具有不可估量的价值。即使你不是在开发新应用程序，了解这些工具也能让你在审查他人工作或排查性能或应用程序问题时保持警惕。\n\
  \n要有创造力并愿意编写新东西，即使只有很少的内容可以让你开始。许多伟大的工具都是由于“为什么还没有人做这个呢？！”这个问题而构建的。本书提供了一个起点，但随着\
  \ SQL Server 和其他数据库工具新版本的发布，以及软件应用程序复杂性随时间的增加，新颖解决方案的机会也在增加。\n\n即使你认为一个想法是死胡同，也要探索它，特别是如果别人声称它是死胡同的话。我敢打赌，我想出的“绝妙解决方案”中，超过一半最终毫无用处。剩下的那些让我在整个职业生涯中对数据库开发和优化保持乐观。\n\
