  \n## 规划基础架构\n\n在本节中，我们将查看即将交付的云应用程序，并规划我们所需的云资源。\n\n### 云账户\n\n在继续之前，您需要拥有一个可用的云账户。您可能会使用试用账户或标准的按需付费账户。试用账户将允许您免费完成本书中的所有演练。如果您拥有付费账户，您只需要记得终止（换句话说，删除）作为学习过程一部分构建的每个资源，以免产生费用。\n\
