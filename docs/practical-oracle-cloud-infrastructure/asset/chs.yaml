  *图 8-15: 查看 OCIR 仓库镜像*\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig14_HTML.jpg](img/478313_1_En_8_Fig14_HTML.jpg)\n\
  *图 8-14: 查看 OCIR 仓库*\n\n该镜像已存在于 OCIR 中。\n\n### 容器管理\n\n设想一下配置一个负载均衡器前置的实例池。在实例池中，每个计算实例在启动时使用\
  \ Docker 并拉取一个镜像，以运行多个（例如三个）基于 `uuid:1.0` 镜像的容器。这样，大量的 UUID API 实例将能够处理通过负载均衡器传入的真正高需求的请求流。这在概念上如图\
  \ 8-16 所示。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig16_HTML.jpg](img/478313_1_En_8_Fig16_HTML.jpg)\n\
  *图 8-16: 在多台虚拟机上运行容器化应用的多个实例*\n\n这可能运行良好，并且你将有机会根据需求增长手动或通过自动扩缩机制横向扩展计算实例的数量，或者在需求减少时缩减它们。\n\
  \n不过，请花点时间考虑几个挑战。\n\n*   通过引入更新的镜像版本来升级所有运行中的容器\n*   添加基于不同镜像的其他容器\n*   更改每个计算实例的容器数量\n\
  \n乍一看，你只需要将相关镜像推送到 OCIR，并根据你遵循的实例初始化风格调整云配置文件、Terraform 提供程序或 Ansible Playbook。然而，如果你更深入地审视这些挑战，你会开始问自己以下问题：\n\
  \n*   我如何在这些实例上安全管理认证令牌？\n*   我如何避免服务中断？\n*   如果我必须处理不同容器化应用程序之间的依赖关系，该怎么办？\n* \
  \  如果多个计算实例上的各种容器化应用程序需要相互交互，我实际上如何管理它们之间的虚拟网络？\n*   一个容器如何发现并与其它容器通信？\n\n如你所见，有时——我敢说经常——仅仅启动一个实例池，在每个实例上运行容器化应用并由负载均衡器前置是不够的。我列出的这些问题证明，你需要一个更复杂、更强大的机制来管理容器，并支持容器化应用程序的完整生命周期。这就是容器编排发挥作用的地方。\n\
  \n## 容器编排\n\n现代的后端系统由许多相互交互的应用程序和属于更专业化系统的应用模块组成。这种方法随着多年前面向服务架构（SOA）的到来而得到强化。从那时起，SOA\
  \ 已被广泛采用。面向服务是一种设计范式，其中优选无状态的软件组件被视为*服务*，它们通过描述良好的 API 提供其功能。这种方法导致个体软件能力之间更细粒度的划分，并带来了对个体服务之间各种类型交互需求的增加。\n\
  \n在操作系统的上下文中，将每个服务作为独立进程运行将是一项相当繁琐的任务。这就是为什么服务传统上被部署到*应用服务器*上的原因，这些应用服务器完成了许多关键的非功能性任务，例如管理依赖关系、提供资源注入、提供安全性、持久化状态、交付监控能力以及实现\
  \ API。服务开发人员受益于将这些支持任务委托给应用服务器，因为他们能够专注于服务代码中的功能目标。然后，应用服务器可以组合成集群，以实现负载分发和高可用性。此外，依赖关系是在应用服务器级别安装和注册的，因此与服务代码解耦。乍一看，这听起来绝对美妙，就像是企业软件的终极解决方案。然而，它可能导致——并且经常导致——在将特定服务从一个环境迁移到另一个环境时出现问题。在应用服务器的世界里，开发人员通常将他们的部署工件连同所需的依赖项列表一起交给运维团队，后者的角色是在各种环境中安装服务，并在需要时将它们接入消息总线。有时，不同环境的配置差异如此之大，以至于由于属性不正确或库版本不兼容而出现意外问题。要将服务部署到给定的应用服务器，服务代码必须遵守特定应用服务器支持的标准和实现的接口。例如，你将\
  \ Java EE 应用部署到兼容 JEE 的服务器，将 Python 应用部署到兼容 WSGI 的 Web 服务器，将 .NET 应用部署到 Microsoft\
  \ IIS。\n\n\n\n## 容器化与挑战\n\n部署到应用服务器的服务与容器化应用的一个区别在于，后者所有的依赖项都以镜像的形式与应用捆绑在一起。多亏了众多镜像共享的文件系统层，这不会造成任何主要的存储容量问题。然而，没有应用服务器就意味着容器必须自行处理所有`非功能性任务`。为了应对这一挑战，你可能需要为每个实现服务或部分业务流程的容器创建一组专用的容器来处理这些非功能性任务。实际上，这是一种被称为`边车模式`的知名模式。这就产生了将主容器与其边车容器逻辑组合起来，并作为一个单一的逻辑部署单元来联合管理其生命周期的需求。\n\
  \n容器化通常会产生更加细粒度的应用，每个应用都专注于一项狭窄且专门的任务，无论是数据转换、实现属于标准化 API 的单个 REST 资源，还是与各种软件即服务业务解决方案进行交互。有些人倾向于将这些高度专业化的服务称为`微服务`。许多微服务必须相互交互才能完成一个或多个业务流程。因此，容器化应用需要某种服务发现机制和连接能力。\n\
  \n为了实现容错并支持高可用的应用部署，具有容器运行时的多台主机会被组合在一起形成集群。这些集群必须提供某种覆盖网络，以便所有容器化应用在需要时能够顺畅地相互交互。总而言之，我们在一定程度上回到了那些为部署到应用服务器的服务已经解决的问题。对于容器化应用，我们需要某种`与基础设施无关的平台`，它将支持集群、内置扩展、生命周期管理以及相关容器组的扁平覆盖网络，如图\
  \ 8-17 所示。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig17_HTML.jpg](img/478313_1_En_8_Fig17_HTML.jpg)\n\
  \n图 8-17 容器化应用平台\n\n此类`容器平台`的目标如下：\n\n*   编排容器化应用\n*   抽象底层基础设施\n*   为应用提供以下功能：\n\
  \    *   扁平的覆盖网络\n    *   可扩展的计算能力\n    *   持久化存储\n    *   面向应用的集成服务发现\n    *  \
  \ 健康检查功能\n    *   以及更多\n\n根据牛津词典，`编排`一词可以表示“协调各个元素（…）以产生预期效果。”该平台协调各个独立容器及相关容器的生命周期，包括但不限于创建、扩展、终止、智能升级和自我修复。\n\
  \n从应用的角度来看，涉及多少计算实例或何种负载均衡器并不重要。重要的是计算能力以及稳定、不间断的传入请求流。这使得基础设施成为被抽象化的理想候选者。\n\n\
  目前已经存在相当多可用于运行容器化应用的集群感知平台，包括：\n\n*   `Docker Swarm`\n*   `HashiCorp Nomad`\n* \
  \  `Mesosphere DC/OS`\n*   `Kubernetes`\n\n云原生计算基金会（`CNCF`）托管着一个专注于容器化应用的开源软件生态系统。其成员包括主要的云提供商、成熟的软件供应商和快速发展的初创公司。在撰写本文时，`Kubernetes`是容器编排领域唯一一个毕业项目，在`GitHub`上有超过\
  \ 2,100 名直接贡献者，并已被许多云提供商采纳为其托管容器平台的引擎。\n\n## Kubernetes\n\n`Kubernetes`是一个真正庞大的主题，足以单独写一本书。该平台及多样化的相关工具生态系统提供了前文提到的广泛面向容器的功能。`Kubernetes`自带一个可扩展和可插拔的控制平面。`Kubernetes`作为一个围绕容器编排构建的、功能丰富的容器平台，为容器化应用提供了一个与基础设施无关、可扩展的部署画布，并配备了可插拔的扁平空间网络。\n\
  \n### Pods\n\n容器化应用被组织成`Pod`。`Pod`是一种逻辑结构，它将紧密相关的容器分组在一起，通常是一个主容器和几个边车容器。尽管 Pod\
  \ 中的容器在某种程度上仍然是隔离的，但它们确实共享一些元素，如主机名、网络接口和 IPC 命名空间。每个单独容器构建自的文件系统层仍然是分开的，除非它们共享相同或相似的镜像。容器可以使用`localhost`与同一\
  \ Pod 中的其他容器通信，因为它们共享环回接口。\n\n如何将容器分组到 Pod 中？首先，考虑扩展性。Pod 可以被复制以提高处理吞吐量，或者简单地提供高可用性以应对故障。如果你觉得将两个特定的容器分开扩展更合适，就把它们放入两个独立的\
  \ Pod 中。其次，考虑边车模式。对于一个特定的主容器，你通常会将专用的支持容器放入同一个 Pod 中，以便它们能与主容器自由通信，例如通过环回接口。\n\n\
  ### ReplicaSet\n\nPod 是核心的`Kubernetes`对象类型的一个示例。`Kubernetes`对象还有其他几种类型。我之前提到过 Pod\
  \ 可以被复制。复制操作由一个`ReplicaSet`对象处理。`Kubernetes`的一个基本概念是控制器控制循环的存在。一个`ReplicaSet`定义了带有特定标签的\
  \ Pod 的期望数量。相应的控制循环确保 Pod 的数量根据期望状态保持正确。如果在某个时刻运行的 Pod 副本太少，控制循环将确保实例数量增加到特定`ReplicaSet`定义中所期望的值。\n\
  \n### Service\n\n对于一组提供了特定 API 实现的 Pod 副本，你可能会问如何暴露这个 API。另一种`Kubernetes`对象，即`Service`对象，用于为实现特定服务的\
  \ Pod 副本组提供一个静态的入口点。`Kubernetes`根据选择器知道将传入的请求分发到哪里。当你定义一个`Service`对象时，你提供一个标签选择器。所有带有给定标签的\
  \ Pod 都将被视为该服务的寻址对象。\n\n`Service`对象的默认类型称为`ClusterIP`。它为服务提供一个只能在集群内部访问的内部 IP 地址。这对于那些服务仅被集群内其他容器调用的容器来说非常合适。为了让服务能从集群外部访问，你可以选择`LoadBalancer`类型（前提是你的底层云基础设施支持这种类型）。Oracle\
  \ Cloud Infrastructure 确实提供附加到公共 IP 并可以从互联网访问的公共负载均衡器。我稍后将实际演示这一点。\n\n\n\n\n如果你思考升级策略，大概能说出几种。首先，如果你接受短时间的服务中断，最简单的方法是直接终止所有容器使用已弃用镜像的\
  \ Pod，让 `ReplicaSet` 在后台自动重新创建它们，这次使用最新的镜像。或者，你可以采用蓝绿部署策略，即基于新镜像版本创建新的 Pod，与基于先前镜像版本正在运行的\
  \ Pod 并行存在，然后在某个瞬间将服务切换指向这些新 Pod。最后，你可以通过逐一替换 Pod 为更新的镜像版本来执行滚动升级。滚动升级策略需要你使用两个\
  \ `ReplicaSet` 资源，并按步骤以程序化的方式逐步执行变更。`ReplicaSet` 是一个相当底层的对象。为了提升升级体验，一个更高级的对象 `Deployment`\
  \ 应运而生。`Deployment` 对象通过 `ReplicaSet` 控制 Pod，其方式使得基于纯声明式变更来处理升级过程变得容易得多。我们不会在本书中深入探讨升级策略，但我们将使用\
  \ `Deployment` 对象，这就是我简要描述它的原因。\n\n作为对 Kubernetes 主要对象类型的快速介绍的总结，让我们看一下图 8-18。这里定义了两个部署。左侧的那个定义了一个单容器\
  \ Pod，标记为 `Tag A`，并将期望副本数设置为两个。右侧的那个定义了一个双容器 Pod，标记为 `Tag B`，并将期望副本数设置为三个。此外，还创建了两个\
  \ `LoadBalancer` 类型的服务。一个将流量转发到附加了标签 `Tag A` 的 Pod，而第二个则将流量转发到附加了标签 `Tag B` 的 Pod。\n\
  \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig18_HTML.jpg](img/478313_1_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18 Kubernetes 对象\n\n还有其他几种类型的 Kubernetes 对象，例如 `StatefulSets`、`DaemonSets`、`Jobs`、`Ingresses`、`PersistentVolumes`、`StorageClasses`\
  \ 等。如果我在这里试图涵盖所有内容，这本书的篇幅会变得极为庞大。这就是为什么我们只关注本章后续部分中用于演示 Oracle Kubernetes Engine\
  \ 的对象。如果这一切看起来过于理论化，请不要担心。你很快就会在实践中看到这些对象。继续阅读即可。\n\n构建一个具有各种附加功能、可用于生产的集群，其本身就可能是个挑战。即使你没有被要求设计和启动\
  \ Kubernetes 集群，了解其高层架构仍然是有益的。\n\nKubernetes 控制平面由各种软件组件构成，这些组件被复制并分布在奇数个主节点上。这些组件包括\
  \ API 服务器、调度器和控制器管理器。Kubernetes 对象定义存储在一个名为 `etcd` 的分布式、持久化键值存储中。`etcd` 集群拥有独立于\
  \ Kubernetes 的生命周期，这在规划和启动可用于生产的集群时增加了工作量。只有 API 服务器会直接访问 `etcd`。Pod 被调度到称为工作节点的其他类型节点上。在每个节点上，通常有一个\
  \ `kubelet` 守护进程作为 `systemd` 主机服务管理器运行。你可以将 `kubelet` 视为节点代理。它通过与本地容器运行时通信来管理给定节点上的特定\
  \ Pod 容器。从网络角度来看，Kubernetes 服务代理负责控制服务与 Pod 之间的流量路由，而另一个可插拔组件——容器网络接口插件——则实现了 Pod\
  \ 之间的覆盖网络。图 8-19 提供了属于 Kubernetes 控制平面的选定组件的高层概览。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig19_HTML.jpg](img/478313_1_En_8_Fig19_HTML.jpg)\n\
  \n图 8-19 Kubernetes 与底层基础设施\n\n本书并非专门讲述 Kubernetes 管理，你需要知道，在规划 Kubernetes 集群的自定义安装时，有许多不同的注意事项需要考虑。幸运的是，由于托管\
  \ Kubernetes 引擎的存在，我们无需为这些方面费心。\n\n\n\n## 托管集群\n\nOracle Cloud Infrastructure 提供了\
  \ Oracle Kubernetes Engine (OKE)，这是一个托管的 Kubernetes 平台即服务（PaaS）云产品，已通过 CNCF 认证的\
  \ Kubernetes 一致性程序验证。该认证确保了所需的 Kubernetes API 得到完全支持，并与开源发行版保持一致。托管服务意味着在几分钟内，你就能获得一个完全可运行的集群，由平台以智能方式管理。你无需操心\
  \ `etcd` 集群或主节点配置。所有控制平面组件都会自动安装。你的职责是选择工作节点规格，并指向将要创建工作节点和负载均衡器的 VCN 子网。该集群将与 IAM\
  \ 完全集成，并运行在 Oracle Cloud Infrastructure 计算实例上。\n\n### 在 OCI 控制台中创建集群\n\n在 OCI 控制台中创建集群非常直接。不过，首先要做的是：如果你的租户中从未启动过任何\
  \ OKE 集群，你必须显式启用 OKE 服务。这是通过在 `root` 区域中添加一条简单的 IAM 策略来完成的。所需的声明如清单 8-4 所示，它允许 OKE\
  \ 服务管理整个租户中的所有资源。OKE 服务必须能够配置实例并动态更改一些网络资源，例如安全列表。\n\n```json\n[ \"allow service\
  \ OKE to manage all-resources in tenancy\" ]\n```\n清单 8-4\n`tenancy.oke.policy.json`\n\
  \n确保你在本地机器上。让我们创建所需的策略。我们没有使用 `--profile` 参数；因此，该命令将以租户管理员身份执行，因为该用户定义在我们的 CLI 配置文件的\
  \ `DEFAULT` 配置文件中。\n\n```bash\n$ TENANCY_OCID=`cat ~/.oci/config | grep tenancy\
  \ | sed 's/tenancy=//'`\n$ echo TENANCY_OCID\nocid1.tenancy.oc1..aa.........3yymfa\n\
  $ cd ~/git\n$ cd oci-book/chapter08/3-kubernetes\n$ cd policies\n$ oci iam policy\
  \ create -c $TENANCY_OCID --name tenancy-oke --description \"OKE Policy\"  --statements\
  \ \"file://tenancy.oke.policy.json\"\n{\n\"data\": {\n...\n\"lifecycle-state\":\
  \ \"ACTIVE\",\n\"name\": \"tenancy-oke\",\n\"statements\": [\n\"allow service OKE\
  \ to manage all-resources in tenancy\"\n],\n...\n},\n}\n```\n\n如今，随着越来越多的端到端自动化到位，我们已经习惯了“一键式”方法，这种方法假设完成诸如集群配置之类的任务不需要复杂的操作。正如我之前所说，在\
  \ OCI 控制台（或使用 CLI）中启动集群非常直接。要使用 OCI 控制台配置集群，你需要转到开发者服务，选择容器集群，单击创建集群，并提供一些详细信息，例如\
  \ Kubernetes 版本、工作节点规格以及每个工作节点子网的初始数量。然而，本书侧重于代码驱动的自动化；因此，我将展示如何使用 Terraform 驱动的基础设施代码在自定义虚拟网络布局之上配置集群。\n\
  \n### 使用 Terraform 配置集群\n\n我们希望 `sandbox-admin` 被 OKE 集群识别为其初始管理员。这就是为什么你必须以 `sandbox-admin`\
  \ 用户身份配置集群至关重要。到目前为止，Terraform 代表租户管理员创建了所有资源。为了让 Terraform 此次使用另一组凭据并以 `sandbox-admin`\
  \ 身份与 OCI API 交互，你必须准备一个新的变量定义文件，如清单 8-5 所示。\n\n```hcl\ntenancy_ocid = \"\"\nregion\
  \ = \"\"\nuser_ocid = \"\"\nprivate_key_path = \"\"\nprivate_key_password = \"\"\
  \nfingerprint = \"\"\ncompartment_ocid = \"\"\n```\n清单 8-5\n`sandbox-admin.tfvars`\n\
  \n我们将使用 `--var-file` 参数将新文件传递给 `terraform`，以此为 `oci` 提供程序设置值，使其代表 `sandbox-admin`\
  \ 用户执行所有 API 调用。所有必需的详细信息已经存在于 `.oci/config` 文件中的 `SANDBOX-ADMIN` 配置文件中。我准备了一个辅助脚本，用于从存储在\
  \ `.oci/config` 文件中的值生成 `sandbox-admin.tfvars` 文件。\n\n```bash\n$ SANDBOX_COMPARTMENT_OCID=`oci\
  \ iam compartment get --query data.id --raw-output --profile SANDBOX-ADMIN`\n$ cd\
  \ ~/git/oci-book/chapter08/3-kubernetes\n$ chmod a+x oci_config_to_tfvars.sh\n$\
  \ ./oci_config_to_tfvars.sh ~/.oci/config ~/sandbox-admin.tfvars $SANDBOX_COMPARTMENT_OCID\n\
  ```\n\n确保新创建的 `tfvars` 文件确实存在于 `~/sandbox-admin.tfvars` 路径中，然后继续。\n\n我们将使用 Terraform\
  \ 来配置与 VCN 相关的资源，例如子网、安全列表和网关，以及 Kubernetes 集群云资源和工作节点实例池。OKE 需要各种资源，例如计算实例、负载均衡器和虚拟网络。`sandbox-admins`\
  \ 组成员和租户管理员已经拥有在 `Sandbox` 区域中管理所需云资源类型的所有权限。在 `chapter08/3-kubernetes` 目录中，你会找到基础设施代码。让我们来配置它。\n\
  \n```bash\n$ cd ~/git\n$ cd oci-book/chapter08/3-kubernetes\n$ cd infrastructure\n\
  $ find . | sort\n./kube\n./kube/cluster.tf\n./kube/vars.tf\n./kube/vcn-lb.tf\n./kube/vcn-workers.tf\n\
  ./modules.tf\n./provider.tf\n./vars.tf\n./vcn.tf\n$ terraform init\nInitializing\
  \ modules...\n- kubernetes in kube\nInitializing the backend...\nInitializing provider\
  \ plugins...\n- Checking for available provider plugins...\n- Downloading plugin\
  \ for provider \"oci\" (terraform-providers/oci) 3.30.0...\nTerraform has been successfully\
  \ initialized!\n$ terraform apply -var-file=\"~/sandbox-admin.tfvars\" -auto-approve\n\
  ...\n```\n\n> **提示**\n>\n> 如果你收到 401 错误，很可能是因为你使用了私钥的相对路径。请打开 `sandbox-admin.tfvars`\
  \ 文件，将 `~` 字符或 `$HOME` 变量替换为你的主目录的绝对路径，例如 `/home/thomas/` 或 `/Users/thomas/`。\n\n\
  配置基础设施以及随后在主节点和工作节点上安装集群控制平面组件将需要几分钟时间，通常少于八分钟。Terraform 将显示 `Still creating` 消息。你也可以访问\
  \ OCI 控制台，观察处于创建状态的新集群，如图 8-20 所示。操作如下：\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig20_HTML.jpg](img/478313_1_En_8_Fig20_HTML.jpg)\n\
  \n图 8-20\n\nOKE 集群配置\n\n1.  转到菜单 ➤ 开发者服务 ➤ 集群。\n\n在某个时间点，集群将转移到活动状态。这宣告了控制平面已就绪。你仍然需要等待片刻，直到工作节点（节点池实例）进入运行状态。同时，请查看集群和网络信息，如图\
  \ 8-21 所示。基础设施代码配置了一个具有单个工作节点池的 Kubernetes 集群。我们可以清楚地看到谁创建了该集群。\n\n> **注意**\n>\n\
  > 在“创建者”字段中，你应该看到 `sandbox-admin` 用户的名称或 OCID，如图 8-21 所示。如果你看到其他用户，例如租户管理员，这意味着你在执行\
  \ `terraform apply` 时要么省略了 `--var-file` 参数，要么 `~/sandbox-admin.tfvars` 文件中的用户数据无效。请使用\
  \ `terraform destroy` 删除当前集群，确保为 `sandbox-admin` 用户准备的新 Terraform 属性文件正确无误，然后重新创建基础设施。\n\
  \n\n\n所有云资源都已配置在`Sandbox`隔离区中。有两个负载均衡器子网。它们将用于托管高可用的、基于浮动 IP 的公共负载均衡器，当你开始创建`LoadBalancer`类型的\
  \ Kubernetes `Service`对象时，这些负载均衡器就会出现。`Pod CIDR`字段显示了将由动态创建的 Pod 使用的私有 IP 地址范围，而`Services\
  \ CIDR`字段则显示了由 Kubernetes 服务暴露的地址范围。Pod 和服务地址范围的选取方式确保它们不会与工作节点所连接的`kube-vcn`虚拟云网络（VCN）所使用的地址范围重叠。\n\
  \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig21_HTML.jpg](img/478313_1_En_8_Fig21_HTML.jpg)\n\
  \n图 8-21\n\n在 OCI 控制台中查看活动的 OKE 集群摘要\n\n如果你查看 Terraform 的最终输出，你会看到不仅列出了集群资源，还提到了一个节点池。\n\
  \n```\n...\nmodule.kubernetes.oci_containerengine_cluster.k8s_cluster: Creation\
  \ complete after 6m6s\nmodule.kubernetes.oci_containerengine_node_pool.k8s_nodepool:\
  \ Creating...\nmodule.kubernetes.oci_containerengine_node_pool.k8s_nodepool: Creation\
  \ complete after 2s\nApply complete! Resources: 13 added, 0 changed, 0 destroyed.\n\
  ```\n\n节点池由 OKE 管理，你可以在 OCI 控制台集群详情视图的底部看到它，如图 8-22 所示。该池控制着充当工作节点的计算实例。如果你点击这些实例中任何一个的名称，你将被转到相应实例的“实例详情”视图。所有属于\
  \ OKE 集群节点池的工作节点都像任何普通计算实例一样可见，如图 8-23 所示。你可以查看它们的指标并检查其他实例特有的信息。你还会发现实例显示名称包含了一小部分集群\
  \ OCID。如果你想知道主节点和 etcd 主机的实例在哪里，答案是整个 OKE 集群控制平面完全由 OKE 托管，从未在任何 API 中暴露。你不会在 OCI\
  \ 控制台中看到它们，也无法使用 API 列出它们。这些计算资源是不可见的。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig23_HTML.jpg](img/478313_1_En_8_Fig23_HTML.jpg)\n\
  \n图 8-23\n\nOCI 控制台中的 OKE 集群实例\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig22_HTML.jpg](img/478313_1_En_8_Fig22_HTML.jpg)\n\
  \n图 8-22\n\nOCI 控制台中的 OKE 集群节点池\n\n基础设施代码在我们选择设为私有子网的每个工作节点子网中声明了一个计算实例。对于工作节点，你有两个选项。它们可以连接到公共子网并拥有公共\
  \ IP，也可以被隔离在阻止实例拥有公共 IP 的私有子网中。在我们的案例中，我们选择了第二个选项。这就是为什么你在`Node Pool`表的`Public IP`列中看到`Unavailable`。这些实例部署在两个不同的可用性域（AD）中。它们的规格是`VM.Standard2.1`，基于`Oracle\
  \ Linux 7.6`镜像。这些选择究竟从何而来？让我们看一下基础设施代码中的选定元素：\n\n```\n$ find . -name \"*.tf\" |\
  \ sort\n./kube/cluster.tf\n./kube/vars.tf\n./kube/vcn-lb.tf\n./kube/vcn-workers.tf\n\
  ./modules.tf\n./provider.tf\n./vars.tf\n./vcn.tf\n```\n\n基础设施代码遵循一个众所周知的、你在这本书中已经见过几次的结构。只有一个名为`kube`的非根模块。它包含了\
  \ OKE 集群使用的所有基础设施云资源，但 VCN 和网关除外。VCN、NAT 网关和互联网网关在`vcn.tf`文件中声明。`modules.tf`文件将这些网络资源的\
  \ OCID 作为输入参数提供给`kube`模块。根模块中的代码与你在之前练习中看到的类似；因此，我不打算在这里列出根模块文件。你可以直接在基础设施代码中查看它们。清单\
  \ 8-6 显示了来自`kube`模块的`vars.tf`文件。\n\n```\n"
- "# kube module - vars.tf\n...\nvariable \"oke_cluster\" {\n  type = map\n  default\
  \ = {\n    cidr                  = \"10.0.2.0/24\"\n    version               =\
  \ \"v1.12.7\"\n    worker_image          = \"Oracle-Linux-7.6\"\n    worker_shape\
  \          = \"VM.Standard2.1\"\n    worker_nodes_in_subnet = 1\n    pods_cidr \
  \            = \"10.244.0.0/16\"\n    services_cidr         = \"10.96.0.0/16\"\n\
  \  }\n}\nvariable \"oke_wn_subnet_cidr\" {\n  type = list(string)\n  default = [\
  \ \"10.0.2.0/27\", \"10.0.2.32/27\" ]\n}\nvariable \"oke_lb_subnet_cidr\" {\n  type\
  \ = list(string)\n  default = [ \"10.0.2.128/28\", \"10.0.2.144/28\" ]\n}\nvariable\
  \ \"oke_engine_cidr\" {\n  type = list(string)\n  default = [ \"130.35.0.0/16\"\
  , \"138.1.0.0/17\"]\n}\n代码清单 8-6\nvars.tf（kube 模块）\n```\n\n你可能被`kube`模块的`vars.tf`文件中为不同子网定义的各种\
  \ IP 地址范围的数量所淹没。它并没有看起来那么复杂。看一下图 8-24。仅 Kubernetes 本身就需要两个不重叠的私有 IP 地址范围，分别用于 Pod\
  \ 和服务。这些范围在`oke_cluster` Terraform 变量映射中设置，然后传递给代表我们刚刚配置的 OKE 集群的`oci_container_engine_cluster`\
  \ Terraform 资源。底层基础设施，如计算实例或 OCI 负载均衡器，将分布在属于同一个 VCN 的四个子网中。工作节点的子网在`oke_wn_subnet_cidr`列表变量中设置，而负载均衡器的子网则在`oke_lb_subnet_cidr`列表变量中设置。\n\
  \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig24_HTML.jpg](img/478313_1_En_8_Fig24_HTML.jpg)\n\
  \n图 8-24\n\n与 OKE 集群相关的子网\n\n代码清单 8-7 展示了`vcn-workers.tf`文件，其中包含与工作节点子网相关的 VCN 资源的声明。这里定义了两个私有子网，每个位于不同的可用性域中。\n\
  \n\n\n### 工作节点子网与网络配置\n\n以下代码块展示了为 OKE 工作节点子网配置的路由表、安全列表和子网资源。这些资源定义在 `vcn-workers.tf`\
  \ 文件中。\n\n```\nresource \"oci_core_route_table\" \"oke_workers_rt\" {\n  compartment_id\
  \ = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  display_name   = \"\
  oke-workers-rt\"\n  route_rules {\n    destination        = \"0.0.0.0/0\"\n    network_entity_id\
  \  = var.vcn_nat_ocid\n  }\n}\n\nresource \"oci_core_security_list\" \"oke_workers_sl\"\
  \ {\n  compartment_id = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n\
  \  display_name   = \"oke-workers-sl\"\n  # Allow all traffic within the VCN\n \
  \ egress_security_rules {\n    stateless    = true\n    destination  = var.oke_cluster[\"\
  cidr\"]\n    protocol     = \"all\"\n  }\n  ingress_security_rules {\n    stateless\
  \    = true\n    source       = var.oke_cluster[\"cidr\"]\n    protocol     = \"\
  all\"\n  }\n  # Allow all outbound traffic\n  egress_security_rules {\n    destination\
  \ = \"0.0.0.0/0\"\n    protocol    = \"all\"\n  }\n}\n\nresource \"oci_core_subnet\"\
  \ \"oke_workers_ad1_net\" {\n  compartment_id      = var.compartment_ocid\n  vcn_id\
  \              = var.vcn_ocid\n  display_name        = \"oke-workers-ad1-net\"\n\
  \  availability_domain = var.ads[0]\n  cidr_block          = var.oke_wn_subnet_cidr[0]\n\
  \  route_table_id      = oci_core_route_table.oke_workers_rt.id\n  security_list_ids\
  \   = [ oci_core_security_list.oke_workers_sl.id ]\n  prohibit_public_ip_on_vnic\
  \ = true\n  dns_label           = \"work1\"\n}\n\nresource \"oci_core_subnet\" \"\
  oke_workers_ad2_net\" {\n  compartment_id      = var.compartment_ocid\n  vcn_id\
  \              = var.vcn_ocid\n  display_name        = \"oke-workers-ad2-net\"\n\
  \  availability_domain = var.ads[1]\n  cidr_block          = var.oke_wn_subnet_cidr[1]\n\
  \  route_table_id      = oci_core_route_table.oke_workers_rt.id\n  security_list_ids\
  \   = [ oci_core_security_list.oke_workers_sl.id ]\n  prohibit_public_ip_on_vnic\
  \ = true\n  dns_label           = \"work2\"\n}\n```\n*代码清单 8-7: `vcn-workers.tf`\
  \ (kube 模块)*\n\n### 负载均衡器子网与网络配置\n\n类似地，为负载均衡器子网配置的 VCN 资源声明在一个名为 `vcn-lb.tf` 的类似文件中（如代码清单\
  \ 8-8 所示）。这里同样定义了两个子网，每个位于不同的可用性域。这两个子网是公有的，以便 OKE 能够为任何 LoadBalancer 类型的 Kubernetes\
  \ 服务创建 OCI 公有负载均衡器。\n\n```\nresource \"oci_core_route_table\" \"oke_lb_rt\" {\n\
  \  compartment_id = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  display_name\
  \   = \"oke-lb-rt\"\n  route_rules {\n    destination        = \"0.0.0.0/0\"\n \
  \   network_entity_id  = var.vcn_igw_ocid\n  }\n}\n\nresource \"oci_core_security_list\"\
  \ \"oke_lb_sl\" {\n  compartment_id = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n\
  \  display_name   = \"oke-lb-sl\"\n  # Allow all traffic within the VCN\n  egress_security_rules\
  \ {\n    stateless    = true\n    destination  = var.oke_cluster[\"cidr\"]\n   \
  \ protocol     = \"all\"\n  }\n  ingress_security_rules {\n    stateless    = true\n\
  \    source       = var.oke_cluster[\"cidr\"]\n    protocol     = \"all\"\n  }\n\
  \  # Allow all inbound traffic on ports 30000-32767\n  egress_security_rules {\n\
  \    stateless    = true\n    destination  = \"0.0.0.0/0\"\n    protocol     = \"\
  all\"\n  }\n  ingress_security_rules {\n    stateless    = true\n    source    \
  \   = \"0.0.0.0/0\"\n    protocol     = \"6\"\n    tcp_options {\n      min = 30000\n\
  \      max = 32767\n    }\n  }\n}\n\nresource \"oci_core_subnet\" \"oke_lb_ad1_net\"\
  \ {\n  compartment_id      = var.compartment_ocid\n  vcn_id              = var.vcn_ocid\n\
  \  display_name        = \"oke-lb-ad1-net\"\n  availability_domain = var.ads[0]\n\
  \  cidr_block          = var.oke_lb_subnet_cidr[0]\n  route_table_id      = oci_core_route_table.oke_lb_rt.id\n\
  \  security_list_ids   = [ oci_core_security_list.oke_lb_sl.id ]\n  dns_label  \
  \         = \"lb1\"\n}\n\nresource \"oci_core_subnet\" \"oke_lb_ad2_net\" {\n  compartment_id\
  \      = var.compartment_ocid\n  vcn_id              = var.vcn_ocid\n  display_name\
  \        = \"oke-lb-ad2-net\"\n  availability_domain = var.ads[1]\n  cidr_block\
  \          = var.oke_lb_subnet_cidr[1]\n  route_table_id      = oci_core_route_table.oke_lb_rt.id\n\
  \  security_list_ids   = [ oci_core_security_list.oke_lb_sl.id ]\n  dns_label  \
  \         = \"lb2\"\n}\n```\n*代码清单 8-8: `vcn-lb.tf` (kube 模块)*\n\n### OKE 集群与节点池\n\
  \n最后，OKE 集群及其对应的节点池（用作 Kubernetes 工作节点的计算实例）在 `cluster.tf` 基础设施文件中声明。代码如代码清单 8-9\
  \ 所示。\n\n```\nresource \"oci_containerengine_cluster\" \"k8s_cluster\" {\n  compartment_id\
  \      = var.compartment_ocid\n  kubernetes_version  = var.oke_cluster[\"version\"\
  ]\n  name                = \"k8s-cluster\"\n  vcn_id              = var.vcn_ocid\n\
  \  options {\n    kubernetes_network_config {\n      pods_cidr      = var.oke_cluster[\"\
  pods_cidr\"]\n      services_cidr  = var.oke_cluster[\"services_cidr\"]\n    }\n\
  \    service_lb_subnet_ids = [\n      oci_core_subnet.oke_lb_ad1_net.id,\n     \
  \ oci_core_subnet.oke_lb_ad2_net.id\n    ]\n  }\n}\n\nresource \"oci_containerengine_node_pool\"\
  \ \"k8s_nodepool\" {\n  compartment_id      = var.compartment_ocid\n  cluster_id\
  \          = oci_containerengine_cluster.k8s_cluster.id\n  kubernetes_version  =\
  \ var.oke_cluster[\"version\"]\n  name                = \"k8s-nodepool\"\n  node_image_name\
  \     = var.oke_cluster[\"worker_image\"]\n  node_shape          = var.oke_cluster[\"\
  worker_shape\"]\n  subnet_ids = [\n    oci_core_subnet.oke_workers_ad1_net.id,\n\
  \    oci_core_subnet.oke_workers_ad2_net.id\n  ]\n  quantity_per_subnet = var.oke_cluster[\"\
  worker_nodes_in_subnet\"]\n  ssh_public_key      = file(\"~/.ssh/oci_id_rsa.pub\"\
  )\n}\n```\n*代码清单 8-9: `cluster.tf` (kube 模块)*\n\n图 8-25 展示了为 `k8s-cluster` OKE 集群实例配置的\
  \ OCI 基础设施组件。Kubernetes 控制平面元素（如主节点和 etcd 主机）是完全托管且不可访问的，因此从 API 或 OCI 控制台中不可见。你可以检查、监控并在一定程度上管理的是作为工作节点的计算实例、负载均衡器以及其他虚拟网络组件。\n\
  \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig25_HTML.jpg](img/478313_1_En_8_Fig25_HTML.jpg)\n\
  \n*图 8-25: 已配置的 OKE 集群*\n\n有了托管的 Kubernetes 集群，现在是时候连接到 Kubernetes API 了。\n\n\n\n\
  ### 以超级用户身份连接\n\nKubernetes 假定用户完全在 Kubernetes 外部进行管理。如果您正在使用一个未托管的 Kubernetes 集群，例如安装在您的数据中心或某些\
  \ IaaS 上，您通常会为客户端设置基于证书的身份验证，或者采用利用由 Kubernetes API 信任的身份签名的 ID 令牌的 OpenID Connect。后者在\
  \ Kubernetes API 认证以及随后的授权背景下，允许采用更面向生产的用户管理策略。\n\n对于托管服务，如 Oracle Kubernetes Engine，一切都简单得多。对于\
  \ OKE 集群，只要 IAM 用户是具有适当 IAM 策略的组的成员，所有 IAM 用户都会被识别并成功通过身份验证，开箱即用。不过，接下来的是授权问题。作为某个组成员的\
  \ IAM 用户，如果该组在集群所在 compartment 中被分配了 `manage clusters` 权限，则 Kubernetes OCI 授权器会自动将该用户视为集群管理员，并拥有对该特定集群的完整\
  \ Kubernetes API 访问权限。其余的 IAM 用户则必须显式绑定到预定义或自定义的 RBAC 角色。您稍后将了解这一点。`sandbox-admin`\
  \ 用户属于 `sandbox-admins` 组，该组已被授予对 `Sandbox` compartment 中所有资源的完全管理级访问权限。这样，Kubernetes\
  \ API 应该会将此用户识别为集群管理员。首先，您需要一个所谓的 `kubeconfig` 文件，它不过是一个 YAML 文件，包含以命名用户身份连接到 Kubernetes\
  \ API 所需的所有信息。要为特定 IAM 用户生成定制的 kubeconfig 文件，您可以使用 OCI 控制台或 OCI CLI，如下所示（请注意，我们使用\
  \ `--profile SANDBOX-ADMIN` 以 `sandbox-admin` 用户身份执行 CLI 命令）：\n\n```\n$ CLUSTER_OCID=`oci\
  \ ce cluster list --name k8s-cluster --query \"data[?name=='k8s-cluster'] | [0].id\"\
  \ --lifecycle-state ACTIVE --raw-output --profile SANDBOX-ADMIN`\n$ echo $CLUSTER_OCID\n\
  ocid1.cluster.oc1.eu-frankfurt-1.aa.........tdg42w\n$ REGION=eu-frankfurt-1\n$ mkdir\
  \ ~/.kube\n$ oci ce cluster create-kubeconfig --cluster-id $CLUSTER_OCID --file\
  \ ~/.kube/sandbox-admin.config --region $REGION --profile SANDBOX-ADMIN\nNew config\
  \ written to the file /Users/mjk/.kube/sandbox-admin.config\n$ chmod 600 ~/.kube/sandbox-admin.config\n\
  $ ls -l ~/.kube | awk '{print $1, $9}'\n-rw------- sandbox-admin.config\n```\n\n\
  根据惯例，kubeconfig 文件被放置在新创建的目录 `~/.kube` 中。路径 `~/.kube/config` 被我们即将使用的 `kubectl`\
  \ 工具视为 kubeconfig 文件的默认路径。我们特意使用了自定义名称，以便仅在需要时才使用此配置。列表 8-10 展示了为 `sandbox-admin`\
  \ 用户生成的 kubeconfig 文件。\n\n```\napiVersion: v1\nclusters:\n- cluster:\ncertificate-authority-data:\n\
  ::: Base64-encoded cluster certificate :::\nserver: https://c4wmntdg42w.eu-frankfurt-1.clusters.oci.oraclecloud.com:6443\n\
  name: cluster-c4wmntdg42w\ncontexts:\n- context:\ncluster: cluster-c4wmntdg42w\n\
  user: user-c4wmntdg42w\nname: context-c4wmntdg42w\ncurrent-context: context-c4wmntdg42w\n\
  kind: \"\"\nusers:\n- name: user-c4wmntdg42w\nuser:\nexec:\napiVersion: client.authentication.k8s.io/v1beta1\n\
  args:\n- ce\n- cluster\n- generate-token\n- --cluster-id\n- ::: Cluster OCID :::\n\
  - --region\n- eu-frankfurt-1\ncommand: oci\nenv: []\n列表 8-10\n.kube/sandbox-admin.config\n\
  ```\n\n`clusters:cluster:certificate-authority-data` 字段是集群的 Base64 编码证书，而 `users:user:exec`\
  \ 字段是一个指令，用于使用自定义命令动态获取凭据并以特定 IAM 用户身份进行身份验证。如果您想进行身份验证，仅仅持有此文件是不够的。用于获取凭据的命令依赖于\
  \ OCI CLI 和用户特定的 CLI 配置文件。您很快就会看到它的实际操作。\n\n别忘了我们正在为 `sandbox-admin` 使用特定的 CLI 配置文件。我们必须考虑到这一点，并相应地修改\
  \ `kube/sandbox-admin.config` 文件。编辑 `.kube/sandbox-admin.config` 文件并添加两行新内容（加粗显示），如下所示：\n\
  \n```\n...\nusers:\n- name: user-c2gmyzqguzt\nuser:\nexec:\napiVersion: client.authentication.k8s.io/v1beta1\n\
  args:\n- ce\n- cluster\n- generate-token\n- --profile\n- SANDBOX-ADMIN\n- --cluster-id\n\
  ...\n```\n\n您将使用一个名为 `kubectl` 的工具连接到 Kubernetes API。该工具将读取 kubeconfig 文件以执行以下操作：\n\
  \n1.  查明 Kubernetes API 公共端点是什么\n\n2.  安全地连接到 Kubernetes API\n\n3.  使用 OCI CLI 获取令牌并以命名\
  \ IAM 用户身份为我们进行身份验证\n\n`kubectl` 工具已通过 cloud-init 根据提供的 cloud-config 文件预先安装在开发实例上，因此您应该能够开箱即用该工具。我们仍然需要在开发实例上安装\
  \ OCI CLI。现在，连接到开发实例并执行以下命令：\n\n```\n[opc@dev-vm ~]$ bash -c \"$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)\"\
  \n...\n-- Installation successful.\n-- Run the CLI with /home/opc/bin/oci --help\n\
  [opc@dev-vm ~]$ oci --version\n2.6.14\n[opc@dev-vm ~]$ mkdir ~/.oci\n[opc@dev-vm\
  \ ~]$ mkdir ~/.apikeys\n[opc@dev-vm ~]$ exit\n```\n\n现在，我们需要准备并上传 `sandbox-admin`\
  \ 的 CLI 配置。\n\n```\n$ cat ~/.oci/config | grep -A 4 \"\\[SANDBOX-ADMIN\\]\" > ~/.oci/devvm.config\n\
  $ cat ~/.oci/config | grep tenancy >> ~/.oci/devvm.config\n$ cat ~/.oci/config |\
  \ grep region >> ~/.oci/devvm.config\n$ scp -i ~/.ssh/oci_id_rsa ~/.oci/devvm.config\
  \ opc@$DEV_VM_PUBLIC_IP:/home/opc/.oci/config\ndevvm.config    100%  329  5.5KB/s\n\
  ```\n\nCLI 配置引用了 API 签名密钥。我们也上传它。\n\n```\n$ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-admin.pem\
  \ opc@$DEV_VM_PUBLIC_IP:/home/opc/.apikeys/api.sandbox-admin.pem\napi.sandbox-admin.pem\
  \   100% 1766    10.0KB/s\n```\n\n唯一缺少的是开发实例上的 kubeconfig 文件。因此，我们将通过以下方式安全地将 kubeconfig\
  \ 文件复制到开发实例：\n\n```\n$ scp -i ~/.ssh/oci_id_rsa ~/.kube/sandbox-admin.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.kube/config\n\
  sandbox-admin.config           100% 3669   117.0KB/s   00:00\n```\n\n提示\n\n要了解开发实例是如何初始化的，您可以阅读位于\
  \ `chapter08/1-devmachine/devmachine/cloud-init/devvm.config.yaml` 的 cloud-config\
  \ 文件。\n\n现在，请连接到开发实例。\n\n```\n$ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP\n\
  ```\n\n在我们开始与 Kubernetes API 交互之前，我们将调整新上传的配置文件的文件权限。\n\n```\n[opc@dev-vm ~]$ chmod\
  \ 600 .kube/config\n[opc@dev-vm ~]$ chmod 600 .oci/config\n```\n\n我们将发出几个 `kubectl`\
  \ 命令来测试与 Kubernetes API 的连通性，并检查集群中的基本 Kubernetes 对象。仍在开发实例上，发出以下命令：\n\n\n\n## Kubernetes\
  \ 集群验证与命名空间管理\n\n```\n[opc@dev-vm ~]$ kubectl get nodes\nNAME        STATUS   ROLES\
  \   AGE   VERSION\n10.0.2.2    Ready    node    14h   v1.12.7\n10.0.2.34   Ready\
  \    node    14h   v1.12.7\n[opc@dev-vm ~]$ kubectl get namespaces\nNAME       \
  \   STATUS   AGE\ndefault       Active   14h\nkube-public   Active   14h\nkube-system\
  \   Active   14h\n[opc@dev-vm ~]$ kubectl get pods -n kube-system\nNAME        \
  \                            READY   STATUS\nkube-dns-7db5546bc6-4gvqq         \
  \      3/3     Running\nkube-dns-7db5546bc6-gq6fq               3/3     Running\n\
  kube-dns-autoscaler-7fcbdf46bd-5sdnx    1/1     Running\nkube-flannel-ds-gvkxn \
  \                  1/1     Running\nkube-flannel-ds-vlsgk                   1/1\
  \     Running\nkube-proxy-blzxf                        1/1     Running\nkube-proxy-sdv4m\
  \                        1/1     Running\nkubernetes-dashboard-7b96874d59-w5tfj\
  \   1/1     Running\nproxymux-client-10.0.2.2                1/1     Running\nproxymux-client-10.0.2.34\
  \               1/1     Running\ntiller-deploy-7c4c4bfbc4-nsscm          1/1   \
  \  Running\n```\n\n**提示**\n如果遇到错误，请仔细检查所有文件（`.oci/config`、`.kube/config`、`.apikeys/api.sandbox-admin.pem`）是否按要求设置、CLI\
  \ 是否已安装，以及您是否已按照前面几个段落的描述将 `SANDBOX-ADMIN` 配置文件添加到 Kubeconfig 文件中。\n\n`kubectl get\
  \ nodes` 命令列出了工作节点。主节点不会列在 OKE 集群中。`kubectl get namespaces` 命令列出了 Kubernetes 命名空间，可以将其视为在同一物理集群中隔离不同环境的一种便捷方式。各种\
  \ Kubernetes 对象（如 Pod 或服务）存在于特定命名空间的范围内。`kube-system` 命名空间用于托管 Kubernetes 网络代理（`kube-proxy-`）和集群功能插件，例如容器网络接口插件\
  \ Pod（`kube-flannel-`）或集群 DNS Pod（`kube-dns-`）。您可以使用 `kubectl get pods` 命令并设置命名空间参数\
  \ `-n` 为 `kube-system` 值来列出这些 Pod。\n\n这三个命令的输出实际上证明了您已通过 Kubernetes OCI 授权器成功认证。但给定用户在\
  \ Kubernetes API 方面的权限有多大呢？有没有办法检查呢？是的，有。一个直接的方法是 `auth can-i` Kubernetes API 调用。您可以使用\
  \ `kubectl` 这样调用：\n\n```\n[opc@dev-vm ~]$ kubectl auth can-i create namespace --all-namespaces\n\
  Yes\n[opc@dev-vm ~]$ kubectl auth can-i '*' '*' --namespace=default\nyes\n```\n\n\
  第一次执行该命令是询问 Kubernetes API，代表 `kubectl` 进行调用的用户是否有权创建 Kubernetes 命名空间。答案不言自明，不是吗？第二条命令使用\
  \ `*` 通配符来检查在 `default` 命名空间中，是否允许该用户执行所有类型的操作。\n\n事实上，正如我所提到的，`sandbox-admin` 用户应该能够对该集群的\
  \ Kubernetes API 执行所有类型的操作，因为他属于 `Sandbox` 管理员 IAM 组，并因此被 Kubernetes OCI 授权器视为该集群的集群管理员。让我们验证一下。\n\
  \n```\n[opc@dev-vm ~]$ kubectl auth can-i '*' '*' --all-namespaces\nYes\n```\n\n\
  这一切都是正确的。`sandbox-admin` 用户被授权在所有 Kubernetes 命名空间中对所有 Kubernetes 对象执行所有操作。\n\n###\
  \ Sandbox 命名空间\n\nKubernetes 命名空间可用于在同一物理集群中隔离不同环境。大多数 Kubernetes 资源都是命名空间范围的，在创建\
  \ Pod 或服务等特定资源时需要指定命名空间。在使用 Kubernetes DNS 进行 Kubernetes 服务名称解析时，命名空间也很有用，因为 Kubernetes\
  \ 服务的 FQDN 包含其命名空间。我们希望 `sandbox-user` 能够执行诸如创建 Kubernetes 对象（如 Pod、服务和部署）等操作，但仅限于专用\
  \ Kubernetes 命名空间的范围内。最后但同样重要的是，您可以设置各种配额来限制特定命名空间中 Kubernetes 资源的消耗。\n\n让我们创建一个名为\
  \ `dev-sandbox` 的新 Kubernetes 命名空间。\n\n```\n[opc@dev-vm ~]$ cd oci-book/chapter08/3-kubernetes/platform\n\
  [opc@dev-vm ~]$ kubectl create -f dev-sandbox-namespace.yaml\nnamespace/dev-sandbox\
  \ created\n```\n\n我们使用了 `kubectl create` 命令来创建一个定义在 YAML Kubernetes 对象描述符中的新 Kubernetes\
  \ 命名空间资源。我们通过 `-f` 参数传递了文件的相对路径。清单 8-11 显示了该 YAML 文件。\n\n```\napiVersion: v1\nkind:\
  \ Namespace\nmetadata:\n  name: dev-sandbox\n  labels:\n    environment: dev\n```\n\
  **清单 8-11**\n`dev-sandbox-namespace.yaml`\n\n这个新的 Kubernetes 对象是 `Namespace` 类型，名称为\
  \ `dev-sandbox`，并带有自定义的 `environment` 标签，其值设置为 `dev`。由于 Kubernetes 平台的可插拔和可扩展性，标签通常是关联各种对象的主要手段。在这种情况下，我们将不使用这个特定的标签，但我借此机会向您展示如何为\
  \ Kubernetes 对象添加标签。您现在可以使用 `kubectl` 来列出并描述新创建的命名空间。\n\n```\n[opc@dev-vm ~]$ kubectl\
  \ get namespaces\nNAME          STATUS   AGE\ndefault       Active   15h\ndev-sandbox\
  \   Active   41m\nkube-public   Active   15h\nkube-system   Active   15h\n[opc@dev-vm\
  \ ~]$ kubectl describe namespace dev-sandbox\nName:         dev-sandbox\nLabels:\
  \       environment=dev\nAnnotations:  \nStatus:       Active\nNo resource quota.\n\
  No resource limits.\n[opc@dev-vm ~]$ exit\n```\n\n现在，有了新的命名空间，我们可以准备 `sandbox-user`\
  \ 用户来连接 Kubernetes API 了。\n\n\n## 以开发者身份连接\n\n我们已经了解到，要使用`kubectl`与 Kubernetes API\
  \ 通信，我们必须拥有一个 kubeconfig 文件。此外，您也看到 OKE 客户端认证机制假设令牌是使用 OCI CLI 在后台动态生成的。基于此事实，我们上传了`sandbox-admin`用户的\
  \ CLI 配置和 API 签名密钥。在本章前面，我们使用了`ce cluster create-kubeconfig` CLI 为`sandbox-admin`用户生成\
  \ kubeconfig。该命令是代表`sandbox-admin`用户发出的，这要归功于 CLI 配置文件中存在`SANDBOX-ADMIN`配置文件。在本节中，我们将让`sandbox-user`生成一个个人\
  \ kubeconfig 文件。很明显，并非每个 IAM 用户都应被允许生成个人 kubeconfig 文件。要生成 kubeconfig 文件，OCI API\
  \ 要求调用 API 所代表的 IAM 用户拥有`GetClusterKubeconfig`权限集。此权限包含在`use clusters` IAM 策略动词中。让我们创建一个新策略，允许`sandbox-users`使用`Sandbox`\
  \ compartment 中的所有 OKE 集群。尽管该策略是为`sandbox-users`组的成员准备的，但我们是像这样使用`SANDBOX-ADMIN`配置文件以`sandbox-admin`身份执行\
  \ CLI 命令的：\n\n```\n$ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed 's/tenancy=//'`\n\
  $ echo $TENANCY_OCID\nocid1.tenancy.oc1..aa.........3yymfa\n$ cd ~/git\n$ cd oci-book/chapter08/3-kubernetes\n\
  $ cd policies\n$ oci iam policy create --name sandbox-users-containers-policy --description\
  \ \"Containers-related policy for regular Sandbox users\"  --statements \"file://sandbox-users.containers.policy.json\"\
  \ --profile SANDBOX-ADMIN\n{\n\"data\": {\n...\n\"lifecycle-state\": \"ACTIVE\"\
  ,\n\"name\": \"sandbox-users-containers-policy\",\n\"statements\": [\n\"allow group\
  \ sandbox-users to use clusters in compartment Sandbox\"\n],\n...\n}\n```\n\n列表\
  \ 8-12 展示了我们用来创建新 IAM 策略的 JSON 文件的内容。正如我之前所说，我们正在授予`sandbox-users`组的成员使用`Sandbox`\
  \ compartment 中所有 OKE 集群的权利。这组权限也包括生成个人 kubeconfig 文件的权利。\n\n```\n[\n\"allow group\
  \ sandbox-users to use clusters in compartment Sandbox\"\n]\n列表 8-12\nsandbox-users.containers.policy.json\n\
  ```\n\n现在，我们已准备好通过应用`SANDBOX-USER` CLI 配置文件，代表`sandbox-user`用户执行`ce cluster create-kubeconfig`\
  \ CLI 命令，如下所示：\n\n```\n$ oci ce cluster create-kubeconfig --cluster-id $CLUSTER_OCID\
  \ --file ~/.kube/sandbox-user.config --region $REGION --profile SANDBOX-USER\nNew\
  \ config written to the file /Users/mjk/.kube/sandbox-user.config\n$ chmod 600 ~/.kube/sandbox-user.config\n\
  ```\n\n我们必须通过设置正确的 OCI CLI 配置文件来修改新生成的 kubeconfig 文件。请编辑`sandbox-user.config`文件并像这样添加`SANDBOX-USER`配置文件：\n\
  \n```\n...\nusers:\n- name: user-c2gmyzqguzt\nuser:\nexec:\napiVersion: client.authentication.k8s.io/v1beta1\n\
  args:\n- ce\n- cluster\n- generate-token\n- --profile\n- SANDBOX-USER\n- --cluster-id\n\
  ...\n```\n\n总而言之，在此阶段，我们有两个配置文件。\n\n```\n$ ls -l ~/.kube | awk '{print $1, $9}'\n\
  -rw------- sandbox-admin.config\n-rw------- sandbox-user.config\n```\n\n现在，将最新的\
  \ kubeconfig 文件上传到开发人员实例。\n\n```\n$ scp -i ~/.ssh/oci_id_rsa ~/.kube/sandbox-user.config\
  \ opc@$DEV_VM_PUBLIC_IP:/home/opc/.kube\nsandbox-user-config           100% 3669\
  \   262.2KB/s   00:00\n```\n\n我们必须通过添加`SANDBOX-USER`配置文件来扩展`dev-vm`上的 OCI CLI 配置。让我们在本地完成此操作，然后再次上传以替换先前版本。\n\
  \n```\n$ cat ~/.oci/config | grep -A 4 \"\\[SANDBOX-USER\\]\" >> ~/.oci/devvm.config\n\
  $ cat ~/.oci/config | grep tenancy >> ~/.oci/devvm.config\n$ cat ~/.oci/config |\
  \ grep region >> ~/.oci/devvm.config\n$ scp -i ~/.ssh/oci_id_rsa ~/.oci/devvm.config\
  \ opc@$DEV_VM_PUBLIC_IP:/home/opc/.oci/config\ndevvm.config   100%  656   5.2KB/s\n\
  ```\n\n最后但同样重要的是，我们需要上传`sandbox-user`的 API 签名密钥。\n\n```\n$ scp -i ~/.ssh/oci_id_rsa\
  \ ~/.apikeys/api.sandbox-user.pem opc@$DEV_VM_PUBLIC_IP:/home/opc/.apikeys/api.sandbox-user.pem\n\
  api.sandbox-user.pem   100% 1766    13.7KB/s\n```\n\n让我们连接到开发机器。\n\n```\n$ ssh -i\
  \ ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP\n```\n\n此时，开发人员机器上的`~/.kube`目录中应该有两个 kubeconfig\
  \ 文件：\n\n```\n[opc@dev-vm ~]$ chmod 600 ~/.kube/sandbox-user.config\n[opc@dev-vm\
  \ ~]$ ls -l ~/.kube | grep config | awk '{print $1, $9}'\n-rw-------. config\n-rw-------.\
  \ sandbox-user.config\n```\n\n您将使用`--kubeconfig`参数指示`kubectl`工具应使用哪个文件，如图 8-26 所示。如果将参数留空，则默认情况下将选择`~/.kube/config`文件。\n\
  \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig26_HTML.jpg](img/478313_1_En_8_Fig26_HTML.jpg)\n\
  \n**图 8-26**\nKubeconfig 文件\n\n让我们尝试列出`dev-sandbox`命名空间中的 Pod，这次代表`sandbox-user`。请记住，通过像这样设置`--kubeconfig`参数来选择适当的\
  \ kubeconfig 文件：\n\n```\n[opc@dev-vm]$ kubectl --kubeconfig ~/.kube/sandbox-user-config\
  \ get pods -n dev-sandbox\nError from server (Forbidden): pods is forbidden: User\
  \ \"ocid1.user.oc1..aa.........dzqpxa\" cannot list resource \"pods\" in API group\
  \ \"\" in the namespace \"dev-sandbox\"\n```\n\n收到的响应清楚地表明，给定用户无权执行此类操作。`sandbox-user`用户属于一个未分配`manage\
  \ clusters`策略的组。因此，该用户在 k8s-cluster OKE 集群中没有预定义的角色集。我们必须显式地将用户绑定到一个角色。我们将创建一个*角色绑定*，将`sandbox-user`绑定到`edit`角色，并且仅限于`dev-sandbox`命名空间的范围。`edit`角色是预定义的\
  \ Kubernetes 角色，它给予对特定命名空间中大多数类型的 Kubernetes 对象的读写访问权限，但不允许用户创建角色绑定。\n\n我们现在将创建一个\
  \ Rolebinding Kubernetes 对象，该对象将`sandbox-user`绑定到`dev-sandbox`命名空间上下文中的预定义 edit\
  \ 角色。您必须代表`sandbox-admin`执行`kubectl create rolebinding`，并像这样省略`--kubeconfig`参数：\n\
  \n```\n[opc@dev-vm]$ SANDBOX_USER_OCID=ocid1.user.oc1..aa.........dzqpxa\n[opc@dev-vm]$\
  \ kubectl create rolebinding sandbox-users-binding --clusterrole=edit --namespace=dev-sandbox\
  \ --user=$SANDBOX_USER_OCID\nrolebinding.rbac.authorization.k8s.io/sandbox-users-binding\
  \ created\n```\n\n我们可以再次尝试列出`dev-sandbox`命名空间中的 Pod。请记住设置`--kubeconfig`参数以作为`sandbox-user`用户运行命令。\n\
  \n```\n[opc@dev-vm]$ kubectl --kubeconfig ~/.kube/sandbox-user-config get pods -n\
  \ dev-sandbox\nNo resources found.\n```\n\n`No resources found`消息证明我们能够作为`sandbox-user`调用\
  \ Kubernetes API。\n\n对于`sandbox-user`用户，我们期望仅在`dev-sandbox`命名空间的范围内执行所有`kubectl`命令。您可以像这样将默认命名空间添加到您的配置文件中，而不是显式使用`-n`参数：\n\
  \n```\n[opc@dev-vm]$ cat ~/.kube/sandbox-user.config\n...\ncontexts:\n- context:\n\
  cluster: cluster-...\nnamespace: dev-sandbox\nuser: user-...\nname: context-...\n\
  ...\n```\n\n最后，我们已准备好将一些 Pod 部署到我们的 OKE 集群。\n\n\n### Pod\n\n如前所述，本章前文已对 UUID API\
  \ 进行了容器化，并将 `uuid:1.0` Docker 镜像推送至 OCI 注册表。现在，我们将基于此镜像创建一个 Kubernetes Pod。具体方法是：提供一个\
  \ YAML 描述文件，其中定义了包含单个容器的新 Pod 及其容器镜像。需要记住，我们为 `uuid:1.0` 镜像使用了一个私有的 OCIR 仓库。从 OCIR\
  \ 的角度看，OKE 集群只是另一个客户端，为了成功拉取镜像，它必须使用认证令牌进行验证。您可以将此令牌存储在 Kubernetes 的 *secret* 类型对象中。这样，在创建需要从特定注册表中的一个或多个容器仓库拉取镜像的\
  \ Kubernetes Pod 时，您就可以引用这个 secret。在我们这个例子中，secret 将封装区域性的 OCIR 端点、IAM 用户名和该用户的认证令牌。因此，Kubernetes\
  \ 将只能从该特定 IAM 用户有权访问的仓库中拉取镜像。\n\n为了创建单容器 Pod，我们将使用带有简单 YAML 描述文件的 `kubectl create`\
  \ 命令。该过程的概念图见图 8-27。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig27_HTML.jpg](img/478313_1_En_8_Fig27_HTML.jpg)\n\
  \n图 8-27\n\n#### 令牌与秘密\n\n在本节中，所有 `kubectl` 调用都将代表 `sandbox-user` 用户执行。为了简化输入，我们可以通过设置\
  \ `KUBECONFIG` 环境变量来覆盖默认的 kubeconfig 路径。设置并导出该变量，使其指向属于 `sandbox-user` 用户的 kubeconfig\
  \ 文件，如下所示：\n\n```\n[opc@dev-vm]$ export KUBECONFIG=~/.kube/sandbox-user.config\n\
  ```\n\n您将使用 `kubectl create secret` 命令在 `dev-sandbox` 命名空间中创建一个新的 Secret 对象。该 Secret\
  \ 对象将被命名为 `sandbox-user-secret`，类型为 `docker-registry`，并包含 Kubernetes 访问存储了 `uuid:1.0`\
  \ 容器镜像的 OCIR 私有仓库所需的所有信息，即：\n\n*   区域性 OCIR 注册表 URL\n*   IAM 用户\n*   该 IAM 用户的认证令牌\n\
  \n我使用了 shell 变量，以便您在调整变量值后可以直接复制 `kubectl create secret` 命令。请记住，`OCIR_REGION` 变量使用\
  \ OCIR 区域代码，`OCI_TENANCY_NAMESPACE` 使用您的租户命名空间，`OCI_USER_TOKEN` 使用为 `sandbox-user`\
  \ 用户生成的认证令牌。\n\n```\n[opc@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk\n[opc@dev-vm]$\
  \ OCIR_REGION=fra\n[opc@dev-vm]$ OCI_USER=sandbox-user\n[opc@dev-vm]$ OCI_USER_TOKEN=\"\
  B8.E_Ry7oOtN1KF0do9x\"\n[opc@dev-vm]$ kubectl create secret docker-registry sandbox-user-secret\
  \ --docker-server=$OCIR_REGION.ocir.io --docker-username=\"$OCI_TENANCY_NAMESPACE/$OCI_USER\"\
  \ --docker-password=\"$OCI_USER_TOKEN\" -n dev-sandbox\nsecret/sandbox-user-secret\
  \ created\n```\n\nCaution\n在使用 OCIR 时，请注意不要混淆 *租户名称* 和 *租户命名空间*。请确保用于获取 OCIR 访问权限的\
  \ Kubernetes secret 使用的是租户命名空间。\n\n我们可以像这样显示特定命名空间中存在的 secret：\n\n```\n[opc@dev-vm]$\
  \ kubectl get secrets -n dev-sandbox\nNAME                 TYPE                \
  \               DATA  AGE\ndefault-token-wg574  kubernetes.io/service-account-token\
  \ 3   3d1h\nsandbox-user-secret  kubernetes.io/dockerconfigjson      1    51s\n\
  ```\n\n新创建的、类型为 `kubernetes.io/dockerconfigjson` 的 `sandbox-user-secret` 存储了以 `sandbox-user`\
  \ 用户身份访问 OCIR 所需的所有数据。\n\n现在，我们将基于 `uuid:1.0` 容器镜像创建一个单容器 Pod。您只需使用定义了新 Pod 的 `uuid-pod.yaml`\
  \ 文件来执行 `kubectl create` 命令。不久前，您通过环境变量覆盖了默认的 kubeconfig 路径。这意味着所有 `kubectl` 命令都是作为\
  \ `sandbox-user` 用户调用的。您必须在 `dev-sandbox` 命名空间中创建 Pod；否则操作将失败。像这样创建 Pod：\n\n```\n\
  [opc@dev-vm]$ cd oci-book/chapter08/3-kubernetes/platform\n[opc@dev-vm]$ sed -i\
  \ \"s/OCIR_REGION/$OCIR_REGION/; s/OCI_TENANCY_NAMESPACE/$OCI_TENANCY_NAMESPACE/\"\
  \ uuid-pod.yaml\n[opc@dev-vm]$ kubectl create -f uuid-pod.yaml -n dev-sandbox\n\
  pod/uuid-pod created\n[opc@dev-vm]$ kubectl get pods -n dev-sandbox\nNAME      \
  \ READY   STATUS    RESTARTS   AGE\nuuid-pod   1/1     Running   0          8s\n\
  ```\n\nTip\n如果您看到 `ErrorImagePull` 或 `ImagePullBackOff` 状态，而不是 `Running` 状态，则可能是令牌有问题。请确保在设置\
  \ `OCI_USER_TOKEN` 变量时将令牌放在引号内。\n\n清单 8-13 展示了用于创建新 Pod 的 YAML 文件。`metadata` 部分用于将对象置于特定的命名空间并设置其名称。`spec`\
  \ 部分包含容器定义以及拉取镜像时要使用的 Secret 对象的名称。镜像名称引用了正确标记为 `uuid:1.0` 的容器镜像。我们使用 `sed` 命令将\
  \ YAML 文件中两个用大写字母表示的占位符替换为您的 OCIR 区域和租户命名空间。\n\n```\napiVersion: v1\nkind: Pod\n\
  metadata:\nname: uuid-pod\nnamespace: dev-sandbox\nspec:\ncontainers:\n- image:\
  \ OCIR_REGION.ocir.io/OCI_TENANCY_NAMESPACE/sandbox/uuid:1.0\nname: uuid-container\n\
  ports:\n- containerPort: 5000\nprotocol: TCP\nimagePullSecrets:\n- name: sandbox-user-secret\n\
  Listing 8-13\nuuid-pod.yaml\n```\n\n坦率地说，单独一个 Pod 并不能给我们带来多少增值。我们知道它运行着一个 UUID API，但我们无法直接访问其端点。让我们删除这个\
  \ Pod。\n\n```\n[opc@dev-vm]$ kubectl delete pod uuid-pod -n dev-sandbox\npod \"\
  uuid-pod\" deleted\n```\n\n\n\n### 部署与服务\n\n一个容器化的应用几乎从来不只是孤零零的单容器 Pod。大多数容器化应用，特别是无状态应用，都希望能够进行水平扩展，并向服务消费者暴露服务端点。服务消费者可以被认为是同一集群中其他\
  \ Pod 内运行的其它容器化应用，或者是来自公共互联网的外部系统或客户端。为了控制和方便地管理一组 Pod 副本的服务端，你将使用 Kubernetes 的`Service`对象。`Service`对象在某种程度上解耦了代表\
  \ Web 服务的静态端与由一组 Pod 提供的服务实现。这样做的部分原因是 Pod 可以被动态地扩缩容。同时，服务端应保持不变，以简化服务发现。此外，`Service`对象负责对传入流量进行适当的负载均衡。为了管理对一组\
  \ Pod 的操作，例如升级策略和维持预期数量的健康 Pod，你将使用 Kubernetes 的`Deployment`对象。`Deployment`对象会创建一个`ReplicaSet`，该`ReplicaSet`保持稳定数量的相同\
  \ Pod，并替换那些进入不健康状态的 Pod。此外，它还通过使用各种升级策略，来谨慎处理容器更新到新镜像的方式。图 8-28 展示了这些 Kubernetes\
  \ 对象之间简单的协作关系。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig28_HTML.jpg](img/478313_1_En_8_Fig28_HTML.jpg)\n\
  \n图 8-28\n\nKubernetes 上的无状态服务\n\n假设你仍在开发实例上，`KUBECONFIG`变量已如前所述设置，并且你仍在`3-kubernetes/platform`目录中。使用`kubectl\
  \ create`命令和`uuid-deployment.yaml`文件来创建一组 Kubernetes 对象，如下所示：\n\n```\n[opc@dev-vm]\
  \ $ sed -i \"s/OCIR_REGION/$OCIR_REGION/; s/OCI_TENANCY_NAMESPACE/$OCI_TENANCY_NAMESPACE/\"\
  \ uuid-deployment.yaml\n[opc@dev-vm] $ kubectl create -f uuid-deployment.yaml -n\
  \ dev-sandbox\ndeployment.apps/uuid-dpm created\nservice/uuid-srv created\n```\n\
  \n清单 8-14 展示了`uuid-deployment.yaml`文件，该文件创建了关联的 Kubernetes 对象，即`Service`、`Deployment`、`ReplicaSet`以及托管容器的`Pods`，这些容器基于从租户的\
  \ OCIR 拉取的`uuid:1.0`容器镜像。所有 Pod 都带有`app=uuid`标签。`Service`对象使用基于标签的选择器`app:uuid`来了解如何路由和分发从其专用的\
  \ Oracle Cloud Infrastructure 负载均衡器传入的流量。如果`Service`对象的类型设置为`LoadBalancer`，则负载均衡器会被动态创建。\n\
  \n```\napiVersion: apps/v1\nkind: Deployment\nmetadata:\nname: uuid-dpm\nnamespace:\
  \ dev-sandbox\nspec:\nreplicas: 2\nselector:\nmatchLabels:\napp: uuid\ntemplate:\n\
  metadata:\nlabels:\napp: uuid\nspec:\nimagePullSecrets:\n- name: sandbox-user-secret\n\
  containers:\n- name: uuid-container\nimage: OCIR_REGION.ocir.io/OCI_TENANCY_NAMESPACE/sandbox/uuid:1.0\n\
  ports:\n- containerPort: 5000\nprotocol: TCP\n\napiVersion: v1\nkind: Service\n\
  metadata:\nname: uuid-srv\nnamespace: dev-sandbox\nspec:\ntype: LoadBalancer\nselector:\n\
  app: uuid\nports:\n- port: 80\ntargetPort: 5000\n清单 8-14\nuuid-deployment.yaml\n\
  ```\n\n你可以使用`kubectl get`命令来显示新创建的对象。\n\n```\n[opc@dev-vm]$ kubectl get pods -n\
  \ dev-sandbox -o wide\nNAME                       READY STATUS   IP          NODE\n\
  uuid-dpm-78cf484f96-rj4br  1/1   Running  10.244.1.7  10.0.2.2\nuuid-dpm-78cf484f96-wg2zw\
  \  1/1   Running  10.244.0.7  10.0.2.34\n[opc@dev-vm]$ kubectl get replicasets -n\
  \ dev-sandbox\nNAME                  DESIRED   CURRENT   READY\nuuid-dpm-78cf484f96\
  \   2         2         2\n[opc@dev-vm]$ kubectl get services -n dev-sandbox\nNAME\
  \      TYPE          CLUSTER-IP   EXTERNAL-IP    PORT(S)\nuuid-srv  LoadBalancer\
  \  10.96.26.62  130.61.195.20  80:31475/TCP\n```\n\n新创建的`Service`对象是`LoadBalancer`类型。这导致配置了一个新的高可用公共\
  \ OCI 负载均衡器，该均衡器跨越了你为集群负载均衡器设置的两个子网。`EXTERNAL-IP`列显示了负载均衡器的公共 IP 地址。如果你看到`Pending`，请稍等片刻。你的负载均衡器正在启动中。在我的例子中，负载均衡器的公共\
  \ IP 地址是 130.61.195.20，你的地址可能会不同。请记下它，我们稍后会需要用到。同时，你可以在 OCI 控制台中观察负载均衡器，如图 8-29\
  \ 所示。你可能需要等待片刻才能看到“整体运行状况”设置为`正常`。有时，即使负载均衡器完全可用，这个标志最初也会在稍长一段时间内设置为`未知`。图 8-30\
  \ 展示了负载均衡器的详细视图，包括其形态、公共 IP 地址、VCN 以及你在启动 OKE 集群时为负载均衡器选择的两个公共子网。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig30_HTML.jpg](img/478313_1_En_8_Fig30_HTML.jpg)\n\
  \n图 8-30\n\nKubernetes 服务负载均衡器详情\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig29_HTML.jpg](img/478313_1_En_8_Fig29_HTML.jpg)\n\
  \n图 8-29\n\nKubernetes 服务负载均衡器\n\n如果你仍在开发者实例上，请断开连接。\n\n```\n[opc@dev-vm]$ exit\n\
  ```\n\n让我们向服务的外部 IP 地址发送一系列相同的请求。在运行这些命令之前，你需要将`LB_PUBLIC_IP`的值替换为已分配给你负载均衡器的 IP\
  \ 地址：\n\n```\n$ LB_PUBLIC_IP=130.61.195.20\n$ for i in {1..10}; do curl $LB_PUBLIC_IP:80/identifiers;\
  \ done\n{\"generator\":\"uuid-dpm-78cf484f96-wg2zw\",\"uuid\":\"a5bf.......d471\"\
  }\n{\"generator\":\"uuid-dpm-78cf484f96-wg2zw\",\"uuid\":\"f2a4.......b902\"}\n\
  {\"generator\":\"uuid-dpm-78cf484f96-rj4br\",\"uuid\":\"564c.......1496\"}\n{\"\
  generator\":\"uuid-dpm-78cf484f96-rj4br\",\"uuid\":\"2473.......f7f9\"}\n{\"generator\"\
  :\"uuid-dpm-78cf484f96-rj4br\",\"uuid\":\"9709.......bc47\"}\n{\"generator\":\"\
  uuid-dpm-78cf484f96-wg2zw\",\"uuid\":\"cffd.......22d9\"}\n{\"generator\":\"uuid-dpm-78cf484f96-wg2zw\"\
  ,\"uuid\":\"6bb3.......5285\"}\n{\"generator\":\"uuid-dpm-78cf484f96-rj4br\",\"\
  uuid\":\"6b02.......cafc\"}\n{\"generator\":\"uuid-dpm-78cf484f96-rj4br\",\"uuid\"\
  :\"fdb5.......dcf7\"}\n{\"generator\":\"uuid-dpm-78cf484f96-wg2zw\",\"uuid\":\"\
  ee94.......b038\"}\n```\n\n`generator`字段是根据接收到请求的 Pod 名称填充的。查看结果，你应该会看到请求在支撑我们服务的两个\
  \ Pod 之间相当均匀地分配。如果你愿意，可以在几秒钟内将容器化应用实例的数量扩展到数十甚至数百个。\n\n我们在本章中使用 Oracle Kubernetes\
  \ Engine 所完成的操作，仅仅是触及了使用基于云的托管 Kubernetes 所能实现功能的皮毛。请随意尝试，当你准备好进入下一章时，别忘了终止集群和开发者实例，以节省你的资源消耗。\n\
  \n\n\n# 9. 云原生架构\n\n## 清理\n\n我们需要按正确顺序终止三组资源。\n\n*   Kubernetes 对象及其相关的 OCI 资源\n\
  *   OKE 集群及相关资源\n*   `dev-vm` 计算实例及相关资源\n\n首先，我们有一个 Kubernetes 服务，它是在配置负载均衡器时创建的。我们需要删除此服务以移除相应的负载均衡器。让我们再次连接到开发者实例，并使用\
  \ `kubectl` 删除我们刚刚成功测试过的 Kubernetes 对象。\n\n```shell\n$ ssh -i ~/.ssh/oci_id_rsa\
  \ opc@$DEV_VM_PUBLIC_IP\n[opc@dev-vm]$ export KUBECONFIG=~/.kube//sandbox-user.config\n\
  [opc@dev-vm]$ kubectl delete all --all -n dev-sandbox\npod \"uuid-deployment-78cf484f96-rj4br\"\
  \ deleted\npod \"uuid-deployment-78cf484f96-wg2zw\" deleted\nservice \"uuid-service\"\
  \ deleted\ndeployment.apps \"uuid-deployment\" deleted\n[opc@dev-vm]$ exit\n```\n\
  \n第二步涉及终止集群。进入基础设施代码目录，并执行 `terraform destroy` 命令，正确引用 `sandbox-admin.tfvars` 文件，以代表\
  \ `sandbox-admin` 用户执行此操作。\n\n```shell\n$ cd ~/git\n$ cd oci-book/chapter08/3-kubernetes/infrastructure\n\
  $ terraform destroy -var-file=\"$HOME/sandbox-admin.tfvars\" -auto-approve\n```\n\
  \n最后，你可以进入本章的最后一个清理步骤，终止 `dev-vm` 计算实例。\n\n```shell\n$ source ~/tfvars.env.sh\n\
  $ cd ~/git\n$ cd oci-book/chapter08/1-devmachine\n$ terraform destroy -auto-approve\n\
  ```\n\n## 总结\n\n在本章中，你体验了将应用程序容器化的端到端过程。首先，我们基于 UUID API 构建了一个多层容器镜像，该 API 最初在第\
  \ 2 章中作为操作系统服务构建和部署在计算实例上。我们基于此镜像在本地测试了容器，并将其推送到 OCIR 私有仓库。接着，我们讨论了基于最流行的开源容器平台\
  \ Kubernetes 进行容器编排的必要性。然后，我们使用 Oracle Kubernetes Engine 准备并配置了一个托管 Kubernetes 集群。随后，你学习了如何使用\
  \ Kubernetes API 以及管理 IAM 用户的细粒度访问权限。最后，你创建了一套完整的 Kubernetes 对象，以基于本章开头准备的容器镜像，妥善管理一个无状态的容器化应用程序。\n\
  \n在下一章中，我们将讨论云原生架构在当今的实际含义。\n\n近年来，软件领域的变化程度和速度前所未有地加快了。`开源`运动点燃了大量分散且常常独立的团队，他们以惊人的速度竞相将新的软件组件、工具、平台、协议和服务推向市场。`云计算`通过允许团队在几秒钟内自行配置虚拟化硬件资源，消除了许多与硬件相关的入门壁垒。借助云提供商管理的硬件能力（包括虚拟化甚至裸机），几乎任何人都可以启动和开发一个小型软件项目。前一章简要介绍的`容器化`，通常为设计应用程序带来了新的方法，并需要新的补充工具来使解决方案达到生产就绪状态。这里存在一些老问题需要解答，例如如何在容器时代解决存储、网络、消息传递和服务发现的挑战。也有新的领域有待探索——服务网格、容器注册表和调度器等。让我们列举三个对构建新一代软件解决方案的架构方式产生重大影响的信息时代转折点。它们如下：\n\
  \n*   `开源`\n*   `云计算`\n*   `容器化`\n\n日益增长的开源贡献者以及启动云端软件项目的便利性，引发了前所未有的软件开发规模。容器化的到来带来了对新型软件组件的需求，以及调整一些现有工具的需求。要推出一个生产就绪的软件解决方案，通常需要精心挑选各种类型的现有组件，添加你内部的应用程序代码库，并正确集成所有内容。大量积极开发中、通常尚未成熟且常常相互竞争的面向容器的组件、实用程序、平台、协议和服务，使得公司越来越难以选择他们所需的东西，如图\
  \ 9-1 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig1_HTML.jpg](img/478313_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1：信息时代转折点\n\n解决同类问题的方法过多以及大量相互竞争且常常不成熟的开源软件项目，可能会导致一定程度的混乱。为避免陷入困境，就产生了对`标准化`的需求。这类似于拥有设计模式来解决常见的软件开发挑战。有几种类型的标准需要考虑。一些标准对于需要交互的软件组件能够“说同一种语言”至关重要。例如，OpenAPI\
  \ 规范为使用 YAML 或 JSON 文档定义 REST API 提供了标准，这些文档对人类和机器都是可读的。CloudEvents 规范旨在定义通用的事件结构，以便广泛的应用程序能够无缝理解其他应用的事件。其他标准，如容器网络接口（CNI）和容器存储接口（CSI），侧重于定义接口，让供应商特定的插件能够以统一的方式与各种容器运行时通信。技术负责人和架构师面临的最大挑战之一，就是应对开源项目的洪流。担任这些角色的人在设计和构建基于云的解决方案时，面临着依赖哪些开源项目的问题。由于这些项目大多数相对较新且仍不成熟，因此存在随着时间推移，一些项目被废弃或在开源竞争中失去优势的风险。换句话说，如果能有某种由行业认可的参考架构，换句话说，就是一系列符合合理要求、安全可靠的“毕业项目”集合，供设计面向云的解决方案时选用，那将是非常好的。为满足这一需求，领先的云提供商、独立软件供应商、技术驱动型公司以及学术和非营利组织共同创建了`云原生计算基金会`（CNCF）。CNCF\
  \ 承载了整个面向云和容器的开源项目生态系统，并在其发展过程中提供支持。被接受加入 CNCF 项目组合的项目，根据其成熟度和采用情况进行分级。有三个等级：沙箱、孵化和毕业。对于技术负责人和架构师，CNCF\
  \ 在为构建的解决方案选择组件时，提供了一个方便的项目全景图供参考，如图 9-2 所示。此外，CNCF 协调全球性活动，如 KubeCon + CloudNativeCon，并支持全球范围内的云原生技术聚会网络。\n\
  \n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig2_HTML.jpg](img/478313_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2：在构建云解决方案时选择云原生项目\n\n\n\n## 云原生\n\n什么是云原生？看到 `native` 这个词，我们可以推断，云原生工具或组件是专门针对以云为核心的、业界公认的参考架构而设计和构建的。我们需要一些例子来更好地理解这个术语，以及构成云原生生态系统的各类工具、应用程序和组件。如果我们参考\
  \ CNCF 对 `云原生` 的定义，我们会了解到以下内容：\n\n> *云原生技术使组织能够在公共云、私有云和混合云等现代化、动态的环境中构建和运行可扩展的应用程序。容器、服务网格、微服务、不可变基础设施和声明式\
  \ API 是这种方法的典型示例。*\n\n最新的定义可以在 GitHub 上的 [`https://github.com/cncf/toc/blob/master/DEFINITION.md`](https://github.com/cncf/toc/blob/master/DEFINITION.md)\
  \ 找到。\n\n### 容器与编排\n\n列举云原生技术时，首先要提到容器。如您所知，容器旨在无论底层主机平台如何，都能以相同的方式工作。要运行容器，需要一个\
  \ `容器运行时`。CNCF 的毕业项目之一是 `containerd`。正如第 8 章所讨论的，`containerd` 是行业标准的容器运行时，负责监督容器的生命周期，处理容器执行、镜像管理以及与主机系统相关的任务，例如底层存储或网络连接。即使您从未听说过\
  \ `containerd`，您也已经间接地使用过它，因为它被 `Docker` 在底层所采用。\n现代架构的解决方案通常由大量容器化的应用程序组成，这些应用程序必须相互交互，并且易于横向扩展或在发生故障时重新调度到其他底层主机节点。换句话说，必须在比单台主机范围更广泛的意义和背景下，关照它们的生命周期。`Kubernetes`\
  \ 是 Google 捐赠给基金会的第一个 CNCF 毕业项目。它的任务是为跨多台主机运行和管理容器化应用程序提供一个可插拔的平台。`Kubernetes` 负责容器的生命周期，并确保始终满足期望的状态。例如，如果某个主机节点突然故障，该节点上的容器化应用程序最终将被重新调度（重新创建）到另一个工作节点上，以满足期望的副本数量。`Kubernetes`\
  \ 的核心功能被称为 `容器编排与调度`。从开发者的角度来看，它还提供了其他关键特性，例如 API 驱动的声明式 `Kubernetes` 对象，这些对象封装或抽象了应用程序组件，例如称为\
  \ `Pod`、`Service`、`Volume`、`Job`、`Deployment` 等的容器组。您在上一章已经使用过其中几种类型。\n\n### 镜像仓库与服务网格\n\
  \n容器化的应用程序基于多层容器镜像。镜像有自己的生命周期，存储在 `容器镜像仓库` 中。像 `Kubernetes` 这样的容器平台会从镜像仓库动态获取镜像，以根据开发者声明的期望状态创建容器。CNCF\
  \ 托管着诸如 `Docker Registry`、`JFrog Artifactory`、`Quay` 和 `Harbor` 等镜像仓库项目。\n容器化服务之间交互的各种非功能性方面，例如安全性或可观测性，可以通过安装在每个\
  \ `Kubernetes` Pod 中作为边车容器的轻量级代理来处理。这些代理形成了另一层，称为 `服务网格`。服务网格简化了容器化服务之间的通信，并提供了开箱即用的功能，如服务发现、重试、负载均衡或熔断。使用服务网格可以减轻开发者实现这些非功能性服务间通信任务的负担。`Linkerd`\
  \ 是一个 CNCF 孵化的服务网格项目。您可能也听说过 `Istio`，这是 CNCF 托管的另一个服务网格项目。\n\n### 无服务器与更广泛的生态系统\n\
  \n一种无需任何服务器管理即可运行应用程序的新趋势模型被称为 `无服务器`，它同样属于云原生生态系统。`Fn Project` 是一个从零开始为容器构建的无服务器平台的例证。\n\
  容器运行时、编排平台、镜像仓库、服务网格或无服务器框架只是冰山一角。要构建一个完整的基于云的解决方案，还需要包含许多其他类型的云原生组件，例如服务发现、密钥管理、流处理、消息传递、持续交付、API\
  \ 网关、监控、日志记录、追踪等。\n\n### CNCF 云原生全景图\n\nCNCF 使用一个方便的名为 CNCF Cloud Native Landscape\
  \ 的地图，将其托管的开源项目与精选的专有但仍与生态系统相关的解决方案进行分组，该地图可在 [`https://landscape.cncf.io`](https://landscape.cncf.io)\
  \ 获取。这个地图旨在帮助技术负责人和架构师跟上快速变化和演进的云原生技术栈。为了让您对这个生态系统的广度和多样性有一个初步印象，请看图 9-3。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig3_HTML.jpg](img/478313_1_En_9_Fig3_HTML.jpg)\n\
  *图 9-3 CNCF `云原生全景图`*\n\n### Oracle Cloud 与云原生\n\n本书是关于 Oracle Cloud 的。您在上一章了解了容器。现在，是时候体验云原生开源项目对\
  \ Oracle Cloud 的影响了。\nOracle 是 CNCF 的白金会员。它已向 CNCF 云原生生态系统贡献了一个基于容器的无服务器开源项目，称为\
  \ `Fn Project`。Oracle Cloud 提供了 `Oracle Kubernetes Engine` (`OKE`)，这是一个完全托管、经过 CNCF\
  \ 认证的托管 Kubernetes 引擎。您在上一章已经使用过 `OKE`。Oracle Linux 附带了一个经过认证的 Kubernetes 发行版，可作为\
  \ Oracle Container Services for Kubernetes 的一部分使用。最后但同样重要的是，两种领先的关系型数据库——开源的 `MySQL`\
  \ 和专有的 `Oracle Database`——都在 CNCF 全景图中被引用。此外，Oracle Cloud 在一定程度上使用了其他 CNCF 开源项目。例如，Oracle\
  \ Cloud Infrastructure 事件符合名为 `CloudEvents` 的行业标准 CNCF 项目所定义的事件结构。\n\n### 后续步骤\n\
  \n是时候做一些动手练习了。我们将深入研究 Oracle Functions，这是一个基于开源 `Fn Project` 的函数即服务（FaaS）。换句话说，让我们来看一下无服务器计算。\n\
  \n\n\n## 无服务器\n\n`serverless`（无服务器）这个词正在成为另一个云计算领域的流行语。你可能认为这个名字暗示着执行一个无服务器应用不涉及任何服务器。嗯，这有点误导性。后端依然存在服务器。一如既往。这个术语真正强调的是，操作无服务器应用让你可以忽略后端相关的方面。运行时和应用程序的生命周期完全由特定的无服务器框架或托管的无服务器服务管理。后者通常与术语`函数即服务`（FaaS）相关联。“函数”是因为无服务器应用通常被视为无状态函数的松散组合。这样一个函数应该被设计为专注于单一的、运行时间相对较短的无状态任务。\n\
  \n无服务器框架或基于云的托管无服务器服务通常只在有请求进入或某个函数触发器被激活时，才实例化特定的函数实例。一旦空闲时间间隔结束，该实例通常就会被终止，以释放计算资源。换句话说，无服务器函数实例不应该处于空闲状态。另一个需要提及的重要方面是，无服务器函数需要具备可扩展性。因此，无服务器框架或基于云的\
  \ FaaS 可能会创建同一无服务器函数的多个实例，以便能够处理许多并行请求。\n\n从开发者的角度来看，无服务器意味着简单。一个无服务器函数通常被实现为一个简单的处理函数，它返回一个结果。根据触发器的不同，一个函数可能自行消费输入或读取某些信息。例如，一个基于\
  \ HTTP 的无服务器函数可以处理作为二进制流传递的图像，应用一些相对简单的过滤器，然后返回结果或将其持久化存储到一个对象存储桶中。另一个例子可能是当捕获到某种云事件时立即执行的函数。向特定桶上传一个新对象可能会产生这样的云事件，最终触发该函数。你可以为无服务器函数构思许多想法。只需记住两个关键特性：无服务器函数应该是`无状态的`和`短寿命的`。无服务器框架通常限制允许的最大函数执行时间。\n\
  \n如今，无服务器框架有望支持多种编程语言。这使得开发者可以为特定任务选择最佳语言，或者简单地选择他们擅长的那种。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig4_HTML.jpg](img/478313_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4 无服务器\n\n无服务器并不局限于云计算。事实上，有些框架让你可以在本地服务器或开发机器上运行无服务器平台。然后，基于云的托管无服务器平台可以使用相同的框架。这样，你可以在本地实现和测试一个函数，然后再将其推送到云端兼容的无服务器平台。这正是我们在本章中将要采用的工作方式。首先，你需要为无服务器开发设置一台客户端机器。\n\
  \n### 开发者虚拟机\n\n我准备了基础架构代码，用于配置一个新的基于 Ubuntu 的计算实例以及稍后 Oracle Functions 所需的子网。请导航到\
  \ `chapter09/1-infrastructure` 目录，如下所示：\n\n```\n$ cd ~/git/oci-book/chapter09/1-infrastructure\n\
  $ find . \\( -name \"*.tf\" -o -name \"*.yaml\" \\) | sort\n./devmachine/cloud-init/ubuntu.config.yaml\n\
  ./devmachine/compute.tf\n./devmachine/vars.tf\n./devmachine/vcn.tf\n./functions/vars.tf\n\
  ./functions/vcn.tf\n./modules.tf\n./provider.tf\n./vars.tf\n./vcn.tf\n```\n\n`devmachine`\
  \ 模块包含了用于函数开发的计算实例所需的云资源定义。`functions` 模块则简单得多，基本上用于创建一个私有子网，该子网带有专用的安全列表和路由表。这个子网将使我们能够控制\
  \ Oracle Functions 执行的环境网络上下文。我们稍后会讨论它，但让我们节省一些时间，将其与用于函数开发的计算实例一起配置。我不会讨论每个文件，因为我们在前面的章节中已经讨论过类似的基础设施代码文件。像往常一样，请设置\
  \ Terraform 所期望的相关环境变量。\n\n```\n$ source ~/tfvars.env.sh\n```\n\n接下来，初始化并配置基础设施。\n\
  \n```\n$ terraform init\n...\nTerraform has been successfully initialized!\n$ terraform\
  \ apply\n...\nPlan: 10 to add, 0 to change, 0 to destroy.\nDo you want to perform\
  \ these actions?\nEnter a value: yes\n...\nApply complete! Resources: 10 added,\
  \ 0 changed, 0 destroyed.\nOutputs:\ndev_machine_image_name = Canonical-Ubuntu-18.04-2019.08.14-0\n\
  dev_machine_public_ip = 130.61.88.227\nfunctions_subnet_ocid = ocid1.subnet.oc1....\n\
  ```\n\n从现在开始，在本章中，我们将主要在这台计算实例上工作。你将在这个基于云的实例上执行大量命令。这些命令将以 `[ubuntu@dev-vm]` 命令提示符为前缀。你可以在\
  \ OCI 控制台中验证实例是否正在运行，如图 9-5 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig5_HTML.jpg](img/478313_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5 用于函数开发的计算实例\n\n让我们回到终端。Terraform 输出了三个值。在本章中，我们将需要用到其中两个，即用于函数开发的计算实例的公有\
  \ IP 地址和子网的 OCID。你不需要记下这些输出值。我们将使用 `terraform output` 命令直接从状态文件中读取它们。该计算实例基于一个带有\
  \ Ubuntu 的操作系统镜像。基础架构代码使用 `cloud-init` 来安装练习所需的一些额外包，其中最著名的是 Docker CE。\n\n**注意**\n\
  如你所知，`cloud-init` 是异步执行的。你可能需要等待一两分钟，机器才真正准备就绪。如果你在 `cloud-init` 完成之前连接，你将需要在之后重新连接，以便\
  \ `docker` 命令能为 `ubuntu` 用户工作，而无需在前面加上 `sudo`。\n\n请连接到实例并执行 `cat` 命令，如下所示，直到你在 `/var/log/syslog`\
  \ 文件中看到 `DEV machine is running` 条目。\n\n```\n$ DEV_MACHINE_IP=`terraform output\
  \ dev_machine_public_ip`\n$ ssh -i ~/.ssh/oci_id_rsa ubuntu@$DEV_MACHINE_IP\nWelcome\
  \ to Ubuntu 18.04.3 LTS (GNU/Linux 4.15.0-1021-oracle x86_64)\n[ubuntu@dev-vm]$\
  \ sudo cat /var/log/syslog | grep \"DEV machine\"\nSep 14 12:30:53 dev-vm cloud-init[1799]:\
  \ DEV machine is running, after 86.18 seconds\n```\n\n为了验证实例是否按预期配置，请运行一些 Docker\
  \ 命令，例如 `docker version`、`docker images` 或 `docker ps`。应该没有任何错误。如果你因权限不足而遇到错误，你可能需要退出并重新连接到计算实例。\n\
  \n**注意**\n如果你的系统允许，使用本地计算机进行函数开发而不是新配置的基于云的计算实例也没有问题，但根据你的系统，你可能需要对本章中使用的一些命令进行调整。\n\
  \n一旦用于函数开发的计算实例按预期运行，我们就可以继续下一步了。\n\n\n\n### Fn Project\n\n无服务器函数在`无服务器平台`上执行，这些平台将函数开发者与底层基础设施隔离开来，并提供所有必需的函数生命周期服务。CNCF（云原生计算基金会）将几个无服务器平台列为其云原生全景图的一部分。其中之一就是\
  \ Fn Project。Fn Project 是一个基于容器的无服务器平台，支持多种编程语言，包括 Golang、Java 和 Python。该项目于 2017\
  \ 年开源，其 GitHub 地址为 [`https://github.com/fnproject`](https://github.com/fnproject)，如图\
  \ 9-6 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig6_HTML.jpg](img/478313_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\nGitHub 上的 Fn Project\n\n我们将用 Python 实现两个简单的函数，并首先在本地的 Fn Project 安装上运行它们。稍后，你将选择其中一个，在不做任何代码更改的情况下，将其部署到\
  \ Oracle Functions——这是 Oracle Cloud 上的一个托管函数即服务平台。\n\n#### 安装与配置\n\n首先，确保你仍然连接到新创建的计算实例。要安装\
  \ Fn Project，只需执行这条简洁的单行命令：\n\n```\n[ubuntu@dev-vm]$ curl -LSs https://raw.githubusercontent.com/fnproject/cli/master/install\
  \ | sh\nfn version 0.5.86\n______\n/ ____/___\n/ /_  / __ \\\n/ __/ / / / /\n/_/\
  \   /_/ /_/`\n[ubuntu@dev-vm]$ fn version\nClient version is latest version: 0.5.86\n\
  Server version:  ?\n```\n\nFn Project 客户端二进制文件 `fn` 已安装，并且用于存储客户端配置文件的 `~/.fn` 目录树也已初始化。为了继续进行本地开发和测试，我们需要启动一个本地的\
  \ Fn 服务器。为此，你将使用 `fn start` 命令。本地的 Fn 服务器是作为一个 Docker 容器实现的。该命令将下载最新的容器镜像并启动 Fn\
  \ 服务器容器。\n\n```\n[ubuntu@dev-vm]$ fn start -d\n[1] 4971\nUnable to find image 'fnproject/fnserver:latest'\
  \ locally\nlatest: Pulling from fnproject/fnserver\n...\nStatus: Downloaded newer\
  \ image for fnproject/fnserver:latest\n```\n\n我们使用了 `-d` 标志（`d` 代表分离模式）在后台执行本地的\
  \ Fn 服务器容器。这将允许我们在同一个终端会话中继续工作。\n\n基于容器的服务器架构使得 Fn Project 成为构建无服务器平台的理想选择，仅仅因为它可以作为容器在任何地方运行。让我们看看它的镜像和容器。\n\
  \n```\n[ubuntu@dev-vm]$ docker images\nREPOSITORY          TAG     IMAGE ID    \
  \  CREATED      SIZE\nfnproject/fnserver  latest  e63938b4a8e1  12 days ago  161MB\n\
  [ubuntu@dev-vm]$ docker ps\nIMAGE                      PORTS                   \
  \   NAMES\nfnproject/fnserver:latest  2375/tcp,*:8080->8080/tcp  fnserver\n```\n\
  \n要随时查看 Fn 服务器日志，你可以应用 `docker logs` 命令。\n\n```\n[ubuntu@dev-vm]$ docker logs fnserver\n\
  time=\"2019-09-16T17:04:43Z\" level=info msg=\"Registering data store provider 'sql'\"\
  \ntime=\"2019-09-16T17:04:43Z\" level=info msg=\"Connecting to DB\" url=\"sqlite3:///app/data/fn.db\"\
  \n...\ntime=\"2019-09-16T17:04:43Z\" level=info msg=\"Fn serving on `:8080`\" type=full\
  \ version=0.3.731\n```\n\n`fnserver` 容器是从 `fnproject/fnserver` 镜像创建的。`fnserver`\
  \ 执行所有函数的元数据以及生命周期管理任务。Fn Project 函数是作为单独的容器镜像单独部署的。当被触发时，`fnserver` 会基于特定的函数镜像实例化一个函数专用的容器来处理该函数调用。如果有并行的函数调用，Fn\
  \ 服务器可能会决定为同一个函数创建更多容器。另一方面，在本地 Fn Project 安装的情况下，函数元数据使用一个名为 SQLite 的基于文件的可嵌入关系数据库存储在本地文件系统中。默认的\
  \ SQLite 文件位置是 `.fn/data/fn.db`。如果你实在好奇，可以使用 `sqlite3` 客户端访问此函数元数据数据库文件。这只有在我们定义并部署了一些函数后才有意义。目前，我们本地的基于\
  \ SQLite 的函数元数据数据库仍然是空的。进一步看，连接相关的客户端配置以名为 `contexts`（上下文）的配置文件形式存储。`fn` 客户端将为你正在使用的每个\
  \ Fn Project 平台使用专用的上下文，无论该平台是本地的、本地部署的还是基于云的。上下文文件将以 YAML 文件的形式存储在 `.fn/contexts`\
  \ 目录中。\n\n```\n/home/ubuntu/.fn/\n├── config.yaml\n├── contexts\n│   └── default.yaml\n\
  ├── data\n│   └── fn.db\n└── iofs\n```\n\n让我们使用 `fn` 工具列出所有的上下文。\n\n```\n[ubuntu@dev-vm]$\
  \ fn list contexts\nCURRENT NAME.    PROVIDER  API URL.                REGISTRY\n\
  Default  default   http://localhost:8080\n```\n\n由于这是一个新的本地 Fn Project 安装，只有一个名为\
  \ `default` 的上下文，实际上它还不完整且无法使用。在我们继续并添加任何缺失的配置以允许本地函数开发之前，我希望你理解 Fn 客户端上下文定义的三个重要信息组成部分。它们如下：\n\
  \n*   目标平台的 Fn Project 服务器 API 端点\n*   用于存储函数专用镜像的容器注册表\n*   定义目标平台属性集的提供者\n\n客户端能够与多个\
  \ Fn Project 平台交互。然而，在任何给定时刻，客户端只与单个平台（即由当前上下文定义的那个平台）协同工作。要设置当前上下文，你使用 `fn use\
  \ context` 命令。\n\n```\n[ubuntu@dev-vm]$ fn use context default\nNow using context:\
  \ default\n```\n\n正如我之前提到的，函数实例作为基于函数专用镜像的容器执行。你使用 `fn` 客户端来部署函数。在基于容器的无服务器环境中部署函数意味着什么？`函数部署`\
  \ 涉及构建一个新的函数专用容器镜像并将其推送到容器镜像注册表。注册表由当前上下文定义。对于本地开发，将镜像存储在本地机器上就足够了。为此，我们在执行 `fn\
  \ deploy` 命令时将使用 `--local` 选项。镜像将以当前上下文中为注册表设置的名称为前缀。让我们使用 `localdev` 作为名称。要更新当前上下文，请像这样使用\
  \ `fn update context` 命令：\n\n```\n[ubuntu@dev-vm]$ fn update context registry localdev\n\
  Current context updated registry with localdev\n[ubuntu@dev-vm]$ fn list contexts\n\
  CURRENT NAME     PROVIDER  API URL                REGISTRY\n*  default  default\
  \   http://localhost:8080  localdev\n```\n\n我们可以开始开发和部署第一个函数了。\n\n\n\n### 你的第一个函数\n\
  \n无服务器 `functions` 设计上应为无状态的，并执行一个相对简短的任务。Fn Project 能够运行以各种编程语言实现的函数。在撰写本文时，这些语言包括\
  \ Java、Golang、Python、JavaScript（配合 Node.js）、Ruby 和 C#（使用 .NET Core）。你无需为这些语言安装任何开发工具。代码将在函数专属容器内执行。除了使用\
  \ Terraform 编写基础设施代码外，本书以 Python 为主。为了与其余代码示例保持一致，我们将使用 Python 进行函数开发。在完成本章的练习后，你可以自由尝试其他语言。现在，让我们使用\
  \ `fn init` 命令来引导一个基于 Python 的函数桩，如下所示：\n\n```bash\n[ubuntu@dev-vm]$ fn init --runtime\
  \ python blankfn\nCreating function at: ./blankfn\nFunction boilerplate generated.\n\
  func.yaml created.\n[ubuntu@dev-vm]$ tree blankfn/\nblankfn/\n├── func.py\n├── func.yaml\n\
  └── requirements.txt\n```\n\n`fn init` 命令使用了 `--runtime python` 选项执行。结果是，`func.py`\
  \ 函数桩已创建并使用 Python 作为编程语言。此外，该命令还创建了 `func.yaml` 函数配置文件，如清单 9-1 所示。\n\n```yaml\n\
  schema_version: 20180708\nname: blankfn\nversion: 0.0.1\nruntime: python\nentrypoint:\
  \ /python/bin/fdk /function/func.py handler\nmemory: 256\n清单 9-1\nblankfn/func.yaml\n\
  ```\n\n该函数配置文件可用于微调函数的构建过程和执行特性，例如分配的内存或函数允许运行的最长时间。在构建函数专属容器镜像时会使用其中几个属性。例如，可以调整函数的基础镜像。\n\
  \n在之前的章节中，我们已经接触过 `requirements.txt` 文件。此文件用于列出你的函数所依赖的 Python 包。你指明函数需要哪些 Python\
  \ 包，`pip` 工具就会将它们作为一个新层安装到函数专属容器镜像中。清单 9-2 展示了在函数目录内创建的 `requirements.txt` 文件。我们的函数桩仅引用了\
  \ `fdk` Python 包。`fdk` 包是由 Fn Project 维护的 Python 函数开发套件。它主要用于处理函数的输入和输出。如果你需要任何额外的\
  \ Python 包来实现稍微复杂一些的函数，这将是你添加它们的地方。\n\n```txt\nfdk\n清单 9-2\nblankfn/requirements.txt\n\
  ```\n\n`cloud-init` 配置（在我们的计算实例首次启动时处理）会获取一个名为 `blankfn` 的简单函数代码文件。该代码从与本书关联的代码仓库下载，并放置在\
  \ `~/functions` 目录中。让我们用 `blankfn.py` 文件替换由 `fn init` 命令创建的函数桩，如下所示：\n\n```bash\n\
  [ubuntu@dev-vm]$ cp ~/functions/blankfn.py ~/blankfn/func.py\n```\n\n清单 9-3 展示了该函数的代码。\n\
  \n```python\nimport io\nimport json\nfrom fdk import response\ndef handler(ctx,\
  \ data: io.BytesIO=None):\nres_str = json.dumps({\"message\": \"blank message\"\
  })\nheaders_dict={\"Content-Type\": \"application/json\"}\nrsp = response.Response(ctx,\
  \ response_data=res_str, headers=headers_dict)\nreturn rsp\n清单 9-3\nblankfn/func.py\n\
  ```\n\n`blankfn` 函数总是返回一个静态文本。我创建这个函数是为了让你获得最简单的基于 Python 的 Fn Project 开发体验。一般来说，你作为函数开发者的职责是实现函数处理器。如果你看一下清单\
  \ 9-3 中的代码，你会发现函数处理器返回一个 `fdk.response.Response` 对象，该对象传入了 `response_data` 字符串，该字符串包含一个无意义的测试消息的\
  \ JSON 对象。此外，函数处理器代码设置了 HTTP 头中的 `headers` 字典。默认情况下，如果函数的配置文件中没有明确声明触发器，则会应用 HTTP\
  \ 触发器，我们应该将输出视为 HTTP 响应。\n\n在构建函数专属容器镜像之前，我们必须创建一个应用。应用仅仅是一个逻辑构造。你使用 `fn create\
  \ app` 命令在当前上下文指向的 Fn 服务器（在我们的例子中是作为 `fnserver` 容器运行的本地 Fn 服务器）中注册一个新应用。我们将新应用命名为\
  \ `blankapp`，并像这样注册它：\n\n```bash\n[ubuntu@dev-vm]$ fn create app blankapp\nSuccessfully\
  \ created app:  blankapp\n[ubuntu@dev-vm]$ fn list apps\nNAME.     ID\nblankapp\
  \  01DMQZJPDDNG8G00GZJ0000006\n```\n\n`fn list apps` 命令显示了新注册的应用。我们已经准备好构建并部署函数。为此，进入\
  \ `blankfn` 函数目录并运行 `fn deploy` 命令，如下所示：\n\n```bash\n[ubuntu@dev-vm]$ cd blankfn\n\
  [ubuntu@dev-vm]$ fn --verbose deploy --app blankapp --local\nDeploying blankfn to\
  \ app: blankapp\nBumped to version 0.0.2\nBuilding image localdev/blankfn:0.0.2\n\
  FN_REGISTRY:  localdev\nCurrent Context:  default\n...\nSuccessfully built 29e36845273a\n\
  Successfully tagged localdev/blankfn:0.0.2\nUpdating function blankfn using image\
  \ localdev/blankfn:0.0.2...\nSuccessfully created function: blankfn with localdev/blankfn:0.0.2\n\
  ```\n\n`fn deploy` 命令读取它在当前目录中找到的 `func.yaml` 函数配置文件，以创建函数专属容器镜像。存储函数代码的文件以及相应的\
  \ `requirements.txt` 文件会被添加到容器镜像中。使用 `--local` 选项将镜像存储在客户端机器上。如果你省略了它，`fn` 客户端会尝试将镜像推送到\
  \ Docker Hub 上的 `localdev` 仓库，这不是我们的本意。`--verbose` 选项让我们能看到镜像构建的输出。这是普通的 `docker\
  \ build` 输出，附带了一些来自 `fn` 客户端的辅助操作输出。总而言之，函数已经准备就绪。让我们检查函数元数据以确认一切顺利。为此，使用 `fn list\
  \ functions` 命令。\n\n```bash\n[ubuntu@dev-vm]$ fn list functions blankapp\nNAME \
  \    IMAGE                     ID\nblankfn  localdev/blankfn:0.0.2  01DMQZNA73NG8G00GZJ0000007\n\
  ```\n\n目前，`blankapp` 应用引用了一个名为 `blankfn` 的函数。函数实例将基于 `localdev/blankfn:0.0.2` 容器镜像创建为容器。你可以像这样查看该镜像：\n\
  \n```bash\n[ubuntu@dev-vm]$ docker images | grep blank\nlocaldev/blankfn   0.0.2\
  \   e3cdfd6089b4   2 minutes ago   344MB\n```\n\n目前，只有本地的 `fnserver` 容器在运行，如下列的\
  \ `docker ps` 命令所示：\n\n```bash\n[ubuntu@dev-vm]$ docker ps --format '{{.Names}}\
  \ [{{.Image}}] {{.Status}}'\nfnserver [fnproject/fnserver:latest] Up 4 minutes\n\
  ```\n\n让我重申一下：函数实例将作为独立的容器创建。本地的 `fnserver` 协调函数容器，这些容器在函数被触发时动态创建。掌握了这些知识，你应该知道会发生什么。以下是你使用\
  \ `fn invoke` 命令进行第一次无服务器函数调用的方法：\n\n```bash\n[ubuntu@dev-vm]$ fn invoke blankapp\
  \ blankfn\n{\"message\": \"blank message\"}\n```\n\n\n就是这样。就像这样。你可以说这个响应来得无迹可寻。如果你足够快，并再次执行\
  \ `docker ps` 命令，你会发现一个基于 `local/blankfn:0.0.2` 镜像的新容器。\n\n```\n[ubuntu@dev-vm]$\
  \ docker ps --format '{{.Names}} [{{.Image}}] {{.Status}}'\n01D...00C  [local/blankfn:0.0.2]\
  \        Up 2 seconds (Paused)\nfnserver   [fnproject/fnserver:latest]  Up 22 hours\n\
  ```\n\n这个为函数调用创建的特定容器实例用于处理该函数调用。如果没有进一步的函数调用到达，该容器将在 30 秒后消失。你可以使用 `watch docker\
  \ ps` 命令来观察这种行为。这个间隔可以在函数配置文件中延长。\n\n另一个有趣的实验是同时发送两个函数调用。\n\n```\n[ubuntu@dev-vm]$\
  \ fn invoke blankapp blankfn &\n[1] 2903\n[ubuntu@dev-vm]$ fn invoke blankapp blankfn\
  \ &\n[2] 2972\n```\n\n列出容器会显示，这次创建了两个函数特定的容器。\n\n```\n[ubuntu@dev-vm]$ docker ps\
  \ --format '{{.Names}} [{{.Image}}] {{.Status}}'\n01D...00H [local/blankfn:0.0.2]\
  \ Up Less than a second (Paused)\n01D...00F [local/blankfn:0.0.2] Up 1 second (Paused)\n\
  fnserver [fnproject/fnserver:latest] Up 22 hours\n```\n\n这是一个简单的方法，可以证明无服务器平台具有原生可扩展性。\n\
  \n如果我们简要地总结一下 Fn Project 函数的无服务器函数开发过程，以下将是需要遵循的步骤：\n\n1.  创建项目存根。\n2.  实现函数处理程序。\n\
  3.  调整并可选地扩展函数配置文件。\n4.  部署函数。\n\n函数部署会导致 Fn 平台后端发生两个状态变化：\n\n1.  函数元数据被放置在 Fn 服务器上。\n\
  2.  函数特定的容器镜像被推送到容器镜像注册表。\n\n每次函数触发器被触发时，Fn 服务器会创建或取消暂停一个现有的函数特定容器来处理请求。从开发到执行的整个过程在概念上如图\
  \ 9-7 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig7_HTML.jpg](img/478313_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7: Fn Project 函数开发与执行\n\n现在，我们将创建一个比 `blankfn` 更有意义一些的函数，后者完全没有任何实际用途。\n\n\
  ### UUID 函数\n\n阅读了前面的章节后，你现在应该熟悉了 UUID 生成函数。首先，你将其作为 systemd 服务部署在基于 Linux 的计算实例上。这是第二章包含的练习。接下来，你将这个应用容器化，并在\
  \ Oracle Kubernetes Engine 的集群实例上的 Kubernetes pod 中部署它。这是第 8 章的练习。现在，我们将为 UUID 生成逻辑使用最轻量级的部署模型，并将其作为无服务器函数运行。作为无状态、短生命周期且专门的逻辑，它是成为无服务器函数的完美候选者。在这一点上，值得一提的是，我刚才描述的是当今软件演进方式的一个绝佳例子。起初，我们处理一个专用的计算实例，其中应用生命周期绑定到由\
  \ systemd 管理的操作系统服务。接着，我们能够通过容器化应用并在容器平台上运行来解除这种耦合。最后，我们到达了对于如此简单、专门且短生命周期的应用逻辑的最轻量级模式，并使用无服务器来将所有函数生命周期管理委托给无服务器平台。这种演变如图\
  \ 9-8 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig8_HTML.jpg](img/478313_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8: UUID 函数部署模型的演进\n\n让我们以与之前类似的方式创建一个新的函数存根。这次，我们使用 `uuidfn` 作为函数名称。\n\n```\n\
  [ubuntu@dev-vm]$ cd\n[ubuntu@dev-vm]$ fn init --runtime python uuidfn\nCreating\
  \ function at: ./uuidfn\nFunction boilerplate generated.\nfunc.yaml created.\n```\n\
  \n同样，执行以下命令，用我在编写本书时已经为你准备好的函数代码替换函数存根：\n\n```\n[ubuntu@dev-vm]$ cp ~/functions/uuidfn.py\
  \ ~/uuidfn/func.py\n```\n\n清单 9-4 显示了 UUID 生成函数的代码。\n\n```\nimport io\nimport json\n\
  import uuid\nfrom fdk import response\ndef handler(ctx, data: io.BytesIO=None):\n\
  \    res_dict = {}\n    try:\n        # Generate UUID\n        res_dict[\"generator_uuid\"\
  ] = str(uuid.uuid4())\n        # Intercept input and prepare optional response part\n\
  \        if data is not None:\n            data_bytes = data.getvalue()\n      \
  \      if len(data_bytes)>0:\n                data_json = json.loads(data_bytes)\n\
  \                res_dict[\"generator_client\"] = data_json.get(\"client_name\"\
  )\n    except (Exception, ValueError) as ex:\n        res_dict[\"message\"] = str(ex)\n\
  \    headers_dict={\"Content-Type\": \"application/json\"}\n    res_str = json.dumps(res_dict)\n\
  \    rsp = response.Response(ctx, response_data=res_str, headers=headers_dict)\n\
  \    return rsp\n```\n\n清单 9-4: `uuidfn/func.py`\n\n与 `blankfn` 函数相反，`uuidfn` 确实解析了以\
  \ `io.ByteIO` 类型的 `data` 对象形式提供的输入。除了使用 `uuid.uuid4()` 方法生成 UUID 外，我们还处理输入。如果没有输入，我们仅在\
  \ JSON 格式中返回新生成的 UUID 字符串作为 `generator_uuid` 对象。如果有输入，我们期望它是 JSON 格式，并解析它以提取 `client_name`\
  \ 对象，在 JSON 响应中将其作为 `generator_client` 对象返回。提供无效输入将抛出错误，我们最终会捕获该错误，并在响应中返回错误消息。\n\
  \n请创建一个名为 `uuidapp` 的新应用。\n\n```\n[ubuntu@dev-vm]$ fn create app uuidapp\nSuccessfully\
  \ created app:  uuidapp\n```\n\n在这个阶段，我们应该能看到两个应用。\n\n```\n[ubuntu@dev-vm]$ fn list\
  \ apps\nNAME      ID\nblankapp  01DMQZJPDDNG8G00GZJ0000006\nuuidapp   01DMR30A3TNG8G00GZJ000000P\n\
  ```\n\n要构建函数特定的容器镜像，我们需要进入函数目录并调用 `fn deploy` 命令。\n\n要测试该函数，请使用 `fn invoke` 命令并正确指定应用程序和函数名称作为参数。\n\
  \n```\n[ubuntu@dev-vm]$ fn invoke uuidapp uuidfn\n{\"generator_uuid\": \"f03abce5-3615-4994-9680-157b057198d3\"\
  }\n```\n\n该函数返回包含新生成的 UUID 的 JSON。\n\n你可以像这样向函数提供输入：\n\n```\n[ubuntu@dev-vm]$ echo\
  \ -n '{ \"client_name\": \"some_app\"  }' | fn invoke uuidapp uuidfn --content-type\
  \ application/json\n{\"generator_uuid\": \"3298bb2e-9cd5-476b-83b6-f4343d7c8522\"\
  , \"generator_client\": \"some_app\"}\n```\n\n如你所见，这次响应中有两个 JSON 对象。响应中的 `generator_client`\
  \ 对象存储了作为输入传入的 `client_name` 值。\n\n该函数被隐式定义为在 HTTP 触发器上启动。这意味着必须有一个与该函数关联的 HTTP\
  \ 端点。事实上，HTTP 端点正是我们使大多数无服务器函数在生产中发挥作用所必需的。你可以使用 `fn inspect function` 命令查看函数特定的端点。\n\
  \n```\n[ubuntu@dev-vm]$ fn inspect function uuidapp uuidfn\n{\n\"annotations\":\
  \ {\n\"fnproject.io/fn/invokeEndpoint\": \"http://localhost:8080/invoke/01DMR7VTNHNG8G00GZJ0000009\"\
  \n},\n\"app_id\": \"01DMR7TZRFNG8G00GZJ0000008\",\n\"created_at\": \"2019-09-14T15:57:01.489Z\"\
  ,\n\"id\": \"01DMR7VTNHNG8G00GZJ0000009\",\n\"idle_timeout\": 30,\n\"image\": \"\
  localdev/uuidfn:0.0.2\",\n\"memory\": 256,\n\"name\": \"uuidfn\",\n\"timeout\":\
  \ 30,\n\"updated_at\": \"2019-09-14T15:57:01.489Z\"\n}\n```\n\n除了端点之外，该命令还揭示了其他信息，例如函数的最大执行时间、空闲超时以及函数使用的容器镜像。`fn\
  \ inspect function` 命令与 `jq` 命令的恰当组合将让你提取端点并将其保存到 shell 变量中。\n\n```\n[ubuntu@dev-vm]$\
  \ FN_INVOKE_ENDPOINT=`fn inspect function uuidapp uuidfn | jq -r '.annotations.\"\
  fnproject.io/fn/invokeEndpoint\"'`\n```\n\n接下来，我们可以使用众所周知的 `curl` 工具向该端点发送 HTTP\
  \ 请求。\n\n```\n[ubuntu@dev-vm]$ curl -X \"POST\" -H \"Content-Type: application/json\"\
  \ $FN_INVOKE_ENDPOINT\n{\"generator_uuid\": \"84eb8921-663f-4469-ad3b-fa34813da319\"\
  }\n```\n\n本节简要介绍了 Fn Project 以及实践中本地执行的无服务器函数。还有许多其他方面未涉及，例如将多个函数打包到单个应用程序中、单元测试以及将函数镜像推送到其他注册表。更重要的是，无服务器确实只给无服务器函数开发者带来一种“无需基础设施”的印象。如果你想运营一个无服务器平台，尤其是在生产环境中，有各种关键任务需要规划和执行。这些任务涉及安全、负载均衡和工作节点池管理。Fn\
  \ Project 在其网页上记录了这些说明。所有这些都超出了本书的讨论范围。\n\n与其自己运营无服务器平台，你可以依赖一个托管的基于云的无服务器平台。在下一节中，我们将使用\
  \ Oracle Functions，这是一个基于 Fn Project 在 Oracle Cloud Infrastructure 上构建的托管无服务器平台。\n\
  \n### Oracle Functions\n\nFn Project 是 *Oracle Functions* 的基础，后者是在 Oracle Cloud\
  \ 上可用的函数即服务平台。在上一节中，你操作了一个本地 Fn 服务器。现在，你可以将相同的函数代码部署到 Oracle Functions。通过这样做，你将让你的函数在你选择的\
  \ Oracle Cloud 区域中运行。无需像我们在前几章中运行应用程序那样配置任何计算实例或容器编排集群。底层计算资源完全由 Oracle Functions\
  \ 在后台管理。函数实例是动态创建的，以响应函数 *触发器*。正如你可能预期的那样，最基本的触发器类型是 HTTP 请求。每一个部署到 Oracle Functions\
  \ 的 Fn Project 函数都会被赋予一个专用的基于 HTTP 的 *函数端点*。发送到该端点的请求必须经过正确签名才能通过 OCI Identity and\
  \ Access Management 完成的身份验证和授权。当它们成功后，Oracle Functions 会读取函数元数据，并根据该信息创建特定于函数的容器来处理请求。其他类型的触发器是在\
  \ Oracle Cloud 内发生的各种 *事件*。例如，特定对象存储桶中新建的对象可能会生成一个事件，该事件由 Oracle Events 服务传播到 Oracle\
  \ Functions 服务中的选定函数。你将在本章第二部分了解到这一点。两种触发器——基于 HTTP 和基于事件的——以及 Oracle Functions\
  \ 的一般工作方式如图 9-9 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig9_HTML.jpg](img/478313_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\nOracle Functions\n\n建议将函数特定的容器镜像存储在与你希望无服务器函数运行的 Oracle Functions 端点相同区域的\
  \ Oracle Container Image Registry (OCIR) 中。你在上一章已经使用过 OCIR。那时，Oracle Kubernetes\
  \ Engine 从 OCIR 拉取镜像以在 Kubernetes Pod 中创建容器。这次，镜像将被 Oracle Functions 动态拉取，以创建短生命周期的函数容器，用于处理到达的函数调用。\n\
  \n\n## OCI 网络与策略\n\n在开始使用 Oracle Functions 之前，还有两个与基础设施相关的初始设置需要选择。\n\n*   为无服务器函数选择虚拟云网络子网。\n\
  \n*   为 FaaS 服务创建所需的 IAM 策略语句。\n\n为什么我们还要谈论虚拟网络，即使 Oracle Functions 本身不需要管理基础设施？当你定义一个\
  \ Fn 应用（它将无服务器函数分组）并打算让此应用在 Oracle Functions 上运行时，必须指定 VCN 子网。该 VCN 子网在其 IP 范围内必须至少有\
  \ 32 个可用的 IP 地址，并且应依赖于无状态安全规则。使用不同的 VCN 来运行无服务器函数是完全可以的。你将在接下来的某个章节中学习如何为 Oracle\
  \ Functions 应用指定 VCN。通常，你需要自行创建新的子网。但为了本节练习的目的，子网已由 Terraform 预先创建好，一同创建的还有用于函数开发的计算机器。你可以在\
  \ `functions` 模块中找到相应的基础设施代码。计算实例连接到 `dev-net` 公共子网。`functions-subnet` 私有子网则专用于\
  \ Oracle Functions。图 9-10 展示了 OCI 控制台中的两个子网。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig10_HTML.jpg](img/478313_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n用于 Oracle Functions 的 VCN 子网\n\nOracle Functions 与 IAM 完全集成。这一事实影响着服务的双方。不仅\
  \ Oracle Functions 必须被授予所需的访问权限，函数开发者和函数使用者也必须属于相关 IAM 策略语句所引用的 IAM 组。让我们以更有条理的方式来讨论这一点。首先，代表\
  \ Oracle Functions 的 `FaaS` 服务在 IAM 中必须被允许执行以下操作：\n\n*   在租户或选定的 compartment 中使用虚拟网络\n\
  \n*   读取 OCIR 中的容器镜像仓库\n\n这些权限通过清单 9-5 所示的策略语句授予。\n\n```\n[\n\"allow service FaaS\
  \ to use virtual-network-family in compartment Sandbox\",\n\"allow service FaaS\
  \ to read repos in tenancy\"\n]\nListing 9-5\ntenancy.functions.policy.json\n```\n\
  \n其次，为了部署和监控他们的无服务器函数，函数所有者必须属于被允许的 IAM 组。\n\n*   与 `functions` 族的管理级 OCI API 交互\n\
  \n*   读取指标\n\n*   使用虚拟网络\n\n*   管理 OCIR 中选定的仓库\n\n这些语句可以限定到特定的 compartment。在我们的案例中，我们将允许\
  \ `sandbox-users` 组的成员仅在 `Sandbox` compartment 中部署和监控函数。所需权限中的三项通过清单 9-6 所示的策略语句授予。\n\
  \n```\n[\n\"allow group sandbox-users to manage functions-family in compartment\
  \ Sandbox\",\n\"allow group sandbox-users to read metrics in compartment Sandbox\"\
  ,\n\"allow group sandbox-users to use virtual-network-family in compartment Sandbox\"\
  \n]\nListing 9-6\nsandbox-users.functions.policy.json\n```\n\n如果你完成了第 8 章的练习，那么第四项剩余的策略语句已经定义好了。它应该在根\
  \ compartment（租户级别）中一个名为 `tenancy-ocir-policy` 的策略里定义，如下所示：\n\n```\nallow group\
  \ sandbox-users to manage repos in tenancy where target.repo.name = /sandbox∗/\n\
  ```\n\n现在，让我们创建清单 9-5 和 9-6 所示的两个新策略。为此，回到我们的本地机器，使用 OCI CLI 执行以下命令：\n\n```\n$ cd\
  \ ~/git/oci-book/chapter09/3-functions/policies\n$ TENANCY_OCID=`cat ~/.oci/config\
  \ | grep tenancy | sed 's/tenancy=//'`\n$ echo $TENANCY_OCID\nocid1.tenancy.oc1..aa...3yymfa\n\
  $ oci iam policy create -c $TENANCY_OCID --name functions-policy --description \"\
  FaaS Policy\" --statements \"file://tenancy.functions.policy.json\"\n{\n\"data\"\
  : {\n...\n\"lifecycle-state\": \"ACTIVE\",\n\"name\": \"functions-policy\",\n...\n\
  }\n$ oci iam policy create --name sandbox-users-functions-policy --description \"\
  Functions-related policy for regular Sandbox users\" --statements \"file://sandbox-users.functions.policy.json\"\
  \ --profile SANDBOX-ADMIN\n{\n\"data\": {\n...\n\"lifecycle-state\": \"ACTIVE\"\
  ,\n\"name\": \"sandbox-users-functions-policy\",\n...\n}\n```\n\n我们已经为 Oracle Functions\
  \ 准备好了租户。现在，让我们转向 `fn` 客户端并创建一个新的上下文。\n\n\n\n### 客户端设置\n\n从函数开发者的角度来看，在`fn`客户端配置方面，我们需要首先添加一个新的\
  \ Fn 客户端上下文。该 Fn 客户端上下文\n\n*   使用`oracle`提供商\n*   指向一个 Oracle Functions API 端点\n\
  *   将函数特定的容器镜像推送到 OCIR\n\n其次，使用`oracle`提供商的 Fn 客户端上下文必须引用存储在现有 OCI CLI 配置文件中的配置文件。这是因为\
  \ Oracle Functions 函数与 Oracle Cloud 中的 IAM 集成。函数开发者必须拥有现有 Oracle Cloud 用户的身份，例如`sandbox-user`用户，才能在\
  \ Oracle Functions 中执行诸如创建新应用程序或函数等操作。类比来说，你可以回想一下 OCI CLI 的使用。所有 CLI 命令，或者更准确地说，底层的\
  \ API 调用，都是代表在 OCI CLI 配置文件中指定的命名配置文件下定义的 IAM 用户执行的。\n\n为了简化开发过程，你可以在本地 Fn 服务器和\
  \ Oracle Functions 之间交替工作。这样，你将能够在本地开发和单元测试新创建的函数，然后再将它们部署到 Oracle Functions。要实现这样的工作方式，只需在如图\
  \ 9-11 所示的上下文之间切换即可。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig11_HTML.jpg](img/478313_1_En_9_Fig11_HTML.jpg)\n\
  \n#### 图 9-11\n\n### Fn 项目上下文\n\n理论你已经了解了。是时候实践了。连接到计算实例，使用`fn create context`命令创建一个新的上下文，并将`--provider`选项设置为`oracle`，如下所示：\n\
  \n```bash\n[ubuntu@dev-vm]$ fn create context sandbox-user-fra-oci --provider oracle\n\
  Successfully created context: sandbox-user-fra-oci\n```\n\n在`fn`客户端配置目录中，应该会创建一个新的\
  \ YAML 文件。\n\n```bash\n/home/ubuntu/.fn/contexts/\n├── default.yaml\n└── sandbox-user-fra-oci.yaml\n\
  ```\n\n目前，这个新的上下文文件几乎是空的，肯定无法使用。你必须添加以下详细信息，才能让`fn`客户端正常与 Oracle Functions 配合工作：\n\
  \n*   区域性的 Oracle Functions API 端点\n*   区域性的 Oracle 容器镜像注册表 (OCIR) 仓库端点\n*   Fn\
  \ 项目特定于`oracle`提供商的信息：\n    *   compartment OCID\n*   OCI CLI 配置配置文件的名称\n\nOracle\
  \ Functions API 端点应设置为以下格式：\n\n```bash\nhttps://functions.<region>.oraclecloud.com\n\
  ```\n\nOCIR 仓库端点使用类似这样的格式：\n\n```bash\n<region-code>.ocir.io/<tenancy-namespace>/<repo-name>\n\
  ```\n\n例如，如果你在法兰克福区域工作，你将使用`eu-frankfurt-1`作为区域名称，并简单地使用`fra`作为区域代码。你可以在 OCI 文档中找到其他区域名称及其代码的列表。要识别你的*租户命名空间*，可以使用以下命令：\n\
  \n```bash\n$ oci os ns get --query 'data' --raw-output\njakobczyk\n```\n\n现在，重新连接到计算实例，并通过编辑上下文文件来添加上述信息。\n\
  \n```bash\n$ ssh -i ~/.ssh/oci_id_rsa ubuntu@$DEV_MACHINE_IP\n[ubuntu@dev-vm]$ vi\
  \ ~/.fn/contexts/sandbox-user-fra-oci.yaml\n```\n\n你可以从`chapter09/3-functions/configuration/sandbox-user-fra-oci.yaml`模板文件开始，并按照类似的方式编辑它，如清单\
  \ 9-7 所示。\n\n```yaml\napi-url: https://functions.eu-frankfurt-1.oraclecloud.com\n\
  registry: fra.ocir.io/jakobczyk/sandbox-fn\nprovider: oracle\noracle.compartment-id:\
  \ ocid1.compartment.oc1..aa...gzwhsa\noracle.profile: SANDBOX-USER\n```\n\n####\
  \ 清单 9-7\n\n#### ~/.fn/contexts/sandbox-user-fra-oci.yaml\n\n不要忘记将`Sandbox` compartment\
  \ 的 OCID 用作`oracle.compartment-id`字段的值。上下文文件提到一个 OCI CLI 配置文件名称作为`oracle.profile`属性的值。到目前为止，你一直在本地开发机器上使用\
  \ OCI CLI。本章假设你使用基于云的计算实例进行函数开发。这个新的`fn`客户端上下文旨在让`fn`客户端与 Oracle Functions 配合工作，它引用了一个特定的\
  \ OCI CLI 配置配置文件。因此，我们也需要在计算实例上创建配置文件。不过，不需要安装 CLI。在这种情况下，一切都是关于配置。让我们在默认路径中创建配置文件。这样，`fn`客户端将能够获取它。\n\
  \n```bash\n[ubuntu@dev-vm]$ mkdir ~/.oci\n[ubuntu@dev-vm]$ vi ~/.oci/config\n```\n\
  \n仅从你原始开发机器上使用的 OCI CLI 配置文件中复制`SANDBOX-USER`配置文件。不要忘记添加租户 OCID 和区域名称，如清单 9-8 所示。\n\
  \n```ini\n[SANDBOX-USER]\ntenancy=ocid1.tenancy.oc1..aa...3yymfa\nregion=eu-frankfurt-1\n\
  user=ocid1.user.oc1..aa...dzqpxa\nfingerprint=ad:82:99:bf:93:27:63:7b:35:75:f5:27:d4:95:78:86\n\
  key_file=~/.apikeys/api.sandbox-user.pem\npass_phrase=secret\n```\n\n#### 清单 9-8\n\
  \n#### ~/.oci/config (在用于函数开发的计算实例上)\n\n`fn`客户端的 IAM 身份源自存储在配置文件中的信息。更准确地说，`fn`客户端只读取引用的配置文件下的信息。为了与\
  \ Oracle Functions 交互，`fn`客户端使用的`oracle`提供商会将`fn`客户端命令最终转换为 OCI API 请求，如图 9-12 所示。此信息是正确签名这些请求所必需的；否则，OCI\
  \ API 将拒绝它们。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig12_HTML.jpg](img/478313_1_En_9_Fig12_HTML.jpg)\n\
  \n#### 图 9-12\n\n### Oracle Functions 的客户端配置\n\n客户端配置中最后一个缺失的元素是用于签署 API 请求的私钥。为了简化练习，我们将重用与标准\
  \ OCI CLI 调用相同的 API 签名密钥。回到装有 OCI CLI 的原始开发机器上，你可以使用`scp`工具将 API 签名密钥上传到用于函数开发的计算实例，如下所示：\n\
  \n```bash\n$ cd ~/git/oci-book/chapter09/1-infrastructure\n$ DEV_MACHINE_IP=`terraform\
  \ output dev_machine_public_ip`\n$ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-user.pem\
  \ ubuntu@$DEV_MACHINE_IP:/home/ubuntu\napi.sandbox-user.pem           100% 1766\
  \    57.2KB/s   00:00\n```\n\n接下来，连接到计算实例，并将 API 签名密钥移动到配置文件中声明的目录。\n\n```bash\n\
  [ubuntu@dev-vm]$ mkdir ~/.apikeys\n[ubuntu@dev-vm]$ mv ~/api.sandbox-user.pem ~/.apikeys/api.sandbox-user.pem\n\
  [ubuntu@dev-vm]$ chmod go-rwx ~/.apikeys/api.sandbox-user.pem\n```\n\n总而言之，`fn`客户端要与\
  \ Oracle Functions 配合工作所需的三个文件都在我们的`dev-vm`计算实例上了。\n\n```bash\n/home/ubuntu\n├──\
  \ .apikeys\n│   └── api.sandbox-user.pem\n...\n├── .fn\n│   ├── config.yaml\n│ \
  \  ├── contexts\n│   │   ├── default.yaml\n│   │   └── sandbox-user-fra-oci.yaml\n\
  ...\n├── .oci\n│   └── config\n```\n\n现在，使用`fn use context`命令将新上下文设置为当前上下文，并在后续步骤中发出`fn\
  \ list apps`命令以测试与 Oracle Functions 的连接性。\n\n```bash\n[ubuntu@dev-vm]$ fn use context\
  \ sandbox-user-fra-oci\nNow using context: sandbox-user-fra-oci\n[ubuntu@dev-vm]$\
  \ fn list apps\nNo apps found\n```\n\n\n\n这次没有显示任何 Fn 应用，但这正是我们所预期的。目前，还没有任何函数被部署到云端。旧的应用，即\
  \ `blankapp` 和 `uuidapp`，并未消失，它们仍然注册在我们的本地 Fn 服务器上。它们此刻没有在 `fn list app` 的输出中列出，仅仅是因为，这次我们是在与\
  \ Oracle Functions 交互，而不是与本地的 Fn 服务器。如果你将上下文切换回本地，你应该会再次看到这两个应用。无论如何，让我们继续使用新的上下文，这会使我们的\
  \ `fn` 客户端命令能够与 Oracle Functions 协同工作。\n\n## 部署 UUID 函数\n\n我们已准备好将之前在本地机器上测试过的相同\
  \ `uuidfn` 函数代码部署到 Oracle Functions。首先，我们将为 Oracle Functions 注册一个新的应用。在此过程中，你必须指定\
  \ VCN 子网，Oracle Functions 将使用该子网为该特定函数动态地将临时函数专用容器接入 OCI 网络。回想一下，本章开头描述的基础设施代码已经创建了一个子网，该子网可以被我们即将注册的应用引用。\n\
  \n**提示**\n\n为你的 Oracle Functions 应用使用不同的 VCN 子网是完全可以的。只需确保它们满足相关建议，例如可用的私有 IP 地址数量或使用无状态安全规则。\n\
  \n回到你的本地开发机器，使用 `terraform output` 命令获取此子网的 OCID。\n\n```\n$ cd ~/git/oci-book/chapter09/1-infrastructure\n\
  $ terraform output functions_subnet_ocid\nocid1.subnet.oc1.eu-frankfurt-1.aa...sp2ufa\n\
  ```\n\n接下来，连接到 `dev-vm` 计算实例，将子网 OCID 存储在一个 shell 变量中，并发出 `fn create app` 命令，同时将\
  \ `oracle.com/oci/subnetIds` 注解设置为该变量的值。你执行的命令将类似于以下内容：\n\n```\n[ubuntu@dev-vm]$\
  \ FN_SUBNET_ID=ocid1.subnet.oc1.eu-frankfurt-1.aa...sp2ufa\n[ubuntu@dev-vm]$ fn\
  \ create app uuidcloudapp --annotation oracle.com/oci/subnetIds=\"[\\\"$FN_SUBNET_ID\\\
  \"]\"\nSuccessfully created app:  uuidcloudapp\n```\n\n在此阶段，如果你愿意，可以在 OCI 控制台中验证应用是否确实已创建。操作如下：\n\
  \n1.  转到菜单 ➤ 开发者服务 ➤ Functions。\n\n2.  确保选择了 `Sandbox` 隔区。\n\n你应该能够在应用列表中看到一个条目，如图\
  \ 9-13 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig13_HTML.jpg](img/478313_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13：在 OCI 控制台中查看函数\n\n仅仅一个应用本身并不为我们提供任何服务。它只是函数的逻辑分组。建议将函数专用的容器镜像存储在 Oracle\
  \ Container Image Registry (OCIR) 中，且该仓库应位于我们希望函数实例为基于触发器的函数调用提供服务的同一区域。在部署函数之前，我们需要登录到\
  \ OCIR。我在前一章已经介绍过这项任务，因此我假设你已经熟悉此操作。请记住使用租户命名空间，而不是 OCID。同样，使用区域代码（如 `fra`）而不是区域名称。请确保找到你在前一章使用的\
  \ `sandbox-user` 的身份验证令牌，或者创建一个新的。你需要它作为登录 OCIR 的密码。一旦准备就绪，请调整以下代码片段中 `OCI_TENANCY_NAMESPACE`\
  \ 变量和 `OCIR_REGION` 变量的值，并执行 `docker login` 命令：\n\n```\n[ubuntu@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk\n\
  [ubuntu@dev-vm]$ OCIR_REGION=fra\n[ubuntu@dev-vm]$ OCI_USER=sandbox-user\n[ubuntu@dev-vm]$\
  \ docker login -u $OCI_TENANCY_NAMESPACE/$OCI_USER $OCIR_REGION.ocir.io\nPassword:\
  \ \nLogin Succeeded\n```\n\n要部署 `uuidfn` 函数，你可以使用 `fn deploy` 命令。你将需要引用你刚才在 Oracle\
  \ Functions 中创建的应用。此外，我们尚未更改函数代码中的任何内容；因此，`--no-bump` 参数将禁用递增镜像版本号的默认行为。总而言之，需要执行的命令如下：\n\
  \n\n\n\n## 函数部署与测试\n\n```bash\n[ubuntu@dev-vm]$ cd ~/uuidfn\n[ubuntu@dev-vm]$ fn\
  \ -v deploy --app uuidcloudapp --no-bump\nDeploying uuidfn to app: uuidcloudapp\n\
  Building image fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2\nFN_REGISTRY:  fra.ocir.io/jakobczyk/sandbox-fn\n\
  Current Context:  sandbox-user-fra-oci\n...\nSuccessfully built 258fbf5d0629\nSuccessfully\
  \ tagged fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2\nParts:  [fra.ocir.io jakobczyk\
  \ sandbox-fn uuidfn:0.0.2]\nPushing fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2\
  \ to docker registry...The push refers to repository [fra.ocir.io/jakobczyk/sandbox-fn/uuidfn]\n\
  ...\nUpdating function uuidfn using image fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2...\n\
  Successfully created function: uuidfn with fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2\n\
  ```\n\n正如构建输出中所示，镜像已正确打上标签并推送至我们所选区域的 OCIR 中。最终，函数创建报告为成功。\n\n回到 OCI 控制台，如果你点击`uuidcloudapp`应用程序名称，你将进入更详细的视图，并应该在列表中看到新创建的函数，如图\
  \ 9-14 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig14_HTML.jpg](img/478313_1_En_9_Fig14_HTML.jpg)\n\
  \n**图 9-14**\n在 OCI 控制台中查看函数\n\n类似地，该函数特定的容器镜像将列在 OCI 控制台的 OCIR 视图中，如图 9-15 所示。如果你完成了上一章的练习，你可能还会在`sandbox/uuid`仓库中看到另一个镜像。\n\
  \n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig15_HTML.jpg](img/478313_1_En_9_Fig15_HTML.jpg)\n\
  \n**图 9-15**\n在 OCI 控制台中查看函数特定的容器镜像\n\n函数测试可以按之前相同的方式进行。我们将使用`fn invoke`命令，它以应用程序名称和函数名称作为参数。为了进行简单的冒烟测试，让我们发起一次单函数调用。\n\
  \n```bash\n[ubuntu@dev-vm]$ fn invoke uuidcloudapp uuidfn\n{\"generator_uuid\":\
  \ \"921d63a9-f20c-44c0-97e6-5ff875fb1b39\"}\n```\n\n回想一下，`uuidfn`函数解析输入，寻找一个顶级的`client_name`\
  \ JSON 对象，该对象用于设置 JSON 响应中`generator_client`对象的值。要测试输入数据处理，请执行以下命令：\n\n```bash\n\
  [ubuntu@dev-vm]$ echo -n '{ \"client_name\": \"some_app\"  }' | fn invoke uuidcloudapp\
  \ uuidfn --content-type application/json\n{\"generator_uuid\": \"7685e3b8-5db7-49e1-8f1b-1561e16e9103\"\
  , \"generator_client\": \"some_app\"}\n```\n\n让我们再触发该函数两次。\n\n```bash\n[ubuntu@dev-vm]$\
  \ fn invoke uuidcloudapp uuidfn\n{\"generator_uuid\": \"9b4ad9bb-7d20-47d9-a53c-b3eb61854e4d\"\
  }\n[ubuntu@dev-vm]$ fn invoke uuidcloudapp uuidfn\n{\"generator_uuid\": \"b60fa2f0-3778-4a6a-9932-90d852a78ab1\"\
  }\n```\n\n现在，在 OCI 控制台中，你可以转到资源菜单中的“指标”选项卡，并检查此特定函数的各种指标。例如，一个最简单但仍非常有趣的指标是函数调用次数。看起来如图\
  \ 9-16 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig16_HTML.jpg](img/478313_1_En_9_Fig16_HTML.jpg)\n\
  \n**图 9-16**\n在 OCI 控制台中查看函数调用\n\n刚才，为了进行函数测试，我们使用了`fn invoke`命令。通常，函数使用者（如常规客户端应用程序或其他系统）将使用函数的\
  \ HTTP `invoke endpoint`，可以直接使用，或者在更复杂的解决方案中，隐藏在企业级 API 管理平台后面。你可以在 OCI 控制台中发现该端点，也可以通过`fn\
  \ inspect function`命令来发现，如下所示：\n\n```bash\n[ubuntu@dev-vm]$ fn inspect function\
  \ uuidcloudapp uuidfn | jq -r '.annotations.\"fnproject.io/fn/invokeEndpoint\"'\n\
  https://wup2t5yjlba.eu-frankfurt-1.functions.oci.oraclecloud.com/20181201/functions/ocid1.fnfunc.oc1.eu-frankfurt-1.aa...gsoxsq/actions/invoke\n\
  ```\n\n以 HTTP 请求形式的函数调用被发送到调用端点，并且必须使用正确的 Oracle Cloud Infrastructure 签名进行签名。换句话说，Oracle\
  \ Functions 只接受来自已知租户用户的外部请求，无论他们是人类用户还是系统用户。如果你向函数调用端点发送未签名的请求，你将收到以下响应：\n\n```json\n\
  {\"code\":\"NotAuthenticated\",\"message\":\"Not authenticated\"}\n```\n\n要发送已签名的请求，你需要将函数使用者映射到现有的\
  \ Oracle Cloud 用户，这需要一些仔细规划。此外，为了向函数使用者公开更用户友好的 REST API，你可能会部署某种网关，甚至采用前述的成熟 API\
  \ 管理平台。让我在此跳过这个话题，因为它涉及本书范围之外的方面。同时，让我们继续讨论第二种函数触发器类型，即事件。\n\n## 事件\n\n什么是`事件`？通常，我们用这个词指代某种特定情况的发生。让我以一个业务流程为例。发送到特定入站电子邮件地址的传入电子邮件可以被视为一个事件，并有效地在系统中触发一个新的业务流程案例。类似地，上传到对象存储桶中的新文件也可以被视为一个事件，并触发一个无服务器函数实例来处理新上传的数据。在这两种情况下，事件都需要携带一些额外的（但最好是有限且轻量级的）上下文信息。在后一个例子中，一个事件将至少携带新对象的名称以及存储桶的名称。这样，相应的无服务器函数就能够识别导致事件发生的对象。事件在当代软件架构中至关重要，并为不同的应用程序集成模式（如即发即弃、发布-订阅或存储转发）提供了基础。事件驱动的应用程序架构（组件通过交换事件进行通信）受益于松散耦合，这是独立组件开发和生命周期管理的关键推动因素，最终提高了生产力。\n\
  \n作为一个练习，我们将部署并测试一个无服务器函数，该函数处理出现在特定对象存储桶中的新创建的对象。函数实例将由该特定存储桶中的对象创建事件触发。当一个新对象被上传到`reports`存储桶时，将创建一个`reportingfn`无服务器函数的实例，并为其提供包含对象名称的事件上下文信息。接下来，函数将验证对象名称是否使用`.raw.csv`后缀。如果是，函数将读取对象的内容，在内存中执行简单的数据聚合，并创建一个新对象来存储操作结果。新对象将带有`.processed.csv`后缀。图\
  \ 9-17 说明了前述的数据处理逻辑。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig17_HTML.jpg](img/478313_1_En_9_Fig17_HTML.jpg)\n\
  \n**图 9-17**\n基于事件的函数调用\n\n\n\n\n### 函数与对象存储\n\n在 Oracle Functions 平台上运行的函数访问对象存储的方式，与在计算实例上运行的传统应用程序类似。就像使用计算实例一样，源自函数的\
  \ OCI API 调用是代表**实例主体**（你在第 5 章中已熟悉）进行的。回想一下，实例主体可以被包含在动态组中。为了将某个函数所有动态创建的函数实例都包含在一个动态组中，你可以将动态组的匹配规则设计为简单地包含所有具有特定标签键的函数。最后，你创建\
  \ IAM 策略语句，以允许动态组成员访问特定的 API 并与 OCI 资源（如对象存储桶和对象）进行交互。图 9-18 说明了这些与访问相关的方面。\n\n\
  ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig18_HTML.jpg](img/478313_1_En_9_Fig18_HTML.jpg)\n\
  \n图 9-18\n\n动态组与函数\n\n现在，你应该理解了本节的目标，以及我们即将采用的机制，以允许函数实例与对象存储 API 交互并有效处理对象。\n\n\
  #### 准备基础设施\n\n第一步，我们必须准备一个新的对象存储桶。断开与用于函数开发的计算实例的连接，并在你的开发机器上使用 OCI CLI 执行 `oci\
  \ os bucket create` 命令。\n\n```\n$ oci os bucket create --name reports --profile\
  \ SANDBOX-ADMIN\n{\n\"data\": {\n...\n\"name\": \"reports\",\n\"public-access-type\"\
  : \"NoPublicAccess\",\n\"storage-tier\": \"Standard\",\n...\n}\n}\n```\n\n接下来，我们将让\
  \ `sandbox-user` 管理新创建的 `reports` 存储桶中的所有对象。为此，使用 `oci iam policy create` 创建新策略，如下所示：\n\
  \n```\n$ cd ~/git/oci-book/chapter09/4-events/policies\n$ oci iam policy create\
  \ --name sandbox-users-storage-reports-policy --statements file://sandbox-users.policies.storage-reports.json\
  \ --description \"Storage-related (reports) policy for regular Sandbox users\" --profile\
  \ SANDBOX-ADMIN\n{\n\"data\": {\n...\n\"name\": \"sandbox-users-storage-reports-policy\"\
  ,\n\"description\": \"Storage-related (reports) policy for regular Sandbox users\"\
  ,\n\"lifecycle-state\": \"ACTIVE\",\n...\n}\n}\n```\n\n你应该已经熟悉 `read buckets` 和\
  \ `manage objects` 这两个策略动词。你在第 5 章中对另一个存储桶应用过它们。列表 9-9 显示了针对 `reports` 存储桶的策略语句。\n\
  \n```\n[\n\"allow group sandbox-users to read buckets in compartment Sandbox where\
  \ target.bucket.name='reports'\",\n\"allow group sandbox-users to manage objects\
  \ in compartment Sandbox where target.bucket.name='reports'\"\n]\n列表 9-9\nsandbox-users.policies.storage-reports.json\n\
  ```\n\n现在，上传第一个测试文件：\n\n```\n$ cd ~/git/oci-book/chapter09/4-events/reports\n$ oci\
  \ os object put -bn blueprints --file customer_attendance.20190922.raw.csv --profile\
  \ SANDBOX-USER\nUploading object  [####################################]  100%\n\
  ```\n\n作为第 5 章练习的一部分，我们创建了 `test-projects` 标签命名空间。在这个已存在的标签命名空间中，让我们准备一个名为 `reports`\
  \ 的新标签键。稍后我们将使用此键来标记处理对象的函数。现在，使用 `oci iam tag-namespace list` 及以下查询来读取标签命名空间的 OCID。接下来，在创建新标签键的\
  \ `oci iam tag create` 命令中使用此 OCID。\n\n```\n$ TAG_NAMESPACE_OCID=`oci iam tag-namespace\
  \ list --query \"data[?name=='test-projects'] | [0].id\" --raw-output`\n$ echo $TAG_NAMESPACE_OCID\n\
  ocid1.tagnamespace.oc1..aaaaaaaac7doek63tcdgt3xqtjfx5is3twcpdsszaqsmxlurkwx7pu6qu2eq\n\
  $ oci iam tag create --tag-namespace-id $TAG_NAMESPACE_OCID --name reports --description\
  \ \"Reports project\" --profile SANDBOX-ADMIN\n{\n\"data\": {\n...\n\"tag-namespace-name\"\
  : \"test-projects\",\n\"name\": \"reports\",\n\"description\": \"Reports project\"\
  ,\n\"is-cost-tracking\": false,\n\"lifecycle-state\": \"ACTIVE\",\n...\n}\n}\n```\n\
  \n我们将使用以下动态组匹配规则，它包含所有带有 `test-projects.reports` 标签键的函数：\n\n```\nALL {resource.type\
  \ = 'fnfunc', tag.test-projects.reports.value}\n```\n\n现在，使用 `oci iam dynamic-group\
  \ create` 创建动态组。\n\n```\n$ echo $TENANCY_OCID\nocid1.tenancy.oc1..aa...3yymfa\n\
  $ MATCHING_RULE=\"ALL { resource.type = 'fnfunc', tag.test-projects.reports.value\
  \ = 'r1' }\"\n$ oci iam dynamic-group create --name reporting-functions --description\
  \ \"Functions related to the reporting project\" --matching-rule \"$MATCHING_RULE\"\
  \ -c $TENANCY_OCID\n{\n\"data\": {\n...\n\"name\": \"reporting-functions\",\n\"\
  description\": \"Functions related to the reporting project\",\n\"matching-rule\"\
  : \"tag.test-projects.reports.value\",\n\"lifecycle-state\": \"ACTIVE\",\n...\n\
  }\n}\n```\n\n最后一步是添加一个新的 IAM 策略语句，以允许该动态组的成员管理 `Sandbox` 配置空间中 `reports` 存储桶内的对象。列表\
  \ 9-10 显示了这个 IAM 策略语句。\n\n```\n[\n\"allow dynamic-group reporting-functions to manage\
  \ objects in compartment Sandbox where target.bucket.name='reports'\"\n]\n列表 9-10\n\
  functions.policies.storage-reports.json\n```\n\n这些命令将使新的 IAM 策略生效：\n\n```\n$ cd\
  \ ~/git/oci-book/chapter09/4-events/policies\n$ oci iam policy create --name functions-storage-reports-policy\
  \ --statements file://functions.policies.storage-reports.json --description \"Storage-related\
  \ (reports) policy for tagged functions\" --profile SANDBOX-ADMIN\n{\n\"data\":\
  \ {\n...\n\"name\": \"functions-storage-reports-policy\",\n\"description\": \"Storage-related\
  \ (reports) policy for tagged functions\",\n\"lifecycle-state\": \"ACTIVE\",\n...\n\
  }\n}\n```\n\n通过这几个步骤，我们为附加了 `test-projects.reports` 定义标签的函数实例准备好了对象存储访问控制配置。\n\n\
  \n\n#### 部署函数\n\n#### 创建函数存根\n\n新的函数将被命名为 `reportingfn`，并采用基于 Python 的实现。现在，连接到用于函数开发的计算实例，并使用\
  \ `fn init` 命令来创建函数存根。\n\n```\n[ubuntu@dev-vm]$ cd ~\n[ubuntu@dev-vm]$ fn init --runtime\
  \ python reportingfn\nCreating function at: ./reportingfn\nFunction boilerplate\
  \ generated.\nfunc.yaml created.\n```\n\n和之前一样，`cloud-init` 已经下载了函数代码并将其放置在函数目录中。将代码复制到函数存根中。\n\
  \n```\n[ubuntu@dev-vm]$ cp ~/functions/reportingfn.py ~/reportingfn/func.py\n```\n\
  \n#### 修改依赖项\n\n该函数使用 OCI Python SDK 与 OCI 对象存储进行交互。这意味着需要依赖 `oci` 模块，并迫使我们修改 `requirements.txt`\
  \ 文件。只有这样，函数特定的镜像才会包含 `oci` 模块。你可以使用简单的 `echo` 命令将 `oci` 名称追加到 `requirements.txt`\
  \ 文件中。\n\n```\n[ubuntu@dev-vm]$ echo -ne \"\\noci\" >> ~/reportingfn/requirements.txt\n\
  [ubuntu@dev-vm]$ cat ~/reportingfn/requirements.txt\nfdk\noci\n```\n\n#### 分析处理函数\n\
  \n`reportingfn.py` 代码比我们之前处理过的两个函数稍大一些。清单 9-11 展示了 `handler` 函数最重要的部分。\n\n```\n\
  ...\ndef handler(ctx, data: io.BytesIO=None):\n...\nbucket_name = \"reports\"\n\
  object_name = extract_object_name(data)\n...\nsigner = oci.auth.signers.get_resource_principals_signer()\n\
  client = oci.object_storage.ObjectStorageClient(\n    config={},\n    signer=signer)\n\
  storage_namespace = client.get_namespace().data\nobject_content_str = load_object_content(\n\
  \    client, storage_namespace,\n    bucket_name, object_name)\ncity_attendance_str\
  \ = process_city_attendance_data(\n    object_content_str)\nprocessed_object_name\
  \ = object_name.replace(\n    '.raw.csv','.processed.csv')\nput_response = put_city_attendance_object(\n\
  \    client, storage_namespace, bucket_name,\n    processed_object_name, city_attendance_str)\n\
  ...\n```\n\n*清单 9-11 reportingfn.py 函数*\n\n该函数被设计为仅与 `reports` 存储桶交互。它从输入数据中读取新创建的对象名称。此逻辑在我们将要稍后介绍的\
  \ `extract_object_name` 函数中提供。接下来，调用 OCI SDK 函数以获取 `ObjectStorageClient` 对象并获取要使用的对象存储命名空间。在后续步骤中，函数加载新创建对象的内容（`load_object_content`\
  \ 函数），处理该数据（`process_city_attendance` 函数），最后将处理结果持久化到另一个新对象（`put_city_attendance_data`\
  \ 函数）中，该对象具有与原始对象相同的名称但不同的后缀（`.processed.csv`）。你可以在同一个 `reportingfn.py` 文件中找到这些函数。只要了解\
  \ Python 的基础知识，代码应该相对容易理解。\n\n#### 部署函数\n\n根据当前的 Fn 客户端上下文，将函数部署到 Oracle Functions\
  \ 会将镜像推送到 OCIR。虽然我们已经执行了 `docker login` 命令，但你可能需要重复此操作。如果是这种情况，以下是需要执行的命令：\n\n```\n\
  [ubuntu@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk\n[ubuntu@dev-vm]$ OCIR_REGION=fra\n\
  [ubuntu@dev-vm]$ OCI_USER=sandbox-user\n[ubuntu@dev-vm]$ docker login -u $OCI_TENANCY_NAMESPACE/$OCI_USER\
  \ $OCIR_REGION.ocir.io\nPassword: \nLogin Succeeded\n```\n\n现在，确保 `FN_SUBNET_ID`\
  \ 已正确定义，并使用 `fn create app` 来创建应用程序。\n\n```\n[ubuntu@dev-vm]$ FN_SUBNET_ID=ocid1.subnet.oc1.eu-frankfurt-1.aa...sp2ufa\n\
  [ubuntu@dev-vm]$ fn create app reportingapp --annotation oracle.com/oci/subnetIds=\"\
  [\\\"$FN_SUBNET_ID\\\"]\"\nSuccessfully created app:  reportingapp\n```\n\n我们已经准备好部署函数。\n\
  \n```\n[ubuntu@dev-vm]$ cd reportingfn/\n[ubuntu@dev-vm]$ fn -v deploy --app reportingapp\n\
  ...\nUpdating function reportingfn using image fra.ocir.io/jakobczyk/sandbox-fn/reportingfn:0.0.2...\n\
  Successfully created function: reportingfn with fra.ocir.io/jakobczyk/sandbox-fn/reportingfn:0.0.2\n\
  ```\n\n图 9-19 显示了 OCI 控制台中新部署的函数。类似地，图 9-20 展示了 OCIR 中的函数特定容器镜像。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig20_HTML.jpg](img/478313_1_En_9_Fig20_HTML.jpg)\n\
  \n*图 9-20 在 OCI 控制台中查看函数特定容器镜像*\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig19_HTML.jpg](img/478313_1_En_9_Fig19_HTML.jpg)\n\
  \n*图 9-19 在 OCI 控制台中查看函数*\n\n#### 添加标记\n\n我们绝不能忘记需要附加到函数上的标记。这可以通过 OCI CLI 完成。首先，使用带有定制\
  \ JMESPath 查询的 `oci fn application list` 命令来获取 Oracle Functions 应用程序的 OCID。接下来，使用\
  \ `oci fn function list` 命令来获取函数的 OCID。最后，你可以使用 `oci fn function update` 命令将 `test-projects.reports`\
  \ 定义的标记附加到函数上。\n\n```\n$ FN_APP_OCID=`oci fn application list --query \"data[?\\\
  \"display-name\\\" == 'reportingapp'] | [0].id\" --raw-output`\n$ echo $FN_APP_OCID\n\
  ocid1.fnapp.oc1.eu-frankfurt-1.aa...spf2rq\n$ FN_FUN_OCID=`oci fn function list\
  \ --application-id $FN_APP_OCID --query \"data[?\\\"display-name\\\" == 'reportingfn']\
  \ | [0].id\" --raw-output`\n$ echo $FN_FUN_OCID\nocid1.fnfunc.oc1.eu-frankfurt-1.aa...j3lfqa\n\
  $ oci fn function update --function-id $FN_FUN_OCID --defined-tags '{ \"test-projects\"\
  : {\"reports\": \"r1\"} }'\nWARNING: Updates to config and freeform-tags and defined-tags\
  \ will replace any existing values. Are you sure you want to continue? [y/N]: y\n\
  {\n  \"data\": {\n    ...\n    \"defined-tags\": {\n      \"test-projects\": {\n\
  \        \"reports\": \"r1\"\n      }\n    },\n    \"display-name\": \"reportingfn\"\
  ,\n    \"freeform-tags\": {},\n    ...\n    \"lifecycle-state\": \"ACTIVE\",\n \
  \   ...\n  }\n}\n```\n\n如果你愿意，可以在 OCI 控制台中按照以下步骤直观地确认标记已正确附加到函数上：\n\n1.  转到菜单 ➤\
  \ 开发者服务 ➤ 函数。\n2.  确保选择了 `Sandbox` 复选框。\n3.  单击 `reportingapp` 应用程序的名称。\n4.  单击\
  \ `reportingfn` 函数的名称。\n5.  单击“标记”选项卡。\n\n你应该会看到新的已定义标记，它存在于 `test-projects` 标记命名空间中并使用\
  \ `reports` 键，如图 9-21 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig21_HTML.jpg](img/478313_1_En_9_Fig21_HTML.jpg)\n\
  \n*图 9-21 查看附加到函数的已定义标记键*\n\n函数已部署到 Oracle Functions。在我们测试它之前，让我们讨论一下它的触发方式。\n\n\
  \n\n### 事件作为函数触发器\n\n`reportingfn` 函数将在 `reports` 存储桶中创建新对象时被触发。事件必须携带一些关于上下文的基本信息。函数实例必须被告知要处理的对象名称。让我们为事件负载构思一个简单的示例。可以想象，事件上下文信息以\
  \ JSON 格式存储，其外观类似于清单 9-12 中所示的示例。\n\n```json\n{\n\"eventType\": \"createobject\"\
  ,\n\"source\": \"ObjectStorage\",\n\"eventTime\": \"2019-09-23T10:49:00.195Z\",\n\
  \"data\": {\n\"resourceName\": \"customer_attendance.20190922.raw.csv\",\n}\n}\n\
  ```\n**清单 9-12**\n`event.mock.json`\n\n函数代码随后会解析传入的事件负载，并提取携带新创建对象名称的 `resourceName`\
  \ 元素。`reportingfn` 函数使用了前面提到的 `extract_object_name` 函数，该函数在清单 9-13 中展示。\n\n```python\n\
  ...\ndef extract_object_name(data: io.BytesIO):\n    data_bytes = data.getvalue()\n\
  \    data_json = json.loads(data_bytes)\n    object_name = data_json['data']['resourceName']\n\
  \    return object_name\n...\n```\n**清单 9-13**\n`reportingfn.py: extract_object_name`\
  \ 函数\n\n回到我们刚才上传的测试对象，让我们在 OCI 控制台中检查它的名称。该对象使用的是 `customer_attendance.20190922.raw.csv`\
  \ 这个名称，如图 9-22 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig22_HTML.jpg](img/478313_1_En_9_Fig22_HTML.jpg)\n\
  **图 9-22**\n在 OCI 控制台中查看原始数据对象\n\n在用于函数开发的计算实例上，`ubuntu`用户的主目录中，您可以找到`~/event.mock.json`文件。该文件包含了事件负载，如清单\
  \ 9-13 所示。该文件是在初始启动时通过`cloud-init`下载的，方式与您部署的三个函数的代码文件相同。为了测试函数，我们将把该文件的内容作为输入流提供给函数。\n\
  \n```bash\n[ubuntu@dev-vm]$ cat ~/event.mock.json | fn invoke reportingapp reportingfn\
  \ --content-type application/json\n{\"object_name\": \"customer_attendance.20190922.raw.csv\"\
  , \"processed_object_name\": \"customer_attendance.20190922.processed.csv\",\n\"\
  result\": \"success\"}\n```\n\n现在，如果您查看 OCI 控制台中`reports`存储桶的对象列表，应该很快会看到新对象，如图\
  \ 9-23 所示。这个新对象是由运行在 Oracle Functions 平台上的动态生成的函数实例创建的。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig23_HTML.jpg](img/478313_1_En_9_Fig23_HTML.jpg)\n\
  **图 9-23**\n在 OCI 控制台中查看已处理的数据对象\n\n好了，到目前为止一切顺利，但这仍然不是我们最初预期的结果。我们的目标是让函数实例在存储桶中出现新对象时自动触发。是时候介绍另一个属于\
  \ CNCF 项目生态系统的开源项目了。\n\n### CloudEvents\n\nCloudEvents 项目是在 CNCF 伞形组织下运作的相对较新的计划之一。该项目的主要目标是为社区提供一个统一的规范来描述事件数据。事件驱动的应用程序并不新鲜，不同的软件组件已经为事件使用了大量各种结构。当事件发布者以不同于事件消费者预期的格式发出事件时，这通常会导致有时成本高昂，有时只是令人烦恼的额外应用程序集成工作。为了减轻这种痛苦，业界已经清楚地认识到，像事件上下文信息这样简单且范围相当有限的东西，应该通过联合努力达成一致。CloudEvents\
  \ 提供了一个描述事件数据的规范。此外，它还附带了各种编程语言的参考实现。您可以在 GitHub 上找到所有这些内容，如图 9-24 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig24_HTML.jpg](img/478313_1_En_9_Fig24_HTML.jpg)\n\
  **图 9-24**\nGitHub 上的 CloudEvents 项目\n\nCloudEvents 规范内容轻量且相对容易阅读。在撰写本文时，该规范有三个稳定版本。当您阅读本书时，很可能已经有更新的版本可用。不用担心。为了简要讨论该规范，我们将重点关注\
  \ 0.1 版本。细节会随着时间变化，但一般规则保持不变。我选择了 0.1 版本，因为它是您将在接下来的章节中学习的 Oracle Events 的当前标准。\n\
  \nCloudEvents 规范（版本 0.1）的核心包含三个部分。\n\n*   术语\n\n*   类型系统\n\n*   上下文属性\n\n最有趣的部分是*上下文属性*，它们有效地定义了事件信封，或者换句话说，基本上就是承载事件上下文信息的有效负载。这些主要是元数据，如事件的类型、来源和时间，以及事件特定的数据及其内容类型。这些属性列在表\
  \ 9-1 中。\n\n**表 9-1**\nCloudEvents 上下文属性\n\n| CloudEvents 版本 | 0.1 | 0.3 / 1.0-rc1\
  \ |\n| --- | --- | --- |\n| 使用的规范版本 | `cloudEventsVersion` | `specversion` |\n|\
  \ 事件类型 | `eventType` | `type` |\n| 事件类型的版本 | `eventTypeVersion` | - |\n| 事件发出者 |\
  \ `source` | `source` |\n| 唯一事件标识符 | `eventID` | `id` |\n| 事件发生时间戳 | `eventTime`\
  \ | `time` |\n| `data` 字段中内容的类型 | `contentType` | `datacontenttype` |\n| 事件的特定领域数据\
  \ | `data` | `data` |\n\n清单 9-14 展示了 Oracle Cloud 中对象存储发出的事件的部分选定元素。您可以看到，在这种情况下，我们查看的是在创建新对象时发出的事件。这是基于\
  \ `eventType` 和 `source` 字段的值。 compartment、bucket 和对象名称包含在 `data` 元素内。清单仅显示了存储在\
  \ `resourceName` 字段中的对象名称。为了清单的简洁性，许多其他特定领域的事件数据被省略了。\n\n```json\n{\n\"eventType\"\
  : \"com.oraclecloud.objectstorage.createobject\",\n\"cloudEventsVersion\": \"0.1\"\
  ,\n\"eventTypeVersion\": \"2.0\",\n\"source\": \"ObjectStorage\",\n\"eventTime\"\
  : \"2019-09-23T10:49:00.195Z\",\n\"contentType\": \"application/json\",\n\"data\"\
  : {\n    ...\n    \"resourceName\": \"customer_attendance.20190923.csv\",\n    ...\n\
  },\n\"eventID\": \"b163df45-de9c-9f01-2928-b0906cd8a3e4\"\n}\n```\n**清单 9-14**\n\
  CloudEvent（版本 1）\n\n有了对 CloudEvents 规范的简要了解，我们可以进入本章的最后一部分了。\n\n\n\n### Oracle 事件\n\
  \nOracle Cloud 中的选定服务可以配置为发出事件。这些事件符合开源 CloudEvents 规范（在撰写本文时，我们谈论的是该规范的 0.1 版本）。Oracle\
  \ 事件用于将发出的事件与其他 Oracle Cloud 服务连接起来，以便在特定事件发生时执行操作。例如，您可以注册一个在某个事件发生时执行操作的函数；例如，当新的计算实例启动完成、数据库备份创建、收到通知或在特定存储桶中创建新对象时。您通过定义适当的\
  \ Oracle Events 规则，将事件发出者与执行操作的服务连接起来。规则定义了已实现的事件处理链的条件和操作，如图 9-25 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig25_HTML.jpg](img/478313_1_En_9_Fig25_HTML.jpg)\n\
  \n图 9-25 Oracle 事件\n\n回到我们的练习，首先，我们必须允许 Oracle 事件服务调用 Oracle Functions，以便在特定类型的事件发生时，能够触发定义在\
  \ `Sandbox` 复合区中的无服务器函数。清单 9-15 展示了为此目的所需的唯一 IAM 策略语句。\n\n```json\n[\n\"allow service\
  \ cloudEvents to use functions-family in compartment Sandbox\"\n]\n```\n清单 9-15\
  \ cloudevents.policies.json\n\n现在，使用 `oci iam policy create` 来添加此语句。\n\n```bash\n\
  $ cd ~/git/oci-book/chapter09/4-events/policies\n$ oci iam policy create --name\
  \ cloudevents-policy --statements file://cloudevents.policies.json --description\
  \ \"Functions-related policy for CloudEvents\" --profile SANDBOX-ADMIN\n{\n\"data\"\
  : {\n...\n\"name\": \"cloudevents-policy\",\n\"description\": \"Functions-related\
  \ policy for CloudEvents\",\n\"lifecycle-state\": \"ACTIVE\",\n...\n}\n}\n```\n\n\
  我们即将创建一个 Oracle 事件规则，该规则将一个定义了要响应事件类型的条件与一个操作相结合。清单 9-16 展示了我们将要使用的条件。\n\n```json\n\
  {\n\"eventType\": [ \"com.oraclecloud.objectstorage.createobject\" ],\n\"data\"\
  : {\n\"compartmentName\": [\"Sandbox\"],\n\"additionalDetails\": {\n\"bucketName\"\
  : [\"reports\"]\n}\n}\n}\n```\n清单 9-16 oracleevents.conditions.json\n\n简而言之，当在 `Sandbox`\
  \ 复合区内的 `reports` 存储桶中创建新对象时，规则将执行定义的操作，如清单 9-17 所示。\n\n```json\n{\n\"actions\"\
  : [\n{\n\"actionType\": \"FAAS\",\n\"description\": \"string\",\n\"functionId\"\
  : \"PUT_HERE_FUNCTION_ID\",\n\"isEnabled\": true\n}\n]\n}\n```\n清单 9-17 oracleevents.actions.template.json\n\
  \n我们稍后会引用这些文件。同时，还有一件重要的事情要做。某些类型的事件发出者必须显式启用。对象存储对象的事件就属于这种情况。我们需要为 `reports` 存储桶启用发出对象事件。在\
  \ OCI 控制台中，您可以按照以下方式执行此任务：\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig26_HTML.jpg](img/478313_1_En_9_Fig26_HTML.jpg)\n\
  \n图 9-26 为存储桶中的对象启用事件生成\n\n1.  转到菜单 ➤ 对象存储 ➤ 对象存储。\n2.  确保选择了 `Sandbox` 复合区。\n3.\
  \  单击 `reports` 存储桶的名称。\n4.  单击“发出对象事件”旁边的“编辑”。\n5.  选中“发出对象事件”框，如图 9-26 所示。\n6.\
  \  单击“保存更改”。\n\n在这个阶段，我们已经准备好创建一个新的 Oracle 事件规则，该规则将使用您刚才看到的条件文件和操作文件。如下面的代码片段所示，您将对条件文件的内容进行序列化，并使用\
  \ `sed` 程序创建包含最终操作的 JSON 文件。这样做是为了准备 `oci events rule create` 命令的输入。请注意，`FN_FUN_OCID`\
  \ 变量仍然需要设置。以下是需要执行的代码：\n\n```bash\n$ cd ~/git/oci-book/chapter09/4-events/events\n\
  $ echo $FN_FUN_OCID\nocid1.fnfunc.oc1.eu-frankfurt-1.aa...j3lfqa\n$ cat oracleevents.actions.template.json\
  \ | sed -e \"s/PUT_HERE_FUNCTION_ID/$FN_FUN_OCID/g\" > oracleevents.actions.json\n\
  $ SERIALIZED_CONDITIONS=`cat oracleevents.conditions.json | sed 's/\"/\\\\\"/g'\
  \ | sed 's/[[:space:]]//g' | tr -d '\\n'`\n$ echo $SERIALIZED_CONDITIONS\n{\"eventType\"\
  :[\"com.oraclecloud.objectstorage.createobject\"],\"data\":{\"compartmentName\"\
  :[\"Sandbox\"],\"additionalDetails\":{\"bucketName\":[\"reports\"]}}}\n$ oci events\
  \ rule create --display-name new-reports --is-enabled true --condition $SERIALIZED_CONDITIONS\
  \ --actions file://oracleevents.actions.json\n```\n\n规则已创建。如果您愿意，可以随时前往 OCI 控制台查看或酌情修改\
  \ Oracle 事件规则，如图 9-27 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig27_HTML.jpg](img/478313_1_En_9_Fig27_HTML.jpg)\n\
  \n图 9-27 在 OCI 控制台中查看 Oracle 事件规则\n\n要测试对象存储发出的事件是否真的触发了部署到 Oracle Functions 的 `reportingfn`\
  \ 函数，请将剩余的两个测试文件放入 `reports` 存储桶。您可以使用 `oci os object put` 命令来完成，如下所示：\n\n```bash\n\
  $ cd ~/git/oci-book/chapter09/4-events/reports\n$ oci os object put -bn reports\
  \ --file customer_attendance.20190923.raw.csv --profile SANDBOX-USER\nUploading\
  \ object  [####################################]  100%\n$ oci os object put -bn\
  \ reports --file customer_attendance.20190924.raw.csv --profile SANDBOX-USER\nUploading\
  \ object  [####################################]  100%\n```\n\n一段时间后，您应该会在同一个存储桶中看到另外两个文件出现，这次带有\
  \ `.processed.csv` 后缀，如图 9-28 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig28_HTML.jpg](img/478313_1_En_9_Fig28_HTML.jpg)\n\
  \n图 9-28 在 OCI 控制台中查看已处理的文件\n\n您可以自由探索这些文件的内容，比较 `.raw.csv` 和 `.processed.csv`，并查看用于实现该函数的\
  \ Python 代码。\n\n提示\n\n如果没有任何反应，并且没有 `.processed.csv` 文件，您可能跳过了在存储桶上启用发出事件的步骤。删除这两个\
  \ `.raw.csv` 文件，在 `reports` 存储桶上启用发出事件，然后重新上传 `.raw.csv` 文件。\n\n\n\n## 清理\n\n完成练习后，你可以终止本章中创建的云资源。首先，让我们删除存储桶及其内容。\n\
  \n```\n$ oci os object bulk-delete -bn reports\nThere are 6 object in the bucket.\
  \ Are you sure you want to delete them? [y/N]: y\n$ oci os bucket delete -bn reports\n\
  Are you sure you want to delete this resource? [y/N]: y\n```\n\n要从 Oracle Functions\
  \ 删除函数，你可以使用 OCI CLI、OCI 控制台或 Fn 客户端。以下是使用 CLI 命令的方法：\n\n```\n$ FN_APP_OCID=`oci\
  \ fn application list --query \"data[?\\\"display-name\\\" == 'reportingapp'] |\
  \ [0].id\" --raw-output`\n$ FN_FUN_OCID=`oci fn function list --application-id $FN_APP_OCID\
  \ --query \"data[?\\\"display-name\\\" == 'reportingfn'] | [0].id\" --raw-output`\n\
  $ oci fn function delete --function-id $FN_FUN_OCID\nAre you sure you want to delete\
  \ this resource? [y/N]: y\n$ oci fn application delete --application-id $FN_APP_OCID\n\
  Are you sure you want to delete this resource? [y/N]: y\n$ FN_APP_OCID=`oci fn application\
  \ list --query \"data[?\\\"display-name\\\" == 'uuidcloudapp'] | [0].id\" --raw-output`\n\
  $ FN_FUN_OCID=`oci fn function list --application-id $FN_APP_OCID --query \"data[?\\\
  \"display-name\\\" == 'uuidfn'] | [0].id\" --raw-output`\n$ oci fn function delete\
  \ --function-id $FN_FUN_OCID\nAre you sure you want to delete this resource? [y/N]:\
  \ y\n$ oci fn application delete --application-id $FN_APP_OCID\nAre you sure you\
  \ want to delete this resource? [y/N]: y\n```\n\n要删除 Oracle Events 规则，可以像这样使用 `oci\
  \ events rule delete` CLI 命令：\n\n```\n$ EVENTRULE_OCID=`oci events rule list --query\
  \ \"data[?\\\"display-name\\\" == 'new-reports'] | [0].id\" --raw-output`\n$ oci\
  \ events rule delete --rule-id $EVENTRULE_OCID\nAre you sure you want to delete\
  \ this resource? [y/N]: y\n```\n\n要终止 `dev-vm` 及任何相关的网络资源，你必须在基础设施项目目录中像这样发出 `terraform\
  \ destroy` 命令：\n\n```\n$ source ~/tfvars.env.sh\n$ cd ~/git\n$ cd oci-book/chapter09/1-infrastructure\n\
  $ terraform destroy -auto-approve\n```\n\n这是本书的最后一章。在本书的过程中，我们创建了许多租户级别的补充云资源，例如用户、组、IAM\
  \ 策略、动态组和 `Sandbox` 隔区。这些资源至少在撰写本文时不会产生费用。除非你想自行使用它们来进一步探索 Oracle Cloud Infrastructure\
  \ 功能，否则可以随意删除它们。要查找在特定时间点存在于你的租户或特定隔区中的所有云资源，你可以使用第 4 章介绍的搜索功能，或 OCI 控制台中菜单 ➤ 治理\
  \ ➤ 隔区浏览器下可用的隔区浏览器。\n\n## 总结\n\n云原生架构，尽管尚未完全成熟，但正逐渐成为现实。在本章中，你了解了新兴的 CNCF 生态系统及其基于开源、云计算和容器化的起源。接下来，你熟悉了无服务器函数的概念，并运用这些知识，使用了名为\
  \ Fn Project 的开源、基于容器的无服务器框架。然后，你使用了 Oracle Functions，这是 Oracle Cloud 上的一个托管平台，允许你执行\
  \ Fn Project 函数。进一步地，你理解了部署到 Oracle Functions 的函数如何与其他 Oracle Cloud 服务交互。作为一个示例，你学习了如何读写对象存储。最后，你认识了\
  \ CNCF 主办的 CloudEvents 项目，该项目致力于定义行业范围的事件规范，并看到了如何通过配置 Oracle Events 规则来利用基于事件的函数触发器。\n\
  \n本章为 *Practical Oracle Cloud Infrastructure* 画上了句号。我很高兴能成为你的向导。祝你好运！\n\n\n# 索引\n\
