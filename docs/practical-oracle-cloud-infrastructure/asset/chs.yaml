  \n**图 7-28** SQL Developer Web 中的维度表\n\n您已完成练习的数据加载部分。作为其中的一部分，我们执行了一些 SQL DDL 语句、存储过程以及几个\
  \ SQL `select` 语句。ADB 实例让您深入了解数据库的详细信息。让我们看看 ADW 中包含的一些监控功能。\n\n### 数据库监控\n\nAutonomous\
  \ Database 实例配备了一个专用的服务控制台，可用于监控实例的性能。ADB 服务控制台仪表板已在图 7-7 中展示。要访问服务控制台，如果您之前保存了其直接链接，可以使用它。或者，您始终可以打开\
  \ OCI 控制台并执行以下步骤：\n\n1.  转到菜单 ➤ 数据库 ➤ Autonomous Data Warehouse。\n2.  确保选中 `Sandbox`\
  \ compartment。\n3.  单击您的 ADW 实例名称。\n4.  单击服务控制台按钮。\n\n提示\n\n如果单击服务控制台按钮后没有任何反应，新窗口可能已被您的浏览器阻止。在浏览器中，您必须允许此页面打开新窗口。\n\
  \n在本章开始时，您配置了 ADW 实例。您为实例设置了两个与资源相关的参数，即初始分配的 CPU 数量和以太字节表示的初始存储容量。仪表板提供以下方面的当前和历史信息：\n\
  \n*   CPU 分配和利用率\n*   所有数据库表空间使用的存储容量\n*   已执行 SQL 语句的平均数量\n*   SQL 语句的平均响应时间\n\n\
  图 7-29 中展示的活动视图提供了关于服务消耗的更细粒度信息，并让您可以检查详细的 SQL 执行信息。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig29_HTML.jpg](img/478313_1_En_7_Fig29_HTML.jpg)\n\
  \n**图 7-29** ADW 数据库活动视图\n\n活动视图允许您调整希望显示统计信息的时间间隔。默认情况下，ADW 为服务消耗保留历史信息八天，并以一小时为间隔进行。您可以将保留时间增加到大于这八天的值，并更改性能统计信息收集间隔。Autonomous\
  \ Database 与传统的 Oracle Database 一样，依赖自动工作负载仓库 (AWR) 表来保留历史性能统计信息。AWR 表存储在 SYSAUX\
  \ 表空间中，并属于 SYS 模式。以 `ADMIN` 身份打开 SQL Developer Web，并运行以下查询以显示当前的 AWR 设置：\n\n```\n\
  select\nextract( hour from snap_interval) interval_hours,\nsnap_interval,\nextract(\
  \ day from retention) retention_days,\nretention\nfrom SYS.DBA_HIST_WR_CONTROL\n\
  where dbid=(select con_dbid from v$database);\n```\n\n结果如图 7-30 所示。`snap_interval`\
  \ 和 `retention` 列是 `INTERVAL` 类型，因此您可以利用 `EXTRACT()` 函数仅打印您感兴趣的部分（天、小时、分钟、秒）。\n\n\
  ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig30_HTML.jpg](img/478313_1_En_7_Fig30_HTML.jpg)\n\
  \n**图 7-30** AWR 的控制信息\n\n要更改默认保留时间或默认统计信息快照收集间隔，您需要使用 `DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS`\
  \ 过程，如下所示：\n\n```\nBEGIN\nDBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(\nretention\
  \ => 20160,\ninterval => 60\n);\nEND;\n```\n\n在此示例中，我们将保留期增加到两周（14 天等于我们用作 `retention`\
  \ 参数输入的 20,160 分钟）。明智地调整此参数，因为保留期增加得越多，AWR 表在 `SYSAUX` 表空间中消耗的存储就越多。\n\n访问 ADB 服务控制台活动视图中的“受监视的\
  \ SQL”选项卡，可为您提供正在执行和过去执行的 SQL 语句列表，如图 7-31 所示。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig31_HTML.jpg](img/478313_1_En_7_Fig31_HTML.jpg)\n\
  \n**图 7-31** ADW SQL 监视\n\n您可以检查每个单独的 SQL 语句，并了解其等待统计信息、I/O 统计信息、执行计划性能以及并行性（如果适用）。为此，在“受监视的\
  \ SQL”选项卡上，右键单击您感兴趣的查询并选择“显示详细信息”选项。将向您显示一个新的弹出区域，如图 7-32 所示。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig32_HTML.jpg](img/478313_1_En_7_Fig32_HTML.jpg)\n\
  \n**图 7-32** SQL 执行详细信息\n\n您已经学习了如何监控数据库实例。现在是时候让我们将注意力转回到之前加载到数据库表中的维度和事实数据了。是时候接触这些数据库表中存储的信息了。让我们执行一些有趣的查询。\n\
  \n\n## 数据分析\n\n收集数据只是故事的一部分。理解我们为何要进行数据收集则更为重要。数据可以揭示不同的信息——有时是预期的，有时是令人惊讶的——这些信息关乎数据所代表的业务情况、对象、测量或事件。最传统、可能也是最普遍和成熟的方法，是有意识地查询数据集，以发现各种相关性、趋势、异常，或者更常见的，可用于报告的聚合结果，例如按业务部门划分的季度销售额。结果通常会进行数据可视化，这有助于阐释一大串数字真正表达的含义。除非我们处理的是标准化和常规报告，否则*数据分析*通常包含大量临时查询，这些查询的特点是未预定义且在特定查询执行前无法确定。为了处理此类查询，会采用专门的反规范化数据库表组合。你已经了解了最简单但往往已足够使用的**星型模式**。\n\
  \n如你所知，星型模式是反规范化数据库表的组合，是构建所谓**OLAP 立方体**的基础。什么是 OLAP 立方体？我们可以说它是一个多维结构，将维度属性层次结构与定量事实结合起来。嗯，这听起来可能有点太复杂了。从实际角度来看，方便的说法是，OLAP\
  \ 立方体是一个更高级别的结构，通常构建在星型模式之上，提供了一种更抽象的方式来查看数据，超越了底层的表格结构。我们不再考虑维度表，而是讨论维度属性层次结构。在本章的上下文中，相应的\
  \ OLAP 立方体如图 7-33 所示。我特意为本章的示例数据选择了三个维度，因为它使得想象相应的 OLAP 立方体作为一个三维坐标系变得非常容易。每个维度都是一条轴线的基础。该坐标系中的每个点都可以看作是一个单一的事实条目，承载着各种定量数据。\n\
  \n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig33_HTML.jpg](img/478313_1_En_7_Fig33_HTML.jpg)\n\
  \n图 7-33\n\nOLAP 立方体\n\nOLAP 立方体不仅限于逻辑概念。数据库或数据处理平台可以包含一个 OLAP 立方体引擎模块，该模块承担了处理与维度层次级别相关的某些计算负担，让你可以专注于更面向业务的查询。OLAP\
  \ 立方体的实现范围很广，从依赖高级 SQL 语言特性的数据库扩展（如 Oracle Analytic Views），到基于中间件的商业智能解决方案（如 Oracle\
  \ Business Intelligence Suite），后者支持专用查询语言（如 MDX）。OLAP 立方体将帮助我们理解一些我们将要针对星型模式执行的基本查询。然而，首先，我们需要物化一个星型模式。\n\
  \n生成星型模式最简单的方法是运行一个 SQL `SELECT`查询，该查询基本上将所有的维度表与事实表连接起来，如下所示：\n\n```sql\nSELECT\
  \ * FROM ROADEVENTS_FACT   F\nJOIN TIME_DIM  T ON T.DAY_ID = F.TIME_DIM_ID\nJOIN\
  \ ROAD_DIM  R ON R.SEGMENT_ID = F.ROAD_DIM_ID\nJOIN EVENT_DIM E ON E.EVENT_ID =\
  \ F.EVENT_DIM_ID\n```\n\n为了简化将来使用更复杂的选择和过滤条件的查询，并避免重复编写整个星型模式 SQL `SELECT`查询，将星型模式查询合并到一个称为*视图*的数据库对象中可能很方便。视图只是保存在数据库中的一组表或其他视图的\
  \ SQL 查询定义。它不物理存储数据，而是提供对物理数据库表的预定义视图。尽管如此，使用视图有时可能意味着需要动态地进行代价高昂的查询结果计算。了解到典型的\
  \ ADW 工作负载通常建立在计划的大批量数据加载之上，在数据加载完成后，我们可以预先计算视图并物理存储数据。为此，我们将使用称为*物化视图*的数据库对象。\n\
  \n如你所记得的，数据库用户`SANDBOX_USER`被授予了预定义的`dwrole`数据库角色。然而，这个角色不允许用户创建物化视图。让我们打开 SQL Developer\
  \ Web，这次使用`ADMIN`用户的链接，并通过执行`GRANT`语句为`SANDBOX_USER`添加一个新权限。\n\n```sql\nGRANT CREATE\
  \ MATERIALIZED VIEW TO SANDBOX_USER;\n```\n\n如果你愿意，可以选择作为`ADMIN`用户运行这些查询来验证`SANDBOX_USER`拥有的角色和权限。\n\
  \n```sql\nSELECT * FROM DBA_ROLE_PRIVS where grantee='SANDBOX_USER';\nSELECT * FROM\
  \ DBA_SYS_PRIVS where grantee='SANDBOX_USER';\n```\n\n我们准备好切换到`SANDBOX_USER`的 SQL\
  \ Developer Web 窗口，并执行`CREATE MATERIALIZED VIEW` SQL DDL 语句。再次记住，要在`SANDBOX_USER`\
  \ SQL Developer Web 窗口中执行此查询。\n\n```sql\nCREATE MATERIALIZED VIEW ROADEVENTS_STAR\
  \ AS\nSELECT * FROM ROADEVENTS_FACT   F\nJOIN TIME_DIM  T ON T.DAY_ID = F.TIME_DIM_ID\n\
  JOIN ROAD_DIM  R ON R.SEGMENT_ID = F.ROAD_DIM_ID\nJOIN EVENT_DIM E ON E.EVENT_ID\
  \ = F.EVENT_DIM_ID\n```\n\n你应该会收到以下消息：\n\n```\nMaterialized view ROADEVENTS_STAR\
  \ created.\n```\n\n为了本章的目的，我们刚刚在整个事实表上创建了物化视图。值得了解的是，与视图相反，物化视图确实消耗物理存储。对于涉及大数据集的生产用例，将整个星型模式查询持久化为物化视图可能是相当不可取的。同样适用于数据加载是增量且高频率的情况，因为物化视图通常必须在底层数据库表更改后立即刷新。在此上下文中，最佳实践建议在应用维度过滤器后构建物化视图，并且仅针对那些报告引擎经常使用的聚合构建。\n\
  \n我们可以像查询普通数据库表一样查询物化视图。让我们发布一个 SQL `SELECT`语句，该语句对所有道路事件发生次数以及受伤和死亡人数进行求和，并按日历年和道路事件类别对结果进行分组。日历年和道路事件类别都是其维度中的最高级别。查询如下所示：\n\
  \n```sql\nSELECT\n    year_name, class_name,\n    SUM(occurrence) total_occurrence,\n\
  \    SUM(injured) sum_injured,\n    SUM(killed) sum_killed\nFROM ROADEVENTS_STAR\n\
  GROUP BY year_name, class_name\nORDER BY year_name, class_name;\n```\n\n结果如图 7-34\
  \ 所示。我们可以立即得出一些初步结论。例如，我们可以看到，与 2016 年相比，2017 年的事故和事故受害者数量有所下降。与此同时，报告的交通事故数量略有增加。这可能导致我们提出这样的假设：增加的警察活动可能导致发现更多事件，改善道路安全，并导致\
  \ 2017 年事故数量减少。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig34_HTML.jpg](img/478313_1_En_7_Fig34_HTML.jpg)\n\
  \n图 7-34\n\n对星型模式的聚合查询\n\n\n## OLAP 立方体操作\n\n查询结果包含四行，可以在相应的 OLAP 立方体上展示，如图 7-35\
  \ 所示。该查询实际上将原始立方体划分为四个子立方体，划分依据是时间和事件两个维度的最高维度层次级别。如果我们知道自己只对分析 2017 年发生的交通事件感兴趣，我们就会专注于这个特定的子立方体。这种操作被称为\
  \ `切块`。切块操作通过对少数维度应用值范围过滤器来创建一个子立方体。\n\n![查询的 OLAP 立方体透视图](img/478313_1_En_7_Fig35_HTML.jpg)\n\
  \n**图 7-35** 查询的 OLAP 立方体透视图\n\n### 切片与切块\n\n切块只是你在商业智能（BI）领域会遇到的几种 OLAP 立方体操作之一。最常见的\
  \ BI 操作类型包括：\n\n*   切片与切块\n*   向下钻取与向上卷叠\n*   透视\n\n切块操作在一个或多个维度上使用范围过滤器来创建子立方体，而\
  \ `切片` 操作则减少分析的维度数量。你通常为特定维度选择一个固定值，并将其用作数据集的过滤器。切片和切块操作的概念如图 7-36 所示。\n\n![OLAP\
  \ 立方体切片与切块](img/478313_1_En_7_Fig36_HTML.jpg)\n\n**图 7-36** OLAP 立方体切片与切块\n\n让我们通过消除时间维度来对立方体进行切片。例如，我们可能希望显示特定日期的汇总总计，比如\
  \ 2017 年 8 月 12 日。为此，执行第二个 `select` 查询。\n\n```sql\nSELECT\n    SUM(occurrence) total_occurrence,\n\
  \    SUM(injured) sum_injured,\n    SUM(killed) sum_killed\nFROM ROADEVENTS_STAR\n\
  WHERE day_date=TO_DATE('20170812','YYYYMMDD');\n```\n\n结果如图 7-37 所示。事故和事件总共发生了 2,777\
  \ 起。事故导致 175 人受伤，9 人死亡。\n\n![切片操作](img/478313_1_En_7_Fig37_HTML.jpg)\n\n**图 7-37**\
  \ 切片操作\n\n### 向下钻取与向上卷叠\n\n对星型模式物化视图执行的第三个 `select` 查询是 `向下钻取` 操作的一个例子。我们仍然使用之前的立方体切片。我们向其添加了\
  \ `GROUP BY` 子句，这有效地呈现了更细粒度的聚合拆分。排序与事件维度层次结构一致。事件类别（`class_name` 列）拆分为事件分类（`category_name`\
  \ 列），随后再拆分为事件类型（`event_name` 列）。目的是使结果更清晰、更容易理解。现在，执行第三个查询。\n\n```sql\nSELECT class_name,\
  \ category_name, event_name,\n    SUM(occurrence) total_occurrence,\n    SUM(injured)\
  \ sum_injured,\n    SUM(killed) sum_killed\nFROM ROADEVENTS_STAR\nWHERE day_date=TO_DATE('20170812','YYYYMMDD')\n\
  GROUP BY class_name, category_name, event_name\nORDER BY class_name, category_name,\
  \ event_name;\n```\n\n图 7-38 展示了你刚刚执行的查询所产生的更详细的拆分结果。虽然我们展示了每个事实度量的总计，但没有任何阻碍你进行额外的即席计算，例如计算每个事件类型的平均值或伤亡比率。记住，我们是在立方体的一个切片上进行操作，结果仅针对一天给出。\n\
  \n![向下钻取操作](img/478313_1_En_7_Fig38_HTML.jpg)\n\n**图 7-38** 向下钻取操作\n\n### 切块操作\n\
  \n第四个 SQL 语句是 `切块` 操作的一个例子。我们对每个维度应用过滤器以创建一个子立方体。时间维度限制为 2017 年 8 月，事件维度限制为“交通规则”分类，道路维度仅限于位于三个列出的省份的道路路段。执行以下\
  \ `select` 查询：\n\n```sql\nSELECT event_name, segment_voivodeship,\n    SUM(occurrence)\
  \ occurrence_in_201708\nFROM ROADEVENTS_STAR\nWHERE\n    month_of_year=8 and year_name=\"\
  CY2017\" and\n    category_name='traffic rules' and\n    segment_voivodeship\n \
  \   in ('Masovian','Subcarpathian','Lesser Poland')\nGROUP BY event_name, segment_voivodeship\n\
  ORDER BY event_name, segment_voivodeship;\n```\n\n图 7-39 展示了各种交通规则道路事件的总和，并根据其地点进行了额外拆分。例如，我们可以看到，2017\
  \ 年 8 月在马佐夫舍省的道路上报告了 2,835 起超速交通事件。\n\n![切块操作](img/478313_1_En_7_Fig39_HTML.jpg)\n\
  \n**图 7-39** 切块操作\n\n### 透视操作\n\n我们正在做的是创建即席查询，以探索和检测此特定数据集的各种特征。在即席查询的情况下，只要我们能阅读和理解结果，格式就不那么重要。当我们需要为报告准备结果时，情况将发生巨大变化。图\
  \ 7-39 中展示的聚合基于一个二维的切块。时间维度不再被考虑。有了两个维度，我们可以想象一份报告，其二维结构依赖于每个剩余维度。x 轴可以基于道路维度，而\
  \ y 轴基于事件维度。查看上一个查询的结果，剩下的就是应用 `透视` 操作。透视操作基本上是将行旋转成列，如果需要，会应用额外的聚合。存储在特定列的行字段中的值可以成为一组新的列。Oracle\
  \ 数据库提供了一个专门的 `PIVOT` 子句来执行透视操作。这是要执行的第五个查询：\n\n```sql\nSELECT\n    *\nFROM\n  \
  \  (\n        SELECT\n            event_name,\n            segment_voivodeship,\n\
  \            SUM(occurrence) occurrence_in_201708\n        FROM\n            ROADEVENTS_STAR\n\
  \        WHERE\n            month_of_year = 8 AND year_name = 'CY2017'\n       \
  \     AND category_name = 'traffic rules'\n            AND segment_voivodeship\n\
  \            IN ( 'Masovian', 'Subcarpathian', 'Lesser Poland' )\n        GROUP\
  \ BY event_name, segment_voivodeship\n        ORDER BY event_name, segment_voivodeship\n\
  \    ) PIVOT (\n        SUM ( occurrence_in_201708 )\n        FOR ( segment_voivodeship\
  \ )\n        IN (\n            'Masovian' as masovian,\n            'Subcarpathian'\
  \ as subcarpathian,\n            'Lesser Poland' as lesser_poland\n        )\n \
  \   )\n```\n\n图 7-40 展示了应用于子立方体的透视操作后可供报告使用的结果。之前作为行字段展示的 `segment_voivodeship`\
  \ 列中的值变成了新的列。之前的 `occurrence_in_201708` 列被移除，其值根据新的布局进行了相应分配。在这种情况下，由于分组级别粒度良好，没有发生额外的聚合。\n\
  \n![透视操作](img/478313_1_En_7_Fig40_HTML.jpg)\n\n**图 7-40** 透视操作\n\n所展示的操作只是冰山一角。Oracle\
  \ Autonomous Database 支持许多专门的子句，允许你正确地构建、分发、聚合和排名结果，但这超出了本书的范围。Oracle Database 的分析视图可用于执行更高级的维度查询，并能感知层次结构，同时包含对底层事实表中可用聚合的嵌入式计算。\n\
  \n\n每个自治数据仓库实例都配备了一项名为 `Oracle Machine Learning`（OML）的功能，这是一个基于开源 Apache Zeppelin\
  \ 项目的、基于 Web 的、交互式、面向笔记本的数据可视化与数据分析工具。对于简单的可视化用例，您可以轻松使用 SQL 发布查询，并通过几次点击操作来准备各种图表。例如，图\
  \ 7-41 展示了如何显示一个折线图，该图按交通事故类别分组，说明了 2017 年波兰车祸受害者的总数。提醒一下，您看到的数据纯属虚构，是笔者为了本书的唯一目的而生成的。\n\
  \n![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig41_HTML.jpg`](img/478313_1_En_7_Fig41_HTML.jpg)\n\
  \n**图 7-41** 基于 Oracle Machine Learning Zeppelin 的可视化\n\n笔记本可以按照类似于多段落报告的方式进行排列，如图\
  \ 7-42 所示，该图结合了饼图和相应的数据表。两种视图都展示了按省份划分的 2017 年每日平均受伤人数。\n\n![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig42_HTML.jpg`](img/478313_1_En_7_Fig42_HTML.jpg)\n\
  \n**图 7-42** 基于 OML 的报告\n\n您可以从自治数据仓库服务控制台的“管理”页面访问 OML 管理页面。在这里，您能够允许现有的数据库用户使用\
  \ OML 笔记本。要了解更多信息，请参阅相关文档。\n\n自治数据仓库实例可以轻松注册为 Oracle Analytics Cloud 的数据源，后者提供了更丰富的可用图表集。图\
  \ 7-43 展示了 2017 年在 GP 类型道路上受伤人数的雷达面积图。每个不同的角度对应一个特定的省份。某个省份 GP 道路上的受伤人数越少，该特定角度上的蓝色区域就越小。使用\
  \ Analytics Cloud，您可以构建很多东西，执行交互式分析并动态调整图表，以便在您特定的报告场景中得出理想的仪表板。\n\n![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig43_HTML.jpg`](img/478313_1_En_7_Fig43_HTML.jpg)\n\
  \n**图 7-43** Oracle Analytics Cloud\n\n讨论商业智能操作、数据挖掘算法以及由基于 Zeppelin 的 ADB 扩展和 Oracle\
  \ Analytics Cloud 支持的不同可视化技术等内容，超出了本书的范围。互联网上有大量可用的资料，欢迎自行探索。\n\n## 清理\n\n我们现在可以终止数据库实例，因为在此之后我们将不再需要它。要关闭并终止\
  \ ADW 实例，您可以执行以下命令：\n\n```\n$ ADW_OCID=`oci db autonomous-database list --query\
  \ \"data[?\\\"display-name\\\"=='road-adw'] | [0].id\" --raw-output`\n$ echo $ADW_OCID\n\
  ocid1.autonomousdatabase.oc1.eu-frankfurt-1.ab......763psq\n$ oci db autonomous-database\
  \ delete --autonomous-database-id \"$ADW_OCID\" --wait-for-state TERMINATED\nAre\
  \ you sure you want to delete this resource? [y/N]: y\nAction completed. Waiting\
  \ until the resource has entered state: TERMINATED\n```\n\n同样，使用 OCI CLI 删除所有对象并删除我们最初用于数据库数据加载的原始输入数据的对象存储存储桶。\n\
  \n```\n$ oci os object bulk-delete -bn roadadw-load\nWARNING: This command will\
  \ delete 7 objects. Are you sure you want to continue? [y/N]: y\n$ oci os bucket\
  \ delete -bn roadadw-load\nAre you sure you want to delete this resource? [y/N]:\
  \ y\n```\n\n## 总结\n\n本章是对 RDBMS 支持的数据仓库和面向维度的数据分析的简要而快速的介绍。在完全托管的云端自治数据库时代，我们能够快速启动数据仓库实例，并在进行一些基本设置后，直接转向构建面向数据的解决方案。这正是托管云平台的意义所在：通过将这些维护任务委托给云平台，专注于以最小的管理精力解决问题。在后续章节中，您学习了如何配置自治数据库实例、以\
  \ `ADMIN` 身份访问 SQL Developer Web、创建常规数据库用户、将数据从对象存储加载到数据库表，以及理解星型模式及其在商业智能操作中的作用。接着，您熟悉了数据库监控。最后，您以多种方式查询了数据，并了解了\
  \ Oracle Cloud 中可用的数据可视化选项。\n\n# 8. Oracle Container Engine for Kubernetes\n\n在本章中，我们将处理\
  \ `应用程序容器`，它已经彻底改变了当代的软件世界。容器影响了我们构建、交付和运行应用程序的方式，从而在很大程度上改变了软件开发的流程。它们促成了一种新的架构风格，这种风格围绕着由大量高度专业化、自治且通常规模较小的应用程序（称为\
  \ `微服务`）组成的系统。毫不夸张地说，在应用程序容器之上，已经出现了一个新的标准、平台、组件、工具、库、协议和服务的 `生态系统`。这个生态系统范围极其广阔，由庞大的开源社区推动，并得到丰富的企业赞助。\n\
  \n本章第一节简要解释了什么是容器，并指导您完成与将应用程序容器化以及将容器镜像存储到 Oracle Container Image Registry（OCIR）相关的最重要任务。第二节讨论了容器编排的需求，并向您介绍了\
  \ Oracle Kubernetes Engine（OKE），这是 Oracle Cloud Infrastructure 上提供的托管 Kubernetes\
  \ 服务。\n\n\n## 容器\n\n容器是一种可移植、可交付的软件单元，它被打包了所有的依赖项。让我们通过更仔细地审视容器的三个核心特性来探讨这个定义。\n\
  \n-   **自包含**\n-   **隔离的**\n-   **可交付的**\n\n每个容器在原则上都是**自包含**的。封装在容器内的服务或应用程序会配备其所有依赖项，例如软件二进制文件、配置文件、库、环境变量，以及——无论乍听起来多么奇怪——整个操作系统。尽管在同一个裸机或虚拟机上可能运行着数百个容器，但每个容器都为其封装的应用程序提供了一个完全隔离且独占环境的印象。换句话说，任何给定容器内的应用程序都认为自己运行在一个专用的机器上，无论同一台主机上还共存着多少其他容器。只要所有主机都支持相同的容器运行时，容器就被认为可以轻松地在可能使用不同主机操作系统的不同主机机器之间**交付**。图\
  \ 8-1 从概念上说明了这三个特性。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig1_HTML.jpg](img/478313_1_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1：容器核心特性**\n\n如果你从未听说过容器，并且是这个话题的新手，你可能会好奇从技术角度来看这一切是如何实现的。此外，容器与虚拟机究竟有何不同？当代容器运行时起源于\
  \ Linux 生态系统，并利用 Linux 内核特性（如命名空间、控制组或 `chroot` 命令）来实现文件系统、进程、网络和资源隔离。无论你最终选择哪种容器引擎，无论是\
  \ `Docker`、`rkt` 还是 `cri-o`，你都可以确信它们都使用了上述相同的 Linux 内核特性。\n\n在这种背景下，情况变得清晰起来：所有运行在同一主机上的容器，尽管是完全隔离的，但都使用该主机的\
  \ Linux 内核。在可重用性方面，还有一个影响更大的概念，即**层**。容器使用层层堆叠的文件系统层。“底层”的基础层提供了整个操作系统。这听起来可能很庞大，但在容器的世界里，你经常会遇到非常轻量级的\
  \ Linux 发行版，例如 CoreOS Container Linux 或 Alpine Linux。在此之上，额外的层通常会带来应用程序运行时，例如 Java\
  \ 虚拟机、Python 或 Node.js。更上面的层可以包含所需的库，如 Python Flask。最后，最顶层包含应用程序二进制文件，通常还附带注入的配置文件。所有这些层都是**只读的**，这允许多个容器共享它们。每个容器都带有一个专用的**可写层**，用于保存容器内应用程序或其他组件在其生命周期内所做的所有更改。\n\
  \n只读层在逻辑上被分组为**容器镜像**，这些镜像可以在多台机器之间共享。每个镜像都是一个自包含的实体，可以作为多个运行中容器的基础。你可以基于同一个镜像拥有数百个容器，其实际占用的存储空间仅相当于运行单个容器。\n\
  \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig2_HTML.jpg](img/478313_1_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2：容器层**\n\n图 8-2 说明了各个镜像和容器之间的关系。有三个名为 `uuid-1`、`uuid-2` 和 `uuid-3` 的容器，它们都使用相同的\
  \ `uuid:1.0` 镜像构建。`uuid:1.0` 镜像是一个自定义构建的镜像，主要包含一些应用程序代码和配置文件。该镜像是在一个已下载的 `python:3-alpine`\
  \ 镜像之上构建的，而 `python:3-alpine` 镜像又在一个名为 `alpine:3.10` 的基础操作系统镜像之上安装了 Python 3。这三个容器内的应用程序都认为自己运行在独立的主机上。然而，它们都共享主机的\
  \ Linux 内核和只读层。社区中一直有声音指出，并非所有 Python 应用程序都能在 Alpine Linux 上运行，因为缺少一些特定于发行版的依赖项。为了解决这些问题，你可以考虑使用不依赖\
  \ `python:3-alpine`，而是基于 Debian 的 `python:3-stretch` 镜像的容器来运行要求更高的 Python 应用程序。\n\
  \n内核级隔离与内核及各种文件系统层的重用相结合，使得容器与虚拟机相比，在使用上显著**更轻量**。同样，将一个容器**交付**到另一台机器上也比迁移整个虚拟机容易得多。\n\
  \n但是，**交付**一个容器在物理上意味着什么？你已经了解到，任何特定的容器都需要一个由只读文件系统层组成的镜像。对于无状态应用程序而言，交付容器无非就是停止一个现有容器，然后在另一台机器上基于同一个镜像并使用相同的运行时配置启动另一个容器。显而易见，镜像必须以某种方式在镜像注册表中提供，并且所有带有容器运行时的主机机器都能访问该注册表。然后，容器平台会从镜像注册表中**拉取**一个镜像，这实际上意味着下载所有必需的文件系统层和相应的元数据，如图\
  \ 8-3 所示。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig3_HTML.jpg](img/478313_1_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3：从镜像注册表拉取镜像**\n\n应用程序在其生命周期中总是在不断演进。为了跟踪这一演进过程，应用程序的发布会被**版本化**。这同样适用于容器镜像。如果你仔细观察前面的图，会看到诸如\
  \ `1.0`、`3-alpine` 或 `3:10` 这样的版本后缀。我们称之为**标签**。容器镜像打标签主要是为了表示特定镜像的不同变体或发布顺序。例如，假设你发布了一个封装了\
  \ UUID 服务更新二进制文件的新次要版本镜像。如果之前的镜像版本标记为 `uuid:1.0`，那么更新后的镜像版本可以标记为 `uuid:1.1`。如果一个基于\
  \ Python 的应用程序碰巧不够快，你还可以额外实现一个基于 Golang 的替代方案，并将其发布为 `uuid:1.0-golang` 变体。\n\n##\
  \ 容器化应用开发流程概述\n\n在了解了所有基本组件之后，我们现在可以勾勒出容器化应用的开发流程了。根据具体情况，您可能需要对现有应用进行容器化，或者在开发新应用之初就将容器化作为自动化流程的一部分纳入其中。要\
  \ `容器化一个应用`，您需要仔细识别所有依赖项，并对整个执行环境做出选择，包括应用自认为运行于其上的操作系统。基于这些决策，您选择一个现有的基础镜像，如果不存在合适的，就开始自己构建一个。这将作为您应用特定镜像的基础镜像。一旦基础镜像准备就绪，您就可以开始在选定的基础镜像之上构建应用特定镜像了。这通常通过添加应用二进制文件（可选地附带一些静态的、应用特定的配置文件）并为应用使用的任何环境变量设置默认值来实现。这些环境变量的值随后可以为每个单独的容器进行覆盖。对于容器化应用，另一种更复杂的方式是从解耦的外部配置源获取其运行时配置制品。应用特定的镜像是自包含的，它可以被上传到镜像注册表。我们称此活动为\
  \ `推送` 镜像。然后，可以从注册表拉取镜像以运行容器，并在构成特定时刻测试环境的机器上针对这些容器执行自动化测试。测试流水线完成后，容器将被销毁。此外，如果测试机器是基于云的，在测试完成后可以终止它们以消除空闲时间。之后，成功验证的容器镜像会被正确标记并推送到另一个镜像注册表，这次是用于生产环境分发。有些人将其称为\
  \ `镜像晋级`。在最后一步中，使用最新的镜像在生产机器上替换或启动新容器。整个过程如图 8-4 所示。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig4_HTML.jpg](img/478313_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n开发容器化应用\n\n整个开发过程通常是完全自动化的。开发人员将代码签入 Git 等版本控制系统，这会触发测试镜像的构建、部署和测试。如果镜像验证成功，它会自动打标签并推送到分发镜像注册表。另一套自动化规则可以用基于最新镜像的新容器替换生产环境中的旧容器。\n\
  \n本节为您提供了一些关于容器领域的基础知识。我们现在已准备好将这些概念付诸实践。为此，我们将对第 2 章介绍的 UUID 服务进行容器化。\n\n### 容器化应用\n\
  \n市场上有几种容器运行时。仅举几个例子，我们可以列出 `containerd`、`rkt` 或 `cri-o`。事实上，这是一个非常动态的领域，几乎每个月都在迅速变化。幸运的是，社区已经进行了一些联合标准化努力，旨在为这种创意的混沌带来一些结构，并在各种运行时之间重用一些通用组件。最流行的容器运行时之一是\
  \ `containerd`。它从先前单体的 Docker Engine 中提取出来，并作为一个由云原生计算基金会管理的开源项目捐赠给了社区。Docker 本身实际上是\
  \ Linux 容器使用的先驱，最初使用一组现有的 Linux 容器工具，后来切换到定制的内置平台。Docker 可能是目前最流行的容器引擎技术，也是用于容器化应用工具的领先提供商。在本节中，我们将使用\
  \ Docker 工具对之前作为第 2 章练习一部分处理的现有 UUID 服务应用进行容器化。当时，我们在 Oracle Cloud Infrastructure\
  \ 中运行的两个计算实例上将其作为 Linux systemd 服务运行。那时，我们在每个计算实例上只托管一个应用实例。现在，我们将构建一个可以被任意数量容器运行的容器镜像，从而在单台机器上提供多个\
  \ UUID API 实例，如图 8-5 所示。每个应用仍然会认为它是在专用主机上单独运行的，尽管实际上，它与基于相同镜像并在同一台机器上运行的所有其他容器共享底层镜像层和\
  \ Linux 内核。通过对应用进行容器化，您将解锁通过添加更多容器和具有容器运行时的主机来水平扩展整个 UUID API 的可能性。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig5_HTML.jpg](img/478313_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n\n容器化应用的可扩展性\n\n注意\n\n本书中的代码片段已在 macOS 和 Windows Subsystem for Linux 上测试。此外，所有命令应在主流\
  \ Linux 发行版上工作。如果您使用 Windows 且不想使用 Windows Subsystem for Linux，您始终可以在虚拟机上运行 Linux。另外，大多数代码片段也可能在\
  \ Windows 的 Git Bash 中工作。\n\n要构建镜像，您将需要一台安装了 Docker 工具的开发者机器。在本章的过程中，我们将配置并使用一个安装了所有必需工具的临时开发计算实例。我建议您遵循这些步骤，因为这将使使用代码片段更容易，并避免平台特定的差异。\n\
  \n\n## 云端开发实例\n\n让我们基于最新的 CentOS 7 平台镜像配置一个计算实例。我已经准备好了基础架构代码。你可以在 `the chapter08/1-devmachine`\
  \ 目录中找到它。代码结构符合我们在前面所有章节中讨论过的内容。其中有一个名为 `devmachine` 的模块，实例及其对应的子网级云网络资源就在这个模块中定义。而\
  \ VCN（虚拟云网络）传统上是在模块外部、顶层 `vcn.tf` 文件中定义的。\n\n```\n$ cd ~/git\n$ cd oci-book/chapter08/1-devmachine\n\
  $ find . \\( -name \"*.tf\" -o -name \"*.yaml\" \\) | sort\n./devmachine/cloud-init/devvm.config.yaml\n\
  ./devmachine/compute.tf\n./devmachine/vars.tf\n./devmachine/vcn.tf\n./modules.tf\n\
  ./provider.tf\n./vars.tf\n./vcn.tf\n```\n\n### 通过 Cloud-Config 进行初始设置\n\n为了执行初始实例设置并为你提供所有必需的开发工具，我们使用\
  \ cloud-config 文件，如列表 8-1 所示。\n\n```yaml\n#cloud-config\nyum_repos:\ndocker-ce-stable:\n\
  name: Docker CE Stable - $basearch\nbaseurl: https://download.docker.com/linux/centos/7/$basearch/stable\n\
  enabled: true\n...\nkubernetes:\nname: Kubernetes\nbaseurl: https://packages.cloud.google.com/yum/repos/kubernetes-el7-x86_64\n\
  enabled: true\n...\npackages:\n- git\n- docker-ce\n- docker-ce-cli\n- containerd.io\n\
  - kubectl\nruncmd:\n- [ systemctl, enable, docker ]\n- [ systemctl, start, docker\
  \ ]\n- [ usermod, -aG, docker, opc ]\n- [ mkdir, \"/home/opc/.kube\" ]\n- [ chown,\
  \ \"opc:opc\", \"/home/opc/.kube\" ]\n- [ firewall-offline-cmd, \"--add-port=5010-5019/tcp\"\
  \ ]\n- [ systemctl, restart, firewalld ]\nfinal_message: \"DEV machine is running,\
  \ after $UPTIME seconds\"\n```\n\n*列表 8-1：`1-devmachine/cloud-init/devvm.config.yaml`*\n\
  \n基于这个 cloud-config 文件，cloud-init 将添加两个外部 Yum 仓库，并安装 Git 客户端、Docker 社区版（CE）工具包以及\
  \ Kubernetes 的 `kubectl` 命令行管理工具。你将在本章的第二部分了解 `kubectl` 和 Kubernetes。\n\n### 使用\
  \ Terraform 配置实例\n\n是时候配置开发实例了。在你已安装并配置了 Terraform 的本地机器上，请确保你已经导出了相关环境变量，这些变量以\
  \ `TF_VAR_` 开头，是你 OCI Provider 所需的。如果它们尚未设置，你可能需要运行以下命令：\n\n```\n$ source ~/tfvars.env.sh\n\
  ```\n\n现在，执行以下命令：\n\n```\n$ terraform init\nInitializing modules...\n- devmachine\
  \ in devmachine\nInitializing the backend...\nInitializing provider plugins...\n\
  - Checking for available provider plugins...\n- Downloading plugin for provider\
  \ \"oci\" (terraform-providers/oci) 3.30.0...\n* provider.oci: version = \"~> 3.30\"\
  \nTerraform has been successfully initialized!\n$ terraform apply\ndata.oci_identity_availability_domains.ads:\
  \ Refreshing state...\ndata.oci_core_images.centos_image: Refreshing state...\n\
  Terraform will perform the following actions:\n"
- '# oci_core_internet_gateway.igw will be created

  '
- '# oci_core_virtual_network.vcn will be created

  '
- '# module.devmachine.oci_core_instance.dev_vm will be created

  '
- '# module.devmachine.oci_core_route_table.dev_rt will be created

  '
- '# module.devmachine.oci_core_security_list.dev_sl will be created

  '
- "# module.devmachine.oci_core_subnet.dev_net will be created\nPlan: 6 to add, 0\
  \ to change, 0 to destroy.\nDo you want to perform these actions?\nTerraform will\
  \ perform the actions described earlier.\nOnly 'yes' will be accepted to approve\
  \ .\nEnter a value: yes\n...\nApply complete! Resources: 6 added, 0 changed, 0 destroyed.\n\
  Outputs:\ndev_machine_image_name = CentOS-7-2019.06.19-0\ndev_machine_public_ip\
  \ = 130.61.84.182\n$ DEV_VM_PUBLIC_IP=`terraform output dev_machine_public_ip`\n\
  ```\n\n在我的案例中，该实例已在法兰克福区域的第三个可用性域的第三个故障域中配置完成，如图 8-6 所示。\n\n![在 OCI 控制台中查看开发者虚拟机](img/478313_1_En_8_Fig6_HTML.jpg)\n\
  \n*图 8-6：在 OCI 控制台中查看开发者虚拟机*\n\n## 连接与验证\n\n开发者实例报告为“运行中”后，请等待几秒钟，让 `sshd` 守护进程启动并连接到该机器。接下来，和往常一样，你可能需要等待一两分钟，直到\
  \ cloud-init 完成 cloud-config 文件中定义的所有任务。你可以时不时检查 `cloud-init.log` 来确认 cloud-init\
  \ 是否已完成。\n\n```\n$ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP\n[opc@dev-vm]$\
  \ sudo cat /var/log/cloud-init.log | grep \"DEV machine is running\"\n2019-06-22\
  \ 12:46:49,899 - util.py[DEBUG]: DEV machine is running, after 116.90 seconds\n\
  [opc@dev-vm]$ exit\n```\n\n从现在开始，在后续任何代码片段中看到 `[opc@dev-vm]$` 命令提示符时，都将假定你已登录到开发者实例上。\n\
  \n**注意**\nOracle Cloud Infrastructure 市场提供了一个更全面的预构建 Oracle Cloud Developer 镜像，其中开箱即装有许多其他工具。然而，在本章中，我们使用的是一个更轻量级、定制化的开发者实例，该实例是你使用提供的基础架构代码启动的。\n\
  \n为了能够以普通用户身份运行 Docker，cloud-init 已将 `opc` 用户添加到了 `docker` 组。重新连接到开发者机器以使组分配生效。\n\
  \n```\n$ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP\n```\n\n我们将在下一节中继续进行相关工作。\n\
  \n\n\n## Docker 运行时\n\n让我们简单探索一下开发者实例上安装的 Docker 工具。在本章开头，你已经了解了容器和容器镜像。要列出给定机器上的镜像，请执行\
  \ `docker images` 命令。要列出正在运行的容器，请执行 `docker ps` 命令，如下所示：\n\n```\n[opc@dev-vm]$ docker\
  \ images\nREPOSITORY    TAG    IMAGE ID    CREATED    SIZE\n[opc@dev-vm]$ docker\
  \ ps\nCONTAINER ID   IMAGE   COMMAND   CREATED   STATUS   PORTS   NAMES\n```\n\n\
  很好。目前，这台机器上既没有镜像也没有容器。那么，要不要再学习一些关于 Docker 引擎和底层容器运行时的知识？请执行 `docker info` 命令。\n\
  \n```\n[opc@dev-vm]$ docker info\n...\nServer Version: 18.09.6\nStorage Driver:\
  \ overlay2\nBacking Filesystem: xfs\nSupports d_type: true\nNative Overlay Diff:\
  \ true\n...\nRuntimes: runc\nDefault Runtime: runc\n...\nKernel Version: 3.10.0-957.21.3.el7.x86_64\n\
  ...\nDocker Root Dir: /var/lib/docker\n...\n```\n\n之前，我简要提到过所有容器都使用其宿主机的内核。这就是为什么内核对于\
  \ Docker 引擎仍然很重要，你可以在 `docker info` 命令的输出中找到其精确版本，列为 `Kernel Version` 条目。在各种信息条目中，你还会看到\
  \ `Runtimes` 条目。Docker 使用名为 `containerd` 的容器运行时。然而，在这里，我们在 `Runtimes` 条目中看到的是名为\
  \ `runc` 的东西。这并没有错。`runc` 是一个负责根据标准化的开放容器倡议 (OCI) 规范运行容器的组件。`containerd` 容器运行时在底层使用了\
  \ `runc`，并在其周围添加了更多功能。另一个有趣的条目涉及 Docker 处理文件系统层的方式，这些层组合起来构成容器化应用程序所看到的文件系统。在只读层的顶部，有一个可写的容器层。如果应用程序对文件系统进行了任何更改，这些更改将仅反映在可写层中。`存储驱动程序`\
  \ 的任务就是管理这些层，同时考虑支撑宿主机上 `Docker 根目录` 的底层物理文件系统的特性。有几种可用的存储驱动程序，各有优缺点。我们使用的是目前首选的名为\
  \ `overlay2` 的存储驱动程序，由 xfs 文件系统支持。文件系统层层次结构位于 `/var/lib/docker/overlay2` 子目录中。当容器运行时，你应该能够使用\
  \ `mount` 命令找到层是如何相互堆叠的。如果乍看起来有点复杂，也不必担心。我们不会去处理这些设置。我只是想让你对本章开头关于层的概念性讨论，获得一些实际的概览。\n\
  \n## Docker 镜像\n\n我们的目标是构建一个封装了 UUID 服务应用程序的镜像，包括应用程序依赖项（Python 3 和 Flask 微框架）以及所需环境变量（例如，`FLASK_APP`）的默认值。首先，我们必须为我们即将构建的应用程序特定镜像选择合适的\
  \ `基础镜像`。幸运的是，Docker Hub（这可能是最大的容器镜像库）上有 Python 的官方基础镜像。社区驱动的开源项目和独立软件供应商都将其准备分发的镜像发布到\
  \ Docker Hub。你可以在 [`https://hub.docker.com/_/python`](https://hub.docker.com/_/python)\
  \ 找到大量捆绑了不同 Python 版本的镜像，适用于各种平台，如图 8-7 所示。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig7_HTML.jpg](img/478313_1_En_8_Fig7_HTML.jpg)\n\
  \n### 图 8-7\n\nDocker Hub 上的官方 Python 镜像\n\n出于演示目的，我们将选择 Alpine Linux 上的 Python\
  \ 3，即 `python:3-alpine` 标签下的可用变体。我们的 Docker 引擎（运行在 Oracle Cloud Infrastructure 法兰克福区域的一个实例上）实际上如何知道如何获取这个镜像呢？如果你再次运行\
  \ `docker info` 命令，你应该会在输出底部看到 `Registry` 条目。\n\n```\n[opc@dev-vm]$ docker info\n\
  ...\nRegistry: https://index.docker.io/v1\n...\n```\n\nDocker CE 默认附带预配置的指向 Docker\
  \ Hub 容器镜像注册表的链接。根据计算实例所连接的 VCN 子网使用的安全规则，该实例确实具有通往互联网的出站连接，这实际上允许实例从 Docker Hub\
  \ 下载容器镜像。\n\n到目前为止一切顺利。我们知道基础镜像的名称了。现在，是时候创建自定义镜像了，该镜像添加了 Flask 微框架，设置了一些默认环境变量，并指示容器运行时执行\
  \ `app.py` 文件（即 UUID API 的实现）。为了指示 Docker 如何构建新镜像，你需要使用一个 `Dockerfile`，它基本上由用于构建给定镜像的一系列命令组成。\n\
  \n首先，我们将再次克隆包含本书代码的 Git 仓库，这次是在开发者实例上。\n\n```\n[opc@dev-vm]$ git clone https://github.com/mtjakobczyk/oci-book.git\n\
  [opc@dev-vm]$ cd oci-book/chapter08/2-docker/\n[opc@dev-vm]$ cd uuid-service/\n\
  [opc@dev-vm]$ ls -1\napp.py\nDockerfile\nrequirements.txt\n```\n\n`chapter08/2-docker/uuid-service`\
  \ 目录包含三个文件。\n\n*   `app.py`\n*   `Dockerfile`\n*   `requirements.txt`\n\n`app.py`\
  \ 文件与我们在第 2 章使用的文件相同。这基本上是 UUID API 的实现。根据 Python 惯例，`requirements.txt` 文件保存了我们应用程序所需的\
  \ Python 包列表，这些包将使用 `pip` 工具安装。正如我刚才提到的，`Dockerfile` 用于构建镜像。清单 8-2 显示了我们镜像的 `Dockerfile`。\n\
  \n```\nFROM python:3-alpine\nENV FLASK_APP /usr/src/app/app.py\nENV FLASK_ENV development\n\
  ENV FLASK_DEBUG 0\nEXPOSE 5000\nWORKDIR /usr/src/app\nCOPY requirements.txt ./\n\
  RUN pip install --no-cache-dir -r requirements.txt\nCOPY . .\nCMD [ \"flask\", \"\
  run\", \"--host=0.0.0.0\" ]\n```\n\n清单 8-2\n`Dockerfile`\n\n\n\nDockerfile 包含一系列按声明顺序执行的指令。第一条指令始终是`FROM`指令，它定义了我们要为新构建的镜像使用的基础镜像。如前所述，我们将利用\
  \ Docker Hub 镜像注册表中一个名为`python:3-alpine`的官方 Python 镜像。接下来的三条`ENV`指令设置了 Flask 微框架开发\
  \ Web 服务器使用的三个环境变量。`FLASK_APP`指向 API 实现文件的路径，而`FLASK_ENV`和`FLASK_DEBUG`则用于调整服务器的输出。`EXPOSE`指令声明了端口\
  \ 5000，这是 Flask 服务器监听传入请求的默认端口。该指令的作用主要是信息性的，因为端口暴露设置仅在运行容器时生效。`WORKDIR`指令为后续的`COPY`、`RUN`和`CMD`指令在虚拟容器文件系统内设置了工作目录。`COPY`指令的第一次出现创建了一个镜像文件系统层，其中包含了从开发者机器复制的`requirements.txt`文件。`RUN`命令执行`pip\
  \ install`命令，该命令实际安装了 Flask 微框架。安装结果被持久化为另一个文件系统层。`COPY`命令的第二次出现将`app.py`脚本作为又一个文件系统层添加到容器镜像中。总而言之，每条指令都会生成一个文件系统层。其中一些是临时层，而另一些则被包含在最终的容器镜像中。与之前的`RUN`指令相反，最后一条指令，即`CMD`指令，并不会被执行，因此不会基于给定命令的结果产生任何额外的镜像层。`CMD`指令的作用是告知\
  \ Docker 引擎，对于使用此镜像启动的每个新创建的容器，应该执行什么命令。在我们的例子中，每个新创建的容器基本上都会使用`flask run`命令来启动\
  \ Flask 微框架开发 Web 服务器。因此，Flask 服务器将公开在`app.py`文件中实现的 API，其路径已设置在`FLASK_APP`环境变量中。\n\
  \n要触发镜像构建过程，请使用`docker build`命令。`-t`参数为新构建的镜像设置标签。不要忘记在末尾包含点号，以指示`docker build`命令在当前工作目录中搜索\
  \ Dockerfile。\n\n```\n[opc@dev-vm]$ docker build -t uuid:1.0 .\nSending build context\
  \ to Docker daemon  4.608kB\nStep 1/10 : FROM python:3-alpine\n3-alpine: Pulling\
  \ from library/python\ne7c96db7181b: Pull complete\n799a5534f213: Pull complete\n\
  913b50bbe755: Pull complete\n11154abc6081: Pull complete\nc805e63f69fe: Pull complete\n\
  ...\nStatus: Downloaded newer image for python:3-alpine\n...\nStep 2/10 : ENV FLASK_APP\
  \ /usr/src/app/app.py\n...\nStep 3/10 : ENV FLASK_ENV development\n...\nStep 4/10\
  \ : ENV FLASK_DEBUG 0\n...\nStep 5/10 : EXPOSE 5000\n...\nStep 6/10 : WORKDIR /usr/src/app\n\
  ...\nStep 7/10 : COPY requirements.txt ./\n...\nStep 8/10 : RUN pip install --no-cache-dir\
  \ -r requirements.txt\n...\nSuccessfully installed Flask-1.0.2 Jinja2-2.10.1 MarkupSafe-1.1.1\
  \ Werkzeug-0.15.4 click-7.0 itsdangerous-1.1.0\n...\nStep 9/10 : COPY . .\n...\n\
  Step 10/10 : CMD [ \"flask\", \"run\", \"--host=0.0.0.0\" ]\n...\nSuccessfully built\
  \ b16f04d1bb7f\nSuccessfully tagged uuid:1.0\n```\n\n现在，您可以使用`docker images`命令来列出镜像，可以选择使用`--format`参数来过滤输出。\n\
  \n```\n[opc@dev-vm]$ docker images --format \"table {{.Repository}}\\t{{.Tag}}\\\
  t{{.ID}}\\t{{.Size}}\"\nREPOSITORY  TAG        IMAGE ID       SIZE\nuuid       \
  \ 1.0        b16f04d1bb7f   96.7MB\npython      3-alpine   fe3ef29c73f3   87MB\n\
  ```\n\n您应该看到两个顶层镜像。\n\n*   `uuid:1.0`\n\n*   `python:3-alpine`\n\n我们之前多次提到过`python:3-alpine`。这是基础镜像。它是从\
  \ Docker Hub 镜像注册表下载的。大小为 87MB，由一些默认不显示的中间层组成。`uuid:1.0`是我们刚刚在基础镜像之上构建的镜像。它添加了 Flask\
  \ 微框架，设置了三个环境变量，并添加了`app.py`应用程序。您看到的大小（96.7MB）有些误导性。这是包含基础镜像大小的总大小。我们添加的层仅占 9.7MB（96.7MB –\
  \ 87MB）。\n\n要显示镜像的构建历史，从而查看包括临时中间层在内的所有层，您可以执行`docker history`命令，如图 8-8 所示。\n\n\
  ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig8_HTML.jpg](img/478313_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n\nDocker 镜像的顶层镜像与中间层镜像\n\n新镜像就位后，我们就可以继续运行容器了。\n\n\n## 运行容器\n\n镜像本身可以简单地看作是逻辑关联的只读文件系统层。要使用容器化的应用程序，您必须基于特定镜像启动一个或多个容器。您可以使用\
  \ `docker run` 命令来实现这一点。`-d` 参数将容器作为后台的**分离的进程**运行，从而不会阻塞终端。即使 `Dockerfile` 声明了端口\
  \ 5000 是镜像暴露的端口，您仍然需要为每个创建的容器映射一个选定的主机端口到该容器端口。您可以使用 `-p` 参数来实现这一点。我们可以自由地使用一个或多个\
  \ `-e` 参数来覆盖或设置额外的环境变量。您可能还记得，UUID API 在响应中将 `UUID_GENERATOR_NAME` 环境变量的值作为 `generator`\
  \ 字段返回。对于我们即将启动的每个容器，我们将使用一个不同的值，该值与用 `--name` 参数设置的容器名称相同。\n\n第 2 章的练习帮助您在两个主机上分别将\
  \ UUID API 的单个实例作为 `systemd` 服务运行。这一次，我们将运行同一应用程序的几个实例，将它们绑定到开发实例上不同的端口，如下所示：\n\n\
  ```\n[opc@dev-vm]$ docker run -d -p 5011:5000 -e \"UUID_GENERATOR_NAME=uuid-1\"\
  \ --name uuid-1 uuid:1.0\nd6e9112b0950.........40adc3\n[opc@dev-vm]$ docker run\
  \ -d -p 5012:5000 -e \"UUID_GENERATOR_NAME=uuid-2\" --name uuid-2 uuid:1.0\n224256288f19.........d63b8c\n\
  [opc@dev-vm]$ docker run -d -p 5013:5000 -e \"UUID_GENERATOR_NAME=uuid-3\" --name\
  \ uuid-3 uuid:1.0\nb15d1d26614c.........45b8dd\n```\n\n要列出正在运行的容器，您可以使用 `docker\
  \ ps` 命令。\n\n```\n[opc@dev-vm]$ docker ps --format \"table {{.ID}}\\t{{.Image}}\\\
  t{{.Names}}\\t{{.Status}}\\t{{.Ports}}\"\nCONTAINER ID  IMAGE     NAMES   STATUS\
  \     PORTS\nb15d1d26614c  uuid:1.0  uuid-3  Up 3 min   0.0.0.0:5013->5000/tcp\n\
  224256288f19  uuid:1.0  uuid-2  Up 3 min   0.0.0.0:5012->5000/tcp\nd6e9112b0950\
  \  uuid:1.0  uuid-1  Up 3 min   0.0.0.0:5011->5000/tcp\n```\n\n现在，让我们测试每个容器上的 UUID\
  \ API。\n\n```\n[opc@dev-vm]$ curl 127.0.0.1:5011/identifiers\n{\n\"generator\":\"\
  uuid-1\",\n\"uuid\":\"d89d68bf-c093-4774-ab0e-0089674c184e\"\n}\n[opc@dev-vm]$ curl\
  \ 127.0.0.1:5012/identifiers\n{\n\"generator\":\"uuid-2\",\n\"uuid\":\"e141eef7-e578-4272-934b-68b48b6e146c\"\
  \n}\n[opc@dev-vm]$ curl 127.0.0.1:5013/identifiers\n{\n\"generator\":\"uuid-3\"\
  ,\n\"uuid\":\"52ea3c08-adf2-452b-bd28-ef7b26aa2fc2\"\n}\n```\n\n由于我们在 Oracle 云基础设施上运行\
  \ `dev-vm` 计算实例，您可能希望通过使用实例的公共 IP 从本地机器调用测试容器化的 UUID API。为此，您必须添加一条入站安全规则，允许端口 5011–5013\
  \ 的入站流量。与 `dev-vm` 相关的基础设施是使用 Terraform 配置的。要添加新的入站安全规则，您需要在基础设施代码文件 `devmachine/vcn.tf`\
  \ 的 `dev_sl` 资源中进行操作。我们在第 2 章和第 6 章讨论了安全规则。\n\n我们已通过实例化三个容器并测试其 API，成功验证了新构建的镜像。您现在可以退出开发者实例控制台。\n\
  \n```\n[opc@dev-vm]$ exit\n```\n\n`uuid:1.0` 镜像目前存储在我们开发实例上的本地镜像注册表中。这类本地注册表对于刚刚进行的测试来说完全足够，但不能作为分发注册表使用。\n\
  \n## 容器注册表\n\n理论上，您可以将新构建的镜像从开发者实例上的本地镜像注册表推送到互联网上的某个公共注册表，例如 Docker Hub。然而，您通常更倾向于将所有自定义镜像保存在某种私有注册表中，对公众不可见，并且该注册表在地理上更靠近容器运行的目标基础设施。每个\
  \ Oracle 云基础设施租户都配有一个能够存储私有和公共仓库的镜像注册表。*Oracle 云基础设施注册表* (`OCIR`) 与身份和访问管理完全集成。因此，`OCIR`\
  \ 的访问权限被授予 `IAM` 用户，并使用您已熟悉的 `IAM` 策略进行管理。在后台，容器镜像被冗余地存储在支持 `OCIR` 的 `OCI` 对象存储中。*仓库*\
  \ 用于对相关镜像进行分组。一个单一的 *仓库* 可以被视为为单个服务或应用程序提供的一组相关的、带标签的 Docker 镜像版本。在 `OCIR` 的上下文中，仔细分配的\
  \ *标签* 不仅用于表示容器化应用程序的特定版本或变体，还用于指示租户命名空间、目标区域和仓库名称。要将镜像推送到您的租户 `OCIR`，您必须使用严格定义的表示法标记镜像，如图\
  \ 8-9 所示。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig9_HTML.jpg](img/478313_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9\n\n镜像标签与 `OCIR`\n\n`OCIR` 使用的区域代码与您迄今为止遇到的不同。表 8-1 展示了其中一些。更新后的列表可以在这里找到：\
  \ [`https://docs.cloud.oracle.com/iaas/Content/General/Concepts/regions.htm`](https://docs.cloud.oracle.com/iaas/Content/General/Concepts/regions.htm)。\n\
  \n表 8-1\n\nOCIR 区域代码\n\n| 区域名称 | 区域标识符 | OCIR 键 |\n| --- | --- | --- |\n| 澳大利亚东部\
  \ (悉尼) | `ap-sydney-1` | `syd` |\n| 巴西东部 (圣保罗) | `sa-saopaulo-1` | `gru` |\n| 加拿大东南部\
  \ (多伦多) | `ca-toronto-1` | `yyz` |\n| 德国中部 (法兰克福) | `eu-frankfurt-1` | `fra` |\n\
  | 印度西部 (孟买) | `ap-mumbai-1` | `bom` |\n| 日本东部 (东京) | `ap-tokyo-1` | `nrt` |\n| 伦敦\
  \ (英国) | `uk-london-1` | `lhr` |\n| 韩国中部 (首尔) | `ap-seoul-1` | `icn` |\n| 瑞士北部 (苏黎世)\
  \ | `eu-zurich-1` | `zrh` |\n| 英国南部 (伦敦) | `uk-london-1` | `lhr` |\n| 美国东部 (阿什本)\
  \ | `us-ashburn-1` | `iad` |\n| 美国西部 (凤凰城) | `us-phoenix-1` | `phx` |\n\n您可以在 `OCI`\
  \ 控制台的注册表视图中找到 *租户命名空间*。如果以租户超级用户身份登录，您不需要任何特定的 `IAM` 策略即可在 `OCI` 控制台中查看 `OCIR`。以下是使用\
  \ `OCI` 控制台访问相关视图的方法：\n\n1.  转到 **菜单** ➤ **开发者服务** ➤ **注册表**。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig10_HTML.jpg](img/478313_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10\n\n在 `OCI` 控制台中查看 Oracle 容器镜像注册表\n\n*租户命名空间* 作为仓库列表的根节点可见。您会在房子图标旁边找到它。在我的情况下，命名空间名称与我的租户名称\
  \ (`jakobczyk`) 相同，但对于较新的租户，情况可能不再如此。您可能会发现一个随机字符串。\n\n\n要允许其他 IAM 用户与 OCIR 交互，您必须创建适当的\
  \ IAM 策略，明确授予所选 IAM 组的特定访问权限。在本书中，我们一直在处理两个组：`sandbox-admins`和`sandbox-users`。假设我们希望授予`sandbox-admins`组成员列出租户中所有\
  \ Docker 仓库的权限。此外，两个组都应能够在名称以`sandbox`前缀开头的仓库（如`sandbox/uuid`或`sandbox-cicd/uuid`）中推送、拉取和删除镜像。在本地主机上使用\
  \ OCI CLI，打开`chapter08/2-docker/policies`目录。\n\n```\n$ cd ~/git\n$ cd oci-book/chapter08/2-docker\n\
  $ cd policies\n$ ls -1\ntenancy.ocir.policies.json\n```\n\nJSON 文件包含三条策略声明，如清单 8-3\
  \ 所示。`manage repos`授予对名称匹配`where target.repo.name`筛选条件的所有仓库的完整 Registry 相关 OCI API\
  \ 访问权限。第三条规则授予`sandbox-admins`组成员对所有仓库的`inspect repos`访问权限。`inspect`级别的访问仅涉及两个 API：`ListDockerRepositories`和`ListDockerRepositoryManifests`。\n\
  \n```\n[\n\"allow group sandbox-users to manage repos in tenancy where target.repo.name\
  \ = /sandbox*/\",\n\"allow group sandbox-admins to manage repos in tenancy where\
  \ target.repo.name = /sandbox*/\",\n\"allow group sandbox-admins to inspect repos\
  \ in tenancy where request.operation='ListDockerRepositories'\"\n]\n清单 8-3\ntenancy.ocir.policies.json\n\
  ```\n\n由于 OCIR 作用域是租户级别，我们必须通过在`iam policy create` CLI 命令中使用`-c`参数指向根 compartment\
  \ 来创建策略。您可能还记得，我们在 CLI 配置中维护三个配置文件。默认配置文件代表租户管理员调用 API，当未设置`--profile`参数时将使用该配置文件。回到本地机器，让我们以租户管理员身份执行\
  \ OCI CLI。\n\n```\n$ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed 's/tenancy=//'`\n\
  $ echo $TENANCY_OCID\ntenancy=ocid1.tenancy.oc1..aa..........3yymfa\n$ oci iam policy\
  \ create -c $TENANCY_OCID --name tenancy-ocir-policy --description \"OCIR 策略\" --statements\
  \ \"file://tenancy.ocir.policies.json\"\n{\n\"data\": {\n...\n\"lifecycle-state\"\
  : \"ACTIVE\",\n\"name\": \"tenancy-ocir-policy\",\n\"statements\": [\n\"allow group\
  \ sandbox-users to manage repos in tenancy where target.repo.name = /sandbox*/\"\
  ,\n\"allow group sandbox-admins to manage repos in tenancy where target.repo.name\
  \ = /sandbox*/\",\n\"allow group sandbox-admins to inspect repos in tenancy where\
  \ request.operation='ListDockerRepositories'\"\n],\n...\n},\n\"etag\": \"d705d10ec093dbaf7c116054709951d38d3f7651\"\
  \n}\n```\n\n您可以在 OCI 控制台中验证新创建的 IAM 策略是否存在。请记住将作用域切换到根 compartment，如图 8-11 所示。\n\
  \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig11_HTML.jpg](img/478313_1_En_8_Fig11_HTML.jpg)\n\
  *图 8-11: OCIR 策略*\n\n既然 OCIR 已与 IAM 完全集成，显然只有经过身份验证和授权的 IAM 用户才被允许在私有仓库中拉取或推送镜像。您在上一章已经使用过身份验证令牌。作为快速回顾，让我提及几个事实。用户基于身份验证令牌进行身份验证。令牌是\
  \ Oracle 生成的相对较短的字符串。任何 IAM 用户最多可以同时拥有两个身份验证令牌。令牌可以由用户自己创建，也可以由管理员通过 OCI 控制台或利用基于\
  \ API 的自动化（如 OCI CLI）任意创建。\n\n以下是您作为`sandbox-user`在 OCI 控制台中生成身份验证令牌的方法：\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig12_HTML.jpg](img/478313_1_En_8_Fig12_HTML.jpg)\n\
  *图 8-12: 在 OCI 控制台中访问用户配置文件*\n\n1.  以`sandbox-user`身份登录 OCI 控制台。\n2.  通过单击用户名转到用户配置文件，如图\
  \ 8-12 所示。\n3.  在\"资源\"选项卡上，单击\"身份验证令牌\"。\n4.  单击\"生成令牌\"。\n5.  为令牌提供描述，然后单击\"生成令牌\"\
  。\n6.  记下您的令牌。您只会看到它一次。\n\n至关重要的是要记住，您只能看到一次新生成的身份验证令牌，如图 8-13 所示。如果丢失，您将必须删除旧令牌并生成新令牌。\n\
  \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig13_HTML.jpg](img/478313_1_En_8_Fig13_HTML.jpg)\n\
  *图 8-13: 查看生成的令牌*\n\n要以编程方式为选定用户生成身份验证令牌，您可以使用默认 CLI 配置文件（只需省略`--profile`参数）代表租户管理员执行以下\
  \ CLI 命令。首先，查询特定用户的 OCID，然后为该用户使用`iam auth-token create` CLI 命令。\n\n```\n$ IAM_USER_OCID=`oci\
  \ iam user list -c $TENANCY_OCID --query \"data[?name=='sandbox-user'] | [0].id\"\
  \ --raw-output --all`\n$ echo IAM_USER_OCID\nocid1.user.oc1..aa..........dzqpxa\n\
  $ oci iam auth-token create --user-id $IAM_USER_OCID --description token-ocir --query\
  \ 'data.token' --raw-output\nB8.E_Ry7oOtN1KF0do9x\n```\n\n无论您选择哪种方式，请确保您已为`sandbox-user`\
  \ IAM 用户准备好身份验证令牌。\n\n我们即将推送刚才构建的`uuid:1.0`镜像。要将本地容器镜像推送到 OCIR，您必须执行以下操作：\n\n1.\
  \  选择 OCIR 区域。\n2.  根据 OCIR 命名规范正确标记本地镜像。\n3.  以命名的 IAM 用户身份登录到特定区域的 OCIR。\n4. \
  \ 推送已标记的镜像。\n\n您可以在图 8-9 中找到图像标记的 OCIR 命名规范的图形说明。我将把镜像推送到法兰克福的 OCIR，但您当然可以选择迄今为止一直在使用的区域。在这种情况下，您将在表\
  \ 8-1 中找到所需的 OCIR 区域代码。\n\n在撰写本文时，可以使用`oci os ns get` CLI 命令通过 OCI API 以编程方式读取租户命名空间。让我们确定我们的租户命名空间。稍后我们将使用它。\n\
  \n```\n$ oci os ns get --query data --raw-output\njakobczyk\n```\n\n如您所见，我的租户命名空间与我的租户名称具有相同的值。这是因为我使用的是相对较旧的云帐户。对于较新的云帐户，可能包括您的，租户命名空间和租户名称几乎总是不同的。\n\
  \n**注意：** 使用 OCIR 时，请注意不要混淆*租户名称*和*租户命名空间*。确保使用租户命名空间来标记镜像并登录 OCIR。\n\n现在连接到开发实例。\n\
  \n```\n$ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP\n[opc@dev-vm] $\n```\n\n\
  以下是我如何使用`docker tag`命令将本地的`uuid:1.0`镜像标记为`fra.ocir.io/jakobczyk/sandbox/uuid:1.0`：\n\
  \n```\n[opc@dev-vm] $ OCI_PROJECT_CODE=sandbox\n[opc@dev-vm] $ OCI_TENANCY_NAMESPACE=jakobczyk\n\
  [opc@dev-vm] $ OCIR_REGION=fra\n[opc@dev-vm] $ OCI_USER=sandbox-user\n[opc@dev-vm]\
  \ $ IMAGE_NAME=uuid\n[opc@dev-vm] $ IMAGE_TAG=1.0\n[opc@dev-vm] $ docker tag $IMAGE_NAME:$IMAGE_TAG\
  \ $OCIR_REGION.ocir.io/$OCI_TENANCY_NAMESPACE /$OCI_PROJECT_CODE/$IMAGE_NAME:$IMAGE_TAG\n\
  [opc@dev-vm] $ docker images --format \"table {{.Repository}}\\t{{.Tag}}\\t{{.ID}}\"\
  \nREPOSITORY                           TAG       IMAGE ID\nuuid                \
  \                 1.0       b16f04d1bb7f\nfra.ocir.io/jakobczyk/sandbox/uuid   1.0\
  \       b16f04d1bb7f\npython                               3-alpine  fe3ef29c73f3\n\
  ```\n\n\n\n如你所见，`the uuid:1.0` 和 `fra.ocir.io/jakobczyk/sandbox/uuid:1.0` 这两个标签都指向同一个\
  \ `b16f04d1bb7f` 镜像。这正是我们的目标。现在，登录到 OCIR 并像这样推送镜像。系统将提示你输入认证令牌。\n\n```\n[opc@dev-vm]\
  \ $ docker login -u $OCI_TENANCY_NAMESPACE/$OCI_USER $OCIR_REGION.ocir.io\nPassword:\
  \ B8.E_Ry7oOtN1KF0do9x\nLogin Succeeded\n[opc@dev-vm]$ docker push $OCIR_REGION.ocir.io/$OCI_TENANCY_NAMESPACE/$OCI_PROJECT_CODE/$IMAGE_NAME:$IMAGE_TAG\n\
  The push refers to repository [fra.ocir.io/jakobczyk/sandbox/uuid]\n4954d6a23347:\
  \ Pushed\n7337b89d95ab: Pushed\n1821dd20f0ac: Pushed\n640ae8435b21: Pushed\n5191bfc553a0:\
  \ Pushed\n0db5724f9017: Pushed\n7f61afcc4a4d: Pushed\n8cec11e3dff0: Pushed\nf1b5933fe4b5:\
