  \n图 2-1\n使用 OCI 隔离区隔离项目\n\n如图 2-1 所示，隔离区可以位于其他隔离区内部，从而形成一个完整的层级结构。最顶层的隔离区称为*根隔离区*，你创建或默认存在的所有隔离区都是它的后代。如图\
