  \n图 2-2\n隔离区的层级结构\n\n为每个项目传统地划分为三个标准环境（开发、测试和生产）不一定是最优选择。我甚至可以说这可能导致治理问题，因为生产隔离区仍然是项目隔离区的子级。在第\
  \ 4 章中，你将学习另一种对生产更友好的隔离区组合策略，该策略将顶层项目与系统隔离区分开。\n\n从技术上讲，根隔离区并不是一个隔离区。每个 Oracle Cloud\
  \ Infrastructure 资源都有一个类型。除了根隔离区是`tenancy`类型外，所有隔离区都是`compartment`类型。如果现阶段还不清楚，请不要担心。你唯一需要记住的是：不要直接在根隔离区中创建资源。这在技术上是可行的，但不一定是好的实践。\n\
  \n是时候做出第一个架构决策了。你需要决定将本章即将构建的示例解决方案放置在哪个隔离区中。如果你不知道，我来帮你。就让它成为`Sandbox`这个新的隔离区吧。我们几分钟后就会创建它。现在请继续阅读。\n\
  \n### 应用程序设计\n\n我们即将创建的云解决方案提供了一个简单的通用唯一标识符生成服务。每次客户端调用 API，都会收到一个新的唯一标识符。简而言之，UUID\
  \ 是一个固定大小、不可变的标识符，它通过某种算法创建，该算法保证无论是否由多个生成器在同一台或不同机器上同时运行，创建重复标识符的概率都微乎其微。依赖 UUID\
  \ 的应用程序在设计上不需要任何中央标识符管理。你可以在 RFC4122 中找到关于 UUID 的更多细节。\n\n图 2-3 展示了一个 UUID 的示例。\n\
  \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig3_HTML.jpg](img/478313_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\nUUID\n\n该实现将由两个独立的计算节点组成，它们在后端托管相同的、无状态的 UUID 生成逻辑，暴露一个简单的 REST API，并在每次请求时以\
  \ JSON 格式返回新生成的 UUID（`uuid`对象）和计算节点名称（`generator`对象），如清单 2-1 所示。\n\n```\n{\n\"uuid\"\
  : \"8cf04d96-30c8-45f5-a2b5-c0ae68f58c4e\",\n\"generator\":\"web1\"\n}\n```\n\n\
  清单 2-1\nAPI 响应\n\n请求被均匀地分配到两个 API 节点上的端点，因为我们在它们前面放置了一个负载均衡器，并依赖简单的轮询策略。尽管这是一个简单的演示场景，我们仍将把每个节点部署在不同的可用性域中，以创建一个高可用的解决方案。这种设计增加了我们的云服务在单个数据中心灾难中存活的机会。总结一下，一个*可用性域*可以看作是一个单一的数据中心，它使用高带宽链路与同一区域内的其他可用性域互连，从而提供低延迟。多个可用性域同时发生故障或被摧毁的可能性非常低。图\
  \ 2-4 展示了解决方案组件的示意图及其如何映射到物理数据中心。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig4_HTML.jpg](img/478313_1_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4\n应用程序组件\n\n**提示**\n\n如果你的主页区域只提供一个可用性域，你仍然可以通过订阅另一个提供多个可用性域的区域来完成本章及后续所有章节的实践练习。你可以在\
  \ OCI 控制台中执行此操作。只需转到菜单 ➤ 管理 ➤ 区域管理，然后在其中一个提供三个可用性域的区域旁边单击“订阅”按钮。订阅新区域可能需要片刻时间。之后，你需要在\
  \ OCI 控制台的右上角选择活动区域。\n\n\n## 实现 API 服务器与云基础设施设计\n\n是时候仔细看看实现了。我选择使用 Flask 来实现 API\
  \ 服务器，这是一个面向 Web 的 Python 微框架。我确信你已经听说过 Python 编程语言。它于 20 世纪 90 年代初推出，尤其是在过去十年中，其受欢迎程度迅速增长。Python\
  \ 被认为是一种通用语言，广泛应用于 Web 开发、数据科学、机器学习、云生态系统，甚至物联网（IoT）等各个领域。它被归类为一种多范式、解释型的语言，具有动态类型和称为*垃圾回收*（`garbage\
  \ collection`）的自动内存管理。支持多种编程范式意味着你可以选择自己喜欢的编码方式，无论是过程式、面向对象还是函数式。解释型语言不需要在执行前预编译成机器代码，而是直接在解释器上运行。这简化了交付流程，但会带来性能下降。动态类型和自动内存管理提高了编程效率，使语言更易于使用。另一方面，Flask\
  \ 是一个 Web 开发微框架，主要侧重于处理 HTTP 请求并发送正确渲染的 HTTP 响应。它完全兼容 WSGI。WSGI 在 PEP3333 中定义，代表\
  \ Web 服务网关接口（Web Service Gateway Interface），这是 Python 生态系统的一个标准，指定了 Web 服务器和 Web\
  \ 框架之间的接口。为方便起见，Flask 自带一个嵌入式 Web 服务器，非常适合开发目的。\n\n清单 2-2 展示了一个 UUID 服务的实现。你不需要对这段代码做任何事。所有事情都将在云实例首次启动时自动发生。怎么做？继续阅读即可。\n\
  \n> **提示**\n>\n> 尽管你不需要对这段代码做任何事，但它仍可在本书的 Git 仓库中找到，路径为 `chapter02/uuid-service/app.py`。\n\
  \n```python\nimport flask\nimport uuid\nimport os\nimport socket\nimport logging\n\
  app = flask.Flask(__name__)\n@app.route('/identifiers', methods=['GET'])\ndef identifiers():\n\
  \    generator_name = os.getenv('UUID_GENERATOR_NAME', socket.gethostname())\n \
  \   generator_uuid = uuid.uuid4()\n    app.logger.info('Generator: [%s] UUID: [%s]',\
  \ generator_name, generator_uuid)\n    rsp = flask.jsonify(uuid=generator_uuid,\
  \ generator=generator_name)\n    rsp.status_code = 200\n    rsp.headers['Content-Type']\
  \ = 'application/json'\n    return rsp\n@app.before_first_request\ndef setup_logging():\n\
  \    logging.getLogger('werkzeug').disabled = True\n    app.logger.removeHandler(flask.logging.default_handler)\n\
  \    handler = logging.StreamHandler()\n    handler.setFormatter(logging.Formatter('%(asctime)s\
  \ - %(levelname)s - %(message)s'))\n    app.logger.addHandler(handler)\n    app.logger.setLevel(logging.INFO)\n\
  ```\n*清单 2-2 UUID 服务实现*\n\n为了将重点放在本书的主题上，我将避免逐行解释实现细节。你应该理解的是，这个应用程序将所有通过 `/identifiers`\
  \ URL 发送的 GET 请求路由到 `identifiers()` 处理函数。该函数通过组合一个新生成的 UUID 和 `generator` 的名称来准备响应。后者被设置为主机名，除非存在\
  \ `UUID_GENERATOR_NAME` 环境变量。响应以 JSON 格式发送，如下所示：\n\n```json\n{\n  \"generator\"\
  : \"uuid1\",\n  \"uuid\": \"e22b5858-e70f-46ab-bd16-0da3d55aca73\"\n}\n```\n\n现在，让我们回到正题，开始定义所需的\
  \ Oracle Cloud Infrastructure 资源，以便能够创建它们。\n\n### API 服务器实现\n\n#### Cloud Infrastructure\n\
  \n根据我们在上一节简要讨论的概念设计，我们知道将需要两个位于两个不同可用性域（availability domain）中的计算实例，它们位于一个高可用负载均衡器后面。负载均衡器将使用一个公共\
  \ IP，以便可以从互联网访问。我们将创建一些其他辅助基础设施资源，以确保云设计的完整性。\n\n然而，事情要分轻重缓首。我们首先设计资源所在虚拟网络的布局。*虚拟云网络*（`VCN`）可以被视为一个虚拟的、私有的网络，它提供一个连续的\
  \ IPv4 地址块。建议选择通常被认为是私有的 IPv4 地址块。RFC1918 定义了这些地址。如果你想遵循此准则，请从以下地址范围中选择任何子集：\n\n\
  *   `192.168.0.0/16`\n*   `172.16.0.0/12`\n*   `10.0.0.0/8`\n\n对于我们的云解决方案，我们将使用这个范围：`192.168.1.0/24`。\n\
  \n一个 VCN 被细分为一个或多个*子网*。属于同一个 VCN 的子网的 IP 地址范围必须在父 VCN 的 IP 地址范围内，并且不能与其他子网重叠。你在\
  \ Oracle Cloud Infrastructure 中运行的每个计算实例都将附加到特定的 VCN 子网。这是通过一个称为 `vNIC` 的虚拟网络接口卡完成的。\n\
  \n让我们决定一下云网络的布局。图 2-5 展示了我们的云解决方案的 VCN 地址空间，以及划分为子网的地址范围。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig5_HTML.jpg](img/478313_1_En_2_Fig5_HTML.jpg)\n\
  *图 2-5 虚拟云网络地址范围布局*\n\n如图 2-5 所示，我们将使用四个子网。\n\n*   子网 A 用于托管 UUID API 的第一个计算节点\n\
  *   子网 B 用于托管 UUID API 的第二个计算节点\n*   子网 C 用于第一个负载均衡器节点\n*   子网 D 用于第二个负载均衡器节点\n\n\
  换句话说，我们将在子网 A 和 B 中启动的两个计算实例上运行 UUID API 应用程序。一对负载均衡器节点将在子网 C 和 D 中运行。为了实现容错：\n\n\
  *   子网 A 和 C 将在第一个可用性域中创建。\n*   子网 B 和 D 将在第二个可用性域中创建。\n\n如果你查阅官方的 OCI 文档、白皮书或项目架构文档，你会发现\
  \ OCI 资源（计算实例、负载均衡器、网络资源等）通常使用遵循相同风格并重用一套标准图标的图表来呈现。我现在将首次使用 Oracle Cloud Infrastructure\
  \ 拓扑符号。图 2-6 展示了我们将在本章中构建的云基础设施拓扑。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig6_HTML.jpg](img/478313_1_En_2_Fig6_HTML.jpg)\n\
  *图 2-6 云基础设施架构*\n\n> **提示**\n>\n> Oracle 发布了一套可重用的图形资产，每个人都可以在其架构文档中使用。你可以在 [`https://bit.ly/2rfLk3V`](https://bit.ly/2rfLk3V)\
  \ 找到它们。\n\n在这个阶段，我们对云网络布局有了相当清晰的构想。现在，让我们对计算实例做几个选择。\n\n*`规格`* 是基于给定配置文件（`shape`）的计算实例所提供的硬件资源（CPU\
  \ 核心、可用内存）的配置文件。Oracle Cloud Infrastructure 提供两个系列的计算实例配置。\n\n*   **裸机主机**（`Bare-metal\
  \ hosts`）：专用、单租户硬件，无管理程序（`hypervisor`）\n*   **虚拟机**（`Virtual machines`）：通用目的、多租户硬件，有管理程序（`hypervisor`）\n\
  \n\n一些软件，如即时通讯平台、企业应用服务器或数据库引擎，据报道在专用的物理硬件上运行时更为稳定高效，无需涉及管理程序（hypervisor）虚拟化。你可以将它们托管在数量更少、性能更强的裸机主机上。而在所有其他通用用例中，你可能会使用更多虚拟机来利用水平扩展。\n\
  \n注意\n\n裸机计算形态家族深深植根于 Oracle Cloud Infrastructure（OCI）的起源。OCI 实际上源自一个名为 Oracle Bare\
  \ Metal Cloud Service、面向裸机的云服务而演变而来。\n\n在此，我仅列举几个在撰写本文时提供的、随机选择的形态：\n\n*   `VM.Standard2.1`\
  \ 是最小的标准虚拟机形态，配备 1 个 `OCPU` 和 15GB 内存。它基于 X7 平台，这基本上意味着它使用的是 Intel Xeon Skylake\
  \ 处理器。\n*   `VM.Standard2.8` 是另一个标准虚拟机形态的例子，提供 8 个 `OCPU` 和 120GB 内存。\n*   `BM.Standard2.52`\
  \ 是一个标准的裸机形态，利用 52 个 `OCPU` 和 768GB 内存。\n*   `BM.Standard.E2.64` 是一个使用 AMD EPYC\
  \ 处理器的裸机形态，配备 64 个 `OCPU` 和 512GB 内存。\n*   `BM.DenseIO2.52` 是一个专为大数据项目中存在的 I/O 密集型工作负载设计的裸机形态。它配备了本地附加的\
  \ SSD NVMe 驱动器，提供 51.2TB 的存储容量。\n*   `BM.GPU3.8` 是一个旨在为机器学习流程和高性能计算（HPC）软件提供动力的裸机形态。除了\
  \ 52 个 `OCPU` 和 768GB 内存外，其真正能力来自于八个 Nvidia Tesla V100 GPU。\n\n在上面的列表中，我使用了一个新的缩写。一个\
  \ `Oracle 计算单元` (`OCPU`) 是一个逻辑术语，也是计算相关计费的最重要度量单位。你通常按 1 `OCPU`/小时付费。换句话说，一个运行 8\
  \ 个 `OCPU` 的实例一小时所产生的计算相关成本，与一个仅运行 1 个 `OCPU` 的实例运行八小时的成本相同。\n\n对于基于 Intel 的形态，单个\
  \ `OCPU` 对应于一个物理 Intel Xeon 核心。由于超线程技术，操作系统实际上为每个物理 CPU 核心看到两个虚拟核心。总结一下，一个基于 Intel\
  \ 的 `OCPU` 意味着一个物理 CPU 核心和两个近乎并行执行线程的能力，有时也称为 vCPU。\n\n你可以很容易地猜到，我们关于计算实例的第一个选择是为将托管\
  \ UUID 服务应用程序的节点选择一个形态。我们将使用可用的最小虚拟机：`VM.Standard2.1`。\n\n一个 `镜像`（image）是一个模板，它指定了操作系统以及在实例启动期间必须预安装的任何附加软件。一个\
  \ `镜像` 用于初始化计算实例使用的新启动卷。启动卷与其计算实例保持关联，直到终止。启动卷可以看作是实例使用的主要存储，主要用于其操作系统和软件。\n\nOracle\
  \ 提供的镜像会定期更新并获得新版本。然而，一旦你启动了一个实例，安排定期系统更新就成为你的责任。\n\n在撰写本文时，Oracle Cloud Infrastructure\
  \ 提供四种类型的基础操作系统镜像，包含以下操作系统：\n\n*   Oracle Linux\n*   CentOS\n*   Ubuntu\n*   Windows\
  \ Server\n\n在你的日常工作中，你最终可能会创建许多自定义镜像，这些镜像在所选基础镜像上添加了所需的软件、服务或计划脚本。也可以导入并非基于可用基础镜像构建的自定义镜像。在这种情况下，你将在虚拟机形态上使用准虚拟化（paravirtualization）或模拟（emulation）。然而，创建自定义镜像最简单的方法是依赖\
  \ Oracle 提供的基础镜像。\n\n那么，再做一个决定如何？我们将使用最新的 Oracle Linux 基础镜像：`Oracle Linux 7.6`。你可能会在未来使用\
  \ `Oracle Linux 7` 的较新次版本。\n\n注意\n\n虽然截图将显示 `Oracle Linux 7.6`，但本章的练习还使用了 `Oracle\
  \ Linux 7.7` 镜像进行了额外测试。\n\n我们现在将转向规划过程的最后一步。\n\n#### 服务限额\n\n你可能想知道，如果太多租户（云客户）在同一区域同时启动大量最强大的裸机形态会发生什么。即使在最大的数据中心中，这些机器的数量也肯定是有限的，不是吗？嗯，当然，确实是有限的。这正是服务限额（也称为\
  \ `配额`）这个巧妙想法的用武之地。\n\n每个云账户都有一组服务限额，定义了允许同时运行多少何种类型的资源。如果你发现当前的限额无法满足你的需求，只需提交一个服务请求，就可以申请提高限额。这有助于\
  \ Oracle 规划和优化数据中心容量。简单而明智，不是吗？\n\n提示\n\n你可以在 OCI 控制台中随时验证你的使用情况与当前云账户的服务限额。只需转到\
  \ `菜单 ➤ 治理 ➤ 限额、配额和使用情况`。\n\n在启动新的云项目之前，验证并酌情增加服务限额，应包含在你规划阶段的检查清单中。\n\n我们在本章中正在构建的示例云解决方案将包括以下\
  \ OCI 资源：\n\n*   一个 VCN\n*   两个 `VM.Standard2.1` 计算实例\n*   一个负载均衡器（100Mbps）\n* \
  \  一个自定义镜像\n*   可忽略不计的块存储大小\n\n如果你使用的是一个新的试用账户并且尚未创建任何资源，你可以相当确定你的默认试用账户服务限额不会被违反。\n\
  \n如果你使用的是一个已包含一些 OCI 资源的付费账户，请转到 OCI 控制台中的 `菜单 ➤ 治理 ➤ 限额、配额和使用情况`，并检查是否可以添加我刚刚列出的资源。如果你的\
  \ OCI IAM 用户无权查看服务限额，你可能还需要向你的云管理员询问具体数字。\n\n到目前为止我们所做的工作是纯粹的规划，并辅以一些基础的 Oracle\
  \ Cloud Infrastructure 概念讨论。我们从审视应用程序开始，并将其映射到我们需要的云资源。我们已准备好配置这些资源。\n\n\n## 配置基础设施\n\
  \n我们现在将为运行应用程序配置所需的云资源，这些资源我们在上一节中已讨论过。我会尽可能简化这个示例。这就是为什么我首先将介绍如何在单个节点上部署 UUID 服务。稍后，我们将添加负载均衡和容错能力。在这里，我将向您展示手动操作的方式。我这么说是什么意思呢？我们将使用`Oracle\
  \ Cloud Infrastructure Console`管理所有资源。您可能记得，我提到过这种方法仅适用于希望演示特定功能或试验对您来说是新特性的情况。生产就绪的适当自动化将在第\
  \ 3 章中介绍。现在，让我们开始吧！\n\n请登录到`Oracle Cloud Infrastructure (OCI) Console`。图 2-7 展示了`OCI\
  \ Console`的主登陆页面。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig7_HTML.png](img/478313_1_En_2_Fig7_HTML.png)\n\
  \n图 2-7: `Oracle Cloud Infrastructure Console`\n\n在`OCI Console`的右上角，您将看到您的活动区域。如图\
  \ 2-7 所示，在我的情况下，是德国中部区域 (`eu-frankfurt-1`)。正如我之前提到的，一些区域可能只包含一个可用性域。本书中的练习已在德国中部\
  \ (`eu-frankfurt-1`) 区域测试，并假定您所在的区域存在三个可用性域。在撰写本文时，这些区域如下：\n\n*   德国中部 (`eu-frankfurt-1`)\n\
  *   英国南部 (`uk-london-1`)\n*   美国东部 (`us-ashburn-1`)\n*   美国西部 (`us-phoenix-1`)\n\
  \n一个云账户可以拥有和管理多个区域的资源。您只需激活额外的区域即可。为此，请按照以下步骤操作：\n\n1.  转到`Menu ➤ Administration\
  \ ➤ Region Management`。\n2.  在“资源”菜单中点击`Infrastructure Regions`。\n3.  在区域名称旁边点击`Subscribe\
  \ To This Region`。\n\n订阅新区域是一个异步操作，可能需要几分钟时间。在某个时间点，刷新`OCI Console`后，您应该能够在`OCI\
  \ Console`的右上角选择区域。\n\n**注意**：在进行本书包含的练习之前，请确保您正在一个具有三个可用性域的区域中工作。如果需要，请毫不犹豫地订阅一个额外的区域。\n\
  \n您可能想知道如何在像以下这样的单 AD 区域中实现容错：\n\n*   澳大利亚东部 (`ap-sydney-1`)\n*   巴西东部 (`sa-saopaulo-1`)\n\
  *   加拿大东南部 (`ca-toronto-1`)\n*   印度西部 (`ap-mumbai-1`)\n*   日本东部 (`ap-tokyo-1`)\n\
  *   韩国中部 (`ap-seoul-1`)\n*   瑞士北部 (`eu-zurich-1`)\n\n可以同时采用两种方案。首先，您可能还记得，每个 AD\
  \ 都带有三个故障域，如前一章所述。故障域是物理隔离的设备单元，具有独立的电源和冷却系统。这样，两个故障域同时失效的可能性就降低了。更关键的系统可以跨多个区域分布。例如，在东京运行活动系统站点时，您可以在首尔维护一个被动系统站点，以实现灾难恢复\
  \ (`DR`)。\n\n### 隔离区 (Compartment)\n\n我们需要选择一个隔离区，我们的第一个云应用程序将在其中运行。隔离区是隔离不相关`OCI`资源的主要手段。通过这种方式，它们可以用来分隔不同的项目。从形式上讲，它们属于`IAM`服务。除非您已有用于学习的现有隔离区，否则建议您创建一个新的隔离区，以隔离我们在第\
  \ 2 章练习中配置的资源。请按照以下步骤操作：\n\n1.  转到`Menu ➤ Identity ➤ Compartments`。\n2.  点击`Create\
  \ Compartment`。\n3.  名称输入`Sandbox`。\n4.  提供一些描述。\n5.  点击`Create Compartment`。\n\n\
  新的隔离区应该几乎立即创建。您可能需要刷新页面，除非您能看到新创建的隔离区的新记录，如图 2-8 所示。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig8_HTML.png](img/478313_1_En_2_Fig8_HTML.png)\n\
  \n图 2-8: 在`OCI Console`中查看隔离区\n\n从现在开始，每次您在控制台中创建新的`OCI`资源时，都需要确保在`Compartment`组合框中选择了适当的隔离区，如图\
  \ 2-9 所示。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig9_HTML.jpg](img/478313_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9: 在`OCI Console`中选择活动的隔离区\n\n随着我们越来越接近使用`CLI`和`Terraform`自动化`Oracle Cloud\
  \ Infrastructure`，您将看到我们引用目标隔离区不是通过其名称，而是使用其`Oracle 云标识符 (OCID)`。\n\n每个`OCI`资源，包括您的租户，都由一个不可变的、多部分的、由`Oracle`分配的、具有严格语法的密钥唯一标识，该密钥称为`Oracle\
  \ 云标识符`，缩写为`OCID`。资源标识符结构是严格的。目前，它总是以`oc1`开头，表示当前且唯一的`OCID`版本。第二个元素更重要，因为它显示了资源类型。在撰写本文时，第三个元素始终设置为`oc1`。第四个元素表示区域。最后，最后一个元素对于每个`OCI`资源都是唯一的。图\
  \ 2-10 说明了`OCID`结构。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig10_HTML.jpg](img/478313_1_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10: `OCID`\n\n\n### 虚拟云网络\n\n顾名思义，*虚拟云网络*（VCN）是一个专属于你的云租户的私有虚拟网络。然而，在你设计和管理\
  \ VCN 的方式上，它又与你可能接触或学习过的知名传统物理 IP 网络有几分相似。\n\n以下是如何使用 OCI 控制台创建新的 VCN：\n\n1.  导航至菜单\
  \ ➤ 网络 ➤ 虚拟云网络。\n2.  确保已选择`Sandbox`隔离区。在左侧稍靠下的位置，你会找到“范围”部分，其中包含一个用于选择活动隔离区名称的组合框。\n\
  3.  点击“创建虚拟云网络”。\n4.  为新的 VCN 提供一个可选的显示名称（`uuid-vcn`）。\n5.  选择“仅创建虚拟云网络”。\n6.  提供\
  \ CIDR 块（`192.168.1.0/24`）。\n7.  勾选“DNS 解析”复选框，并保留 DNS 标签的默认值。\n8.  点击“创建虚拟云网络”以配置该\
  \ VCN。\n\n图 2-11 展示了 OCI 控制台的 VCN 创建向导。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig11_HTML.jpg](img/478313_1_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11\n创建新的虚拟云网络\n\n在向导底部，你可能发现了一些与标签相关的字段。你将在第[5]章(#478313_1_En_5_Chapter.xhtml)学习关于标签的知识。\n\
  \n我们决定创建一个 VCN，因为接下来我将向你展示如何创建所有（或调整现有的）必需的子资源，例如互联网网关、路由规则、安全规则和子网。这样，你将理解这些组件是如何协同工作的。\n\
  \n**提示**\n\n如果你需要为简单的云环境制作原型，可以使用“网络快速入门”向导。OCI 控制台不仅会创建一个 VCN，还会添加最常见的子资源，如互联网网关、路由规则和子网。当你想快速测试某些功能且不需要特殊的\
  \ VCN 设置时，这会很有帮助。\n\n### 互联网网关\n\n*互联网网关*是一种虚拟路由器，它为公共子网中的计算实例提供与互联网的连接。它必须在路由规则中被定义为目标；否则，计算实例将不知道将其出站数据包发送到哪里。让我们从配置一个新的互联网网关开始。以下是使用\
  \ OCI 控制台进行操作的步骤：\n\n1.  导航至菜单 ➤ 网络 ➤ 虚拟云网络。\n2.  确保已选择`Sandbox`隔离区。\n3.  点击你的 VCN\
  \ 名称。\n4.  在“资源”菜单中点击“互联网网关”。\n5.  选择“创建互联网网关”。\n6.  提供一个可选的显示名称（`uuid-igw`）。\n\
  7.  点击“创建互联网网关”。\n\n图 2-12 展示了 OCI 控制台的互联网网关创建向导。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig12_HTML.png](img/478313_1_En_2_Fig12_HTML.png)\n\
  \n图 2-12\n创建新的互联网网关\n\n### 路由表\n\n如果我说*路由表*存储了 VCN 的路由规则，这不会令人意外。一条路由规则定义了如何引导那些注定要离开\
  \ VCN 的出站流量。在我们的例子中，我们必须定义一条规则，以正确引导所有发送到不属于 VCN 地址范围的 IP 地址的数据包。用 IPv4 的术语来说，`0.0.0.0/0`表示所有地址，这将是我们用于路由规则目标\
  \ CIDR 块的值。我们还将把刚刚配置的互联网网关设置为这条规则的目标。\n\nVCN 默认自带一个空的路由表资源。以下是使用 OCI 控制台向现有的默认路由表添加新路由规则的方法：\n\
  \n1.  导航至菜单 ➤ 网络 ➤ 虚拟云网络。\n2.  确保已选择`Sandbox`隔离区。\n3.  点击你的 VCN 名称。\n4.  在“资源”菜单中点击“路由表”。\n\
  5.  点击默认路由表的名称。\n6.  点击“添加路由规则”。\n7.  在“目标类型”选择框中选择“互联网网关”。\n8.  在“目标 CIDR 块”中填入`0.0.0.0/0`。\n\
  9.  在“目标互联网网关”中选择`uuid-igw`。\n10.  点击“添加路由规则”。\n\n图 2-13 展示了 OCI 控制台中的“添加路由规则”屏幕。\n\
  \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig13_HTML.jpg](img/478313_1_En_2_Fig13_HTML.jpg)\n\
  \n图 2-13\nOCI 控制台中的编辑路由规则屏幕\n\n\n\n### 安全列表\n\n我们已经处理了虚拟网络、虚拟路由器和虚拟路由表。现在是时候添加一些安全措施了。每个\
  \ VCN 子网都必须至少有一个 `security list`（安全列表），它是一组安全规则的集合。你可以将这些规则视为虚拟防火墙的附加层，独立于你在每个单独计算实例上控制的操作系统防火墙。在请求到达计算实例的虚拟网络接口之前，会强制执行安全规则。\n\
  \n根据流量方向，有两种类型的安全规则：\n*   `Ingress`（入站规则），验证进入 VCN 的入站流量。\n*   `Egress`（出站规则），验证从\
  \ VCN 出去的出站流量。\n\nVCN 附带一个默认的 `security list` 资源，其中包含一些基本规则，允许入站 SSH 和基本的 ICMP 流量以及所有出站流量。我们仍然需要添加一条规则，允许在\
  \ UUID 服务端口 (`5000`) 上的入站流量。以下是使用 OCI 控制台向现有安全列表添加新安全规则的方法：\n\n1.  转到 Menu ➤ Networking\
  \ ➤ Virtual Cloud Networks。\n2.  确保选中 `Sandbox` 隔间。\n3.  点击你的 VCN 名称。\n4.  在 Resources\
  \ 菜单中点击 `Security Lists`（安全列表）。\n5.  点击默认安全列表的名称。\n6.  在 Resources 菜单中选择 `Ingress\
  \ Rules`（入站规则）。\n7.  点击 `Add Ingress Rule`（添加入站规则）。\n8.  提供所需的值：\n    1.  在 Source\
  \ CIDR 中填入 `0.0.0.0/0`。\n    2.  在 Destination Port Range 中填入 `5000`。\n9.  点击 `Add\
  \ Ingress Rules`（添加入站规则）。\n\n图 2-14 展示了我们正在添加的新入站安全规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig14_HTML.jpg](img/478313_1_En_2_Fig14_HTML.jpg)\n\
  图 2-14\nOCI 控制台中的入站安全规则\n\n你可能想知道 Stateless 标签旁边的小复选框到底是什么意思。我们留空了这个复选框。结果，我们添加的新入站规则是一个\
  \ `stateful rule`（有状态规则）。每次通过这条有状态的入站规则接受端口 `5000` 上的入站流量（请求）时，相应的出站流量（回复）会自动放行，无需强制执行其他出站规则。如果你决定使用\
  \ `stateless rule`（无状态规则），你将还需要在相反方向创建另一条无状态规则来验证相关流量。\n\n有状态规则听起来像是完美的解决方案。那么为什么我们仍然要使用无状态规则呢？嗯，有状态规则需要连接跟踪，这会消耗资源并引入一些延迟。此外，每个计算实例在单个时刻可跟踪的连接数是有限制的。这就是黄金法则所说：如果你能够将你的安全规则设计为无状态规则，那就这样做。\n\
  \n图 2-15 展示了修订后的默认安全列表中现有的入站安全规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig15_HTML.jpg](img/478313_1_En_2_Fig15_HTML.jpg)\n\
  图 2-15\n在 OCI 控制台中查看入站安全规则\n\n图 2-16 展示了默认安全列表中现有的出站安全规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig16_HTML.jpg](img/478313_1_En_2_Fig16_HTML.jpg)\n\
  图 2-16\n在 OCI 控制台中查看出站安全规则\n\n到目前为止，我们已经配置了一个新的 VCN，启动了一个 Internet 网关，添加了一条新的路由规则以通过\
  \ Internet 网关引导出站流量，并创建了一条有状态的入站安全规则以允许端口 `5000` 上的所有传入 TCP 连接。接下来，我们将创建一个新的子网并配置一个新的虚拟机。\n\
  \n### 子网\n\n一个 VCN 被划分为一个或多个 `subnets`（子网）。我们将计算实例，或者更准确地说，它们的 `vNICs`（虚拟网络接口），附加到子网。你可能还记得，在定义新的\
  \ VCN 时，我们没有对可用性域做任何选择。而子网是你可以在你选择的某一个可用性域中明确创建的。所有在特定子网中创建的计算实例最终都必须在创建该子网的可用性域中运行。或者，也可以创建跨越给定区域中所有可用性域的子网。这种子网让你能够以更灵活的方式启动实例，推迟为实例选择可用性域。你将在第\
  \ 6 章中了解更多相关信息。目前，我们将坚持使用绑定到单个可用性域的子网。以下是使用 OCI 控制台创建新的 VCN 子网的方法：\n\n1.  转到 Menu\
  \ ➤ Networking ➤ Virtual Cloud Networks。\n2.  确保选中 `Sandbox` 隔间。\n3.  点击你的 VCN 名称。\n\
  4.  在 Resources 菜单中点击 `Subnets`（子网）。\n5.  点击 `Create Subnet`（创建子网）。\n6.  提供所需的值：\n\
  \    1.  填入 `a-net` 作为显示名称。\n    2.  选择 `Availability Domain-specific Subnet Type`（可用性域特定子网类型）。\n\
  \    3.  在你的区域中选择第一个可用性域（后缀为 AD-1）。\n    4.  填入 `192.168.1.0/28` 作为 CIDR 块。\n  \
  \  5.  确保选择了默认路由表。\n    6.  选择 `Public Subnet`（公共子网）选项。\n    7.  勾选 `Use DNS Hostnames\
  \ in this subnet`（在此子网中使用 DNS 主机名）。\n    8.  使用简短的单字符标签 `a` 作为子网的 DNS 标签。\n    9.\
  \  确保选择了默认 DHCP Options 设置。\n    10. 确保选择了默认安全列表。\n7.  点击 `Create Subnet`（创建子网）。\n\
  \n图 2-17 展示了 OCI 控制台 VCN 子网创建向导。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig17_HTML.jpg](img/478313_1_En_2_Fig17_HTML.jpg)\n\
  图 2-17\n在 OCI 控制台中创建 VCN 子网向导\n\n有两种类型的子网：\n*   `A public subnet`（公共子网）允许你为在此子网中配置的计算实例分配公共\
  \ IP 地址。你仍然可以在公共子网中创建没有公共 IP 地址的计算实例。\n*   `A private subnet`（私有子网）不允许你为在此子网中配置的计算实例分配公共\
  \ IP 地址。这些实例可以使用不同的方式与 Internet 和其他网络通信。你将在第 6 章中了解更多相关信息。\n\n\n### 计算实例\n\n现在，我们该在\
  \ Oracle Cloud Infrastructure 中配置第一个计算实例了。在本章前面描述的规划阶段，我们决定使用最小的虚拟机规格，即 `VM.Standard2.1`。我们还选择使用可用的最新版\
  \ Oracle Linux 7。在撰写本文时，这是 Oracle Linux 7.6，但您也可能会看到更新的次版本。目前，您的学习 compartment 中应该没有任何计算实例。图\
  \ 2-18 显示了 OCI 控制台中“实例”视图的空列表。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig18_HTML.jpg](img/478313_1_En_2_Fig18_HTML.jpg)\n\
  \n图 2-18：查看 OCI 控制台实例\n\n即使您自动化了某个基于云的虚拟机的整个启动过程，您可能仍然希望能够远程连接到该主机的命令行。对于基于 Linux\
  \ 的机器（如 Oracle Linux），我们将使用 SSH 公钥认证。如果您主要使用的是基于 Windows 的主机，这可能是您第一次听说 SSH。其原理相当简单。您生成一对相关的文件，即所谓的密钥。一个叫做私钥，另一个叫做公钥。您将公钥上传到云中的一个或多个\
  \ Linux 机器。为了验证您的远程终端连接，您需要私钥。OCI 控制台中的计算实例创建向导为我们提供了上传公钥的机会。\n\n**注意**\n\n本书中的代码片段已在\
  \ macOS 和 Windows Subsystem for Linux 上测试过。此外，所有命令都应适用于主流的 Linux 发行版。如果您使用 Windows\
  \ 且不想使用 Windows Subsystem for Linux，您随时可以在虚拟机上运行 Linux。而且，大多数代码片段也可能在 Windows 的\
  \ Git Bash 中运行。\n\n如果您想使用 RSA 算法创建新的 SSH 密钥对，只需执行此命令：\n\n```\n$ ssh-keygen -t rsa\
  \ -b 2048 -C michal@vm -f ~/oci_id_rsa\n```\n\n您可以选择使用密码保护您的私钥。每次使用私钥时，系统都会提示您输入密码。将生成两个文件：\n\
  \n*   `oci_id_rsa`，这是私钥。\n*   `oci_id_rsa.pub`，这是公钥。在 OCI 控制台中创建实例时，您将上传此文件。\n\n\
  图 2-19 展示了 SSH 密钥对的创建过程。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig19_HTML.jpg](img/478313_1_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19：创建 SSH 密钥对\n\n我们希望我们的 Oracle Linux 计算实例在机器启动并运行后，能够立即服务于 UUID 服务客户端。我们不希望执行任何手动安装或配置。我们将利用基础操作系统镜像中已预装在计算实例上的\
  \ `cloud-init` 包。`cloud-init` 的作用是在云实例首次启动时执行早期初始化。您的角色是在实例创建期间，以一种支持的格式上传一个 `用户数据`\
  \ 文件。清单 2-3 展示了 `cloud-config` YAML 格式的 `cloud-init` 用户数据。您可以在 `git/chapter02/cloud-init`\
  \ 目录中找到 `cloud-config` 文件。\n\n```yaml\n#cloud-config\nyum_repos:\n  ol7_developer_EPEL:\n\
  \    name: Oracle Linux $releasever Developement Packages ($basearch)\n    baseurl:\
  \ http://yum.oracle.com/repo/OracleLinux/OL7/developer_EPEL/$basearch/\n    enabled:\
  \ true\n    gpgcheck: true\n    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-oracle\n\
  package_upgrade: true\npackages:\n  - tree\n  - wget\n  - python36\n  - python36-pip\n\
  write_files:\n  - content: |\n      [Unit]\n      Description = Launching UUID Service\
  \ API\n      After = network.target\n      [Service]\n      Environment=FLASK_APP=/home/opc/uuidservice/app.py\n\
  \      Environment=LC_ALL=en_US.utf8\n      Environment=LANG=en_US.utf8\n      ExecStart\
  \ = /home/opc/uuidservice/venv/bin/flask run --host=0.0.0.0\n      User = opc\n\
  \      [Install]\n      WantedBy = multi-user.target\n    path: /etc/systemd/system/uuidservice.service\n\
  runcmd:\n  - [ \"mkdir\", \"-p\", \"/home/opc/uuidservice/venv\" ]\n  - [ \"chown\"\
  , \"opc:opc\", \"/home/opc/uuidservice\" ]\n  - [ \"python3\", \"-m\", \"venv\"\
  , \"/home/opc/uuidservice/venv\" ]\n  - [ \"/home/opc/uuidservice/venv/bin/python3\"\
  , \"-m\", \"pip\", \"install\", \"--upgrade\", \"pip\" ]\n  - [ \"/home/opc/uuidservice/venv/bin/python3\"\
  , \"-m\", \"pip\", \"install\", \"flask\" ]\n  - [ \"wget\", \"-qO\", \"/home/opc/uuidservice/app.py\"\
  , \"https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/uuid-service/app.py\
  \ \" ]\n  - [ \"firewall-offline-cmd\", \"--add-port=5000/tcp\" ]\n  - [ \"systemctl\"\
  , \"restart\", \"firewalld\" ]\n  - [ \"ln\", \"-s\", \"/etc/systemd/system/uuidservice.service\"\
  , \"/etc/systemd/system/multi-user.target.wants/uuidservice.service\" ]\n  - [ \"\
  systemctl\", \"enable\", \"uuidservice.service\" ]\n  - [ \"systemctl\", \"start\"\
  , \"uuidservice.service\" ]\nfinal_message: \"UUID Service API node is running,\
  \ after $UPTIME seconds\"\n```\n\n清单 2-3： `vm.config.yaml`\n\n稍后，您将把这个文件上传到 OCI\
  \ 控制台实例创建向导。首先，让我们了解一下它的作用。如果您仔细查看清单 2-3，会发现它由六个命名节组成。\n\n*   `yum_repos` 定义一个将要添加到\
  \ Yum 的新仓库。\n*   `package_upgrade` 触发系统范围的包更新。\n*   `packages` 列出了将在机器上安装的新包。\n\
  *   `write_files` 在给定路径使用提供的内容创建一个新文件。\n*   `runcmd` 按提供的顺序执行命令。\n*   `final_message`\
  \ 在处理完成时打印一条消息。\n\n但是，我们的云配置具体做了什么呢？首先，它将 Oracle Linux EPEL 仓库添加到 Yum。该仓库包含我们运行基于\
  \ Python 的 UUID 服务所需的 Python 3。`cloud-init` 将执行系统范围的包升级，并不仅安装 Python 3，还安装 `wget`\
  \ 和 `tree` 实用程序。另一个有趣的部分是 `write_files` 节，在我们的案例中，它创建了一个新的 systemd 单元文件。文件内容的创建方式使得\
  \ UUID 服务能够作为 systemd 服务运行。通过这种方式，我们能够遵循一种在 Linux 中将应用程序作为操作系统服务运行的标准化方法。最后但同样重要的是，`runcmd`\
  \ 节运行一系列命令。首先，为新的 Python 虚拟环境创建目录，然后使用 Python 3 的 `venv` 模块生成虚拟环境本身。接下来，在虚拟环境内部，我们升级\
  \ Python 包安装器 (`pip`) 并用它来安装 Flask。随后的步骤使用 `wget` 实用程序从本书相关的 GitHub 仓库下载 UUID 服务代码，并在操作系统防火墙中开放\
  \ 5000 端口。最后三个命令有效地链接、启用并启动了 systemd 服务。这样，UUID 服务就作为一个操作系统服务运行，并在每次重启时自动启动。\n\n\
  您可能想知道为什么命令被指定为数组。`cloud-init` 有两种运行命令的方式。如果命令像这样包装在数组中，它将通过操作系统调用直接作为一个新进程执行：\n\
  \n```yaml\nruncmd:\n  - [ \"mkdir\", \"-p\", \"/home/opc/uuidservice/venv\" ]\n\
  ```\n\n\n如果简单地写成这样的字符串，命令会先被写入一个文件，然后传递给操作系统 shell 进行处理：\n\n```\nruncmd:\n- mkdir\
  \ -p /home/opc/uuidservice/venv\n```\n\n虽然从性能角度来看，前一种方式可能被认为稍快一些，但只有后一种方式允许你使用管道组合多个命令，像这样：\n\
  \n```\nruncmd:\n- 'echo $(date) | tee /home/opc/datemarker'\n```\n\n在同一个 `runcmd`\
  \ 部分混合使用这两种风格是可以的。\n\n**提示**\n与其直接从清单 2-3 复制用户数据文件，我建议你从我的 GitHub 账户克隆与本书关联的 Git\
  \ 仓库，并使用在 `oci-book/chapter02/cloud-init` 找到的 cloud-init 用户数据文件。这样，如果将来有变动，你将能享受始终最新的代码。\n\
  \n现在，请准备好我们刚刚讨论的两个文件。\n- 公共 SSH 密钥\n- UUID 服务的用户数据文件\n\n我们已经准备好启动实例了。以下是你如何使用 OCI\
  \ 控制台创建新的计算实例：\n\n1.  转到菜单 ➤ 计算 ➤ 实例。\n2.  确保选择了 `Sandbox` 隔离区。\n3.  点击创建实例。\n4.\
  \  将你的实例命名为 **uuid-1**。\n5.  点击显示计算形状、网络和存储选项。\n6.  将映像源设置为最新的 Oracle Linux 基础映像，例如\
  \ Oracle Linux 7.6 或更新版本。\n7.  提供所需详细信息：\n    1.  选择你所在区域的第一个可用性域。\n    2.  将实例类型设置为虚拟机。\n\
  \    3.  选择 `VM.Standard2.1` 作为你的实例计算形状。\n8.  在“配置网络”部分，如图 2-22 所示：\n    1.  确保选择了你新建的\
  \ a-net 子网。\n    2.  勾选“分配公有 IP 地址”。\n9.  在“添加 SSH 密钥”部分：\n    1.  选择新生成的公钥（`oci_id_rsa.pub`），如图\
  \ 2-21 所示。\n10. 点击“显示高级选项”。\n11. 在高级选项下的“管理”选项卡上，如图 2-23 所示：\n    1.  选择清单 2-3 中显示的用户数据文件。你总能在我的\
  \ GitHub 账户的 [`https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/cloud-init/vm.config.yaml`](https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/cloud-init/vm.config.yaml)\
  \ 找到用户数据文件的最新版本。\n12. 在高级选项下的“网络”选项卡上，如图 2-24 所示：\n    1.  将私有 IP 地址设置为 **192.168.1.2**。\n\
  \    2.  将主机名设置为 **uuid1**。\n13. 点击“创建”。\n\n图 2-20 显示了 OCI 控制台中的实例创建视图。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig20_HTML.jpg](img/478313_1_En_2_Fig20_HTML.jpg)\n\
  *图 2-20. 在 OCI 控制台中创建新的计算实例*\n\n图 2-21 显示了 OCI 控制台实例创建向导中的 SSH 密钥上传部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig21_HTML.jpg](img/478313_1_En_2_Fig21_HTML.jpg)\n\
  *图 2-21. 在实例创建向导中上传 SSH 公钥*\n\n图 2-22 显示了 OCI 控制台实例创建向导中的网络配置部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig22_HTML.jpg](img/478313_1_En_2_Fig22_HTML.jpg)\n\
  *图 2-22. 在实例创建向导中配置网络*\n\n图 2-23 显示了 OCI 控制台实例创建向导中的用户数据上传部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig23_HTML.jpg](img/478313_1_En_2_Fig23_HTML.jpg)\n\
  *图 2-23. 在 OCI 控制台实例创建向导中上传用户数据*\n\n图 2-24 显示了 OCI 控制台实例创建向导中的高级网络配置部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig24_HTML.jpg](img/478313_1_En_2_Fig24_HTML.jpg)\n\
  *图 2-24. 在实例创建向导中配置高级网络*\n\n配置此计算形状和基础映像通常需要大约一分钟。我们已勾选了“分配公有 IP 地址”复选框；因此，附加到你实例上的主虚拟网络接口卡（vNIC）将从\
  \ Oracle Cloud 的公有 IPv4 地址池中获得一个分配的公有 IP 地址。只要子网的安全列表规则允许特定流量，你就可以使用此 IP 地址连接到实例。私有\
  \ IP 地址在虚拟云网络（VCN）内使用，以实现计算实例之间的本地通信。\n\n图 2-25 显示了 OCI 控制台中的计算实例配置过程。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig25_HTML.jpg](img/478313_1_En_2_Fig25_HTML.jpg)\n\
