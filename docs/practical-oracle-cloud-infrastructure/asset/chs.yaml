  图 7-26\n道路事件事实\n\n使用 `os object put` CLI 命令将所有四个事实文件上传到对象存储存储桶。记得像之前一样应用 `SANDBOX-USER`\
  \ 配置文件。你可以通过以下方式在 Bash shell `for` 循环中使用它：\n\n```\n$ for fact in `ls facts.*.csv`;\
  \ do echo $fact; oci os object put -bn roadadw-load --file $fact --profile SANDBOX-USER;\
