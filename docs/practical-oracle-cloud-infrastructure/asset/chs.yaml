  \n\n\n### 项目隔离区\n\n组织使用单个云账户（也称为*云租户*）来托管多个有时不相关且隔离的项目，这并不罕见。不同的云提供商提供了各种方法来分离不相关的资源。Oracle\
  \ Cloud Infrastructure 通过*隔离区*和*标签*来实现这一点。意识到这一点有助于规划，因为你可以轻松地将整个解决方案格局划分为更小、更细粒度、独立管理的架构片段，每个片段中的组件更少。这样，同一个云账户就可以用来托管众多项目的多个开发、测试和生产环境。图\
