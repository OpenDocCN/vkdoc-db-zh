  $ ls -1 *.csv\nfacts.16H1.csv\nfacts.16H2.csv\nfacts.17H1.csv\nfacts.17H2.csv\n\
  ```\n\n图 7-26 展示了保存事实表数据的逗号分隔值文件的结构。每条记录引用一个时间维度、一个道路维度和一个事件维度条目。例如，事实表源文件中的 `road_dim_id`\
  \ 列与 `ROAD_DIM` 表中 `segment_id` 列具有相同值的一条道路维度记录相匹配。维度信息列之后是定量数据列，这些列承载着道路事件发生情况以及相关的伤亡人数信息。\n\
