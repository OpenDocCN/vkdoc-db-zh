  *图 2-26. 在 OCI 控制台中查看正在运行的计算实例*\n\n## 测试应用程序\n\n云解决方案通常被设计和自动化，使得无需在终端中手动运行任何额外的初始化脚本。你从一开始就使用自定义映像和包含初始化指令的用户数据相结合的方式，以开箱即用的状态部署你的解决方案。这也适用于我们的\
  \ UUID 服务。一旦实例的启动过程完成并且 `cloud-init` 执行了所有用户数据指令，API 就启动并运行了。\n\n### SSH 连接\n\n\
  不过，让我在这里破个例。我想带你看看实例内部，而使用操作系统 shell 是再好不过的方式了。让我们使用 `ssh` 远程连接到 `uuid-1` 计算实例。你可以在实例详情中找到实例的公有\
  \ IP，如图 2-26 所示。在我的例子中，它是 `130.61.91.155`。尽管你将使用基于密钥的认证，但仍然需要指定你建立连接所用的用户名。对于 Oracle\
  \ Linux 和 CentOS，请使用 `opc` 用户名。对于 Ubuntu，请使用 `ubuntu` 用户名。\n\n```\n$ UUID1_INSTANCE=130.61.91.155\n\
  $ ssh -i ~/oci_id_rsa opc@$UUID1_INSTANCE\n```\n\n还有一件事，如果你在看到实例状态从“配置中”变为“运行中”后无法立即连接到终端，请不要惊讶。即使实例被称为“运行中”，启动\
  \ SSH 守护进程可能还需要几秒钟时间。\n\n**提示**\n如果你使用的是 Windows，我建议使用 Windows Subsystem for Linux、Linux\
  \ 客户机虚拟机或 Git Bash，以获得与使用 UNIX 平台相同的 `ssh` 体验。\n\n图 2-27 显示了如何连接到远程计算实例。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig27_HTML.jpg](img/478313_1_En_2_Fig27_HTML.jpg)\n\
  *图 2-27. 通过 SSH 连接到计算实例*\n\n恭喜，你刚刚进入了云空间。\n\n\n\n\n### 等待 cloud-init\n\n在采取任何操作之前，我们首先要确认用户数据指令是否已执行完毕。在清单\
  \ 2-3 的底部，你会看到 `final message`。顾名思义，这是 cloud-init 处理的最后一条指令。图 2-28 展示了在日志（`/var/log/cloud-init.log`）中找到该消息（\"\
  UUID Service API node is running\"）的最简单方法。一些 cloud-init 指令可能需要较长时间，特别是当它们从远程仓库下载或更新软件时。在我们的案例中，完成所有初始化步骤花了四分钟。这意味着什么？如果你看不到这条消息，就需要再等待一会儿。你可以使用\
  \ `tail -f` 命令，通过观察 `/var/log/cloud-init.log` 文件来监看进度。根据正在更新的软件包数量，此操作可能持续几分钟。在日志中看到此消息之前，请不要继续下一步，如图\
  \ 2-28 所示。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig28_HTML.jpg](img/478313_1_En_2_Fig28_HTML.jpg)\n\
  \n图 2-28\n\n通过 SSH 连接到计算实例\n\n```\n[opc@uuid1]$ sudo cat /var/log/cloud-init.log\
  \ | grep \"node is running\"\n```\n\n我们的服务真的在运行吗？眼见为实。你可以运行此命令来再次检查 systemd 服务状态：\n\
  \n```\n[opc@uuid1]$ sudo systemctl status uuidservice.service\n```\n\n图 2-29 显示了预期的输出。\n\
  \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig29_HTML.jpg](img/478313_1_En_2_Fig29_HTML.jpg)\n\
  \n图 2-29\n\nUUID 服务的预期 systemd 服务状态\n\n服务真的在监听端口 5000 吗？用这个命令检查：\n\n```\n[opc@uuid1]$\
  \ ss -nltp\n```\n\n图 2-30 显示了预期的输出。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig30_HTML.jpg](img/478313_1_En_2_Fig30_HTML.jpg)\n\
  \n图 2-30\n\n查看 UUID 服务监听连接的端口\n\n看起来我们的第一个云应用程序确实正在运行。\n\n### 开放端口\n\n在未来云项目中需要排查的典型问题通常与\
  \ VCN 安全规则和操作系统防火墙规则相关。仅仅为计算实例所连接的子网使用的安全列表添加一条 VCN 安全规则是不够的。你还需要在操作系统防火墙中打开所需的端口。如果我们查看上传到\
  \ `uuid-1` 实例的用户数据，你会清楚地看到我们添加了一条打开端口 5000 的规则。你可以在实例的 shell 中运行此命令来确认规则已创建：\n\n\
  ```\n[opc@uuid1]$ sudo firewall-cmd --list-ports\n```\n\n图 2-31 显示了预期的输出。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig31_HTML.jpg](img/478313_1_En_2_Fig31_HTML.jpg)\n\
  \n图 2-31\n\n列出 uuid-1 上的开放端口\n\n现在，你可以通过执行 `exit` 命令断开与实例的连接。\n\n### API 测试\n\n\
  终于到了！是时候执行一个简单的冒烟测试，看看 UUID 服务是否真的在云中可用。我们正在处理一个 REST API，它只包含一个资源 `identifiers`，并且只支持一种方法\
  \ `GET`。这再简单不过了。在我们的首次尝试中，将使用 `curl` 命令。它在 Mac/Linux 控制台、Windows Subsystem for Linux\
  \ 和 Windows 的 GitBash 上都可用。请断开与云实例的连接，并发出以下命令，根据你的实例所附加的公网 IP 进行调整：\n\n```\n$ curl\
  \ -is $UUID1_INSTANCE:5000/identifiers\n```\n\n你应该会看到类似图 2-32 的内容。除了 IP 地址，`uuid`\
  \ 元素会有所不同，因为按定义它应该是唯一的，不是吗？\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig32_HTML.jpg](img/478313_1_En_2_Fig32_HTML.jpg)\n\
  \n图 2-32\n\n使用 curl 测试 UUID 服务 API\n\n如果你更喜欢像 Postman 这样的图形化工具，你会看到类似图 2-33 的内容。\n\
  \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig33_HTML.jpg](img/478313_1_En_2_Fig33_HTML.jpg)\n\
  \n图 2-33\n\n使用 Postman 测试 UUID API\n\n干得好！你已经达到了应用程序运行并成功测试的阶段。总结一下，我们设法配置了一个带有互联网网关的新\
  \ VCN，创建了一个新的公有子网，并添加了一条新的路由规则以通过互联网网关引导出站流量，以及一条安全规则以允许到任何应用此规则的计算实例上端口 5000 的入站\
  \ TCP 流量。在首次启动时，计算实例下载了所有必需的软件包，创建了 Python 虚拟环境，从 GitHub 下载了 UUID 服务代码，并为应用程序安装了一个新的\
  \ systemd 服务。图 2-34 展示了我们所构建内容的基础设施示意图。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig34_HTML.jpg](img/478313_1_En_2_Fig34_HTML.jpg)\n\
  \n图 2-34\n\n单 UUID 服务 API 节点基础设施示意图\n\n在下一节中，你将手动横向扩展 API。这意味着什么？你将在另一个可用性域中创建第二个实例，并在两个实例之上创建一个负载均衡器。这样，设置将具备容错能力。\n\
  \n### 横向扩展\n\n*横向扩展*一个应用程序意味着添加更多通常是相同类型的实例。这是描述水平扩展的另一个术语。你想要扩展应用程序的原因有两个：\n\n\
  *   提高处理吞吐能力\n*   增加容错能力\n\n单个实例永远不足以提供可靠的云 API。然而，仍然可能出问题，摧毁你孤立的应用程序节点。如果你有多个执行相同职责的节点，并且分布在各个数据中心，那么即使单个数据中心发生故障，你也可能永远不会经历完全停机。此外，如果你有更多相同类型的实例，就可以并行处理更多的请求。事情就这么简单。\n\
  \n图 2-35 展示了水平扩展。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig35_HTML.jpg](img/478313_1_En_2_Fig35_HTML.jpg)\n\
  \n图 2-35\n\n水平扩展应用程序\n\n基本的云概念之一是自动伸缩。*自动伸缩* 发生在云控制平面根据变化的指标（如请求数或 CPU 利用率）动态地通过添加或移除实例节点来水平扩展应用程序时。我们将在本书后面更详细地讨论自动伸缩。在本节中，我将向你展示如何使用自定义镜像手动扩展应用程序。\n\
  \n\n\n### 自定义镜像\n\n一个`image`（镜像）是一个模板，指定了操作系统以及在实例启动期间必须预安装的任何附加软件。Oracle Cloud\
  \ Infrastructure 附带了一些包含不同操作系统的基础镜像。您可以基于选定的操作系统镜像配置一个实例，安装您选择的软件，执行一些额外的配置，并基于此实例创建一个新的`custom\
  \ image`（自定义镜像）。通过这种方式，您将能够重用您的自定义软件栈配置来启动其他计算实例。\n\n如果您有一个正在运行的计算实例，您可以基于该实例创建一个新的自定义镜像。图\
  \ 2-36 显示了您可以在计算实例上执行的操作。其中之一是“创建自定义镜像”。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig36_HTML.jpg](img/478313_1_En_2_Fig36_HTML.jpg)\n\
  \n图 2-36\n\n可用的计算实例操作\n\n以下是您如何基于现有的计算实例创建新的自定义镜像：\n\n1.  转到`Menu ➤ Compute ➤ Instances`（菜单\
  \ ➤ 计算 ➤ 实例）。\n2.  确保选择了`Sandbox` compartment（ compartment）。\n3.  单击我们的计算实例的名称。\n\
  4.  单击`Actions ➤ Create Custom Image`（操作 ➤ 创建自定义镜像）以打开自定义镜像向导。\n5.  为您的新自定义镜像提供一个名称。\n\
  6.  单击`Create Custom Image`（创建自定义镜像）。\n\n    Tip 考虑在您的自定义镜像名称后附加用于创建该自定义镜像的原始镜像的名称。\n\
  \n图 2-37 显示了 OCI 控制台中的自定义镜像创建向导。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig37_HTML.jpg](img/478313_1_En_2_Fig37_HTML.jpg)\n\
  \n图 2-37\n\n在 OCI 控制台中查看自定义镜像创建向导\n\n如果您决定基于某个特定的计算实例创建自定义镜像，在构建镜像期间，该实例将被离线。镜像创建完成后，计算实例将再次启动。\n\
  \n图 2-38 显示了在创建镜像时，作为新自定义镜像基础的计算实例。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig38_HTML.jpg](img/478313_1_En_2_Fig38_HTML.jpg)\n\
  \n图 2-38\n\n在 OCI 控制台实例列表中创建自定义镜像\n\n图 2-39 显示了正在创建中的新自定义镜像。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig39_HTML.jpg](img/478313_1_En_2_Fig39_HTML.jpg)\n\
  \n图 2-39\n\n在 OCI 控制台镜像列表中创建自定义镜像\n\n我们将使用新创建的自定义镜像来启动第二个运行 UUID 服务 API 的实例。为了实现容错，我们将在不同的可用性域中部署第二个节点。让我们按照计划在第二个可用性域中创建一个新的子网。\n\
  \n### 不同可用性域中的子网\n\n我们将遵循几节前创建第一个子网时的相同步骤顺序。为了简单起见，我们将重用第一个子网正在使用的相同路由表和安全列表。\n\n\
  以下是您如何使用 OCI 控制台创建一个新的 VCN 子网：\n\n1.  转到`Menu ➤ Networking ➤ Virtual Cloud Networks`（菜单\
  \ ➤ 网络 ➤ 虚拟云网络）。\n2.  确保选择了`Sandbox` compartment（ compartment）。\n3.  单击您的 VCN 的名称。\n\
  4.  在“资源”菜单中单击`Subnets`（子网）。\n5.  单击`Create Subnet`（创建子网）。\n6.  提供所需的值：\n    1.\
  \  输入`b-net`作为显示名称。\n    2.  选择“可用性域特定子网类型”。\n    3.  在您的区域中选择第二个可用性域（后缀为 AD-2）。\n\
  \    4.  填入`192.168.1.16/28`作为 CIDR 块。\n    5.  确保选择了默认路由表。\n    6.  选择“公共子网”选项。\n\
  \    7.  选择“在此子网中使用 DNS 主机名”。\n    8.  使用一个字符的简短标签`b`作为 DNS 标签。\n    9.  确保选择了默认\
  \ DHCP 选项设置。\n    10. 确保选择了默认安全列表。\n7.  单击`Create`（创建）。\n\n在此阶段，您应该能够在两个不同的可用性域中看到两个子网，如图\
  \ 2-40 所示。请注意，每个子网都位于不同的可用性域中。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig40_HTML.jpg](img/478313_1_En_2_Fig40_HTML.jpg)\n\
  \n图 2-40\n\n在 OCI 控制台中显示的两个不同可用性域中的两个子网\n\n现在，我们将在这个新创建的子网中创建第二个 UUID 服务 API 实例。\n\
  \n\n\n## 第二个计算实例\n\n第二个计算实例将运行与第一个计算实例上相同的 systemd 服务。这次，我们不会上传任何用户数据，因为所有内容都已配置在我们从第一个计算实例创建的镜像中。图\
  \ 2-41 展示了镜像选择屏幕以及此次你需要做出的选择。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig41_HTML.jpg](img/478313_1_En_2_Fig41_HTML.jpg)\n\
  *图 2-41：在 OCI 控制台中选择自定义镜像*\n\n以下是使用 OCI 控制台创建第二个计算实例的步骤：\n\n1.  导航到 `菜单 ➤ 计算 ➤ 实例`。\n\
  2.  确保已选择 `Sandbox` 隔区。\n3.  点击 `创建实例`。\n4.  提供所需详细信息：\n    1.  将实例命名为 `uuid-2`。\n\
  \    2.  选择您区域中的第二个可用性域。\n    3.  将镜像源设置为新创建的自定义镜像；在我的例子中，其名称以 `UUID-API-Oracle-Linux-`\
  \ 开头。\n    4.  将实例类型设置为 `虚拟机`。\n    5.  选择 `VM.Standard2.1` 作为您的实例形状。\n5.  在 `配置网络`\
  \ 部分：\n    1.  确保选择了新的 `b-net` 子网。\n    2.  选择 `分配公网 IP 地址`。\n6.  在 `添加 SSH 密钥`\
  \ 部分：\n    1.  选择公钥（`oci_id_rsa.pub`），如图 2-21 所示。\n7.  点击 `显示高级选项`。\n8.  在 `高级选项`\
  \ 下的 `网络` 选项卡中，如图 2-24 所示：\n    1.  将 `私有 IP 地址` 设置为 `192.168.1.18`。\n    2.  将\
  \ `主机名` 设置为 `uuid2`。\n9.  点击 `创建`。\n\n**注意** 在这种情况下，无需上传 `cloud-config` 用户数据。自定义镜像已预装了\
  \ UUID API 服务，因为它是在 `uuid-1` 计算实例的基础上创建的。请将 `用户数据` 部分留空。\n\n图 2-42 展示了 OCI 控制台中的实例创建视图。请注意，这次我们使用的是第二个可用性域和自定义镜像。\n\
  \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig42_HTML.jpg](img/478313_1_En_2_Fig42_HTML.jpg)\n\
  *图 2-42：在 OCI 控制台中创建第二个计算实例*\n\n图 2-43 展示了高级网络配置部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig43_HTML.jpg](img/478313_1_En_2_Fig43_HTML.jpg)\n\
  *图 2-43：在 OCI 控制台实例创建向导中配置高级网络*\n\n一旦您在 OCI 控制台的实例创建向导中点击 `Create` 按钮确认了第二个实例的参数选择，配置过程就会开始。这次，UUID\
  \ 服务将通过自定义镜像预先安装好，并且没有涉及长时间运行的用户数据。因此，第二个实例应该启动得更快。让我们等待直到看到实例正在运行，如图 2-44 所示。\n\
  \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig44_HTML.jpg](img/478313_1_En_2_Fig44_HTML.jpg)\n\
  *图 2-44：在 OCI 控制台中查看正在运行的第二个计算实例*\n\n您现在可以在两个节点上测试 API。请记得替换公网 IP 地址，并在两种情况下都使用分配给您的实例的地址。\n\
  \n```bash\n$ UUID2_INSTANCE=130.61.23.13\n$ curl $UUID1_INSTANCE:5000/identifiers\n\
  {\n\"generator\":\"uuid1\",\n\"uuid\":\"bc85b59f-cf0f-4035-a730-c25111db00ec\"\n\
  }\n$ curl $UUID2_INSTANCE:5000/identifiers\n{\n\"generator\":\"uuid2\",\n\"uuid\"\
  :\"6eca06e0-65f2-444b-acb8-b9c46741dc72\"\n}\n```\n\n图 2-45 显示两个实例均可操作。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig45_HTML.jpg](img/478313_1_En_2_Fig45_HTML.jpg)\n\
  *图 2-45：测试 UUID 服务 API 的两个节点*\n\n在本节中，我们部署并测试了运行我们应用程序的第二个节点。图 2-46 使用 Oracle Cloud\
  \ Infrastructure 符号展示了当前的应用程序基础架构。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig46_HTML.jpg](img/478313_1_En_2_Fig46_HTML.jpg)\n\
  *图 2-46：基础架构图上的 UUID API 的两个节点*\n\n当前设置有一个主要痛点。API 使用者（即调用 API 的应用程序）必须明确指定特定虚拟机的公网\
  \ IP 地址。采用这种方法，随着 API 的向外扩展，您会产生更多带有不同公网 IP 地址的无关端点。这不是设计高可用性解决方案的最佳方式。幸运的是，我们可以通过添加负载均衡器来改变这一点。\n\
  \n\n\n### 负载均衡器\n\n负载均衡器为活动服务器或工作节点提供单一入口点和流量分发。我们将使用一个面向互联网的，即所谓的公共负载均衡器，它使用一个公共浮动\
  \ IP 来支持故障转移机制。这意味着您需要启动一对负载均衡器节点，每个节点位于不同的可用性域中。在任何给定时间，只有一个 LB 节点处于活动状态，并将流量转发到\
  \ UUID 服务 API 节点。第二个 LB 节点保持在备用模式。如果活动的 LB 节点发生故障，备用的 LB 节点将检测到此情况，并宣布自己为活动节点和当前\
  \ IP 地址持有者。\n\n图 2-47 展示了容错公共负载均衡器的工作原理。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig47_HTML.jpg](img/478313_1_En_2_Fig47_HTML.jpg)\n\
  \n图 2-47\n容错公共 IP 负载均衡器\n\n公共负载均衡器需要两个专用的公共子网。我们将在托管 UUID 服务 API 节点的同一个 VCN 中创建它们。这次，我们将使用一个新的安全列表，因为其规则将与我们用于应用程序节点子网的默认安全列表不同。\n\
  \n请创建一个名为 `lb-sl` 的新安全列表。以下是使用 OCI 控制台创建新安全列表的方法：\n\n表 2-2\n负载均衡器子网的出站安全规则\n\n|\
  \   | 类型       | 协议 | 源              | 目标            |\n|---|------------|------|-----------------|-----------------|\n\
  | 1 | 无状态     | TCP  | 所有端口        | 192.168.1.0/24 端口 5000 |\n\n表 2-1\n负载均衡器子网的入站安全规则\n\
  \n|   | 类型     | 协议 | 源              | 目标        |\n|---|----------|------|-----------------|-------------|\n\
  | 1 | 有状态   | TCP  | 0.0.0.0/0 所有端口 | 端口 80     |\n| 2 | 无状态   | TCP  | 192.168.1.0/24\
  \ 端口 5000 | 所有端口 |\n\n1.  转到 菜单 ➤ 网络 ing ➤ 虚拟云网络。\n2.  确保选择了 `Sandbox` 隔室。\n3. \
  \ 单击您的 VCN 名称。\n4.  在资源菜单中单击 安全列表。\n5.  单击 创建安全列表。\n6.  给它一个名称：`lb-sl`。\n7.  按照表\
  \ 2-1 的定义创建入站规则。其中一条规则必须是无状态的。\n8.  按照表 2-2 的定义创建出站规则。该规则必须是无状态的。\n9.  单击 创建安全列表。\n\
  \n图 2-48 展示了入站规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig48_HTML.jpg](img/478313_1_En_2_Fig48_HTML.jpg)\n\
  \n图 2-48\n负载均衡器子网的入站规则\n\n图 2-49 展示了预期的出站规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig49_HTML.jpg](img/478313_1_En_2_Fig49_HTML.jpg)\n\
  \n图 2-49\n负载均衡器子网的出站规则\n\n我们现在将在两个不同的可用性域中为容错公共负载均衡器节点对创建两个子网。\n\n表 2-3\n负载均衡器子网\n\
  \n| 名称 | AD | CIDR 块        | DNS 标签 | 安全列表 |\n|------|----|---------------|---------|----------|\n\
  | c-net| 1  | 192.168.1.32/29 | c       | lb-sl    |\n| d-net| 2  | 192.168.1.40/29\
  \ | d       | lb-sl    |\n\n1.  转到 菜单 ➤ 网络 ing ➤ 虚拟云网络。\n2.  确保选择了 `Sandbox` 隔室。\n\
  3.  单击您的 VCN 名称。\n4.  在资源菜单中单击 子网。\n5.  按照表 2-3 的定义，添加两个新的公共子网。\n\n我们刚刚为高可用公共负载均衡器准备好了网络设置。连同\
  \ UUID API 子网，您应该在 VCN 中看到四个子网，如图 2-50 所示。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig50_HTML.jpg](img/478313_1_En_2_Fig50_HTML.jpg)\n\
  \n图 2-50\nVCN 中的子网\n\n实际上，负载均衡功能由一组协作的 OCI 资源提供，这些资源被封装在一个负载均衡器资源中。负载均衡器将请求转发到的计算节点或私有\
  \ IP 地址被视为后端，并被分组到一个后端集资源中。后端集不仅仅是一个简单的后端分组，因为它还定义了运行状况检查策略。运行状况检查策略决定了如何判断后端是正常运行还是发生故障。最后，需要一个监听器来接受入站流量；否则，来自互联网的请求将无法流入公共负载均衡器。图\
  \ 2-51 展示了负载均衡器 OCI 资源的概念组成。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig51_HTML.jpg](img/478313_1_En_2_Fig51_HTML.jpg)\n\
  \n图 2-51\n负载均衡器 OCI 资源\n\n概述了负载均衡器的组成资源后，让我们来创建它们。使用 OCI 控制台时，您可以利用一个三步合一的负载均衡器创建向导。以下是创建新的负载均衡器资源的方法：\n\
  \n1.  转到 菜单 ➤ 网络 ing ➤ 负载均衡器。\n2.  确保选择了 `Sandbox` 隔室。\n3.  单击 创建负载均衡器。\n4.  在 “添加详细信息”\
  \ 步骤中，提供配置，如图 2-52 所示：\n    1.  将负载均衡器命名为 `uuid-lb`。\n    2.  将可见性设置为 公共。\n    3.\
  \  选择小规格：100Mbps。\n    4.  选择 公共负载均衡器。\n    5.  将 VCN 设置为 `uuid-vcn` VCN。\n    6.\
  \  选择负载均衡器子网：`c-net` 和 `d-net`。\n5.  单击 下一步。\n6.  在 “选择后端” 步骤中，提供配置，如图 2-53 所示：\n\
  \    1.  确保选择了 加权轮询。\n    2.  单击 添加后端 并选择两个计算实例。\n    3.  对于每个后端实例，将端口更改为 `5000`。\n\
  7.  仍在 “选择后端” 步骤中，提供运行状况检查策略配置，如图 2-54 所示：\n    1.  确保协议设置为 HTTP。\n    2.  将端口设置为\
  \ 5000。\n    3.  将 URL 路径设置为 `/identifiers`。\n    4.  确保状态代码设置为 200。\n8.  单击 下一步。\n\
  9.  在 “配置监听器” 步骤中，提供配置，如图 2-55 所示：\n    1.  选择 HTTP 协议并将端口设置为 80。\n    2.  将监听器命名为\
  \ `uuid-lb-listener`。\n10. 单击 创建负载均衡器。\n\n图 2-52 展示了 OCI 控制台负载均衡器创建向导的 “负载均衡器添加详细信息”\
  \ 步骤中预期的负载均衡器配置。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig52_HTML.jpg](img/478313_1_En_2_Fig52_HTML.jpg)\n\
  \n图 2-52\nOCI 控制台负载均衡器向导中的 “添加详细信息” 步骤\n\n图 2-53 展示了 OCI 控制台负载均衡器创建向导 “选择后端” 步骤中预期负载均衡器配置的第一部分。\n\
  \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig53_HTML.jpg](img/478313_1_En_2_Fig53_HTML.jpg)\n\
  \n图 2-53\nOCI 控制台负载均衡器向导中的 “选择后端” 步骤\n\n图 2-54 展示了 OCI 控制台负载均衡器创建向导 “选择后端” 步骤中预期负载均衡器配置的第二部分。\n\
  \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig54_HTML.jpg](img/478313_1_En_2_Fig54_HTML.jpg)\n\
  \n图 2-54\n“选择后端” 步骤中的运行状况检查设置\n\n图 2-55 展示了 OCI 控制台负载均衡器创建向导 “配置监听器” 步骤中预期的负载均衡器后端集配置。\n\
  \n\n\n![图 2-55: OCI 控制台负载均衡器向导中的“配置监听器”步骤](img/478313_1_En_2_Fig55_HTML.jpg)\n\n\
  Oracle Cloud Infrastructure 现在将预置一个新的公共负载均衡器，并从 Oracle Cloud 地址池中分配一个公共 IP 地址。我们必须等待预置操作完成，才能看到类似图\
  \ 2-56 的内容。\n\n![图 2-56: 在 OCI 控制台中查看负载均衡器信息](img/478313_1_En_2_Fig56_HTML.jpg)\n\
  \n我们定义的健康检查配置负责监控和检测所有已注册的负载均衡后端是否按预期运行。`UUID` 服务已作为一个简单的 `REST API` 实现。`REST API`\
  \ 利用 `HTTP` 标准方法，通过 API 管理的资源提供 `CRUD` 操作。这就是为什么执行 `REST API` 健康检查最自然的方式是使用 `HTTP\
  \ GET` 来测试其某个资源。我们刚刚配置的健康检查策略，将每 10 秒向每个后端服务器发送一个 `HTTP GET /identifiers` 请求。如果它在三秒内没有收到\
  \ `HTTP 200 OK` 响应，它将重试两次，并将该节点标记为不可用。负载均衡器预置后，可能需要片刻时间才能确认后端运行状况良好。\n\n> **提示**\n\
  > 如果您观察到 `Unknown` 状态持续较长时间，请不要担心，继续测试负载均衡器。在某些情况下，负载均衡器启动后，可能需要几分钟时间才能从 `Unknown`\
  \ 状态转变为 `OK` 状态。\n\n如果需要，您可以检查每个后端的状态，如图 2-57 所示。操作步骤如下：\n\n![图 2-57: 在 OCI 控制台中查看后端运行状况标志](img/478313_1_En_2_Fig57_HTML.jpg)\n\
  \n1.  转到菜单 ➤ 网络 ➤ 负载均衡器。\n2.  点击您的负载均衡器名称。\n3.  在“资源”部分，点击“后端集”。\n4.  点击后端集的名称。\n\
  5.  在“资源”部分，点击“后端”。\n\n如果您发现某个后端处于 `Critical` 状态，请按照此检查清单进行故障排除：\n\n*   目标计算节点正在运行。\n\
  *   `UUID Service systemd service` 已启动。\n*   操作系统防火墙接受端口 `5000` 上的连接。\n*   默认安全列表中存在允许传入流量访问端口\
  \ `5000` 的入站有状态规则。\n*   负载均衡器子网安全列表中的规则是正确的。\n*   负载均衡器设置的后端定义正确。\n*   负载均衡器后端集健康检查配置正确。\n\
  \n总而言之，过一会儿，您将能够执行本章的最终测试。为此，您需要识别您的负载均衡器从 Oracle Cloud 地址池获得的公共 IP 地址。在我的例子中，它是\
  \ `132.145.240.240`。当您向负载均衡器端口 `80` 上的 `/identifiers` 资源发送一些请求时，它们将以轮询方式均匀路由到 `UUID`\
  \ 服务 `API` 的第一个 (`uuid-1`) 和第二个 (`uuid-2`) 实例。每次向负载均衡器发送请求时，它都会由两个 `UUID` 服务实例之一交替提供服务，如每个响应中的\
  \ `generator` JSON 元素所示。\n\n```bash\n$ LB_INSTANCE=132.145.240.101\n$ curl $LB_INSTANCE:80/identifiers\n\
  {\n\"generator\":\"uuid1\",\n\"uuid\":\"709f6aac-0720-461a-9fd3-732748253bca\"\n\
  }\n$ curl $LB_INSTANCE:80/identifiers\n{\n\"generator\":\"uuid2\",\n\"uuid\":\"\
  cfe329bd-cd2c-49a6-ae4f-29f23bf5d2fe\"\n}\n$ curl $LB_INSTANCE:80/identifiers\n\
  {\n\"generator\":\"uuid1\",\n\"uuid\":\"e22b5858-e70f-46ab-bd16-0da3d55aca73\"\n\
  }\n$ curl $LB_INSTANCE:80/identifiers\n{\n\"generator\":\"uuid2\",\n\"uuid\":\"\
  1c9662d9-1426-4e2d-bae3-bd4207dbd73b\"\n}\n```\n\n我们已经完成了练习。在继续之前，让我们终止云资源。您现在可以终止本章中创建的所有资源，但我们将要在下一章中使用的学习\
  \ compartment 除外。\n\n## 清理\n\n为避免不必要的成本或试用额度的消耗，无论它们多么低廉，让我们终止本章创建的资源。某些资源依赖于其他资源；因此，在删除时遵循所需的顺序很重要。在后续章节中这不会成为问题，因为在许多情况下，自动化将一次性为我们完成操作。然而，在本章中，我们在\
  \ `OCI Console` 中手动完成所有操作，因此必须遵循以下步骤：\n\n1.  转到菜单 ➤ 网络 ➤ 负载均衡器。\n2.  确保选择了 `Sandbox`\
  \ compartment。\n3.  点击三点菜单，点击“终止”，并等待资源被移除。\n\n图 2-58 展示了如何终止负载均衡器。\n\n![图 2-58:\
  \ 在 OCI 控制台中终止负载均衡器](img/478313_1_En_2_Fig58_HTML.jpg)\n\n现在，以类似的方式，使用 `OCI Console`\
  \ 终止（或删除）剩余的资源。\n\n*   两个计算实例（菜单 ➤ 计算 ➤ 实例）\n*   自定义镜像（菜单 ➤ 计算 ➤ 自定义镜像）\n*   `VCN`\
  \ 及关联的网络资源\n\n> **提示** 当您终止计算实例时，请确保永久删除其启动卷。如果您忘记了这样做，以后可以在 计算 ➤ 启动卷 中删除被遗弃的启动卷。\n\
  \n本章的练习到此结束。\n\n## 总结\n\n在本章中，我引导您完成了在 Oracle Cloud Infrastructure 上规划和运行一个简单云应用程序的过程。首先，我们花了一些时间分析应用程序设计，并勾勒出所需的云基础设施资源。随后，我们使用\
  \ `OCI Console` 逐步预置了每个云资源。应用程序本身通过使用 `cloud-init` 驱动的自动化在实例上构建和运行。接下来，我们将应用程序横向扩展，并添加了一个公共负载均衡器，以将负载均匀分配到承载该应用程序的两个计算节点上。最后，我向您展示了如何执行清理并移除资源。\n\
  \n您可能觉得本章的练习包含了数量庞大的手动步骤。嗯，我警告过您，我想向您展示手动方式，并教您如何操作 `OCI Console`。下一章将介绍 `OCI CLI`\
  \ 和 `Terraform` 自动化，您将体验如何以代码形式更快地管理您的云基础设施。请继续阅读。\n\n\n\n"
- "# 3. 自动化云基础设施\n\n云计算离不开*自动化*。快速自服务地供给池化云资源（计算实例、存储、虚拟网络等）这一核心理念，正是建立在一个前提之上：从头到尾的整个供给过程都是完全自动化的。正因整个过程不涉及任何手动步骤，我们才能以脚本和模板的形式来表示完整的云基础设施，这些脚本和模板用于远程管理云资源。图\
  \ 3-1 通过思维导图展示了通过自动化实现的一些相关操作特性。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig1_HTML.jpg](img/478313_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n\n`脚本和模板`可被视为源代码，并存储在像`Git`这样的版本控制系统中。这不仅促进了团队协作，也使得增强功能的交付更快，从而能够更快地解决问题。新团队成员只需阅读那些始终更新的代码，就能理解基础设施架构，这与传统文档形成鲜明对比——传统文档很容易随着时间的推移而与实际情况产生偏差。你准备好脚本和模板后，它们在执行时，会通过下一节将介绍的接口与所谓的云管理平面进行交互。云管理平面的供给引擎已经由你的云提供商实现了自动化。它负责在云中创建、更新和删除资源。再次强调，整个过程绝对没有任何手动步骤。所有这些因素综合起来，实现了尽可能短的供给时间、可重复性和自服务。\n\
  \n你不仅可以，实际上也应该超越仅仅自动化云基础设施管理。云基础设施是你基于云的解决方案的一部分，同时也是其先决条件。你确实是在云基础设施上运行业务或平台软件。因此，自动化整个解决方案的交付过程更有意义。想象一下，你的开发者提交了一段应用程序代码变更，有效地增加了一个新服务。该服务监听一个此前未被使用的端口。同一提交可以包含一个基础设施脚本或模板的变更，该变更会添加一个新的安全列表以允许该端口的入站流量。构建服务器会检测到新的代码修订版，它会创建新的安全规则，并在测试环境中重新供给一个或多个承载该服务的虚拟机或容器。最后，执行集成和回归测试以评估变更的质量。通过这种方式，一个简单的代码变更就能产生一个在云中运行的、经过测试的部署。这被称为*持续交付*。这个过程不必终止于测试环境。一些用例会受益于直接在生产环境中发布有限数量的最新版本的服务实例，这被称为*金丝雀发布*，以评估它们在真实世界条件下的行为。\n\
  \n自动化是持续交付的关键推动力，它可以成为你组织中*DevOps 文化*的重要组成部分。这是什么意思，又有什么好处呢？仅看名称，Dev 部分源于*development*（开发）一词，Ops\
  \ 部分源于*operations*（运维）一词。在传统模式中，开发人员将可交付成果交给运维团队，运维团队成员准备配置并将制品部署到特定环境。这种级联方式常常导致误解和错误，使得交付过程比应有的时间更长。DevOps\
  \ 打破了这种方法，融合了这两个角色。与传统运维领域相关的流程现在已完全自动化，并且常常已经由应用开发人员的触发操作所启动。在流行的理解中，担任 DevOps\
  \ 角色的人负责构建和维护前述的自动化流程。彻底自动化带来的可重复性，降低了以往与手动操作相关的错误风险。此外，通过自动化重复性手动任务所节省的时间，可以用来增强对运行中系统的洞察，并对整个应用格局提供更好的治理。*DevOps\
  \ 文化*这一术语实际上更为宽泛，远远超出了本书的范围。\n\n## 云管理平面\n\n为了履行其职责，云平台提供了一套安全的接口，你可以通过与这些接口交互来控制你的云资产。这些接口也被称为`API`，它们是你通往*云管理平面*的门户。该引擎基于数据中心的物理和虚拟设备来提供云资源。客户端向`API`端点发送请求，以远程执行云中的各种操作。\n\
  \n你需要记住，云从定义上讲是多租户的。由于众多用户与同一组接口端点交互，该引擎不仅负责管理和监控云资产，还必须确保不同租户（云账户）使用的资源被妥善隔离。此外，`API`还负责保护云资产免遭未经授权的访问。这一理念在图\
  \ 3-2 中有概念性展示。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig2_HTML.jpg](img/478313_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\n云*管*理*平*面与多租户\n\n\n\n### Oracle Cloud Infrastructure API\n\n云提供商提供其云接口的最常见方式是以安全的\
  \ `REST APIs` 形式。云资源及其生命周期事件被表示为 REST 资源和对应的 HTTP 方法（`GET`、`PUT`、`POST`、`DELETE`）。一个成功认证和授权的客户端可以命令云管理平面代表其在一个或多个云资源上执行操作。这是通过通过\
  \ HTTPS 发送一个格式正确的请求来完成的。云管理平面验证请求并将其转换为在虚拟和/或物理资源上执行的一系列操作，以完成所请求的操作。\n\n从客户端的角度看，这在实际中是如何工作的？让我们快速看一下列表\
  \ 3-1，它展示了一个简化的 API 请求，最终将列出特定实例池的详细信息。为了增加此示例的清晰度，我使用了实例池云资源的 OCID（`{ic-id}`）和隔离区的\
  \ OCID（`{c-id}`）的参数占位符。在真实请求中，您需要用正确的 Oracle Cloud 标识符替换它们。\n\n```\nGET /20160918/instancePools/{ic-id}?compartmentId={c-id}\
  \ HTTP/1.1\nHost: iaas.eu-frankfurt-1.oraclecloud.com\nAccept: application/json\n\
  Authorization: ...\nListing 3-1\n简化的 API 请求\n```\n\n列表 3-1 所示的请求要求获取指定隔离区中一个给定实例池的实例池详细信息。REST\
  \ 资源的第一部分 `/20160918` 表示 Oracle Cloud Infrastructure API 的版本，而第二段，即 `instancePools`，清楚地表明了我们正在处理的云资源类型。\n\
  \n获取实例池详细信息的操作以同步方式执行，这意味着结果一旦收集完毕，响应就会立即传递。列表 3-2 显示了相应的响应。请注意，我缩短了 OCID 和请求 ID\
  \ 头以使结构更易读。\n\n```\nHTTP/1.1 200 OK\nContent-Type: application/json\nContent-Length:\
  \ 931\nopc-request-id: /D8613...\n{\n\"id\" : \"ocid1.instancepool....\",\n\"compartmentId\"\
  \ : \"ocid1.compartment....\",\n\"definedTags\" : { },\n\"displayName\" : \"instance-pool\"\
  ,\n\"freeformTags\" : { },\n\"instanceConfigurationId\" : \"ocid1.instanceconfiguration....\"\
  ,\n\"lifecycleState\" : \"RUNNING\",\n\"placementConfigurations\" : [ {\n\"availabilityDomain\"\
  \ : \"feDV:EU-FRANKFURT-1-AD-1\",\n\"primarySubnetId\" : \"ocid1.subnet....\"\n\
  }, {\n\"availabilityDomain\" : \"feDV:EU-FRANKFURT-1-AD-2\",\n\"primarySubnetId\"\
  \ : \"ocid1.subnet....\"\n} ],\n\"size\" : 4,\n\"timeCreated\" : \"2018-12-21T18:47:29.767Z\"\
  \n}\nListing 3-2\n简化的 API 响应\n```\n\n根据请求操作的类型，云管理平面引擎可能执行同步或异步操作。同步操作导致阻塞调用，这意味着客户端等待在相应响应中返回的结果。对于异步操作，您将立即收到一个响应，其中包含一个工作请求\
  \ ID，您可以用它来跟踪所请求操作的状态。在撰写本文时，有三项能力支持工作请求并以异步方式执行某些操作。\n\n*   Kubernetes 容器引擎\n*\
  \   对象存储\n*   负载均衡\n\n对这三项能力使用 API 需要在实现过程式配置脚本时做出仔细的设计决策。这在自定义 API 调用、SDK 和 CLI\
  \ 时适用。幸运的是，如果您使用 Terraform 的声明式方法将基础设施作为代码进行管理，则无需担心这个设计方面。\n\nAPI 旨在提供可在云资源上执行的最丰富的操作集。换句话说，如果您找不到特定操作的\
  \ API 资源，那么该操作要么当前不受支持，要么可以通过执行更细粒度的云资产操作的多个 API 调用序列来实现。\n\n提示\n\n您可以在 [`https://docs.cloud.oracle.com/iaas/api`](https://docs.cloud.oracle.com/iaas/api)\
  \ 找到可用的 Oracle Cloud Infrastructure REST API 的全面参考。\n\n### 保障 API 调用安全\n\n您可能想知道使用\
  \ REST API 进行云资源的远程管理有多安全。嗯，如果不安全，我想就不会有云计算了。我们需要简要讨论 API 调用安全性的三个方面。\n\n*   传输层安全\n\
  *   身份验证\n*   授权\n\n首先，通过公共互联网在 HTTPS 上传输的数据包是加密的。TLS 1.2 协议机制保护通信在传输过程中不被窃听或篡改。这个行业标准协议透明地提供\
  \ `传输层安全`，不需要云团队的介入。\n\n`身份验证`（验证请求发送者真实身份的方式）的实施需要不同的方法。每个请求必须使用发送者的私钥和 RSA-SHA256\
  \ 算法进行签名。签名最终包含在请求的 `授权` 头中。列表 3-3 显示了该头的详细结构，包括用户和租户特定数据的占位符。\n\n```\nAuthorization:\
  \ Signature version=\"1\",keyId=\"{tenancy-ocid}/{user-ocid}/{public-key-fingerprint}\"\
  ,algorithm=\"rsa-sha256\",headers=\"(request-target) date host\",signature=\"{signature}\"\
  \nListing 3-3\n带有请求签名的授权头\n```\n\n要生成签名，您首先需要构建一个 `签名字符串`，它由请求的部分组成，包括但不限于资源目标（如\
  \ `/20160918/vcns`）以及请求负载的哈希（如果存在）。然后使用私钥加密签名字符串，并使用 Base64 算法将其编码为文本。是的，这听起来有点复杂，但别担心。在日常工作中，您几乎不需要自己执行这些步骤，除非您真的想这样做。您几乎总是使用特定语言的软件开发工具包（SDK）或专门的配置工具（CLI、Terraform），它们会为您准备\
  \ `授权` 头并调用 OCI API。\n\n并非每个成功认证的用户都应被允许执行特定操作。例如，如果同一云账户下维护多个项目，您可能希望将项目 A 的资源与项目\
  \ B 的用户隔离开来。即使是单个项目，为特定用户组限制对特定资源集的访问权限仍然有意义。这将是 `授权` 函数的任务，它验证经过身份验证的用户真正有权执行什么操作。在下一章中，您将了解身份和访问管理用户、组和策略，这些共同让您为云账户配置授权机制。\n\
  \n在此阶段，至关重要的是强调每个 API 调用始终是以一个命名的 Oracle Cloud Infrastructure IAM 用户的名义进行的。对于每个请求，在\
  \ `授权` 头中，客户端声明一个租户 OCID、一个用户 OCID 以及一个为此特定 IAM 用户上传到 Oracle Cloud Infrastructure\
  \ 的公钥指纹。此外，同样作为头一部分的签名是使用相应的私钥加密的。这一切都导向一个结论：在签名 API 请求之前，您需要拥有一对密钥，称为 `API 签名密钥对`。公钥必须上传到\
  \ Oracle Cloud Infrastructure 并与您选择的用户关联。这样，OCI 将知道如何解密您的请求。\n\n\n\n### API 签名密钥\n\
  \n在本节中，我们将生成一个新的密钥对，它将用作 API 签名密钥对，并将公钥上传到 Oracle Cloud Infrastructure 中的特定 IAM\
  \ 用户下。这样，我们就能授权任何持有私钥的人使用 OCI API，并以该 IAM 用户的身份远程管理 OCI 资源。私钥将通过密码进行额外保护。每次尝试使用私钥时，系统都会提示您输入密码，除非您将其持久化保存在本地配置中。\n\
  \n> **注意**\n>\n> 本书中的代码片段已在 macOS 和 Windows Subsystem for Linux 上测试通过。此外，所有命令都应在主流\
  \ Linux 发行版上正常工作。如果您使用的是 Windows 且不想使用 Windows Subsystem for Linux，您随时可以在虚拟机（VM）上运行\
  \ Linux。再者，大多数代码片段也可能在 Windows 的 Git Bash 中正常工作。\n\n#### 生成密钥对\n\nAPI 签名密钥对必须是 PEM\
  \ 格式的 RSA 密钥对。PEM 格式使用人类可读的字符，这使得它比二进制格式稍微容易处理一些（尤其是复制公钥）。我们将使用 `openssl` 程序来生成一个新的密钥对，该密钥对由两个相关的\
  \ 2048 位密钥组成：一个用于签名请求的私钥和一个用于验证请求真实性的公钥。以下是使用 `openssl` 生成新密钥对的方法，该工具在您的 Linux、macOS\
  \ 和 Windows Subsystem for Linux 上应该是开箱即用的：\n\n```bash\n$ mkdir ~/.apikeys\n$ cd\
  \ ~/.apikeys\n$ openssl genrsa -out oci_api_pem -aes128 2048\nGenerating RSA private\
  \ key, 2048 bit long modulus\n.............+++\n..+++\ne is 65537 (0x10001)\nEnter\
  \ pass phrase for oci_api_pem:\nVerifying - Enter pass phrase for oci_api_pem:\n\
  $ chmod go-rwx oci_api_pem\n$ ls -l | grep pem | awk '{ print $1\" \"$9 }'\n-rw-------\
  \ oci_api_pem\n$ openssl rsa -pubout -in oci_api_pem -out oci_api_pem.pub\nEnter\
  \ pass phrase for oci_api_pem:\nwriting RSA key\n$ ls -l | grep pem | awk '{ print\
  \ $1\" \"$9 }'\n-rw------- oci_api_pem\n-rw-r--r-- oci_api_pem.pub\n```\n\n建议您限制对私钥的访问权限，使得只有文件所有者才有权读取或修改该文件。您可以使用\
  \ `chmod` 命令执行此操作，如代码片段所示。此时，密钥对已准备就绪。清单 3-4 显示了我们刚刚生成的公钥。\n\n```text\n$ cat oci_api_pem.pub\n\
  -----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAy7QqyKkIM1UW0lBs3h04\n\
  OIxCNbAc1YpqLmd/ZQGwNFoC9L7kpkARjOTMQg/XY9VgFhTFwkhv/sP7aOwYZjVD\nBMltp3e0Xzu1BGe4AQF3xL+euqZW9dBRlvZqb1ubEse4RnKDCWvYpqQS/vQU48TM\n\
  nRObefTsZH1xg2RfO2mFHuGEZhJKrVIjHTJvjisAIZg0dPaVD8Ee+julutCnDHcP\nQWlfe2e4OtYvvki5Wwu5Uz4Zq6ZSf55oX25pDGyw/WB5oDFg4v6RsZ7kQZYTBsqA\n\
  gF7RnG+q5JnxFfuDvEZoU0sB5hRWujhhSZtE9FjU9UndMU5iaa8kNE6Ua3e0p4ZG\nRwIDAQAB\n-----END\
  \ PUBLIC KEY-----\n清单 3-4\nAPI 签名密钥对公钥\n```\n\n#### 上传公钥\n\n我们已经到了需要决定代表哪个身份发送 API\
  \ 请求的时刻。换句话说，我们必须选择一个现有的 IAM 用户并上传公钥，该公钥将与此用户关联。如果您使用的是一个新的试用版或按需付费（PAYG）账户，您很可能以默认的\
  \ IAM 用户身份登录，该用户代表租户所有者，并且开箱即用地属于 `Administrators` 组。该组将允许您执行本章描述的所有练习。\n\n> **提示**\n\
  >\n> 如果您使用的是云团队提供的其他 IAM 用户，且该用户不是 `Administrators` 组的成员，请与您的云团队管理员核实您有权执行哪些操作，或者直接跳转到第\
  \ 4 章，以了解分配给您的 IAM 组的 IAM 策略的含义。\n\n以下是使用 OCI 控制台上传公钥的方法：\n\n1.  转到菜单 ➤ 标识 ➤ 用户。\n\
  2.  单击您的租户管理员用户的名称。\n3.  在“资源”菜单中单击 API 密钥。\n4.  单击添加公钥。\n5.  粘贴公钥。\n6.  单击添加。\n\
  \n图 3-3 显示了用于为 IAM 用户添加新公钥的 OCI 控制台窗口。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig3_HTML.jpg](img/478313_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n在 OCI 控制台中添加公钥\n\n每个 IAM 用户最多可以拥有三个公共 API 密钥。API 将根据请求的 `authorization`\
  \ 头中包含的公钥 `指纹` 来识别每个传入请求应使用哪个正确的密钥。指纹会显示在 OCI 控制台中，如图 3-4 所示。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig4_HTML.jpg](img/478313_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4\n公钥的指纹\n\n用户只能执行其所属组的现有 IAM 策略语句所允许的对云资源的操作。您将在下一章中了解它们。现在，请确保您将使用属于具有租户管理权限的组的\
  \ IAM 用户，例如默认的 `Administrators` 组；否则，后面几节中介绍的一些命令可能无法工作。\n\n#### 为 SDK、CLI 和 Terraform\
  \ 做准备\n\n如果您已完成“API 签名密钥”部分描述的所有步骤，那么您已准备好开始自动化云基础设施管理任务。让我们总结并列出所需的详细信息，在初始设置期间，当您基于喜欢的编程语言的\
  \ SDK 编写自定义 API 调用时，或者更常见的是，在运行 CLI 脚本或使用 Terraform 配置基础设施时，您至少需要提供一次这些信息。以下是您应该准备或知道在哪里可以找到的详细信息：\n\
  \n*   **PEM 格式的 API 签名密钥对**：\n    *   公钥\n    *   私钥\n*   公钥的**指纹**\n*   **IAM 用户\
  \ OCID**，位于菜单 ➤ 标识 ➤ 用户下\n*   **租户 OCID**，位于菜单 ➤ 管理 ➤ 租户详细信息下\n*   **区域标识符**，位于菜单\
  \ ➤ 管理 ➤ 区域管理下的“基础设施区域”选项卡中\n\n我们现在已准备好讨论并应用三种最流行的自动化技术。我们将首先讨论 SDK。\n\n\n\n\n##\
  \ SDK\n\nOCI SDK 是针对特定编程语言的库，可让您的软件与 Oracle Cloud Infrastructure 的云管理平面进行交互。该 SDK\
  \ 将 OCI API 调用封装为更易用、上手更快的函数或方法。通过这种方式，管理和监控 OCI 资源的自定义逻辑可以嵌入到您的应用程序中。图 3-5 说明了这个概念。\n\
  \n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig5_HTML.jpg](img/478313_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5 SDK\n\n在撰写本文时，Oracle Cloud Infrastructure 提供了四个以开源项目形式实现的 SDK。\n\n*   Python:\
  \ [`https://github.com/oracle/oci-python-sdk`](https://github.com/oracle/oci-python-sdk)\n\
  *   Go: [`https://github.com/oracle/oci-go-sdk`](https://github.com/oracle/oci-go-sdk)\n\
  *   Java: [`https://github.com/oracle/oci-java-sdk`](https://github.com/oracle/oci-java-sdk)\n\
  *   Ruby: [`https://github.com/oracle/oci-ruby-sdk`](https://github.com/oracle/oci-ruby-sdk)\n\
  \n如果您需要其他语言的 SDK，可以考虑自己编写一个。您需要先实现 API 请求签名逻辑，然后将软件所需的那些 REST API 调用封装成库函数或类方法。之后，您可以逐步增加对更多\
  \ API 资源的支持。实际上，特别是在面向微服务设计和容器的时代，您需要构建新 SDK 的可能性很小，因为您可以使用不同的编程语言来实现一组协同工作的微服务。\n\
  \n在本节中，我将介绍 Oracle Cloud Infrastructure Python SDK 的基础知识。\n\n### 安装\n\n由于历史原因，Python\
  \ 目前同时维护着两个主要版本：2 和 3。该 SDK 适用于两者，但我建议将使用最新主要版本作为最佳实践。我将使用 Python 3。请检查您用于处理本书练习的机器上是否已安装\
  \ Python 3。如果没有，请安装它，并为您的平台选择最新的 Python 3.x 版本。\n\n注意\n安装 Python 的方式取决于您使用的操作系统。请访问\
  \ [`www.python.org`](http://www.python.org) 了解更多详情。\n\n成功安装后，您应该能看到类似这样的信息：\n\n\
  ```\n$ python3 --version\nPython 3.7.2\n```\n\n注意\n本书中的代码片段已在 macOS 控制台和 Windows\
  \ Subsystem for Linux 中测试。所有命令都应能在所有主流 Linux 发行版上轻松运行。如果您使用 Windows，请在带有 Linux 的虚拟机或\
  \ Windows Subsystem for Linux 中运行练习。\n\n开箱即用，Python 3 自带 `venv` 模块，它允许开发者在单台机器上创建多个虚拟环境。一个虚拟环境维护独立的\
  \ Python 二进制文件和一个作为应用程序依赖项的 Python 模块库。所有使用专用的、环境特定的 Python 包安装器 (`pip`) 实例安装的模块都将存储在虚拟环境的文件层次结构中。如果您同时处理多个项目并需要避免模块版本冲突，这将特别有用。我将创建一个名为\
  \ `ocidev` 的新虚拟环境，并通过激活 `bin/activate` 文件来启用它。\n\n提示\n我强烈建议您访问本书的 Git 仓库：[`https://github.com/mtjakobczyk/oci-book`](https://github.com/mtjakobczyk/oci-book)。每章都有一个专用目录，其中包含该章的\
  \ `README.md` 文件。该文件以易于复制的形式包含了所有的代码片段。\n\n以下是在 macOS 或 Linux 上的操作方法：\n\n```\n$\
  \ python3 -m venv ocidev\n$ ls -1 ocidev/bin/\nactivate\nactivate.csh\nactivate.fish\n\
  easy_install*\neasy_install-3.7*\npip*\npip3*\npip3.7*\npython@\npython3@\n$ source\
  \ ocidev/bin/activate\n(ocidev) $\n```\n\n您可以看到命令提示符已更改，以指示当前活动的虚拟环境。每次打开新的终端会话时，您都需要激活虚拟环境，以便将变量设置为使用所选虚拟环境子目录中的二进制文件和路径。\n\
  \n提示\n`venv` 模块仅在 Python 3 中可用。如果您仍想使用 Python 2，也有支持虚拟环境的类似软件包，例如 `virtualenv`。\n\
  \nOracle Cloud Infrastructure 的 Python SDK 作为模块在 Python 包索引 (`PyPI`) 仓库中提供。您可以使用\
  \ Python 的 `pip` 包管理器来下载 `oci` 模块，它已经包含在您的虚拟环境路径中。在下载和安装 `oci` 模块之前，让我们先升级 `pip`\
  \ 工具。\n\n```\n(ocidev) $ python3 -m pip install --upgrade pip\nSuccessfully installed\
  \ pip-19.1.1\n(ocidev) $ python3 -m pip --version\npip 19.1.1 from /Users/mjk/ocidev/lib/python3.7/site-packages/pip\
  \ (python 3.7)\n```\n\n现在，我将使用 `pip freeze` 命令来列出这个特定虚拟环境中安装的软件包。\n\n```\n(ocidev)\
  \ $ python3 -m pip freeze\n```\n\n如您所见，我们的虚拟环境中还没有任何软件包。是时候改变这一点并安装 Oracle Cloud\
  \ Infrastructure Python SDK 了。\n\n```\n(ocidev) $ python3 -m pip install oci\nSuccessfully\
  \ installed (...) oci-2.2.13 (...)\n(ocidev) $ python3 -m pip freeze\nasn1crypto==0.24.0\n\
  certifi==2019.3.9\ncffi==1.12.3\nconfigparser==3.7.4\ncryptography==2.7\noci==2.2.13\n\
  pycparser==2.19\npyOpenSSL==19.0.0\npython-dateutil==2.8.0\npytz==2019.1\nsix==1.12.0\n\
  (ocidev) $ deactivate\n```\n\n与 `oci` 模块一起，`pip` 还安装了它的依赖项。现在，我们需要讨论如何准备将由 SDK 在签名\
  \ API 请求时使用的配置细节。\n\n\n\n### 配置\n\nOracle Cloud Infrastructure 的 Python SDK 就是一个\
  \ Python 模块，它提供了一系列客户端类及其方法，这些方法通过调用 OCI REST API 来管理各种类型的 OCI 资源，例如：\n\n*   `oci.core.ComputeClient`\
  \ 类的方法用于管理计算实例。\n*   `oci.core.VirtualNetworkClient` 类的方法用于管理与虚拟云网络相关的资源。\n*   `oci.load_balancer.LoadBalancerClient`\
  \ 类的方法用于管理负载均衡器资源。\n\n当你为某个特定的客户端类创建实例对象时，需要提供一个字典（一组键值对）来存储 SDK 的 API 签名详细信息。下面的代码片段从概念上展示了如何操作。请不要尝试执行这些命令，因为其中一个命令还不完整：\n\
  ```\n$ source ocidev/bin/activate\n(ocidev) $ python3\n>>> config = dict([('tenancy',\
  \ '...'), ('region', '...'), ('user', '...'), ('fingerprint', '...'), ('key_file',\
  \ '...'), ('pass_phrase', '...')])\n>>> import oci\n>>> compute = oci.core.ComputeClient(config)\n\
  ```\n\n也可以从配置文件加载配置。配置文件会包含 SDK 所需的详细信息，以便它能够代表指定的 IAM 用户对发送给 Oracle Cloud Infrastructure\
  \ REST API 的请求进行签名。配置文件的默认名称是 `config`。配置文件的默认位置是 `~/.oci` 目录。该文件必须设置权限，使得只有文件所有者才能读取其内容。清单\
  \ 3-5 展示了配置文件的结构。\n```\n[DEFAULT]\ntenancy=ocid1.tenancy.oc1..aa.........abcdef\n\
  region=eu-frankfurt-1\nuser=ocid1.user.oc1..aa.........ghijkl\nfingerprint=12:78:5b:60:65:cf:dc:b1:04:fd:3d:31:2b:a7:88:12\n\
  key_file=/Users/mjk/.apikeys/oci_api_pem\npass_phrase=secret\n清单 3-5\nOCI 的 Python\
  \ SDK 配置文件\n```\n\n租户 (`tenancy`) 和 IAM 用户 (`user`) 必须提供为有效的 OCID，而区域 (`region`)\
  \ 必须使用区域标识符，例如 `eu-frankfurt-1`。密钥文件 (`key_file`) 应该是属于 API 签名密钥对的 PEM 格式私钥的路径，其公钥您已经上传并与\
  \ IAM 用户关联。私钥密码 (`pass_phrase`) 以及公钥指纹 (`fingerprint`) 也存储在配置文件中。这就是为什么必须为 `config`\
  \ 文件设置适当的权限以限制其内容可见性至关重要。您可以在一个配置文件中存储多个命名的配置配置文件。在我们的示例中，只有 `DEFAULT` 配置文件。\n\n\
  我已经为您准备了一个配置文件的模板。您可以在以下路径找到模板文件：`chapter03/1-sdk/config.template`。请复制它并保存为默认位置的\
  \ `~/.oci/config` 文件。\n```\n$ mkdir ~/.oci\n$ cp ~/git/oci-book/chapter03/1-sdk/config.template\
  \ ~/.oci/config\n$ chmod go-rwx ~/.oci/config\n$ ls -l ~/.oci\n-rw-------  1 mjk\
  \  staff   758B Jun 10 20:21 config\n```\n\n现在，调整属性并使用与您环境相对应的值。您可以使用 `vi` 或任何其他文本编辑器。\n\
  ```\n$ vi ~/.oci/config\n```\n\n让我们再次激活虚拟环境并启动 Python 解释器。您可以使用 `oci.config.from_file`\
  \ 函数和与命名配置文件关联的配置。在我们的例子中，这将是 `DEFAULT` 配置文件。最后，您可以测试创建计算客户端类实例。\n```\n$ source\
  \ ocidev/bin/activate\n(ocidev) $ python3\n>>> import oci\n>>> config = oci.config.from_file(\"\
  ~/.oci/config\",\"DEFAULT\")\n>>> compute = oci.core.ComputeClient(config)\n>>>\
  \ quit()\n(ocidev) $ deactivate\n$\n```\n\n### 使用 SDK\n\n一旦您知道如何准备和加载配置文件，就可以进行第一个简单的测试了。让我们列出您的租户和您选择的\
  \ IAM 用户可见的可用性域。\n```\n$ source ocidev/bin/activate\n(ocidev) $ python3\n>>> import\
  \ oci\n>>> config = oci.config.from_file(\"~/.oci/config\",\"DEFAULT\")\n>>> identity\
  \ = oci.identity.IdentityClient(config)\n>>> ads_list = identity.list_availability_domains(config['tenancy']).data\n\
  >>> for ad in ads_list:\n...     print(ad.name)\n...\nfeDV:EU-FRANKFURT-1-AD-1\n\
  feDV:EU-FRANKFURT-1-AD-2\nfeDV:EU-FRANKFURT-1-AD-3\n```\n\n现在，我将向您展示如何在您的一个非 `root`\
  \ 容器中创建虚拟云网络。在继续之前，请记下一个非 `root` 容器的 OCID，例如 `Sandbox`，您希望在其中创建 VCN。OCID 可以在 OCI\
  \ 控制台中的身份识别 ➤ 容器下找到，如第 2 章“容器”部分所述。要成功测试接下来的脚本，请将 `cid` 变量的值替换为 `Sandbox` 容器的 OCID。\n\
  ```\n>>> cid = \"ocid1.compartment.oc1..aa.........gzwhsa\"\n>>> kwargs = { \"cidr_block\"\
  : \"10.5.0.0/16\", \"display_name\": \"sdk-vcn\", \"compartment_id\": cid }\n>>>\
  \ create_vcn_details = oci.core.models.CreateVcnDetails(**kwargs)\n>>> print(create_vcn_details)\n\
  {\n\"cidr_block\": \"10.5.0.0/16\",\n\"compartment_id\": \"ocid1.compartment.oc1..aa.........gzwhsa\"\
  ,\n\"defined_tags\": null,\n\"display_name\": \"sdk-vcn\",\n\"dns_label\": null,\n\
  \"freeform_tags\": null\n}\n>>> vcn = oci.core.VirtualNetworkClient(config)\n>>>\
  \ response = vcn.create_vcn(create_vcn_details)\n>>> response.data\n{\n\"cidr_block\"\
  : \"10.5.0.0/16\",\n\"compartment_id\": \"ocid1.compartment.oc1..aa.........gzwhsa\"\
  ,\n\"default_dhcp_options_id\": \"ocid1.dhcpoptions.oc1\\. ...\",\n\"default_route_table_id\"\
  : \"ocid1.routetable.oc1\\. ...\",\n\"default_security_list_id\": \"ocid1.securitylist.oc1\\\
  . ...\",\n\"defined_tags\": {},\n\"display_name\": \"sdk-vcn\",\n\"dns_label\":\
  \ null,\n\"freeform_tags\": {},\n\"id\": \"ocid1.vcn.oc1.eu-frankfurt-1.aa.........74vj5a\"\
  ,\n\"lifecycle_state\": \"AVAILABLE\",\n\"time_created\": \"2019-06-13T20:56:53.200000+00:00\"\
  ,\n\"vcn_domain_name\": null\n}\n```\n\n作为使用 Oracle Cloud Infrastructure 的 Python\
  \ SDK 创建新 VCN 的第一步，我们准备了一个模型类 `CreateVcnDetails` 的实例。模型类对象用于封装客户端类实例进行的 API 调用的配置参数。在我们的例子中，我们仅用三个\
  \ VCN 资源参数实例化了模型类：CIDR 块、显示名称和目标容器的 OCID。随后，我们将 `CreateVcnDetails` 对象作为参数传递给了 `VirtualNetworkClient`\
  \ 客户端类实例的 `create_vcn` 方法。该方法向 OCI REST API 发送了一个请求以同步方式创建 VCN。您可能已经注意到，返回响应花了一点时间。最后，当我们打印\
  \ `response.data` 属性时，我们能够看到新创建的 VCN 的 OCID (`id`) 以及所有其他 VCN 属性。图 3-6 显示了 OCI 控制台中的新\
  \ VCN。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig6_HTML.jpg](img/478313_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n使用 SDK 创建的 VCN\n\n要删除 VCN，您可以像这样使用 `delete_vcn` 方法：\n```\n>>> response.data.id\n\
  'ocid1.vcn.oc1.eu-frankfurt-1.aa.........74vj5a'\n>>> vcn.delete_vcn(response.data.id)\n\
  ```\n\n要退出 Python 解释器并离开虚拟环境，您可以发出以下命令：\n```\n>>> quit()\n(ocidev) $ deactivate\n\
  $\n```\n\n在本节中，我们简要介绍了 Oracle Cloud Infrastructure 的 Python SDK 的入门知识。如果您想了解更多信息，请参阅可在\
  \ [`https://oracle-cloud-infrastructure-python-sdk.readthedocs.io`](https://oracle-cloud-infrastructure-python-sdk.readthedocs.io)\
  \ 获取的全面文档。\n\n\n## CLI\n\n`command-line interface`（CLI）是一种命令行实用程序，可让您以便捷的脚本方式与 Oracle\
  \ Cloud Infrastructure REST API 进行交互。CLI 比 OCI 控制台功能稍强，因为您可能会发现某些功能作为 CLI 命令可用，但在\
  \ OCI 控制台中并未实现。此外，执行脚本通常比在 OCI 控制台的图形界面中点击要快得多。如果您仔细研究 CLI，会发现它是基于用于 Oracle Cloud\
  \ Infrastructure 的 Python SDK 构建的。换句话说，OCI CLI 是作为 `oci-cli` 模块用 Python 实现的，该模块使用了\
  \ `oci` 模块中的类。图 3-7 说明了这个概念。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig7_HTML.jpg](img/478313_1_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7 OCI CLI\n\nCLI 作为一个开源项目实现，代码可在 GitHub 的 [`https://github.com/oracle/oci-cli`](https://github.com/oracle/oci-cli)\
  \ 上找到。它可以安装在 Linux、macOS 和 Windows 操作系统上。\n\n### 安装\n\n您使用专为您的操作系统设计的脚本来安装 CLI。这些脚本可以从\
  \ OCI CLI 的 GitHub 帐户下载。事实上，有两个可用的脚本。\n\n*   一个用于 Linux/macOS/Windows Subsystem\
  \ for Linux 的 Shell 脚本\n*   一个用于在 Windows 上原生执行 CLI 的 PowerShell 脚本\n\n如果执行，这两个脚本中的每一个都会执行类似的步骤。\n\
  \n要在 Linux、macOS 或 Windows Subsystem for Linux 上安装 CLI，请打开终端窗口并执行此命令：\n\n```\n$\
  \ bash -c \"$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)\"\
  \n```\n\n注意\n\n本书中的代码片段已在 macOS 控制台和 Windows Subsystem for Linux 上测试。所有命令都应在所有主要的\
  \ Linux 发行版中轻松工作。如果您使用的是 Windows，请在装有 Linux 的客户机 VM 上或在 Windows Subsystem for Linux\
  \ 上运行练习。\n\n首先，会验证 `PATH` 变量中是否存在 Python 二进制文件，并且如果需要，会下载并放置任何缺少的原生软件包依赖项。安装程序将优先选择\
  \ Python 3 而非 Python 2。然而，CLI 在两者中的任何一个上都能正常工作。在上一节中，我提到 CLI 基本上是一个 Python 模块。这就是为什么安装程序会为\
  \ CLI 创建一个新的虚拟环境，以便将其依赖项与您可能同时进行的任何其他基于 Python 的开发隔离。在安装过程中，您将被要求提供虚拟环境的目录路径以及存储轻量级\
  \ `oci` 实用程序的另一个路径。该实用程序可以被视为 CLI 可执行文件，它以方便的命令行实用程序的形式公开 `oci-cli` Python 模块类。如果您心中没有特定的目录，可以保留默认值。最后，安装程序将更新您的\
  \ `PATH` 变量，以便您可以直接执行 `oci` 实用程序。在某些 Shell 中，安装后 `oci` 实用程序可能不会立即可见。在这种情况下，您必须重新启动控制台，或者只需\
  \ source CLI 将自身添加到 `PATH` 变量中的文件。在 Linux 和 Windows Subsystem for Linux 上，这通常是 `~/.bashrc`，而在\
  \ Mac 上通常是 `~/.bash_profile` 文件。\n\n```\n$ oci --version\nCommand 'oci' not found.\n\
  $ source ~/.bashrc\n```\n\n安装完成后，您应该能够检查 CLI 的版本。\n\n```\n$ oci --version\n2.6.6\n\
  ```\n\n`oci` 实用程序脚本的第一行会告诉您虚拟环境的位置。此代码片段显示了如何激活 CLI 的虚拟环境并列出 CLI 正在使用的 SDK 版本：\n\
  \n```\n$ head -n 1 `which oci`\n#!/Users/mjk/lib/oracle-cli/bin/python3\n$ cd ~/lib/oracle-cli/\n\
  $ source bin/activate\n(oracle-cli) $ python3 -m pip freeze | grep oci\noci==2.5.1\n\
  oci-cli==2.6.6\n(oracle-cli) $ deactivate\n$\n```\n\n我们这样做是为了说明 CLI 与 Python SDK\
  \ 的关系。在日常使用 CLI 时，您不会显式激活虚拟环境，而是使用 `oci` 实用程序。\n\n### 配置\n\nCLI 配置文件是一个简单的属性文件，存储了代表命名的\
  \ IAM 用户向 Oracle Cloud Infrastructure REST API 签名 API 请求所需的详细信息。如果您期望 CLI 配置与用于\
  \ OCI Python SDK 上下文的配置文件相似，您是对的。清单 3-6 显示了 CLI 配置文件的结构。\n\n```\n[DEFAULT]\ntenancy=ocid1.tenancy.oc1..aa.........\n\
  region=eu-frankfurt-1\nuser=ocid1.user.oc1..aa........\nfingerprint=12:78:5b:60:65:cf:dc:b1:04:fd:3d:31:2b:a7:88:12\n\
  key_file=/Users/mjk/.apikeys/oci_api_pem\npass_phrase=secret\n清单 3-6 OCI CLI 配置文件\n\
  ```\n\n该结构与上一节关于 SDK 的结构相同。此外，CLI 在相同的默认路径 `~/.oci/config` 期望配置文件。\n\n如果您已经存在 `~/.oci/config`\
  \ 文件，CLI 即可使用。\n\n注意\n\n如果您已经为 SDK 创建了 `.oci/config` 文件（如前一节所述），请*跳过*下文解释的 `oci\
  \ setup config` 步骤，因为配置已经存在。\n\n如果您跳过了关于 SDK 的部分或已删除配置，请不要担心。您可以使用一个简单的内置 CLI 配置向导。您需要提供我在“准备\
  \ SDK、CLI 和 Terraform”一节中列出的相同信息。此外，如果您之前没有准备，您将有机会创建一个新的 API 签名密钥对。\n\n```\n$ oci\
  \ setup config\nEnter a location for your config [/Users/mjk/.oci/config]:\nEnter\
  \ a user OCID: ocid1.user.oc1..aa.........\nEnter a tenancy OCID: ocid1.tenancy.oc1..aa.........\n\
  Enter a region (e.g. ap-seoul-1, ap-tokyo-1, ca-toronto-1, eu-frankfurt-1, uk-london-1,\
  \ us-ashburn-1, us-gov-ashburn-1, us-gov-chicago-1, us-gov-phoenix-1, us-langley-1,\
  \ us-luke-1, us-phoenix-1): eu-frankfurt-1\nDo you want to generate a new RSA key\
  \ pair? (If you decline you will be asked to supply the path to an existing key.)\
  \ [Y/n]: n\nEnter the location of your private key file: /Users/mjk/.apikeys/oci_api_pem\n\
  Enter the passphrase for your private key:\nFingerprint: e6:99:f5:82:db:a9:75:fb:cd:3c:30:74:00:b3:61:2b\n\
  Do you want to write your passphrase to the config file? (if not, you will need\
  \ to supply it as an argument to the CLI) [y/N]: y\nConfig written to /Users/mjk/.oci/config\n\
  ```\n\n如果您决定使用 `oci setup config` 生成新的 API 签名密钥对，请记得将公钥上传到云端以供您的 IAM 用户使用。如果您不记得如何操作，请返回本章前面的“上传公钥”部分。\n\
  \n存储私钥密码是可选的。如果您决定不这样做，每次发出 CLI 命令时都会提示您输入密码。如果您决定存储，请记住不要将此文件复制到其他地方，并将其权限限制为仅文件所有者可访问。\n\
  \n```\n$ ls -l .oci\n-rw-------  1 mjk  staff   322B Jun 13 21:26 config\n```\n\n\
  现在，您应该可以测试 CLI 了。我们将列出基于 Ubuntu 的镜像的可用版本。此类查询是在 `root` 隔区的上下文中运行的，其 OCID 与租户的 OCID\
  \ 相同。幸运的是，我们已经在 CLI 配置文件中存储了 `root` 隔区的 OCID，并且可以使用 `grep` 和 `sed` 工具的组合来提取此值。以下是运行您的第一个\
  \ OCI 命令以向 OCI REST API 发送请求的方法：\n\n\n\n\n```\n$ TENANCY_OCID=`cat ~/.oci/config\
  \ | grep tenancy | sed 's/tenancy=//'`\n$ oci compute image list --compartment-id\
  \ $TENANCY_OCID --operating-system \"Canonical Ubuntu\" --output table --query \"\
  data [*].{Image:\\\"display-name\\\"}\"\n+----------------------------------------------+\n\
  | Image                                        |\n+----------------------------------------------+\n\
  | Canonical-Ubuntu-18.04-Minimal-2019.05.15-0  |\n| Canonical-Ubuntu-18.04-Minimal-2019.04.15-0\
  \  |\n| Canonical-Ubuntu-18.04-Minimal-2019.03.11-0  |\n| Canonical-Ubuntu-18.04-2019.05.15-0\
  \          |\n| Canonical-Ubuntu-18.04-2019.04.15-0          |\n| Canonical-Ubuntu-18.04-2018.12.10-0\
  \          |\n| Canonical-Ubuntu-16.04-Minimal-2019.05.15-0  |\n| Canonical-Ubuntu-16.04-Minimal-2019.04.15-0\
  \  |\n| Canonical-Ubuntu-16.04-Minimal-2019.03.11-0  |\n| Canonical-Ubuntu-16.04-Gen2-GPU-2019.05.15-0\
  \ |\n| Canonical-Ubuntu-16.04-Gen2-GPU-2019.04.15-0 |\n| Canonical-Ubuntu-16.04-Gen2-GPU-2019.03.20-0\
  \ |\n| Canonical-Ubuntu-16.04-2019.05.15-0          |\n| Canonical-Ubuntu-16.04-2019.04.15-0\
  \          |\n| Canonical-Ubuntu-16.04-2019.03.20-0          |\n| Canonical-Ubuntu-14.04-2019.05.15-0\
  \          |\n| Canonical-Ubuntu-14.04-2019.05.02-0          |\n| Canonical-Ubuntu-14.04-2019.03.19-0\
  \          |\n+----------------------------------------------+\n```\n\nOCI REST\
  \ API 使用 JSON 作为其有效载荷格式。CLI 默认也输出 JSON。你可以通过应用 `--output table` 选项来将其更改为表格输出。如果你想限制打印内容，可以使用\
  \ `--query` 选项，该选项接受一个有效的 `JMESPath` 表达式。`JMESPath` 是一种针对 JSON 的查询语言。\n\n**提示**\n\
  \n如果你以前使用过 XML，你可以将 `JMESPath` 理解为类似 XPath 的东西，但适用于 JSON。\n\n几乎每个 CLI 命令都需要一个 compartment\
  \ OCID。如果你知道你在大部分时间里都将使用某个给定的 compartment，你可以为 `--compartment-id` 选项定义一个默认值。CLI\
  \ 命令选项的默认值可以在 `~/.oci/oci_cli_rc` 文件中定义。清单 3-7 展示了一个最小化的 `oci_cli_rc` 文件，其中只包含一个配置文件，且仅有一个默认值。\n\
  \n```\n[DEFAULT]\ncompartment-id = ocid1.compartment.oc1..aa.........\n```\n*清单\
  \ 3-7 OCI CLI RC 文件*\n\n`[DEFAULT]` 部分是配置文件的名称。这也适用于清单 3-6 中所示的配置文件。你可以在一个配置文件（或带有默认值的文件）中存储多个配置文件，并在执行\
  \ CLI 命令时使用 `--profile` 选项动态选择配置文件。例如，你可以为每个 compartment 设置一个单独的配置文件。当你只处理少数几个 compartment\
  \ 并希望简化选择它们的方式时，这会很有帮助。清单 3-8 展示了这种配置。\n\n```\n[DEFAULT]\ncompartment-id = ocid1.compartment.oc1..aa.........abc\n\
  [SANDBOX]\ncompartment-id = ocid1.compartment.oc1..aa.........def\n```\n*清单 3-8\
  \ 带有多个配置文件的 OCI CLI RC 文件*\n\n实际上，在 `oci_cli_rc` 文件中可以存储的不仅仅是默认值。例如，可以创建命名的 `JMESPath`\
  \ 查询，并在使用 CLI 命令时引用它们。我们现在将测试这一点。\n\n请将 `oci_cli_rc` 文件的模板复制到 `~/.oci/` 目录，并编辑该文件，将\
  \ `compartment_id` 属性的值替换为你的 `Sandbox` compartment 的 OCID。\n\n```\n$ cp ~/git/oci-book/chapter03/2-cli/oci_cli_rc.template\
  \ ~/.oci/oci_cli_rc\n$ vi ~/.oci/oci_cli_rc\n```\n\n清单 3-9 展示了 `oci_cli_rc` 文件。`DEFAULT`\
  \ 配置文件包含了你的 `Sandbox` compartment 的 `compartment-id`。一个名为 `OCI_CLI_CANNED_QUERIES`\
  \ 的预定义部分用于存储可在 CLI 调用中重用的常用查询。一个名为 `list_ubuntu_1804` 的查询可用于基于操作系统版本过滤结果，并仅显示镜像名称。\n\
  \n```\n[DEFAULT]\ncompartment-id = ocid1.compartment.oc1..aa.........gzwhsa\n[OCI_CLI_CANNED_QUERIES]\n\
  list_ubuntu_1804 = data[?\"operating-system-version\"=='18.04'].{Image:\"display-name\"\
  }\n```\n*清单 3-9 带有预定义查询的 OCI CLI RC 文件*\n\n现在，你可以在键入 CLI 命令时重用这个预定义查询。记得在 `--query`\
  \ 参数的值前加上 `query://` 字符串。\n\n```\n$ oci compute image list --operating-system \"\
  Canonical Ubuntu\" --output table --query query://list_ubuntu_1804\n+-------------------------------------+\n\
  | Image                               |\n+-------------------------------------+\n\
  | Canonical-Ubuntu-18.04-2019.05.15-0 |\n| Canonical-Ubuntu-18.04-2019.04.15-0 |\n\
  | Canonical-Ubuntu-18.04-2018.12.10-0 |\n+-------------------------------------+\n\
  ```\n\n**提示**\n\n如果你在其他项目中同时使用 CLI 和 SDK，你可以选择维护多个配置文件并显式传递它们的文件系统路径，或者在默认路径下的单个配置文件中使用专用的命名配置文件。\n\
  \n如果你想了解更多关于 CLI 配置的信息，可以参考官方文档：[`https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/cliconfigure.htm`](https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/cliconfigure.htm)。\n\
  \n\n\n### 使用命令行界面\n\n我之前提到过，命令行界面可能提供 OCI 控制台中不可用的功能，但如果某个操作在 OCI 控制台中是可行的，那么使用命令行界面时同样也能做到。这就是为什么，如果你发现在\
  \ OCI 控制台中执行的一些重复性任务耗费了你太多时间，可以考虑使用命令行界面将它们自动化。在本节中，你将看到如何使用 OCI CLI 启动一个计算实例。\n\
  \n我假设你已经按照上一节的说明创建了 `oci_cli_rc` 文件。清单 3-10 展示了从现在开始所需的最小配置内容。`Sandbox` 部门的 OCID\
  \ 值存在于 DEFAULT 配置文件中。\n\n```\n[DEFAULT]\ncompartment-id = ocid1.compartment.oc1..aa.........gzwhsa\n\
  清单 3-10\n包含基础设施部门的 OCI CLI RC 文件\n```\n\n让我们首先确保我们即将在正确的部门中配置 OCI 资源。执行此命令后，你应该能看到\
  \ `Sandbox` 部门的名称：\n\n```\n$ oci iam compartment get --output table --query \"data.{CompartmentName:\\\
  \"name\\\"}\"\n+-----------------+\n| CompartmentName |\n+-----------------+\n|\
  \ Sandbox         |\n+-----------------+\n```\n\n如果你阅读了第 2 章，你可能还记得计算实例必须存在于作为 VCN\
  \ 一部分的子网中。这是一个创建新 VCN（命名为 `cli-vcn`）的 CLI 命令，它使用 192.168.3.0/24 地址空间：\n\n```\n$\
  \ vcn_ocid=`oci network vcn create --cidr-block 192.168.3.0/24 --display-name cli-vcn\
  \ --query \"data.id\" | tr -d '\"'`\n$ echo $vcn_ocid\nocid1.vcn.oc1.eu-frankfurt-1.aa.........lg4b7w\n\
  ```\n\n我使用 `--query` 参数过滤了输出，用 `tr` 程序去掉了括号，并将新生成的 VCN OCID 保存为一个名为 `vcn_ocid` 的\
  \ bash 变量。为什么？因为我们在创建互联网网关和子网时，需要将 VCN OCID 作为输入参数。这是一个在 VCN 内配置新互联网网关的 CLI 命令：\n\
  \n```\n$ igw_ocid=`oci network internet-gateway create --vcn-id $vcn_ocid --display-name\
  \ cli-igw --is-enabled true --query \"data.id\" | tr -d '\"'`\n$ echo $igw_ocid\n\
  ocid1.internetgateway.oc1.eu-frankfurt-1.aa.........2ptvoa\n```\n\n为了启用与互联网的连接，我们将添加一条路由规则，将\
  \ VCN 中所有出站流量导向互联网网关。这是添加包含相关路由规则的新路由表的命令：\n\n```\n$ route_rules=\"[{\\\"cidrBlock\\\
  \":\\\"0.0.0.0/0\\\", \\\"networkEntityId\\\":\\\"$igw_ocid\\\"}]\"\n$ rt_ocid=`oci\
  \ network route-table create --vcn-id $vcn_ocid --display-name cli-rt --route-rules\
  \ \"$route_rules\" --query \"data.id\" | tr -d '\"'`\n$ echo $rt_ocid\nocid1.routetable.oc1.eu-frankfurt-1.aa.........ukqcjq\n\
  ```\n\n在调用 `oci network route-table create` 命令之前，已经创建了一个名为 `route_rules` 的补充变量，其中包含一条引用互联网网关的单一路由规则。同样，我们将路由表的云标识符持久化在一个变量中。我们在创建子网时需要它。以下是使用\
  \ CLI 创建子网的方法：\n\n```\n$ ad1=`oci iam availability-domain list --query data[0].name\
  \ | tr -d '\"'`\n$ echo $ad1\nfeDV:EU-FRANKFURT-1-AD-1\n$ subnet_ocid=`oci network\
  \ subnet create --vcn-id $vcn_ocid --display-name cli-vcn --cidr-block \"192.168.3.0/30\"\
  \ --prohibit-public-ip-on-vnic false --availability-domain $ad1 --route-table-id\
  \ $rt_ocid --query data.id | tr -d '\"'`\n$ echo $subnet_ocid\nocid1.subnet.oc1.eu-frankfurt-1.aa.........sqyz6a\n\
  ```\n\n这次，我们使用 CLI 调用了两次 OCI REST API。首先，我们获取了当前区域中第一个可用域的名称，并将其保存到一个新变量中。其次，我们创建了一个新的特定于可用域的子网，其地址空间狭窄，为\
  \ 192.168.3.0/30，这仅给我们提供了一个可用的 IPv4 地址：192.168.3.2。为什么只有一个？OCI 在每个 VCN 子网中保留了前两个地址和最后一个地址。\n\
  \n我们已经准备好配置一个新的计算实例。请确保 `~/oci_id_rsa.pub` 下存在一个 SSH 公钥。你在第 2 章创建了一个 SSH 密钥对。该密钥对将用于启用对实例的远程访问。以下是使用\
  \ CLI 启动新计算实例的方法：\n\n```\n$ image_ocid=`oci compute image list --shape \"VM.Standard2.1\"\
  \ --operating-system \"CentOS\" --operating-system-version 7 --sort-by TIMECREATED\
  \ --query data[0].id | tr -d '\"'`\n$ echo $image_ocid\nocid1.image.oc1.eu-frankfurt-1.aa.........hl2cma\n\
  $ vm_ocid=`oci compute instance launch --display-name cli-vm --availability-domain\
  \ \"$ad1\" --subnet-id \"$subnet_ocid\" --private-ip 192.168.3.2 --image-id \"$image_ocid\"\
  \ --shape VM.Standard2.1 --ssh-authorized-keys-file ~/oci_id_rsa.pub --wait-for-state\
  \ RUNNING --query data.id | tr -d '\"'`\nAction completed. Waiting until the resource\
  \ has entered state: RUNNING\n$ echo $vm_ocid\nocid1.instance.oc1.eu-frankfurt-1.ab.........wsbmoq\n\
  ```\n\n每个计算实例都必须基于一个提供操作系统以及（可选）其他预装软件的镜像。启动计算实例的 OCI CLI 命令需要该镜像的 OCID。这就是为什么我们首先查询最新的、与指定硬件配置兼容的\
  \ CentOS 7 基础操作系统镜像的 OCID。随后，我们发出 `oci compute instance launch` 命令，提供要使用的显示名称 (`--display-name`)、首选私有\
  \ IP 地址 (`--private-ip`)、定义已分配硬件资源配置的期望硬件配置 (`--shape`)、子网标识符 (`--subnet-id`) 和镜像标识符\
  \ (`--image-id`)。目标可用域 (`--availability-domain`) 必须与用于子网的可用域相同。最后，我们告诉 OCI 等待实例进入\
  \ `RUNNING` 状态。如果我们跳过这一步，CLI 会在配置过程完成之前就返回结果。图 3-8 展示了在 OCI 控制台中显示的、处于 `RUNNING`\
  \ 状态的实例。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig8_HTML.jpg](img/478313_1_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8：使用命令行界面配置的计算实例\n\n你还记得我们讨论过 `oci_cli_rc` 配置文件吗？你是否发现我们在执行启动计算实例的命令时，有哪个参数总是相同的？每个命令都定义了一个\
  \ `--query` 参数，其值都是相同的 `data.id` 字符串。理论上，看到这种使用模式，你可以考虑将其添加到 `oci_cli_rc` 配置文件中。实际上，这个查询有点过于简单，不值得存储在\
  \ `oci_cli_rc` 文件中，但如果你愿意，可以随意添加。\n\n事实上，你会更频繁地使用 CLI 来查询数据。我们刚刚启动的计算实例运行在一个公共子网中，并被分配了一个临时的公共\
  \ IPv4 地址。让我们找出这个公共 IP 地址的确切值。由于我们已经将计算实例的 OCID 保存为一个变量 (`vm_ocid`)，我们现在可以复用这个值。以下是查询运行在公共子网中的计算实例的公共\
  \ IP 地址的方法：\n\n```\n$ oci compute instance list-vnics --instance-id \"$vm_ocid\"\
  \ --query data[0].\\\"public-ip\\\" --raw-output\n130.61.89.229\n```\n\nCLI 在配置资源或查询数据时基于一种过程式方法。你按照\
  \ CLI 执行的特定顺序指定操作。这些作为 CLI 命令发出的操作，通常会 1:1 地映射为 OCI REST API 请求。资源类型之间的依赖关系必须被遵守，并在规划操作顺序时加以考虑。同样地，如果你要删除资源，顺序通常也需要颠倒。以下是终止并删除先前创建资源的方法：\n\
  \n\n```\n$ oci compute instance terminate --instance-id $vm_ocid --wait-for-state\
  \ TERMINATED\n确定要删除此资源吗？ [y/N]: y\n操作已完成。等待资源进入状态：TERMINATED\n$ oci network subnet\
  \ delete --subnet-id $subnet_ocid --wait-for-state TERMINATED\n确定要删除此资源吗？ [y/N]:\
  \ y\n操作已完成。等待资源进入状态：TERMINATED\n$ oci network route-table delete --rt-id $rt_ocid\
  \ --wait-for-state TERMINATED\n确定要删除此资源吗？ [y/N]: y\n操作已完成。等待资源进入状态：TERMINATED\n\
  $ oci network internet-gateway delete --ig-id $igw_ocid --wait-for-state TERMINATED\n\
  确定要删除此资源吗？ [y/N]: y\n操作已完成。等待资源进入状态：TERMINATED\n$ oci network vcn delete --vcn-id\
  \ $vcn_ocid\n确定要删除此资源吗？ [y/N]: y\n```\n\n在过程式方法中，理解需要采取哪些操作以及按什么顺序执行的责任被委托给了程序员。这会增加脚本的复杂性，尤其是当你希望对现有基础设施的状态实施各种类型的更改时。在这种情况下，你需要在规划那些将基础设施带至预期状态的操作之前，先弄清楚当前的状态是什么。如果只是定义好预期状态，然后让一个配置工具根据基础设施的当前状态来检测需要执行何种操作，那将容易得多。这就是一种**声明式方法**。\n\
  \n## Terraform\n\nTerraform 是一种基础设施即代码（infrastructure-as-code）的配置工具，它会跟踪其所管理基础设施的状态，从而支持*声明式方法*。与在\
  \ CLI 工作时所做的那样，Terraform 让你定义基础设施的预期状态，而不是定义和排序操作。接下来，将由 Terraform 来检测需要采取哪些操作以及按何种顺序执行，从而将云资源带至预期状态。你无需担心任何中间状态，只有最终结果才重要。\n\
  \nTerraform 通过一组称为*提供程序*（*providers*）的插件支持多种多样的云提供商。当你使用 `terraform init` 命令初始化一个新项目时，Terraform\
  \ 会读取此目录中的配置文件，检测要使用哪个提供程序，并下载特定提供程序插件的最新版本。正是提供程序插件负责与（在我们的例子中）Oracle Cloud Infrastructure\
  \ REST API 进行交互，如图 3-9 所示。\n\n![图 3-9](img/478313_1_En_3_Fig9_HTML.jpg)\n\n图 3-9.\
  \ Terraform\n\n让我们更仔细地审视基础设施即代码的概念。\n\n### 基础设施即代码\n\n*基础设施即代码*背后的概念很简单。你在一个或多个配置文件中定义你的目标云基础设施，它由虚拟云网络、计算实例、实例池、自定义镜像、各种类型的存储、托管数据库实例、托管\
  \ Kubernetes 集群和其他云资源组成。我们常说你在编写*基础设施代码*。如果你使用的是 Terraform，这些配置文件（或简称基础设施代码）使用类似\
  \ JSON 的 HashiCorp 语言（HCL）语法。代码清单 3-11 展示了一个用 HCL 语法编写的计算实例定义示例。\n\n```\nresource\
  \ \"oci_core_instance\" \"bastion_vm\" {\n  compartment_id      = var.compartment_ocid\n\
  \  display_name        = \"bastion-vm\"\n  availability_domain = var.ads[0]\n  source_details\
  \ {\n    source_id   = var.compute_image_ocid\n    source_type = \"image\"\n  }\n\
  \  shape = \"VM.Standard2.2\"\n  create_vnic_details {\n    subnet_id        = oci_core_subnet.bastion_ad1_net.id\n\
  \    assign_public_ip = true\n  }\n  metadata = {\n    ssh_authorized_keys = file(\"\
  ~/.ssh/oci_id_rsa.pub\")\n  }\n}\n```\n代码清单 3-11. 用于计算实例的 Terraform HCL\n\n每个云资源定义都使用数据块来指定。资源块头部具有\
  \ `resource <类型> <名称>` 的结构。例如，Oracle Cloud Infrastructure 计算实例属于 `oci_core_instance`\
  \ 类型。如果你仔细看代码清单 3-11，会发现一些属性值使用了对变量（`var.compartment_ocid`）、其他资源的属性（`oci_core_subnet.bastion_ad1_net.id`）的引用，甚至使用了本地文件系统中的文件路径（`file(...)`）。这得出一个结论：一些资源依赖于其他资源。很明显，依赖链对于在相关资源组上执行各种操作（如创建或销毁）的顺序至关重要。Terraform\
  \ 会构建一个图来跟踪所有这些依赖关系，并用它来决定哪些操作可以并行完成（以缩短整体配置时间），哪些操作必须按顺序执行。\n\n你编写的基础设施代码被理解为*预期状态*。你可以来回更改代码，并多次应用这些更改。每次你这样做时，Terraform\
  \ 都会将预期状态与所谓的*当前状态*（对应于上一次配置期间部署的基础设施）进行比较。计算出的差异用于创建一个*执行计划*，该计划由一系列步骤组成，这些步骤涉及调用各种\
  \ OCI REST API，从而引发实际的配置操作。只要不影响依赖链，选定的步骤可以并行运行。一个执行计划可以包括创建新云资源、修改现有资源或终止必须删除的资源的操作。有时，仅仅更改一个资源的属性就会导致终止实例并启动一个全新的实例。例如，当你更改现有实例的计算实例规格（shape）时，就会发生这种情况。规格指定了计算实例的硬件配置。其他更改可能导致非破坏性的修订，例如向现有安全列表添加一条新的安全规则。\n\
  \n我们在本节中刚刚完成的是一个关于 Oracle Cloud Infrastructure 的 Terraform 提供程序速成课程。如果你感觉我们只是触及了某个复杂事物的表面，那你是完全正确的，但别担心。本书的所有后续章节中，我们将使用\
  \ Terraform，因此你将有很多机会进行实践。最后但同样重要的是，随着 Terraform 功能在书中出现，我会随时进行解释。\n\n**提示**\n\n\
  你可以在 [www.terraform.io/docs/index.html](http://www.terraform.io/docs/index.html)\
  \ 找到 Terraform 文档。\n\n我敢打赌你现在正在问自己，如何开始着手使用 Terraform 驱动的 Oracle Cloud Infrastructure\
  \ 自动化。先安装软件怎么样？\n\n\n\n### 安装\n\n在撰写本文时，你只需下载与你的操作系统相匹配的 Terraform 版本的单个可执行二进制文件。要安装\
  \ Terraform，请遵循以下步骤：\n\n1.  访问 [`www.terraform.io/downloads.html`](http://www.terraform.io/downloads.html)。\n\
  \n2.  下载适用于你操作系统的二进制文件。\n\n3.  将下载的 `terraform` 文件移动到存放软件二进制文件的目录，并记住将此目录添加到你的 `PATH`\
  \ 变量中，除非你已完成此操作。\n\n4.  通过执行版本检查命令来测试安装。\n\n所有这些步骤都可以自动化。只需在执行前注意识别到最新二进制文件的正确路径即可。在撰写本文时，最新的二进制文件是\
  \ 0.12.9 版本。\n\n```\n$ wget https://releases.hashicorp.com/terraform/0.12.2/terraform_0.12.9_linux_amd64.zip\n\
  $ sudo unzip terraform_0.12.9_linux_amd64.zip -d /usr/local/bin\n$ terraform -v\n\
  Terraform v0.12.9\n```\n\n提示\n\n如果你使用的是 Windows Subsystem for Linux，则必须下载适用于 Linux\
  \ 的 Terraform 二进制文件。使用前面的代码片段，并在 WSL 控制台内执行它。\n\n正如你可能预期的那样，这种简便性是需要付出*手动升级*的代价的。每次你看到类似以下消息时，就需要下载一个新的二进制文件并替换你正在使用的文件：\n\
  \n```\n$ terraform -v\nTerraform v0.12.8\nYour version of Terraform is out of date!\
  \ The latest version\nis 0.12.9\\. You can update by downloading from www.terraform.io/downloads.html\n\
  ```\n\n这基本上就是你需要了解的关于安装的全部内容。所有后续方面都需要在你要使用的特定提供商插件的背景下考虑。让我在下一节解释我的意思。\n\n### 配置\n\
  \n事实上，表达式 *Terraform 配置*指的是包含基础结构代码的整个文件集。每个项目都至少在一个基础结构代码文件中包含一个 `provider` 块。基于此块，Terraform\
  \ 知道要使用哪个提供商插件二进制文件。如果 Terraform 在跨项目的默认目录中找不到相应的提供商插件二进制文件，它将下载该二进制文件并将其放置在项目的\
  \ `.terraform/plugins` 子目录中。\n\n要探索最简单的基于 Terraform 的基础结构项目，请转到 `chapter03/3-terraform/1-provider-only`\
  \ 目录。\n\n```\n$ cd git/oci-book/chapter03/3-terraform/1-provider-only\n```\n\n此项目目录包含两个文件，如列表\
  \ 3-12 所示。\n\n```\n1-provider-only/\n├── provider.tf\n└── vars.tf\n列表 3-12\nTerraform\
  \ 项目结构 (1-provider-only)\n```\n\n`provider.tf` 文件的内容如列表 3-13 所示。\n\n```\n# provider.tf\n\
  provider \"oci\" {\ntenancy_ocid = var.tenancy_ocid\nuser_ocid = var.user_ocid\n\
  region = var.region\nfingerprint = var.fingerprint\nprivate_key_path = var.private_key_path\n\
  private_key_password = var.private_key_password\n}\n列表 3-13\n引用变量的 Terraform 提供商配置\n\
  ```\n\n因为 Terraform 最终向 OCI REST API 发送 API 请求，它需要与 SDK 和 CLI 相同的连接参数集来签名请求。“为 SDK、CLI\
  \ 和 Terraform 做准备”一节描述了在哪里可以找到它们。理论上，你可以直接将与你云环境相关的值存储在 `provider.tf` 文件中。然而，这是不鼓励的，因为这些数据在一定程度上包含敏感信息，而你并不希望将这些数据存储在版本控制系统中。\n\
  \n为了避免将 `provider` 块所需的值存储在任何基础结构代码文件中，我们将使用变量来注入它们。我们仍然需要声明这些变量。你可以考虑将变量声明添加到同一个\
  \ `provider.tf` 文件中。这绝对是可行的。但是，为了保持项目资产的结构良好，存在另一个用于此目的的文件：`vars.tf` 文件。如列表 3-14\
  \ 所示。\n\n```\n# vars.tf\nvariable \"tenancy_ocid\" {}\nvariable \"user_ocid\" {}\n\
  variable \"region\" {}\nvariable \"fingerprint\" {}\nvariable \"private_key_path\"\
  \ {}\nvariable \"private_key_password\" {}\n列表 3-14\nTerraform 变量配置\n```\n\n为变量提供值有四种基本方式。\n\
  \n*   在执行 Terraform 命令时，在提示符处为每个变量提供一个值\n*   在执行 Terraform 命令时，使用 `-var` 参数为每个变量单独提供值\n\
  *   使用变量定义文件 `.tfvars`，其文件路径在执行 Terraform 命令时作为 `-var-file` 参数传递\n*   使用带有 `TF_VAR_`\
  \ 前缀的环境变量\n\n你可以每次在发出 `terraform` 命令时都提供变量值，但我相信即使对这个星球上最有耐心的人来说，这也会变得很烦人。更常见的情况是，你最终会在变量定义文件中定义它们或使用环境变量。\n\
  \n任何以 `TF_VAR_` 为前缀的环境变量都会被 Terraform 考虑在内。例如，`TF_VAR_region` 将被视为变量 `region` 的来源。这就是为什么你会发现将输入变量保存在某种\
  \ shell 脚本中很有用。然后你可以执行该脚本，结果是在每次即将处理基于 Terraform 的项目时设置这些变量。让我们准备一个这样的文件。首先，复制以下模板：\n\
  \n```\n$ cp ~/git/oci-book/chapter03/3-terraform/tfvars.env.template.sh ~/tfvars.env.sh\n\
  ```\n\n\n现在，请编辑新创建的 `tfvars.env.sh` 文件，记得正确替换所有值。对于 `TF_VAR_compartment_ocid`，请使用\
  \ `Sandbox` 区间的 OCID。\n\n```\n## Terraform\nexport TF_VAR_tenancy_ocid=ocid1.tenancy.oc1..aa.........abcdef\n\
  export TF_VAR_user_ocid=ocid1.user.oc1..aa.........ghijkl\nexport TF_VAR_fingerprint=12:78:5b:.........:a7:88:12\n\
  export TF_VAR_region=eu-frankfurt-1\nexport TF_VAR_private_key_path=/Users/mjk/.apikeys/oci_api_pem\n\
  export TF_VAR_private_key_password=secret\nexport TF_VAR_compartment_ocid=ocid1.compartment.oc1..aa.........\n\
  ```\n\n同样，你可以使用 `vi` 或其他文本编辑器来编辑该文件。\n\n```\n$ vi ~/tfvars.env.sh\n```\n\n小贴士\n\n\
  你可以查看位于 `~/.oci/config` 路径下的 SDK/CLI 配置文件，并复制其中的值来使用，这次是用于 Terraform 的 `tfvars.env.sh`\
  \ 文件。此外，请记住使用 `Sandbox` 区间的 OCID。\n\n如果你选择不将私有 API 签名密钥的密码存储为环境变量之一，Terraform 将会提示你输入这个缺失的变量，如下所示：\n\
  \n```\nvar.private_key_password\nEnter a value:\n```\n\n老实说，这可能会相当烦人。如果你不介意将私有 API\
  \ 签名密钥的密码存储在你稍后会 `source` 的文件中，请随意这样做。在这种情况下，请记得设置正确的文件系统权限，以将读取权限限制为仅文件所有者可用。\n\
  \n```\n$ chmod go-rwx ~/tfvars.env.sh\n```\n\n如果你愿意，可以为每个会话 source 这个文件。为此，请将相应的命令附加到\
  \ `~/.bashrc`（Linux 或 Windows Subsystem for Linux）或 `~/.bash_profile`（macOS）文件的末尾。\n\
  \n```\n$ echo \"source ${HOME}/tfvars.env.sh\" | tee -a ${HOME}/.bash_profile\n\
  ```\n\n我们已准备好初始化一个新的 Terraform 项目。执行 `terraform init` 命令。该工具将检测到你希望使用 `oci` 提供程序，下载其最新版本的二进制文件，并将提供程序文件放置在\
  \ `.terraform/plugins` 子目录中。现在让我们试试看。\n\n```\n$ source ~/tfvars.env.sh\n$ cd ~/git/oci-book/chapter03/3-terraform/1-provider-only\n\
  $ terraform init\nInitializing provider plugins...\n- Checking for available provider\
  \ plugins on https://releases.hashicorp.com...\n- Downloading plugin for provider\
  \ \"oci\" (3.45.0)...\n* provider.oci: version = \"~> 3.45\"\nTerraform has been\
  \ successfully initialized!\n```\n\n现在，让我们检查一下同一个项目目录。\n\n```\n.\n├── .terraform\n\
  │   └── plugins\n│       └── darwin_amd64\n│           ├── lock.json\n│        \
  \   └── terraform-provider-oci_v3.45.0_x4\n├── provider.tf\n└── vars.tf\n```\n\n\
  如你所见，出现了一个新的子目录。你是否好奇 Terraform 刚刚下载的提供程序二进制文件有多大？我也很好奇。\n\n```\n$ du -sh .terraform/\n\
  41M  .terraform/\n```\n\n提供程序二进制文件的大小在不同平台间确实略有差异。\n\n你已准备好创建一个简单但这次更有意义的 Terraform\
  \ 项目。这是基础设施即代码方法的真实实践。请继续阅读。\n\n## 使用 Terraform\n\n在本节中，我们将创建一个小型的基础设施即代码项目。目标设置将包括一个虚拟云网络，其中包含一个在公共子网中运行的单一计算实例。该虚拟机将运行一个\
  \ Apache HTTP 服务器实例。安全规则和操作系统防火墙规则将允许流量流入服务器的 80 端口。图 3-10 使用 Oracle Cloud Infrastructure\
  \ 符号展示了此架构。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig10_HTML.jpg](img/478313_1_En_3_Fig10_HTML.jpg)\n\
  \n图 3-10\n\n单服务器基础设施\n\n### 配置\n\n请确保你已安装 Terraform。我假设你已经将所需的连接相关变量添加到一个文件中，并且你已经在当前的终端会话中\
  \ source 了该文件。你可以通过执行一个列出所有以 `TF_VAR_` 为前缀的环境变量的命令，来检查变量是否设置正确。\n\n```\n$ env |\
  \ grep TF_VAR_\nTF_VAR_tenancy_ocid={you-will-see-here-your-value}\nTF_VAR_compartment_ocid={you-will-see-here-your-value}\n\
  TF_VAR_region={you-will-see-here-your-value}\nTF_VAR_fingerprint={you-will-see-here-your-value}\n\
  TF_VAR_private_key_path={you-will-see-here-your-value}\nTF_VAR_user_ocid={you-will-see-here-your-value}\n\
  TF_VAR_private_key_password={you-will-see-here-your-value}\n```\n\n现在，请进入此目录：\n\n\
  ```\n$ cd ~/git/oci-book/chapter03/3-terraform/2-simple-infrastructure\n```\n\n\
  你应该看到以下文件：\n\n```\n.\n├── modules.tf\n├── provider.tf\n├── vars.tf\n├── vcn.tf\n\
  └── web\n    ├── cloud-init\n    │   └── webvm.config.yaml\n    ├── compute.tf\n\
  \    ├── vars.tf\n    └── vcn.tf\n```\n\n如果你阅读了前一节，你已经知道在 `provider.tf` 和 `vars.tf`\
  \ 文件中预期会看到什么内容。我们现在将初始化基础设施项目。\n\n```\n$ terraform init\nInitializing modules...\n\
  - module.web\n  Getting source \"web\"\nInitializing provider plugins...\n- Checking\
  \ for available provider plugins on https://releases.hashicorp.com...\n- Downloading\
  \ plugin for provider \"oci\" (3.45.0)...\n* provider.oci: version = \"~> 3.45\"\
  \nTerraform has been successfully initialized!\n```\n\nTerraform 为 `oci` 提供程序下载了最新的插件版本。\n\
  \n让我们再看看这些目录。每个包含 `.tf` 文件的目录都可以被视为一个独立的 *模块*。如果你将基础设施配置拆分成带有专用文件夹和精心选择的输入参数的 Terraform\
  \ 配置文件组，你将能够提高代码在项目间的可重用性。我们的演示项目包含两个模块。\n\n- **root**：我们在这里定义提供程序配置、一个 VCN、一个互联网网关以及对\
  \ `web` 模块的引用。\n- **web**：我们在这里定义路由表、安全列表、子网以及一个使用 `cloud-init` 脚本来安装和启动 Web 服务器的计算实例。\n\
  \n如果你打开 `vars.tf` 文件，你会发现与我们在前一节看到的同名文件相比，它多定义了一个变量，即 `compartment_ocid`。\n\n```\n\
  ### Provider-specific Variables\nvariable \"tenancy_ocid\" {}\nvariable \"user_ocid\"\
  \ {}\nvariable \"region\" {}\nvariable \"private_key_path\" {}\nvariable \"fingerprint\"\
  \ {}\nvariable \"private_key_password\" {}\n### Project-specific input variables\n\
  variable \"compartment_ocid\" {}\n```\n\n几乎每个 OCI 资源都存在于一个区间内。这意味着你将需要提供你希望资源存在于其中的特定区间的\
  \ OCID。相应的环境变量已经存在于 `tfvars.env.sh` 文件中。\n\n`web/compute.tf` 配置文件内的计算实例资源定义假设你有一个现有的\
  \ SSH 密钥对，其公钥位于 `~/.ssh/oci_id_rsa.pub`。请在 `~/.ssh/` 目录下生成一个新的密钥对，或者将第 2 章中创建的现有密钥对复制到该文件夹。\n\
  \n我们现在将配置该基础设施。一旦我们看到它启动并运行，我将详细解释配置文件。请确保你位于 `2-simple-infrastructure` 目录中，并像这样执行\
  \ `terraform apply` 命令：\n\n\n\n让我们仔细看看前面的代码片段。可以看到，虚拟云网络 (`web_vcn`) 是最先被创建的云资源。接着，Internet\
  \ 网关 (`web_igw`) 和安全列表 (`web_sl`) 的创建过程并行启动。这一点非常清晰。两者都存在于一个 VCN 内部，并且彼此之间没有依赖关系。\n\
  \n### 资源创建依赖关系\n\n然而，路由表 (`web_rt`) 必须等到 Internet 网关成功创建后才能开始创建。其原因在于，我们在路由表中包含的路由规则将\
  \ Internet 网关指定为其目标。换句话说，路由表依赖于 Internet 网关的存在。在路由表和安全列表都创建完成后，子网 (`web_subnet`)\
  \ 的创建便立即开始了。最后，计算实例 (`web_vm`) 的配置启动，这个过程花费了近一分钟才完成。图 3-11 展示了依赖关系树。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig11_HTML.jpg](img/478313_1_En_3_Fig11_HTML.jpg)\n\
  \n**图 3-11** 资源依赖关系树\n\n最后两个标注着 `Refreshing state` 文字的条目 (`web_vnic_attachment`\
  \ 和 `web_vnic`) 意味着向 OCI REST API 发送了只读请求以获取某些信息。在这个例子中，Terraform 向 OCI 查询了分配给新启动的计算实例的公共\
  \ IP 地址。请记下这个地址（在我这里是 `130.61.127.53`，但你很可能会看到不同的值，除非你幸运地从地址池中获得了相同的地址）。稍后测试部署时会用到它。\n\
  \n恭喜！你刚刚使用基础设施即代码方法，成功配置了你的第一个基于 Terraform 的云解决方案。如果你愿意，可以前往 OCI 控制台查看它，如图 3-12\
  \ 所示。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig12_HTML.png](img/478313_1_En_3_Fig12_HTML.png)\n\
  \n**图 3-12** OCI 控制台中的 web-vm 计算实例\n\n实例处于运行中状态并不意味着启动过程已经完成。Cloud-init 脚本，特别是那些负责下载和安装新软件的脚本，可能需要一些时间才能完成。我在第\
  \ 2 章中已经解释过这一点。尝试使用 `curl` 发送几次标准 GET 请求，直到你看到如下输出：\n\n```bash\n$ VM_PUBLIC_IP=`terraform\
  \ output web_instance_public_ip`\n$ echo $VM_PUBLIC_IP\n130.61.127.54\n$ curl $VM_PUBLIC_IP\n\
  Greetings from the Cloud\n```\n\n如果你看到了问候语，那就意味着你已成功测试了我们简单的云应用程序。万岁！\n\n> **提示**\n\
  >\n> 如果你觉得等待 cloud-init 脚本完成很无聊，可以登录到实例并跟踪 cloud-init 日志。我在第 2 章中已经解释过如何操作。\n\n\
  ### 清理资源\n\n当你需要更新复杂云基础设施的细小部分时，基础设施即代码方法的优势便真正显现出来。Terraform 会尽量减少变更数量，只修改（或重新创建）那些确实需要被修改（或被销毁并重新启动）的资源。\n\
  \n假设你已经充分享受了测试简单云应用程序的乐趣，我们现在将终止这些资源。你可以通过执行 `terraform destroy` 命令来完成此操作。如果你使用\
  \ `--auto-approve` 选项，Terraform 将不会征求你的最终许可，而是直接向 OCI REST API 发送请求。以下是执行清理并终止我们刚才创建的基础设施的方法：\n\
