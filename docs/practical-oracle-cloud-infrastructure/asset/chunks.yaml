    \ Creating a report\nMar 21 16:18:47 app-vm reportissuer.py[13978]: ### Report\
    \ generated 2019-03-21 16:18:47.605280\nMar 21 16:19:17 app-vm reportissuer.py[13978]:\
    \ Creating a report\n[opc@app-vm]$ exit\n```\n\n如果查看存储桶，你应该能看到一个名为 `waw/bemowo/summary.txt`\
    \ 的新对象。这个对象由你刚刚创建的计算实例上运行的 `reportissuer` 服务每 30 秒生成并上传一次。图 5-14 展示了 OCI 控制台中的新对象。\n\
    \n![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig14_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig14_HTML.jpg)\n\
    \n**图 5-14** 由实例主体上传的摘要对象\n\n你对报告的内容感到好奇吗？当然会。回到本地命令行，关闭到计算实例的 SSH 连接。使用 `oci\
    \ os object get` CLI 命令，并通过 `--file -` 选项将 `waw/bemowo/summary.txt` 对象的内容转储到标准输出。\n\
    \n```\n$ oci os object get -bn blueprints --name \"waw/bemowo/summary.txt\" --file\
