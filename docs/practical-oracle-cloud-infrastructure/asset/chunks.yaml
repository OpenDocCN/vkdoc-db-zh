  raw: 'Let’s prepare a test file. This time, we are going to generate a larger file
    (25M), call it `visualizations.pdf`, and place it in the `warsaw/bemowo` local
    directory. You can easily imagine this to be a sales catalog with colorful pictures
    and visualizations of a particular property that belongs to a real estate project.
    Such files are typically considerably large in size. This is how you generate
    the file:


    ```

    $ cd ~/data

    $ SIZE=$((25*1024*1024))

    $ head -c $SIZE /dev/urandom > warsaw/bemowo/visualizations.pdf

    $ ls -lh warsaw/bemowo/visualizations.pdf | awk ''{ print $9 " (" $5 ")" }''

    warsaw/bemowo/visualizations.pdf (25M)

    ```


    The application we are about to run will use the OCI SDK for Python. Let’s prepare
    an isolated virtual environment for this application using `the venv` module.
    Next, we activate the environment, upgrade the Python package manager (`pip`),
    and install the OCI SDK (the `oci` module). Finally, we use the `pip freeze` command
    to list the installed modules and verify whether the SDK has been successfully
    installed.


    ```

    $ cd

    $ python3 -m venv oci-multipart

    $ source oci-multipart/bin/activate

    (oci-multipart) $ python3 -m pip install --upgrade pip

    Collecting pip

    .........

    Successfully installed pip-19.2.3

    (oci-multipart) $ python3 -m pip install oci

    Collecting oci

    .........

    Successfully installed asn1crypto-0.24.0 certifi-2019.9.11 cffi-1.12.3 configparser-4.0.2
    cryptography-2.7 oci-2.5.1 pyOpenSSL-19.0.0 pycparser-2.19 python-dateutil-2.8.0
    pytz-2019.2 six-1.12.0

    (oci-multipart) $ python3 -m pip freeze | grep oci

    oci==2.5.1

    ```


    Assuming the `blueprints` bucket still exists and all credentials are in place,
    we are ready to execute the application. Access the application code fetched earlier
    from my GitHub account, adapt the paths to the `visualizations.pdf` and config
    files, and run the program.


    ```

    (oci-multipart) $ cd ~/git/oci-book/chapter05/2-multipart-upload

    (oci-multipart) $ chmod u+x multipart.py

    (oci-multipart) $ FILE="$HOME/data/warsaw/bemowo/visualizations.pdf"

    (oci-multipart) $ CONFIG="$HOME/.oci/config"

    (oci-multipart) $ ./multipart.py "$FILE" 10 "waw/bemowo/visualizations.pdf" "blueprints"
    "$CONFIG" SANDBOX-USER

    Upload ID: 7de81d8f-44ba-4178-4269-5c25f7d03a86

    Part File: /Users/mjk/warsaw/bemowo/visualizations.pdf.part0

    Part ETag: 8489D285131C4A32E053C21DC20AAE16

    Part File: /Users/mjk/warsaw/bemowo/visualizations.pdf.part1

    Part ETag: 84897E38465648C8E053C21DC20AB5FF

    Part File: /Users/mjk/warsaw/bemowo/visualizations.pdf.part2

    Part ETag: 84897DC3EF364AEEE053C21DC20AF0F0

