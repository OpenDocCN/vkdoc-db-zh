  trans: '

    ### 私有 IP


    一旦新的计算实例启动，其 `VNIC` 就会从所连接子网的 IP 地址范围内获得一个私有 IPv4 地址。这就是 `主私有 IP` 地址。该地址可以由您选择，也可以由
    Oracle Cloud 控制平面自动选定。无法移除或更改现有实例上的主私有 IP。其生命周期与计算实例的生命周期严格关联，这意味着主私有 IP 会在实例销毁时终止。私有
    IP 地址使您的实例能够与同一 `VCN` 中的其他实例（或您即将了解的其他互连 `VCN` 中的实例）通信，如图 6-2 所示。此外，如果已配置 `FastConnect`
    或 `VPN`，它也可选择性地用于与本地网络中的机器进行数据交换。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig2_HTML.jpg](img/478313_1_En_6_Fig2_HTML.jpg)


    图 6-2 私有 IP


    既然有“主” `VNIC` 的概念，那就必然存在“辅助” `VNIC` 的概念；否则，这个名字就说不通了，对吧？确实，可以在单个实例上创建 `辅助 VNIC`。如果您的意图是将实例连接到多个子网，这实际上是一种可行的方法。图
    6-3 显示了一个计算实例的 `VNIC` 列表。在此情况下，每个 `VNIC` 都连接到不同的子网。添加辅助 `VNIC` 只是提供多子网连接的第一步。根据实例的形态和镜像，您仍需在操作系统内配置新的网络接口。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig3_HTML.jpg](img/478313_1_En_6_Fig3_HTML.jpg)


    图 6-3 主用和辅助 VNIC


    从管理角度来看，`VNIC` 和私有 IP 是常规的云资源，就像计算实例一样。这意味着它们通过专用的 API 端点路径进行控制，因此可以在其依赖关系允许的范围内进行单独管理。我说的“依赖关系”是什么意思？例如，无法单独配置一个未连接的
    `VNIC` 云资源。它必须始终存在于某个计算实例的上下文中。如果您正在创建辅助 `VNIC`，`AttachVnic` API 确实需要提供一个计算实例
    `OCID`。


    我们刚刚了解到，每个 `VNIC` 云资源都会创建一个主私有 IP。它无法被移除，并且始终与其父 `VNIC` 一起被删除。有时，您需要更大的灵活性。想象一下，您希望实现一个浮动
    IP 架构以实现高可用性。浮动 IP 是一个可以移动（从一个计算实例转移到另一个计算实例）的 IP 地址，从而实现主动-被动高可用性。如果当前的私有 IP
    持有者突然发生故障，被动实例（也称为 `备用` 实例）将接管该浮动 IP，从而保障服务连续性。要实现这样的场景，您需要依赖 `辅助私有 IP` 云资源，并结合集群引擎软件（如
    `Heartbeat` 或 `Corosync`）以及集群资源管理器（如 `Pacemaker`）。辅助私有 IP 可以添加到任何类型的 `VNIC`（包括主用和辅助）。将多个私有
    IP 附加到现有 `VNIC` 的另一个用例是，在单个计算实例上运行多个服务。有时，您可能会发现将每个服务绑定到单独的私有 IP 很有用。图 6-4 显示了附加到单个
    `VNIC` 的两个私有 IP 资源。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig4_HTML.jpg](img/478313_1_En_6_Fig4_HTML.jpg)


    图 6-4 主用和辅助私有 IP 地址


    注意：在大多数情况下，您使用的计算实例将仅配备一个 `VNIC` 和一个私有 IP。


    ### 公共 IP


    计算实例可以，但并非必须，持有一个公共 IP 地址。如果您将 Oracle Cloud 用作计算能力扩展或托管数据库提供商，可以通过 `FastConnect`
    或 `VPN` 将其安全地连接到您的本地网络。在这种情况下，通常甚至不希望云实例建立到互联网的直接连接。在这种情况下，您从私有的本地网络内部访问这些计算实例，而实例则从某种私有的构件存储库下载更新和新软件，该存储库存储各种类型的软件，例如
    `RPM` 包、`npm` 和 `Maven` 库、`Docker` 镜像，甚至 `Helm` 图表。然而，如今，越来越多的新创企业纯粹在云端运行。对于它们而言，至少对于一部分计算实例来说，访问互联网是必不可少的。


    让我们考虑一个独立计算实例的最简单场景。该场景假定一个给定的实例拥有自己的互联网标识，即一个公共 IP 地址。实例需要公共 IP 地址通常有三个主要原因：

    *   它托管一个公开 Web 服务的应用程序。

    *   其操作系统需要下载更新或附加软件。

    *   您希望建立 `SSH` 连接以访问终端。


    公共 IP 地址只能分配给那些附加到 `公共子网` 的计算实例。您在创建子网时选择它是公共的还是私有的。在 `OCI 控制台` 中，这个选择非常简单。您只需勾选正确的复选框。您已经在第
    2 章的学习中实践过这一点。另一方面，当使用 `API`、`SDK` 或 `CLI` 时，您通过 `prohibitPublicIpOnVnic` 元素（`API`）、`prohibit_public_ip_on_vnic`
    键（`Terraform`）或 `--prohibit-public-ip-on-vnic` 选项（`CLI`）的值间接设置特定子网的公共或私有属性。如果您学习过第
    3 章，您已经使用过它一次。总而言之，私有子网始终禁止所连接的实例在其连接到该私有子网的 `VNIC` 上拥有公共 IP。


    在一个简单的场景中，要访问互联网，除了实例上附加的公共 IP 外，还必须满足另外三个条件：

    *   `VCN` 包含一个活跃的互联网网关 (`IGW`)。

    *   一条路由规则将出站流量指向该 `IGW`。

    *   安全规则允许特定类型的入站和出站流量。


    在前面的章节中，您已经有多次机会在 `控制台` 中以及使用 `CLI` 和 `Terraform` 来操作这些资源。


    公共 IP 地址实际上是如何附加到实例上的呢？从管理角度来看，公共 IP 云资源始终与一个私有 IP 云资源相关联。对于大多数用例，这都是在后台完成的，您甚至不需要对此做任何特别的事情。因为公共
    IPv4 地址数量有限，Oracle Cloud 使用公共 IP 地址池。默认情况下，新创建的实例会从 Oracle Cloud 地址池中获得一个可用的公共
    IPv4 地址，如图 6-5 所示。实例终止后，该地址会返回池中，将来可能被其他客户重复使用。这被称为 `临时公共 IP`。其生命周期与特定的计算实例严格绑定。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig5_HTML.jpg](img/478313_1_En_6_Fig5_HTML.jpg)


    图 6-5 面向互联网的计算实例

    '
- fmt: "For development purposes, it seems fine to rely on dynamically assigned and,\
    \ to some extent, random public IPv4 addresses. If you consider production systems,\
    \ however, you would truly benefit from gaining some more control over the public\
    \ IP addresses. To do so, you can use reserved public IPs. Their lifecycle is\
    \ completely independent from any other cloud resources. Furthermore, it is possible\
    \ to attach them to and detach them from running compute instances. In contrary\
    \ to an ephemeral public IP, a reserved public IP can remain unassigned, if you\
    \ do not need it at a given point of time. This is how you reserve a new reserved\
    \ public IP using the OCI Console:\n\n1.  Go to Menu ➤ Networking ➤ Public IPs.\n\
    2.  Make sure that the `Sandbox` compartment is selected.\n3.  Click Create Reserved\
    \ Public IP.\n4.  Provide a new display name, for example, `my-ip`.\n5.  Click\
    \ Create.\n\nFrom now on, a newly reserved public IP will be ready to be assigned\
    \ to a compute instance of your choice.\n\nNote: The code snippets from this book\
    \ have been tested on macOS and Windows Subsystem for Linux. Moreover, all commands\
    \ should work on major Linux distributions. If you are using Windows and do not\
    \ want to use Windows Subsystem for Linux, you can always run Linux on a VM. Furthermore,\
    \ the majority of code snippets may also work in Git Bash on Windows. Remember\
    \ to set up the CLI and Terraform exactly as described in Chapter [3](#478313_1_En_3_Chapter.xhtml)\
    \ and the IAM as described in Chapter [4](#478313_1_En_4_Chapter.xhtml).\n\nAs\
    \ always, you can use the `oci network public-ip create` CLI command to perform\
    \ the same action.\n\n```\n$ oci network public-ip create --lifetime RESERVED\
    \ --display-name another-ip --profile SANDBOX-ADMIN\n{\n\"data\": {\n\"assigned-entity-id\"\
    : null,\n\"assigned-entity-type\": null,\n\"availability-domain\": null,\n\"compartment-id\"\
    : \"ocid1.compartment.oc1..aa.........gzwhsa\",\n\"defined-tags\": {},\n\"display-name\"\
    : \"another-ip\",\n\"freeform-tags\": {},\n\"id\": \"ocid1.publicip.oc1.eu-frankfurt-1.aa.........mkawlq\"\
    ,\n\"ip-address\": \"130.61.68.218\",\n\"lifecycle-state\": \"AVAILABLE\",\n\"\
    lifetime\": \"RESERVED\",\n\"private-ip-id\": null,\n\"scope\": \"REGION\",\n\"\
    time-created\": \"2019-04-22T16:50:41.982000+00:00\"\n},\n\"etag\": \"34e061ab\"\
    \n}\n```\n\nIf you read the previous chapter, you know that we have prepared and\
    \ are using the `SANDBOX-ADMIN` profile to execute the CLI commands as the `sandbox-admin`\
    \ user. The `--lifetime RESERVED` parameter is used to tell the API that we would\
    \ like to create a new reserved public IP. Figure [6-6](#478313_1_En_6_Chapter.xhtml#Fig6)\
    \ presents the two new reserved public IP addresses in the OCI Console.\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig6_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig6_HTML.jpg)\
    \  \n*Figure 6-6: Viewing reserved public IPs in the OCI Console*\n\nTo list reserved\
    \ public IPs using the CLI, you have to use the `oci network public-ip list` command\
    \ like this:\n\n```\n$ oci network public-ip list --lifetime RESERVED --scope\
    \ REGION --query 'data[*].{IP:\"ip-address\",Name:\"display-name\",State:\"lifecycle-state\"\
    }' --output table --all --profile SANDBOX-ADMIN\n+-----------------+------------+-----------+\n\
    | IP              | Name       | State     |\n+-----------------+------------+-----------+\n\
    | 130.61.68.218   | another-ip | AVAILABLE |\n| 132.145.252.222 | my-ip      |\
    \ AVAILABLE |\n+-----------------+------------+-----------+\n```\n\nIn the preceding\
    \ example, I have employed the JMESPath filter and tabular output to increase\
    \ the clarity of the response. To read more about it, please refer to the previous\
    \ chapters.\n\nWe are now going to use the CLI to free up the two reserved public\
    \ IPs because, in our exercises, we are going to use ephemeral public IPs. You\
    \ can use the following CLI commands to terminate each reserved public IP cloud\
    \ resource:\n\n```\n$ RESERVED_IP_NAME=\"my-ip\"\n$ QUERY=\"data[?\\\"display-name\\\
    \" == '$RESERVED_IP_NAME'].id | [0]\"\n$ RESERVED_IP_OCID=`oci network public-ip\
    \ list --scope REGION --lifetime RESERVED --query \"$QUERY\" --all --profile SANDBOX-ADMIN\
    \ | tr -d '\"'`\n$ echo $RESERVED_IP_OCID\nocid1.publicip.oc1.eu-frankfurt-1.aa.........6glghq\n\
    $ oci network public-ip delete --public-ip-id $RESERVED_IP_OCID --force --profile\
    \ SANDBOX-ADMIN\n```\n\nPlease adapt the `QUERY` variable to use `another-ip`\
    \ instead of `my-ip` in the JMESPath filter and repeat the preceding steps to\
    \ release the second reserved public IP resources.\n\nTip: Use as few reserved\
    \ public IPs as possible and do it mainly for production purposes. For development\
    \ and testing, if possible, stick to ephemeral public IPs. This will simplify\
    \ your infrastructure code.\n\nIn addition to compute instances, there are other\
    \ cloud resource types that can use public IP addresses including public load\
    \ balancers and NAT gateways. When you provision a public load balancer, a new\
    \ reserved public IP address is automatically added to your account. You can see\
    \ it in the OCI Console, in the same way as described in the previous paragraph.\
    \ You cannot detach it from the load balancer, however. The lifecycle is tied\
    \ to the load balancer, which means that the reserved public IP address that came\
    \ together with a newly provisioned public load balancer will be deleted as soon\
    \ as the load balancer has been terminated. NAT gateways use ephemeral public\
    \ IP addresses. We are going to discuss that type of gateway in the next section.\n\
    \nWe’ve mentioned that public subnets allow you to assign public IPs to the compute\
    \ instances, while private subnets don’t. This simple rule helps a lot when designing\
    \ and governing your cloud infrastructure because you can be sure that all compute\
    \ instances attached to private subnets never use public IPs. In this way, one\
    \ possible breach path is closed."
  raw: 'For development purposes, it seems fine to rely on dynamically assigned and,
    to some extent, random public IPv4 addresses. If you consider production systems,
    however, you would truly benefit from gaining some more control over the public
    IP addresses. To do so, you can use *reserved public IPs*. Their lifecycle is
    completely independent from any other cloud resources. Furthermore, it is possible
    to attach them to and detach them from running compute instances. In contrary
    to an ephemeral public IP, a reserved public IP can remain unassigned, if you
    do not need it at a given point of time. This is how you reserve a new reserved
    public IP using the OCI Console:


    1.  Go to Menu ➤ Networking ➤ Public IPs.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click Create Reserved Public IP.


    4.  Provide a new display name, for example, **my-ip**.


    5.  Click Create.


    From now on, a newly reserved public IP will be ready to be assigned to a compute
    instance of your choice.


    Note


    The code snippets from this book have been tested on macOS and Windows Subsystem
    for Linux. Moreover, all commands should work on major Linux distributions. If
    you are using Windows and do not want to use Windows Subsystem for Linux, you
    can always run Linux on a VM. Furthermore, the majority of code snippets may also
    work in Git Bash on Windows. Remember to set up the CLI and Terraform exactly
    as described in Chapter [3](#478313_1_En_3_Chapter.xhtml) and the IAM as described
    in Chapter [4](#478313_1_En_4_Chapter.xhtml).


    As always, you can use the `oci network public-ip create` CLI command to perform
    the same action.


    ```

    $ oci network public-ip create --lifetime RESERVED --display-name another-ip --profile
    SANDBOX-ADMIN

    {

    "data": {

    "assigned-entity-id": null,

    "assigned-entity-type": null,

    "availability-domain": null,

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "display-name": "another-ip",

    "freeform-tags": {},

    "id": "ocid1.publicip.oc1.eu-frankfurt-1.aa.........mkawlq",

    "ip-address": "130.61.68.218",

    "lifecycle-state": "AVAILABLE",

    "lifetime": "RESERVED",

    "private-ip-id": null,

    "scope": "REGION",

    "time-created": "2019-04-22T16:50:41.982000+00:00"

    },

    "etag": "34e061ab"

    }

    ```


    If you read the previous chapter, you know that we have prepared and are using
    the `SANDBOX-ADMIN` profile to execute the CLI commands as the `sandbox-admin`
    user. The `--lifetime RESERVED` parameter is used to tell the API that we would
    like to create a new reserved public IP. Figure [6-6](#478313_1_En_6_Chapter.xhtml#Fig6)
    presents the two new reserved public IP addresses in the OCI Console.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig6_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Viewing reserved public IPs in the OCI Console


    To list reserved public IPs using the CLI, you have to use the `oci network public-ip
    list` command like this:


    ```

    $ oci network public-ip list --lifetime RESERVED --scope REGION --query ''data[*].{IP:"ip-address",Name:"display-name",State:"lifecycle-state"}''
    --output table --all --profile SANDBOX-ADMIN

    +-----------------+------------+-----------+

    | IP              | Name       | State     |

    +-----------------+------------+-----------+

    | 130.61.68.218   | another-ip | AVAILABLE |

    | 132.145.252.222 | my-ip      | AVAILABLE |

    +-----------------+------------+-----------+

    ```


    In the preceding example, I have employed the JMESPath filter and tabular output
    to increase the clarity of the response. To read more about it, please refer to
    the previous chapters.


    We are now going to use the CLI to free up the two reserved public IPs because,
    in our exercises, we are going to use ephemeral public IPs. You can use the following
    CLI commands to terminate each reserved public IP cloud resource:


    ```

    $ RESERVED_IP_NAME="my-ip"

    $ QUERY="data[?\"display-name\" == ''$RESERVED_IP_NAME''].id | [0]"

    $ RESERVED_IP_OCID=`oci network public-ip list --scope REGION --lifetime RESERVED
    --query "$QUERY" --all --profile SANDBOX-ADMIN | tr -d ''"''`

    $ echo $RESERVED_IP_OCID

    ocid1.publicip.oc1.eu-frankfurt-1.aa.........6glghq

    $ oci network public-ip delete --public-ip-id $RESERVED_IP_OCID --force --profile
    SANDBOX-ADMIN

    ```


    Please adapt the `QUERY` variable to use `another-ip` instead of `my-ip` in the
    JMESPath filter and repeat the preceding steps to release the second reserved
    public IP resources.


    Tip


    Use as few reserved public IPs as possible and do it mainly for production purposes.
    For development and testing, if possible, stick to ephemeral public IPs. This
    will simplify your infrastructure code.


    In addition to compute instances, there are other cloud resource types that can
    use public IP addresses including public load balancers and NAT gateways. When
    you provision a public load balancer, a new reserved public IP address is automatically
    added to your account. You can see it in the OCI Console, in the same way as described
    in the previous paragraph. You cannot detach it from the load balancer, however.
    The lifecycle is tied to the load balancer, which means that the reserved public
    IP address that came together with a newly provisioned public load balancer will
    be deleted as soon as the load balancer has been terminated. NAT gateways use
    ephemeral public IP addresses. We are going to discuss that type of gateway in
    the next section.


    We’ve mentioned that public subnets allow you to assign public IPs to the compute
    instances, while private subnets don’t. This simple rule helps a lot when designing
    and governing your cloud infrastructure because you can be sure that all compute
    instances attached to private subnets never use public IPs. In this way, one possible
    breach path is closed.'
  trans: "\n出于开发目的，依赖动态分配且在一定程度上随机的公共 IPv4 地址似乎没问题。但如果考虑生产系统，你确实会从获得更多对公共 IP 地址的控制权中受益。为此，你可以使用**预留公网\
    \ IP**。它们的生命周期完全独立于任何其他云资源。此外，你可以将它们附加到正在运行的计算实例上，也可以从其上分离。与临时公网 IP 不同，预留公网 IP\
    \ 即使在你某个时间点不需要它时，也可以保持未分配状态。以下是如何使用 OCI 控制台预留一个新的预留公网 IP：\n\n1.  转到菜单 ➤ 网络 ➤ 公共\
    \ IP。\n2.  确保选择了 `Sandbox` 隔间。\n3.  点击 创建预留公网 IP。\n4.  提供一个新的显示名称，例如 `my-ip`。\n\
    5.  点击 创建。\n\n从现在起，一个新预留的公网 IP 就准备就绪，可以分配给你选择的计算实例了。\n\n注意：本书中的代码片段已在 macOS 和\
    \ Windows Subsystem for Linux 上测试过。此外，所有命令应在主流 Linux 发行版上运行。如果你使用 Windows 且不想使用\
    \ Windows Subsystem for Linux，你随时可以在虚拟机上运行 Linux。而且，大多数代码片段也可能在 Windows 的 Git\
    \ Bash 中运行。请务必按照第 3 章所述设置 CLI 和 Terraform，并按照第 4 章所述设置 IAM。\n\n和往常一样，你可以使用 `oci\
    \ network public-ip create` CLI 命令来执行相同的操作。\n\n```\n$ oci network public-ip create\
    \ --lifetime RESERVED --display-name another-ip --profile SANDBOX-ADMIN\n{\n\"\
    data\": {\n\"assigned-entity-id\": null,\n\"assigned-entity-type\": null,\n\"\
    availability-domain\": null,\n\"compartment-id\": \"ocid1.compartment.oc1..aa.........gzwhsa\"\
    ,\n\"defined-tags\": {},\n\"display-name\": \"another-ip\",\n\"freeform-tags\"\
    : {},\n\"id\": \"ocid1.publicip.oc1.eu-frankfurt-1.aa.........mkawlq\",\n\"ip-address\"\
    : \"130.61.68.218\",\n\"lifecycle-state\": \"AVAILABLE\",\n\"lifetime\": \"RESERVED\"\
    ,\n\"private-ip-id\": null,\n\"scope\": \"REGION\",\n\"time-created\": \"2019-04-22T16:50:41.982000+00:00\"\
    \n},\n\"etag\": \"34e061ab\"\n}\n```\n\n如果你阅读了前一章，你就知道我们已经准备并正在使用 `SANDBOX-ADMIN`\
    \ 配置文件，以 `sandbox-admin` 用户身份执行 CLI 命令。`--lifetime RESERVED` 参数用于告知 API 我们想要创建一个新的预留公网\
    \ IP。图 6-6 展示了 OCI 控制台中的两个新的预留公网 IP 地址。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig6_HTML.jpg](img/478313_1_En_6_Fig6_HTML.jpg)\
    \  \n*图 6-6：在 OCI 控制台中查看预留公网 IP*\n\n要使用 CLI 列出预留公网 IP，你必须使用 `oci network public-ip\
    \ list` 命令，如下所示：\n\n```\n$ oci network public-ip list --lifetime RESERVED --scope\
    \ REGION --query 'data[*].{IP:\"ip-address\",Name:\"display-name\",State:\"lifecycle-state\"\
    }' --output table --all --profile SANDBOX-ADMIN\n+-----------------+------------+-----------+\n\
    | IP              | Name       | State     |\n+-----------------+------------+-----------+\n\
    | 130.61.68.218   | another-ip | AVAILABLE |\n| 132.145.252.222 | my-ip      |\
    \ AVAILABLE |\n+-----------------+------------+-----------+\n```\n\n在前面的例子中，我使用了\
    \ JMESPath 过滤器和表格输出来提高响应的清晰度。要了解更多相关信息，请参考前面的章节。\n\n我们现在将使用 CLI 来释放这两个预留公网 IP，因为在我们的练习中，我们将使用临时公网\
    \ IP。你可以使用以下 CLI 命令来终止每个预留公网 IP 云资源：\n\n```\n$ RESERVED_IP_NAME=\"my-ip\"\n$ QUERY=\"\
    data[?\\\"display-name\\\" == '$RESERVED_IP_NAME'].id | [0]\"\n$ RESERVED_IP_OCID=`oci\
    \ network public-ip list --scope REGION --lifetime RESERVED --query \"$QUERY\"\
    \ --all --profile SANDBOX-ADMIN | tr -d '\"'`\n$ echo $RESERVED_IP_OCID\nocid1.publicip.oc1.eu-frankfurt-1.aa.........6glghq\n\
    $ oci network public-ip delete --public-ip-id $RESERVED_IP_OCID --force --profile\
    \ SANDBOX-ADMIN\n```\n\n请调整 `QUERY` 变量，在 JMESPath 过滤器中使用 `another-ip` 代替 `my-ip`，并重复前面的步骤来释放第二个预留公网\
    \ IP 资源。\n\n提示：尽可能少使用预留公网 IP，并且主要用于生产目的。对于开发和测试，如果可能，请坚持使用临时公网 IP。这将简化你的基础设施代码。\n\
    \n除了计算实例之外，还有其他类型的云资源可以使用公共 IP 地址，包括公共负载均衡器和 NAT 网关。当你配置一个公共负载均衡器时，一个新的预留公网 IP\
    \ 地址会自动添加到你的账户中。你可以按照上一段所述在 OCI 控制台中看到它。然而，你无法将其从负载均衡器上分离。其生命周期与负载均衡器绑定，这意味着随新配置的公共负载均衡器一起出现的预留公网\
    \ IP 地址，将在负载均衡器被终止时立即被删除。NAT 网关使用临时公共 IP 地址。我们将在下一节讨论这种类型的网关。\n\n我们提到过，公有子网允许你为计算实例分配公网\
    \ IP，而私有子网则不允许。这条简单的规则在设计和治理你的云基础设施时大有帮助，因为你可以确信连接到私有子网的所有计算实例永远不会使用公网 IP。这样一来，一个可能的入侵路径就被关闭了。\n"
- fmt: '### Private Subnets, Bastion, and NAT


    私有子网通过设计将计算实例与公共互联网隔离。实例无法使用公共IP这一事实，使其在一定程度上对外部世界不可见。之前，我提到了实例需要公共IP的三个基本原因：


    *   它托管一个暴露公共Web服务的应用程序。

    *   其操作系统需要下载更新或额外的软件。

    *   您希望通过SSH连接访问终端。


    事实上，即使特定实例在隔离的私有子网中运行且没有公共IP，也可以解决所有这三个问题。为此，我们将应用一种云基础设施模式，该模式采用一个`bastion host`（堡垒主机）和一个`NAT
    gateway`（NAT网关）。让我们考虑托管在计算实例上的应用程序的两个目标：


    *   运行隔离的工作负载

    *   暴露Web服务


    执行*隔离工作负载*的应用程序可能会对对象存储或托管数据库中的数据运行定期批处理作业。其他更令人兴奋的例子是高性能计算（HCP）任务，例如3D渲染、流体动力学或生物模拟。部署这些应用程序的主机很少暴露公共Web服务。相反，它们可以被视为隔离的后端系统。然而，有时您仍然希望通过SSH访问此实例以执行一些内务管理任务。这就成了`bastion
    host`的任务，它是在公共子网中配置的专用实例，拥有一个公共IP。要访问私有子网中的实例，您只需通过堡垒主机隧道化您的SSH连接。


    下一个方面是来自隔离实例的出站连接。操作系统和应用程序至少必须能够下载更新。如果您的私有网络内没有带有适当镜像的私有构件注册表，您可能需要让这些主机访问互联网上的公共仓库。在您的VCN中，您部署一个`NAT
    gateway`并将出站流量重定向到它。该网关的公共IP成为从互联网看到的、将其出站流量发送到该网关的私有子网中运行的隔离实例的源IP地址。除了与出站流量相关的响应外，NAT网关不允许任何其他入站流量进入您的VCN。简单而安全。图6-7展示了一个简化的基础设施，用于前面描述的隔离工作负载用例。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig7_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig7_HTML.jpg)


    图 6-7 隔离工作负载基础设施


    显然，暴露公共Web服务的应用程序必须能够从公共互联网访问。对于它们的情况，您通常部署一个高可用的负载均衡器来面对互联网，并将流量均匀地分布到应用程序主机，这些主机在一个或多个后端集中组合在一起。通过这种方式，可以将后端集主机放置在私有子网中，减少不必要的暴露和公共IP地址消耗。为了支持远程管理和访问更新，我们依赖堡垒主机和NAT网关。图6-8展示了前面描述的这个用例。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig8_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig8_HTML.jpg)


    图 6-8 公共Web服务基础设施


    我们现在将配置一个简化的基础设施来支持隔离工作负载用例。在私有子网中，我们将启动一个基于CentOS的实例，配备两个OCPUs。这将是我们没有互联网身份、因此也没有公共IP地址的工作节点。为了通过SSH访问工作节点，我们将在公共子网中启动另一个性能较低的实例。这个实例被称为`bastion
    host`，它将持有一个公共IP地址，使我们能够从互联网访问它。这样，我们就能够隧道化SSH连接并访问工作节点终端。最后，一个`NAT gateway`将允许工作节点访问互联网。目标基础设施如图6-9所示。


    > **警告**

    > 在开始本章涵盖的实践练习之前，您必须确保您的服务限制允许您在您工作区域的每个AD中至少启动一个`VM.Standard2.2`形状的实例。在OCI控制台中，转到菜单
    ➤ 治理 ➤ 限制、配额和使用情况，并搜索`VM.Standard2.2`。如果限制设置为0，请单击“请求增加服务限制”，相应地填写表格并提交。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig9_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig9_HTML.jpg)


    图 6-9 隔离的工作节点、堡垒主机和NAT网关


    基础设施代码在很大程度上与我们已经部署过几次的代码相同。您应该熟悉许多元素。不过，也有一些新东西。转到`chapter06/1-bastion-nat`目录。基础设施代码假设SSH公钥位于`~/.ssh/oci_id_rsa.pub`路径。您还需要相应的私钥来远程访问已配置的计算实例。在基础设施子文件夹中，运行`terraform
    init`命令以下载最新的OCI插件，并执行`terraform apply`命令来配置基础设施。


    ```

    $ source ~/tfvars.env.sh

    $ cd ~/git

    $ cd oci-book/chapter06/1-bastion-nat/infrastructure/

    $ find . -name "*.tf"

    ./modules.tf

    ./bastion/compute.tf

    ./bastion/vcn.tf

    ./bastion/vars.tf

    ./vcn.tf

    ./workers/compute.tf

    ./workers/vcn.tf

    ./workers/vars.tf

    ./provider.tf

    ./vars.tf

    $ terraform init

    Initializing modules...

    - module.bastion

    Getting source "bastion"

    - module.workers

    Getting source "workers"

    Initializing provider plugins...

    - Checking for available provider plugins on https://releases.hashicorp.com...

    - Downloading plugin for provider "oci" (3.45.0)...

    * provider.oci: version = "~> 3.45"

    Terraform has been successfully initialized!

    $ terraform apply -auto-approve

    Apply complete! Resources: 11 added, 0 changed, 0 destroyed.

    Outputs:

    bastion_public_ip = 130.61.53.185

    worker_public_ip = 10.0.1.130

    image_name = CentOS-7-2019.04.15-0

    $ BASTION_PUBLIC_IP=`terraform output bastion_public_ip`

    ```


    等待看到分配给您新配置的堡垒主机的公共IP，该主机已部署在公共子网中。这次，在我的例子中是`130.61.53.185`。您现在应该在OCI控制台中看到两个新实例，如图6-10所示：一个在公共子网中的堡垒主机实例和一个在私有子网中的工作节点。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig10_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig10_HTML.jpg)


    图 6-10 在OCI控制台中查看堡垒和工作实例


    您可能需要等待几秒钟，直到`sshd`守护进程开始接受连接。让我们通过堡垒主机连接到工作节点。


    如果您在Windows上工作，无论是使用适用于Linux的Windows子系统还是使用GitBash，您可能需要先启动`ssh-agent`。


    ```

    $ eval `ssh-agent -s`

    Agent pid 290

    ```


    现在，您应该可以通过公共子网中的堡垒主机连接到私有子网中的工作节点了。'
  raw: '### Private Subnets, Bastion, and NAT


    Private subnets isolate compute instances from the public Internet by design.
    The fact that an instance cannot use a public IP makes it, in a certain degree,
    invisible from the outside world. Earlier, I mentioned the three basic reasons
    for an instance to have a public IP.


    *   It hosts an application that exposes a public web service.


    *   Its operating system has to download updates or additional software.


    *   You want to establish an SSH connection to access the Terminal.


    As a matter of fact, it is possible to address all three, even if a particular
    instance is running without a public IP in an isolated, private subnet. To do
    so, we are going to apply the cloud infrastructure pattern that employs a *bastion
    host* and a *NAT gateway*. Let’s consider two goals for applications hosted on
    compute instances.


    *   Running isolated workloads


    *   Exposing web services


    Applications that execute *isolated workloads* may run periodic batch jobs over
    data in object storage or a managed database. Other more exciting examples are
    high-performance computing (HCP) tasks such as 3D rendering, fluid dynamics, or
    biological simulations. Hosts to which these applications are deployed rarely
    expose public web services. Instead, they can be treated as isolated backend systems.
    Yet, sometimes, you still want to access this instance over SSH in order to perform
    some housekeeping tasks. This becomes a task for a *bastion host* , a dedicated
    instance provisioned in a public subnet that holds a public IP. To access instances
    in private subnets, you simply tunnel your SSH connection over the bastion host.
    The next aspects are outbound connections from isolated instances. Operating systems
    and applications must at least be able to download updates. If no private artifact
    registry with proper mirrors is available within your private network, you may
    need to let these hosts access public repositories on the Internet. In your VCN,
    you deploy and redirect the outbound traffic to a *NAT gateway* . The gateway’s
    public IP becomes the source IP address seen in the Internet for the isolated
    instances running in private subnets that send their outbound traffic to the gateway.
    In addition to the responses associated with the outbound traffic, a NAT gateway
    does not let any other inbound traffic enter your VCN. Simple and secure. Figure
    [6-7](#478313_1_En_6_Chapter.xhtml#Fig7) presents a simplified infrastructure
    for an isolated workload use case, as described earlier.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig7_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Isolated workload infrastructure


    It is clear that applications that expose public web services must be reachable
    from the public Internet. In their case, you usually deploy a highly available
    load balancer to front the Internet and evenly distribute traffic to the application
    hosts grouped together in one or more backend sets. In this way, it is possible
    to place the backend set hosts in private subnets, reducing unnecessary exposure
    and public IP address consumption. To support remote management and access to
    updates, we rely on the bastion host and NAT gateway. Figure [6-8](#478313_1_En_6_Chapter.xhtml#Fig8)
    presents this use case, as described earlier.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig8_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Public web services infrastructure


    We are now going to provision a simplified infrastructure that supports the isolated
    workload use case. In a private subnet, we are going to launch a CentOS-based
    instance equipped with two OCPUs. This will be our worker node with no Internet
    identity and therefore no public IP address. To access the worker node over SSH,
    we are going to launch another, less powerful instance in a public subnet. This
    instance, called a *bastion host* , will hold a public IP address that will let
    us reach it from the Internet. In this way, we’ll be able to tunnel SSH connections
    and access the worker node terminal. Finally, a NAT gateway will allow the worker
    node to access the Internet. The target infrastructure is presented in Figure
    [6-9](#478313_1_En_6_Chapter.xhtml#Fig9).


    Warning


    Before doing the hands-on exercises covered in this chapter, you have to make
    sure your service limits allow you to launch at least one instance of the VM.Standard2.2
    shape in each AD of the region you are working in. In the OCI Console, go to Menu
    ➤ Governance ➤ Limits, Quotas and Usage and search for *VM.Standard2.2*. If the
    limit is set to 0, please click Request a Service Limit Increase, fill in the
    form accordingly, and submit the form.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig9_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Isolated worker, bastion host, and NAT gateway


    The infrastructure code is in a huge part identical to what we have already deployed
    a couple of times. You should be familiar with many elements. There are some new
    things, though. Go to the `chapter06/1-bastion-nat` directory. The infrastructure
    code assumes the SSH public key is located at the `~/.ssh/oci_id_rsa.pub` path.
    You will also need the corresponding private key to access the provisioned compute
    instance remotely. In the infrastructure subfolder, run the `terraform init` command
    to download the newest OCI plugin and execute the `terraform apply` command to
    provision the infrastructure.


    ```

    $ source ~/tfvars.env.sh

    $ cd ~/git

    $ cd oci-book/chapter06/1-bastion-nat/infrastructure/

    $ find . -name "*.tf"

    ./modules.tf

    ./bastion/compute.tf

    ./bastion/vcn.tf

    ./bastion/vars.tf

    ./vcn.tf

    ./workers/compute.tf

    ./workers/vcn.tf

    ./workers/vars.tf

    ./provider.tf

    ./vars.tf

    $ terraform init

    Initializing modules...

    - module.bastion

    Getting source "bastion"

    - module.workers

    Getting source "workers"

    Initializing provider plugins...

    - Checking for available provider plugins on https://releases.hashicorp.com...

    - Downloading plugin for provider "oci" (3.45.0)...

    * provider.oci: version = "~> 3.45"

    Terraform has been successfully initialized!

    $ terraform apply -auto-approve

    Apply complete! Resources: 11 added, 0 changed, 0 destroyed.

    Outputs:

    bastion_public_ip = 130.61.53.185

    worker_public_ip = 10.0.1.130

    image_name = CentOS-7-2019.04.15-0

    $ BASTION_PUBLIC_IP=`terraform output bastion_public_ip`

    ```


    Wait until you see the public IP assigned to your newly provisioned bastion host
    that has been deployed in a public subnet. This time, in my case, it is 130.61.53.185\.
    You should now see the two new instances in the OCI Console, as shown in Figure
    [6-10](#478313_1_En_6_Chapter.xhtml#Fig10): one bastion host instance in a public
    subnet and one worker node in a private subnet.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig10_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Viewing bastion and worker instances in the OCI Console


    You may need to wait a couple of seconds until the ssh daemon starts accepting
    connections. Let’s connect to the worker node, jumping over the bastion host.


    If you are working on Windows either using Windows Subsystem for Linux or using
    GitBash, you may need to start the ssh-agent first.


    ```

    $ eval `ssh-agent -s`

    Agent pid 290

    ```


    Now, you should be ready to establish a connection to the worker node in the private
    subnet over the bastion host in a public subnet.'
  trans: '### 私有子网、堡垒机与 NAT 网关


    私有子网通过设计将计算实例与公共互联网隔离。实例无法使用公共 IP 这一事实，使其在一定程度上对外部世界不可见。之前，我提到了实例需要公共 IP 的三个基本原因：


    *   它托管一个暴露公共 Web 服务的应用程序。

    *   其操作系统需要下载更新或额外的软件。

    *   您希望通过 SSH 连接访问终端。


    事实上，即使特定实例在隔离的私有子网中运行且没有公共 IP，也可以解决所有这三个问题。为此，我们将应用一种云基础设施模式，该模式采用一个`bastion host`（堡垒主机）和一个`NAT
    gateway`（NAT 网关）。让我们考虑托管在计算实例上的应用程序的两个目标：


    *   运行隔离的工作负载

    *   暴露 Web 服务


    执行*隔离工作负载*的应用程序可能会对对象存储或托管数据库中的数据运行定期批处理作业。其他更令人兴奋的例子是高性能计算（HCP）任务，例如 3D 渲染、流体动力学或生物模拟。部署这些应用程序的主机很少暴露公共
    Web 服务。相反，它们可以被视为隔离的后端系统。然而，有时您仍然希望通过 SSH 访问此实例以执行一些内务管理任务。这就成了`bastion host`的任务，它是在公共子网中配置的专用实例，拥有一个公共
    IP。要访问私有子网中的实例，您只需通过堡垒主机隧道化您的 SSH 连接。


    下一个方面是来自隔离实例的出站连接。操作系统和应用程序至少必须能够下载更新。如果您的私有网络内没有带有适当镜像的私有构件注册表，您可能需要让这些主机访问互联网上的公共仓库。在您的
    VCN 中，您部署一个`NAT gateway`并将出站流量重定向到它。该网关的公共 IP 成为从互联网看到的、将其出站流量发送到该网关的私有子网中运行的隔离实例的源
    IP 地址。除了与出站流量相关的响应外，NAT 网关不允许任何其他入站流量进入您的 VCN。简单而安全。图 6-7 展示了一个简化的基础设施，用于前面描述的隔离工作负载用例。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig7_HTML.jpg](img/478313_1_En_6_Fig7_HTML.jpg)


    图 6-7 隔离工作负载基础设施


    显然，暴露公共 Web 服务的应用程序必须能够从公共互联网访问。对于它们的情况，您通常部署一个高可用的负载均衡器来面对互联网，并将流量均匀地分布到应用程序主机，这些主机在一个或多个后端集中组合在一起。通过这种方式，可以将后端集主机放置在私有子网中，减少不必要的暴露和公共
    IP 地址消耗。为了支持远程管理和访问更新，我们依赖堡垒主机和 NAT 网关。图 6-8 展示了前面描述的这个用例。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig8_HTML.jpg](img/478313_1_En_6_Fig8_HTML.jpg)


    图 6-8 公共 Web 服务基础设施


    我们现在将配置一个简化的基础设施来支持隔离工作负载用例。在私有子网中，我们将启动一个基于 CentOS 的实例，配备两个 OCPUs。这将是我们没有互联网身份、因此也没有公共
    IP 地址的工作节点。为了通过 SSH 访问工作节点，我们将在公共子网中启动另一个性能较低的实例。这个实例被称为`bastion host`，它将持有一个公共
    IP 地址，使我们能够从互联网访问它。这样，我们就能够隧道化 SSH 连接并访问工作节点终端。最后，一个`NAT gateway`将允许工作节点访问互联网。目标基础设施如图
    6-9 所示。


    > **警告**

    > 在开始本章涵盖的实践练习之前，您必须确保您的服务限制允许您在您工作区域的每个 AD 中至少启动一个`VM.Standard2.2`形状的实例。在 OCI
    控制台中，转到菜单 ➤ 治理 ➤ 限制、配额和使用情况，并搜索`VM.Standard2.2`。如果限制设置为 0，请单击“请求增加服务限制”，相应地填写表格并提交。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig9_HTML.jpg](img/478313_1_En_6_Fig9_HTML.jpg)


    图 6-9 隔离的工作节点、堡垒主机和 NAT 网关


    基础设施代码在很大程度上与我们已经部署过几次的代码相同。您应该熟悉许多元素。不过，也有一些新东西。转到`chapter06/1-bastion-nat`目录。基础设施代码假设
    SSH 公钥位于`~/.ssh/oci_id_rsa.pub`路径。您还需要相应的私钥来远程访问已配置的计算实例。在基础设施子文件夹中，运行`terraform
    init`命令以下载最新的 OCI 插件，并执行`terraform apply`命令来配置基础设施。


    ```

    $ source ~/tfvars.env.sh

    $ cd ~/git

    $ cd oci-book/chapter06/1-bastion-nat/infrastructure/

    $ find . -name "*.tf"

    ./modules.tf

    ./bastion/compute.tf

    ./bastion/vcn.tf

    ./bastion/vars.tf

    ./vcn.tf

    ./workers/compute.tf

    ./workers/vcn.tf

    ./workers/vars.tf

    ./provider.tf

    ./vars.tf

    $ terraform init

    Initializing modules...

    - module.bastion

    Getting source "bastion"

    - module.workers

    Getting source "workers"

    Initializing provider plugins...

    - Checking for available provider plugins on https://releases.hashicorp.com...

    - Downloading plugin for provider "oci" (3.45.0)...

    * provider.oci: version = "~> 3.45"

    Terraform has been successfully initialized!

    $ terraform apply -auto-approve

    Apply complete! Resources: 11 added, 0 changed, 0 destroyed.

    Outputs:

    bastion_public_ip = 130.61.53.185

    worker_public_ip = 10.0.1.130

    image_name = CentOS-7-2019.04.15-0

    $ BASTION_PUBLIC_IP=`terraform output bastion_public_ip`

    ```


    等待看到分配给您新配置的堡垒主机的公共 IP，该主机已部署在公共子网中。这次，在我的例子中是`130.61.53.185`。您现在应该在 OCI 控制台中看到两个新实例，如图
    6-10 所示：一个在公共子网中的堡垒主机实例和一个在私有子网中的工作节点。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig10_HTML.jpg](img/478313_1_En_6_Fig10_HTML.jpg)


    图 6-10 在 OCI 控制台中查看堡垒和工作实例


    您可能需要等待几秒钟，直到`sshd`守护进程开始接受连接。让我们通过堡垒主机连接到工作节点。


    如果您在 Windows 上工作，无论是使用适用于 Linux 的 Windows 子系统还是使用 GitBash，您可能需要先启动`ssh-agent`。


    ```

    $ eval `ssh-agent -s`

    Agent pid 290

    ```


    现在，您应该可以通过公共子网中的堡垒主机连接到私有子网中的工作节点了。'
- fmt: "# 通过堡垒主机访问工作节点\n\n```\n$ ssh-add ~/.ssh/oci_id_rsa\nIdentity added: /Users/mjk/.ssh/oci_id_rsa\n\
    $ ssh -J opc@$BASTION_PUBLIC_IP opc@10.0.1.130\n[opc@worker-vm ~]$\n```\n\n为了访问工作节点的终端，我们将私钥添加到了认证代理，并使用\
    \ `-J` 选项执行 `ssh` 命令，以利用 SSH ProxyJump 技术。为了验证私有子网中的实例是否确实能够访问互联网，我们将尝试 ping 一个\
    \ Google 的公共 DNS 服务器。\n\n```\n[opc@worker-vm ~]$ ping -c 3 8.8.8.8\nPING 8.8.8.8\
    \ (8.8.8.8) 56(84) bytes of data.\n64 bytes from 8.8.8.8: icmp_seq=1 ttl=123 time=24.0\
    \ ms\n64 bytes from 8.8.8.8: icmp_seq=2 ttl=123 time=0.417 ms\n64 bytes from 8.8.8.8:\
    \ icmp_seq=3 ttl=123 time=0.377 ms\n--- 8.8.8.8 ping statistics ---\n3 packets\
    \ transmitted, 3 received, 0% packet loss, time 2001ms\nrtt min/avg/max/mdev =\
    \ 0.377/8.294/24.088/11.168 ms\n[opc@worker-vm ~]$ exit\n$\n```\n\n可以看到，尽管工作节点实例没有公共\
    \ IP，但它既可以通过堡垒主机通过 SSH 访问，也可以通过 NAT 网关访问互联网。\n\n# VCN 与网关资源概述\n\n现在，让我们从本节的角度，简要了解一下基础设施代码中那些最有趣的资源。清单\
    \ 6-1 展示了 `vcn.tf` 文件，我们在其中定义了 VCN、Internet 网关和 NAT 网关。\n\n```\nresource \"oci_core_virtual_network\"\
    \ \"vcn\" {\n  compartment_id = var.compartment_ocid\n  cidr_block     = var.vcn_cidr\n\
    \  display_name   = \"bastionnat-vcn\"\n  dns_label      = \"a\"\n}\n\nresource\
    \ \"oci_core_internet_gateway\" \"igw\" {\n  compartment_id = var.compartment_ocid\n\
    \  vcn_id         = oci_core_virtual_network.vcn.id\n  display_name   = \"internet-gateway\"\
    \n}\n\nresource \"oci_core_nat_gateway\" \"natgw\" {\n  compartment_id = var.compartment_ocid\n\
    \  vcn_id         = oci_core_virtual_network.vcn.id\n  display_name   = \"nat-gateway\"\
    \n  block_traffic  = false\n}\n```\n清单 6-1 `vcn.tf` (根模块)\n\n两种类型的网关都在 VCN 内创建。Internet\
    \ 网关 (`igw`) 实际上为连接到公共子网的实例提供入站和出站连接，这些公共子网的路由表包含一条路由规则，该规则将非 VCN 流量的目标指向 Internet\
    \ 网关。NAT 网关 (`natgw`) 本质上旨在为私有子网中的实例提供仅出站流量，这些私有子网的路由表包含一条路由规则，该规则将非 VCN 流量的目标指向\
    \ NAT 网关。这些角色在图 6-11 中进行了概念性展示。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig11_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig11_HTML.jpg)\n\
    图 6-11 Internet 和 NAT 网关的路由规则\n\n# 模块化代码与变量传递\n\n为了遵循最佳实践，我们在基础设施代码中使用了模块。`bastion`\
    \ 模块负责创建一个带有专用路由表和安全列表的公共子网，以及启动连接到该公共子网的堡垒主机实例。`workers` 模块创建一个私有子网，连同其专用路由表和安全列表，并启动一个连接到该私有子网的工作节点实例。由于路由规则在每个模块内部创建，我们必须将两个网关的\
    \ OCID 作为输入变量传递。清单 6-2 展示了 `modules.tf` 文件的摘录，说明了这是如何完成的。\n\n```\n...\nmodule\
    \ \"bastion\" {\n  source             = \"./bastion\"\n  compartment_ocid   =\
    \ var.compartment_ocid\n  vcn_ocid           = oci_core_virtual_network.vcn.id\n\
    \  vcn_igw_ocid       = oci_core_internet_gateway.igw.id\n  vcn_cidr         \
    \  = oci_core_virtual_network.vcn.cidr_block\n  vcn_subnet_cidr    = \"10.0.1.0/27\"\
    \n  ads                = data.oci_identity_availability_domains.ads.availability_domains[*].name\n\
    \  image_ocid         = data.oci_core_images.centos_image.images[0].id\n}\n\n\
    module \"workers\" {\n  source             = \"./workers\"\n  compartment_ocid\
    \   = var.compartment_ocid\n  vcn_ocid           = oci_core_virtual_network.vcn.id\n\
    \  vcn_nat_ocid       = oci_core_nat_gateway.natgw.id\n  vcn_cidr           =\
    \ oci_core_virtual_network.vcn.cidr_block\n  vcn_subnet_cidr    = \"10.0.1.128/27\"\
    \n  ads                = data.oci_identity_availability_domains.ads.availability_domains[*].name\n\
    \  image_ocid         = data.oci_core_images.centos_image.images[0].id\n}\n...\n\
    ```\n清单 6-2 `modules.tf` (根模块)\n\n在我的例子中，将 Internet 网关的 OCID 传递到 `bastion` 模块的变量称为\
    \ `vcn_igw_ocid`。你在第 3 章已经了解到，模块输入变量的名称是任意的。你只需要确保在模块内部正确引用它们。如果你查看 `bastion/vcn.tf`\
    \ 文件，你会发现 Internet 网关的 OCID 成为了所有非 VCN 流量的目标。清单 6-3 展示了 `bastion/vcn.tf` 文件的相关部分。\n\
    \n```\nresource \"oci_core_route_table\" \"bastion_rt\" {\n  compartment_id =\
    \ var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  route_rules {\n   \
    \ network_entity_id = var.vcn_igw_ocid\n    destination_type  = \"CIDR_BLOCK\"\
    \n    destination       = \"0.0.0.0/0\"\n  }\n  display_name   = \"bastion-rt\"\
    \n}\n```\n清单 6-3 `vcn.tf` (Bastion 模块)\n\n类似地，我们使用 `vcn_nat_ocid` 变量来传递 NAT 网关的\
    \ OCID，这次是传递到 `workers` 模块。清单 6-4 展示了工作节点所连接的私有子网所使用的路由表的定义。\n\n```\nresource\
    \ \"oci_core_route_table\" \"workers_rt\" {\n  compartment_id = var.compartment_ocid\n\
    \  vcn_id         = var.vcn_ocid\n  route_rules {\n    network_entity_id = var.vcn_nat_ocid\n\
    \    destination_type  = \"CIDR_BLOCK\"\n    destination       = \"0.0.0.0/0\"\
    \n  }\n  display_name   = \"workers-rt\"\n}\n```\n清单 6-4 `vcn.tf` (Workers 模块)\n\
    \n# 修改与验证 NAT 网关配置\n\n如果你需要临时阻止私有实例到公共互联网的出站流量，你可以仅用一个简单的开关来完成。NAT 网关可以被设置为阻止流量。要测试此功能，请转到根模块中的\
    \ `vcn.tf` 文件，并将 `block_traffic` 属性设置为 `true`，如清单 6-5 所示。\n\n```\n...\nresource\
    \ \"oci_core_nat_gateway\" \"natgw\" {\n  compartment_id = var.compartment_ocid\n\
    \  vcn_id         = oci_core_virtual_network.vcn.id\n  display_name   = \"nat-gateway\"\
    \n  block_traffic  = true\n}\n```\n清单 6-5 `vcn.tf` (根模块)\n\n一旦你应用更改，Terraform\
    \ 将检测到你的 `.tf` 文件所代表的预期状态与它在刷新后的状态文件中找到的内容不同。计算出的计划将执行相关的 API 调用，将 NAT 网关设置为阻止流量。\n\
    \n```\n$ terraform apply -auto-approve\n...\noci_core_nat_gateway.natgw: Modifying...\
    \ (ID: ocid1.natgateway.oc1.eu-frankfurt-1.........6n76gq)\nblock_traffic: \"\
    false\" => \"true\"\noci_core_nat_gateway.natgw: Modifications complete after\
    \ 0s\nApply complete! Resources: 0 added, 1 changed, 0 destroyed.\nOutputs:\n\
    bastion_public_ip = 130.61.53.185\nworker_public_ip = 10.0.1.130\nimage_name \
    \ = CentOS-7-2019.04.15-0\n```\n\n你现在可以在 OCI 控制台中验证 NAT 网关是否已被有效禁用。为此，请按照以下步骤操作：\n\
    1.  转到菜单 ➤ 网络 ➤ 虚拟云网络。\n2.  确保选择了 `Sandbox` 计算域。\n3.  点击 VCN 名称 (bastionnat-vcn)。\n\
    4.  在“资源”部分，点击 NAT 网关。"
  raw: '```

    $ ssh-add ~/.ssh/oci_id_rsa

    Identity added: /Users/mjk/.ssh/oci_id_rsa

    $ ssh -J opc@$BASTION_PUBLIC_IP opc@10.0.1.130

    [opc@worker-vm ~]$

    ```


    To access the worker’s terminal, we have added our private key to the authentication
    agent and executed `ssh` with the `-J` option to use the SSH ProxyJump technique.
    To verify whether the instance in a private subnet is indeed able to access the
    Internet, we will try to ping one of the Google’s public DNS servers.


    ```

    [opc@worker-vm ~]$ ping -c 3 8.8.8.8

    PING 8.8.8.8 (8.8.8.8) 56(84) bytes of data.

    64 bytes from 8.8.8.8: icmp_seq=1 ttl=123 time=24.0 ms

    64 bytes from 8.8.8.8: icmp_seq=2 ttl=123 time=0.417 ms

    64 bytes from 8.8.8.8: icmp_seq=3 ttl=123 time=0.377 ms

    --- 8.8.8.8 ping statistics ---

    3 packets transmitted, 3 received, 0% packet loss, time 2001ms

    rtt min/avg/max/mdev = 0.377/8.294/24.088/11.168 ms

    [opc@worker-vm ~]$ exit

    $

    ```


    As you can see, even though the worker instance doesn’t have a public IP, it is
    both reachable over SSH via the bastion host and can access the Internet through
    the NAT gateway. It’s time to take a brief look at the most interesting, from
    this section’s point of view, resources in the infrastructure code. Listing [6-1](#478313_1_En_6_Chapter.xhtml#PC8)
    presents the `vcn.tf` file where we define the VCN, Internet gateway, and NAT
    gateway.


    ```

    resource "oci_core_virtual_network" "vcn" {

    compartment_id = var.compartment_ocid

    cidr_block = var.vcn_cidr

    display_name = "bastionnat-vcn"

    dns_label = "a"

    }

    resource "oci_core_internet_gateway" "igw" {

    compartment_id = var.compartment_ocid

    vcn_id = oci_core_virtual_network.vcn.id

    display_name = "internet-gateway"

    }

    resource "oci_core_nat_gateway" "natgw" {

    compartment_id = var.compartment_ocid

    vcn_id = oci_core_virtual_network.vcn.id

    display_name = "nat-gateway"

    block_traffic = false

    }

    Listing 6-1

    vcn.tf (Root Module)

    ```


    Both types of gateways are created within the VCN. The Internet gateway (`igw`)
    effectively provides both inbound and outbound connectivity to these instances
    that are attached to public subnets whose route table contains a route rule that
    targets the Internet gateway for non-VCN traffic. The NAT gateway (`natgw`), in
    essence, is meant to serve only outbound traffic from instances in private subnets
    whose route table contains a route rule that targets the NAT gateway for non-VCN
    traffic. These roles are conceptually presented in Figure [6-11](#478313_1_En_6_Chapter.xhtml#Fig11).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig11_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Routing rules for Internet and NAT gateways


    To follow best practices, we have used modules in our infrastructure code. The
    bastion module is responsible for creating a public subnet with a dedicated route
    table and security list as well as launching the bastion instance attached to
    the public subnet. The workers module creates a private subnet, together with
    a dedicated route table and security list, and launches a worker instance that
    is attached to the private subnet. Because the routing rules are created within
    each module, we have to pass the OCID of both gateways as input variables. Listing
    [6-2](#478313_1_En_6_Chapter.xhtml#PC9) presents an excerpt from the `modules.tf`
    file that shows how it is done.


    ```

    ...

    module "bastion" {

    source = "./bastion"

    compartment_ocid = var.compartment_ocid

    vcn_ocid = oci_core_virtual_network.vcn.id

    vcn_igw_ocid = oci_core_internet_gateway.igw.id

    vcn_cidr = oci_core_virtual_network.vcn.cidr_block

    vcn_subnet_cidr = "10.0.1.0/27"

    ads = data.oci_identity_availability_domains.ads.availability_domains[*].name

    image_ocid = data.oci_core_images.centos_image.images[0].id

    }

    module "workers" {

    source = "./workers"

    compartment_ocid = var.compartment_ocid

    vcn_ocid = oci_core_virtual_network.vcn.id

    vcn_nat_ocid = oci_core_nat_gateway.natgw.id

    vcn_cidr = oci_core_virtual_network.vcn.cidr_block

    vcn_subnet_cidr = "10.0.1.128/27"

    ads = data.oci_identity_availability_domains.ads.availability_domains[*].name

    image_ocid = data.oci_core_images.centos_image.images[0].id

    }

    ...

    Listing 6-2

    modules.tf (Root Module)

    ```


    The variable that carries the OCID of the Internet gateway into the bastion module
    is, in my case, called `vcn_igw_ocid`. You learned in Chapter [3](#478313_1_En_3_Chapter.xhtml)
    that the module input variable names are arbitrary. You just need to make sure
    you are referencing them properly within the module. If you look at the `bastion/vcn.tf`
    file, you will see that the OCID of the Internet gateway becomes a target for
    all non-VCN traffic. Listing [6-3](#478313_1_En_6_Chapter.xhtml#PC10) presents
    the relevant part of the `bastion/vcn.tf` file .


    ```

    resource "oci_core_route_table" "bastion_rt" {

    compartment_id = var.compartment_ocid

    vcn_id = var.vcn_ocid

    route_rules {

    network_entity_id = var.vcn_igw_ocid

    destination_type = "CIDR_BLOCK"

    destination = "0.0.0.0/0"

    }

    display_name = "bastion-rt"

    }

    Listing 6-3

    vcn.tf (Bastion Module)

    ```


    Similarly, we are using the `vcn_nat_ocid` variable to pass the OCID of the NAT
    gateway, this time into the workers module. Listing [6-4](#478313_1_En_6_Chapter.xhtml#PC11)
    shows the definition of the route table used by the private subnet to which the
    worker node is attached.


    ```

    resource "oci_core_route_table" "workers_rt" {

    compartment_id = var.compartment_ocid

    vcn_id = var.vcn_ocid

    route_rules {

    network_entity_id = var.vcn_nat_ocid

    destination_type = "CIDR_BLOCK"

    destination = "0.0.0.0/0"

    }

    display_name = "workers-rt"

    }

    Listing 6-4

    vcn.tf (Workers Module)

    ```


    If you ever need to temporarily block the outbound traffic from your private instances
    to the public Internet, you can do this using just one simple switch. NAT gateways
    can be set to block traffic. To test this feature, go to the `vcn.tf` file in
    the root module and set the `block_traffic` attribute to `true`, as shown in Listing
    [6-5](#478313_1_En_6_Chapter.xhtml#PC12).


    ```

    ...

    resource "oci_core_nat_gateway" "natgw" {

    compartment_id = var.compartment_ocid

    vcn_id = oci_core_virtual_network.vcn.id

    display_name = "nat-gateway"

    block_traffic = true

    }

    Listing 6-5

    vcn.tf (Root Module)

    ```


    As soon as you apply changes, Terraform will detect that the expected state represented
    by your `.tf` files is different from what it finds in the refreshed state file.
    The calculated plan will perform the relevant API call(s) to set the NAT gateway
    to block the traffic.


    ```

    $ terraform apply -auto-approve

    ...

    oci_core_nat_gateway.natgw: Modifying... (ID: ocid1.natgateway.oc1.eu-frankfurt-1.........6n76gq)

    block_traffic: "false" => "true"

    oci_core_nat_gateway.natgw: Modifications complete after 0s

    Apply complete! Resources: 0 added, 1 changed, 0 destroyed.

    Outputs:

    bastion_public_ip = 130.61.53.185

    worker_public_ip = 10.0.1.130

    image_name  = CentOS-7-2019.04.15-0

    ```


    You can now verify in the OCI Console that the NAT gateway has been effectively
    disabled. To do so, follow these steps:


    1.  Go to Menu ➤ Networking ➤ Virtual Cloud Networks.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click the VCN name (bastionnat-vcn).


    4.  In the Resources section, click NAT Gateways.'
  trans: "\n# 通过堡垒主机访问工作节点\n\n```\n$ ssh-add ~/.ssh/oci_id_rsa\nIdentity added: /Users/mjk/.ssh/oci_id_rsa\n\
    $ ssh -J opc@$BASTION_PUBLIC_IP opc@10.0.1.130\n[opc@worker-vm ~]$\n```\n\n为了访问工作节点的终端，我们将私钥添加到了认证代理，并使用\
    \ `-J` 选项执行 `ssh` 命令，以利用 SSH ProxyJump 技术。为了验证私有子网中的实例是否确实能够访问互联网，我们将尝试 ping 一个\
    \ Google 的公共 DNS 服务器。\n\n```\n[opc@worker-vm ~]$ ping -c 3 8.8.8.8\nPING 8.8.8.8\
    \ (8.8.8.8) 56(84) bytes of data.\n64 bytes from 8.8.8.8: icmp_seq=1 ttl=123 time=24.0\
    \ ms\n64 bytes from 8.8.8.8: icmp_seq=2 ttl=123 time=0.417 ms\n64 bytes from 8.8.8.8:\
    \ icmp_seq=3 ttl=123 time=0.377 ms\n--- 8.8.8.8 ping statistics ---\n3 packets\
    \ transmitted, 3 received, 0% packet loss, time 2001ms\nrtt min/avg/max/mdev =\
    \ 0.377/8.294/24.088/11.168 ms\n[opc@worker-vm ~]$ exit\n$\n```\n\n可以看到，尽管工作节点实例没有公共\
    \ IP，但它既可以通过堡垒主机通过 SSH 访问，也可以通过 NAT 网关访问互联网。\n\n# 虚拟云网络与网关资源概述\n\n现在，让我们从本节的角度，简要了解一下基础设施代码中那些最有趣的资源。清单\
    \ 6-1 展示了 `vcn.tf` 文件，我们在其中定义了虚拟云网络（VCN）、Internet 网关和 NAT 网关。\n\n```\nresource\
    \ \"oci_core_virtual_network\" \"vcn\" {\n  compartment_id = var.compartment_ocid\n\
    \  cidr_block     = var.vcn_cidr\n  display_name   = \"bastionnat-vcn\"\n  dns_label\
    \      = \"a\"\n}\n\nresource \"oci_core_internet_gateway\" \"igw\" {\n  compartment_id\
    \ = var.compartment_ocid\n  vcn_id         = oci_core_virtual_network.vcn.id\n\
    \  display_name   = \"internet-gateway\"\n}\n\nresource \"oci_core_nat_gateway\"\
    \ \"natgw\" {\n  compartment_id = var.compartment_ocid\n  vcn_id         = oci_core_virtual_network.vcn.id\n\
    \  display_name   = \"nat-gateway\"\n  block_traffic  = false\n}\n```\n清单 6-1\
    \ `vcn.tf` (根模块)\n\n两种类型的网关都在 VCN 内创建。Internet 网关 (`igw`) 实际上为连接到公共子网的实例提供入站和出站连接，这些公共子网的路由表包含一条路由规则，该规则将非\
    \ VCN 流量的目标指向 Internet 网关。NAT 网关 (`natgw`) 本质上旨在为私有子网中的实例提供仅出站流量，这些私有子网的路由表包含一条路由规则，该规则将非\
    \ VCN 流量的目标指向 NAT 网关。这些角色在图 6-11 中进行了概念性展示。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig11_HTML.jpg](img/478313_1_En_6_Fig11_HTML.jpg)\n\
    图 6-11 Internet 和 NAT 网关的路由规则\n\n# 模块化代码与变量传递\n\n为了遵循最佳实践，我们在基础设施代码中使用了模块。`bastion`\
    \ 模块负责创建一个带有专用路由表和安全列表的公共子网，以及启动连接到该公共子网的堡垒主机实例。`workers` 模块创建一个私有子网，连同其专用路由表和安全列表，并启动一个连接到该私有子网的工作节点实例。由于路由规则在每个模块内部创建，我们必须将两个网关的\
    \ OCID 作为输入变量传递。清单 6-2 展示了 `modules.tf` 文件的摘录，说明了这是如何完成的。\n\n```\n...\nmodule\
    \ \"bastion\" {\n  source             = \"./bastion\"\n  compartment_ocid   =\
    \ var.compartment_ocid\n  vcn_ocid           = oci_core_virtual_network.vcn.id\n\
    \  vcn_igw_ocid       = oci_core_internet_gateway.igw.id\n  vcn_cidr         \
    \  = oci_core_virtual_network.vcn.cidr_block\n  vcn_subnet_cidr    = \"10.0.1.0/27\"\
    \n  ads                = data.oci_identity_availability_domains.ads.availability_domains[*].name\n\
    \  image_ocid         = data.oci_core_images.centos_image.images[0].id\n}\n\n\
    module \"workers\" {\n  source             = \"./workers\"\n  compartment_ocid\
    \   = var.compartment_ocid\n  vcn_ocid           = oci_core_virtual_network.vcn.id\n\
    \  vcn_nat_ocid       = oci_core_nat_gateway.natgw.id\n  vcn_cidr           =\
    \ oci_core_virtual_network.vcn.cidr_block\n  vcn_subnet_cidr    = \"10.0.1.128/27\"\
    \n  ads                = data.oci_identity_availability_domains.ads.availability_domains[*].name\n\
    \  image_ocid         = data.oci_core_images.centos_image.images[0].id\n}\n...\n\
    ```\n清单 6-2 `modules.tf` (根模块)\n\n在我的例子中，将 Internet 网关的 OCID 传递到 `bastion` 模块的变量称为\
    \ `vcn_igw_ocid`。你在第 3 章已经了解到，模块输入变量的名称是任意的。你只需要确保在模块内部正确引用它们。如果你查看 `bastion/vcn.tf`\
    \ 文件，你会发现 Internet 网关的 OCID 成为了所有非 VCN 流量的目标。清单 6-3 展示了 `bastion/vcn.tf` 文件的相关部分。\n\
    \n```\nresource \"oci_core_route_table\" \"bastion_rt\" {\n  compartment_id =\
    \ var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  route_rules {\n   \
    \ network_entity_id = var.vcn_igw_ocid\n    destination_type  = \"CIDR_BLOCK\"\
    \n    destination       = \"0.0.0.0/0\"\n  }\n  display_name   = \"bastion-rt\"\
    \n}\n```\n清单 6-3 `vcn.tf` (Bastion 模块)\n\n类似地，我们使用 `vcn_nat_ocid` 变量来传递 NAT 网关的\
    \ OCID，这次是传递到 `workers` 模块。清单 6-4 展示了工作节点所连接的私有子网所使用的路由表的定义。\n\n```\nresource\
    \ \"oci_core_route_table\" \"workers_rt\" {\n  compartment_id = var.compartment_ocid\n\
    \  vcn_id         = var.vcn_ocid\n  route_rules {\n    network_entity_id = var.vcn_nat_ocid\n\
    \    destination_type  = \"CIDR_BLOCK\"\n    destination       = \"0.0.0.0/0\"\
    \n  }\n  display_name   = \"workers-rt\"\n}\n```\n清单 6-4 `vcn.tf` (Workers 模块)\n\
    \n# 修改与验证 NAT 网关配置\n\n如果你需要临时阻止私有实例到公共互联网的出站流量，你可以仅用一个简单的开关来完成。NAT 网关可以被设置为阻止流量。要测试此功能，请转到根模块中的\
    \ `vcn.tf` 文件，并将 `block_traffic` 属性设置为 `true`，如清单 6-5 所示。\n\n```\n...\nresource\
    \ \"oci_core_nat_gateway\" \"natgw\" {\n  compartment_id = var.compartment_ocid\n\
    \  vcn_id         = oci_core_virtual_network.vcn.id\n  display_name   = \"nat-gateway\"\
    \n  block_traffic  = true\n}\n```\n清单 6-5 `vcn.tf` (根模块)\n\n一旦你应用更改，Terraform\
    \ 将检测到你的 `.tf` 文件所代表的预期状态与它在刷新后的状态文件中找到的内容不同。计算出的计划将执行相关的 API 调用，将 NAT 网关设置为阻止流量。\n\
    \n```\n$ terraform apply -auto-approve\n...\noci_core_nat_gateway.natgw: Modifying...\
    \ (ID: ocid1.natgateway.oc1.eu-frankfurt-1.........6n76gq)\nblock_traffic: \"\
    false\" => \"true\"\noci_core_nat_gateway.natgw: Modifications complete after\
    \ 0s\nApply complete! Resources: 0 added, 1 changed, 0 destroyed.\nOutputs:\n\
    bastion_public_ip = 130.61.53.185\nworker_public_ip = 10.0.1.130\nimage_name \
    \ = CentOS-7-2019.04.15-0\n```\n\n你现在可以在 OCI 控制台中验证 NAT 网关是否已被有效禁用。为此，请按照以下步骤操作：\n\
    1.  转到菜单 ➤ 网络 ➤ 虚拟云网络。\n2.  确保选择了 `Sandbox` 计算域。\n3.  点击 VCN 名称 (bastionnat-vcn)。\n\
    4.  在“资源”部分，点击 NAT 网关。\n"
- fmt: "# 禁用 NAT 网关后的连通性测试\n\n您应该看到 NAT 网关已变灰，其状态设置为阻止流量，如图 [6-12](#478313_1_En_6_Chapter.xhtml#Fig12)\
    \ 所示。您看到的 NAT 网关的公共 IP 是一个临时公共 IP。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig12_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig12_HTML.jpg)\n\
    \n**图 6-12**\n\n在 OCI 控制台中查看如何禁用 NAT 网关\n\n这次，您应该无法再 ping 通 Google 公共 DNS 服务器。让我们测试一下。通过堡垒主机使用\
    \ SSH 连接到工作节点实例，并发出 `ping` 命令。\n\n```bash\n$ ssh -J opc@$BASTION_PUBLIC_IP opc@10.0.1.130\n\
    ...\n[opc@worker-vm ~]$ ping -c 5 8.8.8.8\nPING 8.8.8.8 (8.8.8.8) 56(84) bytes\
    \ of data.\n--- 8.8.8.8 ping statistics ---\n5 packets transmitted, 0 received,\
    \ 100% packet loss, time 3999ms\n[opc@worker-vm ~]$ exit\n$\n```\n\n这就结束了关于堡垒主机和\
    \ NAT 网关的实践练习。您现在可以终止这些基础设施。\n\n```bash\n$ terraform destroy -auto-approve\n...\n\
    Destroy complete! Resources: 11 destroyed.\n```\n\n除了我们为每个子网创建的两个路由规则外，还有专用的安全列表。这将是我们基于您刚刚终止的基础设施代码要讨论的最后一个元素。\n\
    \n### 安全规则\n\n安全规则提供了一个额外的虚拟防火墙层，通过明确允许它们所描述的流量来保护计算实例。虚拟云网络默认遵循拒绝所有原则；因此，为了让不同类型的专用流量通过，必须配置适当的安全规则。安全列表和规则已在第\
    \ [2](#478313_1_En_2_Chapter.xhtml) 章开头简要介绍过。在本书的过程中，每次部署和测试带有计算实例的云基础设施时，您都会用到它们。您已经知道，每个子网必须至少有一个关联的\
    \ `security list`（安全列表），它是一组安全规则的集合。`Security rules`（安全规则）总是定义什么是允许的，因此要拒绝特定类型的流量，您只需要确保没有允许它的规则。规则在数据包到达计算实例之前执行。安全规则根据其方向分类为\
    \ `ingress`（入站）和 `egress`（出站）。安全规则的无状态性会影响响应流量的处理方式。对于一条 `stateful`（有状态）规则，如果基于出站规则允许了出站流量，则相应的响应数据包会自动被允许。对于一条\
    \ `stateless`（无状态）规则，我们仍然需要在相反方向上有一条明确的无状态规则，如图 [6-13](#478313_1_En_6_Chapter.xhtml#Fig13)\
    \ 所示的概念图。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig13_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig13_HTML.jpg)\n\
    \n**图 6-13**\n\n无状态和有状态安全规则\n\nOracle Cloud 必须跟踪有状态规则所允许的连接，以便能够自动允许相应的响应，这不足为奇。这是以轻微延迟增加为代价的。此外，每种实例规格类型都有允许跟踪连接数量的限制。\n\
    \n> **提示**\n>\n> 尽可能使用无状态规则，以避免有状态规则发生的连接跟踪性能损耗，并避免达到限制。这样，您将避免触及跟踪连接数量的限制。\n\n\
    如果存在两条安全规则，一条无状态和一条有状态，它们对某些特定流量重叠，则无状态规则具有优先权，并且您必须确保有一条相应的无状态规则将允许相关的响应流量。\n\
    \n清单 [6-6](#478313_1_En_6_Chapter.xhtml#PC16) 展示了来自 `bastion/vcn.tf` 文件的安全列表元素定义。\n\
    \n```hcl\n...\nresource \"oci_core_security_list\" \"bastion_sl\" {\n  compartment_id\
    \ = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  egress_security_rules\
    \ {\n    stateless    = true\n    destination  = var.vcn_cidr\n    protocol  \
    \   = \"all\"\n  }\n  egress_security_rules {\n    stateless    = false\n    destination\
    \  = \"0.0.0.0/0\"\n    protocol     = \"all\"\n  }\n  ingress_security_rules\
    \ {\n    stateless    = true\n    source       = var.vcn_cidr\n    protocol  \
    \   = \"all\"\n  }\n  ingress_security_rules {\n    stateless    = false\n   \
    \ source       = \"0.0.0.0/0\"\n    protocol     = \"6\"\n    tcp_options {\n\
    \      min = 22\n      max = 22\n    }\n  }\n  display_name = \"bastion-sl\"\n\
    }\n...\n```\n**清单 6-6**\n\nvcn.tf（堡垒模块）\n\n`bastion_sl` 安全列表包含一个 *无状态*（`stateless=true`）的\
    \ `ingress rule`（入站规则），它允许来自同一 VCN（`source=var.vcn_cidr`，子网所属的 VCN）中实例的 *所有*（`protocol\
    \ = \"all\"`）入站流量，以及一个 *无状态 egress rule*（出站规则），类似地，它接受发往同一 VCN（`destination=var.vcn_cidr`，堡垒公共子网所属的\
    \ VCN）中任何子网所连接实例的所有出站流量。生成的规则如图 [6-14](#478313_1_En_6_Chapter.xhtml#Fig14) 所示。\n\
    \n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig14_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig14_HTML.jpg)\n\
    \n**图 6-14**\n\n用于堡垒子网的 VCN 内部流量无状态规则\n\n为了允许从任何主机（`source=\"0.0.0.0/0\"`）发起的传入\
    \ SSH 连接（`protocol=\"6\" tcp_options { min=22 max=22 }`）进行双向通信，安全列表包含一个 *有状态*（`stateless=false`）的\
    \ `ingress rule`（入站规则）。最后，堡垒主机本身受益于一个 *有状态 egress rule*（出站规则），该规则允许从实例所连接的公共子网发起的、发送到任何主机（`destination=\"\
    0.0.0.0/0\"`）的任何类型（`protocol = \"all\"`）的双向数据包交换。生成的规则如图 [6-15](#478313_1_En_6_Chapter.xhtml#Fig15)\
    \ 所示。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig15_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig15_HTML.jpg)\n\
    \n**图 6-15**\n\n用于堡垒子网的有状态规则"
  raw: 'You should see the NAT gateway grayed out with its status set to blocking
    traffic, as shown in Figure [6-12](#478313_1_En_6_Chapter.xhtml#Fig12). The public
    IP you see for the NAT gateway is an ephemeral public IP.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig12_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Viewing how to disable NAT gateway in the OCI Console


    This time, you should not be able to ping the Google public DNS server. Let’s
    test it. Connect to the worker instance using SSH over the bastion host and issue
    the `ping` command.


    ```

    $ ssh -J opc@$BASTION_PUBLIC_IP opc@10.0.1.130

    ...

    [opc@worker-vm ~]$ ping -c 5 8.8.8.8

    PING 8.8.8.8 (8.8.8.8) 56(84) bytes of data.

    --- 8.8.8.8 ping statistics ---

    5 packets transmitted, 0 received, 100% packet loss, time 3999ms

    [opc@worker-vm ~]$ exit

    $

    ```


    This concludes the hands-on exercise with a bastion host and NAT gateway. You
    can now terminate the infrastructure.


    ```

    $ terraform destroy -auto-approve

    ...

    Destroy complete! Resources: 11 destroyed.

    ```


    In addition to the two route rules we have created for each subnet, there are
    also dedicated security lists. This will be the last element we are going to discuss
    based on the infrastructure code you’ve just terminated.


    ### Security Rules


    Security rules provide an additional layer of a virtual firewall that protects
    compute instances by explicitly allowing the traffic they describe. Virtual cloud
    networks follow the deny-all principle by default; therefore, to let different
    kinds of specialized traffic pass through, proper security rules must be put in
    place. Security lists and rules were already briefly introduced at the beginning,
    back in Chapter [2](#478313_1_En_2_Chapter.xhtml). In the course of this book,
    you used them every time you deployed and tested the cloud infrastructure with
    compute instances. You already know that every subnet must have at least one associated
    *security list*, which is a collection of security rules. *Security rules* always
    define what is allowed, so to deny a particular type of traffic, you just need
    to make sure there are no rules that allow it. The rules are enforced before packets
    reach the compute instance. Security rules are categorized based on their direction
    as *ingress* (inbound) and *egress* (outbound). Security rule statelessness impacts
    how response traffic is handled. For a *stateful* rule , if outbound traffic is
    allowed based on an egress rule, the corresponding response packets are automatically
    allowed. In the case of a *stateless* rule , we still need an explicit stateless
    rule in the opposite direction, as conceptually illustrated in Figure [6-13](#478313_1_En_6_Chapter.xhtml#Fig13).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig13_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Stateless and stateful security rules


    It is no surprise that Oracle Cloud has to track the connections allowed by stateful
    rules to be able to automatically permit the corresponding responses. This comes
    at a cost of a slight increase in latency. Furthermore, every type of instance
    shape has a limit for the allowed number of tracked connections.


    Tip


    Use stateless rules whenever possible to avoid the connection tracking performance
    penalty that occurs for the stateful rules and avoid hitting. In this way, you
    will avoid hitting the limit on the number of tracked connections.


    If there are two security rules, one stateless and one stateful, that overlap
    for some particular traffic, the stateless rule takes priority, and you must make
    sure that there is a corresponding stateless rule that will allow related response
    traffic.


    Listing [6-6](#478313_1_En_6_Chapter.xhtml#PC16) presents the definition of a
    security list element from the `bastion/vcn.tf` file.


    ```

    ...

    resource "oci_core_security_list" "bastion_sl" {

    compartment_id = var.compartment_ocid

    vcn_id = var.vcn_ocid

    egress_security_rules {

    stateless=true

    destination=var.vcn_cidr

    protocol="all"

    }

    egress_security_rules {

    stateless=false

    destination="0.0.0.0/0"

    protocol="all"

    }

    ingress_security_rules {

    stateless=true

    source=var.vcn_cidr

    protocol="all"

    }

    ingress_security_rules {

    stateless=false

    source="0.0.0.0/0"

    protocol="6"

    tcp_options {

    min=22

    max=22

    }

    }

    display_name = "bastion-sl"

    }

    ...

    Listing 6-6

    vcn.tf (Bastion Module)

    ```


    The `bastion_sl` security list contains one *stateless* (`stateless=true`) *ingress
    rule* that allows the entire (`protocol = "all"`) incoming traffic from instances
    in the same VCN (`source=var.vcn_cidr`) to which the subnet belongs and one *stateless
    egress rule* that, similarly, accepts the entire outgoing traffic to the instances
    attached to any subnet in the same VCN (`destination=var.vcn_cidr`) to which the
    bastion public subnet belongs. The resulting rules are shown in Figure [6-14](#478313_1_En_6_Chapter.xhtml#Fig14).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig14_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Intra-VCN traffic stateless rules for the bastion subnet


    To allow two-way communication initiated by the incoming SSH connections (`protocol="6"
    tcp_options { min=22 max=22 }`) from any host (`source="0.0.0.0/0"`), the security
    list contains one *stateful* (`stateless=false`) *ingress rule*. Finally, the
    bastion host alone benefits from a *stateful egress rule* that allows any kind
    (`protocol = "all"`) of two-way packet exchange initiated by the outbound traffic
    sent to any host (`destination="0.0.0.0/0"`) and coming from the public subnet
    the instance is attached to. The resulting rules are shown in Figure [6-15](#478313_1_En_6_Chapter.xhtml#Fig15).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig15_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Stateful rules for the bastion subnet'
  trans: "\n# 禁用 NAT 网关后的连通性测试\n\n您应该看到 NAT 网关已变灰，其状态设置为阻止流量，如图 6-12 所示。您看到的 NAT 网关的公共\
    \ IP 是一个临时公共 IP。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig12_HTML.jpg](img/478313_1_En_6_Fig12_HTML.jpg)\n\
    \n**图 6-12**\n\n在 OCI 控制台中查看如何禁用 NAT 网关\n\n这次，您应该无法再 ping 通 Google 公共 DNS 服务器。让我们测试一下。通过堡垒主机使用\
    \ SSH 连接到工作节点实例，并发出 `ping` 命令。\n\n```bash\n$ ssh -J opc@$BASTION_PUBLIC_IP opc@10.0.1.130\n\
    ...\n[opc@worker-vm ~]$ ping -c 5 8.8.8.8\nPING 8.8.8.8 (8.8.8.8) 56(84) bytes\
    \ of data.\n--- 8.8.8.8 ping statistics ---\n5 packets transmitted, 0 received,\
    \ 100% packet loss, time 3999ms\n[opc@worker-vm ~]$ exit\n$\n```\n\n这就结束了关于堡垒主机和\
    \ NAT 网关的实践练习。您现在可以终止这些基础设施。\n\n```bash\n$ terraform destroy -auto-approve\n...\n\
    Destroy complete! Resources: 11 destroyed.\n```\n\n除了我们为每个子网创建的两个路由规则外，还有专用的安全列表。这将是我们基于您刚刚终止的基础设施代码要讨论的最后一个元素。\n\
    \n### 安全规则\n\n安全规则提供了一个额外的虚拟防火墙层，通过明确允许它们所描述的流量来保护计算实例。虚拟云网络默认遵循拒绝所有原则；因此，为了让不同类型的专用流量通过，必须配置适当的安全规则。安全列表和规则已在第\
    \ 2 章开头简要介绍过。在本书的过程中，每次部署和测试带有计算实例的云基础设施时，您都会用到它们。您已经知道，每个子网必须至少有一个关联的 `security\
    \ list`（安全列表），它是一组安全规则的集合。`Security rules`（安全规则）总是定义什么是允许的，因此要拒绝特定类型的流量，您只需要确保没有允许它的规则。规则在数据包到达计算实例之前执行。安全规则根据其方向分类为\
    \ `ingress`（入站）和 `egress`（出站）。安全规则的无状态性会影响响应流量的处理方式。对于一条 `stateful`（有状态）规则，如果基于出站规则允许了出站流量，则相应的响应数据包会自动被允许。对于一条\
    \ `stateless`（无状态）规则，我们仍然需要在相反方向上有一条明确的无状态规则，如图 6-13 所示的概念图。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig13_HTML.jpg](img/478313_1_En_6_Fig13_HTML.jpg)\n\
    \n**图 6-13**\n\n无状态和有状态安全规则\n\nOracle Cloud 必须跟踪有状态规则所允许的连接，以便能够自动允许相应的响应，这不足为奇。这是以轻微延迟增加为代价的。此外，每种实例规格类型都有允许跟踪连接数量的限制。\n\
    \n> **提示**\n>\n> 尽可能使用无状态规则，以避免有状态规则发生的连接跟踪性能损耗，并避免达到限制。这样，您将避免触及跟踪连接数量的限制。\n\n\
    如果存在两条安全规则，一条无状态和一条有状态，它们对某些特定流量重叠，则无状态规则具有优先权，并且您必须确保有一条相应的无状态规则将允许相关的响应流量。\n\
    \n清单 6-6 展示了来自 `bastion/vcn.tf` 文件的安全列表元素定义。\n\n```hcl\n...\nresource \"oci_core_security_list\"\
    \ \"bastion_sl\" {\n  compartment_id = var.compartment_ocid\n  vcn_id        \
    \ = var.vcn_ocid\n  egress_security_rules {\n    stateless    = true\n    destination\
    \  = var.vcn_cidr\n    protocol     = \"all\"\n  }\n  egress_security_rules {\n\
    \    stateless    = false\n    destination  = \"0.0.0.0/0\"\n    protocol    \
    \ = \"all\"\n  }\n  ingress_security_rules {\n    stateless    = true\n    source\
    \       = var.vcn_cidr\n    protocol     = \"all\"\n  }\n  ingress_security_rules\
    \ {\n    stateless    = false\n    source       = \"0.0.0.0/0\"\n    protocol\
    \     = \"6\"\n    tcp_options {\n      min = 22\n      max = 22\n    }\n  }\n\
    \  display_name = \"bastion-sl\"\n}\n...\n```\n**清单 6-6**\n\nvcn.tf（堡垒模块）\n\n\
    `bastion_sl` 安全列表包含一个 *无状态*（`stateless=true`）的 `ingress rule`（入站规则），它允许来自同一 VCN（`source=var.vcn_cidr`，子网所属的\
    \ VCN）中实例的 *所有*（`protocol = \"all\"`）入站流量，以及一个 *无状态 egress rule*（出站规则），类似地，它接受发往同一\
    \ VCN（`destination=var.vcn_cidr`，堡垒公共子网所属的 VCN）中任何子网所连接实例的所有出站流量。生成的规则如图 6-14\
    \ 所示。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig14_HTML.jpg](img/478313_1_En_6_Fig14_HTML.jpg)\n\
    \n**图 6-14**\n\n用于堡垒子网的 VCN 内部流量无状态规则\n\n为了允许从任何主机（`source=\"0.0.0.0/0\"`）发起的传入\
    \ SSH 连接（`protocol=\"6\" tcp_options { min=22 max=22 }`）进行双向通信，安全列表包含一个 *有状态*（`stateless=false`）的\
    \ `ingress rule`（入站规则）。最后，堡垒主机本身受益于一个 *有状态 egress rule*（出站规则），该规则允许从实例所连接的公共子网发起的、发送到任何主机（`destination=\"\
    0.0.0.0/0\"`）的任何类型（`protocol = \"all\"`）的双向数据包交换。生成的规则如图 6-15 所示。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig15_HTML.jpg](img/478313_1_En_6_Fig15_HTML.jpg)\n\
    \n**图 6-15**\n\n用于堡垒子网的有状态规则\n"
- fmt: '### VCN Peering


    Working with multiple production systems usually results in a number of separate
    compartments where the cloud resources for these production systems reside. The
    VCN cloud resource cannot span multiple compartments but must be created inside
    one particular compartment. If each production system is managed within its own
    dedicated compartment, you will end up having at least one VCN per system. Sooner
    or later, you are going to face the challenge of connecting to some of these systems,
    based on business requirements. For systems running in the same cloud region,
    you will use the `local VCN peering` to connect to the chosen VCNs and let the
    instances communicate using their private addresses within Oracle Cloud, as presented
    in Figure [6-16](#478313_1_En_6_Chapter.xhtml#Fig16).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig16_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig16_HTML.jpg)


    Figure 6-16 Local VCN peering


    An important requirement that has to be considered already during the early planning
    stage is the fact that two connected VCNs must not use overlapping IP address
    ranges. If they did, routing would fail. To set up local VCN peering, you need
    to do the following:


    *   Create `local peering gateways` (`LPG`) in both VCNs.

    *   Establish a connection between `LPG`s.

    *   Adapt routing tables by adding new rules that direct traffic intended for
    the other VCN to `LPG`s.

    *   Make sure the security rules allow traffic to and from the other VCN.


    A local peering gateway is just an ordinary cloud resource that is created within
    the VCN just like the Internet gateway or NAT gateway you’ve already worked with.
    If your user is entitled to manage both VCNs, creating a connection is pretty
    straightforward. You just need to point to the other `LPG` and the peering status
    should indicate a successful connection, as shown in Figure [6-17](#478313_1_En_6_Chapter.xhtml#Fig17).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig17_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig17_HTML.jpg)


    Figure 6-17 Connected local peering gateway


    When dealing with production systems, however, there is some chance that the other
    VCN is managed by someone else. In such a case, you need to agree on who is going
    to initiate the connection. If the admin users do not have full management access
    to their own compartments, you have to make sure that the requestor belongs to
    a group that holds the `manage local-peering-from` rights. The acceptor belongs
    to a group that holds the `managed local-peering-to` rights. Both IAM policy resource
    types (`local-peering-from` and `local-peering-to`) belong to the `virtual-network-family`.
    To learn more about IAM policies, please refer to Chapter [4](#478313_1_En_4_Chapter.xhtml).


    As soon as the `LPG`s have been successfully connected, the VCN peering is in
    place. Now, you have to adapt the routing tables in both VCNs. Basically, new
    route rules that direct the traffic intended for the other VCN must be added on
    both sides. The target network entity is the `LPG`, as shown in Figure [6-18](#478313_1_En_6_Chapter.xhtml#Fig18),
    where the other VCN uses the `10.6.0.0/16` address range.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig18_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig18_HTML.jpg)


    Figure 6-18 Route rules for local VCN peering


    The last elements to add are the security rules. There is no exception here. Just
    like you would add new security rules for different subnets in the same VCN, you
    have to do the same for the subnets from the peered VCN. Please consider using
    stateless rules to avoid unnecessary connection tracking related to stateful rules.


    VCN peering is a point-to-point connection. Any given VCN can be locally peered
    with up to ten other VCNs. In other words, you can have up to ten `LPG`s per VCN
    where each `LPG` represents one peered VCN, as shown in Figure [6-19](#478313_1_En_6_Chapter.xhtml#Fig19).
    It does not sound very scalable, does it? Another important characteristic of
    peering to remember is the fact that instances in one VCN cannot use the Internet
    gateway in the peered VCN to access the Internet.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig19_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig19_HTML.jpg)


    Figure 6-19 One LPG per one peered VCN


    In the case of a complex application landscape, you may either end up with a hard-to-manage
    local peering VCN spaghetti or hit the maximum limit of local peering connections.
    To alleviate these problems, there are two alternative architectures to consider.


    *   Using a dedicated compartment just for cloud networking

    *   Using a messaging platform as a service


    Figure [6-20](#478313_1_En_6_Chapter.xhtml#Fig20) presents a high-level sketch
    of an architecture in which there is a `dedicated networking compartment` with
    one large VCN that contains multiple subnets. Each subnet is dedicated to one
    production system. Production system instances are launched in their own compartments
    but, at the same time, are attached to subnets from the VCN in the networking
    compartment. This setup completely eliminates the need for local VCN peering,
    but this benefit may come at a cost of more complex IAM policies, especially if
    there are different compartment admin groups in place.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig20_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig20_HTML.jpg)


    Figure 6-20 Architecture based on a dedicated network compartment


    Another recommended way to go in the case of complex application landscapes that
    involve multiple production systems is to use a messaging platform as a service.
    Production systems send their messages to a messaging cluster that under the hood
    consists of multiple message brokers. If you choose a managed service, you won’t
    need to worry about cluster management. To find out more, explore Oracle Cloud
    Infrastructure Streaming to see if it fits your purpose.


    Until now, we discussed local VCN peering that assumed all connected VCNs are
    located in the same cloud region. To connect VCNs that reside in two different
    Oracle Cloud regions, you will employ `remote VCN peering`. This technique is
    to some extent similar but involves another type of cloud resource called a `dynamic
    routing gateway` (`DRG`). In rare cases, you might even want to connect to a VCN
    that resides in a different tenancy. `Cross-tenancy VCN peering` is also possible
    and requires granting additional IAM policies in both tenancies. You can find
    more information in the official documentation.


    Up to that point, we focused on networking. We discussed cloud resources related
    to IP addresses, applied bastion host and NAT gateway patterns to allow private
    workers to securely communicate with the Internet, explained the types of security
    rules, and explored selected interconnectivity matters. Now, we will look closer
    at the aspects related to compute instances.'
