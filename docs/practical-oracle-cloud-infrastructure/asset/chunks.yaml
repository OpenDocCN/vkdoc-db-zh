    ## 容器


    Oracle Cloud Infrastructure (OCI) 使用 *容器* 来组织相关的云资源。几乎每一个云资源，例如计算实例、对象存储桶或托管的
    Kubernetes 集群，都必须只属于一个容器。你在创建云资源时决定它将存在于哪个容器中。如果你发现需要将资源移动到不同的容器，你将不得不终止旧的资源，并在目标容器中以相同的配置置备一个新的资源，除非该特定云资源类型支持在容器之间移动。容器提供逻辑隔离，这使得治理管理权限策略和跟踪相关资源组产生的成本变得容易得多。这种隔离是纯粹逻辑上的。这意味着在技术上仍然可以让一个容器中的资源（例如计算实例）与另一个容器中的资源（例如其他计算实例和对象存储桶）进行通信。使用容器有三个原因。


    *   更轻松的资源管理

    *   细粒度的访问控制

    *   成本拆分


    首先，如果逻辑上组织了相关资源，那么理解你的云租户中有哪些资产以及管理这些资源会更容易。通过这种方式，你能够对查询应用更精确的过滤器，并获得更短、更准确的结果列表。随着你的云资源数量和种类开始增长，这一点会变得更加明显。其次，容器通常成为你访问控制策略语句的主要范围。这些语句存储在称为身份和访问管理
    *策略* 的文档中。每个语句都将允许对存在于给定容器中的特定类型云资源进行某种访问。在这个阶段，值得注意的是子容器从其父容器继承访问管理策略。第三，你可以按容器
    *过滤成本*，只要你选择为每个项目环境和生产系统使用不同的容器，就能知道每个项目环境和生产系统产生了什么云资源消耗成本。


    容器是全局的，每个独立的容器跨越你的云账户订阅的所有区域。在许多情况下，建议将容器安排在分层结构中，该结构最多可包含六级子容器。如果你正在处理一个单一的概念验证项目，或者只是在学习
    OCI，你很可能会将所有云资源存储在单个容器中。你可以称它为 `Sandbox` 或任何对你更有意义的名称。一旦你考虑处理多个项目并在你的云租户中运行一组生产系统，你就应该仔细规划容器层次结构。通常你会如何处理这个任务？嗯，很容易发现，最自然的构建容器层次结构的依据是项目环境和生产系统。为什么？简单因为它们通常为资源管理、访问控制和成本跟踪——使用容器的三个主要原因——提供了典型的上下文。这种方法在图
    4-2 中进行了说明。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig2_HTML.jpg](img/478313_1_En_4_Fig2_HTML.jpg)


    图 4-2 推导容器层次结构


    在你的云账户中总是有一个根容器。这也是我们容器层次结构中的根节点。如果我们遵循这个例子，我们将创建两个独立的容器：一个用于项目 (`Projects`)，一个用于生产系统
    (`Systems`)。接下来，我们将在 `Systems` 容器内创建三个子容器：`MID`、`IDM` 和 `IP`。这样，逻辑上属于 IDM 生产系统的云资源将位于
    `Systems/IDM` 容器中。同样，我们将在 `Projects` 容器内创建两个子容器：`ImageProcessing` 和 `ImageDataMangement`。随后，我们最终会在每个项目特定的容器中为开发和测试环境再创建两个子容器。同样，这将让你将图像处理项目及其开发环境特有的资产保留在
    `Projects/ImageProcessing/Development` 容器中。就是这么简单。图 4-3 展示了你在 OCI 控制台容器范围筛选器中会看到的预期容器结构。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig3_HTML.jpg](img/478313_1_En_4_Fig3_HTML.jpg)


    图 4-3 OCI 控制台容器范围筛选器


    ### 容器管理操作


