    ## Programming Object Storage


    To interact with the object storage API, we have been using CLI commands in the
    examples presented in this chapter until that point. In the real world, however,
    the great majority of all API calls to the object storage comes from applications.
    In this section, I will show you how to use one of the SDKs, namely, the OCI SDK
    for Python, to let your applications use Oracle Cloud Infrastructure object storage.
    I will also take this opportunity and explain how to deal with large files by
    employing a multipart file upload method.


    In Chapter [3](#478313_1_En_3_Chapter.xhtml), I guided you through a simple process
    of SDK installation and configuration. In Chapter [4](#478313_1_En_4_Chapter.xhtml),
    we created new groups and users as well as added two new profiles to the SDK/CLI
    configuration file: `SANDBOX-ADMIN` and `SANDBOX-USER`. Finally, in the first
    part of this chapter, we created the required policies in this way to allow the
    group members of the `sandbox-users` group to manage objects in the `blueprints`
    bucket. I am assuming all of this is still in place.


    All operations performed on object storage cloud resources with the use of the
    OCI SDK for Python are done through the methods of `the ObjectStorageClient` class.
    You can find a comprehensive documentation of this class at [`https://oracle-cloud-infrastructure-python-sdk.readthedocs.io/en/latest/api/object_storage/client/oci.object_storage.ObjectStorageClient.html`.](https://oracle-cloud-infrastructure-python-sdk.readthedocs.io/en/latest/api/object_storage/client/oci.object_storage.ObjectStorageClient.html)


    ### Multipart Uploads


    When dealing with very large files such as those bigger than 100MB, it is recommended
    that you split the original file into smaller parts and leverage the `multipart
    upload` API to divide the file into manageable chunks to the cloud. This approach
    makes the upload process less prone to the negative impact of any network issues
    because you would just need to reupload the single part that failed to be delivered
    to the cloud. Furthermore, the multipart upload mechanism makes it possible to
    parallelize the upload of individual parts, which results in a faster completion
    of the upload operation. At the time of writing, the maximum size for an uploaded
    object is 10TB. Additionally, each individual part must be smaller than 50GB.
    You can create up to 10,000 parts.


    A multipart upload operation consists of four phases, which are conceptually illustrated
    in Figure [5-10](#478313_1_En_5_Chapter.xhtml#Fig10). First, you have to split
    a large file into smaller parts (1). The way you do this is up to you and the
    tools of your choice. Next, you make your first API call by sending a `CreateMultipartUpload`
    request to start a new multipart upload (2). In the request, you specify the storage
    namespace, bucket name, and target object name. In the response, you will be provided
    with an upload ID of the newly activated multipart upload. At this stage, you
    can begin uploading the parts (3). For each part, you are sending an `UploadPart`
    request to the object storage API. The sequence does not matter. As I mentioned,
    you can even upload multiple parts in parallel. In addition to the storage namespace,
    the bucket name, the target object name, and the upload ID, the `UploadPart` operation
    expects you to provide an upload part number, different for each part. In other
    words, you are responsible for numbering the parts. The part numbers do not need
    to be contiguous. The parts will be eventually combined to form a target object
    based on the ascending sequence of part numbers. The `UploadPart` operation returns
    a unique entity tag (ETag) for each part you upload. Make sure you collect the
    entity tags because you will need them as soon as you are ready to commit the
    multipart upload. To have the target object built by object storage from the uploaded
    parts, you need to commit the multipart upload (4). You do this by sending a `CommitMultipartUpload`
    request to the API. In the request, you specify a list of pairs where each pair
    contains an assigned part number and the corresponding ETag. Only the parts included
    in the list will be used to build the target object, no matter how many parts
    you’ve uploaded in total.


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig10_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig10_HTML.jpg)


    Figure 5-10 Multipart upload


    If your application cancels an ongoing multipart upload, it sends an `AbortMultipartUpload`
    request to the API. In this way, object storage would close the multipart upload,
    effectively removing the parts that have already been uploaded. What would have
    happened if you just closed the application without aborting the upload in a correct
    manner? Well, the multipart upload would technically remain active and ready to
    accept further parts. In such a case, you would be constantly charged for the
    uploaded parts until the moment you aborted the upload. Do not worry about keeping
    track of your multipart uploads. It is possible to list active uploads by sending
    `ListMultipartUploads` requests to the API. If you expect to have many application
    instances that perform multipart updates, it may be smart to implement a recurring
    job that uses this method to keep an eye on ongoing and abandoned uploads.'
