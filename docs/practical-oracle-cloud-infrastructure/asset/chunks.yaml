    ..+++\ne is 65537 (0x10001)\nEnter pass phrase for oci_api_pem:\nVerifying - Enter\
    \ pass phrase for oci_api_pem:\n$ chmod go-rwx oci_api_pem\n$ ls -l | grep pem\
    \ | awk '{ print $1\" \"$9 }'\n-rw------- oci_api_pem\n$ openssl rsa -pubout -in\
    \ oci_api_pem -out oci_api_pem.pub\nEnter pass phrase for oci_api_pem:\nwriting\
    \ RSA key\n$ ls -l | grep pem | awk '{ print $1\" \"$9 }'\n-rw------- oci_api_pem\n\
    -rw-r--r-- oci_api_pem.pub\n```\n\nIt is recommended that you restrict the access\
    \ permissions to your private key so that only the file owner is entitled to read\
    \ or amend the file. You can perform this operation using the `chmod` command,\
