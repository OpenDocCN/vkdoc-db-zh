    files are seen as individual *objects* grouped together in a folder-like hierarchy
    that are called *buckets* . Access policies guard the stored objects and decide
    who can access them and what actions are allowed. Data is encrypted at rest, and
    redundant copies are distributed across data centers within a selected region.
    We often differentiate two types of object storage based on the access frequency.


    *   Standard *object storage* that offers an immediate, fast access to the data


    *   *Archive storage* that offers much cheaper way to preserve data at the cost
    of having to wait a few hours or more to be able to retrieve the data


    Some lifecycle aspects such as moving these objects that are rarely accessed to
    the archive storage can be automated through the use of lifecycle policies. What
    kind of data do you typically persist in object storage buckets? This type of
    data can range from application logs, through database backups or data that is
    stored as part of your content delivery network, to large archives of business
    data that must be safely stored for a longer period of time to comply with the
    regulations.


    *Block storage*, contrary to the object storage, plays a supplementary role in
    the context of the compute capability, even though we classify the resources such
    as block volumes, volume groups, or backup polices as belonging to the storage
    capability. The primary type of a cloud resource here is a *block volume*. You
    can think of it as a nonvolatile memory disk that is a subject of its own lifecycle,
    but it makes sense to use it only with compute instances such as virtual or bare-metal
    machines. Actually, nothing spectacular takes place while provisioning a new block
    volume. The life of a new block volume begins as soon as you attach it to a compute
    instance, create a filesystem, and mount it. From this moment, you can use the
    volume as an additional disk for your compute instance. As a matter of fact, depending
    on the applications you host on the instance, you may store all your application
    data on this volume instead of using the boot volume that every compute instance
    has from the beginning. Of course, if you architect a new cloud solution, you
    will probably choose another type of cloud resources such as object storage or
    managed database for storing the application data. Yet, you will still discover
    a lot of different types of applications, especially traditional ones, that will
    benefit more from using an attachable block volume.


    Going further, we can distinguish two ways a block storage volume can be attached
    to a compute instance.


    *   Remote attachment over an IP network


    *   Direct attachment to the physical machine


    The interconnectivity between servers and remotely attached volumes is often handled
    with the use of the *Internet Small Computer Systems Interface (iSCSI) protocol*
    standardized in RFC7143.


    > *The* *Small Computer System Interface (SCSI)* *is a popular family of protocols
    for communicating with I/O devices, especially storage devices. (…) The iSCSI
    protocol (…) describes a means of transporting SCSI packets over TCP/IP.*[⁷](#478313_1_En_1_Chapter.xhtml#Sec30)


    The storage volumes that are directly attached to physical machines benefit immensely
    from the fact that disk operations do not involve any network communication. In
    combination with flash-based solid-state drive (SSD) devices and the Nonvolatile
    Memory Express (NVMe) protocol, which enhances block access concurrency with multiple
    I/O command queues, we receive amazing performance measured in input/output operations
    per second (IOPS). Nonetheless, this setup imposes a limit on how many storage
    volumes can be attached to an instance.


    Based on the usage pattern, some block volumes, especially those used as persistent
    data stores, should be regularly backed up. Point-in-time backups are often called
    *snapshots*. These intermediate states can be either full or incremental. The
    latter tracks changes from the last backup or volume creation. Policies can be
    used to drive an automated, scheduled creation of volume backups. Snapshots taken
    on unmounted volumes are called *cold backups*. In this case, the volume cannot
    be used during an ongoing backup operation. Taking a snapshot of a volume that
    remains in use is called a *warm backup*. In most cases, block volume backups
    are persisted to highly available object storage. What can you do with an archived
    snapshot? Most often, there are a few options such as restoring the volume and
    cloning to or moving to a different cloud region.


    Earlier in this chapter, we touched upon the meaning and the role of vertical
    and horizontal scaling. If you consider *vertical scaling* , you will discover
    two patterns that apply to block volumes. First, you should be able to scale a
    block volume up vertically by increasing its size. Second, storing all application
    data on remotely attached block volumes makes it relatively easy to replace the
    compute instance with a new one that uses a more powerful shape that has more
    CPUs or memory, because you just need to reattach the volume to the new instance.
    This operation can be thought of as scaling a compute instance vertically.


    Finally, I would like to touch on the fact that a block volume can be optionally
    attached as read-only. This possibility is pretty handy if you would like to attach
    a volume just to browse through the filesystem, making sure that nothing gets
    accidentally written.


    While a block storage device is typically meant to be attached to a single compute
    instance at a time, *file storage* is designed to enable file-oriented data exchange
    between multiple compute instances. It may be especially useful when these traditional
    systems leverage active-passive high availability that is built upon a file-based
    shared state. The shared file storage capability can be implemented using the
    Network File System (NFS) protocol that was introduced by Sun Microsystems in
    1989 in RFC1094.


    > *The* *Sun Network Filesystem (NFS)* *protocol provides transparent remote access
    to shared files across networks. The NFS protocol is designed to be portable across
    different machines, operating systems, network architectures, and transport protocols.
    (…) NFS assumes a file system that is hierarchical, with directories as all but
    the bottom level of files.*[⁸](#478313_1_En_1_Chapter.xhtml#Sec30)


    Since its introduction, the protocol has evolved from version 3 (RFC1813 in 1995)
    to version 4 (RFC7530 in 2015). Alternatively, some providers use the Common Internet
    File Service (CIFS) successor, namely, the Server Message Block (SMB) protocol,
    to deliver the same shared file storage capability.'
