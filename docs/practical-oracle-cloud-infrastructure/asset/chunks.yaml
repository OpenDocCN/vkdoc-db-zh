    4.  Provide some description.


    5.  Click Create Compartment.


    The new compartment should get created nearly immediately. You may need to refresh
    the page, unless you can see a new record for the newly created compartment, as
    shown in Figure [2-8](#478313_1_En_2_Chapter.xhtml#Fig8).


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig8_HTML.png](images/478313_1_En_2_Chapter/478313_1_En_2_Fig8_HTML.png)


    Figure 2-8


    Viewing a compartment in the OCI Console


    From now on, every time you create a new OCI resource in the console, you will
    need to make sure that the appropriate compartment is selected in the Compartment
    combo box, as shown in Figure [2-9](#478313_1_En_2_Chapter.xhtml#Fig9).


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig9_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Choosing an active compartment in the OCI Console


    As we move closer to automating Oracle Cloud Infrastructure with the CLI and Terraform,
    you will see that we are referencing the target compartment not by its name but
    by using its Oracle cloud identifier (OCID) .


    Every OCI resource, including your tenancy, is uniquely identified by an immutable,
    multipart, Oracle-assigned, strict-syntax key called an *Oracle cloud identifier*,
    abbreviated as OCID. The resource identifier structure is strict. For the time
    being, it always starts with `ocid1`, which indicates the current and only OCID
    version. The second element is more important because it shows a resource type.
    At the time of writing, the third element is always set to `oc1`. The fourth element
    denotes the region. Finally, the last element is unique for every OCI resource.
    Figure [2-10](#478313_1_En_2_Chapter.xhtml#Fig10) illustrates the OCID structure.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig10_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    OCID'
  trans: '## 配置基础设施


    我们现在将为运行应用程序配置所需的云资源，这些资源我们在上一节中已讨论过。我会尽可能简化这个示例。这就是为什么我首先将介绍如何在单个节点上部署 UUID 服务。稍后，我们将添加负载均衡和容错能力。在这里，我将向您展示手动操作的方式。我这么说是什么意思呢？我们将使用`Oracle
    Cloud Infrastructure Console`管理所有资源。您可能记得，我提到过这种方法仅适用于希望演示特定功能或试验对您来说是新特性的情况。生产就绪的适当自动化将在第
    3 章中介绍。现在，让我们开始吧！


    请登录到`Oracle Cloud Infrastructure (OCI) Console`。图 2-7 展示了`OCI Console`的主登陆页面。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig7_HTML.png](img/478313_1_En_2_Fig7_HTML.png)


    图 2-7: `Oracle Cloud Infrastructure Console`


    在`OCI Console`的右上角，您将看到您的活动区域。如图 2-7 所示，在我的情况下，是德国中部区域 (`eu-frankfurt-1`)。正如我之前提到的，一些区域可能只包含一个可用性域。本书中的练习已在德国中部
    (`eu-frankfurt-1`) 区域测试，并假定您所在的区域存在三个可用性域。在撰写本文时，这些区域如下：


    *   德国中部 (`eu-frankfurt-1`)

    *   英国南部 (`uk-london-1`)

    *   美国东部 (`us-ashburn-1`)

    *   美国西部 (`us-phoenix-1`)


    一个云账户可以拥有和管理多个区域的资源。您只需激活额外的区域即可。为此，请按照以下步骤操作：


    1.  转到`Menu ➤ Administration ➤ Region Management`。

    2.  在“资源”菜单中点击`Infrastructure Regions`。

    3.  在区域名称旁边点击`Subscribe To This Region`。


    订阅新区域是一个异步操作，可能需要几分钟时间。在某个时间点，刷新`OCI Console`后，您应该能够在`OCI Console`的右上角选择区域。


    **注意**：在进行本书包含的练习之前，请确保您正在一个具有三个可用性域的区域中工作。如果需要，请毫不犹豫地订阅一个额外的区域。


    您可能想知道如何在像以下这样的单 AD 区域中实现容错：


    *   澳大利亚东部 (`ap-sydney-1`)

    *   巴西东部 (`sa-saopaulo-1`)

    *   加拿大东南部 (`ca-toronto-1`)

    *   印度西部 (`ap-mumbai-1`)

    *   日本东部 (`ap-tokyo-1`)

    *   韩国中部 (`ap-seoul-1`)

    *   瑞士北部 (`eu-zurich-1`)


    可以同时采用两种方案。首先，您可能还记得，每个 AD 都带有三个故障域，如前一章所述。故障域是物理隔离的设备单元，具有独立的电源和冷却系统。这样，两个故障域同时失效的可能性就降低了。更关键的系统可以跨多个区域分布。例如，在东京运行活动系统站点时，您可以在首尔维护一个被动系统站点，以实现灾难恢复
    (`DR`)。


    ### 隔离区 (Compartment)


    我们需要选择一个隔离区，我们的第一个云应用程序将在其中运行。隔离区是隔离不相关`OCI`资源的主要手段。通过这种方式，它们可以用来分隔不同的项目。从形式上讲，它们属于`IAM`服务。除非您已有用于学习的现有隔离区，否则建议您创建一个新的隔离区，以隔离我们在第
    2 章练习中配置的资源。请按照以下步骤操作：


    1.  转到`Menu ➤ Identity ➤ Compartments`。

    2.  点击`Create Compartment`。

    3.  名称输入`Sandbox`。

    4.  提供一些描述。

    5.  点击`Create Compartment`。


    新的隔离区应该几乎立即创建。您可能需要刷新页面，除非您能看到新创建的隔离区的新记录，如图 2-8 所示。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig8_HTML.png](img/478313_1_En_2_Fig8_HTML.png)


    图 2-8: 在`OCI Console`中查看隔离区


    从现在开始，每次您在控制台中创建新的`OCI`资源时，都需要确保在`Compartment`组合框中选择了适当的隔离区，如图 2-9 所示。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig9_HTML.jpg](img/478313_1_En_2_Fig9_HTML.jpg)


    图 2-9: 在`OCI Console`中选择活动的隔离区


    随着我们越来越接近使用`CLI`和`Terraform`自动化`Oracle Cloud Infrastructure`，您将看到我们引用目标隔离区不是通过其名称，而是使用其`Oracle
    云标识符 (OCID)`。


    每个`OCI`资源，包括您的租户，都由一个不可变的、多部分的、由`Oracle`分配的、具有严格语法的密钥唯一标识，该密钥称为`Oracle 云标识符`，缩写为`OCID`。资源标识符结构是严格的。目前，它总是以`oc1`开头，表示当前且唯一的`OCID`版本。第二个元素更重要，因为它显示了资源类型。在撰写本文时，第三个元素始终设置为`oc1`。第四个元素表示区域。最后，最后一个元素对于每个`OCI`资源都是唯一的。图
    2-10 说明了`OCID`结构。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig10_HTML.jpg](img/478313_1_En_2_Fig10_HTML.jpg)


    图 2-10: `OCID`'
- fmt: '### Virtual Cloud Network


    As the name says, a *virtual cloud network* (VCN) is a virtual network that is
    private to your cloud tenancy. Yet, in the way you design and manage a VCN, it
    feels somehow similar to well-known, traditional, physical IP networks you may
    have worked with or learned about.


    This is how you create a new VCN using the OCI Console:


    1.  Go to Menu ➤ Networking ➤ Virtual Cloud Networks.

    2.  Make sure that the `Sandbox` compartment is selected. On the left side, slightly
    to the bottom, you will find the Scope section with a combo box that you use to
    choose the name of the active compartment.

    3.  Click Create Virtual Cloud Network.

    4.  Provide an optional display name for the new VCN (`uuid-vcn`).

    5.  Select Create Virtual Cloud Network Only.

    6.  Provide the CIDR block (`192.168.1.0/24`).

    7.  Select the DNS Resolution box and leave the default of DNS label.

    8.  Click Create Virtual Cloud Network to provision the VCN.


    Figure [2-11](#478313_1_En_2_Chapter.xhtml#Fig11) shows the OCI Console VCN creation
    wizard.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig11_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig11_HTML.jpg)


    Figure 2-11

    Creating a new virtual cloud network


    At the bottom of the wizard, you may have spotted some fields related to tags.
    You will learn about tagging in Chapter [5](#478313_1_En_5_Chapter.xhtml).


    We have decided to create a VCN because I am going to show you how to create all
    the (or adapt the existing) required child resources such as the Internet gateway,
    route rule, security rules, and subnets. In this way, you will understand how
    these components work together.


    **Tip**


    If you need to prototype a simple cloud setup, you can use the Networking Quickstart
    wizard. The OCI Console will not only create a VCN but also add the most common
    child resources such as the Internet gateway, route rule, and subnets. This can
    be helpful when you want to test something quick and do not need any special VCN
    setup.


    ### Internet Gateway


    An *Internet gateway* is a virtual router that provides connectivity between compute
    instances in public subnets and the Internet. It must be defined as a target in
    the route rule; otherwise, compute instances won’t know where to send their outbound
    packets to. Let’s start by provisioning a new Internet gateway. This is how you
    do it using the OCI Console:


    1.  Go to Menu ➤ Networking ➤ Virtual Cloud Networks.

    2.  Make sure that the `Sandbox` compartment is selected.

    3.  Click the name of your VCN.

    4.  Click Internet Gateways in the Resources menu.

    5.  Select Create Internet Gateway.

    6.  Provide an optional display name (`uuid-igw`).

    7.  Click Create Internet Gateway.


    Figure [2-12](#478313_1_En_2_Chapter.xhtml#Fig12) shows the OCI Console Internet
    gateway creation wizard.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig12_HTML.png](images/478313_1_En_2_Chapter/478313_1_En_2_Fig12_HTML.png)


    Figure 2-12

    Creating a new Internet gateway


    ### Route Table


    It won’t be a big surprise if I say that a *route table* stores route rules for
    a VCN. A route rule defines how to direct the outbound traffic that is destined
    to travel outside the VCN. In our case, we must define a rule that properly directs
    all packets sent to the IP addresses that do not belong to the VCN address range.
    In IPv4 language, `0.0.0.0/0` means all addresses, and this is the value we are
    going to use in the destination CIDR block of a route rule. We will also set the
    Internet gateway we’ve just provisioned as the target for this rule.


    A VCN comes with a default but empty route table resource. This is how you add
    a new route rule to the existing default route table using the OCI Console:


    1.  Go to Menu ➤ Networking ➤ Virtual Cloud Networks.

    2.  Make sure that the `Sandbox` compartment is selected.

    3.  Click the name of your VCN.

    4.  Click Route Tables in the Resources menu.

    5.  Click the name of the default route table.

    6.  Click Add Route Rules.

    7.  Choose Internet Gateway in the Target Type selection box.

    8.  Place `0.0.0.0/0` in Destination CIDR Block.

    9.  Choose `uuid-igw` in Target Internet Gateway.

    10.  Click Add Route Rules.


    Figure [2-13](#478313_1_En_2_Chapter.xhtml#Fig13) shows the Add Route Rules screen
    in the OCI Console.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig13_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig13_HTML.jpg)


    Figure 2-13

    Edit Route Rules screen in the OCI Console'
  raw: '### Virtual Cloud Network


    As the name says, a *virtual cloud network* (VCN) is a virtual network that is
    private to your cloud tenancy. Yet, in the way you design and manage a VCN, it
    feels somehow similar to well-known, traditional, physical IP networks you may
    have worked with or learned about.


    This is how you create a new VCN using the OCI Console:


    1.  Go to Menu ➤ Networking ➤ Virtual Cloud Networks.


    2.  Make sure that the `Sandbox` compartment is selected. On the left side, slightly
    to the bottom, you will find the Scope section with a combo box that you use to
    choose the name of the active compartment.


    3.  Click Create Virtual Cloud Network.


    4.  Provide an optional display name for the new VCN (`uuid-vcn`).


    5.  Select Create Virtual Cloud Network Only.


    6.  Provide the CIDR block (`192.168.1.0/24`).


    7.  Select the DNS Resolution box and leave the default of DNS label.


    8.  Click Create Virtual Cloud Network to provision the VCN.


    Figure [2-11](#478313_1_En_2_Chapter.xhtml#Fig11) shows the OCI Console VCN creation
    wizard.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig11_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Creating a new virtual cloud network


    At the bottom of the wizard, you may have spotted some fields related to tags.
    You will learn about tagging in Chapter [5](#478313_1_En_5_Chapter.xhtml).


    We have decided to create a VCN because I am going to show you how to create all
    the (or adapt the existing) required child resources such as the Internet gateway,
    route rule, security rules, and subnets. In this way, you will understand how
    these components work together.


    Tip


    If you need to prototype a simple cloud setup, you can use the Networking Quickstart
    wizard. The OCI Console will not only create a VCN but also add the most common
    child resources such as the Internet gateway, route rule, and subnets. This can
    be helpful when you want to test something quick and do not need any special VCN
    setup.


    ### Internet Gateway


    An *Internet gateway* is a virtual router that provides connectivity between compute
    instances in public subnets and the Internet. It must be defined as a target in
    the route rule; otherwise, compute instances won’t know where to send their outbound
    packets to. Let’s start by provisioning a new Internet gateway. This is how you
    do it using the OCI Console:


    1.  Go to Menu ➤ Networking ➤ Virtual Cloud Networks.


