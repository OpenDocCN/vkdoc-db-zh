    ## 小结


    本章主要探讨了对象存储。首先，我们介绍了对象的概念以及它们如何被组织到存储桶中。随后，你学习了使用命令行界面（CLI）进行一些基本的对象操作技巧。接着，我们讨论了对象名称前缀的重要性，并通过基于
    CLI 的示例演示了如何正确使用它们。此外，我描述了 CLI 自带的批量命令，并展示了如何使用对象存储 API 来分页列出对象，从而以安全的方式处理大量对象。我们还涉及了并发更新的方面以及
    ETags 在此上下文中的作用。本章很大一部分内容致力于对象存储的编程。你学习了如何使用 OCI Python SDK 来处理多段上传，并让应用程序以实例主体（instance
    principals）的身份进行认证。你也能够熟悉定义标签（defined tags）的概念，并在动态组的匹配规则中使用它们。最后，我简要介绍了允许匿名用户访问对象的方法，无论是通过公共存储桶还是通过预认证请求。在下一章中，我们将探讨一些基本模式，这些模式你将应用于甲骨文云基础设施中的计算和网络云资源。


    # 6. 计算与网络的模式


    信息技术实践非常重视可重用性这一概念，它不仅限于软件库、模块或服务，还常常以架构模式的形式体现。在本章中，我将引导你了解一些基本的云基础设施模式，这些模式旨在帮助解决你在设计云解决方案时经常遇到的标准问题。本章旨在围绕实践练习进行松散的讨论，并非一个全面的架构模式目录。


    如果你回顾第 2 章以及其中关于在甲骨文云中规划云基础设施的内容，就会清楚地认识到，设计云基础设施始于准备适当的 compartment（ compartment）层次结构并勾勒虚拟网络。在第
    4 章，我描述了与 compartment 使用相关的各个方面。现在，我们将着眼于虚拟云网络。


    ## 虚拟网络


    虚拟云网络是一个软件定义的网络，用于组织和提供计算实例之间的连接。它具有区域范围，这意味着你在一个特定的甲骨文云区域中创建每个 `VCN`。一个孤立的 `VCN`
    是无用的，除非你将其划分为子网。无论是 `VCN` 还是其子网，在概念上都接近于采用 IP 寻址和地址范围划分的传统网络。如果你已经跟随了前面的章节，那么你已经获得了一些与
    `VCN` 相关资源的实践经验。此外，你可能清楚地记得，每个计算实例都必须存在于特定的虚拟云网络上下文中。更准确地说，每个计算实例必须通过一个或多个虚拟网络接口卡（`VNIC`）连接到至少一个子网。一个子网可以绑定到特定的可用性域，也可以跨越整个区域内的所有可用性域。第一种类型被称为特定可用性域（AD-specific）子网，而后者被称为区域子网。图
    6-1 展示了这两种子网类型。


    ![`../images/478313_1_En_6_Chapter/478313_1_En_6_Fig1_HTML.jpg`](img/478313_1_En_6_Fig1_HTML.jpg)


    图 6-1：区域子网和特定可用性域子网


    特定子网的区域范围通常被视为更灵活，因为它允许在不同的可用性域中创建计算实例，同时让它们连接到完全相同的子网。为什么我们有时需要使用特定可用性域子网而不是区域子网呢？最初，子网总是必须在特定的可用性域内创建。换句话说，在开始时，只有特定可用性域子网是可能的，这使得在设计依赖多个
    `AD` 的高可用性解决方案时，必须使用多个子网。随着区域子网的出现，你可以在大多数情况下坚持使用它们。此外，甲骨文建议尽可能使用区域子网。在需要添加一层控制以确保连接到该子网的所有实例始终在特定
    `AD` 中创建的情况下，采用特定可用性域子网是有意义的。

    '
- fmt: '### Private IPs


    As soon as a new compute instance has been launched, its `VNIC` receives a private
    IPv4 address from the IP address range of the subnet to which the `VNIC` is attached.
    This is the `primary private IP` address. The address itself can be chosen by
    you or automatically selected by the Oracle Cloud control plane. It is not possible
    to remove or change the primary private IP on an existing instance. Its lifecycle
    is strictly associated with the lifetime of the compute instance, which means
    that the primary private IP gets terminated on the instance’s destruction. The
    private IP address lets your instance communicate with other instances, as presented
    in Figure 6-2, in the same or, what you will learn soon, other interconnected
    `VCN`s. Optionally, it is used in the data exchange with the machines in an on-premise
    network if `FastConnect` or `VPN` is in place.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig2_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig2_HTML.jpg)


    Figure 6-2 Private IPs


    If there is a “primary” `VNIC`, there must be a notion of “secondary” `VNIC`;
    otherwise, the name wouldn’t make a lot of sense, would it? Indeed, it is possible
    to create `secondary VNIC`s on a single instance. This is actually the way to
    go if your intention is to attach an instance to more than one subnet. Figure
    6-3 shows a list of `VNIC`s of a single compute instance. Each `VNIC` is in this
    case attached to a different subnet. Adding a secondary `VNIC` is just a first
    step in providing multisubnet connectivity. Depending on instance shape and image,
    you will still have to configure a new network interface within the operating
    system.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig3_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig3_HTML.jpg)


    Figure 6-3 Primary and secondary VNICs


    From a management point of view, `VNIC`s and private IPs are regular cloud resources
    just like compute instances. This means they are controlled through dedicated
    API endpoint paths and, as a result, can be managed separately to the extent allowed
    by their dependencies. What do I mean by their dependencies? For example, it is
    not possible to provision a nonattached `VNIC` cloud resource alone. It must always
    exist in the context of a compute instance. If you are creating a secondary `VNIC`,
    the `AttachVnic` API indeed requires a compute instance `OCID`.


    We have just learned that there is a primary private IP created for each `VNIC`
    cloud resource. It cannot be removed and is deleted always with its parent `VNIC`.
    Sometimes, you need more flexibility. Imagine a situation where you would like
    to implement a floating IP architecture for the purpose of high availability.
    A floating IP is an IP address that can be moved from one compute instance to
    another, in this way enabling active-passive high availability. Should the current
    private IP holder abruptly fail, the passive instance, also known as the `standby`,
    would take over the floating IP, in this way securing service continuity. To implement
    such a scenario, you need to rely on a `secondary private IP` cloud resource in
    conjunction with cluster engine software such as `Heartbeat` or `Corosync` as
    well as a cluster resource manager such as `Pacemaker`. A secondary private IP
    can be added to any kind of `VNIC` (both primary and secondary). Another use case
    for attaching more than one private IP to an existing `VNIC` is having multiple
    services running on a single compute instance. Sometimes, you may find it useful
    to bind each of these services to a separate private IP. Figure 6-4 shows two
    private IP resources attached to a single `VNIC`.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig4_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig4_HTML.jpg)


    Figure 6-4 Primary and secondary private IP addresses


    Note: In most cases, you will be using compute instances with just a single `VNIC`
    and a single private IP each.


    ### Public IPs


    A compute instance may, but not need to, hold a public IP address. If you are
    using Oracle Cloud as a computing power extension or a managed database provider,
    it can be securely connected to your on-premise network using either `FastConnect`
    or `VPN`. In such a case, usually no direct connection to the Internet for your
    cloud instances is even desired. In such a situation, you access these compute
    instances from within your private on-premise network and the instances download
    updates and new software from some kind of a private artifact repository that
    stores various types of software such as `RPM` packages, `npm` and `Maven` libraries,
    `Docker` images, or even `Helm` charts. Nowadays, however, more and more especially
    newly established businesses are purely running in the cloud. In their case, access
    to the Internet is indispensable for at least a subset of compute instances.


    Let’s consider the simplest scenario for a solitary compute instance. The scenario
    that assumes a given instance has its own Internet identity, understood as a public
    IP address. There are usually three main reasons why an instance needs a public
    IP address.


    *   It hosts an application that exposes a public web service.

    *   Its operating system has to download updates or additional software.

    *   You want to establish an `SSH` connection to access terminal.


    Public IP addresses can be assigned only to these compute instances that are attached
    to `public subnet`s. You choose whether a subnet is public or private during subnet
    creation. In the `OCI Console`, this choice is pretty straightforward. You just
    have to tick the correct checkbox. You already trained it in the course of Chapter
    2. When using an `API`, `SDK`, or `CLI`, on the other hand, you set the public
    or private nature of a particular subnet indirectly through a value of the `prohibitPublicIpOnVnic`
    element (`API`), the `prohibit_public_ip_on_vnic` key (`Terraform`), or the `--prohibit-public-ip-on-vnic`
    option (`CLI`). You already used it once if you followed Chapter 3. All in all,
    private subnets always prohibit attached instances from having a public IP on
    the `VNIC` attached to the private subnet.


    In a simple scenario, to access the Internet, apart from a public IP attached
    to an instance, three further conditions must be met.


    *   A `VCN` contains an active Internet gateway (`IGW`).

    *   A route rule directs outbound traffic to the `IGW`.

    *   Security rules allow a particular type of inbound and outbound traffic.


    In the course of the previous chapters, you had multiple opportunities to work
    with these resources in the `Console` as well as using the `CLI` and `Terraform`.


    How is a public IP address actually attached to an instance? From a management
    point of view, a public IP cloud resource is always associated with a private
    IP cloud resource. For the majority of use cases, this happens in the background,
    and you do not even need to do anything special about that. Because there is a
    finite number of public IPv4 addresses, Oracle Cloud uses public IP address pools.
    By default, a newly created instance gets an available public IPv4 address from
    the Oracle Cloud address pool, as shown in Figure 6-5. After an instance has been
    terminated, the address goes back to the pool and may be reused in the future,
    also by other customers. This is called an `ephemeral public IP`. Its lifecycle
    is strictly tied to a particular compute instance.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig5_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig5_HTML.jpg)


    Figure 6-5 Internet-facing compute instance'
  raw: '### Private IPs


    As soon as a new compute instance has been launched, its VNIC receives a private
    IPv4 address from the IP address range of the subnet to which the VNIC is attached.
    This is the *primary private IP* address. The address itself can be chosen by
    you or automatically selected by the Oracle Cloud control plane. It is not possible
    to remove or change the primary private IP on an existing instance. Its lifecycle
    is strictly associated with the lifetime of the compute instance, which means
    that the primary private IP gets terminated on the instance’s destruction. The
    private IP address lets your instance communicate with other instances, as presented
    in Figure [6-2](#478313_1_En_6_Chapter.xhtml#Fig2), in the same or, what you will
    learn soon, other interconnected VCNs. Optionally, it is used in the data exchange
    with the machines in an on-premise network if FastConnect or VPN is in place.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig2_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Private IPs


    If there is a “primary” VNIC, there must be a notion of “secondary” VNIC; otherwise,
    the name wouldn’t make a lot of sense, would it? Indeed, it is possible to create
    *secondary VNICs* on a single instance. This is actually the way to go if your
    intention is to attach an instance to more than one subnet. Figure [6-3](#478313_1_En_6_Chapter.xhtml#Fig3)
    shows a list of VNICs of a single compute instance. Each VNIC is in this case
    attached to a different subnet. Adding a secondary VNIC is just a first step in
    providing multisubnet connectivity. Depending on instance shape and image, you
    will still have to configure a new network interface within the operating system.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig3_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Primary and secondary VNICs


    From a management point of view, VNICs and private IPs are regular cloud resources
    just like compute instances. This means they are controlled through dedicated
    API endpoint paths and, as a result, can be managed separately to the extent allowed
    by their dependencies. What do I mean by their dependencies? For example, it is
    not possible to provision a nonattached VNIC cloud resource alone. It must always
    exist in the context of a compute instance. If you are creating a secondary VNIC,
    the `AttachVnic` API indeed requires a compute instance OCID.


    We have just learned that there is a primary private IP created for each VNIC
    cloud resource. It cannot be removed and is deleted always with its parent VNIC.
    Sometimes, you need more flexibility. Imagine a situation where you would like
    to implement a floating IP architecture for the purpose of high availability.
    A floating IP is an IP address that can be moved from one compute instance to
    another, in this way enabling active-passive high availability. Should the current
    private IP holder abruptly fail, the passive instance, also known as the *standby*,
    would take over the floating IP, in this way securing service continuity. To implement
    such a scenario, you need to rely on a *secondary private IP* cloud resource in
    conjunction with cluster engine software such as Heartbeat or Corosync as well
    as a cluster resource manager such as Pacemaker. A secondary private IP can be
    added to any kind of VNIC (both primary and secondary). Another use case for attaching
    more than one private IP to an existing VNIC is having multiple services running
    on a single compute instance. Sometimes, you may find it useful to bind each of
    these services to a separate private IP. Figure [6-4](#478313_1_En_6_Chapter.xhtml#Fig4)
    shows two private IP resources attached to a single VNIC.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig4_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Primary and secondary private IP addresses


    Note


    In most cases, you will be using compute instances with just a single VNIC and
    a single private IP each.


    ### Public IPs


    A compute instance may, but not need to, hold a public IP address. If you are
    using Oracle Cloud as a computing power extension or a managed database provider,
    it can be securely connected to your on-premise network using either FastConnect
