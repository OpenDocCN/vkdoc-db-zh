- fmt: '## Summary


    在本章的介绍中，您通过查看硬件和虚拟资源开始了您的云计算之旅。紧接着，我与您分享了我最喜欢的两个云计算定义，我们简要讨论了云计算的特性。接下来，我们更详细地探讨了每一个特性。然后，我们介绍了传统硬件资源供给与快速自供给之间的区别，弹性与可扩展性，以及“即服务”交付模式的含义。作为下一步，我们快速了解了API的重要性和类型。随后，涵盖了四个核心云计算能力（计算、存储、网络、IAM）。之后，您阅读了关于云部署模型和服务模型的内容。接着，我们花了一些时间讨论与成本相关的事项，如指标、消费衡量以及两种定价选项：按需付费和基于承诺的计划。在本介绍性章节的第二部分，我向您介绍了Oracle
    Cloud Infrastructure（OCI）。您了解了区域、可用性域和故障域。随后，我们列举了您可能在OCI上运行的几种典型工作负载类型。下一节专门介绍了OCI服务及其所包含的云资源类型。之后，我谈到了OCI上可用的定价选项、计费、支持的作用和服务级别协议。最后，我概述了您可以注册试用账户的方式，以便在30天内免费测试OCI。


    下一章将教您如何使用Oracle Cloud Infrastructure控制台构建您的第一个基于云的解决方案。基本概念将在过程中进行解释。为了正确学习它们，我们将采取详细的方式，避免使用可能加快速度的OCI控制台向导。别担心；从第[3](#478313_1_En_3_Chapter.xhtml)章开始，您将像在日常使用OCI时一样使用自动化功能。如果您使用的是试用账户，则不会产生任何费用。


    ## Notes


    1.  [`https://csrc.nist.gov/publications/detail/sp/800-145/final`](https://csrc.nist.gov/publications/detail/sp/800-145/final)

    2.  Gartner, IT Glossary, Cloud Computing. [`https://www.gartner.com/it-glossary/cloud-computing`](https://www.gartner.com/it-glossary/cloud-computing)

    3.  [`www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%257Efielding/pubs/dissertation/rest_arch_style.htm)

    4.  [`www.w3.org/Submission/wadl`](http://www.w3.org/Submission/wadl)

    5.  [`https://github.com/OAI/OpenAPI-Specification/blob/master/versions/3.0.0.md`](https://github.com/OAI/OpenAPI-Specification/blob/master/versions/3.0.0.md)

    6.  [`https://tools.ietf.org/html/rfc7143`](https://tools.ietf.org/html/rfc7143)

    7.  [`https://tools.ietf.org/html/rfc1094`](https://tools.ietf.org/html/rfc1094)

    8.  [`https://cloud.oracle.com/regions`](https://cloud.oracle.com/regions)


    # 2. Building Your First Cloud Application


    本章展示了如何创建一个简单的云基础架构，并在负载均衡器后运行两个自定义REST API实例。本章中展示的API实现将作为一个示例。主要目标是指导您从头开始构建您的第一个基于云的解决方案。随后，在本书的课程中，您还将学习如何配置自动扩展的实例池、将应用程序部署到Oracle
    Kubernetes Engine的Docker容器中，以及在Oracle Functions上执行无服务器函数。然而，在此阶段，让我们专注于基础，使用标准的虚拟机。


    有多种方式可以与Oracle Cloud Infrastructure的云管理平面进行通信。在本章中，我们使用`OCI控制台`，这是一个用于管理`OCI资源`的Web浏览器界面。此方法仅适用于希望演示特定功能或尝试对您而言是新功能的情况。在现实世界中，您要么使用动态的、过程化的命令行界面（`CLI`）来自动化整个供给过程，要么使用声明式的`Terraform`驱动的基础架构描述符来管理基础架构即代码。自动化是第三章的主要主题。此外，本书所有剩余章节中的绝大多数演练都展示了云自动化的实际应用。


    ## Planning the Infrastructure


    在本节中，我们将查看即将交付的云应用程序，并规划我们所需的云资源。


    ### Cloud Account


    在继续之前，您需要拥有一个可用的云账户。您可能会使用试用账户或标准的按需付费账户。试用账户将允许您免费完成本书中的所有演练。如果您拥有付费账户，您只需要记得终止（换句话说，删除）作为学习过程一部分构建的每个资源，以免产生费用。


    提示


    如何创建一个新的试用账户？请参阅上一章的“Trial”部分。


    对于你们中的一些人，可能还有另一个选择。如果您所在的公司拥有有效的`OCI`订阅，您可以考虑询问您的同事（云管理员）创建一个专用的`compartment`（例如，名为`Sandbox`），您可以在其中完成本书的练习。然而，本书中描述并在动手练习中创建的一些云资源确实需要租户所有者访问级别；因此，强烈建议您注册自己的试用账户。'
  raw: '## Summary


    In this introductory chapter, you started your cloud computing journey by looking
    at hardware and virtual resources. Immediately afterward, I shared with you my
    two favorite cloud computing definitions, and we briefly discussed cloud computing
    characteristics. Next, we talked about each of them in more detail. Then, we covered
    the difference between the traditional and rapid self-provisioning of hardware
    resources, elasticity and scalability, and the implications of delivery as a service.
    As a next step, we took a quick look at the importance and types of APIs. Subsequently,
    the four core cloud computing capabilities (compute, storage, networking, IAM)
    were covered. After that, you were able to read about cloud deployment models
    and cloud service models. Following that, we spent some time talking about cost-related
    matters such as metrics, consumption measurement, and two pricing options: pay-as-you-go
    and commitment-based plans. In the second part of this introductory chapter, I
    introduced you to Oracle Cloud Infrastructure. You learned about regions, availability
    domains, and fault domains. Afterward, we listed a few illustrative types of workloads
    you may run on OCI. The next section was devoted to OCI services and the types
    of cloud resources they include. Subsequently, I talked about pricing options
    available on OCI, billing, the role of support, and service-level agreements.
    Finally, I outlined the way you can sign up for a trial so you can test OCI for
    30 days at no cost.


    The next chapter will teach you how to build your first cloud-based solution using
    the Oracle Cloud Infrastructure Console. The basic concepts will be explained
    on the fly. To learn them properly, we are going to take the long way, avoiding
    OCI Console wizards that could speed things up. Do not worry; starting from Chapter
    [3](#478313_1_En_3_Chapter.xhtml), you will be using automation just as you would
    do in your daily work with OCI. If you are using a trial account, no costs will
    be incurred.


    ## Notes


    1.  [`https://csrc.nist.gov/publications/detail/sp/800-145/final`](https://csrc.nist.gov/publications/detail/sp/800-145/final)


    2.  Gartner, IT Glossary, Cloud Computing. [`https://www.gartner.com/it-glossary/cloud-computing`](https://www.gartner.com/it-glossary/cloud-computing)


    3.  [`www.ics.uci.edu/~fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%257Efielding/pubs/dissertation/rest_arch_style.htm)


    4.  [`www.w3.org/Submission/wadl`](http://www.w3.org/Submission/wadl)


    5.  [`https://github.com/OAI/OpenAPI-Specification/blob/master/versions/3.0.0.md`](https://github.com/OAI/OpenAPI-Specification/blob/master/versions/3.0.0.md)


    6.  [`https://tools.ietf.org/html/rfc7143`](https://tools.ietf.org/html/rfc7143)


    7.  [`https://tools.ietf.org/html/rfc1094`](https://tools.ietf.org/html/rfc1094)


    8.  [`https://cloud.oracle.com/regions`](https://cloud.oracle.com/regions)


    # 2. Building Your First Cloud Application


    This chapter shows how to create a simple cloud infrastructure and run two instances
    of a custom REST API behind a load balancer. The API implementation presented
    in this chapter will serve as an example. The main goal is to guide you through
    the process of building your first cloud-based solution from scratch. Later, in
    the course of the book, you will also learn how to provision autoscaled instance
    pools, deploy your apps in Docker containers to Oracle Kubernetes Engine, and
    execute serverless functions on Oracle Functions. At this stage, however, let’s
    focus on the foundations and use standard virtual machines.


    There are multiple ways you can talk to an Oracle Cloud Infrastructure cloud management
    plane. In this chapter, we use the Oracle Cloud Infrastructure Console, which
    is a web browser interface for managing Oracle Cloud Infrastructure resources.
    This approach is appropriate only when you want to demonstrate selected capabilities
    or experiment with the features that are new for you. In the real world, you either
    automate the entire provisioning process with a dynamic, procedural command-line
    interface (CLI) or manage the infrastructure as code using declarative Terraform-driven
    infrastructure descriptors. The automation is the main subject of the third chapter.
    Moreover, the vast majority of walk-throughs in all the remaining chapters of
    this book present the cloud automation in action.


    ## Planning the Infrastructure


    In this section, we will take a look at the cloud application we are about to
    deliver and plan the cloud resources we will require for it.


    ### Cloud Account


    Before you proceed, you need to have a cloud account at your disposal. You will
    probably use either a trial account or a standard pay-as-you-go account. A trial
    account will let you complete all the walk-throughs from this book at no cost.
    If you have a paid account, you just need to remember to terminate (in other words,
    delete) every resource you build as part of the learning process so you won’t
    be charged.


    Tip


    How is a new trial account created? See the “Trial” section of the previous chapter.


    For some of you, there may be one more option. If the company you work for has
    an active Oracle Cloud Infrastructure subscription, you may consider asking your
    colleagues, the cloud admins, to create a dedicated *compartment* (e.g., called
    `Sandbox`) where you can complete the exercises from this book. Yet, some cloud
    resources described in this book and created as part of the hands-on exercises
    do require tenancy-owner access level; therefore, it is highly recommended you
    sign up for your own trial account.'
