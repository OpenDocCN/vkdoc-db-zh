- fmt: '# Development Instance in the Cloud


    Let''s provision a single compute instance based on the newest CentOS 7 platform
    image. I have already prepared the infrastructure code. You will find it in `the
    chapter08/1-devmachine` directory. The code structure is compliant with what we''ve
    already discussed in all previous chapters. There is one module called `devmachine`
    where the instance is defined with corresponding subnet-level cloud networking
    resources. The VCN alone is traditionally defined outside of the module in the
    top-level `vcn.tf` file.


    ```

    $ cd ~/git

    $ cd oci-book/chapter08/1-devmachine

    $ find . \( -name "*.tf" -o -name "*.yaml" \) | sort

    ./devmachine/cloud-init/devvm.config.yaml

    ./devmachine/compute.tf

    ./devmachine/vars.tf

    ./devmachine/vcn.tf

    ./modules.tf

    ./provider.tf

    ./vars.tf

    ./vcn.tf

    ```


    ## Initial Setup via Cloud-Config


    To perform the initial instance setup and provide you with all the required development
    tools, we use the cloud-config file, as shown in Listing 8-1.


    ```yaml

    #cloud-config

    yum_repos:

    docker-ce-stable:

    name: Docker CE Stable - $basearch

    baseurl: https://download.docker.com/linux/centos/7/$basearch/stable

    enabled: true

    ...

    kubernetes:

    name: Kubernetes

    baseurl: https://packages.cloud.google.com/yum/repos/kubernetes-el7-x86_64

    enabled: true

    ...

    packages:

    - git

    - docker-ce

    - docker-ce-cli

    - containerd.io

    - kubectl

    runcmd:

    - [ systemctl, enable, docker ]

    - [ systemctl, start, docker ]

    - [ usermod, -aG, docker, opc ]

    - [ mkdir, "/home/opc/.kube" ]

    - [ chown, "opc:opc", "/home/opc/.kube" ]

    - [ firewall-offline-cmd, "--add-port=5010-5019/tcp" ]

    - [ systemctl, restart, firewalld ]

    final_message: "DEV machine is running, after $UPTIME seconds"

    ```


    *Listing 8-1: `1-devmachine/cloud-init/devvm.config.yaml`*


    Based on this cloud-config file, the cloud-init will add two external Yum repositories
    and install a Git client, the Docker Community Edition (CE) toolkit, and the `kubectl`
    command-line management tool for Kubernetes. You will learn about `kubectl` and
    Kubernetes in the second part of this chapter.


    ## Provisioning the Instance with Terraform


    It is time to provision the development instance. On your local machine where
    you have installed and configured Terraform, please make sure you have sourced
    the relevant environment variables, which begin with `TF_VAR_`, required by your
    OCI provider. If they are not set, you might need to run the following:


    ```

    $ source ~/tfvars.env.sh

    ```


    Now, execute the following commands:


    ```

    $ terraform init

    Initializing modules...

    - devmachine in devmachine

    Initializing the backend...

    Initializing provider plugins...

    - Checking for available provider plugins...

    - Downloading plugin for provider "oci" (terraform-providers/oci) 3.30.0...

    * provider.oci: version = "~> 3.30"

    Terraform has been successfully initialized!

    $ terraform apply

    data.oci_identity_availability_domains.ads: Refreshing state...

    data.oci_core_images.centos_image: Refreshing state...

    Terraform will perform the following actions:

    # oci_core_internet_gateway.igw will be created

    # oci_core_virtual_network.vcn will be created

    # module.devmachine.oci_core_instance.dev_vm will be created

    # module.devmachine.oci_core_route_table.dev_rt will be created

    # module.devmachine.oci_core_security_list.dev_sl will be created

    # module.devmachine.oci_core_subnet.dev_net will be created

    Plan: 6 to add, 0 to change, 0 to destroy.

    Do you want to perform these actions?

    Terraform will perform the actions described earlier.

    Only ''yes'' will be accepted to approve .

    Enter a value: yes

    ...

    Apply complete! Resources: 6 added, 0 changed, 0 destroyed.

    Outputs:

    dev_machine_image_name = CentOS-7-2019.06.19-0

    dev_machine_public_ip = 130.61.84.182

    $ DEV_VM_PUBLIC_IP=`terraform output dev_machine_public_ip`

    ```


    In my case, the instance has been provisioned in the third fault domain of the
    third availability domain in the Frankfurt region, as shown in Figure 8-6.


    ![Viewing the developer VM in the OCI Console](images/478313_1_En_8_Chapter/478313_1_En_8_Fig6_HTML.jpg)


    *Figure 8-6: Viewing the developer VM in the OCI Console*


    ## Connecting and Verifying


    Wait a few seconds after the developer instance has been reported as Running to
    allow the `sshd` daemon to start and connect to the machine. Next, as always,
    you may need to wait one or two minutes until cloud-init has completed all the
    tasks defined in the cloud-config file. You can inspect `cloud-init.log` from
    time to time to verify whether cloud-init has finished.


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    [opc@dev-vm]$ sudo cat /var/log/cloud-init.log | grep "DEV machine is running"

    2019-06-22 12:46:49,899 - util.py[DEBUG]: DEV machine is running, after 116.90
    seconds

    [opc@dev-vm]$ exit

    ```


    From now on, whenever you see the `[opc@dev-vm]$` command prompt in any of the
    subsequent code snippets, it will be assumed that you are on the developer instance.


    **Note**

    The Oracle Cloud Infrastructure marketplace comes with a more comprehensive prebuilt
    Oracle Cloud Developer image where there are many other tools installed out of
    the box. Yet, in this chapter, we are using a more lightweight and tailored custom-built
    developer instance that you launched using the supplied infrastructure code.


    To be able to run Docker as a regular user, the cloud-init has added the `opc`
    user to the `docker` group. Reconnect to the developer machine to get the group
    assignment in place.


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    ```


    We are going to continue working on this in the next section.'
