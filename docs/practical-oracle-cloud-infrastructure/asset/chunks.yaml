- fmt: '# Running Containers


    Images alone can be simply seen as logically associated read-only filesystem layers.
    To be able to use containerized applications, you have to launch one or more containers
    based on a particular image. You do this using the `docker run` command. The `-d`
    parameter runs the container as a detached process in the background and effectively
    does not block the terminal. Even though the `Dockerfile` declares port 5000 as
    the one exposed by the image, you still need to map a chosen host port to that
    port for each created container. You do this using the `-p` parameter. We are
    free to override or set additional environment variables using one or more `-e`
    parameters. You may remember that the UUID API returns the `UUID_GENERATOR_NAME`
    environment variable value as the `generator` field in the response. For each
    container we are about to launch, we will use a different value that is identical
    to the name of the container that is set with the `--name` parameter.


    The exercises in Chapter [2](#478313_1_En_2_Chapter.xhtml) helped you to run a
    single instance of the UUID API as a `systemd` service on each of the two hosts.
    This time, we will run a few instances of the same application, binding them to
    different ports on the development instance like this:


    ```

    [opc@dev-vm]$ docker run -d -p 5011:5000 -e "UUID_GENERATOR_NAME=uuid-1" --name
    uuid-1 uuid:1.0

    d6e9112b0950.........40adc3

    [opc@dev-vm]$ docker run -d -p 5012:5000 -e "UUID_GENERATOR_NAME=uuid-2" --name
    uuid-2 uuid:1.0

    224256288f19.........d63b8c

    [opc@dev-vm]$ docker run -d -p 5013:5000 -e "UUID_GENERATOR_NAME=uuid-3" --name
    uuid-3 uuid:1.0

    b15d1d26614c.........45b8dd

    ```


    To list running containers, you can use the `docker ps` command.


    ```

    [opc@dev-vm]$ docker ps --format "table {{.ID}}\t{{.Image}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"

    CONTAINER ID  IMAGE     NAMES   STATUS     PORTS

    b15d1d26614c  uuid:1.0  uuid-3  Up 3 min   0.0.0.0:5013->5000/tcp

    224256288f19  uuid:1.0  uuid-2  Up 3 min   0.0.0.0:5012->5000/tcp

    d6e9112b0950  uuid:1.0  uuid-1  Up 3 min   0.0.0.0:5011->5000/tcp

    ```


    Now, let’s test the UUID API on each of the containers.


    ```

    [opc@dev-vm]$ curl 127.0.0.1:5011/identifiers

    {

    "generator":"uuid-1",

    "uuid":"d89d68bf-c093-4774-ab0e-0089674c184e"

    }

    [opc@dev-vm]$ curl 127.0.0.1:5012/identifiers

    {

    "generator":"uuid-2",

    "uuid":"e141eef7-e578-4272-934b-68b48b6e146c"

    }

    [opc@dev-vm]$ curl 127.0.0.1:5013/identifiers

    {

    "generator":"uuid-3",

    "uuid":"52ea3c08-adf2-452b-bd28-ef7b26aa2fc2"

    }

    ```


    Because we are running the `dev-vm` compute instance on Oracle Cloud Infrastructure,
    you may want to test containerized UUID APIs by making calls from your local machine
    using the instance’s public IP. To do so, you have to add an ingress security
    rule that allows the inbound traffic on ports 5011–5013. The infrastructure related
    to `dev-vm` was provisioned using Terraform. To add new ingress security rules,
    you would need to do it in the `dev_sl` resource in the `devmachine/vcn.tf` infrastructure
    code file. We discussed security rules in Chapters [2](#478313_1_En_2_Chapter.xhtml)
    and [6](#478313_1_En_6_Chapter.xhtml).


    We have successfully validated the newly built image by instantiating three containers
    and testing their APIs. You can now exit from the developer instance console.


    ```

    [opc@dev-vm]$ exit

    ```


    The `uuid:1.0` image is currently stored in our local image registry on the development
    instance. This kind of local registry is perfectly fine for the tests we’ve just
    conducted but cannot serve as a distribution registry.


    ## Container Registry


    In theory, you could push the newly built image from your local image registry
    on the developer instance to one of the public registries in the Internet such
    as Docker Hub. Yet, you will often prefer to keep all custom images in some kind
    of a private registry, invisible by the general public, that is additionally geographically
    close to your target infrastructure in which the containers run. Every Oracle
    Cloud Infrastructure tenancy comes with an image registry that is capable of storing
    both private and public repositories. *Oracle Cloud Infrastructure Registry* (`OCIR`)
    is fully integrated with identity and access management. As a consequence, the
    access to `OCIR` is granted to `IAM` users and managed using the `IAM` polices
    you are already familiar with. In the background, the container images are redundantly
    stored in the `OCI` object storage that backs the `OCIR`. *Repositories* are used
    to group related images. A single *repository* can be thought of as a set of related,
    tagged Docker image versions for a single service or application. In the context
    of `OCIR`, carefully assigned *tags* are used not only to denote particular versions
    or variants of containerized applications but also to indicate the tenancy namespace,
    destination region, and repository name. To push an image to your tenancy `OCIR`,
    you have to tag the image using a strictly defined notation, as presented in Figure
    [8-9](#478313_1_En_8_Chapter.xhtml#Fig9).


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig9_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Image tags and `OCIR`


    `OCIR` uses different region codes than the ones you’ve encountered up to now.
    Table [8-1](#478313_1_En_8_Chapter.xhtml#Tab1) presents a few of them. An updated
    list can be found here: [`https://docs.cloud.oracle.com/iaas/Content/General/Concepts/regions.htm`](https://docs.cloud.oracle.com/iaas/Content/General/Concepts/regions.htm).


    Table 8-1


    OCIR region codes


    | Region Name | Region Identifier | OCIR Key |

    | --- | --- | --- |

    | Australia East (Sydney) | `ap-sydney-1` | `syd` |

    | Brazil East (Sao Paulo) | `sa-saopaulo-1` | `gru` |

    | Canada Southeast (Toronto) | `ca-toronto-1` | `yyz` |

    | Germany Central (Frankfurt) | `eu-frankfurt-1` | `fra` |

    | India West (Mumbai) | `ap-mumbai-1` | `bom` |

    | Japan East (Tokyo) | `ap-tokyo-1` | `nrt` |

    | London (UK) | `uk-london-1` | `lhr` |

    | South Korea Central (Seoul) | `ap-seoul-1` | `icn` |

    | Switzerland North (Zurich) | `eu-zurich-1` | `zrh` |

    | UK South (London) | `uk-london-1` | `lhr` |

    | US East (Ashburn) | `us-ashburn-1` | `iad` |

    | US West (Phoenix) | `us-phoenix-1` | `phx` |


    You can find the *tenancy namespace* in the Registry view in the `OCI` Console.
    If logged in as the tenancy superuser, you do not need any particular `IAM` policies
    to see `OCIR` in the `OCI` Console. This is how you access the relevant view using
    the `OCI` Console:


    1.  Go to **Menu** ➤ **Developer Services** ➤ **Registry**.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig10_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Viewing an Oracle container Image registry in the `OCI` Console


    The *tenancy namespace* is visible as a root node of the repository list. You
    will find it next to an icon of a house. In my case, the namespace name is the
    same as my tenancy name (`jakobczyk`), but this might no longer be the case for
    newer tenancies. You will probably find a random string.'
