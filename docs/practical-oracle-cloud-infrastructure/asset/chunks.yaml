    \ 对象，这些对象实际上各自存储了部分编号和对应的实体标签。为了在 `upload_to_oci` 函数中填充此列表，我们在 `upload_part` 函数中基于已知的部分编号和返回的\
    \ ETag 标头（存储了已上传部分的实体标签）为每个部分创建详情对象。\n\n```\ndef upload_part(storage_namespace,\
    \ bucket_name, object_name, upload_id, part_number, part, client):\n    print('Part\
    \ File: '+part)\n    kwargs = {}\n    with open(part, 'rb') as part_stream:\n\
    \        rsp = client.upload_part(storage_namespace, bucket_name, object_name,\
    \ upload_id, part_number, part_stream)\n        kwargs = { \"part_num\": part_number,\
    \ \"etag\": rsp.headers['ETag'] }\n        print('Part ETag: '+rsp.headers['ETag'])\n\
    \    return\n    oci.object_storage.models.CommitMultipartUploadPartDetails(**kwargs)\n\
    ```\n\n代码清单 5-6\nmultipart.py: `upload_part` 函数\n\n代码清单 5-7 展示了 `commit_multipart_upload`\
    \ 函数，该函数接受 `CommitMultipartUploadPartDetails` 对象列表，将其包装成一个 `CommitMultipartUploadDetails`\
    \ 对象，并使用 `client.commit_multipart_upload` 方法向 API 发送一个 `CommitMultipartUpload`\
    \ 请求。\n\n```\ndef commit_multipart_upload(storage_namespace, bucket_name, object_name,\
    \ upload_id, part_details_list, client):\n    kwargs = { \"parts_to_commit\":\
    \ part_details_list }\n    details = oci.object_storage.models.CommitMultipartUploadDetails(**kwargs)\n\
    \    client.commit_multipart_upload(storage_namespace, bucket_name, object_name,\
    \ upload_id, details)\n```\n\n代码清单 5-7\nmultipart.py: `commit_multipart_upload`\
    \ 函数\n\n我构建了这个示例应用程序来说明使用 OCI SDK 以及编程实现多部分上传的方式。要将这样的应用程序发布到生产环境，你需要添加错误处理逻辑，以便在发生严重失败时中止正在进行的多部分上传。你还可以考虑为单个部分的上传添加重试机制。最后，可以并行上传各个部分以加快整个过程。\n\
    \n事实上，如果你乐于依赖嵌入在脚本中的 OCI CLI，你可以使用方便的 `oci os put` CLI 命令。这与你本章前面已经使用过的命令相同。任何大于你通过\
    \ `--part-size` 参数定义的文件都会有效地使用多部分上传 API 进行上传，除非你明确使用 `--no-multipart` 选项。此外，你可以使用\
    \ `--parallel-upload-count` 参数定义并行部分上传的数量，其默认值为 3。\n\n在本节中，你使用了一个应用程序，该应用程序利用\
    \ SDK/CLI 配置文件让 SDK 以 IAM 用户身份对 API 调用进行签名。这可能会很烦人，因为你需要以某种方式将 API 签名密钥和用户的 OCID\
    \ 等内容分发到你的应用程序预计运行的主机。幸运的是，对于托管在 Oracle Cloud 中运行的计算节点上的应用程序，你不需要这样做。在这种情况下，你甚至不需要任何专门的\
    \ IAM 用户。相反，你可以利用所谓的动态组，其成员是满足某些条件的计算实例。你将在下一节中了解它们。\n"
- fmt: '## Instance Principals


    在IAM的上下文中，Oracle Cloud中的每个计算实例都有其自己的身份，该身份基于自动生成、添加到实例上并进行轮换的证书。换句话说，计算实例被视为一个*实例主体*，一个独立的参与者，并且被允许以其自己的名称调用OCI
    API。实例主体只能是*动态组*的成员。您已经了解到，我们使用策略来为特定用户组指定对云资源的允许访问。类似地，我们可以定义策略，为由实例主体组成的特定动态组指定允许的访问。为什么我们称动态组为“动态”？很简单，因为它们使用匹配规则来动态添加或移除其成员，如图[5-11](#478313_1_En_5_Chapter.xhtml#Fig11)所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig11_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig11_HTML.jpg)

    图 5-11

    实例主体和动态组


    您使用简单的语法制定匹配规则，以定义实例必须满足的条件才能被视为给定动态组的成员。让我给您一个例子。这是一个`匹配规则`条件，它将包含特定 compartment
    中存在的所有计算实例：


    ```

    instance.compartment.id = ''ocid1.compartment.oc1..aaaaa.........gzwhsa''

    ```


    您也可以根据实例精确的OCID来指向它们。


    ```

    instance.id = ''ocid1.instance.oc1..........kurtua''

    ```


    然而，最方便且真正动态的方式是依赖附加到计算实例上的已定义标签。这是一个条件，它将包含所有附加了`project.realestate`自定义标签的计算实例。


    ```

    tag.project.realestate.value

    ```


    您也可以创建复杂的条件。`all`这个词将确保所有单独条件都必须满足，而`any`这个词则将规则视为只要至少一个条件满足即达成。这是一个条件，它将包含所有存在于特定compartment中并且附加了`project.name`自定义标签的计算实例。在这种情况下，标签值必须设置为`realestate`。


    ```

    all { instance.compartment.id = ''ocid1.compartment.oc1..aaaaa.........gzwhsa'',
    tag.projects.name.value = ''realestate'' }

    ```


    等等？一个“自定义标签”？是的。没错。我之前没有提到过这一点。在Oracle Cloud中，您可以将*用户定义的标签*附加到计算实例和许多其他类型的云资源上。这是一个简单而强大的功能，可让您组织和跟踪云资源。


    ## Tagging Resources


    许多类型的云资源，包括计算实例和对象存储桶，都可以附加自定义标签。有两种类型的标签。


    *   自由格式标签

    *   定义标签


    我们将重点关注定义标签，因为它们提供了更多功能，包括动态组匹配规则支持。定义标签必须在*标签命名空间*内分组。确切地说，标签命名空间包含*标签键*。然后，您将来自给定命名空间、具有给定键的标签附加到云资源，例如计算实例、对象存储桶或负载均衡器。在此过程中，您可以选择性地为特定标签键分配自定义*标签值*，但这不是强制性的。虽然您在compartment中创建标签命名空间，但标签命名空间名称必须在整个租户中唯一。此外，名称不区分大小写；因此，为了保持一致性，最好将它们全部保持为小写或全部大写。与许多其他类型的云资源相比，允许您将标签命名空间从一个compartment移动到另一个compartment。


    注意

    您可以为对象存储桶分配标签，但不能为单个对象分配标签。对于对象，请使用本章前面介绍的自定义元数据功能。


    不再需要的标签键可以被停用或完全删除。已停用的标签键被标记为非活动状态，不能再附加到云资源。但是，现有附件不受影响。特定于标签的操作仍将考虑附加到资源的已停用标签键。停用标签命名空间会有效地停用属于该命名空间的所有标签键。


    让我们在`Sandbox` compartment中创建一个名为`test-projects`的新标签命名空间。我们将使用`oci iam tag-namespace`
    `create` CLI命令。如果您已按照第[4](#478313_1_En_4_Chapter.xhtml)章的说明在`oci_cli_rc`配置文件中配置了`SANDBOX-ADMIN`配置文件，则可以像我在以下代码片段中所做的那样，省略`--compartment-id`选项：


    ```

    $ oci iam tag-namespace create --name "test-projects" --description "Test tag
    namespace: projects" --profile SANDBOX-ADMIN

    {

    "data": {

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "description": "Test tag namespace: projects",

    "freeform-tags": {},

    "id": "ocid1.tagnamespace.oc1..aa.........6qu2eq",

    "is-retired": false,

    "name": "test-projects",

    "time-created": "2019-03-09T20:23:33.458000+00:00"

    },

    "etag": "4c49c30092918551319c46469d6051f47309f001"

    }

    ```


    响应主体是自我描述的。我们可以清楚地看到标签命名空间创建成功。我们始终可以使用OCI控制台验证一切是否顺利，如图[5-12](#478313_1_En_5_Chapter.xhtml#Fig12)所示。为此，请按照以下步骤操作：


    1.  转到菜单 ➤ 治理 ➤ 标签命名空间。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig12_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig12_HTML.jpg)

    图 5-12

    在OCI控制台中查看标签命名空间


    提示 如果您意外地在根compartment中创建了`tag-namespace`，请不要停用它；只需将其移动到`Sandbox` compartment即可。


    如果您问自己图[5-12](#478313_1_En_5_Chapter.xhtml#Fig12)所示视图中的“成本跟踪标签”列是什么意思，我将帮助您。您一次最多可以指定10个标签键作为成本跟踪启用。这些标签键将作为您应用的额外过滤器，在OCI控制台的账单成本分析视图中可用，以便以更精细的方式跟踪成本。基于标签可以动态附加到资源并从资源分离这一事实，成本跟踪标签为您提供了更大的灵活性，以跨compartment跟踪相关云资源组产生的成本。'
  raw: '### Instance Principals


    In the context of IAM, each compute instance in Oracle Cloud has its own identity
    based on the certificates that are automatically generated for, added to, and
    rotated on the instance. In other words, a compute instance is seen as an *instance
    principal* , an independent actor, and is allowed to call OCI APIs with its own
    name. Instance principals can be members of *dynamic groups* only . You have already
    learned that we use policies to specify the allowed access over cloud resources
    for a particular group of users. Similarly, we can define policies that specify
    the permitted access for a particular dynamic group that consists of instance
    principals. Why do we call dynamic groups “dynamic”? Simply because they use matching
    rules to dynamically add or remove their members, as shown in Figure [5-11](#478313_1_En_5_Chapter.xhtml#Fig11).


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig11_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Instance principals and dynamic groups


    You formulate matching rules using easy syntax to define the conditions an instance
    must meet to be treated as a member of a given dynamic group. Let me give you
    an example. This is the *matching rule* condition that would include all compute
    instances that exist in a particular compartment:


    ```

    instance.compartment.id = ''ocid1.compartment.oc1..aaaaa.........gzwhsa''

    ```


    You can also point to the instances based on their precise OCIDs.


    ```

    instance.id = ''ocid1.instance.oc1..........kurtua''

    ```


    The most convenient and truly dynamic way, though, is to rely on defined tags
    that are attached to compute instances. This is a condition that includes all
    compute instances that have the `project.realestate` custom tag attached.


    ```

    tag.project.realestate.value

    ```


    You can create complex conditions as well. The `all` word will make sure that
    all individual conditions have to be met, while the word `any` will treat the
    rule as fulfilled as long as at least one condition is met. This is a condition
    that includes all compute instances that exist in a particular compartment and
    have the `project.name` custom tag attached. In this case, the tag value must
    be set to `realestate`.


    ```

    all { instance.compartment.id = ''ocid1.compartment.oc1..aaaaa.........gzwhsa'',
    tag.projects.name.value = ''realestate'' }

    ```


    Wait a minute? A “custom tag”? Yes. Correct. I haven’t mentioned this before.
    In Oracle Cloud, you can attach *user-defined tags* to compute instances and many
    other types of cloud resources. This is a simple yet powerful feature that lets
    you organize and track your cloud resources.


    ### Tagging Resources


    Many types of cloud resources including compute instances and object storage buckets
    can have custom tags attached. There are two types of tags.


    *   Free-form tags


    *   Defined tags


    We are going to focus on defined tags because they offer more functionality including
    dynamic group matching rules support. Defined tags must be grouped within *tag
    namespaces* . To be precise, a tag namespace contains *tag keys* . You then attach
    tags from a given namespace with a given key to cloud resources such as compute
    instances, object storage buckets, or load balancers. While doing this, you can
    optionally assign a custom *tag value* to a particular tag key, but this is not
    mandatory. Although you create tag namespaces in compartments, tag namespace names
    must be unique within the entire tenancy. Furthermore, the names are case insensitive;
    therefore, it is a good practice to keep them either all in lowercase or all in
    uppercase for consistency. In contrast to many other types of cloud resources,
    you are allowed to move tag namespaces from one compartment to another.


    Note


    You can assign tags to object storage buckets, but not to the individual objects.
    In their case, use the custom metadata feature that was presented earlier in this
    chapter.


    A tag key that is no longer needed can be made either retired or completely deleted.
    A retired tag key is marked as inactive and can no longer be attached to cloud
    resources. The existing attachments remain unaffected, however. Tag-specific operations
    will still take into account the retired tag keys attached to resources. Retiring
    a tag namespace effectively retires all tag keys that belong to the namespace.


    Let’s create a new tag namespace called `test-projects` in the `Sandbox` compartment.
    We are going to use the `oci iam tag-namespace` `create` CLI command. If you have
    configured the `SANDBOX-ADMIN` profile in the `oci_cli_rc` configuration file
    as instructed in Chapter [4](#478313_1_En_4_Chapter.xhtml), you can omit the `--compartment-id`
    option like I did in the following code snippet:


    ```

    $ oci iam tag-namespace create --name "test-projects" --description "Test tag
    namespace: projects" --profile SANDBOX-ADMIN

    {

    "data": {

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "description": "Test tag namespace: projects",

    "freeform-tags": {},

    "id": "ocid1.tagnamespace.oc1..aa.........6qu2eq",

    "is-retired": false,

    "name": "test-projects",

    "time-created": "2019-03-09T20:23:33.458000+00:00"

    },

    "etag": "4c49c30092918551319c46469d6051f47309f001"

    }

    ```


    The response body is self-descriptive. We can clearly see that tag namespace creation
    was successful. We can always verify whether everything went fine using the OCI
    Console, as shown in Figure [5-12](#478313_1_En_5_Chapter.xhtml#Fig12). To do
    so follow these steps:


    1.  Go to Menu ➤ Governance ➤ Tag Namespaces.


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig12_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Viewing tag namespaces in the OCI Console


    **Tip** If you’ve accidentally created the `tag-namespace` in the root compartment,
    do not retire it; just move it to the `Sandbox` compartment.


    If you are asking yourself what the “cost-tracking tags” column means in the view
    presented in Figure [5-12](#478313_1_En_5_Chapter.xhtml#Fig12), I will help you.
    You can designate up to 10 tag keys in total to be cost tracking enabled in a
    single moment. These tag keys will be available for selection in the billings
    cost analysis view in the OCI Console as an additional filter you apply to trace
    the costs in a more granular way. Based on that tags can be attached and detached
    from resources in a dynamic way, the cost tracking tags give you more flexibility
    in tracing the costs incurred by groups of related cloud resources across their
    compartments.'
