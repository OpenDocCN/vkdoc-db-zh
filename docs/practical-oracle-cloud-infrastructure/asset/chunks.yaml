    Let’s take a closer look at the preceding code snippet. You can see that the virtual
    cloud network (`web_vcn`) was the first cloud resource created. Next, the creation
    process started in parallel for the Internet gateway (`web_igw`) and the security
    list (`web_sl`). This is pretty clear. Both exist within a VCN and have no dependencies
    between them. The route table (`web_rt`), however, had to wait until the Internet
    gateway has been successfully created. The reason behind this is that the route
    rule we included in the route table pointed to the Internet gateway as its target.
    In other words, the route table depended on the existence of the Internet gateway.
    The creation of the subnet (`web_subnet`) began immediately after the route table
    and security list were created. Finally, the provisioning of a compute instance
    (`web_vm`) started and took nearly a minute to complete. Figure [3-11](#478313_1_En_3_Chapter.xhtml#Fig11)
    presents the dependency tree.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig11_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Resource dependency tree


    The last two entries (`web_vnic_attachment` and `web_vnic`) annotated with the
    `Refreshing state` text mean that read-only requests were sent to the OCI REST
    API to fetch some information. In this case, Terraform queried OCI for the public
    IP address that had been assigned to the newly launched compute instance. Note
    this address (in my case, it is 130.61.127.53, but you will most probably see
    a different value, unless you are lucky to get the same address assigned from
    the pool). We will need it, in a moment, to test the deployment.


    Congratulations! You’ve just provisioned your first Terraform-based cloud solution
    using the infrastructure-as-code approach. If you want, you can go to the OCI
    Console to see it, as shown in Figure [3-12](#478313_1_En_3_Chapter.xhtml#Fig12).


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig12_HTML.png](images/478313_1_En_3_Chapter/478313_1_En_3_Fig12_HTML.png)


    Figure 3-12


    web-vm compute instance in the OCI Console


    The fact that an instance is up and running does not mean that the booting process
    has completed. Cloud-init scripts, especially those that download and install
    new software, can take some time to complete. I explained this in Chapter [2](#478313_1_En_2_Chapter.xhtml).
    Try sending a standard GET request a few times using `curl` until you see this:


    ```

    $ VM_PUBLIC_IP=`terraform output web_instance_public_ip`

    $ echo $VM_PUBLIC_IP

    130.61.127.54

    $ curl $VM_PUBLIC_IP

    Greetings from the Cloud

    ```


    If you’ve read the greeting, it means you’ve successfully tested our simple cloud
    application. Hurrah!


    Tip


    If you get bored by waiting for the cloud-init script to complete, you can log
    into the instance and trace the cloud-init log. I’ve explained how to do this
    in Chapter [2](#478313_1_En_2_Chapter.xhtml).


    The infrastructure-as-code approach really shines when you need to update small
    pieces of a complex cloud infrastructure. Terraform tries to minimize the number
    of changes and alter (or re-create) only the resources that really have to be
    amended (or destroyed and newly launched).


    Assuming you’ve had enough fun testing your simple cloud application, we will
    now terminate the resources. You can do this by executing `the terraform destroy`
    command. If you use `the --auto-approve` option, Terraform won’t ask you for the
    final permission and will proceed to send the requests to the OCI REST API. This
    is how you can perform a cleanup and terminate the infrastructure we’ve created
    a moment ago:'
  trans: "\n让我们仔细看看前面的代码片段。可以看到，虚拟云网络 (`web_vcn`) 是最先被创建的云资源。接着，Internet 网关 (`web_igw`)\
    \ 和安全列表 (`web_sl`) 的创建过程并行启动。这一点非常清晰。两者都存在于一个 VCN 内部，并且彼此之间没有依赖关系。\n\n### 资源创建依赖关系\n\
    \n然而，路由表 (`web_rt`) 必须等到 Internet 网关成功创建后才能开始创建。其原因在于，我们在路由表中包含的路由规则将 Internet\
    \ 网关指定为其目标。换句话说，路由表依赖于 Internet 网关的存在。在路由表和安全列表都创建完成后，子网 (`web_subnet`) 的创建便立即开始了。最后，计算实例\
    \ (`web_vm`) 的配置启动，这个过程花费了近一分钟才完成。图 3-11 展示了依赖关系树。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig11_HTML.jpg](img/478313_1_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11** 资源依赖关系树\n\n最后两个标注着 `Refreshing state` 文字的条目 (`web_vnic_attachment`\
