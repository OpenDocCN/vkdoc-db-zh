    之前，我简要提到过所有容器都使用其宿主机的内核。这就是为什么内核对于 Docker 引擎仍然很重要，你可以在 `docker info` 命令的输出中找到其精确版本，列为
    `Kernel Version` 条目。在各种信息条目中，你还会看到 `Runtimes` 条目。Docker 使用名为 `containerd` 的容器运行时。然而，在这里，我们在
    `Runtimes` 条目中看到的是名为 `runc` 的东西。这并没有错。`runc` 是一个负责根据标准化的开放容器倡议 (OCI) 规范运行容器的组件。`containerd`
    容器运行时在底层使用了 `runc`，并在其周围添加了更多功能。另一个有趣的条目涉及 Docker 处理文件系统层的方式，这些层组合起来构成容器化应用程序所看到的文件系统。在只读层的顶部，有一个可写的容器层。如果应用程序对文件系统进行了任何更改，这些更改将仅反映在可写层中。`存储驱动程序`
    的任务就是管理这些层，同时考虑支撑宿主机上 `Docker 根目录` 的底层物理文件系统的特性。有几种可用的存储驱动程序，各有优缺点。我们使用的是目前首选的名为
    `overlay2` 的存储驱动程序，由 xfs 文件系统支持。文件系统层层次结构位于 `/var/lib/docker/overlay2` 子目录中。当容器运行时，你应该能够使用
    `mount` 命令找到层是如何相互堆叠的。如果乍看起来有点复杂，也不必担心。我们不会去处理这些设置。我只是想让你对本章开头关于层的概念性讨论，获得一些实际的概览。


    ## Docker 镜像


    我们的目标是构建一个封装了 UUID 服务应用程序的镜像，包括应用程序依赖项（Python 3 和 Flask 微框架）以及所需环境变量（例如，`FLASK_APP`）的默认值。首先，我们必须为我们即将构建的应用程序特定镜像选择合适的
    `基础镜像`。幸运的是，Docker Hub（这可能是最大的容器镜像库）上有 Python 的官方基础镜像。社区驱动的开源项目和独立软件供应商都将其准备分发的镜像发布到
    Docker Hub。你可以在 [`https://hub.docker.com/_/python`](https://hub.docker.com/_/python)
    找到大量捆绑了不同 Python 版本的镜像，适用于各种平台，如图 8-7 所示。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig7_HTML.jpg](img/478313_1_En_8_Fig7_HTML.jpg)


    ### 图 8-7


    Docker Hub 上的官方 Python 镜像


    出于演示目的，我们将选择 Alpine Linux 上的 Python 3，即 `python:3-alpine` 标签下的可用变体。我们的 Docker
    引擎（运行在 Oracle Cloud Infrastructure 法兰克福区域的一个实例上）实际上如何知道如何获取这个镜像呢？如果你再次运行 `docker
    info` 命令，你应该会在输出底部看到 `Registry` 条目。


    ```

    [opc@dev-vm]$ docker info

    ...

    Registry: https://index.docker.io/v1

    ...

    ```


    Docker CE 默认附带预配置的指向 Docker Hub 容器镜像注册表的链接。根据计算实例所连接的 VCN 子网使用的安全规则，该实例确实具有通往互联网的出站连接，这实际上允许实例从
    Docker Hub 下载容器镜像。


    到目前为止一切顺利。我们知道基础镜像的名称了。现在，是时候创建自定义镜像了，该镜像添加了 Flask 微框架，设置了一些默认环境变量，并指示容器运行时执行
    `app.py` 文件（即 UUID API 的实现）。为了指示 Docker 如何构建新镜像，你需要使用一个 `Dockerfile`，它基本上由用于构建给定镜像的一系列命令组成。


    首先，我们将再次克隆包含本书代码的 Git 仓库，这次是在开发者实例上。


    ```

    [opc@dev-vm]$ git clone https://github.com/mtjakobczyk/oci-book.git

    [opc@dev-vm]$ cd oci-book/chapter08/2-docker/

    [opc@dev-vm]$ cd uuid-service/

    [opc@dev-vm]$ ls -1

    app.py

    Dockerfile

    requirements.txt

    ```


    `chapter08/2-docker/uuid-service` 目录包含三个文件。


    *   `app.py`

    *   `Dockerfile`

    *   `requirements.txt`


    `app.py` 文件与我们在第 2 章使用的文件相同。这基本上是 UUID API 的实现。根据 Python 惯例，`requirements.txt`
    文件保存了我们应用程序所需的 Python 包列表，这些包将使用 `pip` 工具安装。正如我刚才提到的，`Dockerfile` 用于构建镜像。清单 8-2
    显示了我们镜像的 `Dockerfile`。


    ```

    FROM python:3-alpine

    ENV FLASK_APP /usr/src/app/app.py

    ENV FLASK_ENV development

    ENV FLASK_DEBUG 0

    EXPOSE 5000

    WORKDIR /usr/src/app

    COPY requirements.txt ./

    RUN pip install --no-cache-dir -r requirements.txt

