    Figure 4-1


    Project environments and production systems


    The cloud resources, such as compute instances, object storage buckets, or virtual
    networks, used across different project environments and production systems require
    separate *management permissions*. While you can let a large group of developers
    manage the cloud resources used across various development and test environments,
    you would rather appoint a much smaller group of people to look after your production
    systems. Moreover, it is usually not necessary for developers working on one project
    to see the cloud resources used by other projects. To enforce the proper access
    levels, you have to be able to group selected cloud resources in some kind of
    logical groups to which you can attach dedicated permission polices that will
    decide who can take what kind of actions on the cloud resources a particular group
    contains. The metered usage of selected types of cloud resources such as compute
    instances or load balancers incur financial costs. From a financial point of view,
    nearly all organizations prefer to *measure the costs* incurred by individual
    projects and production systems. The more granular cost split, the better. In
    this way, the cloud charges can be properly assigned to their appropriate cost
    centers and eventually accounted in a correct way. Again, you need to be somehow
    able to group selected cloud resources to calculate the charges these groups cause.'
  trans: '

    ## 项目、环境与系统


    多年来，我们已经习惯于遵循特定的组织流程，以协作方式交付信息技术解决方案。该流程通常围绕一个或多或少的正式计划构建，并持续到特定目标达成或条件满足为止。为了指代整个工作，我们通常称之为
    `项目`。几乎所有项目的特点是其临时性。项目的开始、任何可选的中间目标（有时称为 `里程碑`）以及预期的最终结束目标，都有着明确预期的完成日期。当代面向云的信息技术项目，其目标通常要么是改造现有的本地解决方案并将其功能迁移到云端，要么是设计一个全新的云原生解决方案。


    一个面向云项目的产物，最常见的是运行在虚拟云基础设施上的一套应用程序。一个组织的软件版图确实可能非常复杂。组织规模越大或技术导向越强，其应用程序的数量和种类就越多。为了避免歧义，并能够指代那些紧密关联的应用程序或应用程序组，我们可以使用
    `系统` 这个术语。总而言之，应用版图由许多系统组成，这些系统最终用于驱动广泛的业务流程。通常，大多数系统彼此互联，并需要一定程度的集成。


    ## 开发生命周期与环境


    软件开发生命周期几乎总是迭代式的，因为复杂的问题只有被分解为可管理的阶段才能真正解决。开发者逐步地、以小功能块的方式构建或迁移应用程序。在某些情况下，增量变更可能引入一些回归问题，即导致之前正常工作的功能直接失效的缺陷。为了降低回归风险，至关重要的是整个解决方案至少在每个里程碑上都经过一次全面测试。这是通过所谓的回归测试来完成的。


    此外，一些主要里程碑和最终交付物必须得到客户的批准。因此，软件成为所谓的验收测试的对象。虽然开发者频繁地更改他们正在构建的软件，但回归测试和验收测试确实需要一定程度的稳定性。传统的解决方案是通过为不同目的使用不同的
    `环境` 来实现的。


    开发者在一个或多个 `开发环境` 中工作，他们在其中部署软件的所有中间版本。即使你依赖于自动化单元测试的良好覆盖，这些环境可能仍然相当不稳定。这就是为什么只有选定的版本会被提升为所谓的发布版本，并部署在
    `测试环境` 中，在那里进行更复杂的、手动或自动的回归与验收测试。


    成功通过测试并获得批准的发布版本通常会被提升到一个所有生产系统运行的环境。我们通常将此环境称为 `生产环境`。值得注意的是，生产系统是例行操作的对象，并且，在一般流程中，我们不再在单个项目的上下文中讨论它们。此外，你可以有多个项目为一个单一的生产环境做出贡献，但每个项目只影响那些相对松散耦合的生产系统。这在概念上如图
    4-1 所示。


    ![项目环境与生产系统](img/478313_1_En_4_Fig1_HTML.jpg)


    **图 4-1**

    项目环境与生产系统


    ## 资源管理与成本分配


    在不同的项目环境和生产系统中使用的云资源，例如计算实例、对象存储桶或虚拟网络，需要单独的 `管理权限`。虽然你可以让一大群开发者来管理各种开发和测试环境所使用的云资源，但你更可能指派一个规模小得多的小组来照看你的生产系统。此外，通常没有必要让从事一个项目的开发者看到其他项目所使用的云资源。


    为了强制实施适当的访问级别，你必须能够将选定的云资源分组到某种逻辑组中，并为这些组附加专门的权限策略，这些策略将决定谁可以对特定组内包含的云资源执行何种操作。


    选定类型的云资源（如计算实例或负载均衡器）的按量使用会产生财务成本。从财务角度看，几乎所有组织都倾向于 `核算` 由各个项目和生产系统产生的成本。成本划分得越细粒度越好。这样，云费用就可以被恰当地分配给相应的成本中心，并最终以正确的方式入账。同样，你需要以某种方式能够将选定的云资源分组，以计算这些组所产生的费用。

