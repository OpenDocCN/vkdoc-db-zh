- fmt: "## 容器化与挑战\n\nOne thing that distinguishes services deployed to an application\
    \ server from containerized applications is the fact that all dependencies, in\
    \ the case of the latter, are bundled with the application in the form of an image.\
    \ Thanks to the filesystem layers shared by many images, this doesn’t cause any\
    \ major storage capacity problems. No application server, however, means that\
    \ the containers have to handle all `nonfunctional tasks` themselves. To address\
    \ this challenge, you might create a set of dedicated containers, which handle\
    \ these nonfunctional tasks, for each container that implements a service or part\
    \ of a business process. As a matter of fact, this is a well-known pattern called\
    \ the `sidecar pattern`. This creates a need to logically combine the main container\
    \ with its sidecar containers and govern their lifecycle jointly as a single logical\
    \ deployment unit.\n\nContainerization often results in even more granular applications,\
    \ each focused on a narrow and specialized task, whether it is data transformation,\
    \ the implementation of a single REST resource that belongs to a standardized\
    \ API, or the interaction with various software-as-a-service business solutions.\
    \ Some tend to call these highly specialized services as `microservices`. A number\
    \ of microservices have to interact in order to accomplish one or more business\
    \ processes. Therefore, containerized applications need some kind of service discovery\
    \ mechanism and connectivity.\n\nTo achieve fault tolerance and enable highly\
    \ availably application deployments, multiple hosts with container runtimes are\
    \ grouped together to form clusters. These clusters must provide some kind of\
    \ overlay network to let all containerized applications smoothly interact with\
    \ each other when needed. All in all, we come back, to some extent, to the problems\
    \ that had been already solved for services deployed to application servers. What\
    \ we need for containerized applications is some kind of an `infrastructure-agnostic\
    \ platform` that will support clustering, built-in scaling, lifecycle management,\
    \ and flat overlay network for related groups of containers, as illustrated in\
    \ Figure [8-17](#478313_1_En_8_Chapter.xhtml#Fig17).\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig17_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig17_HTML.jpg)\n\
    \nFigure 8-17 Platform for containerized applications\n\nThe goals for that kind\
    \ of `container platform` are as follows:\n\n*   Orchestrating containerized applications\n\
    *   Abstracting underlying infrastructure\n*   Providing applications with the\
    \ following:\n    *   A flat overlay network\n    *   Scalable computing capacity\n\
    \    *   Persistent storage\n    *   An integrated service discovery for applications\n\
    \    *   Health checks functionality\n    *   And more\n\nAccording to the Oxford\
    \ dictionary, the word `orchestration` can mean “coordination of the elements\
    \ (…) to produce a desired effect.” The platform coordinates the lifecycle of\
    \ individual and related containers including but not limited to creation, scaling,\
    \ termination, intelligent upgrades, and self-healing.\n\nFrom the application’s\
    \ point of view, it does not matter how many compute instances or what kind of\
    \ load balancers are involved. It is the computing power and a steady and uninterrupted\
    \ stream of incoming requests that matters. This makes the infrastructure an ideal\
    \ candidate to be abstracted.\n\nThere is already a considerable number of available\
    \ cluster-aware platforms for running containerized applications including the\
    \ following:\n\n*   `Docker Swarm`\n*   `HashiCorp Nomad`\n*   `Mesosphere DC/OS`\n\
    *   `Kubernetes`\n\nCloud Native Computing Foundation (`CNCF`) hosts an ecosystem\
    \ of open source software focused on containerized applications. Its members are\
    \ major cloud providers, well-established enterprise software vendors, and rapidly\
    \ growing startups. At the time of writing, `Kubernetes` is the only graduated\
    \ project in the area of container orchestration, has more than 2,100 direct contributors\
    \ on `GitHub`, and has been adopted by a number of cloud providers as the engine\
    \ for their managed container platforms.\n\n## Kubernetes\n\n`Kubernetes` is a\
    \ truly immense topic that could fill a separate book. The platform and a diverse\
    \ ecosystem of related tools provide a broad range of container-oriented functionalities,\
    \ mentioned in the previous section. `Kubernetes` comes with an extendable and\
    \ pluggable control plane. `Kubernetes`, being a rich-feature container platform\
    \ built around container orchestration, provides containerized applications with\
    \ an infrastructure-agnostic, scalable deployment canvas equipped with a pluggable,\
    \ flat-space networking.\n\n### Pods\n\nContainerized applications are organized\
    \ into `pods`. A `pod` is a logical construct that groups closely related containers,\
    \ usually one main and a few sidecar containers. Even though still somehow isolated,\
    \ containers in the same pod do share some elements such as the hostname, network\
    \ interfaces, and the IPC namespace. What remains separate are the filesystem\
    \ layers each individual container is built from, unless they share the same or\
    \ similar images. Containers can communicate with other containers in the same\
    \ pod using `localhost` because they share the loopback interface.\n\nHow do you\
    \ group containers into pods? First, think about scaling. Pods can be replicated\
    \ to increase the processing throughput or simply provide high availability to\
    \ respond to a failure. If you feel that it is more appropriate to scale two particular\
    \ containers separately, put them into two separate pods. Second, think about\
    \ the sidecar pattern. Having a particular main container, you would often put\
    \ the dedicated support containers into the same pod to let them communicate freely\
    \ with the main container, for example, over the loopback interface.\n\n### ReplicaSet\n\
    \nA pod is an example of a core `Kubernetes` object type. There are a few other\
    \ types of `Kubernetes` objects. I mentioned before that pods can be replicated.\
    \ The replication is handled by a `ReplicaSet` object. One of the fundamental\
    \ `Kubernetes` concepts is the presence of controller control loops. A `ReplicaSet`\
    \ defines the expected count of pods that have a particular label attached. The\
    \ corresponding control loop ensures the number of pods is correct according to\
    \ the expected state. If there are too few pod replicas running in a given moment\
    \ in time, the control loop will make sure that the instance count is increased\
    \ to what is expected in a particular `ReplicaSet` definition.\n\n### Service\n\
    \nWith a set of pod replicas that provides an implementation of a particular API,\
    \ you may be asking how to expose this API. Another type of `Kubernetes` object,\
    \ a `Service` object, is used to provide a static point of entry to the group\
    \ of pod replicas that implement a particular service. `Kubernetes` knows where\
    \ to dispatch the incoming requests based on selectors. As you define a `Service`\
    \ object, you provide a label selector. All pods with the given label will be\
    \ considered addressees of the service.\n\nThe default type of a `Service` object\
    \ is called a `ClusterIP`. It provides a service with an internal IP address reachable\
    \ from within the cluster only. This is perfectly fine for containers with services\
    \ called by other containers within the cluster. To let a service be reachable\
    \ from the outside of a cluster, you can choose a `LoadBalancer` type, provided\
    \ that your underlying cloud infrastructure supports this type. Oracle Cloud Infrastructure\
    \ does offer public load balancers that are attached to a public IP and reachable\
    \ from the Internet. I will show this in action in a few moments."
