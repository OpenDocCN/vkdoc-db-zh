  trans: '在 `source_details` 对象内，`source_type` 仍然表明需要基于 `source_id` 属性指定的镜像来创建一个新的启动卷。


    我希望你现在能理解，为什么基础设施代码文件中的简单形状替换不会起作用，甚至可能是有害的，因为任何保留在根文件系统中的应用状态都将丢失。谈到根文件系统中的应用状态，`cloud-config`
    文件不仅添加了一个新的基于 `stress-ng` 的 `systemd` 服务，还创建了一个包含初始启动时间戳的小型文本文件。我们将使用这个时间戳来验证在垂直扩展实例后，我们是否仍在使用同一个启动卷。首先，连接到该实例并记录这个小型文件的内容：


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$INSTANCE_PUBLIC_IP

    [opc@vm-1-ocpu ~]$ cat datemarker

    Sat Apr 27 17:01:34 GMT 2019

    [opc@vm-1-ocpu ~]$ exit

    ```


    ## 要垂直扩展实例，你需要执行以下步骤


    1.  停止旧实例，同时保留启动卷。


    2.  分离启动卷。


    3.  使用分离出来的卷创建新实例。


    ### 调整 Terraform 基础设施代码


    我们将调整 Terraform 基础设施代码，以将实例转移到停止状态。如果你使用的是 Linux 或 Windows Subsystem for Linux，请使用以下
    `sed` 命令来取消 `chapter06/3-instance-scale-up` 目录中 `compute.tf` 文件内当前被注释掉的代码块：


    ```

    $ pwd

    /Users/michal/git/oci-book/chapter06/3-instance-scale-up/infrastructure

    $ sed -i ''s/\/\*//; s/\*\///'' compute.tf

    ```


    如果你使用的是 macOS，请使用以下 `sed` 命令：


    ```

    $ sed -i ''.bak'' -e ''s/\/\*//; s/\*\///'' compute.tf

    ```


    这将通过移除 `compute.tf` 文件中所有的块注释标记（`/*` 和 `*/`）来取消注释代码，如清单 6-13 所示。


    ```

    resource "oci_core_instance" "vm" {

    ...

    ...

    # 1\. Stop the instance

    state = "STOPPED"

    preserve_boot_volume = true

    }

    output "vm_bootvolume_ocid" {

    value = oci_core_instance.vm.boot_volume_id

    }

    清单 6-13

    compute.tf（根模块）中需要取消注释的部分

    ```


    运行 `terraform plan`。你会看到类似这样的输出：


    ```

    $ terraform plan

    An execution plan has been generated and is shown in the following.

    Resource actions are indicated with the following symbols:

    + create

    ~ update in-place

    Terraform will perform the following actions:

    ~ oci_core_instance.vm

    preserve_boot_volume:             "" => "true"

    state:                           "RUNNING" => "STOPPED"

    ...

    Plan: 0 to add, 1 to change, 0 to destroy.

    ```


    运行 `terraform apply`。


    ```

    $ terraform apply -auto-approve

    ...

    Apply complete! Resources: 0 added, 1 changed, 0 destroyed.

    Outputs:

    vm_public_ip = 130.61.48.49

    image_name = CentOS-7-2019.04.15-0

    vm_bootvolume_ocid = ocid1.bootvolume.oc1....w37sra

    ```


    我们已经输出了启动卷的 OCID。现在，我们准备将该卷从实例中分离出来。为此，我们将使用 OCI CLI。


    > **注意**

    >

    > 当然，使用 OCI 控制台来分离特定的启动卷是可行的，而且非常快捷，但在本书中，我们更倾向于自动化，而不是手动与用户界面交互。


    为什么我们不能保持一致，继续仅使用 Terraform 来完成此操作呢？如果你查看每个基础设施代码文件，你会发现没有任何资源代表随实例一起创建的启动卷。在配置时，实例及其启动卷的生命周期并未分离。因此，我们不能仅靠
    Terraform。这是需要结合声明式基础设施代码（`Terraform`）方法和命令式编程技术（`CLI`）才能完成任务的情况之一。要从实例分离启动卷，请遵循以下步骤：


    ```

    $ BOOTVOLUME_OCID=`terraform output "vm_bootvolume_ocid"`

    $ echo $BOOTVOLUME_OCID

    ocid1.bootvolume.oc1....w37sra

    $ BOOTVOLUME_AD=`oci bv boot-volume get --boot-volume-id $BOOTVOLUME_OCID --query
    ''data."availability-domain"'' --profile SANDBOX-ADMIN | sed ''s/["]//g''`

    $ echo $BOOTVOLUME_AD

    feDV:EU-FRANKFURT-1-AD-1

    $ BOOTVOLUME_ATTACHMENT_OCID=`oci compute boot-volume-attachment list --availability-domain
    $BOOTVOLUME_AD --boot-volume-id $BOOTVOLUME_OCID --query ''data[0].id'' --profile
    SANDBOX-ADMIN | sed ''s/["]//g''`

    $ echo $BOOTVOLUME_ATTACHMENT_OCID

    ocid1.instance.oc1....gnzzyq

    $ oci compute boot-volume-attachment detach --boot-volume-attachment-id $BOOTVOLUME_ATTACHMENT_OCID
    --wait-for-state DETACHED --force --profile SANDBOX-ADMIN

    Action completed. Waiting until the resource has entered state: DETACHED

    ```


    我们首先使用 `terraform output` 命令将包含启动卷 OCID 的输出之一保存到一个变量中。在下一步中，我们使用 `oci bv boot-volume
    get` CLI 命令来提取实例和卷所在可用性域的名称。随后，我们使用 `oci compute boot-volume-attachment list`
    CLI 命令来获取启动卷连接的名称。在撰写本文时，启动卷连接的 OCID 与实例的 OCID 相同，但为了避免未来可能出现的变化带来问题，我们遵循了最可靠的流程来获取连接的
    OCID。最后，我们执行了 `oci compute boot-volume-attachment detach` CLI 命令来触发分离卷的异步作业。我们应用了
    `--wait-for-state DETACHED` 选项来保持步骤的阻塞性，从而使其实际上是同步的。另外，我们使用了 `--force` 选项来跳过确认提示。如果你决定将这些步骤与基于
    `Terraform` 的步骤一起自动化为一个“垂直扩展”流水线，你会发现这两个选项都非常有用。总而言之，这几条命令最终将导致启动卷的分离操作，如图 6-37
    所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig37_HTML.jpg](img/478313_1_En_6_Fig37_HTML.jpg)


    *图 6-37 观察分离过程中的启动卷*


    ### 在 OCI 控制台中查看启动卷


    你需要执行以下操作：


    1.  转到 菜单 ➤ 计算 ➤ 启动卷。


    2.  确保已选择 `Sandbox` 隔区。


    尽管卷已被分离，但它仍然显示为存在。如图 6-38 所示。这正是我们的目标。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig38_HTML.jpg](img/478313_1_En_6_Fig38_HTML.jpg)


    *图 6-38 在 OCI 控制台中查看启动卷*


    如果你打开启动卷详细视图，并在资源菜单中选择“已连接的实例”，你将看到不再有任何计算实例连接到该卷。同时，我们之前与启动卷一起启动的原始实例会报告启动卷确实已分离，如图
    6-39 所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig39_HTML.jpg](img/478313_1_En_6_Fig39_HTML.jpg)


    *图 6-39 查看已分离的启动卷*


    现在我们准备好终止旧实例，并使用刚刚从旧实例分离出来的启动卷启动一个更强大的新计算实例。新实例必须在同一个可用性域中启动。


    > **警告**

    >

    > 你必须小心，不要使用 `cloud-init` 重新初始化新实例。否则，你可能会损坏使用现有启动卷配置的这个新实例上的应用状态。在我们的情况下，连接到现有启动卷的更强大的新实例将完全不使用任何
    `cloud-config`。'
- fmt: "For provisioning, we will use declarative approach with Terraform. Before\
    \ executing `terraform apply`, you have to do the following:\n\n1.  Comment the\
    \ contents or simply remove the entire `compute.tf` file to terminate the older\
    \ instance that was stopped a few moments ago.\n2.  Uncomment the contents of\
    \ the `compute-ocpu2.tf` file (by removing the `/*` clause at the beginning of\
    \ the file and the `*/` clause at the end of the file). This will provision the\
    \ new instance.\n\nThese two tasks are easy to script. To perform them on Linux\
    \ or Windows Subsystem for Linux, execute the following code:\n\n```\n$ rm compute.tf\n\
    $ sed -i 's/\\/\\*//; s/\\*\\///' compute-ocpu2.tf\n```\n\nIf you are on macOS,\
    \ you need to use the `sed` command in a slightly different way.\n\n```\n$ rm\
    \ compute.tf\n$ sed -i '.bak' -e 's/\\/\\*//; s/\\*\\///' compute-ocpu2.tf\n```\n\
    \nListing [6-14](#478313_1_En_6_Chapter.xhtml#PC39) presents the infrastructure\
    \ code for the new, more powerful instance. It is similar to the code used for\
    \ the old instance, yet there are a few considerable differences.\n\n*   The shape\
    \ (`VM.Standard2.2` instead of `VM.Standard2.1`).\n*   The source type is set\
    \ to `bootVolume`, and the OCID of the existing boot volume is supplied through\
    \ a Terraform variable.\n*   There is no user data, and therefore no additional\
    \ initialization on first boot with cloud-init is done for the new instance, so\
    \ as not to alter what is present in the boot volume.\n*   The display name (`vm-2-OCPU`\
    \ instead of `vm-1-OCPU`).\n\n```\nvariable \"vm_2_ocpu_bootvolume_ocid\" { }\n\
    \n# 2. Add the new instance\nresource \"oci_core_instance\" \"vm_2_ocpu\" {\n\
    \  compartment_id      = var.compartment_ocid\n  display_name        = \"vm-2-OCPU\"\
    \n  availability_domain = data.oci_identity_availability_domains.ads.availability_domains[0].name\n\
    \  source_details {\n    source_id   = var.vm_2_ocpu_bootvolume_ocid\n    source_type\
    \ = \"bootVolume\"\n  }\n  shape = \"VM.Standard2.2\"\n  create_vnic_details {\n\
    \    subnet_id        = oci_core_subnet.net.id\n    assign_public_ip = true\n\
    \  }\n  metadata = {\n    ssh_authorized_keys = file(\"~/.ssh/oci_id_rsa.pub\"\
    )\n  }\n}\n\noutput \"new_vm_public_ip\" { value = oci_core_instance.vm_2_ocpu.public_ip\
    \ }\nListing 6-14\ncompute-2-ocpu.tf (Root Module)\n```\n\nHere are the steps\
    \ to apply the new infrastructure code. Please note that we are using the previous\
    \ Terraform output captured as `the BOOTVOLUME_OCID` variable and using it to\
    \ set and export (!) a new environment variable (`TF_VAR_vm_2_ocpu_bootvolume_ocid`)\
    \ and, in this way, pass the OCID of the existing boot volume to Terraform.\n\n\
    ```\n$ echo $BOOTVOLUME_OCID\nocid1.bootvolume.oc1....w37sra\n$ export TF_VAR_vm_2_ocpu_bootvolume_ocid=$BOOTVOLUME_OCID\n\
    $ echo $TF_VAR_vm_2_ocpu_bootvolume_ocid\nocid1.bootvolume.oc1....w37sra\n$ terraform\
    \ plan\nAn execution plan has been generated and is shown in the following.\n\
    Resource actions are indicated with the following symbols:\n  + create\n  - destroy\n\
    Terraform will perform the following actions:\n  - oci_core_instance.vm\n  + oci_core_instance.vm_2_ocpu\n\
    \  ...\n  availability_domain:           \"feDV:EU-FRANKFURT-1-AD-1\"\n  ...\n\
    \  source_details.#:              \"1\"\n  source_details.0.source_id:    \"ocid1.bootvolume.oc1....w37sra\"\
    \n  source_details.0.source_type:  \"bootVolume\"\n  ...\nPlan: 1 to add, 0 to\
    \ change, 1 to destroy.\n```\n\nAs long as the plan reports that the old instance\
    \ will be destroyed and the new one built using an existing boot volume, we are\
    \ ready to go.\n\n```\n$ terraform apply -auto-approve\n...\nApply complete! Resources:\
    \ 1 added, 0 changed, 1 destroyed.\n\nOutputs:\nnew_vm_public_ip = 130.61.90.54\n\
    image_name = CentOS-7-2019.04.15-0\n$ NEW_INSTANCE_PUBLIC_IP=`terraform output\
    \ new_vm_public_ip`\n```\n\nTip\n\nDo not worry, if the `terraform apply` command\
    \ produces the *Service Error: Conflict*. In such a case, the old instance has\
    \ not been deleted before the creation of the new instance. This leads to the\
    \ situation in which the boot volume, even though detached, is still seen as assigned\
    \ to the old instance. To continue, just run the `terraform apply -auto-approve`\
    \ command again.\n\nIf you follow the intermediary Terraform output, you will\
    \ actually spot that the creation of the newer instance will effectively begin\
    \ after the destruction of the older instance, as shown in Figure [6-40](#478313_1_En_6_Chapter.xhtml#Fig40).\
    \ This is happening because the boot volume, even though detached, is still registered\
    \ by the older instance. As long as the Terraform timeout for the create operation\
    \ is set large enough, you should experience no problems.\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig40_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig40_HTML.jpg)\n\
    *Figure 6-40. Viewing the provisioning of a new scaled-up instance*\n\nAs soon\
    \ as the new instance is ready and a few moments to start the ssh daemon have\
    \ passed, feel free to connect to the instance and see whether the file written\
    \ on the initial boot of the first instance survived the reattachment of the boot\
    \ volume.\n\n```\n$ ssh -i .ssh/oci_id_rsa opc@$NEW_INSTANCE_PUBLIC_IP\n[opc@vm-2-ocpu\
    \ ~]$ cat datemarker\nSat Apr 27 17:01:34 GMT 2019\n[opc@vm-2-ocpu ~]$ exit\n\
    ```\n\nPerfect. The fact that the file exists and the contents match what we checked\
    \ earlier is proof that the boot volume has indeed survived the reattachment and\
    \ effectively the scale-up operation.\n\nThe new instance comes with a doubled\
    \ number of vCPUs, while our CPU utilization stress testing service parameters\
    \ remain unchanged. As a result, we expect that this time instead of 60 percent\
    \ of CPU utilization we see something around 30 percent of CPU utilization. Let’s\
    \ verify this. Go to the Metrics view of the new instance.\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig41_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig41_HTML.jpg)\n\
    *Figure 6-41. Viewing an instance’s (two-OCPU) CPU utilization*\n\nAfter a couple\
    \ of minutes, you should indeed see the CPU utilization stable around 30 percent.\
    \ This proves that our scale-up operation has been successful. We have managed\
    \ to reuse the same boot volume on a more powerful compute instance. If you automate\
    \ the steps described in this section, you will see that the logic is rather simple\
    \ here.\n\nOne more thing, if you look at the name of the boot volume, as shown\
    \ in Figure [6-42](#478313_1_En_6_Chapter.xhtml#Fig42), and compare it with the\
    \ name of the new instance, you will see that the name of the boot volume is the\
    \ same as the name of the older instance that has been terminated. Having the\
    \ `vm-1-OCPU` boot volume attached to the `vm-2-OCPU` instance looks a bit odd,\
    \ doesn’t it?\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig42_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig42_HTML.jpg)\n\
    *Figure 6-42. Viewing the old name of the boot volume*\n\nLuckily, it is easy\
    \ to rename the display name of a boot volume with no impact on data or instance\
    \ downtime. All in all, the display name is just the metadata, isn’t it? To rename\
    \ a boot volume, you can use the `oci bv boot-volume update` CLI command with\
    \ the `--display-name` option to set the new name like this:\n\n```\n$ oci bv\
    \ boot-volume update --boot-volume-id $BOOTVOLUME_OCID --display-name vm-bv --profile\
    \ SANDBOX-ADMIN\n```\n\nAt this stage, this exercise is completed. Please use\
    \ the `terraform destroy` command to free up the resources and stop the billing.\n\
    \n```\n$ terraform destroy -auto-approve\n```\n\nThe boot volume will be terminated\
    \ with the new instance, as shown in Figure [6-43](#478313_1_En_6_Chapter.xhtml#Fig43).\n\
    \n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig43_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig43_HTML.jpg)\n\
    *Figure 6-43. Viewing the terminated boot volume*"
  raw: 'For provisioning, we will use declarative approach with Terraform. Before
    executing `terraform apply`, you have to do the following:


    1.  Comment the contents or simply remove the entire `compute.tf` file to terminate
    the older instance that was stopped a few moments ago.


    2.  Uncomment the contents of the `compute-ocpu2.tf` file (by removing the `/*`
    clause at the beginning of the file and the `*/` clause at the end of the file).
    This will provision the new instance.


    These two tasks are easy to script. To perform them on Linux or Windows Subsystem
    for Linux, execute the following code:


    ```

    $ rm compute.tf

    $ sed -i ''s/\/\*//; s/\*\///'' compute-ocpu2.tf

    ```


    If you are on macOS, you need to use the `sed` command in a slightly different
    way.


    ```

    $ rm compute.tf

    $ sed -i ''.bak'' -e ''s/\/\*//; s/\*\///'' compute-ocpu2.tf

    ```


    Listing [6-14](#478313_1_En_6_Chapter.xhtml#PC39) presents the infrastructure
    code for the new, more powerful instance. It is similar to the code used for the
    old instance, yet there are a few considerable differences.


    *   The shape (VM.Standard2.2 instead of VM.Standard2.1).


    *   The source type is set to `bootVolume`, and the OCID of the existing boot
    volume is supplied through a Terraform variable.


    *   There is no user data, and therefore no additional initialization on first
    boot with cloud-init is done for the new instance, so as not to alter what is
    present in the boot volume.


    *   The display name (vm-2-OCPU instead of vm-1-OCPU).


    ```

    variable "vm_2_ocpu_bootvolume_ocid" { }

    # 2\. Add the new instance

    resource "oci_core_instance" "vm_2_ocpu" {

    compartment_id = var.compartment_ocid

    display_name = "vm-2-OCPU"

    availability_domain = data.oci_identity_availability_domains.ads.availability_domains[0].name

    source_details {

    source_id = var.vm_2_ocpu_bootvolume_ocid

    source_type = "bootVolume"

    }

    shape = "VM.Standard2.2"

    create_vnic_details {

    subnet_id = oci_core_subnet.net.id

    assign_public_ip = true

    }

    metadata = {

    ssh_authorized_keys = file("~/.ssh/oci_id_rsa.pub")

    }

    }

    output "new_vm_public_ip" { value = oci_core_instance.vm_2_ocpu.public_ip }

    Listing 6-14

    compute-2-ocpu.tf (Root Module)

    ```


    Here are the steps to apply the new infrastructure code. Please note that we are
    using the previous Terraform output captured as `the BOOTVOLUME_OCID` variable
    and using it to set and export (!) a new environment variable (`TF_VAR_vm_2_ocpu_bootvolume_ocid`)
    and, in this way, pass the OCID of the existing boot volume to Terraform.


    ```

    $ echo $BOOTVOLUME_OCID

    ocid1.bootvolume.oc1....w37sra

    $ export TF_VAR_vm_2_ocpu_bootvolume_ocid=$BOOTVOLUME_OCID

    $ echo $TF_VAR_vm_2_ocpu_bootvolume_ocid

    ocid1.bootvolume.oc1....w37sra

    $ terraform plan

    An execution plan has been generated and is shown in the following.

    Resource actions are indicated with the following symbols:

    + create

    - destroy

    Terraform will perform the following actions:

    - oci_core_instance.vm

    + oci_core_instance.vm_2_ocpu

    ...

    availability_domain:           "feDV:EU-FRANKFURT-1-AD-1"

    ...

    source_details.#:              "1"

    source_details.0.source_id:    "ocid1.bootvolume.oc1....w37sra"

    source_details.0.source_type:  "bootVolume"

    ...

    Plan: 1 to add, 0 to change, 1 to destroy.

    ```


    As long as the plan reports that the old instance will be destroyed and the new
    one built using an existing boot volume, we are ready to go.


    ```

    $ terraform apply -auto-approve

    ...

    Apply complete! Resources: 1 added, 0 changed, 1 destroyed.

    Outputs:

    new_vm_public_ip = 130.61.90.54

    image_name = CentOS-7-2019.04.15-0

    $ NEW_INSTANCE_PUBLIC_IP=`terraform output new_vm_public_ip`

    ```


    Tip


    Do not worry, if the *terraform apply* command produces the *Service Error: Conflict*.
    In such a case, the old instance has not been deleted before the creation of the
    new instance. This leads to the situation in which the boot volume, even though
    detached, is still seen as assigned to the old instance. To continue, just run
    the *terraform apply -auto-approve* command again.


    If you follow the intermediary Terraform output, you will actually spot that the
    creation of the newer instance will effectively begin after the destruction of
    the older instance, as shown in Figure [6-40](#478313_1_En_6_Chapter.xhtml#Fig40).
    This is happening because the boot volume, even though detached, is still registered
    by the older instance. As long as the Terraform timeout for the create operation
    is set large enough, you should experience no problems.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig40_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig40_HTML.jpg)


    Figure 6-40


    Viewing the provisioning of a new scaled-up instance


    As soon as the new instance is ready and a few moments to start the ssh daemon
    have passed, feel free to connect to the instance and see whether the file written
    on the initial boot of the first instance survived the reattachment of the boot
    volume.


    ```

    $ ssh -i .ssh/oci_id_rsa opc@$NEW_INSTANCE_PUBLIC_IP

    [opc@vm-2-ocpu ~]$ cat datemarker

    Sat Apr 27 17:01:34 GMT 2019

    [opc@vm-2-ocpu ~]$ exit

    ```


    Perfect. The fact that the file exists and the contents match what we checked
    earlier is proof that the boot volume has indeed survived the reattachment and
    effectively the scale-up operation.


    The new instance comes with a doubled number of vCPUs, while our CPU utilization
    stress testing service parameters remain unchanged. As a result, we expect that
    this time instead of 60 percent of CPU utilization we see something around 30
    percent of CPU utilization. Let’s verify this. Go to the Metrics view of the new
    instance.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig41_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig41_HTML.jpg)


    Figure 6-41


    Viewing an instance’s (two-OCPU) CPU utilization


    After a couple of minutes, you should indeed see the CPU utilization stable around
    30 percent. This proves that our scale-up operation has been successful. We have
    managed to reuse the same boot volume on a more powerful compute instance. If
    you automate the steps described in this section, you will see that the logic
    is rather simple here.


    One more thing, if you look at the name of the boot volume, as shown in Figure
    [6-42](#478313_1_En_6_Chapter.xhtml#Fig42), and compare it with the name of the
    new instance, you will see that the name of the boot volume is the same as the
    name of the older instance that has been terminated. Having the `vm-1-OCPU` boot
    volume attached to the `vm-2-OCPU` instance looks a bit odd, doesn’t it?


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig42_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig42_HTML.jpg)


    Figure 6-42


    Viewing the old name of the boot volume


    Luckily, it is easy to rename the display name of a boot volume with no impact
    on data or instance downtime. All in all, the display name is just the metadata,
    isn’t it? To rename a boot volume, you can use the `oci bv boot-volume update`
    CLI command with the `--display-name` option to set the new name like this:


    ```

    $ oci bv boot-volume update --boot-volume-id $BOOTVOLUME_OCID --display-name vm-bv
    --profile SANDBOX-ADMIN

    ```


    At this stage, this exercise is completed. Please use the `terraform destroy`
    command to free up the resources and stop the billing.


    ```

    $ terraform destroy -auto-approve

    ```


    The boot volume will be terminated with the new instance, as shown in Figure [6-43](#478313_1_En_6_Chapter.xhtml#Fig43).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig43_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig43_HTML.jpg)


    Figure 6-43


    Viewing the terminated boot volume'
  trans: "\n在进行资源调配时，我们将采用 Terraform 的声明式方法。执行`terraform apply`之前，您需要完成以下操作：\n\n1.\
    \  注释掉内容或直接删除整个`compute.tf`文件，以终止刚才停止的旧实例。\n2.  取消注释`compute-ocpu2.tf`文件的内容（通过删除文件开头的`/*`注释符和文件结尾的`*/`注释符）。这将调配新实例。\n\
    \n这两个任务很容易编写成脚本。要在 Linux 或 Windows Subsystem for Linux 上执行它们，请运行以下代码：\n\n```\n\
    $ rm compute.tf\n$ sed -i 's/\\/\\*//; s/\\*\\///' compute-ocpu2.tf\n```\n\n如果您使用的是\
    \ macOS，则需要以稍微不同的方式使用`sed`命令。\n\n```\n$ rm compute.tf\n$ sed -i '.bak' -e 's/\\\
    /\\*//; s/\\*\\///' compute-ocpu2.tf\n```\n\n清单 6-14 展示了新的、更强大实例的基础设施代码。它与用于旧实例的代码相似，但存在一些显著差异。\n\
    \n*   实例规格（使用 `VM.Standard2.2` 而非 `VM.Standard2.1`）。\n*   源类型设置为 `bootVolume`，并通过\
    \ Terraform 变量提供现有引导卷的 OCID。\n*   没有用户数据，因此新实例首次启动时不会通过 cloud-init 执行任何额外初始化，以避免更改引导卷中的现有内容。\n\
    *   显示名称（使用 `vm-2-OCPU` 而非 `vm-1-OCPU`）。\n\n```\nvariable \"vm_2_ocpu_bootvolume_ocid\"\
    \ { }\n\n# 2. 添加新实例\nresource \"oci_core_instance\" \"vm_2_ocpu\" {\n  compartment_id\
    \      = var.compartment_ocid\n  display_name        = \"vm-2-OCPU\"\n  availability_domain\
    \ = data.oci_identity_availability_domains.ads.availability_domains[0].name\n\
    \  source_details {\n    source_id   = var.vm_2_ocpu_bootvolume_ocid\n    source_type\
    \ = \"bootVolume\"\n  }\n  shape = \"VM.Standard2.2\"\n  create_vnic_details {\n\
    \    subnet_id        = oci_core_subnet.net.id\n    assign_public_ip = true\n\
    \  }\n  metadata = {\n    ssh_authorized_keys = file(\"~/.ssh/oci_id_rsa.pub\"\
    )\n  }\n}\n\noutput \"new_vm_public_ip\" { value = oci_core_instance.vm_2_ocpu.public_ip\
    \ }\n清单 6-14\ncompute-2-ocpu.tf (根模块)\n```\n\n以下是应用新基础设施代码的步骤。请注意，我们使用之前捕获为 `BOOTVOLUME_OCID`\
    \ 变量的 Terraform 输出，通过设置并导出（!）一个新的环境变量（`TF_VAR_vm_2_ocpu_bootvolume_ocid`），以此将现有引导卷的\
    \ OCID 传递给 Terraform。\n\n```\n$ echo $BOOTVOLUME_OCID\nocid1.bootvolume.oc1....w37sra\n\
    $ export TF_VAR_vm_2_ocpu_bootvolume_ocid=$BOOTVOLUME_OCID\n$ echo $TF_VAR_vm_2_ocpu_bootvolume_ocid\n\
    ocid1.bootvolume.oc1....w37sra\n$ terraform plan\n已生成执行计划，显示如下。\n资源操作使用以下符号表示：\n\
    \  + 创建\n  - 销毁\nTerraform 将执行以下操作：\n  - oci_core_instance.vm\n  + oci_core_instance.vm_2_ocpu\n\
    \  ...\n  availability_domain:           \"feDV:EU-FRANKFURT-1-AD-1\"\n  ...\n\
    \  source_details.#:              \"1\"\n  source_details.0.source_id:    \"ocid1.bootvolume.oc1....w37sra\"\
    \n  source_details.0.source_type:  \"bootVolume\"\n  ...\n计划：1 个添加，0 个更改，1 个销毁。\n\
    ```\n\n只要计划报告旧实例将被销毁，并且新实例将使用现有引导卷构建，我们就可以继续。\n\n```\n$ terraform apply -auto-approve\n\
    ...\n应用完成！资源：1 个已添加，0 个已更改，1 个已销毁。\n\n输出：\nnew_vm_public_ip = 130.61.90.54\nimage_name\
    \ = CentOS-7-2019.04.15-0\n$ NEW_INSTANCE_PUBLIC_IP=`terraform output new_vm_public_ip`\n\
    ```\n\n提示\n\n如果 `terraform apply` 命令产生 *服务错误：冲突*，请不要担心。这种情况下，是因为在创建新实例之前尚未删除旧实例。这会导致引导卷即使已分离，仍被视为分配给旧实例。要继续，只需再次运行\
    \ `terraform apply -auto-approve` 命令即可。\n\n如果您关注中间的 Terraform 输出，您会发现新实例的创建实际上是在旧实例销毁之后才开始的，如图\
    \ 6-40 所示。发生这种情况是因为引导卷即使已分离，仍被旧实例注册。只要为创建操作设置的 Terraform 超时时间足够长，您应该不会遇到问题。\n\n\
    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig40_HTML.jpg](img/478313_1_En_6_Fig40_HTML.jpg)\n\
    *图 6-40. 查看新的向上扩展实例的调配过程*\n\n一旦新实例准备就绪，并且经过几秒钟启动 ssh 守护进程后，您可以自由连接到该实例，并检查在第一个实例初始启动时写入的文件是否在引导卷重新挂载后仍然存在。\n\
    \n```\n$ ssh -i .ssh/oci_id_rsa opc@$NEW_INSTANCE_PUBLIC_IP\n[opc@vm-2-ocpu ~]$\
    \ cat datemarker\nSat Apr 27 17:01:34 GMT 2019\n[opc@vm-2-ocpu ~]$ exit\n```\n\
    \n很好。文件存在且内容与我们之前检查的一致，这一事实证明引导卷确实经受住了重新挂载，也就是说向上扩展操作是成功的。\n\n新实例的 vCPU 数量增加了一倍，而我们的\
    \ CPU 利用率压力测试服务参数保持不变。因此，我们预计这次看到的不是 60%的 CPU 利用率，而是 30%左右的 CPU 利用率。让我们来验证一下。转到新实例的“指标”视图。\n\
    \n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig41_HTML.jpg](img/478313_1_En_6_Fig41_HTML.jpg)\n\
    *图 6-41. 查看实例（双 OCPU）的 CPU 利用率*\n\n几分钟后，您应该确实会看到 CPU 利用率稳定在 30%左右。这证明我们的向上扩展操作是成功的。我们成功地在更强大的计算实例上复用了同一个引导卷。如果您将本节描述的步骤自动化，您会发现其中的逻辑相当简单。\n\
    \n还有一件事，如果您查看引导卷的名称（如图 6-42 所示），并将其与新实例的名称进行比较，您会发现引导卷的名称与已被终止的旧实例名称相同。将 `vm-1-OCPU`\
    \ 引导卷挂载到 `vm-2-OCPU` 实例上看起来有点奇怪，不是吗？\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig42_HTML.jpg](img/478313_1_En_6_Fig42_HTML.jpg)\n\
    *图 6-42. 查看引导卷的旧名称*\n\n幸运的是，重命名引导卷的显示名称很容易，且不会影响数据或导致实例停机。毕竟，显示名称只是元数据，对吧？要重命名引导卷，您可以使用带有\
    \ `--display-name` 选项的 `oci bv boot-volume update` CLI 命令来设置新名称，如下所示：\n\n```\n\
    $ oci bv boot-volume update --boot-volume-id $BOOTVOLUME_OCID --display-name vm-bv\
    \ --profile SANDBOX-ADMIN\n```\n\n至此，本练习完成。请使用 `terraform destroy` 命令释放资源并停止计费。\n\
    \n```\n$ terraform destroy -auto-approve\n```\n\n引导卷将随新实例一起被终止，如图 6-43 所示。\n\n\
    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig43_HTML.jpg](img/478313_1_En_6_Fig43_HTML.jpg)\n\
    *图 6-43. 查看已终止的引导卷*\n"
- fmt: '## Immutable Infrastructure


    The high level of API-driven automation and the rapid self-provisioning of pooled
    infrastructure resources make cloud computing the key enabler for the `immutable
    infrastructure` pattern. The word `immutable` is synonymous to words such as `unchangeable`,
    `permanent`, or `fixed`. An infrastructure that does not change must be created
    in a relatively negligible time and ready to serve its business purpose straightaway.
    The latter implies that immutable infrastructure comes together with a preinstalled
    and already initialized application layer ready to deliver services and process
    data. Sooner or later, an upgrade of selected components will be required. This
    is where the word `immutable` comes into play. In contrast to the traditional
    server- and application lifecycle, the immutable infrastructure pattern assumes
    that a new set of cloud resources is provisioned based on the upgraded images
    and enhanced initialization code, and any incoming traffic is properly redirected
    and the old infrastructure simply terminated.


    An immutable infrastructure can incorporate `autonomous intelligence` such as
    horizontal compute autoscale. The autoscale would then dynamically adapt the count
    of instances based on the metrics described earlier in this chapter. The key idea
    here is that no human intervention is needed, and because of that, the infrastructure
    can be considered immutable.


    Because of the complexity of the application landscape, data flow dependencies,
    and various service continuity requirements, it would be rather utopic to think
    that the entire cloud infrastructure for all systems can be treated as a single
    set of immutable resources. In reality, you control multiple sets of cloud resources
    that are managed independently as immutable infrastructure. Furthermore, you usually
    decide that some cloud resources, especially managed platform services, won’t
    be provisioned using this pattern. All in all, you should carefully pick a proper
    split of cloud resource groups having both of the ones that follow the immutable
    infrastructure pattern as well as the ones that rely on the traditional, dynamic,
    and long-living infrastructure lifecycle.


    I mentioned earlier that immutable infrastructure infers that hosted applications
    and systems are operational as soon as the fully automated provisioning run has
    been completed. In the course of the exercises included in this book, we extensively
    used `Terraform` with `cloud-config` files processed and executed on instance
    boot by `cloud-init`. I am a great fan of `cloud-init`, but I admit that the more
    complex application initialization logic gets, the more inefficient it is to use
    `cloud-init`. The limitations of `cloud-init` become visible especially when you
    are initializing complex clustered systems where different nodes carry diverse
    roles, such as `master` or `worker`, and require a specific initialization sequence.


    One option would be to use `Terraform provisioners` to execute scripts on remote
    cloud hosts in a particular sequence based on a predefined dependency tree. Some
    consider `Terraform provisioners` as if they were making `Terraform` infrastructure
    code no longer simple and readable. Well, `Terraform` infrastructure code is rather
    meant to be declarative. Using standard `Terraform` configurations such as `resources`,
    `data sources`, or `modules` is indeed purely declarative, which entails many
    benefits. First, you never worry about the execution steps needed to bring the
    actual state to the target state. This task is done by `Terraform`. If you are
    extending this clean declarative approach by using `provisioners`, you are adding
    the imperative nature and effectively mixing the two paradigms (declarative and
    imperative) in the same code base. In this way, the infrastructure code would
    become harder to understand and maintain.


    Another option I would recommend for really complex architectures is to implement
    the immutable infrastructure by properly combining declarative `Terraform`-based
    infrastructure code with imperative initialization logic orchestrated with `Ansible`.
    `Ansible` is an agent-less automation tool used to remotely manage compute instances.
    Its capabilities include not only system administration but also application deployment.
    Both `Terraform` and `Ansible` could be executed on the same build server and
    encapsulated as repeatable jobs within a complete `CICD` pipeline. The provisioning
    pipeline could consist of four stages, as illustrated in Figure 6-44 and understood
    as follows:


    ![Immutable architecture with Terraform and Ansible](images/478313_1_En_6_Chapter/478313_1_En_6_Fig44_HTML.jpg)


    Figure 6-44


    Immutable architecture with Terraform and Ansible


    1.  The cloud infrastructure is created based on the declared target infrastructure
    defined using `Terraform` configuration files.

    2.  Preinstalled applications and libraries can be shipped already included in
    the custom images used to launch instances.

    3.  Some initial operating system and application initialization logic is executed
    by `cloud-init` based on the supplied `cloud-config` user data.

    4.  More distributed and interdependent initialization tasks are finally performed
    through a set of `Ansible`-based `playbooks`.


    ## Summary


    The main goal of this chapter was to familiarize you with some of the core cloud
    infrastructure patterns you will encounter while designing cloud-based solutions
    or migrating existing systems to the cloud. We began with discussing virtual networking
    by looking at `VCNs`, regional and `AD`-specific subnets, `VNICs`, and private
    `IPs`. Two types of public `IPs`, `ephemeral` and `reserved`, were subsequently
    covered in the context of Internet-facing instances. Next, we glanced over the
    `bastion host` and `NAT gateway` pattern applied to provide secure Internet connectivity
    to isolated instances attached to private subnets. You used `Terraform` to provision
    the corresponding infrastructure and see this pattern in action. We briefly looked
    at routing and spent some more time clarifying the differences between `stateful`
    and `stateless` security rules. You learned how to use local `VCN peering` to
    interconnect different `VCNs` in the same region. A dedicated network compartment
    pattern was given as an alternative to `VCN peering`, especially in the context
    of more complicated architectures. A large part of this chapter was devoted to
    elasticity delivered with horizontal and vertical instance scaling. You used `instance
    pools`, `instance configurations`, and `autoscale configurations` to experiment
    with horizontal scaling. You learned how to scale an instance vertically up by
    moving to a more powerful compute shape, while at the same time reusing the existing
    boot volume that had been created while booting the original instance. Finally,
    you read about immutable infrastructure and were briefly introduced to the tools
    you can use to implement a provisioning pipeline.


    ## 7. Autonomous Database


    Storing data can be challenging. There are many aspects to consider. In this chapter,
    we are going to explore one of the flagships of Oracle Cloud, a fully managed
    Oracle database available as a platform as a service in Oracle Cloud.'
