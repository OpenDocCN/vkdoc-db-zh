    \ OK.\n\nIf needed, you can check the state of each individual backend, as shown\
    \ in Figure [2-57](#478313_1_En_2_Chapter.xhtml#Fig57). To do so, follow these\
    \ steps:\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig57_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig57_HTML.jpg)\n\
    \nFigure 2-57\n\nViewing backend health flags in the OCI Console\n\n1.  Go to\
    \ Menu ➤ Networking ➤ Load Balancers.\n\n2.  Click the name of your load balancer.\n\
    \n3.  In the Resources section, click Backend Sets.\n\n4.  Click the name of the\
    \ backend set.\n\n5.  In the Resources section, click Backends.\n\nIf you should\
    \ find one of the backends in a Critical state, follow this checklist to troubleshoot\
    \ the issue:\n\n*   The target compute node is running.\n\n*   The UUID Service\
    \ systemd service is started.\n\n*   The operating system firewall accepts connections\
    \ on port 5000.\n\n*   There is an ingress stateful rule in the default security\
    \ list that allows the incoming traffic to port 5000.\n\n*   The rules in the\
    \ load balancer’s subnet security list are correct.\n\n*   The load balancer set\
    \ backends are properly defined.\n\n*   The load balancer backend set health check\
    \ configuration is correct.\n\nAll in all, after a while, you will be able to\
    \ perform the final test for this chapter. To do so, you need to identify the\
    \ public IP address your load balancer has been given from the Oracle Cloud address\
    \ pool. In my case, it is 132.145.240.240\\. When you send a few requests to the\
    \ `/identifiers` resource on port 80 of your load balancer, they will be evenly\
    \ routed in a round-robin manner to the first (`uuid-1`) and second (`uuid-2`)\
    \ instances of the UUID service API. Every time you send a request to your load\
    \ balancer, it is interchangeably served by one of the two UUID service instances,\
    \ as proven by the `generator` JSON element in each response.\n\n```\n$ LB_INSTANCE=132.145.240.101\n\
    $ curl $LB_INSTANCE:80/identifiers\n{\n\"generator\":\"uuid1\",\n\"uuid\":\"709f6aac-0720-461a-9fd3-732748253bca\"\
    \n}\n$ curl $LB_INSTANCE:80/identifiers\n{\n\"generator\":\"uuid2\",\n\"uuid\"\
    :\"cfe329bd-cd2c-49a6-ae4f-29f23bf5d2fe\"\n}\n$ curl $LB_INSTANCE:80/identifiers\n\
    {\n\"generator\":\"uuid1\",\n\"uuid\":\"e22b5858-e70f-46ab-bd16-0da3d55aca73\"\
    \n}\n$ curl $LB_INSTANCE:80/identifiers\n{\n\"generator\":\"uuid2\",\n\"uuid\"\
    :\"1c9662d9-1426-4e2d-bae3-bd4207dbd73b\"\n}\n```\n\nWe have completed the exercise.\
    \ Before we move on, let’s terminate the cloud resources. You can now terminate\
    \ all resources you’ve created in this chapter, excluding the learning compartment\
    \ that we are going to use in the next chapters.\n\n## Cleanup\n\nTo avoid unnecessary\
    \ costs or trial credit consumption, no matter how low they are, let’s terminate\
    \ the resources we’ve created in this chapter. Some resources depend on other\
    \ resources; therefore, it is important to stick to the required sequence when\
    \ you delete them. This won’t be a problem in future chapters because in many\
    \ cases the automation will do it for us in one shot. In this chapter, however,\
    \ we are doing everything manually in the OCI Console, so we have to follow these\
    \ steps:\n\n1.  Go to Menu ➤ Networking ➤ Load Balancers.\n\n2.  Make sure that\
    \ the `Sandbox` compartment is selected.\n\n3.  Click the three-dot menu, click\
    \ Terminate, and wait until the resource is removed.\n\nFigure [2-58](#478313_1_En_2_Chapter.xhtml#Fig58)\
    \ shows how to terminate a load balancer.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig58_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig58_HTML.jpg)\n\
    \nFigure 2-58\n\nTerminating a load balancer in the OCI Console\n\nNow, in a similar\
    \ way, use the OCI Console to terminate (or delete) the remaining resources.\n\
    \n*   Both compute instances (Menu ➤ Compute ➤ Instances)\n\n*   Custom image\
    \ (Menu ➤ Compute ➤ Custom Images)\n\n*   VCN with associated networking resources\n\
    \n    **Tip** When you terminate a compute instance, make sure you permanently\
    \ delete the boot volume. If you forget to do so, you can always delete an abandoned\
    \ boot volume later in Compute ➤ Boot Volumes.\n\nThis concludes the exercise\
    \ in this chapter.\n\n## Summary\n\nIn this chapter, I drove you through the process\
    \ of planning and running a simple cloud application on Oracle Cloud Infrastructure.\
    \ First, we spent some time analyzing the application design and outlining the\
    \ required cloud infrastructure resources. Subsequently, we used the OCI Console\
    \ to provision each cloud resource step by step. The application itself was built\
    \ and run on the instance by using cloud-init-powered automation. Next, we scaled\
    \ the application out and added a public load balancer to evenly distribute the\
    \ load to two compute nodes that host the application. At the end, I showed you\
    \ how to perform a cleanup and remove the resources.\n\nYou may get the impression\
    \ that the exercise in this chapter consisted of an enormous number of manual\
    \ steps. Well, I warned you that I wanted to show you the manual way and teach\
    \ you how to handle the OCI Console. The next chapter will introduce the OCI CLI\
    \ and Terraform automation, and you will experience how to manage your cloud infrastructure\
    \ as code faster. Read on."
  trans: '

    ![图 2-55: OCI 控制台负载均衡器向导中的“配置监听器”步骤](img/478313_1_En_2_Fig55_HTML.jpg)


    Oracle Cloud Infrastructure 现在将预置一个新的公共负载均衡器，并从 Oracle Cloud 地址池中分配一个公共 IP 地址。我们必须等待预置操作完成，才能看到类似图
    2-56 的内容。


    ![图 2-56: 在 OCI 控制台中查看负载均衡器信息](img/478313_1_En_2_Fig56_HTML.jpg)


    我们定义的健康检查配置负责监控和检测所有已注册的负载均衡后端是否按预期运行。`UUID` 服务已作为一个简单的 `REST API` 实现。`REST API`
    利用 `HTTP` 标准方法，通过 API 管理的资源提供 `CRUD` 操作。这就是为什么执行 `REST API` 健康检查最自然的方式是使用 `HTTP
    GET` 来测试其某个资源。我们刚刚配置的健康检查策略，将每 10 秒向每个后端服务器发送一个 `HTTP GET /identifiers` 请求。如果它在三秒内没有收到
    `HTTP 200 OK` 响应，它将重试两次，并将该节点标记为不可用。负载均衡器预置后，可能需要片刻时间才能确认后端运行状况良好。


    > **提示**

    > 如果您观察到 `Unknown` 状态持续较长时间，请不要担心，继续测试负载均衡器。在某些情况下，负载均衡器启动后，可能需要几分钟时间才能从 `Unknown`
    状态转变为 `OK` 状态。


    如果需要，您可以检查每个后端的状态，如图 2-57 所示。操作步骤如下：


    ![图 2-57: 在 OCI 控制台中查看后端运行状况标志](img/478313_1_En_2_Fig57_HTML.jpg)


    1.  转到菜单 ➤ 网络 ➤ 负载均衡器。

    2.  点击您的负载均衡器名称。

    3.  在“资源”部分，点击“后端集”。

    4.  点击后端集的名称。

    5.  在“资源”部分，点击“后端”。


    如果您发现某个后端处于 `Critical` 状态，请按照此检查清单进行故障排除：


    *   目标计算节点正在运行。

    *   `UUID Service systemd service` 已启动。

    *   操作系统防火墙接受端口 `5000` 上的连接。

    *   默认安全列表中存在允许传入流量访问端口 `5000` 的入站有状态规则。

    *   负载均衡器子网安全列表中的规则是正确的。

    *   负载均衡器设置的后端定义正确。

    *   负载均衡器后端集健康检查配置正确。


    总而言之，过一会儿，您将能够执行本章的最终测试。为此，您需要识别您的负载均衡器从 Oracle Cloud 地址池获得的公共 IP 地址。在我的例子中，它是
    `132.145.240.240`。当您向负载均衡器端口 `80` 上的 `/identifiers` 资源发送一些请求时，它们将以轮询方式均匀路由到 `UUID`
    服务 `API` 的第一个 (`uuid-1`) 和第二个 (`uuid-2`) 实例。每次向负载均衡器发送请求时，它都会由两个 `UUID` 服务实例之一交替提供服务，如每个响应中的
    `generator` JSON 元素所示。


    ```bash

    $ LB_INSTANCE=132.145.240.101

    $ curl $LB_INSTANCE:80/identifiers

    {

    "generator":"uuid1",

    "uuid":"709f6aac-0720-461a-9fd3-732748253bca"

    }

    $ curl $LB_INSTANCE:80/identifiers

    {

    "generator":"uuid2",

    "uuid":"cfe329bd-cd2c-49a6-ae4f-29f23bf5d2fe"

    }

    $ curl $LB_INSTANCE:80/identifiers

    {

    "generator":"uuid1",

    "uuid":"e22b5858-e70f-46ab-bd16-0da3d55aca73"

    }

    $ curl $LB_INSTANCE:80/identifiers

    {

    "generator":"uuid2",

    "uuid":"1c9662d9-1426-4e2d-bae3-bd4207dbd73b"

    }

    ```


    我们已经完成了练习。在继续之前，让我们终止云资源。您现在可以终止本章中创建的所有资源，但我们将要在下一章中使用的学习 compartment 除外。


    ## 清理


    为避免不必要的成本或试用额度的消耗，无论它们多么低廉，让我们终止本章创建的资源。某些资源依赖于其他资源；因此，在删除时遵循所需的顺序很重要。在后续章节中这不会成为问题，因为在许多情况下，自动化将一次性为我们完成操作。然而，在本章中，我们在
    `OCI Console` 中手动完成所有操作，因此必须遵循以下步骤：


    1.  转到菜单 ➤ 网络 ➤ 负载均衡器。

    2.  确保选择了 `Sandbox` compartment。

    3.  点击三点菜单，点击“终止”，并等待资源被移除。


    图 2-58 展示了如何终止负载均衡器。


    ![图 2-58: 在 OCI 控制台中终止负载均衡器](img/478313_1_En_2_Fig58_HTML.jpg)


    现在，以类似的方式，使用 `OCI Console` 终止（或删除）剩余的资源。


    *   两个计算实例（菜单 ➤ 计算 ➤ 实例）

    *   自定义镜像（菜单 ➤ 计算 ➤ 自定义镜像）

    *   `VCN` 及关联的网络资源


    > **提示** 当您终止计算实例时，请确保永久删除其启动卷。如果您忘记了这样做，以后可以在 计算 ➤ 启动卷 中删除被遗弃的启动卷。


    本章的练习到此结束。


    ## 总结


    在本章中，我引导您完成了在 Oracle Cloud Infrastructure 上规划和运行一个简单云应用程序的过程。首先，我们花了一些时间分析应用程序设计，并勾勒出所需的云基础设施资源。随后，我们使用
    `OCI Console` 逐步预置了每个云资源。应用程序本身通过使用 `cloud-init` 驱动的自动化在实例上构建和运行。接下来，我们将应用程序横向扩展，并添加了一个公共负载均衡器，以将负载均匀分配到承载该应用程序的两个计算节点上。最后，我向您展示了如何执行清理并移除资源。


    您可能觉得本章的练习包含了数量庞大的手动步骤。嗯，我警告过您，我想向您展示手动方式，并教您如何操作 `OCI Console`。下一章将介绍 `OCI CLI`
    和 `Terraform` 自动化，您将体验如何以代码形式更快地管理您的云基础设施。请继续阅读。

    '
- fmt: '# 3. Automating Cloud Infrastructure


    Cloud computing cannot exist without *automation*. The entire concept of the rapid
    self-provisioning of pooled cloud resources (compute instances, storage, virtual
    networking, and many others) is built on an assumption that the whole provisioning
    process, from the beginning to the end, is fully automated. Simply because there
    are no manual steps involved, it is possible to represent the complete cloud infrastructure
    in the form of scripts and templates that are used to remotely manage cloud resources.
    Figure [3-1](#478313_1_En_3_Chapter.xhtml#Fig1) shows a mind map of a few related
    operational characteristics that are enabled through the automation.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig1_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    `Scripts and templates` can be treated as source code and stored in a version
    control system like `Git`. This boosts team collaboration as well as leads to
    faster delivery of enhancements and, as a consequence, problem resolution. New
    team members can furthermore understand the infrastructure just by reading the
    code that is always up-to-date, in contrast to the traditional documentation that
    can, as time goes by, easily skew from the real state. You prepare the scripts
    and templates, which, during execution, interact with the so-called cloud management
    plane through the interfaces covered in the next section. The cloud management
    plane provisioning engine is already automated by your cloud provider. It is responsible
    for creating, updating, and deleting the resources in the cloud. Again, there
    are absolutely no manual steps throughout the entire process. Everything considered
    together leads to the shortest provisioning time possible, repeatability, and
    self-service.


    You can and actually should go beyond automating the cloud infrastructure management
    only. Cloud infrastructure is part of and, at the same time, a prerequisite for
    your cloud-based solutions. You indeed run business or platform software on cloud
    infrastructure. It makes therefore more sense to automate the entire solution
    delivery process. Imagine your developer checks in an application code change
    that effectively adds a new service. The service listens on a port that hasn’t
    been used until now. The same commit can include an infrastructure script or template
    change that would add a new security list to allow the inbound traffic on that
    port. The new code revision is detected by the build server that creates the new
    security rule and reprovisions one or more virtual machines or containers that
    host the service in the test environment. Finally, the integration and regression
    tests are executed to assess the quality of the change. In this way, a simple
    code change can produce a tested deployment running in the cloud. This is called
    *continuous delivery*. The process does not need to end with the test environment.
    Some use cases would benefit from releasing a limited number of service instances
    in the newest version, known as a *canary release*, straight to the production
    environment to evaluate their behavior under real-world conditions.


    Automation is the key enabler for continuous delivery that can become an important
    part of the *DevOps culture* in your organization. What does it mean, and what
    are its benefits? Looking only at the name, the Dev part comes from the word *development*,
    and the Ops part comes from the word *operations*. In the traditional model, developers
    handled deliverables to the operations team whose members prepared the configuration
    and deployed the artifacts to particular environments. This cascade often led
    to misunderstandings and errors, causing the delivery process to be longer than
    it should be. DevOps breaks this approach and blends both roles. Processes related
    to the field of traditional operations are now fully automated and often triggered
    already by the actions done by application developers. In a popular understanding,
    a person who holds a DevOps role is responsible for building and maintaining the
    aforementioned automation. Repeatability, which is a result of thorough automation,
    decreases the risk of errors previously related to manual actions. Moreover, the
    time saved by automating the recurring manual tasks can be used to enhance the
    insights into running systems and provide better governance over the entire application
    landscape. The term *DevOps culture* is actually broader and goes far beyond the
    scope of this book.


    ## Cloud Management Plane


    To fulfill its duties, the cloud platform provides a set of secure interfaces
    you can interact with to control your cloud assets. These interfaces, referenced
    also as `APIs`, are your gateway to the *cloud management plane*, which is the
    engine that delivers cloud resources based on physical and virtual equipment in
    data centers. Clients send requests to `API` endpoints to remotely execute various
    operations in the cloud.


    You need to remember that the cloud is by definition multitenant. Because manifold
    users interact with the same set of interface endpoints, the engine is not only
    responsible for managing and monitoring the cloud assets but also has to make
    sure that the resources used by different tenants (cloud accounts) are properly
    isolated. Moreover, the `API` is also responsible for protecting cloud assets
    from unauthorized access. This idea is conceptually presented in Figure [3-2](#478313_1_En_3_Chapter.xhtml#Fig2).


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig2_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Cloud *m*anagement *p*lane and multitenancy'
