    \ public load balancer pair of nodes.\n\nTable 2-3\n\nLoad Balancer Subnets\n\n\
    | Name | AD | CIDR Block | DNS Label | Security List |\n| --- | --- | --- | ---\
    \ | --- |\n| c-net | 1 | 192.168.1.32/29 | c | lb-sl |\n| d-net | 2 | 192.168.1.40/29\
    \ | d | lb-sl |\n\n1.  Go to Menu ➤ Networking ➤ Virtual Cloud Networks.\n\n2.\
    \  Make sure that the `Sandbox` compartment is selected.\n\n3.  Click the name\
    \ of your VCN.\n\n4.  Click Subnets in the Resources menu.\n\n5.  Add two new\
    \ public subnets, as defined in Table [2-3](#478313_1_En_2_Chapter.xhtml#Tab3).\n\
    \nWe’ve just prepared the networking setup for our highly available public load\
    \ balancer. Altogether with UUID API subnets, you should see four subnets in your\
    \ VCN, as shown in Figure [2-50](#478313_1_En_2_Chapter.xhtml#Fig50).\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig50_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig50_HTML.jpg)\n\
    \nFigure 2-50\n\nSubnets in VCN\n\nAs a matter of fact, the load balancing capability\
    \ is delivered by a set of cooperating OCI resources encapsulated by a *load balancer*\
    \ resource. Compute nodes or private IP addresses to which the requests are forwarded\
    \ by the load balancer are considered as *backends* and grouped together into\
    \ a *backend set* resource. A backend set is more than just a simple grouping\
    \ of backends because it also defines the health check policy. The health check\
    \ policy decides how the backends are judge to be operational or failing. Finally,\
    \ a *listener* is required to accept the ingress traffic; otherwise, requests\
    \ wouldn’t be able to flow into the public load balancer from the Internet. Figure\
    \ [2-51](#478313_1_En_2_Chapter.xhtml#Fig51) shows a conceptual composition of\
    \ OCI resources for the load balancer.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig51_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig51_HTML.jpg)\n\
    \nFigure 2-51\n\nLoad balancer OCI resources\n\nHaving outlined the resources\
    \ that a load balancer is composed of, let’s create them. When using the OCI Console,\
    \ you can leverage a three-step all-in-one load balancer creation wizard. This\
    \ is how you create a new load balancer resource:\n\n1.  Go to Menu ➤ Networking\
    \ ➤ Load Balancers.\n\n2.  Make sure that the `Sandbox` compartment is selected.\n\
    \n3.  Click Create Load Balancer.\n\n4.  In the Add Details step, provide the\
    \ configuration, as shown in Figure [2-52](#478313_1_En_2_Chapter.xhtml#Fig52):\n\
    \    1.  Name your load balancer **uuid-lb**.\n\n2.  Set the visibility to Public.\n\
    \n3.  Select the Small shape: 100Mbps.\n\n4.  Select Public Load Balancer.\n\n\
    5.  Set the VCN to the `uuid-vcn` VCN.\n\n6.  Choose the load balancer subnets:\
    \ `c-net` and `d-net`.\n\n5.  Click Next Step.\n\n6.  In the Choose Backends step,\
    \ provide the configuration, as shown in Figure [2-53](#478313_1_En_2_Chapter.xhtml#Fig53):\n\
    \    1.  Make sure Weighted Round Robin is selected.\n\n2.  Click Add Backends\
    \ and select both compute instances.\n\n3.  For each backend instance, change\
    \ the port to `5000`.\n\n7.  Still in the Choose Backends step, provide the health\
    \ check policy configuration, as shown in Figure [2-54](#478313_1_En_2_Chapter.xhtml#Fig54):\n\
    \    1.  Make sure the protocol is set to HTTP.\n\n2.  Set the port to 5000.\n\
    \n3.  Set the URL path to `/identifiers`.\n\n4.  Make sure the status code is\
    \ set to 200.\n\n8.  Click Next Step.\n\n9.  In the Configure Listener step, provide\
    \ the configuration, as shown in Figure [2-55](#478313_1_En_2_Chapter.xhtml#Fig55):\n\
    \    1.  Choose the HTTP protocol and set the port to 80.\n\n2.  Name the listener\
    \ **uuid-lb-listener**.\n\n10.  Click Create Load Balancer.\n\nFigure [2-52](#478313_1_En_2_Chapter.xhtml#Fig52)\
    \ shows the expected load balancer configuration in the Load Balancer Add Details\
    \ step of the load balancer creation wizard in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig52_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig52_HTML.jpg)\n\
    \nFigure 2-52\n\nAdd Details step in the OCI console load balancer wizard\n\n\
    Figure [2-53](#478313_1_En_2_Chapter.xhtml#Fig53) shows the first part of the\
    \ expected load balancer configuration in the Choose Backends step of the load\
    \ balancer creation wizard in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig53_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig53_HTML.jpg)\n\
    \nFigure 2-53\n\nChoose Backends step in the OCI Console load balancer wizard\n\
    \nFigure [2-54](#478313_1_En_2_Chapter.xhtml#Fig54) shows the second part of the\
    \ expected load balancer configuration in the Choose Backends step of the load\
    \ balancer creation wizard in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig54_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig54_HTML.jpg)\n\
    \nFigure 2-54\n\nHealth check settings in the Choose Backends step\n\nFigure [2-55](#478313_1_En_2_Chapter.xhtml#Fig55)\
    \ shows the expected load balancer backend set configuration in the Configure\
    \ Listener step of the load balancer creation wizard in the OCI Console."
  trans: "\n### 负载均衡器\n\n负载均衡器为活动服务器或工作节点提供单一入口点和流量分发。我们将使用一个面向互联网的，即所谓的公共负载均衡器，它使用一个公共浮动\
    \ IP 来支持故障转移机制。这意味着您需要启动一对负载均衡器节点，每个节点位于不同的可用性域中。在任何给定时间，只有一个 LB 节点处于活动状态，并将流量转发到\
    \ UUID 服务 API 节点。第二个 LB 节点保持在备用模式。如果活动的 LB 节点发生故障，备用的 LB 节点将检测到此情况，并宣布自己为活动节点和当前\
    \ IP 地址持有者。\n\n图 2-47 展示了容错公共负载均衡器的工作原理。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig47_HTML.jpg](img/478313_1_En_2_Fig47_HTML.jpg)\n\
    \n图 2-47\n容错公共 IP 负载均衡器\n\n公共负载均衡器需要两个专用的公共子网。我们将在托管 UUID 服务 API 节点的同一个 VCN 中创建它们。这次，我们将使用一个新的安全列表，因为其规则将与我们用于应用程序节点子网的默认安全列表不同。\n\
    \n请创建一个名为 `lb-sl` 的新安全列表。以下是使用 OCI 控制台创建新安全列表的方法：\n\n表 2-2\n负载均衡器子网的出站安全规则\n\n\
    |   | 类型       | 协议 | 源              | 目标            |\n|---|------------|------|-----------------|-----------------|\n\
    | 1 | 无状态     | TCP  | 所有端口        | 192.168.1.0/24 端口 5000 |\n\n表 2-1\n负载均衡器子网的入站安全规则\n\
    \n|   | 类型     | 协议 | 源              | 目标        |\n|---|----------|------|-----------------|-------------|\n\
    | 1 | 有状态   | TCP  | 0.0.0.0/0 所有端口 | 端口 80     |\n| 2 | 无状态   | TCP  | 192.168.1.0/24\
    \ 端口 5000 | 所有端口 |\n\n1.  转到 菜单 ➤ 网络 ing ➤ 虚拟云网络。\n2.  确保选择了 `Sandbox` 隔室。\n3.\
    \  单击您的 VCN 名称。\n4.  在资源菜单中单击 安全列表。\n5.  单击 创建安全列表。\n6.  给它一个名称：`lb-sl`。\n7. \
    \ 按照表 2-1 的定义创建入站规则。其中一条规则必须是无状态的。\n8.  按照表 2-2 的定义创建出站规则。该规则必须是无状态的。\n9.  单击\
    \ 创建安全列表。\n\n图 2-48 展示了入站规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig48_HTML.jpg](img/478313_1_En_2_Fig48_HTML.jpg)\n\
    \n图 2-48\n负载均衡器子网的入站规则\n\n图 2-49 展示了预期的出站规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig49_HTML.jpg](img/478313_1_En_2_Fig49_HTML.jpg)\n\
    \n图 2-49\n负载均衡器子网的出站规则\n\n我们现在将在两个不同的可用性域中为容错公共负载均衡器节点对创建两个子网。\n\n表 2-3\n负载均衡器子网\n\
    \n| 名称 | AD | CIDR 块        | DNS 标签 | 安全列表 |\n|------|----|---------------|---------|----------|\n\
    | c-net| 1  | 192.168.1.32/29 | c       | lb-sl    |\n| d-net| 2  | 192.168.1.40/29\
    \ | d       | lb-sl    |\n\n1.  转到 菜单 ➤ 网络 ing ➤ 虚拟云网络。\n2.  确保选择了 `Sandbox` 隔室。\n\
    3.  单击您的 VCN 名称。\n4.  在资源菜单中单击 子网。\n5.  按照表 2-3 的定义，添加两个新的公共子网。\n\n我们刚刚为高可用公共负载均衡器准备好了网络设置。连同\
    \ UUID API 子网，您应该在 VCN 中看到四个子网，如图 2-50 所示。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig50_HTML.jpg](img/478313_1_En_2_Fig50_HTML.jpg)\n\
    \n图 2-50\nVCN 中的子网\n\n实际上，负载均衡功能由一组协作的 OCI 资源提供，这些资源被封装在一个负载均衡器资源中。负载均衡器将请求转发到的计算节点或私有\
    \ IP 地址被视为后端，并被分组到一个后端集资源中。后端集不仅仅是一个简单的后端分组，因为它还定义了运行状况检查策略。运行状况检查策略决定了如何判断后端是正常运行还是发生故障。最后，需要一个监听器来接受入站流量；否则，来自互联网的请求将无法流入公共负载均衡器。图\
    \ 2-51 展示了负载均衡器 OCI 资源的概念组成。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig51_HTML.jpg](img/478313_1_En_2_Fig51_HTML.jpg)\n\
    \n图 2-51\n负载均衡器 OCI 资源\n\n概述了负载均衡器的组成资源后，让我们来创建它们。使用 OCI 控制台时，您可以利用一个三步合一的负载均衡器创建向导。以下是创建新的负载均衡器资源的方法：\n\
    \n1.  转到 菜单 ➤ 网络 ing ➤ 负载均衡器。\n2.  确保选择了 `Sandbox` 隔室。\n3.  单击 创建负载均衡器。\n4.  在\
    \ “添加详细信息” 步骤中，提供配置，如图 2-52 所示：\n    1.  将负载均衡器命名为 `uuid-lb`。\n    2.  将可见性设置为\
    \ 公共。\n    3.  选择小规格：100Mbps。\n    4.  选择 公共负载均衡器。\n    5.  将 VCN 设置为 `uuid-vcn`\
    \ VCN。\n    6.  选择负载均衡器子网：`c-net` 和 `d-net`。\n5.  单击 下一步。\n6.  在 “选择后端” 步骤中，提供配置，如图\
    \ 2-53 所示：\n    1.  确保选择了 加权轮询。\n    2.  单击 添加后端 并选择两个计算实例。\n    3.  对于每个后端实例，将端口更改为\
    \ `5000`。\n7.  仍在 “选择后端” 步骤中，提供运行状况检查策略配置，如图 2-54 所示：\n    1.  确保协议设置为 HTTP。\n\
    \    2.  将端口设置为 5000。\n    3.  将 URL 路径设置为 `/identifiers`。\n    4.  确保状态代码设置为\
    \ 200。\n8.  单击 下一步。\n9.  在 “配置监听器” 步骤中，提供配置，如图 2-55 所示：\n    1.  选择 HTTP 协议并将端口设置为\
    \ 80。\n    2.  将监听器命名为 `uuid-lb-listener`。\n10. 单击 创建负载均衡器。\n\n图 2-52 展示了 OCI\
    \ 控制台负载均衡器创建向导的 “负载均衡器添加详细信息” 步骤中预期的负载均衡器配置。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig52_HTML.jpg](img/478313_1_En_2_Fig52_HTML.jpg)\n\
    \n图 2-52\nOCI 控制台负载均衡器向导中的 “添加详细信息” 步骤\n\n图 2-53 展示了 OCI 控制台负载均衡器创建向导 “选择后端” 步骤中预期负载均衡器配置的第一部分。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig53_HTML.jpg](img/478313_1_En_2_Fig53_HTML.jpg)\n\
    \n图 2-53\nOCI 控制台负载均衡器向导中的 “选择后端” 步骤\n\n图 2-54 展示了 OCI 控制台负载均衡器创建向导 “选择后端” 步骤中预期负载均衡器配置的第二部分。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig54_HTML.jpg](img/478313_1_En_2_Fig54_HTML.jpg)\n\
    \n图 2-54\n“选择后端” 步骤中的运行状况检查设置\n\n图 2-55 展示了 OCI 控制台负载均衡器创建向导 “配置监听器” 步骤中预期的负载均衡器后端集配置。\n"
- fmt: '![Figure 2-55: Configure Listener step in the OCI Console load balancer wizard](images/478313_1_En_2_Chapter/478313_1_En_2_Fig55_HTML.jpg)


    Oracle Cloud Infrastructure will now provision a new public load balancer and
    attach a public IP address from a pool of Oracle Cloud addresses. We have to wait
    until the provisioning action has been completed to see something like in Figure
    2-56.


    ![Figure 2-56: Viewing load balancer information in the OCI Console](images/478313_1_En_2_Chapter/478313_1_En_2_Fig56_HTML.jpg)


    The health check configuration we’ve defined is responsible for overseeing and
    detecting whether all of the registered load balancing backends are operating
    as expected. The `UUID` service has been implemented as a simple `REST API`. `REST
    APIs` leverage `HTTP` standard methods to provide `CRUD` operations over the API-managed
    resources. This is why the most natural way to perform a `REST API` health check
    is to test one of its resources using `HTTP GET`. The health check policy, which
    we have just configured, will send `HTTP GET /identifiers` requests every 10 seconds
    to each backend server. If it does not receive an `HTTP 200 OK` response within
    three seconds, it will retry two times and mark the node as unavailable. After
    a load balancer has been provisioned, it can take a few moments for the load balancer
    to confirm that the backends are healthy.


    > **Tip**

    > If you are observing the `Unknown` state for a prolonged period of time, do
    not worry, but move on to testing the load balancer. In some cases, after the
    load balancer launches, it can take minutes until the load balancer moves from
    the `Unknown` state to `OK`.


    If needed, you can check the state of each individual backend, as shown in Figure
    2-57. To do so, follow these steps:


    ![Figure 2-57: Viewing backend health flags in the OCI Console](images/478313_1_En_2_Chapter/478313_1_En_2_Fig57_HTML.jpg)


    1.  Go to Menu ➤ Networking ➤ Load Balancers.

    2.  Click the name of your load balancer.

    3.  In the Resources section, click Backend Sets.

    4.  Click the name of the backend set.

    5.  In the Resources section, click Backends.


    If you should find one of the backends in a `Critical` state, follow this checklist
    to troubleshoot the issue:


    *   The target compute node is running.

    *   The `UUID Service systemd service` is started.

    *   The operating system firewall accepts connections on port `5000`.

    *   There is an ingress stateful rule in the default security list that allows
    the incoming traffic to port `5000`.

    *   The rules in the load balancer’s subnet security list are correct.

    *   The load balancer set backends are properly defined.

    *   The load balancer backend set health check configuration is correct.


    All in all, after a while, you will be able to perform the final test for this
    chapter. To do so, you need to identify the public IP address your load balancer
    has been given from the Oracle Cloud address pool. In my case, it is `132.145.240.240`.
    When you send a few requests to the `/identifiers` resource on port `80` of your
    load balancer, they will be evenly routed in a round-robin manner to the first
    (`uuid-1`) and second (`uuid-2`) instances of the `UUID` service `API`. Every
    time you send a request to your load balancer, it is interchangeably served by
    one of the two `UUID` service instances, as proven by the `generator` JSON element
    in each response.


    ```bash

    $ LB_INSTANCE=132.145.240.101

    $ curl $LB_INSTANCE:80/identifiers

    {

    "generator":"uuid1",

    "uuid":"709f6aac-0720-461a-9fd3-732748253bca"

    }

    $ curl $LB_INSTANCE:80/identifiers

    {

    "generator":"uuid2",

    "uuid":"cfe329bd-cd2c-49a6-ae4f-29f23bf5d2fe"

    }

    $ curl $LB_INSTANCE:80/identifiers

    {

    "generator":"uuid1",

    "uuid":"e22b5858-e70f-46ab-bd16-0da3d55aca73"

    }

    $ curl $LB_INSTANCE:80/identifiers

    {

    "generator":"uuid2",

    "uuid":"1c9662d9-1426-4e2d-bae3-bd4207dbd73b"

    }

    ```


    We have completed the exercise. Before we move on, let’s terminate the cloud resources.
    You can now terminate all resources you’ve created in this chapter, excluding
    the learning compartment that we are going to use in the next chapters.


    ## Cleanup


    To avoid unnecessary costs or trial credit consumption, no matter how low they
    are, let’s terminate the resources we’ve created in this chapter. Some resources
    depend on other resources; therefore, it is important to stick to the required
    sequence when you delete them. This won’t be a problem in future chapters because
    in many cases the automation will do it for us in one shot. In this chapter, however,
    we are doing everything manually in the `OCI Console`, so we have to follow these
    steps:


    1.  Go to Menu ➤ Networking ➤ Load Balancers.

    2.  Make sure that the `Sandbox` compartment is selected.

    3.  Click the three-dot menu, click Terminate, and wait until the resource is
    removed.


    Figure 2-58 shows how to terminate a load balancer.


    ![Figure 2-58: Terminating a load balancer in the OCI Console](images/478313_1_En_2_Chapter/478313_1_En_2_Fig58_HTML.jpg)


    Now, in a similar way, use the `OCI Console` to terminate (or delete) the remaining
    resources.


    *   Both compute instances (Menu ➤ Compute ➤ Instances)

    *   Custom image (Menu ➤ Compute ➤ Custom Images)

    *   `VCN` with associated networking resources


    > **Tip** When you terminate a compute instance, make sure you permanently delete
    the boot volume. If you forget to do so, you can always delete an abandoned boot
    volume later in Compute ➤ Boot Volumes.


    This concludes the exercise in this chapter.


    ## Summary


    In this chapter, I drove you through the process of planning and running a simple
    cloud application on Oracle Cloud Infrastructure. First, we spent some time analyzing
    the application design and outlining the required cloud infrastructure resources.
    Subsequently, we used the `OCI Console` to provision each cloud resource step
    by step. The application itself was built and run on the instance by using `cloud-init`-powered
    automation. Next, we scaled the application out and added a public load balancer
    to evenly distribute the load to two compute nodes that host the application.
    At the end, I showed you how to perform a cleanup and remove the resources.


    You may get the impression that the exercise in this chapter consisted of an enormous
    number of manual steps. Well, I warned you that I wanted to show you the manual
    way and teach you how to handle the `OCI Console`. The next chapter will introduce
    the `OCI CLI` and `Terraform` automation, and you will experience how to manage
    your cloud infrastructure as code faster. Read on.'
