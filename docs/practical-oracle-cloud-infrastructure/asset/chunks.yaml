    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig26_HTML.jpg](img/478313_1_En_9_Fig26_HTML.jpg)


    图 9-26 为存储桶中的对象启用事件生成


    1.  转到菜单 ➤ 对象存储 ➤ 对象存储。

    2.  确保选择了 `Sandbox` 复合区。

    3.  单击 `reports` 存储桶的名称。

    4.  单击“发出对象事件”旁边的“编辑”。

    5.  选中“发出对象事件”框，如图 9-26 所示。

