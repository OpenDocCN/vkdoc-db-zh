- fmt: "# Deploying Function\n\n## 创建函数存根\n\n新的函数将被命名为 `reportingfn`，并采用基于 Python\
    \ 的实现。现在，连接到用于函数开发的计算实例，并使用 `fn init` 命令来创建函数存根。\n\n```\n[ubuntu@dev-vm]$ cd ~\n\
    [ubuntu@dev-vm]$ fn init --runtime python reportingfn\nCreating function at: ./reportingfn\n\
    Function boilerplate generated.\nfunc.yaml created.\n```\n\n和之前一样，`cloud-init`\
    \ 已经下载了函数代码并将其放置在函数目录中。将代码复制到函数存根中。\n\n```\n[ubuntu@dev-vm]$ cp ~/functions/reportingfn.py\
    \ ~/reportingfn/func.py\n```\n\n## 修改依赖项\n\n该函数使用 OCI Python SDK 与 OCI 对象存储进行交互。这意味着需要依赖\
    \ `oci` 模块，并迫使我们修改 `requirements.txt` 文件。只有这样，函数特定的镜像才会包含 `oci` 模块。你可以使用简单的 `echo`\
    \ 命令将 `oci` 名称追加到 `requirements.txt` 文件中。\n\n```\n[ubuntu@dev-vm]$ echo -ne \"\
    \\noci\" >> ~/reportingfn/requirements.txt\n[ubuntu@dev-vm]$ cat ~/reportingfn/requirements.txt\n\
    fdk\noci\n```\n\n## 分析处理函数\n\n`reportingfn.py` 代码比我们之前处理过的两个函数稍大一些。清单 9-11 展示了\
    \ `handler` 函数最重要的部分。\n\n```\n...\ndef handler(ctx, data: io.BytesIO=None):\n\
    ...\nbucket_name = \"reports\"\nobject_name = extract_object_name(data)\n...\n\
    signer = oci.auth.signers.get_resource_principals_signer()\nclient = oci.object_storage.ObjectStorageClient(\n\
    \    config={},\n    signer=signer)\nstorage_namespace = client.get_namespace().data\n\
    object_content_str = load_object_content(\n    client, storage_namespace,\n  \
    \  bucket_name, object_name)\ncity_attendance_str = process_city_attendance_data(\n\
    \    object_content_str)\nprocessed_object_name = object_name.replace(\n    '.raw.csv','.processed.csv')\n\
    put_response = put_city_attendance_object(\n    client, storage_namespace, bucket_name,\n\
    \    processed_object_name, city_attendance_str)\n...\n```\n\n*清单 9-11 reportingfn.py\
    \ 函数*\n\n该函数被设计为仅与 `reports` 存储桶交互。它从输入数据中读取新创建的对象名称。此逻辑在我们将要稍后介绍的 `extract_object_name`\
    \ 函数中提供。接下来，调用 OCI SDK 函数以获取 `ObjectStorageClient` 对象并获取要使用的对象存储命名空间。在后续步骤中，函数加载新创建对象的内容（`load_object_content`\
    \ 函数），处理该数据（`process_city_attendance` 函数），最后将处理结果持久化到另一个新对象（`put_city_attendance_data`\
    \ 函数）中，该对象具有与原始对象相同的名称但不同的后缀（`.processed.csv`）。你可以在同一个 `reportingfn.py` 文件中找到这些函数。只要了解\
    \ Python 的基础知识，代码应该相对容易理解。\n\n## 部署函数\n\n根据当前的 Fn 客户端上下文，将函数部署到 Oracle Functions\
    \ 会将镜像推送到 OCIR。虽然我们已经执行了 `docker login` 命令，但你可能需要重复此操作。如果是这种情况，以下是需要执行的命令：\n\n\
    ```\n[ubuntu@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk\n[ubuntu@dev-vm]$ OCIR_REGION=fra\n\
    [ubuntu@dev-vm]$ OCI_USER=sandbox-user\n[ubuntu@dev-vm]$ docker login -u $OCI_TENANCY_NAMESPACE/$OCI_USER\
    \ $OCIR_REGION.ocir.io\nPassword: \nLogin Succeeded\n```\n\n现在，确保 `FN_SUBNET_ID`\
    \ 已正确定义，并使用 `fn create app` 来创建应用程序。\n\n```\n[ubuntu@dev-vm]$ FN_SUBNET_ID=ocid1.subnet.oc1.eu-frankfurt-1.aa...sp2ufa\n\
    [ubuntu@dev-vm]$ fn create app reportingapp --annotation oracle.com/oci/subnetIds=\"\
    [\\\"$FN_SUBNET_ID\\\"]\"\nSuccessfully created app:  reportingapp\n```\n\n我们已经准备好部署函数。\n\
    \n```\n[ubuntu@dev-vm]$ cd reportingfn/\n[ubuntu@dev-vm]$ fn -v deploy --app reportingapp\n\
    ...\nUpdating function reportingfn using image fra.ocir.io/jakobczyk/sandbox-fn/reportingfn:0.0.2...\n\
    Successfully created function: reportingfn with fra.ocir.io/jakobczyk/sandbox-fn/reportingfn:0.0.2\n\
    ```\n\n图 9-19 显示了 OCI 控制台中新部署的函数。类似地，图 9-20 展示了 OCIR 中的函数特定容器镜像。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig20_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig20_HTML.jpg)\n\
    \n*图 9-20 在 OCI 控制台中查看函数特定容器镜像*\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig19_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig19_HTML.jpg)\n\
    \n*图 9-19 在 OCI 控制台中查看函数*\n\n## 添加标记\n\n我们绝不能忘记需要附加到函数上的标记。这可以通过 OCI CLI 完成。首先，使用带有定制\
    \ JMESPath 查询的 `oci fn application list` 命令来获取 Oracle Functions 应用程序的 OCID。接下来，使用\
    \ `oci fn function list` 命令来获取函数的 OCID。最后，你可以使用 `oci fn function update` 命令将 `test-projects.reports`\
    \ 定义的标记附加到函数上。\n\n```\n$ FN_APP_OCID=`oci fn application list --query \"data[?\\\
    \"display-name\\\" == 'reportingapp'] | [0].id\" --raw-output`\n$ echo $FN_APP_OCID\n\
    ocid1.fnapp.oc1.eu-frankfurt-1.aa...spf2rq\n$ FN_FUN_OCID=`oci fn function list\
    \ --application-id $FN_APP_OCID --query \"data[?\\\"display-name\\\" == 'reportingfn']\
    \ | [0].id\" --raw-output`\n$ echo $FN_FUN_OCID\nocid1.fnfunc.oc1.eu-frankfurt-1.aa...j3lfqa\n\
    $ oci fn function update --function-id $FN_FUN_OCID --defined-tags '{ \"test-projects\"\
    : {\"reports\": \"r1\"} }'\nWARNING: Updates to config and freeform-tags and defined-tags\
    \ will replace any existing values. Are you sure you want to continue? [y/N]:\
    \ y\n{\n  \"data\": {\n    ...\n    \"defined-tags\": {\n      \"test-projects\"\
    : {\n        \"reports\": \"r1\"\n      }\n    },\n    \"display-name\": \"reportingfn\"\
    ,\n    \"freeform-tags\": {},\n    ...\n    \"lifecycle-state\": \"ACTIVE\",\n\
    \    ...\n  }\n}\n```\n\n如果你愿意，可以在 OCI 控制台中按照以下步骤直观地确认标记已正确附加到函数上：\n\n1.  转到菜单\
    \ ➤ 开发者服务 ➤ 函数。\n2.  确保选择了 `Sandbox` 复选框。\n3.  单击 `reportingapp` 应用程序的名称。\n4.\
    \  单击 `reportingfn` 函数的名称。\n5.  单击“标记”选项卡。\n\n你应该会看到新的已定义标记，它存在于 `test-projects`\
    \ 标记命名空间中并使用 `reports` 键，如图 9-21 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig21_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig21_HTML.jpg)\n\
    \n*图 9-21 查看附加到函数的已定义标记键*\n\n函数已部署到 Oracle Functions。在我们测试它之前，让我们讨论一下它的触发方式。"
  raw: "#### Deploying Function\n\nThe new function will be called `reportingfn` and\
    \ use a Python-based implementation. Now, connect to the compute instance for\
    \ function development, and use the `fn init` command to create the function stub.\n\
    \n```\n[ubuntu@dev-vm]$ cd ~\n[ubuntu@dev-vm]$ fn init --runtime python reportingfn\n\
    Creating function at: ./reportingfn\nFunction boilerplate generated.\nfunc.yaml\
    \ created.\n```\n\nLike before, cloud-init has already downloaded the function\
    \ code and placed it in the functions directory. Copy the code to the function\
    \ stub.\n\n```\n[ubuntu@dev-vm]$ cp ~/functions/reportingfn.py ~/reportingfn/func.py\n\
    ```\n\nThe function uses the OCI SDK for Python to interact with OCI object storage.\
    \ This implies a dependency to the `oci` module and forces us to amend the `requirements.txt`\
    \ file. Only in this way will the function-specific image ship with the `oci`\
    \ module. You can use a simple `echo` command to append the `oci` name to the\
    \ `requirements.txt` file .\n\n```\n[ubuntu@dev-vm]$ echo -ne \"\\noci\" >> ~/reportingfn/requirements.txt\n\
    [ubuntu@dev-vm]$ cat ~/reportingfn/requirements.txt\nfdk\noci\n```\n\nThe `reportingfn.py`\
    \ code is slightly larger than two functions we worked before. Listing [9-11](#478313_1_En_9_Chapter.xhtml#PC76)\
    \ shows the most important parts of the `handler` function .\n\n```\n...\ndef\
    \ handler(ctx, data: io.BytesIO=None):\n...\nbucket_name = \"reports\"\nobject_name\
    \ = extract_object_name(data)\n...\nsigner = oci.auth.signers.get_resource_principals_signer()\n\
    client = oci.object_storage.ObjectStorageClient(\nconfig={},\nsigner=signer)\n\
    storage_namespace = client.get_namespace().data\nobject_content_str = load_object_content(\n\
    client, storage_namespace,\nbucket_name, object_name)\ncity_attendance_str = process_city_attendance_data(\n\
    object_content_str)\nprocessed_object_name = object_name.replace(\n'.raw.csv','.processed.csv')\n\
    put_response = put_city_attendance_object(\nclient, storage_namespace, bucket_name,\n\
    processed_object_name, city_attendance_str)\n...\nListing 9-11\nreportingfn.py\
    \ Function\n```\n\nThe function is implemented to interact solely with the `reports`\
    \ bucket. It reads the newly created object name from the input data. This logic\
    \ is provided in the `extract_object_name` function we will cover in a few moments.\
    \ Next, the OCI SDK functions are called to obtain an `ObjectStorageClient` object\
    \ and get the object storage namespace to work with. In subsequent steps, the\
    \ function loads the contents (`load_object_content` function) of the newly created\
    \ object, processes that data (`process_city_attendance` function), and finally\
    \ persists the results of the processing in another new object (`put_city_attendance_data`\
    \ function) with the same name as the original object but a different suffix (`.processed.csv`).\
    \ You will find these functions in the same `reportingfn.py` file. As long as\
    \ you know the basics of Python, the code should be relatively easy to understand.\n\
    \nBased on the current Fn client context, deploying a function to Oracle Functions\
    \ will push the image to OCIR. Although we already executed the `docker login`\
    \ command, you may need to repeat this operation. If this is the case, these are\
    \ the commands to execute:\n\n```\n[ubuntu@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk\n\
    [ubuntu@dev-vm]$ OCIR_REGION=fra\n[ubuntu@dev-vm]$ OCI_USER=sandbox-user\n[ubuntu@dev-vm]$\
    \ docker login -u $OCI_TENANCY_NAMESPACE/$OCI_USER $OCIR_REGION.ocir.io\nPassword:\
    \ \nLogin Succeeded\n```\n\nNow, make sure `FN_SUBNET_ID` is properly defined\
    \ and use `fn create app` to create the application.\n\n```\n[ubuntu@dev-vm]$\
    \ FN_SUBNET_ID=ocid1.subnet.oc1.eu-frankfurt-1.aa...sp2ufa\n[ubuntu@dev-vm]$ fn\
    \ create app reportingapp --annotation oracle.com/oci/subnetIds=\"[\\\"$FN_SUBNET_ID\\\
    \"]\"\nSuccessfully created app:  reportingapp\n```\n\nWe are ready to deploy\
    \ the function.\n\n```\n[ubuntu@dev-vm]$ cd reportingfn/\n[ubuntu@dev-vm]$ fn\
    \ -v deploy --app reportingapp\n...\nUpdating function reportingfn using image\
    \ fra.ocir.io/jakobczyk/sandbox-fn/reportingfn:0.0.2...\nSuccessfully created\
    \ function: reportingfn with fra.ocir.io/jakobczyk/sandbox-fn/reportingfn:0.0.2\n\
    ```\n\nFigure [9-19](#478313_1_En_9_Chapter.xhtml#Fig19) shows the newly deployed\
    \ function in the OCI Console. Similarly, Figure [9-20](#478313_1_En_9_Chapter.xhtml#Fig20)\
    \ presents the function-specific container image in OCIR.\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig20_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig20_HTML.jpg)\n\
    \nFigure 9-20\n\nViewing a function-specific container image in the OCI Console\n\
    \n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig19_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig19_HTML.jpg)\n\
    \nFigure 9-19\n\nViewing the function in the OCI Console\n\nWe mustn’t forget\
    \ about the tag we need to attach to the function. This can be done with the OCI\
    \ CLI. First, you use the `oci fn application list` command with a tailored JMESPath\
    \ query to obtain the OCID of the Oracle Functions application. Next, you use\
    \ the `oci fn function list` command to fetch the OCID of the function. Finally,\
    \ you can use the `oci fn function update` command to attach the `test-projects.reports`-defined\
    \ tag to the function.\n\n```\n$ FN_APP_OCID=`oci fn application list --query\
    \ \"data[?\\\"display-name\\\" == 'reportingapp'] | [0].id\" --raw-output`\n$\
    \ echo $FN_APP_OCID\nocid1.fnapp.oc1.eu-frankfurt-1.aa...spf2rq\n$ FN_FUN_OCID=`oci\
    \ fn function list --application-id $FN_APP_OCID --query \"data[?\\\"display-name\\\
    \" == 'reportingfn'] | [0].id\" --raw-output`\n$ echo $FN_FUN_OCID\nocid1.fnfunc.oc1.eu-frankfurt-1.aa...j3lfqa\n\
    $ oci fn function update --function-id $FN_FUN_OCID --defined-tags '{ \"test-projects\"\
    : {\"reports\": \"r1\"} }'\nWARNING: Updates to config and freeform-tags and defined-tags\
    \ will replace any existing values. Are you sure you want to continue? [y/N]:\
    \ y\n{\n\"data\": {\n...\n\"defined-tags\": {\n\"test-projects\": {\n\"reports\"\
    : \"r1\"\n}\n},\n\"display-name\": \"reportingfn\",\n\"freeform-tags\": {},\n\
    ...\n\"lifecycle-state\": \"ACTIVE\",\n...\n}\n}\n```\n\nIf you want, follow these\
    \ steps in the OCI Console to visually confirm that the tag has been properly\
    \ attached to the function:\n\n1.  Go to Menu ➤ Developer Services ➤ Functions.\n\
    \n2.  Make sure that the `Sandbox` compartment is selected.\n\n3.  Click the name\
    \ of the `reportingapp` application.\n\n4.  Click the name of the `reportingfn`\
    \ function.\n\n5.  Click the Tag tab.\n\nYou should see the new defined tag that\
    \ exists in the `test-projects` tag namespaces and uses the `reports` key, as\
    \ presented in Figure [9-21](#478313_1_En_9_Chapter.xhtml#Fig21).\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig21_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig21_HTML.jpg)\n\
    \nFigure 9-21\n\nViewing a defined tag key attached to the function\n\nThe function\
    \ has been deployed to Oracle Functions. Before we test it, let’s discuss the\
    \ way it is triggered."
