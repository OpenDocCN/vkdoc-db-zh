  raw: 'Every Autonomous Data Warehouse instance comes with a feature called *Oracle
    Machine Learning* (OML), which is a web-based, interactive, notebook-oriented
    data visualization and data analytics tool based on the open source Apache Zeppelin
    project. For simple visualization use cases, you can easily use SQL to issue queries
    and, using a few clicks, prepare various charts. For example, Figure [7-41](#478313_1_En_7_Chapter.xhtml#Fig41)
    shows how to display a line chart that illustrates the sum of car accident victims
    in Poland in 2017 grouped by the traffic accident category. As a reminder, the
    data you see is purely artificial and generated by me solely for the purpose of
    this book.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig41_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig41_HTML.jpg)


    Figure 7-41


    Oracle Machine Learning Zeppelin-based visualizations


    Notebooks can be arranged in a way that resembles multi paragraph reports, like
    the one shown in Figure [7-42](#478313_1_En_7_Chapter.xhtml#Fig42) that combines
    both a pie chart and a corresponding data table. Both views illustrate the daily
    average of people injured in 2017 in a voivodeship-based split.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig42_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig42_HTML.jpg)


    Figure 7-42


    OML-based reports


    You can access the OML Administration page from the Autonomous Data Warehouse
    Service Console on the Administration page. Here, you are able to allow the existing
    database users to work with OML notebooks. To find out more, please refer to the
    documentation.


    The Autonomous Data Warehouse instance can be easily registered as a data source
    for Oracle Analytics Cloud that features with a much richer set of available charts.
    Figure [7-43](#478313_1_En_7_Chapter.xhtml#Fig43) presents a Radar Area chart
    of people injured in 2017 on the roads of GP type. Each different angle corresponds
    to one particular voivodeship. The lower is the number of injured people on GP
    roads in a given voivodeship; the smaller is the blue area on this particular
    angle. There are plenty of things you can build using Analytics Cloud, and you
    perform interactive analysis and dynamically adapt the charts to come to an ideal
    dashboard in the context of your particular reporting scenario.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig43_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig43_HTML.jpg)


    Figure 7-43


    Oracle Analytics Cloud


    Discussing business intelligence operations, data mining algorithms, and different
    visualization techniques like these supported by Zeppelin-based ADB extensions
    as well as Oracle Analytics Cloud is beyond the scope of this book. There is a
    broad range of materials available on the Internet, so feel free to explore.


    ## Cleanup


    We can now terminate the database instance because we won’t need it beyond this
    point. To shut down and terminate the ADW instance, you can execute the following
    command:


    ```

    $ ADW_OCID=`oci db autonomous-database list --query "data[?\"display-name\"==''road-adw'']
    | [0].id" --raw-output`

    $ echo $ADW_OCID

    ocid1.autonomousdatabase.oc1.eu-frankfurt-1.ab......763psq

    $ oci db autonomous-database delete --autonomous-database-id "$ADW_OCID" --wait-for-state
    TERMINATED

    Are you sure you want to delete this resource? [y/N]: y

    Action completed. Waiting until the resource has entered state: TERMINATED

    ```


    Similarly, use the OCI CLI to remove all objects and delete the object storage
    bucket in which we originally stored the raw input data for the database data
    load.


    ```

    $ oci os object bulk-delete -bn roadadw-load

    WARNING: This command will delete 7 objects. Are you sure you want to continue?
    [y/N]: y

    $ oci os bucket delete -bn roadadw-load

    Are you sure you want to delete this resource? [y/N]: y

    ```


