- fmt: '### Using the CLI


    I mentioned before that the CLI may offer features that are not available in the
    OCI Console, but if something is possible with the OCI Console, it is also possible
    when using the CLI. This is why if you see that there are some repeatable tasks
    you perform in the OCI Console and they cost you too much time, you may consider
    automating them using the CLI. In this section, you will see how to launch a compute
    instance using the OCI CLI.


    I am assuming that you already created the `oci_cli_rc` file, as described in
    the previous section. Listing [3-10](#478313_1_En_3_Chapter.xhtml#PC33) shows
    the minimal content required from now on. The OCID value of the `Sandbox` compartment
    is present within the DEFAULT profile.


    ```

    [DEFAULT]

    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa

    Listing 3-10

    OCI CLI RC File with Compartment for the Infrastructure

    ```


    Let’s start by making sure we are about to provision OCI resources in the correct
    compartment. You should see the name of the `Sandbox` compartment as a result
    of this command:


    ```

    $ oci iam compartment get --output table --query "data.{CompartmentName:\"name\"}"

    +-----------------+

    | CompartmentName |

    +-----------------+

    | Sandbox         |

    +-----------------+

    ```


    If you read Chapter [2](#478313_1_En_2_Chapter.xhtml), you may remember that a
    compute instance must exist within a subnet that is part of a VCN. This is a CLI
    command that creates a new VCN, named `cli-vcn`, which uses the 192.168.3.0/24
    address space:


    ```

    $ vcn_ocid=`oci network vcn create --cidr-block 192.168.3.0/24 --display-name
    cli-vcn --query "data.id" | tr -d ''"''`

    $ echo $vcn_ocid

    ocid1.vcn.oc1.eu-frankfurt-1.aa.........lg4b7w

    ```


    I’ve filtered the output using the `--query` parameter, removed the parentheses
    with the `tr` program, and saved the newly generated VCN OCID as a bash variable
    `named vcn_ocid`. Why? We will need the VCN OCID as an input parameter when we
    create an Internet gateway and a subnet. This is a CLI command that provisions
    a new Internet gateway within the VCN:


    ```

    $ igw_ocid=`oci network internet-gateway create --vcn-id $vcn_ocid --display-name
    cli-igw --is-enabled true --query "data.id" | tr -d ''"''`

    $ echo $igw_ocid

    ocid1.internetgateway.oc1.eu-frankfurt-1.aa.........2ptvoa

    ```


    To enable the connectivity with the Internet, we will add a routing rule that
    directs all outbound traffic from the VCN to the Internet gateway. This is the
    command that adds a new routing table with the relevant route rule:


    ```

    $ route_rules="[{\"cidrBlock\":\"0.0.0.0/0\", \"networkEntityId\":\"$igw_ocid\"}]"

    $ rt_ocid=`oci network route-table create --vcn-id $vcn_ocid --display-name cli-rt
    --route-rules "$route_rules" --query "data.id" | tr -d ''"''`

    $ echo $rt_ocid

    ocid1.routetable.oc1.eu-frankfurt-1.aa.........ukqcjq

    ```


    Before invoking the `oci network route-table create` command, a supplementary
    variable `called route_rules` with a single route rule referencing the Internet
    gateway has been created. Again, we are persisting the cloud identifier of the
    route table in a variable. We will need it while creating a subnet. This is how
    you create a subnet using the CLI:


    ```

    $ ad1=`oci iam availability-domain list --query data[0].name | tr -d ''"''`

    $ echo $ad1

    feDV:EU-FRANKFURT-1-AD-1

    $ subnet_ocid=`oci network subnet create --vcn-id $vcn_ocid --display-name cli-vcn
    --cidr-block "192.168.3.0/30" --prohibit-public-ip-on-vnic false --availability-domain
    $ad1 --route-table-id $rt_ocid --query data.id | tr -d ''"''`

    $ echo $subnet_ocid

    ocid1.subnet.oc1.eu-frankfurt-1.aa.........sqyz6a

    ```


    This time, we made two calls to the OCI REST API using the CLI. Initially, we
    fetched the name of the first availability domain in our current region and saved
    it to a new variable. Second, we created a new AD-specific subnet with a narrow
    addressing space of 192.168.3.0/30, which gives us just a single usable IPv4 address:
    192.168.3.2. Why just one? OCI reserves the first two addresses and the last address
    in each VCN subnet.


    We are ready to provision a new compute instance. Please make sure there is an
    SSH public key present under `~/oci_id_rsa.pub`. You created an SSH keypair in
    Chapter [2](#478313_1_En_2_Chapter.xhtml). The keypair will be required to enable
    remote access to the instance. This is how you launch a new compute instance using
    the CLI:


    ```

    $ image_ocid=`oci compute image list --shape "VM.Standard2.1" --operating-system
    "CentOS" --operating-system-version 7 --sort-by TIMECREATED --query data[0].id
    | tr -d ''"''`

    $ echo $image_ocid

    ocid1.image.oc1.eu-frankfurt-1.aa.........hl2cma

    $ vm_ocid=`oci compute instance launch --display-name cli-vm --availability-domain
    "$ad1" --subnet-id "$subnet_ocid" --private-ip 192.168.3.2 --image-id "$image_ocid"
    --shape VM.Standard2.1 --ssh-authorized-keys-file ~/oci_id_rsa.pub --wait-for-state
    RUNNING --query data.id | tr -d ''"''`

    Action completed. Waiting until the resource has entered state: RUNNING

    $ echo $vm_ocid

    ocid1.instance.oc1.eu-frankfurt-1.ab.........wsbmoq

    ```


    Each compute instance must be based on an image that provides an operating system
    and, optionally, additional preinstalled software. The OCI CLI command that launches
    a compute instance requires an OCID of the image. This is why we query for the
    OCID of the newest shape-compatible CentOS 7 base operating system image in the
    first place. Subsequently, we issue `the oci compute instance launch` command
    providing a display name (`--display-name`) to be used, a preferred private IP
    address (`--private-id`), and a desired shape (`--shape`) that defines the profile
    of the allocated hardware resources and identifiers for the subnet (`--subnet-id`)
    and the image `(--image-id`). A target availability domain (`--availability-domain`)
    must be the same as the one used for the subnet. Finally, we tell OCI to wait
    until the instance enters the `RUNNING` state. If we had skipped that part, the
    CLI would have returned before the provisioning process had completed. Figure
    [3-8](#478313_1_En_3_Chapter.xhtml#Fig8) presents the instance in the `RUNNING`
    state as shown in the OCI Console.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig8_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig8_HTML.jpg)


    Figure 3-8: Compute instance provisioned with the CLI


    Do you remember that we discussed the `oci_cli_rc` configuration file? Have you
    spotted any parameter that was always the same while we were executing the commands
    to launch a compute instance? Each command defined a `--query` parameter with
    the same `data.id` string as a value. In theory, looking at this usage pattern,
    you could consider adding it to the `oci_cli_rc` configuration file. In reality,
    this query is a bit too trivial to be stored in the `oci_cli_rc` file, but feel
    free to do so, if you want.


    As a matter of fact, you will use the CLI more often to query for data. The compute
    instance we’ve just launched is running in a public subnet and has been assigned
    an ephemeral public IPv4 address. Let’s find out the exact value of this public
    IP address. As we’ve saved the OCID of the compute instance as a variable (`vm_ocid`),
    we can reuse this value now. This is how you query for a public IP address of
    a compute instance running in a public subnet:


    ```

    $ oci compute instance list-vnics --instance-id "$vm_ocid" --query data[0].\"public-ip\"
    --raw-output

    130.61.89.229

    ```


    The CLI is based on a procedural approach when provisioning resources or querying
    for data. You specify the actions in a particular sequence that is taken by the
    CLI. These actions, issued as the CLI commands, are often mapped 1:1 into OCI
    REST API requests. Dependencies between resource types must be respected and taken
    into consideration in planning the action sequence. Similarly, if you delete the
    resources, the sequence must be usually inverted. This is how you terminate and
    delete previously created resources:'
  raw: '### Using the CLI


    I mentioned before that the CLI may offer features that are not available in the
    OCI Console, but if something is possible with the OCI Console, it is also possible
    when using the CLI. This is why if you see that there are some repeatable tasks
    you perform in the OCI Console and they cost you too much time, you may consider
    automating them using the CLI. In this section, you will see how to launch a compute
    instance using the OCI CLI.


    I am assuming that you already created the `oci_cli_rc` file, as described in
    the previous section. Listing [3-10](#478313_1_En_3_Chapter.xhtml#PC33) shows
    the minimal content required from now on. The OCID value of the `Sandbox` compartment
    is present within the DEFAULT profile.


    ```

    [DEFAULT]

    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa

    Listing 3-10

    OCI CLI RC File with Compartment for the Infrastructure

    ```


    Let’s start by making sure we are about to provision OCI resources in the correct
    compartment. You should see the name of the `Sandbox` compartment as a result
    of this command:


    ```

    $ oci iam compartment get --output table --query "data.{CompartmentName:\"name\"}"

    +-----------------+

    | CompartmentName |

    +-----------------+

    | Sandbox         |

    +-----------------+

    ```


    If you read Chapter [2](#478313_1_En_2_Chapter.xhtml), you may remember that a
    compute instance must exist within a subnet that is part of a VCN. This is a CLI
    command that creates a new VCN, named `cli-vcn`, which uses the 192.168.3.0/24
    address space:


    ```

    $ vcn_ocid=`oci network vcn create --cidr-block 192.168.3.0/24 --display-name
    cli-vcn --query "data.id" | tr -d ''"''`

    $ echo $vcn_ocid

    ocid1.vcn.oc1.eu-frankfurt-1.aa.........lg4b7w

    ```


    I’ve filtered the output using the `--query` parameter, removed the parentheses
    with the `tr` program, and saved the newly generated VCN OCID as a bash variable
    `named vcn_ocid`. Why? We will need the VCN OCID as an input parameter when we
    create an Internet gateway and a subnet. This is a CLI command that provisions
    a new Internet gateway within the VCN:


    ```

    $ igw_ocid=`oci network internet-gateway create --vcn-id $vcn_ocid --display-name
    cli-igw --is-enabled true --query "data.id" | tr -d ''"''`

    $ echo $igw_ocid

    ocid1.internetgateway.oc1.eu-frankfurt-1.aa.........2ptvoa

    ```


    To enable the connectivity with the Internet, we will add a routing rule that
    directs all outbound traffic from the VCN to the Internet gateway. This is the
    command that adds a new routing table with the relevant route rule:


    ```

    $ route_rules="[{\"cidrBlock\":\"0.0.0.0/0\", \"networkEntityId\":\"$igw_ocid\"}]"

    $ rt_ocid=`oci network route-table create --vcn-id $vcn_ocid --display-name cli-rt
    --route-rules "$route_rules" --query "data.id" | tr -d ''"''`

    $ echo $rt_ocid

    ocid1.routetable.oc1.eu-frankfurt-1.aa.........ukqcjq

    ```


    Before invoking the `oci network route-table create` command, a supplementary
    variable `called route_rules` with a single route rule referencing the Internet
    gateway has been created. Again, we are persisting the cloud identifier of the
    route table in a variable. We will need it while creating a subnet. This is how
    you create a subnet using the CLI:


    ```

    $ ad1=`oci iam availability-domain list --query data[0].name | tr -d ''"''`

    $ echo $ad1

    feDV:EU-FRANKFURT-1-AD-1

    $ subnet_ocid=`oci network subnet create --vcn-id $vcn_ocid --display-name cli-vcn
    --cidr-block "192.168.3.0/30" --prohibit-public-ip-on-vnic false --availability-domain
    $ad1 --route-table-id $rt_ocid --query data.id | tr -d ''"''`

    $ echo $subnet_ocid

    ocid1.subnet.oc1.eu-frankfurt-1.aa.........sqyz6a

    ```


    This time, we made two calls to the OCI REST API using the CLI. Initially, we
    fetched the name of the first availability domain in our current region and saved
    it to a new variable. Second, we created a new AD-specific subnet with a narrow
    addressing space of 192.168.3.0/30, which gives us just a single usable IPv4 address:
    192.168.3.2\. Why just one? OCI reserves the first two addresses and the last
    address in each VCN subnet.


    We are ready to provision a new compute instance. Please make sure there is an
    SSH public key present under `~/oci_id_rsa.pub`. You created an SSH keypair in
    Chapter [2](#478313_1_En_2_Chapter.xhtml). The keypair will be required to enable
    remote access to the instance. This is how you launch a new compute instance using
    the CLI:


    ```

    $ image_ocid=`oci compute image list --shape "VM.Standard2.1" --operating-system
    "CentOS" --operating-system-version 7 --sort-by TIMECREATED --query data[0].id
    | tr -d ''"''`

    $ echo $image_ocid

    ocid1.image.oc1.eu-frankfurt-1.aa.........hl2cma

    $ vm_ocid=`oci compute instance launch --display-name cli-vm --availability-domain
    "$ad1" --subnet-id "$subnet_ocid" --private-ip 192.168.3.2 --image-id "$image_ocid"
    --shape VM.Standard2.1 --ssh-authorized-keys-file ~/oci_id_rsa.pub --wait-for-state
    RUNNING --query data.id | tr -d ''"''`

    Action completed. Waiting until the resource has entered state: RUNNING

    $ echo $vm_ocid

    ocid1.instance.oc1.eu-frankfurt-1.ab.........wsbmoq

    ```


    Each compute instance must be based on an image that provides an operating system
    and, optionally, additional preinstalled software. The OCI CLI command that launches
    a compute instance requires an OCID of the image. This is why we query for the
    OCID of the newest shape-compatible CentOS 7 base operating system image in the
    first place. Subsequently, we issue `the oci compute instance launch` command
    providing a display name (`--display-name`) to be used, a preferred private IP
    address (`--private-id`), and a desired shape (`--shape`) that defines the profile
    of the allocated hardware resources and identifiers for the subnet (`--subnet-id`)
    and the image `(--image-id`). A target availability domain (`--availability-domain`)
    must be the same as the one used for the subnet. Finally, we tell OCI to wait
    until the instance enters the `RUNNING` state. If we had skipped that part, the
    CLI would have returned before the provisioning process had completed. Figure
    [3-8](#478313_1_En_3_Chapter.xhtml#Fig8) presents the instance in the `RUNNING`
    state as shown in the OCI Console.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig8_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Compute instance provisioned with the CLI


    Do you remember that we discussed the `oci_cli_rc` configuration file? Have you
    spotted any parameter that was always the same while we were executing the commands
    to launch a compute instance? Each command defined a `--query` parameter with
    the same `data.id` string as a value. In theory, looking at this usage pattern,
    you could consider adding it to the `oci_cli_rc` configuration file. In reality,
    this query is a bit too trivial to be stored in the `oci_cli_rc` file, but feel
    free to do so, if you want.


    As a matter of fact, you will use the CLI more often to query for data. The compute
    instance we’ve just launched is running in a public subnet and has been assigned
    an ephemeral public IPv4 address. Let’s find out the exact value of this public
    IP address. As we’ve saved the OCID of the compute instance as a variable (`vm_ocid`),
    we can reuse this value now. This is how you query for a public IP address of
    a compute instance running in a public subnet:


    ```

    $ oci compute instance list-vnics --instance-id "$vm_ocid" --query data[0].\"public-ip\"
    --raw-output

    130.61.89.229

    ```


    The CLI is based on a *procedural approach* when provisioning resources or querying
    for data. You specify the actions in a particular sequence that is taken by the
    CLI. These actions, issued as the CLI commands, are often mapped 1:1 into OCI
    REST API requests. Dependencies between resource types must be respected and taken
    into consideration in planning the action sequence. Similarly, if you delete the
    resources, the sequence must be usually inverted. This is how you terminate and
    delete previously created resources:'
  trans: '### 使用命令行界面


    我之前提到过，命令行界面可能提供 OCI 控制台中不可用的功能，但如果某个操作在 OCI 控制台中是可行的，那么使用命令行界面时同样也能做到。这就是为什么，如果你发现在
    OCI 控制台中执行的一些重复性任务耗费了你太多时间，可以考虑使用命令行界面将它们自动化。在本节中，你将看到如何使用 OCI CLI 启动一个计算实例。


    我假设你已经按照上一节的说明创建了 `oci_cli_rc` 文件。清单 3-10 展示了从现在开始所需的最小配置内容。`Sandbox` 部门的 OCID
    值存在于 DEFAULT 配置文件中。


    ```

    [DEFAULT]

    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa

    清单 3-10

    包含基础设施部门的 OCI CLI RC 文件

    ```


    让我们首先确保我们即将在正确的部门中配置 OCI 资源。执行此命令后，你应该能看到 `Sandbox` 部门的名称：


    ```

    $ oci iam compartment get --output table --query "data.{CompartmentName:\"name\"}"

    +-----------------+

    | CompartmentName |

    +-----------------+

    | Sandbox         |

    +-----------------+

    ```


    如果你阅读了第 2 章，你可能还记得计算实例必须存在于作为 VCN 一部分的子网中。这是一个创建新 VCN（命名为 `cli-vcn`）的 CLI 命令，它使用
    192.168.3.0/24 地址空间：


    ```

    $ vcn_ocid=`oci network vcn create --cidr-block 192.168.3.0/24 --display-name
    cli-vcn --query "data.id" | tr -d ''"''`

    $ echo $vcn_ocid

    ocid1.vcn.oc1.eu-frankfurt-1.aa.........lg4b7w

    ```


    我使用 `--query` 参数过滤了输出，用 `tr` 程序去掉了括号，并将新生成的 VCN OCID 保存为一个名为 `vcn_ocid` 的 bash
    变量。为什么？因为我们在创建互联网网关和子网时，需要将 VCN OCID 作为输入参数。这是一个在 VCN 内配置新互联网网关的 CLI 命令：


    ```

    $ igw_ocid=`oci network internet-gateway create --vcn-id $vcn_ocid --display-name
    cli-igw --is-enabled true --query "data.id" | tr -d ''"''`

    $ echo $igw_ocid

    ocid1.internetgateway.oc1.eu-frankfurt-1.aa.........2ptvoa

    ```


    为了启用与互联网的连接，我们将添加一条路由规则，将 VCN 中所有出站流量导向互联网网关。这是添加包含相关路由规则的新路由表的命令：


    ```

    $ route_rules="[{\"cidrBlock\":\"0.0.0.0/0\", \"networkEntityId\":\"$igw_ocid\"}]"

    $ rt_ocid=`oci network route-table create --vcn-id $vcn_ocid --display-name cli-rt
    --route-rules "$route_rules" --query "data.id" | tr -d ''"''`

    $ echo $rt_ocid

    ocid1.routetable.oc1.eu-frankfurt-1.aa.........ukqcjq

    ```


    在调用 `oci network route-table create` 命令之前，已经创建了一个名为 `route_rules` 的补充变量，其中包含一条引用互联网网关的单一路由规则。同样，我们将路由表的云标识符持久化在一个变量中。我们在创建子网时需要它。以下是使用
    CLI 创建子网的方法：


    ```

    $ ad1=`oci iam availability-domain list --query data[0].name | tr -d ''"''`

    $ echo $ad1

    feDV:EU-FRANKFURT-1-AD-1

    $ subnet_ocid=`oci network subnet create --vcn-id $vcn_ocid --display-name cli-vcn
    --cidr-block "192.168.3.0/30" --prohibit-public-ip-on-vnic false --availability-domain
    $ad1 --route-table-id $rt_ocid --query data.id | tr -d ''"''`

    $ echo $subnet_ocid

    ocid1.subnet.oc1.eu-frankfurt-1.aa.........sqyz6a

    ```


    这次，我们使用 CLI 调用了两次 OCI REST API。首先，我们获取了当前区域中第一个可用域的名称，并将其保存到一个新变量中。其次，我们创建了一个新的特定于可用域的子网，其地址空间狭窄，为
    192.168.3.0/30，这仅给我们提供了一个可用的 IPv4 地址：192.168.3.2。为什么只有一个？OCI 在每个 VCN 子网中保留了前两个地址和最后一个地址。


    我们已经准备好配置一个新的计算实例。请确保 `~/oci_id_rsa.pub` 下存在一个 SSH 公钥。你在第 2 章创建了一个 SSH 密钥对。该密钥对将用于启用对实例的远程访问。以下是使用
    CLI 启动新计算实例的方法：


    ```

    $ image_ocid=`oci compute image list --shape "VM.Standard2.1" --operating-system
    "CentOS" --operating-system-version 7 --sort-by TIMECREATED --query data[0].id
    | tr -d ''"''`

    $ echo $image_ocid

    ocid1.image.oc1.eu-frankfurt-1.aa.........hl2cma

    $ vm_ocid=`oci compute instance launch --display-name cli-vm --availability-domain
    "$ad1" --subnet-id "$subnet_ocid" --private-ip 192.168.3.2 --image-id "$image_ocid"
    --shape VM.Standard2.1 --ssh-authorized-keys-file ~/oci_id_rsa.pub --wait-for-state
    RUNNING --query data.id | tr -d ''"''`

    Action completed. Waiting until the resource has entered state: RUNNING

    $ echo $vm_ocid

    ocid1.instance.oc1.eu-frankfurt-1.ab.........wsbmoq

    ```


    每个计算实例都必须基于一个提供操作系统以及（可选）其他预装软件的镜像。启动计算实例的 OCI CLI 命令需要该镜像的 OCID。这就是为什么我们首先查询最新的、与指定硬件配置兼容的
    CentOS 7 基础操作系统镜像的 OCID。随后，我们发出 `oci compute instance launch` 命令，提供要使用的显示名称 (`--display-name`)、首选私有
    IP 地址 (`--private-ip`)、定义已分配硬件资源配置的期望硬件配置 (`--shape`)、子网标识符 (`--subnet-id`) 和镜像标识符
    (`--image-id`)。目标可用域 (`--availability-domain`) 必须与用于子网的可用域相同。最后，我们告诉 OCI 等待实例进入
    `RUNNING` 状态。如果我们跳过这一步，CLI 会在配置过程完成之前就返回结果。图 3-8 展示了在 OCI 控制台中显示的、处于 `RUNNING`
    状态的实例。


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig8_HTML.jpg](img/478313_1_En_3_Fig8_HTML.jpg)


    图 3-8：使用命令行界面配置的计算实例


    你还记得我们讨论过 `oci_cli_rc` 配置文件吗？你是否发现我们在执行启动计算实例的命令时，有哪个参数总是相同的？每个命令都定义了一个 `--query`
    参数，其值都是相同的 `data.id` 字符串。理论上，看到这种使用模式，你可以考虑将其添加到 `oci_cli_rc` 配置文件中。实际上，这个查询有点过于简单，不值得存储在
    `oci_cli_rc` 文件中，但如果你愿意，可以随意添加。


    事实上，你会更频繁地使用 CLI 来查询数据。我们刚刚启动的计算实例运行在一个公共子网中，并被分配了一个临时的公共 IPv4 地址。让我们找出这个公共 IP
    地址的确切值。由于我们已经将计算实例的 OCID 保存为一个变量 (`vm_ocid`)，我们现在可以复用这个值。以下是查询运行在公共子网中的计算实例的公共
    IP 地址的方法：


    ```

    $ oci compute instance list-vnics --instance-id "$vm_ocid" --query data[0].\"public-ip\"
    --raw-output

    130.61.89.229

    ```


    CLI 在配置资源或查询数据时基于一种过程式方法。你按照 CLI 执行的特定顺序指定操作。这些作为 CLI 命令发出的操作，通常会 1:1 地映射为 OCI
    REST API 请求。资源类型之间的依赖关系必须被遵守，并在规划操作顺序时加以考虑。同样地，如果你要删除资源，顺序通常也需要颠倒。以下是终止并删除先前创建资源的方法：'
- fmt: "```\n$ oci compute instance terminate --instance-id $vm_ocid --wait-for-state\
    \ TERMINATED\nAre you sure you want to delete this resource? [y/N]: y\nAction\
    \ completed. Waiting until the resource has entered state: TERMINATED\n$ oci network\
    \ subnet delete --subnet-id $subnet_ocid --wait-for-state TERMINATED\nAre you\
    \ sure you want to delete this resource? [y/N]: y\nAction completed. Waiting until\
    \ the resource has entered state: TERMINATED\n$ oci network route-table delete\
    \ --rt-id $rt_ocid --wait-for-state TERMINATED\nAre you sure you want to delete\
    \ this resource? [y/N]: y\nAction completed. Waiting until the resource has entered\
    \ state: TERMINATED\n$ oci network internet-gateway delete --ig-id $igw_ocid --wait-for-state\
    \ TERMINATED\nAre you sure you want to delete this resource? [y/N]: y\nAction\
    \ completed. Waiting until the resource has entered state: TERMINATED\n$ oci network\
    \ vcn delete --vcn-id $vcn_ocid\nAre you sure you want to delete this resource?\
    \ [y/N]: y\n```\n\nIn the procedural approach, the responsibility to understand\
    \ what actions have to be taken and in which sequence is delegated to the programmer.\
    \ This can increase the complexity of the scripts, especially if you want to implement\
    \ various types of changes to the state of an existing infrastructure. In such\
    \ a case, you need to begin with finding out what the current state is, before\
    \ you plan the actions that would bring the infrastructure to the expected state.\
    \ It would have been much easier just to define the expected state and let a provisioning\
    \ tool detect what kind of actions have to be taken depending on the current state\
    \ of the infrastructure. This would be a declarative approach.\n\n## Terraform\n\
    \nTerraform is an infrastructure-as-code provisioning tool that tracks the state\
    \ of the infrastructure it is managing to enable the *declarative approach*. Instead\
    \ of defining and sequencing actions, as you are doing while working with the\
    \ CLI, Terraform lets you define the expected state of your infrastructure. Next,\
    \ it becomes the job of Terraform to detect what kind of actions, and in which\
    \ sequence, have to be taken to bring the cloud resources to the expected state.\
    \ You do not need to worry about any intermediary states. Only the result matters.\n\
    \nTerraform supports a diverse range of cloud providers through a set of plugins\
    \ called *providers*. When you initiate a new project using the `terraform init`\
    \ command, Terraform reads your configuration files in this directory, detects\
    \ which provider to use, and downloads the newest version of a particular provider\
    \ plugin. It is the provider plugin that is responsible for interacting with,\
    \ in our case, Oracle Cloud Infrastructure REST APIs, as shown in Figure 3-9.\n\
    \n![Figure 3-9](images/478313_1_En_3_Chapter/478313_1_En_3_Fig9_HTML.jpg)\n\n\
    Figure 3-9. Terraform\n\nLet’s take a closer look at the concept of infrastructure\
    \ as code.\n\n### Infrastructure as Code\n\nThe concept behind *infrastructure\
    \ as code* is simple. You define your target cloud infrastructure, which consists\
    \ of virtual cloud networks, compute instances, instance pools, custom images,\
    \ various types of storage, managed database instances, managed Kubernetes clusters,\
    \ and other cloud resources, in one or more configuration files. We often say\
    \ that you write the *infrastructure code*. If you are using Terraform, the configuration\
    \ files, or simply the infrastructure code, use JSON-like HashiCorp Language (HCL)\
    \ syntax. Listing 3-11 presents a sample compute instance definition in HCL syntax.\n\
    \n```\nresource \"oci_core_instance\" \"bastion_vm\" {\n  compartment_id     \
    \ = var.compartment_ocid\n  display_name        = \"bastion-vm\"\n  availability_domain\
