  trans: "\n如果简单地写成这样的字符串，命令会先被写入一个文件，然后传递给操作系统 shell 进行处理：\n\n```\nruncmd:\n- mkdir\
    \ -p /home/opc/uuidservice/venv\n```\n\n虽然从性能角度来看，前一种方式可能被认为稍快一些，但只有后一种方式允许你使用管道组合多个命令，像这样：\n\
    \n```\nruncmd:\n- 'echo $(date) | tee /home/opc/datemarker'\n```\n\n在同一个 `runcmd`\
    \ 部分混合使用这两种风格是可以的。\n\n**提示**\n与其直接从清单 2-3 复制用户数据文件，我建议你从我的 GitHub 账户克隆与本书关联的 Git\
    \ 仓库，并使用在 `oci-book/chapter02/cloud-init` 找到的 cloud-init 用户数据文件。这样，如果将来有变动，你将能享受始终最新的代码。\n\
    \n现在，请准备好我们刚刚讨论的两个文件。\n- 公共 SSH 密钥\n- UUID 服务的用户数据文件\n\n我们已经准备好启动实例了。以下是你如何使用\
    \ OCI 控制台创建新的计算实例：\n\n1.  转到菜单 ➤ 计算 ➤ 实例。\n2.  确保选择了 `Sandbox` 隔离区。\n3.  点击创建实例。\n\
    4.  将你的实例命名为 **uuid-1**。\n5.  点击显示计算形状、网络和存储选项。\n6.  将映像源设置为最新的 Oracle Linux 基础映像，例如\
    \ Oracle Linux 7.6 或更新版本。\n7.  提供所需详细信息：\n    1.  选择你所在区域的第一个可用性域。\n    2.  将实例类型设置为虚拟机。\n\
    \    3.  选择 `VM.Standard2.1` 作为你的实例计算形状。\n8.  在“配置网络”部分，如图 2-22 所示：\n    1.  确保选择了你新建的\
    \ a-net 子网。\n    2.  勾选“分配公有 IP 地址”。\n9.  在“添加 SSH 密钥”部分：\n    1.  选择新生成的公钥（`oci_id_rsa.pub`），如图\
    \ 2-21 所示。\n10. 点击“显示高级选项”。\n11. 在高级选项下的“管理”选项卡上，如图 2-23 所示：\n    1.  选择清单 2-3\
    \ 中显示的用户数据文件。你总能在我的 GitHub 账户的 [`https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/cloud-init/vm.config.yaml`](https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/cloud-init/vm.config.yaml)\
    \ 找到用户数据文件的最新版本。\n12. 在高级选项下的“网络”选项卡上，如图 2-24 所示：\n    1.  将私有 IP 地址设置为 **192.168.1.2**。\n\
    \    2.  将主机名设置为 **uuid1**。\n13. 点击“创建”。\n\n图 2-20 显示了 OCI 控制台中的实例创建视图。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig20_HTML.jpg](img/478313_1_En_2_Fig20_HTML.jpg)\n\
    *图 2-20. 在 OCI 控制台中创建新的计算实例*\n\n图 2-21 显示了 OCI 控制台实例创建向导中的 SSH 密钥上传部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig21_HTML.jpg](img/478313_1_En_2_Fig21_HTML.jpg)\n\
    *图 2-21. 在实例创建向导中上传 SSH 公钥*\n\n图 2-22 显示了 OCI 控制台实例创建向导中的网络配置部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig22_HTML.jpg](img/478313_1_En_2_Fig22_HTML.jpg)\n\
    *图 2-22. 在实例创建向导中配置网络*\n\n图 2-23 显示了 OCI 控制台实例创建向导中的用户数据上传部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig23_HTML.jpg](img/478313_1_En_2_Fig23_HTML.jpg)\n\
    *图 2-23. 在 OCI 控制台实例创建向导中上传用户数据*\n\n图 2-24 显示了 OCI 控制台实例创建向导中的高级网络配置部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig24_HTML.jpg](img/478313_1_En_2_Fig24_HTML.jpg)\n\
    *图 2-24. 在实例创建向导中配置高级网络*\n\n配置此计算形状和基础映像通常需要大约一分钟。我们已勾选了“分配公有 IP 地址”复选框；因此，附加到你实例上的主虚拟网络接口卡（vNIC）将从\
    \ Oracle Cloud 的公有 IPv4 地址池中获得一个分配的公有 IP 地址。只要子网的安全列表规则允许特定流量，你就可以使用此 IP 地址连接到实例。私有\
    \ IP 地址在虚拟云网络（VCN）内使用，以实现计算实例之间的本地通信。\n\n图 2-25 显示了 OCI 控制台中的计算实例配置过程。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig25_HTML.jpg](img/478313_1_En_2_Fig25_HTML.jpg)\n\
    *图 2-25. OCI 控制台中的计算实例配置*\n\n图 2-26 显示了 OCI 控制台中正在运行的计算实例。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig26_HTML.jpg](img/478313_1_En_2_Fig26_HTML.jpg)\n\
    *图 2-26. 在 OCI 控制台中查看正在运行的计算实例*\n\n## 测试应用程序\n\n云解决方案通常被设计和自动化，使得无需在终端中手动运行任何额外的初始化脚本。你从一开始就使用自定义映像和包含初始化指令的用户数据相结合的方式，以开箱即用的状态部署你的解决方案。这也适用于我们的\
    \ UUID 服务。一旦实例的启动过程完成并且 `cloud-init` 执行了所有用户数据指令，API 就启动并运行了。\n\n### SSH 连接\n\n\
    不过，让我在这里破个例。我想带你看看实例内部，而使用操作系统 shell 是再好不过的方式了。让我们使用 `ssh` 远程连接到 `uuid-1` 计算实例。你可以在实例详情中找到实例的公有\
    \ IP，如图 2-26 所示。在我的例子中，它是 `130.61.91.155`。尽管你将使用基于密钥的认证，但仍然需要指定你建立连接所用的用户名。对于\
    \ Oracle Linux 和 CentOS，请使用 `opc` 用户名。对于 Ubuntu，请使用 `ubuntu` 用户名。\n\n```\n$ UUID1_INSTANCE=130.61.91.155\n\
    $ ssh -i ~/oci_id_rsa opc@$UUID1_INSTANCE\n```\n\n还有一件事，如果你在看到实例状态从“配置中”变为“运行中”后无法立即连接到终端，请不要惊讶。即使实例被称为“运行中”，启动\
    \ SSH 守护进程可能还需要几秒钟时间。\n\n**提示**\n如果你使用的是 Windows，我建议使用 Windows Subsystem for Linux、Linux\
    \ 客户机虚拟机或 Git Bash，以获得与使用 UNIX 平台相同的 `ssh` 体验。\n\n图 2-27 显示了如何连接到远程计算实例。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig27_HTML.jpg](img/478313_1_En_2_Fig27_HTML.jpg)\n\
    *图 2-27. 通过 SSH 连接到计算实例*\n\n恭喜，你刚刚进入了云空间。\n"
- fmt: '### Waiting for cloud-init


    在采取任何操作之前，我们首先要确认用户数据指令是否已执行完毕。在清单 [2-3](#478313_1_En_2_Chapter.xhtml#PC5) 的底部，你会看到
    `final message`。顾名思义，这是 cloud-init 处理的最后一条指令。图 [2-28](#478313_1_En_2_Chapter.xhtml#Fig28)
    展示了在日志（`/var/log/cloud-init.log`）中找到该消息（“UUID Service API node is running”）的最简单方法。一些
    cloud-init 指令可能需要较长时间，特别是当它们从远程仓库下载或更新软件时。在我们的案例中，完成所有初始化步骤花了四分钟。这意味着什么？如果你看不到这条消息，就需要再等待一会儿。你可以使用
    `tail -f` 命令，通过观察 `/var/log/cloud-init.log` 文件来监看进度。根据正在更新的软件包数量，此操作可能持续几分钟。在日志中看到此消息之前，请不要继续下一步，如图
    [2-28](#478313_1_En_2_Chapter.xhtml#Fig28) 所示。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig28_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig28_HTML.jpg)


    图 2-28


    通过 SSH 连接到计算实例


    ```

    [opc@uuid1]$ sudo cat /var/log/cloud-init.log | grep "node is running"

    ```


    我们的服务真的在运行吗？眼见为实。你可以运行此命令来再次检查 systemd 服务状态：


    ```

    [opc@uuid1]$ sudo systemctl status uuidservice.service

    ```


    图 [2-29](#478313_1_En_2_Chapter.xhtml#Fig29) 显示了预期的输出。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig29_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig29_HTML.jpg)


    图 2-29


    UUID 服务的预期 systemd 服务状态


    服务真的在监听端口 5000 吗？用这个命令检查：


    ```

    [opc@uuid1]$ ss -nltp

    ```


    图 [2-30](#478313_1_En_2_Chapter.xhtml#Fig30) 显示了预期的输出。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig30_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig30_HTML.jpg)


    图 2-30


    查看 UUID 服务监听连接的端口


    看起来我们的第一个云应用程序确实正在运行。


    ### Open Ports


    在未来云项目中需要排查的典型问题通常与 VCN 安全规则和操作系统防火墙规则相关。仅仅为计算实例所连接的子网使用的安全列表添加一条 VCN 安全规则是不够的。你还需要在操作系统防火墙中打开所需的端口。如果我们查看上传到
    `uuid-1` 实例的用户数据，你会清楚地看到我们添加了一条打开端口 5000 的规则。你可以在实例的 shell 中运行此命令来确认规则已创建：


    ```

    [opc@uuid1]$ sudo firewall-cmd --list-ports

    ```


    图 [2-31](#478313_1_En_2_Chapter.xhtml#Fig31) 显示了预期的输出。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig31_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig31_HTML.jpg)


    图 2-31


    列出 uuid-1 上的开放端口


    现在，你可以通过执行 `exit` 命令断开与实例的连接。


    ### API 测试


    终于到了！是时候执行一个简单的冒烟测试，看看 UUID 服务是否真的在云中可用。我们正在处理一个 REST API，它只包含一个资源 `identifiers`，并且只支持一种方法
    `GET`。这再简单不过了。在我们的首次尝试中，将使用 `curl` 命令。它在 Mac/Linux 控制台、Windows Subsystem for Linux
    和 Windows 的 GitBash 上都可用。请断开与云实例的连接，并发出以下命令，根据你的实例所附加的公网 IP 进行调整：


    ```

    $ curl -is $UUID1_INSTANCE:5000/identifiers

    ```


    你应该会看到类似图 [2-32](#478313_1_En_2_Chapter.xhtml#Fig32) 的内容。除了 IP 地址，`uuid` 元素会有所不同，因为按定义它应该是唯一的，不是吗？


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig32_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig32_HTML.jpg)


    图 2-32


    使用 curl 测试 UUID 服务 API


    如果你更喜欢像 Postman 这样的图形化工具，你会看到类似图 [2-33](#478313_1_En_2_Chapter.xhtml#Fig33) 的内容。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig33_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig33_HTML.jpg)


    图 2-33


    使用 Postman 测试 UUID API


    干得好！你已经达到了应用程序运行并成功测试的阶段。总结一下，我们设法配置了一个带有互联网网关的新 VCN，创建了一个新的公有子网，并添加了一条新的路由规则以通过互联网网关引导出站流量，以及一条安全规则以允许到任何应用此规则的计算实例上端口
    5000 的入站 TCP 流量。在首次启动时，计算实例下载了所有必需的软件包，创建了 Python 虚拟环境，从 GitHub 下载了 UUID 服务代码，并为应用程序安装了一个新的
    systemd 服务。图 [2-34](#478313_1_En_2_Chapter.xhtml#Fig34) 展示了我们所构建内容的基础设施示意图。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig34_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig34_HTML.jpg)


    图 2-34


    单 UUID 服务 API 节点基础设施示意图


    在下一节中，你将手动横向扩展 API。这意味着什么？你将在另一个可用性域中创建第二个实例，并在两个实例之上创建一个负载均衡器。这样，设置将具备容错能力。


    ### Scaling Out


    *横向扩展*一个应用程序意味着添加更多通常是相同类型的实例。这是描述水平扩展的另一个术语。你想要扩展应用程序的原因有两个：


    *   提高处理吞吐能力

    *   增加容错能力


    单个实例永远不足以提供可靠的云 API。然而，仍然可能出问题，摧毁你孤立的应用程序节点。如果你有多个执行相同职责的节点，并且分布在各个数据中心，那么即使单个数据中心发生故障，你也可能永远不会经历完全停机。此外，如果你有更多相同类型的实例，就可以并行处理更多的请求。事情就这么简单。


    图 [2-35](#478313_1_En_2_Chapter.xhtml#Fig35) 展示了水平扩展。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig35_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig35_HTML.jpg)


    图 2-35


    水平扩展应用程序


    基本的云概念之一是自动伸缩。*自动伸缩* 发生在云控制平面根据变化的指标（如请求数或 CPU 利用率）动态地通过添加或移除实例节点来水平扩展应用程序时。我们将在本书后面更详细地讨论自动伸缩。在本节中，我将向你展示如何使用自定义镜像手动扩展应用程序。'
  raw: '### Waiting for cloud-init


    Before you take any action, we are going to find out whether the user data instructions
    have been completed. At the bottom of Listing [2-3](#478313_1_En_2_Chapter.xhtml#PC5),
    you will find `final message`. As the name says, this is the last instruction
    that is processed by cloud-init. Figure [2-28](#478313_1_En_2_Chapter.xhtml#Fig28)
    shows the easiest way to find the message (“UUID Service API node is running”)
    in the log (`/var/log/cloud-init.log`). Some cloud-init instructions can last
    a while, especially if they download or update software from remote repositories.
    In our case, it took four minutes to finish all the initialization steps. What
    does this mean? If you cannot see this message, you need to wait a bit. You can
    use the `tail -f` command and watch the progress by observing the `/var/log/cloud-init.log`
    file. Depending on the number of packages that are being updated, this operation
    can last a few minutes. Do not continue until you see this message in the log,
    as presented in Figure [2-28](#478313_1_En_2_Chapter.xhtml#Fig28).


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig28_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig28_HTML.jpg)


    Figure 2-28


    Connecting to a compute instance over SSH


    ```

    [opc@uuid1]$ sudo cat /var/log/cloud-init.log | grep "node is running"

    ```


    Is our service really running? Seeing is believing. You can run this command to
    double-check the systemd service status:


    ```

    [opc@uuid1]$ sudo systemctl status uuidservice.service

    ```


    Figure [2-29](#478313_1_En_2_Chapter.xhtml#Fig29) shows the expected output.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig29_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig29_HTML.jpg)


    Figure 2-29


    Expected systemd service status for the UUID service


    Is the service really listening on port 5000? Check it with this command:


    ```

    [opc@uuid1]$ ss -nltp

    ```


    Figure [2-30](#478313_1_En_2_Chapter.xhtml#Fig30) shows the expected output.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig30_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig30_HTML.jpg)


    Figure 2-30


    Viewing the port on which the UUID service is listening for connections


    It seems our first cloud application is indeed running.


    ### Open Ports


    Typical problems you may need to troubleshoot on your future cloud projects are
    related to VCN security rules and operating system firewall rules. It is not enough
    to add a VCN security rule to the security list that is used by a subnet to which
    a particular compute instance is attached. You also need to open a required port
    in the operating system firewall. If you look at the user data we’ve uploaded
    to the `uuid-1` instance, you will clearly see that we add a rule that opens port
    5000. You can run this command in the instance’s shell to confirm the rule has
    been created:


    ```

    [opc@uuid1]$ sudo firewall-cmd --list-ports

    ```


    Figure [2-31](#478313_1_En_2_Chapter.xhtml#Fig31) shows the expected output.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig31_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig31_HTML.jpg)


    Figure 2-31


    Listing open ports on uuid-1


    You can now disconnect from the instance by issuing the `exit` command.


    ### API Test


    Finally! It is time to perform a simple smoke test to see whether the UUID service
    is truly available in the cloud. We are dealing with a REST API that contains
    only one resource, `identifiers`, and supports only one method, `GET`. It cannot
    be easier. In our first attempt, we are going to use the `curl` command. It is
    available on the Mac/Linux console, Windows Subsystem for Linux, and GitBash on
    Windows. Please disconnect from the cloud instance and issue the following command,
    adapting it to include the public IP your instance has been attached to:


    ```

    $ curl -is $UUID1_INSTANCE:5000/identifiers

    ```


    You should see something like in Figure [2-32](#478313_1_En_2_Chapter.xhtml#Fig32).
    In addition to the IP address, the `uuid` element will be different because it
    is by definition unique, isn’t it?


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig32_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig32_HTML.jpg)


    Figure 2-32


    Testing the UUID service API using curl


    If you prefer graphical tools like Postman, you will see something like in Figure
    [2-33](#478313_1_En_2_Chapter.xhtml#Fig33).


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig33_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig33_HTML.jpg)


    Figure 2-33


    Testing the UUID API using Postman


    Well done! You’ve reached the point in which the application is running and has
    been successfully tested. To sum up, we’ve managed to provision a new VCN with
    an Internet gateway, create a new public subnet, and add a new route rule to direct
    the outbound traffic via the Internet gateway and security rule to allow incoming
    TCP traffic to port 5000 on any compute instance to which this rule applies. On
    its first boot, the compute instance downloaded all the required packages, created
    the Python virtual environment, downloaded the UUID service code from GitHub,
    and installed a new systemd service for the application. Figure [2-34](#478313_1_En_2_Chapter.xhtml#Fig34)
    shows an infrastructure diagram of what we’ve built.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig34_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig34_HTML.jpg)


    Figure 2-34


    Single UUID service API node infrastructure diagram


    In the next section, you will manually scale out the API. What does this mean?
    You will create a second instance in another availability domain and create a
    load balancer on top of the two instances. In this way, the setup will feature
    fault tolerance.


    ## Scaling Out


    *Scaling* out an application means adding more instances usually of the same type.
    This is another term that describes horizontal scaling. There are two reasons
    why you would want to scale an application out.


    *   Increasing processing throughput capacity


    *   Adding fault tolerance


    One instance is never enough to provide a reliable cloud API. However, something
    can still go wrong, annihilating your lonely application node. If you have more
    nodes that perform the same duty and are distributed across various data centers,
    you will probably never experience a full outage if a single data center fails.
    Moreover, if you have more instances of the same type, you can process a greater
    number of requests parallelly. It’s as simple as that.


    Figure [2-35](#478313_1_En_2_Chapter.xhtml#Fig35) presents horizontal scaling.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig35_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig35_HTML.jpg)


    Figure 2-35


    Horizontally scaling an application


    One of the fundamental cloud concepts is autoscaling. *Autoscaling* takes place
    when the cloud control plane dynamically scales an application horizontally by
    adding or removing instance nodes based on changing metrics such as request count
    or CPU utilization. We will discuss autoscaling in more detail later in the book.
    In this section, I will show you how to manually scale an application out by using
    custom images.'
