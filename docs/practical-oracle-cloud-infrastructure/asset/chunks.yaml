    ### Object Name Prefixes


    What if we are going to store the blueprints from different real estate projects
    in one bucket? A property in the Bemowo district in Warsaw can have an apartment
    on sale with the same number as another apartment in a different property in the
    Wola district. We could use name prefixes to avoid mixing up these two apartments.
    This time, we are going to generate an entire set of files that we will pretend
    are apartment blueprints. We are going to use three groups of files. The first
    group will consist of blueprints of apartments in a property in the Bemowo district
    in Warsaw.


    ```

    $ mkdir -p warsaw/bemowo

    $ for i in 101 102 105 107 115; do SIZE=$((4096+(10+RANDOM % 20)*1024)); head
    -c $SIZE /dev/urandom > warsaw/bemowo/$i.pdf; done

    ```


    The second group will imitate the blueprint files of apartments in building A
    that belong to a property in the Wola district in Warsaw.


    ```

    $ mkdir -p warsaw/wola/a

    $ for i in 115 120 124 130; do SIZE=$((4096+(10+RANDOM % 20)*1024)); head -c $SIZE
    /dev/urandom > warsaw/wola/a/$i.pdf; done

    ```


    The third group will pretend to be the blueprint files of flats in building B
    in the same property in the Wola district in Warsaw.


    ```

    $ mkdir -p warsaw/wola/b

    $ for i in 119 120 121; do SIZE=$((4096+(10+RANDOM % 20)*1024)); head -c $SIZE
    /dev/urandom > warsaw/wola/b/$i.pdf; done

    ```


    Good. You should end up with something like this:


    ```

    $ find warsaw -type f -exec ls -lh {} + | awk ''{ print $9 " (" $5 ")"}''

    warsaw/bemowo/101.pdf (29K)

    warsaw/bemowo/102.pdf (30K)

    warsaw/bemowo/105.pdf (18K)

    warsaw/bemowo/107.pdf (23K)

    warsaw/bemowo/115.pdf (33K)

    warsaw/wola/a/115.pdf (32K)

    warsaw/wola/a/120.pdf (21K)

    warsaw/wola/a/124.pdf (15K)

    warsaw/wola/a/130.pdf (31K)

    warsaw/wola/b/119.pdf (21K)

    warsaw/wola/b/120.pdf (29K)

    warsaw/wola/b/121.pdf (18K)

    ```


    The CLI comes with a convenient trio of *bulk commands* that let you upload, download,
    and delete objects in groups. We are now going to upload the blueprints from `the
    warsaw/bemowo` local directory to the `blueprints` bucket as new objects prefixed
    with the `waw/bemowo/` string like this:


    ```

    $ oci os object bulk-upload -bn blueprints --src-dir warsaw/bemowo/ --object-prefix
    "waw/bemowo/" --include "*.pdf" --profile SANDBOX-USER

    {

    "skipped-objects": [],

    "upload-failures": {},

    "uploaded-objects": {

    "waw/bemowo/101.pdf": {...}

