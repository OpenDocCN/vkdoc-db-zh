    $ cd ~/git/oci-book/chapter07/1-setup/

    $ oci iam policy create --name sandbox-users-adw-storage-policy --statements file://sandbox-users.policies.adwstorage.json
    --description "ADW-Storage-related policy for regular Sandbox users" --profile
    SANDBOX-ADMIN

    ```


    With the new policy in place, we are ready to upload the files that hold various
    input data for new ADW tables to the `roadadw-load` object storage bucket. At
    this stage, it may be worth mentioning what these files are and how we are going
    to use them.'
  trans: '

    ## 向 ADW 加载数据


    自治数据库 (Autonomous Database) 是一项基于云的托管数据库服务。从文件加载数据的推荐方法是：将文件上传至对象存储桶，然后执行 `DBMS_CLOUD.COPY_DATA`
    过程来解析这些文件并将数据插入数据库表。此过程能够从以下来源加载数据：


    *   Oracle Cloud Infrastructure 对象存储

    *   Azure Blob Storage

    *   Amazon S3


    使用与 ADB 实例处于同一区域的 Oracle Cloud Infrastructure 对象存储桶可以实现最短的数据加载时间，但使用其他组合也完全没有问题。ADW
    实例代表特定的 IAM 用户访问 OCI 对象存储。


    ### 数据库凭证


    `DBMS_CLOUD.COPY_DATA` 过程引用一个 `Credential` 数据库对象，该对象保存访问基于云的对象存储所需的认证详细信息。对于 OCI
    对象存储，IAM 用户必须持有一个有效的身份验证令牌 (Auth Token)，该令牌将与此用户名一起保存在此 `Credential` 对象中。令牌是一个相对较短的、由
    Oracle 生成的字符串。任何 IAM 用户最多可以同时拥有两个身份验证令牌。用户可以自行创建令牌，管理员也可以使用 OCI 控制台或利用基于 API 的自动化工具（如
    OCI CLI）随意创建令牌。


    以下是你在 OCI 控制台中以 `sandbox-user` 身份生成身份验证令牌的步骤：


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig14_HTML.jpg](img/478313_1_En_7_Fig14_HTML.jpg)


    图 7-14：在 OCI 控制台中访问用户配置文件


    1.  以 `sandbox-user` 身份登录 OCI 控制台。

    2.  点击用户名进入用户配置文件，如图 7-14 所示。

    3.  在“资源”选项卡上，单击“身份验证令牌”。

    4.  单击“生成令牌”。

    5.  为令牌提供描述，然后单击“生成令牌”。

    6.  记下你的令牌。你只会看到它一次。


    必须记住，新生成的身份验证令牌你只会看到一次，如图 7-15 所示。如果丢失，你必须删除旧令牌并生成一个新令牌。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig15_HTML.jpg](img/478313_1_En_7_Fig15_HTML.jpg)


    图 7-15：查看生成的令牌


    要以编程方式为选定用户生成身份验证令牌，你可以使用默认配置文件（无 `--profile` 参数）代表租户管理员执行以下 CLI 命令。首先查询特定用户的
    OCID，然后对该用户使用 `iam auth-token create` CLI 命令。


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ IAM_USER_OCID=`oci iam user list -c $TENANCY_OCID --query "data[?name==''sandbox-user'']
    | [0].id" --raw-output --all`

    $ echo $IAM_USER_OCID

    ocid1.user.oc1..aa.........zqpxa

    $ oci iam auth-token create --user-id $IAM_USER_OCID --description token-adw --query
    ‘data.token’ --raw-output

    B8.E_Ry7oOtN1KF0do9x

    ```


    无论你选择哪种方式，请确保你拥有 `sandbox-user` IAM 用户的身份验证令牌。


    名为 `SANDBOX_USER` 的新数据库用户与我们在前几章中一直使用的 `sandbox-user` IAM 用户完全独立。我们现在将创建一个数据库
    `Credential` 对象来存储 `sandbox-user` IAM 用户的用户名和身份验证令牌。这些详细信息将以加密格式存储在数据库中。每次你执行
    `DBMS_CLOUD.COPY_DATA` 过程将对象存储中的数据加载到数据库表时，你都需要提供要使用的 `Credential` 对象的名称。


    > **提示**

    >

    > 从现在开始，大多数 SQL 命令都需要以 `SANDBOX_ADMIN` 的身份在 SQL Developer Web 中执行。请确保你打开了正确的 SQL
    Developer Web 实例，使用前面几段描述的用户特定链接。


    以 `SANDBOX_USER` 数据库用户身份打开 SQL Developer Web，将 SQL 过程放在工作表中，使用你新生成的身份验证令牌作为密码参数的值，并执行以下命令：


    ```

    BEGIN

    DBMS_CLOUD.CREATE_CREDENTIAL(

    credential_name => ''OCI_SANDBOX_USER'',

    username => ''sandbox-user'',

    password => ''B8.E_Ry7oOtN1KF0do9x''

    );

    END;

    ```


    `Credential` 对象存在于特定的用户模式中，并且只能由有权访问该模式的用户访问。按照惯例，每个 Oracle Database 模式都与同名的单个数据库用户相关联。你可以假设，默认情况下，只允许
    `Credential` 所有者用户引用此 `Credential` 对象。要删除现有的 `Credential` 对象，你应依赖 `DBMS_CLOUD.DROP_CREDENTIAL`
    过程。要列出给定模式中现有的 `Credential` 对象，你可以使用以下 SQL 查询（作为模式所有者）：


    ```

    SELECT * FROM all_credentials;

    ```


    将文件数据加载到 ADB 可以总结为三个步骤。我们稍后将遵循这些步骤。


    1.  将支持的格式（如 `.csv`）的源文件上传到对象存储桶。

    2.  如果表尚不存在，则为导入的数据创建一个新的数据库表。

    3.  执行 `DBMS_CLOUD.COPY_DATA` 以填充表。


    此过程的概念图如图 7-16 所示。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig16_HTML.jpg](img/478313_1_En_7_Fig16_HTML.jpg)


    图 7-16：从对象存储加载数据到 ADW


    之前，我们创建了一个 `Credential` 数据库对象，该对象将允许 ADW 实例代表指定的 IAM 用户访问 OCI 对象存储。我们仍然需要创建一个对象存储桶。在第
    5 章中，你了解到要设置一个新的存储桶，你可以依赖以下 OCI CLI 命令，并通过 `SANDBOX-ADMIN` 配置文件代表 `sandbox-admin`
    用户执行。现在就执行它，创建一个名为 `roadadw-load` 的新存储桶。


    ```

    $ oci os bucket create --name roadadw-load --profile SANDBOX-ADMIN

    ```


    基于第 5 章中设置的 IAM 策略，`sandbox-user` 被允许仅上传数据到名为 `blueprints` 的对象存储桶。让我们通过添加代码清单
    7-2 中所示的新的 IAM 策略语句来扩展这个访问范围。现在，我们将允许 `sandbox-users` 将对象上传到 `roadadw-load` 存储桶。


    ```

    [

    "allow group sandbox-users to read buckets in compartment Sandbox where target.bucket.name=''roadadw-load''",

    "allow group sandbox-users to manage objects in compartment Sandbox where target.bucket.name=''roadadw-load''"

    ]

    ```


    代码清单 7-2: `sandbox-users.policies.adwstorage.json`


    我们可以使用 `oci iam policy create` CLI 命令，以与前几章添加新策略相同的方式，在 `Sandbox` 盈利中创建一条新策略。该策略应添加到
    `Sandbox` 盈利中。只要你仍然使用如前几章所述配置的 `oci_cli_rc` 文件，这些命令就应该能完成工作：


    ```

    $ cd ~/git/oci-book/chapter07/1-setup/

    $ oci iam policy create --name sandbox-users-adw-storage-policy --statements file://sandbox-users.policies.adwstorage.json
    --description "ADW-Storage-related policy for regular Sandbox users" --profile
    SANDBOX-ADMIN

    ```


    有了新策略，我们就可以将包含各种新 ADW 表输入数据的文件上传到 `roadadw-load` 对象存储桶。在此阶段，值得提及这些文件是什么以及我们将如何使用它们。

    '
- fmt: '### Star Schema


    I have already said that we are going to simulate a simple data warehousing use
    case. A `star schema` is a typical constellation of relational database tables
    that makes it easier to perform typical business intelligence operations such
    as pivoting, selection, slice, and dice as well as drill-down and roll-up. At
    the beginning of this chapter, I introduced you to the concept of relationships
    between tables and their importance in relational databases. At the heart of a
    `star schema`, there is a `fact table` that contains partially aggregated, numeric
    data such as sales results expressed in currency, various measurements expressed
    in measured units, production volumes expressed in quantities, or observed events
    quantified using gathered statistics. The exercises in this chapter are built
    around data that resembles accidents and incidents reported on Polish roads. These
    events are quantified using the following measures:

    *   The number of these events (occurrence)

    *   People injured

    *   People killed


    To be able to analyze data, numbers alone are insufficient. We need to know the
    context of each record stored in the `fact table`. These contexts are addressed
    as dimensions. A road event can take place on a given day (`Time` dimension) and
    on a given road segment (`Road` dimension) and have a particular type such as
    rear-end car collision, speeding, or unlicensed driving (`Event Type` dimension).
    You may want to group specific types of road events into a hierarchy of categories.
    A rear-end car collision and side collision may both belong to the "collision"
    category. Next, multiple categories can be grouped into road event classes such
    as "accidents" or "incidents." As a result, the `Event Type` dimension would have
    a hierarchy of three levels: topmost road event classes, middle-level road event
    categories, and finally low-level road event types. If you consider the `Time`
    dimension hierarchy, the most common levels of granularity are day, month, and
    year. In the case of the `Road` dimension hierarchy, you may differentiate road
    segment and road. Dimensions provide each individual `fact table` entry with a
    diverse context, as illustrated in Figure 7-17.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig17_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig17_HTML.jpg)


    Figure 7-17: Star schema


    For example, one of the observations included in the `Road Events` `fact table`
    could indicate that on March 7, 2017, there were seven run-off-road accidents
    on the expressway DK5 road segment in the Kuyavian-Pomeranian voivodeship (area).
    Further numeric data included in this particular `fact table` record could inform
    us that these seven accidents involved two injured and six killed in total.


    With this chapter in mind, I have already prepared all the data required to perform
    the upcoming exercises. You will load the three dimensions and the entire `fact
    table` from the comma-separated-value (CSV) files that are available in the Git
    repository of this book.


    #### Dimensions


    We have already said that without proper context, your `fact` data is virtually
    useless. Dimensions provide the context for your facts and let you gain valuable
    insights into what the data means. You can find the dimension data files in the
    `chapter07/2-dimensions` directory.


    ```

    $ cd ~/git/oci-book/chapter07/2-dimensions/

    $ ls -1 *_dim.csv

    event_dim.csv

    road_dim.csv

    time_dim.csv

    ```


    The filenames indicate what kind of data records are stored in each of these files.
    The `event_dim.csv` file contains `Event Type` dimension entries, the `road_dim.csv`
    contains the `Road` dimension entries, and the `time_dim.csv` contains the `Time`
    dimension entries. The files use a well-known CSV human-readable text format.
    Values are separated using the comma (`,`) character. Each row resembles one record
    of data. The first row contains a header with column names. Figure 7-18 shows
    how the `.csv` file contents map to the database table we are about to create
    and feed.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig18_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig18_HTML.jpg)


    Figure 7-18: Dimension files


    I am assuming you have already created the `roadadw-load` bucket as instructed
    a few moments ago. Let’s upload the dimension files to this bucket. We are going
    to use the `os object put` OCI CLI command. You learned how to do this in Chapter
    5. Remember to choose the `SANDBOX-USER` CLI profile, which you created in Chapter
    4. The profile will eventually execute the API call on behalf of `sandbox-user`
    .


    ```

    $ oci os object put -bn roadadw-load --file time_dim.csv --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    $ oci os object put -bn roadadw-load --file road_dim.csv --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    $ oci os object put -bn roadadw-load --file event_dim.csv --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    ```


    You can view the newly uploaded files in the `Bucket Details` view of the object
    storage dashboard in the OCI Console. To do so in the OCI Console, perform the
    following steps:

    1.  Go to Menu ➤ `Object Storage` ➤ `Object Storage`.

    2.  Click the bucket name.


    In the `Objects` table of the `Bucket Details` view, you should see the objects.
    Figure 7-19 presents the three files as object storage objects in the `roadadw-load`
    bucket.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig19_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig19_HTML.jpg)


    Figure 7-19: Dimension data files in an object storage bucket


    The `Time` dimension includes 731 records. Each record represents one calendar
    day between January 1, 2016, and December 31, 2017. If you wondered why there
    are 731 days instead of 730 days (2 × 365 days), the answer is simple. The year
    2016 is a leap year and has 366 days in total. The `Time` dimension has three
    hierarchy levels, as shown in Figure 7-20. Each dimension attribute eventually
    maps to a database table column and belongs to one particular level. Furthermore,
    there is one attribute for each level that uniquely identifies the given level.
    These attributes (`day_id`, `month_id`, and `year_id`) are typically suffixed
    with the `_id` in their name.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig20_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig20_HTML.jpg)


    Figure 7-20: Time dimension'
