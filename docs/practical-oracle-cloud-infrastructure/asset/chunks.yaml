- fmt: "## Client Setup\n\nFrom a function developer’s point of view, in terms of\
    \ `fn` client configuration, we need to add a new Fn client context first. The\
    \ Fn client context\n\n*   Uses the `oracle` provider\n*   Points to an Oracle\
    \ Functions API endpoint\n*   Pushes function-specific container images to OCIR\n\
    \nSecond, the Fn client context that uses the `oracle` provider must reference\
    \ a profile stored in the existing OCI CLI configuration file. This is needed\
    \ because Oracle Functions functions are integrated with IAM in Oracle Cloud.\
    \ Function developers must have an identity of an existing Oracle Cloud user,\
    \ for example, the `sandbox-user` user, to perform operations such as creating\
    \ new applications or functions in Oracle Functions. As an analogy, you can recall\
    \ the use of the OCI CLI. All CLI commands, or the underlying API calls to be\
    \ more precise, are executed on behalf of an IAM user defined under a named profile\
    \ in the OCI CLI configuration file.\n\nTo ease the development process, you can\
    \ work with the local Fn server and Oracle Functions interchangeably. In this\
    \ way, you will be able to develop and unit test your newly created functions\
    \ locally and only then deploy them to Oracle Functions. To work like that, it\
    \ is enough to switch between the contexts illustrated in Figure [9-11](#478313_1_En_9_Chapter.xhtml#Fig11).\n\
    \n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig11_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig11_HTML.jpg)\n\
    \n#### Figure 9-11\n\n#### Fn Project contexts\n\nYou know the theory now. It’s\
    \ time to make it real. Connect to the compute instance, and create a new context\
    \ using the `fn create context` command with the `--provider` option set to `oracle`\
    \ like this:\n\n```bash\n[ubuntu@dev-vm]$ fn create context sandbox-user-fra-oci\
    \ --provider oracle\nSuccessfully created context: sandbox-user-fra-oci\n```\n\
    \nIn the `fn` client configuration directory, there should be a new YAML file\
    \ created.\n\n```bash\n/home/ubuntu/.fn/contexts/\n├── default.yaml\n└── sandbox-user-fra-oci.yaml\n\
    ```\n\nFor the time being, this new context file is practically empty and definitely\
    \ unusable. You have to add the following details to let the `fn` client properly\
    \ work with Oracle Functions:\n\n*   Regional Oracle Functions API endpoint\n\
    *   Regional Oracle Container Image Registry (OCIR) repository endpoint\n*   Fn\
    \ Project `oracle`-provider-specific information:\n    *   Compartment OCID\n\
    *   Name of the OCI CLI configuration profile\n\nThe Oracle Functions API endpoint\
    \ should be set in the following format:\n\n```bash\nhttps://functions..oraclecloud.com\n\
    ```\n\nThe OCIR repository endpoint uses a format like this:\n\n```bash\n.ocir.io//\n\
    ```\n\nFor example, if you are working in the Frankfurt region, you will use `eu-frankfurt-1`\
    \ as the region name and simply `fra` as the region code. You can find the list\
    \ of other region names and their codes in the OCI documentation. To identify\
    \ your *tenancy namespace*, you can use the following command:\n\n```bash\n$ oci\
    \ os ns get --query 'data' --raw-output\njakobczyk\n```\n\nNow, reconnect to the\
    \ compute instance, and add the aforementioned information by editing the context\
    \ file.\n\n```bash\n$ ssh -i ~/.ssh/oci_id_rsa ubuntu@$DEV_MACHINE_IP\n[ubuntu@dev-vm]$\
    \ vi ~/.fn/contexts/sandbox-user-fra-oci.yaml\n```\n\nYou can start with the `chapter09/3-functions/configuration/sandbox-user-fra-oci.yaml`\
    \ template file and edit it in a similar way, as shown in Listing [9-7.](#478313_1_En_9_Chapter.xhtml#PC48)\n\
    \n```yaml\napi-url: https://functions.eu-frankfurt-1.oraclecloud.com\nregistry:\
    \ fra.ocir.io/jakobczyk/sandbox-fn\nprovider: oracle\noracle.compartment-id: ocid1.compartment.oc1..aa...gzwhsa\n\
    oracle.profile: SANDBOX-USER\n```\n\n#### Listing 9-7\n\n#### ~/.fn/contexts/sandbox-user-fra-oci.yaml\n\
    \nDo not forget to use the OCID of the `Sandbox` compartment as the value to the\
    \ `oracle.compartment-id` field. The context file mentions an OCI CLI configuration\
    \ profile name as a value of the `oracle.profile` property. Until now, you have\
    \ used the OCI CLI on your local development machine. This chapter assumes you\
    \ are using a cloud-based compute instance for function development. The new `fn`\
    \ client context that is supposed to let the `fn` client work with Oracle Functions\
    \ references a particular OCI CLI configuration profile. Because of that, we need\
    \ to create the config file on the compute instance as well. There is no need\
    \ to install the CLI, however. It is all about the configuration in this case.\
    \ Let’s create the config in the default path. In this way, the `fn` client will\
    \ be able to pick it up.\n\n```bash\n[ubuntu@dev-vm]$ mkdir ~/.oci\n[ubuntu@dev-vm]$\
    \ vi ~/.oci/config\n```\n\nCopy only the `SANDBOX-USER` profile from the OCI CLI\
    \ config file you are using on your original development machine. Do not forget\
    \ to add the tenancy OCID and the region name, as shown in Listing [9-8](#478313_1_En_9_Chapter.xhtml#PC50).\n\
    \n```ini\n[SANDBOX-USER]\ntenancy=ocid1.tenancy.oc1..aa...3yymfa\nregion=eu-frankfurt-1\n\
    user=ocid1.user.oc1..aa...dzqpxa\nfingerprint=ad:82:99:bf:93:27:63:7b:35:75:f5:27:d4:95:78:86\n\
    key_file=~/.apikeys/api.sandbox-user.pem\npass_phrase=secret\n```\n\n#### Listing\
    \ 9-8\n\n#### ~/.oci/config (on Compute Instance for Function Development)\n\n\
    The IAM identity for the `fn` client is derived from the information stored in\
    \ the configuration file. More precisely, the `fn` client reads only the information\
    \ under the referenced profile. To interact with Oracle Functions, the `oracle`\
    \ provider used by the `fn` client will eventually translate the `fn` client commands\
    \ to OCI API requests, as illustrated in Figure [9-12](#478313_1_En_9_Chapter.xhtml#Fig12).\
    \ This information is required to properly sign these requests; otherwise, the\
    \ OCI API would reject them.\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig12_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig12_HTML.jpg)\n\
    \n#### Figure 9-12\n\n#### Fn client configuration for Oracle Functions\n\nThe\
    \ last missing element in the client configuration is the private key used to\
    \ sign API requests. To simplify the exercise, we are going to reuse the same\
    \ API signing key that we use for standard OCI CLI calls. Back on your original\
    \ development machine with the OCI CLI, you can use the `scp` tool to upload the\
    \ API signing key to the compute instance for function development like this:\n\
    \n```bash\n$ cd ~/git/oci-book/chapter09/1-infrastructure\n$ DEV_MACHINE_IP=`terraform\
    \ output dev_machine_public_ip`\n$ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-user.pem\
    \ ubuntu@$DEV_MACHINE_IP:/home/ubuntu\napi.sandbox-user.pem           100% 1766\
    \    57.2KB/s   00:00\n```\n\nNext, connect to the compute instance and move the\
    \ API signing key to the directory that is declared in the configuration file.\n\
    \n```bash\n[ubuntu@dev-vm]$ mkdir ~/.apikeys\n[ubuntu@dev-vm]$ mv ~/api.sandbox-user.pem\
    \ ~/.apikeys/api.sandbox-user.pem\n[ubuntu@dev-vm]$ chmod go-rwx ~/.apikeys/api.sandbox-user.pem\n\
    ```\n\nAll in all, the three files required by the `fn` client to work with Oracle\
    \ Functions are on our `dev-vm` compute instance.\n\n```bash\n/home/ubuntu\n├──\
    \ .apikeys\n│   └── api.sandbox-user.pem\n...\n├── .fn\n│   ├── config.yaml\n\
    │   ├── contexts\n│   │   ├── default.yaml\n│   │   └── sandbox-user-fra-oci.yaml\n\
    ...\n├── .oci\n│   └── config\n```\n\nNow, set the new context to be the current\
    \ one by using the `fn use context` command, and, in the subsequent step, issue\
    \ the `fn list apps` command to test the connectivity to Oracle Functions.\n\n\
    ```bash\n[ubuntu@dev-vm]$ fn use context sandbox-user-fra-oci\nNow using context:\
    \ sandbox-user-fra-oci\n[ubuntu@dev-vm]$ fn list apps\nNo apps found\n```"
  raw: "#### Client Setup\n\nFrom a function developer’s point of view, in terms of\
    \ `fn` client configuration, we need to add a new Fn client context first. The\
    \ Fn client context\n\n*   Uses the `oracle` provider\n\n*   Points to an Oracle\
    \ Functions API endpoint\n\n*   Pushes function-specific container images to OCIR\n\
    \nSecond, the Fn client context that uses `the oracle` provider must reference\
    \ a profile stored in the existing OCI CLI configuration file. This is needed\
    \ because Oracle Functions functions are integrated with IAM in Oracle Cloud.\
    \ Function developers must have an identity of an existing Oracle Cloud user,\
    \ for example, the `sandbox-user` user, to perform operations such as creating\
    \ new applications or functions in Oracle Functions. As an analogy, you can recall\
    \ the use of the OCI CLI. All CLI commands, or the underlying API calls to be\
    \ more precise, are executed on behalf of an IAM user defined under a named profile\
    \ in the OCI CLI configuration file.\n\nTo ease the development process, you can\
    \ work with the local Fn server and Oracle Functions interchangeably. In this\
    \ way, you will be able to develop and unit test your newly created functions\
    \ locally and only then deploy them to Oracle Functions. To work like that, it\
    \ is enough to switch between the contexts illustrated in Figure [9-11](#478313_1_En_9_Chapter.xhtml#Fig11).\n\
    \n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig11_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig11_HTML.jpg)\n\
    \nFigure 9-11\n\nFn Project contexts\n\nYou know the theory now. It’s time to\
    \ make it real. Connect to the compute instance, and create a new context using\
    \ the `fn create context` command with the `--provider` option set to `oracle`\
    \ like this:\n\n```\n[ubuntu@dev-vm]$ fn create context sandbox-user-fra-oci --provider\
    \ oracle\nSuccessfully created context: sandbox-user-fra-oci\n```\n\nIn the `fn`\
    \ client configuration directory, there should be a new YAML file created.\n\n\
    ```\n/home/ubuntu/.fn/contexts/\n├── default.yaml\n└── sandbox-user-fra-oci.yaml\n\
    ```\n\nFor the time being, this new context file is practically empty and definitely\
    \ unusable. You have to add the following details to let the `fn` client properly\
    \ work with Oracle Functions:\n\n*   Regional Oracle Functions API endpoint\n\n\
    *   Regional Oracle Container Image Registry (OCIR) repository endpoint\n\n* \
    \  Fn Project `oracle`-provider-specific information:\n    *   Compartment OCID\n\
    \n*   Name of the OCI CLI configuration profile\n\nThe Oracle Functions API endpoint\
    \ should be set in the following format:\n\n```\nhttps://functions..oraclecloud.com\n\
    ```\n\nThe OCIR repository endpoint uses a format like this:\n\n```\n.ocir.io//\n\
    ```\n\nFor example, if you are working in the Frankfurt region, you will use `eu-frankfurt-1`\
    \ as the region name and simply `fra` as the region code. You can find the list\
    \ of other region names and their codes in the OCI documentation. To identify\
    \ your *tenancy namespace*, you can use the following command:\n\n```\n$ oci os\
    \ ns get --query 'data' --raw-output\njakobczyk\n```\n\nNow, reconnect to the\
    \ compute instance, and add the aforementioned information by editing the context\
    \ file.\n\n```\n$ ssh -i ~/.ssh/oci_id_rsa ubuntu@$DEV_MACHINE_IP\n[ubuntu@dev-vm]$\
    \ vi ~/.fn/contexts/sandbox-user-fra-oci.yaml\n```\n\nYou can start with the `chapter09/3-functions/configuration/sandbox-user-fra-oci.yaml`\
    \ template file and edit it in a similar way, as shown in Listing [9-7.](#478313_1_En_9_Chapter.xhtml#PC48)\n\
    \n```\napi-url: https://functions.eu-frankfurt-1.oraclecloud.com\nregistry: fra.ocir.io/jakobczyk/sandbox-fn\n\
    provider: oracle\noracle.compartment-id: ocid1.compartment.oc1..aa...gzwhsa\n\
    oracle.profile: SANDBOX-USER\nListing 9-7\n~/.fn/contexts/sandbox-user-fra-oci.yaml\n\
    ```\n\nDo not forget to use the OCID of the `Sandbox` compartment as the value\
    \ to the `oracle.compartment-id` field. The context file mentions an OCI CLI configuration\
    \ profile name as a value of the `oracle.profile` property. Until now, you have\
    \ used the OCI CLI on your local development machine. This chapter assumes you\
    \ are using a cloud-based compute instance for function development. The new `fn`\
    \ client context that is supposed to let the `fn` client work with Oracle Functions\
    \ references a particular OCI CLI configuration profile. Because of that, we need\
    \ to create the config file on the compute instance as well. There is no need\
    \ to install the CLI, however. It is all about the configuration in this case.\
    \ Let’s create the config in the default path. In this way, the `fn` client will\
    \ be able to pick it up.\n\n```\n[ubuntu@dev-vm]$ mkdir ~/.oci\n[ubuntu@dev-vm]$\
    \ vi ~/.oci/config\n```\n\nCopy only the `SANDBOX-USER` profile from the OCI CLI\
    \ config file you are using on your original development machine. Do not forget\
    \ to add the tenancy OCID and the region name, as shown in Listing [9-8](#478313_1_En_9_Chapter.xhtml#PC50).\n\
    \n```\n[SANDBOX-USER]\ntenancy=ocid1.tenancy.oc1..aa...3yymfa\nregion=eu-frankfurt-1\n\
    user=ocid1.user.oc1..aa...dzqpxa\nfingerprint=ad:82:99:bf:93:27:63:7b:35:75:f5:27:d4:95:78:86\n\
    key_file=~/.apikeys/api.sandbox-user.pem\npass_phrase=secret\nListing 9-8\n~/.oci/config\
    \ (on Compute Instance for Function Development)\n```\n\nThe IAM identity for\
    \ the `fn` client is derived from the information stored in the configuration\
    \ file. More precisely, the `fn` client reads only the information under the referenced\
    \ profile. To interact with Oracle Functions, the `oracle` provider used by the\
    \ `fn` client will eventually translate the `fn` client commands to OCI API requests,\
    \ as illustrated in Figure [9-12](#478313_1_En_9_Chapter.xhtml#Fig12). This information\
    \ is required to properly sign these requests; otherwise, the OCI API would reject\
    \ them.\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig12_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig12_HTML.jpg)\n\
    \nFigure 9-12\n\nFn client configuration for Oracle Functions\n\nThe last missing\
    \ element in the client configuration is the private key used to sign API requests.\
    \ To simplify the exercise, we are going to reuse the same API signing key that\
    \ we use for standard OCI CLI calls. Back on your original development machine\
    \ with the OCI CLI, you can use the `scp` tool to upload the API signing key to\
    \ the compute instance for function development like this:\n\n```\n$ cd ~/git/oci-book/chapter09/1-infrastructure\n\
    $ DEV_MACHINE_IP=`terraform output dev_machine_public_ip`\n$ scp -i ~/.ssh/oci_id_rsa\
    \ ~/.apikeys/api.sandbox-user.pem ubuntu@$DEV_MACHINE_IP:/home/ubuntu\napi.sandbox-user.pem\
    \           100% 1766    57.2KB/s   00:00\n```\n\nNext, connect to the compute\
    \ instance and move the API signing key to the directory that is declared in the\
    \ configuration file.\n\n```\n[ubuntu@dev-vm]$ mkdir ~/.apikeys\n[ubuntu@dev-vm]$\
    \ mv ~/api.sandbox-user.pem ~/.apikeys/api.sandbox-user.pem\n[ubuntu@dev-vm]$\
    \ chmod go-rwx ~/.apikeys/api.sandbox-user.pem\n```\n\nAll in all, the three files\
    \ required by the `fn` client to work with Oracle Functions are on our `dev-vm`\
    \ compute instance.\n\n```\n/home/ubuntu\n├── .apikeys\n│   └── api.sandbox-user.pem\n\
    ...\n├── .fn\n│   ├── config.yaml\n│   ├── contexts\n│   │   ├── default.yaml\n\
    │   │   └── sandbox-user-fra-oci.yaml\n...\n├── .oci\n│   └── config\n```\n\n\
    Now, set the new context to be the current one by using the `fn use context` command,\
    \ and, in the subsequent step, issue the `fn list apps` command to test the connectivity\
    \ to Oracle Functions.\n\n```\n[ubuntu@dev-vm]$ fn use context sandbox-user-fra-oci\n\
    Now using context: sandbox-user-fra-oci\n[ubuntu@dev-vm]$ fn list apps\nNo apps\
    \ found\n```"
  trans: "\n## 客户端设置\n\n从函数开发者的角度来看，在`fn`客户端配置方面，我们需要首先添加一个新的 Fn 客户端上下文。该 Fn 客户端上下文\n\
    \n*   使用`oracle`提供商\n*   指向一个 Oracle Functions API 端点\n*   将函数特定的容器镜像推送到 OCIR\n\
    \n其次，使用`oracle`提供商的 Fn 客户端上下文必须引用存储在现有 OCI CLI 配置文件中的配置文件。这是因为 Oracle Functions\
    \ 函数与 Oracle Cloud 中的 IAM 集成。函数开发者必须拥有现有 Oracle Cloud 用户的身份，例如`sandbox-user`用户，才能在\
    \ Oracle Functions 中执行诸如创建新应用程序或函数等操作。类比来说，你可以回想一下 OCI CLI 的使用。所有 CLI 命令，或者更准确地说，底层的\
    \ API 调用，都是代表在 OCI CLI 配置文件中指定的命名配置文件下定义的 IAM 用户执行的。\n\n为了简化开发过程，你可以在本地 Fn 服务器和\
    \ Oracle Functions 之间交替工作。这样，你将能够在本地开发和单元测试新创建的函数，然后再将它们部署到 Oracle Functions。要实现这样的工作方式，只需在如图\
    \ 9-11 所示的上下文之间切换即可。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig11_HTML.jpg](img/478313_1_En_9_Fig11_HTML.jpg)\n\
    \n#### 图 9-11\n\n#### Fn 项目上下文\n\n理论你已经了解了。是时候实践了。连接到计算实例，使用`fn create context`命令创建一个新的上下文，并将`--provider`选项设置为`oracle`，如下所示：\n\
    \n```bash\n[ubuntu@dev-vm]$ fn create context sandbox-user-fra-oci --provider\
    \ oracle\nSuccessfully created context: sandbox-user-fra-oci\n```\n\n在`fn`客户端配置目录中，应该会创建一个新的\
    \ YAML 文件。\n\n```bash\n/home/ubuntu/.fn/contexts/\n├── default.yaml\n└── sandbox-user-fra-oci.yaml\n\
    ```\n\n目前，这个新的上下文文件几乎是空的，肯定无法使用。你必须添加以下详细信息，才能让`fn`客户端正常与 Oracle Functions 配合工作：\n\
    \n*   区域性的 Oracle Functions API 端点\n*   区域性的 Oracle 容器镜像注册表 (OCIR) 仓库端点\n*   Fn\
    \ 项目特定于`oracle`提供商的信息：\n    *   compartment OCID\n*   OCI CLI 配置配置文件的名称\n\nOracle\
    \ Functions API 端点应设置为以下格式：\n\n```bash\nhttps://functions.<region>.oraclecloud.com\n\
    ```\n\nOCIR 仓库端点使用类似这样的格式：\n\n```bash\n<region-code>.ocir.io/<tenancy-namespace>/<repo-name>\n\
    ```\n\n例如，如果你在法兰克福区域工作，你将使用`eu-frankfurt-1`作为区域名称，并简单地使用`fra`作为区域代码。你可以在 OCI 文档中找到其他区域名称及其代码的列表。要识别你的*租户命名空间*，可以使用以下命令：\n\
    \n```bash\n$ oci os ns get --query 'data' --raw-output\njakobczyk\n```\n\n现在，重新连接到计算实例，并通过编辑上下文文件来添加上述信息。\n\
    \n```bash\n$ ssh -i ~/.ssh/oci_id_rsa ubuntu@$DEV_MACHINE_IP\n[ubuntu@dev-vm]$\
    \ vi ~/.fn/contexts/sandbox-user-fra-oci.yaml\n```\n\n你可以从`chapter09/3-functions/configuration/sandbox-user-fra-oci.yaml`模板文件开始，并按照类似的方式编辑它，如清单\
    \ 9-7 所示。\n\n```yaml\napi-url: https://functions.eu-frankfurt-1.oraclecloud.com\n\
    registry: fra.ocir.io/jakobczyk/sandbox-fn\nprovider: oracle\noracle.compartment-id:\
    \ ocid1.compartment.oc1..aa...gzwhsa\noracle.profile: SANDBOX-USER\n```\n\n####\
    \ 清单 9-7\n\n#### ~/.fn/contexts/sandbox-user-fra-oci.yaml\n\n不要忘记将`Sandbox` compartment\
    \ 的 OCID 用作`oracle.compartment-id`字段的值。上下文文件提到一个 OCI CLI 配置文件名称作为`oracle.profile`属性的值。到目前为止，你一直在本地开发机器上使用\
    \ OCI CLI。本章假设你使用基于云的计算实例进行函数开发。这个新的`fn`客户端上下文旨在让`fn`客户端与 Oracle Functions 配合工作，它引用了一个特定的\
    \ OCI CLI 配置配置文件。因此，我们也需要在计算实例上创建配置文件。不过，不需要安装 CLI。在这种情况下，一切都是关于配置。让我们在默认路径中创建配置文件。这样，`fn`客户端将能够获取它。\n\
    \n```bash\n[ubuntu@dev-vm]$ mkdir ~/.oci\n[ubuntu@dev-vm]$ vi ~/.oci/config\n\
    ```\n\n仅从你原始开发机器上使用的 OCI CLI 配置文件中复制`SANDBOX-USER`配置文件。不要忘记添加租户 OCID 和区域名称，如清单\
    \ 9-8 所示。\n\n```ini\n[SANDBOX-USER]\ntenancy=ocid1.tenancy.oc1..aa...3yymfa\n\
    region=eu-frankfurt-1\nuser=ocid1.user.oc1..aa...dzqpxa\nfingerprint=ad:82:99:bf:93:27:63:7b:35:75:f5:27:d4:95:78:86\n\
    key_file=~/.apikeys/api.sandbox-user.pem\npass_phrase=secret\n```\n\n#### 清单 9-8\n\
    \n#### ~/.oci/config (在用于函数开发的计算实例上)\n\n`fn`客户端的 IAM 身份源自存储在配置文件中的信息。更准确地说，`fn`客户端只读取引用的配置文件下的信息。为了与\
    \ Oracle Functions 交互，`fn`客户端使用的`oracle`提供商会将`fn`客户端命令最终转换为 OCI API 请求，如图 9-12\
    \ 所示。此信息是正确签名这些请求所必需的；否则，OCI API 将拒绝它们。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig12_HTML.jpg](img/478313_1_En_9_Fig12_HTML.jpg)\n\
    \n#### 图 9-12\n\n#### Oracle Functions 的客户端配置\n\n客户端配置中最后一个缺失的元素是用于签署 API 请求的私钥。为了简化练习，我们将重用与标准\
    \ OCI CLI 调用相同的 API 签名密钥。回到装有 OCI CLI 的原始开发机器上，你可以使用`scp`工具将 API 签名密钥上传到用于函数开发的计算实例，如下所示：\n\
    \n```bash\n$ cd ~/git/oci-book/chapter09/1-infrastructure\n$ DEV_MACHINE_IP=`terraform\
    \ output dev_machine_public_ip`\n$ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-user.pem\
    \ ubuntu@$DEV_MACHINE_IP:/home/ubuntu\napi.sandbox-user.pem           100% 1766\
    \    57.2KB/s   00:00\n```\n\n接下来，连接到计算实例，并将 API 签名密钥移动到配置文件中声明的目录。\n\n```bash\n\
    [ubuntu@dev-vm]$ mkdir ~/.apikeys\n[ubuntu@dev-vm]$ mv ~/api.sandbox-user.pem\
    \ ~/.apikeys/api.sandbox-user.pem\n[ubuntu@dev-vm]$ chmod go-rwx ~/.apikeys/api.sandbox-user.pem\n\
    ```\n\n总而言之，`fn`客户端要与 Oracle Functions 配合工作所需的三个文件都在我们的`dev-vm`计算实例上了。\n\n```bash\n\
    /home/ubuntu\n├── .apikeys\n│   └── api.sandbox-user.pem\n...\n├── .fn\n│   ├──\
    \ config.yaml\n│   ├── contexts\n│   │   ├── default.yaml\n│   │   └── sandbox-user-fra-oci.yaml\n\
    ...\n├── .oci\n│   └── config\n```\n\n现在，使用`fn use context`命令将新上下文设置为当前上下文，并在后续步骤中发出`fn\
    \ list apps`命令以测试与 Oracle Functions 的连接性。\n\n```bash\n[ubuntu@dev-vm]$ fn use\
    \ context sandbox-user-fra-oci\nNow using context: sandbox-user-fra-oci\n[ubuntu@dev-vm]$\
    \ fn list apps\nNo apps found\n```\n"
- fmt: "This time, there are no Fn applications shown, but this is exactly what we\
    \ were expecting. At the moment, there are no functions deployed to the cloud\
    \ yet. The old applications, namely, `blankapp` and `uuidapp`, did not disappear\
    \ but are still registered on our local Fn server. They are not listed in the\
    \ `fn list app` output at the moment simply because, this time, we are interacting\
    \ with Oracle Functions and not with the local Fn server. If you change the context\
    \ back to the local one, you should see these two apps again. Anyway, let’s continue\
    \ using the new context that makes our `fn` client commands work with Oracle Functions.\n\
    \n## Deploying the UUID Function\n\nWe are ready to deploy the same `uuidfn` function\
    \ code, which we tested locally on our machine, to Oracle Functions. First, we\
    \ will register a new application for Oracle Functions. As part of this activity,\
    \ you must denote the VCN subnet, which will be used by Oracle Functions to dynamically\
    \ plug transient function-specific containers for that particular function into\
    \ OCI networking. As you recall, the infrastructure code described at the beginning\
    \ of this chapter has created a subnet that can be referenced by the application\
    \ we are about to register.\n\nTip\n\nIt is absolutely fine to use different VCN\
    \ subnets for your Oracle Functions applications. Just make sure they fulfill\
    \ the recommendations such as the number of available private IP addresses or\
    \ the use of stateless security rules.\n\nBack on your local developer machine,\
    \ use the `terraform output` command to get the OCID of this subnet.\n\n```\n\
    $ cd ~/git/oci-book/chapter09/1-infrastructure\n$ terraform output functions_subnet_ocid\n\
    ocid1.subnet.oc1.eu-frankfurt-1.aa...sp2ufa\n```\n\nNext, connect to the `dev-vm`\
    \ compute instance, store the subnet OCID in a shell variable, and issue the `fn\
    \ create app` command with the `oracle.com/oci/subnetIds` annotation set to the\
    \ value of the variable. The commands you execute will look similar to these:\n\
    \n```\n[ubuntu@dev-vm]$ FN_SUBNET_ID=ocid1.subnet.oc1.eu-frankfurt-1.aa...sp2ufa\n\
    [ubuntu@dev-vm]$ fn create app uuidcloudapp --annotation oracle.com/oci/subnetIds=\"\
    [\\\"$FN_SUBNET_ID\\\"]\"\nSuccessfully created app:  uuidcloudapp\n```\n\nAt\
    \ this stage, if you want, you can verify in the OCI Console that the application\
    \ has been indeed created. To do so, do the following:\n\n1.  Go to Menu ➤ Developer\
    \ Services ➤ Functions.\n\n2.  Make sure that the `Sandbox` compartment is selected.\n\
    \nYou should be able to see an entry in the list of applications, as shown in\
    \ Figure [9-13](#478313_1_En_9_Chapter.xhtml#Fig13).\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig13_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig13_HTML.jpg)\n\
    \nFigure 9-13: Viewing functions in the OCI Console\n\nAn application alone does\
    \ not provide us with any kind of services. It is just a logical grouping of functions.\
    \ It is recommended to store function-specific container images in the Oracle\
    \ Container Image Registry (OCIR) in the same region in which we want the function\
    \ instances to serve trigger-based function calls. Before we deploy a function,\
    \ we need to log in to the OCIR. I have already covered this task in the previous\
    \ chapter, so let me assume you are already familiar with this task. Just remember\
    \ to use the tenancy namespace and not the OCID. Similarly, use the region code\
    \ such as `fra` instead of a region name. Just make sure you find the authentication\
    \ token for the `sandbox-user` you used in the previous chapter or create a new\
    \ one. You will need it as a password to sign in to the OCIR. As soon as you are\
    \ ready, please adjust the values of the `OCI_TENANCY_NAMESPACE` variable and\
    \ the `OCIR_REGION` variable in the following code snippet and execute the `docker\
    \ login` command:\n\n```\n[ubuntu@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk\n[ubuntu@dev-vm]$\
    \ OCIR_REGION=fra\n[ubuntu@dev-vm]$ OCI_USER=sandbox-user\n[ubuntu@dev-vm]$ docker\
    \ login -u $OCI_TENANCY_NAMESPACE/$OCI_USER $OCIR_REGION.ocir.io\nPassword: \n\
    Login Succeeded\n```\n\nTo deploy the `uuidfn` function, you can use the `fn deploy`\
    \ command. You will be required to reference the application that you created\
    \ in Oracle Functions only a few moments ago. Furthermore, we have not changed\
    \ anything in the function code; therefore, the `--no-bump` parameter will disable\
    \ the default behavior of incrementing the image version. All in all, these are\
    \ the commands to execute:"
