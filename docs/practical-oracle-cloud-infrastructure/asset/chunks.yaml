    Figure [2-12](#478313_1_En_2_Chapter.xhtml#Fig12) shows the OCI Console Internet
    gateway creation wizard.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig12_HTML.png](images/478313_1_En_2_Chapter/478313_1_En_2_Fig12_HTML.png)


    Figure 2-12


    Creating a new Internet gateway


    ### Route Table


    It won’t be a big surprise if I say that a *route table* stores route rules for
    a VCN. A route rule defines how to direct the outbound traffic that is destined
    to travel outside the VCN. In our case, we must define a rule that properly directs
    all packets sent to the IP addresses that do not belong to the VCN address range.
    In IPv4 language, 0.0.0.0/0 means all addresses, and this is the value we are
    going to use in the destination CIDR block of a route rule. We will also set the
    Internet gateway we’ve just provisioned as the target for this rule.


    A VCN comes with a default but empty route table resource. This is how you add
    a new route rule to the existing default route table using the OCI Console:


    1.  Go to Menu ➤ Networking ➤ Virtual Cloud Networks.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click the name of your VCN.


    4.  Click Route Tables in the Resources menu.


    5.  Click the name of the default route table.


    6.  Click Add Route Rules.


    7.  Choose Internet Gateway in the Target Type selection box.


    8.  Place **0.0.0.0/0** in Destination CIDR Block.


    9.  Choose uuid-igw in Target Internet Gateway.


    10.  Click Add Route Rules.


    Figure [2-13](#478313_1_En_2_Chapter.xhtml#Fig13) shows the Add Route Rules screen
    in the OCI Console.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig13_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Edit Route Rules screen in the OCI Console'
  trans: '

    ### 虚拟云网络


    顾名思义，*虚拟云网络*（VCN）是一个专属于你的云租户的私有虚拟网络。然而，在你设计和管理 VCN 的方式上，它又与你可能接触或学习过的知名传统物理 IP
    网络有几分相似。


    以下是如何使用 OCI 控制台创建新的 VCN：


    1.  导航至菜单 ➤ 网络 ➤ 虚拟云网络。

    2.  确保已选择`Sandbox`隔离区。在左侧稍靠下的位置，你会找到“范围”部分，其中包含一个用于选择活动隔离区名称的组合框。

    3.  点击“创建虚拟云网络”。

    4.  为新的 VCN 提供一个可选的显示名称（`uuid-vcn`）。

    5.  选择“仅创建虚拟云网络”。

    6.  提供 CIDR 块（`192.168.1.0/24`）。

    7.  勾选“DNS 解析”复选框，并保留 DNS 标签的默认值。

    8.  点击“创建虚拟云网络”以配置该 VCN。


    图 2-11 展示了 OCI 控制台的 VCN 创建向导。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig11_HTML.jpg](img/478313_1_En_2_Fig11_HTML.jpg)


    图 2-11

    创建新的虚拟云网络


    在向导底部，你可能发现了一些与标签相关的字段。你将在第[5]章(#478313_1_En_5_Chapter.xhtml)学习关于标签的知识。


    我们决定创建一个 VCN，因为接下来我将向你展示如何创建所有（或调整现有的）必需的子资源，例如互联网网关、路由规则、安全规则和子网。这样，你将理解这些组件是如何协同工作的。


    **提示**


    如果你需要为简单的云环境制作原型，可以使用“网络快速入门”向导。OCI 控制台不仅会创建一个 VCN，还会添加最常见的子资源，如互联网网关、路由规则和子网。当你想快速测试某些功能且不需要特殊的
    VCN 设置时，这会很有帮助。


    ### 互联网网关


    *互联网网关*是一种虚拟路由器，它为公共子网中的计算实例提供与互联网的连接。它必须在路由规则中被定义为目标；否则，计算实例将不知道将其出站数据包发送到哪里。让我们从配置一个新的互联网网关开始。以下是使用
    OCI 控制台进行操作的步骤：


    1.  导航至菜单 ➤ 网络 ➤ 虚拟云网络。

    2.  确保已选择`Sandbox`隔离区。

    3.  点击你的 VCN 名称。

    4.  在“资源”菜单中点击“互联网网关”。

    5.  选择“创建互联网网关”。

    6.  提供一个可选的显示名称（`uuid-igw`）。

    7.  点击“创建互联网网关”。


    图 2-12 展示了 OCI 控制台的互联网网关创建向导。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig12_HTML.png](img/478313_1_En_2_Fig12_HTML.png)


    图 2-12

    创建新的互联网网关


    ### 路由表


    如果我说*路由表*存储了 VCN 的路由规则，这不会令人意外。一条路由规则定义了如何引导那些注定要离开 VCN 的出站流量。在我们的例子中，我们必须定义一条规则，以正确引导所有发送到不属于
    VCN 地址范围的 IP 地址的数据包。用 IPv4 的术语来说，`0.0.0.0/0`表示所有地址，这将是我们用于路由规则目标 CIDR 块的值。我们还将把刚刚配置的互联网网关设置为这条规则的目标。


    VCN 默认自带一个空的路由表资源。以下是使用 OCI 控制台向现有的默认路由表添加新路由规则的方法：


    1.  导航至菜单 ➤ 网络 ➤ 虚拟云网络。

    2.  确保已选择`Sandbox`隔离区。

    3.  点击你的 VCN 名称。

    4.  在“资源”菜单中点击“路由表”。

    5.  点击默认路由表的名称。

    6.  点击“添加路由规则”。

    7.  在“目标类型”选择框中选择“互联网网关”。

    8.  在“目标 CIDR 块”中填入`0.0.0.0/0`。

    9.  在“目标互联网网关”中选择`uuid-igw`。

    10.  点击“添加路由规则”。


    图 2-13 展示了 OCI 控制台中的“添加路由规则”屏幕。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig13_HTML.jpg](img/478313_1_En_2_Fig13_HTML.jpg)


    图 2-13

    OCI 控制台中的编辑路由规则屏幕

    '
- fmt: "### Security List\n\n我们已经处理了虚拟网络、虚拟路由器和虚拟路由表。现在是时候添加一些安全措施了。每个 VCN 子网都必须至少有一个\
    \ `security list`，它是一组安全规则的集合。你可以将这些规则视为虚拟防火墙的附加层，独立于你在每个单独计算实例上控制的操作系统防火墙。在请求到达计算实例的虚拟网络接口之前，会强制执行安全规则。\n\
    \n根据流量方向，有两种类型的安全规则：\n*   `Ingress`，验证进入 VCN 的入站流量\n*   `Egress`，验证从 VCN 出去的出站流量\n\
    \nVCN 附带一个默认的 `security list` 资源，其中包含一些基本规则，允许入站 SSH 和基本的 ICMP 流量以及所有出站流量。我们仍然需要添加一条规则，允许在\
    \ UUID 服务端口 (`5000`) 上的入站流量。以下是使用 OCI 控制台向现有安全列表添加新安全规则的方法：\n\n1.  转到 Menu ➤ Networking\
    \ ➤ Virtual Cloud Networks。\n2.  确保选中 `Sandbox` 隔间。\n3.  点击你的 VCN 名称。\n4.  在 Resources\
    \ 菜单中点击 `Security Lists`。\n5.  点击默认安全列表的名称。\n6.  在 Resources 菜单中选择 `Ingress Rules`。\n\
    7.  点击 `Add Ingress Rule`。\n8.  提供所需的值：\n    1.  在 Source CIDR 中填入 `0.0.0.0/0`。\n\
    \    2.  在 Destination Port Range 中填入 `5000`。\n9.  点击 `Add Ingress Rules`。\n\n\
    图 [2-14](#478313_1_En_2_Chapter.xhtml#Fig14) 展示了我们正在添加的新入站安全规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig14_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig14_HTML.jpg)\n\
    图 2-14\nOCI 控制台中的入站安全规则\n\n你可能想知道 Stateless 标签旁边的小复选框到底是什么意思。我们留空了这个复选框。结果，我们添加的新入站规则是一个\
    \ `stateful rule`。每次通过这条有状态的入站规则接受端口 `5000` 上的入站流量（请求）时，相应的出站流量（回复）会自动放行，无需强制执行其他出站规则。如果你决定使用\
    \ `stateless rule`，你将还需要在相反方向创建另一条无状态规则来验证相关流量。\n\n有状态规则听起来像是完美的解决方案。那么为什么我们仍然要使用无状态规则呢？嗯，有状态规则需要连接跟踪，这会消耗资源并引入一些延迟。此外，每个计算实例在单个时刻可跟踪的连接数是有限制的。这就是黄金法则所说：如果你能够将你的安全规则设计为无状态规则，那就这样做。\n\
    \n图 [2-15](#478313_1_En_2_Chapter.xhtml#Fig15) 展示了修订后的默认安全列表中现有的入站安全规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig15_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig15_HTML.jpg)\n\
    图 2-15\n在 OCI 控制台中查看入站安全规则\n\n图 [2-16](#478313_1_En_2_Chapter.xhtml#Fig16) 展示了默认安全列表中现有的出站安全规则。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig16_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig16_HTML.jpg)\n\
    图 2-16\n在 OCI 控制台中查看出站安全规则\n\n到目前为止，我们已经配置了一个新的 VCN，启动了一个 Internet 网关，添加了一条新的路由规则以通过\
    \ Internet 网关引导出站流量，并创建了一条有状态的入站安全规则以允许端口 `5000` 上的所有传入 TCP 连接。接下来，我们将创建一个新的子网并配置一个新的虚拟机。\n\
    \n### Subnet\n\n一个 VCN 被划分为一个或多个 `subnets`。我们将计算实例，或者更准确地说，它们的 `vNICs`，附加到子网。你可能还记得，在定义新的\
    \ VCN 时，我们没有对可用性域做任何选择。而子网是你可以在你选择的某一个可用性域中明确创建的。所有在特定子网中创建的计算实例最终都必须在创建该子网的可用性域中运行。或者，也可以创建跨越给定区域中所有可用性域的子网。这种子网让你能够以更灵活的方式启动实例，推迟为实例选择可用性域。你将在第\
    \ [6](#478313_1_En_6_Chapter.xhtml) 章中了解更多相关信息。目前，我们将坚持使用绑定到单个可用性域的子网。以下是使用 OCI\
    \ 控制台创建新的 VCN 子网的方法：\n\n1.  转到 Menu ➤ Networking ➤ Virtual Cloud Networks。\n2.\
    \  确保选中 `Sandbox` 隔间。\n3.  点击你的 VCN 名称。\n4.  在 Resources 菜单中点击 `Subnets`。\n5.\
    \  点击 `Create Subnet`。\n6.  提供所需的值：\n    1.  填入 `a-net` 作为显示名称。\n    2.  选择 `Availability\
    \ Domain-specific Subnet Type`。\n    3.  在你的区域中选择第一个可用性域（后缀为 AD-1）。\n    4.  填入\
    \ `192.168.1.0/28` 作为 CIDR 块。\n    5.  确保选择了默认路由表。\n    6.  选择 `Public Subnet`\
    \ 选项。\n    7.  勾选 `Use DNS Hostnames in this subnet`。\n    8.  使用简短的单字符标签 `a`\
    \ 作为子网的 DNS 标签。\n    9.  确保选择了默认 DHCP Options 设置。\n    10. 确保选择了默认安全列表。\n7.  点击\
    \ `Create Subnet`。\n\n图 [2-17](#478313_1_En_2_Chapter.xhtml#Fig17) 展示了 OCI 控制台\
    \ VCN 子网创建向导。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig17_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig17_HTML.jpg)\n\
    图 2-17\n在 OCI 控制台中创建 VCN 子网向导\n\n有两种类型的子网：\n*   `A public subnet` 允许你为在此子网中配置的计算实例分配公共\
    \ IP 地址。你仍然可以在公共子网中创建没有公共 IP 地址的计算实例。\n*   `A private subnet` 不允许你为在此子网中配置的计算实例分配公共\
    \ IP 地址。这些实例可以使用不同的方式与 Internet 和其他网络通信。你将在第 [6](#478313_1_En_6_Chapter.xhtml)\
    \ 章中了解更多相关信息。"
  raw: "### Security List\n\nWe’ve already dealt with a virtual network, virtual router,\
    \ and virtual route table. Now, it is time to add some security. Every VCN subnet\
    \ is required to have at least one *security list*, which is a collection of security\
    \ rules. You can think of these rules as an additional layer of a virtual firewall,\
    \ independent from the operating system firewall you control on each individual\
    \ compute instance. Before a request reaches a compute instance’s virtual network\
    \ interface, security rules are enforced.\n\nThere are two types of security rules\
    \ based on traffic direction.\n\n*   **Ingress**, which means they validate the\
    \ inbound traffic to VCN\n\n*   **Egress**, which means they validate the outbound\
    \ traffic from VCN\n\nA VCN comes with a default security list resource with some\
    \ basic rules that allow ingress SSH and basic ICMP traffic as well as all egress\
    \ traffic. We still need to add a rule that allows ingress traffic on the UUID\
    \ service port (5000). This is how you add a new security rule to an existing\
    \ security list using the OCI Console:\n\n1.  Go to Menu ➤ Networking ➤ Virtual\
    \ Cloud Networks.\n\n2.  Make sure that the `Sandbox` compartment is selected.\n\
    \n3.  Click the name of your VCN.\n\n4.  Click Security Lists in the Resources\
    \ menu.\n\n5.  Click the name of the default security list.\n\n6.  Select Ingress\
    \ Rules in the Resources menu.\n\n7.  Click Add Ingress Rule.\n\n8.  Provide the\
    \ required values:\n    1.  Place **0.0.0.0/0** in Source CIDR.\n\n    2.  Place\
    \ **5000** in Destination Port Range.\n\n9.  Click Add Ingress Rules.\n\nFigure\
    \ [2-14](#478313_1_En_2_Chapter.xhtml#Fig14) shows a new ingress security rule\
    \ we are adding.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig14_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14\n\nAn ingress security rule in the OCI Console\n\nYou may wonder\
    \ what a small checkbox next to the Stateless label actually means. We’ve left\
    \ this checkbox empty. As a result, the new ingress rule we’ve added is a *stateful\
    \ rule*. Every time an inbound traffic (a request) on port 5000 is accepted by\
    \ this stateful ingress rule, the corresponding outbound traffic (a reply) will\
    \ be automatically let through with no other egress rule enforced. If you decide\
    \ to use a *stateless rule*, you will also need to create another stateless rule\
    \ in the opposite direction that validates the related traffic.\n\nStateful rules\
    \ may sound like a perfect solution. Then why would we still use stateless rules?\
    \ Well, stateful rules require connection tracking that consumes resources and\
    \ introduces some latency. Furthermore, each compute instance has a limit of how\
    \ many connections can be tracked at a single moment. This is why the golden rule\
    \ says that if you are able to design your security rules as stateless rules,\
    \ do it.\n\nFigure [2-15](#478313_1_En_2_Chapter.xhtml#Fig15) shows existing ingress\
    \ security rules in the amended default security list.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig15_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig15_HTML.jpg)\n\
    \nFigure 2-15\n\nViewing ingress security rules in the OCI Console\n\nFigure [2-16](#478313_1_En_2_Chapter.xhtml#Fig16)\
    \ shows an existing egress security rule in the default security list.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig16_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig16_HTML.jpg)\n\
    \nFigure 2-16\n\nViewing egress security rules in the OCI Console\n\nSo far, we’ve\
    \ provisioned a new VCN, launched an Internet gateway, added a new route rule\
    \ to direct the outbound traffic via the Internet gateway, and created a stateful\
    \ ingress security rule to allow all incoming TCP connections on port 5000\\.\
    \ Next, we will create a new subnet and provision a new virtual machine.\n\n###\
    \ Subnet\n\nA VCN is divided into one or more *subnets* . We attach compute instances,\
    \ or more precisely their vNICs, to the subnets. You may recall that as we were\
    \ defining a new VCN, we did not make any choices about availability domains.\
    \ It is a subnet that you can explicitly create in exactly one availability domain\
    \ of your choice. All compute instances that are created in a particular subnet\
    \ will eventually have to run in the availability domain the subnet was created\
    \ in. Alternatively, it is possible to create subnets that span all availability\
    \ domains in a given region. That kind of subnets lets you launch instances in\
    \ a more flexible way, deterring the choice of an availability domain for an instance.\
    \ You’ll learn more about that in Chapter [6](#478313_1_En_6_Chapter.xhtml). For\
    \ now, we are going to stick to subnets bound to single availability domains.\
    \ This is how you create a new VCN subnet using the OCI Console:\n\n1.  Go to\
    \ Menu ➤ Networking ➤ Virtual Cloud Networks.\n\n2.  Make sure that the `Sandbox`\
    \ compartment is selected.\n\n3.  Click the name of your VCN.\n\n4.  Click Subnets\
    \ in the Resources menu.\n\n5.  Click Create Subnet.\n\n6.  Provide the required\
    \ values:\n    1.  Place **a-net** as a display name.\n\n    2.  Choose Availability\
    \ Domain-specific Subnet Type.\n\n    3.  Select the first availability domain\
    \ (suffixed AD-1) in your region.\n\n    4.  Place **192.168.1.0/28** as the CIDR\
    \ block.\n\n    5.  Make sure that the default route table is chosen.\n\n    6.\
    \  Select the Public Subnet option.\n\n    7.  Mark Use DNS Hostnames in this\
    \ subnet.\n\n    8.  Use the short, one-character label **a** as the subnet’s\
    \ DNS label.\n\n    9.  Make sure that the default DHCP Options setting is chosen.\n\
    \n    10.  Make sure that the default security list is chosen.\n\n7.  Click Create\
    \ Subnet.\n\nFigure [2-17](#478313_1_En_2_Chapter.xhtml#Fig17) shows the OCI Console\
    \ VCN subnet creation wizard.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig17_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig17_HTML.jpg)\n\
    \nFigure 2-17\n\nCreating VCN subnet creation wizard in the OCI Console\n\nThere\
    \ are two types of subnets.\n\n*   **A public subnet** lets you assign public\
    \ IP addresses to compute instances that have been provisioned in this subnet.\
    \ You can still create compute instances with no public IP address in a public\
    \ subnet.\n\n*   **A private subnet** does not allow you to you assign public\
    \ IP addresses to compute instances that have been provisioned in this subnet.\
    \ These instances can use different means to communicate with the Internet and\
    \ other networks. You’ll learn more about that in Chapter [6](#478313_1_En_6_Chapter.xhtml)."
  trans: "\n### 安全列表\n\n我们已经处理了虚拟网络、虚拟路由器和虚拟路由表。现在是时候添加一些安全措施了。每个 VCN 子网都必须至少有一个 `security\
    \ list`（安全列表），它是一组安全规则的集合。你可以将这些规则视为虚拟防火墙的附加层，独立于你在每个单独计算实例上控制的操作系统防火墙。在请求到达计算实例的虚拟网络接口之前，会强制执行安全规则。\n\
    \n根据流量方向，有两种类型的安全规则：\n*   `Ingress`（入站规则），验证进入 VCN 的入站流量。\n*   `Egress`（出站规则），验证从\
    \ VCN 出去的出站流量。\n\nVCN 附带一个默认的 `security list` 资源，其中包含一些基本规则，允许入站 SSH 和基本的 ICMP\
    \ 流量以及所有出站流量。我们仍然需要添加一条规则，允许在 UUID 服务端口 (`5000`) 上的入站流量。以下是使用 OCI 控制台向现有安全列表添加新安全规则的方法：\n\
    \n1.  转到 Menu ➤ Networking ➤ Virtual Cloud Networks。\n2.  确保选中 `Sandbox` 隔间。\n\
    3.  点击你的 VCN 名称。\n4.  在 Resources 菜单中点击 `Security Lists`（安全列表）。\n5.  点击默认安全列表的名称。\n\
    6.  在 Resources 菜单中选择 `Ingress Rules`（入站规则）。\n7.  点击 `Add Ingress Rule`（添加入站规则）。\n\
    8.  提供所需的值：\n    1.  在 Source CIDR 中填入 `0.0.0.0/0`。\n    2.  在 Destination Port\
    \ Range 中填入 `5000`。\n9.  点击 `Add Ingress Rules`（添加入站规则）。\n\n图 2-14 展示了我们正在添加的新入站安全规则。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig14_HTML.jpg](img/478313_1_En_2_Fig14_HTML.jpg)\n\
    图 2-14\nOCI 控制台中的入站安全规则\n\n你可能想知道 Stateless 标签旁边的小复选框到底是什么意思。我们留空了这个复选框。结果，我们添加的新入站规则是一个\
    \ `stateful rule`（有状态规则）。每次通过这条有状态的入站规则接受端口 `5000` 上的入站流量（请求）时，相应的出站流量（回复）会自动放行，无需强制执行其他出站规则。如果你决定使用\
    \ `stateless rule`（无状态规则），你将还需要在相反方向创建另一条无状态规则来验证相关流量。\n\n有状态规则听起来像是完美的解决方案。那么为什么我们仍然要使用无状态规则呢？嗯，有状态规则需要连接跟踪，这会消耗资源并引入一些延迟。此外，每个计算实例在单个时刻可跟踪的连接数是有限制的。这就是黄金法则所说：如果你能够将你的安全规则设计为无状态规则，那就这样做。\n\
    \n图 2-15 展示了修订后的默认安全列表中现有的入站安全规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig15_HTML.jpg](img/478313_1_En_2_Fig15_HTML.jpg)\n\
    图 2-15\n在 OCI 控制台中查看入站安全规则\n\n图 2-16 展示了默认安全列表中现有的出站安全规则。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig16_HTML.jpg](img/478313_1_En_2_Fig16_HTML.jpg)\n\
    图 2-16\n在 OCI 控制台中查看出站安全规则\n\n到目前为止，我们已经配置了一个新的 VCN，启动了一个 Internet 网关，添加了一条新的路由规则以通过\
    \ Internet 网关引导出站流量，并创建了一条有状态的入站安全规则以允许端口 `5000` 上的所有传入 TCP 连接。接下来，我们将创建一个新的子网并配置一个新的虚拟机。\n\
    \n### 子网\n\n一个 VCN 被划分为一个或多个 `subnets`（子网）。我们将计算实例，或者更准确地说，它们的 `vNICs`（虚拟网络接口），附加到子网。你可能还记得，在定义新的\
    \ VCN 时，我们没有对可用性域做任何选择。而子网是你可以在你选择的某一个可用性域中明确创建的。所有在特定子网中创建的计算实例最终都必须在创建该子网的可用性域中运行。或者，也可以创建跨越给定区域中所有可用性域的子网。这种子网让你能够以更灵活的方式启动实例，推迟为实例选择可用性域。你将在第\
    \ 6 章中了解更多相关信息。目前，我们将坚持使用绑定到单个可用性域的子网。以下是使用 OCI 控制台创建新的 VCN 子网的方法：\n\n1.  转到 Menu\
    \ ➤ Networking ➤ Virtual Cloud Networks。\n2.  确保选中 `Sandbox` 隔间。\n3.  点击你的 VCN\
    \ 名称。\n4.  在 Resources 菜单中点击 `Subnets`（子网）。\n5.  点击 `Create Subnet`（创建子网）。\n6.\
    \  提供所需的值：\n    1.  填入 `a-net` 作为显示名称。\n    2.  选择 `Availability Domain-specific\
    \ Subnet Type`（可用性域特定子网类型）。\n    3.  在你的区域中选择第一个可用性域（后缀为 AD-1）。\n    4.  填入 `192.168.1.0/28`\
    \ 作为 CIDR 块。\n    5.  确保选择了默认路由表。\n    6.  选择 `Public Subnet`（公共子网）选项。\n    7.\
    \  勾选 `Use DNS Hostnames in this subnet`（在此子网中使用 DNS 主机名）。\n    8.  使用简短的单字符标签\
    \ `a` 作为子网的 DNS 标签。\n    9.  确保选择了默认 DHCP Options 设置。\n    10. 确保选择了默认安全列表。\n\
    7.  点击 `Create Subnet`（创建子网）。\n\n图 2-17 展示了 OCI 控制台 VCN 子网创建向导。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig17_HTML.jpg](img/478313_1_En_2_Fig17_HTML.jpg)\n\
    图 2-17\n在 OCI 控制台中创建 VCN 子网向导\n\n有两种类型的子网：\n*   `A public subnet`（公共子网）允许你为在此子网中配置的计算实例分配公共\
    \ IP 地址。你仍然可以在公共子网中创建没有公共 IP 地址的计算实例。\n*   `A private subnet`（私有子网）不允许你为在此子网中配置的计算实例分配公共\
    \ IP 地址。这些实例可以使用不同的方式与 Internet 和其他网络通信。你将在第 6 章中了解更多相关信息。\n"
- fmt: "### Compute Instance\n\nThe time has come to provision our first compute instance\
    \ in Oracle Cloud Infrastructure. During the planning phase, which was described\
    \ earlier in this chapter, we decided to use the smallest virtual machine shape,\
    \ which is `VM.Standard2.1`. We also chose to use the newest available version\
    \ of Oracle Linux 7. At the time of writing, this is Oracle Linux 7.6, but you\
    \ may see newer minor versions as well. At the moment, there should be no compute\
    \ instances in your learning compartment. Figure [2-18](#478313_1_En_2_Chapter.xhtml#Fig18)\
    \ shows an empty list in the Instances view in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig18_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig18_HTML.jpg)\n\
    \nFigure 2-18: Viewing OCI Console instances\n\nEven if you automate the entire\
    \ startup procedure of a particular cloud-based virtual machine, you may still\
    \ want to have the option to connect to the command line on that host remotely.\
    \ In the case of Linux-based machines, like Oracle Linux, we are going to use\
    \ SSH public key authentication. If you have worked primarily with Windows-based\
    \ hosts, it might be the first time you hear about SSH. The principle is pretty\
    \ simple. You generate a pair of related files, so-called keys. One is called\
    \ a private key, and the other is called a public key. You upload the public key\
    \ to one or more Linux machines in the cloud. To authenticate your remote terminal\
    \ connection, you need the private key. The compute instance creation wizard in\
    \ the OCI Console gives us an opportunity to upload a public key.\n\n**Note**\n\
    \nThe code snippets from this book have been tested on macOS and Windows Subsystem\
    \ for Linux. Moreover, all commands should work on major Linux distributions.\
    \ If you are using Windows and do not want to use Windows Subsystem for Linux,\
    \ you can always run Linux on a VM. Furthermore, the majority of code snippets\
    \ may also work in Git Bash on Windows.\n\nIf you would like to create a new SSH\
    \ keypair by employing the RSA algorithm, just execute this command:\n\n```\n\
    $ ssh-keygen -t rsa -b 2048 -C michal@vm -f ~/oci_id_rsa\n```\n\nYou can optionally\
    \ secure your private key with a password. Each time you use the private key,\
    \ you will be prompted to give a password. There will be two files generated.\n\
    \n*   `oci_id_rsa`, which is a private key.\n*   `oci_id_rsa.pub`, which is a\
    \ public key. You will upload this file when you create an instance in the OCI\
    \ Console.\n\nFigure [2-19](#478313_1_En_2_Chapter.xhtml#Fig19) shows an SSH keypair\
    \ creation.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig19_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig19_HTML.jpg)\n\
    \nFigure 2-19: Creating an SSH keypair\n\nWe would like our Oracle Linux compute\
    \ instance to be able to serve UUID service clients as soon as the machine is\
    \ up and running. We do not want to perform neither manual installations nor configurations.\
    \ We are going to leverage the `cloud-init` package that is preinstalled on our\
    \ compute instance already with the base operating system image. The role of `cloud-init`\
    \ is to perform an early initialization of a cloud instance during its first boot.\
    \ Your role is to upload a `user data` file in one of the supported formats during\
    \ instance creation. Listing [2-3](#478313_1_En_2_Chapter.xhtml#PC5) shows `cloud-init`\
    \ user data in `cloud-config` YAML format. You will find the `cloud-config` file\
    \ in the `git/chapter02/cloud-init` directory.\n\n```yaml\n#cloud-config\nyum_repos:\n\
    \  ol7_developer_EPEL:\n    name: Oracle Linux $releasever Developement Packages\
    \ ($basearch)\n    baseurl: http://yum.oracle.com/repo/OracleLinux/OL7/developer_EPEL/$basearch/\n\
    \    enabled: true\n    gpgcheck: true\n    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-oracle\n\
    package_upgrade: true\npackages:\n  - tree\n  - wget\n  - python36\n  - python36-pip\n\
    write_files:\n  - content: |\n      [Unit]\n      Description = Launching UUID\
    \ Service API\n      After = network.target\n      [Service]\n      Environment=FLASK_APP=/home/opc/uuidservice/app.py\n\
    \      Environment=LC_ALL=en_US.utf8\n      Environment=LANG=en_US.utf8\n    \
    \  ExecStart = /home/opc/uuidservice/venv/bin/flask run --host=0.0.0.0\n     \
    \ User = opc\n      [Install]\n      WantedBy = multi-user.target\n    path: /etc/systemd/system/uuidservice.service\n\
    runcmd:\n  - [ \"mkdir\", \"-p\", \"/home/opc/uuidservice/venv\" ]\n  - [ \"chown\"\
    , \"opc:opc\", \"/home/opc/uuidservice\" ]\n  - [ \"python3\", \"-m\", \"venv\"\
    , \"/home/opc/uuidservice/venv\" ]\n  - [ \"/home/opc/uuidservice/venv/bin/python3\"\
    , \"-m\", \"pip\", \"install\", \"--upgrade\", \"pip\" ]\n  - [ \"/home/opc/uuidservice/venv/bin/python3\"\
    , \"-m\", \"pip\", \"install\", \"flask\" ]\n  - [ \"wget\", \"-qO\", \"/home/opc/uuidservice/app.py\"\
    , \"https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/uuid-service/app.py\
    \ \" ]\n  - [ \"firewall-offline-cmd\", \"--add-port=5000/tcp\" ]\n  - [ \"systemctl\"\
    , \"restart\", \"firewalld\" ]\n  - [ \"ln\", \"-s\", \"/etc/systemd/system/uuidservice.service\"\
    , \"/etc/systemd/system/multi-user.target.wants/uuidservice.service\" ]\n  - [\
    \ \"systemctl\", \"enable\", \"uuidservice.service\" ]\n  - [ \"systemctl\", \"\
    start\", \"uuidservice.service\" ]\nfinal_message: \"UUID Service API node is\
    \ running, after $UPTIME seconds\"\n```\n\nListing 2-3: `vm.config.yaml`\n\nYou\
    \ will upload this file to the OCI Console instance creation wizard in a few moments.\
    \ First, let’s understand what it does. If you look closer at Listing [2-3](#478313_1_En_2_Chapter.xhtml#PC5),\
    \ you will discover that it consists of six named sections.\n\n*   `yum_repos`\
    \ defines a new repository that will be added to Yum.\n*   `package_upgrade` triggers\
    \ a system-wide package update.\n*   `packages` lists new packages that will be\
    \ installed on the machine.\n*   `write_files` creates a new file using provided\
    \ content at the given path.\n*   `runcmd` executes commands in a provided sequence.\n\
    *   `final_message` prints a message when the processing finishes.\n\nBut what\
    \ does our cloud configuration actually do in more detail? First, it adds the\
    \ Oracle Linux EPEL repository to Yum. This repository contains Python 3, which\
    \ we need to run our Python-based UUID service. `cloud-init` will perform a system-wide\
    \ package upgrade and install not only Python 3 but also `wget` and `tree` utilities.\
    \ Another interesting thing is the `write_files` section, which, in our case,\
    \ creates a new systemd unit file. The file content is created in such way to\
    \ run the UUID service as a systemd service. In this way, we are able to follow\
    \ a standardized approach to running applications as operating system services\
    \ in Linux. Last but not least, the `runcmd` section runs a series of commands.\
    \ First directories for a new Python virtual environment are created, and the\
    \ virtual environment alone is generated using the Python 3 `venv` module. Next,\
    \ already inside the virtual environment, we upgrade Package Installer for Python\
    \ (`pip`) and use it to install Flask. The subsequent steps use `wget` utility\
    \ to download the UUID service code from the GitHub repository related to this\
    \ book and open port 5000 in the operating system firewall. The final three commands\
    \ effectively link, enable, and start the systemd service. In this way, the UUID\
    \ service operates as an operating system service and is started on each restart.\n\
    \nYou may wonder why are the commands are specified as arrays. There are two ways\
    \ commands are run by `cloud-init`. The command will be executed as a new process,\
    \ directly using an operating system call, if wrapped into an array like this:\n\
    \n```yaml\nruncmd:\n  - [ \"mkdir\", \"-p\", \"/home/opc/uuidservice/venv\" ]\n\
    ```"
  raw: '### Compute Instance


    The time has come to provision our first compute instance in Oracle Cloud Infrastructure.
    During the planning phase, which was described earlier in this chapter, we decided
    to use the smallest virtual machine shape, which is VM.Standard2.1\. We also chose
    to use the newest available version of Oracle Linux 7\. At the time of writing,
    this is Oracle Linux 7.6, but you may see newer minor versions as well. At the
    moment, there should be no compute instances in your learning compartment. Figure
    [2-18](#478313_1_En_2_Chapter.xhtml#Fig18) shows an empty list in the Instances
    view in the OCI Console.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig18_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig18_HTML.jpg)


    Figure 2-18


    Viewing OCI Console instances


    Even if you automate the entire startup procedure of a particular cloud-based
    virtual machine, you may still want to have the option to connect to the command
    line on that host remotely. In the case of Linux-based machines, like Oracle Linux,
    we are going to use SSH public key authentication. If you have worked primarily
    with Windows-based hosts, it might be the first time you hear about SSH. The principle
    is pretty simple. You generate a pair of related files, so-called keys. One is
    called a *private key*, and the other is called a *public key*. You upload the
    public key to one or more Linux machines in the cloud. To authenticate your remote
    terminal connection, you need the private key. The compute instance creation wizard
    in the OCI Console gives us an opportunity to upload a public key.


    Note


    The code snippets from this book have been tested on macOS and Windows Subsystem
    for Linux. Moreover, all commands should work on major Linux distributions. If
    you are using Windows and do not want to use Windows Subsystem for Linux, you
    can always run Linux on a VM. Furthermore, the majority of code snippets may also
    work in Git Bash on Windows.


    If you would like to create a new SSH keypair by employing the RSA algorithm,
    just execute this command:


    ```

    $ ssh-keygen -t rsa -b 2048 -C michal@vm -f ~/oci_id_rsa

    ```


    You can optionally secure your private key with a password. Each time you use
    the private key, you will be prompted to give a password. There will be two files
    generated.


    *   `oci_id_rsa`, which is a private key.


    *   `oci_id_rsa.pub`, which is a public key. You will upload this file when you
    create an instance in the OCI Console.


    Figure [2-19](#478313_1_En_2_Chapter.xhtml#Fig19) shows an SSH keypair creation.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig19_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig19_HTML.jpg)


    Figure 2-19


    Creating an SSH keypair


    We would like our Oracle Linux compute instance to be able to serve UUID service
    clients as soon as the machine is up and running. We do not want to perform neither
    manual installations nor configurations. We are going to leverage the *cloud-init*
    package that is preinstalled on our compute instance already with the base operating
    system image. The role of cloud-init is to perform an early initialization of
    a cloud instance during its first boot. Your role is to upload a *user data* file
    in one of the supported formats during instance creation. Listing [2-3](#478313_1_En_2_Chapter.xhtml#PC5)
    shows cloud-init user data in *cloud-config* YAML format. You will find the cloud-config
    file in the `git/chapter02/cloud-init` directory.


    ```

    #cloud-config

    yum_repos:

    ol7_developer_EPEL:

    name: Oracle Linux $releasever Developement Packages ($basearch)

    baseurl: http://yum.oracle.com/repo/OracleLinux/OL7/developer_EPEL/$basearch/

    enabled: true

    gpgcheck: true

    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-oracle

    package_upgrade: true

    packages:

    - tree

    - wget

    - python36

    - python36-pip

    write_files:

    -   content: |

    [Unit]

    Description = Launching UUID Service API

    After = network.target

    [Service]

    Environment=FLASK_APP=/home/opc/uuidservice/app.py

    Environment=LC_ALL=en_US.utf8

    Environment=LANG=en_US.utf8

    ExecStart = /home/opc/uuidservice/venv/bin/flask run --host=0.0.0.0

    User = opc

    [Install]

    WantedBy = multi-user.target

    path: /etc/systemd/system/uuidservice.service

    runcmd:

    - [ "mkdir", "-p", "/home/opc/uuidservice/venv" ]

    - [ "chown", "opc:opc", "/home/opc/uuidservice" ]

    - [ "python3", "-m", "venv", "/home/opc/uuidservice/venv" ]

    - [ "/home/opc/uuidservice/venv/bin/python3", "-m", "pip", "install", "--upgrade",
    "pip" ]

    - [ "/home/opc/uuidservice/venv/bin/python3", "-m", "pip", "install", "flask"
    ]

    - [ "wget", "-qO", "/home/opc/uuidservice/app.py", "https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/uuid-service/app.py
    " ]

    - [ "firewall-offline-cmd", "--add-port=5000/tcp" ]

    - [ "systemctl", "restart", "firewalld" ]

    - [ "ln", "-s", "/etc/systemd/system/uuidservice.service", "/etc/systemd/system/multi-user.target.wants/uuidservice.service"
    ]

    - [ "systemctl", "enable", "uuidservice.service" ]

    - [ "systemctl", "start", "uuidservice.service" ]

    final_message: "UUID Service API node is running, after $UPTIME seconds"

    Listing 2-3

    vm.config.yaml

    ```


    You will upload this file to the OCI Console instance creation wizard in a few
    moments. First, let’s understand what it does. If you look closer at Listing [2-3](#478313_1_En_2_Chapter.xhtml#PC5),
    you will discover that it consists of six named sections.


    *   `yum_repos` defines a new repository that will be added to Yum.


    *   `package_upgrade` triggers a system-wide package update.


    *   `packages` lists new packages that will be installed on the machine.


    *   `write_files` creates a new file using provided content at the given path.


    *   `runcmd` executes commands in a provided sequence.


    *   `final_message` prints a message when the processing finishes.


    But what does our cloud configuration actually do in more detail? First, it adds
    the Oracle Linux EPEL repository to Yum. This repository contains Python 3, which
    we need to run our Python-based UUID service. Cloud-init will perform a system-wide
    package upgrade and install not only Python 3 but also `the wget` and `tree` utilities.
    Another interesting thing is the `write_files` section, which, in our case, creates
    a new systemd unit file. The file content is created in such way to run the UUID
    service as a systemd service. In this way, we are able to follow a standardized
    approach to running applications as operating system services in Linux. Last but
    not least, the `runcmd` section runs a series of commands. First directories for
    a new Python virtual environment are created, and the virtual environment alone
    is generated using the Python 3 `venv` module. Next, already inside the virtual
    environment, we upgrade Package Installer for Python (`pip`) and use it to install
    Flask. The subsequent steps use `the wget` utility to download the UUID service
    code from the GitHub repository related to this book and open port 5000 in the
    operating system firewall. The final three commands effectively link, enable,
    and start the systemd service. In this way, the UUID service operates as an operating
    system service and is started on each restart.


    You may wonder why are the commands are specified as arrays. There are two ways
    commands are run by cloud-init. The command will be executed as a new process,
    directly using an operating system call, if wrapped into an array like this:


    ```

    runcmd:

    - [ "mkdir", "-p", "/home/opc/uuidservice/venv" ]

    ```'
  trans: "### 计算实例\n\n现在，我们该在 Oracle Cloud Infrastructure 中配置第一个计算实例了。在本章前面描述的规划阶段，我们决定使用最小的虚拟机规格，即\
    \ `VM.Standard2.1`。我们还选择使用可用的最新版 Oracle Linux 7。在撰写本文时，这是 Oracle Linux 7.6，但您也可能会看到更新的次版本。目前，您的学习\
    \ compartment 中应该没有任何计算实例。图 2-18 显示了 OCI 控制台中“实例”视图的空列表。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig18_HTML.jpg](img/478313_1_En_2_Fig18_HTML.jpg)\n\
    \n图 2-18：查看 OCI 控制台实例\n\n即使您自动化了某个基于云的虚拟机的整个启动过程，您可能仍然希望能够远程连接到该主机的命令行。对于基于 Linux\
    \ 的机器（如 Oracle Linux），我们将使用 SSH 公钥认证。如果您主要使用的是基于 Windows 的主机，这可能是您第一次听说 SSH。其原理相当简单。您生成一对相关的文件，即所谓的密钥。一个叫做私钥，另一个叫做公钥。您将公钥上传到云中的一个或多个\
    \ Linux 机器。为了验证您的远程终端连接，您需要私钥。OCI 控制台中的计算实例创建向导为我们提供了上传公钥的机会。\n\n**注意**\n\n本书中的代码片段已在\
    \ macOS 和 Windows Subsystem for Linux 上测试过。此外，所有命令都应适用于主流的 Linux 发行版。如果您使用 Windows\
    \ 且不想使用 Windows Subsystem for Linux，您随时可以在虚拟机上运行 Linux。而且，大多数代码片段也可能在 Windows\
    \ 的 Git Bash 中运行。\n\n如果您想使用 RSA 算法创建新的 SSH 密钥对，只需执行此命令：\n\n```\n$ ssh-keygen -t\
    \ rsa -b 2048 -C michal@vm -f ~/oci_id_rsa\n```\n\n您可以选择使用密码保护您的私钥。每次使用私钥时，系统都会提示您输入密码。将生成两个文件：\n\
    \n*   `oci_id_rsa`，这是私钥。\n*   `oci_id_rsa.pub`，这是公钥。在 OCI 控制台中创建实例时，您将上传此文件。\n\
    \n图 2-19 展示了 SSH 密钥对的创建过程。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig19_HTML.jpg](img/478313_1_En_2_Fig19_HTML.jpg)\n\
    \n图 2-19：创建 SSH 密钥对\n\n我们希望我们的 Oracle Linux 计算实例在机器启动并运行后，能够立即服务于 UUID 服务客户端。我们不希望执行任何手动安装或配置。我们将利用基础操作系统镜像中已预装在计算实例上的\
    \ `cloud-init` 包。`cloud-init` 的作用是在云实例首次启动时执行早期初始化。您的角色是在实例创建期间，以一种支持的格式上传一个 `用户数据`\
    \ 文件。清单 2-3 展示了 `cloud-config` YAML 格式的 `cloud-init` 用户数据。您可以在 `git/chapter02/cloud-init`\
    \ 目录中找到 `cloud-config` 文件。\n\n```yaml\n#cloud-config\nyum_repos:\n  ol7_developer_EPEL:\n\
    \    name: Oracle Linux $releasever Developement Packages ($basearch)\n    baseurl:\
    \ http://yum.oracle.com/repo/OracleLinux/OL7/developer_EPEL/$basearch/\n    enabled:\
    \ true\n    gpgcheck: true\n    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-oracle\n\
    package_upgrade: true\npackages:\n  - tree\n  - wget\n  - python36\n  - python36-pip\n\
    write_files:\n  - content: |\n      [Unit]\n      Description = Launching UUID\
    \ Service API\n      After = network.target\n      [Service]\n      Environment=FLASK_APP=/home/opc/uuidservice/app.py\n\
    \      Environment=LC_ALL=en_US.utf8\n      Environment=LANG=en_US.utf8\n    \
    \  ExecStart = /home/opc/uuidservice/venv/bin/flask run --host=0.0.0.0\n     \
    \ User = opc\n      [Install]\n      WantedBy = multi-user.target\n    path: /etc/systemd/system/uuidservice.service\n\
    runcmd:\n  - [ \"mkdir\", \"-p\", \"/home/opc/uuidservice/venv\" ]\n  - [ \"chown\"\
    , \"opc:opc\", \"/home/opc/uuidservice\" ]\n  - [ \"python3\", \"-m\", \"venv\"\
    , \"/home/opc/uuidservice/venv\" ]\n  - [ \"/home/opc/uuidservice/venv/bin/python3\"\
    , \"-m\", \"pip\", \"install\", \"--upgrade\", \"pip\" ]\n  - [ \"/home/opc/uuidservice/venv/bin/python3\"\
    , \"-m\", \"pip\", \"install\", \"flask\" ]\n  - [ \"wget\", \"-qO\", \"/home/opc/uuidservice/app.py\"\
    , \"https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/uuid-service/app.py\
    \ \" ]\n  - [ \"firewall-offline-cmd\", \"--add-port=5000/tcp\" ]\n  - [ \"systemctl\"\
    , \"restart\", \"firewalld\" ]\n  - [ \"ln\", \"-s\", \"/etc/systemd/system/uuidservice.service\"\
    , \"/etc/systemd/system/multi-user.target.wants/uuidservice.service\" ]\n  - [\
    \ \"systemctl\", \"enable\", \"uuidservice.service\" ]\n  - [ \"systemctl\", \"\
    start\", \"uuidservice.service\" ]\nfinal_message: \"UUID Service API node is\
    \ running, after $UPTIME seconds\"\n```\n\n清单 2-3： `vm.config.yaml`\n\n稍后，您将把这个文件上传到\
    \ OCI 控制台实例创建向导。首先，让我们了解一下它的作用。如果您仔细查看清单 2-3，会发现它由六个命名节组成。\n\n*   `yum_repos`\
    \ 定义一个将要添加到 Yum 的新仓库。\n*   `package_upgrade` 触发系统范围的包更新。\n*   `packages` 列出了将在机器上安装的新包。\n\
    *   `write_files` 在给定路径使用提供的内容创建一个新文件。\n*   `runcmd` 按提供的顺序执行命令。\n*   `final_message`\
    \ 在处理完成时打印一条消息。\n\n但是，我们的云配置具体做了什么呢？首先，它将 Oracle Linux EPEL 仓库添加到 Yum。该仓库包含我们运行基于\
    \ Python 的 UUID 服务所需的 Python 3。`cloud-init` 将执行系统范围的包升级，并不仅安装 Python 3，还安装 `wget`\
    \ 和 `tree` 实用程序。另一个有趣的部分是 `write_files` 节，在我们的案例中，它创建了一个新的 systemd 单元文件。文件内容的创建方式使得\
    \ UUID 服务能够作为 systemd 服务运行。通过这种方式，我们能够遵循一种在 Linux 中将应用程序作为操作系统服务运行的标准化方法。最后但同样重要的是，`runcmd`\
    \ 节运行一系列命令。首先，为新的 Python 虚拟环境创建目录，然后使用 Python 3 的 `venv` 模块生成虚拟环境本身。接下来，在虚拟环境内部，我们升级\
    \ Python 包安装器 (`pip`) 并用它来安装 Flask。随后的步骤使用 `wget` 实用程序从本书相关的 GitHub 仓库下载 UUID\
    \ 服务代码，并在操作系统防火墙中开放 5000 端口。最后三个命令有效地链接、启用并启动了 systemd 服务。这样，UUID 服务就作为一个操作系统服务运行，并在每次重启时自动启动。\n\
    \n您可能想知道为什么命令被指定为数组。`cloud-init` 有两种运行命令的方式。如果命令像这样包装在数组中，它将通过操作系统调用直接作为一个新进程执行：\n\
    \n```yaml\nruncmd:\n  - [ \"mkdir\", \"-p\", \"/home/opc/uuidservice/venv\" ]\n\
    ```"
- fmt: "The command will be written to a file first and then passed to the operating\
    \ system shell for processing, if simply written as a string like this:\n\n```\n\
    runcmd:\n- mkdir -p /home/opc/uuidservice/venv\n```\n\nWhile the first way may\
    \ be considered a bit faster from a performance point of view, only the latter\
    \ will allow you to combine multiple commands by using piping like this:\n\n```\n\
    runcmd:\n- 'echo $(date) | tee /home/opc/datemarker'\n```\n\nIt is fine to mix\
    \ both styles in the same `runcmd` section.\n\n**Tip**\nInstead of copying the\
    \ user data file straight from Listing [2-3](#478313_1_En_2_Chapter.xhtml#PC5),\
    \ I recommend that you clone the Git repository associated with this book from\
    \ my GitHub account and use the cloud-config user data file you will find at `oci-book/chapter02/cloud-init`.\
    \ In this way, you will be able to enjoy the code that is always up-to-date, in\
    \ case something changes in the future.\n\nNow, please prepare the two files we’ve\
    \ just discussed.\n- Public SSH key\n- User data file for the UUID service\n\n\
    We are ready to launch the instance. This is how you create a new compute instance\
    \ using the OCI Console:\n\n1.  Go to Menu ➤ Compute ➤ Instances.\n2.  Make sure\
    \ that the `Sandbox` compartment is selected.\n3.  Click Create Instance.\n4.\
    \  Name your instance as **uuid-1**.\n5.  Click Show Shape, Network and Storage\
    \ Options.\n6.  Set the image source to the newest Oracle Linux base image, such\
    \ as Oracle Linux 7.6 or newer.\n7.  Provide the required details:\n    1.  Select\
    \ the first availability domain in your region.\n    2.  Set the instance type\
    \ to Virtual Machine.\n    3.  Select `VM.Standard2.1` as your instance shape.\n\
    8.  In the Configure Networking section, as shown in Figure [2-22](#478313_1_En_2_Chapter.xhtml#Fig22):\n\
    \    1.  Make sure your new a-net subnet is selected.\n    2.  Check Assign a\
    \ Public IP Address.\n9.  In the Add SSH Key section:\n    1.  Choose the newly\
    \ generated public key (`oci_id_rsa.pub`), as shown in Figure [2-21](#478313_1_En_2_Chapter.xhtml#Fig21).\n\
    10. Click Show Advanced Options.\n11. On the Management tab under Advanced Options,\
    \ as shown in Figure [2-23](#478313_1_En_2_Chapter.xhtml#Fig23):\n    1.  Choose\
    \ the user data file shown in Listing [2-3](#478313_1_En_2_Chapter.xhtml#PC5).\
    \ You will always find the latest version of the user data file on my GitHub account\
    \ at [`https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/cloud-init/vm.config.yaml`](https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter02/cloud-init/vm.config.yaml).\n\
    12. On the Networking tab under Advanced Options, as shown in Figure [2-24](#478313_1_En_2_Chapter.xhtml#Fig24):\n\
    \    1.  Set Private IP Address to **192.168.1.2**.\n    2.  Set Hostname to **uuid1**.\n\
    13. Click Create.\n\nFigure [2-20](#478313_1_En_2_Chapter.xhtml#Fig20) shows the\
    \ instance creation view in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig20_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig20_HTML.jpg)\n\
    *Figure 2-20. Creating a new compute instance in the OCI Console*\n\nFigure [2-21](#478313_1_En_2_Chapter.xhtml#Fig21)\
    \ shows the SSH key upload section in the OCI Console instance creation wizard.\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig21_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig21_HTML.jpg)\n\
    *Figure 2-21. Uploading an SSH public key in the instance creation wizard*\n\n\
    Figure [2-22](#478313_1_En_2_Chapter.xhtml#Fig22) shows the networking section\
    \ in the OCI Console instance creation wizard.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig22_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig22_HTML.jpg)\n\
    *Figure 2-22. Configuring networking in the instance creation wizard*\n\nFigure\
    \ [2-23](#478313_1_En_2_Chapter.xhtml#Fig23) shows the user data upload section\
    \ in the OCI Console instance creation wizard.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig23_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig23_HTML.jpg)\n\
    *Figure 2-23. Uploading user data in the OCI Console instance creation wizard*\n\
    \nFigure [2-24](#478313_1_En_2_Chapter.xhtml#Fig24) shows the advanced networking\
    \ section in the OCI Console instance creation wizard.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig24_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig24_HTML.jpg)\n\
    *Figure 2-24. Configuring advanced networking in the instance creation wizard*\n\
    \nIt usually takes about one minute to provision this shape and the base image\
    \ of a compute instance. We’ve selected the Assign Public IP Address checkbox;\
    \ therefore, the primary vNIC attached to your instance will get a public IP address\
    \ assigned from the Oracle Cloud pool of public IPv4 addresses. You will be able\
    \ to connect to the instance using this IP address as long as the subnet’s security\
    \ list rules allow the particular traffic. Private IP addresses are used within\
    \ the VCN to enable local communication between compute instances.\n\nFigure [2-25](#478313_1_En_2_Chapter.xhtml#Fig25)\
    \ shows compute instance provisioning in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig25_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig25_HTML.jpg)\n\
    *Figure 2-25. Provisioning of a compute instance in the OCI Console*\n\nFigure\
    \ [2-26](#478313_1_En_2_Chapter.xhtml#Fig26) shows a running compute instance\
    \ in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig26_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig26_HTML.jpg)\n\
    *Figure 2-26. Viewing a running compute instance in the OCI Console*\n\n## Testing\
    \ the Application\n\nCloud solutions are often designed and automated in such\
    \ a way that there is no need to run any additional initialization scripts manually\
    \ in a terminal. You deploy your solution in a ready-to-go state from the beginning\
    \ using a combination of custom image and user data that basically contains the\
    \ initialization instructions. The same applies to our UUID service. As soon as\
    \ the instance’s boot process has been completed and `cloud-init` has executed\
    \ all the user data instructions, the API is up and running.\n\n### SSH Connection\n\
    \nYet, let me make an exception here. I would like to show you around the instance,\
    \ and there is no better way than using the operating system shell. Let’s use\
    \ `ssh` to connect to the `uuid-1` compute instance remotely. You will find the\
    \ instance’s public IP in Instance Details, as shown in Figure [2-26](#478313_1_En_2_Chapter.xhtml#Fig26).\
    \ In my case, it is `130.61.91.155`. Even though you will be using key-based authentication,\
    \ a username for which you are establishing the connection is still expected.\
    \ For Oracle Linux and CentOS, please use the `opc` username. For Ubuntu, please\
    \ use the `ubuntu` username.\n\n```\n$ UUID1_INSTANCE=130.61.91.155\n$ ssh -i\
    \ ~/oci_id_rsa opc@$UUID1_INSTANCE\n```\n\nOne more thing, do not be surprised\
    \ if you are not able to connect to the terminal immediately after seeing the\
    \ instance state moving from “provisioning” to “running.” It can still take a\
    \ few more seconds to start the SSH daemon, although an instance is said to be\
    \ “running.”\n\n**Tip**\nIf you are on Windows, I recommend using Windows Subsystem\
    \ for Linux, Linux guest VM, or Git Bash to get the same `ssh` experience as if\
    \ you were using a UNIX-based platform.\n\nFigure [2-27](#478313_1_En_2_Chapter.xhtml#Fig27)\
    \ shows how to connect to a remote compute instance.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig27_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig27_HTML.jpg)\n\
    *Figure 2-27. Connecting to a compute instance over SSH*\n\nCongratulations, you’ve\
    \ just entered the cloud space."
