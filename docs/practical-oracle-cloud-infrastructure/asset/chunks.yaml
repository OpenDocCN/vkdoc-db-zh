    The access to various types of cloud resources is given to groups, not the individual
    users. We will focus on local groups only, but you may benefit from knowing that
    it is also possible to map your identity provider groups to the local groups.
    Policy statements define what kind of access is allowed to whom and in which scope.
    We will take a closer look at policy statements in a second. First, let’s discuss
    groups.'
