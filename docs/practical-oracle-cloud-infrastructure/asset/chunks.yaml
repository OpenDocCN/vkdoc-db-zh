    waw/bemowo/105.pdf (18.0K)\nwaw/bemowo/107.pdf (23.0K)\nwaw/bemowo/115.pdf (33.0K)\n\
    waw/bemowo/parking.pdf (9.90625K)\nwaw/bemowo/summary.txt (0.2470703125K)\n###\
    \ Report generated 2019-03-21 16:34:33.971448\n```\n\n如你所见，报告包含了所有前缀为 `the waw/bemowo`\
    \ 字符串的对象名称和大小。最后一行显示了报告创建的时间戳，与计算实例上运行的 `reportissuer` 服务最后记录的相同。\n\n清单 5-9 展示了上传到计算实例并由\
    \ cloud-init 模块处理的 cloud-config 文件。结果，一系列步骤发生。首先，一个新的单元文件被添加到计算实例文件系统，路径如下：`/etc/systemd/system/reportissuer.service`。这个单元文件是封装我们应用程序的新\
    \ systemd 服务的基础。它指定了几个为 `reportissuer.py` 脚本提供运行时配置的变量，该脚本是这里主要的服务可执行文件。cloud\
    \ config 文件的 `runcmd` 部分定义了在实例上执行的进一步操作，例如安装 Python 3 和 OCI SDK，从 GitHub 仓库下载\
    \ `reportissuer.py` 脚本，以及一些命令，这些命令共同基于我们提供的单元文件有效地添加了一个新的 systemd 服务。"
