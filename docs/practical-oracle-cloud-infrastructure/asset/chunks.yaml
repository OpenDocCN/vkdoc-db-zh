- fmt: "All cloud resources have been provisioned in the `Sandbox` compartment. There\
    \ are two load balancer subnets. They will be used to host highly available, floating-IP-based,\
    \ public load balancers that will appear when you start creating `LoadBalancer`-type\
    \ `Service` Kubernetes objects. The `Pods CIDR` field shows the private IP address\
    \ range that will be used by dynamically created pods, while the `Services CIDR`\
    \ field shows the same for the addresses exposed by Kubernetes services. Both\
    \ pods and service address ranges are chosen in such a way that they do not overlap\
    \ with the address range used by the `kube-vcn` VCN to which the worker nodes\
    \ are attached.\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig21_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig21_HTML.jpg)\n\
    \nFigure 8-21\n\nViewing an active OKE cluster summary in the OCI Console\n\n\
    If you look at the final output in Terraform, you will see not only cluster resources\
    \ but also a node pool mentioned.\n\n```\n...\nmodule.kubernetes.oci_containerengine_cluster.k8s_cluster:\
    \ Creation complete after 6m6s\nmodule.kubernetes.oci_containerengine_node_pool.k8s_nodepool:\
    \ Creating...\nmodule.kubernetes.oci_containerengine_node_pool.k8s_nodepool: Creation\
    \ complete after 2s\nApply complete! Resources: 13 added, 0 changed, 0 destroyed.\n\
    ```\n\nThe node pool is managed by OKE, and you can see it in the OCI Console\
    \ at the bottom of the Cluster details view, as shown in Figure [8-22](#478313_1_En_8_Chapter.xhtml#Fig22).\
    \ The pool controls the compute instances that serve as worker nodes. If you click\
    \ one of the names of any of these instances, you will be transferred to the Instance\
    \ Details view of the corresponding instance. All worker nodes that belong to\
    \ an OKE cluster node pool are visible just like any ordinary compute instance,\
    \ as presented in Figure [8-23](#478313_1_En_8_Chapter.xhtml#Fig23). You can watch\
    \ their metrics and inspect other instance-specific information. You can also\
    \ spot that instance display names contain a small part of the cluster OCID. If\
    \ you wondered where the instances for the master nodes and etcd hosts are, the\
    \ answer is that the entire OKE cluster control plane is fully managed by OKE\
    \ and never exposed in any part in the API. You won’t see them in the OCI Console,\
    \ and you won’t be able to list them using API. These compute resources are invisible.\n\
    \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig23_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig23_HTML.jpg)\n\
    \nFigure 8-23\n\nOKE cluster instances in the OCI Console\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig22_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig22_HTML.jpg)\n\
    \nFigure 8-22\n\nOKE cluster node pool in the OCI Console\n\nThe infrastructure\
    \ code declares one compute instance in each worker node subnet that we chose\
    \ to be private subnets. You have two options for the worker nodes. They can be\
    \ attached to public subnets and hold public IPs or be isolated from the outside\
    \ world in private subnets that inhibit the instances from having public IPs.\
    \ In our case, we chose the second option. This is why you see `Unavailable` in\
    \ the `Public IP` column of the `Node Pool` table. The instances were deployed\
    \ in two different ADs. They are of the `VM.Standard2.1` shape and based on the\
    \ `Oracle Linux 7.6` image. Where do these choices actually come from? Let’s take\
    \ a look at selected elements in the infrastructure code:\n\n```\n$ find . -name\
    \ \"*.tf\" | sort\n./kube/cluster.tf\n./kube/vars.tf\n./kube/vcn-lb.tf\n./kube/vcn-workers.tf\n\
    ./modules.tf\n./provider.tf\n./vars.tf\n./vcn.tf\n```\n\nThe infrastructure code\
    \ follows a well-known structure you’ve already seen a few times in this book.\
    \ There is just one nonroot module named `kube`. It contains all the infrastructure\
    \ cloud resources used by the OKE cluster excluding VCN and gateways. The VCN,\
    \ the NAT gateway, and the Internet gateway are declared in the `vcn.tf` file.\
    \ The `modules.tf` file provides the OCIDs of the aforementioned networking resources\
    \ as input parameters to the `kube` module. The code from the root module is similar\
    \ to what you’ve seen in the previous exercises; therefore, I am not going to\
    \ list the root module files here. You can check them directly in the infrastructure\
    \ code. Listing [8-6](#478313_1_En_8_Chapter.xhtml#PC33) shows the `vars.tf` file\
    \ from the `kube` module.\n\n```\n# kube module - vars.tf\n...\nvariable \"oke_cluster\"\
    \ {\n  type = map\n  default = {\n    cidr                  = \"10.0.2.0/24\"\n\
    \    version               = \"v1.12.7\"\n    worker_image          = \"Oracle-Linux-7.6\"\
    \n    worker_shape          = \"VM.Standard2.1\"\n    worker_nodes_in_subnet =\
    \ 1\n    pods_cidr             = \"10.244.0.0/16\"\n    services_cidr        \
    \ = \"10.96.0.0/16\"\n  }\n}\nvariable \"oke_wn_subnet_cidr\" {\n  type = list(string)\n\
    \  default = [ \"10.0.2.0/27\", \"10.0.2.32/27\" ]\n}\nvariable \"oke_lb_subnet_cidr\"\
    \ {\n  type = list(string)\n  default = [ \"10.0.2.128/28\", \"10.0.2.144/28\"\
    \ ]\n}\nvariable \"oke_engine_cidr\" {\n  type = list(string)\n  default = [ \"\
    130.35.0.0/16\", \"138.1.0.0/17\"]\n}\nListing 8-6\nvars.tf (kube Module)\n```\n\
    \nYou may be overwhelmed by the number of various IP address ranges defined for\
    \ different subnets in the `vars.tf` file of the `kube` module. It is not as complicated\
    \ as it may seem. Take a look at Figure [8-24](#478313_1_En_8_Chapter.xhtml#Fig24).\
    \ Kubernetes alone requires two nonoverlapping private IP address ranges for pods\
    \ and services. These are set in the `oke_cluster` Terraform variable map and\
    \ later passed to the `oci_container_engine_cluster` Terraform resource that represents\
    \ the OKE cluster we have just provisioned. The underlying infrastructure such\
    \ as compute instances or OCI load balancers will be distributed across four subnets\
    \ that belong to the same VCN. The subnets for worker nodes are set in the `oke_wn_subnet_cidr`\
    \ list variable, while the subnets for load balancers are set in the `oke_lb_subnet_cidr`\
    \ list variable.\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig24_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig24_HTML.jpg)\n\
    \nFigure 8-24\n\nOKE cluster-related subnets\n\nListing [8-7](#478313_1_En_8_Chapter.xhtml#PC34)\
    \ presents the `vcn-workers.tf` file that contains declarations for VCN resources\
    \ related to the subnets for worker nodes. There are two private subnets defined,\
    \ each in a different availability domain."
  raw: 'All cloud resources have been provisioned in the `Sandbox` compartment. There
    are two load balancer subnets. They will be used to host highly available, floating-IP-based,
    public load balancers that will appear when you start creating LoadBalancer-type
    Service Kubernetes objects. The Pods CIDR field shows the private IP address range
    that will be used by dynamically created pods, while the Services CIDR field shows
    the same for the addresses exposed by Kubernetes services. Both pods and service
    address ranges are chosen in such a way that they do not overlap with the address
    range used by the `kube-vcn` VCN to which the worker nodes are attached.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig21_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig21_HTML.jpg)


    Figure 8-21


    Viewing an active OKE cluster summary in the OCI Console


    If you look at the final output in Terraform, you will see not only cluster resources
    but also a node pool mentioned.


    ```

    ...

    module.kubernetes.oci_containerengine_cluster.k8s_cluster: Creation complete after
    6m6s module.kubernetes.oci_containerengine_node_pool.k8s_nodepool: Creating...

    module.kubernetes.oci_containerengine_node_pool.k8s_nodepool: Creation complete
    after 2s

    Apply complete! Resources: 13 added, 0 changed, 0 destroyed.

    ```


    The node pool is managed by OKE, and you can see it in the OCI Console at the
    bottom of the Cluster details view, as shown in Figure [8-22](#478313_1_En_8_Chapter.xhtml#Fig22).
    The pool controls the compute instances that serve as worker nodes. If you click
    one of the names of any of these instances, you will be transferred to the Instance
    Details view of the corresponding instance. All worker nodes that belong to an
    OKE cluster node pool are visible just like any ordinary compute instance, as
    presented in Figure [8-23](#478313_1_En_8_Chapter.xhtml#Fig23). You can watch
    their metrics and inspect other instance-specific information. You can also spot
    that instance display names contain a small part of the cluster OCID. If you wondered
    where the instances for the master nodes and etcd hosts are, the answer is that
    the entire OKE cluster control plane is fully managed by OKE and never exposed
    in any part in the API. You won’t see them in the OCI Console, and you won’t be
    able to list them using API. These compute resources are invisible.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig23_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig23_HTML.jpg)


    Figure 8-23


    OKE cluster instances in *the*OCI Console


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig22_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig22_HTML.jpg)


    Figure 8-22


    OKE cluster node pool in *the*OCI Console


    The infrastructure code declares one compute instance in each worker node subnet
    that we chose to be private subnets. You have two options for the worker nodes.
    They can be attached to public subnets and hold public IPs or be isolated from
    the outside world in private subnets that inhibit the instances from having public
    IPs. In our case, we chose the second option. This is why you see Unavailable
    in the Public IP column of the Node Pool table. The instances were deployed in
    two different ADs. They are of the VM.Standard2.1 shape and based on the Oracle
    Linux 7.6 image. Where do these choices actually come from? Let’s take a look
    at selected elements in the infrastructure code:


    ```

    $ find . -name "*.tf" | sort

    ./kube/cluster.tf

    ./kube/vars.tf

    ./kube/vcn-lb.tf

    ./kube/vcn-workers.tf

    ./modules.tf

    ./provider.tf

    ./vars.tf

    ./vcn.tf

    ```


    The infrastructure code follows a well-known structure you’ve already seen a few
    times in this book. There is just one nonroot module named `kube`. It contains
    all the infrastructure cloud resources used by the OKE cluster excluding VCN and
    gateways. The VCN, the NAT gateway, and the Internet gateway are declared in the
    `vcn.tf` file. The `modules.tf` file provides the OCIDs of the aforementioned
    networking resources as input parameters to the `kube` module. The code from the
    root module is similar to what you’ve seen in the previous exercises; therefore,
    I am not going to list the root module files here. You can check them directly
    in the infrastructure code. Listing [8-6](#478313_1_En_8_Chapter.xhtml#PC33) shows
    the `vars.tf` file from the `kube` module.


    ```

    # kube module - vars.tf

    ...

    variable "oke_cluster" {

    type = map

    default = {

    cidr = "10.0.2.0/24"

    version = "v1.12.7"

    worker_image = "Oracle-Linux-7.6"

    worker_shape = "VM.Standard2.1"

    worker_nodes_in_subnet = 1

    pods_cidr = "10.244.0.0/16"

    services_cidr = "10.96.0.0/16"

    }

    }

    variable "oke_wn_subnet_cidr" {

    type = list(string)

    default = [ "10.0.2.0/27", "10.0.2.32/27" ]

    }

    variable "oke_lb_subnet_cidr" {

    type = list(string)

    default = [ "10.0.2.128/28", "10.0.2.144/28" ]

    }

    variable "oke_engine_cidr" {

    type = list(string)

    default = [ "130.35.0.0/16", "138.1.0.0/17"]

    }

    Listing 8-6

    vars.tf (kube Module)

    ```


    You may be overwhelmed by the number of various IP address ranges defined for
    different subnets in the `vars.tf` file of the `kube` module. It is not as complicated
    as it may seem. Take a look at Figure [8-24](#478313_1_En_8_Chapter.xhtml#Fig24).
    Kubernetes alone requires two nonoverlapping private IP address ranges for pods
    and services. These are set in `the oke_cluster` Terraform variable map and later
    passed to the `oci_container_engine_cluster` Terraform resource that represents
    the OKE cluster we have just provisioned. The underlying infrastructure such as
    compute instances or OCI load balancers will be distributed across four subnets
    that belong to the same VCN. The subnets for worker nodes are set in `the oke_wn_subnet_cidr`
    list variable, while the subnets for load balancers are set in `the oke_lb_subnet_cidr`
    list variable.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig24_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig24_HTML.jpg)


    Figure 8-24


    OKE cluster-related subnets


    Listing [8-7](#478313_1_En_8_Chapter.xhtml#PC34) presents the `vcn-workers.tf`
    file that contains declarations for VCN resources related to the subnets for worker
    nodes. There are two private subnets defined, each in a different availability
    domain.'
  trans: "\n所有云资源都已配置在`Sandbox`隔离区中。有两个负载均衡器子网。它们将用于托管高可用的、基于浮动 IP 的公共负载均衡器，当你开始创建`LoadBalancer`类型的\
    \ Kubernetes `Service`对象时，这些负载均衡器就会出现。`Pod CIDR`字段显示了将由动态创建的 Pod 使用的私有 IP 地址范围，而`Services\
    \ CIDR`字段则显示了由 Kubernetes 服务暴露的地址范围。Pod 和服务地址范围的选取方式确保它们不会与工作节点所连接的`kube-vcn`虚拟云网络（VCN）所使用的地址范围重叠。\n\
    \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig21_HTML.jpg](img/478313_1_En_8_Fig21_HTML.jpg)\n\
    \n图 8-21\n\n在 OCI 控制台中查看活动的 OKE 集群摘要\n\n如果你查看 Terraform 的最终输出，你会看到不仅列出了集群资源，还提到了一个节点池。\n\
    \n```\n...\nmodule.kubernetes.oci_containerengine_cluster.k8s_cluster: Creation\
    \ complete after 6m6s\nmodule.kubernetes.oci_containerengine_node_pool.k8s_nodepool:\
    \ Creating...\nmodule.kubernetes.oci_containerengine_node_pool.k8s_nodepool: Creation\
    \ complete after 2s\nApply complete! Resources: 13 added, 0 changed, 0 destroyed.\n\
    ```\n\n节点池由 OKE 管理，你可以在 OCI 控制台集群详情视图的底部看到它，如图 8-22 所示。该池控制着充当工作节点的计算实例。如果你点击这些实例中任何一个的名称，你将被转到相应实例的“实例详情”视图。所有属于\
    \ OKE 集群节点池的工作节点都像任何普通计算实例一样可见，如图 8-23 所示。你可以查看它们的指标并检查其他实例特有的信息。你还会发现实例显示名称包含了一小部分集群\
    \ OCID。如果你想知道主节点和 etcd 主机的实例在哪里，答案是整个 OKE 集群控制平面完全由 OKE 托管，从未在任何 API 中暴露。你不会在\
    \ OCI 控制台中看到它们，也无法使用 API 列出它们。这些计算资源是不可见的。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig23_HTML.jpg](img/478313_1_En_8_Fig23_HTML.jpg)\n\
    \n图 8-23\n\nOCI 控制台中的 OKE 集群实例\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig22_HTML.jpg](img/478313_1_En_8_Fig22_HTML.jpg)\n\
    \n图 8-22\n\nOCI 控制台中的 OKE 集群节点池\n\n基础设施代码在我们选择设为私有子网的每个工作节点子网中声明了一个计算实例。对于工作节点，你有两个选项。它们可以连接到公共子网并拥有公共\
    \ IP，也可以被隔离在阻止实例拥有公共 IP 的私有子网中。在我们的案例中，我们选择了第二个选项。这就是为什么你在`Node Pool`表的`Public\
    \ IP`列中看到`Unavailable`。这些实例部署在两个不同的可用性域（AD）中。它们的规格是`VM.Standard2.1`，基于`Oracle\
    \ Linux 7.6`镜像。这些选择究竟从何而来？让我们看一下基础设施代码中的选定元素：\n\n```\n$ find . -name \"*.tf\"\
    \ | sort\n./kube/cluster.tf\n./kube/vars.tf\n./kube/vcn-lb.tf\n./kube/vcn-workers.tf\n\
    ./modules.tf\n./provider.tf\n./vars.tf\n./vcn.tf\n```\n\n基础设施代码遵循一个众所周知的、你在这本书中已经见过几次的结构。只有一个名为`kube`的非根模块。它包含了\
    \ OKE 集群使用的所有基础设施云资源，但 VCN 和网关除外。VCN、NAT 网关和互联网网关在`vcn.tf`文件中声明。`modules.tf`文件将这些网络资源的\
    \ OCID 作为输入参数提供给`kube`模块。根模块中的代码与你在之前练习中看到的类似；因此，我不打算在这里列出根模块文件。你可以直接在基础设施代码中查看它们。清单\
    \ 8-6 显示了来自`kube`模块的`vars.tf`文件。\n\n```\n# kube module - vars.tf\n...\nvariable\
    \ \"oke_cluster\" {\n  type = map\n  default = {\n    cidr                  =\
    \ \"10.0.2.0/24\"\n    version               = \"v1.12.7\"\n    worker_image \
    \         = \"Oracle-Linux-7.6\"\n    worker_shape          = \"VM.Standard2.1\"\
    \n    worker_nodes_in_subnet = 1\n    pods_cidr             = \"10.244.0.0/16\"\
    \n    services_cidr         = \"10.96.0.0/16\"\n  }\n}\nvariable \"oke_wn_subnet_cidr\"\
    \ {\n  type = list(string)\n  default = [ \"10.0.2.0/27\", \"10.0.2.32/27\" ]\n\
    }\nvariable \"oke_lb_subnet_cidr\" {\n  type = list(string)\n  default = [ \"\
    10.0.2.128/28\", \"10.0.2.144/28\" ]\n}\nvariable \"oke_engine_cidr\" {\n  type\
    \ = list(string)\n  default = [ \"130.35.0.0/16\", \"138.1.0.0/17\"]\n}\n代码清单\
    \ 8-6\nvars.tf（kube 模块）\n```\n\n你可能被`kube`模块的`vars.tf`文件中为不同子网定义的各种 IP 地址范围的数量所淹没。它并没有看起来那么复杂。看一下图\
    \ 8-24。仅 Kubernetes 本身就需要两个不重叠的私有 IP 地址范围，分别用于 Pod 和服务。这些范围在`oke_cluster` Terraform\
    \ 变量映射中设置，然后传递给代表我们刚刚配置的 OKE 集群的`oci_container_engine_cluster` Terraform 资源。底层基础设施，如计算实例或\
    \ OCI 负载均衡器，将分布在属于同一个 VCN 的四个子网中。工作节点的子网在`oke_wn_subnet_cidr`列表变量中设置，而负载均衡器的子网则在`oke_lb_subnet_cidr`列表变量中设置。\n\
    \n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig24_HTML.jpg](img/478313_1_En_8_Fig24_HTML.jpg)\n\
    \n图 8-24\n\n与 OKE 集群相关的子网\n\n代码清单 8-7 展示了`vcn-workers.tf`文件，其中包含与工作节点子网相关的 VCN\
    \ 资源的声明。这里定义了两个私有子网，每个位于不同的可用性域中。\n"
- fmt: "## Worker Node Subnets and Networking\n\n以下代码块展示了为 OKE 工作节点子网配置的路由表、安全列表和子网资源。这些资源定义在\
    \ `vcn-workers.tf` 文件中。\n\n```\nresource \"oci_core_route_table\" \"oke_workers_rt\"\
    \ {\n  compartment_id = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n\
    \  display_name   = \"oke-workers-rt\"\n  route_rules {\n    destination     \
    \   = \"0.0.0.0/0\"\n    network_entity_id  = var.vcn_nat_ocid\n  }\n}\n\nresource\
    \ \"oci_core_security_list\" \"oke_workers_sl\" {\n  compartment_id = var.compartment_ocid\n\
    \  vcn_id         = var.vcn_ocid\n  display_name   = \"oke-workers-sl\"\n  # Allow\
    \ all traffic within the VCN\n  egress_security_rules {\n    stateless    = true\n\
    \    destination  = var.oke_cluster[\"cidr\"]\n    protocol     = \"all\"\n  }\n\
    \  ingress_security_rules {\n    stateless    = true\n    source       = var.oke_cluster[\"\
    cidr\"]\n    protocol     = \"all\"\n  }\n  # Allow all outbound traffic\n  egress_security_rules\
    \ {\n    destination = \"0.0.0.0/0\"\n    protocol    = \"all\"\n  }\n}\n\nresource\
    \ \"oci_core_subnet\" \"oke_workers_ad1_net\" {\n  compartment_id      = var.compartment_ocid\n\
    \  vcn_id              = var.vcn_ocid\n  display_name        = \"oke-workers-ad1-net\"\
    \n  availability_domain = var.ads[0]\n  cidr_block          = var.oke_wn_subnet_cidr[0]\n\
    \  route_table_id      = oci_core_route_table.oke_workers_rt.id\n  security_list_ids\
    \   = [ oci_core_security_list.oke_workers_sl.id ]\n  prohibit_public_ip_on_vnic\
    \ = true\n  dns_label           = \"work1\"\n}\n\nresource \"oci_core_subnet\"\
    \ \"oke_workers_ad2_net\" {\n  compartment_id      = var.compartment_ocid\n  vcn_id\
    \              = var.vcn_ocid\n  display_name        = \"oke-workers-ad2-net\"\
    \n  availability_domain = var.ads[1]\n  cidr_block          = var.oke_wn_subnet_cidr[1]\n\
    \  route_table_id      = oci_core_route_table.oke_workers_rt.id\n  security_list_ids\
    \   = [ oci_core_security_list.oke_workers_sl.id ]\n  prohibit_public_ip_on_vnic\
    \ = true\n  dns_label           = \"work2\"\n}\n```\n*Listing 8-7: `vcn-workers.tf`\
    \ (kube Module)*\n\n## Load Balancer Subnets and Networking\n\n类似地，为负载均衡器子网配置的\
    \ VCN 资源声明在一个名为 `vcn-lb.tf` 的类似文件中（如 Listing [8-8](#478313_1_En_8_Chapter.xhtml#PC35)\
    \ 所示）。这里同样定义了两个子网，每个位于不同的可用性域。这两个子网是公有的，以便 OKE 能够为任何 LoadBalancer 类型的 Kubernetes\
    \ 服务创建 OCI 公有负载均衡器。\n\n```\nresource \"oci_core_route_table\" \"oke_lb_rt\" {\n\
    \  compartment_id = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  display_name\
    \   = \"oke-lb-rt\"\n  route_rules {\n    destination        = \"0.0.0.0/0\"\n\
    \    network_entity_id  = var.vcn_igw_ocid\n  }\n}\n\nresource \"oci_core_security_list\"\
    \ \"oke_lb_sl\" {\n  compartment_id = var.compartment_ocid\n  vcn_id         =\
    \ var.vcn_ocid\n  display_name   = \"oke-lb-sl\"\n  # Allow all traffic within\
    \ the VCN\n  egress_security_rules {\n    stateless    = true\n    destination\
    \  = var.oke_cluster[\"cidr\"]\n    protocol     = \"all\"\n  }\n  ingress_security_rules\
    \ {\n    stateless    = true\n    source       = var.oke_cluster[\"cidr\"]\n \
    \   protocol     = \"all\"\n  }\n  # Allow all inbound traffic on ports 30000-32767\n\
    \  egress_security_rules {\n    stateless    = true\n    destination  = \"0.0.0.0/0\"\
    \n    protocol     = \"all\"\n  }\n  ingress_security_rules {\n    stateless \
    \   = true\n    source       = \"0.0.0.0/0\"\n    protocol     = \"6\"\n    tcp_options\
    \ {\n      min = 30000\n      max = 32767\n    }\n  }\n}\n\nresource \"oci_core_subnet\"\
    \ \"oke_lb_ad1_net\" {\n  compartment_id      = var.compartment_ocid\n  vcn_id\
    \              = var.vcn_ocid\n  display_name        = \"oke-lb-ad1-net\"\n  availability_domain\
    \ = var.ads[0]\n  cidr_block          = var.oke_lb_subnet_cidr[0]\n  route_table_id\
    \      = oci_core_route_table.oke_lb_rt.id\n  security_list_ids   = [ oci_core_security_list.oke_lb_sl.id\
    \ ]\n  dns_label           = \"lb1\"\n}\n\nresource \"oci_core_subnet\" \"oke_lb_ad2_net\"\
    \ {\n  compartment_id      = var.compartment_ocid\n  vcn_id              = var.vcn_ocid\n\
    \  display_name        = \"oke-lb-ad2-net\"\n  availability_domain = var.ads[1]\n\
    \  cidr_block          = var.oke_lb_subnet_cidr[1]\n  route_table_id      = oci_core_route_table.oke_lb_rt.id\n\
    \  security_list_ids   = [ oci_core_security_list.oke_lb_sl.id ]\n  dns_label\
    \           = \"lb2\"\n}\n```\n*Listing 8-8: `vcn-lb.tf` (kube Module)*\n\n##\
    \ OKE Cluster and Node Pool\n\n最后，OKE 集群及其对应的节点池（用作 Kubernetes 工作节点的计算实例）在 `cluster.tf`\
    \ 基础设施文件中声明。代码如 Listing [8-9](#478313_1_En_8_Chapter.xhtml#PC36) 所示。\n\n```\n\
    resource \"oci_containerengine_cluster\" \"k8s_cluster\" {\n  compartment_id \
    \     = var.compartment_ocid\n  kubernetes_version  = var.oke_cluster[\"version\"\
    ]\n  name                = \"k8s-cluster\"\n  vcn_id              = var.vcn_ocid\n\
    \  options {\n    kubernetes_network_config {\n      pods_cidr      = var.oke_cluster[\"\
    pods_cidr\"]\n      services_cidr  = var.oke_cluster[\"services_cidr\"]\n    }\n\
    \    service_lb_subnet_ids = [\n      oci_core_subnet.oke_lb_ad1_net.id,\n   \
    \   oci_core_subnet.oke_lb_ad2_net.id\n    ]\n  }\n}\n\nresource \"oci_containerengine_node_pool\"\
    \ \"k8s_nodepool\" {\n  compartment_id      = var.compartment_ocid\n  cluster_id\
    \          = oci_containerengine_cluster.k8s_cluster.id\n  kubernetes_version\
    \  = var.oke_cluster[\"version\"]\n  name                = \"k8s-nodepool\"\n\
    \  node_image_name     = var.oke_cluster[\"worker_image\"]\n  node_shape     \
    \     = var.oke_cluster[\"worker_shape\"]\n  subnet_ids = [\n    oci_core_subnet.oke_workers_ad1_net.id,\n\
    \    oci_core_subnet.oke_workers_ad2_net.id\n  ]\n  quantity_per_subnet = var.oke_cluster[\"\
    worker_nodes_in_subnet\"]\n  ssh_public_key      = file(\"~/.ssh/oci_id_rsa.pub\"\
    )\n}\n```\n*Listing 8-9: `cluster.tf` (kube Module)*\n\nFigure [8-25](#478313_1_En_8_Chapter.xhtml#Fig25)\
    \ 展示了为 `k8s-cluster` OKE 集群实例配置的 OCI 基础设施组件。Kubernetes 控制平面元素（如主节点和 etcd 主机）是完全托管的、不可访问的，因此从\
    \ API 或 OCI 控制台中不可见。你可以检查、监控并在一定程度上管理的是作为工作节点的计算实例、负载均衡器以及其他虚拟网络组件。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig25_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig25_HTML.jpg)\n\
    \n*Figure 8-25: 已配置的 OKE 集群*\n\n有了托管的 Kubernetes 集群，现在是时候连接到 Kubernetes API 了。"
