    你可以像这样向函数提供输入：


    ```

    [ubuntu@dev-vm]$ echo -n ''{ "client_name": "some_app"  }'' | fn invoke uuidapp
    uuidfn --content-type application/json

    {"generator_uuid": "3298bb2e-9cd5-476b-83b6-f4343d7c8522", "generator_client":
    "some_app"}

    ```


    如你所见，这次响应中有两个 JSON 对象。响应中的 `generator_client` 对象存储了作为输入传入的 `client_name` 值。


    该函数被隐式定义为在 HTTP 触发器上启动。这意味着必须有一个与该函数关联的 HTTP 端点。事实上，HTTP 端点正是我们使大多数无服务器函数在生产中发挥作用所必需的。你可以使用
    `fn inspect function` 命令查看函数特定的端点。


    ```

    [ubuntu@dev-vm]$ fn inspect function uuidapp uuidfn

    {

    "annotations": {

    "fnproject.io/fn/invokeEndpoint": "http://localhost:8080/invoke/01DMR7VTNHNG8G00GZJ0000009"

    },

    "app_id": "01DMR7TZRFNG8G00GZJ0000008",

    "created_at": "2019-09-14T15:57:01.489Z",

    "id": "01DMR7VTNHNG8G00GZJ0000009",

    "idle_timeout": 30,

    "image": "localdev/uuidfn:0.0.2",

    "memory": 256,

    "name": "uuidfn",

    "timeout": 30,

    "updated_at": "2019-09-14T15:57:01.489Z"

    }

    ```


    除了端点之外，该命令还揭示了其他信息，例如函数的最大执行时间、空闲超时以及函数使用的容器镜像。`fn inspect function` 命令与 `jq`
    命令的恰当组合将让你提取端点并将其保存到 shell 变量中。


    ```

    [ubuntu@dev-vm]$ FN_INVOKE_ENDPOINT=`fn inspect function uuidapp uuidfn | jq -r
    ''.annotations."fnproject.io/fn/invokeEndpoint"''`

    ```


    接下来，我们可以使用众所周知的 `curl` 工具向该端点发送 HTTP 请求。


    ```

    [ubuntu@dev-vm]$ curl -X "POST" -H "Content-Type: application/json" $FN_INVOKE_ENDPOINT

    {"generator_uuid": "84eb8921-663f-4469-ad3b-fa34813da319"}

    ```


    本节简要介绍了 Fn Project 以及实践中本地执行的无服务器函数。还有许多其他方面未涉及，例如将多个函数打包到单个应用程序中、单元测试以及将函数镜像推送到其他注册表。更重要的是，无服务器确实只给无服务器函数开发者带来一种“无需基础设施”的印象。如果你想运营一个无服务器平台，尤其是在生产环境中，有各种关键任务需要规划和执行。这些任务涉及安全、负载均衡和工作节点池管理。Fn
    Project 在其网页上记录了这些说明。所有这些都超出了本书的讨论范围。


    与其自己运营无服务器平台，你可以依赖一个托管的基于云的无服务器平台。在下一节中，我们将使用 Oracle Functions，这是一个基于 Fn Project
    在 Oracle Cloud Infrastructure 上构建的托管无服务器平台。


    ### Oracle Functions


    Fn Project 是 *Oracle Functions* 的基础，后者是在 Oracle Cloud 上可用的函数即服务平台。在上一节中，你操作了一个本地
    Fn 服务器。现在，你可以将相同的函数代码部署到 Oracle Functions。通过这样做，你将让你的函数在你选择的 Oracle Cloud 区域中运行。无需像我们在前几章中运行应用程序那样配置任何计算实例或容器编排集群。底层计算资源完全由
    Oracle Functions 在后台管理。函数实例是动态创建的，以响应函数 *触发器*。正如你可能预期的那样，最基本的触发器类型是 HTTP 请求。每一个部署到
    Oracle Functions 的 Fn Project 函数都会被赋予一个专用的基于 HTTP 的 *函数端点*。发送到该端点的请求必须经过正确签名才能通过
    OCI Identity and Access Management 完成的身份验证和授权。当它们成功后，Oracle Functions 会读取函数元数据，并根据该信息创建特定于函数的容器来处理请求。其他类型的触发器是在
    Oracle Cloud 内发生的各种 *事件*。例如，特定对象存储桶中新建的对象可能会生成一个事件，该事件由 Oracle Events 服务传播到 Oracle
    Functions 服务中的选定函数。你将在本章第二部分了解到这一点。两种触发器——基于 HTTP 和基于事件的——以及 Oracle Functions
    的一般工作方式如图 [9-9](#478313_1_En_9_Chapter.xhtml#Fig9) 所示。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig9_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig9_HTML.jpg)


    图 9-9


    Oracle Functions


    建议将函数特定的容器镜像存储在与你希望无服务器函数运行的 Oracle Functions 端点相同区域的 Oracle Container Image Registry
    (OCIR) 中。你在上一章已经使用过 OCIR。那时，Oracle Kubernetes Engine 从 OCIR 拉取镜像以在 Kubernetes
    Pod 中创建容器。这次，镜像将被 Oracle Functions 动态拉取，以创建短生命周期的函数容器，用于处理到达的函数调用。'
