    该策略的作用是让默认组 `Administrators` 的成员管理你租户中的所有云资源。此策略受到保护，你既不能删除它，也无法添加任何其他语句。


    在你的根 compartment 中可见的第二个默认策略，即 `PSM-root-policy` 策略，允许各种 Oracle Cloud Platform
    服务在 Oracle Cloud Infrastructure 上进行配置。本文档不对此进行讨论。


    本章前面，我们创建了一个名为 `sandbox-admin` 的新用户，并将他添加到新创建的 `sandbox-admins` 组中。我们还为这个用户在 `~/.oci/config`
    文件中添加了一个专用的配置文件。如果我们尝试代表此用户执行任何 CLI 命令，命令将因 `NotAuthorizedOrNotFound` 服务错误而失败，因为目前没有任何策略语句允许
    `sandbox-admins` 组的成员与 API 交互。我们已准备好通过向根 compartment 添加一个新策略来改变这一点。该策略将仅包含一条语句，允许
    `sandbox-admins` 组的成员在 `Sandbox` compartment 中对所有资源执行各种操作。以下是使用 CLI 执行此操作的方法：


    ```

    $ oci iam policy create -c $TENANCY_OCID --name sandbox-admins-policy --description
    "Sandbox compartment 管理员组的策略"  --statements ''["allow group sandbox-admins to
    manage all-resources in compartment Sandbox"]''

    ```

    '
- fmt: "# OCI策略管理与审计\n\n该命令创建了一个名为 `sandbox-admins-policy` 的新策略云资源。尽管该策略是在根 compartment\
    \ 中创建的，但其声明的作用域指向了 `Sandbox` compartment。此 IAM 策略包含一条声明。\n\n```\nallow group sandbox-admins\
    \ to manage all-resources in compartment Sandbox\n```\n\n这条声明功能强大，因为它允许 `sandbox-admins`\
    \ 组的成员对 `Sandbox` compartment 中的云资源执行所有类型的操作，包括创建策略声明，以授权其他组在 `Sandbox` 及其子 compartment\
    \ 中执行操作。\n\n**注意**\n\n在继续之前，请确保您已按照本章“组”部分末尾的描述，将两个配置文件（`SANDBOX-ADMIN` 和 `SANDBOX-USER`）添加到\
    \ `~/.oci/config` 和 `~/.oci/oci_cli_rc` 文件中！\n\n让我们尝试一下 `sandbox-admin` 用户是否能够访问某些\
    \ API。不要忘记应用正确的 `--profile` 开关，以便请求以 `sandbox-admin` 用户身份签名。\n\n```\n$ oci lb\
    \ shape list --profile SANDBOX-ADMIN --query 'data[*].name'\n[\n  \"100Mbps\"\
    ,\n  \"400Mbps\",\n  \"8000Mbps\"\n]\n```\n\n一切正常。我们能够列出可用的负载均衡器形状。如果您使用 `SANDBOX-USER`\
    \ 配置文件重复相同的命令，将会看到错误，因为 `sandbox-users` 组未在 `Sandbox` compartment 的任何策略中被提及。\n\
    \n```\n$ oci lb shape list --profile SANDBOX-USER --query 'data[*].name'\nServiceError:\n\
    {\n  \"code\": \"NotAuthorizedOrNotFound\",\n  \"message\": \"Authorization failed\
    \ or requested resource not found.\",\n  \"opc-request-id\": \"CF6...............7DC\"\
    ,\n  \"status\": 404\n}\n```\n\n为了允许 `sandbox-user` 查看 `Sandbox` compartment 中的负载均衡器形状、协议和负载均衡器，我们需要向适当的组授予针对\
    \ `the load-balancers` 资源类型的 `inspect` 策略动词。作为 `sandbox-admin` 用户，您将创建一个新策略，这次是在\
    \ `Sandbox` compartment 中。我还将向您展示如何从 JSON 文件导入策略声明。如果您希望，这可以让您在版本控制的文件中管理策略声明。首先，我们需要一个包含\
    \ IAM 策略声明的文件。您可以在 `chapter04/2-policies/sandbox-user-policy.json` 路径下找到它。列表 [4-5](#478313_1_En_4_Chapter.xhtml#PC34)\
    \ 显示了这个策略文件的内容。\n\n```\n[\n  \"allow group sandbox-users to inspect load-balancers\
    \ in compartment Sandbox\"\n]\nListing 4-5\nPolicy Statements in JSON File\n```\n\
    \n我们将引用 `sandbox-user-policy.json` 文件，同时执行 `oci iam policy create` CLI 命令，该命令将在\
    \ `Sandbox` compartment 中添加一个新策略，其声明从 JSON 文件中读取。执行命令时不要忘记使用 `SANDBOX-ADMIN` 配置文件。\n\
    \n```\n$ cd ~/git/oci-book/chapter04/2-policies/\n$ oci iam policy create --profile\
    \ SANDBOX-ADMIN --name sandbox-users-policy --description \"Policy for regular\
    \ Sandbox compartment users\"  --statements \"file://~/sandbox-user-policy.json\"\
    \n```\n\n要验证新的 `sandbox-users-policy` 策略是否已成功在 `Sandbox` compartment 中创建，您可以运行此命令：\n\
    \n```\n$ oci iam policy list --profile SANDBOX-ADMIN --all --query \"data[*].{Name:name,Statements:statements}\"\
    \n[\n  {\n    \"Name\": \"sandbox-users-policy\",\n    \"Statements\": [\n   \
    \   \"allow group sandbox-users to inspect load-balancers in compartment Sandbox\"\
    \n    ]\n  }\n]\n```\n\n对于最终测试，请以 `sandbox-user` 用户身份，在 CLI 命令中应用 `SANDBOX-USER`\
    \ 配置文件，重复之前不成功的 API 调用。\n\n```\n$ oci lb shape list --profile SANDBOX-USER --query\
    \ 'data[*].name'\n[\n  \"100Mbps\",\n  \"400Mbps\",\n  \"8000Mbps\"\n]\n```\n\n\
    如果出现问题，请确保已将 `sandbox-user` 添加到 `sandbox-users` 组。如您所见，一旦添加了相关的策略声明，用户就能成功访问 API。\n\
    \n在本节中，我们创建了两个策略，如图 [4-20](#478313_1_En_4_Chapter.xhtml#Fig20) 所示。第一个名为 `sandbox-admins-policy`，添加到根\
    \ compartment，授予 `sandbox-admins` 组成员对 `Sandbox` compartment 范围内的所有类型云资源进行无限制的管理级访问。第二个策略名为\
    \ `sandbox-users-policy`，设置在 `Sandbox` compartment 内部，仅授予 `sandbox-users` 组成员对\
    \ `Sandbox` compartment 范围内存在的、特定于负载均衡器的资源类型进行有限的查看级访问。\n\n![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig20_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig20_HTML.jpg)\n\
    \nFigure 4-20\nPolicies in different compartments\n\n您的租户包含的用户和 compartment 越多，最终可能就需要一套相当复杂的策略。这就是为什么您应该从一开始就牢记一个组织良好的策略放置模式及其声明结构。由于隐式的拒绝所有规则，我鼓励您逐步增加对各种云资源的访问级别，一旦发现用户确实需要访问它们。在本书中，对于\
    \ `sandbox-user` 用户，我们将遵循这一最佳实践。在后面的每一章中，我将添加所需的策略声明，以便该用户能够执行特定章节中包含的任务。\n\n\
    我们已经介绍了如何使用 OCI 控制台和 CLI 来管理 compartment、用户、组和策略。您可能想知道，特别是在阅读了第 [3](#478313_1_En_3_Chapter.xhtml)\
    \ 章之后，是否可以将这些云资源包含在您的 Terraform 基础设施代码中。嗯，技术上，是的。绝对可以。例如，您可以使用 `oci_identity_policy`\
    \ 资源来定义访问策略。然而，我个人更倾向于在 Terraform 基础设施代码之外管理 IAM 云资源。\n\n## 审计与搜索\n\n作为云租户所有者或您所管理云账户的负责人，您需要密切关注在任何给定时刻存在于不同\
    \ compartment 中的所有这些不同的云资源。此外，您应该了解用户采取的操作。当我谈到对一个或多个云资源的操作时，我基本上指的是与 API 的交互。我在前一章讨论自动化选项时提到过这一点。任何类型的活动，无论是在\
    \ OCI 控制台中完成的，还是通过 API、SDK、CLI 或 Terraform 完成的，在底层都会产生一个 API 调用。在本节中，我将向您简要介绍\
    \ Oracle 云基础设施中的搜索和审计功能，当您想要正确控制情况时，这些功能确实是不可或缺的。"
  raw: 'The command has created a new policy cloud resource called `sandbox-admins-policy`.
    Even though the policy was created in the root compartment, the scope of the statement
    refers to the `Sandbox` compartment. The IAM policy contains one statement.


    ```

    allow group sandbox-admins to manage all-resources in compartment Sandbox

    ```


    This statement is pretty powerful because it allows the members of the `sandbox-admins`
    group to perform all kinds of operations on the cloud resources in the `Sandbox`
    compartment, including the creation of policies with statements that grant other
    groups to take actions in the `Sandbox` compartment or its subcompartments.


    Caution


    Before continuing, please make sure you’ve added two profiles (`SANDBOX-ADMIN`
    and `SANDBOX-USER`) to the `~/.oci/config` and `~/.oci/oci_cli_rc` files, as described
    at the end of the “Groups” section in this chapter!


    Let’s try if the `sandbox-admin` user is able to access some APIs. Do not forget
    to apply the correct `--profile` switch so that the request is signed as the `sandbox-admin`
    user .


    ```

    $ oci lb shape list --profile SANDBOX-ADMIN --query ''data[*].name''

    [

    "100Mbps",

    "400Mbps",

    "8000Mbps"

    ]

    ```


    Everything looks fine. We were able to list the available load balancer shapes.
    If you repeat the same command, but this time using the `SANDBOX-USER` profile,
    you will see an error because the other group, `sandbox-users`, is not mentioned
    in any policy for the `Sandbox` compartment.


    ```

    $ oci lb shape list --profile SANDBOX-USER --query ''data[*].name''

    ServiceError:

    {

    "code": "NotAuthorizedOrNotFound",

    "message": "Authorization failed or requested resource not found.",

    "opc-request-id": "CF6...............7DC",

    "status": 404

    }

    ```


    To let the `sandbox-user` see the load balancer shapes, protocols, and load balancers
    in the `Sandbox` compartment, we need to grant the `inspect` policy verb over
    `the load-balancers` resource type to the proper group. As the `sandbox-admin`
    user, you will create a new policy, this time in the `Sandbox` compartment. I
    will additionally show you how to import the policy statements from a JSON file.
    This would let you manage the policy statements in version-controlled files if
    you want. First, we need a file with the IAM policy statement. You will find it
    at the `chapter04/2-policies/sandbox-user-policy.json` path. Listing [4-5](#478313_1_En_4_Chapter.xhtml#PC34)
    shows the contents of this policy file.


    ```

    [

    "allow group sandbox-users to inspect load-balancers in compartment Sandbox"

    ]

    Listing 4-5

    Policy Statements in JSON File

    ```


    We will reference the `sandbox-user-policy.json` file, as we execute the `oci
    iam policy create` CLI command that adds a new policy in the `Sandbox` compartment
    with the statements read from the JSON file. Do not forget to use the `SANDBOX-ADMIN`
    profile when you execute the command.


    ```

    $ cd ~/git/oci-book/chapter04/2-policies/

    $ oci iam policy create --profile SANDBOX-ADMIN --name sandbox-users-policy --description
    "Policy for regular Sandbox compartment users"  --statements "file://~/sandbox-user-policy.json"

    ```


    To verify whether the new `sandbox-users-policy` policy has been successfully
    created in the `Sandbox` compartment, you can run this command:


    ```

    $ oci iam policy list --profile SANDBOX-ADMIN --all --query "data[*].{Name:name,Statements:statements}"

    [

    {

    "Name": "sandbox-users-policy",

    "Statements": [

    "allow group sandbox-users to inspect load-balancers in compartment Sandbox"

    ]

    }

    ]

    ```


    For the final test, please try repeating the previously unsuccessful API call,
    again as the `sandbox-user` user, by applying the `SANDBOX-USER` profile in the
    CLI command.


    ```

    $ oci lb shape list --profile SANDBOX-USER --query ''data[*].name''

    [

    "100Mbps",

    "400Mbps",

    "8000Mbps"

    ]

    ```


    If something went wrong, please make sure you’ve added the `sandbox-user` to the
    `sandbox-users` group. As you can see, as soon as the relevant policy statement
    has been added, the user is able to successfully reach the API.


    In this section, we created two policies, as shown in Figure [4-20](#478313_1_En_4_Chapter.xhtml#Fig20).
    The first one, called `sandbox-admins-policy` , was added to the root compartment
    and granted unlimited management-level access over all kinds of cloud resources
    in the scope of the `Sandbox` compartment to the `sandbox-admins` group members.
    The second policy, named `sandbox-users-policy`, was set up inside the `Sandbox`
    compartment and given limited inspect-level access just over load-balancer-specific
    resource types that exist in the scope of the `Sandbox` compartment to the `sandbox-users`
    group members.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig20_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig20_HTML.jpg)


    Figure 4-20


    Policies in different compartments


    The more users and compartments your tenancy contains, the more you may end up
    with the need for a pretty complex set of policies. This is why you should have
    in mind a well-organized pattern for the placement of policies and their statements
    structure from the beginning. Because of the implicit deny-all rule, I encourage
    you to gradually increase the access level to various cloud resources, as soon
    as you spot that users really need access to them. Throughout this book, we are
    going to follow this best practice in the case of the `sandbox-user` user. In
    each later chapter, I am going to add the required policy statements so that this
    user is able to perform the tasks included in a particular chapter.


    We’ve covered the compartments, users, groups, and policies management by using
    the OCI Console and the CLI. You may wonder, especially after having read Chapter
    [3](#478313_1_En_3_Chapter.xhtml), whether it is possible to include these cloud
    resources in your Terraform infrastructure code. Well, technically, yes. Absolutely.
    For example, you would use the `oci_identity_policy` resource to define an access
    policy. However, I personally prefer to manage IAM cloud resources outside of
    my Terraform infrastructure code.


    ## Audit and Search


    As a cloud tenancy owner or a person responsible for the cloud account you manage,
    you need to keep an eye on all these different cloud resources that exist across
    different compartments at any given moment. In addition, you should be aware of
    the actions taken by the users. When I talk about an action over one particular
    or sometimes many cloud resources at once, I basically think about an interaction
    with the API. I mentioned this in the previous chapter, as I discussed the automation
    options. Any kind of activity, no matter if it is done in the OCI Console, with
    the use of API, SDK, CLI, or Terraform, results in an API call under the hood.
    In this section, I will introduce you briefly to the searching and auditing capabilities
    in Oracle Cloud Infrastructure, which are truly indispensable when you want to
    control things properly.'
