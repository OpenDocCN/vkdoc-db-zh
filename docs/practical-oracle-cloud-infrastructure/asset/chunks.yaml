  trans: "\n# 配置并部署 OCI 实例主体报告服务\n\n## Cloud-init 配置\n\n以下 `appvm.config.yaml` 文件（清单\
    \ 5-9）展示了如何使用 cloud-init 为应用虚拟机配置 `reportissuer` 服务。\n\n```yaml\n#cloud-config\n\
    write_files:\n-   content: |\n    [Unit]\n    Description = Issue Report Job\n\
    \    After = network.target\n    [Service]\n    Environment=APP_BUCKET_NAME=blueprints\n\
    \    Environment=APP_OBJECT_NAME=waw/bemowo/summary.txt\n    Environment=APP_OBJECT_PREFIX=waw/bemowo\n\
    \    Environment=APP_POLLING_INTERVAL_SECONDS=30\n    Environment=PYTHONUNBUFFERED=1\n\
    \    ExecStart = /home/opc/reportissuer.py\n    User = opc\n    [Install]\n  \
    \  WantedBy = multi-user.target\n    path: /etc/systemd/system/reportissuer.service\n\
    runcmd:\n-  [ yum, -y, install, \"https://centos7.iuscommunity.org/ius-release.rpm\"\
    \ ]\n-  [ yum, -y, install, python3 ]\n-  [ yum, -y, install, python3-pip ]\n\
    -  [ python3, -m, pip, install, --upgrade, pip ]\n-  [ python3, -m, pip, install,\
    \ oci ]\n-  [ wget, \"https://raw.githubusercontent.com/mtjakobczyk/oci-book/master/chapter05/3-instance-principals/applications/reportissuer.py\"\
    \ ]\n-  [ mv, reportissuer.py, \"/home/opc/\" ]\n-  [ chown, \"opc:opc\", \"/home/opc/reportissuer.py\"\
    \ ]\n-  [ chmod, \"u+x\", \"/home/opc/reportissuer.py\" ]\n-  [ ln, -s, \"/etc/systemd/system/reportissuer.service\"\
    , \"/etc/systemd/system/multi-user.target.wants/reportissuer.service\" ]\n-  [\
    \ systemctl, enable, reportissuer.service ]\n-  [ systemctl, start, reportissuer.service\
    \ ]\n```\n\n## `reportissuer` 服务实现详解\n\n如果你对 `reportissuer` 服务的实现感兴趣，特别是它如何以实例主体身份进行身份验证，请继续阅读。清单\
    \ 5-10 展示了程序的主函数。\n\n```python\nif __name__ == '__main__':\n    bucket_name =\
    \ os.environ['APP_BUCKET_NAME']\n    summary_object_name = os.environ['APP_OBJECT_NAME']\n\
    \    object_prefix = os.environ['APP_OBJECT_PREFIX']\n    polling_interval_seconds\
    \ = int(os.environ['APP_POLLING_INTERVAL_SECONDS'])\n    tmp_directory = os.environ['HOME']\n\
    \    while True:\n        print('Creating a report')\n        signer = oci.auth.signers.InstancePrincipalsSecurityTokenSigner()\n\
    \        client = oci.object_storage.ObjectStorageClient(config={}, signer=signer)\n\
    \        storage_namespace = client.get_namespace().data\n        report_entry_list\
    \ = prepare_report_entries(storage_namespace, bucket_name, object_prefix, client)\n\
    \        upload_report(report_entry_list, tmp_directory, storage_namespace, bucket_name,\
    \ summary_object_name, client)\n        time.sleep(polling_interval_seconds)\n\
    ```\n\n**主函数说明**：前几行将环境变量读取到对应的本地程序变量中。这些值已在上传的 systemd 单元文件（`reportissuer.service`）的\
    \ `Service` 部分定义。该过程的循环性质通过一个无限 `while` 循环实现。在每次迭代结束时，进程线程会休眠由 `APP_POLLING_INTERVAL_SECONDS`\
    \ 环境变量定义的时长。`prepare_report_entries` 函数负责列出对象并为 `upload_report` 函数准备一个列表，后者将新创建的摘要文件上传到存储桶。每次迭代时，都会创建一个对象存储客户端类的实例，并设置为使用实例主体安全令牌签名器。这两行简单的代码导致了基于实例主体的请求签名的使用：\n\
    \n```python\nsigner = oci.auth.signers.InstancePrincipalsSecurityTokenSigner()\n\
    client = oci.object_storage.ObjectStorageClient(config={}, signer=signer)\n```\n\
    \n所有其他 SDK 客户端类都可以以相同方式使用，以利用实例主体和动态组。这可以大大简化在 Oracle Cloud Infrastructure 计算实例上运行的应用程序的身份验证模式，因为你不再需要向每个计算实例提供密钥和用户详细信息。\n\
    \n## 函数详解\n\n### `prepare_report_entries` 函数\n\n清单 5-11 展示了 `prepare_report_entries`\
    \ 函数。`client.list_objects` 方法调用对象存储 API 以获取名称以特定前缀开头的对象列表。关键字参数 `fields=\"name,size\"\
    ` 通知 API 我们感兴趣的字段。如果我们将其省略，API 将不会在响应中返回 `size` 字段值。我们遍历返回的对象，并使用字符串连接来准备一个报告条目。最后，我们返回一个包含已创建报告条目的列表。\n\
    \n```python\ndef prepare_report_entries(storage_namespace, bucket_name, object_prefix,\
    \ client):\n    report_entries = []\n    objects = client.list_objects(storage_namespace,\
    \ bucket_name, fields=\"name,size\", prefix=object_prefix).data.objects\n    for\
    \ obj in objects:\n        entry = str(obj.name)+' ('+str(obj.size/1024)+'K)'\n\
    \        report_entries.append(entry)\n    return report_entries\n```\n\n### `upload_report`\
    \ 函数\n\n清单 5-12 涵盖了 `upload_report` 函数，它获取报告条目列表并将它们写入一个新的临时文件。为了避免名称冲突，我们在文件名中包含了一个新生成的\
    \ UUID。文件的最后一行包含报告创建时间戳。相同的字符串被写入标准输出，也就是你刚才在 systemd 服务状态日志中看到的。`client.put_object`\
    \ 方法将文件内容作为一个新对象上传。最后，临时文件从本地文件系统中被删除。\n\n```python\ndef upload_report(report_entry_list,\
    \ tmp_directory, storage_namespace, bucket_name, object_name, client):\n    tmp_report_filename\
    \ = tmp_directory+'/bucket_report.'+str(uuid.uuid4())+'.txt'\n    with open(tmp_report_filename,\
    \ 'w') as stream:\n        for entry in report_entry_list:\n            stream.write(entry+'\\\
    n')\n        report_timestamp_str = '### Report generated '+str(datetime.datetime.now())+'\\\
    n'\n        stream.write(report_timestamp_str)\n        print(report_timestamp_str)\n\
    \    with open(tmp_report_filename, 'r') as stream:\n        client.put_object(storage_namespace,\
    \ bucket_name, object_name, stream)\n    os.remove(tmp_report_filename)\n```\n\
    \n## 清理资源\n\n这结束了实例主体的演示。你现在可以使用众所周知的 `terraform destroy` 命令来终止所有云资源，如下所示：\n\n\
    ```bash\n$ terraform destroy --auto-approve\noci_core_virtual_network.app_vcn:\
    \ Refreshing state...\ndata.oci_identity_availability_domains.ads: Refreshing\
    \ state...\ndata.oci_core_images.centos_image: Refreshing state...\noci_core_internet_gateway.app_igw:\
    \ Refreshing state...\noci_core_security_list.app_sl: Refreshing state...\noci_core_route_table.app_rt:\
    \ Refreshing state...\noci_core_subnet.app_subnet: Refreshing state...\noci_core_instance.app_vm:\
    \ Refreshing state...\ndata.oci_core_vnic_attachments.app_vnic_attachment: Refreshing\
    \ state...\ndata.oci_core_vnic.app_vnic: Refreshing state...\nmodule.app.oci_core_instance.app_vm:\
    \ Destroying...\nmodule.app.oci_core_instance.app_vm: Destruction complete after\
    \ 2m15s\nmodule.app.oci_core_subnet.app_subnet: Destroying...\nmodule.app.oci_core_subnet.app_subnet:\
    \ Destruction complete after 0s\nmodule.app.oci_core_route_table.app_rt: Destroying...\n\
    module.app.oci_core_security_list.app_sl: Destroying...\nmodule.app.oci_core_security_list.app_sl:\
    \ Destruction complete after 1s\nmodule.app.oci_core_route_table.app_rt: Destruction\
    \ complete after 1s\noci_core_internet_gateway.app_igw: Destroying...\noci_core_internet_gateway.app_igw:\
    \ Destruction complete after 0s\noci_core_virtual_network.app_vcn: Destroying...\n\
    oci_core_virtual_network.app_vcn: Destruction complete after 0s\nDestroy complete!\
    \ Resources: 6 destroyed.\n```\n"
- fmt: '# Oracle Cloud Infrastructure 对象存储监控与公共访问


    Oracle Cloud Infrastructure 提供了丰富的监控功能，包含多种服务特定指标。对于对象存储，存储桶有两个可用指标：对象数量和存储桶聚合大小。要在
    OCI 控制台中查看监控数据，请按照以下步骤操作：


    1.  转到 **菜单** ➤ **对象存储** ➤ **对象存储**。

    2.  单击存储桶名称。

    3.  在 **资源** 选项卡上，选择 **指标**。


    如果单击其中一个图表，将会显示详细视图，如图 [5-15](#478313_1_En_5_Chapter.xhtml#Fig15) 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig15_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig15_HTML.jpg)


    图 5-15

    查看对象存储指标


    > **注意**

    > 在详细图表的底部，您将看到用于生成显示结果的查询。Oracle Cloud Infrastructure 使用监控查询语言（MQL），可用于创建自定义图表。


    ## 公共访问


    有时，您可能决定将选定的存储桶设置为允许匿名只读访问，以便向公众提供内容。在构建依赖于公共内容的边缘解决方案（例如移动应用程序）时，此方法可能很有用。例如，您可以将选定的图像、视频和文章存储在允许所有人下载这些对象的存储桶中。在这种情况下，您可以简单地使用
    *公共存储桶*。使用 CLI 时，您可以使用 `--public-access-type` 选项来定义存储桶是私有还是公共。默认值 `NoPublicAccess`
    会创建私有存储桶。公共存储桶可以有两种访问模式。


    *   `ObjectRead`

    *   `ObjectReadWithoutList`


    两者都将允许未经身份验证的用户对对象进行只读访问。唯一的区别是 `ObjectReadWithoutList` 会为未经身份验证的用户禁用对象列表功能。这有助于仅向持有确切链接的用户提供对象，并避免您的内容被爬取，尤其是在您使用难以或无法猜测的对象名称时。技术上可以在公共和私有之间来回更改公共访问类型，但这不被视为最佳实践。


    如果您有一个包含大量对象的存储桶，并且您发现自己处于希望暂时允许对其中一个对象进行未经身份验证的读写访问的情况，该怎么办？在此类及其他场景中，您可能会发现
    *预身份验证请求* 很有用。预身份验证请求带有一个动态生成的唯一 URL，该 URL 在定义的时间段内保持有效。任何持有该 URL 的人都可以在预身份验证请求允许的范围内使用对象存储。如果您为特定对象创建预身份验证请求，可以从三种访问类型中选择。


    *   `ObjectRead`

    *   `ObjectWrite`

    *   `ObjectReadWrite`


    这些 URL 几乎无法猜测。只要您的分发渠道安全，并且您信任边缘的应用程序，您可以考虑构建一个依赖于预身份验证请求的解决方案，供那些既不使用实例主体也不使用经过身份验证的用户的应用程序访问对象。以下是使用
    CLI 为 blueprints 存储桶中的一个 PDF 文件创建预身份验证请求的方法：


    ```bash

    $ date +"%Y-%m-%d"

    2019-09-29

    $ ONE_WEEK_LATER="2019-10-06"

    $ MIDNIGHT="T00:00:00.000Z"

    $ oci os preauth-request create -bn blueprints --name waw-bemowo-105-par --access-type
    ObjectRead --time-expires "$ONE_WEEK_LATER$MIDNIGHT" -on waw/bemowo/105.pdf --profile
    SANDBOX-ADMIN

    {

    "data": {

    "access-type": "ObjectRead",

    "access-uri": "/p/n0218vRTg4FW5d1t1nV-uMPp471HFIxNccISzFiU2Qg/n/jakobczyk/b/blueprints/o/waw/bemowo/105.pdf",

    "id": "tk/aQTCjIGsF1EJ1SsMAMVOwPNW4RErVneNfLjR5LN8=:waw/bemowo/105.pdf",

    "name": "waw-bemowo-105-par",

    "object-name": "waw/bemowo/105.pdf",

    "time-created": "2019-09-29T23:16:20.599000+00:00",

    "time-expires": "2019-10-06T00:00:00+00:00"

    }

    }

    ```


    无论预身份验证请求是通过 OCI 控制台还是使用 CLI 创建的，您都只会看到生成的访问 URI 一次，因此请确保您或您的应用程序代码已读取它。如果您错过了此操作，预身份验证请求将变得无用。`--time-expires`
    选项间接定义了访问 URI 保持活动状态的时间窗口。无法延长或缩短此时间段，但您可以自由删除现有请求并为同一对象创建新的预身份验证请求以更改过期时间。由于这些原因，在构建严重依赖预身份验证请求的解决方案之前，请确保您能够实现可靠的通知和分发渠道，以便向应用程序提供最新的预身份验证请求。


    要使用访问 URI，您需要通过在前面加上特定于区域的基础 URL 来丰富 `data.access-uri` 字段中返回的值，如以下代码片段所示：


    ```bash

    https://objectstorage.eu-frankfurt-1.oraclecloud.com/p/n0218vRTg4FW5d1t1nV-uMPp471HFIxNccISzFiU2Qg/n/jakobczyk/b/blueprints/o/waw/bemowo/105.pdf

    ```


    您可以尝试在 Web 浏览器中打开该链接。不要忘记使用您自己的链接而不是显示的链接。PDF 文件（更准确地说，是本章中模拟 PDF 文件的随机二进制文件）将被下载到您的本地计算机，即使您未以任何方式进行身份验证。


    您可以使用 OCI 控制台（如图 [5-16](#478313_1_En_5_Chapter.xhtml#Fig16) 所示）或 CLI 来列出现有的预身份验证请求，或在需要时在达到过期时间之前删除其中一些。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig16_HTML.png](images/478313_1_En_5_Chapter/478313_1_En_5_Fig16_HTML.png)


    图 5-16

    在 OCI 控制台中查看活动的预身份验证请求


    也可以为存储桶创建预身份验证请求。在这种情况下，唯一允许的访问类型是 `AnyObjectWrite`，这实际上可以让 URL 持有者管理该存储桶内的所有对象。


    ## 清理


    我们将不再需要本章练习中创建的对象存储资源。您可以删除它们。但有一个例外。不要删除 IAM 策略。我们稍后将需要它们。


    以下是使用 OCI CLI 删除预身份验证请求、对象和 `blueprints` 存储桶的方法：


    ```bash

    $ OS_PARID=`oci os preauth-request list -bn blueprints --query "data[?name==''waw-bemowo-105-par'']
    | [0].id" --raw-output`

    $ oci os preauth-request delete -bn blueprints --par-id $OS_PARID

    Are you sure you want to delete this resource? [y/N]: y

    $ oci os object bulk-delete -bn blueprints

    WARNING: This command will delete 16 objects. Are you sure you want to continue?
    [y/N]: y

    $ oci os bucket delete -bn blueprints

    Are you sure you want to delete this resource? [y/N]: y

    ```


    删除对象将停止其占用存储空间的计费费用。'
  raw: 'Oracle Cloud Infrastructure comes with rich monitoring capabilities with a
    broad variety of service-specific metrics. In the case of object storage, there
    are two metrics available for buckets: the number of objects and the aggregated
    size of a bucket. To view the monitoring data in the OCI Console, follow these
    steps:


    1.  Go to Menu ➤ Object Storage ➤ Object Storage.


    2.  Click the bucket name.


    3.  On the Resource tab, select Metrics.


    If you click one of the charts, you will be presented with a detailed view, as
    shown in Figure [5-15](#478313_1_En_5_Chapter.xhtml#Fig15).


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig15_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Viewing object storage metrics


    Note


    At the bottom of the detailed chart, you will see a query that was used to produce
    the displayed results. Oracle Cloud Infrastructure uses the Monitoring Query Language
    (MQL), which can be used to create custom charts.


    ## Public Access


    Sometimes, you may decide to designate selected buckets to allow anonymous read-only
    access to serve the content to the general public. This approach may be useful
    when building edge solutions such as mobile apps that rely on public content.
    For example, you could store selected images, videos, and articles in a bucket
    that allows everyone to download these objects. In such a case, you can simply
    use *public buckets* . When using the CLI, you employ the `--public-access-type`
    option to define whether a bucket is private or public. The default value, `NoPublicAccess`,
    results in creating a private bucket. There are two access modes a public bucket
    can have.


    *   `ObjectRead`


    *   `ObjectReadWithoutList`


    Both will allow the unauthenticated, read-only access to the objects. The only
    difference is that `ObjectReadWithoutList` will disable object listings for unauthenticated
    users. This may be helpful to serve the objects only to the holders of exact links
    and avoid having your content scrapped, especially if you are using object names
    that are hard or impossible to guess. It is technically possible to change the
    public access type back and forth from public to private and vice versa, but it
    is not considered a best practice.


    What if you have a bucket with a large number of objects and you find yourself
    in a situation where you would benefit from temporarily allowing unauthenticated
    read-write access to just one of these objects? In this and other scenarios, you
    may find *pre-authenticated requests* useful. A pre-authenticated request comes
    with a dynamically generated unique URL that remains active for a defined period
    of time. Anyone holding the URL can use the object storage in the scope allowed
    by the pre-authenticated request. If you create a pre-authenticated request for
    a particular object, you can choose from three access types.


    *   `ObjectRead`


    *   `ObjectWrite`


    *   `ObjectReadWrite`


    The URLs are nearly impossible to guess. As long as your distribution channel
    is secure and you trust the applications at the edge, you could consider building
    a solution that relies on pre-authenticated requests to access the objects by
    applications that neither use instance principals nor use authenticated users.
    This is how you create a pre-authenticated request for one of the PDF files in
    the blueprints bucket using the CLI:


    ```

    $ date +"%Y-%m-%d"

    2019-09-29

    $ ONE_WEEK_LATER="2019-10-06"

    $ MIDNIGHT="T00:00:00.000Z"

    $ oci os preauth-request create -bn blueprints --name waw-bemowo-105-par --access-type
    ObjectRead --time-expires "$ONE_WEEK_LATER$MIDNIGHT" -on waw/bemowo/105.pdf --profile
    SANDBOX-ADMIN

    {

    "data": {

    "access-type": "ObjectRead",

    "access-uri": "/p/n0218vRTg4FW5d1t1nV-uMPp471HFIxNccISzFiU2Qg/n/jakobczyk/b/blueprints/o/waw/bemowo/105.pdf",

    "id": "tk/aQTCjIGsF1EJ1SsMAMVOwPNW4RErVneNfLjR5LN8=:waw/bemowo/105.pdf",

    "name": "waw-bemowo-105-par",

    "object-name": "waw/bemowo/105.pdf",

    "time-created": "2019-09-29T23:16:20.599000+00:00",

    "time-expires": "2019-10-06T00:00:00+00:00"

    }

    }

    ```


    No matter if a pre-authenticated request is created through the OCI Console or
    with the use of CLI, you will see the generated access URI only once, so make
    sure that either you or your application code does read it. If you miss doing
    it, the pre-authenticated request will be useless. The `--time-expires` option
    indirectly defines the time window in which the access URI remains active. It
    is not possible to extend or shorten this period, but you are free to delete the
    existing request and create a new pre-authenticated request for the same object
    to alter the expiration time. Because of these reasons, before you build a solution
    that heavily relies on pre-authenticated requests, make sure you are able to implement
    a reliable distribution and notification channel to provide the applications with
    up-to-date pre-authenticated requests.


    To use the access URI, you need to enrich the value returned in the `data.access-uri`
    field by prepending the region-specific base URL like in this code snippet:


    ```

    https://objectstorage.eu-frankfurt-1.oraclecloud.com/p/n0218vRTg4FW5d1t1nV-uMPp471HFIxNccISzFiU2Qg/n/jakobczyk/b/blueprints/o/waw/bemowo/105.pdf

    ```


    You can try opening the link in a web browser. Do not forget to use your link
    instead of the one shown. The PDF file, or more precisely a random binary file
    that imitated a PDF file in this chapter, will get downloaded to your local machine,
    even though you have not authenticated yourself in any way.


    You can use the OCI Console, as shown in Figure [5-16](#478313_1_En_5_Chapter.xhtml#Fig16),
    or the CLI to list the existing pre-authenticated requests or delete some of them
    before the expiry time is reached, if needed.


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig16_HTML.png](images/478313_1_En_5_Chapter/478313_1_En_5_Fig16_HTML.png)


    Figure 5-16


    Viewing active pre-authenticated request in the OCI Console


    A pre-authenticated request can be created for a bucket as well. In this case,
    the only access type allowed is `AnyObjectWrite` the which effectively lets the
    URL holders manage all objects inside that bucket.


    ## Cleanup


    We will no longer need the object storage resources created during the exercises
    in this chapter. You can remove them. There is one exception to that. Do not remove
    the IAM policies. We will need them later.


    This is how you can use the OCI CLI to remove the pre-authenticated request, the
    objects, and the `blueprints` bucket:


    ```

    $ OS_PARID=`oci os preauth-request list -bn blueprints --query "data[?name==''waw-bemowo-105-par'']
    | [0].id" --raw-output`

    $ oci os preauth-request delete -bn blueprints --par-id $OS_PARID

    Are you sure you want to delete this resource? [y/N]: y

    $ oci os object bulk-delete -bn blueprints

    WARNING: This command will delete 16 objects. Are you sure you want to continue?
    [y/N]: y

    $ oci os bucket delete -bn blueprints

    Are you sure you want to delete this resource? [y/N]: y

    ```


    Removing the objects will stop the billing charges for the storage space they
    occupy.'
