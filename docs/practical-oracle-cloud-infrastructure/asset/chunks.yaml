- fmt: '### Auditing


    Oracle Cloud Infrastructure collects information about every call to the API.
    As a result, any kind of interaction with the API, regardless of its origin, whether
    the OCI Console, SDK, CLI, or Terraform, is a subject of auditing. The audit logs
    are stored for 90 days, unless you change this value. You can retain the audit
    log entries for as long as 365 days. To search for the occurrence of a particular
    event that took place in a chosen timeframe in the OCI Console, take these steps:


    1.  Go to Menu ➤ Governance ➤ Audit.

    2.  Choose the compartment to which you would like to narrow the results.

    3.  Choose the start date and the end date for your timeframe.

    4.  Provide a search keyword such as `LaunchInstance`.

    5.  Click Search.

    6.  Click the Keep Searching label to make sure all audit log entries are processed.


    Figure 4-25 shows the results of an audit event search.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig25_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig25_HTML.jpg)


    Figure 4-25


    Audit Events search in the OCI Console


    The first two entries show the events captured during `vistula-1` and `vistula-2`
    compute instance provisioning. These two instances have been provisioned by the
    tenancy owner admin user, who happens to be a federated user. In the case of federated
    users, to find out who took the action, you would need to expand the event details
    and look at the `principalId` field. The third compute instance called `vistula-3`
    was launched by the `sandbox-admin` user, which is a local, nonfederated user;
    therefore, you can see its name in the User column.


    Note


    Launching the `vistula-*` instances has not been described in this chapter, but
    feel free to search for the `uuid-*` instances you provisioned as part of the
    exercises from the chapter to experiment with the Audit Event search feature.


    There are more details recorded for each audit log event than what you can see
    in the table shown in Figure 4-25. If you expand one of these entries, say the
    third one, you would see more information, as shown in Figure 4-26, including
    the OCID of the compute instance that was the subject of the `LaunchInstance`
    event.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig26_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig26_HTML.jpg)


    Figure 4-26


    Audit event details in the OCI Console


    As always, the same operation is also available in the form of a CLI command,
    this time called `audit event list`.


    ## Summary


    After having read this chapter, you should have a pretty clear understanding of
    how to prepare the logical containers called compartments for the cloud resources
    that belong to different projects environments and production systems. You know
    how to manage users and groups both in the Console and with the use of the CLI.
    You are aware of the importance of the policy statements and have knowledge of
    how to create and manage them using IAM policies. You are able to perform free-text
    searches and find resources using structured queries. Finally, you understand
    the concept of auditing and its importance in cloud tenancy custodianship.


    # 5. Data Storage in the Oracle Cloud


    There are many ways to store data in Oracle Cloud. A lot will depend on the type
    of data, application context, and data usage patterns that apply to a particular
    use case or user story. This chapter will focus solely on one of the most popular
    approaches to store data in the cloud, namely, object storage.


    ## Buckets and Objects


    Imagine you are working for a real estate developer. You are dealing with various
    types of data items such as real estate marketing materials, apartment blueprints,
    parking lot plans, construction schedules, and so on. Even though each of these
    items is typically a file, you may generalize a bit and consider them *objects*.
    In other words, you can see these items as the content that your cloud-based application
    would process and serve. To ease the data asset management, it would be helpful
    to be able to group these objects. In this example, the grouping could be based
    on different real-estate projects, which own particular objects. Now, what if
    you were able to safely forget about nonbusiness tasks such as making sure the
    data is always available and securely replicated to survive any unexpected events?
    This would simply let you focus solely on the business nature of the individual
    data items as required by your business processes. This is where *object storage*
    comes into play. It takes the burden of various, purely technical activities that
    occur in the data lifecycle. The data items are automatically replicated. Furthermore,
    you do not need to worry about whether there is still enough space on a disk volume
    because you never consider individual disk volumes in this case. By contrast,
    from a user perspective, you work with a flat, nearly endless storage space. Last
    but not least, data is by default encrypted at rest using the 256-bit Advanced
    Encryption Standard (AES-256).


    I’ve mentioned that you can group related objects such as, in the case of the
    earlier example, apartment blueprints and parking lot plans that belong to the
    same real estate project. To do so, you need some kind of logical container. Object
    storage lets you store the associated objects in logical containers called *buckets*.
    In the previous chapter, we talked about compartments and their role in isolating
    cloud resources based on the projects and systems maintained under your cloud
    account. The same rule applies here as well. Each bucket has to exist in exactly
    one compartment. This forces you to place the new bucket in the context of some
    particular project environment, production system, or general-purpose compartment
    such as `Sandbox`. Compartments and buckets may still be insufficient in more
    sophisticated ways to organize the objects as you would want. Often, we would
    prefer to deal with a hierarchical structure with a number of hierarchy levels
    to express a more detailed grouping. This can be achieved by prefixing object
    names in a proper way to simulate a folder-like multilevel hierarchy inside a
    bucket. You can prefix object names with /-separated “paths” and end up with complete
    object names such as `/waw/bemowo/125.pdf` or `/waw/bemowo/245.pdf`. This naming
    convention allows you to list the objects based on a particular prefix and perform
    various bulk operations on prefix-based subsets of objects in a bucket when using
    the CLI. Figure 5-1 illustrates the core components of object storage and their
    relation to compartments.


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig1_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Buckets and object hierarchies


    Each cloud tenancy comes with an own *namespace* in which the buckets exist. The
    namespace name is generated only once, at the very beginning, and cannot be changed.
    Object storage requires bucket names to be unique only within a single cloud account.
    There are no conflicts possible with the existing bucket names taken by other
    tenants. As a result, it becomes obvious that all direct and indirect (CLI, SDK,
    Terraform) API calls to the object storage endpoint have to be aware of the namespace.


