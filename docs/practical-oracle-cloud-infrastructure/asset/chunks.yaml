    ```'
- fmt: '## Users


    对 Oracle Cloud Infrastructure 资源执行的每个操作总是由一个命名用户完成。正如你在第 3 章中所了解的，每个 API 调用都需要一个用户的
    OCID 才能对请求进行签名。无论你是使用控制台、API、SDK、CLI 还是 Terraform，你始终需要一个用户账户。Oracle Cloud Infrastructure
    支持两种类型的用户账户。


    *   本地用户


    *   联合用户


    当你订阅一个新的云账户时，在 Oracle Identity Cloud Service (IDCS) 中会为该云账户创建一个**默认的管理员用户**。注册时使用的电子邮件地址将成为这个全局管理员用户的用户名。这是一个联合用户账户。事实上，所有租户默认都与
    IDCS 联合，但你可以自由切换到任何其他符合 SAML 标准的身份提供商，或者创建属于 OCI 本地的非联合用户。如果你不确定自己是否理解，别担心。让我来解释一下。当你想要登录到
    OCI 控制台时，会看到一个分为两部分的登录屏幕，如图 4-10 所示。左侧部分是为联合用户准备的。这将带你进入由你的身份提供商提供的单点登录 (SSO)
    登录屏幕。相反，你将使用右侧的部分以本地非联合用户身份登录。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig10_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig10_HTML.jpg)

    *图 4-10*

    *OCI 控制台中的登录屏幕*


    到目前为止，在本书中，我一直假设你使用的是默认管理员用户。现在情况将发生变化，因为我们即将创建并切换到一个权限较低的 compartment 管理员用户。为了演示访问策略的实际应用，我们将创建第二个几乎没有访问权限的本地用户。在本书的过程中，我们将根据各种练习中使用的资源，逐步授予这个第二个本地用户越来越多的访问权限。


    ### 注意


    如果你不是租户所有者，你的管理员可能已经给了你一个用户。然而，你的用户仍然有可能被添加到 IDCS 中租户的 `Administrators` 组中。如果情况并非如此，并且你想完成本书中的练习，你需要请求你的租户管理员将你的用户放入一个对选定
    compartment 拥有完全控制的 OCI 组中。在这种情况下，你将需要使用这个特定的 compartment。


    首先，我们将创建一个新的、本地的、非联合用户，他将成为 `Sandbox` 管理员。此操作通常在 OCI 控制台中执行或使用 CLI 执行。以下是应用第一种方法的方式：


    1.  转到菜单 ➤ 标识 ➤ 用户。

    2.  点击创建用户。

    3.  提供 **sandbox-admin** 作为名称，添加一些描述，然后点击创建。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig11_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig11_HTML.jpg)

    *图 4-11*

    *OCI 控制台中的非联合用户*


    如图 4-11 所示，新用户将在 OCI 控制台中显示。这将是 `Sandbox` compartment 的本地管理员。现在，我们将使用 CLI 创建另一个本地用户
    `sandbox-user`。我们将要使用的命令需要租户 OCID 作为参数之一。你应该能够找到这个值在你的 CLI 配置文件中，该文件很可能位于路径 `~/.oci/config`，除非你为
    CLI 配置文件使用了自定义路径。或者，你也可以在 OCI 控制台中的菜单 ➤ 管理 ➤ 租户详细信息下找到它。我们现在准备执行以下 CLI 命令：


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ oci iam user create --name sandbox-user --description "Sandbox user" --query
    "data.id" -c $TENANCY_OCID

    "ocid1.user.oc1..aa............dzqpxa

    ```


    首先，我们将租户 OCID 赋值给一个 bash 变量，以简化后续 CLI 命令的语法。最后，我们使用了一个 `iam user create` 命令，该命令利用
    JMESPath 查询来输出新分配的用户 OCID。


    让我借此机会向你展示如何构建一些更高级的 JMESPath 查询。我们将列出所有名称以 `sandbox` 开头的 OCI 用户的姓名。我们期望看到刚刚创建的两个用户的姓名列表。同样，我们必须将租户
    OCID 作为一个参数传递。


    ```

    $ oci iam user list -c $TENANCY_OCID --query "data [?starts_with(name,''sandbox'')].name"
    --all

    [

    "sandbox-admin",

    "sandbox-user"

    ]

    ```


    此时，两个新的非联合本地用户已准备就绪。我们仍然必须为他们生成一次性密码；否则，他们俩都无法以这些用户身份登录到 OCI 控制台。以下是为 `sandbox-user`
    用户执行此操作的方法：


    ```

    $ USER_OCID=ocid1.user.oc1..aa.........dzqpxa

    $ oci iam user ui-password create-or-reset --user-id $USER_OCID --query "data.password"

    "&gDX9F)iAP_[2E16XD)r"

    ```


    现在，你可以打开另一个浏览器并尝试以非联合用户身份登录，如图 4-12 所示。由于这是密码重置后的首次登录尝试，系统将提示你提供一个新密码。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig12_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig12_HTML.jpg)

    *图 4-12*

    *以非联合用户身份登录*


    乍一看，OCI 控制台看起来是一样的。为确保你已作为新用户之一访问了它，请单击右上角的圆形剪影图标以展开活动用户菜单，如图 4-13 所示。你应该在那里看到用户名，在我们的例子中是
    `sandbox-user`。单击名称或用户设置以打开用户配置文件。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig13_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig13_HTML.jpg)

    *图 4-13*

    *OCI 控制台中的活动用户菜单*


    Oracle Cloud Infrastructure IAM 默认禁止新创建的用户访问任何云资源。作为一个未分配到任何组的新创建用户，你唯一能做的就是基本的更改用户设置，例如密码更改或
    API 密钥上传。如果你尝试在各种 compartment 中列出任何类型的云资源或列出现有用户，你将看不到任何内容，如图 4-14 所示。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig14_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig14_HTML.jpg)

    *图 4-14*

    *OCI 控制台中访问权限不足*


    ### 注意


    在继续之前，请为 `sandbox-admin` 用户创建一个密码并首次登录以重置它，以便你能够登录到 OCI 控制台。这正是你刚刚为 `sandbox-user`
    用户所做的。你不需要再次使用 CLI。也可以在给定用户的 OCI 控制台用户详细信息视图中重置用户密码。


    我们将让两个新用户进行远程 API 调用。你将需要生成两个 API 签名密钥对，一个用于这两个新的本地用户，并将它们的公钥上传到其账户下。你可以在第 3 章中找到有关
    API 签名密钥的更多信息。这是一个快速通道：'
  raw: '## Users


    Each action performed on Oracle Cloud Infrastructure resources is always done
    on behalf of a named user. As you read Chapter [3](#478313_1_En_3_Chapter.xhtml),
    you learned that every API call requires the OCID of a user simply to be able
    to sign a request. No matter if you are using the Console, API, SDK, CLI, or Terraform,
    you will always need a user account. Oracle Cloud Infrastructure supports two
    types of user accounts.


    *   Local users


    *   Federated users


    When you subscribe to a new cloud account, there is a *default administrator user
    for the cloud account* created in the Oracle Identity Cloud Service (IDCS). The
    e-mail address that is used during registration becomes the username of this global
    administrator user. This is a federated user account. As a matter of fact, all
    tenancies are by default federated with IDCS, but you are free to switch to any
    other SAML-compliant identity provider or create nonfederated users that are local
    to OCI. If you are not sure whether you understand, do not worry. Let me explain.
    When you want to sign in to the OCI Console, you are presented with a two-section
    login screen, as shown in Figure [4-10](#478313_1_En_4_Chapter.xhtml#Fig10). The
    section in the left part is for federated users. This will take you to the single-sign
    on (SSO) login screen delivered by your identity provider. By contrast, you will
    use the section on the right to sign in as a local, nonfederated user.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig10_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Sign-in screen in *the* OCI Console


    Throughout this book, until this point, I’ve assumed you were using the default
    administrator user. This is going to change now because we are about to create
    and switch to a less-privileged, compartment administrator user. To demonstrate
    access policies in action, we are going to create a second local user with nearly
    no access rights. In the course of the book, we will be granting more and more
    access rights to this second local user depending on the resources used in various
    exercises.


    Caution


    If you are not the tenancy owner, you were probably given a user by your administrator.
    Yet, it is still possible that your user has been added to the tenancy’s Administrators
    group in IDCS. If this is not the case and you want to complete the exercises
    in this book, you need to ask your tenancy administrator to put your user into
    an OCI group that has full control over a chosen compartment. In this case, you
    will need to work with this particular compartment.


    First, we are going to create a new, local, nonfederated user who will become
    the `Sandbox` administrator. This operation is typically performed in the OCI
    Console or using the CLI. This is how you apply the first method:


    1.  Go to Menu ➤ Identity ➤ Users.


    2.  Click Create Users.


    3.  Provide **sandbox-admin** as the name, add some description, and click Create.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig11_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Nonfederated user in *the* OCI Console


    A new user will be shown, as in Figure [4-11](#478313_1_En_4_Chapter.xhtml#Fig11),
    in the OCI Console. This will be the local administrator for the `Sandbox` compartment.
    Now, we are going to create another local user, `sandbox-user`, this time using
    the CLI. The command we are about to use requires the tenancy OCID to be used
    as one of the parameters. You should be able to find this value in your CLI configuration
    file, most probably available at the path `~/.oci/config` unless you’ve used a
    custom path for the CLI configuration file. Alternatively, you can also find this
    in the OCI Console under Menu ➤ Administration ➤ Tenancy Details. We are now ready
    to execute the following CLI command:


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ oci iam user create --name sandbox-user --description "Sandbox user" --query
    "data.id" -c $TENANCY_OCID

    "ocid1.user.oc1..aa............dzqpxa

    ```


    First, we assigned the tenancy OCID to a bash variable to simplify the syntax
    of the CLI command that follows. Finally, we used an `iam user create` command
    that leverages a JMESPath query to output the newly assigned user OCID.


    Let me use this opportunity to show you how to build some more advanced JMESPath
    queries. We are going to list the names of all OCI users whose names start with
    the `sandbox` word. We expect to see a list of two names of the users we’ve just
    created. Again, we have to pass the tenancy OCID as a parameter.


    ```

    $ oci iam user list -c $TENANCY_OCID --query "data [?starts_with(name,''sandbox'')].name"
    --all

    [

    "sandbox-admin",

    "sandbox-user"

    ]

    ```


    At this point of the time, there are two new nonfederated local users ready. We
    still have to generate a one-time password for them; otherwise, neither of them
    would be able to sign in to the OCI Console as one of these users. This is how
    you do it for the `sandbox-user` user:


    ```

    $ USER_OCID=ocid1.user.oc1..aa.........dzqpxa

    $ oci iam user ui-password create-or-reset --user-id $USER_OCID --query "data.password"

    "&gDX9F)iAP_[2E16XD)r"

    ```


    Now, you are ready to open another browser and try to sign in, this time as a
    nonfederated user, as presented in Figure [4-12](#478313_1_En_4_Chapter.xhtml#Fig12).
    Because this is the first login attempt after the password has been reset, you
    will be prompted to provide a new password.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig12_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Signing in as a nonfederated user


    At first glance, the OCI Console looks the same. To make sure you’ve accessed
    it as one of the new users, please click the circular silhouette icon in the top-right
    corner to expand the active user menu, as shown in Figure [4-13](#478313_1_En_4_Chapter.xhtml#Fig13).
    You should see there the user name, in our case `sandbox-user`. Click the name
    or User Settings to open the user profile.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig13_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Active user menu in the OCI Console


    Oracle Cloud Infrastructure IAM prohibits the newly created users from having
    any access to cloud resources by default. The only things you are able to do,
    as a newly created user who is not assigned to any group, are just the basic changes
    in the user settings such as a password change or an API key upload. If you try
    to list any kind of cloud resources in various compartments or list the existing
    users, you will see nothing, as shown in Figure [4-14](#478313_1_En_4_Chapter.xhtml#Fig14).


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig14_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Insufficient access in *the* OCI Console


    Caution


    Before you continue, please create a password for the `sandbox-admin` user and
    log in for the first time to reset it so that you are able to sign in to the OCI
    Console. This is exactly what you’ve just done for the `sandbox-user` user. You
    do not need to use the CLI again. It is also possible to reset the user password
    in the OCI Console in the user details view for a given user.


    We are going to let the two new users make remote API calls. You will need to
    generate two API signing keypairs, one for each of the two new local users, and
    upload their public keys under their accounts. You can find more information about
    the API signing keys in Chapter [3](#478313_1_En_3_Chapter.xhtml). This is the
    fast track:'
  trans: '## 用户


    在 Oracle Cloud Infrastructure 中执行的每个操作总是由一个命名用户完成。正如你在第 3 章中所了解的，每个 API 调用都需要一个用户的
    OCID 才能对请求进行签名。无论你是使用控制台、API、SDK、CLI 还是 Terraform，你始终需要一个用户账户。Oracle Cloud Infrastructure
    支持两种类型的用户账户。


    *   本地用户


    *   联合用户


    当你订阅一个新的云账户时，在 Oracle Identity Cloud Service (IDCS) 中会为该云账户创建一个**默认的管理员用户**。注册时使用的电子邮件地址将成为这个全局管理员用户的用户名。这是一个联合用户账户。事实上，所有租户默认都与
    IDCS 联合，但你可以自由切换到任何其他符合 SAML 标准的身份提供商，或者创建属于 OCI 本地的非联合用户。如果你不确定自己是否理解，别担心。让我来解释一下。当你想要登录到
    OCI 控制台时，会看到一个分为两部分的登录屏幕，如图 4-10 所示。左侧部分是为联合用户准备的。这将带你进入由你的身份提供商提供的单点登录 (SSO)
    登录屏幕。相反，你将使用右侧的部分以本地非联合用户身份登录。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig10_HTML.jpg](img/478313_1_En_4_Fig10_HTML.jpg)

    *图 4-10*

    *OCI 控制台中的登录屏幕*


    到目前为止，在本书中，我一直假设你使用的是默认管理员用户。现在情况将发生变化，因为我们即将创建并切换到一个权限较低的 compartment 管理员用户。为了演示访问策略的实际应用，我们将创建第二个几乎没有访问权限的本地用户。在本书的过程中，我们将根据各种练习中使用的资源，逐步授予这个第二个本地用户越来越多的访问权限。


    ### 注意


    如果你不是租户所有者，你的管理员可能已经给了你一个用户。然而，你的用户仍然有可能被添加到 IDCS 中租户的 `Administrators` 组中。如果情况并非如此，并且你想完成本书中的练习，你需要请求你的租户管理员将你的用户放入一个对选定
    compartment 拥有完全控制的 OCI 组中。在这种情况下，你将需要使用这个特定的 compartment。


    首先，我们将创建一个新的、本地的、非联合用户，他将成为 `Sandbox` 管理员。此操作通常在 OCI 控制台中执行或使用 CLI 执行。以下是应用第一种方法的方式：


    1.  转到菜单 ➤ 标识 ➤ 用户。

    2.  点击创建用户。

    3.  提供 **sandbox-admin** 作为名称，添加一些描述，然后点击创建。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig11_HTML.jpg](img/478313_1_En_4_Fig11_HTML.jpg)

    *图 4-11*

    *OCI 控制台中的非联合用户*


    如图 4-11 所示，新用户将在 OCI 控制台中显示。这将是 `Sandbox` compartment 的本地管理员。现在，我们将使用 CLI 创建另一个本地用户
    `sandbox-user`。我们将要使用的命令需要租户 OCID 作为参数之一。你应该能够找到这个值在你的 CLI 配置文件中，该文件很可能位于路径 `~/.oci/config`，除非你为
    CLI 配置文件使用了自定义路径。或者，你也可以在 OCI 控制台中的菜单 ➤ 管理 ➤ 租户详细信息下找到它。我们现在准备执行以下 CLI 命令：


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ oci iam user create --name sandbox-user --description "Sandbox user" --query
    "data.id" -c $TENANCY_OCID

    "ocid1.user.oc1..aa............dzqpxa

    ```


    首先，我们将租户 OCID 赋值给一个 bash 变量，以简化后续 CLI 命令的语法。最后，我们使用了一个 `iam user create` 命令，该命令利用
    JMESPath 查询来输出新分配的用户 OCID。


    让我借此机会向你展示如何构建一些更高级的 JMESPath 查询。我们将列出所有名称以 `sandbox` 开头的 OCI 用户的姓名。我们期望看到刚刚创建的两个用户的姓名列表。同样，我们必须将租户
    OCID 作为一个参数传递。


    ```

    $ oci iam user list -c $TENANCY_OCID --query "data [?starts_with(name,''sandbox'')].name"
    --all

    [

    "sandbox-admin",

    "sandbox-user"

    ]

    ```


    此时，两个新的非联合本地用户已准备就绪。我们仍然必须为他们生成一次性密码；否则，他们俩都无法以这些用户身份登录到 OCI 控制台。以下是为 `sandbox-user`
    用户执行此操作的方法：


    ```

    $ USER_OCID=ocid1.user.oc1..aa.........dzqpxa

    $ oci iam user ui-password create-or-reset --user-id $USER_OCID --query "data.password"

    "&gDX9F)iAP_2E16XD)r"

    ```


    现在，你可以打开另一个浏览器并尝试以非联合用户身份登录，如图 4-12 所示。由于这是密码重置后的首次登录尝试，系统将提示你提供一个新密码。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig12_HTML.jpg*图 4-12**以非联合用户身份登录*乍一看，OCI
    控制台看起来是一样的。为确保你已作为新用户之一访问了它，请单击右上角的圆形剪影图标以展开活动用户菜单，如图 4-13 所示。你应该在那里看到用户名，在我们的例子中是
    `sandbox-user`。单击名称或用户设置以打开用户配置文件。![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig13_HTML.jpg](img/478313_1_En_4_Fig13_HTML.jpg)

    *图 4-13*

    *OCI 控制台中的活动用户菜单*


    Oracle Cloud Infrastructure IAM 默认禁止新创建的用户访问任何云资源。作为一个未分配到任何组的新创建用户，你唯一能做的就是基本的更改用户设置，例如密码更改或
    API 密钥上传。如果你尝试在各种 compartment 中列出任何类型的云资源或列出现有用户，你将看不到任何内容，如图 4-14 所示。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig14_HTML.jpg](img/478313_1_En_4_Fig14_HTML.jpg)

    *图 4-14*

    *OCI 控制台中访问权限不足*


    ### 注意


    在继续之前，请为 `sandbox-admin` 用户创建一个密码并首次登录以重置它，以便你能够登录到 OCI 控制台。这正是你刚刚为 `sandbox-user`
    用户所做的。你不需要再次使用 CLI。也可以在给定用户的 OCI 控制台用户详细信息视图中重置用户密码。


    我们将让两个新用户进行远程 API 调用。你将需要生成两个 API 签名密钥对，一个用于这两个新的本地用户，并将它们的公钥上传到其账户下。你可以在第 3 章中找到有关
    API 签名密钥的更多信息。这是一个快速指南：'
- fmt: '# Groups and Policies


    ```

    $ cd ~/.apikeys

    $ openssl genrsa -out api.sandbox-user.pem -aes128 2048

    Generating RSA private key, 2048 bit long modulus

    .........+++

    ..+++

    e is 65537 (0x10001)

    Enter pass phrase for api.sandbox-user.pem:

    Verifying - Enter pass phrase for api.sandbox-user.pem:

    $ chmod go-r api.sandbox-user.pem

    $ openssl rsa -pubout -in api.sandbox-user.pem -out api.sandbox-user.pem.pub

    Enter pass phrase for api.sandbox-user.pem:

    writing RSA key

    $ openssl genrsa -out api.sandbox-admin.pem -aes128 2048

    Generating RSA private key, 2048 bit long modulus

    .................................+++

    .........................................+++

    e is 65537 (0x10001)

    Enter pass phrase for api.sandbox-admin.pem:

    Verifying - Enter pass phrase for api.sandbox-admin.pem:

    $ chmod go-r api.sandbox-admin.pem

    $ openssl rsa -pubout -in api.sandbox-admin.pem -out api.sandbox-admin.pem.pub

    Enter pass phrase for api.sandbox-admin.pem:

    writing RSA key

    $ ls -l | awk ''{print $1, $9}''

    total

    -rw------- api.sandbox-admin.pem

    -rw-r--r-- api.sandbox-admin.pem.pub

    -rw------- api.sandbox-user.pem

    -rw-r--r-- api.sandbox-user.pem.pub

    ```


    Now, you can upload the public keys (`.pub` suffix) to the corresponding user
    accounts. We are going to use the CLI, but, if you want, you can do it in the
    OCI Console as well. First, make sure the `TENANCY_OCID` bash variable is still
    set to the tenancy OCID.


    ```

    $ echo $TENANCY_OCID

    ocid1.tenancy.oc1..aa.........

    ```


    To upload a public key, you need to know the OCID of the user. You can either
    read it in the OCI Console or use the CLI to make a query, just like this:


    ```

    $ SANDBOX_ADMIN_OCID=`oci iam user list -c $TENANCY_OCID --query "data[?name==''sandbox-admin'']
    | [0].id" --all --raw-output`

    ocid1.user.oc1..aa.........7d5dca

    ```


    Now, let’s upload the public key for the `sandbox-admin` user.


    ```

    $ oci iam user api-key upload --user-id $SANDBOX_ADMIN_OCID --key-file ~/.apikeys/api.sandbox-admin.pem.pub
    --query "data.fingerprint"

    "91:64:1b:4e:4e:35:4a:06:b2:8f:6f:53:ae:7d:0d:ee"

    ```


    Typically, you configure the CLI on your machine to send API requests on behalf
    of just a single user. As a result, you are using only the default profile in
    your `~/.oci/config` file. Listing 4-1 displays how the structure of this file
    looks at the moment, after having completed the exercises from Chapter 3.


    ```

    [DEFAULT]

    tenancy=...

    region=...

    user=...

    fingerprint=...

    key_file=...

    pass_phrase=...

    ```

    Listing 4-1

    OCI CLI Configuration File


    There is only one profile, which is the default profile. Every OCI CLI command
    uses the details from the default profile to sign requests and make API calls.
    If you’ve followed the exercises from Chapter 3, the default configuration profile
    corresponds to the tenancy administrator superuser.


    Luckily for us, it is possible to create more profiles. In this way, you will
    be able to execute different CLI commands on behalf of different OCI users on
    a single machine. Open the config file in a chosen text editor.


    ```

    $ vi ~/.oci/config

    ```


    Under the default profile, please add a new profile called `SANDBOX-ADMIN` and
    provide the user details for the `sandbox-admin` user, which you can find in this
    section. The new part is shown in bold in Listing 4-2.


    ```

    [DEFAULT]

    tenancy=...

    region=...

    user=...

    fingerprint=...

    key_file=...

    pass_phrase=...

    [SANDBOX-ADMIN]

    user=ocid1.user.oc1..aaaaaaaa3n5.........7d5dca

    fingerprint=91:64:1b:4e:4e:35:4a:06:b2:8f:6f:53:ae:7d:0d:ee

    key_file=~/apikeys/api.sandbox-admin.pem

    pass_phrase=put-here-sandbox-admin-private-key-password

    ```

    Listing 4-2

    OCI CLI Configuration File with Multiple Profiles


    From now on, every time you add `--profile SANDBOX-ADMIN` to your CLI command,
    the CLI will use the four parameters (`user`, `fingerprint`, `key_file`, and `pass_phrase`)
    from the `SANDBOX-ADMIN` profile and the remaining two (`tenancy` and `region`)
    from the `DEFAULT` profile.


    If you try executing one of the commands, but this time as the `sandbox-admin`
    user through the use of the `SANDBOX-ADMIN` profile, you will encounter an error.


    ```

    $ oci iam user list -c $TENANCY_OCID --query "data [?starts_with(name,''sandbox'')].name"
    --all --profile SANDBOX-ADMIN

    ServiceError:

    {

    "code": "NotAuthorizedOrNotFound",

    "message": "Authorization failed or requested resource not found",

    "opc-request-id": "DE........./411.........E1F/B6A.........A8B",

    "status": 404

    }

    ```


    The reason is obvious. Oracle Cloud Infrastructure denies any kind of access to
    cloud resources by default. The `sandbox-admin` user does not belong to any group;
    therefore, there are no access policies that would grant some access rights to
    this user. It is time to discuss how the policies work.


    **Note**

    If you are still logged into the OCI Console as either the `sandbox-user` or the
