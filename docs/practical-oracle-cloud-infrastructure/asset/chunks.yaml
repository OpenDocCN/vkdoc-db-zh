  trans: '

    一些软件，如即时通讯平台、企业应用服务器或数据库引擎，据报道在专用的物理硬件上运行时更为稳定高效，无需涉及管理程序（hypervisor）虚拟化。你可以将它们托管在数量更少、性能更强的裸机主机上。而在所有其他通用用例中，你可能会使用更多虚拟机来利用水平扩展。


    注意


    裸机计算形态家族深深植根于 Oracle Cloud Infrastructure（OCI）的起源。OCI 实际上源自一个名为 Oracle Bare Metal
    Cloud Service、面向裸机的云服务而演变而来。


    在此，我仅列举几个在撰写本文时提供的、随机选择的形态：


    *   `VM.Standard2.1` 是最小的标准虚拟机形态，配备 1 个 `OCPU` 和 15GB 内存。它基于 X7 平台，这基本上意味着它使用的是
    Intel Xeon Skylake 处理器。

    *   `VM.Standard2.8` 是另一个标准虚拟机形态的例子，提供 8 个 `OCPU` 和 120GB 内存。

    *   `BM.Standard2.52` 是一个标准的裸机形态，利用 52 个 `OCPU` 和 768GB 内存。

    *   `BM.Standard.E2.64` 是一个使用 AMD EPYC 处理器的裸机形态，配备 64 个 `OCPU` 和 512GB 内存。

    *   `BM.DenseIO2.52` 是一个专为大数据项目中存在的 I/O 密集型工作负载设计的裸机形态。它配备了本地附加的 SSD NVMe 驱动器，提供
    51.2TB 的存储容量。

    *   `BM.GPU3.8` 是一个旨在为机器学习流程和高性能计算（HPC）软件提供动力的裸机形态。除了 52 个 `OCPU` 和 768GB 内存外，其真正能力来自于八个
    Nvidia Tesla V100 GPU。


    在上面的列表中，我使用了一个新的缩写。一个 `Oracle 计算单元` (`OCPU`) 是一个逻辑术语，也是计算相关计费的最重要度量单位。你通常按 1 `OCPU`/小时付费。换句话说，一个运行
    8 个 `OCPU` 的实例一小时所产生的计算相关成本，与一个仅运行 1 个 `OCPU` 的实例运行八小时的成本相同。


    对于基于 Intel 的形态，单个 `OCPU` 对应于一个物理 Intel Xeon 核心。由于超线程技术，操作系统实际上为每个物理 CPU 核心看到两个虚拟核心。总结一下，一个基于
    Intel 的 `OCPU` 意味着一个物理 CPU 核心和两个近乎并行执行线程的能力，有时也称为 vCPU。


    你可以很容易地猜到，我们关于计算实例的第一个选择是为将托管 UUID 服务应用程序的节点选择一个形态。我们将使用可用的最小虚拟机：`VM.Standard2.1`。


    一个 `镜像`（image）是一个模板，它指定了操作系统以及在实例启动期间必须预安装的任何附加软件。一个 `镜像` 用于初始化计算实例使用的新启动卷。启动卷与其计算实例保持关联，直到终止。启动卷可以看作是实例使用的主要存储，主要用于其操作系统和软件。


    Oracle 提供的镜像会定期更新并获得新版本。然而，一旦你启动了一个实例，安排定期系统更新就成为你的责任。


    在撰写本文时，Oracle Cloud Infrastructure 提供四种类型的基础操作系统镜像，包含以下操作系统：


    *   Oracle Linux

    *   CentOS

    *   Ubuntu

    *   Windows Server


    在你的日常工作中，你最终可能会创建许多自定义镜像，这些镜像在所选基础镜像上添加了所需的软件、服务或计划脚本。也可以导入并非基于可用基础镜像构建的自定义镜像。在这种情况下，你将在虚拟机形态上使用准虚拟化（paravirtualization）或模拟（emulation）。然而，创建自定义镜像最简单的方法是依赖
    Oracle 提供的基础镜像。


    那么，再做一个决定如何？我们将使用最新的 Oracle Linux 基础镜像：`Oracle Linux 7.6`。你可能会在未来使用 `Oracle Linux
    7` 的较新次版本。


    注意


    虽然截图将显示 `Oracle Linux 7.6`，但本章的练习还使用了 `Oracle Linux 7.7` 镜像进行了额外测试。


    我们现在将转向规划过程的最后一步。


    ### 服务限额


    你可能想知道，如果太多租户（云客户）在同一区域同时启动大量最强大的裸机形态会发生什么。即使在最大的数据中心中，这些机器的数量也肯定是有限的，不是吗？嗯，当然，确实是有限的。这正是服务限额（也称为
    `配额`）这个巧妙想法的用武之地。


    每个云账户都有一组服务限额，定义了允许同时运行多少何种类型的资源。如果你发现当前的限额无法满足你的需求，只需提交一个服务请求，就可以申请提高限额。这有助于
    Oracle 规划和优化数据中心容量。简单而明智，不是吗？


    提示


    你可以在 OCI 控制台中随时验证你的使用情况与当前云账户的服务限额。只需转到 `菜单 ➤ 治理 ➤ 限额、配额和使用情况`。


    在启动新的云项目之前，验证并酌情增加服务限额，应包含在你规划阶段的检查清单中。


    我们在本章中正在构建的示例云解决方案将包括以下 OCI 资源：


    *   一个 VCN

    *   两个 `VM.Standard2.1` 计算实例

    *   一个负载均衡器（100Mbps）

    *   一个自定义镜像

    *   可忽略不计的块存储大小


    如果你使用的是一个新的试用账户并且尚未创建任何资源，你可以相当确定你的默认试用账户服务限额不会被违反。


    如果你使用的是一个已包含一些 OCI 资源的付费账户，请转到 OCI 控制台中的 `菜单 ➤ 治理 ➤ 限额、配额和使用情况`，并检查是否可以添加我刚刚列出的资源。如果你的
    OCI IAM 用户无权查看服务限额，你可能还需要向你的云管理员询问具体数字。


    到目前为止我们所做的工作是纯粹的规划，并辅以一些基础的 Oracle Cloud Infrastructure 概念讨论。我们从审视应用程序开始，并将其映射到我们需要的云资源。我们已准备好配置这些资源。

    '
- fmt: '## Provisioning the Infrastructure


    We are now going to provision the cloud resources required to run the application,
    which we''ve talked about in the previous section. I will simplify this example
    as much as possible. This is why I am going to present how to deploy the UUID
    service on a single node first. Later, we will add load balancing and fault tolerance.
    Here and now, I am going to show you the manual way. What do I mean by that? We
    will manage all resources using the `Oracle Cloud Infrastructure Console`. You
    may recall that I mentioned this approach as appropriate only when you want to
    demonstrate selected capabilities or experiment with the features that are new
    for you. The proper production-ready automation will arrive in Chapter [3](#478313_1_En_3_Chapter.xhtml).
    For the time being, let''s start!


    Please log into the `Oracle Cloud Infrastructure (OCI) Console`. Figure [2-7](#478313_1_En_2_Chapter.xhtml#Fig7)
    presents the main landing page in the `OCI Console`.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig7_HTML.png](images/478313_1_En_2_Chapter/478313_1_En_2_Fig7_HTML.png)


    Figure 2-7: `Oracle Cloud Infrastructure Console`


    In the top-right corner of the `OCI Console`, you will see your active region.
    In my case, as shown in Figure [2-7](#478313_1_En_2_Chapter.xhtml#Fig7), it is
    the Germany Central region (`eu-frankfurt-1`). As I mentioned earlier, some regions
    may consist of only one availability domain. The exercises in this book have been
    tested in the Germany Central (`eu-frankfurt-1`) region, and it is assumed that
    there are three availability domains present in the region you are working with.
    At the time of writing, these are the following:


    *   Germany Central (`eu-frankfurt-1`)

    *   UK South (`uk-london-1`)

    *   US East (`us-ashburn-1`)

    *   US West (`us-phoenix-1`)


    A single cloud account can own and manage resources in more than one region. You
    just need to activate the additional region(s). To do so, follow these steps:


    1.  Go to `Menu ➤ Administration ➤ Region Management`.

    2.  Click `Infrastructure Regions` in the Resources menu.

    3.  Click `Subscribe To This Region` next to the region name.


    Subscribing to a new region is an asynchronous operation that can take a few minutes.
    At some point in time, after having refreshed the `OCI Console`, you should be
    able to choose between regions in the top-right corner of the `OCI Console`.


    **Note**: Before proceeding with the exercises this book contains, please make
    sure you are working in a region that comes with three availability domains. Do
    not hesitate to subscribe to an additional region if needed.


    You may be wondering how we achieve fault tolerance in single-AD regions such
    as the following:


    *   Australia East (`ap-sydney-1`)

    *   Brazil East (`sa-saopaulo-1`)

    *   Canada Southeast (`ca-toronto-1`)

    *   India West (`ap-mumbai-1`)

    *   Japan East (`ap-tokyo-1`)

    *   South Korea Central (`ap-seoul-1`)

    *   Switzerland North (`eu-zurich-1`)


    There are two options that can be employed at the same time. First, you may remember
    that each AD comes with three fault domains, as described in the previous chapter.
    Fault domains are physically isolated units of equipment with separate powering
    and cooling. In this way, it is less likely that two fault domains fail at the
    same point in time. More critical systems can be spread across multiple regions.
    As an example, while running an active system site in Tokyo, you could maintain
    a passive system site in Seoul to enable disaster recovery (`DR`).


    ### Compartment


    We need to choose a compartment in which our first cloud application will run.
    Compartments serve as the primary mean to isolate unrelated `OCI` resources. In
    this way, they can be used to separate different projects. From a formal point
    of view, they belong to the `IAM` service. Unless you already have an existing
    compartment for learning, it is advised that you create a new compartment to keep
    the artifacts you provision as part of our Chapter [2](#478313_1_En_2_Chapter.xhtml)
    exercise isolated. Follow these steps:


    1.  Go to `Menu ➤ Identity ➤ Compartments`.

    2.  Click `Create Compartment`.

    3.  Enter `Sandbox` for the name.

    4.  Provide some description.

    5.  Click `Create Compartment`.


    The new compartment should get created nearly immediately. You may need to refresh
    the page, unless you can see a new record for the newly created compartment, as
    shown in Figure [2-8](#478313_1_En_2_Chapter.xhtml#Fig8).


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig8_HTML.png](images/478313_1_En_2_Chapter/478313_1_En_2_Fig8_HTML.png)


    Figure 2-8: Viewing a compartment in the `OCI Console`


    From now on, every time you create a new `OCI` resource in the console, you will
    need to make sure that the appropriate compartment is selected in the `Compartment`
    combo box, as shown in Figure [2-9](#478313_1_En_2_Chapter.xhtml#Fig9).


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig9_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig9_HTML.jpg)


    Figure 2-9: Choosing an active compartment in the `OCI Console`


    As we move closer to automating `Oracle Cloud Infrastructure` with the `CLI` and
    `Terraform`, you will see that we are referencing the target compartment not by
    its name but by using its `Oracle cloud identifier (OCID)`.


    Every `OCI` resource, including your tenancy, is uniquely identified by an immutable,
    multipart, `Oracle`-assigned, strict-syntax key called an `Oracle cloud identifier`,
    abbreviated as `OCID`. The resource identifier structure is strict. For the time
    being, it always starts with `ocid1`, which indicates the current and only `OCID`
    version. The second element is more important because it shows a resource type.
    At the time of writing, the third element is always set to `oc1`. The fourth element
    denotes the region. Finally, the last element is unique for every `OCI` resource.
    Figure [2-10](#478313_1_En_2_Chapter.xhtml#Fig10) illustrates the `OCID` structure.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig10_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig10_HTML.jpg)


    Figure 2-10: `OCID`'
