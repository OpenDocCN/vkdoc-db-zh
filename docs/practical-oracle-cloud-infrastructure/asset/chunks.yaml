    图 4-17\n第 4 章的用户和组\n\n下一步，请像在上一节中为 `sandbox-admin` 用户所做的那样，为 `sandbox-user` 用户在\
    \ `~/.oci/config` 文件中添加一个新的配置文件。清单 4-3 展示了您的 `~/.oci/config` 文件的预期结构。\n\n```ini\n\
    [DEFAULT]\ntenancy=...\nregion=...\nuser=...\nfingerprint=...\nkey_file=...\n\
    pass_phrase=...\n\n[SANDBOX-ADMIN]\nuser=ocid1.user.oc1..aaaaaaaa3n5.........7d5dca\n\
    fingerprint=91:64:1b:4e:4e:35:4a:06:b2:8f:6f:53:ae:7d:0d:ee\nkey_file=~/apikeys/api.sandbox-admin.pem\n\
    pass_phrase=put-here-sandbox-admin-private-key-password\n\n[SANDBOX-USER]\nuser=ocid1.user.oc1..aaaaaaaatimmpj37ao............cdzqpxa\n\
    fingerprint= 61:68:a5:1c:40:ef:51:fd:1a:74:6b:d9:9f:1c:b2:b8\nkey_file=~/apikeys/api.sandbox-user.pem\n\
    pass_phrase=put-here-sandbox-user-private-key-password\n```\n清单 4-3\n第 4 章的 OCI\
    \ CLI 配置文件\n\n最后但同样重要的是，我们将在 `~/.oci/oci_cli_rc` 文件中创建两个配置文件，为每个 CLI 查询设置默认隔区。请将清单\
    \ 4-4 中的 OCID 替换为您的 `Sandbox` 隔区的 OCID。如果您不记得那是什么类型的文件，您将在第 3 章中找到更多信息。\n\n```ini\n\
    [DEFAULT]\ncompartment-id = ocid1.compartment.oc1..aa.........gzwhsa\n\n[SANDBOX-ADMIN]\n\
    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa\n\n[SANDBOX-USER]\n\
    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa\n```\n清单 4-4\n第 4 章的\
    \ OCI CLI RC 文件\n\n都准备好了吗？让我们来探索一下如何组织对云资源的访问控制。\n"
- fmt: '# Policy Statements


    How does privilege management work? You define which group is entitled to perform
    particular actions on specific cloud resource types using `policy statements`.
    Each `policy statement` refers either to one particular `compartment` or to the
    entire `tenancy`. Figure 4-18 illustrates a simple `policy statement` that grants
    read-only access (`read` policy verb) over selected cloud resource types that
    belong to the `instance-family` aggregate resource type to the members of the
    `groupABC`. The aggregate resource type is a logical grouping of real cloud resource
    types such as compute instances or instance images. The sample `policy statement`
    refers only to the cloud resources that exist inside the `projectABC` `compartment`.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig18_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig18_HTML.jpg)

    *Figure 4-18: IAM policy statement*


    While it should be pretty clear to understand what roles are played by a `group`
    of users and a `compartment` in a `policy statement`, you may still need some
    additional explanation of the `policy verb` and the `resource type`.


    ## Understanding Resource Types


    There are various types of cloud infrastructure resources you can provision in
    your cloud account. A compute instance and an object storage bucket are examples
    of cloud resources. Some cloud `resource types` are more related to each other
    than the others. An instance image is used to provision compute instances. The
    instances can be managed in pools. To launch an instance pool, an instance configuration
    is required. As you can see, there is some degree of interdependency between all
    four resource types I’ve given as an example. From the access control point of
    view, you will usually grant the same access permissions to all `resource types`
    that belong to one family of related `resource types`. For this reason, Oracle
    Cloud Infrastructure defines the so-called aggregate cloud resources, such as
    `instance-family` or `virtual-network-family`, that are logical groupings of the
    existing cloud `resource types`.


    > **Tip:** It makes little sense to include the list of all available `resource
    types` that can be used in your `policy statements` because the list is steadily
    growing. Please refer to the policy reference in the official documentation.


    ## Understanding Policy Verbs


    A `policy verb` defines the access level to a cloud resource. There are four levels
    available: `inspect`, `read`, `use`, and `manage`. The `inspect` access is basic
    and usually lets the `group` members only list the resources. The `read` access
    includes the same scope as the `inspect` access but extended with the ability
    to read the details of the cloud resources. The `use` access typically allows
    the `group` members to perform all actions in the scope of the `read` access as
    well as starting, stopping, and updating the existing cloud resources. Finally,
    the `manage` access grants all permissions for the cloud resource type. The key
    thing about `policy verbs` is that their exact meaning is highly contextual and
    depends on the `resource type` they are prefixing in the `policy statement`.


    Let me explain it using an example. Table 4-1 presents how the `policy verbs`
    map to individual permissions in the case of the `load-balancers` `resource type`.
    Each permission effectively allows the `group` members to call a particular set
    of APIs.


    *Table 4-1: Policy Verbs for the load-balancers Resource Type*


    | Verb | Permissions | Covered APIs |

    | --- | --- | --- |

    | `inspect` | LOAD_BALANCER_INSPECT | `ListLoadBalancers` `ListShapes` `ListPolicies`
    `ListProtocols` |

    | `read` | `inspect` permissions + LOAD_BALANCER_READ | `inspect` APIs + `GetLoadBalancer`
    and others |

    | `use` | `read` permissions + LOAD_BALANCER_UPDATE | `read` APIs + `UpdateLoadBalancer`
    `CreateBackendSet` `DeleteBackendSet` `UpdateBackendSet` and others |

    | `manage` | `use` permissions + LOAD_BALANCER_CREATE LOAD_BALANCER_DELETE | `use`
    APIs + `CreateLoadBalancer` `DeleteLoadBalancer` |


    As you can see in Table 4-1, in the case of the `load-balancers` `resource type`,
    the `inspect` `policy verb` maps to just one `LOAD_BALANCER_INSPECT` permission,
    which essentially gives access to four APIs: `ListLoadBalancers`, `ListShapes`,
    `ListPolicies`, and `ListProtocols`. These four APIs give some basic insights
    into the available load balancer policies, shapes, protocols, and load balancers
    present in the scope of the given `compartment`. Usually, the API names are self-explanatory,
    but if you want to be sure what kind of operation on cloud resources the APIs
    really let you perform, you can always read the API reference.


    If you look at the table again, you will spot that a load balancer can be created
    or deleted only by the `group` members whose `group` was granted the `manage`
    `policy verb` over the `load-balancers` `resource type`. This is not a big surprise.
    What is more interesting is the fact that a backend set can be created or deleted
    already when there is a `policy statement` with the `use` `policy verb`. How should
    we understand it? Well, a backend set can exist only in the context of a load
    balancer as its child resource. In this way, you could delegate the creation of
    backend sets to the users of the load balancer just as you let them update an
    existing load balancer. However, the creation or termination of the parent resource,
    namely, the load balancer, is limited to the managers.


    > **Tip:** `Policy verbs` are highly contextual, and their exact meaning depends
    on the `resource type` they are prefixing in the `policy statement`. You need
    to refer to the documentation to find out more: [`https://docs.cloud.oracle.com/iaas/Content/Identity/Reference/policyreference.htm`](https://docs.cloud.oracle.com/iaas/Content/Identity/Reference/policyreference.htm).


    ## Examples of IAM Policy Statements


    Let’s discuss a couple of examples for IAM `policy statements`. I would like you
    to get some general view before we move into creating the statements for our new
    IAM `groups`.


    If your intention is to grant all kinds of permissions over a particular `compartment`
    to the `group` of admins for that `compartment`, you can do it with just one `IAM
    policy statement`.


    ```

    allow group sandbox-admins to manage all-resources in compartment Sandbox

    ```


    Let’s look at another example. To allow the members of the `sandbox-users` `group`
    to perform all load-balancer-specific operations in the `Sandbox` `compartment`,
    you would simply create this policy:


    ```

    allow group sandbox-users to manage load-balancers in compartment Sandbox

    ```


    ## Using Conditions in Policy Statements


    What if you would like to explicitly deny some selected permissions that belong
    to the `policy verb` you are using? For example, the `manage` `policy verb` in
    the context of the `load-balancers` `resource type` will let you perform all actions,
    including load balancer creation and deletion. If you would like to exclude the
    `LOAD_BALANCER_DELETE` permission, you can use `policy statement condition`.


    ```

    allow group sandbox-users to manage load-balancers in compartment Sandbox where
    request.permission != ''LOAD_BALANCER_DELETE''

    ```


    `Policy statement conditions` can be defined for permissions (e.g., `request.permission
    != ''LOAD_BALANCER_DELETE''`) as well as individual API operations (e.g., `request.operation
    != ''DeleteLoadBalancer''`). In this way, it is possible to tune the `policy statements`
    and make them as granular as needed.


    Sometimes, you may even build more complex conditions that reference more than
    one permission or operation. I will give now further examples. This `policy statement`
    permits the `group` members to list the load balancers (`ListLoadBalancers` operation),
    even though the `policy verb` `inspect` would normally allow more operations,
    such as listing the available shapes (`ListShapes` operation) or protocols (`ListProtocols`
    operation).


    ```

    allow group sandbox-admins to inspect load-balancers in compartment Sandbox where
    all { request.operation != ''ListShapes'', request.operation != ''ListProtocols'',
    request.operation != ''ListProtocols'' }

    ```'
