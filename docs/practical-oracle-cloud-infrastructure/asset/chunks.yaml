  trans: '### 星型模式


    我已提及，我们将模拟一个简单的数据仓库应用场景。`星型模式`是一种典型的关系型数据库表结构，它使得执行典型的商业智能操作（如透视、选择、切片、切块以及向下钻取和向上汇总）变得更加容易。在本章开头，我已向你介绍了表之间关系的概念及其在关系型数据库中的重要性。在`星型模式`的核心，存在一个`事实表`，其中包含部分聚合的数值型数据，例如以货币表示的销售额结果、以测量单位表示的各种度量、以数量表示的生产量，或使用收集统计数据量化的观测事件。本章的练习构建在类似于波兰道路上报告的事故和事件的数据之上。这些事件使用以下度量进行量化：

    *   事件数量（发生次数）

    *   受伤人数

    *   死亡人数


    仅靠数字不足以进行数据分析。我们需要知道存储在`事实表`中的每条记录的上下文。这些上下文被称为维度。道路事件可能发生在某个特定日期（`时间`维度）和某段特定道路上（`道路`维度），并具有特定类型，如追尾碰撞、超速或无证驾驶（`事件类型`维度）。你可能希望将特定类型的道路事件归类为类别层级。追尾碰撞和侧面碰撞可能都属于“碰撞”类别。接着，多个类别可以归并为道路事件类别，如“事故”或“事件”。因此，`事件类型`维度将具有三级层次结构：最顶层的道路事件类别，中间层的道路事件类别，以及最底层的道路事件类型。如果你考虑`时间`维度的层次结构，最常见的粒度级别是日、月、年。对于`道路`维度层次结构，你可以区分路段和道路。维度通过如图
    7-17 所示的方式，为每个单独的`事实表`条目提供了多样化的上下文。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig17_HTML.jpg](img/478313_1_En_7_Fig17_HTML.jpg)


    图 7-17：星型模式


    例如，包含在`道路事件`事实表中的一项观测可能表明，2017 年 3 月 7 日，在库亚维-波美拉尼亚省（地区）的 DK5 快速道路段上发生了七起车辆驶出路外事故。该特定事实表记录中包含的进一步数值数据可能告知我们，这七起事故总共造成两人受伤，六人死亡。


    考虑到本章内容，我已经准备好了进行后续练习所需的所有数据。你将从本书 Git 仓库中提供的逗号分隔值文件中加载三个维度和整个事实表。


    #### 维度


    我们已经说过，没有适当的上下文，你的事实数据几乎是无用的。维度为你的事实提供上下文，让你能够获得关于数据含义的宝贵洞察。你可以在 `chapter07/2-dimensions`
    目录中找到维度数据文件。


    ```

    $ cd ~/git/oci-book/chapter07/2-dimensions/

    $ ls -1 *_dim.csv

    event_dim.csv

    road_dim.csv

    time_dim.csv

    ```


    文件名表明了每个文件中存储的数据记录类型。`event_dim.csv` 文件包含`事件类型`维度条目，`road_dim.csv` 包含`道路`维度条目，`time_dim.csv`
    包含`时间`维度条目。这些文件使用众所周知的 CSV 人类可读文本格式。值之间使用逗号 (`,`) 字符分隔。每一行代表一条数据记录。第一行是包含列名的标题。图
    7-18 展示了.csv 文件内容如何映射到我们即将创建并填充的数据库表。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig18_HTML.jpg](img/478313_1_En_7_Fig18_HTML.jpg)


    图 7-18：维度文件


    我假设你已经按照刚才的指示创建了 `roadadw-load` 存储桶。让我们将维度文件上传到这个存储桶。我们将使用 `os object put` OCI
    CLI 命令。你在第 5 章已经学过如何操作。记得选择你在第 4 章创建的 `SANDBOX-USER` CLI 配置文件。该配置文件最终将代表 `sandbox-user`
    执行 API 调用。


    ```

    $ oci os object put -bn roadadw-load --file time_dim.csv --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    $ oci os object put -bn roadadw-load --file road_dim.csv --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    $ oci os object put -bn roadadw-load --file event_dim.csv --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    ```


    你可以在 OCI 控制台对象存储仪表板的`存储桶详情`视图中查看新上传的文件。在 OCI 控制台中执行以下步骤：

    1.  转到菜单 ➤ `对象存储` ➤ `对象存储`。

    2.  点击存储桶名称。


    在`存储桶详情`视图的`对象`表中，你应该能看到这些对象。图 7-19 展示了这三个文件作为`roadadw-load`存储桶中的对象存储对象。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig19_HTML.jpg](img/478313_1_En_7_Fig19_HTML.jpg)


    图 7-19：对象存储桶中的维度数据文件


    `时间`维度包含 731 条记录。每条记录代表 2016 年 1 月 1 日至 2017 年 12 月 31 日之间的一个日历日。如果你好奇为什么是 731
    天而不是 730 天（2 × 365 天），答案很简单。2016 年是闰年，总共有 366 天。`时间`维度有三个层次级别，如图 7-20 所示。每个维度属性最终映射到数据库表的一个列，并属于一个特定的级别。此外，每个级别都有一个属性用于唯一标识该级别。这些属性（`day_id`、`month_id`
    和 `year_id`）的名称通常以 `_id` 作为后缀。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig20_HTML.jpg](img/478313_1_En_7_Fig20_HTML.jpg)


    图 7-20：时间维度'
- fmt: '# Road Dimension


    The Road dimension includes 263 records and has two hierarchy levels, namely,
    `Road Segment` and `Road`. A single segment represents all road parts in one particular
    voivodeship and of a given type such as regular road (`G`), main road (`GP`),
    expressway (`S`), and highway (`A`). If you look at Figure [7-21](#478313_1_En_7_Chapter.xhtml#Fig21),
    the segment `R01S01` represents all roads of highway type that, from an organizational
    point of view, belong to the road `DK1` and are located in the Pomeranian voivodeship.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig21_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig21_HTML.jpg)

    Figure 7-21: Road dimension


    # Event Dimension


    The Event dimension includes 24 records and has three hierarchy levels. We already
    discussed them a bit earlier, but to recap, the most granular `Road Event Types`
    are the middle-level `Road Event Category` and the topmost `Road Event Class`,
    as shown in Figure [7-22](#478313_1_En_7_Chapter.xhtml#Fig22).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig22_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig22_HTML.jpg)

    Figure 7-22: Road Event dimension


    All in all, the dimension data has been successfully uploaded to the object storage
    in Oracle Cloud. We still need to create the dimension database tables in our
    Autonomous Data Warehouse instance before we attempt to feed these tables. Open
    SQL Developer Web for the `SANDBOX_USER` user, and execute the first SQL Data
    Definition Language (DDL) statement.


    ```sql

    create table EVENT_DIM (

    event_id        char(7) not null,

    event_name      varchar2(50) not null,

    category_id     char(4) not null,

    category_name   varchar2(50) not null,

    class_id        char(1) not null,

    class_name      varchar2(50) not null,

    constraint pk_event_dim primary key (event_id)

    );

    ```


    As a result, the first dimension table for the Event Type dimension will be created.


    Autonomous Database is basically a cloud-based Oracle database; therefore, we
    are using Oracle Database data types such as `VARCHAR2`. We create a table with
    six columns, one for each dimension attribute. The primary key of the table is
    set to the identifier of the most granular dimension hierarchy level. You should
    observe the message that the table has been successfully created.


    ```

    Table EVENT_DIM created

    ```


    It is time to feed the newly created database table and load the data from the
    corresponding object that encapsulates the comma-separated-value file for the
    Event Type dimension. Still, in SQL Developer Web, prepare the `DBMS_CLOUD.COPY_DATA`
    procedure. You will have to amend the `file_uri_list` input parameter and set
    it to the URI of the object that represents the `event_dim.csv` file. Basically,
    you have to use your region code (in my case, it is `eu-frankfurt-1`) and your
    object storage namespace (in my case, it is `jakobczyk`). You can find the precise
    value for each object in the Object Details pop-up of this object in the OCI Console.
    When ready, execute the following procedure:


    ```sql

    BEGIN

    DBMS_CLOUD.COPY_DATA(

    table_name => ''EVENT_DIM'',

    credential_name => ''OCI_SANDBOX_USER'',

    file_uri_list => ''https://objectstorage.eu-frankfurt-1.oraclecloud.com/n/jakobczyk/b/roadadw-load/o/event_dim.csv'',

    format => json_object(''type'' value ''CSV'', ''skipheaders'' value ''1'')

    );

    END;

    ```


    The `DBMS_CLOUD.COPY_DATA` procedure uses a Credential database object referenced
    by name that you provide as the value to the `credential_name` parameter. The
    procedure processes all files mentioned with the `file_uri_list` parameter, taking
    into consideration any specific format-related settings that you provide with
    the `format` parameter. Finally, data is inserted into the target table with the
    name you set with the `table_name` parameter. In our case, it will be the `EVENT_DIM`
    table we created just a while ago. We instruct the procedure that the files are
    in the CSV format, and they include headers we want to skip. The procedure should
    result in a brief message that says that everything went fine.


    ```

    PL/SQL procedure successfully completed.

    ```


    We won’t practice error handling here, but it is good to know, briefly, how the
    procedure handles any unexpected load issues. First, you have to know the `rejectlimit`
    attribute you can add to the `format` field. The `rejectlimit` attribute defines
    the maximum number of any encountered invalid rows that will be ignored without
    forcing the procedure to error out. This value is set by default to `0`, which
    means that the entire data load will be rolled back if there is even one row that
    violates column data type, referential integrity, or any other constraints. In
    such a case, you will be notified in the output message where you can find the
    detailed procedure log. It is usually stored in a dynamically created table whose
    name looks something like `COPY$1_LOG`.


    Let’s take a glance at the Event Type dimension data in the `EVENT_DIM` database
    table. In the same SQL Developer Web worksheet, run the following query to select
    all records from the `EVENT_DIM` table:


    ```sql

    select * from event_dim;

    ```


    The results are shown in Figure [7-23](#478313_1_En_7_Chapter.xhtml#Fig23). Feel
    free to compare what you see in your Query Results pane to the contents of the
    `event_dim.csv` file.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig23_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig23_HTML.jpg)

    Figure 7-23: Event dimension data in SQL Developer Web


    Now, we are going to repeat what we did for the Event Type dimension and apply
    the same steps to load the remaining two dimensions. Create the new database table
    for the Road dimension using the following SQL DDL statement:


    ```sql

    create table ROAD_DIM (

    segment_id          char(6) not null,

    segment_name        varchar2(50) not null,

    segment_type        char(2) not null,

    segment_voivodeship varchar2(50) not null,

    segment_highway     varchar2(50),

    segment_expressway  varchar2(50),

    road_id             varchar2(10) not null,

    road_name           varchar2(10) not null,

    road_lenght         number(5),

    constraint pk_road_dim primary key (segment_id),

    constraint chk_segment_type

    check ( segment_type in (''A'',''S'',''GP'',''G''))

    );

    ```


    The `ROAD_DIM` database table includes two columns that allow `NULL` values. In
    the database world and not only there, `NULL` is understood as “no value” and
    is used to differ from an “empty value.” Furthermore, the table uses an additional
    `CHECK` constraint to make sure that the `segment_type` column allows only four
    listed values (`A`, `S`, `GP`, and `G`). After running the DDL statement, you
    should receive the following message:


    ```

    Table ROAD_DIM created

    ```


    Consequently, adapt the next procedure shown in the next code snippet by replacing
    the region code and object storage namespace as you did before, and execute it
    to feed the `ROAD_DIM` table.


    ```sql

    BEGIN

    DBMS_CLOUD.COPY_DATA(

    table_name => ''ROAD_DIM'',

    credential_name => ''OCI_SANDBOX_USER'',

    file_uri_list => ''https://objectstorage.eu-frankfurt-1.oraclecloud.com/n/jakobczyk/b/roadadw-load/o/road_dim.csv'',

    format => json_object(''type'' value ''CSV'', ''skipheaders'' value ''1'', ''blankasnull''
    value ''true'')

    );

    END;

    ```


    This time, we added a new format attribute called `blankasnull`. As a result,
    all empty fields in the source file will be represented as `NULL` in their corresponding
    database fields. We do not expect any surprises.


    ```

    PL/SQL procedure successfully completed.

    ```


    Again, use SQL Developer Web to display what has just been copied to the `ROAD_DIM`
    table.


    ```sql

    select * from road_dim;

    ```


    The results are shown in Figure [7-24](#478313_1_En_7_Chapter.xhtml#Fig24).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig24_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig24_HTML.jpg)

    Figure 7-24: Road dimension in SQL Developer Web


    # Time Dimension


    The only remaining dimension is the Time dimension. Create the following table:'
