    Similar to before, adapt and execute the `COPY_DATA` procedure to load data from
    the `time_dim.csv` file stored in the object storage to the `TIME_DIM` database
    table.


    ```

    BEGIN

    DBMS_CLOUD.COPY_DATA(

    table_name => ''TIME_DIM'',

    credential_name => ''OCI_SANDBOX_USER'',

    file_uri_list => ''https://objectstorage.eu-frankfurt-1.oraclecloud.com/n/jakobczyk/b/roadadw-load/o/time_dim.csv'',

    format => json_object(

    ''type'' value ''CSV'',

    ''skipheaders'' value ''1'',

    ''blankasnull'' value ''true'',

    ''dateformat'' value ''YYYY-MM-DD'')

    );

    END;

    ```


    The `TIME_DIM` table specifies the `DATE` data type for the `day_date` column.
    Usually, we need to be a bit careful with this kind of data type and make sure
    the database precisely understands the date encoding used in the source data.
    This is because it is generally possible to write down a date in multiple ways.
    For example, the most common date format in the United States is “month/day/year,”
    for example “8/16/19.” In Europe, you use “year month day,” for example, “20190816.”
    If you look into the `time_dim.csv` file, you will see that I applied another
    date format, namely, year-month-day. August 16, 2019, would be thus written as
    “2019-08-16.” You use the `dateformat` attribute provided to the `format` field
    to instruct the procedure how to translate what it finds in the source data to
    the `DATE` data type if inserting the data field into a `DATE`-type column. Even
    though this dimension contains a few more records than the two previous, the procedure
    should inform on its success relatively fast.


    ```

    PL/SQL procedure successfully completed.

    ```


    You can use this query to see the newly loaded records:


    ```

    select * from time_dim;

    ```


