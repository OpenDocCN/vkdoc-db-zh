    use various profiles and templates to launch and configure the resources. Figure
    [1-4](#478313_1_En_1_Chapter.xhtml#Fig4) outlines the self-provisioning process.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig4_HTML.png](images/478313_1_En_1_Chapter/478313_1_En_1_Fig4_HTML.png)


    Figure 1-4


    Rapid self-provisioning


    Actually, we could say that a scripted configuration is nothing new. It has been
    standard for a few years now, gaining more popularity each year. For example,
    we can pick Ansible and use its playbook-based agentless automation to install
    a software stack on multiple servers parallelly. In this way, we are not only
    speeding things up but also allowing the automation to perform the same task on
    a number of machines, decreasing the risk of mistakes. This is how many administrators
    already achieve their daily tasks. The more you automate, the less time you spend
    on repeatable tasks. The vast majority of operators still limit the scope of their
    automation to their software stack rollouts. Hardware seems to be continually
    handled rather manually. Well, you still need to plug a cable into a switch or
    boot a new machine, don’t you? Rapid self-provisioning, on the other hand, necessitates
    complete end-to-end automation for both the hardware and the software components.
    Yet, hardware provisioning automation doesn’t seem easy. Even though it is absolutely
    possible to use a remote bare-metal machine boot using Preboot Execution Environment
    (PXE) booting, we rely nowadays more and more on virtualized pools of resources.
    Virtualization makes rapid resource provisioning much easier.


    ### Elasticity and Scalability


    An *elastic* object is able to return to its regular shape voluntarily, after
    it has been stretched (or squeezed). Such an object is thus highly adaptable to
    the impact of external circumstances. A web application can be considered highly
    adaptable or elastic if it is able to handle unexpected peaks of inbound traffic
    requests. A backend data warehousing extract-transform-load (ETL) engine is reckoned
    to be very elastic or adaptable if it is capable of staging sudden, extraordinarily
    large volumes of incoming data loads.


    Computer system elasticity can be achieved through *scalability* of the underlying
    resources. For a modern, stateless web application, the number of containers that
    expose the API and encapsulate its request processing implementation logic could
    be increased, even by launching them on additional virtual machines. This action
    would enlarge the overall compute capacity of a cluster. In other words, we would
    have more application containers running on a larger set of host instances of
    the same size added to the cluster to increase the overall system throughput.
    This is called *horizontal scaling*. In the case of a backend ETL engine, the
    overall capacity of the attached block storage units for the staging area could
    be upsized. Put differently, we would add more hardware resources such as block
    volumes to each machine, keeping the number of machines unaltered. This is called
    *vertical scaling* . Figure [1-5](#478313_1_En_1_Chapter.xhtml#Fig5) presents
    the two types of resource scaling.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig5_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Vertical and horizontal scalability


    If we consider only software architecture, *vertical scaling* may be often seen
    as easier and more appealing at first glance. If you move an application to a
    more powerful machine with a larger number of CPUs or simply extend the memory
    on the existing application host, the software would see new the hardware resources
    immediately or after a quick reboot. In most cases, there is no need to reconfigure
    the application. This approach has a major pain point, though. You cannot scale
    a single machine endlessly up. There will always be a limit in terms of the hardware
    availability because physical machines and even virtualized resource pools do
    have limits.


    *Horizontal scaling* may indeed seem unlimited. In theory, we could expand a cluster
    by adding new machines virtually infinitely. This really crucial advantage of
    horizontal scaling comes at a cost of the required cluster management. Distributed
    computer systems have to be specifically designed in a way that it is possible
    to scale them out. They must be able to handle synchronization and replication
    across the machines that act as cluster nodes.


    A computer system is truly elastic if the resources it uses are dynamically allocated
    and deallocated in response to the changing demand so that its performance always
    remains constant. In practice, such autoscaling is possible only with horizontal
    scaling.'
  trans: '## 传统配置流程


    对于一个现有的数据中心站点，基础设施配置流程通常始于一个经过评审和批准的请求，该请求最终会成为订单。在这初始步骤之前，会进行相关的容量规划工作，以确定数据中心扩建部分真正需要的设备和软件。如果我们库存中有所有请求的硬件组件和软件许可证，那我们很幸运。订单履行就可以开始了。我们需要获取硬件组件；在资产目录中登记每一个组件，通常包括它们的关联信息；然后安装、配置、连接它们，并启用它们以供使用。


    如果我们仍然需要采购设备，情况可能会稍微复杂一些。首先，采购本身可能需要多级审批，这会花费更多时间。其次，配置流程还涉及采购活动。除非我们的公司使用了自动化的从采购到付款解决方案，否则所有步骤，如选择供应商、根据政策核对合同、下订单、提交会计发票和处理付款，都会涉及大量冗长的人工活动。总而言之，这需要花钱并且可能耗费大量时间。


    现在设想一下，我们负责管理一个供公司内部使用的小型数据中心的资源。如果要求我们尽快为其中一个开发团队启动一个全新的环境，会发生什么？如果我们遵循传统方法，漫长的流程就会启动。首先，我们会客气地请我们的同事进行容量规划以评估他们的需求，并填写将成为审批对象的请求。一旦收集到所有审批，我们会检查设备是否有库存，并为缺失的组件启动采购子流程。除非我们使用了集成良好的从采购到付款的业务软件，否则采购子流程本身可能需要大量时间，最终采购订单才能履行。图
    1-3 使用标准的`BPMN`来概述传统配置流程。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig3_HTML.png](img/478313_1_En_1_Fig3_HTML.png)


    图 1-3：传统配置流程


    ## 快速自配置流程


    在云计算的世界里，`配置`这个词经常在启动新的资源实例时遇到，指的是你的虚拟资源所处的状态。来自`NIST`的定义强调在最少的服务提供商交互下实现快速配置。这就是关键。最少的服务提供商交互意味着无需提交工单并等待管理员团队为你半手动地设置资源。相反，这个过程是全自动的，一旦你触发实例启动，订单将根据你的权限和配额（也称为`服务限制`）进行验证，然后传递给快速配置引擎。该引擎将使用各种配置文件和模板来启动和配置资源。图
    1-4 概述了自配置流程。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig4_HTML.png](img/478313_1_En_1_Fig4_HTML.png)


    图 1-4：快速自配置


    实际上，我们可以说脚本化配置并非新事物。这在几年间已成为标准，并且每年都越来越受欢迎。例如，我们可以选择`Ansible`，并利用其基于剧本的无代理自动化来并行在多个服务器上安装软件栈。这样，我们不仅加快了速度，还允许自动化在多台机器上执行相同的任务，降低了出错风险。这已经是许多管理员完成日常任务的方式。你自动化的程度越高，花在可重复任务上的时间就越少。绝大多数操作员仍然将其自动化范围限制在软件栈的部署上。硬件似乎仍然需要相当程度的手动处理。嗯，你仍然需要将线缆插入交换机或启动一台新机器，不是吗？而快速自配置，则需要对硬件和软件组件都实现完整的端到端自动化。然而，硬件配置自动化似乎并不容易。尽管使用`预启动执行环境`进行远程裸机启动是完全可行的，但我们如今越来越依赖于虚拟化的资源池。虚拟化使得快速资源配置变得容易得多。


    ## 弹性与可扩展性


    一个`弹性`物体在被拉伸（或挤压）后能够自行恢复到原来的形状。因此，这样的物体对环境变化具有很强的适应性。如果一个 Web 应用程序能够处理意外的入站流量请求高峰，那么它可以被认为是高度适应性强或弹性的。如果一个后端数据仓库提取-转换-加载引擎能够应对突然的、异常大量的传入数据负载，那么它也被认为是非常弹性或适应性强的。


    计算机系统的弹性可以通过底层资源的`可扩展性`来实现。对于一个现代的、无状态的 Web 应用程序，可以通过在额外的虚拟机上启动容器来增加暴露 API 并封装其请求处理实现逻辑的容器数量。这个操作会扩大集群的整体计算能力。换句话说，通过向集群中添加更多相同大小的主机实例来运行更多的应用程序容器，从而提高整个系统的吞吐量。这被称为`水平扩展`。对于后端的`ETL`引擎，可以增加用于暂存区的连接块存储单元的总容量。换句话说，我们会为每台机器添加更多的硬件资源，例如块卷，而保持机器数量不变。这被称为`垂直扩展`。图
    1-5 展示了这两种资源扩展类型。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig5_HTML.jpg](img/478313_1_En_1_Fig5_HTML.jpg)


    图 1-5：垂直和水平可扩展性


    如果我们只考虑软件架构，`垂直扩展`乍一看通常被认为更容易、更有吸引力。如果你将应用程序迁移到一台拥有更多 CPU 的更强大的机器上，或者只是在现有应用程序主机上扩展内存，软件会立即或在快速重启后识别到新的硬件资源。在大多数情况下，不需要重新配置应用程序。然而，这种方法有一个主要痛点。你无法无限地扩展单台机器。硬件可用性总是有限制的，因为物理机甚至虚拟化资源池都有其极限。


    `水平扩展`确实看起来似乎是无限的。理论上，我们可以通过添加新机器来无限地扩展集群。水平扩展的这个关键优势是以所需的集群管理为代价的。分布式计算机系统必须以一种可以向外扩展的方式专门设计。它们必须能够处理作为集群节点的机器之间的同步和复制。


    如果一个计算机系统所使用的资源能够根据变化的需求动态分配和释放，使其性能始终保持稳定，那么这个系统才是真正弹性的。在实践中，这种`自动扩展`只有通过水平扩展才能实现。'
- fmt: '# Delivery as a Service


    If you look at the definition from Gartner, you will see that the IT capabilities
    are said to be delivered as a service. To understand what that means and how it
    fits into the rapid provisioning of resources available in shared pools, let’s
    start by looking at the concept of a shared pool.


    Purchasing goods like computer hardware is related to capital expenses. If a project
    team requires a new server, they could buy one, in theory. Such an investment
    incurs an expense that has to be considered in the project budget and properly
    accounted for. This is not a flexible approach, however. By owning the asset,
    a project team has to maintain the lifecycle of the asset up to its decommissioning.
    A highly specialized task force team usually has neither people nor time to do
    this.


    Sometimes, you need a set of additional machines just to perform a specific task
    that is limited in time. For example, you may have to carry out load-and-performance
    or acceptance tests in a dedicated environment for only a few weeks in every quarter.
    If you purchase the equipment, it might remain unused for the rest of the time,
    unless you are somehow able to return it to a resource pool available to other
    project teams. All resources in a `shared pool` could be used in a measured way
    only when really needed, thus minimizing their idle time. The project team would
    no longer own any hardware but rather have their cost centers charged based on
    the measured usage of the resources. From a project team perspective, this is
    nothing but a service that entails operational expenses. Furthermore, no hardware
    ownership results in no need for, or easier, asset management.


    The hardware, which is used to back up a shared pool of virtual cloud resources,
    still incurs costs, usually for the one who is responsible for maintaining it.
    Such costs are eventually charged to the project teams that have used the virtual
    resources. To keep the cost split based on the real usage of each individual cloud
    consumer, the virtual resource consumption must be measured.


    For a large organization, employing `self-service` as a core part of its processes
    can save a lot of effort and eliminate the unneeded waiting time. It boosts the
    productivity of project teams and individuals who are empowered to take matters
    into their own hands. A project team would be able to self-provision the required
    resources of various types (compute, storage, network, etc.) on their own, scale
    them out in an automated way up to the point in which the system performance meets
    the requirements, and eventually return them to the resource pool as soon as they
    are no longer in use. Self-service is possible only when the resource pool management
    system offers an interface to supervise the resources. The project teams, or `service
    consumers`, provision, manage, and monitor the resources through an application
    programming interface (`API`).


    # APIs


    In the early days, an `API` was usually understood as a collection of programming
    language functions encapsulated for reuse in a library. Programmers would call
    these functions in the code using function headers. Computer program binaries
    would then link to a dynamic library (`.dll` or `.so`) to execute the implementations
    of the `API` functions. With computer systems becoming more and more distributed
    and interconnected, `API`s gained another meaning, this time related to remote
    procedure calls and web services. Two production-grade `API` styles for web services
    are Simple Object Access Protocol (`SOAP`) and Representational State Transfer
    (`REST`). Let’s briefly explore them.


    ## SOAP APIs


    The Simple Object Access Protocol is a mature standard that defines a role-based,
    multinode distributed processing model with an initial sender, optional intermediaries,
    and an ultimate receiver. Message exchange operations and their payload structure
    are defined in a contract. The payload is usually structured in a strict-schema
    `XML` format, ensuring that the format of a message is compliant with the contract.
    A `SOAP`-based web service contract is defined in a Web Services Description Language
    (`WSDL`) file. The current version (`SOAP 1.2`) was standardized in 2007 by W3C
    in a document called a W3C Recommendation. An initial draft of the protocol was
    submitted in 2000 as `SOAP 1.1` in a W3C Note for discussion. In `SOAP`, the focus
    is on custom-defined operations and strict-schema `XML` data interchange. `API`s
    are designed using a well-defined `WSDL` format. `SOAP` is designed in a transport-agnostic
    way. Two most dominant transports are `HTTP` and Java Message Service (`JMS`).
    Listing [1-1](#478313_1_En_1_Chapter.xhtml#PC1) shows a simplified example of
    a `SOAP` request sent over `HTTP` transport.


    ```

    POST /crm/shipmentService HTTP/1.1

    Host: 192.168.10.15:8081

    Content-Type: text/xml;charset=UTF-8

    SOAPAction: "http://example.com/crm/shipments/search"


    WAW

    FRA

    2018-06-25

    2018-06-28


    Listing 1-1

    Sample SOAP Request in HTTP

    ```


    ## REST APIs


    `REST` stands for Representational State Transfer and has been present as a computer
    science term since 2000\. It was introduced by Roy Fiedling in his PhD dissertation
    on network-based software architectures. Roy writes the following:


    > The key abstraction of information in `REST` is a `resource`. Any information
    that can be named can be a resource: a document or image, a temporal service (e.g.
    “today’s weather in Los Angeles”), a collection of other resources, a non-virtual
    object (e.g. a person), and so on.⁴


    Contemporary `REST`ful services focus on resource lifecycle events (creation,
    update, deletion, and read access) represented by the corresponding `HTTP` methods
    (`PUT`, `POST`, `DELETE`, `GET`). The most natural resources are business entities
    such as shipment, invoice, or sales leads. Yet, business processes without any
    entity-like meaning, such as order fulfillment or timesheet submission or even
    nonfunctional processes like an advanced search, can also be represented as `REST`
    resources. In this way, we can trigger (usually with `HTTP POST`) and track (usually
    with `HTTP GET`) these processes. An interesting thing is that with `REST`, we
    usually avoid the word `contract` and simply talk about `API design`. Contrary
    to `SOAP` and its `WSDL` contract, there has been more than one way to define
    a `REST API`. The initial lack of an official standard has encouraged a kind of
    free-market competition to find the most popular way to design an `API`. One of
    the first, somehow indirect, attempts to introduce a standard for `REST API` design
    was Web Application Description Language (`WADL`) , with a specification⁵ being
    submitted to the W3C in 2009 by Sun Microsystems. Two years later, the Swagger
    suite was born and together with RAML and API Blueprint dominated the `API` design
    scene. In 2015, the OpenAPI Initiative was born at the Linux Foundation with a
    goal to create and maintain the ultimate `API` design standard. This standard
    is known as OpenAPI⁶ and is based on Swagger.


    The most popular payload format used for `REST API`s is JavaScript Object Notation
    (`JSON`), but there is nothing against using `XML` or plain text in the body of
    either a request or a response. For some resource lifecycle events, it is reasonable
    to rely on `HTTP` status codes with no payload at all. Listing [1-2](#478313_1_En_1_Chapter.xhtml#PC2)
    presents an example of a call to a nonfunctional process resource responsible
    for an advanced search. The payload carries search criteria serialized in `JSON`
    format. The `URL` defines the resource over which the search operation is performed.


    ```

    POST /crm/search/shipments HTTP/1.1

    Host: 192.168.10.15:8081

    Content-Type: application/json;charset=UTF-8

    Accept: application/json

    {

    "route": {

    "origin":"WAW",

    "destination":"FRA"

    },

    "postingPeriod": {

    "from": "2018-06-25",

    "to": "2018-06-28"

    }

    }

    Listing 1-2

    Sample REST Call

    ```'
