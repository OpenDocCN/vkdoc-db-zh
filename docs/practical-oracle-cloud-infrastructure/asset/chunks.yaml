    namespace was not found, you probably used the tenancy name instead of the tenancy
    namespace. Please use the tenancy namespace to tag the image and log in to OCIR.
    You can use the `oci os ns get` command to find out your tenancy namespace.


    Now, you can verify that the image has been successfully pushed into OCIR as a
    new private Docker repository. This time, I am logging into the OCI Console as
    `sandbox-admin`. If you logged in as `sandbox-user`, you wouldn’t be able to list
    the Docker repositories because the policy we had set lets only `sandbox-admins`
    group members do this. Figure [8-14](#478313_1_En_8_Chapter.xhtml#Fig14) presents
    the newly created repository that represents the newly pushed `uuid:1.0` image.
    The Access field indicates that we are dealing with a private repository, which
    is visible for successfully authenticated and authorized IAM users. In the User
    field, you can see the OCID of the user who created the repository. Figure [8-15](#478313_1_En_8_Chapter.xhtml#Fig15)
    presents the details of a concrete image version.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig15_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig15_HTML.jpg)

    *Figure 8-15: Viewing an OCIR repository image*


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig14_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig14_HTML.jpg)

    *Figure 8-14: Viewing an OCIR repository*


    The image is present in OCIR.


    ### Container Management


    Think about provisioning an instance pool fronted by a load balancer. In an instance
    pool, each compute instance uses Docker and pulls an image on startup to run multiple,
    let’s say three, containers based on the `uuid:1.0` image. In this way, a large
    number of UUID API instances would be capable of serving a truly demanding stream
    of requests incoming over the load balancer. This is conceptually presented in
    Figure [8-16](#478313_1_En_8_Chapter.xhtml#Fig16).


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig16_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig16_HTML.jpg)

    *Figure 8-16: Many instances of a containerized application on many VMs*


    This could work well, and you would have the opportunity to horizontally scale
    out the number of compute instances as demand grows or scale them in as the demand
    decreases, either manually or by employing the autoscaling mechanism.


    Take a moment to consider a few challenges, though.


    *   Upgrading all running containers by introducing a newer image version

    *   Adding other containers based on different images

    *   Changing the number of containers per compute instance


    At first glance, you just need to push the relevant images to OCIR and adapt the
    cloud-config files, Terraform providers, or Ansible Playbook depending on the
    instance initialization style you follow. Yet, if you look closer at the challenge,
    you will start asking yourself the following questions:


    *   How do I securely manage the Auth Tokens on these instances?

    *   How would I avoid downtime?

    *   What should I do if I have to handle dependencies between different containerized
    applications?

    *   How would I actually manage virtual networking between various containerized
    applications on many compute instances if they have to interact with each other?

    *   How would one container discover and talk to other containers?


    As you can see, sometimes, or I dare say often, it is not enough just to launch
    an instance pool with a container runtime on each instance that runs containerized
    applications that are all fronted by a load balancer. The questions I listed prove
    that you need a more sophisticated and more powerful mechanism to manage the containers
    and support the full lifecycle of containerized applications. This is where the
    container orchestration comes into play.


    ## Container Orchestration


    Contemporary backend systems are composed of many interacting applications and
    application modules that belong to more specialized systems. This approach was
    intensified with the arrival of service-oriented architecture (SOA) years ago.
    SOA has been broadly adapted ever since. Service orientation is a design paradigm
    in which preferably stateless software components are considered as *services*
    that offer their functionality through well-described APIs. This approach results
    in a more granular split of capabilities between individual software components
    and entails an increased demand for various types of interactions between individual
    services.


    Running each service as a stand-alone process in the context of the operating
    system would be a pretty cumbersome task. This is why services have been traditionally
    deployed to *application servers* that fulfilled many crucial nonfunctional tasks
    such as managing dependencies, offering resource injection, providing security,
    persisting state, delivering monitoring capabilities, and implementing APIs. Service
    developers benefited from delegating these support tasks to application servers
    simply because they were able to focus on functional goals in their service code.
    Application servers could be then combined into clusters to enable load distribution
    and high availability. Furthermore, the dependencies were installed and registered
    on the level of application servers and therefore decoupled from the service code.
    At first glance, it sounds absolutely wonderful, like an ultimate solution for
    enterprise software. Yet, it could lead and often led to problems during the migration
    of particular services from one environment to another. In the world of application
    servers, developers usually handed their deployment artifacts together with the
    list of required dependencies to the operations team whose role was to install
    the services in various environments and plug them into the messaging bus if needed.
    Sometimes, it happened that the configuration of different environments differed
    so much that unexpected problems occurred due to incorrect properties or incompliant
    versions of libraries. To deploy a service to a given application server, the
    service code had to adhere to standards supported and interfaces implemented by
    a particular application server. For example, you deployed Java EE applications
    to JEE-compliant servers, Python applications to WSGI-compliant web servers, and
    .NET applications to Microsoft IIS.'
