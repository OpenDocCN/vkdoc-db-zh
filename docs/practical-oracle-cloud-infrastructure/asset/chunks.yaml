    on the Instance Information tab of the Instance Details view. In my case, it is
    10.1.2.2.


    3.  In the Resources section, make sure Metrics is selected.


    4.  Click the plot area of the CPU Utilization widget.


    A new embedded window should appear in which you adjust the x-axis at the bottom
    to increase the readability of the plot even further. This is presented in Figure
