    Like every other Oracle Cloud Infrastructure resource, compartments are uniquely
    identified through OCIDs. You can read more about them in Chapter [2](#478313_1_En_2_Chapter.xhtml).
    At any time, you can easily change a compartment’s name and description, but its
    OCID remains immutable.


    Tip


    If you’ve made a typo in the compartment’s name, do not delete it, but just rename
    it.


    It is possible to delete unneeded compartments. You can perform this operation
    both in the Console or using the CLI. The action is asynchronous and usually takes
    some time. Prior to that, you still have to terminate and delete all resources
    and subcompartments inside the compartment you are about to delete; otherwise,
    you won’t be allowed to do so. This is a command that initiates compartment deletion:


    ```

    $ oci iam compartment delete -c "$EXP_COMPARTMENT_OCID"

    Are you sure you want to delete this resource? [y/N]: y

    {

    "opc-work-request-id": "ocid1.identityworkrequest.oc1..aa.........rejw7a"

    }

    ```


