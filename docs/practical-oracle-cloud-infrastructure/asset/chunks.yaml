    Fn Project 是 *Oracle Functions* 的基础，后者是在 Oracle Cloud 上可用的函数即服务平台。在上一节中，你操作了一个本地
    Fn 服务器。现在，你可以将相同的函数代码部署到 Oracle Functions。通过这样做，你将让你的函数在你选择的 Oracle Cloud 区域中运行。无需像我们在前几章中运行应用程序那样配置任何计算实例或容器编排集群。底层计算资源完全由
    Oracle Functions 在后台管理。函数实例是动态创建的，以响应函数 *触发器*。正如你可能预期的那样，最基本的触发器类型是 HTTP 请求。每一个部署到
    Oracle Functions 的 Fn Project 函数都会被赋予一个专用的基于 HTTP 的 *函数端点*。发送到该端点的请求必须经过正确签名才能通过
    OCI Identity and Access Management 完成的身份验证和授权。当它们成功后，Oracle Functions 会读取函数元数据，并根据该信息创建特定于函数的容器来处理请求。其他类型的触发器是在
    Oracle Cloud 内发生的各种 *事件*。例如，特定对象存储桶中新建的对象可能会生成一个事件，该事件由 Oracle Events 服务传播到 Oracle
    Functions 服务中的选定函数。你将在本章第二部分了解到这一点。两种触发器——基于 HTTP 和基于事件的——以及 Oracle Functions
    的一般工作方式如图 9-9 所示。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig9_HTML.jpg](img/478313_1_En_9_Fig9_HTML.jpg)


    图 9-9


    Oracle Functions


    建议将函数特定的容器镜像存储在与你希望无服务器函数运行的 Oracle Functions 端点相同区域的 Oracle Container Image Registry
    (OCIR) 中。你在上一章已经使用过 OCIR。那时，Oracle Kubernetes Engine 从 OCIR 拉取镜像以在 Kubernetes
    Pod 中创建容器。这次，镜像将被 Oracle Functions 动态拉取，以创建短生命周期的函数容器，用于处理到达的函数调用。'
- fmt: '# OCI Networking and Policies


    在开始使用 Oracle Functions 之前，还有两个与基础设施相关的初始设置需要选择。


    *   为无服务器函数选择虚拟云网络子网。


    *   为 FaaS 服务创建所需的 IAM 策略语句。


    为什么我们还要谈论虚拟网络，即使 Oracle Functions 本身不需要管理基础设施？当你定义一个 Fn 应用（它将无服务器函数分组）并打算让此应用在
    Oracle Functions 上运行时，必须指定 VCN 子网。该 VCN 子网在其 IP 范围内必须至少有 32 个可用的 IP 地址，并且应依赖于无状态安全规则。使用不同的
    VCN 来运行无服务器函数是完全可以的。你将在接下来的某个章节中学习如何为 Oracle Functions 应用指定 VCN。通常，你需要自行创建新的子网。但为了本节练习的目的，子网已由
    Terraform 预先创建好，一同创建的还有用于函数开发的计算机器。你可以在 `functions` 模块中找到相应的基础设施代码。计算实例连接到 `dev-net`
    公共子网。`functions-subnet` 私有子网则专用于 Oracle Functions。图 9-10 展示了 OCI 控制台中的两个子网。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig10_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig10_HTML.jpg)


    图 9-10


    用于 Oracle Functions 的 VCN 子网


    Oracle Functions 与 IAM 完全集成。这一事实影响着服务的双方。不仅 Oracle Functions 必须被授予所需的访问权限，函数开发者和函数使用者也必须属于相关
    IAM 策略语句所引用的 IAM 组。让我们以更有条理的方式来讨论这一点。首先，代表 Oracle Functions 的 `FaaS` 服务在 IAM 中必须被允许执行以下操作：


    *   在租户或选定的 compartment 中使用虚拟网络


    *   读取 OCIR 中的容器镜像仓库


    这些权限通过清单 9-5 所示的策略语句授予。


    ```

    [

    "allow service FaaS to use virtual-network-family in compartment Sandbox",

    "allow service FaaS to read repos in tenancy"

    ]

    Listing 9-5

    tenancy.functions.policy.json

    ```


    其次，为了部署和监控他们的无服务器函数，函数所有者必须属于被允许的 IAM 组。


    *   与 `functions` 族的管理级 OCI API 交互


    *   读取指标


    *   使用虚拟网络


    *   管理 OCIR 中选定的仓库


    这些语句可以限定到特定的 compartment。在我们的案例中，我们将允许 `sandbox-users` 组的成员仅在 `Sandbox` compartment
    中部署和监控函数。所需权限中的三项通过清单 9-6 所示的策略语句授予。


    ```

    [

    "allow group sandbox-users to manage functions-family in compartment Sandbox",

    "allow group sandbox-users to read metrics in compartment Sandbox",

    "allow group sandbox-users to use virtual-network-family in compartment Sandbox"

    ]

    Listing 9-6

    sandbox-users.functions.policy.json

    ```


    如果你完成了第 8 章的练习，那么第四项剩余的策略语句已经定义好了。它应该在根 compartment（租户级别）中一个名为 `tenancy-ocir-policy`
    的策略里定义，如下所示：


    ```

    allow group sandbox-users to manage repos in tenancy where target.repo.name =
    /sandbox∗/

    ```


    现在，让我们创建清单 9-5 和 9-6 所示的两个新策略。为此，回到我们的本地机器，使用 OCI CLI 执行以下命令：


    ```

    $ cd ~/git/oci-book/chapter09/3-functions/policies

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo $TENANCY_OCID

    ocid1.tenancy.oc1..aa...3yymfa

    $ oci iam policy create -c $TENANCY_OCID --name functions-policy --description
    "FaaS Policy" --statements "file://tenancy.functions.policy.json"

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "functions-policy",

    ...

    }

    $ oci iam policy create --name sandbox-users-functions-policy --description "Functions-related
    policy for regular Sandbox users" --statements "file://sandbox-users.functions.policy.json"
    --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "sandbox-users-functions-policy",

    ...

    }

    ```


    我们已经为 Oracle Functions 准备好了租户。现在，让我们转向 `fn` 客户端并创建一个新的上下文。'
  raw: '#### OCI Networking and Policies


    Before you start using Oracle Functions, there are two additional infrastructure-related,
    initial-setup selections to be made.


    *   Choose virtual cloud network subnets for serverless functions.


    *   Create the required IAM policy statements for the FaaS service.


    Why do we even talk about virtual networks if there should be no infrastructure
    management needed for Oracle Functions? When you define an Fn application, which
    groups serverless functions, and intend this application to run on Oracle Functions,
    you have to denote the VCN subnet. The VCN subnet must contain at least 32 available
    IP addresses in its IP range and should rely on stateless security rules. It is
    absolutely fine to use various VCNs for running serverless functions. You will
    learn how to specify the VCN for an Oracle Functions application in one of the
    sections ahead. Normally, you would create new subnets on your own. For the purpose
    of the exercises in this section, the subnet was already created by Terraform,
    together with the compute machine for function development. You will find the
    corresponding infrastructure code in the `functions` module. The compute instance
    is attached to the `dev-net` public subnet. The `functions-subnet` private subnet
    is intended for Oracle Functions. Figure [9-10](#478313_1_En_9_Chapter.xhtml#Fig10)
    presents both subnets in the OCI Console.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig10_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    VCN subnet for Oracle Functions


    Oracle Functions is fully integrated with IAM. This fact impacts both sides of
    the service. Not only must Oracle Functions be granted the required access, but
    also function developers and function consumers must belong to the IAM groups
    that are referenced by the relevant IAM policy statements. Let’s discuss this
    in a bit more structured way. First, the `FaaS` service, which represents Oracle
    Functions in IAM , must be allowed to do the following:


    *   To use virtual networks in the tenancy or selected compartments


    *   To read container image registry repositories in OCIR


    These privileges are granted with the policy statements shown in Listing [9-5](#478313_1_En_9_Chapter.xhtml#PC38).


    ```

    [

    "allow service FaaS to use virtual-network-family in compartment Sandbox",

    "allow service FaaS to read repos in tenancy"

    ]

    Listing 9-5

    tenancy.functions.policy.json

    ```


    Second, to deploy and monitor their serverless functions, function owners have
    to belong to IAM groups that are allowed.


    *   To interact with the manage-level OCI APIs for the `functions` family


    *   To read the metrics


    *   To use the virtual networks


    *   To manage selected repositories in OCIR


    The statements can be narrowed to selected compartments. In our case, we will
    let the members of the `sandbox-users` group deploy and monitor the functions
    in the `Sandbox` compartment only. Three of the required privileges are granted
    with the policy statements shown in Listing [9-6](#478313_1_En_9_Chapter.xhtml#PC39).


    ```

    [

    "allow group sandbox-users to manage functions-family in compartment Sandbox",

    "allow group sandbox-users to read metrics in compartment Sandbox",

    "allow group sandbox-users to use virtual-network-family in compartment Sandbox"

    ]

    Listing 9-6

    sandbox-users.functions.policy.json

    ```


    If you completed exercises from Chapter [8](#478313_1_En_8_Chapter.xhtml), the
    fourth remaining policy statement is already defined. It should be defined in
    the root compartment (on the tenancy level) in the policy called `tenancy-ocir-policy`
    and looks like this:


    ```

    allow group sandbox-users to manage repos in tenancy where target.repo.name =
    /sandbox∗/

    ```


    Let’s create the two new policies shown in Listings [9-5](#478313_1_En_9_Chapter.xhtml#PC38)
    and [9-6](#478313_1_En_9_Chapter.xhtml#PC39). To do so, go back to our local machine
    with the OCI CLI and execute the following commands:


    ```

    $ cd ~/git/oci-book/chapter09/3-functions/policies

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo $TENANCY_OCID

    ocid1.tenancy.oc1..aa...3yymfa

    $ oci iam policy create -c $TENANCY_OCID --name functions-policy --description
    "FaaS Policy" --statements "file://tenancy.functions.policy.json"

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "functions-policy",

    ...

    }

    $ oci iam policy create --name sandbox-users-functions-policy --description "Functions-related
    policy for regular Sandbox users" --statements "file://sandbox-users.functions.policy.json"
    --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "sandbox-users-functions-policy",

    ...

    }

    ```


    We have prepared our tenancy for Oracle Functions. Now, let’s move to the `fn`
    client and create a new context.'
