    ### 分页列出对象


    在日常工作中，你很容易遇到包含数百或数千个对象的存储桶。一次性列出所有对象是不可能的。你需要借助 `paging mechanism`。你可能还记得上一章描述的搜索
    API 及其分页机制。坏消息是，在撰写本文时，搜索 API 不支持对象存储对象。好消息是，对象存储 `ListObjects` API 有其自己的分页机制，实际上比搜索
    API 中使用的机制稍简单一些。如果你决定使用 `limit` 参数，在响应中除了对象列表外，你还会收到 `next-start-with` 元素，它其实就是下一个对象的名称。在后续的每个查询中，你可以取前一个
    `next-start-with` 元素的值，并使用 `start` 参数来指示 API 从哪里开始列出元素，如以下代码片段所示：


    ```

    $ oci os object list -bn blueprints  --limit 5 --query ''{names:data[*].name,
    next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/bemowo/101.pdf",

    "waw/bemowo/102.pdf",

    "waw/bemowo/105.pdf",

    "waw/bemowo/107.pdf",

    "waw/bemowo/115.pdf"

    ],

    "next": "waw/wola/a/115.pdf"

    }

    $ oci os object list -bn blueprints  --limit 5 --start "waw/wola/a/115.pdf" --query
    ''{names:data[*].name, next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/wola/a/115.pdf",

    "waw/wola/a/120.pdf",

    "waw/wola/a/124.pdf",

    "waw/wola/a/130.pdf",

    "waw/wola/b/119.pdf"

    ],

    "next": "waw/wola/b/120.pdf"

    }

    $ oci os object list -bn blueprints  --limit 5 --start "waw/wola/b/120.pdf" --query
    ''{names:data[*].name, next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/wola/b/120.pdf",

    "waw/wola/b/121.pdf"

    ],

    "next": null

    }

    ```'
