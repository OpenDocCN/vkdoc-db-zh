    Kubernetes Pod。具体方法是：提供一个 YAML 描述文件，其中定义了包含单个容器的新 Pod 及其容器镜像。需要记住，我们为 `uuid:1.0`
    镜像使用了一个私有的 OCIR 仓库。从 OCIR 的角度看，OKE 集群只是另一个客户端，为了成功拉取镜像，它必须使用认证令牌进行验证。您可以将此令牌存储在
    Kubernetes 的 *secret* 类型对象中。这样，在创建需要从特定注册表中的一个或多个容器仓库拉取镜像的 Kubernetes Pod 时，您就可以引用这个
    secret。在我们这个例子中，secret 将封装区域性的 OCIR 端点、IAM 用户名和该用户的认证令牌。因此，Kubernetes 将只能从该特定
    IAM 用户有权访问的仓库中拉取镜像。


    为了创建单容器 Pod，我们将使用带有简单 YAML 描述文件的 `kubectl create` 命令。该过程的概念图见图 8-27。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig27_HTML.jpg](img/478313_1_En_8_Fig27_HTML.jpg)


    图 8-27


    #### 令牌与秘密


    在本节中，所有 `kubectl` 调用都将代表 `sandbox-user` 用户执行。为了简化输入，我们可以通过设置 `KUBECONFIG` 环境变量来覆盖默认的
    kubeconfig 路径。设置并导出该变量，使其指向属于 `sandbox-user` 用户的 kubeconfig 文件，如下所示：


    ```

    [opc@dev-vm]$ export KUBECONFIG=~/.kube/sandbox-user.config

    ```


    您将使用 `kubectl create secret` 命令在 `dev-sandbox` 命名空间中创建一个新的 Secret 对象。该 Secret
    对象将被命名为 `sandbox-user-secret`，类型为 `docker-registry`，并包含 Kubernetes 访问存储了 `uuid:1.0`
    容器镜像的 OCIR 私有仓库所需的所有信息，即：


    *   区域性 OCIR 注册表 URL

    *   IAM 用户

    *   该 IAM 用户的认证令牌


    我使用了 shell 变量，以便您在调整变量值后可以直接复制 `kubectl create secret` 命令。请记住，`OCIR_REGION` 变量使用
    OCIR 区域代码，`OCI_TENANCY_NAMESPACE` 使用您的租户命名空间，`OCI_USER_TOKEN` 使用为 `sandbox-user`
    用户生成的认证令牌。


    ```

    [opc@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk

    [opc@dev-vm]$ OCIR_REGION=fra

    [opc@dev-vm]$ OCI_USER=sandbox-user

    [opc@dev-vm]$ OCI_USER_TOKEN="B8.E_Ry7oOtN1KF0do9x"

    [opc@dev-vm]$ kubectl create secret docker-registry sandbox-user-secret --docker-server=$OCIR_REGION.ocir.io
    --docker-username="$OCI_TENANCY_NAMESPACE/$OCI_USER" --docker-password="$OCI_USER_TOKEN"
    -n dev-sandbox

    secret/sandbox-user-secret created

    ```


    Caution

    在使用 OCIR 时，请注意不要混淆 *租户名称* 和 *租户命名空间*。请确保用于获取 OCIR 访问权限的 Kubernetes secret 使用的是租户命名空间。


    我们可以像这样显示特定命名空间中存在的 secret：


    ```

    [opc@dev-vm]$ kubectl get secrets -n dev-sandbox

    NAME                 TYPE                               DATA  AGE

    default-token-wg574  kubernetes.io/service-account-token 3   3d1h

    sandbox-user-secret  kubernetes.io/dockerconfigjson      1    51s

    ```


    新创建的、类型为 `kubernetes.io/dockerconfigjson` 的 `sandbox-user-secret` 存储了以 `sandbox-user`
    用户身份访问 OCIR 所需的所有数据。


    现在，我们将基于 `uuid:1.0` 容器镜像创建一个单容器 Pod。您只需使用定义了新 Pod 的 `uuid-pod.yaml` 文件来执行 `kubectl
    create` 命令。不久前，您通过环境变量覆盖了默认的 kubeconfig 路径。这意味着所有 `kubectl` 命令都是作为 `sandbox-user`
    用户调用的。您必须在 `dev-sandbox` 命名空间中创建 Pod；否则操作将失败。像这样创建 Pod：


    ```

    [opc@dev-vm]$ cd oci-book/chapter08/3-kubernetes/platform

    [opc@dev-vm]$ sed -i "s/OCIR_REGION/$OCIR_REGION/; s/OCI_TENANCY_NAMESPACE/$OCI_TENANCY_NAMESPACE/"
    uuid-pod.yaml

    [opc@dev-vm]$ kubectl create -f uuid-pod.yaml -n dev-sandbox

    pod/uuid-pod created

    [opc@dev-vm]$ kubectl get pods -n dev-sandbox

    NAME       READY   STATUS    RESTARTS   AGE

    uuid-pod   1/1     Running   0          8s

    ```


    Tip

    如果您看到 `ErrorImagePull` 或 `ImagePullBackOff` 状态，而不是 `Running` 状态，则可能是令牌有问题。请确保在设置
    `OCI_USER_TOKEN` 变量时将令牌放在引号内。


    清单 8-13 展示了用于创建新 Pod 的 YAML 文件。`metadata` 部分用于将对象置于特定的命名空间并设置其名称。`spec` 部分包含容器定义以及拉取镜像时要使用的
    Secret 对象的名称。镜像名称引用了正确标记为 `uuid:1.0` 的容器镜像。我们使用 `sed` 命令将 YAML 文件中两个用大写字母表示的占位符替换为您的
    OCIR 区域和租户命名空间。


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    name: uuid-pod

    namespace: dev-sandbox

    spec:

    containers:

    - image: OCIR_REGION.ocir.io/OCI_TENANCY_NAMESPACE/sandbox/uuid:1.0

    name: uuid-container

    ports:

    - containerPort: 5000

    protocol: TCP

    imagePullSecrets:

    - name: sandbox-user-secret

    Listing 8-13

    uuid-pod.yaml

    ```


    坦率地说，单独一个 Pod 并不能给我们带来多少增值。我们知道它运行着一个 UUID API，但我们无法直接访问其端点。让我们删除这个 Pod。


    ```

    [opc@dev-vm]$ kubectl delete pod uuid-pod -n dev-sandbox

    pod "uuid-pod" deleted

    ```

    '
- fmt: '### Deployments and Services


    A containerized application is nearly always more than just a lonely single-container
    pod. Most containerized applications, especially those that are stateless, are
    expected to be able to scale horizontally and expose service endpoints to service
    consumers. A service consumer can be thought of as other containerized applications
    running in other pods within the same cluster or external systems or clients coming
    from the public Internet. To control and conveniently manage the service side
    of a set of pod clones, you will use the `Service` Kubernetes object. The `Service`
    object decouples somewhat the static side that represents a web service from the
    service implementation provided by a set of pods. One of the reasons for this
    is that pods can be scaled in and out dynamically. At the same time, the service
    side is supposed to remain unaltered to ease service discovery. Furthermore, the
    `Service` object is responsible for properly load balancing the incoming traffic.
    To manage operations on a set of pods such as the upgrade strategy and maintaining
    the number of healthy pods as expected, you will use the `Deployment` Kubernetes
    object. The `Deployment` object creates a `ReplicaSet` that keeps a steady number
    of identical pods and replaces these pods that enter the unhealthy state. Moreover,
    it is careful about the way containers are updated to the newer images by using
    various upgrade strategies. Figure [8-28](#478313_1_En_8_Chapter.xhtml#Fig28)
    illustrates a simple collaboration between these Kubernetes objects.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig28_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig28_HTML.jpg)


    Figure 8-28


    Stateless service on Kubernetes


    Assuming that you are still on development instance, the `KUBECONFIG` variable
    is set as earlier, and you are still in the `3-kubernetes/platform` directory
    and create a set of Kubernetes objects using the `kubectl create` command with
    `uuid-deployment.yaml` like this:


    ```

    [opc@dev-vm] $ sed -i "s/OCIR_REGION/$OCIR_REGION/; s/OCI_TENANCY_NAMESPACE/$OCI_TENANCY_NAMESPACE/"
    uuid-deployment.yaml

    [opc@dev-vm] $ kubectl create -f uuid-deployment.yaml -n dev-sandbox

    deployment.apps/uuid-dpm created

    service/uuid-srv created

    ```


    Listing [8-14](#478313_1_En_8_Chapter.xhtml#PC64) presents the file `uuid-deployment.yaml`
    file that creates the associated Kubernetes objects, namely, `Service`, `Deployment`,
    `ReplicaSet`, and `Pods` that host containers based on the `uuid:1.0` container
    image pulled from the tenancy’s OCIR. All pods are tagged with the `app=uuid`
    label. The `Service` object uses the tag-based selector `app:uuid` to learn where
    to route and distribute the traffic incoming from its dedicated Oracle Cloud Infrastructure
    load balancer. The load balancer is created dynamically if the type of the `Service`
    object is set to `LoadBalancer` .


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: uuid-dpm

    namespace: dev-sandbox

    spec:

    replicas: 2

    selector:

    matchLabels:

    app: uuid

    template:

    metadata:

    labels:

    app: uuid

    spec:

    imagePullSecrets:

    - name: sandbox-user-secret

    containers:

    - name: uuid-container

    image: OCIR_REGION.ocir.io/OCI_TENANCY_NAMESPACE/sandbox/uuid:1.0

    ports:

    - containerPort: 5000

    protocol: TCP


    apiVersion: v1

    kind: Service

    metadata:

    name: uuid-srv

    namespace: dev-sandbox

    spec:

    type: LoadBalancer

    selector:

    app: uuid

    ports:

    - port: 80

    targetPort: 5000

    Listing 8-14

    uuid-deployment.yaml

    ```


    You can use `kubectl get` commands to display the newly created objects.


    ```

    [opc@dev-vm]$ kubectl get pods -n dev-sandbox -o wide

    NAME                       READY STATUS   IP          NODE

    uuid-dpm-78cf484f96-rj4br  1/1   Running  10.244.1.7  10.0.2.2

    uuid-dpm-78cf484f96-wg2zw  1/1   Running  10.244.0.7  10.0.2.34

    [opc@dev-vm]$ kubectl get replicasets -n dev-sandbox

    NAME                  DESIRED   CURRENT   READY

    uuid-dpm-78cf484f96   2         2         2

    [opc@dev-vm]$ kubectl get services -n dev-sandbox

    NAME      TYPE          CLUSTER-IP   EXTERNAL-IP    PORT(S)

    uuid-srv  LoadBalancer  10.96.26.62  130.61.195.20  80:31475/TCP

    ```


    The newly created `Service` object is of the `LoadBalancer` type. This results
    in the provisioning of a new highly available public OCI load balancer that spans
    the two subnets you have set for cluster load balancers. The `EXTERNAL-IP` column
    shows the public IP address of the load balancer. If you see `Pending`, just wait
    a few moments. Your load balancer is being launched. In my case, the public IP
    address of the load balancer is 130.61.195.20, and your address probably will
    be different. Write it down. We will need it in a few moments. In the meantime,
    you can observe the load balancer in the OCI Console, as shown in Figure [8-29](#478313_1_En_8_Chapter.xhtml#Fig29).
    You may have to wait a few moments to see Overall Health set to `OK`. Sometimes,
    this flag is initially set to `Unknown` for a slightly longer period of time,
    even though the load balancer is fully operational. Figure [8-30](#478313_1_En_8_Chapter.xhtml#Fig30)
    shows the detailed view of the load balancer, including its shape, public IP address,
    VCN, and two public subnets you’ve chosen for load balancers, while launching
    your OKE cluster.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig30_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig30_HTML.jpg)


    Figure 8-30


    Kubernetes service load balancer details


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig29_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig29_HTML.jpg)


    Figure 8-29


    Kubernetes service load balancer


    If you are still on the developer instance, disconnect.


    ```

    [opc@dev-vm]$ exit

    ```


    Let’s send a series of identical requests to the external IP address of the service.
    You will have to replace the `LB_PUBLIC_IP` value with the IP address that has
    been assigned to your load balancer before running these commands:


    ```

    $ LB_PUBLIC_IP=130.61.195.20

    $ for i in {1..10}; do curl $LB_PUBLIC_IP:80/identifiers; done

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"a5bf.......d471"}

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"f2a4.......b902"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"564c.......1496"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"2473.......f7f9"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"9709.......bc47"}

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"cffd.......22d9"}

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"6bb3.......5285"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"6b02.......cafc"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"fdb5.......dcf7"}

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"ee94.......b038"}

    ```


    The `generator` field is populated based on the name of the pod that received
    the request. Looking at the results, you should see a rather equal split between
    the two pods that back our service. If you want, you could scale out the number
    of containerized application instances to dozens and even hundreds in a few seconds.


    What we have done with Oracle Kubernetes Engine in this chapter only scratches
    the surface of what can be done using the cloud-based managed Kubernetes. Feel
    free to experiment, and when you are ready to proceed to the next chapter, do
    not forget to terminate the cluster and developer instance to spare your resource
    consumption.'
