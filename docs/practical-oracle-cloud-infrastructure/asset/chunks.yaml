- fmt: 'The Dockerfile contains a list of instructions that are executed in a declared
    sequence. The first instruction is always the `FROM` instruction and defines the
    base image we want to use for the newly built image. As discussed earlier, we
    are going to leverage one of the offical Python images available in the Docker
    Hub image registry called `python:3-alpine`. The three subsequent `ENV` instructions
    set three environment variables used by the Flask microframework development web
    server. `FLASK_APP` points to the path of the API implementation, while `FLASK_ENV`
    and `FLASK_DEBUG` tune the output of the server. The `EXPOSE` instruction denotes
    port 5000, which is the default port used by the Flask server to listen for incoming
    requests. The role of this instruction is mainly informational because the port
    exposure is set only when you run containers. The `WORKDIR` instruction sets the
    working directory within the virtual container filesystem for the upcoming `COPY`,
    `RUN`, and `CMD` instructions. The first occurrence of the `COPY` instruction
    creates an image filesystem layer with the `requirements.txt` file copied from
    the developer machine. The `RUN` command executes the `pip install` command, which
    effectively installs the Flask microframework. The results are persisted as another
    filesystem layer. The second occurrence of the `COPY` command brings the `app.py`
    script to the container image as yet another filesystem layer. All in all, each
    instruction produces a filesystem layer. Some of these layers are temporary, while
    the others are included in the final container image. The very last instruction,
    namely, the `CMD` instruction, in contrast to the previous `RUN` instruction,
    is not executed and, in this way, does not produce any additional image layer
    that would be based on the results of the given command. The role of the `CMD`
    instruction is to tell the Docker engine what command to execute for each newly
    created container that will be launched using this image. In our case, every newly
    created container will basically execute the Flask microframework development
    web server using the `flask run` command. Consequently, the Flask server will
    expose the API implemented in the `app.py` file whose path is set in the `FLASK_APP`
    environment variable.


    To trigger the image build process, use the `docker build` command. The `-t` parameter
    sets the tag for the newly built image. Do not forget to include the dot sign
    at the end to instruct the `docker build` command to search for the Dockerfile
    in the current working directory.


    ```

    [opc@dev-vm]$ docker build -t uuid:1.0 .

