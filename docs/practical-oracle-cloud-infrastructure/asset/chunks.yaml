- fmt: 'Some software such as messaging platforms, enterprise application servers,
    or database engines are reported to be more stable and efficient on dedicated,
    physical hardware with no hypervisor-managed virtualization involved. You can
    host them on fewer, more powerful bare-metal hosts. In all other general-purpose
    use cases, you will probably use more virtual machines to leverage horizontal
    scaling.


    Note


    The bare-metal compute shapes family is deeply rooted in the origins of Oracle
    Cloud Infrastructure. OCI actually evolved from a bare-metal-oriented cloud offering
    called Oracle Bare Metal Cloud Service.


    Let me list just a few arbitrarily selected shapes that are offered at the time
    of writing.


    *   `VM.Standard2.1` is the smallest standard virtual machine shape that comes
    with 1 `OCPU` and 15GB of memory. It is powered by the X7 platform, which basically
    means that it is using Intel Xeon Skylake processors.


    *   `VM.Standard2.8` is another example of a standard virtual machine shape that
    offers 8 `OCPU`s and 120GB of memory.


    *   `BM.Standard2.52` is a standard bare-metal shape that leverages 52 `OCPU`s
    and 768GB of memory.


    *   `BM.Standard.E2.64` is a bare-metal shape that uses AMD EPYC processors with
    64 `OCPU`s and 512GB of memory.


    *   `BM.DenseIO2.52` is a bare-metal shape dedicated to I/O-intensive workloads
    that are present in big data projects. It is backed with locally attached SSD
    NVMe drives that offer 51.2TB of storage capacity.


    *   `BM.GPU3.8` is a bare-metal shape intended to power machine learning processes
    and high-performance computing (HPC) software. In addition to 52 `OCPU`s and 768GB
    of memory, its real capacity comes from eight Nvidia Tesla V100 GPUs.


    In the preceding list, I used a new abbreviation. An `Oracle compute unit` (`OCPU`)
    is a logical term and the most important metric for compute-related billings.
    You usually pay for 1 `OCPU`/hour. In other words, one hour of a running instance
    with 8 `OCPU`s will generate the same compute-related cost as an instance with
    just 1 `OCPU` running for eight hours.


    In the case of Intel-based shapes, a single `OCPU` corresponds to a single, physical
    Intel Xeon core. The operating system actually sees two virtual cores for each
    physical CPU core because of hyperthreading technology. To sum up, one Intel-based
    `OCPU` means one physical CPU core and the capability of two nearly parallel execution
    threads, sometimes called vCPUs.


    You can easily guess that our first choice related to compute instances is the
    selection of a shape for the nodes that will host the UUID service application.
    We are going to use the smallest virtual machine available: `VM.Standard2.1`.


    An `image` is a template that specifies the operating system and any additional
    software that has to be preinstalled during the instance launch. An `image` is
    used to initiate a new boot volume that a compute instance uses. A boot volume
    remains associated with its compute instance until termination. A boot volume
    can be seen as the primary storage that an instance uses, mainly for its operating
    system and software.


    Oracle-provided images are periodically updated and receive new versions. Yet,
    as soon as you launch an instance, it becomes your responsibility to schedule
    regular system updates.


    At the time of writing, Oracle Cloud Infrastructure provides four types of base
    operating system images with the following operating systems:


    *   Oracle Linux


    *   CentOS


    *   Ubuntu


    *   Windows Server


    In your daily work, you may end up creating a lot of custom images that add the
    required software, services, or scheduled scripts to the base image of your choice.
    It is also possible to import custom images that are not built on the available
    base images. In this case, you would use either paravirtualization or emulation
    on a virtual machine shape. Yet, the easiest way to create custom images is to
    rely on the base images provided by Oracle.


    What about making another decision? We will use the newest Oracle Linux base image:
    `Oracle Linux 7.6`. You will probably use newer minor versions of `Oracle Linux
    7` as they appear in the future.


    Note


    Although the screenshots will show `Oracle Linux 7.6`, the exercises in this chapter
    were additionally tested with an `Oracle Linux 7.7` image.


    We will now move to the last step in our planning process.


    ### Service Limits


    You might wonder what would happen if too many tenants (cloud customers) launched
    a large number of the most powerful bare-metal shapes in the same region at once.
    The number of these machines is surely limited even in the largest data center,
    isn’t it? Well, sure, it is. This is where the smart idea of service limits (also
    known as `quotas`) comes into play.


    Every cloud account has a set of service limits that define how many resources
    of which type are allowed to be running at the same time. If you see that your
    current limits are insufficient for your needs, you can request them to be increased
    simply by raising a service request. This helps Oracle to plan and optimize data
    center capacity. Simple and wise, isn’t it?


    Tip


    You can always verify your usage against the current service limits for your cloud
    account in the OCI Console. Just go to `Menu ➤ Governance ➤ Limits, Quotas and
    Usage`.


    Verifying and optionally increasing the service limits before launching a new
    cloud project should be included in your checklist for the planning phase.


    The sample cloud solution we are working on in this chapter will include the following
    OCI resources:


    *   One VCN


    *   Two `VM.Standard2.1` compute instances


    *   One load balancer (100Mbps)


    *   One custom image


    *   Negligibly small size of block storage


    If you are using a new trial account and haven’t created any resources yet, you
    can be pretty sure that your default trial account service limits won’t be violated.


    If you are using a paid account that already contains some OCI resources, please
    go to `Menu ➤ Governance ➤ Limits, Quotas and Usage` in the OCI Console and check
    if you can add the ones I’ve just listed . You may also need to ask your cloud
    administrator to give you the numbers, if your OCI IAM user is not entitled to
    see the service limits.


    What we’ve been doing until now was pure planning that was backed with some elementary
    Oracle Cloud Infrastructure concepts discussion. We began with looking at the
    application and mapped it to the cloud resources we would need. We are ready to
    provision these resources.'
  raw: 'Some software such as messaging platforms, enterprise application servers,
    or database engines are reported to be more stable and efficient on dedicated,
    physical hardware with no hypervisor-managed virtualization involved. You can
    host them on fewer, more powerful bare-metal hosts. In all other general-purpose
    use cases, you will probably use more virtual machines to leverage horizontal
    scaling.


    Note


    The bare-metal compute shapes family is deeply rooted in the origins of Oracle
    Cloud Infrastructure. OCI actually evolved from a bare-metal-oriented cloud offering
    called Oracle Bare Metal Cloud Service.


    Let me list just a few arbitrarily selected shapes that are offered at the time
    of writing.


    *   **VM.Standard2.1** is the smallest standard virtual machine shape that comes
    with 1 OCPU and 15GB of memory. It is powered by the X7 platform, which basically
    means that it is using Intel Xeon Skylake processors.


    *   **VM.Standard2.8** is another example of a standard virtual machine shape
    that offers 8 OCPUs and 120GB of memory.


    *   **BM.Standard2.52** is a standard bare-metal shape that leverages 52 OCPUs
    and 768GB of memory.


    *   **BM.Standard.E2.64** is a bare-metal shape that uses AMD EPYC processors
    with 64 OCPUs and 512GB of memory.


    *   **BM.DenseIO2.52** is a bare-metal shape dedicated to I/O-intensive workloads
    that are present in big data projects. It is backed with locally attached SSD
    NVMe drives that offer 51.2TB of storage capacity.


    *   **BM.GPU3.8** is a bare-metal shape intended to power machine learning processes
    and high-performance computing (HPC) software. In addition to 52 OCPUs and 768GB
    of memory, its real capacity comes from eight Nvidia Tesla V100 GPUs.


    In the preceding list, I used a new abbreviation. An *Oracle compute unit* (OCPU)
    is a logical term and the most important metric for compute-related billings.
    You usually pay for 1 OCPU/hour. In other words, one hour of a running instance
    with 8 OCPUs will generate the same compute-related cost as an instance with just
    1 OCPU running for eight hours.


    In the case of Intel-based shapes, a single OCPU corresponds to a single, physical
    Intel Xeon core. The operating system actually sees two virtual cores for each
    physical CPU core because of hyperthreading technology. To sum up, one Intel-based
    OCPU means one physical CPU core and the capability of two nearly parallel execution
    threads, sometimes called vCPUs.


    You can easily guess that our first choice related to compute instances is the
    selection of a shape for the nodes that will host the UUID service application.
    We are going to use the smallest virtual machine available: VM.Standard2.1.


    An *image* is a template that specifies the operating system and any additional
    software that has to be preinstalled during the instance launch. An image is used
    to initiate a new boot volume that a compute instance uses. A boot volume remains
    associated with its compute instance until termination. A boot volume can be seen
    as the primary storage that an instance uses, mainly for its operating system
    and software.


    Oracle-provided images are periodically updated and receive new versions. Yet,
    as soon as you launch an instance, it becomes your responsibility to schedule
    regular system updates.


    At the time of writing, Oracle Cloud Infrastructure provides four types of base
    operating system images with the following operating systems:


    *   Oracle Linux


    *   CentOS


    *   Ubuntu


    *   Windows Server


    In your daily work, you may end up creating a lot of custom images that add the
    required software, services, or scheduled scripts to the base image of your choice.
    It is also possible to import custom images that are not built on the available
    base images. In this case, you would use either paravirtualization or emulation
    on a virtual machine shape. Yet, the easiest way to create custom images is to
    rely on the base images provided by Oracle.


    What about making another decision? We will use the newest Oracle Linux base image:
    Oracle Linux 7.6\. You will probably use newer minor versions of Oracle Linux
    7 as they appear in the future.


    Note


    Although the screenshots will show Oracle Linux 7.6, the exercises in this chapter
    were additionally tested with an Oracle Linux 7.7 image.


    We will now move to the last step in our planning process.


    ### Service Limits


    You might wonder what would happen if too many tenants (cloud customers) launched
    a large number of the most powerful bare-metal shapes in the same region at once.
    The number of these machines is surely limited even in the largest data center,
    isn’t it? Well, sure, it is. This is where the smart idea of service limits (also
    known as *quotas*) comes into play.


    Every cloud account has a set of service limits that define how many resources
    of which type are allowed to be running at the same time. If you see that your
    current limits are insufficient for your needs, you can request them to be increased
    simply by raising a service request. This helps Oracle to plan and optimize data
    center capacity. Simple and wise, isn’t it?


    Tip


    You can always verify your usage against the current service limits for your cloud
    account in the OCI Console. Just go to Menu ➤ Governance ➤ Limits, Quotas and
    Usage.


    Verifying and optionally increasing the service limits before launching a new
    cloud project should be included in your checklist for the planning phase.


    The sample cloud solution we are working on in this chapter will include the following
    OCI resources:


    *   One VCN


    *   Two VM.Standard2.1 compute instances


    *   One load balancer (100Mbps)


    *   One custom image


    *   Negligibly small size of block storage


    If you are using a new trial account and haven’t created any resources yet, you
    can be pretty sure that your default trial account service limits won’t be violated.


    If you are using a paid account that already contains some OCI resources, please
    go to Menu ➤ Governance ➤ Limits, Quotas and Usage in the OCI Console and check
    if you can add the ones I’ve just listed . You may also need to ask your cloud
    administrator to give you the numbers, if your OCI IAM user is not entitled to
    see the service limits.


    What we’ve been doing until now was pure planning that was backed with some elementary
