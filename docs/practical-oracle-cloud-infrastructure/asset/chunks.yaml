- fmt: "### Custom Image\n\n一个`image`是一个模板，指定了操作系统以及在实例启动期间必须预安装的任何附加软件。Oracle Cloud\
    \ Infrastructure 附带了一些包含不同操作系统的基础镜像。您可以基于选定的操作系统镜像配置一个实例，安装您选择的软件，执行一些额外的配置，并基于此实例创建一个新的`custom\
    \ image`。通过这种方式，您将能够重用您的自定义软件栈配置来启动其他计算实例。\n\n如果您有一个正在运行的计算实例，您可以基于该实例创建一个新的自定义镜像。图\
    \ 2-36 显示了您可以在计算实例上执行的操作。其中之一是“创建自定义镜像”。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig36_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig36_HTML.jpg)\n\
    \n图 2-36\n\n可用的计算实例操作\n\n以下是您如何基于现有的计算实例创建新的自定义镜像：\n\n1.  转到`Menu ➤ Compute ➤\
    \ Instances`。\n2.  确保选择了`Sandbox` compartment。\n3.  单击我们的计算实例的名称。\n4.  单击`Actions\
    \ ➤ Create Custom Image`以打开自定义镜像向导。\n5.  为您的新自定义镜像提供一个名称。\n6.  单击`Create Custom\
    \ Image`。\n\n    Tip 考虑在您的自定义镜像名称后附加用于创建该自定义镜像的原始镜像的名称。\n\n图 2-37 显示了 OCI 控制台中的自定义镜像创建向导。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig37_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig37_HTML.jpg)\n\
    \n图 2-37\n\n在 OCI 控制台中查看自定义镜像创建向导\n\n如果您决定基于某个特定的计算实例创建自定义镜像，在构建镜像期间，该实例将被离线。镜像创建完成后，计算实例将再次启动。\n\
    \n图 2-38 显示了在创建镜像时，作为新自定义镜像基础的计算实例。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig38_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig38_HTML.jpg)\n\
    \n图 2-38\n\n在 OCI 控制台实例列表中创建自定义镜像\n\n图 2-39 显示了正在创建中的新自定义镜像。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig39_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig39_HTML.jpg)\n\
    \n图 2-39\n\n在 OCI 控制台镜像列表中创建自定义镜像\n\n我们将使用新创建的自定义镜像来启动第二个运行 UUID 服务 API 的实例。为了实现容错，我们将在不同的可用性域中部署第二个节点。让我们按照计划在第二个可用性域中创建一个新的子网。\n\
    \n### 不同可用性域中的子网\n\n我们将遵循几节前创建第一个子网时的相同步骤顺序。为了简单起见，我们将重用第一个子网正在使用的相同路由表和安全列表。\n\
    \n以下是您如何使用 OCI 控制台创建一个新的 VCN 子网：\n\n1.  转到`Menu ➤ Networking ➤ Virtual Cloud Networks`。\n\
    2.  确保选择了`Sandbox` compartment。\n3.  单击您的 VCN 的名称。\n4.  在“资源”菜单中单击`Subnets`。\n\
    5.  单击`Create Subnet`。\n6.  提供所需的值：\n    1.  输入`b-net`作为显示名称。\n    2.  选择“可用性域特定子网类型”。\n\
    \    3.  在您的区域中选择第二个可用性域（后缀为 AD-2）。\n    4.  填入`192.168.1.16/28`作为 CIDR 块。\n \
    \   5.  确保选择了默认路由表。\n    6.  选择“公共子网”选项。\n    7.  选择“在此子网中使用 DNS 主机名”。\n    8.\
    \  使用一个字符的简短标签`b`作为 DNS 标签。\n    9.  确保选择了默认 DHCP 选项设置。\n    10. 确保选择了默认安全列表。\n\
    7.  单击`Create`。\n\n在此阶段，您应该能够在两个不同的可用性域中看到两个子网，如图 2-40 所示。请注意，每个子网都位于不同的可用性域中。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig40_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig40_HTML.jpg)\n\
    \n图 2-40\n\n在 OCI 控制台中显示的两个不同可用性域中的两个子网\n\n现在，我们将在这个新创建的子网中创建第二个 UUID 服务 API 实例。"
  raw: "### Custom Image\n\nAn *image* is a template that specifies the operating\
    \ system and any additional software that has to be preinstalled during the instance\
    \ launch. Oracle Cloud Infrastructure comes with a few base images with various\
    \ operating systems. You can provision an instance based on a selected operating\
    \ system image, install the software of your choice, perform some additional configuration,\
    \ and create a new *custom image* based on this instance. In this way, you will\
    \ be able to reuse your custom software stack configuration to launch other compute\
    \ instances.\n\nIf you have a running compute instance, you are able to create\
    \ a new custom image based on that instance. Figure [2-36](#478313_1_En_2_Chapter.xhtml#Fig36)\
    \ shows operations you can issue on a compute instance. One of them is Create\
    \ Custom Image.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig36_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig36_HTML.jpg)\n\
    \nFigure 2-36\n\nAvailable compute instance operations\n\nThis is how you create\
    \ a new custom image based on an existing compute instance:\n\n1.  Go to Menu\
    \ ➤ Compute ➤ Instances.\n\n2.  Make sure that the `Sandbox` compartment is selected.\n\
    \n3.  Click the name of our compute instance.\n\n4.  Click Actions ➤ Create Custom\
    \ Image to open a custom image wizard.\n\n5.  Provide a name for your new custom\
    \ image.\n\n6.  Click Create Custom Image.\n\n    **Tip** Consider suffixing your\
    \ custom image name with the name of the original image used to create the custom\
    \ image.\n\nFigure [2-37](#478313_1_En_2_Chapter.xhtml#Fig37) shows the custom\
    \ image creation wizard in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig37_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig37_HTML.jpg)\n\
    \nFigure 2-37\n\nViewing the custom image creation wizard in the OCI Console\n\
    \nIf you decide to create a custom image based on a particular compute instance,\
    \ this instance will be taken offline for the time it takes to build the image.\
    \ As soon as the image has been created, the compute instance will be started\
    \ again.\n\nFigure [2-38](#478313_1_En_2_Chapter.xhtml#Fig38) shows the compute\
    \ instance that serves as a base for a new custom image while the image is created.\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig38_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig38_HTML.jpg)\n\
    \nFigure 2-38\n\nCreating a custom image in the OCI Console instances list\n\n\
    Figure [2-39](#478313_1_En_2_Chapter.xhtml#Fig39) shows a new custom image while\
    \ it is being created.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig39_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig39_HTML.jpg)\n\
    \nFigure 2-39\n\nCreating a custom image in the OCI Console images list\n\nWe\
    \ are going to use the newly created custom image to launch a second instance\
    \ that runs the UUID service API. To achieve fault tolerance, we will deploy the\
    \ second node in a different availability domain. Let’s create a new subnet in\
    \ the second availability domain exactly as we planned.\n\n### Subnet in a Different\
    \ AD\n\nWe will follow the same sequence of steps we did a few sections earlier\
    \ when we created the first subnet. To keep things simple, we will reuse the same\
    \ route table and security list that are in use by the first subnet.\n\nThis is\
    \ how you create a new VCN subnet using the OCI Console:\n\n1.  Go to Menu ➤ Networking\
    \ ➤ Virtual Cloud Networks.\n\n2.  Make sure that the `Sandbox` compartment is\
    \ selected.\n\n3.  Click the name of your VCN.\n\n4.  Click Subnets in the Resources\
    \ menu.\n\n5.  Click Create Subnet.\n\n6.  Provide the required values:\n    1.\
    \  Enter **b-net** as a display name.\n\n    2.  Choose Availability Domain-specific\
    \ Subnet Type.\n\n    3.  Select the second availability domain (suffixed AD-2)\
    \ in your region.\n\n    4.  Place `192.168.1.16/28` as the CIDR block.\n\n  \
    \  5.  Make sure that the default route table is chosen.\n\n    6.  Select the\
    \ Public Subnet option.\n\n    7.  Select Use DNS Hostnames in this subnet.\n\n\
    \    8.  Use a short one-character label **b** as a DNS label.\n\n    9.  Make\
    \ sure that the default DHCP Options setting is chosen.\n\n    10.  Make sure\
    \ that the default security list is chosen.\n\n7.  Click Create.\n\nAt this stage,\
    \ you should be able to see two subnets in two different availability domains,\
    \ as shown in Figure [2-40](#478313_1_En_2_Chapter.xhtml#Fig40). Please note that\
    \ each subnet resides in a different availability domain.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig40_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig40_HTML.jpg)\n\
    \nFigure 2-40\n\nTwo subnets in two different ADs shown in the OCI Console\n\n\
    Now, we will create a second UUID service API instance in this newly created subnet."
  trans: "\n### 自定义镜像\n\n一个`image`（镜像）是一个模板，指定了操作系统以及在实例启动期间必须预安装的任何附加软件。Oracle Cloud\
    \ Infrastructure 附带了一些包含不同操作系统的基础镜像。您可以基于选定的操作系统镜像配置一个实例，安装您选择的软件，执行一些额外的配置，并基于此实例创建一个新的`custom\
    \ image`（自定义镜像）。通过这种方式，您将能够重用您的自定义软件栈配置来启动其他计算实例。\n\n如果您有一个正在运行的计算实例，您可以基于该实例创建一个新的自定义镜像。图\
    \ 2-36 显示了您可以在计算实例上执行的操作。其中之一是“创建自定义镜像”。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig36_HTML.jpg](img/478313_1_En_2_Fig36_HTML.jpg)\n\
    \n图 2-36\n\n可用的计算实例操作\n\n以下是您如何基于现有的计算实例创建新的自定义镜像：\n\n1.  转到`Menu ➤ Compute ➤\
    \ Instances`（菜单 ➤ 计算 ➤ 实例）。\n2.  确保选择了`Sandbox` compartment（ compartment）。\n3.\
    \  单击我们的计算实例的名称。\n4.  单击`Actions ➤ Create Custom Image`（操作 ➤ 创建自定义镜像）以打开自定义镜像向导。\n\
    5.  为您的新自定义镜像提供一个名称。\n6.  单击`Create Custom Image`（创建自定义镜像）。\n\n    Tip 考虑在您的自定义镜像名称后附加用于创建该自定义镜像的原始镜像的名称。\n\
    \n图 2-37 显示了 OCI 控制台中的自定义镜像创建向导。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig37_HTML.jpg](img/478313_1_En_2_Fig37_HTML.jpg)\n\
    \n图 2-37\n\n在 OCI 控制台中查看自定义镜像创建向导\n\n如果您决定基于某个特定的计算实例创建自定义镜像，在构建镜像期间，该实例将被离线。镜像创建完成后，计算实例将再次启动。\n\
    \n图 2-38 显示了在创建镜像时，作为新自定义镜像基础的计算实例。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig38_HTML.jpg](img/478313_1_En_2_Fig38_HTML.jpg)\n\
    \n图 2-38\n\n在 OCI 控制台实例列表中创建自定义镜像\n\n图 2-39 显示了正在创建中的新自定义镜像。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig39_HTML.jpg](img/478313_1_En_2_Fig39_HTML.jpg)\n\
    \n图 2-39\n\n在 OCI 控制台镜像列表中创建自定义镜像\n\n我们将使用新创建的自定义镜像来启动第二个运行 UUID 服务 API 的实例。为了实现容错，我们将在不同的可用性域中部署第二个节点。让我们按照计划在第二个可用性域中创建一个新的子网。\n\
    \n### 不同可用性域中的子网\n\n我们将遵循几节前创建第一个子网时的相同步骤顺序。为了简单起见，我们将重用第一个子网正在使用的相同路由表和安全列表。\n\
    \n以下是您如何使用 OCI 控制台创建一个新的 VCN 子网：\n\n1.  转到`Menu ➤ Networking ➤ Virtual Cloud Networks`（菜单\
    \ ➤ 网络 ➤ 虚拟云网络）。\n2.  确保选择了`Sandbox` compartment（ compartment）。\n3.  单击您的 VCN\
    \ 的名称。\n4.  在“资源”菜单中单击`Subnets`（子网）。\n5.  单击`Create Subnet`（创建子网）。\n6.  提供所需的值：\n\
    \    1.  输入`b-net`作为显示名称。\n    2.  选择“可用性域特定子网类型”。\n    3.  在您的区域中选择第二个可用性域（后缀为\
    \ AD-2）。\n    4.  填入`192.168.1.16/28`作为 CIDR 块。\n    5.  确保选择了默认路由表。\n    6. \
    \ 选择“公共子网”选项。\n    7.  选择“在此子网中使用 DNS 主机名”。\n    8.  使用一个字符的简短标签`b`作为 DNS 标签。\n\
    \    9.  确保选择了默认 DHCP 选项设置。\n    10. 确保选择了默认安全列表。\n7.  单击`Create`（创建）。\n\n在此阶段，您应该能够在两个不同的可用性域中看到两个子网，如图\
    \ 2-40 所示。请注意，每个子网都位于不同的可用性域中。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig40_HTML.jpg](img/478313_1_En_2_Fig40_HTML.jpg)\n\
    \n图 2-40\n\n在 OCI 控制台中显示的两个不同可用性域中的两个子网\n\n现在，我们将在这个新创建的子网中创建第二个 UUID 服务 API 实例。\n"
- fmt: "## Second Compute Instance\n\nThe second compute instance will run the same\
    \ systemd service that runs on the first compute instance. This time, we won’t\
    \ upload any user data because everything has already been set up in the image\
    \ we created from the first compute instance. Figure [2-41](#478313_1_En_2_Chapter.xhtml#Fig41)\
    \ shows the image selection screen and the choice you have to make this time.\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig41_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig41_HTML.jpg)\n\
    *Figure 2-41: Choosing a custom image in the OCI Console*\n\nThis is how you create\
    \ the second compute instance using the OCI Console:\n\n1.  Go to `Menu ➤ Compute\
    \ ➤ Instances`.\n2.  Make sure that the `Sandbox` compartment is selected.\n3.\
    \  Click `Create Instance`.\n4.  Provide the required details:\n    1.  Name your\
    \ instance `uuid-2`.\n    2.  Select the second availability domain in your region.\n\
    \    3.  Set the image source to the newly created custom image; in my case, its\
    \ name starts with `UUID-API-Oracle-Linux-`.\n    4.  Set the instance type to\
    \ `Virtual Machine`.\n    5.  Select `VM.Standard2.1` as your instance shape.\n\
    5.  In the `Configure Networking` section:\n    1.  Make sure your new `b-net`\
    \ subnet is selected.\n    2.  Select `Assign a Public IP Address`.\n6.  In the\
    \ `Add SSH Key` section:\n    1.  Choose the public key (`oci_id_rsa.pub`), as\
    \ shown in Figure [2-21](#478313_1_En_2_Chapter.xhtml#Fig21).\n7.  Click `Show\
    \ Advanced Options`.\n8.  On the `Networking` tab under `Advanced Options`, as\
    \ shown in Figure [2-24](#478313_1_En_2_Chapter.xhtml#Fig24):\n    1.  Set `Private\
    \ IP Address` to `192.168.1.18`.\n    2.  Set `Hostname` to `uuid2`.\n9.  Click\
    \ `Create`.\n\n**Note** In this case, there is no need to upload the `cloud-config`\
    \ user data. The custom image comes with the preinstalled UUID API service because\
    \ it was created based on the `uuid-1` compute instance. Leave the `User Data`\
    \ section empty.\n\nFigure [2-42](#478313_1_En_2_Chapter.xhtml#Fig42) shows the\
    \ instance creation view in the OCI Console. Please note that this time we are\
    \ using the second availability domain and custom image.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig42_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig42_HTML.jpg)\n\
    *Figure 2-42: Creating the second compute instance in the OCI Console*\n\nFigure\
    \ [2-43](#478313_1_En_2_Chapter.xhtml#Fig43) shows the advanced networking section.\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig43_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig43_HTML.jpg)\n\
    *Figure 2-43: Configuring advanced networking in OCI Console instance creation\
    \ wizard*\n\nAs soon as you confirm the parameter choices for the second instance\
    \ by clicking the `Create` button in instance creation wizard in the OCI Console,\
    \ the provisioning process will begin. This time, the UUID service will be already\
    \ preinstalled with the custom image, and no long-running user data is involved.\
    \ As a result, the second instance should boot faster. Let’s wait until we see\
    \ that the instance is running, as shown in Figure [2-44](#478313_1_En_2_Chapter.xhtml#Fig44).\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig44_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig44_HTML.jpg)\n\
    *Figure 2-44: Viewing the second running compute instance in the OCI Console*\n\
    \nYou can now test the API on both nodes. Please remember to replace the public\
    \ IP addresses and use the ones that have been assigned to your instances in both\
    \ cases.\n\n```bash\n$ UUID2_INSTANCE=130.61.23.13\n$ curl $UUID1_INSTANCE:5000/identifiers\n\
    {\n\"generator\":\"uuid1\",\n\"uuid\":\"bc85b59f-cf0f-4035-a730-c25111db00ec\"\
    \n}\n$ curl $UUID2_INSTANCE:5000/identifiers\n{\n\"generator\":\"uuid2\",\n\"\
    uuid\":\"6eca06e0-65f2-444b-acb8-b9c46741dc72\"\n}\n```\n\nFigure [2-45](#478313_1_En_2_Chapter.xhtml#Fig45)\
    \ shows that two instances are operative.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig45_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig45_HTML.jpg)\n\
    *Figure 2-45: Testing two nodes of the UUID service API*\n\nIn this section, we\
    \ deployed and tested the second node that runs our application. Figure [2-46](#478313_1_En_2_Chapter.xhtml#Fig46)\
    \ presents the current application infrastructure using Oracle Cloud Infrastructure\
    \ notation.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig46_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig46_HTML.jpg)\n\
    *Figure 2-46: Two nodes of the UUID API on the infrastructure diagram*\n\nThe\
    \ current setup has one major pain point. The API consumers (in other words, applications\
    \ that invoke the API) have to explicitly specify the public IP address of a particular\
    \ virtual machine. With this approach, the more you scale the API out, the more\
    \ unrelated endpoints with different public IP addresses you produce. This is\
    \ not the best way to design a highly available solution. Luckily, we can change\
    \ it by adding a load balancer."
  raw: "### Second Compute Instance\n\nThe second compute instance will run the same\
    \ systemd service that runs on the first compute instance. This time, we won’t\
    \ upload any user data because everything has already been set up in the image\
    \ we created from the first compute instance. Figure [2-41](#478313_1_En_2_Chapter.xhtml#Fig41)\
    \ shows the image selection screen and the choice you have to make this time.\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig41_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig41_HTML.jpg)\n\
    \nFigure 2-41\n\nChoosing a custom image in the OCI Console\n\nThis is how you\
    \ create the second compute instance using the OCI Console:\n\n1.  Go to Menu\
    \ ➤ Compute ➤ Instances.\n\n2.  Make sure that the `Sandbox` compartment is selected.\n\
    \n3.  Click Create Instance.\n\n4.  Provide the required details:\n    1.  Name\
    \ your instance **uuid-2**.\n\n2.  Select the second availability domain in your\
    \ region.\n\n3.  Set the image source to the newly created custom image; in my\
    \ case, its name starts with `UUID-API-Oracle-Linux-`.\n\n4.  Set the instance\
    \ type to Virtual Machine.\n\n5.  Select VM.Standard2.1 as your instance shape.\n\
    \n5.  In the Configure Networking section:\n    1.  Make sure your new b-net subnet\
    \ is selected.\n\n2.  Select Assign a Public IP Address.\n\n6.  In the Add SSH\
    \ Key section:\n    1.  Choose the public key (oci_id_rsa.pub), as shown in Figure\
    \ [2-21](#478313_1_En_2_Chapter.xhtml#Fig21).\n\n7.  Click Show Advanced Options.\n\
    \n8.  On the Networking tab under Advanced Options, as shown in Figure [2-24](#478313_1_En_2_Chapter.xhtml#Fig24):\n\
    \    1.  Set Private IP Address to **192.168.1.18**.\n\n2.  Set Hostname to **uuid2**.\n\
    \n9.  Click Create.\n\n**Note** In this case, there is no need to upload the cloud-config\
    \ user data. The custom image comes with the preinstalled UUID API service because\
    \ it was created based on the `uuid-1` compute instance. Leave the User Data section\
    \ empty.\n\nFigure [2-42](#478313_1_En_2_Chapter.xhtml#Fig42) shows the instance\
    \ creation view in the OCI Console. Please note that this time we are using the\
    \ second availability domain and custom image.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig42_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig42_HTML.jpg)\n\
    \nFigure 2-42\n\nCreating the second compute instance in the OCI Console\n\nFigure\
    \ [2-43](#478313_1_En_2_Chapter.xhtml#Fig43) shows the advanced networking section.\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig43_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig43_HTML.jpg)\n\
    \nFigure 2-43\n\nConfiguring advanced networking in OCI Console instance creation\
    \ wizard\n\nAs soon as you confirm the parameter choices for the second instance\
    \ by clicking the Create button in instance creation wizard in the OCI Console,\
    \ the provisioning process will begin. This time, the UUID service will be already\
    \ preinstalled with the custom image, and no long-running user data is involved.\
    \ As a result, the second instance should boot faster. Let’s wait until we see\
    \ that the instance is running, as shown in Figure [2-44](#478313_1_En_2_Chapter.xhtml#Fig44).\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig44_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig44_HTML.jpg)\n\
    \nFigure 2-44\n\nViewing the second running compute instance in the OCI Console\n\
    \nYou can now test the API on both nodes. Please remember to replace the public\
    \ IP addresses and use the ones that have been assigned to your instances in both\
    \ cases.\n\n```\n$ UUID2_INSTANCE=130.61.23.13\n$ curl $UUID1_INSTANCE:5000/identifiers\n\
    {\n\"generator\":\"uuid1\",\n\"uuid\":\"bc85b59f-cf0f-4035-a730-c25111db00ec\"\
    \n}\n$ curl $UUID2_INSTANCE:5000/identifiers\n{\n\"generator\":\"uuid2\",\n\"\
    uuid\":\"6eca06e0-65f2-444b-acb8-b9c46741dc72\"\n}\n```\n\nFigure [2-45](#478313_1_En_2_Chapter.xhtml#Fig45)\
    \ shows that two instances are operative.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig45_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig45_HTML.jpg)\n\
    \nFigure 2-45\n\nTesting two nodes of the UUID service API\n\nIn this section,\
    \ we deployed and tested the second node that runs our application. Figure [2-46](#478313_1_En_2_Chapter.xhtml#Fig46)\
    \ presents the current application infrastructure using Oracle Cloud Infrastructure\
    \ notation.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig46_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig46_HTML.jpg)\n\
    \nFigure 2-46\n\nTwo nodes of the UUID API on the infrastructure diagram\n\nThe\
    \ current setup has one major pain point. The API consumers (in other words, applications\
    \ that invoke the API) have to explicitly specify the public IP address of a particular\
    \ virtual machine. With this approach, the more you scale the API out, the more\
    \ unrelated endpoints with different public IP addresses you produce. This is\
    \ not the best way to design a highly available solution. Luckily, we can change\
    \ it by adding a load balancer."
  trans: "\n## 第二个计算实例\n\n第二个计算实例将运行与第一个计算实例上相同的 systemd 服务。这次，我们不会上传任何用户数据，因为所有内容都已配置在我们从第一个计算实例创建的镜像中。图\
    \ 2-41 展示了镜像选择屏幕以及此次你需要做出的选择。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig41_HTML.jpg](img/478313_1_En_2_Fig41_HTML.jpg)\n\
    *图 2-41：在 OCI 控制台中选择自定义镜像*\n\n以下是使用 OCI 控制台创建第二个计算实例的步骤：\n\n1.  导航到 `菜单 ➤ 计算 ➤\
    \ 实例`。\n2.  确保已选择 `Sandbox` 隔区。\n3.  点击 `创建实例`。\n4.  提供所需详细信息：\n    1.  将实例命名为\
    \ `uuid-2`。\n    2.  选择您区域中的第二个可用性域。\n    3.  将镜像源设置为新创建的自定义镜像；在我的例子中，其名称以 `UUID-API-Oracle-Linux-`\
    \ 开头。\n    4.  将实例类型设置为 `虚拟机`。\n    5.  选择 `VM.Standard2.1` 作为您的实例形状。\n5.  在 `配置网络`\
    \ 部分：\n    1.  确保选择了新的 `b-net` 子网。\n    2.  选择 `分配公网 IP 地址`。\n6.  在 `添加 SSH 密钥`\
    \ 部分：\n    1.  选择公钥（`oci_id_rsa.pub`），如图 2-21 所示。\n7.  点击 `显示高级选项`。\n8.  在 `高级选项`\
    \ 下的 `网络` 选项卡中，如图 2-24 所示：\n    1.  将 `私有 IP 地址` 设置为 `192.168.1.18`。\n    2. \
    \ 将 `主机名` 设置为 `uuid2`。\n9.  点击 `创建`。\n\n**注意** 在这种情况下，无需上传 `cloud-config` 用户数据。自定义镜像已预装了\
    \ UUID API 服务，因为它是在 `uuid-1` 计算实例的基础上创建的。请将 `用户数据` 部分留空。\n\n图 2-42 展示了 OCI 控制台中的实例创建视图。请注意，这次我们使用的是第二个可用性域和自定义镜像。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig42_HTML.jpg](img/478313_1_En_2_Fig42_HTML.jpg)\n\
    *图 2-42：在 OCI 控制台中创建第二个计算实例*\n\n图 2-43 展示了高级网络配置部分。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig43_HTML.jpg](img/478313_1_En_2_Fig43_HTML.jpg)\n\
    *图 2-43：在 OCI 控制台实例创建向导中配置高级网络*\n\n一旦您在 OCI 控制台的实例创建向导中点击 `Create` 按钮确认了第二个实例的参数选择，配置过程就会开始。这次，UUID\
    \ 服务将通过自定义镜像预先安装好，并且没有涉及长时间运行的用户数据。因此，第二个实例应该启动得更快。让我们等待直到看到实例正在运行，如图 2-44 所示。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig44_HTML.jpg](img/478313_1_En_2_Fig44_HTML.jpg)\n\
    *图 2-44：在 OCI 控制台中查看正在运行的第二个计算实例*\n\n您现在可以在两个节点上测试 API。请记得替换公网 IP 地址，并在两种情况下都使用分配给您的实例的地址。\n\
    \n```bash\n$ UUID2_INSTANCE=130.61.23.13\n$ curl $UUID1_INSTANCE:5000/identifiers\n\
    {\n\"generator\":\"uuid1\",\n\"uuid\":\"bc85b59f-cf0f-4035-a730-c25111db00ec\"\
    \n}\n$ curl $UUID2_INSTANCE:5000/identifiers\n{\n\"generator\":\"uuid2\",\n\"\
    uuid\":\"6eca06e0-65f2-444b-acb8-b9c46741dc72\"\n}\n```\n\n图 2-45 显示两个实例均可操作。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig45_HTML.jpg](img/478313_1_En_2_Fig45_HTML.jpg)\n\
    *图 2-45：测试 UUID 服务 API 的两个节点*\n\n在本节中，我们部署并测试了运行我们应用程序的第二个节点。图 2-46 使用 Oracle\
    \ Cloud Infrastructure 符号展示了当前的应用程序基础架构。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig46_HTML.jpg](img/478313_1_En_2_Fig46_HTML.jpg)\n\
    *图 2-46：基础架构图上的 UUID API 的两个节点*\n\n当前设置有一个主要痛点。API 使用者（即调用 API 的应用程序）必须明确指定特定虚拟机的公网\
    \ IP 地址。采用这种方法，随着 API 的向外扩展，您会产生更多带有不同公网 IP 地址的无关端点。这不是设计高可用性解决方案的最佳方式。幸运的是，我们可以通过添加负载均衡器来改变这一点。\n"
- fmt: "### Load Balancer\n\nA load balancer provides a single point of entry and\
    \ traffic distribution to the active servers or worker nodes. We are going to\
    \ use an Internet-facing, so-called public load balancer that uses a public floating\
    \ IP to support the failover mechanism. This means that you launch a pair of load\
    \ balancer (LB) nodes, each in a different availability domain. At any given time,\
    \ only one LB node is active and forwards traffic to the UUID service API nodes.\
    \ The second LB node remains in Standby mode. If the active LB node fails, the\
    \ standby LB node will detect this situation and announce itself as the active\
    \ node and the current IP address holder.\n\nFigure [2-47](#478313_1_En_2_Chapter.xhtml#Fig47)\
    \ shows how a fault-tolerant public load balancer works.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig47_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig47_HTML.jpg)\n\
    \nFigure 2-47\nFault-tolerant public IP load balancer\n\nA public load balancer\
    \ requires two dedicated public subnets. We are going to create them in the same\
    \ VCN in which we host UUID service API nodes. This time, we will use a new security\
    \ list because the rules will differ from the default security list that we use\
    \ for our application node subnets.\n\nPlease create a new security list called\
    \ `lb-sl`. This is how you create a new security using the OCI Console:\n\nTable\
    \ 2-2\nEgress Security Rules for Load Balancer Subnet\n\n|   | Type       | Protocol\
    \ | Source              | Destination        |\n|---|------------|----------|---------------------|--------------------|\n\
    | 1 | Stateless  | TCP      | All ports           | 192.168.1.0/24 Port 5000 |\n\
    \nTable 2-1\nIngress Security Rules for Load Balancer Subnet\n\n|   | Type   \
    \  | Protocol | Source              | Destination        |\n|---|----------|----------|---------------------|--------------------|\n\
    | 1 | Stateful | TCP      | 0.0.0.0/0 All ports | Port 80            |\n| 2 |\
    \ Stateless| TCP      | 192.168.1.0/24 Port 5000 | All ports   |\n\n1.  Go to\
    \ Menu ➤ Networking ➤ Virtual Cloud Networks.\n2.  Make sure that the `Sandbox`\
    \ compartment is selected.\n3.  Click the name of your VCN.\n4.  Click Security\
    \ Lists in the Resources menu.\n5.  Click Create Security List.\n6.  Give it a\
    \ name: `lb-sl`.\n7.  Create ingress rules as defined in Table [2-1](#478313_1_En_2_Chapter.xhtml#Tab1).\
    \ One rule has to be stateless.\n8.  Create egress rules as defined in Table [2-2](#478313_1_En_2_Chapter.xhtml#Tab2).\
    \ The rule has to be stateless.\n9.  Click Create Security List.\n\nFigure [2-48](#478313_1_En_2_Chapter.xhtml#Fig48)\
    \ shows the ingress rules.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig48_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig48_HTML.jpg)\n\
    \nFigure 2-48\nIngress rules for the load balancer subnets\n\nFigure [2-49](#478313_1_En_2_Chapter.xhtml#Fig49)\
    \ shows the expected egress rule.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig49_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig49_HTML.jpg)\n\
    \nFigure 2-49\nEgress rule for the load balancer subnet\n\nWe are now going to\
    \ create two subnets in two different availability domains for a fault-tolerant\
    \ public load balancer pair of nodes.\n\nTable 2-3\nLoad Balancer Subnets\n\n\
    | Name | AD | CIDR Block    | DNS Label | Security List |\n|------|----|---------------|-----------|---------------|\n\
    | c-net| 1  | 192.168.1.32/29 | c         | lb-sl         |\n| d-net| 2  | 192.168.1.40/29\
    \ | d         | lb-sl         |\n\n1.  Go to Menu ➤ Networking ➤ Virtual Cloud\
    \ Networks.\n2.  Make sure that the `Sandbox` compartment is selected.\n3.  Click\
    \ the name of your VCN.\n4.  Click Subnets in the Resources menu.\n5.  Add two\
    \ new public subnets, as defined in Table [2-3](#478313_1_En_2_Chapter.xhtml#Tab3).\n\
    \nWe’ve just prepared the networking setup for our highly available public load\
    \ balancer. Altogether with UUID API subnets, you should see four subnets in your\
    \ VCN, as shown in Figure [2-50](#478313_1_En_2_Chapter.xhtml#Fig50).\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig50_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig50_HTML.jpg)\n\
    \nFigure 2-50\nSubnets in VCN\n\nAs a matter of fact, the load balancing capability\
    \ is delivered by a set of cooperating OCI resources encapsulated by a load balancer\
    \ resource. Compute nodes or private IP addresses to which the requests are forwarded\
    \ by the load balancer are considered as backends and grouped together into a\
    \ backend set resource. A backend set is more than just a simple grouping of backends\
    \ because it also defines the health check policy. The health check policy decides\
    \ how the backends are judge to be operational or failing. Finally, a listener\
    \ is required to accept the ingress traffic; otherwise, requests wouldn’t be able\
    \ to flow into the public load balancer from the Internet. Figure [2-51](#478313_1_En_2_Chapter.xhtml#Fig51)\
    \ shows a conceptual composition of OCI resources for the load balancer.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig51_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig51_HTML.jpg)\n\
    \nFigure 2-51\nLoad balancer OCI resources\n\nHaving outlined the resources that\
    \ a load balancer is composed of, let’s create them. When using the OCI Console,\
    \ you can leverage a three-step all-in-one load balancer creation wizard. This\
    \ is how you create a new load balancer resource:\n\n1.  Go to Menu ➤ Networking\
    \ ➤ Load Balancers.\n2.  Make sure that the `Sandbox` compartment is selected.\n\
    3.  Click Create Load Balancer.\n4.  In the Add Details step, provide the configuration,\
    \ as shown in Figure [2-52](#478313_1_En_2_Chapter.xhtml#Fig52):\n    1.  Name\
    \ your load balancer `uuid-lb`.\n    2.  Set the visibility to Public.\n    3.\
    \  Select the Small shape: 100Mbps.\n    4.  Select Public Load Balancer.\n  \
    \  5.  Set the VCN to the `uuid-vcn` VCN.\n    6.  Choose the load balancer subnets:\
    \ `c-net` and `d-net`.\n5.  Click Next Step.\n6.  In the Choose Backends step,\
    \ provide the configuration, as shown in Figure [2-53](#478313_1_En_2_Chapter.xhtml#Fig53):\n\
    \    1.  Make sure Weighted Round Robin is selected.\n    2.  Click Add Backends\
    \ and select both compute instances.\n    3.  For each backend instance, change\
    \ the port to `5000`.\n7.  Still in the Choose Backends step, provide the health\
    \ check policy configuration, as shown in Figure [2-54](#478313_1_En_2_Chapter.xhtml#Fig54):\n\
    \    1.  Make sure the protocol is set to HTTP.\n    2.  Set the port to 5000.\n\
    \    3.  Set the URL path to `/identifiers`.\n    4.  Make sure the status code\
    \ is set to 200.\n8.  Click Next Step.\n9.  In the Configure Listener step, provide\
    \ the configuration, as shown in Figure [2-55](#478313_1_En_2_Chapter.xhtml#Fig55):\n\
    \    1.  Choose the HTTP protocol and set the port to 80.\n    2.  Name the listener\
    \ `uuid-lb-listener`.\n10. Click Create Load Balancer.\n\nFigure [2-52](#478313_1_En_2_Chapter.xhtml#Fig52)\
    \ shows the expected load balancer configuration in the Load Balancer Add Details\
    \ step of the load balancer creation wizard in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig52_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig52_HTML.jpg)\n\
    \nFigure 2-52\nAdd Details step in the OCI console load balancer wizard\n\nFigure\
    \ [2-53](#478313_1_En_2_Chapter.xhtml#Fig53) shows the first part of the expected\
    \ load balancer configuration in the Choose Backends step of the load balancer\
    \ creation wizard in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig53_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig53_HTML.jpg)\n\
    \nFigure 2-53\nChoose Backends step in the OCI Console load balancer wizard\n\n\
    Figure [2-54](#478313_1_En_2_Chapter.xhtml#Fig54) shows the second part of the\
    \ expected load balancer configuration in the Choose Backends step of the load\
    \ balancer creation wizard in the OCI Console.\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig54_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig54_HTML.jpg)\n\
    \nFigure 2-54\nHealth check settings in the Choose Backends step\n\nFigure [2-55](#478313_1_En_2_Chapter.xhtml#Fig55)\
    \ shows the expected load balancer backend set configuration in the Configure\
    \ Listener step of the load balancer creation wizard in the OCI Console."
