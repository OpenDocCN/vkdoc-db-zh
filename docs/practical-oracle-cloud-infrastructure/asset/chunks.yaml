- fmt: "# Data Analytics\n\n收集数据只是故事的一面。理解我们为什么要做这件事更为重要。数据可以告诉你不同的信息，有时是预期的，有时是令人惊讶的，这些信息涉及数据所代表的业务情况、对象、测量或事件。传统的、可能是最普遍和成熟的，方法是有意地查询数据集，以寻找各种相关性、趋势、异常，或者实际上更常见的、可用于报告的聚合，例如按业务部门划分的季度销售额。结果通常会进行数据可视化，这有助于说明一大组数字真正表达的含义。除非我们处理的是标准化和常规报告，否则*数据分析*通常包含大量临时查询，这些查询被理解为未预定义且在特定查询执行前无法确定的查询。为了帮助处理此类查询，会采用专门的反规范化数据库表组合。你已经了解了最简单但往往已足够使用的星型模式。\n\
    \n如你所知，星型模式是反规范化数据库表的组合，是构建所谓OLAP立方体的基础。什么是OLAP立方体？我们可以说它是一个多维结构，将维度属性层次结构与定量事实结合起来。嗯，这听起来可能有点太复杂了。从实际角度来看，方便的说法是，OLAP立方体是一个更高级别的结构，通常构建在星型模式之上，提供了一种更抽象的方式来查看数据，超越了底层的表格结构。我们不再考虑维度表，而是讨论维度属性层次结构。在本章的上下文中，相应的OLAP立方体如图[7-33](#478313_1_En_7_Chapter.xhtml#Fig33)所示。我特意为本章的示例数据选择了三个维度，因为它使得想象相应的OLAP立方体作为一个三维坐标系变得非常容易。每个维度都是一条轴线的基础。该坐标系中的每个点都可以看作是一个单一的事实条目，承载着各种定量数据。\n\
    \n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig33_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig33_HTML.jpg)\n\
    \n图 7-33\n\nOLAP立方体\n\nOLAP立方体不仅限于逻辑概念，数据库或数据处理平台可以包含一个OLAP立方体引擎模块，该模块承担了处理与维度层次级别相关的某些负担，让你可以专注于更面向业务的查询。OLAP立方体的实现范围可以从依赖于高级SQL语言特性的数据库扩展（如Oracle\
    \ Analytic Views）到基于中间件的商业智能解决方案（如Oracle Business Intelligence Suite），后者支持专用查询语言（如MDX）。OLAP立方体将帮助我们理解一些我们将要针对星型模式执行的基本查询。然而，首先，我们需要物化一个星型模式。\n\
    \n生成星型模式最简单的方法是运行一个SQL `SELECT`查询，该查询基本上将所有的维度表与事实表连接起来，如下所示：\n\n```sql\nSELECT\
    \ * FROM ROADEVENTS_FACT   F\nJOIN TIME_DIM  T ON T.DAY_ID = F.TIME_DIM_ID\nJOIN\
    \ ROAD_DIM  R ON R.SEGMENT_ID = F.ROAD_DIM_ID\nJOIN EVENT_DIM E ON E.EVENT_ID\
    \ = F.EVENT_DIM_ID\n```\n\n为了简化将来使用更复杂的选择和过滤条件的查询，并避免重复整个星型模式SQL `SELECT`查询，将星型模式查询合并到一个称为*视图*的数据库对象中可能很方便。视图只是对一组数据库表或其他视图保存的SQL查询。它不物理存储数据，而是提供对物理数据库表的预定义视图。尽管如此，使用视图有时可能意味着需要动态地进行代价高昂的查询结果计算。了解到典型的ADW工作负载通常建立在计划的大批量数据加载之上，在数据加载完成后，我们可以预先计算视图并物理存储数据。为此，我们将使用称为*物化视图*的数据库对象。\n\
    \n如你所记得的，数据库用户`SANDBOX_USER`被授予了预定义的`dwrole`数据库角色。然而，这个角色不允许用户创建物化视图。让我们打开SQL\
    \ Developer Web，这次使用`ADMIN`用户的链接，并通过执行`GRANT`语句为`SANDBOX_USER`添加一个新权限。\n\n```sql\n\
    GRANT CREATE MATERIALIZED VIEW TO SANDBOX_USER;\n```\n\n如果你愿意，可以选择作为`ADMIN`用户运行这些查询来验证`SANDBOX_USER`拥有的角色和权限。\n\
    \n```sql\nSELECT * FROM DBA_ROLE_PRIVS where grantee='SANDBOX_USER';\nSELECT *\
    \ FROM DBA_SYS_PRIVS where grantee='SANDBOX_USER';\n```\n\n我们准备好切换到`SANDBOX_USER`的SQL\
    \ Developer Web窗口，并执行`CREATE MATERIALIZED VIEW` SQL DDL语句。再次记住，要在`SANDBOX_USER`\
    \ SQL Developer Web窗口中执行此查询。\n\n```sql\nCREATE MATERIALIZED VIEW ROADEVENTS_STAR\
    \ AS\nSELECT * FROM ROADEVENTS_FACT   F\nJOIN TIME_DIM  T ON T.DAY_ID = F.TIME_DIM_ID\n\
    JOIN ROAD_DIM  R ON R.SEGMENT_ID = F.ROAD_DIM_ID\nJOIN EVENT_DIM E ON E.EVENT_ID\
    \ = F.EVENT_DIM_ID\n```\n\n你应该会收到以下消息：\n\n```\nMaterialized view ROADEVENTS_STAR\
    \ created.\n```\n\n为了本章的目的，我们刚刚在整个事实表上创建了物化视图。值得了解的是，与视图相反，物化视图确实消耗物理存储。对于涉及大数据集的生产用例，将整个星型模式查询持久化为物化视图可能是相当不可取的。同样适用于数据加载是增量且高频率的情况，因为物化视图通常必须在底层数据库表更改后立即刷新。在此上下文中，最佳实践建议在应用维度过滤器后构建物化视图，并且仅针对那些报告引擎经常使用的聚合构建。\n\
    \n我们可以像查询普通数据库表一样查询物化视图。让我们发布一个SQL `SELECT`语句，该语句对所有道路事件发生次数以及受伤和死亡人数进行求和，并按日历年和道路事件类别对结果进行分组。日历年和道路事件类别都是其维度中的最高级别。查询如下所示：\n\
    \n```sql\nSELECT\n    year_name, class_name,\n    SUM(occurrence) total_occurrence,\n\
    \    SUM(injured) sum_injured,\n    SUM(killed) sum_killed\nFROM ROADEVENTS_STAR\n\
    GROUP BY year_name, class_name\nORDER BY year_name, class_name;\n```\n\n结果如图[7-34](#478313_1_En_7_Chapter.xhtml#Fig34)所示。我们可以立即得出一些初步结论。例如，我们可以看到，与2016年相比，2017年的事故和事故受害者数量有所下降。与此同时，报告的交通事故数量略有增加。这可能导致我们提出这样的假设：增加的警察活动可能导致发现更多事件，改善道路安全，并导致2017年事故数量减少。\n\
    \n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig34_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig34_HTML.jpg)\n\
    \n图 7-34\n\n对星型模式的聚合查询"
  raw: '## Data Analytics


    Collecting data is just one side of the story. It is more important to understand
    why we actually do it. The data can tell you different information, sometimes
    expected and sometimes surprising, about the business situation, objects, measurements,
    or events the data represents. The traditional, probably the most-prevalent and
    well-established, approach is to query a data set in an intentional search for
    various correlations, trends, anomalies, or, actually even more common, report-ready
    aggregations such as quarterly sales per business unit. The results are often
    subject to data visualizations, which are helpful in illustrating what a large
    set of numbers truly says. Unless we are dealing with standardized and routine
    reporting, the *data analysis* typically entails a large number of ad hoc queries
    that are understood as queries that are not predefined and cannot be determined
    before the particular query is executed. To help deal with such queries, specialized
    constellations of denormalized database tables are employed. You’ve already learned
    about the simplest and yet often sufficient star schema.


    A star schema, as you are already familiar with, is a constellation of denormalized
    database tables that is the foundation for building the so-called OLAP cubes.
    What is an OLAP cube? We could say that it is a multidimensional structure that
    combines dimensional attribute hierarchies with quantitative facts. Well, this
    may sound a bit too sophisticated. From a practical point of view, it is convenient
    to say that an OLAP cube is a higher-level construct, typically built on top of
    a star schema, that provides a more abstract way of looking at data beyond the
    tabular structure underneath. We are no longer thinking about dimension tables
    but talking about dimension attribute hierarchies. In the context of this chapter,
    the corresponding OLAP cube is illustrated in Figure [7-33](#478313_1_En_7_Chapter.xhtml#Fig33).
    I have deliberately chosen to use three dimensions for the sample data in this
    chapter because it makes it really easy to imagine the corresponding OLAP cube
    as a three-dimensional coordinate system. Each dimension is a base for an axis
    line. Each point in this coordinate system can be seen as a single fact entry
    that carries various quantitative data.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig33_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig33_HTML.jpg)


    Figure 7-33


    OLAP cube


    OLAP cubes are not limited to a logical concept, but a database or data processing
    platform can include an OLAP cube engine module that takes some burden of handling
    selected aspects related to dimension hierarchy levels and lets you focus on more
    business-oriented queries. The implementation of OLAP cubes can range from database
    extensions such as Oracle Analytic Views, which rely on advanced SQL language
    features, to a middleware-based business intelligence solutions, such as Oracle
    Business Intelligence Suite, which supports a dedicated query language such as
    MDX. The OLAP cube will help us understand some of the basic queries we are going
    to execute against a star schema. First, however, we need to materialize a star
    schema.


    The easiest way to produce a star schema is to run a SQL `select` query that basically
    joins all dimension tables with the fact table like this:


    ```

    SELECT  FROM ROADEVENTS_FACT   F

    JOIN TIME_DIM  T ON T.DAY_ID = F.TIME_DIM_ID

    JOIN ROAD_DIM  R ON R.SEGMENT_ID = F.ROAD_DIM_ID

    JOIN EVENT_DIM E ON E.EVENT_ID = F.EVENT_DIM_ID

    ```


    To simplify future queries that will use more complex selection and filtering
    conditions and avoid repeating the entire star schema SQL `select` query, it may
    be convenient to incorporate the star schema query in a database object called
    a *view*. A view is just a saved SQL query against a set of database tables or
    other views. It does not store data physically but provides a predefined perspective
    on physical database tables. Still, the use of views may sometimes mean the costly
    calculation of query results dynamically. Knowing that typical ADW workloads are
    usually built on scheduled batch data loading of a large footprint, after the
    data loads have been completed, we could precompute the view and store data physically.
    For that purpose, we will use database objects called *materialized views*.


    As you recall, the database user `SANDBOX_USER` was granted the predefined `dwrole`
    database role. This role, however, does not allow the users to create materialized
    views. Let’s open SQL Developer Web, this time using the link for the `ADMIN`
    user, and add a new privilege for the `SANDBOX_USER` by executing the `GRANT`
    statement .


    ```

    GRANT CREATE MATERIALIZED VIEW TO SANDBOX_USER;

    ```


    If you want, you can optionally verify the roles and privileges held by the `SANDBOX_USER`
    by running these queries as the `ADMIN` user.


    ```

    SELECT * FROM DBA_ROLE_PRIVS where grantee="SANDBOX_USER";

    SELECT * FROM DBA_SYS_PRIVS where grantee="SANDBOX_USER";

    ```


    We are ready to switch to the SQL Developer Web window for `SANDBOX_USER` and
    execute the `CREATE MATERIALIZED VIEW` SQL DDL statement. Again, remember to execute
    this query in the `SANDBOX_USER` SQL Developer Web window.


    ```

    CREATE MATERIALIZED VIEW ROADEVENTS_STAR AS

    SELECT * FROM ROADEVENTS_FACT   F

    JOIN TIME_DIM  T ON T.DAY_ID = F.TIME_DIM_ID

    JOIN ROAD_DIM  R ON R.SEGMENT_ID = F.ROAD_DIM_ID

    JOIN EVENT_DIM E ON E.EVENT_ID = F.EVENT_DIM_ID

    ```


    You should receive the following message:


    ```

    Materialized view ROADEVENTS_STAR created.

    ```


    For the sake of this chapter, we have just created the materialized view over
    the entire fact table. It is good to know that materialized views, in contrast
    to views, do consume physical storage. For production use cases that involve large
    data sets, it may be rather undesired to persist the entire star schema query
    as a materialized view. The same applies to situations in which the data loads
    are incremental and of a high frequency, because materialized views usually have
    to be refreshed immediately after the underlying database tables change. In this
    context, best practice suggests that materialized views are built after applying
    dimension filters and only for these aggregations that are often used by the reporting
    engine.


    We can query a materialized view just as an ordinary database table. Let’s issue
    a SQL `select` statement that sums up all road event occurrences as well as the
    number of people injured and killed and groups the results by the calendar year
    and the road event class. Both the calendar year and the road event class are
    the topmost levels in their dimensions. The query is shown here:


    ```

    SELECT

    year_name, class_name,

    SUM(occurrence) total_occurrence,

    SUM(injured) sum_injured,

    SUM(killed) sum_killed

    FROM ROADEVENTS_STAR

    GROUP BY year_name, class_name

    ORDER BY year_name, class_name;

    ```


    The results are shown in Figure [7-34](#478313_1_En_7_Chapter.xhtml#Fig34). We
    can immediately draw some initial conclusions. For example, we can see that the
    numbers of accidents and accident victims decreased in 2017 when compared to 2016\.
    At the same time, the number of reported traffic incidents increased a bit. This
    could lead us to the hypothesis that increased police activity could lead to detecting
    more incidents, improving the safety on the roads, and resulting in a lower number
    of accidents in 2017.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig34_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig34_HTML.jpg)


    Figure 7-34


    Aggregate query over a star schema'
  trans: "\n# 数据分析\n\n收集数据只是故事的一部分。理解我们为何要进行数据收集则更为重要。数据可以揭示不同的信息——有时是预期的，有时是令人惊讶的——这些信息关乎数据所代表的业务情况、对象、测量或事件。最传统、可能也是最普遍和成熟的方法，是有意识地查询数据集，以发现各种相关性、趋势、异常，或者更常见的，可用于报告的聚合结果，例如按业务部门划分的季度销售额。结果通常会进行数据可视化，这有助于阐释一大串数字真正表达的含义。除非我们处理的是标准化和常规报告，否则*数据分析*通常包含大量临时查询，这些查询的特点是未预定义且在特定查询执行前无法确定。为了处理此类查询，会采用专门的反规范化数据库表组合。你已经了解了最简单但往往已足够使用的**星型模式**。\n\
    \n如你所知，星型模式是反规范化数据库表的组合，是构建所谓**OLAP 立方体**的基础。什么是 OLAP 立方体？我们可以说它是一个多维结构，将维度属性层次结构与定量事实结合起来。嗯，这听起来可能有点太复杂了。从实际角度来看，方便的说法是，OLAP\
    \ 立方体是一个更高级别的结构，通常构建在星型模式之上，提供了一种更抽象的方式来查看数据，超越了底层的表格结构。我们不再考虑维度表，而是讨论维度属性层次结构。在本章的上下文中，相应的\
    \ OLAP 立方体如图 7-33 所示。我特意为本章的示例数据选择了三个维度，因为它使得想象相应的 OLAP 立方体作为一个三维坐标系变得非常容易。每个维度都是一条轴线的基础。该坐标系中的每个点都可以看作是一个单一的事实条目，承载着各种定量数据。\n\
    \n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig33_HTML.jpg](img/478313_1_En_7_Fig33_HTML.jpg)\n\
    \n图 7-33\n\nOLAP 立方体\n\nOLAP 立方体不仅限于逻辑概念。数据库或数据处理平台可以包含一个 OLAP 立方体引擎模块，该模块承担了处理与维度层次级别相关的某些计算负担，让你可以专注于更面向业务的查询。OLAP\
    \ 立方体的实现范围很广，从依赖高级 SQL 语言特性的数据库扩展（如 Oracle Analytic Views），到基于中间件的商业智能解决方案（如 Oracle\
    \ Business Intelligence Suite），后者支持专用查询语言（如 MDX）。OLAP 立方体将帮助我们理解一些我们将要针对星型模式执行的基本查询。然而，首先，我们需要物化一个星型模式。\n\
    \n生成星型模式最简单的方法是运行一个 SQL `SELECT`查询，该查询基本上将所有的维度表与事实表连接起来，如下所示：\n\n```sql\nSELECT\
    \ * FROM ROADEVENTS_FACT   F\nJOIN TIME_DIM  T ON T.DAY_ID = F.TIME_DIM_ID\nJOIN\
    \ ROAD_DIM  R ON R.SEGMENT_ID = F.ROAD_DIM_ID\nJOIN EVENT_DIM E ON E.EVENT_ID\
    \ = F.EVENT_DIM_ID\n```\n\n为了简化将来使用更复杂的选择和过滤条件的查询，并避免重复编写整个星型模式 SQL `SELECT`查询，将星型模式查询合并到一个称为*视图*的数据库对象中可能很方便。视图只是保存在数据库中的一组表或其他视图的\
    \ SQL 查询定义。它不物理存储数据，而是提供对物理数据库表的预定义视图。尽管如此，使用视图有时可能意味着需要动态地进行代价高昂的查询结果计算。了解到典型的\
    \ ADW 工作负载通常建立在计划的大批量数据加载之上，在数据加载完成后，我们可以预先计算视图并物理存储数据。为此，我们将使用称为*物化视图*的数据库对象。\n\
    \n如你所记得的，数据库用户`SANDBOX_USER`被授予了预定义的`dwrole`数据库角色。然而，这个角色不允许用户创建物化视图。让我们打开 SQL\
    \ Developer Web，这次使用`ADMIN`用户的链接，并通过执行`GRANT`语句为`SANDBOX_USER`添加一个新权限。\n\n```sql\n\
    GRANT CREATE MATERIALIZED VIEW TO SANDBOX_USER;\n```\n\n如果你愿意，可以选择作为`ADMIN`用户运行这些查询来验证`SANDBOX_USER`拥有的角色和权限。\n\
    \n```sql\nSELECT * FROM DBA_ROLE_PRIVS where grantee='SANDBOX_USER';\nSELECT *\
    \ FROM DBA_SYS_PRIVS where grantee='SANDBOX_USER';\n```\n\n我们准备好切换到`SANDBOX_USER`的\
    \ SQL Developer Web 窗口，并执行`CREATE MATERIALIZED VIEW` SQL DDL 语句。再次记住，要在`SANDBOX_USER`\
    \ SQL Developer Web 窗口中执行此查询。\n\n```sql\nCREATE MATERIALIZED VIEW ROADEVENTS_STAR\
    \ AS\nSELECT * FROM ROADEVENTS_FACT   F\nJOIN TIME_DIM  T ON T.DAY_ID = F.TIME_DIM_ID\n\
    JOIN ROAD_DIM  R ON R.SEGMENT_ID = F.ROAD_DIM_ID\nJOIN EVENT_DIM E ON E.EVENT_ID\
    \ = F.EVENT_DIM_ID\n```\n\n你应该会收到以下消息：\n\n```\nMaterialized view ROADEVENTS_STAR\
    \ created.\n```\n\n为了本章的目的，我们刚刚在整个事实表上创建了物化视图。值得了解的是，与视图相反，物化视图确实消耗物理存储。对于涉及大数据集的生产用例，将整个星型模式查询持久化为物化视图可能是相当不可取的。同样适用于数据加载是增量且高频率的情况，因为物化视图通常必须在底层数据库表更改后立即刷新。在此上下文中，最佳实践建议在应用维度过滤器后构建物化视图，并且仅针对那些报告引擎经常使用的聚合构建。\n\
    \n我们可以像查询普通数据库表一样查询物化视图。让我们发布一个 SQL `SELECT`语句，该语句对所有道路事件发生次数以及受伤和死亡人数进行求和，并按日历年和道路事件类别对结果进行分组。日历年和道路事件类别都是其维度中的最高级别。查询如下所示：\n\
    \n```sql\nSELECT\n    year_name, class_name,\n    SUM(occurrence) total_occurrence,\n\
    \    SUM(injured) sum_injured,\n    SUM(killed) sum_killed\nFROM ROADEVENTS_STAR\n\
    GROUP BY year_name, class_name\nORDER BY year_name, class_name;\n```\n\n结果如图 7-34\
    \ 所示。我们可以立即得出一些初步结论。例如，我们可以看到，与 2016 年相比，2017 年的事故和事故受害者数量有所下降。与此同时，报告的交通事故数量略有增加。这可能导致我们提出这样的假设：增加的警察活动可能导致发现更多事件，改善道路安全，并导致\
    \ 2017 年事故数量减少。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig34_HTML.jpg](img/478313_1_En_7_Fig34_HTML.jpg)\n\
    \n图 7-34\n\n对星型模式的聚合查询\n"
- fmt: "# OLAP Cube Operations\n\nThe query result consists of four rows that can\
    \ be illustrated on the corresponding OLAP cube, as shown in Figure [7-35](#478313_1_En_7_Chapter.xhtml#Fig35).\
    \ The query practically divides the original cube into four subcubes that were\
    \ divided based on the topmost dimension hierarchy levels for the Time and Event\
    \ dimensions. If we knew we were interested in analyzing traffic incidents that\
    \ took place in 2017 only, we would focus on this one particular subcube. That\
    \ kind of operation would be called `dicing`. The dicing operation produces a\
    \ subcube by filtering the results based on a range of values typically applied\
    \ on a few dimensions.\n\n![OLAP cube perspective on the query](images/478313_1_En_7_Chapter/478313_1_En_7_Fig35_HTML.jpg)\n\
    \n**Figure 7-35** OLAP cube perspective on the query\n\n## Slice and Dice\n\n\
    Dicing is just one of a few types of OLAP cube operations you will encounter in\
    \ the world of business intelligence (BI). These are the most common types of\
    \ BI operations:\n\n*   Slice and dice\n*   Drill-down and roll-up\n*   Pivot\n\
    \nWhile dicing uses range filters on one or more dimensions to create a subcube,\
    \ the `slicing` operation reduces the number of analyzed dimensions. You typically\
    \ choose one fixed value for a particular dimension and use it as a filter over\
    \ the data set. Both slicing and dicing are conceptually illustrated in Figure\
    \ [7-36](#478313_1_En_7_Chapter.xhtml#Fig36).\n\n![OLAP cube slice and dice](images/478313_1_En_7_Chapter/478313_1_En_7_Fig36_HTML.jpg)\n\
    \n**Figure 7-36** OLAP cube slice and dice\n\nLet’s slice the cube by eliminating\
    \ the Time dimension. For example, we could be interested in displaying the aggregation\
    \ totals for the very precise date, let it be August 12, 2017\\. To do so, execute\
    \ the second `select` query.\n\n```sql\nSELECT\n    SUM(occurrence) total_occurrence,\n\
    \    SUM(injured) sum_injured,\n    SUM(killed) sum_killed\nFROM ROADEVENTS_STAR\n\
    WHERE day_date=TO_DATE('20170812','YYYYMMDD');\n```\n\nThe results are shown in\
    \ Figure [7-37](#478313_1_En_7_Chapter.xhtml#Fig37). There were 2,777 occurrences\
    \ of accidents and incidents altogether. The accidents caused 175 injured and\
    \ 9 killed.\n\n![Slice operation](images/478313_1_En_7_Chapter/478313_1_En_7_Fig37_HTML.jpg)\n\
    \n**Figure 7-37** Slice operation\n\n## Drill-Down and Roll-Up\n\nThe third `select`\
    \ query performed over the star schema materialized view is an example of a `drill-down`\
    \ operation. We are still using the previous slice of the cube. We add to it the\
    \ `GROUP BY` clause, which effectively presents a more granular aggregate split.\
    \ The ordering is aligned with the Event dimension hierarchy. The event class\
    \ (the `class_name` column) splits into event categories (the `category_name`\
    \ column) that subsequently split into event types (the `event_name` column).\
    \ The intention is to make the results clearer and easier to understand. Now,\
    \ issue the third query.\n\n```sql\nSELECT class_name, category_name, event_name,\n\
    \    SUM(occurrence) total_occurrence,\n    SUM(injured) sum_injured,\n    SUM(killed)\
    \ sum_killed\nFROM ROADEVENTS_STAR\nWHERE day_date=TO_DATE('20170812','YYYYMMDD')\n\
    GROUP BY class_name, category_name, event_name\nORDER BY class_name, category_name,\
    \ event_name;\n```\n\nA more detailed split that is the result of the query you’ve\
    \ just issued is displayed in Figure [7-38](#478313_1_En_7_Chapter.xhtml#Fig38).\
    \ Although we present the totals for each fact measurement, nothing is stopping\
    \ you from making additional ad hoc calculations such as the averages or injured-to-killed\
    \ ratio for each event type. Remember that we have worked on a slice of a cube,\
    \ and the results are given for a single day only.\n\n![Drill-down operation](images/478313_1_En_7_Chapter/478313_1_En_7_Fig38_HTML.jpg)\n\
    \n**Figure 7-38** Drill-down operation\n\n## Dice Operation\n\nThe fourth SQL\
    \ statement is an example of a `dicing` operation. We are applying filters on\
    \ each dimension to create a subcube. The Time dimension is limited to August\
    \ 2017, Event dimension to the “traffic rules” Category, and the Road dimension\
    \ only to these road segments that are located in three listed voivodeships. Execute\
    \ the following `select` query:\n\n```sql\nSELECT event_name, segment_voivodeship,\n\
    \    SUM(occurrence) occurrence_in_201708\nFROM ROADEVENTS_STAR\nWHERE\n    month_of_year=8\
    \ and year_name=\"CY2017\" and\n    category_name='traffic rules' and\n    segment_voivodeship\n\
    \    in ('Masovian','Subcarpathian','Lesser Poland')\nGROUP BY event_name, segment_voivodeship\n\
    ORDER BY event_name, segment_voivodeship;\n```\n\nFigure [7-39](#478313_1_En_7_Chapter.xhtml#Fig39)\
    \ presents the sum of various traffic rules road incidents additionally split\
    \ based on their location. We can see, for instance, that there were 2,835 speeding\
    \ traffic incidents reported on roads in the Masovian voivodeship in August 2017.\n\
    \n![Dice operation](images/478313_1_En_7_Chapter/478313_1_En_7_Fig39_HTML.jpg)\n\
    \n**Figure 7-39** Dice operation\n\n## Pivot Operation\n\nWhat we are doing is\
    \ creating ad hoc queries to explore and detect various characteristics of this\
    \ particular data set. In the case of ad hoc queries, as long as we can read and\
    \ understand the results, the formatting is not so important. This will drastically\
    \ change when we are tasked with preparing the results for reporting. The aggregates\
    \ presented in Figure [7-39](#478313_1_En_7_Chapter.xhtml#Fig39) are based on\
    \ a two-dimensional subdice. The Time dimension is no longer considered. Having\
    \ two dimensions, we could imagine a report that relies on each remaining dimension\
    \ for its two-dimensional structure. The x-axis could be based on the Road dimension\
    \ while the y-axis on the Event dimension. Looking at the results of the previous\
    \ query, the only thing remaining is to apply the `pivot` operation. The pivot\
    \ operation basically rotates rows into columns, applying additional aggregation\
    \ if required. Values that were stored in the row fields of a particular column\
    \ can become a new set of columns. Oracle Database features a specialized `PIVOT`\
    \ clause to perform pivoting. This is the fifth query to be executed:\n\n```sql\n\
    SELECT\n    *\nFROM\n    (\n        SELECT\n            event_name,\n        \
    \    segment_voivodeship,\n            SUM(occurrence) occurrence_in_201708\n\
    \        FROM\n            ROADEVENTS_STAR\n        WHERE\n            month_of_year\
    \ = 8 AND year_name = 'CY2017'\n            AND category_name = 'traffic rules'\n\
    \            AND segment_voivodeship\n            IN ( 'Masovian', 'Subcarpathian',\
    \ 'Lesser Poland' )\n        GROUP BY event_name, segment_voivodeship\n      \
    \  ORDER BY event_name, segment_voivodeship\n    ) PIVOT (\n        SUM ( occurrence_in_201708\
    \ )\n        FOR ( segment_voivodeship )\n        IN (\n            'Masovian'\
    \ as masovian,\n            'Subcarpathian' as subcarpathian,\n            'Lesser\
    \ Poland' as lesser_poland\n        )\n    )\n```\n\nFigure [7-40](#478313_1_En_7_Chapter.xhtml#Fig40)\
    \ shows the report-ready results of the pivot operation applied on the subcube.\
    \ The values presented as row fields in the previous `segment_voivodeship` column\
    \ became new columns. The previous `occurrence_in_201708` column was removed,\
    \ and the values were distributed accordingly to the new layout. In this case,\
    \ because of the well-grained grouping levels, no additional aggregation took\
    \ place.\n\n![Pivot operation](images/478313_1_En_7_Chapter/478313_1_En_7_Fig40_HTML.jpg)\n\
    \n**Figure 7-40** Pivot operation\n\nThe operations presented are just the tip\
    \ of the iceberg. Oracle Autonomous Database supports many specialized clauses\
    \ that let you properly structure, distribute, aggregate, and rank the results,\
    \ but this is beyond the scope of this book. Oracle Database analytical views\
    \ can be used to perform more advanced dimensional queries in a hierarchy-aware\
    \ way and include embedded calculations over aggregates available in the underlying\
    \ fact table."
  raw: 'The query result consists of four rows that can be illustrated on the corresponding
    OLAP cube, as shown in Figure [7-35](#478313_1_En_7_Chapter.xhtml#Fig35). The
    query practically divides the original cube into four subcubes that were divided
    based on the topmost dimension hierarchy levels for the Time and Event dimensions.
    If we knew we were interested in analyzing traffic incidents that took place in
    2017 only, we would focus on this one particular subcube. That kind of operation
    would be called *dicing*. The dicing operation produces a subcube by filtering
    the results based on a range of values typically applied on a few dimensions.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig35_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig35_HTML.jpg)


    Figure 7-35


    OLAP cube perspective on the query


    Dicing is just one of a few types of OLAP cube operations you will encounter in
    the world of business intelligence (BI). These are the most common types of BI
    operations:


    *   Slice and dice


    *   Drill-down and roll-up


    *   Pivot


    While dicing uses range filters on one or more dimensions to create a subcube,
    the *slicing* operation reduces the number of analyzed dimensions. You typically
    choose one fixed value for a particular dimension and use it as a filter over
    the data set. Both slicing and dicing are conceptually illustrated in Figure [7-36](#478313_1_En_7_Chapter.xhtml#Fig36).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig36_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig36_HTML.jpg)


    Figure 7-36


    OLAP cube slice and dice


    Let’s slice the cube by eliminating the Time dimension. For example, we could
    be interested in displaying the aggregation totals for the very precise date,
    let it be August 12, 2017\. To do so, execute the second `select` query.


    ```

    SELECT

    SUM(occurrence) total_occurrence,

    SUM(injured) sum_injured,

    SUM(killed) sum_killed

    FROM ROADEVENTS_STAR

    WHERE day_date=TO_DATE(''20170812'',''YYYYMMDD'');

    ```


    The results are shown in Figure [7-37](#478313_1_En_7_Chapter.xhtml#Fig37). There
    were 2,777 occurrences of accidents and incidents altogether. The accidents caused
    175 injured and 9 killed.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig37_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig37_HTML.jpg)


    Figure 7-37


    Slice operation


    The third select query performed over the star schema materialized view is an
    example of a *drill-down* operation. We are still using the previous slice of
    the cube. We add to it the `GROUP BY` clause, which effectively presents a more
    granular aggregate split. The ordering is aligned with the Event dimension hierarchy.
    The event class (the `class_name` column) splits into event categories (the `category_name`
    column) that subsequently split into event types (the `event_name` column). The
    intention is to make the results clearer and easier to understand. Now, issue
    the third query.


    ```

    SELECT class_name, category_name, event_name,

    SUM(occurrence) total_occurrence,

    SUM(injured) sum_injured,

    SUM(killed) sum_killed

    FROM ROADEVENTS_STAR

    WHERE day_date=TO_DATE(''20170812'',''YYYYMMDD'')

    GROUP BY class_name, category_name, event_name

    ORDER BY class_name, category_name, event_name;

    ```


    A more detailed split that is the result of the query you’ve just issued is displayed
    in Figure [7-38](#478313_1_En_7_Chapter.xhtml#Fig38). Although we present the
    totals for each fact measurement, nothing is stopping you from making additional
    ad hoc calculations such as the averages or injured-to-killed ratio for each event
    type. Remember that we have worked on a slice of a cube, and the results are given
    for a single day only.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig38_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig38_HTML.jpg)


    Figure 7-38


    Drill-down operation


    The fourth SQL statement is an example of a *dicing* operation. We are applying
    filters on each dimension to create a subcube. The Time dimension is limited to
    August 2017, Event dimension to the “traffic rules” Category, and the Road dimension
    only to these road segments that are located in three listed voivodeships. Execute
    the following `select` query:


    ```

    SELECT event_name, segment_voivodeship,

    SUM(occurrence) occurrence_in_201708

    FROM ROADEVENTS_STAR

    WHERE

    month_of_year=8 and year_name="CY2017" and

    category_name=''traffic rules'' and

    segment_voivodeship

    in (''Masovian'',''Subcarpathian'',''Lesser Poland'')

    GROUP BY event_name, segment_voivodeship

    ORDER BY event_name, segment_voivodeship;

    ```


    Figure [7-39](#478313_1_En_7_Chapter.xhtml#Fig39) presents the sum of various
    traffic rules road incidents additionally split based on their location. We can
    see, for instance, that there were 2,835 speeding traffic incidents reported on
    roads in the Masovian voivodeship in August 2017.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig39_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig39_HTML.jpg)


    Figure 7-39


    Dice operation


    What we are doing is creating ad hoc queries to explore and detect various characteristics
    of this particular data set. In the case of ad hoc queries, as long as we can
    read and understand the results, the formatting is not so important. This will
    drastically change when we are tasked with preparing the results for reporting.
    The aggregates presented in Figure [7-39](#478313_1_En_7_Chapter.xhtml#Fig39)
    are based on a two-dimensional subdice. The Time dimension is no longer considered.
    Having two dimensions, we could imagine a report that relies on each remaining
    dimension for its two-dimensional structure. The x-axis could be based on the
    Road dimension while the y-axis on the Event dimension. Looking at the results
    of the previous query, the only thing remaining is to apply the *pivot* operation.
    The pivot operation basically rotates rows into columns, applying additional aggregation
    if required. Values that were stored in the row fields of a particular column
    can become a new set of columns. Oracle Database features a specialized `PIVOT`
    clause to perform pivoting. This is the fifth query to be executed:


    ```

    SELECT

    *

    FROM

    (

    SELECT

    event_name,

    segment_voivodeship,

    SUM(occurrence) occurrence_in_201708

    FROM

    ROADEVENTS_STAR

    WHERE

    month_of_year = 8 AND year_name = ''CY2017''

    AND category_name = ''traffic rules''

    AND segment_voivodeship

    IN ( ''Masovian'', ''Subcarpathian'', ''Lesser Poland'' )

    GROUP BY event_name, segment_voivodeship

    ORDER BY event_name, segment_voivodeship

    ) PIVOT (

    SUM ( occurrence_in_201708 )

    FOR ( segment_voivodeship )

    IN (

    ''Masovian'' as masovian,

    ''Subcarpathian'' as subcarpathian,

    ''Lesser Poland'' as lesser_poland

    )

    )

    ```


    Figure [7-40](#478313_1_En_7_Chapter.xhtml#Fig40) shows the report-ready results
    of the pivot operation applied on the subcube. The values presented as row fields
    in the previous `segment_voivodeship` column became new columns. The previous
    `occurrence_in_201708` column was removed, and the values were distributed accordingly
    to the new layout. In this case, because of the well-grained grouping levels,
    no additional aggregation took place.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig40_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig40_HTML.jpg)


    Figure 7-40


    Pivot operation


    The operations presented are just the tip of the iceberg. Oracle Autonomous Database
    supports many specialized clauses that let you properly structure, distribute,
    aggregate, and rank the results, but this is beyond the scope of this book. Oracle
    Database analytical views can be used to perform more advanced dimensional queries
    in a hierarchy-aware way and include embedded calculations over aggregates available
    in the underlying fact table.'
  trans: "# OLAP 立方体操作\n\n查询结果包含四行，可以在相应的 OLAP 立方体上展示，如图 7-35 所示。该查询实际上将原始立方体划分为四个子立方体，划分依据是时间和事件两个维度的最高维度层次级别。如果我们知道自己只对分析\
    \ 2017 年发生的交通事件感兴趣，我们就会专注于这个特定的子立方体。这种操作被称为 `切块`。切块操作通过对少数维度应用值范围过滤器来创建一个子立方体。\n\
    \n![查询的 OLAP 立方体透视图](img/478313_1_En_7_Fig35_HTML.jpg)\n\n**图 7-35** 查询的 OLAP\
    \ 立方体透视图\n\n## 切片与切块\n\n切块只是你在商业智能（BI）领域会遇到的几种 OLAP 立方体操作之一。最常见的 BI 操作类型包括：\n\n\
    *   切片与切块\n*   向下钻取与向上卷叠\n*   透视\n\n切块操作在一个或多个维度上使用范围过滤器来创建子立方体，而 `切片` 操作则减少分析的维度数量。你通常为特定维度选择一个固定值，并将其用作数据集的过滤器。切片和切块操作的概念如图\
    \ 7-36 所示。\n\n![OLAP 立方体切片与切块](img/478313_1_En_7_Fig36_HTML.jpg)\n\n**图 7-36**\
    \ OLAP 立方体切片与切块\n\n让我们通过消除时间维度来对立方体进行切片。例如，我们可能希望显示特定日期的汇总总计，比如 2017 年 8 月 12\
    \ 日。为此，执行第二个 `select` 查询。\n\n```sql\nSELECT\n    SUM(occurrence) total_occurrence,\n\
    \    SUM(injured) sum_injured,\n    SUM(killed) sum_killed\nFROM ROADEVENTS_STAR\n\
    WHERE day_date=TO_DATE('20170812','YYYYMMDD');\n```\n\n结果如图 7-37 所示。事故和事件总共发生了\
    \ 2,777 起。事故导致 175 人受伤，9 人死亡。\n\n![切片操作](img/478313_1_En_7_Fig37_HTML.jpg)\n\n\
    **图 7-37** 切片操作\n\n## 向下钻取与向上卷叠\n\n对星型模式物化视图执行的第三个 `select` 查询是 `向下钻取` 操作的一个例子。我们仍然使用之前的立方体切片。我们向其添加了\
    \ `GROUP BY` 子句，这有效地呈现了更细粒度的聚合拆分。排序与事件维度层次结构一致。事件类别（`class_name` 列）拆分为事件分类（`category_name`\
    \ 列），随后再拆分为事件类型（`event_name` 列）。目的是使结果更清晰、更容易理解。现在，执行第三个查询。\n\n```sql\nSELECT\
    \ class_name, category_name, event_name,\n    SUM(occurrence) total_occurrence,\n\
    \    SUM(injured) sum_injured,\n    SUM(killed) sum_killed\nFROM ROADEVENTS_STAR\n\
    WHERE day_date=TO_DATE('20170812','YYYYMMDD')\nGROUP BY class_name, category_name,\
    \ event_name\nORDER BY class_name, category_name, event_name;\n```\n\n图 7-38 展示了你刚刚执行的查询所产生的更详细的拆分结果。虽然我们展示了每个事实度量的总计，但没有任何阻碍你进行额外的即席计算，例如计算每个事件类型的平均值或伤亡比率。记住，我们是在立方体的一个切片上进行操作，结果仅针对一天给出。\n\
    \n![向下钻取操作](img/478313_1_En_7_Fig38_HTML.jpg)\n\n**图 7-38** 向下钻取操作\n\n## 切块操作\n\
    \n第四个 SQL 语句是 `切块` 操作的一个例子。我们对每个维度应用过滤器以创建一个子立方体。时间维度限制为 2017 年 8 月，事件维度限制为“交通规则”分类，道路维度仅限于位于三个列出的省份的道路路段。执行以下\
    \ `select` 查询：\n\n```sql\nSELECT event_name, segment_voivodeship,\n    SUM(occurrence)\
    \ occurrence_in_201708\nFROM ROADEVENTS_STAR\nWHERE\n    month_of_year=8 and year_name=\"\
    CY2017\" and\n    category_name='traffic rules' and\n    segment_voivodeship\n\
    \    in ('Masovian','Subcarpathian','Lesser Poland')\nGROUP BY event_name, segment_voivodeship\n\
    ORDER BY event_name, segment_voivodeship;\n```\n\n图 7-39 展示了各种交通规则道路事件的总和，并根据其地点进行了额外拆分。例如，我们可以看到，2017\
    \ 年 8 月在马佐夫舍省的道路上报告了 2,835 起超速交通事件。\n\n![切块操作](img/478313_1_En_7_Fig39_HTML.jpg)\n\
    \n**图 7-39** 切块操作\n\n## 透视操作\n\n我们正在做的是创建即席查询，以探索和检测此特定数据集的各种特征。在即席查询的情况下，只要我们能阅读和理解结果，格式就不那么重要。当我们需要为报告准备结果时，情况将发生巨大变化。图\
    \ 7-39 中展示的聚合基于一个二维的切块。时间维度不再被考虑。有了两个维度，我们可以想象一份报告，其二维结构依赖于每个剩余维度。x 轴可以基于道路维度，而\
    \ y 轴基于事件维度。查看上一个查询的结果，剩下的就是应用 `透视` 操作。透视操作基本上是将行旋转成列，如果需要，会应用额外的聚合。存储在特定列的行字段中的值可以成为一组新的列。Oracle\
    \ 数据库提供了一个专门的 `PIVOT` 子句来执行透视操作。这是要执行的第五个查询：\n\n```sql\nSELECT\n    *\nFROM\n\
    \    (\n        SELECT\n            event_name,\n            segment_voivodeship,\n\
    \            SUM(occurrence) occurrence_in_201708\n        FROM\n            ROADEVENTS_STAR\n\
    \        WHERE\n            month_of_year = 8 AND year_name = 'CY2017'\n     \
    \       AND category_name = 'traffic rules'\n            AND segment_voivodeship\n\
    \            IN ( 'Masovian', 'Subcarpathian', 'Lesser Poland' )\n        GROUP\
    \ BY event_name, segment_voivodeship\n        ORDER BY event_name, segment_voivodeship\n\
    \    ) PIVOT (\n        SUM ( occurrence_in_201708 )\n        FOR ( segment_voivodeship\
    \ )\n        IN (\n            'Masovian' as masovian,\n            'Subcarpathian'\
    \ as subcarpathian,\n            'Lesser Poland' as lesser_poland\n        )\n\
    \    )\n```\n\n图 7-40 展示了应用于子立方体的透视操作后可供报告使用的结果。之前作为行字段展示的 `segment_voivodeship`\
    \ 列中的值变成了新的列。之前的 `occurrence_in_201708` 列被移除，其值根据新的布局进行了相应分配。在这种情况下，由于分组级别粒度良好，没有发生额外的聚合。\n\
    \n![透视操作](img/478313_1_En_7_Fig40_HTML.jpg)\n\n**图 7-40** 透视操作\n\n所展示的操作只是冰山一角。Oracle\
    \ Autonomous Database 支持许多专门的子句，允许你正确地构建、分发、聚合和排名结果，但这超出了本书的范围。Oracle Database\
    \ 的分析视图可用于执行更高级的维度查询，并能感知层次结构，同时包含对底层事实表中可用聚合的嵌入式计算。"
- fmt: 'Every Autonomous Data Warehouse instance comes with a feature called `Oracle
    Machine Learning` (OML), which is a web-based, interactive, notebook-oriented
    data visualization and data analytics tool based on the open source Apache Zeppelin
    project. For simple visualization use cases, you can easily use SQL to issue queries
    and, using a few clicks, prepare various charts. For example, Figure [7-41](#478313_1_En_7_Chapter.xhtml#Fig41)
    shows how to display a line chart that illustrates the sum of car accident victims
    in Poland in 2017 grouped by the traffic accident category. As a reminder, the
    data you see is purely artificial and generated by me solely for the purpose of
    this book.


    ![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig41_HTML.jpg`](images/478313_1_En_7_Chapter/478313_1_En_7_Fig41_HTML.jpg)


    **Figure 7-41** Oracle Machine Learning Zeppelin-based visualizations


    Notebooks can be arranged in a way that resembles multi paragraph reports, like
    the one shown in Figure [7-42](#478313_1_En_7_Chapter.xhtml#Fig42) that combines
    both a pie chart and a corresponding data table. Both views illustrate the daily
    average of people injured in 2017 in a voivodeship-based split.


    ![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig42_HTML.jpg`](images/478313_1_En_7_Chapter/478313_1_En_7_Fig42_HTML.jpg)


    **Figure 7-42** OML-based reports


    You can access the OML Administration page from the Autonomous Data Warehouse
    Service Console on the Administration page. Here, you are able to allow the existing
    database users to work with OML notebooks. To find out more, please refer to the
    documentation.


    The Autonomous Data Warehouse instance can be easily registered as a data source
    for Oracle Analytics Cloud that features with a much richer set of available charts.
    Figure [7-43](#478313_1_En_7_Chapter.xhtml#Fig43) presents a Radar Area chart
    of people injured in 2017 on the roads of GP type. Each different angle corresponds
    to one particular voivodeship. The lower is the number of injured people on GP
    roads in a given voivodeship; the smaller is the blue area on this particular
    angle. There are plenty of things you can build using Analytics Cloud, and you
    perform interactive analysis and dynamically adapt the charts to come to an ideal
    dashboard in the context of your particular reporting scenario.


    ![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig43_HTML.jpg`](images/478313_1_En_7_Chapter/478313_1_En_7_Fig43_HTML.jpg)


    **Figure 7-43** Oracle Analytics Cloud


    Discussing business intelligence operations, data mining algorithms, and different
    visualization techniques like these supported by Zeppelin-based ADB extensions
    as well as Oracle Analytics Cloud is beyond the scope of this book. There is a
    broad range of materials available on the Internet, so feel free to explore.


    ## Cleanup


    We can now terminate the database instance because we won’t need it beyond this
    point. To shut down and terminate the ADW instance, you can execute the following
    command:


    ```

    $ ADW_OCID=`oci db autonomous-database list --query "data[?\"display-name\"==''road-adw'']
    | [0].id" --raw-output`

    $ echo $ADW_OCID

    ocid1.autonomousdatabase.oc1.eu-frankfurt-1.ab......763psq

    $ oci db autonomous-database delete --autonomous-database-id "$ADW_OCID" --wait-for-state
    TERMINATED

    Are you sure you want to delete this resource? [y/N]: y

    Action completed. Waiting until the resource has entered state: TERMINATED

    ```


    Similarly, use the OCI CLI to remove all objects and delete the object storage
    bucket in which we originally stored the raw input data for the database data
    load.


    ```

    $ oci os object bulk-delete -bn roadadw-load

    WARNING: This command will delete 7 objects. Are you sure you want to continue?
    [y/N]: y

    $ oci os bucket delete -bn roadadw-load

    Are you sure you want to delete this resource? [y/N]: y

    ```


    ## Summary


    This chapter was a brief and fast-paced introduction to RDBMS-backed data warehousing
    and dimension-oriented data analytics. In the age of the fully managed cloud-based
    Autonomous Database, we were able to rapidly launch a data warehouse instance
