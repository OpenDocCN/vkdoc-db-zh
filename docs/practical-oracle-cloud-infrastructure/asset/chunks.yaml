    variable "compartment_ocid" {}

    ```


    Nearly every OCI resource lives inside a compartment. This means you will be expected
    to provide an OCID of a particular compartment you would like your resources to
    exist within. The corresponding environment variable is already present in the
    `tfvars.env.sh` file.


    The compute instance resource definition inside `the web/compute.tf` configuration
    file assumes you have an existing SSH keypair with a public key available at `~/.ssh/oci_id_rsa.pub`.
    Please generate a new keypair in the `~/.ssh/` or copy the existing keypair, which
    was created in Chapter [2](#478313_1_En_2_Chapter.xhtml), to that folder.


    We will now provision the infrastructure. As soon as we see it up and running,
    I will explain the configuration files in detail. Please make sure you are in
    the `2-simple-infrastructure` directory and issue `the terraform apply` command
    like this:'
