    ## Database Monitoring


    An Autonomous Database instance is equipped with a dedicated Service Console that
    can be used to monitor the performance of the instance. The ADB Service Console
    Dashboard was already shown in Figure [7-7](#478313_1_En_7_Chapter.xhtml#Fig7).
    To access the Service Console, you can use its direct link, if you saved it earlier.
    Alternatively, you can always open the OCI Console and take the following steps:


    1.  Go to Menu ➤ Database ➤ Autonomous Data Warehouse.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click the name of your ADW instance.


    4.  Click the Service Console button.


    Tip


    If nothing happens after clicking the Service Console button, the new window might
    have been blocked by your browser. In your browser, you have to allow this page
    to open new windows.


    At the beginning of this chapter, you provisioned your ADW instance. There were
    two resource-related parameters you set for the instance, namely, the initial
    number of assigned CPUs and the initial storage capacity expressed in terabytes.
    The Dashboard provides the current and historical information about the following:


    *   The CPU allocation and utilization


    *   The storage capacity used by all database tablespaces


    *   The average number of executed SQL statements


    *   The average SQL statement response time


    The Activity view presented in Figure [7-29](#478313_1_En_7_Chapter.xhtml#Fig29)
    delivers a bit more granular information on the service consumption and lets you
    inspect detailed SQL execution information.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig29_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig29_HTML.jpg)


    Figure 7-29


    ADW database Activity view


    The Activity view lets you adapt the time interval you would like to display statistics
    for. By default, ADW persists the historical information for service consumption
    for eight days and does it in one-hour intervals. You can increase the retention
    time to a value larger than these eight days and change the performance statistics
    collection interval. Autonomous Database, just like the traditional Oracle Database,
    relies on Automatic Workload Repository (AWR) tables to persist historical performance
    statistics. The AWR tables are stored in the SYSAUX tablespace and belong to the
    SYS schema. Open SQL Developer Web as `ADMIN`, and run the following query to
    display the current AWR settings:


    ```

    select

    extract( hour from snap_interval) interval_hours,

    snap_interval,

    extract( day from retention) retention_days,

    retention

    from SYS.DBA_HIST_WR_CONTROL

    where dbid=(select con_dbid from v$database);

    ```


    The results are shown in Figure [7-30](#478313_1_En_7_Chapter.xhtml#Fig30). The
    `snap_interval` and `retention` columns are of the `INTERVAL` type so you can
    leverage the `EXTRACT()` function to print only the part (days, hours, minutes,
    seconds) you are interested in.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig30_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig30_HTML.jpg)


    Figure 7-30


    Control information for the AWR


    To alter the default retention time or the default statistics snapshot collection
    interval, you would use the `DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS`
    procedure like this:


    ```

    BEGIN

    DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(

    retention => 20160,

    interval => 60

    );

    END;

    ```


    In this example, we increase the retention period to two weeks (14 days is equal
    to the 20,160 minutes we use as the input to the `retention` parameter). Tune
    this parameter wisely because the more you increase the retention period, the
    more storage will be consumed in the `SYSAUX` tablespace for the AWR tables.


    Accessing the Monitored SQL tab in the Activity view of the ADB Service Console
    provides you with a list of actively executed and past SQL statements, as shown
    in Figure [7-31](#478313_1_En_7_Chapter.xhtml#Fig31).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig31_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig31_HTML.jpg)


    Figure 7-31


    ADW SQL monitoring


    You can inspect each individual SQL statement and learn about its Wait statistics,
    I/O statistics, execution plan performance, and, if it applies, parallelism. To
    do so, on the Monitored SQL tab, right-click a query you are interested in and
    choose the Show Details option. There will be a new pop-up area displayed to you,
    as shown in Figure [7-32](#478313_1_En_7_Chapter.xhtml#Fig32).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig32_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig32_HTML.jpg)


    Figure 7-32


    SQL execution details


