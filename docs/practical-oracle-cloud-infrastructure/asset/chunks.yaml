    \ = var.compartment_ocid\n  vcn_id         = oci_core_virtual_network.web_vcn.id\n\
    }\n代码清单 3-15 vcn.tf (根模块)\n```\n\n互联网网关 (`web_igw`) 引用了其所在 VCN 的 OCID (`vcn_id`)。它是借助\
    \ Terraform 语法实现的，该语法使您能够引用资源、变量、数据源、本地值和其他类型 Terraform 配置的属性，以及使用函数和数学计算。如果要引用资源，您将使用遵循此结构的表达式：`type.name.attribute`，例如\
    \ `oci_core_virtual_network.web_vcn.id`。如果要引用变量，您将使用此结构：`var.variable_name`，例如\
    \ `var.compartment_ocid`。\n\n根模块没有定义任何其他资源。另一方面，它确实包含一个模块定义。您可以在 `modules.tf`\
    \ Terraform 配置文件中找到它。其内容如代码清单 3-16 所示。\n\n```\ndata \"oci_identity_availability_domains\"\
    \ \"ads\" {\n  compartment_id = var.tenancy_ocid\n}\ndata \"oci_core_images\"\
    \ \"centos_image\" {\n  compartment_id           = var.tenancy_ocid\n  operating_system\
    \         = \"CentOS\"\n  operating_system_version = 7\n  shape              \
    \      = \"VM.Standard2.1\"\n}\nmodule \"web\" {\n  source              = \"./web\"\
    \n  compartment_ocid    = var.compartment_ocid\n  vcn_ocid            = oci_core_virtual_network.web_vcn.id\n\
    \  vcn_igw_ocid        = oci_core_internet_gateway.web_igw.id\n  vcn_subnet_cidr\
    \     = \"10.1.1.0/30\"\n  ads                 = data.oci_identity_availability_domains.ads.availability_domains[*].name\n\
    \  compute_image_ocid  = data.oci_core_images.centos_image.images[0].id\n}\noutput\
    \ \"web_instance_public_ip\" { value = module.web.web_public_ip }\n代码清单 3-16 modules.tf\
    \ (根模块)\n```\n\n这个文件比我们之前讨论的那一个多大约三倍的行数。Terraform 使用*数据源*来提供对云中已存在资源或在配置过程中动态计算资源的只读视图。第一个配置块定义了一个名为\
    \ `ads` 的数据源，用于查询 OCI 以获取可用性域列表。第二个配置块定义了另一个名为 `centos_image` 的数据源，负责获取可用的 CentOS\
    \ 7 基础镜像列表。操作系统基础镜像的新版本每月发布，因此这将始终为您获取当前存在版本的引用。在生产环境中，您可以硬编码特定镜像的 OCID，以避免在较新镜像发布时出现基础设施的意外变更。在我们的案例中，每次执行\
    \ Terraform 时获取最新镜像的 OCID 是可行的。"
- fmt: "# Terraform模块与配置详解\n\nTerraform 使用 **模块** 来汇集多个 Terraform 配置文件，并将其作为可在各种项目中重复使用和定制的组件。每个包含\
    \ `.tf` 文件的目录都可以看作是一个模块。查看我们项目的根目录，可以看到有两个目录可以作为模块使用。我们正在讨论的 `modules.tf` 文件位于我们称为根模块的目录中。该文件中的第三个配置块定义了一个名为\
    \ `web` 的模块，并告诉 Terraform 实例化在 `source` 属性提供的目录中定义的资源，在我们的例子中，这指的是 `web` 子目录。为了定制一个模块实例，我们可以使用我们选择的属性，只要它们在引用的模块目录中被定义为变量即可。这听起来可能有点令人困惑。让我用一个例子来解释。如果你再次查看\
    \ `modules.tf` 配置文件，你会看到我将一个 VCN 的 OCID 作为一个自定义的、任意命名的模块属性 `vcn_ocid` 传递了进去。`source`\
    \ 模块属性指向 `web` 子目录作为模块目录。如果你打开 `web/vars.tf` 配置文件，你会看到变量定义与 `modules.tf` 中的模块属性名称完全相同。为了方便你理解，我决定在图\
    \ 3-14 中展示这种关系。\n\n![图 3-14](images/478313_1_En_3_Chapter/478313_1_En_3_Fig14_HTML.jpg)\n\
    \n**图 3-14：输入变量与模块属性**\n\nVCN 和互联网网关都由 `web` 模块内定义的资源引用；因此，我们必须将它们的 OCID 作为属性值提供给模块。这是通过模块属性\
    \ `vcn_ocid` 和 `vcn_igw_ocid` 完成的，这些属性被模块内的资源视为变量。此外，我们还通过属性/变量 `vcn_subnet_cidr`\
    \ 提供了子网的地址范围块，以及通过属性/变量 `compartment_ocid` 提供了 compartment 的 OCID。\n\n我们使用在 `modules.tf`\
    \ 文件开头定义的数据源进行插值，将获取的值传递到模块中。模块属性 `compute_image_ocid` 用于传递将由 `web` 模块内定义的计算实例使用的操作系统基础镜像的\
    \ OCID。请稍等片刻，以理解这个插值表达式的作用。我们的目标是向模块传递一个 OCID，而数据源被定义为读取所有可用的 CentOS 7 镜像，并首先显示基础操作系统镜像。为了实现我们的目标，我们必须从数据源获取的\
    \ CentOS 7 基础镜像列表中选择第一个元素的 OCID。图 3-15 详细解释了表达式的每个部分负责什么。\n\n![图 3-15](images/478313_1_En_3_Chapter/478313_1_En_3_Fig15_HTML.jpg)\n\
    \n**图 3-15：Terraform 数据源插值示例**\n\n更精确地说，从技术上讲，OCI 提供程序中数据源返回的列表中的元素目前被实现为映射，因为它们将碰巧是列表元素属性名称的键与作为相应列表元素属性值的值关联起来。这允许我们在插值表达式中使用另一种基于查找的语法。我现在将通过一个基于第二个数据源的示例来展示这种替代方法。\n\
    \n> **注意**\n>\n> Oracle Cloud Infrastructure 的 Terraform 提供程序是作为 Go 语言的开源项目实现的。你可以在\
    \ GitHub 上找到源代码：`https://github.com/terraform-providers/terraform-provider-oci`。\n\
    \n模块属性 `ads` 为 `web` 模块内同名的变量提供输入。这次，该变量是一个 `list` 类型。这样，我们可以存储多个值，这些值可以基于列表索引在此变量中访问。`oci_identity_availability_domains`\
    \ 类型的数据源 `ads` 返回一个可用性域列表。尽管在我们简单的项目中只启动一个计算实例，并且本可以通过传递单个特定可用性域名来满足要求，但我决定向模块提供一个包含\
    \ API 返回的所有可用性域名的列表。这样，为计算实例选择特定可用性域的任务就委托给了模块的内部逻辑。为了构造一个列表，用于存储另一个列表中所有元素的某个属性的值，我们使用了\
    \ **splat 表达式**，如图 3-16 所示。\n\n![图 3-16](images/478313_1_En_3_Chapter/478313_1_En_3_Fig16_HTML.jpg)\n\
    \n**图 3-16：Terraform 查找插值示例**\n\n列表 3-17 展示了 `web` 模块目录内的 `vcn.tf` 文件的内容。它包含了路由表\
    \ `web_rt`、安全列表 `web_sl` 和子网 `web_subnet` 的配置。\n\n```hcl\nresource \"oci_core_route_table\"\
    \ \"web_rt\" {\n  compartment_id = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n\
    \  route_rules {\n    destination_type  = \"CIDR_BLOCK\"\n    destination    \
    \   = \"0.0.0.0/0\"\n    network_entity_id = var.vcn_igw_ocid\n  }\n  display_name\
    \ = \"web-rt\"\n}\n\nresource \"oci_core_security_list\" \"web_sl\" {\n  compartment_id\
    \ = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  egress_security_rules\
    \ {\n    stateless    = \"false\"\n    destination  = \"0.0.0.0/0\"\n    protocol\
    \     = \"all\"\n  }\n  ingress_security_rules {\n    stateless = \"false\"\n\
    \    source    = \"0.0.0.0/0\"\n    protocol  = \"6\"\n    tcp_options {\n   \
    \   min = 22\n      max = 22\n    }\n  }\n  ingress_security_rules {\n    stateless\
    \ = \"false\"\n    source    = \"0.0.0.0/0\"\n    protocol  = \"6\"\n    tcp_options\
    \ {\n      min = 80\n      max = 80\n    }\n  }\n  display_name = \"web-sl\"\n\
    }\n\nresource \"oci_core_subnet\" \"web_subnet\" {\n  compartment_id         \
    \            = var.compartment_ocid\n  vcn_id                             = var.vcn_ocid\n\
    \  display_name                       = \"web-subnet\"\n  availability_domain\
    \                = var.ads[0]\n  cidr_block                         = var.vcn_subnet_cidr\n\
    \  route_table_id                     = oci_core_route_table.web_rt.id\n  security_list_ids\
    \                  = [oci_core_security_list.web_sl.id]\n  prohibit_public_ip_on_vnic\
    \         = \"false\"\n  dns_label                          = \"webnet\"\n}\n\
    ```\n**列表 3-17：web/vcn.tf (Web 模块)**\n\n路由表 `web_rt` 定义了一条路由规则，该规则将所有旨在前往 VCN\
    \ 外部的出站流量 (`0.0.0.0/0`) 路由到在根模块中定义且其 OCID 作为模块属性传递的互联网网关。\n\n安全列表 `web_sl` 定义了一个有状态的出站规则，允许所有出站流量，以及两个有状态的入站规则，允许端口\
    \ 22 (SSH) 和 80 (HTTP) 的入站流量。需要提醒的是，如果一个有状态的安全规则允许其监督方向的流量，那么作为同一 TCP 会话一部分返回的相应数据包也将被允许。\n\
    \n子网 `web_subnet` 资源存在于根模块中定义且其 OCID 作为模块属性传递的 VCN 内。它引用了在 `web` 模块中创建并在前两段中简要描述的路由表和安全列表。`availability_domain`\
    \ 属性的值展示了如何使用索引访问列表变量：`var.ads[0]`。设置为 `false` 的 `prohibit_public_ip_on_vnic`\
    \ 属性使此子网成为公网子网。值得注意的是，即使我们只为这个子网使用一个安全列表，我们仍然必须将其 OCID 作为列表元素传递，因为 `security_list_ids`\
    \ 属性需要一个列表。这是因为一个子网可以引用多个安全列表。"
  raw: 'Terraform uses *modules* to gather multiple Terraform configuration files
    and serve them as reusable and customizable pieces for use across various projects.
    Each directory that contains `.tf` files can be seen as a module. If you look
    at the root directory of our project, you can see two directories that can serve
    as modules. The `modules.tf` file, which we are discussing right now, exists within
    the directory we called the root module. The third configuration block in this
    file defines a module (`web`) and tells Terraform to instantiate the resources
    within the directory provided as `the source` attribute, which in our case refers
    to the `web` subdirectory. To customize a module instance, we can use attributes
    of our choice as long as they are defined as variables within the referenced module
    directory. It may sound a bit confusing at the beginning. Let me explain with
    an example. If you look at the `modules.tf` configuration file again, you will
    see that I am passing the OCID of a VCN as a custom, arbitrarily named `vcn_ocid`
    module attribute. The `source` module attribute points to the `web` subdirectory
    as the module directory. If you open the `web/vars.tf` configuration file, you
    will see that the variable definitions have exactly the same names as module attributes
    in `modules.tf`. For your convenience, I’ve decided to show this relation in Figure
    [3-14](#478313_1_En_3_Chapter.xhtml#Fig14).


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig14_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig14_HTML.jpg)


    Figure 3-14


    Input variables and module attributes


    Both the VCN and the Internet gateway are referenced by the resources defined
    within the `web` module; therefore, we have to provide their OCIDs as attribute
    values to the module. This is done through `the vcn_ocid` and `vcn_igw_ocid` module
    attributes that are seen as variables by the resources inside the module. Furthermore,
    we provide an address range block for the subnet through `the vcn_subnet_cidr`
    attribute/variable as well as the OCID of the compartment through `the compartment_ocid`
    attribute/variable.


    We use interpolation on data sources that are defined at the beginning of the
    `modules.tf` file to pass the fetched values into the module. The `compute_image_ocid`
    module attribute is used to convey the OCID of an operating system base image
    to be used by the compute instance defined inside the `web` module. Please hold
    on a minute to understand what this interpolation expression does. Our goal is
    to pass a single OCID into the module, while the data source is defined to read
    all the available CentOS 7 images, showing the base operating system images first.
    To achieve our goal, we have to select the OCID of the first element in the list
    of CentOS 7 base images fetched by the data source. Figure [3-15](#478313_1_En_3_Chapter.xhtml#Fig15)
    explains in detail what each part of the expression is responsible for.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig15_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Terraform data source interpolation example


    To be more precise, technically, the elements on the list returned by data sources
    in the OCI provider are currently implemented as maps because they associate keys
    that happen to be the list element attribute names with values that are the corresponding
    list element attribute values. This allows us to use another lookup-based syntax
    in our interpolation expression. I am going to present this alternative right
    now with an example based on the second data source.


    Note


    The Terraform provider for Oracle Cloud Infrastructure is implemented as an open
    source project in the Go language. You can find the source code on Github at [`https://github.com/terraform-providers/terraform-provider-oci`](https://github.com/terraform-providers/terraform-provider-oci).


    The `ads` module attribute provides the input to a variable with the same name
    inside the `web` module. This time, the variable is of a `list` type. In this
    way, we can store multiple values that can be accessed based on the list index
    in this variable. The `ads` data source of the `oci_identity_availability_domains`
    type returns a list of availability domains. Although we launch only one compute
    instance in our simple project and could have lived with passing just a single
    name of a particular availability domain, I’ve decided to provide the module with
    a list that contains the names of all availability domains returned by the API.
    In this way, the choice of a particular availability domain for the compute instance
    is delegated to the internals of the module. To construct a list storing the values
    that belong to one attribute of all elements in another list, we are using the
    *splat expression*, explained in Figure [3-16](#478313_1_En_3_Chapter.xhtml#Fig16).


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig16_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Terraform lookup interpolation example


    Listing [3-17](#478313_1_En_3_Chapter.xhtml#PC70) presents the contents of the
    `vcn.tf` file that exists inside the `web` module directory. It contains the configuration
    for the route table (`web_rt`), the security list (`web_sl`), and a subnet (`web_subnet`).


    ```

    resource "oci_core_route_table" "web_rt" {

    compartment_id = var.compartment_ocid

    vcn_id = var.vcn_ocid

    route_rules {

    destination_type = "CIDR_BLOCK"

    destination = "0.0.0.0/0"

    network_entity_id = var.vcn_igw_ocid

    }

    display_name = "web-rt"

    }

    resource "oci_core_security_list" "web_sl" {

    compartment_id = var.compartment_ocid

    vcn_id = var.vcn_ocid

    egress_security_rules {

    stateless="false"

    destination="0.0.0.0/0"

    protocol="all"

    }

    ingress_security_rules {

    stateless="false"

    source="0.0.0.0/0"

    protocol="6"

    tcp_options {

    min=22

    max=22

    }

    }

    ingress_security_rules {

    stateless="false"

    source="0.0.0.0/0"

    protocol="6"

    tcp_options {

    min=80

    max=80

    }

    }

    display_name = "web-sl"

    }

    resource "oci_core_subnet" "web_subnet" {

    compartment_id = var.compartment_ocid

    vcn_id = var.vcn_ocid

    display_name = "web-subnet"

    availability_domain = var.ads[0]

    cidr_block = var.vcn_subnet_cidr

    route_table_id = oci_core_route_table.web_rt.id

    security_list_ids = [ oci_core_security_list.web_sl.id ]

    prohibit_public_ip_on_vnic = "false"

    dns_label = "webnet"

    }

    Listing 3-17

    web/vcn.tf (Web Module)

    ```


    The route table (`web_rt`) defines a single route rule that directs the entire
    outbound traffic (`0.0.0.0/0`) that is destined to travel outside the VCN to the
    Internet gateway that has been defined in the `root` module and whose OCID has
    been passed as a module attribute.


    The security list (`web_sl`) defines one stateful egress rule that allows the
    entire outbound traffic and two stateful ingress rules that allow the inbound
    traffic on ports 22 (SSH) and 80 (HTTP). As a reminder, if a stateful security
    rule permits the traffic in the direction it oversees, the corresponding packets
    that return as part of the same TCP session will also be allowed.


    The subnet (`web_subnet`) resource exists within the VCN that has been defined
    in the `root` module and whose OCID has been passed as a module attribute. It
    references the route table and the security list created in the `web` module and
    briefly described in two previous paragraphs. The value for the `availability_domain`
    attribute shows how to access a list variable using an index: `var.ads[0]`. The
    `prohibit_public_ip_on_vnic` attribute set to `false` makes this subnet public.
    It is worth noting that even though we use just one security list for this subnet,
    we still have to pass its OCID as a list element because the `security_list_ids`
    attribute expects a list. It comes from the fact that a subnet can reference more
    than one security list.'
