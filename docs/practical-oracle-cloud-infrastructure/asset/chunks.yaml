    from a group can be done in two ways. The first option is to use the group details
    view, just like this:


    1.  Go to Menu ➤ Identity ➤ Groups.


    2.  Click the name of the group to which you want to add a user.


    3.  On the Group Members tab, click Add User to Group.


    4.  Select the user you want to add to the group.


    Alternatively, you can perform the same operation from the user details screen.


    1.  Go to Menu ➤ Identity ➤ Users.


    2.  Click the name of the user you want to add to a group.


    3.  On the Groups tab, click Add User to Group.


    4.  Select the group to which you want to add to the user.


    Finally, you are more than welcome to do this task using the CLI. The `iam group
    add-user` command requires the user OCID and the group OCID, so either find them
    in the OCI Console or run these two queries:


    ```

    $ USER_OCID=`oci iam user list -c $TENANCY_OCID --query "data[?name==''sandbox-admin'']
    | [0].id" --all --raw-output`

    $ GROUP_OCID=`oci iam group list -c $TENANCY_OCID --query "data[?name==''sandbox-admins'']
    | [0].id" --all --raw-output`

    ```


    To add a user to a group, use the `oci iam group add-user` CLI command.


    ```

    $ oci iam group add-user --user-id $USER_OCID --group-id $GROUP_OCID

    ```


    The `sandbox-admin` user gets immediately added to the `sandbox-admins` group.
    You can verify it in the OCI Console in the group details view, as shown in Figure
    [4-16](#478313_1_En_4_Chapter.xhtml#Fig16).


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig16_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    Group members in *the* OCI Console


    Furthermore, it is feasible to employ the CLI command `iam group list-users` to
    fetch the list of group members of a particular group. To do so, please use the
    following command:


    ```

    $ oci iam group list-users --group-id $GROUP_OCID --query "data[*].name" -c $TENANCY_OCID
    --all

    [

    "sandbox-admin"

    ]

    ```


    Now, before you read on, please add the `sandbox-user` user to the `sandbox-users`
    group. We will need it in the future chapters. At this stage, you should have
    the two users added to their corresponding groups. Each user should have its unique
    keypair already in place and the public key uploaded. The expected setup is conceptually
    shown in Figure [4-17](#478313_1_En_4_Chapter.xhtml#Fig17).


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig17_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Users and groups for Chapter [4](#478313_1_En_4_Chapter.xhtml)


    As a next step, please add a new profile for the `sandbox-user` user to the `~/.oci/config`
    file like you’ve done for the `sandbox-admin` user in the previous section. Listing [4-3](#478313_1_En_4_Chapter.xhtml#PC21)
    presents the expected structure of your `~/.oci/config` file.


    ```

    [DEFAULT]

    tenancy=...

    region=...

    user=...

    fingerprint=...

    key_file=...

    pass_phrase=...

    [SANDBOX-ADMIN]

    user=ocid1.user.oc1..aaaaaaaa3n5.........7d5dca

    fingerprint=91:64:1b:4e:4e:35:4a:06:b2:8f:6f:53:ae:7d:0d:ee

    key_file=~/apikeys/api.sandbox-admin.pem

    pass_phrase=put-here-sandbox-admin-private-key-password

    [SANDBOX-USER]

    user=ocid1.user.oc1..aaaaaaaatimmpj37ao............cdzqpxa

    fingerprint= 61:68:a5:1c:40:ef:51:fd:1a:74:6b:d9:9f:1c:b2:b8

    key_file=~/apikeys/api.sandbox-user.pem

    pass_phrase=put-here-sandbox-user-private-key-password

    Listing 4-3

    OCI CLI Configuration File for Chapter 4

    ```


    Last but not least, we are going to create two profiles in the `~/.oci/oci_cli_rc`
    file to set the default compartment for each CLI query. Please replace the OCIDs
    in Listing [4-4](#478313_1_En_4_Chapter.xhtml#PC22) with the OCID of your `Sandbox`
    compartment. If you do not remember what kind of file that is, you will find more
    information in Chapter [3](#478313_1_En_3_Chapter.xhtml).


    ```

    [DEFAULT]

    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa

    [SANDBOX-ADMIN]

    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa

    [SANDBOX-USER]

    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa

    Listing 4-4

    OCI CLI RC File for Chapter 4

    ```


    All set? Let’s explore how the access control to cloud resources is organized.'
