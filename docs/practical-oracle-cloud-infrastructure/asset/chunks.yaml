    \ get nodes` 命令列出了工作节点。主节点不会列在 OKE 集群中。`kubectl get namespaces` 命令列出了 Kubernetes\
    \ 命名空间，可以将其视为在同一物理集群中隔离不同环境的一种便捷方式。各种 Kubernetes 对象（如 Pod 或服务）存在于特定命名空间的范围内。`kube-system`\
    \ 命名空间用于托管 Kubernetes 网络代理（`kube-proxy-`）和集群功能插件，例如容器网络接口插件 Pod（`kube-flannel-`）或集群\
    \ DNS Pod（`kube-dns-`）。您可以使用 `kubectl get pods` 命令并设置命名空间参数 `-n` 为 `kube-system`\
    \ 值来列出这些 Pod。\n\n这三个命令的输出实际上证明了您已通过 Kubernetes OCI 授权器成功认证。但给定用户在 Kubernetes API\
    \ 方面的权限有多大呢？有没有办法检查呢？是的，有。一个直接的方法是 `auth can-i` Kubernetes API 调用。您可以使用 `kubectl`\
    \ 这样调用：\n\n```\n[opc@dev-vm ~]$ kubectl auth can-i create namespace --all-namespaces\n\
    Yes\n[opc@dev-vm ~]$ kubectl auth can-i '*' '*' --namespace=default\nyes\n```\n\
    \n第一次执行该命令是询问 Kubernetes API，代表 `kubectl` 进行调用的用户是否有权创建 Kubernetes 命名空间。答案不言自明，不是吗？第二条命令使用\
    \ `*` 通配符来检查在 `default` 命名空间中，是否允许该用户执行所有类型的操作。\n\n事实上，正如我所提到的，`sandbox-admin`\
    \ 用户应该能够对该集群的 Kubernetes API 执行所有类型的操作，因为他属于 `Sandbox` 管理员 IAM 组，并因此被 Kubernetes\
    \ OCI 授权器视为该集群的集群管理员。让我们验证一下。\n\n```\n[opc@dev-vm ~]$ kubectl auth can-i '*' '*'\
    \ --all-namespaces\nYes\n```\n\n这一切都是正确的。`sandbox-admin` 用户被授权在所有 Kubernetes 命名空间中对所有\
    \ Kubernetes 对象执行所有操作。\n\n### Sandbox 命名空间\n\nKubernetes 命名空间可用于在同一物理集群中隔离不同环境。大多数\
    \ Kubernetes 资源都是命名空间范围的，在创建 Pod 或服务等特定资源时需要指定命名空间。在使用 Kubernetes DNS 进行 Kubernetes\
    \ 服务名称解析时，命名空间也很有用，因为 Kubernetes 服务的 FQDN 包含其命名空间。我们希望 `sandbox-user` 能够执行诸如创建\
    \ Kubernetes 对象（如 Pod、服务和部署）等操作，但仅限于专用 Kubernetes 命名空间的范围内。最后但同样重要的是，您可以设置各种配额来限制特定命名空间中\
    \ Kubernetes 资源的消耗。\n\n让我们创建一个名为 `dev-sandbox` 的新 Kubernetes 命名空间。\n\n```\n[opc@dev-vm\
    \ ~]$ cd oci-book/chapter08/3-kubernetes/platform\n[opc@dev-vm ~]$ kubectl create\
    \ -f dev-sandbox-namespace.yaml\nnamespace/dev-sandbox created\n```\n\n我们使用了 `kubectl\
    \ create` 命令来创建一个定义在 YAML Kubernetes 对象描述符中的新 Kubernetes 命名空间资源。我们通过 `-f` 参数传递了文件的相对路径。清单\
    \ 8-11 显示了该 YAML 文件。\n\n```\napiVersion: v1\nkind: Namespace\nmetadata:\n  name:\
    \ dev-sandbox\n  labels:\n    environment: dev\n```\n**清单 8-11**\n`dev-sandbox-namespace.yaml`\n\
    \n这个新的 Kubernetes 对象是 `Namespace` 类型，名称为 `dev-sandbox`，并带有自定义的 `environment` 标签，其值设置为\
    \ `dev`。由于 Kubernetes 平台的可插拔和可扩展性，标签通常是关联各种对象的主要手段。在这种情况下，我们将不使用这个特定的标签，但我借此机会向您展示如何为\
    \ Kubernetes 对象添加标签。您现在可以使用 `kubectl` 来列出并描述新创建的命名空间。\n\n```\n[opc@dev-vm ~]$\
    \ kubectl get namespaces\nNAME          STATUS   AGE\ndefault       Active   15h\n\
    dev-sandbox   Active   41m\nkube-public   Active   15h\nkube-system   Active \
    \  15h\n[opc@dev-vm ~]$ kubectl describe namespace dev-sandbox\nName:        \
    \ dev-sandbox\nLabels:       environment=dev\nAnnotations:  \nStatus:       Active\n\
    No resource quota.\nNo resource limits.\n[opc@dev-vm ~]$ exit\n```\n\n现在，有了新的命名空间，我们可以准备\
    \ `sandbox-user` 用户来连接 Kubernetes API 了。\n"
- fmt: '# Connecting As Developer


    我们已经了解到，要使用`kubectl`与Kubernetes API通信，我们必须拥有一个kubeconfig文件。此外，您也看到OKE客户端认证机制假设令牌是使用OCI
    CLI在后台动态生成的。基于此事实，我们上传了`sandbox-admin`用户的CLI配置和API签名密钥。在本章前面，我们使用了`ce cluster
    create-kubeconfig` CLI为`sandbox-admin`用户生成kubeconfig。该命令是代表`sandbox-admin`用户发出的，这要归功于CLI配置文件中存在`SANDBOX-ADMIN`配置文件。在本节中，我们将让`sandbox-user`生成一个个人kubeconfig文件。很明显，并非每个IAM用户都应被允许生成个人kubeconfig文件。要生成kubeconfig文件，OCI
    API要求调用API所代表的IAM用户拥有`GetClusterKubeconfig`权限集。此权限包含在`use clusters` IAM策略动词中。让我们创建一个新策略，允许`sandbox-users`使用`Sandbox`
    compartment中的所有OKE集群。尽管该策略是为`sandbox-users`组的成员准备的，但我们是像这样使用`SANDBOX-ADMIN`配置文件以`sandbox-admin`身份执行CLI命令的：


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo $TENANCY_OCID

    ocid1.tenancy.oc1..aa.........3yymfa

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes

    $ cd policies

    $ oci iam policy create --name sandbox-users-containers-policy --description "Containers-related
    policy for regular Sandbox users"  --statements "file://sandbox-users.containers.policy.json"
    --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "sandbox-users-containers-policy",

    "statements": [

    "allow group sandbox-users to use clusters in compartment Sandbox"

    ],

    ...

    }

    ```


    列表[8-12](#478313_1_En_8_Chapter.xhtml#PC48)展示了我们用来创建新IAM策略的JSON文件的内容。正如我之前所说，我们正在授予`sandbox-users`组的成员使用`Sandbox`
    compartment中所有OKE集群的权利。这组权限也包括生成个人kubeconfig文件的权利。


    ```

    [

    "allow group sandbox-users to use clusters in compartment Sandbox"

    ]

    Listing 8-12

    sandbox-users.containers.policy.json

    ```


    现在，我们已准备好通过应用`SANDBOX-USER` CLI配置文件，代表`sandbox-user`用户执行`ce cluster create-kubeconfig`
    CLI命令，如下所示：


    ```

    $ oci ce cluster create-kubeconfig --cluster-id $CLUSTER_OCID --file ~/.kube/sandbox-user.config
    --region $REGION --profile SANDBOX-USER

    New config written to the file /Users/mjk/.kube/sandbox-user.config

    $ chmod 600 ~/.kube/sandbox-user.config

    ```


    我们必须通过设置正确的OCI CLI配置文件来修改新生成的kubeconfig文件。请编辑`sandbox-user.config`文件并像这样添加`SANDBOX-USER`配置文件：


    ```

    ...

    users:

    - name: user-c2gmyzqguzt

    user:

    exec:

    apiVersion: client.authentication.k8s.io/v1beta1

    args:

    - ce

    - cluster

    - generate-token

    - --profile

    - SANDBOX-USER

    - --cluster-id

    ...

    ```


    总而言之，在此阶段，我们有两个配置文件。


    ```

    $ ls -l ~/.kube | awk ''{print $1, $9}''

    -rw------- sandbox-admin.config

    -rw------- sandbox-user.config

    ```


    现在，将最新的kubeconfig文件上传到开发人员实例。


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.kube/sandbox-user.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.kube

    sandbox-user-config           100% 3669   262.2KB/s   00:00

    ```


    我们必须通过添加`SANDBOX-USER`配置文件来扩展`dev-vm`上的OCI CLI配置。让我们在本地完成此操作，然后再次上传以替换先前版本。


    ```

    $ cat ~/.oci/config | grep -A 4 "\[SANDBOX-USER\]" >> ~/.oci/devvm.config

    $ cat ~/.oci/config | grep tenancy >> ~/.oci/devvm.config

    $ cat ~/.oci/config | grep region >> ~/.oci/devvm.config

    $ scp -i ~/.ssh/oci_id_rsa ~/.oci/devvm.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.oci/config

    devvm.config   100%  656   5.2KB/s

    ```


    最后但同样重要的是，我们需要上传`sandbox-user`的API签名密钥。


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-user.pem opc@$DEV_VM_PUBLIC_IP:/home/opc/.apikeys/api.sandbox-user.pem

    api.sandbox-user.pem   100% 1766    13.7KB/s

    ```


    让我们连接到开发机器。


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    ```


    此时，开发人员机器上的`~/.kube`目录中应该有两个kubeconfig文件：


    ```

    [opc@dev-vm ~]$ chmod 600 ~/.kube/sandbox-user.config

    [opc@dev-vm ~]$ ls -l ~/.kube | grep config | awk ''{print $1, $9}''

    -rw-------. config

    -rw-------. sandbox-user.config

    ```


    您将使用`--kubeconfig`参数指示`kubectl`工具应使用哪个文件，如图[8-26](#478313_1_En_8_Chapter.xhtml#Fig26)所示。如果将参数留空，则默认情况下将选择`~/.kube/config`文件。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig26_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig26_HTML.jpg)


    **图 8-26**

    Kubeconfig 文件


    让我们尝试列出`dev-sandbox`命名空间中的Pod，这次代表`sandbox-user`。请记住，通过像这样设置`--kubeconfig`参数来选择适当的kubeconfig文件：


    ```

    [opc@dev-vm]$ kubectl --kubeconfig ~/.kube/sandbox-user-config get pods -n dev-sandbox

    Error from server (Forbidden): pods is forbidden: User "ocid1.user.oc1..aa.........dzqpxa"
    cannot list resource "pods" in API group "" in the namespace "dev-sandbox"

    ```


    收到的响应清楚地表明，给定用户无权执行此类操作。`sandbox-user`用户属于一个未分配`manage clusters`策略的组。因此，该用户在k8s-cluster
    OKE集群中没有预定义的角色集。我们必须显式地将用户绑定到一个角色。我们将创建一个*角色绑定*，将`sandbox-user`绑定到`edit`角色，并且仅限于`dev-sandbox`命名空间的范围。`edit`角色是预定义的Kubernetes角色，它给予对特定命名空间中大多数类型的Kubernetes对象的读写访问权限，但不允许用户创建角色绑定。


    我们现在将创建一个Rolebinding Kubernetes对象，该对象将`sandbox-user`绑定到`dev-sandbox`命名空间上下文中的预定义edit角色。您必须代表`sandbox-admin`执行`kubectl
    create rolebinding`，并像这样省略`--kubeconfig`参数：


    ```

    [opc@dev-vm]$ SANDBOX_USER_OCID=ocid1.user.oc1..aa.........dzqpxa

    [opc@dev-vm]$ kubectl create rolebinding sandbox-users-binding --clusterrole=edit
    --namespace=dev-sandbox --user=$SANDBOX_USER_OCID

    rolebinding.rbac.authorization.k8s.io/sandbox-users-binding created

    ```


    我们可以再次尝试列出`dev-sandbox`命名空间中的Pod。请记住设置`--kubeconfig`参数以作为`sandbox-user`用户运行命令。


    ```

    [opc@dev-vm]$ kubectl --kubeconfig ~/.kube/sandbox-user-config get pods -n dev-sandbox

    No resources found.

    ```


    `No resources found`消息证明我们能够作为`sandbox-user`调用Kubernetes API。


    对于`sandbox-user`用户，我们期望仅在`dev-sandbox`命名空间的范围内执行所有`kubectl`命令。您可以像这样将默认命名空间添加到您的配置文件中，而不是显式使用`-n`参数：


    ```

    [opc@dev-vm]$ cat ~/.kube/sandbox-user.config

    ...

    contexts:

    - context:

    cluster: cluster-...

    namespace: dev-sandbox

    user: user-...

    name: context-...

    ...

    ```


    最后，我们已准备好将一些Pod部署到我们的OKE集群。'
  raw: '### Connecting As Developer


    We have already learned that to talk to the Kubernetes API using `kubectl`, we
    have to possess a kubeconfig file. Furthermore, you’ve also seen that the OKE
    client authentication mechanism assumes that tokens are dynamically generated
    using the OCI CLI in the background. Based on that fact, we uploaded the CLI configuration
    and API signing key for the `sandbox-admin` user. Earlier in this chapter, we
    employed the `ce cluster create-kubeconfig` CLI to generate the kubeconfig for
    the `sandbox-admin` user. The command was issued on behalf of the `sandbox-admin`
    user, thanks to the presence of the `SANDBOX-ADMIN` profile in the CLI configuration
    file. In this section, we are going to let the `sandbox-user` generate a personal
    kubeconfig file. It is rather clear that not every IAM user should be allowed
    to generate personal kubeconfig files. To generate a kubeconfig file, the OCI
    API requires the `GetClusterKubeconfig` permission set for the IAM user on whose
    behalf the API is called. This permission is included with the `use clusters`
    IAM policy verb. Let’s create a new policy that allows `sandbox-users` to use
    all OKE clusters in the `Sandbox` compartment. Even though the policy is intended
    for the members of the `sandbox-users` group , we are executing the CLI command
    as `sandbox-admin` using the `SANDBOX-ADMIN` profile like this:


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo $TENANCY_OCID

    ocid1.tenancy.oc1..aa.........3yymfa

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes

    $ cd policies

    $ oci iam policy create --name sandbox-users-containers-policy --description "Containers-related
    policy for regular Sandbox users"  --statements "file://sandbox-users.containers.policy.json"
    --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "sandbox-users-containers-policy",

    "statements": [

    "allow group sandbox-users to use clusters in compartment Sandbox"

    ],

    ...

    }

    ```


    Listing [8-12](#478313_1_En_8_Chapter.xhtml#PC48) presents the contents of the
    JSON file we used to create the new IAM policy. As I said before, we are giving
    the right to use all OKE clusters in the `Sandbox` compartment to the members
    of the `sandbox-users` group. This set of permissions includes the right to generate
    a personal kubeconfig file as well.


    ```

    [

    "allow group sandbox-users to use clusters in compartment Sandbox"

    ]

    Listing 8-12

    sandbox-users.containers.policy.json

    ```


    We are now ready to execute the `ce cluster create-kubeconfig` CLI command on
    behalf of the `sandbox-user` user by applying the `SANDBOX-USER` CLI profile like
    this:


    ```

    $ oci ce cluster create-kubeconfig --cluster-id $CLUSTER_OCID --file ~/.kube/sandbox-user.config
    --region $REGION --profile SANDBOX-USER

    New config written to the file /Users/mjk/.kube/sandbox-user.config

    $ chmod 600 ~/.kube/sandbox-user.config

    ```


    We have to amend the newly generated kubeconfig file by setting the correct OCI
    CLI profile. Please edit the `sandbox-user.config` file and add the `SANDBOX-USER`
    profile like this:


    ```

    ...

    users:

    - name: user-c2gmyzqguzt

    user:

    exec:

    apiVersion: client.authentication.k8s.io/v1beta1

    args:

    - ce

    - cluster

    - generate-token

    - --profile

    - SANDBOX-USER

    - --cluster-id

    ...

    ```


    All in all, at this stage, we have two configuration files.


    ```

    $ ls -l ~/.kube | awk ''{print $1, $9}''

    -rw------- sandbox-admin.config

    -rw------- sandbox-user.config

    ```


    Now, upload the newest kubeconfig file to the developer instance.


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.kube/sandbox-user.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.kube

    sandbox-user-config           100% 3669   262.9KB/s   00:00

    ```


    We have to extend the OCI CLI configuration on the `dev-vm` by adding the `SANDBOX-USER`
    profile. Let’s do it locally and upload it again to replace the previous version.


    ```

    $ cat ~/.oci/config | grep -A 4 "\[SANDBOX-USER\]" >> ~/.oci/devvm.config

    $ cat ~/.oci/config | grep tenancy >> ~/.oci/devvm.config

    $ cat ~/.oci/config | grep region >> ~/.oci/devvm.config

    $ scp -i ~/.ssh/oci_id_rsa ~/.oci/devvm.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.oci/config

    devvm.config   100%  656   5.2KB/s

    ```


    Last but not least, we need to upload the API signing key for the `sandbox-user`.


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-user.pem opc@$DEV_VM_PUBLIC_IP:/home/opc/.apikeys/api.sandbox-user.pem

    api.sandbox-user.pem   100% 1766    13.7KB/s

    ```


    Let’s connect to the developer machine.


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    ```


    At this moment, there should be two kubeconfig files in the `~/.kube` directory
    on the developer machine:


    ```

    [opc@dev-vm ~]$ chmod 600 ~/.kube/sandbox-user.config

    [opc@dev-vm ~]$ ls -l ~/.kube | grep config | awk ''{print $1, $9}''

    -rw-------. config

    -rw-------. sandbox-user.config

    ```


    You are going to use the `--kubeconfig` parameter to instruct the `kubectl` tool
    which file it should use, as illustrated in Figure [8-26](#478313_1_En_8_Chapter.xhtml#Fig26).
    If you leave the parameter unset, the `~/.kube/config` file will be selected by
    default.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig26_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig26_HTML.jpg)


    Figure 8-26


    Kubeconfig files


    Let’s try to list the pods in the `dev-sandbox` namespace, this time on behalf
    of the `sandbox-user`. Remember to choose the appropriate kubeconfig file by setting
    the `--kubeconfig` parameter like this:


    ```

    [opc@dev-vm]$ kubectl --kubeconfig ~/.kube/sandbox-user-config get pods -n dev-sandbox

    Error from server (Forbidden): pods is forbidden: User "ocid1.user.oc1..aa.........dzqpxa"
    cannot list resource "pods" in API group "" in the namespace "dev-sandbox"

    ```


    The response you received clearly states that the given user is not entitled to
    perform this kind of operation. The `sandbox-user` user belongs to a group that
    does not have the `manage clusters` policy assigned. As a result, this particular
    user has no predefined role set in the k8s-cluster OKE cluster. We have to explicitly
    bind the user to a role. We are going to create a *role binding* that binds the
    `sandbox-user` to the `edit` role, solely in the scope of the `dev-sandbox` namespace.
    The `edit` role is a predefined Kubernetes role that gives write-read access over
    most types of Kubernetes objects in a particular namespace but does not allow
    the user to create role bindings.


    We are now going to create a Rolebinding Kubernetes object that binds the `sandbox-user`
    to the predefined edit role in the context of the `dev-sandbox` namespace. You
    have to execute the `kubectl create rolebinding` on behalf of the `sandbox-admin`
    by skipping the `--kubeconfig` parameter like this:


    ```

    [opc@dev-vm]$ SANDBOX_USER_OCID=ocid1.user.oc1..aa.........dzqpxa

    [opc@dev-vm]$ kubectl create rolebinding sandbox-users-binding --clusterrole=edit
    --namespace=dev-sandbox --user=$SANDBOX_USER_OCID

    rolebinding.rbac.authorization.k8s.io/sandbox-users-binding created

    ```


    We can try to list the pods in the `dev-sandbox` namespace again. Remember to
    set the `--kubeconfig` parameter to run the command as the `sandbox-user` user.


    ```

    [opc@dev-vm]$ kubectl --kubeconfig ~/.kube/sandbox-user-config get pods -n dev-sandbox

    No resources found.

    ```


    The `No resources found` message proves that we were able to call Kubernetes API
    as `sandbox-user`.


    For the `sandbox-user` user, we expect to execute all `kubectl` commands only
    within the scope of the `dev-sandbox` namespace. Instead of using the `-n` parameter
    explicitly, you can add the default namespace to your config file like this:


    ```

    [opc@dev-vm]$ cat ~/.kube/sandbox-user.config

    ...

    contexts:

    - context:

    cluster: cluster-...

    namespace: dev-sandbox

    user: user-...

    name: context-...

    ...

    ```


    Finally, we are ready to deploy some pods to our OKE cluster.'
  trans: '# 以开发者身份连接


    我们已经了解到，要使用`kubectl`与 Kubernetes API 通信，我们必须拥有一个 kubeconfig 文件。此外，您也看到 OKE 客户端认证机制假设令牌是使用
    OCI CLI 在后台动态生成的。基于此事实，我们上传了`sandbox-admin`用户的 CLI 配置和 API 签名密钥。在本章前面，我们使用了`ce
    cluster create-kubeconfig` CLI 为`sandbox-admin`用户生成 kubeconfig。该命令是代表`sandbox-admin`用户发出的，这要归功于
    CLI 配置文件中存在`SANDBOX-ADMIN`配置文件。在本节中，我们将让`sandbox-user`生成一个个人 kubeconfig 文件。很明显，并非每个
    IAM 用户都应被允许生成个人 kubeconfig 文件。要生成 kubeconfig 文件，OCI API 要求调用 API 所代表的 IAM 用户拥有`GetClusterKubeconfig`权限集。此权限包含在`use
    clusters` IAM 策略动词中。让我们创建一个新策略，允许`sandbox-users`使用`Sandbox` compartment 中的所有 OKE
    集群。尽管该策略是为`sandbox-users`组的成员准备的，但我们是像这样使用`SANDBOX-ADMIN`配置文件以`sandbox-admin`身份执行
    CLI 命令的：


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo $TENANCY_OCID

    ocid1.tenancy.oc1..aa.........3yymfa

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes

    $ cd policies

    $ oci iam policy create --name sandbox-users-containers-policy --description "Containers-related
    policy for regular Sandbox users"  --statements "file://sandbox-users.containers.policy.json"
    --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "sandbox-users-containers-policy",

    "statements": [

    "allow group sandbox-users to use clusters in compartment Sandbox"

    ],

    ...

    }

    ```


    列表 8-12 展示了我们用来创建新 IAM 策略的 JSON 文件的内容。正如我之前所说，我们正在授予`sandbox-users`组的成员使用`Sandbox`
    compartment 中所有 OKE 集群的权利。这组权限也包括生成个人 kubeconfig 文件的权利。


    ```

    [

    "allow group sandbox-users to use clusters in compartment Sandbox"

    ]

    列表 8-12

    sandbox-users.containers.policy.json

    ```


    现在，我们已准备好通过应用`SANDBOX-USER` CLI 配置文件，代表`sandbox-user`用户执行`ce cluster create-kubeconfig`
    CLI 命令，如下所示：


    ```

    $ oci ce cluster create-kubeconfig --cluster-id $CLUSTER_OCID --file ~/.kube/sandbox-user.config
    --region $REGION --profile SANDBOX-USER

    New config written to the file /Users/mjk/.kube/sandbox-user.config

    $ chmod 600 ~/.kube/sandbox-user.config

    ```


    我们必须通过设置正确的 OCI CLI 配置文件来修改新生成的 kubeconfig 文件。请编辑`sandbox-user.config`文件并像这样添加`SANDBOX-USER`配置文件：


    ```

    ...

    users:

    - name: user-c2gmyzqguzt

    user:

    exec:

    apiVersion: client.authentication.k8s.io/v1beta1

    args:

    - ce

    - cluster

    - generate-token

    - --profile

    - SANDBOX-USER

    - --cluster-id

    ...

    ```


    总而言之，在此阶段，我们有两个配置文件。


    ```

    $ ls -l ~/.kube | awk ''{print $1, $9}''

    -rw------- sandbox-admin.config

    -rw------- sandbox-user.config

    ```


    现在，将最新的 kubeconfig 文件上传到开发人员实例。


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.kube/sandbox-user.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.kube

    sandbox-user-config           100% 3669   262.2KB/s   00:00

    ```


    我们必须通过添加`SANDBOX-USER`配置文件来扩展`dev-vm`上的 OCI CLI 配置。让我们在本地完成此操作，然后再次上传以替换先前版本。


    ```

    $ cat ~/.oci/config | grep -A 4 "\[SANDBOX-USER\]" >> ~/.oci/devvm.config

    $ cat ~/.oci/config | grep tenancy >> ~/.oci/devvm.config

    $ cat ~/.oci/config | grep region >> ~/.oci/devvm.config

    $ scp -i ~/.ssh/oci_id_rsa ~/.oci/devvm.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.oci/config

    devvm.config   100%  656   5.2KB/s

    ```


    最后但同样重要的是，我们需要上传`sandbox-user`的 API 签名密钥。


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-user.pem opc@$DEV_VM_PUBLIC_IP:/home/opc/.apikeys/api.sandbox-user.pem

    api.sandbox-user.pem   100% 1766    13.7KB/s

    ```


    让我们连接到开发机器。


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    ```


    此时，开发人员机器上的`~/.kube`目录中应该有两个 kubeconfig 文件：


    ```

    [opc@dev-vm ~]$ chmod 600 ~/.kube/sandbox-user.config

    [opc@dev-vm ~]$ ls -l ~/.kube | grep config | awk ''{print $1, $9}''

    -rw-------. config

    -rw-------. sandbox-user.config

    ```


    您将使用`--kubeconfig`参数指示`kubectl`工具应使用哪个文件，如图 8-26 所示。如果将参数留空，则默认情况下将选择`~/.kube/config`文件。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig26_HTML.jpg](img/478313_1_En_8_Fig26_HTML.jpg)


    **图 8-26**

    Kubeconfig 文件


    让我们尝试列出`dev-sandbox`命名空间中的 Pod，这次代表`sandbox-user`。请记住，通过像这样设置`--kubeconfig`参数来选择适当的
    kubeconfig 文件：


    ```

    [opc@dev-vm]$ kubectl --kubeconfig ~/.kube/sandbox-user-config get pods -n dev-sandbox

    Error from server (Forbidden): pods is forbidden: User "ocid1.user.oc1..aa.........dzqpxa"
    cannot list resource "pods" in API group "" in the namespace "dev-sandbox"

    ```


    收到的响应清楚地表明，给定用户无权执行此类操作。`sandbox-user`用户属于一个未分配`manage clusters`策略的组。因此，该用户在 k8s-cluster
    OKE 集群中没有预定义的角色集。我们必须显式地将用户绑定到一个角色。我们将创建一个*角色绑定*，将`sandbox-user`绑定到`edit`角色，并且仅限于`dev-sandbox`命名空间的范围。`edit`角色是预定义的
    Kubernetes 角色，它给予对特定命名空间中大多数类型的 Kubernetes 对象的读写访问权限，但不允许用户创建角色绑定。


    我们现在将创建一个 Rolebinding Kubernetes 对象，该对象将`sandbox-user`绑定到`dev-sandbox`命名空间上下文中的预定义
    edit 角色。您必须代表`sandbox-admin`执行`kubectl create rolebinding`，并像这样省略`--kubeconfig`参数：


    ```

    [opc@dev-vm]$ SANDBOX_USER_OCID=ocid1.user.oc1..aa.........dzqpxa

    [opc@dev-vm]$ kubectl create rolebinding sandbox-users-binding --clusterrole=edit
    --namespace=dev-sandbox --user=$SANDBOX_USER_OCID

    rolebinding.rbac.authorization.k8s.io/sandbox-users-binding created

    ```


    我们可以再次尝试列出`dev-sandbox`命名空间中的 Pod。请记住设置`--kubeconfig`参数以作为`sandbox-user`用户运行命令。


    ```

    [opc@dev-vm]$ kubectl --kubeconfig ~/.kube/sandbox-user-config get pods -n dev-sandbox

    No resources found.

    ```


    `No resources found`消息证明我们能够作为`sandbox-user`调用 Kubernetes API。


    对于`sandbox-user`用户，我们期望仅在`dev-sandbox`命名空间的范围内执行所有`kubectl`命令。您可以像这样将默认命名空间添加到您的配置文件中，而不是显式使用`-n`参数：


    ```

    [opc@dev-vm]$ cat ~/.kube/sandbox-user.config

    ...

    contexts:

    - context:

    cluster: cluster-...

    namespace: dev-sandbox

    user: user-...

    name: context-...

    ...

    ```


    最后，我们已准备好将一些 Pod 部署到我们的 OKE 集群。'
- fmt: '### Pods


    如前所述，本章前文已将 UUID API 容器化，并将 `uuid:1.0` Docker 镜像推送至 OCI 注册表。现在，我们将基于此镜像创建一个 Kubernetes
    Pod。具体方法是：提供一个 YAML 描述文件，其中定义了包含单个容器的新 Pod 及其容器镜像。需要记住，我们为 `uuid:1.0` 镜像使用了一个私有的
    OCIR 仓库。从 OCIR 的角度来看，OKE 集群只是另一个客户端，为了成功拉取镜像，它必须使用认证令牌进行验证。您可以将此令牌存储在 Kubernetes
    的 *secret* 类型对象中。这样，在创建需要从特定注册表中的一个或多个容器仓库拉取镜像的 Kubernetes Pod 时，您就可以引用这个 secret。在我们这个例子中，secret
    将封装区域性的 OCIR 端点、IAM 用户名和该用户的认证令牌。因此，Kubernetes 将只能从该特定 IAM 用户有权访问的仓库中拉取镜像。


    为了创建单容器 Pod，我们将使用带有简单 YAML 描述文件的 `kubectl create` 命令。该过程的概念图见图 [8-27](#478313_1_En_8_Chapter.xhtml#Fig27)。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig27_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig27_HTML.jpg)


    图 8-27


    #### Token and secret


    在本节中，所有 `kubectl` 调用都将代表 `sandbox-user` 用户执行。为了简化输入，我们可以通过设置 `KUBECONFIG` 环境变量来覆盖默认的
    kubeconfig 路径。设置并导出该变量，使其指向属于 `sandbox-user` 用户的 kubeconfig 文件，如下所示：


    ```

    [opc@dev-vm]$ export KUBECONFIG=~/.kube/sandbox-user.config

    ```


    您将使用 `kubectl create secret` 命令在 `dev-sandbox` 命名空间中创建一个新的 Secret 对象。该 Secret
    对象将被命名为 `sandbox-user-secret`，类型为 `docker-registry`，并包含 Kubernetes 访问存储了 `uuid:1.0`
    容器镜像的 OCIR 私有仓库所需的所有信息，即：


    *   区域性 OCIR 注册表 URL

    *   IAM 用户

    *   该 IAM 用户的认证令牌


    我使用了 shell 变量，以便您在调整变量值后可以直接复制 `kubectl create secret` 命令。请记住，`OCIR_REGION` 变量使用
    OCIR 区域代码，`OCI_TENANCY_NAMESPACE` 使用您的租户命名空间，`OCI_USER_TOKEN` 使用为 `sandbox-user`
    用户生成的认证令牌。


    ```

    [opc@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk

    [opc@dev-vm]$ OCIR_REGION=fra

    [opc@dev-vm]$ OCI_USER=sandbox-user

    [opc@dev-vm]$ OCI_USER_TOKEN="B8.E_Ry7oOtN1KF0do9x"

    [opc@dev-vm]$ kubectl create secret docker-registry sandbox-user-secret --docker-server=$OCIR_REGION.ocir.io
    --docker-username="$OCI_TENANCY_NAMESPACE/$OCI_USER" --docker-password="$OCI_USER_TOKEN"
    -n dev-sandbox

    secret/sandbox-user-secret created

    ```


    Caution

    在使用 OCIR 时，请注意不要混淆 *tenancy name* 和 *tenancy namespace*。请确保用于获取 OCIR 访问权限的 Kubernetes
    secret 使用的是租户命名空间。


    我们可以像这样显示特定命名空间中存在的 secret：


    ```

    [opc@dev-vm]$ kubectl get secrets -n dev-sandbox

    NAME                 TYPE                               DATA  AGE

    default-token-wg574  kubernetes.io/service-account-token 3   3d1h

    sandbox-user-secret  kubernetes.io/dockerconfigjson      1    51s

    ```


    新创建的、类型为 `kubernetes.io/dockerconfigjson` 的 `sandbox-user-secret` 存储了以 `sandbox-user`
    用户身份访问 OCIR 所需的所有数据。


    现在，我们将基于 `uuid:1.0` 容器镜像创建一个单容器 Pod。您只需使用定义了新 Pod 的 `uuid-pod.yaml` 文件来执行 `kubectl
    create` 命令。不久前，您通过环境变量覆盖了默认的 kubeconfig 路径。这意味着所有 `kubectl` 命令都是作为 `sandbox-user`
    用户调用的。您必须在 `dev-sandbox` 命名空间中创建 Pod；否则操作将失败。像这样创建 Pod：


    ```

    [opc@dev-vm]$ cd oci-book/chapter08/3-kubernetes/platform

    [opc@dev-vm]$ sed -i "s/OCIR_REGION/$OCIR_REGION/; s/OCI_TENANCY_NAMESPACE/$OCI_TENANCY_NAMESPACE/"
    uuid-pod.yaml

    [opc@dev-vm]$ kubectl create -f uuid-pod.yaml -n dev-sandbox

    pod/uuid-pod created

    [opc@dev-vm]$ kubectl get pods -n dev-sandbox

    NAME       READY   STATUS    RESTARTS   AGE

    uuid-pod   1/1     Running   0          8s

    ```


    Tip

    如果您看到 `ErrorImagePull` 或 `ImagePullBackOff` 状态，而不是 `Running` 状态，则可能是令牌有问题。请确保在设置
    `OCI_USER_TOKEN` 变量时将令牌放在引号内。


    清单 [8-13](#478313_1_En_8_Chapter.xhtml#PC61) 展示了用于创建新 Pod 的 YAML 文件。`metadata`
    部分用于将对象置于特定的命名空间并设置其名称。`spec` 部分包含容器定义以及拉取镜像时要使用的 Secret 对象的名称。镜像名称引用了正确标记为 `uuid:1.0`
    的容器镜像。我们使用 `sed` 命令将 YAML 文件中两个用大写字母表示的占位符替换为您的 OCIR 区域和租户命名空间。


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    name: uuid-pod

    namespace: dev-sandbox

    spec:

    containers:

    - image: OCIR_REGION.ocir.io/OCI_TENANCY_NAMESPACE/sandbox/uuid:1.0

    name: uuid-container

    ports:

    - containerPort: 5000

    protocol: TCP

    imagePullSecrets:

    - name: sandbox-user-secret

    Listing 8-13

    uuid-pod.yaml

    ```


    坦率地说，单独一个 Pod 并不能给我们带来多少增值。我们知道它运行着一个 UUID API，但我们无法直接访问其端点。让我们删除这个 Pod。


    ```

    [opc@dev-vm]$ kubectl delete pod uuid-pod -n dev-sandbox

    pod "uuid-pod" deleted

    ```'
  raw: '### Pods


    As you remember, earlier in this chapter, you containerized the UUID API and pushed
    the `uuid:1.0` Docker image to the OCI Registry. We are now going to create a
    Kubernetes pod based on this image. We will do it by issuing a YAML descriptor
    that defines a new single-container pod and its container image. We need to remember
    that we used a private OCIR repository for the `uuid:1.0` image. From the OCIR
    perspective, an OKE cluster is just another client, and, to successfully pull
    an image, it has to authenticate using an Auth Token. You can store the token
    in a Kubernetes object of a *secret* type. This lets you reference this secret
    while creating Kubernetes pods, which are supposed to pull images from one or
    more container repositories in a given registry. In our case, the secret will
    encapsulate the regional OCIR endpoint, IAM user name, and the Auth Token for
    that user. Consequently, Kubernetes will be able to pull images only from the
    repositories that can be accessed by the particular IAM user. To create a single-container
    pod, we are going to use `kubectl create` with a simple YAML descriptor that defines
    the pod. The process is conceptually illustrated in Figure [8-27](#478313_1_En_8_Chapter.xhtml#Fig27).


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig27_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig27_HTML.jpg)


    Figure 8-27


    Token and secret


    In this section, all `kubectl` calls will be done on behalf of the `sandbox-user`
    user. To save us from unnecessary typing, we can override the default kubeconfig
    path by setting the `KUBECONFIG` environment variable. Set and export the variable
    to point to the kubeconfig file that belongs to the `sandbox-user` user like this:


    ```

    [opc@dev-vm]$ export KUBECONFIG=~/.kube/sandbox-user.config

    ```


    You will use the `kubectl create secret` command to create a new Secret object
    within the `dev-sandbox` namespace. The Secret object will be called `sandbox-user-secret`,
    be of the `docker-registry` type, and contain all the information that Kubernetes
    needs to access the OCIR private repositories that stores the `uuid:1.0` container
    image, namely:


    *   Regional OCIR registry URL


    *   IAM User


    *   Auth Token for the IAM user


    I am using shell variables to let you simply copy the `kubectl create secret`
    command after having adapted the variable values. Remember to use the OCIR region
    code for the `OCIR_REGION` variable, your tenancy namespace for the `OCI_TENANCY_NAMESPACE`,
    and the Auth Token you have generated for the `sandbox-user` user .


    ```

    [opc@dev-vm]$ OCI_TENANCY_NAMESPACE=jakobczyk

    [opc@dev-vm]$ OCIR_REGION=fra

    [opc@dev-vm]$ OCI_USER=sandbox-user

    [opc@dev-vm]$ OCI_USER_TOKEN=”B8.E_Ry7oOtN1KF0do9x”

    [opc@dev-vm]$ kubectl create secret docker-registry sandbox-user-secret --docker-server=$OCIR_REGION.ocir.io
    --docker-username="$OCI_TENANCY_NAMESPACE/$OCI_USER" --docker-password="$OCI_USER_TOKEN"
    -n dev-sandbox

    secret/sandbox-user-secret created

    ```


    Caution


    While working with the OCIR, be careful not to confuse the *tenancy name* with
    the *tenancy namespace*. Make sure you use the tenancy namespace for the Kubernetes
    secret that will be used to gain access to the OCIR.


    We can display the secrets that exist in a particular namespace like this:


    ```

    [opc@dev-vm]$ kubectl get secrets -n dev-sandbox

    NAME                 TYPE                               DATA  AGE

    default-token-wg574  kubernetes.io/service-account-token 3   3d1h

    sandbox-user-secret  kubernetes.io/dockerconfigjson      1    51s

    ```


    The newly created `sandbox-user-secret` of `the kubernetes.io/dockerconfigjson`
    type stores all the data required to access OCIR as the `sandbox-user` user.


    We are now going to create a single-container pod based on the `uuid:1.0` container
    image. All you need to do is to execute the `kubectl create` command using the
    `uuid-pod.yaml` file that defines the new pod. A few moments ago, you overrode
    the default kubeconfig path using the environment variable. This means all `kubectl`
    commands are invoked as the `sandbox-user` user. You have to create the pod in
    the `dev-sandbox` namespace; otherwise, the operation fails. Create the pod like
    this:


    ```

    [opc@dev-vm]$ cd oci-book/chapter08/3-kubernetes/platform

    [opc@dev-vm]$ sed -i "s/OCIR_REGION/$OCIR_REGION/; s/OCI_TENANCY_NAMESPACE/$OCI_TENANCY_NAMESPACE/"
    uuid-pod.yaml

    [opc@dev-vm]$ kubectl create -f uuid-pod.yaml -n dev-sandbox

    pod/uuid-pod created

    [opc@dev-vm]$ kubectl get pods -n dev-sandbox

    NAME       READY   STATUS    RESTARTS   AGE

    uuid-pod   1/1     Running   0          8s

    ```


    Tip


    If you see the ErrorImagePull status or the ImagePullBackOff status instead of
    the Running status, there is probably something wrong with the token. Make sure
    you put the token in quotes while setting the `OCI_USER_TOKEN` variable.


    Listing [8-13](#478313_1_En_8_Chapter.xhtml#PC61) presents the YAML file used
    to create the new pod. The `metadata` section is used to place the object in a
    particular namespace and set the name of the object. The `spec` section contains
    the container definition and the name of the Secret object to be used when pulling
    the image. The image name references a properly tagged `uuid:1.0` container image.
    We used `the sed` command to replace two placeholders denoted in capitalized letters
    inside the YAML file with your OCIR region and tenancy namespace.


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    name: uuid-pod

    namespace: dev-sandbox

    spec:

    containers:

    - image: OCIR_REGION.ocir.io/OCI_TENANCY_NAMESPACE/sandbox/uuid:1.0

    name: uuid-container

    ports:

    - containerPort: 5000

    protocol: TCP

    imagePullSecrets:

    - name: sandbox-user-secret

    Listing 8-13

    uuid-pod.yaml

    ```


    Honestly speaking, a pod alone does not give us any value-added. We know it runs
    an UUID API, but we cannot reach its endpoint in a straightforward way. Let’s
    delete this pod.


    ```

    [opc@dev-vm]$ kubectl delete pod uuid-pod -n dev-sandbox

    pod "uuid-pod" deleted

    ```'
  trans: '

    ### Pod


