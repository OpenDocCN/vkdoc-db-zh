    API 支持此类操作。


    ## 处理对象


    对象所在的存储桶可以是公共的或私有的。为了在大多数情况下保护数据，您将使用私有存储桶，但您可以随时自由创建公共存储桶。有两种类型的认证组可以访问私有存储桶中的对象。


    *   IAM 用户

    *   实例主体


    我将在接下来的章节中解释这两种访问类型。此外，您还可以通过发出在给定时间段内有效的预认证请求，让未经认证的客户端访问私有存储桶中的特定对象。任何知道链接的人都可以访问该特定对象。预认证请求将在本章末尾介绍。


    为了准备练习，我们需要快速回顾一下。在上一章中，我要求您创建两个用户 `sandbox-admin` 和 `sandbox-user`，以及两个对应的组 `sandbox-admins`
    和 `sandbox-users`。然后，在根 compartment 中，我们创建了一个新的 IAM 策略 (`sandbox-admins-policy`)，其中包含一条
    *IAM 策略语句*，该语句授予了 `sandbox-admins` 组成员对 `Sandbox` compartment 的完全管理访问权限。

    ```

    allow group sandbox-admins to manage all-resources in compartment Sandbox

    ```

    在继续之前，请确保此设置仍然有效。您需要它来完成本章的演练。为了演示对象存储的一些基本功能，您将以 `sandbox-user` 用户身份使用 CLI 创建一个存储桶并上传一组文件。接下来，我们将使用其他命令进行批量操作、基于前缀的带分页列表以及自定义元数据。您还将学习如何处理并发更新。所有
    CLI 命令都使用 Oracle Cloud Infrastructure REST API，其概念如图 5-3 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig3_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig3_HTML.jpg)

    *图 5-3 与对象存储 API 交互*


    让我们看看与对象存储的基本交互。我们将使用 CLI 来执行它们。同样，您即将发出的 CLI 命令将简单地导致 API 请求，如第 3 章所述。'
