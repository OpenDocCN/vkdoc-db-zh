  trans: '

    每个自治数据仓库实例都配备了一项名为 `Oracle Machine Learning`（OML）的功能，这是一个基于开源 Apache Zeppelin
    项目的、基于 Web 的、交互式、面向笔记本的数据可视化与数据分析工具。对于简单的可视化用例，您可以轻松使用 SQL 发布查询，并通过几次点击操作来准备各种图表。例如，图
    7-41 展示了如何显示一个折线图，该图按交通事故类别分组，说明了 2017 年波兰车祸受害者的总数。提醒一下，您看到的数据纯属虚构，是笔者为了本书的唯一目的而生成的。


    ![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig41_HTML.jpg`](img/478313_1_En_7_Fig41_HTML.jpg)


    **图 7-41** 基于 Oracle Machine Learning Zeppelin 的可视化


    笔记本可以按照类似于多段落报告的方式进行排列，如图 7-42 所示，该图结合了饼图和相应的数据表。两种视图都展示了按省份划分的 2017 年每日平均受伤人数。


    ![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig42_HTML.jpg`](img/478313_1_En_7_Fig42_HTML.jpg)


    **图 7-42** 基于 OML 的报告


    您可以从自治数据仓库服务控制台的“管理”页面访问 OML 管理页面。在这里，您能够允许现有的数据库用户使用 OML 笔记本。要了解更多信息，请参阅相关文档。


    自治数据仓库实例可以轻松注册为 Oracle Analytics Cloud 的数据源，后者提供了更丰富的可用图表集。图 7-43 展示了 2017 年在
    GP 类型道路上受伤人数的雷达面积图。每个不同的角度对应一个特定的省份。某个省份 GP 道路上的受伤人数越少，该特定角度上的蓝色区域就越小。使用 Analytics
    Cloud，您可以构建很多东西，执行交互式分析并动态调整图表，以便在您特定的报告场景中得出理想的仪表板。


    ![`images/478313_1_En_7_Chapter/478313_1_En_7_Fig43_HTML.jpg`](img/478313_1_En_7_Fig43_HTML.jpg)


    **图 7-43** Oracle Analytics Cloud


    讨论商业智能操作、数据挖掘算法以及由基于 Zeppelin 的 ADB 扩展和 Oracle Analytics Cloud 支持的不同可视化技术等内容，超出了本书的范围。互联网上有大量可用的资料，欢迎自行探索。


    ## 清理


    我们现在可以终止数据库实例，因为在此之后我们将不再需要它。要关闭并终止 ADW 实例，您可以执行以下命令：


    ```

    $ ADW_OCID=`oci db autonomous-database list --query "data[?\"display-name\"==''road-adw'']
    | [0].id" --raw-output`

    $ echo $ADW_OCID

    ocid1.autonomousdatabase.oc1.eu-frankfurt-1.ab......763psq

    $ oci db autonomous-database delete --autonomous-database-id "$ADW_OCID" --wait-for-state
    TERMINATED

    Are you sure you want to delete this resource? [y/N]: y

    Action completed. Waiting until the resource has entered state: TERMINATED

    ```


    同样，使用 OCI CLI 删除所有对象并删除我们最初用于数据库数据加载的原始输入数据的对象存储存储桶。


    ```

    $ oci os object bulk-delete -bn roadadw-load

    WARNING: This command will delete 7 objects. Are you sure you want to continue?
    [y/N]: y

    $ oci os bucket delete -bn roadadw-load

    Are you sure you want to delete this resource? [y/N]: y

    ```


    ## 总结


    本章是对 RDBMS 支持的数据仓库和面向维度的数据分析的简要而快速的介绍。在完全托管的云端自治数据库时代，我们能够快速启动数据仓库实例，并在进行一些基本设置后，直接转向构建面向数据的解决方案。这正是托管云平台的意义所在：通过将这些维护任务委托给云平台，专注于以最小的管理精力解决问题。在后续章节中，您学习了如何配置自治数据库实例、以
    `ADMIN` 身份访问 SQL Developer Web、创建常规数据库用户、将数据从对象存储加载到数据库表，以及理解星型模式及其在商业智能操作中的作用。接着，您熟悉了数据库监控。最后，您以多种方式查询了数据，并了解了
    Oracle Cloud 中可用的数据可视化选项。


    # 8. Oracle Container Engine for Kubernetes


    在本章中，我们将处理 `应用程序容器`，它已经彻底改变了当代的软件世界。容器影响了我们构建、交付和运行应用程序的方式，从而在很大程度上改变了软件开发的流程。它们促成了一种新的架构风格，这种风格围绕着由大量高度专业化、自治且通常规模较小的应用程序（称为
    `微服务`）组成的系统。毫不夸张地说，在应用程序容器之上，已经出现了一个新的标准、平台、组件、工具、库、协议和服务的 `生态系统`。这个生态系统范围极其广阔，由庞大的开源社区推动，并得到丰富的企业赞助。


    本章第一节简要解释了什么是容器，并指导您完成与将应用程序容器化以及将容器镜像存储到 Oracle Container Image Registry（OCIR）相关的最重要任务。第二节讨论了容器编排的需求，并向您介绍了
    Oracle Kubernetes Engine（OKE），这是 Oracle Cloud Infrastructure 上提供的托管 Kubernetes
    服务。

    '
- fmt: '## Containers


    A container is a portable and shippable unit of software packaged with all its
    dependencies. Let’s explore this definition by looking closer at the three core
    characteristics of containers.


    - Self-contained

    - Isolated

    - Shippable


    Each container is in principle self-contained. A service or an application wrapped
    inside a container is provided with all its dependencies such as software binaries,
    configuration files, libraries, environment variables, and, no matter how weird
    it may sound at first glance, the entire operating system. Even though there might
    be hundreds of containers running on the same bare-metal or virtual machine, each
    of them provides an impression of a fully isolated and exclusive environment to
    an application it encapsulates. In other words, an application inside any given
    container thinks it is running within a dedicated machine, no matter how many
    other containers coexist on the same host machine. Containers are considered easily
    shippable across different host machines that may even use varying host operating
    systems as long as they are all supporting the same container runtime. Figure
    [8-1](#478313_1_En_8_Chapter.xhtml#Fig1) illustrates these three characteristics
    conceptually.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig1_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig1_HTML.jpg)


    Figure 8-1: Core container characteristics


    If you’ve never heard about containers and are new to the topic, you will probably
    wonder how it is all possible from a technical point of view. Furthermore, how
    do containers actually differ from virtual machines? Contemporary container runtimes
    originated from within the Linux ecosystem and leverage Linux kernel features
    such as namespaces, control groups, or `chroot` commands to implement filesystem,
    process, network, and resource isolation. No matter which container engine you
    eventually choose, whether be `Docker`, `rkt`, or `cri-o`, you can be sure they
    all use the same aforementioned Linux kernel features.


    In this context, it becomes clear that all containers running on the same host,
    even though fully isolated, use the host’s Linux kernel. In terms of reusability,
    there is something even more impactful, namely, layers. Containers use filesystem
    layers that are stacked on top of other layers. The base layers “at the bottom”
    ship the entire operating system. It may sound heavy, but in the world of containers,
    you will often encounter very lightweight Linux distributions such as CoreOS Container
    Linux or Alpine Linux. On top of that, additional layers usually bring application
    runtimes, for example, Java Virtual Machine, Python, or Node.js. Earlier, further
    layers can ship required libraries like Python Flask. Finally, the topmost layers
    contain application binaries often supplemented with injected configuration files.
    All these layers are read-only, which allows multiple containers to share them.
    Every container comes with a dedicated writable layer to hold all changes done
    across the lifetime by the application of any other components within the container.


    Read-only layers are logically grouped into container images that can be shared
    across many machines. Each image is a self-contained entity that can serve as
    a base for multiple running containers. You can have hundreds of containers based
    on the same image effectively consuming just as much storage as if you were running
    only a single container.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig2_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig2_HTML.jpg)


    Figure 8-2: Container layers


    Figure [8-2](#478313_1_En_8_Chapter.xhtml#Fig2) illustrates the relation between
    individual images and containers. There are three containers called `uuid-1`,
    `uuid-2`, and `uuid-3`, all built using the same `uuid:1.0` image. The `uuid:1.0`
    image is a custom-built image that basically ships some application code and configuration
    files. The image is built on top of a downloaded `python:3-alpine` image that
    installs Python 3 on top of a base operating system image called `alpine:3.10`.
    Applications within each of the three containers think that they are running on
    separate hosts. Yet, they all share the host machine Linux kernel and read-only
    layers. There have been some voices across the community saying that not all Python
    applications are capable of running on Alpine Linux because of some missing distribution-specific
    dependencies. To address these concerns, you could, for instance, consider running
    more demanding Python apps using images that rely not on `python:3-alpine` but
    on a Debian-based `python:3-stretch` image.


    Both kernel-level isolation combined with the reuse of kernel and various filesystem
    layers make containers considerably lighter in use when compared to virtual machines.
    Similarly, it is much easier to ship a container to another machine than to migrate
    the entire virtual machine.


    But what does it physically mean to ship a container? You have learned that any
    particular container requires an image that consists of read-only filesystem layers.
    In the case of stateless applications, shipping a container means nothing more
    than stopping an existing container and running another one, based on the same
    image and using the same runtime configuration, this time on another machine.
    It becomes clear that images have to be made available in some kind of image registry
    accessible from all host machines with the container runtime. The container platform
    would then pull an image from the image registry, which effectively means downloading
    all required filesystem layers and corresponding metadata, as illustrated in Figure
    [8-3](#478313_1_En_8_Chapter.xhtml#Fig3).


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig3_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig3_HTML.jpg)


    Figure 8-3: Pulling an image from an image registry


    Applications always evolve during their life span. To track this, evolution application
    releases are versioned. The same applies to container images. If you look closer
    at the previous figures, you will see the version suffixes such as `1.0`, `3-alpine`,
    or `3:10`. We call them tags. Container images are tagged mainly to denote different
    variants or the release chronology of a particular image. For example, let’s assume
    you are publishing a new minor version of an image that encapsulates updated binaries
    of an UUID service. If the previous image version was tagged as `uuid:1.0`, the
    updated image version could be tagged with `uuid:1.1`. If it happened that a Python-based
    application was not fast enough, you could additionally implement a Golang-based
    alternative and publish it as a `uuid:1.0-golang` variant.'
