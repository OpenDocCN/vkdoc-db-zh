    ### 存储


    如果无法持久化保存输入和结果，任何计算处理都将失去意义。不同类型的数据遵循不同的生命周期，最终导致需求各异。接下来将介绍多种云资源类型，它们被用于满足不同的存储目标。如果我们暂时跳过更上层的数据库存储，就可以讨论`存储能力`。我们通常将这种能力分解为三组存储资源类型。


    *   对象存储

    *   块存储

    *   文件存储


    #### 对象存储


    *对象存储*旨在存储任意数量、任意类型的数据，并提供冗余、完整性、数据加密和多种访问方式。文件等数据实体被视为独立的`对象`，它们被分组在一个类似文件夹的层级结构中，称为`桶`。访问策略保护着存储的对象，决定谁可以访问它们以及允许执行哪些操作。数据在静态时被加密，冗余副本分布在所选区域内的各个数据中心。我们通常根据访问频率区分两种类型的对象存储。


    *   标准`对象存储`，提供即时、快速的数据访问。

    *   `归档存储`，以更便宜的方式保存数据，代价是需要等待数小时或更长时间才能检索数据。


    通过使用生命周期策略，可以将很少访问的对象移动到归档存储等生命周期方面实现自动化。你通常会在对象存储桶中持久化保存哪些类型的数据？这类数据的范围很广，从应用程序日志、数据库备份，到作为内容分发网络一部分存储的数据，再到需要安全存储较长时间以符合法规要求的大型业务数据归档。


    #### 块存储


    *块存储*与对象存储相反，在计算能力的背景下扮演着辅助角色，尽管我们将块卷、卷组或备份策略等资源归类为存储能力。这里主要的云资源类型是`块卷`。你可以将其视为一个具有自身生命周期的非易失性存储盘，但它只有与虚拟机或裸机等计算实例一起使用才有意义。实际上，在配置新的块卷时，并不会发生什么特别的事情。一个新的块卷的生命始于你将其附加到计算实例、创建文件系统并挂载它的那一刻。从这一刻起，你就可以将该卷用作计算实例的附加磁盘。事实上，根据你在实例上托管的应用程序，你可能会将所有应用程序数据存储在此卷上，而不是使用每个计算实例从一开始就有的启动卷。当然，如果你正在设计一个新的云解决方案，你可能会选择另一种类型的云资源，例如对象存储或托管数据库来存储应用程序数据。然而，你仍然会发现许多不同类型的应用程序，尤其是传统应用程序，使用可附加的块存储卷会获益更多。


    进一步说，我们可以区分块存储卷附加到计算实例的两种方式。


    *   通过 IP 网络远程附加。

    *   直接附加到物理机器。


    服务器与远程附加卷之间的互连性通常使用`互联网小型计算机系统接口（iSCSI）协议`来处理，该协议在 RFC7143 中标准化。


    > `小型计算机系统接口（SCSI）`是用于与 I/O 设备（尤其是存储设备）通信的一系列流行协议。(…) iSCSI 协议(…)描述了一种通过 TCP/IP
    传输 SCSI 数据包的方法。⁷


    直接附加到物理机器的存储卷极大地受益于磁盘操作不涉及任何网络通信这一事实。结合基于闪存的固态硬盘（SSD）设备和非易失性内存快速（NVMe）协议（该协议通过多个
    I/O 命令队列增强了块访问并发性），我们获得了惊人的性能，以每秒输入/输出操作数（IOPS）衡量。尽管如此，这种设置对可以附加到实例的存储卷数量施加了限制。


    根据使用模式，一些块卷，特别是那些用作持久数据存储的卷，应该定期备份。时间点备份通常称为`快照`。这些中间状态可以是完全备份或增量备份。后者跟踪自上次备份或卷创建以来的更改。策略可用于驱动自动、按计划的卷备份创建。在未挂载卷上拍摄的快照称为`冷备份`。在这种情况下，在备份操作进行期间，该卷无法使用。对仍在使用中的卷拍摄快照称为`热备份`。在大多数情况下，块卷备份会持久化保存到高可用的对象存储中。你可以对归档的快照做什么？通常有几种选项，例如恢复卷、克隆到或移动到不同的云区域。


    本章前面我们提到了垂直扩展和水平扩展的含义和作用。如果你考虑`垂直扩展`，你会发现两种适用于块卷的模式。首先，你应该能够通过增加其大小来垂直扩展块卷。其次，将所有应用程序数据存储在远程附加的块卷上，使得用具有更多
    CPU 或内存的更强大配置的新计算实例替换旧实例变得相对容易，因为你只需要将卷重新附加到新实例。这个操作可以被视为对计算实例进行垂直扩展。


    最后，我想提到一点，块卷可以选择以只读方式附加。如果你只是想附加一个卷来浏览文件系统，确保不会意外写入任何内容，这种可能性非常方便。


    #### 文件存储


    块存储设备通常设计为一次只能附加到一个计算实例，而`文件存储`则旨在支持多个计算实例之间面向文件的数据交换。当这些传统系统利用基于文件共享状态的活动-被动高可用性时，这一点尤其有用。共享文件存储能力可以使用网络文件系统（NFS）协议实现，该协议由
    Sun Microsystems 于 1989 年在 RFC1094 中引入。


    > `Sun 网络文件系统（NFS）协议`提供跨网络对共享文件的透明远程访问。NFS 协议设计为可跨不同机器、操作系统、网络架构和传输协议移植。(…) NFS
    假定文件系统是分层的，目录是除底层文件外的所有级别。⁸


    自推出以来，该协议已从版本 3（1995 年的 RFC1813）发展到版本 4（2015 年的 RFC7530）。或者，一些提供商使用通用互联网文件服务（CIFS）的后继者，即服务器消息块（SMB）协议，来提供相同的共享文件存储能力。

    '
- fmt: 'From the user''s point of view, a shared filesystem is mounted in a similar
    way as a filesystem present on a block volume. Things are completely different
    under the hood, and, depending on the chosen protocol, we may encounter some limitations
    or experience an increased complexity. Designing solutions based on shared filesystems
    often raises concerns about correct permission checking and concurrent file access.
    A lot depends on the operating system and network protocol that are in use. For
    example, Network File System 4 (`NFS4`) introduces native file locking, while
    an `NFS3`-based solution has to rely on an additional network lock manager.


    While designing new cloud-based solutions or planning lift-and-shift migrations
    of the existing traditional systems from their on-premise environments to the
    cloud, you will probably employ a mixture of the three storage types we''ve outlined
    in this section. After having discussed compute and storage capabilities, we''ll
    move to the third core cloud computing capability, which provides the virtual
    networking resources.


    ## Networking


    In a multitier or distributed architecture, the software solutions are often composed
    of multiple application nodes of different kinds that collaborate with the other
    nodes in a variety of ways such as the following:


    *   Exposing their services through web interfaces also known as `APIs`

    *   Remotely consuming the functionalities provided by other services

    *   Maintaining connections to other nodes that compose the cluster

    *   Accessing external dependencies such as the database or message broker


    Cloud resources used to deliver `virtual networking` such as networks, subnets,
    route tables, security rules, or different types of gateways may seem conceptually
    similar to the building blocks of traditional, hardware-based networks. Yet, they
    are radically simplified in the way you configure them. Software-defined networking
    (`SDN`) plays a significant role in cloud computing. Cloud infrastructure can
    be seen as an `SDN`-enabled infrastructure that lets you create and terminate
    your isolated virtual overlay networks called `virtual cloud networks` (`VCN`s),
    subdivide them into `subnet`s, and use them to roll out various networking patterns
    applied for your compute instances and other cloud resources. These are the cloud
    resources seen as part of the networking capability:


    *   `Virtual cloud networks and their subnets`

    *   `Reserved public IP addresses`

    *   `Security lists and security rules`

    *   `Various types of gateways`

    *   `Route tables and route rules`

    *   `Load balancers`

    *   `Virtual devices used to deliver VPN capabilities`

    *   `DNS zones`

    *   `Web Application Firewall (WAF) policies`


    Carefully planning your virtual networking is a crucial part of delivering a robust
    security model for your cloud infrastructure and, likewise, securing your cloud-based
    solutions. Usually, the design process begins with creating a `virtual cloud network`
    and assigning a range of private `IP address`es to be used within that network.
    Typically, a single cloud account may contain multiple `VCN`s, some of them fully
    isolated, while the others are interconnected with each other. To keep your infrastructure
    well-organized, you will provision the compute instances inside another type of
    cloud resource called `VCN subnet`s. `VCN subnet`s are basically a product of
    a logical subdivision done on a particular `virtual cloud network`. Every compute
    instance you provision has to be assigned to one or more `subnet`s through a cloud
    resource called a `virtual network interface card` (`vNIC`). A `vNIC` attached
    to a `public subnet` can have a `public IP address` assigned and, in this way,
    be reachable from the Internet. Cloud providers own pools of `public IP address`es.
    Typically, the compute instances in `public subnet`s can use the `public IP address`es
    that are dynamically assigned from these pools. When a compute instance terminates,
    the `public IP address` used by that instance will be returned to the pool and
    can be later attached to a completely different compute instance, even one owned
    by another cloud customer. If you need more control over the `public IP address`es,
    you may benefit from a cloud resource called a `reserved public IP address`. A
    `reserved address` always remains allocated for your cloud account, no matter
    if it is assigned to an instance or not, and you are allowed to reassign it between
    your instances. A subnet designated as a `private subnet` prohibits the instances
    within from having `public IP address`es attached. `Security list`s store `security
    rule`s that add a layer of a software-defined firewall that is enforced before
    the packets reach compute instances. What these `security rule`s basically do
    is verify whether the traffic for given `IP address`es and ports is indeed allowed
    to pass through. `Route rule`s, on the other hand, are used to properly direct
    the `VCN` outbound traffic and allow the packets to reach their next hop, which
    usually is some kind of `gateway` such as Internet, service, or peering gateway.
    The right combination of various `gateway`s, `route rule`s, `security rule`s,
    and `private subnet`s will let you tightly supervise the network and allow only
    the expected traffic from and to these `subnet`s. `Load balancer`s are used to
    evenly distribute the incoming traffic to the instances grouped in the so-called
    backend sets. They let you introduce high availability for fault tolerance to
    your infrastructure or scale the application cluster out to achieve an increased
    request processing throughput. Some cloud solutions may require access to the
    systems and data available in your traditional on-premise network. To connect
    your `virtual cloud network` with a private network inside your data center, you
    can either use a `IPSec VPN`, which tunnels the traffic over public Internet,
    or leverage a dedicated private connection, which in Oracle Cloud is called `FastConnect`.
    In the latter case, your on-premise data center will be either connected to a
    particular Oracle Cloud data center directly or connected via one of the nearest
    `FastConnect Connectivity Partners` that maintains a physical connection to the
    Oracle Cloud data centers. In both cases, whether `IPSec VPN` or `FastConnect`,
    you will have to create a cloud resource called a `dynamic routing gateway` (`DRG`),
    attach it to a `VCN` of your choice, and alter the `VCN` `route table` by creating
    a new `route rule`. The `route rule` will set the `DRG` as the destination for
    the outbound traffic which is addressed to the `IP address` range used in your
    on-premise network segment. `DNS zone`s let you maintain the web domains you own
    in Oracle Cloud `DNS` servers and manage the domain zones in detail, for example,
    by creating custom `DNS` records. To complete your cloud networking toolkit, `Web
    Application Firewall` (`WAF`) can be leveraged to protect your Internet-facing
    application endpoints from malicious and unwanted inbound traffic. `WAF` has more
    than 200 predefined rules that just need to be optionally configured and enabled.
    You redirect the domain record you manage in `DNS` to the `WAF` endpoint. If the
    traffic is compliant with the `WAF` policies that are enabled for the particular
    endpoint, the traffic is let through to reach the application endpoint.


    Cloud resources are the subject of various management actions that should be performed
    only by authenticated and authorized users. This leads us to the next section
    to learn about the security topics collectively addressed by the fourth cloud
    computing capability.'
