    If you are interested in the implementation of the `reportissuer` service, especially
    in the way it authenticates as an instance principal, read on. Listing [5-10](#478313_1_En_5_Chapter.xhtml#PC54)
    shows the main function of the program.


    ```

    if __name__ == ''__main__'':

    bucket_name = os.environ[''APP_BUCKET_NAME'']

    summary_object_name = os.environ[''APP_OBJECT_NAME'']

    object_prefix = os.environ[''APP_OBJECT_PREFIX'']

    polling_interval_seconds = int(os.environ[''APP_POLLING_INTERVAL_SECONDS''])

    tmp_directory = os.environ[''HOME'']

    while True:

    print(''Creating a report'')

    signer = oci.auth.signers.InstancePrincipalsSecurityTokenSigner()

    client = oci.object_storage.ObjectStorageClient(config={}, signer=signer)

    storage_namespace = client.get_namespace().data

    report_entry_list = prepare_report_entries(storage_namespace, bucket_name, object_prefix,
    client)

    upload_report(report_entry_list, tmp_directory, storage_namespace, bucket_name,
    summary_object_name, client)

    time.sleep(polling_interval_seconds)

    Listing 5-10

    reportissuer.py: The Main Function

    ```


    The first few lines read the environment variables into the corresponding local
    program variables. The values have been defined in the Service section of the
    uploaded systemd unit file (`reportissuer.service`). The recurring nature of the
    process is implemented through an infinite `while` loop. At the end of each iteration,
    the process thread sleeps for the interval defined through the `APP_POLLING_INTERVAL_SECONDS`
    environment variable. The `prepare_report_entries` function is responsible for
    listing the objects and preparing a list for the `upload_report` function, which
    uploads a newly created summary file to the bucket. For each iteration, there
    is an instance of object storage client class created and set to use the instance
    principal security token signer. These two simple lines result in the use of instance-principal-based
    request signing:


    ```

    signer = oci.auth.signers.InstancePrincipalsSecurityTokenSigner()

    client = oci.object_storage.ObjectStorageClient(config={}, signer=signer)

    ```


    All other SDK client classes can be used in the same way to leverage instance
    principals and dynamic groups. This can greatly simplify the authentication patterns
    for applications running on Oracle Cloud Infrastructure compute instances because
    you no longer need to supply keys and user details to every compute instance.


    Let’s take a brief look at the two functions that are called in the main function.
    Listing [5-11](#478313_1_En_5_Chapter.xhtml#PC56) presents the `prepare_report_entries`
    function. The `client.list_objects` method calls the object storage API to fetch
    the list of objects whose names start with a particular prefix. The keyworded
    argument `fields="name,size"` informs the API what fields we are interested in.
    If we’ve left it out, the API would not return the size field values in the response.
    We iterate over the returned objects and use concatenation to prepare a report
    entry. At the end, we return a list with the report entries we’ve created.


    ```

    def prepare_report_entries(storage_namespace, bucket_name, object_prefix, client):

    report_entries = []

    objects = client.list_objects(storage_namespace, bucket_name, fields="name,size",
    prefix=object_prefix).data.objects

    for obj in objects:

    entry = str(obj.name)+'' (''+str(obj.size/1024)+''K)''

    report_entries.append(entry)

    return report_entries

    Listing 5-11

    reportissuer.py: prepare_report_entries Function

    ```


    Listing [5-12](#478313_1_En_5_Chapter.xhtml#PC57) covers the `upload_report` function,
    which takes the list of report entries and writes them to a new temporary file.
    To avoid name collisions, we include a newly generated UUID in the name of the
    file. The last line in the file contains the report creation timestamp. The same
    string is written to the standard output you saw in the systemd service status
    log a moment ago. The `client.put_object` method uploads the file contents as
    a new object. At the end, the temporary file is removed from the local filesystem.


    ```

    def upload_report(report_entry_list, tmp_directory, storage_namespace, bucket_name,
    object_name, client):

    tmp_report_filename = tmp_directory+''/bucket_report.''+str(uuid.uuid4())+''.txt''

    with open(tmp_report_filename, ''w'') as stream:

    for entry in report_entry_list:

    stream.write(entry+''\n'')

    report_timestamp_str = ''### Report generated ''+str(datetime.datetime.now())+''\n''

    stream.write(report_timestamp_str)

    print(report_timestamp_str)

    with open(tmp_report_filename, ''r'') as stream:

    client.put_object(storage_namespace, bucket_name, object_name, stream)

    os.remove(tmp_report_filename)

    Listing 5-12

    reportissuer.py: upload_report Function

    ```


    This concludes the instance principal demonstration. You can now use the well-known
    `terraform destroy` command to terminate all cloud resources like this:


    ```

    $ terraform destroy --auto-approve

    oci_core_virtual_network.app_vcn: Refreshing state...

    data.oci_identity_availability_domains.ads: Refreshing state...

    data.oci_core_images.centos_image: Refreshing state...

    oci_core_internet_gateway.app_igw: Refreshing state...

    oci_core_security_list.app_sl: Refreshing state...

    oci_core_route_table.app_rt: Refreshing state...

    oci_core_subnet.app_subnet: Refreshing state...

    oci_core_instance.app_vm: Refreshing state...

