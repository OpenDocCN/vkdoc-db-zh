  raw: '```

    $ oci compute instance terminate --instance-id $vm_ocid --wait-for-state TERMINATED

    Are you sure you want to delete this resource? [y/N]: y

    Action completed. Waiting until the resource has entered state: TERMINATED

    $ oci network subnet delete --subnet-id $subnet_ocid --wait-for-state TERMINATED

    Are you sure you want to delete this resource? [y/N]: y

    Action completed. Waiting until the resource has entered state: TERMINATED

    $ oci network route-table delete --rt-id $rt_ocid --wait-for-state TERMINATED

    Are you sure you want to delete this resource? [y/N]: y

    Action completed. Waiting until the resource has entered state: TERMINATED

    $ oci network internet-gateway delete --ig-id $igw_ocid --wait-for-state TERMINATED

    Are you sure you want to delete this resource? [y/N]: y

    Action completed. Waiting until the resource has entered state: TERMINATED

    $ oci network vcn delete --vcn-id $vcn_ocid

    Are you sure you want to delete this resource? [y/N]: y

    ```


    In the procedural approach, the responsibility to understand what actions have
    to be taken and in which sequence is delegated to the programmer. This can increase
    the complexity of the scripts, especially if you want to implement various types
    of changes to the state of an existing infrastructure. In such a case, you need
    to begin with finding out what the current state is, before you plan the actions
    that would bring the infrastructure to the expected state. It would have been
    much easier just to define the expected state and let a provisioning tool detect
    what kind of actions have to be taken depending on the current state of the infrastructure.
    This would be a declarative approach.


    ## Terraform


    Terraform is an infrastructure-as-code provisioning tool that tracks the state
    of the infrastructure it is managing to enable the *declarative approach*. Instead
    of defining and sequencing actions, as you are doing while working with the CLI,
    Terraform lets you define the expected state of your infrastructure. Next, it
    becomes the job of Terraform to detect what kind of actions, and in which sequence,
    have to be taken to bring the cloud resources to the expected state. You do not
    need to worry about any intermediary states. Only the result matters.


    Terraform supports a diverse range of cloud providers through a set of plugins
    called *providers* . When you initiate a new project using `the terraform init`
    command, Terraform reads your configuration files in this directory, detects which
    provider to use, and downloads the newest version of a particular provider plugin.
    It is the provider plugin that is responsible for interacting with, in our case,
    Oracle Cloud Infrastructure REST APIs, as shown in Figure [3-9](#478313_1_En_3_Chapter.xhtml#Fig9).


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig9_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Terraform


    Let’s take a closer look at the concept of infrastructure as code.


    ### Infrastructure as Code


    The concept behind *infrastructure as code* is simple. You define your target
    cloud infrastructure, which consists of virtual cloud networks, compute instances,
    instance pools, custom images, various types of storage, managed database instances,
    managed Kubernetes clusters, and other cloud resources, in one or more configuration
    files. We often say that you write the *infrastructure code*. If you are using
    Terraform, the configuration files, or simply the infrastructure code, use JSON-like
    HashiCorp Language (HCL) syntax. Listing [3-11](#478313_1_En_3_Chapter.xhtml#PC42)
    presents a sample compute instance definition in HCL syntax.


    ```

    resource "oci_core_instance" "bastion_vm" {

    compartment_id = var.compartment_ocid

    display_name = "bastion-vm"

    availability_domain = var.ads[0]

    source_details {

    source_id = "var.compute_image_ocid

    source_type = "image"

    }

    shape = "VM.Standard2.2"

    create_vnic_details {

    subnet_id = oci_core_subnet.bastion_ad1_net.id

    assign_public_ip = true

    }

    metadata = {

    ssh_authorized_keys = file("~/.ssh/oci_id_rsa.pub")

    }

    }

    Listing 3-11

    Terraform HCL for a Compute Instance

    ```


    Every cloud resource definition is specified using blocks of data. Resource block
    headers have `a resource <type> <name>` structure. As an example, Oracle Cloud
    Infrastructure compute instances are of the `oci_core_instance` type. If you look
    closer at Listing [3-11](#478313_1_En_3_Chapter.xhtml#PC42), you will spot that
    some attribute values use references to variables (`var.compartment_ocid`), attributes
    of other resources (`oci_core_subnet.bastion_ad1_net.id`), and even file paths
    in the local filesystem (`file(...)`). This leads to a conclusion that some resources
    depend on the others. It is pretty clear that a dependency chain is important
    for the sequence of various actions such as creation or destruction performed
    on groups of related resources. Terraform builds a graph that tracks all these
    dependencies and uses it to decide which actions can be done in parallel, shortening
    the overall provisioning time, and which actions have to be performed in a sequence.


    The infrastructure code you write is understood as the *expected state*. You can
    change the code back and forth and apply these changes multiple times. Every time
    you do it, Terraform compares the expected state with the so-called *current state*
    that correspondes to the infrastructure deployed during the previous provisioning.
    The calculated difference is used to create an *execution plan* that consists
    of a series of steps that entail various OCI REST API calls that cause the real
    provisioning. Selected steps can run in parallel, as long as it does not impact
    the dependency chain. An execution plan can include actions that create new cloud
    resources, alter the existing ones, or terminate the resources that have to be
    removed. Sometimes, a small change in just one resource attribute will terminate
    the instance and launch a completely new one. For example, such a situation will
    take place when you change the compute instance shape of an existing instance.
    The shape specifies the hardware configuration for a compute instance. Other changes
    can cause nondestructive amendments such as adding a new security rule to an existing
    security list.


    What we’ve just done in this section was a brief Terraform provider for Oracle
    Cloud Infrastructure crash course. If you feel that we’ve just scratched the surface
    of something complex, you are absolutely right, but don’t worry. We will use Terraform
    in all the further chapters in this book so that you will have lots of opportunities
    to practice. Last but not least, I will explain Terraform features on the fly,
    as they appear in the course of the book.


    Tip


    You can find the Terraform documentation at [`www.terraform.io/docs/index.html`](http://www.terraform.io/docs/index.html).


    I bet you are now asking yourself how to put your hands on Terraform-driven automation
    for Oracle Cloud Infrastructure. What about installing the software first?'
