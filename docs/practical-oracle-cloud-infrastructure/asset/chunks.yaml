- fmt: '### Functions and Object Storage


    Functions running on the Oracle Functions platform access object storage in a
    similar way as traditional applications running on compute instances do. Just
    like with compute instances, the OCI API calls originating from functions are
    done on behalf of the instance principals you got familiar with in Chapter [5](#478313_1_En_5_Chapter.xhtml).
    As you recall, instance principals can be included in dynamic groups. To include
    all dynamically created function instances of a particular function in a dynamic
    group, you can design the dynamic group matching rule simply to include all functions
    with a specific tag key. Finally, you create IAM policy statements to allow dynamic
    group members to access particular APIs and interact with OCI resources such as
    object storage buckets and objects. Figure [9-18](#478313_1_En_9_Chapter.xhtml#Fig18)
    illustrates these access-related aspects.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig18_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig18_HTML.jpg)


    Figure 9-18


    Dynamic groups and functions


    Now, you should understand the goal for this section as well as the mechanisms
    we are about to employ to allow function instances to interact with object storage
    APIs and effectively process objects.


    #### Preparing Infrastructure


    As a first step, we have to prepare a new object storage bucket. Disconnect from
    the compute instance for function development, and execute the `oci os bucket
    create` command on your development machine with the OCI CLI.


    ```

    $ oci os bucket create --name reports --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "name": "reports",

    "public-access-type": "NoPublicAccess",

    "storage-tier": "Standard",

    ...

    }

    }

    ```


    Next, we are going to let the `sandbox-user` manage all the objects in the newly
    created `reports` bucket. To do so, use `oci iam policy create` to create the
    new policy, as shown in the following:


    ```

    $ cd ~/git/oci-book/chapter09/4-events/policies

    $ oci iam policy create --name sandbox-users-storage-reports-policy --statements
    file://sandbox-users.policies.storage-reports.json --description "Storage-related
    (reports) policy for regular Sandbox users" --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "name": "sandbox-users-storage-reports-policy",

    "description": "Storage-related (reports) policy for regular Sandbox users",

    "lifecycle-state": "ACTIVE",

    ...

    }

    }

    ```


    You should be already familiar with the `read buckets` and `manage objects` policy
    verbs. You applied them for another bucket, back in Chapter [5](#478313_1_En_5_Chapter.xhtml).
    Listing [9-9](#478313_1_En_9_Chapter.xhtml#PC66) shows the statements for the
    `reports` bucket.


    ```

    [

    "allow group sandbox-users to read buckets in compartment Sandbox where target.bucket.name=''reports''",

    "allow group sandbox-users to manage objects in compartment Sandbox where target.bucket.name=''reports''"

    ]

    Listing 9-9

    sandbox-users.policies.storage-reports.json

    ```


    Now, upload the first test file:


    ```

    $ cd ~/git/oci-book/chapter09/4-events/reports

    $ oci os object put -bn blueprints --file customer_attendance.20190922.raw.csv
    --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    ```


    As a part of the Chapter [5](#478313_1_En_5_Chapter.xhtml) exercise, we created
    the `test-projects` tag namespace. Within this already existing tag namespace,
    let’s prepare a new tag key called `reports`. We will use this key later to tag
    the object-processing function. Now, use `oci iam tag-namespace list` with the
    following query to read the OCID of the tag namespace. Next, use this OCID in
    the `oci iam tag create` command that creates the new tag key.


    ```

    $ TAG_NAMESPACE_OCID=`oci iam tag-namespace list --query "data[?name==''test-projects'']
    | [0].id" --raw-output`

    $ echo $TAG_NAMESPACE_OCID

    ocid1.tagnamespace.oc1..aaaaaaaac7doek63tcdgt3xqtjfx5is3twcpdsszaqsmxlurkwx7pu6qu2eq

    $ oci iam tag create --tag-namespace-id $TAG_NAMESPACE_OCID --name reports --description
    "Reports project" --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "tag-namespace-name": "test-projects",

    "name": "reports",

    "description": "Reports project",

    "is-cost-tracking": false,

    "lifecycle-state": "ACTIVE",

    ...

    }

    }

    ```


    We are going to use the following dynamic group matching rule that includes all
    functions tagged with the `test-projects.reports` tag key:


    ```

    ALL {resource.type = ''fnfunc'', tag.test-projects.reports.value}

    ```


    Now, use `oci iam dynamic-group create` to create the dynamic group.


    ```

    $ echo $TENANCY_OCID

    ocid1.tenancy.oc1..aa...3yymfa

    $ MATCHING_RULE="ALL { resource.type = ''fnfunc'', tag.test-projects.reports.value
    = ''r1'' }"

    $ oci iam dynamic-group create --name reporting-functions --description "Functions
    related to the reporting project" --matching-rule "$MATCHING_RULE" -c $TENANCY_OCID

    {

    "data": {

    ...

    "name": "reporting-functions",

    "description": "Functions related to the reporting project",

    "matching-rule": "tag.test-projects.reports.value",

    "lifecycle-state": "ACTIVE",

    ...

    }

    }

    ```


    The last step is to add a new IAM policy statement to permit the members of that
    dynamic group to manage objects stored in the `reports` bucket in the `Sandbox`
    compartment. Listing [9-10](#478313_1_En_9_Chapter.xhtml#PC71) shows this IAM
    policy statement.


    ```

    [

    "allow dynamic-group reporting-functions to manage objects in compartment Sandbox
    where target.bucket.name=''reports''"

    ]

    Listing 9-10

    functions.policies.storage-reports.json

    ```


    These commands will get the new IAM policy in place:


    ```

    $ cd ~/git/oci-book/chapter09/4-events/policies

    $ oci iam policy create --name functions-storage-reports-policy --statements file://functions.policies.storage-reports.json
    --description "Storage-related (reports) policy for tagged functions" --profile
    SANDBOX-ADMIN

    {

    "data": {

    ...

    "name": "functions-storage-reports-policy",

    "description": "Storage-related (reports) policy for tagged functions",

    "lifecycle-state": "ACTIVE",

    ...

    }

    }

    ```


    In a few steps, we prepared the object storage access control configuration for
    the function instances attached to the `test-projects.reports` defined tag.'
