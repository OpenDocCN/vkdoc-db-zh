    ## 数据库监控


    Autonomous Database 实例配备了一个专用的服务控制台，可用于监控实例的性能。ADB 服务控制台仪表板已在图[7-7](#478313_1_En_7_Chapter.xhtml#Fig7)中展示。要访问服务控制台，如果您之前保存了其直接链接，可以使用它。或者，您始终可以打开
    OCI 控制台并执行以下步骤：


    1.  转到菜单 ➤ 数据库 ➤ Autonomous Data Warehouse。

    2.  确保选中`Sandbox` compartment。

    3.  单击您的 ADW 实例名称。

    4.  单击服务控制台按钮。


    提示


    如果单击服务控制台按钮后没有任何反应，新窗口可能已被您的浏览器阻止。在浏览器中，您必须允许此页面打开新窗口。


    在本章开始时，您配置了 ADW 实例。您为实例设置了两个与资源相关的参数，即初始分配的 CPU 数量和以太字节表示的初始存储容量。仪表板提供以下方面的当前和历史信息：


    *   CPU 分配和利用率

    *   所有数据库表空间使用的存储容量

    *   已执行 SQL 语句的平均数量

    *   SQL 语句的平均响应时间


    图[7-29](#478313_1_En_7_Chapter.xhtml#Fig29)中展示的活动视图提供了关于服务消耗的更细粒度信息，并让您可以检查详细的
    SQL 执行信息。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig29_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig29_HTML.jpg)


    **图 7-29** ADW 数据库活动视图


    活动视图允许您调整希望显示统计信息的时间间隔。默认情况下，ADW 为服务消耗保留历史信息八天，并以一小时为间隔进行。您可以将保留时间增加到大于这八天的值，并更改性能统计信息收集间隔。Autonomous
    Database 与传统的 Oracle Database 一样，依赖自动工作负载仓库 (AWR) 表来保留历史性能统计信息。AWR 表存储在 SYSAUX
    表空间中，并属于 SYS 模式。以`ADMIN`身份打开 SQL Developer Web，并运行以下查询以显示当前的 AWR 设置：


    ```

    select

    extract( hour from snap_interval) interval_hours,

    snap_interval,

    extract( day from retention) retention_days,

    retention

    from SYS.DBA_HIST_WR_CONTROL

    where dbid=(select con_dbid from v$database);

    ```


    结果如图[7-30](#478313_1_En_7_Chapter.xhtml#Fig30)所示。`snap_interval`和`retention`列是`INTERVAL`类型，因此您可以利用`EXTRACT()`函数仅打印您感兴趣的部分（天、小时、分钟、秒）。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig30_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig30_HTML.jpg)


    **图 7-30** AWR 的控制信息


    要更改默认保留时间或默认统计信息快照收集间隔，您需要使用`DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS`过程，如下所示：


    ```

    BEGIN

    DBMS_WORKLOAD_REPOSITORY.MODIFY_SNAPSHOT_SETTINGS(

    retention => 20160,

    interval => 60

    );

    END;

    ```


    在此示例中，我们将保留期增加到两周（14 天等于我们用作`retention`参数输入的 20,160 分钟）。明智地调整此参数，因为保留期增加得越多，AWR
    表在`SYSAUX`表空间中消耗的存储就越多。


    访问 ADB 服务控制台活动视图中的“受监视的 SQL”选项卡，可为您提供正在执行和过去执行的 SQL 语句列表，如图[7-31](#478313_1_En_7_Chapter.xhtml#Fig31)所示。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig31_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig31_HTML.jpg)


    **图 7-31** ADW SQL 监视


    您可以检查每个单独的 SQL 语句，并了解其等待统计信息、I/O 统计信息、执行计划性能以及并行性（如果适用）。为此，在“受监视的 SQL”选项卡上，右键单击您感兴趣的查询并选择“显示详细信息”选项。将向您显示一个新的弹出区域，如图[7-32](#478313_1_En_7_Chapter.xhtml#Fig32)所示。


