    确定要删除此资源吗？ [y/N]: y\n操作已完成。等待资源进入状态：TERMINATED\n$ oci network vcn delete --vcn-id\
    \ $vcn_ocid\n确定要删除此资源吗？ [y/N]: y\n```\n\n在过程式方法中，理解需要采取哪些操作以及按什么顺序执行的责任被委托给了程序员。这会增加脚本的复杂性，尤其是当你希望对现有基础设施的状态实施各种类型的更改时。在这种情况下，你需要在规划那些将基础设施带至预期状态的操作之前，先弄清楚当前的状态是什么。如果只是定义好预期状态，然后让一个配置工具根据基础设施的当前状态来检测需要执行何种操作，那将容易得多。这就是一种**声明式方法**。\n\
    \n## Terraform\n\nTerraform 是一种基础设施即代码（infrastructure-as-code）的配置工具，它会跟踪其所管理基础设施的状态，从而支持*声明式方法*。与在\
    \ CLI 工作时所做的那样，Terraform 让你定义基础设施的预期状态，而不是定义和排序操作。接下来，将由 Terraform 来检测需要采取哪些操作以及按何种顺序执行，从而将云资源带至预期状态。你无需担心任何中间状态，只有最终结果才重要。\n\
    \nTerraform 通过一组称为*提供程序*（*providers*）的插件支持多种多样的云提供商。当你使用 `terraform init` 命令初始化一个新项目时，Terraform\
    \ 会读取此目录中的配置文件，检测要使用哪个提供程序，并下载特定提供程序插件的最新版本。正是提供程序插件负责与（在我们的例子中）Oracle Cloud Infrastructure\
    \ REST API 进行交互，如图 3-9 所示。\n\n![图 3-9](img/478313_1_En_3_Fig9_HTML.jpg)\n\n图 3-9.\
    \ Terraform\n\n让我们更仔细地审视基础设施即代码的概念。\n\n### 基础设施即代码\n\n*基础设施即代码*背后的概念很简单。你在一个或多个配置文件中定义你的目标云基础设施，它由虚拟云网络、计算实例、实例池、自定义镜像、各种类型的存储、托管数据库实例、托管\
    \ Kubernetes 集群和其他云资源组成。我们常说你在编写*基础设施代码*。如果你使用的是 Terraform，这些配置文件（或简称基础设施代码）使用类似\
    \ JSON 的 HashiCorp 语言（HCL）语法。代码清单 3-11 展示了一个用 HCL 语法编写的计算实例定义示例。\n\n```\nresource\
    \ \"oci_core_instance\" \"bastion_vm\" {\n  compartment_id      = var.compartment_ocid\n\
    \  display_name        = \"bastion-vm\"\n  availability_domain = var.ads[0]\n\
    \  source_details {\n    source_id   = var.compute_image_ocid\n    source_type\
    \ = \"image\"\n  }\n  shape = \"VM.Standard2.2\"\n  create_vnic_details {\n  \
    \  subnet_id        = oci_core_subnet.bastion_ad1_net.id\n    assign_public_ip\
    \ = true\n  }\n  metadata = {\n    ssh_authorized_keys = file(\"~/.ssh/oci_id_rsa.pub\"\
    )\n  }\n}\n```\n代码清单 3-11. 用于计算实例的 Terraform HCL\n\n每个云资源定义都使用数据块来指定。资源块头部具有 `resource\
    \ <类型> <名称>` 的结构。例如，Oracle Cloud Infrastructure 计算实例属于 `oci_core_instance` 类型。如果你仔细看代码清单\
    \ 3-11，会发现一些属性值使用了对变量（`var.compartment_ocid`）、其他资源的属性（`oci_core_subnet.bastion_ad1_net.id`）的引用，甚至使用了本地文件系统中的文件路径（`file(...)`）。这得出一个结论：一些资源依赖于其他资源。很明显，依赖链对于在相关资源组上执行各种操作（如创建或销毁）的顺序至关重要。Terraform\
    \ 会构建一个图来跟踪所有这些依赖关系，并用它来决定哪些操作可以并行完成（以缩短整体配置时间），哪些操作必须按顺序执行。\n\n你编写的基础设施代码被理解为*预期状态*。你可以来回更改代码，并多次应用这些更改。每次你这样做时，Terraform\
    \ 都会将预期状态与所谓的*当前状态*（对应于上一次配置期间部署的基础设施）进行比较。计算出的差异用于创建一个*执行计划*，该计划由一系列步骤组成，这些步骤涉及调用各种\
    \ OCI REST API，从而引发实际的配置操作。只要不影响依赖链，选定的步骤可以并行运行。一个执行计划可以包括创建新云资源、修改现有资源或终止必须删除的资源的操作。有时，仅仅更改一个资源的属性就会导致终止实例并启动一个全新的实例。例如，当你更改现有实例的计算实例规格（shape）时，就会发生这种情况。规格指定了计算实例的硬件配置。其他更改可能导致非破坏性的修订，例如向现有安全列表添加一条新的安全规则。\n\
    \n我们在本节中刚刚完成的是一个关于 Oracle Cloud Infrastructure 的 Terraform 提供程序速成课程。如果你感觉我们只是触及了某个复杂事物的表面，那你是完全正确的，但别担心。本书的所有后续章节中，我们将使用\
    \ Terraform，因此你将有很多机会进行实践。最后但同样重要的是，随着 Terraform 功能在书中出现，我会随时进行解释。\n\n**提示**\n\
    \n你可以在 [www.terraform.io/docs/index.html](http://www.terraform.io/docs/index.html)\
    \ 找到 Terraform 文档。\n\n我敢打赌你现在正在问自己，如何开始着手使用 Terraform 驱动的 Oracle Cloud Infrastructure\
    \ 自动化。先安装软件怎么样？\n"
- fmt: '### Installation


    At the time of writing, you just download a single, executable binary file with
    the Terraform version that matches your operating system. To install Terraform,
    follow these steps:


    1.  Go to [`www.terraform.io/downloads.html`](http://www.terraform.io/downloads.html).


    2.  Download the binary file for your operating system.


    3.  Move the downloaded `terraform` file to the directory where you are storing
    software binaries, and remember to add this directory to your `PATH` variable,
    unless you’ve already done it.


    4.  Test the installation by issuing a version check command.


    All these steps can be automated. Just be careful to identify the correct path
    to the newest binary before you do them. At the time of writing, the newest binary
    is the 0.12.9 version.


    ```

    $ wget https://releases.hashicorp.com/terraform/0.12.2/terraform_0.12.9_linux_amd64.zip

    $ sudo unzip terraform_0.12.9_linux_amd64.zip -d /usr/local/bin

    $ terraform -v

    Terraform v0.12.9

    ```


    Tip


    If you are using Windows Subsystem for Linux, you have to download the Terraform
    binary for Linux. Use the preceding code snippet, and execute it within the WSL
    Console.


    As you probably expect, this simplicity comes at the cost of *manual upgrades*.
    You need to download a new binary and replace the file you’ve been using every
    time you see a message like this:


    ```

    $ terraform -v

    Terraform v0.12.8

    Your version of Terraform is out of date! The latest version

    is 0.12.9\. You can update by downloading from www.terraform.io/downloads.html

    ```


    This is pretty much everything you need to know about the installation. All further
    aspects have to be considered in the context of particular provider plugins you
    are going to work with. Let me explain what I mean in the next section.


    ### Configuration


    As a matter of fact, the expression *Terraform configuration* refers to the entire
    set of files with infrastructure code. Each project contains at least one `provider`
    block in one of the infrastructure code files. Based on this block, Terraform
    knows which provider plugin binary to use. If Terraform doesn’t find the corresponding
    provider plugin binary in the cross-project default directory, it will download
    the binary and place it in the `.terraform/plugins` subdirectory of the project.


    To explore the simplest Terraform-based infrastructure project, go to the `chapter03/3-terraform/1-provider-only`
    directory.


    ```

    $ cd git/oci-book/chapter03/3-terraform/1-provider-only

    ```


    This project directory contains two files, as shown in Listing [3-12](#478313_1_En_3_Chapter.xhtml#PC46).


    ```

    1-provider-only/

    ├── provider.tf

    └── vars.tf

    Listing 3-12

    Terraform Project Structure (1-provider-only)

    ```


    The content of the `provider.tf` file is shown in Listing [3-13](#478313_1_En_3_Chapter.xhtml#PC47).


    ```

    # provider.tf

    provider "oci" {

    tenancy_ocid = var.tenancy_ocid

    user_ocid = var.user_ocid

    region = var.region

    fingerprint = var.fingerprint

    private_key_path = var.private_key_path

    private_key_password = var.private_key_password

    }

    Listing 3-13

    Terraform Provider Configuration Referencing Variables

    ```


    Because Terraform eventually sends API requests to the OCI REST API, it needs
    the same set of connection parameters required by the SDK and the CLI to sign
    the request. The “Preparing for SDK, CLI, and Terraform” section describes where
    you can find them. In theory, you could store the values relevant to your cloud
    environment directly in the `provider.tf` file. This is discouraged, however,
    because these consist of, to some extent, sensitive data, and you do not want
    to store the data in a version-control system.


    To avoid storing the values required by the `provider` block inside any of the
    infrastructure code files, we will inject them using variables. We still need
    to declare these variables. You could consider adding variable declarations to
    the same `provider.tf` file. It would be absolutely fine. Yet, to keep the project
    assets well structured, there exists another file for that purpose: the `vars.tf`
    file. It is shown in Listing [3-14](#478313_1_En_3_Chapter.xhtml#PC48).


    ```

    # vars.tf

    variable "tenancy_ocid" {}

    variable "user_ocid" {}

    variable "region" {}

    variable "fingerprint" {}

    variable "private_key_path" {}

    variable "private_key_password" {}

    Listing 3-14

    Terraform Variables Configuration

    ```


    There are four basic ways to supply the values for variables.


    *   Providing each variable with a value at the prompt when executing Terraform
    commands

    *   Providing each variable individually with the `-var` argument when executing
    a Terraform command

    *   Using a variable definition file `.tfvars` whose file path is passed as the
    `-var-file` argument when executing a Terraform command

    *   Using environment variables prefixed with `TF_VAR_`


    You could supply the values for variables every time you issue the `terraform`
    command, but I am sure it would become annoying even to the most patient person
    in the planet. More often, you will end up defining them in a variable definition
    file or using environment variables.


    Any environment variable prefixed with `TF_VAR_` will be taken into account by
    Terraform. For example, `the TF_VAR_region` will be treated as the source for
    the variable `region`. This is why you will find it useful to keep your input
    variables in some sort of shell script. You would then execute this script and,
    as a result, set these variables every time you are about to work on a Terraform-based
    project. Let’s prepare a file like that. First, copy the following template:


    ```

    $ cp ~/git/oci-book/chapter03/3-terraform/tfvars.env.template.sh ~/tfvars.env.sh

    ```'
