    The OCI REST API uses JSON for the payload. The CLI will also output JSON as its
    default format. You can change it and use a tabular output by applying `the --output
    table` option. If you want to limit what gets printed, you can use `the --query`
    option that consumes a valid *JMESPath*, which is a query language for JSON.


    Tip


    If you have ever worked with XML before, you can think of JMESPath as something
    like XPath but for JSON.


    Nearly every CLI command requires a compartment OCID. If you know that you are
    going to work with one given compartment for the majority of time, you can define
    a default value for the `--compartment-id` option. Default values for CLI commands
    options can be defined in the `~/.oci/oci_cli_rc` file. Listing [3-7](#478313_1_En_3_Chapter.xhtml#PC28)
    presents a minimalistic `oci_cli_rc` file with just one profile with a single
    default value.


    ```

    [DEFAULT]

    compartment-id = ocid1.compartment.oc1..aa.........

    Listing 3-7

    OCI CLI RC File

    ```


    The `[DEFAULT]` part is the name of the profile. This also applies to the configuration
    file shown in Listing [3-6](#478313_1_En_3_Chapter.xhtml#PC24). You can store
    multiple profiles in one configuration file (or in the file with default values)
    and dynamically select the profile with the `--profile` option when you issue
    a CLI command. For example, you can have a separate profile for each compartment.
    This can be helpful when you work with just a few compartments and want to simplify
    the way you choose them as you execute CLI commands. Listing [3-8](#478313_1_En_3_Chapter.xhtml#PC29)
    presents this configuration.


    ```

    [DEFAULT]

    compartment-id = ocid1.compartment.oc1..aa.........abc

    [SANDBOX]

    compartment-id = ocid1.compartment.oc1..aa.........def

    Listing 3-8

    OCI CLI RC File with Multiple Profiles

    ```


    Actually, there is more than just the default values you can store in the `oci_cli_rc`
    file. For example, it is possible to create named JMESPath queries and reference
    them as you use CLI commands. We are going to test this now.


    Please copy the template of the `oci_cli_rc` file to the `~/.oci/` directory and
    edit the file to replace the value of the `compartment_id` property with the OCID
    of your `Sandbox` compartment.


    ```

    $ cp ~/git/oci-book/chapter03/2-cli/oci_cli_rc.template ~/.oci/oci_cli_rc

    $ vi ~/.oci/oci_cli_rc

    ```


    Listing [3-9](#478313_1_En_3_Chapter.xhtml#PC31) presents the `oci_cli_rc` file.
    The `DEFAULT` profile includes the `compartment-id` for your `Sandbox` compartment.
    The predefined section called `OCI_CLI_CANNED_QUERIES` is used to store common
    queries that can be reused in your CLI calls. A query called `list_ubuntu_1804`
    can be used to filter the results based on the version of the operating system
    and display image names only.


    ```

    [DEFAULT]

    compartment-id = ocid1.compartment.oc1..aa.........gzwhsa

    [OCI_CLI_CANNED_QUERIES]

    list_ubuntu_1804 = data[?"operating-system-version"==''18.04''].{Image:"display-name"}

    Listing 3-9

    OCI CLI RC File with Predefined Query

    ```


    Now, you can reuse this predefined query as you type the CLI command. Remember
    to prefix the value for the `--query` parameter with `the query://` string.


    ```

    $ oci compute image list --operating-system "Canonical Ubuntu" --output table
    --query query://list_ubuntu_1804

    +-------------------------------------+

    | Image                               |

    +-------------------------------------+

    | Canonical-Ubuntu-18.04-2019.05.15-0 |

    | Canonical-Ubuntu-18.04-2019.04.15-0 |

    | Canonical-Ubuntu-18.04-2018.12.10-0 |

    +-------------------------------------+

    ```


    Tip


    If you are using both the CLI and the SDK for other projects, you can either maintain
    multiple configuration files and explicitly pass their filesystem path or base
    on dedicated, named profiles in a single configuration file under the default
    path.


    If you want to learn more about CLI configuration, you can refer to the official
    documentation at [`https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/cliconfigure.htm`](https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/cliconfigure.htm).'
