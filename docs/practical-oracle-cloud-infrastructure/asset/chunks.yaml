    *   A VCN contains an active Internet gateway (IGW) .


    *   A route rule directs outbound traffic to the IGW.


    *   Security rules allow a particular type of inbound and outbound traffic.


    In the course of the previous chapters, you had multiple opportunities to work
    with these resources in the Console as well as using the CLI and Terraform.


    How is a public IP address actually attached to an instance? From a management
    point of view, a public IP cloud resource is always associated with a private
    IP cloud resource. For the majority of use cases, this happens in the background,
    and you do not even need to do anything special about that. Because there is a
    finite number of public IPv4 addresses, Oracle Cloud uses public IP address pools.
    By default, a newly created instance gets an available public IPv4 address from
    the Oracle Cloud address pool, as shown in Figure [6-5](#478313_1_En_6_Chapter.xhtml#Fig5).
    After an instance has been terminated, the address goes back to the pool and may
    be reused in the future, also by other customers. This is called an *ephemeral
    public IP* . Its lifecycle is strictly tied to a particular compute instance.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig5_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig5_HTML.jpg)


