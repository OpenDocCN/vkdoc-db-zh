    $ oci os object list -bn blueprints --prefix "waw/wola/b/12" --query ''data[*].name''
    --profile SANDBOX-USER

    [

    "waw/wola/b/120.pdf",

    "waw/wola/b/121.pdf"

    ]

    ```


    ### Listing Objects in Pages


    In your daily work, you may easily encounter buckets that contain hundreds or
    thousands of objects. Listing all of them at once is impossible. You need to revert
    to the *paging mechanism*. You may remember the Search API and its paging mechanism
    that I described in the previous chapter. The bad news is that, at the time of
    writing, the Search API does not support object storage objects. The good news
    is that the Object Storage ListObjects API features its own paging mechanism,
    which is actually slightly simpler than the one used in the Search API. If you
    decide to use the `limit` parameter, in the response besides the list of objects
    you will receive the `next-start-with` element that is nothing more than the name
    of the next object. In every subsequent query, you can take the value of the previous
    `next-start-with` element and use the `start` parameter to instruct the API where
    to start listing the elements, as shown in this code snippet:


    ```

    $ oci os object list -bn blueprints  --limit 5 --query ''{names:data[*].name,
    next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/bemowo/101.pdf",

    "waw/bemowo/102.pdf",

    "waw/bemowo/105.pdf",

    "waw/bemowo/107.pdf",

    "waw/bemowo/115.pdf"

    ],

    "next": "waw/wola/a/115.pdf"

    }

    $ oci os object list -bn blueprints  --limit 5 --start "waw/wola/a/115.pdf" --query
    ''{names:data[*].name, next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/wola/a/115.pdf",

    "waw/wola/a/120.pdf",

    "waw/wola/a/124.pdf",

    "waw/wola/a/130.pdf",

    "waw/wola/b/119.pdf"

    ],

    "next": "waw/wola/b/120.pdf"

    }

    $ oci os object list -bn blueprints  --limit 5 --start "waw/wola/b/120.pdf" --query
    ''{names:data[*].name, next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/wola/b/120.pdf",

    "waw/wola/b/121.pdf"

    ],

    "next": null

    }

    ```'
