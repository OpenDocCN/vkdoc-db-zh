- fmt: '### Object Metadata


    另一个与在对象存储桶中存储不同种类和业务用途文件相关的实用方面是可以附加*自定义元数据*。通过这种方式，您可以在不改变对象内容的情况下，通过注释选定对象来提供额外的上下文信息。回到我们房地产项目的示例场景，我们可以决定注释那些指向两层公寓的蓝图。因为不想更改对象内容，我们可以利用自定义元数据，它本质上是由与现有对象关联的键值对组成的。以下是如何将带有自定义元数据（`apartment-levels`键）的新对象放入存储桶：


    ```

    $ head -c 4096 /dev/urandom > warsaw/wola/a/122.pdf

    $ METADATA=''{ "apartment-levels": "2" }''

    $ oci os object put -bn blueprints --name "waw/wola/a/122.pdf" --file warsaw/wola/a/122.pdf
    --metadata "$METADATA" --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    {

    "etag": "b899ed57-baca-4aff-85ba-5e1fe925c437",

    "last-modified": "Sat, 09 Mar 2019 10:46:34 GMT",

    "opc-content-md5": "kZ6fEuo46zGMm+Tymcumaw=="

    }

    ```


    乍一看，似乎没有发生什么特别的事情。然而，如果您在OCI控制台中查看对象详细信息，您将看到一个新的自定义键值对，如图[5-7](#478313_1_En_5_Chapter.xhtml#Fig7)所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig7_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig7_HTML.jpg)


    图 5-7


    对象的自定义元数据


    如果您考虑通过API进行可编程交互，则无需下载特定文件来检查其自定义元数据。`HeadObject` API让您仅读取对象的元数据和实体标签。我们将在下一节讨论实体标签的重要性。以下是使用`oci
    os object head` CLI命令访问此API的方法：


    ```

    $ oci os object head -bn blueprints --name "waw/wola/a/122.pdf" --profile SANDBOX-USER

    {

    ......

    "content-length": "4096",

    "content-md5": "kZ6fEuo46zGMm+Tymcumaw==",

    "content-type": "application/octet-stream",

    "date": "Sat, 09 Mar 2019 11:40:41 GMT",

    "etag": "b899ed57-baca-4aff-85ba-5e1fe925c437",

    "last-modified": "Sat, 09 Mar 2019 10:46:34 GMT",

    ......

    "opc-meta-apartment-levels": "2",

    ......

    }

    ```


    在这两种情况下，您都可以看到任何自定义键都会带有`the opc-meta-`前缀，以避免与任何标准元数据（如`content-length`或`content-type`）发生冲突。您需要意识到对象是不可变的；因此，要向存储桶中已存在的对象附加新元数据，我们必须替换该对象。无论新版本是否包含相同的内容，这都无关紧要。


    ### Concurrent Updates


    让我们讨论一下所谓的*竞态条件*。假设有两个应用程序想要同时更新同一个对象，以增量方式添加它们的局部更改。如果它们一个接一个地立即获取对象，它们将处理相同的基础版本，每个应用程序都不知道另一个应用程序正在并行处理同一个对象。在两个应用程序都决定上传对象的新版本（从而有效地替换基础版本）之前，一切似乎都很好。结果很容易预测。第二个执行更新的应用程序将覆盖第一个保存对象的应用程序所做的更改。这种情况可以称为*丢失更新*，其概念如图[5-8](#478313_1_En_5_Chapter.xhtml#Fig8)所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig8_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig8_HTML.jpg)


    图 5-8


    丢失更新问题


    丢失更新的影响取决于业务场景。想象一下，通过给已售出的停车位着色来更改地下停车场地图的应用程序逻辑。在这种情况下，丢失更新将导致某些停车位即使已售出也显示为可用。通常，我们更愿意完全消除这类问题。对象存储API通过*实体标签*（ETags）来解决这个问题，它可以用于实现乐观并发控制。ETag是为每个对象版本生成的标识符，无论内容是否更改。如果您放置同一个对象两次，即在第二次上传期间使用相同的内容覆盖它，您仍然会得到两个不同的ETag，如以下代码片段所示：


    ```

    $ head -c 8096 /dev/urandom > warsaw/bemowo/parking.pdf

    $ oci os object put -bn blueprints --name waw/bemowo/parking.pdf --file warsaw/bemowo/parking.pdf
    --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    {

    "etag": "d5ded03a-64ca-4af2-8185-563f658f4021",

    "last-modified": "Sat, 09 Mar 2019 16:43:31 GMT",

    "opc-content-md5": "upvy5Ns5flwg053S8WJG1w=="

    }

    $ oci os object put -bn blueprints --name waw/bemowo/parking.pdf --file warsaw/bemowo/parking.pdf
    --profile SANDBOX-USER

    WARNING: This object already exists. Are you sure you want to overwrite it? [y/N]:
    y

    Uploading object  [####################################]  100%

    {

    "etag": "4f893925-455a-4ea5-8890-2b39f8523d82",

    "last-modified": "Sat, 09 Mar 2019 16:43:41 GMT",

    "opc-content-md5": "upvy5Ns5flwg053S8WJG1w=="

    }

    ```


    您将如何在您的应用程序逻辑中包含*乐观并发控制*以避免竞态条件？对对象的更新操作可以分步骤执行。首先，读取当前对象的ETag并下载对象内容。接下来，应用程序在本地更改对象。最后，告诉API将对象的新版本放入存储桶，从而有效地覆盖旧版本，但仅当ETag在此期间未更改时。这样的条件PUT可以使用`If-Match`
    HTTP头来实现，如图[5-9](#478313_1_En_5_Chapter.xhtml#Fig9)所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig9_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig9_HTML.jpg)


    图 5-9


    实现乐观并发


    让我使用CLI来演示这个场景：'
  raw: '### Object Metadata


    Another useful aspect related to storing files of different kinds and business
    purposes in object storage buckets is the possibility to attach *custom metadata*
    . In this way, you can provide additional contextual information by annotating
    selected objects without changing their content. Back to our example scenario
    with the real estate projects, we could decide to annotate the blueprints that
    refer to two-level apartments. Because we do not want to change the object content,
    we can leverage custom metadata that basically consists of key-value pairs that
    you associate with an existing object. This is how you put a new object with some
    custom metadata (`apartment-levels` key) into a bucket:


    ```

    $ head -c 4096 /dev/urandom > warsaw/wola/a/122.pdf

    $ METADATA=''{ "apartment-levels": "2" }''

    $ oci os object put -bn blueprints --name "waw/wola/a/122.pdf" --file warsaw/wola/a/122.pdf
    --metadata "$METADATA" --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    {

    "etag": "b899ed57-baca-4aff-85ba-5e1fe925c437",

    "last-modified": "Sat, 09 Mar 2019 10:46:34 GMT",

    "opc-content-md5": "kZ6fEuo46zGMm+Tymcumaw=="

    }

    ```


    At first glance, nothing particular seems to have happened. Yet, if you view object
    details in the OCI Console, you will see a new custom key-value pair, as shown
    in Figure [5-7](#478313_1_En_5_Chapter.xhtml#Fig7).


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig7_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Custom metadata of an object


    If you consider programmable interactions with the API, there is no need to download
    a particular file to inspect its custom metadata. The `HeadObject` API lets you
    read only the object’s metadata and the entity tag. We will talk about the importance
    of entity tags in the next section. This is how you access this API using the
    `oci os object head` CLI command:


    ```

    $ oci os object head -bn blueprints --name "waw/wola/a/122.pdf" --profile SANDBOX-USER

    {

    ......

    "content-length": "4096",

    "content-md5": "kZ6fEuo46zGMm+Tymcumaw==",

    "content-type": "application/octet-stream",

    "date": "Sat, 09 Mar 2019 11:40:41 GMT",

    "etag": "b899ed57-baca-4aff-85ba-5e1fe925c437",

    "last-modified": "Sat, 09 Mar 2019 10:46:34 GMT",

    ......

    "opc-meta-apartment-levels": "2",

    ......

    }

    ```


    In both cases, you can see that any custom key will be prefixed with `the opc-meta-`
    prefix to avoid conflicts with any standard metadata such as `content-length`
    or `content-type`. You need to be aware that the objects are immutable; therefore,
    to attach new metadata to an object already present in a bucket, we have to replace
    the object. It does not matter if the new version contains the same content.


    ### Concurrent Updates


    Let’s discuss something called *race conditions* . Suppose there are two applications
    that want to update the same object, at the same time, incrementally adding their
    partial changes. If they fetch the object straight one after another, they will
    be processing the same base version, each unaware of the fact that there is another
    application working on the same object in parallel. Everything seems fine until
    the moment in which both applications decide to upload a new version of the object,
    effectively replacing the base version. The result is easy to predict. The application
    that performs an update second will wipe out the changes done by the application
    that saved the object first. This situation can be called a *lost update* and
    is conceptually presented in Figure [5-8](#478313_1_En_5_Chapter.xhtml#Fig8).


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig8_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Lost update problem


    The impact of a lost update depends on the business scenario. Think of application
    logic that changes underground parking lot maps by coloring the parking spaces
    that have been sold. In this case, a lost update would result in showing some
    parking spaces as available even though they have been sold. Usually, we would
    prefer to completely eliminate that kind of issue. The object storage API addresses
    this problem with *entity tags* (ETags) that can be used to implement optimistic
    concurrency control. An ETag is an identifier generated for each version of the
    object, no matter whether the content has changed or remained the same. If you
    put the same object twice, effectively overwriting it with the same content during
    the second upload, you will still end up having two different ETags generated,
    as shown in this code snippet:


    ```

    $ head -c 8096 /dev/urandom > warsaw/bemowo/parking.pdf

    $ oci os object put -bn blueprints --name waw/bemowo/parking.pdf --file warsaw/bemowo/parking.pdf
    --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    {

    "etag": "d5ded03a-64ca-4af2-8185-563f658f4021",

