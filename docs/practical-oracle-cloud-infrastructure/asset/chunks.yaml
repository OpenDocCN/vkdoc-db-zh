  trans: '

    # 关系数据模型


    组织和构建数据的方式通常被称为**数据模型**。数据模型本身通常意味着各个数据实体之间存在多种关系和完整性要求。一个数据实体可以代表一个独立的业务对象，如产品、客户或销售项。数据实体也用于体现技术数据，例如某种收集的测量探头。每个数据实体最终必须以物理数据条目的形式在特定类型的数据库中体现。数据库的类型在某种程度上决定了主要的物理数据条目格式。以下是一些流行的数据库类型：


    - 基于二维表的关系模型

    - 基于`JSON`或`XML`文档的文档导向模型

    - 图数据库

    - 键值存储

    - 宽列存储


    ## 二维表


    二维表被认为是组织业务相关数据最流行、历史上最普遍的方式。此外，业务人员由于日常工作使用电子表格，通常习惯于以表格形式呈现数据。观察二维表，行对应于单个数据对象，而列则代表这些对象所具有的属性，如图
    7-1 所示。


    ![图 7-1：二维表](img/478313_1_En_7_Fig1_HTML.jpg)


    诸如产品、客户或销售项之类的业务数据实体很少孤立存在，几乎总是以某种方式与其他实体相关联。例如，销售项可以引用它们所运输的产品以及进行购买的客户。为了表达二维表之间的这些关系，你需要利用关系数据模型，其设计初衷确实有助于数据库引擎在以下方面发挥作用：


    - 保护数据完整性

    - 解析和优化查询


    ## 数据完整性


    保护数据完整性意味着什么？只有在某个销售项实体所引用的产品实体已经存在的情况下，才能创建该销售项实体。关系数据库能够强制实施这种要求，并禁止在产品表中不存在给定产品条目的情况下创建销售项表条目。这被称为**引用完整性**。关系数据库在这方面确实表现出色。


    尽管从技术上讲关系数据库可以存储重复的行，但在某些工作负载类型中，尤其是操作型负载中，这是不希望出现的。对于这些情况，单个产品通常应该由一个单一的、易于识别的数据条目来表示。为了在表中唯一标识选定的产品，数据条目必须拥有一个或多个列，这些列的值组合起来能唯一标识该数据实体。为了禁止数据库插入重复项，你需要在这些列上创建一个**唯一键数据完整性约束**。任何尝试插入在唯一键列中具有已存在值组合的新数据行的操作都将被拒绝。


    数据完整性基于每个单独列的类型进行保护。关系数据库传统上基于具有固定类型列的表。每个列都定义了一个列数据类型，可以是多种支持的字符、数值、日期和时间数据类型之一。例如，产品名称列可以是基于
    Unicode 的可变长度字符类型，其最大长度由字符数表示，而销售项数量列则使用非负整数数值类型定义。不符合列数据类型的插入值将被拒绝。


    完整性检查还可以强制实现：给定列只允许匹配给定正则表达式的词，或者只允许属于特定范围的数值。这可以通过**检查约束**来实现。在现实世界中，开发者有时会决定在应用层为选定列构建此类检查。这完全取决于创建特定数据模型的目的和上下文。在此阶段，必须指出，并非每个工作负载都需要内置完整性检查的数据模型。事实上，在某些用例中，数据模型的灵活性比强制完整性更受重视。然而，与业务相关的数据通常倾向于拥有这些完整性约束。


    ## 数据检索与 SQL


    存储数据只是硬币的一面。要使用持久化的数据，你必须能够定期且高效地从数据库中检索它。为了获取所需的数据条目子集，你需要查询数据库引擎。对于关系数据库，你通常使用标准化的**结构化查询语言**
    (`SQL`) 来精确定义要返回的内容，有时会扩展以包含数据库特定的功能。一个`SQL`查询从客户端发送到数据库引擎，引擎将其转换为**查询执行计划**。基于此计划，数据库引擎检索数据并将其发送回客户端。


    清单 7-1 展示了一个基本的`SQL`查询，该查询选择了所有条形码以 590 开头且类别代码等于 REG 的产品的名称和条形码。


    ```sql

    SELECT name, barcode

    FROM products

    WHERE barcode LIKE ''590%'' AND category_code = ''REG'';

    ```

    **清单 7-1** `SQL` SELECT 语句

    '
- fmt: '# 关系型数据库核心概念与Oracle Database概览


    查询可以针对单个表，也可以跨多个表，根据需要连接它们。来自不同表的行基于特定数据模型中定义的关系进行连接。例如，如果您想收集所有仅引用被分类为数学书籍的这些产品的销售项目，数据库引擎将必须至少将销售项目表与产品表连接起来，并应用适当的过滤器来排除其他类别。两个表如何连接源自它们的逻辑设计。最流行的关系类型是：一个表反映的实体可以被第二个表中的多个实体引用。同时，第二个表中的每个实体只能引用第一个表中的一个实体。这被称为“一对多关系”。这可以是销售项目表与产品表之间的关系。多个销售项目引用同一个产品，而一个销售项目只引用一个产品。这是通过在销售项目表中为每个条目存储被引用产品的唯一标识符来实现的，如图[7-2](#478313_1_En_7_Chapter.xhtml#Fig2)所示。这个键通常被称为“外键”。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig2_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig2_HTML.jpg)


    图 7-2 建模一对多关系


    为了加速预期会频繁执行的查询，关系型数据库依赖于称为“索引”的附加数据结构，用于绕过耗时的全表扫描并优化表连接。标准的B树索引与单个表关联，并在一个或多个列上创建。索引中列的顺序很重要。使用这些列来过滤结果的查询以及基于这些列的表连接，都可能受益于操作时间的大幅加速。B树索引指向单行。位图索引是另一种流行于实现分析型数据模型的索引类型。它们在存储少量离散值的列上创建，并支持依赖于集合操作的复杂搜索。位图索引指向多行，因此可用于加速聚合查询。一旦创建索引，其管理就由数据库引擎接管。每当您对数据行执行插入、更新或删除操作时，相应的索引也会随之更新。


    与针对数据库的数据修改操作相关的一个关键概念是“事务”。事务确保一组数据修改操作要么全部执行，要么全部不执行。不允许中间状态影响作为事务内包装的数据修改操作主题的数据集。当事务“提交”时，所有语句都会应用到数据库中。如果其中一个语句失败或事务被有意“回滚”，则任何语句都不会导致数据集更改。这使得开发人员能够在其与数据库交互的应用程序中实现复杂的用例和适当的错误处理。事务遵循所谓的ACID属性，即事务是：


    *   原子性

    *   一致性

    *   隔离性

    *   持久性


    原子性和一致性意味着要么所有操作要么没有操作应用于作为事务主题的整个数据集，并且数据库中不允许数据条目处于中间状态。隔离性意味着可以运行多个并发事务，并且任何给定事务的结果只有在成功提交后才对其他事务可见。实际上，有几种所谓的隔离级别，它们决定了如何处理活动的并发事务。最后但同样重要的是，持久性承诺任何已提交的事务都是永久性的且不会丢失，即使在数据库引擎发生故障的情况下也是如此。


    ## Oracle Database


    几十年来，关系型数据库一直被广泛用作不同行业的数据支柱。Oracle Database是于1979年推出的第一个商用SQL关系型数据库管理系统。早几年的1970年，Edgar
    F. Codd在他的理论性、基于数学的论文《大型共享数据库的关系数据模型》中公开介绍了关系数据模型。该模型最终成为几十年来占主导地位的数据库模型，并使Oracle
    Corporation成为该领域的市场领导者。Oracle Database已经发展了40年。在此期间，Oracle将数据库代码移植到C语言，强化了事务支持，增强了事务隔离一致性，转向了允许基于网络架构的客户端-服务器模式，改进了锁定机制，引入了各种备份策略，添加了PL/SQL（它是SQL的过程化扩展），引入了触发器和存储过程，通过集群提供高可用性，利用压缩来优化存储空间占用，并包含了无数的其他改进，例如XML和JSON支持、内存和网格计算支持、空间与图形处理、用于安全和测试的数据屏蔽、高级监控、REST数据服务等等。2013年，随着12c版本的发布，多租户以可插拔数据库的形式出现，Oracle
    Database 12c被宣传为世界上第一个（关系型）为云而设计的数据库。Oracle Database可用于事务性和分析性工作负载，并满足广泛的企业需求。Oracle
    Corporation也是MySQL的守护者，这是最流行的开源关系型数据库之一，通常是小型企业和需求有限且非企业级的组织的首选。


    丰富的功能可能导致颇具挑战性的管理任务，特别是在初始设置、硬件选择、适当的数据库调优以及资源和性能监控方面。这些活动是不可避免的，必须执行以交付生产就绪的数据库。预期工作负载要求越高，就需要越复杂的设置。所有这些功能都依赖于熟练的劳动力并消耗大量时间。为了缓解这一潜在痛点，十多年前，Oracle推出了“Exadata数据库一体机”，它结合了针对数据库优化的硬件、专门的系统控制软件以及当然的Oracle
    Database。Exadata硬件利用InfiniBand网络结构、NVMe SSD存储等技术，提供极致的性能，并支持通过增加CPU核心、安装更多存储卷甚至通过添加额外的机架进行横向扩展来实现逐步扩展。客户可以将Exadata机架安装在他们的数据中心中，以便仍然物理上拥有数据，但利用已经优化的硬件和软件，并将一些生命周期任务委托给内置的自动化或部署和管理基础设施的Oracle高级支持专家。


    虽然运维团队可能确实需要一些时间来推出环境，但开发人员通常不想等待。多年前，Oracle用免费的Oracle Database快捷版丰富了其产品组合，该版本可用于快速启动面向Oracle的应用程序开发，之后再过渡到使用Oracle
    Database企业版。虽然Oracle Database快捷版适合开始使用Oracle Database，但它无助于为生产目的快速提供和管理数据库实例。'
  raw: 'Queries may target single tables or span multiple tables, joining them as
    needed. Rows from different tables are joined based on the relationships defined
    in a particular data model. For example, if you want to collect all sales items
    that refer only to these products that are categorized as mathematical books,
    the database engine will have to join at least the sales items table with the
    products table and apply proper filters to sort out the other categories. How
    two tables are joined is derived from their logical design. The most popular type
    of relationship is when one table reflects entities that can be referenced by
    multiple entities from the second table. At the same time, each entity in the
    second table can reference only one entity from the first table. This is called
    a *one-to-many relationship* . This can be the relationship between the sales
    items table and the products table. Multiple sales items reference the same product,
    while only one product is referenced by a single sales item. This is implemented
    by storing the unique identifier of the referenced product in the sales items
    table for each entry, as shown in Figure [7-2](#478313_1_En_7_Chapter.xhtml#Fig2).
    This key is typically called a *foreign key*.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig2_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Modeling one-to-many relationship


    To speed up queries that are expected to be frequently made, relational databases
    rely on additional data structures called *indexes* , which are used to bypass
    costly full-table searches and optimize table joins. A standard B-tree index is
    associated with a single table and created over one or more columns. The order
    of columns in an index matters. Queries that use these columns to filter the results
    as well as table joins that are based on these columns may benefit from a largely
    accelerated operation time. B-tree indexes point to a single row. Bitmap indexes
    are another type of index popular for implementing analytical data models. They
    are created over columns that store a small number of discrete values and enable
    complex searches that rely on set operations. Bitmap indexes point to multiple
    rows and in this way can be used to speed up aggregate queries. As soon as you
    create an index, its management is taken over by the database engine. Every time
    you issue an insert, update, or delete operation over a data row, the corresponding
    indexes will be brought up-to-date.


    One of the key notions related to data-modifying operations against databases
    are *transactions*. A transaction makes sure that a set of data-modifying operations
    is either carried out as one or none of the transactions takes place. No intermediary
    states are allowed to impact the data set that is the subject of the data-modifying
    operations wrapped inside the transaction. When transaction is *committed,* all
    statements are applied in the database. If one of the statements fails or a transaction
    is intentionally *rolled back*, none of the statements will result in data set
    changes. This lets developers implement complex use cases and proper error handling
    in their applications that interact with databases. Transactions adhere to the
    so-called ACID properties, which means that transactions are


    *   Atomic


    *   Consistent


    *   Isolated


    *   Durable


    Atomicity and consistency imply that either all or none of the operations are
    applied to the entire data set that is the subject of the transaction and no intermediary
    states of data entries are allowed in the database. Isolation means that it is
    possible to run multiple concurrent transactions, and the result of any given
    transaction is visible to other transactions only after it has been successfully
    committed. As a matter of fact, there are a few so-called isolation levels, and
    they decide how active concurrent transactions are handled. Last but not least,
    durability promises that any committed transaction is permanent and never lost,
    even in the case of database engine failure.


    ## Oracle Database


    Relational databases have been widely used as a data backbone across different
    industries for decades. Oracle Database was the first commercially available SQL-based
    relational database management system (RDBMS) introduced in 1979\. A few years
    earlier, in 1970, the relational model of data was publicly introduced by Edgar
    F. Codd in his theoretical, mathematical-based paper “A Relational Model of Data
    for Large Shared Data Banks.” This model eventually became the predominant database
    model for a few decades and made Oracle Corporation the dominant market leader
    in this field. Oracle Database has evolved for 40 years. During these years, Oracle
    ported the database code to the C language, hardened transaction support, enhanced
    transaction isolation consistency, moved to a client-server mode allowing network-based
    architectures, improved locking, introduced various backup strategies, added PL/SQL
    (which is a procedural extension to SQL), introduced triggers and stored procedures,
    offered high availability through clustering, leveraged compression to optimize
    the storage footprint, and included a countless number of other improvements such
    as XML and JSON support, in-memory and grid-computing support, Spatial and Graph,
    data masking for security and testing, advanced monitoring, REST data services,
    and many more. In 2013, multitenancy arrived with version 12c in the form of pluggable
    databases, and Oracle Database 12c was marketed as the world’s first (relational)
    database designed for the cloud. Oracle Database can be used for both transactional
    (OLTP) and analytical (OLAP) workloads and meets a broad range of enterprise demands.
    Oracle Corporation is also the custodian of MySQL, one of the most popular open
    source relational databases that is often the first choice for small businesses
    and organizations with limited and rather nonenterprise requirements.


    The abundance of features can result in rather challenging administration tasks
    especially in terms of initial setup, hardware selection, proper database tuning,
    and resource and performance monitoring. These activities are inevitable and must
    be carried out to deliver a production-ready database. The more demanding the
    expected workloads are, the more sophisticated setup that has to be put in place.
    All of these features depend on a skilled workforce and consume a lot of time.
    To alleviate this potential pain, more than a decade ago, Oracle introduced the
    *Exadata database machine* that combines database-optimized hardware, specialized
    system control software, and, of course, Oracle Database. The Exadata hardware
    leverages the InfiniBand networking fabric, NVMe SSD storage, and many more to
    provide extreme performance and support a gradual scale-up by enabling further
    CPU cores, installing more storage volumes, and even scaling out by placing additional
    racks. Customers can install the Exadata rack(s) in their data centers in order
    to still physically own data but leverage already-optimized hardware and software
    as well as delegate some lifecycle tasks to the built-in automation or Oracle
    advanced support experts who deploy and manage the infrastructure.


    While operations team may be truly given some time to roll out the environment,
    developers usually don’t want to wait. Years ago, Oracle enriched its portfolio
    with a free Oracle Database Express Edition (XE) that can be used to rapidly kick
    off Oracle-oriented application development and only later transition to working
    with the Enterprise Edition of Oracle Database. While Oracle Database Express
    Edition is fine to begin working with Oracle Database, it does not help in rapid
    database instance provisioning and management for production purposes.'
  trans: '# 关系型数据库核心概念与 Oracle Database 概览


    查询可以针对单个表，也可以跨多个表，根据需要连接它们。来自不同表的行基于特定数据模型中定义的关系进行连接。例如，如果您想收集所有仅引用被分类为数学书籍的这些产品的销售项目，数据库引擎将必须至少将销售项目表与产品表连接起来，并应用适当的过滤器来排除其他类别。两个表如何连接源自它们的逻辑设计。最流行的关系类型是：一个表反映的实体可以被第二个表中的多个实体引用。同时，第二个表中的每个实体只能引用第一个表中的一个实体。这被称为“一对多关系”。这可以是销售项目表与产品表之间的关系。多个销售项目引用同一个产品，而一个销售项目只引用一个产品。这是通过在销售项目表中为每个条目存储被引用产品的唯一标识符来实现的，如图
    7-2 所示。这个键通常被称为“外键”。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig2_HTML.jpg](img/478313_1_En_7_Fig2_HTML.jpg)


    图 7-2 建模一对多关系


    为了加速预期会频繁执行的查询，关系型数据库依赖于称为“索引”的附加数据结构，用于绕过耗时的全表扫描并优化表连接。标准的 B 树索引与单个表关联，并在一个或多个列上创建。索引中列的顺序很重要。使用这些列来过滤结果的查询以及基于这些列的表连接，都可能受益于操作时间的大幅加速。B
    树索引指向单行。位图索引是另一种流行于实现分析型数据模型的索引类型。它们在存储少量离散值的列上创建，并支持依赖于集合操作的复杂搜索。位图索引指向多行，因此可用于加速聚合查询。一旦创建索引，其管理就由数据库引擎接管。每当您对数据行执行插入、更新或删除操作时，相应的索引也会随之更新。


    与针对数据库的数据修改操作相关的一个关键概念是“事务”。事务确保一组数据修改操作要么全部执行，要么全部不执行。不允许中间状态影响作为事务内包装的数据修改操作主题的数据集。当事务“提交”时，所有语句都会应用到数据库中。如果其中一个语句失败或事务被有意“回滚”，则任何语句都不会导致数据集更改。这使得开发人员能够在其与数据库交互的应用程序中实现复杂的用例和适当的错误处理。事务遵循所谓的
    ACID 属性，即事务是：


    *   原子性

    *   一致性

    *   隔离性

    *   持久性


    原子性和一致性意味着要么所有操作要么没有操作应用于作为事务主题的整个数据集，并且数据库中不允许数据条目处于中间状态。隔离性意味着可以运行多个并发事务，并且任何给定事务的结果只有在成功提交后才对其他事务可见。实际上，有几种所谓的隔离级别，它们决定了如何处理活动的并发事务。最后但同样重要的是，持久性承诺任何已提交的事务都是永久性的且不会丢失，即使在数据库引擎发生故障的情况下也是如此。


    ## Oracle Database


    几十年来，关系型数据库一直被广泛用作不同行业的数据支柱。Oracle Database 是于 1979 年推出的第一个商用 SQL 关系型数据库管理系统。早几年的
    1970 年，Edgar F. Codd 在他的理论性、基于数学的论文《大型共享数据库的关系数据模型》中公开介绍了关系数据模型。该模型最终成为几十年来占主导地位的数据库模型，并使
    Oracle Corporation 成为该领域的市场领导者。Oracle Database 已经发展了 40 年。在此期间，Oracle 将数据库代码移植到
    C 语言，强化了事务支持，增强了事务隔离一致性，转向了允许基于网络架构的客户端-服务器模式，改进了锁定机制，引入了各种备份策略，添加了 PL/SQL（它是
    SQL 的过程化扩展），引入了触发器和存储过程，通过集群提供高可用性，利用压缩来优化存储空间占用，并包含了无数的其他改进，例如 XML 和 JSON 支持、内存和网格计算支持、空间与图形处理、用于安全和测试的数据屏蔽、高级监控、REST
    数据服务等等。2013 年，随着 12c 版本的发布，多租户以可插拔数据库的形式出现，Oracle Database 12c 被宣传为世界上第一个（关系型）为云而设计的数据库。Oracle
    Database 可用于事务性和分析性工作负载，并满足广泛的企业需求。Oracle Corporation 也是 MySQL 的守护者，这是最流行的开源关系型数据库之一，通常是小型企业和需求有限且非企业级的组织的首选。


    丰富的功能可能导致颇具挑战性的管理任务，特别是在初始设置、硬件选择、适当的数据库调优以及资源和性能监控方面。这些活动是不可避免的，必须执行以交付生产就绪的数据库。预期工作负载要求越高，就需要越复杂的设置。所有这些功能都依赖于熟练的劳动力并消耗大量时间。为了缓解这一潜在痛点，十多年前，Oracle
    推出了“Exadata 数据库一体机”，它结合了针对数据库优化的硬件、专门的系统控制软件以及当然的 Oracle Database。Exadata 硬件利用
    InfiniBand 网络结构、NVMe SSD 存储等技术，提供极致的性能，并支持通过增加 CPU 核心、安装更多存储卷甚至通过添加额外的机架进行横向扩展来实现逐步扩展。客户可以将
    Exadata 机架安装在他们的数据中心中，以便仍然物理上拥有数据，但利用已经优化的硬件和软件，并将一些生命周期任务委托给内置的自动化或部署和管理基础设施的
    Oracle 高级支持专家。


    虽然运维团队可能确实需要一些时间来推出环境，但开发人员通常不想等待。多年前，Oracle 用免费的 Oracle Database 快捷版丰富了其产品组合，该版本可用于快速启动面向
    Oracle 的应用程序开发，之后再过渡到使用 Oracle Database 企业版。虽然 Oracle Database 快捷版适合开始使用 Oracle
    Database，但它无助于为生产目的快速提供和管理数据库实例。'
- fmt: '# Autonomous Database概览


    云计算不仅向市场提供软件即服务或基础设施即服务选项，还提供托管平台服务。托管平台服务可以快速配置，减少整体管理负担，让团队专注于开发和特定平台的使用。每个Oracle
    Cloud区域都提供一个完全托管、高度自动化、集成良好、可扩展的Oracle数据库，称为`Autonomous Database (ADB)`，它有两种形式：`Autonomous
    Transaction Processing (ATP)`和`Autonomous Data Warehouse (ADW)`。ADB运行在接入Oracle
    Cloud Infrastructure骨干网的Exadata硬件上。ADB被宣传为自我驾驶、自我保护和自我修复，这基本上意味着它是一项完全托管的服务，客户方面几乎不需要任何管理努力。诸如打补丁、升级、调优或备份数据库等职责都在后台自动完成。这使您可以专注于数据模型设计和开发，而将任何数据库生命周期任务交给Oracle维护的自动化流程处理，如图[7-3](#478313_1_En_7_Chapter.xhtml#Fig3)所示。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig3_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig3_HTML.jpg)


    **Figure 7-3**


    **Autonomous Database**


    ADB在每个Oracle公共云区域中都可用，有两种部署选择。


    *   `Serverless`

    *   `Dedicated`


    `Serverless`部署是启动托管Oracle数据库的最简单方式。首先选择目标Oracle Cloud区域，然后只需选择初始的CPU数量、存储容量、管理员凭据和工作负载类型（ATP或ADW）。之后，您仍然可以扩展CPU和存储。此外，如果需要，您可以启用CPU自动扩展。其他所有事情，如打补丁、升级、自动调优和备份，都在后台完全自动化完成。总而言之，整个生命周期由Oracle管理的自动化流程负责。无服务器部署选项遵循云中广泛使用的标准模式，即多租户。这意味着什么？可能有多个ADB实例由不同的云租户使用，全部运行在同一台Exadata机器上。如果需要与其他租户更高的隔离性，您的企业可能会考虑`dedicated`部署模式下的ADB，这确实需要多一点初始工作，但能让您专属的Exadata基础设施在Oracle公共云中完全隔离的私有虚拟网络中运行。虽然专用ADB对企业来说是个不错的选择，但大多数用例将从运行高度自动化的无服务器ADB中获益更多。在本书中，我们将仅处理无服务器ADB。


    ADB功能非常强大。在撰写本文时，每个实例的最大CPU核心数为128。您可以随时上下扩展实例的CPU数量和存储容量。Autonomous Database根据CPU和Exadata存储消耗计费。如果您的组织已经持有有效且相关的Oracle数据库许可证，可以在启动ADB实例时考虑选择自带许可证（BYOL）选项。这将显著降低您的云费用。


    ADB可以自我调优，但它仍然需要一些初始指示，说明该特定实例将服务于哪种类型的工作负载。数据库应用程序通常分为两类，需要不同的数据库调优。


    *   事务处理（`OLTP`）系统

    *   分析处理（`OLAP`）系统


    `OLTP workloads`的特点是高频次、大容量且相对较小的写操作。这些操作可能同时来自数百或数千个客户端，从而导致大量并发写入，需要适当的事务隔离。在某些情况下，数据不仅可以交互方式修改，还可以基于批量数据加载进行修改。随着电子商务的出现，事务处理对数据库变得更加重要，有时被视为关系数据库的传统领域。事务数据库通常采用高度规范化的数据模型，以消除可能导致重大数据不一致性的冗余。可以说，事务处理工作负载的主要目标之一是收集数据并根据传入的数据修改操作保持其最新状态。`Autonomous
    Transaction Processing (ATP)`经过调优以服务于此类工作负载。


    `OLAP workloads`的特点是交易数量有限，而倾向于有计划、定期的批量加载大量数据，这些数据通常来自多个事务数据库。数据从多个规范化的事务数据库转换和整合到一个高度非规范化的、有意冗余的分析数据模型中。分析数据库经过调优，以优化预期查询和完全即席查询的性能。在分析数据库上执行的典型操作包括数据透视、向下钻取、向上聚合、切片和切块、数据选择和排序。`OLAP`系统的主要目标是进行多维聚合数据分析，以分析历史数据趋势，发现各种依赖关系或相关性，并最终提供精细的报告。Autonomous
    Data Warehouse经过调优以服务于此类工作负载。


    由ATP和ADW服务的工作负载类型的概念性说明见图[7-4](#478313_1_En_7_Chapter.xhtml#Fig4)。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig4_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig4_HTML.jpg)


    **Figure 7-4**


    **ATP and ADW**'
  raw: 'Cloud computing brings to the market not only software-as-a-service or infrastructure-as-a-service
    options but also managed platform services. Managed platform services can be rapidly
    provisioned, decrease the overall administrational burden, and let teams focus
    on development and the use of a particular platform. Every Oracle Cloud region
    comes with a fully managed, highly automated, well-integrated, scalable Oracle
    database called *Autonomous Database* (ADB) available in two flavors: Autonomous
    Transaction Processing (ATP) and Autonomous Data Warehouse (ADW). ADB runs on
    Exadata hardware plugged into the Oracle Cloud Infrastructure backbone. ADB is
    marketed as self-driving, self-securing, and self-repairing, which basically indicates
    that it is a fully managed service with little if any administrational effort
    at all on the customer side. Responsibilities such as patching, upgrading, tuning,
    or backing up the database are automatically done in the background. This allows
    you to focus on data model design and development, leaving any database lifecycle
    tasks to Oracle-maintained automation, as illustrated in Figure [7-3](#478313_1_En_7_Chapter.xhtml#Fig3).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig3_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Autonomous Database


    ADB is available in each Oracle public cloud region with two deployments choices.


    *   Serverless


    *   Dedicated


    *Serverless* deployment is the simplest way to launch a managed Oracle Database.
    First you choose the target Oracle Cloud region, and then you just select the
    initial number of CPUs, storage capacity, admin credentials, and workload type
    (ATP or ADW). Later, you will still be able to scale up both the CPU and the storage.
    Furthermore, you can enable CPU autoscaling, if needed. Everything else, things
    such as patching, upgrades, auto-tuning, and backups, are fully automated in the
    background. All in all, the entire lifecycle is managed by Oracle-managed automation.
    The serverless deployment option follows the standard pattern widely used in the
    cloud, namely, multitenancy. What does this mean? There can be multiple ADB instances
    used by different cloud tenants, all running in the same Exadata machine. If higher
    isolation from other tenants is required, your enterprise will probably consider
    ADB in the *dedicated* deployment mode, which does require a bit more initial
    effort but lets your exclusive Exadata infrastructure run in completely isolated
    private virtual network in the Oracle public cloud. While a dedicated ADB is a
    good choice for enterprises, the majority of use cases will benefit more from
    running highly automated serverless ADB. In this book, we will be solely dealing
    with serverless ADB.


    ADB can be really powerful. At the time of writing, the maximum number of CPU
    cores per instance is 128\. You can scale an instance at any time up and down
    both for CPU count and for storage capacity. Autonomous Database is billed based
    on CPU and Exadata storage consumption. If your organization already holds a valid
    and relevant Oracle Database license, you can consider choosing the bring-your-own-license
    (BYOL) option when launching an ADB instance. It will considerably discount your
    cloud-based charges.


    ADB can tune itself, but it still requires some initial indication on what kind
    of workloads are going to be served from the particular instance. Database applications
    are generally divided into two groups and require different database tuning.


    *   Transactional processing (OLTP) systems


    *   Analytical processing (OLAP) systems


    *OLTP workloads* result in a high frequency and large volume of relatively small
    write operations. These operations can originate from hundreds or thousands of
    clients at the same time and therefore lead to a large number of concurrent writes
    that require proper transactional isolation. In some cases, data can be altered
    not only interactively but also based on batch data loads. Transaction processing
    has become even more significant for databases with the advent of e-commerce and
    is sometimes considered as the traditional domain for relational databases. Transactional
    databases usually employ highly normalized data models, which eliminate redundancy
    that could otherwise lead to significant data inconsistencies. You could say that
    one of the main goals for transaction processing workloads is to gather data and
    keep them up-to-date based on the incoming data modification operations. *Autonomous
    Transaction Processing* (ATP) is tuned to serve this type of workload.


    *OLAP workloads* are characterized by the limited number of transactions in favor
    of planned and regular batch loading of large data volumes that often originate
    from multiple transactional databases. Data is transformed and consolidated from
    multiple normalized transactional databases to a highly denormalized, intentionally
    redundant, analytical data model. Analytical databases are tuned in such way to
    optimize the performance of both expected and completely ad hoc queries. Typical
    operations performed on analytical databases are pivoting, drilling down, rolling
    up, slicing and dicing, data selection, and sequencing. The main goal for OLAP
    systems is multidimensional aggregate data analysis performed to analyze trends
    based on historical data, discover various dependencies or correlations, and eventually
    provide fine-grained reporting. Autonomous Data Warehouse is tuned to serve this
    type of workload.


    Workload types served by ATP and ADW are conceptually illustrated in Figure [7-4](#478313_1_En_7_Chapter.xhtml#Fig4).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig4_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    ATP and ADW'
  trans: '# 自治数据库概览


    云计算不仅向市场提供软件即服务或基础设施即服务选项，还提供托管平台服务。托管平台服务可以快速配置，减少整体管理负担，让团队专注于开发和特定平台的使用。每个
    Oracle Cloud 区域都提供一个完全托管、高度自动化、集成良好、可扩展的 Oracle 数据库，称为`Autonomous Database (ADB)`，它有两种形式：`Autonomous
    Transaction Processing (ATP)`和`Autonomous Data Warehouse (ADW)`。ADB 运行在接入 Oracle
    Cloud Infrastructure 骨干网的 Exadata 硬件上。ADB 被宣传为自我驾驶、自我保护和自我修复，这基本上意味着它是一项完全托管的服务，客户方面几乎不需要任何管理努力。诸如打补丁、升级、调优或备份数据库等职责都在后台自动完成。这使您可以专注于数据模型设计和开发，而将任何数据库生命周期任务交给
    Oracle 维护的自动化流程处理，如图 7-3 所示。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig3_HTML.jpg](img/478313_1_En_7_Fig3_HTML.jpg)


    **图 7-3**


    **自治数据库**


    ADB 在每个 Oracle 公共云区域中都可用，有两种部署选择。


    *   `Serverless` (无服务器)

    *   `Dedicated` (专用)


    `Serverless`部署是启动托管 Oracle 数据库的最简单方式。首先选择目标 Oracle Cloud 区域，然后只需选择初始的 CPU 数量、存储容量、管理员凭据和工作负载类型（ATP
    或 ADW）。之后，您仍然可以扩展 CPU 和存储。此外，如果需要，您可以启用 CPU 自动扩展。其他所有事情，如打补丁、升级、自动调优和备份，都在后台完全自动化完成。总而言之，整个生命周期由
    Oracle 管理的自动化流程负责。无服务器部署选项遵循云中广泛使用的标准模式，即多租户。这意味着什么？可能有多个 ADB 实例由不同的云租户使用，全部运行在同一台
    Exadata 机器上。如果需要与其他租户更高的隔离性，您的企业可能会考虑`dedicated` (专用)部署模式下的 ADB，这确实需要多一点初始工作，但能让您专属的
    Exadata 基础设施在 Oracle 公共云中完全隔离的私有虚拟网络中运行。虽然专用 ADB 对企业来说是个不错的选择，但大多数用例将从运行高度自动化的无服务器
    ADB 中获益更多。在本书中，我们将仅处理无服务器 ADB。


    ADB 功能非常强大。在撰写本文时，每个实例的最大 CPU 核心数为 128。您可以随时上下扩展实例的 CPU 数量和存储容量。Autonomous Database
    根据 CPU 和 Exadata 存储消耗计费。如果您的组织已经持有有效且相关的 Oracle 数据库许可证，可以在启动 ADB 实例时考虑选择自带许可证（BYOL）选项。这将显著降低您的云费用。


    ADB 可以自我调优，但它仍然需要一些初始指示，说明该特定实例将服务于哪种类型的工作负载。数据库应用程序通常分为两类，需要不同的数据库调优。


    *   事务处理（`OLTP`）系统

    *   分析处理（`OLAP`）系统


    `OLTP workloads` (OLTP 工作负载)的特点是高频次、大容量且相对较小的写操作。这些操作可能同时来自数百或数千个客户端，从而导致大量并发写入，需要适当的事务隔离。在某些情况下，数据不仅可以交互方式修改，还可以基于批量数据加载进行修改。随着电子商务的出现，事务处理对数据库变得更加重要，有时被视为关系数据库的传统领域。事务数据库通常采用高度规范化的数据模型，以消除可能导致重大数据不一致性的冗余。可以说，事务处理工作负载的主要目标之一是收集数据并根据传入的数据修改操作保持其最新状态。`Autonomous
    Transaction Processing (ATP)` (自治事务处理)经过调优以服务于此类工作负载。


    `OLAP workloads` (OLAP 工作负载)的特点是交易数量有限，而倾向于有计划、定期的批量加载大量数据，这些数据通常来自多个事务数据库。数据从多个规范化的事务数据库转换和整合到一个高度非规范化的、有意冗余的分析数据模型中。分析数据库经过调优，以优化预期查询和完全即席查询的性能。在分析数据库上执行的典型操作包括数据透视、向下钻取、向上聚合、切片和切块、数据选择和排序。`OLAP`系统的主要目标是进行多维聚合数据分析，以分析历史数据趋势，发现各种依赖关系或相关性，并最终提供精细的报告。Autonomous
    Data Warehouse (自治数据仓库)经过调优以服务于此类工作负载。


    由 ATP 和 ADW 服务的工作负载类型的概念性说明见图 7-4。


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig4_HTML.jpg](img/478313_1_En_7_Fig4_HTML.jpg)


    **图 7-4**


    **ATP 和 ADW**'
- fmt: "# Autonomous Data Warehouse\n\nAutonomous Data Warehouse is optimized to serve\
    \ analytical processing in OLAP systems. It uses various Oracle tuning choices\
    \ such as specific memory allocation, columnar data format, and parallelized queries\
    \ to boost the performance of typical data warehousing tasks. In contrast to transactional\
    \ systems, data is loaded into ADW nearly exclusively in batches at most once\
    \ per day or even less frequently.\n\nWe are going to simulate a simple data warehousing\
    \ use case for the occurrence of various police-monitored road events across all\
    \ major roads in Poland collected over a couple of years. As a matter of fact,\
    \ the data you are going to use is completely artificial but may look somehow\
    \ realistic and provide a good foundation for some data analytics. I have generated\
    \ the data based on custom-choice parameters and the wide use of normal distribution\
    \ randomness.\n\nTo begin with, we have to provision a new ADW instance, set up\
    \ a database schema, ingest data, and run our analytical queries to answer some\
    \ of the business questions. Next, I will briefly explain what the options are\
    \ to visualize these discoveries. In the course of this and consecutive sections,\
    \ you will be introduced to some basic concepts of data warehousing and apply\
    \ them in practice.\n\n## Provisioning a New ADW Instance\n\nTo provision a new\
    \ Autonomous Data Warehouse instance, there are a few choices to be made and a\
    \ few parameters to be set. ADW instances are region-specific and compartment-aware.\
    \ In other words, like with nearly every Oracle Cloud Infrastructure resource,\
    \ you have to choose the geographical region in which the instance will be provisioned.\
    \ Furthermore, to support environment- and project-specific logical isolation,\
    \ you select the compartment in which a particular ADW instance will be created.\n\
    \nIf you were to use the OCI Console to launch a new instance of Autonomous Data\
    \ Warehouse, you would open a pretty straightforward Autonomous Database creation\
    \ wizard, provide both display and database names, set the workload type to Data\
    \ Warehouse, and configure the initial hardware profile by defining the number\
    \ of CPUs and storage expressed in terabytes, as shown in Figure 7-5. You will\
    \ be able to tune the number of CPUs and storage on the fly at any time. Furthermore,\
    \ you could enable CPU autoscaling to let the database react to the increased\
    \ processing needs.\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig5_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig5_HTML.jpg)\n\
    \n**Figure 7-5** Autonomous Database creation wizard in the OCI Console 1/2\n\n\
    The database administrator user is called `ADMIN`. While working with the wizard,\
    \ you have to set its password. Another important point is related to the licensing\
    \ model. If your organization does not have any available Oracle Database license\
    \ or you simply do not know, remember to set the License Included option. In this\
    \ way, your hourly charge will include the cost of a “new” database license. These\
    \ settings are shown in Figure 7-6.\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig6_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig6_HTML.jpg)\n\
    \n**Figure 7-6** Autonomous Database creation wizard in the OCI Console 2/2\n\n\
    ## Using the OCI CLI\n\nLike I mentioned, this book focuses on automation. We\
    \ are therefore going to use the OCI CLI to launch a new instance of Autonomous\
    \ Data Warehouse in the `Sandbox` compartment on behalf of the `sandbox-admin`\
    \ user.\n\nI am assuming the `SANDBOX-ADMIN` CLI profile is set properly, as described\
    \ in Chapter 4, with the corresponding section in the `oci_cli_rc` file that points\
    \ to the `Sandbox` compartment as the default compartment for all CLI commands.\n\
    \nMake sure you carefully choose the Admin password, which must adhere to the\
    \ guidelines: be between 12 and 30 characters and contain at least one lowercase\
    \ letter, one uppercase letter, and one number. To provision the ADW instance,\
    \ remember to replace the password and use the `db autonomous-database create`\
    \ CLI command like this:\n\n```\n$ ADW_ADMIN_PASS=evr43453fEWQ3@EF\n$ oci db autonomous-database\
    \ create \\\n    --db-name ROADDW \\\n    --display-name road-adw \\\n    --db-workload\
    \ DW \\\n    --license-model LICENSE_INCLUDED \\\n    --cpu-core-count 1 \\\n\
    \    --data-storage-size-in-tbs 1 \\\n    --admin-password \"$ADW_ADMIN_PASS\"\
    \ \\\n    --wait-for-state AVAILABLE \\\n    --profile SANDBOX-ADMIN\nAction completed.\n\
    Waiting until the resource has entered state: AVAILABLE\n```\n\nOracle has recently\
    \ added a free tier marketed as Always Free. At the time of writing, you can provision\
    \ up to two ADB instances limited to one OCPU and 20GB each. These instances won’t\
    \ incur any costs. To launch an Always Free ADB instance, use the `--is-free-tier\
    \ true` option for the `oci db autonomous-database create` CLI command.\n\n```\n\
    $ oci db autonomous-database create \\\n    ...\n    --is-free-tier true \\\n\
    \    ...\n```\n\n**Tip:** If you are working with a paid account, consider using\
    \ the free tier to launch your ROADDW ADB instance for the purpose of running\
    \ the exercises described in this chapter.\n\nThis will result in the creation\
    \ of a new serverless Autonomous Database instance optimized for data warehousing\
    \ and initially equipped with one CPU and 1TB of hardware capacity. The response\
    \ shows a few interesting details including the Oracle Database version and the\
    \ Service Console URL.\n\n```\n...\n\"cpu-core-count\": 1,\n\"data-storage-size-in-tbs\"\
    : 1,\n\"db-name\": \"ROADDW\",\n\"db-version\": \"18c\",\n\"db-workload\": \"\
    DW\",\n\"display-name\": \"road-adw\",\n\"id\": \"ocid1.autonomousdatabase.oc1.eu-frankfurt-1.ab...hm23ea\"\
    ,\n\"is-auto-scaling-enabled\": false,\n\"is-dedicated\": false,\n\"license-model\"\
    : \"LICENSE_INCLUDED\",\n\"lifecycle-state\": \"AVAILABLE\",\n\"service-console-url\"\
    : \"https://adb.eu-frankfurt-1.oraclecloud.com/console/index.html?tenant_name=OCID1.TENANCY.OC1..AA.........3YYMFA&database_name=ROADDW&service_type=ADW\"\
    ,\n...\n```\n\n## Accessing the ADB Service Console\n\nADW database can be used\
    \ fully independently from the OCI Console; therefore, a separate dashboard is\
    \ provided and called the ADB Service Console. You can bookmark and distribute\
    \ the direct link as shown in the `service-console-url` element of the response\
    \ to the `db autonomous-database create` CLI command.\n\nAfter accessing this\
    \ link for the first time, you have to sign in as the ADB `ADMIN` user and provide\
    \ the password you set for this user a few moments ago. The overview dashboard\
    \ of the Service Console is shown in Figure 7-7.\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig7_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig7_HTML.jpg)\n\
    \n**Figure 7-7** Autonomous Database Service Console dashboard\n\n## Viewing ADB\
    \ Instances in the OCI Console\n\nLet’s take a step back and inspect the ADW instance\
    \ details in the OCI Console. All instances that exist in a selected compartment\
    \ are listed, as shown in Figure 7-8.\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig8_HTML.png](images/478313_1_En_7_Chapter/478313_1_En_7_Fig8_HTML.png)\n\
    \n**Figure 7-8** Viewing ADB instances in the OCI Console\n\nTo display the details\
    \ of a particular ADB instance in OCI Console, do the following:\n\n1.  Go to\
    \ Menu ➤ Database ➤ Autonomous Data Warehouse.\n2.  Make sure that the `Sandbox`\
    \ compartment is selected.\n3.  Click the name (`road-adw`) of your ADW instance."
  raw: '## Autonomous Data Warehouse


    Autonomous Data Warehouse is optimized to serve analytical processing in OLAP
    systems. It uses various Oracle tuning choices such as specific memory allocation,
    columnar data format, and parallelized queries to boost the performance of typical
    data warehousing tasks. In contrast to transactional systems, data is loaded into
    ADW nearly exclusively in batches at most once per day or even less frequently.
    We are going to simulate a simple data warehousing use case for the occurrence
    of various police-monitored road events across all major roads in Poland collected
    over a couple of years. As a matter of fact, the data you are going to use is
    completely artificial but may look somehow realistic and provide a good foundation
    for some data analytics. I have generated the data based on custom-choice parameters
    and the wide use of normal distribution randomness. To begin with, we have to
    provision a new ADW instance, set up a database schema, ingest data, and run our
    analytical queries to answer some of the business questions. Next, I will briefly
    explain what the options are to visualize these discoveries. In the course of
    this and consecutive sections, you will be introduced to some basic concepts of
    data warehousing and apply them in practice.


    To provision a new Autonomous Data Warehouse instance, there are a few choices
    to be made and a few parameters to be set. ADW instances are region-specific and
    compartment-aware. In other words, like with nearly every Oracle Cloud Infrastructure
    resource, you have to choose the geographical region in which the instance will
    be provisioned. Furthermore, to support environment- and project-specific logical
    isolation, you select the compartment in which a particular ADW instance will
    be created. If you were to use the OCI Console to launch a new instance of Autonomous
    Data Warehouse, you would open a pretty straightforward Autonomous Database creation
    wizard, provide both display and database names, set the workload type to Data
    Warehouse, and configure the initial hardware profile by defining the number of
    CPUs and storage expressed in terabytes, as shown in Figure [7-5](#478313_1_En_7_Chapter.xhtml#Fig5).
    You will be able to tune the number of CPUs and storage on the fly at any time.
    Furthermore, you could enable CPU autoscaling to let the database react to the
    increased processing needs.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig5_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Autonomous Database creation wizard in the OCI Console 1/2


    The database administrator user is called `ADMIN` . While working with the wizard,
    you have to set its password. Another important point is related to the licensing
    model. If your organization does not have any available Oracle Database license
    or you simply do not know, remember to set the License Included option. In this
    way, your hourly charge will include the cost of a “new” database license. These
    settings are shown in Figure [7-6](#478313_1_En_7_Chapter.xhtml#Fig6).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig6_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Autonomous Database creation wizard in the OCI Console 2/2


    Like I mentioned, this book focuses on automation. We are therefore going to use
    the OCI CLI to launch a new instance of Autonomous Data Warehouse in the `Sandbox`
    compartment on behalf of the `sandbox-admin` user. I am assuming the `SANDBOX-ADMIN`
    CLI profile is set properly, as described in Chapter [4,](#478313_1_En_4_Chapter.xhtml)
    with the corresponding section in the `oci_cli_rc` file that points to the `Sandbox`
    compartment as the default compartment for all CLI commands. Make sure you carefully
    choose the Admin password, which must adhere to the guidelines: be between 12
    and 30 characters and contain at least one lowercase letter, one uppercase letter,
    and one number. To provision the ADW instance, remember to replace the password
    and use the `db autonomous-database create` CLI command like this:


    ```

    $ ADW_ADMIN_PASS=evr43453fEWQ3@EF

    $ oci db autonomous-database create \

    --db-name ROADDW \

    --display-name road-adw \

    --db-workload DW \

    --license-model LICENSE_INCLUDED \

    --cpu-core-count 1 \

    --data-storage-size-in-tbs 1 \

    --admin-password "$ADW_ADMIN_PASS" \

    --wait-for-state AVAILABLE \

    --profile SANDBOX-ADMIN

    Action completed.

    Waiting until the resource has entered state: AVAILABLE

    ```


    Oracle has recently added a free tier marketed as Always Free. At the time of
    writing, you can provision up to two ADB instances limited to one OCPU and 20GB
    each. These instances won’t incur any costs. To launch an Always Free ADB instance,
    use the `--is-free-tier true` option for the `oci db autonomous-database create`
    CLI command.


    ```

    $ oci db autonomous-database create \

    ...

    --is-free-tier true \

    ...

    ```


    Tip


    If you are working with a paid account, consider using the free tier to launch
    your ROADDW ADB instance for the purpose of running the exercises described in
    this chapter.


    This will result in the creation of a new serverless Autonomous Database instance
    optimized for data warehousing and initially equipped with one CPU and 1TB of
    hardware capacity. The response shows a few interesting details including the
    Oracle Database version and the Service Console URL.


    ```

    ...

    "cpu-core-count": 1,

    "data-storage-size-in-tbs": 1,

    "db-name": "ROADDW",

    "db-version": "18c",

    "db-workload": "DW",

    "display-name": "road-adw",

    "id": "ocid1.autonomousdatabase.oc1.eu-frankfurt-1.ab...hm23ea",

    "is-auto-scaling-enabled": false,

    "is-dedicated": false,

    "license-model": "LICENSE_INCLUDED",

    "lifecycle-state": "AVAILABLE",

    "service-console-url": "https://adb.eu-frankfurt-1.oraclecloud.com/console/index.html?tenant_name=OCID1.TENANCY.OC1..AA.........3YYMFA&database_name=ROADDW&service_type=ADW",

    ...

    ```


    ADW database can be used fully independently from the OCI Console; therefore,
    a separate dashboard is provided and called the ADB Service Console. You can bookmark
    and distribute the direct link as shown in the `service-console-url` element of
    the response to the `db autonomous-database create` CLI command. After accessing
    this link for the first time, you have to sign in as the ADB `ADMIN` user and
    provide the password you set for this user a few moments ago. The overview dashboard
    of the Service Console is shown in Figure [7-7](#478313_1_En_7_Chapter.xhtml#Fig7).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig7_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Autonomous Database Service Console dashboard


    Let’s take a step back and inspect the ADW instance details in the OCI Console.
    All instances that exist in a selected compartment are listed, as shown in Figure
    [7-8](#478313_1_En_7_Chapter.xhtml#Fig8).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig8_HTML.png](images/478313_1_En_7_Chapter/478313_1_En_7_Fig8_HTML.png)


    Figure 7-8


    Viewing ADB instances in the OCI Console


    To display the details of a particular ADB instance in OCI Console, do the following:


    1.  Go to Menu ➤ Database ➤ Autonomous Data Warehouse.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click the name (`road-adw`) of your ADW instance.'
  trans: "\n# 自治数据仓库\n\n自治数据仓库经过优化，旨在服务于联机分析处理系统中的分析处理任务。它利用多种 Oracle 调优选项，如特定的内存分配、列式数据格式和并行查询，以提升典型数据仓库任务的性能。与事务处理系统相比，数据几乎完全以批量方式加载到\
    \ ADW 中，每天最多一次，甚至频率更低。\n\n我们将模拟一个简单的数据仓库用例，该用例涉及波兰所有主要道路上几年内收集的各种警方监控的道路事件发生情况。事实上，您将使用的数据完全是人工生成的，但看起来可能比较逼真，并为一些数据分析提供了良好的基础。我是基于自定义参数和广泛使用正态分布随机性生成这些数据的。\n\
    \n首先，我们必须配置一个新的 ADW 实例、设置数据库模式、加载数据，然后运行我们的分析查询来回答一些业务问题。接下来，我将简要说明可视化这些发现有哪些选项。在本节及后续章节中，您将了解到数据仓库的一些基本概念并将其付诸实践。\n\
    \n## 配置新的 ADW 实例\n\n要配置一个新的自治数据仓库实例，需要做出一些选择并设置一些参数。ADW 实例是特定于区域且可感知 compartment\
    \ 的。换句话说，与几乎所有的 Oracle Cloud Infrastructure 资源一样，您必须选择实例将被配置的地理区域。此外，为了支持特定于环境和项目的逻辑隔离，您需要选择将创建特定\
    \ ADW 实例的 compartment。\n\n如果您要使用 OCI 控制台启动一个新的自治数据仓库实例，您将打开一个非常直观的自治数据库创建向导，提供显示名称和数据库名称，将工作负载类型设置为数据仓库，并通过定义\
    \ CPU 数量和以 TB 为单位表示的存储空间来配置初始硬件配置文件，如图 7-5 所示。您可以随时动态调整 CPU 和存储空间数量。此外，您可以启用 CPU\
    \ 自动扩缩，让数据库对增加的处理需求做出反应。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig5_HTML.jpg](img/478313_1_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5** OCI 控制台中的自治数据库创建向导 1/2\n\n数据库管理员用户称为`ADMIN`。在使用向导时，您必须设置其密码。另一个重要点与许可模式相关。如果您的组织没有任何可用的\
    \ Oracle 数据库许可，或者您根本不知道，请记住选择“包含许可”选项。这样，您的每小时费用将包含一个“新”数据库许可的成本。这些设置如图 7-6 所示。\n\
    \n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig6_HTML.jpg](img/478313_1_En_7_Fig6_HTML.jpg)\n\
    \n**图 7-6** OCI 控制台中的自治数据库创建向导 2/2\n\n## 使用 OCI CLI\n\n正如我提到的，本书侧重于自动化。因此，我们将使用\
    \ OCI CLI 代表`sandbox-admin`用户在`Sandbox` compartment 中启动一个新的自治数据仓库实例。\n\n我假设`SANDBOX-ADMIN`\
    \ CLI 配置文件已如第 4 章所述正确设置，`oci_cli_rc`文件中的相应部分将`Sandbox` compartment 指向为所有 CLI 命令的默认\
    \ compartment。\n\n请确保您仔细选择 Admin 密码，密码必须遵循以下准则：长度在 12 到 30 个字符之间，并且至少包含一个小写字母、一个大写字母和一个数字。要配置\
    \ ADW 实例，请记住替换密码，并像这样使用`db autonomous-database create` CLI 命令：\n\n```\n$ ADW_ADMIN_PASS=evr43453fEWQ3@EF\n\
    $ oci db autonomous-database create \\\n    --db-name ROADDW \\\n    --display-name\
    \ road-adw \\\n    --db-workload DW \\\n    --license-model LICENSE_INCLUDED \\\
    \n    --cpu-core-count 1 \\\n    --data-storage-size-in-tbs 1 \\\n    --admin-password\
    \ \"$ADW_ADMIN_PASS\" \\\n    --wait-for-state AVAILABLE \\\n    --profile SANDBOX-ADMIN\n\
    Action completed.\nWaiting until the resource has entered state: AVAILABLE\n```\n\
    \nOracle 最近增加了一个名为“始终免费”的免费套餐。在撰写本文时，您可以配置最多两个 ADB 实例，每个实例限制为 1 个 OCPU 和 20GB。这些实例不会产生任何费用。要启动一个始终免费的\
    \ ADB 实例，请对`oci db autonomous-database create` CLI 命令使用`--is-free-tier true`选项。\n\
    \n```\n$ oci db autonomous-database create \\\n    ...\n    --is-free-tier true\
    \ \\\n    ...\n```\n\n**提示：** 如果您使用的是付费账户，请考虑使用免费套餐启动您的 ROADDW ADB 实例，以运行本章描述的练习。\n\
    \n这将创建一个新的无服务器自治数据库实例，该实例针对数据仓库进行了优化，最初配备一个 CPU 和 1TB 的硬件容量。响应显示了一些有趣的细节，包括 Oracle\
    \ 数据库版本和 Service Console URL。\n\n```\n...\n\"cpu-core-count\": 1,\n\"data-storage-size-in-tbs\"\
    : 1,\n\"db-name\": \"ROADDW\",\n\"db-version\": \"18c\",\n\"db-workload\": \"\
    DW\",\n\"display-name\": \"road-adw\",\n\"id\": \"ocid1.autonomousdatabase.oc1.eu-frankfurt-1.ab...hm23ea\"\
    ,\n\"is-auto-scaling-enabled\": false,\n\"is-dedicated\": false,\n\"license-model\"\
    : \"LICENSE_INCLUDED\",\n\"lifecycle-state\": \"AVAILABLE\",\n\"service-console-url\"\
    : \"https://adb.eu-frankfurt-1.oraclecloud.com/console/index.html?tenant_name=OCID1.TENANCY.OC1..AA.........3YYMFA&database_name=ROADDW&service_type=ADW\"\
    ,\n...\n```\n\n## 访问 ADB 服务控制台\n\nADW 数据库可以完全独立于 OCI 控制台使用；因此，提供了一个单独的仪表板，称为 ADB\
    \ 服务控制台。您可以收藏并分发`db autonomous-database create` CLI 命令响应中`service-console-url`元素所示的直接链接。\n\
    \n首次访问此链接后，您必须以 ADB `ADMIN`用户身份登录，并提供您刚才为此用户设置的密码。服务控制台的概览仪表板如图 7-7 所示。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig7_HTML.jpg](img/478313_1_En_7_Fig7_HTML.jpg)\n\
    \n**图 7-7** 自治数据库服务控制台仪表板\n\n## 在 OCI 控制台中查看 ADB 实例\n\n让我们退一步，在 OCI 控制台中检查 ADW\
    \ 实例的详细信息。选定 compartment 中存在的所有实例都会被列出，如图 7-8 所示。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig8_HTML.png](img/478313_1_En_7_Fig8_HTML.png)\n\
    \n**图 7-8** 在 OCI 控制台中查看 ADB 实例\n\n要在 OCI 控制台中显示特定 ADB 实例的详细信息，请执行以下操作：\n\n1.\
    \  转到菜单 ➤ 数据库 ➤ 自治数据仓库。\n2.  确保选择了`Sandbox` compartment。\n3.  点击您的 ADW 实例名称（`road-adw`）。\n"
- fmt: "Apart from the instance information, you will spot a number of various buttons\
    \ in the top part of the details view, as shown in Figure [7-9](#478313_1_En_7_Chapter.xhtml#Fig9)\
    \ and the backup area at the bottom. The `Service Console`, as the name suggests,\
    \ will open the instance-specific console I’ve already introduced you to. The\
    \ `Scale Up/Down` will let you tune the number of CPUs allocated to the instance\
    \ and storage in 1TB increments. At the time of writing, you should be able to\
    \ allocate up to 128 CPUs and up to 128TB of storage to a single `ADB` instance.\
    \ By default, a standard trial or pay-as-you-go account has a service limit set\
    \ to eight CPUs for Autonomous Database, but you can request a limit increase.\
    \ Please note that your cloud account is billed based on the number of CPUs in\
    \ use and on the allocated storage capacity. To decrease the costs, you can stop\
    \ the instance if you know that there will be idle time. This usually makes sense\
    \ only in the case of data warehousing systems in specific time windows in which\
    \ neither data loads take place nor queries are made. Stopping an instance does\
    \ not put on hold the costs incurred by storage capacity.\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig9_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig9_HTML.jpg)\n\
    *Figure 7-9. Available `ADB` instance actions in the OCI Console*\n\nAutonomous\
    \ Database is backed up every day with no user intervention required. Once per\
    \ week, there is a full backup performed. On the remaining days, there are incremental\
    \ backups made. All these backups are retained for 60 days. All automatic backups\
    \ can be considered hot backups, which basically means that the database remains\
    \ operative and available while a backup is being made. If something goes wrong\
    \ such as there is a table accidentally truncated or an entire schema dropped,\
    \ you can restore its state from a selected backup. The list of available backups\
    \ is visible at the bottom of the `ADB` detail view in the OCI Console, as shown\
    \ in Figure [7-10](#478313_1_En_7_Chapter.xhtml#Fig10), and can be obtained with\
    \ the `OCI CLI` as well.\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig10_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig10_HTML.jpg)\n\
    *Figure 7-10. `ADB` backups in the OCI Console*\n\nEven though we could consider\
    \ using the `ADMIN` user to make regular database queries, it would be against\
    \ the approach generally recommended. Moreover, Oracle Database objects such as\
    \ tables or views exist in the scope of schemas. A schema is associated with a\
    \ database user. To create a few tables in the `road` schema, we need to create\
    \ the `road` database user and grant all required privileges to that user. Autonomous\
    \ Database is based on and compliant with the newest version of Oracle Database;\
    \ therefore, we create database users just as we have done in the case of a traditional\
    \ on-premise Oracle Database instance. We are now going to connect to the database\
    \ as `ADMIN`, create a new user, and grant all the required privileges to that\
    \ user.\n\n## SQL Developer Web\nIf you have ever worked with Oracle Database,\
    \ you probably know what `SQL Developer` is. Oracle `SQL Developer` is a Java-based\
    \ SQL desktop IDE for Oracle Database. You can download it for free and use it\
    \ both with the traditional and Autonomous Oracle Database. `ADB` comes with `SQL\
    \ Developer Web`, a browser-based equivalent that is optimized for `ADB`-related\
    \ tasks. It provides a subset of features available in the more mature desktop\
    \ version, but its capability should be good enough for the majority of SQL tasks.\
    \ Let’s access it.\n\n1.  Go to `Menu` ➤ `Database` ➤ `Autonomous Data Warehouse`.\n\
    2.  Make sure that the `Sandbox` compartment is selected.\n3.  Click the name\
    \ of your `ADW` instance.\n4.  Click the `Service Console` button.\n\n> **Tip** If\
    \ nothing happens after clicking the `Service Console` button, the new window\
    \ might have been blocked by your browser. In your browser, you have to allow\
    \ this page to open new windows.\n\n5.  Sign in as the `ADMIN` user.\n6.  Click\
    \ `Development`.\n7.  Click `SQL Developer Web`.\n\nIf you are prompted to sign\
    \ in again, use the same `ADMIN` credentials. You can paste the following query\
    \ in the worksheet area and click the green `Run Statement` button to see something\
    \ similar to what is shown in Figure [7-11](#478313_1_En_7_Chapter.xhtml#Fig11):\n\
    \n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig11_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig11_HTML.jpg)\n\
    *Figure 7-11. `SQL Developer Web`*\n\n```sql\nSELECT CURRENT_TIMESTAMP FROM dual;\n\
    ```\n\nStill in `SQL Developer Web`, paste the SQL statements shown in the following,\
    \ adapt the password located after the `IDENTIFIED` clause, and run the queries:\n\
    \n```sql\nCREATE USER SANDBOX_USER IDENTIFIED BY \"y0uRp@55worD\";\nGRANT dwrole\
    \ TO SANDBOX_USER;\nALTER USER SANDBOX_USER QUOTA 500M ON DATA;\n```\n\nA new\
    \ database user called `SANDBOX_USER` will be created and given to the predefined\
    \ `ADW`-specific database role called `dwrole`. If you click the `Script Output`\
    \ tab at the bottom, you should see two messages that announce the success of\
    \ both operations.\n\n```\nUser SANDBOX_USER created.\nGrant succeeded.\n```\n\
    \nThe `dwrole` database role equips a user with three groups of privileges.\n\n\
    *   Standard SQL Data Definition Language (`DDL`) operations such as creating\
    \ tables, triggers, views, procedures, and similar\n*   Oracle-specific data warehousing\
    \ and business intelligence SQL `DDL` operations such as analytic views, attribute\
    \ dimensions, hierarchies, and data mining models\n*   `DBMS_CLOUD` `PL/SQL` package\
    \ that bundles together cloud-based Autonomous Database procedures primarily related\
    \ to feeding database tables from cloud object storage\n\nTo let the newly created\
    \ `SANDBOX_USER` user access and work in `SQL Developer Web`, Oracle REST Database\
    \ Services (`ORDS`) access for the user schema has to be enabled. To do so, still\
    \ as the `ADMIN` user, execute the `ORDS_ADMIN.ENABLE_SCHEMA` procedure as follows:\n\
    \n```sql\nBEGIN\n  ords_admin.enable_schema(\n    p_enabled => TRUE,\n    p_schema\
    \ => 'SANDBOX_USER',\n    p_url_mapping_type => 'BASE_PATH',\n    p_url_mapping_pattern\
    \ => 'sandbox',\n    p_auto_rest_auth => TRUE\n  );\n  commit;\nEND;\n```\n\n\
    There should be a message in the `Script Output` tab at the bottom saying the\
    \ following:\n\n```\nPL/SQL procedure successfully completed.\n```\n\nThe `p_schema`\
    \ parameter references the newly created user, while the `p_url_mapping_type`\
    \ parameter defines the user-specific part in the user-dedicated URL for `SQL\
    \ Developer Web`. Figure [7-12](#478313_1_En_7_Chapter.xhtml#Fig12) presents the\
    \ typical structure of the `SQL Developer Web` URL.\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig12_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig12_HTML.jpg)\n\
    *Figure 7-12. `SQL Developer Web` URL structure*\n\nNormally, you prepare the\
    \ user-specific URL and deliver it to the user by replacing the `schema-alias`\
    \ part with the URL mapping pattern value used earlier in the `ORDS_ADMIN.ENABLE_SCHEMA`\
    \ procedure. You can copy the base `SQL Developer Web` URL, while using this browser-based\
    \ tool still as the `ADMIN` user. You have to replace the `schema-alias` part\
    \ that, in this case, is originally set to `the admin` value and use the `sandbox`\
    \ value instead.\n\nLet’s access the `SQL Developer Web` this time as the `SANDBOX_USER`.\
    \ You can open the amended URL in a new browser tab.\n\n> **Tip** As an alternative\
    \ to switching tabs, you can use two different browsers for each `SQL Developer\
    \ Web` session. In this way, you will be able to continue working both as `ADMIN`\
    \ in the first tab (or browser) and as `SANDBOX_USER` in the second tab (or browser),\
    \ as shown in Figure [7-13](#478313_1_En_7_Chapter.xhtml#Fig13).\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig13_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig13_HTML.jpg)\n\
    *Figure 7-13. `SQL Developer Web` users*"
  raw: 'Apart from the instance information, you will spot a number of various buttons
    in the top part of the details view, as shown in Figure [7-9](#478313_1_En_7_Chapter.xhtml#Fig9)
    and the backup area at the bottom. The Service Console, as the name suggests,
    will open the instance-specific console I’ve already introduced you to. The Scale
    Up/Down will let you tune the number of CPUs allocated to the instance and storage
    in 1TB increments. At the time of writing, you should be able to allocate up to
    128 CPUs and up to 128TB of storage to a single ADB instance. By default, a standard
    trial or pay-as-you-go account has a service limit set to eight CPUs for Autonomous
    Database, but you can request a limit increase. Please note that your cloud account
    is billed based on the number of CPUs in use and on the allocated storage capacity.
    To decrease the costs, you can stop the instance if you know that there will be
    idle time. This usually makes sense only in the case of data warehousing systems
    in specific time windows in which neither data loads take place nor queries are
    made. Stopping an instance does not put on hold the costs incurred by storage
    capacity.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig9_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Available ADB instance actions in the OCI Console


    Autonomous Database is backed up every day with no user intervention required.
    Once per week, there is a full backup performed. On the remaining days, there
    are incremental backups made. All these backups are retained for 60 days. All
    automatic backups can be considered hot backups, which basically means that the
    database remains operative and available while a backup is being made. If something
    goes wrong such as there is a table accidentally truncated or an entire schema
    dropped, you can restore its state from a selected backup. The list of available
    backups is visible at the bottom of the ADB detail view in the OCI Console, as
    shown in Figure [7-10](#478313_1_En_7_Chapter.xhtml#Fig10), and can be obtained
    with the OCI CLI as well.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig10_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    ADB backups in the OCI Console


    Even though we could consider using the `ADMIN` user to make regular database
    queries, it would be against the approach generally recommended. Moreover, Oracle
    Database objects such as tables or views exist in the scope of schemas. A schema
    is associated with a database user. To create a few tables in the `road` schema,
    we need to create the `road` database user and grant all required privileges to
    that user. Autonomous Database is based on and compliant with the newest version
    of Oracle Database; therefore, we create database users just as we have done in
    the case of a traditional on-premise Oracle Database instance. We are now going
    to connect to the database as `ADMIN`, create a new user, and grant all the required
    privileges to that user.


    ## SQL Developer Web


    If you have ever worked with Oracle Database, you probably know what SQL Developer
    is. Oracle SQL Developer is a Java-based SQL desktop IDE for Oracle Database.
    You can download it for free and use it both with the traditional and Autonomous
    Oracle Database. ADB comes with SQL Developer Web, a browser-based equivalent
    that is optimized for ADB-related tasks. It provides a subset of features available
    in the more mature desktop version, but its capability should be good enough for
    the majority of SQL tasks. Let’s access it.


    1.  Go to Menu ➤ Database ➤ Autonomous Data Warehouse.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click the name of your ADW instance.


    4.  Click the Service Console button.


    **Tip** If nothing happens after clicking the Service Console button, the new
    window might have been blocked by your browser. In your browser, you have to allow
    this page to open new windows.


    5.  Sign in as the `ADMIN` user.


    6.  Click Development.


    7.  Click SQL Developer Web.


    If you are prompted to sign in again, use the same `ADMIN` credentials. You can
    paste the following query in the worksheet area and click the green Run Statement
    button to see something similar to what is shown in Figure [7-11](#478313_1_En_7_Chapter.xhtml#Fig11):


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig11_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    SQL Developer Web


    ```

    SELECT CURRENT_TIMESTAMP FROM dual;

    ```


    Still in SQL Developer Web, paste the SQL statements shown in the following, adapt
    the password located after the `identified` clause, and run the queries:


    ```

    CREATE USER SANDBOX_USER IDENTIFIED BY "y0uRp@55worD";

    GRANT dwrole TO SANDBOX_USER;

    ALTER USER SANDBOX_USER QUOTA 500M ON DATA;

    ```


    A new database user called `SANDBOX_USER` will be created and given to the predefined
    ADW-specific database role called `dwrole`.


    If you click the Script Output tab at the bottom, you should see two messages
    that announce the success of both operations.


    ```

    User SANDBOX_USER created.

    Grant succeeded.

    ```


    The `dwrole` database role equips a user with three groups of privileges.


    *   Standard SQL Data Definition Language (DDL) operations such as creating tables,
    triggers, views, procedures, and similar


    *   Oracle-specific data warehousing and business intelligence SQL Data Definition
    Language (DDL) operations such as analytic views, attribute dimensions, hierarchies,
    and data mining models


    *   DBMS_CLOUD PL/SQL package that bundles together cloud-based Autonomous Database
    procedures primarily related to feeding database tables from cloud object storage


    To let the newly created `SANDBOX_USER` user access and work in SQL Developer
    Web, Oracle REST Database Services (ORDS) access for the user schema has to be
    enabled. To do so, still as the `ADMIN` user, execute the `ORDS_ADMIN.ENABLE_SCHEMA`
    procedure as follows:


    ```

    BEGIN

    ords_admin.enable_schema(

    p_enabled => TRUE,

    p_schema => ''SANDBOX_USER'',

    p_url_mapping_type => ''BASE_PATH'',

    p_url_mapping_pattern => ''sandbox'',

    p_auto_rest_auth => TRUE

    );

    commit;

    END;

    ```


    There should be a message in the Script Output tab at the bottom saying the following:


    ```

    PL/SQL procedure successfully completed.

    ```


    The `p_schema` parameter references the newly created user, while the `p_url_mapping_type`
    parameter defines the user-specific part in the user-dedicated URL for SQL Developer
    Web. Figure [7-12](#478313_1_En_7_Chapter.xhtml#Fig12) presents the typical structure
    of the SQL Developer Web URL.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig12_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    SQL Developer Web URL structure


    Normally, you prepare the user-specific URL and deliver it to the user by replacing
    the schema-alias part with the URL mapping pattern value used earlier in the `ORDS_ADMIN.ENABLE_SCHEMA`
    procedure. You can copy the base SQL Developer Web URL, while using this browser-based
    tool still as the `ADMIN` user. You have to replace the `schema-alias` part that,
    in this case, is originally set to `the admin` value and use the `sandbox` value
    instead.


    Let’s access the SQL Developer Web this time as the `SANDBOX_USER` . You can open
    the amended URL in a new browser tab.


    Tip


    As an alternative to switching tabs, you can use two different browsers for each
    SQL Developer Web session.


    In this way, you will be able to continue working both as `ADMIN` in the first
    tab (or browser) and as `SANDBOX_USER` in the second tab (or browser), as shown
    in Figure [7-13](#478313_1_En_7_Chapter.xhtml#Fig13).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig13_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


