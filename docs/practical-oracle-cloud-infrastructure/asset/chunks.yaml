    # Oracle Cloud Infrastructure 对象存储监控与公共访问


    Oracle Cloud Infrastructure 提供了丰富的监控功能，包含多种服务特定指标。对于对象存储，存储桶有两个可用指标：对象数量和存储桶聚合大小。要在
    OCI 控制台中查看监控数据，请按照以下步骤操作：


    1.  转到 **菜单** ➤ **对象存储** ➤ **对象存储**。

    2.  单击存储桶名称。

    3.  在 **资源** 选项卡上，选择 **指标**。


    如果单击其中一个图表，将会显示详细视图，如图 5-15 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig15_HTML.jpg](img/478313_1_En_5_Fig15_HTML.jpg)


    图 5-15

    查看对象存储指标


    > **注意**

    > 在详细图表的底部，您将看到用于生成显示结果的查询。Oracle Cloud Infrastructure 使用监控查询语言（MQL），可用于创建自定义图表。


    ## 公共访问


    有时，您可能决定将选定的存储桶设置为允许匿名只读访问，以便向公众提供内容。在构建依赖于公共内容的边缘解决方案（例如移动应用程序）时，此方法可能很有用。例如，您可以将选定的图像、视频和文章存储在允许所有人下载这些对象的存储桶中。在这种情况下，您可以简单地使用
    *公共存储桶*。使用 CLI 时，您可以使用 `--public-access-type` 选项来定义存储桶是私有还是公共。默认值 `NoPublicAccess`
    会创建私有存储桶。公共存储桶可以有两种访问模式。


    *   `ObjectRead`

    *   `ObjectReadWithoutList`


    两者都将允许未经身份验证的用户对对象进行只读访问。唯一的区别是 `ObjectReadWithoutList` 会为未经身份验证的用户禁用对象列表功能。这有助于仅向持有确切链接的用户提供对象，并避免您的内容被爬取，尤其是在您使用难以或无法猜测的对象名称时。技术上可以在公共和私有之间来回更改公共访问类型，但这不被视为最佳实践。


    如果您有一个包含大量对象的存储桶，并且您发现自己处于希望暂时允许对其中一个对象进行未经身份验证的读写访问的情况，该怎么办？在此类及其他场景中，您可能会发现
    *预身份验证请求* 很有用。预身份验证请求带有一个动态生成的唯一 URL，该 URL 在定义的时间段内保持有效。任何持有该 URL 的人都可以在预身份验证请求允许的范围内使用对象存储。如果您为特定对象创建预身份验证请求，可以从三种访问类型中选择。


    *   `ObjectRead`

    *   `ObjectWrite`

    *   `ObjectReadWrite`


    这些 URL 几乎无法猜测。只要您的分发渠道安全，并且您信任边缘的应用程序，您可以考虑构建一个依赖于预身份验证请求的解决方案，供那些既不使用实例主体也不使用经过身份验证的用户的应用程序访问对象。以下是使用
    CLI 为 blueprints 存储桶中的一个 PDF 文件创建预身份验证请求的方法：


    ```bash

    $ date +"%Y-%m-%d"

    2019-09-29

    $ ONE_WEEK_LATER="2019-10-06"

    $ MIDNIGHT="T00:00:00.000Z"

    $ oci os preauth-request create -bn blueprints --name waw-bemowo-105-par --access-type
    ObjectRead --time-expires "$ONE_WEEK_LATER$MIDNIGHT" -on waw/bemowo/105.pdf --profile
    SANDBOX-ADMIN

    {

    "data": {

    "access-type": "ObjectRead",

    "access-uri": "/p/n0218vRTg4FW5d1t1nV-uMPp471HFIxNccISzFiU2Qg/n/jakobczyk/b/blueprints/o/waw/bemowo/105.pdf",

    "id": "tk/aQTCjIGsF1EJ1SsMAMVOwPNW4RErVneNfLjR5LN8=:waw/bemowo/105.pdf",

    "name": "waw-bemowo-105-par",

    "object-name": "waw/bemowo/105.pdf",

    "time-created": "2019-09-29T23:16:20.599000+00:00",

    "time-expires": "2019-10-06T00:00:00+00:00"

    }

    }

    ```


    无论预身份验证请求是通过 OCI 控制台还是使用 CLI 创建的，您都只会看到生成的访问 URI 一次，因此请确保您或您的应用程序代码已读取它。如果您错过了此操作，预身份验证请求将变得无用。`--time-expires`
    选项间接定义了访问 URI 保持活动状态的时间窗口。无法延长或缩短此时间段，但您可以自由删除现有请求并为同一对象创建新的预身份验证请求以更改过期时间。由于这些原因，在构建严重依赖预身份验证请求的解决方案之前，请确保您能够实现可靠的通知和分发渠道，以便向应用程序提供最新的预身份验证请求。


    要使用访问 URI，您需要通过在前面加上特定于区域的基础 URL 来丰富 `data.access-uri` 字段中返回的值，如以下代码片段所示：


    ```bash

    https://objectstorage.eu-frankfurt-1.oraclecloud.com/p/n0218vRTg4FW5d1t1nV-uMPp471HFIxNccISzFiU2Qg/n/jakobczyk/b/blueprints/o/waw/bemowo/105.pdf

    ```


    您可以尝试在 Web 浏览器中打开该链接。不要忘记使用您自己的链接而不是显示的链接。PDF 文件（更准确地说，是本章中模拟 PDF 文件的随机二进制文件）将被下载到您的本地计算机，即使您未以任何方式进行身份验证。


    您可以使用 OCI 控制台（如图 5-16 所示）或 CLI 来列出现有的预身份验证请求，或在需要时在达到过期时间之前删除其中一些。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig16_HTML.png](img/478313_1_En_5_Fig16_HTML.png)


    图 5-16

    在 OCI 控制台中查看活动的预身份验证请求


    也可以为存储桶创建预身份验证请求。在这种情况下，唯一允许的访问类型是 `AnyObjectWrite`，这实际上可以让 URL 持有者管理该存储桶内的所有对象。


    ## 清理


    我们将不再需要本章练习中创建的对象存储资源。您可以删除它们。但有一个例外。不要删除 IAM 策略。我们稍后将需要它们。


    以下是使用 OCI CLI 删除预身份验证请求、对象和 `blueprints` 存储桶的方法：


    ```bash

    $ OS_PARID=`oci os preauth-request list -bn blueprints --query "data[?name==''waw-bemowo-105-par'']
    | [0].id" --raw-output`

    $ oci os preauth-request delete -bn blueprints --par-id $OS_PARID

    Are you sure you want to delete this resource? [y/N]: y

    $ oci os object bulk-delete -bn blueprints

    WARNING: This command will delete 16 objects. Are you sure you want to continue?
    [y/N]: y

    $ oci os bucket delete -bn blueprints

    Are you sure you want to delete this resource? [y/N]: y

    ```


    删除对象将停止其占用存储空间的计费费用。

    '
- fmt: '## Summary


    Object storage was the primary topic of this chapter. At the beginning, we talked
    about objects and how they are organized into buckets. Afterward, you learned
    some basic object manipulation techniques using the CLI. What came then was the
    discussion about the importance of object name prefixes and CLI-based examples
    on how to use them properly. Additionally, I described the bulk commands that
    come with the CLI and presented how to use the object storage API to list objects
    in pages and thus handle large sets of objects in a safe way. We also covered
    the aspect of concurrent updates and the role of ETags in this context. A large
    part of this chapter was devoted to programming object storage. You learned how
    to use the OCI SDK for Python to handle multipart uploads and let applications
    authenticate as instance principals. You were also able to familiarize yourself
    with the concept of defined tags and use them in a matching rule of a dynamic
    group. Finally, I briefly presented the ways to let anonymous users access the
    objects either thanks to public buckets or through pre-authenticated requests.
    In the next chapter, we will explore some fundamental patterns that you are going
    to apply to your compute and networking cloud resources in Oracle Cloud Infrastructure.


    # 6. Patterns for Compute and Networking


    The practice of information technology attaches great importance to the notion
    of reusability, which does not limit itself to software libraries, modules, or
    services, but is often expressed in a form of architectural patterns. In this
    chapter, I am going to guide you through some basic cloud infrastructure patterns
    that are meant to help to solve the standard problems you often encounter while
    designing cloud solutions. This chapter is meant to be a loose discussion built
    around hands-on exercises. It is not supposed to be a comprehensive catalog with
    architectural patterns.


    If you recall Chapter 2 and what you read there about planning cloud infrastructure
    in Oracle Cloud, it becomes clear that you start designing cloud infrastructure
    by preparing the appropriate compartment hierarchy and outlining virtual networking.
    In Chapter 4, I described aspects related to the use of compartments. Now, we
    are going to look at virtual cloud networks.


    ## Virtual Networking


    A virtual cloud network is a software-defined network used to organize and provide
    connectivity between compute instances. It has regional scope, which means that
    you create each `VCN` in one particular Oracle Cloud region. A `VCN` alone is
    useless unless you split it into subnets. Both `VCN`s and their subnets are conceptually
    close to traditional networks that employ IP addressing and address range division.
    If you’ve followed the previous chapters, you’ve already gained some hands-on
    experiences with `VCN`-related resources. Furthermore, you probably remember well
    that every compute instance must exist in the context of a particular virtual
    cloud network. To be more precise, every compute instance must be attached to
    at least one subnet through one or more virtual network interface cards (`VNIC`s).
    A subnet can be bound to a specific availability domain or span all availability
    domains within the entire region. The first type is known as an AD-specifc subnet,
    while the latter is known as a regional subnet. Both subnet types are shown in
    Figure 6-1.


    ![`../images/478313_1_En_6_Chapter/478313_1_En_6_Fig1_HTML.jpg`](images/478313_1_En_6_Chapter/478313_1_En_6_Fig1_HTML.jpg)


    Figure 6-1: Regional and AD-specific subnets


    The regional scope of a particular subnet is usually seen as more flexible because
    it makes it possible to create compute instances in different availability domains,
    simultaneously keeping them attached to the very same subnet. Why would we ever
    need to use an AD-specific subnet instead of a regional subnet? Initially, a subnet
    always had to be created within a particular availability domain. In other words,
    in the beginning, only AD-specific subnets were possible, which imposed the necessity
    to use multiple subnets when designing highly available solutions that rely on
    multiple `AD`s. With the arrival of regional subnets, you may stick to using them
    in the majority of cases. Moreover, Oracle recommends using regional subnets if
    possible. It does make sense to employ AD-specific subnets in a situation in which
    you want to add a layer of control that all instances attached to that subnet
    are always created in a particular `AD`.'
