  trans: '### 配置


    Oracle Cloud Infrastructure 的 Python SDK 就是一个 Python 模块，它提供了一系列客户端类及其方法，这些方法通过调用
    OCI REST API 来管理各种类型的 OCI 资源，例如：


    *   `oci.core.ComputeClient` 类的方法用于管理计算实例。

    *   `oci.core.VirtualNetworkClient` 类的方法用于管理与虚拟云网络相关的资源。

    *   `oci.load_balancer.LoadBalancerClient` 类的方法用于管理负载均衡器资源。


    当你为某个特定的客户端类创建实例对象时，需要提供一个字典（一组键值对）来存储 SDK 的 API 签名详细信息。下面的代码片段从概念上展示了如何操作。请不要尝试执行这些命令，因为其中一个命令还不完整：

    ```

    $ source ocidev/bin/activate

    (ocidev) $ python3

    >>> config = dict([(''tenancy'', ''...''), (''region'', ''...''), (''user'', ''...''),
    (''fingerprint'', ''...''), (''key_file'', ''...''), (''pass_phrase'', ''...'')])

    >>> import oci

    >>> compute = oci.core.ComputeClient(config)

    ```


    也可以从配置文件加载配置。配置文件会包含 SDK 所需的详细信息，以便它能够代表指定的 IAM 用户对发送给 Oracle Cloud Infrastructure
    REST API 的请求进行签名。配置文件的默认名称是 `config`。配置文件的默认位置是 `~/.oci` 目录。该文件必须设置权限，使得只有文件所有者才能读取其内容。清单
    3-5 展示了配置文件的结构。

    ```

    [DEFAULT]

    tenancy=ocid1.tenancy.oc1..aa.........abcdef

    region=eu-frankfurt-1

    user=ocid1.user.oc1..aa.........ghijkl

    fingerprint=12:78:5b:60:65:cf:dc:b1:04:fd:3d:31:2b:a7:88:12

    key_file=/Users/mjk/.apikeys/oci_api_pem

    pass_phrase=secret

    清单 3-5

    OCI 的 Python SDK 配置文件

    ```


    租户 (`tenancy`) 和 IAM 用户 (`user`) 必须提供为有效的 OCID，而区域 (`region`) 必须使用区域标识符，例如 `eu-frankfurt-1`。密钥文件
    (`key_file`) 应该是属于 API 签名密钥对的 PEM 格式私钥的路径，其公钥您已经上传并与 IAM 用户关联。私钥密码 (`pass_phrase`)
    以及公钥指纹 (`fingerprint`) 也存储在配置文件中。这就是为什么必须为 `config` 文件设置适当的权限以限制其内容可见性至关重要。您可以在一个配置文件中存储多个命名的配置配置文件。在我们的示例中，只有
    `DEFAULT` 配置文件。


    我已经为您准备了一个配置文件的模板。您可以在以下路径找到模板文件：`chapter03/1-sdk/config.template`。请复制它并保存为默认位置的
    `~/.oci/config` 文件。

    ```

    $ mkdir ~/.oci

    $ cp ~/git/oci-book/chapter03/1-sdk/config.template ~/.oci/config

    $ chmod go-rwx ~/.oci/config

    $ ls -l ~/.oci

    -rw-------  1 mjk  staff   758B Jun 10 20:21 config

    ```


    现在，调整属性并使用与您环境相对应的值。您可以使用 `vi` 或任何其他文本编辑器。

    ```

    $ vi ~/.oci/config

    ```


    让我们再次激活虚拟环境并启动 Python 解释器。您可以使用 `oci.config.from_file` 函数和与命名配置文件关联的配置。在我们的例子中，这将是
    `DEFAULT` 配置文件。最后，您可以测试创建计算客户端类实例。

    ```

    $ source ocidev/bin/activate

    (ocidev) $ python3

    >>> import oci

    >>> config = oci.config.from_file("~/.oci/config","DEFAULT")

    >>> compute = oci.core.ComputeClient(config)

    >>> quit()

    (ocidev) $ deactivate

    $

    ```


    ### 使用 SDK


    一旦您知道如何准备和加载配置文件，就可以进行第一个简单的测试了。让我们列出您的租户和您选择的 IAM 用户可见的可用性域。

    ```

    $ source ocidev/bin/activate

    (ocidev) $ python3

    >>> import oci

    >>> config = oci.config.from_file("~/.oci/config","DEFAULT")

    >>> identity = oci.identity.IdentityClient(config)

    >>> ads_list = identity.list_availability_domains(config[''tenancy'']).data

    >>> for ad in ads_list:

    ...     print(ad.name)

    ...

    feDV:EU-FRANKFURT-1-AD-1

    feDV:EU-FRANKFURT-1-AD-2

    feDV:EU-FRANKFURT-1-AD-3

    ```


    现在，我将向您展示如何在您的一个非 `root` 容器中创建虚拟云网络。在继续之前，请记下一个非 `root` 容器的 OCID，例如 `Sandbox`，您希望在其中创建
    VCN。OCID 可以在 OCI 控制台中的身份识别 ➤ 容器下找到，如第 2 章“容器”部分所述。要成功测试接下来的脚本，请将 `cid` 变量的值替换为
    `Sandbox` 容器的 OCID。

    ```

    >>> cid = "ocid1.compartment.oc1..aa.........gzwhsa"

    >>> kwargs = { "cidr_block": "10.5.0.0/16", "display_name": "sdk-vcn", "compartment_id":
    cid }

    >>> create_vcn_details = oci.core.models.CreateVcnDetails(**kwargs)

    >>> print(create_vcn_details)

    {

    "cidr_block": "10.5.0.0/16",

    "compartment_id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined_tags": null,

    "display_name": "sdk-vcn",

    "dns_label": null,

    "freeform_tags": null

    }

    >>> vcn = oci.core.VirtualNetworkClient(config)

    >>> response = vcn.create_vcn(create_vcn_details)

    >>> response.data

    {

    "cidr_block": "10.5.0.0/16",

    "compartment_id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "default_dhcp_options_id": "ocid1.dhcpoptions.oc1\. ...",

    "default_route_table_id": "ocid1.routetable.oc1\. ...",

    "default_security_list_id": "ocid1.securitylist.oc1\. ...",

    "defined_tags": {},

    "display_name": "sdk-vcn",

    "dns_label": null,

    "freeform_tags": {},

    "id": "ocid1.vcn.oc1.eu-frankfurt-1.aa.........74vj5a",

    "lifecycle_state": "AVAILABLE",

    "time_created": "2019-06-13T20:56:53.200000+00:00",

    "vcn_domain_name": null

    }

    ```


    作为使用 Oracle Cloud Infrastructure 的 Python SDK 创建新 VCN 的第一步，我们准备了一个模型类 `CreateVcnDetails`
    的实例。模型类对象用于封装客户端类实例进行的 API 调用的配置参数。在我们的例子中，我们仅用三个 VCN 资源参数实例化了模型类：CIDR 块、显示名称和目标容器的
    OCID。随后，我们将 `CreateVcnDetails` 对象作为参数传递给了 `VirtualNetworkClient` 客户端类实例的 `create_vcn`
    方法。该方法向 OCI REST API 发送了一个请求以同步方式创建 VCN。您可能已经注意到，返回响应花了一点时间。最后，当我们打印 `response.data`
    属性时，我们能够看到新创建的 VCN 的 OCID (`id`) 以及所有其他 VCN 属性。图 3-6 显示了 OCI 控制台中的新 VCN。


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig6_HTML.jpg](img/478313_1_En_3_Fig6_HTML.jpg)


    图 3-6

    使用 SDK 创建的 VCN


    要删除 VCN，您可以像这样使用 `delete_vcn` 方法：

    ```

    >>> response.data.id

    ''ocid1.vcn.oc1.eu-frankfurt-1.aa.........74vj5a''

    >>> vcn.delete_vcn(response.data.id)

    ```


    要退出 Python 解释器并离开虚拟环境，您可以发出以下命令：

    ```

    >>> quit()

    (ocidev) $ deactivate

    $

    ```


    在本节中，我们简要介绍了 Oracle Cloud Infrastructure 的 Python SDK 的入门知识。如果您想了解更多信息，请参阅可在 [`https://oracle-cloud-infrastructure-python-sdk.readthedocs.io`](https://oracle-cloud-infrastructure-python-sdk.readthedocs.io)
    获取的全面文档。'
- fmt: '## CLI


    `command-line interface` (CLI) 是一种命令行实用程序，可让您以方便的脚本方式与 Oracle Cloud Infrastructure
    REST API 进行交互。CLI 比 OCI 控制台稍微强大一些，因为您可能会发现某些功能作为 CLI 命令可用，但在 OCI 控制台中并未实现。此外，执行脚本通常比在
    OCI 控制台的图形界面中点击要快得多。如果您仔细研究 CLI，会发现它是基于用于 Oracle Cloud Infrastructure 的 Python
    SDK 构建的。换句话说，OCI CLI 是作为 `oci-cli` 模块用 Python 实现的，该模块使用了 `oci` 模块中的类。图 [3-7](#478313_1_En_3_Chapter.xhtml#Fig7)
    说明了这个概念。


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig7_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig7_HTML.jpg)


    图 3-7


    OCI CLI


    CLI 作为一个开源项目实现，代码可在 GitHub 的 [`https://github.com/oracle/oci-cli`](https://github.com/oracle/oci-cli)
    上找到。它可以安装在 Linux、macOS 和 Windows 操作系统上。


    ### 安装


    您使用专为您的操作系统设计的脚本来安装 CLI。这些脚本可以从 OCI CLI 的 GitHub 帐户下载。事实上，有两个可用的脚本。


    *   一个用于 Linux/macOS/Windows Subsystem for Linux 的 Shell 脚本

    *   一个用于在 Windows 上原生执行 CLI 的 PowerShell 脚本


    如果执行，这两个脚本中的每一个都会执行类似的步骤。


    要在 Linux、macOS 或 Windows Subsystem for Linux 上安装 CLI，请打开终端窗口并执行此命令：


    ```

    $ bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)"

    ```


    注意


    本书中的代码片段已在 macOS 控制台和 Windows Subsystem for Linux 上测试。所有命令都应在所有主要的 Linux 发行版中轻松工作。如果您使用的是
    Windows，请在装有 Linux 的客户机 VM 上或在 Windows Subsystem for Linux 上运行练习。


    首先，会验证 `PATH` 变量中是否存在 Python 二进制文件，并且如果需要，会下载并放置任何缺少的原生软件包依赖项。安装程序将优先选择 Python
    3 而非 Python 2。然而，CLI 在两者中的任何一个上都能正常工作。在上一节中，我提到 CLI 基本上是一个 Python 模块。这就是为什么安装程序会为
    CLI 创建一个新的虚拟环境，以便将其依赖项与您可能同时进行的任何其他基于 Python 的开发隔离。在安装过程中，您将被要求提供虚拟环境的目录路径以及存储轻量级
    `oci` 实用程序的另一个路径。该实用程序可以被视为 CLI 可执行文件，它以方便的命令行实用程序的形式公开 `oci-cli` Python 模块类。如果您心中没有特定的目录，可以保留默认值。最后，安装程序将更新您的
    `PATH` 变量，以便您可以直接执行 `oci` 实用程序。在某些 Shell 中，安装后 `oci` 实用程序可能不会立即可见。在这种情况下，您必须重新启动控制台，或者只需
    source CLI 将自身添加到 `PATH` 变量中的文件。在 Linux 和 Windows Subsystem for Linux 上，这通常是 `~/.bashrc`，而在
    Mac 上通常是 `~/.bash_profile` 文件。


    ```

    $ oci --version

    Command ''oci'' not found.

    $ source ~/.bashrc

    ```


    安装完成后，您应该能够检查 CLI 的版本。


    ```

    $ oci --version

    2.6.6

    ```


    `oci` 实用程序脚本的第一行会告诉您虚拟环境的位置。此代码片段显示了如何激活 CLI 的虚拟环境并列出 CLI 正在使用的 SDK 版本：


    ```

    $ head -n 1 `which oci`

    #!/Users/mjk/lib/oracle-cli/bin/python3

    $ cd ~/lib/oracle-cli/

    $ source bin/activate

    (oracle-cli) $ python3 -m pip freeze | grep oci

    oci==2.5.1

    oci-cli==2.6.6

    (oracle-cli) $ deactivate

    $

    ```


    我们这样做是为了说明 CLI 与 Python SDK 的关系。在日常使用 CLI 时，您不会显式激活虚拟环境，而是使用 `oci` 实用程序。


    ### 配置


    CLI 配置文件是一个简单的属性文件，存储了代表命名的 IAM 用户向 Oracle Cloud Infrastructure REST API 签名 API
    请求所需的详细信息。如果您期望 CLI 配置与用于 OCI Python SDK 上下文的配置文件相似，您是对的。清单 [3-6](#478313_1_En_3_Chapter.xhtml#PC24)
    显示了 CLI 配置文件的结构。


    ```

    [DEFAULT]

    tenancy=ocid1.tenancy.oc1..aa.........

    region=eu-frankfurt-1

    user=ocid1.user.oc1..aa........

    fingerprint=12:78:5b:60:65:cf:dc:b1:04:fd:3d:31:2b:a7:88:12

    key_file=/Users/mjk/.apikeys/oci_api_pem

    pass_phrase=secret

    清单 3-6

    OCI CLI 配置文件

    ```


    该结构与上一节关于 SDK 的结构相同。此外，CLI 在相同的默认路径 `~/.oci/config` 期望配置文件。


    如果您已经存在 `~/.oci/config` 文件，CLI 即可使用。


    注意


    如果您已经为 SDK 创建了 `.oci/config` 文件（如前一节所述），请*跳过*下文解释的 `oci setup config` 步骤，因为配置已经存在。


    如果您跳过了关于 SDK 的部分或已删除配置，请不要担心。您可以使用一个简单的内置 CLI 配置向导。您需要提供我在“准备 SDK、CLI 和 Terraform”一节中列出的相同信息。此外，如果您之前没有准备，您将有机会创建一个新的
    API 签名密钥对。


    ```

    $ oci setup config

    Enter a location for your config [/Users/mjk/.oci/config]:

    Enter a user OCID: ocid1.user.oc1..aa.........

    Enter a tenancy OCID: ocid1.tenancy.oc1..aa.........

    Enter a region (e.g. ap-seoul-1, ap-tokyo-1, ca-toronto-1, eu-frankfurt-1, uk-london-1,
    us-ashburn-1, us-gov-ashburn-1, us-gov-chicago-1, us-gov-phoenix-1, us-langley-1,
    us-luke-1, us-phoenix-1): eu-frankfurt-1

    Do you want to generate a new RSA key pair? (If you decline you will be asked
    to supply the path to an existing key.) [Y/n]: n

    Enter the location of your private key file: /Users/mjk/.apikeys/oci_api_pem

    Enter the passphrase for your private key:

    Fingerprint: e6:99:f5:82:db:a9:75:fb:cd:3c:30:74:00:b3:61:2b

    Do you want to write your passphrase to the config file? (if not, you will need
    to supply it as an argument to the CLI) [y/N]: y

    Config written to /Users/mjk/.oci/config

    ```


    如果您决定使用 `oci setup config` 生成新的 API 签名密钥对，请记得将公钥上传到云端以供您的 IAM 用户使用。如果您不记得如何操作，请返回本章前面的“上传公钥”部分。


    存储私钥密码是可选的。如果您决定不这样做，每次发出 CLI 命令时都会提示您输入密码。如果您决定存储，请记住不要将此文件复制到其他地方，并将其权限限制为仅文件所有者可访问。


    ```

    $ ls -l .oci

    -rw-------  1 mjk  staff   322B Jun 13 21:26 config

    ```


    现在，您应该可以测试 CLI 了。我们将列出基于 Ubuntu 的镜像的可用版本。此类查询是在 `root` 隔区的上下文中运行的，其 OCID 与租户的
    OCID 相同。幸运的是，我们已经在 CLI 配置文件中存储了 `root` 隔区的 OCID，并且可以使用 `grep` 和 `sed` 工具的组合来提取此值。以下是运行您的第一个
    OCI 命令以向 OCI REST API 发送请求的方法：'
  raw: '## CLI


    The OCI *command-line interface* (CLI) is a command-line utility that lets you
    interact with Oracle Cloud Infrastructure REST APIs in a convenient, scripted
    way. The CLI is slightly more powerful than the OCI Console because you may find
    features available as CLI commands that are not implemented in the OCI Console.
    Furthermore, it is usually faster to execute a script instead of clicking your
    way through the graphical interface of the OCI Console. If you look closer at
    the CLI, you will discover that it is built on the Python SDK for Oracle Cloud
    Infrastructure. In other words, the OCI CLI is implemented in Python as the `oci-cli`
    module, which uses the classes from the `oci` module. Figure [3-7](#478313_1_En_3_Chapter.xhtml#Fig7)
    illustrates this concept.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig7_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    OCI CLI


    The CLI is implemented as an open source project with code available on GitHub
    at [`https://github.com/oracle/oci-cli`](https://github.com/oracle/oci-cli). It
    can be installed on the Linux, macOS, and Windows operating systems.


    ### Installation


    You install the CLI using a script dedicated to your operating system. The scripts
    can be downloaded from the GitHub account for the OCI CLI. As a matter of fact,
    there are two scripts available.


    *   A shell script for Linux/macOS/Windows Subsystem for Linux


    *   A PowerShell script for native CLI execution on Windows


    If executed, each of the two scripts performs similar steps.


    To install the CLI on Linux, macOS, or Windows Subsystem for Linux, open a Terminal
    window and execute this command:


    ```

    $ bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)"

    ```


    Note


    The code snippets from this book were tested in the macOS Console and on Windows
    Subsystem for Linux. All of the commands should easily work in all major Linux
    distributions. If you are using Windows, please run the exercises either on a
    guest VM with Linux or on Windows Subsystem for Linux.


    In the first place, the presence of Python binaries in the PATH variable is verified,
    and any missing native package dependencies are downloaded and put in place, if
    needed. The installer will prefer Python 3 to Python 2\. Yet, the CLI works fine
    with any of the two. In the previous section, I mentioned that the CLI is basically
    a Python module. This is why the installer creates a new virtual environment dedicated
    to the CLI so that its dependencies are isolated from any other Python-based development
    you may be working on in the meantime. During the installation process, you will
    be asked to provide a directory path for the virtual environment and another path
    to store a lightweight `oci` utility. The utility can be thought of as the CLI
    executable, which exposes the `oci-cli` Python module classes in the form of a
    convenient command-line utility. You can leave the defaults if you do not have
    any specific directory in mind. At the end, the installer will update your PATH
    variable so that you can execute the `oci` utility in a straightforward manner.
    In some shells, the `oci` utility might not be visible right after installation.
    In such a case, you have to either restart the console or simply source the file
    in which the CLI added itself to the PATH variable. On Linux and Windows Subsystem
    for Linux, it is usually `~/.bashrc`, while on Mac it is usually `the ~/.bash_profile`
    file.


    ```

    $ oci --version

    Command ''oci'' not found.

    $ source ~/.bashrc

    ```


    As soon as the installation has been completed, you should be able to check the
    version of the CLI.


    ```

    $ oci --version

    2.6.6

    ```


    The first line of the `oci` utility script will tell you the location of the virtual
    environment. This code snippet shows how to activate the virtual environment of
    your CLI and list the SDK version the CLI is using:


    ```

    $ head -n 1 `which oci`

    #!/Users/mjk/lib/oracle-cli/bin/python3

    $ cd ~/lib/oracle-cli/

    $ source bin/activate

    (oracle-cli) $ python3 -m pip freeze | grep oci

    oci==2.5.1

    oci-cli==2.6.6

    (oracle-cli) $ deactivate

    $

    ```


    We have done this to illustrate the CLI relationship to the Python SDK. In your
    daily work with the CLI, you won’t explicitly activate the virtual environment
    but will use the `oci` utility instead.


    ### Configuration


    The CLI config file is a simple properties file that stores the details required
    for signing the API requests that are sent to the Oracle Cloud Infrastructure
    REST API on behalf of a named IAM user. If you expect that the CLI configuration
    is similar to the configuration file used in the context of the Python SDK for
    OCI, you are right. Listing [3-6](#478313_1_En_3_Chapter.xhtml#PC24) shows the
    structure of the CLI config file.


    ```

    [DEFAULT]

    tenancy=ocid1.tenancy.oc1..aa.........

    region=eu-frankfurt-1

    user=ocid1.user.oc1..aa........

    fingerprint=12:78:5b:60:65:cf:dc:b1:04:fd:3d:31:2b:a7:88:12

    key_file=/Users/mjk/.apikeys/oci_api_pem

    pass_phrase=secret

    Listing 3-6

    OCI CLI Config File

    ```


    The structure is the same as the one used in the previous section about the SDK.
    Moreover, the CLI expects the configuration file at the same default `~/.oci/config`
    path.


    If you still have the `~/.oci/config` file in place, the CLI is ready to be used.


    Caution


    If you have created the `.oci/config` file for use with the SDK, as described
    in the preceding section, *skip* the `oci setup config` step that is explained
    in the following text because the configuration is already present.


    If you skipped the section about the SDK or have removed the configuration, do
    not worry. You can use a simple built-in CLI configuration wizard. You will need
    to provide the same information I’ve listed in the “Preparing for SDK, CLI, and
    Terraform” section. Additionally, you will be given an opportunity to create a
    new API signing keypair, in case you didn’t prepare one earlier.


    ```

    $ oci setup config

    Enter a location for your config [/Users/mjk/.oci/config]:

    Enter a user OCID: ocid1.user.oc1..aa.........

    Enter a tenancy OCID: ocid1.tenancy.oc1..aa.........

    Enter a region (e.g. ap-seoul-1, ap-tokyo-1, ca-toronto-1, eu-frankfurt-1, uk-london-1,
    us-ashburn-1, us-gov-ashburn-1, us-gov-chicago-1, us-gov-phoenix-1, us-langley-1,
    us-luke-1, us-phoenix-1): eu-frankfurt-1

    Do you want to generate a new RSA key pair? (If you decline you will be asked
    to supply the path to an existing key.) [Y/n]: n

    Enter the location of your private key file: /Users/mjk/.apikeys/oci_api_pem

    Enter the passphrase for your private key:

    Fingerprint: e6:99:f5:82:db:a9:75:fb:cd:3c:30:74:00:b3:61:2b

    Do you want to write your passphrase to the config file? (if not, you will need
    to supply it as an argument to the CLI) [y/N]: y

    Config written to /Users/mjk/.oci/config

    ```


    If you have decided to generate a new API signing keypair using `oci setup config`
    , please remember to upload the public key to the cloud for your IAM user. If
    you do not remember how to do it, please go back to the “Uploading the Public
    Key” section earlier in this chapter.


    Storing the password for your private key is optional. If you decide against doing
    it, you will be prompted for the password every time you issue a CLI command.
    If you decide in favor, please remember not to copy this file anywhere else also
    to keep its permissions restricted to the file owner.


    ```

    $ ls -l .oci

    -rw-------  1 mjk  staff   322B Jun 13 21:26 config

    ```


    Now, you should be ready to test the CLI. We are going to list the available versions
    of Ubuntu-based images. Such a query is run in the context of the `root` compartment
    whose OCID is the same as the OCID of the tenancy. Luckily, we already stored
    the `root` compartment OCID in the CLI configuration file and can use a combination
    of `grep` and `sed` tools to extract this value. This is how you run your first
    OCI command that sends a request to the OCI REST API:'
