    \ described in the “API Signing Key” section, you are ready to begin automating\
    \ cloud infrastructure management tasks. Let’s wrap up and list the required details\
    \ you will have to provide, at least once during the initial setup, when coding\
    \ your custom API calls based on the SDK for your favorite programming language\
