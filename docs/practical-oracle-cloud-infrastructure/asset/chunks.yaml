  trans: '# 交付即服务


    如果你参考 Gartner 的定义，你会发现 IT 能力被表述为一种服务来交付。要理解其含义，以及它如何与在共享资源池中快速供应资源的理念相契合，让我们从共享资源池的概念开始。


    购买计算机硬件这类商品与资本性支出相关。理论上，如果一个项目团队需要一台新服务器，他们可以购买一台。这样的投资会产生一笔开支，必须在项目预算中予以考虑并妥善核算。然而，这并非一种灵活的方式。因为拥有资产，项目团队必须负责维护该资产的整个生命周期直至其退役。一个高度专业化的任务团队通常既没有相关人员，也没有时间来做这件事。


    有时，你需要一组额外的机器只是为了执行一项有时间限制的特定任务。例如，你可能需要每季度仅在几周内，在一个专用环境中进行负载与性能或验收测试。如果你购买了设备，它可能在其他时间都处于闲置状态，除非你能设法将其归还给其他项目团队可用的资源池。`共享资源池`中的所有资源，都可以仅在真正需要时以按量使用的方式被利用，从而最大限度地减少其空闲时间。项目团队将不再拥有任何硬件，而是根据资源的计量使用情况从其成本中心收费。从项目团队的角度来看，这不过是一项产生运营性支出的服务。此外，不拥有硬件意味着无需进行资产管理，或者使资产管理变得更为容易。


    用于支撑虚拟云资源的共享资源池的硬件，仍然会产生成本，通常由负责维护它的实体承担。这些成本最终会分摊到使用了这些虚拟资源的项目团队。为了根据每个云消费者的实际使用情况进行成本分摊，必须对虚拟资源的消耗进行计量。


    对于一个大型组织而言，将`自助式`服务作为其流程的核心部分可以节省大量精力，并消除不必要的等待时间。它提升了项目团队和被赋能的个人的工作效率，让他们能够自主处理事务。项目团队将能够自行供应所需的各种类型资源（计算、存储、网络等），以自动化方式扩展资源直至系统性能满足要求，并在资源不再使用时立即将其归还至资源池。只有当资源池管理系统提供了一个用于监管资源的界面时，自助式服务才成为可能。项目团队，即`服务消费者`，通过应用程序编程接口（`API`）来供应、管理和监控资源。


    # API


    在早期，`API`通常被理解为一组封装起来以便在库中复用的编程语言函数。程序员会在代码中通过函数头来调用这些函数。随后，计算机程序的二进制文件会链接到一个动态链接库（`.dll`或`.so`）来执行`API`函数的实现。随着计算机系统变得越来越分布式和互联，`API`获得了另一层含义，这次与远程过程调用和
    Web 服务相关。两种用于 Web 服务的生产级`API`风格是简单对象访问协议（`SOAP`）和具象状态传输（`REST`）。让我们简要探讨一下它们。


    ## SOAP API


    简单对象访问协议是一个成熟的标准，它定义了一个基于角色的、多节点分布式处理模型，包括初始发送方、可选的中间方和最终接收方。消息交换操作及其有效载荷结构在合约中定义。有效载荷通常采用严格模式的`XML`格式，确保消息格式符合合约。基于`SOAP`的
    Web 服务合约在 Web 服务描述语言（`WSDL`）文件中定义。当前版本（`SOAP 1.2`）于 2007 年被 W3C 在一份名为 W3C 推荐标准的文件中标准化。该协议的初始草案作为`SOAP
    1.1`于 2000 年在一份 W3C 注释中提交供讨论。在`SOAP`中，重点在于自定义操作和严格模式的`XML`数据交换。`API`使用定义良好的`WSDL`格式进行设计。`SOAP`被设计为与传输方式无关。两种最主要的传输方式是`HTTP`和
    Java 消息服务（`JMS`）。清单 1-1 展示了一个通过`HTTP`传输发送的`SOAP`请求的简化示例。


    ```

    POST /crm/shipmentService HTTP/1.1

    Host: 192.168.10.15:8081

    Content-Type: text/xml;charset=UTF-8

    SOAPAction: "http://example.com/crm/shipments/search"


    WAW

    FRA

    2018-06-25

    2018-06-28


    清单 1-1

    HTTP 传输中的 SOAP 请求示例

    ```


    ## REST API


    `REST`代表具象状态传输，自 2000 年以来一直是一个计算机科学术语。它由罗伊·菲尔丁在其关于基于网络的软件架构的博士论文中提出。罗伊写道：


    > `REST`中信息的关键抽象是`资源`。任何可以被命名的信息都可以是一个资源：一份文档或图片、一项临时性服务（例如“洛杉矶今日天气”）、其他资源的集合、一个非虚拟对象（例如一个人），等等。⁴


    当代的`RESTful`服务专注于资源生命周期事件（创建、更新、删除和读取访问），这些事件由相应的`HTTP`方法（`PUT`、`POST`、`DELETE`、`GET`）表示。最自然的资源是业务实体，如发货单、发票或销售线索。然而，没有任何类似实体意义的业务流程，例如订单履行、工时表提交，甚至像高级搜索这样的非功能性流程，也可以被表示为`REST`资源。这样，我们就可以触发（通常使用`HTTP
    POST`）和跟踪（通常使用`HTTP GET`）这些流程。有趣的是，在`REST`中，我们通常避免使用“合约”这个词，而只是谈论“API 设计”。与`SOAP`及其`WSDL`合约相反，定义`REST
    API`的方式不止一种。最初缺乏官方标准，促使了一种自由市场式的竞争，以寻找设计`API`的最流行方式。首个（某种程度上是间接的）尝试为`REST API`设计引入标准的是
    Web 应用描述语言（`WADL`），其规范⁵于 2009 年由 Sun Microsystems 提交给 W3C。两年后，Swagger 套件诞生，并与
    RAML 和 API Blueprint 一起主导了`API`设计领域。2015 年，OpenAPI 倡议在 Linux 基金会诞生，其目标是创建和维护终极的`API`设计标准。这个标准被称为
    OpenAPI⁶，它基于 Swagger。


    用于`REST API`的最流行的有效载荷格式是 JavaScript 对象表示法（`JSON`），但在请求或响应正文中使用`XML`或纯文本也没有任何问题。对于某些资源生命周期事件，完全依赖`HTTP`状态码而无需任何有效载荷是合理的。清单
    1-2 展示了一个调用负责高级搜索的非功能性流程资源的示例。有效载荷携带了以`JSON`格式序列化的搜索条件。`URL`定义了执行搜索操作所针对的资源。


    ```

    POST /crm/search/shipments HTTP/1.1

    Host: 192.168.10.15:8081

    Content-Type: application/json;charset=UTF-8

    Accept: application/json

    {

    "route": {

    "origin":"WAW",

    "destination":"FRA"

    },

    "postingPeriod": {

    "from": "2018-06-25",

    "to": "2018-06-28"

    }

    }

    清单 1-2

    REST 调用示例

    ```'
- fmt: 'Well-structured, contract-driven, enterprise-oriented, but somehow overweight
    SOAP APIs have been gradually replaced by lightweight and pretty natural REST
    APIs. It is true that the majority of use cases can be fulfilled with REST APIs
    at a much lower cost than SOAP. Furthermore, REST is definitely preferred by new
    projects for small and medium companies, software-as-a-service APIs, IoT edge,
    and large-scale container-driven backend systems. Various API gateways as well
    as API management platforms position REST as the default style in the context
    of API management. These suites usually still support SOAP, simply because it
    is widely deployed and will stay in use across enterprises for some time, especially
    in the traditional service-oriented architecture deployments with Enterprise Service
    Bus (`ESB`) in the backend. The future of API evolution doesn’t stop with REST
    APIs, however. It is worth observing `GraphQL`, which, you could say, builds on
    REST and brings into life the concept of a query-oriented API that combines flexibility
    with a light footprint. Figure 1-6 presents the evolution of APIs.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig6_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig6_HTML.jpg)

    Figure 1-6: The evolution of APIs


    A slightly different evolutionary direction is taken by `gRPC`. By design, this
    remote procedure call (`RPC`) framework is meant to be machine-readable and programming-language
    neutral. You define APIs typically using protocol buffers that allow you to specify
    both services and data structures in a more compact way than using `WSDL/XSD`
    in SOAP. There are many code generators that take these definitions and generate
    code stubs for clients and servers in various programming languages. `gRPC` is
    a good fit for high-performance messaging, thanks to a compact binary format used
    on the wire and the `HTTP/2` feature set. The adoption is still in a relatively
    early phase and focuses on internal APIs, but we may get to the point where selected
    public-facing APIs are gradually moved to `gRPC`. This may begin with the APIs
    involved with streaming or low-power IoT devices.


    #### Cloud Management Plane


    Why do APIs matter? If we want to apply cloud computing to our own hardware, we
    need a system that manages pools of resources, enables rapid self-provisioning,
    and permits virtual machines to scale horizontally. Such a system, let’s call
    it a `cloud management plane`, must offer an API that can be used by the project
    teams on a self-service basis. The REST style is a perfect fit for cloud computing
    because the cloud capabilities, which we will discuss in the next section, can
    be easily seen as first-class REST resources. When you manage cloud resources,
    direct API calls are rarely done. Usually, the API is used through a web console,
    software development kits (`SDKs`) for various languages, a command-line interface,
    or an infrastructure-as-code software such as `Terraform`. In all these cases,
    API calls are constructed and sent in the background. You only provide the required
    input. Figure 1-7 presents an overview of the various ways to consume the Oracle
    Cloud Infrastructure (`OCI`) API. You will learn more about this in Chapter 3.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig7_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig7_HTML.jpg)

    Figure 1-7: Cloud management plane API ecosystem


    Until now, looking at my two favorite cloud computing definitions, we’ve explored
    the key cloud computing characteristics. We analyzed how rapid self-provisioning
    differs from the traditional provisioning model. Then, we briefly discussed how
    elasticity can be delivered through scalability. Finally, we learned about the
    vital role the contemporary APIs have in delivering cloud resources as services.
    Let’s explore now the four core IT capabilities every infrastructure cloud has
    to deliver.


    ## Core Cloud Capabilities


    In the cloud, you build solutions using virtual `cloud resources` that resemble
    the hardware equipment that provides a physical platform for the software to run.
    There are different types of cloud resources. Some cloud resource types are intended
    to be used strictly together with other types of cloud resources. For example,
    a `routing rules table` is a cloud resource type that always exists within a `virtual
    cloud network` cloud resource. Together with a few other cloud resource types,
    they are collectively seen as part of the same `cloud capability`, which is a
    term you would more often see referenced as an individual `cloud service`. The
    way individual cloud resource types are grouped together depends on choices made
    by a particular cloud provider. Usually, you will see four core cloud capabilities
    typically referenced as cloud services, no matter how global or niche a cloud
    provider is.


    *   Compute

    *   Networking

    *   Storage

    *   Identity and access management


    These four core cloud computing capabilities provide resources that are often
    used, in the background, as building blocks to deliver further infrastructure
    and platform capabilities such as the following:


    *   Container orchestration

    *   Managed databases

    *   Serverless computing


    We will now get a glimpse of the four core cloud computing capabilities.'
