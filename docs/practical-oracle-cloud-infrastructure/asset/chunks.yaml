    Mar 21 16:18:47 app-vm reportissuer.py[13978]: ### Report generated 2019-03-21
    16:18:47.605280

    Mar 21 16:19:17 app-vm reportissuer.py[13978]: Creating a report

    [opc@app-vm]$ exit

    ```


    If you look in the bucket, you should be able to see a new object called `waw/bemowo/summary.txt`.
    This object gets generated and uploaded every 30 seconds by the `reportissuer`
    service running on the compute instance you’ve just provisioned. Figure [5-14](#478313_1_En_5_Chapter.xhtml#Fig14)
    presents the new object in the OCI Console.


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig14_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Summary object uploaded by an instance principal


    Are you curious about the content of the report? Sure, you are. Return to your
    local command line closing the SSH connection to the compute instance. Use the
    `oci os object get` CLI command using the `--file -` option to dump the content
    of the `waw/bemowo/summary.txt` object to the standard output.


    ```

    $ oci os object get -bn blueprints --name "waw/bemowo/summary.txt" --file - --profile
    SANDBOX-USER

    waw/bemowo/101.pdf (29.0K)

    waw/bemowo/102.pdf (30.0K)

    waw/bemowo/105.pdf (18.0K)

    waw/bemowo/107.pdf (23.0K)

    waw/bemowo/115.pdf (33.0K)

    waw/bemowo/parking.pdf (9.90625K)

    waw/bemowo/summary.txt (0.2470703125K)

    ### Report generated 2019-03-21 16:34:33.971448

    ```


    As you can see, the report contains the names and sizes of all objects prefixed
    with `the waw/bemowo` string. The last line shows the report creation timestamp,
    the same as last logged by the `reportissuer` service that is running on the compute
    instance.


    Listing [5-9](#478313_1_En_5_Chapter.xhtml#PC53) presents the cloud-config file
    that gets uploaded to the compute instance and processed by the cloud-init module.
    As a result, a series of steps takes place. First, there is a new unit file added
    to the compute instance filesystem at the following path: `/etc/systemd/system/reportissuer.service`.
    This unit file is a base for the new systemd service that encapsulates our application.
    It specifies a few variables that provide runtime configuration for the `reportissuer.py`
    script, which is the main service executable here. The `runcmd` section of the
    cloud config file defines further actions performed on the instance such as the
    installation of Python 3 and the OCI SDK, downloading the `reportissuer.py` script
    from the GitHub repository, and a few commands that altogether effectively add
    a new systemd service based on the unit file we’ve supplied.'
  trans: "\n# 实例主体操作与 cloud-init 服务验证\n\n等待分配给新创建虚拟机的公共 IP。本例中是 `130.61.18.158`。尽管实例已被宣布为创建完成并就绪，但我们必须记住，其启动过程很可能仍在运行。你可能需要等待几秒钟，直到\
