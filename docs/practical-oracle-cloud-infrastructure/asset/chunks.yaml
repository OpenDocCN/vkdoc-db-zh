    \ First, we will register a new application for Oracle Functions. As part of this\
    \ activity, you must denote the VCN subnet, which will be used by Oracle Functions\
    \ to dynamically plug transient function-specific containers for that particular\
    \ function into OCI networking. As you recall, the infrastructure code described\
    \ at the beginning of this chapter has created a subnet that can be referenced\
    \ by the application we are about to register.\n\nTip\n\nIt is absolutely fine\
    \ to use different VCN subnets for your Oracle Functions applications. Just make\
    \ sure they fulfill the recommendations such as the number of available private\
    \ IP addresses or the use of stateless security rules.\n\nBack on your local developer\
    \ machine, use the `terraform output` command to get the OCID of this subnet.\n\
    \n```\n$ cd ~/git/oci-book/chapter09/1-infrastructure\n$ terraform output functions_subnet_ocid\n\
