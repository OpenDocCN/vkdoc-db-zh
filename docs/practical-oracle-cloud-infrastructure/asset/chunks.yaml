    \ GitHub 上找到源代码：`https://github.com/terraform-providers/terraform-provider-oci`。\n\
    \n模块属性 `ads` 为 `web` 模块内同名的变量提供输入。这次，该变量是一个 `list` 类型。这样，我们可以存储多个值，这些值可以基于列表索引在此变量中访问。`oci_identity_availability_domains`\
    \ 类型的数据源 `ads` 返回一个可用性域列表。尽管在我们简单的项目中只启动一个计算实例，并且本可以通过传递单个特定可用性域名来满足要求，但我决定向模块提供一个包含\
    \ API 返回的所有可用性域名的列表。这样，为计算实例选择特定可用性域的任务就委托给了模块的内部逻辑。为了构造一个列表，用于存储另一个列表中所有元素的某个属性的值，我们使用了\
    \ **splat 表达式**，如图 3-16 所示。\n\n![图 3-16](img/478313_1_En_3_Fig16_HTML.jpg)\n\n\
    **图 3-16：Terraform 查找插值示例**\n\n列表 3-17 展示了 `web` 模块目录内的 `vcn.tf` 文件的内容。它包含了路由表\
    \ `web_rt`、安全列表 `web_sl` 和子网 `web_subnet` 的配置。\n\n```hcl\nresource \"oci_core_route_table\"\
    \ \"web_rt\" {\n  compartment_id = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n\
    \  route_rules {\n    destination_type  = \"CIDR_BLOCK\"\n    destination    \
    \   = \"0.0.0.0/0\"\n    network_entity_id = var.vcn_igw_ocid\n  }\n  display_name\
    \ = \"web-rt\"\n}\n\nresource \"oci_core_security_list\" \"web_sl\" {\n  compartment_id\
    \ = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  egress_security_rules\
    \ {\n    stateless    = \"false\"\n    destination  = \"0.0.0.0/0\"\n    protocol\
    \     = \"all\"\n  }\n  ingress_security_rules {\n    stateless = \"false\"\n\
    \    source    = \"0.0.0.0/0\"\n    protocol  = \"6\"\n    tcp_options {\n   \
    \   min = 22\n      max = 22\n    }\n  }\n  ingress_security_rules {\n    stateless\
    \ = \"false\"\n    source    = \"0.0.0.0/0\"\n    protocol  = \"6\"\n    tcp_options\
    \ {\n      min = 80\n      max = 80\n    }\n  }\n  display_name = \"web-sl\"\n\
    }\n\nresource \"oci_core_subnet\" \"web_subnet\" {\n  compartment_id         \
    \            = var.compartment_ocid\n  vcn_id                             = var.vcn_ocid\n\
    \  display_name                       = \"web-subnet\"\n  availability_domain\
    \                = var.ads[0]\n  cidr_block                         = var.vcn_subnet_cidr\n\
    \  route_table_id                     = oci_core_route_table.web_rt.id\n  security_list_ids\
    \                  = [oci_core_security_list.web_sl.id]\n  prohibit_public_ip_on_vnic\
    \         = \"false\"\n  dns_label                          = \"webnet\"\n}\n\
    ```\n**列表 3-17：web/vcn.tf (Web 模块)**\n\n路由表 `web_rt` 定义了一条路由规则，该规则将所有旨在前往 VCN\
    \ 外部的出站流量 (`0.0.0.0/0`) 路由到在根模块中定义且其 OCID 作为模块属性传递的互联网网关。\n\n安全列表 `web_sl` 定义了一个有状态的出站规则，允许所有出站流量，以及两个有状态的入站规则，允许端口\
    \ 22 (SSH) 和 80 (HTTP) 的入站流量。需要提醒的是，如果一个有状态的安全规则允许其监督方向的流量，那么作为同一 TCP 会话一部分返回的相应数据包也将被允许。\n\
    \n子网 `web_subnet` 资源存在于根模块中定义且其 OCID 作为模块属性传递的 VCN 内。它引用了在 `web` 模块中创建并在前两段中简要描述的路由表和安全列表。`availability_domain`\
    \ 属性的值展示了如何使用索引访问列表变量：`var.ads[0]`。设置为 `false` 的 `prohibit_public_ip_on_vnic`\
    \ 属性使此子网成为公网子网。值得注意的是，即使我们只为这个子网使用一个安全列表，我们仍然必须将其 OCID 作为列表元素传递，因为 `security_list_ids`\
    \ 属性需要一个列表。这是因为一个子网可以引用多个安全列表。\n"
- fmt: "## Compute Module Configuration and State Management\n\nListing [3-18](#478313_1_En_3_Chapter.xhtml#PC71)\
    \ presents the contents of the `compute.tf` file that exists inside the `web`\
    \ module directory. It contains the resource configuration for the compute instance\
    \ (`web_vm`), which runs an Apache web server, as well as two data sources (`web_vnic_attachment`\
    \ and `web_vnic`) used to fetch the public IP assigned to the instance during\
    \ provisioning. At the bottom of the file, you will find an output configuration\
    \ block (`web_public_ip`), which I will explain in a few moments.\n\n```\nresource\
    \ \"oci_core_instance\" \"web_vm\" {\n  compartment_id = var.compartment_ocid\n\
    \  display_name   = \"web-vm\"\n  availability_domain = var.ads[0]\n  source_details\
    \ {\n    source_id   = var.compute_image_ocid\n    source_type = \"image\"\n \
    \ }\n  shape = \"VM.Standard2.1\"\n  create_vnic_details {\n    subnet_id    \
    \    = oci_core_subnet.web_subnet.id\n    assign_public_ip = true\n  }\n  metadata\
    \ = {\n    ssh_authorized_keys = file(\"~/.ssh/oci_id_rsa.pub\")\n    user_data\
    \           = base64encode(file(\"web/cloud-init/webvm.config.yaml\"))\n  }\n\
    }\n\ndata \"oci_core_vnic_attachments\" \"web_vnic_attachment\" {\n  compartment_id\
    \ = var.compartment_ocid\n  instance_id    = oci_core_instance.web_vm.id\n}\n\n\
    data \"oci_core_vnic\" \"web_vnic\" {\n  vnic_id = data.oci_core_vnic_attachments.web_vnic_attachment.vnic_attachments[0].vnic_id\n\
    }\n\noutput \"web_public_ip\" {\n  value = data.oci_core_vnic.web_vnic.public_ip_address\n\
    }\n```\nListing 3-18\n`web/compute.tf` (Web Module)\n\nThe compute instance (`web_vm`)\
    \ is launched in the subnet that has been defined in the same module. The resource\
    \ definition references the image based on the OCID that had been fetched in the\
    \ `root` module and supplied as an input variable to the `web` module. The `create_vnic_details.assign_public_ip`\
    \ attribute set to `true` will cause OCI to assign an ephemeral public IP address\
    \ from the pool of the public addresses to the primary vNIC of the instance. The\
    \ `authorized_keys` file on an instance will include a public key read as a string\
    \ from the file provided as a path to the `file` function that is used in the\
    \ expression for the `metadata.ssh_authorized_keys` attribute.\n\nThe `metadata.user_data`\
    \ attribute specifies a base64-encoded cloud-config configuration for the cloud-init\
    \ tool that can be used to effectively customize the initialization of a compute\
    \ instance. We use it to install the Apache HTTP Server, replace the default `index.html`\
    \ file, open port 80 on the machine, and start the HTTP server. Listing [3-19](#478313_1_En_3_Chapter.xhtml#PC72)\
    \ shows the contents of the cloud-config file used by the cloud-init tool on the\
    \ instance’s first startup.\n\n```\n#cloud-config\npackages:\n  - httpd\nwrite_files:\n\
    \  - content: |\n      Greetings from the Cloud\n    path: /var/www/html/index.html\n\
    runcmd:\n  - [ \"firewall-offline-cmd\", \"--add-port=80/tcp\" ]\n  - [ \"systemctl\"\
    , \"restart\", \"firewalld\" ]\n  - [ \"systemctl\", \"enable\", \"httpd\" ]\n\
    \  - [ \"systemctl\", \"start\", \"httpd\" ]\nfinal_message: \"$HOSTNAME initialization\
    \ has been completed\"\n```\nListing 3-19\n`web/cloud-init/webvm.config.yaml`\
    \ (Web Module)\n\nThe public IP address is dynamically assigned to the compute\
    \ instance from a pool of available public IP addresses. We learn the exact address\
    \ as soon as the instance has been provisioned. A compute instance can have more\
    \ than one vNIC. The first data source (`web_vnic_attachment`) fetches the list\
    \ of vNICs. In our case, our compute instance has only a single vNIC. We use the\
    \ OCID of this first vNIC found in the list returned by the first data source\
    \ as an input to the second data source (`web_vnic`), which, eventually, returns\
    \ a map with the public IP address defined as a value for the `public_ip_address`\
    \ key. We use the output configuration (`web_public_ip`) to pass this value to\
    \ the `root` module where another output configuration (`\"web_instance_public_ip\"\
    `) defined at the bottom of the `modules.tf` file gets the value printed to the\
    \ output of the Terraform build.\n\nAs we issued the `terraform apply` command,\
    \ Terraform prepared an execution plan that consisted of actions to be taken to\
    \ bring the *current state*, which was based on the information stored in the\
    \ *state file*, to the *expected state* that was based on the contents of the\
    \ configuration files (`.tf`) in the `root` module and in the `web` modules. It\
    \ is time to briefly discuss the way Terraform manages state.\n\n## State\n\n\
    Terraform uses a *state file* to keep track of the real infrastructure it has\
    \ provisioned, the intermediary values it has computed, and the dependency graph\
    \ between resources. You can think of all these elements as the current state.\
    \ State existence is the key enabler for Terraform to serve its purpose. Terraform\
    \ compares the expected state as defined across the configuration files (`.tf`)\
    \ that build up your infrastructure code with the current state stored in the\
    \ state file to produce an execution plan that eventually leads to API calls.\
    \ Figure [3-17](#478313_1_En_3_Chapter.xhtml#Fig17) illustrates this concept.\n\
    \n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig17_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig17_HTML.jpg)\n\
    Figure 3-17\nTerraform state\n\nAs you issued the `terraform apply` command for\
    \ the first time, earlier in this chapter, Terraform created a `terraform.tfstate`\
    \ file in the `root` module directory. This JSON file will get updated each time\
    \ you run selected Terraform commands such as `refresh`, `plan`, `apply`, and\
    \ others. Manual changes inside this file are discouraged unless you really know\
    \ what to do. In such case, it is recommended that you back up the file and familiarize\
    \ yourself with the capabilities of the `terraform state` command. By default,\
    \ Terraform stores the state file locally in a form of a `terraform.tfstate` file,\
    \ like in our case. This can lead to two problems: backup strategies and team\
    \ collaboration.\n\nFirst, it is not a good idea to back up the local state file\
    \ in any kind of version control system because the file can contain some sensitive\
    \ data. Second, working concurrently with multiple copies used by various team\
    \ members will, sooner or later, lead to synchronization problems.\n\nYou can\
    \ leverage Oracle Cloud Infrastructure object storage with the Terraform `http`\
    \ backend type to take the *remote state* approach, instead of using a local state\
    \ file, which is prone to the problems I mentioned before. If you do so, your\
    \ state file will be stored as an object in an object storage bucket, encrypted\
    \ at rest and protected from unauthorized access. Your team members will be able\
    \ to collaborate, thanks to the locking mechanism provided by the `http` backend\
    \ type. Figure [3-18](#478313_1_En_3_Chapter.xhtml#Fig18) shows a Terraform state\
    \ file in an object storage bucket.\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig18_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig18_HTML.jpg)\n\
    Figure 3-18\nTerraform state file in an object storage bucket\n\nStoring the Terraform\
    \ state in cloud object storage is beyond the scope of this book. Feel free to\
    \ experiment on your own. You will learn how to work with Oracle Cloud Infrastructure\
    \ object storage buckets in Chapter [5](#478313_1_En_5_Chapter.xhtml)."
  raw: 'Listing [3-18](#478313_1_En_3_Chapter.xhtml#PC71) presents the contents of
    the `compute.tf` file that exists inside the `web` module directory. It contains
    the resource configuration for the compute instance (`web_vm`), which runs an
    Apache web server, as well as two data sources (`web_vnic_attachment` and `web_vnic`)
    used to fetch the public IP assigned to the instance during provisioning. At the
    bottom of the file, you will find an output configuration block (`web_public_ip`),
    which I will explain in a few moments.


    ```

    resource "oci_core_instance" "web_vm" {

    compartment_id = var.compartment_ocid

    display_name = "web-vm"

    availability_domain = var.ads[0]

    source_details {

    source_id = var.compute_image_ocid

    source_type = "image"

    }

    shape = "VM.Standard2.1"

    create_vnic_details {

    subnet_id = oci_core_subnet.web_subnet.id

    assign_public_ip = true

    }

    metadata = {

    ssh_authorized_keys = file("~/.ssh/oci_id_rsa.pub")

    user_data = base64encode(file("web/cloud-init/webvm.config.yaml"))

    }

    }

    data "oci_core_vnic_attachments" "web_vnic_attachment" {

    compartment_id = var.compartment_ocid

    instance_id = oci_core_instance.web_vm.id

    }

    data "oci_core_vnic" "web_vnic" {

    vnic_id = data.oci_core_vnic_attachments.web_vnic_attachment.vnic_attachments[0].vnic_id

    }

    output "web_public_ip" {

    value = data.oci_core_vnic.web_vnic.public_ip_address

    }

    End

    Listing 3-18

    web/compute.tf (Web Module)

    ```


    The compute instance (`web_vm`) is launched in the subnet that has been defined
    in the same module. The resource definition references the image based on the
    OCID that had been fetched in the `root` module and supplied as an input variable
    to the `web` module. The `create_vnic_details.assign_public_ip` attribute set
    to `true` will cause OCI to assign an ephemeral public IP address from the pool
    of the public addresses to the primary vNIC of the instance. The `authorized_keys`
    file on an instance will include a public key read as a string from the file provided
    as a path to the `file` function that is used in the expression for the `metadata.ssh_authorized_keys`
    attribute.


    The `metadata.user_data` attribute specifies a base64-encoded cloud-config configuration
    for the cloud-init tool that can be used to effectively customize the initialization
    of a compute instance. We use it to install the Apache HTTP Server, replace the
    default `index.html` file, open port 80 on the machine, and start the HTTP server.
    Listing [3-19](#478313_1_En_3_Chapter.xhtml#PC72) shows the contents of the cloud-config
    file used by the cloud-init tool on the instance’s first startup.


    ```

    #cloud-config

    packages:

    - httpd

    write_files:

    -  content: |

    Greetings from the Cloud

    path: /var/www/html/index.html

    runcmd:

    -  [ "firewall-offline-cmd", "--add-port=80/tcp" ]

    -  [ "systemctl", "restart", "firewalld" ]

    -  [ "systemctl", "enable", "httpd" ]

    -  [ "systemctl", "start", "httpd" ]

    final_message: "$HOSTNAME initialization has been completed"

    Listing 3-19

    web/cloud-init/webvm.config.yaml (Web Module)

    ```


    The public IP address is dynamically assigned to the compute instance from a pool
    of available public IP addresses. We learn the exact address as soon as the instance
    has been provisioned. A compute instance can have more than one vNIC. The first
    data source (`web_vnic_attachment`) fetches the list of vNICs. In our case, our
    compute instance has only a single vNIC. We use the OCID of this first vNIC found
    in the list returned by the first data source as an input to the second data source
    (`web_vnic`), which, eventually, returns a map with the public IP address defined
    as a value for the `public_ip_address` key. We use the output configuration (`web_public_ip`)
    to pass this value to the `root` module where another output configuration (`"web_instance_public_ip"`)
    defined at the bottom of the `modules.tf` file gets the value printed to the output
    of the Terraform build.


    As we issued the `terraform apply` command, Terraform prepared an execution plan
    that consisted of actions to be taken to bring the *current state*, which was
    based on the information stored in the *state file*, to the *expected state* that
    was based on the contents of the configuration files (`.tf`) in the `root` module
    and in the `web` modules. It is time to briefly discuss the way Terraform manages
    state.


    ### State


    Terraform uses a *state file* to keep track of the real infrastructure it has
    provisioned, the intermediary values it has computed, and the dependency graph
    between resources. You can think of all these elements as the current state. State
    existence is the key enabler for Terraform to serve its purpose. Terraform compares
    the expected state as defined across the configuration files (`.tf`) that build
    up your infrastructure code with the current state stored in the state file to
    produce an execution plan that eventually leads to API calls. Figure [3-17](#478313_1_En_3_Chapter.xhtml#Fig17)
    illustrates this concept.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig17_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    Terraform state


    As you issued the `terraform apply` command for the first time, earlier in this
    chapter, Terraform created a `terraform.tfstate` file in the `root` module directory.
    This JSON file will get updated each time you run selected Terraform commands
    such as `refresh`, `plan`, `apply`, and others. Manual changes inside this file
    are discouraged unless you really know what to do. In such case, it is recommended
    that you back up the file and familiarize yourself with the capabilities of the
    `terraform state` command. By default, Terraform stores the state file locally
    in a form of a `terraform.tfstate` file, like in our case. This can lead to two
    problems: backup strategies and team collaboration.


    First, it is not a good idea to back up the local state file in any kind of version
    control system because the file can contain some sensitive data. Second, working
    concurrently with multiple copies used by various team members will, sooner or
    later, lead to synchronization problems.


    You can leverage Oracle Cloud Infrastructure object storage with the Terraform
    `http` backend type to take the *remote state* approach, instead of using a local
    state file, which is prone to the problems I mentioned before. If you do so, your
    state file will be stored as an object in an object storage bucket, encrypted
    at rest and protected from unauthorized access. Your team members will be able
    to collaborate, thanks to the locking mechanism provided by the `http` backend
    type. Figure [3-18](#478313_1_En_3_Chapter.xhtml#Fig18) shows a Terraform state
    file in an object storage bucket.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig18_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    Terraform state file in an object storage bucket


    Storing the Terraform state in cloud object storage is beyond the scope of this
    book. Feel free to experiment on your own. You will learn how to work with Oracle
    Cloud Infrastructure object storage buckets in Chapter [5](#478313_1_En_5_Chapter.xhtml).'
  trans: "\n## 计算模块配置与状态管理\n\n清单 3-18 展示了位于 `web` 模块目录内的 `compute.tf` 文件的内容。它包含计算实例\
    \ (`web_vm`) 的资源配置，该实例运行一个 Apache 网络服务器，以及两个用于在资源调配期间获取分配给该实例的公网 IP 的数据源 (`web_vnic_attachment`\
    \ 和 `web_vnic`)。在文件底部，你会找到一个输出配置块 (`web_public_ip`)，我稍后会解释它。\n\n```\nresource\
    \ \"oci_core_instance\" \"web_vm\" {\n  compartment_id = var.compartment_ocid\n\
    \  display_name   = \"web-vm\"\n  availability_domain = var.ads[0]\n  source_details\
    \ {\n    source_id   = var.compute_image_ocid\n    source_type = \"image\"\n \
    \ }\n  shape = \"VM.Standard2.1\"\n  create_vnic_details {\n    subnet_id    \
    \    = oci_core_subnet.web_subnet.id\n    assign_public_ip = true\n  }\n  metadata\
    \ = {\n    ssh_authorized_keys = file(\"~/.ssh/oci_id_rsa.pub\")\n    user_data\
    \           = base64encode(file(\"web/cloud-init/webvm.config.yaml\"))\n  }\n\
    }\n\ndata \"oci_core_vnic_attachments\" \"web_vnic_attachment\" {\n  compartment_id\
    \ = var.compartment_ocid\n  instance_id    = oci_core_instance.web_vm.id\n}\n\n\
    data \"oci_core_vnic\" \"web_vnic\" {\n  vnic_id = data.oci_core_vnic_attachments.web_vnic_attachment.vnic_attachments[0].vnic_id\n\
    }\n\noutput \"web_public_ip\" {\n  value = data.oci_core_vnic.web_vnic.public_ip_address\n\
    }\n```\n清单 3-18\n`web/compute.tf` (Web 模块)\n\n计算实例 (`web_vm`) 在同一个模块中定义的子网中启动。该资源定义引用了一个基于\
    \ OCID 的镜像，该 OCID 是在 `root` 模块中获取并作为输入变量提供给 `web` 模块的。`create_vnic_details.assign_public_ip`\
    \ 属性设置为 `true`，这将导致 OCI 从公网地址池中为该实例的主 vNIC 分配一个临时公网 IP 地址。实例上的 `authorized_keys`\
    \ 文件将包含一个公钥，该公钥作为字符串从文件读取，该文件路径作为参数提供给 `file` 函数，该函数用于 `metadata.ssh_authorized_keys`\
    \ 属性的表达式中。\n\n`metadata.user_data` 属性为 cloud-init 工具指定一个经过 base64 编码的 cloud-config\
    \ 配置，该工具可用于有效地自定义计算实例的初始化。我们使用它来安装 Apache HTTP 服务器、替换默认的 `index.html` 文件、在机器上打开端口\
    \ 80 并启动 HTTP 服务器。清单 3-19 展示了实例首次启动时由 cloud-init 工具使用的 cloud-config 文件的内容。\n\n\
    ```\n#cloud-config\npackages:\n  - httpd\nwrite_files:\n  - content: |\n     \
    \ Greetings from the Cloud\n    path: /var/www/html/index.html\nruncmd:\n  - [\
    \ \"firewall-offline-cmd\", \"--add-port=80/tcp\" ]\n  - [ \"systemctl\", \"restart\"\
    , \"firewalld\" ]\n  - [ \"systemctl\", \"enable\", \"httpd\" ]\n  - [ \"systemctl\"\
    , \"start\", \"httpd\" ]\nfinal_message: \"$HOSTNAME initialization has been completed\"\
    \n```\n清单 3-19\n`web/cloud-init/webvm.config.yaml` (Web 模块)\n\n公网 IP 地址是从可用的公网\
    \ IP 地址池中动态分配给计算实例的。一旦实例调配完成，我们就能获知确切的地址。一个计算实例可以拥有多个 vNIC。第一个数据源 (`web_vnic_attachment`)\
    \ 获取 vNIC 列表。在我们的例子中，我们的计算实例只有一个 vNIC。我们将从第一个数据源返回的列表中找到的第一个 vNIC 的 OCID 作为第二个数据源\
    \ (`web_vnic`) 的输入，该数据源最终返回一个映射，其中 `public_ip_address` 键对应的值就是公网 IP 地址。我们使用输出配置\
    \ (`web_public_ip`) 将该值传递给 `root` 模块，在那里，定义在 `modules.tf` 文件底部的另一个输出配置 (`\"web_instance_public_ip\"\
    `) 会将该值打印到 Terraform 构建的输出中。\n\n当我们执行 `terraform apply` 命令时，Terraform 准备了一个执行计划，该计划包含为将\
    \ *当前状态*（基于*状态文件*中存储的信息）转变为 *预期状态*（基于 `root` 模块和 `web` 模块中配置文件（`.tf`）的内容）所需采取的操作。现在是时候简要讨论一下\
    \ Terraform 管理状态的方式了。\n\n## 状态\n\nTerraform 使用一个*状态文件*来跟踪其已调配的真实基础设施、它已计算的中间值以及资源之间的依赖关系图。你可以将所有这些元素视为当前状态。状态的存在是\
    \ Terraform 实现其目的的关键促成因素。Terraform 将跨配置文件（`.tf`）定义的预期状态（这些文件构成了您的基础架构代码）与状态文件中存储的当前状态进行比较，以生成一个最终导致\
    \ API 调用的执行计划。图 3-17 说明了这一概念。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig17_HTML.jpg](img/478313_1_En_3_Fig17_HTML.jpg)\n\
    图 3-17\nTerraform 状态\n\n如本章前面首次执行 `terraform apply` 命令时，Terraform 在 `root` 模块目录中创建了一个\
    \ `terraform.tfstate` 文件。这个 JSON 文件将在您每次运行选定的 Terraform 命令（如 `refresh`、`plan`、`apply`\
    \ 等）时更新。除非您真的知道要做什么，否则不建议手动更改此文件。在这种情况下，建议您备份该文件并熟悉 `terraform state` 命令的功能。默认情况下，Terraform\
    \ 将状态文件以 `terraform.tfstate` 文件的形式存储在本地，就像我们的情况一样。这可能导致两个问题：备份策略和团队协作。\n\n首先，将本地状态文件备份到任何类型的版本控制系统中并不是一个好主意，因为该文件可能包含一些敏感数据。其次，与多个团队成员使用的多个副本并发工作，迟早会导致同步问题。\n\
    \n您可以利用 Oracle Cloud Infrastructure 对象存储和 Terraform 的 `http` 后端类型来采用*远程状态*方法，而不是使用我前面提到的存在问题的本地状态文件。如果您这样做，您的状态文件将作为对象存储在对象存储桶中，静态加密并受到保护以防止未经授权的访问。得益于\
    \ `http` 后端类型提供的锁定机制，您的团队成员将能够进行协作。图 3-18 展示了对象存储桶中的 Terraform 状态文件。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig18_HTML.jpg](img/478313_1_En_3_Fig18_HTML.jpg)\n\
    图 3-18\n对象存储桶中的 Terraform 状态文件\n\n将 Terraform 状态存储在云对象存储中超出了本书的范围。您可以自行尝试。您将在第\
    \ 5 章学习如何使用 Oracle Cloud Infrastructure 对象存储桶。\n"
- fmt: '## Best Practices


    It is time to list a few recommendations I would like to share with you about
    automation. Figure [3-19](#478313_1_En_3_Chapter.xhtml#Fig19) presents the automation
    options we’ve discussed in this chapter.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig19_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig19_HTML.jpg)


    Figure 3-19: Oracle Cloud Infrastructure automation landscape


    Use `Terraform` to manage the infrastructure as code and leverage a convenient
    and effective declarative approach to designing your cloud resources. This will
    let you version the infrastructure code and track changes so that you can always
    revert to a previous state.


    Use the `CLI` to create read-only monitoring scripts and use them when you need
    to collect some information about the infrastructure on demand. Schedule these
    scripts, if needed, to collect the data at set intervals, and persist the results
    into a data store to allow future research and analysis. If you need to build
    a more sophisticated cloud monitoring utility, feel free to implement a custom
    tool using the SDK. Last but not least, you should first evaluate the built-in
    monitoring capabilities of OCI by using its dedicated cloud services. Then you
    can use the `CLI` to collect statistics straight from these services.


    If you use `Terraform`, never perform any ad hoc changes on your cloud resources
    neither in the OCI Console nor using the `CLI`; otherwise, the `Terraform` state
    file that stores the current state may deviate from the real state or get changed
    with no warning. The latter can happen because prior to executing `terraform apply`,
    another command (`refresh`) that updates the state file based on the real state
    detected gets implicitly executed. In this way, you can unwillingly incorporate
    into your execution plan some destructive actions on the resources that had been
    created manually and wipe them out.


    Do not store the `Terraform` state file (`terraform.tfstate`) in a version control
    system because the file may contain sensitive data. If you are using Git, make
    sure you’ve included the following lines in your `.gitignore`:


    ```

    .terraform/

    terraform.state*

    ```


    Use remote state to avoid this problem and make smooth team collaboration possible,
    especially if the remote state backend supports a proper locking mechanism. If
    you cannot rely on remote state, consider running `Terraform` builds on dedicated
    build servers, as a part of the continuous delivery pipeline, so that the state
    file is stored on a single, remote machine with limited access. In this case,
    you will still need to address the issue of the state file backups. Alternatively,
    you can use the `Oracle Cloud Infrastructure Resource Manager`, which is one of
    the OCI services that is beyond the scope of this book.


    Split the infrastructure code you write into reusable modules. Carefully consider
    what kind of module attributes will let you customize and reuse the module you
    are working on in various projects. Think about the output values that may be
    useful in the parent module as well as in the `Terraform` output.


    Last but not least, make sure that your compute instances always use the same
    image versions, no matter if newer versions are introduced in the meantime, until
    you are ready to upgrade your running instances and know how to do it. You can
    do this by using variables with the hard-coded image OCIDs. In this chapter, we’ve
    used data sources to dynamically fetch the OCID of a CentOS 7 image. While this
    approach is absolutely fine for a short-living PoC or demo, you mustn’t allow
    this to be the case for production systems. If you dynamically fetch the OCID
    and a newer image version is introduced in between your builds, your instances
    may be terminated and relaunched simply because `Terraform` changed its base image.
    A similar recommendation to provide the values as hard-coded variables has been
    issued for availability domains.


    ## Summary


    This chapter introduced the three ways to automate Oracle Cloud Infrastructure.
    At the beginning, I explained the role of the OCI REST API with a special focus
    on the security. You learned what information is required to sign a request and
    how to prepare the necessary API signing keys. Next, you read about the Python
    SDK for Oracle Cloud Infrastructure, starting from installation going through
    the configuration up to the point where you executed two simple actions on OCI
    from the interactive Python shell. Going further, you familiarized yourself with
    the `CLI`, discovering similarities with the Python SDK it is based on. The largest
    part of this chapter focused on applying the infrastructure-as-code principles
    using `Terraform`. You provisioned a simple, one-server infrastructure, performed
    a smoke test, and destroyed this sample setup. Afterward, I explained the infrastructure
    code in detail. Following that, you learned about the role of a `Terraform` state
    file. Finally, you read some recommendations related to automation. In the next
    chapter, we will look closer at identity and access management in the context
    of project environment management.


    # 4. Cloud Security and Project Environments


    In this chapter, we will take a top-down approach and think about how to properly
    organize your cloud resources around projects, environments, and solutions you
    are about to design and run on Oracle Cloud Infrastructure.'
