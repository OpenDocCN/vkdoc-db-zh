    #### UUID Function


    After reading the previous chapters, you are now familiar with the UUID generation
    function . First, you deployed it as a systemd service on a Linux-based compute
    instance. This was the exercise included in the second chapter. Next, you containerized
    this application and deployed it inside a Kubernetes pod on a cluster instance
    of Oracle Kubernetes Engine. This was the exercise in Chapter [8](#478313_1_En_8_Chapter.xhtml).
    Now, we are going to use the most lightweight deployment model for the UUID generation
    logic and run it as a serverless function. As stateless, short-lasting, and specialized
    logic, this is a perfect candidate to become a serverless function. At this point,
    it is worth mentioning that what I’ve just described is an excellent example of
    the way software evolves nowadays. At the beginning, we dealt with a dedicated
    compute instance where the application lifecycle was bound to the operating system
    service managed by systemd. Next, we were able to remove that coupling by containerizing
    the application and running it on the container platform. Finally, we arrive at
    the most lightweight mode for such simple, specialized, and short-lasting application
    logic and use serverless to delegate all function lifecycle management to the
    serverless platform. This evolution is illustrated in Figure [9-8](#478313_1_En_9_Chapter.xhtml#Fig8).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig8_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig8_HTML.jpg)


