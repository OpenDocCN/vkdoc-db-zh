- fmt: '### Configuration


    The Python SDK for Oracle Cloud Infrastructure is just a Python module that delivers
    a collection of several client classes with methods that invoke the OCI REST API
    to manage various types of OCI resources, for example:


    * `oci.core.ComputeClient` class methods are used to manage compute instances.

    * `oci.core.VirtualNetworkClient` class methods are used to manage VCN-related
    resources.

    * `oci.load_balancer.LoadBalancerClient` class methods are used to manage load
    balancer resources.


    As you create an instance object of a particular client class, you have to provide
    a dictionary (a set of key-value pairs) that stores the API signing details for
    the SDK. The following code snippet shows conceptually how it is done. Do not
    try executing these commands because one of them is still incomplete:

    ```

    $ source ocidev/bin/activate

    (ocidev) $ python3

    >>> config = dict([(''tenancy'', ''...''), (''region'', ''...''), (''user'', ''...''),
    (''fingerprint'', ''...''), (''key_file'', ''...''), (''pass_phrase'', ''...'')])

    >>> import oci

    >>> compute = oci.core.ComputeClient(config)

    ```


    It is also possible to load the configuration from a config file. A config file
    will include the details required for the SDK to be able to sign API requests
    it sends to the Oracle Cloud Infrastructure REST API on behalf of a named IAM
    user. The default name for the config file is `config`. The default location for
    the config file is the `~/.oci` directory. The file must have the permissions
    set in such a way that it is only the file owner who is able to read the contents
    of the file. Listing 3-5 shows the structure of the config file.

    ```

    [DEFAULT]

    tenancy=ocid1.tenancy.oc1..aa.........abcdef

    region=eu-frankfurt-1

    user=ocid1.user.oc1..aa.........ghijkl

    fingerprint=12:78:5b:60:65:cf:dc:b1:04:fd:3d:31:2b:a7:88:12

    key_file=/Users/mjk/.apikeys/oci_api_pem

    pass_phrase=secret

    Listing 3-5

    Python SDK for OCI Config File

    ```


    A tenancy (`tenancy`) and an IAM user (`user`) have to be provided as valid OCIDs,
    while the region (`region`) must use a region identifier, for example, `eu-frankfurt-1`.
    The key file (`key_file`) should be the path to the private key in PEM format
    that belongs to the API signing keypair whose public key you’ve uploaded and associated
    with the IAM user. The private key password (`pass_phrase`) as well as the public
    key fingerprint (`fingerprint`) are also stored in the config file. This is why
    it is crucial to set the proper permissions on the `config` file to limit the
    visibility of its contents. You can store multiple named configuration profiles
    in one config file. In our example, there is only the `DEFAULT` profile present.


    I have prepared a template of the config file for you. You will find the template
    file at this path: `chapter03/1-sdk/config.template`. Please copy and save it
    in the default location as the `~/.oci/config` file.

    ```

    $ mkdir ~/.oci

    $ cp ~/git/oci-book/chapter03/1-sdk/config.template ~/.oci/config

    $ chmod go-rwx ~/.oci/config

    $ ls -l ~/.oci

    -rw-------  1 mjk  staff   758B Jun 10 20:21 config

    ```


    Now, adjust the properties and use the values that correspond to your environment.
    You can use `vi` or any other text editor.

    ```

    $ vi ~/.oci/config

    ```


    Let’s activate the virtual environment and start the Python interpreter again.
    You can use the `oci.config.from_file` function in the configuration associated
    with a named profile. In our case, this will be the `DEFAULT` profile. Finally,
    you can test the creation of a compute client class instance.

    ```

    $ source ocidev/bin/activate

    (ocidev) $ python3

    >>> import oci

    >>> config = oci.config.from_file("~/.oci/config","DEFAULT")

    >>> compute = oci.core.ComputeClient(config)

    >>> quit()

    (ocidev) $ deactivate

    $

    ```


    ### Using the SDK


    As soon as you know how to prepare and load the configuration file, you are ready
    for the first simple test. Let’s list the availability domains visible for your
    tenancy and the IAM user you’ve chosen.

    ```

    $ source ocidev/bin/activate

    (ocidev) $ python3

    >>> import oci

    >>> config = oci.config.from_file("~/.oci/config","DEFAULT")

    >>> identity = oci.identity.IdentityClient(config)

    >>> ads_list = identity.list_availability_domains(config[''tenancy'']).data

    >>> for ad in ads_list:

    ...     print(ad.name)

    ...

    feDV:EU-FRANKFURT-1-AD-1

    feDV:EU-FRANKFURT-1-AD-2

    feDV:EU-FRANKFURT-1-AD-3

    ```


    Now, I will show you how to create a virtual cloud network in one of your non-`root`
    compartments. Before you proceed, please write down the OCID of a non-`root` compartment,
    such as `Sandbox`, in which you would like the VCN to be created. The OCID can
    be found in the OCI Console under Identity ➤ Compartments, as explained in the
    “Compartment” section in Chapter 2. To successfully test the script that follows,
    please replace the value of the `cid` variable with the OCID of the `Sandbox`
    compartment.

    ```

    >>> cid = "ocid1.compartment.oc1..aa.........gzwhsa"

    >>> kwargs = { "cidr_block": "10.5.0.0/16", "display_name": "sdk-vcn", "compartment_id":
    cid }

    >>> create_vcn_details = oci.core.models.CreateVcnDetails(**kwargs)

    >>> print(create_vcn_details)

    {

    "cidr_block": "10.5.0.0/16",

    "compartment_id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined_tags": null,

    "display_name": "sdk-vcn",

    "dns_label": null,

    "freeform_tags": null

    }

    >>> vcn = oci.core.VirtualNetworkClient(config)

    >>> response = vcn.create_vcn(create_vcn_details)

    >>> response.data

    {

    "cidr_block": "10.5.0.0/16",

    "compartment_id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "default_dhcp_options_id": "ocid1.dhcpoptions.oc1\. ...",

    "default_route_table_id": "ocid1.routetable.oc1\. ...",

    "default_security_list_id": "ocid1.securitylist.oc1\. ...",

    "defined_tags": {},

    "display_name": "sdk-vcn",

    "dns_label": null,

    "freeform_tags": {},

    "id": "ocid1.vcn.oc1.eu-frankfurt-1.aa.........74vj5a",

    "lifecycle_state": "AVAILABLE",

    "time_created": "2019-06-13T20:56:53.200000+00:00",

    "vcn_domain_name": null

    }

    ```


    As a first step to creating a new VCN using the Python SDK for Oracle Cloud Infrastructure,
    we prepared an instance of a model class `CreateVcnDetails`. Model class objects
    are used to encapsulate the configuration parameters for the API calls done by
    the instances of client classes. In our case, we instantiated the model class
    with just three VCN resource parameters: the CIDR block, the display name, and
    an OCID of a target compartment. Subsequently, we passed the `CreateVcnDetails`
    object as an argument to the `create_vcn` method of the `VirtualNetworkClient`
    client class instance. The method sent a request to the OCI REST API to get the
    VCN created in a synchronous manner. You may have spotted that it took a moment
    to return a response. Finally, as we printed the `response.data` attribute, we
    were able to see the OCID (`id`) of the newly created VCN as well as all other
    VCN attributes. Figure 3-6 shows the new VCN in the OCI Console.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig6_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig6_HTML.jpg)


    Figure 3-6

    VCN created using the SDK


    To delete the VCN, you can use the `delete_vcn` method like this:

    ```

    >>> response.data.id

    ''ocid1.vcn.oc1.eu-frankfurt-1.aa.........74vj5a''

    >>> vcn.delete_vcn(response.data.id)

    ```


    To quit the Python interpreter and leave the virtual environment, you can issue
    the following commands:

    ```

    >>> quit()

    (ocidev) $ deactivate

    $

    ```


    In this section, we’ve briefly covered the introductory aspects of the Python
    SDK for Oracle Cloud Infrastructure. If you would like to learn more, please refer
    to the comprehensive documentation available at [`https://oracle-cloud-infrastructure-python-sdk.readthedocs.io`](https://oracle-cloud-infrastructure-python-sdk.readthedocs.io).'
