  trans: '

    如果你思考升级策略，大概能说出几种。首先，如果你接受短时间的服务中断，最简单的方法是直接终止所有容器使用已弃用镜像的 Pod，让 `ReplicaSet`
    在后台自动重新创建它们，这次使用最新的镜像。或者，你可以采用蓝绿部署策略，即基于新镜像版本创建新的 Pod，与基于先前镜像版本正在运行的 Pod 并行存在，然后在某个瞬间将服务切换指向这些新
    Pod。最后，你可以通过逐一替换 Pod 为更新的镜像版本来执行滚动升级。滚动升级策略需要你使用两个 `ReplicaSet` 资源，并按步骤以程序化的方式逐步执行变更。`ReplicaSet`
    是一个相当底层的对象。为了提升升级体验，一个更高级的对象 `Deployment` 应运而生。`Deployment` 对象通过 `ReplicaSet`
    控制 Pod，其方式使得基于纯声明式变更来处理升级过程变得容易得多。我们不会在本书中深入探讨升级策略，但我们将使用 `Deployment` 对象，这就是我简要描述它的原因。


    作为对 Kubernetes 主要对象类型的快速介绍的总结，让我们看一下图 8-18。这里定义了两个部署。左侧的那个定义了一个单容器 Pod，标记为 `Tag
    A`，并将期望副本数设置为两个。右侧的那个定义了一个双容器 Pod，标记为 `Tag B`，并将期望副本数设置为三个。此外，还创建了两个 `LoadBalancer`
    类型的服务。一个将流量转发到附加了标签 `Tag A` 的 Pod，而第二个则将流量转发到附加了标签 `Tag B` 的 Pod。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig18_HTML.jpg](img/478313_1_En_8_Fig18_HTML.jpg)


    图 8-18 Kubernetes 对象


    还有其他几种类型的 Kubernetes 对象，例如 `StatefulSets`、`DaemonSets`、`Jobs`、`Ingresses`、`PersistentVolumes`、`StorageClasses`
    等。如果我在这里试图涵盖所有内容，这本书的篇幅会变得极为庞大。这就是为什么我们只关注本章后续部分中用于演示 Oracle Kubernetes Engine
    的对象。如果这一切看起来过于理论化，请不要担心。你很快就会在实践中看到这些对象。继续阅读即可。


    构建一个具有各种附加功能、可用于生产的集群，其本身就可能是个挑战。即使你没有被要求设计和启动 Kubernetes 集群，了解其高层架构仍然是有益的。


    Kubernetes 控制平面由各种软件组件构成，这些组件被复制并分布在奇数个主节点上。这些组件包括 API 服务器、调度器和控制器管理器。Kubernetes
    对象定义存储在一个名为 `etcd` 的分布式、持久化键值存储中。`etcd` 集群拥有独立于 Kubernetes 的生命周期，这在规划和启动可用于生产的集群时增加了工作量。只有
    API 服务器会直接访问 `etcd`。Pod 被调度到称为工作节点的其他类型节点上。在每个节点上，通常有一个 `kubelet` 守护进程作为 `systemd`
    主机服务管理器运行。你可以将 `kubelet` 视为节点代理。它通过与本地容器运行时通信来管理给定节点上的特定 Pod 容器。从网络角度来看，Kubernetes
    服务代理负责控制服务与 Pod 之间的流量路由，而另一个可插拔组件——容器网络接口插件——则实现了 Pod 之间的覆盖网络。图 8-19 提供了属于 Kubernetes
    控制平面的选定组件的高层概览。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig19_HTML.jpg](img/478313_1_En_8_Fig19_HTML.jpg)


    图 8-19 Kubernetes 与底层基础设施


    本书并非专门讲述 Kubernetes 管理，你需要知道，在规划 Kubernetes 集群的自定义安装时，有许多不同的注意事项需要考虑。幸运的是，由于托管
    Kubernetes 引擎的存在，我们无需为这些方面费心。

    '
- fmt: '## Managed Cluster


    Oracle Cloud Infrastructure comes with Oracle Kubernetes Engine (OKE), a managed
    Kubernetes platform-as-a-service cloud offering validated against the CNCF Certified
    Kubernetes Conformance Program. The certification ensures that the required Kubernetes
    APIs are fully supported and in line with the open source distribution. A managed
    service means that within a few minutes you get a fully operational cluster managed
    in an intelligent way by the platform. You do not need to bother about the `etcd`
    cluster or master node configuration. All control plane components are installed
    automatically. Your role is to choose the worker node shapes and point to the
    VCN subnets in which the worker nodes and load balancers are to be created. The
    cluster will be fully integrated with IAM and run on Oracle Cloud Infrastructure
    compute instances.


    ### 在 OCI 控制台中创建集群


    Creating a cluster in the OCI Console is pretty straightforward. First things
    first, however. If you have never launched any OKE cluster in your tenancy, you
    have to explicitly enable the OKE service. You do this by adding a simple IAM
    policy within the `root` compartment. The required statement is presented in Listing
    8-4 and allows the OKE service to manage all the resources in the entire tenancy.
    The OKE service must be able to provision instances and dynamically change some
    networking resources such as security lists.


    ```json

    [ "allow service OKE to manage all-resources in tenancy" ]

    ```

    Listing 8-4

    `tenancy.oke.policy.json`


    Make sure you are on your local machine. Let’s create the required policy. We
    are not using the `--profile` parameter; therefore, the command will be executed
    as the tenancy admin because this user is defined in the `DEFAULT` profile of
    our CLI configuration file.


    ```bash

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo TENANCY_OCID

    ocid1.tenancy.oc1..aa.........3yymfa

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes

    $ cd policies

    $ oci iam policy create -c $TENANCY_OCID --name tenancy-oke --description "OKE
    Policy"  --statements "file://tenancy.oke.policy.json"

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "tenancy-oke",

    "statements": [

    "allow service OKE to manage all-resources in tenancy"

    ],

    ...

    },

    }

    ```


    Nowadays, with more and more end-to-end automation in place, we are used to a
    “one-click” approach that assumes no complex actions are needed to complete a
    task such as cluster provisioning. As I said earlier, launching a cluster in the
    OCI Console (or using CLI) is pretty straightforward. To provision a cluster using
    the OCI Console, you need to go to Developer Services, choose Container Clusters,
    click Create Cluster, and provide a few details such as the Kubernetes version,
    worker node shape, and initial quantity per worker node subnet. This book, however,
    is oriented on code-driven automation; therefore, I will show how to use the Terraform-powered
    infrastructure code to provision a cluster on top of a custom virtual networking
    layout.


    ### 使用 Terraform 配置集群


    We want `sandbox-admin` to be recognized by the OKE cluster as its initial administrator.
    This is why it is absolutely crucial that you provision the cluster as the `sandbox-admin`
    user. Until now, Terraform created all resources on behalf of the tenancy admin.
    To make Terraform use another set of credentials and interact with the OCI API
    this time as `sandbox-admin`, you have to prepare a new variable definition file,
    as shown in Listing 8-5.


    ```hcl

    tenancy_ocid = ""

    region = ""

    user_ocid = ""

    private_key_path = ""

    private_key_password = ""

    fingerprint = ""

    compartment_ocid = ""

    ```

    Listing 8-5

    `sandbox-admin.tfvars`


    We will use the `--var-file` parameter to pass the new file to `terraform` and
    in this way set the values for the `oci` provider to execute all the API calls
    on behalf of the `sandbox-admin` user. All required details are already present
    in the `SANDBOX-ADMIN` profile in the `.oci/config` file. I have prepared a helper
    script to generate the `sandbox-admin.tfvars` file out of the values stored in
    the `.oci/config` file.


    ```bash

    $ SANDBOX_COMPARTMENT_OCID=`oci iam compartment get --query data.id --raw-output
    --profile SANDBOX-ADMIN`

    $ cd ~/git/oci-book/chapter08/3-kubernetes

    $ chmod a+x oci_config_to_tfvars.sh

    $ ./oci_config_to_tfvars.sh ~/.oci/config ~/sandbox-admin.tfvars $SANDBOX_COMPARTMENT_OCID

    ```


    Make sure the newly created `tfvars` file is indeed present at the `~/sandbox-admin.tfvars`
    path and continue.


    We are going to use Terraform to provision VCN-related resources such as subnets,
    security lists, and gateways with the Kubernetes cluster cloud resource and an
    instance pool of worker nodes. OKE requires various resources such as compute
    instances, load balancers, and virtual networking. The `sandbox-admins` group
    members and tenancy administrators already have all permissions in place to manage
    the required cloud resource types in the `Sandbox` compartment. In the `chapter08/3-kubernetes`
    directory, you will find the infrastructure code. Let’s provision it.


    ```bash

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes

    $ cd infrastructure

    $ find . | sort

    ./kube

    ./kube/cluster.tf

    ./kube/vars.tf

    ./kube/vcn-lb.tf

    ./kube/vcn-workers.tf

    ./modules.tf

    ./provider.tf

    ./vars.tf

    ./vcn.tf

    $ terraform init

    Initializing modules...

    - kubernetes in kube

    Initializing the backend...

    Initializing provider plugins...

    - Checking for available provider plugins...

    - Downloading plugin for provider "oci" (terraform-providers/oci) 3.30.0...

    Terraform has been successfully initialized!

    $ terraform apply -var-file="~/sandbox-admin.tfvars" -auto-approve

    ...

    ```


    > **Tip**

    >

    > If you have received an 401 error, you are most probably using a relative path
    to your private key. Please open the `sandbox-admin.tfvars` file and replace the
    `~` character or the `$HOME` variable with an absolute path to your home directory
    such as `/home/thomas/` or `/Users/thomas/`.


    Provisioning the infrastructure and subsequent cluster control plane components’
    installation on the master and worker nodes will take a couple of minutes, usually
    less than eight minutes. Terraform will be displaying the `Still creating` message.
    You can also access the OCI Console and observe the new cluster in the Creating
    state, as shown in Figure 8-20. To do so, do the following:


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig20_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig20_HTML.jpg)


    Figure 8-20


    OKE cluster provisioning


    1.  Go to Menu ➤ Developer Services ➤ Clusters.


    At some point in time, the cluster will transfer to the Active state. This announces
    the readiness of the control plane. You still need to wait a few moments for the
    worker nodes until the node pool instance enters the running state. In the meantime,
    please take a look at the cluster and networking information, as shown in Figure
    8-21. The infrastructure code provisions a Kubernetes cluster with a single-worker
    node pool. We can clearly see who has created the cluster.


    > **Caution**

    >

    > In the Created By field, you should see the name or the OCID of the `sandbox-admin`
    user, as shown in Figure 8-21. If you see another user such as the tenancy admin,
    it means you have either skipped the `--var-file` parameter when executing `terraform
    apply` or somehow have invalid user data in the `~/sandbox-admin.tfvars` file.
    Please use `terraform destroy` to delete the current cluster, make sure the new
    Terraform properties file for the `sandbox-admin` user is correct, and re-create
    the infrastructure.'
