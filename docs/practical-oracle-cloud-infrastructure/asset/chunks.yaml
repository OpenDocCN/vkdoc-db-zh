    从用户的角度来看，共享文件系统的挂载方式与块卷上的文件系统类似。但底层机制完全不同，并且根据所选协议的不同，我们可能会遇到一些限制或面临更高的复杂性。基于共享文件系统设计解决方案时，通常需要关注正确的权限检查和并发文件访问问题。这在很大程度上取决于所使用的操作系统和网络协议。例如，网络文件系统
    4 (`NFS4`) 引入了原生文件锁定机制，而基于 `NFS3` 的解决方案则必须依赖额外的网络锁管理器。


    在设计新的云解决方案或计划将现有传统系统从本地环境进行“搬迁式迁移”到云端时，你很可能会混合使用本节概述的三种存储类型。在讨论了计算和存储能力之后，我们将转向第三大核心云计算能力，即提供虚拟网络资源。


    ## 网络


    在多层或分布式架构中，软件解决方案通常由多种类型的应用节点组成，这些节点通过以下方式与其他节点协作：


    *   通过 Web 接口（也称为 `APIs`）暴露其服务

    *   远程消费其他服务提供的功能

    *   维持与组成集群的其他节点的连接

    *   访问外部依赖项，例如数据库或消息代理


    用于提供 `虚拟网络` 的云资源，如网络、子网、路由表、安全规则或不同类型的网关，在概念上可能与传统的基于硬件网络的构建块相似。然而，它们在配置方式上得到了极大简化。软件定义网络
    (`SDN`) 在云计算中扮演着重要角色。云基础设施可被视为一种支持 `SDN` 的基础设施，它让你能够创建和终止名为 `虚拟云网络` (`VCN`) 的隔离虚拟覆盖网络，将其细分为
    `子网`，并用于为你的计算实例和其他云资源部署各种网络模式。以下被视为网络能力一部分的云资源：


    *   `虚拟云网络及其子网`

    *   `预留的公共 IP 地址`

    *   `安全列表和安全规则`

    *   `各种类型的网关`

    *   `路由表和路由规则`

    *   `负载均衡器`

    *   `用于提供 VPN 功能的虚拟设备`

    *   `DNS 区域`

    *   `Web 应用程序防火墙 (WAF) 策略`


    精心规划虚拟网络是为你的云基础设施交付健壮安全模型，并同样保护你的基于云解决方案的关键部分。通常，设计过程从创建一个 `虚拟云网络` 并分配一个将在该网络内使用的私有
    `IP 地址` 范围开始。通常，单个云账户可以包含多个 `VCN`，其中一些完全隔离，而另一些则相互连接。为了使你的基础设施组织良好，你将在另一种称为 `VCN
    子网` 的云资源内配置计算实例。`VCN 子网` 本质上上是在特定 `虚拟云网络` 上进行逻辑细分的产物。你配置的每个计算实例都必须通过一种称为 `虚拟网卡`
    (`vNIC`) 的云资源分配给一个或多个 `子网`。连接到 `公共子网` 的 `vNIC` 可以分配一个 `公共 IP 地址`，从而可以从互联网访问。云提供商拥有
    `公共 IP 地址` 池。通常，`公共子网` 中的计算实例可以使用从这些池中动态分配的 `公共 IP 地址`。当计算实例终止时，该实例使用的 `公共 IP
    地址` 将返回到池中，以后可以附加到完全不同的计算实例，甚至是另一个云客户拥有的实例。如果你需要对 `公共 IP 地址` 进行更多控制，可以受益于一种称为
    `预留公共 IP 地址` 的云资源。`预留地址` 始终分配给你的云账户，无论它是否分配给实例，并且允许你在实例之间重新分配它。指定为 `私有子网` 的子网禁止其中的实例附加
    `公共 IP 地址`。`安全列表` 存储 `安全规则`，这些规则在数据包到达计算实例之前增加了一层软件定义防火墙的强制执行。这些 `安全规则` 的基本作用是验证给定
    `IP 地址` 和端口的流量是否确实允许通过。另一方面，`路由规则` 用于正确引导 `VCN` 出站流量，并允许数据包到达其下一跳，这通常是某种 `网关`，例如互联网网关、服务网关或对等网关。各种
    `网关`、`路由规则`、`安全规则` 和 `私有子网` 的正确组合将使你能够严格监督网络，并只允许预期的流量进出这些 `子网`。`负载均衡器` 用于将传入流量均匀分配到分组到所谓后端集中的实例。它们使你能够为基础设施引入高可用性以实现容错，或者将应用程序集群横向扩展以实现增加的请求处理吞吐量。某些云解决方案可能需要访问传统本地网络中可用的系统和数据。要将你的
    `虚拟云网络` 与数据中心内的私有网络连接，你可以使用 `IPSec VPN`（通过公共互联网隧道传输流量），或者利用专用私有连接（在 Oracle Cloud
    中称为 `FastConnect`）。在后一种情况下，你的本地数据中心将直接连接到特定的 Oracle Cloud 数据中心，或者通过最近的 `FastConnect
    连接合作伙伴` 连接，该合作伙伴维护与 Oracle Cloud 数据中心的物理连接。无论 `IPSec VPN` 还是 `FastConnect`，你都必须创建一个称为
    `动态路由网关` (`DRG`) 的云资源，将其附加到你选择的 `VCN`，并通过创建新的 `路由规则` 来更改 `VCN` `路由表`。该 `路由规则`
    将把 `DRG` 设置为寻址到你本地网络段所用 `IP 地址` 范围的出站流量的目的地。`DNS 区域` 允许你在 Oracle Cloud `DNS` 服务器中维护你拥有的
    Web 域，并详细管理域区域，例如创建自定义 `DNS` 记录。为了完善你的云网络工具包，可以利用 `Web 应用程序防火墙` (`WAF`) 来保护面向互联网的应用程序端点免受恶意和不必要的入站流量攻击。`WAF`
    拥有超过 200 条预定义规则，只需选择性地进行配置和启用。你将在 `DNS` 中管理的域名记录重定向到 `WAF` 端点。如果流量符合为特定端点启用的 `WAF`
    策略，流量将被放行以到达应用程序端点。


    云资源是各种管理操作的对象，这些操作只能由经过认证和授权的用户执行。这引导我们进入下一节，了解第四大云计算能力共同解决的安全主题。

    '
- fmt: '## Identity and Access Management


    `Identity and access management` refers to a set of tools and principles that
    let you define and govern who can access and manage your cloud tenancy mainly
    by provisioning, changing, and terminating the cloud resources. Issuing a cloud
    management plane API call or using a management console can be done only by a
    successfully authenticated `user`. Usually, cloud providers implement two types
    of cloud users.


    *   Locally defined


    *   Retrieved from an external identity provider


    Smaller organizations and startups will probably use locally defined users, while
    large organizations that already maintain their user hierarchy in an identity
    provider of some kind would rather federate their tenancy with this provider.
    What is an `identity provider` (IdP)? It is a system that stores and manages the
    lifecycle of human users, system users, and groups of users. Furthermore, an `IdP`
    usually offers authentication services that can be consumed by other systems and
    their `IAM` services. Federating your cloud tenancy with an external identity
    provider means that you are going to reuse the identity data that is already present
    in the `IdP`. To keep it simple, the users defined in the `IdP` will be recognized
    by your cloud tenancy `IAM`. Users alone can actually do very little, unless they
    are assigned to the proper `groups`. Authorization, which is the function that
    verifies what kind of actions a particular user is allowed to conduct over certain
    cloud resources, is enforced through `policies`. A `policy` decides which `group`
    is allowed to perform which kind of actions over a set of cloud resources either
    in the entire tenancy or in an individual `compartment`. `Compartments` are unique
    to Oracle Cloud Infrastructure and let you isolate different cloud resources that
    exist in your cloud tenancy. In this way, a single cloud account can be used to
    host a number of completely independent and unrelated projects. `OCI` lets you
    create hierarchies of `compartments`. Chapter [4](#478313_1_En_4_Chapter.xhtml)
    will cover the `compartments` in more detail.


    When you design a new cloud-based solution or rearchitect an existing system before
    moving it to the cloud, you may decide that some applications hosted on selected
    compute instances must be allowed to issue `API` calls to perform particular tasks
    over other cloud resources as well. This can be achieved by creating `policies`
    for the `dynamic groups` that gather together dynamically included `instance principals`
    based on matching rules. An `instance principal` is basically an identity of a
    compute instance.


    In this section, we discussed the four core cloud computing capabilities and the
    cloud resources they usually incorporate. If you recall the first cloud computing
    definition I’ve referenced at the beginning of this chapter, you may wonder what
    the four deployment models are. We are going to look at them in the next section.


    ## Deployment Models


    I’ve already said that some people mistakenly assume that cloud computing and
    `public cloud` are the same. Yet, it is the `public cloud` that the general public,
    press, and `IT` professionals most often refer to in their discussions about cloud
    computing. What does the term actually mean? Well, let’s take a look at the three
    leading deployment models.


    *   Private cloud


    *   Public cloud


    *   Hybrid cloud


    The first one is pretty straightforward. If you and your fellow admins reorganize
    and fully automate the way you serve the virtualized hardware resources that are
    maintained in shared pools and available as self-service services to different
    project teams within your organization, then you’ve built a `private cloud` and
    probably transformed the `IT` culture of your organization as well. Congratulations.
    This is a cumbersome and expensive task, though, because you need to rearchitect
    your hardware and virtualization layer, purchase or build your own cloud control
    plane, and hire even more admins to keep an eye on all these resources and services
    that have become your `private cloud`. Another major drawback is that your organization
    still owns all this equipment, which results in increased capital expenses. Well,
    not everyone is eager to accept these significant expenses that are related to
    the lifecycle of the hardware equipment, especially in a nontechnology business.
    Investing money and maintaining a `private cloud` could be satisfactory for a
    sizable, mature, and technology-focused enterprise or a public-sector organization.
    The great majority of organizations prefer to avoid owning too much, if any, hardware.
    Instead, they opt for outsourcing all costs related to any kind of data center
    maintenance, if possible.


    A `public cloud` delivers various computing capabilities as services much in the
    same fashion as a `private cloud` does inside an organization’s business network.
    The difference is in the audience or, to put it properly, in who are the consumers
    of the cloud service a `public cloud` offers. A typical `public cloud` provider
    maintains data centers, either own or collocated, in one or more geographical
    locations across the globe; owns the hardware; and is responsible for the overall
    maintenance, operations, security, and service availability. The service consumers,
    which could be as diverse as individuals, companies, nonprofit organizations,
    startups, or even government agencies, use secure `APIs` to rapidly self-provision,
    scale, and manage the cloud resources that eventually use hardware located in
    one or more data centers owned by the given `public cloud` provider.


    Providing an accurate definition of `hybrid cloud` won’t be as easy as it was
    with the previous two deployment models. To keep things simple, the most dominant
    understanding of a `hybrid cloud` is the use of one or more `public cloud` providers
    that are well-integrated and interconnected with a `private cloud` run on-premise.
    I am not going to elaborate on `hybrid cloud` architectures in this book because
    the topic itself is still somehow fluid in the way it is seen by the industry
    and much more complex than it may look at first glance.


    Large-footprint `public cloud` consumption raises important questions about the
    risk of a costly vendor-lock with just one `public cloud` provider. If all our
    solutions are exclusively architected and based on a single `public cloud`, we
    are susceptible to a potential increase in service fees with no contingency plan.
    There are other perils to consider in the context of vendor-lock such as the theoretical
    scenario of a sudden, short-notice service deprecation that may force a rapid
    and expensive migration project. These concerns lead to the idea of a `multicloud`
    pattern applied to `public cloud` consumption. This pattern assumes that we subscribe
    to infrastructure and platform services provided by more than one `public cloud`
    provider. Furthermore, we design applications and workloads in such a way that
    they can be run in any of our cloud tenancies. Modern container platforms such
    as `Kubernetes` help us make this approach a reality. We will discuss Oracle Kubernetes
    Engine in Chapter [8](#478313_1_En_8_Chapter.xhtml).


    The cloud computing characteristics outlined at the beginning of this chapter
    and the core capabilities briefly discussed a few sections earlier apply to every
    kind of cloud no matter what the deployment model and the service model are. Let’s
    take a look at the three service models available.'
