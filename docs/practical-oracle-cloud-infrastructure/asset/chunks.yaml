    host because the worker node doesn’t even have a public IP address.'
  trans: '# 扩展实例


    弹性是第 1 章提到的云计算原则之一。我们曾提到，弹性可以通过底层资源的可扩展性来实现。我们还定义了**水平扩展**，即通过添加（或移除）同类集群实例来增加（或减少）集群的整体处理能力。添加更多实例通常被称为**向外扩展**，而从集群中移除实例则被称为**向内扩展**。类似地，我们定义了**垂直扩展**，即通过向上（或向下）调整单个实例的硬件配置来使其更强大（或更弱）。增加更多硬件资源传统上被称为**向上扩展**，而使用更弱的资源则称为**向下扩展**。所有术语均在图
    6-21 中说明。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig21_HTML.jpg](img/478313_1_En_6_Fig21_HTML.jpg)


    **图 6-21 水平和垂直扩展**


    本节将讨论这两种扩展类型，先讲水平扩展，再讲垂直扩展。


    ## 实例池与自动扩展


    水平扩展通常针对同构实例组执行。这些实例中的每一个都使用相同的硬件配置文件和基础软件堆栈。此外，对于成员协作的集群应用程序，实例初始化逻辑应告知每个成员如何找到其他成员并建立正确的连接。为了能够通过启动新实例快速向外扩展，我们需要某种实例模板，这比你在第
    2 章中使用的自定义镜像要多。这种实例模板被理解为硬件配置（形状）、基础软件堆栈（镜像）和初始化逻辑（用于 `cloud-init` 的 `cloud-config`）的组合，并附带一些基本的网络详细信息，被称为**实例配置**。基于实例配置调配的实例被分组到一个**实例池**中。然后，你可以为特定池设置预期的实例数量，并观察池是如何通过启动新实例（或终止现有实例）来向外（或向内）扩展的。随着时间的推移，你可以动态调整实例数量，以提供预期的集群处理能力。单个实例配置可用于调配多个实例池。你可以基于现有的计算实例创建实例配置，或者完全从头开始使用
    API（通常通过 Terraform 或 CLI）创建。实例配置与实例池之间的关系如图 6-22 所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig22_HTML.jpg](img/478313_1_En_6_Fig22_HTML.jpg)


    **图 6-22 实例池和实例配置**


    我们将通过调配一套完整的云资源来更仔细地研究实例池的工作方式。该池将由在私有子网中启动的、基于自定义实例配置的实例组成。为了为隔离的实例提供适当的互联网连接，我们将采用依赖于主机和
    NAT 网关的熟悉模式。实例配置将使用最新的 CentOS 镜像、一个简单的 `cloud-init` 配置（该配置安装并执行名为 `stress-ng`
    的压力测试工具）、SSH 公钥以及一些基本的硬件配置文件信息（如形状和 VNIC 详细信息）。图 6-23 展示了我们练习的预期基础设施。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig23_HTML.jpg](img/478313_1_En_6_Fig23_HTML.jpg)


    **图 6-23 隔离的实例池基础设施**


    这次，我们将使用 `chapter06/2-instance-pool-autoscale` 目录中的代码。和往常一样，我假设第 3 章中描述的 Terraform
    所需的所有环境变量都存在。同样适用于位于 `~/.ssh/oci_id_rsa.pub` 路径的 SSH 公钥。让我们开始调配基础设施。


    ```

    $ cd ~/git

    $ cd oci-book/chapter06/2-instance-pool-autoscale/infrastructure

    $ find . \( -name "*.tf" -o -name "*.yaml" \)

    ./modules.tf

    ./bastion/compute.tf

    ./bastion/vcn.tf

    ./bastion/vars.tf

    ./vcn.tf

    ./workers/compute.tf

    ./workers/vcn.tf

    ./workers/cloud-init/worker.config.yaml

    ./workers/vars.tf

    ./provider.tf

    ./vars.tf

    $ terraform init

    Initializing modules...

    - module.bastion

    Getting source "bastion"

    - module.workers

    Getting source "workers"

    Initializing provider plugins...

    - Checking for available provider plugins on https://releases.hashicorp.com...

    - Downloading plugin for provider "oci" (3.30.0)...

    * provider.oci: version = "~> 3.30"

    Terraform has been successfully initialized!

    $ terraform apply -auto-approve

    Apply complete! Resources: 13 added, 0 changed, 0 destroyed.

    Outputs:

    bastion_public_ip = 130.61.122.251

    image_name = CentOS-7-2019.04.15-0

    $ BASTION_PUBLIC_IP=`terraform output bastion_public_ip`

    ```


    在通过主机连接到工作节点之前，让我们先在 OCI 控制台中查看一些新调配的云资源。


    1.  转到菜单 ➤ 计算 ➤ 实例池。


    2.  确保选择了 `Sandbox` 复合框。


    你应该会看到一个名为 `workers-pool` 的新实例池，如图 6-24 所示。池的放置配置包括我默认区域（eu-frankurt-1）中的所有三个可用性域。每当一个新实例添加到池中时，它将在其中一个可用性域中创建。如果你查看“目标实例计数”，你会看到，在我们的例子中，我们开始时目标实例数量很少，只有一个。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig24_HTML.jpg](img/478313_1_En_6_Fig24_HTML.jpg)


    **图 6-24 在 OCI 控制台中查看实例池**


    要了解有关池中实例的更多信息，请按照以下步骤操作：


    1.  单击实例池的名称。


    2.  在“资源”部分，确保选择了“已创建的实例”。


    你现在应该看到类似于图 6-25 所示的内容。这次，工作实例位于 AD-1 中。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig25_HTML.jpg](img/478313_1_En_6_Fig25_HTML.jpg)


    **图 6-25 在 OCI 控制台中查看实例池成员**


    让我们更详细地检查这个实例。我们现在要找出分配给实例的私有 IP 地址，并监控其当前负载。为此，请按照以下步骤操作：


    1.  单击实例的名称。


    2.  在“实例详细信息”视图的“实例信息”选项卡上，从“主 VNIC 信息”部分读取“私有 IP 地址”设置。在我的例子中，它是 `10.1.2.2`。


    3.  在“资源”部分，确保选择了“指标”。


    4.  单击“CPU 利用率”小部件的绘图区域。


    应该会出现一个新的嵌入式窗口，你可以在其中调整底部的 x 轴，以进一步提高图表的可读性。如图 6-26 所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig26_HTML.jpg](img/478313_1_En_6_Fig26_HTML.jpg)


    **图 6-26 在 OCI 控制台中查看实例 CPU 利用率**


    如你所见，在初始引导相关进程完成后，CPU 消耗从大约 40% 下降到 20%。为什么一台空闲机器要消耗 20% 的 CPU？它真的空闲吗？要了解原因，让我们连接到工作节点。当然，我们必须依赖主机，因为工作节点甚至没有公有
    IP 地址。'
- fmt: "```\n$ ssh -J opc@$BASTION_PUBLIC_IP opc@10.1.2.2\n[opc@inst-pu327-workers-pool\
    \ ~]$ ps -axf -o %cpu,pid,command\n%CPU   PID COMMAND\n...\n0.0 13531 /usr/bin/python\
    \ /usr/bin/cloud-init modules -mode=final\n0.0 13776  \\_ /bin/sh /var/lib/cloud/instance/scripts/runcmd\n\
    0.0 13780      \\_ stress-ng -c 0 -l 20\n19.9 13785          \\_ stress-ng -c\
    \ 0 -l 20\n20.0 13786          \\_ stress-ng -c 0 -l 20\n19.9 13787          \\\
    _ stress-ng -c 0 -l 20\n19.9 13788          \\_ stress-ng -c 0 -l 20\n```\n\n\
    Mystery solved. As part of the final stage of `cloud-init`, we have intentionally\
    \ executed the `stress-ng` utility to simulate CPU load on the instance. The `stress-ng`\
    \ utility has been executed in a way to create a 20 percent overall CPU load on\
    \ each vCPU. Because we have used the `VM.Standard2.2` shape that ships with two\
    \ OCPUs, the operating systems sees four vCPUs in total. As a result, the `stress-ng`\
    \ forked four processes, each consuming 20 percent of a particular vCPU processing\
    \ capacity. The following listing presents the `cloud-config` file referenced\
    \ by the instance configuration that served as the template for the instances\
    \ in the instance pool we’ve just provisioned.\n\n```yaml\n#cloud-config\npackages:\n\
    - stress-ng\nruncmd:\n-  [ stress-ng, -c, 0, -l, 20 ]\n```\n\n## Listing 6-7:\
    \ worker.config.yaml (Workers Module)\n\nLet’s take a look at the infrastructure\
    \ code and go through the new resources you haven’t had an opportunity to see\
    \ until now. The following listing shows the first part of the `workers/compute.tf`\
    \ file and covers the instance configuration resource.\n\n```hcl\n...\nresource\
    \ \"oci_core_instance_configuration\" \"worker_config\" {\n  compartment_id =\
    \ var.compartment_ocid\n  instance_details {\n    instance_type = \"compute\"\n\
    \    launch_details {\n      compartment_id = var.compartment_ocid\n      create_vnic_details\
    \ {\n        assign_public_ip = false\n      }\n      metadata = {\n        ssh_authorized_keys\
    \ = file(\"~/.ssh/oci_id_rsa.pub\")\n        user_data = base64encode(file(\"\
    workers/cloud-init/worker.config.yaml\"))\n      }\n      shape = \"VM.Standard2.2\"\
    \n      source_details {\n        source_type = \"image\"\n        image_id =\
    \ var.image_ocid\n      }\n    }\n  }\n  display_name = \"instance-config\"\n\
    }\n...\n```\n\n## Listing 6-8: compute.tf (Workers Module): Instance Configuration\n\
    \nThe `oci_core_instance_configuration` resource defines an instance configuration\
    \ that, as we mentioned earlier, is a template applied by an instance pool while\
    \ launching new instances. The most important details are defined in the `launch_details`\
    \ object. As a matter of fact, their definition is similar to the `oci_core_instance`\
    \ resource, which is the standard compute instance Terraform resource. The resulting\
    \ instance configuration can be seen in the OCI Console, as shown in Figure 6-27.\n\
    \n![Figure 6-27: Viewing instance configuration details in the OCI Console](images/478313_1_En_6_Chapter/478313_1_En_6_Fig27_HTML.jpg)\n\
    \n## Figure 6-27: Viewing instance configuration details in the OCI Console\n\n\
    The following listing shows the second part of the `workers/compute.tf` file and\
    \ covers the instance pool resource.\n\n```hcl\n...\nresource \"oci_core_instance_pool\"\
    \ \"worker_pool\" {\n  compartment_id = var.compartment_ocid\n  instance_configuration_id\
    \ = oci_core_instance_configuration.worker_config.id\n  placement_configurations\
    \ {\n    availability_domain = var.ads[0]\n    primary_subnet_id = oci_core_subnet.workers_net.id\n\
    \  }\n  placement_configurations {\n    availability_domain = var.ads[1]\n   \
    \ primary_subnet_id = oci_core_subnet.workers_net.id\n  }\n  placement_configurations\
    \ {\n    availability_domain = var.ads[2]\n    primary_subnet_id = oci_core_subnet.workers_net.id\n\
    \  }\n  size = var.pool_target_size\n  display_name = \"workers-pool\"\n}\n...\n\
    ```\n\n## Listing 6-9: compute.tf (Workers Module): Instance Pool\n\nThe `oci_core_instance_pool`\
    \ resource defines an instance pool. The `instance_configuration_id` argument\
    \ takes the OCID of an instance configuration, and the `size` argument is used\
    \ to define the initial count of instances created in the pool based on that instance\
    \ configuration. Other interesting parts are the `placement_configurations` embedded\
    \ blocks. Their elements specify where an instance pool should launch its instances.\
    \ In our case, I am using a single regional subnet defined in the workers module\
    \ and instruct the instance pool to use all three availability domains while provisioning\
    \ any subsequent instances. The initial size of the instance pool is set with\
    \ a module input variable. The following listing presents a small part of the\
    \ `modules.tf` file where, among many different input parameters, you can see\
    \ the value for the initial instance pool size.\n\n```hcl\n...\nmodule \"workers\"\
    \ {\n  source = \"./workers\"\n  compartment_ocid = var.compartment_ocid\n  vcn_ocid\
    \ = oci_core_virtual_network.vcn.id\n  vcn_nat_ocid = oci_core_nat_gateway.natgw.id\n\
    \  vcn_cidr = oci_core_virtual_network.vcn.cidr_block\n  vcn_subnet_cidr = \"\
    10.1.2.0/24\"\n  ads = data.oci_identity_availability_domains.ads.availability_domains[*].name\n\
    \  image_ocid = data.oci_core_images.centos_image.images[0].id\n  pool_target_size\
    \ = 1\n}\n...\n```\n\n## Listing 6-10: modules.tf (Root Module)\n\nWe are now\
    \ going to explore the autoscaling capability of the instance pool we are working\
    \ with. First, we are going to add much more CPU load on our worker node to simulate\
    \ a heavy processing batch or a considerable peak of incoming requests. While\
    \ still connected to the worker node, launch another `stress-ng` process.\n\n\
    ```bash\n[opc@inst-pu327-workers-pool ~]$ nohup stress-ng -c 0 -l 80 &\n[1] 10834\n\
    [opc@inst-pu327-workers-pool ~]$ ps -axf -o %cpu,pid,command\n%CPU   PID COMMAND\n\
    ...\n0.0  5598 /usr/sbin/sshd -D\n0.1 10769  \\_ sshd: opc [priv]\n0.0 10772 \
    \     \\_ sshd: opc@pts/1\n0.0 10773          \\_ -bash\n0.0 10834           \
    \   \\_ stress-ng -c 0 -l 80\n71.5 10835              |   \\_ stress-ng -c 0 -l\
    \ 80\n71.0 10836              |   \\_ stress-ng -c 0 -l 80\n71.0 10837       \
    \       |   \\_ stress-ng -c 0 -l 80\n71.1 10838              |   \\_ stress-ng\
    \ -c 0 -l 80\n0.0 10849              \\_ ps -axf -o %cpu,pid,command\n0.0 13531\
    \ /usr/bin/python /usr/bin/cloud-init modules --mode=final\n0.0 13776  \\_ /bin/sh\
    \ /var/lib/cloud/instance/scripts/runcmd\n0.0 13780      \\_ stress-ng -c 0 -l\
    \ 20\n19.9 13785          \\_ stress-ng -c 0 -l 20\n19.9 13786          \\_ stress-ng\
    \ -c 0 -l 20\n19.9 13787          \\_ stress-ng -c 0 -l 20\n19.9 13788       \
    \   \\_ stress-ng -c 0 -l 20\n...\n[opc@inst-pu327-workers-pool ~]$ exit\n```\n\
    \nTo add some more CPU load, we launched a new `stress-ng` process instance. The\
    \ preceding `nohup` command was used to let the `stress-ng` process continue even\
    \ if we disconnect from the machine. After two or three minutes, the CPU utilization\
    \ for the instance will report a large increase in load, as shown in Figure 6-28.\
    \ Very good. Everything goes as expected.\n\n![Figure 6-28: Viewing increased\
    \ CPU utilization in the instance’s Metrics window](images/478313_1_En_6_Chapter/478313_1_En_6_Fig28_HTML.jpg)\n\
    \n## Figure 6-28: Viewing increased CPU utilization in the instance’s Metrics\
    \ window\n\nIn the meantime, we will look at the third part of the `compute.tf`\
    \ file in the workers module, namely, the autoscaling configuration resource.\
    \ The code is shown in the next listing."
