    ## 简介


    本书中的代码片段已在 macOS 和 Windows Subsystem for Linux 上进行测试。此外，所有命令都应在主流的 Linux 发行版上运行。如果您使用的是
    Windows 且不想使用 Windows Subsystem for Linux，您随时可以在虚拟机上运行 Linux。另外，大多数代码片段也可能在 Windows
    的 Git Bash 中运行。请务必按照第 3 章和第 4 章的描述准确设置 CLI 和 Terraform。


    您可以在控制台中找到与您的云租户关联的对象存储命名空间名称，如下所示：


    1.  转到菜单 ➤ 管理 ➤ 租户详细信息。

    2.  找到“对象存储命名空间”标签。


    或者，您也可以使用 CLI 来获取对象存储 (`os`) 命名空间 (`ns`) 的名称，如下所示：

    ```

    $ oci os ns get

    {

    "data": "jakobczyk"

    }

    ```

    对象存储命名空间名称是不可变的，不会更改。对象存储命名空间名称是一个随机且唯一的字符串。较旧的租户（例如我的）可能其命名空间名称与租户名称相同。您可能还记得，在第
    2 章中，我曾提到每个 Oracle Cloud Infrastructure 云资源都由一个称为 OCID 的结构化标识符唯一标识。嗯，这条规则也有例外：存储桶和对象是通过名称唯一标识的。它们始终在专用于您云租户的命名空间的上下文中命名，如图
    5-2 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig2_HTML.jpg](img/478313_1_En_5_Fig2_HTML.jpg)

    *图 5-2 命名空间、存储桶和对象*


    在此阶段，我需要指出，Oracle Cloud Infrastructure 中的对象存储在作用域上是区域性的。这基本上意味着，一个特定的存储桶及其存储的对象，驻留在该存储桶最初创建的区域中。如果您发现自己需要执行跨区域的对象传输到位于另一个区域的另一个存储桶，有一个
    API 支持此类操作。


    ## 处理对象


    对象所在的存储桶可以是公共的或私有的。为了在大多数情况下保护数据，您将使用私有存储桶，但您可以随时自由创建公共存储桶。有两种类型的认证组可以访问私有存储桶中的对象。


    *   IAM 用户

    *   实例主体


    我将在接下来的章节中解释这两种访问类型。此外，您还可以通过发出在给定时间段内有效的预认证请求，让未经认证的客户端访问私有存储桶中的特定对象。任何知道链接的人都可以访问该特定对象。预认证请求将在本章末尾介绍。


    为了准备练习，我们需要快速回顾一下。在上一章中，我要求您创建两个用户 `sandbox-admin` 和 `sandbox-user`，以及两个对应的组 `sandbox-admins`
    和 `sandbox-users`。然后，在根 compartment 中，我们创建了一个新的 IAM 策略 (`sandbox-admins-policy`)，其中包含一条
    *IAM 策略语句*，该语句授予了 `sandbox-admins` 组成员对 `Sandbox` compartment 的完全管理访问权限。

    ```

    allow group sandbox-admins to manage all-resources in compartment Sandbox

    ```

    在继续之前，请确保此设置仍然有效。您需要它来完成本章的演练。为了演示对象存储的一些基本功能，您将以 `sandbox-user` 用户身份使用 CLI 创建一个存储桶并上传一组文件。接下来，我们将使用其他命令进行批量操作、基于前缀的带分页列表以及自定义元数据。您还将学习如何处理并发更新。所有
    CLI 命令都使用 Oracle Cloud Infrastructure REST API，其概念如图 5-3 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig3_HTML.jpg](img/478313_1_En_5_Fig3_HTML.jpg)

    *图 5-3 与对象存储 API 交互*


    让我们看看与对象存储的基本交互。我们将使用 CLI 来执行它们。同样，您即将发出的 CLI 命令将简单地导致 API 请求，如第 3 章所述。

