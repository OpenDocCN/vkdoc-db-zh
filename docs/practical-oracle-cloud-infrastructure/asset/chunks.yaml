  trans: '

    结构清晰、基于契约、面向企业但有些臃肿的 SOAP API，正逐渐被轻量且相当自然的 REST API 所取代。确实，绝大多数用例都可以通过 REST API
    实现，其成本远低于 SOAP。此外，REST 无疑是中小企业新项目、软件即服务（SaaS）API、物联网边缘以及大规模容器驱动的后端系统的首选。各种 API
    网关以及 API 管理平台都将 REST 定位为 API 管理环境下的默认风格。这些套件通常仍然支持 SOAP，仅仅是因为其部署广泛，并且将在企业中继续使用一段时间，特别是在后端采用企业服务总线（`ESB`）的传统面向服务架构部署中。然而，API
    演进的未来并不止于 REST API。值得关注的是`GraphQL`，可以说它构建于 REST 之上，引入了面向查询的 API 概念，兼具灵活性与轻量级的特点。图
    1-6 展示了 API 的演进历程。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig6_HTML.jpg](img/478313_1_En_1_Fig6_HTML.jpg)

    图 1-6：API 的演进


    `gRPC`则采取了略有不同的演进方向。从设计上讲，这种远程过程调用（`RPC`）框架旨在实现机器可读且与编程语言无关。你通常使用协议缓冲区来定义 API，这种方式比在
    SOAP 中使用`WSDL/XSD`更紧凑地同时指定服务和数据结构。有许多代码生成器可以获取这些定义，并为客户端和服务器生成各种编程语言的代码桩。`gRPC`非常适合高性能消息传递，这归功于其线路上使用的紧凑二进制格式以及`HTTP/2`特性集。其采用仍处于相对早期阶段，主要关注内部
    API，但我们可能会达到这样一个节点：部分面向公众的 API 逐渐迁移到`gRPC`。这可能从涉及流式传输或低功耗物联网设备的 API 开始。


    #### 云管理平面


    API 为何重要？如果我们想将云计算应用于自己的硬件，就需要一个系统来管理资源池、实现快速自服务供应，并允许虚拟机水平扩展。这样的系统，我们称之为`云管理平面`，必须提供一个可供项目团队自助使用的
    API。REST 风格非常适合云计算，因为云能力（我们将在下一节讨论）可以轻松地被视为一等 REST 资源。当你管理云资源时，很少直接进行 API 调用。通常，API
    是通过 Web 控制台、针对各种语言的软件开发工具包（`SDK`）、命令行界面或类似`Terraform`的基础设施即代码软件来使用的。在所有这些情况下，API
    调用都是在后台构建和发送的。你只需提供所需的输入即可。图 1-7 概述了消费 Oracle Cloud Infrastructure（`OCI`）API 的各种方式。更多相关内容将在第
    3 章中介绍。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig7_HTML.jpg](img/478313_1_En_1_Fig7_HTML.jpg)

    图 1-7：云管理平面 API 生态系统


    到目前为止，参考我最喜欢的两个云计算定义，我们已经探讨了云计算的关键特性。我们分析了快速自服务供应与传统供应模型的区别。接着，我们简要讨论了如何通过可扩展性来实现弹性。最后，我们了解了现代
    API 在将资源作为服务交付方面所起的关键作用。现在，让我们来探索每个基础设施云必须提供的四种核心 IT 能力。


    ## 核心云能力


    在云中，你使用虚拟的`云资源`来构建解决方案，这些资源类似于为软件运行提供物理平台的硬件设备。云资源有不同的类型。有些云资源类型旨在严格与其他类型的云资源结合使用。例如，`路由规则表`是一种云资源类型，它始终存在于`虚拟云网络`云资源中。它们与少数其他云资源类型一起，被视为同一个`云能力`的一部分，这个术语更常被称为一个独立的`云服务`。单个云资源类型如何组合在一起，取决于特定云提供商的选择。通常，无论云提供商是全球性的还是小众的，你都会看到四种核心云能力通常被引用为云服务。


    *   计算

    *   网络

    *   存储

    *   身份与访问管理


    这四种核心云计算能力提供的资源，在后台通常被用作构建块，以交付进一步的基础设施和平台能力，例如：


    *   容器编排

    *   托管数据库

    *   无服务器计算


    现在，我们将简要了解这四种核心云计算能力。

    '
- fmt: '### Compute


    执行程序和处理信息通常被视为计算活动，并被认为是运行在当代云计算平台上的解决方案最重要的两项任务。执行这些活动的一种方式是在虚拟主机上运行软件，这些虚拟主机也被称为*计算实例*。您可以将这些实例想象成运行在数据中心、由特定云提供商管理的计算机。您可以单独或使用实例池分组来配置这些实例。您可以建立安全外壳（SSH）或远程桌面（RDP）连接来远程管理它们或它们托管的软件。


    云中的绝大多数计算实例都是*虚拟机*（VM）。属于不同云租户（账户）的多个虚拟机可能运行在同一台物理服务器上。这被称为*多租户*。多个租户最终共享相同的物理设备，甚至在不知情的情况下，以利用共享经济的原理。使用虚拟机使云提供商更容易在共享池中向客户提供更精细的计算资源。需要更高性能计算（HPC）或使用与虚拟化配合不佳的系统的更苛刻客户，通常更愿意在不涉及多租户和虚拟机监控程序的专用主机上部署他们的解决方案。因此，他们选择*裸金属*（BM）计算实例，这类实例不使用任何虚拟机监控程序，并且在使用期间专用于单个云账户。需要在此阶段说明的是，并非所有云提供商都支持裸金属机器。Oracle
    Cloud Infrastructure 支持。图 [1-8](#478313_1_En_1_Chapter.xhtml#Fig8) 说明了虚拟机和裸金属机器之间的区别。


    ![`../images/478313_1_En_1_Chapter/478313_1_En_1_Fig8_HTML.jpg`](images/478313_1_En_1_Chapter/478313_1_En_1_Fig8_HTML.jpg)


    **图 1-8**


    裸金属机器 vs. 虚拟机


    在配置实例之前，无论它是虚拟机还是裸金属机器，您都需要做出两个基本选择。计算实例的初始配置通常通过选择以下内容完成：


    *   硬件配置文件


    *   预装软件


    *硬件配置文件*定义了为新配置的计算实例提供的元素，例如 CPU 核心数、内存大小或安装基础软件的主块存储设备上的磁盘空间。配置文件的选择将决定实例是在虚拟机上运行还是在专用的裸金属主机上运行。每个云提供商通常都提供广泛的硬件配置文件供您为计划启动的实例选择。根据云提供商的不同，您可能会遇到硬件配置文件的不同名称，例如：


    *   Shape


    *   Flavor


    *   Instance type


    *   Size


    Oracle Cloud Infrastructure 计算使用 *shape* 作为计算实例的硬件配置文件名称。


    *预装软件堆栈*通常被称为*镜像*。首先，它必须包含一个操作系统。云提供商倾向于只提供少数几个操作系统发行版，但这些选项通常足以满足您的需求。一些大型云提供商甚至可能提供基于流行发行版的、他们自己的品牌
    Linux 版本。在使用品牌化、供应商提供的操作系统发行版运行的计算实例上部署您的云解决方案，通常可以让您受益于对操作系统问题和故障的专业支持。为了在您的架构和基础设施脚本中应用重用原则，您可能会使用在操作系统之上附带一些额外预装软件的镜像。例如，您可以使用一个已经包含预装
    HTTP 服务器、CI/CD 工具链、您选择的应用程序运行时，甚至是一个可直接启动的应用程序节点的镜像来启动您的实例。您从哪里获得这类镜像呢？一种选择是直接从您的云提供商或构建和维护此类镜像的合作伙伴公司获取。通常，来自这两个来源的一些镜像会提供在由您的提供商维护的名为云*市场*的位置。另一种选择是完全自行构建*自定义镜像*。这种方法让您能够控制镜像的构建方式。您可以通过手动操作（一次性活动）或自动化整个过程来创建自定义镜像。对于后者，您需要编写一个脚本：使用特定的操作系统镜像启动一个临时的计算实例，安装您选择的软件，基于该计算实例创建一个新的自定义镜像，最后终止这个临时实例。这项任务可以使用一个名为
    **HashiCorp Packer** 的开源工具及其 **Oracle Builder (oracle-oci)** 组件来执行。这项初期努力将会得到回报，特别是如果您遵循这样的策略：始终使用最新的软件版本重新配置计算实例，而不是在最初使用旧版本软件构建的实例上增量应用补丁。


    在计算能力的背景下，水平扩展通常意味着随着计算能力需求的增长或缩小而改变计算实例的数量。更准确地说，整个扩展过程更侧重于托管在这些实例上的应用程序节点。由于应用程序节点之间的相似性，计算实例通常基于相同的带有预装软件和相同启动脚本集的自定义镜像。镜像和启动脚本的组合，再加上关于实例形状（硬件配置文件）或
    SSH 密钥的少量其他配置选择，可以具体化为另一种称为*实例配置*的云资源。然后，这种资源可用于启动和管理称为*实例池*的可扩展实例组。


    如您所见，计算能力旨在提供资源，让您能够以类似于使用物理计算机的方式运行您的软件。与数据处理密切相关的一个方面是存储这些数据。我们现在将讨论存储。'
  raw: '### Compute


    Executing programs and processing information are often seen as computational
    activities and considered two of the most important tasks for the solutions running
    on contemporary cloud computing platforms. One way to perform these activities
    is to run software on virtual hosts, also known as *compute instances*. You can
    think of these instances as if they were computer machines running in data centers
    that are managed by a particular cloud provider. You provision the instances either
    individually or grouped together using instance pools. You are able to establish
    a Secure Shell (SSH) or a Remote Desktop (RDP) connection to manage them or the
    software that they host remotely.


    The vast majority of compute instances in the cloud are *virtual machines* (VMs)
    . Multiple VMs that belong to different cloud tenancies (accounts) may be running
    on the same physical server. This is called *multitenancy* . Multiple tenants
    eventually share the same physical equipment, even not being aware of that, to
    leverage sharing economy principles. Using virtual machines makes it much easier
    for cloud providers to offer more granular compute resources managed in shared
    pools to their customers. More demanding customers who need to perform high-performance
    computing (HPC) or use systems that work better with no virtualization usually
    prefer to deploy their solutions on dedicated hosts with no multitenancy and no
    hypervisor involved. They then opt for *bare-metal* (BM) compute instances that
    do not use any hypervisor and are dedicated to a single cloud account at the time.
    What needs to be said at this stage is that not every cloud provider supports
    bare-metal machines. Oracle Cloud Infrastructure does. Figure [1-8](#478313_1_En_1_Chapter.xhtml#Fig8)
    illustrates the differences between virtual machines and bare-metal machines.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig8_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Bare-metal machine vs. virtual machines


    Before provisioning an instance, no matter if it is going to be a virtual or a
    bare-metal machine, there are two fundamental choices you need to make. The initial
    configuration of a compute instance is typically done through the selection of
    the following:


    *   Hardware profile


    *   Preinstalled software


    A *hardware configuration profile* defines elements that are available for the
    newly provisioned compute instance such as the number of CPU cores, the memory
    size, or the disk space on the primary block storage device where the base software
    gets installed. The choice of a profile will decide whether the instance is going
    to run on a virtual machine or a dedicated bare-metal host. Every cloud provider
    usually offers a broad range of hardware profiles you can choose from for the
    instances you are planning to launch. Depending on the cloud provider, you can
    encounter different names for the hardware configuration profiles. Some of them
    are as follows:


    *   Shape


    *   Flavor


    *   Instance type


    *   Size


    Oracle Cloud Infrastructure compute uses *shape* as the name of a hardware profile
    for a compute instance.


    The *preinstalled software stack* is generally called an *image*. First, it must
    include an operating system. Cloud providers tend to offer just a few operating
    system distributions, but these options are usually enough to satisfy your needs.
    Some large-scale cloud providers may even offer their own, branded versions of
    Linux based on one of the popular distributions. Deploying your cloud solutions
    on compute instances that work on a branded, vendor-provided operating system
    distribution will often let you benefit from professional support for operating
    system questions and issues. To apply the reuse principle to your architecture
    and infrastructure scripts, you will probably work with the images that ship with
    some additional preinstalled software on top of an operating system. For example,
    you may launch your instance using an image that already contains a preinstalled
    HTTP server, CI/CD tooling, an application runtime of your choice, or even a ready-to-launch
    application node. Where can you get these kinds of images from? One option is
    to obtain them directly from your cloud provider or the partner companies that
    build and maintain such images. Typically, some of the images that originate from
    the two sources I’ve just mentioned are offered in a location called a cloud *marketplace*
    that is maintained by your provider. Another option is to build *custom images*
    completely on your own. This approach gives you control over how an image is built.
    You can create a custom image by doing it manually, as a one-time activity, or
    by automating the entire process. To do the latter, you would write a script that
    launches an interim compute instance using a particular operating system image,
    installs the software of your choice, creates a new custom image based on the
    compute instance, and finally terminates the interim instance. This task can be
    performed using an open source tool called HashiCorp Packer using its Oracle Builder
    (oracle-oci) component. This initial effort will pay off, especially if you follow
    the strategy that assumes to always reprovision compute instances using the newest
    software versions instead of incrementally applying patches on the instances that
    have been initially built using an older version of the software.


    In the context of compute capability, horizontal scaling typically means changing
    the number of compute instances as the demand for computing power grows or shrinks.
    To be more precise, the entire scaling process is more focused on the application
    nodes that are hosted on these instances. Because of the similarities between
    the application nodes, the compute instances will often be based on the same custom
    image with the preinstalled software and the same set of the startup scripts.
    The combination of an image and startup scripts followed with a few other provisioning
    choices over the instance shape (hardware profile) or the SSH keys can be materialized
    in the form of another cloud resource called an *instance configuration* . This
    type of a resource can be then used to launch and manage scalable groups of instances
    called *instance pools*.


    As you can see, the compute capability is meant to provide the resources that
    would let you run your software in a similar way to how you do it using physical
    computers. An aspect that is closely related to data processing is storing that
    data. We are now going to discuss it.'
