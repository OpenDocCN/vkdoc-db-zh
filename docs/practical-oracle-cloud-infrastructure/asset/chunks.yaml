    # 3. 自动化云基础设施


    云计算离不开*自动化*。快速自服务地供给池化云资源（计算实例、存储、虚拟网络等）这一核心理念，正是建立在一个前提之上：从头到尾的整个供给过程都是完全自动化的。正因整个过程不涉及任何手动步骤，我们才能以脚本和模板的形式来表示完整的云基础设施，这些脚本和模板用于远程管理云资源。图
    3-1 通过思维导图展示了通过自动化实现的一些相关操作特性。


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig1_HTML.jpg](img/478313_1_En_3_Fig1_HTML.jpg)


    图 3-1


    `脚本和模板`可被视为源代码，并存储在像`Git`这样的版本控制系统中。这不仅促进了团队协作，也使得增强功能的交付更快，从而能够更快地解决问题。新团队成员只需阅读那些始终更新的代码，就能理解基础设施架构，这与传统文档形成鲜明对比——传统文档很容易随着时间的推移而与实际情况产生偏差。你准备好脚本和模板后，它们在执行时，会通过下一节将介绍的接口与所谓的云管理平面进行交互。云管理平面的供给引擎已经由你的云提供商实现了自动化。它负责在云中创建、更新和删除资源。再次强调，整个过程绝对没有任何手动步骤。所有这些因素综合起来，实现了尽可能短的供给时间、可重复性和自服务。


    你不仅可以，实际上也应该超越仅仅自动化云基础设施管理。云基础设施是你基于云的解决方案的一部分，同时也是其先决条件。你确实是在云基础设施上运行业务或平台软件。因此，自动化整个解决方案的交付过程更有意义。想象一下，你的开发者提交了一段应用程序代码变更，有效地增加了一个新服务。该服务监听一个此前未被使用的端口。同一提交可以包含一个基础设施脚本或模板的变更，该变更会添加一个新的安全列表以允许该端口的入站流量。构建服务器会检测到新的代码修订版，它会创建新的安全规则，并在测试环境中重新供给一个或多个承载该服务的虚拟机或容器。最后，执行集成和回归测试以评估变更的质量。通过这种方式，一个简单的代码变更就能产生一个在云中运行的、经过测试的部署。这被称为*持续交付*。这个过程不必终止于测试环境。一些用例会受益于直接在生产环境中发布有限数量的最新版本的服务实例，这被称为*金丝雀发布*，以评估它们在真实世界条件下的行为。


    自动化是持续交付的关键推动力，它可以成为你组织中*DevOps 文化*的重要组成部分。这是什么意思，又有什么好处呢？仅看名称，Dev 部分源于*development*（开发）一词，Ops
    部分源于*operations*（运维）一词。在传统模式中，开发人员将可交付成果交给运维团队，运维团队成员准备配置并将制品部署到特定环境。这种级联方式常常导致误解和错误，使得交付过程比应有的时间更长。DevOps
    打破了这种方法，融合了这两个角色。与传统运维领域相关的流程现在已完全自动化，并且常常已经由应用开发人员的触发操作所启动。在流行的理解中，担任 DevOps
    角色的人负责构建和维护前述的自动化流程。彻底自动化带来的可重复性，降低了以往与手动操作相关的错误风险。此外，通过自动化重复性手动任务所节省的时间，可以用来增强对运行中系统的洞察，并对整个应用格局提供更好的治理。*DevOps
    文化*这一术语实际上更为宽泛，远远超出了本书的范围。


    ## 云管理平面


    为了履行其职责，云平台提供了一套安全的接口，你可以通过与这些接口交互来控制你的云资产。这些接口也被称为`API`，它们是你通往*云管理平面*的门户。该引擎基于数据中心的物理和虚拟设备来提供云资源。客户端向`API`端点发送请求，以远程执行云中的各种操作。


    你需要记住，云从定义上讲是多租户的。由于众多用户与同一组接口端点交互，该引擎不仅负责管理和监控云资产，还必须确保不同租户（云账户）使用的资源被妥善隔离。此外，`API`还负责保护云资产免遭未经授权的访问。这一理念在图
    3-2 中有概念性展示。


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig2_HTML.jpg](img/478313_1_En_3_Fig2_HTML.jpg)


    图 3-2


    云*管*理*平*面与多租户

    '
- fmt: '### Oracle Cloud Infrastructure API


    云提供商提供其云接口的最常见方式是以安全的 `REST APIs` 形式。云资源及其生命周期事件被表示为 REST 资源和对应的 HTTP 方法（`GET`、`PUT`、`POST`、`DELETE`）。一个成功认证和授权的客户端可以命令云管理平面代表其在一个或多个云资源上执行操作。这是通过通过
    HTTPS 发送一个格式正确的请求来完成的。云管理平面验证请求并将其转换为在虚拟和/或物理资源上执行的一系列操作，以完成所请求的操作。


    从客户端的角度看，这在实际中是如何工作的？让我们快速看一下列表 [3-1](#478313_1_En_3_Chapter.xhtml#PC1)，它展示了一个简化的
    API 请求，最终将列出特定实例池的详细信息。为了增加此示例的清晰度，我使用了实例池云资源的 OCID（`{ic-id}`）和 compartment 的
    OCID（`{c-id}`）的参数占位符。在真实请求中，您需要用正确的 Oracle Cloud 标识符替换它们。


    ```

    GET /20160918/instancePools/{ic-id}?compartmentId={c-id} HTTP/1.1

    Host: iaas.eu-frankfurt-1.oraclecloud.com

    Accept: application/json

    Authorization: ...

    Listing 3-1

    Simplified API Request

    ```


    列表 [3-1](#478313_1_En_3_Chapter.xhtml#PC1) 所示的请求要求获取指定 compartment 中一个给定实例池的实例池详细信息。REST
    资源的第一部分 `/20160918` 表示 Oracle Cloud Infrastructure API 的版本，而第二段，即 `instancePools`，清楚地表明了我们正在处理的云资源类型。


    获取实例池详细信息的操作以同步方式执行，这意味着结果一旦收集完毕，响应就会立即传递。列表 [3-2](#478313_1_En_3_Chapter.xhtml#PC2)
    显示了相应的响应。请注意，我缩短了 OCID 和请求 ID 头以使结构更易读。


    ```

    HTTP/1.1 200 OK

    Content-Type: application/json

    Content-Length: 931

    opc-request-id: /D8613...

    {

    "id" : "ocid1.instancepool....",

    "compartmentId" : "ocid1.compartment....",

    "definedTags" : { },

    "displayName" : "instance-pool",

    "freeformTags" : { },

    "instanceConfigurationId" : "ocid1.instanceconfiguration....",

    "lifecycleState" : "RUNNING",

    "placementConfigurations" : [ {

    "availabilityDomain" : "feDV:EU-FRANKFURT-1-AD-1",

    "primarySubnetId" : "ocid1.subnet...."

    }, {

    "availabilityDomain" : "feDV:EU-FRANKFURT-1-AD-2",

    "primarySubnetId" : "ocid1.subnet...."

    } ],

    "size" : 4,

    "timeCreated" : "2018-12-21T18:47:29.767Z"

    }

    Listing 3-2

    Simplified API Response

    ```


    根据请求操作的类型，云管理平面引擎可能执行同步或异步操作。同步操作导致阻塞调用，这意味着客户端等待在相应响应中返回的结果。对于异步操作，您将立即收到一个响应，其中包含一个工作请求
    ID，您可以用它来跟踪所请求操作的状态。在撰写本文时，有三项能力支持工作请求并以异步方式执行某些操作。


    *   Container Engine for Kubernetes

    *   Object storage

    *   Load balancing


    对这三项能力使用 API 需要在实现过程式配置脚本时做出仔细的设计决策。这在自定义 API 调用、SDK 和 CLI 时适用。幸运的是，如果您使用 Terraform
    的声明式方法将基础设施作为代码进行管理，则无需担心这个设计方面。


    API 旨在提供可在云资源上执行的最丰富的操作集。换句话说，如果您找不到特定操作的 API 资源，那么该操作要么当前不受支持，要么可以通过执行更细粒度的云资产操作的多个
    API 调用序列来实现。


    Tip


    您可以在 [`https://docs.cloud.oracle.com/iaas/api`](https://docs.cloud.oracle.com/iaas/api)
    找到可用的 Oracle Cloud Infrastructure REST API 的全面参考。


    ### Securing API Calls


    您可能想知道使用 REST API 进行云资源的远程管理有多安全。嗯，如果不安全，我想就不会有云计算了。我们需要简要讨论 API 调用安全性的三个方面。


    *   Transport layer security

    *   Authentication

    *   Authorization


    首先，通过公共互联网在 HTTPS 上传输的数据包是加密的。TLS 1.2 协议机制保护通信在传输过程中不被窃听或篡改。这个行业标准协议透明地提供 `transport
    layer security`，不需要云团队的介入。


    `Authentication`（验证请求发送者真实身份的方式）的实施需要不同的方法。每个请求必须使用发送者的私钥和 RSA-SHA256 算法进行签名。签名最终包含在请求的
    `authorization` 头中。列表 [3-3](#478313_1_En_3_Chapter.xhtml#PC3) 显示了该头的详细结构，包括用户和租户特定数据的占位符。


    ```

    Authorization: Signature version="1",keyId="{tenancy-ocid}/{user-ocid}/{public-key-fingerprint}",algorithm="rsa-sha256",headers="(request-target)
    date host",signature="{signature}"

    Listing 3-3

    Authorization Header with Request Signature

    ```


    要生成签名，您首先需要构建一个 `signing string`，它由请求的部分组成，包括但不限于资源目标（如 `/20160918/vcns`）以及请求负载的哈希（如果存在）。然后使用私钥加密签名字符串，并使用
    Base64 算法将其编码为文本。是的，这听起来有点复杂，但别担心。在日常工作中，您几乎不需要自己执行这些步骤，除非您真的想这样做。您几乎总是使用特定语言的软件开发工具包（SDK）或专门的配置工具（CLI、Terraform），它们会为您准备
    `authorization` 头并调用 OCI API。


    并非每个成功认证的用户都应被允许执行特定操作。例如，如果同一云账户下维护多个项目，您可能希望将项目 A 的资源与项目 B 的用户隔离开来。即使是单个项目，为特定用户组限制对特定资源集的访问权限仍然有意义。这将是
    `authorization` 函数的任务，它验证经过身份验证的用户真正有权执行什么操作。在下一章中，您将了解身份和访问管理用户、组和策略，这些共同让您为云账户配置授权机制。


    在此阶段，至关重要的是强调每个 API 调用始终是以一个命名的 Oracle Cloud Infrastructure IAM 用户的名义进行的。对于每个请求，在
    `authorization` 头中，客户端声明一个租户 OCID、一个用户 OCID 以及一个为此特定 IAM 用户上传到 Oracle Cloud Infrastructure
    的公钥指纹。此外，同样作为头一部分的签名是使用相应的私钥加密的。这一切都导向一个结论：在签名 API 请求之前，您需要拥有一对密钥，称为 `API signing
    keypair`。公钥必须上传到 Oracle Cloud Infrastructure 并与您选择的用户关联。这样，OCI 将知道如何解密您的请求。'
  raw: '### Oracle Cloud Infrastructure API


    The most common way for cloud providers to offer their cloud interfaces is in
    the form of secure *REST APIs*. Cloud resources and their lifecycle events are
    represented as REST resources and corresponding HTTP methods (GET, PUT, POST,
    DELETE). A successfully authenticated and authorized client can order the cloud
    management plane to perform an operation on one or more cloud resources on his
    behalf. This is done by sending a properly formed request over HTTPS. The cloud
    management plane validates and translates the request to a set of operations performed
    on virtual and/or physical resources to accomplish the requested action.


    How does it actually work in practice from a client’s point of view? Let’s take
    a quick look at Listing [3-1,](#478313_1_En_3_Chapter.xhtml#PC1) which presents
    a simplified API request that would eventually list the details of a particular
    instance pool. To increase the clarity of this example, I’ve used parameter placeholders
    for the OCID of the instance pool cloud resource (`{ic-id}`) and the OCID of the
    compartment (`{c-id}`). In a real request, you would replace them with the correct
    Oracle Cloud identifiers.


    ```

    GET /20160918/instancePools/{ic-id}?compartmentId={c-id} HTTP/1.1

    Host: iaas.eu-frankfurt-1.oraclecloud.com

    Accept: application/json

    Authorization: ...

    Listing 3-1

    Simplified API Request

    ```


    The request shown in Listing [3-1](#478313_1_En_3_Chapter.xhtml#PC1) asks for
    the instance pool details of a specified instance pool that exists within a given
    compartment. The first part of the REST resource, `/20160918`, denotes the version
    of the Oracle Cloud Infrastructure API, while the second segment, namely, `instancePools`,
    clearly indicates the type of cloud resource we are dealing with.


    The operation to fetch the instance pool details is performed in a synchronous
    way, which means that the response will be delivered as soon as the results have
    been collected. Listing [3-2](#478313_1_En_3_Chapter.xhtml#PC2) shows the corresponding
    response. Please note that I’ve shortened the OCIDs and the request ID header
    to make the structure more readable.


    ```

    HTTP/1.1 200 OK

    Content-Type: application/json

    Content-Length: 931

    opc-request-id: /D8613...

    {

    "id" : "ocid1.instancepool....",

    "compartmentId" : "ocid1.compartment....",

    "definedTags" : { },

    "displayName" : "instance-pool",

    "freeformTags" : { },

    "instanceConfigurationId" : "ocid1.instanceconfiguration....",

    "lifecycleState" : "RUNNING",

    "placementConfigurations" : [ {

    "availabilityDomain" : "feDV:EU-FRANKFURT-1-AD-1",

    "primarySubnetId" : "ocid1.subnet...."

    }, {

    "availabilityDomain" : "feDV:EU-FRANKFURT-1-AD-2",

    "primarySubnetId" : "ocid1.subnet...."

    } ],

    "size" : 4,

    "timeCreated" : "2018-12-21T18:47:29.767Z"

    }

    Listing 3-2

    Simplified API Response

    ```


    Depending on the type of the requested action, the cloud management plane engine
    may perform either a synchronous or an asynchronous operation. Synchronous operations
    result in blocking calls, which means that the client waits for the results that
    are returned in the corresponding response. In the case of an asynchronous operation,
    you would immediately receive a response that contains a work request ID you can
    use to track the state of the requested operation. At the time of writing, three
    capabilities support work requests and perform some operations in an asynchronous
    way.


    *   Container Engine for Kubernetes


    *   Object storage


    *   Load balancing


    Using APIs for these three capabilities entails the need for careful design decisions
    an API client has to make when implementing the procedural provisioning scripts.
    This applies when using custom API calls, SDKs, and the CLI. Luckily, you do not
    need to worry about this design aspect if you manage your infrastructure as code
    using the declarative approach with Terraform.


    The APIs are intended to deliver the richest set of operations that can be performed
    on the cloud resources. In other words, if you cannot find an API resource for
    a particular operation, the operation either is not supported at the moment or
    can be achieved through a sequence of multiple API calls that perform more granular
    actions on cloud assets.


    Tip


    You can find the comprehensive reference of the available Oracle Cloud Infrastructure
    REST APIs at [`https://docs.cloud.oracle.com/iaas/api`](https://docs.cloud.oracle.com/iaas/api).


    ### Securing API Calls


    You may wonder how secure the remote management of cloud resources is when using
    REST APIs. Well, if it wasn’t secure, there would be no cloud computing I guess.
    There are three aspects of API calls security we have to briefly discuss.


    *   Transport layer security


    *   Authentication


    *   Authorization


    First, the data packets that travel through the public Internet over HTTPS are
    encrypted. TLS 1.2 protocol mechanisms protect the communication from being eavesdropped
    on or altered while on the way. This industry-standard protocol provides *transport
    layer security* transparently, and no involvement from the cloud team is required.


    The enforcement of *authentication*, which is a way to validate who the request
    sender really is, requires a different approach. Each request has to be signed
    using the sender’s private key and the RSA-SHA256 algorithm. The signature is
    eventually included within the request’s a`uthorization` header. Listing [3-3](#478313_1_En_3_Chapter.xhtml#PC3)
    shows the detailed structure of the header, including placeholders for user- and
    tenancy-specific data.


    ```

    Authorization: Signature version="1",keyId="{tenancy-ocid}/{user-ocid}/{public-key-fingerprint}",algorithm="rsa-sha256",headers="(request-target)
    date host",signature="{signature}"

    Listing 3-3

    Authorization Header with Request Signature

    ```


    To generate a signature, you first need to build a *signing string* that is composed
    of the parts of the request including, but not limited to, a resource target,
    such as `/20160918/vcns`, and a hash of a request payload, when present. The signing
    string is then encrypted using the private key and gets encoded to text using
    the Base64 algorithm. Yes, it does sound a bit complex, but do not worry. You
    do not need to perform these steps in your daily job on your own, unless you really
    want. You nearly always use software development kit (SDK) for a particular language
    or specialized provisioning tools (CLI, Terraform) that prepare the `authorization`
    header and invoke the OCI API for you.


    Not every successfully authenticated user should be allowed to perform a particular
    operation. For example, if there are multiple projects maintained under the same
    cloud account, you will probably prefer to keep the resources that belong to project
    A isolated from project B users. Even for a single project, it may still make
    sense to limit some access rights to specific sets of resources for particular
    groups of users. This will be the task of the *authorization* function, which
    verifies what an authenticated user is really entitled to do. In the next chapter,
    you will learn about identity and access management users, groups, and policies
    that altogether let you configure the authorization mechanisms for your cloud
    account.


    At this stage, it is crucial to highlight that every API call is always made on
    behalf of a named Oracle Cloud Infrastructure IAM user. For each request, in the
    `authorization` header, a client declares a tenancy OCID, a user OCID, and a fingerprint
    of a public key that has been uploaded to Oracle Cloud Infrastructure for this
    particular IAM user. Moreover, the signature, which is also part of the header,
    is encrypted with the corresponding private key. This all leads to the conclusion
    that you need to possess a keypair, called an *API signing keypair*, before you
    sign the API requests. The public key will have to be uploaded to Oracle Cloud
    Infrastructure and associated with a user of your choice. In this way, OCI will
    know how to decrypt your request.'
  trans: '

    ### Oracle Cloud Infrastructure API


    云提供商提供其云接口的最常见方式是以安全的 `REST APIs` 形式。云资源及其生命周期事件被表示为 REST 资源和对应的 HTTP 方法（`GET`、`PUT`、`POST`、`DELETE`）。一个成功认证和授权的客户端可以命令云管理平面代表其在一个或多个云资源上执行操作。这是通过通过
    HTTPS 发送一个格式正确的请求来完成的。云管理平面验证请求并将其转换为在虚拟和/或物理资源上执行的一系列操作，以完成所请求的操作。


    从客户端的角度看，这在实际中是如何工作的？让我们快速看一下列表 3-1，它展示了一个简化的 API 请求，最终将列出特定实例池的详细信息。为了增加此示例的清晰度，我使用了实例池云资源的
    OCID（`{ic-id}`）和隔离区的 OCID（`{c-id}`）的参数占位符。在真实请求中，您需要用正确的 Oracle Cloud 标识符替换它们。


    ```

    GET /20160918/instancePools/{ic-id}?compartmentId={c-id} HTTP/1.1

    Host: iaas.eu-frankfurt-1.oraclecloud.com

    Accept: application/json

    Authorization: ...

    Listing 3-1

    简化的 API 请求

    ```


    列表 3-1 所示的请求要求获取指定隔离区中一个给定实例池的实例池详细信息。REST 资源的第一部分 `/20160918` 表示 Oracle Cloud
    Infrastructure API 的版本，而第二段，即 `instancePools`，清楚地表明了我们正在处理的云资源类型。


    获取实例池详细信息的操作以同步方式执行，这意味着结果一旦收集完毕，响应就会立即传递。列表 3-2 显示了相应的响应。请注意，我缩短了 OCID 和请求 ID
    头以使结构更易读。


    ```

    HTTP/1.1 200 OK

    Content-Type: application/json

    Content-Length: 931

    opc-request-id: /D8613...

    {

    "id" : "ocid1.instancepool....",

    "compartmentId" : "ocid1.compartment....",

    "definedTags" : { },

    "displayName" : "instance-pool",

    "freeformTags" : { },

    "instanceConfigurationId" : "ocid1.instanceconfiguration....",

    "lifecycleState" : "RUNNING",

    "placementConfigurations" : [ {

    "availabilityDomain" : "feDV:EU-FRANKFURT-1-AD-1",

    "primarySubnetId" : "ocid1.subnet...."

    }, {

    "availabilityDomain" : "feDV:EU-FRANKFURT-1-AD-2",

    "primarySubnetId" : "ocid1.subnet...."

    } ],

    "size" : 4,

    "timeCreated" : "2018-12-21T18:47:29.767Z"

    }

    Listing 3-2

    简化的 API 响应

    ```


    根据请求操作的类型，云管理平面引擎可能执行同步或异步操作。同步操作导致阻塞调用，这意味着客户端等待在相应响应中返回的结果。对于异步操作，您将立即收到一个响应，其中包含一个工作请求
    ID，您可以用它来跟踪所请求操作的状态。在撰写本文时，有三项能力支持工作请求并以异步方式执行某些操作。


    *   Kubernetes 容器引擎

    *   对象存储

    *   负载均衡


    对这三项能力使用 API 需要在实现过程式配置脚本时做出仔细的设计决策。这在自定义 API 调用、SDK 和 CLI 时适用。幸运的是，如果您使用 Terraform
    的声明式方法将基础设施作为代码进行管理，则无需担心这个设计方面。


    API 旨在提供可在云资源上执行的最丰富的操作集。换句话说，如果您找不到特定操作的 API 资源，那么该操作要么当前不受支持，要么可以通过执行更细粒度的云资产操作的多个
    API 调用序列来实现。


    提示


    您可以在 [`https://docs.cloud.oracle.com/iaas/api`](https://docs.cloud.oracle.com/iaas/api)
    找到可用的 Oracle Cloud Infrastructure REST API 的全面参考。


    ### 保障 API 调用安全


    您可能想知道使用 REST API 进行云资源的远程管理有多安全。嗯，如果不安全，我想就不会有云计算了。我们需要简要讨论 API 调用安全性的三个方面。


    *   传输层安全

    *   身份验证

    *   授权


    首先，通过公共互联网在 HTTPS 上传输的数据包是加密的。TLS 1.2 协议机制保护通信在传输过程中不被窃听或篡改。这个行业标准协议透明地提供 `传输层安全`，不需要云团队的介入。


    `身份验证`（验证请求发送者真实身份的方式）的实施需要不同的方法。每个请求必须使用发送者的私钥和 RSA-SHA256 算法进行签名。签名最终包含在请求的
    `授权` 头中。列表 3-3 显示了该头的详细结构，包括用户和租户特定数据的占位符。


    ```

    Authorization: Signature version="1",keyId="{tenancy-ocid}/{user-ocid}/{public-key-fingerprint}",algorithm="rsa-sha256",headers="(request-target)
    date host",signature="{signature}"

    Listing 3-3

    带有请求签名的授权头

    ```


    要生成签名，您首先需要构建一个 `签名字符串`，它由请求的部分组成，包括但不限于资源目标（如 `/20160918/vcns`）以及请求负载的哈希（如果存在）。然后使用私钥加密签名字符串，并使用
    Base64 算法将其编码为文本。是的，这听起来有点复杂，但别担心。在日常工作中，您几乎不需要自己执行这些步骤，除非您真的想这样做。您几乎总是使用特定语言的软件开发工具包（SDK）或专门的配置工具（CLI、Terraform），它们会为您准备
    `授权` 头并调用 OCI API。


    并非每个成功认证的用户都应被允许执行特定操作。例如，如果同一云账户下维护多个项目，您可能希望将项目 A 的资源与项目 B 的用户隔离开来。即使是单个项目，为特定用户组限制对特定资源集的访问权限仍然有意义。这将是
    `授权` 函数的任务，它验证经过身份验证的用户真正有权执行什么操作。在下一章中，您将了解身份和访问管理用户、组和策略，这些共同让您为云账户配置授权机制。


    在此阶段，至关重要的是强调每个 API 调用始终是以一个命名的 Oracle Cloud Infrastructure IAM 用户的名义进行的。对于每个请求，在
    `授权` 头中，客户端声明一个租户 OCID、一个用户 OCID 以及一个为此特定 IAM 用户上传到 Oracle Cloud Infrastructure
    的公钥指纹。此外，同样作为头一部分的签名是使用相应的私钥加密的。这一切都导向一个结论：在签名 API 请求之前，您需要拥有一对密钥，称为 `API 签名密钥对`。公钥必须上传到
    Oracle Cloud Infrastructure 并与您选择的用户关联。这样，OCI 将知道如何解密您的请求。

