    The `oci_autoscaling_auto_scaling_configuration` resource creates a new *autoscaling
    configuration* and, at the same time, connects it to the instance pool. Autoscaling
    adds some basic autonomous capabilities to an instance pool. You set the criteria
    that define how an instance pool should react to changing conditions such as increased
    (or decreased) processing load on instances that are instance pool members. You
    could, for example, say that one new instance should be added to the pool whenever
    the average instance pool CPU utilization performance metric exceeds 70 percent.
    In an analogous way, one instance could be automatically taken down if the average
    CPU utilization is lower than another threshold. The infrastructure code includes
    one *autoscaling policy* with two rules. Both treat average instance pool CPU
    utilization as its metric that drives autoscaling events. The first rule will
    cause the instance pool to scale out by adding one instance if the average CPU
    utilization is greater than 70 percent. The second rule will order the instance
    pool to scale in by terminating one instance if the average CPU utilization falls
    below 30 percent. The policy is additionally responsible for defining the minimum
    and maximum number of instances. In our case, they were fixed to 1 and 3\. The
    initial number of instances is set using the same module input variable (`pool_target_size`)
    we used for the size of the instance pool. You can view the autoscaling policy
    in the OCI Console. To do so, perform the following:


    1.  Go to Menu ➤ Compute ➤ Instance Pools.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click the name of the instance pool.


    4.  Click the link next to the Autoscaling Configuration label of the Instance
    Pool Information tab of the Instance Pool Details view.


    5.  Expand the policy.


    Figure [6-29](#478313_1_En_6_Chapter.xhtml#Fig29) presents the autoscaling policy
    in a more human-friendly format than the one used in the Terraform infrastructure
    code.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig29_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig29_HTML.jpg)


    Figure 6-29


    Viewing the autoscaling policy in the OCI Console


    To avoid all too often and intermittent changes in the instance pool, the *cooldown
    period* was set to 300 seconds. You can find this value in infrastructure code
    as the `cool_down_in_seconds` parameter in Listing [6-11](#478313_1_En_6_Chapter.xhtml#PC24).
    The cooldown period begins when the instance pool enters a steady state. It happens
    for the first time during the initial provisioning of the pool. From that point
    of time, on regular intervals defined by the cooldown, the autoscaling engine
    checks the last three metric probes. By default, the metric probes are collected
    from the compute instances once a minute. Based on the probes, the instance pool
    calculates an average metric for a given timestamp. If another average value,
    this time for the last three consecutive instance pool averages, exceeds a particular
    autoscaling policy threshold, the autoscaling event is triggered, and the instance
    pool size is adjusted. At this stage, we can observe it for our pool as well.


    Thanks to the `stress-ng` utility, we caused a 90 percent CPU load on the only
    instance pool member we had that time. Probably a few minutes have passed since
    that moment. Let’s see if anything changed while you were reading. If you are
    lucky, you might still observe how the instance pool is being scaled out. The
    OCI Console views would show something like what was collected in Figure [6-30](#478313_1_En_6_Chapter.xhtml#Fig30).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig30_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig30_HTML.jpg)


    Figure 6-30


    Viewing in the OCI Console how an instance pool is scaling out


    The second instance was created in a different availability domain than the first
    instance. This time, to see the monitoring metrics from multiple instances on
    one diagram, we are going to leverage the OCI Monitoring Service Metrics. To do
    so, perform the following in the OCI Console:


    1.  Go to Menu ➤ Monitoring ➤ Service Metrics.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click the plot area of the CPU Utilization widget.


    4.  Make sure the interval is set to 1 minute.


    5.  Adjust the x-axis, if needed.


    At some point in time, displayed in your chart, you should observe a rapid increase
    in the CPU utilization of our compute instance. You saw this earlier in the “Metrics”
    section of the individual instance. As the cooldown period of five minutes has
    elapsed, the autoscaling engine evaluated the average of the last three CPU utilization
    metric probes aggregated from the entire instance pool, which that time contained
    only one instance. Because it was spotted that the 70 percent threshold was exceeded,
    a new compute instance was added to the pool. This is shown in Figure [6-31](#478313_1_En_6_Chapter.xhtml#Fig31).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig31_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig31_HTML.jpg)


    Figure 6-31


    Cooldown periods, thresholds, and autoscaling


    Because the new instance uses the same instance configuration as the first instance,
    both will be based on the same shape, base image, and cloud-config. Having the
    same cloud-config file, the cloud-init on the newly added instance will launch
    the `stress-ng` utility and causes 20 percent of the CPU load. From now on, the
    average instance pool CPU utilization will be calculated considering the probes
    from two instances.


    At the time of writing, the autoscaling configuration policy rules in Oracle Cloud
    Infrastructure support only two types of metrics.


    *   CPU utilization


    *   Memory utilization'
  trans: "```\n...\nresource \"oci_autoscaling_auto_scaling_configuration\" \"workers_pool_autoscale\"\
    \ {\n  compartment_id = var.compartment_ocid\n  auto_scaling_resources {\n   \
    \ id   = oci_core_instance_pool.worker_pool.id\n    type = \"instancePool\"\n\
    \  }\n  cool_down_in_seconds = 300\n  policies {\n    capacity {\n      initial\
    \ = var.pool_target_size\n      max     = 3\n      min     = 1\n    }\n    policy_type\
    \ = \"threshold\"\n    rules {\n      action {\n        type  = \"CHANGE_COUNT_BY\"\
    \n        value = 1\n      }\n      metric {\n        metric_type = \"CPU_UTILIZATION\"\
    \n        threshold {\n          operator = \"GT\"\n          value    = \"70\"\
    \n        }\n      }\n      display_name = \"scale-out\"\n    }\n    rules {\n\
    \      action {\n        type  = \"CHANGE_COUNT_BY\"\n        value = -1\n   \
    \   }\n      metric {\n        metric_type = \"CPU_UTILIZATION\"\n        threshold\
    \ {\n          operator = \"LT\"\n          value    = \"30\"\n        }\n   \
    \   }\n      display_name = \"scale-in\"\n    }\n    display_name = \"workers-pool-autoscale-policy\"\
    \n  }\n  display_name = \"workers-pool-autoscale\"\n}\n```\n清单 6-11 compute.tf（Workers\
    \ 模块）：自动扩展配置\n\n`oci_autoscaling_auto_scaling_configuration` 资源创建一个新的 *自动扩展配置*，并同时将其连接到实例池。自动扩展为实例池添加了一些基本的自主能力。您设置标准来定义实例池应如何应对不断变化的条件，例如其实例池成员实例上处理负载的增加（或减少）。例如，您可以规定每当实例池平均\
    \ CPU 利用率性能指标超过 70% 时，就向池中添加一个新实例。以类似的方式，如果平均 CPU 利用率低于另一个阈值，可以自动终止一个实例。基础设施代码包含一个具有两条规则的\
    \ *自动扩展策略*。两者都将平均实例池 CPU 利用率作为驱动自动扩展事件的指标。第一条规则将导致实例池通过添加一个实例进行扩容，前提是平均 CPU 利用率大于\
    \ 70%。第二条规则将命令实例池进行缩容，终止一个实例，前提是平均 CPU 利用率降至 30% 以下。该策略还负责定义实例的最小和最大数量。在我们的案例中，它们被固定为\
    \ 1 和 3。初始实例数量使用与实例池大小相同的模块输入变量 (`pool_target_size`) 来设置。您可以在 OCI 控制台中查看自动扩展策略。为此，请执行以下操作：\n\
    \n1.  转到菜单 ➤ 计算 ➤ 实例池。\n2.  确保选择了 `Sandbox` 崩体。\n3.  单击实例池的名称。\n4.  在“实例池详细信息”视图的“实例池信息”选项卡上，单击“自动扩展配置”标签旁边的链接。\n\
    5.  展开该策略。\n\n图 6-29 以比 Terraform 基础设施代码中使用的格式更人性化的方式展示了自动扩展策略。\n\n![在 OCI 控制台中查看自动扩展策略](img/478313_1_En_6_Fig29_HTML.jpg)\n\
    \n图 6-29 在 OCI 控制台中查看自动扩展策略\n\n为避免实例池中过于频繁和间歇性的变化，*冷却期* 被设置为 300 秒。您可以在清单 6-11\
    \ 的基础设施代码中找到此值作为 `cool_down_in_seconds` 参数。冷却期从实例池进入稳定状态时开始。这发生在池的初始配置期间。从那时起，按照冷却期定义的固定间隔，自动扩展引擎会检查最后三个指标探测。默认情况下，指标探测每分钟从计算实例收集一次。基于这些探测，实例池计算给定时间戳的平均指标。如果另一个平均值（这次是最后三个连续的实例池平均值）超过特定的自动扩展策略阈值，则会触发自动扩展事件，并调整实例池大小。在这个阶段，我们也可以为我们的池观察到这一点。\n\
    \n多亏了 `stress-ng` 工具，我们对当时拥有的唯一实例池成员造成了 90% 的 CPU 负载。可能从那一刻起已经过去了几分钟。让我们看看在您阅读时是否有任何变化。如果您幸运的话，可能仍然能观察到实例池正在扩容。OCI\
    \ 控制台视图会显示类似图 6-30 所收集的内容。\n\n![在 OCI 控制台中查看实例池如何扩容](img/478313_1_En_6_Fig30_HTML.jpg)\n\
    \n图 6-30 在 OCI 控制台中查看实例池如何扩容\n\n第二个实例创建在与第一个实例不同的可用性域中。这一次，为了在一个图表中查看来自多个实例的监控指标，我们将利用\
    \ OCI 监控服务指标。为此，请在 OCI 控制台中执行以下操作：\n\n1.  转到菜单 ➤ 监控 ➤ 服务指标。\n2.  确保选择了 `Sandbox`\
    \ 崩体。\n3.  单击 CPU 利用率小部件的绘图区域。\n4.  确保时间间隔设置为 1 分钟。\n5.  如果需要，调整 X 轴。\n\n在图表中的某个时间点，您应该观察到计算实例的\
    \ CPU 利用率急剧增加。您之前在单个实例的“指标”部分看到过这个。由于五分钟的冷却期已经过去，自动扩展引擎评估了来自整个实例池的最后三个 CPU 利用率指标探测的平均值，当时该池仅包含一个实例。因为发现超过了\
    \ 70% 的阈值，所以一个新计算实例被添加到池中。如图 6-31 所示。\n\n![冷却期、阈值和自动扩展](img/478313_1_En_6_Fig31_HTML.jpg)\n\
    \n图 6-31 冷却期、阈值和自动扩展\n\n由于新实例使用与第一个实例相同的实例配置，因此两者都将基于相同的形状、基础镜像和 cloud-config。拥有相同的\
    \ cloud-config 文件，新添加实例上的 cloud-init 将启动 `stress-ng` 工具并造成 20% 的 CPU 负载。从现在起，实例池平均\
    \ CPU 利用率将考虑来自两个实例的探测进行计算。\n\n在撰写本文时，Oracle Cloud Infrastructure 中的自动扩展配置策略规则仅支持两种类型的指标。\n\
    \n*   CPU 利用率\n*   内存利用率"
- fmt: '## 实例池的生命周期


    一个有趣的问题涉及实例池的生命周期。随着时间的推移，尤其是对于长期运行的实例，您可能需要更新用于特定实例池的实例配置。OCI 控制台目前似乎不支持此操作，但
    API 支持。要升级实例池使用的实例配置，您只需创建新的实例配置（例如，通过 Terraform 基础设施代码），并正确地更新实例池。使用 Terraform
    时，您只需将新实例配置的 OCID 用作实例池资源的 `instance_configuration_id` 参数值并应用更改。以下代码片段显示了 Terraform
    输出的一部分，表明在此情况下，升级操作确实是非破坏性的。


    ```

    An execution plan has been generated and is shown in the following.

    Resource actions are indicated with the following symbols:

    ~ update in-place

    Terraform will perform the following actions :

    ~ module.workers.oci_core_instance_pool.worker_pool

    instance_configuration_id: "ocid1.instanceconfiguration.oc1.eu-frankfurt-1.aa.........meuzhq"
    => "ocid1.instanceconfiguration.oc1.eu-frankfurt-1.aa.........ijrpuq"

    Plan: 0 to add, 1 to change, 0 to destroy.

    Do you want to perform these actions?

    Terraform will perform the actions described earlier.

    Only "yes" will be accepted to approve.

    Enter a value: yes

    Apply complete! Resources: 0 added, 1 changed, 0 destroyed.

    ```


    成功更新后，添加到池中的新实例将基于新的实例配置创建，如图 6-32 所示。已存在的实例不会受到影响。您可以随时手动终止它们，让实例池引擎提供它们的替代品，此时将使用最新的实例配置。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig32_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig32_HTML.jpg)


    **图 6-32** 查看已更新实例配置的实例池


    关于实例池，另一个有用的特性是它们对**负载均衡器**的一流支持。如果特定的实例池关联了负载均衡器，则在池中启动的实例会被添加到负载均衡器的后端集合中。您在第
    2 章中曾将公共负载均衡器与独立实例一起使用。


    水平扩展的介绍到此结束。在下一节中，我们将讨论垂直扩展。在继续之前，请不要忘记终止本节中创建的云基础设施。为此，请确保您位于 `chapter06/2-instance-pool-autoscale`
    目录中并执行以下命令：


    ```

    $ terraform destroy -auto-approve

    ```


    ### 垂直扩展实例


    在上一节中，我们讨论并实际测试了 Oracle Cloud Infrastructure 计算实例上的水平扩展。为了简化练习，我们专注于简单的测试，没有在这些实例上部署真正的业务软件。然而，一旦考虑应用层，事情通常会变得更加复杂。并非每个应用程序（尤其是遗留应用程序）都支持水平扩展模式。为此，系统通常需要正确处理集群、多节点分发、复制和同步，这并不像您想象的那么简单。过去，许多系统被设计为单体架构。其中一些只提供主动-被动高可用性，在给定时刻只有一个节点可以处于活动状态，而另一个则作为备用节点等待。为了增加这类系统的处理和存储容量，更多硬件资源被添加到现有服务器中，而不是添加新节点。如果您向现有服务器添加更多内存、存储或
    CPU 核心，您实际上是在对其进行（垂直）扩展。通过这种方式，应用程序获得了更强大的主机，至少在理论上，应该能够以更快的速度处理更多的并行线程，如图 6-33
    所示。


    我们现在将启动一个具有一个 OCPU 的计算实例，这实际上为该实例提供了两个 vCPU。cloud-config 导致创建一个新的 systemd 服务，该服务模拟两个核心的
    CPU 利用率均为 60%。我们将应用与水平扩展测试中相同的 `stress-ng` 工具。最后，我们将通过升级其形状选择来垂直扩展机器。结果，实例将拥有两个
    OCPU，实际上对应四个 vCPU。对于实例上运行的多线程应用程序，增加更多 CPU 核心将使它们受益于增加的处理能力。在我们的例子中，核心数量加倍后，整体平均
    CPU 利用率应从 60% 降至 30%，如图 6-33 所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig33_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig33_HTML.jpg)


    **图 6-33** 垂直扩展实例


    模拟两个核心 CPU 利用率为 60% 的服务由 cloud-init 根据提供的 cloud-config 文件添加，如清单 6-12 所示。


    ```

    #cloud-config

    packages:

    - stress-ng

    write_files:

    -   content: |

    [Unit]

    Description = Simulate CPU Utilization

    [Service]

    ExecStart = /usr/bin/stress-ng -c 2 -l 60

    User = opc

    [Install]

    WantedBy = multi-user.target

    path: /etc/systemd/system/stress.service

    runcmd:

    -  ''echo $(date) | tee /home/opc/datemarker''

    -  [ "ln", "-s", "/etc/systemd/system/stress.service", "/etc/systemd/system/multi-user.target.wants/stress.service"
    ]

    -  [ "systemctl", "enable", "stress.service" ]

    -  [ "systemctl", "start", "stress.service" ]

    Listing 6-12

    vm.config.yaml (Root Module)

    ```


    本练习的代码位于 `chapter06/3-instance-scale-up` 目录中。再次提醒，在继续之前，请确保已根据需要设置 Terraform 所需的所有环境变量。此外，与之前一样，一个公共
    SSH 密钥必须命名为 `oci_id_rsa.pub` 并位于 `~/.ssh` 目录中。让我们开始并查看实例的运行情况。'
  raw: 'An interesting question refers to the lifecycle of an instance pool. Over
    time, especially for long-running instances, you may face the need to update the
    instance configuration that is used for a particular instance pool. The OCI Console
    seems not to support this operation at the moment, but the API does. To upgrade
    the instance configuration used by your instance pool, you just need to create
    the new instance configuration, for example, through your Terraform infrastructure
    code, and properly update the instance pool. With Terraform, you would simply
    use the OCID of the new instance configuration as the value for the `instance_configuration_id`
    parameter of the instance pool resource and apply the changes. This snippet shows
    this part of the Terraform output that shows the upgrade operation is, in this
    case, indeed nondestructive.


    ```

    An execution plan has been generated and is shown in the following.

    Resource actions are indicated with the following symbols:

    ~ update in-place

    Terraform will perform the following actions :

    ~ module.workers.oci_core_instance_pool.worker_pool

    instance_configuration_id: "ocid1.instanceconfiguration.oc1.eu-frankfurt-1.aa.........meuzhq"
    => "ocid1.instanceconfiguration.oc1.eu-frankfurt-1.aa.........ijrpuq"

    Plan: 0 to add, 1 to change, 0 to destroy.

    Do you want to perform these actions?

    Terraform will perform the actions described earlier.

    Only "yes" will be accepted to approve.

    Enter a value: yes

    Apply complete! Resources: 0 added, 1 changed, 0 destroyed.

    ```


    After the successful update, new instances added to the pool will be created based
    on the new instance configuration, as shown in Figure [6-32](#478313_1_En_6_Chapter.xhtml#Fig32).
    Already existing instances won’t be impacted. You can always terminate them manually
    to let the instance pool engine provision their replacements, this time using
    the newest instance configuration.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig32_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig32_HTML.jpg)


    Figure 6-32


    Viewing the instance pool with the updated instance configuration


    Another useful fact to mention about instance pools is their first-class capability
    to support *load balancers* . If there is a load balancer associated with a particular
    instance pool, an instance launched within the pool gets added to the backend
    set of the load balancer. You used a public load balancer with stand-alone instances
    in Chapter [2](#478313_1_En_2_Chapter.xhtml).


    We are done with horizontal scaling. In the next section, we will discuss vertical
    scaling. Before moving on, do not forget to terminate the cloud infrastructure
    created in this section. To do so, make sure you are in the `chapter06/2-instance-pool-autoscale`
    directory and execute the following:


    ```

    $ terraform destroy -auto-approve

    ```


    ### Scaling Instance Vertically Up


    In the previous section, we discussed and practically tested horizontal scaling
    on Oracle Cloud Infrastructure compute instances. To simplify the exercise, we
    focused on trivial tests with no real business software deployed on these instances.
    Things usually get more complicated as soon as you consider the application layer.
    Not every application, especially a legacy one, supports horizontal scaling pattern,
    though. To do so, systems will usually need to properly handle clustering, multinode
    distribution, replication, and synchronization, which is not as straightforward
    as you may think. In the past, a lot of systems were designed in a monolithic
    way. Some of them provided only active-passive high availability in which only
    one node could be active at a given moment, while the other waited as a standby.
    To increase the processing and storage capacity of that kind of systems, more
    hardware resources were added to existing servers, instead of adding new nodes.
    If you are adding more memory, storage, or CPU cores to an existing server, you
    are effectively *scaling* it (*vertically*) up. In this way, an application receives
    a more powerful host and, at least in theory, should be able to process more parallel
    threads even faster, as illustrated in Figure [6-33](#478313_1_En_6_Chapter.xhtml#Fig33).


    We are now going to launch a single compute instance with one OCPU, which actually
    provides the instance with two vCPUs. The cloud-config results in the creation
    of a new systemd service, which simulates two-core CPU utilization at 60 percent
    both. We will apply the same `stress-ng` utility we used for horizontal scaling
    tests. Finally, we are going to scale the machine up by upgrading its shape selection.
    As a result, the instance should see two OCPUs that effectively map to four vCPUs.
    Adding more CPU cores, for multithreaded applications running on the instance,
    would let them benefit from the increased processing capacity. In our case, after
    having doubled the number of cores, the overall average CPU utilization should
    fall from 60 percent to 30 percent, as illustrated in Figure [6-33](#478313_1_En_6_Chapter.xhtml#Fig33).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig33_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig33_HTML.jpg)


    Figure 6-33


    Scaling an instance vertically


    The service that simulates a two-core CPU utilization at 60 percent is added by
    cloud-init based on the supplied cloud-config file, as shown in Listing [6-12](#478313_1_En_6_Chapter.xhtml#PC27).


    ```

    #cloud-config

    packages:

    - stress-ng

    write_files:

    -   content: |

    [Unit]

    Description = Simulate CPU Utilization

    [Service]

    ExecStart = /usr/bin/stress-ng -c 2 -l 60

    User = opc

    [Install]

    WantedBy = multi-user.target

    path: /etc/systemd/system/stress.service

    runcmd:

    -  ''echo $(date) | tee /home/opc/datemarker''

    -  [ "ln", "-s", "/etc/systemd/system/stress.service", "/etc/systemd/system/multi-user.target.wants/stress.service"
    ]

    -  [ "systemctl", "enable", "stress.service" ]

    -  [ "systemctl", "start", "stress.service" ]

    Listing 6-12

    vm.config.yaml (Root Module)

    ```


    The code available for this exercise is located in the `chapter06/3-instance-scale-up`
    directory. Again, before proceeding, make sure that all environment variables
    required by Terraform are set as needed. Furthermore, a public SSH key, as before,
    must be named `oci_id_rsa.pub` and located in the `~/.ssh` directory. Let’s begin
    and see the instance in action.'
  trans: '

    ## 实例池的生命周期


    一个有趣的问题涉及实例池的生命周期。随着时间的推移，尤其是对于长期运行的实例，您可能需要更新用于特定实例池的实例配置。OCI 控制台目前似乎不支持此操作，但
    API 支持。要升级实例池使用的实例配置，您只需创建新的实例配置（例如，通过 Terraform 基础设施代码），并正确地更新实例池。使用 Terraform
    时，您只需将新实例配置的 OCID 用作实例池资源的 `instance_configuration_id` 参数值并应用更改。以下代码片段显示了 Terraform
    输出的一部分，表明在此情况下，升级操作确实是非破坏性的。


    ```

    An execution plan has been generated and is shown in the following.

    Resource actions are indicated with the following symbols:

    ~ update in-place

    Terraform will perform the following actions :

    ~ module.workers.oci_core_instance_pool.worker_pool

    instance_configuration_id: "ocid1.instanceconfiguration.oc1.eu-frankfurt-1.aa.........meuzhq"
    => "ocid1.instanceconfiguration.oc1.eu-frankfurt-1.aa.........ijrpuq"

    Plan: 0 to add, 1 to change, 0 to destroy.

    Do you want to perform these actions?

    Terraform will perform the actions described earlier.

    Only "yes" will be accepted to approve.

    Enter a value: yes

    Apply complete! Resources: 0 added, 1 changed, 0 destroyed.

    ```


    成功更新后，添加到池中的新实例将基于新的实例配置创建，如图 6-32 所示。已存在的实例不会受到影响。您可以随时手动终止它们，让实例池引擎提供它们的替代品，此时将使用最新的实例配置。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig32_HTML.jpg](img/478313_1_En_6_Fig32_HTML.jpg)


    **图 6-32** 查看已更新实例配置的实例池


    关于实例池，另一个有用的特性是它们对**负载均衡器**的一流支持。如果特定的实例池关联了负载均衡器，则在池中启动的实例会被添加到负载均衡器的后端集合中。您在第
    2 章中曾将公共负载均衡器与独立实例一起使用。


    水平扩展的介绍到此结束。在下一节中，我们将讨论垂直扩展。在继续之前，请不要忘记终止本节中创建的云基础设施。为此，请确保您位于 `chapter06/2-instance-pool-autoscale`
    目录中并执行以下命令：


    ```

    $ terraform destroy -auto-approve

    ```


    ### 垂直扩展实例


    在上一节中，我们讨论并实际测试了 Oracle Cloud Infrastructure 计算实例上的水平扩展。为了简化练习，我们专注于简单的测试，没有在这些实例上部署真正的业务软件。然而，一旦考虑应用层，事情通常会变得更加复杂。并非每个应用程序（尤其是遗留应用程序）都支持水平扩展模式。为此，系统通常需要正确处理集群、多节点分发、复制和同步，这并不像您想象的那么简单。过去，许多系统被设计为单体架构。其中一些只提供主动-被动高可用性，在给定时刻只有一个节点可以处于活动状态，而另一个则作为备用节点等待。为了增加这类系统的处理和存储容量，更多硬件资源被添加到现有服务器中，而不是添加新节点。如果您向现有服务器添加更多内存、存储或
    CPU 核心，您实际上是在对其进行（垂直）扩展。通过这种方式，应用程序获得了更强大的主机，至少在理论上，应该能够以更快的速度处理更多的并行线程，如图 6-33
    所示。


    我们现在将启动一个具有一个 OCPU 的计算实例，这实际上为该实例提供了两个 vCPU。cloud-config 导致创建一个新的 systemd 服务，该服务模拟两个核心的
    CPU 利用率均为 60%。我们将应用与水平扩展测试中相同的 `stress-ng` 工具。最后，我们将通过升级其形状选择来垂直扩展机器。结果，实例将拥有两个
    OCPU，实际上对应四个 vCPU。对于实例上运行的多线程应用程序，增加更多 CPU 核心将使它们受益于增加的处理能力。在我们的例子中，核心数量加倍后，整体平均
    CPU 利用率应从 60% 降至 30%，如图 6-33 所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig33_HTML.jpg](img/478313_1_En_6_Fig33_HTML.jpg)


    **图 6-33** 垂直扩展实例


    模拟两个核心 CPU 利用率为 60% 的服务由 cloud-init 根据提供的 cloud-config 文件添加，如清单 6-12 所示。


    ```

    #cloud-config

    packages:

    - stress-ng

    write_files:

    -   content: |

    [Unit]

    Description = Simulate CPU Utilization

    [Service]

    ExecStart = /usr/bin/stress-ng -c 2 -l 60

    User = opc

    [Install]

    WantedBy = multi-user.target

    path: /etc/systemd/system/stress.service

    runcmd:

    -  ''echo $(date) | tee /home/opc/datemarker''

    -  [ "ln", "-s", "/etc/systemd/system/stress.service", "/etc/systemd/system/multi-user.target.wants/stress.service"
    ]

    -  [ "systemctl", "enable", "stress.service" ]

    -  [ "systemctl", "start", "stress.service" ]

    Listing 6-12

    vm.config.yaml (Root Module)

    ```


    本练习的代码位于 `chapter06/3-instance-scale-up` 目录中。再次提醒，在继续之前，请确保已根据需要设置 Terraform 所需的所有环境变量。此外，与之前一样，一个公共
    SSH 密钥必须命名为 `oci_id_rsa.pub` 并位于 `~/.ssh` 目录中。让我们开始并查看实例的运行情况。

    '
- fmt: "```\n$ cd ~/git\n$ cd oci-book/chapter06/3-instance-scale-up/infrastructure\n\
    $ find . \\( -name \"*.tf\" -o -name \"*.yaml\" \\)\n./compute.tf\n./vcn.tf\n\
    ./data.tf\n./provider.tf\n./cloud-init/vm.config.yaml\n./vars.tf\n$ terraform\
    \ init\nInitializing provider plugins...\n- Checking for available provider plugins\
    \ on https://releases.hashicorp.com...\n- Downloading plugin for provider \"oci\"\
    \ (3.30.0)...\n* provider.oci: version = \"~> 3.30\"\nTerraform has been successfully\
    \ initialized!\n$ terraform apply -auto-approve\nApply complete! Resources: 6\
    \ added, 0 changed, 0 destroyed.\nOutputs:\nimage_name = CentOS-7-2019.04.15-0\n\
    vm_public_ip = 130.61.48.49\n$ INSTANCE_PUBLIC_IP=`terraform output vm_public_ip`\n\
    ```\n\nAt the time of writing, monitoring agents on compute instances send collected\
    \ metric probes, including measured CPU utilization we are interested in, once\
    \ per minute by default. To verify whether the average CPU utilization is really\
    \ as expected, around 60 percent, we have to wait a couple of minutes. During\
    \ that time, let’s briefly discuss boot volumes. Go to the OCI Console and perform\
    \ the following steps:\n\n1.  Go to Menu ➤ Compute ➤ Instances.\n2.  Make sure\
    \ that the `Sandbox` compartment is selected.\n\nYou should be able to see the\
    \ newly provisioned instance, as shown in Figure [6-34](#478313_1_En_6_Chapter.xhtml#Fig34).\
    \ As promised, the current shape is `VM.Standard2.1` and ships with one OCPU that\
    \ effectively means two vCPUs visible for the operating system.\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig34_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig34_HTML.jpg)\n\
    **Figure 6-34 Viewing an instance before scaling up**\n\n1.  Click the name of\
    \ the newly provisioned instance to see the instance details.\n2.  In the Resources\
    \ menu, select Boot Volume.\n\nIn front of your eyes appears the boot volume that\
    \ is attached to the instance. What is a boot volume? Quite simple. A *boot volume*\
    \ is a block volume where the operating system, the root file system, and sometimes\
    \ additional software reside. It gets created based on the image you’ve chosen,\
    \ whether it is just a base operating system image or a custom image with additional\
    \ software. In other words, you could consider saying that a boot volume is a\
    \ place where some part of the state of a particular instance is stored. Figure\
    \ [6-35](#478313_1_En_6_Chapter.xhtml#Fig35) shows the instance’s boot volume.\n\
    \n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig35_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig35_HTML.jpg)\n\
    **Figure 6-35 Viewing the instance’s boot volume**\n\nBoot volumes are created\
    \ in the same availability domains as their initial parent instances. You can\
    \ clearly see the image that served as a template for this boot volume. In my\
    \ case, it was `CentOS 7` (April 2019 build). Encryption at rest is enabled by\
    \ default. For VM-based shapes, you may consider using the in-transit encryption.\
    \ In many cases, it may not be required because the underlying iSCSI data exchange\
    \ between the instance and block storage takes place on an internal network anyway.\
    \ The size of a boot volume must be equal to or greater than the size of the image,\
    \ but not smaller than 50GB, with some exceptions for selected base images. Last\
    \ but not least, it is good to know that a volume can be resized, but this operation\
    \ must be performed on a detached volume.\n\nEven though boot volumes are created\
    \ together with compute instances during instance launch, boot volumes are still\
    \ regular cloud resources whose lifecycle can be separate from compute instances.\
    \ This lets you *detach* a boot volume and *attach* it to a new compute instance,\
    \ which may use a more powerful shape at the end of the day. In this way, you\
    \ are doing nothing else but scaling an instance vertically up.\n\nIt is time\
    \ to return to the instance metrics and confirm that the `stress-ng`-based service\
    \ indeed generates around 60 percent of CPU utilization.\n\n1.  In the Resources\
    \ menu, select Metrics.\n2.  Click the CPU Utilization widget, and adjust the\
    \ x-axis.\n\nIf you wait a few minutes, you will be able to see, as shown in Figure\
    \ [6-36](#478313_1_En_6_Chapter.xhtml#Fig36), that the instance is busy to the\
    \ degree we looked forward to, namely, 60 percent. As soon as we double the number\
    \ of cores, the CPU utilization should fall to something around 30 percent.\n\n\
    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig36_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig36_HTML.jpg)\n\
    **Figure 6-36 Viewing an instance’s (one OCPU) CPU utilization**\n\nIn January\
    \ 2020 Oracle Cloud Infrastructure will introduce a convenient API-driven and\
    \ fully-automated vertical scaling for compute instances. For majority of shapes,\
    \ you will be able to use the `UpdateInstance` API to update any existing instance\
    \ with a new, more or less powerful, shape. A running instance will be restarted\
    \ but you should expect the instance’s IP addresses, VNIC and volume attachments\
    \ to remain unchanged. The CLI command to apply a new shape to a running instance\
    \ will look something like this:\n```\noci compute instance update --instance-id\
    \ $INSTANCE_OCID --shape VM.Standard2.2 --wait-for-state RUNNING\n```\n\nIf you\
    \ are reading this book late enough, this feature is already available. Yet, for\
    \ the purpose of the incoming exercise, do not execute the `oci compute instance\
    \ update` command at this stage. If you’ve already done it, please scale the instance\
    \ back to the `VM.Standard2.1` shape, before you continue.\n\nAlternatively, there\
    \ has always been another way to scale an instance vertically. This method involves\
    \ detaching a boot volume, shutting down the old instance and launching a new\
    \ instance reusing the boot volume. I am going to explain it using Terraform.\
    \ Let’s assume you have an idea to replace the shape name in the `compute.tf`\
    \ infrastructure code file. Let me simulate such a change and explain the trap\
    \ you can fall into. Shall we? You are just watching. I am commenting out the\
    \ old line and adding a new one, this time with a more powerful shape (`VM.Standard2.2`)\
    \ like this:\n```\nresource \"oci_core_instance\" \"vm\" {\n...\n#  shape = \"\
    VM.Standard2.1\"\nshape = \"VM.Standard2.2\"\n...\n}\n```\n\nRunning `terraform\
    \ plan` provides the explanation of what would happen if I chose to apply this\
    \ infrastructure code amendment:\n```\n$ terraform plan\n...\nTerraform will perform\
    \ the following actions:\n-/+ oci_core_instance.vm (new resource required)\n...\n\
    boot_volume_id: \"ocid1.bootvolume.oc1..........w37sra\" => \n...\nimage: \"ocid1.image.oc1..........ai3kha\"\
    \ => \n...\nshape: \"VM.Standard2.1\" => \"VM.Standard2.2\" (forces new resource)\n\
    ...\nPlan: 1 to add, 0 to change, 1 to destroy.\n```\n\n**Note**\nIf you see *0\
    \ to add, 1 to change, 0 to destroy* it means that the convenient, fully-automated\
    \ and API-driven vertical scaling feature has not only been enabled in the OCI\
    \ API, but also in the Terraform Provider Plugin. In such a case, the problem\
    \ described below does not apply anymore. Yet, you can still perform the semi-manual\
    \ vertical scaling method as described below. As a matter of fact, it will still\
    \ teach you how to detach and reattach boot volumes.\n\nThe output of the `terraform\
    \ plan` command says *1 to add, 0 to change, 1 to destroy*. Well, at first glance,\
    \ you may think we expected this compute instance to be terminated anyway and\
    \ a new one, more powerful one launched. Correct. The problem here is that the\
    \ new instance would also get a totally new boot volume built once again from\
    \ the newest `CentOS 7` base operating system image. This behavior is defined\
    \ in the `source_details` object in this part of the infrastructure code:\n```\n\
    # data.tf\n...\ndata \"oci_core_images\" \"centos_image\" {\n  compartment_id\
    \ = var.tenancy_ocid\n  operating_system = \"CentOS\"\n  operating_system_version\
    \ = 7\n}\n...\n# compute.tf\nresource \"oci_core_instance\" \"vm\" {\n...\n  source_details\
    \ {\n    source_id = data.oci_core_images.centos_image.images[0].id\n    source_type\
    \ = \"image\"\n  }\n...\n}\n```"
