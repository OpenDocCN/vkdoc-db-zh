  trans: "\n## 容器化与挑战\n\n部署到应用服务器的服务与容器化应用的一个区别在于，后者所有的依赖项都以镜像的形式与应用捆绑在一起。多亏了众多镜像共享的文件系统层，这不会造成任何主要的存储容量问题。然而，没有应用服务器就意味着容器必须自行处理所有`非功能性任务`。为了应对这一挑战，你可能需要为每个实现服务或部分业务流程的容器创建一组专用的容器来处理这些非功能性任务。实际上，这是一种被称为`边车模式`的知名模式。这就产生了将主容器与其边车容器逻辑组合起来，并作为一个单一的逻辑部署单元来联合管理其生命周期的需求。\n\
    \n容器化通常会产生更加细粒度的应用，每个应用都专注于一项狭窄且专门的任务，无论是数据转换、实现属于标准化 API 的单个 REST 资源，还是与各种软件即服务业务解决方案进行交互。有些人倾向于将这些高度专业化的服务称为`微服务`。许多微服务必须相互交互才能完成一个或多个业务流程。因此，容器化应用需要某种服务发现机制和连接能力。\n\
    \n为了实现容错并支持高可用的应用部署，具有容器运行时的多台主机会被组合在一起形成集群。这些集群必须提供某种覆盖网络，以便所有容器化应用在需要时能够顺畅地相互交互。总而言之，我们在一定程度上回到了那些为部署到应用服务器的服务已经解决的问题。对于容器化应用，我们需要某种`与基础设施无关的平台`，它将支持集群、内置扩展、生命周期管理以及相关容器组的扁平覆盖网络，如图\
    \ 8-17 所示。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig17_HTML.jpg](img/478313_1_En_8_Fig17_HTML.jpg)\n\
    \n图 8-17 容器化应用平台\n\n此类`容器平台`的目标如下：\n\n*   编排容器化应用\n*   抽象底层基础设施\n*   为应用提供以下功能：\n\
    \    *   扁平的覆盖网络\n    *   可扩展的计算能力\n    *   持久化存储\n    *   面向应用的集成服务发现\n    *\
    \   健康检查功能\n    *   以及更多\n\n根据牛津词典，`编排`一词可以表示“协调各个元素（…）以产生预期效果。”该平台协调各个独立容器及相关容器的生命周期，包括但不限于创建、扩展、终止、智能升级和自我修复。\n\
    \n从应用的角度来看，涉及多少计算实例或何种负载均衡器并不重要。重要的是计算能力以及稳定、不间断的传入请求流。这使得基础设施成为被抽象化的理想候选者。\n\n\
    目前已经存在相当多可用于运行容器化应用的集群感知平台，包括：\n\n*   `Docker Swarm`\n*   `HashiCorp Nomad`\n\
    *   `Mesosphere DC/OS`\n*   `Kubernetes`\n\n云原生计算基金会（`CNCF`）托管着一个专注于容器化应用的开源软件生态系统。其成员包括主要的云提供商、成熟的软件供应商和快速发展的初创公司。在撰写本文时，`Kubernetes`是容器编排领域唯一一个毕业项目，在`GitHub`上有超过\
    \ 2,100 名直接贡献者，并已被许多云提供商采纳为其托管容器平台的引擎。\n\n## Kubernetes\n\n`Kubernetes`是一个真正庞大的主题，足以单独写一本书。该平台及多样化的相关工具生态系统提供了前文提到的广泛面向容器的功能。`Kubernetes`自带一个可扩展和可插拔的控制平面。`Kubernetes`作为一个围绕容器编排构建的、功能丰富的容器平台，为容器化应用提供了一个与基础设施无关、可扩展的部署画布，并配备了可插拔的扁平空间网络。\n\
    \n### Pods\n\n容器化应用被组织成`Pod`。`Pod`是一种逻辑结构，它将紧密相关的容器分组在一起，通常是一个主容器和几个边车容器。尽管 Pod\
    \ 中的容器在某种程度上仍然是隔离的，但它们确实共享一些元素，如主机名、网络接口和 IPC 命名空间。每个单独容器构建自的文件系统层仍然是分开的，除非它们共享相同或相似的镜像。容器可以使用`localhost`与同一\
    \ Pod 中的其他容器通信，因为它们共享环回接口。\n\n如何将容器分组到 Pod 中？首先，考虑扩展性。Pod 可以被复制以提高处理吞吐量，或者简单地提供高可用性以应对故障。如果你觉得将两个特定的容器分开扩展更合适，就把它们放入两个独立的\
    \ Pod 中。其次，考虑边车模式。对于一个特定的主容器，你通常会将专用的支持容器放入同一个 Pod 中，以便它们能与主容器自由通信，例如通过环回接口。\n\
    \n### ReplicaSet\n\nPod 是核心的`Kubernetes`对象类型的一个示例。`Kubernetes`对象还有其他几种类型。我之前提到过\
    \ Pod 可以被复制。复制操作由一个`ReplicaSet`对象处理。`Kubernetes`的一个基本概念是控制器控制循环的存在。一个`ReplicaSet`定义了带有特定标签的\
    \ Pod 的期望数量。相应的控制循环确保 Pod 的数量根据期望状态保持正确。如果在某个时刻运行的 Pod 副本太少，控制循环将确保实例数量增加到特定`ReplicaSet`定义中所期望的值。\n\
    \n### Service\n\n对于一组提供了特定 API 实现的 Pod 副本，你可能会问如何暴露这个 API。另一种`Kubernetes`对象，即`Service`对象，用于为实现特定服务的\
    \ Pod 副本组提供一个静态的入口点。`Kubernetes`根据选择器知道将传入的请求分发到哪里。当你定义一个`Service`对象时，你提供一个标签选择器。所有带有给定标签的\
    \ Pod 都将被视为该服务的寻址对象。\n\n`Service`对象的默认类型称为`ClusterIP`。它为服务提供一个只能在集群内部访问的内部 IP\
    \ 地址。这对于那些服务仅被集群内其他容器调用的容器来说非常合适。为了让服务能从集群外部访问，你可以选择`LoadBalancer`类型（前提是你的底层云基础设施支持这种类型）。Oracle\
    \ Cloud Infrastructure 确实提供附加到公共 IP 并可以从互联网访问的公共负载均衡器。我稍后将实际演示这一点。\n\n"
- fmt: 'If you think about upgrade strategies, you could probably name a few. First,
    if you accept a short period of downtime, the easiest approach is to simply kill
    all pods whose containers use a deprecated image and let the `ReplicaSet` re-create
    them automatically in the background, this time using the newest image. Alternatively,
    you could apply the blue-green deployment strategy in which you create the new
    pods, which are based on the new image version, in parallel to the actively running
    pods, which are based on the previous image version, and switch the service to
    point to these new pods in a single moment. Finally, you could perform a rolling
    upgrade by replacing pods, one by one, with newer image versions. The rolling
    upgrade strategy would require you to employ two `ReplicaSet` resources and perform
    changes step-by-step in a procedural manner. `ReplicaSet` is rather a low-level
    object. To enhance the upgrading experience, a higher-level object called `Deployment`
    has been made available. A `Deployment` object controls pods through a `ReplicaSet`
    in a way that makes it much easier to handle the upgrade process based on purely
    declarative changes. We are not going to explore upgrade strategies in this book,
    but we are going to use the `Deployment` object, and this is the reason why I
    am briefly describing it.


    To wrap up this fast-paced introduction to the main types of Kubernetes objects,
    let’s take a look at Figure 8-18. There are two deployments defined. The one shown
    on the left side defines a single-container pod, tagged with `Tag A`, and sets
    the expected count to two replicas. The second one, shown in the right side, defines
    a two-container pod, tagged with `Tag B`, and sets the expected count to three
    replicas. Furthermore, there are two `LoadBalancer`-type services created. One
    is forwarding traffic to the pods with the tag `Tag A` attached, while the second
    one is forwarding traffic to the pods with the tag `Tag B`.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig18_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig18_HTML.jpg)


    Figure 8-18 Kubernetes objects


    There are a couple of other types of Kubernetes objects such as `StatefulSets`,
    `DaemonSets`, `Jobs`, `Ingresses`, `PersistentVolumes`, `StorageClasses`, and
    others. If I tried to cover all of them here, the book would grow to an enormous
    size. This is why we are focusing only on the objects that are used to demonstrate
    Oracle Kubernetes Engine in the incoming sections of this chapter. Do not worry
    if this all seems too theoretical. You will see these objects in action in a few
    moments from now. Just read on.


    Building a production-ready cluster with various additional features can be a
    challenge on its own. Even if you are not tasked with designing and launching
    a Kubernetes cluster, it is still good to understand its high-level architecture.


    The Kubernetes control plane is built from various software components replicated
    and distributed across an uneven number of master nodes. These components are
    the API server, scheduler, and controller manager. The Kubernetes object definitions
    are stored in a distributed, persistent key-value store called `etcd`. The `etcd`
    cluster has a lifecycle separate from Kubernetes that increases the planning effort
    when launching production-ready clusters. Only the API server accesses `etcd`
    directly. Pods are scheduled to the other types of nodes called worker nodes.
    On each node, there is a `kubelet` daemon usually running as a `systemd` host
    service manager. You could think of the `kubelet` as the node agent. It takes
    care of pod-specific containers on a given node by talking to the local container
    runtime. From a networking point of view, the Kubernetes Service proxy is responsible
    for controlling the traffic routing between services and pods, while another pluggable
    component called the Container Network Interface plugin implements the overlay
    networking between pods. Figure 8-19 provides a high-level overview of selected
    components that belong to the Kubernetes control plane.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig19_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig19_HTML.jpg)


    Figure 8-19 Kubernetes, underlying infrastructure


    This book is not devoted to Kubernetes administration, and you need to be aware
    that there are plenty of various caveats to be considered when planning a custom
    installation of a Kubernetes cluster. Luckily, we won’t need to bother about these
    aspects because of the presence of a managed Kubernetes engine.'
  raw: 'If you think about upgrade strategies, you could probably name a few. First,
    if you accept a short period of downtime, the easiest approach is to simply kill
    all pods whose containers use a deprecated image and let the ReplicaSet re-create
    them automatically in the background, this time using the newest image. Alternatively,
    you could apply the blue-green deployment strategy in which you create the new
    pods, which are based on the new image version, in parallel to the actively running
    pods, which are based on the previous image version, and switch the service to
    point to these new pods in a single moment. Finally, you could perform a rolling
    upgrade by replacing pods, one by one, with newer image versions. The rolling
    upgrade strategy would require you to employ two ReplicaSet resources and perform
    changes step-by-step in a procedural manner. ReplicaSet is rather a low-level
    object. To enhance the upgrading experience, a higher-level object called *Deployment*
    has been made available. A Deployment object controls pods through a ReplicaSet
    in a way that makes it much easier to handle the upgrade process based on purely
    declarative changes. We are not going to explore upgrade strategies in this book,
