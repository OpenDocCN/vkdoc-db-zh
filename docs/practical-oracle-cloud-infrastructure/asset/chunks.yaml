    directory.


    ```

    $ cd git/oci-book/chapter03/3-terraform/1-provider-only

    ```


    This project directory contains two files, as shown in Listing [3-12](#478313_1_En_3_Chapter.xhtml#PC46).


    ```

    1-provider-only/

    ├── provider.tf

    └── vars.tf

    Listing 3-12

    Terraform Project Structure (1-provider-only)

    ```


    The content of the `provider.tf` file is shown in Listing [3-13](#478313_1_En_3_Chapter.xhtml#PC47).


    ```

    # provider.tf

    provider "oci" {

    tenancy_ocid = var.tenancy_ocid

    user_ocid = var.user_ocid

    region = var.region

    fingerprint = var.fingerprint

    private_key_path = var.private_key_path

    private_key_password = var.private_key_password

    }

    Listing 3-13

    Terraform Provider Configuration Referencing Variables

    ```


    Because Terraform eventually sends API requests to the OCI REST API, it needs
    the same set of connection parameters required by the SDK and the CLI to sign
    the request. The “Preparing for SDK, CLI, and Terraform” section describes where
    you can find them. In theory, you could store the values relevant to your cloud
    environment directly in the `provider.tf` file. This is discouraged, however,
    because these consist of, to some extent, sensitive data, and you do not want
    to store the data in a version-control system.


    To avoid storing the values required by the `provider` block inside any of the
    infrastructure code files, we will inject them using variables. We still need
    to declare these variables. You could consider adding variable declarations to
    the same `provider.tf` file. It would be absolutely fine. Yet, to keep the project
    assets well structured, there exists another file for that purpose: the `vars.tf`
    file. It is shown in Listing [3-14](#478313_1_En_3_Chapter.xhtml#PC48).


    ```

    # vars.tf

    variable "tenancy_ocid" {}

    variable "user_ocid" {}

    variable "region" {}

    variable "fingerprint" {}

    variable "private_key_path" {}

    variable "private_key_password" {}

    Listing 3-14

    Terraform Variables Configuration

    ```


    There are four basic ways to supply the values for variables.


    *   Providing each variable with a value at the prompt when executing Terraform
    commands


    *   Providing each variable individually with the `-var` argument when executing
    a Terraform command


    *   Using a variable definition file `.tfvars` whose file path is passed as the
    `-var-file` argument when executing a Terraform command


    *   Using environment variables prefixed with `TF_VAR_`


    You could supply the values for variables every time you issue the `terraform`
    command, but I am sure it would become annoying even to the most patient person
    in the planet. More often, you will end up defining them in a variable definition
    file or using environment variables.


    Any environment variable prefixed with `TF_VAR_` will be taken into account by
    Terraform. For example, `the TF_VAR_region` will be treated as the source for
    the variable `region`. This is why you will find it useful to keep your input
    variables in some sort of shell script. You would then execute this script and,
    as a result, set these variables every time you are about to work on a Terraform-based
    project. Let’s prepare a file like that. First, copy the following template:


    ```

    $ cp ~/git/oci-book/chapter03/3-terraform/tfvars.env.template.sh ~/tfvars.env.sh

    ```'
  trans: '

    ### 安装


    在撰写本文时，你只需下载与你的操作系统相匹配的 Terraform 版本的单个可执行二进制文件。要安装 Terraform，请遵循以下步骤：


    1.  访问 [`www.terraform.io/downloads.html`](http://www.terraform.io/downloads.html)。


    2.  下载适用于你操作系统的二进制文件。


    3.  将下载的 `terraform` 文件移动到存放软件二进制文件的目录，并记住将此目录添加到你的 `PATH` 变量中，除非你已完成此操作。


    4.  通过执行版本检查命令来测试安装。


    所有这些步骤都可以自动化。只需在执行前注意识别到最新二进制文件的正确路径即可。在撰写本文时，最新的二进制文件是 0.12.9 版本。


    ```

    $ wget https://releases.hashicorp.com/terraform/0.12.2/terraform_0.12.9_linux_amd64.zip

    $ sudo unzip terraform_0.12.9_linux_amd64.zip -d /usr/local/bin

    $ terraform -v

    Terraform v0.12.9

    ```


    提示


    如果你使用的是 Windows Subsystem for Linux，则必须下载适用于 Linux 的 Terraform 二进制文件。使用前面的代码片段，并在
    WSL 控制台内执行它。


    正如你可能预期的那样，这种简便性是需要付出*手动升级*的代价的。每次你看到类似以下消息时，就需要下载一个新的二进制文件并替换你正在使用的文件：


    ```

    $ terraform -v

    Terraform v0.12.8

    Your version of Terraform is out of date! The latest version

    is 0.12.9\. You can update by downloading from www.terraform.io/downloads.html

    ```


    这基本上就是你需要了解的关于安装的全部内容。所有后续方面都需要在你要使用的特定提供商插件的背景下考虑。让我在下一节解释我的意思。


    ### 配置


    事实上，表达式 *Terraform 配置*指的是包含基础结构代码的整个文件集。每个项目都至少在一个基础结构代码文件中包含一个 `provider` 块。基于此块，Terraform
    知道要使用哪个提供商插件二进制文件。如果 Terraform 在跨项目的默认目录中找不到相应的提供商插件二进制文件，它将下载该二进制文件并将其放置在项目的
    `.terraform/plugins` 子目录中。


    要探索最简单的基于 Terraform 的基础结构项目，请转到 `chapter03/3-terraform/1-provider-only` 目录。


    ```

    $ cd git/oci-book/chapter03/3-terraform/1-provider-only

    ```


    此项目目录包含两个文件，如列表 3-12 所示。


    ```

    1-provider-only/

    ├── provider.tf

    └── vars.tf

    列表 3-12

    Terraform 项目结构 (1-provider-only)

    ```


    `provider.tf` 文件的内容如列表 3-13 所示。


    ```

    # provider.tf

    provider "oci" {

    tenancy_ocid = var.tenancy_ocid

    user_ocid = var.user_ocid

    region = var.region

    fingerprint = var.fingerprint

    private_key_path = var.private_key_path

    private_key_password = var.private_key_password

    }

    列表 3-13

    引用变量的 Terraform 提供商配置

    ```


    因为 Terraform 最终向 OCI REST API 发送 API 请求，它需要与 SDK 和 CLI 相同的连接参数集来签名请求。“为 SDK、CLI
    和 Terraform 做准备”一节描述了在哪里可以找到它们。理论上，你可以直接将与你云环境相关的值存储在 `provider.tf` 文件中。然而，这是不鼓励的，因为这些数据在一定程度上包含敏感信息，而你并不希望将这些数据存储在版本控制系统中。


    为了避免将 `provider` 块所需的值存储在任何基础结构代码文件中，我们将使用变量来注入它们。我们仍然需要声明这些变量。你可以考虑将变量声明添加到同一个
    `provider.tf` 文件中。这绝对是可行的。但是，为了保持项目资产的结构良好，存在另一个用于此目的的文件：`vars.tf` 文件。如列表 3-14
    所示。


    ```

    # vars.tf

    variable "tenancy_ocid" {}

    variable "user_ocid" {}

    variable "region" {}

    variable "fingerprint" {}

    variable "private_key_path" {}

    variable "private_key_password" {}

    列表 3-14

    Terraform 变量配置

    ```


    为变量提供值有四种基本方式。


    *   在执行 Terraform 命令时，在提示符处为每个变量提供一个值

    *   在执行 Terraform 命令时，使用 `-var` 参数为每个变量单独提供值

    *   使用变量定义文件 `.tfvars`，其文件路径在执行 Terraform 命令时作为 `-var-file` 参数传递

    *   使用带有 `TF_VAR_` 前缀的环境变量


    你可以每次在发出 `terraform` 命令时都提供变量值，但我相信即使对这个星球上最有耐心的人来说，这也会变得很烦人。更常见的情况是，你最终会在变量定义文件中定义它们或使用环境变量。


    任何以 `TF_VAR_` 为前缀的环境变量都会被 Terraform 考虑在内。例如，`TF_VAR_region` 将被视为变量 `region` 的来源。这就是为什么你会发现将输入变量保存在某种
    shell 脚本中很有用。然后你可以执行该脚本，结果是在每次即将处理基于 Terraform 的项目时设置这些变量。让我们准备一个这样的文件。首先，复制以下模板：


    ```

    $ cp ~/git/oci-book/chapter03/3-terraform/tfvars.env.template.sh ~/tfvars.env.sh

    ```'
