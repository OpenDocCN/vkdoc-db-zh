  trans: '

    要允许其他 IAM 用户与 OCIR 交互，您必须创建适当的 IAM 策略，明确授予所选 IAM 组的特定访问权限。在本书中，我们一直在处理两个组：`sandbox-admins`和`sandbox-users`。假设我们希望授予`sandbox-admins`组成员列出租户中所有
    Docker 仓库的权限。此外，两个组都应能够在名称以`sandbox`前缀开头的仓库（如`sandbox/uuid`或`sandbox-cicd/uuid`）中推送、拉取和删除镜像。在本地主机上使用
    OCI CLI，打开`chapter08/2-docker/policies`目录。


    ```

    $ cd ~/git

    $ cd oci-book/chapter08/2-docker

    $ cd policies

    $ ls -1

    tenancy.ocir.policies.json

    ```


    JSON 文件包含三条策略声明，如清单 8-3 所示。`manage repos`授予对名称匹配`where target.repo.name`筛选条件的所有仓库的完整
    Registry 相关 OCI API 访问权限。第三条规则授予`sandbox-admins`组成员对所有仓库的`inspect repos`访问权限。`inspect`级别的访问仅涉及两个
    API：`ListDockerRepositories`和`ListDockerRepositoryManifests`。


    ```

    [

    "allow group sandbox-users to manage repos in tenancy where target.repo.name =
    /sandbox*/",

    "allow group sandbox-admins to manage repos in tenancy where target.repo.name
    = /sandbox*/",

    "allow group sandbox-admins to inspect repos in tenancy where request.operation=''ListDockerRepositories''"

    ]

    清单 8-3

    tenancy.ocir.policies.json

    ```


    由于 OCIR 作用域是租户级别，我们必须通过在`iam policy create` CLI 命令中使用`-c`参数指向根 compartment 来创建策略。您可能还记得，我们在
    CLI 配置中维护三个配置文件。默认配置文件代表租户管理员调用 API，当未设置`--profile`参数时将使用该配置文件。回到本地机器，让我们以租户管理员身份执行
    OCI CLI。


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo $TENANCY_OCID

    tenancy=ocid1.tenancy.oc1..aa..........3yymfa

    $ oci iam policy create -c $TENANCY_OCID --name tenancy-ocir-policy --description
    "OCIR 策略" --statements "file://tenancy.ocir.policies.json"

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "tenancy-ocir-policy",

    "statements": [

    "allow group sandbox-users to manage repos in tenancy where target.repo.name =
    /sandbox*/",

    "allow group sandbox-admins to manage repos in tenancy where target.repo.name
    = /sandbox*/",

    "allow group sandbox-admins to inspect repos in tenancy where request.operation=''ListDockerRepositories''"

    ],

    ...

    },

    "etag": "d705d10ec093dbaf7c116054709951d38d3f7651"

    }

    ```


    您可以在 OCI 控制台中验证新创建的 IAM 策略是否存在。请记住将作用域切换到根 compartment，如图 8-11 所示。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig11_HTML.jpg](img/478313_1_En_8_Fig11_HTML.jpg)

    *图 8-11: OCIR 策略*


    既然 OCIR 已与 IAM 完全集成，显然只有经过身份验证和授权的 IAM 用户才被允许在私有仓库中拉取或推送镜像。您在上一章已经使用过身份验证令牌。作为快速回顾，让我提及几个事实。用户基于身份验证令牌进行身份验证。令牌是
    Oracle 生成的相对较短的字符串。任何 IAM 用户最多可以同时拥有两个身份验证令牌。令牌可以由用户自己创建，也可以由管理员通过 OCI 控制台或利用基于
    API 的自动化（如 OCI CLI）任意创建。


    以下是您作为`sandbox-user`在 OCI 控制台中生成身份验证令牌的方法：


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig12_HTML.jpg](img/478313_1_En_8_Fig12_HTML.jpg)

    *图 8-12: 在 OCI 控制台中访问用户配置文件*


    1.  以`sandbox-user`身份登录 OCI 控制台。

    2.  通过单击用户名转到用户配置文件，如图 8-12 所示。

    3.  在"资源"选项卡上，单击"身份验证令牌"。

    4.  单击"生成令牌"。

    5.  为令牌提供描述，然后单击"生成令牌"。

    6.  记下您的令牌。您只会看到它一次。


    至关重要的是要记住，您只能看到一次新生成的身份验证令牌，如图 8-13 所示。如果丢失，您将必须删除旧令牌并生成新令牌。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig13_HTML.jpg](img/478313_1_En_8_Fig13_HTML.jpg)

    *图 8-13: 查看生成的令牌*


    要以编程方式为选定用户生成身份验证令牌，您可以使用默认 CLI 配置文件（只需省略`--profile`参数）代表租户管理员执行以下 CLI 命令。首先，查询特定用户的
    OCID，然后为该用户使用`iam auth-token create` CLI 命令。


    ```

    $ IAM_USER_OCID=`oci iam user list -c $TENANCY_OCID --query "data[?name==''sandbox-user'']
    | [0].id" --raw-output --all`

    $ echo IAM_USER_OCID

    ocid1.user.oc1..aa..........dzqpxa

    $ oci iam auth-token create --user-id $IAM_USER_OCID --description token-ocir
    --query ''data.token'' --raw-output

    B8.E_Ry7oOtN1KF0do9x

    ```


    无论您选择哪种方式，请确保您已为`sandbox-user` IAM 用户准备好身份验证令牌。


    我们即将推送刚才构建的`uuid:1.0`镜像。要将本地容器镜像推送到 OCIR，您必须执行以下操作：


    1.  选择 OCIR 区域。

    2.  根据 OCIR 命名规范正确标记本地镜像。

    3.  以命名的 IAM 用户身份登录到特定区域的 OCIR。

    4.  推送已标记的镜像。


    您可以在图 8-9 中找到图像标记的 OCIR 命名规范的图形说明。我将把镜像推送到法兰克福的 OCIR，但您当然可以选择迄今为止一直在使用的区域。在这种情况下，您将在表
    8-1 中找到所需的 OCIR 区域代码。


    在撰写本文时，可以使用`oci os ns get` CLI 命令通过 OCI API 以编程方式读取租户命名空间。让我们确定我们的租户命名空间。稍后我们将使用它。


    ```

    $ oci os ns get --query data --raw-output

    jakobczyk

    ```


    如您所见，我的租户命名空间与我的租户名称具有相同的值。这是因为我使用的是相对较旧的云帐户。对于较新的云帐户，可能包括您的，租户命名空间和租户名称几乎总是不同的。


    **注意：** 使用 OCIR 时，请注意不要混淆*租户名称*和*租户命名空间*。确保使用租户命名空间来标记镜像并登录 OCIR。


    现在连接到开发实例。


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    [opc@dev-vm] $

    ```


    以下是我如何使用`docker tag`命令将本地的`uuid:1.0`镜像标记为`fra.ocir.io/jakobczyk/sandbox/uuid:1.0`：


    ```

    [opc@dev-vm] $ OCI_PROJECT_CODE=sandbox

    [opc@dev-vm] $ OCI_TENANCY_NAMESPACE=jakobczyk

    [opc@dev-vm] $ OCIR_REGION=fra

    [opc@dev-vm] $ OCI_USER=sandbox-user

    [opc@dev-vm] $ IMAGE_NAME=uuid

    [opc@dev-vm] $ IMAGE_TAG=1.0

    [opc@dev-vm] $ docker tag $IMAGE_NAME:$IMAGE_TAG $OCIR_REGION.ocir.io/$OCI_TENANCY_NAMESPACE
    /$OCI_PROJECT_CODE/$IMAGE_NAME:$IMAGE_TAG

    [opc@dev-vm] $ docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}"

    REPOSITORY                           TAG       IMAGE ID

    uuid                                 1.0       b16f04d1bb7f

    fra.ocir.io/jakobczyk/sandbox/uuid   1.0       b16f04d1bb7f

    python                               3-alpine  fe3ef29c73f3

    ```

    '
