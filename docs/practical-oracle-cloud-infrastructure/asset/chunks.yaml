    Finally, the OKE cluster and its corresponding node pool for compute instances
    that serve as Kubernetes worker nodes are declared in `the cluster.tf` infrastructure
    file. The code is shown in Listing [8-9](#478313_1_En_8_Chapter.xhtml#PC36).


    ```

    resource "oci_containerengine_cluster" "k8s_cluster" {

    compartment_id = var.compartment_ocid

    kubernetes_version = var.oke_cluster["version"]

    name = "k8s-cluster"

    vcn_id = var.vcn_ocid

    options {

    kubernetes_network_config {

    pods_cidr = var.oke_cluster["pods_cidr"]

    services_cidr = var.oke_cluster["services_cidr"]

    }

    service_lb_subnet_ids = [

    oci_core_subnet.oke_lb_ad1_net.id,

    oci_core_subnet.oke_lb_ad2_net.id

    ]

    }

    }

    resource "oci_containerengine_node_pool" "k8s_nodepool" {

    compartment_id = var.compartment_ocid

    cluster_id = oci_containerengine_cluster.k8s_cluster.id

    kubernetes_version = var.oke_cluster["version"]

    name = "k8s-nodepool"

    node_image_name = var.oke_cluster["worker_image"]

    node_shape = var.oke_cluster["worker_shape"]

    subnet_ids = [

    oci_core_subnet.oke_workers_ad1_net.id,

    oci_core_subnet.oke_workers_ad2_net.id

    ]

    quantity_per_subnet = var.oke_cluster["worker_nodes_in_subnet"]

    ssh_public_key = file("~/.ssh/oci_id_rsa.pub")

    }

    Listing 8-9

    cluster.tf (kube Module)

    ```


    Figure [8-25](#478313_1_En_8_Chapter.xhtml#Fig25) illustrates the provisioned
    OCI infrastructure components that serve for the `k8s-cluster` OKE cluster instance.
    Kubernetes control plane elements such as master nodes and etcd hosts are fully
    managed, inaccessible, and therefore invisible from the API or OCI Console. What
    you can inspect, monitor, and to some extent govern are compute instances that
    serve as worker nodes, load balancers, and other virtual networking components.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig25_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig25_HTML.jpg)


    Figure 8-25


    Provisioned OKE cluster


    With a managed Kubernetes cluster in place, it is time to connect to the Kubernetes
    API.'
  trans: "\n## 工作节点子网与网络配置\n\n以下代码块展示了为 OKE 工作节点子网配置的路由表、安全列表和子网资源。这些资源定义在 `vcn-workers.tf`\
    \ 文件中。\n\n```\nresource \"oci_core_route_table\" \"oke_workers_rt\" {\n  compartment_id\
    \ = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  display_name   =\
    \ \"oke-workers-rt\"\n  route_rules {\n    destination        = \"0.0.0.0/0\"\n\
    \    network_entity_id  = var.vcn_nat_ocid\n  }\n}\n\nresource \"oci_core_security_list\"\
    \ \"oke_workers_sl\" {\n  compartment_id = var.compartment_ocid\n  vcn_id    \
    \     = var.vcn_ocid\n  display_name   = \"oke-workers-sl\"\n  # Allow all traffic\
    \ within the VCN\n  egress_security_rules {\n    stateless    = true\n    destination\
    \  = var.oke_cluster[\"cidr\"]\n    protocol     = \"all\"\n  }\n  ingress_security_rules\
    \ {\n    stateless    = true\n    source       = var.oke_cluster[\"cidr\"]\n \
    \   protocol     = \"all\"\n  }\n  # Allow all outbound traffic\n  egress_security_rules\
    \ {\n    destination = \"0.0.0.0/0\"\n    protocol    = \"all\"\n  }\n}\n\nresource\
    \ \"oci_core_subnet\" \"oke_workers_ad1_net\" {\n  compartment_id      = var.compartment_ocid\n\
    \  vcn_id              = var.vcn_ocid\n  display_name        = \"oke-workers-ad1-net\"\
    \n  availability_domain = var.ads[0]\n  cidr_block          = var.oke_wn_subnet_cidr[0]\n\
    \  route_table_id      = oci_core_route_table.oke_workers_rt.id\n  security_list_ids\
    \   = [ oci_core_security_list.oke_workers_sl.id ]\n  prohibit_public_ip_on_vnic\
    \ = true\n  dns_label           = \"work1\"\n}\n\nresource \"oci_core_subnet\"\
    \ \"oke_workers_ad2_net\" {\n  compartment_id      = var.compartment_ocid\n  vcn_id\
    \              = var.vcn_ocid\n  display_name        = \"oke-workers-ad2-net\"\
    \n  availability_domain = var.ads[1]\n  cidr_block          = var.oke_wn_subnet_cidr[1]\n\
    \  route_table_id      = oci_core_route_table.oke_workers_rt.id\n  security_list_ids\
    \   = [ oci_core_security_list.oke_workers_sl.id ]\n  prohibit_public_ip_on_vnic\
    \ = true\n  dns_label           = \"work2\"\n}\n```\n*代码清单 8-7: `vcn-workers.tf`\
    \ (kube 模块)*\n\n## 负载均衡器子网与网络配置\n\n类似地，为负载均衡器子网配置的 VCN 资源声明在一个名为 `vcn-lb.tf` 的类似文件中（如代码清单\
    \ 8-8 所示）。这里同样定义了两个子网，每个位于不同的可用性域。这两个子网是公有的，以便 OKE 能够为任何 LoadBalancer 类型的 Kubernetes\
    \ 服务创建 OCI 公有负载均衡器。\n\n```\nresource \"oci_core_route_table\" \"oke_lb_rt\" {\n\
    \  compartment_id = var.compartment_ocid\n  vcn_id         = var.vcn_ocid\n  display_name\
    \   = \"oke-lb-rt\"\n  route_rules {\n    destination        = \"0.0.0.0/0\"\n\
    \    network_entity_id  = var.vcn_igw_ocid\n  }\n}\n\nresource \"oci_core_security_list\"\
    \ \"oke_lb_sl\" {\n  compartment_id = var.compartment_ocid\n  vcn_id         =\
    \ var.vcn_ocid\n  display_name   = \"oke-lb-sl\"\n  # Allow all traffic within\
    \ the VCN\n  egress_security_rules {\n    stateless    = true\n    destination\
    \  = var.oke_cluster[\"cidr\"]\n    protocol     = \"all\"\n  }\n  ingress_security_rules\
    \ {\n    stateless    = true\n    source       = var.oke_cluster[\"cidr\"]\n \
    \   protocol     = \"all\"\n  }\n  # Allow all inbound traffic on ports 30000-32767\n\
    \  egress_security_rules {\n    stateless    = true\n    destination  = \"0.0.0.0/0\"\
    \n    protocol     = \"all\"\n  }\n  ingress_security_rules {\n    stateless \
    \   = true\n    source       = \"0.0.0.0/0\"\n    protocol     = \"6\"\n    tcp_options\
    \ {\n      min = 30000\n      max = 32767\n    }\n  }\n}\n\nresource \"oci_core_subnet\"\
    \ \"oke_lb_ad1_net\" {\n  compartment_id      = var.compartment_ocid\n  vcn_id\
    \              = var.vcn_ocid\n  display_name        = \"oke-lb-ad1-net\"\n  availability_domain\
    \ = var.ads[0]\n  cidr_block          = var.oke_lb_subnet_cidr[0]\n  route_table_id\
    \      = oci_core_route_table.oke_lb_rt.id\n  security_list_ids   = [ oci_core_security_list.oke_lb_sl.id\
    \ ]\n  dns_label           = \"lb1\"\n}\n\nresource \"oci_core_subnet\" \"oke_lb_ad2_net\"\
    \ {\n  compartment_id      = var.compartment_ocid\n  vcn_id              = var.vcn_ocid\n\
    \  display_name        = \"oke-lb-ad2-net\"\n  availability_domain = var.ads[1]\n\
    \  cidr_block          = var.oke_lb_subnet_cidr[1]\n  route_table_id      = oci_core_route_table.oke_lb_rt.id\n\
    \  security_list_ids   = [ oci_core_security_list.oke_lb_sl.id ]\n  dns_label\
    \           = \"lb2\"\n}\n```\n*代码清单 8-8: `vcn-lb.tf` (kube 模块)*\n\n## OKE 集群与节点池\n\
    \n最后，OKE 集群及其对应的节点池（用作 Kubernetes 工作节点的计算实例）在 `cluster.tf` 基础设施文件中声明。代码如代码清单 8-9\
    \ 所示。\n\n```\nresource \"oci_containerengine_cluster\" \"k8s_cluster\" {\n  compartment_id\
    \      = var.compartment_ocid\n  kubernetes_version  = var.oke_cluster[\"version\"\
    ]\n  name                = \"k8s-cluster\"\n  vcn_id              = var.vcn_ocid\n\
    \  options {\n    kubernetes_network_config {\n      pods_cidr      = var.oke_cluster[\"\
    pods_cidr\"]\n      services_cidr  = var.oke_cluster[\"services_cidr\"]\n    }\n\
    \    service_lb_subnet_ids = [\n      oci_core_subnet.oke_lb_ad1_net.id,\n   \
    \   oci_core_subnet.oke_lb_ad2_net.id\n    ]\n  }\n}\n\nresource \"oci_containerengine_node_pool\"\
    \ \"k8s_nodepool\" {\n  compartment_id      = var.compartment_ocid\n  cluster_id\
    \          = oci_containerengine_cluster.k8s_cluster.id\n  kubernetes_version\
    \  = var.oke_cluster[\"version\"]\n  name                = \"k8s-nodepool\"\n\
    \  node_image_name     = var.oke_cluster[\"worker_image\"]\n  node_shape     \
    \     = var.oke_cluster[\"worker_shape\"]\n  subnet_ids = [\n    oci_core_subnet.oke_workers_ad1_net.id,\n\
    \    oci_core_subnet.oke_workers_ad2_net.id\n  ]\n  quantity_per_subnet = var.oke_cluster[\"\
    worker_nodes_in_subnet\"]\n  ssh_public_key      = file(\"~/.ssh/oci_id_rsa.pub\"\
    )\n}\n```\n*代码清单 8-9: `cluster.tf` (kube 模块)*\n\n图 8-25 展示了为 `k8s-cluster` OKE\
    \ 集群实例配置的 OCI 基础设施组件。Kubernetes 控制平面元素（如主节点和 etcd 主机）是完全托管且不可访问的，因此从 API 或 OCI\
    \ 控制台中不可见。你可以检查、监控并在一定程度上管理的是作为工作节点的计算实例、负载均衡器以及其他虚拟网络组件。\n\n![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig25_HTML.jpg](img/478313_1_En_8_Fig25_HTML.jpg)\n\
    \n*图 8-25: 已配置的 OKE 集群*\n\n有了托管的 Kubernetes 集群，现在是时候连接到 Kubernetes API 了。\n"
- fmt: '### Connecting As Superuser


    Kubernetes assumes that users are fully managed externally to Kubernetes. If you
    are working with an unmanaged Kubernetes cluster that is installed, for example,
    in your data center or on some IaaS, you would usually set up certificate-based
    authentication for clients or employ OpenID Connect that leverages ID tokens signed
    by an identity trusted by the Kubernetes API. The latter would allow more production-oriented
    user management strategies in the context of Kubernetes API authentication and,
    later, authorization.


    It is all much easier with a managed service such as Oracle Kubernetes Engine.
    For OKE clusters, all IAM users are recognized and successfully authenticated,
    out of the box, provided that they are members of groups with the proper IAM policies.
    What comes next, though, is the authorization. IAM users who are members of a
    group that has been assigned `manage clusters` in a given compartment where the
    cluster exists are automatically considered cluster administrators by the Kubernetes
    OCI Authorizer and have the full access to the entire Kubernetes API for that
    particular cluster. The rest of the IAM users must be explicitly bound to either
    predefined or custom RBAC roles. You will learn about this later. The `sandbox-admin`
    user belongs to the `sandbox-admins` group, which has been granted full manage-level
    access over all the resources in the `Sandbox` compartment. In this way, the Kubernetes
    API should recognize this user as a cluster admin. First, you will need a so-called
    `kubeconfig` file, which is nothing more than a YAML file with all the information
    needed to connect to the Kubernetes API as a named user. To generate a kubeconfig
    file tailored to a particular IAM user, you can use the OCI Console or OCI CLI
    like this (please note that we use `--profile SANDBOX-ADMIN` to execute the CLI
    commands as the `sandbox-admin` user):


    ```

    $ CLUSTER_OCID=`oci ce cluster list --name k8s-cluster --query "data[?name==''k8s-cluster'']
    | [0].id" --lifecycle-state ACTIVE --raw-output --profile SANDBOX-ADMIN`

    $ echo $CLUSTER_OCID

    ocid1.cluster.oc1.eu-frankfurt-1.aa.........tdg42w

    $ REGION=eu-frankfurt-1

    $ mkdir ~/.kube

    $ oci ce cluster create-kubeconfig --cluster-id $CLUSTER_OCID --file ~/.kube/sandbox-admin.config
    --region $REGION --profile SANDBOX-ADMIN

    New config written to the file /Users/mjk/.kube/sandbox-admin.config

    $ chmod 600 ~/.kube/sandbox-admin.config

    $ ls -l ~/.kube | awk ''{print $1, $9}''

    -rw------- sandbox-admin.config

    ```


    Based on the convention, the kubeconfig file is placed in the newly created directory
    `~/.kube`. The `~/.kube/config` path is considered by the `kubectl` tool we are
    about to use as the default path for the kubeconfig file. We have deliberately
    used a custom name to be able to use this configuration only intentionally. Listing
    [8-10](#478313_1_En_8_Chapter.xhtml#PC38) presents the kubeconfig file generated
    for the `sandbox-admin` user.


    ```

    apiVersion: v1

    clusters:

    - cluster:

    certificate-authority-data:

    ::: Base64-encoded cluster certificate :::

    server: https://c4wmntdg42w.eu-frankfurt-1.clusters.oci.oraclecloud.com:6443

    name: cluster-c4wmntdg42w

    contexts:

    - context:

    cluster: cluster-c4wmntdg42w

    user: user-c4wmntdg42w

    name: context-c4wmntdg42w

    current-context: context-c4wmntdg42w

    kind: ""

    users:

    - name: user-c4wmntdg42w

    user:

    exec:

    apiVersion: client.authentication.k8s.io/v1beta1

    args:

    - ce

    - cluster

    - generate-token

    - --cluster-id

    - ::: Cluster OCID :::

    - --region

    - eu-frankfurt-1

    command: oci

    env: []

    Listing 8-10

    .kube/sandbox-admin.config

    ```


    The `clusters:cluster:certificate-authority-data` field is a Base64-encoded certificate
    of the cluster, while the `users:user:exec` field is an instruction to use a custom
    command to dynamically fetch the credentials and to authenticate as a particular
    IAM user. If you want to authenticate, it is not enough just to hold this file.
    The command used to fetch the credentials relies on the OCI CLI and a user-specific
    CLI configuration file. You will see it in action in a few moments.


    Do not forget that we are using a particular CLI profile for `sandbox-admin`.
    We have to take it into consideration and amend the `kube/sandbox-admin.config`
    file accordingly. Edit the `.kube/sandbox-admin.config` file and add two new lines
    (in bold), as shown here:


    ```

    ...

    users:

    - name: user-c2gmyzqguzt

    user:

    exec:

    apiVersion: client.authentication.k8s.io/v1beta1

    args:

    - ce

    - cluster

    - generate-token

    - --profile

    - SANDBOX-ADMIN

    - --cluster-id

    ...

    ```


    You will use a tool called `kubectl` to connect to the Kubernetes API. The tool
    will read the kubeconfig file to do the following:


    1.  Find out what the Kubernetes API public endpoint is


    2.  Securely connect to the Kubernetes API


    3.  Use the OCI CLI to fetch the token and authenticate us as a named IAM user


    The `kubectl` tool has been already preinstalled on the developer instance by
    the cloud-init based on the supplied cloud-config file, so you should be able
    to use the tool out of the box. We still need to install the OCI CLI on the developer
    instance. Now, connect to the developer instance and execute the following command:


    ```

    [opc@dev-vm ~]$ bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)"

    ...

    -- Installation successful.

    -- Run the CLI with /home/opc/bin/oci --help

    [opc@dev-vm ~]$ oci --version

    2.6.14

    [opc@dev-vm ~]$ mkdir ~/.oci

    [opc@dev-vm ~]$ mkdir ~/.apikeys

    [opc@dev-vm ~]$ exit

    ```


    Now, we need to prepare and upload the CLI configuration for `sandbox-admin`.


    ```

    $ cat ~/.oci/config | grep -A 4 "\[SANDBOX-ADMIN\]" > ~/.oci/devvm.config

    $ cat ~/.oci/config | grep tenancy >> ~/.oci/devvm.config

    $ cat ~/.oci/config | grep region >> ~/.oci/devvm.config

    $ scp -i ~/.ssh/oci_id_rsa ~/.oci/devvm.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.oci/config

    devvm.config    100%  329  5.5KB/s

    ```


    The CLI configuration references the API signing key. Let’s upload it as well.


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-admin.pem opc@$DEV_VM_PUBLIC_IP:/home/opc/.apikeys/api.sandbox-admin.pem

    api.sandbox-admin.pem   100% 1766    10.0KB/s

    ```


    The only thing missing is the kubeconfig file on the developer instance. We are
    therefore going to securely copy the kubeconfig file to the developer instance
    like this:


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.kube/sandbox-admin.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.kube/config

    sandbox-admin.config           100% 3669   117.0KB/s   00:00

    ```


    Tip


    To find out how the developer instance has been initialized, you can read the
    cloud-config file available at `chapter08/1-devmachine/devmachine/cloud-init/devvm.config.yaml`.


    Now, please connect to the developer instance.


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    ```


    Shortly before we start interacting with the Kubernetes API, we will adjust the
    file permissions for the newly uploaded configuration files.


    ```

    [opc@dev-vm ~]$ chmod 600 .kube/config

    [opc@dev-vm ~]$ chmod 600 .oci/config

    ```


    We are going to issue a few `kubectl` commands to test the connectivity with the
    Kubernetes API and inspect the basic Kubernetes objects in our cluster. While
    still on the developer instance, issue the following commands:'
