  trans: '# 运行容器


    镜像本身可以简单地看作是逻辑关联的只读文件系统层。要使用容器化的应用程序，您必须基于特定镜像启动一个或多个容器。您可以使用 `docker run` 命令来实现这一点。`-d`
    参数将容器作为后台的**分离的进程**运行，从而不会阻塞终端。即使 `Dockerfile` 声明了端口 5000 是镜像暴露的端口，您仍然需要为每个创建的容器映射一个选定的主机端口到该容器端口。您可以使用
    `-p` 参数来实现这一点。我们可以自由地使用一个或多个 `-e` 参数来覆盖或设置额外的环境变量。您可能还记得，UUID API 在响应中将 `UUID_GENERATOR_NAME`
    环境变量的值作为 `generator` 字段返回。对于我们即将启动的每个容器，我们将使用一个不同的值，该值与用 `--name` 参数设置的容器名称相同。


    第 2 章的练习帮助您在两个主机上分别将 UUID API 的单个实例作为 `systemd` 服务运行。这一次，我们将运行同一应用程序的几个实例，将它们绑定到开发实例上不同的端口，如下所示：


    ```

    [opc@dev-vm]$ docker run -d -p 5011:5000 -e "UUID_GENERATOR_NAME=uuid-1" --name
    uuid-1 uuid:1.0

    d6e9112b0950.........40adc3

    [opc@dev-vm]$ docker run -d -p 5012:5000 -e "UUID_GENERATOR_NAME=uuid-2" --name
    uuid-2 uuid:1.0

    224256288f19.........d63b8c

    [opc@dev-vm]$ docker run -d -p 5013:5000 -e "UUID_GENERATOR_NAME=uuid-3" --name
    uuid-3 uuid:1.0

    b15d1d26614c.........45b8dd

    ```


    要列出正在运行的容器，您可以使用 `docker ps` 命令。


    ```

    [opc@dev-vm]$ docker ps --format "table {{.ID}}\t{{.Image}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"

    CONTAINER ID  IMAGE     NAMES   STATUS     PORTS

    b15d1d26614c  uuid:1.0  uuid-3  Up 3 min   0.0.0.0:5013->5000/tcp

    224256288f19  uuid:1.0  uuid-2  Up 3 min   0.0.0.0:5012->5000/tcp

    d6e9112b0950  uuid:1.0  uuid-1  Up 3 min   0.0.0.0:5011->5000/tcp

    ```


    现在，让我们测试每个容器上的 UUID API。


    ```

    [opc@dev-vm]$ curl 127.0.0.1:5011/identifiers

    {

    "generator":"uuid-1",

    "uuid":"d89d68bf-c093-4774-ab0e-0089674c184e"

    }

    [opc@dev-vm]$ curl 127.0.0.1:5012/identifiers

    {

    "generator":"uuid-2",

    "uuid":"e141eef7-e578-4272-934b-68b48b6e146c"

    }

    [opc@dev-vm]$ curl 127.0.0.1:5013/identifiers

    {

    "generator":"uuid-3",

    "uuid":"52ea3c08-adf2-452b-bd28-ef7b26aa2fc2"

    }

    ```


    由于我们在 Oracle 云基础设施上运行 `dev-vm` 计算实例，您可能希望通过使用实例的公共 IP 从本地机器调用测试容器化的 UUID API。为此，您必须添加一条入站安全规则，允许端口
    5011–5013 的入站流量。与 `dev-vm` 相关的基础设施是使用 Terraform 配置的。要添加新的入站安全规则，您需要在基础设施代码文件 `devmachine/vcn.tf`
    的 `dev_sl` 资源中进行操作。我们在第 2 章和第 6 章讨论了安全规则。


    我们已通过实例化三个容器并测试其 API，成功验证了新构建的镜像。您现在可以退出开发者实例控制台。


    ```

    [opc@dev-vm]$ exit

    ```


    `uuid:1.0` 镜像目前存储在我们开发实例上的本地镜像注册表中。这类本地注册表对于刚刚进行的测试来说完全足够，但不能作为分发注册表使用。


    ## 容器注册表


    理论上，您可以将新构建的镜像从开发者实例上的本地镜像注册表推送到互联网上的某个公共注册表，例如 Docker Hub。然而，您通常更倾向于将所有自定义镜像保存在某种私有注册表中，对公众不可见，并且该注册表在地理上更靠近容器运行的目标基础设施。每个
    Oracle 云基础设施租户都配有一个能够存储私有和公共仓库的镜像注册表。*Oracle 云基础设施注册表* (`OCIR`) 与身份和访问管理完全集成。因此，`OCIR`
    的访问权限被授予 `IAM` 用户，并使用您已熟悉的 `IAM` 策略进行管理。在后台，容器镜像被冗余地存储在支持 `OCIR` 的 `OCI` 对象存储中。*仓库*
    用于对相关镜像进行分组。一个单一的 *仓库* 可以被视为为单个服务或应用程序提供的一组相关的、带标签的 Docker 镜像版本。在 `OCIR` 的上下文中，仔细分配的
    *标签* 不仅用于表示容器化应用程序的特定版本或变体，还用于指示租户命名空间、目标区域和仓库名称。要将镜像推送到您的租户 `OCIR`，您必须使用严格定义的表示法标记镜像，如图
    8-9 所示。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig9_HTML.jpg](img/478313_1_En_8_Fig9_HTML.jpg)


    图 8-9


    镜像标签与 `OCIR`


    `OCIR` 使用的区域代码与您迄今为止遇到的不同。表 8-1 展示了其中一些。更新后的列表可以在这里找到： [`https://docs.cloud.oracle.com/iaas/Content/General/Concepts/regions.htm`](https://docs.cloud.oracle.com/iaas/Content/General/Concepts/regions.htm)。


    表 8-1


    OCIR 区域代码


    | 区域名称 | 区域标识符 | OCIR 键 |

    | --- | --- | --- |

    | 澳大利亚东部 (悉尼) | `ap-sydney-1` | `syd` |

    | 巴西东部 (圣保罗) | `sa-saopaulo-1` | `gru` |

    | 加拿大东南部 (多伦多) | `ca-toronto-1` | `yyz` |

    | 德国中部 (法兰克福) | `eu-frankfurt-1` | `fra` |

    | 印度西部 (孟买) | `ap-mumbai-1` | `bom` |

    | 日本东部 (东京) | `ap-tokyo-1` | `nrt` |

    | 伦敦 (英国) | `uk-london-1` | `lhr` |

    | 韩国中部 (首尔) | `ap-seoul-1` | `icn` |

    | 瑞士北部 (苏黎世) | `eu-zurich-1` | `zrh` |

    | 英国南部 (伦敦) | `uk-london-1` | `lhr` |

    | 美国东部 (阿什本) | `us-ashburn-1` | `iad` |

    | 美国西部 (凤凰城) | `us-phoenix-1` | `phx` |


    您可以在 `OCI` 控制台的注册表视图中找到 *租户命名空间*。如果以租户超级用户身份登录，您不需要任何特定的 `IAM` 策略即可在 `OCI` 控制台中查看
    `OCIR`。以下是使用 `OCI` 控制台访问相关视图的方法：


    1.  转到 **菜单** ➤ **开发者服务** ➤ **注册表**。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig10_HTML.jpg](img/478313_1_En_8_Fig10_HTML.jpg)


    图 8-10


    在 `OCI` 控制台中查看 Oracle 容器镜像注册表


    *租户命名空间* 作为仓库列表的根节点可见。您会在房子图标旁边找到它。在我的情况下，命名空间名称与我的租户名称 (`jakobczyk`) 相同，但对于较新的租户，情况可能不再如此。您可能会发现一个随机字符串。'
- fmt: 'To allow other IAM users to interact with OCIR, you have to create the appropriate
    IAM policies that explicitly grant particular access to the chosen IAM groups.
    In the course of this book, we have been dealing with two groups: `sandbox-admins`
    and `sandbox-users`. Let’s assume we would like to grant the `sandbox-admins`
    group members a permission to list all Docker repositories in the tenancy. Furthermore,
    both groups should be able to push, pull, and delete images in repositories whose
    names begin with the `sandbox` prefix such as `sandbox/uuid` or `sandbox-cicd/uuid`.
    On your local host with the OCI CLI, open the `chapter08/2-docker/policies` directory.


    ```

    $ cd ~/git

    $ cd oci-book/chapter08/2-docker

    $ cd policies

    $ ls -1

    tenancy.ocir.policies.json

    ```


    The JSON file contains three policy statements, as shown in Listing 8-3. The `manage
    repos` gives full access to all Registry-related OCI APIs over the repositories
    whose names match the `where target.repo.name` filter. The third rule gives the
    `sandbox-admins` group members `inspect repos` access over all repositories. The
    `inspect`-level access refers to just two APIs, `ListDockerRepositories` and `ListDockerRepositoryManifests`.


    ```

    [

    "allow group sandbox-users to manage repos in tenancy where target.repo.name =
    /sandbox*/",

    "allow group sandbox-admins to manage repos in tenancy where target.repo.name
    = /sandbox*/",

    "allow group sandbox-admins to inspect repos in tenancy where request.operation=''ListDockerRepositories''"

    ]

    Listing 8-3

    tenancy.ocir.policies.json

    ```


    Because the OCIR scope is the tenancy level, we have to create the policy in the
    root compartment by pointing to it with the `-c` parameter of the `iam policy
    create` CLI command. As you probably remember, we maintain three profiles in the
    CLI config. The default profile calls the API on behalf of the tenancy admin and
    will be used when the `--profile` parameter is unset. Back on our local machine,
    let’s execute the OCI CLI as the tenancy admin.


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo $TENANCY_OCID

    tenancy=ocid1.tenancy.oc1..aa..........3yymfa

    $ oci iam policy create -c $TENANCY_OCID --name tenancy-ocir-policy --description
    "OCIR Polices"  --statements "file://tenancy.ocir.policies.json"

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "tenancy-ocir-policy",

    "statements": [

    "allow group sandbox-users to manage repos in tenancy where target.repo.name =
    /sandbox*/",

    "allow group sandbox-admins to manage repos in tenancy where target.repo.name
    = /sandbox*/",

    "allow group sandbox-admins to inspect repos in tenancy where request.operation=''ListDockerRepositories''"

    ],

    ...

    },

    "etag": "d705d10ec093dbaf7c116054709951d38d3f7651"

    }

    ```


    You can verify the presence of the newly created IAM policy in the OCI Console.
    Remember to switch the scope to the root compartment, as shown in Figure 8-11.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig11_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig11_HTML.jpg)

    *Figure 8-11: OCIR policy*


    Having said that OCIR is fully integrated with IAM, it is clear that only authenticated
    and authorized IAM users are allowed to pull or push images in private repositories.
    You already worked with authentication tokens in the previous chapter. As a quick
    recap, let me mention a couple of facts. Users are authenticated based on the
    authentication tokens. A token is a relatively short Oracle-generated string.
    Any IAM user can have up to two authentication tokens at a time. Tokens can be
    created by the users themselves or arbitrarily by administrators either using
    the OCI Console or by leveraging API-based automation such as the OCI CLI.


    This is how you generate an authentication token as a `sandbox-user` in the OCI
    Console:


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig12_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig12_HTML.jpg)

    *Figure 8-12: Accessing the user profile in the OCI Console*


    1.  Log in to the OCI Console as the `sandbox-user`.

    2.  Go to the user profile by clicking the user name, as shown in Figure 8-12.

    3.  On the Resources tab, click Auth Tokens.

    4.  Click Generate Token.

    5.  Provide a description for your token, and click Generate Token.

    6.  Write down your token. You will see it only once.


    It is crucial to remember that you see a newly generated authentication token
    only once, as shown in Figure 8-13. If you lose it, you will have to delete the
    old token and generate a new one.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig13_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig13_HTML.jpg)

    *Figure 8-13: Seeing a generated token*


    To programmatically generate an authentication token for a selected user, you
    can execute the following CLI commands on behalf of the tenancy admin using the
    default CLI profile (just omit the `--profile` parameter). First, you query for
    the OCID of a particular user, and then you use the `iam auth-token create` CLI
    command for that user.


    ```

    $ IAM_USER_OCID=`oci iam user list -c $TENANCY_OCID --query "data[?name==''sandbox-user'']
    | [0].id" --raw-output --all`

    $ echo IAM_USER_OCID

    ocid1.user.oc1..aa..........dzqpxa

    $ oci iam auth-token create --user-id $IAM_USER_OCID --description token-ocir
    --query ''data.token'' --raw-output

    B8.E_Ry7oOtN1KF0do9x

    ```


    No matter which way you choose, please make sure you have an authentication token
    for the `sandbox-user` IAM user.


    We are about to push the `uuid:1.0` image we built a few moments ago. To push
    a local container image in OCIR, you have to do the following:


    1.  Choose the OCIR region.

    2.  Properly tag the local image according to the OCIR naming convention.

    3.  Log in to the region-specific OCIR as a named IAM user.

    4.  Push the tagged image.


    You can find the graphical illustration of the OCIR naming convention for image
    tagging in Figure 8-9. I am going to push the image to the OCIR in Frankfurt,
    but you can of course select your region in which you’ve worked until now. In
    such case, you will find the required OCIR region code in Table 8-1.


    At the time of writing, the tenancy namespace can be programmatically read from
    the OCI API using the `oci os ns get` CLI command. Let’s identify our tenancy
    namespace. We will use it in a few moments.


    ```

    $ oci os ns get --query data --raw-output

    jakobczyk

    ```


    As you can see, my tenancy namespace has the same value as my tenancy name. This
    is because I am using a relatively old cloud account. For newer cloud accounts,
    probably including yours, the tenancy namespace and tenancy name nearly always
    differ.


    **Caution:** While working with OCIR, be careful not to confuse the *tenancy name*
    with the *tenancy namespace*. Make sure you use the tenancy namespace to tag the
    image and log in to OCIR.


    Connect to the developer instance now.


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    [opc@dev-vm] $

    ```


    Here’s how I am tagging the local `uuid:1.0` image as `fra.ocir.io/jakobczyk/sandbox/uuid:1.0`
    using the `docker tag` command:


    ```

    [opc@dev-vm] $ OCI_PROJECT_CODE=sandbox

    [opc@dev-vm] $ OCI_TENANCY_NAMESPACE=jakobczyk

    [opc@dev-vm] $ OCIR_REGION=fra

    [opc@dev-vm] $ OCI_USER=sandbox-user

    [opc@dev-vm] $ IMAGE_NAME=uuid

    [opc@dev-vm] $ IMAGE_TAG=1.0

    [opc@dev-vm] $ docker tag $IMAGE_NAME:$IMAGE_TAG $OCIR_REGION.ocir.io/$OCI_TENANCY_NAMESPACE
    /$OCI_PROJECT_CODE/$IMAGE_NAME:$IMAGE_TAG

    [opc@dev-vm] $ docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}"

    REPOSITORY                           TAG       IMAGE ID

    uuid                                 1.0       b16f04d1bb7f

    fra.ocir.io/jakobczyk/sandbox/uuid   1.0       b16f04d1bb7f

    python                               3-alpine  fe3ef29c73f3

    ```'
