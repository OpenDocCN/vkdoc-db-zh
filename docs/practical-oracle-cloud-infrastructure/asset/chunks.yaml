    \n### UUID 函数\n\n阅读了前面的章节后，你现在应该熟悉了 UUID 生成函数。首先，你将其作为 systemd 服务部署在基于 Linux 的计算实例上。这是第二章包含的练习。接下来，你将这个应用容器化，并在\
