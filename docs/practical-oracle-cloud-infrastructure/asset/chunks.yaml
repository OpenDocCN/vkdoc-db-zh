    ```


    响应中有几个有趣的元素值得解释。我们为 CLI 命令提供的唯一参数是存储桶名称。这就是为什么存储桶在需要时采用了默认配置值。结果，新创建的存储桶被配置为标准存储层存储桶，不允许公共访问。


    有两种*存储层*：标准和归档。它们差别不大。*归档存储层*基本上更便宜，但代价是无法立即访问对象，必须先恢复对象。这个操作可能需要几个小时。你会将归档存储用于什么？想想那些很少访问但由于某些监管或合规原因必须存储一定时间的数据。另一个例子可能是旧的日志或测量值，你目前不一定需要，但愿意保留以防万一。在本章中，我们将处理标准存储层存储桶。


    不允许公共访问意味着存储桶是私有的，对象只能由经过身份验证的 IAM 用户、实例主体或通过预认证请求访问。如果我们处理的是公共存储桶，对象将对所有人可见并可下载。图
    5-4 显示了 OCI 控制台中的存储桶详细信息。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig4_HTML.png](img/478313_1_En_5_Fig4_HTML.png)


    图 5-4


    在 OCI 控制台中查看存储桶详细信息


    这是列出活动隔区中存在的存储桶并以表格形式显示它们的 CLI 命令：


    ```

    $ oci os bucket list --query ''data[*].{Bucket:name}'' --output table --profile
    SANDBOX-ADMIN

    +------------+

    | Bucket     |

    +------------+

    | blueprints |

    +------------+

    ```


    进入下一步，我们希望创建权限，允许 `sandbox-users` 组的成员列出此存储桶中存在的对象，并能够添加新对象和删除现有对象。为此，首先准备一个包含相关策略语句的文件，如清单
    5-1 所示。我将此文件命名为 `sandbox-users.policies.storage.json` ，但名称并不重要，只要在下一个命令中正确引用它即可。或者，你可以在以下路径的
    Git 仓库中找到此文件：`chapter05/1-policies/sandbox-users.policies.storage.json`。


    ```

    [

    "allow group sandbox-users to read buckets in compartment Sandbox where target.bucket.name=''blueprints''",

    "allow group sandbox-users to manage objects in compartment Sandbox where target.bucket.name=''blueprints''"

    ]

    Listing 5-1

    sandbox-users.policies.storage.json

    ```


    `buckets` 的 `read` 策略动词允许用户列出存储桶并获取每个存储桶的详细配置。然而，我们使用了一个带有 `target.bucket.name`
    变量的条件，这基本上限制了权限，只允许用户操作名为 `blueprints` 的存储桶。类似地，我们对 `objects` 使用 `manage` 策略动词来授予对象范围内的所有操作类型，但仅限于
    `blueprints` 存储桶中的对象。


    一旦文件准备就绪，我们就可以使用 `oci iam policy create` CLI 命令，在 `Sandbox` 隔区中创建一个新策略，就像我们在上一章中添加新策略的方式一样。以
    `sandbox-admin` 身份工作，你只能在 `Sandbox` 隔区中创建策略。在第 4 章中，我们将 `Sandbox` 隔区设置为 `~/.oci/oci_cli_rc`
    文件中 `SANDBOX-ADMIN` 配置文件的默认隔区。这样，你可以跳过必需的 `--compartment-id`（或其别名 `-c`）参数，因为 CLI
    将能够读取并应用默认值。以下 CLI 命令将基于提供的文件创建一个新的 IAM 策略。我假设你已经克隆了与本书相关的代码；因此，你可以进入包含策略文件的目录并执行
    CLI 命令，如下所示：


    ```

    $ cd ~/git/oci-book/chapter05/1-policies

    $ oci iam policy create --name sandbox-users-storage-policy --statements file://sandbox-users.policies.storage.json
    --description "Storage-related policy for regular Sandbox users" --profile SANDBOX-ADMIN

    ```


    在此阶段，你应该能在 OCI 控制台中看到带有两个语句的新策略，如图 5-5 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig5_HTML.jpg](img/478313_1_En_5_Fig5_HTML.jpg)


