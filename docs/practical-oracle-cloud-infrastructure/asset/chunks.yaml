    \ Terraform 基础设施代码之外管理 IAM 云资源。\n\n## 审计与搜索\n\n作为云租户所有者或您所管理云账户的负责人，您需要密切关注在任何给定时刻存在于不同\
    \ compartment 中的所有这些不同的云资源。此外，您应该了解用户采取的操作。当我谈到对一个或多个云资源的操作时，我基本上指的是与 API 的交互。我在前一章讨论自动化选项时提到过这一点。任何类型的活动，无论是在\
    \ OCI 控制台中完成的，还是通过 API、SDK、CLI 或 Terraform 完成的，在底层都会产生一个 API 调用。在本节中，我将向您简要介绍\
    \ Oracle 云基础设施中的搜索和审计功能，当您想要正确控制情况时，这些功能确实是不可或缺的。\n"
- fmt: '### Searching


    想象一下，你想找到所有显示名称包含*sandbox*一词的用户和组。在本章前面的部分，我使用了两个独立的CLI命令`iam user list`和`iam
    group list`获取了所有用户和组的列表。我通过`--query`参数应用的JMESPath过滤器解析了响应中接收的数据，并在我的客户端本地显示了匹配的元素。如果我的云租户有几十个用户呢？我们将不必要地接收到一个包含所有用户的大型响应，然后才应用本地的JMESPath过滤器。这似乎不是一个有效的解决方案。此外，如果我们想仅通过单个API调用*搜索*匹配给定名称的各种类型的云资源，该怎么办？


    Oracle Cloud Infrastructure提供了一个专用的搜索API，用于执行跨资源类型和跨隔间的全文搜索或结构化查询，以简化和增强您收集云资源信息的方式。当您需要查找分散在不同隔间中的广泛资源时，这尤其有用。这在概念上如图[4-21](#478313_1_En_4_Chapter.xhtml#Fig21)所示。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig21_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig21_HTML.jpg)


    图 4-21


    Oracle Cloud Infrastructure Search API


    只要策略语句授予您用户所属组访问这些隔间和资源类型的权限，您就可以使用搜索API轻松搜索资源。支持两种搜索类型。


    *   `Free-text queries`

    *   `Structured queries`


    您通常会使用自由文本查询来根据资源的元数据文本模式匹配获得资源的概览。如果您已经心中有特定的资源类型或条件，结构化查询会更加方便。


    ### Free-Text Search


    `Free-text queries`只不过是在Oracle Cloud Infrastructure索引的所有云资源元数据上执行的全文搜索。如果在任何索引的元数据字段中找到了给定的搜索词，只要该类型的资源及其隔间范围对执行自由文本搜索的用户可见，该云资源就会包含在结果中。要在OCI控制台中运行自由文本查询，请将搜索词（例如*sandbox*）放在顶部栏的搜索框中，如图[4-22](#478313_1_En_4_Chapter.xhtml#Fig22)所示。结果将按类型分组并一起显示，搜索词会高亮显示，如图[4-23](#478313_1_En_4_Chapter.xhtml#Fig23)所示。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig23_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig23_HTML.jpg)


    图 4-23


    OCI控制台中的自由文本搜索结果


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig22_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig22_HTML.jpg)


    图 4-22


    OCI控制台中的自由文本搜索


    可以使用CLI运行相同的查询。为此，我们将利用`search resource free-text-search`命令，并使用`--text`参数指定我们感兴趣查找的术语。请注意，我们仍然可以使用JMESPath（`--query`参数）在本地过滤并仅显示我们真正感兴趣的字段。


    ```

    $ oci search resource free-text-search --text sandbox --query ''data.items[*].{Type:"resource-type",Name:"display-name",OCID:"identifier",State:"lifecycle-state"}''

    [

    {

    "Name": "sandbox-admin",

    "OCID": "ocid1.user.oc1..aa.........7d5dca",

    "State": "ACTIVE",

    "Type": "User"

    },

    {

    "Name": "sandbox-user",

    "OCID": "ocid1.user.oc1..aa.........dzqpxa",

    "State": "ACTIVE",

    "Type": "User"

    },

    {

    "Name": "sandbox-admins",

    "OCID": "ocid1.group.oc1..aa.........hlotwa",

    "State": "ACTIVE",

    "Type": "Group"

    },

    {

    "Name": "sandbox-users",

    "OCID": "ocid1.group.oc1..aa.........rj2sba",

    "State": "ACTIVE",

    "Type": "Group"

    },

    {

    "Name": "Sandbox",

    "OCID": "ocid1.compartment.oc1..aa.........gzwhsa",

    "State": "ACTIVE",

    "Type": "Compartment"

    }

    ```


    正如我之前所说，您通常只会使用这种类型的搜索来获取与特定文本模式匹配的资源的初步、高级概览。根据您搜索的术语，结果集可能非常大。总而言之，这是对您租户或您的用户有权访问的隔间中所有类型云资源的全文搜索。这就是为什么您不应该忘记分页，在CLI命令的情况下，您可以使用`--limit`和`--page`参数来控制分页。您可以在本章后面专门的部分中阅读更多相关信息。'
  raw: '### Searching


    Imagine you want to find all users and groups whose display name contains the
    term *sandbox*. In the previous sections of the current chapter, I fetched the
    lists of all users and groups with two separate CLI commands: `iam user list`
    and `iam group list`. The JMESPath-powered filter I applied with the `--query`
    parameter parsed the data received in the response and displayed the matching
    elements locally on my client machine. What if my cloud tenancy had dozens of
    users? We would unnecessarily receive a really large response with all the users
    and only then apply a local JMESPath-powered filter. This does not seem like an
    effective solution. Furthermore, what if we wanted to *search* for cloud resources
    of various types that match a given name just using a single API call?


    Oracle Cloud Infrastructure offers a dedicated Search API to perform cross-resource-type
    and cross-compartment full-text search or structured queries to simplify and enhance
    the way you collect information about cloud resources. This is especially useful
    when you need to find a broad range of resources that are scattered across different
    compartments. This is conceptually illustrated in Figure [4-21](#478313_1_En_4_Chapter.xhtml#Fig21).


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig21_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig21_HTML.jpg)


    Figure 4-21


    Oracle Cloud Infrastructure Search API


    As long as there are policy statements that give access to these compartments
    and resource types to the group your user belongs to, you can easily search for
    the resources using the Search API. There are two types of searches supported.


    *   Free-text queries


    *   Structured queries


    You will usually employ the free-text queries to get a brief overview of resources
    based on their metadata text-pattern match. The structured queries will be handier
    if you have already certain resource types or conditions in mind.


    #### Free-Text Search


    *Free-text queries* are nothing more than full-text searches performed over all
    cloud resource metadata indexed by Oracle Cloud Infrastructure. If a given search
    term is found in any of the indexed metadata fields, the cloud resource is included
    in the results, as long as this type of resource and its compartment scope are
    visible for the user who runs a free-text search. To run a free-text query in
    the OCI Console, place the searched term, for example, *sandbox*, in the search
    box present in the top bar, as shown in Figure [4-22](#478313_1_En_4_Chapter.xhtml#Fig22).
    The results will be grouped into types and displayed altogether with the searched
    term highlighted, as presented in Figure [4-23](#478313_1_En_4_Chapter.xhtml#Fig23).


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig23_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig23_HTML.jpg)


    Figure 4-23


    Free-text search results in the OCI Console


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig22_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig22_HTML.jpg)


    Figure 4-22


    Free-text search in the OCI Console


    The same query can be run with the use of the CLI. To do so, we are going to leverage
    the `search resource free-text-search` command and specify the term that we are
    interested in finding using the `--text` parameter. Please note that we still
    can use JMESPath (the `--query` parameter) to locally filter and display only
    the fields we are really interested in.


    ```

    $ oci search resource free-text-search --text sandbox --query ''data.items[*].{Type:"resource-type",Name:"display-name",OCID:"identifier",State:"lifecycle-state"}''

    [

    {

    "Name": "sandbox-admin",

    "OCID": "ocid1.user.oc1..aa.........7d5dca",

    "State": "ACTIVE",

    "Type": "User"

    },

    {

    "Name": "sandbox-user",

    "OCID": "ocid1.user.oc1..aa.........dzqpxa",

    "State": "ACTIVE",

    "Type": "User"

    },

    {

    "Name": "sandbox-admins",

    "OCID": "ocid1.group.oc1..aa.........hlotwa",

    "State": "ACTIVE",

    "Type": "Group"

    },

    {

    "Name": "sandbox-users",

    "OCID": "ocid1.group.oc1..aa.........rj2sba",

    "State": "ACTIVE",

    "Type": "Group"

    },

    {

    "Name": "Sandbox",

    "OCID": "ocid1.compartment.oc1..aa.........gzwhsa",

    "State": "ACTIVE",

    "Type": "Compartment"

    }

    ```


    As I said earlier, you will usually employ this type of search just to get some
    initial, high-level overview of these resources whose metadata match a particular
    text pattern. Depending on the term you are searching for, the result set can
    be really large. All in all, this is a full-text search over all kinds of cloud
    resources in your tenancy or the compartments your user has access to. This is
    why you should not forget about pagination, which you can control, in the case
    of CLI commands, with the `--limit` and `--page` parameters. You can read more
    about that in a dedicated section, later in this chapter.'
  trans: '### Searching


    想象一下，您想查找所有显示名称包含*sandbox*一词的用户和组。在本章前面的部分，我使用了两个独立的 CLI 命令`iam user list`和`iam
    group list`来获取所有用户和组的列表。我通过`--query`参数应用的 JMESPath 过滤器来解析响应中接收的数据，并在我的客户端本地显示匹配的元素。但是，如果我的云租户有几十个用户呢？我们将不必要地接收到一个包含所有用户的大型响应，然后才能应用本地的
    JMESPath 过滤器。这似乎不是一个有效的解决方案。此外，如果我们想仅通过单个 API 调用*搜索*匹配给定名称的各种类型的云资源，该怎么办？


    Oracle Cloud Infrastructure 提供了一个专用的搜索 API，用于执行跨资源类型和跨隔间的全文搜索或结构化查询，以简化和增强您收集云资源信息的方式。当您需要查找分散在不同隔间中的广泛资源时，这尤其有用。这在概念上如图
    4-21 所示。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig21_HTML.jpg](img/478313_1_En_4_Fig21_HTML.jpg)


