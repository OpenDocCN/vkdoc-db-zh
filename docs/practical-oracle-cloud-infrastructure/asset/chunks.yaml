    The newly created object has been built from these parts by committing the multipart
    upload. To verify whether it is really the same, download the object and use the
    `diff` tool .


    ```

    $ cd ~/data

    $ oci os object get -bn blueprints --name "waw/bemowo/visualizations.pdf" --file
    visualizations.downloaded.pdf --profile SANDBOX-USER

    Downloading object  [####################################]  100%

    $ ls -lh visualizations.downloaded.pdf | awk ''{ print $9 " (" $5 ")" }''

