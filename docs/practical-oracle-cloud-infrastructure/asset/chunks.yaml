    -rw-r--r-- api.sandbox-user.pem.pub

    ```


    Now, you can upload the public keys (`.pub` suffix) to the corresponding user
    accounts. We are going to use the CLI, but, if you want, you can do it in the
    OCI Console as well. First, make sure the `TENANCY_OCID` bash variable is still
    set to the tenancy OCID.


    ```

    $ echo $TENANCY_OCID

    ocid1.tenancy.oc1..aa.........

    ```


    To upload a public key, you need to know the OCID of the user. You can either
    read it in the OCI Console or use the CLI to make a query, just like this:


    ```

    $ SANDBOX_ADMIN_OCID=`oci iam user list -c $TENANCY_OCID --query "data[?name==''sandbox-admin'']
    | [0].id" --all --raw-output`

    ocid1.user.oc1..aa.........7d5dca

    ```


    Now, let’s upload the public key for the `sandbox-admin` user.


    ```

    $ oci iam user api-key upload --user-id $SANDBOX_ADMIN_OCID --key-file ~/.apikeys/api.sandbox-admin.pem.pub
    --query "data.fingerprint"

    "91:64:1b:4e:4e:35:4a:06:b2:8f:6f:53:ae:7d:0d:ee"

    ```


    Typically, you configure the CLI on your machine to send API requests on behalf
    of just a single user. As a result, you are using only the default profile in
    your `~/.oci/config` file. Listing [4-1](#478313_1_En_4_Chapter.xhtml#PC12) displays
    how the structure of this file looks at the moment, after having completed the
    exercises from Chapter [3](#478313_1_En_3_Chapter.xhtml).


    ```

    [DEFAULT]

    tenancy=...

    region=...

    user=...

    fingerprint=...

    key_file=...

    pass_phrase=...

    Listing 4-1

    OCI CLI Configuration File

    ```


    There is only one profile, which is the default profile. Every OCI CLI command
    uses the details from the default profile to sign requests and make API calls.
    If you’ve followed the exercises from Chapter [3](#478313_1_En_3_Chapter.xhtml),
    the default configuration profile corresponds to the tenancy administrator superuser.


    Luckily for us, it is possible to create more profiles. In this way, you will
    be able to execute different CLI commands on behalf of different OCI users on
    a single machine. Open the config file in a chosen text editor.


    ```

    $ vi ~/.oci/config

    ```


    Under the default profile, please add a new profile called `SANDBOX-ADMIN` and
    provide the user details for the `sandbox-admin` user, which you can find in this
    section. The new part is shown in bold in Listing [4-2](#478313_1_En_4_Chapter.xhtml#PC14).


    ```

    [DEFAULT]

    tenancy=...

    region=...

    user=...

    fingerprint=...

    key_file=...

    pass_phrase=...

    [SANDBOX-ADMIN]

    user=ocid1.user.oc1..aaaaaaaa3n5.........7d5dca

    fingerprint=91:64:1b:4e:4e:35:4a:06:b2:8f:6f:53:ae:7d:0d:ee

    key_file=~/apikeys/api.sandbox-admin.pem

    pass_phrase=put-here-sandbox-admin-private-key-password

    Listing 4-2

    OCI CLI Configuration File with Multiple Profiles

    ```


    From now on, every time you add `--profile SANDBOX-ADMIN` to your CLI command,
    the CLI will use the four parameters (`user`, `fingerprint`, `key_file`, and `pass_phrase`)
    from the `SANDBOX-ADMIN` profile and the remaining two (`tenancy` and `region`)
    from the `DEFAULT` profile.


    If you try executing one of the commands, but this time as the `sandbox-admin`
    user through the use of the `SANDBOX-ADMIN` profile , you will encounter an error.


    ```

    $ oci iam user list -c $TENANCY_OCID --query "data [?starts_with(name,''sandbox'')].name"
    --all --profile SANDBOX-ADMIN

    ServiceError:

    {

    "code": "NotAuthorizedOrNotFound",

    "message": "Authorization failed or requested resource not found",

    "opc-request-id": "DE........./411.........E1F/B6A.........A8B",

    "status": 404

    }

    ```


    The reason is obvious. Oracle Cloud Infrastructure denies any kind of access to
    cloud resources by default. The `sandbox-admin` user does not belong to any group;
    therefore, there are no access policies that would grant some access rights to
    this user. It is time to discuss how the policies work.


    Note


    If you are still logged into the OCI Console as either the `sandbox-user` or the
    `sandbox-admin` user, please log out and log in again as the tenancy superuser.
    Alternatively, you can use a different browser.


    One more important remark: before you read on, please upload the public key as
    a new API key for the `sandbox-user` user. You have already learned how. Please
    do it straightaway. We will need it in the future chapters.


    ## Groups and Policies


    The access to various types of cloud resources is given to the *groups*, not the
    individual users. We will focus on local groups only, but you may benefit from
    knowing that it is also possible to map your identity provider groups to the local
    groups. Policy statements define what kind of access is allowed to whom and in
    which scope. We will take a closer look at policy statements in a second. First,
    let’s discuss groups.'
