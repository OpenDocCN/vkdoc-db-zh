  trans: '## 容器


    容器是一种可移植、可交付的软件单元，它被打包了所有的依赖项。让我们通过更仔细地审视容器的三个核心特性来探讨这个定义。


    -   **自包含**

    -   **隔离的**

    -   **可交付的**


    每个容器在原则上都是**自包含**的。封装在容器内的服务或应用程序会配备其所有依赖项，例如软件二进制文件、配置文件、库、环境变量，以及——无论乍听起来多么奇怪——整个操作系统。尽管在同一个裸机或虚拟机上可能运行着数百个容器，但每个容器都为其封装的应用程序提供了一个完全隔离且独占环境的印象。换句话说，任何给定容器内的应用程序都认为自己运行在一个专用的机器上，无论同一台主机上还共存着多少其他容器。只要所有主机都支持相同的容器运行时，容器就被认为可以轻松地在可能使用不同主机操作系统的不同主机机器之间**交付**。图
    8-1 从概念上说明了这三个特性。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig1_HTML.jpg](img/478313_1_En_8_Fig1_HTML.jpg)


    **图 8-1：容器核心特性**


    如果你从未听说过容器，并且是这个话题的新手，你可能会好奇从技术角度来看这一切是如何实现的。此外，容器与虚拟机究竟有何不同？当代容器运行时起源于 Linux
    生态系统，并利用 Linux 内核特性（如命名空间、控制组或 `chroot` 命令）来实现文件系统、进程、网络和资源隔离。无论你最终选择哪种容器引擎，无论是
    `Docker`、`rkt` 还是 `cri-o`，你都可以确信它们都使用了上述相同的 Linux 内核特性。


    在这种背景下，情况变得清晰起来：所有运行在同一主机上的容器，尽管是完全隔离的，但都使用该主机的 Linux 内核。在可重用性方面，还有一个影响更大的概念，即**层**。容器使用层层堆叠的文件系统层。“底层”的基础层提供了整个操作系统。这听起来可能很庞大，但在容器的世界里，你经常会遇到非常轻量级的
    Linux 发行版，例如 CoreOS Container Linux 或 Alpine Linux。在此之上，额外的层通常会带来应用程序运行时，例如 Java
    虚拟机、Python 或 Node.js。更上面的层可以包含所需的库，如 Python Flask。最后，最顶层包含应用程序二进制文件，通常还附带注入的配置文件。所有这些层都是**只读的**，这允许多个容器共享它们。每个容器都带有一个专用的**可写层**，用于保存容器内应用程序或其他组件在其生命周期内所做的所有更改。


    只读层在逻辑上被分组为**容器镜像**，这些镜像可以在多台机器之间共享。每个镜像都是一个自包含的实体，可以作为多个运行中容器的基础。你可以基于同一个镜像拥有数百个容器，其实际占用的存储空间仅相当于运行单个容器。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig2_HTML.jpg](img/478313_1_En_8_Fig2_HTML.jpg)


    **图 8-2：容器层**


    图 8-2 说明了各个镜像和容器之间的关系。有三个名为 `uuid-1`、`uuid-2` 和 `uuid-3` 的容器，它们都使用相同的 `uuid:1.0`
    镜像构建。`uuid:1.0` 镜像是一个自定义构建的镜像，主要包含一些应用程序代码和配置文件。该镜像是在一个已下载的 `python:3-alpine`
    镜像之上构建的，而 `python:3-alpine` 镜像又在一个名为 `alpine:3.10` 的基础操作系统镜像之上安装了 Python 3。这三个容器内的应用程序都认为自己运行在独立的主机上。然而，它们都共享主机的
    Linux 内核和只读层。社区中一直有声音指出，并非所有 Python 应用程序都能在 Alpine Linux 上运行，因为缺少一些特定于发行版的依赖项。为了解决这些问题，你可以考虑使用不依赖
    `python:3-alpine`，而是基于 Debian 的 `python:3-stretch` 镜像的容器来运行要求更高的 Python 应用程序。


    内核级隔离与内核及各种文件系统层的重用相结合，使得容器与虚拟机相比，在使用上显著**更轻量**。同样，将一个容器**交付**到另一台机器上也比迁移整个虚拟机容易得多。


    但是，**交付**一个容器在物理上意味着什么？你已经了解到，任何特定的容器都需要一个由只读文件系统层组成的镜像。对于无状态应用程序而言，交付容器无非就是停止一个现有容器，然后在另一台机器上基于同一个镜像并使用相同的运行时配置启动另一个容器。显而易见，镜像必须以某种方式在镜像注册表中提供，并且所有带有容器运行时的主机机器都能访问该注册表。然后，容器平台会从镜像注册表中**拉取**一个镜像，这实际上意味着下载所有必需的文件系统层和相应的元数据，如图
    8-3 所示。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig3_HTML.jpg](img/478313_1_En_8_Fig3_HTML.jpg)


    **图 8-3：从镜像注册表拉取镜像**


    应用程序在其生命周期中总是在不断演进。为了跟踪这一演进过程，应用程序的发布会被**版本化**。这同样适用于容器镜像。如果你仔细观察前面的图，会看到诸如 `1.0`、`3-alpine`
    或 `3:10` 这样的版本后缀。我们称之为**标签**。容器镜像打标签主要是为了表示特定镜像的不同变体或发布顺序。例如，假设你发布了一个封装了 UUID
    服务更新二进制文件的新次要版本镜像。如果之前的镜像版本标记为 `uuid:1.0`，那么更新后的镜像版本可以标记为 `uuid:1.1`。如果一个基于 Python
    的应用程序碰巧不够快，你还可以额外实现一个基于 Golang 的替代方案，并将其发布为 `uuid:1.0-golang` 变体。'
- fmt: '## 容器化应用开发流程概述


    了解所有基本组件后，我们就可以勾勒出容器化应用的开发流程了。根据具体情况，您可能需要对现有应用进行容器化，或者在开发新应用之初就将容器化作为自动化流程的一部分纳入。要`容器化一个应用`，您需要仔细识别所有依赖项，并对整个执行环境做出选择，包括应用以为自己运行于其上的操作系统。基于这些决策，您选择一个现有的镜像，或者如果不存在，就开始自己构建它。这将是您应用特定镜像的基础镜像。一旦基础镜像准备就绪，您就可以开始在选定的基础镜像之上构建应用特定镜像了。通常通过添加应用二进制文件（可选地附带一些静态的、应用特定的配置文件）并为应用使用的任何环境变量设置默认值来实现。这些环境变量随后可以为每个单独的容器覆盖。对于容器化应用，另一种更复杂的方式是从解耦的外部配置源获取其运行时配置制品。应用特定的镜像是自包含的。它可以被上传到镜像注册表。我们称此活动为`推送`镜像。然后，可以从注册表拉取镜像以运行容器，并在构成特定时刻测试环境的机器上针对这些容器执行自动化测试。测试流水线完成后，容器将被销毁。此外，如果测试机器是基于云的，在测试完成后可以终止它们以消除空闲时间。之后，成功验证的容器镜像会被正确标记并推送到另一个镜像注册表，这次是用于生产环境分发。有些人将其称为`镜像晋级`。在最后一步中，使用最新的镜像在生产机器上替换或启动新容器。整个过程如图[8-4](#478313_1_En_8_Chapter.xhtml#Fig4)所示。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig4_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig4_HTML.jpg)


    图 8-4


    开发容器化应用


    整个开发过程通常是完全自动化的。开发人员将代码签入Git等版本控制系统，这会触发测试镜像的构建、部署和测试。如果镜像验证成功，它会自动打标签并推送到分发镜像注册表。另一套自动化规则可以用基于最新镜像的新容器替换生产环境中的旧容器。


    本节为您提供了一些关于容器领域的基础知识。我们现在已准备好将这些概念付诸实践。为此，我们将对第[2](#478313_1_En_2_Chapter.xhtml)章介绍的UUID服务进行容器化。


    ### 容器化应用


    市场上有几种容器运行时。仅举几个例子，我们可以列出`containerd`、`rkt`或`cri-o`。事实上，这是一个非常动态的领域，几乎每个月都在迅速变化。幸运的是，社区已经进行了一些联合标准化努力，旨在为这种创意的混沌带来一些结构，并在各种运行时之间重用一些通用组件。最流行的容器运行时之一是`containerd`。它从先前单体的Docker
    Engine中提取出来，并作为一个由云原生计算基金会管理的开源项目捐赠给了社区。Docker本身实际上是Linux容器使用的先驱，最初使用一组现有的Linux容器工具，后来切换到定制的内置平台。Docker可能是目前最流行的容器引擎技术，也是用于容器化应用工具的领先提供商。在本节中，我们将使用Docker工具对之前作为第[2](#478313_1_En_2_Chapter.xhtml)章练习一部分处理的现有UUID服务应用进行容器化。当时，我们在Oracle
    Cloud Infrastructure中运行的两个计算实例上将其作为Linux systemd服务运行。那时，我们在每个计算实例上只托管一个应用实例。现在，我们将构建一个可以被任意数量容器运行的容器镜像，从而在单台机器上提供多个UUID
    API实例，如图[8-5](#478313_1_En_8_Chapter.xhtml#Fig5)所示。每个应用仍然会认为它是在专用主机上单独运行的，尽管实际上，它与基于相同镜像并在同一台机器上运行的所有其他容器共享底层镜像层和Linux内核。通过对应用进行容器化，您将解锁通过添加更多容器和具有容器运行时的主机来水平扩展整个UUID
    API的可能性。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig5_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig5_HTML.jpg)


    图 8-5


    容器化应用的可扩展性


    注意


    本书中的代码片段已在macOS和Windows Subsystem for Linux上测试。此外，所有命令应在主流Linux发行版上工作。如果您使用Windows且不想使用Windows
    Subsystem for Linux，您始终可以在虚拟机上运行Linux。另外，大多数代码片段也可能在Windows的Git Bash中工作。


    要构建镜像，您将需要一台安装了Docker工具的开发者机器。在本章的过程中，我们将配置并使用一个安装了所有必需工具的临时开发计算实例。我建议您遵循这些步骤，因为这将使使用代码片段更容易，并避免平台特定的差异。'
  raw: 'Knowing all the basic components, we are ready to outline the development
    process for a containerized application. Depending on the situation, you will
    either have to containerize an existing application or incorporate containerization
    already from the beginning as an automated process while developing a new application.
    To *containerize an application*, you need to carefully identify all dependencies
    and make choices on the entire execution environment including the operating system
    an application would think it is running on. Based on these decisions, you pick
    an existing image or, if it doesn’t exist, start building it on your own. This
    will be the base image for your application-specific image. As soon as the base
    image is ready, you can finally start building an application-specific image on
    top of the selected base image. You usually do it by adding the application binaries
    optionally with some static, application-specific configuration files and by setting
    default values for any environment variables used by the application. These environment
    variables may then be overridden for each individual container. Another, a bit
    more sophisticated way for a containerized application is to fetch its runtime
    configuration artifacts from a decoupled, external config source. The application-specific
    image is self-contained. It can be uploaded to an image registry. We call this
    activity *pushing* an image. An image can then be pulled from the registry to
    run containers and execute automated tests against them on machines that constitute
    a test environment for a given moment. After test pipelines have been completed,
    containers are destroyed. Furthermore, if test machines are cloud-based, following
    test completion, they can be terminated to eliminate idle time. Afterward, successfully
    validated container images are properly tagged and pushed into another image registry,
    this time intended for production distribution. Some reference this as *image
    promotion*. In the last step, the newest images are used to replace or launch
    new containers on production machines. The entire process is conceptually shown
    in Figure [8-4](#478313_1_En_8_Chapter.xhtml#Fig4).


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig4_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Developing containerized applications


    The entire development process is usually fully automated. Developers check their
    code into version control systems such as Git, which triggers the test image build,
    deployment, and testing. If the image validates successfully, it is automatically
    tagged and pushed to the distribution image registry. Another set of automation
    rules can replace older containers in the production environment with the newer
    containers that are based on the newest image.


    This section has equipped you with some base knowledge in the field of containers.
    We are ready now to apply these concepts in practice. To do so, we are going to
    containerize the UUID service that was covered in Chapter [2](#478313_1_En_2_Chapter.xhtml).


    ### Containerize an Application


    There are a few container runtimes on the market. Just to name a few, we could
    list `containerd` or `rkt` or `cri-o`. As a matter of fact, this is quite a dynamic
    scene, and things are rapidly changing nearly every month. Luckily, there have
    been some joint standardization efforts put in place by the community to bring
    some structure to this chaos of creativity and reuse some common components across
    various runtimes. One of the most popular container runtimes is `containerd`.
    It was taken from the previously monolithic Docker Engine and was donated to the
    community as an open source project governed by the Cloud Native Computing Foundation
    (CNCF). Docker alone actually pioneered the use of Linux containers, first using
    an existing set of Linux containers tool (LXC) and then switching to a custom-built,
    in-house platform. Docker is probably the most popular container engine technology
    at the moment and the leading provider of tools used to containerize applications.
    In this section, we are going to use Docker tools to containerize the existing
    UUID service application we worked on earlier as part of the Chapter [2](#478313_1_En_2_Chapter.xhtml)
    exercise. Back then we ran it as a Linux systemd service on two compute instance
    running in Oracle Cloud Infrastructure. That time, we hosted just one application
    instance on each compute instance. Now, we are going to build a container image
    that can be run by any number of containers, in this way providing multiple UUID
    API instances on a single machine, as shown in Figure [8-5](#478313_1_En_8_Chapter.xhtml#Fig5).
    Each application will still think it is running alone on a dedicated host, even
    though, in reality, it is sharing the underlying image layers and the Linux kernel
    with all other containers based on the same image and running on the same machine.
    By containerizing the application, you will unlock the possibility to scale the
    entire UUID API horizontally out by adding more containers and hosts with the
    container runtime.


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig5_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Containerized application scalability


    Note


    The code snippets from this book have been tested on macOS and Windows Subsystem
    for Linux. Moreover, all commands should work on major Linux distributions. If
    you are using Windows and do not want to use Windows Subsystem for Linux, you
    can always run Linux on a VM. Furthermore, the majority of code snippets may also
    work in Git Bash on Windows.


    To build an image, you will need a developer machine with Docker tools. In the
    course of this chapter, we are going to provision and use a temporary development
    compute instance with all the required tools installed. I recommend that you follow
    these steps because that will make it easier to use the code snippets and avoid
    platform-specific discrepancies.'
