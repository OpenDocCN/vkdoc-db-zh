  trans: '

    ## 云原生


    什么是云原生？看到 `native` 这个词，我们可以推断，云原生工具或组件是专门针对以云为核心的、业界公认的参考架构而设计和构建的。我们需要一些例子来更好地理解这个术语，以及构成云原生生态系统的各类工具、应用程序和组件。如果我们参考
    CNCF 对 `云原生` 的定义，我们会了解到以下内容：


    > *云原生技术使组织能够在公共云、私有云和混合云等现代化、动态的环境中构建和运行可扩展的应用程序。容器、服务网格、微服务、不可变基础设施和声明式 API
    是这种方法的典型示例。*


    最新的定义可以在 GitHub 上的 [`https://github.com/cncf/toc/blob/master/DEFINITION.md`](https://github.com/cncf/toc/blob/master/DEFINITION.md)
    找到。


    ### 容器与编排


    列举云原生技术时，首先要提到容器。如您所知，容器旨在无论底层主机平台如何，都能以相同的方式工作。要运行容器，需要一个 `容器运行时`。CNCF 的毕业项目之一是
    `containerd`。正如第 8 章所讨论的，`containerd` 是行业标准的容器运行时，负责监督容器的生命周期，处理容器执行、镜像管理以及与主机系统相关的任务，例如底层存储或网络连接。即使您从未听说过
    `containerd`，您也已经间接地使用过它，因为它被 `Docker` 在底层所采用。

    现代架构的解决方案通常由大量容器化的应用程序组成，这些应用程序必须相互交互，并且易于横向扩展或在发生故障时重新调度到其他底层主机节点。换句话说，必须在比单台主机范围更广泛的意义和背景下，关照它们的生命周期。`Kubernetes`
    是 Google 捐赠给基金会的第一个 CNCF 毕业项目。它的任务是为跨多台主机运行和管理容器化应用程序提供一个可插拔的平台。`Kubernetes` 负责容器的生命周期，并确保始终满足期望的状态。例如，如果某个主机节点突然故障，该节点上的容器化应用程序最终将被重新调度（重新创建）到另一个工作节点上，以满足期望的副本数量。`Kubernetes`
    的核心功能被称为 `容器编排与调度`。从开发者的角度来看，它还提供了其他关键特性，例如 API 驱动的声明式 `Kubernetes` 对象，这些对象封装或抽象了应用程序组件，例如称为
    `Pod`、`Service`、`Volume`、`Job`、`Deployment` 等的容器组。您在上一章已经使用过其中几种类型。


    ### 镜像仓库与服务网格


    容器化的应用程序基于多层容器镜像。镜像有自己的生命周期，存储在 `容器镜像仓库` 中。像 `Kubernetes` 这样的容器平台会从镜像仓库动态获取镜像，以根据开发者声明的期望状态创建容器。CNCF
    托管着诸如 `Docker Registry`、`JFrog Artifactory`、`Quay` 和 `Harbor` 等镜像仓库项目。

    容器化服务之间交互的各种非功能性方面，例如安全性或可观测性，可以通过安装在每个 `Kubernetes` Pod 中作为边车容器的轻量级代理来处理。这些代理形成了另一层，称为
    `服务网格`。服务网格简化了容器化服务之间的通信，并提供了开箱即用的功能，如服务发现、重试、负载均衡或熔断。使用服务网格可以减轻开发者实现这些非功能性服务间通信任务的负担。`Linkerd`
    是一个 CNCF 孵化的服务网格项目。您可能也听说过 `Istio`，这是 CNCF 托管的另一个服务网格项目。


    ### 无服务器与更广泛的生态系统


    一种无需任何服务器管理即可运行应用程序的新趋势模型被称为 `无服务器`，它同样属于云原生生态系统。`Fn Project` 是一个从零开始为容器构建的无服务器平台的例证。

    容器运行时、编排平台、镜像仓库、服务网格或无服务器框架只是冰山一角。要构建一个完整的基于云的解决方案，还需要包含许多其他类型的云原生组件，例如服务发现、密钥管理、流处理、消息传递、持续交付、API
    网关、监控、日志记录、追踪等。


    ### CNCF 云原生全景图


    CNCF 使用一个方便的名为 CNCF Cloud Native Landscape 的地图，将其托管的开源项目与精选的专有但仍与生态系统相关的解决方案进行分组，该地图可在
    [`https://landscape.cncf.io`](https://landscape.cncf.io) 获取。这个地图旨在帮助技术负责人和架构师跟上快速变化和演进的云原生技术栈。为了让您对这个生态系统的广度和多样性有一个初步印象，请看图
    9-3。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig3_HTML.jpg](img/478313_1_En_9_Fig3_HTML.jpg)

    *图 9-3 CNCF `云原生全景图`*


    ### Oracle Cloud 与云原生


    本书是关于 Oracle Cloud 的。您在上一章了解了容器。现在，是时候体验云原生开源项目对 Oracle Cloud 的影响了。

    Oracle 是 CNCF 的白金会员。它已向 CNCF 云原生生态系统贡献了一个基于容器的无服务器开源项目，称为 `Fn Project`。Oracle
    Cloud 提供了 `Oracle Kubernetes Engine` (`OKE`)，这是一个完全托管、经过 CNCF 认证的托管 Kubernetes
    引擎。您在上一章已经使用过 `OKE`。Oracle Linux 附带了一个经过认证的 Kubernetes 发行版，可作为 Oracle Container
    Services for Kubernetes 的一部分使用。最后但同样重要的是，两种领先的关系型数据库——开源的 `MySQL` 和专有的 `Oracle
    Database`——都在 CNCF 全景图中被引用。此外，Oracle Cloud 在一定程度上使用了其他 CNCF 开源项目。例如，Oracle Cloud
    Infrastructure 事件符合名为 `CloudEvents` 的行业标准 CNCF 项目所定义的事件结构。


    ### 后续步骤


    是时候做一些动手练习了。我们将深入研究 Oracle Functions，这是一个基于开源 `Fn Project` 的函数即服务（FaaS）。换句话说，让我们来看一下无服务器计算。

    '
- fmt: '## Serverless


    The term `serverless` is becoming another cloud computing buzzword. You might
    think that the name implies that executing a serverless application does not involve
    any servers. Well, this is a bit misleading. There are servers in the backend.
    As always. What this term really emphasizes is that operating a serverless application
    allows you to neglect the backend-related aspects. The runtime and application’s
    lifecycle are completely managed by a particular serverless framework or managed
    serverless service. The latter is commonly associated with the term `function
    as a service` (FaaS). “Function” because serverless applications are usually considered
    as loose packages of stateless functions. A function like that should be designed
    to focus on a single, rather short-running, stateless task.


    A serverless framework or a managed cloud-based serverless service typically instantiates
    a particular function instance only when there is a request incoming or some function
    trigger activated. The instance is usually terminated as soon as the idle time
    interval has elapsed to free the computing resources. In other words, serverless
    function instances are not supposed to be idle. Another important aspect to mention
    is that serverless functions are expected to be scalable. Therefore, a serverless
    framework or a cloud-based FaaS may create many instances of the same serverless
    function in order to be able to serve many parallel requests.


    From a developer’s point of view, serverless implies simplicity. A serverless
    function is typically implemented as a simple handler function that returns a
    result. Depending on the trigger, a function may consume input or read some information
    on its own. For example, an HTTP-based serverless function could process an image
    passed as a binary stream, apply some relatively simple filters, and either return
    the result or persist it in an object storage bucket. Another example could be
    a function that gets executed as soon as some kind of cloud event is captured.
    A new object uploaded to a particular bucket could generate such a cloud event,
    eventually triggering the function. You could come up with many ideas for serverless
    functions. Just remember two key characteristics. Serverless functions are supposed
    to be `stateless` and `short-lasting`. Serverless frameworks often limit the allowed
    maximum function execution time.


    Nowadays, serverless frameworks are expected to support multiple programming languages.
    This allows developers to choose the best language for a given task or simply
    the one they are good at.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig4_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig4_HTML.jpg)


    Figure 9-4 Serverless


    Serverless is not limited to cloud computing. As a matter of fact, there are frameworks
    that let you operate a serverless platform on your local server or development
    machine. The same framework can be then used by a managed cloud-based serverless
    platform. In this way, you can implement and test a function locally, before pushing
    it to the compliant serverless platform in the cloud. This is exactly how we are
    going to work in this chapter. First, you need to set up a client machine for
    serverless development.


    ### Developer VM


    I have prepared infrastructure code to provision a new Ubuntu-based compute instance
    and a subnet required later for Oracle Functions. Please navigate to the `chapter09/1-infrastructure`
    directory, as shown in the following:


    ```

    $ cd ~/git/oci-book/chapter09/1-infrastructure

    $ find . \( -name "*.tf" -o -name "*.yaml" \) | sort

    ./devmachine/cloud-init/ubuntu.config.yaml

    ./devmachine/compute.tf

    ./devmachine/vars.tf

    ./devmachine/vcn.tf

    ./functions/vars.tf

    ./functions/vcn.tf

    ./modules.tf

    ./provider.tf

    ./vars.tf

    ./vcn.tf

    ```


    The `devmachine` module contains the cloud resource definitions required by the
    compute instance that will be used for function development. The `functions` module
    is much simpler and is basically used to create one private subnet with a dedicated
    security list as well as routing table. This subnet will let us control the networking
    context in which Oracle Functions will be executed. We will discuss it later,
    but let’s save some time and get it provisioned together with the compute instance
    for function development. I am not going to discuss each of these files because
    we covered analogous infrastructure code files in earlier chapters. Like always,
    please set the relevant environment variables expected by Terraform.


    ```

    $ source ~/tfvars.env.sh

    ```


    Next, initialize and provision the infrastructure.


    ```

    $ terraform init

    ...

    Terraform has been successfully initialized!

    $ terraform apply

    ...

    Plan: 10 to add, 0 to change, 0 to destroy.

    Do you want to perform these actions?

    Enter a value: yes

    ...

    Apply complete! Resources: 10 added, 0 changed, 0 destroyed.

    Outputs:

    dev_machine_image_name = Canonical-Ubuntu-18.04-2019.08.14-0

    dev_machine_public_ip = 130.61.88.227

    functions_subnet_ocid = ocid1.subnet.oc1....

    ```


    From now on, in the course of this chapter, we are going to work mainly on this
    compute instance. You will be executing a lot of commands on the cloud-based instance.
    These commands will be prefixed with the `[ubuntu@dev-vm]` command prompt. You
    can verify the instance is running in the OCI Console, as shown in Figure 9-5.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig5_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig5_HTML.jpg)


    Figure 9-5 Compute instance for function development


    Let’s go back to the terminal. Terraform outputs three values. We will need two
    of them throughout this chapter, namely, the public IP of the compute instance
    for functions development and the OCID of the subnet. You do not have to note
    the output values. We will be using the `terraform output` command to read them
    on the fly from the state file. The compute instance is based on an operating
    system image with Ubuntu. The infrastructure code uses `cloud-init` to install
    some additional packages required for the exercises including Docker CE as the
    most notable one.


    **Note**

    As you recall, `cloud-init` executes asynchronously. You may need to wait a minute
    or two before the machine is really ready. If you connect before `cloud-init`
    has completed, you will have to reconnect afterward to get the `docker` commands
    to work for the `ubuntu` user without the preceding `sudo`.


    Please connect to the instance and execute the `cat` command, as shown in the
    following, until you see the `DEV machine is running` entry in the `/var/log/syslog`
    file.


    ```

    $ DEV_MACHINE_IP=`terraform output dev_machine_public_ip`

    $ ssh -i ~/.ssh/oci_id_rsa ubuntu@$DEV_MACHINE_IP

    Welcome to Ubuntu 18.04.3 LTS (GNU/Linux 4.15.0-1021-oracle x86_64)

    [ubuntu@dev-vm]$ sudo cat /var/log/syslog | grep "DEV machine"

    Sep 14 12:30:53 dev-vm cloud-init[1799]: DEV machine is running, after 86.18 seconds

    ```


    To validate that the instance has been provisioned as expected, please run one
    of the Docker commands such as `docker version`, `docker images`, or `docker ps`.
    There should be no errors. If you encounter errors because of insufficient privileges,
    you may need to exit and reconnect to the compute instance.


    **Note**

    There is nothing against using your local computer for function development instead
    of the newly provisioned cloud-based compute instance, but, depending on your
    system, you may need to adapt a bit of the commands I am using in this chapter.


    As soon as the compute instance for function development is running as expected,
    we are ready to proceed.'
  raw: '## Serverless


    The term *serverless* is becoming another cloud computing buzzword. You might
    think that the name implies that executing a serverless application does not involve
    any servers. Well, this is a bit misleading. There are servers in the backend.
    As always. What this term really emphasizes is that operating a serverless application
    allows you to neglect the backend-related aspects. The runtime and application’s
    lifecycle are completely managed by a particular serverless framework or managed
    serverless service. The latter is commonly associated with the term *function
    as a service* (FaaS). “Function” because serverless applications are usually considered
    as loose packages of stateless functions. A function like that should be designed
    to focus on a single, rather short-running, stateless task. A serverless framework
    or a managed cloud-based serverless service typically instantiates a particular
    function instance only when there is a request incoming or some function trigger
    activated. The instance is usually terminated as soon as the idle time interval
    has elapsed to free the computing resources. In other words, serverless function
    instances are not supposed to be idle. Another important aspect to mention is
    that serverless functions are expected to be scalable. Therefore, a serverless
    framework or a cloud-based FaaS may create many instances of the same serverless
    function in order to be able to serve many parallel requests. From a developer’s
    point of view, serverless implies simplicity. A serverless function is typically
    implemented as a simple handler function that returns a result. Depending on the
    trigger, a function may consume input or read some information on its own. For
    example, an HTTP-based serverless function could process an image passed as a
    binary stream, apply some relatively simple filters, and either return the result
    or persist it in an object storage bucket. Another example could be a function
    that gets executed as soon as some kind of cloud event is captured. A new object
    uploaded to a particular bucket could generate such a cloud event, eventually
    triggering the function. You could come up with many ideas for serverless functions.
    Just remember two key characteristics. Serverless functions are supposed to be
    *stateless* and *short-lasting*. Serverless frameworks often limit the allowed
    maximum function execution time. Nowadays, serverless frameworks are expected
    to support multiple programming languages. This allows developers to choose the
    best language for a given task or simply the one they are good at. Figure [9-4](#478313_1_En_9_Chapter.xhtml#Fig4)
    illustrates a conceptual use of a sample serverless function. The function is
    triggered by the incoming HTTP requests, and their payload data is processed and
    written to a particular database table.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig4_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Serverless


    Serverless is not limited to cloud computing. As a matter of fact, there are frameworks
    that let you operate a serverless platform on your local server or development
    machine. The same framework can be then used by a managed cloud-based serverless
    platform. In this way, you can implement and test a function locally, before pushing
    it to the compliant serverless platform in the cloud. This is exactly how we are
    going to work in this chapter. First, you need to set up a client machine for
    serverless development.


    ### Developer VM


    I have prepared infrastructure code to provision a new Ubuntu-based compute instance
    and a subnet required later for Oracle Functions. Please navigate to the `chapter09/1-infrastructure`
    directory, as shown in the following:


    ```

    $ cd ~/git/oci-book/chapter09/1-infrastructure

    $ find . \( -name "*.tf" -o -name "*.yaml" \) | sort

    ./devmachine/cloud-init/ubuntu.config.yaml

    ./devmachine/compute.tf

    ./devmachine/vars.tf

    ./devmachine/vcn.tf

    ./functions/vars.tf

    ./functions/vcn.tf

    ./modules.tf

    ./provider.tf

    ./vars.tf

    ./vcn.tf

    ```


    The `devmachine` module contains the cloud resource definitions required by the
    compute instance that will be used for function development. The `functions` module
    is much simpler and is basically used to create one private subnet with a dedicated
    security list as well as routing table. This subnet will let us control the networking
    context in which Oracle Functions will be executed. We will discuss it later,
    but let’s save some time and get it provisioned together with the compute instance
    for function development. I am not going to discuss each of these files because
    we covered analogous infrastructure code files in earlier chapters. Like always,
    please set the relevant environment variables expected by Terraform.


    ```

    $ source ~/tfvars.env.sh

    ```


    Next, initialize and provision the infrastructure.


    ```

    $ terraform init

    ...

    Terraform has been successfully initialized!

    $ terraform apply

    ...

    Plan: 10 to add, 0 to change, 0 to destroy.

    Do you want to perform these actions?

    Enter a value: yes

    ...

    Apply complete! Resources: 10 added, 0 changed, 0 destroyed.

    Outputs:

    dev_machine_image_name = Canonical-Ubuntu-18.04-2019.08.14-0

    dev_machine_public_ip = 130.61.88.227

    functions_subnet_ocid = ocid1.subnet.oc1....

    ```


    From now on, in the course of this chapter, we are going to work mainly on this
    compute instance. You will be executing a lot of commands on the cloud-based instance.
    These commands will be prefixed with `the [ubuntu@dev-vm]` command prompt. You
    can verify the instance is running in the OCI Console, as shown in Figure [9-5](#478313_1_En_9_Chapter.xhtml#Fig5).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig5_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Compute instance for function development


    Let’s go back to the terminal. Terraform outputs three values. We will need two
    of them throughout this chapter, namely, the public IP of the compute instance
    for functions development and the OCID of the subnet. You do not have to note
    the output values. We will be using the `terraform output` command to read them
    on the fly from the state file. The compute instance is based on an operating
    system image with Ubuntu. The infrastructure code uses `cloud-init` to install
    some additional packages required for the exercises including Docker CE as the
    most notable one.


    Note


    As you recall, `cloud-init` executes asynchronously. You may need to wait a minute
    or two before the machine is really ready. If you connect before cloud-init has
    completed, you will have to reconnect afterward to get the `docker` commands to
    work for the `ubuntu` user without the preceding `sudo`.


    Please connect to the instance and execute the `cat` command , as shown in the
    following, until you see the `DEV machine is running` entry in the `/var/log/syslog`
    file.


    ```

    $ DEV_MACHINE_IP=`terraform output dev_machine_public_ip`

    $ ssh -i ~/.ssh/oci_id_rsa ubuntu@$DEV_MACHINE_IP

    Welcome to Ubuntu 18.04.3 LTS (GNU/Linux 4.15.0-1021-oracle x86_64)

    [ubuntu@dev-vm]$ sudo cat /var/log/syslog | grep "DEV machine"

    Sep 14 12:30:53 dev-vm cloud-init[1799]: DEV machine is running, after 86.18 seconds

    ```


    To validate that the instance has been provisioned as expected, please run one
    of the Docker commands such as `docker version`, `docker images`, or `docker ps`.
    There should be no errors. If you encounter errors because of insufficient privileges,
    you may need to exit and reconnect to the compute instance.


    Note


    There is nothing against using your local computer for function development instead
    of the newly provisioned cloud-based compute instance, but, depending on your
    system, you may need to adapt a bit of the commands I am using in this chapter.


    As soon as the compute instance for function development is running as expected,
    we are ready to proceed.'
  trans: '

    ## 无服务器


    `serverless`（无服务器）这个词正在成为另一个云计算领域的流行语。你可能认为这个名字暗示着执行一个无服务器应用不涉及任何服务器。嗯，这有点误导性。后端依然存在服务器。一如既往。这个术语真正强调的是，操作无服务器应用让你可以忽略后端相关的方面。运行时和应用程序的生命周期完全由特定的无服务器框架或托管的无服务器服务管理。后者通常与术语`函数即服务`（FaaS）相关联。“函数”是因为无服务器应用通常被视为无状态函数的松散组合。这样一个函数应该被设计为专注于单一的、运行时间相对较短的无状态任务。


    无服务器框架或基于云的托管无服务器服务通常只在有请求进入或某个函数触发器被激活时，才实例化特定的函数实例。一旦空闲时间间隔结束，该实例通常就会被终止，以释放计算资源。换句话说，无服务器函数实例不应该处于空闲状态。另一个需要提及的重要方面是，无服务器函数需要具备可扩展性。因此，无服务器框架或基于云的
    FaaS 可能会创建同一无服务器函数的多个实例，以便能够处理许多并行请求。


    从开发者的角度来看，无服务器意味着简单。一个无服务器函数通常被实现为一个简单的处理函数，它返回一个结果。根据触发器的不同，一个函数可能自行消费输入或读取某些信息。例如，一个基于
    HTTP 的无服务器函数可以处理作为二进制流传递的图像，应用一些相对简单的过滤器，然后返回结果或将其持久化存储到一个对象存储桶中。另一个例子可能是当捕获到某种云事件时立即执行的函数。向特定桶上传一个新对象可能会产生这样的云事件，最终触发该函数。你可以为无服务器函数构思许多想法。只需记住两个关键特性：无服务器函数应该是`无状态的`和`短寿命的`。无服务器框架通常限制允许的最大函数执行时间。


    如今，无服务器框架有望支持多种编程语言。这使得开发者可以为特定任务选择最佳语言，或者简单地选择他们擅长的那种。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig4_HTML.jpg](img/478313_1_En_9_Fig4_HTML.jpg)


    图 9-4 无服务器


    无服务器并不局限于云计算。事实上，有些框架让你可以在本地服务器或开发机器上运行无服务器平台。然后，基于云的托管无服务器平台可以使用相同的框架。这样，你可以在本地实现和测试一个函数，然后再将其推送到云端兼容的无服务器平台。这正是我们在本章中将要采用的工作方式。首先，你需要为无服务器开发设置一台客户端机器。


    ### 开发者虚拟机


    我准备了基础架构代码，用于配置一个新的基于 Ubuntu 的计算实例以及稍后 Oracle Functions 所需的子网。请导航到 `chapter09/1-infrastructure`
    目录，如下所示：


    ```

    $ cd ~/git/oci-book/chapter09/1-infrastructure

    $ find . \( -name "*.tf" -o -name "*.yaml" \) | sort

    ./devmachine/cloud-init/ubuntu.config.yaml

    ./devmachine/compute.tf

    ./devmachine/vars.tf

    ./devmachine/vcn.tf

    ./functions/vars.tf

    ./functions/vcn.tf

    ./modules.tf

    ./provider.tf

    ./vars.tf

    ./vcn.tf

    ```


    `devmachine` 模块包含了用于函数开发的计算实例所需的云资源定义。`functions` 模块则简单得多，基本上用于创建一个私有子网，该子网带有专用的安全列表和路由表。这个子网将使我们能够控制
    Oracle Functions 执行的环境网络上下文。我们稍后会讨论它，但让我们节省一些时间，将其与用于函数开发的计算实例一起配置。我不会讨论每个文件，因为我们在前面的章节中已经讨论过类似的基础设施代码文件。像往常一样，请设置
    Terraform 所期望的相关环境变量。


    ```

    $ source ~/tfvars.env.sh

    ```


    接下来，初始化并配置基础设施。


    ```

    $ terraform init

    ...

    Terraform has been successfully initialized!

    $ terraform apply

    ...

    Plan: 10 to add, 0 to change, 0 to destroy.

    Do you want to perform these actions?

    Enter a value: yes

    ...

    Apply complete! Resources: 10 added, 0 changed, 0 destroyed.

    Outputs:

    dev_machine_image_name = Canonical-Ubuntu-18.04-2019.08.14-0

    dev_machine_public_ip = 130.61.88.227

    functions_subnet_ocid = ocid1.subnet.oc1....

    ```


    从现在开始，在本章中，我们将主要在这台计算实例上工作。你将在这个基于云的实例上执行大量命令。这些命令将以 `[ubuntu@dev-vm]` 命令提示符为前缀。你可以在
    OCI 控制台中验证实例是否正在运行，如图 9-5 所示。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig5_HTML.jpg](img/478313_1_En_9_Fig5_HTML.jpg)


    图 9-5 用于函数开发的计算实例


    让我们回到终端。Terraform 输出了三个值。在本章中，我们将需要用到其中两个，即用于函数开发的计算实例的公有 IP 地址和子网的 OCID。你不需要记下这些输出值。我们将使用
    `terraform output` 命令直接从状态文件中读取它们。该计算实例基于一个带有 Ubuntu 的操作系统镜像。基础架构代码使用 `cloud-init`
    来安装练习所需的一些额外包，其中最著名的是 Docker CE。


    **注意**

    如你所知，`cloud-init` 是异步执行的。你可能需要等待一两分钟，机器才真正准备就绪。如果你在 `cloud-init` 完成之前连接，你将需要在之后重新连接，以便
    `docker` 命令能为 `ubuntu` 用户工作，而无需在前面加上 `sudo`。


    请连接到实例并执行 `cat` 命令，如下所示，直到你在 `/var/log/syslog` 文件中看到 `DEV machine is running`
    条目。


    ```

    $ DEV_MACHINE_IP=`terraform output dev_machine_public_ip`

    $ ssh -i ~/.ssh/oci_id_rsa ubuntu@$DEV_MACHINE_IP

    Welcome to Ubuntu 18.04.3 LTS (GNU/Linux 4.15.0-1021-oracle x86_64)

    [ubuntu@dev-vm]$ sudo cat /var/log/syslog | grep "DEV machine"

    Sep 14 12:30:53 dev-vm cloud-init[1799]: DEV machine is running, after 86.18 seconds

    ```


    为了验证实例是否按预期配置，请运行一些 Docker 命令，例如 `docker version`、`docker images` 或 `docker ps`。应该没有任何错误。如果你因权限不足而遇到错误，你可能需要退出并重新连接到计算实例。


    **注意**

    如果你的系统允许，使用本地计算机进行函数开发而不是新配置的基于云的计算实例也没有问题，但根据你的系统，你可能需要对本章中使用的一些命令进行调整。


    一旦用于函数开发的计算实例按预期运行，我们就可以继续下一步了。

    '
- fmt: '### Fn Project


    Serverless functions execute on `serverless platforms` that isolate function developers
    from the underlying infrastructure and provide all the required function lifecycle
    services. CNCF lists a couple of serverless platforms as a part of its cloud-native
    landscape. One of them is Fn Project. Fn Project is a container-based serverless
    platform that supports multiple programming languages including Golang, Java,
    and Python. The project was open sourced in 2017 and can be found on GitHub at
    [`https://github.com/fnproject`](https://github.com/fnproject), as shown in Figure
    [9-6](#478313_1_En_9_Chapter.xhtml#Fig6).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig6_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Fn Project on GitHub


    We are going to implement two simple functions in Python and run them initially
    on a local Fn Project installation. Later, you will take one of them and deploy
    it with no code changes to Oracle Functions, which is a managed function-as-a-service
    platform on Oracle Cloud.


    #### Installation and Configuration


    First, make sure you are still connected to the newly provisioned compute instance.
    To install Fn Project, you just need to execute this neat one-liner:


    ```

    [ubuntu@dev-vm]$ curl -LSs https://raw.githubusercontent.com/fnproject/cli/master/install
    | sh

    fn version 0.5.86

    ______

    / ____/___

    / /_  / __ \

    / __/ / / / /

    /_/   /_/ /_/`

    [ubuntu@dev-vm]$ fn version

    Client version is latest version: 0.5.86

    Server version:  ?

    ```


    The Fn Project client binary `fn` has been installed, and the `~/.fn` directory
    tree for client configuration files have been initialized. To proceed with local
    development and testing, we need to start a local Fn server. To do so, you will
    use the `fn start` command. The local Fn server is implemented as a Docker container.
    The command will download the newest container image and start the Fn server container.


    ```

    [ubuntu@dev-vm]$ fn start -d

    [1] 4971

    Unable to find image ''fnproject/fnserver:latest'' locally

    latest: Pulling from fnproject/fnserver

    ...

    Status: Downloaded newer image for fnproject/fnserver:latest

    ```


    We used the `-d` flag (the `d` stands for detached mode) to execute the local
    Fn server container in the background. This will allow us to continue working
    in the same Terminal session.


    The container-based server architecture makes Fn Project an ideal candidate for
    building serverless platforms simply because it can run anywhere as a container.
    Let’s see its image and the container.


    ```

    [ubuntu@dev-vm]$ docker images

    REPOSITORY          TAG     IMAGE ID      CREATED      SIZE

    fnproject/fnserver  latest  e63938b4a8e1  12 days ago  161MB

    [ubuntu@dev-vm]$ docker ps

    IMAGE                      PORTS                      NAMES

    fnproject/fnserver:latest  2375/tcp,*:8080->8080/tcp  fnserver

    ```


    To see the Fn server logs at any time, you can apply the `docker logs` command.


    ```

    [ubuntu@dev-vm]$ docker logs fnserver

    time="2019-09-16T17:04:43Z" level=info msg="Registering data store provider ''sql''"

    time="2019-09-16T17:04:43Z" level=info msg="Connecting to DB" url="sqlite3:///app/data/fn.db"

    ...

    time="2019-09-16T17:04:43Z" level=info msg="Fn serving on `:8080`" type=full version=0.3.731

    ```


    The `fnserver` container is created from the `fnproject/fnserver` image. The `fnserver`
    performs all the metadata as well as lifecycle management tasks for functions.
    Fn Project functions are deployed individually as separate container images. When
    triggered, the `fnserver` instantiates a function-specific container based on
    a particular function-specific image to handle the function call. If there are
    parallel function calls, the Fn server may decide to create more containers for
    the same function. Function metadata, on the other hand, in the case of a local
    Fn Project installation, is stored in the local filesystem using a file-based,
    embeddable relational database called SQLite. The default SQLite file location
    is `.fn/data/fn.db`. If you really are curious, you can access this function metadata
    database file using the `sqlite3` client. This will make sense only after we have
    defined and deployed some functions. At the moment, our local SQLite-based function
    metadata database is still empty. Looking further, the connectivity-related client-side
    configuration is stored in the form of configuration files called `contexts`.
    The `fn` client will use dedicated contexts for each Fn Project platform you are
    working with, no matter if the platform is local, on-premise, or cloud-based.
    The context files will be stored in the `.fn/contexts` directory in the form of
    YAML files.


    ```

    /home/ubuntu/.fn/

    ├── config.yaml

    ├── contexts

    │   └── default.yaml

    ├── data

    │   └── fn.db

    └── iofs

    ```


    Let’s use the `fn` tool to list all the contexts.


    ```

    [ubuntu@dev-vm]$ fn list contexts

    CURRENT NAME.    PROVIDER  API URL.                REGISTRY

    Default  default   http://localhost:8080

    ```


    Because this is a new local Fn Project installation, there is only one, actually
    still incomplete and nonfunctional, context called the `default` context. Before
    we move on and add any missing configuration to allow local function development,
    I would like you to understand the three important pieces of information defined
    by an Fn client context. These are the following:


    *   Fn Project server API endpoint of the target platform


    *   Container registry to store function-specific images


    *   Provider that defines a set of properties for the target platform


    The client is able to interact with multiple Fn Project platforms. At any given
    moment, however, the client works with a single platform, the one defined by the
    current context. To set the current context, you use the `fn use context` command.


    ```

    [ubuntu@dev-vm]$ fn use context default

    Now using context: default

    ```


    As I mentioned a few moments ago, function instances are executed as containers
    that are based on function-specific images. You use the `fn` client to deploy
    a function. What does it mean to deploy a function in a container-based serverless
    environment? The `function deployment` involves building and pushing a new function-specific
    container image to a container image registry. The registry is defined by the
    current context. For local development, it is sufficient to store images on the
    local machine. To do so, we will use the `--local` option while executing the
    `fn deploy` command. Images will be prefixed with the name set for the registry
    in the current contexts. Let’s use `localdev` as the name. To update the current
    context, please use the `fn update context` command like this:


    ```

    [ubuntu@dev-vm]$ fn update context registry localdev

    Current context updated registry with localdev

    [ubuntu@dev-vm]$ fn list contexts

    CURRENT NAME     PROVIDER  API URL                REGISTRY

    *  default  default   http://localhost:8080  localdev

    ```


    We can move into developing and deploying a first function.'
  raw: '### Fn Project


    Serverless functions execute on *serverless platforms* that isolate function developers
    from the underlying infrastructure and provide all the required function lifecycle
    services. CNCF lists a couple of serverless platforms as a part of its cloud-native
    landscape. One of them is Fn Project. Fn Project is a container-based serverless
    platform that supports multiple programming languages including Golang, Java,
    and Python. The project was open sourced in 2017 and can be found on GitHub at
    [`https://github.com/fnproject`](https://github.com/fnproject), as shown in Figure
    [9-6](#478313_1_En_9_Chapter.xhtml#Fig6).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig6_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Fn Project on GitHub


    We are going to implement two simple functions in Python and run them initially
    on a local Fn Project installation. Later, you will take one of them and deploy
    it with no code changes to Oracle Functions, which is a managed function-as-a-service
    platform on Oracle Cloud.


    #### Installation and Configuration


    First, make sure you are still connected to the newly provisioned compute instance.
    To install Fn Project, you just need to execute this neat one-liner:


    ```

    [ubuntu@dev-vm]$ curl -LSs https://raw.githubusercontent.com/fnproject/cli/master/install
    | sh

    fn version 0.5.86

    ______

    / ____/___

    / /_  / __ \

    / __/ / / / /

    /_/   /_/ /_/`

    [ubuntu@dev-vm]$ fn version

    Client version is latest version: 0.5.86

    Server version:  ?

    ```


    The Fn Project client binary `fn` has been installed, and the `~/.fn` directory
    tree for client configuration files have been initialized. To proceed with local
    development and testing, we need to start a local Fn server. To do so, you will
    use the `fn start` command. The local Fn server is implemented as a Docker container.
    The command will download the newest container image and start the Fn server container.


    ```

    [ubuntu@dev-vm]$ fn start -d

    [1] 4971

    Unable to find image ''fnproject/fnserver:latest'' locally

    latest: Pulling from fnproject/fnserver

    ...

    Status: Downloaded newer image for fnproject/fnserver:latest

    ```


    We used the `-d` flag (the `d` stands for detached mode) to execute the local
    Fn server container in the background. This will allow us to continue working
    in the same Terminal session.


    The container-based server architecture makes Fn Project an ideal candidate for
    building serverless platforms simply because it can run anywhere as a container.
    Let’s see its image and the container.


    ```

    [ubuntu@dev-vm]$ docker images

    REPOSITORY          TAG     IMAGE ID      CREATED      SIZE

    fnproject/fnserver  latest  e63938b4a8e1  12 days ago  161MB

    [ubuntu@dev-vm]$ docker ps

    IMAGE                      PORTS                      NAMES

    fnproject/fnserver:latest  2375/tcp,*:8080->8080/tcp  fnserver

    ```


    To see the Fn server logs at any time, you can apply the `docker logs` command
    .


    ```

    [ubuntu@dev-vm]$ docker logs fnserver

    time="2019-09-16T17:04:43Z" level=info msg="Registering data store provider ''sql''"

    time="2019-09-16T17:04:43Z" level=info msg="Connecting to DB" url="sqlite3:///app/data/fn.db"

    ...

    time="2019-09-16T17:04:43Z" level=info msg="Fn serving on `:8080`" type=full version=0.3.731

    ```


    The `fnserver` container is created from the `fnproject/fnserver` image. The `fnserver`
    performs all the metadata as well as lifecycle management tasks for functions.
    Fn Project functions are deployed individually as separate container images. When
    triggered, the `fnserver` instantiates a function-specific container based on
    a particular function-specific image to handle the function call. If there are
    parallel function calls, the Fn server may decide to create more containers for
    the same function. Function metadata, on the other hand, in the case of a local
    Fn Project installation, is stored in the local filesystem using a file-based,
    embeddable relational database called SQLite. The default SQLite file location
    is `.fn/data/fn.db`. If you really are curious, you can access this function metadata
    database file using the `sqlite3` client. This will make sense only after we have
    defined and deployed some functions. At the moment, our local SQLite-based function
    metadata database is still empty. Looking further, the connectivity-related client-side
    configuration is stored in the form of configuration files called *contexts*.
    The `fn` client will use dedicated contexts for each Fn Project platform you are
    working with, no matter if the platform is local, on-premise, or cloud-based.
    The context files will be stored in `the .fn/contexts` directory in the form of
    YAML files.


    ```

    /home/ubuntu/.fn/

    ├── config.yaml

    ├── contexts

    │   └── default.yaml

    ├── data

    │   └── fn.db

    └── iofs

    ```


    Let’s use the `fn` tool to list all the contexts.


    ```

    [ubuntu@dev-vm]$ fn list contexts

    CURRENT NAME.    PROVIDER  API URL.                REGISTRY

    Default  default   http://localhost:8080

    ```


    Because this is a new local Fn Project installation, there is only one, actually
    still incomplete and nonfunctional, context called the `default` context. Before
    we move on and add any missing configuration to allow local function development,
    I would like you to understand the three important pieces of information defined
    by an Fn client context. These are the following:


    *   Fn Project server API endpoint of the target platform


    *   Container registry to store function-specific images


    *   Provider that defines a set of properties for the target platform


    The client is able to interact with multiple Fn Project platforms. At any given
    moment, however, the client works with a single platform, the one defined by the
    current context. To set the current context, you use the `fn use context` command.


    ```

    [ubuntu@dev-vm]$ fn use context default

    Now using context: default

    ```


    As I mentioned a few moments ago, function instances are executed as containers
    that are based on function-specific images. You use the `fn` client to deploy
    a function. What does it mean to deploy a function in a container-based serverless
    environment? The *function deployment* involves building and pushing a new function-specific
    container image to a container image registry. The registry is defined by the
    current context. For local development, it is sufficient to store images on the
    local machine. To do so, we will use the `--local` option while executing the
    `fn deploy` command. Images will be prefixed with the name set for the registry
    in the current contexts. Let’s use `localdev` as the name. To update the current
    context, please use the `fn update context` command like this:


    ```

    [ubuntu@dev-vm]$ fn update context registry localdev

    Current context updated registry with localdev

    [ubuntu@dev-vm]$ fn list contexts

    CURRENT NAME     PROVIDER  API URL                REGISTRY

    *  default  default   http://localhost:8080  localdev

    ```


    We can move into developing and deploying a first function.'
  trans: '

    ### Fn Project


    无服务器函数在`无服务器平台`上执行，这些平台将函数开发者与底层基础设施隔离开来，并提供所有必需的函数生命周期服务。CNCF（云原生计算基金会）将几个无服务器平台列为其云原生全景图的一部分。其中之一就是
    Fn Project。Fn Project 是一个基于容器的无服务器平台，支持多种编程语言，包括 Golang、Java 和 Python。该项目于 2017
    年开源，其 GitHub 地址为 [`https://github.com/fnproject`](https://github.com/fnproject)，如图
    9-6 所示。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig6_HTML.jpg](img/478313_1_En_9_Fig6_HTML.jpg)


    图 9-6


    GitHub 上的 Fn Project


    我们将用 Python 实现两个简单的函数，并首先在本地的 Fn Project 安装上运行它们。稍后，你将选择其中一个，在不做任何代码更改的情况下，将其部署到
    Oracle Functions——这是 Oracle Cloud 上的一个托管函数即服务平台。


    #### 安装与配置


    首先，确保你仍然连接到新创建的计算实例。要安装 Fn Project，只需执行这条简洁的单行命令：


    ```

    [ubuntu@dev-vm]$ curl -LSs https://raw.githubusercontent.com/fnproject/cli/master/install
    | sh

    fn version 0.5.86

    ______

    / ____/___

    / /_  / __ \

    / __/ / / / /

    /_/   /_/ /_/`

    [ubuntu@dev-vm]$ fn version

    Client version is latest version: 0.5.86

    Server version:  ?

    ```


    Fn Project 客户端二进制文件 `fn` 已安装，并且用于存储客户端配置文件的 `~/.fn` 目录树也已初始化。为了继续进行本地开发和测试，我们需要启动一个本地的
    Fn 服务器。为此，你将使用 `fn start` 命令。本地的 Fn 服务器是作为一个 Docker 容器实现的。该命令将下载最新的容器镜像并启动 Fn
    服务器容器。


    ```

    [ubuntu@dev-vm]$ fn start -d

    [1] 4971

    Unable to find image ''fnproject/fnserver:latest'' locally

    latest: Pulling from fnproject/fnserver

    ...

    Status: Downloaded newer image for fnproject/fnserver:latest

    ```


    我们使用了 `-d` 标志（`d` 代表分离模式）在后台执行本地的 Fn 服务器容器。这将允许我们在同一个终端会话中继续工作。


    基于容器的服务器架构使得 Fn Project 成为构建无服务器平台的理想选择，仅仅因为它可以作为容器在任何地方运行。让我们看看它的镜像和容器。


    ```

    [ubuntu@dev-vm]$ docker images

    REPOSITORY          TAG     IMAGE ID      CREATED      SIZE

    fnproject/fnserver  latest  e63938b4a8e1  12 days ago  161MB

    [ubuntu@dev-vm]$ docker ps

    IMAGE                      PORTS                      NAMES

    fnproject/fnserver:latest  2375/tcp,*:8080->8080/tcp  fnserver

    ```


    要随时查看 Fn 服务器日志，你可以应用 `docker logs` 命令。


    ```

    [ubuntu@dev-vm]$ docker logs fnserver

    time="2019-09-16T17:04:43Z" level=info msg="Registering data store provider ''sql''"

    time="2019-09-16T17:04:43Z" level=info msg="Connecting to DB" url="sqlite3:///app/data/fn.db"

    ...

    time="2019-09-16T17:04:43Z" level=info msg="Fn serving on `:8080`" type=full version=0.3.731

    ```


    `fnserver` 容器是从 `fnproject/fnserver` 镜像创建的。`fnserver` 执行所有函数的元数据以及生命周期管理任务。Fn
    Project 函数是作为单独的容器镜像单独部署的。当被触发时，`fnserver` 会基于特定的函数镜像实例化一个函数专用的容器来处理该函数调用。如果有并行的函数调用，Fn
    服务器可能会决定为同一个函数创建更多容器。另一方面，在本地 Fn Project 安装的情况下，函数元数据使用一个名为 SQLite 的基于文件的可嵌入关系数据库存储在本地文件系统中。默认的
    SQLite 文件位置是 `.fn/data/fn.db`。如果你实在好奇，可以使用 `sqlite3` 客户端访问此函数元数据数据库文件。这只有在我们定义并部署了一些函数后才有意义。目前，我们本地的基于
    SQLite 的函数元数据数据库仍然是空的。进一步看，连接相关的客户端配置以名为 `contexts`（上下文）的配置文件形式存储。`fn` 客户端将为你正在使用的每个
    Fn Project 平台使用专用的上下文，无论该平台是本地的、本地部署的还是基于云的。上下文文件将以 YAML 文件的形式存储在 `.fn/contexts`
    目录中。


    ```

    /home/ubuntu/.fn/

    ├── config.yaml

    ├── contexts

    │   └── default.yaml

    ├── data

    │   └── fn.db

    └── iofs

    ```


    让我们使用 `fn` 工具列出所有的上下文。


    ```

    [ubuntu@dev-vm]$ fn list contexts

    CURRENT NAME.    PROVIDER  API URL.                REGISTRY

    Default  default   http://localhost:8080

    ```


    由于这是一个新的本地 Fn Project 安装，只有一个名为 `default` 的上下文，实际上它还不完整且无法使用。在我们继续并添加任何缺失的配置以允许本地函数开发之前，我希望你理解
    Fn 客户端上下文定义的三个重要信息组成部分。它们如下：


    *   目标平台的 Fn Project 服务器 API 端点

    *   用于存储函数专用镜像的容器注册表

    *   定义目标平台属性集的提供者


    客户端能够与多个 Fn Project 平台交互。然而，在任何给定时刻，客户端只与单个平台（即由当前上下文定义的那个平台）协同工作。要设置当前上下文，你使用
    `fn use context` 命令。


    ```

    [ubuntu@dev-vm]$ fn use context default

    Now using context: default

    ```


    正如我之前提到的，函数实例作为基于函数专用镜像的容器执行。你使用 `fn` 客户端来部署函数。在基于容器的无服务器环境中部署函数意味着什么？`函数部署` 涉及构建一个新的函数专用容器镜像并将其推送到容器镜像注册表。注册表由当前上下文定义。对于本地开发，将镜像存储在本地机器上就足够了。为此，我们在执行
    `fn deploy` 命令时将使用 `--local` 选项。镜像将以当前上下文中为注册表设置的名称为前缀。让我们使用 `localdev` 作为名称。要更新当前上下文，请像这样使用
    `fn update context` 命令：


    ```

    [ubuntu@dev-vm]$ fn update context registry localdev

    Current context updated registry with localdev

    [ubuntu@dev-vm]$ fn list contexts

    CURRENT NAME     PROVIDER  API URL                REGISTRY

    *  default  default   http://localhost:8080  localdev

    ```


    我们可以开始开发和部署第一个函数了。

    '
- fmt: '### Your First Function


    Serverless `functions` are meant to be stateless and perform one, relatively short
    task. Fn Project is able to run functions implemented in various programming languages.
    At the time of writing, these are Java, Golang, Python, JavaScript (with Node.js),
    Ruby, and C# (using .NET Core). You do not need to install any development tools
    for these languages. The code will execute within function-specific containers.
    In addition to using Terraform for the infrastructure code, this book is Python-oriented.
    To stay consistent with the rest of code examples, we will be using Python for
    function development. Later, after completing the exercises from this chapter,
    feel free to play with other languages. For now, let’s use the `fn init` command
    to bootstrap a Python-based function stub like this:


    ```bash

    [ubuntu@dev-vm]$ fn init --runtime python blankfn

    Creating function at: ./blankfn

    Function boilerplate generated.

    func.yaml created.

    [ubuntu@dev-vm]$ tree blankfn/

    blankfn/

    ├── func.py

    ├── func.yaml

    └── requirements.txt

    ```


    The `fn init` command was executed with the `--runtime python` option. As a result,
    the `func.py` function stub has been created and uses Python as the programming
    language. In addition, the command creates the `func.yaml` function configuration
    file shown in Listing 9-1.


    ```yaml

    schema_version: 20180708

    name: blankfn

    version: 0.0.1

    runtime: python

    entrypoint: /python/bin/fdk /function/func.py handler

    memory: 256

    Listing 9-1

    blankfn/func.yaml

    ```


    The function configuration file can be used to fine-tune the function build process
    and execution characteristics such as allocated memory or maximum time the function
    is allowed to run. A couple of properties are used while building the function-specific
    container image. For example, it is possible to adjust the base image for the
    function.


    In the previous chapters, we already worked with the `requirements.txt` file.
    This file is used to provide a list of Python packages your function is dependent
    on. You denote which Python packages your function requires, and the `pip` tool
    installs them as a new layer to the function-specific container image. Listing
    9-2 presents the `requirements.txt` file created inside the function directory.
    Our function stub references only the `fdk` Python package. The `fdk` package
    is the function developer kit for Python maintained by Fn Project. It is primarily
    needed to handle the input and output of the function. If you ever need any additional
    Python packages to implement a bit more sophisticated functions, this will be
    the file to add them.


    ```txt

    fdk

    Listing 9-2

    blankfn/requirements.txt

    ```


    The `cloud-init` configuration , which is processed on the first boot of our compute
    instance, fetches a trivial function code file called `blankfn`. The code is downloaded
    from the code repository associated with the book and placed in the `~/functions`
    directory. Let’s replace the function stub created by the `fn init` command with
    the `blankfn.py` file like this:


    ```bash

    [ubuntu@dev-vm]$ cp ~/functions/blankfn.py ~/blankfn/func.py

    ```


    Listing 9-3 presents the code for that function.


    ```python

    import io

    import json

    from fdk import response

    def handler(ctx, data: io.BytesIO=None):

    res_str = json.dumps({"message": "blank message"})

    headers_dict={"Content-Type": "application/json"}

    rsp = response.Response(ctx, response_data=res_str, headers=headers_dict)

    return rsp

    Listing 9-3

    blankfn/func.py

    ```


    The `blankfn` function always returns a static text. I have created this function
    to provide you with the easiest Python-based Fn Project development experience.
    Generally speaking, your role as a function developer is to implement the function
    handler. If you look at the code presented in Listing 9-3, you will see that the
    function handler returns an `fdk.response.Response` object fed with the `response_data`
    string that holds a JSON objects with a meaningless test message. Additionally,
    the function handler code sets the `headers` dictionary set in the HTTP header.
    By default, if no trigger is explicitly stated in the function’s configuration
    file, the HTTP trigger is applied, and we should treat the output as an HTTP response.


    Before we build the function-specific container image, we have to create an application.
    An application is merely a logical construct. You use the `fn create app` command
    to register a new application in the Fn server pointed at with the current context,
    which is, in our case, the local Fn server running as `the fnserver` container.
    We will use `blankapp` for the new application and register it like this:


    ```bash

    [ubuntu@dev-vm]$ fn create app blankapp

    Successfully created app:  blankapp

    [ubuntu@dev-vm]$ fn list apps

    NAME.     ID

    blankapp  01DMQZJPDDNG8G00GZJ0000006

    ```


    The `fn list apps` command shows the newly registered application. We are ready
    to build and deploy the function. To do so, enter the `blankfn` function directory
    and run the `fn deploy` command like this:


    ```bash

    [ubuntu@dev-vm]$ cd blankfn

    [ubuntu@dev-vm]$ fn --verbose deploy --app blankapp --local

    Deploying blankfn to app: blankapp

    Bumped to version 0.0.2

    Building image localdev/blankfn:0.0.2

    FN_REGISTRY:  localdev

    Current Context:  default

    ...

    Successfully built 29e36845273a

    Successfully tagged localdev/blankfn:0.0.2

    Updating function blankfn using image localdev/blankfn:0.0.2...

    Successfully created function: blankfn with localdev/blankfn:0.0.2

    ```


    The `fn deploy` command reads the `func.yaml` function configuration file it finds
    in the current directory to create the function-specific container image. The
    file that stores the function code and the corresponding `requirements.txt` file
    are added to the container image. Using the `--local` option stores the image
    on the client machine. If you had left it out, the `fn` client would have attempted
    to push the image to the `localdev` repository on Docker Hub, which is not our
    intention here. The `--verbose` option lets us see the output from the image build.
    This is an ordinary `docker build` output enriched with some side operations from
    the `fn` client. All in all, the function is ready. Let’s inspect the function
    metadata to confirm that everything went fine. To do so, use the `fn list functions`
    command.


    ```bash

    [ubuntu@dev-vm]$ fn list functions blankapp

    NAME     IMAGE                     ID

    blankfn  localdev/blankfn:0.0.2  01DMQZNA73NG8G00GZJ0000007

    ```


    At the moment, the `blankapp` application references one function called `blankfn`.
    Function instances will be created as containers based on the `localdev/blankfn:0.0.2`
    container image. You can see the image like this:


    ```bash

    [ubuntu@dev-vm]$ docker images | grep blank

    localdev/blankfn   0.0.2   e3cdfd6089b4   2 minutes ago   344MB

    ```


    At the moment, there is only the local `fnserver` container running, as shown
    by the following `docker ps` command:


    ```bash

    [ubuntu@dev-vm]$ docker ps --format ''{{.Names}} [{{.Image}}] {{.Status}}''

    fnserver [fnproject/fnserver:latest] Up 4 minutes

    ```


    Let me repeat: function instances will be created as separate containers. The
    local `fnserver` coordinates function containers, which are created on the fly
    when functions are triggered. Equipped with that knowledge, you should know what
    to expect. This is how you make your first serverless function call using the
    `fn invoke` command:


    ```bash

    [ubuntu@dev-vm]$ fn invoke blankapp blankfn

    {"message": "blank message"}

    ```'
