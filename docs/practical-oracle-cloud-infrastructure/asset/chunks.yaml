    Dockerfile 包含一系列按声明顺序执行的指令。第一条指令始终是`FROM`指令，它定义了我们要为新构建的镜像使用的基础镜像。如前所述，我们将利用 Docker
    Hub 镜像注册表中一个名为`python:3-alpine`的官方 Python 镜像。接下来的三条`ENV`指令设置了 Flask 微框架开发 Web
    服务器使用的三个环境变量。`FLASK_APP`指向 API 实现文件的路径，而`FLASK_ENV`和`FLASK_DEBUG`则用于调整服务器的输出。`EXPOSE`指令声明了端口
    5000，这是 Flask 服务器监听传入请求的默认端口。该指令的作用主要是信息性的，因为端口暴露设置仅在运行容器时生效。`WORKDIR`指令为后续的`COPY`、`RUN`和`CMD`指令在虚拟容器文件系统内设置了工作目录。`COPY`指令的第一次出现创建了一个镜像文件系统层，其中包含了从开发者机器复制的`requirements.txt`文件。`RUN`命令执行`pip
    install`命令，该命令实际安装了 Flask 微框架。安装结果被持久化为另一个文件系统层。`COPY`命令的第二次出现将`app.py`脚本作为又一个文件系统层添加到容器镜像中。总而言之，每条指令都会生成一个文件系统层。其中一些是临时层，而另一些则被包含在最终的容器镜像中。与之前的`RUN`指令相反，最后一条指令，即`CMD`指令，并不会被执行，因此不会基于给定命令的结果产生任何额外的镜像层。`CMD`指令的作用是告知
    Docker 引擎，对于使用此镜像启动的每个新创建的容器，应该执行什么命令。在我们的例子中，每个新创建的容器基本上都会使用`flask run`命令来启动
    Flask 微框架开发 Web 服务器。因此，Flask 服务器将公开在`app.py`文件中实现的 API，其路径已设置在`FLASK_APP`环境变量中。


    要触发镜像构建过程，请使用`docker build`命令。`-t`参数为新构建的镜像设置标签。不要忘记在末尾包含点号，以指示`docker build`命令在当前工作目录中搜索
    Dockerfile。


    ```

    [opc@dev-vm]$ docker build -t uuid:1.0 .

    Sending build context to Docker daemon  4.608kB

    Step 1/10 : FROM python:3-alpine

    3-alpine: Pulling from library/python

    e7c96db7181b: Pull complete

    799a5534f213: Pull complete

    913b50bbe755: Pull complete

    11154abc6081: Pull complete

    c805e63f69fe: Pull complete

    ...

    Status: Downloaded newer image for python:3-alpine

    ...

    Step 2/10 : ENV FLASK_APP /usr/src/app/app.py

    ...

    Step 3/10 : ENV FLASK_ENV development

    ...

    Step 4/10 : ENV FLASK_DEBUG 0

    ...

    Step 5/10 : EXPOSE 5000

    ...

    Step 6/10 : WORKDIR /usr/src/app

    ...

    Step 7/10 : COPY requirements.txt ./

    ...

    Step 8/10 : RUN pip install --no-cache-dir -r requirements.txt

    ...

    Successfully installed Flask-1.0.2 Jinja2-2.10.1 MarkupSafe-1.1.1 Werkzeug-0.15.4
    click-7.0 itsdangerous-1.1.0

    ...

    Step 9/10 : COPY . .

    ...

    Step 10/10 : CMD [ "flask", "run", "--host=0.0.0.0" ]

    ...

    Successfully built b16f04d1bb7f

    Successfully tagged uuid:1.0

    ```


    现在，您可以使用`docker images`命令来列出镜像，可以选择使用`--format`参数来过滤输出。


    ```

    [opc@dev-vm]$ docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.Size}}"

    REPOSITORY  TAG        IMAGE ID       SIZE

    uuid        1.0        b16f04d1bb7f   96.7MB

    python      3-alpine   fe3ef29c73f3   87MB

    ```


    您应该看到两个顶层镜像。


    *   `uuid:1.0`


    *   `python:3-alpine`


    我们之前多次提到过`python:3-alpine`。这是基础镜像。它是从 Docker Hub 镜像注册表下载的。大小为 87MB，由一些默认不显示的中间层组成。`uuid:1.0`是我们刚刚在基础镜像之上构建的镜像。它添加了
    Flask 微框架，设置了三个环境变量，并添加了`app.py`应用程序。您看到的大小（96.7MB）有些误导性。这是包含基础镜像大小的总大小。我们添加的层仅占
    9.7MB（96.7MB – 87MB）。


    要显示镜像的构建历史，从而查看包括临时中间层在内的所有层，您可以执行`docker history`命令，如图 8-8 所示。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig8_HTML.jpg](img/478313_1_En_8_Fig8_HTML.jpg)


    图 8-8


    Docker 镜像的顶层镜像与中间层镜像


    新镜像就位后，我们就可以继续运行容器了。

