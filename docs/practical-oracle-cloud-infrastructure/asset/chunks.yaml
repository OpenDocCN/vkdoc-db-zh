    ISBN 978-1-4842-5505-6

    e-ISBN 978-1-4842-5506-3

    [`doi.org/10.1007/978-1-4842-5506-3`](https://doi.org/10.1007/978-1-4842-5506-3)

    © Michał Tomasz Jakóbczyk 2020


    本作品受版权保护。出版商保留所有权利，无论是材料的全部还是部分，特别是翻译、转载、插图重用、朗诵、广播、缩微胶片或其他任何物理方式的复制，以及信息存储和检索、电子改编、计算机软件，或目前已知或未来开发的类似或不同方法的传播权利。本书中可能出现商标名称、标识和图像。我们并非在每次出现商标名称、标识和图像时都使用商标符号，而是仅以编辑方式使用这些名称、标识和图像，旨在为商标所有者谋利，绝无侵犯商标权之意。本书中使用的商品名称、商标、服务标识及类似术语，即使未特别标识，也不应被视作表达其是否受专有权约束的意见。尽管本书中的建议和信息在出版时被认为是真实准确的，但作者、编辑或出版商均不对任何可能存在的错误或遗漏承担法律责任。出版商对本出版物所含材料不作任何明示或暗示的保证。


    本书在全球图书贸易中由 Springer Science+Business Media New York 发行，地址：233 Spring Street,
    6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：orders-ny@springer-sbm.com，或访问网站
    www.springeronline.com。Apress Media, LLC 是一家加利福尼亚州的有限责任公司，其唯一成员（所有者）是 Springer
    Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州的公司。


    *献给我的家人、朋友和同事*


    # 引言


    欢迎阅读*实战 Oracle Cloud Infrastructure*。我撰写本书旨在为读者提供关于 Oracle Cloud 第二代平台最重要方面的快速、实践性入门。本手册旨在通过一系列实践练习来指导您，让您有机会边做边学。阅读完本书后，您将对各种云基础设施概念有广泛的理解。此外，您将能够构建利用
    Oracle Cloud 上不同类型云服务的基于云的应用程序。


    我非常热衷于将自动化应用于云基础设施供应、系统配置和软件开发生命周期。在本书中，您将学习运用大量自动化技术，并采用基础设施即代码的方法。


    ## 本书适合谁阅读？


    本书面向云架构师、顾问、工程师、计算机科学与技术专业的学生，以及任何希望了解 Oracle 公有云提供的基础设施即服务的人士。为了充分受益于本书描述的练习，您应该具备
    Linux 或 macOS shell 的工作知识，对 IP 网络概念有基本理解，并有一些编程经验。


    ## 如何使用本书？


    本书以代码驱动。在阅读过程中，您会发现我假设您正在使用随书附带的代码。因此，您应该克隆包含所有代码片段、源代码和配置文件模板的 Git 仓库。您可以通过以下链接找到相关
    Git 仓库：


    [`https://github.com/mtjakobczyk/oci-book`](https://github.com/mtjakobczyk/oci-book)

    [`www.apress.com/source-code`](https://www.apress.com/source-code)


    代码片段设计为在 macOS（终端）、Linux（Shell）或 Windows Subsystem for Linux 中执行。如果您使用 Windows
    系统，请使用`Windows Subsystem for Linux`或启动一个带有 Linux 客户操作系统的虚拟机。Git 仓库由多个目录组成，每章一个。在每个目录中，您会找到该章节特定的`README.md`文件。这些`README.md`文件使用方便的
    Markdown 符号，并包含所有必要的代码片段，以便您通过直接复制到终端来更轻松、更快速地使用代码。


    此外，如果 Oracle Cloud 中的某些内容发生变化，Git 仓库中的代码将相应更新，以便您能够使用更新版本的代码片段。只需确保您定期检查更新并拉取最新版本即可。本书中的大部分应用程序代码是用
    Python 编写的。即使您不懂 Python，也应该没问题，因为最重要的代码段都得到了解释。


    我知道如今很少有人会从头到尾阅读技术书籍。然而，我强烈建议您按顺序学习本书，从第 1 章开始，一章接一章地阅读，更重要的是完成实践练习。


    如果您只想获得一些基本理解，请阅读第 1 章并完成第 2 章涵盖的练习。如果您对自动化感兴趣，请继续阅读第 3 章。为了充分受益于本书包含的实践练习，建议您在继续后续章节之前，按照第
    3 章和第 4 章的描述设置您的环境。这是因为第 5 章到第 9 章的练习假定第 3 章和第 4 章涵盖的环境配置仍然有效。总而言之，我的建议是按章节顺序阅读并学习本书。


    ## 云账户


    要执行本书中的练习，您需要一个 Oracle Cloud 账户。在第 1 章末尾，您将学习如何订阅一个新的试用版云账户，该账户允许您免费使用 Oracle
    Cloud 30 天。如果您愿意，可以使用付费账户进行操作，但请注意某些服务会产生费用。本书的练习主要使用我个人的付费云账户创建。


    ## 变更管理


    如今，云服务以惊人的速度发展，有时会引入破坏性变更。这对于相对较新的服务尤其重要，例如本书涵盖的 Oracle Kubernetes Engine 和 Oracle
    Functions。如果您发现某些操作方式与描述不符，请确保从本书关联的 GitHub 仓库拉取最新版本，并阅读特定章节的`README.md`文件。


    # 致谢


    首先，也是最重要的，我要感谢


    *   Michelle Malcher、Łukasz Antoniak、Tomasz Sawiński、Piotr Kusiak 和 Igor Sawczuk
    提供的反馈和技术审阅

    *   华沙的 Wojciech Wcisło 及其 Oracle 咨询团队营造了令人难以置信的工作氛围

    *   Oracle 的 Ben Lackey 的支持

    *   Apress 的 Jill Balzano、Jonathan Gennick、Kim Wimpsett 和 Laura Berendson 为本书成书过程所做的一切


    本书是我梦想的结果——释放我的创造力，并以技术手册这种结构化的形式，与其他技术爱好者分享我宝贵的技术知识和经验。我坚信学习型思维模式的重要性，我想对在我整个生活和职业生涯中对此有所贡献的每个人说：谢谢你们！


    ## 关于作者

    ## 关于技术审阅者'
- fmt: '# 1. Introducing Oracle Cloud Infrastructure


    Technology is constantly evolving and is now one of the foundations of our everyday
    lives. Computerization, digitalization, and the Internet have brought us to the
    `information age` we live in. Nowadays, nearly every kind of business requires
    information technology to exist and grow. Software is employed to serve a diverse
    range of business, technical, and industrial processes, while hardware is used
    to run the software, store data, and provide interconnectivity.


    During this information age, the way we use technology has gone through a number
    of turning points. One of them was the emergence and spread of the `open source`
    movement that sparked communities around the globe to build new tools, platforms,
    and applications at a pace unseen before. The freedom in distribution and the
    transparence of the source code made it possible to deliver solutions faster by
    creating derivative works and reusing existing components. What was initially
    seen as part of the hacker culture and a niche market was eventually adopted by
    enterprises and large organizations.


    The arrival of business-ready `cloud computing` was another turning point. This
    time, the subject of change was the perception of seeing and using hardware and
    software systems as a whole. This chapter will explain this statement step-by-step
    and be your guide through the most important concepts associated with cloud computing.
    Furthermore, it will introduce you to Oracle Cloud Infrastructure, which is Oracle’s
    infrastructure-as-a-service (`IaaS`) public cloud platform that delivers compute,
    storage, and networking capabilities. It also hosts various platform-as-a-service
    (`PaaS`) capabilities such as a fully managed Oracle Autonomous Database, container
    orchestration engine, serverless computing, and others.


    ## Cloud Computing Characteristics


    Running a business nowadays involves process automation. A single business process
    can consist of scheduled activities, user interactions, data transformations,
    external system calls, and even machine control. It usually engages numerous computer
    programs we know as `software`. Software runs on hardware, at least in theory.


    ### Hardware and Virtual Resources


    Hardware, as opposed to software, takes physical space and requires proper cooling
    and a reliable power supply. In the traditional model, small businesses place
    their backend equipment in server rooms, usually on-site. For medium and larger
    companies, their local server rooms are used as network connection points to remote
    data centers where production backend systems operate. The organization still
    manages its own equipment but rents space for servers, power supply capacity,
    and network resources (like public IP addresses, network throughput, dedicated
    links) in a professional third-party data center that also serves other customers.
    This is called a data center `colocation` model. Alternatively, an organization
    can invest in a fully owned data center, which typically incurs the biggest cost.
    All in all, the traditional model entails relatively large `capital expenses`
    that include the money spent on purchasing and maintaining the fixed assets like
    equipment.


    What actually matters is not the hardware itself but the compute power, storage,
    and networking `resources` that are available to applications. All in all, software
    needs to process its business logic in an efficient way; persist its data persisted
    to reliable, failsafe storage; and connect to any external systems it has to interact
    with. Usually, it does not matter if the software is running on virtualized or
    dedicated physical hardware. As a matter of fact, a number of unrelated computer
    programs can be executed on individual virtual machines that are launched on the
    same physical rack server.


    From a management point of view, it is much more convenient to see the hardware
    entities such as CPUs, memory, or storage somehow decoupled from the physical
    hardware, represented as `virtual hardware resources` that are pooled together
    and made ready to be allocated to the compute instances used by a number of applications
    and systems that belong to a diverse range of projects and different tenants (cloud
    accounts). Figure [1-1](#478313_1_En_1_Chapter.xhtml#Fig1) presents this concept
    using an illustration.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig1_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig1_HTML.jpg)


    Figure 1-1: Virtual resources and hardware


    ### Cloud Computing Definitions


    Some people mistakenly assume cloud computing and the public cloud are the same.
    They are not. You can apply a `cloud computing approach` with your own hardware
    infrastructure. Let’s take a look at the two definitions I like the most.


    The National Institute of Standards and Technology (`NIST`) has coined a definition
    that, in my opinion, highlights the essence of cloud computing.


    > `Cloud computing` *is a model for enabling ubiquitous, convenient, on-demand
    network access to* ***a shared pool of*** *configurable computing* ***resources***
    *(e.g., networks, servers, storage, applications, and services) that can be* ***rapidly
    provisioned and released with minimal management effort or service provider interaction**.
    This cloud model is composed of five essential characteristics, three service
    models, and four deployment models.*[¹](#478313_1_En_1_Chapter.xhtml#Sec30)


    `Gartner`, a well-known research and advisory company, has proposed another definition
    that points out two further characteristics (emphasis added).


    > *`Gartner`* *defines cloud computing as a style of computing in which* ***scalable
    and elastic IT-enabled capabilities are delivered as a service*** *using Internet
    technologies.*[²](#478313_1_En_1_Chapter.xhtml#Sec30)


    The rapid provisioning of IT resources that are available in a shared pool is
    one of the fundamental attributes of cloud computing. This `rapid provisioning`
    boosts the productivity by shortening any unwanted waiting time, eliminates possible
    errors through the repeatability of underlying automation, and eventually entails
    cost savings. Resources that are no longer in use may return to a `shared pool`,
    which allows other projects to reuse them, thereby optimizing the overall resource
    allocation. `Elasticity`, provided by resource scalability, is a key factor to
    optimize the resource use. Moreover, it can help to increase robustness by allowing
    computer systems to react to unexpected failures and varying the performance footprint.
    Resources of closely related types, such as compute, networking, different types
    of storage, and many more, are grouped together and made available as web services.
    Figure [1-2](#478313_1_En_1_Chapter.xhtml#Fig2) illustrates the key characteristics
    of cloud computing.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig2_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig2_HTML.jpg)


    Figure 1-2: Cloud computing key characteristics


    The next sections will describe these characteristics in more detail. But first
    let’s take a closer look at what the word `provisioning` actually means.


    ### Provisioning


    The Oxford Dictionary defines the verb `to provision` as “the action of providing
    or supplying something for use.” Well, the word `action` may sound a bit too granular.
    In the real world, providing a resource is always associated with a process of
    some kind.'
  raw: '# 1. Introducing Oracle Cloud Infrastructure


    Technology is constantly evolving and is now one of the foundations of our everyday
    lives. Computerization, digitalization, and the Internet have brought us to the
    *information age* we live in. Nowadays, nearly every kind of business requires
    information technology to exist and grow. Software is employed to serve a diverse
    range of business, technical, and industrial processes, while hardware is used
    to run the software, store data, and provide interconnectivity.


    During this information age, the way we use technology has gone through a number
    of turning points. One of them was the emergence and spread of the *open source*
    movement that sparked communities around the globe to build new tools, platforms,
    and applications at a pace unseen before. The freedom in distribution and the
    transparence of the source code made it possible to deliver solutions faster by
    creating derivative works and reusing existing components. What was initially
    seen as part of the hacker culture and a niche market was eventually adopted by
    enterprises and large organizations.


    The arrival of business-ready *cloud computing* was another turning point. This
    time, the subject of change was the perception of seeing and using hardware and
    software systems as a whole. This chapter will explain this statement step-by-step
    and be your guide through the most important concepts associated with cloud computing.
    Furthermore, it will introduce you to Oracle Cloud Infrastructure, which is Oracle’s
    infrastructure-as-a-service (IaaS) public cloud platform that delivers compute,
    storage, and networking capabilities. It also hosts various platform-as-a-service
    (PaaS) capabilities such as a fully managed Oracle Autonomous Database, container
    orchestration engine, serverless computing, and others.


    ## Cloud Computing Characteristics


    Running a business nowadays involves process automation. A single business process
    can consist of scheduled activities, user interactions, data transformations,
    external system calls, and even machine control. It usually engages numerous computer
    programs we know as *software*. Software runs on hardware, at least in theory.


    ### Hardware and Virtual Resources


    Hardware, as opposed to software, takes physical space and requires proper cooling
    and a reliable power supply. In the traditional model, small businesses place
    their backend equipment in server rooms, usually on-site. For medium and larger
    companies, their local server rooms are used as network connection points to remote
    data centers where production backend systems operate. The organization still
    manages its own equipment but rents space for servers, power supply capacity,
    and network resources (like public IP addresses, network throughput, dedicated
    links) in a professional third-party data center that also serves other customers.
    This is called a data center *colocation* model. Alternatively, an organization
    can invest in a fully owned data center, which typically incurs the biggest cost.
    All in all, the traditional model entails relatively large *capital expenses*
    that include the money spent on purchasing and maintaining the fixed assets like
    equipment.


    What actually matters is not the hardware itself but the compute power, storage,
    and networking *resources* that are available to applications. All in all, software
    needs to process its business logic in an efficient way; persist its data persisted
    to reliable, failsafe storage; and connect to any external systems it has to interact
    with. Usually, it does not matter if the software is running on virtualized or
    dedicated physical hardware. As a matter of fact, a number of unrelated computer
    programs can be executed on individual virtual machines that are launched on the
    same physical rack server.


    From a management point of view, it is much more convenient to see the hardware
    entities such as CPUs, memory, or storage somehow decoupled from the physical
    hardware, represented as *virtual hardware resources* that are pooled together
    and made ready to be allocated to the compute instances used by a number of applications
    and systems that belong to a diverse range of projects and different tenants (cloud
    accounts). Figure [1-1](#478313_1_En_1_Chapter.xhtml#Fig1) presents this concept
    using an illustration.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig1_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Virtual resources and hardware


    ### Cloud Computing Definitions


    Some people mistakenly assume cloud computing and the public cloud are the same.
    They are not. You can apply a *cloud computing approach* with your own hardware
    infrastructure. Let’s take a look at the two definitions I like the most.


    The National Institute of Standards and Technology (NIST) has coined a definition
    that, in my opinion, highlights the essence of cloud computing.


    > *Cloud computing* *is a model for enabling ubiquitous, convenient, on-demand
    network access to* ***a shared pool of*** *configurable computing* ***resources***
    *(e.g., networks, servers, storage, applications, and services) that can be* ***rapidly
    provisioned and released with minimal management effort or service provider interaction**.
    This cloud model is composed of five essential characteristics, three service
    models, and four deployment models.*[¹](#478313_1_En_1_Chapter.xhtml#Sec30)


    Gartner, a well-known research and advisory company, has proposed another definition
    that points out two further characteristics (emphasis added).


    > *Gartner* *defines cloud computing as a style of computing in which* ***scalable
    and elastic IT-enabled capabilities are delivered as a service*** *using Internet
    technologies.*[²](#478313_1_En_1_Chapter.xhtml#Sec30)


    The rapid provisioning of IT resources that are available in a shared pool is
    one of the fundamental attributes of cloud computing. This *rapid provisioning*
    boosts the productivity by shortening any unwanted waiting time, eliminates possible
    errors through the repeatability of underlying automation, and eventually entails
    cost savings. Resources that are no longer in use may return to a *shared pool*,
    which allows other projects to reuse them, thereby optimizing the overall resource
    allocation. *Elasticity*, provided by resource scalability, is a key factor to
    optimize the resource use. Moreover, it can help to increase robustness by allowing
    computer systems to react to unexpected failures and varying the performance footprint.
    Resources of closely related types, such as compute, networking, different types
    of storage, and many more, are grouped together and made available as web services.
    Figure [1-2](#478313_1_En_1_Chapter.xhtml#Fig2) illustrates the key characteristics
    of cloud computing.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig2_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Cloud computing key characteristics


    The next sections will describe these characteristics in more detail. But first
    let’s take a closer look at what the word *provisioning* actually means.


    ### Provisioning


    The Oxford Dictionary defines the verb *to provision* as “the action of providing
    or supplying something for use.” Well, the word *action* may sound a bit too granular.
    In the real world, providing a resource is always associated with a process of
    some kind.'
  trans: '# 1. Oracle Cloud Infrastructure 简介


    技术在不断演进，如今已成为我们日常生活的基石之一。计算机化、数字化和互联网将我们带入了身处的`信息时代`。如今，几乎所有类型的业务都离不开信息技术来生存和发展。软件被用于服务于各种各样的业务、技术和工业流程，而硬件则用于运行软件、存储数据并提供互联互通。


    在这个信息时代，我们使用技术的方式经历了数次转折点。其中之一是`开源`运动的出现和传播，它激发了全球社区以前所未有的速度构建新的工具、平台和应用程序。源代码的自由分发和透明性使得通过创建衍生作品和复用现有组件来更快地交付解决方案成为可能。最初被视为黑客文化一部分和利基市场的事物，最终被企业和大型组织所采纳。


    面向业务的`云计算`的到来是另一个转折点。这一次，变革的主题是对硬件和软件系统进行整体感知和使用的方式。本章将逐步解释这一论断，并作为你的指南，介绍与云计算相关的最重要概念。此外，它还将向你介绍
    Oracle Cloud Infrastructure，这是 Oracle 的基础设施即服务（`IaaS`）公有云平台，提供计算、存储和网络功能。它还托管各种平台即服务（`PaaS`）能力，例如全托管的
    Oracle 自动数据库、容器编排引擎、无服务器计算等。


    ## 云计算的特性


    如今，运营企业涉及流程自动化。单个业务流程可以由计划的活动、用户交互、数据转换、外部系统调用甚至机器控制组成。它通常涉及许多我们称为`软件`的计算机程序。软件运行在硬件上——至少在理论上是这样。


    ### 硬件与虚拟资源


    与软件相反，硬件占用物理空间，需要适当的冷却和可靠的电源供应。在传统模式中，小型企业将其后端设备放置在通常位于现场的服务器机房中。对于中型和大型公司，他们的本地服务器机房用作网络连接点，连接到运行生产后端系统的远程数据中心。该组织仍然管理自己的设备，但在专业的第三方数据中心（该中心也服务其他客户）租用服务器空间、供电容量和网络资源（如公共
    IP 地址、网络吞吐量、专线）。这被称为数据中心`托管`模式。或者，一个组织可以投资建设完全自有的数据中心，这通常会带来最大的成本。总而言之，传统模式涉及相对较大的`资本支出`，包括用于购买和维护设备等固定资产的资金。


    真正重要的不是硬件本身，而是应用程序可用的计算能力、存储和网络`资源`。总之，软件需要以高效的方式处理其业务逻辑；将其数据持久化到可靠、故障安全的存储中；并连接到它必须与之交互的任何外部系统。通常，软件是在虚拟化硬件还是专用物理硬件上运行并不重要。事实上，许多不相关的计算机程序可以在启动于同一物理机架服务器上的各个虚拟机中执行。


    从管理角度来看，将硬件实体（如 CPU、内存或存储）以某种方式与物理硬件解耦，表示为汇集在一起并准备好分配给多个应用程序和系统使用的计算实例的`虚拟硬件资源`，这样要方便得多。这些应用程序和系统属于各种项目和不同租户（云账户）。图
    1-1 通过图示展示了这一概念。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig1_HTML.jpg](img/478313_1_En_1_Fig1_HTML.jpg)


    图 1-1：虚拟资源与硬件


    ### 云计算的定义


    有些人错误地认为云计算和公有云是一回事。事实并非如此。你可以使用自己的硬件基础设施来采用`云计算方法`。让我们看看我最喜欢的两个定义。


    美国国家标准与技术研究院（`NIST`）提出了一个定义，在我看来，它突显了云计算的本质。


    > `云计算`*是一种模型，用于实现对* ***共享资源池中*** *可配置计算***资源***（例如，网络、服务器、存储、应用程序和服务）的泛在、便捷、按需的网络访问，这些资源能够*
    ***以最小的管理 effort 或服务提供商交互快速配置和释放***。*该云模型由五个基本特征、三种服务模型和四种部署模型组成。*¹


    `Gartner` 是一家著名的研究和咨询公司，提出了另一个定义，指出了两个进一步的特征（强调为后加）。


    > *`Gartner`将云计算定义为一种计算风格，其中* ***可扩展且弹性的 IT 启用能力作为服务*** *通过互联网技术交付。*²


    在共享池中可用的 IT 资源的快速配置是云计算的基本属性之一。这种`快速配置`通过缩短任何不必要的等待时间来提高生产力，通过底层自动化的可重复性消除可能的错误，并最终实现成本节约。不再使用的资源可能返回到`共享池`，这允许其他项目重复使用它们，从而优化整体资源分配。由资源可扩展性提供的`弹性`是优化资源使用的关键因素。此外，它可以通过允许计算机系统对意外故障做出反应并改变性能足迹来帮助提高稳健性。紧密相关的资源类型，例如计算、网络、不同类型的存储等，被分组在一起并作为
    Web 服务提供。图 1-2 说明了云计算的关键特性。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig2_HTML.jpg](img/478313_1_En_1_Fig2_HTML.jpg)


    图 1-2：云计算关键特性


    接下来的章节将更详细地描述这些特性。但首先让我们更仔细地看看`provisioning`这个词的实际含义。


    ### 配置


    牛津词典将动词`to provision`定义为“为使用而提供或供应某物的动作”。嗯，`action`（动作）这个词听起来可能有点过于细化。在现实世界中，提供资源总是与某种过程相关联。'
- fmt: '## Traditional Provisioning Process


    For an existing data center site, an infrastructure provisioning process usually
    starts with a request that gets reviewed and approved, eventually becoming an
    order. This initial step is preceded by the relevant capacity planning effort
    to identify what equipment and software are really needed as part of the data
    center expansion. If we have all the requested hardware components and software
    licenses in stock, we are lucky. The order fulfillment can begin. We need to fetch
    the hardware components; register each of them, often including their associations
    in an assets catalog; and then install, configure, connect together, and enable
    them for use.


    Things can get slightly more complicated if we still have to purchase the equipment.
    First, the buying itself may require a multilevel approval that takes even more
    time. Second, the provisioning process additionally involves procurement activities.
    Unless our company uses an automated procure-to-pay solution, all steps such as
    selecting the supplier, verifying the contract against policies, placing an order,
    submitting accounting invoices, and processing payments would involve a lot of
    lengthy human activities. All in all, it costs money and can take a lot of time.


    Imagine now that we are responsible for resources in a small data center that
    is used by our company. What would happen if we were asked to launch a completely
    new environment for one of the development teams as soon as possible? If we follow
    the traditional approach, the long-lasting process would kick off. First, we kindly
    ask our colleagues to conduct the capacity planning to assess their needs and
    fill the request that would become subject to approval. As soon as the approvals
    have been collected, we check if the equipment is in stock and spawn a procurement
    subprocess for the missing components. Unless we are using a well-integrated procure-to-pay
    business software, the procurement subprocess itself may take a lot of time before
    the final purchase order gets fulfilled. Figure [1-3](#478313_1_En_1_Chapter.xhtml#Fig3)
    uses a standard `BPMN` to outline the traditional provisioning process.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig3_HTML.png](images/478313_1_En_1_Chapter/478313_1_En_1_Fig3_HTML.png)


    Figure 1-3: Traditional provisioning process


    ## Rapid Self-Provisioning Process


    In the world of cloud computing, the word `provisioning` is often encountered
    as the state of your virtual resource observed while your new resource instance
    is being launched. The definition from `NIST` emphasizes rapid provisioning with
    minimal service provider interaction. This is the key. Minimal service provider
    interaction means that there is no need to submit a ticket and wait until the
    resources are semimanually set up for you by a team of administrators. Instead,
    the process is fully automated, and as soon as you trigger an instance launch,
    the order will be validated against your permissions and quota, also known as
    `service limits`, and passed to the rapid provisioning engine. The engine will
    use various profiles and templates to launch and configure the resources. Figure
    [1-4](#478313_1_En_1_Chapter.xhtml#Fig4) outlines the self-provisioning process.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig4_HTML.png](images/478313_1_En_1_Chapter/478313_1_En_1_Fig4_HTML.png)


    Figure 1-4: Rapid self-provisioning


    Actually, we could say that a scripted configuration is nothing new. It has been
    standard for a few years now, gaining more popularity each year. For example,
    we can pick `Ansible` and use its `playbook-based agentless automation` to install
    a software stack on multiple servers parallelly. In this way, we are not only
    speeding things up but also allowing the automation to perform the same task on
    a number of machines, decreasing the risk of mistakes. This is how many administrators
    already achieve their daily tasks. The more you automate, the less time you spend
    on repeatable tasks. The vast majority of operators still limit the scope of their
    automation to their software stack rollouts. Hardware seems to be continually
    handled rather manually. Well, you still need to plug a cable into a switch or
    boot a new machine, don’t you? Rapid self-provisioning, on the other hand, necessitates
    complete end-to-end automation for both the hardware and the software components.
    Yet, hardware provisioning automation doesn’t seem easy. Even though it is absolutely
    possible to use a remote bare-metal machine boot using `Preboot Execution Environment`
    booting, we rely nowadays more and more on virtualized pools of resources. Virtualization
    makes rapid resource provisioning much easier.


    ## Elasticity and Scalability


    An `elastic` object is able to return to its regular shape voluntarily, after
    it has been stretched (or squeezed). Such an object is thus highly adaptable to
    the impact of external circumstances. A web application can be considered highly
    adaptable or elastic if it is able to handle unexpected peaks of inbound traffic
    requests. A backend data warehousing extract-transform-load engine is reckoned
    to be very elastic or adaptable if it is capable of staging sudden, extraordinarily
    large volumes of incoming data loads.


    Computer system elasticity can be achieved through `scalability` of the underlying
    resources. For a modern, stateless web application, the number of containers that
    expose the API and encapsulate its request processing implementation logic could
    be increased, even by launching them on additional virtual machines. This action
    would enlarge the overall compute capacity of a cluster. In other words, we would
    have more application containers running on a larger set of host instances of
    the same size added to the cluster to increase the overall system throughput.
    This is called `horizontal scaling`. In the case of a backend `ETL` engine, the
    overall capacity of the attached block storage units for the staging area could
    be upsized. Put differently, we would add more hardware resources such as block
    volumes to each machine, keeping the number of machines unaltered. This is called
    `vertical scaling`. Figure [1-5](#478313_1_En_1_Chapter.xhtml#Fig5) presents the
    two types of resource scaling.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig5_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig5_HTML.jpg)


    Figure 1-5: Vertical and horizontal scalability


    If we consider only software architecture, `vertical scaling` may be often seen
    as easier and more appealing at first glance. If you move an application to a
    more powerful machine with a larger number of CPUs or simply extend the memory
    on the existing application host, the software would see new the hardware resources
    immediately or after a quick reboot. In most cases, there is no need to reconfigure
    the application. This approach has a major pain point, though. You cannot scale
    a single machine endlessly up. There will always be a limit in terms of the hardware
    availability because physical machines and even virtualized resource pools do
    have limits.


    `Horizontal scaling` may indeed seem unlimited. In theory, we could expand a cluster
    by adding new machines virtually infinitely. This really crucial advantage of
    horizontal scaling comes at a cost of the required cluster management. Distributed
    computer systems have to be specifically designed in a way that it is possible
    to scale them out. They must be able to handle synchronization and replication
    across the machines that act as cluster nodes.


    A computer system is truly elastic if the resources it uses are dynamically allocated
    and deallocated in response to the changing demand so that its performance always
    remains constant. In practice, such `autoscaling` is possible only with horizontal
    scaling.'
