    [opc@dev-vm]$ docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.Size}}"

    REPOSITORY  TAG        IMAGE ID       SIZE

    uuid        1.0        b16f04d1bb7f   96.7MB

    python      3-alpine   fe3ef29c73f3   87MB

    ```


    You should see two top-level images.


    *   `uuid:1.0`


    *   `python:3-alpine`


    We mentioned `python:3-alpine` a few times before. This is the base image. It
    was downloaded from the Docker Hub image registry. It is 87MB and consists of
    some intermediary layers that are not shown by default. `uuid:1.0` is the image
    we have just built on top of the base image. It adds the Flask microframework,
    sets three environment variables, and adds the `app.py` application. The size
    you see (96.7MB) is slightly misleading. This is the total size that includes
    the size of the base image. The layers we added take just 9.7MB (96.7MB – 87MB).


    To display the history of how the image was built and, thus, all layers including
    transient intermediate layers, you can issue the `docker history` command, as
    shown in Figure [8-8](#478313_1_En_8_Chapter.xhtml#Fig8).


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig8_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Docker image top-level and intermediate images


    With a new image in place, we can proceed and run containers.'
