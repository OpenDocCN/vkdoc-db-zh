    No output from the `diff` command means the files have identical content.


    It is time to look at the code you’ve just executed. As shown in Listing [5-2](#478313_1_En_5_Chapter.xhtml#PC30),
    we have encapsulated the main program logic within a traditional `if __name__
    == ''__main__''` Python block. In this way, the code is executed only if we run
    this file directly. Python lets you treat `.py` files as importable modules and,
    in this way, reuse already implemented logic. In such case, you typically want
    to be able to call the imported functions, ignoring the main program logic. When
    a file is imported as a module by another module, the `__name__` variable no longer
    has the `__main__` value but holds the name of the module (file), effectively
    leaving out the main program logic. We’ve run the program directly; therefore,
    the main program logic is executed and calls two functions. First, we use the
    `split_large_file` function to split the file into smaller parts. Then, we use
    the `upload_to_oci` function to perform the multipart upload.


    ```

    if __name__ == ''__main__'':

    filepath = str(sys.argv[1])

    part_size_mb = int(sys.argv[2])

    object_name = str(sys.argv[3])

    bucket_name = str(sys.argv[4])

    config_path = str(sys.argv[5])

    config_profile = str(sys.argv[6])

    part_list = split_large_file(filepath, part_size_mb*1024*1024)

    upload_to_oci(part_list, object_name , bucket_name, config_path, config_profile)

    Listing 5-2

    multipart.py: The Main Function

    ```


    Listing [5-3](#478313_1_En_5_Chapter.xhtml#PC31) presents the `split_large_file`
    function . It is worth noting the returned object. In our case, we not only split
    the content of the original file into smaller chunks but collect the filenames
    of newly created files that store the chunks. This lets us return the list of
    the paths to the files that store the parts.


    ```

    def split_large_file(file_path, part_size):

    """Splits a file into parts"""

    part_list = []

    part_number = 0

    with open(file_path, ''rb'') as file_stream:

    part = file_stream.read(part_size)

    while part != b"":

    part_file_path = file_path+''.part''+str(part_number)

    with open(part_file_path, ''wb'') as part_stream:

    part_stream.write(part)

    part_list.append(part_file_path)

    part_number += 1

    part = file_stream.read(part_size)

    return part_list

    Listing 5-3

    multipart.py: split_large_file Function

    ```


    Listing [5-4](#478313_1_En_5_Chapter.xhtml#PC32) presents the `upload_to_oci`
    function . The first input argument is the list of parts, returned from the `split_large_file`
    function. We do this to instruct the function where the part files can be found.
    At the beginning, the `oci.config.from_file` method reads the connection details
    from the configuration file (the `config_path` input argument) using the profile
    selected (the `config_profile` input argument). Immediately afterward, an instance
    of `the oci.object_storage.ObjectStorageClient` class is created and called `client`.
    All interactions with the OCI object storage API are done using the methods of
    this class. Before we begin the multipart upload, we still have to obtain the
    object storage namespace assigned to the cloud account. We perform this task using
    the `client.get_namespace` method . Next, we call our local `create_multipart_upload`
    function that starts the new multipart upload and returns the generated upload
    ID. Subsequently, we iterate over the list of parts and call the `upload_part`
    function for each part. This is not a very effective way, though, because we are
    doing it in a blocking, sequential manner. However, for the purpose of this example,
    it is easier to understand if I had used a parallel function execution. During
    each iteration, we collect the object returned by the `upload_part` function and
    aggregate all objects in a list called `part_details_list` . Finally, we pass
    this list together with other input arguments such as the upload ID and the object
    storage client class instance to the `commit_multipart_upload` local function,
    which commits the multipart upload.'
  trans: "# 准备测试文件与执行 OCI 分片上传\n\n让我们准备一个测试文件。这次，我们将生成一个较大的文件（25M），命名为 `visualizations.pdf`，并将其放在\
    \ `warsaw/bemowo` 本地目录中。你可以很容易地想象这是一个包含彩色图片和特定房地产项目可视化图的销售目录。这类文件通常体积相当大。生成文件的方法如下：\n\
    \n```bash\n$ cd ~/data\n$ SIZE=$((25*1024*1024))\n$ head -c $SIZE /dev/urandom\
    \ > warsaw/bemowo/visualizations.pdf\n$ ls -lh warsaw/bemowo/visualizations.pdf\
    \ | awk '{ print $9 \" (\" $5 \")\" }'\nwarsaw/bemowo/visualizations.pdf (25M)\n\
    ```\n\n## 环境设置与应用程序执行\n\n我们将要运行的应用程序将使用 OCI 的 Python SDK。让我们使用 `venv` 模块为此应用程序准备一个隔离的虚拟环境。接下来，我们激活环境，升级\
    \ Python 包管理器 (`pip`)，并安装 OCI SDK (`oci` 模块)。最后，我们使用 `pip freeze` 命令列出已安装的模块，并验证\
    \ SDK 是否已成功安装。\n\n```bash\n$ cd\n$ python3 -m venv oci-multipart\n$ source oci-multipart/bin/activate\n\
    (oci-multipart) $ python3 -m pip install --upgrade pip\nCollecting pip\n.........\n\
    Successfully installed pip-19.2.3\n(oci-multipart) $ python3 -m pip install oci\n\
    Collecting oci\n.........\nSuccessfully installed asn1crypto-0.24.0 certifi-2019.9.11\
    \ cffi-1.12.3 configparser-4.0.2 cryptography-2.7 oci-2.5.1 pyOpenSSL-19.0.0 pycparser-2.19\
    \ python-dateutil-2.8.0 pytz-2019.2 six-1.12.0\n(oci-multipart) $ python3 -m pip\
    \ freeze | grep oci\noci==2.5.1\n```\n\n假设 `blueprints` 存储桶仍然存在且所有凭据都已就位，我们就可以执行应用程序了。访问之前从我的\
    \ GitHub 账户获取的应用程序代码，调整到 `visualizations.pdf` 和配置文件的路径，然后运行程序。\n\n```bash\n(oci-multipart)\
    \ $ cd ~/git/oci-book/chapter05/2-multipart-upload\n(oci-multipart) $ chmod u+x\
    \ multipart.py\n(oci-multipart) $ FILE=\"$HOME/data/warsaw/bemowo/visualizations.pdf\"\
    \n(oci-multipart) $ CONFIG=\"$HOME/.oci/config\"\n(oci-multipart) $ ./multipart.py\
    \ \"$FILE\" 10 \"waw/bemowo/visualizations.pdf\" \"blueprints\" \"$CONFIG\" SANDBOX-USER\n\
    Upload ID: 7de81d8f-44ba-4178-4269-5c25f7d03a86\nPart File: /Users/mjk/warsaw/bemowo/visualizations.pdf.part0\n\
    Part ETag: 8489D285131C4A32E053C21DC20AAE16\nPart File: /Users/mjk/warsaw/bemowo/visualizations.pdf.part1\n\
