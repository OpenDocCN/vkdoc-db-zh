    def upload_to_oci(part_list, object_name, bucket_name, config_path, config_profile):

    """Performs a multi-part upload to OCI object storage"""

    config = oci.config.from_file(config_path, config_profile)

    client = oci.object_storage.ObjectStorageClient(config)

    storage_namespace = client.get_namespace().data

    upload_id = create_multipart_upload(storage_namespace, bucket_name, object_name,
    client)

    part_number = 1

    part_details_list = []

    for part in part_list:

    part_details = upload_part(storage_namespace, bucket_name, object_name, upload_id,
    part_number, part, client)

    part_details_list.append(part_details)

    part_number += 1

    commit_multipart_upload(storage_namespace, bucket_name, object_name, upload_id,
    part_details_list, client)

    Listing 5-4

    multipart.py: upload_to_oci Function

    ```


    Listing [5-5](#478313_1_En_5_Chapter.xhtml#PC33) presents the `create_multipart_upload`
    function that uses the `client.create_multipart_upload` method to begin the upload.
    As you can see, the `CreateMultipartUpload` API request takes the object storage
    namespace, the target bucket, and the target object name as input arguments. The
    object name, though, has to be passed encapsulated in an instance of a model class
    called `CreateMultipartUploadDetails` using a keyword argument dictionary conventionally
    named `kwargs`. Last but not least, the function returns the upload ID that has
    been generated for this multipart upload.


    ```

    def create_multipart_upload(storage_namespace, bucket_name, object_name, client):

    kwargs = { "object": object_name }

    details = oci.object_storage.models.CreateMultipartUploadDetails(**kwargs)

    upload_id = client.create_multipart_upload(storage_namespace, bucket_name, details).data.upload_id

    print(''Upload ID: ''+upload_id)

    return upload_id

    Listing 5-5

    multipart.py: create_multipart_upload Function

    ```


    Listing [5-6](#478313_1_En_5_Chapter.xhtml#PC34) presents the `upload_part` function,
    which is the primary workhorse of the entire multipart upload process. It takes
    the path to a part file (the `part` input argument) and an assigned part number
    (the `part_number` input argument) as input arguments along with the upload ID,
    object storage namespace, bucket, object name, and client class instance. The
    file is opened as a read-only, binary stream and passed to the `client.upload_part`
    method, which under the hood sends the `UploadPart` API request. I mentioned earlier
    that at the end we need to specify the list of parts to be included in the multipart
    upload commit. The list will contain `CommitMultipartUploadPartDetails` objects
    that effectively store the part number and corresponding entity tag each. To populate
    the list back in the `upload_to_oci` function, we create the details object for
    each part in `the upload_part` function based on the known part number and the
    returned ETag header that stores the entity tag for the uploaded part.


    ```

    def upload_part(storage_namespace, bucket_name, object_name, upload_id, part_number,
    part, client):

    print(''Part File: ''+part)

    kwargs = {}

    with open(part, ''rb'') as part_stream:

    rsp = client.upload_part(storage_namespace, bucket_name, object_name, upload_id,
    part_number, part_stream)

    kwargs = { "part_num": part_number, "etag": rsp.headers[''ETag''] }

    print(''Part ETag: ''+rsp.headers[''ETag''])

    return

    oci.object_storage.models.CommitMultipartUploadPartDetails(**kwargs)

    Listing 5-6

    multipart.py: upload_part Function

    ```


    Listing [5-7](#478313_1_En_5_Chapter.xhtml#PC35) presents the `commit_multipart_upload`
    function that takes the list of `CommitMultipartUploadPartDetails` objects, wraps
    it into a `CommitMultipartUploadDetails` object, and uses the `client.commit_multipart_upload`
    method to send a `CommitMultipartUpload` request to the API.


    ```

    def commit_multipart_upload(storage_namespace, bucket_name, object_name, upload_id,
    part_details_list, client):

    kwargs = { "parts_to_commit": part_details_list }

    details = oci.object_storage.models.CommitMultipartUploadDetails(**kwargs)

    client.commit_multipart_upload(storage_namespace, bucket_name, object_name, upload_id,
    details)

