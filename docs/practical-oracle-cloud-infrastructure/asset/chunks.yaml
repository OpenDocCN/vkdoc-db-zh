- fmt: "### Groups\n\nA group is basically a collection of users. A user can belong\
    \ to more than one group. It is possible to dynamically add and remove users from\
    \ groups. You create groups in a similar manner as you’ve created users usually\
    \ using the Console or the CLI. It is time to create a new group for the `sandbox-admin`\
    \ user.\n\n1. Go to Menu ➤ Identity ➤ Groups.\n2. Click Create Group.\n3. Provide\
    \ `sandbox-admins` as the group name, description, and click Create.\n\nFigure\
    \ [4-15](#478313_1_En_4_Chapter.xhtml#Fig15) presents the groups in your cloud\
    \ tenancy. The `Administrators` group is the default group present in every cloud\
    \ account. At any given time, Oracle Cloud Infrastructure enforces that there\
    \ must be at least one user in this group; otherwise, you could easily get unintentionally\
    \ locked out from your account.\n\n![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig15_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig15_HTML.jpg)\n\
    Figure 4-15\nUser groups in the `OCI Console`\n\nYou may remember as I mentioned\
    \ that cloud resources in Oracle Cloud Infrastructure are uniquely identified\
    \ not by their names but by the OCIDs. This is true for the groups as well, with\
    \ one small exception. While it is usually technically possible to provision multiple\
    \ cloud resources of the same type with the same name, you cannot do it either\
    \ with the groups or with the users. There is an additional constraint that does\
    \ not allow any name duplicates among groups or users.\n\nWe are going to create\
    \ another group, this time for the regular users for the `Sandbox` compartment\
    \ such as the `sandbox-user`. This time, for the sake of variety, we will use\
    \ the CLI. Please remember to make sure the `TENANCY_OCID` bash variable value\
    \ is still set to the OCID of your tenancy before running this command:\n\n```bash\n\
    $ oci iam group create --name sandbox-users --description \"Group for the regular\
    \ users of the Sandbox compartment\" --query \"data.id\" -c $TENANCY_OCID\n\"\
    ocid1.group.oc1..aa.........rj2sba\"\n```\n\nRun this CLI command to list the\
    \ groups whose names start with `sandbox`. We are going to format the output as\
    \ a table.\n\n```bash\n$ oci iam group list -c $TENANCY_OCID --all --query \"\
    data[?starts_with(name,'sandbox')].{Name:name,OCID:id}\" --output table\n+----------------+------------------------------------+\n\
    | Name           | OCID                               |\n+----------------+------------------------------------+\n\
    | sandbox-admins | ocid1.group.oc1..aa.........hlotwa |\n| sandbox-users  | ocid1.group.oc1..aa.........rj2sba\
    \ |\n+----------------+------------------------------------+\n```\n\nThe two new\
    \ groups are still empty. In the `OCI Console`, adding or removing users from\
    \ a group can be done in two ways. The first option is to use the group details\
    \ view, just like this:\n\n1. Go to Menu ➤ Identity ➤ Groups.\n2. Click the name\
    \ of the group to which you want to add a user.\n3. On the Group Members tab,\
    \ click Add User to Group.\n4. Select the user you want to add to the group.\n\
    \nAlternatively, you can perform the same operation from the user details screen.\n\
    \n1. Go to Menu ➤ Identity ➤ Users.\n2. Click the name of the user you want to\
    \ add to a group.\n3. On the Groups tab, click Add User to Group.\n4. Select the\
    \ group to which you want to add to the user.\n\nFinally, you are more than welcome\
    \ to do this task using the CLI. The `iam group add-user` command requires the\
    \ user OCID and the group OCID, so either find them in the `OCI Console` or run\
    \ these two queries:\n\n```bash\n$ USER_OCID=`oci iam user list -c $TENANCY_OCID\
    \ --query \"data[?name=='sandbox-admin'] | [0].id\" --all --raw-output`\n$ GROUP_OCID=`oci\
    \ iam group list -c $TENANCY_OCID --query \"data[?name=='sandbox-admins'] | [0].id\"\
    \ --all --raw-output`\n```\n\nTo add a user to a group, use the `oci iam group\
    \ add-user` CLI command.\n\n```bash\n$ oci iam group add-user --user-id $USER_OCID\
    \ --group-id $GROUP_OCID\n```\n\nThe `sandbox-admin` user gets immediately added\
    \ to the `sandbox-admins` group. You can verify it in the `OCI Console` in the\
    \ group details view, as shown in Figure [4-16](#478313_1_En_4_Chapter.xhtml#Fig16).\n\
    \n![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig16_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig16_HTML.jpg)\n\
    Figure 4-16\nGroup members in the `OCI Console`\n\nFurthermore, it is feasible\
    \ to employ the CLI command `iam group list-users` to fetch the list of group\
    \ members of a particular group. To do so, please use the following command:\n\
    \n```bash\n$ oci iam group list-users --group-id $GROUP_OCID --query \"data[*].name\"\
    \ -c $TENANCY_OCID --all\n[\n  \"sandbox-admin\"\n]\n```\n\nNow, before you read\
    \ on, please add the `sandbox-user` user to the `sandbox-users` group. We will\
    \ need it in the future chapters. At this stage, you should have the two users\
    \ added to their corresponding groups. Each user should have its unique keypair\
    \ already in place and the public key uploaded. The expected setup is conceptually\
    \ shown in Figure [4-17](#478313_1_En_4_Chapter.xhtml#Fig17).\n\n![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig17_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig17_HTML.jpg)\n\
    Figure 4-17\nUsers and groups for Chapter [4](#478313_1_En_4_Chapter.xhtml)\n\n\
    As a next step, please add a new profile for the `sandbox-user` user to the `~/.oci/config`\
    \ file like you’ve done for the `sandbox-admin` user in the previous section.\
    \ Listing [4-3](#478313_1_En_4_Chapter.xhtml#PC21) presents the expected structure\
    \ of your `~/.oci/config` file.\n\n```ini\n[DEFAULT]\ntenancy=...\nregion=...\n\
    user=...\nfingerprint=...\nkey_file=...\npass_phrase=...\n\n[SANDBOX-ADMIN]\n\
    user=ocid1.user.oc1..aaaaaaaa3n5.........7d5dca\nfingerprint=91:64:1b:4e:4e:35:4a:06:b2:8f:6f:53:ae:7d:0d:ee\n\
    key_file=~/apikeys/api.sandbox-admin.pem\npass_phrase=put-here-sandbox-admin-private-key-password\n\
    \n[SANDBOX-USER]\nuser=ocid1.user.oc1..aaaaaaaatimmpj37ao............cdzqpxa\n\
    fingerprint= 61:68:a5:1c:40:ef:51:fd:1a:74:6b:d9:9f:1c:b2:b8\nkey_file=~/apikeys/api.sandbox-user.pem\n\
    pass_phrase=put-here-sandbox-user-private-key-password\n```\nListing 4-3\nOCI\
    \ CLI Configuration File for Chapter 4\n\nLast but not least, we are going to\
    \ create two profiles in the `~/.oci/oci_cli_rc` file to set the default compartment\
    \ for each CLI query. Please replace the OCIDs in Listing [4-4](#478313_1_En_4_Chapter.xhtml#PC22)\
    \ with the OCID of your `Sandbox` compartment. If you do not remember what kind\
    \ of file that is, you will find more information in Chapter [3](#478313_1_En_3_Chapter.xhtml).\n\
    \n```ini\n[DEFAULT]\ncompartment-id = ocid1.compartment.oc1..aa.........gzwhsa\n\
    \n[SANDBOX-ADMIN]\ncompartment-id = ocid1.compartment.oc1..aa.........gzwhsa\n\
    \n[SANDBOX-USER]\ncompartment-id = ocid1.compartment.oc1..aa.........gzwhsa\n\
    ```\nListing 4-4\nOCI CLI RC File for Chapter 4\n\nAll set? Let’s explore how\
    \ the access control to cloud resources is organized."
