  trans: "\n### API 签名密钥\n\n在本节中，我们将生成一个新的密钥对，它将用作 API 签名密钥对，并将公钥上传到 Oracle Cloud\
    \ Infrastructure 中的特定 IAM 用户下。这样，我们就能授权任何持有私钥的人使用 OCI API，并以该 IAM 用户的身份远程管理 OCI\
    \ 资源。私钥将通过密码进行额外保护。每次尝试使用私钥时，系统都会提示您输入密码，除非您将其持久化保存在本地配置中。\n\n> **注意**\n>\n> 本书中的代码片段已在\
    \ macOS 和 Windows Subsystem for Linux 上测试通过。此外，所有命令都应在主流 Linux 发行版上正常工作。如果您使用的是\
    \ Windows 且不想使用 Windows Subsystem for Linux，您随时可以在虚拟机（VM）上运行 Linux。再者，大多数代码片段也可能在\
    \ Windows 的 Git Bash 中正常工作。\n\n#### 生成密钥对\n\nAPI 签名密钥对必须是 PEM 格式的 RSA 密钥对。PEM\
    \ 格式使用人类可读的字符，这使得它比二进制格式稍微容易处理一些（尤其是复制公钥）。我们将使用 `openssl` 程序来生成一个新的密钥对，该密钥对由两个相关的\
    \ 2048 位密钥组成：一个用于签名请求的私钥和一个用于验证请求真实性的公钥。以下是使用 `openssl` 生成新密钥对的方法，该工具在您的 Linux、macOS\
    \ 和 Windows Subsystem for Linux 上应该是开箱即用的：\n\n```bash\n$ mkdir ~/.apikeys\n$ cd\
    \ ~/.apikeys\n$ openssl genrsa -out oci_api_pem -aes128 2048\nGenerating RSA private\
    \ key, 2048 bit long modulus\n.............+++\n..+++\ne is 65537 (0x10001)\n\
    Enter pass phrase for oci_api_pem:\nVerifying - Enter pass phrase for oci_api_pem:\n\
    $ chmod go-rwx oci_api_pem\n$ ls -l | grep pem | awk '{ print $1\" \"$9 }'\n-rw-------\
    \ oci_api_pem\n$ openssl rsa -pubout -in oci_api_pem -out oci_api_pem.pub\nEnter\
    \ pass phrase for oci_api_pem:\nwriting RSA key\n$ ls -l | grep pem | awk '{ print\
    \ $1\" \"$9 }'\n-rw------- oci_api_pem\n-rw-r--r-- oci_api_pem.pub\n```\n\n建议您限制对私钥的访问权限，使得只有文件所有者才有权读取或修改该文件。您可以使用\
    \ `chmod` 命令执行此操作，如代码片段所示。此时，密钥对已准备就绪。清单 3-4 显示了我们刚刚生成的公钥。\n\n```text\n$ cat oci_api_pem.pub\n\
    -----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAy7QqyKkIM1UW0lBs3h04\n\
    OIxCNbAc1YpqLmd/ZQGwNFoC9L7kpkARjOTMQg/XY9VgFhTFwkhv/sP7aOwYZjVD\nBMltp3e0Xzu1BGe4AQF3xL+euqZW9dBRlvZqb1ubEse4RnKDCWvYpqQS/vQU48TM\n\
    nRObefTsZH1xg2RfO2mFHuGEZhJKrVIjHTJvjisAIZg0dPaVD8Ee+julutCnDHcP\nQWlfe2e4OtYvvki5Wwu5Uz4Zq6ZSf55oX25pDGyw/WB5oDFg4v6RsZ7kQZYTBsqA\n\
    gF7RnG+q5JnxFfuDvEZoU0sB5hRWujhhSZtE9FjU9UndMU5iaa8kNE6Ua3e0p4ZG\nRwIDAQAB\n-----END\
    \ PUBLIC KEY-----\n清单 3-4\nAPI 签名密钥对公钥\n```\n\n#### 上传公钥\n\n我们已经到了需要决定代表哪个身份发送\
    \ API 请求的时刻。换句话说，我们必须选择一个现有的 IAM 用户并上传公钥，该公钥将与此用户关联。如果您使用的是一个新的试用版或按需付费（PAYG）账户，您很可能以默认的\
    \ IAM 用户身份登录，该用户代表租户所有者，并且开箱即用地属于 `Administrators` 组。该组将允许您执行本章描述的所有练习。\n\n> **提示**\n\
    >\n> 如果您使用的是云团队提供的其他 IAM 用户，且该用户不是 `Administrators` 组的成员，请与您的云团队管理员核实您有权执行哪些操作，或者直接跳转到第\
    \ 4 章，以了解分配给您的 IAM 组的 IAM 策略的含义。\n\n以下是使用 OCI 控制台上传公钥的方法：\n\n1.  转到菜单 ➤ 标识 ➤ 用户。\n\
    2.  单击您的租户管理员用户的名称。\n3.  在“资源”菜单中单击 API 密钥。\n4.  单击添加公钥。\n5.  粘贴公钥。\n6.  单击添加。\n\
    \n图 3-3 显示了用于为 IAM 用户添加新公钥的 OCI 控制台窗口。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig3_HTML.jpg](img/478313_1_En_3_Fig3_HTML.jpg)\n\
    \n图 3-3\n在 OCI 控制台中添加公钥\n\n每个 IAM 用户最多可以拥有三个公共 API 密钥。API 将根据请求的 `authorization`\
    \ 头中包含的公钥 `指纹` 来识别每个传入请求应使用哪个正确的密钥。指纹会显示在 OCI 控制台中，如图 3-4 所示。\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig4_HTML.jpg](img/478313_1_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4\n公钥的指纹\n\n用户只能执行其所属组的现有 IAM 策略语句所允许的对云资源的操作。您将在下一章中了解它们。现在，请确保您将使用属于具有租户管理权限的组的\
    \ IAM 用户，例如默认的 `Administrators` 组；否则，后面几节中介绍的一些命令可能无法工作。\n\n#### 为 SDK、CLI 和 Terraform\
    \ 做准备\n\n如果您已完成“API 签名密钥”部分描述的所有步骤，那么您已准备好开始自动化云基础设施管理任务。让我们总结并列出所需的详细信息，在初始设置期间，当您基于喜欢的编程语言的\
    \ SDK 编写自定义 API 调用时，或者更常见的是，在运行 CLI 脚本或使用 Terraform 配置基础设施时，您至少需要提供一次这些信息。以下是您应该准备或知道在哪里可以找到的详细信息：\n\
    \n*   **PEM 格式的 API 签名密钥对**：\n    *   公钥\n    *   私钥\n*   公钥的**指纹**\n*   **IAM\
    \ 用户 OCID**，位于菜单 ➤ 标识 ➤ 用户下\n*   **租户 OCID**，位于菜单 ➤ 管理 ➤ 租户详细信息下\n*   **区域标识符**，位于菜单\
    \ ➤ 管理 ➤ 区域管理下的“基础设施区域”选项卡中\n\n我们现在已准备好讨论并应用三种最流行的自动化技术。我们将首先讨论 SDK。\n"
- fmt: '## SDK


    OCI SDK 是一个针对特定编程语言的库，它让您的软件能够与 Oracle Cloud Infrastructure 的云管理平面进行交互。该 SDK 将
    OCI API 调用暴露为更易于使用和更快上手的函数或方法。通过这种方式，管理和监控 OCI 资源的自定义逻辑可以嵌入到您的应用程序中。图 [3-5](#478313_1_En_3_Chapter.xhtml#Fig5)
    说明了这个概念。


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig5_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig5_HTML.jpg)


    图 3-5 SDK


    在撰写本文时，Oracle Cloud Infrastructure 提供了四个以开源项目形式实现的 SDK。


    *   Python: [`https://github.com/oracle/oci-python-sdk`](https://github.com/oracle/oci-python-sdk)

    *   Go: [`https://github.com/oracle/oci-go-sdk`](https://github.com/oracle/oci-go-sdk)

    *   Java: [`https://github.com/oracle/oci-java-sdk`](https://github.com/oracle/oci-java-sdk)

    *   Ruby: [`https://github.com/oracle/oci-ruby-sdk`](https://github.com/oracle/oci-ruby-sdk)


    如果您需要其他语言的 SDK，可以考虑自己编写一个。您需要先实现 API 请求签名逻辑，然后将软件所需的那些 REST API 调用封装成库函数或类方法。之后，您可以逐步增加对更多
    API 资源的支持。实际上，特别是在面向微服务设计和容器的时代，您需要构建新 SDK 的可能性很小，因为您可以使用不同的编程语言来实现一组协同工作的微服务。


    在本节中，我将介绍 Oracle Cloud Infrastructure Python SDK 的基础知识。


    ### 安装


    由于历史原因，Python 目前同时维护着两个主要版本：2 和 3。该 SDK 适用于两者，但我建议将使用最新主要版本作为最佳实践。我将使用 Python
    3。请检查您用于处理本书练习的机器上是否已安装 Python 3。如果没有，请安装它，并为您的平台选择最新的 Python 3.x 版本。


    注意

    安装 Python 的方式取决于您使用的操作系统。请访问 [`www.python.org`](http://www.python.org) 了解更多详情。


    成功安装后，您应该能看到类似这样的信息：


    ```

    $ python3 --version

    Python 3.7.2

    ```


    注意

    本书中的代码片段已在 macOS 控制台和 Windows Subsystem for Linux 中测试。所有命令都应能在所有主流 Linux 发行版上轻松运行。如果您使用
    Windows，请在带有 Linux 的虚拟机或 Windows Subsystem for Linux 中运行练习。


    开箱即用，Python 3 自带 `venv` 模块，它允许开发者在单台机器上创建多个虚拟环境。一个虚拟环境维护独立的 Python 二进制文件和一个作为应用程序依赖项的
    Python 模块库。所有使用专用的、环境特定的 Python 包安装器 (`pip`) 实例安装的模块都将存储在虚拟环境的文件层次结构中。如果您同时处理多个项目并需要避免模块版本冲突，这将特别有用。我将创建一个名为
    `ocidev` 的新虚拟环境，并通过激活 `bin/activate` 文件来启用它。


    提示

    我强烈建议您访问本书的 Git 仓库：[`https://github.com/mtjakobczyk/oci-book`](https://github.com/mtjakobczyk/oci-book)。每章都有一个专用目录，其中包含该章的
    `README.md` 文件。该文件以易于复制的形式包含了所有的代码片段。


    以下是在 macOS 或 Linux 上的操作方法：


    ```

    $ python3 -m venv ocidev

    $ ls -1 ocidev/bin/

    activate

    activate.csh

    activate.fish

    easy_install*

    easy_install-3.7*

    pip*

    pip3*

    pip3.7*

    python@

    python3@

    $ source ocidev/bin/activate

    (ocidev) $

    ```


    您可以看到命令提示符已更改，以指示当前活动的虚拟环境。每次打开新的终端会话时，您都需要激活虚拟环境，以便将变量设置为使用所选虚拟环境子目录中的二进制文件和路径。


    提示

    `venv` 模块仅在 Python 3 中可用。如果您仍想使用 Python 2，也有支持虚拟环境的类似软件包，例如 `virtualenv`。


    Oracle Cloud Infrastructure 的 Python SDK 作为模块在 Python 包索引 (`PyPI`) 仓库中提供。您可以使用
    Python 的 `pip` 包管理器来下载 `oci` 模块，它已经包含在您的虚拟环境路径中。在下载和安装 `oci` 模块之前，让我们先升级 `pip`
    工具。


    ```

    (ocidev) $ python3 -m pip install --upgrade pip

    Successfully installed pip-19.1.1

    (ocidev) $ python3 -m pip --version

    pip 19.1.1 from /Users/mjk/ocidev/lib/python3.7/site-packages/pip (python 3.7)

    ```


    现在，我将使用 `pip freeze` 命令来列出这个特定虚拟环境中安装的软件包。


    ```

    (ocidev) $ python3 -m pip freeze

    ```


    如您所见，我们的虚拟环境中还没有任何软件包。是时候改变这一点并安装 Oracle Cloud Infrastructure Python SDK 了。


    ```

    (ocidev) $ python3 -m pip install oci

    Successfully installed (...) oci-2.2.13 (...)

    (ocidev) $ python3 -m pip freeze

    asn1crypto==0.24.0

    certifi==2019.3.9

    cffi==1.12.3

    configparser==3.7.4

    cryptography==2.7

    oci==2.2.13

    pycparser==2.19

    pyOpenSSL==19.0.0

    python-dateutil==2.8.0

    pytz==2019.1

    six==1.12.0

    (ocidev) $ deactivate

    ```


    与 `oci` 模块一起，`pip` 还安装了它的依赖项。现在，我们需要讨论如何准备将由 SDK 在签名 API 请求时使用的配置细节。'
  raw: '## SDK


    The OCI SDK is a library for a particular programming language that lets your
    software interact with the Oracle Cloud Infrastructure cloud management plane.
    The SDK exposes the OCI API calls as functions or methods that are easier to use
    and faster to work with for a developer. In this way, custom logic that manages
    and monitors OCI resources can be embedded in your applications. Figure [3-5](#478313_1_En_3_Chapter.xhtml#Fig5)
    illustrates this concept.


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig5_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    SDK


    At the time of writing, Oracle Cloud Infrastructure delivers four SDKs implemented
    as open source projects.


    *   **Python**: [`https://github.com/oracle/oci-python-sdk`](https://github.com/oracle/oci-python-sdk)


    *   **Go**: [`https://github.com/oracle/oci-go-sdk`](https://github.com/oracle/oci-go-sdk)


    *   **Java**: [`https://github.com/oracle/oci-java-sdk`](https://github.com/oracle/oci-java-sdk)


    *   **Ruby**: [`https://github.com/oracle/oci-ruby-sdk`](https://github.com/oracle/oci-ruby-sdk)


    If you needed an SDK for a different language, you could consider writing one
    on your own. You would first implement the API request signing logic and start
    wrapping into library functions or class methods these REST API calls that you
    need for your software. Later, you could incrementally add support for further
    API resources. In reality, especially in the age of microservices-oriented design
    and containers, there is little probability that you would need to build a new
    SDK because you could implement groups of cooperating microservices using different
    programming languages.


    In this section, I am going to present the basics of the Python SDK for Oracle
    Cloud Infrastructure.


    ### Installation


    Because of historical reasons, Python is parallelly maintained in two major versions
    at the moment: 2 and 3\. The SDK works with both, but I recommend using the newest
    major version as a best practice. I am going to use Python 3. Please check if
    Python 3 is already present on the machine that you are using to work on the exercises
    from this book. If it isn’t, please install it and choose the newest Python 3.x
    available for your platform.


    Note


    The way you are going to install Python depends on the operating system you are
    using. Please visit [`www.python.org`](http://www.python.org) for more details.


    After a successful installation, you should be able to see something like this:


    ```

    $ python3 --version

    Python 3.7.2

    ```


    Note


    The code snippets from this book were tested in the macOS Console and Windows
    Subsystem for Linux. All of the commands should easily work on all major Linux
    distributions. If you are using Windows, please run the exercises either on a
    guest VM with Linux or on Windows Subsystem for Linux.


    Out of the box, Python 3 comes with the `venv` module, which lets developers create
    multiple virtual environments on a single machine. A virtual environment maintains
    self-contained Python binaries and a library of Python modules that serve as dependencies
    to your application. All modules installed using a dedicated, environment-specific
    instance of Package Installer for Python (`pip`) will be stored within the virtual
    environment’s file hierarchy. This is especially useful if you are working on
    multiple projects and need to avoid module version conflicts. I am going to create
    a new virtual environment called `ocidev` and activate it by sourcing `the bin/activate`
    file.


    Tip


    I highly recommend you visit the Git repository for this book: [`https://github.com/mtjakobczyk/oci-book`](https://github.com/mtjakobczyk/oci-book).
    Each chapter comes with a dedicated directory that holds the chapter’s `README.md`
    file. The file contains all the code snippets in an easy-to-copy form.


    This is how you do it on macOS or Linux:


    ```

    $ python3 -m venv ocidev

    $ ls -1 ocidev/bin/

    activate

    activate.csh

    activate.fish

    easy_install*

    easy_install-3.7*

    pip*

    pip3*

    pip3.7*

    python@

    python3@

    $ source ocidev/bin/activate

    (ocidev) $

    ```


    You can see that the command prompt has changed to indicate the active virtual
    environment. Each time you open a new Terminal session, you need to activate the
    virtual environment so that variables are set to work with binaries and paths
    from the subdirectories of the chosen virtual environment.


    Tip


    The `venv` module is available only in Python 3\. If you still want to use Python
    2, there are analogous packages that support virtual environments, for example,
    `virtualenv`.


    The Python SDK for Oracle Cloud Infrastructure is available as a module in the
    Python Package Index (`PyPI`) repository . You can download the `oci` module using
    `the pip` package management for Python, which is already included and can be
    found in your virtual environment’s path. Let’s upgrade the `pip` utility before
    we download and install the `oci` module.


    ```

    (ocidev) $ python3 -m pip install --upgrade pip

    Successfully installed pip-19.1.1

    (ocidev) $ python3 -m pip --version

    pip 19.1.1 from /Users/mjk/ocidev/lib/python3.7/site-packages/pip (python 3.7)

    ```


    Now, I am going to use the `pip freeze` command to list the packages installed
    in this particular virtual environment.


    ```

    (ocidev) $ python3 -m pip freeze

    ```


    As you can see, there are no packages in our virtual environment. It is time to
    change this and install the Python SDK for Oracle Cloud Infrastructure.


    ```

    (ocidev) $ python3 -m pip install oci

    Successfully installed (...) oci-2.2.13 (...)

    (ocidev) $ python3 -m pip freeze

    asn1crypto==0.24.0

    certifi==2019.3.9

    cffi==1.12.3

    configparser==3.7.4

    cryptography==2.7

    oci==2.2.13

    pycparser==2.19

    pyOpenSSL==19.0.0

    python-dateutil==2.8.0

    pytz==2019.1

    six==1.12.0

    (ocidev) $ deactivate

    ```


    Together with the `oci` module, `pip` has installed its dependencies. Now, we
    need to discuss how to prepare the configuration that will store the details used
    by the SDK while signing the API requests.'
