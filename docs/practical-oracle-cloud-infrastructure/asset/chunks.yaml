    Listing [6-9](#478313_1_En_6_Chapter.xhtml#PC21) shows the second part of the
    `workers/compute.tf` file and covers the instance pool resource.


    ```

    ...

    resource "oci_core_instance_pool" "worker_pool" {

    compartment_id = var.compartment_ocid

    instance_configuration_id = oci_core_instance_configuration.worker_config.id

    placement_configurations {

    availability_domain = var.ads[0]

    primary_subnet_id = oci_core_subnet.workers_net.id

    }

    placement_configurations {

    availability_domain = var.ads[1]

    primary_subnet_id = oci_core_subnet.workers_net.id

    }

    placement_configurations {

    availability_domain = var.ads[2]

    primary_subnet_id = oci_core_subnet.workers_net.id

    }

    size = var.pool_target_size

    display_name = "workers-pool"

    }

    ...

    Listing 6-9

    compute.tf (Workers Module): Instance Pool

    ```


    The `oci_core_instance_pool` resource defines an instance pool. The `instance_configuration_id`
    argument takes the OCID of an instance configuration, and the `size` argument
    is used to define the initial count of instances created in the pool based on
    that instance configuration. Other interesting parts are the `placement_configurations`
    embedded blocks. Their elements specify where an instance pool should launch its
    instances. In our case, I am using a single regional subnet defined in the workers
    module and instruct the instance pool to use all three availability domains while
    provisioning any subsequent instances. The initial size of the instance pool is
    set with a module input variable. Listing [6-10](#478313_1_En_6_Chapter.xhtml#PC22)
    presents a small part of the `modules.tf` file where, among many different input
    parameters, you can see the value for the initial instance pool size.


    ```

    ...

    module "workers" {

    source = "./workers"

    compartment_ocid = var.compartment_ocid

    vcn_ocid = oci_core_virtual_network.vcn.id

    vcn_nat_ocid = oci_core_nat_gateway.natgw.id

    vcn_cidr = oci_core_virtual_network.vcn.cidr_block

    vcn_subnet_cidr = "10.1.2.0/24"

    ads = data.oci_identity_availability_domains.ads.availability_domains[*].name

    image_ocid = data.oci_core_images.centos_image.images[0].id

    pool_target_size = 1

    }

    ...

    Listing 6-10

    modules.tf (Root Module)

    ```


