    less than eight minutes. Terraform will be displaying the `Still creating` message.
    You can also access the OCI Console and observe the new cluster in the Creating
    state, as shown in Figure [8-20](#478313_1_En_8_Chapter.xhtml#Fig20). To do so,
    do the following:


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig20_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig20_HTML.jpg)


    Figure 8-20


    OKE cluster provisioning


    1.  Go to Menu ➤ Developer Services ➤ Clusters.


    At some point in time, the cluster will transfer to the Active state. This announces
    the readiness of the control plane. You still need to wait a few moments for the
    worker nodes until the node pool instance enters the running state. In the meantime,
    please take a look at the cluster and networking information, as shown in Figure
    [8-21](#478313_1_En_8_Chapter.xhtml#Fig21). The infrastructure code provisions
    a Kubernetes cluster with a single-worker node pool. We can clearly see who has
    created the cluster.


    Caution


    In the Created By field, you should see the name or the OCID of the `sandbox-admin`
    user, as shown in Figure [8-21](#478313_1_En_8_Chapter.xhtml#Fig21). If you see
    another user such as the tenancy admin, it means you have either skipped the `--var-file`
    parameter when executing `terraform apply` or somehow have invalid user data in
    the `~/sandbox-admin.tfvars` file. Please use `terraform destroy` to delete the
    current cluster, make sure the new Terraform properties file for the `sandbox-admin`
    user is correct, and re-create the infrastructure.'
  trans: '

    ## 托管集群


    Oracle Cloud Infrastructure 提供了 Oracle Kubernetes Engine (OKE)，这是一个托管的 Kubernetes
    平台即服务（PaaS）云产品，已通过 CNCF 认证的 Kubernetes 一致性程序验证。该认证确保了所需的 Kubernetes API 得到完全支持，并与开源发行版保持一致。托管服务意味着在几分钟内，你就能获得一个完全可运行的集群，由平台以智能方式管理。你无需操心
    `etcd` 集群或主节点配置。所有控制平面组件都会自动安装。你的职责是选择工作节点规格，并指向将要创建工作节点和负载均衡器的 VCN 子网。该集群将与 IAM
    完全集成，并运行在 Oracle Cloud Infrastructure 计算实例上。


    ### 在 OCI 控制台中创建集群


    在 OCI 控制台中创建集群非常直接。不过，首先要做的是：如果你的租户中从未启动过任何 OKE 集群，你必须显式启用 OKE 服务。这是通过在 `root`
    区域中添加一条简单的 IAM 策略来完成的。所需的声明如清单 8-4 所示，它允许 OKE 服务管理整个租户中的所有资源。OKE 服务必须能够配置实例并动态更改一些网络资源，例如安全列表。


    ```json

    [ "allow service OKE to manage all-resources in tenancy" ]

    ```

    清单 8-4

    `tenancy.oke.policy.json`


    确保你在本地机器上。让我们创建所需的策略。我们没有使用 `--profile` 参数；因此，该命令将以租户管理员身份执行，因为该用户定义在我们的 CLI 配置文件的
    `DEFAULT` 配置文件中。


    ```bash

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ echo TENANCY_OCID

    ocid1.tenancy.oc1..aa.........3yymfa

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes

    $ cd policies

    $ oci iam policy create -c $TENANCY_OCID --name tenancy-oke --description "OKE
    Policy"  --statements "file://tenancy.oke.policy.json"

    {

    "data": {

    ...

    "lifecycle-state": "ACTIVE",

    "name": "tenancy-oke",

    "statements": [

    "allow service OKE to manage all-resources in tenancy"

    ],

    ...

    },

    }

    ```


    如今，随着越来越多的端到端自动化到位，我们已经习惯了“一键式”方法，这种方法假设完成诸如集群配置之类的任务不需要复杂的操作。正如我之前所说，在 OCI 控制台（或使用
    CLI）中启动集群非常直接。要使用 OCI 控制台配置集群，你需要转到开发者服务，选择容器集群，单击创建集群，并提供一些详细信息，例如 Kubernetes
    版本、工作节点规格以及每个工作节点子网的初始数量。然而，本书侧重于代码驱动的自动化；因此，我将展示如何使用 Terraform 驱动的基础设施代码在自定义虚拟网络布局之上配置集群。


    ### 使用 Terraform 配置集群


    我们希望 `sandbox-admin` 被 OKE 集群识别为其初始管理员。这就是为什么你必须以 `sandbox-admin` 用户身份配置集群至关重要。到目前为止，Terraform
    代表租户管理员创建了所有资源。为了让 Terraform 此次使用另一组凭据并以 `sandbox-admin` 身份与 OCI API 交互，你必须准备一个新的变量定义文件，如清单
    8-5 所示。


    ```hcl

    tenancy_ocid = ""

    region = ""

    user_ocid = ""

    private_key_path = ""

    private_key_password = ""

    fingerprint = ""

    compartment_ocid = ""

    ```

    清单 8-5

    `sandbox-admin.tfvars`


    我们将使用 `--var-file` 参数将新文件传递给 `terraform`，以此为 `oci` 提供程序设置值，使其代表 `sandbox-admin`
    用户执行所有 API 调用。所有必需的详细信息已经存在于 `.oci/config` 文件中的 `SANDBOX-ADMIN` 配置文件中。我准备了一个辅助脚本，用于从存储在
    `.oci/config` 文件中的值生成 `sandbox-admin.tfvars` 文件。


    ```bash

    $ SANDBOX_COMPARTMENT_OCID=`oci iam compartment get --query data.id --raw-output
    --profile SANDBOX-ADMIN`

    $ cd ~/git/oci-book/chapter08/3-kubernetes

    $ chmod a+x oci_config_to_tfvars.sh

    $ ./oci_config_to_tfvars.sh ~/.oci/config ~/sandbox-admin.tfvars $SANDBOX_COMPARTMENT_OCID

    ```


    确保新创建的 `tfvars` 文件确实存在于 `~/sandbox-admin.tfvars` 路径中，然后继续。


    我们将使用 Terraform 来配置与 VCN 相关的资源，例如子网、安全列表和网关，以及 Kubernetes 集群云资源和工作节点实例池。OKE 需要各种资源，例如计算实例、负载均衡器和虚拟网络。`sandbox-admins`
    组成员和租户管理员已经拥有在 `Sandbox` 区域中管理所需云资源类型的所有权限。在 `chapter08/3-kubernetes` 目录中，你会找到基础设施代码。让我们来配置它。


    ```bash

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes

    $ cd infrastructure

    $ find . | sort

    ./kube

    ./kube/cluster.tf

    ./kube/vars.tf

    ./kube/vcn-lb.tf

    ./kube/vcn-workers.tf

    ./modules.tf

    ./provider.tf

    ./vars.tf

    ./vcn.tf

    $ terraform init

    Initializing modules...

    - kubernetes in kube

    Initializing the backend...

    Initializing provider plugins...

    - Checking for available provider plugins...

    - Downloading plugin for provider "oci" (terraform-providers/oci) 3.30.0...

    Terraform has been successfully initialized!

    $ terraform apply -var-file="~/sandbox-admin.tfvars" -auto-approve

    ...

    ```


    > **提示**

    >

    > 如果你收到 401 错误，很可能是因为你使用了私钥的相对路径。请打开 `sandbox-admin.tfvars` 文件，将 `~` 字符或 `$HOME`
    变量替换为你的主目录的绝对路径，例如 `/home/thomas/` 或 `/Users/thomas/`。


    配置基础设施以及随后在主节点和工作节点上安装集群控制平面组件将需要几分钟时间，通常少于八分钟。Terraform 将显示 `Still creating`
    消息。你也可以访问 OCI 控制台，观察处于创建状态的新集群，如图 8-20 所示。操作如下：


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig20_HTML.jpg](img/478313_1_En_8_Fig20_HTML.jpg)


    图 8-20


    OKE 集群配置


    1.  转到菜单 ➤ 开发者服务 ➤ 集群。


    在某个时间点，集群将转移到活动状态。这宣告了控制平面已就绪。你仍然需要等待片刻，直到工作节点（节点池实例）进入运行状态。同时，请查看集群和网络信息，如图 8-21
    所示。基础设施代码配置了一个具有单个工作节点池的 Kubernetes 集群。我们可以清楚地看到谁创建了该集群。


    > **注意**

    >

    > 在“创建者”字段中，你应该看到 `sandbox-admin` 用户的名称或 OCID，如图 8-21 所示。如果你看到其他用户，例如租户管理员，这意味着你在执行
    `terraform apply` 时要么省略了 `--var-file` 参数，要么 `~/sandbox-admin.tfvars` 文件中的用户数据无效。请使用
    `terraform destroy` 删除当前集群，确保为 `sandbox-admin` 用户准备的新 Terraform 属性文件正确无误，然后重新创建基础设施。

