- fmt: '### Basics


    对象可以被视为数据实体。这意味着有一套标准的操作可以对它们执行，例如创建、读取、更新和删除，通常称为 CRUD 。这不足为奇。类似的操作也可以在存储桶上执行。我们现在将使用
    `oci os bucket create` CLI 命令在 `Sandbox` 隔区中创建一个名为 `blueprints` 的新存储桶。为了遵循最佳实践，我们将以
    `sandbox-admin` 用户身份执行此操作和后续的几个操作。为此，请记得应用正确的 CLI 配置文件。


    ```

    $ oci os bucket create --name blueprints --profile SANDBOX-ADMIN

    {

    "data": {

    "approximate-count": null,

    "approximate-size": null,

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "created-by": "ocid1.user.oc1..aa.........7d5dca",

    "defined-tags": {},

    "etag": "7115bc55-b18c-4232-80f7-363643c327b9",

    "freeform-tags": {},

    "kms-key-id": null,

    "metadata": {},

    "name": "blueprints",

    "namespace": "jakobczyk",

    "object-lifecycle-policy-etag": null,

    "public-access-type": "NoPublicAccess",

    "storage-tier": "Standard",

    "time-created": "2019-03-07T15:25:52.065000+00:00"

    },

    "etag": "7115bc55-b18c-4232-80f7-363643c327b9"

    }

    ```


    响应中有几个有趣的元素值得解释。我们为 CLI 命令提供的唯一参数是存储桶名称。这就是为什么存储桶在需要时采用了默认配置值。结果，新创建的存储桶被配置为标准存储层存储桶，不允许公共访问。


    有两种*存储层*：标准和归档。它们差别不大。*归档存储层*基本上更便宜，但代价是无法立即访问对象，必须先恢复对象。这个操作可能需要几个小时。你会将归档存储用于什么？想想那些很少访问但由于某些监管或合规原因必须存储一定时间的数据。另一个例子可能是旧的日志或测量值，你目前不一定需要，但愿意保留以防万一。在本章中，我们将处理标准存储层存储桶。


    不允许公共访问意味着存储桶是私有的，对象只能由经过身份验证的 IAM 用户、实例主体或通过预认证请求访问。如果我们处理的是公共存储桶，对象将对所有人可见并可下载。图
    [5-4](#478313_1_En_5_Chapter.xhtml#Fig4) 显示了 OCI 控制台中的存储桶详细信息。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig4_HTML.png](images/478313_1_En_5_Chapter/478313_1_En_5_Fig4_HTML.png)


    图 5-4


    在 OCI 控制台中查看存储桶详细信息


    这是列出活动隔区中存在的存储桶并以表格形式显示它们的 CLI 命令：


    ```

    $ oci os bucket list --query ''data[*].{Bucket:name}'' --output table --profile
    SANDBOX-ADMIN

    +------------+

    | Bucket     |

    +------------+

    | blueprints |

    +------------+

    ```


    进入下一步，我们希望创建权限，允许 `sandbox-users` 组的成员列出此存储桶中存在的对象，并能够添加新对象和删除现有对象。为此，首先准备一个包含相关策略语句的文件，如清单
    [5-1](#478313_1_5_Chapter.xhtml#PC5) 所示。我将此文件命名为 `sandbox-users.policies.storage.json`
    ，但名称并不重要，只要在下一个命令中正确引用它即可。或者，你可以在以下路径的 Git 仓库中找到此文件：`chapter05/1-policies/sandbox-users.policies.storage.json`。


    ```

    [

    "allow group sandbox-users to read buckets in compartment Sandbox where target.bucket.name=''blueprints''",

    "allow group sandbox-users to manage objects in compartment Sandbox where target.bucket.name=''blueprints''"

    ]

    Listing 5-1

    sandbox-users.policies.storage.json

    ```


    `buckets` 的 `read` 策略动词允许用户列出存储桶并获取每个存储桶的详细配置。然而，我们使用了一个带有 `target.bucket.name`
    变量的条件，这基本上限制了权限，只允许用户操作名为 `blueprints` 的存储桶。类似地，我们对 `objects` 使用 `manage` 策略动词来授予对象范围内的所有操作类型，但仅限于
    `blueprints` 存储桶中的对象。


    一旦文件准备就绪，我们就可以使用 `oci iam policy create` CLI 命令，在 `Sandbox` 隔区中创建一个新策略，就像我们在上一章中添加新策略的方式一样。以
    `sandbox-admin` 身份工作，你只能在 `Sandbox` 隔区中创建策略。在第 [4](#478313_1_En_4_Chapter.xhtml)
    章中，我们将 `Sandbox` 隔区设置为 `~/.oci/oci_cli_rc` 文件中 `SANDBOX-ADMIN` 配置文件的默认隔区。这样，你可以跳过必需的
    `--compartment-id`（或其别名 `-c`）参数，因为 CLI 将能够读取并应用默认值。以下 CLI 命令将基于提供的文件创建一个新的 IAM
    策略。我假设你已经克隆了与本书相关的代码；因此，你可以进入包含策略文件的目录并执行 CLI 命令，如下所示：


    ```

    $ cd ~/git/oci-book/chapter05/1-policies

    $ oci iam policy create --name sandbox-users-storage-policy --statements file://sandbox-users.policies.storage.json
    --description "Storage-related policy for regular Sandbox users" --profile SANDBOX-ADMIN

    ```


    在此阶段，你应该能在 OCI 控制台中看到带有两个语句的新策略，如图 [5-5](#478313_1_En_5_Chapter.xhtml#Fig5) 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig5_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig5_HTML.jpg)


    图 5-5


    与 sandbox-users 相关的新对象存储策略


    执行将文件放入存储桶的最基本的命令之一怎么样？首先，我们需要一个样本文件。真实数据在当今是宝贵的，应该受到保护，所以让我们生成一个随机的、无意义的文件，我们假装它是一份房地产公寓蓝图
    PDF。以下是你使用 Bash 生成随机二进制文件的方法：


    ```

    $ mkdir ~/data

    $ cd ~/data

    $ SIZE=$((4096+(10+RANDOM % 20)*1024))

    $ head -c $SIZE /dev/urandom > 101.pdf

    $ ls -lh 101.pdf | awk ''{ print $9 " (" $5 ")" }''

    101.pdf (21K)

    ```


    很好。现在，请小心。从现在开始，连续的 CLI 命令将使用另一个配置文件 `SANDBOX-USER` 来调用。这是你可以使用 CLI 将此文件放入 `blueprints`
    存储桶的方法：


    ```

    $ oci os object put -bn blueprints --file 101.pdf --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    {

    "etag": "06b2293c-72d9-4668-b236-bdb881472bd6",

    "last-modified": "Thu, 07 Mar 2019 18:42:25 GMT",

    "opc-content-md5": "urJobycygNAm2Z3fEf3tkw=="

    }

    ```


    这很容易，不是吗？我们使用了 `oci os object put` 命令将 `101.pdf` 文件上传到 `blueprints` 存储桶。CLI 配置文件
    `SANDBOX-USER` 以 `sandbox-user` 用户身份进行身份验证。此用户属于 `sandbox-users` 组。片刻之前，我们授予了这个用户组对
    `Sandbox` 隔区中 `blueprints` 存储桶内的对象的管理级别访问权限。作为一个细心的读者，你可能想知道 CLI 如何知道目标对象存储命名空间的名称。该名称既未存储在
    CLI 配置文件中，也未存储在 `oci_cli_rc` 文件中。答案是它不知道。因此，CLI 必须在后台查询与租户关联的默认对象存储命名空间的 API，使用的
    API 与我们通过 `oci os ns get` 命令查询的 API 相同。如果你想避免这个额外的 API 内部调用，可以使用 `-ns` 选项将命名空间名称传递给对象存储
    CLI 命令，如下所示：'
  raw: '### Basics


    Objects can be thought of as data entities. This implies that there is a standard
    set of operations that can be performed on them such as create, read, update,
    and delete, commonly known as CRUD . No surprise here. Similar operations can
    be performed on buckets. We are now going to use the `oci os bucket create` CLI
    command to create a new bucket called `blueprints` in the `Sandbox` compartment.
    To stick to the best practices, we will perform this and a few consecutive operations
    as the `sandbox-admin` user. To do so, remember to apply the proper CLI profile.


    ```

    $ oci os bucket create --name blueprints --profile SANDBOX-ADMIN

    {

    "data": {

    "approximate-count": null,

    "approximate-size": null,

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "created-by": "ocid1.user.oc1..aa.........7d5dca",

    "defined-tags": {},

    "etag": "7115bc55-b18c-4232-80f7-363643c327b9",

    "freeform-tags": {},

    "kms-key-id": null,

    "metadata": {},

    "name": "blueprints",

    "namespace": "jakobczyk",

    "object-lifecycle-policy-etag": null,

    "public-access-type": "NoPublicAccess",

    "storage-tier": "Standard",

    "time-created": "2019-03-07T15:25:52.065000+00:00"

    },

    "etag": "7115bc55-b18c-4232-80f7-363643c327b9"

    }

    ```


    There are a couple of interesting elements in the response that are worth explaining.
    The only parameter we provided the CLI command with was the bucket name. This
    is why the bucket took the default configuration values whenever needed. As a
    result, the newly created bucket has been provisioned as a standard storage tier
    bucket with no public access allowed.


    There are two *storage tiers* : standard and archive. They do not differ much.
    The *archive storage tier* is basically cheaper at the cost of no immediate access
    to the objects that have to be restored first. This is an operation that can take
    a few hours. What would you use the archive storage for? Think about rarely accessed
    data that has to be stored for a given period of time because of some regulatory
    or compliance reasons. Another example could be old logs or measurements you do
    not necessarily need at the moment but would prefer to keep somewhere just in
    case. In this chapter, we are going to deal with standard storage tier buckets.


    No public access allowed means the bucket is private and the objects can be accessed
    only by authenticated IAM users, by instance principals, or through pre-authenticated
    requests. If we had been dealing with a public bucket, the objects would have
    been visible and downloadable for everyone. Figure [5-4](#478313_1_En_5_Chapter.xhtml#Fig4)
    shows the bucket details in the OCI Console.


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig4_HTML.png](images/478313_1_En_5_Chapter/478313_1_En_5_Fig4_HTML.png)


    Figure 5-4


    Viewing bucket details in the OCI Console


    This is the CLI command that lists the buckets present in an active compartment
    and displays them in a form of a table:


    ```

    $ oci os bucket list --query ''data[*].{Bucket:name}'' --output table --profile
    SANDBOX-ADMIN

    +------------+

    | Bucket     |

    +------------+

    | blueprints |

    +------------+

    ```


    Moving to the next step, we want to create permissions that allow the members
    of the `sandbox-users` group to list the objects that exist in this bucket as
    well as be able to add new and delete existing objects. To do so, prepare a file
    with the relevant policy statements first, as shown in Listing [5-1](#478313_1_En_5_Chapter.xhtml#PC5).
    I’ve called this file `sandbox-users.policies.storage.json` , but the name doesn’t
    matter as long as you reference it properly in the next command. Alternatively,
    you can find this file in the Git repository at the following path: `chapter05/1-policies/sandbox-users.policies.storage.json`.


    ```

    [

    "allow group sandbox-users to read buckets in compartment Sandbox where target.bucket.name=''blueprints''",

    "allow group sandbox-users to manage objects in compartment Sandbox where target.bucket.name=''blueprints''"

    ]

    Listing 5-1

    sandbox-users.policies.storage.json

    ```


    The `read` policy verb for `buckets` allows the users to list the buckets and
    get the detailed configuration of each bucket. Yet, we are using a condition with
    the `target.bucket.name` variable that basically limits the permission and allows
    the users to work only with the bucket named `blueprints`. Similarly, we are using
    the `manage` policy verb for `objects` to grant all kinds of operations in the
    scope of objects, but only those that are present in the `blueprints` bucket.


    As soon as the file is ready, we can create a new policy in the `Sandbox` compartment
    using `the oci iam policy create` CLI command in the same way we added new policies
    in the previous chapter. Working as the `sandbox-admin`, you are only able to
    create policies in the `Sandbox` compartment. In Chapter [4](#478313_1_En_4_Chapter.xhtml),
    we set the `Sandbox` compartment as the default compartment for the `SANDBOX-ADMIN`
    profile in the `~/.oci/oci_cli_rc` file. In this way, you can skip the required
    `--compartment-id` (or its `-c` alias) parameter because the CLI will be able
    to read and apply the default value. The following CLI command will create a new
    IAM policy based on the file supplied. I am assuming you have cloned the code
    related to the book; therefore, you can enter the directory that contains the
    policy file and execute the CLI command like this:


    ```

    $ cd ~/git/oci-book/chapter05/1-policies

    $ oci iam policy create --name sandbox-users-storage-policy --statements file://sandbox-users.policies.storage.json
    --description "Storage-related policy for regular Sandbox users" --profile SANDBOX-ADMIN

    ```


    At this stage, you should see the new policy with two statements in the OCI Console,
    as shown in Figure [5-5](#478313_1_En_5_Chapter.xhtml#Fig5).


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig5_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    New policy for sandbox-users related to object storage


    What about executing one of the most basic commands to put a file into the bucket?
    In the first place, we need a sample file. Real data is precious and should be
    protected nowadays, so let’s generate a random, meaningless file that we will
    pretend is a real estate apartment blueprint PDF. This is how you generate a random
    binary file using Bash:


    ```

    $ mkdir ~/data

    $ cd ~/data

    $ SIZE=$((4096+(10+RANDOM % 20)*1024))

    $ head -c $SIZE /dev/urandom > 101.pdf

    $ ls -lh 101.pdf | awk ''{ print $9 " (" $5 ")" }''

    101.pdf (21K)

    ```


    Perfect. Now, be careful. From now on, the consecutive CLI commands will be invoked
    using another profile, the `SANDBOX-USER` profile. This is how you can use the
    CLI to put this file into the `blueprints` bucket:


    ```

    $ oci os object put -bn blueprints --file 101.pdf --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    {

    "etag": "06b2293c-72d9-4668-b236-bdb881472bd6",

    "last-modified": "Thu, 07 Mar 2019 18:42:25 GMT",

    "opc-content-md5": "urJobycygNAm2Z3fEf3tkw=="

    }

    ```


    It was pretty easy, wasn’t it? We have used the `oci os object put` command to
    upload the `101.pdf` file to the `blueprints` bucket. The CLI profile `SANDBOX-USER`
    authenticates as the `sandbox-user` user. This user belongs to the `sandbox-users`
    group. A few moments ago, we granted this group of users the manage-level access
    over objects in the `blueprints` bucket in the `Sandbox` compartment. As a careful
    reader, you may wonder how the CLI knows the name of the target object storage
    namespace. The name is stored neither in the CLI config file nor in the `oci_cli_rc`
    file. The answer is it does not. As a result, the CLI must query the API for the
    default object storage namespace associated with the tenancy, in the background,
    using the same API as the one we queried with the `oci os ns get` command. If
    you want to avoid this additional internal call to the API, you can pass the namespace
    name to object storage CLI commands using the `-ns` option like this:'
