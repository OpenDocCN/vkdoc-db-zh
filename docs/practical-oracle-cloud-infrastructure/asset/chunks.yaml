    \ 9-23 所示。这个新对象是由运行在 Oracle Functions 平台上的动态生成的函数实例创建的。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig23_HTML.jpg](img/478313_1_En_9_Fig23_HTML.jpg)\n\
    **图 9-23**\n在 OCI 控制台中查看已处理的数据对象\n\n好了，到目前为止一切顺利，但这仍然不是我们最初预期的结果。我们的目标是让函数实例在存储桶中出现新对象时自动触发。是时候介绍另一个属于\
    \ CNCF 项目生态系统的开源项目了。\n\n## CloudEvents\n\nCloudEvents 项目是在 CNCF 伞形组织下运作的相对较新的计划之一。该项目的主要目标是为社区提供一个统一的规范来描述事件数据。事件驱动的应用程序并不新鲜，不同的软件组件已经为事件使用了大量各种结构。当事件发布者以不同于事件消费者预期的格式发出事件时，这通常会导致有时成本高昂，有时只是令人烦恼的额外应用程序集成工作。为了减轻这种痛苦，业界已经清楚地认识到，像事件上下文信息这样简单且范围相当有限的东西，应该通过联合努力达成一致。CloudEvents\
    \ 提供了一个描述事件数据的规范。此外，它还附带了各种编程语言的参考实现。您可以在 GitHub 上找到所有这些内容，如图 9-24 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig24_HTML.jpg](img/478313_1_En_9_Fig24_HTML.jpg)\n\
    **图 9-24**\nGitHub 上的 CloudEvents 项目\n\nCloudEvents 规范内容轻量且相对容易阅读。在撰写本文时，该规范有三个稳定版本。当您阅读本书时，很可能已经有更新的版本可用。不用担心。为了简要讨论该规范，我们将重点关注\
    \ 0.1 版本。细节会随着时间变化，但一般规则保持不变。我选择了 0.1 版本，因为它是您将在接下来的章节中学习的 Oracle Events 的当前标准。\n\
    \nCloudEvents 规范（版本 0.1）的核心包含三个部分。\n\n*   术语\n\n*   类型系统\n\n*   上下文属性\n\n最有趣的部分是*上下文属性*，它们有效地定义了事件信封，或者换句话说，基本上就是承载事件上下文信息的有效负载。这些主要是元数据，如事件的类型、来源和时间，以及事件特定的数据及其内容类型。这些属性列在表\
    \ 9-1 中。\n\n**表 9-1**\nCloudEvents 上下文属性\n\n| CloudEvents 版本 | 0.1 | 0.3 / 1.0-rc1\
    \ |\n| --- | --- | --- |\n| 使用的规范版本 | `cloudEventsVersion` | `specversion` |\n\
    | 事件类型 | `eventType` | `type` |\n| 事件类型的版本 | `eventTypeVersion` | - |\n| 事件发出者\
    \ | `source` | `source` |\n| 唯一事件标识符 | `eventID` | `id` |\n| 事件发生时间戳 | `eventTime`\
    \ | `time` |\n| `data` 字段中内容的类型 | `contentType` | `datacontenttype` |\n| 事件的特定领域数据\
    \ | `data` | `data` |\n\n清单 9-14 展示了 Oracle Cloud 中对象存储发出的事件的部分选定元素。您可以看到，在这种情况下，我们查看的是在创建新对象时发出的事件。这是基于\
    \ `eventType` 和 `source` 字段的值。 compartment、bucket 和对象名称包含在 `data` 元素内。清单仅显示了存储在\
    \ `resourceName` 字段中的对象名称。为了清单的简洁性，许多其他特定领域的事件数据被省略了。\n\n```json\n{\n\"eventType\"\
    : \"com.oraclecloud.objectstorage.createobject\",\n\"cloudEventsVersion\": \"\
    0.1\",\n\"eventTypeVersion\": \"2.0\",\n\"source\": \"ObjectStorage\",\n\"eventTime\"\
    : \"2019-09-23T10:49:00.195Z\",\n\"contentType\": \"application/json\",\n\"data\"\
    : {\n    ...\n    \"resourceName\": \"customer_attendance.20190923.csv\",\n  \
    \  ...\n},\n\"eventID\": \"b163df45-de9c-9f01-2928-b0906cd8a3e4\"\n}\n```\n**清单\
    \ 9-14**\nCloudEvent（版本 1）\n\n有了对 CloudEvents 规范的简要了解，我们可以进入本章的最后一部分了。\n"
- fmt: '## Oracle Events


    Oracle Cloud 中的选定服务可以配置为发出事件。这些事件符合开源 CloudEvents 规范（在撰写本文时，我们谈论的是该规范的 0.1 版本）。Oracle
    Events 用于将发出的事件与其他 Oracle Cloud 服务连接起来，以便在特定事件发生时执行操作。例如，您可以注册一个在某个事件发生时执行操作的函数；例如，当新的计算实例启动完成、数据库备份创建、收到通知或在特定存储桶中创建新对象时。您通过定义适当的
    OracleEvents 规则，将事件发出者与执行操作的服务连接起来。规则定义了已实现的事件处理链的条件和操作，如图 9-25 所示。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig25_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig25_HTML.jpg)


    图 9-25 Oracle Events


    回到我们的练习，首先，我们必须允许 Oracle Events 服务调用 Oracle Functions，以便在特定类型的事件发生时，能够触发定义在`Sandbox`复合区中的无服务器函数。清单
    9-15 展示了为此目的所需的唯一 IAM 策略语句。


    ```json

    [

    "allow service cloudEvents to use functions-family in compartment Sandbox"

    ]

    ```

    清单 9-15 cloudevents.policies.json


    现在，使用`oci iam policy create`来添加此语句。


    ```bash

    $ cd ~/git/oci-book/chapter09/4-events/policies

    $ oci iam policy create --name cloudevents-policy --statements file://cloudevents.policies.json
    --description "Functions-related policy for CloudEvents" --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "name": "cloudevents-policy",

    "description": "Functions-related policy for CloudEvents",

    "lifecycle-state": "ACTIVE",

    ...

    }

    }

    ```


    我们即将创建一个 Oracle Events 规则，该规则将一个定义了要响应事件类型的条件与一个操作相结合。清单 9-16 展示了我们将要使用的条件。


    ```json

    {

    "eventType": [ "com.oraclecloud.objectstorage.createobject" ],

    "data": {

    "compartmentName": ["Sandbox"],

    "additionalDetails": {

    "bucketName": ["reports"]

    }

    }

    }

    ```

    清单 9-16 oracleevents.conditions.json


    简而言之，当在`Sandbox`复合区内的`reports`存储桶中创建新对象时，规则将执行定义的操作，如清单 9-17 所示。


    ```json

    {

    "actions": [

    {

    "actionType": "FAAS",

    "description": "string",

    "functionId": "PUT_HERE_FUNCTION_ID",

    "isEnabled": true

    }

    ]

    }

    ```

    清单 9-17 oracleevents.actions.template.json


    我们稍后会引用这些文件。同时，还有一件重要的事情要做。某些类型的事件发出者必须显式启用。对象存储对象的事件就属于这种情况。我们需要为`reports`存储桶启用发出对象事件。在
    OCI 控制台中，您可以按照以下方式执行此任务：


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig26_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig26_HTML.jpg)


    图 9-26 为存储桶中的对象启用事件生成


    1.  转到菜单 ➤ 对象存储 ➤ 对象存储。

    2.  确保选择了`Sandbox`复合区。

    3.  单击`reports`存储桶的名称。

    4.  单击“发出对象事件”旁边的“编辑”。

    5.  选中“发出对象事件”框，如图 9-26 所示。

    6.  单击“保存更改”。


    在这个阶段，我们已经准备好创建一个新的 Oracle Events 规则，该规则将使用您刚才看到的条件文件和操作文件。如下面的代码片段所示，您将对条件文件的内容进行序列化，并使用`sed`程序创建包含最终操作的
    JSON 文件。这样做是为了准备`oci events rule create`命令的输入。请注意，`FN_FUN_OCID`变量仍然需要设置。以下是需要执行的代码：


    ```bash

    $ cd ~/git/oci-book/chapter09/4-events/events

    $ echo $FN_FUN_OCID

    ocid1.fnfunc.oc1.eu-frankfurt-1.aa...j3lfqa

    $ cat oracleevents.actions.template.json | sed -e "s/PUT_HERE_FUNCTION_ID/$FN_FUN_OCID/g"
    > oracleevents.actions.json

    $ SERIALIZED_CONDITIONS=`cat oracleevents.conditions.json | sed ''s/"/\\"/g''
    | sed ''s/[[:space:]]//g'' | tr -d ''\n''`

    $ echo $SERIALIZED_CONDITIONS

    {"eventType":["com.oraclecloud.objectstorage.createobject"],"data":{"compartmentName":["Sandbox"],"additionalDetails":{"bucketName":["reports"]}}}

    $ oci events rule create --display-name new-reports --is-enabled true --condition
    $SERIALIZED_CONDITIONS --actions file://oracleevents.actions.json

    ```


    规则已创建。如果您愿意，可以随时前往 OCI 控制台查看或酌情修改 Oracle Events 规则，如图 9-27 所示。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig27_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig27_HTML.jpg)


    图 9-27 在 OCI 控制台中查看 Oracle Events 规则


    要测试对象存储发出的事件是否真的触发了部署到 Oracle Functions 的`reportingfn`函数，请将剩余的两个测试文件放入`reports`存储桶。您可以使用`oci
    os object put`命令来完成，如下所示：


    ```bash

    $ cd ~/git/oci-book/chapter09/4-events/reports

    $ oci os object put -bn reports --file customer_attendance.20190923.raw.csv --profile
    SANDBOX-USER

    Uploading object  [####################################]  100%

    $ oci os object put -bn reports --file customer_attendance.20190924.raw.csv --profile
    SANDBOX-USER

    Uploading object  [####################################]  100%

    ```


    一段时间后，您应该会在同一个存储桶中看到另外两个文件出现，这次带有`.processed.csv`后缀，如图 9-28 所示。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig28_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig28_HTML.jpg)


    图 9-28 在 OCI 控制台中查看已处理的文件


    您可以自由探索这些文件的内容，比较`.raw.csv`和`.processed.csv`，并查看用于实现该函数的 Python 代码。


    提示


    如果没有任何反应，并且没有`.processed.csv`文件，您可能跳过了在存储桶上启用发出事件的步骤。删除这两个`.raw.csv`文件，在`reports`存储桶上启用发出事件，然后重新上传`.raw.csv`文件。'
  raw: '### Oracle Events


    Selected services on Oracle Cloud can be configured to emit events. These events
    are compliant with the open source CloudEvents specification. At the time of writing,
    we are talking about version 0.1 of the specification. Oracle Events is used to
    connect the emitted events with other Oracle Cloud services that perform actions
    when particular events occur. For example, you could register a function that
    takes some action; as soon as the launch of a new compute instance completes,
    a database backup is created, a notification is received, or a new object is created
    in a particular bucket. You connect event emitters with services that take actions
    by defining the appropriate OracleEvents rules. A rule defines conditions and
    actions for the implemented event processing chain, as illustrated in Figure [9-25](#478313_1_En_9_Chapter.xhtml#Fig25).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig25_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig25_HTML.jpg)


    Figure 9-25


    Oracle Events


    Coming back to our exercises, first of all, we have to allow the Oracle Events
    service to call Oracle Functions so that we can trigger serverless functions defined
    in the `Sandbox` compartment when an event of a particular type occurs. Listing
    [9-15](#478313_1_En_9_Chapter.xhtml#PC85) presents the only IAM policy statement
    we need for that purpose.


    ```

    [

    "allow service cloudEvents to use functions-family in compartment Sandbox"

    ]

    Listing 9-15

    cloudevents.policies.json

    ```


    Now, use `oci iam policy create` to get this statement added.


    ```

    $ cd ~/git/oci-book/chapter09/4-events/policies

    $ oci iam policy create --name cloudevents-policy --statements file://cloudevents.policies.json
    --description "Functions-related policy for CloudEvents" --profile SANDBOX-ADMIN

    {

    "data": {

    ...

    "name": "cloudevents-policy",

    "description": "Functions-related policy for CloudEvents",

    "lifecycle-state": "ACTIVE",

    ...

    }

    }

    ```


    We are about to create an Oracle Events rule that combines a condition that defines
    the kind of event to react to with an action. Listing [9-16](#478313_1_En_9_Chapter.xhtml#PC87)
    presents the condition we are going to use.


    ```

    {

    "eventType": [ "com.oraclecloud.objectstorage.createobject" ],

    "data": {

    "compartmentName": ["Sandbox"],

    "additionalDetails": {

    "bucketName": ["reports"]

    }

    }

    }

    Listing 9-16

    oracleevents.conditions.json

    ```


    To put it simply, when a new object is created in the `reports` bucket inside
    the `Sandbox` compartment, the rule will perform the action defined, as shown
    in Listing [9-17](#478313_1_En_9_Chapter.xhtml#PC88).


    ```

    {

    "actions": [

    {

    "actionType": "FAAS",

    "description": "string",

    "functionId": "PUT_HERE_FUNCTION_ID",

    "isEnabled": true

    }

    ]

    }

    Listing 9-17

    oracleevents.actions.template.json

    ```


    We will reference these files in a moment. In the meantime, there is still one
    important thing to be done. Some types of event emitters must be explicitly enabled.
    This is the case for events related to object storage objects. We need to enable
    emitting object events for the `reports` bucket. In the OCI Console, you can perform
    this task in the following way:


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig26_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig26_HTML.jpg)


    Figure 9-26


    Enabling event generation for the object in a bucket


    1.  Go to Menu ➤ Object Storage ➤ Object Storage.


    2.  Make sure that the `Sandbox` compartment is selected.


    3.  Click the name of the `reports` bucket.


    4.  Click Edit next to Emit Object Events.


    5.  Check the Emit Object Events box, as shown in Figure [9-26](#478313_1_En_9_Chapter.xhtml#Fig26).


    6.  Click Save Changes.


    At this stage, we are ready to create a new Oracle Events rule that takes the
    conditions and action files you saw a moment ago. As shown in the following code
    snippet, you will serialize the contents of the conditions file and use the `sed`
    program to create the JSON file that includes the final action. We do it to prepare
    the input to the `oci events rule create` command. Be careful, the `FN_FUN_OCID`
    variable is still expected to be set. This is the code to execute:


    ```

    $ cd ~/git/oci-book/chapter09/4-events/events

    $ echo $FN_FUN_OCID

    ocid1.fnfunc.oc1.eu-frankfurt-1.aa...j3lfqa

    $ cat oracleevents.actions.template.json | sed -e "s/PUT_HERE_FUNCTION_ID/$FN_FUN_OCID/g"
    > oracleevents.actions.json

    $ SERIALIZED_CONDITIONS=`cat oracleevents.conditions.json | sed ''s/"/\\"/g''
    | sed ''s/[[:space:]]//g'' | tr -d ''\n''`

    $ echo $SERIALIZED_CONDITIONS

    {"eventType":["com.oraclecloud.objectstorage.createobject"],"data":{"compartmentName":["Sandbox"],"additionalDetails":{"bucketName":["reports"]}}}

    $ oci events rule create --display-name new-reports --is-enabled true --condition
    $SERIALIZED_CONDITIONS --actions file://oracleevents.actions.json

    ```


    The rule has been created. If you want, you can always go to the OCI Console to
    view or optionally amend the Oracle Events rule, as shown in Figure [9-27](#478313_1_En_9_Chapter.xhtml#Fig27).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig27_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig27_HTML.jpg)


    Figure 9-27


    Viewing Oracle Events rule in the OCI Console


    To test whether the events emitted by object storage really trigger the `reportingfn`
    function deployed to Oracle Functions, put the two remaining test files in the
    `reports` bucket. You can do it with the `oci os object put` command like this:


    ```

    $ cd ~/git/oci-book/chapter09/4-events/reports

    $ oci os object put -bn reports --file customer_attendance.20190923.raw.csv --profile
    SANDBOX-USER

    Uploading object  [####################################]  100%

    $ oci os object put -bn reports --file customer_attendance.20190924.raw.csv --profile
    SANDBOX-USER

    Uploading object  [####################################]  100%

    ```


    After a while, you should see two more files appear in the same bucket, this time
    with the `.processed.csv` suffix, as shown in Figure [9-28](#478313_1_En_9_Chapter.xhtml#Fig28).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig28_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig28_HTML.jpg)


    Figure 9-28


    Viewing processed files in the OCI Console


    Feel free to explore the contents of these files, compare `.raw.csv` to `.processed.csv`,
    and see the Python code that was used to implement the function.


    Tip


    If nothing happens and there are no `.processed.csv` files, you probably skipped
    the step in which you enable emitting events on the bucket. Delete the two `.raw.csv`
    files, enable emitting events on the `reports` bucket, and reupload the `.raw.csv`
    files.'
