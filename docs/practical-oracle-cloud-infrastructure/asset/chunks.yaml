    ## Function Deployment and Testing


    ```bash

    [ubuntu@dev-vm]$ cd ~/uuidfn

    [ubuntu@dev-vm]$ fn -v deploy --app uuidcloudapp --no-bump

    Deploying uuidfn to app: uuidcloudapp

    Building image fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2

    FN_REGISTRY:  fra.ocir.io/jakobczyk/sandbox-fn

    Current Context:  sandbox-user-fra-oci

    ...

    Successfully built 258fbf5d0629

    Successfully tagged fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2

    Parts:  [fra.ocir.io jakobczyk sandbox-fn uuidfn:0.0.2]

    Pushing fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2 to docker registry...The
    push refers to repository [fra.ocir.io/jakobczyk/sandbox-fn/uuidfn]

    ...

    Updating function uuidfn using image fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2...

    Successfully created function: uuidfn with fra.ocir.io/jakobczyk/sandbox-fn/uuidfn:0.0.2

    ```


    As you can see in the build output, the image was properly tagged and pushed to
    the OCIR in the region of our choice. Finally, the function creation was reported
    to be successful.


    Back in the OCI Console, if you click the `uuidcloudapp` application name, you
    will be taken to the more detailed view and should see the newly created function
    in the list, as presented in Figure [9-14](#478313_1_En_9_Chapter.xhtml#Fig14).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig14_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig14_HTML.jpg)


    **Figure 9-14**

    Viewing functions in the OCI Console


    Similarly, the function-specific container image will be listed in the OCIR view
    in the OCI Console, as shown in Figure [9-15](#478313_1_En_9_Chapter.xhtml#Fig15).
    If you completed the exercises from the previous chapter, you may also see another
    image in the `sandbox/uuid` repository.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig15_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig15_HTML.jpg)


    **Figure 9-15**

    Viewing the function-specific container image in the OCI Console


    Function testing can be done in the same way as before. We will use the `fn invoke`
    command that takes the application name and the function name as parameters. For
    a simple smoke test, let’s issue a single-function call.


    ```bash

    [ubuntu@dev-vm]$ fn invoke uuidcloudapp uuidfn

    {"generator_uuid": "921d63a9-f20c-44c0-97e6-5ff875fb1b39"}

    ```


    As you recall, the `uuidfn` function parses the input in a search for a top-level
    `client_name` JSON object that is used to set the value for the `generator_client`
    object in the JSON response. To test the input data processing, issue the following
    command:


    ```bash

    [ubuntu@dev-vm]$ echo -n ''{ "client_name": "some_app"  }'' | fn invoke uuidcloudapp
    uuidfn --content-type application/json

    {"generator_uuid": "7685e3b8-5db7-49e1-8f1b-1561e16e9103", "generator_client":
    "some_app"}

    ```


    Let’s trigger the function two more times.


    ```bash

    [ubuntu@dev-vm]$ fn invoke uuidcloudapp uuidfn

    {"generator_uuid": "9b4ad9bb-7d20-47d9-a53c-b3eb61854e4d"}

    [ubuntu@dev-vm]$ fn invoke uuidcloudapp uuidfn

    {"generator_uuid": "b60fa2f0-3778-4a6a-9932-90d852a78ab1"}

    ```


    Now, in the OCI Console, you can go to the Metrics tab in the Resources menu and
    inspect various metrics for this particular function. For example, one of the
    simplest but still very interesting metrics is the number of function invocations.
    It looks like what is shown in Figure [9-16](#478313_1_En_9_Chapter.xhtml#Fig16).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig16_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig16_HTML.jpg)


    **Figure 9-16**

    Viewing function invocations in the OCI Console


    A moment ago, to conduct function tests, we employed the `fn invoke` command.
    Normally, function consumers such as regular client applications or other systems
    will use the function’s HTTP `invoke endpoint` instead, either directly or, in
    the case of more sophisticated solutions, hidden behind an enterprise-grade API
    management platform. You can discover the endpoint in the OCI Console as well
    as by using the `fn inspect function` command like this:


    ```bash

    [ubuntu@dev-vm]$ fn inspect function uuidcloudapp uuidfn | jq -r ''.annotations."fnproject.io/fn/invokeEndpoint"''

    https://wup2t5yjlba.eu-frankfurt-1.functions.oci.oraclecloud.com/20181201/functions/ocid1.fnfunc.oc1.eu-frankfurt-1.aa...gsoxsq/actions/invoke

    ```


    Function calls in the form of HTTP requests are sent to the invoke endpoints and
    must be signed using the correct Oracle Cloud Infrastructure signature. In other
    words, Oracle Functions accepts external requests only when they are sent by known
    tenancy users no matter if they are human or system users. If you send an unsigned
    request to a function invoke endpoint, you will receive the following response:


    ```json

    {"code":"NotAuthenticated","message":"Not authenticated"}

    ```


    To send signed requests, you will need to map your function consumers to existing
    Oracle Cloud users, which would require some careful planning. Furthermore, to
    expose more user-friendly REST APIs to the function consumers, you would probably
    deploy some kind of a gateway or even employ an aforementioned fully fledged API
    management platform. Let me skip this topic here because it relates to aspects
    that are beyond the scope of this book. In the meantime, let’s move on to discuss
    the second type of function triggers, namely, events.


    ## Events


    What is an `event`? Usually, we use this word to refer to an occurrence of a particular
    situation of some kind. Let me take a business process as an example. An incoming
    e-mail to a particular inbound e-mail address could be treated as an event and
    effectively trigger a new business process case in the system. Similarly, a new
    file uploaded to the object storage bucket could also be treated as an event and
    trigger a serverless function instance to process the newly uploaded data. In
    both cases, events need to carry some additional, but preferably limited and lightweight,
    context information. In the latter example, an event would carry at least the
    name of the new object as well as the name of the bucket. In this way, the corresponding
    serverless function would be able to recognize the object whose creation caused
    the event. Events are crucial in contemporary software architectures and provide
    the foundation for different application integration patterns such as fire-and-forget,
    publish-subscribe, or store-and-forward. Event-driven application architectures,
    where components communicate by exchanging events, benefit from loose coupling,
    the key enabler for independent component development and lifecycle management
    that eventually boosts productivity.


    As an exercise, we are going to deploy and test a serverless function that processes
    newly created objects that appear in a particular object storage bucket. Function
    instances will be triggered by object creation events in that particular bucket.
    When a new object is uploaded to the `reports` bucket, an instance of the `reportingfn`
    serverless function will be created and provided with the event context information
    that carries the object name. Next, the function will verify whether the name
    of the object uses the `.raw.csv` suffix. If yes, the function will read the contents
    of the object, perform a simple data aggregation in memory, and create a new object
    to store the results of the operation. The new object will be suffixed with the
    `.processed.csv` suffix. Figure [9-17](#478313_1_En_9_Chapter.xhtml#Fig17) illustrates
    the data processing logic stated earlier.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig17_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig17_HTML.jpg)


    **Figure 9-17**

    Event-based function calls

