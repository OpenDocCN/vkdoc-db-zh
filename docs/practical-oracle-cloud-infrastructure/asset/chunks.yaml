    \ ~/uuidfn/func.py\n```\n\n清单 9-4 显示了 UUID 生成函数的代码。\n\n```\nimport io\nimport\
    \ json\nimport uuid\nfrom fdk import response\ndef handler(ctx, data: io.BytesIO=None):\n\
    \    res_dict = {}\n    try:\n        # Generate UUID\n        res_dict[\"generator_uuid\"\
    ] = str(uuid.uuid4())\n        # Intercept input and prepare optional response\
