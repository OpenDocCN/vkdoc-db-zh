    ```


    This section gave you a brief introduction to Fn Project and locally executed
    serverless functions in practice. There are many other aspects I have not covered
    such as packaging a number of functions in a single application, unit testing,
    and pushing the function image to other registries. More importantly, serverless
    does give a no-infrastructure impression for serverless function developers only.
    If you want to operate a serverless platform, especially in production, there
    are various crucial tasks to plan for and carry out. These tasks refer to security,
    load balancing, and worker node pool management. Fn Project documents these instructions
    on its web page. All these things are beyond the scope of this book.


    Instead of operating a serverless platform on your own, you can rely on a managed
    cloud-based serverless platform. In the next section, we will be working with
    Oracle Functions, which is a managed serverless platform built with Fn Project
    on Oracle Cloud Infrastructure.


    ### Oracle Functions


    Fn Project serves as a foundation for *Oracle Functions*, a function-as-a-service
    platform available on Oracle Cloud. In the previous section, you worked with a
    local Fn server. Now, you can take the same function code and deploy it to Oracle
    Functions. By doing that, you will let your function run in an Oracle Cloud region
    of your choice. There is no need to configure any compute instances or container
    orchestration clusters like we did in the previous chapters to run applications.
    The underlying compute resources are fully managed by Oracle Functions in the
    background. Function instances are dynamically created in response to the function
    *triggers*. As you would probably expect, the most basic trigger type is an HTTP
    request. Every Fn Project function that gets deployed to Oracle Functions will
    be given a dedicated HTTP-based *function endpoint*. Requests sent to that endpoint
    must be properly signed to pass through the authentication and authorization done
    with OCI Identity and Access Management. When they succeed, Oracle Functions reads
    function metadata and, based on that information, creates a function-specific
    container to process the request. Other types of triggers are various *events*
    that take place within Oracle Cloud. For instance, a newly created object in a
    particular object storage bucket may generate an event that is propagated by the
    Oracle Events service to a selected function in the Oracle Functions service.
    You will learn about that in the second part of this chapter. Both triggers, HTTP-based
    and event-based, and the general way Oracle Functions work are illustrated in
    Figure [9-9](#478313_1_En_9_Chapter.xhtml#Fig9).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig9_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Oracle Functions


    It is recommended that function-specific container images are stored in Oracle
    Container Image Registry (OCIR) in the same region as the Oracle Functions endpoint
    you want your serverless function to run on. You already worked with OCIR in the
    previous chapter. At that time, Oracle Kubernetes Engine was pulling images from
    OCIR to create containers in Kubernetes pods. This time, the images will be dynamically
    pulled by Oracle Functions to create short-living function containers that handle
    function calls as they arrive.'
