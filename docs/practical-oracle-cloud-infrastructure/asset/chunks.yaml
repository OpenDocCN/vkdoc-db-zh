    Figure 7-25


    Time dimensions in SQL Developer Web


    To sum up this part, the data of all three dimensions is currently present in
    the database. It is time to add the facts.


    #### Facts


    Dimensions set the context for the facts. The facts, however, carry the most valuable
    information, namely, diverse numeric data that can later be subjected to various
    analytical operations. Unlike dimensions, fact tables can indeed be very large
    and contain a vast collection of records. On many occasions, the collection of
    records is so big that it must be split into multiple source data files. To simulate
    this, I have prepared not one but four comma-separated-value files that include
    the source data for the fact table. Each file contains facts collected from a
    period of time that spans half a year. In this way, altogether, the four files
    contain data for the period of two calendar years. You can find the fact data
    files in the `chapter07/3-facts` directory.


    ```

    $ cd ~/git/oci-book/chapter07/3-facts/

    $ ls -1 *.csv

    facts.16H1.csv

    facts.16H2.csv

    facts.17H1.csv

    facts.17H2.csv

    ```


    Figure [7-26](#478313_1_En_7_Chapter.xhtml#Fig26) illustrates the structure of
    a comma-separated-value file that holds data for the fact table. Each record references
    one Time, one Road, and one Event dimension entry. For example, the `road_dim_id`
    column of the source file for the fact table matches one Road dimension record
    with the same value in `the segment_id` column. The columns with dimension information
    are followed by quantitative data columns that carry information on the occurrence
    of road events and the related number of people injured and killed.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig27_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig27_HTML.jpg)


    Figure 7-27


    Facts data files in the object storage bucket


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig26_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig26_HTML.jpg)


    Figure 7-26


    Road Event facts


    Use the `os object put` CLI command to upload all four fact files to the object
    storage bucket. Remember to apply the `SANDBOX-USER` profile like before. You
    can use it in a Bash shell `for` loop in this way:


    ```

    $ for fact in `ls facts.*.csv`; do echo $fact; oci os object put -bn roadadw-load
    --file $fact --profile SANDBOX-USER; done

    facts.16H1.csv

    Uploading object  [####################################]  100%

    facts.16H2.csv

    Uploading object  [####################################]  100%

    facts.17H1.csv

    Uploading object  [####################################]  100%

    facts.17H2.csv

    Uploading object  [####################################]  100%

    ```


    You should now see these files as objects in the `roadadw-load` bucket, as shown
    in Figure [7-27](#478313_1_En_7_Chapter.xhtml#Fig27).


    Back in SQL Developer Web, still logged in as the `SANDBOX_USER` user, execute
    the SQL DDL statement that will create your database fact table.


    ```

    create table ROADEVENTS_FACT (

    time_dim_id     char(6) not null,

    road_dim_id     char(6) not null,

    event_dim_id    char(7) not null,

    occurrence      number(10) not null,

    injured         number(10) not null,

    killed          number(10) not null,

    constraint pk_roadevents_fact

    primary key (time_dim_id, road_dim_id, event_dim_id),

    constraint fk_road_dim

    foreign key (road_dim_id)

    references ROAD_DIM(segment_id),

    constraint fk_event_dim

    foreign key (event_dim_id)

    references EVENT_DIM(event_id),

    constraint fk_time_dim

    foreign key (time_dim_id)

    references TIME_DIM(day_id)

    );

    ```


    The fact table references the dimension tables. Foreign key constraints are used
    to ensure that a particular dimension table record indeed exists before the fact
    record is inserted into the fact table. In this way, we are protecting the referential
    integrity of our data model. The table should be created with no problem.


    ```

    Table ROADEVENTS_FACT created

    ```


