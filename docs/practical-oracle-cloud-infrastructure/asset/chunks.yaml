- fmt: '# Practical Oracle Cloud Infrastructure


    ![](images/978-1-4842-5506-3_CoverFigure.jpg)


    ISBN 978-1-4842-5505-6

    e-ISBN 978-1-4842-5506-3

    [https://doi.org/10.1007/978-1-4842-5506-3](https://doi.org/10.1007/978-1-4842-5506-3)

    © Michał Tomasz Jakóbczyk 2020


