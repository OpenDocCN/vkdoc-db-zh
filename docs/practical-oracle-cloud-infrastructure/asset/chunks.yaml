    Additionally, at the time of writing, we have to pass the `--version-date` argument
    to the CLI command; otherwise, the validation fails. This parameter defines the
    effective policy verb and resource type scope. Using an empty value for the `--version-date`
    argument will include all future resource types added to the resource type family
    as well as changes in policy verb definitions. For the purpose of this exercise,
    it actually does not matter, but the parameter has to be set.


    Until this point, we created a new tag namespace and a defined tag key. Next,
    we specified a new dynamic group with a matching rule that accepts a compute instance
    as a member of the dynamic group, provided that the instance carries the newly
    defined tag. Finally, we added to the existing policy a new statement to let the
    dynamic group members manage objects in the `Sandbox` compartment. We are ready
    to provision the infrastructure shipped with a custom application that will allow
    us to see an instance principal in action.


    ### Accessing Storage from Instances


    In this section, you are going to apply Terraform infrastructure code that provisions
    a simple set of cloud resources including a single CentOS-based virtual machine.
    On the machine, we will run a simple Python-based application wrapped into a systemd-based
    Linux operating system service. The application will list a set of objects in
