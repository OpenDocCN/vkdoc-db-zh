    commit yourself that you are going to spend an agreed amount of money on cloud
    services each month. If you spend less than what you have declared, it is your
    loss. If you spend more, the *overcharges* would kick in and probably result in
    additional charges based on the pay-as-you-go pricing model. At first glance,
    this model makes no sense because it lacks the flexibility of the first one. Yet,
    the fact that you commit yourself (or rather your organization) to spend a set
    amount of money on the cloud services each month makes you eligible to benefit
    from, usually significantly, *discounted prices*. This pricing option seems to
    be a perfect fit for a stable production environment, where you already know the
    average monthly consumption. Alternatively, you can decide to switch to the commitment-based
    pricing from the pay-as-you-go pricing for your development and test environments,
    as soon as you are able to say that the risk of a sudden project closure is low
    and it is possible to predict the future consumption. Figure [1-10](#478313_1_En_1_Chapter.xhtml#Fig10)
    presents a cost comparison between a pay-as-you-go (PAYG) option and a commitment-based
    option with a 20 percent discount.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig10_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    PAYG vs. commitment-based plan


    You should now have a pretty consistent, high-level understanding of cloud computing.
    It is time to introduce you to the main subject of this book: Oracle Cloud Infrastructure.


    ## Oracle Cloud Infrastructure


    *Oracle Cloud Infrastructure* (OCI) is a suite of infrastructure-as-a-service
    public cloud services Oracle has made available for the general public, small
    businesses, nonprofit organizations, government agencies, and large enterprises.
    OCI delivers a broad range of cloud resources that fulfill core cloud capabilities
    such as compute, networking, different kinds of storage, and identity and access
    management. Furthermore, OCI features a number of integrated platform-as-a-service
    cloud services built on top of the OCI IaaS layer. These include, but are not
    limited to, two types of fully managed Oracle Database known as Autonomous Transaction
    Processing (ATP) and Autonomous Data Warehouse (ADW), managed container orchestration
    using the open source Kubernetes engine, and an integrated Docker container registry.
    Furthermore, the OCI ecosystem includes a rich choice of diverse templates that
    use the open source provisioning tool called Terraform to deploy systems such
    as different NoSQL databases, data integration platforms, and data science workbenches.


    Oracle Cloud Infrastructure evolved from the smaller-in-scope Oracle Bare Metal
    Cloud Service (BMCS) built by a Seattle-based Oracle team of experienced cloud
    professionals coming from diverse backgrounds such as other public cloud providers,
    independent software vendors, and the open source ecosystem.'
  trans: '## 成本


    一位智者曾言，天下没有免费的午餐。无论你是仅为自身组织运行私有云，还是更常见的，使用公共云服务，总得有人为底层的设备、维护、供电、冷却和数据中心设施买单。


    从云服务提供商的角度来看，精确计量云服务的消耗量，并根据项目团队和云账户所有者的实际使用情况进行收费至关重要。用于跟踪云服务消耗的`指标`类型通常取决于云资源的种类。例如，整体计算实例的消耗量可以通过在所选的计费周期（如一个日历月）内，由运行中的实例所使用的
    CPU 总小时数来衡量。网络能力的使用指标可能基于超出某个阈值的出站数据流量的 GB 数。对象存储的利用率则可以根据存储数据的 GB 数以及发送到对象存储
    API 的请求数量来计算。


    现在，让我们快速了解一下公共云提供商提供的两种最常见的定价选项。在软件项目的早期阶段，你的团队通常会使用多个开发和测试环境。这类环境往往会通过增减云资源的数量和大小而不断变化。云服务的使用量每个月可能差异很大，因此，预测未来的消耗量可能比较困难。`按需付费`是这种情况下很适用的定价选项。基于指标的度量，你和你的云提供商可以准确知道计费周期结束时的消耗水平和你将承担的成本。这种定价选项还允许一件事，对于某些概念验证或研发活动尤其重要。具体来说，并非每一次创新尝试或仅仅构建一个新的云解决方案都能成功，或在长期内找到愿意为其买单的合理受众。按需付费定价没有任何承诺义务。如果你愿意，你可以随时终止所有云资源，从而有效停止任何进一步的费用。


    第二种定价模型基于年度甚至更长期的`承诺`。你承诺每月将在云服务上花费约定的金额。如果你的花费低于你声明的金额，损失由你承担。如果花费超过，`超额费用`就会生效，并可能基于按需付费定价模型产生额外费用。乍一看，这种模式没有意义，因为它缺乏第一种模式的灵活性。然而，你（或者更确切地说，你的组织）承诺每月在云服务上花费固定金额这一事实，使你通常有资格享受（通常幅度显著的）`折扣价格`。这种定价选项似乎非常适合稳定的生产环境，在那里你已经知道了平均月消耗量。或者，一旦你能够说项目突然关闭的风险较低，并且可以预测未来的消耗量，你也可以决定将开发和测试环境从按需付费定价切换到基于承诺的定价。图
    1-10 展示了按需付费（PAYG）选项与享受 20%折扣的基于承诺选项之间的成本比较。


    ![`../images/478313_1_En_1_Chapter/478313_1_En_1_Fig10_HTML.jpg`](img/478313_1_En_1_Fig10_HTML.jpg)


    图 1-10


    按需付费 vs. 基于承诺的计划


    至此，你应该对云计算有了相当一致且高层次的理解。是时候向你介绍本书的主体：Oracle Cloud Infrastructure。


    ## Oracle Cloud Infrastructure


    `Oracle Cloud Infrastructure` (OCI) 是 Oracle 向公众、小型企业、非营利组织、政府机构和大型企业提供的基础设施即服务公共云服务套件。OCI
    提供了广泛的云资源，满足核心云能力，如计算、网络、各类存储以及身份与访问管理。此外，OCI 还具备一系列构建在 OCI IaaS 层之上的集成平台即服务云服务。这些服务包括但不限于两种完全托管的
    Oracle 数据库，称为自治事务处理（ATP）和自治数据仓库（ADW），使用开源 Kubernetes 引擎进行托管容器编排，以及集成的 Docker 容器注册表。此外，OCI
    生态系统还提供了丰富的多样化模板选择，这些模板使用名为 Terraform 的开源供应工具来部署系统，例如各种 NoSQL 数据库、数据集成平台和数据科学工作台。


    Oracle Cloud Infrastructure 源自范围较小的 Oracle 裸金属云服务（BMCS），该服务由位于西雅图的 Oracle 团队构建，团队成员是经验丰富的云专业人士，来自其他公共云提供商、独立软件供应商和开源生态系统等不同背景。'
- fmt: '### Regions


    Oracle has been a global leader in database systems and business applications
    for decades. Moreover, nowadays, its portfolio of information technology solutions
    includes middleware platforms, integration tools, business intelligence, analytics
    products, and more. Since the acquisition of Sun Microsystems, Oracle has additionally
    become the custodian of the Java ecosystem. Currently, Oracle is on its way to
    complete the company’s transformation to the cloud by adding more advanced features
    to `Oracle Cloud Infrastructure`, which is sometimes referenced as the Gen2 cloud
    infrastructure, moving its PaaS services to `OCI` and geographically expanding
    its global footprint by adding new data center `regions`, as shown in Figure [1-11](#478313_1_En_1_Chapter.xhtml#Fig11).
    You can always find an updated map at [`https://cloud.oracle.com/regions`](https://cloud.oracle.com/regions).


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig11_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig11_HTML.jpg)


    Figure 1-11: Oracle Cloud Infrastructure regions


    Each `Oracle Cloud Infrastructure` *region* consists of one or more *availability
    domains* located in a geographical proximity and composed of one or more data
    centers. The `availability domains` within a single `region` are interconnected
    using low-latency and high-bandwidth links but still physically isolated to help
    survive sudden natural disasters or, more often, a cascade of equipment failure.
    The likelihood of two `availability domains` failing at the same time is rather
    small, so it should be enough to design your cloud solutions in a way that the
    cloud resources are replicated across two or even three `availability domains`
    in order to achieve truly highly available architecture.


    Note: Newly introduced `regions` may offer a single `availability domain` either
    permanently or just for some initial period of time.


    Less critical systems can be distributed across two or three *fault domains* within
    a single `availability domain`. What does this mean? Hardware inside a single
    `availability domain` can be split into physically isolated units of equipment
    called *fault domains*. In this way, a power unit failure or a cascade of equipment
    failures within a single hardware unit may be separated from impacting other units.
    Instances provisioned in one `fault domain` are less likely to be impacted by
    the technical problems originating in a different `fault domain`. Still, if possible,
    it is recommended to rely on the `availability domains` if your cloud solutions
    are meant to survive and remain in operation under unexpected conditions. Figure
    [1-12](#478313_1_En_1_Chapter.xhtml#Fig12) presents the relationships between
    `region`, `availability domains`, and `fault domains`.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig12_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig12_HTML.jpg)


    Figure 1-12: Regions, availability domains, and fault domains


    What kind of workloads are we able to execute on `Oracle Cloud Infrastructure`?
    Let’s move to the next section to answer this question.


    ### Workloads


    When you consider moving an existing solution or building a completely new service
    in the cloud, you should always begin by looking at the data you are going to
    process and store in the cloud. Depending on the geographical region and the legal
    jurisdiction you fall within, you will be often legally obliged to comply with
    various data protection acts. This is the aspect to which you should actually
    pay more attention in the beginning than the application architecture planned
    for your cloud-based solution.


    From a purely technical point of view, as long as it is possible to successfully
    compose a sufficient set of cloud infrastructure resources that collectively serves
    as a backbone to the cloud solution you are working on, we can say that this kind
    of application or *workload* is indeed supported by `Oracle Cloud Infrastructure`.
    If we were asked to list a few typical types of systems you could run on `OCI`,
    we could come up with applications such as the following:


    *   **Multitier web applications** provisioned using virtual machines or powerful,
    dedicated bare-metal hosts launched in public and private virtual cloud network
    subnets. Using a proper mix of public and private subnets allows you to keep accurate
    isolation for each application tier.

    *   Distributed, microservices-oriented, **container-based systems** running on
    a managed Kubernetes container engine, called `Oracle Kubernetes Engine`.

    *   **Database-contained workflows**, transactional or analytical, backed up by
    a feature-complete, market-leading, fully managed relational database management
    system, called `Oracle Autonomous Database`.

    *   **High-performance computing** (HPC) that supports things like rendering,
    engineering simulations, or big data workloads.

    *   Various **traditional applications** lift-and-shifted from their earlier on-premise
    environment and deployed in the cloud infrastructure that design mirrors the on-premise
    hardware setup.

    *   **Serverless** workloads using `Oracle Functions` that relies on the open
    source `Fn Project`.

    *   Or anything else that requires **additional, peak-time processing capacity**
    beyond what you are able to deliver with your current infrastructure.


    Last but not least, independent professionals could also benefit from subscribing
    to their own cloud tenancies. Instead of using a dozen VMs, individual developers
    could consider performing some of their work using cloud-based compute instances
    in place of heavy-footprint, locally hosted virtual machines. As another example,
    it is faster to provision a managed Kubernetes engine that consists of multiple
    worker nodes in the cloud than doing it on a set of virtual machines hosted locally
    on your laptop.


    ### Services


    Each of the core cloud capabilities we’ve discussed so far in this chapter is
    a logical grouping of related cloud resource types. For example, the compute capability
    can be delivered with the cloud resources such as a compute instance, an instance
    pool, or a compute image. From the naming point of view, `Oracle Cloud Infrastructure`
    organizes cloud resource types into *services*. In this section, we will briefly
    outline and characterize these `services` and their most common cloud resource
    types. I’ve collected them in Table [1-1](#478313_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1: Oracle Cloud Infrastructure Services'
