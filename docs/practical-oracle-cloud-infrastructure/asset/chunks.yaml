    单个实例永远不足以提供可靠的云 API。然而，仍然可能出问题，摧毁你孤立的应用程序节点。如果你有多个执行相同职责的节点，并且分布在各个数据中心，那么即使单个数据中心发生故障，你也可能永远不会经历完全停机。此外，如果你有更多相同类型的实例，就可以并行处理更多的请求。事情就这么简单。


    图 2-35 展示了水平扩展。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig35_HTML.jpg](img/478313_1_En_2_Fig35_HTML.jpg)


    图 2-35


    水平扩展应用程序


    基本的云概念之一是自动伸缩。*自动伸缩* 发生在云控制平面根据变化的指标（如请求数或 CPU 利用率）动态地通过添加或移除实例节点来水平扩展应用程序时。我们将在本书后面更详细地讨论自动伸缩。在本节中，我将向你展示如何使用自定义镜像手动扩展应用程序。

