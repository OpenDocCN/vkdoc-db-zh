    to their own compartments, you have to make sure that the requestor belongs to
    a group that holds the `manage local-peering-from` rights. The acceptor belongs
    to a group that holds the `managed local-peering-to` rights. Both IAM policy resource
    types (`local-peering-from` and `local-peering-to`) belong to the `virtual-network-family`.
    To learn more about IAM policies, please refer to Chapter [4](#478313_1_En_4_Chapter.xhtml).


    As soon as the LPGs have been successfully connected, the VCN peering is in place.
    Now, you have to adapt the routing tables in both VCNs. Basically, new route rules
    that direct the traffic intended for the other VCN must be added on both sides.
    The target network entity is the LPG, as shown in Figure [6-18](#478313_1_En_6_Chapter.xhtml#Fig18),
    where the other VCN uses the 10.6.0.0/16 address range.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig18_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Route rules for local VCN peering


    The last elements to add are the security rules. There is no exception here. Just
    like you would add new security rules for different subnets in the same VCN, you
    have to do the same for the subnets from the peered VCN. Please consider using
    stateless rules to avoid unnecessary connection tracking related to stateful rules.


    VCN peering is a point-to-point connection. Any given VCN can be locally peered
    with up to ten other VCNs. In other words, you can have up to ten LPGs per VCN
    where each LPG represents one peered VCN, as shown in Figure [6-19](#478313_1_En_6_Chapter.xhtml#Fig19).
    It does not sound very scalable, does it? Another important characteristic of
    peering to remember is the fact that instances in one VCN cannot use the Internet
    gateway in the peered VCN to access the Internet.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig19_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig19_HTML.jpg)


    Figure 6-19


    One LPG per one peered VCN


    In the case of a complex application landscape, you may either end up with a hard-to-manage
    local peering VCN spaghetti or hit the maximum limit of local peering connections.
    To alleviate these problems, there are two alternative architectures to consider.


    *   Using a dedicated compartment just for cloud networking


    *   Using a messaging platform as a service


    Figure [6-20](#478313_1_En_6_Chapter.xhtml#Fig20) presents a high-level sketch
    of an architecture in which there is a *dedicated networking compartment* with
    one large VCN that contains multiple subnets. Each subnet is dedicated to one
    production system. Production system instances are launched in their own compartments
    but, at the same time, are attached to subnets from the VCN in the networking
    compartment. This setup completely eliminates the need for local VCN peering,
    but this benefit may come at a cost of more complex IAM policies, especially if
    there are different compartment admin groups in place.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig20_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig20_HTML.jpg)


    Figure 6-20


    Architecture based on a dedicated network compartment


    Another recommended way to go in the case of complex application landscapes that
    involve multiple production systems is to use a messaging platform as a service.
    Production systems send their messages to a messaging cluster that under the hood
    consists of multiple message brokers. If you choose a managed service, you won’t
    need to worry about cluster management. To find out more, explore Oracle Cloud
    Infrastructure Streaming to see if it fits your purpose.


    Until now, we discussed local VCN peering that assumed all connected VCNs are
    located in the same cloud region. To connect VCNs that reside in two different
    Oracle Cloud regions, you will employ *remote* *VCN peering* . This technique
    is to some extent similar but involves another type of cloud resource called a
    *dynamic routing gateway* (DRG). In rare cases, you might even want to connect
    to a VCN that resides in a different tenancy. *Cross-tenancy VCN peering* is also
    possible and requires granting additional IAM policies in both tenancies. You
    can find more information in the official documentation.


    Up to that point, we focused on networking. We discussed cloud resources related
    to IP addresses, applied bastion host and NAT gateway patterns to allow private
    workers to securely communicate with the Internet, explained the types of security
    rules, and explored selected interconnectivity matters. Now, we will look closer
    at the aspects related to compute instances.'
  trans: '### VCN 对等连接


    在多个生产系统环境下工作时，通常会产生若干独立的隔离区，用于存放这些生产系统的云资源。VCN 云资源无法跨越多个隔离区，必须创建在某个特定的隔离区内。如果每个生产系统都在其专属的隔离区内进行管理，那么每个系统最终将至少拥有一个
    VCN。根据业务需求，迟早你会面临连接其中某些系统的挑战。对于运行在同一云区域内的系统，你可以使用 `本地 VCN 对等连接` 来连接选定的 VCN，让实例在
    Oracle Cloud 内使用其私有地址进行通信，如图 6-16 所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig16_HTML.jpg](img/478313_1_En_6_Fig16_HTML.jpg)


    图 6-16 本地 VCN 对等连接


    在早期规划阶段就必须考虑的一个重要要求是，两个连接的 VCN 绝不能使用重叠的 IP 地址范围。如果重叠，路由将会失败。要设置本地 VCN 对等连接，你需要执行以下操作：


    *   在两个 VCN 中创建 `本地对等网关` (`LPG`)。

    *   在 `LPG` 之间建立连接。

    *   通过添加新规则来调整路由表，这些规则将指向另一个 VCN 的流量导向 `LPG`。

    *   确保安全规则允许进出另一个 VCN 的流量。


    本地对等网关只是一个普通的云资源，像你已经使用过的互联网网关或 NAT 网关一样，创建在 VCN 内部。如果你的用户有权管理这两个 VCN，那么创建连接就非常简单。你只需要指向另一个
    `LPG`，对等连接状态应显示为成功连接，如图 6-17 所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig17_HTML.jpg](img/478313_1_En_6_Fig17_HTML.jpg)


    图 6-17 已连接的本地对等网关


    然而，在处理生产系统时，存在另一种情况，即另一个 VCN 由其他人管理。在这种情况下，你需要商定由谁来发起连接。如果管理员用户对其自己的隔离区没有完全的访问管理权限，你必须确保请求者所属的组拥有
    `manage local-peering-from` 权限。接受者所属的组则需拥有 `managed local-peering-to` 权限。这两种 IAM
    策略资源类型 (`local-peering-from` 和 `local-peering-to`) 都属于 `virtual-network-family`。要了解更多关于
    IAM 策略的信息，请参阅第 4 章。


    一旦 `LPG` 成功连接，VCN 对等连接便建立起来了。现在，你需要调整两个 VCN 中的路由表。基本上，必须在两侧添加新的路由规则，以将目标为另一个 VCN
    的流量导向正确的网络实体，即 `LPG`，如图 6-18 所示，其中另一个 VCN 使用 `10.6.0.0/16` 地址范围。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig18_HTML.jpg](img/478313_1_En_6_Fig18_HTML.jpg)


    图 6-18 用于本地 VCN 对等连接的路由规则


    最后需要添加的是安全规则。这里没有例外。就像你需要为同一 VCN 中的不同子网添加新的安全规则一样，你必须为对等 VCN 中的子网执行相同的操作。请考虑使用无状态规则，以避免与有状态规则相关的不必要连接跟踪。


    VCN 对等连接是点对点连接。任何给定的 VCN 最多可以与另外十个 VCN 建立本地对等连接。换句话说，每个 VCN 最多可以有十个 `LPG`，其中每个
    `LPG` 代表一个对等的 VCN，如图 6-19 所示。这听起来可扩展性不是很好，对吧？关于对等连接需要记住的另一个重要特点是，一个 VCN 中的实例无法使用对等
    VCN 中的互联网网关来访问互联网。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig19_HTML.jpg](img/478313_1_En_6_Fig19_HTML.jpg)


    图 6-19 每个对等 VCN 对应一个 LPG


    在复杂的应用环境下，你最终可能要么陷入难以管理的本地对等 VCN “面条式”拓扑，要么达到本地对等连接数的上限。为了缓解这些问题，可以考虑两种替代架构。


    *   使用一个专门用于云网络的隔离区

    *   使用消息传递平台即服务


    图 6-20 展示了一个高级架构草图，其中有一个 `专用网络隔离区`，包含一个大型 VCN，该 VCN 又包含多个子网。每个子网专用于一个生产系统。生产系统实例在其各自的隔离区中启动，但同时连接到网络隔离区中的
    VCN 子网。这种设置完全消除了对本地 VCN 对等连接的需求，但这个好处的代价可能是 IAM 策略更为复杂，特别是当存在不同的隔离区管理组时。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig20_HTML.jpg](img/478313_1_En_6_Fig20_HTML.jpg)


    图 6-20 基于专用网络隔离区的架构


    对于涉及多个生产系统的复杂应用环境，另一个推荐的方法是使用消息传递平台即服务。生产系统将消息发送到消息传递集群，该集群在底层由多个消息代理组成。如果你选择托管服务，则无需担心集群管理。要了解更多信息，可以探索
    Oracle Cloud Infrastructure Streaming，看看它是否符合你的需求。


    到目前为止，我们讨论的本地 VCN 对等连接都假设所有连接的 VCN 位于同一云区域内。要连接位于两个不同 Oracle Cloud 区域的 VCN，你需要采用
    `远程 VCN 对等连接`。这种技术在某种程度上类似，但涉及另一种称为 `动态路由网关` (`DRG`) 的云资源。在极少数情况下，你甚至可能希望连接到位于不同租户中的
    VCN。`跨租户 VCN 对等连接` 也是可行的，但需要在两个租户中授予额外的 IAM 策略。你可以在官方文档中找到更多信息。


    至此，我们主要关注的是网络连接。我们讨论了与 IP 地址相关的云资源，应用了堡垒主机和 NAT 网关模式以允许私有工作者安全地与互联网通信，解释了安全规则的类型，并探讨了选定的互连问题。现在，我们将更仔细地研究与计算实例相关的方面。'
- fmt: '# Scaling Instances


    弹性是第[1](#478313_1_En_1_Chapter.xhtml)章提到的云计算原则之一。我们曾提到，弹性可以通过底层资源的可扩展性来实现。我们还定义了**水平扩展**，即通过添加（或移除）同类集群实例来增加（或减少）集群的整体处理能力。添加更多实例通常被称为**向外扩展**，而从集群中移除实例则被称为**向内扩展**。类似地，我们定义了**垂直扩展**，即通过向上（或向下）调整单个实例的硬件配置来使其更强大（或更弱）。增加更多硬件资源传统上被称为**向上扩展**，而使用更弱的资源则称为**向下扩展**。所有术语均在图[6-21](#478313_1_En_6_Chapter.xhtml#Fig21)中说明。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig21_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig21_HTML.jpg)


    **图 6-21 水平和垂直扩展**


    本节将讨论这两种扩展类型，先讲水平扩展，再讲垂直扩展。


    ## 实例池与自动扩展


    水平扩展通常针对同构实例组执行。这些实例中的每一个都使用相同的硬件配置文件和基础软件堆栈。此外，对于成员协作的集群应用程序，实例初始化逻辑应告知每个成员如何找到其他成员并建立正确的连接。为了能够通过启动新实例快速向外扩展，我们需要某种实例模板，这比你在第[2](#478313_1_En_2_Chapter.xhtml)章中使用的自定义镜像要多。这种实例模板被理解为硬件配置（形状）、基础软件堆栈（镜像）和初始化逻辑（用于
    `cloud-init` 的 `cloud-config`）的组合，并附带一些基本的网络详细信息，被称为**实例配置**。基于实例配置调配的实例被分组到一个**实例池**中。然后，你可以为特定池设置预期的实例数量，并观察池是如何通过启动新实例（或终止现有实例）来向外（或向内）扩展的。随着时间的推移，你可以动态调整实例数量，以提供预期的集群处理能力。单个实例配置可用于调配多个实例池。你可以基于现有的计算实例创建实例配置，或者完全从头开始使用
    API（通常通过 Terraform 或 CLI）创建。实例配置与实例池之间的关系如图[6-22](#478313_1_En_6_Chapter.xhtml#Fig22)所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig22_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig22_HTML.jpg)


    **图 6-22 实例池和实例配置**


    我们将通过调配一套完整的云资源来更仔细地研究实例池的工作方式。该池将由在私有子网中启动的、基于自定义实例配置的实例组成。为了为隔离的实例提供适当的互联网连接，我们将采用依赖于主机和
    NAT 网关的熟悉模式。实例配置将使用最新的 CentOS 镜像、一个简单的 `cloud-init` 配置（该配置安装并执行名为 `stress-ng`
    的压力测试工具）、SSH 公钥以及一些基本的硬件配置文件信息（如形状和 VNIC 详细信息）。图[6-23](#478313_1_En_6_Chapter.xhtml#Fig23)展示了我们练习的预期基础设施。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig23_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig23_HTML.jpg)


    **图 6-23 隔离的实例池基础设施**


    这次，我们将使用 `chapter06/2-instance-pool-autoscale` 目录中的代码。和往常一样，我假设第[3](#478313_1_En_3_Chapter.xhtml)章中描述的
    Terraform 所需的所有环境变量都存在。同样适用于位于 `~/.ssh/oci_id_rsa.pub` 路径的 SSH 公钥。让我们开始调配基础设施。


    ```

    $ cd ~/git

    $ cd oci-book/chapter06/2-instance-pool-autoscale/infrastructure

    $ find . \( -name "*.tf" -o -name "*.yaml" \)

    ./modules.tf

    ./bastion/compute.tf

    ./bastion/vcn.tf

    ./bastion/vars.tf

    ./vcn.tf

    ./workers/compute.tf

    ./workers/vcn.tf

    ./workers/cloud-init/worker.config.yaml

    ./workers/vars.tf

    ./provider.tf

    ./vars.tf

    $ terraform init

    Initializing modules...

    - module.bastion

    Getting source "bastion"

    - module.workers

    Getting source "workers"

    Initializing provider plugins...

    - Checking for available provider plugins on https://releases.hashicorp.com...

    - Downloading plugin for provider "oci" (3.30.0)...

    * provider.oci: version = "~> 3.30"

    Terraform has been successfully initialized!

    $ terraform apply -auto-approve

    Apply complete! Resources: 13 added, 0 changed, 0 destroyed.

    Outputs:

    bastion_public_ip = 130.61.122.251

    image_name = CentOS-7-2019.04.15-0

    $ BASTION_PUBLIC_IP=`terraform output bastion_public_ip`

    ```


    在通过主机连接到工作节点之前，让我们先在 OCI 控制台中查看一些新调配的云资源。


    1.  转到菜单 ➤ 计算 ➤ 实例池。


    2.  确保选择了 `Sandbox` 复合框。


    你应该会看到一个名为 `workers-pool` 的新实例池，如图[6-24](#478313_1_En_6_Chapter.xhtml#Fig24)所示。池的放置配置包括我默认区域（eu-frankurt-1）中的所有三个可用性域。每当一个新实例添加到池中时，它将在其中一个可用性域中创建。如果你查看“目标实例计数”，你会看到，在我们的例子中，我们开始时目标实例数量很少，只有一个。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig24_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig24_HTML.jpg)


    **图 6-24 在 OCI 控制台中查看实例池**


    要了解有关池中实例的更多信息，请按照以下步骤操作：


    1.  单击实例池的名称。


    2.  在“资源”部分，确保选择了“已创建的实例”。


    你现在应该看到类似于图[6-25](#478313_1_En_6_Chapter.xhtml#Fig25)所示的内容。这次，工作实例位于 AD-1 中。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig25_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig25_HTML.jpg)


    **图 6-25 在 OCI 控制台中查看实例池成员**


    让我们更详细地检查这个实例。我们现在要找出分配给实例的私有 IP 地址，并监控其当前负载。为此，请按照以下步骤操作：


    1.  单击实例的名称。


    2.  在“实例详细信息”视图的“实例信息”选项卡上，从“主 VNIC 信息”部分读取“私有 IP 地址”设置。在我的例子中，它是 `10.1.2.2`。


    3.  在“资源”部分，确保选择了“指标”。


    4.  单击“CPU 利用率”小部件的绘图区域。


    应该会出现一个新的嵌入式窗口，你可以在其中调整底部的 x 轴，以进一步提高图表的可读性。如图[6-26](#478313_1_En_6_Chapter.xhtml#Fig26)所示。


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig26_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig26_HTML.jpg)


    **图 6-26 在 OCI 控制台中查看实例 CPU 利用率**


    如你所见，在初始引导相关进程完成后，CPU 消耗从大约 40% 下降到 20%。为什么一台空闲机器要消耗 20% 的 CPU？它真的空闲吗？要了解原因，让我们连接到工作节点。当然，我们必须依赖主机，因为工作节点甚至没有公有
    IP 地址。'
  raw: '## Scaling Instances


    Elasticity is one of the cloud computing principles mentioned in Chapter [1](#478313_1_En_1_Chapter.xhtml).
    We said there that elasticity can be achieved through the scalability of the underlying
    resources. We also defined *horizontal scaling* as adding (or removing) cluster
    instances of the same kind to increase (or decrease) the overall cluster processing
    capacity. Adding more instances is often referred as *scaling out* , while removing
    instances from a cluster is referred to as *scaling in* . Similarly, we defined
    *vertical scaling* as making a single instance more (or less) powerful by upsizing
    (or downsizing) its hardware configuration. Adding more hardware resources is
    traditionally referred to as *scaling up* , while using less powerful resources
    is called *scaling down* . All terms are illustrated in Figure [6-21](#478313_1_En_6_Chapter.xhtml#Fig21).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig21_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig21_HTML.jpg)


    Figure 6-21


    Horizontal and vertical scaling


    In this section, we are going to discuss both types of scaling, first horizontal
    and then vertical.


    ### Instance Pools and Autoscale


    Horizontal scaling is typically performed against groups of homogeneous instances.
    Each of these instances uses the same hardware profile and base software stack.
    Furthermore, in the case of clustered applications whose members cooperate, the
    instance initialization logic should tell each member how to find others and establish
    the correct connections. To be able to rapidly scale out by launching new instances,
    we need some kind of instance template, something more than just a custom image
    you worked with in Chapter [2](#478313_1_En_2_Chapter.xhtml). This kind of instance
    template understood as a combination of hardware profile (shape), base software
    stack (image), and initialization logic (cloud-config for cloud-init) accompanied
    with some basic networking details is called an *instance configuration* . The
    instances provisioned based on an instance configuration are grouped into an *instance
    pool* . You can then set the expected number of instances for a particular pool
    and observe how the pool is scaled out (or in) by launching new (or terminating
    existing) instances. As time goes by, you can dynamically adjust the instance
    count so that the expected cluster processing capability is delivered. A single
    instance configuration can be used to provision multiple instance pools. You create
    instance configurations based on existing compute instances or, totally from scratch,
    using the API, usually through Terraform or the CLI. The relationship between
    an instance configuration and an instance pool is illustrated in Figure [6-22](#478313_1_En_6_Chapter.xhtml#Fig22).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig22_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig22_HTML.jpg)


    Figure 6-22


    Instance pool and instance configuration


    We are going to look closer at the way an instance pool works by provisioning
    a complete set of cloud resources. The pool will consist of instances launched
    in a private subnet and based on a custom instance configuration. To provide the
    isolated instances with proper connectivity to the Internet, we are going to employ
    the familiar pattern that relies on a bastion host and NAT gateway. The instance
    configuration will use the newest CentOS image, a simple cloud-init configuration
    that installs and executes a stress testing utility called `stress-ng`, the SSH
    public key, as well as some basic hardware profile info such as shape and VNIC
    details. Figure [6-23](#478313_1_En_6_Chapter.xhtml#Fig23) presents the expected
    infrastructure for our exercise.


