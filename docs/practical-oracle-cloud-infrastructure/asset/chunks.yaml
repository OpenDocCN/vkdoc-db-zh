    ETag。在我们的例子中，我们发现当前 ETag 的值以`bd7f242d5a34`结尾。在第二步中，我们使用`oci os object get` CLI
    命令下载了对象的内容，并向本地副本追加了 2KB 的随机数据以模拟本地更改。在最后部分，我们使用了带有`--if-match`选项的`oci os object
    put` CLI 命令，以确保仅当对象自我们最初获取 ETag 以来未被修改时才会被覆盖。在对条件性 PUT 操作的响应中，我们可以看到新对象版本已被分配了一个完全不同的
    ETag，该 ETag 以`cd7e55dc25af`结尾。如果另一个应用程序尝试使用不再同步的 ETag 发出条件性 PUT 命令，它将收到一个状态为 HTTP
    412（前提条件失败）的错误。


    ```

    $ head -c 1024 /dev/urandom >> local.parking.pdf

    $ ls -lh local.parking.pdf | awk ''{ print $9 " (" $5 ")" }''

    local.parking.pdf (11K)

    $ oci os object put -bn blueprints --name waw/bemowo/parking.pdf --file local.parking.pdf
    --if-match "$ETAG" --profile SANDBOX-USER

    ServiceError:

    {

    "code": null,

    "message": "The service returned error code 412",

    "opc-request-id": "f3fee86d-8e97-93b4-1c5e-da3ed572ed35",

    "status": 412

    }

    ```


    ## 编程对象存储


    为了与对象存储 API 交互，我们在本章之前的示例中一直使用 CLI 命令。然而，在现实世界中，对对象存储的绝大多数 API 调用都来自应用程序。在本节中，我将向您展示如何使用其中一个
    SDK（即适用于 Python 的 OCI SDK），让您的应用程序能够使用 Oracle Cloud Infrastructure 对象存储。我还将借此机会解释如何通过采用多段文件上传方法来处理大文件。


    在第 3 章中，我引导您完成了 SDK 安装和配置的简单过程。在第 4 章中，我们创建了新的组和用户，并向 SDK/CLI 配置文件添加了两个新的配置文件：`SANDBOX-ADMIN`和`SANDBOX-USER`。最后，在本章的第一部分，我们以这种方式创建了所需的策略，以允许`sandbox-users`组的组成员管理`blueprints`存储桶中的对象。我假设所有这些仍然有效。


    使用适用于 Python 的 OCI SDK 对对象存储云资源执行的所有操作都是通过`ObjectStorageClient`类的方法完成的。您可以在[`https://oracle-cloud-infrastructure-python-sdk.readthedocs.io/en/latest/api/object_storage/client/oci.object_storage.ObjectStorageClient.html`.](https://oracle-cloud-infrastructure-python-sdk.readthedocs.io/en/latest/api/object_storage/client/oci.object_storage.ObjectStorageClient.html)找到该类的全面文档。


    ### 多段上传


    在处理非常大的文件（例如大于 100MB 的文件）时，建议您将原始文件拆分为较小的部分，并利用`多段上传` API 将文件分成可管理的块上传到云端。这种方法使上传过程不易受到任何网络问题的负面影响，因为您只需要重新上传未能成功传送到云端的单个部分即可。此外，多段上传机制使得并行上传各个部分成为可能，从而加快了上传操作的完成速度。在撰写本文时，可上传对象的最大大小为
    10TB。另外，每个单独的部分必须小于 50GB。您最多可以创建 10,000 个部分。


    一个多段上传操作包括四个阶段，其概念如图 5-10 所示。首先，您必须将大文件拆分为较小的部分(1)。具体方式取决于您和您选择的工具。接下来，您通过发送`CreateMultipartUpload`请求来发起第一次
    API 调用，以启动一个新的多段上传(2)。在请求中，您指定存储命名空间、存储桶名称和目标对象名称。在响应中，您将获得新激活的多段上传的上传 ID。在此阶段，您可以开始上传各个部分(3)。对于每个部分，您向对象存储
    API 发送一个`UploadPart`请求。顺序无关紧要。正如我所提到的，您甚至可以并行上传多个部分。除了存储命名空间、存储桶名称、目标对象名称和上传 ID
    之外，`UploadPart`操作还期望您提供一个上传部分编号，每个部分都不同。换句话说，您负责对部分进行编号。部分编号不需要是连续的。最终将根据部分编号的升序序列组合各部分以形成目标对象。`UploadPart`操作会为您上传的每个部分返回一个唯一的实体标签(ETag)。请确保您收集这些实体标签，因为一旦准备好提交多段上传，您就需要它们。为了让对象存储根据已上传的部分构建目标对象，您需要提交多段上传(4)。您通过向
    API 发送`CommitMultipartUpload`请求来完成此操作。在请求中，您指定一个配对列表，其中每个配对包含一个已分配的部分编号和相应的 ETag。只有包含在列表中的部分才会用于构建目标对象，无论您总共上传了多少部分。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig10_HTML.jpg](img/478313_1_En_5_Fig10_HTML.jpg)


    图 5-10 多段上传


    如果您的应用程序取消正在进行的多段上传，它会向 API 发送一个`AbortMultipartUpload`请求。这样，对象存储将关闭多段上传，有效地删除已经上传的部分。如果您只是关闭应用程序而没有以正确方式中止上传，会发生什么？嗯，从技术上讲，多段上传将保持活动状态并准备好接受更多部分。在这种情况下，您将为已上传的部分持续付费，直到您中止上传为止。不用担心跟踪您的多段上传情况。可以通过向
    API 发送`ListMultipartUploads`请求来列出活动的上传。如果您预计会有许多执行多段更新的应用程序实例，那么实现一个定期作业来使用此方法监控进行中和已放弃的上传可能是明智之举。

