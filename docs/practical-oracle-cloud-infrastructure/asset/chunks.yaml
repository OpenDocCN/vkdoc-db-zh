    ### 并发更新


    让我们讨论一下所谓的*竞态条件*。假设有两个应用程序想要同时更新同一个对象，以增量方式添加它们的局部更改。如果它们一个接一个地立即获取对象，它们将处理相同的基础版本，每个应用程序都不知道另一个应用程序正在并行处理同一个对象。在两个应用程序都决定上传对象的新版本（从而有效地替换基础版本）之前，一切似乎都很好。结果很容易预测。第二个执行更新的应用程序将覆盖第一个保存对象的应用程序所做的更改。这种情况可以称为*丢失更新*，其概念如图
    5-8 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig8_HTML.jpg](img/478313_1_En_5_Fig8_HTML.jpg)


    图 5-8


    丢失更新问题


    丢失更新的影响取决于业务场景。想象一下，通过给已售出的停车位着色来更改地下停车场地图的应用程序逻辑。在这种情况下，丢失更新将导致某些停车位即使已售出也显示为可用。通常，我们更愿意完全消除这类问题。对象存储
    API 通过*实体标签*（ETags）来解决这个问题，它可以用于实现乐观并发控制。ETag 是为每个对象版本生成的标识符，无论内容是否更改。如果您放置同一个对象两次，即在第二次上传期间使用相同的内容覆盖它，您仍然会得到两个不同的
    ETag，如以下代码片段所示：


    ```

    $ head -c 8096 /dev/urandom > warsaw/bemowo/parking.pdf

    $ oci os object put -bn blueprints --name waw/bemowo/parking.pdf --file warsaw/bemowo/parking.pdf
    --profile SANDBOX-USER

    Uploading object  [####################################]  100%

    {

    "etag": "d5ded03a-64ca-4af2-8185-563f658f4021",

    "last-modified": "Sat, 09 Mar 2019 16:43:31 GMT",

    "opc-content-md5": "upvy5Ns5flwg053S8WJG1w=="

    }

    $ oci os object put -bn blueprints --name waw/bemowo/parking.pdf --file warsaw/bemowo/parking.pdf
    --profile SANDBOX-USER

    WARNING: This object already exists. Are you sure you want to overwrite it? [y/N]:
    y

    Uploading object  [####################################]  100%

    {

    "etag": "4f893925-455a-4ea5-8890-2b39f8523d82",

    "last-modified": "Sat, 09 Mar 2019 16:43:41 GMT",

    "opc-content-md5": "upvy5Ns5flwg053S8WJG1w=="

    }

    ```


    您将如何在您的应用程序逻辑中包含*乐观并发控制*以避免竞态条件？对对象的更新操作可以分步骤执行。首先，读取当前对象的 ETag 并下载对象内容。接下来，应用程序在本地更改对象。最后，告诉
    API 将对象的新版本放入存储桶，从而有效地覆盖旧版本，但仅当 ETag 在此期间未更改时。这样的条件 PUT 可以使用`If-Match` HTTP 头来实现，如图
    5-9 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig9_HTML.jpg](img/478313_1_En_5_Fig9_HTML.jpg)


    图 5-9


    实现乐观并发


