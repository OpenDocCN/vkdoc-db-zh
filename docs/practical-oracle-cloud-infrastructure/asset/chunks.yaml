    执行将文件放入存储桶的最基本的命令之一怎么样？首先，我们需要一个样本文件。真实数据在当今是宝贵的，应该受到保护，所以让我们生成一个随机的、无意义的文件，我们假装它是一份房地产公寓蓝图
    PDF。以下是你使用 Bash 生成随机二进制文件的方法：


    ```

    $ mkdir ~/data

    $ cd ~/data

    $ SIZE=$((4096+(10+RANDOM % 20)*1024))

    $ head -c $SIZE /dev/urandom > 101.pdf

    $ ls -lh 101.pdf | awk ''{ print $9 " (" $5 ")" }''

    101.pdf (21K)

    ```


