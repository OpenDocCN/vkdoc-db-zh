    操作），尽管 `策略动词` `inspect` 通常允许更多操作，例如列出可用规格（`ListShapes` 操作）或协议（`ListProtocols`
    操作）。


    ```

    allow group sandbox-admins to inspect load-balancers in compartment Sandbox where
    all { request.operation != ''ListShapes'', request.operation != ''ListProtocols'',
    request.operation != ''ListProtocols'' }

    ```

