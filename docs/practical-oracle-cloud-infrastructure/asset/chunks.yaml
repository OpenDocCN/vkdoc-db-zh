  trans: "\n除了实例信息之外，您会在详情视图的顶部看到若干不同的按钮，如图 7-9 所示，以及底部的备份区域。顾名思义，`Service Console`（服务控制台）将打开我已经向您介绍过的实例专属控制台。`Scale\
    \ Up/Down`（向上/向下扩展）将允许您调整分配给实例的 CPU 数量以及以 1TB 为增量的存储。在撰写本文时，您应该能够为单个`ADB`实例分配最多\
    \ 128 个 CPU 和最多 128TB 的存储。默认情况下，标准试用版或按需付费账户的自治数据库服务限制设置为 8 个 CPU，但您可以申请提高限制。请注意，您的云账户将根据使用的\
    \ CPU 数量和分配的存储容量进行计费。为了降低成本，如果您知道将会有空闲时间，可以停止实例。这通常仅在数据仓库系统的特定时间窗口内有意义，此时既不进行数据加载，也不执行查询。停止实例不会暂停由存储容量产生的成本。\n\
    \n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig9_HTML.jpg](img/478313_1_En_7_Fig9_HTML.jpg)\n\
    *图 7-9. OCI 控制台中可用的`ADB`实例操作*\n\n自治数据库每天都会自动备份，无需用户干预。每周执行一次完整备份。其余几天则进行增量备份。所有这些备份都会保留\
    \ 60 天。所有自动备份都可以视为热备份，这基本上意味着在进行备份时，数据库保持可操作和可用状态。如果出现问题，例如某个表被意外截断或整个模式被删除，您可以从选定的备份中恢复其状态。可用备份列表在\
    \ OCI 控制台的`ADB`详情视图底部可见，如图 7-10 所示，也可以通过`OCI CLI`获取。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig10_HTML.jpg](img/478313_1_En_7_Fig10_HTML.jpg)\n\
    *图 7-10. OCI 控制台中的`ADB`备份*\n\n尽管我们可以考虑使用`ADMIN`用户进行常规数据库查询，但这违背了通常推荐的做法。此外，Oracle\
    \ 数据库对象（如表或视图）存在于模式的范围内。一个模式与一个数据库用户相关联。要在`road`模式中创建几个表，我们需要创建`road`数据库用户并向该用户授予所有必需的权限。自治数据库基于最新版本的\
    \ Oracle 数据库并与其兼容；因此，我们创建数据库用户的方式与在传统本地 Oracle 数据库实例中所做的相同。我们现在将以`ADMIN`身份连接到数据库，创建一个新用户，并向该用户授予所有必需的权限。\n\
    \n## SQL Developer Web\n如果您曾经使用过 Oracle 数据库，您可能知道`SQL Developer`是什么。Oracle `SQL\
    \ Developer`是一个基于 Java 的 SQL 桌面 IDE，用于 Oracle 数据库。您可以免费下载它，并将其与传统的和自治的 Oracle\
    \ 数据库一起使用。`ADB`附带了`SQL Developer Web`，这是一个针对`ADB`相关任务优化的、基于浏览器的等效工具。它提供了更成熟的桌面版中可用功能的一个子集，但对于大多数\
    \ SQL 任务来说，其功能应该足够好。让我们访问它。\n\n1.  转到`Menu`（菜单）➤ `Database`（数据库）➤ `Autonomous\
    \ Data Warehouse`（自治数据仓库）。\n2.  确保选择了`Sandbox`（沙盒） compartment。\n3.  点击您的`ADW`实例的名称。\n\
    4.  点击`Service Console`按钮。\n\n> **提示** 如果在点击`Service Console`按钮后没有任何反应，新窗口可能已被您的浏览器阻止。在浏览器中，您需要允许此页面打开新窗口。\n\
    \n5.  以`ADMIN`用户身份登录。\n6.  点击`Development`（开发）。\n7.  点击`SQL Developer Web`。\n\n\
    如果系统提示您再次登录，请使用相同的`ADMIN`凭据。您可以将以下查询粘贴到工作区区域，然后点击绿色的`Run Statement`（运行语句）按钮，将会看到与图\
    \ 7-11 类似的内容：\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig11_HTML.jpg](img/478313_1_En_7_Fig11_HTML.jpg)\n\
    *图 7-11. `SQL Developer Web`*\n\n```sql\nSELECT CURRENT_TIMESTAMP FROM dual;\n\
    ```\n\n仍然在`SQL Developer Web`中，粘贴下面显示的 SQL 语句，修改位于`IDENTIFIED`子句后的密码，然后运行查询：\n\
    \n```sql\nCREATE USER SANDBOX_USER IDENTIFIED BY \"y0uRp@55worD\";\nGRANT dwrole\
    \ TO SANDBOX_USER;\nALTER USER SANDBOX_USER QUOTA 500M ON DATA;\n```\n\n将创建一个名为`SANDBOX_USER`的新数据库用户，并授予名为`dwrole`的预定义、`ADW`专属数据库角色。如果您点击底部的`Script\
    \ Output`（脚本输出）选项卡，您应该会看到两条消息，宣布两项操作均成功。\n\n```\nUser SANDBOX_USER created.\n\
    Grant succeeded.\n```\n\n`dwrole`数据库角色为用户配备了三组权限。\n\n*   标准的 SQL 数据定义语言（`DDL`）操作，例如创建表、触发器、视图、过程等\n\
    *   Oracle 特有的数据仓库和商业智能 SQL `DDL`操作，例如分析视图、属性维度、层次结构和数据挖掘模型\n*   `DBMS_CLOUD`\
    \ `PL/SQL`包，它捆绑了主要与从云对象存储向数据库表填充数据相关的云基自治数据库过程\n\n为了让新创建的`SANDBOX_USER`用户能够访问并在`SQL\
    \ Developer Web`中工作，必须为用户模式启用 Oracle REST 数据库服务（`ORDS`）访问。为此，仍然以`ADMIN`用户身份，执行`ORDS_ADMIN.ENABLE_SCHEMA`过程，如下所示：\n\
    \n```sql\nBEGIN\n  ords_admin.enable_schema(\n    p_enabled => TRUE,\n    p_schema\
    \ => 'SANDBOX_USER',\n    p_url_mapping_type => 'BASE_PATH',\n    p_url_mapping_pattern\
    \ => 'sandbox',\n    p_auto_rest_auth => TRUE\n  );\n  commit;\nEND;\n```\n\n\
    底部的`Script Output`选项卡中应该会显示一条消息：\n\n```\nPL/SQL procedure successfully completed.\n\
    ```\n\n`p_schema`参数引用新创建的用户，而`p_url_mapping_type`参数定义了为用户专用的`SQL Developer Web`URL\
    \ 中的用户专属部分。图 7-12 展示了`SQL Developer Web` URL 的典型结构。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig12_HTML.jpg](img/478313_1_En_7_Fig12_HTML.jpg)\n\
    *图 7-12. `SQL Developer Web` URL 结构*\n\n通常，您需要准备用户专属的 URL 并将其交付给用户，方法是将`schema-alias`部分替换为之前在`ORDS_ADMIN.ENABLE_SCHEMA`过程中使用的\
    \ URL 映射模式值。您可以复制基础的`SQL Developer Web` URL，此时您仍以`ADMIN`用户身份使用这个基于浏览器的工具。您必须将`schema-alias`部分（在此情况下最初设置为`admin`值）替换为`sandbox`值。\n\
    \n这次让我们以`SANDBOX_USER`身份访问`SQL Developer Web`。您可以在新的浏览器标签页中打开修改后的 URL。\n\n> **提示** 作为切换标签页的替代方法，您可以为每个`SQL\
    \ Developer Web`会话使用两个不同的浏览器。这样，您将能够在一个标签页（或浏览器）中继续以`ADMIN`身份工作，同时在第二个标签页（或浏览器）中以`SANDBOX_USER`身份工作，如图\
    \ 7-13 所示。\n\n![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig13_HTML.jpg](img/478313_1_En_7_Fig13_HTML.jpg)\n\
    *图 7-13. `SQL Developer Web`用户*\n"
- fmt: '## Loading Data to ADW


    Autonomous Database is a cloud-based managed database service. The recommended
    approach for loading data from files is to upload them to an object storage bucket
    and execute the `DBMS_CLOUD.COPY_DATA` procedure to parse these files and insert
    data into the database tables. This procedure is capable of loading data from
    the following:


    *   Oracle Cloud Infrastructure object storage

    *   Azure Blob Storage

    *   Amazon S3


    The shortest data load time can be achieved from Oracle Cloud Infrastructure object
    storage buckets in the same region as the ADB instance, but other combinations
    are absolutely fine as well. The ADW instance accesses OCI object storage on behalf
    of a particular IAM user.


    ### Database Credential


    The `DBMS_CLOUD.COPY_DATA` procedure references a `Credential` database object
    that holds the authentication details required to access the cloud-based object
    storage. For OCI object storage, the IAM user must hold an active Auth Token that
    will be saved in this `Credential` object together with the username. A token
    is a relatively short Oracle-generated string. Any IAM user can have up to two
    Auth Tokens at a time. Tokens can be created by the users themselves or arbitrarily
    by administrators either using the OCI Console or leveraging API-based automation
    such as the OCI CLI.


    This is how you generate an Auth Token as a `sandbox-user` in the OCI Console:


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig14_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig14_HTML.jpg)


    Figure 7-14: Accessing the user profile in the OCI Console


    1.  Log in to the OCI Console as the `sandbox-user`.

    2.  Go to the user profile by clicking the user name, as shown in Figure [7-14](#478313_1_En_7_Chapter.xhtml#Fig14).

    3.  On the Resources tab, click Auth Tokens.

    4.  Click Generate Token.

    5.  Provide a description for your token, and click Generate Token.

    6.  Write down your token. You will see it only once.


    It is crucial to remember that you see a newly generated Auth Token only once,
    as shown in Figure [7-15](#478313_1_En_7_Chapter.xhtml#Fig15). If you lose it,
    you will have to delete the old token and generate a new one.


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig15_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig15_HTML.jpg)


    Figure 7-15: Seeing a generated token


    To generate an Auth Token for a selected user programmatically, you can execute
    the following CLI commands on behalf of the tenancy admin by using the default
    profile (no `--profile` parameter). First you query for the OCID of a particular
    user, and then you are using the `iam auth-token create` CLI command for that
    user.


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ IAM_USER_OCID=`oci iam user list -c $TENANCY_OCID --query "data[?name==''sandbox-user'']
    | [0].id" --raw-output --all`

    $ echo $IAM_USER_OCID

    ocid1.user.oc1..aa.........zqpxa

    $ oci iam auth-token create --user-id $IAM_USER_OCID --description token-adw --query
    ‘data.token’ --raw-output

    B8.E_Ry7oOtN1KF0do9x

    ```


    No matter which way you choose, please make sure you have an Auth Token for the
    `sandbox-user` IAM user.


    The new database user called `SANDBOX_USER` is completely independent from the
    `sandbox-user` IAM user we have been working with in the course of the previous
    chapters. We are now going to create a database `Credential` object to store the
    username and the Auth Token for the `sandbox-user` IAM user. These details will
    be stored in an encrypted format in the database. Every time you execute the `DBMS_CLOUD.COPY_DATA`
    procedure to load data from an object in object storage to a database table, you
    will provide the name of a `Credential` object to be used.


    > **Tip**

    >

    > From now on, most of the SQL commands will have to be executed in SQL Developer
    Web on behalf of the `SANDBOX_ADMIN`. Make sure you open the correct SQL Developer
    Web instance, using a user-specific link as described a few paragraphs earlier.


    Open SQL Developer Web as the `SANDBOX_USER` database user, place the SQL procedure
    in the worksheet, use your newly generated Auth Token as the value for the password
    parameter, and execute the following command:


    ```

    BEGIN

    DBMS_CLOUD.CREATE_CREDENTIAL(

    credential_name => ''OCI_SANDBOX_USER'',

    username => ''sandbox-user'',

    password => ''B8.E_Ry7oOtN1KF0do9x''

    );

    END;

    ```


    The `Credential` objects exist in a particular user schema and can be accessed
    only by the users who have access to that schema. Each Oracle Database schema
    is by convention associated with a single database user of the same name. You
    can assume that, by default, only the `Credential` owner user is allowed to reference
    this `Credential` object. To delete an existing `Credential` object, you should
    rely on the `DBMS_CLOUD.DROP_CREDENTIAL` procedure. To list the existing `Credential`
    objects in a given schema, you can use the following SQL query as the schema owner:


    ```

    SELECT * FROM all_credentials;

    ```


    Loading data from a file to ADB can be summarized in three steps. We will be following
    them a bit later.


    1.  Upload the source file in a supported format such as `.csv` to an object storage
    bucket.

    2.  Create a new database table for the imported data if the table does not exist
    yet.

    3.  Execute `DBMS_CLOUD.COPY_DATA` to populate the table.


    This process is conceptually illustrated in Figure [7-16](#478313_1_En_7_Chapter.xhtml#Fig16).


    ![../images/478313_1_En_7_Chapter/478313_1_En_7_Fig16_HTML.jpg](images/478313_1_En_7_Chapter/478313_1_En_7_Fig16_HTML.jpg)


    Figure 7-16: Loading data from object storage to ADW


    Earlier, we created a `Credential` database object that will let the ADW instance
    access OCI object storage on behalf of a named IAM user. We still need to create
    an object storage bucket. In Chapter [5](#478313_1_En_5_Chapter.xhtml), you learned
    that to set up a new bucket you can rely on the following OCI CLI command and
    execute it on behalf of the `sandbox-admin` user via the `SANDBOX-ADMIN` profile.
    Do it now and create a new bucket called `roadadw-load`.


    ```

    $ oci os bucket create --name roadadw-load --profile SANDBOX-ADMIN

    ```


    Based on the IAM policy set in Chapter [5](#478313_1_En_5_Chapter.xhtml), the
    `sandbox-user` is allowed to upload data to only to the object storage bucket
    called `blueprints`. Let’s extend this access scope by adding the new IAM policy
    statements shown in Listing [7-2](#478313_1_En_7_Chapter.xhtml#PC13). Now, we
    are going to let `sandbox-users` upload objects to the `roadadw-load` bucket.


    ```

    [

    "allow group sandbox-users to read buckets in compartment Sandbox where target.bucket.name=''roadadw-load''",

    "allow group sandbox-users to manage objects in compartment Sandbox where target.bucket.name=''roadadw-load''"

    ]

    ```


    Listing 7-2: `sandbox-users.policies.adwstorage.json`


    We can create a new policy in the `Sandbox` compartment using the `oci iam policy
    create` CLI command in the same way we added new policies in the previous chapters.
    The policy should be added to the `Sandbox` compartment. As long as you are still
    using the `oci_cli_rc` file configured as described in the previous chapters,
    these commands should do the work:


    ```

    $ cd ~/git/oci-book/chapter07/1-setup/

    $ oci iam policy create --name sandbox-users-adw-storage-policy --statements file://sandbox-users.policies.adwstorage.json
    --description "ADW-Storage-related policy for regular Sandbox users" --profile
    SANDBOX-ADMIN

    ```


    With the new policy in place, we are ready to upload the files that hold various
    input data for new ADW tables to the `roadadw-load` object storage bucket. At
    this stage, it may be worth mentioning what these files are and how we are going
    to use them.'
