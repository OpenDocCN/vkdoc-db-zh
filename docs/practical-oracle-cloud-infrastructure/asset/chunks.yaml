    ## OCI 对象存储基础操作


    ```

    $ oci os object put -ns jakobczyk -bn blueprints --file 101.pdf --profile SANDBOX-USER

    ```


    要将对象下载到本地驱动器并以不同的名称（例如 `101-copy.pdf`）保存，请执行此 CLI 命令：


    ```

    $ oci os object get -bn blueprints --name 101.pdf --file 101-copy.pdf --profile
    SANDBOX-USER

    Downloading object  [####################################]  100%

    ```


    最后，要从存储桶中删除文件，请使用此 CLI 命令：


    ```

    $ oci os object delete -bn blueprints --name 101.pdf --profile SANDBOX-USER

    Are you sure you want to delete this resource? [y/N]: y

    ```


    那么如何更新对象呢？你需要注意对象是不可变的。要更新对象，你基本上需要覆盖它，实际上就是用新版本替换旧版本。


    好了，这些是基础操作。


    ### 对象名称前缀


    如果我们要将来自不同房地产项目的蓝图存储在一个存储桶中怎么办？华沙 Bemowo 区的一处房产中，一套待售公寓的编号可能与 Wola 区另一处房产中一套公寓的编号相同。我们可以使用名称前缀来避免混淆这两套公寓。这次，我们将生成一整套文件，假装它们是公寓蓝图。我们将使用三组文件。第一组将是华沙
    Bemowo 区一套房产中公寓的蓝图。


    ```

    $ mkdir -p warsaw/bemowo

    $ for i in 101 102 105 107 115; do SIZE=$((4096+(10+RANDOM % 20)*1024)); head
    -c $SIZE /dev/urandom > warsaw/bemowo/$i.pdf; done

    ```


    第二组将模拟华沙 Wola 区一套房产中 A 栋建筑的蓝图文件。


    ```

    $ mkdir -p warsaw/wola/a

    $ for i in 115 120 124 130; do SIZE=$((4096+(10+RANDOM % 20)*1024)); head -c $SIZE
    /dev/urandom > warsaw/wola/a/$i.pdf; done

    ```


    第三组将假装是同一处 Wola 区房产中 B 栋建筑的公寓蓝图文件。


    ```

    $ mkdir -p warsaw/wola/b

    $ for i in 119 120 121; do SIZE=$((4096+(10+RANDOM % 20)*1024)); head -c $SIZE
    /dev/urandom > warsaw/wola/b/$i.pdf; done

    ```


    很好。你应该会得到类似这样的结果：


    ```

    $ find warsaw -type f -exec ls -lh {} + | awk ''{ print $9 " (" $5 ")"}''

    warsaw/bemowo/101.pdf (29K)

    warsaw/bemowo/102.pdf (30K)

    warsaw/bemowo/105.pdf (18K)

    warsaw/bemowo/107.pdf (23K)

    warsaw/bemowo/115.pdf (33K)

    warsaw/wola/a/115.pdf (32K)

    warsaw/wola/a/120.pdf (21K)

    warsaw/wola/a/124.pdf (15K)

    warsaw/wola/a/130.pdf (31K)

    warsaw/wola/b/119.pdf (21K)

    warsaw/wola/b/120.pdf (29K)

    warsaw/wola/b/121.pdf (18K)

    ```


    CLI 提供了一组方便的 `bulk commands`，可让你批量上传、下载和删除对象。我们现在将把来自 `warsaw/bemowo` 本地目录的蓝图上传到
    `blueprints` 存储桶，作为以 `waw/bemowo/` 字符串为前缀的新对象，如下所示：


    ```

    $ oci os object bulk-upload -bn blueprints --src-dir warsaw/bemowo/ --object-prefix
    "waw/bemowo/" --include "*.pdf" --profile SANDBOX-USER

    {

    "skipped-objects": [],

    "upload-failures": {},

    "uploaded-objects": {

    "waw/bemowo/101.pdf": {...}

    "waw/bemowo/102.pdf": {...},

    "waw/bemowo/105.pdf": {...},

    "waw/bemowo/107.pdf": {...},

    "waw/bemowo/115.pdf": {...}

    }

    }

    ```


    如果需要，你可以使用 `--include` 选项来限制从源目录上传的文件，使其仅匹配给定模式的文件。


    以类似的方式，我们将上传来自 `warsaw/wola` 目录的文件，这次根据每个文件最初所在的本地子目录，使用 `waw/wola/a` 和 `waw/wola/b`
    字符串作为对象的前缀。


    ```

    $ oci os object bulk-upload -bn blueprints --src-dir warsaw/wola/a --object-prefix
    "waw/wola/a/" --profile SANDBOX-USER

    {

    "skipped-objects": [],

    "upload-failures": {},

    "uploaded-objects": {

    "waw/wola/a/115.pdf": {...},

    "waw/wola/a/120.pdf": {...},

    "waw/wola/a/124.pdf": {...},

    "waw/wola/a/130.pdf": {...}

    }

    }

    $ oci os object bulk-upload -bn blueprints --src-dir warsaw/wola/b --object-prefix
    "waw/wola/b/" --profile SANDBOX-USER

    {

    "skipped-objects": [],

    "upload-failures": {},

    "uploaded-objects": {

    "waw/wola/b/119.pdf": {...},

    "waw/wola/b/120.pdf": {...},

    "waw/wola/b/121.pdf": {...}

    }

    }

    ```


    图 5-6 说明了我们刚刚执行的操作。前缀确实很有帮助，因为它们让你可以在特定存储桶中重建类似文件夹的层次结构。`ListObjects` 对象存储服务 API
    提供了一个方便的查询参数 `prefix`，它允许你根据对象名称前缀指定要列出的对象子集。你可以使用 `oci os object list` CLI 命令访问此
    API，如下所示：


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig6_HTML.jpg](img/478313_1_En_5_Fig6_HTML.jpg)


    图 5-6


    基于前缀的过滤


    ```

    $ oci os object list -bn blueprints --prefix "waw/wo" --query ''data[*].name''
    --profile SANDBOX-USER

    [

    "waw/wola/a/115.pdf",

    "waw/wola/a/120.pdf",

    "waw/wola/a/124.pdf",

    "waw/wola/a/130.pdf",

    "waw/wola/b/119.pdf",

    "waw/wola/b/120.pdf",

    "waw/wola/b/121.pdf"

    ]

    $ oci os object list -bn blueprints --prefix "waw/wola/b" --query ''data[*].name''
    --profile SANDBOX-USER

    [

    "waw/wola/b/119.pdf",

    "waw/wola/b/120.pdf",

    "waw/wola/b/121.pdf"

    ]

    $ oci os object list -bn blueprints --prefix "waw/wola/b/12" --query ''data[*].name''
    --profile SANDBOX-USER

    [

    "waw/wola/b/120.pdf",

    "waw/wola/b/121.pdf"

    ]

    ```


    ### 分页列出对象


    在日常工作中，你很容易遇到包含数百或数千个对象的存储桶。一次性列出所有对象是不可能的。你需要借助 `paging mechanism`。你可能还记得上一章描述的搜索
    API 及其分页机制。坏消息是，在撰写本文时，搜索 API 不支持对象存储对象。好消息是，对象存储 `ListObjects` API 有其自己的分页机制，实际上比搜索
    API 中使用的机制稍简单一些。如果你决定使用 `limit` 参数，在响应中除了对象列表外，你还会收到 `next-start-with` 元素，它其实就是下一个对象的名称。在后续的每个查询中，你可以取前一个
    `next-start-with` 元素的值，并使用 `start` 参数来指示 API 从哪里开始列出元素，如以下代码片段所示：


    ```

    $ oci os object list -bn blueprints  --limit 5 --query ''{names:data[*].name,
    next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/bemowo/101.pdf",

    "waw/bemowo/102.pdf",

    "waw/bemowo/105.pdf",

    "waw/bemowo/107.pdf",

    "waw/bemowo/115.pdf"

    ],

    "next": "waw/wola/a/115.pdf"

    }

    $ oci os object list -bn blueprints  --limit 5 --start "waw/wola/a/115.pdf" --query
    ''{names:data[*].name, next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/wola/a/115.pdf",

    "waw/wola/a/120.pdf",

    "waw/wola/a/124.pdf",

    "waw/wola/a/130.pdf",

    "waw/wola/b/119.pdf"

    ],

    "next": "waw/wola/b/120.pdf"

    }

    $ oci os object list -bn blueprints  --limit 5 --start "waw/wola/b/120.pdf" --query
    ''{names:data[*].name, next:"next-start-with"}'' --profile SANDBOX-USER

    {

    "names": [

    "waw/wola/b/120.pdf",

    "waw/wola/b/121.pdf"

    ],

    "next": null

    }

    ```

