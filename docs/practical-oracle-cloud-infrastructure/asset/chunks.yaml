  trans: '

    ### 部署与服务


    一个容器化的应用几乎从来不只是孤零零的单容器 Pod。大多数容器化应用，特别是无状态应用，都希望能够进行水平扩展，并向服务消费者暴露服务端点。服务消费者可以被认为是同一集群中其他
    Pod 内运行的其它容器化应用，或者是来自公共互联网的外部系统或客户端。为了控制和方便地管理一组 Pod 副本的服务端，你将使用 Kubernetes 的`Service`对象。`Service`对象在某种程度上解耦了代表
    Web 服务的静态端与由一组 Pod 提供的服务实现。这样做的部分原因是 Pod 可以被动态地扩缩容。同时，服务端应保持不变，以简化服务发现。此外，`Service`对象负责对传入流量进行适当的负载均衡。为了管理对一组
    Pod 的操作，例如升级策略和维持预期数量的健康 Pod，你将使用 Kubernetes 的`Deployment`对象。`Deployment`对象会创建一个`ReplicaSet`，该`ReplicaSet`保持稳定数量的相同
    Pod，并替换那些进入不健康状态的 Pod。此外，它还通过使用各种升级策略，来谨慎处理容器更新到新镜像的方式。图 8-28 展示了这些 Kubernetes
    对象之间简单的协作关系。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig28_HTML.jpg](img/478313_1_En_8_Fig28_HTML.jpg)


    图 8-28


    Kubernetes 上的无状态服务


    假设你仍在开发实例上，`KUBECONFIG`变量已如前所述设置，并且你仍在`3-kubernetes/platform`目录中。使用`kubectl create`命令和`uuid-deployment.yaml`文件来创建一组
    Kubernetes 对象，如下所示：


    ```

    [opc@dev-vm] $ sed -i "s/OCIR_REGION/$OCIR_REGION/; s/OCI_TENANCY_NAMESPACE/$OCI_TENANCY_NAMESPACE/"
    uuid-deployment.yaml

    [opc@dev-vm] $ kubectl create -f uuid-deployment.yaml -n dev-sandbox

    deployment.apps/uuid-dpm created

    service/uuid-srv created

    ```


    清单 8-14 展示了`uuid-deployment.yaml`文件，该文件创建了关联的 Kubernetes 对象，即`Service`、`Deployment`、`ReplicaSet`以及托管容器的`Pods`，这些容器基于从租户的
    OCIR 拉取的`uuid:1.0`容器镜像。所有 Pod 都带有`app=uuid`标签。`Service`对象使用基于标签的选择器`app:uuid`来了解如何路由和分发从其专用的
    Oracle Cloud Infrastructure 负载均衡器传入的流量。如果`Service`对象的类型设置为`LoadBalancer`，则负载均衡器会被动态创建。


    ```

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: uuid-dpm

    namespace: dev-sandbox

    spec:

    replicas: 2

    selector:

    matchLabels:

    app: uuid

    template:

    metadata:

    labels:

    app: uuid

    spec:

    imagePullSecrets:

    - name: sandbox-user-secret

    containers:

    - name: uuid-container

    image: OCIR_REGION.ocir.io/OCI_TENANCY_NAMESPACE/sandbox/uuid:1.0

    ports:

    - containerPort: 5000

    protocol: TCP


    apiVersion: v1

    kind: Service

    metadata:

    name: uuid-srv

    namespace: dev-sandbox

    spec:

    type: LoadBalancer

    selector:

    app: uuid

    ports:

    - port: 80

    targetPort: 5000

    清单 8-14

    uuid-deployment.yaml

    ```


    你可以使用`kubectl get`命令来显示新创建的对象。


    ```

    [opc@dev-vm]$ kubectl get pods -n dev-sandbox -o wide

    NAME                       READY STATUS   IP          NODE

    uuid-dpm-78cf484f96-rj4br  1/1   Running  10.244.1.7  10.0.2.2

    uuid-dpm-78cf484f96-wg2zw  1/1   Running  10.244.0.7  10.0.2.34

    [opc@dev-vm]$ kubectl get replicasets -n dev-sandbox

    NAME                  DESIRED   CURRENT   READY

    uuid-dpm-78cf484f96   2         2         2

    [opc@dev-vm]$ kubectl get services -n dev-sandbox

    NAME      TYPE          CLUSTER-IP   EXTERNAL-IP    PORT(S)

    uuid-srv  LoadBalancer  10.96.26.62  130.61.195.20  80:31475/TCP

    ```


    新创建的`Service`对象是`LoadBalancer`类型。这导致配置了一个新的高可用公共 OCI 负载均衡器，该均衡器跨越了你为集群负载均衡器设置的两个子网。`EXTERNAL-IP`列显示了负载均衡器的公共
    IP 地址。如果你看到`Pending`，请稍等片刻。你的负载均衡器正在启动中。在我的例子中，负载均衡器的公共 IP 地址是 130.61.195.20，你的地址可能会不同。请记下它，我们稍后会需要用到。同时，你可以在
    OCI 控制台中观察负载均衡器，如图 8-29 所示。你可能需要等待片刻才能看到“整体运行状况”设置为`正常`。有时，即使负载均衡器完全可用，这个标志最初也会在稍长一段时间内设置为`未知`。图
    8-30 展示了负载均衡器的详细视图，包括其形态、公共 IP 地址、VCN 以及你在启动 OKE 集群时为负载均衡器选择的两个公共子网。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig30_HTML.jpg](img/478313_1_En_8_Fig30_HTML.jpg)


    图 8-30


    Kubernetes 服务负载均衡器详情


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig29_HTML.jpg](img/478313_1_En_8_Fig29_HTML.jpg)


    图 8-29


    Kubernetes 服务负载均衡器


    如果你仍在开发者实例上，请断开连接。


    ```

    [opc@dev-vm]$ exit

    ```


    让我们向服务的外部 IP 地址发送一系列相同的请求。在运行这些命令之前，你需要将`LB_PUBLIC_IP`的值替换为已分配给你负载均衡器的 IP 地址：


    ```

    $ LB_PUBLIC_IP=130.61.195.20

    $ for i in {1..10}; do curl $LB_PUBLIC_IP:80/identifiers; done

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"a5bf.......d471"}

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"f2a4.......b902"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"564c.......1496"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"2473.......f7f9"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"9709.......bc47"}

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"cffd.......22d9"}

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"6bb3.......5285"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"6b02.......cafc"}

    {"generator":"uuid-dpm-78cf484f96-rj4br","uuid":"fdb5.......dcf7"}

    {"generator":"uuid-dpm-78cf484f96-wg2zw","uuid":"ee94.......b038"}

    ```


    `generator`字段是根据接收到请求的 Pod 名称填充的。查看结果，你应该会看到请求在支撑我们服务的两个 Pod 之间相当均匀地分配。如果你愿意，可以在几秒钟内将容器化应用实例的数量扩展到数十甚至数百个。


    我们在本章中使用 Oracle Kubernetes Engine 所完成的操作，仅仅是触及了使用基于云的托管 Kubernetes 所能实现功能的皮毛。请随意尝试，当你准备好进入下一章时，别忘了终止集群和开发者实例，以节省你的资源消耗。

