    `Sandbox` 隔区中管理对象。我们已经准备好配置随自定义应用程序一起交付的基础设施，该应用程序将让我们看到实例主体的实际应用。


    ### 从实例访问存储


    在本节中，您将应用 Terraform 基础设施代码，该代码将配置一套简单的云资源，包括一台基于 CentOS 的虚拟机。在这台机器上，我们将运行一个简单的基于
    Python 的应用程序，该程序被封装为一个基于 systemd 的 Linux 操作系统服务。该应用程序将定期列出特定存储桶中的一组对象，并在同一存储桶中创建一个摘要文本文件。我们将使用
    OCI Python SDK 来实现该逻辑。该应用程序，或者更准确地说，运行该应用程序的计算实例，将以所谓的实例主体进行身份验证。这样，您就可以避免在该计算实例上存储密码或密钥。应用程序逻辑的概念图如图
    5-13 所示。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig13_HTML.jpg](img/478313_1_En_5_Fig13_HTML.jpg)


    图 5-13：从 OCI 实例访问对象存储


    本章前面，您已经在对象存储 API 的背景下对 OCI Python SDK 进行了一些实验。您之前运行的代码使用了本地的 OCI CLI/SDK 配置文件，并以
    `sandbox-user` 用户身份进行了身份验证。应用程序必须能够访问私有的 API 签名密钥，并了解其他一些详细信息，例如用户 OCID 和区域，才能成功签署每个请求。这不是一个非常便于移植的设置，对吧？这次，我们将让应用程序以实例主体的身份进行身份验证。这样，我们就不需要在运行应用程序的计算实例上提供或定义任何密钥或用户详细信息。相反，应用程序将代表计算实例进行
    API 调用。这增强了安全性，使整个管理更简单，应用程序更具可扩展性。


    整个解决方案将使用我准备的脚本以完全自动化的方式构建。您只需“按下按钮”并观看即可。基础设施几乎与第 3 章部署的相同。只是少数名称发生了变化。不过，cloud-init
    配置文件是全新的。我稍后会解释一切。首先，让我们看看它的实际效果。


    我假设 Terraform 使用的环境变量仍然有效。您可以使用 Bash 命令 `env | grep TF_VAR` 来验证这一点。如果它们不存在，您应该能够使用
    `tfvars.env.sh` 脚本来加载它们，该脚本是您在第 3 章练习中创建的。


    ```

    $ source ~/tfvars.env.sh

    ```


    Terraform 代码假设 `~/.ssh` 目录中存在 `oci_id_rsa.pub` 公共 SSH 密钥，并从 `compute.tf` 基础设施代码文件中引用该密钥。满足上述先决条件后，运行
    `terraform init` 命令以下载最新的 OCI 插件，并执行 `terraform apply` 命令来配置基础设施。

