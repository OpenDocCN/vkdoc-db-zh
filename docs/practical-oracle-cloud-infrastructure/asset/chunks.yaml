    ```


    ## 在策略语句中使用条件


    如果您想明确拒绝属于您正在使用的 `策略动词` 的某些选定权限，该怎么办？例如，在 `load-balancers` `资源类型` 的上下文中，`manage`
    `策略动词` 将允许您执行所有操作，包括负载均衡器的创建和删除。如果您想排除 `LOAD_BALANCER_DELETE` 权限，可以使用 `策略语句条件`。


    ```

