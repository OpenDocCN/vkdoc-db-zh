  trans: '

    # 云端开发实例


    让我们基于最新的 CentOS 7 平台镜像配置一个计算实例。我已经准备好了基础架构代码。你可以在 `the chapter08/1-devmachine`
    目录中找到它。代码结构符合我们在前面所有章节中讨论过的内容。其中有一个名为 `devmachine` 的模块，实例及其对应的子网级云网络资源就在这个模块中定义。而
    VCN（虚拟云网络）传统上是在模块外部、顶层 `vcn.tf` 文件中定义的。


    ```

    $ cd ~/git

    $ cd oci-book/chapter08/1-devmachine

    $ find . \( -name "*.tf" -o -name "*.yaml" \) | sort

    ./devmachine/cloud-init/devvm.config.yaml

    ./devmachine/compute.tf

    ./devmachine/vars.tf

    ./devmachine/vcn.tf

    ./modules.tf

    ./provider.tf

    ./vars.tf

    ./vcn.tf

    ```


    ## 通过 Cloud-Config 进行初始设置


    为了执行初始实例设置并为你提供所有必需的开发工具，我们使用 cloud-config 文件，如列表 8-1 所示。


    ```yaml

    #cloud-config

    yum_repos:

    docker-ce-stable:

    name: Docker CE Stable - $basearch

    baseurl: https://download.docker.com/linux/centos/7/$basearch/stable

    enabled: true

    ...

    kubernetes:

    name: Kubernetes

    baseurl: https://packages.cloud.google.com/yum/repos/kubernetes-el7-x86_64

    enabled: true

    ...

    packages:

    - git

    - docker-ce

    - docker-ce-cli

    - containerd.io

    - kubectl

    runcmd:

    - [ systemctl, enable, docker ]

    - [ systemctl, start, docker ]

    - [ usermod, -aG, docker, opc ]

    - [ mkdir, "/home/opc/.kube" ]

    - [ chown, "opc:opc", "/home/opc/.kube" ]

    - [ firewall-offline-cmd, "--add-port=5010-5019/tcp" ]

    - [ systemctl, restart, firewalld ]

    final_message: "DEV machine is running, after $UPTIME seconds"

    ```


    *列表 8-1：`1-devmachine/cloud-init/devvm.config.yaml`*


    基于这个 cloud-config 文件，cloud-init 将添加两个外部 Yum 仓库，并安装 Git 客户端、Docker 社区版（CE）工具包以及
    Kubernetes 的 `kubectl` 命令行管理工具。你将在本章的第二部分了解 `kubectl` 和 Kubernetes。


    ## 使用 Terraform 配置实例


    是时候配置开发实例了。在你已安装并配置了 Terraform 的本地机器上，请确保你已经导出了相关环境变量，这些变量以 `TF_VAR_` 开头，是你 OCI
    Provider 所需的。如果它们尚未设置，你可能需要运行以下命令：


    ```

    $ source ~/tfvars.env.sh

    ```


    现在，执行以下命令：


    ```

    $ terraform init

    Initializing modules...

    - devmachine in devmachine

    Initializing the backend...

    Initializing provider plugins...

    - Checking for available provider plugins...

    - Downloading plugin for provider "oci" (terraform-providers/oci) 3.30.0...

    * provider.oci: version = "~> 3.30"

    Terraform has been successfully initialized!

    $ terraform apply

    data.oci_identity_availability_domains.ads: Refreshing state...

    data.oci_core_images.centos_image: Refreshing state...

    Terraform will perform the following actions:

    # oci_core_internet_gateway.igw will be created

    # oci_core_virtual_network.vcn will be created

    # module.devmachine.oci_core_instance.dev_vm will be created

    # module.devmachine.oci_core_route_table.dev_rt will be created

    # module.devmachine.oci_core_security_list.dev_sl will be created

    # module.devmachine.oci_core_subnet.dev_net will be created

    Plan: 6 to add, 0 to change, 0 to destroy.

    Do you want to perform these actions?

    Terraform will perform the actions described earlier.

    Only ''yes'' will be accepted to approve .

    Enter a value: yes

    ...

    Apply complete! Resources: 6 added, 0 changed, 0 destroyed.

    Outputs:

    dev_machine_image_name = CentOS-7-2019.06.19-0

    dev_machine_public_ip = 130.61.84.182

    $ DEV_VM_PUBLIC_IP=`terraform output dev_machine_public_ip`

    ```


    在我的案例中，该实例已在法兰克福区域的第三个可用性域的第三个故障域中配置完成，如图 8-6 所示。


    ![在 OCI 控制台中查看开发者虚拟机](img/478313_1_En_8_Fig6_HTML.jpg)


    *图 8-6：在 OCI 控制台中查看开发者虚拟机*


    ## 连接与验证


    开发者实例报告为“运行中”后，请等待几秒钟，让 `sshd` 守护进程启动并连接到该机器。接下来，和往常一样，你可能需要等待一两分钟，直到 cloud-init
    完成 cloud-config 文件中定义的所有任务。你可以时不时检查 `cloud-init.log` 来确认 cloud-init 是否已完成。


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    [opc@dev-vm]$ sudo cat /var/log/cloud-init.log | grep "DEV machine is running"

    2019-06-22 12:46:49,899 - util.py[DEBUG]: DEV machine is running, after 116.90
    seconds

    [opc@dev-vm]$ exit

    ```


    从现在开始，在后续任何代码片段中看到 `[opc@dev-vm]$` 命令提示符时，都将假定你已登录到开发者实例上。


    **注意**

    Oracle Cloud Infrastructure 市场提供了一个更全面的预构建 Oracle Cloud Developer 镜像，其中开箱即装有许多其他工具。然而，在本章中，我们使用的是一个更轻量级、定制化的开发者实例，该实例是你使用提供的基础架构代码启动的。


    为了能够以普通用户身份运行 Docker，cloud-init 已将 `opc` 用户添加到了 `docker` 组。重新连接到开发者机器以使组分配生效。


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    ```


    我们将在下一节中继续进行相关工作。

    '
- fmt: '## Docker Runtime


    Let''s explore a bit the Docker tools installed on the developer instance. At
    the beginning of this chapter, you learned about containers and container images.
    To list the images on a given machine, issue the `docker images` command. To list
    the running containers, issue the `docker ps` command, like this:


    ```

    [opc@dev-vm]$ docker images

    REPOSITORY    TAG    IMAGE ID    CREATED    SIZE

    [opc@dev-vm]$ docker ps

    CONTAINER ID   IMAGE   COMMAND   CREATED   STATUS   PORTS   NAMES

    ```


    Perfect. At this moment, there are no images and no containers on this machine.
    What about learning something more about the Docker engine and the underlying
    container runtime? Issue the `docker info` command.


    ```

    [opc@dev-vm]$ docker info

    ...

    Server Version: 18.09.6

    Storage Driver: overlay2

    Backing Filesystem: xfs

    Supports d_type: true

    Native Overlay Diff: true

    ...

    Runtimes: runc

    Default Runtime: runc

    ...

    Kernel Version: 3.10.0-957.21.3.el7.x86_64

    ...

    Docker Root Dir: /var/lib/docker

    ...

    ```


    Earlier, I spoke briefly about the fact that all containers use the kernel of
    their host machine. This is why the kernel is still important for Docker Engine,
    and you can find its precise version listed as the `Kernel Version` entry in the
    output of the `docker info` command. Among various information entries, you will
    also see the `Runtimes` entry. Docker uses the container runtime called `containerd`.
    Here, however, we can see something called `runc` as the `Runtimes` entry. Nothing
    is wrong. The `runc` is a component responsible for running containers based on
    the standardized Open Container Initiative (OCI) specification. The `containerd`
    container runtime uses the `runc` under the hood and adds more features around
    it. Another interesting entry refers to the way Docker works with the filesystem
    layers that are combined to serve as the filesystem seen by your containerized
    application. Stacked on top of the read-only layers, there is a writable container
    layer. If an application makes any changes to the filesystem, these will be resembled
    in the writable layer only. It is the job of the `storage driver` to manage these
    layers, taking into consideration the characteristics of the underlying physical
    filesystem that backs the `Docker root directory` on the host. There are a few
    storage drivers available, each with different strengths and weaknesses. We are
    using the currently preferred storage driver called `overlay2` backed by the xfs
    filesystem. The filesystem layers hierarchy is located in the `/var/lib/docker/overlay2`
    subdirectory. While containers are running, you should be able to find how the
    layers are stacked on top of each other using the `mount` command. If this looks
    a bit complex at first glance, there is no need to worry. We are not going to
    work with these settings. I just wanted you to get some practical overview of
    what had been conceptually discussed about layers at the beginning of this chapter.


    ## Docker Images


    Our goal is to build an image that encapsulates the UUID service application,
    including application dependencies (Python 3 and the Flask microframework) and
    default values for the required environment variables (e.g., `FLASK_APP`). First,
    we have to choose the appropriate `base image` for the application-specific image
    that we are about to build. Luckily, there are official base images for Python
    on Docker Hub, which is probably the largest library for container images. Both
    community-driven open source projects and independent software vendors publish
    their ready-for-distribution images to Docker Hub. You can find a large set of
    images that bundle different Python versions on various platforms at [`https://hub.docker.com/_/python`](https://hub.docker.com/_/python),
    as shown in Figure [8-7](#478313_1_En_8_Chapter.xhtml#Fig7).


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig7_HTML.jpg](images/478313_1_En_8_Chapter/478313_1_En_8_Fig7_HTML.jpg)


    ### Figure 8-7


    Official Python images on Docker Hub


    For demonstrational purpose, we will choose Python 3 on Alpine Linux, the variant
    available under the `python:3-alpine` tag. How would our Docker engine, which
    is running on an instance in the Frankfurt region of Oracle Cloud Infrastructure,
    actually know how to fetch this image? If you run the `docker info` command again,
    you should see the `Registry` entry at the bottom of the output.


    ```

    [opc@dev-vm]$ docker info

    ...

    Registry: https://index.docker.io/v1

    ...

    ```


    Docker CE comes with a preconfigured link to the Docker Hub container image registry
    by default. Based on the security rules used by the VCN subnet to which the compute
    instance is attached, the instance does have free outbound connectivity to the
    Internet that effectively allows the instance to download container images from
    Docker Hub.


    So far so good. We know the name of the base image. Now, it is time to create
    the custom image that adds the Flask microframework, sets a few default environment
    variables, and tells the container runtime to execute the `app.py` file, which
    is the implementation of the UUID API. To instruct Docker how to build a new image,
    you use a `Dockerfile`, which basically consists of the sequence of commands that
    are used to build the given image.


    First, we are going to clone the Git repository with the code for this book again,
    this time on the developer instance.


    ```

    [opc@dev-vm]$ git clone https://github.com/mtjakobczyk/oci-book.git

    [opc@dev-vm]$ cd oci-book/chapter08/2-docker/

    [opc@dev-vm]$ cd uuid-service/

    [opc@dev-vm]$ ls -1

    app.py

    Dockerfile

    requirements.txt

    ```


    The `chapter08/2-docker/uuid-service` directory contains three files.


    *   `app.py`

    *   `Dockerfile`

    *   `requirements.txt`


    The `app.py` file is identical to the one we used in Chapter [2](#478313_1_En_2_Chapter.xhtml).
    This is basically the implementation of the UUID API. As per Python conventions,
    the `requirements.txt` file holds a list of Python packages that are required
    by our application and will be installed using the `pip` tool. As I mentioned
    a moment ago, the `Dockerfile` is used to build an image. Listing [8-2](#478313_1_En_8_Chapter.xhtml#PC11)
    shows the `Dockerfile` for our image.


    ```

    FROM python:3-alpine

    ENV FLASK_APP /usr/src/app/app.py

    ENV FLASK_ENV development

    ENV FLASK_DEBUG 0

    EXPOSE 5000

    WORKDIR /usr/src/app

    COPY requirements.txt ./

    RUN pip install --no-cache-dir -r requirements.txt

    COPY . .

    CMD [ "flask", "run", "--host=0.0.0.0" ]

    ```


    Listing 8-2

    `Dockerfile`'
