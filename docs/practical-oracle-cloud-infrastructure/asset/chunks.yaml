    York, 233 Spring Street, 6th Floor, New York, NY 10013. Phone 1-800-SPRINGER,
    fax (201) 348-4505, e-mail orders-ny@springer-sbm.com, or visit www.springeronline.com.
    Apress Media, LLC is a California LLC and the sole member (owner) is Springer
    Science + Business Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is a
    Delaware corporation.


    *To my family, friends, and colleagues*


    # Introduction


    Welcome to *Practical Oracle Cloud Infrastructure*. I have written this book to
    provide readers with a fast-paced, hands-on introduction to the most important
    aspects of Oracle Cloud Generation 2. This handbook is meant to guide you using
    a series of practical exercises that will give you the opportunity to learn by
    doing. After having read this book, you will have a broad understanding of various
    cloud infrastructure concepts. Moreover, you will be able to build cloud-based
    applications that leverage different types of cloud services available on Oracle
    Cloud.


    I am a great fan of automation applied to cloud infrastructure provisioning, system
    configuration, and the software development lifecycle. Throughout this book, you
    will learn to employ a large amount of automation and apply an infrastructure-as-code
    approach.


    ## Who Is This Book For?


    This book is meant for cloud architects, consultants, engineers, computer science,
    and technology students, as well as anyone who would like to learn about infrastructure
    as a service delivered on the Oracle public cloud. To fully benefit from the exercises
    described in this book, you should have a working knowledge of Linux or the macOS
    shell, a basic understanding of IP networking concepts, and some exposure to programming.


    ## How to Work with This Book?


    This book is code-driven. While reading this book, you will see I am assuming
    that you are using the code that accompanies this book. This is why you should
    clone the Git repository that holds all the code snippets, source code, and configuration
    file templates. You will find the relevant Git repository at these links:


    [`https://github.com/mtjakobczyk/oci-book`](https://github.com/mtjakobczyk/oci-book)

    [`www.apress.com/source-code`](https://www.apress.com/source-code)


    The code snippets are meant to be executed in macOS (Terminal), Linux (Shell),
    or Windows Subsystem for Linux. If you are on Windows, please use `Windows Subsystem
    for Linux` or launch a virtual machine with a Linux guest system. The Git repository
    is composed of a number of directories, one for every chapter. Inside each directory,
    you will find a chapter-specific `README.md` file. These `README.md` files use
    convenient Markdown notation and include all the code snippets needed to make
    it easier and faster to work with the code by copying it straight to your terminal.


    Furthermore, if something changes in Oracle Cloud, the code in the Git repository
    will be updated accordingly so that you will be able to work with an updated version
    of the code snippets. Just make sure you periodically check for updates and pull
    the latest versions. The majority of application code in this book is written
    in Python. If you do not know Python, you should still be fine, because the most
    important code pieces are explained.


    I am aware that nowadays a small number of people read technical books from the
    beginning to the end. Yet, I strongly recommend you work through this book in
    an ordered manner, reading and more importantly doing hands-on exercises starting
    from Chapter [1](#478313_1_En_1_Chapter.xhtml) and continuing chapter after chapter.


    If you just want to get some basic understanding, read Chapter [1](#478313_1_En_1_Chapter.xhtml)
    and complete the exercises covered in Chapter [2](#478313_1_En_2_Chapter.xhtml).
    If you are interested in automation, continue to Chapter [3](#478313_1_En_3_Chapter.xhtml).
    To fully benefit from the hands-on exercises included in this book, it is recommended
    that you set up your environment as described in Chapters [3](#478313_1_En_3_Chapter.xhtml)
    and [4](#478313_1_En_4_Chapter.xhtml) before moving on to subsequent chapters.
    This is because the exercises from Chapters [5](#478313_1_En_5_Chapter.xhtml)
    to [9](#478313_1_En_9_Chapter.xhtml) assume that the environment configuration
    covered in Chapters [3](#478313_1_En_3_Chapter.xhtml) and [4](#478313_1_En_4_Chapter.xhtml)
    is still in place. All in all, my advice is to read and work through this book
    chapter after chapter.


    ## Cloud Account


    To perform the exercises included in this book, you will need an Oracle Cloud
    account. At the end of Chapter [1](#478313_1_En_1_Chapter.xhtml), you will learn
    how to subscribe to a new Trial cloud account that allows you to work with Oracle
    Cloud for 30 days at no cost. If you want, you can work using a paid account,
    but just be aware that some services will incur costs. I have created the exercises
    for this book using mainly my personal, paid cloud account.


    ## Managing Change


    Nowadays, cloud services are evolving at an incredible pace, sometimes introducing
    breaking changes. This is especially important for the relatively new services
    such as Oracle Kubernetes Engine and Oracle Functions that are covered in this
    book. If you experience that something works in a different way than described,
    make sure you pull the latest version from the GitHub repository associated with
    this book and read the `README.md` file for a particular chapter.


    # Acknowledgments


    First and foremost, I would like to thank


    *   Michelle Malcher, Łukasz Antoniak, Tomasz Sawiński, Piotr Kusiak, and Igor
    Sawczuk for their feedback and technical reviews

    *   Wojciech Wcisło and his Oracle consulting team in Warsaw for creating an incredible
    atmosphere at work

    *   Ben Lackey at Oracle for his support

    *   Jill Balzano, Jonathan Gennick, Kim Wimpsett, and Laura Berendson at Apress
    for everything involved in making this book real


    This book is a result of my dreams to unleash my creativity and share my valuable
    technical knowledge and experience with other technology enthusiasts in the structured
    form of a technology handbook. I am a great believer in the importance of a learning-oriented
    mind-set, and I would like to say to everyone who contributed to that throughout
    my entire life and career: thank you!


    ## About the Author


    ## About the Technical Reviewer'
