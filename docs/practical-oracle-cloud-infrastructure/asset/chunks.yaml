- fmt: "# 实现API服务器与云基础设施设计\n\n是时候仔细看看实现了。我选择使用 Flask 来实现 API 服务器，这是一个面向 Web 的 Python\
    \ 微框架。我确信你已经听说过 Python 编程语言。它于 20 世纪 90 年代初推出，尤其是在过去十年中，其受欢迎程度迅速增长。Python 被认为是一种通用语言，广泛应用于\
    \ Web 开发、数据科学、机器学习、云生态系统，甚至物联网（IoT）等各个领域。它被归类为一种多范式、解释型的语言，具有动态类型和称为*垃圾回收*（`garbage\
    \ collection`）的自动内存管理。支持多种编程范式意味着你可以选择自己喜欢的编码方式，无论是过程式、面向对象还是函数式。解释型语言不需要在执行前预编译成机器代码，而是直接在解释器上运行。这简化了交付流程，但会带来性能下降。动态类型和自动内存管理提高了编程效率，使语言更易于使用。另一方面，Flask\
    \ 是一个 Web 开发微框架，主要侧重于处理 HTTP 请求并发送正确渲染的 HTTP 响应。它完全兼容 WSGI。WSGI 在 PEP3333 中定义，代表\
    \ Web 服务网关接口（Web Service Gateway Interface），这是 Python 生态系统的一个标准，指定了 Web 服务器和 Web\
    \ 框架之间的接口。为方便起见，Flask 自带一个嵌入式 Web 服务器，非常适合开发目的。\n\n清单 [2-2](#478313_1_En_2_Chapter.xhtml#PC2)\
    \ 展示了一个 UUID 服务的实现。你不需要对这段代码做任何事。所有事情都将在云实例首次启动时自动发生。怎么做？继续阅读即可。\n\n> **提示**\n\
    >\n> 尽管你不需要对这段代码做任何事，但它仍可在本书的 Git 仓库中找到，路径为 `chapter02/uuid-service/app.py`。\n\
    \n```python\nimport flask\nimport uuid\nimport os\nimport socket\nimport logging\n\
    app = flask.Flask(__name__)\n@app.route('/identifiers', methods=['GET'])\ndef\
    \ identifiers():\n    generator_name = os.getenv('UUID_GENERATOR_NAME', socket.gethostname())\n\
    \    generator_uuid = uuid.uuid4()\n    app.logger.info('Generator: [%s] UUID:\
    \ [%s]', generator_name, generator_uuid)\n    rsp = flask.jsonify(uuid=generator_uuid,\
    \ generator=generator_name)\n    rsp.status_code = 200\n    rsp.headers['Content-Type']\
    \ = 'application/json'\n    return rsp\n@app.before_first_request\ndef setup_logging():\n\
    \    logging.getLogger('werkzeug').disabled = True\n    app.logger.removeHandler(flask.logging.default_handler)\n\
    \    handler = logging.StreamHandler()\n    handler.setFormatter(logging.Formatter('%(asctime)s\
    \ - %(levelname)s - %(message)s'))\n    app.logger.addHandler(handler)\n    app.logger.setLevel(logging.INFO)\n\
    ```\n*清单 2-2 UUID 服务实现*\n\n为了将重点放在本书的主题上，我将避免逐行解释实现细节。你应该理解的是，这个应用程序将所有通过 `/identifiers`\
    \ URL 发送的 GET 请求路由到 `identifiers()` 处理函数。该函数通过组合一个新生成的 UUID 和 `generator` 的名称来准备响应。后者被设置为主机名，除非存在\
    \ `UUID_GENERATOR_NAME` 环境变量。响应以 JSON 格式发送，如下所示：\n\n```json\n{\n  \"generator\"\
    : \"uuid1\",\n  \"uuid\": \"e22b5858-e70f-46ab-bd16-0da3d55aca73\"\n}\n```\n\n\
    现在，让我们回到正题，开始定义所需的 Oracle Cloud Infrastructure 资源，以便能够创建它们。\n\n## API服务器实现\n\n\
    ### Cloud Infrastructure\n\n根据我们在上一节简要讨论的概念设计，我们知道将需要两个位于两个不同可用性域（availability\
    \ domain）中的计算实例，它们位于一个高可用负载均衡器后面。负载均衡器将使用一个公共 IP，以便可以从互联网访问。我们将创建一些其他辅助基础设施资源，以确保云设计的完整性。\n\
    \n然而，事情要分轻重缓首。我们首先设计资源所在虚拟网络的布局。*虚拟云网络*（`VCN`）可以被视为一个虚拟的、私有的网络，它提供一个连续的 IPv4 地址块。建议选择通常被认为是私有的\
    \ IPv4 地址块。RFC1918 定义了这些地址。如果你想遵循此准则，请从以下地址范围中选择任何子集：\n\n*   `192.168.0.0/16`\n\
    *   `172.16.0.0/12`\n*   `10.0.0.0/8`\n\n对于我们的云解决方案，我们将使用这个范围：`192.168.1.0/24`。\n\
    \n一个 VCN 被细分为一个或多个*子网*。属于同一个 VCN 的子网的 IP 地址范围必须在父 VCN 的 IP 地址范围内，并且不能与其他子网重叠。你在\
    \ Oracle Cloud Infrastructure 中运行的每个计算实例都将附加到特定的 VCN 子网。这是通过一个称为 `vNIC` 的虚拟网络接口卡完成的。\n\
    \n让我们决定一下云网络的布局。图 [2-5](#478313_1_En_2_Chapter.xhtml#Fig5) 展示了我们的云解决方案的 VCN 地址空间，以及划分为子网的地址范围。\n\
    \n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig5_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig5_HTML.jpg)\n\
    *图 2-5 虚拟云网络地址范围布局*\n\n如图 [2-5](#478313_1_En_2_Chapter.xhtml#Fig5) 所示，我们将使用四个子网。\n\
    \n*   子网 A 用于托管 UUID API 的第一个计算节点\n*   子网 B 用于托管 UUID API 的第二个计算节点\n*   子网 C 用于第一个负载均衡器节点\n\
    *   子网 D 用于第二个负载均衡器节点\n\n换句话说，我们将在子网 A 和 B 中启动的两个计算实例上运行 UUID API 应用程序。一对负载均衡器节点将在子网\
    \ C 和 D 中运行。为了实现容错：\n\n*   子网 A 和 C 将在第一个可用性域中创建。\n*   子网 B 和 D 将在第二个可用性域中创建。\n\
    \n如果你查阅官方的 OCI 文档、白皮书或项目架构文档，你会发现 OCI 资源（计算实例、负载均衡器、网络资源等）通常使用遵循相同风格并重用一套标准图标的图表来呈现。我现在将首次使用\
    \ Oracle Cloud Infrastructure 拓扑符号。图 [2-6](#478313_1_En_2_Chapter.xhtml#Fig6)\
    \ 展示了我们将在本章中构建的云基础设施拓扑。\n\n![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig6_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig6_HTML.jpg)\n\
    *图 2-6 云基础设施架构*\n\n> **提示**\n>\n> Oracle 发布了一套可重用的图形资产，每个人都可以在其架构文档中使用。你可以在 [`https://bit.ly/2rfLk3V`](https://bit.ly/2rfLk3V)\
    \ 找到它们。\n\n在这个阶段，我们对云网络布局有了相当清晰的构想。现在，让我们对计算实例做几个选择。\n\n*`The shape`* 是基于给定配置文件（`shape`）的计算实例所提供的硬件资源（CPU\
    \ 核心、可用内存）的配置文件。Oracle Cloud Infrastructure 提供两个系列的计算实例配置。\n\n*   **裸机主机**（`Bare-metal\
    \ hosts`）：专用、单租户硬件，无管理程序（`hypervisor`）\n*   **虚拟机**（`Virtual machines`）：通用目的、多租户硬件，有管理程序（`hypervisor`）"
  raw: 'The time has come to take a closer look at the implementation. I have chosen
    to implement the API server in Flask, a web-oriented Python microframework. I
    am pretty sure you have already heard about the Python programming language. Introduced
    in the early 1990s, it has experienced a rapid growth in popularity, especially
    in the last decade. Python is considered a general-purpose language used across
    various domains such as web development, data science, machine learning, cloud
    ecosystem, and even the IoT. It is categorized as a multiparadigm, interpreted
    language with dynamic types and automatic memory management called *garbage collection*.
    Supporting multiple programming paradigms means that you are able to choose your
    preferred way of coding, let it be procedural, object-oriented, or functional.
    Interpreted languages do not need to be precompiled to machine code before execution
    but are run directly on an interpreter. It simplifies the delivery pipeline, but
    with a performance drop. Dynamic types and automated memory management boost the
    programming efficiency, making the language easier to work with. Flask, on the
    other hand, is a web development microframework with the main focus on processing
    HTTP requests and sending properly rendered HTTP responses. It is fully WSGI-compliant.
    WSGI has been defined in PEP3333 and stands for Web Service Gateway Interface,
    which is a Python-ecosystem standard that specifies an interface between web servers
    and web frameworks. For our convenience, Flask comes with an embedded web server
    that is ideal for development purposes.


    Listing [2-2](#478313_1_En_2_Chapter.xhtml#PC2) presents a UUID service implementation.
    You do not need to do anything with the code. Everything will happen automatically
    on the cloud instance during its first boot. How? Just read on.


    Tip


    Even though you do not need to do anything with the code, it is still available
    in the Git repository for this book at the `chapter02/uuid-service/app.py` path.


    ```

    import flask

    import uuid

    import os

    import socket

    import logging

    app = flask.Flask(__name__)

    @app.route(''/identifiers'', methods=[''GET''])

    def identifiers():

    generator_name = os.getenv(''UUID_GENERATOR_NAME'', socket.gethostname())

    generator_uuid = uuid.uuid4()

    app.logger.info(''Generator: [%s] UUID: [%s]'', generator_name, generator_uuid)

    rsp = flask.jsonify(uuid=generator_uuid, generator=generator_name)

    rsp.status_code = 200

    rsp.headers[''Content-Type''] = ''application/json''

    return rsp

    @app.before_first_request

    def setup_logging():

    logging.getLogger(''werkzeug'').disabled = True

    app.logger.removeHandler(flask.logging.default_handler)

    handler = logging.StreamHandler()

    handler.setFormatter(logging.Formatter(''%(asctime)s - %(levelname)s - %(message)s''))

    app.logger.addHandler(handler)

    app.logger.setLevel(logging.INFO)

    Listing 2-2

    UUID Service Implementation

    ```


    To keep the focus on the main subject of this book, I will avoid explaining the
    line-by-line implementation details. What you should understand is that this application
    routes all GET requests sent via the `/identifiers` URL to `the identifiers()`
    handler function. The function prepares a response by combining a newly generated
    UUID with the name of `generator`. The latter is set to the hostname, unless `the
    UUID_GENERATOR_NAME` environment variable exists. The response is sent in JSON
    format, as shown here:


    ```

    {

    "generator":"uuid1",

    "uuid":"e22b5858-e70f-46ab-bd16-0da3d55aca73"

    }

    ```


    Now, let’s get back on track and start defining the required Oracle Cloud Infrastructure
    resources so that we can create them.


    ### Cloud Infrastructure


    Based on the conceptual design that we briefly discussed in the previous section,
    we know we will need two compute instances in two different availability domains
    behind a highly available load balancer. The load balancer will use a public IP
    so that it can be reached from the Internet. There are a few other supplementary
    infrastructure resources we will create to make sure that the cloud design is
    complete.


    First things first, however. We begin with designing the layout of the virtual
    network where our resources exist. *A virtual cloud network* (VCN) can be thought
    of as a virtual, private network that provides a contiguous block of IPv4 addresses.
    It is advisable to choose an IPv4 address block that is commonly considered as
    private. RFC1918 defines these addresses. If you want to adhere to this guideline,
    select any subset of the following address ranges:


    *   192.168.0.0/16


    *   172.16.0.0/12


    *   10.0.0.0/8


    For our cloud solution, we will use this range: 192.168.1.0/24.


    A VCN is subdivided into one or more *subnets*. The IP address ranges of the subnets
    that belong to the same VCN have to be within the IP address range of the parent
    VCN and mustn’t overlap with other subnets. Each compute instance you run in Oracle
    Cloud Infrastructure will be attached to a particular VCN subnet. This is done
    through a virtual network interface card called a vNIC.


    Let’s decide on the layout of our cloud networking. Figure [2-5](#478313_1_En_2_Chapter.xhtml#Fig5)
    shows the VCN address space for our cloud solution and the address range split
    into subnets.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig5_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Virtual cloud network address range layout


    As you can see in Figure [2-5](#478313_1_En_2_Chapter.xhtml#Fig5), we will use
    four subnets.


    *   Subnet A for the first compute node hosting the UUID API


    *   Subnet B for the second compute node hosting the UUID API


    *   Subnet C for the first load balancer node


    *   Subnet D for the second load balancer node


    In other words, we are going to run the UUID API application on two compute instances
    launched in subnets A and B. The pair of the load balancer nodes will run in subnets
    C and D. To achieve fault tolerance,


    *   Subnets A and C will be created in the first availability domain.


    *   Subnets B and D will be created in the second availability domain.


    If you check the official OCI documents, white papers, or project architecture
    documents, you will find that OCI resources (compute instances, load balancers,
    networking resources, and others) are often presented using diagrams that follow
    the same style and reuse a set of standard icons. I will now use Oracle Cloud
    Infrastructure topology notation for the first time. Figure [2-6](#478313_1_En_2_Chapter.xhtml#Fig6)
    illustrates the cloud infrastructure topology we are going to build in this chapter.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig6_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Cloud infrastructure architecture


    Tip


    Oracle has released a set of reusable graphical assets that everyone can use in
    their architecture documentation. You can find them at [`https://bit.ly/2rfLk3V`](https://bit.ly/2rfLk3V).


    At this stage, we have a pretty clear vision of the cloud networking layout. Now,
    let’s make a few choices about the compute instances.


    *The shape* is a profile of hardware resources (CPU cores, available memory) offered
    by a compute instance that is based on a given shape. Oracle Cloud Infrastructure
    features two families of compute instance shapes.


    *   **Bare-metal hosts**: Dedicated, single-tenant hardware, no hypervisor


    *   **Virtual machines**: General purpose, multitenant hardware, hypervisor'
