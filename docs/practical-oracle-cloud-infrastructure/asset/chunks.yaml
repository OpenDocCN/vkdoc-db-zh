    "waw/bemowo/107.pdf": {...},

    "waw/bemowo/115.pdf": {...}

    }

    }

    ```


    If you want, you can use the `--include` option to limit the uploaded files from
    the source directory to the ones that match a given pattern.


    In a similar way, we will upload the files from `the warsaw/wola` directory, this
    time *prefixing* the objects with the `waw/wola/a` and `waw/wola/b` strings depending
    on the local subdirectory in which each file was originally located.


