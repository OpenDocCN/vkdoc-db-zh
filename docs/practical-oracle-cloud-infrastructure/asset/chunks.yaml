    Before we connect to the worker node over the bastion host, let’s see some of
    the newly provisioned cloud resources in the OCI Console.


    1.  Go to Menu ➤ Compute ➤ Instance Pools.


    2.  Make sure that the `Sandbox` compartment is selected.


    You should see a new instance pool called `workers-pool` , as shown in Figure
    [6-24](#478313_1_En_6_Chapter.xhtml#Fig24). The pool’s placement configuration
    includes all three availability domains (ADs) in my default region (eu-frankurt-1).
    Whenever a new instance is added to the pool, it will be created in one of these
    ADs. If you look at Target Instance Count, you will see that, in our case, we
    started small by having only one target instance.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig24_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig24_HTML.jpg)


    Figure 6-24


