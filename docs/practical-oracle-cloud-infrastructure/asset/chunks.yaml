    正如我之前所说，您通常只会使用这种类型的搜索来获取与特定文本模式匹配的资源的初步、高级概览。根据您搜索的术语，结果集可能非常大。总而言之，这是对您租户或您的用户有权访问的隔间中所有类型云资源的全文搜索。这就是为什么您不应该忘记分页，在
    CLI 命令的情况下，您可以使用`--limit`和`--page`参数来控制分页。您可以在本章后面专门的部分中阅读更多相关信息。'
- fmt: '### Structured Queries


    `Structured queries`，另一方面，使用一种特殊的查询语言，让你对资源类型以及希望在搜索中包含的隔间范围有更大的控制力和掌控权。例如，以下是一个将列出
    `Sandbox` 隔间中所有“运行中”或“终止中”计算实例的查询：


    ```

    query

    instance resources

    where ( lifeCycleState = ''RUNNING'' || lifeCycleState = ''TERMINATING'' ) &&
    compartmentId = ''ocid1.compartment.oc1..aa.........gzwhsa''

    ```


    要在 OCI 控制台中运行它，请打开自由文本搜索页面并单击“高级搜索”按钮，或者您可以在 URL 后附加 `/search` 来直接访问此页面。例如，如果您使用的是法兰克福区域，请访问此
    URL：`https://console.eu-frankfurt-1.oraclecloud.com/search`。您将看到可以输入查询的文本框，如图
    4-24 所示。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig24_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig24_HTML.jpg)


    图 4-24


    OCI 控制台中的结构化查询


    可以使用 CLI 通过 `search resource structured-search` 命令运行相同的查询。然后，查询将作为 `--query-text`
    参数传递。


    ```

    $ oci search resource structured-search --query-text "query instance resources
    where ( lifeCycleState = ''RUNNING'' || lifeCycleState = ''TERMINATING'' ) &&
    compartmentId = ''ocid1.compartment.oc1..aa.........gzwhsa''"

    {

    "data": {

    "items": [

    {

    "availability-domain": "feDV:EU-FRANKFURT-1-AD-2",

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "display-name": "vistula-2",

    "freeform-tags": {},

    "identifier": "ocid1.instance.oc1.eu-frankfurt-1.ab.........ukh6ba",

    "lifecycle-state": "Running",

    "resource-type": "Instance",

    "search-context": null,

    "time-created": "2019-02-23T14:56:16.521000+00:00"

    },

    {

    "availability-domain": "feDV:EU-FRANKFURT-1-AD-1",

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "display-name": "vistula-1",

    "freeform-tags": {},

    "identifier": "ocid1.instance.oc1.eu-frankfurt-1.ab.........fnqroq",

    "lifecycle-state": "Running",

    "resource-type": "Instance",

    "search-context": null,

    "time-created": "2019-02-23T14:40:08.609000+00:00"

    }

    ]

    }

    }

    ```


    注意


    不要担心在您的情况下没有结果。这是因为目前 `Sandbox` 隔间中没有正在运行的实例。在后续章节的练习中处理各种云资源时，请随时测试此功能。


    回到最初的任务，即列出元数据（如显示名称或描述）包含 `sandbox` 术语的用户和组，以下是正确的查询：


    ```

    query user, group resources matching ''sandbox-''

    ```


    如您所见，我们没有应用 `where` 子句，而是采用了 `matching` 子句。这是如何对选定的资源类型子集实现自由文本查询的一个例子。如果您使用过自由文本搜索，您还会看到其他类型的资源。


    类似于自由文本搜索，在结构化查询的情况下，您也可以对结果集应用额外的 JMESPath 驱动的过滤器。只是不要混淆 `--query-text` 参数和 `--query`
    参数。前者使用 Search API 在响应中仅查找并返回匹配的资源。后者，即 `--query` 参数，在您的本地客户端计算机上应用 JMESPath 公式来过滤结果。


    ```

    $ oci search resource structured-search --query-text "query user, group resources
    matching ''sandbox-''" --query ''data.items[*].{Type:"resource-type",Name:"display-name",OCID:"identifier"}''

    [

    {

    "Name": "sandbox-admin",

    "OCID": "ocid1.user.oc1..aa.........7d5dca",

    "Type": "User"

    },

    {

    "Name": "sandbox-user",

    "OCID": "ocid1.user.oc1..aa.........dzqpxa",

    "Type": "User"

    },

    {

    "Name": "sandbox-admins",

    "OCID": "ocid1.group.oc1..aa.........hlotwa",

    "Type": "Group"

    },

    {

    "Name": "sandbox-users",

    "OCID": "ocid1.group.oc1..aa.........rj2sba",

    "Type": "Group"

    }

    ]

    ```


    要了解有关结构化搜索查询语言语法的更多信息，请查阅官方文档。您可以在 `https://docs.cloud.oracle.com/iaas/Content/Search/Concepts/queryoverview.htm`
    找到它。


    使用结构化查询进行的有针对性的搜索，通常与自由文本搜索相比，返回的结果集较小。但是，您仍然可能受益于采用适当的分页。让我们看看如何做到这一点。


    ### Pagination


    如今，结果集可能非常大。您可能发现几十个、几百个、数千个甚至更多与您的查询匹配的项目。有时，只验证最初的几个结果是有意义的；在其他情况下，您需要逐项仔细分析整个结果集。例如，要计算您在给定时间运行中的计算实例的
    CPU 总数，您将需要处理查询的整个结果集。一次性获取所有结果可能代价高昂，并且在某些情况下可能由于内存原因导致应用程序崩溃。这就是为什么您应该始终考虑`分页`。分页意味着您通过执行一系列相关的搜索调用来分页获取结果集。项目是排序的；因此，如果您继续逐页收集结果，您最终将到达结果集的末尾。这样，您就会知道您已经处理完了整个结果集。OCI
    控制台提供了开箱即用的分页功能。使用 CLI 时，您需要定义 `--limit` 和 `--page` 参数，并在每次后续请求中基于 `opc-next-header`
    字段的内容。无论您使用 `search resource structured-search` 命令还是 `search resource free-text-search`
    命令，都不重要。在这两种情况下，机制的工作方式相同。


    让我们通过一个例子看看它是如何工作的。我们将对 `sandbox` 术语运行相同的自由文本查询。这次，我们将应用分页，一次列出最多三个项目。因此，正如您所猜测的，CLI
    命令中的 `--limit` 参数将取 `3` 作为值。如果您仔细查看 JMESPath 过滤器，您将看到我还在 `nextpage` 名称下额外显示了 `opc-next-page`
    元素。


    ```

    $ oci search resource free-text-search --text sandbox --query "{results: data.items[*].{type:
    \"resource-type\", name: \"display-name\"}, nextpage: \"opc-next-page\"}" --limit
    3

    {

    "nextpage": "eyJ.........cOY",

    "results": [

    {

    "name": "sandbox-admin",

    "type": "User"

    },

    {

    "name": "sandbox-user",

    "type": "User"

    },

    {

    "name": "sandbox-admins",

    "type": "Group"

    }

    ]

    }

    $ NEXTPAGE=eyJ.........cOY

    ```


    很好。我们已经收到了结果集中的前三个项目。现在，在下一个查询中，您将在 CLI 命令中添加 `--page` 参数，并使用前一个查询结果的 `nextpage`
    字段中收到的值。


    ```

    $ oci search resource free-text-search --text sandbox --query "{results: data.items[*].{type:
    \"resource-type\", name: \"display-name\"}, nextpage: \"opc-next-page\"}" --limit
    3 --page "$NEXTPAGE"

    {

    "nextpage": null,

    "results": [

    {

    "name": "sandbox-users",

    "type": "Group"

    },

    {

    "name": "Sandbox",

    "type": "Compartment"

    }

    ]

    }

    ```


    太棒了。结果集中的下三个项目已交付。这次，`nextpage` 字段设置为 `null`，这表明我们已经到达了结果集的末尾。'
  raw: '#### Structured Queries


    *Structured queries*, on the other hand, use a special query language that gives
    you more power and control over the types of resources and the compartment scope
    you would like to include in your search. For example, this is a query that will
    list all “running” or “terminating” compute instances in the `Sandbox` compartment:


    ```

    query

    instance resources

    where ( lifeCycleState = ''RUNNING'' || lifeCycleState = ''TERMINATING'' ) &&
    compartmentId = ''ocid1.compartment.oc1..aa.........gzwhsa''

    ```


    To run it in the OCI Console, open a free-text search page and click the Advanced
    Search button, or you can append `/search` to your URL to access this page directly.
    For example, if you are using the Frankfurt region, go to this URL: [`https://console.eu-frankfurt-1.oraclecloud.com/search`](https://console.eu-frankfurt-1.oraclecloud.com/search).
    You will see the text box where you can put your query, as shown in Figure [4-24](#478313_1_En_4_Chapter.xhtml#Fig24).


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig24_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig24_HTML.jpg)


    Figure 4-24


    Structured query in the OCI Console


    The same query can be run with the CLI using the `search resource structured-search`
    command. The query will then be passed as the `--query-text` parameter.


    ```

    $ oci search resource structured-search --query-text "query instance resources
    where ( lifeCycleState = ''RUNNING'' || lifeCycleState = ''TERMINATING'' ) &&
    compartmentId = ''ocid1.compartment.oc1..aa.........gzwhsa''"

    {

    "data": {

    "items": [

    {

    "availability-domain": "feDV:EU-FRANKFURT-1-AD-2",

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "display-name": "vistula-2",

    "freeform-tags": {},

    "identifier": "ocid1.instance.oc1.eu-frankfurt-1.ab.........ukh6ba",

    "lifecycle-state": "Running",

    "resource-type": "Instance",

    "search-context": null,

    "time-created": "2019-02-23T14:56:16.521000+00:00"

    },

    {

    "availability-domain": "feDV:EU-FRANKFURT-1-AD-1",

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "display-name": "vistula-1",

    "freeform-tags": {},

    "identifier": "ocid1.instance.oc1.eu-frankfurt-1.ab.........fnqroq",

    "lifecycle-state": "Running",

    "resource-type": "Instance",

    "search-context": null,

    "time-created": "2019-02-23T14:40:08.609000+00:00"

    }

    ]

    }

    }

    ```


    Note


    Do not worry that there are no results in your case. This is because there are
    no running instances in the `Sandbox` compartment at the moment. Feel free to
    test this feature while working with various cloud resources in the exercises
    from the upcoming chapters.


    Coming back to the initial task, namely, listing users and groups whose metadata
    such as display name or description contain the term *sandbox*, the following
    is the proper query:


    ```

    query user, group resources matching ''sandbox-''

    ```


    As you can see, instead of applying the `where` clause, we are incorporating the
    `matching` clause. This is an example of how you achieve a free-text query over
    a selected subset of resource types. If you’ve used the free-text search, you
    would see other types of resources as well.


    Similarly to the free-text search, you can apply an additional JMESPath-powered
    filter to the result set also in case of the structured queries. Just do not confuse
    the `--query-text` parameter and the `--query` parameter. The first uses the Search
    API to find and return in a response only matching resources. The latter, namely,
    the `--query` parameter, applies the JMESPath formula to filter the results locally
    on your client machine.


    ```

    $ oci search resource structured-search --query-text "query user, group resources
    matching ''sandbox-''" --query ''data.items[*].{Type:"resource-type",Name:"display-name",OCID:"identifier"}''

    [

    {

    "Name": "sandbox-admin",

    "OCID": "ocid1.user.oc1..aa.........7d5dca",

    "Type": "User"

    },

    {

    "Name": "sandbox-user",

    "OCID": "ocid1.user.oc1..aa.........dzqpxa",

    "Type": "User"

    },

    {

    "Name": "sandbox-admins",

    "OCID": "ocid1.group.oc1..aa.........hlotwa",

    "Type": "Group"

    },

    {

    "Name": "sandbox-users",

    "OCID": "ocid1.group.oc1..aa.........rj2sba",

    "Type": "Group"

    }

    ]

    ```


    To read more about the syntax of the query language for structured searches, please
    consult the official documentation. You will find it at [`https://docs.cloud.oracle.com/iaas/Content/Search/Concepts/queryoverview.htm`](https://docs.cloud.oracle.com/iaas/Content/Search/Concepts/queryoverview.htm).


    Targeted searches done with the use of structured queries usually bring smaller
    result sets when compared to the free-text search. However, you may still benefit
    from employing proper pagination. Let’s see how to do it.


    #### Pagination


    Result sets can be really large nowadays. You can find dozens, hundreds, thousands,
    or even more items that match your query. Sometimes, it makes sense to verify
    just a few initial results; in other cases, you need to carefully analyze the
    entire result set item by item. For example, to calculate the total number of
    CPUs of your running compute instances at a given time, you would need to process
    the entire result set of your query. Fetching all the results at once may seem
    costly and, in some cases, can crash the application because of memory reasons.
    This is why you should always think about *pagination*. Pagination assumes you
    fetch the result set in pages by making a sequence of related search calls. The
    items are sorted; therefore, if you continue collecting results page by page,
    you will eventually reach the end of the result set. In this way, you will know
    you’ve managed to process the entire result set. The OCI Console provides pagination
    out of the box. When using the CLI, you will need to define the `--limit` and
    `--page` parameters and base the contents of the `opc-next-header` field on each
    consequent request. It does not matter if you are using the `search resource structured-search`
    command or the `search resource free-text-search` command. In both cases, the
    mechanism works in the same way.


    Let’s see how it works with an example. We are going to run the same free-text
    query for the *sandbox* term. This time, we will apply pagination and list up
    to three items at once. Hence, as you can guess, the `--limit` parameter in the
    CLI command will take `3` as the value. If you look closer at the JMESPath filter,
    you will see I am additionally displaying the `opc-next-page` element under the
    `nextpage` name.


    ```

    $ oci search resource free-text-search --text sandbox --query "{results: data.items[*].{type:
    \"resource-type\", name: \"display-name\"}, nextpage: \"opc-next-page\"}" --limit
    3

    {

    "nextpage": "eyJ.........cOY",

    "results": [

    {

    "name": "sandbox-admin",

    "type": "User"

    },

    {

    "name": "sandbox-user",

    "type": "User"

    },

    {

    "name": "sandbox-admins",

    "type": "Group"

    }

    ]

    }

    $ NEXTPAGE=eyJ.........cOY

    ```


    Perfect. We’ve received the first three items from the result set. Now, in the
    next query, you will add the `--page` parameter to the CLI command and use the
    value received in the `nextpage` field of the previous query result.


    ```

    $ oci search resource free-text-search --text sandbox --query "{results: data.items[*].{type:
    \"resource-type\", name: \"display-name\"}, nextpage: \"opc-next-page\"}" --limit
    3 --page "$NEXTPAGE"

    {

    "nextpage": null,

    "results": [

    {

    "name": "sandbox-users",

    "type": "Group"

    },

    {

    "name": "Sandbox",

    "type": "Compartment"

    }

    ]

    }

    ```


    Excellent. The next three items from the result set are delivered. This time,
    the `nextpage` field is set to `null`, which indicates that we’ve reached the
    end of the result set.'
  trans: '

    ### 结构化查询


    `Structured queries`（结构化查询）则使用一种特殊的查询语言，让你能对资源类型及希望在搜索中包含的隔间范围拥有更大的控制力和掌控权。例如，以下是一个将列出
    `Sandbox` 隔间中所有“运行中”或“终止中”计算实例的查询：


    ```

    query

    instance resources

    where ( lifeCycleState = ''RUNNING'' || lifeCycleState = ''TERMINATING'' ) &&
    compartmentId = ''ocid1.compartment.oc1..aa.........gzwhsa''

    ```


    要在 OCI 控制台中运行它，请打开自由文本搜索页面并单击“高级搜索”按钮，或者您可以在 URL 后附加 `/search` 来直接访问此页面。例如，如果您使用的是法兰克福区域，请访问此
    URL：`https://console.eu-frankfurt-1.oraclecloud.com/search`。您将看到可以输入查询的文本框，如图
    4-24 所示。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig24_HTML.jpg](img/478313_1_En_4_Fig24_HTML.jpg)


    图 4-24


    OCI 控制台中的结构化查询


    可以使用 CLI 通过 `search resource structured-search` 命令运行相同的查询。然后，查询将作为 `--query-text`
    参数传递。


    ```

    $ oci search resource structured-search --query-text "query instance resources
    where ( lifeCycleState = ''RUNNING'' || lifeCycleState = ''TERMINATING'' ) &&
    compartmentId = ''ocid1.compartment.oc1..aa.........gzwhsa''"

    {

    "data": {

    "items": [

    {

    "availability-domain": "feDV:EU-FRANKFURT-1-AD-2",

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "display-name": "vistula-2",

    "freeform-tags": {},

    "identifier": "ocid1.instance.oc1.eu-frankfurt-1.ab.........ukh6ba",

    "lifecycle-state": "Running",

    "resource-type": "Instance",

    "search-context": null,

    "time-created": "2019-02-23T14:56:16.521000+00:00"

    },

    {

    "availability-domain": "feDV:EU-FRANKFURT-1-AD-1",

    "compartment-id": "ocid1.compartment.oc1..aa.........gzwhsa",

    "defined-tags": {},

    "display-name": "vistula-1",

    "freeform-tags": {},

    "identifier": "ocid1.instance.oc1.eu-frankfurt-1.ab.........fnqroq",

    "lifecycle-state": "Running",

    "resource-type": "Instance",

    "search-context": null,

    "time-created": "2019-02-23T14:40:08.609000+00:00"

    }

    ]

    }

    }

    ```


    注意


    不要担心在您的情况下没有结果。这是因为目前 `Sandbox` 隔间中没有正在运行的实例。在后续章节的练习中处理各种云资源时，请随时测试此功能。


    回到最初的任务，即列出元数据（如显示名称或描述）包含 `sandbox` 术语的用户和组，以下是正确的查询：


    ```

    query user, group resources matching ''sandbox-''

    ```


    如您所见，我们没有应用 `where` 子句，而是采用了 `matching` 子句。这是如何对选定的资源类型子集实现自由文本查询的一个例子。如果您使用过自由文本搜索，您还会看到其他类型的资源。


    类似于自由文本搜索，在结构化查询的情况下，您也可以对结果集应用额外的 JMESPath 驱动的过滤器。只是不要混淆 `--query-text` 参数和 `--query`
    参数。前者使用 Search API 在响应中仅查找并返回匹配的资源。后者，即 `--query` 参数，在您的本地客户端计算机上应用 JMESPath 公式来过滤结果。


    ```

    $ oci search resource structured-search --query-text "query user, group resources
    matching ''sandbox-''" --query ''data.items[*].{Type:"resource-type",Name:"display-name",OCID:"identifier"}''

    [

    {

    "Name": "sandbox-admin",

    "OCID": "ocid1.user.oc1..aa.........7d5dca",

    "Type": "User"

    },

    {

    "Name": "sandbox-user",

    "OCID": "ocid1.user.oc1..aa.........dzqpxa",

    "Type": "User"

    },

    {

    "Name": "sandbox-admins",

    "OCID": "ocid1.group.oc1..aa.........hlotwa",

    "Type": "Group"

    },

    {

    "Name": "sandbox-users",

    "OCID": "ocid1.group.oc1..aa.........rj2sba",

    "Type": "Group"

    }

    ]

    ```


    要了解有关结构化搜索查询语言语法的更多信息，请查阅官方文档。您可以在 `https://docs.cloud.oracle.com/iaas/Content/Search/Concepts/queryoverview.htm`
    找到它。


    使用结构化查询进行的有针对性的搜索，通常与自由文本搜索相比，返回的结果集较小。但是，您仍然可能受益于采用适当的分页。让我们看看如何做到这一点。


    ### 分页


    如今，结果集可能非常大。您可能发现几十个、几百个、数千个甚至更多与您的查询匹配的项目。有时，只验证最初的几个结果是有意义的；在其他情况下，您需要逐项仔细分析整个结果集。例如，要计算您在给定时间运行中的计算实例的
    CPU 总数，您将需要处理查询的整个结果集。一次性获取所有结果可能代价高昂，并且在某些情况下可能由于内存原因导致应用程序崩溃。这就是为什么您应该始终考虑`分页`。分页意味着您通过执行一系列相关的搜索调用来分页获取结果集。项目是排序的；因此，如果您继续逐页收集结果，您最终将到达结果集的末尾。这样，您就会知道您已经处理完了整个结果集。OCI
    控制台提供了开箱即用的分页功能。使用 CLI 时，您需要定义 `--limit` 和 `--page` 参数，并在每次后续请求中基于 `opc-next-header`
    字段的内容。无论您使用 `search resource structured-search` 命令还是 `search resource free-text-search`
    命令，都不重要。在这两种情况下，机制的工作方式相同。


    让我们通过一个例子看看它是如何工作的。我们将对 `sandbox` 术语运行相同的自由文本查询。这次，我们将应用分页，一次列出最多三个项目。因此，正如您所猜测的，CLI
    命令中的 `--limit` 参数将取 `3` 作为值。如果您仔细查看 JMESPath 过滤器，您将看到我还在 `nextpage` 名称下额外显示了 `opc-next-page`
    元素。


    ```

    $ oci search resource free-text-search --text sandbox --query "{results: data.items[*].{type:
    \"resource-type\", name: \"display-name\"}, nextpage: \"opc-next-page\"}" --limit
    3

    {

    "nextpage": "eyJ.........cOY",

    "results": [

    {

    "name": "sandbox-admin",

    "type": "User"

    },

    {

    "name": "sandbox-user",

    "type": "User"

    },

    {

    "name": "sandbox-admins",

    "type": "Group"

    }

    ]

    }

    $ NEXTPAGE=eyJ.........cOY

    ```


    很好。我们已经收到了结果集中的前三个项目。现在，在下一个查询中，您将在 CLI 命令中添加 `--page` 参数，并使用前一个查询结果的 `nextpage`
    字段中收到的值。


    ```

    $ oci search resource free-text-search --text sandbox --query "{results: data.items[*].{type:
    \"resource-type\", name: \"display-name\"}, nextpage: \"opc-next-page\"}" --limit
    3 --page "$NEXTPAGE"

    {

    "nextpage": null,

    "results": [

    {

    "name": "sandbox-users",

    "type": "Group"

    },

    {

    "name": "Sandbox",

    "type": "Compartment"

    }

    ]

    }

    ```


    太棒了。结果集中的下三个项目已交付。这次，`nextpage` 字段设置为 `null`，这表明我们已经到达了结果集的末尾。

