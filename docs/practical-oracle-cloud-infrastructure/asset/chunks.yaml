    您通常会使用自由文本查询来根据资源的元数据文本模式匹配获得资源的概览。如果您已经心中有特定的资源类型或条件，结构化查询会更加方便。


    ### Free-Text Search


    `Free-text queries`不过是在 Oracle Cloud Infrastructure 索引的所有云资源元数据上执行的全文搜索。如果在任何索引的元数据字段中找到了给定的搜索词，只要该类型的资源及其隔间范围对执行自由文本搜索的用户可见，该云资源就会包含在结果中。要在
    OCI 控制台中运行自由文本查询，请将搜索词（例如*sandbox*）放在顶部栏的搜索框中，如图 4-22 所示。结果将按类型分组并一起显示，搜索词会高亮显示，如图
    4-23 所示。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig23_HTML.jpg](img/478313_1_En_4_Fig23_HTML.jpg)


    图 4-23


    OCI 控制台中的自由文本搜索结果


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig22_HTML.jpg](img/478313_1_En_4_Fig22_HTML.jpg)


    图 4-22


    OCI 控制台中的自由文本搜索


    可以使用 CLI 运行相同的查询。为此，我们将利用`search resource free-text-search`命令，并使用`--text`参数指定我们感兴趣查找的术语。请注意，我们仍然可以使用
    JMESPath（`--query`参数）在本地过滤并仅显示我们真正感兴趣的字段。


