  trans: '## 身份与访问管理


    `身份与访问管理`指的是一套工具和原则，让你能够定义并管理谁可以访问和管理你的云租户，主要通过配置、变更和终止云资源来实现。发出云管理平面 API 调用或使用管理控制台，只能由一个成功认证的`用户`完成。通常，云提供商实现两种类型的云用户。


    *   本地定义的用户


    *   从外部身份提供者检索的用户


    较小的组织和初创公司可能会使用本地定义的用户，而那些已经在某种身份提供者中维护其用户层级的大型组织，则更愿意将其租户与此提供者进行联合。什么是`身份提供者`？它是一个存储和管理人类用户、系统用户以及用户组生命周期的系统。此外，`身份提供者`通常提供可被其他系统及其`身份与访问管理`服务使用的认证服务。将你的云租户与外部身份提供者联合，意味着你将重用`身份提供者`中已有的身份数据。简而言之，在`身份提供者`中定义的用户将被你的云租户`身份与访问管理`所识别。用户本身实际上能做的事情非常有限，除非他们被分配到适当的`用户组`。授权是验证特定用户允许对某些云资源执行何种操作的功能，它通过`策略`来强制执行。一个`策略`决定哪个`用户组`被允许对一组云资源执行哪种类型的操作，这些资源可以位于整个租户中，也可以位于单个`
    compartment `中。`Compartment`是 Oracle Cloud Infrastructure 特有的概念，让你能够隔离云租户中存在的不同云资源。这样，单个云账户就可以用来托管多个完全独立且互不关联的项目。`OCI`允许你创建`compartment`的层级结构。第
    4 章将更详细地介绍`compartment`。


    当你设计一个新的基于云的解决方案，或者在将现有系统迁移到云端之前对其进行重新架构时，你可能会决定，托管在选定计算实例上的某些应用程序必须能够发出`API`调用，以对其他云资源执行特定任务。这可以通过为`动态组`创建`策略`来实现，这些动态组根据匹配规则动态地汇集了`实例主体`。`实例主体`本质上是计算实例的身份。


    在本节中，我们讨论了云计算的四大核心能力以及它们通常包含的云资源。如果你还记得本章开头我引用的第一个云计算定义，你可能会好奇那四种部署模型是什么。我们将在下一节中探讨它们。


    ## 部署模型


    我已经说过，有些人错误地认为云计算和`公共云`是一样的。然而，正是`公共云`，公众、媒体和`IT`专业人士在讨论云计算时最常提及。这个术语到底是什么意思呢？让我们来看看三种主要的部署模型。


    *   私有云


    *   公共云


    *   混合云


    第一种非常直接。如果你和你的管理员同事们重新组织并完全自动化了你们服务于虚拟化硬件资源的方式——这些资源维护在共享池中，并作为自助服务提供给组织内的不同项目团队——那么你就构建了一个`私有云`，并且可能也改变了你组织的`IT`文化。恭喜你。不过，这是一项繁琐且昂贵的任务，因为你需要重新架构你的硬件和虚拟化层，购买或构建自己的云控制平面，并雇佣更多管理员来监控已成为你`私有云`的所有这些资源和服务。另一个主要缺点是，你的组织仍然拥有所有这些设备，这导致资本支出增加。嗯，并非所有人都乐意接受与硬件设备生命周期相关的这些重大支出，尤其是在非技术行业。投资并维护一个`私有云`对于一个规模庞大、成熟且以技术为核心的公共部门组织或企业来说可能是令人满意的。绝大多数组织更愿意避免拥有太多（如果有的话）硬件。相反，如果可能的话，他们选择将所有与任何类型数据中心维护相关的成本外包出去。


    `公共云`以与组织内部业务网络中的`私有云`大致相同的方式，将各种计算能力作为服务提供。区别在于受众，或者更准确地说，在于`公共云`所提供的服务的消费者是谁。一个典型的`公共云`提供商在全球一个或多个地理位置维护（自有或托管）数据中心，拥有硬件，并负责整体维护、运营、安全和服务的可用性。服务消费者可能是个人、公司、非营利组织、初创公司，甚至政府机构，他们使用安全的`API`来自助快速配置、扩展和管理云资源，这些资源最终使用的是该`公共云`提供商在一个或多个数据中心拥有的硬件。


    为`混合云`提供一个精确的定义不会像前两种部署模型那样容易。为简单起见，对`混合云`最主流的理解是，使用一个或多个与本地运行的`私有云`紧密集成和互连的`公共云`提供商。我不会在本书中详细阐述`混合云`架构，因为这个主题本身在业界的看法上仍有其不确定性，并且比乍看起来要复杂得多。


    大规模消费`公共云`引发了一个重要问题，即仅依赖单一`公共云`提供商所带来的昂贵供应商锁定风险。如果我们所有的解决方案都专门设计和基于单一的`公共云`，我们就容易受到服务费用潜在上涨的影响，且没有应急计划。在供应商锁定的背景下，还需考虑其他风险，例如理论上可能发生的突然、短时间通知的服务弃用，这可能迫使进行一次快速且昂贵的迁移项目。这些担忧催生了应用于`公共云`消费的`多云`模式理念。这种模式假定我们订阅了由多个`公共云`提供商提供的基础设施和平台服务。此外，我们以一种可以在任何我们的云租户中运行的方式来设计应用程序和工作负载。像`Kubernetes`这样的现代容器平台帮助我们使这种方法成为现实。我们将在第
    8 章讨论 Oracle Kubernetes Engine。


    本章开头概述的云计算特性以及前面简要讨论的核心能力适用于每一种云，无论其部署模型和服务模型是什么。让我们来看看可用的三种服务模型。'
- fmt: '## Service Models


    责任在云提供者和云服务消费者之间划分。换句话说，云账户所有者的责任取决于服务类型。在此背景下，我们使用三种广为人知的云计算*服务模型*对云服务进行分类。


    *   基础设施即服务（`IaaS`）

    *   平台即服务（`PaaS`）

    *   软件即服务（`SaaS`）


    四大核心云计算能力（计算、存储、网络和`IAM`）被认为是称为*基础设施即服务*的最基本服务模型的一部分。该模型使你能够对云解决方案所托管的虚拟机等单个（通常是底层）元素拥有最大的控制权。使用从架构角度易于概念映射到我们习惯使用的硬件基础设施的云资源，使得你能够以类似于处理物理硬件的方式来规划云基础设施。你无需担心电源供应、冷却或本地数据中心实施的物理安全等问题。然而，你仍需负责网络配置（虚拟防火墙安全规则、路由、`VPN`设置等）、操作系统管理（尤其是更新）以及存储能力的某些方面（逻辑上附加新的块卷、创建文件系统、挂载共享文件系统等）。更大的灵活性伴随着更多的责任。


    如果你想专注于设计和实现云软件，并跳过所有与运行时管理相关的方面，你可能会选择受管数据库或受管容器引擎等云资源。这类云资源属于称为*平台即服务*的服务模型，因为它为你提供了一个受管平台，所有平台管理任务（例如打补丁或管理底层硬件资源）均由云提供者完成。你的任务是部署已构建的解决方案并扩展平台实例以满足性能期望。你可能会遇到多种类型的`PaaS`服务，例如：


    *   应用运行时引擎

    *   容器编排引擎

    *   数据和应用集成平台

    *   `API`管理平台

    *   关系型和`NoSQL`数据库

    *   消息传递解决方案

    *   大数据分析及商业智能平台


    各种`IaaS`和`PaaS`云资源在很多情况下是互补的。你可以想象使用托管应用程序的虚拟机（这些应用程序不仅使用对象存储，还使用受管数据库和某种消息云服务）来构建云解决方案。


    第三种服务模型，*软件即服务*，核心在于使用软件。在这种模式下，几乎没有构建东西的责任。`SaaS`应用程序旨在支持你的业务流程、存储流程相关数据（如客户主数据），并让你自动化业务上下文所需的各种数据导入和导出。多个租户（云消费者）通常使用相同的应用程序集群和物理数据存储，但他们的数据和访问彼此隔离。作为`SaaS`消费者，你无需安装任何东西。你通常从设置租户开始，创建或联合用户，分配适当的访问权限，执行一些启动配置，并上传初始数据集（如你的主数据以及你希望在新系统中看到的历史交易）。事实上，`SaaS`应用程序类型的列表似乎无穷无尽。以下是一些例子：


    *   面向公众的电子邮件服务或办公套件

    *   不同公司使用的客户关系管理

    *   与云企业资源规划服务套件集成的大型企业绩效管理


    随着公司将更多业务流程迁移到云端，你最终可能会拥有来自不同云提供者的多样化云应用程序。因此，你将需要集成这些应用程序以实现它们之间的顺畅数据交换。否则，你的流程将无法运行。这就是为什么包含`SaaS`应用程序的云架构通常也包含一个或多个`PaaS`平台。


    在本节开头，我指出了不同类型的云服务涉及云消费者和云提供者之间划分的不同责任。接下来，我简要解释了三种服务模型如何变化。图 [1-9](#478313_1_En_1_Chapter.xhtml#Fig9)
    以单一表格概览的形式展示了这些差异。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig9_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig9_HTML.jpg)


    **图 1-9**

    服务模型与消费模式


    下一节，我们将讨论与成本相关的事项。'
  raw: '## Service Models


    The responsibility is split between a cloud provider and a cloud service consumer.
    In other words, a cloud account owner’s responsibilities depend on the type of
    service. In this context, we classify the cloud services using three commonly
    known cloud computing *service models*.


    *   Infrastructure as a service (IaaS)


    *   Platform as a service (PaaS)


    *   Software as a service (SaaS)


    The four core cloud computing capabilities (compute, storage, networking, and
    IAM) are considered part of the most fundamental service model called *infrastructure
    as a service* . This service model gives you the greatest control over the individual,
    often low-level, elements such as virtual machines that host your cloud solution.
    Using cloud resources that, from an architecture point of view, can be easily
    conceptually mapped to the hardware infrastructure we are used to working with
    allows you to plan the cloud infrastructure in a similar way to what you would
    do if you were working with physical hardware. You just do not need to worry about
    things like power supply, cooling, or physical security enforced in on-premise
    data centers. Yet, you continue to be responsible for the networking configuration
    (virtual firewall security rules, routing, VPN setup, etc.), operating systems
    management (especially updates), and some aspects of the storage capability (logically
    attaching new block volumes, creating file systems, mounting shared filesystems,
    etc.). Greater flexibility comes at the cost of more responsibility.


    If you would like to focus on designing and implementing cloud software and skip
    all the facets related to the runtime management, you will probably choose cloud
    resources such as a managed database or a managed container engine. That kind
    of cloud resource belongs to the service model called *platform as a service*
    because it provides you with a managed platform where all platform management
    tasks such as patching or managing the underlying hardware resources are done
    by the cloud provider. Your task is to deploy the solutions you’ve built and scale
    your platform instance to meet your expectations related to performance. You may
    encounter many types of PaaS services such as the following:


    *   Application runtime engines


    *   Container orchestration engines


    *   Data and application integration platforms


    *   API management platforms


    *   Relational and NoSQL databases


    *   Messaging solutions


    *   Big data analytics and business intelligence platforms


    Various IaaS and PaaS cloud resources are, on numerous occasions, complementary
    to each other. You can imagine building your cloud solutions using a combination
    of virtual machines that host applications that use not only the object storage
    but a managed database and some kind of messaging cloud service as well.


    The third service model, *software as a service*, is all about using the software
    . In this model, there is little, if nearly any, responsibility to build things.
    SaaS applications are meant to support your business processes, store process-related
    data such as customer master data, and let you automate all kinds of data imports
    and exports the business context requires. Multiple tenants (cloud consumers)
    usually work with the same cloud application cluster and physical data store,
    but their data and access are isolated from other cloud accounts. As a SaaS consumer,
    you do not need to install anything. You usually begin by setting up a tenancy,
    creating or federating users, assigning proper access rights, performing some
    startup configuration, and uploading the initial data sets such as your master
    data along with the historical transactions you would like to see in the new system.
    As a matter of fact, the list of SaaS application types may seem endless. Here
    are a few examples:


    *   E-mail service or an office suite available to the general public


    *   Customer relationship management used by different companies


    *   Large-scale enterprise performance management integrated with a cloud suite
    of enterprise resource planning services


    As your company moves more business processes to the cloud, you will probably
    end up with a diverse set of cloud applications from different cloud providers.
    As a consequence, you will have to integrate these applications to make smooth
    data exchange between them possible. Otherwise, your processes won’t work. This
    is the reason why, quite often, cloud architectures that include SaaS applications
    also encompass one or more PaaS platforms.


    At the beginning of this section, I pointed out that different types of cloud
    services entail differing responsibilities split between cloud consumer and cloud
    provider. Next, I briefly explained how the three service models vary. Figure
    [1-9](#478313_1_En_1_Chapter.xhtml#Fig9) presents these differences in the form
    of a single, tabular overview.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig9_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Service models and consumption patterns


    In the next section, we will talk about cost-related matters.'
