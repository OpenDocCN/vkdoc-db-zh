    \ to understand what the IAM policies assigned to your IAM group mean.\n\nThis\
    \ is how you upload a public key using the OCI Console:\n\n1.  Go to Menu ➤ Identity\
    \ ➤ Users.\n\n2.  Click the name of your tenancy administrator user.\n\n3.  Click\
