    that time, you will see an orange bar informing you about that, as shown in Figure
    [1-17](#478313_1_En_1_Chapter.xhtml#Fig17).


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig17_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig17_HTML.jpg)


