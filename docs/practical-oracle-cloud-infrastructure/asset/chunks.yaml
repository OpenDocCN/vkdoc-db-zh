  trans: '

    ## 不可变基础设施


    高度的 API 驱动自动化以及池化基础设施资源的快速自我供应能力，使得云计算成为 `不可变基础设施` 模式的关键推动者。`不可变`一词与`不可更改`、`永久`或`固定`等词同义。一个不会改变的基础设施必须在相对较短的时间内创建完毕，并能立即服务于其业务目的。后者意味着不可变基础设施与一个已预装并完成初始化的应用层捆绑在一起，该应用层已准备好提供服务和处理数据。迟早，某些组件将需要升级。这正是`不可变`一词发挥作用之处。与传统的服务器和应用程序生命周期不同，不可变基础设施模式假设基于升级后的镜像和增强的初始化代码来供应一组新的云资源，并将任何传入流量妥善重定向，同时简单地终止旧的基础设施。


    不可变基础设施可以融合`自主智能`，例如横向计算自动伸缩。自动伸缩将根据本章前面描述的指标动态调整实例数量。这里的关键理念是无需人工干预，正因如此，该基础设施可被视为不可变的。


    鉴于应用格局的复杂性、数据流依赖关系以及各种业务连续性要求，认为所有系统的整个云基础设施都可以被视为一组单一的不可变资源，这相当不切实际。实际上，你控制着多组云资源，它们作为不可变基础设施被独立管理。此外，你通常会决定某些云资源，尤其是托管的平台服务，不会使用此模式进行供应。总而言之，你应该仔细选择云资源组的适当划分，既包含遵循不可变基础设施模式的组，也包含依赖于传统的、动态的、长生命周期的基础设施模式的组。


    我之前提到过，不可变基础设施意味着托管的应用和系统在完全自动化的供应运行完成后即可投入运行。在本书包含的练习过程中，我们广泛使用了`Terraform`配合`cloud-config`文件，这些文件在实例启动时由`cloud-init`处理和执行。我是`cloud-init`的忠实拥趸，但我承认，随着应用初始化逻辑变得越来越复杂，使用`cloud-init`就变得越发低效。当你在初始化复杂的集群系统时，`cloud-init`的局限性尤为明显，这些系统中不同节点承担着不同的角色，例如`主节点`或`工作节点`，并且需要特定的初始化顺序。


    一种选择是使用`Terraform 供应器`，基于预定义的依赖树以特定顺序在远程云主机上执行脚本。有人认为`Terraform 供应器`使得`Terraform`基础设施代码不再简单易读。嗯，`Terraform`基础设施代码本意是声明式的。使用标准的`Terraform`配置，如`资源`、`数据源`或`模块`，确实是纯声明式的，这带来诸多好处。首先，你永远无需担心将实际状态转变为目状态所需的执行步骤。这个任务由`Terraform`完成。如果你通过使用`供应器`来扩展这种清晰的声明式方法，你就是在添加命令式特性，实际上是在同一代码库中混合了两种范式（声明式和命令式）。这样一来，基础设施代码会变得难以理解和维护。


    对于真正复杂的架构，我推荐的另一个选项是：通过将声明式的基于`Terraform`的基础设施代码与使用`Ansible`编排的命令式初始化逻辑适当结合，来实现不可变基础设施。`Ansible`是一种无代理的自动化工具，用于远程管理计算实例。其能力不仅包括系统管理，还包括应用程序部署。`Terraform`和`Ansible`都可以在同一构建服务器上执行，并封装为完整`持续集成与持续部署`流水线内的可重复作业。供应流水线可以由四个阶段组成，如图
    6-44 所示，可理解如下：


    ![使用 Terraform 和 Ansible 的不可变架构](img/478313_1_En_6_Fig44_HTML.jpg)


    图 6-44


    使用 Terraform 和 Ansible 的不可变架构


    1.  云基础设施根据使用`Terraform`配置文件定义的声明式目标基础设施来创建。

    2.  预装的应用程序和库可以已经包含在用于启动实例的自定义镜像中一同交付。

    3.  一些初始的操作系统和应用程序初始化逻辑由`cloud-init`根据提供的`cloud-config`用户数据执行。

    4.  更加分散且相互依赖的初始化任务最终通过一组基于`Ansible`的`剧本`来执行。


    ## 本章小结


    本章的主要目标是让你熟悉在设计基于云的解决方案或将现有系统迁移到云端时会遇到的一些核心云基础设施模式。我们从讨论虚拟网络开始，研究了`虚拟云网络`、区域和`可用域`特定的子网、`虚拟网卡`和私有`IP`。随后，在面向互联网的实例背景下，介绍了两种类型的公共`IP`：`临时`和`保留`。接着，我们简要了解了`堡垒主机`和`NAT
    网关`模式，这些模式用于为连接到私有子网的隔离实例提供安全的互联网连接。你使用了`Terraform`来供应相应的基础设施，并见证了该模式的实际运作。我们简要探讨了路由，并花费更多时间澄清了`有状态`和`无状态`安全规则之间的区别。你学习了如何使用本地`虚拟云网络对等连接`来互连同一区域内的不同`虚拟云网络`。专用网络隔离区模式被作为`虚拟云网络对等连接`的替代方案给出，尤其是在更复杂的架构背景下。本章很大部分内容致力于通过横向和纵向实例扩展所提供的弹性。你使用了`实例池`、`实例配置`和`自动伸缩配置`来试验横向扩展。你学习了如何通过迁移到更强大的计算形态来纵向扩展实例，同时重用在启动原始实例时创建的现有启动卷。最后，你阅读了关于不可变基础设施的内容，并被简要介绍了可用于实现供应流水线的工具。


    ## 7. 自治数据库


    存储数据可能充满挑战。需要考虑的方面很多。在本章中，我们将探索 Oracle 云的旗舰产品之一：作为平台即服务在 Oracle 云中提供的完全托管的 Oracle
    数据库。

    '
- fmt: '# Relational Data Model


    The way you structure and organize data is typically called a data model. A data
    model alone generally implies various relationships and integrity requirements
    between individual data entities. A data entity can represent an individual business
    object such as a product, a customer, or a sales item. Data entities are also
    used to embody technical data such as some kind of collected measurement probes.
    Each data entity must be eventually reflected in the form of physical data entry
    in a particular type of a database. The type of a database entails, to some extent,
    the primary physical data entry format. The following are a few popular database
    types:


    - Relational model based on two-dimensional tables

    - Document-oriented model based on `JSON` or `XML` documents

    - Graphs

    - Key-value stores

    - Wide column stores


    ## Two-Dimensional Tables


    Two-dimensional tables are considered as the most popular and, historically, most
    prevalent way of organizing business-related data. Furthermore, business professionals
    are typically used to data representation in a tabular form because of their everyday
    work with spreadsheets. Looking at two-dimensional tables, rows correspond to
    individual data objects, and columns represent the attributes these objects have,
    as illustrated in Figure 7-1.


    ![Figure 7-1: Two-dimensional table](images/478313_1_En_7_Chapter/478313_1_En_7_Fig1_HTML.jpg)


    Business data entities such as products, customers, or sales items rarely exist
    in isolation but nearly always happen to be somehow related to other entities.
    For example, sales items can refer to products they ship and customers who made
    the purchase. To express these relationships between two-dimensional tables, you
    leverage the relational data model that, by its design, truly helps database engines
    in:


    - Protecting data integrity

    - Resolving and optimizing queries


    ## Data Integrity


    What does it mean to protect data integrity? A particular sales item entity could
    be created, provided that the product entity it is referring to already exists.
    A relational database is able to enforce such a requirement and prohibit the creation
    of sales item table entries when the given product entries do not exist in the
    product table. This is called referential integrity. Relational databases really
    shine in this field.


    Even though relational databases technically can store duplicate rows, it is not
    desired in some workload types, especially operational ones. In their case, a
    single product usually should be represented by a single, easily identifiable
    data entry. To uniquely identify a selected product in a table, the data entry
    must have one or more columns whose values altogether uniquely identify the data
    entity. To prohibit the database from inserting duplicates, you create a unique
    key data integrity constraint over these columns. Any attempt to insert a new
    data row with an already existing set of values in unique-key columns will be
    rejected.


    Data integrity is protected based on the types of each individual column. Relational
    databases are traditionally based on tables with fixed-type columns. Each column
    is defined with a column data type that can be one of many supported character,
    numeric, date, and time datatypes. For example, the product name column could
    be of a Unicode-based variable-length character type with a maximum length expressed
    by the number of characters, while the sales item quantity column is defined using
    a nonnegative integer numeric type. Inserted values that do not comply with the
    column data type are rejected.


    Integrity checks can additionally enforce that a given column allows only the
    words that match a given regular expression or numeric values that belong to a
    particular range. This can be implemented using check constraints. In the real
    world, developers sometimes decide to build this kind of check for selected columns
    in the application layer instead. It all depends on the purpose and context a
    particular data model is created for. At this stage, it must be said that not
    every workload needs a data model with built-in integrity checks. As a matter
    of fact, there are use cases where data model flexibility is more valued than
    integrity enforcement. Yet, business-related data is typically in favor of having
    them.


    ## Data Retrieval and SQL


    Storing data is just one end of the stick. To use the persisted data, you have
    to be able to regularly and efficiently retrieve it from a database. To fetch
    the desired subset of data entries, you query the database engine. For a relational
    database, you usually precisely define what is to be returned using standardized
    Structured Query Language (`SQL`), sometimes extended with database-specific features.
    An `SQL` query is sent from a client to the database engine, which translates
    it into a query execution plan. Based on this plan, data is retrieved by the database
    engine and sent back to the client.


    Listing 7-1 presents a basic `SQL` query that selects product names and barcodes
    of all products whose barcode starts with 590 and category code is equal to REG.


    ```sql

    SELECT name, barcode

    FROM products

    WHERE barcode LIKE ''590%'' AND category_code = ''REG'';

    ```

    **Listing 7-1** `SQL` SELECT Statement'
