- fmt: '## Cleanup


    完成练习后，你可以终止本章中创建的云资源。首先，让我们删除存储桶及其内容。


    ```

    $ oci os object bulk-delete -bn reports

    There are 6 object in the bucket. Are you sure you want to delete them? [y/N]:
    y

    $ oci os bucket delete -bn reports

    Are you sure you want to delete this resource? [y/N]: y

    ```


    要从 Oracle Functions 删除函数，你可以使用 OCI CLI、OCI 控制台或 Fn 客户端。以下是使用 CLI 命令的方法：


    ```

    $ FN_APP_OCID=`oci fn application list --query "data[?\"display-name\" == ''reportingapp'']
    | [0].id" --raw-output`

    $ FN_FUN_OCID=`oci fn function list --application-id $FN_APP_OCID --query "data[?\"display-name\"
    == ''reportingfn''] | [0].id" --raw-output`

    $ oci fn function delete --function-id $FN_FUN_OCID

    Are you sure you want to delete this resource? [y/N]: y

    $ oci fn application delete --application-id $FN_APP_OCID

    Are you sure you want to delete this resource? [y/N]: y

    $ FN_APP_OCID=`oci fn application list --query "data[?\"display-name\" == ''uuidcloudapp'']
    | [0].id" --raw-output`

    $ FN_FUN_OCID=`oci fn function list --application-id $FN_APP_OCID --query "data[?\"display-name\"
    == ''uuidfn''] | [0].id" --raw-output`

    $ oci fn function delete --function-id $FN_FUN_OCID

    Are you sure you want to delete this resource? [y/N]: y

    $ oci fn application delete --application-id $FN_APP_OCID

    Are you sure you want to delete this resource? [y/N]: y

    ```


    要删除 Oracle Events 规则，可以像这样使用 `oci events rule delete` CLI 命令：


    ```

    $ EVENTRULE_OCID=`oci events rule list --query "data[?\"display-name\" == ''new-reports'']
    | [0].id" --raw-output`

    $ oci events rule delete --rule-id $EVENTRULE_OCID

    Are you sure you want to delete this resource? [y/N]: y

    ```


    要终止 `dev-vm` 及任何相关的网络资源，你必须在基础设施项目目录中像这样发出 `terraform destroy` 命令：


    ```

    $ source ~/tfvars.env.sh

    $ cd ~/git

    $ cd oci-book/chapter09/1-infrastructure

    $ terraform destroy -auto-approve

    ```


    这是本书的最后一章。在本书的过程中，我们创建了许多租户级别的补充云资源，例如用户、组、IAM 策略、动态组和 `Sandbox` 隔区。这些资源至少在撰写本文时不会产生费用。除非你想自行使用它们来进一步探索
    Oracle Cloud Infrastructure 功能，否则可以随意删除它们。要查找在特定时间点存在于你的租户或特定隔区中的所有云资源，你可以使用第
    [4](#478313_1_En_4_Chapter.xhtml) 章介绍的搜索功能，或 OCI 控制台中菜单 ➤ 治理 ➤ 隔区浏览器下可用的隔区浏览器。


    ## Summary


    云原生架构，尽管尚未完全成熟，但正逐渐成为现实。在本章中，你了解了新兴的 CNCF 生态系统及其基于开源、云计算和容器化的起源。接下来，你熟悉了无服务器函数的概念，并运用这些知识，使用了名为
    Fn Project 的开源、基于容器的无服务器框架。然后，你使用了 Oracle Functions，这是 Oracle Cloud 上的一个托管平台，允许你执行
    Fn Project 函数。进一步地，你理解了部署到 Oracle Functions 的函数如何与其他 Oracle Cloud 服务交互。作为一个示例，你学习了如何读写对象存储。最后，你认识了
    CNCF 主办的 CloudEvents 项目，该项目致力于定义行业范围的事件规范，并看到了如何通过配置 Oracle Events 规则来利用基于事件的函数触发器。


    本章为 *Practical Oracle Cloud Infrastructure* 画上了句号。我很高兴能成为你的向导。祝你好运！'
  raw: '## Cleanup


    After having completed the exercises, you can terminate the cloud resources created
    in this chapter. First, let’s remove the bucket with its contents.


    ```

    $ oci os object bulk-delete -bn reports

    There are 6 object in the bucket. Are you sure you want to delete them? [y/N]:
    y

    $ oci os bucket delete -bn reports

    Are you sure you want to delete this resource? [y/N]: y

    ```


    To delete functions from Oracle Functions, you can use the OCI CLI, the OCI Console,
    or the Fn client. This is how you do it with the CLI commands:


    ```

    $ FN_APP_OCID=`oci fn application list --query "data[?\"display-name\" == ''reportingapp'']
    | [0].id" --raw-output`

    $ FN_FUN_OCID=`oci fn function list --application-id $FN_APP_OCID --query "data[?\"display-name\"
    == ''reportingfn''] | [0].id" --raw-output`

    $ oci fn function delete --function-id $FN_FUN_OCID

    Are you sure you want to delete this resource? [y/N]: y

    $ oci fn application delete --application-id $FN_APP_OCID

    Are you sure you want to delete this resource? [y/N]: y

    $ FN_APP_OCID=`oci fn application list --query "data[?\"display-name\" == ''uuidcloudapp'']
    | [0].id" --raw-output`

    $ FN_FUN_OCID=`oci fn function list --application-id $FN_APP_OCID --query "data[?\"display-name\"
    == ''uuidfn''] | [0].id" --raw-output`

    $ oci fn function delete --function-id $FN_FUN_OCID

    Are you sure you want to delete this resource? [y/N]: y

    $ oci fn application delete --application-id $FN_APP_OCID

    Are you sure you want to delete this resource? [y/N]: y

    ```


    To delete the Oracle Events rule, use the `oci events rule delete` CLI command
    like this:


    ```

    $ EVENTRULE_OCID=`oci events rule list --query "data[?\"display-name\" == ''new-reports'']
    | [0].id" --raw-output`

    $ oci events rule delete --rule-id $EVENTRULE_OCID

    Are you sure you want to delete this resource? [y/N]: y

    ```


    To terminate `dev-vm` and any related networking resources, you have to issue
    the `terraform destroy` command in the infrastructure project directory like this:


    ```

    $ source ~/tfvars.env.sh

    $ cd ~/git

    $ cd oci-book/chapter09/1-infrastructure

    $ terraform destroy -auto-approve

    ```


    This is the last chapter of this book. In the course of the book, we created a
    number of supplementary tenancy-level cloud resources such as users, groups, IAM
    policies, dynamic groups, and the `Sandbox` compartment. These resources do not
    incur costs, at least at the time of writing. Feel free to remove them, unless
    you want to use them to explore further the Oracle Cloud Infrastructure features
    on your own. To find all the cloud resources that exist at a given time in your
    tenancy or in a particular compartment, you can use the Search function covered
    in Chapter [4](#478313_1_En_4_Chapter.xhtml) or the Compartment Explorer available
    in the OCI Console under Menu ➤ Governance ➤ Compartment Explorer.


    ## Summary


    Cloud-native architecture, even though still immature, is slowly becoming a reality.
    In this chapter, you learned about the emerging CNCF ecosystem and its origins
    that are based on open source, cloud computing, and containerization. Next, you
    got familiar with the concepts of serverless functions and applied this knowledge
    with the open source, container-based serverless framework called Fn Project.
    Then, you worked with Oracle Functions, which is a managed platform on Oracle
    Cloud that allows you to execute Fn Project functions. Going further, you understood
    how functions deployed to Oracle Functions can interact with other Oracle Cloud
    services. As an example, you learned how to read and write to object storage.
    Finally, you were introduced to the CNCF-hosted CloudEvents project, which is
    working on defining an industry-wide event specification, and saw how to leverage
    event-based function triggers by configuring Oracle Events rules.


    This chapter concludes *Practical Oracle Cloud Infrastructure*. I am happy that
    I could be your guide. Good luck in the future!'
