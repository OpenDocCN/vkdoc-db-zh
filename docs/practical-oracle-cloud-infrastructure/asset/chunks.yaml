  trans: '

    ### 以超级用户身份连接


    Kubernetes 假定用户完全在 Kubernetes 外部进行管理。如果您正在使用一个未托管的 Kubernetes 集群，例如安装在您的数据中心或某些
    IaaS 上，您通常会为客户端设置基于证书的身份验证，或者采用利用由 Kubernetes API 信任的身份签名的 ID 令牌的 OpenID Connect。后者在
    Kubernetes API 认证以及随后的授权背景下，允许采用更面向生产的用户管理策略。


    对于托管服务，如 Oracle Kubernetes Engine，一切都简单得多。对于 OKE 集群，只要 IAM 用户是具有适当 IAM 策略的组的成员，所有
    IAM 用户都会被识别并成功通过身份验证，开箱即用。不过，接下来的是授权问题。作为某个组成员的 IAM 用户，如果该组在集群所在 compartment 中被分配了
    `manage clusters` 权限，则 Kubernetes OCI 授权器会自动将该用户视为集群管理员，并拥有对该特定集群的完整 Kubernetes
    API 访问权限。其余的 IAM 用户则必须显式绑定到预定义或自定义的 RBAC 角色。您稍后将了解这一点。`sandbox-admin` 用户属于 `sandbox-admins`
    组，该组已被授予对 `Sandbox` compartment 中所有资源的完全管理级访问权限。这样，Kubernetes API 应该会将此用户识别为集群管理员。首先，您需要一个所谓的
    `kubeconfig` 文件，它不过是一个 YAML 文件，包含以命名用户身份连接到 Kubernetes API 所需的所有信息。要为特定 IAM 用户生成定制的
    kubeconfig 文件，您可以使用 OCI 控制台或 OCI CLI，如下所示（请注意，我们使用 `--profile SANDBOX-ADMIN` 以
    `sandbox-admin` 用户身份执行 CLI 命令）：


    ```

    $ CLUSTER_OCID=`oci ce cluster list --name k8s-cluster --query "data[?name==''k8s-cluster'']
    | [0].id" --lifecycle-state ACTIVE --raw-output --profile SANDBOX-ADMIN`

    $ echo $CLUSTER_OCID

    ocid1.cluster.oc1.eu-frankfurt-1.aa.........tdg42w

    $ REGION=eu-frankfurt-1

    $ mkdir ~/.kube

    $ oci ce cluster create-kubeconfig --cluster-id $CLUSTER_OCID --file ~/.kube/sandbox-admin.config
    --region $REGION --profile SANDBOX-ADMIN

    New config written to the file /Users/mjk/.kube/sandbox-admin.config

    $ chmod 600 ~/.kube/sandbox-admin.config

    $ ls -l ~/.kube | awk ''{print $1, $9}''

    -rw------- sandbox-admin.config

    ```


    根据惯例，kubeconfig 文件被放置在新创建的目录 `~/.kube` 中。路径 `~/.kube/config` 被我们即将使用的 `kubectl`
    工具视为 kubeconfig 文件的默认路径。我们特意使用了自定义名称，以便仅在需要时才使用此配置。列表 8-10 展示了为 `sandbox-admin`
    用户生成的 kubeconfig 文件。


    ```

    apiVersion: v1

    clusters:

    - cluster:

    certificate-authority-data:

    ::: Base64-encoded cluster certificate :::

    server: https://c4wmntdg42w.eu-frankfurt-1.clusters.oci.oraclecloud.com:6443

    name: cluster-c4wmntdg42w

    contexts:

    - context:

    cluster: cluster-c4wmntdg42w

    user: user-c4wmntdg42w

    name: context-c4wmntdg42w

    current-context: context-c4wmntdg42w

    kind: ""

    users:

    - name: user-c4wmntdg42w

    user:

    exec:

    apiVersion: client.authentication.k8s.io/v1beta1

    args:

    - ce

    - cluster

    - generate-token

    - --cluster-id

    - ::: Cluster OCID :::

    - --region

    - eu-frankfurt-1

    command: oci

    env: []

    列表 8-10

    .kube/sandbox-admin.config

    ```


    `clusters:cluster:certificate-authority-data` 字段是集群的 Base64 编码证书，而 `users:user:exec`
    字段是一个指令，用于使用自定义命令动态获取凭据并以特定 IAM 用户身份进行身份验证。如果您想进行身份验证，仅仅持有此文件是不够的。用于获取凭据的命令依赖于
    OCI CLI 和用户特定的 CLI 配置文件。您很快就会看到它的实际操作。


    别忘了我们正在为 `sandbox-admin` 使用特定的 CLI 配置文件。我们必须考虑到这一点，并相应地修改 `kube/sandbox-admin.config`
    文件。编辑 `.kube/sandbox-admin.config` 文件并添加两行新内容（加粗显示），如下所示：


    ```

    ...

    users:

    - name: user-c2gmyzqguzt

    user:

    exec:

    apiVersion: client.authentication.k8s.io/v1beta1

    args:

    - ce

    - cluster

    - generate-token

    - --profile

    - SANDBOX-ADMIN

    - --cluster-id

    ...

    ```


    您将使用一个名为 `kubectl` 的工具连接到 Kubernetes API。该工具将读取 kubeconfig 文件以执行以下操作：


    1.  查明 Kubernetes API 公共端点是什么


    2.  安全地连接到 Kubernetes API


    3.  使用 OCI CLI 获取令牌并以命名 IAM 用户身份为我们进行身份验证


    `kubectl` 工具已通过 cloud-init 根据提供的 cloud-config 文件预先安装在开发实例上，因此您应该能够开箱即用该工具。我们仍然需要在开发实例上安装
    OCI CLI。现在，连接到开发实例并执行以下命令：


    ```

    [opc@dev-vm ~]$ bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)"

    ...

    -- Installation successful.

    -- Run the CLI with /home/opc/bin/oci --help

    [opc@dev-vm ~]$ oci --version

    2.6.14

    [opc@dev-vm ~]$ mkdir ~/.oci

    [opc@dev-vm ~]$ mkdir ~/.apikeys

    [opc@dev-vm ~]$ exit

    ```


    现在，我们需要准备并上传 `sandbox-admin` 的 CLI 配置。


    ```

    $ cat ~/.oci/config | grep -A 4 "\[SANDBOX-ADMIN\]" > ~/.oci/devvm.config

    $ cat ~/.oci/config | grep tenancy >> ~/.oci/devvm.config

    $ cat ~/.oci/config | grep region >> ~/.oci/devvm.config

    $ scp -i ~/.ssh/oci_id_rsa ~/.oci/devvm.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.oci/config

    devvm.config    100%  329  5.5KB/s

    ```


    CLI 配置引用了 API 签名密钥。我们也上传它。


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.apikeys/api.sandbox-admin.pem opc@$DEV_VM_PUBLIC_IP:/home/opc/.apikeys/api.sandbox-admin.pem

    api.sandbox-admin.pem   100% 1766    10.0KB/s

    ```


    唯一缺少的是开发实例上的 kubeconfig 文件。因此，我们将通过以下方式安全地将 kubeconfig 文件复制到开发实例：


    ```

    $ scp -i ~/.ssh/oci_id_rsa ~/.kube/sandbox-admin.config opc@$DEV_VM_PUBLIC_IP:/home/opc/.kube/config

    sandbox-admin.config           100% 3669   117.0KB/s   00:00

    ```


    提示


    要了解开发实例是如何初始化的，您可以阅读位于 `chapter08/1-devmachine/devmachine/cloud-init/devvm.config.yaml`
    的 cloud-config 文件。


    现在，请连接到开发实例。


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    ```


    在我们开始与 Kubernetes API 交互之前，我们将调整新上传的配置文件的文件权限。


    ```

    [opc@dev-vm ~]$ chmod 600 .kube/config

    [opc@dev-vm ~]$ chmod 600 .oci/config

    ```


    我们将发出几个 `kubectl` 命令来测试与 Kubernetes API 的连通性，并检查集群中的基本 Kubernetes 对象。仍在开发实例上，发出以下命令：

    '
- fmt: "## Kubernetes集群验证与命名空间管理\n\n```\n[opc@dev-vm ~]$ kubectl get nodes\nNAME \
    \       STATUS   ROLES   AGE   VERSION\n10.0.2.2    Ready    node    14h   v1.12.7\n\
    10.0.2.34   Ready    node    14h   v1.12.7\n[opc@dev-vm ~]$ kubectl get namespaces\n\
    NAME          STATUS   AGE\ndefault       Active   14h\nkube-public   Active \
    \  14h\nkube-system   Active   14h\n[opc@dev-vm ~]$ kubectl get pods -n kube-system\n\
    NAME                                    READY   STATUS\nkube-dns-7db5546bc6-4gvqq\
    \               3/3     Running\nkube-dns-7db5546bc6-gq6fq               3/3 \
    \    Running\nkube-dns-autoscaler-7fcbdf46bd-5sdnx    1/1     Running\nkube-flannel-ds-gvkxn\
    \                   1/1     Running\nkube-flannel-ds-vlsgk                   1/1\
    \     Running\nkube-proxy-blzxf                        1/1     Running\nkube-proxy-sdv4m\
    \                        1/1     Running\nkubernetes-dashboard-7b96874d59-w5tfj\
    \   1/1     Running\nproxymux-client-10.0.2.2                1/1     Running\n\
    proxymux-client-10.0.2.34               1/1     Running\ntiller-deploy-7c4c4bfbc4-nsscm\
    \          1/1     Running\n```\n\n**Tip**\n如果遇到错误，请仔细检查所有文件（`.oci/config`、`.kube/config`、`.apikeys/api.sandbox-admin.pem`）是否按要求设置、CLI是否已安装，以及您是否已按照前面几个段落的描述将`SANDBOX-ADMIN`配置文件添加到Kubeconfig文件中。\n\
    \n`kubectl get nodes`命令列出了工作节点。主节点不会列在OKE集群中。`kubectl get namespaces`命令列出了Kubernetes命名空间，可以将其视为在同一物理集群中隔离不同环境的一种便捷方式。各种Kubernetes对象（如Pod或服务）存在于特定命名空间的范围内。`kube-system`命名空间用于托管Kubernetes网络代理（`kube-proxy-`）和集群功能插件，例如容器网络接口插件Pod（`kube-flannel-`）或集群DNS\
    \ Pod（`kube-dns-`）。您可以使用`kubectl get pods`命令并设置命名空间参数`-n`为`kube-system`值来列出这些Pod。\n\
    \n这三个命令的输出实际上证明了您已通过Kubernetes OCI授权器成功认证。但给定用户在Kubernetes API方面的权限有多大呢？有没有办法检查呢？是的，有。一个直接的方法是`auth\
    \ can-i` Kubernetes API调用。您可以使用`kubectl`这样调用：\n\n```\n[opc@dev-vm ~]$ kubectl\
    \ auth can-i create namespace --all-namespaces\nYes\n[opc@dev-vm ~]$ kubectl auth\
    \ can-i '*' '*' --namespace=default\nyes\n```\n\n第一次执行该命令是询问Kubernetes API，代表`kubectl`进行调用的用户是否有权创建Kubernetes命名空间。答案不言自明，不是吗？第二条命令使用`*`通配符来检查在`default`命名空间中，是否允许该用户执行所有类型的操作。\n\
    \n事实上，正如我所提到的，`sandbox-admin`用户应该能够对该集群的Kubernetes API执行所有类型的操作，因为他属于`Sandbox`管理员IAM组，并因此被Kubernetes\
    \ OCI授权器视为该集群的集群管理员。让我们验证一下。\n\n```\n[opc@dev-vm ~]$ kubectl auth can-i '*' '*'\
    \ --all-namespaces\nYes\n```\n\n这一切都是正确的。`sandbox-admin`用户被授权在所有Kubernetes命名空间中对所有Kubernetes对象执行所有操作。\n\
    \n### Sandbox命名空间\n\nKubernetes命名空间可用于在同一物理集群中隔离不同环境。大多数Kubernetes资源都是命名空间范围的，在创建Pod或服务等特定资源时需要指定命名空间。在使用Kubernetes\
    \ DNS进行Kubernetes服务名称解析时，命名空间也很有用，因为Kubernetes服务的FQDN包含其命名空间。我们希望`sandbox-user`能够执行诸如创建Kubernetes对象（如Pod、服务和部署）等操作，但仅限于专用Kubernetes命名空间的范围内。最后但同样重要的是，您可以设置各种配额来限制特定命名空间中Kubernetes资源的消耗。\n\
    \n让我们创建一个名为`dev-sandbox`的新Kubernetes命名空间。\n\n```\n[opc@dev-vm ~]$ cd oci-book/chapter08/3-kubernetes/platform\n\
    [opc@dev-vm ~]$ kubectl create -f dev-sandbox-namespace.yaml\nnamespace/dev-sandbox\
    \ created\n```\n\n我们使用了`kubectl create`命令来创建一个定义在YAML Kubernetes对象描述符中的新Kubernetes命名空间资源。我们通过`-f`参数传递了文件的相对路径。清单8-11显示了该YAML文件。\n\
    \n```\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: dev-sandbox\n  labels:\n\
    \    environment: dev\n```\n**清单 8-11**\n`dev-sandbox-namespace.yaml`\n\n这个新的Kubernetes对象是`Namespace`类型，名称为`dev-sandbox`，并带有自定义的`environment`标签，其值设置为`dev`。由于Kubernetes平台的可插拔和可扩展性，标签通常是关联各种对象的主要手段。在这种情况下，我们将不使用这个特定的标签，但我借此机会向您展示如何为Kubernetes对象添加标签。您现在可以使用`kubectl`来列出并描述新创建的命名空间。\n\
    \n```\n[opc@dev-vm ~]$ kubectl get namespaces\nNAME          STATUS   AGE\ndefault\
    \       Active   15h\ndev-sandbox   Active   41m\nkube-public   Active   15h\n\
    kube-system   Active   15h\n[opc@dev-vm ~]$ kubectl describe namespace dev-sandbox\n\
    Name:         dev-sandbox\nLabels:       environment=dev\nAnnotations:  \nStatus:\
    \       Active\nNo resource quota.\nNo resource limits.\n[opc@dev-vm ~]$ exit\n\
    ```\n\n现在，有了新的命名空间，我们可以准备`sandbox-user`用户来连接Kubernetes API了。"
  raw: "```\n[opc@dev-vm ~]$ kubectl get nodes\nNAME        STATUS   ROLES   AGE \
    \  VERSION\n10.0.2.2    Ready    node    14h   v1.12.7\n10.0.2.34   Ready    node\
    \    14h   v1.12.7\n[opc@dev-vm ~]$ kubectl get namespaces\nNAME          STATUS\
    \   AGE\ndefault       Active   14h\nkube-public   Active   14h\nkube-system \
    \  Active   14h\n[opc@dev-vm ~]$ kubectl get pods -n kube-system\nNAME       \
    \                             READY   STATUS\nkube-dns-7db5546bc6-4gvqq      \
    \         3/3     Running\nkube-dns-7db5546bc6-gq6fq               3/3     Running\n\
    kube-dns-autoscaler-7fcbdf46bd-5sdnx    1/1     Running\nkube-flannel-ds-gvkxn\
    \                   1/1     Running\nkube-flannel-ds-vlsgk                   1/1\
    \     Running\nkube-proxy-blzxf                        1/1     Running\nkube-proxy-sdv4m\
    \                        1/1     Running\nkubernetes-dashboard-7b96874d59-w5tfj\
    \   1/1     Running\nproxymux-client-10.0.2.2                1/1     Running\n\
    proxymux-client-10.0.2.34               1/1     Running\ntiller-deploy-7c4c4bfbc4-nsscm\
    \          1/1     Running\n```\n\nTip\n\nIf you encountered errors, please double-check\
    \ if all files (`.oci/config`, `.kube/config`, `.apikeys/api.sandbox-admin.pem`)\
    \ are set as required, the CLI is installed, and you have added the `SANDBOX-ADMIN`\
    \ profile to the Kubeconfig file as described a few paragraphs earlier.\n\nThe\
    \ `kubectl get nodes` command lists the worker node. The master nodes are not\
    \ listed in the OKE cluster. The `kubectl get namespaces` command lists the Kubernetes\
    \ namespaces that can be thought of as a convenient way to isolate different environments\
    \ within the same physical cluster. Various Kubernetes objects such as pods or\
    \ services exist in the scope of a particular namespace. The `kube-system` namespace\
    \ is used to host the Kubernetes network proxy (`kube-proxy-`) and the cluster\
    \ feature add-ons such as the Container Networking Interface plugin pods (`kube-flannel-`)\
    \ or cluster DNS pods (`kube-dns-`) . You can list these pods using the `kubectl\
    \ get pods` command with the namespace parameter `-n` set to the `kube-system`\
    \ value.\n\nThe output of these three commands actually proves that you were successfully\
    \ authenticated by the Kubernetes OCI Authorizer. But how powerful is the given\
    \ user in terms of the Kubernetes APIs? Is there any way to inspect that? Yes,\
    \ there is. A straightforward one is the `auth can-i` Kubernetes API call. You\
    \ can make this call using `kubectl` like this:\n\n```\n[opc@dev-vm ~]$ kubectl\
    \ auth can-i create namespace --all-namespaces\nYes\n[opc@dev-vm ~]$ kubectl auth\
    \ can-i '*' '*' --namespace=default\nyes\n```\n\nThe first execution of the command\
    \ asks the Kubernetes API whether the user on whose behalf the `kubectl` calls\
    \ are made is entitled to create a Kubernetes namespace. The answer is self-explanatory,\
    \ isn’t it? The second command uses the `*` wildcard to inspect whether all kinds\
    \ of actions are allowed for the given user in the `default` namespace.\n\nAs\
    \ a matter of fact, as I mentioned, the `sandbox-admin` user should be able to\
    \ perform all kinds of operations on the Kubernetes API for this cluster because\
    \ he belongs to the `Sandbox` compartment administrators IAM group and, based\
    \ on this, is considered by the Kubernetes OCI Authorizer as a cluster admin for\
    \ that cluster. Let’s verify it.\n\n```\n[opc@dev-vm ~]$ kubectl auth can-i '*'\
    \ '*' --all-namespaces\nYes\n```\n\nThis is all correct. The `sandbox-admin` user\
    \ is authorized to perform all operations on all Kubernetes objects no matter\
    \ in which Kubernetes namespace they reside.\n\n### Sandbox Namespace\n\nKubernetes\
    \ namespaces can be used to isolate different environments within the same physical\
    \ cluster. Most Kubernetes resources are namespace-scoped, and you are required\
    \ to specify the namespace while creating a particular resource such as a pod\
    \ or service. Namespaces are also useful during Kubernetes service name resolution\
    \ with Kubernetes DNS because the FQDN of a Kubernetes services does include its\
    \ namespace. We would like `sandbox-user` to be able to perform actions such as\
    \ creating Kubernetes objects such as pods, services, and deployments, but only\
    \ in the scope of a dedicated Kubernetes namespace. Last but not least, there\
    \ are various quotas you can set to impose consumption limits by Kubernetes resources\
    \ in a particular namespace.\n\nLet’s create a new Kubernetes namespace called\
    \ `the dev-sandbox` namespace .\n\n```\n[opc@dev-vm ~]$ cd oci-book/chapter08/3-kubernetes/platform\n\
    [opc@dev-vm ~]$ kubectl create -f dev-sandbox-namespace.yaml\nnamespace/dev-sandbox\
    \ created\n```\n\nWe have used the `kubectl create` command to create a new Kubernetes\
    \ namespace resource as defined in a YAML Kubernetes object descriptor. We passed\
    \ the relative path to the file using the `-f` parameter. Listing [8-11](#478313_1_En_8_Chapter.xhtml#PC45)\
    \ shows the YAML file.\n\n```\napiVersion: v1\nkind: Namespace\nmetadata:\nname:\
    \ dev-sandbox\nlabels:\nenvironment: dev\nListing 8-11\ndev-sandbox-namespace.yaml\n\
    ```\n\nThe new Kubernetes object is of a `Namespace` kind, uses `dev-sandbox`\
    \ as its name, and is labeled with a custom `environment` label with the value\
    \ set to `dev`. Because of the pluggable and extendable nature of the Kubernetes\
    \ platform, labels are often a primary means to associate various objects. In\
    \ this case, we are not going to use this particular label, but I took the opportunity\
    \ to show you how to tag a Kubernetes object. You can now use `kubectl` to list\
    \ and describe the newly created namespace.\n\n```\n[opc@dev-vm ~]$ kubectl get\
    \ namespaces\nNAME          STATUS   AGE\ndefault       Active   15h\ndev-sandbox\
    \   Active   41m\nkube-public   Active   15h\nkube-system   Active   15h\n[opc@dev-vm\
    \ ~]$ kubectl describe namespace dev-sandbox\nName:         dev-sandbox\nLabels:\
    \       environment=dev\nAnnotations:  \nStatus:       Active\nNo resource quota.\n\
    No resource limits.\n[opc@dev-vm ~]$ exit\n```\n\nNow, with the new namespace\
    \ set, we can prepare the `sandbox-user` user to connect to the Kubernetes API."
