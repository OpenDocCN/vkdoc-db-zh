  trans: '## 最佳实践


    现在，我想列出一些关于自动化的建议，与您分享。图 3-19 展示了我们在本章讨论过的自动化选项。


    ![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig19_HTML.jpg](img/478313_1_En_3_Fig19_HTML.jpg)


    图 3-19：Oracle Cloud Infrastructure 自动化全景图


    使用 `Terraform` 将基础设施作为代码进行管理，并采用便捷高效的声明式方法来设计您的云资源。这将使您能够对基础设施代码进行版本控制并跟踪变更，以便随时回退到之前的状态。


    使用 `CLI` 创建只读的监控脚本，并在需要按需收集基础设施信息时使用它们。如果需要，可以调度这些脚本以固定时间间隔收集数据，并将结果持久化存储到数据存储中，以供未来研究和分析。如果您需要构建更复杂的云监控工具，可以随意使用
    SDK 实现自定义工具。最后但同样重要的是，您应首先通过使用 OCI 的专用云服务来评估其内置的监控功能。然后，您可以直接使用 `CLI` 从这些服务中收集统计数据。


    如果您使用 `Terraform`，切勿在 OCI 控制台或使用 `CLI` 对您的云资源进行任何临时性修改；否则，存储当前状态的 `Terraform`
    状态文件可能会偏离实际状态，或在无警告的情况下被更改。后一种情况之所以会发生，是因为在执行 `terraform apply` 之前，会隐式执行另一个命令（`refresh`），该命令会根据检测到的实际状态更新状态文件。这样，您可能会无意中在执行计划中纳入对手动创建的资源的一些破坏性操作，并将其删除。


    不要将 `Terraform` 状态文件（`terraform.tfstate`）存储在版本控制系统中，因为该文件可能包含敏感数据。如果您使用的是 Git，请确保在您的
    `.gitignore` 文件中包含了以下内容：


    ```

    .terraform/

    terraform.state*

    ```


    使用远程状态来避免此问题并实现顺畅的团队协作，特别是当远程状态后端支持适当的锁定机制时。如果您无法依赖远程状态，请考虑在专用的构建服务器上运行 `Terraform`
    构建，作为持续交付流水线的一部分，以便状态文件存储在具有有限访问权限的单一远程机器上。在这种情况下，您仍然需要解决状态文件备份的问题。或者，您可以使用 `Oracle
    Cloud Infrastructure 资源管理器`，这是 OCI 的一项服务，但其范围超出了本书的讨论内容。


    将您编写的基础设施代码拆分为可重用的模块。仔细考虑哪种模块属性能让您在各种项目中定制和重用您正在处理的模块。思考那些可能在父模块以及 `Terraform`
    输出中有用的输出值。


    最后但同样重要的是，确保您的计算实例始终使用相同的映像版本，除非您已准备好升级正在运行的实例并知道如何操作，否则即使有更新版本推出也不要改变。您可以通过使用带有硬编码映像
    OCID 的变量来实现这一点。在本章中，我们使用了数据源来动态获取 CentOS 7 映像的 OCID。虽然这种方法对于短期存在的概念验证或演示来说完全没有问题，但绝不允许生产系统采用这种方式。如果您动态获取
    OCID，并且在两次构建之间引入了新的映像版本，您的实例可能会因为 `Terraform` 更改了其基础映像而被终止并重新启动。对于可用性域，也提出了类似的建议，即提供硬编码的变量值。


    ## 本章小结


    本章介绍了自动化 Oracle Cloud Infrastructure 的三种方式。首先，我重点介绍了 OCI REST API 的作用，特别关注了安全性。您了解了签署请求需要哪些信息以及如何准备必要的
    API 签名密钥。接下来，您了解了 Oracle Cloud Infrastructure 的 Python SDK，从安装、配置到在交互式 Python
    shell 中从 OCI 执行两个简单操作。之后，您熟悉了 `CLI`，发现了它与所基于的 Python SDK 的相似之处。本章的大部分内容侧重于使用 `Terraform`
    应用基础设施即代码的原则。您配置了一个简单的单服务器基础设施，执行了冒烟测试，并销毁了这个示例设置。然后，我详细解释了基础设施代码。接着，您学习了 `Terraform`
    状态文件的作用。最后，您阅读了一些与自动化相关的建议。在下一章中，我们将更深入地探讨在项目环境管理背景下的身份与访问管理。


    # 4. 云安全与项目环境


    在本章中，我们将采用自上而下的方法，思考如何围绕项目、环境以及您即将在 Oracle Cloud Infrastructure 上设计和运行的解决方案，来妥善组织您的云资源。'
- fmt: '## Projects, Environments, and Systems


    Throughout the years, we have gotten used to delivering information technology
    solutions in a collaborative effort that follows a particular organizational process.
    The process is usually built around more or less a formal plan and lasts until
    the moment when specific goals are achieved or conditions are met. To reference
    the entire endeavor, we typically call it a `project`. What is characteristic
    about nearly every project is its temporariness. The beginning, any optional intermediate
    goals (sometimes called `milestones`), and the expected ultimate end goal have
    well-defined expected completion dates. Contemporary cloud-oriented information
    technology projects generally aim either at transforming an existing on-premise
    solution and bringing its functionality to the cloud or at designing a completely
    new cloud-native solution.


    The product of a cloud-oriented project is most commonly a set of applications
    running on a virtual cloud infrastructure. The software landscape of an organization
    can be indeed complex. The larger or more technology-oriented an organization
    is, the greater the number and types of applications are. To avoid ambiguity and
    be able to reference the applications or groups of tightly associated applications,
    we can use the term `system`. All in all, the application landscape consists of
    a number of systems that are eventually used to power a broad range of business
    processes. Usually, the majority of systems are interconnected with each other
    and require some degree of integration.


    ## Development Lifecycle and Environments


    The software development lifecycle is nearly always iterative because complex
    problems can be truly solved only if they are split into manageable phases. Developers
    gradually build or migrate applications step by step in small chunks of features.
    In some cases, incremental changes can introduce some regression, understood as
    defects that make previously working functionality simply fail. To alleviate the
    risk of regression, it is crucial that the entire solution gets fully tested at
    least once on each milestone. This is done through the so-called regression tests.


    Furthermore, some major milestones and the final handover have to be approved
    by the customer. As a result, the software becomes the subject of the so-called
    acceptance tests. While developers change the software they are building frequently,
    the regression and acceptance tests do require some degree of stability. The traditional
    approach solves that through the use of different `environments` for different
    purposes.


    Developers work with one or more `development environments` where they deploy
    all intermediary versions of software. Even if you rely on good coverage of automated
    unit tests, these environments may still be rather unstable. This is why only
    selected versions are elevated to the so-called releases and deployed in a `test
    environment` where more sophisticated, either manual or automated, regression
    and acceptance tests take place.


    Successfully tested and approved releases are usually elevated to an environment
    where all the production systems operate. We often reference this environment
    as the `production environment`. What is worth noting is the fact that production
    systems are the subject of routine operations, and, in the general run of things,
    we no longer talk about them in the context of individual projects. Furthermore,
    you can have multiple projects that contribute to a single production environment
    but impact only relatively loosely coupled production systems each. This is conceptually
    shown in Figure 4-1.


    ![Project environments and production systems](images/478313_1_En_4_Chapter/478313_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1**

    Project environments and production systems


    ## Resource Management and Cost Allocation


    The cloud resources, such as compute instances, object storage buckets, or virtual
    networks, used across different project environments and production systems require
    separate `management permissions`. While you can let a large group of developers
    manage the cloud resources used across various development and test environments,
    you would rather appoint a much smaller group of people to look after your production
    systems. Moreover, it is usually not necessary for developers working on one project
    to see the cloud resources used by other projects.


    To enforce the proper access levels, you have to be able to group selected cloud
    resources in some kind of logical groups to which you can attach dedicated permission
    polices that will decide who can take what kind of actions on the cloud resources
    a particular group contains.


    The metered usage of selected types of cloud resources such as compute instances
    or load balancers incur financial costs. From a financial point of view, nearly
    all organizations prefer to `measure the costs` incurred by individual projects
    and production systems. The more granular cost split, the better. In this way,
    the cloud charges can be properly assigned to their appropriate cost centers and
    eventually accounted in a correct way. Again, you need to be somehow able to group
    selected cloud resources to calculate the charges these groups cause.'
