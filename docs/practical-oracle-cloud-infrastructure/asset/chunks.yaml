    "upload-failures": {},

    "uploaded-objects": {

    "waw/wola/a/115.pdf": {...},

    "waw/wola/a/120.pdf": {...},

    "waw/wola/a/124.pdf": {...},

    "waw/wola/a/130.pdf": {...}

