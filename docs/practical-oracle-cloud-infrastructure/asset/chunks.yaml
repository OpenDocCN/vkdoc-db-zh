    ```


    I’ve built this sample application to illustrate both the way to use the OCI SDK
    and a program multipart upload. To release such an application into production,
    you would need to add error handling logic that aborts an ongoing multipart upload
    in the case of severe failure. You could also consider adding a retry mechanism
    for the upload of individual parts. Finally, the upload of individual parts can
    be done in parallel to speed up the entire process.


    As a matter of fact, if you are happy to rely on the OCI CLI embedded in your
