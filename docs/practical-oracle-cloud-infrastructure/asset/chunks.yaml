    \ $OCIR_REGION.ocir.io\nPassword: \nLogin Succeeded\n```\n\n现在，确保 `FN_SUBNET_ID`\
    \ 已正确定义，并使用 `fn create app` 来创建应用程序。\n\n```\n[ubuntu@dev-vm]$ FN_SUBNET_ID=ocid1.subnet.oc1.eu-frankfurt-1.aa...sp2ufa\n\
    [ubuntu@dev-vm]$ fn create app reportingapp --annotation oracle.com/oci/subnetIds=\"\
    [\\\"$FN_SUBNET_ID\\\"]\"\nSuccessfully created app:  reportingapp\n```\n\n我们已经准备好部署函数。\n\
    \n```\n[ubuntu@dev-vm]$ cd reportingfn/\n[ubuntu@dev-vm]$ fn -v deploy --app reportingapp\n\
    ...\nUpdating function reportingfn using image fra.ocir.io/jakobczyk/sandbox-fn/reportingfn:0.0.2...\n\
    Successfully created function: reportingfn with fra.ocir.io/jakobczyk/sandbox-fn/reportingfn:0.0.2\n\
    ```\n\n图 9-19 显示了 OCI 控制台中新部署的函数。类似地，图 9-20 展示了 OCIR 中的函数特定容器镜像。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig20_HTML.jpg](img/478313_1_En_9_Fig20_HTML.jpg)\n\
    \n*图 9-20 在 OCI 控制台中查看函数特定容器镜像*\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig19_HTML.jpg](img/478313_1_En_9_Fig19_HTML.jpg)\n\
    \n*图 9-19 在 OCI 控制台中查看函数*\n\n## 添加标记\n\n我们绝不能忘记需要附加到函数上的标记。这可以通过 OCI CLI 完成。首先，使用带有定制\
    \ JMESPath 查询的 `oci fn application list` 命令来获取 Oracle Functions 应用程序的 OCID。接下来，使用\
    \ `oci fn function list` 命令来获取函数的 OCID。最后，你可以使用 `oci fn function update` 命令将 `test-projects.reports`\
    \ 定义的标记附加到函数上。\n\n```\n$ FN_APP_OCID=`oci fn application list --query \"data[?\\\
    \"display-name\\\" == 'reportingapp'] | [0].id\" --raw-output`\n$ echo $FN_APP_OCID\n\
    ocid1.fnapp.oc1.eu-frankfurt-1.aa...spf2rq\n$ FN_FUN_OCID=`oci fn function list\
    \ --application-id $FN_APP_OCID --query \"data[?\\\"display-name\\\" == 'reportingfn']\
    \ | [0].id\" --raw-output`\n$ echo $FN_FUN_OCID\nocid1.fnfunc.oc1.eu-frankfurt-1.aa...j3lfqa\n\
    $ oci fn function update --function-id $FN_FUN_OCID --defined-tags '{ \"test-projects\"\
    : {\"reports\": \"r1\"} }'\nWARNING: Updates to config and freeform-tags and defined-tags\
    \ will replace any existing values. Are you sure you want to continue? [y/N]:\
    \ y\n{\n  \"data\": {\n    ...\n    \"defined-tags\": {\n      \"test-projects\"\
    : {\n        \"reports\": \"r1\"\n      }\n    },\n    \"display-name\": \"reportingfn\"\
    ,\n    \"freeform-tags\": {},\n    ...\n    \"lifecycle-state\": \"ACTIVE\",\n\
    \    ...\n  }\n}\n```\n\n如果你愿意，可以在 OCI 控制台中按照以下步骤直观地确认标记已正确附加到函数上：\n\n1.  转到菜单\
    \ ➤ 开发者服务 ➤ 函数。\n2.  确保选择了 `Sandbox` 复选框。\n3.  单击 `reportingapp` 应用程序的名称。\n4.\
    \  单击 `reportingfn` 函数的名称。\n5.  单击“标记”选项卡。\n\n你应该会看到新的已定义标记，它存在于 `test-projects`\
    \ 标记命名空间中并使用 `reports` 键，如图 9-21 所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig21_HTML.jpg](img/478313_1_En_9_Fig21_HTML.jpg)\n\
    \n*图 9-21 查看附加到函数的已定义标记键*\n\n函数已部署到 Oracle Functions。在我们测试它之前，让我们讨论一下它的触发方式。\n"
- fmt: "## Events As Function Triggers\n\n`reportingfn` 函数将在 `reports` 存储桶中创建新对象时被触发。事件必须携带一些关于上下文的基本信息。函数实例必须被告知要处理的对象名称。让我们为事件负载构思一个简单的示例。可以想象，事件上下文信息以JSON格式存储，其外观类似于清单[9-12](#478313_1_En_9_Chapter.xhtml#PC81)中所示的示例。\n\
    \n```json\n{\n\"eventType\": \"createobject\",\n\"source\": \"ObjectStorage\"\
    ,\n\"eventTime\": \"2019-09-23T10:49:00.195Z\",\n\"data\": {\n\"resourceName\"\
    : \"customer_attendance.20190922.raw.csv\",\n}\n}\n```\n**Listing 9-12**\n`event.mock.json`\n\
    \n函数代码随后会解析传入的事件负载，并提取携带新创建对象名称的 `resourceName` 元素。`reportingfn` 函数使用了前面提到的 `extract_object_name`\
    \ 函数，该函数在清单[9-13](#478313_1_En_9_Chapter.xhtml#PC82)中展示。\n\n```python\n...\ndef\
    \ extract_object_name(data: io.BytesIO):\n    data_bytes = data.getvalue()\n \
    \   data_json = json.loads(data_bytes)\n    object_name = data_json['data']['resourceName']\n\
    \    return object_name\n...\n```\n**Listing 9-13**\n`reportingfn.py: extract_object_name`\
    \ 函数\n\n回到我们刚才上传的测试对象，让我们在OCI控制台中检查它的名称。该对象使用的是 `customer_attendance.20190922.raw.csv`\
    \ 这个名称，如图[9-22](#478313_1_En_9_Chapter.xhtml#Fig22)所示。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig22_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig22_HTML.jpg)\n\
    **Figure 9-22**\n在OCI控制台中查看原始数据对象\n\n在用于函数开发的计算实例上，`ubuntu`用户的主目录中，您可以找到`~/event.mock.json`文件。该文件包含了事件负载，如清单[9-13](#478313_1_En_9_Chapter.xhtml#PC82)所示。该文件是在初始启动时通过`cloud-init`下载的，方式与您部署的三个函数的代码文件相同。为了测试函数，我们将把该文件的内容作为输入流提供给函数。\n\
    \n```bash\n[ubuntu@dev-vm]$ cat ~/event.mock.json | fn invoke reportingapp reportingfn\
    \ --content-type application/json\n{\"object_name\": \"customer_attendance.20190922.raw.csv\"\
    , \"processed_object_name\": \"customer_attendance.20190922.processed.csv\",\n\
    \"result\": \"success\"}\n```\n\n现在，如果您查看OCI控制台中`reports`存储桶的对象列表，应该很快会看到新对象，如图[9-23](#478313_1_En_9_Chapter.xhtml#Fig23)所示。这个新对象是由运行在Oracle\
    \ Functions平台上的动态生成的函数实例创建的。\n\n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig23_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig23_HTML.jpg)\n\
    **Figure 9-23**\n在OCI控制台中查看已处理的数据对象\n\n好了，到目前为止一切顺利，但这仍然不是我们最初预期的结果。我们的目标是让函数实例在存储桶中出现新对象时自动触发。是时候介绍另一个属于CNCF项目生态系统的开源项目了。\n\
    \n## CloudEvents\n\nCloudEvents项目是在CNCF伞形组织下运作的相对较新的计划之一。该项目的主要目标是为社区提供一个统一的规范来描述事件数据。事件驱动的应用程序并不新鲜，不同的软件组件已经为事件使用了大量各种结构。当事件发布者以不同于事件消费者预期的格式发出事件时，这通常会导致有时成本高昂，有时只是令人烦恼的额外应用程序集成工作。为了减轻这种痛苦，业界已经清楚地认识到，像事件上下文信息这样简单且范围相当有限的东西，应该通过联合努力达成一致。CloudEvents提供了一个描述事件数据的规范。此外，它还附带了各种编程语言的参考实现。您可以在GitHub上找到所有这些内容，如图[9-24](#478313_1_En_9_Chapter.xhtml#Fig24)所示。\n\
    \n![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig24_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig24_HTML.jpg)\n\
    **Figure 9-24**\nGitHub上的CloudEvents项目\n\nCloudEvents规范内容轻量且相对容易阅读。在撰写本文时，该规范有三个稳定版本。当您阅读本书时，很可能已经有更新的版本可用。不用担心。为了简要讨论该规范，我们将重点关注0.1版本。细节会随着时间变化，但一般规则保持不变。我选择了0.1版本，因为它是您将在接下来的章节中学习的Oracle\
    \ Events的当前标准。\n\nCloudEvents规范（版本0.1）的核心包含三个部分。\n\n*   术语\n\n*   类型系统\n\n*  \
    \ 上下文属性\n\n最有趣的部分是*上下文属性*，它们有效地定义了事件信封，或者换句话说，基本上就是承载事件上下文信息的有效负载。这些主要是元数据，如事件的类型、来源和时间，以及事件特定的数据及其内容类型。这些属性列在表[9-1](#478313_1_En_9_Chapter.xhtml#Tab1)中。\n\
    \n**Table 9-1**\nCloudEvents 上下文属性\n\n| CloudEvents 版本 | 0.1 | 0.3 / 1.0-rc1 |\n\
    | --- | --- | --- |\n| 使用的规范版本 | `cloudEventsVersion` | `specversion` |\n| 事件类型\
    \ | `eventType` | `type` |\n| 事件类型的版本 | `eventTypeVersion` | - |\n| 事件发出者 | `source`\
    \ | `source` |\n| 唯一事件标识符 | `eventID` | `id` |\n| 事件发生时间戳 | `eventTime` | `time`\
    \ |\n| `data` 字段中内容的类型 | `contentType` | `datacontenttype` |\n| 事件的特定领域数据 | `data`\
    \ | `data` |\n\n清单[9-14](#478313_1_En_9_Chapter.xhtml#PC84)展示了Oracle Cloud中对象存储发出的事件的部分选定元素。您可以看到，在这种情况下，我们查看的是在创建新对象时发出的事件。这是基于\
    \ `eventType` 和 `source` 字段的值。 compartment、bucket和对象名称包含在 `data` 元素内。清单仅显示了存储在\
    \ `resourceName` 字段中的对象名称。为了清单的简洁性，许多其他特定领域的事件数据被省略了。\n\n```json\n{\n\"eventType\"\
    : \"com.oraclecloud.objectstorage.createobject\",\n\"cloudEventsVersion\": \"\
    0.1\",\n\"eventTypeVersion\": \"2.0\",\n\"source\": \"ObjectStorage\",\n\"eventTime\"\
    : \"2019-09-23T10:49:00.195Z\",\n\"contentType\": \"application/json\",\n\"data\"\
    : {\n    ...\n    \"resourceName\": \"customer_attendance.20190923.csv\",\n  \
    \  ...\n},\n\"eventID\": \"b163df45-de9c-9f01-2928-b0906cd8a3e4\"\n}\n```\n**Listing\
    \ 9-14**\nCloudEvent（版本1）\n\n有了对CloudEvents规范的简要了解，我们可以进入本章的最后一部分了。"
  raw: '### Events As Function Triggers


    The `reportingfn` function will be triggered by the creation of a new object in
    the `reports` bucket. The event must carry some basic information about the context.
    A function instance must be informed about the name of the object to process.
    Let’s come up with a simple example for the event payload. You could imagine that
    the event context information is stored in a JSON format that looks like the sample
    shown in Listing [9-12](#478313_1_En_9_Chapter.xhtml#PC81).


    ```

    {

    "eventType": "createobject",

    "source": "ObjectStorage",

    "eventTime": "2019-09-23T10:49:00.195Z",

    "data": {

    "resourceName": "customer_attendance.20190922.raw.csv",

    }

    }

    Listing 9-12

    event.mock.json

    ```


    The function code would then parse the incoming event payload and extract the
    `resourceName` element that carries the name of the newly created object. The
    `reportingfn` function uses the aforementioned `extract_object_name` function,
    which is presented in Listing [9-13](#478313_1_En_9_Chapter.xhtml#PC82).


    ```

    ...

    def extract_object_name(data: io.BytesIO):

    data_bytes = data.getvalue()

    data_json = json.loads(data_bytes)

    object_name = data_json[''data''][''resourceName'']

    return object_name

    ...

    Listing 9-13

    reportingfn.py: extract_object_name Function

    ```


    Coming back to the test object we uploaded a few moments ago, let’s check its
    name in the OCI Console. The object uses the `customer_attendance.20190922.raw.csv`
    name, as shown in Figure [9-22](#478313_1_En_9_Chapter.xhtml#Fig22).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig22_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig22_HTML.jpg)


    Figure 9-22


    Viewing the raw data object in the OCI Console


    In the home directory for the `ubuntu` user, on the compute instance for functions
    development, you can find the `~/event.mock.json` file. The file contains the
    event payload, as shown in Listing [9-13](#478313_1_En_9_Chapter.xhtml#PC82).
    The file was downloaded during the initial boot by cloud-init, in the same way
    as the files with function code for the three functions you deployed. To test
    the function, we will provide the contents of the file as the input stream to
    the function.


    ```

    [ubuntu@dev-vm]$ cat ~/event.mock.json | fn invoke reportingapp reportingfn --content-type
    application/json

    {"object_name": "customer_attendance.20190922.raw.csv", "processed_object_name":
    "customer_attendance.20190922.processed.csv",

    "result": "success"}

    ```


    Now, if you look at the list of objects in the reports bucket in the OCI Console,
    you should soon see the new object, as shown in Figure [9-23](#478313_1_En_9_Chapter.xhtml#Fig23).
    This new object was created by a dynamically generated function instance running
    on the Oracle Functions platform.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig23_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig23_HTML.jpg)


    Figure 9-23


    Viewing the processed data object in the OCI Console


    All right, so far so good, but this is still not what we originally intended.
    Our goal is to get function instances triggered automatically, as soon as a new
    object appears in the bucket. It is time to cover another open source project
    that belongs to the CNCF project ecosystem.


    ### CloudEvents


    The CloudEvents project is one of the relatively new initiatives that operates
    under the umbrella of CNCF. The project’s main goal is to provide the community
    with a unified specification that describes event data. Event-driven applications
    are not new, and there have been plenty of various structures used for events
    by different software components. When an event publisher emits events in a different
    format than the one expected by event consumers, this usually leads to a sometimes
    costly and in other cases just annoying need for an additional application integration
    effort. To alleviate that kind of pain, it has become clear that something as
    simple and rather limited in scope as event context information should be agreed
    on by the industry in the form of a joint effort. CloudEvents delivers a specification
    that describes event data. Furthermore, it is accompanied with reference implementations
    in various programming languages. You can find all of that on GitHub, as shown
    in Figure [9-24](#478313_1_En_9_Chapter.xhtml#Fig24).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig24_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig24_HTML.jpg)


    Figure 9-24


    CloudEvents project on GitHub


    The CloudEvents specification is lightweight in content and relatively quick to
    read. At the time of writing, there are three stable versions of the specification.
    It is highly probable that when you are reading this book, there are already newer
    versions available. Do not worry about that. To briefly discuss the specification,
    we will focus on version 0.1\. The details will change in time, but the general
    rules remain. I have picked version 0.1 because it is still the current standard
    for Oracle Events you will learn about in the next sections.


    At the heart of the CloudEvents specification (version 0.1), there are three sections.


    *   Terminology


    *   Type system


    *   Context attributes


    The most interesting part are the *context attributes* that effectively define
    the event envelope or, in other words, basically the payload that carries the
    event context information. These are mainly metadata such as the type, source,
    and time of the event as well as event-specific data and their content-type. These
    attributes are listed in Table [9-1](#478313_1_En_9_Chapter.xhtml#Tab1).


    Table 9-1


    CloudEvents Context Attributes


    | CloudEvents Version | 0.1 | 0.3 / 1.0-rc1 |

    | --- | --- | --- |

    | Specification version in use | `cloudEventsVersion` | `specversion` |

    | Type of the event | `eventType` | `type` |

    | Version of the event type | `eventTypeVersion` | - |

    | Event emitter | `source` | `source` |

    | Unique event identifier | `eventID` | `id` |

    | Event occurrence timestamp | `eventTime` | `time` |

    | Type of the content in the `data` field | `contentType` | `datacontenttype`
    |

    | Domain-specific data for an event | `data` | `data` |


    Listing [9-14](#478313_1_En_9_Chapter.xhtml#PC84) shows the selected elements
    of an event emitted by object storage in Oracle Cloud. You can see that in this
    case we are looking at an event emitted during the creation of a new object. This
    is based on the values of the `eventType` and `source` fields. The compartment,
    bucket, and object name are shipped inside the `data` element. The listing shows
    only the object name stored in the `resourceName` field. Many of other domain-specific
    event data were omitted for the brevity of the listing.


    ```

    {

    "eventType": "com.oraclecloud.objectstorage.createobject",

    "cloudEventsVersion": "0.1",

    "eventTypeVersion": "2.0",

    "source": "ObjectStorage",

    "eventTime": "2019-09-23T10:49:00.195Z",

    "contentType": "application/json",

    "data": {

    ...

    "resourceName": "customer_attendance.20190923.csv",

    ...

    },

    "eventID": "b163df45-de9c-9f01-2928-b0906cd8a3e4"

    }

    Listing 9-14

    CloudEvent (Version 1)

    ```


    With this brief understanding of CloudEvents specification, we can move to the
    final section of this chapter.'
