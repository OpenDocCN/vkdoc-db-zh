- fmt: '# 9. Cloud-Native Architecture


    ## Cleanup


    There are three groups of resources we need to terminate in the proper order.


    *   Kubernetes objects and their related OCI resources

    *   OKE cluster and the related resources

    *   The `dev-vm` compute instance and related resources


    First, we have a Kubernetes service that was created with the provisioning of
    a load balancer. We need to delete this service to remove the corresponding load
    balancer. Let’s connect to the developer instance again and use `kubectl` to delete
    the Kubernetes objects we’ve just successfully tested.


    ```shell

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    [opc@dev-vm]$ export KUBECONFIG=~/.kube//sandbox-user.config

    [opc@dev-vm]$ kubectl delete all --all -n dev-sandbox

    pod "uuid-deployment-78cf484f96-rj4br" deleted

    pod "uuid-deployment-78cf484f96-wg2zw" deleted

    service "uuid-service" deleted

    deployment.apps "uuid-deployment" deleted

    [opc@dev-vm]$ exit

    ```


    The second step involves terminating the cluster. Enter the infrastructure code
    directory, and issue the `terraform destroy` command, properly referencing the
    `sandbox-admin.tfvars` file to perform this operation on behalf of the `sandbox-admin`
    user.


    ```shell

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes/infrastructure

    $ terraform destroy -var-file="$HOME/sandbox-admin.tfvars" -auto-approve

    ```


    Finally, you can move to the last cleanup step for this chapter and terminate
    the `dev-vm` compute instance.


    ```shell

    $ source ~/tfvars.env.sh

    $ cd ~/git

    $ cd oci-book/chapter08/1-devmachine

    $ terraform destroy -auto-approve

    ```


    ## Summary


    In this chapter, you experienced the end-to-end process of containerizing an application.
    First, we built a multilayered container image based on the UUID API that was
    originally built and deployed on compute instances as an operating system service
    in Chapter [2](#478313_1_En_2_Chapter.xhtml). We tested containers based on this
    image locally and pushed them to the OCIR private repository. Next, we discussed
    the need for container orchestration based on the most popular open source container
    platform called Kubernetes. Then, we prepared and provisioned a managed Kubernetes
    cluster with the use of Oracle Kubernetes Engine. Following that, you learned
    how to work with the Kubernetes API and manage granular access for IAM users.
    Finally, you created a complete set of Kubernetes objects to properly manage a
    stateless containerized application based on the container image you prepared
    at the beginning of this chapter.


    In the next chapter, we will discuss what does cloud-native architecture actually
    means nowadays.


    In the recent years, the degree and pace of changes on the software scene have
    accelerated like never before. The `open source` movement ignited a large number
    of scattered and often independent teams racing to bring new software components,
    tools, platforms, protocols, and services to market at an incredible pace. `Cloud
    computing` removed many hardware-related entry barriers by allowing teams to self-provision
    virtualized hardware resources in a matter of seconds. With cloud-provider-managed
    hardware capabilities, both virtualized and even bare-metal, available at one’s
    fingertips, nearly anyone can launch and develop a small software project. `Containerization`,
    briefly covered in the previous chapter, often enables new approaches in designing
    applications and requires the presence of new supplementary tools to make the
    solutions production-ready. There are old questions to be answered such as how
    to solve storage, networking, messaging, and service discovery challenges, this
    time in the age of containers. There are new waters to explore—service mesh, container
    registries, and schedulers, to name a few. Let’s list the three information age
    turning points that considerably impact the way we architect new-generation software
    solutions. These are as follows:


    *   `open source`

    *   `cloud computing`

    *   `containerization`


    The growing number of open source contributors and the ease of launching cloud-based
    software projects sparked software development on an unprecedented scale. The
    arrival of containerization brought demand for new types of software components
    and the need to adapt some of the existing tools. To roll out a production-ready
    software solution, you usually have to carefully pick the existing components
    of various types, add your in-house application codebase, and properly integrate
    everything. A large number of actively developed, usually not-yet-mature, and
    often competing container-oriented, components, utilities, platforms, protocols,
    and services are making it more and more difficult for companies to choose what
    they need, as illustrated in Figure [9-1](#478313_1_En_9_Chapter.xhtml#Fig1).


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig1_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig1_HTML.jpg)


    Figure 9-1: Information age turning points


    Having too many approaches for solving the same kind of problems and a plethora
    of competing and often immature open source software projects can lead to some
    degree of chaos. To avoid running into troubles, there arises the need for `standardization`.
    This is similar to having design patterns that address common software development
    challenges. There are a few types of standards to consider. Some standards are
    crucial to get software components that need to interact to speak the same language.
    For example, the OpenAPI specification provides a standard for defining REST APIs
    using YAML or JSON documents that are readable both by humans and by machines.
    The CloudEvents specification is aimed at defining a common event structure so
    that a broad range of applications are able to seamlessly understand others’ events.
    Other standards such as Container Network Interface (CNI) and Container Storage
    Interface (CSI) focus on defining interfaces that will let vendor-specific plugins
    communicate with various container runtimes in a unified way. One of the biggest
    challenges that arises especially for tech leads and technical architects is to
    deal with the flood of open source projects. People who hold these roles are confronted
    with questions on what open source projects to rely on when designing and building
    their cloud-based solutions. Because the majority of these projects are relatively
    new and still immature, there is a risk that, as the time goes by, some projects
    are abandoned or lose ground to their open source competition. In other words,
    it would be good to have some kind of reference architecture agreed on by the
    industry, in other words, a collection of graduated projects that meet reasonable
    requirements and are safe choice to include, while designing cloud-oriented solutions.
    To address this need, the leading cloud providers, independent software vendors,
    tech-driven companies, and academic and nonprofit organizations gathered together
    and created `Cloud Native Computing Foundation` (CNCF). CNCF hosts the entire
    ecosystem of cloud- and container-oriented open source projects and supports them
    during their evolution. Projects that are accepted to join the CNCF project portfolio
    are graded based on their maturity and adoption. There are three levels of grades:
    sandbox, incubation, and graduation. For tech leads and architects, CNCF provides
    a convenient landscape of projects to consider while choosing the components for
    the architected solutions, as illustrated in Figure [9-2](#478313_1_En_9_Chapter.xhtml#Fig2).
    Furthermore, CNCF coordinates global events such as KubeCon + CloudNativeCon and
    supports a broad network of cloud-native Meetups around the world.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig2_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig2_HTML.jpg)


    Figure 9-2: Choosing cloud-native projects while architecting a cloud solution'
