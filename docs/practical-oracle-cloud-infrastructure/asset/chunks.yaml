    ### Using Terraform


    In this section, we will create a small infrastructure-as-code project. The target
    setup will consist of a virtual cloud network with a single compute instance running
    in a public subnet. The virtual machine will be running an Apache HTTP Server
    instance. Security rules and operating system firewall rules will allow inbound
