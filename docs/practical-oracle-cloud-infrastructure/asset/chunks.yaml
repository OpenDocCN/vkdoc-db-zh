    \ 的基础设施代码中找到此值作为 `cool_down_in_seconds` 参数。冷却期从实例池进入稳定状态时开始。这发生在池的初始配置期间。从那时起，按照冷却期定义的固定间隔，自动扩展引擎会检查最后三个指标探测。默认情况下，指标探测每分钟从计算实例收集一次。基于这些探测，实例池计算给定时间戳的平均指标。如果另一个平均值（这次是最后三个连续的实例池平均值）超过特定的自动扩展策略阈值，则会触发自动扩展事件，并调整实例池大小。在这个阶段，我们也可以为我们的池观察到这一点。\n\
