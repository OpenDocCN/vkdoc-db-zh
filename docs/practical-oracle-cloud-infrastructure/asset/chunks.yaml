    ### Policies


    Individual policy statements cannot exist on their own but have to be contained
    in the so-called policies. A `policy` is a cloud resource that consists of one
    or more statements that determine the access a group of users has over a particular
    class of cloud resources in a particular compartment or the entire tenancy. Individual
    policy statements cannot exist outside of a policy; therefore, you will always
    work with policy statements contained in policies. At this stage, we need to highlight
    one important notion. The users and groups do exist in the scope of the entire
    tenancy. We can say they are global. Policies, on the other hand, are created
    in compartments, just like the majority of regular cloud resources such as compute
    instances or virtual networks. At the time of writing, a new cloud account arrives
    with two policies by default. To see them using the OCI Console, take these steps:


    1.  Go to Menu ➤ Identity ➤ Policies.

    2.  Make sure that the `root` compartment is selected.


    Figure [4-19](#478313_1_En_4_Chapter.xhtml#Fig19) shows the two default policies.
    Looking at the creation time of the two policies, you can even guess around what
    time my cloud tenancy was actually brought into existence.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig19_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig19_HTML.jpg)


    Figure 4-19


    Default policies in the OCI Console


    If you prefer to use the CLI, this is the query to list the policies that are
    present in the `root` compartment:


    ```

    $ oci iam policy list -c $TENANCY_OCID --all --query ''data[*].{Name:name,Statements:length(statements)}''
    --output table

    +---------------------+------------+

    | Name                | Statements |

    +---------------------+------------+

    | PSM-root-policy     | 7          |

    | Tenant Admin Policy | 1          |

    +---------------------+------------+

    ```


    As you can see, I am using the tenancy OCID to point to the `root` compartment
    in the CLI command (`-c $TENANCY_OCID`). The OCID of the root compartment of your
    tenancy is the same as the OCID of your tenancy.


    The `Tenant Admin Policy` contains only one, but important, statement.


    ```

    $ oci iam policy list -c $TENANCY_OCID --all --query "data[?name==''Tenant Admin
    Policy''].statements[0]"

    [

    "ALLOW GROUP Administrators to manage all-resources IN TENANCY"

    ]

    ```


    The role of this policy is to let the members of the default group `Administrators`
    manage all cloud resources in your tenancy. This policy is protected; you neither
    can delete it nor can add any other statements.


    The second default policy visible in your root compartment, namely, the `PSM-root-policy`
    policy, allows various Oracle Cloud Platform services to be provisioned on Oracle
    Cloud Infrastructure. I am not going to discuss them in this work.


    Earlier in this chapter, we created a new user called `sandbox-admin` and added
    him to the newly created `sandbox-admins` group. We also added a dedicated profile
    in the `~/.oci/config` file for this user. If we tried to execute any CLI command
    on behalf of this user, the command would fail with the `NotAuthorizedOrNotFound`
    service error because there are no policy statements that would allow the members
    of the `sandbox-admins` group to interact with the API. We are ready to change
    it by adding a new policy to the root compartment. The policy is going to ship
    with just a single statement that allows the members of the `sandbox-admins` group
    to perform all kinds of operations on all resources in the `Sandbox` compartment.
    This is how you do it using the CLI:


    ```

    $ oci iam policy create -c $TENANCY_OCID --name sandbox-admins-policy --description
    "Policy for the Sandbox compartment admins group"  --statements ''["allow group
    sandbox-admins to manage all-resources in compartment Sandbox"]''

    ```'
