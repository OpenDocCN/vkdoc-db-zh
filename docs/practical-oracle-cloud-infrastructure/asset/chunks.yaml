    要创建新的动态组并明确指示租户级范围，请像这样使用 `oci iam dynamic-group create` 命令：


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ MATCHING_RULE="tag.test-projects.realestate.value"

    $ oci iam dynamic-group create --name realestate-instances --description "Instances
    related to the real-estate project" --matching-rule $MATCHING_RULE -c $TENANCY_OCID

    {

    "data": {

    "compartment-id": "ocid1.tenancy.oc1..aa.........3yymfa",

    "description": "Instances related to the real-estate project",

    "id": "ocid1.dynamicgroup.oc1..aa.........hkt7dq",

    "inactive-status": null,

    "lifecycle-state": "ACTIVE",

    "matching-rule": "tag.test-projects.realestate.value",

    "name": "realestate-instances",

    "time-created": "2019-03-20T20:59:36.353000+00:00"

    },

    "etag": "4c007061997871d3f5ac4a98a225f71be509ac25"

    }

    ```


    我们将匹配规则定义为 `MATCHING_RULE` 变量，并将其传递给 `oci iam dynamic-group create` CLI命令的 `--matching-rule`
    参数。该命令没有显式指定 `--profile`；因此，CLI使用了我们配置的默认配置文件（正如第3章配置的那样）来使用租户管理员凭据。新的动态组被称为 `realestate-instances`。


    有了新的动态组，我们就可以向现有策略添加一条新的权限语句。标准组和动态组的策略语法几乎相同，只是使用 `dynamic-group` 术语代替了 `group`
    术语。此语句允许新创建的动态组的实例委托管理 `Sandbox` 隔离区中的对象。


    ```

    allow dynamic-group realestate-instances to manage objects in compartment Sandbox
    where target.bucket.name=''blueprints''

    ```


    我们将重用本章前面创建的相同策略。要执行更新，我们需要一个包含策略中应存在的所有语句的文件。清单5-8展示了两条现有语句和第三条新语句。


    ```

    [

    "allow group sandbox-users to read buckets in compartment Sandbox where target.bucket.name=''blueprints''",

    "allow group sandbox-users to manage objects in compartment Sandbox where target.bucket.name=''blueprints''",

    "allow dynamic-group realestate-instances to manage objects in compartment Sandbox
    where target.bucket.name=''blueprints''"

    ]

    Listing 5-8

    sandbox-users.policies.storage.2.json

    ```


    该文件可在Git存储库的 `oci-book/chapter05/1-policies/` 目录中找到。


    我们将要更新的策略最初是在 `Sandbox` 隔离区中创建的。要通过名称查找此策略，我们可以使用 `oci iam policy list` CLI命令，并额外应用本地JMESPath过滤器以仅显示策略OCID。'
