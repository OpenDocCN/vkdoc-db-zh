    ## 理解资源类型


    您可以在云账户中配置多种类型的云基础设施资源。计算实例和对象存储桶是云资源的例子。一些云 `资源类型` 彼此之间比其他类型更相关。实例映像用于配置计算实例。实例可以在池中管理。要启动实例池，需要一个实例配置。正如您所看到的，我举的这四个资源类型例子之间存在一定程度的相互依赖关系。从访问控制的角度来看，您通常会为属于一个相关
    `资源类型` 家族的所有 `资源类型` 授予相同的访问权限。因此，Oracle Cloud Infrastructure 定义了所谓的聚合云资源，例如 `instance-family`
    或 `virtual-network-family`，它们是现有云 `资源类型` 的逻辑分组。


    > **提示：** 在您的 `策略语句` 中列出所有可用 `资源类型` 没有多大意义，因为该列表在不断增长。请参阅官方文档中的策略参考。


    ## 理解策略动词


    `策略动词` 定义了对云资源的访问级别。有四个可用级别：`inspect`、`read`、`use` 和 `manage`。`inspect` 访问是基础级别的，通常只允许
    `组` 成员列出资源。`read` 访问包含与 `inspect` 访问相同的范围，但增加了读取云资源详细信息的能力。`use` 访问通常允许 `组` 成员执行
    `read` 访问范围内的所有操作，以及启动、停止和更新现有云资源。最后，`manage` 访问授予该云资源类型的所有权限。关于 `策略动词` 的关键是，它们的精确含义是高度依赖于上下文的，并且取决于它们在
    `策略语句` 中所前缀的 `资源类型`。


    让我用一个例子来解释。表 4-1 展示了在 `load-balancers` `资源类型` 的情况下，`策略动词` 如何映射到各个权限。每个权限实际上都允许
    `组` 成员调用特定的 API 集合。


    *表 4-1：load-balancers 资源类型的策略动词*


    | 动词 | 权限 | 覆盖的 API |

    | --- | --- | --- |

    | `inspect` | LOAD_BALANCER_INSPECT | `ListLoadBalancers` `ListShapes` `ListPolicies`
    `ListProtocols` |

    | `read` | `inspect` 权限 + LOAD_BALANCER_READ | `inspect` API + `GetLoadBalancer`
    等 |

    | `use` | `read` 权限 + LOAD_BALANCER_UPDATE | `read` API + `UpdateLoadBalancer`
    `CreateBackendSet` `DeleteBackendSet` `UpdateBackendSet` 等 |

    | `manage` | `use` 权限 + LOAD_BALANCER_CREATE LOAD_BALANCER_DELETE | `use` API
    + `CreateLoadBalancer` `DeleteLoadBalancer` |


    如表 4-1 所示，在 `load-balancers` `资源类型` 的情况下，`inspect` `策略动词` 仅映射到一个 `LOAD_BALANCER_INSPECT`
    权限，该权限本质上授予对四个 API 的访问权限：`ListLoadBalancers`、`ListShapes`、`ListPolicies` 和 `ListProtocols`。这四个
    API 提供了对给定 ` compartment ` 范围内的可用负载均衡器策略、规格、协议和负载均衡器的一些基本洞察。通常，API 名称是自解释的，但如果您想确定这些
    API 真正允许您对云资源执行何种操作，您随时可以阅读 API 参考。


    如果您再次查看该表，您会发现负载均衡器只能由 `组` 成员创建或删除，前提是他们的 `组` 被授予了针对 `load-balancers` `资源类型` 的
    `manage` `策略动词`。这并不令人惊讶。更有趣的是，当存在带有 `use` `策略动词` 的 `策略语句` 时，就可以创建或删除后端集。我们应该如何理解这一点？嗯，后端集只能存在于负载均衡器的上下文中，作为其子资源。通过这种方式，您可以将后端集的创建委托给负载均衡器的用户，就像您允许他们更新现有负载均衡器一样。然而，父资源（即负载均衡器）的创建或终止仅限于管理员。


    > **提示：** `策略动词` 高度依赖于上下文，其确切含义取决于它们在 `策略语句` 中所前缀的 `资源类型`。您需要查阅文档以了解更多：[`https://docs.cloud.oracle.com/iaas/Content/Identity/Reference/policyreference.htm`](https://docs.cloud.oracle.com/iaas/Content/Identity/Reference/policyreference.htm)。


    ## IAM 策略语句示例


    让我们讨论几个 IAM `策略语句` 的例子。在开始为我们新的 IAM `组` 创建语句之前，我希望您能先有个总体的了解。


    如果您打算将某个 ` compartment ` 的所有权限授予该 ` compartment ` 的管理员 `组`，您只需使用一条 `IAM 策略语句`
    即可完成。


    ```

