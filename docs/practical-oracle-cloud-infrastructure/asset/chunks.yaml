- fmt: "### API Signing Key\n\nIn this section, we are going to generate a new keypair\
    \ that will serve as an API signing keypair and upload the public key to Oracle\
    \ Cloud Infrastructure under a particular IAM user. In this way, we will empower\
    \ anyone with the private key to leverage the OCI API and manage OCI resources\
    \ remotely on behalf of this IAM user. The private key will be additionally secured\
    \ with a password. Every time you try using the private key, you will be prompted\
    \ for password, unless you persist it in your local configuration.\n\n> **Note**\n\
    >\n> The code snippets from this book have been tested on macOS and Windows Subsystem\
    \ for Linux. Moreover, all commands should work on major Linux distributions.\
    \ If you are using Windows and do not want to use Windows Subsystem for Linux,\
    \ you can always run Linux on a VM. Furthermore, the majority of code snippets\
    \ may also work in Git Bash on Windows.\n\n#### Generate a Keypair\n\nThe API\
    \ signing keypair must be an RSA keypair in PEM format. PEM format uses human-readable\
    \ characters, which makes it slightly easier to work with (especially copying\
    \ the public key) than when working with binary formats. We are going to use `theopenssl`\
    \ program to generate a new keypair that consists of two related 2,048-bit keys:\
    \ one private to sign the request and one public to verify the genuineness of\
    \ the request. This is how you generate a new keypair using `openssl` that should\
    \ be available out of the box on your Linux, macOS, and Windows Subsystem for\
    \ Linux:\n\n```bash\n$ mkdir ~/.apikeys\n$ cd ~/.apikeys\n$ openssl genrsa -out\
    \ oci_api_pem -aes128 2048\nGenerating RSA private key, 2048 bit long modulus\n\
    .............+++\n..+++\ne is 65537 (0x10001)\nEnter pass phrase for oci_api_pem:\n\
    Verifying - Enter pass phrase for oci_api_pem:\n$ chmod go-rwx oci_api_pem\n$\
    \ ls -l | grep pem | awk '{ print $1\" \"$9 }'\n-rw------- oci_api_pem\n$ openssl\
    \ rsa -pubout -in oci_api_pem -out oci_api_pem.pub\nEnter pass phrase for oci_api_pem:\n\
    writing RSA key\n$ ls -l | grep pem | awk '{ print $1\" \"$9 }'\n-rw------- oci_api_pem\n\
    -rw-r--r-- oci_api_pem.pub\n```\n\nIt is recommended that you restrict the access\
    \ permissions to your private key so that only the file owner is entitled to read\
    \ or amend the file. You can perform this operation using the `chmod` command,\
    \ as shown in the code snippet. At this stage, the keypair is ready. Listing 3-4\
    \ shows the public key we’ve just generated.\n\n```text\n$ cat oci_api_pem.pub\n\
    -----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAy7QqyKkIM1UW0lBs3h04\n\
    OIxCNbAc1YpqLmd/ZQGwNFoC9L7kpkARjOTMQg/XY9VgFhTFwkhv/sP7aOwYZjVD\nBMltp3e0Xzu1BGe4AQF3xL+euqZW9dBRlvZqb1ubEse4RnKDCWvYpqQS/vQU48TM\n\
    nRObefTsZH1xg2RfO2mFHuGEZhJKrVIjHTJvjisAIZg0dPaVD8Ee+julutCnDHcP\nQWlfe2e4OtYvvki5Wwu5Uz4Zq6ZSf55oX25pDGyw/WB5oDFg4v6RsZ7kQZYTBsqA\n\
    gF7RnG+q5JnxFfuDvEZoU0sB5hRWujhhSZtE9FjU9UndMU5iaa8kNE6Ua3e0p4ZG\nRwIDAQAB\n-----END\
    \ PUBLIC KEY-----\nListing 3-4\nAPI Signing Keypair Public Key\n```\n\n#### Uploading\
    \ the Public Key\n\nWe’ve reached the point when we need to decide on whose behalf\
    \ the API requests are sent. In other words, we have to select an existing IAM\
    \ user and upload the public key that will get associated with this user. If you\
    \ are working with a new trial or PAYG account, you are probably logged in as\
    \ the default IAM user who represents the tenancy owner and belongs, out of the\
    \ box, to the `Administrators` group. This group will let you perform all the\
    \ exercises described in this chapter.\n\n> **Tip**\n>\n> If you are using some\
    \ other IAM user, given to you by your cloud team, who isn’t a member of the `Administrators`\
    \ group, please talk to your cloud team admin to verify what kind of actions you\
    \ are entitled to perform or jump to Chapter 4 to understand what the IAM policies\
    \ assigned to your IAM group mean.\n\nThis is how you upload a public key using\
    \ the OCI Console:\n\n1.  Go to Menu ➤ Identity ➤ Users.\n2.  Click the name of\
    \ your tenancy administrator user.\n3.  Click API Keys in the Resources menu.\n\
    4.  Click Add Public Key.\n5.  Paste the public key.\n6.  Click Add.\n\nFigure\
    \ 3-3 presents the OCI Console window, which you use to add a new public key for\
    \ an IAM user.\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig3_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3\nAdding a public key in the OCI Console\n\nYou can have up to three\
    \ public API keys for each IAM user. The API will recognize which is the right\
    \ one to use for each incoming request based on a `fingerprint` of the public\
    \ key included in the `authorization` header of the request. The fingerprint is\
    \ displayed in the OCI Console, as shown in Figure 3-4.\n\n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig4_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4\nFingerprint of the public key\n\nThe user is allowed to perform\
    \ only the operations on cloud resources that are allowed by existing IAM policy\
    \ statements for the group the user belongs to. You will learn about them in the\
    \ next chapter. For now, please make sure you will be using an IAM user who belongs\
    \ to a group that has tenancy administration rights, such as default `Administrators`\
    \ group; otherwise, some commands presented in the next sections may not work.\n\
    \n#### Preparing for SDK, CLI, and Terraform\n\nIf you’ve completed all the steps\
    \ described in the “API Signing Key” section, you are ready to begin automating\
    \ cloud infrastructure management tasks. Let’s wrap up and list the required details\
    \ you will have to provide, at least once during the initial setup, when coding\
    \ your custom API calls based on the SDK for your favorite programming language\
    \ or, more often, running CLI scripts or provisioning infrastructure configuration\
    \ with Terraform. These are the details you should prepare or know where to find\
    \ them:\n\n*   **API Signing Keypair** in PEM format:\n    *   Public key\n  \
    \  *   Private key\n*   **Fingerprint** of the public key\n*   **IAM User OCID**,\
    \ available under Menu ➤ Identity ➤ Users\n*   **Tenancy OCID**, available under\
    \ Menu ➤ Administration ➤ Tenancy Details\n*   **Region Identifier**, available\
    \ under Menu ➤ Administration ➤ Region Management on the Infrastructure Regions\
    \ tab\n\nWe are now ready to discuss and apply the three most popular automation\
    \ techniques. We will talk about SDKs first."
