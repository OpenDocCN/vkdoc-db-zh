    \ with a password. Every time you try using the private key, you will be prompted\
    \ for password, unless you persist it in your local configuration.\n\nNote\n\n\
    The code snippets from this book have been tested on macOS and Windows Subsystem\
    \ for Linux. Moreover, all commands should work on major Linux distributions.\
    \ If you are using Windows and do not want to use Windows Subsystem for Linux,\
    \ you can always run Linux on a VM. Furthermore, the majority of code snippets\
    \ may also work in Git Bash on Windows.\n\n#### Generate a Keypair\n\nThe API\
    \ signing keypair must be an RSA keypair in PEM format. PEM format uses human-readable\
    \ characters, which makes it slightly easier to work with (especially copying\
