    # 9. 云原生架构


    ## 清理


    我们需要按正确顺序终止三组资源。


    *   Kubernetes 对象及其相关的 OCI 资源

    *   OKE 集群及相关资源

    *   `dev-vm` 计算实例及相关资源


    首先，我们有一个 Kubernetes 服务，它是在配置负载均衡器时创建的。我们需要删除此服务以移除相应的负载均衡器。让我们再次连接到开发者实例，并使用 `kubectl`
    删除我们刚刚成功测试过的 Kubernetes 对象。


    ```shell

    $ ssh -i ~/.ssh/oci_id_rsa opc@$DEV_VM_PUBLIC_IP

    [opc@dev-vm]$ export KUBECONFIG=~/.kube//sandbox-user.config

    [opc@dev-vm]$ kubectl delete all --all -n dev-sandbox

    pod "uuid-deployment-78cf484f96-rj4br" deleted

    pod "uuid-deployment-78cf484f96-wg2zw" deleted

    service "uuid-service" deleted

    deployment.apps "uuid-deployment" deleted

    [opc@dev-vm]$ exit

    ```


    第二步涉及终止集群。进入基础设施代码目录，并执行 `terraform destroy` 命令，正确引用 `sandbox-admin.tfvars` 文件，以代表
    `sandbox-admin` 用户执行此操作。


    ```shell

    $ cd ~/git

    $ cd oci-book/chapter08/3-kubernetes/infrastructure

    $ terraform destroy -var-file="$HOME/sandbox-admin.tfvars" -auto-approve

    ```


    最后，你可以进入本章的最后一个清理步骤，终止 `dev-vm` 计算实例。


    ```shell

    $ source ~/tfvars.env.sh

    $ cd ~/git

    $ cd oci-book/chapter08/1-devmachine

    $ terraform destroy -auto-approve

    ```


    ## 总结


    在本章中，你体验了将应用程序容器化的端到端过程。首先，我们基于 UUID API 构建了一个多层容器镜像，该 API 最初在第 2 章中作为操作系统服务构建和部署在计算实例上。我们基于此镜像在本地测试了容器，并将其推送到
    OCIR 私有仓库。接着，我们讨论了基于最流行的开源容器平台 Kubernetes 进行容器编排的必要性。然后，我们使用 Oracle Kubernetes
    Engine 准备并配置了一个托管 Kubernetes 集群。随后，你学习了如何使用 Kubernetes API 以及管理 IAM 用户的细粒度访问权限。最后，你创建了一套完整的
    Kubernetes 对象，以基于本章开头准备的容器镜像，妥善管理一个无状态的容器化应用程序。


    在下一章中，我们将讨论云原生架构在当今的实际含义。


    近年来，软件领域的变化程度和速度前所未有地加快了。`开源`运动点燃了大量分散且常常独立的团队，他们以惊人的速度竞相将新的软件组件、工具、平台、协议和服务推向市场。`云计算`通过允许团队在几秒钟内自行配置虚拟化硬件资源，消除了许多与硬件相关的入门壁垒。借助云提供商管理的硬件能力（包括虚拟化甚至裸机），几乎任何人都可以启动和开发一个小型软件项目。前一章简要介绍的`容器化`，通常为设计应用程序带来了新的方法，并需要新的补充工具来使解决方案达到生产就绪状态。这里存在一些老问题需要解答，例如如何在容器时代解决存储、网络、消息传递和服务发现的挑战。也有新的领域有待探索——服务网格、容器注册表和调度器等。让我们列举三个对构建新一代软件解决方案的架构方式产生重大影响的信息时代转折点。它们如下：


    *   `开源`

    *   `云计算`

    *   `容器化`


    日益增长的开源贡献者以及启动云端软件项目的便利性，引发了前所未有的软件开发规模。容器化的到来带来了对新型软件组件的需求，以及调整一些现有工具的需求。要推出一个生产就绪的软件解决方案，通常需要精心挑选各种类型的现有组件，添加你内部的应用程序代码库，并正确集成所有内容。大量积极开发中、通常尚未成熟且常常相互竞争的面向容器的组件、实用程序、平台、协议和服务，使得公司越来越难以选择他们所需的东西，如图
    9-1 所示。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig1_HTML.jpg](img/478313_1_En_9_Fig1_HTML.jpg)


    图 9-1：信息时代转折点


    解决同类问题的方法过多以及大量相互竞争且常常不成熟的开源软件项目，可能会导致一定程度的混乱。为避免陷入困境，就产生了对`标准化`的需求。这类似于拥有设计模式来解决常见的软件开发挑战。有几种类型的标准需要考虑。一些标准对于需要交互的软件组件能够“说同一种语言”至关重要。例如，OpenAPI
    规范为使用 YAML 或 JSON 文档定义 REST API 提供了标准，这些文档对人类和机器都是可读的。CloudEvents 规范旨在定义通用的事件结构，以便广泛的应用程序能够无缝理解其他应用的事件。其他标准，如容器网络接口（CNI）和容器存储接口（CSI），侧重于定义接口，让供应商特定的插件能够以统一的方式与各种容器运行时通信。技术负责人和架构师面临的最大挑战之一，就是应对开源项目的洪流。担任这些角色的人在设计和构建基于云的解决方案时，面临着依赖哪些开源项目的问题。由于这些项目大多数相对较新且仍不成熟，因此存在随着时间推移，一些项目被废弃或在开源竞争中失去优势的风险。换句话说，如果能有某种由行业认可的参考架构，换句话说，就是一系列符合合理要求、安全可靠的“毕业项目”集合，供设计面向云的解决方案时选用，那将是非常好的。为满足这一需求，领先的云提供商、独立软件供应商、技术驱动型公司以及学术和非营利组织共同创建了`云原生计算基金会`（CNCF）。CNCF
    承载了整个面向云和容器的开源项目生态系统，并在其发展过程中提供支持。被接受加入 CNCF 项目组合的项目，根据其成熟度和采用情况进行分级。有三个等级：沙箱、孵化和毕业。对于技术负责人和架构师，CNCF
    在为构建的解决方案选择组件时，提供了一个方便的项目全景图供参考，如图 9-2 所示。此外，CNCF 协调全球性活动，如 KubeCon + CloudNativeCon，并支持全球范围内的云原生技术聚会网络。


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig2_HTML.jpg](img/478313_1_En_9_Fig2_HTML.jpg)


    图 9-2：在构建云解决方案时选择云原生项目

    '
- fmt: '## Cloud Native


    What is cloud native? Looking at the word `native`, we could assume that a cloud-native
    tool or a component is deliberately designed for and built to fit the cloud-oriented
    industry-agreed reference architecture. We need examples to better understand
    this term and the various types of tools, applications, and components that represent
    the cloud-native ecosystem. If we refer to the CNCF definition of `cloud native`,
    we will learn the following:


    > *Cloud native technologies empower organizations to build and run scalable applications
    in modern, dynamic environments such as public, private, and hybrid clouds. Containers,
    service meshes, microservices, immutable infrastructure, and declarative APIs
    exemplify this approach.*


    The most up-to-date definition is available on GitHub at [`https://github.com/cncf/toc/blob/master/DEFINITION.md`](https://github.com/cncf/toc/blob/master/DEFINITION.md).


    ### Container and Orchestration


    The list that exemplifies cloud-native technologies starts with containers. As
    you know, containers are meant to work in the same way regardless of the underlying
    host platform. To run, containers require a `container runtime`. One of the graduated
    CNCF projects is `containerd`. As discussed in Chapter 8, `containerd` is the
    industry-standard container runtime that supervises the lifecycle of containers,
    taking care of container execution, image management, and host-system-related
    tasks such as the underlying storage or network attachments. Even if you’ve never
    heard of `containerd`, you have already worked with it, actually indirectly, because
    it is used, under the hood, by `Docker`.

    A modern-architecture solution is usually composed of a large number of containerized
    applications that have to interact with each other and be easy to scale out or
    be rescheduled to other underlying host nodes in the case of failure. In other
    words, their lifecycle must be taken care of in a broader sense and in a wider
    context than just the scope of a single host machine. `Kubernetes` was the first
    CNCF-graduated project donated to the foundation by Google. Its task is to provide
    a pluggable platform for running and managing containerized applications across
    multiple hosts. `Kubernetes` takes care of the container lifecycle and makes sure
    that the desired state is always met. For example, if one of the host nodes abruptly
    fails, the containerized applications on that node will be eventually rescheduled
    (re-created) on another worker node to meet the expected count of replicas. What
    `Kubernetes` does at its core is called `container orchestration and scheduling`.
    From a developer point of view, it comes with other crucial features such as API-driven
    declarative `Kubernetes` objects that encapsulate or abstract application components
    such as grouping containers called `pods`, `services`, `volumes`, `jobs`, `deployments`,
    and many more. You worked with a few of these types in the previous chapter.


    ### Image Registries and Service Mesh


    Containerized applications are based on multilayered container images. The images
    have their own lifecycle and are stored in `container image registries`. Container
    platforms such as `Kubernetes` dynamically fetch images from the image registries
    to create containers as defined by the expected state declared by developers.
    CNCF hosts image registry projects such as `Docker Registry`, `JFrog Artifactory`,
    `Quay`, and `Harbor`, to name a few.

    Various nonfunctional aspects of the interactions between containerized services
    such as security or observability can be handled using lightweight proxies installed
    as sidecar containers within each `Kubernetes` pod. These proxies form another
    layer called a `service mesh`. A service mesh simplifies communication between
    containerized services and provides out-of-the-box features such as service discovery,
    retries, load balancing, or circuit-breaking. Using a service mesh removes the
    burden of implementing these nonfunctional interservice communication tasks from
    the developer. `Linkerd` is a CNCF-incubating service mesh project. You may also
    have heard about `Istio`, which is another service mesh project hosted by CNCF.


    ### Serverless and the Broader Ecosystem


    A new trending model of running applications with no server management at all
    is called `serverless` and belongs to the cloud-native ecosystem as well. `Fn
    Project` is an exemplification of a serverless platform built from scratch for
    containers.

    Container runtimes, orchestration platforms, image registries, service mesh, or
    serverless frameworks are just the tip of the iceberg. To bring a complete cloud-based
    solution into existence, there are many other types of cloud-native components
    to be included such as service discovery, key management, streaming, messaging,
    continuous delivery, API gateways, monitoring, logging, tracing, and others.


    ### The CNCF Cloud Native Landscape


    CNCF groups the open source projects it hosts together with selected proprietary,
    but still ecosystem-related, solutions using a convenient map called CNCF Cloud
    Native Landscape available at [`https://landscape.cncf.io`](https://landscape.cncf.io).
    This map is supposed to help tech leads and architects follow a rapidly changing
    and evolving cloud-native stack. To give you the initial impression of how broad
    and diverse this ecosystem is, take a look at Figure 9-3.


    ![../images/478313_1_En_9_Chapter/478313_1_En_9_Fig3_HTML.jpg](images/478313_1_En_9_Chapter/478313_1_En_9_Fig3_HTML.jpg)

    *Figure 9-3 CNCF `cloud-native landscape`*


    ### Oracle Cloud and Cloud Native


    This book is about Oracle Cloud. You learned about containers in the previous
    chapter. Now, it is time to experience the impact of cloud-native open source
    projects on Oracle Cloud.

    Oracle is a CNCF platinum member. It has contributed a container-based serverless
    open source project called the `Fn Project` to the CNCF cloud-native ecosystem.
    Oracle Cloud features `Oracle Kubernetes Engine` (`OKE`), a fully managed, hosted
    Kubernetes engine certified by CNCF. You worked with `OKE` in the previous chapter.
    Oracle Linux comes with a certified Kubernetes distribution available as part
    of Oracle Container Services for use with Kubernetes. Last but not least, two
    leading relational databases, the open source `MySQL` and the proprietary `Oracle
    Database`, are referenced in the CNCF landscape. Furthermore, Oracle Cloud uses
    to some extent other CNCF open source projects. For example, Oracle Cloud Infrastructure
    events are compliant with an event structure as defined by the industry-standard
    CNCF project called `CloudEvents`.


    ### Next Steps


    It is time to do some hands-on exercises. We are about to delve into Oracle Functions,
    which is a function as a service (FaaS) based on the open source `Fn Project`.
    In other words, let’s take a look at serverless computing.'
