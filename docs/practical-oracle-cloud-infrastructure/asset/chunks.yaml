    ```


    提示： 如果你收到一个 `docker login` 错误，提示找不到具有给定命名空间的租户，你可能使用了租户名称而不是租户命名空间。请使用租户命名空间来标记镜像并登录
    OCIR。你可以使用 `oci os ns get` 命令来找出你的租户命名空间。


    现在，你可以验证镜像已成功推送到 OCIR，成为一个新的私有 Docker 仓库。这次，我以 `sandbox-admin` 身份登录到 OCI 控制台。如果你以
    `sandbox-user` 登录，将无法列出 Docker 仓库，因为我们设置的策略只允许 `sandbox-admins` 组成员执行此操作。图 8-14
    展示了新创建的仓库，它代表了新推送的 `uuid:1.0` 镜像。访问字段表明我们正在处理一个私有仓库，仅对成功认证和授权的 IAM 用户可见。在用户字段中，你可以看到创建该仓库的用户的
    OCID。图 8-15 展示了一个具体镜像版本的详细信息。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig15_HTML.jpg](img/478313_1_En_8_Fig15_HTML.jpg)

    *图 8-15: 查看 OCIR 仓库镜像*


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig14_HTML.jpg](img/478313_1_En_8_Fig14_HTML.jpg)

    *图 8-14: 查看 OCIR 仓库*


    该镜像已存在于 OCIR 中。


    ### 容器管理


    设想一下配置一个负载均衡器前置的实例池。在实例池中，每个计算实例在启动时使用 Docker 并拉取一个镜像，以运行多个（例如三个）基于 `uuid:1.0`
    镜像的容器。这样，大量的 UUID API 实例将能够处理通过负载均衡器传入的真正高需求的请求流。这在概念上如图 8-16 所示。


    ![../images/478313_1_En_8_Chapter/478313_1_En_8_Fig16_HTML.jpg](img/478313_1_En_8_Fig16_HTML.jpg)

    *图 8-16: 在多台虚拟机上运行容器化应用的多个实例*


    这可能运行良好，并且你将有机会根据需求增长手动或通过自动扩缩机制横向扩展计算实例的数量，或者在需求减少时缩减它们。


    不过，请花点时间考虑几个挑战。


    *   通过引入更新的镜像版本来升级所有运行中的容器

    *   添加基于不同镜像的其他容器

    *   更改每个计算实例的容器数量


    乍一看，你只需要将相关镜像推送到 OCIR，并根据你遵循的实例初始化风格调整云配置文件、Terraform 提供程序或 Ansible Playbook。然而，如果你更深入地审视这些挑战，你会开始问自己以下问题：


    *   我如何在这些实例上安全管理认证令牌？

    *   我如何避免服务中断？

    *   如果我必须处理不同容器化应用程序之间的依赖关系，该怎么办？

    *   如果多个计算实例上的各种容器化应用程序需要相互交互，我实际上如何管理它们之间的虚拟网络？

    *   一个容器如何发现并与其它容器通信？


    如你所见，有时——我敢说经常——仅仅启动一个实例池，在每个实例上运行容器化应用并由负载均衡器前置是不够的。我列出的这些问题证明，你需要一个更复杂、更强大的机制来管理容器，并支持容器化应用程序的完整生命周期。这就是容器编排发挥作用的地方。


    ## 容器编排


    现代的后端系统由许多相互交互的应用程序和属于更专业化系统的应用模块组成。这种方法随着多年前面向服务架构（SOA）的到来而得到强化。从那时起，SOA 已被广泛采用。面向服务是一种设计范式，其中优选无状态的软件组件被视为*服务*，它们通过描述良好的
    API 提供其功能。这种方法导致个体软件能力之间更细粒度的划分，并带来了对个体服务之间各种类型交互需求的增加。


    在操作系统的上下文中，将每个服务作为独立进程运行将是一项相当繁琐的任务。这就是为什么服务传统上被部署到*应用服务器*上的原因，这些应用服务器完成了许多关键的非功能性任务，例如管理依赖关系、提供资源注入、提供安全性、持久化状态、交付监控能力以及实现
    API。服务开发人员受益于将这些支持任务委托给应用服务器，因为他们能够专注于服务代码中的功能目标。然后，应用服务器可以组合成集群，以实现负载分发和高可用性。此外，依赖关系是在应用服务器级别安装和注册的，因此与服务代码解耦。乍一看，这听起来绝对美妙，就像是企业软件的终极解决方案。然而，它可能导致——并且经常导致——在将特定服务从一个环境迁移到另一个环境时出现问题。在应用服务器的世界里，开发人员通常将他们的部署工件连同所需的依赖项列表一起交给运维团队，后者的角色是在各种环境中安装服务，并在需要时将它们接入消息总线。有时，不同环境的配置差异如此之大，以至于由于属性不正确或库版本不兼容而出现意外问题。要将服务部署到给定的应用服务器，服务代码必须遵守特定应用服务器支持的标准和实现的接口。例如，你将
    Java EE 应用部署到兼容 JEE 的服务器，将 Python 应用部署到兼容 WSGI 的 Web 服务器，将 .NET 应用部署到 Microsoft
    IIS。

