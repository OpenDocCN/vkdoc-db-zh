- fmt: '## Compartments


    Oracle Cloud Infrastructure uses *compartments* to group related cloud resources.
    Nearly every cloud resource, such as compute instance, object storage bucket,
    or managed Kubernetes cluster, must belong to just one compartment. You decide
    in which compartment a newly created cloud resource will exist while creating
    that resource. If you find out you need to move a resource to a different compartment,
    you will have to terminate the old one and provision a new one with the same configuration
    in a target compartment, unless the particular cloud resource type supports moving
    between compartments. Compartments provide logical isolation, which makes it much
    easier to govern the management permission policies and track the costs incurred
    by the related groups of resources. The isolation is purely logical. This means
    that it is still technically possible to let the resources, for example, compute
    instances, in one compartment communicate with the resources, for example, other
    compute instances and object storage buckets, in another compartment. There are
    three reasons to use compartments.


    *   Easier resource management

    *   Granular access control

    *   Cost split


    First, it is easier to understand what the assets in your cloud tenancy are and
    manage these resources if you logically group the related resources. In this way,
    you are able to apply more precise filters to your queries and receive shorter
    and more accurate lists of results. This becomes even more visible as the number
    and the variety of your cloud resources start to grow. Second, compartments normally
    become the primary scope of your access control policy statements. The statements
    are stored in documents called identity and access management *policies*. Each
    statement will allow some kind of access to a particular type of cloud resource
    that exists in a given compartment. At this stage, it is worth noting that child
    compartments inherit the access management policies from their parent compartments.
    Third, you can *filter costs* by compartment and know what cloud resource consumption
    costs are incurred by each project environment and production system as long as
    you choose to use different compartments for each of them.


    Compartments are global, and every individual compartment spans all regions your
    cloud account is subscribed to. It is possible and in many cases advised to arrange
    your compartments in a hierarchical structure that can consist of up to six levels
    of child compartments. If you are working on a single proof-of-concept project
    or are just learning OCI, you will most probably store all your cloud resources
    in a single compartment. You could call it `Sandbox` or anything more meaningful
    to you. As soon as you consider working with multiple projects and running a set
    of production systems in your cloud tenancy, you ought to carefully plan the compartment
    hierarchy. How would you usually approach this task? Well, it is easy to spot
    that the most natural candidates to derive your compartment hierarchy from are
    project environments and production systems. Why? Simply because they are the
    ones that usually provide the typical context for resource management, access
    control, and cost tracking—the three main reasons to use compartments. This approach
    is illustrated in Figure [4-2](#478313_1_En_4_Chapter.xhtml#Fig2).


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig2_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig2_HTML.jpg)


    Figure 4-2 Deriving compartment hierarchy


    There is always one root compartment in your cloud account. This is the root node
    in our compartment hierarchy as well. If we were to follow the example, we would
    create two separate compartments: one for projects (`Projects`) and one for production
    systems (`Systems`). Next, we would create three child compartments inside the
    `Systems` compartment: `MID`, `IDM`, and `IP`. In this way, the cloud resources
    that logically belong to the IDM production system would reside in the `Systems/IDM`
    compartment. Similarly, we would create two child compartments inside the `Projects`
    compartment: `ImageProcessing` and `ImageDataMangement`. Subsequently, we would
    finally create two further child compartments in each project-specific compartment
    for the development and test environments. Again, this would let you keep the
    assets specific to the Image Processing project and its development environment
    inside `the Projects/ImageProcessing/Development` compartment. It’s as simple
    as that. Figure [4-3](#478313_1_En_4_Chapter.xhtml#Fig3) presents the expected
    compartment structure as you would see it in the OCI Console compartment scope
    filter.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig3_HTML.jpg](images/478313_1_En_4_Chapter/478313_1_En_4_Fig3_HTML.jpg)


    Figure 4-3 OCI Console compartment scope filter


    ### 容器管理操作


    We will now move to the practical part and see what the options are to display,
    create, and delete compartments. If you’ve read Chapter [2](#478313_1_En_2_Chapter.xhtml),
    you should already know how to create a compartment using the OCI Console. This
    was one of our first tasks when we created a `Sandbox` compartment. To browse
    through the compartments in the OCI Console, you need to go to `Menu` ➤ `Identity`
    ➤ `Compartments`.


    What you are going to see is a list of your level 1 compartments, as shown in
    Figure [4-4](#478313_1_En_4_Chapter.xhtml#Fig4).


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig4_HTML.png](images/478313_1_En_4_Chapter/478313_1_En_4_Fig4_HTML.png)


    Figure 4-4 Compartment list (level 1) in *the*OCI Console


    You need to click the name of a particular compartment to see its details as well
    as a detailed list of the child compartments it contains. Here, you can alter
    the name and description of a compartment, check its OCID, and manage its child
    compartments. Figure [4-5](#478313_1_En_4_Chapter.xhtml#Fig5) presents the Compartment
    Details view for the `Sandbox` compartment.


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig5_HTML.png](images/478313_1_En_4_Chapter/478313_1_En_4_Fig5_HTML.png)


    Figure 4-5 Compartment Details view in *the* OCI Console


    To add a new child compartment in the OCI Console, you just need to click the
    `Create Compartment` button and provide the required details.


    Note


    The code snippets from this book have been tested on macOS and Windows Subsystem
    for Linux. Moreover, all commands should work on the major Linux distributions.
    If you are using Windows and do not want to use Windows Subsystem for Linux, you
    can always run Linux on a VM. Furthermore, the majority of code snippets may also
    work in Git Bash on Windows.


    As expected, you can use the OCI CLI to create a new compartment. If you’ve completed
    all the steps described in Chapter [3](#478313_1_En_3_Chapter.xhtml), your CLI
    should be already configured to work with the `Sandbox` compartment by default.
    Run this command to output the name of the compartment set in your CLI settings
    as the default:


    ```

    $ oci iam compartment get --output table --query ''data.{Name:"name"}''

    +---------+

    | Name    |

    +---------+

    | Sandbox |

    +---------+

    ```


    If you see a different name and would still like to create a child compartment
    in the `Sandbox` compartment, you can either adapt the `oci_cli_rc` file or use
    the `-c` parameter that takes any valid compartment OCID. The second option is
    faster and gives you more flexibility. I have described both ways in the previous
    chapter. For example, to run the same command in the context of a different compartment,
    you can do the following:'
