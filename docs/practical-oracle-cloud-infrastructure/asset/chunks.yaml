    ```

    $ oci os ns get

    {

    "data": "jakobczyk"

    }

    ```


    The object storage namespace name is immutable and does not change. The name of
    the object storage namespace is a random and unique string. Older tenancies, such
    as mine, may have their namespace name the same as tenancy name. You may recall
    that, in Chapter [2](#478313_1_En_2_Chapter.xhtml), I wrote that every Oracle
    Cloud Infrastructure cloud resource is uniquely identified with a structured identifier
    called an OCID. Well, there are exceptions to that rule: buckets and objects are
    uniquely identified by names. They are always named in the context of the namespace
    dedicated to your cloud tenancy, as shown in Figure [5-2](#478313_1_En_5_Chapter.xhtml#Fig2).


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig2_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Namespace, bucket, and object


    At this stage, I need to note that object storage in Oracle Cloud Infrastructure
    is regional in scope. This basically means that a particular bucket, together
    with the objects it stores, resides in the region in which the bucket was initially
    created. If you find yourself needing to perform cross-regional object transfers
    to another bucket located in a different region, there is an API that supports
    this kind of operation.


    ## Working with Objects


    Buckets in which objects reside are either public or private. To protect the data
    most of the time, you will be using private buckets, but you are free to create
    public buckets whenever you want. There are two types of authenticated groups
    that can access objects in private buckets.


    *   IAM users


    *   Instance principals


    I will explain each of these two types of access in the upcoming sections. In
    addition, you are able to let unauthenticated clients access particular objects
    in private buckets by issuing pre-authenticated requests that are valid for a
    given period of time. Anyone who knows the link is able to access the particular
    object. Pre-authenticated requests will be covered at the end of this chapter.


    To prepare for the exercises, we need a quick recap. In the previous chapter,
    I asked you to create two users, `sandbox-admin` and `sandbox-user`, and two corresponding
    groups, `sandbox-admins` and `sandbox-users`. Then, in the root compartment, we
    created a new IAM policy (`sandbox-admins-policy`) with a single *IAM policy statement*
    that granted the full administration access over the `Sandbox` compartment to
    the members of `sandbox-admins` group .


    ```

    allow group sandbox-admins to manage all-resources in compartment Sandbox

    ```


    Please make sure this setup is still in place before proceeding. You will need
    it in order to complete the walk-throughs in this chapter. To demonstrate some
    basic features of object storage, you are going to create a bucket and upload
    a set of files using CLI as the `sandbox-user` user. Next, we will use other commands
    for bulk operations, prefix-based lists with paging, and custom metadata. You
    will also learn how to handle concurrent updates. All CLI commands use Oracle
    Cloud Infrastructure REST APIs that are conceptually illustrated in Figure [5-3](#478313_1_En_5_Chapter.xhtml#Fig3).


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig3_HTML.jpg](images/478313_1_En_5_Chapter/478313_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Interacting with the object storage API


    Let’s look at the basic interactions with object storage. We will perform them
    using the CLI. Again, the CLI commands you are about to issue will simply result
    in API requests, as described in Chapter [3](#478313_1_En_3_Chapter.xhtml).'
