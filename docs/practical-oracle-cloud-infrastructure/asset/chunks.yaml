    ```

    [ubuntu@dev-vm]$ docker ps --format ''{{.Names}} [{{.Image}}] {{.Status}}''

    fnserver [fnproject/fnserver:latest] Up 4 minutes

    ```


    Let me repeat: function instances will be created as separate containers. The
    local `fnserver` coordinates function containers, which are created on the fly
    when functions are triggered. Equipped with that knowledge, you should know what
    to expect. This is how you make your first serverless function call using the
    `fn invoke` command:


    ```

    [ubuntu@dev-vm]$ fn invoke blankapp blankfn

