    \ OCPU，这实际上意味着操作系统可见的两个 vCPU。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig34_HTML.jpg](img/478313_1_En_6_Fig34_HTML.jpg)\n\
    **图 6-34 查看扩容前的实例**\n\n1.  单击新配置实例的名称以查看实例详情。\n2.  在“资源”菜单中，选择“引导卷”。\n\n您眼前将出现附加到该实例的引导卷。什么是引导卷？很简单。*引导卷*是一个块卷，操作系统、根文件系统以及有时额外的软件驻留在其中。它基于您选择的映像创建，无论它只是一个基础操作系统映像，还是带有额外软件的自定义映像。换句话说，您可以认为引导卷是存储特定实例部分状态的地方。图\
    \ 6-35 显示了实例的引导卷。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig35_HTML.jpg](img/478313_1_En_6_Fig35_HTML.jpg)\n\
    **图 6-35 查看实例的引导卷**\n\n引导卷与其初始父实例在相同的可用性域中创建。您可以清楚地看到作为此引导卷模板的映像。在我的例子中，它是`CentOS\
    \ 7`（2019 年 4 月版本）。默认启用静态加密。对于基于 VM 的规格，您可以考虑使用传输中加密。在许多情况下，可能不需要，因为实例和块存储之间的底层\
    \ iSCSI 数据交换无论如何都在内部网络上进行。引导卷的大小必须大于或等于映像的大小，但不能小于 50GB，某些选定的基础映像有例外情况。最后但同样重要的是，最好了解卷可以调整大小，但此操作必须在分离的卷上执行。\n\
    \n尽管引导卷在实例启动期间与计算实例一起创建，但引导卷仍然是常规的云资源，其生命周期可以与计算实例分离。这使您能够*分离*引导卷并将其*附加*到新的计算实例，而该新实例最终可能使用更强大的规格。这样，您所做的无非是进行实例的垂直扩容。\n\
    \n是时候返回到实例指标并确认基于`stress-ng`的服务确实产生了大约 60%的 CPU 利用率了。\n\n1.  在“资源”菜单中，选择“指标”。\n\
    2.  单击“CPU 利用率”小部件，并调整 X 轴。\n\n如果您等待几分钟，您将能够看到，如图 6-36 所示，实例正如我们所期望的那样繁忙，即 60%。一旦我们将核心数加倍，CPU\
    \ 利用率应降至 30%左右。\n\n![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig36_HTML.jpg](img/478313_1_En_6_Fig36_HTML.jpg)\n\
    **图 6-36 查看实例（一个 OCPU）的 CPU 利用率**\n\n2020 年 1 月，Oracle Cloud Infrastructure 将为计算实例引入便捷的、API\
    \ 驱动且全自动的垂直扩容功能。对于大多数规格，您将能够使用`UpdateInstance` API 来更新任何现有实例的规格，使其更强大或稍弱。正在运行的实例将重新启动，但您可以预期实例的\
    \ IP 地址、VNIC 和卷附件将保持不变。将新规格应用于正在运行实例的 CLI 命令将如下所示：\n```\noci compute instance\
    \ update --instance-id $INSTANCE_OCID --shape VM.Standard2.2 --wait-for-state\
    \ RUNNING\n```\n\n如果您阅读本书的时间足够晚，此功能可能已可用。然而，为了即将进行的练习的目的，请不要在此阶段执行`oci compute\
    \ instance update`命令。如果您已经执行了，请将实例缩回`VM.Standard2.1`规格，然后再继续。\n\n或者，一直以来还有另一种对实例进行垂直扩容的方法。此方法涉及分离引导卷、关闭旧实例并重用引导卷启动一个新实例。我将使用\
    \ Terraform 来解释它。假设您想将`compute.tf`基础设施代码文件中的规格名称替换。让我模拟这样的更改，并解释您可能陷入的陷阱。好吗？您只是观看。我正在注释掉旧行并添加一个新行，这次使用更强大的规格(`VM.Standard2.2`)，如下所示：\n\
    ```\nresource \"oci_core_instance\" \"vm\" {\n...\n#  shape = \"VM.Standard2.1\"\
    \nshape = \"VM.Standard2.2\"\n...\n}\n```\n\n运行`terraform plan`可以解释如果我选择应用此基础设施代码修改会发生什么：\n\
    ```\n$ terraform plan\n...\nTerraform will perform the following actions:\n-/+\
    \ oci_core_instance.vm (new resource required)\n...\nboot_volume_id: \"ocid1.bootvolume.oc1..........w37sra\"\
    \ => \n...\nimage: \"ocid1.image.oc1..........ai3kha\" => \n...\nshape: \"VM.Standard2.1\"\
    \ => \"VM.Standard2.2\" (forces new resource)\n...\nPlan: 1 to add, 0 to change,\
    \ 1 to destroy.\n```\n\n**注意**\n如果您看到*0 to add, 1 to change, 0 to destroy*，则意味着便捷、全自动且\
    \ API 驱动的垂直扩容功能不仅已在 OCI API 中启用，而且在 Terraform Provider 插件中也已启用。在这种情况下，下面描述的问题将不再适用。但是，您仍然可以按照以下描述执行半手动的垂直扩容方法。事实上，它仍然会教您如何分离和重新附加引导卷。\n\
    \n`terraform plan`命令的输出显示*1 to add, 0 to change, 1 to destroy*。嗯，乍一看，您可能认为我们无论如何都期望这个计算实例被终止，并启动一个更强大的新实例。正确。这里的问题是，新实例也将获得一个全新的引导卷，该卷是再次从最新的`CentOS\
    \ 7`基础操作系统映像构建的。此行为在基础设施代码的`source_details`对象中定义：\n```\n# data.tf\n...\ndata \"\
    oci_core_images\" \"centos_image\" {\n  compartment_id = var.tenancy_ocid\n  operating_system\
    \ = \"CentOS\"\n  operating_system_version = 7\n}\n...\n# compute.tf\nresource\
    \ \"oci_core_instance\" \"vm\" {\n...\n  source_details {\n    source_id = data.oci_core_images.centos_image.images[0].id\n\
    \    source_type = \"image\"\n  }\n...\n}\n```\n"
- fmt: 'Within the `source_details` object, the `source_type` still suggests that
    a new boot volume has to be created based on the image specified with the `source_id`
    attribute.


    I hope you understand now why a simple shape replacement in the infrastructure
    code file won’t work and may even be harmful because any application state persisted
    in the root file system would be lost. Talking about application state in the
    root file system, the `cloud-config` file has not only added a new `stress-ng`-based
    `systemd` service but also created a tiny text file containing the initial boot
    timestamp. We are going to use this timestamp to validate whether we are still
    using the same boot volume after having scaled the instance vertically up. First,
    connect to the instance and note the contents of this tiny file:


    ```

    $ ssh -i ~/.ssh/oci_id_rsa opc@$INSTANCE_PUBLIC_IP

    [opc@vm-1-ocpu ~]$ cat datemarker

    Sat Apr 27 17:01:34 GMT 2019

    [opc@vm-1-ocpu ~]$ exit

    ```


    ## To scale an instance vertically, these are the steps you have to perform


    1.  Stop the old instance while preserving the boot volume.


    2.  Detach the boot volume.


    3.  Create a new instance using the detached volume.


    ### Adapt the Terraform infrastructure code


    We are going to adapt the Terraform infrastructure code to transfer the instance
    into a stopped state. If you are on Linux or using Windows Subsystem for Linux,
    use the following `sed` command to uncomment currently commented blocks in the
    `compute.tf` file in the `chapter06/3-instance-scale-up` directory:


    ```

    $ pwd

    /Users/michal/git/oci-book/chapter06/3-instance-scale-up/infrastructure

    $ sed -i ''s/\/\*//; s/\*\///'' compute.tf

    ```


    If you are on macOS, use the following `sed` command:


    ```

    $ sed -i ''.bak'' -e ''s/\/\*//; s/\*\///'' compute.tf

    ```


    This will uncomment the code by removing all block comment marks (`/*` and `*/`)
    in the `compute.tf` file, as shown in Listing [6-13](#478313_1_En_6_Chapter.xhtml#PC34).


    ```

    resource "oci_core_instance" "vm" {

    ...

    ...

    # 1\. Stop the instance

    state = "STOPPED"

    preserve_boot_volume = true

    }

    output "vm_bootvolume_ocid" {

    value = oci_core_instance.vm.boot_volume_id

    }

    Listing 6-13

    compute.tf (Root Module) Part to Uncomment

    ```


    Run `terraform plan`. You see something like this:


    ```

    $ terraform plan

    An execution plan has been generated and is shown in the following.

    Resource actions are indicated with the following symbols:

    + create

    ~ update in-place

    Terraform will perform the following actions:

    ~ oci_core_instance.vm

    preserve_boot_volume:             "" => "true"

    state:                           "RUNNING" => "STOPPED"

    ...

    Plan: 0 to add, 1 to change, 0 to destroy.

    ```


    Run `terraform apply`.


    ```

    $ terraform apply -auto-approve

    ...

    Apply complete! Resources: 0 added, 1 changed, 0 destroyed.

    Outputs:

    vm_public_ip = 130.61.48.49

    image_name = CentOS-7-2019.04.15-0

    vm_bootvolume_ocid = ocid1.bootvolume.oc1....w37sra

    ```


    We have output the OCID of the boot volume. Now, we are moving to detach the volume
    from the instance. For this task, we are going to employ the OCI CLI.


    > **Note**

    >

    > It is of course possible and really quick to use the OCI Console to detach a
    particular boot volume, but in the course of the book, we prefer automation over
    manual interactions with the user interface.


    Why can we not stay consistent and continue using Terraform alone for this action
    as well? If you look into each infrastructure code file, you won’t find any resource
    representing the boot volume that came with the instance. At the time of provisioning,
    the lifecycle of the instance and its boot volume were not separated. Therefore,
    we cannot use Terraform alone. This is one of the cases where a solid blend of
    a declarative infrastructure code (`Terraform`) approach and imperative programming
    techniques (`CLI`) are both required to accomplish the task. To detach the boot
    volume from an instance, follow these steps:


    ```

    $ BOOTVOLUME_OCID=`terraform output "vm_bootvolume_ocid"`

    $ echo $BOOTVOLUME_OCID

    ocid1.bootvolume.oc1....w37sra

    $ BOOTVOLUME_AD=`oci bv boot-volume get --boot-volume-id $BOOTVOLUME_OCID --query
    ''data."availability-domain"'' --profile SANDBOX-ADMIN | sed ''s/["]//g''`

    $ echo $BOOTVOLUME_AD

    feDV:EU-FRANKFURT-1-AD-1

    $ BOOTVOLUME_ATTACHMENT_OCID=`oci compute boot-volume-attachment list --availability-domain
    $BOOTVOLUME_AD --boot-volume-id $BOOTVOLUME_OCID --query ''data[0].id'' --profile
    SANDBOX-ADMIN | sed ''s/["]//g''`

    $ echo $BOOTVOLUME_ATTACHMENT_OCID

    ocid1.instance.oc1....gnzzyq

    $ oci compute boot-volume-attachment detach --boot-volume-attachment-id $BOOTVOLUME_ATTACHMENT_OCID
    --wait-for-state DETACHED --force --profile SANDBOX-ADMIN

    Action completed. Waiting until the resource has entered state: DETACHED

    ```


    We began by using the `terraform output` command to persist one of the outputs
    that contains the OCID of the boot volume into a variable. In the next step, we
    used the `oci bv boot-volume get` CLI command to extract the name of the availability
    domain in which both the instance and the volume are located. Consequently, we
    used the `oci compute boot-volume-attachment list` CLI command to fetch the name
    of the boot volume attachment. At the time of writing, the OCID of the boot volume
    attachment is the same as the OCID of the instance, but to avoid problems in the
    case of any future changes, we followed the most reliable procedure to obtain
    the OCID of the attachment. Finally, we issued the `oci compute boot-volume-attachment
    detach` CLI command to trigger the asynchronous job that detaches the volume.
    We applied the `--wait-for-state DETACHED` option to keep the steps blocking and
    thus make it effectively synchronous. Additionally, we used the `--force` option
    to skip the confirmation prompt. You will find both options useful in case you
    decide to automate these steps as a single “scale-up” pipeline together with `Terraform`-based
    steps. All in all, the few commands will eventually cause the detachment operation
    of a boot volume, as shown in Figure [6-37](#478313_1_En_6_Chapter.xhtml#Fig37).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig37_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig37_HTML.jpg)


    *Figure 6-37 Observing a boot volume while detaching*


    ### To view the boot volume in OCI Console


    You have to perform the following:


    1.  Go to Menu ➤ Compute ➤ Boot Volumes.


    2.  Make sure that the `Sandbox` compartment is selected.


    Although the volume has been detached, it is still listed as present. It is shown
    in Figure [6-38](#478313_1_En_6_Chapter.xhtml#Fig38). This was exactly our goal.


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig38_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig38_HTML.jpg)


    *Figure 6-38 Viewing a boot volume in the OCI Console*


    If you open the boot volume details view and choose the Attached Instances in
    the Resources menu, you will see that there are no compute instances attached
    to that volume anymore. At the same time, the original instance we launched earlier,
    together with the boot volume, reports that the boot volume is effectively detached,
    as shown in Figure [6-39](#478313_1_En_6_Chapter.xhtml#Fig39).


    ![../images/478313_1_En_6_Chapter/478313_1_En_6_Fig39_HTML.jpg](images/478313_1_En_6_Chapter/478313_1_En_6_Fig39_HTML.jpg)


    *Figure 6-39 Viewing a detached boot volume*


    We are now ready to terminate the old and launch a new, more powerful compute
    instance using the boot volume we’ve just detached from the old instance. The
    new instance must be launched in the same availability domain.


    > **Caution**

    >

    > You have to be careful not to re-initialize the new instance with `cloud-init`.
    Otherwise, you may corrupt the application state on this new instance, which is
    provisioned using an existing boot volume. In our case, the new, more powerful
    instance attached to an existing boot volume will use no `cloud-config` at all.'
