    Perfect. Now, we are ready to define a new dynamic group and its matching rule.


    ### Dynamic Groups


    The members of a *dynamic group* can be only the compute instances running in
    Oracle Cloud Infrastructure that fulfill the conditions defined in the matching
    rule associated with the dynamic group. The matching rule will be provided when
    a dynamic group is created. We are going to accept, as the dynamic group members,
    all compute instances that carry the `realestate` tag key defined in the `test-projects`
    namespace. This is a matching rule we need to use:


    ```

    tag.test-projects.realestate.value

    ```


    Dynamic groups just like standard groups exist in the scope of the entire tenancy.
    As a result, the `sandbox-admin` user won’t be able to create a new dynamic group
    because it can manage only the resources within the `Sandbox` compartment. This
    is why we are going to use the default CLI profile that represents the tenancy
    administrator and create a new dynamic group on behalf of the tenancy admin.


    Tip


    If you do not have access to the tenancy admin account, please ask your cloud
    account admin to create this dynamic group for you.


    To create a new dynamic group and explicitly indicate the tenancy-level scope,
    use the `oci iam dynamic-group create` command like this:


    ```

    $ TENANCY_OCID=`cat ~/.oci/config | grep tenancy | sed ''s/tenancy=//''`

    $ MATCHING_RULE="tag.test-projects.realestate.value"

    $ oci iam dynamic-group create --name realestate-instances --description "Instances
    related to the real-estate project" --matching-rule $MATCHING_RULE -c $TENANCY_OCID

    {

    "data": {

    "compartment-id": "ocid1.tenancy.oc1..aa.........3yymfa",

    "description": "Instances related to the real-estate project",

    "id": "ocid1.dynamicgroup.oc1..aa.........hkt7dq",

    "inactive-status": null,

    "lifecycle-state": "ACTIVE",

    "matching-rule": "tag.test-projects.realestate.value",

    "name": "realestate-instances",

    "time-created": "2019-03-20T20:59:36.353000+00:00"

    },

    "etag": "4c007061997871d3f5ac4a98a225f71be509ac25"

    }

    ```


    We have defined the matching rule as the `MATCHING_RULE` variable and passed it
    to the `--matching-rule` argument of the `oci iam dynamic-group create` CLI command.
    The command was issued with no explicit `--profile`; therefore, the CLI used the
    default profile that we configured, back in Chapter [3](#478313_1_En_3_Chapter.xhtml),
    to use the tenancy admin credentials. The new dynamic group was called `realestate-instances`.


    With the new dynamic group in place, we are ready to add a new permission statement
    to an existing policy. The policy syntax for standard groups and dynamic groups
    is virtually the same, with the exception of using the `dynamic-group` term instead
    of the `group` term. This statement allows the instance principals of the newly
    created dynamic group to manage objects in the `Sandbox` compartment.


    ```

    allow dynamic-group realestate-instances to manage objects in compartment Sandbox
    where target.bucket.name=''blueprints''

    ```


    We are going to reuse the same policy that was created earlier in this chapter.
    To perform an update, we need a file with all statements that are to be present
    within the policy. Listing [5-8](#478313_1_En_5_Chapter.xhtml#PC46) presents the
    two existing and the third, new statement.


    ```

    [

    "allow group sandbox-users to read buckets in compartment Sandbox where target.bucket.name=''blueprints''",

    "allow group sandbox-users to manage objects in compartment Sandbox where target.bucket.name=''blueprints''",

    "allow dynamic-group realestate-instances to manage objects in compartment Sandbox
    where target.bucket.name=''blueprints''"

    ]

    Listing 5-8

    sandbox-users.policies.storage.2.json

    ```


    The file is available in the Git repository at `oci-book/chapter05/1-policies/`.


    The policy we are about to update was originally created in the `Sandbox` compartment.
    To find this policy by name, we can use the `oci iam policy list` CLI command
    to additionally apply a local JMESPath filter to display only the policy OCID.'
