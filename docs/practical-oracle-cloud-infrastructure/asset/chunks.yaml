    \ displayed in the OCI Console, as shown in Figure [3-4](#478313_1_En_3_Chapter.xhtml#Fig4).\n\
    \n![../images/478313_1_En_3_Chapter/478313_1_En_3_Fig4_HTML.jpg](images/478313_1_En_3_Chapter/478313_1_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4\n\nFingerprint of the public key\n\nThe user is allowed to perform\
