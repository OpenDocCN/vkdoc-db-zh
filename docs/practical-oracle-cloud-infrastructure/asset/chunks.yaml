  trans: '### 区域


    几十年来，Oracle 一直是数据库系统和业务应用的全球领导者。此外，如今其信息技术解决方案组合还包括中间件平台、集成工具、商业智能和分析产品等。自收购 Sun
    Microsystems 以来，Oracle 还成为了 Java 生态系统的守护者。目前，Oracle 正致力于通过向`Oracle Cloud Infrastructure`（有时被称为第二代云基础设施）添加更多高级功能、将其
    PaaS 服务迁移至`OCI`，以及通过新建数据中心`区域`来地理性地扩展其全球版图，从而完成公司向云端的转型，如图 1-11 所示。你可以在 [`https://cloud.oracle.com/regions`](https://cloud.oracle.com/regions)
    找到最新的地图。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig11_HTML.jpg](img/478313_1_En_1_Fig11_HTML.jpg)


    图 1-11：Oracle Cloud Infrastructure 区域


    每个 `Oracle Cloud Infrastructure` *区域*由一个或多个地理位置邻近的*可用性域*组成，每个可用性域又由一个或多个数据中心构成。单个
    `区域` 内的 `可用性域` 通过低延迟、高带宽的链路互连，但在物理上仍然是隔离的，以帮助抵御突发的自然灾害，或者更常见的——设备故障的连锁反应。两个 `可用性域`
    同时故障的可能性相当小，因此，为了实现真正高可用的架构，设计云解决方案时，将云资源复制到两个甚至三个 `可用性域` 应该就足够了。


    注意：新引入的 `区域` 可能永久或仅在初始阶段提供单个 `可用性域`。


    对于不太关键的系统，可以分布在单个 `可用性域` 内的两个或三个*故障域*中。这是什么意思呢？单个 `可用性域` 内的硬件可以被划分为物理隔离的设备单元，称为*故障域*。通过这种方式，单个硬件单元内的电源故障或设备故障连锁反应可能被隔离，不会影响其他单元。在一个
    `故障域` 中配置的实例，不太可能受到源自不同 `故障域` 的技术问题的影响。尽管如此，如果可能的话，为了使你的云解决方案能够在意外情况下生存并持续运行，建议依赖
    `可用性域`。图 1-12 展示了 `区域`、`可用性域` 和 `故障域` 之间的关系。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig12_HTML.jpg](img/478313_1_En_1_Fig12_HTML.jpg)


    图 1-12：区域、可用性域和故障域


    我们能在 `Oracle Cloud Infrastructure` 上运行什么样的工作负载？让我们进入下一节来回答这个问题。


    ### 工作负载


    当你考虑迁移现有解决方案或在云端构建一个全新的服务时，你应该首先审视你将在云中处理和存储的数据。根据你所处的地理区域和法律管辖区，你通常会有法定义务遵守各种数据保护法案。实际上，在开始阶段，你应该比为云解决方案规划的应用架构更加关注这个方面。


    从纯粹的技术角度来看，只要能够成功组合出一套足够的云基础设施资源，这些资源共同构成你所开发的云解决方案的骨干，那么我们就可以说这种应用或*工作负载*确实得到了
    `Oracle Cloud Infrastructure` 的支持。如果我们被要求列举几种可以在 `OCI` 上运行的典型系统类型，我们可以列出以下应用：


    *   **多层 Web 应用**，使用在公共和私有虚拟云网络子网中配置的虚拟机或强大的专用裸机主机启动。通过适当混合使用公共和私有子网，你可以为每个应用层保持精确的隔离。

    *   分布式、面向微服务的**基于容器的系统**，运行在名为 `Oracle Kubernetes Engine` 的托管 Kubernetes 容器引擎上。

    *   **数据库承载的工作流**，无论是事务型还是分析型，均由功能完备、市场领先、完全托管的关系数据库管理系统——`Oracle Autonomous Database`
    提供支持。

    *   **高性能计算**（HPC），支持渲染、工程仿真或大数据工作负载等任务。

    *   各种**传统应用**，从其早期的本地环境直接迁移（lift-and-shifted）而来，并部署在镜像了本地硬件设置的云基础设施中。

    *   **无服务器**工作负载，使用基于开源 `Fn Project` 的 `Oracle Functions`。

    *   或者任何其他需要**额外的、峰值处理能力**的场景，这些能力超出了你当前基础设施所能提供的范围。


    最后但同样重要的是，独立专业人士也可以通过订阅自己的云租户而受益。个人开发者可以考虑使用基于云的计算实例来完成部分工作，而不是使用十几个虚拟机，以此替代笨重的、本地托管的虚拟机。再举一个例子，在云端配置一个由多个工作节点组成的托管
    Kubernetes 引擎，比在笔记本电脑本地托管的一组虚拟机上进行配置要快得多。


    ### 服务


    到目前为止，我们在本章讨论的每一项核心云能力，都是对相关云资源类型的逻辑分组。例如，计算能力可以通过计算实例、实例池或计算镜像等云资源来提供。从命名角度来看，`Oracle
    Cloud Infrastructure` 将云资源类型组织为*服务*。在本节中，我们将简要概述并描述这些 `服务` 及其最常见的云资源类型。我已将它们汇总在表
    1-1 中。


    表 1-1：Oracle Cloud Infrastructure 服务

    '
- fmt: '| Service | Selected Cloud Resource Types |

    | --- | --- |

    | Compute | `Compute instances` provide computational power to run software in
    the cloud. They are based on `images`, which specify a preinstalled software stack
    for an instance. They use `shapes` to determine the allocated virtual hardware
    profile. The instances can be provisioned stand-alone or pooled using `node pools`.
    A node pool is created based on an `instance configuration` that can be seen as
    an extended instance definition. A `vNIC attachment` cloud resource attaches a
    particular compute instance to a virtual network interface card. A vNIC gets created
    in a selected virtual cloud network subnet and connects the instance to a virtual
    cloud network. |

    | Networking | `A virtual cloud network` is a software-defined private network
    created within an Oracle Cloud Infrastructure region. It can span multiple availability
    domains. You subdivide it into one or more `subnets`. Traffic is routed based
    on the route rules created in a `route table` that gets referenced by one or more
    subnets. Access to the Internet is enabled by an `Internet gateway` you point
    to as a route rule target. `NAT gateways` let instances in private subnets establish
    outbound connections to the Internet. A subnet can reference one or more security
    lists that consist of stateful and stateless `security rules`. The rules effectively
    furnish a particular subnet with an additional layer of a virtual firewall. An
    instance that attaches to a `public IP` cloud resource is directly reachable from
    the Internet as long as the particular traffic is allowed by the security rules
    that are being enforced. |

    | Block volume | A `boot volume` holds a compute image, provides a root filesystem,
    and is used to fire up a compute instance. An instance can get additional `block
    volumes` attached to increase the available total block storage. It is possible
    to create point-in-time `volume backups` of both types of volumes. The backups
    can be either incremental or full and optionally driven by automated `volume backup
    policies`. |

    | Object storage | Data entities of any type are stored as `objects` inside virtual
    containers called `buckets` that are usually used to group related objects. The
    objects can be accessed by authenticated and authorized OCI users or with the
    use of short-living `pre-authenticated requests`. A bucket can be created as an
    `archive` only, which would decrease the cost of storage but add some time before
    an object is available for a download. Moreover, it is possible to employ `lifecycle
    policy rules` to either delete or archive an object after a given period of time
    has elapsed. |

    | File storage | A shared file storage `file system` can be created in a selected
    subnet. You attach your compute instance to a particular file system using details
    provided by a `mount target` cloud resource, which exists within the file system
    cloud resource. You can use point-in-time views called `snapshots` to implement
    a backup mechanism for your shared file system. |

    | IAM | `Compartments` are used to isolate cloud resources that usually belong
    to different projects hosted under a single cloud tenancy. You define cloud `users`
    locally or federate the tenancy with an external identity provider. A `policy`
    consists of policy statements that grant various types of access over cloud resources
    to `groups` of users. `Dynamic groups` allow matching compute instances to issue
    API calls permitted for that group. |

    | Load balancing | A `load balancer` distributes the incoming traffic to the instances
    registered in `backend sets` based on the chosen distribution algorithm. |

    | Database | OLTP applications, which have to support write-intensive, high-throughput,
    and transaction-intensive operations, can leverage `autonomous transaction processing`.
    OLAP workloads, which reinforce data warehousing and business intelligence systems,
    are meant to use `autonomous data warehouse`. The instances of both cloud resource
    types give you a fully managed Oracle database experience. |

    | Container registry | Each cloud account comes with an associated container image
    registry where you can store Docker images using public and private `repositories`.
    |

    | Container engine | The container engine for Kubernetes lets you launch fully
    managed Kubernetes `clusters` with associated `node pools` for worker nodes that
    are provisioned as compute instances. |

    | Serverless | Open source Fn Project `functions` can be deployed to the managed
    Oracle Functions service for serverless computing. |

    | DNS | The domains you own can be redirected to a DNS `zone` where custom DNS
    `records` can be created. |

    | Web Application Firewall (WAF) | Internet-facing application endpoints can be
    protected against potentially malicious and unwanted inbound traffic using a set
    of predefined `WAF policies` ranging from simple captcha or geolocation filters
    to more sophisticated traffic patterns. |


    Table [1-1](#478313_1_En_1_Chapter.xhtml#Tab1) is meant to give you a high-level
    overview by describing the selected cloud resources types grouped into Oracle
    Cloud Infrastructure services. Still, there are more cloud resource types available
    already, and we should expect even more arriving in the future.


    Some cloud resources such as virtual cloud networks or IAM users are free of charge.
    Others, for example, compute instances, database instances, or load balancers,
    will incur consumption-related costs. Let’s take a closer look at the billings.'
