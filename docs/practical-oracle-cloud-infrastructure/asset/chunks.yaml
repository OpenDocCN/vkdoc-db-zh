    权限管理是如何工作的？您使用 `策略语句` 来定义哪个 `组` 有权对特定的云资源类型执行特定操作。每个 `策略语句` 都指向一个特定的 ` compartment
    `（ compartment ）或整个 ` tenancy `（ tenancy ）。图 4-18 展示了一个简单的 `策略语句`，它授予 `groupABC`
