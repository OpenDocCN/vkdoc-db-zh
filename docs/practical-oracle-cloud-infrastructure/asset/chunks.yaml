    is more interesting is the fact that a backend set can be created or deleted already
    when there is a policy statement with the `use` policy verb. How should we understand
    it? Well, a backend set can exist only in the context of a load balancer as its
    child resource. In this way, you could delegate the creation of backend sets to
    the users of the load balancer just as you let them update an existing load balancer.
    However, the creation or termination of the parent resource, namely, the load
    balancer, is limited to the managers.


    Tip


    Policy verbs are highly contextual, and their exact meaning depends on the resource
    type they are prefixing in the policy statement. You need to refer to the documentation
    to find out more: [`https://docs.cloud.oracle.com/iaas/Content/Identity/Reference/policyreference.htm`](https://docs.cloud.oracle.com/iaas/Content/Identity/Reference/policyreference.htm).


    Let’s discuss a couple of examples for IAM policy statements. I would like you
    to get some general view before we move into creating the statements for our new
    IAM groups. If your intention is to grant all kinds of permissions over a particular
    compartment to the group of admins for that compartment, you can do it with just
    one *IAM policy statement*.


    ```

    allow group sandbox-admins to manage all-resources in compartment Sandbox

    ```


