    `策略语句条件` 可以为权限（例如 `request.permission != ''LOAD_BALANCER_DELETE''`）以及单个 API 操作（例如
    `request.operation != ''DeleteLoadBalancer''`）定义。通过这种方式，可以调整 `策略语句`，并根据需要使其尽可能精细。


