  trans: '

    | 服务 | 已选的云资源类型 |

    | --- | --- |

    | 计算 | `计算实例`为在云中运行软件提供算力。它们基于`镜像`，镜像为实例指定了预装的软件栈。实例使用`形状`来确定分配的虚拟硬件配置。实例可以独立配置，也可以使用`节点池`进行池化。节点池基于一个`实例配置`创建，该配置可被视为一个扩展的实例定义。`虚拟网卡附件`云资源将特定的计算实例连接到一个虚拟网卡。虚拟网卡在所选的虚拟云网络子网中创建，并将实例连接到虚拟云网络。
    |

    | 网络 | `虚拟云网络`是一个在 Oracle Cloud Infrastructure 区域内创建的软件定义的私有网络。它可以跨越多个可用性域。您可将其细分为一个或多个`子网`。流量根据在`路由表`中创建的路由规则进行路由，该表被一个或多个子网引用。通过`互联网网关`启用对互联网的访问，您可将其指定为路由规则目标。`NAT
    网关`允许私有子网中的实例建立到互联网的出站连接。一个子网可以引用一个或多个安全列表，这些列表由有状态和无状态的`安全规则`组成。这些规则有效地为特定子网提供了一层额外的虚拟防火墙。一个连接到`公网
    IP`云资源的实例，只要所执行的安全规则允许特定流量，即可直接从互联网访问。 |

    | 块卷 | `引导卷`承载计算镜像，提供根文件系统，并用于启动计算实例。实例可以额外连接`块卷`以增加可用的总块存储量。可以为这两种卷创建时间点的`卷备份`。备份可以是增量的或完全的，并且可选择由自动化的`卷备份策略`驱动。
    |

    | 对象存储 | 任何类型的数据实体都作为`对象`存储在称为`存储桶`的虚拟容器中，存储桶通常用于对相关对象进行分组。经过认证和授权的 OCI 用户，或使用短时效的`预认证请求`可以访问这些对象。存储桶可以创建为仅`归档`存储，这将降低存储成本，但会使对象在下载前增加一些等待时间。此外，可以采用`生命周期策略规则`，在给定时间段过后删除或归档对象。
    |

    | 文件存储 | 可以在所选子网中创建共享文件存储`文件系统`。您使用`挂载目标`云资源提供的详细信息将计算实例附加到特定的文件系统，该资源存在于文件系统云资源内。您可以使用称为`快照`的时间点视图为共享文件系统实现备份机制。
    |

    | IAM | ` compartments`用于隔离通常属于托管在单个云租户下的不同项目的云资源。您可以在本地定义云`用户`，或者将租户与外部身份提供商联合。`策略`由策略语句组成，这些语句授予`用户组`对云资源的各种访问权限。`动态组`允许匹配的计算实例发出该组允许的
    API 调用。 |

    | 负载均衡 | `负载均衡器`根据选定的分配算法，将传入流量分发到在`后端集合`中注册的实例。 |

    | 数据库 | 需要支持写入密集型、高吞吐量和事务密集型操作的 OLTP 应用程序可以利用`自治事务处理`。支持数据仓库和商业智能系统的 OLAP 工作负载旨在使用`自治数据仓库`。这两种云资源类型的实例都为您提供完全托管的
    Oracle 数据库体验。 |

    | 容器注册表 | 每个云账户都附带一个关联的容器镜像注册表，您可以在其中使用公共和私有`仓库`存储 Docker 镜像。 |

    | 容器引擎 | Kubernetes 容器引擎让您能够启动完全托管的 Kubernetes`集群`，其关联的`节点池`中的工作节点作为计算实例进行配置。
    |

    | 无服务器 | 开源 Fn 项目的`函数`可以部署到托管的 Oracle Functions 服务中进行无服务器计算。 |

    | DNS | 您拥有的域名可以重定向到一个 DNS`区域`，在该区域中可以创建自定义 DNS`记录`。 |

    | Web 应用程序防火墙 (WAF) | 可以使用一组预定义的`WAF 策略`来保护面向互联网的应用程序端点，防止潜在恶意和不需要的入站流量，这些策略范围从简单的验证码或地理位置过滤器到更复杂的流量模式。
    |


    表 1-1 旨在通过描述按 Oracle Cloud Infrastructure 服务分组的已选云资源类型，为您提供一个高层次的概览。尽管如此，目前已有更多云资源类型可用，而且我们应期待未来会有更多资源类型出现。


    一些云资源，如虚拟云网络或 IAM 用户，是免费的。其他的，例如计算实例、数据库实例或负载均衡器，则会产生与消耗相关的费用。让我们更仔细地看看账单情况。

    '
- fmt: '### Billings


    在前面章节的“成本”部分，我提到了云资源消耗通常是如何衡量的，以及使用任何公共云提供商时通常会遇到的两种定价选项。


    *   按需付费定价


    *   基于承诺的定价


    Oracle Cloud Infrastructure (OCI) 确实提供了按需付费的定价选项。这是你自行创建新云租户时的默认定价选项。消耗的衡量基于不同的指标，具体取决于特定的云资源类型。每月末，你的信用卡会被扣款，你最终会收到一张发票。就这么简单。这个选项非常适合评估阶段、原型设计，或者当你根本无法或不想对未来的常规服务消耗做出任何预估时。没有承诺意味着你可以完全灵活地随时扩大或缩小你的消耗，而无需为未使用的额度付费。


    我刚刚提到了“`credits`”（额度）这个词。通过讨论 Oracle 如何提供基于承诺的定价，我们将会了解到为什么使用这个词。2018 年，Oracle
    宣布了“`universal credits`”（通用额度）作为与其这类消耗购买模式相关的术语。一个对自身常规云服务消耗有信心的客户可以与 Oracle 达成协议，进而以折扣价购买一定数量的通用额度。在撰写本文时，最短的承诺期为
    12 个月。折扣可能很可观，但这取决于承诺期限和购买的额度数量。通用额度可用于任何类型的 Oracle Cloud Infrastructure 设置以及大量的各种
    PaaS 服务。在撰写本文时，这种模式使得在同一协议下完全改变消耗模式成为可能。例如，你可以将应用程序从构建在大量虚拟机上的多层架构，迁移到运行在 Oracle
    Kubernetes Engine 上、由更少但更强大的裸机主机支持 worker 节点的基于微服务的系统。在此更改之后，你的额度将仅由与你新设置相关的资源消耗。


    注意


    与所有类型的商业活动一样，定价模式可能迅速变化；因此，请参考官方文件或销售代表以获取最新的定价选项。你可以在 [`https://cloud.oracle.com/pricing/options`](https://cloud.oracle.com/pricing/options)
    找到更多详细信息。


    已经在使用 Oracle Database 的公司和组织，通过选择“`bring-your-own-license`”（BYOL，自带许可证）选项，可能有资格进一步降低其基于云的
    Oracle Database 成本。首先，你必须确保你当前的本地许可证符合此选项。如果确认，要利用更低的费用，你只需在 OCI 控制台中预置任何 Oracle
    Cloud Infrastructure 上可用的 Oracle Database 类型的新实例时，勾选相应的框或传递必需的 API 请求参数。


    可视化各种云资源产生的成本最方便的方法，是使用 OCI 控制台中的账单视图，如图 1-13 所示。你可以使用筛选器来查看选定时间段内的费用。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig13_HTML.png](images/478313_1_En_1_Chapter/478313_1_En_1_Fig13_HTML.png)


    图 1-13


    在 OCI 控制台中查看账单


    无论你的云账户适用哪种定价选项，你或你的租户管理员可能都希望看到消耗的云资源在`aggregated cost split`（成本聚合拆分）中按每个业务部门或项目的划分情况。Oracle
    Cloud Infrastructure 提供了两种可以帮助你使成本拆分可见的工具：`compartments`（ compartment）和`cost-tracking
    tags`（成本跟踪标签）。你将在第 4 章中了解 compartment，我们将更仔细地研究如何组织项目层次结构。使用多个 compartment 并将成本跟踪标签附加到云资源上，将使你能够在
    OCI 控制台的账单视图中应用额外的筛选器。


    ### Support


    在某个时间点，你不可避免地会发现自己需要一些帮助。首先，你可能对云服务有疑问，但在文档中找不到直接答案。你甚至可能发现一些必须被解释并在确认后解决的云服务问题。然而，你的第一个服务请求很可能与“`increasing
    service limits`”（增加服务限额）有关。


    什么是服务限额？我会说它是云提供商用来监督各类云资源的最大可能消耗量并避免任何潜在危险超额订阅的一种手段。如果这听起来有点模糊，让我举个例子来说明它对云消费者的实际影响。想象一个假设的情况：在某个区域的第一个可用性域中，恰好有
    1,000 台每台配备 52 个 CPU 的裸机。如果它们全部都在使用中，其中一些运行着虚拟机，另一些则专用于单个租户，这时一个新客户试图预置另一个计算实例，会发生什么？嗯，预置过程很可能会失败，因为
    CPU 池中缺少物理 CPU。为避免这种情况，云提供商会跟踪授予每个客户对每种云资源的服务限额。例如，你的云账户可能设置的服务限额是，在特定的可用性域（AD）内，你最多只能预置
    30 个 1 CPU 的虚拟机、10 个 2 CPU 的虚拟机和 1 台 52 CPU 的裸机。这样，云提供商就能知道你可以自服务预置多达 40 个虚拟机，总共消耗
    50 个 CPU，以及一台额外的、需要 52 个 CPU 的裸机。通过将所有云账户的服务限额相加，云提供商能够了解特定 AD 中的物理资源是否能够满足所有可能被预置的虚拟云资源的需求，并采取相应措施。


    在预置你的目标架构之前，你需要确保你的服务限额允许你创建想要使用的云资源。使用试用账户开始时，标准的服务限额设置得非常低，因此你可能很快就会发现自己需要增加其中一些限额。虽然任务本身是由支持团队完成的，但你的责任是创建一个新的服务请求，并提供需要增加的具体内容详情。你可以在
    OCI 控制台中完成此操作，如图 1-14 所示。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig14_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig14_HTML.jpg)


    图 1-14


    在 OCI 控制台中增加服务限额


    其他类型的服务请求必须通过 Oracle Cloud 支持门户网站提交。你可以在 [`https://support.oracle.com`](https://support.oracle.com)
    找到它。请记住，在登录之前或之后选择“Cloud Support portal”选项。'
  raw: '### Billings


    In the “Costs” section earlier in this chapter, I mentioned how the cloud resource
    consumption is usually measured and what the two pricing options typically encountered
    are while working with any public cloud provider.


    *   Pay-as-you-go pricing


    *   Commitment-based pricing


    Oracle Cloud Infrastructure indeed offers a pay-as-you-go pricing option. This
    is the default pricing option for a new cloud tenancy you create on your own.
    The consumption is measured based on different kinds of metrics, depending on
    a particular cloud resource type. At the end of each month, your credit card is
    charged, and you eventually receive an invoice. It’s as simple as that. This option
    is a good choice for an evaluation phase, for prototyping, or when you are simply
    unable or do not want to make any estimate of the regular service consumption
    in future months. No commitment gives you full flexibility to scale your consumption
    down or up, any time you want, with no need to pay for unused credits.


    I’ve just mentioned the word *credits*. We will learn why by discussing how Oracle
    offers commitment-based pricing. In 2018, Oracle announced *universal credits*
    as the term associated with its purchasing model for this kind of consumption.
    A customer who feels confident about their regular cloud services consumption
    can enter into an agreement with Oracle and consequently purchase a number of
    universal credits for a discounted price. At the time of writing, the shortest
    commitment possible is 12 months. The discount can be significant, but it may
    depend on the commitment period and the number of purchased credits. Universal
    credits can be spent on any type of Oracle Cloud Infrastructure setup and a large
    number of various PaaS services. At the time of writing, this model makes it possible
    to completely change the consumption pattern under the same agreement. For example,
    you could move your application from a multitier architecture built on a large
    number of virtual machines to a microservices-based system running on Oracle Kubernetes
    Engine whose worker nodes are backed by fewer but more powerful bare-metal hosts.
    After this change, your credits would be simply consumed by resources related
    to your new setup.


    Note


    As with every kind of business, pricing models can change rapidly; therefore,
    please refer to the official documents or sales representatives to get the most
    up-to-date pricing options. You can find more details at [`https://cloud.oracle.com/pricing/options`](https://cloud.oracle.com/pricing/options)


    Companies and organizations that are already using Oracle Database may be eligible
    to decrease their cloud-based Oracle Database costs even further by choosing the
    *bring-your-own-license* (BYOL) option. First, you have to make sure that your
    current on-premise license is compliant with this option. If confirmed, to leverage
    lower charges, you just need to check the appropriate box or pass the required
    API request parameter while provisioning a new instance of any Oracle Database
    type that is available on Oracle Cloud Infrastructure.


    The most convenient way to visualize the costs incurred by various types of cloud
    resources is to use the billings view in the OCI Console, as shown in Figure [1-13](#478313_1_En_1_Chapter.xhtml#Fig13).
    You can use filters to see the charges for a selected period of time.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig13_HTML.png](images/478313_1_En_1_Chapter/478313_1_En_1_Fig13_HTML.png)


    Figure 1-13


    Viewing billings in the OCI Console


    No matter which pricing option your cloud account is subject to, you or your tenancy
    administrators will probably want to see the *aggregated cost split* of the consumed
    cloud resources between each business unit or project. Oracle Cloud Infrastructure
    provides two tools that can help you make the cost split visible: compartments
    and cost-tracking tags. You will learn about compartments in Chapter [4](#478313_1_En_4_Chapter.xhtml)
    where we take a closer look at how to organize a project hierarchy. Using multiple
    compartments and attaching cost-tracking tags to cloud resources will result in
    additional filters you can apply in the billings view in the OCI Console.


    ### Support


    At some point in time, it is inevitable that you will find yourself in need of
    some assistance. First, you may have questions related to cloud services to which
    you cannot find straightforward answers in the documentation. You may even spot
    some cloud service issues that have to be explained and, if confirmed, solved.
    In all likelihood, however, your first service requests will be associated with
    *increasing service limits*.


    What is a service limit? I would say it is an aid used by the cloud provider to
    supervise the greatest possible consumption of various types of cloud resources
    and avoid any potentially hazardous oversubscription. If this sounds a bit vague,
    let me give an example that should shed some light on the practical implications
    for cloud consumers. Imagine a hypothetical situation in which there are exactly
    1,000 bare-metal machines with 52 CPUs each in the first availability domain of
    a particular region. What would happen if all of them were in use, with some running
    virtual machines and others being dedicated to a single tenant, while a new customer
    is trying to provision another compute instance? Well, the provisioning process
    would most likely fail, due to a missing physical CPU in a pool. To avoid such
    situations, the cloud provider keeps track of the granted service limits on each
    customer for each cloud resource. For example, your cloud account may have service
    limits set in a way that you are allowed to provision no more than 30 VMs with
    1 CPU each, 10 VMs with 2 CPUs, and 1 bare-metal machine with 52 CPUs, all in
    a particular availability domain (AD). In this way, the cloud provider would be
    aware that you can self-provision up to 40 VMs that would consume 50 CPUs in total
    and one additional bare-metal machine that requires 52 CPUs. Adding up service
    limits from all cloud accounts, the cloud provider is able to see whether the
    physical resources in a particular AD are able to serve all virtual cloud resources
    that may get provisioned and react properly.


    Before you provision your target architecture, you need to make sure your service
    limits will let you create the cloud resources you want to use. The standard service
    limits you start with using a trial account are set to really low values, so you
    may find yourself needing to get some of them increased almost immediately. Although
    the task itself is done by the support team, your responsibility is to create
    a new service request and provide the details of what exactly has to be increased.
    You can do this in the OCI Console, as shown in Figure [1-14](#478313_1_En_1_Chapter.xhtml#Fig14).


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig14_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig14_HTML.jpg)


    Figure 1-14


    Increasing service limits in the OCI Console


    Other types of service requests have to be submitted through the Oracle Cloud
    support portal. You can find it at [`https://support.oracle.com`](https://support.oracle.com).
    Remember to select the Cloud Support portal option before or after you sign in.'
  trans: '

    ### 计费


    在前面章节的“成本”部分，我提到了云资源消耗通常是如何衡量的，以及使用任何公共云提供商时通常会遇到的两种定价选项。


    *   按需付费定价


    *   基于承诺的定价


    Oracle Cloud Infrastructure (OCI) 确实提供了按需付费的定价选项。这是你自行创建新云租户时的默认定价选项。消耗的衡量基于不同的指标，具体取决于特定的云资源类型。每月末，你的信用卡会被扣款，你最终会收到一张发票。就这么简单。这个选项非常适合评估阶段、原型设计，或者当你根本无法或不想对未来的常规服务消耗做出任何预估时。没有承诺意味着你可以完全灵活地随时扩大或缩小你的消耗，而无需为未使用的额度付费。


    我刚刚提到了“`credits`”（额度）这个词。通过讨论 Oracle 如何提供基于承诺的定价，我们将会了解到为什么使用这个词。2018 年，Oracle
    宣布了“`universal credits`”（通用额度）作为与其这类消耗购买模式相关的术语。一个对自身常规云服务消耗有信心的客户可以与 Oracle 达成协议，进而以折扣价购买一定数量的通用额度。在撰写本文时，最短的承诺期为
    12 个月。折扣可能很可观，但这取决于承诺期限和购买的额度数量。通用额度可用于任何类型的 Oracle Cloud Infrastructure 设置以及大量的各种
    PaaS 服务。在撰写本文时，这种模式使得在同一协议下完全改变消耗模式成为可能。例如，你可以将应用程序从构建在大量虚拟机上的多层架构，迁移到运行在 Oracle
    Kubernetes Engine 上、由更少但更强大的裸机主机支持 worker 节点的基于微服务的系统。在此更改之后，你的额度将仅由与你新设置相关的资源消耗。


    注意


    与所有类型的商业活动一样，定价模式可能迅速变化；因此，请参考官方文件或销售代表以获取最新的定价选项。你可以在 [`https://cloud.oracle.com/pricing/options`](https://cloud.oracle.com/pricing/options)
    找到更多详细信息。


    已经在使用 Oracle Database 的公司和组织，通过选择“`bring-your-own-license`”（BYOL，自带许可证）选项，可能有资格进一步降低其基于云的
    Oracle Database 成本。首先，你必须确保你当前的本地许可证符合此选项。如果确认，要利用更低的费用，你只需在 OCI 控制台中预置任何 Oracle
    Cloud Infrastructure 上可用的 Oracle Database 类型的新实例时，勾选相应的框或传递必需的 API 请求参数。


    可视化各种云资源产生的成本最方便的方法，是使用 OCI 控制台中的账单视图，如图 1-13 所示。你可以使用筛选器来查看选定时间段内的费用。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig13_HTML.png](img/478313_1_En_1_Fig13_HTML.png)


    图 1-13


    在 OCI 控制台中查看账单


    无论你的云账户适用哪种定价选项，你或你的租户管理员可能都希望看到消耗的云资源在`aggregated cost split`（成本聚合拆分）中按每个业务部门或项目的划分情况。Oracle
    Cloud Infrastructure 提供了两种可以帮助你使成本拆分可见的工具：`compartments`（ compartment）和`cost-tracking
    tags`（成本跟踪标签）。你将在第 4 章中了解 compartment，我们将更仔细地研究如何组织项目层次结构。使用多个 compartment 并将成本跟踪标签附加到云资源上，将使你能够在
    OCI 控制台的账单视图中应用额外的筛选器。


    ### 支持


    在某个时间点，你不可避免地会发现自己需要一些帮助。首先，你可能对云服务有疑问，但在文档中找不到直接答案。你甚至可能发现一些必须被解释并在确认后解决的云服务问题。然而，你的第一个服务请求很可能与“`increasing
    service limits`”（增加服务限额）有关。


    什么是服务限额？我会说它是云提供商用来监督各类云资源的最大可能消耗量并避免任何潜在危险超额订阅的一种手段。如果这听起来有点模糊，让我举个例子来说明它对云消费者的实际影响。想象一个假设的情况：在某个区域的第一个可用性域中，恰好有
    1,000 台每台配备 52 个 CPU 的裸机。如果它们全部都在使用中，其中一些运行着虚拟机，另一些则专用于单个租户，这时一个新客户试图预置另一个计算实例，会发生什么？嗯，预置过程很可能会失败，因为
    CPU 池中缺少物理 CPU。为避免这种情况，云提供商会跟踪授予每个客户对每种云资源的服务限额。例如，你的云账户可能设置的服务限额是，在特定的可用性域（AD）内，你最多只能预置
    30 个 1 CPU 的虚拟机、10 个 2 CPU 的虚拟机和 1 台 52 CPU 的裸机。这样，云提供商就能知道你可以自服务预置多达 40 个虚拟机，总共消耗
    50 个 CPU，以及一台额外的、需要 52 个 CPU 的裸机。通过将所有云账户的服务限额相加，云提供商能够了解特定 AD 中的物理资源是否能够满足所有可能被预置的虚拟云资源的需求，并采取相应措施。


    在预置你的目标架构之前，你需要确保你的服务限额允许你创建想要使用的云资源。使用试用账户开始时，标准的服务限额设置得非常低，因此你可能很快就会发现自己需要增加其中一些限额。虽然任务本身是由支持团队完成的，但你的责任是创建一个新的服务请求，并提供需要增加的具体内容详情。你可以在
    OCI 控制台中完成此操作，如图 1-14 所示。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig14_HTML.jpg](img/478313_1_En_1_Fig14_HTML.jpg)


    图 1-14


    在 OCI 控制台中增加服务限额


    其他类型的服务请求必须通过 Oracle Cloud 支持门户网站提交。你可以在 [`https://support.oracle.com`](https://support.oracle.com)
    找到它。请记住，在登录之前或之后选择“Cloud Support portal”选项。

    '
- fmt: '## SLA


    无论是软件还是硬件，都可能在最意想不到的时刻发生故障。在云计算领域也是如此。支撑公共云平台的数据中心内，软件或硬件的故障可能导致已部署的云解决方案出现严重问题，包括服务不可用、交易中断、业务流程暂停以及数据损坏。云服务提供商会尽最大努力消除云服务故障的风险或减轻其潜在后果。其中一些提供商使用*服务级别协议*（SLA）来书面正式承诺其托管的各种云资源的可用性、可管理性或性能。例如，在撰写本文时，Oracle保证一个计算区域的可用时间至少为99.99%，一个可用性域的可用时间至少为99.95%。如果未达到这些阈值，Oracle将发放一定数量的服务积分作为补偿。服务积分的数量取决于多个因素，例如在未满足特定SLA的当月您的云消耗量、未满足的SLA类型以及未满足SLA的程度（以百分比表示）。服务积分可以在未来的某个计费周期中用作额外积分，用于支付云资源消耗，从而有效地降低您的按需付费费用或承诺计划下可能的超额费用。


    > 注意

    >

    > SLA及其规则可能瞬息万变；因此，请参阅官方文档或联系销售代表。您可以在 [`https://www.oracle.com/cloud/iaas/sla.html`](https://www.oracle.com/cloud/iaas/sla.html)
    找到更多详细信息。


    让我们看一个简化的例子。请注意，在您阅读本文时，规则甚至整个过程可能已经改变，因此请将此视为对云SLA主题的介绍。图 [1-15](#478313_1_En_1_Chapter.xhtml#Fig15)
    说明了我们将要讨论的场景。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig15_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig15_HTML.jpg)


    图 1-15


    云SLA示例


    您在一个按需付费的云租户中运行一个应用程序。该应用程序节点在多个虚拟机上运行，这些虚拟机以容错方式部署并分散在一个可用性域内的两个不同故障域中。计算实例使用块存储作为其启动卷。此外，该应用程序将业务相关数据持久化存储在对象存储桶中。假设有一个SLA保证一个可用性域（AD）在每个日历月中的可用时间至少为99.95%。如果未达到此阈值，表
    [1-2](#478313_1_En_1_Chapter.xhtml#Tab2) 列出了适用的服务积分。


    表 1-2


    服务积分级别


    | AD 可用性 | 服务积分 |

    | --- | --- |

    | 99.00%–99.95% | 10% |

    | 低于 99.00% | 25% |


    “AD的可用性”到底意味着什么？在撰写本文时，如果您在特定可用性域内至少两个故障域中运行的计算实例无法建立外部连接，则认为该AD不可用。回到我们的例子，假设您在七月份有8小时无法连接到您的应用程序实例。您收集日志作为证据，将其附加到在线索赔中，并提交索赔以待批准。Oracle在八月初批准了该索赔，并根据以下两个事实向您发放了价值250美元的服务积分：


    *   您七月份与计算相关的消耗产生了1000美元的费用。

    *   七月份该AD的可用时间低于99.00%。


    现在，您应该能够在九月份将计算云资源的成本降低250美元。再次提醒，请记住这只是一个说明某些SLA运作方式的例子。在撰写本文时，规则和SLA阈值可能完全不同，因此请参阅官方的SLA文档。


    本章为您提供了大量的入门信息。现在，如果您还没有注册试用云账户，是时候注册了。


    ## 试用


    开始使用Oracle Cloud的最佳方式是注册一个新的*试用云账户*。在撰写本文时，试用账户提供价值300美元的积分，有效期为30天。要注册Oracle
    Cloud试用，请访问 [`https://oracle.com/cloud`](https://oracle.com/cloud)，点击“Try Oracle
    Cloud Free Tier”按钮，然后点击“Start for Free”。将显示图 [1-16](#478313_1_En_1_Chapter.xhtml#Fig16)
    所示的屏幕。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig16_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig16_HTML.jpg)


    图 1-16


    注册Oracle Cloud


    填写表格并通过发送到您手机号码的验证码验证身份通常需要几分钟时间。您还需要提供信用卡详细信息。这将使您能够在30天的评估期结束时，顺利地将试用账户升级为标准的按需付费账户（当然，如果您决定这样做的话）。此外，您可以尝试联系您所在地区的Oracle销售代表，协商为您的试用提供更多积分和更长的评估时间。


    区分您使用的是试用账户还是常规付费账户的最简单方法是查看OCI控制台顶部的栏。在OCI控制台顶部会有一个窄的紫白色栏，显示相关信息。您的新云账户需要几分钟时间来完全初始化。在此期间，您将看到一个橙色栏通知您，如图
    [1-17](#478313_1_En_1_Chapter.xhtml#Fig17) 所示。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig17_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig17_HTML.jpg)


    图 1-17


    OCI控制台中的试用账户信息栏


    要关注您正在进行的服务消耗，您可以观察OCI控制台中的计费小部件。试用租户将显示类似图 [1-18](#478313_1_En_1_Chapter.xhtml#Fig18)
    的内容。计费小部件中的信息每天更新一次。


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig18_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig18_HTML.jpg)


    图 1-18


    在OCI控制台中查看试用云账户账单摘要


    请记住，在试用期内，选定的服务会获得额外折扣。这为您提供了更多时间来测试那些比其他服务稍贵一些的服务。'
  raw: '### SLA


    Both software and hardware can break at the least expected moment. It is no different
    in the cloud computing world. The failure of software or hardware in a data center
    that backs a public cloud platform can result in immense problems with the deployed
    cloud solutions, including service unavailability, interrupted transactions, business
    processes put on hold, and data corruption. Cloud providers make their best effort
    to eliminate the risk or mitigate the potential consequences of cloud service
    failures. Some of them use *service-level agreements* (SLAs) to make a written,
    official promise about the availability, manageability, or performance of the
    various cloud resources they host. For example, at the time of writing, Oracle
    guarantees that a compute region will be available for at least 99.99 percent
    of time and an availability domain for at least 99.95 percent of time. If these
    thresholds are not met, Oracle would issue some amount of service credits as compensation.
    The number of service credits depends on multiple factors such as your cloud consumption
    in the given month in which a particular SLA was unmet, the type of unsatisfied
    SLA, and the extent to which the SLA hasn’t been met expressed as a percentage.
    Service credits can be used in one of the future billing periods as additional
    credits to pay for cloud resource consumption and, in this way, effectively decrease
    either your PAYG charges or any potential overcharges on a commitment-based plan.


    Note


    SLAs and their rules can change in an instant; therefore, please refer to the
    official documents or contact sales representatives. You can find more details
    at [`https://www.oracle.com/cloud/iaas/sla.html`](https://www.oracle.com/cloud/iaas/sla.html).


    Let’s take a look at a simplified example. Please note that, at the time you are
    reading this, the rules or even the entire process might have changed, so treat
    this as an introduction to the topic of cloud SLAs. Figure [1-15](#478313_1_En_1_Chapter.xhtml#Fig15)
    illustrates the scenario we will discuss.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig15_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig15_HTML.jpg)


    Figure 1-15


    Cloud SLA example


    You are running an application in your pay-as-you-go cloud tenancy. The application
    nodes are operating on multiple virtual machines deployed in a fault-tolerant
    way and spread across two different fault domains within one availability domain.
    The compute instances are using block storage for their boot volumes. In addition,
    the application is persisting business-related data in object storage buckets.
    Suppose there is an SLA that guarantees that an availability domain (AD) is available
    at least 99.95 percent of time in each calendar month. If this threshold is not
    met, Table [1-2](#478313_1_En_1_Chapter.xhtml#Tab2) presents the service credits
    that apply.


    Table 1-2


    Service Credit Levels


    | AD Availability | Service Credits |

    | --- | --- |

    | 99.00%–99.95% | 10% |

    | Less than 99.00% | 25% |


    What does “an availability of an AD” actually mean? At the time of writing, an
    AD is considered unavailable if you experience no external connectivity to the
    compute instances that are running in at least two fault domains within that particular
    availability domain. Returning to our example, let’s assume you were not able
    to connect to your application instances for eight hours in July. You collect
    logs as proof, attach them to an online claim, and submit the claim for approval.
    Oracle approves the claim at the beginning of August and grants you $250 in the
    form of service credits based on these two facts:


    *   Your compute-related consumption in July incurred the cost of $1,000.


    *   The AD was available less than 99.00 percent of the time in July.


    Now, you should be able to decrease the cost of compute cloud resources in September
    by $250\. Again, please remember that this was just an example to illustrate the
    way some SLAs work. At the time of writing, the rules and SLA thresholds might
    be completely different, so please refer to the official SLA documentation.


    This chapter has equipped you with a lot of introductory information. Now, it
    is time to sign up for a trial cloud account if you haven’t done it already.


    ### Trial


    The best way to begin your journey with Oracle Cloud is to sign up for a new *trial
    cloud account*. At the time of writing, the trial account comes with $300 worth
    of credits for 30 days. To sign up for an Oracle Cloud trial, go to [`https://oracle.com/cloud`](https://oracle.com/cloud)
    and click the Try Oracle Cloud Free Tier button and then click Start for Free.
    The screen shown in Figure [1-16](#478313_1_En_1_Chapter.xhtml#Fig16) will be
    displayed.


    ![../images/478313_1_En_1_Chapter/478313_1_En_1_Fig16_HTML.jpg](images/478313_1_En_1_Chapter/478313_1_En_1_Fig16_HTML.jpg)


    Figure 1-16


    Signing up for Oracle Cloud


    It usually takes a few minutes to fill in the form and validate your identity
    through a verification code sent to your mobile number. You will also need to
    provide your credit card details. This will let you smoothly upgrade your trial
    account, at the end of the evaluation period of 30 days, to a standard pay-as-you-go
    account, if you decide to, of course. Furthermore, you can try contacting your
    regional Oracle sales representative to negotiate more credits and a longer evaluation
    time for your trial.


    The easiest way to recognize whether you are working with a trial or a regular
    paid account is to look at the top bar in the OCI Console. There will be a narrow
    purple-white bar with relevant information displayed at the top of the OCI Console.
