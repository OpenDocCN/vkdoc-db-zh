    The function is implicitly defined to be launched on an HTTP trigger. This means
    that there must be an HTTP endpoint associated with the function. As a matter
    of fact, an HTTP endpoint is something that we need to make the majority of our
    serverless functions useful in production. You can see the function-specific endpoint
    using the `fn inspect function` command .


    ```

    [ubuntu@dev-vm]$ fn inspect function uuidapp uuidfn

    {

    "annotations": {

    "fnproject.io/fn/invokeEndpoint": "http://localhost:8080/invoke/01DMR7VTNHNG8G00GZJ0000009"

    },

    "app_id": "01DMR7TZRFNG8G00GZJ0000008",

