    Kubernetes Engine**的**Docker**容器中，以及在**Oracle Functions**上执行无服务器函数。然而，在此阶段，让我们专注于基础，使用标准的虚拟机。


    有多种方式可以与**Oracle Cloud Infrastructure**的云管理平面进行通信。在本章中，我们使用`OCI 控制台`，这是一个用于管理`OCI
    资源`的 Web 浏览器界面。此方法仅适用于希望演示特定功能或尝试对您而言是新功能的情况。在现实世界中，您要么使用动态的、过程化的命令行界面（`CLI`）来自动化整个供给过程，要么使用声明式的`Terraform`驱动的基础架构描述符来管理基础架构即代码。自动化是第三章的主要主题。此外，本书所有剩余章节中的绝大多数演练都展示了云自动化的实际应用。


    ## 规划基础架构


    在本节中，我们将查看即将交付的云应用程序，并规划我们所需的云资源。


    ### 云账户


    在继续之前，您需要拥有一个可用的云账户。您可能会使用试用账户或标准的按需付费账户。试用账户将允许您免费完成本书中的所有演练。如果您拥有付费账户，您只需要记得终止（换句话说，删除）作为学习过程一部分构建的每个资源，以免产生费用。


    > 提示

    >

    > 如何创建一个新的试用账户？请参阅上一章的“试用”部分。


    对于你们中的一些人，可能还有另一个选择。如果您所在的公司拥有有效的`OCI`订阅，您可以考虑询问您的同事（云管理员）创建一个专用的`compartment`（例如，名为`Sandbox`），您可以在其中完成本书的练习。然而，本书中描述并在动手练习中创建的一些云资源确实需要租户所有者访问级别；因此，强烈建议您注册自己的试用账户。

    '
- fmt: '## Project Compartment


    组织使用单个云账户（也称为*云租户*）来托管多个有时不相关且隔离的项目，这并不罕见。不同的云提供商提供了各种方法来分离不相关的资源。Oracle Cloud
    Infrastructure 通过*隔离区*和*标签*来实现这一点。意识到这一点有助于规划，因为你可以轻松地将整个解决方案格局划分为更小、更细粒度、独立管理的架构片段，每个片段中的组件更少。这样，同一个云账户就可以用来托管众多项目的多个开发、测试和生产环境。图
    2-1 简要说明了这一概念。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig1_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig1_HTML.jpg)


    图 2-1

    使用 OCI 隔离区隔离项目


    如图 2-1 所示，隔离区可以位于其他隔离区内部，从而形成一个完整的层级结构。最顶层的隔离区称为*根隔离区*，你创建或默认存在的所有隔离区都是它的后代。如图
    2-2 所示。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig2_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig2_HTML.jpg)


    图 2-2

    隔离区的层级结构


    为每个项目传统地划分为三个标准环境（开发、测试和生产）不一定是最优选择。我甚至可以说这可能导致治理问题，因为生产隔离区仍然是项目隔离区的子级。在第 4 章中，你将学习另一种对生产更友好的隔离区组合策略，该策略将顶层项目与系统隔离区分开。


    从技术上讲，根隔离区并不是一个隔离区。每个 Oracle Cloud Infrastructure 资源都有一个类型。除了根隔离区是`tenancy`类型外，所有隔离区都是`compartment`类型。如果现阶段还不清楚，请不要担心。你唯一需要记住的是：不要直接在根隔离区中创建资源。这在技术上是可行的，但不一定是好的实践。


    是时候做出第一个架构决策了。你需要决定将本章即将构建的示例解决方案放置在哪个隔离区中。如果你不知道，我来帮你。就让它成为`Sandbox`这个新的隔离区吧。我们几分钟后就会创建它。现在请继续阅读。


    ## Application Design


    我们即将创建的云解决方案提供了一个简单的通用唯一标识符生成服务。每次客户端调用 API，都会收到一个新的唯一标识符。简而言之，UUID 是一个固定大小、不可变的标识符，它通过某种算法创建，该算法保证无论是否由多个生成器在同一台或不同机器上同时运行，创建重复标识符的概率都微乎其微。依赖
    UUID 的应用程序在设计上不需要任何中央标识符管理。你可以在 RFC4122 中找到关于 UUID 的更多细节。


    图 2-3 展示了一个 UUID 的示例。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig3_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig3_HTML.jpg)


    图 2-3

    UUID


    该实现将由两个独立的计算节点组成，它们在后端托管相同的、无状态的 UUID 生成逻辑，暴露一个简单的 REST API，并在每次请求时以 JSON 格式返回新生成的
    UUID（`uuid`对象）和计算节点名称（`generator`对象），如清单 2-1 所示。


    ```

    {

    "uuid": "8cf04d96-30c8-45f5-a2b5-c0ae68f58c4e",

    "generator":"web1"

    }

    ```


    清单 2-1

    API 响应


    请求被均匀地分配到两个 API 节点上的端点，因为我们在它们前面放置了一个负载均衡器，并依赖简单的轮询策略。尽管这是一个简单的演示场景，我们仍将把每个节点部署在不同的可用性域中，以创建一个高可用的解决方案。这种设计增加了我们的云服务在单个数据中心灾难中存活的机会。总结一下，一个*可用性域*可以看作是一个单一的数据中心，它使用高带宽链路与同一区域内的其他可用性域互连，从而提供低延迟。多个可用性域同时发生故障或被摧毁的可能性非常低。图
    2-4 展示了解决方案组件的示意图及其如何映射到物理数据中心。


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig4_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig4_HTML.jpg)


    图 2-4

    应用程序组件


    **提示**


    如果你的主页区域只提供一个可用性域，你仍然可以通过订阅另一个提供多个可用性域的区域来完成本章及后续所有章节的实践练习。你可以在 OCI 控制台中执行此操作。只需转到菜单
    ➤ 管理 ➤ 区域管理，然后在其中一个提供三个可用性域的区域旁边单击“订阅”按钮。订阅新区域可能需要片刻时间。之后，你需要在 OCI 控制台的右上角选择活动区域。'
  raw: '### Project Compartment


    It is not unusual for an organization to use a single cloud account (also called
    a *cloud tenancy*) to host multiple, sometimes unrelated and isolated, projects.
    Different cloud providers provide various means to keep unrelated resources apart.
    Oracle Cloud Infrastructure does that with *compartments* and *tags* . Being aware
    of this helps you plan because you can easily divide the entire solution landscape
    into smaller, more granular, separately managed pieces of architecture with fewer
    components in each piece. In this way, the same cloud account can be used to host
    multiple development, test, and production environments for numerous projects.
    Figure [2-1](#478313_1_En_2_Chapter.xhtml#Fig1) briefly illustrates that concept.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig1_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Isolating projects using OCI compartments


    As you can see in Figure [2-1](#478313_1_En_2_Chapter.xhtml#Fig1), compartments
    can reside inside other compartments, putting in place an entire hierarchy. The
    topmost compartment is called a *root compartment*, and all compartments you create
    or exist by default are its descendants. This is shown in Figure [2-2](#478313_1_En_2_Chapter.xhtml#Fig2).


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig2_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    A hierarchy of compartments


    The traditional split into three standard environments (development, test, and
    production) for each project is not necessarily the best one. I would even say
    it may lead to governance problems because production compartments remain children
    to the project compartments. In Chapter [4](#478313_1_En_4_Chapter.xhtml), you
    will learn another, more production-friendly compartment composition strategy
    that separates top-level projects and system compartments.


    Well, technically speaking, the root compartment is not a compartment. Every Oracle
    Cloud Infrastructure resource has a type. All compartments are of *compartment*
    type, except the root compartment, which is of *tenancy* type. Do not worry if
    this is unclear at this stage. The only thing you should remember is this: do
    not create resources directly in your root compartment. It is technically possible,
    but it is not necessarily a good practice.


    It is time for the first architectural decision. You need to decide in which compartment
    to place the sample solution we are about to build in this chapter. If you do
    not know, I will help you. Let it be a new `Sandbox` compartment. We will create
    it in a few minutes. Now read on.


    ### Application Design


    The cloud-based solution we are about to create provides a simple universal unique
    identifier (UUID) generation service. Each time a client calls the API, they will
    receive a new unique identifier. In short, a UUID is a fixed-size, immutable identifier
    created with an algorithm that guarantees that the probability of creating duplicate
    identifiers is negligible, no matter if run by multiple generators at the same
    time on the same or different machines. Applications that rely on UUIDs do not
    require any central identifier administration by design. You can find more details
    about UUIDs in RFC4122.


    Figure [2-3](#478313_1_En_2_Chapter.xhtml#Fig3) shows an example of a UUID.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig3_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    UUID


    The implementation will consist of two independent compute nodes that host the
    same, stateless UUID generation logic in the backend, expose a simple REST API,
    and, on every request, return a newly generated UUID (`uuid` object) and compute
    node name (`generator` object) in JSON format, as shown in Listing [2-1](#478313_1_En_2_Chapter.xhtml#PC1).


    ```

    {

    "uuid": "8cf04d96-30c8-45f5-a2b5-c0ae68f58c4e",

    "generator":"web1"

    }

    Listing 2-1

    API Response

    ```


    The requests are evenly distributed to the endpoints on both API nodes because
    we place a load balancer in front of them and rely on a simple round-robin policy.
    Even though this is a trivial demonstration scenario, we are still going to deploy
    each node in a different availability domain to create a highly available solution.
    Such a design increases the chances that our cloud service survives a disaster
    of a single data center. To recap, an *availability domain* can be thought of
    as a single data center interconnected with the remaining availability domains
    in the same region using a high-bandwidth link that provides low latency. The
    likelihood that more than one availability domain fails or gets destroyed at the
    same time is very low. Figure [2-4](#478313_1_En_2_Chapter.xhtml#Fig4) shows a
    sketch of the solution components and how they map to physical data centers.


    ![../images/478313_1_En_2_Chapter/478313_1_En_2_Fig4_HTML.jpg](images/478313_1_En_2_Chapter/478313_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Application components


    Tip


    If your home region comes with a single availability domain, you can still perform
    all the hands-on exercises in this and all subsequent chapters by subscribing
    to another region that offers multiple ADs. You can perform this action in the
    OCI Console. Just go to Menu ➤ Administration ➤ Region Management and click the
    Subscribe button next to one of the regions that comes with three ADs. Subscribing
    to a new region can take a few moments. You will then need to choose the active
    region in the top-right corner of the OCI Console.'
