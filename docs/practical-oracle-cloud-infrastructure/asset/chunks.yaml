    How would you include the *optimistic concurrency control* in your application
    logic to avoid race conditions? An update operation on an object can be performed
    in steps. First, the current object’s ETag is read, and the object content gets
    downloaded. Next, the application changes the object locally. Finally, the API
    is told to put a new version of the object into the bucket, effectively overwriting
    the old version, but only if the ETag hasn’t changed in the meantime. Such a conditional
    PUT can be achieved using the `If-Match` HTTP header, as shown in Figure [5-9](#478313_1_En_5_Chapter.xhtml#Fig9).


