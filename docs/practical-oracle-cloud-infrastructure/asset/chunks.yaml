    ### 审计


    Oracle Cloud Infrastructure 会收集对 API 的每一次调用的信息。因此，任何与 API 的交互，无论其来源是 OCI 控制台、SDK、CLI
    还是 Terraform，都属于审计范围。审计日志默认保留 90 天，除非你更改此值。你可以将审计日志条目保留长达 365 天。要在 OCI 控制台中搜索特定时间段内发生的事件，请执行以下步骤：


    1.  转到菜单 ➤ 治理 ➤ 审计。

    2.  选择你希望缩小结果范围的 compartment。

    3.  选择时间段的开始日期和结束日期。

    4.  提供一个搜索关键字，例如 `LaunchInstance`。

    5.  单击搜索。

    6.  单击“保持搜索”标签，确保所有审计日志条目都被处理。


    图 4-25 显示了审计事件搜索的结果。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig25_HTML.jpg](img/478313_1_En_4_Fig25_HTML.jpg)


    图 4-25


    OCI 控制台中的审计事件搜索


    前两条记录显示了在 `vistula-1` 和 `vistula-2` 计算实例配置期间捕获的事件。这两个实例是由租户所有者管理员用户配置的，该用户恰好是一个联合用户。对于联合用户，要找出是谁执行了操作，你需要展开事件详情并查看
    `principalId` 字段。第三个名为 `vistula-3` 的计算实例是由 `sandbox-admin` 用户启动的，这是一个本地、非联合用户；因此，你可以在用户列中看到它的名称。


    注意


    本章并未描述启动 `vistula-*` 实例的过程，但你可以自由搜索本章练习中配置的 `uuid-*` 实例，以试验审计事件搜索功能。


    对于每个审计日志事件，记录的详细信息比你在图 4-25 所示的表格中看到的要多。如果你展开其中一个条目，比如第三个，你会看到更多信息，如图 4-26 所示，包括作为
    `LaunchInstance` 事件主题的计算实例的 OCID。


    ![../images/478313_1_En_4_Chapter/478313_1_En_4_Fig26_HTML.jpg](img/478313_1_En_4_Fig26_HTML.jpg)


    图 4-26


    OCI 控制台中的审计事件详情


    一如既往，相同的操作也可以通过 CLI 命令的形式完成，这次的命令是 `audit event list`。


    ## 总结


    阅读完本章后，你应该对如何为属于不同项目环境和生产系统的云资源准备称为 compartment 的逻辑容器有了非常清晰的理解。你知道如何在控制台中以及使用
    CLI 来管理用户和组。你了解策略语句的重要性，并知道如何使用 IAM 策略创建和管理它们。你能够执行自由文本搜索并使用结构化查询查找资源。最后，你理解了审计的概念及其在云租户管理中的重要性。


    # 5. Oracle 云中的数据存储


    在 Oracle 云中有许多存储数据的方式。具体选择很大程度上取决于数据类型、应用程序上下文以及适用于特定用例或用户故事的数据使用模式。本章将重点介绍云中最流行的数据存储方法之一，即对象存储。


    ## 存储桶和对象


    假设你正在为一家房地产开发商工作。你处理着各种类型的数据项，如房地产营销材料、公寓蓝图、停车场规划、施工进度表等。尽管这些项目中的每一个通常都是一个文件，但你可以稍作概括，将它们视为
    *对象*。换句话说，你可以将这些项目视为你的云应用程序将要处理和服务的内容。为了简化数据资产管理，能够对这些对象进行分组会很有帮助。在这个例子中，分组可以基于不同的房地产项目，这些项目拥有特定的对象。那么，如果你能够安全地忘记非业务任务，比如确保数据始终可用并安全复制以抵御任何意外事件，会怎样呢？这将使你能够完全专注于业务流程要求的各个数据项的业务本质。这就是
    *对象存储* 发挥作用的地方。它承担了数据生命周期中发生的各种纯技术活动的负担。数据项会自动复制。此外，你不再需要担心磁盘卷上是否还有足够的空间，因为在这种情况下你根本不需要考虑单个磁盘卷。相比之下，从用户的角度来看，你使用的是一个平坦的、近乎无限的存储空间。最后但同样重要的是，数据默认使用
    256 位高级加密标准（AES-256）进行静态加密。


    我提到过你可以对相关对象进行分组，例如，在前面的例子中，属于同一个房地产项目的公寓蓝图和停车场规划。为此，你需要某种逻辑容器。对象存储允许你将相关对象存储在称为
    *存储桶* 的逻辑容器中。在上一章中，我们讨论了 compartment 以及它们在根据你云账户下维护的项目和系统隔离云资源方面的作用。同样的规则在这里也适用。每个存储桶必须存在于且仅存在于一个
    compartment 中。这迫使你将新的存储桶置于某个特定的项目环境、生产系统或通用 compartment（如 `Sandbox`）的上下文中。Compartment
    和存储桶可能仍然不足以以你希望的更复杂的方式来组织对象。通常，我们更喜欢处理具有多个层级的分层结构，以表达更详细的分组。这可以通过以适当的方式为对象名称添加前缀来实现，从而在存储桶内部模拟类似文件夹的多级层次结构。你可以使用以
    `/` 分隔的“路径”作为对象名称的前缀，最终得到完整的对象名称，如 `/waw/bemowo/125.pdf` 或 `/waw/bemowo/245.pdf`。这种命名约定允许你基于特定前缀列出对象，并在使用
    CLI 时对存储桶中基于前缀的对象子集执行各种批量操作。图 5-1 说明了对象存储的核心组件及其与 compartment 的关系。


    ![../images/478313_1_En_5_Chapter/478313_1_En_5_Fig1_HTML.jpg](img/478313_1_En_5_Fig1_HTML.jpg)


    图 5-1


    存储桶和对象层次结构


    每个云租户都拥有自己的 *命名空间*，存储桶就在其中存在。命名空间名称仅在最初生成一次，且无法更改。对象存储要求存储桶名称仅在单个云账户内唯一。与其他租户已占用的现有存储桶名称不会发生冲突。因此，很明显，所有对对象存储端点的直接和间接（CLI、SDK、Terraform）API
    调用都必须知道命名空间。


