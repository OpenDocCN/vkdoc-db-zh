    ''.annotations."fnproject.io/fn/invokeEndpoint"''`

    ```


    Next, we can use the well-known `curl` tool to send an HTTP request to the endpoint.


    ```

    [ubuntu@dev-vm]$ curl -X "POST" -H "Content-Type: application/json" $FN_INVOKE_ENDPOINT

