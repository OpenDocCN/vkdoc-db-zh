    ### 动态组


    *动态组*的成员只能是那些在Oracle云基础设施中运行且满足与该动态组关联的匹配规则中定义条件的计算实例。匹配规则将在创建动态组时提供。我们将接受所有携带在
    `test-projects` 命名空间中定义的 `realestate` 标签键的计算实例作为动态组成员。这是我们需要使用的匹配规则：


    ```

    tag.test-projects.realestate.value

    ```


    动态组与标准组一样，存在于整个租户的范围内。因此，`sandbox-admin` 用户将无法创建新的动态组，因为它只能管理 `Sandbox` 隔离区内的资源。这就是为什么我们将使用代表租户管理员的默认CLI配置文件，并代表租户管理员创建新的动态组。


