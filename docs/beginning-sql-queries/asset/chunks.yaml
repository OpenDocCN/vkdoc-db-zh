- fmt: '## 涉及空值的比较


    既然我们的表中可能出现意外的空值，了解如何处理它们就很重要。下面这两个条件会匹配哪些行？


    ```

    Gender = ''F''

    NOT (Gender = ''F'')

    ```


    你可能会认为，如果我们执行两个查询——一个获取匹配某个条件的所有行，另一个获取不匹配该条件的所有行——那么我们就得到了整个表。但事实上，我们并没有。Kim
    不会被第一个条件包括，因为显然 `Gender` 的值不等于 `''F''`。但是，当我们询问该值是否为 `NOT ''F''` 时，我们无法回答，因为我们不知道该值是什么。如果有值，它可能是
    `''F''`。在 SQL 中，当我们将空值与某物进行比较时，我们既不会得到 `True` 也不会得到 `False`，因为我们根本不知道。如果我们考虑残障值，这可能就更说得通了。如果我们查询所有
    `Handicap > 12` 的人，以及那些满足 `NOT (Handicap > 12)` 或 `Handicap <=12` 的成员，那么 Sarah
    的行永远不会被检索出来。这个问题不适用于她——她没有残障值。


    一旦我们考虑了空值，我们的条件表达式实际上可能有三个值之一：真（True）、假（False）或“不知道（Don’t know）”。如果你仔细想想，这差不多就是世界的运作方式。查询中只检索条件为
    `True` 的行。如果条件为 `False` 或者我们不知道，那么该行就不会被检索。


    如果我们将“不知道”包含在真值表中，它们看起来就像图 2-7 中的那些。对于 `AND` 运算，如果一个表达式为 `False`，那么其他表达式如何就无关紧要了——结果将是
    `False`。对于 `OR` 运算，如果一个表达式为 `True`，那么其他表达式如何也无关紧要，所以结果将是 `True`。


    ![A158240_2_En_2_Fig7_HTML.gif](A158240_2_En_2_Fig7_HTML.gif)


    图 2-7. 采用三值逻辑的真值表（T = 真，F = 假，？ = 不知道）


    ## 管理重复项


    如果我们的表设计良好，它们将有一个主键。这确保了每一行都是唯一的。然而，一旦我们从表中检索数据子集，结果可能就没有唯一行了。<sup>[3](#A158240_2_En_2_Chapter.html#Fn3)</sup>
    让我们看一个例子。


    考虑从 `Member` 表中只检索 `FirstName` 列。图 2-8 显示了两种可能的结果。


    ![A158240_2_En_2_Fig8_HTML.jpg](A158240_2_En_2_Fig8_HTML.jpg)


    图 2-8. 从 Member 表中投影 FirstName 列


    思考一下我们为什么可能执行只检索名字的查询是很有用的。也许这个查询是为了帮助准备一个俱乐部派对的姓名牌。如果是这种情况，那么如果我们使用唯一的输出，两个 Thomas
    和一个 William 就会感到被冷落。


    你可能会想，有什么大惊小怪的？我们当然想保留所有行。然而，考虑一下只检索包含会员类型的列。图 2-9 显示了包含重复项和移除重复项的输出。


    ![A158240_2_En_2_Fig9_HTML.jpg](A158240_2_En_2_Fig9_HTML.jpg)


    图 2-9. 从 Member 表中投影 MemberType 列


    很难想象在什么情况下你会想要图 2-9a 中的重复行。我们考虑过的两种操作在自然语言中听起来很相似。“给我一个名字列表”和“给我一个会员类型列表”听起来像是同一类问题，但它们意味着截然不同的事情。第一个意思是“给我每个会员的一个名字”，另一个意思是“给我一个唯一的会员类型列表”。


    SQL 会怎么做？如果我们说 `SELECT MemberType FROM Member`，我们将得到图 2-9a 的输出，其中包含了所有重复项。如果我们不想要重复项，那么我们可以使用关键字
    `DISTINCT`：


    ```

    SELECT DISTINCT m.MemberType

    FROM Member m

    ```


    是否保留重复项在很大程度上取决于你需要的信息，因此你需要仔细考虑。如果你期望得到图 2-9b 中的行集，却得到了图 2-9a，你很可能会注意到。对于图 2-8
    中的两组行，要发现你可能犯了错误就困难得多。养成在所有查询中考虑重复项的习惯。


    ## 排序输出


    我不时提到“行集”而不是表或虚拟表。单词“集”有两层含义。一是没有重复项（我们已经讨论了很多！）。另一层含义是集合中的行没有特定的顺序。理论上，我们没有第一行、最后一行或下一行。如果我们运行一个查询来从表中检索所有行或部分行，那么我们无法保证它们返回的顺序。然而，有时我们可能希望以特定顺序显示结果。我们可以使用关键词
    `ORDER BY` 来实现。下面展示了如何按 `LastName` 字母顺序检索会员信息：


    ```

    SELECT *

    FROM Member m

    ORDER BY m.LastName

    ```


    我们可以按两个或更多值排序。例如，如果我们想按 `LastName` 对 Senior 会员进行排序，对于具有相同 `LastName` 的会员再按其 `FirstName`
    的值排序，我们可以将这两个属性（按此顺序）包含在 `ORDER BY` 子句中：


    ```

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Senior''

    ORDER BY m.LastName, m.FirstName

    ```


    字段的类型决定了值的排序方式。默认情况下，文本字段按字母顺序排序，数字字段按数值排序（最小的在前），日期和时间字段按时间顺序排序（较早的日期和时间在前）。我们还可以使用关键字
    `DESC`（表示降序）来指定顺序是反向的。有一个等效的关键字 `ASC`（表示升序），如果两者都未指定，则为默认值。以下将返回会员姓名和残障值，并按降序排序；即，残障值最高的排在前面：


    ```

    SELECT m.Lastname, m.FirstName, m.Handicap

    FROM Member m

    ORDER BY m.Handicap DESC

    ```


    空值在任何输出中的排序方式取决于具体应用；你需要进行检查。例如，在 SQL Server 和 Microsoft Access 中，空值将出现在升序列表的顶部和降序列表的底部。Oracle
    提供了诸如 `NULLS FIRST` 和 `NULLS LAST` 这样的关键字，以便你可以选择空值的位置。在 SQL Server 中，让你的空值出现在升序列表底部的一个小技巧是使用
    case 语句：


    ```

    SELECT m.LastName, m.FirstName, m.Handicap

    FROM Member m

    ORDER BY (CASE

    WHEN m.Handicap IS NULL THEN 1

    ELSE 0

    END), m.Handicap

    ```


    前面的查询在 `ORDER BY` 子句中有两个属性。它首先按括号内的 `case` 语句排序。你可以将 case 语句视为创建了一个虚拟列，为有残障值的行赋予值
    0，为没有残障值的行赋予值 1。当我们在 `ORDER BY` 子句中按第一个属性排序时，有残障值的行将排在空值之前。在这些组内，行将再按残障值的升序排序。'
  raw: '### Comparisons Involving Null Values


    Given that we are going to have unexpected nulls in our tables, it is important
    to know how to deal with them. What rows will match the two conditions shown here?


    ```

    Gender = ''F''

    NOT (Gender = ''F'')

    ```


    You might think that if we carry out two queries, one to get all the rows that
    match a condition and another for all the rows that don’t match, then we will
    get the whole table. But, in fact, we don’t. Kim will not be included with the
    first condition, because clearly the value of `Gender` does not equal `''F''`.
    But when we ask whether the value is `NOT ''F''` we can’t say, because we don’t
    know what the value is. It might be `''F''` if it had a value. In SQL when we
    compare null values with something, we don’t get either `True` or `False` because
    we simply don’t know. This probably makes more sense if we think about handicaps.
    If we ask for everyone with `Handicap > 12`, and also for those members who satisfy
    either `NOT (Handicap > 12)` or `Handicap <=12`, then Sarah’s row will never be
    retrieved. The question doesn’t apply to her `—` she doesn’t have a handicap.


    Once we take nulls into consideration, our expressions for conditions might actually
    have one of three values: True, False, or “Don’t know.” That is pretty much how
    the world works, if you think about it. Only rows that are `True` for a condition
    are retrieved in a query. If the condition is `False` or if we don’t know, then
    the row is not retrieved.


    If we include “Don’t know” in the truth tables they will look like those in Figure
    [2-7](#A158240_2_En_2_Chapter.html#Fig7). For an `AND` operation, if one expression
    is `False`, then it doesn’t matter about the others `—` the result will be `False`.
    For an `OR` operation, if one expression is `True`, then it doesn’t matter about
    the others, so the result will be `True`.


    ![A158240_2_En_2_Fig7_HTML.gif](A158240_2_En_2_Fig7_HTML.gif)


    Figure 2-7.


    Truth tables with three-valued logic (T = True, F = False, ? = Don’t know)


    ## Managing Duplicates


    If our tables have been designed well, they will have a primary key. This ensures
    that every row is unique. However, as soon as we retrieve a subset of data from
    the tables the result may not have unique rows.[³](#A158240_2_En_2_Chapter.html#Fn3)
    Let’s look at an example.


    Consider retrieving just the `FirstName` column from the `Member` table. Figure
    [2-8](#A158240_2_En_2_Chapter.html#Fig8) shows two possible results.


    ![A158240_2_En_2_Fig8_HTML.jpg](A158240_2_En_2_Fig8_HTML.jpg)


    Figure 2-8.


    Projecting the FirstName column from the Member table


    It is useful to think about why we might carry out a query retrieving just names.
    Perhaps the query is to help prepare a set of nametags for a club party. If that
    is the case, then two Thomases and a William are going to feel left out if we
    use the unique output.


    You might think, what’s all the fuss? Of course we want to keep all the rows.
    However, consider retrieving just the column with the membership types. Figure
    [2-9](#A158240_2_En_2_Chapter.html#Fig9) shows the outputs with duplicates included
    and removed.


    ![A158240_2_En_2_Fig9_HTML.jpg](A158240_2_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    Projecting the MemberType column from the Member table


    It’s pretty difficult to think of a situation where you want the duplicated rows
    in Figure [2-9a](#A158240_2_En_2_Chapter.html#Fig9). The two operations we have
    considered sound similar in natural language. “Give me a list of first names”
    and “Give me a list of membership types” sound like the same sort of question,
    but they mean quite different things. The first means “Give me a name for each
    member,” and the other means “Give me a list of unique membership types.”


    What does SQL do? If we say `SELECT MemberType FROM Member`, we will get the output
    in Figure [2-9a](#A158240_2_En_2_Chapter.html#Fig9) with all the duplicates included.
    If we do not want the duplicates, then we can use the keyword `DISTINCT`:


    ```

    SELECT DISTINCT m.MemberType

    FROM Member m

    ```


    Whether or not you keep the duplicates depends very much on the information you
    require, so you need to give it careful thought. If you were expecting the set
    of rows in Figure [2-9b](#A158240_2_En_2_Chapter.html#Fig9) and got Figure [2-9a](#A158240_2_En_2_Chapter.html#Fig9),
    you would most likely notice. With the two sets of rows in Figure [2-8](#A158240_2_En_2_Chapter.html#Fig8),
    it is much more difficult to spot that you have perhaps made a mistake. Get into
    the habit of thinking about duplicates for all your queries.


    ## Ordering Output


    Every now and then I refer to a “set of rows” rather than a table or a virtual
    table. The word set has two implications. One is that there are no duplicates
    (and we have discussed that a lot!). The other implication is that there is no
    particular order to the rows in our set. In theory, we don’t have a first row
    or a last row or a next row. If we run a query to retrieve all the rows, or just
    some of the rows, from a table, then we have no guarantee in what order they will
    be returned. However, sometimes we might like to display the results in a particular
    order. We can do this with the key phrase `ORDER BY`. The following shows how
    to retrieve member information ordered alphabetically by `LastName`:


    ```

    SELECT *

    FROM Member m

    ORDER BY m.LastName

    ```


    We can order by two or more values. For example, if we want to order Senior members
    with the same `LastName` by the value of their `FirstName`, we can include those
    two attributes (in that order) in the `ORDER BY` clause:


    ```

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Senior''

    ORDER BY m.LastName, m.FirstName

    ```


    The type of a field determines how the values will be ordered. By default, text
    fields will be ordered alphabetically, number fields will be ordered numerically
    (smallest first), and date and time fields chronologically (earlier dates and
    times first). We can also specify that the order be reversed with the keyword
    `DESC` (for descending). There is an equivalent keyword `ASC` (for ascending),
    which is the default if neither is specified. The following will return member
    names and handicaps ordered in descending order; i.e., with the highest value
    of handicap first:


    ```

    SELECT m.Lastname, m.FirstName, m.Handicap

    FROM Member m

    ORDER BY m.Handicap DESC

    ```


    The way nulls are ordered in any output depends on the application; you will need
    to check. For example, in SQL Server and Microsoft Access, nulls will appear at
    the top of an ascending list and the bottom of a descending list. Oracle provides
    keywords such as `NULLS FIRST` and `NULLS LAST` so you can choose where the null
    values go. A little trick to get your nulls at the bottom of an ascending list
    in SQL Server is to use a case statement:


    ```

    SELECT m.LastName, m.FirstName, m.Handicap

    FROM Member m

    ORDER BY (CASE

    WHEN m.Handicap IS NULL THEN 1

    ELSE 0

    END), m.Handicap

    ```


    The preceding query has two attributes in the `ORDER BY` clause. It orders firstly
    by the `case` statement in the parentheses. You can think of the case statement
    as creating a virtual column giving the value 0 to those rows with a handicap
    and 1 to those which have no handicap value. When we order by this first attribute
    in the `ORDER BY` clause, the rows with a value for a handicap will be before
    the nulls. Within these groups the rows will then be ordered by the value of the
    handicap in ascending order.'
  trans: '

    ## 涉及空值的比较


    既然我们的表中可能出现意外的空值，了解如何处理它们就很重要。下面这两个条件会匹配哪些行？


    ```

    Gender = ''F''

    NOT (Gender = ''F'')

    ```


    你可能会认为，如果我们执行两个查询——一个获取匹配某个条件的所有行，另一个获取不匹配该条件的所有行——那么我们就得到了整个表。但事实上，我们并没有。Kim
    不会被第一个条件包括，因为显然 `Gender` 的值不等于 `''F''`。但是，当我们询问该值是否为 `NOT ''F''` 时，我们无法回答，因为我们不知道该值是什么。如果有值，它可能是
    `''F''`。在 SQL 中，当我们将空值与某物进行比较时，我们既不会得到 `True` 也不会得到 `False`，因为我们根本不知道。如果我们考虑残障值，这可能就更说得通了。如果我们查询所有
    `Handicap > 12` 的人，以及那些满足 `NOT (Handicap > 12)` 或 `Handicap <=12` 的成员，那么 Sarah
    的行永远不会被检索出来。这个问题不适用于她——她没有残障值。


    一旦我们考虑了空值，我们的条件表达式实际上可能有三个值之一：真（True）、假（False）或“不知道（Don’t know）”。如果你仔细想想，这差不多就是世界的运作方式。查询中只检索条件为
    `True` 的行。如果条件为 `False` 或者我们不知道，那么该行就不会被检索。


    如果我们将“不知道”包含在真值表中，它们看起来就像图 2-7 中的那些。对于 `AND` 运算，如果一个表达式为 `False`，那么其他表达式如何就无关紧要了——结果将是
    `False`。对于 `OR` 运算，如果一个表达式为 `True`，那么其他表达式如何也无关紧要，所以结果将是 `True`。


    ![A158240_2_En_2_Fig7_HTML.gif](img/A158240_2_En_2_Fig7_HTML.gif)


    图 2-7. 采用三值逻辑的真值表（T = 真，F = 假，？ = 不知道）


    ## 管理重复项


    如果我们的表设计良好，它们将有一个主键。这确保了每一行都是唯一的。然而，一旦我们从表中检索数据子集，结果可能就没有唯一行了。<sup>3</sup> 让我们看一个例子。


    考虑从 `Member` 表中只检索 `FirstName` 列。图 2-8 显示了两种可能的结果。


    ![A158240_2_En_2_Fig8_HTML.jpg](img/A158240_2_En_2_Fig8_HTML.jpg)


    图 2-8. 从 Member 表中投影 FirstName 列


    思考一下我们为什么可能执行只检索名字的查询是很有用的。也许这个查询是为了帮助准备一个俱乐部派对的姓名牌。如果是这种情况，那么如果我们使用唯一的输出，两个 Thomas
    和一个 William 就会感到被冷落。


    你可能会想，有什么大惊小怪的？我们当然想保留所有行。然而，考虑一下只检索包含会员类型的列。图 2-9 显示了包含重复项和移除重复项的输出。


    ![A158240_2_En_2_Fig9_HTML.jpg](img/A158240_2_En_2_Fig9_HTML.jpg)


    图 2-9. 从 Member 表中投影 MemberType 列


    很难想象在什么情况下你会想要图 2-9a 中的重复行。我们考虑过的两种操作在自然语言中听起来很相似。“给我一个名字列表”和“给我一个会员类型列表”听起来像是同一类问题，但它们意味着截然不同的事情。第一个意思是“给我每个会员的一个名字”，另一个意思是“给我一个唯一的会员类型列表”。


    SQL 会怎么做？如果我们说 `SELECT MemberType FROM Member`，我们将得到图 2-9a 的输出，其中包含了所有重复项。如果我们不想要重复项，那么我们可以使用关键字
    `DISTINCT`：


    ```

    SELECT DISTINCT m.MemberType

    FROM Member m

    ```


    是否保留重复项在很大程度上取决于你需要的信息，因此你需要仔细考虑。如果你期望得到图 2-9b 中的行集，却得到了图 2-9a，你很可能会注意到。对于图 2-8
    中的两组行，要发现你可能犯了错误就困难得多。养成在所有查询中考虑重复项的习惯。


    ## 排序输出


    我不时提到“行集”而不是表或虚拟表。单词“集”有两层含义。一是没有重复项（我们已经讨论了很多！）。另一层含义是集合中的行没有特定的顺序。理论上，我们没有第一行、最后一行或下一行。如果我们运行一个查询来从表中检索所有行或部分行，那么我们无法保证它们返回的顺序。然而，有时我们可能希望以特定顺序显示结果。我们可以使用关键词
    `ORDER BY` 来实现。下面展示了如何按 `LastName` 字母顺序检索会员信息：


    ```

    SELECT *

    FROM Member m

    ORDER BY m.LastName

    ```


    我们可以按两个或更多值排序。例如，如果我们想按 `LastName` 对 Senior 会员进行排序，对于具有相同 `LastName` 的会员再按其 `FirstName`
    的值排序，我们可以将这两个属性（按此顺序）包含在 `ORDER BY` 子句中：


    ```

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Senior''

    ORDER BY m.LastName, m.FirstName

    ```


    字段的类型决定了值的排序方式。默认情况下，文本字段按字母顺序排序，数字字段按数值排序（最小的在前），日期和时间字段按时间顺序排序（较早的日期和时间在前）。我们还可以使用关键字
    `DESC`（表示降序）来指定顺序是反向的。有一个等效的关键字 `ASC`（表示升序），如果两者都未指定，则为默认值。以下将返回会员姓名和残障值，并按降序排序；即，残障值最高的排在前面：


    ```

    SELECT m.Lastname, m.FirstName, m.Handicap

    FROM Member m

    ORDER BY m.Handicap DESC

    ```


    空值在任何输出中的排序方式取决于具体应用；你需要进行检查。例如，在 SQL Server 和 Microsoft Access 中，空值将出现在升序列表的顶部和降序列表的底部。Oracle
    提供了诸如 `NULLS FIRST` 和 `NULLS LAST` 这样的关键字，以便你可以选择空值的位置。在 SQL Server 中，让你的空值出现在升序列表底部的一个小技巧是使用
    case 语句：


    ```

    SELECT m.LastName, m.FirstName, m.Handicap

    FROM Member m

    ORDER BY (CASE

    WHEN m.Handicap IS NULL THEN 1

    ELSE 0

    END), m.Handicap

    ```


    前面的查询在 `ORDER BY` 子句中有两个属性。它首先按括号内的 `case` 语句排序。你可以将 case 语句视为创建了一个虚拟列，为有残障值的行赋予值
    0，为没有残障值的行赋予值 1。当我们在 `ORDER BY` 子句中按第一个属性排序时，有残障值的行将排在空值之前。在这些组内，行将再按残障值的升序排序。

