    并集操作符（图 7-2 左上）显示来自每个表的所有名称（重复项已删除）。交集操作符（右上）返回同时出现在两个表中的两行。差集操作符（下）返回在一个俱乐部中而不在另一个俱乐部中的行。


    ## 联合兼容表


    集合操作并集、交集和差集在两组行之间进行操作。尝试比较结构非常不同的表中的行是没有意义的，例如图 7-3 中的表。


    ![A158240_2_En_7_Fig3_HTML.jpg](img/A158240_2_En_7_Fig3_HTML.jpg)

    图 7-3. 尝试比较具有不同结构的表中的行是没有意义的


    那么，什么决定了两组行是否可以使用集合操作并集、交集和差集进行比较？正式来说，这两组必须具有相同数量的列，并且每列必须具有相同的域。严格来说，域是一组可能的值。然而，在实践中，集合操作的要求是，每组行中对应的列（即从左到右的顺序）具有相同的类型
    `—` 都是字符型，都是整型，等等。¹ 列的名称不需要相同。满足这些要求的表被称为联合兼容的，尽管该要求对于交集和差集操作也是必需的。


    图 7-4 显示了一对联合兼容的表。即使列的名称不同，它们具有相同数量的列，并且对应的列具有相同的类型。


    ![A158240_2_En_7_Fig4_HTML.jpg](img/A158240_2_En_7_Fig4_HTML.jpg)

    图 7-4. 联合兼容的表，即使列名不同


    图 7-5 有两个具有相同列名的表，但它们不是联合兼容的，因为列的顺序使得第四列在上表中是数字类型，在下表中是字符类型，最后一列则相反。


    ![A158240_2_En_7_Fig5_HTML.jpg](img/A158240_2_En_7_Fig5_HTML.jpg)

    图 7-5. 不联合兼容的表


    不同的 SQL 实现可能会以不同的方式解释对域或类型“相同性”的严格要求。严格来说，定义为 `CHAR(10)` 和 `CHAR(12)` 的两个字段具有不同的域，但许多
    SQL 实现会允许这些字段在集合操作的目的上被视为相同。一些实现还会将数字转换为字符以执行集合操作。我觉得这特别可怕，不建议让你的应用程序替你做出这种决定。以下各节将演示如何使用
    SQL 使你的表联合兼容。

    '
- fmt: '### Ensuring Union Compatibility


    When tables are not union compatible, you can often remedy the incompatibility
    in the `SELECT` clauses.


    For the pair of tables in Figure [7-5](#A158240_2_En_7_Chapter.html#Fig5), if
    we just select the columns as follows the order of the columns will prevent the
    returned rows from being union compatible:


    ```sql

    SELECT * FROM ClubC;

    SELECT * FROM ClubD;

    ```


    However, we can specify the order of the columns in the `SELECT` clause:


    ```sql

    SELECT MemberID, LastName, FirstName, Handicap, MemberType FROM ClubC;

    SELECT MemberID, LastName, FirstName, Handicap, MemberType FROM ClubD;

    ```


    The two sets of rows returned from these queries are now union compatible.


    Another incompatibility problem occurs when the types of the columns have been
    declared as different types in the original design of the tables. For example,
    the `ClubC` table may have the `Handicap` field declared as an `INT`, whereas
    the `ClubD` table may have (unwisely) stored the `Handicap` values in a `CHAR`
    field. (Recall from Chapter [2](#A158240_2_En_2_Chapter.html) that if we store
    values in a character or text field then they will order alphabetically, and we
    will not be able to perform functions such as average on them.) As mentioned earlier,
    different implementations of SQL will treat these different types in a variety
    of ways. Many will try to convert the numbers to text or vice versa. You can take
    control of these conversions yourself (which is probably a good idea) by using
    type-conversion functions.


    For example, in SQL Server, the expression `Convert(INT, Handicap)` would take
    a text value in the `Handicap` field (“14”) and convert it to an integer value
    (14). (If the value in the `Handicap` field wasn’t able to be converted to an
    integer then an error would occur.) If the `Handicap` field in the `ClubD` table
    were a `CHAR` type then we could use the conversion function in the `SELECT` clause.
    The two sets of rows returned by the following queries will now be union compatible:


    ```sql

    SELECT MemberID, LastName, FirstName, Handicap FROM ClubC;

    SELECT MemberID, LastName, FirstName, Convert(INT, Handicap) FROM ClubD;

    ```


    ## Union


    Union allows us to produce output consisting of all the unique rows from two union-compatible
    sets of rows. To carry out a union in SQL, we need to first retrieve two sets
    of rows using two `SELECT` clauses and then combine the two sets with the `UNION`
    keyword. The following SQL shows the union of all the rows from the two union-compatible
    tables (`ClubA` and `ClubB`) shown in Figure [7-4](#A158240_2_En_7_Chapter.html#Fig4).


    ```sql

    SELECT * FROM ClubA

    UNION

    SELECT * FROM ClubB;

    ```


    The resulting table will include all the rows from both tables with no duplicates,
    so you will see only one row each for Barbara Olson, Robert Pollard, and Thomas
    Sexton, as shown in Figure [7-6](#A158240_2_En_7_Chapter.html#Fig6). If you wish
    to retain the duplicates for some reason, you can use the key phrase `UNION ALL`.


    ![A158240_2_En_7_Fig6_HTML.jpg](A158240_2_En_7_Fig6_HTML.jpg)


    Figure 7-6. Union of ClubA and ClubB with no duplicate rows


    As union-compatible tables do not need to have the same column names, the names
    of the columns in the resulting virtual table will usually be from one of the
    tables. In the example in Figure [7-6](#A158240_2_En_7_Chapter.html#Fig6), the
    column names are the same as the first table mentioned in the union query.


    It does not matter for the union operator in which order the two tables are specified.
    The query that follows will return the same rows as the previous query did. The
    rows may appear in a different order, and the displayed names of the columns may
    change, but the data will be the same.


    ```sql

    SELECT * FROM ClubB

    UNION

    SELECT * FROM ClubA;

    ```


    ### Selecting the Appropriate Columns


    When using the union operator you need to think carefully about what it is you
    actually want. The examples with the clubs are rather contrived (as you have no
    doubt noticed). It is very unlikely that two clubs would have members with the
    same ID numbers and identical membership types. A more likely scenario is that
    if Barbara Olson did belong to two clubs, she would have different data in each
    club table. In the `ClubA` table, she might be a Senior with a value of 258 for
    `MemberID`. In the `ClubB` table, she might be an Associate with a value of 4573
    for `RegNum`. If we do the union shown in Figure [7-6](#A158240_2_En_7_Chapter.html#Fig6),
    where we select all the columns from each table, the two rows for Barbara will
    be different, and so both will appear in the result, as in Figure [7-7](#A158240_2_En_7_Chapter.html#Fig7).


    ![A158240_2_En_7_Fig7_HTML.jpg](A158240_2_En_7_Fig7_HTML.jpg)


    Figure 7-7. Two records appear for Barbara Olson in the union because the rows
    are different


    We need to consider what we really want from such a union. If we need a list of
    names for a joint Christmas party for the two clubs, then we don’t want everyone
    listed twice. The way to avoid duplicates is to project just the names from each
    table before carrying out the union:


    ```sql

    SELECT FamilyName, Name FROM ClubA

    UNION

    SELECT LastName, FirstName FROM ClubB;

    ```


    With this query the two rows for Barbara will be the same and will only appear
    in the union once, as in Figure [7-8](#A158240_2_En_7_Chapter.html#Fig8).


    ![A158240_2_En_7_Fig8_HTML.jpg](A158240_2_En_7_Fig8_HTML.jpg)


    Figure 7-8. Only one row appears for Barbara Olson if only the name columns are
    in the union


    There is, of course, a serious issue with this last query. There may be two Barbara
    Olsons, one in each club, and now only one nametag will be printed for the pair
    of them. Sadly, real data is fraught with these sorts of problems. With any luck
    there will be some universal national golf association number that might sort
    this out, but if not you just need to be alert. The intersection operation, discussed
    in the next section, would produce the names that appear in both club lists, and
    a manual sanity check could be carried out.'
