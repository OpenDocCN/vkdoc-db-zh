    ## SQL、代数与微积分


    SQL 是一种主要基于**关系演算**的语言。关系演算描述了所检索的元组必须满足的条件。在下面的 SQL 查询中，`WHERE` 子句描述了结果元组的条件：


    ```

    SELECT LastName, FirstName, Handicap, PracticeNight

    FROM Member, Team

    WHERE TeamName = Team AND Handicap < 15;

    ```


    尽管 SQL 是一门基于演算的语言，但多年来，其语法中已经包含了越来越多暗示关系代数集合运算的关键字。这在许多情况下使得查询更容易理解。前面的查询也可以使用与关系代数内连接操作相关的语法来编写，如下所示：


    ```

    SELECT LastName, FirstName, Handicap, PracticeNight

    FROM Member INNER JOIN Team ON TeamName = Team

    WHERE Handicap < 15;

    ```


    前面的 SQL 似乎暗示先执行连接操作，然后再检索那些满足 `Handicap < 15` 的元组。但实际上并非如此。SQL 仅仅是对结果元组的描述，并不暗示查询将如何执行。数据库的查询优化器将决定如何检索元组，一个好的优化器会以相同（最有效）的方式执行这两个查询。


    在本附录的剩余部分，我们将探讨一种更正式的关系代数和演算表示法。我通常会提供一个等价的 SQL 表达式，并根据所在章节选择一个与代数或演算相似的表达式。需要记住的重要一点是，所有
    SQL 表达式都是对查询输出的描述，其表达方式不一定决定检索结果数据所涉及的实际操作。


    ## 关系代数：指定操作


    使用关系代数，我们通过对数据库中的关系执行一系列操作或处理来描述查询。一些操作作用于单个关系（一元操作），而另一些操作则是组合两个关系中数据的不同方式（二元操作）。每次我们对一个或多个关系执行操作时，结果都是另一个关系。这是一个非常强大的概念，意味着我们可以通过将一个操作的结果作为输入再应用另一个操作，以小步骤构建出复杂的查询。


    关系代数操作及其通常使用的表示符号如表 A2-2 所示。


    表 A2-2. 关系运算符及其符号


    | Operation | Symbol |

    | --- | --- |

    | 选择 | σ |

    | 投影 | π |

    | 笛卡尔积 | ![$$ \times $$](img/A158240_2_En_14_Chapter_IEq1.gif) |

    | 并 | ∪ |

    | 差 | - |

    | 内连接 | ⋈ |

    | 交 | ∩ |

    | 除 | ÷ |


    这些操作并非完全独立。例如，我们稍后将看到内连接被定义为笛卡尔积后进行选择和投影。表 A2-2 中的前五个运算符可以用来定义最后三个，这就是为什么 SQL
    不需要提供表示除法和交集的关键字。然而，能够为像内连接这样的操作指定等价的 SQL 是很方便的，因为它在数据库查询中出现得非常频繁。现在，我们将为每个操作介绍一种更正式的表示法，并展示如何用它来指定查询。


    ### 选择


    选择操作仅从关系中返回那些满足涉及属性的特定条件的元组。使用选择操作的一个例子是从我们的 `Member` 关系中检索所有高级会员。希腊字母 sigma (σ)
    代表选择操作，条件 `MemberType = ''Senior''` 在下标中指定。以下表达式展示了使用选择操作返回高级会员的表示法：


    ![$$ {\upsigma}_{\mathrm{MemberType}\ {=}^{\prime }{\mathrm{Senior}}^{\hbox{''}}}\
    \left(\mathrm{Member}\right) $$](img/A158240_2_En_14_Chapter_Equa.gif)


    检查 `Member` 关系中的每一个元组，如果元组满足条件，则将其包含在结果关系中。从表的角度看，选择操作符检索表的行的子集。所有的属性或列都会被返回。


    在 SQL 中，`WHERE` 子句包含选择操作符的条件，并控制返回的元组或行。选择操作 ![$$ {\upsigma}_{\mathrm{MemberType}\
    {=}^{\prime }{\mathrm{Senior}}^{\hbox{''}}}\ \left(\mathrm{Member}\right) $$](img/A158240_2_En_14_Chapter_IEq2.gif)
    的 SQL 等价形式是：


    ```

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Senior'';

    ```


    请注意，SQL 中的 `SELECT` 关键字与关系代数的选择操作没有直接关系。更多内容将在下一节中说明。


    ### 投影


    投影操作返回一个关系，其属性是原关系属性的一个子集。投影操作符用 π (pi) 表示，属性列在下标中。从表的角度看，投影返回表的列的子集。以下语句将从 `Member`
    关系中的每个元组返回 `FirstName` 和 `LastName` 属性：


    ![$$ {\uppi}_{\mathrm{FirstName},\ \mathrm{LastName}}\left(\mathrm{Member}\right)
    $$](img/A158240_2_En_14_Chapter_Equb.gif)


    您预期操作 πFirstName 会从 `Member` 关系中返回多少个元组或行？这些元组只包含单个属性 `FirstName`。`Member` 关系有
    20 个元组，但这包括了两个 William、两个 Robert 和三个 Thomas。前面我提到，每个操作的结果都是另一个关系。πFirstName 的结果必须是一个唯一元组的集合。重复项都将被移除，最终剩下
    16 个唯一的名字。


    可以将投影操作理解为返回指定属性值的所有唯一组合。


    在 SQL 中，投影操作符要返回的属性在 `SELECT` 子句中指定。我知道这看起来有些反直觉，但请记住 SQL 语法是基于关系演算，而不是代数。投影操作
    πFirstName, LastName 的 SQL 等价形式是：


    ```

    SELECT DISTINCT FirstName, LastName

    FROM Member;

    ```

