    ## 介绍数据模型


    即使是最简单的数据库也可能包含多个表。**数据模型** 是对底层数据及其相互关系的**概念模型**。我们将使用**统一建模语言（UML）** 中的类图符号来表示我们的数据模型。还有许多其他表示数据结构的方法（例如，实体关系图），对于本书的目的而言，它们同样适用。我们选择使用
    UML，因为它拥有庞大的软件应用程序开发图表工具套件，其中不仅包含数据的结构，也包含其行为。在本节中，我们将了解如何解读类图以及如何将其转换为关系数据库中的表和约束。


    类（Class）类似于我们想要保存其数据的事物（事件、人物、地点等）的**模板**。例如，我们可能希望保存高尔夫俱乐部会员的姓名和其他详细信息。图 1-5
    展示了 `Member`（会员）类的 UML 符号。类名位于顶部面板，下一个面板显示的是**属性**。类图还可以有另一个面板来显示与该类行为相关的**方法**。


    ![A158240_2_En_1_Fig5_HTML.jpg](img/A158240_2_En_1_Fig5_HTML.jpg)


    图 1-5. Member 类的 UML 表示法


    在关系数据库中，每个类都表示为一个表，属性是列，每个实例（在此例中即为单个俱乐部会员）将是表中的一行。


    数据模型还可以描述不同类之间的依赖关系。图 1-6 展示了两个类 `Member` 和 `Team`（团队），以及它们之间的关系。


    ![A158240_2_En_1_Fig6_HTML.jpg](img/A158240_2_En_1_Fig6_HTML.jpg)


    图 1-6. 两个类之间的关系


    图 1-6 中 `plays for`（效力于）关系线两端的数字对表示有多少成员为一个特定团队效力，反之亦然。每对数字中的第一个数字是**最小数目**。这个数字通常是
    0 或 1，因此有时被称为**可选性**（即，它指示一个会员是否必须关联到一个团队，反之亦然）。第二个数字（称为**基数**）是关联对象的最大数目。它通常是
    1 或多个（用 n 或 * 表示），尽管其他数字也是可能的。


    关系可以从两个方向解读。图 1-6 中关系的标签暗示我们是从左向右阅读，我们需要思考一个合适的动词来从另一个方向解读该图。“团队拥有成员”可以胜任。从左向右阅读图
    1-6，我们看到一个特定的成员不必须为某个团队效力，并且最多只能为一个团队效力（靠近 `Team` 类一端的线上的数字 0 和 1）。从右向左阅读，我们可以说一个特定的团队不需要有任何成员，但可以拥有许多成员（靠近
    `Member` 类一端的数字 0 和 n）。像图 1-6 中的这种关系被称为**一对多关系**（一个成员只能属于一个团队，而一个团队可以拥有许多成员）。


    你可能会认为一个团队应该正好有四名成员（比如，对于一个俱乐部间的团队）。虽然当团队进行一轮高尔夫比赛时可能是这样，但我们的数据库可能会记录与该团队关联的不同数量的成员，因为我们会在一年中增加和移除球员。数据模型通常使用
    0、1 和多个来建模表之间的关系。其他约束（例如团队的最大人数）更常通过业务规则或 UML 用例来表达。


    我们可以通过查看关系在“一”端的主键，并在“多”端的表中添加一个相同类型的列来表示一对多关系。对于图 1-6 中的模型，我们会在 `Member` 表中添加一个
    `Team` 列，如图 1-7 所示。


    ![A158240_2_En_1_Fig7_HTML.jpg](img/A158240_2_En_1_Fig7_HTML.jpg)


    图 1-7. 包含外键列 Team 的 Member 表


    `Team` 列被称为**外键**。`Member` 表中该列的任何非空值，都必须是 `Team` 表的主键列中已经存在的值。外键的概念为我们提供了对 `Member`
    表的约束，使得我们无法将成员分配给不存在的团队。这个约束被称为**参照完整性**。


    创建带有外键的表的 SQL 如下所示：


    ```sql

    CREATE TABLE Member(

    MemberID INT PRIMARY KEY,

    LastName CHAR(20),

    FirstName CHAR(20),

    Phone CHAR(20),

    Handicap INT,

    JoinDate DATETIME,

    Gender CHAR(1),

    Team CHAR(20) FOREIGN KEY REFERENCES Team);

    ```


    因为我们需要比较 `Member` 表外键列中的值与 `Team` 表主键列中的值，所以这两列必须具有相同的域或数据类型。


    大多数数据库产品都有用于设置和显示外键约束的图形界面。图 1-8 展示了 Microsoft^© SQL Server 和 Microsoft^© Access
    的界面。这些本质上是数据模型实现的图表，对于理解数据库结构至关重要，从而让我们知道如何提取所需的信息。


    ![A158240_2_En_1_Fig8_HTML.jpg](img/A158240_2_En_1_Fig8_HTML.jpg)


    图 1-8. 使用外键实现一对多关系的图表


    图 1-4 和图 1-7 中的表设计本质上是相同的。对于图 1-4，我们是通过从 `Member` 表中移除 `PracticeNight` 列并创建一个新的
    `Team` 表（一个规范化过程）来得到这个设计的。对于图 1-7，我们首先考虑了一个数据模型，并在 `Member` 表中添加了 `Team` 列，以此表示
    `Member` 和 `Team` 之间的关系。无论你采取哪种方式处理这个问题，结果都是一样的。


    冒着重复的风险，我确实想提醒大家注意确保数据库设计得当的必要性。图 1-6 中的简单模型即使对于它所包含的极少量数据也几乎肯定是完全不合适的。一个真实的俱乐部可能希望跟踪团队成员资格如何随年份演变。这将需要在团队成员信息中加入有关赛季或年份的信息。如果一些成员在一年内被召入作为替补，他们可能效力于多个团队。这些信息可能需要保留，也可能不需要。设计一个有用的数据库是一项棘手的任务，超出了本书的范围。

    '
- fmt: '## Retrieving Information from a Database


    Now that we have a well-designed database consisting of interrelated normalized
    tables, we can start to look at how to extract information by way of queries.
    When I refer to extracting or retrieving information I don’t mean that we are
    removing any data. Think of a query as providing a window onto a small part of
    the database. Many database systems will have a diagrammatic interface that can
    be useful for simple queries. Figure [1-9](#A158240_2_En_1_Chapter.html#Fig9)
    shows the Microsoft^© Access interface for retrieving the names of senior members
    from the `Member` table. The checkmarks denote which columns we want to retrieve,
    and the `Criteria` row enables us to specify conditions on the rows that are returned.


    ![A158240_2_En_1_Fig9_HTML.jpg](A158240_2_En_1_Fig9_HTML.jpg)

    *Figure 1-9. Access interface for a simple query on the Member table*


    The application will take the information from the graphical interface and construct
    an SQL query. Most applications will show you the SQL that is generated, and you
    can amend it or write it from scratch yourself. The SQL equivalent to the query
    depicted in Figure [1-9](#A158240_2_En_1_Chapter.html#Fig9) is:


    ```sql

    SELECT FirstName, LastName

    FROM Member

    WHERE MemberType = ''Senior'';

    ```


    This SQL query contains three clauses: `SELECT` specifies which columns to return,
    `FROM` specifies the table(s) where the information is kept, and `WHERE` specifies
    the conditions the returned rows must satisfy. We’ll look at the structure of
    SQL statements in more detail later, but for now the intention of the query is
    pretty clear.


    As we need to include more and more tables connected in a variety of ways, the
    diagrammatic interfaces rapidly become unwieldy, and often we need to write the
    SQL commands directly. Often, it is easier to think about a query in a more abstract
    way. With a clear abstract understanding of what is required, it then becomes
    more straightforward to turn the idea into an appropriate SQL statement. There
    are two different ways to approach queries on a relational database.


    ### Process Approach


    One way to approach a query is to think in terms of the operations we need to
    carry out on the tables. Let’s think about how we might to get a list of names
    for members who practice on a Monday. We might imagine first retrieving just the
    rows from the `Team` table that have Monday in the `PracticeNight` column. We
    might then join those rows with the `Member` table (more about joins later) and
    then extract the names from the result. We will call this the process approach
    , as it is a series of steps carried out in a particular order. Figure [1-10](#A158240_2_En_1_Chapter.html#Fig10)
    depicts the steps just described.


    ![A158240_2_En_1_Fig10_HTML.jpg](A158240_2_En_1_Fig10_HTML.jpg)

    *Figure 1-10. The process approach: thinking of a query as a sequence of operations*


    ### Outcome Approach


    An alternative way to think about the query in the previous section is to examine
    all the rows in the `Member` table and just return those that satisfy the criteria
    that the member is on a team that has Monday as a practice night. Figure [1-11](#A158240_2_En_1_Chapter.html#Fig11)
    depicts this train of thought. The row `m` that we are considering in the `Member`
    table satisfies the condition about the team’s practice night, so we should retrieve
    the names from that row.


    ![A158240_2_En_1_Fig11_HTML.jpg](A158240_2_En_1_Fig11_HTML.jpg)

    *Figure 1-11. Considering if the row m satisfies the criteria for the query.*


    We will call this type of thinking about a query the outcome approach because
    we describe what we want rather than how to get it.


    ## Why We Consider Two Approaches


    Relational database theory has its origins in set theory. If we think of our tables
    as sets of rows, then a query is a question that requires us to manipulate those
    sets to retrieve a subset containing the information we require. The relational
    theory has two formal ways of specifying the criteria for extracting subsets of
    rows: relational algebra and relational calculus .


    We do not need these abstract ideas for simple queries. However, if all queries
    were simple, you would not be reading this book. In the first instance, queries
    are expressed in everyday language that is often ambiguous. Try this simple expression:
    “Find me all students who are younger than 20 or live at home and get an allowance.”
    This can mean different things depending on where you insert commas. For example
    a comma after “20” leads to the interpretation that everyone under 20 is included,
    while a comma after “home” suggests that they must also get an allowance. Even
    after we have sorted out what the natural-language expression means, we then have
    to think about the query in terms of the actual tables in the database. This means
    having to be quite specific in how we express the query. Both relational algebra
    and relational calculus give us a powerful way of being accurate and specific.


    Why not skip all this abstract stuff and go right ahead and learn SQL? Well, the
    SQL language consists of elements of both calculus and algebra. Older versions
    of SQL were purely based on relational calculus in that you described what you
    wanted to retrieve rather than how. Modern implementations of SQL allow you to
    explicitly specify algebraic operations such as joins, unions, and intersections
    on the tables as well.


    There are often several equivalent ways of expressing an SQL statement. Some ways
    are very much based on calculus, some are based on algebra, and some are a bit
    of both. During my time as a university lecturer I often asked the class whether
    they found the calculus or algebra expressions more intuitive for a particular
    query. The class was usually equally divided. Personally, I find that some queries
    just feel obvious in terms of relational algebra, whereas others feel much more
    simple when expressed in relational calculus. Once I have the idea pinned down
    with one or other, the translation into SQL (or some other query language) is
    usually straightforward.


    We can make use of the ideas of relational algebra and relational calculus without
    delving into the mathematics. In the body of the book I refer to the process approach
    (algebra) and the outcome approach (calculus). The more tools you have at your
    disposal, the more likely it is that you will be able to express complex queries
    accurately. In Appendix 2 there is an introduction to the formal notation for
    relational algebra and relational calculus for those of you who would like to
    add that to your armory.'
