  trans: '### 检查聚合中的底层查询


    如果你的聚合查询（例如 `SELECT AVG(Handicap) FROM ... WHERE ...`）出了问题，请检查在应用聚合函数之前，是否检索到了正确的行。可以将查询改为
    `SELECT * FROM ... WHERE ...`，并确认这返回的是你想要计算平均值的那些行。实际上，我建议对聚合查询都这样做，因为否则很难检查返回的数字是否正确。


    ## 常见症状


    在尝试了上一章的一些步骤后，你应该已经简化了查询以定位问题所在。在本节中，我们将看一些具体症状及其可能的原因。


    ### 未返回任何行


    当你知道本应有行返回但实际上没有时，通常很容易发现查询中的问题。涉及“和”或“两者”的问题常常有此情况。例如，考虑这样一个问题：“哪些成员同时参加了第 24
    号和第 36 号锦标赛？”常见的首次尝试（我有时也会不自觉地这样做）的查询语句可能如下：


    ```sql

    SELECT * FROM Entry

    WHERE TourID = 24 AND TourID = 36;

    ```


    上述查询要求 `Entry` 表中的某一行，其 `TourID` 字段同时具有两个不同的值。这永远不会发生，因此没有检索到任何行。解决方法是使用自连接（第
    5 章介绍）或交集操作（第 7 章介绍）。


    查询未返回任何行也可能是下一节中某些问题的一个极端例子。


    ### 缺少行


    有时很难发现查询漏掉了一些行，尤其是当返回的结果集很大时。如果你得到了 1000 行返回，可能不会注意到少了一行。这需要仔细测试，第 10 章讨论了一些方法。通常值得检查以下常见错误列表，看是否有适用的情况。


    #### 是否需要外连接？


    在需要外连接时使用内连接是一个非常常见的问题。假设我们要获取包含姓名和费用的成员信息列表。为此，我们需要 `Member` 表（获取姓名）和 `Type`
    表（获取费用）。首次尝试的查询可能如下：


    ```sql

    SELECT m.LastName, m.FirstName, t.Fee

    FROM Member m, Type t

    WHERE m.MemberType = t.Type;

    ```


    我们知道，比如说有 135 个成员，但查询只返回了 133 行。这里的问题是我们执行了内连接（见第 3 章），因此任何成员类型字段为空的成员都不会出现在结果中。当然，这可能是你想要的结果（那些有类型和费用的成员），但如果你想要所有成员的列表以及有费用的成员的费用，这便不是正确的输出。


    一个包含 `Member` 表所有行的外连接（也在第 3 章讨论过）将解决这个问题。每当使用连接时，都值得思考连接字段，并考虑当该字段为空时你希望如何处理。


    #### 选择条件是否正确处理了空值？


    如果你忘记了空值对查询的影响，它们可能会带来不少麻烦。上一节讨论了连接字段中的空值。你还记得检查涉及可能包含空值的字段的比较吗？我们在第 2 章和本章前面已经讨论过这一点。


    考虑两个基于 `Member` 表、选择条件分别为 `Gender = ''M''` 和 `Gender <> ''M''` 的查询。按理说，`Member`
    表中的所有行都应被其中一个查询返回。然而，`Gender` 字段为空的行对于这两个条件都将返回 `false`（任何与空值的比较都返回 `false`），因此这些行不会出现在任何一个结果集中。


    假设我们想获取俱乐部中非顶尖球员的成员列表（也许是为了给他们提供辅导）。有人可能建议使用如下查询来查找没有低差点的成员：


    ```sql

    SELECT *

    FROM Member m

    WHERE m.Handicap > 10;

    ```


    问题在于上述查询将遗漏所有没有差点值的成员。在这种情况下，将 `WHERE` 条件改为 `m.Handicap > 10 OR m.Handicap IS
    Null` 会有所帮助。


    #### 你是否在查找与文本值的匹配？


    试图查找名为 Jim 的行，能在表中看到 Jim，但你的查询却返回空结果，这非常令人困惑。这可能由本章前面“数据值问题”一节中讨论的某个问题引起。


    快速排除可疑文本值的一个方法是使用 `LIKE` 进行比较。例如，如果你有 `= ''Jim''`，将其替换为 `LIKE ''%Jim%''`。如果查询随后找到了你预期的行（可能还附带其他一些行），那么你就知道问题出在数据上。如前所述，在字符串开头和结尾放置通配符
    `%`（在 Access 中是 `*`）可以找到前导或尾随空格以及其他不可打印字符。


    #### 是否误用了 AND 代替 OR？


    我们在上一章（“识别问题中的关键词”一节）讨论了涉及单词 `and` 或 `or` 的查询问题。我简要回顾一下。单词 `and` 在自然英语中既可以表示并集也可以表示交集。当我们说“妇女和儿童”时，通常指女性集合与年轻人集合的并集。当我们说“小型红色汽车”时，指小型汽车集合与红色汽车集合的交集。


    如果我们寻找“妇女和儿童”，并使用选择条件 `Gender = ''F'' AND age < 12`，我们实际上是在检索妇女和儿童（或女孩）的交集。我们需要的条件是
    `Gender = ''F'' OR age < 12`。


    很容易在不经意间将英文问题中的 `and` 不恰当地翻译成查询中的 `AND`，这可能导致遗漏行。如有疑问，请尝试绘制上一章描述的维恩图。


    #### 集合操作中的列是否正确？


    如果你的查询涉及交集或差集操作，结果可能比预期的行数少，因为你最初投影了错误的列。我们在第 7 章讨论过这个问题。这里是一个关于交集的简单示例；差集操作也存在同样的问题。


    我们想找出谁同时参加了第 25 号和第 36 号锦标赛。我们知道需要一个交集，并尝试了以下查询：


    ```sql

    SELECT * FROM Entry

    WHERE TourID = 25

    INTERSECT

    SELECT * FROM Entry

    WHERE TourID = 36;

    ```


    无论底层数据如何，此查询都不会返回任何行。交集查找的是每个集合中完全相同的行。然而，第一个集合中的所有行 `TourID` 值都是 25，第二个集合中的所有行
    `TourID` 值都是 36。永远不可能存在一个同时属于两个集合的行。我们要找的是同时属于两个集合的成员 ID，因此查询每个部分的 `SELECT` 子句应该是
    `SELECT MemberID FROM Entry`。


    上述查询是一个保留错误列的极端例子，导致没有返回任何行。第 7 章中关于图 7-14 的讨论表明，在交集和差集查询中保留不同的列会导致非常不同的结果。你需要确保保留了与所提问题相适应的列。'
- fmt: '### More Rows Than There Should Be


    It is often easier to spot extra rows than it is to notice that rows are missing
    from your query result. You only need to see one record that you weren’t expecting,
    and you can concentrate on the different parts of your query to see where it failed
    to be excluded. Here are a couple of causes of extra rows.


    #### Did You Use NOT Instead of Difference?


    With questions containing the words `NOT` or `NEVER`, a sure way to get extra
    rows is to use a condition in a `WHERE` clause when you really need a difference
    operator. We looked at this issue in Chapter [4](#A158240_2_En_4_Chapter.html).
    To recap, consider a question like “Which members have never entered tournament
    25?” A common first attempt using a select condition is:


    ```sql

    SELECT * FROM Entry

    WHERE TourID  25;

    ```


    The condition in the `WHERE` clause checks rows one at a time to see if they should
    be included in the result. If there is a row for member 415 entering tournament
    36, then that row will be retrieved, regardless of the possibility that another
    row shows member 415 entered tournament 25. For example, if member 415 has entered
    tournament 25 and four other tournaments, we will retrieve four rows when we were
    expecting none.


    The correct procedure for this type of question is to use a nested query (see
    Chapter [4](#A158240_2_En_4_Chapter.html)) or the `EXCEPT` difference operator
    (see Chapter [7](#A158240_2_En_7_Chapter.html)). We need to find the set of all
    members (from the `Member` table) and remove the set of members who have entered
    tournament 25 (from the `Entry` table).


    If we employ the process approach we might come up with the following query, which
    looks for the difference between the two sets:


    ```sql

    SELECT MemberID FROM Member

    EXCEPT

    SELECT MemberID FROM Entry

    WHERE TourID = 25;

    ```


    If we started with an outcome approach we might have arrived at a nested query,
    as here:


    ```sql

    SELECT MemberID FROM Member

    WHERE MemberID NOT IN

    (SELECT MemberID FROM Entry

    WHERE TourID = 25);

    ```


    #### Have You Dealt with Duplicates Appropriately?


    It sometimes takes a little thought to decide what needs to be done with duplicate
    records retrieved from a query. By default, SQL will retain all duplicates. The
    following two requests sound similar:


    *   Give me a list of the names of my customers.

    *   Give me a list of the cities my customers live in.


    In the first, we probably expect as many rows as we have customers; if we have
    several Johns, we expect them all to be retained. In the second, we expect one
    row per city. If we have 500 customers living in Christchurch, we don’t expect
    all 500 rows to be returned.


    In the query to find the cities, we want only the distinct values, so we should
    use the `DISTINCT` keyword:


    ```sql

    SELECT DISTINCT (City) FROM Customer;

    ```


    ### Incorrect Statistics or Aggregates


    If we are using aggregates such as counting, grouping, or averaging and the underlying
    query misses rows or returns extra rows, then clearly the statistics will be affected.
    A couple of other things to consider are how `NULL`s and duplicates are being
    handled.


    SQL will not include any `NULL` fields in its statistics. For example, `COUNT(Handicap)`
    or `AVG(Handicap)` will ignore any rows with `NULL`s in the `Handicap` field.
    It is also important to consider what you want done with duplicates, especially
    for counting functions. `COUNT(Handicap)` will return the number of members who
    have a value in the `Handicap` column. `COUNT(DISTINCT Handicap)` will return
    the number of different values in the `Handicap` column; if all the members have
    a handicap of 20, it will return a count of 1.


    ### The Order Is Wrong


    If you have used an `ORDER BY` clause in your query and you are having problems
    with the order in which the rows are being presented, there is often a problem
    with the underlying data. Review the “Problems with Data Values” section earlier
    in this chapter. Check that the field types are appropriate (for example, numeric
    values aren’t being stored in text fields) and that text values have consistent
    case and no extraneous characters.


    ### Common Typos and Syntax Problems


    Sometimes a query doesn’t run because of some simple problem with the syntax—that
    is, the way the query is worded. Syntax problems involve things like missing parentheses
    or incorrect spellings of fields or keywords. Hopefully the database software
    will alert you if there is a problem with the syntax, but, as some editors are
    quite basic, that may or may not be helpful in finding and correcting the problem.
    Here are a few things to check:


    *   **Quotation marks**: Most versions of SQL require single quotation marks around
    text values, such as `''Smith''` or `''Junior''`, although some use double quotation
    marks in some circumstances. If you are cutting and pasting queries, be sure the
    correct quotation marks have been transferred. When I cut and paste the queries
    in this book from Word to Access, the quotation marks look OK, but I need to re-enter
    them. Also check that all the quotation marks are paired correctly. Don’t use
    quotes around numeric values. Something like `Handicap < ''12''` will cause problems
    if `Handicap` is a numeric field.

    *   **Parentheses**: These are required in nested queries and also can be used
    to help readability in many queries (such as those with several joins). Check
    that all the brackets are paired correctly.

    *   **Names of tables and fields**: It seems obvious that you need to get the
    names of tables and fields correct. However, sometimes a simple misspelling of
    a table name or field can cause an unintelligible error message. Check carefully.

    *   **Use of aliases**: If you use an alias for table names (for example, `Member
    m`), check that you have associated the correct alias with each field name.

    *   **Spelling of keywords**: Some software for constructing SQL queries will
    highlight keywords, so it is very apparent if you have spelled them incorrectly.
    If your version doesn’t show this, then check keyword spelling, too. I often type
    `FORM` instead of `FROM` or `AVERAGE()` instead of `AVG()`.

    *   **`IS NULL` versus `= NULL`**: Some versions of SQL treat these quite differently.
    `IS NULL` always works if you are trying to find fields with a null value.


    ### Summary


    Before you can correct a query, you need to notice that it is wrong in the first
    place. It is preferable that we find potential problems before our users find
    them for us. Always check the rows returned from a query, as described in the
    previous chapter. When you do discover errors, the following are some ideas for
    tracking down the cause of the problem:


    *   Check that the underlying tables are combined appropriately (join, intersection,
    and so on).

    *   Simplify the query by removing selection conditions and aggregates to ensure
    the underlying rows are correct.

    *   Retain all the columns in a query with joins until you are sure that the tables
    have been combined appropriately.

    *   Check each part of nested queries or queries involving set operations independently.

    *   Check queries for questions with the words `AND` or `NOT` to ensure you have
    not used selection conditions when you need a set operation or nested query.

    *   Check that the columns retained in queries with set operations are appropriate.

    *   Check that `NULL`s and duplicates have been dealt with properly.

    *   Check that underlying data types are correct and that data values are consistent.


    Footnotes


    [1] Refer to my book *Beginning Database Design* (New York: Apress, 20xx) for
    more information.


    [2] This is the difference between a relation that is defined as having unique
    tuples and a table that can have duplicate rows. See Appendix 2 for further information.'
  raw: '### More Rows Than There Should Be


    It is often easier to spot extra rows than it is to notice that rows are missing
    from your query result. You only need to see one record that you weren’t expecting,
    and you can concentrate on the different parts of your query to see where it failed
    to be excluded. Here are a couple of causes of extra rows.


    #### Did You Use NOT Instead of Difference?


    With questions containing the words not or never, a sure way to get extra rows
    is to use a condition in a `WHERE` clause when you really need a difference operator.
    We looked at this issue in Chapter [4](#A158240_2_En_4_Chapter.html). To recap,
    consider a question like “Which members have never entered tournament 25?” A common
    first attempt using a select condition is:


    ```

    SELECT * FROM Entry

    WHERE TourID  25;

    ```


    The condition in the `WHERE` clause checks rows one at a time to see if they should
    be included in the result. If there is a row for member 415 entering tournament
    36, then that row will be retrieved, regardless of the possibility that another
    row shows member 415 entered tournament 25\. For example, if member 415 has entered
    tournament 25 and four other tournaments, we will retrieve four rows when we were
    expecting none.


    The correct procedure for this type of question is to use a nested query (see
    Chapter [4](#A158240_2_En_4_Chapter.html)) or the `EXCEPT` difference operator
    (see Chapter [7](#A158240_2_En_7_Chapter.html)). We need to find the set of all
    members (from the `Member` table) and remove the set of members who have entered
    tournament 25 (from the `Entry` table).


    If we employ the process approach we might come up with the following query, which
    looks for the difference between the two sets:


    ```

    SELECT MemberID FROM Member

    EXCEPT

    SELECT MemberID FROM Entry

    WHERE TourID = 25;

    ```


    If we started with an outcome approach we might have arrived at a nested query,
    as here:


    ```

    SELECT MemberID FROM Member

    WHERE MemberID NOT IN

    (SELECT MemberID FROM Entry

    WHERE TourID = 25);

    ```


    #### Have You Dealt with Duplicates Appropriately?


    It sometimes takes a little thought to decide what needs to be done with duplicate
    records retrieved from a query. By default, SQL will retain all duplicates. The
    following two requests sound similar:


    *   Give me a list of the names of my customers.

    *   Give me a list of the cities my customers live in.


    In the first, we probably expect as many rows as we have customers; if we have
    several Johns, we expect them all to be retained. In the second, we expect one
    row per city. If we have 500 customers living in Christchurch, we don’t expect
    all 500 rows to be returned.


    In the query to find the cities, we want only the distinct values, so we should
    use the `DISTINCT` keyword:


    ```

    SELECT DISTINCT (City) FROM Customer;

    ```


    ### Incorrect Statistics or Aggregates


    If we are using aggregates such as counting, grouping, or averaging and the underlying
    query misses rows or returns extra rows, then clearly the statistics will be affected.
    A couple of other things to consider are how nulls and duplicates are being handled.


    SQL will not include any null fields in its statistics . For example, `COUNT(Handicap)`
    or `AVG(Handicap)` will ignore any rows with nulls in the `Handicap` field. It
    is also important to consider what you want done with duplicates, especially for
    counting functions. `COUNT(Handicap)` will return the number of members who have
    a value in the `Handicap` column. `COUNT(DISTINCT Handicap)` will return the number
    of different values in the `Handicap` column; if all the members have a handicap
    of 20, it will return a count of 1.


    ### The Order Is Wrong


    If you have used an `ORDER BY` clause in your query and you are having problems
    with the order in which the rows are being presented, there is often a problem
    with the underlying data. Review the “Problems with Data Values” section earlier
    in this chapter. Check that the field types are appropriate (for example, numeric
    values aren’t being stored in text fields) and that text values have consistent
    case and no extraneous characters.


    ## Common Typos and Syntax Problems


    Sometimes a query doesn’t run because of some simple problem with the syntax `—`
    that is, the way the query is worded. Syntax problems involve things like missing
    parentheses or incorrect spellings of fields or keywords. Hopefully the database
    software will alert you if there is a problem with the syntax, but, as some editors
    are quite basic, that may or may not be helpful in finding and correcting the
    problem. Here are a few things to check:


    *   Quotation marks: Most versions of SQL require single quotation marks around
    text values, such as `''Smith''` or `''Junior''`, although some use double quotation
    marks in some circumstances. If you are cutting and pasting queries, be sure the
    correct quotation marks have been transferred. When I cut and paste the queries
    in this book from Word to Access, the quotation marks look OK, but I need to re-enter
    them. Also check that all the quotation marks are paired correctly. Don’t use
    quotes around numeric values. Something like `Handicap < ''12''` will cause problems
    if `Handicap` is a numeric field.

    *   Parentheses: These are required in nested queries and also can be used to
    help readability in many queries (such as those with several joins). Check that
    all the brackets are paired correctly.

    *   Names of tables and fields: It seems obvious that you need to get the names
    of tables and fields correct. However, sometimes a simple misspelling of a table
    name or field can cause an unintelligible error message. Check carefully.

    *   Use of aliases: If you use an alias for table names (for example, `Member
    m`), check that you have associated the correct alias with each field name.

    *   Spelling of keywords: Some software for constructing SQL queries will highlight
    keywords, so it is very apparent if you have spelled them incorrectly. If your
    version doesn’t show this, then check keyword spelling, too. I often type `FORM`
    instead of `FROM` or `AVERAGE()` instead of `AVG()`.

    *   `IS Null` versus `= Null`: Some versions of SQL treat these quite differently.
    `IS Null` always works if you are trying to find fields with a null value.


    ## Summary


    Before you can correct a query, you need to notice that it is wrong in the first
    place. It is preferable that we find potential problems before our users find
    them for us. Always check the rows returned from a query, as described in the
    previous chapter. When you do discover errors, the following are some ideas for
    tracking down the cause of the problem:


    *   Check that the underlying tables are combined appropriately (join, intersection,
    and so on).

    *   Simplify the query by removing selection conditions and aggregates to ensure
    the underlying rows are correct.

    *   Retain all the columns in a query with joins until you are sure that the tables
    have been combined appropriately.

    *   Check each part of nested queries or queries involving set operations independently.

    *   Check queries for questions with the words and or not to ensure you have not
    used selection conditions when you need a set operation or nested query.

    *   Check that the columns retained in queries with set operations are appropriate.

    *   Check that nulls and duplicates have been dealt with properly.

    *   Check that underlying data types are correct and that data values are consistent.


    Footnotes [1](#A158240_2_En_12_Chapter.html#Fn1_source)


    Refer to my book Beginning Database Design (New York: Apress, 20xx) for more information.


      [2](#A158240_2_En_12_Chapter.html#Fn2_source)


    This is the difference between a relation that is defined as having unique tuples
    and a table that can have duplicate rows. See Appendix 2 for further information.'
  trans: '### 比应有的行数更多


    通常，发现多余的行比注意到查询结果中缺少行更容易。你只需要看到一个意想不到的记录，然后就可以专注于查询的不同部分，找出它未能被排除的地方。以下是一些导致出现多余行的原因。


    #### 你是否用了 `NOT` 而不是差集运算符？


    对于包含 `NOT` 或 `NEVER` 字眼的问题，一个必然导致出现多余行的做法是：当你实际上需要一个差集运算符时，却在 `WHERE` 子句中使用了一个条件。我们在第
    4 章讨论过这个问题。回顾一下，考虑这样一个问题：“哪些会员从未参加过锦标赛 25？”一个常见的首次尝试是使用选择条件：


    ```sql

    SELECT * FROM Entry

    WHERE TourID <> 25;

    ```


    `WHERE` 子句中的条件会逐行检查，判断它们是否应包含在结果中。如果有一条会员 415 参加锦标赛 36 的记录，那么该行将被检索出来，即使可能存在另一条记录显示会员
    415 参加了锦标赛 25。例如，如果会员 415 参加了锦标赛 25 和另外四场锦标赛，当我们期望得到零行时，我们却会检索到四行。


    解决这类问题的正确方法是使用嵌套查询（参见第 4 章）或 `EXCEPT` 差集运算符（参见第 7 章）。我们需要找到所有会员的集合（来自 `Member`
    表），然后移除已参加锦标赛 25 的会员集合（来自 `Entry` 表）。


    如果我们采用过程式方法，可能会得出下面这个查询，它寻找两个集合之间的差集：


    ```sql

    SELECT MemberID FROM Member

    EXCEPT

    SELECT MemberID FROM Entry

    WHERE TourID = 25;

    ```


    如果我们从结果式方法入手，可能会得出一个嵌套查询，如下所示：


    ```sql

    SELECT MemberID FROM Member

    WHERE MemberID NOT IN

    (SELECT MemberID FROM Entry

    WHERE TourID = 25);

    ```


    #### 你是否恰当地处理了重复项？


    有时需要稍加思考来决定如何处理从查询中检索到的重复记录。默认情况下，SQL 会保留所有重复项。以下两个请求听起来很相似：


    *   给我一份我的客户姓名列表。

    *   给我一份我的客户所在城市的列表。


    在第一个请求中，我们可能期望行数与客户数相同；如果我们有好几个叫 John 的客户，我们期望他们都被保留。在第二个请求中，我们期望每个城市只有一行。如果我们有
    500 个客户住在基督城，我们不期望返回所有 500 行。


    在查找城市的查询中，我们只想要不重复的值，因此我们应该使用 `DISTINCT` 关键字：


    ```sql

    SELECT DISTINCT (City) FROM Customer;

    ```


    ### 错误的统计信息或聚合


    如果我们使用计数、分组或平均值等聚合函数，而基础查询遗漏了行或返回了多余的行，那么统计信息显然会受到影响。另外需要考虑的几点是 `NULL` 值和重复项是如何处理的。


    SQL 不会在其统计信息中包含任何 `NULL` 字段。例如，`COUNT(Handicap)` 或 `AVG(Handicap)` 将忽略 `Handicap`
    字段中为 `NULL` 的行。同样重要的是考虑你希望如何处理重复项，特别是对于计数函数。`COUNT(Handicap)` 将返回在 `Handicap`
    列中有值的会员数量。`COUNT(DISTINCT Handicap)` 将返回 `Handicap` 列中不同值的数量；如果所有会员的障碍值都是 20，它将返回计数
    1。


    ### 顺序错误


    如果你在查询中使用了 `ORDER BY` 子句，并且行的呈现顺序有问题，那么问题通常出在基础数据上。请回顾本章前面的“数据值问题”部分。检查字段类型是否合适（例如，数值没有存储在文本字段中），并且文本值大小写一致且没有多余字符。


    ### 常见的拼写错误和语法问题


    有时查询无法运行是因为语法上的一些简单问题——即查询的措辞方式。语法问题包括缺少括号、字段或关键字拼写错误等情况。希望数据库软件能在语法有问题时提醒你，但有些编辑器功能相当基础，这可能有助于也可能无助于发现和纠正问题。以下是一些需要检查的项目：


    *   **引号**：大多数 SQL 版本要求在文本值周围使用单引号，例如 `''Smith''` 或 `''Junior''`，尽管有些版本在某些情况下使用双引号。如果你复制粘贴查询，请确保正确的引号已被转移。当我将本书中的查询从
    Word 复制到 Access 时，引号看起来没问题，但我需要重新输入它们。还要检查所有引号是否正确配对。不要在数值周围使用引号。类似 `Handicap
    < ''12''` 的写法如果 `Handicap` 是数值字段，将会导致问题。

    *   **括号**：嵌套查询中需要括号，并且在许多查询（例如涉及多个连接的查询）中，括号也可用于提高可读性。检查所有括号是否正确配对。

    *   **表和字段的名称**：显然，你需要正确获取表和字段的名称。然而，有时一个简单的表名或字段拼写错误会导致无法理解的错误信息。请仔细检查。

    *   **别名的使用**：如果你对表名使用了别名（例如 `Member m`），请检查你是否将正确的别名与每个字段名关联。

    *   **关键字的拼写**：一些用于构建 SQL 查询的软件会高亮显示关键字，因此如果你拼写错误，会非常明显。如果你的软件不显示高亮，那么也要检查关键字的拼写。我经常把
    `FORM` 打成 `FROM`，或者把 `AVERAGE()` 打成 `AVG()`。

    *   **`IS NULL` 与 `= NULL`**：一些 SQL 版本对这两者的处理方式完全不同。如果你想查找值为 null 的字段，`IS NULL`
    总是有效的。


    ### 总结


    在纠正查询之前，你首先需要注意到它是错误的。最好是在用户发现问题之前，由我们自己发现潜在问题。始终检查从查询返回的行，如前一章所述。当你确实发现错误时，以下是一些追踪问题原因的思路：


    *   检查基础表是否以适当的方式组合（连接、交集等）。

    *   通过移除选择条件和聚合来简化查询，以确保基础行是正确的。

    *   在连接查询中保留所有列，直到你确定表已被正确组合。

    *   独立地检查嵌套查询或涉及集操作查询的每个部分。

    *   检查带有 `AND` 或 `NOT` 字眼的问题的查询，确保在需要集操作或嵌套查询时没有使用选择条件。

    *   检查带有集操作的查询中保留的列是否合适。

    *   检查 `NULL` 值和重复项是否已得到妥善处理。

    *   检查基础数据类型是否正确以及数据值是否一致。


    脚注


    [1] 更多信息请参阅我的著作《数据库设计入门》（纽约：Apress，20xx）。


    [2] 这是定义为具有唯一元组的关系与可以包含重复行的表之间的区别。更多信息请参见附录 2。'
- fmt: '# 1. Example Database


    Most of the examples in this book use the golf club database. Visit the catalog
    page for this book on the Apress website, look under the Source Code/Downloads
    tab, and you will find an Access version of this database and also the SQL scripts
    for creating and populating the tables. Figure [A1-1](#A158240_2_En_13_Chapter.html#Fig1)
    shows how the tables in the database are related, and Figure [A1-2](#A158240_2_En_13_Chapter.html#Fig2)
    shows the data in the tables.


    ![A158240_2_En_13_Fig2_HTML.jpg](A158240_2_En_13_Fig2_HTML.jpg)


    Figure A1-2. The tables and data for the golf club database


    ![A158240_2_En_13_Fig1_HTML.jpg](A158240_2_En_13_Fig1_HTML.jpg)


    Figure A1-1. The data model for the golf club database


    # 2. Relational Notation


    Relational database theory is based on set theory.[¹](#A158240_2_En_14_Chapter.html#Fn1)
    When we query a database we are essentially formulating a question to retrieve
    a subset containing the information we require. There are two approaches for retrieving
    a subset of data. Relational algebra is a description of the operations to perform
    on the data (in the body of the book we called this the process approach). Relational
    calculus describes conditions that the retrieved data must satisfy (we referred
    to this as the outcome approach). In this appendix we introduce the formal notation
    to formulate queries using relational algebra and calculus. This will allow you
    to think about queries from a different perspective. If you are interested in
    following up on the formal mathematics, There are more theoretical publications
    available.[²](#A158240_2_En_14_Chapter.html#Fn2) No new concepts are presented
    here that have not been discussed previously`—`it is just the notation that is
    different. The more formal notation allows queries to be expressed very concisely,
    and the underlying mathematics can be useful when dealing with complex situations.
    We will use the database described in Appendix 1 for the examples.


    ## Introduction


    As an example of how thinking of data as sets can help us, let’s consider a set
    that contains information about all the people on Earth. We can define a subset
    that contains all the men, another that contains all the golfers, another that
    contains people over 40, and another that contains Italians. These sets can all
    overlap, as shown in the diagram in Figure [A2-1](#A158240_2_En_14_Chapter.html#Fig1).
    This type of diagram is called a Venn diagram.


    ![A158240_2_En_14_Fig1_HTML.jpg](A158240_2_En_14_Fig1_HTML.jpg)


    Figure A2-1. Venn diagram showing subsets of people


    Figure [A2-1](#A158240_2_En_14_Chapter.html#Fig1) helps us visualize the sets
    that satisfy criteria such as Italian men over 40 who play golf (the area where
    all the circles overlap) or people who don’t play golf (everywhere in the large
    rectangle except the Golfers circle). These two areas are easy to describe; however,
    it is not always simple to define the subset we require. The area containing Italian
    golfers who are 40 or under takes a bit more effort to find, and it is difficult
    to describe without the diagram to help.


    A database is only useful if you can accurately extract the appropriate subset
    of data when you need it. As the criteria become more complex and the number of
    tables increases, it can become difficult to keep everything in your head and
    correctly describe what you are trying to find. It is in these more complex situations
    that having a more formal and succinct notation can be very helpful.


    ### Relations, Tuples, and Attributes


    It is common to think of a database as a number of tables. A table (e.g., `Person`)
    will have a several columns. Each row in the table represents an individual person
    with the appropriate values for that person appearing in each column. More formally,
    a database is referred to as a set of relations, and each relation is a set of
    tuples. A tuple is a set of attribute values; for example, {Ali, Brown, 2/8/1967}.


    A relation consists of a heading and a body. The heading is a description of the
    data that is contained in the relation. Part of that description is a set of attribute
    names; for example, {`FirstName`, `LastName`, `Date_of_Birth`}. In addition, each
    attribute has a domain, or set of allowed values. For example, `Date_of_Birth`
    must be a valid date. A domain can be a primitive type (e.g., integer, string)
    or a user-defined type (e.g., `WeekDays` = {Mon, Tue, Wed, Thu, Fri, Sat, Sun}).
    A database schema is the set of headings for all the relations plus any constraints
    that have been defined.


    The body of the relation contains the data values. It consists of tuples containing
    values for each of the attributes.


    Table [A2-1](#A158240_2_En_14_Chapter.html#Tab1) shows analogous terms for the
    two ways of describing a database.


    Table A2-1. Comparative Terms


    | Relational Term | Database Term |

    | --- | --- |

    | Database (set of relations) | Database |

    | Relation (set of tuples) | Table |

    | Tuple (set of attribute values) | Row |

    | Attribute name | Column Name |

    | Domain | Column datatype (primitive or user defined) |


    The main differences between an (unkeyed) table and a relation or set of tuples
    are that there is no order to the tuples and each tuple must be unique.


    Figure [A2-2](#A158240_2_En_14_Chapter.html#Fig2) shows how we can visualize a
    relation as a set of tuples.


    ![A158240_2_En_14_Fig2_HTML.jpg](A158240_2_En_14_Fig2_HTML.jpg)


    Figure A2-2. A relation is a set of tuples.


    The traditional way of representing a set in a Venn diagram, as in Figure [A2-1](#A158240_2_En_14_Chapter.html#Fig1),
    reinforces the concept that there is no order to elements in a set. There is no
    first or next or previous element. The usual format for a table can imply that
    the rows have some sort of intrinsic order. When you query a database then, theoretically,
    the tuples returned have no guaranteed order unless you specify an order as part
    of the query. In practice, a simple query is likely to return rows in the same
    order each time it is repeated because under the hood the same operations will
    be carried out. However, with large tables, as the number of tuples changes the
    number and order of the operations may change to improve efficiency, or data that
    has been previously cached may be accessed first. These may affect the order in
    which tuples are returned.


    As discussed in Chapter [1](#A158240_2_En_1_Chapter.html), having unique tuples
    in a relation is essential if we are going to be able to identify our data correctly.
    If, in the relation in Figure [A2-2](#A158240_2_En_14_Chapter.html#Fig2), we found
    we had another person called John Smith born on 2/6/1988 we would be in trouble,
    because we would not be able to distinguish the tuples for the two people. We
    need enough information stored about people so that they can be differentiated.
    The concept of a primary key (a set of attributes that must be unique for every
    tuple) ensures uniqueness.


    Once we think of our data as sets of tuples then all the power of set operations
    is at our disposal.'
