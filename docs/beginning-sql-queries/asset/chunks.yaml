- fmt: '## Introducing Data Models


    Even the simplest databases are likely to have several tables. A data model is
    a conceptual model of the underlying data and how it is interrelated. We will
    use the class diagram notation from the Unified Modeling Language (UML ) to represent
    our data models. There are many other ways to represent data structure (for example,
    Entity Relationship Diagrams) that, for the purposes of this book, would also
    be suitable. We choose to use UML as it has a large suite of diagramming tools
    for developing software applications that encompasses not only the structure of
    data but also its behavior. In this section, we will look at how to interpret
    a class diagram and how to translate it into tables and constraints in a relational
    database.


    A class is like a template for something we want to keep data about (events, people,
    places, etc.) For example, we might want to keep names and other details about
    the members of our golf club. Figure [1-5](#A158240_2_En_1_Chapter.html#Fig5)
    shows the UML notation for a `Member` class. The name of the class is in the top
    panel, and the next panel shows the attributes. Class diagrams can also have another
    panel to show methods associated with the behavior of the class.


    ![A158240_2_En_1_Fig5_HTML.jpg](A158240_2_En_1_Fig5_HTML.jpg)


    Figure 1-5. UML representation of a Member class


    In a relational database, each class is represented as a table, the attributes
    are the columns, and each instance (in this case an individual club member) will
    be a row in the table.


    The data model can also depict the way the different classes depend on each other.
    Figure [1-6](#A158240_2_En_1_Chapter.html#Fig6) shows two classes, `Member` and
    `Team`, and how they are related.


    ![A158240_2_En_1_Fig6_HTML.jpg](A158240_2_En_1_Fig6_HTML.jpg)


    Figure 1-6. A relationship between two classes


    The pair of numbers at each end of the plays for line in Figure [1-6](#A158240_2_En_1_Chapter.html#Fig6)
    indicates how many members play for one particular team, and vice versa. The first
    number of each pair is the minimum number. This is often 0 or 1 and is therefore
    sometimes known as the optionality (that is, it indicates whether a member must
    have an associated team, or vice versa). The second number (known as the cardinality)
    is the greatest number of related objects. It is usually 1 or many (denoted by
    n or *), although other numbers are possible.


    Relationships can be interpreted in both directions. The label on the relationship
    in Figure [1-6](#A158240_2_En_1_Chapter.html#Fig6) implies that we are reading
    from left to right and we will need to think of the appropriate verb for interpreting
    the diagram in the other direction. “Team has members” will do. Reading Figure
    [1-6](#A158240_2_En_1_Chapter.html#Fig6) from left to right, we see that one particular
    member doesn’t have to play for a team and can play for at most one team (the
    numbers 0 and 1 at the end of the line nearest the `Team` class). Reading from
    right to left, we can say that one particular team doesn’t need to have any members
    but can have many (the numbers 0 and n nearest the `Member` class). A relationship
    like the one in Figure [1-6](#A158240_2_En_1_Chapter.html#Fig6) is called a 1–Many
    relationship (a member can belong to just one team, and a team can have many members).


    You might think there should be exactly four members for a team (say, for an interclub
    team). Although this might be true when the team plays a round of golf, our database
    might record different numbers of members associated with the team as we add and
    remove players throughout the year. A data model usually uses 0, 1, and many to
    model the relationships between tables. Other constraints (such as the maximum
    number on a team) are more usually expressed with business rules or with UML use
    cases.


    We can represent a 1-Many relationship in our database by looking at the primary
    key at the 1 end of the relationship and adding a column of the same type to the
    table at the Many end. For the model in Figure [1-6](#A158240_2_En_1_Chapter.html#Fig6)
    we would add a `Team` column to the `Member` table as shown in Figure [1-7](#A158240_2_En_1_Chapter.html#Fig7).


    ![A158240_2_En_1_Fig7_HTML.jpg](A158240_2_En_1_Fig7_HTML.jpg)


    Figure 1-7. Member table with a foreign key column Team


    The `Team` column is called a foreign key. Any non-empty value in this column
    in the `Member` table must be a value that already exists in the primary key column
    of the `Team` table. The concept of a foreign key provides us with a constraint
    on the `Member` table so that we cannot assign members to non-existent teams.
    This constraint is called referential integrity.


    The SQL to create a table with a foreign key is shown here:


    ```sql

    CREATE TABLE Member(

    MemberID INT PRIMARY KEY,

    LastName CHAR(20),

    FirstName CHAR(20),

    Phone CHAR(20),

    Handicap INT,

    JoinDate DATETIME,

    Gender CHAR(1),

    Team CHAR(20) FOREIGN KEY REFERENCES Team);

    ```


    Because we need to compare the value in the foreign key column of the `Member`
    table with the primary key column of the `Team` table, these two columns must
    have the same domain or datatype.


    Most database products have a graphical interface for setting up and displaying
    foreign key constraints. Figure [1-8](#A158240_2_En_1_Chapter.html#Fig8) shows
    the interfaces for Microsoft^© SQL Server and Microsoft^© Access. These diagrams,
    which are essentially implementations of the data model, are invaluable for understanding
    the structure of the database so we know how to extract the information we require.


    ![A158240_2_En_1_Fig8_HTML.jpg](A158240_2_En_1_Fig8_HTML.jpg)


    Figure 1-8. Diagrams for implementing 1–Many relationships using foreign keys


    The tables in Figures [1-4](#A158240_2_En_1_Chapter.html#Fig4) and [1-7](#A158240_2_En_1_Chapter.html#Fig7)
    have essentially the same design. For Figure [1-4](#A158240_2_En_1_Chapter.html#Fig4)
    we arrived at the design by removing the `PracticeNight` column from the `Member`
    table and creating a new `Team` table (a normalization process). For Figure [1-7](#A158240_2_En_1_Chapter.html#Fig7)
    we first considered a data model and added the `Team` column to the `Member` table
    as a way of representing the relationship between `Member` and `Team`. The outcome
    is the same whichever way you approach the issue.


    At the risk of repeating myself, I do want to caution about the necessity of ensuring
    that the database is properly designed. The simple model in Figure [1-6](#A158240_2_En_1_Chapter.html#Fig6)
    is almost certainly quite unsuitable even for the tiny amount of data it contains.
    A real club will probably want to keep track of how the membership of teams evolves
    over the years. This will involve including information about seasons or years
    along with the team membership information. Some members might play for more than
    one team during a year if they are called in as a substitute. That information
    may or may not be necessary to retain. Designing a useful database is a tricky
    job and outside the scope of this book.'
