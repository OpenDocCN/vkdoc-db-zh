- fmt: '### Managing Without the EXCEPT Keyword


    Not all versions of SQL support the `EXCEPT` (or `MINUS`) keyword. As always,
    there is usually another way to formulate a query. In Chapter [4](#A158240_2_En_4_Chapter.html),
    we looked at an outcome approach to answering questions involving the word not.
    Figure [7-24](#A158240_2_En_7_Chapter.html#Fig24) reviews the thought processes
    used to find the names of members who have not entered tournament 25.


    ![A158240_2_En_7_Fig24_HTML.jpg](A158240_2_En_7_Fig24_HTML.jpg)

    Figure 7-24. Deciding that member 258 has not entered tournament 25


    The thought process behind Figure [7-24](#A158240_2_En_7_Chapter.html#Fig24) is:

    > Write out the names from row `m` of the `Member` table if there does not exist
    a row `e` in the `Entry` table for that member (i.e., `m.MemberID = e.MemberID`)
    where `TourID=25`.


    The SQL reflecting Figure [7-24](#A158240_2_En_7_Chapter.html#Fig24) is:

    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE NOT EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID

    AND e.TourID = 25);

    ```


    Which type of query should you use for questions involving the word not? The one
    using the process approach and the keyword `EXCEPT` or the one using the outcome
    approach with the keywords `NOT EXISTS` or `NOT IN`? Usually, I’d say it doesn’t
    really matter, as your database engine will probably be smart enough to recognize
    them as being the same. However, the version of SQL Server I am using at the moment
    (2013) performs the query using `NOT EXISTS` more efficiently than the corresponding
    query using `EXCEPT`. You have to ask yourself whether you care! Queries on small
    databases are usually so quick that it really doesn’t matter if they run a bit
    more slowly. However, if you have a lot of data, then everything changes. The
    efficiency of queries can become extremely important, and in that case, you will
    need to also consider other aspects of your database design, such as indexes.
    I’ll talk a little more about this in Chapter [9](#A158240_2_En_9_Chapter.html).


    ## Division


    The last set operator we will look at in this chapter is division. Division is
    useful for queries that involve the word all or every. An example is “Which members
    have entered every tournament?” Standard SQL doesn’t have a keyword for the divide
    operation, and it can be a little awkward to figure out the SQL for queries involving
    division.


    In Appendix 2 you will find the formal algebraic notation for carrying out division
    and how to represent it using other operators if you need to. In the section “Universal
    Quantifier and SQL” in Appendix 2, you will also find an alternative way to carry
    out division-type queries using calculus (or outcome) expressions. Both these
    methods help you to construct SQL statements that are analogous to the division
    operator. In Chapter [8](#A158240_2_En_8_Chapter.html), we’ll look at aggregates
    and see what I think is the simplest way of writing an SQL equivalent of the division
    operator.


    For now we will look at what the division operator does and how to use it to answer
    different types of questions involving every and all.


    The easiest way to understand the division operation is with an example. If we
    want to know which members have entered every tournament, we need two bits of
    information. First, we need information about the members and the tournaments
    they have entered, which we can get from the `Entry` table. We also need a list
    of all the tournaments, which needs to come from the `Tournament` table, as not
    all tournaments may be represented in the `Entry` table.


    Figure [7-25](#A158240_2_En_7_Chapter.html#Fig25) illustrates how division works.
    I’ve projected just the `MemberID` and `TourID` columns from the `Entry` table,
    and the `TourID` column from the `Tournament` table. It is important which columns
    you project, and I’ll come back to that in a moment.


    ![A158240_2_En_7_Fig25_HTML.jpg](A158240_2_En_7_Fig25_HTML.jpg)

    Figure 7-25. Using division to find members who have entered all tournaments


    Looking at Figure [7-25](#A158240_2_En_7_Chapter.html#Fig25), we have in the middle
    a table with all the `TourID` values (I’ve labelled that Check). The division
    operation checks the left-hand table to find the values of `MemberID` that have
    a row for every `TourID`. The Answer (on the right of the figure) contains the
    `MemberID` values for members who have entered every tournament. Member 415 can
    be found paired with each of the five tournaments in the `Entry` table, and so
    appears in the result of the division. Member 228 does not appear in the result
    because there are no rows in the `Entry` table with 228 paired with 38 or 40.


    It is important to get the correct columns in the two tables involved in the division.
    I like to think of setting up the division operation like this:

    * Decide which attribute I want to find out about. Let’s call this Answer. In
    this case, I want to find values of `MemberID`, so our Answer attribute is `MemberID`.

    * On the right-hand side of the division operator, the attribute(s) in the table
    should be the thing I want to check against. Let’s call this attribute(s) Check.
    In this case, the Check attribute is `TourID`. We can get all the values for `TourID`
    from the `Tournament` table.

    * On the left-hand side of the division, I want a table containing the just the
    two sets of attributes Answer and Check, as shown in Figure [7-25](#A158240_2_En_7_Chapter.html#Fig25).
    We need `MemberID` and `TourID` (in this case, which members have entered which
    tournament, and these come from the `Entry` table). It is important that these
    are the only two columns in the left-hand table. If extra columns are added, then
    we will be asking different questions, as explained in the next section.


    As a small aside, many people wonder why this operation is called division, as
    it doesn’t seem to relate particularly well to something like 4 divided by 2\.
    Division is the inverse (or undoing) of multiplication in normal arithmetic. For
    set operations, division is like the inverse of the Cartesian product. If you
    think of taking the Cartesian product of the two tables in the middle and far
    right of Figure [7-25](#A158240_2_En_7_Chapter.html#Fig25), you will get a table
    with the same columns (but not rows) as on the far left of Figure [7-25](#A158240_2_En_7_Chapter.html#Fig25).


    We can answer a number of questions by changing what is on the right-hand side
    of the division operator. For example, if we wanted to know who had entered all
    the Open tournaments, we would replace the table in the middle of Figure [7-25](#A158240_2_En_7_Chapter.html#Fig25)
    with just the rows for Open tournaments:

    ```sql

    SELECT TourID

    FROM Tour

    WHERE TourType = ''Open'';

    ```


    ### Projecting Appropriate Columns


    As with intersection and difference operations, projecting different columns in
    division operations will give you answers to different questions. Once again,
    an example is the easiest way to understand this. In Figure [7-26](#A158240_2_En_7_Chapter.html#Fig26),
    an extra column has been retrieved from the `Entry` table. Can you understand
    what this query is finding?


    ![A158240_2_En_7_Fig26_HTML.jpg](A158240_2_En_7_Fig26_HTML.jpg)

    Figure 7-26. What is the division operation finding?


    The division is looking for a set of Answer attributes in the left-hand table
    that are paired with every attribute from the `Check` table. In this case, the
    operation looks for a pair `MemberID` and `Year` in the left-hand table that appears
    with each of the tournaments. This division example is finding those members who
    have entered all tournaments in the same year.'
