- fmt: '## Using Aliases


    As our queries get more complicated they will incorporate a number of different
    tables. Some of the tables may have the same column names, and we might need to
    distinguish them from each other. In SQL we can preface each of the attributes
    in our query with the name of the table that it comes from, as shown here:


    ```sql

    SELECT Member.LastName, Member.FirstName, Member.Phone

    FROM Member

    WHERE Member.MemberType = ''Senior''

    ```


    Because typing the whole table name can become tiresome, and also because in some
    queries we might need to compare data from more than one row of a table, SQL has
    the notion of an alias. Have a look at the following query:


    ```sql

    SELECT m.LastName, m.FirstName, m.Phone

    FROM Member m

    WHERE m.MemberType = ''Senior''

    ```


    In the `FROM` clause, we have declared an alias or alternative name for the `Member`
    table, in this case `m`. We can give our alias any name or letter we like; shorter
    is better. Then, in the rest of the query we can use the alias whenever we want
    to specify an attribute from that table. It is a good idea to get into the habit
    of using a table alias for each table contributing to the query.


    ## Saving Queries


    It is possible to keep the result of a query in a new permanent table (sometimes
    called a snapshot), but we usually don’t want to do that because it will become
    out of date if the underlying data changes. What we usually want to do is save
    the query instructions so that we can ask the same question another day. Consider
    our phone list query. Every so often after the membership of the club has been
    updated, we will produce a new phone list. Rather than having to construct the
    query each time, we can save the instructions in what is known as a view. The
    code below shows how to create a view that we can use to provide up-to-date phone
    lists. We have to give the view a name, which can be anything we want (`PhoneList`
    seems sensible), and then we supply the SQL statement for retrieving the appropriate
    data:


    ```sql

    CREATE VIEW PhoneList AS

    SELECT m.LastName, m.FirstName, m.Phone

    FROM Member m

    ```


    You can think of `PhoneList` as the instructions to create a “virtual” table that
    we can use in other queries in the same way that we use real tables. We just need
    to remember that the virtual table is created on the fly by running the query
    on the permanent `Member` table and it is then gone. To get our phone list now,
    we can simply use the `PhoneList` view:


    ```sql

    SELECT * FROM PhoneList

    ```


    ## Specifying Conditions for Selecting Rows


    In the queries we looked at in the previous sections, we used very simple conditions
    or criteria for determining whether to include a row in the result of a query.
    In the following section, we will look more closely at the different ways you
    can specify more complicated conditions.


    ### Comparison Operators


    A condition is a statement or expression that is either true or false, such as
    `MemberType = ''Senior''`. These types of expressions are called Boolean expressions
    after the 19th-century English mathematician, George Boole, who investigated their
    properties. The conditions we use to select rows from a table usually involve
    comparing the values of an attribute to some constant value or another attribute.
    For example, we can ask whether the value of an attribute is the same, different,
    or greater than some value. Table 2-1 shows some comparison operators we can use
    in our queries.


    **Table 2-1. Comparison Operators**


    | Operator | Meaning | Examples of True Statement |

    | --- | --- | --- |

    | `=` | Equals | `5=5`, `''Junior'' = ''Junior''` |

    | `<` | Less than | `4<5`, `''Ann'' < ''Zebedee''` |

    | `<=` | Less than or equal to | `4<=5`, `5<=5` |

    | `>` | Greater than | `5>4`, `''Zebedee'' > ''Ann''` |

    | `>=` | Greater than or equal to | `5>=4`, `5>=5` |

    | `<>` | Not equal | `5<>4`, `''Junior'' <> ''Senior''` |


    Just a quick note of caution: in Table 2-1, some of our examples compare numbers,
    and some compare characters. Recall from Chapter 1 that when we create a table,
    we specify the type of each field; for example, `MemberID` was declared to be
    an `INT` (integer or whole number), and `LastName` a `CHAR(20)` (a 20-character
    field). With fields like integer, comparisons are numerical. With text or character
    fields, comparisons are alphabetical, and with date and time fields, comparisons
    are chronological (earlier dates come first).


    When we compare character attributes, the comparison is based on the ASCII or
    Unicode value of the characters. As we might expect “A” (ASCII value 65) comes
    before “Z” (ASCII 90), so “A” < “Z”. With a string of characters, if the first
    letter is the same then the order is decided by the second, and so on. So “ANNABEL”
    < “ANNE”. However, the lowercase characters have higher ASCII codes than the uppercase
    ones. This means that “a” (ASCII 97) > “Z” (ASCII 90). If you order a list of
    names alphabetically then, by default, a name starting with a lowercase letter
    will appear after those starting with uppercase letters. For example “van Dyke”
    will appear after “Zebedee.”


    If we put numbers in a character field, they will also sort alphabetically. This
    means you will have comparisons such as “400” < “5”, because the first character,
    “4” (ASCII 34), in the left-hand text is less than the first character, “5” (ASCII
    35), on the right-hand side. So, make sure if a column is going to contain numbers
    that you want to compare and order numerically, that it is declared as a numeric
    type, or you will get some rather surprising results from your queries. Similarly,
    dates need to be in a column declared with one of the date types or the comparisons
    and ordering may not be what you expect.


    With comparison operators, we can create many different queries. Table 2-2 shows
    some examples of Boolean expressions that we can use as conditions in the `WHERE`
    clause of an SQL statement for selecting rows from the `Member` table.


    **Table 2-2. Examples of Boolean Expressions on the Member Table**


    | Expression | Retrieved Rows |

    | --- | --- |

    | `MemberType = ''Junior''` | All junior members |

    | `Handicap <= 12` | All members with a handicap of 12 or less |

    | `JoinDate >= ''01/01/2008''` | Everyone who has joined after the beginning of
    2008 |

    | `Gender = ''F''` | All the women |


    Some implementations of SQL are case sensitive when comparing text, and others
    are not. Being case sensitive means that uppercase letters are treated as being
    different from their lowercase counterpart; in other words, “Junior” is different
    from “junior,” which is different from “JUNIOR.” I usually check out any new database
    system I use to see what it does. If you do not care about the case of the attribute
    you are considering (that is, you are happy to retrieve rows where `MemberType`
    is “Junior” or “jUnIoR” or whatever), you can make use of the SQL function `UPPER`.
    This will turn the value of each text attribute into uppercase before you do the
    comparison. You can then compare that with the uppercase literal value, as shown
    here:


    ```sql

    SELECT *

    FROM Member m

    WHERE UPPER(m.MemberType) = ''JUNIOR''

    ```'
  raw: '## Using Aliases


    As our queries get more complicated they will incorporate a number of different
    tables. Some of the tables may have the same column names, and we might need to
    distinguish them from each other. In SQL we can preface each of the attributes
    in our query with the name of the table that it comes from, as shown here:


    ```

    SELECT Member.LastName, Member.FirstName, Member.Phone

    FROM Member

    WHERE Member.MemberType = ''Senior''

    ```


    Because typing the whole table name can become tiresome, and also because in some
    queries we might need to compare data from more than one row of a table, SQL has
    the notion of an alias. Have a look at the following query:


    ```

    SELECT m.LastName, m.FirstName, m.Phone

    FROM Member m

    WHERE m.MemberType = ''Senior''

    ```


    In the `FROM` clause, we have declared an alias or alternative name for the `Member`
    table, in this case `m`. We can give our alias any name or letter we like; shorter
    is better. Then, in the rest of the query we can use the alias whenever we want
    to specify an attribute from that table. It is a good idea to get into the habit
    of using a table alias for each table contributing to the query.


    ## Saving Queries


    It is possible to keep the result of a query in a new permanent table (sometimes
    called a snapshot), but we usually don’t want to do that because it will become
    out of date if the underlying data changes. What we usually want to do is save
    the query instructions so that we can ask the same question another day. Consider
    our phone list query. Every so often after the membership of the club has been
    updated, we will produce a new phone list. Rather than having to construct the
    query each time, we can save the instructions in what is known as a view . The
    code below shows how to create a view that we can use to provide up-to-date phone
    lists. We have to give the view a name, which can be anything we want (`PhoneList`
    seems sensible), and then we supply the SQL statement for retrieving the appropriate
    data:


    ```

    CREATE VIEW PhoneList AS

    SELECT m.LastName, m.FirstName, m.Phone

    FROM Member m

    ```


    You can think of `PhoneList` as the instructions to create a “virtual” table that
    we can use in other queries in the same way that we use real tables. We just need
    to remember that the virtual table is created on the fly by running the query
    on the permanent `Member` table and it is then gone. To get our phone list now,
    we can simply use the `PhoneList` view:


    ```

    SELECT * FROM PhoneList

    ```


    ## Specifying Conditions for Selecting Rows


    In the queries we looked at in the previous sections, we used very simple conditions
    or criteria for determining whether to include a row in the result of a query.
    In the following section, we will look more closely at the different ways you
    can specify more complicated conditions.


    ### Comparison Operators


    A condition is a statement or expression that is either true or false, such as
    `MemberType = ''Senior''`. These types of expressions are called Boolean expressions
    after the 19th-century English mathematician, George Boole, who investigated their
    properties. The conditions we use to select rows from a table usually involve
    comparing the values of an attribute to some constant value or another attribute.
    For example, we can ask whether the value of an attribute is the same, different,
    or greater than some value. Table [2-1](#A158240_2_En_2_Chapter.html#Tab1) shows
    some comparison operators we can use in our queries.


    Table 2-1.


    Comparison Operators


    | Operator | Meaning | Examples of True Statement |

    | --- | --- | --- |

    | `=` | Equals | `5=5`, `''Junior'' = ''Junior''` |

    | `<` | Less than | `4<5`, `''Ann'' < ''Zebedee''` |

    | `<=` | Less than or equal to | `4<=5`, `5<=5` |

    | `>` | Greater than | `5>4`, `''Zebedee'' > ''Ann''` |

    | `>=` | Greater than or equal to | `5>=4`, `5>=5` |

    | `<>` | Not equal | `5<>4`, `''Junior'' <> ''Senior''` |


    Just a quick note of caution: in Table [2-1](#A158240_2_En_2_Chapter.html#Tab1),
    some of our examples compare numbers, and some compare characters. Recall from
    Chapter [1](#A158240_2_En_1_Chapter.html) that when we create a table, we specify
    the type of each field; for example, `MemberID` was declared to be an `INT` (integer
    or whole number), and `LastName` a `CHAR(20)` (a 20-character field). With fields
    like integer, comparisons are numerical. With text or character fields, comparisons
    are alphabetical, and with date and time fields, comparisons are chronological
    (earlier dates come first).


    When we compare character attributes, the comparison is based on the ASCII[²](#A158240_2_En_2_Chapter.html#Fn2)
    or Unicode value of the characters. As we might expect “A” (ASCII value 65) comes
    before “Z” (ASCII 90), so “A” < “Z”. With a string of characters, if the first
    letter is the same then the order is decided by the second, and so on. So “ANNABEL”
    < “ANNE”. However, the lowercase characters have higher ASCII codes than the uppercase
    ones. This means that “a” (ASCII 97) > “Z” (ASCII 90). If you order a list of
    names alphabetically then, by default, a name starting with a lowercase letter
    will appear after those starting with uppercase letters. For example “van Dyke”
    will appear after “Zebedee.”


    If we put numbers in a character field, they will also sort alphabetically. This
    means you will have comparisons such as “400” < “5”, because the first character,
    “4” (ASCII 34), in the left-hand text is less than the first character, “5” (ASCII
    35), on the right-hand side. So, make sure if a column is going to contain numbers
    that you want to compare and order numerically, that it is declared as a numeric
    type, or you will get some rather surprising results from your queries. Similarly,
    dates need to be in a column declared with one of the date types or the comparisons
    and ordering may not be what you expect.


    With comparison operators, we can create many different queries. Table [2-2](#A158240_2_En_2_Chapter.html#Tab2)
    shows some examples of Boolean expressions that we can use as conditions in the
    `WHERE` clause of an SQL statement for selecting rows from the `Member` table.


    Table 2-2.


    Examples of Boolean Expressions on the Member Table


    | Expression | Retrieved Rows |

    | --- | --- |

    | `MemberType = ''Junior''` | All junior members |

    | `Handicap <= 12` | All members with a handicap of 12 or less |

    | `JoinDate >= ''01/01/2008''` | Everyone who has joined after the beginning of
    2008 |

    | `Gender = ''F''` | All the women |


    Some implementations of SQL are case sensitive when comparing text, and others
    are not. Being case sensitive means that uppercase letters are treated as being
    different from their lowercase counterpart; in other words, “Junior” is different
    from “junior,” which is different from “JUNIOR.” I usually check out any new database
    system I use to see what it does. If you do not care about the case of the attribute
    you are considering (that is, you are happy to retrieve rows where `MemberType`
    is “Junior” or “jUnIoR” or whatever), you can make use of the SQL function `UPPER`.
    This will turn the value of each text attribute into uppercase before you do the
    comparison. You can then compare that with the uppercase literal value, as shown
    here:


    ```

    SELECT *

    FROM Member m

    WHERE UPPER(m.MemberType) = ''JUNIOR''

    ```'
  trans: '## 使用别名


    随着查询变得越来越复杂，我们会涉及多个不同的表。其中一些表可能具有相同的列名，我们需要将它们区分开来。在 SQL 中，我们可以在查询中为每个属性添加其来源表的名称作为前缀，如下所示：


    ```sql

    SELECT Member.LastName, Member.FirstName, Member.Phone

    FROM Member

    WHERE Member.MemberType = ''Senior''

    ```


    因为输入整个表名会变得很繁琐，而且在某些查询中我们可能需要比较表中多行的数据，SQL 提供了**别名**的概念。看看下面的查询：


    ```sql

    SELECT m.LastName, m.FirstName, m.Phone

    FROM Member m

    WHERE m.MemberType = ''Senior''

    ```


    在 `FROM` 子句中，我们为 `Member` 表声明了一个别名或替代名称，在本例中是 `m`。我们可以给别名取任何喜欢的名字或字母；越短越好。然后，在查询的其余部分，当我们需要指定该表的属性时，就可以使用这个别名。养成对查询中涉及的每个表都使用表别名的习惯是个好主意。


    ## 保存查询


    可以将查询的结果保存在一个新的永久表中（有时称为快照），但我们通常不想这样做，因为如果基础数据发生变化，它就会过时。我们通常想做的是保存查询指令，以便日后可以提出相同的问题。以我们的电话列表查询为例。在俱乐部成员名单更新后，我们会定期生成新的电话列表。与其每次都重新构建查询，我们可以将指令保存在一个称为**视图**的对象中。下面的代码展示了如何创建一个可用于提供最新电话列表的视图。我们必须给视图起一个名字（`PhoneList`
    看起来很合适），然后提供用于检索相应数据的 SQL 语句：


    ```sql

    CREATE VIEW PhoneList AS

    SELECT m.LastName, m.FirstName, m.Phone

    FROM Member m

    ```


    你可以将 `PhoneList` 视为创建“虚拟”表的指令，我们可以在其他查询中以与使用真实表相同的方式使用它。我们只需要记住，这个虚拟表是通过运行永久 `Member`
    表上的查询动态创建的，并且用完即消失。现在要获取我们的电话列表，我们可以简单地使用 `PhoneList` 视图：


    ```sql

    SELECT * FROM PhoneList

    ```


    ## 指定选择行的条件


    在前面章节我们查看的查询中，我们使用了非常简单的条件或标准来决定是否将一行包含在查询结果中。在下一节中，我们将更仔细地研究指定更复杂条件的各种方法。


    ### 比较运算符


    条件是一个为真或为假的语句或表达式，例如 `MemberType = ''Senior''`。这类表达式被称为**布尔表达式**，以 19 世纪研究其性质的英国数学家乔治·布尔命名。我们用来从表中选择行的条件通常涉及将属性的值与某个常量值或其他属性进行比较。例如，我们可以询问某个属性的值是否相同、不同或大于某个值。表
    2-1 展示了一些可在查询中使用的比较运算符。


    **表 2-1. 比较运算符**


    | 运算符 | 含义 | 为真的示例 |

    | --- | --- | --- |

    | `=` | 等于 | `5=5`, `''Junior'' = ''Junior''` |

    | `<` | 小于 | `4<5`, `''Ann'' < ''Zebedee''` |

    | `<=` | 小于或等于 | `4<=5`, `5<=5` |

    | `>` | 大于 | `5>4`, `''Zebedee'' > ''Ann''` |

    | `>=` | 大于或等于 | `5>=4`, `5>=5` |

    | `<>` | 不等于 | `5<>4`, `''Junior'' <> ''Senior''` |


    这里需要快速提醒一下：在表 2-1 中，我们的一些示例比较的是数字，一些比较的是字符。回想第 1 章，当我们创建表时，我们指定了每个字段的类型；例如，`MemberID`
    被声明为 `INT`（整数或整数），而 `LastName` 被声明为 `CHAR(20)`（20 个字符的字段）。对于像整数这样的字段，比较是数值型的。对于文本或字符字段，比较是按字母顺序进行的；对于日期和时间字段，比较是按时间顺序进行的（较早的日期在前）。


    当我们比较字符属性时，比较是基于字符的 ASCII 或 Unicode 值。正如我们可能预期的那样，“A”（ASCII 值 65）在“Z”（ASCII 90）之前，所以
    “A” < “Z”。对于一串字符，如果第一个字母相同，则顺序由第二个字母决定，依此类推。所以 “ANNABEL” < “ANNE”。然而，小写字符的 ASCII
    码大于大写字符。这意味着 “a”（ASCII 97） > “Z”（ASCII 90）。如果你按字母顺序对名称列表排序，默认情况下，以小写字母开头的名字会出现在以大写字母开头的名字之后。例如，“van
    Dyke” 会出现在 “Zebedee” 之后。


    如果我们将数字放入字符字段，它们也会按字母顺序排序。这意味着你会得到像 “400” < “5” 这样的比较结果，因为左边文本的第一个字符 “4”（ASCII
    52）小于右边文本的第一个字符 “5”（ASCII 53）。因此，请确保如果一个列将包含你想要进行数值比较和排序的数字，必须将其声明为数值类型，否则你的查询会得到一些相当令人惊讶的结果。同样，日期也需要放在声明为日期类型的列中，否则比较和排序可能不是你期望的结果。


    使用比较运算符，我们可以创建许多不同的查询。表 2-2 展示了一些布尔表达式的例子，这些表达式可以用作 SQL 语句 `WHERE` 子句中的条件，用于从
    `Member` 表中选择行。


    **表 2-2. Member 表上的布尔表达式示例**


    | 表达式 | 检索的行 |

    | --- | --- |

    | `MemberType = ''Junior''` | 所有初级会员 |

    | `Handicap <= 12` | 所有障碍值为 12 或更低的会员 |

    | `JoinDate >= ''01/01/2008''` | 所有在 2008 年之后加入的人 |

    | `Gender = ''F''` | 所有女性会员 |


    一些 SQL 实现在比较文本时区分大小写，而另一些则不区分。区分大小写意味着大写字母被视为与其小写对应形式不同；换句话说，“Junior” 不同于 “junior”，也不同于
    “JUNIOR”。我通常会测试我使用的任何新数据库系统，看看它的行为。如果你不关心所考虑属性的大小写（即你乐于检索 `MemberType` 为 “Junior”、“jUnIoR”
    或任何其他形式的行），你可以利用 SQL 函数 `UPPER`。该函数会在比较之前将每个文本属性的值转换为大写。然后你可以将其与大写的字面值进行比较，如下所示：


    ```sql

    SELECT *

    FROM Member m

    WHERE UPPER(m.MemberType) = ''JUNIOR''

    ```'
- fmt: '### Logical Operators


    We can combine Boolean expressions to create more interesting conditions. For
    example, we can specify that two expressions must both be true before we retrieve
    a particular row.


    Let’s assume we want to find all the junior girls. This requires two conditions
    to be true: they must be female, and they must be juniors. We can easily express
    each of these conditions independently. After that, we can use the logical operator
    `AND` to require that both conditions be true:


    ```sql

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Junior'' AND m.Gender = ''F''

    ```


    We will look at three logical operators: `AND`, `OR`, and `NOT`. We have already
    seen how `AND` works. If we use `OR` between two expressions, then only one of
    the expressions need be true (but if they are both true, that is OK as well).
    `NOT` is used before an expression. For example, for our `Member` table, we might
    ask for rows obeying the condition `NOT (MemberType = ''Social'')`. This means
    check each row, and if the value of `MemberType` is “Social,” then we do not want
    that row. Table 2-3 gives some more examples of using logical operators in conditions.


    Table 2-3. Examples of Logical Operators


    | Expression | Description of Data |

    | --- | --- |

    | `MemberType = ''Senior'' AND Handicap < 12` | Seniors with a handicap under
    12 |

    | `MemberType = ''Senior'' OR Handicap < 12` | All the senior members as well
    as anyone else with a good handicap (those less than 12) |

    | `NOT(MemberType = ''Social'')` | All the members except the social ones (for
    the current data, that would be just the seniors and juniors) |


    Figure 2-4 shows a diagrammatic representation of the queries in Table 2-3. Each
    circle represents a set of rows (that is, those for social members or those for
    members with handicaps under 12). The shaded area represents the result of the
    operation.


    ![A158240_2_En_2_Fig4_HTML.gif](A158240_2_En_2_Fig4_HTML.gif)


    Figure 2-4. Diagrammatic representation of the logical operators.


    The truth tables in Figure 2-5 can be helpful in understanding how the logical
    operators work. You read them like this: in Figures 2-5a and 2-5b, we have two
    expressions, one along the top and one down the left. Each expression can have
    one of two values: True (`T`) or False (`F`). If we combine them with the Boolean
    expression `AND`, then Figure 2-5a shows that the overall statement is true only
    if both the contributing statements are true (the square in the top left). If
    we combine them with an `OR` statement, then the overall statement is false only
    if both contributing statements are false (bottom right of Figure 2-5b). The table
    in Figure 2-5c says that if our original statement is true and we put `NOT` in
    front, then the result is false (left column), and vice versa.


    ![A158240_2_En_2_Fig5_HTML.gif](A158240_2_En_2_Fig5_HTML.gif)


    Figure 2-5. Truth tables for logical operators (`T` = true, `F` = false)


    Sometimes it can be a bit tricky turning natural-language descriptions into Boolean
    expressions. If you were asked for a list that included all the women and all
    the juniors (don’t ask why!), you might translate this literally and write the
    condition `MemberType = ''Junior'' AND Gender = ''F''`. However, the `AND` means
    both conditions must be true, so this would give us junior women. What our natural-language
    statement really means is “I want the row for any member if they are either a
    woman or a junior (or both).” Be careful.


    ## Dealing with Nulls


    The example data in the `Member` table shown earlier in Figure 2-1 is all accurate
    and complete. Every row has a value for each attribute, except for `Handicap`,
    which doesn’t apply to some members. Real data is usually not so clean and tidy.
    Let’s consider some different data, as in Figure 2-6.


    ![A158240_2_En_2_Fig6_HTML.jpg](A158240_2_En_2_Fig6_HTML.jpg)


    Figure 2-6. Table with missing data


    When there is no value in a cell in a table, it is said to be null. Nulls in a
    database can cause a few headaches. Consider carrying out the following two queries:
    one to produce a list of male members and the other a list of females. Given that
    golfers need to identity as either male or female for competition purposes, we
    might assume that all the members of the club would appear on one list or the
    other. However, for the data in Figure 2-6, we would leave out Kim Spence. You
    could argue that the data shouldn’t be like that, but we are talking about real
    people and real clubs with less than accurate and complete data. Maybe Kim forgot
    (or refused) to fill in the gender part of the application form. We can protect
    against this by insisting that nulls are not allowed in a particular field when
    we create a table. The following SQL statement shows how we could make `Gender`
    a field that always requires a value:


    ```sql

    CREATE TABLE Member (

    MemberID INT PRIMARY KEY,

    .....

    Gender CHAR(1) NOT NULL,

    ....)

    ```


    It is worth bearing in mind that making fields `NOT NULL` can create more headaches
    than it cures. If Kim Spence did not complete all the boxes on his/her membership
    application but had organized payment for the subscription, then we want to record
    him/her as a member and worry about the full details later. If we make `Gender`
    a required field, then we can’t enter a record for him/her in the table`—`or we
    have to guess what his/her gender is. Neither of these options is a good strategy,
    so it is best to be sparing when making fields required. Remember that our primary
    key fields (by definition) always need a value.


    Not all values of null mean there is a problem with the data. In our `Member`
    table, a field might be null because it does not apply to a particular member.
    Helen and Sarah’s handicap may be genuinely null because they do not have handicaps.
    However, it is fair to assume that every member should have a value for `MemberType`
    and `JoinDate`, so the nulls in these columns are because we do not know the value.
    In the real world, expect that your tables will have missing data.


    ### Finding Nulls


    Given that in our tables we may have nulls that might cause us problems, it is
    useful to be able to find them. After we have entered a batch of new members into
    the database, we can check for problems. We might want to get a list of all the
    members who don’t have a value for `Gender`, say. To do this we can use the SQL
    phrase `IS NULL`:


    ```sql

    SELECT *

    FROM Member m

    WHERE m.Gender IS NULL

    ```


    Alternatively, we might want to retrieve only those members who do have a value
    in a cell. If we want the names and handicaps of only those members who have a
    value for `Handicap`, we could use the `NOT` operator to create the following
    query:


    ```sql

    SELECT *

    FROM Member m

    WHERE NOT (m.Handicap IS NULL)

    ```'
