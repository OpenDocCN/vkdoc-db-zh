- fmt: '## Summary


    表之间可能存在多个关系。例如，“一个成员可能属于一个团队”是一种关系，“团队有一个作为经理的俱乐部成员”是另一种关系。查找关于成员团队的信息（包括经理的ID）需要在`Member`和`Team`表之间进行连接。如果我们还想找到经理的姓名，就需要将该结果与`Member`表的第二个副本连接，像这样：


    ```sql

    SELECT * FROM

    (Member m INNER JOIN Team t ON m.Team = t.TeamName)

    INNER JOIN Member m2 ON t.Manager = m2.MemberID

    ```


    表之间可能存在相当复杂的业务规则或约束。例如，我们可能要求经理必须是他或她所管理团队的成员，或者经理不应是任何团队的成员，或者一个团队必须少于六名成员。这些通常需要使用触发器。本章讨论的查询类型将有助于制定触发器中所需的代码。


    脚注 [1](#A158240_2_En_6_Chapter.html#Fn1_source)


    Clare Churcher，《Beginning Database Design: From Novice to Professional》（纽约：Apress，2012）。


    # 7. 集合操作


    关系数据库理论的一个巨大优势是表（或更正式地说，关系）由不同的行组成，因此可以被视为一个集合。然后，我们可以使用集合操作来帮助组合和提取特定信息。集合操作有助于解决的问题类型是：“哪些人同时在这两个集合中？”或“哪些人在这个集合中而不在那个集合中？”


    在附录2中，你可以找到一些有助于管理集合操作的正式符号。在本章中，我们将尽量减少形式化内容，但集合操作的符号是一种有用的简写。表[7-1](#A158240_2_En_7_Chapter.html#Tab1)展示了我们将研究的四种集合操作及其通用符号和关联的SQL关键字（如果有的话）。


    表7-1. 四种集合操作及其符号


    | 操作 | 符号 | SQL关键字 |

    | --- | --- | --- |

    | 并集 | ∪ | `UNION` |

    | 交集 | ∩ | `INTERSECT` |

    | 差集 | − | `EXCEPT` |

    | 除法 | ÷ |  |


    并非所有SQL实现都支持表[7-1](#A158240_2_En_7_Chapter.html#Tab1)中的所有关键字，因此当关键字不可用时，我们将研究实现相同结果的替代方法。


    ## 基本集合操作概述


    我们将依次研究每种集合操作，但为了让你了解方向，我将先快速概述三种最常见的操作：并集、交集和差集。想象我们有两个高尔夫俱乐部的会员表。我们可能想要：


    *   确定谁在两个俱乐部中。

    *   合并一个包含所有会员的大列表。

    *   找出谁在一个俱乐部中而不在另一个俱乐部中。


    基本的集合操作允许我们执行所有这些任务。


    让我们假设每个俱乐部将其成员姓名存储在一个表中。这两个表具有完全相同的列（更多内容将在下一节中介绍），如图[7-1](#A158240_2_En_7_Chapter.html#Fig1)所示。（好吧，它们是非常小的俱乐部！）


    ![A158240_2_En_7_Fig1_HTML.jpg](A158240_2_En_7_Fig1_HTML.jpg)

    图7-1. 两个成员姓名表


    对这两个表的基本集合操作总结在图[7-2](#A158240_2_En_7_Chapter.html#Fig2)中。两个俱乐部表的图像已叠加，以便将共有成员叠加在一起。`ClubA`是每张图片中的顶部表格。对于图[7-2](#A158240_2_En_7_Chapter.html#Fig2)的每一部分，方框显示了集合操作的结果。


    ![A158240_2_En_7_Fig2_HTML.jpg](A158240_2_En_7_Fig2_HTML.jpg)

    图7-2. 对两个表ClubA（上）和ClubB（下）进行的基本集合操作


    并集操作符（图[7-2](#A158240_2_En_7_Chapter.html#Fig2)左上）显示来自每个表的所有名称（重复项已删除）。交集操作符（右上）返回同时出现在两个表中的两行。差集操作符（下）返回在一个俱乐部中而不在另一个俱乐部中的行。


    ## 联合兼容表


    集合操作并集、交集和差集在两组行之间进行操作。尝试比较结构非常不同的表中的行是没有意义的，例如图[7-3](#A158240_2_En_7_Chapter.html#Fig3)中的表。


    ![A158240_2_En_7_Fig3_HTML.jpg](A158240_2_En_7_Fig3_HTML.jpg)

    图7-3. 尝试比较具有不同结构的表中的行是没有意义的


    那么，什么决定了两组行是否可以使用集合操作并集、交集和差集进行比较？正式来说，这两组必须具有相同数量的列，并且每列必须具有相同的域。严格来说，域是一组可能的值。然而，在实践中，集合操作的要求是，每组行中对应的列（即从左到右的顺序）具有相同的类型`—`都是字符型，都是整型，等等。[¹](#A158240_2_En_7_Chapter.html#Fn1)
    列的名称不需要相同。满足这些要求的表被称为联合兼容的，尽管该要求对于交集和差集操作也是必需的。


    图[7-4](#A158240_2_En_7_Chapter.html#Fig4)显示了一对联合兼容的表。即使列的名称不同，它们具有相同数量的列，并且对应的列具有相同的类型。


    ![A158240_2_En_7_Fig4_HTML.jpg](A158240_2_En_7_Fig4_HTML.jpg)

    图7-4. 联合兼容的表，即使列名不同


    图[7-5](#A158240_2_En_7_Chapter.html#Fig5)有两个具有相同列名的表，但它们不是联合兼容的，因为列的顺序使得第四列在上表中是数字类型，在下表中是字符类型，最后一列则相反。


    ![A158240_2_En_7_Fig5_HTML.jpg](A158240_2_En_7_Fig5_HTML.jpg)

    图7-5. 不联合兼容的表


    不同的SQL实现可能会以不同的方式解释对域或类型“相同性”的严格要求。严格来说，定义为`CHAR(10)`和`CHAR(12)`的两个字段具有不同的域，但许多SQL实现会允许这些字段在集合操作的目的上被视为相同。一些实现还会将数字转换为字符以执行集合操作。我觉得这特别可怕，不建议让你的应用程序替你做出这种决定。以下各节将演示如何使用SQL使你的表联合兼容。'
  raw: '## Summary


    There can be more than one relationship between tables. For example, “a member
    may belong to a team” is one relationship. “A team has a club member who is the
    manager” is another relationship. Finding information about a member’s team (including
    the manager’s ID) requires a join between `Member` and `Team`. If we want to also
    find the name of the manager, we need to join that result to a second copy of
    the `Member` table, like this:


    ```

    SELECT * FROM

    (Member m INNER JOIN Team t ON m.Team = t.TeamName)

    INNER JOIN Member m2 ON t.Manager = m2.MemberID

    ```


    There can be quite complex business rules or constraints involving the relationships
    between tables. For example, we might require that the manager be a member of
    the team he or she manages, or that a manager should not be a member of any team,
    or that a team must have fewer than six members. These often require the use of
    triggers. The types of queries discussed in this chapter will be helpful in formulating
    the code required in triggers.


    Footnotes [1](#A158240_2_En_6_Chapter.html#Fn1_source)


    Clare Churcher, Beginning Database Design: From Novice to Professional (New York:
    Apress, 2012).


    # 7. Set Operations


    One of the great strengths of relational database theory is that the tables (or,
    more formally, the relations) are made up of distinct rows and so can be considered
    a set. We can then use set operations to help with combining and extracting specific
    information. The types of questions that set operations help with are those such
    as “which people are in both these sets?” or “which people are in this set but
    not that one?”


    In Appendix 2 you can find some formal notation that is helpful with managing
    set operations. In this chapter we will keep formalities to a minimum, but the
    symbols for the set operations are a useful shorthand. Table [7-1](#A158240_2_En_7_Chapter.html#Tab1)
    shows the four set operations we will look at along with their common symbols
    and the associated SQL keyword (for those that have them).


    Table 7-1.


    Four Set Operations and Their Symbols


    | Operation | Symbol | SQL Keyword |

    | --- | --- | --- |

    | Union | ∪ | `UNION` |

    | Intersection | ∩ | `INTERSECT` |

    | Difference | − | `EXCEPT` |

    | Division | ÷ |   |


    Not all implementations of SQL support all the keywords in Table [7-1](#A158240_2_En_7_Chapter.html#Tab1),
    so we will look at alternative ways to achieve the same result when the keywords
    are not available.


    ## Overview of Basic Set Operations


    We will look at each of the set operations in turn, but so that you know where
    we are heading, I’ll just give a very quick overview of the three most common
    operations: union, intersection, and difference. Imagine we have membership tables
    from two golf clubs. We might want to do the following:


    *   Determine who is in both clubs.

    *   Form a large list that combines all the members.

    *   Find out who is in one club but not the other.


    The basic set operations allow us to carry out all these tasks.


    Let’s assume that the each club keeps the names of its members in a table. The
    two tables have exactly the same columns (more about this in the next section)
    and are shown in Figure [7-1](#A158240_2_En_7_Chapter.html#Fig1). (OK, they are
    very small clubs!)


    ![A158240_2_En_7_Fig1_HTML.jpg](A158240_2_En_7_Fig1_HTML.jpg)


    Figure 7-1.


    Two tables of member names


    The basic set operations on these two tables are summarized in Figure [7-2](#A158240_2_En_7_Chapter.html#Fig2).
    The images of two club tables have been overlaid so that the members in common
    are superimposed. `ClubA` is the top table in each picture. For each section of
    Figure [7-2](#A158240_2_En_7_Chapter.html#Fig2), the box shows the result of the
    set operation.


    ![A158240_2_En_7_Fig2_HTML.jpg](A158240_2_En_7_Fig2_HTML.jpg)


    Figure 7-2.


    The basic set operations on the two tables ClubA (top) and ClubB (bottom)


    The union operator (top left in Figure [7-2](#A158240_2_En_7_Chapter.html#Fig2))
    shows all the names from each table (with duplicates removed). The intersect operator
    (top right) returns the two rows that appear in both tables. The difference operators
    (bottom) return those rows that are found in one club but not the other.


    ## Union-Compatible Tables


    The set operations union, intersection, and difference operate between two sets
    of rows. It does not make any sense to try to compare rows in tables that have
    very different structures, such as those in Figure [7-3](#A158240_2_En_7_Chapter.html#Fig3).


    ![A158240_2_En_7_Fig3_HTML.jpg](A158240_2_En_7_Fig3_HTML.jpg)


    Figure 7-3.


    It makes no sense to try to compare rows from tables with different structures


    So what determines whether two sets of rows can be compared using the set operations
    union, intersection, and difference? Formally, the two sets must have the same
    number of columns, and each column must have the same domain. Strictly speaking,
    a domain is a set of possible values. However, in practice, the requirement for
    set operations is that the corresponding columns (i.e., in order from left to
    right) in each set of rows have the same types `—` both character, both integer,
    and so on.[¹](#A158240_2_En_7_Chapter.html#Fn1) The names of the columns do not
    need to be the same. Tables that meet these requirements are referred to as being
    union compatible, although the requirement is necessary for the intersection and
    difference operations as well.


    Figure [7-4](#A158240_2_En_7_Chapter.html#Fig4) shows a pair of tables that are
    union compatible. Even though the names of the columns are different, they have
    the same number of columns, and the corresponding columns have the same types.


    ![A158240_2_En_7_Fig4_HTML.jpg](A158240_2_En_7_Fig4_HTML.jpg)


    Figure 7-4.


    Union-compatible tables, even though column names are different


    Figure [7-5](#A158240_2_En_7_Chapter.html#Fig5) has two tables with the same column
    names, but they are not union compatible because the order of the columns is such
    that the fourth column has a number type in the top table and a character type
    in the bottom, and vice versa for the last column.


    ![A158240_2_En_7_Fig5_HTML.jpg](A158240_2_En_7_Fig5_HTML.jpg)


    Figure 7-5.


    Tables that are not union compatible


    Different implementations of SQL may interpret the strictness of this requirement
    for the “sameness” of domains or types differently. Strictly speaking, two fields
    defined as `CHAR(10)` and `CHAR(12)` have different domains, but many implementations
    of SQL will allow these to be regarded as the same for the purposes of set operations.
    Some implementations will also convert numbers into characters to enable set operations
    to be carried out. I find this particularly scary and don’t recommend you let
    your application make these sorts of decisions for you. The following sections
    demonstrate how you can use SQL to make your tables union compatible.'
