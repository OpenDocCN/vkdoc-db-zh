- fmt: '## Questions Involving “Both”


    In the “Avoiding Common Mistakes” section of Chapter [2](#A158240_2_En_2_Chapter.html),
    we looked at a questions such as, “Which members have entered both tournaments
    24 and 36?” To recap, I’ve reproduced the `Entry` table in Figure [5-13](#A158240_2_En_5_Chapter.html#Fig13).


    ![A158240_2_En_5_Fig13_HTML.jpg](A158240_2_En_5_Fig13_HTML.jpg)


    Figure 5-13. Entry table


    A common first attempt at an SQL statement to find entries in both tournaments
    is the following:


    ```

    -- Will not produce the desired result

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID = 24 AND e.TourID = 36;

    ```


    Remember that a `WHERE` condition is applied to each row of the table individually.
    The condition (`e.TourID = 24 AND e.TourID = 36`) is never true for any individual
    row, as each row has only a single value for `TourID`. The preceding query will
    never return any rows because the value in `TourID` cannot be two different things
    (24 and 36) simultaneously. Such a query can be quite dangerous, because the user
    may interpret the empty result as meaning that no members have entered both tournaments,
    whereas the query statement is actually incorrect.


    To answer the question, we need to look at more than one row in the `Entry` table.
    I find an outcome approach to be the most natural for dealing with questions involving
    “both.”


    ### An Outcome Approach to Questions Involving “Both”


    The picture I need in my head to answer “Which members have entered both tournaments
    24 and 36?” is shown in Figure [5-14](#A158240_2_En_5_Chapter.html#Fig14).


    ![A158240_2_En_5_Fig14_HTML.jpg](A158240_2_En_5_Fig14_HTML.jpg)


    Figure 5-14. Which members have entered both tournaments 24 and 36?


    Looking at Figure [5-14](#A158240_2_En_5_Chapter.html#Fig14), it is pretty clear
    that member 228 has entered both the tournaments. We are to looking for two rows
    (two fingers, `e1` and `e2`) with matching `MemberID` values and where the rows
    have the required two TourID values.


    A more general expression of the logic displayed in Figure [5-14](#A158240_2_En_5_Chapter.html#Fig14)
    is:


    > I’m going to look at every row (`e1`) in the `Entry` table. I’ll write out that
    row’s member ID if `TourID` has the value 24 and I can also find another row (
    `e2`) in the `Entry` table with the same value for `MemberID` and that has 36
    as the value for `TourID`.


    The SQL follows from here. If you have trouble with it, refer to Figure [5-14](#A158240_2_En_5_Chapter.html#Fig14).


    ```

    SELECT e1.MemberID

    FROM Entry e1, Entry e2

    WHERE e1.MemberID = e2.MemberID

    AND e1.TourID = 24 AND e2.TourID = 36;

    ```


    ### A Process Approach to Questions Involving “Both”


    As always, we have several ways to think about a query. Take a look at the middle
    two lines of the last query. `FROM Entry e1, Entry e2` is a Cartesian product
    (which will give us every combination of pairs of rows), followed by selecting
    a subset of rows satisfying (`WHERE e1.MemberID = e2.MemberID`). This is a join.
    In fact, it is a self join between two copies of the `Entry` table. Part of the
    join between two copies of the `Entry` table is shown in Figure [5-15](#A158240_2_En_5_Chapter.html#Fig15).


    ![A158240_2_En_5_Fig15_HTML.jpg](A158240_2_En_5_Fig15_HTML.jpg)


    Figure 5-15. Part of the self join between two copies of the Entry table


    The self join in Figure [5-15](#A158240_2_En_5_Chapter.html#Fig15) shows those
    combinations of rows from the `Entry` table for the same member. For example,
    we can see every combination of rows involving member 228. We can use this self
    join to answer the question about members who have entered both tournaments 24
    and 36. We just need to find a row that has 24 from the first copy and 36 from
    the second copy (or vice versa) — that is, `e1.TourID = 24 AND e2.TourID = 36`.


    The SQL for this self join followed by the `WHERE` clause to select the rows with
    the appropriate values of `TourID` is shown here:


    ```

    SELECT e1.MemberID

    FROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID

    WHERE e1.TourID = 24 AND e2.TourID = 36;

    ```


    If you compare the two queries for finding the entries in both tournaments 24
    and 26, you will see how similar they are. They will both produce exactly the
    same result. You will probably find one or the other to be more intuitive.


    ## Summary


    Many queries require us to obtain information from two rows of a table. This turns
    up in a number of situations. The main ones are where we have self relationships
    or where there are questions involving the word “both.” We have looked at both
    process approaches and outcome approaches to these queries. Both resulted in very
    similar-looking SQL statements that return the same output. Having the two different
    approaches is helpful for those occasions when the query statement is not immediately
    obvious.


    ### Self Relationships


    We have a self relationship when different instances of a class are related to
    each other. In the example in this chapter, we had that some members are coaches
    of other members.


    From a process perspective, queries about coaches or coaching relationships require
    self joins, which take two copies of the table and join them. In the following
    example, the copy of the `Member` table with the information about the member
    has the alias `m`, and the copy with information about the coach has the alias
    `c`:


    ```

    SELECT m.LastName, m.FirstName, c.LastName, c.FirstName

    FROM Member m INNER JOIN Member c ON m.Coach = c.MemberID

    ```


    Alternatively, from an output approach we might come up with this equivalent query:


    ```

    SELECT m.FirstName, m.LastName, c.LastName, c.FirstName

    FROM Member m, Member c

    WHERE c.MemberID = m.Coach

    ```


    Both these queries can form the basis of queries to answer a number of questions
    about coaching.


    ### Questions Involving the Word “Both”


    Questions with the word “both” often mean we need to look at two rows in a table.
    In our example, we wanted to find the `MemberID` of members who have entered both
    tournaments 24 and 36.


    From an outcome approach we needed to find two rows in the `Entry` table (`e1`
    and `e2`) for the same member. One of the rows needed to be for tournament 24
    and the other for tournament 36. The following shows the outcome-based SQL query:


    ```

    SELECT e1.MemberID

    FROM Entry e1, Entry e2

    WHERE e1.MemberID = e2.MemberID AND e1.TourID = 24 AND e2.TourID = 36;

    ```


    Alternatively, from a process approach we might recognize the need for a self
    join between two copies of the `Entry` table, which is done using the join condition
    `e1.MemberID = e2.MemberID`. This would need to be followed by a `WHERE` clause
    to return the rows with the appropriate `TourID` values.


    The self join query equivalent to the preceding query is:


    ```

    SELECT e1.MemberID

    FROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID

    WHERE e1.TourID = 24 AND e2.TourID = 36;

    ```


    Footnotes [1](#A158240_2_En_5_Chapter.html#Fn1_source)


    Some implementations of SQL do support recursive queries that can track through
    self relationships. Check your documentation for key phrases like `WITH` or `CONNECT
    BY`.


    ## 6. Multiple Relationships Between Tables


    We have looked simple 1–Many relationships between tables (e.g., each member is
    associated with one member type), and we have also looked at self relationships
    (e.g., members may coach other members). Another situation that occurs frequently
    is where there is more than one relationship between the same two tables.'
  raw: '## Questions Involving “Both”


    In the “Avoiding Common Mistakes” section of Chapter [2](#A158240_2_En_2_Chapter.html),
    we looked at a questions such as, “Which members have entered both tournaments
    24 and 36?” To recap, I’ve reproduced the `Entry` table in Figure [5-13](#A158240_2_En_5_Chapter.html#Fig13).


    ![A158240_2_En_5_Fig13_HTML.jpg](A158240_2_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    Entry table


    A common first attempt at an SQL statement to find entries in both tournaments
    is the following:


    ```

    -- Will not produce the desired result

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID = 24 AND e.TourID = 36;

    ```


    Remember that a `WHERE` condition is applied to each row of the table individually.
    The condition (`e.TourID = 24 AND e.TourID = 36`) is never true for any individual
    row, as each row has only a single value for `TourID`. The preceding query will
    never return any rows because the value in `TourID` cannot be two different things
    (24 and 36) simultaneously. Such a query can be quite dangerous, because the user
    may interpret the empty result as meaning that no members have entered both tournaments,
    whereas the query statement is actually incorrect.


    To answer the question, we need to look at more than one row in the `Entry` table.
    I find an outcome approach to be the most natural for dealing with questions involving
    “both.”


    ### An Outcome Approach to Questions Involving “Both”


    The picture I need in my head to answer “Which members have entered both tournaments
    24 and 36?” is shown in Figure [5-14](#A158240_2_En_5_Chapter.html#Fig14).


    ![A158240_2_En_5_Fig14_HTML.jpg](A158240_2_En_5_Fig14_HTML.jpg)


    Figure 5-14.


    Which members have entered both tournaments 24 and 36?


    Looking at Figure [5-14](#A158240_2_En_5_Chapter.html#Fig14), it is pretty clear
    that member 228 has entered both the tournaments. We are to looking for two rows
    (two fingers, `e1` and `e2`) with matching `MemberID` values and where the rows
    have the required two TourID values.


    A more general expression of the logic displayed in Figure [5-14](#A158240_2_En_5_Chapter.html#Fig14)
    is:


    > I’m going to look at every row (`e1`) in the `Entry` table. I’ll write out that
    row’s member ID if `TourID` has the value 24 and I can also find another row (
    `e2`) in the `Entry` table with the same value for `MemberID` and that has 36
    as the value for `TourID`.


    The SQL follows from here. If you have trouble with it, refer to Figure [5-14](#A158240_2_En_5_Chapter.html#Fig14).


    ```

    SELECT e1.MemberID

    FROM Entry e1, Entry e2

    WHERE e1.MemberID = e2.MemberID

    AND e1.TourID = 24 AND e2.TourID = 36;

    ```


    ### A Process Approach to Questions Involving “Both”


    As always, we have several ways to think about a query. Take a look at the middle
    two lines of the last query. `FROM Entry e1, Entry e2` is a Cartesian product
    (which will give us every combination of pairs of rows), followed by selecting
    a subset of rows satisfying (`WHERE e1.MemberID = e2.MemberID`). This is a join.
    In fact, it is a self join between two copies of the `Entry` table. Part of the
    join between two copies of the `Entry` table is shown in Figure [5-15](#A158240_2_En_5_Chapter.html#Fig15).


    ![A158240_2_En_5_Fig15_HTML.jpg](A158240_2_En_5_Fig15_HTML.jpg)


    Figure 5-15.


    Part of the self join between two copies of the Entry table


    The self join in Figure [5-15](#A158240_2_En_5_Chapter.html#Fig15) shows those
    combinations of rows from the `Entry` table for the same member. For example,
    we can see every combination of rows involving member 228\. We can use this self
    join to answer the question about members who have entered both tournaments 24
    and 36\. We just need to find a row that has 24 from the first copy and 36 from
    the second copy (or vice versa) `—` that is, `e1.TourID = 24 AND e2.TourID = 36`.


    The SQL for this self join followed by the `WHERE` clause to select the rows with
    the appropriate values of `TourID` is shown here:


    ```

    SELECT e1.MemberID

    FROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID

    WHERE e1.TourID = 24 AND e2.TourID = 36;

    ```


    If you compare the two queries for finding the entries in both tournaments 24
    and 26, you will see how similar they are. They will both produce exactly the
    same result. You will probably find one or the other to be more intuitive.


    ## Summary


    Many queries require us to obtain information from two rows of a table. This turns
    up in a number of situations. The main ones are where we have self relationships
    or where there are questions involving the word “both.” We have looked at both
    process approaches and outcome approaches to these queries. Both resulted in very
    similar-looking SQL statements that return the same output. Having the two different
    approaches is helpful for those occasions when the query statement is not immediately
    obvious.


    ### Self Relationships


    We have a self relationship when different instances of a class are related to
    each other. In the example in this chapter, we had that some members are coaches
    of other members.


    From a process perspective, queries about coaches or coaching relationships require
    self joins, which take two copies of the table and join them. In the following
    example, the copy of the `Member` table with the information about the member
    has the alias `m`, and the copy with information about the coach has the alias
    `c`:


    ```

    SELECT m.LastName, m.FirstName, c.LastName, c.FirstName

    FROM Member m INNER JOIN Member c ON m.Coach = c.MemberID

    ```


    Alternatively, from an output approach we might come up with this equivalent query:


    ```

    SELECT m.FirstName, m.LastName, c.LastName, c.FirstName

    FROM Member m, Member c

    WHERE c.MemberID = m.Coach

    ```


    Both these queries can form the basis of queries to answer a number of questions
    about coaching.


    ### Questions Involving the Word “Both”


    Questions with the word “both” often mean we need to look at two rows in a table.
    In our example, we wanted to find the `MemberID` of members who have entered both
    tournaments 24 and 36.


    From an outcome approach we needed to find two rows in the `Entry` table (e1 and
    e2) for the same member. One of the rows needed to be for tournament 24 and the
    other for tournament 36\. The following shows the outcome-based SQL query:


    ```

    SELECT e1.MemberID

    FROM Entry e1, Entry e2

    WHERE e1.MemberID = e2.MemberID AND e1.TourID = 24 AND e2.TourID = 36;

    ```


    Alternatively, from a process approach we might recognize the need for a self
    join between two copies of the `Entry` table, which is done using the join condition
    `e1.MemberID = e2.MemberID`. This would need to be followed by a `WHERE` clause
    to return the rows with the appropriate `TourID` values.


    The self join query equivalent to the preceding query is:


    ```

    SELECT e1.MemberID

    FROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID

    WHERE e1.TourID = 24 AND e2.TourID = 36;

    ```


    Footnotes [1](#A158240_2_En_5_Chapter.html#Fn1_source)


    Some implementations of SQL do support recursive queries that can track through
    self relationships. Check your documentation for key phrases like `WITH` or `CONNECT
    BY`.


    # 6. Multiple Relationships Between Tables


    We have looked at simple 1`–`Many relationships between tables (e.g., each member
    is associated with one member type), and we have also looked at self relationships
    (e.g., members may coach other members). Another situation that occurs frequently
    is where there is more than one relationship between the same two tables.'
