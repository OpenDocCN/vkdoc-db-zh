    #### Have You Used AND Instead of OR?


    We discussed the problem of queries involving the words and or or in the previous
    chapter (in the “Spotting Key Words in Questions” section). I’ll recap briefly.
    The word and can be used in natural English to describe both a union and an intersection.
    When we say “women and children,” we usually mean the union of the set of females
    and the set of young people. When we say “cars that are small and red,” we mean
