    ## Introduction


    ## Overview


    The syntax of SQL is quite easy to learn. A few basic ideas and a handful of keywords
    allow you to tackle a huge range of queries. However, many users often find themselves
    completely stumped when faced with a particular problem. It isn’t really a great
    deal of help for someone to say “this is how I would do it.” What you need is
    a variety of ways to get started on a tricky problem. Once you have made a start
    on a query, you need to be able to check, amend, and refine your solution until
    you have what you need.


    ### Two-Pronged Approach


    Throughout the book I have approached different types of queries from two directions.
    The two approaches have their roots in the formal relational algebra and calculus.
    In the body of the book I have kept the descriptions non-mathematical, however,
    Appendix 2 provides an introduction to the formal notation for those keen to understand
    the underlying theory.


    The first approach, which I’ve called the **process approach**, looks at how tables
    need to be manipulated in order to retrieve the subset of data required. You will
    find explanations of the different types of operations that can be performed on
    tables; e.g., joins, intersections, selections. Explanations are provided to help
    you decide which of these might be useful in particular situations. Once you understand
    what operations are needed, translating them into SQL is relatively straightforward.


    The second approach is what I use when I just can’t figure out what operations
    will give me the required results. This approach, which I’ve called the **outcome
    approach**, lets you describe what an expected row in your result might be like
    — i.e., what conditions it must obey. By looking at the data, it is surprisingly
    easy to develop a semi-formal description of what a “correct” retrieved row would
    be like (and by implication, how you would recognize an “incorrect” row). Translating
    this semi-formal description into a working query is straightforward.


    I am always surprised at which approach my students take when confronting a new
    problem. Some will instantly see the operations that are needed, and others will
    find the outcome approach more intuitive. The choice of approach changes from
    query to query, from person to person, and (I suspect) from day to day. Having
    more than one way to get started means you are less likely to get completely baffled
    by a new problem.


    ### Who Is This Book For?


    This book is for anyone who has a well-designed relational database and needs
    to extract information from it. You might have noticed in the previous sentence
    that the database must be “well designed.” I can’t overemphasize this point. If
    your database is badly designed, then it will not be able to store accurate and
    consistent data, and so the information your queries retrieve will always be prone
    to inaccuracies. If you are looking to design a database from scratch, you should
    read my first book `Beginning Database Design`.[¹](#A158240_2_En_BookFrontmatter_OnlinePDF.html#Fn1)


    The final chapter in this book will outline a few common design problems you are
    likely to come across and give some advice about how to mitigate the impact or
    correct the problem.


    ### Objective of This Book


    In this book you will be introduced to all the main techniques and keywords needed
    to create SQL queries. You will learn about joins, intersections, unions, differences,
    selection of rows, and projection of columns. You will see how to implement these
    ideas in different ways using simple and nested queries, and you will be introduced
    to a variety of techniques for aggregating and summarizing data, including the
    use of window functions. You will also learn how you can investigate and improve
    the efficiency of your queries.


    Most important of all, you will learn different ways to get started on a troublesome
    problem. There are almost always several different ways to express a query, and
    my objective is that for any particular situation I will provide you with a method
    of attack that matches your psyche and mood (just kidding).'
