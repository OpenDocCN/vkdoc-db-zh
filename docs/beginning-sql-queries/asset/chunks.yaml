  trans: '## EXISTS 关键字


    让我们从一个简单的问题开始。例如，“所有曾参加过任何锦标赛的成员姓名是什么？”我们可以先从思考`Member`表中哪些行满足问题条件入手。请结合以下句子和图
    4-5 一起思考：


    > 如果`Entry`表中存在行`e`，使得`m.MemberID = e.MemberID`，我将输出来自行`m`的姓名，其中`m`来自`Member`表。


    ![A158240_2_En_4_Fig5_HTML.jpg](img/A158240_2_En_4_Fig5_HTML.jpg)

    图 4-5. 威廉·库珀已参加锦标赛，因为在`Entry`表中存在匹配的行


    我们可以使用关键字`EXISTS`，将该语句


    > 如果`Entry`表中存在行`e`，使得`m.MemberID = e.MemberID`，我将输出来自行`m`的姓名，其中`m`来自`Member`表。


    几乎直接转换为 SQL：


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e WHERE e.MemberID = m.MemberID);

    ```


    这是嵌套查询的另一个例子，其中我们有两个 SQL `SELECT`语句，一个嵌套在另一个内部。这个例子与本章前面看到的较简单的例子略有不同。内部查询中的`WHERE`条件引用了外部查询正在考虑的部分行；即`e.MemberID
    = m.MemberID`。我发现解释这些嵌套查询最简单的方法是参考像图 4-5 这样的图表。变量`m`正在检查`Member`表中的每一行。内部查询正在`Entry`表中查找一个`MemberID`与当前正在考虑的`Member`表行具有相同值的行。如果存在这样的行（或多个这样的行），那么我们就成功了。


    对于那些认为这似乎是获取简单结果的复杂方法的读者，你们是对的（部分）。使用`EXISTS`子句的查询与基于`MemberID`的`Member`和`Entry`之间的内连接所检索到的成员是相同的。


    但是，如果我们想要那些没有参加过锦标赛的成员呢？这只需要对我们的新 SQL 查询进行微小的更改。我们现在不是查找在`Entry`中存在匹配行的成员，而是要查找不存在匹配行的成员。在之前的
    SQL 语句中加上`NOT`一词就能得到我们需要的结果：


    ```sql

    SELECT m.Lastname, m.FirstName

    FROM Member m

    WHERE NOT EXISTS

    (SELECT * FROM Entry e WHERE e.MemberID = m.MemberID);

    ```


    `NOT EXISTS`结构将遍历`Entry`表中的每一行`e`，检查是否存在与当前`Member`表行的`MemberID`匹配的行。只有在未找到匹配行时，才会检索出该成员的姓名。


    现在我们有足够的条件来处理关于未参加过公开赛的成员的查询。查看图 4-6 以决定威廉·库珀是否应包含在结果中。


    ![A158240_2_En_4_Fig6_HTML.jpg](img/A158240_2_En_4_Fig6_HTML.jpg)

    图 4-6. 威廉·库珀确实存在一条公开赛的参赛记录


    图 4-6 中指示的行显示，威廉·库珀确实存在一条参赛记录，因此我们不会将他包含在我们的结果中。


    现在，看这个描述图 4-6 的自然语言陈述：


    > 我将输出来自行`m`的姓名，其中`m`来自`Member`表，前提是不存在（`Entry`表中的一行`e`满足`m.MemberID = e.MemberID`，同时`Tournament`表中的一行`t`满足`e.TourID
    = t.TourID and t.TourType = ''Open''`）


    反映上述陈述的 SQL 是：


    ```sql

    SELECT m.Lastname, m.FirstName

    FROM Member m

    WHERE NOT EXISTS

    (SELECT * FROM Entry e, Tournament t

    WHERE m.MemberID = e.MemberID

    AND e.TourID = t.TourID AND t.TourType = ''Open'');

    ```


    当我们第 7 章介绍集合操作时，将看看处理此类查询的过程方法。


    ## 不同类型的子查询


    我们在前面的章节中看到了不同类型的子查询。在这里回顾一些选项是有用的。嵌套查询的内部可以返回单个值（例如，芭巴拉的差点）、一组值（例如，公开赛的 ID）或一组行（例如，公开赛的参赛记录）。此外，内部和外部查询可以在某种程度上是独立的，也可以是相关联的。


    ### 返回单个值的内部查询


    返回单个值的内部查询在简单地检索行子集的情况下通常很有用。让我们考虑我们成员的差点，如图 4-7 所示。


    ![A158240_2_En_4_Fig7_HTML.jpg](img/A158240_2_En_4_Fig7_HTML.jpg)

    图 4-7. 显示姓名和差点的`Member`表部分


    如果我们想找到那些差点小于 16 的成员，那么可以简单地使用以下 SQL 完成：


    ```sql

    SELECT *

    FROM Member m

    WHERE m.Handicap < 16;

    ```


    如果我们想找到所有差点小于芭巴拉·奥尔森的成员该怎么办？前面的查询可以做到，但前提是芭巴拉 16 的差点不会改变。为了让查询无论芭巴拉当前的差点是多少都能工作，我们可以用内部查询的结果替换单个值
    16：


    ```sql

    SELECT *

    FROM Member m

    WHERE Handicap <

    (SELECT Handicap

    FROM Member

    WHERE LastName = ''Olson'' AND FirstName = ''Barbara'');

    ```


    我们需要将`Handicap`与单个值进行比较。如果在像这样的情况下，我们的内部查询返回多个值（例如，如果俱乐部里有多个芭巴拉·奥尔森），那么在尝试运行查询时我们会得到错误。


    返回单个值的内部查询在我们想要将值与某种聚合进行比较时也很有用。例如，我们可能想找出所有差点低于平均水平的成员。在这种情况下，我们可以使用内部查询返回平均值：


    ```sql

    SELECT *

    FROM Member m

    WHERE m.Handicap <

    (SELECT AVG(Handicap)

    FROM Member);

    ```


    如果你慢慢来，可以逐步构建出相当复杂的查询。假设我们想看看是否有任何青少年成员的差点低于成年人的平均水平。内部查询必须返回成年成员的平均差点值，然后我们想选择所有差点低于该值的青少年成员。在下面的
    SQL 语句中，内部和外部查询都有额外的`SELECT`条件（内部只检索成年人，外部只检索青少年）：


    ```sql

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Junior'' AND Handicap < (

    SELECT AVG(Handicap)

    FROM Member

    WHERE MemberType = ''Senior'');

    ```


    ### 返回一组值的内部查询


    这就是我们本章开始的地方。当我们使用`IN`关键字时，SQL 将期望找到一组单值。例如，我们可能要求`Entry`表中成员 ID`IN`一组值的行。在下面的语句中，内部查询选择所有成年成员的
    ID，外部查询返回这些成员的参赛记录：


    ```sql

    SELECT *

    FROM Entry e

    WHERE e.MemberID IN

    (SELECT m.MemberID

    FROM Member m

    WHERE m.MemberType = ''Senior'');

    ```


    此类查询的内部部分必须只返回单个列。`IN`期望一个单值列表（这里是一个`MemberID`列表）。如果内部部分返回多个列（例如，`SELECT * FROM
    Member`），那么我们将得到错误。


    许多像这样的嵌套查询可以用其他方式编写——通常使用本章前面讨论的内连接。有些查询用一种方式感觉更自然，有些则用另一种方式。'
- fmt: '### Inner Queries Checking for Existence


    另一种使用 `EXISTS` 关键字的内部查询。使用 `EXISTS` 的语句仅查看内部查询是否返回了任何行。实际返回的值或行数并不重要。以下查询将返回`Member`表中的行，条件是我们在`Entry`表中能找到该会员对应的行：


    ```sql

    SELECT m.Lastname, m.FirstName

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID);

    ```


    由于内部查询实际检索的值并不重要，因此内部查询通常采用 `SELECT * FROM` 的形式。


    这类查询的另一个特点是内部和外部部分通常是关联的。这意味着内部部分的 `WHERE` 子句引用了外部部分表中的值。在本例中，内部查询检查`Entry`表中的当前行是否与外部查询中当前考虑的会员具有相同的`MemberID`。我发现最直观的理解方式如图[4-5](#A158240_2_En_4_Chapter.html#Fig5)所示。


    很难想象一个有意义的`EXISTS`查询，其内部和外部部分的值不相关联。考虑以下查询将返回什么：


    ```sql

    SELECT m.Lastname, m.FirstName

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e);

    ```


    上面的查询没有任何意义。它的意思是，如果`Entry`表中有一行（任何一行！），就写出每个会员的姓名。如果`Entry`表是空的，我们将不会得到任何返回；否则，我们将得到所有会员的所有姓名。我想不出为什么你会想这样做。`EXISTS`查询在我们需要查找其他地方匹配的值时很有用，这就是为什么`SELECT`条件需要比较来自内部和外部部分的值。


    比较以下两个查询很有趣。它们都返回参加过锦标赛的会员姓名，但结果略有不同。第一个使用`EXISTS`子句：


    ```sql

    SELECT m.Lastname

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID);

    ```


    第二个使用`INNER JOIN`：


    ```sql

    SELECT m.LastName

    FROM Member m INNER JOIN Entry e ON  e.MemberID = m.MemberID;

    ```


    两个查询之间的区别在于返回的行数。


    第一个查询检查`Member`表中的每一行，如果该会员在`Entry`表中至少存在一个条目，则返回其姓氏。任何会员的姓氏只会被写出一次。


    第二个查询在两个表之间形成连接，该连接将由`Member`和`Entry`中具有相同`MemberID`的所有行组合构成。特定会员的姓名将被写出的次数等于他或她参加锦标赛的次数。


    这是一个微妙但重要的区别，特别是当你想要统计返回的行数时。在第二个示例的`SELECT`子句中添加`DISTINCT`将使两个查询的结果相同。


    ## Using Subqueries for Updating


    本书主要介绍用于检索数据的查询，但许多相同的思想可用于更新数据以及添加或删除记录。在第[1](#A158240_2_En_1_Chapter.html)章中，我们研究了简单的查询，例如更新特定会员的电话号码，如下所示：


    ```sql

    UPDATE Member m

    SET m.Phone = ''875076''

    WHERE m.MemberID = 118;

    ```


    我们还研究了在表中插入和删除行。要插入一行，我们列出要提供值的列，然后是这些值，如下所示：


    ```sql

    INSERT INTO Entry (MemberID, TourID, Year)

    VALUES (153, 25, 2016);

    ```


    现在，让我们考虑一种情况：我们想为俱乐部中每位青少年会员添加2016年第25号锦标赛的一个条目。我们希望向`Entry`表添加一组行，如图[4-8](#A158240_2_En_4_Chapter.html#Fig8)所示，其中左列是每位青少年的会员ID，接下来的两列是每个条目的特定锦标赛（25）和年份（2016）。


    ![A158240_2_En_4_Fig8_HTML.jpg](A158240_2_En_4_Fig8_HTML.jpg)


    图 4-8. 要添加到 Entry 表中的行


    我们可以编写一个SQL查询来返回一组类似于图[4-8](#A158240_2_En_4_Chapter.html#Fig8)的行：


    ```sql

    SELECT m.MemberID, 25, 2016

    FROM Member m

    WHERE m.MemberType = ''Junior'';

    ```


    这个查询与我们之前看到的有些不同，因为它的`SELECT`子句中包含常量。它将为每个青少年会员构造一行，包含会员的ID以及两个常量25（代表锦标赛）和2016（代表年份）。


    现在，我们可以将前面的查询作为子查询用于我们的`INSERT`查询。我们可以提供子查询产生的一组值，而不是仅使用`VALUES`关键字提供一个值。在以下查询中，内部`SELECT`将生成图[4-8](#A158240_2_En_4_Chapter.html#Fig8)中所示的行集，而外部`INSERT`会将它们放入`Entry`表中：


    ```sql

    INSERT INTO Entry (MemberID, TourID, Year)

    -- create an entry in tournament 25, 2016 for each Junior

    SELECT MemberID, 25, 2016

    FROM Member

    WHERE MemberType = ''Junior'';

    ```


    使用子查询的同样潜力也适用于其他更新问题。假设，为了找一个例子，在为2016年Kaiapoi社交锦标赛（锦标赛25）输入`Entry`表数据后，你意识到只允许差点20及以上的球员参赛。你可以使用子查询来删除差点小于20的会员的条目：


    ```sql

    DELETE FROM Entry

    WHERE TourID = 25 AND Year = 2016 AND

    MemberID IN

    (SELECT MemberID FROM Member WHERE Handicap < 20);

    ```


    ## Summary


    我们可以在许多情况下将子查询与关键字`IN`和`EXISTS`结合使用。以下是我们在本章中研究过的情况的总结。


    ### Examples of Different Types of Subqueries


    许多嵌套查询可以用替代方式编写。在第[9](#A158240_2_En_9_Chapter.html)章中，我们将研究与表达查询的不同方式相关的性能问题，但通常你在设计查询时应该使用你觉得最自然的方式。以下是一些嵌套查询及其替代表达方式的示例。


    #### A subquery returning a single value


    查找会员Cooper参加的锦标赛：


    ```sql

    SELECT e.TourID, e.Year FROM Entry e WHERE e.MemberID =

    (SELECT m.MemberID FROM Member m

    WHERE m.LastName = ''Cooper'');

    ```


    编写前面查询的另一种方法是使用连接：


    ```sql

    SELECT e.TourID, e.Year

    FROM Entry e INNER JOIN Member m ON e.MemberID = m.MemberID

    WHERE m.LastName = ''Cooper'';

    ```


    #### A subquery returning a set of single values


    查找所有公开赛的条目：


    ```sql

    SELECT *

    FROM Entry e

    WHERE e.TourID IN

    (SELECT t.TourID FROM Tournament t

    WHERE t.TourType = ''Open'');

    ```


    前面的查询可以替换为：


    ```sql

    SELECT e.MemberID, e.TourID, e.Year

    FROM Entry e INNER JOIN Tournament t ON e.TourID = t.TourID

    WHERE t.TourType = ''Open'';

    ```


    #### A subquery checking for existence


    查找参加过任何锦标赛的会员姓名：


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID);

    ```


    这可以替换为：


    ```sql

    SELECT DISTINCT m.LastName, m.FirstName

    FROM Member m INNER JOIN Entry e ON e.MemberID = m.MemberID;

    ```


    ### Examples of Different Uses for Subqueries


    子查询可用于许多情况，包括以下：


    #### Constructing queries with negatives


    查找未参加锦标赛的会员姓名：


    ```sql

    SELECT * FROM Member m

    WHERE NOT EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID);

    ```'
  raw: '### Inner Queries Checking for Existence


    Another type of inner query is the one we saw working with the `EXISTS` keyword.
    A statement using `EXISTS` just looks to see whether any rows at all are returned
    by the inner query. The actual values or numbers of rows returned are not important.
    The query that follows returns any rows from the `Member` table where we can find
    a corresponding row in the `Entry` table for that member:


    ```

    SELECT m.Lastname, m.FirstName

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID);

    ```


    Because the actual values retrieved by the inner query are not important, the
    inner query often has the form `SELECT * FROM`.


    Another feature of this type of query is that the inner and outer sections are
    usually correlated. By this we mean that the `WHERE` clause in the inner section
    refers to values in the table in the outer section. In this case the inner query
    is checking if the current row in the `Entry` table has the same `MemberID` as
    the member currently under consideration in the outer query. I find the easiest
    way to visualize this is as illustrated in Figure [4-5](#A158240_2_En_4_Chapter.html#Fig5).


    It is difficult to think of a sensible `EXISTS` query that doesn’t correlate values
    in the inner and outer sections. Consider what the following query will return:


    ```

    SELECT m.Lastname, m.FirstName

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e);

    ```


    The query above doesn’t really make any sense. It says to write out each member’s
    names if there is a row in the `Entry` table (any row!). If the `Entry` table
    is empty, we will get nothing returned; otherwise, we will get all the names of
    all the members. I can’t think why you’d ever want to do that. `EXISTS` queries
    are useful when we are looking for matching values somewhere else, and that is
    why the `SELECT` condition needs to compare values from both the inner and outer
    sections.


    It is interesting to compare the following two queries. They both return the names
    of members who have entered a tournament, but the results are slightly different.
    The first uses an `EXISTS` clause:


    ```

    SELECT m.Lastname

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID);

    ```


    The second uses an `INNER JOIN`:


    ```

    SELECT m.LastName

    FROM Member m INNER JOIN Entry e ON  e.MemberID = m.MemberID;

    ```


    The difference between the two queries is the number of rows that are returned.


    The first query inspects each row in the `Member` table just once and returns
    the last name if there exists at least one entry for that member in the `Entry`
    table. The last name for any member will be written out only once.


    The second query forms a join between the two tables that will consist of every
    combination of rows in `Member` and `Entry` with the same `MemberID`. The name
    for a particular member will be written out as many times as the number of tournaments
    he or she entered.


    It’s a subtle difference, but an important one `—` especially if you are wanting
    to count the returned rows. Adding `DISTINCT` in the `SELECT` clause of the second
    example will make the results of the two queries the same.


    ## Using Subqueries for Updating


    This book is mainly about queries for retrieving data, but many of the same ideas
    can be used for updating data and adding or deleting records. In Chapter [1](#A158240_2_En_1_Chapter.html)
    we looked at simple queries such as updating the phone number of a particular
    member, as shown here:


    ```

    UPDATE Member m

    SET m.Phone = ''875076''

    WHERE m.MemberID = 118;

    ```


    We also looked at inserting and deleting rows from a table. To insert a row we
    list the columns we are providing values for and then the values, as in the following:


    ```

    INSERT INTO Entry (MemberID, TourID, Year)

    VALUES (153, 25, 2016);

    ```


    Now, let’s consider a situation where we want to add an entry for tournament 25
    in 2016 for each of the juniors in the club. We want to add a set of rows to the
    `Entry` table, as shown in Figure [4-8](#A158240_2_En_4_Chapter.html#Fig8), where
    the left column has the member IDs for each of the juniors and the next two columns
    are the specific tournament (25) and year (2016) for each entry.


    ![A158240_2_En_4_Fig8_HTML.jpg](A158240_2_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    Rows to be added to Entry table


    We can write an SQL query to return a set of rows like those in Figure [4-8](#A158240_2_En_4_Chapter.html#Fig8):


    ```

    SELECT m.MemberID, 25, 2016

    FROM Member m

    WHERE m.MemberType = ''Junior'';

    ```


    This query is a little different from others we have looked at because it has
    constants in the `SELECT` clause. It will construct a row for each junior member
    with the member’s ID and the two constants 25 (for the tournament) and 2016 (for
    the year).


    We can now use the preceding query as a subquery in our `INSERT` query. Rather
    than provide just one value with the `VALUES` keyword, we can provide a set of
    values resulting from the subquery. In the following query, the inner `SELECT`
    will produce the set of rows seen in Figure [4-8](#A158240_2_En_4_Chapter.html#Fig8),
    and the outer `INSERT` will put them in the `Entry` table:


    ```

    INSERT INTO Entry (MemberID, TourID, Year)

    -- create an entry in tournament 25, 2016 for each Junior

    SELECT MemberID, 25, 2016

    FROM Member

    WHERE MemberType = ''Junior'';

    ```


    The same potential for using subqueries applies to other updating issues. Say,
    for the purposes of finding an example, that after entering data in the `Entry`
    table for the 2016 social tournament at Kaiapoi (tournament 25) you realize that
    only players with handicaps of 20 or more were allowed to enter. You could use
    a subquery to delete entries for members with handicaps less than 20:


    ```

    DELETE FROM Entry

    WHERE TourID = 25 AND Year = 2016 AND

    MemberID IN

    (SELECT MemberID FROM Member WHERE Handicap < 20);

    ```


    ## Summary


    We can use subqueries along with the keywords `IN` and `EXISTS` in many situations.
    Here is a summary of the situations we have looked at in this chapter.


    ### Examples of Different Types of Subqueries


    Many nested queries can be written in alternative ways. In Chapter [9](#A158240_2_En_9_Chapter.html),
    we will look at performance issues relating to different ways of expressing queries,
    but in general you should use the way that feels most natural to you when designing
    a query. Here are some examples of nested queries and alternate ways of expressing
    them.


    #### A subquery returning a single value


    Find the tournaments that member Cooper has entered:


    ```

    SELECT e.TourID, e.Year FROM Entry e WHERE e.MemberID =

    (SELECT m.MemberID FROM Member m

    WHERE m.LastName = ''Cooper'');

    ```


    An alternative way to write the preceding query is to use a join:


    ```

    SELECT e.TourID, e.Year

    FROM Entry e INNER JOIN Member m ON e.MemberID = m.MemberID

    WHERE m.LastName = ''Cooper'';

    ```


    #### A subquery returning a set of single values


    Find all the entries for an Open tournament:


    ```

    SELECT *

    FROM Entry e

    WHERE e.TourID IN

    (SELECT t.TourID FROM Tournament t

    WHERE t.TourType = ''Open'');

    ```


    The preceding query can be replaced with:


    ```

    SELECT e.MemberID, e.TourID, e.Year

    FROM Entry e INNER JOIN Tournament t ON e.TourID = t.TourID

    WHERE t.TourType = ''Open'';

    ```


    #### A subquery checking for existence


    Find the names of members that have entered any tournament:


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID);

    ```


    This can be replaced with:


    ```

    SELECT DISTINCT m.LastName, m.FirstName

    FROM Member m INNER JOIN Entry e ON e.MemberID = m.MemberID;

    ```


    ### Examples of Different Uses for Subqueries


    Subqueries can be used in many situations, including the following:


    #### Constructing queries with negatives


    Find the names of members who have not entered a tournament:


    ```

    SELECT * FROM Member m

    WHERE NOT EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID);

    ```'
