- fmt: '## Performing Simple Counts


    As well as retrieving a subset of rows and columns from a table, we can also use
    SQL queries to provide some statistics. There are SQL functions that allow us
    to count records, total or average values, find maximum and minimum values, and
    so on. In this section, we will look at some simple queries for counting records.
    We will return to this topic in Chapter [8](#A158240_2_En_8_Chapter.html).


    We can use the `COUNT` function to return the number of records in the `Member`
    table. In the following query, `*` means count each record:

    ```

    SELECT COUNT(*) FROM Member

    ```


    We can also count a subset of rows by adding a `WHERE` clause to specify those
    rows we want to include. For example, we can use the following query to count
    the number of senior members:

    ```

    SELECT COUNT(*) FROM Member m

    WHERE m.MemberType = ''Senior''

    ```


    Because we have just been talking about nulls and duplicate values, it is worth
    briefly mentioning here how these will affect our counts. Rather than use `*`
    as a parameter to the `COUNT` function so that it counts all the rows, we can
    put an attribute such as `Handicap` in the parentheses. If we do this only those
    rows with a value in the `Handicap` field will be included in the count.

    ```

    SELECT COUNT(Handicap) FROM Member

    ```


    We can also specify that we want to count the number of unique values for an attribute.
    If we want to know how many different values of `MemberType` appear in the `Member`
    table then we can use the following query:

    ```

    SELECT COUNT(DISTINCT MemberType) FROM Member

    ```


    It is worth reiterating that different database software will support different
    parts of the SQL standard syntax. For example, Microsoft Access currently does
    not support `COUNT(DISTINCT MemberType)`, seen in the previous query. There is
    usually a way to work around these differences to find an equivalent query, and
    we will look at how to rephrase the preceding query and other issues related to
    aggregates and summaries in Chapter [8](#A158240_2_En_8_Chapter.html).


    ## Avoiding Common Mistakes


    Retrieving a subset of rows and columns from a single table is the most simple
    of SQL queries. However, you have seen that you still need to be careful. It is
    important to remember that there will be null values in your tables and to think
    carefully about how your selection conditions will treat them. You also need to
    remember that if you do not retain the primary key fields from your tables, there
    is the potential to have duplicate rows, and you must deal with them appropriately.


    There are a couple of other mistakes that are commonly made when selecting a subset
    of rows. They don’t become apparent with a table like `Member`, so I’ll introduce
    some more of the tables in the golf club database. Figure [2-10](#A158240_2_En_2_Chapter.html#Fig10)
    shows part of the `Member` table and two other tables: `Entry` and `Tournament`.
    The first row in the `Entry` table records that person 118 (Melissa McKenzie)
    entered tournament 24 (Leeston) in 2014.


    ![A158240_2_En_2_Fig10_HTML.jpg](A158240_2_En_2_Fig10_HTML.jpg)

    *Figure 2-10. Introducing the Tournament and Entry tables*


    We can use some of the SQL operations we have already seen on the `Entry` table
    to answer questions such as which tournaments (just the `TourID` number) person
    258 has entered, who (just the `MemberID` number) has ever entered tournament
    24, or who entered tournament 36 in 2015. The following is the SQL for the last
    query:

    ```

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID = 36 AND e.Year = 2015

    ```


    ### Incorrectly Using a WHERE Clause to Answer Questions with the Word “both”


    In the previous section we used the logical operator `AND` to find rows in the
    `Entry` table where both `TourID = 36` and `Year = 2015` were true.


    Say we wanted to find the members who have entered both tournaments 36 and 38.
    There is a temptation to again use the `AND` operator and write the query as follows:

    ```

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID = 36 AND e.TourID= 38

    ```


    Can you work out what this query will return? This is where it is helpful to think
    in terms of the row variable `e` investigating each row in table `Entry` as in
    Figure [2-11](#A158240_2_En_2_Chapter.html#Fig11).


    ![A158240_2_En_2_Fig11_HTML.jpg](A158240_2_En_2_Fig11_HTML.jpg)

    *Figure 2-11. The row variable e investigates each row independently.*


    Imagine our finger is pointing at the row shown in the diagram. Does this row
    (415, 36, 2015) satisfy the condition `e.TourID = 36 AND e.TourID= 38`? It satisfies
    the first part, but the `AND` operator requires the row to satisfy both conditions.
    No single row in our table will have both 36 and 38 in the tournament column because
    each row is for just one entry. The SQL query we suggested will never find any
    rows; it will always return an empty table. If we change the Boolean operator
    to `OR`, we will get the row indicated in Figure [2-10](#A158240_2_En_2_Chapter.html#Fig10)
    returned; however, we will also then get anyone who has entered either 36 or 38
    but not necessarily both.


    This particular query cannot be solved with a simple `WHERE` clause. By definition,
    the condition in the `WHERE` applies to each row independently. To answer the
    question about who has entered both competitions, we need to look at more than
    one row of the `Entry` table at the same time (that is, two fingers). If we have
    two fingers, one pointing at the row shown in Figure [2-10](#A158240_2_En_2_Chapter.html#Fig10)
    and another pointing at the following row, then we can deduce that 415 has entered
    both tournaments. We’ll look at how to do this in Chapter [5](#A158240_2_En_5_Chapter.html).


    ### Incorrectly Using a WHERE Clause to Answer Questions with the Word “not”


    Now let’s consider another common error. It is easy to find the people who have
    entered tournament 38 with the condition `e.TourID = 38`. It is tempting to try
    to retrieve the people who have not entered tournament 38 by changing the condition
    slightly. Can you figure out what rows the following SQL query will retrieve?

    ```

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID  38

    ```


    What about the row that the finger is pointing to in Figure [2-11](#A158240_2_En_2_Chapter.html#Fig11)?
    Does this satisfy `e.TourID <> 38`? It certainly does. But this doesn’t mean 415
    hasn’t entered tournament 38 (the following row says he did). The query, in fact,
    returns all the people who have entered some tournament that isn’t tournament
    38 (which is unlikely to be a question you’ll ever want to ask!).


    This is another type of question that can’t be answered with a simple `WHERE`
    clause that looks at independent rows in a table. In fact, we can’t even answer
    this question with a query that involves only the `Entry` table. Member 138, Michael
    Stone, has not entered tournament 38, but he doesn’t even get a mention in the
    `Entry` table because he has never entered any tournaments at all. We’ll see how
    to deal with questions like this in Chapter [7](#A158240_2_En_7_Chapter.html).'
