- fmt: '## Relational Calculus: Specifying the Outcome


    Relational algebra lets us specify a sequence of operations that eventually results
    in a set of tuples with the required information. Rather than specifying how to
    do the query, relational calculus describes what conditions the resulting data
    should satisfy. This section provides a very brief introduction to the notation
    for describing calculus queries without delving into the mathematics.


    ### Simple Calculus Expressions


    In informal language, a relational calculus description of a query has the following
    form:


    > I want the tuples that obey the following conditions....


    More formally we can express the above as:


    ```

    { m | condition(m) }

    ```


    The part on the left of the bar `|` specifies the attributes in the tuples we
    want returned, while the part on the right (often referred to as the predicate)
    describes the criteria they must satisfy. `m` is called a tuple variable and `condition(m)`
    is a function that must be true for each of the tuples `m` returned. Strictly
    speaking, the preceding notation is called tuple calculus. Another equivalent
    notation, which we will not pursue here, is domain calculus.


    The following expression means that each returned tuple `m` must be from the `Member`
    relation and must have ‘Senior’ as the value of the attribute `MemberType`:


    ```

    {m | Member(m) AND m.MemberType = ''Senior''}

    ```


    We can further refine the expression to specify which attributes of the tuple
    `m` should be included in the result:


    ```

    {m.LastName, m.FirstName | Member(m) AND m.MemberType = ''Senior''}

    ```


    Because SQL is based on relational calculus, the equivalent SQL statement is an
    almost direct translation of the calculus expression, as we see here:


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE m.MemberType = ''Senior'';

    ```


    The part on the left of the bar `|` in the calculus expression becomes the `SELECT`
    clause, `Member(m)` becomes the `FROM` clause, and the rest of the expression
    makes up the `WHERE` clause. In SQL the `m` is can be referred to as a table alias,
    but it is useful to think of it as tuple variable as well.


    ### Free and Bound Variables


    The following calculus expression retrieves members’ names and the fee associated
    with their membership type. It is essentially an inner join between the `Member`
    and `Type` relations.


    ```

    {m.LastName, m.FirstName, t.Fee | Member(m) Type(t) AND m.MemberType = t.Type}

    ```


    The tuple variables `m` and `t` are referred to as free variables. The conditions
    on the right of the expression cannot be evaluated until we give `m` and `t` values.
    It is usual to refer to the free variables as ranging over every tuple in their
    respective relations and then evaluating the conditions for each combination to
    see if it should be included in the result. In the body of the book I suggested
    thinking of the variables as being attached to fingers that move through their
    respective relations so we can determine if the condition (in this case `m.MemberType
    = t.Type`) evaluates to true. Free variables denote the tuples being returned
    and should always appear on the left of the bar.


    Suppose we want to find the names of those members who have entered any tournament.
    In order to include a member in the result there has to be a tuple for that member
    in the `Entry` relation. The symbol ∃, meaning “there exists,” is used in the
    following calculus expression to return the names of those members where a tuple
    exists in the `Entry` relation with their `MemberID`:


    ```

    {m.LastName, m.FirstName | Member(m) AND

    ∃(e)(

    Entry(e) AND m.MemberID = e.MemberID

    )

    }

    ```


    I’ve spread the expression out on different lines so that the conditions on the
    variable `e` are clear. The variable `e` is referred to as a bound variable. It
    does not appear on the left of the equation and is only used to determine whether
    the condition on the right side of the expression is true. The free variables
    (which always appear on the left side of the expression) are the ones for which
    we consider every possibility. In the preceding expression our free variable `m`
    is given the value of every tuple in the `Member` relation in turn. For each value
    of `m` we use the bound variable `e` to help determine if there is an appropriate
    tuple in the `Entry` relation.


    Bound variables need to have what is called a quantifier, which explains how the
    variable will be used in calculating the condition statement. In this case we
    use the existential quantifier (∃), which requires us to find a single tuple in
    the associated relation that satisfies the condition. There is also a universal
    quantifier (∀) that requires every tuple in the associated relation to satisfy
    the condition. We will now look at examples of using these quantifiers and the
    equivalent SQL statements.


    ### Existential Quantifier and SQL


    An expression such as `∃(e)(Entry(e) AND (condition(e))` is true, if we can find
    a tuple `e` in the relation `Entry` that satisfies the specified condition. Let’s
    look at how this query can be represented in SQL:


    ```

    {m.LastName, m.FirstName | Member(m) AND

    ∃(e)(

    Entry(e) AND e.MemberID = m.MemberID

    )

    }

    ```


    First, we’ll consider an SQL expression that follows the calculus as closely as
    possible by using an `EXISTS` clause:


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE EXISTS (

    Select * FROM Entry e WHERE e.MemberID = m.MemberID

    );

    ```


    As you can see, the SQL is almost a direct translation of the calculus statement.
    Equivalently, we can represent the existence requirement with a nested query and
    `IN` clause:


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE m.MemberID IN (

    SELECT MemberID FROM Entry e

    );

    ```


    Each of preceding SQL statements returns the correct result, but I’m sure you
    are thinking that they are a complicated way of getting there. The query to find
    members who have entered a tournament can be more simply expressed as a join between
    the two relations:


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m, Entry e

    WHERE e.MemberID = m.MemberID;

    ```


    The preceding SQL statement is not strictly equivalent to the first two. The latter
    one will return duplicate names, one for each of the tournaments the member has
    entered. If we look at the first two SQL queries, we see that they are checking
    each tuple in the `Member` table (just the once) and looking for a corresponding
    tuple in the `Entry` table. The final query considers all combinations of the
    tuples in `Member` and `Entry` and returns any that satisfy the condition (thereby
    returning the duplicates).


    Even though we can remove the duplicates from the final SQL query by adding a
    `DISTINCT` keyword, it is considering a different set of tuples for inclusion
    in the result, and so is responding to a subtly different question than are the
    two earlier SQL statements. The relational calculus query is very precise, and
    it is that precision that can be helpful in some situations.


    To find members who have not entered a tournament we simply replace ∃ with `NOT`
    ∃ (or ∄) in the query to find members who have entered a tournament:


    ```

    {m.LastName, m.FirstName | Member(m) AND

    NOT ∃(e)(

    Entry(e) AND m.MemberID = e.MemberID

    )

    }

    ```


    The equivalent SQL statement simply requires the addition of the keyword `NOT`,
    as in the example here:


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE NOT EXISTS (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID

    );

    ```'
