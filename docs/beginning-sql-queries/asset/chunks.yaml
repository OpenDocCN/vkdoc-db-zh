- fmt: '## No Idea Where to Start?


    Now let’s look at the case where we have a good understanding of the intention
    of the natural language query and have an idea of which tables are involved. We’ve
    checked for some key words, but still feel confused. Now what? This is not uncommon
    (it happens to me regularly), so just relax.


    When I have no idea where to start, I forget all about set operations and SQL.
    I stop thinking about tables, foreign keys, joins, and so on. Instead, I open
    the tables I think will be needed to answer the question and look at some of the
    data. I try to find examples that should be retrieved by the query. Then I try
    to write down the conditions that make that particular data acceptable.


    This is the outcome approach describing what conditions the rows returned by the
    query should obey. It is a great way to proceed if you are having trouble deciding
    on the operations that could be involved in manipulating the tables (the process
    approach).


    Let’s try a query that stumped me a bit when I first thought of it: “Which teams
    have a coach as their manager?” The steps described here can really help.


    ### Find Some Helpful Tables


    Let’s look at the key words in the query “Which teams have a coach as a manager?”
    We have the nouns “team,” “coach,” and “manager.” We have a table called `Team`,
    and `Coach` and `Manager` are fields in the `Member` and `Team` tables, respectively.
    So the `Team` and `Member` tables look like a good place to start.


    ### Try to Answer the Question by Hand


    Next, take a look at the data in the tables and see how you would decide if a
    team had a coach as a manager. Figure [11-12](#A158240_2_En_11_Chapter.html#Fig12)
    shows some relevant columns of the two tables. Can you find a team that satisfies
    the condition?


    ![A158240_2_En_11_Fig12_HTML.jpg](A158240_2_En_11_Fig12_HTML.jpg)


    Figure 11-12.


    How do we tell if a team has a coach as a manager?


    We can find the IDs of the two team managers easily enough. They are the values
    in the `Manager` column of the `Team` table (239 and 153). Now, how do we check
    if these members are coaches? Looking at the `Member` table, we see that the coaches
    are in the `Coach` column. We need to check if either of our two managers appears
    in the `Coach` column. Member 153 does appear in the `Coach` column, so (TeamB)
    is managed by a coach.


    ### Write Down a Description of the Retrieved Result


    Figure [11-12](#A158240_2_En_11_Chapter.html#Fig12) illustrates how we determined
    that TeamB has a coach as its manager. We now need to write a description of the
    logic that leads to that conclusion. This is where I like to use my fingers to
    point to the relevant rows to make it easier to describe the query, as in Figure
    [11-13](#A158240_2_En_11_Chapter.html#Fig13).


    ![A158240_2_En_11_Fig13_HTML.jpg](A158240_2_En_11_Fig13_HTML.jpg)


    Figure 11-13.


    Naming the rows to help describe the required data


    We are going to check every team to decide if it should be retrieved. In Figure
    [11-13](#A158240_2_En_11_Chapter.html#Fig13) this is represented by the finger
    labeled `t`, which will visit each row in turn. We can describe whether the current
    row meets the criteria as follows:


    > I’ll write out the `TeamName` from row `t` in the `Team` table, if there exists
    a row `m` in the Member table where the value of coach `m.Coach` is the same as
    the manager of the team `t.Manager`.


    We can now translate this almost directly into SQL using a nested query (discussed
    in Chapter [4](#A158240_2_En_4_Chapter.html)). One possible query would be:


    ```sql

    SELECT t.TeamName FROM Team t

    WHERE EXISTS

    (SELECT * FROM Member m WHERE m.Coach = t.Manager);

    ```


    ### Are There Alternatives?


    First attempts at queries aren’t necessarily the most elegant. After all, we are
    following this route because we were stumped in the first place. This may not
    be a problem for the execution of the query, as the optimizer will likely find
    an efficient process. However, an inelegant SQL statement might be difficult for
    you and others to understand at a later time. Following the technique of solving
    the query by hand and describing the conditions often helps you understand what
    you are trying to do. That often makes the query seem much easier than you first
    thought.


    Having made a first attempt at the query described in the previous section, we
    might realize that we could have thought of it this way: “The manager just has
    to be in the set of coaches.” We can easily find the IDs of coaches with the query:


    ```sql

    SELECT m.Coach FROM Member m;

    ```


    We can then use that in a nested query, as shown here:


    ```sql

    SELECT t.TeamName FROM Team t

    WHERE t.Manager IN

    (SELECT m.Coach FROM Member m);

    ```


    For me, the preceding query is simpler and easier to understand than the earlier
    one even though they have equivalent results.


    We could have phrased the condition illustrated in Figure [11-13](#A158240_2_En_11_Chapter.html#Fig13)
    like this:


    > If I have rows `t` in the `Team` table and `m` in the Member table then I’ll
    write out the `TeamName` from row `t` in the `Team` table, if `t.Manager = m.Coach`


    Here is the preceding sentence translated into SQL:


    ```sql

    SELECT t.TeamName FROM Team t, Member m

    WHERE t.Manager = m.Coach;

    ```


    The preceding query can be restated as a join:


    ```sql

    SELECT t.TeamName

    FROM Team t INNER JOIN Member m ON t.Manager = m.Coach;

    ```


    Personally, I don’t find the join particularly intuitive for this query. I doubt
    if someone else looking at the query would quickly understand its purpose.


    Given there are several options for phrasing this query, it can be useful to check
    their relative efficiencies (as discussed in Chapter [10](#A158240_2_En_10_Chapter.html))
    if you think that might be important (unlikely in this case). If we add a `DISTINCT`
    phrase in the `SELECT` clause for the join queries then all four alternatives
    will produce the same result. For SQL Server 2012, each of the queries had the
    same execution plan, so they were all carried out in exactly the same way under
    the hood.


    ## Checking Queries


    We’ve written a query, run it, and retrieved some results. Is all well and good?
    Not necessarily. Just as first attempts at a query may not be elegant, neither
    may they be correct. Mistakes might arise from simple errors in the query syntax.
    These are usually easy to spot and correct. However, errors that result from subtle
    misunderstandings of the question or of the data can be more difficult to find.


    I can’t offer a foolproof way of checking that your query is correct, but I can
    give you some ideas for catching potential errors. Basically, they boil down to
    checking that you do not have extra, incorrect rows in your result and checking
    that you aren’t missing any rows. In this section, we will look at ways to spot
    that your query might have a problem. In the next chapter, we will look at some
    of the common mistakes that might be behind the errors.


    ### Check a Row That Should Be Returned


    It is a good idea to have a rough idea of how many rows should be returned by
    your query: none, one, a few, or lots. If you get a surprising number then that
    can be a clue that something could be wrong. Next, take a look at your data and
    determine one record or row that should be returned by the query. In our example
    about teams with managers as coaches, we can check through the tables and find
    a team that satisfies the query. In Figure [11-13](#A158240_2_En_11_Chapter.html#Fig13),
    we see that TeamB satisfies the conditions, so check that this team is in the
    output.


    Remember that some queries may quite legitimately have no output. For example,
    it’s perfectly reasonable that, with the data we have at any particular time,
    no teams are managed by a coach. However, your query must work in all situations.
    If it is at all possible, make a copy of the tables, alter the data so that a
    row meets the condition, and check that it is returned correctly.'
