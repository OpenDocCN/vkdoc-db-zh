    # 1. 示例数据库


    本书中的大多数示例都使用高尔夫球俱乐部数据库。请访问本书在 Apress 网站上的目录页面，在“源代码/下载”选项卡下，您将找到此数据库的 Access 版本以及用于创建和填充表的
    SQL 脚本。图 A1-1 展示了数据库中各表之间的关系，图 A1-2 展示了表中的数据。


    ![A158240_2_En_13_Fig2_HTML.jpg](img/A158240_2_En_13_Fig2_HTML.jpg)


    图 A-2. 高尔夫球俱乐部数据库的表和数据


    ![A158240_2_En_13_Fig1_HTML.jpg](img/A158240_2_En_13_Fig1_HTML.jpg)


    图 A-1. 高尔夫球俱乐部数据库的数据模型


    # 2. 关系表示法


    关系数据库理论基于集合论。¹ 当我们查询数据库时，本质上是提出一个问题，以检索包含我们所需信息的子集。检索数据子集有两种方法。关系代数描述了对数据执行的操作（在本书正文中，我们称之为过程方法）。关系演算描述了检索数据必须满足的条件（我们称之为结果方法）。在本附录中，我们将介绍使用关系代数和关系演算来形式化表达查询的表示法。这将使您能够从不同的角度思考查询。如果您对跟进相关的形式数学感兴趣，可以查阅更多理论出版物。²
    这里没有提出任何先前未讨论过的新概念——只是表示法不同。更形式化的表示法允许非常简洁地表达查询，并且在处理复杂情况时，其背后的数学基础会非常有用。示例将使用附录
    1 中描述的数据库。


    ## 引言


    作为将数据视为集合如何能帮助我们的一个例子，让我们考虑一个包含地球上所有人信息的集合。我们可以定义一个包含所有男性的子集，另一个包含所有高尔夫球手的子集，另一个包含
    40 岁以上人群的子集，以及另一个包含意大利人的子集。这些集合可以相互重叠，如图 A2-1 中的示意图所示。这种类型的图表称为文氏图。


    ![A158240_2_En_14_Fig1_HTML.jpg](img/A158240_2_En_14_Fig1_HTML.jpg)


    图 A-2-1. 显示人群子集的文氏图


    图 A2-1 帮助我们形象化满足特定条件的集合，例如 40 岁以上打高尔夫球的意大利男性（所有圆圈重叠的区域），或者不打高尔夫球的人（大矩形内除高尔夫球手圆圈外的任何地方）。这两个区域很容易描述；然而，定义我们所需的子集并不总是那么简单。找出包含
    40 岁及以下的意大利高尔夫球手的区域需要多花点功夫，如果没有图表的帮助也很难描述。


    只有当您能在需要时准确提取适当的数据子集时，数据库才是有用的。随着标准变得越来越复杂以及表格数量的增加，要记住所有内容并正确描述您试图查找的内容可能会变得困难。正是在这些更复杂的情况下，拥有更正式和简洁的表示法会非常有帮助。


    ### 关系、元组和属性


    通常将数据库视为多个表。一个表（例如 `Person`）将包含若干列。表中的每一行代表一个个体，该个体的相应值出现在每一列中。更正式地说，数据库被称为一组关系，每个关系是一组元组。元组是一组属性值；例如，{Ali，
    Brown， 2/8/1967}。


    一个关系由一个标题和一个主体组成。标题是对关系中包含数据的描述。该描述的一部分是一组属性名；例如，{`FirstName`, `LastName`, `Date_of_Birth`}。此外，每个属性都有一个域，或一组允许的值。例如，`Date_of_Birth`
    必须是一个有效的日期。域可以是原始类型（例如，整数、字符串）或用户定义的类型（例如，`WeekDays` = {Mon， Tue， Wed， Thu， Fri，
    Sat， Sun}）。数据库模式是所有关系的标题加上已定义的任何约束的集合。


    关系的主体包含数据值。它由包含每个属性值的元组组成。


    表 A2-1 展示了描述数据库的两种方式的类比术语。


    表 A-2-1. 对比术语


    | 关系术语 | 数据库术语 |

    | --- | --- |

    | 关系（一组关系） | 数据库 |

    | 关系（一组元组） | 表 |

    | 元组（一组属性值） | 行 |

    | 属性名 | 列名 |

    | 域 | 列数据类型（原始或用户定义） |


    （无键）表与关系或元组集合之间的主要区别在于，元组没有顺序，并且每个元组必须是唯一的。


    图 A2-2 展示了我们如何将关系可视化为一组元组。


    ![A158240_2_En_14_Fig2_HTML.jpg](img/A158240_2_En_14_Fig2_HTML.jpg)


    图 A-2-2. 关系是一组元组。


    在文氏图中表示集合的传统方式，如图 A2-1，强化了集合中元素没有顺序的概念。没有第一个、下一个或上一个元素。表的常规格式可能暗示行具有某种内在顺序。因此，当您查询数据库时，理论上返回的元组没有保证的顺序，除非您在查询中指定顺序。实际上，一个简单的查询每次重复时很可能以相同的顺序返回行，因为在底层执行的是相同的操作。然而，对于大表，随着元组数量的变化，操作的数量和顺序可能会改变以提高效率，或者可能首先访问先前缓存的数据。这些都可能影响返回元组的顺序。


    如第 1 章所述，关系中元组的唯一性对于能够正确识别数据至关重要。如果在图 A2-2 的关系中，我们发现还有另一个名叫 John Smith，出生于 2/6/1988
    的人，我们就会遇到麻烦，因为我们将无法区分这两个人的元组。我们需要存储足够的关于人员的信息以便能够区分他们。主键的概念（一组对每个元组都必须唯一的属性）确保了唯一性。


    一旦我们将数据视为元组的集合，那么集合操作的所有强大功能就都掌握在我们手中了。

