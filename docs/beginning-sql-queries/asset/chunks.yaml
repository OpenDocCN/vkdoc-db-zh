    ```


    You might find it instructive to compare this latest query and output with the
    query involving a single join between the `Member` and `Team` tables shown in
    Figures [6-8](#A158240_2_En_6_Chapter.html#Fig8) and [6-9](#A158240_2_En_6_Chapter.html#Fig9).


    We are now in position to generate a variety of reports about teams and their
    members. Figure [6-11](#A158240_2_En_6_Chapter.html#Fig11) shows a report based
    on the preceding query and its output, shown in Figure [6-10](#A158240_2_En_6_Chapter.html#Fig10).


    ![A158240_2_En_6_Fig11_HTML.jpg](A158240_2_En_6_Fig11_HTML.jpg)


    Figure 6-11.


    A report based on the query shown in Figure [6-10](#A158240_2_En_6_Chapter.html#Fig10)


    The report has been grouped by team, with the team and manager information (from
    the `Team` table and `m2` copy of the `Member` table) in a group header. The members
    of the team (from the first copy `m` of the `Member` table) are in the detail
    part of the report.


    ### Outcome Approach


    We will now look at an alternative way to construct a query to retrieve all the
    information about a team (members’ names, team name, and manager’s name) for a
    report like the one in Figure [6-11](#A158240_2_En_6_Chapter.html#Fig11). I find
    the idea of two joins quite intuitive, but other people prefer a different approach.


    I have reproduced the two tables in Figure [6-12](#A158240_2_En_6_Chapter.html#Fig12).
    Now, without thinking about joins, let’s see how we can pick a member and find
    out what team he or she is on and who the manager is for that team.


    ![A158240_2_En_6_Fig12_HTML.jpg](A158240_2_En_6_Fig12_HTML.jpg)


    Figure 6-12.


    Finding a team member (William Cooper), his team’s name, and the name of the team’s
    manager


    Without needing to think about joins, we can find the information we require.
    We need information from three rows. Let’s look at one specific case. One row
    (`m`) from the `Member` table will give us the name of a member (William Cooper
    in Figure [6-12](#A158240_2_En_6_Chapter.html#Fig12)). We need to find the row
    (`t`) in the `Team` table for his team (`m.Team = t.TeamName`). Then we need another
    row in the `Member` table (`m2`) for the manager of the team (`t.Manager = m2.MemberID`).


    With help from Figure [6-12](#A158240_2_En_6_Chapter.html#Fig12) we can construct
    the following SQL:


    ```

    SELECT m.LastName, m.FirstName, m.Team, m2.LastName, m2.FirstName

    FROM Member m, Team t, Member m2

    WHERE m.Team = t.TeamName AND t.Manager = m2.MemberID

    ```


    We could replace `m.Team` with `t.TeamName` in the `SELECT` clause of the preceding
    query if we wish.


    The preceding query is equivalent to the query with the two joins. The `FROM`
    clause is the Cartesian product of the three tables. The `WHERE` clause provides
    the join condition for the join between `Member` (`m`) and `Team` (`t`) on `m.Team
    = t.TeamName` and the join condition for the join between `Team` and another copy
    of `Member` (`m2`) on `t.Manager = m2.MemberID`.'
  trans: '### 过程方法


    图 6-6 所示连接所提供的信息并非特别有用。我们有了经理的 ID，但如果能同时显示他们的名字会更有用。我们需要另一个连接。首先，我们来看看如果在查询设计界面上同时添加
    `Member` 和 `Team` 表，Access 默认会怎么做。这如图 6-8 所示。


    ![A158240_2_En_6_Fig8_HTML.jpg](img/A158240_2_En_6_Fig8_HTML.jpg)

    图 6-8. 将 `Member` 和 `Team` 表添加到图示查询界面时 Access 中的默认连接。


    查看图 6-8 查询的 SQL，会发现它这样连接表：

    ```sql

    SELECT *

    FROM Member m  INNER JOIN Team t

    ON t.TeamName = m.Team AND m.MemberID = t.Manager;

    ```

    你能弄清楚这个查询在回答什么问题吗？输出结果如图 6-9 所示。


    ![A158240_2_En_6_Fig9_HTML.jpg](img/A158240_2_En_6_Fig9_HTML.jpg)

    图 6-9. 图 6-8 中默认 Access 连接的输出。


    要理解上述连接发生了什么，考虑 `Member` 和 `Team` 的**笛卡尔积**是很有用的。笛卡尔积给出了两个表中每一行的所有组合。连接条件规定只显示
    `MemberID` 与 `Manager` 相同，并且 `Team` 与 `TeamName` 也相同的行。用日常语言来说，这相当于“向我显示那些管理他们所在团队的成员”。对于我们的数据，这只是我们在图
    6-9 中看到的布伦达·诺兰的那一行。


    那么，我们如何构造一个查询来显示成员姓名、他们所在的团队以及团队经理的姓名呢？接下来的查询将提供关于成员、其团队以及经理 ID (`t.Manager`)的信息；但是，它不提供经理的姓名：

    ```sql

    SELECT m.MemberID, m.LastName, m.FirstName, t.TeamName, t.Manager

    FROM Member m INNER JOIN Team t ON m.Team = t.TeamName;

    ```

    我们需要做的是，获取上述连接的结果，再将其与 `Member` 表的第二个副本 (`m2`) 连接起来，以检索经理的姓名。我们希望的连接条件是 `t.Manager
    = m2.MemberID`，这样就能得到经理的姓名。图 6-10 展示了这两个连接的图示表示和输出。


    ![A158240_2_En_6_Fig10_HTML.jpg](img/A158240_2_En_6_Fig10_HTML.jpg)

    图 6-10. 使用两个连接和 `Member` 表的两个副本来包含团队经理的姓名。


    第一个连接从 `Member` 表的第一个副本给我们成员信息，以及该成员在 `Team` 表中的信息；第二个连接从 `Member` 表的第二个副本给我们团队经理的姓名。这两个连接的
    SQL 是：

    ```sql

    SELECT *

    FROM (Member m INNER JOIN Team t ON m.Team = t.TeamName)

    INNER JOIN Member m2 ON t.Manager = m2.MemberID;

    ```

    将这个最新的查询和输出与图 6-8 和 6-9 中涉及 `Member` 和 `Team` 表之间单个连接的查询进行比较，你可能会发现这*很有指导意义*。


    我们现在能够生成关于团队及其成员的各种报告。图 6-11 显示了一份基于前述查询及其输出的报告，该输出如图 6-10 所示。


    ![A158240_2_En_6_Fig11_HTML.jpg](img/A158240_2_En_6_Fig11_HTML.jpg)

    图 6-11. 基于图 6-10 所示查询的报告。


    报告已按团队分组，团队和经理信息（来自 `Team` 表和 `Member` 表的 `m2` 副本）位于组页眉。团队的成员（来自 `Member` 表的第一个副本
    `m`）位于报告的细节部分。


    ### 结果方法


    我们现在将研究另一种构建查询的方法，以检索关于一个团队的所有信息（成员姓名、团队名称和经理姓名），用于类似图 6-11 的报告。我觉得两个连接的想法相当直观，但其他人可能更喜欢不同的方法。


    我在图 6-12 中复制了这两个表。现在，不考虑连接，让我们看看如何选取一个成员并找出他或她所在的团队以及该团队的经理是谁。


    ![A158240_2_En_6_Fig12_HTML.jpg](img/A158240_2_En_6_Fig12_HTML.jpg)

    图 6-12. 找到一个团队成员（威廉·库珀）、他团队的名称以及团队经理的姓名。


    无需考虑连接，我们就能找到所需的信息。我们需要来自三行的信息。让我们看一个具体案例。`Member` 表中的一行 (`m`) 将给我们一个成员的姓名（图 6-12
    中的威廉·库珀）。我们需要找到 `Team` 表中他团队对应的那一行 (`t`) (`m.Team = t.TeamName`)。然后我们需要 `Member`
    表中代表团队经理的另一行 (`m2`) (`t.Manager = m2.MemberID`)。


    在图 6-12 的帮助下，我们可以构建以下 SQL：

    ```sql

    SELECT m.LastName, m.FirstName, m.Team, m2.LastName, m2.FirstName

    FROM Member m, Team t, Member m2

    WHERE m.Team = t.TeamName AND t.Manager = m2.MemberID

    ```

    如果我们愿意，可以在上述查询的 `SELECT` 子句中用 `t.TeamName` 替换 `m.Team`。


    前面的查询等同于带有两个连接的查询。`FROM` 子句是三个表的笛卡尔积。`WHERE` 子句提供了 `Member` (`m`) 和 `Team` (`t`)
    之间基于 `m.Team = t.TeamName` 的连接条件，以及 `Team` 和另一个 `Member` 副本 (`m2`) 之间基于 `t.Manager
    = m2.MemberID` 的连接条件。'
- fmt: '# Business Rules


    The data model from Figure 6-4 is redisplayed below as Figure 6-13.


    ![A158240_2_En_6_Fig13_HTML.jpg](A158240_2_En_6_Fig13_HTML.jpg)


    Figure 6-13. Two relationships between the `Member` and `Team` classes.


    Members can belong to teams, and members can manage teams. When we implement these
    relationships with foreign keys, the constraints that are placed on the data are
    quite simple. A member can only be on a team that exists in the `Team` table,
    and a team can be managed only by someone in the `Member` table.


    Other constraints are likely to apply in various situations. For example, we might
    have the additional constraints that a team can have no more than four members
    or that the manager must be a member of the team (or not). These types of constraints
    are commonly referred to as business rules. The data model in Figure 6-13 might
    underpin a database for two different golf clubs. While the basic integrity rules
    will apply for both clubs (e.g., a member cannot be on a team that doesn’t exist),
    each club might have different rules about sizes of teams and who can manage them.
    The foreign key constraints are not sufficient to enforce such business rules.


    Relational database products will usually provide some way to enforce business
    rules. Large systems such as SQL Server and Oracle provide triggers. Triggers
    are actions that take place when a specified event occurs (for example, when inserting
    or updating a record). The trigger will reject any changes that do not obey the
    rules. In Access and other products, it is not possible to apply such constraints
    to the tables themselves. However, you can attach macros to input forms. These
    macros will check the data on the form before it is committed to the database.
    The issue with this approach is that there is no such checking if a user bypasses
    the form and enters data directly into a table with (for example) an `SQL` update
    command.


    We won’t look in detail at how business rules are implemented in different products,
    but we will look at how queries can help find any instances where the constraints
    are not satisfied. Although this is finding the problem after it has occurred,
    variations of these queries would form a basis for any trigger or macro that you
    would need to write to enforce the constraints.


    Let’s look at finding teams whose managers are not members of the team. My mind
    often goes blank when faced with a query like this, and in that case, I always
    take an outcome approach. This means picturing the tables involved and imagining
    the type of instance I am seeking. Have a look at Figure 6-14.


    ![A158240_2_En_6_Fig14_HTML.jpg](A158240_2_En_6_Fig14_HTML.jpg)


    Figure 6-14. Finding teams whose managers are not members of the team.


    In Figure 6-14, we see in the `Team` table that `TeamA`’s manager is `239`, and
    we can see in the `Member` table that member `239` is not a member of any team.
    If we had a constraint that managers must belong to the team, `TeamA` would not
    obey it.


    To find all teams like this, we would say:


    > Find the team names from all the rows (`t`) in the `Team` table where the matching
    row (`m`) in the `Member` table for the team manager (i.e., `t.Manager = m.MemberID`)
    has a team (`m.Team`) that is either empty or different from the team in the `Team`
    table (`m.Team <> t.TeamName`).


    The equivalent `SQL` is shown here:


    ```sql

    SELECT t.teamname

    FROM Member m, Team t

    WHERE m.MemberID = t.Manager

    AND (m.Team <> t.Teamname OR m.Team IS NULL)

    ```


    The middle two lines are equivalent to a join between the two tables on `m.MemberID
    = t.Manager`, and the final line finds those managers who are on a different team
    or not on a team at all. The following query will produce an equivalent output
    but uses the inner join notation:


    ```sql

    SELECT t.teamname

    FROM Member m INNER JOIN Team t ON m.MemberID = t.Manager

    WHERE m.Team <> t.Teamname OR m.Team IS NULL

    ```


    Just a note about why we have included the `IS NULL` condition in the two queries:
    You might remember from Chapter 2 that if we make a comparison with a `NULL` value,
    the result is neither true nor false. If we want to find managers who aren’t in
    a team, we need to specifically include that possibility in our query. Had the
    requirement been just that a manager must not belong to a different team, we could
    have left out the checking of `NULL` values, because a manager with no team would
    have been OK. As always, clearly understanding what you are actually trying to
    find is the most important part of specifying a query.


    The two preceding queries will find teams with incorrect managers, but only after
    they have been added to the database. How do we prevent them from being added
    in the first place? The solution depends on the database implementation. Before
    changes to data are finally committed to a database, they are usually recorded
    in a buffer of some sort. For example, in SQL Server, the records being updated
    or added are kept in a temporary table called `inserted`. If we add or update
    some records to the `Team` table, a temporary table (`inserted`) that has the
    same structure as the `Team` table is created to hold the new or updated records
    temporarily. We want to perform a query to check if any new records about to be
    added to the `Team` table have managers that don’t obey the constraint. However,
    instead of looking at the `Team` table, we want to look at the records in the
    temporary `inserted` table and count how many of those are invalid.


    The following `SQL` query, which is very similar to the previous two queries,
    will count how many of the rows in the `inserted` buffer for the `Team` table
    have managers that do not obey the business rule about managers belonging to the
    team they manage:


    ```sql

    SELECT COUNT(*)

    FROM Member m INNER JOIN inserted i ON m.MemberID = i.Manager

    WHERE m.Team <> i.Teamname OR m.Team IS NULL

    ```


    If this count is not zero then there are rows that are about to be inserted that
    do not obey the rules. In that case we want to rollback the insertion so the rows
    do not get committed to the `Team` table. The following `SQL` statement would
    be included in a trigger in `SQL Server`. The trigger would need to be assigned
    to run on updating or inserting rows in the `Team` table.


    ```sql

    IF

    (SELECT COUNT(*)

    FROM Member m INNER JOIN inserted i ON m.MemberID = i.Manager

    WHERE m.Team <> i.Teamname OR m.Team IS NULL) <> 0)

    BEGIN

    Rollback Tran

    END

    ```


    This is a bit of a crude approach, because if any of the new records are incorrect,
    the whole lot gets rejected. You will need to consult the documentation for your
    database product to see how to develop triggers that work efficiently, but the
    idea of using a query to check the validity of new records is a common one.


    In Access, the checking is done at the interface level, usually on a form. Instead
    of checking the `inserted` table as in the previous query, we would create a macro
    with a similar query to investigate the values of fields on the form before committing
    them to the database.'
