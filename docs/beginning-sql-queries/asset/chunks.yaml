  trans: '### 创建自连接


    回顾第 3 章中对两个表之间连接的定义：笛卡尔积（两个表中每一行的所有组合）后接对满足某些连接条件的行子集的选取。对于自连接，我们考虑同一个表的两个副本。在图
    5-4 中，我们看到了`Member`表两个副本之间笛卡尔积的一部分。为了区分乘积中的不同元素，我为第一个副本起了别名`m`，为第二个副本起了另一个别名`c`（稍后你会明白原因）。在图
    5-4 中可见的笛卡尔积的一小部分里，我们看到副本`m`的第一行（Melissa）与副本`c`的每一行进行了配对。一些列标题被截断了，因为表格变得相当宽。


    ![A158240_2_En_5_Fig4_HTML.jpg](img/A158240_2_En_5_Fig4_HTML.jpg)

    图 5-4. 两个 Member 表副本之间的笛卡尔积


    对于关于教练关系的查询，笛卡尔积中令人感兴趣的行是那些来自`m`的`Coach`值与来自`c`的`MemberID`值相同的行。在图 5-4 中，你可以看到第三行包含了关于
    Melissa（来自`Member`表的`m`副本）的信息，以及关于她的教练（来自`Member`表的`c`副本）的信息。现在别名的选择变得清晰了：`m`代表与成员相关的列；`c`代表与该成员教练相关的列。选择有用的别名可以使理解自连接变得容易得多。我们希望从笛卡尔积中选取的行是满足`m.Coach
    = c.MemberID`的行。这是查找成员及其教练信息所需的连接条件。自连接的 SQL 如下：


    ```sql

    SELECT *

    FROM Member m INNER JOIN Member c ON m.Coach = c.MemberID;

    ```


    自连接生成的结果表如图 5-5 所示。


    ![A158240_2_En_5_Fig5_HTML.jpg](img/A158240_2_En_5_Fig5_HTML.jpg)

    图 5-5. 在 Member 表上执行自连接以检索成员及其教练的信息


    现在我们有了自连接的结果，就可以回答上一节中提出的关于教练关系的问题了。其中最棘手的部分是认识到维护成员和教练的信息是一种自关系，并且从一开始就恰当地设计了`Member`表。


    ### 涉及自连接的查询


    以图 5-5 中的连接表为基础，我们可以通过简单地选取行子集并投影适当的列来回答各种问题。每当我需要执行涉及自连接的查询时，我通常会先进行连接，保留图 5-5
    中的所有行和列。有了连接表（或列的快速草图）在面前，接下来的步骤通常相对简单。让我们通过几个问题来看看这是如何工作的。


    #### 教练的名字是什么？


    观察图 5-5，我们可以看到教练的名字位于来自连接中`c`部分的列中。我们只需要`c.LastName`和`c.FirstName`列中的名字列表，因此这些列可以包含在`SELECT`子句中。我们不希望名字重复，所以使用关键字`DISTINCT`。下面的
    SQL 语句将返回两位教练的名字，Brenda Nolan 和 William Cooper。


    ```sql

    SELECT DISTINCT c.FirstName, c.LastName

    FROM Member m INNER JOIN Member c ON m.Coach = c.MemberID;

    ```


    #### 谁正在由一个差点杆数更高的人教练？


    要找出谁正在由差点杆数更高的人教练，我们需要比较成员的差点杆数（`m.Handicap`）与其教练的差点杆数（`c.Handicap`）。需要在连接子句后添加一个`WHERE`子句，以查找成员的差点杆数小于教练的差点杆数的情况：


    ```sql

    SELECT *

    FROM Member m INNER JOIN Member c ON m.Coach = c.MemberID

    WHERE m.Handicap < c.Handicap;

    ```


    对于图 5-5 中的数据，这将检索最后四行中的数据。（要成为一名好教练，你不一定要是一个很棒的高尔夫球手！）在完成连接并选择了适当的行之后，我们就可以选择希望在最终结果中出现的列，并将它们列在`SELECT`子句中。


    #### 列出所有成员的名字及其教练的名字


    列出成员及其教练的名字听起来很简单，但如果我们不小心，可能会出错。第一个想法可能是仅从图 5-5 的连接表中投影包含成员和教练名字的四列。然而，连接表中只有
    10 行，而`Member`表中有 20 个成员。这里的问题是并非所有成员都有教练。我们在第 3 章关于外连接的部分讨论过类似的情况。


    回顾一下，让我们回到`Member`表两个副本的笛卡尔积，但看看涉及一个没有教练的成员的一些行，如图 5-6 所示。


    ![A158240_2_En_5_Fig6_HTML.jpg](img/A158240_2_En_5_Fig6_HTML.jpg)

    图 5-6. 两个 Member 表副本之间笛卡尔积的一部分


    对于`Coach`列中为 null 的成员，连接条件（`m.Coach = c.MemberID`）永远不会满足，因此所有这些成员都将从我们的连接表中缺失。我们只需要小心地理解我们真正想要的是什么。我们是想要所有有教练的成员列表（10
    行），还是想要所有成员连同其教练姓名（如果有）的列表（20 行）？如果是后者，我们需要一个外连接。我们需要看到每个成员的名字（来自`Member`表的`m`副本），以及他的教练的名字（如果有）（来自`Member`表的`c`副本）。这个外连接的
    SQL 如下：


    ```sql

    SELECT m.LastName AS MemberLast, m.FirstName AS MemberFirst,

    c.LastName AS CoachLast, c.FirstName AS CoachFirst

    FROM Member m LEFT OUTER JOIN Member c ON m.Coach = c.MemberID;

    ```


    在前面的查询中，我们为每个输出属性指定了一个列别名。列别名临时重命名列以提高输出的可读性。在这种情况下，它有助于读者区分名字属于谁，如图 5-7 所示。如果没有别名，属性将被标记为`m.LastName`和`c.LastName`等，这些就不那么容易理解了。回顾第
    3 章，对于左外连接，如果右表中没有匹配的行，那些列将填充为空值。图 5-7 显示了左外连接的输出。


    ![A158240_2_En_5_Fig7_HTML.jpg](img/A158240_2_En_5_Fig7_HTML.jpg)

    图 5-7. 用于列出所有成员和教练的左外连接'
- fmt: '## Who Coaches the Coaches, or Who Is My Grandmother?


    两个`Member`表副本之间的自连接向我们展示了一个层级的成员和教练。如果我们查看图[5-7](#A158240_2_En_5_Chapter.html#Fig7)中的行，可以看到Thomas
    Sexton由William Cooper指导，而William Cooper又由Brenda Nolan指导，Brenda Nolan没有教练。这个层级对于当前问题来说并不特别有趣，但在许多类似情况下，这种层级关系却相当重要。家谱学就是其中之一。考虑图[5-8](#A158240_2_En_5_Chapter.html#Fig8)中的数据模型和`Person`表的一部分。为了尽可能简单，我们只考虑关于女性和生母的一小部分信息。


    ![A158240_2_En_5_Fig8_HTML.jpg](A158240_2_En_5_Fig8_HTML.jpg)


    图 5-8.

    女性及其生母的数据模型


    图[5-8](#A158240_2_En_5_Chapter.html#Fig8)中的关系可以顺时针解读为“一个人可以是多个人的母亲”，反方向解读为“一个人最多有一位母亲，也可能没有。”然而，在现实生活中，后一种说法听起来不太对——当然每个人都有母亲。但是，与所有数据库一样，这个数据库只是对现实生活复杂性的一种近似，它只能保存可用的数据。除非我们追溯到原始的
    slime（此处指远古），否则表中总会有一些我们不知道其母亲的人。Brenda就是其中之一。图[5-8](#A158240_2_En_5_Chapter.html#Fig8)中的表和模型与我们的成员和教练示例具有完全相同的结构，但像“谁是Sue的祖母？”这样的问题似乎比“谁指导我的教练？”更有可能出现。


    那么，我们如何获取关于个人及其母亲的信息呢？就像上一节一样，我们需要将`Person`表与自身连接。（别忘了将连接设置为外连接，这样就不会丢失Brenda的信息。）SQL如下：


    ```sql

    SELECT *

    FROM Person p LEFT OUTER JOIN Person m on p.Mother = m.ID;

    ```


    该连接的Access图形界面如图[5-9](#A158240_2_En_5_Chapter.html#Fig9)所示，同时也显示了结果表。我将表的第一个副本别名为`p`代表人物，第二个副本别名为`m`代表母亲。


    ![A158240_2_En_5_Fig9_HTML.jpg](A158240_2_En_5_Fig9_HTML.jpg)


    图 5-9.

    查找人物及其母亲：左外连接的Access图示及结果表


    那么，如何追溯到上一代呢？为此，我们需要在图[5-9](#A158240_2_En_5_Chapter.html#Fig9)的结果表和`Person`表的另一个副本（别名为`g`代表祖母）之间执行另一个左外连接。两个左外连接的SQL如下：


    ```sql

    SELECT *

    FROM (Person p LEFT JOIN Person m ON p.Mother = m.ID)

    LEFT JOIN Person g ON m.Mother = g.ID;

    ```


    结果表如图[5-10](#A158240_2_En_5_Chapter.html#Fig10)所示。


    ![A158240_2_En_5_Fig10_HTML.jpg](A158240_2_En_5_Fig10_HTML.jpg)


    图 5-10.

    查找三代人：左外连接的Access图示及结果表


    显然，我们可以继续进行越来越多的自连接，直到没有更多代为止。当我们拥有自引用关系时，这类层次查询很可能会出现。一个需要注意的小问题是，我们必须在每个查询中指定连接的次数。标准SQL没有“自动进行自连接直到没有更多代”的概念，例如“查找我所有的女性祖先”；然而，一些数据库实现确实支持这种特性。[¹](#A158240_2_En_5_Chapter.html#Fn1)


    ### 自连接的结果导向方法


    在上一节中，一旦我们意识到需要自连接，问题都很容易回答。这是过程导向方法的一个例子——我们需要执行哪些操作？然而，有时候，当你需要时，这种领悟并不总会到来。每当我在面对查询时大脑一片空白，我就会诉诸于结果导向方法。


    让我们再次查看`Member`表，并提出一个简单的问题：谁是Melissa的教练？不要考虑关系或连接，只需从外行人的角度来看数据。在图[5-11](#A158240_2_En_5_Chapter.html#Fig11)中，你可以看到如何找出答案，即使你从未听说过自连接（大多数人都没听说过）。


    ![A158240_2_En_5_Fig11_HTML.jpg](A158240_2_En_5_Fig11_HTML.jpg)


    图 5-11.

    查找Melissa的教练


    要找到Melissa的教练，我们首先找到Melissa所在的行（图[5-11](#A158240_2_En_5_Chapter.html#Fig11)中的`m`），然后注意到她的教练是成员153。接着我们找到另一行（`c`代表教练），其`MemberID`值为153；我们可以看到Melissa的教练是Brenda。你不需要了解任何关于自引用关系、外键或连接的知识就能弄清楚这一点。但一旦你将这种逻辑清晰地记在脑海中，就可以用自然语言写下来，然后转换成SQL就相当直接了。


    让我们描述一下图[5-11](#A158240_2_En_5_Chapter.html#Fig11)：


    > 我需要查看`Member`表中的两行（`m`和`c`），我想输出`c.FirstName`，条件是`c.MemberID`的值与`m.Coach`相同，并且`m.FirstName`是‘Melissa’。


    对应的SQL如下：


    ```sql

    SELECT c.FirstName

    FROM Member m, Member c

    WHERE c.MemberID = m.Coach AND m.FirstName = ''Melissa'';

    ```


    那么，这种结果导向方法如何对应我们之前考虑的过程导向方法呢？正如你所料，前面的SQL只是表述相同查询的另一种方式。在前面的SQL语句中，中间一行是两个`Member`表副本的笛卡尔积，`WHERE`子句的第一部分是连接条件。语句`FROM
    Member m, Member c WHERE c.MemberID = m.Coach`只是表达我们在前面章节中使用的自连接的另一种方式。


    让我们尝试用结果导向方法解决另一个查询：谁正在被杆差更高的教练指导？我脑海中需要的图像是图[5-12](#A158240_2_En_5_Chapter.html#Fig12)。


    ![A158240_2_En_5_Fig12_HTML.jpg](A158240_2_En_5_Fig12_HTML.jpg)


    图 5-12.

    查找被杆差更高的教练指导的成员


    我们可以看到，Deborah的杆差是12，她正在被成员235指导。成员235，William，杆差是14，因此Deborah符合我们的标准。以下是代表图[5-12](#A158240_2_En_5_Chapter.html#Fig12)中逻辑的更通用的陈述：


    > 我将查看`Member`表中的每一行（`m`），如果存在`Member`表中的另一行（`c`），使得`c.MemberID`与`m.Coach`相同，并且`m.Handicap`小于`c.Handicap`，我将输出`m.FirstName`和`m.LastName`。


    SQL的生成就很直接了：


    ```sql

    SELECT m.FirstName, m.LastName

    FROM Member m, Member c

    WHERE c.MemberID = m.Coach AND m.Handicap < c.Handicap;

    ```


    再次，你可以在前面的查询中看到等价的自连接（`FROM Member m, Member c WHERE c.MemberID = m.Coach`）。这种结果导向方法的有用之处在于，你不需要理解什么是自连接，也不必做出需要它的思维跳跃。通过用虚拟的手指和涉及哪些行来帮助你决策的方式思考，你可以勾勒出条件的陈述。SQL通常就能很容易地从中推导出来。'
  raw: '#### Who Coaches the Coaches, or Who Is My Grandmother?


    The self join between two copies of the `Member` table shows us one level of members
    and coaches. If we look at the rows in Figure [5-7](#A158240_2_En_5_Chapter.html#Fig7),
    we can see that Thomas Sexton is coached by William Cooper, who is in turn coached
    by Brenda Nolan, who doesn’t have a coach. The hierarchy isn’t all that interesting
    for this problem, but there are several analogous situations where the hierarchy
    is of considerable interest. Genealogy is one. Consider the data model and part
    of the `Person` table in Figure [5-8](#A158240_2_En_5_Chapter.html#Fig8). For
    the sake of keeping things really simple, we will consider only a tiny bit of
    information about just women and birth mothers.


    ![A158240_2_En_5_Fig8_HTML.jpg](A158240_2_En_5_Fig8_HTML.jpg)


    Figure 5-8.


    Data model for women and their birth mothers


    The relationship in Figure [5-8](#A158240_2_En_5_Chapter.html#Fig8) can be read
    clockwise as “a person can be the mother of several other people” and in the other
    direction as “a person has at most one mother and might have none.” Now. in real
    life, that last statement doesn’t sound right`—`surely everyone has a mother.
    However, as with all databases, this database is only an approximation of the
    complexities of real life, and it can only keep data that is available. Unless
    we trace everyone back to the primeval slime, there will be some people in our
    table whose mother we do not know. Brenda is one. The table and model in Figure
    [5-8](#A158240_2_En_5_Chapter.html#Fig8) have exactly the same structure as our
    member and coach example, but a question like “Who is Sue’s grandmother?” seems
    a bit more likely than “Who coaches my coach?”


    So, how do we get information about people along with information about their
    mothers? Just as in the previous section, we need to join the `Person` table to
    itself. (Don’t forget to make the join an outer join so you don’t lose Brenda.)
    The SQL is:


    ```

    SELECT *

    FROM Person p LEFT OUTER JOIN Person m on p.Mother = m.ID;

    ```


    The Access diagrammatic interface for the join is shown in Figure [5-9](#A158240_2_En_5_Chapter.html#Fig9),
    along with the resulting table. I’ve given the first copy of the table the alias
    `p` for person and the second copy the alias `m` for mother.


    ![A158240_2_En_5_Fig9_HTML.jpg](A158240_2_En_5_Fig9_HTML.jpg)


    Figure 5-9.


    Finding people and their mothers: Access diagram for the left outer join and the
    resulting table


    Now, what about going back to the previous generation? For that we need to perform
    another left outer join between the result table in Figure [5-9](#A158240_2_En_5_Chapter.html#Fig9)
    and another copy of the `People` (with the alias `g` for grandmother). The SQL
    for the two left outer joins is:


    ```

    SELECT *

    FROM (Person p LEFT JOIN Person m ON p.Mother = m.ID)

    LEFT JOIN Person g ON m.Mother = g.ID;

    ```


    The resulting table is shown in Figure [5-10](#A158240_2_En_5_Chapter.html#Fig10).


    ![A158240_2_En_5_Fig10_HTML.jpg](A158240_2_En_5_Fig10_HTML.jpg)


    Figure 5-10.


    Finding three generations: Access diagram for the left outer joins and the resulting
    table


    Clearly, we can keep making more and more self joins until we run out of generations.
    These sorts of hierarchical queries are likely to turn up whenever we have self
    relationships. One small catch is that we must specify the number of joins in
    each query. Standard SQL doesn’t have the notion of a query that automatically
    keeps doing the self joins until it runs out of generations, such as “Find all
    my female ancestors”; however, some implementations do support this.[¹](#A158240_2_En_5_Chapter.html#Fn1)


    ### An Outcome Approach to Self Joins


    The questions in the previous sections were all quite easy to answer once we realized
    we needed self joins. This was an example of the process approach `—` what operations
    do we need to perform? Sometimes, however, these realizations don’t always come
    when you need them. Whenever my mind goes blank when faced with a query, I resort
    to an outcome approach.


    Let’s look at our `Member` table again and ask a simple question: Who is Melissa’s
    coach? Don’t think about relationships or joins, just look at the data from a
    layman’s perspective. In Figure [5-11](#A158240_2_En_5_Chapter.html#Fig11), you
    can see how to figure out the answer, even if you have never heard of a self join
    (most people haven’t).


    ![A158240_2_En_5_Fig11_HTML.jpg](A158240_2_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Finding Melissa’s coach


    To find Melissa’s coach, we first find the row for Melissa (`m` in Figure [5-11](#A158240_2_En_5_Chapter.html#Fig11))
    and then note that her coach is member 153\. Then we find another row (`c` for
    coach) that has the `MemberID` value of 153; we can see that Melissa’s coach is
    Brenda. You don’t need to know anything about self relationships or foreign keys
    or joins to figure that out. But once you have that logic clearly in your mind,
    you can write it down in natural language, and then the translation to SQL is
    pretty straightforward.


    Let’s write a description of Figure [5-11](#A158240_2_En_5_Chapter.html#Fig11):


    > I need to look at two rows (`m` and `c`) in the `Member` table, and I want to
    write out `c.FirstName` where `c.MemberID` has the same value as `m.Coach` and
    `m.FirstName` is ‘Melissa’


    And here is the corresponding SQL:


    ```

    SELECT c.FirstName

    FROM Member m, Member c

    WHERE c.MemberID = m.Coach AND m.FirstName = ''Melissa'';

    ```


    So, how does this output approach correspond to the process approach we considered
    earlier? As you might expect, the preceding SQL is just an alternative way of
    stating the same query as the one where we used the self join. In the preceding
    SQL statement, the middle line is the Cartesian product between two copies of
    the `Member` table, and the first part of the `WHERE` clause is the join condition.
    The statement `FROM Member m, Member c WHERE c.MemberID = m.Coach` is just another
    way of expressing the self join we used in the previous sections.


    Let’s try one of the other queries using an outcome approach: Who is being coached
    by someone with a higher handicap? The picture I would need in my head to answer
    this question is shown in Figure [5-12](#A158240_2_En_5_Chapter.html#Fig12).


    ![A158240_2_En_5_Fig12_HTML.jpg](A158240_2_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    Finding members who are coached by someone with a higher handicap


    We can see that Deborah, whose handicap is 12, is being coached by member 235\.
    Member 235, William, has a handicap of 14, so Deborah satisfies our criteria.
    Here is the more general statement representing the logic depicted in Figure [5-12](#A158240_2_En_5_Chapter.html#Fig12):


    > I’m going to look at every row (`m`) in the `Member` table and will write out
    `m.FirstName` and  `m.LastName` if there exists some other row (`c`) in the `Member`
    table where `c.MemberID` is the same as `m.Coach` and `m.Handicap` is less than
    `c.Handicap`


    The SQL follows in a straightforward manner:


    ```

    SELECT m.FirstName, m.LastName

    FROM Member m, Member c

    WHERE c.MemberID = m.Coach AND m.Handicap < c.Handicap;

    ```


    Once again, you can see the equivalent of the self join in the preceding query
    (`FROM Member m, Member c WHERE c.MemberID = m.Coach)`. The usefulness of this
    outcome approach is that you don’t need to understand what a self join is, nor
    must you make the mental leap that you need one. By thinking in terms of virtual
    fingers and which rows are involved in helping you with your decision, you can
    sketch a statement of the criteria. The SQL usually follows quite easily from
    that.'
