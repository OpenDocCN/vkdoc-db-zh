- fmt: '## Other Types of Joins


    The joins we have been looking at in this chapter are equi-joins. An equi-join
    is one where the join condition has an equals operator, as in `m.MemberID = e.MemberID`.
    This is the most common type of condition, but you can have different operators.
    A join is just a Cartesian product followed by selecting a subset of rows, and
    the select condition can consist of different comparison operators (for example,
    `<>` or `>`) and also logical operators (for example, `AND` or `NOT`). These sorts
    of joins don’t turn up all that often.


    You might also come across a natural join. A natural join assumes that you will
    be joining on columns that have the same name in both tables. The join condition
    is that the values in the two columns with the same name are equal, and one of
    those columns will be removed from the result. For example:


    ```sql

    SELECT * FROM

    Member NATURAL JOIN Entry;

    ```


    This would produce almost the same output as:


    ```sql

    SELECT * FROM

    Member m INNER JOIN Entry e ON m.MemberID = e.MemberID;

    ```


    In the natural join statement, the join condition is implicitly assumed to be
    equality between the two attributes with the same name, `MemberID`. The only difference
    between the two queries is that for the natural join only one of the `MemberID`
    columns will be returned. Oracle supports natural joins but SQL Server and Access
    do not.


    ## Outer Joins


    One type of join that you will use a great deal and that is important to understand
    is the outer join. The best way to understand an outer join is to see where they
    are useful. Have a look at the (modified) `Member` and `Type` tables in Figure
    3-11.


    ![A158240_2_En_3_Fig11_HTML.jpg](A158240_2_En_3_Fig11_HTML.jpg)


    Figure 3-11. Member and Type tables


    You might want to produce different lists from the `Member` table, such as numbers
    and names, names and membership types, and so on. In these lists you expect to
    see all the members (for the table in Figure 3-11, that would be nine rows). Then
    you might think that as well as seeing the numbers and names in your member list,
    you will also include the membership fee. You join the two tables (with the condition
    `MemberType = Type`) and find that you “lose” one of your members — Sarah Beck
    (see Figure 3-12).


    ![A158240_2_En_3_Fig12_HTML.jpg](A158240_2_En_3_Fig12_HTML.jpg)


    Figure 3-12. Inner join between Member and Type, and we “lose” Sarah Beck


    The reason is that Sarah has no value for `MemberType` in the `Member` table.
    Let’s look at the Cartesian product, which is the first step for doing a join.
    Figure 3-13 shows those rows of the Cartesian product that include Sarah.


    ![A158240_2_En_3_Fig13_HTML.jpg](A158240_2_En_3_Fig13_HTML.jpg)


    Figure 3-13. Part of the Cartesian product between the Member and Type tables


    Having done the Cartesian product, we now need to do the final part of our join
    operation, which is to apply the condition (`MemberType = Type`). As you can see
    in Figure 3-13, there is no row for Sarah Beck that satisfies this condition because
    she has a null or empty value in `MemberType`.


    Consider the following two natural-language questions: “Get me the fees for members”
    and “Get me all member information including fees.” The first one has an implication
    of “Just get me the members who have fees,” while the second has more of a feel
    of “Get me all the members and include the fees for those who have them.” One
    of the biggest difficulties in writing queries is trying to decide exactly what
    it is you want. It is even more difficult if you are trying to understand what
    someone else is asking for!


    Let’s say that what we actually want is a list of all our members, and where we
    can find the fee information, we’d like to include that. In this case, we want
    to see Sarah Beck included in the result, but with no fee displayed. That is what
    an outer join does. Outer joins can come in three types: left, right, and full
    outer joins. A left outer join retrieves all the rows from the left table including
    those with a null value in the join field, as shown in Figure 3-14. We see that
    as well as all the rows from the inner join (Figure 3-12), we also have a row
    from the `Member` table for Sarah, who had a null for the join field `MemberType`.
    The fields in that row that would have come from the right-hand table (`Type`
    and `Fee`) have null values.


    ![A158240_2_En_3_Fig14_HTML.jpg](A158240_2_En_3_Fig14_HTML.jpg)


    Figure 3-14. Result of left outer join between Member and Type tables


    The SQL for the outer join depicted in Figure 3-14 is similar to an inner join,
    but the key phrase `INNER JOIN` is replaced with `LEFT OUTER JOIN` (or in some
    applications simply `LEFT JOIN`):


    ```sql

    SELECT *

    FROM Member m LEFT OUTER JOIN Type t ON m.MemberType = t.Type;

    ```


    You might quite reasonably say that we wouldn’t have needed an outer join if all
    the members had a value for the `MemberType` field (as they probably should).
    That may be true for this case — but remember my cautions in Chapter 2 about assuming
    that fields that should have data will have data. In other situations, the data
    in the join field may be quite legitimately empty. We will see in later chapters
    queries like “List all members and the names of their coaches — if they have one.”
    “Losing” rows because you have used an inner join when you should have used an
    outer join is a very common problem and is sometimes quite hard to spot.


    What about right and full outer joins? Left and right outer joins are the same
    and just depend on which order you put the tables in the join statement. The following
    SQL statement will return the same information as displayed in Figure 3-14, although
    the columns may be presented in a different order:


    ```sql

    SELECT *

    FROM Type t RIGHT OUTER JOIN Member m ON m.MemberType = t.Type;

    ```


    We have simply swapped the order of the tables in the join statement. Any rows
    with a null in the join field of the right table (`Member`) will be included.


    A full outer join will retain rows with a null in the join field in either table.
    The SQL for the full outer join is shown here and will result in the table seen
    in Figure 3-15:


    ![A158240_2_En_3_Fig15_HTML.jpg](A158240_2_En_3_Fig15_HTML.jpg)


    Figure 3-15. Result of a full outer join between Member and Type tables


    ```sql

    SELECT *

    FROM Member m FULL OUTER JOIN Type t ON m.MemberType = t.Type;

    ```


    We have a row for Sarah Beck padded with null values for the missing columns from
    the `Type` table. We also have the first row, which shows us the information about
    the Associate membership type even though there are no rows in the `Member` table
    with Associate as a member type. In this row, each missing value from the `Member`
    table is replaced with a null.


    Not all implementations of SQL have a full outer join implemented explicitly.
    Access 2013 doesn’t. However, there are always alternative ways in SQL to retrieve
    the information you require. In Chapter 7 I’ll show you how to get the equivalent
    of a full outer join by using a union operator between a left and right outer
    join (which is what I had to do to get the screen shot in Figure 3-15!).'
  raw: '## Other Types of Joins


    The joins we have been looking at in this chapter are equi-joins. An equi-join
    is one where the join condition has an equals operator, as in `m.MemberID = e.MemberID`.
    This is the most common type of condition, but you can have different operators.
    A join is just a Cartesian product followed by selecting a subset of rows, and
    the select condition can consist of different comparison operators (for example,
    <> or > ) and also logical operators (for example, `AND` or `NOT`). These sorts
    of joins don’t turn up all that often.


    You might also come across a natural join . A natural join assumes that you will
    be joining on columns that have the same name in both tables. The join condition
    is that the values in the two columns with the same name are equal, and one of
    those columns will be removed from the result. For example:


    ```

    SELECT * FROM

    Member NATURAL JOIN Entry;

    ```


    This would produce almost the same output as:


    ```

    SELECT * FROM

    Member m INNER JOIN Entry m ON m.MemberID = e.MemberID;

    ```


    In the natural join statement, the join condition is implicitly assumed to be
    equality between the two attributes with the same name, `MemberID`. The only difference
    between the two queries is that for the natural join only one of the `MemberID`
    columns will be returned. Oracle supports natural joins but SQL Server and Access
    do not.


    ### Outer Joins


    One type of join that you will use a great deal and that is important to understand
    is the outer join. The best way to understand an outer join is to see where they
    are useful. Have a look at the (modified) `Member` and `Type` tables in Figure
    [3-11](#A158240_2_En_3_Chapter.html#Fig11).


    ![A158240_2_En_3_Fig11_HTML.jpg](A158240_2_En_3_Fig11_HTML.jpg)


    Figure 3-11.


    Member and Type tables


    You might want to produce different lists from the `Member` table, such as numbers
    and names, names and membership types, and so on. In these lists you expect to
    see all the members (for the table in Figure [3-11](#A158240_2_En_3_Chapter.html#Fig11),
    that would be nine rows). Then you might think that as well as seeing the numbers
    and names in your member list, you will also include the membership fee. You join
    the two tables (with the condition `MemberType = Type`) and find that you “lose”
    one of your members `—` Sarah Beck (see Figure [3-12](#A158240_2_En_3_Chapter.html#Fig12)).


    ![A158240_2_En_3_Fig12_HTML.jpg](A158240_2_En_3_Fig12_HTML.jpg)


    Figure 3-12.


    Inner join between Member and Type, and we “lose” Sarah Beck


    The reason is that Sarah has no value for `MemberType` in the `Member` table.
    Let’s look at the Cartesian product, which is the first step for doing a join.
    Figure [3-13](#A158240_2_En_3_Chapter.html#Fig13) shows those rows of the Cartesian
    product that include Sarah.


    ![A158240_2_En_3_Fig13_HTML.jpg](A158240_2_En_3_Fig13_HTML.jpg)


    Figure 3-13.


    Part of the Cartesian product between the Member and Type tables


    Having done the Cartesian product, we now need to do the final part of our join
    operation, which is to apply the condition (`MemberType = Type`). As you can see
    in Figure [3-13](#A158240_2_En_3_Chapter.html#Fig13), there is no row for Sarah
    Beck that satisfies this condition because she has a null or empty value in `MemberType`.


    Consider the following two natural-language questions: “Get me the fees for members”
    and “Get me all member information including fees.” The first one has an implication
    of “Just get me the members who have fees,” while the second has more of a feel
    of “Get me all the members and include the fees for those who have them.” One
    of the biggest difficulties in writing queries is trying to decide exactly what
    it is you want. It is even more difficult if you are trying to understand what
    someone else is asking for!


    Let’s say that what we actually want is a list of all our members, and where we
    can find the fee information, we’d like to include that. In this case, we want
    to see Sarah Beck included in the result, but with no fee displayed. That is what
    an outer join does. Outer joins can come in three types: left, right , and full
    outer joins. A left outer join retrieves all the rows from the left table including
    those with a null value in the join field, as shown in Figure [3-14](#A158240_2_En_3_Chapter.html#Fig14).
    We see that as well as all the rows from the inner join (Figure [3-12](#A158240_2_En_3_Chapter.html#Fig12)),
    we also have a row from the `Member` table for Sarah, who had a null for the join
    field `MemberType`. The fields in that row that would have come from the right-hand
    table (`Type` and `Fee`) have null values.


    ![A158240_2_En_3_Fig14_HTML.jpg](A158240_2_En_3_Fig14_HTML.jpg)


    Figure 3-14.


    Result of left outer join between Member and Type tables


    The SQL for the outer join depicted in Figure [3-14](#A158240_2_En_3_Chapter.html#Fig14)
    is similar to an inner join, but the key phrase `INNER JOIN` is replaced with
    `LEFT OUTER JOIN` (or in some applications simply `LEFT JOIN`):


    ```

    SELECT *

    FROM Member m LEFT OUTER JOIN Type t ON m.MemberType = t.Type;

    ```


    You might quite reasonably say that we wouldn’t have needed an outer join if all
    the members had a value for the `MemberType` field (as they probably should).
    That may be true for this case `—` but remember my cautions in Chapter [2](#A158240_2_En_2_Chapter.html)
    about assuming that fields that should have data will have data. In other situations,
    the data in the join field may be quite legitimately empty. We will see in later
    chapters queries like “List all members and the names of their coaches `—` if
    they have one.” “Losing” rows because you have used an inner join when you should
    have used an outer join is a very common problem and is sometimes quite hard to
    spot.


    What about right and full outer joins? Left and right outer joins are the same
    and just depend on which order you put the tables in the join statement. The following
    SQL statement will return the same information as displayed in Figure [3-14](#A158240_2_En_3_Chapter.html#Fig14),
    although the columns may be presented in a different order:


    ```

    SELECT *

    FROM Type t RIGHT OUTER JOIN Member m ON m.MemberType = t.Type;

    ```


    We have simply swapped the order of the tables in the join statement. Any rows
    with a null in the join field of the right table (`Member`) will be included.


    A full outer join will retain rows with a null in the join field in either table.
    The SQL for the full outer join is shown here and will result in the table seen
    in Figure [3-15](#A158240_2_En_3_Chapter.html#Fig15):


    ![A158240_2_En_3_Fig15_HTML.jpg](A158240_2_En_3_Fig15_HTML.jpg)


    Figure 3-15.


    Result of a full outer join between Member and Type tables


    ```

    SELECT *

    FROM Member m FULL OUTER JOIN Type t ON m.MemberType = t.Type;

    ```


    We have a row for Sarah Beck padded with mull values for the missing columns from
    the `Type` table. We also have the first row, which shows us the information about
    the Associate membership type even though there are no rows in the `Member` table
    with Associate as a member type. In this row, each missing value from the `Member`
    table is replaced with a null.


    Not all implementations of SQL have a full outer join implemented explicitly.
    Access 2013 doesn’t. However, there are always alternative ways in SQL to retrieve
    the information you require. In Chapter [7](#A158240_2_En_7_Chapter.html) I’ll
    show you how to get the equivalent of a full outer join by using a union operator
    between a left and right outer join (which is what I had to do to get the screen
    shot in Figure [3-15](#A158240_2_En_3_Chapter.html#Fig15)!).'
  trans: '## 其他类型的连接


    本章我们一直在看的连接是等值连接。等值连接是指连接条件中包含等号运算符的连接，例如 `m.MemberID = e.MemberID`。这是最常见的条件类型，但你也可以使用不同的运算符。连接本质上是笛卡尔积运算之后再选择行的子集，而选择条件可以包含不同的比较运算符（例如
    `<>` 或 `>`）以及逻辑运算符（例如 `AND` 或 `NOT`）。这类连接并不十分常见。


    你可能还会遇到自然连接。自然连接假设你将在两个表中名称相同的列上进行连接。连接条件是这两个同名列的值相等，并且结果中将移除其中一个列。例如：


    ```sql

    SELECT * FROM

    Member NATURAL JOIN Entry;

    ```


    这将产生几乎与以下查询相同的输出：


    ```sql

    SELECT * FROM

    Member m INNER JOIN Entry e ON m.MemberID = e.MemberID;

    ```


    在自然连接语句中，连接条件被隐式地假定为两个同名属性 `MemberID` 之间的相等。两个查询唯一的区别在于，自然连接只会返回一个 `MemberID`
    列。Oracle 支持自然连接，但 SQL Server 和 Access 不支持。


    ## 外连接


    有一种连接你将会大量使用并且理解它非常重要，那就是外连接。理解外连接的最好方法是看它们在哪些场景下有用。请看一下图 3-11 中（修改后的）`Member`
    和 `Type` 表。


    ![A158240_2_En_3_Fig11_HTML.jpg](img/A158240_2_En_3_Fig11_HTML.jpg)


    图 3-11. Member 和 Type 表


    你可能希望从 `Member` 表生成不同的列表，例如编号和姓名、姓名和会员类型等等。在这些列表中，你期望看到所有会员（对于图 3-11 中的表，应为九行）。然后你可能会想，除了在会员列表中看到编号和姓名外，你还想包括会员费。你连接这两个表（条件为
    `MemberType = Type`），结果发现你“丢失”了一位会员——Sarah Beck（见图 3-12）。


    ![A158240_2_En_3_Fig12_HTML.jpg](img/A158240_2_En_3_Fig12_HTML.jpg)


    图 3-12. Member 和 Type 表的内连接，我们“丢失”了 Sarah Beck


    原因在于，Sarah 在 `Member` 表中的 `MemberType` 字段没有值。让我们看一下笛卡尔积，这是执行连接的第一步。图 3-13 显示了包含
    Sarah 的笛卡尔积中的那些行。


    ![A158240_2_En_3_Fig13_HTML.jpg](img/A158240_2_En_3_Fig13_HTML.jpg)


    图 3-13. Member 和 Type 表之间笛卡尔积的一部分


    完成笛卡尔积后，我们现在需要执行连接操作的最后一步，即应用条件 (`MemberType = Type`)。如图 3-13 所示，没有任何一行 Sarah
    Beck 的记录满足此条件，因为她的 `MemberType` 是 null 或空值。


    考虑以下两个自然语言问题：“获取会员的费用”和“获取包括费用在内的所有会员信息”。第一个问题隐含的意思是“只给我那些有费用的会员”，而第二个问题的感觉更像是“给我所有会员，如果有费用信息就包含进来”。编写查询时最大的困难之一就是试图准确确定你到底想要什么！如果你想理解别人在问什么，那就更难了！


    假设我们实际想要的是所有会员的列表，并且在能找到费用信息的地方包含该信息。在这种情况下，我们希望看到 Sarah Beck 包含在结果中，但不显示费用。这就是外连接的作用。外连接有三种类型：左外连接、右外连接和全外连接。左外连接检索左表中的所有行，包括连接字段为
    null 的行，如图 3-14 所示。我们看到，除了内连接（图 3-12）中的所有行外，我们还多了一行来自 `Member` 表的 Sarah 的记录，她的连接字段
    `MemberType` 为 null。该行中本应来自右侧表（`Type` 和 `Fee`）的字段值为 null。


    ![A158240_2_En_3_Fig14_HTML.jpg](img/A158240_2_En_3_Fig14_HTML.jpg)


    图 3-14. Member 和 Type 表左外连接的结果


    图 3-14 所示外连接的 SQL 与内连接类似，但关键短语 `INNER JOIN` 被替换为 `LEFT OUTER JOIN`（或者在一些应用程序中简写为
    `LEFT JOIN`）：


    ```sql

    SELECT *

    FROM Member m LEFT OUTER JOIN Type t ON m.MemberType = t.Type;

    ```


    你可能会非常合理地指出，如果所有会员的 `MemberType` 字段都有值（他们本应该如此），我们就不需要外连接了。对于这个案例来说，这可能是真的——但请记住我在第
    2 章中关于“不应假设本应有数据的字段就一定会有数据”的告诫。在其他情况下，连接字段中的数据可能确实合法地为空。在后面的章节中，我们将看到类似“列出所有会员及其教练姓名——如果有教练的话”这样的查询。因为该用外连接时却使用了内连接而“丢失”行，是一个非常常见的问题，而且有时很难发现。


    那么右外连接和全外连接呢？左外连接和右外连接是相同的，只是取决于你在连接语句中放置表的顺序。以下 SQL 语句将返回与图 3-14 所示相同的信息，尽管列的显示顺序可能不同：


    ```sql

    SELECT *

    FROM Type t RIGHT OUTER JOIN Member m ON m.MemberType = t.Type;

    ```


    我们只是在连接语句中交换了表的顺序。右表（`Member`）连接字段为 null 的任何行都将被包含进来。


    全外连接将保留任一表中连接字段为 null 的行。全外连接的 SQL 如下所示，将产生图 3-15 中的表：


    ![A158240_2_En_3_Fig15_HTML.jpg](img/A158240_2_En_3_Fig15_HTML.jpg)


    图 3-15. Member 和 Type 表全外连接的结果


    ```sql

    SELECT *

    FROM Member m FULL OUTER JOIN Type t ON m.MemberType = t.Type;

    ```


    我们有一行 Sarah Beck 的记录，其来自 `Type` 表的缺失列用 null 值填充。我们还有第一行，显示了关于 Associate 会员类型的信息，尽管
    `Member` 表中没有 Associate 会员类型的记录。在该行中，来自 `Member` 表的每个缺失值都被替换为 null。


    并非所有 SQL 实现都明确支持全外连接。Access 2013 就不支持。然而，在 SQL 中总有替代方法来检索你需要的信息。在第 7 章，我将向你展示如何通过使用
    UNION 运算符在左外连接和右外连接之间进行操作来获得等效于全外连接的结果（我就是这样得到图 3-15 的屏幕截图的！）。'
- fmt: "## Summary\n\n笛卡尔积（Cartesian product）会组合两个表。结果表包含来自两个表的每一列，并且包含来自相关表的每一行组合。反映过程方法（process\
    \ approach）的笛卡尔积 SQL 是：\n\n```sql\nSELECT *\nFROM <table1> CROSS JOIN <table2>;\n\
    ```\n\n反映结果方法（outcome approach）的内连接（inner join） SQL 是：\n\n```sql\nSELECT *\nFROM\
    \ <table1>, <table2>;\n```\n\n内连接从笛卡尔积开始，然后连接条件（join condition）决定将保留来自两个相关表的哪些行组合。\n\
    \n反映过程方法的内连接 SQL 是：\n\n```sql\nSELECT *\nFROM <table1> INNER JOIN <table2>\nON\
    \ <table1.column> = <table2.column>;\n```\n\n反映结果方法的内连接 SQL 是：\n\n```sql\nSELECT\
    \ *...\nFROM <table1>, <table2>\nWHERE <table1.column> = <table2.column>;\n```\n\
    \n如果其中一个（或两个）表在连接条件涉及的字段中包含为空（null）的行，则该行不会出现在内连接的结果中。如果需要该行，可以使用外连接（outer join）。\n\
    \n以下 SQL 将保留左表中的所有行，包括连接字段为 null 的行：\n\n```sql\nSELECT *\nFROM <table1> LEFT OUTER\
    \ JOIN <table2>\nON <table1.column> = <table2.column>;\n```\n\n类似的表达也适用于右外连接（right\
    \ outer join）和全外连接（full outer join）。\n\n脚注 [1](#A158240_2_En_3_Chapter.html#Fn1_source)\n\
    \n国际标准化组织（International Organization for Standardization）。信息技术 — 数据库语言 — SQL。ISO,\
    \ Geneva, Switzerland, 1992。 ISO/IEC 9075:1992。\n\n# 4. 子查询\n\n在前面的章节中，我们研究了从单个表中检索部分行和列，也研究了如何使用笛卡尔积和连接从两个或多个表中检索数据。在许多例子中，我们可以构建截然不同的\
    \ SQL 查询来产生相同的结果。根据上下文或问题，你可能会发现某种方法感觉更自然。\n\n随着查询变得越来越复杂，我们可能会发现我们可以为查询的某个小部分想到\
    \ SQL 表达式，但无法一次性为整个查询想到。我们可以在一个 SQL 语句中返回查询数据，然后用另一个查询引用该数据。这种在查询中嵌套查询的想法非常强大。你会听到这个概念被称为查询和子查询（query\
    \ and subquery）、内部和外部查询（inner and outer queries）或嵌套查询（nested queries）。\n\n在本章中，我们将研究子查询和两个新的\
    \ SQL 关键字：`EXISTS` 和 `IN`。我们将看到如何使用子查询作为处理我们已经做过的某些查询的替代方法，以及嵌套如何开启其他可能性。\n\n\
    ## IN 关键字\n\n`IN` 关键字允许我们从表中选择行，其中条件允许一个属性具有多个值之一。例如，如果我们想从 `Entry` 表中检索赛事 ID\
    \ 为 36、38 或 40 的行中的成员 ID，我们可以使用布尔 `OR` 运算符，如下所示：\n\n```sql\nSELECT e.MemberID\n\
    FROM Entry e\nWHERE e.TourID = 36 OR e.TourID = 38 OR e.TourID = 40;\n```\n\n\
    显然，随着可能选项数量的增加，这类语句会变得难以管理。使用 `IN` 关键字，我们可以构建一个更紧凑的语句，将可能的值集合括在括号中并用逗号分隔。在以下查询中，会检查\
    \ `Entry` 的每一行，如果 `TourID` 是括号中的值之一，则 `WHERE` 条件为真，并返回该行：\n\n```sql\nSELECT e.MemberID\n\
    FROM Entry e\nWHERE e.TourID IN (36, 38, 40);\n```\n\n可以将 `IN` 与逻辑运算符 `NOT` 结合使用。但是，你需要非常小心。考虑以下查询：\n\
    \n```sql\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID NOT IN (36, 38, 40);\n\
    ```\n\n前面的查询将返回参加了任何不在列表中的赛事的成员 ID。但请注意，这些成员也可能参加了列表中的某个赛事。我们将在本章后面研究如何准确回答“谁没有参加这些赛事”之类的问题。\n\
    \n## 与子查询一起使用 IN\n\n`IN` 关键字的真正用处在于我们可以使用另一个 SQL 语句来生成值集合。例如，某人可能对赛事 36、38 和 40\
    \ 感兴趣的原因可能是因为它们是当前的公开赛（Open tournaments）。我们可以使用另一个 SQL 查询来生成所需的值集合，而不用单独列出公开赛。每次运行查询时都会重建列表，因此随着数据变化，公开赛集合将保持最新。\n\
    \n让我们看一个使用查询为 `IN` 子句生成值集合的具体例子。我在图 [4-1](#A158240_2_En_4_Chapter.html#Fig1) 中重现了\
    \ `Member` 表的几列以及 `Entry` 和 `Tournament` 表。\n\n![A158240_2_En_4_Fig1_HTML.jpg](A158240_2_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1.\n\nMember、Entry 和 Tournament 表\n\n生成公开赛赛事 ID 集合的查询是：\n\n```sql\nSELECT\
    \ t.TourID\nFROM Tournament t\nWHERE t.TourType = 'Open';\n```\n\n现在我们可以将前面查询中的显式值列表（36,\
    \ 38, 40）替换为前面的 SQL 语句：\n\n```sql\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID\
    \ IN (\n    SELECT t.TourID\n    FROM Tournament t\n    WHERE t.TourType = 'Open');\n\
    ```\n\n括号内的 `SELECT` 语句有时被称为子查询（subquery）。为了与 `IN` 关键字正确配合，查询的内部必须返回单个值的列表。我缩进它只是为了更容易阅读（SQL\
    \ 会忽略添加的空白）。你可以通过“由内而外”地阅读来理解嵌套查询。内部的 `SELECT` 语句从 `Tournament` 表中检索所需的赛事 ID 集合，然后外部的\
    \ `SELECT` 从 `Entry` 表中为我们找到所有该集合中的赛事的条目。\n\n为了帮助理解，可以向 SQL 语句添加注释。在以下语句中，以 `--`\
    \ 开头的行是注释，将被忽略。也可以使用 `/*` 和 `*/` 包围多行代码块。\n\n```sql\nSELECT e.MemberID\nFROM Entry\
    \ e\nWHERE e.TourID IN (\n    -- 子查询返回公开赛的 ID\n    SELECT t.TourID\n    FROM Tournament\
    \ t\n    WHERE t.TourType = 'Open');\n```\n\n再看一下图 [4-1](#A158240_2_En_4_Chapter.html#Fig1)\
    \ 中的表。我们还能如何检索公开赛的条目？我们在前一章使用连接进行了类似的查询。我们可以连接两个表 `Entry` 和 `Tournament`，连接条件是它们的公共字段\
    \ `TourID`，只选择公开赛的那些行，然后投影 `MemberID` 列。请看下面：\n\n```sql\nSELECT e.MemberID\nFROM\
    \ Entry e INNER JOIN Tournament t ON e.TourID = t.TourID\nWHERE t.TourType = 'Open';\n\
    ```\n\n带子查询和不带子查询的 SQL 语句检索相同的信息。正如我已经说过很多次的，在 SQL 中编写查询通常有几种不同的方法。你熟悉的方法越多，就越有可能找到表达复杂查询的方法。"
  raw: "## Summary\n\nA Cartesian product combines two tables. The resulting table\
    \ has a column for each column in the two tables, and there is a row for every\
    \ combination of rows from the contributing tables. The SQL for a Cartesian product\
    \ reflecting the process approach is:\n\n```\nSELECT *\nFROM  CROSS JOIN ;\n```\n\
    \nThe SQL for an inner join reflecting the outcome approach is:\n\n```\nSELECT\
    \ *\nFROM ,;\n```\n\nAn inner join starts with a Cartesian product, and then a\
    \ join condition determines which combinations of rows from the two contributing\
    \ tables will be retained.\n\nThe SQL for an inner join reflecting the process\
    \ approach is:\n\n```\nSELECT *\nFROM  INNER JOIN \nON ;\n```\n\nThe SQL for an\
    \ inner join reflecting the outcome approach is:\n\n```\nSELECT *...\nFROM , \n\
    WHERE ;\n```\n\nIf one (or both) of the tables has rows with a null in the field\
    \ involved in the join condition, then that row will not appear in the result\
    \ for an inner join. If that row is required, you can use outer joins.\n\nThe\
    \ SQL for an outer join, which will retain all the rows in the left-hand table\
    \ including those with a null in the join field, is:\n\n```\nSELECT *\nFROM  \
    \ LEFT OUTER JOIN \nON ;\n```\n\nSimilar expressions exist for right outer joins\
    \ and full outer joins.\n\nFootnotes [1](#A158240_2_En_3_Chapter.html#Fn1_source)\n\
    \nInternational Organization for Standardization. Information technology — Database\
    \ languages — SQL. ISO, Geneva, Switzerland, 1992\\. ISO/IEC 9075:1992.\n\n# 4. Subqueries\n\
    \nIn the previous chapters, we looked at retrieving a subset of rows and columns\
    \ from a single table, and we also looked at how Cartesian products and joins\
    \ can be used to retrieve data from two or more tables. In many of the examples\
    \ it was possible to construct quite different SQL queries to produce the same\
    \ result. Depending on the context or the problem you will probably find that\
    \ one approach will feel more natural.\n\nAs queries become more complicated,\
    \ we might find that we can think of SQL expressions for small parts of a query\
    \ but not for the whole lot in one go. It is possible to return data from a query\
    \ and then refer to that data with another query `—` all in the one SQL statement.\
    \ This idea of a query within a query is very powerful. You will hear the concept\
    \ referred to as a query and subquery or inner and outer queries or nested queries.\n\
    \nIn this chapter, we will look at subqueries and two new SQL keywords, `EXISTS`\
    \ and `IN`. We will see how to use subqueries as an alternative way to approach\
    \ some of the queries we have already done and also how nesting will open up other\
    \ possibilities.\n\n## IN Keyword\n\nThe `IN` keyword allows us to select rows\
    \ from a table, where the condition allows an attribute to have one of several\
    \ values. For example, if we wanted to retrieve the member IDs from the rows in\
    \ our `Entry` table for tournaments with ID 36, 38, or 40, we could do this with\
    \ a Boolean `OR` operator as in the following query:\n\n```\nSELECT e.MemberID\n\
    FROM Entry e\nWHERE e.TourID = 36 OR e.TourID = 38 OR e.TourID = 40;\n```\n\n\
    Clearly, statements of this type will start to become unwieldy as the number of\
    \ possible options grows. Using the `IN` keyword, we can construct a more compact\
    \ statement where the set of possible values are enclosed in parentheses and separated\
    \ by commas. In the following query, each row of `Entry` is investigated, and\
    \ if `TourID` is one of the values in the parentheses, then the `WHERE` condition\
    \ is true, and that row will be returned:\n\n```\nSELECT e.MemberID\nFROM Entry\
    \ e\nWHERE e.TourID IN (36, 38, 40);\n```\n\nIt is possible to combine `IN` with\
    \ the logical operator `NOT`. However, you need to be very careful. Consider the\
    \ following query:\n\n```\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID NOT\
    \ IN (36, 38, 40);\n```\n\nThe preceding query will return the IDs of members\
    \ who have entered any tournament that is not in the list. Be aware though that\
    \ those members may have entered one of the tournaments in the list as well. We\
    \ will look at how to accurately answer questions such as “who has not entered\
    \ these tournaments” later in this chapter.\n\n## Using IN with Subqueries\n\n\
    The real usefulness of the `IN` keyword is that we can use another SQL statement\
    \ to generate the set of values. For example, the reason that someone may have\
    \ been interested in tournaments 36, 38, and 40 might have been because they are\
    \ the current Open tournaments. Rather than list the Open tournaments individually,\
    \ we can use another SQL query to generate the set of values we require. The list\
    \ will be reconstructed each time the query is run so that the set of Open tournaments\
    \ will remain current as the data changes.\n\nLet’s look at a specific example\
    \ of using a query to generate the set of values for the `IN` clause. I’ve reproduced\
    \ a few of the columns of the `Member` table along with the `Entry` and `Tournament`\
    \ tables in Figure [4-1](#A158240_2_En_4_Chapter.html#Fig1).\n\n![A158240_2_En_4_Fig1_HTML.jpg](A158240_2_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1.\n\nMember, Entry, and Tournament tables\n\nThe query to generate\
    \ the set of IDs for the Open tournaments is:\n\n```\nSELECT t.TourID\nFROM Tournament\
    \ t\nWHERE t.TourType = 'Open';\n```\n\nNow we can replace the list of explicit\
    \ values (36, 38, 40) in the previous queries with the preceding SQL statement:\n\
    \n```\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID IN (\nSELECT t.TourID\n\
    FROM Tournament t\nWHERE t.TourType = 'Open');\n```\n\nThe `SELECT` statement\
    \ inside the parentheses is sometimes referred to as a subquery. To work correctly\
    \ with the `IN` keyword, the inner part of the query must return a list of single\
    \ values. I have indented it only to make it easier to read (SQL will ignore the\
    \ added whitespace). You can understand a nested query by reading it from the\
    \ “inside out.” The inside `SELECT` statement retrieves the set of required tournament\
    \ IDs from the `Tournament` table, and then the outside `SELECT` finds us all\
    \ the entries from the `Entry` table for tournaments `IN` that set.\n\nTo aid\
    \ in understanding, it is possible to add comments to SQL statements. In the statement\
    \ that follows the line beginning with -- is a comment and will be ignored. It\
    \ is also possible to use /* and */ around a block of more than one line of code.\n\
    \n```\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID IN (\n-- Subquery returns\
    \ IDs of Open tournaments\nSELECT t.TourID\nFROM Tournament t\nWHERE t.TourType\
    \ = 'Open');\n```\n\nHave another look at the tables in Figure [4-1](#A158240_2_En_4_Chapter.html#Fig1).\
    \ How else might we have retrieved entries for Open tournaments? We carried out\
    \ similar queries in the previous chapter using a join. We can join the two tables,\
    \ `Entry` and `Tournament,` on their common fields `TourID`, select just those\
    \ rows that are for Open tournaments, and then project the `MemberID` column.\
    \ See the following:\n\n```\nSELECT e.MemberID\nFROM Entry e INNER JOIN Tournament\
    \ t ON e.TourID = t.TourID\nWHERE t.TourType = 'Open';\n```\n\nThe SQL statements\
    \ with and without the subquery retrieve the same information. As I’ve said a\
    \ number of times, there are often several different ways to write a query in\
    \ SQL. The more methods you are familiar with, the more likely you will be able\
    \ to find a way to express a complicated query."
  trans: "## 概要\n\n笛卡尔积（Cartesian product）用于组合两个表。结果表包含来自两个表的每一列，并且包含来自相关表的每一行组合。体现过程方法（process\
    \ approach）的笛卡尔积 SQL 如下：\n\n```sql\nSELECT *\nFROM <table1> CROSS JOIN <table2>;\n\
    ```\n\n体现结果方法（outcome approach）的内连接（inner join） SQL 如下：\n\n```sql\nSELECT *\n\
    FROM <table1>, <table2>;\n```\n\n内连接从笛卡尔积开始，然后连接条件（join condition）决定将保留来自两个相关表的哪些行组合。\n\
    \n体现过程方法的内连接 SQL 如下：\n\n```sql\nSELECT *\nFROM <table1> INNER JOIN <table2>\n\
    ON <table1.column> = <table2.column>;\n```\n\n体现结果方法的内连接 SQL 如下：\n\n```sql\nSELECT\
    \ *...\nFROM <table1>, <table2>\nWHERE <table1.column> = <table2.column>;\n```\n\
    \n如果其中一个（或两个）表在连接条件涉及的字段中包含为空（null）的行，则该行不会出现在内连接的结果中。如果需要该行，可以使用外连接（outer join）。\n\
    \n以下 SQL 将保留左表中的所有行，包括连接字段为 null 的行：\n\n```sql\nSELECT *\nFROM <table1> LEFT OUTER\
    \ JOIN <table2>\nON <table1.column> = <table2.column>;\n```\n\n类似的表达也适用于右外连接（right\
    \ outer join）和全外连接（full outer join）。\n\n脚注 1\n\n国际标准化组织（International Organization\
    \ for Standardization）。信息技术 — 数据库语言 — SQL。ISO, Geneva, Switzerland, 1992。 ISO/IEC\
    \ 9075:1992。\n\n# 4. 子查询\n\n在前面的章节中，我们研究了从单个表中检索部分行和列，也研究了如何使用笛卡尔积和连接从两个或多个表中检索数据。在许多例子中，我们可以构建截然不同的\
    \ SQL 查询来产生相同的结果。根据上下文或问题，你可能会发现某种方法感觉更自然。\n\n随着查询变得越来越复杂，我们可能会发现我们可以为查询的某个小部分想到\
    \ SQL 表达式，但无法一次性为整个查询想到。我们可以在一个 SQL 语句中返回查询数据，然后用另一个查询引用该数据。这种在查询中嵌套查询的想法非常强大。你会听到这个概念被称为查询和子查询（query\
    \ and subquery）、内部和外部查询（inner and outer queries）或嵌套查询（nested queries）。\n\n在本章中，我们将研究子查询和两个新的\
    \ SQL 关键字：`EXISTS` 和 `IN`。我们将看到如何使用子查询作为处理我们已经做过的某些查询的替代方法，以及嵌套如何开启其他可能性。\n\n\
    ## IN 关键字\n\n`IN` 关键字允许我们从表中选择行，其中条件允许一个属性具有多个值之一。例如，如果我们想从 `Entry` 表中检索赛事 ID\
    \ 为 36、38 或 40 的行中的成员 ID，我们可以使用布尔 `OR` 运算符，如下所示：\n\n```sql\nSELECT e.MemberID\n\
    FROM Entry e\nWHERE e.TourID = 36 OR e.TourID = 38 OR e.TourID = 40;\n```\n\n\
    显然，随着可能选项数量的增加，这类语句会变得难以管理。使用 `IN` 关键字，我们可以构建一个更紧凑的语句，将可能的值集合括在括号中并用逗号分隔。在以下查询中，会检查\
    \ `Entry` 的每一行，如果 `TourID` 是括号中的值之一，则 `WHERE` 条件为真，并返回该行：\n\n```sql\nSELECT e.MemberID\n\
    FROM Entry e\nWHERE e.TourID IN (36, 38, 40);\n```\n\n可以将 `IN` 与逻辑运算符 `NOT` 结合使用。但是，你需要非常小心。考虑以下查询：\n\
    \n```sql\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID NOT IN (36, 38, 40);\n\
    ```\n\n前面的查询将返回参加了任何不在列表中的赛事的成员 ID。但请注意，这些成员也可能参加了列表中的某个赛事。我们将在本章后面研究如何准确回答“谁没有参加这些赛事”之类的问题。\n\
    \n## 与子查询一起使用 IN\n\n`IN` 关键字的真正用处在于我们可以使用另一个 SQL 语句来生成值集合。例如，某人可能对赛事 36、38 和 40\
    \ 感兴趣的原因可能是因为它们是当前的公开赛（Open tournaments）。我们可以使用另一个 SQL 查询来生成所需的值集合，而不用单独列出公开赛。每次运行查询时都会重建列表，因此随着数据变化，公开赛集合将保持最新。\n\
    \n让我们看一个使用查询为 `IN` 子句生成值集合的具体例子。我在图 4-1 中重现了 `Member` 表的几列以及 `Entry` 和 `Tournament`\
    \ 表。\n\n![A158240_2_En_4_Fig1_HTML.jpg](img/A158240_2_En_4_Fig1_HTML.jpg)\n\n\
    图 4-1.\n\nMember、Entry 和 Tournament 表\n\n生成公开赛赛事 ID 集合的查询是：\n\n```sql\nSELECT\
    \ t.TourID\nFROM Tournament t\nWHERE t.TourType = 'Open';\n```\n\n现在我们可以将前面查询中的显式值列表（36,\
    \ 38, 40）替换为前面的 SQL 语句：\n\n```sql\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID\
    \ IN (\n    SELECT t.TourID\n    FROM Tournament t\n    WHERE t.TourType = 'Open');\n\
    ```\n\n括号内的 `SELECT` 语句有时被称为子查询（subquery）。为了与 `IN` 关键字正确配合，查询的内部必须返回单个值的列表。我缩进它只是为了更容易阅读（SQL\
    \ 会忽略添加的空白）。你可以通过“由内而外”地阅读来理解嵌套查询。内部的 `SELECT` 语句从 `Tournament` 表中检索所需的赛事 ID 集合，然后外部的\
    \ `SELECT` 从 `Entry` 表中为我们找到所有该集合中的赛事的条目。\n\n为了帮助理解，可以向 SQL 语句添加注释。在以下语句中，以 `--`\
    \ 开头的行是注释，将被忽略。也可以使用 `/*` 和 `*/` 包围多行代码块。\n\n```sql\nSELECT e.MemberID\nFROM Entry\
    \ e\nWHERE e.TourID IN (\n    -- 子查询返回公开赛的 ID\n    SELECT t.TourID\n    FROM Tournament\
    \ t\n    WHERE t.TourType = 'Open');\n```\n\n再看一下图 4-1 中的表。我们还能如何检索公开赛的条目？我们在前一章使用连接进行了类似的查询。我们可以连接两个表\
    \ `Entry` 和 `Tournament`，连接条件是它们的公共字段 `TourID`，只选择公开赛的那些行，然后投影 `MemberID` 列。请看下面：\n\
    \n```sql\nSELECT e.MemberID\nFROM Entry e INNER JOIN Tournament t ON e.TourID\
    \ = t.TourID\nWHERE t.TourType = 'Open';\n```\n\n带子查询和不带子查询的 SQL 语句检索相同的信息。正如我已经说过很多次的，在\
    \ SQL 中编写查询通常有几种不同的方法。你熟悉的方法越多，就越有可能找到表达复杂查询的方法。"
- fmt: '## Being Careful with `NOT` and `<>`


    As well as asking a question such as “What are the IDs of members who have entered
    an Open tournament?” it is just as likely that we might want to know “What are
    the IDs of members who have not entered an Open tournament?” They sound very similar,
    but once we start using negatives in our questions, we have to be very careful
    about what we really mean. In Chapter [7](#A158240_2_En_7_Chapter.html), we will
    investigate constructing queries using set operations, but to keep this chapter
    complete, I’ll talk about how negatives impact the use of subqueries in particular.


    In the previous section we constructed two SQL statements for retrieving member
    IDs for members who have entered an Open tournament. One used a subquery and one
    a join. To find who has not entered an Open tournament, one might attempt changing
    `IN` to `NOT IN` in the subquery example, as follows:


    ```sql

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID NOT IN

    (SELECT t.TourID

    FROM Tournament t

    WHERE t.TourType = ''Open'');

    ```


    In the join example there is a temptation to amend `t.TourType = ''Open''` to
    `t.TourType <> ''Open''`:


    ```sql

    SELECT e.MemberID

    FROM Entry e INNER JOIN Tournament t ON e.TourID = t.TourID

    WHERE t.TourType ''Open'';

    ```


    Carefully think about which rows will be returned by these two queries. They in
    fact both return the same set of rows, but those rows may include members who
    have entered an Open tournament as well as those who have not.


    The table in Figure [4-2](#A158240_2_En_4_Chapter.html#Fig2) shows the result
    of the inner join between `Entry` and `Tournament`. The bottom set of rows are
    all for Open tournaments, and these will be retrieved by a query that has the
    condition `WHERE t.TourType = ''Open''`. The top set of entries is for tournaments
    other than Open and will be retrieved by the query which has the condition `WHERE
    t.TourType <> ''Open''`.


    ![A158240_2_En_4_Fig2_HTML.jpg](A158240_2_En_4_Fig2_HTML.jpg)


    Figure 4-2. TourType = ‘Open’ versus TourType <> ‘Open’


    We can see that some members (indicated by circles) appear in both sets. Figure
    [4-3](#A158240_2_En_4_Chapter.html#Fig3) is another representation of the information
    in the table in Figure [4-2](#A158240_2_En_4_Chapter.html#Fig2) but shows two
    sets of members rather than entries: the top circle represents those who have
    entered an Open tournament and the bottom circle those who have entered a tournament
    that is not an Open tournament. Four members are in both sets.


    ![A158240_2_En_4_Fig3_HTML.gif](A158240_2_En_4_Fig3_HTML.gif)


    Figure 4-3. Members who have entered Open tournaments, other tournaments, or both


    Now let’s return to the original question. Which members have not entered an Open
    tournament? We have to be careful to differentiate the two sets depicted in Figure
    [4-4](#A158240_2_En_4_Chapter.html#Fig4).


    ![A158240_2_En_4_Fig4_HTML.gif](A158240_2_En_4_Fig4_HTML.gif)


    Figure 4-4. It is important to be careful to distinguish the SQL for these two
    situations


    Figure [4-4a](#A158240_2_En_4_Chapter.html#Fig4) shows the set of people who have
    not entered any Open tournament. Figure [4-4b](#A158240_2_En_4_Chapter.html#Fig4)
    shows those members who have entered something other than an Open tournament (but
    not excluding those who may have entered an Open tournament as well). For example,
    member 118 has never entered an Open tournament, whereas member 228 has entered
    Open tournaments as well as other types of tournaments.


    The two queries at the beginning of this section will both retrieve the set of
    members depicted in Figure [4-4b](#A158240_2_En_4_Chapter.html#Fig4). Member 228
    (who has entered an Open tournament) will be returned (because he has entered
    a tournament that is not an Open tournament). This is not what we want and is
    a very common mistake.


    To decide whether someone has entered an Open competition, we need to find just
    one matching entry. To decide whether someone has not entered an Open competition,
    we need to check all the Open entries to make sure that member does not appear.


    In terms of our joined tables in Figure [4-2](#A158240_2_En_4_Chapter.html#Fig2),
    finding those people who have entered an Open tournament requires a simple `WHERE`
    clause: `WHERE t.TourType = ''Open''`. Remember that each row is inspected independently
    to decide whether it meets the criteria in a `WHERE` clause. However, to find
    people who have not entered an Open tournament, we need to investigate every row
    in the table to ensure that there is not an entry for a particular member. This
    is a much more complex task. In fact, we also need to consider the members who
    have never entered any tournaments. These members’ IDs will not appear in the
    `Entry` table at all, so we also have to investigate the `Member` table to find
    the complete list.


    Finding members who have not entered an Open tournament can be achieved with a
    process approach using the set operations found in Chapter [7](#A158240_2_En_7_Chapter.html).
    However, we can also use the outcome approach to construct an accurate query.
    To do that, we need to first introduce the `EXISTS` keyword.'
