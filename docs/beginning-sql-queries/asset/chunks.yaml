    ```sql

    SELECT m.LastName, m.FirstName FROM Member m WHERE m.Handicap <

    (SELECT AVG(Handicap) FROM Member);

    ```


    #### 更新数据


    为2016年的25号锦标赛中的每位青少年成员在`Entry`表中添加一行：


    ```sql

    INSERT INTO Entry (MemberID, TourID, Year)

    SELECT MemberID, 25, 2016

    FROM Member WHERE MemberType = ''Junior'';

    ```


    # 5. 自连接


    当我们基于 `WHERE` 子句中的条件选择行的子集时，该条件是独立地对每一行进行评估的。一个例子可能是查询查找所有参加了36号锦标赛的成员。条件 `TourID
    = 36` 可以对 `Entry` 表中的每一行进行评估，以获得所需结果。但是，如果我们想查找同时参加了36号和24号锦标赛的成员，仅通过检查 `Entry`
    表的一行是无法做到的。我们需要为同一个成员找到两行（或两个参赛记录）——每个指定锦标赛各一个。一个简单的 `WHERE` 子句无法实现这一点。


    在本章中，我们将了解自连接。通过两个表之间的连接，我们首先生成一个笛卡尔积，该积提供了来自每个表的行的组合。在自连接中，我们对同一个表的两个副本做同样的事情。这为我们提供了原始表中成对行的所有组合。这是编写需要来自表中多行信息以满足某些条件的查询的一种方法。它将使我们能够回答涉及“同时”这个词的问题；例如，“哪些成员同时参加了这两个锦标赛？”
    自连接还允许我们对涉及自关系的表进行查询。我们先来了解自关系。


    ## 自关系


    让我们为 `Member` 表添加更多信息。假设一些成员被分配了教练。我们如何在第一章讨论的类图中表示这一点？我们可以采用图[5-1]所示的方法，包含两个类：`Member`
    和 `Coach`。回想一下这些线和数字的含义。从左到右，一个教练可能有几个成员要训练（最靠近 `Member` 类的 `0..n`）。从右到左，特定成员可能有一个教练或没有教练（最靠近
    `Coach` 类的 `0..1`）。


    ![A158240_2_En_5_Fig1_HTML.jpg](A158240_2_En_5_Fig1_HTML.jpg)


    图5-1.

    教练和成员的数据模型（不推荐！）


    图[5-1]中模型的问题在于，教练很可能就是俱乐部的成员。当我们使用 `Coach` 表和 `Member` 表来实现此模型时，有些人会在每个表中都有一行记录他们的详细信息。例如，布伦达·诺兰在
    `Member` 表中有一行。当她担任教练角色时，我们还需要在 `Coach` 表中有一行关于她的信息。如果布伦达有了新的电话号码，有人必须记得在两个表中都进行更改。极有可能这不会发生，最终我们会在其中一个表中得到旧的号码。


    在这个例子中，我们实际上并没有两个独立的成员和教练类。我们只有一个成员类，其中一些成员指导其他成员。这种自关系如图[5-2]所示。


    ![A158240_2_En_5_Fig2_HTML.jpg](A158240_2_En_5_Fig2_HTML.jpg)


    图5-2.

    成员指导其他成员的数据模型


    图[5-2]中的关系线可以顺时针方向解读为：特定成员可能指导几个其他成员或没有（`0..n`）。在另一个方向上，我们可以解读为：特定成员可能有一个教练或没有（`0..1`）。


    在第一章中，我们展示了如何通过在一端表中添加一个列来表示一对多关系，该列的值来自另一端表的主键。图[5-2]中的模型是完全相同类型的一对多关系，只是我们在两端有相同的表，因此是一个自关系。为了表示这种关系，我们可以在
    `Member` 表中添加一个 `Coach` 列，如图[5-3]所示。`Coach` 字段中的值也必须存在于键字段 `MemberID` 中。


    ![A158240_2_En_5_Fig3_HTML.jpg](A158240_2_En_5_Fig3_HTML.jpg)


    图5-3.

    在Member表中添加Coach列


    图[5-3]表中的第一行告诉我们，梅丽莎由成员153指导，从表的第三行可以看到成员153是布伦达。我们需要将 `Coach` 字段的值约束为现有的成员之一，这样我们就不会意外地在
    `Coach` 列中添加无效的成员编号。我们可以通过将 `Coach` 字段设置为外键来实现这一点。从第一章回忆，外键是一个字段，其中任何非空值必须已经作为另一个表中的主键存在。对于图[5-3]中的表，`MemberType`
    是引用 `Type` 表的外键，这意味着 `MemberType` 列中的任何值都必须已经存在于 `Type` 表中。对于 `Coach` 列，“另一个”表是
    `Member` 表本身。以下SQL语句展示了我们如何使用 `ALTER` 命令添加新的外键列 `Coach`：


    ```sql

    ALTER TABLE Member

    ADD Coach INT FOREIGN KEY REFERENCES Member;

    ```


    有了修改后的 `Member` 表，我们现在可以回答几种不同类型的问题。例如：


    *   教练的姓名是什么？

    *   简·吉尔摩的教练是谁？

    *   有没有人被残疾程度更高的人指导？

    *   有没有女性被男性指导？


    这些问题都无法通过检查表中的单行来回答。我们需要的是对 `Member` 表进行自连接。理解自连接最简单的方法是看看我们如何创建它。'
  raw: '#### Comparing values with the results of aggregates


    Find the names of members with handicaps less than the average:


    ```

    SELECT m.LastName, m.FirstName FROM Member m WHERE m.Handicap <

    (SELECT AVG(Handicap) FROM Member);

    ```


    #### Update data


    Add a row in the `Entry` table for every junior for tournament 25 in 2016:


    ```

    INSERT INTO Entry (MemberID, TourID, Year)

    SELECT MemberID, 25, 2016

    FROM Member WHERE MemberType = ''Junior'';

    ```


    # 5. Self Joins


    When we select a subset of rows based on a condition in a `WHERE` clause, the
    condition is evaluated for each row independently. An example might be a query
    to find all the members who have entered tournament 36\. The condition `TourID
    = 36` can be evaluated for each row in the `Entry` table to achieve the required
    result. However, if we want to find members who have entered both tournaments
    36 and 24, we cannot do this by inspecting just one row of the `Entry` table.
    We need to find two rows (or entries) for the same member`—`one for each of the
    specified tournaments. A simple `WHERE` clause cannot achieve this.


    In this chapter we will look at self joins. With a join between two tables, we
    first make a Cartesian product that gives us a combination of rows from each table.
    In a self join, we do the same thing but with two copies of the same table. This
    provides us with every combination of pairs of rows from the original table. This
    is one way to write a query that needs information from more than one row in a
    table to satisfy some condition. It will enable us to answer questions involving
    the word both; for example, “Which members entered both these tournaments?” Self
    joins will also allow us to carry out queries on tables involved in self relationships.
    We’ll look at self relationships first.


    ## Self Relationships


    Let’s add some more information to our `Member` table. Suppose some members have
    coaches assigned to them. How do we represent that in the class diagrams we talked
    about in Chapter [1](#A158240_2_En_1_Chapter.html)? We could take the approach
    shown in Figure [5-1](#A158240_2_En_5_Chapter.html#Fig1), with two classes: `Member`
    and `Coach`. Recall what the lines and numbers mean. From left to right, a coach
    might have several members to train (the 0..n nearest the `Member` class). From
    right to left, a particular member might have a single coach or no coach (the
    0..1 nearest the `Coach` class).


    ![A158240_2_En_5_Fig1_HTML.jpg](A158240_2_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    Data model for coaches and members (not recommended!)


    The problem with the model in Figure [5-1](#A158240_2_En_5_Chapter.html#Fig1)
    is that coaches, in all probability, are members of the club. When we implement
    this model with a `Coach` table and a `Member` table, some people will have a
    row recording their details in each table. For example, Brenda Nolan has a row
    in the `Member` table. When she takes up a role as coach, we also would need a
    row about her in the `Coach` table. Now if Brenda gets a new phone number, someone
    has to remember to change it in both tables. In all likelihood this won’t happen,
    and we will end up with the old number in one of the tables.


    In this example we don’t actually have two separate classes of members and coaches.
    We have just one class of members, some of whom coach other members. This self
    relationship is shown in Figure [5-2](#A158240_2_En_5_Chapter.html#Fig2).


    ![A158240_2_En_5_Fig2_HTML.jpg](A158240_2_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    Data model for members coaching other members


    The relationship line in Figure [5-2](#A158240_2_En_5_Chapter.html#Fig2) can be
    read in a clockwise direction to say that a particular member might coach several
    other members or none (0..n). In the other direction, we can read that a particular
    member might have one coach or none (0..1).


    In Chapter [1](#A158240_2_En_1_Chapter.html) we showed how to represent a 1`–`Many
    relationship by adding a column to the table at the 1 end of the relationship,
    which will have values from the primary key of the table at the other end. The
    model in Figure [5-2](#A158240_2_En_5_Chapter.html#Fig2) is exactly the same type
    of 1`–`Many relationship, except that we have the same table at each end, hence
    a self relationship. To represent the relationship we can add a column, `Coach`,
    in the `Member` table, as shown in Figure [5-3](#A158240_2_En_5_Chapter.html#Fig3).
    The values in the `Coach` field must also exist in the key field `MemberID`.


    ![A158240_2_En_5_Fig3_HTML.jpg](A158240_2_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    Column Coach added to the Member table


    The first row in the table in Figure [5-3](#A158240_2_En_5_Chapter.html#Fig3)
    tells us that Melissa is coached by member 153, and we can see from the third
    line of the table that member 153 is Brenda. We need the value in the `Coach`
    field to be constrained to being one of our existing members so that we cannot
    accidentally add an invalid member number in the `Coach` column. We can do this
    by making the `Coach` field a foreign key. Recall from Chapter [1](#A158240_2_En_1_Chapter.html)
    that a foreign key is a field where any non-empty values in the field must already
    exist as a primary key in another table. For the table in Figure [5-3](#A158240_2_En_5_Chapter.html#Fig3),
    `MemberType` is a foreign key referring to the `Type` table, meaning that any
    value in the `MemberType` column must already exist in the `Type` table. For the
    `Coach` column, the “other” table is the `Member` table itself. The following
    SQL statement shows how we would use the `ALTER` command to add the new foreign
    key column `Coach`:


    ```

    ALTER TABLE Member

    ADD Coach INT FOREIGN KEY REFERENCES Member;

    ```


    With the modified `Member` table, we now can answer several different types of
    questions. For example:


    *   What are the names of the coaches?

    *   What is the name of Jane Gilmore’s coach?

    *   Is anyone being coached by someone with a higher handicap?

    *   Are any women being coached by men?


    None of these questions can be answered by inspecting a single row in the table.
    What we require is a self join on the `Member` table. The easiest way to understand
    a self join is to see how we make one.'
