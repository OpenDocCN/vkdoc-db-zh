    ### 第二版新增内容


    我新增了一章专门讲解窗口函数，阐述了这些近期引入的概念如何为数据聚合与汇总提供功能性支持。


    此外，本书还包含一个附录，旨在以易于理解的方式介绍形式化关系概念及其表示法。


    致谢


    首先，我要向我的丈夫内维尔（Neville）表达万分感谢，他通读了每一章节并提供了许多宝贵建议。我要特别感谢我的一位读者斯科特·劳利（Scott Lawley），他给予了我有益的反馈，并建议将“代数”与“演算”这两个术语分别替换为更为友好的“过程导向法”和“结果导向法”。感谢我的编辑乔纳森·詹尼克（Jonathan
    Gennick）促成了这第二版的出版，同时感谢吉尔·巴尔扎诺（Jill Balzano）出色的协调工作。我也要感谢我的雇主泰普蒂尼理工学院（Tai Poutini
    Polytechnic）给予的支持。

