- fmt: '### A Process Approach


    We are starting with three tables, so we need some operation that combines data
    from more than one table. We can join the `Member` table to the `Entry` table
    and the result to the `Tournament` table, as shown in Figure [3-7](#A158240_2_En_3_Chapter.html#Fig7).


    ![A158240_2_En_3_Fig7_HTML.jpg](A158240_2_En_3_Fig7_HTML.jpg)


    Figure 3-7.


    Joining the Member, Entry, and Tournament tables


    The join condition for the first join between the `Member` and `Entry` tables
    is that `m.MemberID = e.MemberID` as shown by the rectangular boxes in Figure
    [3-7](#A158240_2_En_3_Chapter.html#Fig7). For the second join between the result
    of the first join and the `Tournament` table, the condition is that `e.TourID
    = t.TourID` as shown by the circles. It will not make any difference if we choose
    to do the join between `Entry` and `Tournament` first and then join the result
    to `Member`.


    The SQL to carry out the two joins is:


    ```sql

    SELECT *

    FROM (Member m INNER JOIN Entry e ON m.MemberID = e.MemberID)

    INNER JOIN Tournament t ON e.TourID = t.TourID;

    ```


    The virtual table resulting from the two joins in this query has all the information
    we require to answer our question. We just need to select the rows satisfying
    the conditions about the year and tournament name by adding a `WHERE` clause,
    and then project the name attributes by specifying them in the `SELECT` clause.
    The complete SQL query to return the names of everyone who entered the Leeston
    tournament in 2014 is:


    ```sql

    SELECT LastName, FirstName

    FROM (Member m INNER JOIN Entry e ON m.MemberID = e.MemberID)

    INNER JOIN Tournament t ON e.TourID = t.TourID

    WHERE TourName = ''Leeston''

    AND Year = 2014;

    ```


    ### Order of Operations


    In the description in the previous section, we joined all the tables first and
    then selected the appropriate rows and columns. The result of the join is an intermediate
    table (as in Figure [3-7](#A158240_2_En_3_Chapter.html#Fig7)) that is potentially
    extremely large if there are lots of members and tournaments. We could have done
    the operations in a different order. We could have first selected just the Leeston
    tournament from the `Tournament` table and the 2014 tournaments from the `Entry`
    tables, as shown in Figure [3-8](#A158240_2_En_3_Chapter.html#Fig8). Joining these
    two smaller tables with each other and then joining that result with `Member`
    would result in a much smaller intermediate table.


    ![A158240_2_En_3_Fig8_HTML.jpg](A158240_2_En_3_Fig8_HTML.jpg)


    Figure 3-8.


    Selecting rows from the Entry and Tournament tables before joining them


    So, should we worry about the order of the operations? The answer is “yes” — the
    order of operations makes a huge difference — but if you are using SQL, then it
    is not your problem to worry about. The SQL statement is always going to be the
    same, but with the tables possibly in a different order. The SQL statement is
    sent to the engine of whatever database program you are using, and the query will
    be optimized. This means the database program figures out the best order to do
    things. Some products do this extremely well, others not so well. Many products
    have analyzer tools that will let you see in what order things are being done.
    For many queries, writing your SQL differently doesn’t make much difference, but
    you can make things more efficient by providing indexes for your tables. We will
    look at these issues more closely in Chapter [9](#A158240_2_En_9_Chapter.html).


    ### An Outcome Approach


    The reason that the way we write our SQL statements often doesn’t affect the efficiency
    of a query is that SQL is fundamentally based on relational calculus, which describes
    the criteria the retrieved rows must meet. The original SQL standards did not
    even have keywords like `INNER JOIN`. SQL statements without these keywords describe
    what the retrieved rows should be like, so they do not have anything to say about
    how. Let’s look at an outcome approach to finding the names of members who entered
    Leeston tournaments in 2014.


    We want to retrieve just some names from the `Member` table. Forget joins, and
    think about how you would know whether a particular name should be retrieved if
    you were shown the three tables and knew nothing about databases or foreign keys
    or joins or anything. Imagine a finger `m` tracing down the table, as in Figure
    [3-9](#A158240_2_En_3_Chapter.html#Fig9).


    ![A158240_2_En_3_Fig9_HTML.jpg](A158240_2_En_3_Fig9_HTML.jpg)


    Figure 3-9.


    Using row variables to describe the rows that satisfy the query conditions


    Do we want to write out Barbara Olson, the name to which `m` is currently pointing?
    How would we know? Well, first we have to find a row with her ID (235) in the
    `Entry` table for the year 2014 such as the one where finger `e` is pointing.
    Then we have to find a row with that tournament ID (24) in the `Tournament` table
    and check it is a Leeston tournament. Looking at Figure [3-9](#A158240_2_En_3_Chapter.html#Fig9),
    we see that the rows where the three fingers are pointing give us enough information
    to know that Barbara Olson did indeed enter a Leeston tournament in 2014. This
    set of conditions describes what a row in the result table should be like.


    Now let’s write that last paragraph a bit more succinctly. Read the following
    sentence with reference to the rows denoted in Figure [3-9](#A158240_2_En_3_Chapter.html#Fig9):


    > I’ll write out the names from row `m` , where m comes from the `Member` table,
    if there is a row e in the Entry table where `m.MemberID` is the same as `e.MemberID`
    and `e.Year` is 2014 and there also exists a row t in the `Tournament` table where
    `e.TourID` is the same as `t.TourId` and `t.TourName` has the value “Leeston.”


    The SQL reflects the preceding paragraph. Look carefully at the following statement
    with reference to Figure [3-9](#A158240_2_En_3_Chapter.html#Fig9):


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m, Entry e, Tournament t

    WHERE m.MemberID = e.MemberID

    AND e.TourID = t.TourID

    AND t.TourName = ''Leeston'' AND e.Year = 2014;

    ```


    You can see how the SQL statement describes what a retrieved row should be like.
    If you look carefully at the statement, you can also spot the operations. The
    second line (the `FROM` clause) is a big Cartesian product, the next two lines
    are the join conditions (which would result in a table like the one in Figure
    [3-7](#A158240_2_En_3_Chapter.html#Fig7)), the final line selects the rows with
    the appropriate year and tournament name, and the `SELECT` clause line tells us
    to project just the names.


    The SQL preceding statement is equivalent to the one using the `INNER JOIN` keywords.
    They will both return the same set of rows: one reflects the underlying process
    of how, and the other reflects the underlying outcome of what.


    ### Expressing Joins Through Diagrammatic Interfaces


    This book is about queries in SQL, but most database products also provide a diagrammatic
    interface to express queries. Just for completeness, I’ll show you what a typical
    diagrammatic interface looks like for retrieving the names of members who entered
    the Leeston tournament in 2014.


    Figure [3-10](#A158240_2_En_3_Chapter.html#Fig10) shows the Microsoft Access interface,
    but most products have something very similar. The tables are represented by the
    rectangles in the top section with the lines showing the joins between them. The
    columns to be retrieved have a checkmark (√) in the row marked `Show`, and the
    conditions for selecting a particular row are shown for the relevant fields in
    the row marked `Criteria`.


    ![A158240_2_En_3_Fig10_HTML.jpg](A158240_2_En_3_Fig10_HTML.jpg)


    Figure 3-10.


    Microsoft Access digrammatic interface for the query to find names of members
    entering the Leeston tournament in 2014'
  raw: '### A Process Approach


    We are starting with three tables, so we need some operation that combines data
    from more than one table. We can join the `Member` table to the `Entry` table
    and the result to the `Tournament` table, as shown in Figure [3-7](#A158240_2_En_3_Chapter.html#Fig7).


    ![A158240_2_En_3_Fig7_HTML.jpg](A158240_2_En_3_Fig7_HTML.jpg)


    Figure 3-7.


    Joining the Member, Entry, and Tournament tables


    The join condition for the first join between the `Member` and `Entry` tables
    is that `m.MemberID = e.MemberID` as shown by the rectangular boxes in Figure
    [3-7](#A158240_2_En_3_Chapter.html#Fig7). For the second join between the result
    of the first join and the `Tournament` table, the condition is that `e.TourID
    = t.TourID` as shown by the circles. It will not make any difference if we choose
    to do the join between `Entry` and `Tournament` first and then join the result
    to `Member`.


    The SQL to carry out the two joins is:


    ```

    SELECT *

    FROM (Member m INNER JOIN Entry e ON m.MemberID = e.MemberID)

    INNER JOIN Tournament t ON e.TourID = t.TourID;

    ```


    The virtual table resulting from the two joins in this query has all the information
    we require to answer our question. We just need to select the rows satisfying
    the conditions about the year and tournament name by adding a `WHERE` clause,
    and then project the name attributes by specifying them in the `SELECT` clause.
    The complete SQL query to return the names of everyone who entered the Leeston
    tournament in 2014 is:


    ```

    SELECT LastName, FirstName

    FROM (Member m INNER JOIN Entry e ON m.MemberID = e.MemberID)

    INNER JOIN Tournament t ON e.TourID = t.TourID

    WHERE TourName = ''Leeston''

    AND Year = 2014;

    ```


    ### Order of Operations


    In the description in the previous section, we joined all the tables first and
    then selected the appropriate rows and columns. The result of the join is an intermediate
    table (as in Figure [3-7](#A158240_2_En_3_Chapter.html#Fig7)) that is potentially
    extremely large if there are lots of members and tournaments. We could have done
    the operations in a different order. We could have first selected just the Leeston
    tournament from the `Tournament` table and the 2014 tournaments from the `Entry`
    tables, as shown in Figure [3-8](#A158240_2_En_3_Chapter.html#Fig8). Joining these
    two smaller tables with each other and then joining that result with `Member`
    would result in a much smaller intermediate table.


    ![A158240_2_En_3_Fig8_HTML.jpg](A158240_2_En_3_Fig8_HTML.jpg)


    Figure 3-8.


    Selecting rows from the Entry and Tournament tables before joining them


    So, should we worry about the order of the operations? The answer is “yes” `—`
    the order of operations makes a huge difference `—` but if you are using SQL,
    then it is not your problem to worry about. The SQL statement is always going
    to be the same, but with the tables possibly in a different order. The SQL statement
    is sent to the engine of whatever database program you are using, and the query
    will be optimized. This means the database program figures out the best order
    to do things. Some products do this extremely well, others not so well. Many products
    have analyzer tools that will let you see in what order things are being done.
    For many queries, writing your SQL differently doesn’t make much difference, but
    you can make things more efficient by providing indexes for your tables. We will
    look at these issues more closely in Chapter [9](#A158240_2_En_9_Chapter.html).


    ### An Outcome Approach


    The reason that the way we write our SQL statements often doesn’t affect the efficiency
    of a query is that SQL is fundamentally based on relational calculus, which describes
    the criteria the retrieved rows must meet. The original SQL standards did not
    even have keywords like `INNER JOIN`. SQL statements without these keywords describe
    what the retrieved rows should be like, so they do not have anything to say about
    how. Let’s look at an outcome approach to finding the names of members who entered
    Leeston tournaments in 2014.


    We want to retrieve just some names from the `Member` table. Forget joins, and
    think about how you would know whether a particular name should be retrieved if
    you were shown the three tables and knew nothing about databases or foreign keys
    or joins or anything. Imagine a finger `m` tracing down the table, as in Figure
    [3-9](#A158240_2_En_3_Chapter.html#Fig9).


    ![A158240_2_En_3_Fig9_HTML.jpg](A158240_2_En_3_Fig9_HTML.jpg)


    Figure 3-9.


    Using row variables to describe the rows that satisfy the query conditions


    Do we want to write out Barbara Olson, the name to which `m` is currently pointing?
    How would we know? Well, first we have to find a row with her ID (235) in the
    `Entry` table for the year 2014 such as the one where finger `e` is pointing.
    Then we have to find a row with that tournament ID (24) in the `Tournament` table
    and check it is a Leeston tournament. Looking at Figure [3-9](#A158240_2_En_3_Chapter.html#Fig9),
    we see that the rows where the three fingers are pointing give us enough information
    to know that Barbara Olson did indeed enter a Leeston tournament in 2014. This
    set of conditions describes what a row in the result table should be like.


    Now let’s write that last paragraph a bit more succinctly. Read the following
    sentence with reference to the rows denoted in Figure [3-9](#A158240_2_En_3_Chapter.html#Fig9):


    > I’ll write out the names from row `m` , where m comes from the `Member` table,
    if there is a row e in the Entry table where `m.MemberID` is the same as `e.MemberID`
    and `e.Year` is 2014 and there also exists a row t in the `Tournament` table where
    `e.TourID` is the same as `t.TourId` and `t.TourName` has the value “Leeston.”


    The SQL reflects the preceding paragraph. Look carefully at the following statement
    with reference to Figure [3-9](#A158240_2_En_3_Chapter.html#Fig9):


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m, Entry e, Tournament t

    WHERE m.MemberID = e.MemberID

    AND e.TourID = t.TourID

    AND t.TourName = ''Leeston'' AND e.Year = 2014;

    ```


    You can see how the SQL statement describes what a retrieved row should be like.
    If you look carefully at the statement, you can also spot the operations. The
    second line (the `FROM` clause) is a big Cartesian product, the next two lines
    are the join conditions (which would result in a table like the one in Figure
    [3-7](#A158240_2_En_3_Chapter.html#Fig7)), the final line selects the rows with
    the appropriate year and tournament name, and the `SELECT` clause line tells us
    to project just the names.


    The SQL preceding statement is equivalent to the one using the `INNER JOIN` keywords.
    They will both return the same set of rows: one reflects the underlying process
    of how, and the other reflects the underlying outcome of what.


    ### Expressing Joins Through Diagrammatic Interfaces


    This book is about queries in SQL, but most database products also provide a diagrammatic
    interface to express queries. Just for completeness, I’ll show you what a typical
    diagrammatic interface looks like for retrieving the names of members who entered
    the Leeston tournament in 2014.


    Figure [3-10](#A158240_2_En_3_Chapter.html#Fig10) shows the Microsoft Access interface,
    but most products have something very similar. The tables are represented by the
    rectangles in the top section with the lines showing the joins between them. The
    columns to be retrieved have a checkmark (√) in the row marked `Show`, and the
    conditions for selecting a particular row are shown for the relevant fields in
    the row marked `Criteria`.


    ![A158240_2_En_3_Fig10_HTML.jpg](A158240_2_En_3_Fig10_HTML.jpg)


    Figure 3-10.


    Microsoft Access digrammatic interface for the query to find names of members
    entering the Leeston tournament in 2014'
