  trans: '## 总结


    在本章中，我们研究了对单表执行的查询。涵盖的一些要点包括：


    *   我们可以通过使用 `WHERE` 子句来返回满足给定条件的行子集。该条件是一个布尔表达式，即一个陈述，其结果要么为真，要么为假。该条件独立地应用于表中的每一行。

    *   `SELECT` 子句允许我们指定列的子集。

    *   由于查询的结果是一个行集合，我们无法保证行返回的顺序。如果我们希望以特定顺序显示结果，可以使用 `ORDER BY` 子句。

    *   可以创建一个视图，它本质上存储一条 SQL 命令，以便你可以随着基表中数据的变化反复运行它。

    *   表中很可能存在空值（无论是有意还是无意造成的）。务必检查你的条件将如何应用于空值。

    *   当你使用 SQL 命令投影列的子集时，默认会在结果中保留重复行。务必考虑如何处理重复项，如果你需要唯一的行，请使用关键字 `DISTINCT`。

    *   `WHERE` 子句一次只考虑一行。不要将其用于需要同时查看多行的查询，例如“谁同时参加了两个比赛”或“谁没有参加这个比赛”。


    脚注

    1

    在关系代数的正式术语中，从表（关系）中检索行（元组）子集被称为选择操作，而检索属性（列）子集被称为投影操作。更多信息请参见附录 2。


    2

    [`www.asciitable.com/`](http://www.asciitable.com/)


    3

    形式上，根据关系代数，每个操作的结果都会生成另一个关系或唯一的行集合。更多信息请参见附录 2。


    # 3. 连接初探


    在上一章中，我们研究了如何从单个表中检索行和/或列的子集。我们在第 1 章中看到，为了在数据库中准确地保存数据，信息的不同方面需要被分离到规范化的表中。大多数查询将需要来自两个或多个表的信息。根据我们试图提取的信息的性质，我们可以用几种不同的方式组合来自两个表的数据。最常遇到的两表操作就是连接。在第
    1 章中，我们还介绍了处理查询的两种不同方法：过程式方法和结果式方法。前者描述我们将如何组合表以获得所需数据，而后者描述检索到的数据必须满足什么标准。


    ## 连接的过程式方法


    连接使我们能够组合来自两个表的相关数据。我们将以一个例子开始，使用 `Member` 和 `Type` 表来查找高尔夫俱乐部每位会员的会员费。执行连接的第一步是一个称为笛卡尔积的操作。


    ### 笛卡尔积


    笛卡尔积是两表之间最通用的操作，因为它可以应用于任何形状的任何两个表。话虽如此，它本身很少产生特别有用的信息，因此它最主要的作用是作为连接的第一步。


    笛卡尔积有点像把两个表并排放在一起。让我们看一下图 3-1 中的两个表：一个简化的 `Member` 表和 `Type` 表。


    ![A158240_2_En_3_Fig1_HTML.jpg](img/A158240_2_En_3_Fig1_HTML.jpg)

    *图 3-1. 数据库中的两个永久表*


    由笛卡尔积产生的虚拟表将包含来自两个源表的每一列。结果表中的行由原始表中行的每一种组合构成。图 3-2 显示了笛卡尔积的前几行。


    ![A158240_2_En_3_Fig2_HTML.jpg](img/A158240_2_En_3_Fig2_HTML.jpg)

    *图 3-2. Member 和 Type 表之间笛卡尔积的前几行*


    我们有来自 `Member` 表的四列和来自 `Type` 表的两列，总共六列。来自 `Member` 表的每一行在结果表中与来自 `Type` 表的每一行并排出现。Melissa
    McKenzie 出现在四行中 —— 分别与 `Type` 表中的四行（Associate、Junior、Senior、Social）各出现一次。总行数将是两个表的行数相乘；换句话说，对于这个简化的
    `Member` 表，我们有 10 行乘以 4 行（来自 `Type`），总计 40 行。笛卡尔积可能产生非常、非常大的结果表，这就是为什么它们本身不能给我们提供太多有用信息的原因。


    笛卡尔积操作在 SQL 中用 `CROSS JOIN` 表示。用于检索图 3-2 所示数据的 SQL 是：


    ```sql

    SELECT *

    FROM Member m CROSS JOIN Type t;

    ```


    并非所有版本的 SQL 都支持相同的关键词和短语（例如，Microsoft Access 2013 不支持 `CROSS JOIN` 关键短语）。1992
    年，代表一些关系代数操作（如 `CROSS JOIN`）的关键词被添加到 SQL 标准中¹，此后已经历了多次更新。然而，并非所有供应商都采纳了标准的全部内容，而其他供应商则提供了额外的功能。本章稍后我们将探讨结果式方法，以提供等效的查询表达方式，这些方式在关系代数操作关键词不可用时也能使用。'
- fmt: '### Inner Join


    如果你查看图 [3-2](#A158240_2_En_3_Chapter.html#Fig2) 中的表格，你会发现大多数行都毫无意义。例如，第一、第三和第四行将初级会员
    Melissa McKenzie 与助理、高级和社交会员类型的信息放在一起。很难看出这些行有什么用处。然而，第二行——两个表中的会员类型匹配的那一行——是有用的，因为它让我们看到了
    Melissa 支付的费用。如果我们只取 `MemberType` 列的值与 `Type` 列的值匹配的那一部分行，那么我们就得到了关于每位会员费用的有用信息。图
    [3-3](#A158240_2_En_3_Chapter.html#Fig3) 展示了我们想要保留的行。


    ![A158240_2_En_3_Fig3_HTML.jpg](A158240_2_En_3_Fig3_HTML.jpg)


    图 3-3.

    笛卡尔积之后选择一个行子集


    图 [3-3](#A158240_2_En_3_Chapter.html#Fig3) 所示的操作（笛卡尔积后选择行的子集）被称为内连接（通常简称为连接）。我们用来选择行的条件称为连接条件。图
    [3-3](#A158240_2_En_3_Chapter.html#Fig3) 中内连接的 SQL 是：


    ```sql

    SELECT *

    FROM Member m INNER JOIN Type t ON m.MemberType = t.Type;

    ```


    使用了关键字 `INNER JOIN`，我们可以在关键字 `ON` 之后看到选择行的条件。再次提醒，你可能会发现某些 SQL 版本不支持 `INNER JOIN`
    这个短语；不过，我们将在本章后面看到其他表达此查询的方法。


    我们正在比较的两个列（`MemberType` 和 `Type`）必须是连接兼容的。形式上，这意味着它们必须来自同一个域或一组可能的值。实际上，连接兼容性通常意味着两个表中的列具有相同的数据类型。例如，两个列都将是整数或都是日期。不同的数据库产品对连接兼容性的解释可能不同。有些可能允许你连接一个表中的浮点数（带小数点的数字）和另一个表中的整数。有些可能对文本字段是否长度相同很挑剔（例如
    `CHAR(10)` 或 `CHAR(15)`），而其他则不然。我建议你不要尝试连接不同类型的字段，除非你非常清楚你的特定产品会怎么做。一如既往，最好的策略是在设计表时仔细思考。那些可能被连接的属性应该具有相同的类型。


    ## 连接的结果方法


    让我们来看一下使用结果方法 的连接。我们不会关注如何组合表，而是关注检索到的行必须满足什么标准。


    让我们从笛卡尔积开始：我们想要一组由每个贡献表的行组合而成的行。图 [3-4](#A158240_2_En_3_Chapter.html#Fig4) 展示了我们如何设想这一点。我们正在查看两个表，所以需要两根手指来跟踪行。手指
    `m` 依次查看 `Member` 表的每一行。目前它指向第 3 行。对于 `Member` 表中的每一行，手指 `t` 将指向 `Type` 表中的每一行。对于笛卡尔积，我们保留行的每一种组合。就图
    [3-4](#A158240_2_En_3_Chapter.html#Fig4) 而言，笛卡尔积可以用自然语言表达为：


    > 我会写出来自行 `m` 的所有属性和来自行 `t` 的所有属性，只要 `m` 来自 `Member` 表且 `t` 来自 `Type` 表。


    ![A158240_2_En_3_Fig4_HTML.jpg](A158240_2_En_3_Fig4_HTML.jpg)


    图 3-4.

    行变量 m 和 t 分别指向 Member 表和 Types 表中的每一行


    图 [3-4](#A158240_2_En_3_Chapter.html#Fig4) 所表示的查询的 SQL（其结果如图 [3-2](#A158240_2_En_3_Chapter.html#Fig2)
    所示）是：


    ```sql

    SELECT *

    FROM Member m, Type t;

    ```


    前面的语句将返回与我们之前使用 `CROSS JOIN` 短语的表达式相同的行。


    对于连接，我们有一个额外的条件：我们只想检索那些来自每个表的会员类型相同的行组合。我们可以用自然语言表达为：


    > 我会写出来自行 `m` 的所有属性和来自行 `t` 的所有属性，只要 `m` 来自 `Member` 表且 t 来自 Type 表，并且 `m.MemberType
    = t.Type`。


    图 [3-5](#A158240_2_En_3_Chapter.html#Fig5) 中描绘的一对行满足该条件，因此将被检索。如果 `m` 保持原位而 `t`
    向下移动一行，则该条件将不再满足，新的组合将不会被包括。


    ![A158240_2_En_3_Fig5_HTML.jpg](A158240_2_En_3_Fig5_HTML.jpg)


    图 3-5.

    将在 m.MemberType = t.Type 时检索行


    我们可以将图 [3-5](#A158240_2_En_3_Chapter.html#Fig5) 描述的查询转化为 SQL 如下：


    ```sql

    SELECT *

    FROM Member m, Type t

    WHERE m.MemberType = t.Type;

    ```


    如果我们仔细查看前面的语句，可以看到前两行代表笛卡尔积，而最后一行中的 `WHERE` 子句正在选择会员类型相同的行的子集。这正是我们在上一节定义内连接的方式。前面的语句将产生与我们之前用于内连接的语句相同的行，再次展示如下：


    ```sql

    SELECT *

    FROM Member m INNER JOIN Type t ON m.MemberType = t.Type;

    ```


    第一个语句说明了要检索的行是什么样子（结果方法），第二个语句表达了我们应该使用什么操作来检索这些行（过程方法）。你用哪一个并不重要——这仅仅取决于你如何思考这个查询。有时，表达查询的方式可能会影响性能，我们将在第
    [9](#A158240_2_En_9_Chapter.html) 章更详细地讨论这一点。实际上，大多数数据库产品在优化或寻找执行查询的最快方式方面都非常智能，无论你如何表达它。例如，在
    SQL Server 中，所示连接的两种表达式是以相同方式执行的。事实上，在 SQL Server 2013 中，如果你将第一个语句中的代码输入到用于创建视图的默认界面中，它将被使用
    `INNER JOIN` 短语的代码所替换。


    ## 扩展连接查询


    现在我们已将连接添加到我们的操作库中，我们可以执行多种类型的查询。因为连接的结果（与任何操作一样）是另一个表，所以我们可以将该结果连接到第三个表（然后再连接另一个表），然后选择并投影行和列以获得所需的结果。


    让我们看一个使用图 [3-6](#A158240_2_En_3_Chapter.html#Fig6) 中表的例子。`Entry` 表使用两个外键（`MemberID`
    和 `TourID`）来维护哪些会员参加了不同比赛的信息。`Entry` 表的第一行表示会员 118 在 2014 年参加了第 24 场比赛。如果我们需要任何额外的信息（例如会员姓名或比赛名称），我们需要使用外键分别在
    `Member` 表和 `Tournament` 表 中找到相应的行。


    ![A158240_2_En_3_Fig6_HTML.jpg](A158240_2_En_3_Fig6_HTML.jpg)


    图 3-6.

    俱乐部数据库中的永久表


    让我们找出 2014 年参加 Leeston 比赛的每个人的姓名。我将描述两种不同的方法，你可能会发现其中一种比另一种更吸引你。'
  raw: '### Inner Join


    If you look at the table in Figure [3-2](#A158240_2_En_3_Chapter.html#Fig2), you
    can see that most of the rows are quite meaningless. For example, the first, third,
    and fourth rows have the junior member Melissa McKenzie alongside information
    about the associate, senior, and social membership types. It is difficult to see
    how these rows will ever be useful. However, the second row, where the member
    types from each table match, is useful because it allows us to see what fee Melissa
    pays. If we take just the subset of rows where the value in the `MemberType` column
    matches the value in the `Type` column, then we have useful information about
    the fees for each of our members. Figure [3-3](#A158240_2_En_3_Chapter.html#Fig3)
    shows the rows we would like to retain.


    ![A158240_2_En_3_Fig3_HTML.jpg](A158240_2_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    Cartesian product followed by selecting a subset of rows


    The operation shown in Figure [3-3](#A158240_2_En_3_Chapter.html#Fig3) (a Cartesian
    product followed by selecting a subset of rows) is known as an inner join (often
    just called a join). The condition we use to select the rows is known as the join
    condition. The SQL for the inner join in Figure [3-3](#A158240_2_En_3_Chapter.html#Fig3)
    is:


    ```

    SELECT *

    FROM Member m INNER JOIN Type t ON m.MemberType = t.Type;

    ```


    The keyword `INNER JOIN` is used, and we can see the condition for selecting the
    rows after the keyword `ON`. Once again, you may find that some versions of SQL
    do not support the phrase `INNER JOIN`; however, we will see other ways to express
    the query later in this chapter.


    The two columns that we are comparing (`MemberType` and `Type`) must be join compatible.
    Formally, this means they must both come from the same domain or set of possible
    values. In practical terms, join compatibility usually means that the columns
    in each of the tables have the same data type. For example, both columns will
    be integers or both dates. Different database products may interpret join compatibility
    differently. Some might let you join on a float (number with a decimal point)
    in one table and an integer in another. Some may be fussy about whether text fields
    are the same length (for example `CHAR(10)` or `CHAR(15)`), and others may not.
    I recommend you don’t try to join on fields with different types unless you are
    very clear what your particular product does. The best strategy, as always, is
    to think carefully when you design your tables. Those attributes that are likely
    to be joined should have the same types.


    ## Outcome Approach to Joins


    Let’s take a look at joins with the outcome approach . Rather than look at how
    we will combine the tables, we will look at what criteria the retrieved rows must
    meet.


    Let’s start with the Cartesian product: we want a set of rows made up of combinations
    of rows from each of the contributing tables. Figure [3-4](#A158240_2_En_3_Chapter.html#Fig4)
    shows how we can envisage this. We are looking at two tables, so we need two fingers
    to keep track of the rows. Finger `m` looks at each row of the `Member` table
    in turn. Currently it is pointing at row 3\. For each row in the `Member` table,
    finger `t` will point to each row in the `Type` table. For the Cartesian product
    we retain every combination of the rows. In terms of Figure [3-4](#A158240_2_En_3_Chapter.html#Fig4)
    the Cartesian product can be expressed in natural language as:


    > I’ll write out all the attributes from row `m` and all the attributes from row
    `t` so long as `m` comes from the `Member` table and `t` comes from the `Type`
    table.


    ![A158240_2_En_3_Fig4_HTML.jpg](A158240_2_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Row variables m and t point to each row in the Member and Types tables, respectively


    The SQL for the query represented in Figure [3-4](#A158240_2_En_3_Chapter.html#Fig4)
    and that results in the output shown in Figure [3-2](#A158240_2_En_3_Chapter.html#Fig2)
    is:


    ```

    SELECT *

    FROM Member m, Type t;

    ```


    The preceding statement will return the same rows as the expression we had previously
    used that used the `CROSS JOIN` phrase.


    For a join we have the extra condition that we want to retrieve only those combinations
    of rows where the membership type from each table is the same. We can express
    this in natural language as:


    > I’ll write out all the attributes from row `m` and all the attributes from row
    `t` so long as `m` comes from the `Member` table and t comes from the Type table
    and `m.MemberType = t.Type`.


    The pair of rows depicted in Figure [3-5](#A158240_2_En_3_Chapter.html#Fig5) satisfies
    that condition and so will be retrieved. If `m` stays where it is and `t` moves
    down a row, then the condition will no longer be satisfied and the new combination
    will not be included.


    ![A158240_2_En_3_Fig5_HTML.jpg](A158240_2_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    Rows will be retrieved where m.MemberType = t.Type


    We can translate the query depicted in Figure [3-5](#A158240_2_En_3_Chapter.html#Fig5)
    into SQL as follows:


    ```

    SELECT *

    FROM Member m, Type t

    WHERE m.MemberType = t.Type;

    ```


    If we look carefully at the preceding statement we can see that the first two
    lines represent the Cartesian product, and the `WHERE` clause in last line is
    selecting a subset of the rows where the membership types are the same. This was
    how we defined an inner join in the previous section. The preceding statement
    will produce the same rows as our previous statement for an inner join, seen again
    here:


    ```

    SELECT *

    FROM Member m INNER JOIN Type t ON m.MemberType = t.Type;

    ```


    The first statement says what the rows to be retrieved are like (outcome approach)
    and the second expresses what operation we should use to retrieve those rows (process
    approach). Which one you use does not matter`—`it just depends on how you find
    yourself thinking about the query. Sometimes there is a possibility that the way
    you express the query may affect the performance, and we will talk about this
    more in Chapter [9](#A158240_2_En_9_Chapter.html). Actually, most database products
    are pretty smart at optimizing, or finding the quickest way to perform a query,
    regardless of how you express it. For example, in SQL Server the two expressions
    for the join shown are carried out in the same way. In fact, in SQL Server 2013,
    if you type the code in the first statement into the default interface for creating
    a view, it will be replaced by the code using the `INNER JOIN` phrase.


    ## Extending Join Queries


    Now that we have added joins to our arsenal of operations, we can perform numerous
    types of queries. Because the result of a join (as with any operation) is another
    table, we can then join that result to a third table (and then another) and then
    select and project rows and columns to achieve the required result.


    Let’s look at an example using the tables in Figure [3-6](#A158240_2_En_3_Chapter.html#Fig6).
    The `Entry` table uses two foreign keys (`MemberID` and `TourID`) to maintain
    information about which members have entered the different tournaments. The first
    line in the `Entry` table says that member 118 entered tournament 24 in 2014\.
    If we require any additional information (say, the name of a member or name of
    a tournament), we need to use the foreign keys to find the appropriate rows in
    the `Member` and `Tournament` tables , respectively.


    ![A158240_2_En_3_Fig6_HTML.jpg](A158240_2_En_3_Fig6_HTML.jpg)


    Figure 3-6.


    Permanent tables in the club database


    Let’s find the names of everyone who entered the Leeston tournament in 2014\.
    I’ll describe two different approaches, and you will probably find that one appeals
    to you more than the other.'
