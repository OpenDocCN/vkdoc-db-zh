  trans: '

    ## 谨慎使用 `NOT` 和 `<>`


    除了询问诸如“已参加公开赛的会员 ID 有哪些？”这样的问题外，我们同样可能想知道“未参加公开赛的会员 ID 有哪些？”。两者听起来非常相似，但一旦在问题中使用否定词，我们就必须非常清楚自己真正的意图。在第
    7 章中，我们将探讨如何使用集合运算来构造查询，但为了保持本章内容的完整性，我将特别讨论否定词对子查询使用的影响。


    在上一节中，我们为检索已参加公开赛的会员的会员 ID 构建了两条 SQL 语句。一条使用了子查询，另一条使用了联结。为了查找谁没有参加公开赛，有人可能会尝试在子查询示例中将
    `IN` 改为 `NOT IN`，如下所示：


    ```sql

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID NOT IN

    (SELECT t.TourID

    FROM Tournament t

    WHERE t.TourType = ''Open'');

    ```


    在联结示例中，人们倾向于将 `t.TourType = ''Open''` 修改为 `t.TourType <> ''Open''`：


    ```sql

    SELECT e.MemberID

    FROM Entry e INNER JOIN Tournament t ON e.TourID = t.TourID

    WHERE t.TourType <> ''Open'';

    ```


    仔细思考一下这两条查询会返回哪些行。事实上，它们返回的是同一组行，但这组行可能既包括参加了公开赛的会员，也包括未参加的。


    图 4-2 中的表格显示了 `Entry` 和 `Tournament` 表内联结的结果。底部的一组行都对应公开赛，这些行会被条件为 `WHERE t.TourType
    = ''Open''` 的查询检索到。顶部的一组条目对应公开赛以外的比赛，这些行会被条件为 `WHERE t.TourType <> ''Open''` 的查询检索到。


    ![A158240_2_En_4_Fig2_HTML.jpg](img/A158240_2_En_4_Fig2_HTML.jpg)


    图 4-2. TourType = ‘Open’ 与 TourType <> ‘Open’ 的对比


    我们可以看到，一些会员（用圆圈标出）同时出现在两个集合中。图 4-3 是对图 4-2 表格中信息的另一种呈现方式，但它显示的是两组会员而非条目：上面的圆圈代表参加了公开赛的会员，下面的圆圈代表参加了非公开赛的会员。有四名会员同时属于这两个集合。


    ![A158240_2_En_4_Fig3_HTML.gif](img/A158240_2_En_4_Fig3_HTML.gif)


    图 4-3. 参加了公开赛、其他比赛或两者都参加了的会员


    现在让我们回到最初的问题。哪些会员没有参加过公开赛？我们必须小心区分图 4-4 所描绘的两个集合。


    ![A158240_2_En_4_Fig4_HTML.gif](img/A158240_2_En_4_Fig4_HTML.gif)


    图 4-4. 谨慎区分这两种情况的 SQL 至关重要


    图 4-4a 显示的是从未参加过任何公开赛的人员集合。图 4-4b 显示的是那些参加了非公开赛的会员（但不排除他们可能同时也参加了公开赛）。例如，会员 118
    从未参加过公开赛，而会员 228 既参加过公开赛，也参加过其他类型的比赛。


    本节开头的两条查询都将检索到图 4-4b 所示的会员集合。会员 228（他参加过公开赛）会被返回（因为他参加过一个非公开赛）。这不是我们想要的结果，并且是一个非常常见的错误。


    要判断某人是否参加了公开赛，我们只需要找到一个匹配的条目。要判断某人是否没有参加过公开赛，我们需要检查所有的公开赛条目，以确保该会员没有出现。


    就图 4-2 中的联结表而言，查找那些参加了公开赛的人员只需要一个简单的 `WHERE` 子句：`WHERE t.TourType = ''Open''`。请记住，为了确定是否满足
    `WHERE` 子句中的条件，会独立检查每一行。然而，要查找没有参加过公开赛的人员，我们需要检查表中的每一行，以确保某个特定会员没有条目。这是一个复杂得多的任务。事实上，我们还需要考虑从未参加过任何比赛的会员。这些会员的
    ID 根本不会出现在 `Entry` 表中，因此我们还必须检查 `Member` 表以获取完整的列表。


    查找未参加过公开赛的会员可以通过使用第 7 章中的集合运算采用过程式方法实现。但是，我们也可以使用结果导向的方法来构建准确的查询。为此，我们需要首先介绍 `EXISTS`
    关键字。

    '
- fmt: '## EXISTS Keyword


    Let''s start with a simple question. For example, “What are the names of all members
    who have ever entered any tournament?” We can start by thinking in terms of which
    rows of the `Member` table would satisfy our question. Consider the following
    sentence and Figure 4-5 together:


    > I''ll write out the names from row m, where m comes from the `Member` table,
    if there exists a row e in the `Entry` table where `m.MemberID = e.MemberID`.


    ![A158240_2_En_4_Fig5_HTML.jpg](A158240_2_En_4_Fig5_HTML.jpg)

    Figure 4-5. William Cooper has entered a tournament because a matching row exists
    in the Entry table


    We can translate the statement


    > I''ll write out the names from row m, where m comes from the `Member` table,
    if there exists a row e in the `Entry` table where `m.MemberID = e.MemberID`.


    almost directly into SQL with the use of the keyword `EXISTS`:


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE EXISTS

    (SELECT * FROM Entry e WHERE e.MemberID = m.MemberID);

    ```


    This is another example of a nested query where we have two SQL `SELECT` statements,
    one inside the other. This one is a little different from the simpler example
    we saw earlier in the chapter. The `WHERE` condition in the inner query refers
    to part of the row being considered in the outer query; that is, `e.MemberID =
    m.MemberID`. I find the easiest way to interpret these nested queries is with
    reference to a diagram like Figure 4-5. Variable `m` is checking each row in the
    `Member` table. The inner query is looking for a row in the `Entry` table with
    the same value for `MemberID` as the row under consideration in the `Member` table.
    If such a row (or several such rows) `EXIST`, then we are in business.


    For those of you who are thinking that this seems like a complicated way to get
    a simple result, you are right (partly). The query using the `EXISTS` clause retrieves
    the same members as an inner join (on `MemberID`) between `Member` and `Entry`
    does.


    However, what if we want those members who have not entered a tournament? This
    requires only a tiny change to our new SQL query. Instead of looking for members
    where a matching row in `Entry` exists, we now want those where a matching row
    does not exist. Adding the word `NOT` to the previous SQL statements gives us
    what we require:


    ```sql

    SELECT m.Lastname, m.FirstName

    FROM Member m

    WHERE NOT EXISTS

    (SELECT * FROM Entry e WHERE e.MemberID = m.MemberID);

    ```


    The `NOT EXISTS` construction will look through every row `e` in the `Entry` table,
    checking whether there is a row matching the `MemberID` of the current row in
    the `Member` table. The name of the member will be retrieved only if no matching
    row is found.


    Now we have enough ammunition to tackle the query about members who have not entered
    an Open tournament. Check out Figure 4-6 to decide if William Cooper should be
    included in the result.


    ![A158240_2_En_4_Fig6_HTML.jpg](A158240_2_En_4_Fig6_HTML.jpg)

    Figure 4-6. There does exist an entry for an Open tournament for William Cooper


    The rows indicated in Figure 4-6 show that there does exist an entry for William
    Cooper, so we will not include him our result.


    Now, look at this natural language statement that describes Figure 4-6:


    > I''ll write out the names from row m, where m comes from the `Member` table,
    so long as there does not exist (a row e in the `Entry` table where `m.MemberID
    = e.MemberID` along with a row t in the Tournament table where `e.TourID = t.TourID
    and t.TourType = ''Open'')`


    The SQL reflecting the preceding statement is:


    ```sql

    SELECT m.Lastname, m.FirstName

    FROM Member m

    WHERE NOT EXISTS

    (SELECT * FROM Entry e, Tournament t

    WHERE m.MemberID = e.MemberID

    AND e.TourID = t.TourID AND t.TourType = ''Open'');

    ```


    We will look at the process approach to queries like this one when we cover set
    operations in Chapter 7.


    ## Different Types of Subqueries


    We saw different types of subqueries in the previous sections. It is useful to
    review some of the options here. The inner part of the nested query can return
    a single value (e.g, Barbara''s handicap), a set of values (e.g., the IDs of Open
    tournaments), or a set of rows (e.g., entries in Open tournaments). Also, the
    inner and outer queries can be independent to some extent, or they can be correlated.


    ### Inner Queries Returning a Single Value


    Inner queries that return a single value are often useful in the situation where
    you are simply retrieving a subset of rows. Let''s consider the handicaps of our
    members, as shown in Figure 4-7.


    ![A158240_2_En_4_Fig7_HTML.jpg](A158240_2_En_4_Fig7_HTML.jpg)

    Figure 4-7. Part of the Member table showing names and handicaps


    If we want to find those members with a handicap of less than 16, then this can
    be done simply with the following SQL:


    ```sql

    SELECT *

    FROM Member m

    WHERE m.Handicap < 16;

    ```


    What should we do if we want to find all the members with a handicap less than
    Barbara Olson''s? The preceding query will do that for us, but only if Barbara''s
    handicap of 16 doesn''t change. For the query to work for whatever Barbara''s
    current handicap is, we can replace the single value 16 with the result of an
    inner query:


    ```sql

    SELECT *

    FROM Member m

    WHERE Handicap <

    (SELECT Handicap

    FROM Member

    WHERE LastName = ''Olson'' AND FirstName = ''Barbara'');

    ```


    We need to compare `Handicap` with a single value. If in a situation like this
    our inner query returns more than one value (for example, if there were more than
    one Barbara Olson in the club), then we would get an error when trying to run
    the query.


    An inner query returning a single value is also useful if we want to compare values
    with an aggregate of some sort. For example, we might want to find all the members
    who have a handicap less than the average. In this case, we can use the inner
    query to return the average value:


    ```sql

    SELECT *

    FROM Member m

    WHERE m.Handicap <

    (SELECT AVG(Handicap)

    FROM Member);

    ```


    If you take it nice and slow, you can gradually build up quite complicated queries.
    Say we want to see whether any junior members have a lower handicap than the average
    for seniors. The inner query has to return the average value handicap for a senior
    member, and then we want to select all juniors with a handicap less than that.
    In the SQL statement that follows, both the inner and outer queries have an extra
    `SELECT` condition (the inner retrieves just seniors, and the outer retrieves
    just juniors):


    ```sql

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Junior'' AND Handicap < (

    SELECT AVG(Handicap)

    FROM Member

    WHERE MemberType = ''Senior'');

    ```


    ### Inner Queries Returning a Set of Values


    This is where we started this chapter. When we use the `IN` keyword, SQL will
    expect to find a set of single values. For example, we might ask for rows from
    the `Entry` table for members with IDs `IN` a set of values. In the following
    statement, the inner query selects the IDs of all senior members, and the outer
    query returns the entries for those members:


    ```sql

    SELECT *

    FROM Entry e

    WHERE e.MemberID IN

    (SELECT m.MemberID

    FROM Member m

    WHERE m.MemberType = ''Senior'');

    ```


    The inner section in this type of query must return just a single column. `IN`
    is expecting a list of single values (in this case, a list of `MemberID`). If
    the inner section returns more than one column (for example, `SELECT * FROM Member`),
    then we will get an error.


    Many nested queries such as this can be written in other ways—often by using an
    inner join as we discussed earlier in the chapter. Some queries will feel more
    natural to you one way or the other.'
