- fmt: '## Uses of Intersection


    A common use of the intersection operation is the one shown in Figure [7-13](#A158240_2_En_7_Chapter.html#Fig13):
    finding common rows in two tables with similar information. Another very common
    use of intersection is answering questions that include the word both. A typical
    example is “Which members have entered both tournaments 36 and 38?” The `Entry`
    table is reproduced in Figure [7-14](#A158240_2_En_7_Chapter.html#Fig14).


    ![A158240_2_En_7_Fig14_HTML.jpg](A158240_2_En_7_Fig14_HTML.jpg)


    Figure 7-14. The `Entry` table


    What will be returned if we retrieve the rows for each tournament and take the
    intersection as in the following query?


    ```sql

    SELECT * FROM Entry WHERE TourID = 36

    INTERSECT

    SELECT * FROM Entry WHERE TourID = 38;

    ```


    There will be no rows returned. Figure [7-15](#A158240_2_En_7_Chapter.html#Fig15)
    will help you understand why.


    ![A158240_2_En_7_Fig15_HTML.jpg](A158240_2_En_7_Fig15_HTML.jpg)


    Figure 7-15. Two queries have no rows in common, so no rows result from intersection


    The two queries will never have any rows in common because one will always have
    36 in the `TourID` column while the other will always have 38. Essentially, the
    query we were trying to carry out was to find all the entries for tournament 36
    that are also entries for tournament 38. The result, given the way we are managing
    entries, is none.


    To retrieve the members who are in common in the two sets of rows in Figure [7-15](#A158240_2_En_7_Chapter.html#Fig15),
    we must retrieve just the `MemberID` column before carrying out the intersection,
    as in the query here:


    ```sql

    SELECT MemberID FROM Entry WHERE Tourid = 36

    INTERSECT

    SELECT MemberID FROM Entry WHERE Tourid = 38;

    ```


    This query is illustrated in Figure [7-16](#A158240_2_En_7_Chapter.html#Fig16).
    As with a union, the result of the intersection operation returns unique rows.


    ![A158240_2_En_7_Fig16_HTML.jpg](A158240_2_En_7_Fig16_HTML.jpg)


    Figure 7-16. Using intersection to find members entered in both tournaments 36
    and 38


    Suppose we now want to find the names of the members. From a process point of
    view, we can take the result of the intersection and join it with the `Member`
    table to get the names, as shown in Figure [7-17](#A158240_2_En_7_Chapter.html#Fig17).


    ![A158240_2_En_7_Fig17_HTML.jpg](A158240_2_En_7_Fig17_HTML.jpg)


    Figure 7-17. Joining the intersection with the `Member` table to find the names


    So what does the SQL look like to first do the intersection and then join with
    the `Member` table? The following is a good first attempt, but unfortunately will
    not work:


    ```sql

    --Will not work

    SELECT LastName, FirstName

    FROM Member m INNER JOIN

    (SELECT e1.MemberID FROM Entry e1 WHERE e1.TourID = 36

    INTERSECT

    SELECT e2.MemberID FROM Entry e2 WHERE e2.TourID = 38)

    ON m.MemberID = e1.MemberID;

    ```


    The tables that only appear inside the inner query (the part in parentheses) are
    not able to be referenced by the outer query (the join). This is easily resolved
    by giving the nested part of the query an alias. In the same way we have given
    the `Member` table an alias by putting an `m` after `Member` in the `FROM` clause,
    we can give the whole inner query an alias of `NewTable` (as an example) by putting
    `NewTable` after the final parenthesis of the inner query. We can now refer to
    that alias in the join condition as shown in the query here:


    ```sql

    SELECT LastName, FirstName

    FROM Member m INNER JOIN

    (SELECT e1.MemberID FROM Entry e1 WHERE e1.TourID = 36

    INTERSECT

    SELECT e2.MemberID FROM Entry e2 WHERE e2.TourID = 36) NewTable

    ON m.MemberID = NewTable.MemberID;

    ```


    Another way to retrieve the names is to use a nested query. Here, the inner query
    retrieves the IDs that are in the intersection, and the outer query finds the
    corresponding names from the `Member` table.


    ```sql

    SELECT LastName, FirstName

    FROM Member

    WHERE MemberID IN

    (SELECT MemberID FROM Entry WHERE TourID = 36

    INTERSECT

    SELECT MemberID FROM Entry WHERE TourID = 38);

    ```


    ### The Importance of Projecting Appropriate Columns


    It is important to think very carefully about which columns are included in the
    tables involved in an intersection operation. We saw in the previous section how
    the following query will return no rows:


    ```sql

    SELECT * FROM Entry WHERE TourID = 36

    INTERSECT

    SELECT * FROM Entry WHERE TourID = 38;

    ```


    The rows from the first query will always have 36 as the value of `TourID` and
    the rows from the second query will have 38. There will never be any rows in common.
    Retrieving just the `MemberID` in each of the queries solves this problem.


    More interesting is that correctly projecting different columns can provide answers
    to quite different questions. How would you describe the rows returned by the
    following query?


    ```sql

    SELECT MemberID, Year FROM Entry WHERE TourID = 25

    INTERSECT

    SELECT MemberID, Year FROM Entry WHERE TourID = 36;

    ```


    The query is illustrated in Figure [7-18](#A158240_2_En_7_Chapter.html#Fig18).


    ![A158240_2_En_7_Fig18_HTML.jpg](A158240_2_En_7_Fig18_HTML.jpg)


    Figure 7-18. What does the intersection mean?


    In Figure [7-18](#A158240_2_En_7_Chapter.html#Fig18), we are finding all the members
    who entered tournaments 25 and 36 in the same year. This is why there is no entry
    for member 415 in the intersection: he entered tournament 25 in 2013 and tournament
    36 in 2014 and 2015. Although his member ID appears in the two contributing tables,
    the corresponding rows are for different years. There is no row for member 415
    that is the same in both tables.


    As you can see, the choice of columns that are projected for the contributing
    tables is fundamental to what will appear in the intersection. It means there
    are many different questions that can be answered very elegantly, but it also
    means that you can easily get incorrect answers if you don’t think the query through
    carefully.'
