- fmt: '### Filtering the Result of an Aggregate Query


    Once we have calculated some aggregates for groups of rows, we may want to ask
    some questions about the results. For example, in Figure [8-9](#A158240_2_En_8_Chapter.html#Fig9),
    we have the number of entries in each tournament in each year. A likely question
    is “Which tournaments had three or more entries?” Looking at the result table
    in Figure [8-9](#A158240_2_En_8_Chapter.html#Fig9), we want to select just those
    rows in the aggregated output with a count greater than or equal to `3`. We can
    do this with the `HAVING` keyword. Take a look at the following query:


    ```sql

    SELECT TourID, Year, COUNT(*) AS NumEntries

    FROM Entry

    GROUP BY TourID, Year

    HAVING COUNT(*) >= 3;

    ```


    The `HAVING` clause always comes after a `GROUP BY` clause. The aggregate and
    the grouping is carried out first, and the output rows matching some condition
    (in this case, `COUNT(*) >= 3`) are selected. It is like having a `WHERE` clause
    that acts on the aggregated numbers. As a little aside, we must use `COUNT(*)`
    in the `HAVING` clause; we can’t use the alias `NumEntries` from the first line
    of the statement. This alias is just used at the end of the query to label the
    output column.


    Let’s look at another example. Say we want to find those members who have entered
    four or more tournaments. First, construct a set of rows with the members and
    the counts of the tournaments they have entered, as in the first three lines of
    the query that follows. We then use the `HAVING` clause to select just those rows
    from the result with `COUNT(*) >= 4`:


    ```sql

    SELECT MemberID, COUNT(*) AS NumEntries

    FROM Entry

    GROUP BY MemberID

    HAVING COUNT(*) >= 4;

    ```


    We have two opportunities to select a subset of rows in queries involving aggregates.
    If we take the subset before we do the aggregation, we use a `WHERE` clause. When
    we want to select just some rows after the aggregation, we use a `HAVING` clause.
    For example, let’s change the previous query to find out which members have entered
    more than four Open tournaments. To find the Open tournaments, we need to do the
    following:


    Join the `Entry` table with the `Tournament` table.

    Take just the subset of entries for Open tournaments (with a `WHERE` clause).

    Group the entries for each member and count them.

    Take the resulting aggregate table and retrieve just those rows with a count greater
    than 4 (with a `HAVING` clause).


    The process is illustrated in Figure [8-11](#A158240_2_En_8_Chapter.html#Fig11).


    ![A158240_2_En_8_Fig11_HTML.jpg](A158240_2_En_8_Fig11_HTML.jpg)


    Figure 8-11.

    Finding members who have entered more than four Open tournaments


    The query for the process in Figure [8-8](#A158240_2_En_8_Chapter.html#Fig8) is:


    ```sql

    SELECT MemberID, COUNT(*) AS NumEntries

    FROM Entry e INNER JOIN Tournament t ON e.TourID = t.TourID

    WHERE t.TourType = ''Open''

    GROUP BY MemberID

    HAVING COUNT(*) > 4;

    ```


    In Chapter [2](#A158240_2_En_2_Chapter.html) we looked at ordering the output
    of a query. We can also order the output by the aggregate. If we would like to
    see results of the previous query in descending order of the number of tournaments
    entered, we could add an `ORDER BY COUNT(*) DESC` clause at the end of the query.


    ### Using Aggregates to Perform Division Operations


    In Chapter [7](#A158240_2_En_7_Chapter.html), we looked at the algebra operation
    division. To recap, division allows us to answer many questions containing the
    words `all` or `every`. For example, say we want to find those members who have
    entered every tournament. Figure [8-12](#A158240_2_En_8_Chapter.html#Fig12) reviews
    how we can use division to do this. The attribute we want returned in our `Answer`
    is `MemberID`. On the right side of the division operator, we have the set of
    things to `Check` against (in this case, a list of all the `TourID` values projected
    from the `Tournament` table). On the left side of the division operator is a table
    that has both the attributes from `Answer` and `Check` (in this case, the columns
    `MemberID` and `TourID` from the `Entry` table). The result of the division is
    a list of the `MemberID` values that appear with every tournament (in this case,
    just the one member with ID `415`).


    ![A158240_2_En_8_Fig12_HTML.jpg](A158240_2_En_8_Fig12_HTML.jpg)


    Figure 8-12.

    Using division to find the members who have entered every tournament


    This figure is the same as Figure [7-25](#A158240_2_En_7_Chapter.html#Fig25).


    Currently, standard implementations of SQL do not have a keyword for the division
    operation, so we need to find other ways to express a query like that depicted
    in Figure [8-12](#A158240_2_En_8_Chapter.html#Fig12). We looked at one way in
    Chapter [7](#A158240_2_En_7_Chapter.html) and some others in Appendix 2. Here,
    we will look at a method that uses aggregates.


    The `Tournament` table lists five different tournaments. If we can find a member
    who has entered five different tournaments, then he or she must have entered all
    of them. We now have the ability to use aggregates and grouping to construct the
    equivalent of a division operation.


    We have already seen queries to count how many tournaments each member has entered.
    However, now we want to count only the different tournaments entered by each member.
    Adding the `DISTINCT` keyword in the `COUNT()` function will achieve this:


    ```sql

    SELECT MemberID, COUNT(DISTINCT TourID) AS NumTours

    FROM Entry e

    GROUP BY MemberID;

    ```


    The result of this query is shown in Figure [8-13](#A158240_2_En_8_Chapter.html#Fig13).


    ![A158240_2_En_8_Fig13_HTML.jpg](A158240_2_En_8_Fig13_HTML.jpg)


    Figure 8-13.

    Finding the number of distinct tournaments entered by each member


    From the resulting table in Figure [8-13](#A158240_2_En_8_Chapter.html#Fig13),
    we now want just those rows where the `NumTours` is equal to the number of distinct
    tournaments, which is `5` in this case. We can use the `HAVING` clause to find
    those members who have entered five different tournaments:


    ```sql

    SELECT MemberID

    FROM Entry e

    GROUP BY MemberID

    HAVING COUNT(DISTINCT TourID) = 5;

    ```


    We can make this query more general by replacing `5` with an expression to calculate
    the number of distinct tournaments on the fly:


    ```sql

    SELECT MemberID

    FROM Entry e

    GROUP BY MemberID

    HAVING COUNT(DISTINCT TourID) =

    (SELECT COUNT(DISTINCT TourID) FROM Tournament);

    ```


    This query is equivalent to the algebra division operation as depicted in Figure
    [8-12](#A158240_2_En_8_Chapter.html#Fig12). It returns the IDs of members who
    have entered every tournament. To summarize, we count the number of distinct tournaments
    each member has entered, and then, using the `HAVING` clause, retain just those
    whose count equals the number of possible tournaments (a distinct count from the
    `Tournament` table). I find this method of doing a division conceptually more
    straightforward than the ones in Chapter [7](#A158240_2_En_7_Chapter.html) and
    Appendix 2. However, all methods accomplish the same goal.'
