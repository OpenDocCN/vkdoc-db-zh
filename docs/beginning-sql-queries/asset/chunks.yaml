  trans: '

    ### 在没有 EXCEPT 关键字的情况下进行管理


    并非所有 SQL 版本都支持 `EXCEPT`（或 `MINUS`）关键字。一如既往，通常总有其他方法来构建查询。在第 4 章中，我们研究了一种用于回答涉及"not"（不/未）一词的问题的**结果方法**。图
    7-24 回顾了用于查找未参加锦标赛 25 的成员姓名的思维过程。


    ![A158240_2_En_7_Fig24_HTML.jpg](img/A158240_2_En_7_Fig24_HTML.jpg)

    图 7-24. 判定成员 258 未参加锦标赛 25


    图 7-24 背后的思维过程是：

    > 如果 `Entry` 表中不存在某个成员（即 `m.MemberID = e.MemberID`）且 `TourID=25` 的行 `e`，则写出 `Member`
    表中第 `m` 行的姓名。


    反映图 7-24 的 SQL 是：

    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE NOT EXISTS

    (SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID

    AND e.TourID = 25);

    ```


    对于涉及"not"一词的问题，你应该使用哪种查询？是使用过程方法和 `EXCEPT` 关键字的那种，还是使用结果方法和 `NOT EXISTS` 或 `NOT
    IN` 关键字的那种？通常，我会说这并不重要，因为你的数据库引擎可能会足够智能地识别它们是相同的。然而，我当前使用的 SQL Server 版本（2013）执行使用
    `NOT EXISTS` 的查询比使用 `EXCEPT` 的相应查询更高效。你必须问自己是否在意！小型数据库上的查询通常非常快，即使运行得稍慢一些也真的无关紧要。但是，如果你有大量数据，那么一切都会改变。查询的效率会变得极其重要，在这种情况下，你还需要考虑数据库设计的其他方面，例如索引。我将在第
    9 章中再稍微讨论一下这一点。


    ## 除法


    本章我们要看的最后一组操作符是除法。除法对于涉及"all"（所有）或"every"（每一个）一词的查询很有用。一个例子是“哪些成员参加了每一项锦标赛？”。标准
    SQL 没有用于除法操作的关键字，并且要弄清楚涉及除法的查询的 SQL 可能有点棘手。


    在附录 2 中，你将找到执行除法的正式代数表示法，以及如果需要的话，如何使用其他操作符来表示它。在附录 2 的“全称量词和 SQL”一节中，你还将找到使用演算（或结果）表达式执行除法类型查询的替代方法。这两种方法都有助于你构建类似于除法操作符的
    SQL 语句。在第 8 章中，我们将研究聚合函数，并看看我认为是编写等效于除法操作符的 SQL 的最简单方法。


    现在，我们将看看除法操作符的作用，以及如何使用它来回答涉及"every"和"all"的不同类型问题。


    理解除法操作最简单的方法是通过一个例子。如果我们想知道哪些成员参加了每一项锦标赛，我们需要两条信息。首先，我们需要关于成员及其参加的锦标赛的信息，这可以从
    `Entry` 表中获得。我们还需要所有锦标赛的列表，这需要来自 `Tournament` 表，因为并非所有锦标赛都可能在 `Entry` 表中体现。


    图 7-25 说明了除法是如何工作的。我仅从 `Entry` 表中投影了 `MemberID` 和 `TourID` 列，并从 `Tournament` 表中投影了
    `TourID` 列。你投影哪些列很重要，我稍后会再讨论这一点。


    ![A158240_2_En_7_Fig25_HTML.jpg](img/A158240_2_En_7_Fig25_HTML.jpg)

    图 7-25. 使用除法查找参加了所有锦标赛的成员


    观察图 7-25，中间是一个包含所有 `TourID` 值的表（我将其标记为 Check）。除法操作检查左侧的表，以找到那些拥有对应每一个 `TourID`
    的行的 `MemberID` 值。Answer（位于图的右侧）包含了参加了每一项锦标赛的成员的 `MemberID` 值。成员 415 可以在 `Entry`
    表中找到与五个锦标赛中的每一个配对，因此出现在除法的结果中。成员 228 没有出现在结果中，因为 `Entry` 表中没有 228 与 38 或 40 配对的行。


    确保参与除法操作的两个表中的列正确非常重要。我喜欢这样来设置除法操作：

    * 决定我想了解哪个属性。我们称之为 Answer。在这个例子中，我想找出 `MemberID` 的值，所以我们的 Answer 属性是 `MemberID`。

    * 在除法操作符的右侧，表中的属性应该是我想用来核对的对象。我们称这个（些）属性为 Check。在这个例子中，Check 属性是 `TourID`。我们可以从
    `Tournament` 表中获取所有 `TourID` 的值。

    * 在除法的左侧，我想要一个仅包含两组属性 Answer 和 Check 的表，如图 7-25 所示。我们需要 `MemberID` 和 `TourID`（在这个例子中，是哪些成员参加了哪些锦标赛，这些来自
    `Entry` 表）。重要的是，这些是左侧表中仅有的两列。如果添加了额外的列，那么我们就是在询问不同的问题，如下一节所述。


    顺便提一句，许多人想知道为什么这个操作被称为除法，因为它似乎与“4 除以 2”这样的概念没有特别直接的关系。在普通算术中，除法是乘法的逆运算（或反运算）。对于集合操作，除法就像是笛卡尔积的逆运算。如果你考虑对图
    7-25 中间和最右边的两个表进行笛卡尔积运算，你将得到一个表，其列（但不是行）与图 7-25 最左边的表相同。


    我们可以通过改变除法操作符右侧的内容来回答许多问题。例如，如果我们想知道谁参加了所有公开赛，我们将把图 7-25 中间的表替换为仅包含公开赛的行：

    ```sql

    SELECT TourID

    FROM Tour

    WHERE TourType = ''Open'';

    ```


    ### 投影适当的列


    与交集和差操作一样，在除法操作中投影不同的列会得到针对不同问题的答案。再次说明，例子是理解这一点最简单的方法。在图 7-26 中，从 `Entry` 表中检索了一个额外的列。你能理解这个查询在查找什么吗？


    ![A158240_2_En_7_Fig26_HTML.jpg](img/A158240_2_En_7_Fig26_HTML.jpg)

    图 7-26. 除法操作在查找什么？


    除法在左侧表中查找一组 Answer 属性，这些属性与 `Check` 表中的每一个属性配对。在这个例子中，该操作在左侧表中查找一对 `MemberID`
    和 `Year`，这对组合出现在每一个锦标赛中。这个除法例子正在查找那些在同一年参加了所有锦标赛的成员。

