    ## 谁指导教练，或者说，谁是我的祖母？


    两个`Member`表副本之间的**自连接**向我们展示了一个成员和教练的层级。如果我们查看图 5-7 中的行，可以看到托马斯·塞克斯顿（Thomas Sexton）由威廉·库珀（William
    Cooper）指导，而威廉·库珀又由布伦达·诺兰（Brenda Nolan）指导，布伦达·诺兰没有教练。这个层级对于当前问题来说并不特别有趣，但在许多类似情况下，这种层级关系却相当重要。家谱学就是其中之一。考虑图
    5-8 中的数据模型和`Person`表的一部分。为了尽可能简单，我们只考虑关于女性和生母的一小部分信息。


    ![A158240_2_En_5_Fig8_HTML.jpg](img/A158240_2_En_5_Fig8_HTML.jpg)


    图 5-8.

    女性及其生母的数据模型


    图 5-8 中的关系可以顺时针解读为“一个人可以是多个人的母亲”，反方向解读为“一个人最多有一位母亲，也可能没有。”然而，在现实生活中，后一种说法听起来不太对——当然每个人都有母亲。但是，与所有数据库一样，这个数据库只是对现实生活复杂性的一种近似，它只能保存可用的数据。除非我们追溯到原始的
    slime（此处指远古），否则表中总会有一些我们不知道其母亲的人。布伦达就是其中之一。图 5-8 中的表和模型与我们的成员和教练示例具有完全相同的结构，但像“谁是苏（Sue）的祖母？”这样的问题似乎比“谁指导我的教练？”更有可能出现。


    那么，我们如何获取关于个人及其母亲的信息呢？就像上一节一样，我们需要将`Person`表与自身连接。（别忘了将连接设置为**外连接**，这样就不会丢失布伦达的信息。）SQL
    如下：


    ```sql

    SELECT *

    FROM Person p LEFT OUTER JOIN Person m on p.Mother = m.ID;

    ```


    该连接的 Access 图形界面如图 5-9 所示，同时也显示了结果表。我将表的第一个副本别名为`p`代表人物，第二个副本别名为`m`代表母亲。


    ![A158240_2_En_5_Fig9_HTML.jpg](img/A158240_2_En_5_Fig9_HTML.jpg)


    图 5-9.

    查找人物及其母亲：**左外连接**的 Access 图示及结果表


    那么，如何追溯到上一代呢？为此，我们需要在图 5-9 的结果表和`Person`表的另一个副本（别名为`g`代表祖母）之间执行另一个**左外连接**。两个左外连接的
    SQL 如下：


    ```sql

    SELECT *

    FROM (Person p LEFT JOIN Person m ON p.Mother = m.ID)

    LEFT JOIN Person g ON m.Mother = g.ID;

    ```


    结果表如图 5-10 所示。


    ![A158240_2_En_5_Fig10_HTML.jpg](img/A158240_2_En_5_Fig10_HTML.jpg)


    图 5-10.

    查找三代人：**左外连接**的 Access 图示及结果表


    显然，我们可以继续进行越来越多的自连接，直到没有更多代为止。当我们拥有自引用关系时，这类层次查询很可能会出现。一个需要注意的小问题是，我们必须在每个查询中指定连接的次数。标准
    SQL 没有“自动进行自连接直到没有更多代”的概念，例如“查找我所有的女性祖先”；然而，一些数据库实现确实支持这种特性。¹


    ### 自连接的结果导向方法


    在上一节中，一旦我们意识到需要自连接，问题都很容易回答。这是**过程导向方法**的一个例子——我们需要执行哪些操作？然而，有时候，当你需要时，这种领悟并不总会到来。每当我在面对查询时大脑一片空白，我就会诉诸于**结果导向方法**。


    让我们再次查看`Member`表，并提出一个简单的问题：谁是梅丽莎（Melissa）的教练？不要考虑关系或连接，只需从外行人的角度来看数据。在图 5-11
    中，你可以看到如何找出答案，即使你从未听说过自连接（大多数人都没听说过）。


    ![A158240_2_En_5_Fig11_HTML.jpg](img/A158240_2_En_5_Fig11_HTML.jpg)


    图 5-11.

    查找梅丽莎的教练


    要找到梅丽莎的教练，我们首先找到梅丽莎所在的行（图 5-11 中的`m`），然后注意到她的教练是成员 153。接着我们找到另一行（`c`代表教练），其`MemberID`值为
    153；我们可以看到梅丽莎的教练是布伦达。你不需要了解任何关于自引用关系、外键或连接的知识就能弄清楚这一点。但一旦你将这种逻辑清晰地记在脑海中，就可以用自然语言写下来，然后转换成
    SQL 就相当直接了。


    让我们描述一下图 5-11：


    > 我需要查看`Member`表中的两行（`m`和`c`），我想输出`c.FirstName`，条件是`c.MemberID`的值与`m.Coach`相同，并且`m.FirstName`是‘Melissa’。


    对应的 SQL 如下：


    ```sql

    SELECT c.FirstName

    FROM Member m, Member c

    WHERE c.MemberID = m.Coach AND m.FirstName = ''Melissa'';

    ```


    那么，这种结果导向方法如何对应我们之前考虑的过程导向方法呢？正如你所料，前面的 SQL 只是表述相同查询的另一种方式。在前面的 SQL 语句中，中间一行是两个`Member`表副本的笛卡尔积，`WHERE`子句的第一部分是连接条件。语句`FROM
    Member m, Member c WHERE c.MemberID = m.Coach`只是表达我们在前面章节中使用的自连接的另一种方式。


    让我们尝试用结果导向方法解决另一个查询：谁正在被杆差更高的教练指导？我脑海中需要的图像是图 5-12。


    ![A158240_2_En_5_Fig12_HTML.jpg](img/A158240_2_En_5_Fig12_HTML.jpg)


    图 5-12.

    查找被杆差更高的教练指导的成员


    我们可以看到，黛博拉（Deborah）的杆差是 12，她正在被成员 235 指导。成员 235，威廉（William），杆差是 14，因此黛博拉符合我们的标准。以下是代表图
    5-12 中逻辑的更通用的陈述：


    > 我将查看`Member`表中的每一行（`m`），如果存在`Member`表中的另一行（`c`），使得`c.MemberID`与`m.Coach`相同，并且`m.Handicap`小于`c.Handicap`，我将输出`m.FirstName`和`m.LastName`。


    SQL 的生成就很直接了：


    ```sql

    SELECT m.FirstName, m.LastName

    FROM Member m, Member c

    WHERE c.MemberID = m.Coach AND m.Handicap < c.Handicap;

    ```


    再次，你可以在前面的查询中看到等价的自连接（`FROM Member m, Member c WHERE c.MemberID = m.Coach`）。这种结果导向方法的有用之处在于，你不需要理解什么是自连接，也不必做出需要它的思维跳跃。通过用虚拟的手指和涉及哪些行来帮助你决策的方式思考，你可以勾勒出条件的陈述。SQL
    通常就能很容易地从中推导出来。

