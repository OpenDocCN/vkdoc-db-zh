- fmt: '## 文本字段中的多余字符


    当尝试检索与某个文本值匹配的数据时，一个常见的问题是数据中混入了前导或尾随空格以及其他不可打印字符。


    例如，如果我们的数据库中有类似 `FirstName` 的字段，我们可能会发现名字前后有一些空格。有时，如果指定了字符字段的特定长度，可能会自动添加尾随空格。如果一行记录的名字被存储为
    `''  Dan  ''`，那么使用条件 `FirstName = ''Dan''` 的 `WHERE` 子句可能无法检索到该行。大多数数据库软件都提供了多种处理文本的函数。通常会有各种形式的修剪函数，用于删除文本值开头和结尾的空格。请查阅您的文档以了解您的实现提供了哪些函数。


    下面的 SQL 语句中的 `RTRIM()` 函数将在进行比较之前，去掉 `FirstName` 值右侧的任何空格：


    ```

    SELECT * FROM Member

    WHERE RTRIM(FirstName) = ''Dan'';

    ```


    前面的查询并不会永久地从字段中删除空格。`RTRIM()` 函数只是为了进行比较而返回一个不带空格的值。但是，您可以使用更新查询来永久修复其中一些数据不一致的问题。接下来的查询展示了如何确保
    `Member` 表的 `FirstName` 列中的任何值都没有前导 (`LTRIM()`) 或尾随 (`RTRIM()`) 空格。它本质上是用修剪后的值替换所有值：


    ```

    UPDATE Member

    SET FirstName = RTRIM(LTRIM(FirstName));

    ```


    一个更令人困扰的问题是那些看起来像空格，但实际上是其他空白字符的字符。这有时发生在数据被剪切、粘贴或在各种产品和不同实现之间移动时。这可能需要一些功夫才能追踪出来。


    另外两个数据录入陷阱是数字 0（零）和 1（一）被输入，而不是字母 o（哦）和 l（埃尔）。您可能会花费数小时调试一个查找“John”或“Bill”的查询，但如果底层数据被错误地输入为“J0hn”或“Bi11”，您的搜索将是徒劳的。


    教训是，数据值可能会发生奇怪的事情，因此当您的查询语法故障排除失败时，请检查底层数据。


    ### 文本字段中不一致的大小写


    如果您的 SQL 实现是区分大小写的，您需要注意某些数据值可能没有预期的大小写。Dan 的名字可能被错误地输入到 `Member` 表中为“dan”。在区分大小写的实现中，使用子句
    `WHERE FirstName = ''Dan''` 的查询将无法检索到他的信息。正如第 [2](#A158240_2_En_2_Chapter.html)
    章所述，使用一个将字符串转换为大写的函数将有助于找到正确的行。在接下来的查询中，我们（临时）将 `FirstName` 转换为大写，然后将其与我们要查找内容的大写形式进行比较：


    ```

    SELECT * FROM Member

    WHERE UPPER(FirstName) = ''DAN'';

    ```


    查找名称中的大小写问题相当困难，因为并非所有名称都符合首字母小写、其余字母小写的规则；例如，de Vere 和 McLennan。但是，对于像 `Gender`（M
    或 F）或 `MemberType`（Junior, Senior, 或 Associate）这样的字段，我们知道期望的值是什么。确保它们一致的最佳方法是像本章前面讨论的那样，在字段上设置一个检查约束。


    ## 诊断问题


    在前面的部分中，我们看到了由于糟糕的数据库设计和不一致或错误数据可能出现的问题。然而，在大多数情况下，如果您的查询结果看起来不太对，很可能是因为您的 SQL
    语句写错了。该语句可能检索到的行与预期不同。在第 [10](#A158240_2_En_10_Chapter.html) 章中，有一个部分介绍了一些可以用来检查查询结果是否符合预期的方法。


    在上一章中，我建议了一种处理查询的方法，让您能够逐步构建查询，以便检查每个步骤是否返回了合适的行。但是，如果您面对的是一个未能按预期交付结果的、复杂的完整查询，您需要将其精简，直到找到问题所在。如果您已经注意到一个问题，那么您就有了一个很好的起点。您要么注意到一个预期的行缺失了，要么一个不满足要求的行被检索出来了。集中精力找出问题在查询中的哪个位置。以下部分提供了一些建议。


    ### 独立检查嵌套查询的部分


    如果您有一个查询嵌套在另一个查询中，首先要检查的是嵌套部分本身是否正常工作。看看这个查询：


    ```

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Junior'' AND Handicap <

    (SELECT AVG(Handicap)

    FROM Member);

    ```


    如果您在处理类似这样的查询时遇到困难，请剪切并粘贴内部查询，并独立运行它。检查它是否返回了正确的结果。如果这部分没问题，您可以尝试单独执行外部查询。为此，只需在内部查询的位置放一个值（例如
    `Handicap < 10`），看看是否返回正确的结果。如果您能将问题缩小到查询的某一部分，那您就开了一个好头。


    如果查询的内部和外部部分是相关的（参见第 [4](#A158240_2_En_4_Chapter.html) 章），这种方法就行不通了，但下面的一些技术可能有助于处理这种情况。


    ### 理解表是如何组合的


    许多查询涉及使用关系操作（连接、联合等）组合表。确保您理解表是如何组合的，以及这种组合是否合适。考虑如下查询：


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m, Entry e, Tournament t

    WHERE m.MemberID = e.MemberID

    AND e.TourID = t.TourID AND t.TourType = ''Open'' AND e.Year = 2014;

    ```


    这个查询涉及三个表。可能需要一点时间才能看出它们正在被连接。确保这对于所问的问题是合适的。第 [10](#A158240_2_En_10_Chapter.html)
    章提供了问题中的关键字示例以及组合表的适当方式。


    ### 删除额外的 WHERE 子句


    在组合表之后，通常只需要结果行中的一部分。在上一节的查询中，只有部分 `WHERE` 子句是用于连接操作的。连接之后，只保留了满足 `t.TourType
    = ''Open'' AND e.Year = 2014` 的行。如果您的结果中缺少行，删除 `WHERE` 子句中用于在连接后选择最终行子集的那部分通常很有用。如果行仍然缺失，那么您就知道（对于此示例）问题出在连接上。


    ### 保留所有列


    在开发涉及连接的查询的早期阶段，我非常喜欢始终使用 `SELECT *`。如果我们怀疑连接有问题，那么通过保留所有列可见，我们可以查看连接条件是否按预期工作。一旦我们对检索到的行感到满意，就可以只保留所需的列。


    但是，如果我们使用集合操作组合表，这种方法将适得其反，因为投影正确的列至关重要（参见本章后面的“您在集合操作中是否有正确的列”部分）。'
  raw: '### Extraneous Characters in Text Fields


    A common problem when trying to retrieve data that matches a text value is leading
    or trailing spaces and other nonprintable characters that have found their way
    into the data.


    If we have a field like `FirstName` in our database, for example, we may find
    that there are some spaces before or after the name. Sometimes, if a character
    field is specified as being a particular length, trailing spaces may be added.
    If a row has a name has been stored as `''  Dan  ''` then a `WHERE` clause with
    the condition `FirstName = ''Dan''` may not retrieve that row. Most database software
    will have several functions for dealing with text. There are likely to be forms
    of trim functions, which remove spaces from the start and end of text values.
    Check out your documentation to see what your implementation has.


    The `RTRIM()` function in the SQL statement that follows will strip any spaces
    from the right end of the `FirstName` value before making the comparison:


    ```

    SELECT * FROM Member

    WHERE RTRIM(FirstName) = ''Dan'';

    ```


    The preceding query does not strip the spaces from the field permanently. `The
    RTRIM()` function just returns a value without the spaces in order to make the
    comparison. However, you can use update queries to permanently remedy some of
    these data inconsistencies. The query that follows shows how to ensure no values
    in the `FirstName` column of the `Member` table have any leading (`LTRIM()`) or
    trailing (`RTRIM()`) spaces. It essentially replaces all the values with trimmed
    values:


    ```

    UPDATE Member

    SET FirstName = RTRIM(LTRIM(FirstName));

    ```


    A more disturbing problem is characters that look like spaces but are actually
    some other white space characters. This sometimes occurs when data is cut and
    pasted or otherwise moved between various products and different implementations.
    This can take some tracking down.


    Two other data-entry gotchas are the numbers 0 (zero) and 1 (one) being entered
    instead of the letters o (oh) and l (el). You can spend hours trying to debug
    a query that is looking for “John” or “Bill,” but if the underlying data has been
    mistakenly entered as “J0hn” or “Bi11” you will search in vain.


    The moral is that weird things can happen with data values, so when the troubleshooting
    of your query syntax fails, check the underlying data.


    ### Inconsistent Case in Text Fields


    If your SQL implementation is case sensitive, you need to be aware that some data
    values may not have the expected case. Dan may have had his first name incorrectly
    entered into the `Member` table as “dan.” In case-sensitive implementations, a
    query with the clause `WHERE FirstName = ''Dan''` will not retrieve his information.
    As mentioned in Chapter [2](#A158240_2_En_2_Chapter.html), using a function that
    converts strings of characters to uppercase will help find the right rows. In
    the query that follows we convert `FirstName` (temporarily) to uppercase, and
    then compare that with the uppercase rendition of what we are seeking:


    ```

    SELECT * FROM Member

    WHERE UPPER(FirstName) = ''DAN'';

    ```


    It is quite difficult to find problems with case in names because not all names
    conform to being lowercase with an uppercase first letter; for example, de Vere
    and McLennan. But, for fields like `Gender` (M or F) or `MemberType` (Junior,
    Senior, or Associate), we know what we expect the values to be. The best way to
    ensure that they are consistent is to put a check constraint on the field as discussed
    earlier in this chapter.


    ## Diagnosing Problems


    In the previous sections, we saw problems that can arise with poor database design
    and inconsistent or incorrect data. Much of the time, however, if the result of
    your query is not looking quite right, it is probably because you have the wrong
    SQL statement. The statement may be retrieving rows that are different from what
    was expected. In Chapter [10](#A158240_2_En_10_Chapter.html) there is a section
    on some ways that you can check to see if the result of a query is what is expected.


    In the previous chapter, I suggested a way to approach queries that lets you build
    the query up slowly so you can check that each step is returning appropriate rows.
    However, if you are presented with a full-blown, complex query that is not delivering
    as expected, you need to pare it down until you find where the problem lies. If
    you have noticed a problem, then you have a good place to start. You have either
    noticed an expected row is missing or that a row not satisfying the requirements
    has been retrieved. Concentrate on finding where in the query that problem is.
    The following sections offer some suggestions.


    ### Check Parts of Nested Queries Independently


    Where you have one query nested inside another, the first thing to check is that
    the nested part is behaving itself. Take a look at this query:


    ```

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Junior'' AND Handicap <

    (SELECT AVG(Handicap)

    FROM Member);

    ```


    If you are having trouble with a query like this, cut and paste the inner query
    and run it independently. Check to see if it is returning the correct result.
    If this is OK, you can try doing the outer query on its own. To do this, just
    put some value in place of the inner query (such as `Handicap < 10)` and see if
    that returns the correct results. If you can narrow down the problem to one part
    of the query, you have made a good start.


    This approach doesn’t work if the inner and outer parts of the query are related
    (see Chapter [4](#A158240_2_En_4_Chapter.html)), but some of the following techniques
    might help with that situation.


    ### Understand How the Tables Are Being Combined


    Many queries involve combining tables with relational operations (join, union,
    and so on). Make sure you understand how the tables are being combined and whether
    that is appropriate. Consider a query such as the following:


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m, Entry e, Tournament t

    WHERE m.MemberID = e.MemberID

    AND e.TourID = t.TourID AND t.TourType = ''Open'' AND e.Year = 2014;

    ```


    Three tables are involved in this query. It might take a moment to figure out
    that they are being joined. Make sure that is appropriate for the question being
    asked. Chapter [10](#A158240_2_En_10_Chapter.html) has examples of keywords in
    questions and the appropriate ways to combine tables.


    ### Remove Extra WHERE Clauses


    After combining tables, usually only some of the resulting rows are required.
    In the query in the previous section, only part of the `WHERE` clause is needed
    for the join operations. After the join, only the rows satisfying `t.TourType
    = ''Open'' AND e.Year = 2014` are retained. If you have rows missing from your
    result, it is often useful to remove the parts of the `WHERE` clause that are
    selecting a final subset of the rows after the join. If the rows are still missing,
    then you know that (for this example) the problem is occurring in the join.


    ### Retain All the Columns


    I’m a big fan of always saying `SELECT *` in the early stages of developing queries
    that involve joins. If we suspect a problem with the joins, then by leaving all
    the columns visible, we can see if the join conditions are behaving as expected.
    Once we are happy with the rows being retrieved, we can retain just the columns
    required.


    However, if we are combining tables with set operations, this approach will be
    counterproductive, as projecting the right columns is critical (see the “Do You
    Have Correct Columns in Set Operations” section later in this chapter).'
