    for `Handicap`, which doesn’t apply to some members. Real data is usually not
    so clean and tidy. Let’s consider some different data, as in Figure [2-6](#A158240_2_En_2_Chapter.html#Fig6).


    ![A158240_2_En_2_Fig6_HTML.jpg](A158240_2_En_2_Fig6_HTML.jpg)


    Figure 2-6.


    Table with missing data


    When there is no value in a cell in a table, it is said to be null. Nulls in a
    database can cause a few headaches. Consider carrying out the following two queries
    : one to produce a list of male members and the other a list of females. Given
    that golfers need to identity as either male or female for competition purposes,
    we might assume that all the members of the club would appear on one list or the
    other. However, for the data in Figure [2-6](#A158240_2_En_2_Chapter.html#Fig6),
    we would leave out Kim Spence. You could argue that the data shouldn’t be like
    that, but we are talking about real people and real clubs with less than accurate
    and complete data. Maybe Kim forgot (or refused) to fill in the gender part of
    the application form. We can protect against this by insisting that nulls are
    not allowed in a particular field when we create a table. The following SQL statement
    shows how we could make `Gender` a field that always requires a value:


    ```

    CREATE TABLE Member (

    MemberID INT PRIMARY KEY,

    .....

    Gender CHAR(1) NOT NULL,

    ....)

    ```


    It is worth bearing in mind that making fields `NOT NULL` can create more headaches
    than it cures. If Kim Spence did not complete all the boxes on his/her membership
    application but had organized payment for the subscription, then we want to record
    him/her as a member and worry about the full details later. If we make `Gender`
    a required field, then we can’t enter a record for him/her in the table`—`or we
    have to guess what his/her gender is. Neither of these options is a good strategy,
    so it is best to be sparing when making fields required. Remember that our primary
    key fields (by definition) always need a value.


    Not all values of null mean there is a problem with the data. In our `Member`
    table, a field might be null because it does not apply to a particular member.
    Helen and Sarah’s handicap may be genuinely null because they do not have handicaps.
    However, it is fair to assume that every member should have a value for `MemberType`
    and `JoinDate`, so the nulls in these columns are because we do not know the value.
    In the real world, expect that your tables will have missing data.


    ### Finding Nulls


    Given that in our tables we may have nulls that might cause us problems, it is
    useful to be able to find them. After we have entered a batch of new members into
    the database, we can check for problems. We might want to get a list of all the
    members who don’t have a value for `Gender`, say. To do this we can use the SQL
    phrase `IS NULL`:


    ```

    SELECT *

    FROM Member m

    WHERE m.Gender IS NULL

    ```


    Alternatively, we might want to retrieve only those members who do have a value
    in a cell. If we want the names and handicaps of only those members who have a
    value for `Handicap`, we could use the `NOT` operator to create the following
    query:


    ```

    SELECT *

    FROM Member m

    WHERE NOT (m.Handicap IS NULL)

    ```'
  trans: '

    ### 逻辑运算符


    我们可以组合布尔表达式以创建更有趣的条件。例如，我们可以指定在检索特定行之前，两个表达式必须都为真。


    假设我们想要查找所有的初级会员女孩。这需要两个条件为真：她们必须是女性，并且她们必须是初级会员。我们可以轻松地独立表达每个条件。之后，我们可以使用逻辑运算符
    `AND` 来要求两个条件都为真：


    ```sql

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Junior'' AND m.Gender = ''F''

    ```


    我们将探讨三种逻辑运算符：`AND`、`OR` 和 `NOT`。我们已经看到了 `AND` 是如何工作的。如果我们在两个表达式之间使用 `OR`，那么只需要其中一个表达式为真即可（但如果两个都为真，也没问题）。`NOT`
    用于表达式之前。例如，对于我们的 `Member` 表，我们可能要求满足条件 `NOT (MemberType = ''Social'')` 的行。这意味着检查每一行，如果
    `MemberType` 的值为 “Social”，那么我们就不想要那一行。表 2-3 提供了更多在条件中使用逻辑运算符的示例。


    表 2-3. 逻辑运算符示例


    | 表达式 | 数据描述 |

    | --- | --- |

    | `MemberType = ''Senior'' AND Handicap < 12` | 差点数低于 12 的高级会员 |

    | `MemberType = ''Senior'' OR Handicap < 12` | 所有高级会员以及其他任何差点数良好（低于 12）的会员 |

    | `NOT(MemberType = ''Social'')` | 除社交会员外的所有会员（就当前数据而言，仅指高级和初级会员） |


    图 2-4 展示了表 2-3 中查询的图示表示。每个圆圈代表一组行（即社交会员的行或差点数低于 12 的会员的行）。阴影区域代表操作的结果。


    ![A158240_2_En_2_Fig4_HTML.gif](img/A158240_2_En_2_Fig4_HTML.gif)


    图 2-4. 逻辑运算符的图示表示。


    图 2-5 中的真值表有助于理解逻辑运算符的工作原理。阅读方式如下：在图 2-5a 和 2-5b 中，我们有两个表达式，一个在顶部，一个在左侧。每个表达式可以有两个值：真
    (`T`) 或假 (`F`)。如果我们将它们与布尔表达式 `AND` 组合，那么图 2-5a 显示，只有当两个组成语句都为真时，整个语句才为真（左上角的方框）。如果我们将它们与
    `OR` 语句组合，那么只有当两个组成语句都为假时，整个语句才为假（图 2-5b 的右下角）。图 2-5c 中的表格说明，如果我们原始的语句为真，并在前面加上
    `NOT`，则结果为假（左列），反之亦然。


    ![A158240_2_En_2_Fig5_HTML.gif](img/A158240_2_En_2_Fig5_HTML.gif)


    图 2-5. 逻辑运算符的真值表 (`T` = 真，`F` = 假)


    有时，将自然语言描述转换为布尔表达式可能有点棘手。如果要求你提供一个包含所有女性和所有初级会员（别问为什么！）的列表，你可能会按字面意思翻译，并写出条件 `MemberType
    = ''Junior'' AND Gender = ''F''`。然而，`AND` 意味着两个条件都必须为真，所以这将只给出初级女性会员。我们的自然语言陈述真正的意思是“我想要任何会员的行，如果他们是女性或初级会员（或两者都是）。”请务必小心。


    ## 处理空值


    前面图 2-1 中显示的 `Member` 表中的示例数据都是准确且完整的。除了 `Handicap` 字段（它不适用于某些会员），每一行在每个属性上都有值。真实数据通常不那么整洁有序。让我们考虑一些不同的数据，如图
    2-6 所示。


    ![A158240_2_En_2_Fig6_HTML.jpg](img/A158240_2_En_2_Fig6_HTML.jpg)


    图 2-6. 存在缺失数据的表


    当表中的单元格没有值时，称其为空。数据库中的空值可能会带来一些麻烦。考虑执行以下两个查询：一个生成男性会员列表，另一个生成女性会员列表。鉴于高尔夫球手出于比赛目的需要标识为男性或女性，我们可能会认为俱乐部的所有会员都会出现在其中一个列表中。然而，对于图
    2-6 中的数据，我们会遗漏 Kim Spence。你可以争辩说数据不应该这样，但我们谈论的是真实的人和真实的俱乐部，数据不那么准确和完整。也许 Kim 忘记（或拒绝）填写申请表中的性别部分。我们可以通过在创建表时坚持特定字段不允许为空来防止这种情况。以下
    SQL 语句展示了如何使 `Gender` 成为一个始终需要值的字段：


    ```sql

    CREATE TABLE Member (

    MemberID INT PRIMARY KEY,

    .....

    Gender CHAR(1) NOT NULL,

    ....)

    ```


    值得注意的是，将字段设为 `NOT NULL` 可能带来的麻烦比解决的更多。如果 Kim Spence 没有填写会员申请表上的所有方框，但已经安排了会费的支付，那么我们希望将他/她记录为会员，稍后再处理完整细节。如果我们把
    `Gender` 设为必填字段，那么我们就无法在表中为他/她输入记录——或者我们必须猜测他/她的性别。这两种选择都不是好策略，因此在将字段设为必填时最好谨慎行事。请记住，我们的主键字段（根据定义）始终需要一个值。


    并非所有空值都意味着数据存在问题。在我们的 `Member` 表中，某个字段可能为空是因为它不适用于特定会员。Helen 和 Sarah 的差点数可能确实是空的，因为她们没有差点数。然而，可以合理地假设每个会员都应该有一个
    `MemberType` 和 `JoinDate` 的值，因此这些列中的空值是因为我们不知道该值。在现实世界中，请预期你的表中会存在缺失数据。


    ### 查找空值


    鉴于我们的表中可能存在可能给我们带来问题的空值，能够找到它们是很有用的。在将一批新会员输入数据库后，我们可以检查问题。例如，我们可能想要获取所有 `Gender`
    字段没有值的会员列表。为此，我们可以使用 SQL 短语 `IS NULL`：


    ```sql

    SELECT *

    FROM Member m

    WHERE m.Gender IS NULL

    ```


    或者，我们可能只想检索那些在单元格中有值的会员。如果我们只想要那些 `Handicap` 字段有值的会员的姓名和差点数，我们可以使用 `NOT` 运算符创建以下查询：


    ```sql

    SELECT *

    FROM Member m

    WHERE NOT (m.Handicap IS NULL)

    ```

