  trans: '

    ### SQL 中的除法运算


    采用输出导向的方法，我们想要的查询可以这样表述：


    > 从 `Member` 表的行 `m` 中，写出 `m.LastName`、`m.FirstName` 的值，条件是对于 `Tournament` 表中的每一行
    `t`，在 `Entry` 表中都存在一行 `e`，满足 `e.MemberID = m.MemberID` 且 `e.TourID = t.TourID`。


    我们有 SQL 关键字 `EXISTS` 来表示“存在”，但没有直接表示“每一个”的关键字。我们可以通过运用以下略费思量的逻辑，来消除前述语句中的“每一个”这个词。短语


    > 对于 `Tournament` 表中的每一行 `t`，在 `Entry` 表中都存在一行 `e`…


    等价于说


    > 在 `Tournament` 表中，不存在这样一行 `t`，使得在 `Entry` 表中不存在一行 `e`…


    附录 2 更正式地解释了如何推导这些表达式，但现在，我们将仅使用刚刚讨论的等价关系，重写原始描述（即如何检索已参加所有锦标赛的成员姓名）。


    > 从 `Member` 表的行 `m` 中，写出 `m.LastName, m.FirstName` 的值，条件是 **对于每一行** `t` **都不存在**，使得在
    `Entry` 表中 **存在一行** `e` 不满足 `e.MemberID = m.MemberID` 且 `e.TourID = t.TourID`。


    对应的 SQL 语句是：


    ```sql

    SELECT m.LastName, m.FirstName FROM Member m

    WHERE NOT EXISTS

    (

    SELECT * FROM Tournament t

    WHERE NOT EXISTS

    (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID AND e.TourID = t.TourID

    )

    );

    ```


    这种双重否定可能有点令人望而生畏，但正如本章开头所言，我保证在下一章会介绍一种概念上更简单的方法来找出参加了每一场锦标赛的成员。


    ## 小结


    由于关系数据库中的表具有唯一的行（如果键设置得当的话），它们可以被视为数学集合。这允许我们使用集合并运算、交运算、差运算和除运算。


    并、交、差运算是作用在**并相容**的表之间的运算。这意味着运算符两边的表必须具有相同的列数，且对应的列必须具有相同的域（通常理解为相同的数据类型）。通过合理地投影列，你可以获得并相容的表。


    SQL 有关键字来表示并、交、差运算，尽管并非所有实现都支持所有这些运算的关键字。如果你的 SQL 产品不支持交或差运算的关键字，你可以找到其他方式来表达查询。你应该以你觉得最自然的方式来构建查询。当数据量非常大且速度很重要时，你可能需要研究不同查询构建方式的效率。


    以下是集合运算及其用 SQL 表示的替代方法的总结。`A` 和 `B` 是两个并相容的表，为简单起见，它们都只有一列，名为 `attribute`。


    ### 并集


    并集运算返回存在于表 `A` 或表 `B` 中的所有唯一行：


    ```sql

    SELECT attribute FROM A

    UNION

    SELECT attribute FROM B;

    ```


    ### 交集


    交集运算返回同时存在于表 `A` 和表 `B` 中的所有行：


    ```sql

    SELECT attribute FROM A

    INTERSECT

    SELECT attribute FROM B;

    ```


    表示交集的另一种方式是：


    ```sql

    SELECT A.attribute

    FROM A

    WHERE EXISTS

    (SELECT B.attribute FROM B

    WHERE A.attribute = B.attribute);

    ```


    ### 差集


    差集运算返回存在于第一个表（`A`）中但不存在于第二个表（`B`）中的所有行。一些实现使用关键字 `MINUS` 代替 `EXCEPT`：


    ```sql

    SELECT attribute FROM A

    EXCEPT

    SELECT attribute FROM B;

    ```


    表示差集的另一种方式是：


    ```sql

    SELECT A.attribute

    FROM A

    WHERE NOT EXISTS

    (SELECT B.attribute FROM B

    WHERE A.attribute = B.attribute);

    ```


    ### 除法


    除法运算有助于处理包含“每一个”或“所有”这类词语的查询。当前版本的 SQL 不直接支持除法。有关如何表达涉及除法的查询的详细信息，请参阅附录 2 中的“除法”和“全称量词与
    SQL”部分。


    为完整起见，我们重复以下查询，该查询返回已参加每一场锦标赛的成员的 `MemberID` 值：


    ```sql

    SELECT m.LastName, m.FirstName FROM Member m

    WHERE NOT EXISTS

    (

    SELECT * FROM Tournament t

    WHERE NOT EXISTS

    (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID AND e.TourID = t.TourID

    )

    );

    ```


    脚注 1


    在正式的关系理论中，关系的属性没有顺序，而是通过名称引用。表中列的排序是 SQL 实现用来确定并相容性的方式。


    # 8. 聚合运算


    SQL 有许多用于计数、求和、求平均值以及对表执行其他聚合运算的函数。这些函数使我们能够执行各种查询。例如，我们可以统计俱乐部中的成员人数，或找出平均让杆数。我们可以以不同的方式对数据进行分组以求得聚合值。例如，我们可能想统计每年锦标赛的参赛次数，或者我们可能想找出每个特定锦标赛的参赛人数。


    在本章中，我们将研究简单的聚合函数以及如何充分利用 SQL 的分组功能。在下一章中，我们将研究窗口函数，它们可以在仅使用基本聚合功能难以解决的情况下提供优雅的解决方案。


    ## 简单的聚合函数


    简单的聚合函数包括平均值、总和和计数。这些概念很直接，但一如既往，你需要确保自己理解它们在涉及空值和重复值时是如何工作的。


    ### COUNT() 函数


    `COUNT()` 函数计算查询返回的行数。最简单的例子是统计查询返回的所有行数，我们可以通过在括号内添加星号来实现。以下查询将返回 `Member` 表中的行数：


    ```sql

    SELECT COUNT(*)

    FROM Member;

    ```


    像前面查询中这样的单个聚合函数 `COUNT()` 将返回一个只有一列一行的表，如图 8-1 所示。


    ![A158240_2_En_8_Fig1_HTML.jpg](img/A158240_2_En_8_Fig1_HTML.jpg)


    图 8-1.


    `COUNT()` 函数的结果


    图 8-1 中的输出是在 Access 中生成的，如你所见，列使用了默认名称标记。我们可以通过为列指定别名来提供一个更好的名称。在下面的查询中，我们添加了一个
    `WHERE` 子句来统计满足条件 `Gender = ''F''` 的行子集，并使用了 `AS` 子句，使列标题更具信息性：


    ```sql

    SELECT COUNT(*) AS NumberWomen

    FROM Member

    WHERE Gender = ''F'';

    ```


    此查询的输出如图 8-2 所示。


    ![A158240_2_En_8_Fig2_HTML.jpg](img/A158240_2_En_8_Fig2_HTML.jpg)


    图 8-2.


    带有别名的 `COUNT()` 函数结果


    为聚合函数返回的列提供别名是个好主意，这样读者就能理解这些数字的含义。

    '
- fmt: '## Managing Nulls


    The previous query returns a count of the number of members with a gender of `''F''`.
    Now consider the query here:


    ```

    SELECT COUNT(*)

    FROM Member

    WHERE Gender  ''F'';

    ```


    At first glance we might think that the two counts from the previous two queries
    should add up to the total number of members. But we need to be careful. In Chapter
    [2](#A158240_2_En_2_Chapter.html), we looked at how `WHERE` conditions operate
    when we make comparisons with a null (or empty) value. If there is no value for
    the attribute then we cannot say whether it does or does not satisfy a condition.
    We don’t know! In SQL, if the value we are comparing is a null, then the result
    of the comparison will always be false. Rows in the table with a null in the `Gender`
    column will not be included in either of the two previous queries.


    We could argue that the attribute should have been declared as `NOT NULL` in the
    design of the table. In Chapter [2](#A158240_2_En_2_Chapter.html) we discussed
    why this might not be a good idea. If we are trying to enter details for a new
    member who has not provided their gender then we either will be prevented from
    saving the details we do know or will have to guess the gender. Neither option
    is satisfactory. It’s better to save the details and follow up on the missing
    data later.


    We can explicitly find how many of the rows do not have a value for `Gender` with
    the query:


    ```

    SELECT COUNT(*)

    FROM Member

    WHERE Gender IS NULL;

    ```


    The numbers for the three previous queries with conditions `Gender = ''F''`, `Gender
    <> ''F''`, and `Gender IS NULL` will now add up to the total number of members
    in the club. Queries like the preceding one can be very useful for checking if
    there are null values in columns where we would ideally expect to have values.


    The `COUNT()` function can also return the number of values in a particular column
    of a table or query. Let’s look at a few of the columns in the `Member` table,
    as shown in Figure [8-3](#A158240_2_En_8_Chapter.html#Fig3).


    ![A158240_2_En_8_Fig3_HTML.jpg](A158240_2_En_8_Fig3_HTML.jpg)


    Figure 8-3. Some columns of the Member table


    Say we want to find the number of members who have a coach. We have two options.
    One way is to formulate a query to return just those members who have a non-null
    value for `Coach` and count those:


    ```

    SELECT COUNT(*)

    FROM Member

    WHERE Coach IS NOT NULL;

    ```


    The other option is to ask the `COUNT()` function to specifically count the number
    of not-null values in the `Coach` column using `COUNT(Coach)`:


    ```

    SELECT COUNT(Coach)

    FROM Member;

    ```


    To recap: if we just want to find the number of rows returned from a query (or
    a whole table), we use `SELECT COUNT(*)`. If we want to find the number of rows
    that have a value in a particular column, use `SELECT COUNT(<Column_Name>)`. The
    `COUNT(*)` and `COUNT(<Column_Name>)` options allow us to be specific about how
    we want null values to be treated.


    ## Managing Duplicates


    The values in the `Coach` column of the `Member` table (Figure [8-3](#A158240_2_En_8_Chapter.html#Fig3))
    are duplicated. There are only two distinct values (153 and 235). We therefore
    have two quite different questions that can be answered by counting the values
    in the `Coach` column: “How many people have a coach?” and “How many coaches are
    there?” The answer to the first question requires us to include all the values.
    The answer to the second question requires us just to count the distinct values.
    This can be done by including the `DISTINCT` keyword as in the query here:


    ```

    --Won’t work in Access (2016)

    SELECT COUNT(DISTINCT Coach)

    FROM Member;

    ```


    While I am trying not to become product-specific in this book, I feel obliged
    (given how many copies of Access are in the world) to point out that Access does
    not currently support `COUNT(DISTINCT)`. However, you can get the equivalent result
    in Access with the nested query that follows. (Note that SQL Server does not allow
    a subquery in the `FROM` clause for an aggregate.)


    ```

    --Won’t work in SQL Server (2012)

    SELECT COUNT(*)

    FROM (SELECT DISTINCT Coach FROM Member WHERE Coach IS NOT NULL);

    ```


    You can also use the keyword `ALL`. This just reinforces that you want to count
    all values, rather than just distinct values. If you do not include either `DISTINCT`
    or `ALL` then all values are included by default.


    Similar sorts of queries can be applied to the other tables in the golf club database.
    For example, we might want to know how many tournaments members entered in 2015
    (11) or how many different tournaments members entered in 2015 (5). The two queries
    that follow will provide the answers to the respective questions:


    ```

    -- How many tournaments were entered

    SELECT COUNT(TourID)

    FROM Entry

    WHERE Year = 2015;

    -- How many different tournaments were entered

    SELECT COUNT(DISTINCT TourID)

    FROM Entry

    WHERE Year = 2015;

    ```


    ### The AVG() Function


    To find averages, we use the function `AVG()`. The parameter that goes in the
    parentheses (. . .), is the expression we want to average. The expression has
    to be a numeric value. If you try to average a text field such as `LastName` you
    will get an error.


    As an example, we can find the average handicap for members of our club by including
    the `Handicap` column as the parameter for the `AVG()` function:


    ```

    SELECT AVG(Handicap)

    FROM Member;

    ```


    The expression could be just the name of one of the numeric-valued columns as
    in the preceding query or it could be the result of a calculation. Say in another
    database we have an `Order` table that includes the columns `Price` and `Quantity`
    for each item ordered. The net value of each order can be found by multiplying
    the `Price` and `Quantity`. If we want to find the average net value for all our
    orders, we can put the expression `Price * Quantity` in the parentheses as seen
    here:


    ```

    SELECT AVG(Price * Quantity)

    FROM Order;

    ```'
