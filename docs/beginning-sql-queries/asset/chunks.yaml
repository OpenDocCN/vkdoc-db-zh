- fmt: "## Two Relationships Between the Same Tables\n\nLet’s consider how we might\
    \ introduce the idea of teams into the golf club database. We can start off by\
    \ thinking about what basic information we need to keep about a team. Figure 6-1\
    \ shows a class representing a simple team along with some rows in a table that\
    \ represents the class.\n\n![A158240_2_En_6_Fig1_HTML.jpg](A158240_2_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1.\n\nThe `Team` class and some rows in a `Team` table\n\nNow we need\
    \ to think about relationships between the new `Team` class and our other classes.\
    \ The most obvious relationship is that members will play for teams. Figure 6-2\
    \ shows a possible class diagram representing this situation.\n\n![A158240_2_En_6_Fig2_HTML.jpg](A158240_2_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2.\n\nA member can belong to one team\n\nInterpreting the class diagram\
    \ in Figure 6-2 from left to right, we have that a particular member might play\
    \ on one team (the `1` nearest the `Team` class), but a member does not need to\
    \ play for any teams at all (the `0` nearest the `Team` class). Reading from right\
    \ to left, we have that a team could have many members playing for it (the `n`\
    \ nearest the `Member` class) but might not have any (the `0` nearest the `Member`\
    \ class). That last statement might seem a bit odd, but when we add new teams,\
    \ or want to start afresh in a new season, a team might not have any members straight\
    \ away.\n\nTo represent a 1–Many relationship, recall from Chapter 1 that we take\
    \ the primary key from the table at the 1 end of the relationship and add it as\
    \ a foreign key to the table at the Many end. Figure 6-3 shows a new foreign key\
    \ field, `Team`, which refers to the `Team` table.\n\n![A158240_2_En_6_Fig3_HTML.jpg](A158240_2_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3.\n\nForeign key field `Team` in the `Member` table\n\nAnother relationship\
    \ that is likely to occur between `Member` and `Team` is that a member might manage\
    \ a team. Figure 6-4 shows this additional relationship in the class diagram.\n\
    \n![A158240_2_En_6_Fig4_HTML.jpg](A158240_2_En_6_Fig4_HTML.jpg)\n\nFigure 6-4.\n\
    \nTwo relationships between the `Member` and `Team` classes\n\nThe top line in\
    \ Figure 6-4 can be interpreted, from left to right, as stating that a particular\
    \ member might manage (at most) one team; and from right to left, as that each\
    \ team has exactly one manager.\n\nThis new relationship is a 1–1 relationship.\
    \ For 1–Many relationships we have always taken the primary key from the one end\
    \ of the relationship and put it in the table at the other end. This time both\
    \ ends have a cardinality of `1`. We could put a `Team_I_Manage` column in the\
    \ `Member` table or a `Manager` column in the `Team` table. The latter is more\
    \ sensible, as the compulsory `Manager` attribute is a more important piece of\
    \ information about teams than the optional `Team_I_Manage` is for members. Generally,\
    \ in a 1–1 relationship we take the primary key from the compulsory end (1:1 on\
    \ the diagram in Figure 6-4) and put that as a foreign key in the other end.\n\
    \nThe `Team` table, with its new `Manager` foreign key column, is shown along\
    \ with the `Member` table in Figure 6-5.\n\n![A158240_2_En_6_Fig5_HTML.jpg](A158240_2_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5.\n\nForeign keys `Team` in `Member` table and `Manager` in `Team`\
    \ table to represent the relationships in Figure 6-4\n\nFrom the `Member` table,\
    \ we can see that four people play for TeamB (Brenda Nolan, William Cooper, Robert\
    \ Pollard, and Betty Young), and from the `Team` table, we can see that member\
    \ 153 (Brenda Nolan) is the manager of TeamB. You will notice that there is nothing\
    \ in the data model that says whether or not a manager must be a member of the\
    \ team. TeamB’s manager is a member of TeamB, whereas TeamA’s manager, 239 (Thomas\
    \ Spence), is not a member of TeamA. The only constraints implied by the foreign\
    \ keys are that the manager of a team must be in the `Member` table and a member\
    \ can belong only to a team that exists in the `Team` table.\n\nSome of you may\
    \ have also realized that making `Manager` a foreign key does not prevent the\
    \ same person from managing more than one team. The foreign key constraint does\
    \ not prevent us from putting member 239 as the manager for both TeamA and TeamB.\
    \ We have effectively set up a 1–Many relationship between `Team` and `Member`\
    \ for the `Manages` relationship. If you want to prevent a single member from\
    \ managing more than one team, you can put a `UNIQUE` constraint on the `Manager`\
    \ column of the `Team` table. This type of situation is discussed in more depth\
    \ in my database design book.[¹](#A158240_2_En_6_Chapter.html#Fn1) The following\
    \ SQL would create a `Team` table where `Manager` is a foreign key referring to\
    \ the `Member` table and a particular member can only appear once in the `Manager`\
    \ column in the table:\n\n```sql\nCREATE TABLE Team (\n    TeamName CHAR(10) PRIMARY\
    \ KEY,\n    PracticeNight CHAR(20),\n    Manager INT FOREIGN KEY REFERENCES Member\
    \ UNIQUE\n);\n```\n\n### Extracting Information from Multiple Relationships\n\n\
    Now that we have the `Team` and `Member` tables and their two relationships (`Plays\
    \ for` and `Manages`), we can start extracting information. If we just consider\
    \ one relationship at a time, it is relatively straightforward to construct queries.\
    \ If we want a list of the members who play for a team along with the basic information\
    \ about their teams from the `Team` table, we can simply join the `Member` and\
    \ `Team` tables on `Team = TeamName` as in the SQL query here:\n\n```sql\nSELECT\
    \ m.MemberID, m.LastName, m.FirstName, m.Team,\n       t.TeamName, t.PracticeNight,\
    \ t.Manager\nFROM Member m INNER JOIN Team t ON m.Team = t.TeamName;\n```\n\n\
    A graphical representation and the output of the preceding query is shown in Figure\
    \ 6-6.\n\n![A158240_2_En_6_Fig6_HTML.jpg](A158240_2_En_6_Fig6_HTML.jpg)\n\nFigure\
    \ 6-6.\n\nJoining `Member` and `Team` to get additional information about a member’s\
    \ team\n\nSimilarly, if we want to retrieve information about teams, including\
    \ the name of the manager, we can join `Member` and `Team` on `Manager = MemberID`:\n\
    \n```sql\nSELECT t.TeamName, t.PracticeNight, t.Manager,\n       m.MemberID, m.LastName,\
    \ m.FirstName\nFROM Team t INNER JOIN Member m ON t.Manager = m.MemberID;\n```\n\
    \nA graphical representation and the output of the preceding query is shown in\
    \ Figure 6-7.\n\n![A158240_2_En_6_Fig7_HTML.jpg](A158240_2_En_6_Fig7_HTML.jpg)\n\
    \nFigure 6-7.\n\nJoining `Member` and `Team` to get additional information about\
    \ a team’s manager\n\nNow we will look at how to retrieve information involving\
    \ both relationship types."
  raw: '## Two Relationships Between the Same Tables


    Let’s consider how we might introduce the idea of teams into the golf club database.
    We can start off by thinking about what basic information we need to keep about
    a team. Figure [6-1](#A158240_2_En_6_Chapter.html#Fig1) shows a class representing
    a simple team along with some rows in a table that represents the class.


    ![A158240_2_En_6_Fig1_HTML.jpg](A158240_2_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    The Team class and some rows in a Team table


    Now we need to think about relationships between the new `Team` class and our
    other classes. The most obvious relationship is that members will play for teams.
    Figure [6-2](#A158240_2_En_6_Chapter.html#Fig2) shows a possible class diagram
    representing this situation.


    ![A158240_2_En_6_Fig2_HTML.jpg](A158240_2_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    A member can belong to one team


    Interpreting the class diagram in Figure [6-2](#A158240_2_En_6_Chapter.html#Fig2)
    from left to right, we have that a particular member might play on one team (the
    1 nearest the `Team` class), but a member does not need to play for any teams
    at all (the 0 nearest the `Team` class). Reading from right to left, we have that
    a team could have many members playing for it (the n nearest the `Member` class)
    but might not have any (the 0 nearest the `Member` class). That last statement
    might seem a bit odd, but when we add new teams, or want to start afresh in a
    new season, a team might not have any members straight away.


    To represent a 1`–`Many relationship, recall from Chapter [1](#A158240_2_En_1_Chapter.html)
    that we take the primary key from the table at the 1 end of the relationship and
    add it as a foreign key to the table at the Many end. Figure [6-3](#A158240_2_En_6_Chapter.html#Fig3)
    shows a new foreign key field, `Team`, which refers to the `Team` table.


    ![A158240_2_En_6_Fig3_HTML.jpg](A158240_2_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Foreign key field Team in the Member table


    Another relationship that is likely to occur between `Member` and `Team` is that
    a member might manage a team. Figure [6-4](#A158240_2_En_6_Chapter.html#Fig4)
    shows this additional relationship in the class diagram.


    ![A158240_2_En_6_Fig4_HTML.jpg](A158240_2_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Two relationships between the Member and Team classes


    The top line in Figure [6-4](#A158240_2_En_6_Chapter.html#Fig4) can be interpreted,
    from left to right, as stating that a particular member might manage (at most)
    one team; and from right to left, as that each team has exactly one manager.


    This new relationship is a 1`–`1 relationship. For 1`–`Many relationships we have
    always taken the primary key from the one end of the relationship and put it in
    the table at the other end. This time both ends have a cardinality of 1\. We could
    put a `Team_I_Manage` column in the `Member` table or a `Manager` column in the
    `Team` table. The latter is more sensible, as the compulsory `Manager` attribute
    is a more important piece of information about teams than the optional `Team_I_Manage`
    is for members. Generally, in a 1`–`1 relationship we take the primary key from
    the compulsory end (1:1 on the diagram in Figure [6-4](#A158240_2_En_6_Chapter.html#Fig4))
    and put that as a foreign key in the other end.


    The `Team` table, with its new `Manager` foreign key column, is shown along with
    the `Member` table in Figure [6-5](#A158240_2_En_6_Chapter.html#Fig5).


    ![A158240_2_En_6_Fig5_HTML.jpg](A158240_2_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    Foreign keys Team in Member table and Manager in Team table to represent the relationships
    in Figure [6-4](#A158240_2_En_6_Chapter.html#Fig4)


    From the `Member` table, we can see that four people play for TeamB (Brenda Nolan,
    William Cooper, Robert Pollard, and Betty Young), and from the `Team` table, we
    can see that member 153 (Brenda Nolan) is the manager of TeamB. You will notice
    that there is nothing in the data model that says whether or not a manager must
    be a member of the team. TeamB’s manager is a member of TeamB, whereas TeamA’s
    manager, 239 (Thomas Spence), is not a member of TeamA. The only constraints implied
    by the foreign keys are that the manager of a team must be in the `Member` table
    and a member can belong only to a team that exists in the `Team` table.


    Some of you may have also realized that making `Manager` a foreign key does not
    prevent the same person from managing more than one team. The foreign key constraint
    does not prevent us from putting member 239 as the manager for both TeamA and
    TeamB. We have effectively set up a 1`–`Many relationship between `Team` and `Member`
    for the `Manages` relationship. If you want to prevent a single member from managing
    more than one team, you can put a `UNIQUE` constraint on the `Manager` column
    of the `Team` table. This type of situation is discussed in more depth in my database
    design book.[¹](#A158240_2_En_6_Chapter.html#Fn1) The following SQL would create
    a `Team` table where `Manager` is a foreign key referring to the `Member` table
    and a particular member can only appear once in the `Manger` column in the table:


    ```

    CREATE TABLE Team (

    TeamName CHAR(10) PRIMARY KEY,

    PracticeNight CHAR(20),

    Manager INT FOREIGN KEY REFERENCES Member UNIQUE);

    ```


    ## Extracting Information from Multiple Relationships


    Now that we have the `Team` and `Member` tables and their two relationships (`Plays
    for` and `Manages`), we can start extracting information. If we just consider
    one relationship at a time, it is relatively straightforward to construct queries.
    If we want a list of the members who play for a team along with the basic information
    about their teams from the `Team` table, we can simply join the `Member` and `Team`
    tables on `Team = TeamName` as in the SQL query here:


    ```

    SELECT m.MemberID, m.LastName, m.FirstName, m.Team,

    t.TeamName, t.PracticeNight, t.Manager

    FROM Member m INNER JOIN Team t ON m.Team = t.TeamName;

    ```


    A graphical representation and the output of the preceding query is shown in Figure
    [6-6](#A158240_2_En_6_Chapter.html#Fig6).


    ![A158240_2_En_6_Fig6_HTML.jpg](A158240_2_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    Joining Member and Team to get additional information about a member’s team


    Similarly, if we want to retrieve information about teams, including the name
    of the manager, we can join `Member` and `Team` on `Manager = MemberID`:


    ```

    SELECT t.TeamName, t.PracticeNight, t.Manager,

    m.MemberID, m.LastName, m.FirstName

    FROM Team t INNER JOIN Member m ON t.Manager = m.MemberID;

    ```


    A graphical representation and the output of the preceding query is shown in Figure
    [6-7](#A158240_2_En_6_Chapter.html#Fig7).


    ![A158240_2_En_6_Fig7_HTML.jpg](A158240_2_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Joining Member and Team to get additional information about a team’s manager


    Now we will look at how to retrieve information involving both relationship types.'
  trans: "\n## 同一表之间的两种关系\n\n现在，我们来思考如何在高尔夫俱乐部数据库中引入“球队”的概念。首先，我们可以从思考关于一支球队需要保存哪些基本信息开始。图\
    \ 6-1 展示了一个代表简单球队的类，以及代表该类的一个表格中的若干行。\n\n![A158240_2_En_6_Fig1_HTML.jpg](img/A158240_2_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1.\n\n`Team`类及`Team`表中的一些行\n\n接下来，我们需要考虑新的`Team`类与我们其他类之间的关系。最明显的关系是，会员将为球队效力。图\
    \ 6-2 展示了代表这种情况的可能类图。\n\n![A158240_2_En_6_Fig2_HTML.jpg](img/A158240_2_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2.\n\n一名会员可以属于一支球队\n\n从左到右解读图 6-2 的类图：一个特定的会员可能效力于一支球队（靠近`Team`类的`1`），但一个会员也可以不为任何球队效力（靠近`Team`类的`0`）。从右向左解读：一支球队可以有许多会员为其效力（靠近`Member`类的`n`），但也可能没有任何会员（靠近`Member`类的`0`）。最后一点可能听起来有点奇怪，但当我们添加新球队，或者希望在新赛季重新开始时，一支球队可能暂时没有任何会员。\n\
    \n为了表示“一对多”关系，回想第 1 章的内容，我们需要从关系中“一”端的表获取主键，并将其作为外键添加到关系中“多”端的表。图 6-3 展示了一个新的外键字段`Team`，它引用了`Team`表。\n\
    \n![A158240_2_En_6_Fig3_HTML.jpg](img/A158240_2_En_6_Fig3_HTML.jpg)\n\n图 6-3.\n\
    \n`Member`表中的外键字段`Team`\n\n`Member`和`Team`之间可能发生的另一种关系是：一名会员可能管理一支球队。图 6-4 在类图中展示了这一额外的关系。\n\
    \n![A158240_2_En_6_Fig4_HTML.jpg](img/A158240_2_En_6_Fig4_HTML.jpg)\n\n图 6-4.\n\
    \n`Member`和`Team`类之间的两种关系\n\n图 6-4 的顶线可以这样解读：从左到右，一个特定的会员可能管理（至多）一支球队；从右到左，每支球队恰好有一名经理。\n\
    \n这个新关系是一种“一对一”关系。对于“一对多”关系，我们总是从关系的“一”端获取主键，并将其放入另一端的表中。这次，关系两端的基数都是`1`。我们可以在`Member`表中放置一个`Team_I_Manage`（我管理的球队）列，或者在`Team`表中放置一个`Manager`（经理）列。后者更合理，因为强制性的`Manager`属性是关于球队的更重要的信息，而可选的`Team_I_Manage`对于会员而言则不然。通常，在“一对一”关系中，我们从强制端（图\
    \ 6-4 中图示的 1:1 端）获取主键，并将其作为外键放入另一端。\n\n带有新`Manager`外键列的`Team`表，与`Member`表一起展示在图\
    \ 6-5 中。\n\n![A158240_2_En_6_Fig5_HTML.jpg](img/A158240_2_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5.\n\n`Member`表中的外键`Team`和`Team`表中的外键`Manager`，用于表示图 6-4 中的关系\n\n从`Member`表，我们可以看到四人为\
    \ TeamB 效力（Brenda Nolan， William Cooper， Robert Pollard 和 Betty Young）；从`Team`表，我们可以看到会员\
    \ 153（Brenda Nolan）是 TeamB 的经理。你会注意到，数据模型中没有说明经理是否必须是球队的成员。TeamB 的经理是 TeamB 的成员，而\
    \ TeamA 的经理 239（Thomas Spence）则不是 TeamA 的成员。外键所隐含的唯一约束是：球队的经理必须存在于`Member`表中，并且一名会员只能属于存在于`Team`表中的球队。\n\
    \n你们中的一些人可能也意识到，将`Manager`设为外键并不能阻止同一个人管理多支球队。外键约束并不妨碍我们将会员 239 同时设为 TeamA 和 TeamB\
    \ 的经理。我们实际上在`Team`和`Member`之间为`Manages`（管理）关系建立了一种“一对多”关系。如果你想阻止一名会员管理多支球队，可以在`Team`表的`Manager`列上设置一个`UNIQUE`（唯一）约束。这类情况在我的数据库设计书中有更深入的讨论。¹\
    \ 以下 SQL 语句将创建一个`Team`表，其中`Manager`是一个引用`Member`表的外键，并且特定会员在表的`Manager`列中只能出现一次：\n\
    \n```sql\nCREATE TABLE Team (\n    TeamName CHAR(10) PRIMARY KEY,\n    PracticeNight\
    \ CHAR(20),\n    Manager INT FOREIGN KEY REFERENCES Member UNIQUE\n);\n```\n\n\
    ### 从多重关系中提取信息\n\n既然我们已经有了`Team`和`Member`表以及它们的两种关系（`Plays for`（效力于）和`Manages`（管理）），我们就可以开始提取信息了。如果我们一次只考虑一种关系，构建查询就相对简单。如果我们想要一个会员列表，包含效力于某支球队的会员以及他们球队来自`Team`表的基本信息，我们可以简单地根据`Team\
    \ = TeamName`连接`Member`和`Team`表，如下面的 SQL 查询所示：\n\n```sql\nSELECT m.MemberID, m.LastName,\
    \ m.FirstName, m.Team,\n       t.TeamName, t.PracticeNight, t.Manager\nFROM Member\
    \ m INNER JOIN Team t ON m.Team = t.TeamName;\n```\n\n图 6-6 展示了上述查询的图形化表示和输出结果。\n\
    \n![A158240_2_En_6_Fig6_HTML.jpg](img/A158240_2_En_6_Fig6_HTML.jpg)\n\n图 6-6.\n\
    \n连接`Member`和`Team`以获取关于会员球队的额外信息\n\n类似地，如果我们想检索关于球队的信息，包括经理的姓名，我们可以根据`Manager\
    \ = MemberID`连接`Member`和`Team`表：\n\n```sql\nSELECT t.TeamName, t.PracticeNight,\
    \ t.Manager,\n       m.MemberID, m.LastName, m.FirstName\nFROM Team t INNER JOIN\
    \ Member m ON t.Manager = m.MemberID;\n```\n\n图 6-7 展示了上述查询的图形化表示和输出结果。\n\n![A158240_2_En_6_Fig7_HTML.jpg](img/A158240_2_En_6_Fig7_HTML.jpg)\n\
    \n图 6-7.\n\n连接`Member`和`Team`以获取关于球队经理的额外信息\n\n现在，我们将看看如何检索涉及两种关系类型的信息。\n"
- fmt: '### Process Approach


    The information from the join shown in Figure [6-6](#A158240_2_En_6_Chapter.html#Fig6)
    is not particularly helpful. We have the managers’ IDs, but it would be more useful
    to have their names as well. We need another join. First, we’ll have a look at
    what Access will do by default if you add both the `Member` and `Team` tables
    onto the query design interface. This is shown in Figure [6-8](#A158240_2_En_6_Chapter.html#Fig8).


    ![A158240_2_En_6_Fig8_HTML.jpg](A158240_2_En_6_Fig8_HTML.jpg)

    Figure 6-8. Default joins in Access if `Member` and `Team` are added to diagrammatic
    query interface.


    A look at the SQL for the query in Figure [6-8](#A158240_2_En_6_Chapter.html#Fig8)
    reveals it is joining the tables like this:

    ```sql

    SELECT *

    FROM Member m  INNER JOIN Team t

    ON t.TeamName = m.Team AND m.MemberID = t.Manager;

    ```

    Can you figure out what question this query is answering? The output is shown
    in Figure [6-9](#A158240_2_En_6_Chapter.html#Fig9).


    ![A158240_2_En_6_Fig9_HTML.jpg](A158240_2_En_6_Fig9_HTML.jpg)

    Figure 6-9. Output for the default Access join in Figure [6-8](#A158240_2_En_6_Chapter.html#Fig8).


    To understand what is happening with the preceding join it is useful to consider
    the Cartesian product of `Member` and `Team`. The Cartesian product gives us every
    combination of rows from each table. The join condition says show only rows where
    the `MemberID` is the same as the `Manager` and where `Team` and `TeamName` are
    the same. In everyday language, this amounts to “Show me the members who manage
    the team they are in.” For our data, that is just the single row for Brenda Nolan
    we see in Figure [6-9](#A158240_2_En_6_Chapter.html#Fig9).


    So, how do we construct a query that will show us member names, their teams, and
    the names of the teams’ managers? The query that follows will provide the information
    about the members, their teams, and the managers’ IDs (`t.Manager`); however,
    it does not provide the managers’ names:

    ```sql

    SELECT m.MemberID, m.LastName, m.FirstName, t.TeamName, t.Manager

    FROM Member m INNER JOIN Team t ON m.Team = t.TeamName;

    ```

    What we need to do is to take the result of the preceding join and join that to
    a second copy of the `Member` table (`m2`) to retrieve the names of the managers.
    We want the join condition to be that `t.Manager = m2.MemberID` so we get the
    names of the manager. Figure [6-10](#A158240_2_En_6_Chapter.html#Fig10) shows
    a diagrammatic representation and the output of the two joins.


    ![A158240_2_En_6_Fig10_HTML.jpg](A158240_2_En_6_Fig10_HTML.jpg)

    Figure 6-10. Two joins and two copies of `Member` table to include names of team
    managers.


    The first join gives us the member information from the first copy of the `Member`
    table and the information from the `Team` table for that member; the second join
    gives us the name of the team manager from the second copy of the `Member` table.
    The SQL for the two joins is:

    ```sql

    SELECT *

    FROM (Member m INNER JOIN Team t ON m.Team = t.TeamName)

    INNER JOIN Member m2 ON t.Manager = m2.MemberID;

    ```

    You might find it instructive to compare this latest query and output with the
    query involving a single join between the `Member` and `Team` tables shown in
    Figures [6-8](#A158240_2_En_6_Chapter.html#Fig8) and [6-9](#A158240_2_En_6_Chapter.html#Fig9).


    We are now in position to generate a variety of reports about teams and their
    members. Figure [6-11](#A158240_2_En_6_Chapter.html#Fig11) shows a report based
    on the preceding query and its output, shown in Figure [6-10](#A158240_2_En_6_Chapter.html#Fig10).


    ![A158240_2_En_6_Fig11_HTML.jpg](A158240_2_En_6_Fig11_HTML.jpg)

    Figure 6-11. A report based on the query shown in Figure [6-10](#A158240_2_En_6_Chapter.html#Fig10).


    The report has been grouped by team, with the team and manager information (from
    the `Team` table and `m2` copy of the `Member` table) in a group header. The members
    of the team (from the first copy `m` of the `Member` table) are in the detail
    part of the report.


    ### Outcome Approach


    We will now look at an alternative way to construct a query to retrieve all the
    information about a team (members’ names, team name, and manager’s name) for a
    report like the one in Figure [6-11](#A158240_2_En_6_Chapter.html#Fig11). I find
    the idea of two joins quite intuitive, but other people prefer a different approach.


    I have reproduced the two tables in Figure [6-12](#A158240_2_En_6_Chapter.html#Fig12).
    Now, without thinking about joins, let’s see how we can pick a member and find
    out what team he or she is on and who the manager is for that team.


    ![A158240_2_En_6_Fig12_HTML.jpg](A158240_2_En_6_Fig12_HTML.jpg)

    Figure 6-12. Finding a team member (William Cooper), his team’s name, and the
    name of the team’s manager.


    Without needing to think about joins, we can find the information we require.
    We need information from three rows. Let’s look at one specific case. One row
    (`m`) from the `Member` table will give us the name of a member (William Cooper
    in Figure [6-12](#A158240_2_En_6_Chapter.html#Fig12)). We need to find the row
    (`t`) in the `Team` table for his team (`m.Team = t.TeamName`). Then we need another
    row in the `Member` table (`m2`) for the manager of the team (`t.Manager = m2.MemberID`).


    With help from Figure [6-12](#A158240_2_En_6_Chapter.html#Fig12) we can construct
    the following SQL:

    ```sql

    SELECT m.LastName, m.FirstName, m.Team, m2.LastName, m2.FirstName

    FROM Member m, Team t, Member m2

    WHERE m.Team = t.TeamName AND t.Manager = m2.MemberID

    ```

    We could replace `m.Team` with `t.TeamName` in the `SELECT` clause of the preceding
    query if we wish.


    The preceding query is equivalent to the query with the two joins. The `FROM`
    clause is the Cartesian product of the three tables. The `WHERE` clause provides
    the join condition for the join between `Member` (`m`) and `Team` (`t`) on `m.Team
    = t.TeamName` and the join condition for the join between `Team` and another copy
    of `Member` (`m2`) on `t.Manager = m2.MemberID`.'
