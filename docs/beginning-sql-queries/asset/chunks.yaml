  trans: '## 处理空值


    上一个查询返回了性别为 `''F''` 的成员数量。现在请考虑下面的查询：


    ```

    SELECT COUNT(*)

    FROM Member

    WHERE Gender  ''F'';

    ```


    乍一看，我们可能会认为前两个查询得出的两个计数之和应该等于成员总数。但我们需要谨慎。在第 2 章中，我们探讨了当与空值（或称为空）进行比较时，`WHERE`
    条件是如何操作的。如果属性没有值，我们就无法说它是否满足某个条件。我们不知道！在 SQL 中，如果我们比较的值是空值，那么比较的结果将始终为假。表中 `Gender`
    列为空值的行将不会包含在前两个查询的任何一个结果中。


    我们可以认为，在表设计时该属性应该被声明为 `NOT NULL`。在第 2 章中，我们讨论了为什么这可能不是一个好主意。如果我们正试图为一个尚未提供性别的新成员录入详细信息，那么我们要么无法保存我们已知的信息，要么必须猜测性别。这两种选择都不令人满意。更好的做法是先保存已知信息，稍后再跟进缺失的数据。


    我们可以通过以下查询明确找出有多少行没有 `Gender` 的值：


    ```

    SELECT COUNT(*)

    FROM Member

    WHERE Gender IS NULL;

    ```


    现在，条件分别为 `Gender = ''F''`、`Gender <> ''F''` 和 `Gender IS NULL` 的前三个查询的结果数量加起来，就等于俱乐部成员的总数。像前面那样的查询对于检查我们本应期望有值的列中是否存在空值非常有用。


    `COUNT()` 函数也可以返回表中或查询结果中特定列的数值数量。让我们看一下 `Member` 表中的几个列，如图 8-3 所示。


    ![A158240_2_En_8_Fig3_HTML.jpg](img/A158240_2_En_8_Fig3_HTML.jpg)


    图 8-3. Member 表的部分列


    假设我们想找出有多少成员有教练。我们有两个选项。一种方法是构建一个查询，只返回那些 `Coach` 列有非空值的成员，并对它们进行计数：


    ```

    SELECT COUNT(*)

    FROM Member

    WHERE Coach IS NOT NULL;

    ```


    另一个选项是让 `COUNT()` 函数专门使用 `COUNT(Coach)` 来统计 `Coach` 列中非空值的数量：


    ```

    SELECT COUNT(Coach)

    FROM Member;

    ```


    回顾一下：如果我们只想找出查询（或整张表）返回的行数，我们使用 `SELECT COUNT(*)`。如果我们想找出某个特定列中有值的行数，请使用 `SELECT
    COUNT(<列名>)`。`COUNT(*)` 和 `COUNT(<列名>)` 这两种选项让我们能够明确指定如何处理空值。


    ## 处理重复值


    `Member` 表中 `Coach` 列的值（图 8-3）是重复的。只有两个不同的值（153 和 235）。因此，通过对 `Coach` 列的值进行计数，我们可以回答两个截然不同的问题：“有多少人拥有教练？”
    和 “有多少位教练？” 第一个问题的答案要求我们包含所有值。第二个问题的答案要求我们只统计不同的值。这可以通过包含 `DISTINCT` 关键字来实现，如下列查询所示：


    ```

    -- Won’t work in Access (2016)

    SELECT COUNT(DISTINCT Coach)

    FROM Member;

    ```


    虽然我在本书中尽量不针对特定产品，但我认为有必要指出（考虑到世界上有如此多的 Access 副本在使用），Access 目前不支持 `COUNT(DISTINCT)`。不过，你可以使用以下嵌套查询在
    Access 中获得等效结果。（注意，SQL Server 不允许在聚合查询的 `FROM` 子句中使用子查询。）


    ```

    -- Won’t work in SQL Server (2012)

    SELECT COUNT(*)

    FROM (SELECT DISTINCT Coach FROM Member WHERE Coach IS NOT NULL);

    ```


    你也可以使用关键字 `ALL`。这只是强调你想统计所有值，而不仅仅是不同的值。如果你没有包含 `DISTINCT` 或 `ALL`，则默认情况下会包含所有值。


    类似的查询可以应用于高尔夫俱乐部数据库中的其他表。例如，我们可能想知道 2015 年会员参加了多少次比赛（11 次），或者 2015 年会员参加了多少场不同的比赛（5
    场）。下面的两个查询将分别给出答案：


    ```

    -- 参加了多少次比赛

    SELECT COUNT(TourID)

    FROM Entry

    WHERE Year = 2015;

    -- 参加了多少场不同的比赛

    SELECT COUNT(DISTINCT TourID)

    FROM Entry

    WHERE Year = 2015;

    ```


    ### AVG() 函数


    要计算平均值，我们使用 `AVG()` 函数。括号（...）中的参数是我们要求平均值的表达式。该表达式必须是数值型。如果你尝试对 `LastName` 这样的文本字段求平均值，会得到一个错误。


    例如，我们可以通过将 `Handicap` 列作为 `AVG()` 函数的参数，来求得我们俱乐部会员的平均差点：


    ```

    SELECT AVG(Handicap)

    FROM Member;

    ```


    表达式可以像前一个查询中那样只是一个数值列的名称，也可以是计算的结果。假设在另一个数据库中，我们有一个 `Order` 表，其中包含每个订购项目的 `Price`
    和 `Quantity` 列。每个订单的净值可以通过将 `Price` 和 `Quantity` 相乘得出。如果我们想求出所有订单的平均净值，我们可以将表达式
    `Price * Quantity` 放在括号中，如下所示：


    ```

    SELECT AVG(Price * Quantity)

    FROM Order;

    ```'
- fmt: '#### Managing Nulls


    与 `COUNT()` 函数类似，`AVG()` 函数也不包括表达式值为 null 的行。在 `Member` 表中，我们总共有 20 名成员，其中 17
    名成员有 handicap 值。如果我们将所有 handicap 值相加，得到 287。`AVG()` 函数会取 handicap 总值（287）除以 `Handicap`
    列中具有非空值的行数（17）。这正是我们想要的。如果我们通过除以总行数（20）来包含没有 handicap 的成员，那么基本上就是默认这些成员的 handicap
    为 0。这会严重影响结果。


    是否考虑 null 值并不总是那么显而易见。例如，假设我们有另一个数据库，其中有一个名为 `Student` 的表和一个名为 `TestScore` 的列。如果我们录入学生的考试分数，而有些学生没有参加考试，那么这些学生在
    `TestScore` 列中就会有一个 null 值。我们真正想要的平均值是什么？我们可以计算所有学生的平均分（总分除以所有学生数），这意味着缺考的学生实际上被视为得了
    0 分。另一方面，我们也可以只计算参加考试的学生的平均分（除以参加考试的人数）。`AVG(TestScore)` 总是只给我们提供参加考试学生的平均分。要确定这两种选项中你需要哪一个绝非易事。学校里一直存在关于通过率（可能关系到资金）是否应该包含中途退学学生的争论。


    如果我们想要所有学生的平均分，包括那些分数为 null 的学生（计为 0），我们可以在查询中通过计算总分（使用 `SUM()` 函数）并除以学生总数来计算，如下所示：


    ```sql

    SELECT SUM(TestMark)/COUNT(*)

    FROM Student;

    ```


    我们本可以为那些没有参加考试的学生录入 0 分，以避免这种复杂性。然而，如果这样做，我们就无法再区分参加了考试但得 0 分的学生和缺考的学生。无论这是否是个问题，意识到其影响总是有用的。


    #### Managing Duplicates


    与 `COUNT()` 函数类似，`AVG()` 函数也可以包含关键字 `ALL` 和 `DISTINCT`。请注意，`ALL`（这是默认值）表示所有非空值（包括重复值），而不是仅指不同的非空值。它的意思不是对包括
    null 值在内的所有行求平均，这与我们在上一节讨论的不同。我发现很难想到什么时候你只想对不同的值求平均——肯定没有适用于我们俱乐部数据库的例子。


    #### Managing Types and Output


    `AVG()` 函数只接受数值表达式作为参数。我们无法成功地对 `FirstName` 或 `JoinDate` 求平均（尽管我们可以使用函数来计算成员名字长度的平均值或自加入日期以来的天数平均值）。


    当我们对成员的 handicap 求平均时，我们期望得到什么结果？handicap 总和是 287，有 handicap 的人数是 17。在 SQL Server
    2012 中，`AVG(Handicap)` 函数的结果是 16。在 Access 2016 中的结果是 16.8823529411765。为什么？


    在 SQL Server（以及 SQL 的一些其他实现）中，平均值函数返回与所平均数字相同的类型。在本例中，`Handicap` 列是整数类型，因此 SQL
    Server 中的 `AVG(Handicap)` 返回一个整数。它还进行整数除法（这意味着结果被截断为 16，而不是四舍五入为 17）。在 Access
    中，平均值返回的是一个浮点数（即带小数部分的数）。


    我们可以控制结果的计算方式。如果我们想要一个带小数部分的平均值结果，可以在求平均之前将 `Handicap` 值转换为浮点数。为此，我们可以使用在第 7 章中提到的
    `CONVERT()` 函数：[¹](#A158240_2_En_8_Chapter.html#Fn1)


    ```sql

    SELECT AVG(CONVERT(FLOAT,Handicap))

    FROM Member;

    ```


    另一种方法是直接将 handicap 乘以 1.0，这实际上将其转换为浮点数：


    ```sql

    SELECT AVG(Handicap * 1.0)

    FROM Member;

    ```


    ### The ROUND() Function


    虽然严格来说不是一个聚合函数，但值得花点时间看看如何进行舍入。因为平均值涉及除以项目数量，`AVG()` 函数经常会返回一个带有很多小数位的结果。我们使用一个舍入函数来指定我们希望在
    `AVG()` 和其他产生浮点数的结果的输出中包含的小数位数。我们向 `ROUND()` 函数提供两个参数：要舍入的表达式和要返回的小数位数。以下语句返回四舍五入到两位小数的平均
    handicap：


    ```sql

    SELECT ROUND(AVG(Handicap * 1.0), 2)

    FROM Member;

    ```


    舍入在不同的 SQL 实现中可能有不同的行为。在 Access 中，前面的查询将返回 16.88，而在 SQL Server 中将返回 16.880000。虽然在
    SQL Server 中删除尾部的零是可能的，但通常最好将这类格式化工作留给报表编写器等前端工具。


    有许多不同的舍入方法，因此查阅文档以了解你的 SQL 实现如何处理舍入是一个好主意。传统的将所有以 5 或更大数字结尾的数向上舍入的方法（例如，4.5 向上舍入为
    5）会导致偏向更大的数字。为了消除这种偏差，一些舍入函数的实现会舍入到最接近的偶数。例如，3.5 和 4.5 都会舍入到 4。这平衡了结果，但如果你没有预料到，可能会感到惊讶。SQL
    Server 的 `ROUND()` 函数将所有的 5 向上舍入，而 Access 将 5 舍入到最接近的偶数。


    ### Other Aggregate Functions


    SQL 还提供了其他常见的聚合函数，如 `SUM()`、`MAX()` 和 `MIN()`，它们非常易于使用。与 `AVG()` 函数类似，`SUM()`
    函数的参数必须是数值表达式（数值属性或具有数值结果的某个表达式，例如 `Price * Quantity`）。`MAX()` 和 `MIN()` 的参数可以是数值、文本或日期类型。对于文本类型，顺序是按字母顺序。对于日期，顺序是按时间顺序。例如，`MIN(LastName)`
    将按字母顺序返回 `LastName` 的第一个值，而 `MAX(JoinDate)` 将返回 `JoinDate` 的最新值。


    可以在一个查询中组合多个聚合函数。以下查询返回 `Handicap` 的最大值、最小值和平均值。


    ```sql

    SELECT MAX(Handicap) AS maximum, MIN(Handicap) AS minimum,

    ROUND(AVG(Handicap * 1.0),2) AS average

    FROM Member;

    ```


    使用 `AS` 子句为每一列的结果提供别名有助于使结果更易于理解。图 [8-4](#A158240_2_En_8_Chapter.html#Fig4) 显示了一些典型输出。


    ![A158240_2_En_8_Fig4_HTML.jpg](A158240_2_En_8_Fig4_HTML.jpg)


    图 8-4.


    包含多个聚合函数的查询的典型输出'
  raw: '#### Managing Nulls


    As with the `COUNT()` function, the `AVG()` function does not include rows where
    the value of the expression is null. In the `Member` table we have 20 members
    in total, and 17 members with handicaps. If we sum all the handicaps, we get 287\.
    The `AVG()` function will take the total of the handicaps (287) and divide by
    the number of rows that have a non-null value in the `Handicap` column (17). This
    is what we want. If we included the members without handicaps (by dividing by
    the total number of rows, 20), we would essentially be saying that these members
    have a handicap of 0 by default. This would seriously skew the results.


    It is not always so obvious whether you want the null values considered. For example,
    say we have another database with a table called `Student` and a column called
    `TestScore`. If we enter test scores for students, and some of the students do
    not take the test, then we will have a null in the `TestScore` column for those
    students. What do we really want for the average? We could take the average over
    all the students (divide the total score by the count of all students), which
    means the students who missed the test are effectively being counted as having
    scored 0\. On the other hand, we might take the average of just those who participated
    in the test (divide by the number who took the test). `AVG(TestScore)` will always
    give us just the average for those who took the test. It is by no means trivial
    to determine which of the two options you need. There is a constant debate in
    schools as to whether the pass rates (on which funding may depend) should include
    students who have dropped out along the way.


    If we want the average over all the students, including those with a null mark
    (counted as 0), we can calculate that in the query by totaling the marks (using
    the `SUM()` function) and dividing by the total number of students as seen here:


    ```

    SELECT SUM(TestMark)/COUNT(*)

    FROM Student;

    ```


    We could have entered a mark of 0 for those students who did not take the test,
    saving us this complication. However, if we do that then we can no longer distinguish
    students who took the test and got 0 from students who missed the test. Regardless
    of whether that is an issue or not, it is always useful to be aware of the implications.


    #### Managing Duplicates


    As with the `COUNT()` function, the `AVG()` function can also incorporate the
    keywords `ALL` and `DISTINCT`. Just be aware that `ALL` (which is the default)
    means all the not-null values including duplicates , as opposed to only the distinct
    not-null values. It doesn’t mean take an average over all the rows (including
    those that are null), as in our discussion in the previous section. I find it
    quite difficult to come up with examples of when you would want to average over
    just the distinct values`—`certainly none that apply to our club database.


    #### Managing Types and Output


    The `AVG()` function will accept only numeric expressions as a parameter. We cannot
    successfully average `FirstName` or `JoinDate` (although we could use functions
    to average the length of members’ first names or the number of days since their
    join date).


    What result do we expect to get when we average the handicaps of our members?
    The total of the handicaps is 287, and the number of people with handicaps is
    17\. The result for the `AVG(Handicap)` function in SQL Server 2012 is 16\. The
    result in Access 2016 is 16.8823529411765\. Why?


    In SQL Server (and some other implementations of SQL), the average function returns
    the same type as the numbers being averaged. In this case, the `Handicap` column
    is an integer type, and so `AVG(Handicap)` in SQL Server returns an integer. It
    also does an integer division (which means the result is truncated to 16 rather
    than rounded up to 17). In Access the average is returning a floating-point number
    (i.e., one with a fractional part).


    We can control how the result is calculated. If we want a result with a fractional
    part for the average, we can convert the `Handicap` value to a floating-point
    number before we do the average. To do this we can use the `CONVERT()` function
    that we mentioned in Chapter [7](#A158240_2_En_7_Chapter.html):[¹](#A158240_2_En_8_Chapter.html#Fn1)


    ```

    SELECT AVG(CONVERT(FLOAT,Handicap))

    FROM Member;

    ```


    Another way to do this is just to multiply the handicap by 1.0, which effectively
    converts it to a floating-point:


    ```

    SELECT AVG(Handicap * 1.0)

    FROM Member;

    ```


    ### The ROUND() Function


    While not strictly speaking an aggregate function, it is worthwhile to take a
    moment to look at how to perform rounding. Because averaging involves a division
    by the number of items involved, the `AVG()` function will often return a result
    with many decimal places. We use a rounding function to specify the number of
    decimal places we would like included in the output of `AVG()` and other expressions
    that result in floating-point numbers. We provide the `ROUND()` function with
    two parameters: the expression to be rounded and the number of decimal places
    to return. The following statement returns the average handicap rounded to two
    decimal places:


    ```

    SELECT ROUND(AVG(Handicap * 1.0), 2)

    FROM Member;

    ```


    Rounding can behave differently in different implementations of SQL. In Access
    the previous query will return 16.88, whereas in SQL Server it will return 16.880000\.
    While it is possible to remove the trailing zeroes in SQL Server, it is often
    better to leave that sort of formatting to front-end tools such as report writers.


    There are many different ways to carry out rounding, so it is a good idea to consult
    the documentation to understand how your implementation of SQL goes about it.
    The traditional method of everything ending in a 5 or greater to be rounded up
    (e.g., 4.5 rounds up to 5) causes a bias to higher numbers. To remove this bias
    some implementations of rounding functions round to the nearest even number. For
    example, 3.5 and 4.5 would both round to 4\. This evens things out, but it can
    come as a surprise if you are not expecting it. SQL Server’s `ROUND()` function
    rounds all the 5s up, while Access rounds the 5s to the nearest even number.


    ### Other Aggregate Functions


    SQL also provides other common aggregate functions such as `SUM()` , `MAX()` ,
    and `MIN()` , which are very straightforward to use. Similar to the `AVG()` function,
    the arguments to the `SUM()` function must be a numeric expression (either a numeric
    attribute or some expression with a numeric result, such as `Price * Quantity`).
    The arguments to `MAX()` and `MIN()` can be numeric, text, or date types. For
    text types, the order is alphabetical. For dates, the order is chronological.
    For example, `MIN(LastName)` would return the first value of `LastName` alphabetically,
    while `MAX(JoinDate)` would return the most recent value of `JoinDate`.


    It is possible to combine several aggregate functions in one query. The following
    query returns the maximum, minimum, and average values for `Handicap`.


    ```

    SELECT MAX(Handicap) AS maximum, MIN(Handicap) AS minimum,

    ROUND(AVG(Handicap * 1.0),2) AS average

    FROM Member;

    ```


    Providing an alias for the result of each column with an `AS` clause helps make
    the result easier to understand. Figure [8-4](#A158240_2_En_8_Chapter.html#Fig4)
    shows some typical output.


    ![A158240_2_En_8_Fig4_HTML.jpg](A158240_2_En_8_Fig4_HTML.jpg)


    Figure 8-4.


    Typical output from a query with several aggregate functions'
  trans: '#### 处理空值


    与 `COUNT()` 函数类似，`AVG()` 函数也不包括表达式值为 null 的行。在 `Member` 表中，我们总共有 20 名成员，其中 17
    名成员有 handicap 值。如果我们将所有 handicap 值相加，得到 287。`AVG()` 函数会取 handicap 总值（287）除以 `Handicap`
    列中具有非空值的行数（17）。这正是我们想要的。如果我们通过除以总行数（20）来包含没有 handicap 的成员，那么基本上就是默认这些成员的 handicap
    为 0。这会严重影响结果。


    是否考虑 null 值并不总是那么显而易见。例如，假设我们有另一个数据库，其中有一个名为 `Student` 的表和一个名为 `TestScore` 的列。如果我们录入学生的考试分数，而有些学生没有参加考试，那么这些学生在
    `TestScore` 列中就会有一个 null 值。我们真正想要的平均值是什么？我们可以计算所有学生的平均分（总分除以所有学生数），这意味着缺考的学生实际上被视为得了
    0 分。另一方面，我们也可以只计算参加考试的学生的平均分（除以参加考试的人数）。`AVG(TestScore)` 总是只给我们提供参加考试学生的平均分。要确定这两种选项中你需要哪一个绝非易事。学校里一直存在关于通过率（可能关系到资金）是否应该包含中途退学学生的争论。


    如果我们想要所有学生的平均分，包括那些分数为 null 的学生（计为 0），我们可以在查询中通过计算总分（使用 `SUM()` 函数）并除以学生总数来计算，如下所示：


    ```sql

    SELECT SUM(TestMark)/COUNT(*)

    FROM Student;

    ```


    我们本可以为那些没有参加考试的学生录入 0 分，以避免这种复杂性。然而，如果这样做，我们就无法再区分参加了考试但得 0 分的学生和缺考的学生。无论这是否是个问题，意识到其影响总是有用的。


    #### 处理重复值


    与 `COUNT()` 函数类似，`AVG()` 函数也可以包含关键字 `ALL` 和 `DISTINCT`。请注意，`ALL`（这是默认值）表示所有非空值（包括重复值），而不是仅指不同的非空值。它的意思不是对包括
    null 值在内的所有行求平均，这与我们在上一节讨论的不同。我发现很难想到什么时候你只想对不同的值求平均——肯定没有适用于我们俱乐部数据库的例子。


    #### 处理类型和输出


    `AVG()` 函数只接受数值表达式作为参数。我们无法成功地对 `FirstName` 或 `JoinDate` 求平均（尽管我们可以使用函数来计算成员名字长度的平均值或自加入日期以来的天数平均值）。


    当我们对成员的 handicap 求平均时，我们期望得到什么结果？handicap 总和是 287，有 handicap 的人数是 17。在 SQL Server
    2012 中，`AVG(Handicap)` 函数的结果是 16。在 Access 2016 中的结果是 16.8823529411765。为什么？


    在 SQL Server（以及 SQL 的一些其他实现）中，平均值函数返回与所平均数字相同的类型。在本例中，`Handicap` 列是整数类型，因此 SQL
    Server 中的 `AVG(Handicap)` 返回一个整数。它还进行整数除法（这意味着结果被截断为 16，而不是四舍五入为 17）。在 Access
    中，平均值返回的是一个浮点数（即带小数部分的数）。


    我们可以控制结果的计算方式。如果我们想要一个带小数部分的平均值结果，可以在求平均之前将 `Handicap` 值转换为浮点数。为此，我们可以使用在第 7 章中提到的
    `CONVERT()` 函数：¹


    ```sql

    SELECT AVG(CONVERT(FLOAT,Handicap))

    FROM Member;

    ```


    另一种方法是直接将 handicap 乘以 1.0，这实际上将其转换为浮点数：


    ```sql

    SELECT AVG(Handicap * 1.0)

    FROM Member;

    ```


    ### ROUND() 函数


    虽然严格来说不是一个聚合函数，但值得花点时间看看如何进行舍入。因为平均值涉及除以项目数量，`AVG()` 函数经常会返回一个带有很多小数位的结果。我们使用一个舍入函数来指定我们希望在
    `AVG()` 和其他产生浮点数的结果的输出中包含的小数位数。我们向 `ROUND()` 函数提供两个参数：要舍入的表达式和要返回的小数位数。以下语句返回四舍五入到两位小数的平均
    handicap：


    ```sql

    SELECT ROUND(AVG(Handicap * 1.0), 2)

    FROM Member;

    ```


    舍入在不同的 SQL 实现中可能有不同的行为。在 Access 中，前面的查询将返回 16.88，而在 SQL Server 中将返回 16.880000。虽然在
    SQL Server 中删除尾部的零是可能的，但通常最好将这类格式化工作留给报表编写器等前端工具。


    有许多不同的舍入方法，因此查阅文档以了解你的 SQL 实现如何处理舍入是一个好主意。传统的将所有以 5 或更大数字结尾的数向上舍入的方法（例如，4.5 向上舍入为
    5）会导致偏向更大的数字。为了消除这种偏差，一些舍入函数的实现会舍入到最接近的偶数。例如，3.5 和 4.5 都会舍入到 4。这平衡了结果，但如果你没有预料到，可能会感到惊讶。SQL
    Server 的 `ROUND()` 函数将所有的 5 向上舍入，而 Access 将 5 舍入到最接近的偶数。


    ### 其他聚合函数


    SQL 还提供了其他常见的聚合函数，如 `SUM()`、`MAX()` 和 `MIN()`，它们非常易于使用。与 `AVG()` 函数类似，`SUM()`
    函数的参数必须是数值表达式（数值属性或具有数值结果的某个表达式，例如 `Price * Quantity`）。`MAX()` 和 `MIN()` 的参数可以是数值、文本或日期类型。对于文本类型，顺序是按字母顺序。对于日期，顺序是按时间顺序。例如，`MIN(LastName)`
    将按字母顺序返回 `LastName` 的第一个值，而 `MAX(JoinDate)` 将返回 `JoinDate` 的最新值。


    可以在一个查询中组合多个聚合函数。以下查询返回 `Handicap` 的最大值、最小值和平均值。


    ```sql

    SELECT MAX(Handicap) AS maximum, MIN(Handicap) AS minimum,

    ROUND(AVG(Handicap * 1.0),2) AS average

    FROM Member;

    ```


    使用 `AS` 子句为每一列的结果提供别名有助于使结果更易于理解。图 8-4 显示了一些典型输出。


    ![A158240_2_En_8_Fig4_HTML.jpg](img/A158240_2_En_8_Fig4_HTML.jpg)


    图 8-4.

    包含多个聚合函数的查询的典型输出'
- fmt: '### Grouping


    If we want to know how many times a particular member has entered tournaments
    we can query the `Entry` table. For example, if we would like to find how many
    times member 235 has entered tournaments, we could select all the rows in the
    `Entry` table for that member and count them as in the following query:


    ```sql

    SELECT COUNT(*) AS NumEntries

    FROM Entry

    WHERE MemberID = 235;

    ```


    If we want to find the number of entries for a different member, we would need
    to rewrite the query with a different `WHERE` clause. If we want to find the counts
    for all members, that would get very tedious.


    Grouping allows us to find the counts for all members using one SQL statement.
    The key phrase `GROUP BY` is used to do this. Have a look at the following query:


    ```sql

    SELECT COUNT(*) AS NumEntries

    FROM Entry

    GROUP BY MemberID;

    ```


    The extra `GROUP BY` clause says, “Rather than just count all the rows in the
    `Entry` table, count all the subsets or groups with the same `MemberID`.” Figure
    [8-5](#A158240_2_En_8_Chapter.html#Fig5) illustrates how we can visualize what
    is happening.


    ![A158240_2_En_8_Fig5_HTML.jpg](A158240_2_En_8_Fig5_HTML.jpg)

    **Figure 8-5.** Counting the rows in the Entry table grouped by MemberID


    ### Including Grouped Fields in the SELECT Clause


    We can also include the fields we are grouping by in the `SELECT` clause so we
    can see which counts belong to which entries, as in the query here:


    ```sql

    SELECT MemberID, COUNT(*) AS NumEntries

    FROM Entry

    GROUP BY MemberID;

    ```


    The output of this query is shown in Figure [8-6](#A158240_2_En_8_Chapter.html#Fig6).


    ![A158240_2_En_8_Fig6_HTML.jpg](A158240_2_En_8_Fig6_HTML.jpg)

    **Figure 8-6.** Including the MemberID in the output


    ### Joining Tables Before Grouping


    We might prefer to see the names of the members in the output in Figure [8-6](#A158240_2_En_8_Chapter.html#Fig6).
    In this case, we need to join the `Entry` table with the `Member` table first,
    and then group and count.


    ```sql

    SELECT m.MemberID, m.LastName, m.FirstName, COUNT(*) AS NumEntries

    FROM Entry e INNER JOIN Member m ON m.MemberID = e.MemberID

    GROUP BY m.MemberID, m.LastName, m.FirstName;

    ```


    The output is shown in Figure [8-7](#A158240_2_En_8_Chapter.html#Fig7).


    ![A158240_2_En_8_Fig7_HTML.jpg](A158240_2_En_8_Fig7_HTML.jpg)

    **Figure 8-7.** Joining the Entry and Member tables and grouping by the IDs and
    names


    ### The GROUP BY Rule for the SELECT Clause


    You might wonder why we have included `LastName` and `FirstName` in the `GROUP
    BY` clause in the preceding query. When you are using `GROUP BY`, the `SELECT`
    clause can only include the fields you are grouping by or the aggregates. If we
    want to see the names in the output, we need to include them in the fields we
    are grouping by. This guards against cases where there might be different names
    for one `MemberID` (clearly impossible in this case, as `MemberID` is the primary
    key of the `Member` table). Putting this aside for now, if there were two rows
    with a `MemberID` of 118 with two different names, then if we group just by `MemberID`,
    it would not be possible to determine which name to associate with the count in
    the output in Figure [8-7](#A158240_2_En_8_Chapter.html#Fig7).


    ### Combining GROUP BY with WHERE Clauses


    We can get a range of different information from our data using `GROUP BY` if
    we include `WHERE` clauses and different attributes in the `GROUP BY` clause.
    Let’s take another look at the `Entry` table. If we want find the number of entries
    for each tournament, we imagine grouping all the rows with the same `TourID` together
    and then counting the rows in each set, as in the query here:


    ```sql

    SELECT TourID, COUNT(*) AS NumEntries

    FROM Entry

    GROUP BY TourID;

    ```


    The output is shown in Figure [8-8](#A158240_2_En_8_Chapter.html#Fig8).


    ![A158240_2_En_8_Fig8_HTML.jpg](A158240_2_En_8_Fig8_HTML.jpg)

    **Figure 8-8.** Counting the number of entries in each tournament


    We do not always need to count all the rows in the table. We might like to select
    a subset of the rows first. For example, we might just want to gather the statistics
    in Figure [8-8](#A158240_2_En_8_Chapter.html#Fig8) just for the year 2014\. The
    following query shows the SQL to do this. Note that the `WHERE` clause (which
    finds the subset of the rows we want to consider) must come before the `GROUP
    BY` clause:


    ```sql

    SELECT TourID, COUNT(*) AS NumEntries

    FROM Entry

    WHERE Year = 2014

    GROUP BY TourID;

    ```


    ### Grouping by Multiple Fields


    By adding more fields in the `GROUP BY` clause, we can get more detailed information.
    If we want to repeat this query for each tournament for each year, we can remove
    the `WHERE` clause and group by both `Year` and `TourID:`


    ```sql

    SELECT TourID, Year, COUNT(*) AS NumEntries

    FROM Entry

    GROUP BY TourID, Year;

    ```


    Figure [8-9](#A158240_2_En_8_Chapter.html#Fig9) shows how the grouping on both
    fields works.


    ![A158240_2_En_8_Fig9_HTML.jpg](A158240_2_En_8_Fig9_HTML.jpg)

    **Figure 8-9.** Grouping by TourID and Year


    ### Grouping with Other Aggregate Functions


    We can use grouping with aggregate functions other than `COUNT()`. For example,
    if we want to see the maximum, minimum, and average handicap for women and men,
    we could use a query like the one here:


    ```sql

    SELECT Gender, MIN(Handicap)as Minimum, Max(Handicap)as Maximum,

    ROUND(AVG(Handicap),1) AS Average

    FROM Member

    GROUP BY Gender;

    ```


    The output from this query is shown in Figure [8-10](#A158240_2_En_8_Chapter.html#Fig10).


    ![A158240_2_En_8_Fig10_HTML.jpg](A158240_2_En_8_Fig10_HTML.jpg)

    **Figure 8-10.** Grouping aggregates for Handicap by Gender'
