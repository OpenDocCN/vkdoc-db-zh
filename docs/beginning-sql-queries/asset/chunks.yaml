  trans: "\n## 用于连接的不同 SQL 表达式\n\n在上一节中，我简要提到了连接中表的顺序是否会影响执行。对于图 10-6 中的查询，答案是否定的。然而，我们还有其他表达连接的方式。以下两个查询在\
    \ SQL Server 中具有完全相同的执行计划：\n\n```\nSELECT LastName FROM Member m, Entry e WHERE\
    \ m.MemberID = e.MemberID;\nSELECT LastName FROM Entry e INNER JOIN Member m ON\
    \ m.MemberID = e.MemberID;\n```\n\n下面两条 SQL 语句则通过嵌套查询来指定连接。它们的执行计划与前面的不同，但彼此之间是相同的：\n\
    \n```\nSELECT LastName FROM Member m WHERE m.memberID IN\n(SELECT MemberID FROM\
    \ Entry);\nSELECT LastName from Member m WHERE EXISTS\n(SELECT * FROM Entry e\
    \ WHERE m.MemberID = e.MemberID);\n```\n\n那么，我们是应该使用还是避免嵌套查询呢？答案一如既往地是“**视情况而定**”。\n\
    \n在比较前面这两对 SQL 语句之前，我们需要注意它们的输出是不同的。第一对会产生重复的名字（为一个成员参加的每个锦标赛重复其姓名）。第二对查询则会产生唯一的姓名。为了进行公平比较，我们将比较以下两个具有相同输出的查询：\n\
    \n```\nSELECT DISTINCT LastName\nFROM Entry e INNER JOIN Member m ON m.MemberID\
    \ = e.MemberID;\nSELECT LastName FROM Member m WHERE m.MemberID IN\n(SELECT MemberID\
    \ FROM Entry);\n```\n\n你可以在图 10-8 中看到这两个计划。\n\n![A158240_2_En_10_Fig8_HTML.jpg](img/A158240_2_En_10_Fig8_HTML.jpg)\n\
    \n图 10-8.\n相同的输出但非常不同的执行计划和成本\n\n图 10-8 显示了顶部使用 `INNER JOIN` 关键字的查询计划和底部嵌套查询的计划。百分比表示如果这两个查询在同一个批次中执行，那么顶部的查询将占总时间的\
    \ 74%，底部的占 26%。也就是说，`INNER JOIN` 查询花费的时间是嵌套查询的三倍。\n\n顶部查询中 `DISTINCT` 关键字的添加占用了大部分时间。优化器选择对记录进行排序，以便准备移除重复的姓名。这个排序操作占第一个查询总成本的一半以上。看到这个计划，你可能会考虑在\
    \ `LastName` 上添加索引，以便可以按照 `LastName` 顺序访问 `Member` 表的记录，从而消除耗时的排序操作。\n\n除非你有真正的内部知识，否则几乎不可能准确猜测优化器会提出什么方案。长远来看，除非表的数据量巨大或者某个查询特别要求时效性，否则这可能并不重要。需要记住的重要一点是，如果你怀疑某个关键查询导致了瓶颈，有些工具可以帮助你理解发生了什么。然后你可以尝试修改索引或查询的表达方式，看看是否能加快速度。\n\
    \n## 总结\n\n索引可以显著提高许多查询的性能。然而，缺点是它们需要被维护。在对数据库进行任何调优时，了解重要的流程是什么至关重要。没有必要费尽心力去改进一个很少执行的查询，而如果你的数据库中大部分时效性强的工作是更新记录，那么提高检索性能反而会适得其反。\n\
    \n许多数据库系统提供的工具可以提供宝贵的信息。执行计划可以深入揭示查询中时间花费在哪里。可以收集有关索引使用情况或字段中数据分布的统计数据。在决定是否值得研究添加新索引时，所有这些信息都很有用。\n\
    \n以下是一些创建索引的通用经验法则。\n\n### 主键\n\n你通常需要一个很好的理由才不在表的主键字段上创建索引。默认情况下，通常会在主键上放置聚簇索引。\n\
    \n### 外键\n\n连接条件在 foreign key 和 primary key 之间的连接非常常见。因此，通常值得考虑在外键上创建索引。\n\n###\
    \ WHERE 条件\n\n如果你的查询经常在 `WHERE` 条件中使用特定字段，那么在这些字段上创建索引是很有用的。这可以实现索引查找，而不必进行表扫描来查找相关行。当\
    \ `WHERE` 条件具有**选择性**（意味着它只会检索一小部分行）时，这种方法最为有用。\n\n### ORDER BY、GROUP BY 和 DISTINCT\n\
    \n如果没有在排序条件涉及的字段上创建索引，排序可能是一个非常耗时的操作。显然，`ORDER BY` 需要对行进行排序。包含 `DISTINCT` 或 `GROUP\
    \ BY` 的查询通常会对记录进行排序以删除重复项或聚合数据。通过使用适当的索引，可以使用索引扫描按顺序检索行，从而消除耗时的排序操作。\n\n### 善用工具\n\
    \n查询优化器非常复杂。它们会维护关于你的表的统计信息（行数、列的大小、数据分布等），并利用这些信息来帮助确定高效的查询执行计划。如果你有一个希望尽可能高效的关键查询，请检查执行计划以了解时间花费在哪里。然后你可以尝试修改查询表述或添加额外索引，观察其效果。\n\
    \n脚注 1\n\nSQL 基于关系演算，它提供了要检索数据的描述。更多信息请参见附录 2。\n\n 2\n\n更正式地说，关系中的元组是没有顺序的。\n\n\
    # 11. 如何处理查询\n\n在前面的章节中，我们看到了表达查询的不同方式。我们研究了**过程式方法**，它描述了如何操作表和数据以产生所需的结果。这些查询使用描述诸如\
    \ `INNER JOIN` 和 `INTERSECTION` 等操作的关键字来表达。我们还研究了如何用**结果式方法**来表达查询，它描述的是结果数据必须满足的条件，而不是检索结果的过程。\n\
    \n然而，有时当我面对一个用自然语言描述的复杂查询时，脑子一片空白的情况也并不罕见。我手头有很多“弹药”，但一时之间却不知道该选择哪种“武器”。\n\n通常，这只是需要自信和放松的问题。大型、复杂的查询总是可以分解为一系列更小、更简单的查询，之后再组合起来。本章将介绍如何做到这一点。\n\
    \n## 理解数据\n\n这听起来像是在陈述显而易见的事实，但如果你不了解所有不同元素的数据存储在哪里以及相关表如何相互关联，你就无法从数据库中检索信息。大多数时候，你查询的是由他人设计的数据库，并且可能随着时间的推移由各种人进行维护和修改。除了理解已实现的表和关系之外，还需要对底层的现实场景有所感受。你还必须警惕一个不幸的现实：数据库可能设计得很糟糕。这可能意味着你无法准确检索所需的信息。我们将在第\
    \ 12 章更深入地探讨这种应对不良设计的问题。\n"
- fmt: '# Determine the Relationships Between Tables


    The best way to get an overview of the implementation of a database is to look
    at a schematic of the relationships between the tables. Most database management
    software provides a way of viewing the fields in the tables and the foreign key
    relationships between the tables. Figures [11-1](#A158240_2_En_11_Chapter.html#Fig1)
    and [11-2](#A158240_2_En_11_Chapter.html#Fig2) show the foreign key relationship
    diagrams for our club database as depicted by SQL Server and Microsoft Access.


    ![A158240_2_En_11_Fig2_HTML.jpg](A158240_2_En_11_Fig2_HTML.jpg)


    Figure 11-2.


    A relationship diagram from Microsoft Access


    ![A158240_2_En_11_Fig1_HTML.jpg](A158240_2_En_11_Fig1_HTML.jpg)


    Figure 11-1.


    A database diagram from SQL Server


    On the surface, the diagrams in Figures [11-1](#A158240_2_En_11_Chapter.html#Fig1)
    and [11-2](#A158240_2_En_11_Chapter.html#Fig2) look a bit different, but they
    represent exactly the same database. The Access schematic in Figure [11-2](#A158240_2_En_11_Chapter.html#Fig2)
    displays an additional copy of the `Member` and `Team` tables. The two copies
    of the `Member` table arise from the self relationship between members (that is,
    a member can coach other members). The additional copy of the `Team` table is
    because of the two relationships between `Member` and `Team`: a member can be
    the manager of a team, and a member can belong to a team. These relationships
    are depicted in the SQL Server diagram in Figure [11-1](#A158240_2_En_11_Chapter.html#Fig1)
    by showing two lines between the tables so that the tables are not shown twice.
    The different diagrammatic representations are just a quirk of the different management
    systems. Both schematics represent the same set of tables and relationships.


    The lines in the two diagrams in Figures [11-1](#A158240_2_En_11_Chapter.html#Fig1)
    and [11-2](#A158240_2_En_11_Chapter.html#Fig2) represent the foreign keys that
    were set up when the tables were created. For example, the statement for creating
    the `Member` table contains two foreign key constraints:


    ```

    CREATE TABLE Member(

    MemberID Int PRIMARY KEY,

    LastName CHAR(20),

    FirstName CHAR (20),

    MemberType CHAR (20) FOREIGN KEY REFERENCES Type,

    Phone CHAR (20),

    Handicap INT,

    JoinDate DATETIME,

    Coach INT FOREIGN KEY REFERENCES Member,

    Team CHAR (20),

    Gender CHAR (1));

    ```


    Recall from Chapter [1](#A158240_2_En_1_Chapter.html) that this line of code:


    ```

    MemberType CHAR (20) FOREIGN KEY REFERENCES Type

    ```


    means that if there is a value in the `MemberType` field then that value must
    exist in the primary key field in the `Type` table. A line representing this foreign
    key relationship between the `Member` table and the `Type` table can be seen in
    Figures [11-1](#A158240_2_En_11_Chapter.html#Fig1) and [11-2](#A158240_2_En_11_Chapter.html#Fig2).


    This line of code:


    ```

    Coach INT FOREIGN KEY REFERENCES Member

    ```


    means that the values in the `Coach` field must already exist in the primary key
    field in the `Member` table; that is, there is a self relationship on the `Member`
    table. This relationship is expressed in Figure [11-1](#A158240_2_En_11_Chapter.html#Fig1)
    with the loop connecting the `Member` table to itself. In Figure [11-2](#A158240_2_En_11_Chapter.html#Fig2)
    the relationship is depicted by displaying a second copy of the `Member` table.


    # Real World Versus Implementation


    The database diagrams in the previous section represent how the database has been
    implemented and in particular which foreign keys have been set up. When the database
    is first set up, the design will be based on a conceptual data model that describes
    how the tables for a particular problem are interrelated. A number of methods
    exist for representing a data model, such as entity-relationship (ER) diagrams
    and the UML class diagrams we have been using in this book. Figure [11-3](#A158240_2_En_11_Chapter.html#Fig3)
    shows the class diagram for the golf club. Refer back to Chapter [1](#A158240_2_En_1_Chapter.html)
    if you need a refresher on how to interpret the lines and numbers.


    ![A158240_2_En_11_Fig3_HTML.jpg](A158240_2_En_11_Fig3_HTML.jpg)


    Figure 11-3.


    Class diagram representing the conceptual model


    The class diagram in Figure [11-3](#A158240_2_En_11_Chapter.html#Fig3) does not
    display foreign key fields in the classes. You can see this by comparing the `Entry`
    table in Figure [11-3](#A158240_2_En_11_Chapter.html#Fig3) with those in the two
    earlier database diagrams. The foreign keys `MemberID` and `TourID` are missing
    as attributes in the class diagram. Foreign keys are simply a way of representing
    the relationship between classes if we choose to implement the data model in a
    relational database. If we decide to implement it in an object-oriented database
    we might not need foreign key fields at all.


    A class diagram with well-labelled relationships gives us a much greater understanding
    of the real-world situation than do the implementation diagrams in Figures [11-1](#A158240_2_En_11_Chapter.html#Fig1)
    and [11-2](#A158240_2_En_11_Chapter.html#Fig2). Have a look at the relationships
    between `Member` and `Team` to see what I mean.


    The database diagrams presented by relational database software show you the foreign
    keys that have actually been set up. These may not tell the whole story. The developer
    may not have implemented the relationship for coaching (for example) with a foreign
    key constraint on the `Coach` field. He or she may have overlooked the requirement
    or may have decided to enforce the constraint that a coach must be an existing
    member some other way (with a trigger or via the interface). However, even if
    there is no foreign key constraint on the `Coach` field in the `Member` table,
    we still need to understand that members coach other members if we want to design
    reliable queries about coaching.


    In some cases, the implemented database may not have much in common with an accurate
    data model. For example, if the golf club database contained separate tables for
    members, coaches, and managers or one of the relationships between the `Member`
    and `Team` tables was not implemented, then the database diagram and the data
    model would look quite different. The likelihood of getting reliable information
    would be low. Chapter [12](#A158240_2_En_12_Chapter.html) looks at problems like
    this, although short of a major redesign there is sometimes not much you can do.'
