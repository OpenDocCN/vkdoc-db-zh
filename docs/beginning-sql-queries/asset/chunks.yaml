  trans: '

    ### 无主键的表


    上一节举例说明了如果底层数据库包含不合适的表，你可能会遇到的问题。有时你会发现表结构是正确的，但却没有设置合适的主键或外键约束。在这种情况下，底层数据值很可能不一致。虽然你的查询语句可能构造正确，但其结果将不可靠。本节将介绍如何使用查询来发现数据中可能存在的一些不一致性。


    假设图 12-3 中的 `Membership` 表在创建时没有设置主键。这将允许表中存在重复行。例如，我们可能会有两行完全相同的记录，都表示会员 153
    在 `TeamB` 中。一个用于统计 `TeamB` 成员数量的查询将产生错误的结果。


    如果你尝试在已存在重复记录的情况下添加主键，系统会报错。这正是发现问题的一种方法！在添加主键之前，你需要先找出重复的行，并研究如何解决问题。一个便捷的找出重复值的方法是，在应该是唯一的字段上执行
    `GROUP BY` 查询（参见第 7 章），并使用 `HAVING` 子句找出那些出现两次或以上的记录。以下查询将为我们潜在的主键字段 `MemberID`
    和 `Team` 返回重复值：


    ```sql

    SELECT MemberID, Team, Count(*)

    FROM Membership

    GROUP BY MemberID, Team

    HAVING Count(*) > 1;

    ```


    如果表中除了主键字段外还有其他字段，你需要手动检查这些列中的值，以决定应该删除哪一行。只有主键字段的 `Membership` 表则会导致另一个问题。我们如何只删除会员
    153 在 `TeamB` 中的那一行的一个副本呢？因为整行数据都是相同的，我们无法区分它们，所以任何删除一行的查询都会把两行都删除。你的软件可能提供类似表格的界面，允许你只删除其中一行，但如果没有，你可能不得不删除两行然后再手动添加回一条记录。如果存在大量重复值，那么另一种解决方法是创建一个新表，然后仅从原表中插入不重复的值。以下查询展示了如何填充新表
    `NewMembership`：


    ```sql

    INSERT INTO NewMembership

    SELECT DISTINCT MemberID, Team

    FROM Membership;

    ```


    之后，你需要移除所有引用旧表的外键约束，删除旧表，重命名新表，并重新创建外键。确保从一开始每张表都有主键会容易得多！


    ### 缺少外键的表


    另一个问题是 `Membership` 表（如图 12-3 所示）没有外键约束。然后我们可能会遇到这样的问题：存在一行记录表示会员 1118 在 `TeamA`
    中，但在 `Member` 表中却找不到会员 1118。如果数据存在这类问题，我们将无法添加外键约束。


    有几种方法可以在 `Membership` 表中找出那些在 `Member` 表中没有匹配条目的 `MemberID` 值。一种方法是使用嵌套查询（在第 4
    章讨论），如下所示：


    ```sql

    SELECT ms.MemberID FROM Membership ms

    WHERE ms.MemberID NOT IN

    (SELECT m.MemberID FROM Member m);

    ```


    找到不匹配的 `MemberID` 值后，我们必须判断这是输入错误，还是 `Member` 表中缺失了该会员。


    当数据处于一致状态时，就可以为 `Membership` 表添加外键约束，以确保它保持这种状态。以下查询将向 `MemberID` 字段添加该约束：


    ```sql

    ALTER TABLE Membership

    ADD FOREIGN KEY (MemberID)

    REFERENCES Member;

    ```


    ### 两个表中的相似数据


    有时，数据库中可能包含不必要的多余表，这会导致问题。对于我们的俱乐部数据库，一个例子可能是为教练或经理单独设立一张表，如图 12-4 所示。其理由可能是这张额外的表能更方便地创建教练及其电话号码列表（否则需要自连接或嵌套查询）。


    ![A158240_2_En_12_Fig4_HTML.jpg](img/A158240_2_En_12_Fig4_HTML.jpg)

    *图 12-4. 为教练增设的表可能导致数据不一致*


    这张多余的表不可避免地会带来问题。在图 12-4 中，我们已经看到 William Cooper 的电话号码数据不一致。唯一的真正解决办法是去掉这张多余的表。


    如果像图 12-4 这样的额外表的目的不明确，我们可以使用集合运算来调查哪些会员出现在各个表中。交集运算符会找出同时存在于两个表中的人的行记录，而差集运算符会找出只存在于一个表而不在另一个表中的人。这可能有助于理解这些表所代表的内容。


    一旦设计正确，创建一个显示教练信息的视图将对那些不想每次查询教练信息时都创建自连接的用户有所帮助。以下查询可以实现这一点：


    ```sql

    CREATE VIEW CoachInfo AS

    SELECT * FROM Member

    WHERE MemberID IN

    (SELECT Coach FROM Member);

    ```

    '
- fmt: '### Inappropriate Types


    Having the fields in a table created with inappropriate types is another problem
    that can make queries look as though they are not behaving. I’ve seen whole databases
    where every field is a default text field.


    Having the wrong field type means the data misses a great deal of validity checking.
    For example, if our `Member` table had all text fields, we could end up with values
    like "16a" or "1o" in the `Handicap` column, which should only have integer numbers,
    or text like "Brenda" in the `Coach` column, which should only contain IDs of
    members.


    Incorrectly entered values aside, inappropriate types give rise to other problems.
    Each type has its own rules for ordering values. Text types order alphabetically,
    numbers order numerically, and dates order chronologically. Different orderings
    clearly will be an issue if we add an `ORDER BY` clause to a query. A text field
    containing numbers will order alphabetically, giving an order like "1," "15,"
    "109," "20," "245," and "33," as described in Chapter 2.


    Incorrect types also cause problems when making comparisons. If we ask for values
    to be compared, the comparison used will depend on how the particular field type
    involved is ordered. For numbers entered in a text field, we will get comparisons
    such as `"109" < "15"` or `"33" > "245"` as per the ordering described in the
    previous paragraph. This will cause some odd output if we ask for people with
    handicaps less than 5, for example. It can be difficult to sort out what is going
    wrong, because the query syntax is fine and the data appears to be OK. Going behind
    the scenes to check out the data type might not be something that is immediately
    obvious.


    It is possible to change the type of a column in an existing table, but I find
    it a bit scary. For example, if you change from text to numeric values, "10" will
    probably be fine but "1o" will cause an error. I prefer a more conservative approach:
    I make a new table with the appropriate types, and then insert the old values
    with the aid of a conversion function. The query that follows shows how we could
    populate a new table `NewMember` with IDs and names and with the old text values
    for the `Handicap` column converted to numeric values:


    ```sql

    INSERT INTO NewMember (MemberID, LastName, FirstName, Handicap)

    SELECT MemberID, LastName, FirstName, CONVERT(INT, Handicap)

    FROM Member;

    ```


    This way, we still have the original data if the conversions result in something
    unexpected.


    ## Problems with Data Values


    Even with a well-designed database, we still have the issue of the accuracy of
    the data that has been entered. As the query designer, you can’t be held responsible
    for some accuracy problems. If a person’s address has been entered incorrectly,
    there is not much anyone can do to find or fix the problem (apart from waiting
    for the mail to be returned to sender). However, you can be aware of a number
    of things, and even if you can’t fix the problems, you can at least raise some
    alarms. In addition, it is sometimes possible to fix some problem data with careful
    use of update queries.


    ### Unexpected Nulls


    Nulls can cause all sorts of grief in databases. The real problem (as discussed
    in Chapter 2) is that a null can mean either that the value is unknown or that
    the value doesn’t apply for a particular record. If a member in our club has a
    null value for his `Team` field, it could mean he isn’t on a team or it could
    mean that he is on a team but we haven’t recorded which one. As with other data
    problems, there is not much we can do about this. However, with something like
    the `Gender` field, we know that for the golf club, all members need to identify
    as either male or female. The nulls mean that for some members the gender has
    not been recorded. The same applies to fields like date of birth.


    If, for example, you are asked for a list of the men in the club, it is often
    a good idea to also run another query for those rows where `Gender IS Null`. You
    can then say to your client, "Here are the men, and here are the members I’m not
    sure about." Such an approach can help avoid letters from aggrieved gentlemen
    who don’t appear on the list.


    Be aware of the differences between queries with the following two counts: `COUNT(*)`
    and `COUNT(Gender)`. The first will count all the rows in the database; the second
    will count all the rows with a non-null value for gender. In the ideal golf club,
    these would be the same. In practice, they may not be.


    ### Incorrect or Inconsistent Spelling


    Any database will have spelling mistakes in the data at some point. Mr. Philips
    may appear as Phillips, Philipps, or Philps for various reasons, ranging from
    illegible handwriting on the application form to a simple data-entry mistake.
    If you are trying to find information about Mr. Philips and you suspect there
    might be a problem, you can use functions or wildcards to find similar data. Different
    products have different ways of doing this.


    We can use the keyword `LIKE` to find similar spellings. The wildcard symbol `%`
    (`*` in Access) stands for any group of characters. Our several versions of spelling
    for Philips would all be retrieved by the following query:


    ```sql

    SELECT * FROM Member

    WHERE LastName LIKE ''Phil%'';

    ```


    Another problem involving incorrect or inconsistent spelling arises when you might
    be expecting a particular set of values or categories in a field. For example,
    in our `Member` table, we might be expecting values `M` or `F` in the `Gender`
    column, but there may be the odd `male` or `m` value. In the `MemberType` column,
    we expect `Junior`, `Senior`, or `Associate`, but in practice may find `jnior`
    or `senor`. If the tables have been designed with appropriate check constraints
    or foreign keys, this won’t be a problem. However, often these constraints are
    not present, so it is useful to check for problematic entries with a query such
    as the one here:


    ```sql

    SELECT * FROM Member

    WHERE MemberType NOT IN (''Senior'', ''Junior'', ''Associate'');

    ```


    Having found the rows that do not conform to expectations it may be possible to
    amend the data and then apply a check constraint so that it remains consistent.
    For example, the following query will apply a constraint on the `MemberType` field
    so that only the valid values can be entered:


    ```sql

    ALTER TABLE Member

    ADD CONSTRAINT Chk_type CHECK(MemberType IN

    (''Senior'', ''Junior'', ''Associate''));

    ```'
