- fmt: '## SQL, Algebra, and Calculus


    SQL is a language that is mostly based on relational calculus. Relational calculus
    describes the conditions the retrieved tuples must obey. In the following SQL
    query, the `WHERE` clause describes the resulting tuples:


    ```

    SELECT LastName, FirstName, Handicap, PracticeNight

    FROM Member, Team

    WHERE TeamName = Team AND Handicap < 15;

    ```


    Although SQL is a calculus-based language, more and more keywords suggesting set
    operations from relational algebra have been included in the syntax over the years.
    In many cases this makes the queries easier to understand. The preceding query
    can also be written using the syntax associated with the relational algebra inner
    join operation, as follows:


    ```

    SELECT LastName, FirstName, Handicap, PracticeNight

    FROM Member INNER JOIN Team ON TeamName = Team

    WHERE Handicap < 15;

    ```


    The preceding SQL appears to suggest that the join is carried out first and then
    those tuples with `Handicap < 15` are retrieved. This is not the case in practice.
    SQL is simply a description of the resulting tuples and does not imply how the
    query will be carried out. The database’s query optimizer will determine how the
    tuples are retrieved, and a good optimizer would carry out the two queries in
    the same (most efficient) way.


    In the remainder of this appendix we will look at a more formal notation for relational
    algebra and calculus. I will often provide an equivalent SQL expression and will
    choose one that is similar to the algebra or calculus depending on the section.
    The important thing to remember is that all SQL expressions are descriptions of
    the query output, and the way they are expressed does not necessarily determine
    the operations involved in retrieving the resulting data.


    ## Relational Algebra: Specifying the Operations


    With relational algebra, we describe queries by considering a sequence of operations
    or manipulations on the relations in the database. Some operations act on one
    relation (unary operations), while others are different ways of combining data
    from two relations (binary operations). Every time we perform an operation on
    one or more relations the result is another relation. This is a very powerful
    concept and means we can build up complicated queries in small steps by taking
    the result of one operation and applying another operation to it.


    The relational algebra operations and the symbols commonly used to represent them
    are shown in Table [A2-2](#A158240_2_En_14_Chapter.html#Tab2).


    Table A2-2. Relational Operators and Their Symbols


    | Operation | Symbol |

    | --- | --- |

    | select | σ |

    | project | π |

    | Cartesian product | ![$$ \times $$](A158240_2_En_14_Chapter_IEq1.gif) |

    | union | ∪ |

    | difference | - |

    | inner join | ⋈ |

    | intersection | ∩ |

    | division | ÷ |


    The operations are not completely independent. For example, later we will see
    that an inner join is defined as a Cartesian product followed by a select and
    a project. The first five operators in Table [A2-2](#A158240_2_En_14_Chapter.html#Tab2)
    can be used to define the final three, which is why SQL does not need to provide
    keywords representing division and intersection. However, it is convenient to
    be able to specify the equivalent SQL for an operation such as inner join because
    it occurs so frequently in database queries. We will now introduce a more formal
    notation for each of the operations and show how it can be used to specify queries.


    ### Select


    The select operation returns just those tuples from a relation that satisfy a
    particular condition involving the attributes. An example of using a select operation
    would be to retrieve all the senior members from our `Member` relation. The Greek
    letter sigma (σ) stands for the select operation, and the condition, `MemberType
    =` ''`Senior`'', is specified in a subscript. The following expression shows the
    notation for using select to return senior members:


    ![$$ {\upsigma}_{\mathrm{MemberType}\ {=}^{\prime }{\mathrm{Senior}}^{\hbox{''}}}\
    \left(\mathrm{Member}\right) $$](A158240_2_En_14_Chapter_Equa.gif)


    Each tuple in the relation `Member` is investigated, and if the tuple meets the
    condition it is included in the resulting relation. In table terms, the select
    operator retrieves a subset of the rows of the table. All of the attributes or
    columns are returned.


    In SQL the `WHERE` clause contains the condition for the select operator and controls
    the tuples or rows that are returned. The SQL equivalent of the select operation
    ![$$ {\upsigma}_{\mathrm{MemberType}\ {=}^{\prime }{\mathrm{Senior}}^{\hbox{''}}}\
    \left(\mathrm{Member}\right) $$](A158240_2_En_14_Chapter_IEq2.gif) is:


    ```

    SELECT *

    FROM Member m

    WHERE m.MemberType = ''Senior'';

    ```


    Note that the `SELECT` keyword in SQL has nothing directly to do with the relational
    algebra select operation. More about that in the next section.


    ### Project


    The project operation returns a relation where the attributes are a subset of
    the attributes of a relation. The project operator is denoted by π (pi), and the
    attributes are listed in a subscript. In table terms, project returns a subset
    of the columns of a table. The following statement would return the `FirstName`
    and `LastName` attributes from every tuple in the relation `Member`:


    ![$$ {\uppi}_{\mathrm{FirstName},\ \mathrm{LastName}}\left(\mathrm{Member}\right)
    $$](A158240_2_En_14_Chapter_Equb.gif)


    How many tuples or rows would you expect to be returned from the `Member` relation
    as a result of the operation π[FirstName](Member)? The tuples consist of the single
    attribute `FirstName`. The `Member` relation has 20 tuples, but that includes
    two occurrences of William, two of Robert, and three of Thomas. Earlier I mentioned
    that the result of every operation results in another relation. The result of
    π[FirstName](Member) must be a set of unique tuples. The duplicates will all be
    removed, leaving us with 16 unique names.


    Think of the project operation as returning all the unique combinations of values
    for the specified attributes.


    In SQL the attributes to be returned by the project operator are specified in
    the `SELECT` clause. I know this seems perverse, but remember that SQL syntax
    is based on relational calculus, not on algebra. The SQL equivalent of the project
    operation π[FirstName, LastName](Member) is:


    ```

    SELECT DISTINCT FirstName, LastName

    FROM Member;

    ```'
