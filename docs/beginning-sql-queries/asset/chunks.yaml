  trans: '

    ### 检查不应被返回的行


    与检查应被返回的行类似，浏览数据并找出一个没有教练作为经理的团队。TeamA 的经理（成员 239）并未作为教练出现在`Member`表中，因此请确保该团队未包含在你的输出中。再次强调，如果真实数据无法覆盖所有可能性，使用一些虚拟数据来检查是个好主意。


    ### 检查边界条件


    如果一个查询包含任何类型的数字比较，那么除了检查应该返回的数据和不应该返回的数据之外，我们还应该检查边界情况。考虑一个查询，我们想找出加入俱乐部超过十年的人。为了确保正确性，我们需要检查三种可能性：


    *   确保对于会员年限少于 10 年的人（例如，8 年会龄），没有记录被返回。

    *   确保一个已加入俱乐部 12 年的人，其记录确实被检索到。

    *   检查一个会龄恰好为 10 年的人。


    最后一个边界条件总是很棘手。这归结为对自然语言问题的解读。“超过十年”是否包括那些恰好在十年前那个季度加入的人？嗯，可能包括，因为一个季度涵盖了一整年。对于这类数字比较，决策在于我们在选择条件中使用`>`还是`>=`。如果对查询意图有任何疑问，向用户确认是很重要的。


    在表中找到恰好处于边界上的数据并不总是容易的。然而，通常可以修改查询中的数值以匹配数据。找到一个特定成员，并将你查询中比较的值改为匹配他们的会龄。如果 Harry
    是 16 年前加入的，将查询改为与数值 16 进行比较，并查看 Harry 是否如你所预期的那样被包含（或未被包含）。


    另一个重要的边界条件，特别是对于聚合和计数（在第 8 章中介绍），是值 0。考虑这样一个查询：“找出参加过少于六个锦标赛的成员。” 对`Entry`表进行分组计数肯定会返回一些行，我们可以检查那些参加次数少于、多于或恰好六次的人。然而，那些从未参加过任何锦标赛的成员呢？他们根本不会出现在`Entry`表中，因此会从结果中缺失。所以，每当涉及聚合时，总要检查计数为
    0 时会发生什么。例如，你的查询是否会返回那些没有参加过任何锦标赛的成员？


    ### 检查空值


    请注意，你正在检查的某些值可能是空值（在第 2 章中讨论）。你关于团队经理的查询如何处理`Manager`字段为空的情况？用一些虚拟数据试试看。当我们运行关于会龄的查询时，如果`JoinDate`字段中存在空值，我们期望（或希望）发生什么？


    ## 总结


    开始查询的第一条规则是不要惊慌。下一条规则是小步前进，并查看中间输出，以判断到目前为止的操作是否对你有帮助。在初始查询中保留尽可能多的列，以便你可以检查自己是否理解正在发生的事情。


    图 11-14 总结了一些在刚开始处理查询时可以采取的步骤。该图并未涵盖整个过程，但你应该能够利用这些步骤做出合理的开始。更多帮助请参考相关章节。


    ![A158240_2_En_11_Fig14_HTML.gif](img/A158240_2_En_11_Fig14_HTML.gif)


    图 11-14. 帮助你开始处理棘手查询的一些步骤


    # 12. 常见问题


    在本书中，我们探讨了处理各类查询的不同方法。然而，即使一个查询检索出了一些看起来有效的行，也可能并非万事大吉。在上一章中，我们审视了检查输出的重要性，以确认（至少部分）预期的行被检索出来，同时也检查并确保（至少部分）不正确（或不相关）的行没有被返回。


    查询可能遇到的问题不仅仅是 SQL 语句语法错误（尽管这当然可能发生）。表设计或数据值的问题也会影响查询的准确性。在本章中，我们将探讨一些常见的设计和数据问题，以及一些最常见的语法错误。


    ## 糟糕的数据库设计


    良好的数据库设计对于能够提取准确信息至关重要。不幸的是，你有时会面临设计糟糕且维护不善的数据库。通常你能做的不多。有时你可以提取出看起来像是所需的信息，但应该附带一个警告，指出底层数据可能不一致。在本节中，我们将看一些常见问题以及如何缓解它们。

    '
- fmt: '### Data That Is Not Normalized


    One of the most common data design mistakes is to have tables that are not normalized.
    We looked at an example of this in Chapter [1](#A158240_2_En_1_Chapter.html).
    Rather than having two tables, one for members and one for membership information
    such as fees, all this data was stored in a single table. As can be seen in Figure
    [12-1](#A158240_2_En_12_Chapter.html#Fig1), this has the effect of storing the
    fee information several times.


    ![A158240_2_En_12_Fig1_HTML.jpg](A158240_2_En_12_Fig1_HTML.jpg)


    Figure 12-1. A non-normalized `Member` table containing fee information


    What happens now if we are asked to find the fee for senior members? The query
    here will result in two values: 300 and 250.


    ```

    SELECT DISTINCT Fee

    FROM Member

    WHERE MemberType = ''Senior''

    ```


    Although the two values retrieved by the query may be surprising, nothing is wrong
    with the query or the result. The value for Brenda Nolan, which is inconsistent
    with the other senior members, gives us the additional fee result. That value
    may be a typographical error, or it may indicate some sort of discount for Brenda,
    or it may be an instance of last year’s fee that has not been updated. In either
    case, there is a problem with the design. The design should allow for regular
    fees for each grade to be recorded consistently and, if necessary, allow for storage
    of additional discounting regimes. At this point, other than redesigning the tables,
    there is nothing we can do but return the list of fees that have been recorded
    against the senior members. It is just worth understanding the underlying issues.


    Another problem you may encounter is a single table that stores multivalued data.
    The versions of the club tables that we have been using allow a member to belong
    to just one team. The club may evolve to have several different types of teams
    (interclub teams, social teams, pairs, foursomes, and so on) that members can
    belong to at the same time. When the requirement for a second team to be recorded
    against a member arises, a common short-term fix is to add another `Team` column
    to the existing table. Figure [12-2](#A158240_2_En_12_Chapter.html#Fig2) shows
    how the `Member` table might have evolved to allow members to be associated with
    up to three teams.


    ![A158240_2_En_12_Fig2_HTML.jpg](A158240_2_En_12_Fig2_HTML.jpg)


    Figure 12-2. Poor table design to store more than one team for a member


    Now, suppose we are asked to find those members in `TeamB`. Brenda has `TeamB`
    in the `Team1` column, Helen has `TeamB` in the `Team2` column, and Thomas has
    `TeamB` in the `Team3` column. We need to check every team column for the existence
    of `TeamB`. This isn’t difficult, as the query here shows:


    ```

    SELECT * FROM Member

    WHERE Team1 = ''TeamB'' OR Team2 = ''TeamB'' OR Team3 = ''TeamB'';

    ```


    While we can extract the information we require from the table in Figure [12-2](#A158240_2_En_12_Chapter.html#Fig2),
    the design is going to cause problems. We will have trouble if we have queries
    like “Find members who are in both `TeamA` and `TeamB`” or “Find members who are
    in more than two teams.” You could probably devise queries that would answer these
    questions, but they would be ungainly. I would ask for the database to be redesigned
    properly before trying to fulfill such requests. If you meet resistance you can
    ask them what they will do if a member belongs to four teams or maybe twenty teams.


    If members can belong to several teams we have a `Many`–`Many` relationship, which
    should be represented in a relational database with an intermediate `Membership`
    table[¹](#A158240_2_En_12_Chapter.html#Fn1) — something like the one in Figure
    [12-3](#A158240_2_En_12_Chapter.html#Fig3).


    ![A158240_2_En_12_Fig3_HTML.jpg](A158240_2_En_12_Fig3_HTML.jpg)


    Figure 12-3. A `Membership` table that records the relationship between members
    and teams


    The `Membership` table in Figure [12-3](#A158240_2_En_12_Chapter.html#Fig3) records
    relationships between members and teams and is very similar to the `Entry` table,
    which records relationships between members and tournaments. The `Membership`
    table will need to be joined with the `Member` table to find the associated names,
    but if that is done we will have the same information as the one in Figure [12-2](#A158240_2_En_12_Chapter.html#Fig2).
    With the new `Membership` table, we can now use all the relational operations,
    as described in previous chapters, to easily answer questions like “Who is in
    `TeamA` and `TeamB`?” and “Who is in three or more teams?”


    We can create a `Membership` table with the following SQL code. The table includes
    only two foreign keys, to the existing `Member` and `Team` tables, and those fields
    also form a concatenated primary key.


    ```

    CREATE TABLE Membership(

    MemberID INT FOREIGN KEY REFERENCES Member,

    Team CHAR(20) FOREIGN KEY REFERENCES Team,

    PRIMARY KEY (MemberID, Team) );

    ```


    If you don’t mind a bit of manual fiddling about, you can populate the new `Membership`
    table with repeated update queries like the one here:


    ```

    INSERT INTO Membership (MemberID, Team)

    SELECT MemberID, ''TeamA''

    FROM Member

    WHERE Team1 = ''TeamA'' OR Team2 = ''TeamA'' OR Team3 = ''TeamA'';

    ```


    The query finds each member who is in `TeamA` and creates an appropriate row in
    the `Membership` table. If there are not too many teams, you can manually alter
    the second and last lines of the query for each team (`TeamA`, `TeamB`, and so
    on) and populate the new `Membership` table quite quickly. You then need to delete
    the `Team` columns from the `Member` table in Figure [12-2](#A158240_2_En_12_Chapter.html#Fig2),
    and the database will be greatly improved.'
  raw: '### Data That Is Not Normalized


    One of the most common data design mistakes is to have tables that are not normalized.
    We looked at an example of this in Chapter [1](#A158240_2_En_1_Chapter.html).
    Rather than having two tables, one for members and one for membership information
    such as fees, all this data was stored in a single table. As can be seen in Figure
    [12-1](#A158240_2_En_12_Chapter.html#Fig1), this has the effect of storing the
    fee information several times.


    ![A158240_2_En_12_Fig1_HTML.jpg](A158240_2_En_12_Fig1_HTML.jpg)


    Figure 12-1.


    A non-normalized Member table containing fee information


    What happens now if we are asked to find the fee for senior members? The query
    here will result in two values: 300 and 250.


    ```

    SELECT DISTINCT Fee

    FROM Member

    WHERE MemberType = ''Senior''

    ```


    Although the two values retrieved by the query may be surprising, nothing is wrong
    with the query or the result. The value for Brenda Nolan, which is inconsistent
    with the other senior members, gives us the additional fee result. That value
    may be a typographical error, or it may indicate some sort of discount for Brenda,
    or it may be an instance of last year’s fee that has not been updated. In either
    case, there is a problem with the design. The design should allow for regular
    fees for each grade to be recorded consistently and, if necessary, allow for storage
    of additional discounting regimes. At this point, other than redesigning the tables,
    there is nothing we can do but return the list of fees that have been recorded
    against the senior members. It is just worth understanding the underlying issues.


    Another problem you may encounter is a single table that stores multivalued data.
    The versions of the club tables that we have been using allow a member to belong
    to just one team. The club may evolve to have several different types of teams
    (interclub teams, social teams, pairs, foursomes, and so on) that members can
    belong to at the same time. When the requirement for a second team to be recorded
    against a member arises, a common short-term fix is to add another `Team` column
    to the existing table. Figure [12-2](#A158240_2_En_12_Chapter.html#Fig2) shows
    how the Member table might have evolved to allow members to be associated with
    up to three teams.


    ![A158240_2_En_12_Fig2_HTML.jpg](A158240_2_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    Poor table design to store more than one team for a member


