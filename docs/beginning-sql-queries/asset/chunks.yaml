  trans: '## 无从下手？


    现在，让我们来看这样一种情况：我们充分理解了自然语言查询的意图，并且对涉及哪些表有了一定概念。我们已经检查了一些关键词，但仍然感到困惑。接下来该怎么办？这种情况并不少见（我经常遇到），所以放松一点。


    当我感到无从下手时，我会把集合操作和 SQL 统统抛在脑后。我不再去想表、外键、连接等等。相反，我会打开我认为回答问题可能需要用到的表，查看其中的一些数据。我尝试找到一些应该是查询会检索出的例子。然后，我尝试写下使这些特定数据可以被接受的条件。


    这就是**结果导向法**，描述了查询返回的行应当遵循的条件。如果你在决定操作表的可能操作（即**过程导向法**）时遇到困难，这是一个极好的推进方法。


    让我们尝试一个我最初想到时有点被难住的查询：“哪些球队的教练是他们的管理者？”这里描述的步骤真的能帮上忙。


    ### 找到一些有用的表


    让我们看看查询“哪些球队的教练是管理者？”中的关键词。我们有“球队”、“教练”和“管理者”这些名词。我们有一张名为 `Team` 的表，而 `Coach`
    和 `Manager` 分别是 `Member` 表和 `Team` 表中的字段。所以，`Team` 表和 `Member` 表看起来是一个很好的起点。


    ### 尝试手工回答问题


    接下来，看看表中的数据，思考你将如何判断一支球队的教练是否是其管理者。图 11-12 展示了这两个表的一些相关列。你能找到一支满足条件的球队吗？


    ![A158240_2_En_11_Fig12_HTML.jpg](img/A158240_2_En_11_Fig12_HTML.jpg)


    图 11-12.


    如何判断一支球队的教练是否也是管理者？


    我们可以很容易地找到两位球队管理者的 ID。他们是 `Team` 表中 `Manager` 列的值（239 和 153）。现在，我们如何检查这些成员是否是教练？查看
    `Member` 表，我们看到教练位于 `Coach` 列中。我们需要检查这两位管理者中是否有人出现在 `Coach` 列中。成员 153 确实出现在 `Coach`
    列中，所以（TeamB）是由一名教练管理的。


    ### 写下对检索结果的描述


    图 11-12 说明了我们如何确定 TeamB 的教练是其管理者。我们现在需要写下导致该结论的逻辑描述。在这里，我喜欢用手指指向相关的行来更轻松地描述查询，如图
    11-13 所示。


    ![A158240_2_En_11_Fig13_HTML.jpg](img/A158240_2_En_11_Fig13_HTML.jpg)


    图 11-13.


    为行命名以帮助描述所需数据


    我们将检查每一支球队，以决定它是否应该被检索。在图 11-13 中，这由标记为 `t` 的手指表示，它会依次访问每一行。我们可以将当前行是否符合标准描述如下：


    > 如果存在 `Member` 表中的一行 `m`，其教练值 `m.Coach` 与球队的管理者 `t.Manager` 相同，那么我将输出 `Team`
    表中行 `t` 的 `TeamName`。


    我们现在几乎可以直接将此翻译成 SQL，使用一个嵌套查询（在第 4 章讨论）。一个可能的查询是：


    ```sql

    SELECT t.TeamName FROM Team t

    WHERE EXISTS

    (SELECT * FROM Member m WHERE m.Coach = t.Manager);

    ```


    ### 有替代方案吗？


    初次尝试的查询不一定是最优雅的。毕竟，我们遵循这条路径正是因为一开始被难住了。这对于查询的执行可能不是问题，因为优化器可能会找到一个高效的过程。然而，一个不够优雅的
    SQL 语句可能会让你和他人在以后难以理解。遵循手工求解查询并描述条件的技术，通常能帮助你理解自己试图做什么。这往往会让查询看起来比最初想象的容易得多。


    在按照上一节的描述进行了第一次查询尝试后，我们可能会意识到可以这样想：“管理者只需要在教练集合中。”我们可以通过以下查询轻松找到教练的 ID：


    ```sql

    SELECT m.Coach FROM Member m;

    ```


    然后，我们可以在一个嵌套查询中使用它，如下所示：


    ```sql

    SELECT t.TeamName FROM Team t

    WHERE t.Manager IN

    (SELECT m.Coach FROM Member m);

    ```


    对我来说，前面的查询比之前的那个更简单易懂，尽管它们的结果是等价的。


    我们也可以这样表述图 11-13 中说明的条件：


    > 如果我在 `Team` 表中有行 `t`，在 `Member` 表中有行 `m`，那么如果 `t.Manager = m.Coach`，我将输出 `Team`
    表中行 `t` 的 `TeamName`。


    以下是上述句子翻译成的 SQL：


    ```sql

    SELECT t.TeamName FROM Team t, Member m

    WHERE t.Manager = m.Coach;

    ```


    前面的查询可以重写为一个连接：


    ```sql

    SELECT t.TeamName

    FROM Team t INNER JOIN Member m ON t.Manager = m.Coach;

    ```


    就我个人而言，我不觉得连接操作对于这个查询特别直观。我怀疑其他人看到这个查询时，不会很快理解它的目的。


    鉴于有几种方式来表述这个查询，如果你认为效率可能很重要（在此例中不太可能），检查它们的相对效率会很有用（如第 10 章所讨论）。如果我们在连接查询的 `SELECT`
    子句中添加一个 `DISTINCT` 短语，那么所有四种替代方案都会产生相同的结果。对于 SQL Server 2012，每个查询都有相同的执行计划，因此它们在底层都是以完全相同的方式执行的。


    ## 检查查询


    我们已经编写了一个查询，运行了它，并检索了一些结果。一切都很好吗？不一定。正如查询的初次尝试可能不优雅一样，它们也可能不正确。错误可能源于查询语法中的简单错误。这些通常很容易发现和纠正。然而，由于对问题或数据的微妙误解而导致的错误可能更难发现。


    我无法提供一个万无一失的方法来检查你的查询是否正确，但我可以给你一些发现潜在错误的想法。基本上，它们归结为检查你的结果中是否有额外的、不正确的行，以及检查你没有遗漏任何行。在本节中，我们将探讨发现查询可能存在问题的方法。在下一章，我们将探讨可能导致错误的一些常见错误。


    ### 检查一条应该被返回的行


    对你的查询应该返回多少行（零行、一行、几行或很多行）有一个大致概念是个好主意。如果你得到的结果数量令人惊讶，那可能是出错的线索。接下来，看看你的数据，确定一条应该被查询返回的记录或行。在我们关于教练是管理者的球队的例子中，我们可以检查各个表，找到一支满足查询的球队。在图
    11-13 中，我们看到 TeamB 满足条件，所以检查一下这个球队是否在输出结果中。


    记住，有些查询可能完全合理地没有输出。例如，在任何特定时间，基于我们拥有的数据，没有任何球队由教练管理是完全可能的。然而，你的查询必须在所有情况下都能工作。如果可能的话，制作表的副本，修改数据以使某一行符合条件，并检查它是否被正确返回。'
- fmt: '### Check a Row That Should Not Be Returned


    Similar to checking for a row that should be returned, look through the data and
    find a team that doesn’t have a coach as a manger. TeamA’s manager (member 239)
    does not appear as a coach in the `Member` table, so make sure that team is not
    included in your output. Once again, it is a good idea to use some dummy data
    to check this if the real data does not cover all eventualities.


    ### Check Boundary Conditions


    If a query has any sort of numeric comparison, then as well as checking for example
    data that should be returned and that which shouldn’t, we should also check the
    edge cases. Consider a query where we want to find people who have been members
    of our club for more than ten years. To be certain of the correctness, we need
    to check three possibilities:


    *   Make sure no record is returned for someone with less than 10 years of membership
    (for example, 8 years of membership).

    *   Make sure that someone who has belonged to the club for 12 years does get
    his record retrieved.

    *   Check for someone who has been a member for exactly 10 years.


    The last boundary condition is always tricky. It comes down to an interpretation
    of the natural language question. Does “more than ten years” include people who
    joined in the season exactly ten years ago? Well, it probably does, given that
    a single season covers a whole year. With numerical comparisons of this sort the
    decision is whether we use `>` or `>=` in the select condition. It is important
    to check with users if there is any doubt about the intention of the query.


    Finding data in the tables that are exactly on the boundaries is not always easy.
    However, it is usually possible to change the numeric value in your query to match
    the data. Find a particular member and change the value you are checking against
    in the query to match their years of membership. If Harry joined 16 years ago,
    change the query to compare with the value 16 and see if Harry is included (or
    not) as you expect.


    Another important boundary condition, especially for aggregates and counts (covered
    in Chapter [8](#A158240_2_En_8_Chapter.html)), is the value 0. Consider a query
    such as “Find members who have entered fewer than six tournaments.” Doing a grouped
    by count on the `Entry` table will return some rows for sure, and we can check
    for those who have less than, more than, or exactly six entries. However, what
    about members who have never entered a tournament? They won’t appear in the `Entry`
    table at all and will be missing from the results. So, whenever aggregates are
    involved, always check for what happens for a count of 0. For example, does your
    query return members who have entered no tournaments?


    ### Check Null Values


    Be aware that some of the values you are checking against may be nulls (discussed
    in Chapter [2](#A158240_2_En_2_Chapter.html)). How does your query about team
    managers cope with the situation where the `Manager` field is null? Try it out
    on some dummy data and see. What do we expect (or want) to happen if there is
    a null in the `JoinDate` field when we run the query about length of membership?


    ## Summary


    The first rule about starting a query is to not panic. The next rule is to take
    small steps and look at the intermediate output to see if what you have done so
    far is helping you. Retain as many columns as possible in the initial queries
    so you can check that you understand what is happening.


    Figure [11-14](#A158240_2_En_11_Chapter.html#Fig14) gives a summary of some of
    the steps you can take when first starting out on a query. The diagram doesn’t
    cover the whole process, but you should be able to make a reasonable start with
    these steps. Refer to the relevant chapters for more help.


    ![A158240_2_En_11_Fig14_HTML.gif](A158240_2_En_11_Fig14_HTML.gif)


    Figure 11-14. Some steps to help you get started on a tricky query


    # 12. Common Problems


    In this book, we’ve looked at different ways to tackle a variety of categories
    of queries. However, even if a query retrieves some valid-looking rows, all may
    not be well. In the previous chapter, we looked at the importance of checking
    the output to confirm that (at least some of) the expected rows are retrieved,
    as well as checking to make sure that (at least some) incorrect (or irrelevant)
    rows are not being returned.


    The problems that can befall queries are not just a matter of having the wrong
    syntax in SQL statements, although that can certainly happen. Problems with the
    design of the tables or with data values can also affect the accuracy of queries.
    In this chapter, we will look at some common design and data problems, and also
    at some of the most common syntactic mistakes.


    ## Poor Database Design


    Good database design is absolutely essential to being able to extract accurate
    information. Unfortunately, you will sometimes be faced with databases that are
    poorly designed and maintained. Often there is not a great deal you can do. Sometimes
    you can extract something that looks like the required information, but it should
    be presented with a caution that the underlying data was probably inconsistent.
    In this section we look at some common problems and how they might be mitigated.'
