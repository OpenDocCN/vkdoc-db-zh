    # 业务规则


    图 6-4 中的数据模型在下面作为图 6-13 重新展示。


    ![A158240_2_En_6_Fig13_HTML.jpg](img/A158240_2_En_6_Fig13_HTML.jpg)


    图 6-13. `Member`（成员）和 `Team`（团队）类之间的两种关系。


    成员可以属于团队，成员也可以管理团队。当我们用外键实现这些关系时，施加在数据上的约束非常简单：一个成员只能存在于`Team`表中已有的团队里，一个团队也只能由`Member`表中的某个人来管理。


    在各种情况下，可能还需要应用其他约束。例如，我们可能有额外的约束，比如一个团队最多只能有四名成员，或者经理必须是该团队的成员（或者不是）。这类约束通常被称为业务规则。图
    6-13 中的数据模型可能支撑着两个不同高尔夫俱乐部的数据库。虽然基本的完整性规则将适用于两个俱乐部（例如，成员不能属于不存在的团队），但每个俱乐部对于团队规模以及谁可以管理它们可能有不同的规则。外键约束不足以强制执行此类业务规则。


    关系型数据库产品通常会提供某种方式来强制执行业务规则。像 SQL Server 和 Oracle 这样的大型系统提供了触发器。触发器是在指定事件发生时（例如，插入或更新记录时）执行的动作。触发器将拒绝任何不遵守规则的更改。在
    Access 和其他产品中，无法将此类约束直接应用于表本身。但是，你可以将宏附加到输入表单上。这些宏会在数据提交到数据库之前检查表单上的数据。这种方法的问题在于，如果用户绕过表单（例如，使用
    `SQL` 更新命令）直接向表中输入数据，则不会进行此类检查。


    我们不会详细探讨业务规则在不同产品中如何实现，但会看看查询如何帮助找到任何不满足约束的实例。尽管这是在问题发生后才去发现，但这些查询的变体将构成你为强制执行约束而需要编写的任何触发器或宏的基础。


    让我们看看如何查找经理不是其团队成员的团队。当我面对这样的查询时，我的大脑常常一片空白，遇到这种情况，我总是采用结果导向的方法。这意味着设想涉及的表，并想象我正在寻找的实例类型。请看图
    6-14。


    ![A158240_2_En_6_Fig14_HTML.jpg](img/A158240_2_En_6_Fig14_HTML.jpg)


    图 6-14. 查找经理不是其团队成员的团队。


    在图 6-14 中，我们在 `Team` 表中看到 `TeamA` 的经理是 `239`，并且在 `Member` 表中看到成员 `239` 不属于任何团队。如果我们有一个约束要求经理必须属于该团队，那么
    `TeamA` 将不遵守该约束。


    要查找所有这样的团队，我们可以这样描述：


    > 从 `Team` 表的所有行 (`t`) 中，找出那些在 `Member` 表中对应的经理行 (`m`)（即 `t.Manager = m.MemberID`）的团队
    (`m.Team`) 为空或与 `Team` 表中的团队 (`t.TeamName`) 不同（`m.Team <> t.TeamName`）的团队名称。


    等价的 `SQL` 如下所示：


    ```sql

    SELECT t.teamname

    FROM Member m, Team t

    WHERE m.MemberID = t.Manager

    AND (m.Team <> t.Teamname OR m.Team IS NULL)

    ```


    中间两行等同于在 `m.MemberID = t.Manager` 上对两个表进行连接，最后一行找出那些在不同团队或根本不在任何团队中的经理。以下查询将产生等效的输出，但使用了内连接表示法：


    ```sql

    SELECT t.teamname

    FROM Member m INNER JOIN Team t ON m.MemberID = t.Manager

    WHERE m.Team <> t.Teamname OR m.Team IS NULL

    ```


    关于为什么在两个查询中都包含了 `IS NULL` 条件的一个说明：你可能还记得第 2 章的内容，如果我们与 `NULL` 值进行比较，结果既不是真也不是假。如果我们想找出不在任何团队中的经理，我们需要在查询中明确包含这种可能性。如果要求只是经理不能属于*不同*的团队，我们就可以省略对
    `NULL` 值的检查，因为没有团队的经理将被视为符合要求。一如既往，清楚地理解你实际想查找的内容是编写查询最重要的部分。


    前面的两个查询可以找到有错误经理的团队，但只能在它们被添加到数据库之后。我们如何从一开始就防止它们被添加呢？解决方案取决于数据库的实现。在数据更改最终提交到数据库之前，它们通常会被记录在某种缓冲区中。例如，在
    SQL Server 中，正在更新或添加的记录保存在一个名为 `inserted` 的临时表中。如果我们向 `Team` 表添加或更新一些记录，会创建一个与
    `Team` 表结构相同的临时表 (`inserted`) 来临时保存新的或更新的记录。我们希望执行一个查询，来检查即将添加到 `Team` 表的任何新记录是否包含不遵守约束的经理。但是，我们不是查看
    `Team` 表，而是查看临时 `inserted` 表中的记录，并统计其中有多少是无效的。


    以下 `SQL` 查询（与前两个查询非常相似）将统计 `Team` 表的 `inserted` 缓冲区中，有多少行的经理不遵守关于经理必须属于其所管理团队的业务规则：


    ```sql

    SELECT COUNT(*)

    FROM Member m INNER JOIN inserted i ON m.MemberID = i.Manager

    WHERE m.Team <> i.Teamname OR m.Team IS NULL

    ```


    如果这个计数不为零，则说明即将插入的行中有不遵守规则的行。在这种情况下，我们希望回滚插入操作，以便这些行不会提交到 `Team` 表。以下 `SQL` 语句将包含在
    `SQL Server` 的一个触发器中。该触发器需要被设置为在 `Team` 表更新或插入行时运行。


    ```sql

    IF

    (SELECT COUNT(*)

    FROM Member m INNER JOIN inserted i ON m.MemberID = i.Manager

    WHERE m.Team <> i.Teamname OR m.Team IS NULL) <> 0)

    BEGIN

    Rollback Tran

    END

    ```


    这是一个有点粗糙的方法，因为如果有任何新记录不正确，整个批次都会被拒绝。你需要查阅你的数据库产品文档，以了解如何开发高效的触发器，但使用查询来检查新记录有效性的思路是常见的。


    在 Access 中，检查是在界面层面完成的，通常在表单上。我们不会像前面的查询那样检查 `inserted` 表，而是创建一个带有类似查询的宏，在将表单上的字段值提交到数据库之前检查这些值。

