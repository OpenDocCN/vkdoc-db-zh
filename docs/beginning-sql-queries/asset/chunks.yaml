  trans: '## 按顺序存储记录


    如果我们考虑关系理论，那么表²中的行是没有顺序的。这使得我们可以将表视为一个集合，并应用所有的集合操作。从概念的角度看，这很有用，但在实践中，记录的存储方式会影响我们查找所需内容的速度。


    如果表中的记录以随机顺序存储（可能是它们被创建的顺序），那么这被称为**堆表**。在堆表中查找记录的唯一方法是扫描整个表。通常，记录会按某个（些）属性有序存储——通常是主键。有各种算法可以在有序表中快速查找特定记录，但大多数都基于**二分查找**的思想。


    当我们在电话簿中查找一个姓名或在词典中查找一个单词时，我们采用的就是一种二分查找。在最简单的情况下，我们查看书中中间的一页，判断目标单词是在该页单词之前还是之后。然后我们重新开始，查看感兴趣部分的中间位置。我们很快就能定位到所需的页。如果表中的记录按某个特定字段排序，那么在该字段上的搜索将比在没有索引的字段上搜索更高效。


    当我们谈论表中的记录按顺序存储时，我们并不是指它们在磁盘上物理地一个接一个存放。如果是那样的话，如果我们想在开头附近插入一条新记录，就必须移动所有其他记录。可以将这些记录想象成处于一种树状结构中。一种常见的树是
    B-树。图 10-2 展示了一个用于存储字母表中字母的 B-树结构的非常简单的表示。


    ![A158240_2_En_10_Fig2_HTML.jpg](img/A158240_2_En_10_Fig2_HTML.jpg)


    图 10-2. B-树中的数据表示


    如果你要在图 10-2 的树中查找一个字母，你会从顶部的节点或方框开始。在顶部节点中，你要么找到你想要的内容，要么沿着合适的路径继续。例如，如果你要找`H`，你会沿着`G`和`O`之间的路径走。这种结构允许在添加和删除记录时造成最小的干扰。我们可以轻松地将`R`添加到包含`P`和`Q`的方框中，而无需更改任何其他字母。维护
    B-树并非易事。随着数据的添加和删除，树需要重新排列以保持平衡，并添加和删除节点及层级。幸运的是，所有这些都在底层自动完成。


    话虽如此，当我们思考记录有序时，通常最容易想象它们都排成一条线。在本章的剩余部分，我将这样做。


    ## 聚集索引


    如果记录按某种顺序物理存储，那么这被称为**聚集索引**。如果我们认为按姓名顺序存储成员记录是个好主意，我们可以专门创建一个聚集索引，使记录按`LastName`字段的值排序。我们可以用
    SQL 语句创建一个索引。我们需要为索引提供一个名称（例如`Clustered_Name`），并指定用于排序索引的字段，如下所示查询：


    ```

    CREATE CLUSTERED INDEX Clustered_Name ON Member (LastName);

    ```


    默认情况下，聚集索引的顺序通常是主键的值。虽然可以为聚集索引指定不同的顺序，但你需要有充分的理由这样做。


    有了聚集索引后，现在有两种定位记录的方式。考虑在`Member`表上运行以下查询，该表在`LastName`上有聚集索引：


    ```

    SELECT *

    FROM MEMBER WHERE LastName = ''Smith'';

    ```


    因为表是按`LastName`排序的，我们可以通过执行二分查找快速导航到正确的记录。这被称为**表查找**。


    现在考虑以下查询：


    ```

    SELECT *

    FROM MEMBER

    WHERE Phone = ''03-567-123'';

    ```


    我们现在别无选择，只能检查表中的每一条记录。我们甚至不能在找到匹配记录时停止，因为可能有多个记录具有相同的电话号码。这被称为**表扫描**。


    ## 非聚集索引


    表中的记录只能以一种物理顺序存储，因此永远只能有一个聚集索引，而它通常建立在主键上。如果`Member`表的聚集索引建立在主键字段`MemberID`上，我们可以查找特定的`MemberID`值，并找到包含该成员所有详细信息的完整行。如果我们想查找具有特定姓氏的一行，就必须扫描整个表。幸运的是，我们可以在表上设置额外的非聚集索引。从现在开始，我将这些非聚集索引简称为索引。以下是在`Member`表的`LastName`上创建索引的
    SQL：


    ```

    CREATE INDEX idx_Name ON Member (LastName);

    ```


    它的作用是创建一个按顺序排列的所有`LastName`值的列表。每个条目都将包含对聚集索引的引用，以便可以找到包含其余信息的完整行。图 10-3 说明了`LastName`索引中的前几个条目如何引用聚集索引。


    ![A158240_2_En_10_Fig3_HTML.jpg](img/A158240_2_En_10_Fig3_HTML.jpg)


    图 10-3. LastName 上的索引包含对聚集索引的引用以获取完整信息


    因为索引是按姓氏排序的，所以可以执行**索引查找**来找到所需的条目，然后使用该引用来查找聚集索引中的关联行，以检索其余信息。


    在实践中，查询优化器是否使用特定索引取决于许多因素：表中的行数、索引和表中每行的大小、记录是否最近被访问过并已缓存等等。'
- fmt: '### Clustered Index on a Compound Key


    Let’s consider the `Entry` table. Recall that the `Entry` table has three fields:
    `MemberID`, `TourID` and `Year`. Two questions we might ask about the data in
    this table are:


    *   Which tournament has a particular member entered (say, member 235)?

    *   Who has entered a particular tournament (say, tournament 40)?


    It would seem sensible to have two indexes: one on `TourID` and one on `MemberID`.
    However, each of these would refer to the clustered index. What order will that
    be for the `Entry` table?


    By default, the table will be clustered on the primary key, which for the `Entry`
    table is a combination of all three fields. The order of the records will depend
    on how we specified the primary key. Let’s say the `Entry` table was created with
    the following SQL statement:


    ```sql

    CREATE Table Entry (

    MemberID INT,

    TourID INT,

    Year INT,

    PRIMARY KEY (MemberID, TourID, Year);

    ```


    The order of rows in the clustered index will be as in Figure [10-4](#A158240_2_En_10_Chapter.html#Fig4).
    First, they are ordered by the first field specified in the `PRIMARY KEY` clause
    (`MemberID`). Those rows with the same value of `MemberID` will be ordered by
    the second field (`TourID`) and so on.


    ![A158240_2_En_10_Fig4_HTML.jpg](A158240_2_En_10_Fig4_HTML.jpg)


    Figure 10-4.


    Order of data in the default clustered index for the Entry table


    The system can easily find the tournaments which member 235 has entered because
    the entries are in order of `MemberID` and a table seek can be carried out. We
    do not necessarily need an additional index on `MemberID`. On the other hand,
    finding who has entered tournament 40 would require a scan to investigate every
    row. In this situation an index on `TourID` would be an improvement.


    The order in which we specify the fields of the primary key can therefore affect
    how queries are carried out and can influence what other indexes might be useful.
    Had the order of the primary key fields been specified with `PRIMARY KEY (TourID,
    MemberID, Year)` then the clustered index would be in order of `TourID`. In that
    case, an index on `MemberID` should be considered if we regularly need to find
    rows for a particular member.


    I was careful to say for the situation in Figure [10-4](#A158240_2_En_10_Chapter.html#Fig4)
    that we might not necessarily need an index on `MemberID`. The optimizer will
    take into account many things. One that is important is the size or number of
    bytes of a typical entry in the index. Each entry in an index made up of two text
    fields such as `LastName` and `FirstName` will be larger than an index on a single
    text field, which will in turn be larger than an index on a numeric field. Each
    time an entry in an index is visited it has to be retrieved, so there is an IO
    (input/output) cost that will depend on the size of the entry.


    If the clustered index in Figure [10-3](#A158240_2_En_10_Chapter.html#Fig3) had
    significantly more data in each row (e.g., some descriptive text fields) then
    the cost of retrieving a row would be higher than for retrieving just the three
    numeric fields. In that case having an index on `MemberID` would be worth considering.
    It would not alter how many index entries needed to be investigated, but it would
    have a smaller IO cost as each entry is smaller. The downside is that once the
    correct `MemberID` is located by an index seek the system will need to look up
    the clustered index to find the rest of the information. Depending on all the
    information it can access, the optimizer will determine whether it is more efficient
    to use the index on `MemberID` and look up the rest of the information, or just
    to scan all the records in the clustered index.


    ### Updating Indexes


    Indexes are clearly wonderfully useful. Why do we not just index everything we
    are ever likely to search on? This is certainly possible. The downside is that
    the indexes have to be maintained. Every time we add or delete a record in a table
    every index on that table will need to be updated also. We therefore have a tradeoff.
    Lots of indexes will mean fast retrieval but slower updating. Fewer indexes will
    mean faster updating but possibly slower retrieval.


    Managing these tradeoffs is work for an experienced database administrator with
    excellent knowledge of the domain. There are many tools available that will monitor
    the database and provide statistics on the use of indexes and other information
    about the data. If the data is relatively stable with few updates then having
    several indexes will make retrieval faster. If the data is constantly being updated
    then indexes may be counterproductive.


    In situations where there are a lot of updates it may be practical to do bulk
    updates of data. With a bulk update you can remove the indexes. The following
    query shows how to remove the index we created on the `Member` table earlier in
    the chapter:


    ```sql

    Drop idx_Name on Member;

    ```


    All the additions, deletions, and modifications to the table can then be carried
    out without the overhead of updating the indexes. At the end of the updates on
    the table, the indexes can be recreated. This may or may not be more efficient
    than updating each index for every change.


    ### Covering Indexes


    Adding more fields to some indexes can also be effective. Consider the following
    query:


    ```sql

    SELECT FirstName

    FROM Member

    WHERE LastName = ''Smith''

    ```


    If the `Member` table has an index on `LastName`, then the preceding query would
    require an index seek to find Smith and then a lookup of the clustered index to
    find the first name. If the index was on the compound index (`LastName, FirstName`)
    then all the information required for the query is contained in the index and
    no lookup is required. This is known as a covering index. Again, there is the
    tradeoff of having a larger IO cost for the bigger rows in the index versus the
    cost of the lookup.


    ### Selectivity of Indexes


    Indexes are most useful when the number of rows returned by an index search is
    small compared to the number of rows in the table.


    For example, let’s consider finding information about a member with a particular
    last name. An index on `LastName` in the `Member` table is likely to return only
    a small percentage of its elements if we search for a specific name. The system
    can then look up the clustered index for each of those returned elements to retrieve
    the rest of the information about the members.


    By contrast, what happens if we want to find information about women. An index
    on `Gender` will return around half its entries if we search for `''F''` in the
    golf club’s `Member` table. The DBMS would then have to look up the corresponding
    records in the clustered index. In this situation it is probably more efficient
    to just scan the clustered index, which contains all the information we require,
    and not bother with the index at all.


    Sometimes the selectivity of an index is not obvious. For example, an index on
    a field `City` will not be useful if most of the records in the table have the
    same value for city and most of the queries are for that city.


    Database software often provides tools that can help us. The tools might provide
    statistics on the current spread of data in fields in a table — for example, what
    percentage of the table has the same values in a field, such as `City`. This will
    help determine if an index might be useful. Often statistics can be collected
    about how often an index is used. If the optimizer makes little use of an index
    then it might as well be removed rather than be constantly updated.'
  raw: '### Clustered Index on a Compound Key


    Let’s consider the `Entry` table. Recall that the `Entry` table has three fields:
    `MemberID` , `TourID` and `Year` . Two questions we might ask about the data in
    this table are:


    *   Which tournament has a particular member entered (say, member 235)?

    *   Who has entered a particular tournament (say, tournament 40)?


    It would seem sensible to have two indexes: one on `TourID` and one on `MemberID`.
    However, each of these would refer to the clustered index. What order will that
    be for the `Entry` table?


    By default, the table will be clustered on the primary key, which for the `Entry`
    table is a combination of all three fields. The order of the records will depend
    on how we specified the primary key. Let’s say the `Entry` table was created with
    the following SQL statement:


    ```

    CREATE Table Entry (

    MemberID INT,

    TourID INT,

    Year INT,

    PRIMARY KEY (MemberID, TourID, Year);

    ```


    The order of rows in the clustered index will be as in Figure [10-4](#A158240_2_En_10_Chapter.html#Fig4).
    First, they are ordered by the first field specified in the `PRIMARY KEY` clause
    (`MemberID`). Those rows with the same value of `MemberID` will be ordered by
    the second field (`TourID`) and so on.


    ![A158240_2_En_10_Fig4_HTML.jpg](A158240_2_En_10_Fig4_HTML.jpg)


    Figure 10-4.


    Order of data in the default clustered index for the Entry table


    The system can easily find the tournaments which member 235 has entered because
    the entries are in order of `MemberID` and a table seek can be carried out. We
    do not necessarily need an additional index on `MemberID`. On the other hand,
    finding who has entered tournament 40 would require a scan to investigate every
    row. In this situation an index on `TourID` would be an improvement.


    The order in which we specify the fields of the primary key can therefore affect
    how queries are carried out and can influence what other indexes might be useful.
    Had the order of the primary key fields been specified with `PRIMARY KEY (TourID,
    MemberID, Year)` then the clustered index would be in order of `TourID`. In that
    case, an index on `MemberID` should be considered if we regularly need to find
    rows for a particular member.


    I was careful to say for the situation in Figure [10-4](#A158240_2_En_10_Chapter.html#Fig4)
    that we might not necessarily need an index on `MemberID`. The optimizer will
    take into account many things. One that is important is the size or number of
    bytes of a typical entry in the index. Each entry in an index made up of two text
    fields such as `LastName` and `FirstName` will be larger than an index on a single
    text field, which will in turn be larger than an index on a numeric field. Each
    time an entry in an index is visited it has to be retrieved, so there is an IO
    (input/output) cost that will depend on the size of the entry.


    If the clustered index in Figure [10-3](#A158240_2_En_10_Chapter.html#Fig3) had
    significantly more data in each row (e.g., some descriptive text fields) then
    the cost of retrieving a row would be higher than for retrieving just the three
    numeric fields. In that case having an index on `MemberID` would be worth considering.
    It would not alter how many index entries needed to be investigated, but it would
    have a smaller IO cost as each entry is smaller. The downside is that once the
    correct `MemberID` is located by an index seek the system will need to look up
    the clustered index to find the rest of the information. Depending on all the
    information it can access, the optimizer will determine whether it is more efficient
    to use the index on `MemberID` and look up the rest of the information, or just
    to scan all the records in the clustered index.


    ### Updating Indexes


    Indexes are clearly wonderfully useful. Why do we not just index everything we
    are ever likely to search on? This is certainly possible. The downside is that
    the indexes have to be maintained. Every time we add or delete a record in a table
    every index on that table will need to be updated also. We therefore have a tradeoff.
    Lots of indexes will mean fast retrieval but slower updating. Fewer indexes will
    mean faster updating but possibly slower retrieval.


    Managing these tradeoffs is work for an experienced database administrator with
    excellent knowledge of the domain. There are many tools available that will monitor
    the database and provide statistics on the use of indexes and other information
    about the data. If the data is relatively stable with few updates then having
    several indexes will make retrieval faster. If the data is constantly being updated
    then indexes may be counterproductive.


    In situations where there are a lot of updates it may be practical to do bulk
    updates of data. With a bulk update you can remove the indexes. The following
    query shows how to remove the index we created on the `Member` table earlier in
    the chapter:


    ```

    Drop idx_Name on Member;

    ```


    All the additions, deletions, and modifications to the table can then be carried
    out without the overhead of updating the indexes. At the end of the updates on
    the table, the indexes can be recreated. This may or may not be more efficient
    than updating each index for every change.


    ### Covering Indexes


    Adding more fields to some indexes can also be effective. Consider the following
    query:


    ```

    SELECT FirstName

    FROM Member

    WHERE LastName = ''Smith''

    ```


    If the `Member` table has an index on `LastName`, then the preceding query would
    require an index seek to find Smith and then a lookup of the clustered index to
    find the first name. If the index was on the compound index (`LastName, FirstName`)
    then all the information required for the query is contained in the index and
    no lookup is required. This is known as a covering index. Again, there is the
    tradeoff of having a larger IO cost for the bigger rows in the index versus the
    cost of the lookup.


    ### Selectivity of Indexes


    Indexes are most useful when the number of rows returned by an index search is
    small compared to the number of rows in the table.


    For example, let’s consider finding information about a member with a particular
    last name. An index on `LastName` in the `Member` table is likely to return only
    a small percentage of its elements if we search for a specific name. The system
    can then look up the clustered index for each of those returned elements to retrieve
    the rest of the information about the members.


    By contrast, what happens if we want to find information about women. An index
    on `Gender` will return around half its entries if we search for `''F''` in the
    golf club’s `Member` table. The DBMS would then have to look up the corresponding
    records in the clustered index. In this situation it is probably more efficient
    to just scan the clustered index, which contains all the information we require,
    and not bother with the index at all.


    Sometimes the selectivity of an index is not obvious. For example, an index on
    a field `City` will not be useful if most of the records in the table have the
    same value for city and most of the queries are for that city.


    Database software often provides tools that can help us. The tools might provide
    statistics on the current spread of data in fields in a table `—` for example,
    what percentage of the table has the same values in a field, such as `City`. This
    will help determine if an index might be useful. Often statistics can be collected
    about how often an index is used. If the optimizer makes little use of an index
    then it might as well be removed rather than be constantly updated.'
  trans: '

    ### 复合键上的聚集索引


    让我们来考虑 `Entry` 表。回想一下，`Entry` 表有三个字段：`MemberID`、`TourID` 和 `Year`。关于这张表中的数据，我们可能会提出两个问题：


    *   某位成员（比如成员 235）参加了哪个锦标赛？

    *   谁参加了某个特定的锦标赛（比如锦标赛 40）？


    似乎创建两个索引是合理的：一个在 `TourID` 上，一个在 `MemberID` 上。然而，这两个索引都将引用聚集索引。对于 `Entry` 表来说，这将是什么顺序呢？


    默认情况下，表将基于主键进行聚集，对于 `Entry` 表，主键是所有三个字段的组合。记录的顺序将取决于我们如何指定主键。假设 `Entry` 表是通过以下
    SQL 语句创建的：


    ```sql

    CREATE Table Entry (

    MemberID INT,

    TourID INT,

    Year INT,

    PRIMARY KEY (MemberID, TourID, Year);

    ```


    聚集索引中行的顺序将如图 10-4 所示。首先，它们按照 `PRIMARY KEY` 子句中指定的第一个字段（`MemberID`）排序。具有相同 `MemberID`
    值的行将按第二个字段（`TourID`）排序，依此类推。


    ![A158240_2_En_10_Fig4_HTML.jpg](img/A158240_2_En_10_Fig4_HTML.jpg)


    图 10-4.

    Entry 表默认聚集索引中的数据顺序


    系统可以轻松找到成员 235 参加的锦标赛，因为条目是按 `MemberID` 排序的，并且可以执行表查找。我们不一定需要在 `MemberID` 上添加额外的索引。另一方面，要找出谁参加了锦标赛
    40，则需要扫描并检查每一行。在这种情况下，在 `TourID` 上建立索引会是一个改进。


    因此，我们指定主键字段的顺序会影响查询的执行方式，并可能影响其他哪些索引是有用的。如果主键字段的顺序被指定为 `PRIMARY KEY (TourID, MemberID,
    Year)`，那么聚集索引将按 `TourID` 排序。在这种情况下，如果我们经常需要查找特定成员的行，就应该考虑在 `MemberID` 上建立索引。


    我特意在图 10-4 的情况中说我们可能不需要在 `MemberID` 上建立索引。优化器会考虑很多因素。其中一个重要的因素是索引中典型条目的大小或字节数。由两个文本字段（如
    `LastName` 和 `FirstName`）组成的索引中的每个条目，都会比单个文本字段的索引大，而后者又会比数字字段的索引大。每次访问索引中的一个条目时，都必须检索它，因此存在
    I/O（输入/输出）成本，这取决于条目的大小。


    如果图 10-3 中的聚集索引在每一行中有显著更多的数据（例如，一些描述性文本字段），那么检索一行的成本将高于仅检索三个数字字段。在这种情况下，考虑在 `MemberID`
    上建立索引是值得的。它不会改变需要检查的索引条目数量，但由于每个条目更小，因此 I/O 成本会更小。缺点是，一旦通过索引查找定位到正确的 `MemberID`，系统将需要查找聚集索引以找到其余信息。根据它可以访问的所有信息，优化器将确定是使用
    `MemberID` 上的索引并查找其余信息更高效，还是直接扫描聚集索引中的所有记录更高效。


    ### 更新索引


    索引显然非常有用。为什么我们不直接为我们可能搜索的所有内容都建立索引呢？这当然是可能的。缺点是索引必须维护。每次我们在表中添加或删除一条记录时，该表上的每个索引也需要更新。因此，我们面临一个权衡。大量索引意味着检索速度快但更新慢。较少的索引意味着更新快但可能检索慢。


    管理这些权衡是经验丰富的数据库管理员的工作，他们需要具备出色的领域知识。有许多可用的工具可以监控数据库，并提供关于索引使用情况的统计数据以及其他数据信息。如果数据相对稳定，更新很少，那么建立多个索引将使检索更快。如果数据不断更新，那么索引可能适得其反。


    在有很多更新的情况下，进行批量数据更新可能是实际可行的。使用批量更新，你可以移除索引。以下查询展示了如何删除本章前面在 `Member` 表上创建的索引：


    ```sql

    Drop idx_Name on Member;

    ```


    然后，可以对表进行所有的添加、删除和修改操作，而无需承担更新索引的开销。在对表的更新结束后，可以重新创建索引。这比对每次更改都更新每个索引可能更高效，也可能不是。


    ### 覆盖索引


    向某些索引添加更多字段也可能是有效的。考虑以下查询：


    ```sql

    SELECT FirstName

    FROM Member

    WHERE LastName = ''Smith''

    ```


    如果 `Member` 表在 `LastName` 上有一个索引，那么前面的查询将需要一次索引查找来找到 Smith，然后通过查找聚集索引来找到名字。如果索引是复合索引（`LastName,
    FirstName`），那么查询所需的所有信息都包含在索引中，无需查找。这被称为覆盖索引。同样，这里存在权衡：索引中更大的行带来更大的 I/O 成本，与查找的成本相比。


    ### 索引的选择性


    当索引搜索返回的行数相对于表中的行数很小时，索引最有用。


    例如，让我们考虑查找特定姓氏的成员信息。在 `Member` 表的 `LastName` 上建立索引，如果我们搜索一个特定的名字，很可能只返回其元素的一小部分。然后，系统可以为这些返回的元素中的每一个查找聚集索引，以检索有关成员的其余信息。


    相比之下，如果我们想查找关于女性成员的信息会发生什么？在高尔夫俱乐部的 `Member` 表中，如果我们在 `Gender` 上建立索引并搜索 `''F''`，索引将返回大约一半的条目。然后，DBMS
    将不得不在聚集中查找相应的记录。在这种情况下，直接扫描包含我们所需全部信息的聚集索引，而完全不理会索引，可能更高效。


    有时索引的选择性并不明显。例如，如果表中的大多数记录具有相同的 `City` 值，并且大多数查询都是针对该城市的，那么在 `City` 字段上建立索引将没有用。


    数据库软件通常提供可以为我们提供帮助的工具。这些工具可能提供关于表中字段当前数据分布的统计信息——例如，表中有多少百分比的记录在某个字段（如 `City`）上具有相同的值。这将有助于确定索引是否有用。通常可以收集关于索引使用频率的统计数据。如果优化器很少使用某个索引，那么与其不断更新它，不如将其移除。

    '
- fmt: '## Join Techniques


    如果我们考虑图[10-4](#A158240_2_En_10_Chapter.html#Fig4)中的`Entry`表，大多数查询都需要与`Member`表进行连接（join），以找到报名者的姓名，和/或与`Tournament`表进行连接，以找到锦标赛的名称和其他信息。这些连接中的每一个都会将`Entry`表中的外键与`Member`或`Tournament`表的主键进行比较。请参阅第[1](#A158240_2_En_1_Chapter.html)章以回顾我们所说的外键（foreign
    key）是什么意思。这种将外键与主键连接的情况非常常见，因此值得理解连接是如何执行的。我们将以`Member`和`Entry`表为例，但这些思路具有广泛的应用性。


    在执行连接时，可以采用多种不同的方法。哪种方法最高效取决于许多因素，包括表的相对大小、已创建的索引、查询是否还包括投影特定列或选择行、是否指定了输出顺序等等。你不必担心选择哪种方法，因为这将由优化器（optimizer）决定。然而，创建特定的索引会影响所采用的方法。


    ### Nested Loops


    一种连接表的方法称为嵌套循环（nested loops）。这意味着系统扫描一个表，并在该表的每一行中查找另一个表中的所有行，以找到符合连接条件的匹配项。图[10-5](#A158240_2_En_10_Chapter.html#Fig5)针对连接条件`Entry.MemberID
    = Member.MemberID`说明了嵌套循环方法。


    ![A158240_2_En_10_Fig5_HTML.jpg](A158240_2_En_10_Fig5_HTML.jpg)


    图 10-5. 查找具有匹配MemberID的行的嵌套循环方法


    在图[10-5](#A158240_2_En_10_Chapter.html#Fig5)中，外层循环作用于`Entry`表。对于`Entry`表中的每一行，系统都需要在`Member`（内层）表中找到匹配的行。图[10-5](#A158240_2_En_10_Chapter.html#Fig5)中显示的表是无序的，这意味着为了在`Entry`表的每一行找到匹配记录，需要访问`Member`表的每一行（即全表扫描）。


    如果在内层循环的匹配字段上（本例中是`Member`表的`MemberID`）存在索引，那么查找匹配字段将更加高效。可以使用索引快速找到匹配记录，而无需访问每一行。实际上，`Member`表很可能在其主键`MemberID`上有一个聚集索引（clustered
    index）。如果表以`Entry`表在内层的方式进行嵌套，那么当`Entry`表的`MemberID`上有索引时，内层循环将更有效。优化器将考虑这些信息，以决定嵌套循环选项对于执行连接是否高效，以及哪些表应作为内层表和外层表。


    大多数商业数据库系统都会提供工具来查看查询的执行计划。图[10-6](#A158240_2_En_10_Chapter.html#Fig6)显示了来自 SQL
    Server 的截图，展示了以下查询中`Member`和`Entry`表连接的执行计划：


    ![A158240_2_En_10_Fig6_HTML.jpg](A158240_2_En_10_Fig6_HTML.jpg)


    图 10-6. 显示嵌套循环的执行计划


    ```

    SELECT *

    FROM Member m INNER JOIN Entry e on m.MemberID = e.MemberID;

    ```


    在图[10-6](#A158240_2_En_10_Chapter.html#Fig6)中，我们在右上角看到对`Entry`表的全表扫描。这是嵌套循环的外层循环（如图[10-5](#A158240_2_En_10_Chapter.html#Fig5)所示）。右下角的图标显示，对于`Entry`表中的每一行，将对`Member`表的聚集索引执行一次查找（seek），以找到具有匹配`MemberID`的行。


    我们在连接查询中指定表的顺序有关系吗？如果我们在 SQL 表达式中把`Entry`表放在前面，会有什么不同吗？以前可能会有。现在几乎肯定不会了。用不同的表顺序表达查询，在
    SQL Server 中会产生与图[10-6](#A158240_2_En_10_Chapter.html#Fig6)相同的执行计划。然而，如果我们更改了选择的字段，或添加了其他索引，或选择对输出进行排序，那么执行计划很可能会发生变化。


    ### Merge Join


    另一种执行连接的方法是首先按连接字段对两个表进行排序。然后查找匹配行就变得非常容易。这称为合并连接（merge join），如图[10-7](#A158240_2_En_10_Chapter.html#Fig7)所示。


    ![A158240_2_En_10_Fig7_HTML.jpg](A158240_2_En_10_Fig7_HTML.jpg)


    图 10-7. 合并连接要求每个表都按被比较的字段排序


    对表进行排序是一项昂贵的操作。然而，如果表在连接字段上有索引，那么可以通过索引扫描（index scan）有序地访问行，从而使合并连接成为一个可选方案。


    如果连接条件中的一个或两个字段都有索引，那么合并连接和嵌套循环连接都将更有效。'
  raw: '## Join Techniques


    If we consider the `Entry` table in Figure [10-4](#A158240_2_En_10_Chapter.html#Fig4),
    most queries will require a join on the `Member` table to find the names of the
    entrants and/or a join on the `Tournament` table to find the names and other information
    about the tournaments. Each of these joins compares a foreign key in the `Entry`
    table with the primary key of the `Member` or `Tournament` table. Refer to Chapter
    [1](#A158240_2_En_1_Chapter.html) to review what we mean by a foreign key. This
    joining of a foreign key with a primary key is such a common scenario that it
    is worth understanding how joins can be carried out. We will use the `Member`
    and `Entry` tables as an example, but the ideas have wide application.


    There are a number of different approaches that can be taken when carrying out
    a join. Which approach will be the most efficient will depend on many things,
    including the relative sizes of the tables, the indexes that have been created,
    whether the query also includes projecting specific columns or selecting rows,
    whether an output order has been specified, and so on. You don’t have to worry
    about the choice of approach, as that will be decided by the optimizer. However,
    creating particular indexes can influence the approach taken.


    ### Nested Loops


    One approach to joining tables is called nested loops . This means that the system
    scans one table, and for each row in that table looks through all the rows in
    the other table to find matches for the join condition. The nested-loop approach
    is illustrated in Figure [10-5](#A158240_2_En_10_Chapter.html#Fig5) for the join
    condition `Entry.MemberID = Member.MemberID`.


    ![A158240_2_En_10_Fig5_HTML.jpg](A158240_2_En_10_Fig5_HTML.jpg)


    Figure 10-5.


    Nested-loops approach to finding rows with matching MemberIDs


    In Figure [10-5](#A158240_2_En_10_Chapter.html#Fig5) the outside loop is on the
    `Entry` table. For each row in the `Entry` table, the system will need to find
    the matching rows in the `Member` (inner) table. The tables shown in Figure [10-5](#A158240_2_En_10_Chapter.html#Fig5)
    are not ordered, which means that every row of the `Member` table will need to
    be visited for each row in the `Entry` table to find the matching records (a table
    scan).


    If there is an index on the matching field in the inner loop (`MemberID` in the
    `Member` table, in this case) then finding the matching field will be more efficient.
    The index can be used to quickly find the matching records without having to visit
    every row. In practice, the `Member` table will probably have a clustered index
    on its primary key `MemberID`. If the tables are nested with the `Entry` table
    on the inside, then the internal loop will be more effective if there is an index
    on the `MemberID` of the `Entry` table. The optimizer will take this information
    into account to decide if the nested-loops option is efficient for carrying out
    the join and which tables should be the inner and outer tables.


    Most commercial database systems will provide tools to view the execution plan
    for a query. Figure [10-6](#A158240_2_En_10_Chapter.html#Fig6) shows a screenshot
    from SQL Server showing the execution plan for the join on the `Member` and `Entry`
    tables in the following query:


    ![A158240_2_En_10_Fig6_HTML.jpg](A158240_2_En_10_Fig6_HTML.jpg)


    Figure 10-6.


    Execution plan showing nested loops


    ```

    SELECT *

    FROM Member m INNER JOIN Entry e on m.MemberID = e.MemberID;

    ```


    In Figure [10-6](#A158240_2_En_10_Chapter.html#Fig6) we see on the top right a
    table scan of the `Entry` table. This is the outside loop of the nested loop (as
    depicted in Figure [10-5](#A158240_2_En_10_Chapter.html#Fig5)). The icon on the
    bottom right shows that for each row in the `Entry` table, a seek on the clustered
    index of the `Member` table will be carried out to find the row with a matching
    `MemberID`.


    Does it matter in which order we specify the tables in a join query? If we put
    the `Entry` table first in the SQL expression, will that make a difference? Once
    upon a time it may have. These days almost certainly not. Expressing the query
    with the table in a different order results in the same execution plan in SQL
    Server as the plan in Figure [10-6](#A158240_2_En_10_Chapter.html#Fig6). However,
    if we change which fields are being selected, or add other indexes, or choose
    to sort the output, then the execution plan will very probably change.


    ### Merge Join


    Another approach to doing a join is to first sort both tables by the join field.
    It is then very easy to find matching rows. This is called a merge join and is
    shown in Figure [10-7](#A158240_2_En_10_Chapter.html#Fig7).


    ![A158240_2_En_10_Fig7_HTML.jpg](A158240_2_En_10_Fig7_HTML.jpg)


    Figure 10-7.


    Merge join requires each table to be sorted by the field being compared


    Sorting tables is an expensive operation. However, if the tables have indexes
    on the join fields then the rows can be accessed in order by an index scan, making
    the merge join an option.


    Both the merge join and the nested-loops join will be more effective if one or
    both of the fields in the join condition have indexes.'
  trans: '## 连接技术


    如果我们考虑图 10-4 中的`Entry`表，大多数查询都需要与`Member`表进行连接（join），以找到报名者的姓名，和/或与`Tournament`表进行连接，以找到锦标赛的名称和其他信息。这些连接中的每一个都会将`Entry`表中的外键与`Member`或`Tournament`表的主键进行比较。请参阅第
    1 章以回顾我们所说的外键（foreign key）是什么意思。这种将外键与主键连接的情况非常常见，因此值得理解连接是如何执行的。我们将以`Member`和`Entry`表为例，但这些思路具有广泛的应用性。


    在执行连接时，可以采用多种不同的方法。哪种方法最高效取决于许多因素，包括表的相对大小、已创建的索引、查询是否还包括投影特定列或选择行、是否指定了输出顺序等等。你不必担心选择哪种方法，因为这将由优化器（optimizer）决定。然而，创建特定的索引会影响所采用的方法。


    ### 嵌套循环


    一种连接表的方法称为嵌套循环（nested loops）。这意味着系统扫描一个表，并在该表的每一行中查找另一个表中的所有行，以找到符合连接条件的匹配项。图
    10-5 针对连接条件`Entry.MemberID = Member.MemberID`说明了嵌套循环方法。


    ![A158240_2_En_10_Fig5_HTML.jpg](img/A158240_2_En_10_Fig5_HTML.jpg)


    图 10-5. 查找具有匹配 MemberID 的行的嵌套循环方法


    在图 10-5 中，外层循环作用于`Entry`表。对于`Entry`表中的每一行，系统都需要在`Member`（内层）表中找到匹配的行。图 10-5 中显示的表是无序的，这意味着为了在`Entry`表的每一行找到匹配记录，需要访问`Member`表的每一行（即全表扫描）。


    如果在内层循环的匹配字段上（本例中是`Member`表的`MemberID`）存在索引，那么查找匹配字段将更加高效。可以使用索引快速找到匹配记录，而无需访问每一行。实际上，`Member`表很可能在其主键`MemberID`上有一个聚集索引（clustered
    index）。如果表以`Entry`表在内层的方式进行嵌套，那么当`Entry`表的`MemberID`上有索引时，内层循环将更有效。优化器将考虑这些信息，以决定嵌套循环选项对于执行连接是否高效，以及哪些表应作为内层表和外层表。


    大多数商业数据库系统都会提供工具来查看查询的执行计划。图 10-6 显示了来自 SQL Server 的截图，展示了以下查询中`Member`和`Entry`表连接的执行计划：


    ![A158240_2_En_10_Fig6_HTML.jpg](img/A158240_2_En_10_Fig6_HTML.jpg)


    图 10-6. 显示嵌套循环的执行计划


    ```

    SELECT *

    FROM Member m INNER JOIN Entry e on m.MemberID = e.MemberID;

    ```


    在图 10-6 中，我们在右上角看到对`Entry`表的全表扫描。这是嵌套循环的外层循环（如图 10-5 所示）。右下角的图标显示，对于`Entry`表中的每一行，将对`Member`表的聚集索引执行一次查找（seek），以找到具有匹配`MemberID`的行。


    我们在连接查询中指定表的顺序有关系吗？如果我们在 SQL 表达式中把`Entry`表放在前面，会有什么不同吗？以前可能会有。现在几乎肯定不会了。用不同的表顺序表达查询，在
    SQL Server 中会产生与图 10-6 相同的执行计划。然而，如果我们更改了选择的字段，或添加了其他索引，或选择对输出进行排序，那么执行计划很可能会发生变化。


    ### 合并连接


    另一种执行连接的方法是首先按连接字段对两个表进行排序。然后查找匹配行就变得非常容易。这称为合并连接（merge join），如图 10-7 所示。


    ![A158240_2_En_10_Fig7_HTML.jpg](img/A158240_2_En_10_Fig7_HTML.jpg)


    图 10-7. 合并连接要求每个表都按被比较的字段排序


    对表进行排序是一项昂贵的操作。然而，如果表在连接字段上有索引，那么可以通过索引扫描（index scan）有序地访问行，从而使合并连接成为一个可选方案。


    如果连接条件中的一个或两个字段都有索引，那么合并连接和嵌套循环连接都将更有效。'
- fmt: '## Different SQL Expressions for Joins


    In the previous section I briefly touched on whether the order of the tables in
    a join would affect the execution. The answer was no for the query in Figure [10-6](#A158240_2_En_10_Chapter.html#Fig6).
    However, we have other ways of expressing joins. The two queries that follow have
    exactly the same execution plans in SQL Server:


    ```

    SELECT LastName FROM Member m, Entry e WHERE m.MemberID = e.MemberID;

    SELECT LastName FROM Entry e INNER JOIN Member m ON m.MemberID = e.MemberID;

    ```


    The following two SQL statements specify the join in terms of nested queries.
    They have different execution plans from the preceding queries but they are the
    same as each other:


    ```

    SELECT LastName FROM Member m WHERE m.memberID IN

    (SELECT MemberID FROM Entry);

    SELECT LastName from Member m WHERE EXISTS

    (SELECT * FROM Entry e WHERE m.MemberID = e.MemberID);

    ```


    So, should we use or avoid nested queries? The answer, as always, is “it depends.”


    Before we compare the preceding two pairs of SQL statements we need to be aware
    that the output from them is different. The first pair will produce duplicate
    names (repeating a member’s name for every tournament they have entered). The
    second pair of queries will produce unique names. To be fair in the comparison
    we will compare the following two queries, which have identical output:


    ```

    SELECT DISTINCT LastName

    FROM Entry e INNER JOIN Member m ON m.MemberID = e.MemberID;

    SELECT LastName FROM Member m WHERE m.MemberID IN

    (SELECT MemberID FROM Entry);

    ```


    You can see the two plans in Figure [10-8](#A158240_2_En_10_Chapter.html#Fig8).


    ![A158240_2_En_10_Fig8_HTML.jpg](A158240_2_En_10_Fig8_HTML.jpg)


    Figure 10-8.


    The same output but very different execution plans and costs


    Figure [10-8](#A158240_2_En_10_Chapter.html#Fig8) shows the plan for the query
    using the `INNER JOIN` keyword at the top and the plan for the nested query underneath.
    The percentages are saying that if both these queries were executed in one batch
    then the top one would account for 74 percent of the time and the bottom one 26
    percent. That is, the `INNER JOIN` query takes three times as long as the nested
    query.


    The addition of the `DISTINCT` keyword in the top query accounts for much of the
    time. The optimizer has chosen to sort the records in order to prepare to remove
    the duplicate names. This sorting operation accounts for over half the total cost
    of the first query. Seeing this plan, you might consider adding an index on `LastName`
    so that the records for the `Member` table could be accessed in `LastName` order,
    thus eliminating the need for the time-consuming sort.


    Unless you have real insider knowledge, it is just about impossible to second
    guess what the optimizer will come up with. In the long run it probably doesn’t
    matter unless the tables have huge numbers of rows or a query is particularly
    time critical. The important thing to remember is that if you suspect that a critical
    query is causing a bottleneck, there are tools that can help you understand what
    is going on. You can then experiment with indexes or the ways the query is expressed
    to see if that can speed things up.


    ## Summary


    Indexes can make a considerable difference in the performance of many queries.
    However, there is the downside that they have to be maintained. With any tuning
    of a database it is important to know what the important processes are. There
    is no point going to any lengths to improve a query that is rarely carried out,
    and it is counterproductive to improve retrieval performance if most of the time-critical
    work in your database is the updating of records.


    The tools provided by many database systems can provide valuable information.
    Execution plans can give insight into where the time is being spent in a query.
    Statistics can be collected about the use of indexes or the distribution of data
    in a field. All this information is useful when deciding whether the addition
    of a new index might be worth investigating.


    Here are some general rules of thumb for creating indexes.


    ### Primary Key


    You need a very good reason not to have an index on the primary key field(s) of
    a table. Generally a clustered index will be placed on the primary key by default.


    ### Foreign Keys


    Joins where the join condition is between a foreign key and a primary key are
    very common. For this reason an index on foreign keys is usually worth considering.


    ### WHERE Conditions


    If you have queries that frequently use particular fields in a `WHERE` condition,
    then it is useful to index on those fields. This enables an index seek rather
    than having to do a table scan to find the relevant rows. This is most useful
    when the `WHERE` condition is selective, meaning that it will retrieve only a
    small subset of the rows.


    ### ORDER BY, GROUP BY, and DISTINCT


    Sorting can be a very expensive operation if there are no indexes on the fields
    involved in the sorting condition. Clearly `ORDER BY` requires rows to be sorted.
    Queries that contains `DISTINCT` or `GROUP BY` often sort the records to remove
    duplicates or to aggregate the data. With appropriate indexes, an index scan can
    be used to retrieve the rows in order, thus eliminating the need for an expensive
    sorting operation.


    ### Use the Tools


    Query optimizers are very sophisticated. They maintain statistics about your tables
    (number of rows, size of columns, distribution of data, etc.) and use these to
    help determine an efficient execution plan for a query. If you have a critical
    query that you want to be as efficient as possible, check the execution plans
    to see where the time is being spent. You can then experiment with the effects
    of restating the query or adding additional indexes.


    Footnotes [1](#A158240_2_En_10_Chapter.html#Fn1_source)


    SQL is based on relational calculus, which provides a description of the data
    to be retrieved. See Appendix 2 for more information.


      [2](#A158240_2_En_10_Chapter.html#Fn2_source)


    More formally the tuples in a relation have no order.


    # 11. How to Tackle a Query


    In the previous chapters, we saw different ways to express a query. We looked
    at the process approach, which describes how tables and data could be manipulated
    to produce the required result. These queries are expressed using keywords describing
    operations such as `INNER JOIN` and `INTERSECTION`. We also looked at how to express
    queries in terms of the outcome approach, which describes the criteria that the
    resulting data must satisfy rather than the process for retrieving the result.


    However, sometimes when I am presented with a complicated natural language description
    of a query, it is not uncommon to find that my mind goes blank. I have a lot of
    ammunition at hand, but for a moment or two, have no idea which weapons to choose.


    Usually, it is just a matter of being confident and relaxed. Large, complicated
    queries can always be broken down into a series of smaller, simpler queries that
    can be combined later. This chapter describes how to do just that.


    ## Understanding the Data


    It may sound like stating the obvious, but you can’t retrieve information from
    a database without understanding where all the different elements of data are
    stored and how the relevant tables are interrelated. Most of the time you will
    be querying a database designed by someone else, and probably maintained and altered
    over time by various people. As well as understanding the tables and relationships
    that have been implemented, it is also necessary to have a feel for the underlying
    real-world scenario. You also must be alert to the unfortunate reality that the
    database may have been badly designed. This might mean that you are not able to
    retrieve the required information accurately. We will consider this problem of
    working against bad design a bit more in Chapter [12](#A158240_2_En_12_Chapter.html).'
