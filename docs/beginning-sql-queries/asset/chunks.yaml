    WHERE Gender  ''F'';

    ```


    At first glance we might think that the two counts from the previous two queries
    should add up to the total number of members. But we need to be careful. In Chapter
    [2](#A158240_2_En_2_Chapter.html), we looked at how `WHERE` conditions operate
    when we make comparisons with a null (or empty) value. If there is no value for
    the attribute then we cannot say whether it does or does not satisfy a condition.
    We don’t know! In SQL, if the value we are comparing is a null, then the result
    of the comparison will always be false. Rows in the table with a null in the `Gender`
    column will not be included in either of the two previous queries.


    We could argue that the attribute should have been declared as `NOT NULL` in the
    design of the table. In Chapter [2](#A158240_2_En_2_Chapter.html) we discussed
    why this might not be a good idea. If we are trying to enter details for a new
    member who has not provided their gender then we either will be prevented from
    saving the details we do know or will have to guess the gender. Neither option
    is satisfactory. It’s better to save the details and follow up on the missing
    data later.


    We can explicitly find how many of the rows do not have a value for `Gender` with
    the query:


    ```

    SELECT COUNT(*)

    FROM Member

    WHERE Gender IS NULL;

    ```


    The numbers for the three previous queries with conditions `Gender = ''F''`, `Gender
