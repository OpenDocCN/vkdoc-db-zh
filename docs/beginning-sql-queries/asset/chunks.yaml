- fmt: '### Ranking


    `ORDER BY` 子句的另一个用途是与 `RANK()` 函数结合使用。作为一个例子，我们将根据 handicap 对俱乐部成员进行排名。请看以下查询：


    ```sql

    SELECT MemberID, Handicap,

    RANK() OVER (ORDER BY Handicap) AS Rank

    FROM Member

    WHERE Handicap IS NOT NULL;

    ```


    `OVER()` 函数中的 `ORDER BY` 子句指定了在确定排名时行的顺序——这里使用的是 `Handicap` 的值。每当 `Handicap` 的值发生变化时，排名就变为该分区内的行号（此处是整个表按
    `Handicap` 排序）。排名会保持不变，直到 `Handicap` 的值再次改变，如图 [9-8](#A158240_2_En_9_Chapter.html#Fig8)
    所示。（为了更清晰地说明过程，部分 handicap 值已被修改。具有相同 `Handicap` 值（因此排名也相同）的行已用虚线标出。）


    ![A158240_2_En_9_Fig8_HTML.jpg](A158240_2_En_9_Fig8_HTML.jpg)


    图 9-8.

    按 handicap 排序的 `RANK()` 函数结果。具有相同 handicap 值的行拥有相同的排名。


    图 [9-8](#A158240_2_En_9_Chapter.html#Fig8) 中的第一行排名为 1（它是第一行！）。第二行的排序表达式 (`Handicap`)
    值与前一行相同，因此它的排名也是 1。下一行中 `Handicap` 的值发生了变化，所以排名变为行号 (3)。


    空值会被包含在排名中，这就是为什么在前面的查询中明确排除了它们。如果没有 `WHERE` 子句，空值将被包含在排名的顶部（如果排序顺序是 `DESC`，则在底部）。


    ### Combining Ordering with Partitions


    在前面关于排序的部分中，我的查询没有包含任何分区。既然我们（希望）已经理解了这个概念，我们可以看更多的例子。


    让我们考虑一个更详细的 `Income` 表，它包含了高尔夫俱乐部进行筹款的三个区域的月度金额。该年头五个月的数据如图 [9-9](#A158240_2_En_9_Chapter.html#Fig9)
    所示。


    ![A158240_2_En_9_Fig9_HTML.jpg](A158240_2_En_9_Fig9_HTML.jpg)


    图 9-9.

    包含区域的 Income 表


    我们将逐步构建一些查询。


    首先，我们只计算表的总收入。我们可以使用简单的 `SUM()` 聚合，但我们将包含一个 `OVER()` 函数，以便在输出中保留详细信息：


    ```sql

    SELECT Month, Area, Income,

    SUM(Income) OVER() AS Total

    FROM Income;

    ```


    这将产生一个与图 [9-9](#A158240_2_En_9_Chapter.html#Fig9) 相同的表，但增加了一列 `Total`，该列每行都显示整个表的总和。


    现在，让我们将其改为累计总和。我们通过在 `OVER()` 函数中包含一个 `ORDER BY` 子句来实现。默认情况下，这会计算从表开头到当前行以及相同
    `Month` 值的后续行的总和。查询如下：


    ```sql

    SELECT Month, Area, Income,

    SUM(Income) OVER(ORDER BY MONTH) AS RunningTotal

    FROM Income;

    ```


    收入从表顶部累加到当前行，包括具有相同 `Month` 值（我们用于排序的属性）的后续行。本质上，输出对每个月的所有值求和，然后逐月累计总数。输出如图 [9-10](#A158240_2_En_9_Chapter.html#Fig10)
    所示。不同的月份已用虚线标出。


    ![A158240_2_En_9_Fig10_HTML.jpg](A158240_2_En_9_Fig10_HTML.jpg)


    图 9-10.

    按月排序时的累计总和


    现在让我们独立地查看各个区域。这需要一个 `PARTITION BY` 子句。考虑这个查询：


    ```sql

    SELECT Month, Area, Income,

    SUM(Income) OVER(

    PARTITION By Area

    ORDER BY MONTH) AS AreaRunningTotal

    FROM Income;

    ```


    `PARTITION BY` 子句需要放在 `ORDER BY` 子句之前，这反映了执行过程。我们首先对数据进行分区，然后在每个分区内进行排序。聚合是针对从当前分区开头到当前行的行计算的。图
    [9-11](#A158240_2_En_9_Chapter.html#Fig11) 仅显示了该年头五个月的输出。三个分区已用虚线标出，以便更容易看清发生了什么。


    ![A158240_2_En_9_Fig11_HTML.jpg](A158240_2_En_9_Fig11_HTML.jpg)


    图 9-11.

    按区域分区并按月排序的收入累计总和'
  raw: '### Ranking


    Yet another use for the `ORDER BY` clause is with the `RANK()` function . As an
    example we will rank the members of the club by their handicap. Have a look at
    the following query:


    ```

    SELECT MemberID, Handicap,

    RANK() OVER (ORDER BY Handicap) AS Rank

    FROM Member

    WHERE Handicap IS NOT NULL;

    ```


    The `ORDER BY` clause in the `OVER()` function specifies the order of the rows
    when determining the rank`—`in this case the value of `Handicap`. Each time the
    value of `Handicap` changes, the rank becomes the row number in the partition
    (in this case the entire table ordered by `Handicap`).The rank then stays the
    same until the value of `Handicap` changes, as shown in Figure [9-8](#A158240_2_En_9_Chapter.html#Fig8).
    (Some of the handicaps have been changed to illustrate the process more clearly.
    Rows with the same value of `Handicap` and therefore rank have been delineated.)


    ![A158240_2_En_9_Fig8_HTML.jpg](A158240_2_En_9_Fig8_HTML.jpg)


    Figure 9-8.


    Result of the RANK() function ordered by handicap. Rows with the same value handicap
    have the same rank


    The first row in Figure [9-8](#A158240_2_En_9_Chapter.html#Fig8) has rank 1 (it
    is the first row!). The second row has the same value of the order expression
    (`Handicap`) as the previous row so it also has rank 1\. In the next row the value
    of `Handicap` has changed so the rank becomes the row number (3).


    Null values will be included in the ranking, which is why they have been explicitly
    excluded in the previous query. Without the `WHERE` clause the null values would
    have been included at the top of the ranking (or at the bottom if the order had
    been `DESC`).


    ### Combining Ordering with Partitions


    In the previous sections on ordering I didn’t include any partitions in the queries.
    Now that we (hopefully) understand the concept we can look at some more examples.


    Let’s consider a more detailed `Income` table that has monthly amounts for each
    of three areas where the golf club carries out fundraising. The data for the first
    five months of the year is shown in Figure [9-9](#A158240_2_En_9_Chapter.html#Fig9).


    ![A158240_2_En_9_Fig9_HTML.jpg](A158240_2_En_9_Fig9_HTML.jpg)


    Figure 9-9.


    Income table including areas


    We will build up some queries slowly.


    First, we will just calculate the total income for the table. We could use a simple
    `SUM()` aggregate, but we will include an `OVER()` function so we can keep the
    detail in the output:


    ```

    SELECT Month, Area, Income,

    SUM(Income) OVER() AS Total

    FROM Income;

    ```


    This will produce a table the same as in Figure [9-9](#A158240_2_En_9_Chapter.html#Fig9)
    but with an additional column, `Total`, which will have the overall total for
    every row.


    Now let’s change this to a running total. We do this by including an `ORDER BY`
    clause in the `OVER()` function. By default this calculates the total for the
    values from the beginning of the table to the current row and the next rows with
    the same value of `Month`. The query is:


    ```

    SELECT Month, Area, Income,

    SUM(Income) OVER(ORDER BY MONTH) AS RunningTotal

    FROM Income;

    ```


    The incomes are summed from the top of the table to the current row including
    the following rows with the same value of `Month` (the attribute we are ordering
    by). Essentially, the output sums all the values for each month and then accumulates
    the totals month by month. The output is shown in Figure [9-10](#A158240_2_En_9_Chapter.html#Fig10).
    The different months have been delineated.


    ![A158240_2_En_9_Fig10_HTML.jpg](A158240_2_En_9_Fig10_HTML.jpg)


    Figure 9-10.


    Running total when ordering by month


    Now let’s look at the areas independently. This requires a `PARTITION BY` clause.
    Consider this query:


    ```

    SELECT Month, Area, Income,

    SUM(Income) OVER(

    PARTITION By Area

    ORDER BY MONTH) AS AreaRunningTotal

    FROM Income;

    ```


    The `PARTITION BY` clause needs to come before the `ORDER BY` clause, which reflects
    what is happening. We first partition the data and then order within the partitions.
    The aggregate is calculated for rows from the beginning of the current partition
    to the current row. Figure [9-11](#A158240_2_En_9_Chapter.html#Fig11) shows the
    output for just the first five months of the year. The three partitions have been
    delineated so it is easier to see what is happening.


    ![A158240_2_En_9_Fig11_HTML.jpg](A158240_2_En_9_Fig11_HTML.jpg)


    Figure 9-11.


    Running totals for income partitioned by area and ordered by month'
  trans: '### 排名


    `ORDER BY` 子句的另一个用途是与 `RANK()` 函数结合使用。作为示例，我们将根据差点值对俱乐部成员进行排名。请看以下查询：


    ```sql

    SELECT MemberID, Handicap,

    RANK() OVER (ORDER BY Handicap) AS Rank

    FROM Member

    WHERE Handicap IS NOT NULL;

    ```


    `OVER()` 函数中的 `ORDER BY` 子句指定了在确定排名时行的顺序——这里使用的是 `Handicap` 的值。每当 `Handicap` 的值发生变化时，排名就变为该分区内的行号（此处是整个表按
    `Handicap` 排序）。排名会保持不变，直到 `Handicap` 的值再次改变，如图 9-8 所示。（为了更清晰地说明过程，部分差点值已被修改。具有相同
    `Handicap` 值（因此排名也相同）的行已用虚线标出。）


    ![A158240_2_En_9_Fig8_HTML.jpg](img/A158240_2_En_9_Fig8_HTML.jpg)


    图 9-8.

    按差点值排序的 `RANK()` 函数结果。具有相同差点值的行拥有相同的排名。


    图 9-8 中的第一行排名为 1（它是第一行！）。第二行的排序表达式 (`Handicap`) 值与前一行相同，因此它的排名也是 1。下一行中 `Handicap`
    的值发生了变化，所以排名变为行号 (3)。


    空值会被包含在排名中，这就是为什么在前面的查询中明确排除了它们。如果没有 `WHERE` 子句，空值将被包含在排名的顶部（如果排序顺序是 `DESC`，则在底部）。


    ### 排序与分区结合


    在前面关于排序的部分中，我的查询没有包含任何分区。既然我们（希望）已经理解了这个概念，我们可以看更多的例子。


    让我们考虑一个更详细的 `Income` 表，它包含了高尔夫俱乐部进行筹款的三个区域的月度金额。该年头五个月的数据如图 9-9 所示。


    ![A158240_2_En_9_Fig9_HTML.jpg](img/A158240_2_En_9_Fig9_HTML.jpg)


    图 9-9.

    包含区域的 Income 表


    我们将逐步构建一些查询。


    首先，我们只计算表的总收入。我们可以使用简单的 `SUM()` 聚合，但我们将包含一个 `OVER()` 函数，以便在输出中保留详细信息：


    ```sql

    SELECT Month, Area, Income,

    SUM(Income) OVER() AS Total

    FROM Income;

    ```


    这将产生一个与图 9-9 相同的表，但增加了一列 `Total`，该列每行都显示整个表的总和。


    现在，让我们将其改为累计总和。我们通过在 `OVER()` 函数中包含一个 `ORDER BY` 子句来实现。默认情况下，这会计算从表开头到当前行以及相同
    `Month` 值的后续行的总和。查询如下：


    ```sql

    SELECT Month, Area, Income,

    SUM(Income) OVER(ORDER BY MONTH) AS RunningTotal

    FROM Income;

    ```


    收入从表顶部累加到当前行，包括具有相同 `Month` 值（我们用于排序的属性）的后续行。本质上，输出对每个月的所有值求和，然后逐月累计总数。输出如图 9-10
    所示。不同的月份已用虚线标出。


    ![A158240_2_En_9_Fig10_HTML.jpg](img/A158240_2_En_9_Fig10_HTML.jpg)


    图 9-10.

    按月排序时的累计总和


    现在让我们独立地查看各个区域。这需要一个 `PARTITION BY` 子句。考虑这个查询：


    ```sql

    SELECT Month, Area, Income,

    SUM(Income) OVER(

    PARTITION By Area

    ORDER BY MONTH) AS AreaRunningTotal

    FROM Income;

    ```


    `PARTITION BY` 子句需要放在 `ORDER BY` 子句之前，这反映了执行过程。我们首先对数据进行分区，然后在每个分区内进行排序。聚合是针对从当前分区开头到当前行的行计算的。图
    9-11 仅显示了该年头五个月的输出。三个分区已用虚线标出，以便更容易看清发生了什么。


    ![A158240_2_En_9_Fig11_HTML.jpg](img/A158240_2_En_9_Fig11_HTML.jpg)


    图 9-11.

    按区域分区并按月排序的收入累计总和'
- fmt: '## Framing


    窗口函数的最后一个特性是我们能够进一步指定哪些行包含在聚合中。这就是窗口函数名称的由来。它们为我们感兴趣的数据部分提供了一个窗口或帧。`OVER()` 函数的通用形式包含三个子句，如下所示：


    ```sql

    OVER(

    [PARTITION BY ...]

    [ORDER BY ...]

    [ROWS ...]

    );

    ```


    我们已经了解了其中两个子句：`PARTITION BY` 子句允许我们在聚合前按某些表达式对数据进行分组。`ORDER BY` 子句允许我们确定聚合函数在分区中遍历行的顺序，并允许我们执行排名和累计计算。`ROWS`
    子句允许我们缩小相对于当前行、将要包含在聚合中的行集。


    默认情况下，带有 `OVER(ORDER BY)` 子句的查询会计算从当前分区开始到当前行（包括当前行）的值的聚合。让我们通过一个计算每个区域累计平均值的查询来回顾一下：


    ```sql

    SELECT Month, Area, Income,

    AVG(Income) OVER (

    PARTITION BY AREA

    ORDER BY Month) AS AreaRunningAverage

    FROM Income;

    ```


    图 9-12 的输出仅针对 Halswell 区域。实线框显示了从顶部数第三行的平均值所包含的行。虚线框显示了对图像底部数第三行的平均值有贡献的行。如果 `ORDER
    BY` 子句后没有 `ROWS` 子句，那么这就是默认行为。


    ![A158240_2_En_9_Fig12_HTML.jpg](A158240_2_En_9_Fig12_HTML.jpg)


    图 9-12.


    收入表的累计平均值


    `ROWS` 子句的语法是：


    ```sql

    ROWS BETWEEN <start of frame> AND <end of frame>

    ```


    表 9-1 展示了用于指定 `<start of frame>` 和/或 `<end of frame>` 的一些表达式。请记住，如果使用 `ROWS` 子句，则必须始终有
    `ORDER BY` 子句。


    表 9-1.


    指定窗口的行


    | 表达式 | 含义 |

    | --- | --- |

    | `UNBOUNDED PRECEDING` | 从当前分区的起始处开始 |

    | `<n> PRECEDING` | 从当前行之前 n 行开始 |

    | `CURRENT ROW` | 可用于帧的开始或结束 |

    | `<m> FOLLOWING` | 在当前行之后 m 行结束 |

    | `UNBOUNDED FOLLOWING` | 在当前分区的结束处结束 |


    以下查询明确指定了所需行的（默认）窗口：


    ```sql

    SELECT Month, Area, Income,

    AVG(Income) OVER(

    PARTITION BY AREA

    ORDER BY Month

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AreaRunningAverage

    FROM Income;

    ```


    如果 `ORDER BY` 子句后未指定 `ROWS` 子句，则上述查询中的 `ROWS` 子句是默认行为。


    现在我们可以改变哪些行包含在平均值中。假设我们想查看滚动三个月的平均值。这意味着对于每个月，我们取一个平均值，该值包含当前月份、前一个月和后一个月。下面的查询展示了如何在前面的查询中添加另一个
    `ROWS` 子句，以同时查看累计平均值和滚动三个月平均值：


    ```sql

    SELECT Month, Area, Income,

    AVG(Income) OVER(

    PARTITION BY AREA

    ORDER BY Month

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AreaRunningAverage,

    AVG(Income) OVER(

    PARTITION BY AREA

    ORDER BY Month

    ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING

    ) AS Area3MonthAverage

    FROM Income;

    ```


    图 9-13 显示了此查询的输出。框显示了在第 4 个月（实线框）和第 9 个月（虚线框）的行上，哪些值对平均值有贡献。


    ![A158240_2_En_9_Fig13_HTML.jpg](A158240_2_En_9_Fig13_HTML.jpg)


    图 9-13.


    累计平均值和滚动三个月平均值


    第 4 个月行的 `RunningAverage` 包含从开始到第 4 个月的所有值，类似地，第 9 个月行的 `RunningAverage` 包含直到并包括第
    9 个月的所有收入。第 4 行的 `Rolling3MonthAverage` 包含第 3 到 5 个月（当前行的前一个月和后一个月）。在第 9 行，`Rolling3MonthAverage`
    平均了第 8 到 10 个月（即，第 9 个月的前后各一个月）。


    不同的平均值提供了关于业务状况的不同信息。累计平均值提供了本年度迄今为止的平均收入。滚动三个月平均值更好地反映了当前收入的趋势。滚动平均值列中较后的值高于其对应的累计平均值，因为它们不包含最初几个月的较低值。


    ## Summary


    窗口函数提供了一种优雅的方式来执行分区、累计和滚动聚合，并允许在同一个查询中同时获取详细信息和聚合值。


    以下是本章涵盖功能的一个简要总结。我在描述中使用了“表”一词，但该功能同样适用于查询的结果。


    ### OVER()


    使用不带子句的 `OVER()` 函数来计算整个表的聚合值。与简单聚合不同，可以在 `SELECT` 子句中包含其他属性，从而同时保留对详细信息和聚合值的访问。


    ### OVER(PARTITION BY <…>)


    如果在 `OVER()` 函数中包含 `PARTITION BY`，则行将被按照分区表达式的值相同的方式分组。聚合针对每个分区执行。这类似于简单聚合中的 `GROUP
    BY`，但其优势在于可以在单个查询中包含多个不同的分区。


    ### OVER(ORDER BY <…>)


    当 `ORDER BY` 包含在 `OVER()` 函数中时，表（虚拟地）按排序表达式进行排序。然后，聚合针对从表开始到当前行（以及任何排序表达式值相同的后续行）的行进行计算。这用于累计聚合。


    ### OVER(PARTITION BY <…> ORDER BY <…>)


    表首先按分区表达式的值相同的方式划分为不同的组，然后行在这些组内按排序表达式进行排序。接着，聚合针对从表开始到当前行（以及任何排序表达式值相同的后续行）的行进行计算。


    ### OVER(ROWS BETWEEN <…> AND <…>)


    `ROWS BETWEEN` 子句可以添加到带有 `ORDER BY` 子句的 `OVER()` 函数中。这会将聚合限制为相对于当前行的一组行，通常是当前行之前的若干行和/或之后的若干行。它对于计算滚动聚合非常有用。'
  raw: "## Framing\n\nThe last feature of the window functions we will look at is\
    \ the ability to further specify which rows are included in an aggregate. This\
    \ is how the name window functions came about. They provide a window or frame\
    \ onto the section of data we are interested in. The general form of the `OVER()`\
    \ function has three clauses, as shown here:\n\n```\nOVER(\n[  ]\n[  ]\n[  ]\n\
    );\n```\n\nWe have already looked at two of these clauses: The `PARTITION BY`\
    \ clause allows us to group the data by some expression before aggregating. The\
    \ `ORDER BY` clause allows us to determine the order in which the aggregate function\
    \ traverses the rows within a partition and allows us to perform ranking and running\
    \ totals. A `ROWS` clause allows us to narrow down the set of rows, relative to\
    \ the current row, that are to be included in the aggregate.\n\nBy default, a\
    \ query with an `OVER(ORDER BY)` clause calculates the aggregate of the values\
    \ from the beginning of the current partition up to and including the current\
    \ row. Let’s recap with a query that calculates a running average for each area:\n\
    \n```\nSELECT Month, Area, Income,\nAVG(Income) OVER (\nPARTITION BY AREA\nORDER\
    \ BY Month) AS AreaRunningAverage\nFROM Income;\n```\n\nThe output in Figure [9-12](#A158240_2_En_9_Chapter.html#Fig12)\
    \ is for just the Halswell area. The solid boxes show which rows are included\
    \ in the average for the third row from the top. The dashed boxes show the rows\
    \ contributing to the average for the third row from the bottom of the image.\
    \ If there is no `ROWS` clause after an `ORDER BY` clause, then this is the default\
    \ behaviour.\n\n![A158240_2_En_9_Fig12_HTML.jpg](A158240_2_En_9_Fig12_HTML.jpg)\n\
    \nFigure 9-12.\n\nRunning average for Income table\n\nThe syntax for the `ROWS`\
    \ clause is:\n\n```\nROWS BETWEEN  AND \n```\n\nTable [9-1](#A158240_2_En_9_Chapter.html#Tab1)\
    \ shows some expressions for specifying `<start of frame>` and/or `<end of frame>`.\
    \ Remember that we always have to have an `ORDER BY` clause if we are using the\
    \ `ROWS` clause.\n\nTable 9-1.\n\nSpecifying Rows of a Window\n\n| Expression\
    \ | Meaning |\n| --- | --- |\n| `UNBOUNDED PRECEDING` | Start at the beginning\
    \ of the current partition |\n| `<n> PRECEDING` | Start n rows before the current\
    \ row |\n| `CURRENT ROW` | Can be used for either the start or end of frame |\n\
    | `<m> FOLLOWING` | End m rows after the current row |\n| `UNBOUNDED FOLLOWING`\
    \ | End at the end of the current partition |\n\nHere is the previous query with\
    \ the (default) window of required rows spelled out:\n\n```\nSELECT Month, Area,\
    \ Income,\nAVG(Income) OVER(\nPARTITION BY AREA\nORDER BY Month\nROWS BETWEEN\
    \ UNBOUNDED PRECEDING AND CURRENT ROW\n) AS AreaRunningAverage\nFROM Income;\n\
    ```\n\nThe `ROWS` clause in the preceding query is the default if no `ROWS` clause\
    \ is specified after an `ORDER BY` clause.\n\nNow we can change which rows are\
    \ to be included in the average. Say we would like to see rolling three-month\
    \ averages. This means that for each month we take an average that includes the\
    \ current month, the one preceding, and the one following. The following query\
    \ shows how we can add another `ROWS` clause to the preceding query to see both\
    \ the running average and the rolling three-month average:\n\n```\nSELECT Month,\
    \ Area, Income,\nAVG(Income) OVER(\nPARTITION BY AREA\nORDER BY Month\nROWS BETWEEN\
    \ UNBOUNDED PRECEDING AND CURRENT ROW\n) AS AreaRunningAverage,\nAVG(Income) OVER(\n\
    PARTITION BY AREA\nORDER BY Month\nROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING\n\
    ) AS Area3MonthAverage\nFROM Income;\n```\n\nFigure [9-13](#A158240_2_En_9_Chapter.html#Fig13)\
    \ shows the output of this query. The boxes show which values are contributing\
    \ to the averages on the rows for month 4 (solid boxes) and month 9 (dashed boxes).\n\
    \n![A158240_2_En_9_Fig13_HTML.jpg](A158240_2_En_9_Fig13_HTML.jpg)\n\nFigure 9-13.\n\
    \nRunning averages and rolling three-month averages\n\nThe `RunningAverage` in\
    \ the row for month 4 includes all the values from the beginning to month 4, and\
    \ similarly the `RunningAverage` in the row for month 9 includes all the incomes\
    \ up to and including month 9. The `Rolling3MonthAverage` in row 4 includes months\
    \ 3 to 5 (one month preceding and one month following the current row). In row\
    \ 9 the `Rolling3MonthAverage` averages months 8 to 10 (i.e., one month each side\
    \ of month 9).\n\nThe different averages provide different information about the\
    \ how the business is doing. The running average provides the average income to\
    \ date for the year. The rolling three-month average gives a better idea of how\
    \ the income is tracking at the moment. The later values in the rolling average\
    \ column are higher than their running average counterparts because they are not\
    \ including the lower values in the first few months.\n\n## Summary\n\nWindow\
    \ functions provide an elegant way to carry out partitioning, running, and rolling\
    \ aggregates and allowing both the detail and the aggregate to be available in\
    \ the same query.\n\nHere is a brief summary of the functionality covered in this\
    \ chapter. I have used the word table in the descriptions but the functionality\
    \ equally applies to the result of a query.\n\n### OVER()\n\nUse the `OVER()`\
    \ function with no clauses in the parentheses to calculate the aggregate for the\
    \ whole table. Unlike simple aggregates it is possible to include other attributes\
    \ in the `SELECT` clause, thereby retaining access to the detail as well as the\
    \ aggregated value.\n\n### OVER(PARTITION BY <…>)\n\nIf `PARTITION BY` is included\
    \ in the `OVER()` function then the rows are separated into groups that have the\
    \ same value for the partitioning expression. The aggregates are carried out for\
    \ each partition. This is similar to `GROUP BY` for a simple aggregate but has\
    \ the advantage that several different partitions can be included in a single\
    \ query.\n\n### OVER(ORDER BY <…>)\n\nWhen `ORDER BY` is included in the `OVER()`\
    \ function then the table is (virtually) ordered by the order by expression. The\
    \ aggregate is then evaluated for the rows from the beginning of the table to\
    \ the current row (and any following rows with the same value for the ordering\
    \ expression). This is used for running aggregates.\n\n### OVER(PARTITION BY <…>\
    \ ORDER BY <…>)\n\nThe table is first partitioned into different groups with the\
    \ same value for the partitioning expression, and the rows are then ordered by\
    \ the ordering expression within those groups. The aggregate is then evaluated\
    \ for the rows from the beginning of the table to the current row (and any following\
    \ rows with the same value for the ordering expression).\n\n### OVER(ROWS BETWEEN\
    \ <…> AND <…>)\n\nA `ROWS BETWEEN` clause can be added to an `OVER()` function\
    \ with an `ORDER BY` clause. This restricts the aggregate to a set or rows relative\
    \ to the current row, typically a number of rows preceding and or following the\
    \ current row. It is useful for calculating rolling aggregates."
  trans: '## 帧规范


    窗口函数的最后一个特性是我们能够进一步指定哪些行包含在聚合中。这正是“窗口”函数名称的由来。它们为我们感兴趣的数据部分提供了一个窗口或帧。`OVER()`
    函数的通用形式包含三个子句，如下所示：


    ```sql

    OVER(

    [PARTITION BY ...]

    [ORDER BY ...]

    [ROWS ...]

    );

    ```


    我们已经了解了其中两个子句：`PARTITION BY` 子句允许我们在聚合前按某些表达式对数据进行分组。`ORDER BY` 子句允许我们确定聚合函数在分区中遍历行的顺序，并允许我们执行排名和累计计算。`ROWS`
    子句允许我们缩小相对于当前行、将要包含在聚合中的行集。


    默认情况下，带有 `OVER(ORDER BY)` 子句的查询会计算从当前分区开始到当前行（包括当前行）的值的聚合。让我们通过一个计算每个区域累计平均值的查询来回顾一下：


    ```sql

    SELECT Month, Area, Income,

    AVG(Income) OVER (

    PARTITION BY AREA

    ORDER BY Month) AS AreaRunningAverage

    FROM Income;

    ```


    图 9-12 的输出仅针对 Halswell 区域。实线框显示了从顶部数第三行的平均值所包含的行。虚线框显示了对图像底部数第三行的平均值有贡献的行。如果 `ORDER
    BY` 子句后没有 `ROWS` 子句，那么这就是默认行为。


    ![A158240_2_En_9_Fig12_HTML.jpg](img/A158240_2_En_9_Fig12_HTML.jpg)


    图 9-12.

    收入表的累计平均值


    `ROWS` 子句的语法是：


    ```sql

    ROWS BETWEEN <start of frame> AND <end of frame>

    ```


    表 9-1 展示了用于指定 `<start of frame>` 和/或 `<end of frame>` 的一些表达式。请记住，如果使用 `ROWS` 子句，则必须始终有
    `ORDER BY` 子句。


    表 9-1.

    指定窗口的行


    | 表达式 | 含义 |

    | --- | --- |

    | `UNBOUNDED PRECEDING` | 从当前分区的起始处开始 |

    | `<n> PRECEDING` | 从当前行之前 n 行开始 |

    | `CURRENT ROW` | 可用于帧的开始或结束 |

    | `<m> FOLLOWING` | 在当前行之后 m 行结束 |

    | `UNBOUNDED FOLLOWING` | 在当前分区的结束处结束 |


    以下查询明确指定了所需行的（默认）窗口：


    ```sql

    SELECT Month, Area, Income,

    AVG(Income) OVER(

    PARTITION BY AREA

    ORDER BY Month

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AreaRunningAverage

    FROM Income;

    ```


    如果 `ORDER BY` 子句后未指定 `ROWS` 子句，则上述查询中的 `ROWS` 子句是默认行为。


    现在我们可以改变哪些行包含在平均值中。假设我们想查看滚动三个月的平均值。这意味着对于每个月，我们取一个平均值，该值包含当前月份、前一个月和后一个月。下面的查询展示了如何在前面的查询中添加另一个
    `ROWS` 子句，以同时查看累计平均值和滚动三个月平均值：


    ```sql

    SELECT Month, Area, Income,

    AVG(Income) OVER(

    PARTITION BY AREA

    ORDER BY Month

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AreaRunningAverage,

    AVG(Income) OVER(

    PARTITION BY AREA

    ORDER BY Month

    ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING

    ) AS Area3MonthAverage

    FROM Income;

    ```


    图 9-13 显示了此查询的输出。框显示了在第 4 个月（实线框）和第 9 个月（虚线框）的行上，哪些值对平均值有贡献。


    ![A158240_2_En_9_Fig13_HTML.jpg](img/A158240_2_En_9_Fig13_HTML.jpg)


    图 9-13.

    累计平均值和滚动三个月平均值


    第 4 个月行的 `RunningAverage` 包含从开始到第 4 个月的所有值，类似地，第 9 个月行的 `RunningAverage` 包含直到并包括第
    9 个月的所有收入。第 4 行的 `Rolling3MonthAverage` 包含第 3 到 5 个月（当前行的前一个月和后一个月）。在第 9 行，`Rolling3MonthAverage`
    平均了第 8 到 10 个月（即，第 9 个月的前后各一个月）。


    不同的平均值提供了关于业务状况的不同信息。累计平均值提供了本年度迄今为止的平均收入。滚动三个月平均值更好地反映了当前收入的趋势。滚动平均值列中较后的值高于其对应的累计平均值，因为它们不包含最初几个月的较低值。


    ## 总结


    窗口函数提供了一种优雅的方式来执行分区、累计和滚动聚合，并允许在同一个查询中同时获取详细信息和聚合值。


    以下是本章涵盖功能的一个简要总结。我在描述中使用了“表”一词，但该功能同样适用于查询的结果。


    ### OVER()


    使用不带子句的 `OVER()` 函数来计算整个表的聚合值。与简单聚合不同，可以在 `SELECT` 子句中包含其他属性，从而同时保留对详细信息和聚合值的访问。


    ### OVER(PARTITION BY <…>)


    如果在 `OVER()` 函数中包含 `PARTITION BY`，则行将被按照分区表达式的值相同的方式分组。聚合针对每个分区执行。这类似于简单聚合中的 `GROUP
    BY`，但其优势在于可以在单个查询中包含多个不同的分区。


    ### OVER(ORDER BY <…>)


    当 `ORDER BY` 包含在 `OVER()` 函数中时，表（虚拟地）按排序表达式进行排序。然后，聚合针对从表开始到当前行（以及任何排序表达式值相同的后续行）的行进行计算。这用于累计聚合。


    ### OVER(PARTITION BY <…> ORDER BY <…>)


    表首先按分区表达式的值相同的方式划分为不同的组，然后行在这些组内按排序表达式进行排序。接着，聚合针对从表开始到当前行（以及任何排序表达式值相同的后续行）的行进行计算。


    ### OVER(ROWS BETWEEN <…> AND <…>)


    `ROWS BETWEEN` 子句可以添加到带有 `ORDER BY` 子句的 `OVER()` 函数中。这会将聚合限制为相对于当前行的一组行，通常是当前行之前的若干行和/或之后的若干行。它对于计算滚动聚合非常有用。'
- fmt: '# 10. Efficiency Considerations


    You may not need to read this chapter! Database management systems (DBMS) are
    very efficient, and if you have a modest amount of data, most of your queries
    will probably be carried out in the blink of an eye. Complicating your life in
    an attempt to make your queries a little faster does not make a great deal of
    sense. However, if you have (or might have) vast amounts of data and speed is
    absolutely critical, you will need more skill and experience than you are likely
    to get from reading one chapter in a beginners’ book. Having said that, you are
    likely to have people tell you that it matters how you express your queries or
    that you should be indexing your tables, so it is handy to have some idea about
    what is going on behind the scenes and understand some of the terminology.


    Throughout this book, I have emphasized that there are often alternative ways
    to phrase a query in SQL. The implementation of SQL you are using may not support
    some constructions, so your choices may be limited. Even then, you usually have
    alternatives for most queries. Does it matter which one you use? One consideration
    is the transportability of your queries. If you are unsure where your query may
    be used, you might choose to avoid keywords and operations that are not widely
    supported (yet). However, typically you will be writing queries for a database
    with a specific implementation of SQL. In that case, your main questions are “How
    will the different constructions of a query affect the performance?” and “Is there
    anything I can do to improve performance?”


    ## What Happens to a Query


    Up to this point we have been concentrating on taking a question we need answered
    and constructing a query that will return appropriate and accurate information
    from the database. Conceptually the query writer thinks of the database as being
    a collection of tables. An SQL statement is an expression describing which data
    should be retrieved from those tables and what constraints that data must obey
    (the outcome approach).


    We have also seen that a query can be specified by describing set operations,
    such as joins and intersections, which would result in the appropriate data being
    returned (the process approach). Using set operations makes forming a query very
    elegant, but the operations are purely conceptual. While we might specify the
    query in terms of, say, a join followed by an intersection, this will be interpreted
    by the DBMS as a description of the data to be returned not as a method for retrieving
    the data.


    The ideas of tables and data models is a useful way for us to understand how the
    pieces of data are logically related. We leave it to the DBMS to take care of
    how the data is physically stored and retrieved. Figure 10-1 is a simplified schematic
    of the different levels of abstraction that can help us understand a database.


    ![A158240_2_En_10_Fig1_HTML.jpg](A158240_2_En_10_Fig1_HTML.jpg)


    Figure 10-1.

    Levels of a database management system


    At the top of the diagram in Figure 10-1 we have the user level. This is where
    we have the different applications and devices that form the interface between
    the humans and the data. It is here that a user (or application) will construct
    an SQL statement (top left of the diagram).


    The middle layer is a conceptual view of the database. We can think of the data
    as being in tables with various key and validation constraints. It is also where
    we can form models of how the database should deal with concurrent users and the
    rules for allowing access to different data. The SQL statements we construct are
    in terms of all these concepts.


    The actual data is stored in the physical level, shown at the bottom of Figure
    10-1. What we think of as a table may be segments of data stored on possibly different
    servers maybe in different countries. At this level there will be indexes that
    allow rapid access to different records; we will talk about those in later sections
    of this chapter.


    How the relevant pieces of information are located and assembled to produce the
    result of the query is a job for the `query optimizer`. The SQL statement constructed
    by the user is passed to the optimizer, which has access to information about
    the number of rows in a (conceptual) table, the amount of data in each row, the
    attributes on which indexes have been created, and so on. It uses all this information
    to create an `execution plan`. The execution plan is an efficient sequence of
    steps to find, compare, and assemble the data into the result specified by the
    query. The data is retrieved from physical storage and assembled in accordance
    with the execution plan, and the result is returned to the user — usually in the
    form of a table.


    Most commercial database software provides tools for displaying proposed execution
    plans and the estimated times for each step to be carried out. This provides insight
    into how a query is being executed and where the time is being spent. A good database
    administrator will be able to use this type of information to tune the database;
    for example, by adding new indexes.


    In the following sections, we will take a brief look at how records are stored,
    how indexes can improve efficiency, and some of the things that go on behind the
    scenes when a query is carried out.


    ## Finding a Record


    Most of the queries on a database will, at some point, involve finding records
    that match a particular condition. For example we may want to find records in
    a single table (e.g., `WHERE LastName = ''Smith''`), find records from two tables
    that match a join condition (e.g., `WHERE m.MemberID = e.MemberID`), or look for
    the existence or otherwise of values (e.g., `WHERE NOT EXISTS...` ).


    Searching for and finding data all seems pretty easy these days when everything
    is stored electronically. If we want to find a topic in an online book we just
    open a search box and type in some keywords. With a physical book it is a very
    different story. We either have to scan through every page or hope there is a
    useful index or table of contents. Those who remember physical telephone books
    will recall that it was easy to find Jim Smith but impossible to find who lives
    at 16 Murray Place.


    Behind the scenes in a database the issues are the same as for physical books.
    The data can only be stored in one order, but we might want to search it in a
    variety of ways. It is useful to know what is actually going on so that we have
    an understanding of what affects the performance of locating a specific record.


    One way to find records matching a condition is to simply look sequentially through
    every row in the table. This is the slowest and costliest way to find what you
    are looking for. Having said that, it may not be a problem. It would not take
    long to scan the golf club `Type` table to find the membership fee for seniors.
    On the other hand, it would be a bigger job to scan every row in (a realistic)
    `Entry` table to find members who had entered tournament 38 over the last forty
    years.'
