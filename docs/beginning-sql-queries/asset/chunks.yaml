    ## 总结


    本章概述了关系型数据库。我们了解到，关系型数据库由一组表构成，这些表代表了数据的不同方面（例如，成员表和团队表）。描述成员或属性的属性成为表的列，每个列都有一组允许的值（一个域）。每个表都应有一个主键，它是保证每行具有不同值的一个属性或属性集合。


    可以通过外键在表之间设置约束。外键是某张表中一个列（或多个列）的值，该值必须已作为另一张表的主键列的值存在。例如，`Member` 表中的 `Team` 值必须是
    `Team` 表主键字段中的值之一。


    以抽象的方式思考查询通常是有帮助的，有两种方法可以做到这一点。过程式方法要求我们思考可以应用于数据库中表的操作。这是一种描述如何操作表以提取所需信息的方式。结果式方法要求我们思考所需信息必须满足的标准。不同的人会发现，对于不同的查询，其中一种方法感觉更自然。SQL
    是一种用于在数据库上指定查询的语言。在 SQL 中指定查询通常有许多等效的方式。有些反映了过程式方法，有些反映了结果式方法 `—` 而有些则两者兼而有之。


    脚注 1

    例如，你可以参考我的另一本 Apress 图书，*《数据库设计入门：从新手到专业人员》*（纽约：Apress，2012）。


    2

    更准确地说，它是一组关系。在本书正文中，使用了诸如表、行等常见词汇。在附录 2 中，我们介绍了更正式的词汇和符号。


    3

    如果你想了解更多关于 UML 的信息，请参阅 Grady Booch, James Rumbaugh, 和 Ivar Jacobsen 的 *《统一建模语言用户指南》*（波士顿，马萨诸塞州：Addison
    Wesley，2005）。当前标准可以在 [`http://www.uml.org/`](http://www.uml.org/) 找到。


    4

    Alistair Cockburn, *《编写有效用例》*（波士顿，马萨诸塞州：Addison Wesley，2001）。


    5

    关于数据库设计的更多信息，请参考我的另一本 Apress 图书，*《数据库设计入门：从新手到专业人员》*（纽约：Apress，2012）。


    # 2. 对单表的简单查询


    如果数据库设计得正确，数据将位于几张不同的表中。例如，我们的高尔夫数据库有独立的表来存储关于成员、团队和锦标赛的信息，以及连接这些值的表；例如，哪些成员在哪个团队，参加了哪个锦标赛，等等。为了充分利用我们的数据，我们将需要查看不同表中的值以检索所需的信息。


    在本章中，我们将研究如何从单个表中检索信息。该表可能是数据库中的永久表之一，也可能是作为更复杂查询的一部分临时组合而成的虚拟表。


    我一直在以一种不太精确的方式谈论“检索”行和“返回”信息。查询产生的行会怎样？实际上，我们并不是从表中移除数据并将其放在别处。查询就像数据库的一扇窗口，我们可以通过它看到我们所需的信息。如果底层数据库中的数据发生变化，那么我们的查询结果也会随之变化。只要认识到它是临时的，将查询得到的信息视为被“检索”到一个“虚拟”表中也无妨。


    ## 行和列的子集


    选择行和/或列的子集是我们在查询中最常执行的操作之一。在接下来的部分中，我们将研究如何从数据库中的原始表之一选择行和列。¹ 同样的思路也适用于从数据经过其他操作产生的虚拟表中检索信息。


    要确定从表中检索哪些行，需要指定一个条件，这是一个值为真或假的语句。我们将该条件独立应用于表中的每一行，保留条件为真的行，丢弃其他行。假设我们想找到高尔夫俱乐部中的所有高级会员。我们只需要
    `Member` 表中 `MemberType` 字段值为“Senior”的那部分行子集，如图 2-1 所示。


    ![A158240_2_En_2_Fig1_HTML.jpg](img/A158240_2_En_2_Fig1_HTML.jpg)

    **图 2-1.** 检索高级会员的行子集


    用于检索高级会员的 SQL 查询如下：


    ```sql

    SELECT *

    FROM Member

    WHERE MemberType = ''Senior''

    ```


    这个查询有三个部分，或者说子句：`SELECT` 子句说明要检索哪些列。这里，`*` 表示检索所有列。`FROM` 子句说明查询涉及哪些表，`WHERE`
    子句描述了决定特定行是否应包含在结果中的条件。该条件是检查 `MemberType` 字段中的值。在 SQL 中，当我们为字符或文本字段指定实际值时，需要将值用单引号括起来，如
    `''Senior''`。


    现在让我们看看如何指定我们只想在结果中看到部分列。我通常将选择行子集称为筛选，将投影列子集称为投影。通常，投影列子集是一系列操作的最后一步。我们可以先收集所有需要的数据，最后再请求我们只需要的属性或列。我们将在第
    7 章中看到，在应用某些集合操作（如并集和交集）之前，我们有时也需要从原始表或虚拟表中投影类似的列。


    如果我们想要一份所有成员的电话列表，则不需要额外的信息，如差点或加入日期。图 2-2 显示了从 `Member` 表中投影出的姓名和电话号码列子集。


    ![A158240_2_En_2_Fig2_HTML.jpg](img/A158240_2_En_2_Fig2_HTML.jpg)

    **图 2-2.** 投影列子集以提供电话列表


    从 `Member` 表中检索姓名和电话列的 SQL 是：


    ```sql

    SELECT LastName, FirstName, Phone

    FROM Member

    ```


    因为我们想看到每一行的这些列值，所以这个查询没有 `WHERE` 子句。


    结合行和列子集的检索很简单。如果我们只想获取高级会员的电话列表，就可以这样做，如图 2-3 所示。


    ![A158240_2_En_2_Fig3_HTML.jpg](img/A158240_2_En_2_Fig3_HTML.jpg)

    **图 2-3.** 检索行和列的子集以生成高级会员的电话列表


    图 2-3 所示查询的 SQL 是：


    ```sql

    SELECT LastName, FirstName, Phone

    FROM Member

    WHERE MemberType = ''Senior''

    ```

