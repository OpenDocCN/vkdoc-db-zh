- fmt: '### Find the Subset of Rows


    From Figure [11-6](#A158240_2_En_11_Chapter.html#Fig6) we can see that the rows
    that we want to retain from the result of the join are where the `Gender` field
    has the value `M` and the `TourName` field has the value `Leeston`. We can select
    these rows by adding an appropriate `WHERE` clause to the previous query:


    ```

    SELECT * FROM

    (Entry e INNER JOIN Tournament t ON t.TourID=e.TourID)

    INNER JOIN Member m ON m.MemberID = e.MemberID

    WHERE m.Gender = ''M'' AND t.TourName = ''Leeston'';

    ```


    Figure [11-7](#A158240_2_En_11_Chapter.html#Fig7) shows just some of the columns
    from the result of the query above. It has four rows: three for Robert Pollard
    and one for William Taylor.


    ![A158240_2_En_11_Fig7_HTML.jpg](A158240_2_En_11_Fig7_HTML.jpg)


    Figure 11-7.


    Men who have entered Leeston tournaments (just some columns)


    Why do we have three rows for Robert Pollard? The rows are identical except for
    the value of the `Year` field. Robert has entered the Leeston tournament in three
    different years. We can see this quite clearly from Figure [11-6](#A158240_2_En_11_Chapter.html#Fig6)
    because we have left the `Year` column in the output. Had we retained only the
    name columns, we might initially be a bit puzzled at having Robert Pollard repeated
    three times. What we do about the repetition of Robert Pollard depends on understanding
    the initial question a bit more clearly, as you will see in the next section.


    ### Retain the Appropriate Columns


    We have the appropriate subset of rows from our large join. Now we need to retain
    just the columns we require by amending the `SELECT` clause, which is currently
    returning all the columns (`SELECT *`). This is not always as simple as it might
    sound. The three rows for Robert Pollard give us a bit of a clue that things may
    not be as straightforward. We have two possibilities.


    If we only want to know who has entered the tournament in any year, then we want
    just the distinct names Robert Pollard and William Taylor and perhaps their ID
    numbers. Amending the `SELECT` clause as in the following query will provide that
    outcome:


    ```

    SELECT DISTINCT m.MemberID, m.LastName, m.FirstName

    FROM ...

    ```


    If the objective of the question is to find out how often men enter Leeston tournaments,
    then we want to retain all the entries. In that case, it might be useful to retain
    the year as well to distinguish the rows as in the following:


    ```

    SELECT m.MemberID, m.LastName, m.FirstName, e.Year

    FROM ...

    ```


    ### Consider an Intermediate View


    The SQL for the joining the `Entry`, `Member`, and `Tournament` tables is likely
    to be the basis of many queries about entries in tournaments. For example, the
    following questions will all require a join of the `Member`, `Entry`, and `Tournament`
    tables:


    *   Do junior members enter open tournaments?

    *   Which tournaments did William Taylor enter in 2015?

    *   What is the average number of Social tournaments that members entered in 2013?


    As we are likely to use this large join many times, it can be convenient to make
    a view. A view is an instruction for how to create a temporary table that we can
    use in other queries. The following is a first attempt at the SQL for creating
    a view that retains all the fields from the joins:


    ```

    --First Attempt (unsuccessful)

    CREATE VIEW AllTournamentInfo AS

    SELECT * FROM

    (Entry e INNER JOIN Tournament t ON t.TourID=e.TourID)

    INNER JOIN Member m ON m.MemberID = e.MemberID;

    ```


    As it stands, this query will not run in most versions of SQL. This is because
    the view would have fields with the same name; for example, there will be two
    fields called `MemberID` : one from the `Entry` table and one from the `Member`
    table.


    When you create a view, all the field names must be distinct. The view will not
    use the aliases to differentiate the columns in the resulting table. The `*` in
    the `SELECT` clause needs to be altered to list all the field names. We need to
    either include just one of the fields with duplicated names (`MemberID` and `TourID`)
    or rename those that are duplicated (e.g., `SELECT m.MemberID AS MMember`, `e.MemberID
    AS EMember`). This is a bit tedious, but if you are creating a view that you are
    likely to use many times, it is worth the effort.


    Once we have the view `AllTournamentInfo`, it can be used in the same way as any
    other table in our queries. To find the names of men who have entered a Leeston
    tournament, we can use the view as shown here:


    ```

    SELECT DISTINCT LastName, FirstName

    FROM AllTournamentInfo

    WHERE Gender = ''M'' AND TourName = ''Leeston'';

    ```


    ## Spotting Keywords in Questions


    The big picture approach assumes that we have decided how to combine the tables
    that will contribute to the query. Sometimes, it will be obvious that, for example,
    certain tables need to be joined. Other times, it may not be at all clear initially.
    In this section, we will look at some keywords that often appear in questions
    and that can provide a clue about which relational operations are needed. If none
    of these help, remember that we still have the “No Idea Where to Start?” section
    coming up!'
  raw: '### Find the Subset of Rows


    From Figure [11-6](#A158240_2_En_11_Chapter.html#Fig6) we can see that the rows
    that we want to retain from the result of the join are where the `Gender` field
    has the value `M` and the `TourName` field has the value `Leeston`. We can select
    these rows by adding an appropriate `WHERE` clause to the previous query:


    ```

    SELECT * FROM

    (Entry e INNER JOIN Tournament t ON t.TourID=e.TourID)

    INNER JOIN Member m ON m.MemberID = e.MemberID

    WHERE m.Gender = ''M'' AND t.TourName = ''Leeston'';

    ```


    Figure [11-7](#A158240_2_En_11_Chapter.html#Fig7) shows just some of the columns
    from the result of the query above. It has four rows: three for Robert Pollard
    and one for William Taylor.


    ![A158240_2_En_11_Fig7_HTML.jpg](A158240_2_En_11_Fig7_HTML.jpg)


    Figure 11-7.


    Men who have entered Leeston tournaments (just some columns)


    Why do we have three rows for Robert Pollard? The rows are identical except for
    the value of the `Year` field. Robert has entered the Leeston tournament in three
    different years. We can see this quite clearly from Figure [11-6](#A158240_2_En_11_Chapter.html#Fig6)
    because we have left the `Year` column in the output. Had we retained only the
    name columns, we might initially be a bit puzzled at having Robert Pollard repeated
    three times. What we do about the repetition of Robert Pollard depends on understanding
    the initial question a bit more clearly, as you will see in the next section.


    ### Retain the Appropriate Columns


    We have the appropriate subset of rows from our large join. Now we need to retain
    just the columns we require by amending the `SELECT` clause, which is currently
    returning all the columns (`SELECT *`). This is not always as simple as it might
    sound. The three rows for Robert Pollard give us a bit of a clue that things may
    not be as straightforward. We have two possibilities.


    If we only want to know who has entered the tournament in any year, then we want
    just the distinct names Robert Pollard and William Taylor and perhaps their ID
    numbers. Amending the `SELECT` clause as in the following query will provide that
    outcome:


    ```

    SELECT DISTINCT m.MemberID, m.LastName, m.FirstName

    FROM ...

    ```


    If the objective of the question is to find out how often men enter Leeston tournaments,
    then we want to retain all the entries. In that case, it might be useful to retain
    the year as well to distinguish the rows as in the following:


    ```

    SELECT m.MemberID, m.LastName, m.FirstName, e.Year

    FROM ...

    ```


    ### Consider an Intermediate View


    The SQL for the joining the `Entry`, `Member,` and `Tournament` tables is likely
    to be the basis of many queries about entries in tournaments. For example, the
    following questions will all require a join of the `Member`, `Entry`, and `Tournament`
    tables:


    *   Do junior members enter open tournaments?

    *   Which tournaments did William Taylor enter in 2015?

    *   What is the average number of Social tournaments that members entered in 2013?


    As we are likely to use this large join many times, it can be convenient to make
    a view. A view is an instruction for how to create a temporary table that we can
    use in other queries. The following is a first attempt at the SQL for creating
    a view that retains all the fields from the joins:


    ```

    --First Attempt (unsuccessful)

    CREATE VIEW AllTournamentInfo AS

    SELECT * FROM

    (Entry e INNER JOIN Tournament t ON t.TourID=e.TourID)

    INNER JOIN Member m ON m.MemberID = e.MemberID;

    ```


    As it stands, this query will not run in most versions of SQL. This is because
    the view would have fields with the same name; for example, there will be two
    fields called `MemberID` : one from the `Entry` table and one from the `Member`
    table.


    When you create a view, all the field names must be distinct. The view will not
    use the aliases to differentiate the columns in the resulting table. The `*` in
    the `SELECT` clause needs to be altered to list all the field names. We need to
    either include just one of the fields with duplicated names (`MemberID` and `TourID`)
    or rename those that are duplicated (e.g., `SELECT m.MemberID AS MMember`, `e.MemberID
    AS EMember`). This is a bit tedious, but if you are creating a view that you are
    likely to use many times, it is worth the effort.


    Once we have the view `AllTournamentInfo`, it can be used in the same way as any
    other table in our queries. To find the names of men who have entered a Leeston
    tournament, we can use the view as shown here:


    ```

    SELECT DISTINCT LastName, FirstName

    FROM AllTournamentInfo

    WHERE Gender = ''M'' AND TourName = ''Leeston'';

    ```


    ## Spotting Keywords in Questions


    The big picture approach assumes that we have decided how to combine the tables
    that will contribute to the query. Sometimes, it will be obvious that, for example,
    certain tables need to be joined. Other times, it may not be at all clear initially.
    In this section, we will look at some keywords that often appear in questions
    and that can provide a clue about which relational operations are needed. If none
    of these help, remember that we still have the “No Idea Where to Start?” section
    coming up!'
  trans: '### 找出所需的行子集


    从图 11-6 中我们可以看到，希望在连接结果中保留的行是`Gender`字段值为`M`且`TourName`字段值为`Leeston`的那些行。我们可以通过向之前的查询添加适当的`WHERE`子句来选择这些行：


    ```

    SELECT * FROM

    (Entry e INNER JOIN Tournament t ON t.TourID=e.TourID)

    INNER JOIN Member m ON m.MemberID = e.MemberID

    WHERE m.Gender = ''M'' AND t.TourName = ''Leeston'';

    ```


    图 11-7 展示了上述查询结果中的部分列。它包含四行：三行对应 Robert Pollard，一行对应 William Taylor。


    ![A158240_2_En_11_Fig7_HTML.jpg](img/A158240_2_En_11_Fig7_HTML.jpg)


    图 11-7.


    参加过 Leeston 锦标赛的男性（仅显示部分列）


    为什么 Robert Pollard 有三行？这些行除了`Year`字段的值外完全相同。Robert 在三个不同的年份参加了 Leeston 锦标赛。从图
    11-6 中可以很清楚地看到这一点，因为我们把`Year`列保留在了输出中。如果我们只保留姓名列，一开始可能会对 Robert Pollard 重复出现三次感到有点困惑。如何处理
    Robert Pollard 的重复取决于对初始问题的更清晰理解，这将在下一节中看到。


    ### 保留所需的列


    我们已经从大型连接中得到了所需的行子集。现在我们需要通过修改`SELECT`子句来仅保留所需的列，该子句当前返回所有列（`SELECT *`）。这并不总是像听起来那么简单。Robert
    Pollard 的三行数据给了我们一点提示，事情可能并不那么直接。我们有两种可能性。


    如果我们只想知道任何年份参加过锦标赛的人，那么我们只需要唯一的姓名 Robert Pollard 和 William Taylor，或许还需要他们的 ID
    号。按如下方式修改`SELECT`子句将提供该结果：


    ```

    SELECT DISTINCT m.MemberID, m.LastName, m.FirstName

    FROM ...

    ```


    如果问题的目的是找出男性参加 Leeston 锦标赛的频率，那么我们需要保留所有条目。在这种情况下，保留年份以区分不同的行可能是有用的，如下所示：


    ```

    SELECT m.MemberID, m.LastName, m.FirstName, e.Year

    FROM ...

    ```


    ### 考虑使用中间视图


    用于连接`Entry`、`Member`和`Tournament`表的 SQL 很可能是许多关于参赛情况查询的基础。例如，以下问题都需要连接`Member`、`Entry`和`Tournament`表：


    *   青少年会员会参加公开赛吗？

    *   William Taylor 在 2015 年参加了哪些锦标赛？

    *   2013 年会员参加社交锦标赛的平均次数是多少？


    由于我们很可能多次使用这个大型连接，创建一个视图会很方便。视图是一个指令，说明如何创建一个临时表，该表可以在其他查询中使用。以下是尝试创建保留所有连接字段的视图的
    SQL：


    ```

    --第一次尝试（未成功）

    CREATE VIEW AllTournamentInfo AS

    SELECT * FROM

    (Entry e INNER JOIN Tournament t ON t.TourID=e.TourID)

    INNER JOIN Member m ON m.MemberID = e.MemberID;

    ```


    按目前这样，这个查询在大多数 SQL 版本中无法运行。这是因为视图中会有同名的字段；例如，会有两个名为`MemberID`的字段：一个来自`Entry`表，一个来自`Member`表。


    创建视图时，所有字段名必须唯一。视图不会使用别名来区分结果表中的列。`SELECT`子句中的`*`需要修改为列出所有字段名。我们需要要么只包含重名字段中的一个（`MemberID`和`TourID`），要么重命名那些重复的字段（例如，`SELECT
    m.MemberID AS MMember`，`e.MemberID AS EMember`）。这有点繁琐，但如果你创建的视图可能会多次使用，那么付出这番努力是值得的。


    一旦我们有了视图`AllTournamentInfo`，就可以像使用其他任何表一样在查询中使用它。要找出参加过 Leeston 锦标赛的男性姓名，我们可以像这样使用该视图：


    ```

    SELECT DISTINCT LastName, FirstName

    FROM AllTournamentInfo

    WHERE Gender = ''M'' AND TourName = ''Leeston'';

    ```


    ## 识别问题中的关键词


    宏观方法假设我们已经决定了如何组合将对查询有贡献的表。有时，很明显某些表需要被连接。其他时候，可能一开始完全不清楚。在本节中，我们将看一些经常出现在问题中的关键词，这些词可以提供关于需要哪些关系操作的线索。如果这些都没有帮助，请记住我们还有接下来的“不知从何入手？”部分！'
- fmt: '# SQL查询条件分析


    ## And, Both, Also


    `And` 和 `also` 这两个词在解读查询时可能具有误导性，我们将在下一章进一步探讨这一点。在本节中，我们将研究那些需要同时满足两个条件的查询。需要满足两个条件的查询分为两类：一类可以通过包含布尔
    `AND` 运算符的简单 `WHERE` 子句执行，另一类则需要使用交集（`INTERSECT`）或自连接（`self join`）。


    为了判断一个查询是否真的需要满足两个条件，我通常会查看一个自然语言语句，看看是否可以用单词 `both` 来连接这些条件。考虑以下示例：


    *   查找年轻的男孩。（既是男性又是年轻人？是的。）

    *   查找参加了第24和38号锦标赛的成员。（同时参加了两场锦标赛？是的。）

    *   查找妇女和儿童。（既是女性又是儿童？不是。）


    最后一个查询有时会让人困惑。虽然它包含了单词 `and`，但“妇女和儿童”的通常含义并非指既是女性又是儿童的人（那是女孩）。相反，这个短语的意思是任何是女性
    **或** 是儿童的人（尤其是在救生艇场景下）。


    图[11-8](#A158240_2_En_11_Chapter.html#Fig8)中的图表是可视化自然语言单词 `both` 的真正含义是“两者都”还是“其一”的有效方式。圆圈代表两个集合：女性和儿童。图[11-8a](#A158240_2_En_11_Chapter.html#Fig8)显示了并集（`UNION`，只需满足一个条件），图[11-8b](#A158240_2_En_11_Chapter.html#Fig8)显示了交集（`INTERSECT`，必须满足两个条件）。


    ![A158240_2_En_11_Fig8_HTML.gif](A158240_2_En_11_Fig8_HTML.gif)

    图 11-8. 可视化需要的是并集还是交集


    当需要满足两个条件时，我们是在处理两个数据组的交集，如图[11-8b](#A158240_2_En_11_Chapter.html#Fig8)所示。这并不一定意味着我们必须使用
    `INTERSECT` 关键字。我发现以下问题有助于决定下一步该怎么做：


    > 我是否需要查看多行数据来判断是否满足了两个条件？


    考虑查找年轻男孩的查询。这将需要使用 `Member` 表。我们能否查看单行数据并确定该成员既是年轻人又是男孩？我们可以在图[11-9](#A158240_2_En_11_Chapter.html#Fig9)中看到，这两条信息都可以在单行中获得。


    ![A158240_2_En_11_Fig9_HTML.jpg](A158240_2_En_11_Fig9_HTML.jpg)

    图 11-9. 关于会员类型和性别的信息可在单行中获得


    在这种情况下，我们可以使用一个简单的 `SELECT` 操作，配合布尔 `AND` 来检查两个条件，如第[2](#A158240_2_En_2_Chapter.html)章所述：


    ```

    SELECT * FROM Member m

    WHERE m.Gender = ''M'' AND m.MemberType = ''Junior'';

    ```


    现在考虑一个不同类型的查询。如何查找同时参加了第24和36号锦标赛的成员？为此，我们需要查看 `Entry` 表（如果我们想要姓名，可能还需要与 `Member`
    表连接）。正如我们在图[11-10](#A158240_2_En_11_Chapter.html#Fig10)中所看到的，我们无法通过查看单行数据来检查某个成员（例如，成员228）是否同时参加了两场锦标赛。


    ![A158240_2_En_11_Fig10_HTML.jpg](A158240_2_En_11_Fig10_HTML.jpg)

    图 11-10. 需要调查多行数据来确认两场锦标赛的参与情况


    当我们需要满足两个条件，并且需要查看表中的多行数据时，我们可以使用自连接（第[5](#A158240_2_En_5_Chapter.html)章讨论）或交集（第[7](#A158240_2_En_7_Chapter.html)章讨论）。


    如果使用自连接，查询如下：


    ```

    SELECT DISTINCT e1.MemberID

    FROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID

    WHERE e1.TourID = 24 AND e2.TourID = 36;

    ```


    一个使用 `INTERSECT` 关键字但产生相同输出的查询是：


    ```

    SELECT MemberID FROM Entry WHERE TourID = 24

    INTERSECT

    SELECT MemberID FROM Entry WHERE TourID = 36;

    ```


    ## Not, Never


    以下是一些涉及单词 `not` 或 `never` 的查询示例：


    *   查找不是老年人的成员。

    *   查找不在团队中的成员。

    *   查找从未参加过锦标赛的成员。


    通常当人们在查询描述中看到 `not` 时，他们会立即想到在 `WHERE` 子句中使用布尔 `NOT` 或 `<>` 运算符。这对某些查询是适用的，但对另一些则会失败。与上一节类似，我发现以下测试有助于理解查询的类别。


    > 我是否需要查看多行数据来判断某个条件不成立？


    对于前面要点列表中的前两个查询，我们可以查看 `Member` 表中的一行数据，并判断该成员是否满足条件。在第一个查询中，`WHERE` 子句中的条件可以是
    `NOT MemberType = ''Senior''` 或 `MemberType <> ''Senior''`。要查找不在团队中的成员，我们希望 `Team`
    字段为空，因此类似 `WHERE Team IS NULL` 的子句即可实现。


    要查找从未参加过锦标赛的成员，我们需要哪些表？我们肯定需要 `Entry` 表。我们可以通过找到一行包含他或她的 `MemberID` 值来判断该成员是否参加过锦标赛。要查看他或她
    **没有** 参加过锦标赛，我们需要查看 `Entry` 表中的每一行数据。我们还必须查看 `Member` 表，因为那些从未参加过锦标赛的成员根本不会出现在
    `Entry` 表中。


    在这种情况下，像图[11-11](#A158240_2_En_11_Chapter.html#Fig11)那样从集合的角度思考会很有帮助。


    ![A158240_2_En_11_Fig11_HTML.jpg](A158240_2_En_11_Fig11_HTML.jpg)

    图 11-11. 通过集合运算查找从未参加锦标赛的成员


    在第[7](#A158240_2_En_7_Chapter.html)章中，我们学习了如何使用过程方法和 `EXCEPT` 关键字来表示两个集合之间的差集。以下查询将返回从未参加过锦标赛的成员的ID：


    ```

    SELECT MemberID FROM Member

    EXCEPT

    SELECT MemberID FROM Entry;

    ```


    如果我们从结果方法的角度思考，可以描述返回特定 `MemberID` 的条件。以下查询是使用 `NOT IN` 查找从未参加过锦标赛的成员ID的示例：


    ```

    SELECT m.MemberID FROM Member m

    WHERE m.MemberID NOT IN

    (SELECT e.MemberID FROM Entry e);

    ```


    第[7](#A158240_2_En_7_Chapter.html)章有很多关于如何使用此类嵌套查询的示例。


    ## All, Every


    无论何时你在查询描述中看到单词 `all` 或 `every`，都应该立即想到除法运算符（`division operator`）。以下是一些此类查询的例子：


    *   查找参加了所有公开锦标赛的成员。

    *   是否有人指导过所有的年轻人？


    执行这些类型查询的SQL示例在第[7](#A158240_2_En_7_Chapter.html)章中有详细解释。'
  raw: '### And, Both, Also


    And and also are words that can be misleading when it comes to interpreting queries,
    and we will consider this further in the next chapter. In this section, we will
    look at queries that have the idea of two conditions needing to be met simultaneously.
    Queries that require two conditions to be met fall into two categories: those
    that can be carried out with a simple `WHERE` clause containing a Boolean `AND`
    operator , and those that require an intersection or self join.


    To decide if a query really needs two conditions to be met, I usually look at
    a natural language statement and see if I can reword it with the word both connecting
    the conditions. Consider these examples:


    *   Find the junior boys. (Both a male and a junior? Yes.)

    *   Find those members who entered tournaments 24 and 38\. (Both tournaments?
    Yes.)

    *   Find the women and children. (Both a female and a child? No.)


    The last query is the one that can sometimes trip people up. Although it contains
    the word and, the common interpretation of “women and children” doesn’t mean someone
    who is both a female and a child (that is a girl). Rather, the phrase means anyone
    who is either a female or a child (especially when populating lifeboats).


    The diagram in Figure [11-8](#A158240_2_En_11_Chapter.html#Fig8) is a useful way
    to visualize whether the natural language word both really means both or either.
    The circles represent the two sets: woman and children. Figure [11-8a](#A158240_2_En_11_Chapter.html#Fig8)
    shows the union (only one condition must be satisfied) and Figure [11-8b](#A158240_2_En_11_Chapter.html#Fig8)
    the intersection (both conditions must be satisfied).


    ![A158240_2_En_11_Fig8_HTML.gif](A158240_2_En_11_Fig8_HTML.gif)


    Figure 11-8.


    Visualizing whether a union or an intersection is needed


    When two conditions must be met, we are looking at the intersection of two groups
    of data, as in Figure [11-8b](#A158240_2_En_11_Chapter.html#Fig8). This doesn’t
    necessarily mean we must use the `INTERSECT` keyword. I find the following question
    helpful in deciding what to do next:


    > Do I need to look at more than one row to decide if both conditions are satisfied?


    Consider the query to find junior boys. This is going to need the `Member` table.
    Can we look at a single row and determine if the member is both a junior and a
    boy? We can see in Figure [11-9](#A158240_2_En_11_Chapter.html#Fig9) that both
    pieces of information are available in a single row.


    ![A158240_2_En_11_Fig9_HTML.jpg](A158240_2_En_11_Fig9_HTML.jpg)


    Figure 11-9.


    Information about membership type and gender are available in a single row


    In this situation, we can use a simple `SELECT` operation with the Boolean `AND`
    to check for both conditions, as discussed in Chapter [2](#A158240_2_En_2_Chapter.html):


    ```

    SELECT * FROM Member m

    WHERE m.Gender = ''M'' AND m.MemberType = ''Junior'';

    ```


    Now consider a different type of query. What about finding the members who have
    entered both tournaments 24 and 36? To do this, we need to look at the `Entry`
    table (probably joined with the `Member` table if we want the names). As we can
    see in Figure [11-10](#A158240_2_En_11_Chapter.html#Fig10), we cannot check that
    a member, e.g., member 228, has entered both tournaments by looking at a single
    row.


    ![A158240_2_En_11_Fig10_HTML.jpg](A158240_2_En_11_Fig10_HTML.jpg)


    Figure 11-10.


    We need to investigate more than one row to check both tournaments


    Where we need to satisfy both of two conditions and we need to look at more than
    one row in the table, we can either use a self join (discussed in Chapter [5](#A158240_2_En_5_Chapter.html))
    or an intersection (discussed in Chapter [7](#A158240_2_En_7_Chapter.html)).


    If we use the self join then the query is:


    ```

    SELECT DISTINCT e1.MemberID

    FROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID

    WHERE e1.TourID = 24 AND e2.TourID = 36;

    ```


    A query producing the same output but using the `INTERSECT` keyword is:


    ```

    SELECT MemberID FROM Entry WHERE TourID = 24

    INTERSECT

    SELECT MemberID FROM Entry WHERE TourID = 36;

    ```


    ### Not, Never


    Here are some examples of queries involving the words not or never:


    *   Find the members who are not seniors.

    *   Find members who are not in a team.

    *   Find members who have never entered a tournament.


    Often when people see not in a description of a query, they immediately think
    of using a Boolean `NOT` or a `<>` operator in a `WHERE` clause. This is fine
    for some queries, but will fail for others. As in the previous section, I find
    the following test helpful to understand the category of the query.


    > Do I need to look at more than one row to decide if a condition is not true?


    For the first two queries in the preceding bulleted list, we can look at a single
    row in the `Member` table and decide whether that member satisfies the condition.
    In the first query, the condition in the `WHERE` clause would be `NOT MemberType
    = ''Senior''` or `MemberType <> ''Senior''`. To find members who are not in a
    team, we want the `Team` field to be empty, so a clause like `WHERE Team IS NULL`
    would do the trick.


    To find the members who have never entered a tournament, what tables do we need?
    We are certainly going to need the `Entry` table. We can decide if a member has
    entered a tournament by finding just one row with his or her value of `MemberID`.
    To see if he or she has not entered a tournament, we need to look at every row
    in the `Entry` table. We also must look at the `Member` table, because those members
    who have not entered a tournament will not appear in the `Entry` table at all.


    In situations like this, it can be helpful to think in terms of sets as in Figure
    [11-11](#A158240_2_En_11_Chapter.html#Fig11).


    ![A158240_2_En_11_Fig11_HTML.jpg](A158240_2_En_11_Fig11_HTML.jpg)


    Figure 11-11.


    Finding members who have not entered tournaments by considering sets


    In Chapter [7](#A158240_2_En_7_Chapter.html) we looked at how to represent the
    difference between two sets by using the process approach and the keyword `EXCEPT`.
    The following query will return the IDs of members who have not entered a tournament:


    ```

    SELECT MemberID FROM Member

    EXCEPT

    SELECT MemberID FROM Entry;

    ```


    If we think in terms of the outcome approach we can describe the criteria for
    returning a particular `MemberID`. The following query is an example of using
    `NOT IN` to find the IDs of members who have never entered a tournament:


    ```

    SELECT m.MemberID FROM Member m

    WHERE m.MemberID NOT IN

    (SELECT e.MemberID FROM Entry e);

    ```


    Chapter [7](#A158240_2_En_7_Chapter.html) has many examples of how to use nested
    queries such as this one.


    ### All, Every


    Wherever you see the words all or every in a description of a query you should
    immediately think of the division operator . Here are some examples of such queries:


    *   Find members who have entered every open tournament.

    *   Has anyone coached all the juniors?


    Examples of the SQL to carry out these types of query are explained in detail
    in Chapter [7](#A158240_2_En_7_Chapter.html).'
