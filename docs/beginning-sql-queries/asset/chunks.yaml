- fmt: '### Creating a Self Join


    Recall from Chapter [3](#A158240_2_En_3_Chapter.html) the definition of a join
    between two tables: a Cartesian product (every combination of rows from each table)
    followed by selecting a subset of those rows that satisfy some join condition.
    For a self join, we think of two copies of the same table. In Figure [5-4](#A158240_2_En_5_Chapter.html#Fig4),
    we see part of the Cartesian product between two copies of the `Member` table.
    To distinguish the different elements of the product, I’ve given the first copy
    an alias, `m`, and the second a different alias, `c` (you’ll see why in a minute).
    In the small section of the Cartesian product visible in Figure [5-4](#A158240_2_En_5_Chapter.html#Fig4),
    we see the first row (Melissa) from copy `m` paired with each of the rows from
    copy `c`. Some of the headings of the columns are truncated, as it was getting
    rather wide.


    ![A158240_2_En_5_Fig4_HTML.jpg](A158240_2_En_5_Fig4_HTML.jpg)

    Figure 5-4. Cartesian product between two copies of the Member table


    For queries about coaching, the interesting rows from the Cartesian product are
    those where the value of `Coach` from `m` is the same as `MemberID` from `c`.
    In Figure [5-4](#A158240_2_En_5_Chapter.html#Fig4), you can see that the third
    line contains information about Melissa (from the `m` copy of `Member`) and information
    about her coach (from the `c` copy of `Member`). Now the choice of aliases becomes
    clear: `m` for columns about a member; `c` for the columns about that member’s
    coach. Choosing helpful aliases can make understanding self joins much easier.
    The rows we would like to select from the Cartesian product are those satisfying
    `m.Coach = c.MemberID.` This is the join condition required to find information
    about members and their coaches. The SQL for the self join is:


    ```sql

    SELECT *

    FROM Member m INNER JOIN Member c ON m.Coach = c.MemberID;

    ```


    The table resulting from the self join is shown in Figure [5-5](#A158240_2_En_5_Chapter.html#Fig5).


    ![A158240_2_En_5_Fig5_HTML.jpg](A158240_2_En_5_Fig5_HTML.jpg)

    Figure 5-5. Self join on Member table to retrieve information about members and
    their coaches


    Now that we have the results of the self join, we can answer the questions posed
    in the previous section about coaching. The trickiest part of all this was recognizing
    that maintaining information about members and coaches is a self relationship
    and designing the `Member` table appropriately in the first place.


    ### Queries Involving a Self Join


    With the joined table in Figure [5-5](#A158240_2_En_5_Chapter.html#Fig5) as our
    base, we can answer all sorts of questions by simply selecting subsets of rows
    and projecting the appropriate columns. Whenever I need to do queries involving
    self joins, I usually perform the join first, retaining all the rows and columns
    as in Figure [5-5](#A158240_2_En_5_Chapter.html#Fig5). With the joined table (or
    a quick sketch of the columns) in front of me, the way forward is usually relatively
    simple. Let’s see how this works with a few questions.


    #### What Are the Names of the Coaches?


    Looking at Figure [5-5](#A158240_2_En_5_Chapter.html#Fig5), we can see that the
    names of the coaches are in the columns coming from the `c` part of the join.
    We just want a list of the names in the columns `c.LastName` and `c.FirstName`
    so those columns can be included in the `SELECT` clause. We don’t want the names
    repeated, so we use the keyword `DISTINCT`. The following SQL statement will return
    the names of the two coaches, Brenda Nolan and William Cooper.


    ```sql

    SELECT DISTINCT c.FirstName, c.LastName

    FROM Member m INNER JOIN Member c ON m.Coach = c.MemberID;

    ```


    #### Who Is Being Coached by Someone with a Higher Handicap?


    To find out who is being coached by someone with a higher handicap, we need to
    compare the handicap of the member (`m.Handicap`) with the handicap of that member’s
    coach (`c.Handicap`). What is required is a `WHERE` clause after the join clause
    to find where the member’s handicap is less than the coach’s handicap:


    ```sql

    SELECT *

    FROM Member m INNER JOIN Member c ON m.Coach = c.MemberID

    WHERE m.Handicap < c.Handicap;

    ```


    For the data in Figure [5-5](#A158240_2_En_5_Chapter.html#Fig5), this will retrieve
    the data in the last four rows. (You don’t have to be a great golfer to be a good
    coach!) Having done the join and selected the appropriate rows, we can then choose
    which columns we want to appear in the final result and list them in the `SELECT`
    clause.


    #### List the Names of All Members and the Names of Their Coaches


    Listing the names of members and their coaches sounds pretty trivial, but if we
    are not careful, we can get it wrong. A first thought might be to project just
    the four columns containing the names of member and coach from the joined table
    in Figure [5-5](#A158240_2_En_5_Chapter.html#Fig5). However, there are only 10
    rows in the joined table, whereas there are 20 members in the `Member` table.
    The issue here is that not all the members have coaches. We looked at situations
    like this in the section on outer joins in Chapter [3](#A158240_2_En_3_Chapter.html).


    To recap, let’s go back to the Cartesian product of two copies of the `Member`
    table, but look at some rows involving a member with no coach, as shown in Figure
    [5-6](#A158240_2_En_5_Chapter.html#Fig6).


    ![A158240_2_En_5_Fig6_HTML.jpg](A158240_2_En_5_Fig6_HTML.jpg)

    Figure 5-6. Part of the Cartesian product between two copies of the Member table


    The join condition (`m.Coach = c.MemberID`) is never satisfied for a member with
    a null in the `Coach` column, so all those members will be missing from our joined
    table. We just need to be careful to understand what we really want. Do we want
    a list of all the members with coaches (10 rows), or a list of all the members
    along with their coach’s name if they have one (20 rows)? If it’s the latter,
    we need an outer join. We need to see the name of each member (from the `m` copy
    of the `Member` table), along with the name of his coach, if any (from the `c`
    copy). The SQL for this outer join is:


    ```sql

    SELECT m.LastName AS MemberLast, m.FirstName AS MemberFirst,

    c.LastName AS CoachLast, c.FirstName AS CoachFirst

    FROM Member m LEFT OUTER JOIN Member c ON m.Coach = c.MemberID;

    ```


    In the preceding query we have given each output attribute a column alias. A column
    alias temporarily renames a column in order to improve the readability of the
    output. In this case it helps the reader distinguish which name belongs to whom,
    as shown in Figure [5-7](#A158240_2_En_5_Chapter.html#Fig7). Without the aliases,
    the attributes would be labelled as `m.LastName` and `c.LastName` and so on, which
    are not quite so easy to understand. Recall from Chapter [3](#A158240_2_En_3_Chapter.html)
    that for a left outer join, where there is no matching row from the right-hand
    table, those columns will be filled with nulls. Figure [5-7](#A158240_2_En_5_Chapter.html#Fig7)
    shows the output of the left outer join.


    ![A158240_2_En_5_Fig7_HTML.jpg](A158240_2_En_5_Fig7_HTML.jpg)

    Figure 5-7. Left outer join to list all members and coaches'
