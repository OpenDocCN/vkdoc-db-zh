- fmt: '### Combining Select and Project


    Because the result of an algebra operation on a relation always results in another
    relation, we can apply the operations successively. The following expression first
    uses the select operation to find all the tuples for senior members (the inner
    parentheses) and then applies the project operation to return just the names:


    ![$$ {\uppi}_{\mathrm{FirstName},\ \mathrm{LastName}}\ \left(\ {\upsigma}_{\mathrm{MemberType}{=}^{\prime
    }{\mathrm{Senior}}^{\hbox{''}\ }}\left(\mathrm{Member}\right)\ \right) $$](A158240_2_En_14_Chapter_Equc.gif)


    Does the order of the operations make a difference? Consider the following expression
    where the order of the select and project operations is reversed:


    ![$$ {\upsigma}_{\mathrm{MemberType}{=}^{\prime }{\mathrm{Senior}}^{\hbox{''}\
    }}\ \left({\uppi}_{\mathrm{FirstName},\ \mathrm{LastName}}\ \left(\mathrm{Member}\right)\
    \right) $$](A158240_2_En_14_Chapter_Equd.gif)


    The tuples resulting from the initial project operation (inner parentheses) have
    just the two attributes `FirstName` and `LastName`. The `MemberType` attribute
    is no longer in the tuples, so we cannot use it in the select condition. The algebra
    expression is not valid.


    The SQL statement equivalent to our combined select and project operations is:


    ```sql

    SELECT FirstName, LastName FROM Member

    WHERE MemberType = ''Senior'';

    ```


    Because SQL is based on relational calculus rather than algebra, there is no concept
    of operations or order in the preceding statement. It is just a description of
    the tuples to be retrieved.


    For more complex queries it is sometimes helpful to introduce intermediate relations
    so we can break up the query into smaller steps. For example, we might call the
    relation resulting from the select operation `SenMemb`, as in the following:


    ![$$ SenMemb\ \leftarrow {\upsigma}_{\mathrm{MemberType} = \hbox{''}\mathrm{Senior}\hbox{''}}\
    \left(\mathrm{Member}\right) $$](A158240_2_En_14_Chapter_Eque.gif)


    Now we can use the project operation on the newly named relation `SenMemb` to
    return the names:


    ![$$ {\uppi}_{\mathrm{FirstName},\ \mathrm{LastName}}\left(\mathrm{SenMemb}\right)
    $$](A158240_2_En_14_Chapter_Equf.gif)


    In SQL we can use views to break down queries into simpler steps. A view can be
    thought of as instructions for creating a new temporary relation:


    ```sql

    CREATE VIEW SenMemb AS

    SELECT * FROM Member

    WHERE MemberType = ''Senior'';

    ```


    The view can then be used in other queries:


    ```sql

    SELECT LastName, FirstName

    FROM SenMemb;

    ```


    ### Cartesian Product


    The select and project operations are both unary operations, which means they
    act on a single relation. We will now look at binary operations, which act on
    two relations. The result of both unary and binary operations is a single relation.


    A Cartesian product is the most versatile binary operation because it can be applied
    to any two relations. The notation for a Cartesian product between two relations
    `Member` and `Team` is:


    ![$$ Member \times Team $$](A158240_2_En_14_Chapter_Equg.gif)


    Each tuple in a Cartesian product will have a value for each attribute from the
    two contributing relations. The tuples in the resulting relation consist of every
    combination of tuples from the original relations. If one relation has N tuples
    and the other M, then the resulting relations will have N x M tuples. In table
    terms, the Cartesian product takes two tables of any shape and produces a table
    with a column for each column in the original tables and a row for every combination
    of the original rows. Figure [A2-3](#A158240_2_En_14_Chapter.html#Fig3) shows
    abbreviated `Member` and `Team` tables and their Cartesian product.


    ![A158240_2_En_14_Fig3_HTML.jpg](A158240_2_En_14_Fig3_HTML.jpg)


    Figure A2-3.

    The Cartesian product of `Member` and `Team`


    The SQL for a Cartesian product uses the keyword `CROSS JOIN`, as in the following
    statement:


    ```sql

    SELECT * FROM Member CROSS JOIN Team;

    ```


    ### Inner Join


    In relational algebra an inner join is defined as a Cartesian product followed
    by a select operation that compares the values of attributes from the two original
    relations. The attributes being compared must have the same domains.


    Referring to the tables in Figure [A2-3](#A158240_2_En_14_Chapter.html#Fig3),
    we can specify a Cartesian product followed by a select that will return only
    those tuples where the value of `Team` is the same as the value of `TeamName`:


    ![$$ {\upsigma}_{\mathrm{Team}=\mathrm{TeamName}}\ \left(\ \mathrm{Member} \times
    \mathrm{Team}\ \right) $$](A158240_2_En_14_Chapter_Equh.gif)


    We can use the join operation to produce an equivalent expression. The join symbol
    ⋈ is used, and the select, or join, condition is expressed in a subscript as shown
    in the following expression:


    ![$$ \mathrm{Member}\ {\bowtie}_{\mathrm{Team}=\mathrm{TeamName}}\mathrm{Team}
    $$](A158240_2_En_14_Chapter_Equi.gif)


    The preceding expressions are equijoins where the select condition uses equality.
    This is the most common type of join. The more general case is a θ-join (theta-join)
    where the expression can include comparisons such as `>` and `<`. A natural join
    is one where the two relations each have one or more attributes with the same
    name. By default, the join condition will be equality on the values of the attribute
    with the same name, and one of those duplicate attributes will be removed from
    the final result with a project operation.


    When we have expressions involving several operations we often have a choice as
    to the order in which the operations are applied. For example, if we want to retrieve
    the practice night for Mr. Pollard, we can either select `Pollard` from the `Member`
    relation before the join or afterward from the result of the join. These two options
    are shown here:


    ![$$ {\uppi}_{\mathrm{PracticeNight}}\ \left({\upsigma}_{\mathrm{LastName}\ {=}^{\prime
    }{\mathrm{Pollard}}^{\hbox{''}}}\ \left(\mathrm{Member}\ {\bowtie}_{Team= TeamName\
    } Team\right)\ \right) $$](A158240_2_En_14_Chapter_Equj.gif)


    The tuples resulting from the preceding two expressions are the same; however,
    the method for obtaining them is quite different. The first will involve first
    creating a large relation that is the Cartesian product of `Member` and `Team`.
    In the second expression, we reduce the number of tuples in the `Member` relation
    to just those for Pollard and then construct a much smaller Cartesian product.
    Clearly the second expression will be more efficient.


    SQL being based on calculus rather than algebra does not imply any ordering of
    operations. While the SQL statement that follows might suggest that the join is
    carried out first, it is just a statement describing the tuples to be retrieved:


    ```sql

    SELECT *

    FROM Member INNER JOIN TEAM ON Team = TeamName

    WHERE LastName = ''Pollard'';

    ```


    The query optimizer in a database system will determine an effective method for
    carrying out the query.'
