  trans: '

    ### 确保并集兼容性


    当表不具备并集兼容性时，通常可以通过调整 `SELECT` 子句来弥补这种不兼容性。


    对于图 7-5 中的那对表，如果我们只是按如下方式选择列，列的顺序将导致返回的行无法实现并集兼容：


    ```sql

    SELECT * FROM ClubC;

    SELECT * FROM ClubD;

    ```


    然而，我们可以在 `SELECT` 子句中指定列的顺序：


    ```sql

    SELECT MemberID, LastName, FirstName, Handicap, MemberType FROM ClubC;

    SELECT MemberID, LastName, FirstName, Handicap, MemberType FROM ClubD;

    ```


    现在，由这些查询返回的两组行是并集兼容的。


    另一个不兼容性问题发生在原始表设计中将列声明为不同类型时。例如，`ClubC` 表可能将 `Handicap` 字段声明为 `INT` 类型，而 `ClubD`
    表可能（不明智地）将 `Handicap` 值存储在 `CHAR` 字段中。（回想第 2 章，如果我们将值存储在字符或文本字段中，它们将按字母顺序排序，并且我们将无法对其执行平均值等函数。）如前所述，SQL
    的不同实现会以各种方式处理这些不同类型。许多会尝试将数字转换为文本，反之亦然。你可以通过使用类型转换函数来自己控制这些转换（这可能是个好主意）。


    例如，在 SQL Server 中，表达式 `Convert(INT, Handicap)` 会将 `Handicap` 字段中的文本值（如“14”）转换为整数值（14）。（如果
    `Handicap` 字段中的值无法转换为整数，则会发生错误。）如果 `ClubD` 表中的 `Handicap` 字段是 `CHAR` 类型，那么我们可以在
    `SELECT` 子句中使用转换函数。以下查询返回的两组行现在将是并集兼容的：


    ```sql

    SELECT MemberID, LastName, FirstName, Handicap FROM ClubC;

    SELECT MemberID, LastName, FirstName, Convert(INT, Handicap) FROM ClubD;

    ```


    ## Union


    Union 允许我们生成由两个并集兼容的行集中的所有唯一行组成的输出。要在 SQL 中执行 union 操作，我们需要首先使用两个 `SELECT` 子句检索两组行，然后使用
    `UNION` 关键字将两组行合并。以下 SQL 展示了图 7-4 所示的两个并集兼容表（`ClubA` 和 `ClubB`）中所有行的合并。


    ```sql

    SELECT * FROM ClubA

    UNION

    SELECT * FROM ClubB;

    ```


    结果表将包含来自两个表的所有行，且没有重复项，因此你将看到 Barbara Olson、Robert Pollard 和 Thomas Sexton 各只出现一行，如图
    7-6 所示。如果你出于某种原因希望保留重复项，可以使用关键词 `UNION ALL`。


    ![A158240_2_En_7_Fig6_HTML.jpg](img/A158240_2_En_7_Fig6_HTML.jpg)


    图 7-6. ClubA 和 ClubB 的 Union 结果，无重复行


    由于并集兼容的表不需要具有相同的列名，生成的虚拟表中的列名通常来自其中一个表。在图 7-6 的示例中，列名与 union 查询中提到的第一个表相同。


    对于 union 操作符而言，以何种顺序指定两个表并不重要。下面的查询将返回与前一个查询相同的行。行的显示顺序可能不同，列的显示名称也可能改变，但数据将是相同的。


    ```sql

    SELECT * FROM ClubB

    UNION

    SELECT * FROM ClubA;

    ```


    ### 选择合适的列


    使用 union 操作符时，你需要仔细考虑你实际想要什么。关于俱乐部的示例相当刻意（你可能已经注意到了）。两个俱乐部拥有具有相同 ID 号和相同会员类型的成员的可能性非常小。更可能的情况是，如果
    Barbara Olson 确实属于两个俱乐部，她在每个俱乐部表中的数据会有所不同。在 `ClubA` 表中，她可能是一名资深会员，`MemberID` 值为
    258。在 `ClubB` 表中，她可能是一名准会员，`RegNum` 值为 4573。如果我们执行图 7-6 中所示的 union，即从每个表中选择所有列，那么
    Barbara 的两行数据将是不同的，因此两者都会出现在结果中，如图 7-7 所示。


    ![A158240_2_En_7_Fig7_HTML.jpg](img/A158240_2_En_7_Fig7_HTML.jpg)


    图 7-7. 由于行不同，Union 结果中出现两条 Barbara Olson 的记录


    我们需要考虑从这样的 union 中真正想要什么。如果我们需要为两个俱乐部的联合圣诞派对准备一份姓名列表，那么我们不希望每个人都被列出两次。避免重复的方法是在执行
    union 之前，仅从每个表中投影（选择）姓名列：


    ```sql

    SELECT FamilyName, Name FROM ClubA

    UNION

    SELECT LastName, FirstName FROM ClubB;

    ```


    使用此查询，Barbara 的两行数据将变得相同，并且只会在 union 结果中出现一次，如图 7-8 所示。


    ![A158240_2_En_7_Fig8_HTML.jpg](img/A158240_2_En_7_Fig8_HTML.jpg)


    图 7-8. 如果 Union 中只包含姓名列，则 Barbara Olson 只出现一行


    当然，最后这个查询存在一个严重问题。可能有两个 Barbara Olson，一个在每个俱乐部，现在只有一张姓名卡会被打印出来给他们俩。可悲的是，真实数据充满了这类问题。幸运的话，可能存在某个通用的国家高尔夫协会号码可以解决这个问题，但如果不行，你就需要保持警惕。下一节讨论的交集操作将生成同时出现在两个俱乐部名单中的姓名，届时可以进行人工合理性检查。

    '
- fmt: '## Uses of Union


    The main use for `union` is combining data from two or more tables, as we have
    been doing in the previous sections. For example, if the tournament entry data
    for different months had been stored in separate tables (not a great design decision!),
    we could use several `union` operations to combine the data for the whole year.


    It is also possible to combine two sets of rows from the one table. Say we wanted
    to know how many people have entered either tournament 24 or tournament 36 from
    the `Entry` table in Figure [7-9](#A158240_2_En_7_Chapter.html#Fig9).


    ![A158240_2_En_7_Fig9_HTML.jpg](A158240_2_En_7_Fig9_HTML.jpg)

    Figure 7-9. Entry table


    We could try selecting the rows for members entering tournament 24 and the rows
    for members entering tournament 36, and take the union. How many rows will we
    get if we perform the following query?


    ```sql

    SELECT * FROM Entry WHERE TourID = 24

    UNION

    SELECT * FROM Entry WHERE TourID = 36;

    ```


    We will get ten rows from this query, one for every row with a 24 or a 36. Because
    we have retained the `TourID` and `Year` columns, the rows we have selected are
    all different and so will all appear in the result of the union. The query is
    actually returning all the distinct entries into tournaments 24 and 36 rather
    than all the distinct members who have entered the two tournaments. The flowing
    query takes the union of just the IDs for the two tournaments:


    ```sql

    SELECT MemberID FROM Entry WHERE TourID = 24

    UNION

    SELECT MemberID FROM Entry WHERE TourID = 36;

    ```


    Now we will get the five IDs (118, 228, 258, 286, 415) that are the unique IDs
    for those entering one or the other of the tournaments.


    There is a much simpler way of retrieving those who have entered either tournament
    24 or 36. We can simply include an `OR` in the `WHERE` clause:


    ```sql

    SELECT MemberID FROM Tournament

    WHERE TourID = 24 OR TourID = 36;

    ```


    How many rows will the preceding query return? Again, it will return ten rows
    — each of the rows with a 24 or a 36 in the `TourID` column. To get the five unique
    IDs, we need to add the `DISTINCT` keyword in the `SELECT` clause.


    ## Union and Full Outer Joins


    In Chapter [3](#A158240_2_En_3_Chapter.html) we looked at different join operations:
    inner joins, left and right outer joins, and full outer joins. Some products (e.g.,
    Microsoft Access 2013) do not support the `FULL OUTER JOIN` keyword; however,
    we can perform an equivalent query using the `UNION` keyword.


    To recap, let’s review the different types of join we can carry out between the
    `Member` table (just a very little one!) and the `Type` table shown in Figure
    [7-10](#A158240_2_En_7_Chapter.html#Fig10).


    ![A158240_2_En_7_Fig10_HTML.jpg](A158240_2_En_7_Fig10_HTML.jpg)

    Figure 7-10. The (small) Member and Type tables


    Figure [7-11](#A158240_2_En_7_Chapter.html#Fig11) shows the inner join between
    the two tables, with join condition `MemberType = Type`. We do not get a row for
    Helen Branch because she has no value in `MemberType` and so the join condition
    will never be true for her. This may be a problem if someone looking at the table
    in Figure [7-11](#A158240_2_En_7_Chapter.html#Fig11) assumes it is showing all
    members.


    ![A158240_2_En_7_Fig11_HTML.jpg](A158240_2_En_7_Fig11_HTML.jpg)

    Figure 7-11. The inner join between Member and Type on MemberType = Type


    Now we will look at the outer joins. The left outer join ensures that we see all
    the rows from the left-hand table (`Member`); the right outer join gives us all
    rows from the right-hand table (`Type`); and the full outer join gives us all
    rows from both tables. These outer joins, all with join condition `MemberType
    = Type`, are shown in Figure [7-12](#A158240_2_En_7_Chapter.html#Fig12).


    ![A158240_2_En_7_Fig12_HTML.jpg](A158240_2_En_7_Fig12_HTML.jpg)

    Figure 7-12. Three outer joins between Member and Type on MemberType = Type


    Figure [7-12](#A158240_2_En_7_Chapter.html#Fig12) shows that, in this case, the
    full outer join consists of the unique rows from each of the other two outer joins;
    that is, a union. If your SQL implementation does not explicitly support a full
    outer join, you can always achieve the same result with the following query:


    ```sql

    SELECT * FROM Member LEFT JOIN Type ON MemberType = Type

    UNION

    SELECT * FROM Member RIGHT JOIN Type ON MemberType = Type;

    ```


    ## Intersection


    If you take the intersection of two union-compatible tables, you will retrieve
    those rows that are found in both tables. Figure [7-13](#A158240_2_En_7_Chapter.html#Fig13)
    reproduces the two tables, `ClubA` and `ClubB`, from Figure [7-4](#A158240_2_En_7_Chapter.html#Fig4).
    We can see that there are four rows that are identical in both tables.


    ![A158240_2_En_7_Fig13_HTML.jpg](A158240_2_En_7_Fig13_HTML.jpg)

    Figure 7-13. The rows in the intersection between the ClubA and ClubB tables


    The keyword for the intersection operator in SQL is `INTERSECT`. The expression
    to retrieve the four rows common to both tables (i.e., for members Spence, Olson,
    Pollard, and Sexton) is as follows:


    ```sql

    SELECT * FROM ClubA

    INTERSECT

    SELECT * FROM ClubB;

    ```


    As with the union operator, the two sets of rows must be union compatible; that
    is, they must have the same number of columns, and the corresponding columns must
    have the same domains. This may mean projecting the appropriate columns from the
    base tables in the same way as described in the “Selecting the Appropriate Columns”
    section earlier in this chapter. It makes no difference which of the tables we
    mention first in the query, as the rows returned by the intersection will be the
    same regardless of the order of the tables.'
  raw: '### Uses of Union


    The main use for union is combining data from two or more tables, as we have been
    doing in the previous sections. For example, if the tournament entry data for
    different months had been stored in separate tables (not a great design decision!),
    we could use several union operations to combine the data for the whole year.


    It is also possible to combine two sets of rows from the one table. Say we wanted
    to know how many people have entered either tournament 24 or tournament 36 from
    the `Entry` table in Figure [7-9](#A158240_2_En_7_Chapter.html#Fig9).


    ![A158240_2_En_7_Fig9_HTML.jpg](A158240_2_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Entry table


    We could try selecting the rows for members entering tournament 24 and the rows
    for members entering tournament 36, and take the union. How many rows will we
    get if we perform the following query?


    ```

    SELECT * FROM Entry WHERE TourID = 24

    UNION

    SELECT * FROM Entry WHERE TourID = 36;

    ```


    We will get ten rows from this query, one for every row with a 24 or a 36\. Because
    we have retained the `TourID` and `Year` columns, the rows we have selected are
    all different and so will all appear in the result of the union. The query is
    actually returning all the distinct entries into tournaments 24 and 36 rather
    than all the distinct members who have entered the two tournaments. The flowing
    query takes the union of just the IDs for the two tournaments:


    ```

    SELECT MemberID FROM Entry WHERE TourID = 24

    UNION

    SELECT MemberID FROM Entry WHERE TourID = 36;

    ```


    Now we will get the five IDs (118, 228, 258, 286, 415) that are the unique IDs
    for those entering one or the other of the tournaments.


    There is a much simpler way of retrieving those who have entered either tournament
    24 or 36\. We can simply include an `OR` in the `WHERE` clause:


    ```

    SELECT MemberID FROM Tournament

    WHERE TourID = 24 OR TourID = 36;

    ```


    How many rows will the preceding query return? Again, it will return ten rows`—`each
    of the rows with a 24 or a 36 in the `TourID` column. To get the five unique IDs,
    we need to add the `DISTINCT` keyword in the `SELECT` clause.


    ### Union and Full Outer Joins


    In Chapter [3](#A158240_2_En_3_Chapter.html) we looked at different join operations
    : inner joins, left and right outer joins, and full outer joins. Some products
    (e.g., Microsoft Access 2013) do not support the `FULL OUTER JOIN` keyword; however,
    we can perform an equivalent query using the `UNION` keyword.


    To recap, let’s review the different types of join we can carry out between the
    `Member` table (just a very little one!) and the `Type` table shown in Figure
    [7-10](#A158240_2_En_7_Chapter.html#Fig10).


    ![A158240_2_En_7_Fig10_HTML.jpg](A158240_2_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    The (small) Member and Type tables


    Figure [7-11](#A158240_2_En_7_Chapter.html#Fig11) shows the inner join between
    the two tables, with join condition `MemberType = Type`. We do not get a row for
    Helen Branch because she has no value in `MemberType` and so the join condition
    will never be true for her. This may be a problem if someone looking at the table
    in Figure [7-11](#A158240_2_En_7_Chapter.html#Fig11) assumes it is showing all
    members.


    ![A158240_2_En_7_Fig11_HTML.jpg](A158240_2_En_7_Fig11_HTML.jpg)


    Figure 7-11.


    The inner join between Member and Type on MemberType = Type


    Now we will look at the outer joins. The left outer join ensures that we see all
    the rows from the left-hand table (`Member`); the right outer join gives us all
    rows from the right-hand table (`Type`); and the full outer join gives us all
    rows from both tables. These outer joins, all with join condition `MemberType
    = Type,` are shown in Figure [7-12](#A158240_2_En_7_Chapter.html#Fig12).


    ![A158240_2_En_7_Fig12_HTML.jpg](A158240_2_En_7_Fig12_HTML.jpg)


    Figure 7-12.


    Three outer joins between Member and Type on MemberType = Type


    Figure [7-12](#A158240_2_En_7_Chapter.html#Fig12) shows that, in this case, the
    full outer join consists of the unique rows from each of the other two outer joins;
    that is, a union. If your SQL implementation does not explicitly support a full
    outer join, you can always achieve the same result with the following query:


    ```

    SELECT * FROM Member LEFT JOIN Type ON MemberType = Type

    UNION

    SELECT * FROM Member RIGHT JOIN Type ON MemberType = Type;

    ```


    ## Intersection


    If you take the intersection of two union-compatible tables, you will retrieve
    those rows that are found in both tables. Figure [7-13](#A158240_2_En_7_Chapter.html#Fig13)
    reproduces the two tables, `ClubA` and `ClubB`, from Figure [7-4](#A158240_2_En_7_Chapter.html#Fig4).
    We can see that there are four rows that are identical in both tables.


    ![A158240_2_En_7_Fig13_HTML.jpg](A158240_2_En_7_Fig13_HTML.jpg)


    Figure 7-13.


    The rows in the intersection between the ClubA and ClubB tables


    The keyword for the intersection operator in SQL is `INTERSECT`. The expression
    to retrieve the four rows common to both tables (i.e., for members Spence, Olson,
    Pollard, and Sexton) is as follows:


    ```

    SELECT * FROM ClubA

    INTERSECT

    SELECT * FROM ClubB;

    ```


    As with the union operator, the two sets of rows must be union compatible; that
    is, they must have the same number of columns, and the corresponding columns must
    have the same domains. This may mean projecting the appropriate columns from the
    base tables in the same way as described in the “Selecting the Appropriate Columns”
    section earlier in this chapter. It makes no difference which of the tables we
    mention first in the query, as the rows returned by the intersection will be the
    same regardless of the order of the tables.'
  trans: '

    ## 联合的用途


    `union`的主要用途是将来自两个或多个表的数据合并，正如我们在前面章节中所做的那样。例如，如果不同月份的锦标赛报名数据存储在不同的表中（这可不是一个很好的设计决定！），我们可以使用多个`union`操作来合并全年的数据。


    也可以合并来自同一个表的两组行。假设我们想知道图 7-9 中`Entry`表中，有多少人报名参加了 24 号或 36 号锦标赛。


    ![A158240_2_En_7_Fig9_HTML.jpg](img/A158240_2_En_7_Fig9_HTML.jpg)

    图 7-9. 报名表


    我们可以尝试选择报名参加 24 号锦标赛的行和报名参加 36 号锦标赛的行，然后取其联合。如果我们执行以下查询，会得到多少行？


    ```sql

    SELECT * FROM Entry WHERE TourID = 24

    UNION

    SELECT * FROM Entry WHERE TourID = 36;

    ```


    我们将从这个查询中得到十行，每行对应一个报名了 24 号或 36 号锦标赛的记录。因为我们保留了`TourID`和`Year`列，我们选择的所有行都是不同的，因此都会出现在联合的结果中。该查询实际上返回的是所有报名
    24 号和 36 号锦标赛的不同记录，而不是所有报名了这两个锦标赛的不同会员。下面的查询仅对这两个锦标赛的 ID 取联合：


    ```sql

    SELECT MemberID FROM Entry WHERE TourID = 24

    UNION

    SELECT MemberID FROM Entry WHERE TourID = 36;

    ```


    现在我们将得到五个 ID（118, 228, 258, 286, 415），它们是报名了其中任一锦标赛的会员的唯一 ID。


    有一种更简单的方法来检索报名了 24 号或 36 号锦标赛的人。我们可以在`WHERE`子句中直接使用一个`OR`条件：


    ```sql

    SELECT MemberID FROM Tournament

    WHERE TourID = 24 OR TourID = 36;

    ```


    上面的查询将返回多少行？同样，它将返回十行——`TourID`列中值为 24 或 36 的每一行。为了得到五个唯一的 ID，我们需要在`SELECT`子句中添加`DISTINCT`关键字。


    ## 联合与完全外连接


    在第 3 章中，我们研究了不同的连接操作：内连接、左外连接和右外连接，以及完全外连接。有些产品（例如 Microsoft Access 2013）不支持`FULL
    OUTER JOIN`关键字；但是，我们可以使用`UNION`关键字执行一个等效的查询。


    为了回顾一下，让我们复习一下可以在图 7-10 所示的`Member`表（只是一个非常小的表！）和`Type`表之间执行的不同类型的连接。


    ![A158240_2_En_7_Fig10_HTML.jpg](img/A158240_2_En_7_Fig10_HTML.jpg)

    图 7-10. （小）会员表和类型表


    图 7-11 显示了两个表之间的内连接，连接条件是`MemberType = Type`。我们没有得到 Helen Branch 的行，因为她的`MemberType`中没有值，因此连接条件对她来说永远不会为真。如果查看图
    7-11 中表格的人认为它显示了所有会员，这可能是个问题。


    ![A158240_2_En_7_Fig11_HTML.jpg](img/A158240_2_En_7_Fig11_HTML.jpg)

    图 7-11. 在 MemberType = Type 条件下 Member 表和 Type 表的内连接


    现在我们将看看外连接。左外连接确保我们看到左表（`Member`）的所有行；右外连接给我们右表（`Type`）的所有行；而完全外连接则给我们两个表的所有行。图
    7-12 展示了这些外连接，它们的连接条件都是`MemberType = Type`。


    ![A158240_2_En_7_Fig12_HTML.jpg](img/A158240_2_En_7_Fig12_HTML.jpg)

    图 7-12. 在 MemberType = Type 条件下 Member 表和 Type 表的三种外连接


    图 7-12 显示，在这种情况下，完全外连接由另外两个外连接中的唯一行组成；也就是说，是一个联合。如果你的 SQL 实现不明确支持完全外连接，你总是可以通过以下查询获得相同的结果：


    ```sql

    SELECT * FROM Member LEFT JOIN Type ON MemberType = Type

    UNION

    SELECT * FROM Member RIGHT JOIN Type ON MemberType = Type;

    ```


    ## 交集


    如果你对两个联合兼容的表取交集，你将检索出在两个表中都存在的那些行。图 7-13 复制了来自图 7-4 的两个表`ClubA`和`ClubB`。我们可以看到，在两个表中完全相同的行有四行。


    ![A158240_2_En_7_Fig13_HTML.jpg](img/A158240_2_En_7_Fig13_HTML.jpg)

    图 7-13. ClubA 表和 ClubB 表的交集中的行


    SQL 中交集操作符的关键字是`INTERSECT`。检索两个表共有的四行（即会员 Spence, Olson, Pollard 和 Sexton）的表达式如下：


    ```sql

    SELECT * FROM ClubA

    INTERSECT

    SELECT * FROM ClubB;

    ```


    与联合操作符一样，两组行必须是联合兼容的；也就是说，它们必须有相同数量的列，并且对应的列必须具有相同的域。这可能意味着需要像本章前面“选择适当的列”一节所描述的那样，从基表中投影出适当的列。在查询中先提到哪个表无关紧要，因为无论表的顺序如何，交集返回的行都是相同的。

