  trans: '### 结合选择与投影


    由于对关系执行代数运算的结果总是产生另一个关系，因此我们可以连续应用这些运算。下面的表达式首先使用选择操作找出所有高级会员（内层括号内的内容），然后应用投影操作仅返回姓名：


    ![\[\uppi_{FirstName,\ LastName}\ \left(\ \upsigma_{MemberType = ''Senior''}\left(Member\right)\
    \right)\]](A158240_2_En_14_Chapter_Equc.gif)


    操作的顺序是否会产生影响？考虑下面这个将选择和投影操作顺序颠倒的表达式：


    ![\[\upsigma_{MemberType = ''Senior''}\ \left(\uppi_{FirstName,\ LastName}\ \left(Member\right)\
    \right)\]](A158240_2_En_14_Chapter_Equd.gif)


    由初始投影操作（内层括号）产生的元组仅包含 `FirstName` 和 `LastName` 两个属性。`MemberType` 属性已不在元组中，因此我们无法在选择条件中使用它。该代数表达式无效。


    与我们结合的选择和投影操作等价的 SQL 语句是：


    ```sql

    SELECT FirstName, LastName FROM Member

    WHERE MemberType = ''Senior'';

    ```


    由于 SQL 基于关系演算而非代数，在上述语句中没有操作或顺序的概念。它仅仅是对要检索的元组的描述。


    对于更复杂的查询，有时引入中间关系会很有帮助，这样我们可以将查询分解为更小的步骤。例如，我们可以将选择操作产生的关系称为 `SenMemb`，如下所示：


    ![\[SenMemb\ \leftarrow \upsigma_{MemberType = ''Senior''}\ \left(Member\right)\]](A158240_2_En_14_Chapter_Eque.gif)


    现在，我们可以对新命名的关系 `SenMemb` 使用投影操作来返回姓名：


    ![\[\uppi_{FirstName,\ LastName}\left(SenMemb\right)\]](A158240_2_En_14_Chapter_Equf.gif)


    在 SQL 中，我们可以使用视图将查询分解为更简单的步骤。视图可以被视为创建一个新的临时关系的指令：


    ```sql

    CREATE VIEW SenMemb AS

    SELECT * FROM Member

    WHERE MemberType = ''Senior'';

    ```


    然后，该视图可以在其他查询中使用：


    ```sql

    SELECT LastName, FirstName

    FROM SenMemb;

    ```


    ### 笛卡尔积


    选择和投影操作都是一元运算，这意味着它们作用于单个关系。现在我们将查看二元运算，它们作用于两个关系。一元和二元运算的结果都是一个单一的关系。


    笛卡尔积是最通用的二元运算，因为它可以应用于任何两个关系。两个关系 `Member` 和 `Team` 之间进行笛卡尔积的符号表示为：


    ![\[Member \times Team\]](A158240_2_En_14_Chapter_Equg.gif)


    笛卡尔积中的每个元组将包含来自两个参与关系的每个属性的值。结果关系中的元组由原始关系中元组的每一种组合构成。如果一个关系有 N 个元组，另一个有 M 个元组，那么结果关系将有
    N x M 个元组。用表格来说，笛卡尔积接受任意形状的两个表，并生成一个表，其中包含原始表中每一列对应的列，以及原始行每一种组合对应的行。图 A2-3 展示了简化的
    `Member` 和 `Team` 表及其笛卡尔积。


    ![A158240_2_En_14_Fig3_HTML.jpg](img/A158240_2_En_14_Fig3_HTML.jpg)


    图 A2-3.

    `Member` 和 `Team` 的笛卡尔积


    SQL 中实现笛卡尔积使用关键字 `CROSS JOIN`，如下语句所示：


    ```sql

    SELECT * FROM Member CROSS JOIN Team;

    ```


    ### 内连接


    在关系代数中，内连接被定义为：先进行笛卡尔积，然后进行一个选择操作，该操作比较来自两个原始关系的属性值。被比较的属性必须具有相同的域。


    参考图 A2-3 中的表，我们可以指定一个笛卡尔积，后跟一个选择操作，该选择操作将仅返回那些 `Team` 值与 `TeamName` 值相同的元组：


    ![\[\upsigma_{Team = TeamName}\ \left(\ Member \times Team\ \right)\]](A158240_2_En_14_Chapter_Equh.gif)


    我们可以使用连接操作来产生一个等价的表达式。使用连接符号 ⋈，选择条件（或连接条件）在下标中表示，如下所示：


    ![\[Member\ {\bowtie}_{Team = TeamName}Team\]](A158240_2_En_14_Chapter_Equi.gif)


    上面的表达式是等值连接，其中选择条件使用了等号。这是最常见的连接类型。更一般的情况是 θ-连接（西塔连接），其表达式可以包含 `>` 和 `<` 等比较运算。自然连接是指两个关系各自拥有一个或多个同名属性的连接。默认情况下，连接条件将是这些同名属性值的相等性比较，并且其中一个重复属性将通过投影操作从最终结果中移除。


    当表达式涉及多个操作时，我们常常可以选择操作的应用顺序。例如，如果我们想检索 Pollard 先生的练习之夜，我们可以在连接之前从 `Member` 关系中选择
    `Pollard`，也可以在连接之后从连接结果中选择。这两种选择如下所示：


    ![\[\uppi_{PracticeNight}\ \left(\upsigma_{LastName\ = ''Pollard''}\ \left(Member\
    {\bowtie}_{Team= TeamName\ } Team\right)\ \right)\]](A158240_2_En_14_Chapter_Equj.gif)


    上面两个表达式产生的元组是相同的；然而，获取它们的方法却大不相同。第一种方法首先需要创建一个 `Member` 和 `Team` 笛卡尔积的大关系。在第二种表达式中，我们先将
    `Member` 关系中的元组数量减少到只有 Pollard 的元组，然后再构造一个更小的笛卡尔积。显然，第二种表达式效率更高。


    SQL 基于演算而非代数，因此并不隐含任何操作顺序。虽然下面的 SQL 语句可能暗示连接是首先执行的，但它仅仅是一条描述要检索元组的语句：


    ```sql

    SELECT *

    FROM Member INNER JOIN TEAM ON Team = TeamName

    WHERE LastName = ''Pollard'';

    ```


    数据库系统中的查询优化器将确定执行查询的有效方法。'
- fmt: '## Union, Difference, and Intersection


    因为关系被定义为元组的集合，所以可以使用三种二元集合操作——并集（`∪`）、差集（`-`）和交集（`∩`）来检索信息。对于关系代数，还有一个额外的约束：参与这些操作的两个关系必须是**并兼容的**。这意味着这两个关系必须具有相同数量的属性，并且每个关系中的对应属性必须在相同的域上定义。


    例如，考虑具有以下属性的两个关系：


    ```

    Staff:{FamilyName, FirstName, Salary}

    Students:{LastName, Name, Address, Course}

    ```


    集合操作将帮助我们检索所有人的姓名（并集）、既是学生又是教职员工的人的姓名（交集），以及是学生但不是教职员工或反之亦然的人的姓名（差集）。（当然，这里对姓名唯一性做了天真的假设！）


    我们无法比较现有关系中的元组，因为它们具有不同的属性。`Staff` 和 `Student` 不是并兼容的。一个关系有 `Salary`，而另一个有 `Address`
    和 `Course`。然而，姓名是可以比较的，因为它们在每关系中具有相同的域（文本）。我们可以通过对每个原始关系应用投影操作来仅检索姓名，如下所示：


    ![$$ {\uppi}_{\mathrm{FanilyName},\ \mathrm{FirstName}}\ \left(\ \mathrm{Staff}\
    \right) $$](A158240_2_En_14_Chapter_Equl.gif)


    ![$$ {\uppi}_{\mathrm{LastName},\ \mathrm{Name}}\ \left(\ \mathrm{Student}\ \right)
    $$](A158240_2_En_14_Chapter_Equm.gif)


    严格来说，对于并兼容性，属性应该是相同的（相同的名称和域）。然而，在实践中，只需要域相同，属性的顺序决定了比较的内容。我们现在可以对新的并兼容关系应用三种集合操作中的任何一种。例如：


    ![$$ {\uppi}_{\mathrm{FanilyName},\ \mathrm{FirstName}}\ \left(\mathrm{Staff}\
    \right){\displaystyle \cup }{\uppi}_{\mathrm{LastName},\ \mathrm{Name}}\left(\mathrm{Student}\
    \right) $$](A158240_2_En_14_Chapter_Equn.gif)


    SQL表达式是：


    ```

    SELECT FamilyName, FirstName FROM Staff

    UNION

    SELECT LastName, Name FROM Student;

    ```


    我们可以继续对表达式的结果应用操作。如果慢慢来，这是相当直接的。例如，如果我们想找出既是学生又是教职员工的那些人的姓名和薪水，我们可以从初始关系开始，构建一系列关系代数操作。请参见以下步骤：

    1. 投影出姓名以获得并兼容的关系。

    2. 使用交集操作找出那些既是教职员工又是学生的人。

    3. 将结果与 `Staff` 关系连接，以便我们能够访问 `Salary` 属性。

    4. 投影 `Names` 和 `Salary` 属性。


    您可以在以下表达式中看到这些操作中的每一个——只需从内到外阅读括号即可：


    ![$$ {\uppi}_{\mathrm{FanilyName},\ \mathrm{FirstName},\mathrm{Salary}}\ \left(\left({\uppi}_{\mathrm{FanilyName},\
    \mathrm{FirstName}}\ \left(\mathrm{Staff}\ \right){\displaystyle \cap }{\uppi}_{\mathrm{LastName},\
    \mathrm{Name}}\ \left(\mathrm{Student}\ \right)\right)\ {\bowtie}_{FamilyName=
    LastName\ AND\ FirstName= Name} Staf\right) $$](A158240_2_En_14_Chapter_Equo.gif)


    并集、差集和交集并不是独立的。交集可以用两个差集操作来表示。假设 `StaffNames` 和 `StudentNames` 是两个并兼容的关系，我们有：


    ![$$ \mathrm{StaffNames}\ {\displaystyle \cap }\ \mathrm{StudentNames}=\mathrm{StaffNames}
    - \left(\mathrm{StaffNames} - \mathrm{StudentNames}\right) $$](A158240_2_En_14_Chapter_Equp.gif)


    您可以自己画一系列图来确信这一点。


    某些版本的 SQL 语言不实现 `INTERSECT` 关键字，因为如上所示，查询可以使用 `EXCEPT`（SQL 中表示差集的语法）重新表述。以下 SQL
    查询使用 `INTERSECT` 关键字：


    ```

    SELECT * FROM StaffNames

    INTERSECT

    SELECT * FROM StudentNames;

    ```


    一个等效的查询可以使用 `EXCEPT` 关键字来构造：


    ```

    SELECT * FROM StaffNames

    EXCEPT

    (

    SELECT * FROM StaffNames

    EXCEPT

    SELECT * FROM StudentNames

    );

    ```


    ## Division


    除法是我们将考虑的最后一个关系代数操作。理解除法操作最简单的方法是通过一个例子。


    如果我们想知道俱乐部的哪些成员参加了每一场比赛，我们需要两条信息。我们需要关于成员以及他们参加过的比赛的信息，这可以从 `Entry` 表中获得；我们还需要所有比赛的列表，这来自
    `Tournament` 表。


    在图 [A2-4](#A158240_2_En_14_Chapter.html#Fig4) 中，您可以看到除法如何工作。它显示了来自 `Entry` 关系的
    `MemberID` 和 `TourID` 属性，以及来自 `Tournament` 关系的 `TourID` 属性。除法的结果是 `MemberID` 值的集合，这些值在
    `Entry` 关系中对于每一个 `TourID` 值都有一个元组。


    ![A158240_2_En_14_Fig4_HTML.jpg](A158240_2_En_14_Fig4_HTML.jpg)


    **图 A2-4.** 使用除法操作符查找参加了所有比赛的成员


    图 [A2-4](#A158240_2_En_14_Chapter.html#Fig4) 中除法操作的关系代数表达式如下：


    ![$$ {\uppi}_{\mathrm{MemberID},\mathrm{TourID}}(Entry) \div {\uppi}_{\mathrm{TourID}}(Tournament)
    $$](A158240_2_En_14_Chapter_Equq.gif)


    SQL 中没有用于除法操作的关键字。但是，可以用其他代数操作来表达除法。如果一步呈现可能会有点吓人，所以我们会慢慢来。


    首先，找出所有参加过一场比赛的成员，并通过笛卡尔积为每个成员与每一场比赛创建配对。我们将生成的关系称为 `AllPairs`：


    ![$$ \mathrm{AllPairs} = {\uppi}_{\mathrm{MemberID}}(Entry) \times {\uppi}_{\mathrm{TourID}}(Tournament)
    $$](A158240_2_En_14_Chapter_Equr.gif)


    现在，我们将通过使用差集操作，从 `AllPairs` 中移除在 `Entry` 表中存在的配对。如果从结果中投影出 `MemberID`，我们将得到没有与所有比赛关联的成员的
    ID。


    ![$$ \mathrm{Unmatched} = {\uppi}_{\mathrm{MemberID}}\ \left(\ Allpairs - {\uppi}_{\mathrm{MemberID},\mathrm{TourID}}(Entry)\right)
    $$](A158240_2_En_14_Chapter_Equs.gif)


    通过从 `Entry` 关系中的 `MemberID` 里移除这些不匹配的 `MemberID`，我们将得到所需的结果：


    ![$$ \mathrm{ResultDivision} = {\uppi}_{\mathrm{MemberID}}\ (Entry) - \mathrm{Unmatched}\Big)
    $$](A158240_2_En_14_Chapter_Equt.gif)


    我们可以使用 SQL 视图以可管理的方式表达这些相同的步骤。首先，创建一个包含所有成员和比赛配对的视图：


    ```

    CREATE VIEW AllPairs AS

    SELECT M.MemberID, T.TourID FROM

    (SELECT MemberID FROM Entry)M

    CROSS JOIN

    (SELECT TourID FROM Tournament)T;

    ```


    现在创建一个视图来找出不匹配的配对：


    ```

    CREATE VIEW Unmatched AS

    SELECT * FROM AllPairs

    EXCEPT

    SELECT MemberID,TourID

    FROM Entry;

    ```


    现在使用这两个视图来找到除法的结果；即，参加了每一场比赛的成员的 `MemberID`：


    ```

    SELECT MemberID FROM Entry

    EXCEPT

    SELECT MemberID FROM Unmatched;

    ```


    如果您有足够的勇气，可以尝试将所有这些步骤合并为一个 SQL 查询；然而，在本附录后面关于全称量词的部分，我们将探讨一种使用关系演算来表达等效查询的更易于管理的方法。'
  raw: '### Union, Difference, and Intersection


    Because a relation is defined as a set of tuples, the three binary set operations
    union (∪) , difference (−) , and intersection (∩) can be used for retrieving information.
    For relational algebra there is the additional constraint that the two relations
    involved in these operations must be union compatible. This means that the two
    relations must have the same number of attributes, and the corresponding attributes
    in each relation must be defined on the same domains.


    For example, consider two relations with the following attributes:


    ```

    Staff:{FamilyName, FirstName, Salary}

    Students:{LastName, Name, Address, Course}

    ```


    The set operations will help us to retrieve the names of all the people (union),
    the names of those people who are both students and staff members (intersection),
    and those who are students but not staff and vice versa (difference). (This, of
    course, makes naïve assumptions about the uniqueness of names!)


    We cannot compare tuples in the relations as they stand because they have different
    attributes. `Staff` and `Student` are not union compatible. One has a `Salary`
    while the other has an `Address` and a `Course`. However, the names can be compared,
    as they have the same domains (text) in each relation. We can retrieve just the
    names by applying a project operation to each of the original relations as follows:


    ![$$ {\uppi}_{\mathrm{FanilyName},\ \mathrm{FirstName}}\ \left(\ \mathrm{Staff}\
    \right) $$](A158240_2_En_14_Chapter_Equl.gif)


    ![$$ {\uppi}_{\mathrm{LastName},\ \mathrm{Name}}\ \left(\ \mathrm{Student}\ \right)
    $$](A158240_2_En_14_Chapter_Equm.gif)


    Strictly speaking, for union compatibility the attributes should be identical
    (same name and domain). However, in practice just the domains need to be the same,
    and the order of the attributes determines what is compared. We can now apply
    any of the three set operations to the new union-compatible relations. For example:


    ![$$ {\uppi}_{\mathrm{FanilyName},\ \mathrm{FirstName}}\ \left(\mathrm{Staff}\
    \right){\displaystyle \cup }{\uppi}_{\mathrm{LastName},\ \mathrm{Name}}\left(\mathrm{Student}\
    \right) $$](A158240_2_En_14_Chapter_Equn.gif)


    The SQL expression is:


    ```

    SELECT FamilyName, FirstName FROM Staff

    UNION

    SELECT LastName, Name FROM Student;

    ```


    We can continue applying operations to the results of our expressions. If taken
    slowly it is quite straightforward. For example, if we want to find the names
    and salaries of those staff who are also students we can build up a series of
    relational algebra operations starting with the initial relations. See the following:


    Project out the names to get union-compatible relations.   Use the intersection
    operation to find those staff who are also students.   Join the result with the
    `Staff` relation so we have access to the `Salary` attribute.   Project the `Names`
    and `Salary` attributes.


    You can see each of these operations in the following expression`—`just read the
    brackets from the inside to the outside:


    ![$$ {\uppi}_{\mathrm{FanilyName},\ \mathrm{FirstName},\mathrm{Salary}}\ \left(\left({\uppi}_{\mathrm{FanilyName},\
    \mathrm{FirstName}}\ \left(\mathrm{Staff}\ \right){\displaystyle \cap }{\uppi}_{\mathrm{LastName},\
    \mathrm{Name}}\ \left(\mathrm{Student}\ \right)\right)\ {\bowtie}_{FamilyName=
    LastName\ AND\ FirstName= Name} Staf\right) $$](A158240_2_En_14_Chapter_Equo.gif)


    Union, difference, and intersection are not independent. An intersection can be
    expressed in terms of two difference operations. Assuming `StaffNames` and `StudentNames`
    are two union-compatible relations, we have that:


    ![$$ \mathrm{StaffNames}\ {\displaystyle \cap }\ \mathrm{StudentNames}=\mathrm{StaffNames}
    - \left(\mathrm{StaffNames} - \mathrm{StudentNames}\right) $$](A158240_2_En_14_Chapter_Equp.gif)


    Draw yourself a sequence of pictures to convince yourself of this.


    Some versions of the SQL language do not implement the `INTERSECT` keyword because
    the query can be restated, as just seen, using `EXCEPT` (the SQL syntax for difference).
    The following SQL query uses the `INTERSECT` keyword:


    ```

    SELECT * FROM StaffNames

    INTERSECT

    SELECT * FROM StudentNames;

    ```


    An equivalent query can be constructed using the `EXCEPT` keyword:


    ```

    SELECT * FROM StaffNames

    EXCEPT

    (

    SELECT * FROM StaffNames

    EXCEPT

    SELECT * FROM StudentNames

    );

    ```


    ### Division


    Division is the last of the relational algebra operations we will consider. The
    easiest way to understand the division operation is with an example.


    If we want to know which members of our club have entered every tournament, we
    need two pieces of information. We need information about the members and the
    tournaments they have entered, which we can get from the `Entry` table, and we
    also need a list of all the tournaments, which comes from the `Tournament` table.


    In Figure [A2-4](#A158240_2_En_14_Chapter.html#Fig4), you can see how division
    works. It shows the `MemberID` and `TourID` attributes from the `Entry` relation,
    and the `TourID` attribute from the `Tournament` relation. The result of the division
    is the set of `MemberID` values that have a tuple in the `Entry` relation for
    every value `TourID`.


    ![A158240_2_En_14_Fig4_HTML.jpg](A158240_2_En_14_Fig4_HTML.jpg)


    Figure A2-4.


    Using the division operator to find members who have entered all tournaments


    The relational algebra expression for the division operation in Figure [A2-4](#A158240_2_En_14_Chapter.html#Fig4)
    is as follows:


    ![$$ {\uppi}_{\mathrm{MemberID},\mathrm{TourID}}(Entry) \div {\uppi}_{\mathrm{TourID}}(Tournament)
    $$](A158240_2_En_14_Chapter_Equq.gif)


    There is no SQL keyword for the division operator. However, it is possible to
    express division in terms of other algebraic operations. It can be a bit daunting
    if presented in one step, so we will take it slowly.


    First, find all the members who have entered a tournament and, by way of a Cartesian
    product, create tuples for each of those members paired with every tournament.
    We’ll call the resulting relation `AllPairs`:


    ![$$ \mathrm{AllPairs} = {\uppi}_{\mathrm{MemberID}}(Entry) \times {\uppi}_{\mathrm{TourID}}(Tournament)
    $$](A158240_2_En_14_Chapter_Equr.gif)


    Now we will remove from `AllPairs` the pairings that are in the `Entry` table
    by using a difference operation. If we project out the `MemberID` from the result
    we will have the IDs for members who are not associated with every tournament.


    ![$$ \mathrm{Unmatched} = {\uppi}_{\mathrm{MemberID}}\ \left(\ Allpairs - {\uppi}_{\mathrm{MemberID},\mathrm{TourID}}(Entry)\right)
    $$](A158240_2_En_14_Chapter_Equs.gif)


    By removing these unmatched `MemberID`s from the `MemberID`s in the `Entry` relation
    we will arrive at the result we require:


    ![$$ \mathrm{ResultDivision} = {\uppi}_{\mathrm{MemberID}}\ (Entry) - \mathrm{Unmatched}\Big)
    $$](A158240_2_En_14_Chapter_Equt.gif)


    We can use SQL views to express these same steps in a manageable way. First, create
    a view with all the pairs of members and tournaments:


    ```

    CREATE VIEW AllPairs AS

    SELECT M.MemberID, T.TourID FROM

    (SELECT MemberID FROM Entry)M

    CROSS JOIN

    (SELECT TourID FROM Tournament)T;

    ```


    Now create a view to find the unmatched pairs:


    ```

    CREATE VIEW Unmatched AS

    SELECT * FROM AllPairs

    EXCEPT

    SELECT MemberID,TourID

    FROM Entry;

    ```


    Now use these two views to find the result of the division; i.e., the `MemberID`
    of members who have entered every tournament:


    ```

    SELECT MemberID FROM Entry

    EXCEPT

    SELECT MemberID FROM Unmatched;

    ```


    If you are brave you could try to combine all these steps into one SQL query;
    however, we will look at a more manageable way to express the equivalent query
    using relational calculus in the section on the universal quantifier later in
    this Appendix.'
  trans: '

    ## 并集、差集与交集


    由于关系被定义为元组的集合，因此可以使用三种二元集合操作——并集（`∪`）、差集（`-`）和交集（`∩`）——来检索信息。对于关系代数，还有一个额外的约束：参与这些操作的两个关系必须是**并兼容的**。这意味着这两个关系必须具有相同数量的属性，并且每个关系中的对应属性必须在相同的域上定义。


    例如，考虑具有以下属性的两个关系：


    ```

    Staff:{FamilyName, FirstName, Salary}

    Students:{LastName, Name, Address, Course}

    ```


    集合操作将帮助我们检索所有人的姓名（并集）、既是学生又是教职员工的人的姓名（交集），以及是学生但不是教职员工或反之亦然的人的姓名（差集）。（当然，这里对姓名唯一性做了天真的假设！）


    我们无法直接比较现有关系中的元组，因为它们具有不同的属性。`Staff` 和 `Student` 不是并兼容的。一个关系有 `Salary`，而另一个有 `Address`
    和 `Course`。然而，姓名是可以比较的，因为它们在每个关系中具有相同的域（文本）。我们可以通过对每个原始关系应用投影操作来仅检索姓名，如下所示：


    ![\pi_{FamilyName, FirstName}(Staff)](img/A158240_2_En_14_Chapter_Equl.gif)


    ![\pi_{LastName, Name}(Student)](img/A158240_2_En_14_Chapter_Equm.gif)


    严格来说，对于并兼容性，属性应该是相同的（相同的名称和域）。然而，在实践中，只需要域相同，属性的顺序决定了比较的内容。我们现在可以对新的并兼容关系应用三种集合操作中的任何一种。例如：


    ![\pi_{FamilyName, FirstName}(Staff) \cup \pi_{LastName, Name}(Student)](img/A158240_2_En_14_Chapter_Equn.gif)


    对应的 SQL 表达式是：


    ```

    SELECT FamilyName, FirstName FROM Staff

    UNION

    SELECT LastName, Name FROM Student;

    ```


    我们可以继续对表达式的结果应用操作。如果慢慢来，这是相当直接的。例如，如果我们想找出既是学生又是教职员工的那些人的姓名和薪水，我们可以从初始关系开始，构建一系列关系代数操作。请参见以下步骤：

    1.  投影出姓名以获得并兼容的关系。

    2.  使用交集操作找出那些既是教职员工又是学生的人。

    3.  将结果与 `Staff` 关系进行连接，以便我们能够访问 `Salary` 属性。

    4.  投影出 `Names` 和 `Salary` 属性。


    您可以在以下表达式中看到这些操作中的每一个——只需从内到外阅读括号即可：


    ![\pi_{FamilyName, FirstName, Salary}( (\pi_{FamilyName, FirstName}(Staff) \cap
    \pi_{LastName, Name}(Student)) \bowtie_{FamilyName=LastName AND FirstName=Name}
    Staff )](img/A158240_2_En_14_Chapter_Equo.gif)


    并集、差集和交集并不是独立的。交集可以用两个差集操作来表示。假设 `StaffNames` 和 `StudentNames` 是两个并兼容的关系，我们有：


    ![StaffNames \cap StudentNames = StaffNames - (StaffNames - StudentNames)](img/A158240_2_En_14_Chapter_Equp.gif)


    您可以自己画一系列图来确信这一点。


    某些版本的 SQL 语言不实现 `INTERSECT` 关键字，因为如上所示，查询可以使用 `EXCEPT`（SQL 中表示差集的语法）重新表述。以下 SQL
    查询使用 `INTERSECT` 关键字：


    ```

    SELECT * FROM StaffNames

    INTERSECT

    SELECT * FROM StudentNames;

    ```


    一个等效的查询可以使用 `EXCEPT` 关键字来构造：


    ```

    SELECT * FROM StaffNames

    EXCEPT

    (

    SELECT * FROM StaffNames

    EXCEPT

    SELECT * FROM StudentNames

    );

    ```


    ## 除法


    除法是我们将要考虑的最后一个关系代数操作。理解除法操作最简单的方法是通过一个例子。


    如果我们想知道俱乐部的哪些成员参加了每一场比赛，我们需要两条信息。我们需要关于成员以及他们参加过的比赛的信息，这可以从 `Entry` 表中获得；我们还需要所有比赛的列表，这来自
    `Tournament` 表。


    在图 A2-4 中，您可以看到除法如何工作。它显示了来自 `Entry` 关系的 `MemberID` 和 `TourID` 属性，以及来自 `Tournament`
    关系的 `TourID` 属性。除法的结果是 `MemberID` 值的集合，这些值在 `Entry` 关系中对于每一个 `TourID` 值都有一个元组。


    ![A158240_2_En_14_Fig4_HTML.jpg](img/A158240_2_En_14_Fig4_HTML.jpg)


    **图 A2-4.** 使用除法操作符查找参加了所有比赛的成员


    图 A2-4 中除法操作的关系代数表达式如下：


    ![\pi_{MemberID, TourID}(Entry) \div \pi_{TourID}(Tournament)](img/A158240_2_En_14_Chapter_Equq.gif)


    SQL 中没有用于除法操作的关键字。但是，可以用其他代数操作来表达除法。如果一步呈现可能会有点吓人，所以我们会慢慢来。


    首先，找出所有参加过至少一场比赛的成员，并通过笛卡尔积为每个成员与每一场比赛创建配对。我们将生成的关系称为 `AllPairs`：


    ![\mathrm{AllPairs} = \pi_{MemberID}(Entry) \times \pi_{TourID}(Tournament)](img/A158240_2_En_14_Chapter_Equr.gif)


    现在，我们将通过使用差集操作，从 `AllPairs` 中移除那些在 `Entry` 表中存在的配对。如果从结果中投影出 `MemberID`，我们将得到没有与所有比赛关联的成员的
    ID。


    ![\mathrm{Unmatched} = \pi_{MemberID}( \mathrm{AllPairs} - \pi_{MemberID, TourID}(Entry)
    )](img/A158240_2_En_14_Chapter_Equs.gif)


    通过从 `Entry` 关系中的 `MemberID` 里移除这些不匹配的 `MemberID`，我们将得到所需的结果：


    ![\mathrm{ResultDivision} = \pi_{MemberID}(Entry) - \mathrm{Unmatched}](img/A158240_2_En_14_Chapter_Equt.gif)


    我们可以使用 SQL 视图以可管理的方式表达这些相同的步骤。首先，创建一个包含所有成员和比赛配对的视图：


    ```

    CREATE VIEW AllPairs AS

    SELECT M.MemberID, T.TourID FROM

    (SELECT MemberID FROM Entry)M

    CROSS JOIN

    (SELECT TourID FROM Tournament)T;

    ```


    现在创建一个视图来找出不匹配的配对：


    ```

    CREATE VIEW Unmatched AS

    SELECT * FROM AllPairs

    EXCEPT

    SELECT MemberID, TourID

    FROM Entry;

    ```


    现在使用这两个视图来找到除法的结果；即，参加了每一场比赛的成员的 `MemberID`：


    ```

    SELECT MemberID FROM Entry

    EXCEPT

    SELECT MemberID FROM Unmatched;

    ```


    如果您有足够的勇气，可以尝试将所有这些步骤合并为一个 SQL 查询；然而，在本附录后面关于全称量词的部分，我们将探讨一种使用关系演算来表达等效查询的更易于管理的方法。

