- fmt: '### Check Underlying Queries in Aggregates


    If you have a problem with a query involving an aggregate (for example, `SELECT
    AVG(Handicap) FROM ... WHERE ...`) check that you have retrieved the correct rows
    before the aggregate function is applied. Change the query to `SELECT * FROM ...
    WHERE ...`, and confirm that this returns the rows for which you want to find
    the average. In fact, I recommend always doing this with an aggregate, because
    it is difficult to otherwise check if the numbers being returned are correct.


    ## Common Symptoms


    Having tried some of the steps in the previous chapter, you will have simplified
    your query to isolate where the problem is. In this section, we will look at some
    specific symptoms and some likely causes.


    ### No Rows Are Returned


    It is usually easy to spot a problem with your query when no rows are returned
    and you know that some should be. Questions that involve “and” or “both” can often
    have this problem. For example, consider a question such as “Which members have
    entered tournaments 24 and 36?” A common first attempt (and I still catch myself
    doing this sometimes) is a query statement such as:


    ```sql

    SELECT * FROM Entry

    WHERE TourID = 24 AND TourID = 36;

    ```


    The preceding query asks for a row from the `Entry` table where `TourID` simultaneously
    has two different values. This never happens, and so no rows are retrieved. The
    cure is to use a self join (covered in Chapter 5) or an intersection operation
    (covered in Chapter 7).


    Getting no rows returned from a query may also be an extreme example of one of
    the problems in the next section.


    ### Rows Are Missing


    It can be difficult to spot if some rows are being missed by your query, especially
    when the set of retrieved rows is large. If you get 1,000 rows returned, you might
    not notice that one is missing. Careful testing is required, and some ideas for
    how to do this were discussed in Chapter 10. It is often worthwhile to run through
    the following list of common errors to see if any might apply.


    #### Should You Have an Outer Join?


    Using an inner join when an outer join is required is a very common problem. Suppose
    that we are trying to get a list of member information that includes names and
    fees. For this, we need the `Member` table (for the names) and the `Type` table
    (for the fees). A first attempt at a query might be as follows:


    ```sql

    SELECT m.LastName, m.FirstName, t.Fee

    FROM Member m, Type t

    WHERE m.MemberType = t.Type;

    ```


    We know there are, say, 135 members, but we are getting only 133 rows from the
    query. The issue here is that we are performing an inner join (see Chapter 3),
    so any members with a null value for member type will not appear in the result.
    Of course, this may be the result you want (those members who have a type and
    fee), but it is not the correct output if you want a list of all members and the
    fees for those who have them.


    An outer join (also discussed in Chapter 3) that includes all the rows of the
    `Member` table will solve this problem. Whenever you have a join, it is worth
    thinking about the join fields and considering what you want to happen where a
    row has a null value in that field.


    #### Have Selection Conditions Dealt with Nulls Appropriately?


    Nulls can cause quite a few headaches if you forget to consider their effect on
    your queries. The previous section looked at nulls in a joining field. You also
    need to remember to check for comparisons involving fields that may contain nulls.
    We looked at this in Chapter 2 and also earlier in this chapter.


    Consider two queries on the `Member` table with selection conditions `Gender =
    ''M''` and `Gender <> ''M''`. It is reasonable to think that all rows in the `Member`
    table should be returned by one of these queries. However, rows with a null in
    the `Gender` field will return `false` for both these conditions (any comparison
    with a null returns `false`), and the row will not appear in either result.


    Say we want to get a list of members of our club who are not particularly good
    players (to offer them coaching, perhaps). Someone may suggest a query like the
    following to find members who do not have a low handicap:


    ```sql

    SELECT *

    FROM Member m

    WHERE m.Handicap > 10;

    ```


    The problem is that the preceding query will miss all the members with no handicap.
    Altering the `WHERE` condition to `m.Handicap > 10 OR m.Handicap IS Null` will
    help in this situation.


    #### Are You Looking for a Match with a Text Value?


    It is very disturbing to be trying to find rows for Jim, to be able to see Jim
    in the table, and to have your query return nothing. This may be caused by one
    of the problems we looked at in the “Problems with Data Values” section earlier
    in this chapter.


    One quick way to eliminate the possibility of dodgy text values is to use `LIKE`
    for comparisons. For example, where you have `= ''Jim''`, replace it with `LIKE
    ''%Jim%''`. If the query then finds the row you were expecting (possibly along
    with some others), you know the problem is with the data. As noted earlier, putting
    the wildcard `%` (or `*` in Access) at the beginning and end of the string will
    find leading or trailing spaces and other nonprintable characters.


    #### Have You Used AND Instead of OR?


    We discussed the problem of queries involving the words and or or in the previous
    chapter (in the “Spotting Key Words in Questions” section). I’ll recap briefly.
    The word and can be used in natural English to describe both a union and an intersection.
    When we say “women and children,” we usually mean the union of the set of females
    and the set of young people. When we say “cars that are small and red,” we mean
    the intersection of the set of small cars and the set of red cars.


    If we are looking for “women and children” and use the selection condition `Gender
    = ''F'' AND age < 12`, we are actually retrieving the intersection of women and
    children (or girls). We need the condition to be `Gender = ''F'' OR age < 12`.


    It is very easy to unwittingly translate the and in the English question to an
    `AND` in the query inappropriately, which can result in missing rows. If in doubt,
    try drawing the Venn diagrams described in the previous chapter.


    #### Do You Have Correct Columns in Set Operations?


    If your query involves intersection or difference operations, the result may have
    fewer rows than expected because you have projected the wrong columns initially.
    We looked at this in Chapter 7. Here is a brief example for intersection; the
    same issue applies to difference operations as well.


    We want to find out who has entered both tournaments 25 and 36\. We realize that
    we need an intersection and try the following query:


    ```sql

    SELECT * FROM Entry

    WHERE TourID = 25

    INTERSECT

    SELECT * FROM Entry

    WHERE TourID = 36;

    ```


    No rows will be returned from this query, regardless of the underlying data. The
    intersection finds rows that are exactly the same in each set. However, all the
    rows in the first set will have 25 as the value for `TourID` 25, and all the rows
    in the second set will have the value 36\. There can never be a row that is in
    both sets. What we are looking for is the member IDs that are in both sets, so
    the `SELECT` clauses in each part of the query should be `SELECT MemberID FROM
    Entry`.


    The preceding query is an extreme example of retaining the wrong columns, resulting
    in no rows being returned. The discussion around Figure 7-14 in Chapter 7 shows
    how retaining different columns in intersection and difference queries can result
    in very different results. You need to ensure that you are retaining the columns
    that are appropriate for the question being asked.'
  raw: '### Check Underlying Queries in Aggregates


    If you have a problem with a query involving an aggregate (for example, `SELECT
    AVG(Handicap) FROM ... WHERE ...`) check that you have retrieved the correct rows
    before the aggregate function is applied. Change the query to `SELECT * FROM ...
    WHERE ...`, and confirm that this returns the rows for which you want to find
    the average. In fact, I recommend always doing this with an aggregate, because
    it is difficult to otherwise check if the numbers being returned are correct.


    ## Common Symptoms


    Having tried some of the steps in the previous chapter, you will have simplified
    your query to isolate where the problem is. In this section, we will look at some
    specific symptoms and some likely causes.


    ### No Rows Are Returned


    It is usually easy to spot a problem with your query when no rows are returned
    and you know that some should be. Questions that involve “and” or “both” can often
    have this problem. For example, consider a question such as “Which members have
    entered tournaments 24 and 36?” A common first attempt (and I still catch myself
    doing this sometimes) is a query statement such as:


    ```

    SELECT * FROM Entry

    WHERE TourID = 24 AND TourID = 36;

    ```


    The preceding query asks for a row from the `Entry` table where `TourID` simultaneously
    has two different values. This never happens, and so no rows are retrieved. The
    cure is to use a self join (covered in Chapter [5](#A158240_2_En_5_Chapter.html))
    or an intersection operation (covered in Chapter [7](#A158240_2_En_7_Chapter.html)).


    Getting no rows returned from a query may also be an extreme example of one of
    the problems in the next section.


    ### Rows Are Missing


    It can be difficult to spot if some rows are being missed by your query, especially
    when the set of retrieved rows is large. If you get 1,000 rows returned, you might
    not notice that one is missing. Careful testing is required, and some ideas for
    how to do this were discussed in Chapter [10](#A158240_2_En_10_Chapter.html).
