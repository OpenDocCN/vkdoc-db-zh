    that contains all the men, another that contains all the golfers, another that
    contains people over 40, and another that contains Italians. These sets can all
    overlap, as shown in the diagram in Figure [A2-1](#A158240_2_En_14_Chapter.html#Fig1).
    This type of diagram is called a Venn diagram .


    ![A158240_2_En_14_Fig1_HTML.jpg](A158240_2_En_14_Fig1_HTML.jpg)


    Figure A2-1.


    Venn diagram showing subsets of people


    Figure [A2-1](#A158240_2_En_14_Chapter.html#Fig1) helps us visualize the sets
    that satisfy criteria such as Italian men over 40 who play golf (the area where
    all the circles overlap) or people who don’t play golf (everywhere in the large
    rectangle except the Golfers circle). These two areas are easy to describe; however,
    it is not always simple to define the subset we require. The area containing Italian
    golfers who are 40 or under takes a bit more effort to find, and it is difficult
    to describe without the diagram to help.


    A database is only useful if you can accurately extract the appropriate subset
    of data when you need it. As the criteria become more complex and the number of
    tables increases, it can become difficult to keep everything in your head and
    correctly describe what you are trying to find. It is in these more complex situations
    that having a more formal and succinct notation can be very helpful.


    ### Relations, Tuples, and Attributes


    It is common to think of a database as a number of tables. A table (e.g., `Person`)
    will have a several columns. Each row in the table represents an individual person
    with the appropriate values for that person appearing in each column. More formally,
    a database is referred to as a set of relations, and each relation is a set of
    tuples. A tuple is a set of attribute values; for example, {Ali, Brown, 2/8/1967}.


    A relation consists of a heading and a body. The heading is a description of the
    data that is contained in the relation. Part of that description is a set of attribute
    names; for example, {`FirstName`, `LastName`, `Date_of_Birth`}. In addition, each
    attribute has a domain, or set of allowed values. For example, `Date_of_Birth`
    must be a valid date. A domain can be a primitive type (e.g., integer, string)
    or a user-defined type (e.g., `WeekDays` = {Mon, Tue, Wed, Thu, Fri, Sat, Sun}).
    A database schema is the set of headings for all the relations plus any constraints
    that have been defined.


    The body of the relation contains the data values. It consists of tuples containing
    values for each of the attributes.


    Table [A2-1](#A158240_2_En_14_Chapter.html#Tab1) shows analogous terms for the
    two ways of describing a database.


    Table A2-1.


    Comparative Terms


    | Relational Term | Database Term |

    | --- | --- |

    | Database (set of relations) | Database |

    | Relation (set of tuples) | Table |

    | Tuple (set of attribute values) | Row |

    | Attribute name | Column Name |

    | Domain | Column datatype (primitive or user defined) |


    The main differences between an (unkeyed) table and a relation or set of tuples
    are that there is no order to the tuples and each tuple must be unique.


    Figure [A2-2](#A158240_2_En_14_Chapter.html#Fig2) shows how we can visualize a
    relation as a set of tuples.


    ![A158240_2_En_14_Fig2_HTML.jpg](A158240_2_En_14_Fig2_HTML.jpg)


    Figure A2-2.


    A relation is a set of tuples.


    The traditional way of representing a set in a Venn diagram, as in Figure [A2-1](#A158240_2_En_14_Chapter.html#Fig1),
    reinforces the concept that there is no order to elements in a set. There is no
    first or next or previous element. The usual format for a table can imply that
    the rows have some sort of intrinsic order. When you query a database then, theoretically,
    the tuples returned have no guaranteed order unless you specify an order as part
    of the query. In practice, a simple query is likely to return rows in the same
    order each time it is repeated because under the hood the same operations will
    be carried out. However, with large tables, as the number of tuples changes the
    number and order of the operations may change to improve efficiency, or data that
    has been previously cached may be accessed first. These may affect the order in
    which tuples are returned.


    As discussed in Chapter [1](#A158240_2_En_1_Chapter.html), having unique tuples
    in a relation is essential if we are going to be able to identify our data correctly.
    If, in the relation in Figure [A2-2](#A158240_2_En_14_Chapter.html#Fig2), we found
    we had another person called John Smith born on 2/6/1988 we would be in trouble,
    because we would not be able to distinguish the tuples for the two people. We
    need enough information stored about people so that they can be differentiated.
    The concept of a primary key (a set of attributes that must be unique for every
    tuple) ensures uniqueness.


    Once we think of our data as sets of tuples then all the power of set operations
    is at our disposal.'
