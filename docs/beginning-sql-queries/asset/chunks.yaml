  trans: '# 10. 效率考量


    你可能不需要阅读本章！数据库管理系统（DBMS）非常高效，如果你的数据量适中，大多数查询可能转瞬之间就能完成。为了让查询稍微快一点而把生活复杂化，这并不太有意义。然而，如果你拥有（或可能拥有）海量数据且速度绝对关键，那么你将需要比从一本入门书的一章中所能获得的更多技能和经验。话虽如此，你很可能会听别人说如何表达查询很重要，或者你应该为表建立索引，因此对幕后发生的事情以及理解一些术语有个大致概念会很有帮助。


    在本书中，我一直强调，在 SQL 中表达查询往往有多种替代方式。你所使用的 SQL 实现可能不支持某些结构，因此你的选择可能受限。即便如此，对于大多数查询，你通常仍有替代方案。使用哪一种方式有关系吗？其中一个考虑因素是查询的可移植性。如果你不确定查询将在何处使用，你可能会选择避免使用尚未被广泛支持的关键字和操作。然而，通常你会为特定
    SQL 实现的数据库编写查询。在这种情况下，你的主要问题是：“查询的不同结构会如何影响性能？”以及“我能做些什么来提高性能？”


    ## 查询的处理过程


    到目前为止，我们一直专注于将需要回答的问题转化为查询，以便从数据库返回恰当且准确的信息。从概念上讲，查询编写者将数据库视为表的集合。SQL 语句是一种表达式，描述了应从这些表中检索哪些数据以及这些数据必须遵守哪些约束（结果
    approach）。


    我们也已经看到，可以通过描述集合操作（如连接和交集）来指定查询，这将导致返回相应的数据（过程 approach）。使用集合操作使得形成查询非常优雅，但这些操作纯粹是概念性的。虽然我们可能用，比如说，一个连接后跟一个交集来指定查询，但这将被
    DBMS 解释为对要返回数据的描述，而不是检索数据的方法。


    表和数据模型的概念是我们理解数据片段之间逻辑关系的有用方式。我们将数据的物理存储和检索交给 DBMS 来处理。图 10-1 是一个简化的示意图，展示了不同的抽象层次，有助于我们理解数据库。


    ![A158240_2_En_10_Fig1_HTML.jpg](img/A158240_2_En_10_Fig1_HTML.jpg)


    图 10-1.

    数据库管理系统的层次


    在图 10-1 的顶部是用户层。这里我们有各种应用程序和设备，构成了人与数据之间的接口。正是在这里，用户（或应用程序）会构建 SQL 语句（图的左上角）。


    中间层是数据库的概念视图。我们可以将数据视为存储在具有各种键和验证约束的表中。在这里，我们还可以建立模型，说明数据库应如何处理并发用户以及允许访问不同数据的规则。我们构建的
    SQL 语句都是基于所有这些概念的。


    实际数据存储在物理层，如图 10-1 底部所示。我们视为一个表的东西，可能是存储在可能位于不同国家、不同服务器上的数据片段。在这一层，会有索引允许快速访问不同的记录；我们将在本章后面的章节中讨论这些。


    如何定位和组装相关信息以产生查询结果，这是 `查询优化器` 的工作。用户构建的 SQL 语句被传递给优化器，优化器可以访问关于（概念）表中的行数、每行中的数据量、已创建索引的属性等信息。它利用所有这些信息来创建一个
    `执行计划`。执行计划是一系列高效的步骤，用于查找、比较数据，并将其组装成查询指定的结果。数据根据执行计划从物理存储中检索并组装，然后将结果返回给用户——通常以表的形式。


    大多数商业数据库软件提供工具来显示建议的执行计划以及估计的每个步骤执行时间。这提供了对查询如何执行以及时间花费在何处的洞察。一个好的数据库管理员将能够利用此类信息来调整数据库；例如，通过添加新的索引。


    在接下来的章节中，我们将简要了解一下记录是如何存储的，索引如何提高效率，以及查询执行时幕后发生的一些事情。


    ## 查找记录


    大多数数据库查询在某些时候都会涉及查找满足特定条件的记录。例如，我们可能想要在单个表中查找记录（例如，`WHERE LastName = ''Smith''`），从两个表中查找满足连接条件的记录（例如，`WHERE
    m.MemberID = e.MemberID`），或者查找值的存在与否（例如，`WHERE NOT EXISTS...`）。


    在一切都以电子方式存储的今天，搜索和查找数据似乎相当容易。如果我们想在在线书籍中查找某个主题，只需打开搜索框并键入一些关键字。但对于实体书来说，情况就大不相同了。我们要么必须逐页扫描，要么希望有一个有用的索引或目录。那些还记得实体电话簿的人会记得，找到
    Jim Smith 很容易，但要找出谁住在 Murray Place 16 号却是不可能的。


    在数据库幕后，问题与实体书籍相同。数据只能按一种顺序存储，但我们可能希望以多种方式搜索它。了解实际发生的情况很有用，这样我们才能理解影响定位特定记录性能的因素。


    查找满足条件的记录的一种方法是简单地顺序扫描表中的每一行。这是找到你想要的东西最慢、成本最高的方式。话虽如此，这可能不是问题。扫描高尔夫俱乐部的 `Type`
    表以查找高级会员的会费不会花太长时间。另一方面，扫描（一个现实的）`Entry` 表中的每一行以查找过去四十年中参加了 38 号锦标赛的成员，将是一项更大的工作。'
- fmt: '## Storing Records in Order


    If we consider relational theory, then the rows in a table[²](#A158240_2_En_10_Chapter.html#Fn2)
    have no order. This allows us to consider a table as a set and apply all the set
    operations. This is useful from a conceptual point of view, but in practice how
    the records are stored is going to make a difference in how quickly we can find
    what we are looking for.


    If the records of a table are stored in a random order (perhaps the order they
    were created) then this is referred to as a heap table. The only way to find a
    record in a heap table is to scan the entire table. Generally the records will
    be stored ordered by some attribute(s) — often the primary key. There are all
    sorts of algorithms for finding a particular record quickly in an ordered table,
    but most will be built on the idea of a binary search.


    When we try to find a name in a telephone book or a word in a dictionary we employ
    a type of binary search. In the simplest scenario we inspect a page in the middle
    of the book and decide if the target word is before or after the words on that
    page. We then start again and inspect a page halfway through the portion that
    is of interest. Very quickly we zero in on the page required. If the records in
    a table are ordered by a particular field, then searches on that field will be
    more efficient than searches on fields with no index.


    When we talk about records in a table being stored in order, we don’t mean they
    are physically one after the other on a disc. If this were the case then if we
    wanted to insert a new record near the beginning we would have to move all the
    others along. The records can be thought of as being in a tree-like structure.
    One common type of tree is a B-Tree. Figure [10-2](#A158240_2_En_10_Chapter.html#Fig2)
    shows a very simple representation of a B-Tree structure for storing letters of
    the alphabet.


    ![A158240_2_En_10_Fig2_HTML.jpg](A158240_2_En_10_Fig2_HTML.jpg)


    Figure 10-2. Representation of data in a B-Tree


    If you are searching for a letter in the tree in Figure [10-2](#A158240_2_En_10_Chapter.html#Fig2)
    you would start at the top node, or box. In the top node you either find what
    you are looking for or you follow the appropriate path. For example, if you are
    looking for H you would follow the path between G and O. The structure allows
    records to be added and deleted with the minimum of disruption. We can easily
    add R to the box containing P and Q without altering any of the other letters.
    Maintaining a B-Tree is not trivial. As data is added and removed the tree will
    need to be rearranged to keep it balanced and to add and remove nodes and levels.
    Fortunately, all this goes on under the hood.


    Having said all that, when we are thinking about records being in order it is
    usually easiest to imagine them all in a single line. That is what I will do for
    the rest of this chapter.


    ## Clustered Index


    If the records are physically stored in some order then this is referred to as
    a clustered index. If we thought it a good idea to store our member records in
    order of names, we could specifically create a clustered index so that the records
    are stored in order of the value of `LastName`. We can create an index with an
    SQL statement. We need to provide a name for the index (e.g., `Clustered_Name`)
    and specify the field(s) on which to order the index, as in the query here:


    ```

    CREATE CLUSTERED INDEX Clustered_Name ON Member (LastName);

    ```


    By default, the order for a clustered index is usually the value of the primary
    key. While it is possible to specify a different order for the clustered index,
    you need to have a good reason to do so.


    With a clustered index in place, there are now two ways to locate a record. Consider
    running the following query on the `Member` table with the clustered index on
    `LastName`:


    ```

    SELECT *

    FROM MEMBER WHERE LastName = ''Smith'';

    ```


    Because the table is in order of `LastName` we can quickly navigate to the correct
    record by doing a binary search. This is known as a table seek.


    Now consider the following query:


    ```

    SELECT *

    FROM MEMBER

    WHERE Phone = ''03-567-123'';

    ```


    We have no option now but to check every record in the table. We cannot even stop
    when we get to a matching record, as there may be several records with the same
    phone number. This is known as a table scan.


    ## Non-Clustered Indexes


    The records in a table can only be stored in one physical order, so there can
    only ever be one clustered index, which is usually on the primary key. If the
    clustered index for the `Member` table is on the primary key field `MemberID`,
    we can seek a particular value of `MemberID` and find the complete row with all
    the details for that member. If we want to find a row with a particular last name
    we would have to scan the whole table. Fortunately, we are able to set up additional
    non-clustered indexes on the table. I’ll refer to these non-clustered indexes
    as simply indexes from now on. Here is the SQL to create an index on `LastName`
    for the `Member` table:


    ```

    CREATE INDEX idx_Name ON Member (LastName);

    ```


    What this does is create a list of all the values of `LastName` in order. Each
    entry will include a reference to the clustered index so that the full row with
    the rest of the information can be found. Figure [10-3](#A158240_2_En_10_Chapter.html#Fig3)
    illustrates how the first few entries in the `LastName` index refer to the clustered
    index.


    ![A158240_2_En_10_Fig3_HTML.jpg](A158240_2_En_10_Fig3_HTML.jpg)


    Figure 10-3. Index on LastName has references to clustered index for full information


    Because the index is ordered by last name it is possible to do an index seek to
    find the entry we require and then use the reference to look up the associated
    row in the clustered index to retrieve the rest of the information.


    In practice, whether the query optimizer uses a particular index depends on many
    factors: the number of rows in the table, the size of each row in the index and
    the table, whether the records have been accessed recently and have been cached,
    and so on.'
