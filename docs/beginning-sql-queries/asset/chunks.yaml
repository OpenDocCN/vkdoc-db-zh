  trans: '

    # 不使用 INTERSECT 关键字进行管理


    并非所有 SQL 实现都明确支持交集运算。然而，我们还有其他方法来执行涉及“两者”的查询。交集是一种**过程式方法**——我们是在说明需要对查询中涉及的表执行什么操作。如果这种方法行不通，那么我们可以尝试**结果式方法**。这涉及到通过检查表来找出一些可能的答案，而无需担心诸如交集和连接之类的操作。在图
    7-19 中，我们想象有两根手指遍历 `Entry` 表的行。我们需要在 `Entry` 表中找到两行具有相同 `MemberID` 的行：一行 `TourID`
    = 36，另一行 `TourID` = 38。


    ![A158240_2_En_7_Fig19_HTML.jpg](img/A158240_2_En_7_Fig19_HTML.jpg)

    图 7-19. 查找同时参加了锦标赛 36 和 38 的成员


    图 7-19 描述的情况可以描述为：


    > 从 `Entry` 表的行 `e1`（其中 `TourID=36`）中返回 `MemberID`，前提是 `Entry` 表中存在另一个行 `e2`，它具有相同的
    `MemberID` 且 `TourID=38`。


    与此描述和图 7-19 等效的 SQL 表达式是：


    ```sql

    SELECT DISTINCT e1.MemberID

    FROM Entry e1, Entry e2

    WHERE e1.MemberID = e2.MemberID

    AND e1.TourID = 36 AND e2.TourID = 38;

    ```


    那么，查找同时出现在 `ClubA` 和 `ClubB` 表中的行的查询呢？俱乐部表在图 7-20 中重新显示。为了找出两个表中相同的行，我们需要检查相应列中的每个值，以确保它们相同。


    ![A158240_2_En_7_Fig20_HTML.jpg](img/A158240_2_En_7_Fig20_HTML.jpg)

    图 7-20. 查找 ClubA 和 ClubB 之间的交集


    图 7-20 所描述的情况可以描述为：


    > 如果 `ClubB` 中存在一行 `b`，其所有字段的值都与 `a` 相同（即 `a.RegNum = b.MemberID`, `a.FamilyName
    = b.LastName`, 且 `a.Name = b.FirstName`），则我将返回表 `ClubA` 中的行 `a`。


    图 7-20 所示交集的 SQL 是：


    ```sql

    SELECT a.RegNum, a.FamilyName, a.Name

    FROM ClubA a, ClubB b

    WHERE a.RegNum = b.MemberID

    AND a.FamilyName = b.LastName

    AND a.Name = b.FirstName;

    ```


    ## 差集


    对两个表进行差集运算，可以找出那些在第一个表中但不在第二个表中的行，反之亦然。对于我们这两个小型俱乐部，我在图 7-21 中复制了差集运算符的结果。


    ![A158240_2_En_7_Fig21_HTML.jpg](img/A158240_2_En_7_Fig21_HTML.jpg)

    图 7-21. 差集运算符找出存在于一个表中但不出现在另一个表中的行。


    标准 SQL 中差集运算符的关键字是 `EXCEPT`。Oracle 与 ISO SQL 标准以及大多数其他数据库系统不同，它使用关键字 `MINUS` 而不是
    `EXCEPT`。


    与并集和交集运算符一样，参与差集运算的表必须是**并兼容**的。与并集和交集运算符不同的是，表的**顺序**对于差集运算符很重要；`ClubA - ClubB`
    的结果与 `ClubB - ClubA` 的结果不同（如图 7-21 所示）。


    用于查找在 `ClubA` 表中但不在 `ClubB` 表中的人员姓名的 SQL 是：


    ```sql

    SELECT LastName, FirstName FROM ClubA

    EXCEPT

    SELECT LastName, FirstName FROM ClubB;

    ```


    ### 差集的用途


    每当你的查询中包含“不”这个词时，你应该考虑差集运算符可能有用。例如，我们如何查找未参加锦标赛 25 的成员？回想一下第 5 章，为什么下面的查询不会返回那些未参加锦标赛
    25 的成员：


    ```sql

    SELECT MemberID FROM Entry

    WHERE TourID <> 25;

    ```


    上面的查询选择了 `Entry` 表中所有不属于锦标赛 25 的行。本质上，它找到了一个参加了除 25 之外任何锦标赛的成员（尽管他们可能也参加了 25）。观察图
    7-15，我们看到查询会返回成员 415 参加锦标赛 36（`TourID <> 25`）的标记为 `e1` 的行。然而，在上面两行，我们看到成员 415
    也参加了锦标赛 25。很难想象有什么理由你会想使用这个查询。


    处理这类查询的过程式方法是使用差集。我们需要检索所有成员 ID 的集合，以及所有参加了锦标赛 25 的成员 ID 的集合。然后我们想要这两个集合的差集；即，存在于前一个集合中但不存在于后一个集合中的
    ID。


    找出所有参加了锦标赛 25 的成员的集合很简单：


    ```sql

    SELECT MemberID FROM Entry WHERE TourID = 25;

    ```


    我们可能认为类似的查询也能找到所有成员 ID：


    ```sql

    SELECT MemberID FROM Entry;

    ```


    然而，前面的查询只找到了一个**参加过锦标赛**的成员的集合。为了获得所有成员 ID 的集合，我们需要查询 `Member` 表。


    图 7-22 说明了如何使用差集运算符来找出我们所需的成员 ID。


    ![A158240_2_En_7_Fig22_HTML.jpg](img/A158240_2_En_7_Fig22_HTML.jpg)

    图 7-22. 未参加锦标赛 25 的成员


    用于检索未参加锦标赛 25 的成员 ID 的 SQL 表达式如下：


    ```sql

    SELECT MemberID FROM Member

    EXCEPT

    SELECT MemberID FROM Entry WHERE TourID = 25;

    ```


    与交集和并集运算一样，在我们使用差集运算符之前，**投影**出适当的列是很重要的。在图 7-22 中，我们从 `Member` 和 `Entry` 表中检索了
    ID。如果我们想包含成员的姓名，我们可以使用本章前面“交集的用途”一节中解释的方法之一。


    然而，在这个差集示例中，在我们移除它们以获得图 7-22 左侧的行集之前，我们已经在 `Member` 表中有了成员的姓名。移除姓名然后在以后再添加回来似乎有点反常。重要的是，参与差集的两个行集是并兼容的；也就是说，对应的列必须具有相同的域。要么两个集合都只有
    ID，要么两个集合都有 ID 和姓名。在图 7-22 左侧的操作中，我们采取了第一种选项，从 `Member` 中移除了姓名。我们本可以保留 `Member`
    表中的姓名，并通过连接 `Entry` 和 `Member` 表将姓名添加到图 7-22 中间的行中，如图 7-23 所示。然后我们可以取这两个行集之间的差集。


    ![A158240_2_En_7_Fig23_HTML.jpg](img/A158240_2_En_7_Fig23_HTML.jpg)

    图 7-23. 在取差集之前，在两个行集中都包含成员的姓名


    图 7-23 所示操作的 SQL 等效语句如下：


    ```sql

    SELECT MemberID, LastName, FirstName FROM Member

    EXCEPT

    SELECT m.MemberID, m.LastName, m.FirstName

    FROM Entry e inner join Member m on e.MemberID = m.MemberID

    WHERE TourID = 25;

    ```

