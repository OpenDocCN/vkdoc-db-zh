    Relational algebra lets us specify a sequence of operations that eventually results
    in a set of tuples with the required information. Rather than specifying how to
    do the query, relational calculus describes what conditions the resulting data
    should satisfy. This section provides a very brief introduction to the notation
    for describing calculus queries without delving into the mathematics.


