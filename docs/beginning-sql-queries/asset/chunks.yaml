- fmt: '### SQL for Division


    Using an output approach, the query we want can be expressed something like this:


    > Write out the value of `m.LastName`, `m.FirstName` from rows `m` in the `Member`
    table where for every row `t` in the `Tournament` table there exists a row `e`
    in the `Entry` table with `e.MemberID = m.MemberID` and `e.TourID = t.TourID`.


    We have an SQL keyword for `EXISTS` but not for every. We can get rid of the every
    word in the preceding statement by using the following slightly mind-bending logic.
    The phrase


    > for every row `t` in the `Tournament` table there exists a row `e` in the `Entry`
    table…


    is equivalent to saying


    > there is no row `t` in the `Tournament` table where there does not exist a row
    `e` in the `Entry` table…


    Appendix 2 provides a more formal explanation of how to derive these expressions,
    but for now we will just rewrite the original description of how to retrieve the
    names of members who have entered all the tournaments by using the equivalence
    just discussed.


    > Write out the value of `m.LastName, m.FirstName` from rows `m` in the `Member`
    table where `for every row` there is no row `t` in the `Tournament` table `there
    exists a row` where there does not exist a row `e` in the `Entry` table with `e.MemberID
    = m.MemberID` and `e.TourID = t.TourID`.


    The corresponding SQL is:


    ```sql

    SELECT m.LastName, m.FirstName FROM Member m

    WHERE NOT EXISTS

    (

    SELECT * FROM Tournament t

    WHERE NOT EXISTS

    (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID AND e.TourID = t.TourID

    )

    );

    ```


    The double negatives can be a bit daunting, but as I said at the beginning of
    the chapter, I promise a conceptually easier method to find members who have entered
    every tournament in the next chapter.


    ## Summary


    Because tables in a relational database have unique rows (if they are properly
    keyed!), they can be treated like mathematical sets. This allows us to use the
    set operations union, intersection, difference, and division.


    Union, intersection, and difference are operations that act between union-compatible
    tables. This means the table on each side of the operator must have the same number
    of columns, and the columns must have the same domains (commonly interpreted as
    the same types). You can get union-compatible tables by sensibly projecting columns.


    SQL has keywords to represent union, intersection, and difference, although not
    every implementation supports the keywords for all of these operations. If your
    SQL product does not support keywords for intersection or difference, you can
    find other ways to express the query. You should formulate your queries in the
    way you find most natural. Where you have very large amounts of data and speed
    is important, you may need to investigate the efficiencies of the different ways
    of formulating some queries.


    Here is a summary of the set operations and alternative ways to represent them
    with SQL. `A` and `B` are two union-compatible tables with (for simplicity) just
    one column called `attribute`.


    ### Union


    A union operation returns all the unique rows that are in either table `A` or
    table `B:`


    ```sql

    SELECT attribute FROM A

    UNION

    SELECT attribute FROM B;

    ```


    ### Intersection


    An intersection operation returns all rows that are in both table `A` and table
    `B:`


    ```sql

    SELECT attribute FROM A

    INTERSECT

    SELECT attribute FROM B;

    ```


    An alternative way to represent intersection is:


    ```sql

    SELECT A.attribute

    FROM A

    WHERE EXISTS

    (SELECT B.attribute FROM B

    WHERE A.attribute = B.attribute);

    ```


    ### Difference


    Difference returns all rows that are in the first table (`A`) that are not in
    the second table (`B`). Some implementations use the keyword `MINUS` instead of
    `EXCEPT`:


    ```sql

    SELECT attribute FROM A

    EXCEPT

    SELECT attribute FROM B;

    ```


    An alternative way to represent difference is:


    ```sql

    SELECT A.attribute

    FROM A

    WHERE NOT EXISTS

    (SELECT B.attribute FROM B

    WHERE A.attribute = B.attribute);

    ```


    ### Division


    The division operation helps with queries with the words every or all. Current
    versions of SQL do not support division directly. Refer to the sections “Division”
    and “Universal Quantifier and SQL” in Appendix 2 for details of how to express
    queries involving division.


    For completeness, we repeat the following query, which returns the `MemberID`
    values for those members who have entered every tournament:


    ```sql

    SELECT m.LastName, m.FirstName FROM Member m

    WHERE NOT EXISTS

    (

    SELECT * FROM Tournament t

    WHERE NOT EXISTS

    (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID AND e.TourID = t.TourID

    )

    );

    ```


    Footnotes [1](#A158240_2_En_7_Chapter.html#Fn1_source)


    In formal relational theory, the attributes of a relation have no order but rather
    are referenced by their names. The ordering of columns in tables is how implementations
    of SQL determine union compatibility.


    # 8. Aggregate Operations


    SQL has a number of functions for counting, summing, averaging, and otherwise
    performing aggregate operations on a table. These functions enable us to perform
    a variety of queries. For example, we can count the number of members in the club
    or find the average handicap. We can group the data in different ways to find
    aggregates. For example, we might want to count the number of tournament entries
    in each individual year, or we might want to find the number of entries in each
    particular tournament.


    In this chapter we will look at simple aggregates and how to make the most of
    the SQL grouping capabilities. In the next chapter we will look at window functions,
    which provide elegant solutions in situations that can be difficult to address
    with just the basic aggregate functionality.


    ## Simple Aggregate Functions


    Simple aggregates include averages, totals, and counts. These are straightforward
    ideas, but, as always, you need to be sure you understand how they work when nulls
    and duplicates are involved.


    ### The COUNT() Function


    The `COUNT()` function calculates the number of rows being returned from a query.
    The simplest example is to count all the rows returned by a query, which we can
    do by adding an asterisk between the parentheses. The following query will return
    the number of rows in the `Member` table:


    ```sql

    SELECT COUNT(*)

    FROM Member;

    ```


    A single aggregate function such as `COUNT()` in the preceding query will return
    a table with one column and one row, as shown in Figure [8-1](#A158240_2_En_8_Chapter.html#Fig1).


    ![A158240_2_En_8_Fig1_HTML.jpg](A158240_2_En_8_Fig1_HTML.jpg)


    Figure 8-1.


    Result of `COUNT()` function


    The output in Figure [8-1](#A158240_2_En_8_Chapter.html#Fig1) was produced in
    Access, and, as you can see, the column is labelled with a default name. We can
    provide a better name by giving the column an alias. In the following query we
    have added a `WHERE` clause to count the subset of rows satisfying the condition
    `Gender = ''F''` and used an `AS` clause so the column has a more informative
    heading:


    ```sql

    SELECT COUNT(*) AS NumberWomen

    FROM Member

    WHERE Gender = ''F'';

    ```


    The output of this query is shown in Figure [8-2](#A158240_2_En_8_Chapter.html#Fig2).


    ![A158240_2_En_8_Fig2_HTML.jpg](A158240_2_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    Result of `COUNT()` function with an alias


    Providing the columns returned by aggregates with an alias is a good idea so that
    the reader has some idea of what the numbers mean.'
