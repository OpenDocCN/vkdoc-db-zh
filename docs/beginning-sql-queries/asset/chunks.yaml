  trans: '

    # 确定表格之间的关系


    要概览数据库的实现方式，最好的方法是查看表之间关系的示意图。大多数数据库管理软件都提供了查看表中字段以及表间外键关系的功能。图 11-1 和 11-2 分别展示了我们的俱乐部数据库在外键关系图上的样子，分别由
    SQL Server 和 Microsoft Access 描绘。


    ![A158240_2_En_11_Fig2_HTML.jpg](img/A158240_2_En_11_Fig2_HTML.jpg)


    图 11-2.


    来自 Microsoft Access 的关系图


    ![A158240_2_En_11_Fig1_HTML.jpg](img/A158240_2_En_11_Fig1_HTML.jpg)


    图 11-1.


    来自 SQL Server 的数据库图


    表面上看，图 11-1 和 11-2 中的示意图看起来有些不同，但它们代表的数据库是完全相同的。图 11-2 中的 Access 示意图多显示了一份 `Member`
    和 `Team` 表。`Member` 表出现两份是因为成员之间存在自关系（即，一个成员可以指导其他成员）。`Team` 表出现额外一份则是由于 `Member`
    和 `Team` 之间存在两种关系：一个成员可以是一支队伍的管理者，同时一个成员可以属于一支队伍。这些关系在图 11-1 的 SQL Server 图中通过显示表之间的两条连线来描绘，从而避免了表被显示两次。不同的图示表示只是不同管理系统的一个特点。两种示意图都代表了相同的表和关系集合。


    图 11-1 和 11-2 中的连线代表了在创建表时设置的外键。例如，创建 `Member` 表的语句包含两个外键约束：


    ```

    CREATE TABLE Member(

    MemberID Int PRIMARY KEY,

    LastName CHAR(20),

    FirstName CHAR (20),

    MemberType CHAR (20) FOREIGN KEY REFERENCES Type,

    Phone CHAR (20),

    Handicap INT,

    JoinDate DATETIME,

    Coach INT FOREIGN KEY REFERENCES Member,

    Team CHAR (20),

    Gender CHAR (1));

    ```


    回顾第 1 章，这行代码：


    ```

    MemberType CHAR (20) FOREIGN KEY REFERENCES Type

    ```


    意味着如果 `MemberType` 字段中有值，那么该值必须存在于 `Type` 表的主键字段中。在图 11-1 和 11-2 中可以看到一条代表 `Member`
    表和 `Type` 表之间这种外键关系的连线。


    而这行代码：


    ```

    Coach INT FOREIGN KEY REFERENCES Member

    ```


    意味着 `Coach` 字段中的值必须已经存在于 `Member` 表的主键字段中；也就是说，`Member` 表上存在一个自关系。在图 11-1 中，这个关系通过一个连接
    `Member` 表自身的环形来表示。在图 11-2 中，该关系通过显示 `Member` 表的第二个副本来描绘。


    # 现实世界 vs 实现


    上一节中的数据库图表示了数据库的实现方式，特别是设置了哪些外键。当数据库最初建立时，其设计基于一个概念数据模型，该模型描述了特定问题的表是如何相互关联的。有多种表示数据模型的方法，例如实体关系图（ER
    图）和我们在本书中使用的 UML 类图。图 11-3 展示了高尔夫俱乐部的类图。如果需要回顾如何解读连线和数字，请参考第 1 章。


    ![A158240_2_En_11_Fig3_HTML.jpg](img/A158240_2_En_11_Fig3_HTML.jpg)


    图 11-3.


    代表概念模型的类图


    图 11-3 中的类图没有在类中显示外键字段。通过比较图 11-3 中的 `Entry` 表与前面两个数据库图中的表，你可以看出这一点。外键 `MemberID`
    和 `TourID` 作为属性在类图中缺失了。外键只是在我们选择在关系数据库中实现数据模型时，表示类之间关系的一种方式。如果我们决定在面向对象数据库中实现它，可能根本不需要外键字段。


    带有标注清晰的关系的类图，比图 11-1 和 11-2 中的实现图，能让我们对现实世界的情况有更深入的理解。看看 `Member` 和 `Team` 之间的关系，你就明白我的意思了。


    关系数据库软件提供的数据库图向你展示了实际已设置的外键。这些可能无法说明全部情况。开发者可能没有（例如）通过在 `Coach` 字段上设置外键约束来实现指导关系。他或她可能忽略了这个需求，或者决定通过其他方式（使用触发器或通过界面）来强制执行“教练必须是现有成员”这一约束。然而，即使
    `Member` 表的 `Coach` 字段上没有外键约束，如果我们想设计关于指导关系的可靠查询，仍然需要理解成员之间存在指导关系。


    在某些情况下，已实现的数据库可能与准确的数据模型没有太多共同之处。例如，如果高尔夫俱乐部数据库包含单独的成员、教练和管理者表，或者 `Member` 和 `Team`
    表之间的某个关系没有实现，那么数据库图和数据模型看起来就会大不相同。获得可靠信息的可能性就会很低。第 12 章会探讨这类问题，尽管除非进行重大重新设计，否则有时你能做的并不多。

    '
- fmt: '## What Tables Are Involved?


    Once we have an understanding of the tables in the database and how they are related
    (conceptually as well as by the existence of foreign keys), we can look at which
    tables you will need in order to extract the subset of data required. Consider
    a query like “Find all the men who have entered a Leeston tournament.” This sentence
    contains a few key words. Nouns are often a clue to what tables or fields we are
    going to need. Verbs often help us find relationships. Let’s look at the nouns.
    “Tournament” is a big clue, and we have a `Tournament` table, so that is a start.
    The word “men” is another noun in the query description. We don’t have a `Men`
    table, but we do have a `Member` table with a `Gender` field.


    It is fairly clear then that the `Member` and `Tournament` tables are going to
    play a part in our query. Now we need to get a feel for how these two tables are
    related. Figure [11-4](#A158240_2_En_11_Chapter.html#Fig4) shows the part of the
    SQL Server database diagram containing these two tables. We see that that they
    are not directly related, but rather are connected via the `Entry` table. That
    makes sense, because the verb “enter” is in our query description.


    ![A158240_2_En_11_Fig4_HTML.jpg](A158240_2_En_11_Fig4_HTML.jpg)


    Figure 11-4. Part of the database diagram showing the Member and Tournament tables


    So, it looks like at least three tables will be involved in our query: `Member`,
    `Tournament`, and `Entry`. We then use our understanding of the relational operators
    to determine how these tables could be combined. Do we need a join or a union,
    or some combination of these and other relational operators? We’ll look at ways
    to help decide on the appropriate operations in later sections in this chapter.


    ## Look at Some Data Values


    Requests for information from a database are usually couched in rather informal
    and imprecise natural language. Even a simple request, such as “Find all the men
    who have entered a Leeston tournament,” has a few things we need to clarify. Having
    a look at the actual data in the tables can sometimes help.


    Our query does not actually “find” the men, but rather returns some information
    about them. Looking at the data values in the table will help us decide what information
    might be helpful. Presumably, the questioner would like to see the names of the
    men. Do we need the IDs as well? We will need IDs if we want to distinguish two
    members with the same name.


    It may not always be clear what some of the words in the question refer to. What
    is a “Leeston” tournament? Is Leeston the name of a tournament, a type of tournament,
    or a location? Looking at a few rows of the `Tournament` table can help us. We
    see that the `TourName` field has the value “Leeston” here and there. Sometimes
    it might not be so easy to determine what imprecise words in the query description
    refer to. It may be necessary to talk to the developer or users to get a better
    understanding of what information they are trying to retrieve.


    How do we determine which members are men? Fortunately, the `Member` table has
    a `Gender` column, and it looks like we want values of `M`. Is selecting rows
    with values of `M` going to be enough? Might there be some rows that have `m`
    or `Male` as the values? We’ll look at how to deal with issues of inconsistent
    data in the next chapter. For now, let’s assume that men are denoted by `M`.


    For the simple query in this example, we now have a more precise description.
    It is something like “Retrieve the `MemberID`, `LastName`, and `FirstName` of
    the men (`Gender = ''M''`) who have entered the tournament where `TourName = ''Leeston''`.”


    You might think of some other particulars that need clearing up. It is often a
    good idea to ask why this information is required. Do we just want to find which
    men have ever been to Leeston (because we want to ask one of them some questions
    about the golf course), or do we want to know how many times our male club members
    have entered Leeston tournaments (because we are interested in how popular the
    tournament is with the members of the club)? These questions can have different
    answers, as you will see in the “Retain the Appropriate Columns” section coming
    up soon.


    ## Big Picture Method


    My first attempt at a query is seldom elegant or complete. For a query such as
    “Find all the men who have entered a Leeston tournament,” there are two ways I
    might tackle it, depending how my muses are working. One way is the big picture.
    I do this if I have a bit of an idea of how to combine the tables. I will cover
    another tactic in the section “No Idea Where to Start?”, which I use when I have
    no idea where to start!


    In the big picture method, I like to combine all the tables I’ll need and retain
    all the columns, so I can see what is happening. I usually find it easiest to
    have an SQL window of some sort open so I can try small queries to see if the
    intermediate results look promising for answering the overall question.


    Let’s look at the big picture approach to the query “Find all the men who have
    entered the Leeston tournament.” We decided we needed three tables: `Member`,
    `Entry`, and `Tournament`. These tables are all connected by foreign keys, and
    this often suggests that joins will be useful. If it isn’t clear to you that a
    join is what is required for the query, then resort to the methods in the “No
    Idea Where to Start?” section later in this chapter.


    ### Combine the Tables


    Let’s assume that we think joining tables looks like a promising approach for
    the query about men entering the Leeston tournament. You don’t have to do everything
    at once. Start slowly with some small queries to see how things shape up.


    To carry out a join, we need to find the fields on which to join. Review Chapter
    [3](#A158240_2_En_3_Chapter.html) if you need to refresh your understanding of
    join-compatible fields. The `Entry` table is critical to this query, as it connects
    the `Member` and `Tournament` tables. The `Entry` table has a foreign key field
    labeled `TourID`, which we can join with the primary key of the `Tournament` table.
    Do that much first.


    ```

    SELECT * FROM

    Tournament t INNER JOIN Entry e ON t.TourID = e.TourID;

    ```


    Figure [11-5](#A158240_2_En_11_Chapter.html#Fig5) shows a few rows of the resulting
    virtual table.


    ![A158240_2_En_11_Fig5_HTML.jpg](A158240_2_En_11_Fig5_HTML.jpg)


    Figure 11-5. Part of the result of joining the Tournament and Entry tables


    The result shown in Figure [11-5](#A158240_2_En_11_Chapter.html#Fig5) is certainly
    helpful. We can see the entries and the names of the corresponding tournaments.
    We can see from the first two rows that members 118 and 228 have entered a Leeston
    tournament. Now we need to find out whether 118, 228, and other members entering
    the tournament are men and find their names. We can get this additional information
    by joining the virtual table in Figure [11-5](#A158240_2_En_11_Chapter.html#Fig5)
    to the `Member` table on the `MemberID` fields:


    ```

    SELECT * FROM

    (Tournament t INNER JOIN Entry e ON t.TourID=e.TourID)

    INNER JOIN Member m ON m.MemberID = e.MemberID;

    ```


    Figure [11-6](#A158240_2_En_11_Chapter.html#Fig6) shows the result. I haven’t
    included all the columns in Figure [11-6](#A158240_2_En_11_Chapter.html#Fig6)
    because there are a lot of them. You will see shortly why I like to leave all
    the columns in as long as possible.


    ![A158240_2_En_11_Fig6_HTML.jpg](A158240_2_En_11_Fig6_HTML.jpg)


    Figure 11-6. Part of the result of joining the Tournament, Entry, and Member tables
    (just some columns)


    The virtual table shown in Figure [11-6](#A158240_2_En_11_Chapter.html#Fig6) has
    all the information we need to find the required data. The first two rows show
    that members 118 and 228 are women. The row for member 286 (with the circles)
    looks more promising. How do we amend the query to find the appropriate subset
    of rows and columns?'
