  trans: '

    ### 结论


    通过应用微积分和代数方法来查询未参加 Leeston 锦标赛的女性选手，我们得到了两个等价但形式迥异的 SQL 查询。毫无疑问，还有其他几种等价的 SQL
    语句。在 `SQL Server 2012` 中的测试表明，优化器会产生略有不同的执行计划，其中微积分方法的查询速度稍快——尽管添加一些索引可能完全改变这一结果。


    本书传达的信息是：对于任何查询，都存在两种等价但方法迥异的处理途径。本附录补充了简洁的符号表示，以帮助你表述这些方法。


