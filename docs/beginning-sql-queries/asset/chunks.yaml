    # 1. 关系数据库概述


    电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1955-3_1](http://dx.doi.org/10.1007/978-1-4842-1955-3_1)）包含补充材料，可供授权用户使用。


    SQL（结构化查询语言）使我们能够创建表、应用约束以及操作数据库中的数据。本书将重点介绍查询，这些查询通过描述我们所需数据的子集，使我们能够从数据库中提取信息。该数据可能是一个单独的数字（如产品价格）、一份订阅逾期的成员姓名列表，或是一个计算结果（如过去
    12 个月售出产品的总金额）。在本书中，我们将研究不同的方法来构建查询，以便能用 SQL 正确地表达出来。


    在深入探讨如何指定查询的具体细节之前，我们将回顾一些与关系数据库相关的想法和术语。我们还将了解数据模型，这是一种简洁描述特定数据库构建方式的方法，即数据存储在何处以及所有事物是如何相互关联的。


    底层数据库的设计必须能够准确地表示它所处理的情况，这一点至关重要。这不仅意味着创建了合适的表，还意味着应用了适当的约束，以确保数据是一致的，并且随着数据库的发展保持一致。即使拥有世界上最精妙的
    SQL，如果底层数据库设计有缺陷，你也无法获得准确的查询结果。如果你正在建立一个新数据库，在开始项目之前，应该参考一本设计书籍¹。


    ## 介绍数据库表


    简单来说，关系数据库就是一组表²。在一个设计良好的数据库中，每个表保存关于某一事物的信息，例如客户、销售、团队或锦标赛。在本书中，我们将基于一个高尔夫俱乐部的数据库来构建大部分示例。这些表将随着讲解逐步引入，附录
    1 提供了概览。


    ### 属性


    创建表时，我们需要指定它将保存哪些信息。例如，一个`Member`（成员）表可能包含姓名、地址和联系方式等信息。我们需要决定单个的数据项是什么。例如，我们可以选择将姓名信息分离为头衔、名、姓、首字母缩写和常用名。这种分离使我们能更灵活地使用数据。例如，我们可以将信件寄给
    J. A. Stevens 先生，并在消息开头称呼他为 Jim。这些独立的信息片段就是表的属性。


    要定义一个属性，我们需要提供一个名称（例如，`FamilyName`（姓氏）、`Handicap`（差点）或`DateOfBirth`（出生日期））以及一个域或类型。域是一组允许的值，它可能非常笼统，也可能相当具体。例如，存储日期的列的域可能是任何有效日期（因此只有在闰年才允许
    2 月 29 日），而存储数量的列的域可能是大于 0 的整数值。我们最初可能认为`FamilyName`属性的域可以是任何字符串，但仔细考虑后，我们需要考虑是否允许某些标点符号（可能允许）、是否允许数字（很难说）以及是否应该有最小或最大长度。所有数据库系统都有内置的域或类型，如`text`（文本）、`integer`（整数）或`date`（日期），可以为表中的每个字段选择。更复杂的产品允许用户定义自己的类型，这些类型可以在跨表使用。例如，我们可以定义一个名为`CarRegistration`（车牌号）的类型，它有一个预定义的字母和数字模板。即使不能定义自己的类型，所有优秀的数据库系统都允许设计者在表中为特定属性指定约束。例如，在某个特定表中，我们可能指定出生日期是过去的日期，或者差点在
    0 到 40 之间。某些属性可能允许为空，而其他属性则可能要求必须有值。


    当我们查看表时，属性的名称是列标题，而域或类型提供了允许的值集合。定义表之后，我们通过为每个实例提供一行来添加数据。例如，如果我们有一个如图 1-1 所示的`Member`表，那么每一行代表一个成员。


    ![A158240_2_En_1_Fig1_HTML.jpg](img/A158240_2_En_1_Fig1_HTML.jpg)


    图 1-1.

    Member（成员）表


    ### 主键


    关系数据库表最重要的特性之一是它的每一行都应该是唯一的。表中不应有两行在每个属性上都具有相同的值。如果我们考虑成员数据，就能明白为什么这种唯一性约束如此重要。如果在图
    1-1 所示的表中，我们有两行完全相同的记录（比如都是 Brenda Nolan），我们将无法区分它们。我们可能会将一个团队与其中一行关联，而将订阅付款与另一行关联，从而产生各种混淆。


    关系数据库通过指定一个`主键`来保持表中行的唯一性。`主键`是一个属性或一组属性，它保证在给定表的每一行中都是不同的。对于像本例中的成员数据这样的数据，我们不能保证所有成员都有不同的姓名或地址（父亲和儿子可能同名同址且都属于俱乐部）。重要的是要有足够的属性来区分表中的行。添加出生日期可以解决上面提到的问题。将大量属性作为主键处理可能变得很繁琐，因此为了帮助区分不同的成员，我们在图
    1-1 的表中包含了 ID 号作为属性之一。现在我们可以通过指定 ID 来唯一标识一个成员。这样做还有一个额外优势，即如果成员更改姓名，我们也可以跟踪他们。添加一个标识号（有时称为`代理键`）在数据库表中非常常见。如果`MemberID`被定义为`Member`表的主键，那么数据库系统将确保每一行中`MemberID`的值都是不同的。系统还将确保主键字段始终有值。也就是说，我们永远不能添加一行`MemberID`字段为空的记录。主键字段的这两个要求（唯一性和非空）确保了给定一个`MemberID`值，我们总能找到代表该成员的单一行。我们将在本章后面开始查看表之间的关系时，看到这一点也很重要。


    下面的代码显示了创建图 1-1 所示`Member`表的 SQL 代码。每个属性都指定了名称和类型。在 SQL 中，关键字`INT`表示整数或非小数数字，`CHAR(n)`表示长度为`n`的字符串。该代码还指定了`MemberID`将是主键。设计良好的数据库中的每个表都应该有一个主键子句。


    ```sql

    CREATE TABLE Member (

    MemberID INT PRIMARY KEY,

    LastName CHAR(20),

    FirstName CHAR(20),

    Handicap INT,

    JoinDate DATETIME,

    Gender CHAR(1));

    ```

    '
- fmt: '### Inserting and Updating Rows in a Table


    The emphasis of this book is on getting accurate information out of a database,
    but the data first has to get in somehow. Most database application developers
    will provide user-friendly interfaces for inserting data into the various tables.
    Often a form is presented to the user for entering data that may end up in several
    tables. Figure [1-2](#A158240_2_En_1_Chapter.html#Fig2) shows a simple Microsoft^©
    Access form that allows a user to enter and amend data in the `Member` table.


    ![A158240_2_En_1_Fig2_HTML.jpg](A158240_2_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    A form allowing entry and updating of data in the Member table


    It is possible to construct web forms or use mechanical readers, such as bar-code
    readers, that can collect data and insert it into a database. Data can also be
    added with bulk updates from files or be imported from other applications. Behind
    all the different mechanisms for updating data, SQL update queries are generated.
    We will see three types of queries for inserting or changing data just to get
    an idea of what they look like.


    The code that follows shows the SQL to enter one complete row in our `Member`
    table. The data items are in the same order as specified when the table was created.
    Note that the date and string values need to be enclosed in single quotes.


    ```sql

    INSERT INTO Member

    VALUES (118, ''McKenzie'', ''Melissa'', ''963270'', 30, ''05/10/1999'', ''F'')

    ```


    If many of the data items are empty, we can specify which attributes will have
    values. If we had only the `MemberID` and `LastName` of a member, we could insert
    just those two values as shown here:


    ```sql

    INSERT INTO Member (MemberID, LastName)

    VALUES (258, ''Olson'')

    ```


    When adding a new row as just seen, we always have to provide a value for the
    primary key.


    We can also alter records that are already in the database with an update query.
    The following query will find the row for the member with ID 118 and then will
    update the phone number:


    ```sql

    UPDATE Member

    SET Phone = ''875077''

    WHERE MemberID = 118

    ```


    This query specifies which rows are to be changed (the `WHERE` clause) and also
    specifies the field to be updated (the `SET` clause).


    ### Designing Appropriate Tables


    Even a quite modest database system will have hundreds of attributes: names, dates,
    addresses, quantities, prices, descriptions, ID numbers, and so on. These all
    have to find their way into tables, and getting them in the right tables is critical
    to the overall accuracy and usefulness of the database. Many problems can arise
    from having attributes in the “wrong” tables. As a simple illustration of what
    can go wrong, I’ll briefly show the problems associated with having redundant
    information.


    Say we want to add teams and practice nights to the information we are keeping
    about members of our golf club. We could add these two fields to the `Member`
    table, as in Figure [1-3](#A158240_2_En_1_Chapter.html#Fig3).


    ![A158240_2_En_1_Fig3_HTML.jpg](A158240_2_En_1_Fig3_HTML.jpg)


    Figure 1-3.


    Possible Member table


    Immediately, we can see there has been a problem with the data entry because Brenda
    Nolan has a practice night that is different from the rest of her team members.
    The piece of information about the practice night for each team is being stored
    several times, so inevitably inconsistencies will arise. If we formulated a query
    to find the practice night for TeamB, what would we expect for an answer? Should
    it be Monday, Tuesday, or both?


    The problem here is that (in database parlance) the table is not properly normalized.
    Normalization is a formal way of checking whether attributes are in the correct
    table. It is outside the scope of this book to delve into normalization, but I’ll
    just briefly show you how to avoid the problem in this particular case.


    The problem is that we are trying to keep information about two different things
    in our `Member` table: information about each member (IDs, names, and so on) and
    information about teams (the practice nights). The `PracticeNight` attribute is
    in the wrong table. Figure [1-4](#A158240_2_En_1_Chapter.html#Fig4) shows a better
    solution with two tables: one for information about members and one for information
    about teams.


    ![A158240_2_En_1_Fig4_HTML.jpg](A158240_2_En_1_Fig4_HTML.jpg)


    Figure 1-4.


    Member and Team tables


    This separation of information into two tables prevents the inconsistent data
    we had previously. The practice night for each team is stored only once. If we
    need to find out what night Brenda Nolan should be at practice, we now need to
    consult two tables: the `Member` table to find her team and then the `Team` table
    to find the practice night for that team. The bulk of this book is about how to
    do just that sort of data retrieval.'
