  trans: '## 从数据库检索信息


    既然我们已经有了一个设计良好的数据库，它由相互关联的规范化表组成，我们现在可以开始研究如何通过查询来提取信息。当我提到提取或检索信息时，并不是指我们要移除任何数据。可以将查询视为查看数据库一小部分内容的窗口。许多数据库系统会提供图形化界面，这对于简单查询非常有用。图
    1-9 展示了从`Member`表中检索高级会员姓名的 Microsoft© Access 界面。勾选标记表示我们要检索的列，`Criteria`（条件）行使我们能够指定返回行需满足的条件。


    ![A158240_2_En_1_Fig9_HTML.jpg](img/A158240_2_En_1_Fig9_HTML.jpg)

    *图 1-9. 用于对 Member 表进行简单查询的 Access 界面*


    应用程序将从图形界面获取信息并构建一个 SQL 查询。大多数应用程序会显示生成的 SQL，你可以修改它或自己从头编写。图 1-9 所示查询的 SQL 等价语句是：


    ```sql

    SELECT FirstName, LastName

    FROM Member

    WHERE MemberType = ''Senior'';

    ```


    这个 SQL 查询包含三个子句：`SELECT`指定要返回的列，`FROM`指定信息存放的表，`WHERE`指定返回的行必须满足的条件。我们稍后会更详细地研究
    SQL 语句的结构，但现在这个查询的意图已经相当清晰了。


    随着我们需要以各种方式连接越来越多的表，图形化界面很快就变得笨拙难用，通常我们需要直接编写 SQL 命令。通常，以一种更抽象的方式来思考查询会更容易。对所需内容有一个清晰的抽象理解后，将这个想法转化为合适的
    SQL 语句就变得更为直接了。对关系数据库进行查询有两种不同的方法。


    ### 过程方法


    处理查询的一种方法是从我们需要对表执行的操作角度来思考。让我们思考一下如何获取在星期一练习的成员姓名列表。我们可以想象首先从`Team`表中检索`PracticeNight`列包含“星期一”的行。然后，我们可能会将这些行与`Member`表连接起来（关于连接，后面会有更多介绍），并从结果中提取姓名。我们将此称为**过程方法**，因为它是一系列按特定顺序执行的步骤。图
    1-10 描述了刚才所述的步骤。


    ![A158240_2_En_1_Fig10_HTML.jpg](img/A158240_2_En_1_Fig10_HTML.jpg)

    *图 1-10. 过程方法：将查询视为一系列操作*


    ### 结果方法


    思考上一节中查询的另一种方法是检查`Member`表中的所有行，并仅返回那些满足以下条件的行：该成员所在的团队将星期一作为练习日。图 1-11 描述了这一思路。我们考虑的`Member`表中的行`m`满足关于团队练习日的条件，因此我们应该从该行检索姓名。


    ![A158240_2_En_1_Fig11_HTML.jpg](img/A158240_2_En_1_Fig11_HTML.jpg)

    *图 1-11. 判断行 m 是否满足查询条件。*


    我们将这种关于查询的思考方式称为**结果方法**，因为我们描述的是我们想要什么，而不是如何得到它。


    ## 为何考虑两种方法


    关系数据库理论起源于集合论。如果我们将表视为行的集合，那么查询就是一个问题，要求我们操作这些集合以检索包含我们所需信息的子集。关系理论有两种指定提取行子集标准的正式方法：**关系代数**和**关系演算**。


    对于简单查询，我们不需要这些抽象概念。然而，如果所有查询都很简单，您就不会阅读这本书了。首先，查询通常用日常语言表达，而这种语言常常存在歧义。试试这个简单的表达：“找出所有年龄小于
    20 岁或在家住并获得津贴的学生。”根据逗号插入位置的不同，这可以表示不同的意思。例如，“20”后面的逗号表示所有 20 岁以下的人都被包括在内，而“家”后面的逗号则表示他们还必须获得津贴。即使我们理清了自然语言表达的意思，我们仍必须根据数据库中的实际表来思考查询。这意味着我们必须在表达查询的方式上非常具体。关系代数和关系演算都为我们提供了一种准确且具体的方式。


    为什么不跳过所有这些抽象的东西，直接去学习 SQL 呢？嗯，SQL 语言同时包含了演算和代数的元素。旧版本的 SQL 纯粹基于关系演算，即你描述想要检索什么，而不是如何检索。现代的
    SQL 实现也允许你显式地指定代数操作，例如表的连接、并集和交集。


    表达一个 SQL 语句通常有几种等效的方式。有些方式非常基于演算，有些基于代数，有些则两者兼有。在我担任大学讲师期间，我经常在课堂上问学生，对于某个特定的查询，他们觉得演算表达式还是代数表达式更直观。班级通常平分秋色。就我个人而言，我发现有些查询用关系代数思考感觉显而易见，而另一些用关系演算表达则感觉简单得多。一旦我用其中一种方法确定了想法，将其转换为
    SQL（或其他查询语言）通常就很简单了。


    我们可以在不深入数学细节的情况下，利用关系代数和关系演算的思想。在本书正文中，我将提到**过程方法（代数）**和**结果方法（演算）**。你掌握的工具越多，就越有可能准确地表达复杂的查询。附录
    2 中介绍了关系代数和关系演算的正式符号表示法，供希望将其纳入自己武器库的读者参考。'
- fmt: '## Summary


    This chapter has presented an overview of relational databases. We have seen that
    a relational database consists of a set of tables that represent the different
    aspects of our data (for example, a table for members and a table for teams).
    The attributes needed to describe the members or teams become the columns of the
    tables, and each column has a set of allowed values (a domain). Each table should
    have a primary key, which is an attribute or set of attributes guaranteed to have
    a different value for every row.


    It is possible to set up constraints between tables with foreign keys. A foreign
    key is a value for a column(s) in one table that has to already exist as a value
    in the primary key column(s) of another table. For example, the value of `Team`
    in the `Member` table must be one of the values in the primary key field of the
    `Team` table.


    It is often helpful to think about queries in an abstract way, and there are two
    ways to do this. The process approach requires us to think about the operations
    that can be applied to tables in a database. It is a way of describing how we
    need to manipulate the tables to extract the information we require. The outcome
    approach requires us to think about what criteria our required information must
    satisfy. Different people will find that one or the other of these approaches
    feels more natural for different queries. SQL is a language for specifying queries
    on a database. There are usually many equivalent ways to specify a query in SQL.
    Some reflect the process approach and some reflect the outcome approach `— and`
    some are a bit of both.


    Footnotes [1](#A158240_2_En_1_Chapter.html#Fn1_source)

    For example, you can refer to my other Apress book, *Beginning Database Design:
    From Novice to Professional* (New York: Apress, 2012).


    [2](#A158240_2_En_1_Chapter.html#Fn2_source)

    More correctly, it’s a set of relations. In the body of the book common words
    such as table and row are used. In Appendix 2 we introduce the more formal vocabulary
    and notation.


    [3](#A158240_2_En_1_Chapter.html#Fn3_source)

    If you want more information about UML, then refer to Grady Booch, James Rumbaugh,
    and Ivar Jacobsen, *The Unified Modeling Language User Guide* (Boston, MA: Addison
    Wesley, 2005). The current standards can be found at [`http://www.uml.org/`](http://www.uml.org/).


    [4](#A158240_2_En_1_Chapter.html#Fn4_source)

    Alistair Cockburn, *Writing Effective Use Cases* (Boston, MA: Addison Wesley,
    2001).


    [5](#A158240_2_En_1_Chapter.html#Fn5_source)

    For more information about database design, refer to my other Apress book, *Beginning
    Database Design: From Novice to Professional* (New York: Apress, 2012).


    # 2. Simple Queries on One Table


    If a database has been designed correctly, the data will be located in several
    different tables. For example, our golf database has separate tables for information
    about members, teams, and tournaments, as well as tables that connect these values;
    for example, which members play on which teams, enter which tournaments, and so
    on. To make the best use of our data, we will need to inspect values from different
    tables to retrieve the information we require.


    In this chapter, we will look at retrieving information from a single table. The
    table may be one of the permanent tables in the database, or it may be a virtual
    table that has been temporarily put together as part of a more complicated query.


    I’ve been talking in a rather imprecise manner about “retrieving” rows and “returning”
    information. What happens to the rows that result from a query? In reality, we
    are not removing data from tables and putting it somewhere. A query is like a
    window onto the database through which we can see just the information we require.
    If the data in the underlying database changes, then the results of our query
    will change too. It doesn’t hurt to think about the information that results from
    a query as being “retrieved” into a “virtual” table as long as you realize it
    is just temporary.


    ## Subsets of Rows and Columns


    Selecting subsets of rows and/or columns is one of the most common operations
    we will carry out in a query. In the following sections, we will look at selecting
    rows and columns from one of the original tables in the database.[¹](#A158240_2_En_2_Chapter.html#Fn1)
    The same ideas apply to retrieving information from virtual tables that result
    from other manipulations of the data.


    To determine which rows to retrieve from a table, it is necessary to specify a
    condition, which is a statement that is either true or false. We apply the condition
    to each row in the table independently, retaining those rows for which the condition
    is true and discarding the others. Say we want to find all the seniors in the
    golf club. We want just that subset of rows from the `Member` table where the
    value in the `MemberType` field is “Senior,” as shown in Figure [2-1](#A158240_2_En_2_Chapter.html#Fig1).


    ![A158240_2_En_2_Fig1_HTML.jpg](A158240_2_En_2_Fig1_HTML.jpg)

    **Figure 2-1.** Retrieving the subset of rows for Senior members .


    The SQL for the query to retrieve Senior members is as follows:


    ```sql

    SELECT *

    FROM Member

    WHERE MemberType = ''Senior''

    ```


    This query has three parts, or clauses: The `SELECT` clause says what columns
    to retrieve. In this case, `*` means retrieve all the columns. The `FROM` clause
    says which table(s) the query involves, and the `WHERE` clause describes the condition
    for deciding whether a particular row should be included in the result. The condition
    says to check the value in the field `MemberType`. In SQL, when we specify an
    actual value for a character or text field, we need to enclose the value in single
    quotes, as in `''Senior''`.


    Now let’s look at how we can specify that we want to see only some of the columns
    in our result. I will generally refer to selecting a subset of rows and projecting
    a subset of columns. Often the projection of a subset of columns is the last step
    in a series of operations. We can think of gathering all the data we require and
    then at the end asking for just the attributes or columns we need. We will see
    in Chapter [7](#A158240_2_En_7_Chapter.html) that we sometimes also need to project
    similar columns from original or virtual tables before applying some of the set
    operations, such as union and intersection.


    If we want a phone list of all the members we don’t need extra information such
    as handicaps or join dates. Figure [2-2](#A158240_2_En_2_Chapter.html#Fig2) shows
    a subset of the name and phone number columns from the `Member` table.


    ![A158240_2_En_2_Fig2_HTML.jpg](A158240_2_En_2_Fig2_HTML.jpg)

    **Figure 2-2.** Projecting a subset of columns to provide a phone list


    The SQL to retrieve the name and phone columns from the `Member` table is:


    ```sql

    SELECT LastName, FirstName, Phone

    FROM Member

    ```


    Because we want to see these column values for every row, this query doesn’t have
    a `WHERE` clause .


    It is a simple matter to combine the retrieval of subsets of rows and columns.
    We might do this if we wanted a phone list for just the senior members, as in
    Figure [2-3](#A158240_2_En_2_Chapter.html#Fig3).


    ![A158240_2_En_2_Fig3_HTML.jpg](A158240_2_En_2_Fig3_HTML.jpg)

    **Figure 2-3.** Retrieving a subset of rows and columns to produce a phone list
    of Senior members


    The SQL for the query depicted in Figure [2-3](#A158240_2_En_2_Chapter.html#Fig3)
    is:


    ```sql

    SELECT LastName, FirstName, Phone

    FROM Member

    WHERE MemberType = ''Senior''

    ```'
  raw: '## Summary


    This chapter has presented an overview of relational databases. We have seen that
    a relational database consists of a set of tables that represent the different
    aspects of our data (for example, a table for members and a table for teams).
    The attributes needed to describe the members or teams become the columns of the
    tables, and each column has a set of allowed values (a domain). Each table should
    have a primary key, which is an attribute or set of attributes guaranteed to have
    a different value for every row.


    It is possible to set up constraints between tables with foreign keys. A foreign
    key is a value for a column(s) in one table that has to already exist as a value
    in the primary key column(s) of another table. For example, the value of `Team`
    in the `Member` table must be one of the values in the primary key field of the
    `Team` table.


    It is often helpful to think about queries in an abstract way, and there are two
    ways to do this. The process approach requires us to think about the operations
    that can be applied to tables in a database. It is a way of describing how we
    need to manipulate the tables to extract the information we require. The outcome
    approach requires us to think about what criteria our required information must
    satisfy. Different people will find that one or the other of these approaches
    feels more natural for different queries. SQL is a language for specifying queries
    on a database. There are usually many equivalent ways to specify a query in SQL.
    Some reflect the process approach and some reflect the outcome approach `— a`nd
    some are a bit of both.


    Footnotes [1](#A158240_2_En_1_Chapter.html#Fn1_source)


    For example, you can refer to my other Apress book, Beginning Database Design:
    From Novice to Professional (New York: Apress, 2012).


      [2](#A158240_2_En_1_Chapter.html#Fn2_source)


    More correctly, it’s a set of relations. In the body of the book common words
    such as table and row are used. In Appendix 2 we introduce the more formal vocabulary
    and notation.


