    # 嵌套查询与聚合函数


    我们在第 4 章已经简单介绍了嵌套查询和聚合函数。在这里重新审视这个概念很有用。在本章中，我们已经学习了如何计算平均值、总和、计数等。现在，我们可以在其他查询中使用这些聚合结果。例如，我们可能想找出所有成绩（handicap）大于平均成绩的人。考虑以下查询：


    ```sql

    SELECT * FROM Member

    WHERE Handicap >

    (SELECT AVG (Handicap)

    FROM Member);

    ```


    查询的内部部分返回平均成绩，外部部分将每个成员的成绩与该平均值进行比较。


    让我们尝试另一个例子。如何找出参加了超过三场锦标赛的成员？如果你一时没有头绪，可以回溯到“结果导向”的方法：想象一下涉及的表格，并弄清楚你想要返回的行应该是什么样子。图
    8-14 展示了如何对这个查询进行可视化。


    ![A158240_2_En_8_Fig14_HTML.jpg](img/A158240_2_En_8_Fig14_HTML.jpg)

    **图 8-14.**

    哪些成员参加了三场以上的锦标赛？


    我们可以这样描述想要返回的成员：


    > 从 `Member` 表中找出所有行 `m`，条件是，如果我们统计 `Entry` 表中该成员（`m.MemberID = e.MemberID`）对应的行数，该计数值大于
    3。


    这可以很直接地转换成 SQL，如下所示：


    ```sql

    SELECT * FROM Member m

    WHERE

    (SELECT COUNT (*)

    FROM Entry e

    WHERE e.MemberID = m.MemberID) > 3;

    ```


    再来个稍微复杂点的？如何找出成员参加锦标赛的平均次数？我们将需要 `AVG()` 函数，但我们试图对什么求平均值呢？我们想要先统计每个成员参加的锦标赛数量，然后对这些数量求平均值。


    我们可以使用上一节介绍的分组方法来找出每个成员参加的锦标赛数量：


    ```sql

    SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

    GROUP BY MemberID

    ```


    前面查询的结果如图 8-15 所示。


    ![A158240_2_En_8_Fig15_HTML.jpg](img/A158240_2_En_8_Fig15_HTML.jpg)

    **图 8-15.**

    每个成员的参赛次数


    现在我们想要找出 `CountEntries` 这一列的平均值。作为第一次尝试，似乎可以将我们之前的查询作为嵌套查询的内部部分，然后尝试求平均值：


    ```sql

    -- 在某些实现中不起作用

    SELECT AVG (CountEntries) FROM

    (SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

    GROUP BY MemberID);

    ```


    然而，许多版本的 SQL 不支持在 `FROM` 子句中使用嵌套查询。上面的查询在 Access 2013 中可以正常工作，但在其他一些 SQL 实现中不行。


    我们在上一章遇到了一个类似的问题，当时我们希望将一个表与一个联合（union）的结果进行连接。我们只需给内部查询的结果起一个别名（例如 `NewTable`）。这会创建一个临时的虚拟表（通常称为派生表）。然后，我们可以像这样访问新虚拟表的属性：


    ```sql

    SELECT AVG (NewTable.CountEntries) FROM

    (SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

    GROUP BY MemberID)AS NewTable;

    ```


    ## 本章小结


    聚合函数为我们提供了回答关于数据的大量问题的方法。以下是本章的一些要点总结。


    大多数 SQL 版本会提供简单的聚合函数 `MIN()`、`MAX()`、`COUNT()`、`SUM()` 和 `AVG()`。


    *   对于 `COUNT()`，通常你只想计算查询返回的行数。这可以通过在括号中包含星号来完成：`COUNT(*)`。如果你在括号中包含一个列名（例如 `COUNT(Handicap)`），则只有该列中非空的值会被计入统计。

    *   对于其他常见的聚合函数，你需要包含一个字段名。对于 `AVG()` 和 `SUM()`，这需要是一个数值表达式，例如 `AVG(Handicap)`。


    空值与重复值：


    *   计算聚合时会忽略空值。例如，`AVG(Handicap)` 是所有成绩的总和除以 `Handicap` 列中非空值的行数。

    *   默认情况下，所有非空值都包含在聚合中。你可以包含关键字 `DISTINCT` 来去除重复值。例如，`COUNT(DISTINCT Handicap)`
    将统计 `Handicap` 列中出现的不同值的数量。


    分组：


    *   `GROUP BY` 子句可用于将具有相同表达式值的行收集到一起，然后对这些组应用聚合函数。例如，我们可以通过将 `Entry` 表中 `MemberID`
    值相同的所有行分组（例如 `SELECT MemberID, COUNT(*) FROM Entry GROUP BY MemberID`）来找出每个成员参加的锦标赛数量。

    *   在分组并执行聚合后，你可以使用关键字 `HAVING` 从结果表中选择行。例如，通过在上一项的表达式后添加子句 `HAVING COUNT(*) >=
    3`，我们可以找出参加了三场或以上锦标赛的成员。

    *   使用 `WHERE` 在分组和聚合之前选择行的子集。使用 `HAVING` 在分组和聚合之后选择行的子集。


    更复杂的聚合：


    *   当你需要嵌套聚合时（例如，找出计数的平均值），请使用派生表。只需给内部查询起一个别名。

    *   通过比较行数来进行等价的关系除法运算。


    脚注 1

    不同版本的 SQL 会有不同的函数来实现此功能。在 Oracle 中，你可能会考虑使用 `CAST` 函数。


    # 9. 窗口函数


    窗口函数于 2003 年被添加到标准 SQL 中，为处理聚合提供了相当大的额外能力。窗口函数允许我们基于当前行，对数据的一个“窗口”执行聚合。这为指定执行排名、累计总和和滚动平均值等操作的查询提供了一种优雅的方式。在将数据分组以进行聚合时，窗口函数也提供了相当大的灵活性，因为它们允许单个查询具有多个不同的组或分区。还可以在查询中引用参与聚合的基础数据。这允许将基础数据与聚合结果进行比较。


    Oracle 和 Postgres 支持窗口函数已有多年，而 SQL Server 直到 2012 年才引入它们。Access 和 MySQL 目前不支持这些函数。本章概述了如何使用一些最常见的窗口函数。

    '
- fmt: '## Simple Aggregates


    要开始使用窗口函数，我们将用它们来编写查询，以替代第8章中遇到的一些简单聚合函数。让我们重新考虑一个计算和平均成员障碍物的简单聚合查询：


    ```

    SELECT COUNT(Handicap) AS Count, AVG(Handicap * 1.0) as Average

    FROM Member;

    ```


    该查询的输出如图9-1所示。


    ![A158240_2_En_9_Fig1_HTML.jpg](A158240_2_En_9_Fig1_HTML.jpg)


    图9-1. 简单计数和平均障碍物的输出


    对于简单聚合，`SELECT`子句中唯一允许的属性是聚合函数本身以及那些包含在`GROUP BY`子句中的属性。这意味着我们不再能访问构成结果的各个障碍物数据。


    窗口函数允许我们在获取聚合值的同时，也能检索底层数据。窗口函数的关键字是`OVER()`；它们有时也被称为over函数。


    以下是一个与前面查询类似的，使用`OVER()`函数的查询：


    ```

    SELECT MemberID, LastName, FirstName, Handicap,

    COUNT(Handicap) OVER() AS Count,

    AVG(Handicap * 1.0) OVER() as Average

    FROM Member;

    ```


    与简单的`COUNT()`函数不同，使用`OVER()`函数，我们能够在`SELECT`子句中包含额外的字段。在上面的查询中，我们包含了每个成员的四个详细数据字段以及两个聚合值（为了便于阅读，聚合值被缩进在新行上）。这些聚合值与简单聚合相同，只是包含了`OVER()`函数。


    上述查询的部分输出如图9-2所示。障碍物的计数和平均值与每个成员的详细数据一起显示。


    ![A158240_2_En_9_Fig2_HTML.jpg](A158240_2_En_9_Fig2_HTML.jpg)


    图9-2. 使用OVER()计算和平均障碍物时的输出


    虽然图9-2中的示例为每一行返回聚合值看起来不是特别有用，但它为一些新的查询打开了大门。我们现在可以轻松地将每个个体的障碍物与平均值进行比较，这在没有窗口函数的情况下是完全不简单的。在下面查询的第三行，我们从每个成员的障碍物中减去障碍物的平均值，并将结果包含在`SELECT`子句中：


    ```

    SELECT MemberID, LastName, FirstName, Handicap,

    AVG(Handicap * 1.0) OVER() AS Average,

    Handicap - AVG(Handicap *1.0) OVER() AS Difference

    FROM Member;

    ```


    结果如图9-3所示。


    ![A158240_2_En_9_Fig3_HTML.jpg](A158240_2_En_9_Fig3_HTML.jpg)


    图9-3. 窗口函数允许我们将聚合值与详细值进行比较


    ## Partitions


    `OVER()`函数也可用于生成类似于上一章介绍的`GROUP BY`查询的查询。这里我们需要的关键短语是`PARTITION BY`。让我们尝试对`Entry`表中的行进行一些不同的计数。如果我们只对`COUNT(*)`函数使用`OVER()`函数，我们将计算所有行；而如果我们使用`OVER(PARTITION
    BY TourID)`，它将为`TourID`的每个不同值计算行数。


    分区的真正威力在于，与简单聚合的`GROUP BY`子句不同，它允许在单个查询中包含多个不同的分区。通过一个例子可以最好地说明这一点。以下查询包含三个不同的计数：


    ```

    SELECT MemberID, TourID, Year,

    COUNT(*) OVER() as CountAll,

    COUNT(*) OVER(PARTITION BY TourID) AS CountTour,

    COUNT(*) OVER(PARTITION BY TourID, Year) AS CountTourYear

    FROM Entry;

    ```


    输出如图9-4所示。


    ![A158240_2_En_9_Fig4_HTML.jpg](A158240_2_En_9_Fig4_HTML.jpg)


    图9-4. 在单个查询中使用不同的分区


    在图9-4中，`CountAll`列显示了`COUNT(*) OVER()`的结果，它计算`Entry`表中的每一行（共24行）。


    `CountTour`列是`COUNT(*) OVER(TourID)`的结果，它对具有相同`TourID`值的行进行分区（或分组）然后计数。图9-4顶部的三组实线框显示了对`TourID`为24、25和36的`CountTour`有贡献的行。


    `CountTourYear`列是`COUNT(*) OVER(TourID, Year)`的结果，它对具有相同`TourID`和`Year`值的所有行进行分区。图9-4底部附近的虚线框组展示了这些计数是如何评估的。


    ## Order By Clause


    `OVER()`函数可以包含一个`ORDER BY`子句。这指定了在评估聚合时访问行的顺序。为行指定顺序提供了一种执行累计总和和排名操作的机制。


    ### Cumulative Aggregates


    如果在`OVER()`函数中包含了`ORDER BY`子句，那么默认情况下，聚合是从分区的开始执行到当前行（但更精确的定义见下文）。


    看看下面的查询：


    ```

    SELECT MemberID, TourID, Year,

    COUNT(*) OVER(ORDER BY Year) AS Cumulative

    FROM Entry;

    ```


    在`Entry`表中，我们有几行具有相同的`Year`值（如图9-5所示）。就排序而言，这些行是等效的，因此如果其中一行被包含在计数中，那么我们应该包含所有这些行。我现在将更正哪些行被包含在聚合中的定义。


    ![A158240_2_En_9_Fig5_HTML.jpg](A158240_2_En_9_Fig5_HTML.jpg)


    图9-5. 使用ORDER BY为每年生成累计计数


    如果在`OVER()`函数中包含了`ORDER BY`子句，那么默认情况下，聚合是从分区的开始执行到当前行，并且包括任何后续具有相同排序表达式值的行。


    图9-5中的输出说明了这一点的含义。


    在图9-5中，行按`Year`排序。让我们看看这种累计计数在前几行是如何工作的。对于第一行，如果我们从表的开头计数，我们有1行。然而，接下来的5行具有与我们排序表达式`Year`相同的值，因此我们将它们包含在计数中，得到总共6。


    现在让我们移动到成员258的第一行。从表的开头计数，我们有10行，但接下来的3行具有相同的`Year`值。这总共是13。


    本质上，我们得到了每年条目的累计计数。我们在第一年有6个条目（实线框），在第二年我们有额外的7个条目，总共13个（虚线框）。


    如果`OVER()`函数中有`ORDER BY`子句，`SUM()`函数的工作方式非常相似，可以给我们提供累计总和。


    假设俱乐部在一个名为`Income`的表中收集了来自筹款和锦标赛的收入数据。图9-6显示了前六个月的收入。


    ![A158240_2_En_9_Fig6_HTML.jpg](A158240_2_En_9_Fig6_HTML.jpg)


    图9-6. Income表


    我们可以通过执行一个`SUM(Income)`并在`OVER()`函数中包含`ORDER BY Month`子句来找到收入的累计总和，如下面的查询所示：


    ```

    SELECT Month, Income,

    SUM(Income) OVER(ORDER BY Month) AS RunningTotal

    FROM Income;

    ```


    收入从表的开始累加到当前行（按`Month`的值排序），如图9-7所示。


    ![A158240_2_En_9_Fig7_HTML.jpg](A158240_2_En_9_Fig7_HTML.jpg)


    图9-7. 按月份排序的每月收入累计总和'
  raw: '## Simple Aggregates


    To get started with window functions we will use them to write alternate queries
    for some of the simple aggregates we encountered in Chapter [8](#A158240_2_En_8_Chapter.html).
    Let’s reconsider a simple aggregate query to count and average members’ handicaps:


    ```

    SELECT COUNT(Handicap) AS Count, AVG(Handicap * 1.0)as Average

    FROM Member;

    ```


    The output for the query is shown in Figure [9-1](#A158240_2_En_9_Chapter.html#Fig1).


    ![A158240_2_En_9_Fig1_HTML.jpg](A158240_2_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    Output for simple count and average of handicaps


    With simple aggregates the only attributes allowed in the `SELECT` clause are
    the aggregate and those attributes included in a `GROUP BY` clause. This means
    we no longer have access to the individual handicaps contributing to the results.


    Window functions allow us to retrieve the underlying data along with the aggregates.
    The keyword for window functions is `OVER()`; they are also sometimes referred
    to as over functions.


    Here is a query similar to the preceding one using the `OVER()` function :


    ```

    SELECT MemberID, LastName, FirstName, Handicap,

    COUNT(Handicap) OVER() AS Count,

    AVG(Handicap * 1.0) OVER() as Average

    FROM Member;

    ```


    Unlike the simple `COUNT()` function, with the `OVER()` function we are able to
    include additional fields in the `SELECT` clause. In the preceding query we have
    included four fields of detailed data about each member along with the two aggregates
    (which are indented on new lines to make them easier to read). The aggregates
    are just the same as the simple aggregates but include the `OVER()` function.


    Part of the output of the preceding query is shown in Figure [9-2](#A158240_2_En_9_Chapter.html#Fig2).
    The count and average of the handicaps appear with the detailed data for each
    member.


    ![A158240_2_En_9_Fig2_HTML.jpg](A158240_2_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    Output when using OVER() to count and average handicaps


    While it doesn’t seem particularly useful in the example in Figure [9-2](#A158240_2_En_9_Chapter.html#Fig2)
    to have the aggregates returned for every row, it opens the door to some new queries.
    We are now able to easily compare each individual’s handicap with the average,
    something that was not at all simple without window functions. On the third line
    of the following query we subtract the average of the handicap from the handicap
    for each member and include that in the `SELECT` clause:


    ```

    SELECT MemberID, LastName, FirstName, Handicap,

    AVG(Handicap * 1.0) OVER() AS Average,

    Handicap - AVG(Handicap *1.0) OVER() AS Difference

    FROM Member;

    ```


    The result is displayed in Figure [9-3](#A158240_2_En_9_Chapter.html#Fig3).


    ![A158240_2_En_9_Fig3_HTML.jpg](A158240_2_En_9_Fig3_HTML.jpg)


    Figure 9-3.


    Window functions allow us to compare aggregates with detail values


    ## Partitions


    The `OVER()` function can also be used to produce queries that are similar to
    the `GROUP BY` queries we looked at in the previous chapter. The key phrase we
    need here is `PARTITION BY`. Let’s try some different counts on rows in the `Entry`
    table. If we use just the function `OVER()` with our `COUNT(*)` function, we will
    count all the rows, whereas if we use `OVER(PARTITION BY TourID) it` will count
    the rows for each different value of `TourID`.


    The real power of partitioning is that, unlike the `GROUP BY` clause for simple
    aggregates, it is possible to have several different partitions in a single query.
    This is best explained by an example. The following query includes three different
    counts:


    ```

    SELECT MemberID, TourID, Year,

    COUNT(*) OVER() as CountAll,

    COUNT(*) OVER(PARTITION BY TourID) AS CountTour,

    COUNT(*) OVER(PARTITION BY TourID, Year) AS CountTourYear

    FROM Entry;

    ```


    The output is shown in Figure [9-4](#A158240_2_En_9_Chapter.html#Fig4).


    ![A158240_2_En_9_Fig4_HTML.jpg](A158240_2_En_9_Fig4_HTML.jpg)


    Figure 9-4.


    Using different partitions in a single query


    In Figure [9-4](#A158240_2_En_9_Chapter.html#Fig4) the column `CountAll` displays
    the result of `COUNT(*) OVER()`, which counts every row in the `Entry` table (24).


    The column `CountTour` is the result of `COUNT(*) OVER(TourID)`, which partitions
    (or groups) the rows with the same value of `TourID` and then counts them. The
    top three sets of solid boxes in Figure [9-4](#A158240_2_En_9_Chapter.html#Fig4)
    show the rows contributing to `CountTour` for `TourID` of 24, 25, and 36.


    The column `CountTourYear` is the result of `COUNT(*) OVER(TourID, Year)` and
    partitions all the rows with the same values for `TourID` and `Year`. The set
    of dashed boxes toward the bottom of Figure [9-4](#A158240_2_En_9_Chapter.html#Fig4)
    shows examples of how these counts are evaluated.


    ## Order By Clause


    The `OVER()` function can include an `ORDER BY` clause . This specifies an order
    for the rows to be visited when the aggregates are evaluated. Having an order
    for the rows provides a mechanism for carrying out running totals and ranking
    operations.


    ### Cumulative Aggregates


    If an `ORDER BY` clause is included in the `OVER()` function then, by default,
    the aggregate is carried out from the beginning of the partition to the current
    row (but see below for a more precise definition).


    Have a look at the following query:


    ```

    SELECT MemberID, TourID, Year,

    COUNT(*) OVER(ORDER BY Year) AS Cumulative

    FROM Entry;

    ```


    In the `Entry` table we have several rows with the same value of `Year` (as you
    can see in Figure [9-5](#A158240_2_En_9_Chapter.html#Fig5)). As far as the ordering
    goes, these rows are equivalent, so if one of them is included in a count then
    we should include them all. I’ll now correct the definition of what rows are included
    in the aggregate.


    ![A158240_2_En_9_Fig5_HTML.jpg](A158240_2_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    Using ORDER BY to produce a cumulative count for each year


    If an `ORDER BY` clause is included in the `OVER()` function then, by default,
    the aggregate is carried out from the beginning of the partition to the current
    row, and includes any following rows with the same value of the ordering expression.


    The output in Figure [9-5](#A158240_2_En_9_Chapter.html#Fig5) illustrates what
    this means.


    In Figure [9-5](#A158240_2_En_9_Chapter.html#Fig5) the rows are ordered by `Year`.
    Let’s see how this cumulative counting works for the first few rows. For the first
    row, if we count from the beginning of the table we have 1 row. However, the next
    five rows have the same value for our ordering expression `Year`, so we include
    them in the count, giving us a total of 6.


    Now let’s move down to the first row for member 258\. Counting from the beginning
    of the table we have 10 rows, but the next 3 rows have the same value of `Year`.
    This makes a total of 13.


    Essentially, we have a cumulative count of entries for each year. We have 6 entries
    in the first year (solid boxes), and for the second year we have an additional
    7 entries to make 13 total (dashed boxes).


    The `SUM()` function works in much the same way if there is an `ORDER BY` clause
    in the `OVER()` function to give us running totals.


    Let’s say the club collects data on income from fundraising and tournaments in
    a table called `Income`. Figure [9-6](#A158240_2_En_9_Chapter.html#Fig6) shows
    income for the first six months.


    ![A158240_2_En_9_Fig6_HTML.jpg](A158240_2_En_9_Fig6_HTML.jpg)


    Figure 9-6.


    Income table


    We can find a running total of the income by performing a `SUM(Income)` with an
    `ORDER BY Month` clause in the `OVER()` function, as in the following query:


    ```

    SELECT Month, Income,

    SUM(Income) OVER(ORDER BY Month) AS RunningTotal

    FROM Income;

    ```


    The income is summed from the beginning of the table to the current row (when
    ordered by the value of `Month`), as shown in Figure [9-7](#A158240_2_En_9_Chapter.html#Fig7).


    ![A158240_2_En_9_Fig7_HTML.jpg](A158240_2_En_9_Fig7_HTML.jpg)


    Figure 9-7.


    Running totals for monthly income ordered by month'
