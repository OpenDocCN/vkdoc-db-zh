  trans: '

    ### 过滤聚合查询的结果


    一旦我们为行组计算出了一些聚合值，我们可能想对这些结果提出一些问题。例如，在图 8-9 中，我们有每年每场锦标赛的参赛条目数。一个可能的问题是“哪些锦标赛有
    3 个或更多的参赛条目？”。观察图 8-9 中的结果表，我们想在聚合输出中只选择那些计数值大于或等于`3`的行。我们可以使用`HAVING`关键字来实现这一点。看看下面的查询：


    ```sql

    SELECT TourID, Year, COUNT(*) AS NumEntries

    FROM Entry

    GROUP BY TourID, Year

    HAVING COUNT(*) >= 3;

    ```


    `HAVING`子句总是出现在`GROUP BY`子句之后。聚合和分组操作会先执行，然后选择符合条件（本例中为`COUNT(*) >= 3`）的输出行。这就像有一个作用于聚合数字的`WHERE`子句。顺便提一下，我们必须在`HAVING`子句中使用`COUNT(*)`；我们不能使用第一行语句中的别名`NumEntries`。这个别名只是在查询末尾用来标记输出列。


    让我们看另一个例子。假设我们想找出那些参加了四场或更多锦标赛的会员。首先，构造一个包含会员及其参赛次数计数的行集，如下面查询的前三行所示。然后，我们使用`HAVING`子句从结果中只选择那些`COUNT(*)
    >= 4`的行：


    ```sql

    SELECT MemberID, COUNT(*) AS NumEntries

    FROM Entry

    GROUP BY MemberID

    HAVING COUNT(*) >= 4;

    ```


    在涉及聚合的查询中，我们有两个机会来选择行的子集。如果我们在执行聚合之前选取子集，我们使用`WHERE`子句。当我们想在聚合之后只选择某些行时，我们使用`HAVING`子句。例如，让我们修改之前的查询，以找出哪些会员参加了超过四场公开赛。为了找到公开赛，我们需要执行以下操作：


    将`Entry`表与`Tournament`表连接起来。

    使用`WHERE`子句只选取公开赛的参赛条目子集。

    将每个会员的参赛条目分组并计数。

    获取生成的聚合表，并使用`HAVING`子句只检索计数大于 4 的行。


    此过程如图 8-11 所示。


    ![A158240_2_En_8_Fig11_HTML.jpg](img/A158240_2_En_8_Fig11_HTML.jpg)


    图 8-11.

    查找参加了超过四场公开赛的会员


    图 8-8 所示过程的查询是：


    ```sql

    SELECT MemberID, COUNT(*) AS NumEntries

    FROM Entry e INNER JOIN Tournament t ON e.TourID = t.TourID

    WHERE t.TourType = ''Open''

    GROUP BY MemberID

    HAVING COUNT(*) > 4;

    ```


    在第 2 章中，我们学习了如何对查询结果进行排序。我们也可以根据聚合值对结果进行排序。如果我们想按参赛场次降序查看前一个查询的结果，可以在查询末尾添加一个`ORDER
    BY COUNT(*) DESC`子句。


    ### 使用聚合执行除法运算


    在第 7 章中，我们学习了代数运算中的除法。回顾一下，除法允许我们回答许多包含“所有”或“每一个”这类词语的问题。例如，假设我们想找出那些参加了每一场锦标赛的会员。图
    8-12 回顾了如何使用除法来实现这一点。我们希望在`答案`中返回的属性是`MemberID`。在除法运算符的右侧，是我们需要`检查`对照的事物集合（本例中是`Tournament`表投影出的所有`TourID`值的列表）。在除法运算符的左侧是一个表，它同时包含`答案`和`检查`的属性（本例中是`Entry`表的`MemberID`和`TourID`列）。除法的结果是一个与每一场锦标赛都有关联的`MemberID`值列表（本例中，只有
    ID 为`415`的会员）。


    ![A158240_2_En_8_Fig12_HTML.jpg](img/A158240_2_En_8_Fig12_HTML.jpg)


    图 8-12.

    使用除法找出参加了每一场锦标赛的会员


    此图与图 7-25 相同。


    目前，SQL 的标准实现没有用于除法运算的关键字，因此我们需要找到其他方法来表达如图 8-12 所示的查询。我们在第 7 章中已经看过一种方法，在附录 2
    中还看过一些其他方法。这里，我们将研究一种使用聚合的方法。


    `Tournament`表列出了五场不同的锦标赛。如果我们能找到一个参加了五场不同锦标赛的会员，那么他或她必定参加了所有锦标赛。我们现在有能力使用聚合和分组来构建等同于除法运算的查询。


    我们已经看到过统计每个会员参加了多少场锦标赛的查询。然而，现在我们只想统计每个会员参加的不同锦标赛的数量。在`COUNT()`函数中添加`DISTINCT`关键字可以实现这一点：


    ```sql

    SELECT MemberID, COUNT(DISTINCT TourID) AS NumTours

    FROM Entry e

    GROUP BY MemberID;

    ```


    此查询的结果如图 8-13 所示。


    ![A158240_2_En_8_Fig13_HTML.jpg](img/A158240_2_En_8_Fig13_HTML.jpg)


    图 8-13.

    找出每个会员参加的不同锦标赛的数量


    从图 8-13 的结果表中，我们现在只想获取`NumTours`等于不同锦标赛总数的行，在本例中是`5`。我们可以使用`HAVING`子句来找出那些参加了五场不同锦标赛的会员：


    ```sql

    SELECT MemberID

    FROM Entry e

    GROUP BY MemberID

    HAVING COUNT(DISTINCT TourID) = 5;

    ```


    我们可以通过将`5`替换为一个动态计算不同锦标赛数量的表达式，使这个查询更具通用性：


    ```sql

    SELECT MemberID

    FROM Entry e

    GROUP BY MemberID

    HAVING COUNT(DISTINCT TourID) =

    (SELECT COUNT(DISTINCT TourID) FROM Tournament);

    ```


    这个查询等同于图 8-12 所描述的代数除法运算。它返回参加了每一场锦标赛的会员的 ID。总结一下，我们先统计每个会员参加的不同锦标赛的数量，然后使用`HAVING`子句，只保留那些计数等于可能锦标赛总数（来自`Tournament`表的不同计数）的会员。我发现这种进行除法的方法在概念上比第
    7 章和附录 2 中的方法更直观。当然，所有方法都达到了相同的目标。

    '
- fmt: '# Nested Queries and Aggregates


    We have already lightly covered nested queries and aggregates in Chapter [4](#A158240_2_En_4_Chapter.html).
    It is useful to revisit this idea here. In this chapter, we’ve looked at how to
    find averages, totals, counts, and so on. Now we can use these aggregate results
    in other queries. For example, we might want to find everyone with a handicap
    greater than the average handicap. Consider the following query:


    ```sql

    SELECT * FROM Member

    WHERE Handicap >

    (SELECT AVG (Handicap)

    FROM Member);

    ```


    The inner part of the query returns the average handicap, and the outer part of
    the query compares the handicap of each member with that average.


    Let’s try something else. What about finding members who have entered more than
    three tournaments? If your mind goes blank, you can revert to the outcome approach
    of picturing the tables and figuring out what the rows you want returned will
    look like. Figure [8-14](#A158240_2_En_8_Chapter.html#Fig14) shows how you can
    visualize the query.


    ![A158240_2_En_8_Fig14_HTML.jpg](A158240_2_En_8_Fig14_HTML.jpg)

    **Figure 8-14.**

    Which members have more than three entries in tournaments?


    We can describe the members we want returned like this:


    > Find all the rows `m` from the `Member` table where if we count the number of
    rows `e` from the `Entry` table for that member (`m.MemberID = e.MemberID`) the
    count is > 3.


    This turns into SQL in a straightforward way, as shown here:


    ```sql

    SELECT * FROM Member m

    WHERE

    (SELECT COUNT (*)

    FROM Entry e

    WHERE e.MemberID = m.MemberID) > 3;

    ```


    What about something a bit more complex? How do we find the average number of
    tournaments entered by members? We will need the `AVG()` function, but what are
    we trying to average? We want to count the number of tournaments for each member
    and then average those counts.


    We can use grouping, as described in the previous section, to find the number
    of tournaments entered by each member:


    ```sql

    SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

    GROUP BY MemberID

    ```


    The result of the preceding query is shown in Figure [8-15](#A158240_2_En_8_Chapter.html#Fig15).


    ![A158240_2_En_8_Fig15_HTML.jpg](A158240_2_En_8_Fig15_HTML.jpg)

    **Figure 8-15.**

    Number of entries for each member


    Now we want to find the average of the column `CountEntries`. As a first try,
    it seems reasonable to use our previous query as the inner part of a nested query,
    and then attempt to find the average:


    ```sql

    --Won’t work in some implementations

    SELECT AVG (CountEntries) FROM

    (SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

    GROUP BY MemberID);

    ```


    However, many versions of SQL do not support a nested query in a `FROM` clause.
    The preceding query works fine in Access 2013 but not in some other implementations
    of SQL.


    We encountered a similar problem in the previous chapter when we wanted to join
    a table with the result of a union. We simply give the result of the inner query
    an alias (e.g., `NewTable`). This creates a temporary virtual table (often referred
    to as a derived table). We can then access the attributes of the new virtual table
    as here:


    ```sql

    SELECT AVG (NewTable.CountEntries) FROM

    (SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

    GROUP BY MemberID)AS NewTable;

    ```


    ## Summary


    Aggregate functions provide us with the means to answer a huge range of questions
    about our data. Here is a summary of some of the main points in this chapter.


    Most versions of SQL will offer the simple aggregate functions `MIN()`, `MAX()`,
    `COUNT()`, `SUM()`, and `AVG()`.


    *   For `COUNT()`, you often just want to count rows returned by a query. This
    can be done by including an asterisk in the parentheses: `COUNT(*)`. If you include
    a column name in the parentheses (e.g., `COUNT(Handicap)`) then only the non-null
    values in that column will be included in the count.

    *   For the other common aggregates, you need to include a field name. For `AVG()`
    and `SUM()` this needs to be a numeric expression, such as `AVG(Handicap)`.


    Nulls and duplicates:


    *   Null values are not included when calculating aggregates. For example, `AVG(Handicap)`
    is the sum of the handicaps divided by the number of rows that have a non-null
    value for `Handicap`.

    *   By default, all non-null values are included in the aggregates. You can include
    the keyword `DISTINCT` to remove duplicates. For example, `COUNT(DISTINCT Handicap)`
    will count the number of different values appearing in the `Handicap` column.


    Grouping:


    *   The `GROUP BY` clause can be used to collect rows with the same value of some
    expression together and then apply the aggregates to those groups. For example,
    we can find the number of tournaments each member has entered by grouping together
    all the rows in the `Entry` table with the same value of `MemberID` (e.g., `SELECT
    MemberID, COUNT(*) FROM Entry GROUP BY MemberID`).

    *   After you have grouped and performed an aggregate, you can select rows from
    the resulting table using the keyword `HAVING`. For example, we can find members
    who have entered three or more tournaments by adding the clause `HAVING COUNT(*)
    >= 3` to the expression in the previous item.

    *   Use `WHERE` to select a subset of rows before the grouping and aggregating.
    Use `HAVING` to select a subset of rows after the grouping and aggregating.


    More complex aggregates:


    *   Use derived tables where you want to nest aggregates, such as to find the
    average of counts. Simply give the inner query an alias.

    *   Compare counts of rows to do the equivalent of relational division.


    Footnotes [1](#A158240_2_En_8_Chapter.html#Fn1_source)

    Different versions of SQL will have different functions to do this. In Oracle,
    you might consider using the `CAST` function.


    # 9. Window Functions


    Window functions were added to standard SQL in 2003 and provide considerable extra
    capability for dealing with aggregation. Window functions allow us to perform
    aggregates on a “window” of data based upon the current row. This provides an
    elegant way to specify queries to perform actions such as ranking, running totals,
    and rolling averages. Window functions also provide considerable flexibility when
    it comes to grouping data for aggregation as they allow a single query to have
    several different groups or partitions. It is also possible to reference the data
    contributing to the aggregate from within the query. This allows the underlying
    data to be compared to the aggregate.


    Oracle and Postgres have supported window functions for many years, while SQL
    Server just introduced them in 2012. Access and MySQL do not currently support
    these functions. This chapter outlines how to use a few of the most common window
    functions.'
