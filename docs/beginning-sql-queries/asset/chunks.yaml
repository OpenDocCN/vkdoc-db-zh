  trans: '### 未规范化的数据


    最常见的数据设计错误之一是使用未规范化的表。我们在第 1 章中已经看过这样的例子：本应分为两个表——一个用于存储会员信息，另一个用于存储会费等会员资格信息——却将所有这些数据都存储在单个表中。如图
    12-1 所示，这会导致费用信息被重复存储多次。


    ![A158240_2_En_12_Fig1_HTML.jpg](img/A158240_2_En_12_Fig1_HTML.jpg)

    图 12-1. 一个包含费用信息的、未规范化的 `会员` 表


    那么，现在如果我们被要求查找高级会员的费用会怎样呢？这里的查询将会返回两个值：300 和 250。


    ```sql

    SELECT DISTINCT Fee

    FROM Member

    WHERE MemberType = ''Senior''

    ```


    虽然查询返回的两个值可能令人惊讶，但查询本身或其结果并没有错。Brenda Nolan 的值与其他高级会员不一致，导致我们得到了额外的费用结果。这个值可能是一个输入错误，或者表示
    Brenda 享受了某种折扣，又或者它是去年尚未更新的费用实例。无论哪种情况，设计上都存在问题。设计应该允许为每个等级的常规费用进行一致地记录，并在必要时允许存储额外的折扣方案。此时，除了重新设计表结构，我们别无他法，只能返回已记录在高级会员名下的费用列表。重要的是理解其背后的根本问题。


    你可能遇到的另一个问题是，单个表存储了多值数据。我们一直在使用的俱乐部表版本允许一个会员只属于一个团队。俱乐部可能会发展出多种不同类型的团队（俱乐部间团队、社交团队、双人组、四人组等），会员可以同时属于多个团队。当需要为会员记录第二个团队时，一个常见的短期解决方案是在现有表中添加另一个
    `团队` 列。图 12-2 展示了 `会员` 表可能如何演变为允许会员关联最多三个团队。


    ![A158240_2_En_12_Fig2_HTML.jpg](img/A158240_2_En_12_Fig2_HTML.jpg)

    图 12-2. 为会员存储多个团队的糟糕表设计


    现在，假设我们被要求查找在 `团队 B` 中的会员。Brenda 在 `团队 1` 列中有 `团队 B`，Helen 在 `团队 2` 列中有 `团队 B`，Thomas
    在 `团队 3` 列中有 `团队 B`。我们需要检查每个团队列是否存在 `团队 B`。这并不困难，如下列查询所示：


    ```sql

    SELECT * FROM Member

    WHERE Team1 = ''TeamB'' OR Team2 = ''TeamB'' OR Team3 = ''TeamB'';

    ```


    虽然我们可以从图 12-2 的表中提取所需信息，但这种设计会带来问题。如果我们遇到类似“查找同时在 `团队 A` 和 `团队 B` 中的会员”或“查找在两个以上团队中的会员”这样的查询，我们就会遇到麻烦。你或许能设计出回答这些问题的查询，但它们会很笨拙。在尝试满足此类请求之前，我会要求对数据库进行适当重新设计。如果你遇到阻力，可以问他们：如果一个会员属于四个团队甚至二十个团队，他们会怎么办。


    如果会员可以属于多个团队，那么我们面对的就是一个 `多对多` 关系，这应该在关系数据库中使用一个中间的 `会员资格` 表¹ 来表示——类似于图 12-3 中的表。


    ![A158240_2_En_12_Fig3_HTML.jpg](img/A158240_2_En_12_Fig3_HTML.jpg)

    图 12-3. 记录会员与团队之间关系的 `会员资格` 表


    图 12-3 中的 `会员资格` 表记录了会员与团队之间的关系，与记录会员和锦标赛关系的 `参赛` 表非常相似。`会员资格` 表需要与 `会员` 表进行连接才能找到关联的姓名，但一旦完成连接，我们就能得到与图
    12-2 中相同的信息。有了新的 `会员资格` 表，我们现在就可以使用前面章节描述的所有关系运算，轻松地回答诸如“谁在 `团队 A` 和 `团队 B` 中？”以及“谁在三个或更多团队中？”这样的问题。


    我们可以用以下 SQL 代码创建一个 `会员资格` 表。该表仅包含两个外键，分别指向现有的 `会员` 和 `团队` 表，这些字段也共同构成一个连接主键。


    ```sql

    CREATE TABLE Membership(

    MemberID INT FOREIGN KEY REFERENCES Member,

    Team CHAR(20) FOREIGN KEY REFERENCES Team,

    PRIMARY KEY (MemberID, Team) );

    ```


    如果你不介意进行一些手动操作，你可以使用类似下面这样的重复更新查询来填充新的 `会员资格` 表：


    ```sql

    INSERT INTO Membership (MemberID, Team)

    SELECT MemberID, ''TeamA''

    FROM Member

    WHERE Team1 = ''TeamA'' OR Team2 = ''TeamA'' OR Team3 = ''TeamA'';

    ```


    该查询找出每个在 `团队 A` 中的会员，并在 `会员资格` 表中创建相应的行。如果团队数量不多，你可以手动为每个团队（`团队 A`、`团队 B` 等）修改查询的第二行和最后一行，从而相当快速地填充新的
    `会员资格` 表。然后，你需要从图 12-2 的 `会员` 表中删除 `团队` 列，这样数据库将得到极大改进。'
- fmt: '### Tables with No Primary Key


    The previous section gave an example of the problems you can run into if the underlying
    database has inappropriate tables. You will sometimes find that the database has
    the correct tables, but they do not have suitable primary or foreign key constraints.
    In these cases, the underlying data values are likely to be inconsistent. While
    your queries may be correctly formed, the results will be unreliable. In this
    section, you will see how you can use queries to find some inconsistencies that
    may be present in your data.


    Suppose that the `Membership` table in Figure [12-3](#A158240_2_En_12_Chapter.html#Fig3)
    had been created without a primary key. This would allow the table to have duplicate
    rows. For example, we might have two identical rows for member 153 being on `TeamB`.
    A query to count the number of members on `TeamB` will produce an incorrect result.


    If you try to add a primary key when duplicates already exist, you will get an
    error. This is one way to find where problems are! Before you can add a primary
    key you will need to find the duplicated rows and investigate how to resolve the
    issue. One convenient way to find duplicated values is to do a `GROUP BY` query
    (see Chapter [7](#A158240_2_En_7_Chapter.html)) on the fields that should be unique
    and use a `HAVING` clause to find those with two or more entries. The following
    query will return duplicated values for our potential primary key fields `MemberID`
    and `Team`:


    ```sql

    SELECT MemberID, Team, Count(*)

    FROM Membership

    GROUP BY MemberID, Team

    HAVING Count(*) > 1;

    ```


    If the table has fields other than the primary key fields, you need to manually
    inspect the values in those columns to decide which row should be deleted. The
    `Membership` table, which has only primary key fields, causes a different problem.
    How do we delete just one copy of the row for member 153 in `TeamB`? Because the
    entire rows are the same, we can’t differentiate them, and so any query that deletes
    one row will delete both. Your software might have a tabular-like interface that
    will allow you to delete just one of the rows, but if not you may have to delete
    both rows and manually add one back. If there are a lot of duplicate values, then
    another way to resolve the situation is to create a new table and then insert
    just the distinct values from the original table. The following query shows how
    to populate the new table `NewMembership`:


    ```sql

    INSERT INTO NewMembership

    SELECT DISTINCT MemberID, Team

    FROM Membership;

    ```


    You will then need to remove all the foreign key constraints referencing the old
    table, delete that table, rename the new table, and recreate the foreign keys.
    It’s easier to make sure every table has a primary key from the start!


    ### Tables with Missing Foreign Keys


    Another problem is having a `Membership` table (as in Figure [12-3](#A158240_2_En_12_Chapter.html#Fig3))
    with no foreign key constraints. We can then find ourselves with the problem of
    having a row for member 1118 being in `TeamA` when no member 1118 is listed in
    the `Member` table. We will not be able to add a foreign key constraint if the
    data has this sort of problem.


    There are several ways to find such values of `MemberID` in the `Membership` table
    that do not have a matching entry in the `Member` table. One way is to use a nested
    query (discussed in Chapter [4](#A158240_2_En_4_Chapter.html)), as shown here:


    ```sql

    SELECT ms.MemberID FROM Membership ms

    WHERE ms.MemberID NOT IN

    (SELECT m.MemberID FROM Member m);

    ```


    Having found the unmatched values for `MemberID`, we will then have to decide
    if it is a typographical error or if we are missing a member from the `Member`
    table.


    When the data is in a consistent state it will be possible to add a foreign key
    constraint to the `Membership` table to make sure it stays that way. The following
    query will add the constraint to the `MemberID` field:


    ```sql

    ALTER TABLE Membership

    ADD FOREIGN KEY (MemberID)

    REFERENCES Member;

    ```


    ### Similar Data in Two Tables


    Sometimes a database might have extra tables that are not required and will cause
    problems. An example for our club database might be having a separate table for
    coaches or managers, as shown in Figure [12-4](#A158240_2_En_12_Chapter.html#Fig4).
    The rationale might have been that the extra table would make it easier to create
    lists of coaches and their phone numbers (which would otherwise require a self
    join or nested query).


    ![A158240_2_En_12_Fig4_HTML.jpg](A158240_2_En_12_Fig4_HTML.jpg)

    *Figure 12-4. An additional table for coaches can lead to inconsistent data*


    The additional table will inevitably cause problems. In Figure [12-4](#A158240_2_En_12_Chapter.html#Fig4),
    we already see inconsistent data for William Cooper’s phone number. The only real
    cure is to get rid of the extra table.


    If the purpose of an additional table like the one in Figure [12-4](#A158240_2_En_12_Chapter.html#Fig4)
    is unclear, we can use set operations to investigate which members appear in each
    of the tables. The intersection operator will find rows for people who are in
    both tables, and the difference operator will find those people who are in one
    and not the other. This may help with understanding what the tables represent.


    Once the design is correct, creating a view that shows the coach information would
    be helpful for users who don’t want to be creating self joins every time they
    want information just about coaches. The following query does the trick:


    ```sql

    CREATE VIEW CoachInfo AS

    SELECT * FROM Member

    WHERE MemberID IN

    (SELECT Coach FROM Member);

    ```'
