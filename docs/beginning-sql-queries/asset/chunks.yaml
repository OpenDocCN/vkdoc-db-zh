  trans: '

    ## 涉及哪些表？


    一旦我们理解了数据库中的表以及它们之间的关系（概念上的以及通过外键存在的关系），我们就可以查看需要哪些表来提取所需的数据子集。考虑这样一个查询：“找出所有参加过利斯顿锦标赛的男性”。这句话包含几个关键词。名词通常是线索，告诉我们可能需要哪些表或字段。动词则常常帮助我们发现关系。让我们看看这些名词。“锦标赛”是一个重要线索，我们有一个
    `Tournament` 表，这是一个起点。单词“男性”是查询描述中的另一个名词。我们没有一个 `Men` 表，但我们确实有一个 `Member` 表，其中包含一个
    `Gender` 字段。


    因此，很明显，`Member` 和 `Tournament` 表将在我们的查询中发挥作用。现在我们需要弄清楚这两个表是如何关联的。图 11-4 显示了包含这两个表的
    SQL Server 数据库关系图部分。我们看到它们不是直接相关的，而是通过 `Entry` 表连接起来的。这很有道理，因为动词“参加”就在我们的查询描述中。


    ![A158240_2_En_11_Fig4_HTML.jpg](img/A158240_2_En_11_Fig4_HTML.jpg)


    图 11-4. 显示 Member 和 Tournament 表的部分数据库关系图


    所以，看起来至少有三个表会涉及我们的查询：`Member`、`Tournament` 和 `Entry`。然后，我们利用对关系运算符的理解来确定如何组合这些表。我们需要连接（join）还是联合（union），或者是这些运算符与其他关系运算符的某种组合？我们将在本章后续章节中探讨如何帮助决定合适的操作。


    ## 查看一些数据值


    从数据库检索信息的请求通常是以相当非正式且不精确的自然语言表述的。即使是一个简单的请求，比如“找出所有参加过利斯顿锦标赛的男性”，也有几点需要我们澄清。查看表中的实际数据有时会有所帮助。


    我们的查询实际上并不是“找出”这些男性，而是返回关于他们的一些信息。查看表中的数据值将帮助我们决定哪些信息可能是有用的。提问者大概希望看到这些男性的姓名。我们是否也需要
    ID？如果我们想要区分两个同名的成员，就需要 ID。


    问题中的某些词指的是什么可能并不总是那么清楚。什么是“利斯顿”锦标赛？利斯顿是一个锦标赛的名称、一种锦标赛的类型，还是一个地点？查看 `Tournament`
    表的几行数据可以帮助我们。我们看到 `TourName` 字段里这儿那儿都有值为“Leeston”的情况。有时，确定查询描述中不精确的词所指可能并不那么容易。可能需要与开发人员或用户交谈，以更好地理解他们想要检索什么信息。


    我们如何确定哪些成员是男性？幸运的是，`Member` 表有一个 `Gender` 列，看起来我们需要值为 `M` 的行。只选择值为 `M` 的行是否足够？会不会有些行的值是
    `m` 或 `Male`？我们将在下一章讨论如何处理数据不一致的问题。现在，我们假设男性由 `M` 表示。


    对于本示例中的简单查询，我们现在有了一个更精确的描述。它类似于：“检索 `Gender = ''M''` 且参加了 `TourName = ''Leeston''`
    的锦标赛的男性的 `MemberID`、`LastName` 和 `FirstName`。”


    你可能还会想到其他需要澄清的细节。询问为什么需要这些信息通常是个好主意。我们只是想找出哪些男性曾经去过利斯顿（因为我们想向其中一人询问有关高尔夫球场的问题），还是我们想知道我们的男性俱乐部成员参加利斯顿锦标赛的次数（因为我们对这个锦标赛在俱乐部成员中的受欢迎程度感兴趣）？正如你将在接下来的“保留适当的列”一节中看到的，这些问题的答案可能不同。


    ## 宏观方法


    我第一次尝试写查询时，很少能做到优雅或完整。对于像“找出所有参加过利斯顿锦标赛的男性”这样的查询，我可能会用两种方式来处理，这取决于我的灵感如何工作。一种方法是宏观法。如果我对如何组合表有点想法，我就会这样做。我将在“不知从何入手？”一节中介绍另一种策略，当我完全不知道从哪里开始时，我会使用它！


    在宏观方法中，我喜欢组合所有我需要的表并保留所有列，这样我就能看到发生了什么。我通常发现打开某种 SQL 窗口最容易，这样我可以尝试小的查询，看看中间结果对于回答整体问题是否有希望。


    让我们看看查询“找出所有参加过利斯顿锦标赛的男性”的宏观方法。我们确定需要三个表：`Member`、`Entry` 和 `Tournament`。这些表都通过外键连接，这通常意味着连接（join）会很有用。如果你不清楚连接是否是该查询所需要的，那么请参考本章后面“不知从何入手？”部分的方法。


    ### 组合表


    让我们假设，我们认为连接表对于这个关于男性参加利斯顿锦标赛的查询看起来是一个有希望的方法。你不必一次完成所有事情。从一些小查询开始，慢慢看看情况如何发展。


    要执行连接，我们需要找到用于连接的字段。如果需要复习关于连接兼容字段的知识，请回顾第 3 章。`Entry` 表对于此查询至关重要，因为它连接了 `Member`
    和 `Tournament` 表。`Entry` 表有一个名为 `TourID` 的外键字段，我们可以将其与 `Tournament` 表的主键连接起来。先做到这一步。


    ```

    SELECT * FROM

    Tournament t INNER JOIN Entry e ON t.TourID = e.TourID;

    ```


    图 11-5 显示了结果虚拟表的几行。


    ![A158240_2_En_11_Fig5_HTML.jpg](img/A158240_2_En_11_Fig5_HTML.jpg)


    图 11-5. 连接 Tournament 和 Entry 表的部分结果


    图 11-5 所示的结果当然很有帮助。我们可以看到参赛记录和相应锦标赛的名称。从前两行可以看出，成员 118 和 228 参加了利斯顿锦标赛。现在我们需要弄清楚
    118、228 和其他参加该锦标赛的成员是否是男性，并找到他们的名字。我们可以通过在 `MemberID` 字段上将图 11-5 中的虚拟表与 `Member`
    表连接来获取这些额外信息：


    ```

    SELECT * FROM

    (Tournament t INNER JOIN Entry e ON t.TourID=e.TourID)

    INNER JOIN Member m ON m.MemberID = e.MemberID;

    ```


    图 11-6 显示了结果。我在图 11-6 中没有包含所有列，因为列数很多。你很快就会明白为什么我喜欢尽可能长时间地保留所有列。


    ![A158240_2_En_11_Fig6_HTML.jpg](img/A158240_2_En_11_Fig6_HTML.jpg)


    图 11-6. 连接 Tournament、Entry 和 Member 表的部分结果（仅显示部分列）


    图 11-6 中显示的虚拟表拥有我们需要查找所需数据的全部信息。前两行显示成员 118 和 228 是女性。成员 286 的行（带有圆圈标记）看起来更有希望。我们该如何修改查询以找到合适的行子集和列子集？

