  trans: '## 进行简单计数


    除了从表中检索单元行和列子集，我们还可以使用 SQL 查询来提供一些统计数据。SQL 函数允许我们统计记录数量、计算总和或平均值、查找最大值和最小值等。在本节中，我们将看一些用于统计记录的简单查询。我们将在第
    8 章回到这个主题。


    我们可以使用`COUNT`函数返回`Member`表中的记录数。在下面的查询中，`*`表示统计每一条记录：

    ```

    SELECT COUNT(*) FROM Member

    ```


    我们还可以通过添加`WHERE`子句来指定要包含的行，从而对行的子集进行计数。例如，我们可以使用以下查询来统计资深会员的数量：

    ```

    SELECT COUNT(*) FROM Member m

    WHERE m.MemberType = ''Senior''

    ```


    由于我们刚才讨论了空值和重复值，在此简要提及它们如何影响我们的计数是值得的。我们可以将诸如`Handicap`这样的属性放在括号内，而不是使用`*`作为`COUNT`函数的参数来统计所有行。如果我们这样做，只有`Handicap`字段有值的行才会被包括在计数中。

    ```

    SELECT COUNT(Handicap) FROM Member

    ```


    我们还可以指定要统计某个属性的不同值的数量。如果我们想知道`Member`表中出现了多少种不同的`MemberType`值，那么可以使用以下查询：

    ```

    SELECT COUNT(DISTINCT MemberType) FROM Member

    ```


    值得重申的是，不同的数据库软件会支持 SQL 标准语法的不同部分。例如，Microsoft Access 目前不支持前面查询中看到的`COUNT(DISTINCT
    MemberType)`。通常有方法可以绕过这些差异来找到等效的查询，我们将在第 8 章中探讨如何改写前面的查询以及其他与聚合和汇总相关的问题。


    ## 避免常见错误


    从单个表中检索单元行和列子集是最简单的 SQL 查询。然而，你已经看到仍然需要小心。重要的是要记住你的表中会有空值，并仔细考虑你的选择条件将如何处理它们。你还需要记住，如果你不保留表中的主键字段，就有可能产生重复行，你必须适当地处理它们。


    在选择行的子集时，还有其他几个常见的错误。在像`Member`这样的表中，这些错误并不明显，因此我将介绍高尔夫俱乐部数据库中的一些其他表。图 2-10 展示了`Member`表的部分内容以及另外两个表：`Entry`和`Tournament`。`Entry`表中的第一行记录了人员
    118（Melissa McKenzie）在 2014 年报名参加了比赛 24（Leeston）。


    ![A158240_2_En_2_Fig10_HTML.jpg](img/A158240_2_En_2_Fig10_HTML.jpg)

    *图 2-10. 介绍 Tournament 和 Entry 表*


    我们可以使用一些已经见过的 SQL 操作来处理`Entry`表，以回答诸如人员 258 报名参加了哪些比赛（仅`TourID`编号）、谁（仅`MemberID`编号）曾报名参加比赛
    24，或谁在 2015 年报名参加了比赛 36 等问题。以下是最后一个查询的 SQL：

    ```

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID = 36 AND e.Year = 2015

    ```


    ### 错误地使用 WHERE 子句来回答包含“both（两者都）”的问题


    在上一节中，我们使用逻辑运算符`AND`在`Entry`表中查找`TourID = 36`和`Year = 2015`都为真的行。


    假设我们想找出那些既报名参加了比赛 36 又报名参加了比赛 38 的成员。人们很容易再次使用`AND`运算符，并将查询写成如下形式：

    ```

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID = 36 AND e.TourID= 38

    ```


    你能推断出这个查询将返回什么吗？这时，像图 2-11 那样，用行变量`e`来审视`Entry`表中的每一行会很有帮助。


    ![A158240_2_En_2_Fig11_HTML.jpg](img/A158240_2_En_2_Fig11_HTML.jpg)

    *图 2-11. 行变量 e 独立地调查每一行。*


    想象我们的手指正指向图中所示的那一行。这一行（415, 36, 2015）满足条件`e.TourID = 36 AND e.TourID= 38`吗？它满足第一部分，但`AND`运算符要求该行同时满足两个条件。在我们的表中，没有任何一行会在比赛列中同时包含
    36 和 38，因为每一行只对应一次报名。我们建议的 SQL 查询永远不会找到任何行；它总是返回一个空表。如果我们将布尔运算符改为`OR`，我们将得到图 2-10
    中指出的那一行；然而，我们也会得到任何报名参加了 36 或 38 比赛的人，而不一定是两者都参加了。


    这个特定的查询无法用简单的`WHERE`子句解决。根据定义，`WHERE`中的条件独立地应用于每一行。要回答谁同时报名参加了两项比赛的问题，我们需要同时查看`Entry`表中的多行（即用两根手指）。如果我们用两根手指，一根指向图
    2-10 所示的那一行，另一根指向下面这一行，那么我们可以推断出 415 报名参加了两项比赛。我们将在第 5 章中学习如何做到这一点。


    ### 错误地使用 WHERE 子句来回答包含“not（未）”的问题


    现在让我们考虑另一个常见的错误。使用条件`e.TourID = 38`很容易找到报名参加了比赛 38 的人。人们很容易想通过稍微修改条件来检索那些**没有**报名参加比赛
    38 的人。你能推断出下面的 SQL 查询将检索哪些行吗？

    ```

    SELECT e.MemberID

    FROM Entry e

    WHERE e.TourID <> 38

    ```


    图 2-11 中手指指向的那一行呢？它满足`e.TourID <> 38`吗？它当然满足。但这并不意味着 415 没有参加比赛 38（后面一行说他参加了）。这个查询实际上返回了所有报名参加了**某个**不是
    38 的比赛的人（这很可能不是你想问的问题！）。


    这是另一种无法用查看表中独立行的简单`WHERE`子句来回答的问题。事实上，我们甚至无法用一个只涉及`Entry`表的查询来回答这个问题。成员 138，Michael
    Stone，没有报名参加比赛 38，但他甚至没有在`Entry`表中被提及，因为他根本没有报名参加过任何比赛。我们将在第 7 章中学习如何处理这类问题。'
- fmt: '## Summary


    In this chapter, we have looked at queries on a single table. Some of the main
    points covered are:


    *   We can return a subset of rows that satisfy a given condition by using a `WHERE`
    clause. The condition is a Boolean expression, which is a statement that is either
    true or not true. The condition is applied to each row of the table independently.

    *   The `SELECT` clause allows us to specify a subset of columns.

    *   Because the result of a query is a set of rows, we cannot guarantee the order
    in which the rows will be returned. If we want to display the result in a particular
    order, we can use the `ORDER BY` clause.

    *   It is possible to create a view, which essentially stores an SQL command so
    that you can run it over and over again as the data in the base tables change.

    *   Tables are likely to have null values (both on purpose and by mistake). Always
    check how your conditions will apply to null values.

    *   When you project a subset of columns using an SQL command, the default is
    to retain duplicate rows in the result. Always think about how you need to deal
    with the duplicates, and use the keyword `DISTINCT` if you want unique rows.

    *   The `WHERE` clause considers only one row at a time. Don’t use it for queries
    that require you to look at several rows at once, as in who entered both tournaments
    or who did not enter this tournament.


    Footnotes [1](#A158240_2_En_2_Chapter.html#Fn1_source)

    In the formal terms of relational algebra, retrieving a subset of rows (tuples)
    from a table (relation) is known as the select operation and retrieving a subset
    of attributes (columns) is known as the project operation. See Appendix 2 for
    more information.


    [2](#A158240_2_En_2_Chapter.html#Fn2_source)

    [http://www.asciitable.com/](http://www.asciitable.com/)


    [3](#A158240_2_En_2_Chapter.html#Fn3_source)

    Formally, in terms of relational algebra, the result of every operation will generate
    another relation or set of unique rows. See Appendix 2 for more information.


    # 3. A First Look at Joins


    In the previous chapter, we looked at how to retrieve subsets of rows and/or columns
    from a single table. We saw in Chapter [1](#A158240_2_En_1_Chapter.html) that
    to keep data accurately in a database, different aspects of the information need
    to be separated into normalized tables. Most queries will require information
    from two or more tables. We can combine data from two tables in several different
    ways depending on the nature of the information we are trying to extract. The
    most often encountered two-table operation is the join. In Chapter [1](#A158240_2_En_1_Chapter.html)
    we also introduced two different ways to approach a query: the process approach
    and the outcome approach. The first describes how we will combine the tables to
    achieve the required data, while the second describes what criteria the retrieved
    data must satisfy.


    ## The Process Approach to Joins


    A join enables us to combine related data from two tables. The example we will
    start with uses the `Member` and `Type` tables in order to find the membership
    fees for each member of the golf club. The first step in carrying out a join is
    an operation called a Cartesian product.


    ### Cartesian Product


    A Cartesian product is the most versatile operation between two tables because
    it can be applied to any two tables of any shape. Having said that, it rarely
    produces particularly useful information on its own, so its main claim to fame
    is as the first step of a join.


    A Cartesian product is a bit like putting two tables side by side. Let’s have
    a look at the two tables in Figure [3-1](#A158240_2_En_3_Chapter.html#Fig1): an
    abbreviated `Member` table and the `Type` table.


    ![A158240_2_En_3_Fig1_HTML.jpg](A158240_2_En_3_Fig1_HTML.jpg)

    *Figure 3-1. Two permanent tables in the database*


    The virtual table resulting from the Cartesian product will have a column for
    each column in the two contributing tables. The rows in the resulting table consist
    of every combination of rows from the original tables. Figure [3-2](#A158240_2_En_3_Chapter.html#Fig2)
    shows the first few rows of the Cartesian product.


    ![A158240_2_En_3_Fig2_HTML.jpg](A158240_2_En_3_Fig2_HTML.jpg)

    *Figure 3-2. First few rows of the Cartesian product between Member and Type tables*


    We have the four columns from the `Member` table and the two columns from the
    `Type` table, which gives us six columns total. Each row from the `Member` table
    appears in the resulting table alongside each row from the `Type` table. We have
    Melissa McKenzie appearing on four rows `—` once with each of the four rows in
    the `Type` table (Associate, Junior, Senior, Social). The total number of rows
    will be the number of rows in each table multiplied together; in other words,
    for this cut-down `Member` table, we have 10 rows times 4 rows (from `Type`),
    giving a total of 40 rows. Cartesian products can produce very, very large result
    tables, which is why they don’t give us much useful information on their own.


    A Cartesian product operation is represented in SQL by `CROSS JOIN`. The SQL to
    retrieve the data shown in Figure [3-2](#A158240_2_En_3_Chapter.html#Fig2) is:


    ```sql

    SELECT *

    FROM Member m CROSS JOIN Type t;

    ```


    Not all versions of SQL support the same keywords and phrases (e.g., Microsoft
    Access 2013 does not support the `CROSS JOIN` key phrase). In 1992, keywords representing
    some relational algebra operations (such as `CROSS JOIN`) were added to the SQL
    standard,[¹](#A158240_2_En_3_Chapter.html#Fn1) and there have been a number of
    updates since then. However, not all vendors incorporate all parts of the standard,
    and other vendors provide additional functionality. Later in the chapter we will
    look at the outcome approach to provide equivalent ways of expressing queries
    that will work when the relational algebra operation keywords are not available.'
