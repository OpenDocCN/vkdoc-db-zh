  trans: '## 交集的用途


    交集操作的一个常见用途如图 7-13 所示：在两个具有相似信息的表中查找共同的行。另一个非常常见的交集用途是回答包含“都”这个词的问题。一个典型例子是“哪些成员**同时参加了**第
    36 和 38 号锦标赛？” `Entry`（参赛）表如图 7-14 所示。


    ![A158240_2_En_7_Fig14_HTML.jpg](img/A158240_2_En_7_Fig14_HTML.jpg)


    图 7-14. `Entry` 表


    如果我们像下面这个查询一样，检索每个锦标赛的行并取其交集，会返回什么结果？


    ```sql

    SELECT * FROM Entry WHERE TourID = 36

    INTERSECT

    SELECT * FROM Entry WHERE TourID = 38;

    ```


    将不会返回任何行。图 7-15 将帮助你理解原因。


    ![A158240_2_En_7_Fig15_HTML.jpg](img/A158240_2_En_7_Fig15_HTML.jpg)


    图 7-15. 两个查询没有共同的行，因此交集没有结果


    这两个查询永远不会有任何共同的行，因为一个查询的 `TourID` 列值总是 36，而另一个总是 38。本质上，我们试图执行的查询是找出所有**既是**36
    号锦标赛参赛记录**也是**38 号锦标赛参赛记录的条目。根据我们管理参赛记录的方式，结果是没有。


    要检索图 7-15 中两组行里共同的成员，我们必须在执行交集之前只检索 `MemberID` 列，如下面的查询所示：


    ```sql

    SELECT MemberID FROM Entry WHERE Tourid = 36

    INTERSECT

    SELECT MemberID FROM Entry WHERE Tourid = 38;

    ```


    此查询如图 7-16 所示。与并集一样，交集操作的结果返回的是唯一行。


    ![A158240_2_En_7_Fig16_HTML.jpg](img/A158240_2_En_7_Fig16_HTML.jpg)


    图 7-16. 使用交集查找同时参加了锦标赛 36 和 38 的成员


    假设我们现在想找出成员的姓名。从过程的角度来看，我们可以获取交集的结果，并将其与 `Member` 表连接以获得姓名，如图 7-17 所示。


    ![A158240_2_En_7_Fig17_HTML.jpg](img/A158240_2_En_7_Fig17_HTML.jpg)


    图 7-17. 将交集与 `Member` 表连接以查找姓名


    那么，首先执行交集然后与 `Member` 表连接的 SQL 是什么样的？以下是第一次尝试，但不幸的是，它**无法工作**：


    ```sql

    --Will not work

    SELECT LastName, FirstName

    FROM Member m INNER JOIN

    (SELECT e1.MemberID FROM Entry e1 WHERE e1.TourID = 36

    INTERSECT

    SELECT e2.MemberID FROM Entry e2 WHERE e2.TourID = 38)

    ON m.MemberID = e1.MemberID;

    ```


    只出现在内层查询（括号内的部分）中的表不能被外层查询（连接）引用。这可以通过给嵌套的查询部分起一个别名来轻松解决。就像我们在 `FROM` 子句中 `Member`
    后面加上 `m` 来给 `Member` 表起别名一样，我们可以在内层查询的最后括号后加上 `NewTable`（例如）来给整个内层查询起一个别名。我们现在可以在连接条件中引用该别名，如下面的查询所示：


    ```sql

    SELECT LastName, FirstName

    FROM Member m INNER JOIN

    (SELECT e1.MemberID FROM Entry e1 WHERE e1.TourID = 36

    INTERSECT

    SELECT e2.MemberID FROM Entry e2 WHERE e2.TourID = 38) NewTable

    ON m.MemberID = NewTable.MemberID;

    ```


    另一种检索姓名的方法是使用嵌套查询。这里，内层查询检索交集中的 ID，外层查询从 `Member` 表中找到对应的姓名。


    ```sql

    SELECT LastName, FirstName

    FROM Member

    WHERE MemberID IN

    (SELECT MemberID FROM Entry WHERE TourID = 36

    INTERSECT

    SELECT MemberID FROM Entry WHERE TourID = 38);

    ```


    ### 投影适当列的重要性


    仔细考虑交集操作涉及的表中包含哪些列非常重要。我们在上一节看到，以下查询将返回空行：


    ```sql

    SELECT * FROM Entry WHERE TourID = 36

    INTERSECT

    SELECT * FROM Entry WHERE TourID = 38;

    ```


    第一个查询的行中 `TourID` 的值总是 36，而第二个查询的行中 `TourID` 的值总是 38。永远不会有共同的行。在每个查询中只检索 `MemberID`
    解决了这个问题。


    更有趣的是，正确地投影不同的列可以回答截然不同的问题。你会如何描述以下查询返回的行？


    ```sql

    SELECT MemberID, Year FROM Entry WHERE TourID = 25

    INTERSECT

    SELECT MemberID, Year FROM Entry WHERE TourID = 36;

    ```


    该查询如图 7-18 所示。


    ![A158240_2_En_7_Fig18_HTML.jpg](img/A158240_2_En_7_Fig18_HTML.jpg)


    图 7-18. 这个交集表示什么？


    在图 7-18 中，我们正在查找所有在**同一年**参加了第 25 和 36 号锦标赛的成员。这就是为什么成员 415 没有出现在交集中：他在 2013 年参加了第
    25 号锦标赛，在 2014 年和 2015 年参加了第 36 号锦标赛。虽然他的成员 ID 出现在两个源表中，但对应的行属于不同的年份。没有哪个成员 415
    的行在两张表中是完全相同的。


    如你所见，为参与交集的表选择投影哪些列，对于交集中将出现什么内容至关重要。这意味着可以非常优雅地回答许多不同的问题，但也意味着如果你没有仔细考虑查询，很容易得到错误的答案。'
- fmt: '# Managing Without the INTERSECT Keyword


    Not all implementations of SQL support intersection explicitly. However, we have
    other ways to perform the queries involving “both.” Intersection is a process
    approach `—` we are saying what operations we need to carry out on the tables
    involved in the query. If we don’t succeed with this approach then we can try
    the outcome approach. This involves figuring out some possible answers by inspecting
    the tables and not worrying about operations such as intersections and joins.
    In Figure [7-19](#A158240_2_En_7_Chapter.html#Fig19) we imagine two fingers traversing
    the rows of the `Entry` table. We need to find two rows in the `Entry` table with
    the same `MemberID`: one with `TourID` = 36 and one with `TourID` = 38.


    ![A158240_2_En_7_Fig19_HTML.jpg](A158240_2_En_7_Fig19_HTML.jpg)

    Figure 7-19. Finding members who have entered both tournaments 36 and 38


    The situation that Figure [7-19](#A158240_2_En_7_Chapter.html#Fig19) is depicting
    can be described as:


    > Return me the `MemberID` from a row `e1` in the `Entry` table where `TourID=36`
    if there is another row `e2` in the `Entry` table that has the same `MemberID`
    and `TourID=38`.


    The SQL expression equivalent to this description and Figure [7-19](#A158240_2_En_7_Chapter.html#Fig19)
    is:


    ```sql

    SELECT DISTINCT e1.MemberID

    FROM Entry e1, Entry e2

    WHERE e1.MemberID = e2.MemberID

    AND e1.TourID = 36 AND e2.TourID = 38;

    ```


    What about the query to find the rows that appear in both the `ClubA` and `ClubB`
    tables? The club tables are redisplayed in Figure [7-20](#A158240_2_En_7_Chapter.html#Fig20).
    To find the rows that are the same in both tables we need to check each of the
    values in the corresponding columns to ensure they are the same.


    ![A158240_2_En_7_Fig20_HTML.jpg](A158240_2_En_7_Fig20_HTML.jpg)

    Figure 7-20. Finding the intersection between ClubA and ClubB


    The situation depicted in Figure [7-20](#A158240_2_En_7_Chapter.html#Fig20) can
    be described as:


    > I will return row `a` from table `ClubA` if there is a row `b` in `ClubB` that
    has identical values in all the fields (i.e., `a.RegNum = b.MemberID, a.FamilyName
    = b.LastName`, and `a.Name = b.FirstName`).


    The SQL for the intersection shown in Figure [7-20](#A158240_2_En_7_Chapter.html#Fig20)
    is:


    ```sql

    SELECT a.RegNum, a.FamilyName, a.Name

    FROM ClubA a, ClubB b

    WHERE a.RegNum = b.MemberID

    AND a.FamilyName = b.LastName

    AND a.Name = b.FirstName;

    ```


    ## Difference


    Taking the difference between two tables finds those rows that are in the first
    table but not the second and vice versa. For our two tiny clubs, I have reproduced
    the results of the difference operator in Figure [7-21](#A158240_2_En_7_Chapter.html#Fig21).


    ![A158240_2_En_7_Fig21_HTML.jpg](A158240_2_En_7_Fig21_HTML.jpg)

    Figure 7-21. The difference operator finds rows in one table that do not appear
    in the other.


    The keyword in standard SQL for the difference operator is `EXCEPT`. Oracle differs
    from the ISO SQL standard, and from most other database systems, in its use of
    the keyword `MINUS` rather than `EXCEPT`.


    As with the union and intersection operators, the tables involved in a difference
    operation must be union compatible. Unlike with the union and intersection operators,
    the order of the tables is important for the difference operator; the results
    for `ClubA - ClubB` are different from those for `ClubB - ClubA` (as shown in
    Figure [7-21](#A158240_2_En_7_Chapter.html#Fig21)).


    The SQL for finding the names of people in the `ClubA` table that do not appear
    in the `ClubB` table is:


    ```sql

    SELECT LastName, FirstName FROM ClubA

    EXCEPT

    SELECT LastName, FirstName FROM ClubB;

    ```


    ### Uses of Difference


    Whenever you have a query that has the word “not,” you should consider the possibility
    that the difference operator will be useful. For example, how do we find members
    who have not entered tournament 25? Recall from Chapter [5](#A158240_2_En_5_Chapter.html)
    why the following query does not return those members who have not entered tournament
    25:


    ```sql

    SELECT MemberID FROM Entry

    WHERE TourID  25;

    ```


    The query above selects all the rows in the `Entry` table that are not for tournament
    25\. Essentially it finds a member who has entered any tournament other than 25
    (although they could have entered 25 as well). Looking at Figure [7-15](#A158240_2_En_7_Chapter.html#Fig15),
    we see that the query would return the row marked `e1` for member 415 entering
    tournament 36 (`TourID <> 25`). However, two rows above, we see that member 415
    has also entered tournament 25\. It is difficult to think of a reason that you
    might ever want to use this query.


    A process approach to this type of query is to use difference. We need to retrieve
    a set of the IDs of all members and another set of IDs for all the members who
    have entered tournament 25\. We then want the difference; i.e., those IDs that
    are in the former set but not the latter.


    Finding the set of all members who have entered tournament 25 is simple:


    ```sql

    SELECT MemberID FROM Entry WHERE TourID = 25;

    ```


    We might think a similar query will find us all the member IDs as well:


    ```sql

    SELECT MemberID FROM Entry;

    ```


    However, the preceding query only finds us a set of the members who have entered
    tournaments. To get a set of all member IDs, we need to query the `Member` table.


    Figure [7-22](#A158240_2_En_7_Chapter.html#Fig22) is an illustration of how the
    difference operator can be used to find the member IDs we require.


    ![A158240_2_En_7_Fig22_HTML.jpg](A158240_2_En_7_Fig22_HTML.jpg)

    Figure 7-22. Members who have not entered tournament 25


    The SQL expression to retrieve the IDs of members who have not entered tournament
    25 is as follows:


    ```sql

    SELECT MemberID FROM Member

    EXCEPT

    SELECT MemberID FROM Entry WHERE TourID = 25;

    ```


    As with intersection and union operations, it is important that we project the
    appropriate columns before we use the difference operator. In Figure [7-22](#A158240_2_En_7_Chapter.html#Fig22),
    we have retrieved the IDs from the `Member` and `Entry` tables. If we want to
    include the names of the members, we can use one of the methods explained in the
    “Uses of Intersection” section earlier in this chapter.


    However, in this difference example, we already had the names of the members in
    the `Member` table before we removed them to get the set of rows on the left side
    of Figure [7-22](#A158240_2_En_7_Chapter.html#Fig22). It seems a bit perverse
    to remove the names and then put them back later. What is important is that the
    two sets of rows involved in the difference are union compatible; that is, the
    corresponding columns must have the same domains. Either both sets have just IDs
    or both sets have IDs and names. In the operation on the left side of Figure [7-22](#A158240_2_En_7_Chapter.html#Fig22),
    we took the first option and removed the names from `Member`. We could have left
    the names in the `Member` table and added the names to the rows in the middle
    of Figure [7-22](#A158240_2_En_7_Chapter.html#Fig22) by joining the `Entry` and
    `Member` tables, as shown in Figure [7-23](#A158240_2_En_7_Chapter.html#Fig23).
    We could then take the difference between these two sets of rows.


    ![A158240_2_En_7_Fig23_HTML.jpg](A158240_2_En_7_Fig23_HTML.jpg)

    Figure 7-23. Including names of members in both sets of rows before taking the
    difference


    The SQL equivalent of the operations shown in Figure [7-23](#A158240_2_En_7_Chapter.html#Fig23)
    is as follows:


    ```sql

    SELECT MemberID, LastName, FirstName FROM Member

    EXCEPT

    SELECT m.MemberID, m.LastName, m.FirstName

    FROM Entry e inner join Member m on e.MemberID = m.MemberID

    WHERE TourID = 25;

    ```'
