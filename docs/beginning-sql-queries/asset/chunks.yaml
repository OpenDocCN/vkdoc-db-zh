  trans: '

    ## 关系演算：指定结果


    关系代数让我们能够指定一系列操作，最终得到包含所需信息的元组集合。关系演算不描述如何执行查询，而是描述结果数据应满足的条件。本节将非常简要地介绍描述演算查询的符号，而不深入数学细节。


    ### 简单演算表达式


    用非正式语言描述，关系演算对查询的描述具有以下形式：


    > 我想要满足以下条件的元组....


    更正式地，我们可以将上述内容表达为：


    ```

    { m | condition(m) }

    ```


    竖线 `|` 左侧的部分指定了我们希望返回的元组中的属性，而右侧部分（通常称为谓词）描述了它们必须满足的条件。`m` 称为元组变量，`condition(m)`
    是一个函数，对于返回的每个元组 `m`，该函数必须为真。严格来说，前面的符号称为元组演算。另一种等效的符号（此处不作探讨）是域演算。


    以下表达式意味着每个返回的元组 `m` 必须来自 `Member` 关系，并且 `MemberType` 属性的值必须为 ''Senior''：


    ```

    {m | Member(m) AND m.MemberType = ''Senior''}

    ```


    我们可以进一步优化表达式，以指定元组 `m` 的哪些属性应包含在结果中：


    ```

    {m.LastName, m.FirstName | Member(m) AND m.MemberType = ''Senior''}

    ```


    由于 SQL 基于关系演算，等效的 SQL 语句几乎是演算表达式的直接翻译，如下所示：


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE m.MemberType = ''Senior'';

    ```


    演算表达式中竖线 `|` 左侧的部分成为 `SELECT` 子句，`Member(m)` 成为 `FROM` 子句，表达式的其余部分构成 `WHERE` 子句。在
    SQL 中，`m` 可以称为表别名，但将其视为元组变量同样有益。


    ### 自由变量与绑定变量


    以下演算表达式检索成员姓名及其会员类型对应的费用。它本质上是 `Member` 和 `Type` 关系之间的内连接。


    ```

    {m.LastName, m.FirstName, t.Fee | Member(m) Type(t) AND m.MemberType = t.Type}

    ```


    元组变量 `m` 和 `t` 被称为自由变量。在给 `m` 和 `t` 赋值之前，无法对表达式右侧的条件进行求值。通常的做法是，让自由变量遍历其各自关系中的每个元组，然后对每个组合求值条件，以判断其是否应包含在结果中。在本书正文中，我建议将变量想象成附着在手指上，这些手指在各自的关系中移动，从而确定条件（此处为
    `m.MemberType = t.Type`）是否为真。自由变量表示要返回的元组，应始终出现在竖线左侧。


    假设我们想要查找那些参加了任何锦标赛的成员的姓名。为了将某个成员包含在结果中，`Entry` 关系中必须存在该成员对应的元组。符号 ∃（意为“存在”）在下面的演算表达式中用于返回那些在
    `Entry` 关系中存在 `MemberID` 的成员的姓名：


    ```

    {m.LastName, m.FirstName | Member(m) AND

    ∃(e)(

    Entry(e) AND m.MemberID = e.MemberID

    )

    }

    ``


    我已将表达式分布在不同行上，以便变量 `e` 的条件清晰可见。变量 `e` 称为绑定变量。它不出现在等式左侧，仅用于确定表达式右侧的条件是否为真。自由变量（始终出现在表达式左侧）是我们需要考虑所有可能性的变量。在上面的表达式中，我们的自由变量
    `m` 依次被赋予 `Member` 关系中每个元组的值。对于 `m` 的每个值，我们使用绑定变量 `e` 来帮助判断 `Entry` 关系中是否存在合适的元组。


    绑定变量需要有一个所谓的量词，它解释了在计算条件语句时将如何使用该变量。在本例中，我们使用存在量词 (∃)，它要求我们在关联关系中找到一个满足条件的元组。还有一个全称量词
    (∀)，要求关联关系中的每个元组都满足条件。我们现在将看一些使用这些量词以及等效 SQL 语句的示例。


    ### 存在量词与 SQL


    诸如 `∃(e)(Entry(e) AND (condition(e))` 的表达式为真，如果我们在关系 `Entry` 中能找到一个满足指定条件的元组 `e`。让我们看看如何在
    SQL 中表示此查询：


    ```

    {m.LastName, m.FirstName | Member(m) AND

    ∃(e)(

    Entry(e) AND e.MemberID = m.MemberID

    )

    }

    ```


    首先，我们将考虑一个尽可能紧密遵循演算的 SQL 表达式，它使用 `EXISTS` 子句：


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE EXISTS (

    Select * FROM Entry e WHERE e.MemberID = m.MemberID

    );

    ```


    如你所见，SQL 几乎是演算语句的直接翻译。等效地，我们可以用嵌套查询和 `IN` 子句来表示存在性要求：


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE m.MemberID IN (

    SELECT MemberID FROM Entry e

    );

    ```


    前面的每个 SQL 语句都返回了正确结果，但我相信你会觉得这是种复杂的实现方式。查找参加过锦标赛的成员的查询可以更简单地表达为两个关系之间的连接：


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m, Entry e

    WHERE e.MemberID = m.MemberID;

    ```


    前面的 SQL 语句与前两个并非严格等效。后者将返回重复的姓名，成员参加的每个锦标赛都会返回一条记录。如果我们看前两个 SQL 查询，它们会检查 `Member`
    表中的每个元组（仅一次），并在 `Entry` 表中寻找对应的元组。最后一个查询考虑了 `Member` 和 `Entry` 中元组的所有组合，并返回任何满足条件的组合（从而返回了重复项）。


    尽管我们可以通过在最终的 SQL 查询中添加 `DISTINCT` 关键字来删除重复项，但它考虑的是用于包含在结果中的不同元组集合，因此它响应的是与前两个
    SQL 语句微妙不同的问题。关系演算查询非常精确，正是这种精确性在某些情况下可能很有帮助。


    要查找未参加任何锦标赛的成员，我们只需在查询参加锦标赛成员的表达式中用 `NOT` ∃ (或 ∄) 替换 ∃：


    ```

    {m.LastName, m.FirstName | Member(m) AND

    NOT ∃(e)(

    Entry(e) AND m.MemberID = e.MemberID

    )

    }

    ```


    等效的 SQL 语句只需添加关键字 `NOT`，如本例所示：


    ```sql

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE NOT EXISTS (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID

    );

    ```

    '
- fmt: '# Universal Quantifier and SQL


    The universal quantifier `∀` allows us to check that a condition holds for all
    tuples in some set. This is what we require in order for a query to find the names
    of members who have entered all tournaments. We have looked at this query many
    times! The relational calculus statement that follows is a straightforward way
    to express the query:


    ```

    {m.LastName, m.FirstName | Member(m) AND

    ∀(t)(

    Tournament(t)

    ∃(e)(

    Entry(e) AND

    e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    )

    }

    ```


    The calculus statement should be interpreted as “Retrieve the `LastName` and `FirstName`
    for a particular tuple `m` in `Member` if for every tuple `t` in `Tournament`
    there exists a tuple `e` in `Entry` for the member `m` and the tournament `t.`”


    You will recognize the outcome of this query as the equivalent of the relational
    algebra division operator. You will also remember that SQL does not have a keyword
    for division. Sadly, it doesn’t have a keyword for the universal quantifier either.
    Relational calculus can help us out here with the use of the following identity:


    ```

    ∀(t)(condition (t)) ≡ NOT ∃(t)(NOT condition(t))

    ```


    This statement means that if we say “for every tuple `t` a condition holds” then
    that is the same as saying “there is no tuple `t` for which the condition does
    not hold.” We can use this identity to recast our original calculus expression
    to the following:


    ```

    {m.LastName, m.FirstName | Member(m) AND

    NOT ∃(t)(

    Tournament(t)(

    NOT ∃(e)(

    Entry(e) AND e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    )

    }

    ```


    Essentially, this says that there is no tuple `t` in `Tournament` for which there
    is not a corresponding tuple `e` in `Entry`. This translates quite easily to the
    SQL statement seen here:


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE NOT EXISTS (

    SELECT * FROM Tournament t

    WHERE NOT EXISTS (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    );

    ```


    ## An Example


    Let’s look at the algebra and calculus for a query that could be a little tricky.
    We want to find the names of the women who have never played in the Leeston tournament.


    ### Algebra


    First, we need to retrieve all entries for the Leeston tournament by joining the
    `Tournament` and `Entry` tables and then using a select operation:


    ![$$ \mathrm{LeestonEntries}\ \leftarrow {\upsigma}_{\mathrm{TourName}{=}^{\prime
    }{\mathrm{Leeston}}^{\hbox{''}}}\left(\mathrm{Entry}\ {\bowtie}_{\mathrm{TourID}=\mathrm{TourID}\
    }\mathrm{Tournament}\right) $$](A158240_2_En_14_Chapter_Equu.gif)


    The words “have never” suggests we need a difference operator. So, we need to
    find the set of all women by using a select operation on the `Member` table, and
    then we need to remove the set of people who have played at Leeston. In order
    to use our difference operator we need to have union-compatible relations, so
    we will project just the `MemberID` from the two sets just described. The following
    expression will return the IDs of the women who have not entered the Leeston tournament:


    ![$$ \mathrm{NonLeestonLadies}\ \leftarrow\ {\uppi}_{\mathrm{MemberID}}\ \left(\
    {\upsigma}_{\mathrm{Gender}{=}^{\prime }{\mathrm{F}}^{\hbox{''}\ }}\left(\mathrm{Member}\right)\
    \right) - {\uppi}_{\mathrm{MemberID}}\ \left(\mathrm{LeestonEntries}\ \right)
    $$](A158240_2_En_14_Chapter_Equv.gif)


    Now we need to join `NonLeestonLadies` to the `Member` table so we have access
    to their names. We can retrieve the final set of names with:


    ![$$ \mathrm{Result}\ \leftarrow {\uppi}_{\mathrm{FirstName},\ \mathrm{LastName}}\left(\mathrm{Member}\
    {\bowtie}_{\mathrm{MemberID}=\mathrm{MemberID}\ }\mathrm{NonLeestonLadies}\right)
    $$](A158240_2_En_14_Chapter_Equw.gif)


    We can now construct an SQL statement that reflects the algebra expression. In
    the following SQL the most indented rows represent the `LeestonEntries`, the next
    indentation represents the `NonLeestonLadies` (and has been given that alias),
    and the outer rows represent the final join and project:


    ```

    SELECT m2.LastName, m2.FirstName FROM

    (SELECT m.MemberID FROM Member m

    WHERE m.Gender = ''F''

    EXCEPT

    SELECT e.MemberID

    FROM entry e INNER JOIN tournament t ON e.tourID = t.tourID

    WHERE t.TourName = ''Leeston''

    )NonLeestonLadies

    INNER JOIN Member m2 ON m2.MemberID  = NonLeestonLadies.MemberID;

    ```


    ### Calculus


    Let’s approach the same query (the names of the women who have never played in
    the Leeston tournament) using calculus . I always need to visualize the tuple
    variables as fingers to get myself started. Figure [A2-5](#A158240_2_En_14_Chapter.html#Fig5)
    shows the relations that we will need for the query.


    ![A158240_2_En_14_Fig5_HTML.jpg](A158240_2_En_14_Fig5_HTML.jpg)


    Figure A2-5.


    Tuple variables required for the query


    We want to retrieve the names of women from the `Member` table, so we need to
    consider each tuple in turn. That means `m` will be our free variable. For each
    tuple `m` we need to check that the value of `Gender` is `F` and that there is
    no tuple `e` in the `Entry` table that has the same `MemberID` as `m` and also
    has `TourID = 24` (the Leeston tournament). Figure [A2-5](#A158240_2_En_14_Chapter.html#Fig5)
    shows us that although Barbara Olson is a female, we will not include her as she
    has an entry for the Leeston tournament.


    The following calculus expression will retrieve the names of members satisfying
    the conditions we have just described:


    ```

    {m.LastName, m.FirstName | Member(m) AND m.Gender = ''F''

    NOT ∃(e)(

    Entry(e)(

    e.MemberID = m.MemberID

    AND ∃(t)(

    t.TourID = e.TourID

    AND t.Tourname = ''Leeston''

    )

    }

    ```


    The calculus expression translates directly to the following SQL statement:


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE m.Gender = ''F''

    AND NOT EXISTS (

    SELECT *

    FROM Entry e

    WHERE e.MemberID = m.MemberID

    AND EXISTS (

    Select * FROM Tournament t

    WHERE

    t.TourID = e.TourID

    AND t.Tourname = ''Leeston''

    )

    );

    ```'
  raw: '### Universal Quantifier and SQL


    The universal quantifier ∀ allows us to check that a condition holds for all tuples
    in some set. This is what we require in order for a query to find the names of
    members who have entered all tournaments. We have looked at this query many times!
    The relational calculus statement that follows is a straightforward way to express
    the query:


    ```

    {m.LastName, m.FirstName | Member(m) AND

    ∀(t)(

    Tournament(t)

    ∃(e)(

    Entry(e) AND

    e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    )

    }

    ```


    The calculus statement should be interpreted as “Retrieve the `LastName` and `FirstName`
    for a particular tuple `m` in `Member` if for every tuple `t` in `Tournament`
    there exists a tuple `e` in `Entry` for the member `m` and the tournament `t.`”


    You will recognize the outcome of this query as the equivalent of the relational
    algebra division operator. You will also remember that SQL does not have a keyword
    for division. Sadly, it doesn’t have a keyword for the universal quantifier either.
    Relational calculus can help us out here with the use of the following identity:


    ```

    ∀(t)(condition (t)) ≡ NOT ∃(t)(NOT condition(t))

    ```


    This statement means that if we say “for every tuple `t` a condition holds” then
    that is the same as saying “there is no tuple `t` for which the condition does
    not hold.” We can use this identity to recast our original calculus expression
    to the following:


    ```

    {m.LastName, m.FirstName | Member(m) AND

    NOT ∃(t)(

    Tournament(t)(

    NOT ∃(e)(

    Entry(e) AND e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    )

    }

    ```


    Essentially, this says that there is no tuple `t` in `Tournament` for which there
    is not a corresponding tuple `e` in `Entry`. This translates quite easily to the
    SQL statement seen here:


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE NOT EXISTS (

    SELECT * FROM Tournament t

    WHERE NOT EXISTS (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    );

    ```


    ## An Example


    Let’s look at the algebra and calculus for a query that could be a little tricky.
    We want to find the names of the women who have never played in the Leeston tournament.


    ### Algebra


    First, we need to retrieve all entries for the Leeston tournament by joining the
    `Tournament` and `Entry` tables and then using a select operation:


    ![$$ \mathrm{LeestonEntries}\ \leftarrow {\upsigma}_{\mathrm{TourName}{=}^{\prime
    }{\mathrm{Leeston}}^{\hbox{''}}}\left(\mathrm{Entry}\ {\bowtie}_{\mathrm{TourID}=\mathrm{TourID}\
    }\mathrm{Tournament}\right) $$](A158240_2_En_14_Chapter_Equu.gif)


    The words “have never” suggests we need a difference operator. So, we need to
    find the set of all women by using a select operation on the `Member` table, and
    then we need to remove the set of people who have played at Leeston. In order
    to use our difference operator we need to have union-compatible relations, so
    we will project just the `MemberID` from the two sets just described. The following
    expression will return the IDs of the women who have not entered the Leeston tournament:


    ![$$ \mathrm{NonLeestonLadies}\ \leftarrow\ {\uppi}_{\mathrm{MemberID}}\ \left(\
    {\upsigma}_{\mathrm{Gender}{=}^{\prime }{\mathrm{F}}^{\hbox{''}\ }}\left(\mathrm{Member}\right)\
    \right) - {\uppi}_{\mathrm{MemberID}}\ \left(\mathrm{LeestonEntries}\ \right)
    $$](A158240_2_En_14_Chapter_Equv.gif)


    Now we need to join `NonLeestonLadies` to the `Member` table so we have access
    to their names. We can retrieve the final set of names with:


    ![$$ \mathrm{Result}\ \leftarrow {\uppi}_{\mathrm{FirstName},\ \mathrm{LastName}}\left(\mathrm{Member}\
    {\bowtie}_{\mathrm{MemberID}=\mathrm{MemberID}\ }\mathrm{NonLeestonLadies}\right)
    $$](A158240_2_En_14_Chapter_Equw.gif)


    We can now construct an SQL statement that reflects the algebra expression. In
    the following SQL the most indented rows represent the `LeestonEntries`, the next
    indentation represents the `NonLeestonLadies` (and has been given that alias),
    and the outer rows represent the final join and project:


    ```

    SELECT m2.LastName, m2.FirstName FROM

    (SELECT m.MemberID FROM Member m

    WHERE m.Gender = ''F''

    EXCEPT

    SELECT e.MemberID

    FROM entry e INNER JOIN tournament t ON e.tourID = t.tourID

    WHERE t.TourName = ''Leeston''

    )NonLeestonLadies

    INNER JOIN Member m2 ON m2.MemberID  = NonLeestonLadies.MemberID;

    ```


    ### Calculus


    Let’s approach the same query (the names of the women who have never played in
    the Leeston tournament) using calculus . I always need to visualize the tuple
    variables as fingers to get myself started. Figure [A2-5](#A158240_2_En_14_Chapter.html#Fig5)
    shows the relations that we will need for the query.


    ![A158240_2_En_14_Fig5_HTML.jpg](A158240_2_En_14_Fig5_HTML.jpg)


    Figure A2-5.


    Tuple variables required for the query


    We want to retrieve the names of women from the `Member` table, so we need to
    consider each tuple in turn. That means `m` will be our free variable. For each
    tuple `m` we need to check that the value of `Gender` is `F` and that there is
    no tuple `e` in the `Entry` table that has the same `MemberID` as `m` and also
    has `TourID = 24` (the Leeston tournament). Figure [A2-5](#A158240_2_En_14_Chapter.html#Fig5)
    shows us that although Barbara Olson is a female, we will not include her as she
    has an entry for the Leeston tournament.


    The following calculus expression will retrieve the names of members satisfying
    the conditions we have just described:


    ```

    {m.LastName, m.FirstName | Member(m) AND m.Gender = ''F''

    NOT ∃(e)(

    Entry(e)(

    e.MemberID = m.MemberID

    AND ∃(t)(

    t.TourID = e.TourID

    AND t.Tourname = ''Leeston''

    )

    }

    ```


    The calculus expression translates directly to the following SQL statement:


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE m.Gender = ''F''

    AND NOT EXISTS (

    SELECT *

    FROM Entry e

    WHERE e.MemberID = m.MemberID

    AND EXISTS (

    Select * FROM Tournament t

    WHERE

    t.TourID = e.TourID

    AND t.Tourname = ''Leeston''

    )

    );

    ```'
  trans: '# 全称量词和 SQL


    全称量词 `∀` 允许我们检查一个条件是否对某个集合中的所有元组都成立。这正是我们为了查询找出参加过**所有**锦标赛的会员姓名所需要的功能。我们已经多次研究过这个查询了！下面的关系演算语句是表达该查询的直接方式：


    ```

    {m.LastName, m.FirstName | Member(m) AND

    ∀(t)(

    Tournament(t)

    ∃(e)(

    Entry(e) AND

    e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    )

    }

    ```


    该演算语句应解释为：“检索`Member`中特定元组`m`的`LastName`和`FirstName`，条件是对于`Tournament`中的每一个元组`t`，在`Entry`中都存在一个对应于会员`m`和锦标赛`t`的元组`e`。”


    你会认出这个查询的结果等价于关系代数中的除法运算符。你还会记得 SQL 没有对应于除法的关键字。遗憾的是，它也没有对应于全称量词的关键字。幸运的是，关系演算可以通过使用以下恒等式来帮助我们：


    ```

    ∀(t)(condition (t)) ≡ NOT ∃(t)(NOT condition(t))

    ```


    这个语句意味着，如果我们说“对于每个元组`t`，某个条件成立”，那就等同于说“不存在一个元组`t`，使得该条件不成立”。我们可以利用这个恒等式将原始演算表达式改写为如下形式：


    ```

    {m.LastName, m.FirstName | Member(m) AND

    NOT ∃(t)(

    Tournament(t)(

    NOT ∃(e)(

    Entry(e) AND e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    )

    }

    ```


    本质上，这表示在`Tournament`中不存在元组`t`，使得在`Entry`中没有对应的元组`e`。这可以相当容易地转换成下面看到的 SQL 语句：


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE NOT EXISTS (

    SELECT * FROM Tournament t

    WHERE NOT EXISTS (

    SELECT * FROM Entry e

    WHERE e.MemberID = m.MemberID

    AND e.TourID = t.TourID

    )

    );

    ```


    ## 示例


    让我们来看一个在代数和演算上可能有点棘手的查询。我们想找出从未参加过 Leeston 锦标赛的女性姓名。


    ### 代数


    首先，我们需要通过连接 `Tournament` 和 `Entry` 表，然后使用选择操作，来检索 Leeston 锦标赛的所有参赛记录：


    ![$$ \mathrm{LeestonEntries}\ \leftarrow {\upsigma}_{\mathrm{TourName}{=}^{\prime
    }{\mathrm{Leeston}}^{\hbox{''}}}\left(\mathrm{Entry}\ {\bowtie}_{\mathrm{TourID}=\mathrm{TourID}\
    }\mathrm{Tournament}\right) $$](img/A158240_2_En_14_Chapter_Equu.gif)


    “从未参加过”这个词暗示我们需要一个差集运算符。因此，我们需要通过在 `Member` 表上使用选择操作来找出所有女性的集合，然后移除那些曾在 Leeston
    参赛过的人员的集合。为了使用差集运算符，我们需要并兼容的关系，所以我们将从刚才描述的两个集合中只投影出 `MemberID`。下面的表达式将返回那些未参加
    Leeston 锦标赛的女性的 ID：


    ![$$ \mathrm{NonLeestonLadies}\ \leftarrow\ {\uppi}_{\mathrm{MemberID}}\ \left(\
    {\upsigma}_{\mathrm{Gender}{=}^{\prime }{\mathrm{F}}^{\hbox{''}\ }}\left(\mathrm{Member}\right)\
    \right) - {\uppi}_{\mathrm{MemberID}}\ \left(\mathrm{LeestonEntries}\ \right)
    $$](img/A158240_2_En_14_Chapter_Equv.gif)


    现在我们需要将 `NonLeestonLadies` 连接到 `Member` 表，以便能够获取她们的姓名。我们可以通过以下方式检索最终的姓名集合：


    ![$$ \mathrm{Result}\ \leftarrow {\uppi}_{\mathrm{FirstName},\ \mathrm{LastName}}\left(\mathrm{Member}\
    {\bowtie}_{\mathrm{MemberID}=\mathrm{MemberID}\ }\mathrm{NonLeestonLadies}\right)
    $$](img/A158240_2_En_14_Chapter_Equw.gif)


    我们现在可以构建一个反映该代数表达式的 SQL 语句。在下面的 SQL 中，最内层缩进行代表`LeestonEntries`，下一层缩进代表`NonLeestonLadies`（并已赋予别名），最外层行代表最终的连接和投影：


    ```

    SELECT m2.LastName, m2.FirstName FROM

    (SELECT m.MemberID FROM Member m

    WHERE m.Gender = ''F''

    EXCEPT

    SELECT e.MemberID

    FROM entry e INNER JOIN tournament t ON e.tourID = t.tourID

    WHERE t.TourName = ''Leeston''

    )NonLeestonLadies

    INNER JOIN Member m2 ON m2.MemberID  = NonLeestonLadies.MemberID;

    ```


    ### 演算


    让我们使用演算来处理同一个查询（找出从未参加过 Leeston 锦标赛的女性姓名）。我总是需要将元组变量想象成手指来帮助自己理解。图 A2-5 展示了我们需要用于该查询的关系。


    ![A158240_2_En_14_Fig5_HTML.jpg](img/A158240_2_En_14_Fig5_HTML.jpg)


    图 A2-5.


    查询所需的元组变量


    我们想从 `Member` 表中检索女性的姓名，所以我们需要依次考虑每个元组。这意味着 `m` 将是我们的自由变量。对于每个元组 `m`，我们需要检查其 `Gender`
    值是否为 `F`，并且在 `Entry` 表中不存在一个元组 `e`，其 `MemberID` 与 `m` 的相同且 `TourID = 24`（即 Leeston
    锦标赛）。图 A2-5 显示，尽管 Barbara Olson 是女性，但由于她参加了 Leeston 锦标赛，我们将不会包含她。


    下面的演算表达式将检索满足我们刚才描述条件的会员姓名：


    ```

    {m.LastName, m.FirstName | Member(m) AND m.Gender = ''F''

    NOT ∃(e)(

    Entry(e)(

    e.MemberID = m.MemberID

    AND ∃(t)(

    t.TourID = e.TourID

    AND t.Tourname = ''Leeston''

    )

    }

    ```


    该演算表达式直接转换为以下 SQL 语句：


    ```

    SELECT m.LastName, m.FirstName

    FROM Member m

    WHERE m.Gender = ''F''

    AND NOT EXISTS (

    SELECT *

    FROM Entry e

    WHERE e.MemberID = m.MemberID

    AND EXISTS (

    Select * FROM Tournament t

    WHERE

    t.TourID = e.TourID

    AND t.Tourname = ''Leeston''

    )

    );

    ```'
- fmt: '### Conclusion


    Having applied a calculus and algebra approach to our query to find women who
    have not entered a Leeston tournament, we have arrived at two equivalent but quite
    different-looking SQL queries. There are, no doubt, several other equivalent SQL
    statements. Testing these in `SQL Server 2012` shows that the optimizer produces
    slightly different execution plans, with the calculus query coming out slightly
    faster — although adding some indexes could completely change that.


    The message from this book is that there are two equivalent but quite different
    methods of approaching any query. This appendix adds concise notations to help
    you represent those approaches.


