  \ SQL 表达式，但无法一次性为整个查询想到。我们可以在一个 SQL 语句中返回查询数据，然后用另一个查询引用该数据。这种在查询中嵌套查询的想法非常强大。你会听到这个概念被称为查询和子查询（query\
  \ and subquery）、内部和外部查询（inner and outer queries）或嵌套查询（nested queries）。\n\n在本章中，我们将研究子查询和两个新的\
  \ SQL 关键字：`EXISTS` 和 `IN`。我们将看到如何使用子查询作为处理我们已经做过的某些查询的替代方法，以及嵌套如何开启其他可能性。\n\n###\
  \ IN 关键字\n\n`IN` 关键字允许我们从表中选择行，其中条件允许一个属性具有多个值之一。例如，如果我们想从 `Entry` 表中检索赛事 ID 为 36、38\
  \ 或 40 的行中的成员 ID，我们可以使用布尔 `OR` 运算符，如下所示：\n\n```sql\nSELECT e.MemberID\nFROM Entry\
  \ e\nWHERE e.TourID = 36 OR e.TourID = 38 OR e.TourID = 40;\n```\n\n显然，随着可能选项数量的增加，这类语句会变得难以管理。使用\
  \ `IN` 关键字，我们可以构建一个更紧凑的语句，将可能的值集合括在括号中并用逗号分隔。在以下查询中，会检查 `Entry` 的每一行，如果 `TourID`\
  \ 是括号中的值之一，则 `WHERE` 条件为真，并返回该行：\n\n```sql\nSELECT e.MemberID\nFROM Entry e\nWHERE\
  \ e.TourID IN (36, 38, 40);\n```\n\n可以将 `IN` 与逻辑运算符 `NOT` 结合使用。但是，你需要非常小心。考虑以下查询：\n\
  \n```sql\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID NOT IN (36, 38, 40);\n\
  ```\n\n前面的查询将返回参加了任何不在列表中的赛事的成员 ID。但请注意，这些成员也可能参加了列表中的某个赛事。我们将在本章后面研究如何准确回答“谁没有参加这些赛事”之类的问题。\n\
  \n### 与子查询一起使用 IN\n\n`IN` 关键字的真正用处在于我们可以使用另一个 SQL 语句来生成值集合。例如，某人可能对赛事 36、38 和 40\
  \ 感兴趣的原因可能是因为它们是当前的公开赛（Open tournaments）。我们可以使用另一个 SQL 查询来生成所需的值集合，而不用单独列出公开赛。每次运行查询时都会重建列表，因此随着数据变化，公开赛集合将保持最新。\n\
  \n让我们看一个使用查询为 `IN` 子句生成值集合的具体例子。我在图 4-1 中重现了 `Member` 表的几列以及 `Entry` 和 `Tournament`\
  \ 表。\n\n![A158240_2_En_4_Fig1_HTML.jpg](img/A158240_2_En_4_Fig1_HTML.jpg)\n\n图 4-1.\n\
  \nMember、Entry 和 Tournament 表\n\n生成公开赛赛事 ID 集合的查询是：\n\n```sql\nSELECT t.TourID\n\
  FROM Tournament t\nWHERE t.TourType = 'Open';\n```\n\n现在我们可以将前面查询中的显式值列表（36, 38,\
  \ 40）替换为前面的 SQL 语句：\n\n```sql\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID IN\
  \ (\n    SELECT t.TourID\n    FROM Tournament t\n    WHERE t.TourType = 'Open');\n\
  ```\n\n括号内的 `SELECT` 语句有时被称为子查询（subquery）。为了与 `IN` 关键字正确配合，查询的内部必须返回单个值的列表。我缩进它只是为了更容易阅读（SQL\
  \ 会忽略添加的空白）。你可以通过“由内而外”地阅读来理解嵌套查询。内部的 `SELECT` 语句从 `Tournament` 表中检索所需的赛事 ID 集合，然后外部的\
  \ `SELECT` 从 `Entry` 表中为我们找到所有该集合中的赛事的条目。\n\n为了帮助理解，可以向 SQL 语句添加注释。在以下语句中，以 `--`\
  \ 开头的行是注释，将被忽略。也可以使用 `/*` 和 `*/` 包围多行代码块。\n\n```sql\nSELECT e.MemberID\nFROM Entry\
  \ e\nWHERE e.TourID IN (\n    -- 子查询返回公开赛的 ID\n    SELECT t.TourID\n    FROM Tournament\
  \ t\n    WHERE t.TourType = 'Open');\n```\n\n再看一下图 4-1 中的表。我们还能如何检索公开赛的条目？我们在前一章使用连接进行了类似的查询。我们可以连接两个表\
  \ `Entry` 和 `Tournament`，连接条件是它们的公共字段 `TourID`，只选择公开赛的那些行，然后投影 `MemberID` 列。请看下面：\n\
  \n```sql\nSELECT e.MemberID\nFROM Entry e INNER JOIN Tournament t ON e.TourID =\
  \ t.TourID\nWHERE t.TourType = 'Open';\n```\n\n带子查询和不带子查询的 SQL 语句检索相同的信息。正如我已经说过很多次的，在\
  \ SQL 中编写查询通常有几种不同的方法。你熟悉的方法越多，就越有可能找到表达复杂查询的方法。\n\n\n### 谨慎使用 `NOT` 和 `<>`\n\n\
  除了询问诸如“已参加公开赛的会员 ID 有哪些？”这样的问题外，我们同样可能想知道“未参加公开赛的会员 ID 有哪些？”。两者听起来非常相似，但一旦在问题中使用否定词，我们就必须非常清楚自己真正的意图。在第\
  \ 7 章中，我们将探讨如何使用集合运算来构造查询，但为了保持本章内容的完整性，我将特别讨论否定词对子查询使用的影响。\n\n在上一节中，我们为检索已参加公开赛的会员的会员\
  \ ID 构建了两条 SQL 语句。一条使用了子查询，另一条使用了联结。为了查找谁没有参加公开赛，有人可能会尝试在子查询示例中将 `IN` 改为 `NOT IN`，如下所示：\n\
  \n```sql\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID NOT IN\n(SELECT t.TourID\n\
  FROM Tournament t\nWHERE t.TourType = 'Open');\n```\n\n在联结示例中，人们倾向于将 `t.TourType\
  \ = 'Open'` 修改为 `t.TourType <> 'Open'`：\n\n```sql\nSELECT e.MemberID\nFROM Entry\
  \ e INNER JOIN Tournament t ON e.TourID = t.TourID\nWHERE t.TourType <> 'Open';\n\
  ```\n\n仔细思考一下这两条查询会返回哪些行。事实上，它们返回的是同一组行，但这组行可能既包括参加了公开赛的会员，也包括未参加的。\n\n图 4-2 中的表格显示了\
  \ `Entry` 和 `Tournament` 表内联结的结果。底部的一组行都对应公开赛，这些行会被条件为 `WHERE t.TourType = 'Open'`\
  \ 的查询检索到。顶部的一组条目对应公开赛以外的比赛，这些行会被条件为 `WHERE t.TourType <> 'Open'` 的查询检索到。\n\n![A158240_2_En_4_Fig2_HTML.jpg](img/A158240_2_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2. TourType = ‘Open’ 与 TourType <> ‘Open’ 的对比\n\n我们可以看到，一些会员（用圆圈标出）同时出现在两个集合中。图\
  \ 4-3 是对图 4-2 表格中信息的另一种呈现方式，但它显示的是两组会员而非条目：上面的圆圈代表参加了公开赛的会员，下面的圆圈代表参加了非公开赛的会员。有四名会员同时属于这两个集合。\n\
  \n![A158240_2_En_4_Fig3_HTML.gif](img/A158240_2_En_4_Fig3_HTML.gif)\n\n图 4-3. 参加了公开赛、其他比赛或两者都参加了的会员\n\
  \n现在让我们回到最初的问题。哪些会员没有参加过公开赛？我们必须小心区分图 4-4 所描绘的两个集合。\n\n![A158240_2_En_4_Fig4_HTML.gif](img/A158240_2_En_4_Fig4_HTML.gif)\n\
  \n图 4-4. 谨慎区分这两种情况的 SQL 至关重要\n\n图 4-4a 显示的是从未参加过任何公开赛的人员集合。图 4-4b 显示的是那些参加了非公开赛的会员（但不排除他们可能同时也参加了公开赛）。例如，会员\
  \ 118 从未参加过公开赛，而会员 228 既参加过公开赛，也参加过其他类型的比赛。\n\n本节开头的两条查询都将检索到图 4-4b 所示的会员集合。会员 228（他参加过公开赛）会被返回（因为他参加过一个非公开赛）。这不是我们想要的结果，并且是一个非常常见的错误。\n\
  \n要判断某人是否参加了公开赛，我们只需要找到一个匹配的条目。要判断某人是否没有参加过公开赛，我们需要检查所有的公开赛条目，以确保该会员没有出现。\n\n就图\
  \ 4-2 中的联结表而言，查找那些参加了公开赛的人员只需要一个简单的 `WHERE` 子句：`WHERE t.TourType = 'Open'`。请记住，为了确定是否满足\
  \ `WHERE` 子句中的条件，会独立检查每一行。然而，要查找没有参加过公开赛的人员，我们需要检查表中的每一行，以确保某个特定会员没有条目。这是一个复杂得多的任务。事实上，我们还需要考虑从未参加过任何比赛的会员。这些会员的\
  \ ID 根本不会出现在 `Entry` 表中，因此我们还必须检查 `Member` 表以获取完整的列表。\n\n查找未参加过公开赛的会员可以通过使用第 7 章中的集合运算采用过程式方法实现。但是，我们也可以使用结果导向的方法来构建准确的查询。为此，我们需要首先介绍\
  \ `EXISTS` 关键字。\n\n\n### EXISTS 关键字\n\n让我们从一个简单的问题开始。例如，“所有曾参加过任何锦标赛的成员姓名是什么？”我们可以先从思考`Member`表中哪些行满足问题条件入手。请结合以下句子和图\
  \ 4-5 一起思考：\n\n> 如果`Entry`表中存在行`e`，使得`m.MemberID = e.MemberID`，我将输出来自行`m`的姓名，其中`m`来自`Member`表。\n\
  \n![A158240_2_En_4_Fig5_HTML.jpg](img/A158240_2_En_4_Fig5_HTML.jpg)\n图 4-5. 威廉·库珀已参加锦标赛，因为在`Entry`表中存在匹配的行\n\
  \n我们可以使用关键字`EXISTS`，将该语句\n\n> 如果`Entry`表中存在行`e`，使得`m.MemberID = e.MemberID`，我将输出来自行`m`的姓名，其中`m`来自`Member`表。\n\
  \n几乎直接转换为 SQL：\n\n```sql\nSELECT m.LastName, m.FirstName\nFROM Member m\nWHERE EXISTS\n\
  (SELECT * FROM Entry e WHERE e.MemberID = m.MemberID);\n```\n\n这是嵌套查询的另一个例子，其中我们有两个\
  \ SQL `SELECT`语句，一个嵌套在另一个内部。这个例子与本章前面看到的较简单的例子略有不同。内部查询中的`WHERE`条件引用了外部查询正在考虑的部分行；即`e.MemberID\
  \ = m.MemberID`。我发现解释这些嵌套查询最简单的方法是参考像图 4-5 这样的图表。变量`m`正在检查`Member`表中的每一行。内部查询正在`Entry`表中查找一个`MemberID`与当前正在考虑的`Member`表行具有相同值的行。如果存在这样的行（或多个这样的行），那么我们就成功了。\n\
  \n对于那些认为这似乎是获取简单结果的复杂方法的读者，你们是对的（部分）。使用`EXISTS`子句的查询与基于`MemberID`的`Member`和`Entry`之间的内连接所检索到的成员是相同的。\n\
  \n但是，如果我们想要那些没有参加过锦标赛的成员呢？这只需要对我们的新 SQL 查询进行微小的更改。我们现在不是查找在`Entry`中存在匹配行的成员，而是要查找不存在匹配行的成员。在之前的\
  \ SQL 语句中加上`NOT`一词就能得到我们需要的结果：\n\n```sql\nSELECT m.Lastname, m.FirstName\nFROM Member\
  \ m\nWHERE NOT EXISTS\n(SELECT * FROM Entry e WHERE e.MemberID = m.MemberID);\n\
  ```\n\n`NOT EXISTS`结构将遍历`Entry`表中的每一行`e`，检查是否存在与当前`Member`表行的`MemberID`匹配的行。只有在未找到匹配行时，才会检索出该成员的姓名。\n\
  \n现在我们有足够的条件来处理关于未参加过公开赛的成员的查询。查看图 4-6 以决定威廉·库珀是否应包含在结果中。\n\n![A158240_2_En_4_Fig6_HTML.jpg](img/A158240_2_En_4_Fig6_HTML.jpg)\n\
  图 4-6. 威廉·库珀确实存在一条公开赛的参赛记录\n\n图 4-6 中指示的行显示，威廉·库珀确实存在一条参赛记录，因此我们不会将他包含在我们的结果中。\n\
  \n现在，看这个描述图 4-6 的自然语言陈述：\n\n> 我将输出来自行`m`的姓名，其中`m`来自`Member`表，前提是不存在（`Entry`表中的一行`e`满足`m.MemberID\
  \ = e.MemberID`，同时`Tournament`表中的一行`t`满足`e.TourID = t.TourID and t.TourType = 'Open'`）\n\
  \n反映上述陈述的 SQL 是：\n\n```sql\nSELECT m.Lastname, m.FirstName\nFROM Member m\nWHERE\
  \ NOT EXISTS\n(SELECT * FROM Entry e, Tournament t\nWHERE m.MemberID = e.MemberID\n\
  AND e.TourID = t.TourID AND t.TourType = 'Open');\n```\n\n当我们第 7 章介绍集合操作时，将看看处理此类查询的过程方法。\n\
  \n### 不同类型的子查询\n\n我们在前面的章节中看到了不同类型的子查询。在这里回顾一些选项是有用的。嵌套查询的内部可以返回单个值（例如，芭巴拉的差点）、一组值（例如，公开赛的\
  \ ID）或一组行（例如，公开赛的参赛记录）。此外，内部和外部查询可以在某种程度上是独立的，也可以是相关联的。\n\n#### 返回单个值的内部查询\n\n返回单个值的内部查询在简单地检索行子集的情况下通常很有用。让我们考虑我们成员的差点，如图\
  \ 4-7 所示。\n\n![A158240_2_En_4_Fig7_HTML.jpg](img/A158240_2_En_4_Fig7_HTML.jpg)\n\
  图 4-7. 显示姓名和差点的`Member`表部分\n\n如果我们想找到那些差点小于 16 的成员，那么可以简单地使用以下 SQL 完成：\n\n```sql\n\
  SELECT *\nFROM Member m\nWHERE m.Handicap < 16;\n```\n\n如果我们想找到所有差点小于芭巴拉·奥尔森的成员该怎么办？前面的查询可以做到，但前提是芭巴拉\
  \ 16 的差点不会改变。为了让查询无论芭巴拉当前的差点是多少都能工作，我们可以用内部查询的结果替换单个值 16：\n\n```sql\nSELECT *\n\
  FROM Member m\nWHERE Handicap <\n(SELECT Handicap\nFROM Member\nWHERE LastName =\
  \ 'Olson' AND FirstName = 'Barbara');\n```\n\n我们需要将`Handicap`与单个值进行比较。如果在像这样的情况下，我们的内部查询返回多个值（例如，如果俱乐部里有多个芭巴拉·奥尔森），那么在尝试运行查询时我们会得到错误。\n\
  \n返回单个值的内部查询在我们想要将值与某种聚合进行比较时也很有用。例如，我们可能想找出所有差点低于平均水平的成员。在这种情况下，我们可以使用内部查询返回平均值：\n\
  \n```sql\nSELECT *\nFROM Member m\nWHERE m.Handicap <\n(SELECT AVG(Handicap)\nFROM\
  \ Member);\n```\n\n如果你慢慢来，可以逐步构建出相当复杂的查询。假设我们想看看是否有任何青少年成员的差点低于成年人的平均水平。内部查询必须返回成年成员的平均差点值，然后我们想选择所有差点低于该值的青少年成员。在下面的\
  \ SQL 语句中，内部和外部查询都有额外的`SELECT`条件（内部只检索成年人，外部只检索青少年）：\n\n```sql\nSELECT *\nFROM Member\
  \ m\nWHERE m.MemberType = 'Junior' AND Handicap < (\nSELECT AVG(Handicap)\nFROM\
  \ Member\nWHERE MemberType = 'Senior');\n```\n\n#### 返回一组值的内部查询\n\n这就是我们本章开始的地方。当我们使用`IN`关键字时，SQL\
  \ 将期望找到一组单值。例如，我们可能要求`Entry`表中成员 ID`IN`一组值的行。在下面的语句中，内部查询选择所有成年成员的 ID，外部查询返回这些成员的参赛记录：\n\
  \n```sql\nSELECT *\nFROM Entry e\nWHERE e.MemberID IN\n(SELECT m.MemberID\nFROM\
  \ Member m\nWHERE m.MemberType = 'Senior');\n```\n\n此类查询的内部部分必须只返回单个列。`IN`期望一个单值列表（这里是一个`MemberID`列表）。如果内部部分返回多个列（例如，`SELECT\
  \ * FROM Member`），那么我们将得到错误。\n\n许多像这样的嵌套查询可以用其他方式编写——通常使用本章前面讨论的内连接。有些查询用一种方式感觉更自然，有些则用另一种方式。\n\
  \n#### 检查存在性的内部查询\n\n另一种使用 `EXISTS` 关键字的内部查询。使用 `EXISTS` 的语句仅检查内部查询是否返回了任何行。实际返回的值或行数并不重要。以下查询将返回\
  \ `Member` 表中的行，条件是我们能够在 `Entry` 表中找到与该会员对应的行：\n\n```sql\nSELECT m.Lastname, m.FirstName\n\
  FROM Member m\nWHERE EXISTS\n(SELECT * FROM Entry e\nWHERE e.MemberID = m.MemberID);\n\
  ```\n\n由于内部查询实际检索的值并不重要，因此内部查询通常采用 `SELECT * FROM` 的形式。\n\n这类查询的另一个特点是内部和外部部分通常是关联的。这意味着内部部分的\
  \ `WHERE` 子句引用了外部部分表中的值。在本例中，内部查询检查 `Entry` 表中的当前行是否与外部查询中当前考虑的会员具有相同的 `MemberID`。我发现最直观的理解方式如图\
  \ 4-5 所示。\n\n很难想象一个有意义的 `EXISTS` 查询，其内部和外部部分的值是不相关联的。思考一下以下查询将返回什么：\n\n```sql\n\
  SELECT m.Lastname, m.FirstName\nFROM Member m\nWHERE EXISTS\n(SELECT * FROM Entry\
  \ e);\n```\n\n上面的查询没有任何意义。它的意思是，如果 `Entry` 表中有一行（任何一行！），就写出每个会员的姓名。如果 `Entry` 表是空的，我们将不会得到任何返回；否则，我们将得到所有会员的所有姓名。我想不出为什么你会想这样做。`EXISTS`\
  \ 查询在我们需要查找其他地方匹配的值时很有用，这就是为什么 `SELECT` 条件需要比较来自内部和外部部分的值。\n\n比较以下两个查询很有趣。它们都返回参加过锦标赛的会员姓名，但结果略有不同。第一个使用\
  \ `EXISTS` 子句：\n\n```sql\nSELECT m.Lastname\nFROM Member m\nWHERE EXISTS\n(SELECT\
  \ * FROM Entry e\nWHERE e.MemberID = m.MemberID);\n```\n\n第二个使用 `INNER JOIN`：\n\n\
  ```sql\nSELECT m.LastName\nFROM Member m INNER JOIN Entry e ON  e.MemberID = m.MemberID;\n\
  ```\n\n两个查询之间的区别在于返回的行数。\n\n第一个查询检查 `Member` 表中的每一行，如果该会员在 `Entry` 表中至少存在一个条目，则返回其姓氏。任何会员的姓氏只会被写出一次。\n\
  \n第二个查询在两个表之间形成连接，该连接将由 `Member` 和 `Entry` 中具有相同 `MemberID` 的所有行组合构成。特定会员的姓名将被写出的次数等于他或她参加锦标赛的次数。\n\
  \n这是一个微妙但重要的区别，特别是当你想要统计返回的行数时。在第二个示例的 `SELECT` 子句中添加 `DISTINCT` 将使两个查询的结果相同。\n\n\
  ### 使用子查询进行更新\n\n本书主要介绍用于检索数据的查询，但许多相同的思想可用于更新数据以及添加或删除记录。在第 1 章中，我们研究了简单的查询，例如更新特定会员的电话号码，如下所示：\n\
  \n```sql\nUPDATE Member m\nSET m.Phone = '875076'\nWHERE m.MemberID = 118;\n```\n\
  \n我们还研究了在表中插入和删除行。要插入一行，我们列出要提供值的列，然后是这些值，如下所示：\n\n```sql\nINSERT INTO Entry (MemberID,\
  \ TourID, Year)\nVALUES (153, 25, 2016);\n```\n\n现在，让我们考虑一种情况：我们想为俱乐部中每位青少年会员添加\
  \ 2016 年第 25 号锦标赛的一个条目。我们希望向 `Entry` 表添加一组行，如图 4-8 所示，其中左列是每位青少年的会员 ID，接下来的两列是每个条目的特定锦标赛（25）和年份（2016）。\n\
  \n![A158240_2_En_4_Fig8_HTML.jpg](img/A158240_2_En_4_Fig8_HTML.jpg)\n\n图 4-8. 要添加到\
  \ Entry 表中的行\n\n我们可以编写一个 SQL 查询来返回一组类似于图 4-8 的行：\n\n```sql\nSELECT m.MemberID, 25,\
  \ 2016\nFROM Member m\nWHERE m.MemberType = 'Junior';\n```\n\n这个查询与我们之前看到的有些不同，因为它的\
  \ `SELECT` 子句中包含常量。它将为每个青少年会员构造一行，包含会员的 ID 以及两个常量 25（代表锦标赛）和 2016（代表年份）。\n\n现在，我们可以将前面的查询作为子查询用于我们的\
  \ `INSERT` 查询。我们可以提供子查询产生的一组值，而不是仅使用 `VALUES` 关键字提供一个值。在以下查询中，内部 `SELECT` 将生成图 4-8\
  \ 中所示的行集，而外部 `INSERT` 会将它们放入 `Entry` 表中：\n\n```sql\nINSERT INTO Entry (MemberID,\
  \ TourID, Year)\n-- create an entry in tournament 25, 2016 for each Junior\nSELECT\
  \ MemberID, 25, 2016\nFROM Member\nWHERE MemberType = 'Junior';\n```\n\n使用子查询的同样潜力也适用于其他更新问题。假设，为了找一个例子，在为\
  \ 2016 年 Kaiapoi 社交锦标赛（锦标赛 25）输入 `Entry` 表数据后，你意识到只允许差点 20 及以上的球员参赛。你可以使用子查询来删除差点小于\
  \ 20 的会员的条目：\n\n```sql\nDELETE FROM Entry\nWHERE TourID = 25 AND Year = 2016 AND\n\
  MemberID IN\n(SELECT MemberID FROM Member WHERE Handicap < 20);\n```\n\n### 总结\n\
  \n我们可以在许多情况下将子查询与关键字 `IN` 和 `EXISTS` 结合使用。以下是我们在本章中研究过的情况的总结。\n\n#### 不同类型子查询的示例\n\
  \n许多嵌套查询可以用替代方式编写。在第 9 章中，我们将研究与表达查询的不同方式相关的性能问题，但通常你在设计查询时应该使用你觉得最自然的方式。以下是一些嵌套查询及其替代表达方式的示例。\n\
  \n##### 返回单个值的子查询\n\n查找会员 Cooper 参加的锦标赛：\n\n```sql\nSELECT e.TourID, e.Year FROM\
  \ Entry e WHERE e.MemberID =\n(SELECT m.MemberID FROM Member m\nWHERE m.LastName\
  \ = 'Cooper');\n```\n\n编写前面查询的另一种方法是使用连接：\n\n```sql\nSELECT e.TourID, e.Year\nFROM\
  \ Entry e INNER JOIN Member m ON e.MemberID = m.MemberID\nWHERE m.LastName = 'Cooper';\n\
  ```\n\n##### 返回一组单值的子查询\n\n查找所有公开赛的条目：\n\n```sql\nSELECT *\nFROM Entry e\nWHERE\
  \ e.TourID IN\n(SELECT t.TourID FROM Tournament t\nWHERE t.TourType = 'Open');\n\
  ```\n\n前面的查询可以替换为：\n\n```sql\nSELECT e.MemberID, e.TourID, e.Year\nFROM Entry e\
  \ INNER JOIN Tournament t ON e.TourID = t.TourID\nWHERE t.TourType = 'Open';\n```\n\
  \n##### 检查存在性的子查询\n\n查找参加过任何锦标赛的会员姓名：\n\n```sql\nSELECT m.LastName, m.FirstName\n\
  FROM Member m\nWHERE EXISTS\n(SELECT * FROM Entry e\nWHERE e.MemberID = m.MemberID);\n\
  ```\n\n这可以替换为：\n\n```sql\nSELECT DISTINCT m.LastName, m.FirstName\nFROM Member m\
  \ INNER JOIN Entry e ON e.MemberID = m.MemberID;\n```\n\n#### 子查询不同用途的示例\n\n子查询可用于许多情况，包括以下：\n\
  \n##### 构造带否定的查询\n\n查找未参加锦标赛的会员姓名：\n\n```sql\nSELECT * FROM Member m\nWHERE NOT\
  \ EXISTS\n(SELECT * FROM Entry e\nWHERE e.MemberID = m.MemberID);\n```\n\n#####\
  \ 与聚合结果比较值\n\n查找残疾程度低于平均值的成员姓名：\n\n```sql\nSELECT m.LastName, m.FirstName FROM Member\
  \ m WHERE m.Handicap <\n(SELECT AVG(Handicap) FROM Member);\n```\n\n##### 更新数据\n\
  \n为 2016 年的 25 号锦标赛中的每位青少年成员在`Entry`表中添加一行：\n\n```sql\nINSERT INTO Entry (MemberID,\
  \ TourID, Year)\nSELECT MemberID, 25, 2016\nFROM Member WHERE MemberType = 'Junior';\n\
  ```\n\n"
- "# 5. 自连接\n\n当我们基于 `WHERE` 子句中的条件选择行的子集时，该条件是独立地对每一行进行评估的。一个例子可能是查询查找所有参加了 36 号锦标赛的成员。条件\
  \ `TourID = 36` 可以对 `Entry` 表中的每一行进行评估，以获得所需结果。但是，如果我们想查找同时参加了 36 号和 24 号锦标赛的成员，仅通过检查\
  \ `Entry` 表的一行是无法做到的。我们需要为同一个成员找到两行（或两个参赛记录）——每个指定锦标赛各一个。一个简单的 `WHERE` 子句无法实现这一点。\n\
  \n在本章中，我们将了解自连接。通过两个表之间的连接，我们首先生成一个笛卡尔积，该积提供了来自每个表的行的组合。在自连接中，我们对同一个表的两个副本做同样的事情。这为我们提供了原始表中成对行的所有组合。这是编写需要来自表中多行信息以满足某些条件的查询的一种方法。它将使我们能够回答涉及“同时”这个词的问题；例如，“哪些成员同时参加了这两个锦标赛？”\
  \ 自连接还允许我们对涉及自关系的表进行查询。我们先来了解自关系。\n\n#### 自关系\n\n让我们为 `Member` 表添加更多信息。假设一些成员被分配了教练。我们如何在第一章讨论的类图中表示这一点？我们可以采用图[5-1]所示的方法，包含两个类：`Member`\
  \ 和 `Coach`。回想一下这些线和数字的含义。从左到右，一个教练可能有几个成员要训练（最靠近 `Member` 类的 `0..n`）。从右到左，特定成员可能有一个教练或没有教练（最靠近\
  \ `Coach` 类的 `0..1`）。\n\n![A158240_2_En_5_Fig1_HTML.jpg](img/A158240_2_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1.\n教练和成员的数据模型（不推荐！）\n\n图[5-1]中模型的问题在于，教练很可能就是俱乐部的成员。当我们使用 `Coach` 表和 `Member`\
  \ 表来实现此模型时，有些人会在每个表中都有一行记录他们的详细信息。例如，布伦达·诺兰在 `Member` 表中有一行。当她担任教练角色时，我们还需要在 `Coach`\
  \ 表中有一行关于她的信息。如果布伦达有了新的电话号码，有人必须记得在两个表中都进行更改。极有可能这不会发生，最终我们会在其中一个表中得到旧的号码。\n\n在这个例子中，我们实际上并没有两个独立的成员和教练类。我们只有一个成员类，其中一些成员指导其他成员。这种自关系如图[5-2]所示。\n\
  \n![A158240_2_En_5_Fig2_HTML.jpg](img/A158240_2_En_5_Fig2_HTML.jpg)\n\n图 5-2.\n\
  成员指导其他成员的数据模型\n\n图[5-2]中的关系线可以顺时针方向解读为：特定成员可能指导几个其他成员或没有（`0..n`）。在另一个方向上，我们可以解读为：特定成员可能有一个教练或没有（`0..1`）。\n\
  \n在第一章中，我们展示了如何通过在一端表中添加一个列来表示一对多关系，该列的值来自另一端表的主键。图[5-2]中的模型是完全相同类型的一对多关系，只是我们在两端有相同的表，因此是一个自关系。为了表示这种关系，我们可以在\
  \ `Member` 表中添加一个 `Coach` 列，如图[5-3]所示。`Coach` 字段中的值也必须存在于键字段 `MemberID` 中。\n\n![A158240_2_En_5_Fig3_HTML.jpg](img/A158240_2_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3.\n在 Member 表中添加 Coach 列\n\n图[5-3]表中的第一行告诉我们，梅丽莎由成员 153 指导，从表的第三行可以看到成员 153\
  \ 是布伦达。我们需要将 `Coach` 字段的值约束为现有的成员之一，这样我们就不会意外地在 `Coach` 列中添加无效的成员编号。我们可以通过将 `Coach`\
  \ 字段设置为外键来实现这一点。从第一章回忆，外键是一个字段，其中任何非空值必须已经作为另一个表中的主键存在。对于图[5-3]中的表，`MemberType`\
  \ 是引用 `Type` 表的外键，这意味着 `MemberType` 列中的任何值都必须已经存在于 `Type` 表中。对于 `Coach` 列，“另一个”表是\
  \ `Member` 表本身。以下 SQL 语句展示了我们如何使用 `ALTER` 命令添加新的外键列 `Coach`：\n\n```sql\nALTER TABLE\
  \ Member\nADD Coach INT FOREIGN KEY REFERENCES Member;\n```\n\n有了修改后的 `Member` 表，我们现在可以回答几种不同类型的问题。例如：\n\
  \n*   教练的姓名是什么？\n*   简·吉尔摩的教练是谁？\n*   有没有人被残疾程度更高的人指导？\n*   有没有女性被男性指导？\n\n这些问题都无法通过检查表中的单行来回答。我们需要的是对\
  \ `Member` 表进行自连接。理解自连接最简单的方法是看看我们如何创建它。\n\n#### 创建自连接\n\n回顾第 3 章中对两个表之间连接的定义：笛卡尔积（两个表中每一行的所有组合）后接对满足某些连接条件的行子集的选取。对于自连接，我们考虑同一个表的两个副本。在图\
  \ 5-4 中，我们看到了`Member`表两个副本之间笛卡尔积的一部分。为了区分乘积中的不同元素，我为第一个副本起了别名`m`，为第二个副本起了另一个别名`c`（稍后你会明白原因）。在图\
  \ 5-4 中可见的笛卡尔积的一小部分里，我们看到副本`m`的第一行（Melissa）与副本`c`的每一行进行了配对。一些列标题被截断了，因为表格变得相当宽。\n\
  \n![A158240_2_En_5_Fig4_HTML.jpg](img/A158240_2_En_5_Fig4_HTML.jpg)\n图 5-4. 两个 Member\
  \ 表副本之间的笛卡尔积\n\n对于关于教练关系的查询，笛卡尔积中令人感兴趣的行是那些来自`m`的`Coach`值与来自`c`的`MemberID`值相同的行。在图\
  \ 5-4 中，你可以看到第三行包含了关于 Melissa（来自`Member`表的`m`副本）的信息，以及关于她的教练（来自`Member`表的`c`副本）的信息。现在别名的选择变得清晰了：`m`代表与成员相关的列；`c`代表与该成员教练相关的列。选择有用的别名可以使理解自连接变得容易得多。我们希望从笛卡尔积中选取的行是满足`m.Coach\
  \ = c.MemberID`的行。这是查找成员及其教练信息所需的连接条件。自连接的 SQL 如下：\n\n```sql\nSELECT *\nFROM Member\
  \ m INNER JOIN Member c ON m.Coach = c.MemberID;\n```\n\n自连接生成的结果表如图 5-5 所示。\n\n\
  ![A158240_2_En_5_Fig5_HTML.jpg](img/A158240_2_En_5_Fig5_HTML.jpg)\n图 5-5. 在 Member\
  \ 表上执行自连接以检索成员及其教练的信息\n\n现在我们有了自连接的结果，就可以回答上一节中提出的关于教练关系的问题了。其中最棘手的部分是认识到维护成员和教练的信息是一种自关系，并且从一开始就恰当地设计了`Member`表。\n\
  \n#### 涉及自连接的查询\n\n以图 5-5 中的连接表为基础，我们可以通过简单地选取行子集并投影适当的列来回答各种问题。每当我需要执行涉及自连接的查询时，我通常会先进行连接，保留图\
  \ 5-5 中的所有行和列。有了连接表（或列的快速草图）在面前，接下来的步骤通常相对简单。让我们通过几个问题来看看这是如何工作的。\n\n##### 教练的名字是什么？\n\
  \n观察图 5-5，我们可以看到教练的名字位于来自连接中`c`部分的列中。我们只需要`c.LastName`和`c.FirstName`列中的名字列表，因此这些列可以包含在`SELECT`子句中。我们不希望名字重复，所以使用关键字`DISTINCT`。下面的\
  \ SQL 语句将返回两位教练的名字，Brenda Nolan 和 William Cooper。\n\n```sql\nSELECT DISTINCT c.FirstName,\
  \ c.LastName\nFROM Member m INNER JOIN Member c ON m.Coach = c.MemberID;\n```\n\n\
  ##### 谁正在由一个差点杆数更高的人教练？\n\n要找出谁正在由差点杆数更高的人教练，我们需要比较成员的差点杆数（`m.Handicap`）与其教练的差点杆数（`c.Handicap`）。需要在连接子句后添加一个`WHERE`子句，以查找成员的差点杆数小于教练的差点杆数的情况：\n\
  \n```sql\nSELECT *\nFROM Member m INNER JOIN Member c ON m.Coach = c.MemberID\n\
  WHERE m.Handicap < c.Handicap;\n```\n\n对于图 5-5 中的数据，这将检索最后四行中的数据。（要成为一名好教练，你不一定要是一个很棒的高尔夫球手！）在完成连接并选择了适当的行之后，我们就可以选择希望在最终结果中出现的列，并将它们列在`SELECT`子句中。\n\
  \n##### 列出所有成员的名字及其教练的名字\n\n列出成员及其教练的名字听起来很简单，但如果我们不小心，可能会出错。第一个想法可能是仅从图 5-5 的连接表中投影包含成员和教练名字的四列。然而，连接表中只有\
  \ 10 行，而`Member`表中有 20 个成员。这里的问题是并非所有成员都有教练。我们在第 3 章关于外连接的部分讨论过类似的情况。\n\n回顾一下，让我们回到`Member`表两个副本的笛卡尔积，但看看涉及一个没有教练的成员的一些行，如图\
  \ 5-6 所示。\n\n![A158240_2_En_5_Fig6_HTML.jpg](img/A158240_2_En_5_Fig6_HTML.jpg)\n\
  图 5-6. 两个 Member 表副本之间笛卡尔积的一部分\n\n对于`Coach`列中为 null 的成员，连接条件（`m.Coach = c.MemberID`）永远不会满足，因此所有这些成员都将从我们的连接表中缺失。我们只需要小心地理解我们真正想要的是什么。我们是想要所有有教练的成员列表（10\
  \ 行），还是想要所有成员连同其教练姓名（如果有）的列表（20 行）？如果是后者，我们需要一个外连接。我们需要看到每个成员的名字（来自`Member`表的`m`副本），以及他的教练的名字（如果有）（来自`Member`表的`c`副本）。这个外连接的\
  \ SQL 如下：\n\n```sql\nSELECT m.LastName AS MemberLast, m.FirstName AS MemberFirst,\n\
  c.LastName AS CoachLast, c.FirstName AS CoachFirst\nFROM Member m LEFT OUTER JOIN\
  \ Member c ON m.Coach = c.MemberID;\n```\n\n在前面的查询中，我们为每个输出属性指定了一个列别名。列别名临时重命名列以提高输出的可读性。在这种情况下，它有助于读者区分名字属于谁，如图\
  \ 5-7 所示。如果没有别名，属性将被标记为`m.LastName`和`c.LastName`等，这些就不那么容易理解了。回顾第 3 章，对于左外连接，如果右表中没有匹配的行，那些列将填充为空值。图\
  \ 5-7 显示了左外连接的输出。\n\n![A158240_2_En_5_Fig7_HTML.jpg](img/A158240_2_En_5_Fig7_HTML.jpg)\n\
  图 5-7. 用于列出所有成员和教练的左外连接\n\n\n### 谁指导教练，或者说，谁是我的祖母？\n\n两个`Member`表副本之间的**自连接**向我们展示了一个成员和教练的层级。如果我们查看图\
  \ 5-7 中的行，可以看到托马斯·塞克斯顿（Thomas Sexton）由威廉·库珀（William Cooper）指导，而威廉·库珀又由布伦达·诺兰（Brenda\
  \ Nolan）指导，布伦达·诺兰没有教练。这个层级对于当前问题来说并不特别有趣，但在许多类似情况下，这种层级关系却相当重要。家谱学就是其中之一。考虑图 5-8\
  \ 中的数据模型和`Person`表的一部分。为了尽可能简单，我们只考虑关于女性和生母的一小部分信息。\n\n![A158240_2_En_5_Fig8_HTML.jpg](img/A158240_2_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8.\n女性及其生母的数据模型\n\n图 5-8 中的关系可以顺时针解读为“一个人可以是多个人的母亲”，反方向解读为“一个人最多有一位母亲，也可能没有。”然而，在现实生活中，后一种说法听起来不太对——当然每个人都有母亲。但是，与所有数据库一样，这个数据库只是对现实生活复杂性的一种近似，它只能保存可用的数据。除非我们追溯到原始的\
  \ slime（此处指远古），否则表中总会有一些我们不知道其母亲的人。布伦达就是其中之一。图 5-8 中的表和模型与我们的成员和教练示例具有完全相同的结构，但像“谁是苏（Sue）的祖母？”这样的问题似乎比“谁指导我的教练？”更有可能出现。\n\
  \n那么，我们如何获取关于个人及其母亲的信息呢？就像上一节一样，我们需要将`Person`表与自身连接。（别忘了将连接设置为**外连接**，这样就不会丢失布伦达的信息。）SQL\
  \ 如下：\n\n```sql\nSELECT *\nFROM Person p LEFT OUTER JOIN Person m on p.Mother =\
  \ m.ID;\n```\n\n该连接的 Access 图形界面如图 5-9 所示，同时也显示了结果表。我将表的第一个副本别名为`p`代表人物，第二个副本别名为`m`代表母亲。\n\
  \n![A158240_2_En_5_Fig9_HTML.jpg](img/A158240_2_En_5_Fig9_HTML.jpg)\n\n图 5-9.\n\
  查找人物及其母亲：**左外连接**的 Access 图示及结果表\n\n那么，如何追溯到上一代呢？为此，我们需要在图 5-9 的结果表和`Person`表的另一个副本（别名为`g`代表祖母）之间执行另一个**左外连接**。两个左外连接的\
  \ SQL 如下：\n\n```sql\nSELECT *\nFROM (Person p LEFT JOIN Person m ON p.Mother = m.ID)\n\
  LEFT JOIN Person g ON m.Mother = g.ID;\n```\n\n结果表如图 5-10 所示。\n\n![A158240_2_En_5_Fig10_HTML.jpg](img/A158240_2_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10.\n查找三代人：**左外连接**的 Access 图示及结果表\n\n显然，我们可以继续进行越来越多的自连接，直到没有更多代为止。当我们拥有自引用关系时，这类层次查询很可能会出现。一个需要注意的小问题是，我们必须在每个查询中指定连接的次数。标准\
  \ SQL 没有“自动进行自连接直到没有更多代”的概念，例如“查找我所有的女性祖先”；然而，一些数据库实现确实支持这种特性。¹\n\n#### 自连接的结果导向方法\n\
  \n在上一节中，一旦我们意识到需要自连接，问题都很容易回答。这是**过程导向方法**的一个例子——我们需要执行哪些操作？然而，有时候，当你需要时，这种领悟并不总会到来。每当我在面对查询时大脑一片空白，我就会诉诸于**结果导向方法**。\n\
  \n让我们再次查看`Member`表，并提出一个简单的问题：谁是梅丽莎（Melissa）的教练？不要考虑关系或连接，只需从外行人的角度来看数据。在图 5-11\
  \ 中，你可以看到如何找出答案，即使你从未听说过自连接（大多数人都没听说过）。\n\n![A158240_2_En_5_Fig11_HTML.jpg](img/A158240_2_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11.\n查找梅丽莎的教练\n\n要找到梅丽莎的教练，我们首先找到梅丽莎所在的行（图 5-11 中的`m`），然后注意到她的教练是成员 153。接着我们找到另一行（`c`代表教练），其`MemberID`值为\
  \ 153；我们可以看到梅丽莎的教练是布伦达。你不需要了解任何关于自引用关系、外键或连接的知识就能弄清楚这一点。但一旦你将这种逻辑清晰地记在脑海中，就可以用自然语言写下来，然后转换成\
  \ SQL 就相当直接了。\n\n让我们描述一下图 5-11：\n\n> 我需要查看`Member`表中的两行（`m`和`c`），我想输出`c.FirstName`，条件是`c.MemberID`的值与`m.Coach`相同，并且`m.FirstName`是‘Melissa’。\n\
  \n对应的 SQL 如下：\n\n```sql\nSELECT c.FirstName\nFROM Member m, Member c\nWHERE c.MemberID\
  \ = m.Coach AND m.FirstName = 'Melissa';\n```\n\n那么，这种结果导向方法如何对应我们之前考虑的过程导向方法呢？正如你所料，前面的\
  \ SQL 只是表述相同查询的另一种方式。在前面的 SQL 语句中，中间一行是两个`Member`表副本的笛卡尔积，`WHERE`子句的第一部分是连接条件。语句`FROM\
  \ Member m, Member c WHERE c.MemberID = m.Coach`只是表达我们在前面章节中使用的自连接的另一种方式。\n\n让我们尝试用结果导向方法解决另一个查询：谁正在被杆差更高的教练指导？我脑海中需要的图像是图\
  \ 5-12。\n\n![A158240_2_En_5_Fig12_HTML.jpg](img/A158240_2_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12.\n查找被杆差更高的教练指导的成员\n\n我们可以看到，黛博拉（Deborah）的杆差是 12，她正在被成员 235 指导。成员 235，威廉（William），杆差是\
  \ 14，因此黛博拉符合我们的标准。以下是代表图 5-12 中逻辑的更通用的陈述：\n\n> 我将查看`Member`表中的每一行（`m`），如果存在`Member`表中的另一行（`c`），使得`c.MemberID`与`m.Coach`相同，并且`m.Handicap`小于`c.Handicap`，我将输出`m.FirstName`和`m.LastName`。\n\
  \nSQL 的生成就很直接了：\n\n```sql\nSELECT m.FirstName, m.LastName\nFROM Member m, Member\
  \ c\nWHERE c.MemberID = m.Coach AND m.Handicap < c.Handicap;\n```\n\n再次，你可以在前面的查询中看到等价的自连接（`FROM\
  \ Member m, Member c WHERE c.MemberID = m.Coach`）。这种结果导向方法的有用之处在于，你不需要理解什么是自连接，也不必做出需要它的思维跳跃。通过用虚拟的手指和涉及哪些行来帮助你决策的方式思考，你可以勾勒出条件的陈述。SQL\
  \ 通常就能很容易地从中推导出来。\n\n\n\n### 涉及“两者”的问题\n\n在第 2 章的“避免常见错误”一节中，我们研究了类似“哪些成员同时报名了 24\
  \ 号和 36 号两项赛事？”的问题。为了回顾，我在图 5-13 中重新生成了`Entry`表。\n\n![A158240_2_En_5_Fig13_HTML.jpg](img/A158240_2_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13. Entry 表\n\n人们初次尝试用 SQL 语句查找同时报名了两项赛事的条目时，通常会写出以下查询：\n\n```\n-- Will not\
  \ produce the desired result\nSELECT e.MemberID\nFROM Entry e\nWHERE e.TourID =\
  \ 24 AND e.TourID = 36;\n```\n\n请记住，`WHERE`条件是针对表中的每一行单独应用的。条件(`e.TourID = 24 AND\
  \ e.TourID = 36`)对于任何单一行来说都不可能为真，因为每行的`TourID`只有一个值。前面的查询永远不会返回任何行，因为`TourID`的值不可能同时是两个不同的东西（24\
  \ 和 36）。这类查询可能相当危险，因为用户可能将空结果集误解为“没有成员同时报名了两项赛事”，而实际上查询语句本身是错误的。\n\n要回答这个问题，我们需要查看`Entry`表中的多个行。我发现，对于处理涉及“两者”的问题，**结果导向法**是最自然的。\n\
  \n#### 解决“两者”问题的结果导向法\n\n要回答“哪些成员同时报名了 24 号和 36 号两项赛事？”，我脑海中需要的图景如图 5-14 所示。\n\n\
  ![A158240_2_En_5_Fig14_HTML.jpg](img/A158240_2_En_5_Fig14_HTML.jpg)\n\n图 5-14. 哪些成员同时报名了\
  \ 24 号和 36 号两项赛事？\n\n观察图 5-14，可以清楚地看到成员 228 同时报名了两项赛事。我们要寻找的是两行（好比两根手指，分别标记为`e1`和`e2`），它们的`MemberID`值匹配，并且这两行分别具有所需的两个`TourID`值。\n\
  \n图 5-14 所展示逻辑的一个更通用的表述是：\n\n> 我将遍历`Entry`表中的每一行(`e1`)。如果该行的`TourID`值为 24，并且我也能在`Entry`表中找到另一行(`e2`)，其`MemberID`值与当前行相同，且其`TourID`值为\
  \ 36，那么我就写下当前行的成员 ID。\n\nSQL 语句由此诞生。如果你有困难，可以参考图 5-14。\n\n```\nSELECT e1.MemberID\n\
  FROM Entry e1, Entry e2\nWHERE e1.MemberID = e2.MemberID\nAND e1.TourID = 24 AND\
  \ e2.TourID = 36;\n```\n\n#### 解决“两者”问题的过程导向法\n\n一如既往，我们有多种思考查询的方式。看看上一个查询的中间两行。`FROM\
  \ Entry e1, Entry e2`是一个笛卡尔积（它会给我们所有行对的组合），然后通过(`WHERE e1.MemberID = e2.MemberID`)选择满足条件的行子集。这是一个连接操作。事实上，这是`Entry`表与其自身的**自连接**。`Entry`表两个副本之间的部分连接如图\
  \ 5-15 所示。\n\n![A158240_2_En_5_Fig15_HTML.jpg](img/A158240_2_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15. Entry 表两个副本之间的自连接部分\n\n图 5-15 中的自连接展示了来自`Entry`表的、属于同一成员的行的组合。例如，我们可以看到涉及成员\
  \ 228 的所有行组合。我们可以用这个自连接来回答关于哪些成员同时报名了 24 号和 36 号赛事的问题。我们只需要找到一行，其来自第一个副本的`TourID`是\
  \ 24，而来自第二个副本的`TourID`是 36（反之亦然）——即 `e1.TourID = 24 AND e2.TourID = 36`。\n\n这个自连接查询，后接`WHERE`子句以选择具有适当`TourID`值的行，如下所示：\n\
  \n```\nSELECT e1.MemberID\nFROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID\n\
  WHERE e1.TourID = 24 AND e2.TourID = 36;\n```\n\n如果你比较这两个查找同时报名了 24 号和 26 号赛事的查询，你会发现它们非常相似。它们将产生完全相同的结果。你可能会觉得其中一种方式更直观。\n\
  \n### 总结\n\n许多查询需要我们从表的两行中获取信息。这出现在多种情况下。主要的情况包括我们有自关系，或者有涉及“两者”一词的问题。我们研究了处理这些查询的**过程导向法**和**结果导向法**。两者都产生了外观非常相似且返回相同结果的\
  \ SQL 语句。拥有这两种不同的方法，在查询语句不那么显而易见时，会非常有帮助。\n\n#### 自关系\n\n当同一类的不同实例相互关联时，我们就有了自关系。在本章的例子中，某些成员是其他成员的教练。\n\
  \n从过程的角度看，关于教练或指导关系的查询需要自连接，它取表的两个副本并将它们连接起来。在下面的例子中，包含成员信息的`Member`表副本别名为`m`，包含教练信息的副本别名为`c`：\n\
  \n```\nSELECT m.LastName, m.FirstName, c.LastName, c.FirstName\nFROM Member m INNER\
  \ JOIN Member c ON m.Coach = c.MemberID\n```\n\n或者，从输出导向法出发，我们可能会得出这个等价的查询：\n\n\
  ```\nSELECT m.FirstName, m.LastName, c.LastName, c.FirstName\nFROM Member m, Member\
  \ c\nWHERE c.MemberID = m.Coach\n```\n\n这两个查询都可以作为回答许多关于指导关系问题的基础。\n\n#### 涉及“两者”一词的问题\n\
  \n带有“两者”一词的问题通常意味着我们需要查看表中的两行。在我们的例子中，我们想找到同时报名了 24 号和 36 号赛事的成员的`MemberID`。\n\n\
  从结果导向法出发，我们需要在`Entry`表中找到同一成员的两行(`e1`和`e2`)。其中一行必须是 24 号赛事，另一行必须是 36 号赛事。下面展示了基于结果的\
  \ SQL 查询：\n\n```\nSELECT e1.MemberID\nFROM Entry e1, Entry e2\nWHERE e1.MemberID\
  \ = e2.MemberID AND e1.TourID = 24 AND e2.TourID = 36;\n```\n\n或者，从过程导向法出发，我们可能会认识到需要`Entry`表两个副本之间的自连接，这是通过连接条件`e1.MemberID\
  \ = e2.MemberID`完成的。之后需要接一个`WHERE`子句来返回具有适当`TourID`值的行。\n\n与上一个查询等价的自连接查询是：\n\n\
  ```\nSELECT e1.MemberID\nFROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID\n\
  WHERE e1.TourID = 24 AND e2.TourID = 36;\n```\n\n脚注 1\n\n某些 SQL 实现确实支持可以遍历自关系的递归查询。请查阅你的文档，寻找诸如`WITH`或`CONNECT\
  \ BY`之类的关键字。\n\n## 6. 表之间的多重关系\n\n我们研究了表之间简单的一对多关系（例如，每个成员关联一种成员类型），也研究了自关系（例如，成员可能指导其他成员）。另一种经常出现的情况是，同一对表之间存在多个关系。\n\
  \n\n\n### 同一表之间的两种关系\n\n现在，我们来思考如何在高尔夫俱乐部数据库中引入“球队”的概念。首先，我们可以从思考关于一支球队需要保存哪些基本信息开始。图\
  \ 6-1 展示了一个代表简单球队的类，以及代表该类的一个表格中的若干行。\n\n![A158240_2_En_6_Fig1_HTML.jpg](img/A158240_2_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1.\n\n`Team`类及`Team`表中的一些行\n\n接下来，我们需要考虑新的`Team`类与我们其他类之间的关系。最明显的关系是，会员将为球队效力。图\
  \ 6-2 展示了代表这种情况的可能类图。\n\n![A158240_2_En_6_Fig2_HTML.jpg](img/A158240_2_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2.\n\n一名会员可以属于一支球队\n\n从左到右解读图 6-2 的类图：一个特定的会员可能效力于一支球队（靠近`Team`类的`1`），但一个会员也可以不为任何球队效力（靠近`Team`类的`0`）。从右向左解读：一支球队可以有许多会员为其效力（靠近`Member`类的`n`），但也可能没有任何会员（靠近`Member`类的`0`）。最后一点可能听起来有点奇怪，但当我们添加新球队，或者希望在新赛季重新开始时，一支球队可能暂时没有任何会员。\n\
  \n为了表示“一对多”关系，回想第 1 章的内容，我们需要从关系中“一”端的表获取主键，并将其作为外键添加到关系中“多”端的表。图 6-3 展示了一个新的外键字段`Team`，它引用了`Team`表。\n\
  \n![A158240_2_En_6_Fig3_HTML.jpg](img/A158240_2_En_6_Fig3_HTML.jpg)\n\n图 6-3.\n\n\
  `Member`表中的外键字段`Team`\n\n`Member`和`Team`之间可能发生的另一种关系是：一名会员可能管理一支球队。图 6-4 在类图中展示了这一额外的关系。\n\
  \n![A158240_2_En_6_Fig4_HTML.jpg](img/A158240_2_En_6_Fig4_HTML.jpg)\n\n图 6-4.\n\n\
  `Member`和`Team`类之间的两种关系\n\n图 6-4 的顶线可以这样解读：从左到右，一个特定的会员可能管理（至多）一支球队；从右到左，每支球队恰好有一名经理。\n\
  \n这个新关系是一种“一对一”关系。对于“一对多”关系，我们总是从关系的“一”端获取主键，并将其放入另一端的表中。这次，关系两端的基数都是`1`。我们可以在`Member`表中放置一个`Team_I_Manage`（我管理的球队）列，或者在`Team`表中放置一个`Manager`（经理）列。后者更合理，因为强制性的`Manager`属性是关于球队的更重要的信息，而可选的`Team_I_Manage`对于会员而言则不然。通常，在“一对一”关系中，我们从强制端（图\
  \ 6-4 中图示的 1:1 端）获取主键，并将其作为外键放入另一端。\n\n带有新`Manager`外键列的`Team`表，与`Member`表一起展示在图\
  \ 6-5 中。\n\n![A158240_2_En_6_Fig5_HTML.jpg](img/A158240_2_En_6_Fig5_HTML.jpg)\n\n\
  图 6-5.\n\n`Member`表中的外键`Team`和`Team`表中的外键`Manager`，用于表示图 6-4 中的关系\n\n从`Member`表，我们可以看到四人为\
  \ TeamB 效力（Brenda Nolan， William Cooper， Robert Pollard 和 Betty Young）；从`Team`表，我们可以看到会员\
  \ 153（Brenda Nolan）是 TeamB 的经理。你会注意到，数据模型中没有说明经理是否必须是球队的成员。TeamB 的经理是 TeamB 的成员，而\
  \ TeamA 的经理 239（Thomas Spence）则不是 TeamA 的成员。外键所隐含的唯一约束是：球队的经理必须存在于`Member`表中，并且一名会员只能属于存在于`Team`表中的球队。\n\
  \n你们中的一些人可能也意识到，将`Manager`设为外键并不能阻止同一个人管理多支球队。外键约束并不妨碍我们将会员 239 同时设为 TeamA 和 TeamB\
  \ 的经理。我们实际上在`Team`和`Member`之间为`Manages`（管理）关系建立了一种“一对多”关系。如果你想阻止一名会员管理多支球队，可以在`Team`表的`Manager`列上设置一个`UNIQUE`（唯一）约束。这类情况在我的数据库设计书中有更深入的讨论。¹\
  \ 以下 SQL 语句将创建一个`Team`表，其中`Manager`是一个引用`Member`表的外键，并且特定会员在表的`Manager`列中只能出现一次：\n\
  \n```sql\nCREATE TABLE Team (\n    TeamName CHAR(10) PRIMARY KEY,\n    PracticeNight\
  \ CHAR(20),\n    Manager INT FOREIGN KEY REFERENCES Member UNIQUE\n);\n```\n\n####\
  \ 从多重关系中提取信息\n\n既然我们已经有了`Team`和`Member`表以及它们的两种关系（`Plays for`（效力于）和`Manages`（管理）），我们就可以开始提取信息了。如果我们一次只考虑一种关系，构建查询就相对简单。如果我们想要一个会员列表，包含效力于某支球队的会员以及他们球队来自`Team`表的基本信息，我们可以简单地根据`Team\
  \ = TeamName`连接`Member`和`Team`表，如下面的 SQL 查询所示：\n\n```sql\nSELECT m.MemberID, m.LastName,\
  \ m.FirstName, m.Team,\n       t.TeamName, t.PracticeNight, t.Manager\nFROM Member\
  \ m INNER JOIN Team t ON m.Team = t.TeamName;\n```\n\n图 6-6 展示了上述查询的图形化表示和输出结果。\n\
  \n![A158240_2_En_6_Fig6_HTML.jpg](img/A158240_2_En_6_Fig6_HTML.jpg)\n\n图 6-6.\n\n\
  连接`Member`和`Team`以获取关于会员球队的额外信息\n\n类似地，如果我们想检索关于球队的信息，包括经理的姓名，我们可以根据`Manager = MemberID`连接`Member`和`Team`表：\n\
  \n```sql\nSELECT t.TeamName, t.PracticeNight, t.Manager,\n       m.MemberID, m.LastName,\
  \ m.FirstName\nFROM Team t INNER JOIN Member m ON t.Manager = m.MemberID;\n```\n\
  \n图 6-7 展示了上述查询的图形化表示和输出结果。\n\n![A158240_2_En_6_Fig7_HTML.jpg](img/A158240_2_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7.\n\n连接`Member`和`Team`以获取关于球队经理的额外信息\n\n现在，我们将看看如何检索涉及两种关系类型的信息。\n\n\n####\
  \ 过程方法\n\n图 6-6 所示连接所提供的信息并非特别有用。我们有了经理的 ID，但如果能同时显示他们的名字会更有用。我们需要另一个连接。首先，我们来看看如果在查询设计界面上同时添加\
  \ `Member` 和 `Team` 表，Access 默认会怎么做。这如图 6-8 所示。\n\n![A158240_2_En_6_Fig8_HTML.jpg](img/A158240_2_En_6_Fig8_HTML.jpg)\n\
  图 6-8. 将 `Member` 和 `Team` 表添加到图示查询界面时 Access 中的默认连接。\n\n查看图 6-8 查询的 SQL，会发现它这样连接表：\n\
  ```sql\nSELECT *\nFROM Member m  INNER JOIN Team t\nON t.TeamName = m.Team AND m.MemberID\
  \ = t.Manager;\n```\n你能弄清楚这个查询在回答什么问题吗？输出结果如图 6-9 所示。\n\n![A158240_2_En_6_Fig9_HTML.jpg](img/A158240_2_En_6_Fig9_HTML.jpg)\n\
  图 6-9. 图 6-8 中默认 Access 连接的输出。\n\n要理解上述连接发生了什么，考虑 `Member` 和 `Team` 的**笛卡尔积**是很有用的。笛卡尔积给出了两个表中每一行的所有组合。连接条件规定只显示\
  \ `MemberID` 与 `Manager` 相同，并且 `Team` 与 `TeamName` 也相同的行。用日常语言来说，这相当于“向我显示那些管理他们所在团队的成员”。对于我们的数据，这只是我们在图\
  \ 6-9 中看到的布伦达·诺兰的那一行。\n\n那么，我们如何构造一个查询来显示成员姓名、他们所在的团队以及团队经理的姓名呢？接下来的查询将提供关于成员、其团队以及经理\
  \ ID (`t.Manager`)的信息；但是，它不提供经理的姓名：\n```sql\nSELECT m.MemberID, m.LastName, m.FirstName,\
  \ t.TeamName, t.Manager\nFROM Member m INNER JOIN Team t ON m.Team = t.TeamName;\n\
  ```\n我们需要做的是，获取上述连接的结果，再将其与 `Member` 表的第二个副本 (`m2`) 连接起来，以检索经理的姓名。我们希望的连接条件是 `t.Manager\
  \ = m2.MemberID`，这样就能得到经理的姓名。图 6-10 展示了这两个连接的图示表示和输出。\n\n![A158240_2_En_6_Fig10_HTML.jpg](img/A158240_2_En_6_Fig10_HTML.jpg)\n\
  图 6-10. 使用两个连接和 `Member` 表的两个副本来包含团队经理的姓名。\n\n第一个连接从 `Member` 表的第一个副本给我们成员信息，以及该成员在\
  \ `Team` 表中的信息；第二个连接从 `Member` 表的第二个副本给我们团队经理的姓名。这两个连接的 SQL 是：\n```sql\nSELECT *\n\
  FROM (Member m INNER JOIN Team t ON m.Team = t.TeamName)\nINNER JOIN Member m2 ON\
  \ t.Manager = m2.MemberID;\n```\n将这个最新的查询和输出与图 6-8 和 6-9 中涉及 `Member` 和 `Team` 表之间单个连接的查询进行比较，你可能会发现这*很有指导意义*。\n\
  \n我们现在能够生成关于团队及其成员的各种报告。图 6-11 显示了一份基于前述查询及其输出的报告，该输出如图 6-10 所示。\n\n![A158240_2_En_6_Fig11_HTML.jpg](img/A158240_2_En_6_Fig11_HTML.jpg)\n\
  图 6-11. 基于图 6-10 所示查询的报告。\n\n报告已按团队分组，团队和经理信息（来自 `Team` 表和 `Member` 表的 `m2` 副本）位于组页眉。团队的成员（来自\
  \ `Member` 表的第一个副本 `m`）位于报告的细节部分。\n\n#### 结果方法\n\n我们现在将研究另一种构建查询的方法，以检索关于一个团队的所有信息（成员姓名、团队名称和经理姓名），用于类似图\
  \ 6-11 的报告。我觉得两个连接的想法相当直观，但其他人可能更喜欢不同的方法。\n\n我在图 6-12 中复制了这两个表。现在，不考虑连接，让我们看看如何选取一个成员并找出他或她所在的团队以及该团队的经理是谁。\n\
  \n![A158240_2_En_6_Fig12_HTML.jpg](img/A158240_2_En_6_Fig12_HTML.jpg)\n图 6-12. 找到一个团队成员（威廉·库珀）、他团队的名称以及团队经理的姓名。\n\
  \n无需考虑连接，我们就能找到所需的信息。我们需要来自三行的信息。让我们看一个具体案例。`Member` 表中的一行 (`m`) 将给我们一个成员的姓名（图 6-12\
  \ 中的威廉·库珀）。我们需要找到 `Team` 表中他团队对应的那一行 (`t`) (`m.Team = t.TeamName`)。然后我们需要 `Member`\
  \ 表中代表团队经理的另一行 (`m2`) (`t.Manager = m2.MemberID`)。\n\n在图 6-12 的帮助下，我们可以构建以下 SQL：\n\
  ```sql\nSELECT m.LastName, m.FirstName, m.Team, m2.LastName, m2.FirstName\nFROM\
  \ Member m, Team t, Member m2\nWHERE m.Team = t.TeamName AND t.Manager = m2.MemberID\n\
  ```\n如果我们愿意，可以在上述查询的 `SELECT` 子句中用 `t.TeamName` 替换 `m.Team`。\n\n前面的查询等同于带有两个连接的查询。`FROM`\
  \ 子句是三个表的笛卡尔积。`WHERE` 子句提供了 `Member` (`m`) 和 `Team` (`t`) 之间基于 `m.Team = t.TeamName`\
  \ 的连接条件，以及 `Team` 和另一个 `Member` 副本 (`m2`) 之间基于 `t.Manager = m2.MemberID` 的连接条件。\n\
  \n\n### 业务规则\n\n图 6-4 中的数据模型在下面作为图 6-13 重新展示。\n\n![A158240_2_En_6_Fig13_HTML.jpg](img/A158240_2_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13. `Member`（成员）和 `Team`（团队）类之间的两种关系。\n\n成员可以属于团队，成员也可以管理团队。当我们用外键实现这些关系时，施加在数据上的约束非常简单：一个成员只能存在于`Team`表中已有的团队里，一个团队也只能由`Member`表中的某个人来管理。\n\
  \n在各种情况下，可能还需要应用其他约束。例如，我们可能有额外的约束，比如一个团队最多只能有四名成员，或者经理必须是该团队的成员（或者不是）。这类约束通常被称为业务规则。图\
  \ 6-13 中的数据模型可能支撑着两个不同高尔夫俱乐部的数据库。虽然基本的完整性规则将适用于两个俱乐部（例如，成员不能属于不存在的团队），但每个俱乐部对于团队规模以及谁可以管理它们可能有不同的规则。外键约束不足以强制执行此类业务规则。\n\
  \n关系型数据库产品通常会提供某种方式来强制执行业务规则。像 SQL Server 和 Oracle 这样的大型系统提供了触发器。触发器是在指定事件发生时（例如，插入或更新记录时）执行的动作。触发器将拒绝任何不遵守规则的更改。在\
  \ Access 和其他产品中，无法将此类约束直接应用于表本身。但是，你可以将宏附加到输入表单上。这些宏会在数据提交到数据库之前检查表单上的数据。这种方法的问题在于，如果用户绕过表单（例如，使用\
  \ `SQL` 更新命令）直接向表中输入数据，则不会进行此类检查。\n\n我们不会详细探讨业务规则在不同产品中如何实现，但会看看查询如何帮助找到任何不满足约束的实例。尽管这是在问题发生后才去发现，但这些查询的变体将构成你为强制执行约束而需要编写的任何触发器或宏的基础。\n\
  \n让我们看看如何查找经理不是其团队成员的团队。当我面对这样的查询时，我的大脑常常一片空白，遇到这种情况，我总是采用结果导向的方法。这意味着设想涉及的表，并想象我正在寻找的实例类型。请看图\
  \ 6-14。\n\n![A158240_2_En_6_Fig14_HTML.jpg](img/A158240_2_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14. 查找经理不是其团队成员的团队。\n\n在图 6-14 中，我们在 `Team` 表中看到 `TeamA` 的经理是 `239`，并且在 `Member`\
  \ 表中看到成员 `239` 不属于任何团队。如果我们有一个约束要求经理必须属于该团队，那么 `TeamA` 将不遵守该约束。\n\n要查找所有这样的团队，我们可以这样描述：\n\
  \n> 从 `Team` 表的所有行 (`t`) 中，找出那些在 `Member` 表中对应的经理行 (`m`)（即 `t.Manager = m.MemberID`）的团队\
  \ (`m.Team`) 为空或与 `Team` 表中的团队 (`t.TeamName`) 不同（`m.Team <> t.TeamName`）的团队名称。\n\
  \n等价的 `SQL` 如下所示：\n\n```sql\nSELECT t.teamname\nFROM Member m, Team t\nWHERE m.MemberID\
  \ = t.Manager\nAND (m.Team <> t.Teamname OR m.Team IS NULL)\n```\n\n中间两行等同于在 `m.MemberID\
  \ = t.Manager` 上对两个表进行连接，最后一行找出那些在不同团队或根本不在任何团队中的经理。以下查询将产生等效的输出，但使用了内连接表示法：\n\n\
  ```sql\nSELECT t.teamname\nFROM Member m INNER JOIN Team t ON m.MemberID = t.Manager\n\
  WHERE m.Team <> t.Teamname OR m.Team IS NULL\n```\n\n关于为什么在两个查询中都包含了 `IS NULL` 条件的一个说明：你可能还记得第\
  \ 2 章的内容，如果我们与 `NULL` 值进行比较，结果既不是真也不是假。如果我们想找出不在任何团队中的经理，我们需要在查询中明确包含这种可能性。如果要求只是经理不能属于*不同*的团队，我们就可以省略对\
  \ `NULL` 值的检查，因为没有团队的经理将被视为符合要求。一如既往，清楚地理解你实际想查找的内容是编写查询最重要的部分。\n\n前面的两个查询可以找到有错误经理的团队，但只能在它们被添加到数据库之后。我们如何从一开始就防止它们被添加呢？解决方案取决于数据库的实现。在数据更改最终提交到数据库之前，它们通常会被记录在某种缓冲区中。例如，在\
  \ SQL Server 中，正在更新或添加的记录保存在一个名为 `inserted` 的临时表中。如果我们向 `Team` 表添加或更新一些记录，会创建一个与\
  \ `Team` 表结构相同的临时表 (`inserted`) 来临时保存新的或更新的记录。我们希望执行一个查询，来检查即将添加到 `Team` 表的任何新记录是否包含不遵守约束的经理。但是，我们不是查看\
  \ `Team` 表，而是查看临时 `inserted` 表中的记录，并统计其中有多少是无效的。\n\n以下 `SQL` 查询（与前两个查询非常相似）将统计 `Team`\
  \ 表的 `inserted` 缓冲区中，有多少行的经理不遵守关于经理必须属于其所管理团队的业务规则：\n\n```sql\nSELECT COUNT(*)\n\
  FROM Member m INNER JOIN inserted i ON m.MemberID = i.Manager\nWHERE m.Team <> i.Teamname\
  \ OR m.Team IS NULL\n```\n\n如果这个计数不为零，则说明即将插入的行中有不遵守规则的行。在这种情况下，我们希望回滚插入操作，以便这些行不会提交到\
  \ `Team` 表。以下 `SQL` 语句将包含在 `SQL Server` 的一个触发器中。该触发器需要被设置为在 `Team` 表更新或插入行时运行。\n\
  \n```sql\nIF\n(SELECT COUNT(*)\nFROM Member m INNER JOIN inserted i ON m.MemberID\
  \ = i.Manager\nWHERE m.Team <> i.Teamname OR m.Team IS NULL) <> 0)\nBEGIN\nRollback\
  \ Tran\nEND\n```\n\n这是一个有点粗糙的方法，因为如果有任何新记录不正确，整个批次都会被拒绝。你需要查阅你的数据库产品文档，以了解如何开发高效的触发器，但使用查询来检查新记录有效性的思路是常见的。\n\
  \n在 Access 中，检查是在界面层面完成的，通常在表单上。我们不会像前面的查询那样检查 `inserted` 表，而是创建一个带有类似查询的宏，在将表单上的字段值提交到数据库之前检查这些值。\n\
  \n\n\n### 摘要\n\n表之间可能存在多个关系。例如，“一个成员可能属于一个团队”是一种关系，“团队有一个作为经理的俱乐部成员”是另一种关系。查找关于成员团队的信息（包括经理的\
  \ ID）需要在 `Member` 和 `Team` 表之间进行连接。如果我们还想找到经理的姓名，就需要将该结果与 `Member` 表的第二个副本连接，像这样：\n\
  \n```sql\nSELECT * FROM\n(Member m INNER JOIN Team t ON m.Team = t.TeamName)\nINNER\
  \ JOIN Member m2 ON t.Manager = m2.MemberID\n```\n\n表之间可能存在相当复杂的业务规则或约束。例如，我们可能要求经理必须是他或她所管理团队的成员，或者经理不应是任何团队的成员，或者一个团队必须少于六名成员。这些通常需要使用触发器。本章讨论的查询类型将有助于制定触发器中所需的代码。\n\
  \n脚注 1\n\nClare Churcher，《Beginning Database Design: From Novice to Professional》（纽约：Apress，2012）。\n\
  \n"
- '# 7. 集合操作


  关系数据库理论的一个巨大优势是表（或更正式地说，关系）由不同的行组成，因此可以被视为一个集合。然后，我们可以使用集合操作来帮助组合和提取特定信息。集合操作有助于解决的问题类型是：“哪些人同时在这两个集合中？”或“哪些人在这个集合中而不在那个集合中？”


  在附录 2 中，你可以找到一些有助于管理集合操作的正式符号。在本章中，我们将尽量减少形式化内容，但集合操作的符号是一种有用的简写。表 7-1 展示了我们将研究的四种集合操作及其通用符号和关联的
  SQL 关键字（如果有的话）。


  表 7-1. 四种集合操作及其符号


  | 操作 | 符号 | SQL 关键字 |

  | --- | --- | --- |

  | 并集 | ∪ | `UNION` |

  | 交集 | ∩ | `INTERSECT` |

  | 差集 | − | `EXCEPT` |

  | 除法 | ÷ |  |


  并非所有 SQL 实现都支持表 7-1 中的所有关键字，因此当关键字不可用时，我们将研究实现相同结果的替代方法。


  ### 基本集合操作概述


  我们将依次研究每种集合操作，但为了让你了解方向，我将先快速概述三种最常见的操作：并集、交集和差集。想象我们有两个高尔夫俱乐部的会员表。我们可能想要：


  *   确定谁在两个俱乐部中。

  *   合并一个包含所有会员的大列表。

  *   找出谁在一个俱乐部中而不在另一个俱乐部中。


  基本的集合操作允许我们执行所有这些任务。


  让我们假设每个俱乐部将其成员姓名存储在一个表中。这两个表具有完全相同的列（更多内容将在下一节中介绍），如图 7-1 所示。（好吧，它们是非常小的俱乐部！）


  ![A158240_2_En_7_Fig1_HTML.jpg](img/A158240_2_En_7_Fig1_HTML.jpg)

  图 7-1. 两个成员姓名表


  对这两个表的基本集合操作总结在图 7-2 中。两个俱乐部表的图像已叠加，以便将共有成员叠加在一起。`ClubA` 是每张图片中的顶部表格。对于图 7-2 的每一部分，方框显示了集合操作的结果。


  ![A158240_2_En_7_Fig2_HTML.jpg](img/A158240_2_En_7_Fig2_HTML.jpg)

  图 7-2. 对两个表 ClubA（上）和 ClubB（下）进行的基本集合操作


  并集操作符（图 7-2 左上）显示来自每个表的所有名称（重复项已删除）。交集操作符（右上）返回同时出现在两个表中的两行。差集操作符（下）返回在一个俱乐部中而不在另一个俱乐部中的行。


  ### 联合兼容表


  集合操作并集、交集和差集在两组行之间进行操作。尝试比较结构非常不同的表中的行是没有意义的，例如图 7-3 中的表。


  ![A158240_2_En_7_Fig3_HTML.jpg](img/A158240_2_En_7_Fig3_HTML.jpg)

  图 7-3. 尝试比较具有不同结构的表中的行是没有意义的


  那么，什么决定了两组行是否可以使用集合操作并集、交集和差集进行比较？正式来说，这两组必须具有相同数量的列，并且每列必须具有相同的域。严格来说，域是一组可能的值。然而，在实践中，集合操作的要求是，每组行中对应的列（即从左到右的顺序）具有相同的类型
  `—` 都是字符型，都是整型，等等。¹ 列的名称不需要相同。满足这些要求的表被称为联合兼容的，尽管该要求对于交集和差集操作也是必需的。


  图 7-4 显示了一对联合兼容的表。即使列的名称不同，它们具有相同数量的列，并且对应的列具有相同的类型。


  ![A158240_2_En_7_Fig4_HTML.jpg](img/A158240_2_En_7_Fig4_HTML.jpg)

  图 7-4. 联合兼容的表，即使列名不同


  图 7-5 有两个具有相同列名的表，但它们不是联合兼容的，因为列的顺序使得第四列在上表中是数字类型，在下表中是字符类型，最后一列则相反。


  ![A158240_2_En_7_Fig5_HTML.jpg](img/A158240_2_En_7_Fig5_HTML.jpg)

  图 7-5. 不联合兼容的表


  不同的 SQL 实现可能会以不同的方式解释对域或类型“相同性”的严格要求。严格来说，定义为 `CHAR(10)` 和 `CHAR(12)` 的两个字段具有不同的域，但许多
  SQL 实现会允许这些字段在集合操作的目的上被视为相同。一些实现还会将数字转换为字符以执行集合操作。我觉得这特别可怕，不建议让你的应用程序替你做出这种决定。以下各节将演示如何使用
  SQL 使你的表联合兼容。




  #### 确保并集兼容性


  当表不具备并集兼容性时，通常可以通过调整 `SELECT` 子句来弥补这种不兼容性。


  对于图 7-5 中的那对表，如果我们只是按如下方式选择列，列的顺序将导致返回的行无法实现并集兼容：


  ```sql

  SELECT * FROM ClubC;

  SELECT * FROM ClubD;

  ```


  然而，我们可以在 `SELECT` 子句中指定列的顺序：


  ```sql

  SELECT MemberID, LastName, FirstName, Handicap, MemberType FROM ClubC;

  SELECT MemberID, LastName, FirstName, Handicap, MemberType FROM ClubD;

  ```


  现在，由这些查询返回的两组行是并集兼容的。


  另一个不兼容性问题发生在原始表设计中将列声明为不同类型时。例如，`ClubC` 表可能将 `Handicap` 字段声明为 `INT` 类型，而 `ClubD`
  表可能（不明智地）将 `Handicap` 值存储在 `CHAR` 字段中。（回想第 2 章，如果我们将值存储在字符或文本字段中，它们将按字母顺序排序，并且我们将无法对其执行平均值等函数。）如前所述，SQL
  的不同实现会以各种方式处理这些不同类型。许多会尝试将数字转换为文本，反之亦然。你可以通过使用类型转换函数来自己控制这些转换（这可能是个好主意）。


  例如，在 SQL Server 中，表达式 `Convert(INT, Handicap)` 会将 `Handicap` 字段中的文本值（如“14”）转换为整数值（14）。（如果
  `Handicap` 字段中的值无法转换为整数，则会发生错误。）如果 `ClubD` 表中的 `Handicap` 字段是 `CHAR` 类型，那么我们可以在
  `SELECT` 子句中使用转换函数。以下查询返回的两组行现在将是并集兼容的：


  ```sql

  SELECT MemberID, LastName, FirstName, Handicap FROM ClubC;

  SELECT MemberID, LastName, FirstName, Convert(INT, Handicap) FROM ClubD;

  ```


  ### Union


  Union 允许我们生成由两个并集兼容的行集中的所有唯一行组成的输出。要在 SQL 中执行 union 操作，我们需要首先使用两个 `SELECT` 子句检索两组行，然后使用
  `UNION` 关键字将两组行合并。以下 SQL 展示了图 7-4 所示的两个并集兼容表（`ClubA` 和 `ClubB`）中所有行的合并。


  ```sql

  SELECT * FROM ClubA

  UNION

  SELECT * FROM ClubB;

  ```


  结果表将包含来自两个表的所有行，且没有重复项，因此你将看到 Barbara Olson、Robert Pollard 和 Thomas Sexton 各只出现一行，如图
  7-6 所示。如果你出于某种原因希望保留重复项，可以使用关键词 `UNION ALL`。


  ![A158240_2_En_7_Fig6_HTML.jpg](img/A158240_2_En_7_Fig6_HTML.jpg)


  图 7-6. ClubA 和 ClubB 的 Union 结果，无重复行


  由于并集兼容的表不需要具有相同的列名，生成的虚拟表中的列名通常来自其中一个表。在图 7-6 的示例中，列名与 union 查询中提到的第一个表相同。


  对于 union 操作符而言，以何种顺序指定两个表并不重要。下面的查询将返回与前一个查询相同的行。行的显示顺序可能不同，列的显示名称也可能改变，但数据将是相同的。


  ```sql

  SELECT * FROM ClubB

  UNION

  SELECT * FROM ClubA;

  ```


  #### 选择合适的列


  使用 union 操作符时，你需要仔细考虑你实际想要什么。关于俱乐部的示例相当刻意（你可能已经注意到了）。两个俱乐部拥有具有相同 ID 号和相同会员类型的成员的可能性非常小。更可能的情况是，如果
  Barbara Olson 确实属于两个俱乐部，她在每个俱乐部表中的数据会有所不同。在 `ClubA` 表中，她可能是一名资深会员，`MemberID` 值为
  258。在 `ClubB` 表中，她可能是一名准会员，`RegNum` 值为 4573。如果我们执行图 7-6 中所示的 union，即从每个表中选择所有列，那么
  Barbara 的两行数据将是不同的，因此两者都会出现在结果中，如图 7-7 所示。


  ![A158240_2_En_7_Fig7_HTML.jpg](img/A158240_2_En_7_Fig7_HTML.jpg)


  图 7-7. 由于行不同，Union 结果中出现两条 Barbara Olson 的记录


  我们需要考虑从这样的 union 中真正想要什么。如果我们需要为两个俱乐部的联合圣诞派对准备一份姓名列表，那么我们不希望每个人都被列出两次。避免重复的方法是在执行
  union 之前，仅从每个表中投影（选择）姓名列：


  ```sql

  SELECT FamilyName, Name FROM ClubA

  UNION

  SELECT LastName, FirstName FROM ClubB;

  ```


  使用此查询，Barbara 的两行数据将变得相同，并且只会在 union 结果中出现一次，如图 7-8 所示。


  ![A158240_2_En_7_Fig8_HTML.jpg](img/A158240_2_En_7_Fig8_HTML.jpg)


  图 7-8. 如果 Union 中只包含姓名列，则 Barbara Olson 只出现一行


  当然，最后这个查询存在一个严重问题。可能有两个 Barbara Olson，一个在每个俱乐部，现在只有一张姓名卡会被打印出来给他们俩。可悲的是，真实数据充满了这类问题。幸运的话，可能存在某个通用的国家高尔夫协会号码可以解决这个问题，但如果不行，你就需要保持警惕。下一节讨论的交集操作将生成同时出现在两个俱乐部名单中的姓名，届时可以进行人工合理性检查。




  ### 联合的用途


  `union`的主要用途是将来自两个或多个表的数据合并，正如我们在前面章节中所做的那样。例如，如果不同月份的锦标赛报名数据存储在不同的表中（这可不是一个很好的设计决定！），我们可以使用多个`union`操作来合并全年的数据。


  也可以合并来自同一个表的两组行。假设我们想知道图 7-9 中`Entry`表中，有多少人报名参加了 24 号或 36 号锦标赛。


  ![A158240_2_En_7_Fig9_HTML.jpg](img/A158240_2_En_7_Fig9_HTML.jpg)

  图 7-9. 报名表


  我们可以尝试选择报名参加 24 号锦标赛的行和报名参加 36 号锦标赛的行，然后取其联合。如果我们执行以下查询，会得到多少行？


  ```sql

  SELECT * FROM Entry WHERE TourID = 24

  UNION

  SELECT * FROM Entry WHERE TourID = 36;

  ```


  我们将从这个查询中得到十行，每行对应一个报名了 24 号或 36 号锦标赛的记录。因为我们保留了`TourID`和`Year`列，我们选择的所有行都是不同的，因此都会出现在联合的结果中。该查询实际上返回的是所有报名
  24 号和 36 号锦标赛的不同记录，而不是所有报名了这两个锦标赛的不同会员。下面的查询仅对这两个锦标赛的 ID 取联合：


  ```sql

  SELECT MemberID FROM Entry WHERE TourID = 24

  UNION

  SELECT MemberID FROM Entry WHERE TourID = 36;

  ```


  现在我们将得到五个 ID（118, 228, 258, 286, 415），它们是报名了其中任一锦标赛的会员的唯一 ID。


  有一种更简单的方法来检索报名了 24 号或 36 号锦标赛的人。我们可以在`WHERE`子句中直接使用一个`OR`条件：


  ```sql

  SELECT MemberID FROM Tournament

  WHERE TourID = 24 OR TourID = 36;

  ```


  上面的查询将返回多少行？同样，它将返回十行——`TourID`列中值为 24 或 36 的每一行。为了得到五个唯一的 ID，我们需要在`SELECT`子句中添加`DISTINCT`关键字。


  ### 联合与完全外连接


  在第 3 章中，我们研究了不同的连接操作：内连接、左外连接和右外连接，以及完全外连接。有些产品（例如 Microsoft Access 2013）不支持`FULL
  OUTER JOIN`关键字；但是，我们可以使用`UNION`关键字执行一个等效的查询。


  为了回顾一下，让我们复习一下可以在图 7-10 所示的`Member`表（只是一个非常小的表！）和`Type`表之间执行的不同类型的连接。


  ![A158240_2_En_7_Fig10_HTML.jpg](img/A158240_2_En_7_Fig10_HTML.jpg)

  图 7-10. （小）会员表和类型表


  图 7-11 显示了两个表之间的内连接，连接条件是`MemberType = Type`。我们没有得到 Helen Branch 的行，因为她的`MemberType`中没有值，因此连接条件对她来说永远不会为真。如果查看图
  7-11 中表格的人认为它显示了所有会员，这可能是个问题。


  ![A158240_2_En_7_Fig11_HTML.jpg](img/A158240_2_En_7_Fig11_HTML.jpg)

  图 7-11. 在 MemberType = Type 条件下 Member 表和 Type 表的内连接


  现在我们将看看外连接。左外连接确保我们看到左表（`Member`）的所有行；右外连接给我们右表（`Type`）的所有行；而完全外连接则给我们两个表的所有行。图
  7-12 展示了这些外连接，它们的连接条件都是`MemberType = Type`。


  ![A158240_2_En_7_Fig12_HTML.jpg](img/A158240_2_En_7_Fig12_HTML.jpg)

  图 7-12. 在 MemberType = Type 条件下 Member 表和 Type 表的三种外连接


  图 7-12 显示，在这种情况下，完全外连接由另外两个外连接中的唯一行组成；也就是说，是一个联合。如果你的 SQL 实现不明确支持完全外连接，你总是可以通过以下查询获得相同的结果：


  ```sql

  SELECT * FROM Member LEFT JOIN Type ON MemberType = Type

  UNION

  SELECT * FROM Member RIGHT JOIN Type ON MemberType = Type;

  ```


  #### 交集


  如果你对两个联合兼容的表取交集，你将检索出在两个表中都存在的那些行。图 7-13 复制了来自图 7-4 的两个表`ClubA`和`ClubB`。我们可以看到，在两个表中完全相同的行有四行。


  ![A158240_2_En_7_Fig13_HTML.jpg](img/A158240_2_En_7_Fig13_HTML.jpg)

  图 7-13. ClubA 表和 ClubB 表的交集中的行


  SQL 中交集操作符的关键字是`INTERSECT`。检索两个表共有的四行（即会员 Spence, Olson, Pollard 和 Sexton）的表达式如下：


  ```sql

  SELECT * FROM ClubA

  INTERSECT

  SELECT * FROM ClubB;

  ```


  与联合操作符一样，两组行必须是联合兼容的；也就是说，它们必须有相同数量的列，并且对应的列必须具有相同的域。这可能意味着需要像本章前面“选择适当的列”一节所描述的那样，从基表中投影出适当的列。在查询中先提到哪个表无关紧要，因为无论表的顺序如何，交集返回的行都是相同的。



  #### 交集的用途


  交集操作的一个常见用途如图 7-13 所示：在两个具有相似信息的表中查找共同的行。另一个非常常见的交集用途是回答包含“都”这个词的问题。一个典型例子是“哪些成员**同时参加了**第
  36 和 38 号锦标赛？” `Entry`（参赛）表如图 7-14 所示。


  ![A158240_2_En_7_Fig14_HTML.jpg](img/A158240_2_En_7_Fig14_HTML.jpg)


  图 7-14. `Entry` 表


  如果我们像下面这个查询一样，检索每个锦标赛的行并取其交集，会返回什么结果？


  ```sql

  SELECT * FROM Entry WHERE TourID = 36

  INTERSECT

  SELECT * FROM Entry WHERE TourID = 38;

  ```


  将不会返回任何行。图 7-15 将帮助你理解原因。


  ![A158240_2_En_7_Fig15_HTML.jpg](img/A158240_2_En_7_Fig15_HTML.jpg)


  图 7-15. 两个查询没有共同的行，因此交集没有结果


  这两个查询永远不会有任何共同的行，因为一个查询的 `TourID` 列值总是 36，而另一个总是 38。本质上，我们试图执行的查询是找出所有**既是**36 号锦标赛参赛记录**也是**38
  号锦标赛参赛记录的条目。根据我们管理参赛记录的方式，结果是没有。


  要检索图 7-15 中两组行里共同的成员，我们必须在执行交集之前只检索 `MemberID` 列，如下面的查询所示：


  ```sql

  SELECT MemberID FROM Entry WHERE Tourid = 36

  INTERSECT

  SELECT MemberID FROM Entry WHERE Tourid = 38;

  ```


  此查询如图 7-16 所示。与并集一样，交集操作的结果返回的是唯一行。


  ![A158240_2_En_7_Fig16_HTML.jpg](img/A158240_2_En_7_Fig16_HTML.jpg)


  图 7-16. 使用交集查找同时参加了锦标赛 36 和 38 的成员


  假设我们现在想找出成员的姓名。从过程的角度来看，我们可以获取交集的结果，并将其与 `Member` 表连接以获得姓名，如图 7-17 所示。


  ![A158240_2_En_7_Fig17_HTML.jpg](img/A158240_2_En_7_Fig17_HTML.jpg)


  图 7-17. 将交集与 `Member` 表连接以查找姓名


  那么，首先执行交集然后与 `Member` 表连接的 SQL 是什么样的？以下是第一次尝试，但不幸的是，它**无法工作**：


  ```sql

  --Will not work

  SELECT LastName, FirstName

  FROM Member m INNER JOIN

  (SELECT e1.MemberID FROM Entry e1 WHERE e1.TourID = 36

  INTERSECT

  SELECT e2.MemberID FROM Entry e2 WHERE e2.TourID = 38)

  ON m.MemberID = e1.MemberID;

  ```


  只出现在内层查询（括号内的部分）中的表不能被外层查询（连接）引用。这可以通过给嵌套的查询部分起一个别名来轻松解决。就像我们在 `FROM` 子句中 `Member`
  后面加上 `m` 来给 `Member` 表起别名一样，我们可以在内层查询的最后括号后加上 `NewTable`（例如）来给整个内层查询起一个别名。我们现在可以在连接条件中引用该别名，如下面的查询所示：


  ```sql

  SELECT LastName, FirstName

  FROM Member m INNER JOIN

  (SELECT e1.MemberID FROM Entry e1 WHERE e1.TourID = 36

  INTERSECT

  SELECT e2.MemberID FROM Entry e2 WHERE e2.TourID = 38) NewTable

  ON m.MemberID = NewTable.MemberID;

  ```


  另一种检索姓名的方法是使用嵌套查询。这里，内层查询检索交集中的 ID，外层查询从 `Member` 表中找到对应的姓名。


  ```sql

  SELECT LastName, FirstName

  FROM Member

  WHERE MemberID IN

  (SELECT MemberID FROM Entry WHERE TourID = 36

  INTERSECT

  SELECT MemberID FROM Entry WHERE TourID = 38);

  ```


  #### 投影适当列的重要性


  仔细考虑交集操作涉及的表中包含哪些列非常重要。我们在上一节看到，以下查询将返回空行：


  ```sql

  SELECT * FROM Entry WHERE TourID = 36

  INTERSECT

  SELECT * FROM Entry WHERE TourID = 38;

  ```


  第一个查询的行中 `TourID` 的值总是 36，而第二个查询的行中 `TourID` 的值总是 38。永远不会有共同的行。在每个查询中只检索 `MemberID`
  解决了这个问题。


  更有趣的是，正确地投影不同的列可以回答截然不同的问题。你会如何描述以下查询返回的行？


  ```sql

  SELECT MemberID, Year FROM Entry WHERE TourID = 25

  INTERSECT

  SELECT MemberID, Year FROM Entry WHERE TourID = 36;

  ```


  该查询如图 7-18 所示。


  ![A158240_2_En_7_Fig18_HTML.jpg](img/A158240_2_En_7_Fig18_HTML.jpg)


  图 7-18. 这个交集表示什么？


  在图 7-18 中，我们正在查找所有在**同一年**参加了第 25 和 36 号锦标赛的成员。这就是为什么成员 415 没有出现在交集中：他在 2013 年参加了第
  25 号锦标赛，在 2014 年和 2015 年参加了第 36 号锦标赛。虽然他的成员 ID 出现在两个源表中，但对应的行属于不同的年份。没有哪个成员 415
  的行在两张表中是完全相同的。


  如你所见，为参与交集的表选择投影哪些列，对于交集中将出现什么内容至关重要。这意味着可以非常优雅地回答许多不同的问题，但也意味着如果你没有仔细考虑查询，很容易得到错误的答案。



  ### 不使用 INTERSECT 关键字进行管理


  并非所有 SQL 实现都明确支持交集运算。然而，我们还有其他方法来执行涉及“两者”的查询。交集是一种**过程式方法**——我们是在说明需要对查询中涉及的表执行什么操作。如果这种方法行不通，那么我们可以尝试**结果式方法**。这涉及到通过检查表来找出一些可能的答案，而无需担心诸如交集和连接之类的操作。在图
  7-19 中，我们想象有两根手指遍历 `Entry` 表的行。我们需要在 `Entry` 表中找到两行具有相同 `MemberID` 的行：一行 `TourID`
  = 36，另一行 `TourID` = 38。


  ![A158240_2_En_7_Fig19_HTML.jpg](img/A158240_2_En_7_Fig19_HTML.jpg)

  图 7-19. 查找同时参加了锦标赛 36 和 38 的成员


  图 7-19 描述的情况可以描述为：


  > 从 `Entry` 表的行 `e1`（其中 `TourID=36`）中返回 `MemberID`，前提是 `Entry` 表中存在另一个行 `e2`，它具有相同的
  `MemberID` 且 `TourID=38`。


  与此描述和图 7-19 等效的 SQL 表达式是：


  ```sql

  SELECT DISTINCT e1.MemberID

  FROM Entry e1, Entry e2

  WHERE e1.MemberID = e2.MemberID

  AND e1.TourID = 36 AND e2.TourID = 38;

  ```


  那么，查找同时出现在 `ClubA` 和 `ClubB` 表中的行的查询呢？俱乐部表在图 7-20 中重新显示。为了找出两个表中相同的行，我们需要检查相应列中的每个值，以确保它们相同。


  ![A158240_2_En_7_Fig20_HTML.jpg](img/A158240_2_En_7_Fig20_HTML.jpg)

  图 7-20. 查找 ClubA 和 ClubB 之间的交集


  图 7-20 所描述的情况可以描述为：


  > 如果 `ClubB` 中存在一行 `b`，其所有字段的值都与 `a` 相同（即 `a.RegNum = b.MemberID`, `a.FamilyName
  = b.LastName`, 且 `a.Name = b.FirstName`），则我将返回表 `ClubA` 中的行 `a`。


  图 7-20 所示交集的 SQL 是：


  ```sql

  SELECT a.RegNum, a.FamilyName, a.Name

  FROM ClubA a, ClubB b

  WHERE a.RegNum = b.MemberID

  AND a.FamilyName = b.LastName

  AND a.Name = b.FirstName;

  ```


  #### 差集


  对两个表进行差集运算，可以找出那些在第一个表中但不在第二个表中的行，反之亦然。对于我们这两个小型俱乐部，我在图 7-21 中复制了差集运算符的结果。


  ![A158240_2_En_7_Fig21_HTML.jpg](img/A158240_2_En_7_Fig21_HTML.jpg)

  图 7-21. 差集运算符找出存在于一个表中但不出现在另一个表中的行。


  标准 SQL 中差集运算符的关键字是 `EXCEPT`。Oracle 与 ISO SQL 标准以及大多数其他数据库系统不同，它使用关键字 `MINUS` 而不是
  `EXCEPT`。


  与并集和交集运算符一样，参与差集运算的表必须是**并兼容**的。与并集和交集运算符不同的是，表的**顺序**对于差集运算符很重要；`ClubA - ClubB`
  的结果与 `ClubB - ClubA` 的结果不同（如图 7-21 所示）。


  用于查找在 `ClubA` 表中但不在 `ClubB` 表中的人员姓名的 SQL 是：


  ```sql

  SELECT LastName, FirstName FROM ClubA

  EXCEPT

  SELECT LastName, FirstName FROM ClubB;

  ```


  #### 差集的用途


  每当你的查询中包含“不”这个词时，你应该考虑差集运算符可能有用。例如，我们如何查找未参加锦标赛 25 的成员？回想一下第 5 章，为什么下面的查询不会返回那些未参加锦标赛
  25 的成员：


  ```sql

  SELECT MemberID FROM Entry

  WHERE TourID <> 25;

  ```


  上面的查询选择了 `Entry` 表中所有不属于锦标赛 25 的行。本质上，它找到了一个参加了除 25 之外任何锦标赛的成员（尽管他们可能也参加了 25）。观察图
  7-15，我们看到查询会返回成员 415 参加锦标赛 36（`TourID <> 25`）的标记为 `e1` 的行。然而，在上面两行，我们看到成员 415 也参加了锦标赛
  25。很难想象有什么理由你会想使用这个查询。


  处理这类查询的过程式方法是使用差集。我们需要检索所有成员 ID 的集合，以及所有参加了锦标赛 25 的成员 ID 的集合。然后我们想要这两个集合的差集；即，存在于前一个集合中但不存在于后一个集合中的
  ID。


  找出所有参加了锦标赛 25 的成员的集合很简单：


  ```sql

  SELECT MemberID FROM Entry WHERE TourID = 25;

  ```


  我们可能认为类似的查询也能找到所有成员 ID：


  ```sql

  SELECT MemberID FROM Entry;

  ```


  然而，前面的查询只找到了一个**参加过锦标赛**的成员的集合。为了获得所有成员 ID 的集合，我们需要查询 `Member` 表。


  图 7-22 说明了如何使用差集运算符来找出我们所需的成员 ID。


  ![A158240_2_En_7_Fig22_HTML.jpg](img/A158240_2_En_7_Fig22_HTML.jpg)

  图 7-22. 未参加锦标赛 25 的成员


  用于检索未参加锦标赛 25 的成员 ID 的 SQL 表达式如下：


  ```sql

  SELECT MemberID FROM Member

  EXCEPT

  SELECT MemberID FROM Entry WHERE TourID = 25;

  ```


  与交集和并集运算一样，在我们使用差集运算符之前，**投影**出适当的列是很重要的。在图 7-22 中，我们从 `Member` 和 `Entry` 表中检索了
  ID。如果我们想包含成员的姓名，我们可以使用本章前面“交集的用途”一节中解释的方法之一。


  然而，在这个差集示例中，在我们移除它们以获得图 7-22 左侧的行集之前，我们已经在 `Member` 表中有了成员的姓名。移除姓名然后在以后再添加回来似乎有点反常。重要的是，参与差集的两个行集是并兼容的；也就是说，对应的列必须具有相同的域。要么两个集合都只有
  ID，要么两个集合都有 ID 和姓名。在图 7-22 左侧的操作中，我们采取了第一种选项，从 `Member` 中移除了姓名。我们本可以保留 `Member`
  表中的姓名，并通过连接 `Entry` 和 `Member` 表将姓名添加到图 7-22 中间的行中，如图 7-23 所示。然后我们可以取这两个行集之间的差集。


  ![A158240_2_En_7_Fig23_HTML.jpg](img/A158240_2_En_7_Fig23_HTML.jpg)

  图 7-23. 在取差集之前，在两个行集中都包含成员的姓名


  图 7-23 所示操作的 SQL 等效语句如下：


  ```sql

  SELECT MemberID, LastName, FirstName FROM Member

  EXCEPT

  SELECT m.MemberID, m.LastName, m.FirstName

  FROM Entry e inner join Member m on e.MemberID = m.MemberID

  WHERE TourID = 25;

  ```




  #### 在没有 EXCEPT 关键字的情况下进行管理


  并非所有 SQL 版本都支持 `EXCEPT`（或 `MINUS`）关键字。一如既往，通常总有其他方法来构建查询。在第 4 章中，我们研究了一种用于回答涉及"not"（不/未）一词的问题的**结果方法**。图
  7-24 回顾了用于查找未参加锦标赛 25 的成员姓名的思维过程。


  ![A158240_2_En_7_Fig24_HTML.jpg](img/A158240_2_En_7_Fig24_HTML.jpg)

  图 7-24. 判定成员 258 未参加锦标赛 25


  图 7-24 背后的思维过程是：

  > 如果 `Entry` 表中不存在某个成员（即 `m.MemberID = e.MemberID`）且 `TourID=25` 的行 `e`，则写出 `Member`
  表中第 `m` 行的姓名。


  反映图 7-24 的 SQL 是：

  ```sql

  SELECT m.LastName, m.FirstName

  FROM Member m

  WHERE NOT EXISTS

  (SELECT * FROM Entry e

  WHERE e.MemberID = m.MemberID

  AND e.TourID = 25);

  ```


  对于涉及"not"一词的问题，你应该使用哪种查询？是使用过程方法和 `EXCEPT` 关键字的那种，还是使用结果方法和 `NOT EXISTS` 或 `NOT
  IN` 关键字的那种？通常，我会说这并不重要，因为你的数据库引擎可能会足够智能地识别它们是相同的。然而，我当前使用的 SQL Server 版本（2013）执行使用
  `NOT EXISTS` 的查询比使用 `EXCEPT` 的相应查询更高效。你必须问自己是否在意！小型数据库上的查询通常非常快，即使运行得稍慢一些也真的无关紧要。但是，如果你有大量数据，那么一切都会改变。查询的效率会变得极其重要，在这种情况下，你还需要考虑数据库设计的其他方面，例如索引。我将在第
  9 章中再稍微讨论一下这一点。


  #### 除法


  本章我们要看的最后一组操作符是除法。除法对于涉及"all"（所有）或"every"（每一个）一词的查询很有用。一个例子是“哪些成员参加了每一项锦标赛？”。标准
  SQL 没有用于除法操作的关键字，并且要弄清楚涉及除法的查询的 SQL 可能有点棘手。


  在附录 2 中，你将找到执行除法的正式代数表示法，以及如果需要的话，如何使用其他操作符来表示它。在附录 2 的“全称量词和 SQL”一节中，你还将找到使用演算（或结果）表达式执行除法类型查询的替代方法。这两种方法都有助于你构建类似于除法操作符的
  SQL 语句。在第 8 章中，我们将研究聚合函数，并看看我认为是编写等效于除法操作符的 SQL 的最简单方法。


  现在，我们将看看除法操作符的作用，以及如何使用它来回答涉及"every"和"all"的不同类型问题。


  理解除法操作最简单的方法是通过一个例子。如果我们想知道哪些成员参加了每一项锦标赛，我们需要两条信息。首先，我们需要关于成员及其参加的锦标赛的信息，这可以从 `Entry`
  表中获得。我们还需要所有锦标赛的列表，这需要来自 `Tournament` 表，因为并非所有锦标赛都可能在 `Entry` 表中体现。


  图 7-25 说明了除法是如何工作的。我仅从 `Entry` 表中投影了 `MemberID` 和 `TourID` 列，并从 `Tournament` 表中投影了
  `TourID` 列。你投影哪些列很重要，我稍后会再讨论这一点。


  ![A158240_2_En_7_Fig25_HTML.jpg](img/A158240_2_En_7_Fig25_HTML.jpg)

  图 7-25. 使用除法查找参加了所有锦标赛的成员


  观察图 7-25，中间是一个包含所有 `TourID` 值的表（我将其标记为 Check）。除法操作检查左侧的表，以找到那些拥有对应每一个 `TourID` 的行的
  `MemberID` 值。Answer（位于图的右侧）包含了参加了每一项锦标赛的成员的 `MemberID` 值。成员 415 可以在 `Entry` 表中找到与五个锦标赛中的每一个配对，因此出现在除法的结果中。成员
  228 没有出现在结果中，因为 `Entry` 表中没有 228 与 38 或 40 配对的行。


  确保参与除法操作的两个表中的列正确非常重要。我喜欢这样来设置除法操作：

  * 决定我想了解哪个属性。我们称之为 Answer。在这个例子中，我想找出 `MemberID` 的值，所以我们的 Answer 属性是 `MemberID`。

  * 在除法操作符的右侧，表中的属性应该是我想用来核对的对象。我们称这个（些）属性为 Check。在这个例子中，Check 属性是 `TourID`。我们可以从
  `Tournament` 表中获取所有 `TourID` 的值。

  * 在除法的左侧，我想要一个仅包含两组属性 Answer 和 Check 的表，如图 7-25 所示。我们需要 `MemberID` 和 `TourID`（在这个例子中，是哪些成员参加了哪些锦标赛，这些来自
  `Entry` 表）。重要的是，这些是左侧表中仅有的两列。如果添加了额外的列，那么我们就是在询问不同的问题，如下一节所述。


  顺便提一句，许多人想知道为什么这个操作被称为除法，因为它似乎与“4 除以 2”这样的概念没有特别直接的关系。在普通算术中，除法是乘法的逆运算（或反运算）。对于集合操作，除法就像是笛卡尔积的逆运算。如果你考虑对图
  7-25 中间和最右边的两个表进行笛卡尔积运算，你将得到一个表，其列（但不是行）与图 7-25 最左边的表相同。


  我们可以通过改变除法操作符右侧的内容来回答许多问题。例如，如果我们想知道谁参加了所有公开赛，我们将把图 7-25 中间的表替换为仅包含公开赛的行：

  ```sql

  SELECT TourID

  FROM Tour

  WHERE TourType = ''Open'';

  ```


  #### 投影适当的列


  与交集和差操作一样，在除法操作中投影不同的列会得到针对不同问题的答案。再次说明，例子是理解这一点最简单的方法。在图 7-26 中，从 `Entry` 表中检索了一个额外的列。你能理解这个查询在查找什么吗？


  ![A158240_2_En_7_Fig26_HTML.jpg](img/A158240_2_En_7_Fig26_HTML.jpg)

  图 7-26. 除法操作在查找什么？


  除法在左侧表中查找一组 Answer 属性，这些属性与 `Check` 表中的每一个属性配对。在这个例子中，该操作在左侧表中查找一对 `MemberID` 和
  `Year`，这对组合出现在每一个锦标赛中。这个除法例子正在查找那些在同一年参加了所有锦标赛的成员。




  #### SQL 中的除法运算


  采用输出导向的方法，我们想要的查询可以这样表述：


  > 从 `Member` 表的行 `m` 中，写出 `m.LastName`、`m.FirstName` 的值，条件是对于 `Tournament` 表中的每一行
  `t`，在 `Entry` 表中都存在一行 `e`，满足 `e.MemberID = m.MemberID` 且 `e.TourID = t.TourID`。


  我们有 SQL 关键字 `EXISTS` 来表示“存在”，但没有直接表示“每一个”的关键字。我们可以通过运用以下略费思量的逻辑，来消除前述语句中的“每一个”这个词。短语


  > 对于 `Tournament` 表中的每一行 `t`，在 `Entry` 表中都存在一行 `e`…


  等价于说


  > 在 `Tournament` 表中，不存在这样一行 `t`，使得在 `Entry` 表中不存在一行 `e`…


  附录 2 更正式地解释了如何推导这些表达式，但现在，我们将仅使用刚刚讨论的等价关系，重写原始描述（即如何检索已参加所有锦标赛的成员姓名）。


  > 从 `Member` 表的行 `m` 中，写出 `m.LastName, m.FirstName` 的值，条件是 **对于每一行** `t` **都不存在**，使得在
  `Entry` 表中 **存在一行** `e` 不满足 `e.MemberID = m.MemberID` 且 `e.TourID = t.TourID`。


  对应的 SQL 语句是：


  ```sql

  SELECT m.LastName, m.FirstName FROM Member m

  WHERE NOT EXISTS

  (

  SELECT * FROM Tournament t

  WHERE NOT EXISTS

  (

  SELECT * FROM Entry e

  WHERE e.MemberID = m.MemberID AND e.TourID = t.TourID

  )

  );

  ```


  这种双重否定可能有点令人望而生畏，但正如本章开头所言，我保证在下一章会介绍一种概念上更简单的方法来找出参加了每一场锦标赛的成员。


  ### 小结


  由于关系数据库中的表具有唯一的行（如果键设置得当的话），它们可以被视为数学集合。这允许我们使用集合并运算、交运算、差运算和除运算。


  并、交、差运算是作用在**并相容**的表之间的运算。这意味着运算符两边的表必须具有相同的列数，且对应的列必须具有相同的域（通常理解为相同的数据类型）。通过合理地投影列，你可以获得并相容的表。


  SQL 有关键字来表示并、交、差运算，尽管并非所有实现都支持所有这些运算的关键字。如果你的 SQL 产品不支持交或差运算的关键字，你可以找到其他方式来表达查询。你应该以你觉得最自然的方式来构建查询。当数据量非常大且速度很重要时，你可能需要研究不同查询构建方式的效率。


  以下是集合运算及其用 SQL 表示的替代方法的总结。`A` 和 `B` 是两个并相容的表，为简单起见，它们都只有一列，名为 `attribute`。


  #### 并集


  并集运算返回存在于表 `A` 或表 `B` 中的所有唯一行：


  ```sql

  SELECT attribute FROM A

  UNION

  SELECT attribute FROM B;

  ```


  #### 交集


  交集运算返回同时存在于表 `A` 和表 `B` 中的所有行：


  ```sql

  SELECT attribute FROM A

  INTERSECT

  SELECT attribute FROM B;

  ```


  表示交集的另一种方式是：


  ```sql

  SELECT A.attribute

  FROM A

  WHERE EXISTS

  (SELECT B.attribute FROM B

  WHERE A.attribute = B.attribute);

  ```


  #### 差集


  差集运算返回存在于第一个表（`A`）中但不存在于第二个表（`B`）中的所有行。一些实现使用关键字 `MINUS` 代替 `EXCEPT`：


  ```sql

  SELECT attribute FROM A

  EXCEPT

  SELECT attribute FROM B;

  ```


  表示差集的另一种方式是：


  ```sql

  SELECT A.attribute

  FROM A

  WHERE NOT EXISTS

  (SELECT B.attribute FROM B

  WHERE A.attribute = B.attribute);

  ```


  #### 除法


  除法运算有助于处理包含“每一个”或“所有”这类词语的查询。当前版本的 SQL 不直接支持除法。有关如何表达涉及除法的查询的详细信息，请参阅附录 2 中的“除法”和“全称量词与
  SQL”部分。


  为完整起见，我们重复以下查询，该查询返回已参加每一场锦标赛的成员的 `MemberID` 值：


  ```sql

  SELECT m.LastName, m.FirstName FROM Member m

  WHERE NOT EXISTS

  (

  SELECT * FROM Tournament t

  WHERE NOT EXISTS

  (

  SELECT * FROM Entry e

  WHERE e.MemberID = m.MemberID AND e.TourID = t.TourID

  )

  );

  ```


  脚注 1


  在正式的关系理论中，关系的属性没有顺序，而是通过名称引用。表中列的排序是 SQL 实现用来确定并相容性的方式。


  '
- '# 8. 聚合运算


  SQL 有许多用于计数、求和、求平均值以及对表执行其他聚合运算的函数。这些函数使我们能够执行各种查询。例如，我们可以统计俱乐部中的成员人数，或找出平均让杆数。我们可以以不同的方式对数据进行分组以求得聚合值。例如，我们可能想统计每年锦标赛的参赛次数，或者我们可能想找出每个特定锦标赛的参赛人数。


  在本章中，我们将研究简单的聚合函数以及如何充分利用 SQL 的分组功能。在下一章中，我们将研究窗口函数，它们可以在仅使用基本聚合功能难以解决的情况下提供优雅的解决方案。


  ### 简单的聚合函数


  简单的聚合函数包括平均值、总和和计数。这些概念很直接，但一如既往，你需要确保自己理解它们在涉及空值和重复值时是如何工作的。


  #### COUNT() 函数


  `COUNT()` 函数计算查询返回的行数。最简单的例子是统计查询返回的所有行数，我们可以通过在括号内添加星号来实现。以下查询将返回 `Member` 表中的行数：


  ```sql

  SELECT COUNT(*)

  FROM Member;

  ```


  像前面查询中这样的单个聚合函数 `COUNT()` 将返回一个只有一列一行的表，如图 8-1 所示。


  ![A158240_2_En_8_Fig1_HTML.jpg](img/A158240_2_En_8_Fig1_HTML.jpg)


  图 8-1.


  `COUNT()` 函数的结果


  图 8-1 中的输出是在 Access 中生成的，如你所见，列使用了默认名称标记。我们可以通过为列指定别名来提供一个更好的名称。在下面的查询中，我们添加了一个
  `WHERE` 子句来统计满足条件 `Gender = ''F''` 的行子集，并使用了 `AS` 子句，使列标题更具信息性：


  ```sql

  SELECT COUNT(*) AS NumberWomen

  FROM Member

  WHERE Gender = ''F'';

  ```


  此查询的输出如图 8-2 所示。


  ![A158240_2_En_8_Fig2_HTML.jpg](img/A158240_2_En_8_Fig2_HTML.jpg)


  图 8-2.


  带有别名的 `COUNT()` 函数结果


  为聚合函数返回的列提供别名是个好主意，这样读者就能理解这些数字的含义。



  #### 处理空值


  上一个查询返回了性别为 `''F''` 的成员数量。现在请考虑下面的查询：


  ```

  SELECT COUNT(*)

  FROM Member

  WHERE Gender  ''F'';

  ```


  乍一看，我们可能会认为前两个查询得出的两个计数之和应该等于成员总数。但我们需要谨慎。在第 2 章中，我们探讨了当与空值（或称为空）进行比较时，`WHERE` 条件是如何操作的。如果属性没有值，我们就无法说它是否满足某个条件。我们不知道！在
  SQL 中，如果我们比较的值是空值，那么比较的结果将始终为假。表中 `Gender` 列为空值的行将不会包含在前两个查询的任何一个结果中。


  我们可以认为，在表设计时该属性应该被声明为 `NOT NULL`。在第 2 章中，我们讨论了为什么这可能不是一个好主意。如果我们正试图为一个尚未提供性别的新成员录入详细信息，那么我们要么无法保存我们已知的信息，要么必须猜测性别。这两种选择都不令人满意。更好的做法是先保存已知信息，稍后再跟进缺失的数据。


  我们可以通过以下查询明确找出有多少行没有 `Gender` 的值：


  ```

  SELECT COUNT(*)

  FROM Member

  WHERE Gender IS NULL;

  ```


  现在，条件分别为 `Gender = ''F''`、`Gender <> ''F''` 和 `Gender IS NULL` 的前三个查询的结果数量加起来，就等于俱乐部成员的总数。像前面那样的查询对于检查我们本应期望有值的列中是否存在空值非常有用。


  `COUNT()` 函数也可以返回表中或查询结果中特定列的数值数量。让我们看一下 `Member` 表中的几个列，如图 8-3 所示。


  ![A158240_2_En_8_Fig3_HTML.jpg](img/A158240_2_En_8_Fig3_HTML.jpg)


  图 8-3. Member 表的部分列


  假设我们想找出有多少成员有教练。我们有两个选项。一种方法是构建一个查询，只返回那些 `Coach` 列有非空值的成员，并对它们进行计数：


  ```

  SELECT COUNT(*)

  FROM Member

  WHERE Coach IS NOT NULL;

  ```


  另一个选项是让 `COUNT()` 函数专门使用 `COUNT(Coach)` 来统计 `Coach` 列中非空值的数量：


  ```

  SELECT COUNT(Coach)

  FROM Member;

  ```


  回顾一下：如果我们只想找出查询（或整张表）返回的行数，我们使用 `SELECT COUNT(*)`。如果我们想找出某个特定列中有值的行数，请使用 `SELECT
  COUNT(<列名>)`。`COUNT(*)` 和 `COUNT(<列名>)` 这两种选项让我们能够明确指定如何处理空值。


  #### 处理重复值


  `Member` 表中 `Coach` 列的值（图 8-3）是重复的。只有两个不同的值（153 和 235）。因此，通过对 `Coach` 列的值进行计数，我们可以回答两个截然不同的问题：“有多少人拥有教练？”
  和 “有多少位教练？” 第一个问题的答案要求我们包含所有值。第二个问题的答案要求我们只统计不同的值。这可以通过包含 `DISTINCT` 关键字来实现，如下列查询所示：


  ```

  -- Won’t work in Access (2016)

  SELECT COUNT(DISTINCT Coach)

  FROM Member;

  ```


  虽然我在本书中尽量不针对特定产品，但我认为有必要指出（考虑到世界上有如此多的 Access 副本在使用），Access 目前不支持 `COUNT(DISTINCT)`。不过，你可以使用以下嵌套查询在
  Access 中获得等效结果。（注意，SQL Server 不允许在聚合查询的 `FROM` 子句中使用子查询。）


  ```

  -- Won’t work in SQL Server (2012)

  SELECT COUNT(*)

  FROM (SELECT DISTINCT Coach FROM Member WHERE Coach IS NOT NULL);

  ```


  你也可以使用关键字 `ALL`。这只是强调你想统计所有值，而不仅仅是不同的值。如果你没有包含 `DISTINCT` 或 `ALL`，则默认情况下会包含所有值。


  类似的查询可以应用于高尔夫俱乐部数据库中的其他表。例如，我们可能想知道 2015 年会员参加了多少次比赛（11 次），或者 2015 年会员参加了多少场不同的比赛（5
  场）。下面的两个查询将分别给出答案：


  ```

  -- 参加了多少次比赛

  SELECT COUNT(TourID)

  FROM Entry

  WHERE Year = 2015;

  -- 参加了多少场不同的比赛

  SELECT COUNT(DISTINCT TourID)

  FROM Entry

  WHERE Year = 2015;

  ```


  ### AVG() 函数


  要计算平均值，我们使用 `AVG()` 函数。括号（...）中的参数是我们要求平均值的表达式。该表达式必须是数值型。如果你尝试对 `LastName` 这样的文本字段求平均值，会得到一个错误。


  例如，我们可以通过将 `Handicap` 列作为 `AVG()` 函数的参数，来求得我们俱乐部会员的平均差点：


  ```

  SELECT AVG(Handicap)

  FROM Member;

  ```


  表达式可以像前一个查询中那样只是一个数值列的名称，也可以是计算的结果。假设在另一个数据库中，我们有一个 `Order` 表，其中包含每个订购项目的 `Price`
  和 `Quantity` 列。每个订单的净值可以通过将 `Price` 和 `Quantity` 相乘得出。如果我们想求出所有订单的平均净值，我们可以将表达式
  `Price * Quantity` 放在括号中，如下所示：


  ```

  SELECT AVG(Price * Quantity)

  FROM Order;

  ```


  #### 处理空值


  与 `COUNT()` 函数类似，`AVG()` 函数也不包括表达式值为 null 的行。在 `Member` 表中，我们总共有 20 名成员，其中 17 名成员有
  handicap 值。如果我们将所有 handicap 值相加，得到 287。`AVG()` 函数会取 handicap 总值（287）除以 `Handicap`
  列中具有非空值的行数（17）。这正是我们想要的。如果我们通过除以总行数（20）来包含没有 handicap 的成员，那么基本上就是默认这些成员的 handicap
  为 0。这会严重影响结果。


  是否考虑 null 值并不总是那么显而易见。例如，假设我们有另一个数据库，其中有一个名为 `Student` 的表和一个名为 `TestScore` 的列。如果我们录入学生的考试分数，而有些学生没有参加考试，那么这些学生在
  `TestScore` 列中就会有一个 null 值。我们真正想要的平均值是什么？我们可以计算所有学生的平均分（总分除以所有学生数），这意味着缺考的学生实际上被视为得了
  0 分。另一方面，我们也可以只计算参加考试的学生的平均分（除以参加考试的人数）。`AVG(TestScore)` 总是只给我们提供参加考试学生的平均分。要确定这两种选项中你需要哪一个绝非易事。学校里一直存在关于通过率（可能关系到资金）是否应该包含中途退学学生的争论。


  如果我们想要所有学生的平均分，包括那些分数为 null 的学生（计为 0），我们可以在查询中通过计算总分（使用 `SUM()` 函数）并除以学生总数来计算，如下所示：


  ```sql

  SELECT SUM(TestMark)/COUNT(*)

  FROM Student;

  ```


  我们本可以为那些没有参加考试的学生录入 0 分，以避免这种复杂性。然而，如果这样做，我们就无法再区分参加了考试但得 0 分的学生和缺考的学生。无论这是否是个问题，意识到其影响总是有用的。


  #### 处理重复值


  与 `COUNT()` 函数类似，`AVG()` 函数也可以包含关键字 `ALL` 和 `DISTINCT`。请注意，`ALL`（这是默认值）表示所有非空值（包括重复值），而不是仅指不同的非空值。它的意思不是对包括
  null 值在内的所有行求平均，这与我们在上一节讨论的不同。我发现很难想到什么时候你只想对不同的值求平均——肯定没有适用于我们俱乐部数据库的例子。


  #### 处理类型和输出


  `AVG()` 函数只接受数值表达式作为参数。我们无法成功地对 `FirstName` 或 `JoinDate` 求平均（尽管我们可以使用函数来计算成员名字长度的平均值或自加入日期以来的天数平均值）。


  当我们对成员的 handicap 求平均时，我们期望得到什么结果？handicap 总和是 287，有 handicap 的人数是 17。在 SQL Server
  2012 中，`AVG(Handicap)` 函数的结果是 16。在 Access 2016 中的结果是 16.8823529411765。为什么？


  在 SQL Server（以及 SQL 的一些其他实现）中，平均值函数返回与所平均数字相同的类型。在本例中，`Handicap` 列是整数类型，因此 SQL Server
  中的 `AVG(Handicap)` 返回一个整数。它还进行整数除法（这意味着结果被截断为 16，而不是四舍五入为 17）。在 Access 中，平均值返回的是一个浮点数（即带小数部分的数）。


  我们可以控制结果的计算方式。如果我们想要一个带小数部分的平均值结果，可以在求平均之前将 `Handicap` 值转换为浮点数。为此，我们可以使用在第 7 章中提到的
  `CONVERT()` 函数：¹


  ```sql

  SELECT AVG(CONVERT(FLOAT,Handicap))

  FROM Member;

  ```


  另一种方法是直接将 handicap 乘以 1.0，这实际上将其转换为浮点数：


  ```sql

  SELECT AVG(Handicap * 1.0)

  FROM Member;

  ```


  ### ROUND() 函数


  虽然严格来说不是一个聚合函数，但值得花点时间看看如何进行舍入。因为平均值涉及除以项目数量，`AVG()` 函数经常会返回一个带有很多小数位的结果。我们使用一个舍入函数来指定我们希望在
  `AVG()` 和其他产生浮点数的结果的输出中包含的小数位数。我们向 `ROUND()` 函数提供两个参数：要舍入的表达式和要返回的小数位数。以下语句返回四舍五入到两位小数的平均
  handicap：


  ```sql

  SELECT ROUND(AVG(Handicap * 1.0), 2)

  FROM Member;

  ```


  舍入在不同的 SQL 实现中可能有不同的行为。在 Access 中，前面的查询将返回 16.88，而在 SQL Server 中将返回 16.880000。虽然在
  SQL Server 中删除尾部的零是可能的，但通常最好将这类格式化工作留给报表编写器等前端工具。


  有许多不同的舍入方法，因此查阅文档以了解你的 SQL 实现如何处理舍入是一个好主意。传统的将所有以 5 或更大数字结尾的数向上舍入的方法（例如，4.5 向上舍入为
  5）会导致偏向更大的数字。为了消除这种偏差，一些舍入函数的实现会舍入到最接近的偶数。例如，3.5 和 4.5 都会舍入到 4。这平衡了结果，但如果你没有预料到，可能会感到惊讶。SQL
  Server 的 `ROUND()` 函数将所有的 5 向上舍入，而 Access 将 5 舍入到最接近的偶数。


  ### 其他聚合函数


  SQL 还提供了其他常见的聚合函数，如 `SUM()`、`MAX()` 和 `MIN()`，它们非常易于使用。与 `AVG()` 函数类似，`SUM()` 函数的参数必须是数值表达式（数值属性或具有数值结果的某个表达式，例如
  `Price * Quantity`）。`MAX()` 和 `MIN()` 的参数可以是数值、文本或日期类型。对于文本类型，顺序是按字母顺序。对于日期，顺序是按时间顺序。例如，`MIN(LastName)`
  将按字母顺序返回 `LastName` 的第一个值，而 `MAX(JoinDate)` 将返回 `JoinDate` 的最新值。


  可以在一个查询中组合多个聚合函数。以下查询返回 `Handicap` 的最大值、最小值和平均值。


  ```sql

  SELECT MAX(Handicap) AS maximum, MIN(Handicap) AS minimum,

  ROUND(AVG(Handicap * 1.0),2) AS average

  FROM Member;

  ```


  使用 `AS` 子句为每一列的结果提供别名有助于使结果更易于理解。图 8-4 显示了一些典型输出。


  ![A158240_2_En_8_Fig4_HTML.jpg](img/A158240_2_En_8_Fig4_HTML.jpg)


  图 8-4.

  包含多个聚合函数的查询的典型输出



  ### 分组


  如果我们想知道某个特定成员参加了多少次锦标赛，我们可以查询 `Entry` 表。例如，如果想找出成员 235 参加锦标赛的次数，我们可以像下面的查询那样，选择该成员在
  `Entry` 表中的所有行并进行计数：


  ```sql

  SELECT COUNT(*) AS NumEntries

  FROM Entry

  WHERE MemberID = 235;

  ```


  如果我们想查找另一个成员的参赛次数，就需要用不同的 `WHERE` 子句重写查询。如果想统计所有成员的次数，那将变得非常繁琐。


  分组使我们能够用一条 SQL 语句找出所有成员的计数。关键短语 `GROUP BY` 就是用来做这个的。看看下面的查询：


  ```sql

  SELECT COUNT(*) AS NumEntries

  FROM Entry

  GROUP BY MemberID;

  ```


  额外的 `GROUP BY` 子句表示：“不要仅仅统计 `Entry` 表中的所有行，而是统计具有相同 `MemberID` 的所有子集或组。” 图 8-5 展示了我们如何可视化这一过程。


  ![A158240_2_En_8_Fig5_HTML.jpg](img/A158240_2_En_8_Fig5_HTML.jpg)

  **图 8-5.** 按 MemberID 分组统计 Entry 表中的行数


  #### 在 SELECT 子句中包含分组字段


  我们也可以在 `SELECT` 子句中包含我们用来分组的字段，这样我们就能看到哪些计数对应哪些条目，如下面的查询所示：


  ```sql

  SELECT MemberID, COUNT(*) AS NumEntries

  FROM Entry

  GROUP BY MemberID;

  ```


  此查询的输出如图 8-6 所示。


  ![A158240_2_En_8_Fig6_HTML.jpg](img/A158240_2_En_8_Fig6_HTML.jpg)

  **图 8-6.** 在输出中包含 MemberID


  #### 在分组前连接表


  我们可能更希望在图 8-6 的输出中看到成员的姓名。在这种情况下，我们需要先将 `Entry` 表与 `Member` 表连接起来，然后再进行分组和计数。


  ```sql

  SELECT m.MemberID, m.LastName, m.FirstName, COUNT(*) AS NumEntries

  FROM Entry e INNER JOIN Member m ON m.MemberID = e.MemberID

  GROUP BY m.MemberID, m.LastName, m.FirstName;

  ```


  输出如图 8-7 所示。


  ![A158240_2_En_8_Fig7_HTML.jpg](img/A158240_2_En_8_Fig7_HTML.jpg)

  **图 8-7.** 连接 Entry 和 Member 表，并按 ID 和姓名分组


  #### SELECT 子句的 GROUP BY 规则


  你可能会想知道为什么我们在前面的查询中将 `LastName` 和 `FirstName` 包含在 `GROUP BY` 子句中。当你使用 `GROUP BY`
  时，`SELECT` 子句只能包含你用来分组的字段或聚合函数。如果我们希望在输出中看到姓名，就需要将它们包含在我们分组的字段中。这是为了防止出现一个 `MemberID`
  可能对应不同姓名的情况（显然在此情况下不可能，因为 `MemberID` 是 `Member` 表的主键）。暂时不考虑这一点，如果有两行 `MemberID`
  为 118 但姓名不同，那么如果我们只按 `MemberID` 分组，就无法确定在图 8-7 的输出中，哪个姓名应与计数相关联。


  #### 将 GROUP BY 与 WHERE 子句结合


  通过在 `GROUP BY` 子句中包含 `WHERE` 子句和不同的属性，我们可以从数据中获取各种不同的信息。让我们再看一下 `Entry` 表。如果我们想找出每个锦标赛的参赛次数，我们可以想象将所有具有相同
  `TourID` 的行分组在一起，然后统计每个集合中的行数，如这里的查询所示：


  ```sql

  SELECT TourID, COUNT(*) AS NumEntries

  FROM Entry

  GROUP BY TourID;

  ```


  输出如图 8-8 所示。


  ![A158240_2_En_8_Fig8_HTML.jpg](img/A158240_2_En_8_Fig8_HTML.jpg)

  **图 8-8.** 统计每个锦标赛的参赛次数


  我们并不总是需要统计表中的所有行。我们可能想先选择一个行的子集。例如，我们可能只想收集图 8-8 中 2014 年的统计数据。下面的查询展示了如何用 SQL 实现这一点。请注意，`WHERE`
  子句（用于找到我们想要考虑的行的子集）必须位于 `GROUP BY` 子句之前：


  ```sql

  SELECT TourID, COUNT(*) AS NumEntries

  FROM Entry

  WHERE Year = 2014

  GROUP BY TourID;

  ```


  #### 按多个字段分组


  通过在 `GROUP BY` 子句中添加更多字段，我们可以获得更详细的信息。如果我们想为每年每个锦标赛重复此查询，可以移除 `WHERE` 子句，并同时按 `Year`
  和 `TourID` 分组：


  ```sql

  SELECT TourID, Year, COUNT(*) AS NumEntries

  FROM Entry

  GROUP BY TourID, Year;

  ```


  图 8-9 展示了按这两个字段分组的工作原理。


  ![A158240_2_En_8_Fig9_HTML.jpg](img/A158240_2_En_8_Fig9_HTML.jpg)

  **图 8-9.** 按 TourID 和 Year 分组


  #### 与其他聚合函数一起分组


  我们可以将分组与 `COUNT()` 以外的聚合函数一起使用。例如，如果我们想查看女性和男性的最大、最小和平均差点，我们可以使用类似下面的查询：


  ```sql

  SELECT Gender, MIN(Handicap)as Minimum, Max(Handicap)as Maximum,

  ROUND(AVG(Handicap),1) AS Average

  FROM Member

  GROUP BY Gender;

  ```


  此查询的输出如图 8-10 所示。


  ![A158240_2_En_8_Fig10_HTML.jpg](img/A158240_2_En_8_Fig10_HTML.jpg)

  **图 8-10.** 按性别对 Handicap 聚合值进行分组




  ### 过滤聚合查询的结果


  一旦我们为行组计算出了一些聚合值，我们可能想对这些结果提出一些问题。例如，在图 8-9 中，我们有每年每场锦标赛的参赛条目数。一个可能的问题是“哪些锦标赛有 3
  个或更多的参赛条目？”。观察图 8-9 中的结果表，我们想在聚合输出中只选择那些计数值大于或等于`3`的行。我们可以使用`HAVING`关键字来实现这一点。看看下面的查询：


  ```sql

  SELECT TourID, Year, COUNT(*) AS NumEntries

  FROM Entry

  GROUP BY TourID, Year

  HAVING COUNT(*) >= 3;

  ```


  `HAVING`子句总是出现在`GROUP BY`子句之后。聚合和分组操作会先执行，然后选择符合条件（本例中为`COUNT(*) >= 3`）的输出行。这就像有一个作用于聚合数字的`WHERE`子句。顺便提一下，我们必须在`HAVING`子句中使用`COUNT(*)`；我们不能使用第一行语句中的别名`NumEntries`。这个别名只是在查询末尾用来标记输出列。


  让我们看另一个例子。假设我们想找出那些参加了四场或更多锦标赛的会员。首先，构造一个包含会员及其参赛次数计数的行集，如下面查询的前三行所示。然后，我们使用`HAVING`子句从结果中只选择那些`COUNT(*)
  >= 4`的行：


  ```sql

  SELECT MemberID, COUNT(*) AS NumEntries

  FROM Entry

  GROUP BY MemberID

  HAVING COUNT(*) >= 4;

  ```


  在涉及聚合的查询中，我们有两个机会来选择行的子集。如果我们在执行聚合之前选取子集，我们使用`WHERE`子句。当我们想在聚合之后只选择某些行时，我们使用`HAVING`子句。例如，让我们修改之前的查询，以找出哪些会员参加了超过四场公开赛。为了找到公开赛，我们需要执行以下操作：


  将`Entry`表与`Tournament`表连接起来。

  使用`WHERE`子句只选取公开赛的参赛条目子集。

  将每个会员的参赛条目分组并计数。

  获取生成的聚合表，并使用`HAVING`子句只检索计数大于 4 的行。


  此过程如图 8-11 所示。


  ![A158240_2_En_8_Fig11_HTML.jpg](img/A158240_2_En_8_Fig11_HTML.jpg)


  图 8-11.

  查找参加了超过四场公开赛的会员


  图 8-8 所示过程的查询是：


  ```sql

  SELECT MemberID, COUNT(*) AS NumEntries

  FROM Entry e INNER JOIN Tournament t ON e.TourID = t.TourID

  WHERE t.TourType = ''Open''

  GROUP BY MemberID

  HAVING COUNT(*) > 4;

  ```


  在第 2 章中，我们学习了如何对查询结果进行排序。我们也可以根据聚合值对结果进行排序。如果我们想按参赛场次降序查看前一个查询的结果，可以在查询末尾添加一个`ORDER
  BY COUNT(*) DESC`子句。


  ### 使用聚合执行除法运算


  在第 7 章中，我们学习了代数运算中的除法。回顾一下，除法允许我们回答许多包含“所有”或“每一个”这类词语的问题。例如，假设我们想找出那些参加了每一场锦标赛的会员。图
  8-12 回顾了如何使用除法来实现这一点。我们希望在`答案`中返回的属性是`MemberID`。在除法运算符的右侧，是我们需要`检查`对照的事物集合（本例中是`Tournament`表投影出的所有`TourID`值的列表）。在除法运算符的左侧是一个表，它同时包含`答案`和`检查`的属性（本例中是`Entry`表的`MemberID`和`TourID`列）。除法的结果是一个与每一场锦标赛都有关联的`MemberID`值列表（本例中，只有
  ID 为`415`的会员）。


  ![A158240_2_En_8_Fig12_HTML.jpg](img/A158240_2_En_8_Fig12_HTML.jpg)


  图 8-12.

  使用除法找出参加了每一场锦标赛的会员


  此图与图 7-25 相同。


  目前，SQL 的标准实现没有用于除法运算的关键字，因此我们需要找到其他方法来表达如图 8-12 所示的查询。我们在第 7 章中已经看过一种方法，在附录 2 中还看过一些其他方法。这里，我们将研究一种使用聚合的方法。


  `Tournament`表列出了五场不同的锦标赛。如果我们能找到一个参加了五场不同锦标赛的会员，那么他或她必定参加了所有锦标赛。我们现在有能力使用聚合和分组来构建等同于除法运算的查询。


  我们已经看到过统计每个会员参加了多少场锦标赛的查询。然而，现在我们只想统计每个会员参加的不同锦标赛的数量。在`COUNT()`函数中添加`DISTINCT`关键字可以实现这一点：


  ```sql

  SELECT MemberID, COUNT(DISTINCT TourID) AS NumTours

  FROM Entry e

  GROUP BY MemberID;

  ```


  此查询的结果如图 8-13 所示。


  ![A158240_2_En_8_Fig13_HTML.jpg](img/A158240_2_En_8_Fig13_HTML.jpg)


  图 8-13.

  找出每个会员参加的不同锦标赛的数量


  从图 8-13 的结果表中，我们现在只想获取`NumTours`等于不同锦标赛总数的行，在本例中是`5`。我们可以使用`HAVING`子句来找出那些参加了五场不同锦标赛的会员：


  ```sql

  SELECT MemberID

  FROM Entry e

  GROUP BY MemberID

  HAVING COUNT(DISTINCT TourID) = 5;

  ```


  我们可以通过将`5`替换为一个动态计算不同锦标赛数量的表达式，使这个查询更具通用性：


  ```sql

  SELECT MemberID

  FROM Entry e

  GROUP BY MemberID

  HAVING COUNT(DISTINCT TourID) =

  (SELECT COUNT(DISTINCT TourID) FROM Tournament);

  ```


  这个查询等同于图 8-12 所描述的代数除法运算。它返回参加了每一场锦标赛的会员的 ID。总结一下，我们先统计每个会员参加的不同锦标赛的数量，然后使用`HAVING`子句，只保留那些计数等于可能锦标赛总数（来自`Tournament`表的不同计数）的会员。我发现这种进行除法的方法在概念上比第
  7 章和附录 2 中的方法更直观。当然，所有方法都达到了相同的目标。




  ### 嵌套查询与聚合函数


  我们在第 4 章已经简单介绍了嵌套查询和聚合函数。在这里重新审视这个概念很有用。在本章中，我们已经学习了如何计算平均值、总和、计数等。现在，我们可以在其他查询中使用这些聚合结果。例如，我们可能想找出所有成绩（handicap）大于平均成绩的人。考虑以下查询：


  ```sql

  SELECT * FROM Member

  WHERE Handicap >

  (SELECT AVG (Handicap)

  FROM Member);

  ```


  查询的内部部分返回平均成绩，外部部分将每个成员的成绩与该平均值进行比较。


  让我们尝试另一个例子。如何找出参加了超过三场锦标赛的成员？如果你一时没有头绪，可以回溯到“结果导向”的方法：想象一下涉及的表格，并弄清楚你想要返回的行应该是什么样子。图
  8-14 展示了如何对这个查询进行可视化。


  ![A158240_2_En_8_Fig14_HTML.jpg](img/A158240_2_En_8_Fig14_HTML.jpg)

  **图 8-14.**

  哪些成员参加了三场以上的锦标赛？


  我们可以这样描述想要返回的成员：


  > 从 `Member` 表中找出所有行 `m`，条件是，如果我们统计 `Entry` 表中该成员（`m.MemberID = e.MemberID`）对应的行数，该计数值大于
  3。


  这可以很直接地转换成 SQL，如下所示：


  ```sql

  SELECT * FROM Member m

  WHERE

  (SELECT COUNT (*)

  FROM Entry e

  WHERE e.MemberID = m.MemberID) > 3;

  ```


  再来个稍微复杂点的？如何找出成员参加锦标赛的平均次数？我们将需要 `AVG()` 函数，但我们试图对什么求平均值呢？我们想要先统计每个成员参加的锦标赛数量，然后对这些数量求平均值。


  我们可以使用上一节介绍的分组方法来找出每个成员参加的锦标赛数量：


  ```sql

  SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

  GROUP BY MemberID

  ```


  前面查询的结果如图 8-15 所示。


  ![A158240_2_En_8_Fig15_HTML.jpg](img/A158240_2_En_8_Fig15_HTML.jpg)

  **图 8-15.**

  每个成员的参赛次数


  现在我们想要找出 `CountEntries` 这一列的平均值。作为第一次尝试，似乎可以将我们之前的查询作为嵌套查询的内部部分，然后尝试求平均值：


  ```sql

  -- 在某些实现中不起作用

  SELECT AVG (CountEntries) FROM

  (SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

  GROUP BY MemberID);

  ```


  然而，许多版本的 SQL 不支持在 `FROM` 子句中使用嵌套查询。上面的查询在 Access 2013 中可以正常工作，但在其他一些 SQL 实现中不行。


  我们在上一章遇到了一个类似的问题，当时我们希望将一个表与一个联合（union）的结果进行连接。我们只需给内部查询的结果起一个别名（例如 `NewTable`）。这会创建一个临时的虚拟表（通常称为派生表）。然后，我们可以像这样访问新虚拟表的属性：


  ```sql

  SELECT AVG (NewTable.CountEntries) FROM

  (SELECT MemberID, COUNT (*) AS CountEntries FROM Entry

  GROUP BY MemberID)AS NewTable;

  ```


  ### 本章小结


  聚合函数为我们提供了回答关于数据的大量问题的方法。以下是本章的一些要点总结。


  大多数 SQL 版本会提供简单的聚合函数 `MIN()`、`MAX()`、`COUNT()`、`SUM()` 和 `AVG()`。


  *   对于 `COUNT()`，通常你只想计算查询返回的行数。这可以通过在括号中包含星号来完成：`COUNT(*)`。如果你在括号中包含一个列名（例如 `COUNT(Handicap)`），则只有该列中非空的值会被计入统计。

  *   对于其他常见的聚合函数，你需要包含一个字段名。对于 `AVG()` 和 `SUM()`，这需要是一个数值表达式，例如 `AVG(Handicap)`。


  空值与重复值：


  *   计算聚合时会忽略空值。例如，`AVG(Handicap)` 是所有成绩的总和除以 `Handicap` 列中非空值的行数。

  *   默认情况下，所有非空值都包含在聚合中。你可以包含关键字 `DISTINCT` 来去除重复值。例如，`COUNT(DISTINCT Handicap)`
  将统计 `Handicap` 列中出现的不同值的数量。


  分组：


  *   `GROUP BY` 子句可用于将具有相同表达式值的行收集到一起，然后对这些组应用聚合函数。例如，我们可以通过将 `Entry` 表中 `MemberID`
  值相同的所有行分组（例如 `SELECT MemberID, COUNT(*) FROM Entry GROUP BY MemberID`）来找出每个成员参加的锦标赛数量。

  *   在分组并执行聚合后，你可以使用关键字 `HAVING` 从结果表中选择行。例如，通过在上一项的表达式后添加子句 `HAVING COUNT(*) >=
  3`，我们可以找出参加了三场或以上锦标赛的成员。

  *   使用 `WHERE` 在分组和聚合之前选择行的子集。使用 `HAVING` 在分组和聚合之后选择行的子集。


  更复杂的聚合：


  *   当你需要嵌套聚合时（例如，找出计数的平均值），请使用派生表。只需给内部查询起一个别名。

  *   通过比较行数来进行等价的关系除法运算。


  脚注 1

  不同版本的 SQL 会有不同的函数来实现此功能。在 Oracle 中，你可能会考虑使用 `CAST` 函数。


  '
- '# 9. 窗口函数


  窗口函数于 2003 年被添加到标准 SQL 中，为处理聚合提供了相当大的额外能力。窗口函数允许我们基于当前行，对数据的一个“窗口”执行聚合。这为指定执行排名、累计总和和滚动平均值等操作的查询提供了一种优雅的方式。在将数据分组以进行聚合时，窗口函数也提供了相当大的灵活性，因为它们允许单个查询具有多个不同的组或分区。还可以在查询中引用参与聚合的基础数据。这允许将基础数据与聚合结果进行比较。


  Oracle 和 Postgres 支持窗口函数已有多年，而 SQL Server 直到 2012 年才引入它们。Access 和 MySQL 目前不支持这些函数。本章概述了如何使用一些最常见的窗口函数。




  ### 简单聚合函数


  要开始使用窗口函数，我们将利用它们来编写查询，以替代第 8 章中遇到的一些简单聚合函数。让我们重新考虑一个计算成员障碍物总和与平均值的简单聚合查询：


  ```

  SELECT COUNT(Handicap) AS Count, AVG(Handicap * 1.0) as Average

  FROM Member;

  ```


  该查询的输出如图 9-1 所示。


  ![A158240_2_En_9_Fig1_HTML.jpg](img/A158240_2_En_9_Fig1_HTML.jpg)


  图 9-1. 简单计数和平均障碍物的输出


  对于简单聚合，`SELECT`子句中唯一允许的属性是聚合函数本身以及那些包含在`GROUP BY`子句中的属性。这意味着我们不再能够访问构成结果的各个障碍物数据。


  窗口函数允许我们在获取聚合值的同时，也能检索底层数据。窗口函数的关键字是`OVER()`；它们有时也被称为 over 函数。


  以下是一个与前面查询类似的、使用`OVER()`函数的查询：


  ```

  SELECT MemberID, LastName, FirstName, Handicap,

  COUNT(Handicap) OVER() AS Count,

  AVG(Handicap * 1.0) OVER() as Average

  FROM Member;

  ```


  与简单的`COUNT()`函数不同，使用`OVER()`函数，我们能够在`SELECT`子句中包含额外的字段。在上面的查询中，我们包含了每个成员的四个详细数据字段以及两个聚合值（为了便于阅读，聚合值被缩进在新行上）。这些聚合值与简单聚合相同，只是包含了`OVER()`函数。


  上述查询的部分输出如图 9-2 所示。障碍物的计数和平均值与每个成员的详细数据一起显示。


  ![A158240_2_En_9_Fig2_HTML.jpg](img/A158240_2_En_9_Fig2_HTML.jpg)


  图 9-2. 使用 OVER()计算和平均障碍物时的输出


  虽然图 9-2 中的示例为每一行返回聚合值看起来不是特别有用，但它为一些新的查询打开了大门。我们现在可以轻松地将每个个体的障碍物与平均值进行比较，这在没有窗口函数的情况下是完全不简单的。在下面查询的第三行，我们从每个成员的障碍物中减去障碍物的平均值，并将结果包含在`SELECT`子句中：


  ```

  SELECT MemberID, LastName, FirstName, Handicap,

  AVG(Handicap * 1.0) OVER() AS Average,

  Handicap - AVG(Handicap *1.0) OVER() AS Difference

  FROM Member;

  ```


  结果如图 9-3 所示。


  ![A158240_2_En_9_Fig3_HTML.jpg](img/A158240_2_En_9_Fig3_HTML.jpg)


  图 9-3. 窗口函数允许我们将聚合值与详细值进行比较


  ### 分区


  `OVER()`函数也可用于生成类似于上一章介绍的`GROUP BY`查询的查询。这里我们需要的关键短语是`PARTITION BY`。让我们尝试对`Entry`表中的行进行一些不同的计数。如果我们只对`COUNT(*)`函数使用`OVER()`函数，我们将计算所有行；而如果我们使用`OVER(PARTITION
  BY TourID)`，它将为`TourID`的每个不同值计算行数。


  分区的真正威力在于，与简单聚合的`GROUP BY`子句不同，它允许在单个查询中包含多个不同的分区。通过一个例子可以最好地说明这一点。以下查询包含三个不同的计数：


  ```

  SELECT MemberID, TourID, Year,

  COUNT(*) OVER() as CountAll,

  COUNT(*) OVER(PARTITION BY TourID) AS CountTour,

  COUNT(*) OVER(PARTITION BY TourID, Year) AS CountTourYear

  FROM Entry;

  ```


  输出如图 9-4 所示。


  ![A158240_2_En_9_Fig4_HTML.jpg](img/A158240_2_En_9_Fig4_HTML.jpg)


  图 9-4. 在单个查询中使用不同的分区


  在图 9-4 中，`CountAll`列显示了`COUNT(*) OVER()`的结果，它计算`Entry`表中的每一行（共 24 行）。


  `CountTour`列是`COUNT(*) OVER(TourID)`的结果，它对具有相同`TourID`值的行进行分区（或分组）然后计数。图 9-4 顶部的三组实线框显示了对`TourID`为
  24、25 和 36 的`CountTour`有贡献的行。


  `CountTourYear`列是`COUNT(*) OVER(TourID, Year)`的结果，它对具有相同`TourID`和`Year`值的所有行进行分区。图
  9-4 底部附近的虚线框组展示了这些计数是如何评估的。


  ### ORDER BY 子句


  `OVER()`函数可以包含一个`ORDER BY`子句。这指定了在评估聚合时访问行的顺序。为行指定顺序提供了一种执行累计总和和排名操作的机制。


  #### 累计聚合


  如果在`OVER()`函数中包含了`ORDER BY`子句，那么默认情况下，聚合是从分区的开始执行到当前行（但更精确的定义见下文）。


  看看下面的查询：


  ```

  SELECT MemberID, TourID, Year,

  COUNT(*) OVER(ORDER BY Year) AS Cumulative

  FROM Entry;

  ```


  在`Entry`表中，我们有几行具有相同的`Year`值（如图 9-5 所示）。就排序而言，这些行是等效的，因此如果其中一行被包含在计数中，那么我们应该包含所有这些行。我现在将更正哪些行被包含在聚合中的定义。


  ![A158240_2_En_9_Fig5_HTML.jpg](img/A158240_2_En_9_Fig5_HTML.jpg)


  图 9-5. 使用 ORDER BY 为每年生成累计计数


  如果在`OVER()`函数中包含了`ORDER BY`子句，那么默认情况下，聚合是从分区的开始执行到当前行，并且包括任何后续具有相同排序表达式值的行。


  图 9-5 中的输出说明了这一点的含义。


  在图 9-5 中，行按`Year`排序。让我们看看这种累计计数在前几行是如何工作的。对于第一行，如果我们从表的开头计数，我们有 1 行。然而，接下来的 5 行具有与我们排序表达式`Year`相同的值，因此我们将它们包含在计数中，得到总共
  6。


  现在让我们移动到成员 258 的第一行。从表的开头计数，我们有 10 行，但接下来的 3 行具有相同的`Year`值。这总共是 13。


  本质上，我们得到了每年条目的累计计数。我们在第一年有 6 个条目（实线框），在第二年我们有额外的 7 个条目，总共 13 个（虚线框）。


  如果`OVER()`函数中有`ORDER BY`子句，`SUM()`函数的工作方式非常相似，可以给我们提供累计总和。


  假设俱乐部在一个名为`Income`的表中收集了来自筹款和锦标赛的收入数据。图 9-6 显示了前六个月的收入。


  ![A158240_2_En_9_Fig6_HTML.jpg](img/A158240_2_En_9_Fig6_HTML.jpg)


  图 9-6. Income 表


  我们可以通过执行一个`SUM(Income)`并在`OVER()`函数中包含`ORDER BY Month`子句来找到收入的累计总和，如下面的查询所示：


  ```

  SELECT Month, Income,

  SUM(Income) OVER(ORDER BY Month) AS RunningTotal

  FROM Income;

  ```


  收入从表的开始累加到当前行（按`Month`的值排序），如图 9-7 所示。


  ![A158240_2_En_9_Fig7_HTML.jpg](img/A158240_2_En_9_Fig7_HTML.jpg)


  图 9-7. 按月份排序的每月收入累计总和



  #### 排名


  `ORDER BY` 子句的另一个用途是与 `RANK()` 函数结合使用。作为示例，我们将根据差点值对俱乐部成员进行排名。请看以下查询：


  ```sql

  SELECT MemberID, Handicap,

  RANK() OVER (ORDER BY Handicap) AS Rank

  FROM Member

  WHERE Handicap IS NOT NULL;

  ```


  `OVER()` 函数中的 `ORDER BY` 子句指定了在确定排名时行的顺序——这里使用的是 `Handicap` 的值。每当 `Handicap` 的值发生变化时，排名就变为该分区内的行号（此处是整个表按
  `Handicap` 排序）。排名会保持不变，直到 `Handicap` 的值再次改变，如图 9-8 所示。（为了更清晰地说明过程，部分差点值已被修改。具有相同
  `Handicap` 值（因此排名也相同）的行已用虚线标出。）


  ![A158240_2_En_9_Fig8_HTML.jpg](img/A158240_2_En_9_Fig8_HTML.jpg)


  图 9-8.

  按差点值排序的 `RANK()` 函数结果。具有相同差点值的行拥有相同的排名。


  图 9-8 中的第一行排名为 1（它是第一行！）。第二行的排序表达式 (`Handicap`) 值与前一行相同，因此它的排名也是 1。下一行中 `Handicap`
  的值发生了变化，所以排名变为行号 (3)。


  空值会被包含在排名中，这就是为什么在前面的查询中明确排除了它们。如果没有 `WHERE` 子句，空值将被包含在排名的顶部（如果排序顺序是 `DESC`，则在底部）。


  #### 排序与分区结合


  在前面关于排序的部分中，我的查询没有包含任何分区。既然我们（希望）已经理解了这个概念，我们可以看更多的例子。


  让我们考虑一个更详细的 `Income` 表，它包含了高尔夫俱乐部进行筹款的三个区域的月度金额。该年头五个月的数据如图 9-9 所示。


  ![A158240_2_En_9_Fig9_HTML.jpg](img/A158240_2_En_9_Fig9_HTML.jpg)


  图 9-9.

  包含区域的 Income 表


  我们将逐步构建一些查询。


  首先，我们只计算表的总收入。我们可以使用简单的 `SUM()` 聚合，但我们将包含一个 `OVER()` 函数，以便在输出中保留详细信息：


  ```sql

  SELECT Month, Area, Income,

  SUM(Income) OVER() AS Total

  FROM Income;

  ```


  这将产生一个与图 9-9 相同的表，但增加了一列 `Total`，该列每行都显示整个表的总和。


  现在，让我们将其改为累计总和。我们通过在 `OVER()` 函数中包含一个 `ORDER BY` 子句来实现。默认情况下，这会计算从表开头到当前行以及相同 `Month`
  值的后续行的总和。查询如下：


  ```sql

  SELECT Month, Area, Income,

  SUM(Income) OVER(ORDER BY MONTH) AS RunningTotal

  FROM Income;

  ```


  收入从表顶部累加到当前行，包括具有相同 `Month` 值（我们用于排序的属性）的后续行。本质上，输出对每个月的所有值求和，然后逐月累计总数。输出如图 9-10
  所示。不同的月份已用虚线标出。


  ![A158240_2_En_9_Fig10_HTML.jpg](img/A158240_2_En_9_Fig10_HTML.jpg)


  图 9-10.

  按月排序时的累计总和


  现在让我们独立地查看各个区域。这需要一个 `PARTITION BY` 子句。考虑这个查询：


  ```sql

  SELECT Month, Area, Income,

  SUM(Income) OVER(

  PARTITION By Area

  ORDER BY MONTH) AS AreaRunningTotal

  FROM Income;

  ```


  `PARTITION BY` 子句需要放在 `ORDER BY` 子句之前，这反映了执行过程。我们首先对数据进行分区，然后在每个分区内进行排序。聚合是针对从当前分区开头到当前行的行计算的。图
  9-11 仅显示了该年头五个月的输出。三个分区已用虚线标出，以便更容易看清发生了什么。


  ![A158240_2_En_9_Fig11_HTML.jpg](img/A158240_2_En_9_Fig11_HTML.jpg)


  图 9-11.

  按区域分区并按月排序的收入累计总和


  ### 帧规范


  窗口函数的最后一个特性是我们能够进一步指定哪些行包含在聚合中。这正是“窗口”函数名称的由来。它们为我们感兴趣的数据部分提供了一个窗口或帧。`OVER()` 函数的通用形式包含三个子句，如下所示：


  ```sql

  OVER(

  [PARTITION BY ...]

  [ORDER BY ...]

  [ROWS ...]

  );

  ```


  我们已经了解了其中两个子句：`PARTITION BY` 子句允许我们在聚合前按某些表达式对数据进行分组。`ORDER BY` 子句允许我们确定聚合函数在分区中遍历行的顺序，并允许我们执行排名和累计计算。`ROWS`
  子句允许我们缩小相对于当前行、将要包含在聚合中的行集。


  默认情况下，带有 `OVER(ORDER BY)` 子句的查询会计算从当前分区开始到当前行（包括当前行）的值的聚合。让我们通过一个计算每个区域累计平均值的查询来回顾一下：


  ```sql

  SELECT Month, Area, Income,

  AVG(Income) OVER (

  PARTITION BY AREA

  ORDER BY Month) AS AreaRunningAverage

  FROM Income;

  ```


  图 9-12 的输出仅针对 Halswell 区域。实线框显示了从顶部数第三行的平均值所包含的行。虚线框显示了对图像底部数第三行的平均值有贡献的行。如果 `ORDER
  BY` 子句后没有 `ROWS` 子句，那么这就是默认行为。


  ![A158240_2_En_9_Fig12_HTML.jpg](img/A158240_2_En_9_Fig12_HTML.jpg)


  图 9-12.

  收入表的累计平均值


  `ROWS` 子句的语法是：


  ```sql

  ROWS BETWEEN <start of frame> AND <end of frame>

  ```


  表 9-1 展示了用于指定 `<start of frame>` 和/或 `<end of frame>` 的一些表达式。请记住，如果使用 `ROWS` 子句，则必须始终有
  `ORDER BY` 子句。


  表 9-1.

  指定窗口的行


  | 表达式 | 含义 |

  | --- | --- |

  | `UNBOUNDED PRECEDING` | 从当前分区的起始处开始 |

  | `<n> PRECEDING` | 从当前行之前 n 行开始 |

  | `CURRENT ROW` | 可用于帧的开始或结束 |

  | `<m> FOLLOWING` | 在当前行之后 m 行结束 |

  | `UNBOUNDED FOLLOWING` | 在当前分区的结束处结束 |


  以下查询明确指定了所需行的（默认）窗口：


  ```sql

  SELECT Month, Area, Income,

  AVG(Income) OVER(

  PARTITION BY AREA

  ORDER BY Month

  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS AreaRunningAverage

  FROM Income;

  ```


  如果 `ORDER BY` 子句后未指定 `ROWS` 子句，则上述查询中的 `ROWS` 子句是默认行为。


  现在我们可以改变哪些行包含在平均值中。假设我们想查看滚动三个月的平均值。这意味着对于每个月，我们取一个平均值，该值包含当前月份、前一个月和后一个月。下面的查询展示了如何在前面的查询中添加另一个
  `ROWS` 子句，以同时查看累计平均值和滚动三个月平均值：


  ```sql

  SELECT Month, Area, Income,

  AVG(Income) OVER(

  PARTITION BY AREA

  ORDER BY Month

  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS AreaRunningAverage,

  AVG(Income) OVER(

  PARTITION BY AREA

  ORDER BY Month

  ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING

  ) AS Area3MonthAverage

  FROM Income;

  ```


  图 9-13 显示了此查询的输出。框显示了在第 4 个月（实线框）和第 9 个月（虚线框）的行上，哪些值对平均值有贡献。


  ![A158240_2_En_9_Fig13_HTML.jpg](img/A158240_2_En_9_Fig13_HTML.jpg)


  图 9-13.

  累计平均值和滚动三个月平均值


  第 4 个月行的 `RunningAverage` 包含从开始到第 4 个月的所有值，类似地，第 9 个月行的 `RunningAverage` 包含直到并包括第
  9 个月的所有收入。第 4 行的 `Rolling3MonthAverage` 包含第 3 到 5 个月（当前行的前一个月和后一个月）。在第 9 行，`Rolling3MonthAverage`
  平均了第 8 到 10 个月（即，第 9 个月的前后各一个月）。


  不同的平均值提供了关于业务状况的不同信息。累计平均值提供了本年度迄今为止的平均收入。滚动三个月平均值更好地反映了当前收入的趋势。滚动平均值列中较后的值高于其对应的累计平均值，因为它们不包含最初几个月的较低值。


  ### 总结


  窗口函数提供了一种优雅的方式来执行分区、累计和滚动聚合，并允许在同一个查询中同时获取详细信息和聚合值。


  以下是本章涵盖功能的一个简要总结。我在描述中使用了“表”一词，但该功能同样适用于查询的结果。


  #### OVER()


  使用不带子句的 `OVER()` 函数来计算整个表的聚合值。与简单聚合不同，可以在 `SELECT` 子句中包含其他属性，从而同时保留对详细信息和聚合值的访问。


  #### OVER(PARTITION BY <…>)


  如果在 `OVER()` 函数中包含 `PARTITION BY`，则行将被按照分区表达式的值相同的方式分组。聚合针对每个分区执行。这类似于简单聚合中的 `GROUP
  BY`，但其优势在于可以在单个查询中包含多个不同的分区。


  #### OVER(ORDER BY <…>)


  当 `ORDER BY` 包含在 `OVER()` 函数中时，表（虚拟地）按排序表达式进行排序。然后，聚合针对从表开始到当前行（以及任何排序表达式值相同的后续行）的行进行计算。这用于累计聚合。


  #### OVER(PARTITION BY <…> ORDER BY <…>)


  表首先按分区表达式的值相同的方式划分为不同的组，然后行在这些组内按排序表达式进行排序。接着，聚合针对从表开始到当前行（以及任何排序表达式值相同的后续行）的行进行计算。


  #### OVER(ROWS BETWEEN <…> AND <…>)


  `ROWS BETWEEN` 子句可以添加到带有 `ORDER BY` 子句的 `OVER()` 函数中。这会将聚合限制为相对于当前行的一组行，通常是当前行之前的若干行和/或之后的若干行。它对于计算滚动聚合非常有用。


  '
- "# 10. 效率考量\n\n你可能不需要阅读本章！数据库管理系统（DBMS）非常高效，如果你的数据量适中，大多数查询可能转瞬之间就能完成。为了让查询稍微快一点而把生活复杂化，这并不太有意义。然而，如果你拥有（或可能拥有）海量数据且速度绝对关键，那么你将需要比从一本入门书的一章中所能获得的更多技能和经验。话虽如此，你很可能会听别人说如何表达查询很重要，或者你应该为表建立索引，因此对幕后发生的事情以及理解一些术语有个大致概念会很有帮助。\n\
  \n在本书中，我一直强调，在 SQL 中表达查询往往有多种替代方式。你所使用的 SQL 实现可能不支持某些结构，因此你的选择可能受限。即便如此，对于大多数查询，你通常仍有替代方案。使用哪一种方式有关系吗？其中一个考虑因素是查询的可移植性。如果你不确定查询将在何处使用，你可能会选择避免使用尚未被广泛支持的关键字和操作。然而，通常你会为特定\
  \ SQL 实现的数据库编写查询。在这种情况下，你的主要问题是：“查询的不同结构会如何影响性能？”以及“我能做些什么来提高性能？”\n\n### 查询的处理过程\n\
  \n到目前为止，我们一直专注于将需要回答的问题转化为查询，以便从数据库返回恰当且准确的信息。从概念上讲，查询编写者将数据库视为表的集合。SQL 语句是一种表达式，描述了应从这些表中检索哪些数据以及这些数据必须遵守哪些约束（结果\
  \ approach）。\n\n我们也已经看到，可以通过描述集合操作（如连接和交集）来指定查询，这将导致返回相应的数据（过程 approach）。使用集合操作使得形成查询非常优雅，但这些操作纯粹是概念性的。虽然我们可能用，比如说，一个连接后跟一个交集来指定查询，但这将被\
  \ DBMS 解释为对要返回数据的描述，而不是检索数据的方法。\n\n表和数据模型的概念是我们理解数据片段之间逻辑关系的有用方式。我们将数据的物理存储和检索交给\
  \ DBMS 来处理。图 10-1 是一个简化的示意图，展示了不同的抽象层次，有助于我们理解数据库。\n\n![A158240_2_En_10_Fig1_HTML.jpg](img/A158240_2_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1.\n数据库管理系统的层次\n\n在图 10-1 的顶部是用户层。这里我们有各种应用程序和设备，构成了人与数据之间的接口。正是在这里，用户（或应用程序）会构建\
  \ SQL 语句（图的左上角）。\n\n中间层是数据库的概念视图。我们可以将数据视为存储在具有各种键和验证约束的表中。在这里，我们还可以建立模型，说明数据库应如何处理并发用户以及允许访问不同数据的规则。我们构建的\
  \ SQL 语句都是基于所有这些概念的。\n\n实际数据存储在物理层，如图 10-1 底部所示。我们视为一个表的东西，可能是存储在可能位于不同国家、不同服务器上的数据片段。在这一层，会有索引允许快速访问不同的记录；我们将在本章后面的章节中讨论这些。\n\
  \n如何定位和组装相关信息以产生查询结果，这是 `查询优化器` 的工作。用户构建的 SQL 语句被传递给优化器，优化器可以访问关于（概念）表中的行数、每行中的数据量、已创建索引的属性等信息。它利用所有这些信息来创建一个\
  \ `执行计划`。执行计划是一系列高效的步骤，用于查找、比较数据，并将其组装成查询指定的结果。数据根据执行计划从物理存储中检索并组装，然后将结果返回给用户——通常以表的形式。\n\
  \n大多数商业数据库软件提供工具来显示建议的执行计划以及估计的每个步骤执行时间。这提供了对查询如何执行以及时间花费在何处的洞察。一个好的数据库管理员将能够利用此类信息来调整数据库；例如，通过添加新的索引。\n\
  \n在接下来的章节中，我们将简要了解一下记录是如何存储的，索引如何提高效率，以及查询执行时幕后发生的一些事情。\n\n### 查找记录\n\n大多数数据库查询在某些时候都会涉及查找满足特定条件的记录。例如，我们可能想要在单个表中查找记录（例如，`WHERE\
  \ LastName = 'Smith'`），从两个表中查找满足连接条件的记录（例如，`WHERE m.MemberID = e.MemberID`），或者查找值的存在与否（例如，`WHERE\
  \ NOT EXISTS...`）。\n\n在一切都以电子方式存储的今天，搜索和查找数据似乎相当容易。如果我们想在在线书籍中查找某个主题，只需打开搜索框并键入一些关键字。但对于实体书来说，情况就大不相同了。我们要么必须逐页扫描，要么希望有一个有用的索引或目录。那些还记得实体电话簿的人会记得，找到\
  \ Jim Smith 很容易，但要找出谁住在 Murray Place 16 号却是不可能的。\n\n在数据库幕后，问题与实体书籍相同。数据只能按一种顺序存储，但我们可能希望以多种方式搜索它。了解实际发生的情况很有用，这样我们才能理解影响定位特定记录性能的因素。\n\
  \n查找满足条件的记录的一种方法是简单地顺序扫描表中的每一行。这是找到你想要的东西最慢、成本最高的方式。话虽如此，这可能不是问题。扫描高尔夫俱乐部的 `Type`\
  \ 表以查找高级会员的会费不会花太长时间。另一方面，扫描（一个现实的）`Entry` 表中的每一行以查找过去四十年中参加了 38 号锦标赛的成员，将是一项更大的工作。\n\
  \n### 按顺序存储记录\n\n如果我们考虑关系理论，那么表²中的行是没有顺序的。这使得我们可以将表视为一个集合，并应用所有的集合操作。从概念的角度看，这很有用，但在实践中，记录的存储方式会影响我们查找所需内容的速度。\n\
  \n如果表中的记录以随机顺序存储（可能是它们被创建的顺序），那么这被称为**堆表**。在堆表中查找记录的唯一方法是扫描整个表。通常，记录会按某个（些）属性有序存储——通常是主键。有各种算法可以在有序表中快速查找特定记录，但大多数都基于**二分查找**的思想。\n\
  \n当我们在电话簿中查找一个姓名或在词典中查找一个单词时，我们采用的就是一种二分查找。在最简单的情况下，我们查看书中中间的一页，判断目标单词是在该页单词之前还是之后。然后我们重新开始，查看感兴趣部分的中间位置。我们很快就能定位到所需的页。如果表中的记录按某个特定字段排序，那么在该字段上的搜索将比在没有索引的字段上搜索更高效。\n\
  \n当我们谈论表中的记录按顺序存储时，我们并不是指它们在磁盘上物理地一个接一个存放。如果是那样的话，如果我们想在开头附近插入一条新记录，就必须移动所有其他记录。可以将这些记录想象成处于一种树状结构中。一种常见的树是\
  \ B-树。图 10-2 展示了一个用于存储字母表中字母的 B-树结构的非常简单的表示。\n\n![A158240_2_En_10_Fig2_HTML.jpg](img/A158240_2_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. B-树中的数据表示\n\n如果你要在图 10-2 的树中查找一个字母，你会从顶部的节点或方框开始。在顶部节点中，你要么找到你想要的内容，要么沿着合适的路径继续。例如，如果你要找`H`，你会沿着`G`和`O`之间的路径走。这种结构允许在添加和删除记录时造成最小的干扰。我们可以轻松地将`R`添加到包含`P`和`Q`的方框中，而无需更改任何其他字母。维护\
  \ B-树并非易事。随着数据的添加和删除，树需要重新排列以保持平衡，并添加和删除节点及层级。幸运的是，所有这些都在底层自动完成。\n\n话虽如此，当我们思考记录有序时，通常最容易想象它们都排成一条线。在本章的剩余部分，我将这样做。\n\
  \n### 聚集索引\n\n如果记录按某种顺序物理存储，那么这被称为**聚集索引**。如果我们认为按姓名顺序存储成员记录是个好主意，我们可以专门创建一个聚集索引，使记录按`LastName`字段的值排序。我们可以用\
  \ SQL 语句创建一个索引。我们需要为索引提供一个名称（例如`Clustered_Name`），并指定用于排序索引的字段，如下所示查询：\n\n```\nCREATE\
  \ CLUSTERED INDEX Clustered_Name ON Member (LastName);\n```\n\n默认情况下，聚集索引的顺序通常是主键的值。虽然可以为聚集索引指定不同的顺序，但你需要有充分的理由这样做。\n\
  \n有了聚集索引后，现在有两种定位记录的方式。考虑在`Member`表上运行以下查询，该表在`LastName`上有聚集索引：\n\n```\nSELECT *\n\
  FROM MEMBER WHERE LastName = 'Smith';\n```\n\n因为表是按`LastName`排序的，我们可以通过执行二分查找快速导航到正确的记录。这被称为**表查找**。\n\
  \n现在考虑以下查询：\n\n```\nSELECT *\nFROM MEMBER\nWHERE Phone = '03-567-123';\n```\n\n\
  我们现在别无选择，只能检查表中的每一条记录。我们甚至不能在找到匹配记录时停止，因为可能有多个记录具有相同的电话号码。这被称为**表扫描**。\n\n### 非聚集索引\n\
  \n表中的记录只能以一种物理顺序存储，因此永远只能有一个聚集索引，而它通常建立在主键上。如果`Member`表的聚集索引建立在主键字段`MemberID`上，我们可以查找特定的`MemberID`值，并找到包含该成员所有详细信息的完整行。如果我们想查找具有特定姓氏的一行，就必须扫描整个表。幸运的是，我们可以在表上设置额外的非聚集索引。从现在开始，我将这些非聚集索引简称为索引。以下是在`Member`表的`LastName`上创建索引的\
  \ SQL：\n\n```\nCREATE INDEX idx_Name ON Member (LastName);\n```\n\n它的作用是创建一个按顺序排列的所有`LastName`值的列表。每个条目都将包含对聚集索引的引用，以便可以找到包含其余信息的完整行。图\
  \ 10-3 说明了`LastName`索引中的前几个条目如何引用聚集索引。\n\n![A158240_2_En_10_Fig3_HTML.jpg](img/A158240_2_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. LastName 上的索引包含对聚集索引的引用以获取完整信息\n\n因为索引是按姓氏排序的，所以可以执行**索引查找**来找到所需的条目，然后使用该引用来查找聚集索引中的关联行，以检索其余信息。\n\
  \n在实践中，查询优化器是否使用特定索引取决于许多因素：表中的行数、索引和表中每行的大小、记录是否最近被访问过并已缓存等等。\n\n\n#### 复合键上的聚集索引\n\
  \n让我们来考虑 `Entry` 表。回想一下，`Entry` 表有三个字段：`MemberID`、`TourID` 和 `Year`。关于这张表中的数据，我们可能会提出两个问题：\n\
  \n*   某位成员（比如成员 235）参加了哪个锦标赛？\n*   谁参加了某个特定的锦标赛（比如锦标赛 40）？\n\n似乎创建两个索引是合理的：一个在 `TourID`\
  \ 上，一个在 `MemberID` 上。然而，这两个索引都将引用聚集索引。对于 `Entry` 表来说，这将是什么顺序呢？\n\n默认情况下，表将基于主键进行聚集，对于\
  \ `Entry` 表，主键是所有三个字段的组合。记录的顺序将取决于我们如何指定主键。假设 `Entry` 表是通过以下 SQL 语句创建的：\n\n```sql\n\
  CREATE Table Entry (\nMemberID INT,\nTourID INT,\nYear INT,\nPRIMARY KEY (MemberID,\
  \ TourID, Year);\n```\n\n聚集索引中行的顺序将如图 10-4 所示。首先，它们按照 `PRIMARY KEY` 子句中指定的第一个字段（`MemberID`）排序。具有相同\
  \ `MemberID` 值的行将按第二个字段（`TourID`）排序，依此类推。\n\n![A158240_2_En_10_Fig4_HTML.jpg](img/A158240_2_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4.\nEntry 表默认聚集索引中的数据顺序\n\n系统可以轻松找到成员 235 参加的锦标赛，因为条目是按 `MemberID` 排序的，并且可以执行表查找。我们不一定需要在\
  \ `MemberID` 上添加额外的索引。另一方面，要找出谁参加了锦标赛 40，则需要扫描并检查每一行。在这种情况下，在 `TourID` 上建立索引会是一个改进。\n\
  \n因此，我们指定主键字段的顺序会影响查询的执行方式，并可能影响其他哪些索引是有用的。如果主键字段的顺序被指定为 `PRIMARY KEY (TourID, MemberID,\
  \ Year)`，那么聚集索引将按 `TourID` 排序。在这种情况下，如果我们经常需要查找特定成员的行，就应该考虑在 `MemberID` 上建立索引。\n\
  \n我特意在图 10-4 的情况中说我们可能不需要在 `MemberID` 上建立索引。优化器会考虑很多因素。其中一个重要的因素是索引中典型条目的大小或字节数。由两个文本字段（如\
  \ `LastName` 和 `FirstName`）组成的索引中的每个条目，都会比单个文本字段的索引大，而后者又会比数字字段的索引大。每次访问索引中的一个条目时，都必须检索它，因此存在\
  \ I/O（输入/输出）成本，这取决于条目的大小。\n\n如果图 10-3 中的聚集索引在每一行中有显著更多的数据（例如，一些描述性文本字段），那么检索一行的成本将高于仅检索三个数字字段。在这种情况下，考虑在\
  \ `MemberID` 上建立索引是值得的。它不会改变需要检查的索引条目数量，但由于每个条目更小，因此 I/O 成本会更小。缺点是，一旦通过索引查找定位到正确的\
  \ `MemberID`，系统将需要查找聚集索引以找到其余信息。根据它可以访问的所有信息，优化器将确定是使用 `MemberID` 上的索引并查找其余信息更高效，还是直接扫描聚集索引中的所有记录更高效。\n\
  \n#### 更新索引\n\n索引显然非常有用。为什么我们不直接为我们可能搜索的所有内容都建立索引呢？这当然是可能的。缺点是索引必须维护。每次我们在表中添加或删除一条记录时，该表上的每个索引也需要更新。因此，我们面临一个权衡。大量索引意味着检索速度快但更新慢。较少的索引意味着更新快但可能检索慢。\n\
  \n管理这些权衡是经验丰富的数据库管理员的工作，他们需要具备出色的领域知识。有许多可用的工具可以监控数据库，并提供关于索引使用情况的统计数据以及其他数据信息。如果数据相对稳定，更新很少，那么建立多个索引将使检索更快。如果数据不断更新，那么索引可能适得其反。\n\
  \n在有很多更新的情况下，进行批量数据更新可能是实际可行的。使用批量更新，你可以移除索引。以下查询展示了如何删除本章前面在 `Member` 表上创建的索引：\n\
  \n```sql\nDrop idx_Name on Member;\n```\n\n然后，可以对表进行所有的添加、删除和修改操作，而无需承担更新索引的开销。在对表的更新结束后，可以重新创建索引。这比对每次更改都更新每个索引可能更高效，也可能不是。\n\
  \n#### 覆盖索引\n\n向某些索引添加更多字段也可能是有效的。考虑以下查询：\n\n```sql\nSELECT FirstName\nFROM Member\n\
  WHERE LastName = 'Smith'\n```\n\n如果 `Member` 表在 `LastName` 上有一个索引，那么前面的查询将需要一次索引查找来找到\
  \ Smith，然后通过查找聚集索引来找到名字。如果索引是复合索引（`LastName, FirstName`），那么查询所需的所有信息都包含在索引中，无需查找。这被称为覆盖索引。同样，这里存在权衡：索引中更大的行带来更大的\
  \ I/O 成本，与查找的成本相比。\n\n#### 索引的选择性\n\n当索引搜索返回的行数相对于表中的行数很小时，索引最有用。\n\n例如，让我们考虑查找特定姓氏的成员信息。在\
  \ `Member` 表的 `LastName` 上建立索引，如果我们搜索一个特定的名字，很可能只返回其元素的一小部分。然后，系统可以为这些返回的元素中的每一个查找聚集索引，以检索有关成员的其余信息。\n\
  \n相比之下，如果我们想查找关于女性成员的信息会发生什么？在高尔夫俱乐部的 `Member` 表中，如果我们在 `Gender` 上建立索引并搜索 `'F'`，索引将返回大约一半的条目。然后，DBMS\
  \ 将不得不在聚集中查找相应的记录。在这种情况下，直接扫描包含我们所需全部信息的聚集索引，而完全不理会索引，可能更高效。\n\n有时索引的选择性并不明显。例如，如果表中的大多数记录具有相同的\
  \ `City` 值，并且大多数查询都是针对该城市的，那么在 `City` 字段上建立索引将没有用。\n\n数据库软件通常提供可以为我们提供帮助的工具。这些工具可能提供关于表中字段当前数据分布的统计信息——例如，表中有多少百分比的记录在某个字段（如\
  \ `City`）上具有相同的值。这将有助于确定索引是否有用。通常可以收集关于索引使用频率的统计数据。如果优化器很少使用某个索引，那么与其不断更新它，不如将其移除。\n\
  \n\n### 连接技术\n\n如果我们考虑图 10-4 中的`Entry`表，大多数查询都需要与`Member`表进行连接（join），以找到报名者的姓名，和/或与`Tournament`表进行连接，以找到锦标赛的名称和其他信息。这些连接中的每一个都会将`Entry`表中的外键与`Member`或`Tournament`表的主键进行比较。请参阅第\
  \ 1 章以回顾我们所说的外键（foreign key）是什么意思。这种将外键与主键连接的情况非常常见，因此值得理解连接是如何执行的。我们将以`Member`和`Entry`表为例，但这些思路具有广泛的应用性。\n\
  \n在执行连接时，可以采用多种不同的方法。哪种方法最高效取决于许多因素，包括表的相对大小、已创建的索引、查询是否还包括投影特定列或选择行、是否指定了输出顺序等等。你不必担心选择哪种方法，因为这将由优化器（optimizer）决定。然而，创建特定的索引会影响所采用的方法。\n\
  \n#### 嵌套循环\n\n一种连接表的方法称为嵌套循环（nested loops）。这意味着系统扫描一个表，并在该表的每一行中查找另一个表中的所有行，以找到符合连接条件的匹配项。图\
  \ 10-5 针对连接条件`Entry.MemberID = Member.MemberID`说明了嵌套循环方法。\n\n![A158240_2_En_10_Fig5_HTML.jpg](img/A158240_2_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5. 查找具有匹配 MemberID 的行的嵌套循环方法\n\n在图 10-5 中，外层循环作用于`Entry`表。对于`Entry`表中的每一行，系统都需要在`Member`（内层）表中找到匹配的行。图\
  \ 10-5 中显示的表是无序的，这意味着为了在`Entry`表的每一行找到匹配记录，需要访问`Member`表的每一行（即全表扫描）。\n\n如果在内层循环的匹配字段上（本例中是`Member`表的`MemberID`）存在索引，那么查找匹配字段将更加高效。可以使用索引快速找到匹配记录，而无需访问每一行。实际上，`Member`表很可能在其主键`MemberID`上有一个聚集索引（clustered\
  \ index）。如果表以`Entry`表在内层的方式进行嵌套，那么当`Entry`表的`MemberID`上有索引时，内层循环将更有效。优化器将考虑这些信息，以决定嵌套循环选项对于执行连接是否高效，以及哪些表应作为内层表和外层表。\n\
  \n大多数商业数据库系统都会提供工具来查看查询的执行计划。图 10-6 显示了来自 SQL Server 的截图，展示了以下查询中`Member`和`Entry`表连接的执行计划：\n\
  \n![A158240_2_En_10_Fig6_HTML.jpg](img/A158240_2_En_10_Fig6_HTML.jpg)\n\n图 10-6.\
  \ 显示嵌套循环的执行计划\n\n```\nSELECT *\nFROM Member m INNER JOIN Entry e on m.MemberID =\
  \ e.MemberID;\n```\n\n在图 10-6 中，我们在右上角看到对`Entry`表的全表扫描。这是嵌套循环的外层循环（如图 10-5 所示）。右下角的图标显示，对于`Entry`表中的每一行，将对`Member`表的聚集索引执行一次查找（seek），以找到具有匹配`MemberID`的行。\n\
  \n我们在连接查询中指定表的顺序有关系吗？如果我们在 SQL 表达式中把`Entry`表放在前面，会有什么不同吗？以前可能会有。现在几乎肯定不会了。用不同的表顺序表达查询，在\
  \ SQL Server 中会产生与图 10-6 相同的执行计划。然而，如果我们更改了选择的字段，或添加了其他索引，或选择对输出进行排序，那么执行计划很可能会发生变化。\n\
  \n#### 合并连接\n\n另一种执行连接的方法是首先按连接字段对两个表进行排序。然后查找匹配行就变得非常容易。这称为合并连接（merge join），如图\
  \ 10-7 所示。\n\n![A158240_2_En_10_Fig7_HTML.jpg](img/A158240_2_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7. 合并连接要求每个表都按被比较的字段排序\n\n对表进行排序是一项昂贵的操作。然而，如果表在连接字段上有索引，那么可以通过索引扫描（index\
  \ scan）有序地访问行，从而使合并连接成为一个可选方案。\n\n如果连接条件中的一个或两个字段都有索引，那么合并连接和嵌套循环连接都将更有效。\n\n\n\
  ### 用于连接的不同 SQL 表达式\n\n在上一节中，我简要提到了连接中表的顺序是否会影响执行。对于图 10-6 中的查询，答案是否定的。然而，我们还有其他表达连接的方式。以下两个查询在\
  \ SQL Server 中具有完全相同的执行计划：\n\n```\nSELECT LastName FROM Member m, Entry e WHERE\
  \ m.MemberID = e.MemberID;\nSELECT LastName FROM Entry e INNER JOIN Member m ON\
  \ m.MemberID = e.MemberID;\n```\n\n下面两条 SQL 语句则通过嵌套查询来指定连接。它们的执行计划与前面的不同，但彼此之间是相同的：\n\
  \n```\nSELECT LastName FROM Member m WHERE m.memberID IN\n(SELECT MemberID FROM\
  \ Entry);\nSELECT LastName from Member m WHERE EXISTS\n(SELECT * FROM Entry e WHERE\
  \ m.MemberID = e.MemberID);\n```\n\n那么，我们是应该使用还是避免嵌套查询呢？答案一如既往地是“**视情况而定**”。\n\n\
  在比较前面这两对 SQL 语句之前，我们需要注意它们的输出是不同的。第一对会产生重复的名字（为一个成员参加的每个锦标赛重复其姓名）。第二对查询则会产生唯一的姓名。为了进行公平比较，我们将比较以下两个具有相同输出的查询：\n\
  \n```\nSELECT DISTINCT LastName\nFROM Entry e INNER JOIN Member m ON m.MemberID\
  \ = e.MemberID;\nSELECT LastName FROM Member m WHERE m.MemberID IN\n(SELECT MemberID\
  \ FROM Entry);\n```\n\n你可以在图 10-8 中看到这两个计划。\n\n![A158240_2_En_10_Fig8_HTML.jpg](img/A158240_2_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8.\n相同的输出但非常不同的执行计划和成本\n\n图 10-8 显示了顶部使用 `INNER JOIN` 关键字的查询计划和底部嵌套查询的计划。百分比表示如果这两个查询在同一个批次中执行，那么顶部的查询将占总时间的\
  \ 74%，底部的占 26%。也就是说，`INNER JOIN` 查询花费的时间是嵌套查询的三倍。\n\n顶部查询中 `DISTINCT` 关键字的添加占用了大部分时间。优化器选择对记录进行排序，以便准备移除重复的姓名。这个排序操作占第一个查询总成本的一半以上。看到这个计划，你可能会考虑在\
  \ `LastName` 上添加索引，以便可以按照 `LastName` 顺序访问 `Member` 表的记录，从而消除耗时的排序操作。\n\n除非你有真正的内部知识，否则几乎不可能准确猜测优化器会提出什么方案。长远来看，除非表的数据量巨大或者某个查询特别要求时效性，否则这可能并不重要。需要记住的重要一点是，如果你怀疑某个关键查询导致了瓶颈，有些工具可以帮助你理解发生了什么。然后你可以尝试修改索引或查询的表达方式，看看是否能加快速度。\n\
  \n### 总结\n\n索引可以显著提高许多查询的性能。然而，缺点是它们需要被维护。在对数据库进行任何调优时，了解重要的流程是什么至关重要。没有必要费尽心力去改进一个很少执行的查询，而如果你的数据库中大部分时效性强的工作是更新记录，那么提高检索性能反而会适得其反。\n\
  \n许多数据库系统提供的工具可以提供宝贵的信息。执行计划可以深入揭示查询中时间花费在哪里。可以收集有关索引使用情况或字段中数据分布的统计数据。在决定是否值得研究添加新索引时，所有这些信息都很有用。\n\
  \n以下是一些创建索引的通用经验法则。\n\n#### 主键\n\n你通常需要一个很好的理由才不在表的主键字段上创建索引。默认情况下，通常会在主键上放置聚簇索引。\n\
  \n#### 外键\n\n连接条件在 foreign key 和 primary key 之间的连接非常常见。因此，通常值得考虑在外键上创建索引。\n\n####\
  \ WHERE 条件\n\n如果你的查询经常在 `WHERE` 条件中使用特定字段，那么在这些字段上创建索引是很有用的。这可以实现索引查找，而不必进行表扫描来查找相关行。当\
  \ `WHERE` 条件具有**选择性**（意味着它只会检索一小部分行）时，这种方法最为有用。\n\n#### ORDER BY、GROUP BY 和 DISTINCT\n\
  \n如果没有在排序条件涉及的字段上创建索引，排序可能是一个非常耗时的操作。显然，`ORDER BY` 需要对行进行排序。包含 `DISTINCT` 或 `GROUP\
  \ BY` 的查询通常会对记录进行排序以删除重复项或聚合数据。通过使用适当的索引，可以使用索引扫描按顺序检索行，从而消除耗时的排序操作。\n\n#### 善用工具\n\
  \n查询优化器非常复杂。它们会维护关于你的表的统计信息（行数、列的大小、数据分布等），并利用这些信息来帮助确定高效的查询执行计划。如果你有一个希望尽可能高效的关键查询，请检查执行计划以了解时间花费在哪里。然后你可以尝试修改查询表述或添加额外索引，观察其效果。\n\
  \n脚注 1\n\nSQL 基于关系演算，它提供了要检索数据的描述。更多信息请参见附录 2。\n\n 2\n\n更正式地说，关系中的元组是没有顺序的。\n\n"
- '# 11. 如何处理查询


  在前面的章节中，我们看到了表达查询的不同方式。我们研究了**过程式方法**，它描述了如何操作表和数据以产生所需的结果。这些查询使用描述诸如 `INNER JOIN`
  和 `INTERSECTION` 等操作的关键字来表达。我们还研究了如何用**结果式方法**来表达查询，它描述的是结果数据必须满足的条件，而不是检索结果的过程。


  然而，有时当我面对一个用自然语言描述的复杂查询时，脑子一片空白的情况也并不罕见。我手头有很多“弹药”，但一时之间却不知道该选择哪种“武器”。


  通常，这只是需要自信和放松的问题。大型、复杂的查询总是可以分解为一系列更小、更简单的查询，之后再组合起来。本章将介绍如何做到这一点。


  ### 理解数据


  这听起来像是在陈述显而易见的事实，但如果你不了解所有不同元素的数据存储在哪里以及相关表如何相互关联，你就无法从数据库中检索信息。大多数时候，你查询的是由他人设计的数据库，并且可能随着时间的推移由各种人进行维护和修改。除了理解已实现的表和关系之外，还需要对底层的现实场景有所感受。你还必须警惕一个不幸的现实：数据库可能设计得很糟糕。这可能意味着你无法准确检索所需的信息。我们将在第
  12 章更深入地探讨这种应对不良设计的问题。




  ### 确定表格之间的关系


  要概览数据库的实现方式，最好的方法是查看表之间关系的示意图。大多数数据库管理软件都提供了查看表中字段以及表间外键关系的功能。图 11-1 和 11-2 分别展示了我们的俱乐部数据库在外键关系图上的样子，分别由
  SQL Server 和 Microsoft Access 描绘。


  ![A158240_2_En_11_Fig2_HTML.jpg](img/A158240_2_En_11_Fig2_HTML.jpg)


  图 11-2.


  来自 Microsoft Access 的关系图


  ![A158240_2_En_11_Fig1_HTML.jpg](img/A158240_2_En_11_Fig1_HTML.jpg)


  图 11-1.


  来自 SQL Server 的数据库图


  表面上看，图 11-1 和 11-2 中的示意图看起来有些不同，但它们代表的数据库是完全相同的。图 11-2 中的 Access 示意图多显示了一份 `Member`
  和 `Team` 表。`Member` 表出现两份是因为成员之间存在自关系（即，一个成员可以指导其他成员）。`Team` 表出现额外一份则是由于 `Member`
  和 `Team` 之间存在两种关系：一个成员可以是一支队伍的管理者，同时一个成员可以属于一支队伍。这些关系在图 11-1 的 SQL Server 图中通过显示表之间的两条连线来描绘，从而避免了表被显示两次。不同的图示表示只是不同管理系统的一个特点。两种示意图都代表了相同的表和关系集合。


  图 11-1 和 11-2 中的连线代表了在创建表时设置的外键。例如，创建 `Member` 表的语句包含两个外键约束：


  ```

  CREATE TABLE Member(

  MemberID Int PRIMARY KEY,

  LastName CHAR(20),

  FirstName CHAR (20),

  MemberType CHAR (20) FOREIGN KEY REFERENCES Type,

  Phone CHAR (20),

  Handicap INT,

  JoinDate DATETIME,

  Coach INT FOREIGN KEY REFERENCES Member,

  Team CHAR (20),

  Gender CHAR (1));

  ```


  回顾第 1 章，这行代码：


  ```

  MemberType CHAR (20) FOREIGN KEY REFERENCES Type

  ```


  意味着如果 `MemberType` 字段中有值，那么该值必须存在于 `Type` 表的主键字段中。在图 11-1 和 11-2 中可以看到一条代表 `Member`
  表和 `Type` 表之间这种外键关系的连线。


  而这行代码：


  ```

  Coach INT FOREIGN KEY REFERENCES Member

  ```


  意味着 `Coach` 字段中的值必须已经存在于 `Member` 表的主键字段中；也就是说，`Member` 表上存在一个自关系。在图 11-1 中，这个关系通过一个连接
  `Member` 表自身的环形来表示。在图 11-2 中，该关系通过显示 `Member` 表的第二个副本来描绘。


  ### 现实世界 vs 实现


  上一节中的数据库图表示了数据库的实现方式，特别是设置了哪些外键。当数据库最初建立时，其设计基于一个概念数据模型，该模型描述了特定问题的表是如何相互关联的。有多种表示数据模型的方法，例如实体关系图（ER
  图）和我们在本书中使用的 UML 类图。图 11-3 展示了高尔夫俱乐部的类图。如果需要回顾如何解读连线和数字，请参考第 1 章。


  ![A158240_2_En_11_Fig3_HTML.jpg](img/A158240_2_En_11_Fig3_HTML.jpg)


  图 11-3.


  代表概念模型的类图


  图 11-3 中的类图没有在类中显示外键字段。通过比较图 11-3 中的 `Entry` 表与前面两个数据库图中的表，你可以看出这一点。外键 `MemberID`
  和 `TourID` 作为属性在类图中缺失了。外键只是在我们选择在关系数据库中实现数据模型时，表示类之间关系的一种方式。如果我们决定在面向对象数据库中实现它，可能根本不需要外键字段。


  带有标注清晰的关系的类图，比图 11-1 和 11-2 中的实现图，能让我们对现实世界的情况有更深入的理解。看看 `Member` 和 `Team` 之间的关系，你就明白我的意思了。


  关系数据库软件提供的数据库图向你展示了实际已设置的外键。这些可能无法说明全部情况。开发者可能没有（例如）通过在 `Coach` 字段上设置外键约束来实现指导关系。他或她可能忽略了这个需求，或者决定通过其他方式（使用触发器或通过界面）来强制执行“教练必须是现有成员”这一约束。然而，即使
  `Member` 表的 `Coach` 字段上没有外键约束，如果我们想设计关于指导关系的可靠查询，仍然需要理解成员之间存在指导关系。


  在某些情况下，已实现的数据库可能与准确的数据模型没有太多共同之处。例如，如果高尔夫俱乐部数据库包含单独的成员、教练和管理者表，或者 `Member` 和 `Team`
  表之间的某个关系没有实现，那么数据库图和数据模型看起来就会大不相同。获得可靠信息的可能性就会很低。第 12 章会探讨这类问题，尽管除非进行重大重新设计，否则有时你能做的并不多。




  ### 涉及哪些表？


  一旦我们理解了数据库中的表以及它们之间的关系（概念上的以及通过外键存在的关系），我们就可以查看需要哪些表来提取所需的数据子集。考虑这样一个查询：“找出所有参加过利斯顿锦标赛的男性”。这句话包含几个关键词。名词通常是线索，告诉我们可能需要哪些表或字段。动词则常常帮助我们发现关系。让我们看看这些名词。“锦标赛”是一个重要线索，我们有一个
  `Tournament` 表，这是一个起点。单词“男性”是查询描述中的另一个名词。我们没有一个 `Men` 表，但我们确实有一个 `Member` 表，其中包含一个
  `Gender` 字段。


  因此，很明显，`Member` 和 `Tournament` 表将在我们的查询中发挥作用。现在我们需要弄清楚这两个表是如何关联的。图 11-4 显示了包含这两个表的
  SQL Server 数据库关系图部分。我们看到它们不是直接相关的，而是通过 `Entry` 表连接起来的。这很有道理，因为动词“参加”就在我们的查询描述中。


  ![A158240_2_En_11_Fig4_HTML.jpg](img/A158240_2_En_11_Fig4_HTML.jpg)


  图 11-4. 显示 Member 和 Tournament 表的部分数据库关系图


  所以，看起来至少有三个表会涉及我们的查询：`Member`、`Tournament` 和 `Entry`。然后，我们利用对关系运算符的理解来确定如何组合这些表。我们需要连接（join）还是联合（union），或者是这些运算符与其他关系运算符的某种组合？我们将在本章后续章节中探讨如何帮助决定合适的操作。


  ### 查看一些数据值


  从数据库检索信息的请求通常是以相当非正式且不精确的自然语言表述的。即使是一个简单的请求，比如“找出所有参加过利斯顿锦标赛的男性”，也有几点需要我们澄清。查看表中的实际数据有时会有所帮助。


  我们的查询实际上并不是“找出”这些男性，而是返回关于他们的一些信息。查看表中的数据值将帮助我们决定哪些信息可能是有用的。提问者大概希望看到这些男性的姓名。我们是否也需要
  ID？如果我们想要区分两个同名的成员，就需要 ID。


  问题中的某些词指的是什么可能并不总是那么清楚。什么是“利斯顿”锦标赛？利斯顿是一个锦标赛的名称、一种锦标赛的类型，还是一个地点？查看 `Tournament`
  表的几行数据可以帮助我们。我们看到 `TourName` 字段里这儿那儿都有值为“Leeston”的情况。有时，确定查询描述中不精确的词所指可能并不那么容易。可能需要与开发人员或用户交谈，以更好地理解他们想要检索什么信息。


  我们如何确定哪些成员是男性？幸运的是，`Member` 表有一个 `Gender` 列，看起来我们需要值为 `M` 的行。只选择值为 `M` 的行是否足够？会不会有些行的值是
  `m` 或 `Male`？我们将在下一章讨论如何处理数据不一致的问题。现在，我们假设男性由 `M` 表示。


  对于本示例中的简单查询，我们现在有了一个更精确的描述。它类似于：“检索 `Gender = ''M''` 且参加了 `TourName = ''Leeston''`
  的锦标赛的男性的 `MemberID`、`LastName` 和 `FirstName`。”


  你可能还会想到其他需要澄清的细节。询问为什么需要这些信息通常是个好主意。我们只是想找出哪些男性曾经去过利斯顿（因为我们想向其中一人询问有关高尔夫球场的问题），还是我们想知道我们的男性俱乐部成员参加利斯顿锦标赛的次数（因为我们对这个锦标赛在俱乐部成员中的受欢迎程度感兴趣）？正如你将在接下来的“保留适当的列”一节中看到的，这些问题的答案可能不同。


  ### 宏观方法


  我第一次尝试写查询时，很少能做到优雅或完整。对于像“找出所有参加过利斯顿锦标赛的男性”这样的查询，我可能会用两种方式来处理，这取决于我的灵感如何工作。一种方法是宏观法。如果我对如何组合表有点想法，我就会这样做。我将在“不知从何入手？”一节中介绍另一种策略，当我完全不知道从哪里开始时，我会使用它！


  在宏观方法中，我喜欢组合所有我需要的表并保留所有列，这样我就能看到发生了什么。我通常发现打开某种 SQL 窗口最容易，这样我可以尝试小的查询，看看中间结果对于回答整体问题是否有希望。


  让我们看看查询“找出所有参加过利斯顿锦标赛的男性”的宏观方法。我们确定需要三个表：`Member`、`Entry` 和 `Tournament`。这些表都通过外键连接，这通常意味着连接（join）会很有用。如果你不清楚连接是否是该查询所需要的，那么请参考本章后面“不知从何入手？”部分的方法。


  #### 组合表


  让我们假设，我们认为连接表对于这个关于男性参加利斯顿锦标赛的查询看起来是一个有希望的方法。你不必一次完成所有事情。从一些小查询开始，慢慢看看情况如何发展。


  要执行连接，我们需要找到用于连接的字段。如果需要复习关于连接兼容字段的知识，请回顾第 3 章。`Entry` 表对于此查询至关重要，因为它连接了 `Member`
  和 `Tournament` 表。`Entry` 表有一个名为 `TourID` 的外键字段，我们可以将其与 `Tournament` 表的主键连接起来。先做到这一步。


  ```

  SELECT * FROM

  Tournament t INNER JOIN Entry e ON t.TourID = e.TourID;

  ```


  图 11-5 显示了结果虚拟表的几行。


  ![A158240_2_En_11_Fig5_HTML.jpg](img/A158240_2_En_11_Fig5_HTML.jpg)


  图 11-5. 连接 Tournament 和 Entry 表的部分结果


  图 11-5 所示的结果当然很有帮助。我们可以看到参赛记录和相应锦标赛的名称。从前两行可以看出，成员 118 和 228 参加了利斯顿锦标赛。现在我们需要弄清楚
  118、228 和其他参加该锦标赛的成员是否是男性，并找到他们的名字。我们可以通过在 `MemberID` 字段上将图 11-5 中的虚拟表与 `Member`
  表连接来获取这些额外信息：


  ```

  SELECT * FROM

  (Tournament t INNER JOIN Entry e ON t.TourID=e.TourID)

  INNER JOIN Member m ON m.MemberID = e.MemberID;

  ```


  图 11-6 显示了结果。我在图 11-6 中没有包含所有列，因为列数很多。你很快就会明白为什么我喜欢尽可能长时间地保留所有列。


  ![A158240_2_En_11_Fig6_HTML.jpg](img/A158240_2_En_11_Fig6_HTML.jpg)


  图 11-6. 连接 Tournament、Entry 和 Member 表的部分结果（仅显示部分列）


  图 11-6 中显示的虚拟表拥有我们需要查找所需数据的全部信息。前两行显示成员 118 和 228 是女性。成员 286 的行（带有圆圈标记）看起来更有希望。我们该如何修改查询以找到合适的行子集和列子集？



  #### 找出所需的行子集


  从图 11-6 中我们可以看到，希望在连接结果中保留的行是`Gender`字段值为`M`且`TourName`字段值为`Leeston`的那些行。我们可以通过向之前的查询添加适当的`WHERE`子句来选择这些行：


  ```

  SELECT * FROM

  (Entry e INNER JOIN Tournament t ON t.TourID=e.TourID)

  INNER JOIN Member m ON m.MemberID = e.MemberID

  WHERE m.Gender = ''M'' AND t.TourName = ''Leeston'';

  ```


  图 11-7 展示了上述查询结果中的部分列。它包含四行：三行对应 Robert Pollard，一行对应 William Taylor。


  ![A158240_2_En_11_Fig7_HTML.jpg](img/A158240_2_En_11_Fig7_HTML.jpg)


  图 11-7.


  参加过 Leeston 锦标赛的男性（仅显示部分列）


  为什么 Robert Pollard 有三行？这些行除了`Year`字段的值外完全相同。Robert 在三个不同的年份参加了 Leeston 锦标赛。从图 11-6
  中可以很清楚地看到这一点，因为我们把`Year`列保留在了输出中。如果我们只保留姓名列，一开始可能会对 Robert Pollard 重复出现三次感到有点困惑。如何处理
  Robert Pollard 的重复取决于对初始问题的更清晰理解，这将在下一节中看到。


  #### 保留所需的列


  我们已经从大型连接中得到了所需的行子集。现在我们需要通过修改`SELECT`子句来仅保留所需的列，该子句当前返回所有列（`SELECT *`）。这并不总是像听起来那么简单。Robert
  Pollard 的三行数据给了我们一点提示，事情可能并不那么直接。我们有两种可能性。


  如果我们只想知道任何年份参加过锦标赛的人，那么我们只需要唯一的姓名 Robert Pollard 和 William Taylor，或许还需要他们的 ID 号。按如下方式修改`SELECT`子句将提供该结果：


  ```

  SELECT DISTINCT m.MemberID, m.LastName, m.FirstName

  FROM ...

  ```


  如果问题的目的是找出男性参加 Leeston 锦标赛的频率，那么我们需要保留所有条目。在这种情况下，保留年份以区分不同的行可能是有用的，如下所示：


  ```

  SELECT m.MemberID, m.LastName, m.FirstName, e.Year

  FROM ...

  ```


  #### 考虑使用中间视图


  用于连接`Entry`、`Member`和`Tournament`表的 SQL 很可能是许多关于参赛情况查询的基础。例如，以下问题都需要连接`Member`、`Entry`和`Tournament`表：


  *   青少年会员会参加公开赛吗？

  *   William Taylor 在 2015 年参加了哪些锦标赛？

  *   2013 年会员参加社交锦标赛的平均次数是多少？


  由于我们很可能多次使用这个大型连接，创建一个视图会很方便。视图是一个指令，说明如何创建一个临时表，该表可以在其他查询中使用。以下是尝试创建保留所有连接字段的视图的
  SQL：


  ```

  --第一次尝试（未成功）

  CREATE VIEW AllTournamentInfo AS

  SELECT * FROM

  (Entry e INNER JOIN Tournament t ON t.TourID=e.TourID)

  INNER JOIN Member m ON m.MemberID = e.MemberID;

  ```


  按目前这样，这个查询在大多数 SQL 版本中无法运行。这是因为视图中会有同名的字段；例如，会有两个名为`MemberID`的字段：一个来自`Entry`表，一个来自`Member`表。


  创建视图时，所有字段名必须唯一。视图不会使用别名来区分结果表中的列。`SELECT`子句中的`*`需要修改为列出所有字段名。我们需要要么只包含重名字段中的一个（`MemberID`和`TourID`），要么重命名那些重复的字段（例如，`SELECT
  m.MemberID AS MMember`，`e.MemberID AS EMember`）。这有点繁琐，但如果你创建的视图可能会多次使用，那么付出这番努力是值得的。


  一旦我们有了视图`AllTournamentInfo`，就可以像使用其他任何表一样在查询中使用它。要找出参加过 Leeston 锦标赛的男性姓名，我们可以像这样使用该视图：


  ```

  SELECT DISTINCT LastName, FirstName

  FROM AllTournamentInfo

  WHERE Gender = ''M'' AND TourName = ''Leeston'';

  ```


  ### 识别问题中的关键词


  宏观方法假设我们已经决定了如何组合将对查询有贡献的表。有时，很明显某些表需要被连接。其他时候，可能一开始完全不清楚。在本节中，我们将看一些经常出现在问题中的关键词，这些词可以提供关于需要哪些关系操作的线索。如果这些都没有帮助，请记住我们还有接下来的“不知从何入手？”部分！



  ### SQL 查询条件分析


  #### And, Both, Also


  `And` 和 `also` 这两个词在解读查询时可能具有误导性，我们将在下一章进一步探讨这一点。在本节中，我们将研究那些需要同时满足两个条件的查询。需要满足两个条件的查询分为两类：一类可以通过包含布尔
  `AND` 运算符的简单 `WHERE` 子句执行，另一类则需要使用交集（`INTERSECT`）或自连接（`self join`）。


  为了判断一个查询是否真的需要满足两个条件，我通常会查看一个自然语言语句，看看是否可以用单词 `both` 来连接这些条件。考虑以下示例：


  *   查找年轻的男孩。（既是男性又是年轻人？是的。）

  *   查找参加了第 24 和 38 号锦标赛的成员。（同时参加了两场锦标赛？是的。）

  *   查找妇女和儿童。（既是女性又是儿童？不是。）


  最后一个查询有时会让人困惑。虽然它包含了单词 `and`，但“妇女和儿童”的通常含义并非指既是女性又是儿童的人（那是女孩）。相反，这个短语的意思是任何是女性 **或**
  是儿童的人（尤其是在救生艇场景下）。


  图 11-8 中的图表是可视化自然语言单词 `both` 的真正含义是“两者都”还是“其一”的有效方式。圆圈代表两个集合：女性和儿童。图 11-8a 显示了并集（`UNION`，只需满足一个条件），图
  11-8b 显示了交集（`INTERSECT`，必须满足两个条件）。


  ![A158240_2_En_11_Fig8_HTML.gif](img/A158240_2_En_11_Fig8_HTML.gif)

  图 11-8. 可视化需要的是并集还是交集


  当需要满足两个条件时，我们是在处理两个数据组的交集，如图 11-8b 所示。这并不一定意味着我们必须使用 `INTERSECT` 关键字。我发现以下问题有助于决定下一步该怎么做：


  > 我是否需要查看多行数据来判断是否满足了两个条件？


  考虑查找年轻男孩的查询。这将需要使用 `Member` 表。我们能否查看单行数据并确定该成员既是年轻人又是男孩？我们可以在图 11-9 中看到，这两条信息都可以在单行中获得。


  ![A158240_2_En_11_Fig9_HTML.jpg](img/A158240_2_En_11_Fig9_HTML.jpg)

  图 11-9. 关于会员类型和性别的信息可在单行中获得


  在这种情况下，我们可以使用一个简单的 `SELECT` 操作，配合布尔 `AND` 来检查两个条件，如第 2 章所述：


  ```

  SELECT * FROM Member m

  WHERE m.Gender = ''M'' AND m.MemberType = ''Junior'';

  ```


  现在考虑一个不同类型的查询。如何查找同时参加了第 24 和 36 号锦标赛的成员？为此，我们需要查看 `Entry` 表（如果我们想要姓名，可能还需要与 `Member`
  表连接）。正如我们在图 11-10 中所看到的，我们无法通过查看单行数据来检查某个成员（例如，成员 228）是否同时参加了两场锦标赛。


  ![A158240_2_En_11_Fig10_HTML.jpg](img/A158240_2_En_11_Fig10_HTML.jpg)

  图 11-10. 需要调查多行数据来确认两场锦标赛的参与情况


  当我们需要满足两个条件，并且需要查看表中的多行数据时，我们可以使用自连接（第 5 章讨论）或交集（第 7 章讨论）。


  如果使用自连接，查询如下：


  ```

  SELECT DISTINCT e1.MemberID

  FROM Entry e1 INNER JOIN Entry e2 ON e1.MemberID = e2.MemberID

  WHERE e1.TourID = 24 AND e2.TourID = 36;

  ```


  一个使用 `INTERSECT` 关键字但产生相同输出的查询是：


  ```

  SELECT MemberID FROM Entry WHERE TourID = 24

  INTERSECT

  SELECT MemberID FROM Entry WHERE TourID = 36;

  ```


  #### Not, Never


  以下是一些涉及单词 `not` 或 `never` 的查询示例：


  *   查找不是老年人的成员。

  *   查找不在团队中的成员。

  *   查找从未参加过锦标赛的成员。


  通常当人们在查询描述中看到 `not` 时，他们会立即想到在 `WHERE` 子句中使用布尔 `NOT` 或 `<>` 运算符。这对某些查询是适用的，但对另一些则会失败。与上一节类似，我发现以下测试有助于理解查询的类别。


  > 我是否需要查看多行数据来判断某个条件不成立？


  对于前面要点列表中的前两个查询，我们可以查看 `Member` 表中的一行数据，并判断该成员是否满足条件。在第一个查询中，`WHERE` 子句中的条件可以是 `NOT
  MemberType = ''Senior''` 或 `MemberType <> ''Senior''`。要查找不在团队中的成员，我们希望 `Team` 字段为空，因此类似
  `WHERE Team IS NULL` 的子句即可实现。


  要查找从未参加过锦标赛的成员，我们需要哪些表？我们肯定需要 `Entry` 表。我们可以通过找到一行包含他或她的 `MemberID` 值来判断该成员是否参加过锦标赛。要查看他或她
  **没有** 参加过锦标赛，我们需要查看 `Entry` 表中的每一行数据。我们还必须查看 `Member` 表，因为那些从未参加过锦标赛的成员根本不会出现在
  `Entry` 表中。


  在这种情况下，像图 11-11 那样从集合的角度思考会很有帮助。


  ![A158240_2_En_11_Fig11_HTML.jpg](img/A158240_2_En_11_Fig11_HTML.jpg)

  图 11-11. 通过集合运算查找从未参加锦标赛的成员


  在第 7 章中，我们学习了如何使用过程方法和 `EXCEPT` 关键字来表示两个集合之间的差集。以下查询将返回从未参加过锦标赛的成员的 ID：


  ```

  SELECT MemberID FROM Member

  EXCEPT

  SELECT MemberID FROM Entry;

  ```


  如果我们从结果方法的角度思考，可以描述返回特定 `MemberID` 的条件。以下查询是使用 `NOT IN` 查找从未参加过锦标赛的成员 ID 的示例：


  ```

  SELECT m.MemberID FROM Member m

  WHERE m.MemberID NOT IN

  (SELECT e.MemberID FROM Entry e);

  ```


  第 7 章有很多关于如何使用此类嵌套查询的示例。


  #### All, Every


  无论何时你在查询描述中看到单词 `all` 或 `every`，都应该立即想到除法运算符（`division operator`）。以下是一些此类查询的例子：


  *   查找参加了所有公开锦标赛的成员。

  *   是否有人指导过所有的年轻人？


  执行这些类型查询的 SQL 示例在第 7 章中有详细解释。



  ### 无从下手？


  现在，让我们来看这样一种情况：我们充分理解了自然语言查询的意图，并且对涉及哪些表有了一定概念。我们已经检查了一些关键词，但仍然感到困惑。接下来该怎么办？这种情况并不少见（我经常遇到），所以放松一点。


  当我感到无从下手时，我会把集合操作和 SQL 统统抛在脑后。我不再去想表、外键、连接等等。相反，我会打开我认为回答问题可能需要用到的表，查看其中的一些数据。我尝试找到一些应该是查询会检索出的例子。然后，我尝试写下使这些特定数据可以被接受的条件。


  这就是**结果导向法**，描述了查询返回的行应当遵循的条件。如果你在决定操作表的可能操作（即**过程导向法**）时遇到困难，这是一个极好的推进方法。


  让我们尝试一个我最初想到时有点被难住的查询：“哪些球队的教练是他们的管理者？”这里描述的步骤真的能帮上忙。


  #### 找到一些有用的表


  让我们看看查询“哪些球队的教练是管理者？”中的关键词。我们有“球队”、“教练”和“管理者”这些名词。我们有一张名为 `Team` 的表，而 `Coach` 和
  `Manager` 分别是 `Member` 表和 `Team` 表中的字段。所以，`Team` 表和 `Member` 表看起来是一个很好的起点。


  #### 尝试手工回答问题


  接下来，看看表中的数据，思考你将如何判断一支球队的教练是否是其管理者。图 11-12 展示了这两个表的一些相关列。你能找到一支满足条件的球队吗？


  ![A158240_2_En_11_Fig12_HTML.jpg](img/A158240_2_En_11_Fig12_HTML.jpg)


  图 11-12.


  如何判断一支球队的教练是否也是管理者？


  我们可以很容易地找到两位球队管理者的 ID。他们是 `Team` 表中 `Manager` 列的值（239 和 153）。现在，我们如何检查这些成员是否是教练？查看
  `Member` 表，我们看到教练位于 `Coach` 列中。我们需要检查这两位管理者中是否有人出现在 `Coach` 列中。成员 153 确实出现在 `Coach`
  列中，所以（TeamB）是由一名教练管理的。


  #### 写下对检索结果的描述


  图 11-12 说明了我们如何确定 TeamB 的教练是其管理者。我们现在需要写下导致该结论的逻辑描述。在这里，我喜欢用手指指向相关的行来更轻松地描述查询，如图
  11-13 所示。


  ![A158240_2_En_11_Fig13_HTML.jpg](img/A158240_2_En_11_Fig13_HTML.jpg)


  图 11-13.


  为行命名以帮助描述所需数据


  我们将检查每一支球队，以决定它是否应该被检索。在图 11-13 中，这由标记为 `t` 的手指表示，它会依次访问每一行。我们可以将当前行是否符合标准描述如下：


  > 如果存在 `Member` 表中的一行 `m`，其教练值 `m.Coach` 与球队的管理者 `t.Manager` 相同，那么我将输出 `Team` 表中行
  `t` 的 `TeamName`。


  我们现在几乎可以直接将此翻译成 SQL，使用一个嵌套查询（在第 4 章讨论）。一个可能的查询是：


  ```sql

  SELECT t.TeamName FROM Team t

  WHERE EXISTS

  (SELECT * FROM Member m WHERE m.Coach = t.Manager);

  ```


  #### 有替代方案吗？


  初次尝试的查询不一定是最优雅的。毕竟，我们遵循这条路径正是因为一开始被难住了。这对于查询的执行可能不是问题，因为优化器可能会找到一个高效的过程。然而，一个不够优雅的
  SQL 语句可能会让你和他人在以后难以理解。遵循手工求解查询并描述条件的技术，通常能帮助你理解自己试图做什么。这往往会让查询看起来比最初想象的容易得多。


  在按照上一节的描述进行了第一次查询尝试后，我们可能会意识到可以这样想：“管理者只需要在教练集合中。”我们可以通过以下查询轻松找到教练的 ID：


  ```sql

  SELECT m.Coach FROM Member m;

  ```


  然后，我们可以在一个嵌套查询中使用它，如下所示：


  ```sql

  SELECT t.TeamName FROM Team t

  WHERE t.Manager IN

  (SELECT m.Coach FROM Member m);

  ```


  对我来说，前面的查询比之前的那个更简单易懂，尽管它们的结果是等价的。


  我们也可以这样表述图 11-13 中说明的条件：


  > 如果我在 `Team` 表中有行 `t`，在 `Member` 表中有行 `m`，那么如果 `t.Manager = m.Coach`，我将输出 `Team`
  表中行 `t` 的 `TeamName`。


  以下是上述句子翻译成的 SQL：


  ```sql

  SELECT t.TeamName FROM Team t, Member m

  WHERE t.Manager = m.Coach;

  ```


  前面的查询可以重写为一个连接：


  ```sql

  SELECT t.TeamName

  FROM Team t INNER JOIN Member m ON t.Manager = m.Coach;

  ```


  就我个人而言，我不觉得连接操作对于这个查询特别直观。我怀疑其他人看到这个查询时，不会很快理解它的目的。


  鉴于有几种方式来表述这个查询，如果你认为效率可能很重要（在此例中不太可能），检查它们的相对效率会很有用（如第 10 章所讨论）。如果我们在连接查询的 `SELECT`
  子句中添加一个 `DISTINCT` 短语，那么所有四种替代方案都会产生相同的结果。对于 SQL Server 2012，每个查询都有相同的执行计划，因此它们在底层都是以完全相同的方式执行的。


  ### 检查查询


  我们已经编写了一个查询，运行了它，并检索了一些结果。一切都很好吗？不一定。正如查询的初次尝试可能不优雅一样，它们也可能不正确。错误可能源于查询语法中的简单错误。这些通常很容易发现和纠正。然而，由于对问题或数据的微妙误解而导致的错误可能更难发现。


  我无法提供一个万无一失的方法来检查你的查询是否正确，但我可以给你一些发现潜在错误的想法。基本上，它们归结为检查你的结果中是否有额外的、不正确的行，以及检查你没有遗漏任何行。在本节中，我们将探讨发现查询可能存在问题的方法。在下一章，我们将探讨可能导致错误的一些常见错误。


  #### 检查一条应该被返回的行


  对你的查询应该返回多少行（零行、一行、几行或很多行）有一个大致概念是个好主意。如果你得到的结果数量令人惊讶，那可能是出错的线索。接下来，看看你的数据，确定一条应该被查询返回的记录或行。在我们关于教练是管理者的球队的例子中，我们可以检查各个表，找到一支满足查询的球队。在图
  11-13 中，我们看到 TeamB 满足条件，所以检查一下这个球队是否在输出结果中。


  记住，有些查询可能完全合理地没有输出。例如，在任何特定时间，基于我们拥有的数据，没有任何球队由教练管理是完全可能的。然而，你的查询必须在所有情况下都能工作。如果可能的话，制作表的副本，修改数据以使某一行符合条件，并检查它是否被正确返回。



  #### 检查不应被返回的行


  与检查应被返回的行类似，浏览数据并找出一个没有教练作为经理的团队。TeamA 的经理（成员 239）并未作为教练出现在`Member`表中，因此请确保该团队未包含在你的输出中。再次强调，如果真实数据无法覆盖所有可能性，使用一些虚拟数据来检查是个好主意。


  #### 检查边界条件


  如果一个查询包含任何类型的数字比较，那么除了检查应该返回的数据和不应该返回的数据之外，我们还应该检查边界情况。考虑一个查询，我们想找出加入俱乐部超过十年的人。为了确保正确性，我们需要检查三种可能性：


  *   确保对于会员年限少于 10 年的人（例如，8 年会龄），没有记录被返回。

  *   确保一个已加入俱乐部 12 年的人，其记录确实被检索到。

  *   检查一个会龄恰好为 10 年的人。


  最后一个边界条件总是很棘手。这归结为对自然语言问题的解读。“超过十年”是否包括那些恰好在十年前那个季度加入的人？嗯，可能包括，因为一个季度涵盖了一整年。对于这类数字比较，决策在于我们在选择条件中使用`>`还是`>=`。如果对查询意图有任何疑问，向用户确认是很重要的。


  在表中找到恰好处于边界上的数据并不总是容易的。然而，通常可以修改查询中的数值以匹配数据。找到一个特定成员，并将你查询中比较的值改为匹配他们的会龄。如果 Harry
  是 16 年前加入的，将查询改为与数值 16 进行比较，并查看 Harry 是否如你所预期的那样被包含（或未被包含）。


  另一个重要的边界条件，特别是对于聚合和计数（在第 8 章中介绍），是值 0。考虑这样一个查询：“找出参加过少于六个锦标赛的成员。” 对`Entry`表进行分组计数肯定会返回一些行，我们可以检查那些参加次数少于、多于或恰好六次的人。然而，那些从未参加过任何锦标赛的成员呢？他们根本不会出现在`Entry`表中，因此会从结果中缺失。所以，每当涉及聚合时，总要检查计数为
  0 时会发生什么。例如，你的查询是否会返回那些没有参加过任何锦标赛的成员？


  #### 检查空值


  请注意，你正在检查的某些值可能是空值（在第 2 章中讨论）。你关于团队经理的查询如何处理`Manager`字段为空的情况？用一些虚拟数据试试看。当我们运行关于会龄的查询时，如果`JoinDate`字段中存在空值，我们期望（或希望）发生什么？


  ### 总结


  开始查询的第一条规则是不要惊慌。下一条规则是小步前进，并查看中间输出，以判断到目前为止的操作是否对你有帮助。在初始查询中保留尽可能多的列，以便你可以检查自己是否理解正在发生的事情。


  图 11-14 总结了一些在刚开始处理查询时可以采取的步骤。该图并未涵盖整个过程，但你应该能够利用这些步骤做出合理的开始。更多帮助请参考相关章节。


  ![A158240_2_En_11_Fig14_HTML.gif](img/A158240_2_En_11_Fig14_HTML.gif)


  图 11-14. 帮助你开始处理棘手查询的一些步骤


  '
- '# 12. 常见问题


  在本书中，我们探讨了处理各类查询的不同方法。然而，即使一个查询检索出了一些看起来有效的行，也可能并非万事大吉。在上一章中，我们审视了检查输出的重要性，以确认（至少部分）预期的行被检索出来，同时也检查并确保（至少部分）不正确（或不相关）的行没有被返回。


  查询可能遇到的问题不仅仅是 SQL 语句语法错误（尽管这当然可能发生）。表设计或数据值的问题也会影响查询的准确性。在本章中，我们将探讨一些常见的设计和数据问题，以及一些最常见的语法错误。


  ### 糟糕的数据库设计


  良好的数据库设计对于能够提取准确信息至关重要。不幸的是，你有时会面临设计糟糕且维护不善的数据库。通常你能做的不多。有时你可以提取出看起来像是所需的信息，但应该附带一个警告，指出底层数据可能不一致。在本节中，我们将看一些常见问题以及如何缓解它们。



  #### 未规范化的数据


  最常见的数据设计错误之一是使用未规范化的表。我们在第 1 章中已经看过这样的例子：本应分为两个表——一个用于存储会员信息，另一个用于存储会费等会员资格信息——却将所有这些数据都存储在单个表中。如图
  12-1 所示，这会导致费用信息被重复存储多次。


  ![A158240_2_En_12_Fig1_HTML.jpg](img/A158240_2_En_12_Fig1_HTML.jpg)

  图 12-1. 一个包含费用信息的、未规范化的 `会员` 表


  那么，现在如果我们被要求查找高级会员的费用会怎样呢？这里的查询将会返回两个值：300 和 250。


  ```sql

  SELECT DISTINCT Fee

  FROM Member

  WHERE MemberType = ''Senior''

  ```


  虽然查询返回的两个值可能令人惊讶，但查询本身或其结果并没有错。Brenda Nolan 的值与其他高级会员不一致，导致我们得到了额外的费用结果。这个值可能是一个输入错误，或者表示
  Brenda 享受了某种折扣，又或者它是去年尚未更新的费用实例。无论哪种情况，设计上都存在问题。设计应该允许为每个等级的常规费用进行一致地记录，并在必要时允许存储额外的折扣方案。此时，除了重新设计表结构，我们别无他法，只能返回已记录在高级会员名下的费用列表。重要的是理解其背后的根本问题。


  你可能遇到的另一个问题是，单个表存储了多值数据。我们一直在使用的俱乐部表版本允许一个会员只属于一个团队。俱乐部可能会发展出多种不同类型的团队（俱乐部间团队、社交团队、双人组、四人组等），会员可以同时属于多个团队。当需要为会员记录第二个团队时，一个常见的短期解决方案是在现有表中添加另一个
  `团队` 列。图 12-2 展示了 `会员` 表可能如何演变为允许会员关联最多三个团队。


  ![A158240_2_En_12_Fig2_HTML.jpg](img/A158240_2_En_12_Fig2_HTML.jpg)

  图 12-2. 为会员存储多个团队的糟糕表设计


  现在，假设我们被要求查找在 `团队 B` 中的会员。Brenda 在 `团队 1` 列中有 `团队 B`，Helen 在 `团队 2` 列中有 `团队 B`，Thomas
  在 `团队 3` 列中有 `团队 B`。我们需要检查每个团队列是否存在 `团队 B`。这并不困难，如下列查询所示：


  ```sql

  SELECT * FROM Member

  WHERE Team1 = ''TeamB'' OR Team2 = ''TeamB'' OR Team3 = ''TeamB'';

  ```


  虽然我们可以从图 12-2 的表中提取所需信息，但这种设计会带来问题。如果我们遇到类似“查找同时在 `团队 A` 和 `团队 B` 中的会员”或“查找在两个以上团队中的会员”这样的查询，我们就会遇到麻烦。你或许能设计出回答这些问题的查询，但它们会很笨拙。在尝试满足此类请求之前，我会要求对数据库进行适当重新设计。如果你遇到阻力，可以问他们：如果一个会员属于四个团队甚至二十个团队，他们会怎么办。


  如果会员可以属于多个团队，那么我们面对的就是一个 `多对多` 关系，这应该在关系数据库中使用一个中间的 `会员资格` 表¹ 来表示——类似于图 12-3 中的表。


  ![A158240_2_En_12_Fig3_HTML.jpg](img/A158240_2_En_12_Fig3_HTML.jpg)

  图 12-3. 记录会员与团队之间关系的 `会员资格` 表


  图 12-3 中的 `会员资格` 表记录了会员与团队之间的关系，与记录会员和锦标赛关系的 `参赛` 表非常相似。`会员资格` 表需要与 `会员` 表进行连接才能找到关联的姓名，但一旦完成连接，我们就能得到与图
  12-2 中相同的信息。有了新的 `会员资格` 表，我们现在就可以使用前面章节描述的所有关系运算，轻松地回答诸如“谁在 `团队 A` 和 `团队 B` 中？”以及“谁在三个或更多团队中？”这样的问题。


  我们可以用以下 SQL 代码创建一个 `会员资格` 表。该表仅包含两个外键，分别指向现有的 `会员` 和 `团队` 表，这些字段也共同构成一个连接主键。


  ```sql

  CREATE TABLE Membership(

  MemberID INT FOREIGN KEY REFERENCES Member,

  Team CHAR(20) FOREIGN KEY REFERENCES Team,

  PRIMARY KEY (MemberID, Team) );

  ```


  如果你不介意进行一些手动操作，你可以使用类似下面这样的重复更新查询来填充新的 `会员资格` 表：


  ```sql

  INSERT INTO Membership (MemberID, Team)

  SELECT MemberID, ''TeamA''

  FROM Member

  WHERE Team1 = ''TeamA'' OR Team2 = ''TeamA'' OR Team3 = ''TeamA'';

  ```


  该查询找出每个在 `团队 A` 中的会员，并在 `会员资格` 表中创建相应的行。如果团队数量不多，你可以手动为每个团队（`团队 A`、`团队 B` 等）修改查询的第二行和最后一行，从而相当快速地填充新的
  `会员资格` 表。然后，你需要从图 12-2 的 `会员` 表中删除 `团队` 列，这样数据库将得到极大改进。



  #### 无主键的表


  上一节举例说明了如果底层数据库包含不合适的表，你可能会遇到的问题。有时你会发现表结构是正确的，但却没有设置合适的主键或外键约束。在这种情况下，底层数据值很可能不一致。虽然你的查询语句可能构造正确，但其结果将不可靠。本节将介绍如何使用查询来发现数据中可能存在的一些不一致性。


  假设图 12-3 中的 `Membership` 表在创建时没有设置主键。这将允许表中存在重复行。例如，我们可能会有两行完全相同的记录，都表示会员 153 在
  `TeamB` 中。一个用于统计 `TeamB` 成员数量的查询将产生错误的结果。


  如果你尝试在已存在重复记录的情况下添加主键，系统会报错。这正是发现问题的一种方法！在添加主键之前，你需要先找出重复的行，并研究如何解决问题。一个便捷的找出重复值的方法是，在应该是唯一的字段上执行
  `GROUP BY` 查询（参见第 7 章），并使用 `HAVING` 子句找出那些出现两次或以上的记录。以下查询将为我们潜在的主键字段 `MemberID`
  和 `Team` 返回重复值：


  ```sql

  SELECT MemberID, Team, Count(*)

  FROM Membership

  GROUP BY MemberID, Team

  HAVING Count(*) > 1;

  ```


  如果表中除了主键字段外还有其他字段，你需要手动检查这些列中的值，以决定应该删除哪一行。只有主键字段的 `Membership` 表则会导致另一个问题。我们如何只删除会员
  153 在 `TeamB` 中的那一行的一个副本呢？因为整行数据都是相同的，我们无法区分它们，所以任何删除一行的查询都会把两行都删除。你的软件可能提供类似表格的界面，允许你只删除其中一行，但如果没有，你可能不得不删除两行然后再手动添加回一条记录。如果存在大量重复值，那么另一种解决方法是创建一个新表，然后仅从原表中插入不重复的值。以下查询展示了如何填充新表
  `NewMembership`：


  ```sql

  INSERT INTO NewMembership

  SELECT DISTINCT MemberID, Team

  FROM Membership;

  ```


  之后，你需要移除所有引用旧表的外键约束，删除旧表，重命名新表，并重新创建外键。确保从一开始每张表都有主键会容易得多！


  #### 缺少外键的表


  另一个问题是 `Membership` 表（如图 12-3 所示）没有外键约束。然后我们可能会遇到这样的问题：存在一行记录表示会员 1118 在 `TeamA`
  中，但在 `Member` 表中却找不到会员 1118。如果数据存在这类问题，我们将无法添加外键约束。


  有几种方法可以在 `Membership` 表中找出那些在 `Member` 表中没有匹配条目的 `MemberID` 值。一种方法是使用嵌套查询（在第 4 章讨论），如下所示：


  ```sql

  SELECT ms.MemberID FROM Membership ms

  WHERE ms.MemberID NOT IN

  (SELECT m.MemberID FROM Member m);

  ```


  找到不匹配的 `MemberID` 值后，我们必须判断这是输入错误，还是 `Member` 表中缺失了该会员。


  当数据处于一致状态时，就可以为 `Membership` 表添加外键约束，以确保它保持这种状态。以下查询将向 `MemberID` 字段添加该约束：


  ```sql

  ALTER TABLE Membership

  ADD FOREIGN KEY (MemberID)

  REFERENCES Member;

  ```


  #### 两个表中的相似数据


  有时，数据库中可能包含不必要的多余表，这会导致问题。对于我们的俱乐部数据库，一个例子可能是为教练或经理单独设立一张表，如图 12-4 所示。其理由可能是这张额外的表能更方便地创建教练及其电话号码列表（否则需要自连接或嵌套查询）。


  ![A158240_2_En_12_Fig4_HTML.jpg](img/A158240_2_En_12_Fig4_HTML.jpg)

  *图 12-4. 为教练增设的表可能导致数据不一致*


  这张多余的表不可避免地会带来问题。在图 12-4 中，我们已经看到 William Cooper 的电话号码数据不一致。唯一的真正解决办法是去掉这张多余的表。


  如果像图 12-4 这样的额外表的目的不明确，我们可以使用集合运算来调查哪些会员出现在各个表中。交集运算符会找出同时存在于两个表中的人的行记录，而差集运算符会找出只存在于一个表而不在另一个表中的人。这可能有助于理解这些表所代表的内容。


  一旦设计正确，创建一个显示教练信息的视图将对那些不想每次查询教练信息时都创建自连接的用户有所帮助。以下查询可以实现这一点：


  ```sql

  CREATE VIEW CoachInfo AS

  SELECT * FROM Member

  WHERE MemberID IN

  (SELECT Coach FROM Member);

  ```




  #### 不恰当的类型


  在表中使用不恰当的类型创建字段是另一个可能导致查询看起来表现异常的问题。我曾见过整个数据库的所有字段都是默认文本类型。


  字段类型错误意味着数据会缺失大量有效性检查。例如，如果我们的`Member`（会员）表全部使用文本字段，最终可能会在`Handicap`（差点）列中出现像 "16a"
  或 "1o" 这样的值（该列本应只包含整数），或者在`Coach`（教练）列中出现像 "Brenda" 这样的文本（该列本应只包含会员 ID）。


  除了输入值错误之外，不恰当的类型还会引发其他问题。每种类型都有其自身的值排序规则。文本类型按字母顺序排序，数字按数值排序，日期按时间顺序排序。显然，不同的排序方式在我们向查询中添加`ORDER
  BY`子句时会成为问题。如第 2 章所述，包含数字的文本字段将按字母顺序排序，产生诸如 "1"、"15"、"109"、"20"、"245" 和 "33" 这样的顺序。


  错误的类型在进行比较时也会导致问题。如果我们要求比较值，所使用的比较方式将取决于所涉及的具体字段类型的排序方式。对于文本字段中输入的数字，根据前文所述的排序规则，我们会得到诸如
  `"109" < "15"` 或 `"33" > "245"` 这样的比较结果。例如，如果我们查询差点小于 5 的人员，这将导致一些奇怪的输出。要弄清楚问题所在可能很困难，因为查询语法是正确的，数据看起来也没问题。深入检查背后的数据类型可能并非显而易见。


  可以更改现有表中列的类型，但我觉得这有点令人担心。例如，如果你从文本类型更改为数字类型，"10" 可能没问题，但 "1o" 会导致错误。我倾向于采用更保守的方法：我使用适当的类型创建一个新表，然后借助转换函数插入旧值。下面的查询展示了我们如何用
  ID 和姓名，并将`Handicap`列的旧文本值转换为数值，来填充一个新表`NewMember`：


  ```sql

  INSERT INTO NewMember (MemberID, LastName, FirstName, Handicap)

  SELECT MemberID, LastName, FirstName, CONVERT(INT, Handicap)

  FROM Member;

  ```


  这样，如果转换导致意外结果，我们仍然保留有原始数据。


  ### 数据值问题


  即使数据库设计良好，我们仍然面临已输入数据准确性的问题。作为查询设计者，您无需为某些准确性问题负责。如果一个人的地址输入错误，除了等待邮件被退回发件人之外，几乎没有人能找到或修复这个问题（除了等待邮件被退回发件人）。然而，您可以注意到很多事情，即使无法解决问题，至少也可以发出一些警报。此外，有时通过谨慎使用更新查询，可以修复一些有问题的数据。


  #### 意外的空值


  空值在数据库中可能引发各种麻烦。真正的问题（如第 2 章所讨论）在于，空值可能意味着值未知，也可能意味着该值不适用于特定记录。如果我们俱乐部的某个会员的`Team`（球队）字段为空，可能意味着他不属于任何球队，也可能意味着他在某个球队但我们尚未记录是哪个。与其他数据问题一样，对此我们能做的有限。然而，对于像`Gender`（性别）字段这样的情况，我们知道对于高尔夫俱乐部，所有会员都需要标识为男性或女性。空值意味着一些会员的性别未被记录。出生日期等字段也是如此。


  例如，如果您被要求提供俱乐部中男性的名单，通常最好同时运行另一个查询，查找那些`Gender IS Null`（性别为空）的行。然后您可以告诉您的客户：“这些是男性，这些是我不确定的会员。”
  这种方法有助于避免收到未出现在名单上的委屈绅士的来信。


  请注意以下两种计数查询的区别：`COUNT(*)` 和 `COUNT(Gender)`。前者将计算数据库中的所有行；后者将计算所有性别值非空的行。在理想的高尔夫俱乐部中，这两者应该是相同的。但在实践中，它们可能并不相同。


  #### 不正确或不一致的拼写


  任何数据库在某些时候的数据中都会出现拼写错误。Philips 先生可能会因为各种原因显示为 Phillips、Philipps 或 Philps，原因包括申请表上难以辨认的手写到简单的数据录入错误。如果您正在尝试查找有关
  Philips 先生的信息，并且怀疑可能有问题，可以使用函数或通配符来查找类似的数据。不同的产品有不同的实现方式。


  我们可以使用关键字`LIKE`来查找相似的拼写。通配符符号 `%`（在 Access 中是 `*`）代表任何字符组。以下查询可以检索到我们 Philips 的几种拼写变体：


  ```sql

  SELECT * FROM Member

  WHERE LastName LIKE ''Phil%'';

  ```


  另一个涉及不正确或不一致拼写的问法出现在您可能期望某个字段有特定值集或类别时。例如，在我们的`Member`表中，我们可能期望`Gender`列有值`M`或`F`，但可能会出现个别`male`或`m`的值。在`MemberType`（会员类型）列中，我们期望`Junior`（初级）、`Senior`（高级）或`Associate`（准会员），但实践中可能会发现`jnior`或`senor`。如果表在设计时设置了适当的检查约束或外键，这不会成为问题。然而，通常这些约束并不存在，因此使用如下查询检查有问题的条目是很有用的：


  ```sql

  SELECT * FROM Member

  WHERE MemberType NOT IN (''Senior'', ''Junior'', ''Associate'');

  ```


  找到不符合预期的行后，可能可以修改数据，然后应用检查约束以保持其一致性。例如，以下查询将在`MemberType`字段上应用一个约束，使得只能输入有效的值：


  ```sql

  ALTER TABLE Member

  ADD CONSTRAINT Chk_type CHECK(MemberType IN

  (''Senior'', ''Junior'', ''Associate''));

  ```



  ### 文本字段中的多余字符


  当尝试检索与某个文本值匹配的数据时，一个常见的问题是数据中混入了前导或尾随空格以及其他不可打印字符。


  例如，如果我们的数据库中有类似 `FirstName` 的字段，我们可能会发现名字前后有一些空格。有时，如果指定了字符字段的特定长度，可能会自动添加尾随空格。如果一行记录的名字被存储为
  `''  Dan  ''`，那么使用条件 `FirstName = ''Dan''` 的 `WHERE` 子句可能无法检索到该行。大多数数据库软件都提供了多种处理文本的函数。通常会有各种形式的修剪函数，用于删除文本值开头和结尾的空格。请查阅您的文档以了解您的实现提供了哪些函数。


  下面的 SQL 语句中的 `RTRIM()` 函数将在进行比较之前，去掉 `FirstName` 值右侧的任何空格：


  ```

  SELECT * FROM Member

  WHERE RTRIM(FirstName) = ''Dan'';

  ```


  前面的查询并不会永久地从字段中删除空格。`RTRIM()` 函数只是为了进行比较而返回一个不带空格的值。但是，您可以使用更新查询来永久修复其中一些数据不一致的问题。接下来的查询展示了如何确保
  `Member` 表的 `FirstName` 列中的任何值都没有前导 (`LTRIM()`) 或尾随 (`RTRIM()`) 空格。它本质上是用修剪后的值替换所有值：


  ```

  UPDATE Member

  SET FirstName = RTRIM(LTRIM(FirstName));

  ```


  一个更令人困扰的问题是那些看起来像空格，但实际上是其他空白字符的字符。这有时发生在数据被剪切、粘贴或在各种产品和不同实现之间移动时。这可能需要一些功夫才能追踪出来。


  另外两个数据录入陷阱是数字 0（零）和 1（一）被输入，而不是字母 o（哦）和 l（埃尔）。您可能会花费数小时调试一个查找“John”或“Bill”的查询，但如果底层数据被错误地输入为“J0hn”或“Bi11”，您的搜索将是徒劳的。


  教训是，数据值可能会发生奇怪的事情，因此当您的查询语法故障排除失败时，请检查底层数据。


  ### 文本字段中不一致的大小写


  如果您的 SQL 实现是区分大小写的，您需要注意某些数据值可能没有预期的大小写。Dan 的名字可能被错误地输入到 `Member` 表中为“dan”。在区分大小写的实现中，使用子句
  `WHERE FirstName = ''Dan''` 的查询将无法检索到他的信息。正如第 2 章所述，使用一个将字符串转换为大写的函数将有助于找到正确的行。在接下来的查询中，我们（临时）将
  `FirstName` 转换为大写，然后将其与我们要查找内容的大写形式进行比较：


  ```

  SELECT * FROM Member

  WHERE UPPER(FirstName) = ''DAN'';

  ```


  查找名称中的大小写问题相当困难，因为并非所有名称都符合首字母小写、其余字母小写的规则；例如，de Vere 和 McLennan。但是，对于像 `Gender`（M
  或 F）或 `MemberType`（Junior, Senior, 或 Associate）这样的字段，我们知道期望的值是什么。确保它们一致的最佳方法是像本章前面讨论的那样，在字段上设置一个检查约束。


  ### 诊断问题


  在前面的部分中，我们看到了由于糟糕的数据库设计和不一致或错误数据可能出现的问题。然而，在大多数情况下，如果您的查询结果看起来不太对，很可能是因为您的 SQL 语句写错了。该语句可能检索到的行与预期不同。在第
  10 章中，有一个部分介绍了一些可以用来检查查询结果是否符合预期的方法。


  在上一章中，我建议了一种处理查询的方法，让您能够逐步构建查询，以便检查每个步骤是否返回了合适的行。但是，如果您面对的是一个未能按预期交付结果的、复杂的完整查询，您需要将其精简，直到找到问题所在。如果您已经注意到一个问题，那么您就有了一个很好的起点。您要么注意到一个预期的行缺失了，要么一个不满足要求的行被检索出来了。集中精力找出问题在查询中的哪个位置。以下部分提供了一些建议。


  #### 独立检查嵌套查询的部分


  如果您有一个查询嵌套在另一个查询中，首先要检查的是嵌套部分本身是否正常工作。看看这个查询：


  ```

  SELECT *

  FROM Member m

  WHERE m.MemberType = ''Junior'' AND Handicap <

  (SELECT AVG(Handicap)

  FROM Member);

  ```


  如果您在处理类似这样的查询时遇到困难，请剪切并粘贴内部查询，并独立运行它。检查它是否返回了正确的结果。如果这部分没问题，您可以尝试单独执行外部查询。为此，只需在内部查询的位置放一个值（例如
  `Handicap < 10`），看看是否返回正确的结果。如果您能将问题缩小到查询的某一部分，那您就开了一个好头。


  如果查询的内部和外部部分是相关的（参见第 4 章），这种方法就行不通了，但下面的一些技术可能有助于处理这种情况。


  #### 理解表是如何组合的


  许多查询涉及使用关系操作（连接、联合等）组合表。确保您理解表是如何组合的，以及这种组合是否合适。考虑如下查询：


  ```

  SELECT m.LastName, m.FirstName

  FROM Member m, Entry e, Tournament t

  WHERE m.MemberID = e.MemberID

  AND e.TourID = t.TourID AND t.TourType = ''Open'' AND e.Year = 2014;

  ```


  这个查询涉及三个表。可能需要一点时间才能看出它们正在被连接。确保这对于所问的问题是合适的。第 10 章提供了问题中的关键字示例以及组合表的适当方式。


  #### 删除额外的 WHERE 子句


  在组合表之后，通常只需要结果行中的一部分。在上一节的查询中，只有部分 `WHERE` 子句是用于连接操作的。连接之后，只保留了满足 `t.TourType =
  ''Open'' AND e.Year = 2014` 的行。如果您的结果中缺少行，删除 `WHERE` 子句中用于在连接后选择最终行子集的那部分通常很有用。如果行仍然缺失，那么您就知道（对于此示例）问题出在连接上。


  #### 保留所有列


  在开发涉及连接的查询的早期阶段，我非常喜欢始终使用 `SELECT *`。如果我们怀疑连接有问题，那么通过保留所有列可见，我们可以查看连接条件是否按预期工作。一旦我们对检索到的行感到满意，就可以只保留所需的列。


  但是，如果我们使用集合操作组合表，这种方法将适得其反，因为投影正确的列至关重要（参见本章后面的“您在集合操作中是否有正确的列”部分）。


  #### 检查聚合中的底层查询


  如果你的聚合查询（例如 `SELECT AVG(Handicap) FROM ... WHERE ...`）出了问题，请检查在应用聚合函数之前，是否检索到了正确的行。可以将查询改为
  `SELECT * FROM ... WHERE ...`，并确认这返回的是你想要计算平均值的那些行。实际上，我建议对聚合查询都这样做，因为否则很难检查返回的数字是否正确。


  ### 常见症状


  在尝试了上一章的一些步骤后，你应该已经简化了查询以定位问题所在。在本节中，我们将看一些具体症状及其可能的原因。


  #### 未返回任何行


  当你知道本应有行返回但实际上没有时，通常很容易发现查询中的问题。涉及“和”或“两者”的问题常常有此情况。例如，考虑这样一个问题：“哪些成员同时参加了第 24 号和第
  36 号锦标赛？”常见的首次尝试（我有时也会不自觉地这样做）的查询语句可能如下：


  ```sql

  SELECT * FROM Entry

  WHERE TourID = 24 AND TourID = 36;

  ```


  上述查询要求 `Entry` 表中的某一行，其 `TourID` 字段同时具有两个不同的值。这永远不会发生，因此没有检索到任何行。解决方法是使用自连接（第 5
  章介绍）或交集操作（第 7 章介绍）。


  查询未返回任何行也可能是下一节中某些问题的一个极端例子。


  #### 缺少行


  有时很难发现查询漏掉了一些行，尤其是当返回的结果集很大时。如果你得到了 1000 行返回，可能不会注意到少了一行。这需要仔细测试，第 10 章讨论了一些方法。通常值得检查以下常见错误列表，看是否有适用的情况。


  ##### 是否需要外连接？


  在需要外连接时使用内连接是一个非常常见的问题。假设我们要获取包含姓名和费用的成员信息列表。为此，我们需要 `Member` 表（获取姓名）和 `Type` 表（获取费用）。首次尝试的查询可能如下：


  ```sql

  SELECT m.LastName, m.FirstName, t.Fee

  FROM Member m, Type t

  WHERE m.MemberType = t.Type;

  ```


  我们知道，比如说有 135 个成员，但查询只返回了 133 行。这里的问题是我们执行了内连接（见第 3 章），因此任何成员类型字段为空的成员都不会出现在结果中。当然，这可能是你想要的结果（那些有类型和费用的成员），但如果你想要所有成员的列表以及有费用的成员的费用，这便不是正确的输出。


  一个包含 `Member` 表所有行的外连接（也在第 3 章讨论过）将解决这个问题。每当使用连接时，都值得思考连接字段，并考虑当该字段为空时你希望如何处理。


  ##### 选择条件是否正确处理了空值？


  如果你忘记了空值对查询的影响，它们可能会带来不少麻烦。上一节讨论了连接字段中的空值。你还记得检查涉及可能包含空值的字段的比较吗？我们在第 2 章和本章前面已经讨论过这一点。


  考虑两个基于 `Member` 表、选择条件分别为 `Gender = ''M''` 和 `Gender <> ''M''` 的查询。按理说，`Member`
  表中的所有行都应被其中一个查询返回。然而，`Gender` 字段为空的行对于这两个条件都将返回 `false`（任何与空值的比较都返回 `false`），因此这些行不会出现在任何一个结果集中。


  假设我们想获取俱乐部中非顶尖球员的成员列表（也许是为了给他们提供辅导）。有人可能建议使用如下查询来查找没有低差点的成员：


  ```sql

  SELECT *

  FROM Member m

  WHERE m.Handicap > 10;

  ```


  问题在于上述查询将遗漏所有没有差点值的成员。在这种情况下，将 `WHERE` 条件改为 `m.Handicap > 10 OR m.Handicap IS Null`
  会有所帮助。


  ##### 你是否在查找与文本值的匹配？


  试图查找名为 Jim 的行，能在表中看到 Jim，但你的查询却返回空结果，这非常令人困惑。这可能由本章前面“数据值问题”一节中讨论的某个问题引起。


  快速排除可疑文本值的一个方法是使用 `LIKE` 进行比较。例如，如果你有 `= ''Jim''`，将其替换为 `LIKE ''%Jim%''`。如果查询随后找到了你预期的行（可能还附带其他一些行），那么你就知道问题出在数据上。如前所述，在字符串开头和结尾放置通配符
  `%`（在 Access 中是 `*`）可以找到前导或尾随空格以及其他不可打印字符。


  ##### 是否误用了 AND 代替 OR？


  我们在上一章（“识别问题中的关键词”一节）讨论了涉及单词 `and` 或 `or` 的查询问题。我简要回顾一下。单词 `and` 在自然英语中既可以表示并集也可以表示交集。当我们说“妇女和儿童”时，通常指女性集合与年轻人集合的并集。当我们说“小型红色汽车”时，指小型汽车集合与红色汽车集合的交集。


  如果我们寻找“妇女和儿童”，并使用选择条件 `Gender = ''F'' AND age < 12`，我们实际上是在检索妇女和儿童（或女孩）的交集。我们需要的条件是
  `Gender = ''F'' OR age < 12`。


  很容易在不经意间将英文问题中的 `and` 不恰当地翻译成查询中的 `AND`，这可能导致遗漏行。如有疑问，请尝试绘制上一章描述的维恩图。


  ##### 集合操作中的列是否正确？


  如果你的查询涉及交集或差集操作，结果可能比预期的行数少，因为你最初投影了错误的列。我们在第 7 章讨论过这个问题。这里是一个关于交集的简单示例；差集操作也存在同样的问题。


  我们想找出谁同时参加了第 25 号和第 36 号锦标赛。我们知道需要一个交集，并尝试了以下查询：


  ```sql

  SELECT * FROM Entry

  WHERE TourID = 25

  INTERSECT

  SELECT * FROM Entry

  WHERE TourID = 36;

  ```


  无论底层数据如何，此查询都不会返回任何行。交集查找的是每个集合中完全相同的行。然而，第一个集合中的所有行 `TourID` 值都是 25，第二个集合中的所有行
  `TourID` 值都是 36。永远不可能存在一个同时属于两个集合的行。我们要找的是同时属于两个集合的成员 ID，因此查询每个部分的 `SELECT` 子句应该是
  `SELECT MemberID FROM Entry`。


  上述查询是一个保留错误列的极端例子，导致没有返回任何行。第 7 章中关于图 7-14 的讨论表明，在交集和差集查询中保留不同的列会导致非常不同的结果。你需要确保保留了与所提问题相适应的列。


  #### 比应有的行数更多


  通常，发现多余的行比注意到查询结果中缺少行更容易。你只需要看到一个意想不到的记录，然后就可以专注于查询的不同部分，找出它未能被排除的地方。以下是一些导致出现多余行的原因。


  ##### 你是否用了 `NOT` 而不是差集运算符？


  对于包含 `NOT` 或 `NEVER` 字眼的问题，一个必然导致出现多余行的做法是：当你实际上需要一个差集运算符时，却在 `WHERE` 子句中使用了一个条件。我们在第
  4 章讨论过这个问题。回顾一下，考虑这样一个问题：“哪些会员从未参加过锦标赛 25？”一个常见的首次尝试是使用选择条件：


  ```sql

  SELECT * FROM Entry

  WHERE TourID <> 25;

  ```


  `WHERE` 子句中的条件会逐行检查，判断它们是否应包含在结果中。如果有一条会员 415 参加锦标赛 36 的记录，那么该行将被检索出来，即使可能存在另一条记录显示会员
  415 参加了锦标赛 25。例如，如果会员 415 参加了锦标赛 25 和另外四场锦标赛，当我们期望得到零行时，我们却会检索到四行。


  解决这类问题的正确方法是使用嵌套查询（参见第 4 章）或 `EXCEPT` 差集运算符（参见第 7 章）。我们需要找到所有会员的集合（来自 `Member` 表），然后移除已参加锦标赛
  25 的会员集合（来自 `Entry` 表）。


  如果我们采用过程式方法，可能会得出下面这个查询，它寻找两个集合之间的差集：


  ```sql

  SELECT MemberID FROM Member

  EXCEPT

  SELECT MemberID FROM Entry

  WHERE TourID = 25;

  ```


  如果我们从结果式方法入手，可能会得出一个嵌套查询，如下所示：


  ```sql

  SELECT MemberID FROM Member

  WHERE MemberID NOT IN

  (SELECT MemberID FROM Entry

  WHERE TourID = 25);

  ```


  ##### 你是否恰当地处理了重复项？


  有时需要稍加思考来决定如何处理从查询中检索到的重复记录。默认情况下，SQL 会保留所有重复项。以下两个请求听起来很相似：


  *   给我一份我的客户姓名列表。

  *   给我一份我的客户所在城市的列表。


  在第一个请求中，我们可能期望行数与客户数相同；如果我们有好几个叫 John 的客户，我们期望他们都被保留。在第二个请求中，我们期望每个城市只有一行。如果我们有
  500 个客户住在基督城，我们不期望返回所有 500 行。


  在查找城市的查询中，我们只想要不重复的值，因此我们应该使用 `DISTINCT` 关键字：


  ```sql

  SELECT DISTINCT (City) FROM Customer;

  ```


  #### 错误的统计信息或聚合


  如果我们使用计数、分组或平均值等聚合函数，而基础查询遗漏了行或返回了多余的行，那么统计信息显然会受到影响。另外需要考虑的几点是 `NULL` 值和重复项是如何处理的。


  SQL 不会在其统计信息中包含任何 `NULL` 字段。例如，`COUNT(Handicap)` 或 `AVG(Handicap)` 将忽略 `Handicap`
  字段中为 `NULL` 的行。同样重要的是考虑你希望如何处理重复项，特别是对于计数函数。`COUNT(Handicap)` 将返回在 `Handicap` 列中有值的会员数量。`COUNT(DISTINCT
  Handicap)` 将返回 `Handicap` 列中不同值的数量；如果所有会员的障碍值都是 20，它将返回计数 1。


  #### 顺序错误


  如果你在查询中使用了 `ORDER BY` 子句，并且行的呈现顺序有问题，那么问题通常出在基础数据上。请回顾本章前面的“数据值问题”部分。检查字段类型是否合适（例如，数值没有存储在文本字段中），并且文本值大小写一致且没有多余字符。


  #### 常见的拼写错误和语法问题


  有时查询无法运行是因为语法上的一些简单问题——即查询的措辞方式。语法问题包括缺少括号、字段或关键字拼写错误等情况。希望数据库软件能在语法有问题时提醒你，但有些编辑器功能相当基础，这可能有助于也可能无助于发现和纠正问题。以下是一些需要检查的项目：


  *   **引号**：大多数 SQL 版本要求在文本值周围使用单引号，例如 `''Smith''` 或 `''Junior''`，尽管有些版本在某些情况下使用双引号。如果你复制粘贴查询，请确保正确的引号已被转移。当我将本书中的查询从
  Word 复制到 Access 时，引号看起来没问题，但我需要重新输入它们。还要检查所有引号是否正确配对。不要在数值周围使用引号。类似 `Handicap <
  ''12''` 的写法如果 `Handicap` 是数值字段，将会导致问题。

  *   **括号**：嵌套查询中需要括号，并且在许多查询（例如涉及多个连接的查询）中，括号也可用于提高可读性。检查所有括号是否正确配对。

  *   **表和字段的名称**：显然，你需要正确获取表和字段的名称。然而，有时一个简单的表名或字段拼写错误会导致无法理解的错误信息。请仔细检查。

  *   **别名的使用**：如果你对表名使用了别名（例如 `Member m`），请检查你是否将正确的别名与每个字段名关联。

  *   **关键字的拼写**：一些用于构建 SQL 查询的软件会高亮显示关键字，因此如果你拼写错误，会非常明显。如果你的软件不显示高亮，那么也要检查关键字的拼写。我经常把
  `FORM` 打成 `FROM`，或者把 `AVERAGE()` 打成 `AVG()`。

  *   **`IS NULL` 与 `= NULL`**：一些 SQL 版本对这两者的处理方式完全不同。如果你想查找值为 null 的字段，`IS NULL`
  总是有效的。


  ### 总结


  在纠正查询之前，你首先需要注意到它是错误的。最好是在用户发现问题之前，由我们自己发现潜在问题。始终检查从查询返回的行，如前一章所述。当你确实发现错误时，以下是一些追踪问题原因的思路：


  *   检查基础表是否以适当的方式组合（连接、交集等）。

  *   通过移除选择条件和聚合来简化查询，以确保基础行是正确的。

  *   在连接查询中保留所有列，直到你确定表已被正确组合。

  *   独立地检查嵌套查询或涉及集操作查询的每个部分。

  *   检查带有 `AND` 或 `NOT` 字眼的问题的查询，确保在需要集操作或嵌套查询时没有使用选择条件。

  *   检查带有集操作的查询中保留的列是否合适。

  *   检查 `NULL` 值和重复项是否已得到妥善处理。

  *   检查基础数据类型是否正确以及数据值是否一致。


