- "# 数据库索引碎片整理技术\n\n你会注意到，大多数行组仍然有些碎片化。其中两个行组（29,30）的状态尚未从`COMPRESSED`更改为`TOMBSTONE`。这意味着这些行组将在稍后的某个时间在后台被移除。简而言之，只有少数行组被合并，几乎未处理任何已删除的行。这是因为`REORGANIZE`命令仅当行组中超过\
  \ 10%的数据被删除时，才会清理已删除的数据。让我们从表中删除更多数据，以使一些行组的删除比例超过 10%。\n\n```\nDELETE dbo.bigTransactionHistory\n\
  WHERE Quantity BETWEEN 8\nAND     17;\n```\n\n现在，当我们查看碎片化结果时，会看到更多的活动，如图 14-21 所示。\n\
  \n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig21_HTML.jpg](img/323849_5_En_14_Fig21_HTML.jpg)\n\
  \n图 14-21 针对更碎片化的索引执行不带压缩的`REORGANIZE`\n\n你可以看到，更多的行组已被标记为`TOMBSTONE`，并且所有新页面的已删除行数为零。你会注意到，对于已压缩的行组，生成了新的`row_group_id`值。旧的`row_group_id`不会被重用。如果你在清理完成后查看表，将只看到`COMPRESSED`行组，由于数据被移除，总数降至\
  \ 30，但你会看到空隙。\n\n如果我们重新运行`REORGANIZE`命令但包含行组，命令将如下所示：\n\n```\nALTER INDEX cci_bigTransactionHistory\n\
  ON dbo.bigTransactionHistory\nREORGANIZE\nWITH (COMPRESS_ALL_ROW_GROUPS = ON);\n\
  ```\n\n命令`COMPRESS_ALL_ROW_GROUPS`将确保增量存储中任何`OPEN`或`CLOSED`的行组都会被移入列存储索引，经历压缩以及列存储索引相关的所有其他过程。\n\
  \n不过，在运行此命令之前，让我们再删除一些数据，以将碎片化程度达到 10%的行组推过阈值。\n\n```\nDELETE dbo.bigTransactionHistory\n\
  WHERE Quantity BETWEEN 6\nAND     8;\n```\n\n如图 14-22 所示的结果包括移除`TOMBSTONE`，以及完全重组索引。\n\
  \n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig22_HTML.jpg](img/323849_5_En_14_Fig22_HTML.jpg)\n\
  \n图 14-22 列存储索引的压缩和碎片整理\n\n实际上，行组的顺序并不重要。当它们被碎片整理时，会从索引中的原始位置移动到之后的新位置。\n\n如果你不想处理\
  \ 10%的限制，可以使用列存储索引上的`REBUILD`选项，但你将不得不面对在此过程中索引将脱机的事实。\n\n表 14-1 总结了行存储索引上这四种碎片整理技术的特性。\n\
  \n表 14-1 行存储碎片整理技术的特性\n\n| 特性/问题 | 删除并创建索引 | 使用`DROP_EXISTING`创建索引 | `ALTER INDEX\
  \ REBUILD` | `ALTER INDEX REORGANIZE` |\n| --- | --- | --- | --- | --- |\n| 重建因聚集索引碎片化而失效的非聚集索引\
  \ | 两次 | 否 | 否 | 否 |\n| 缺失索引 | 是 | 否 | 否 | 否 |\n| 带约束的索引碎片整理 | 非常复杂 | 中等复杂 | 简单\
  \ | 简单 |\n| 一起碎片整理多个索引 | 否 | 否 | 是 | 是 |\n| 与其他进程的并发性 | 低 | 低 | 中等，取决于并发用户活动 | 高\
  \ |\n| 中途取消 | 危险（无事务保护） | 进度丢失 | 进度丢失 | 进度保留 |\n| 碎片整理程度 | 高 | 高 | 高 | 中等至低 |\n\
  | 应用新的填充因子 | 是 | 是 | 是 | 否 |\n| 更新统计信息 | 是 | 是 | 是 | 否 |\n\n你还可以通过压缩页面内的更多行来减少内部碎片，从而减少页面内的空闲空间。索引叶级页面内可进行的最大压缩量由填充因子控制，如下一节所述。\n\
  \n在处理大型数据库及相关索引时，可能需要通过分区将表和索引分散到磁盘上。分区上的索引也可能随着分区内数据的变化而变得碎片化。处理分区索引时，你需要确定是希望作为`ALTER\
  \ INDEX`命令的一部分，重新组织或重建（分别使用`REORGANIZE`或`REBUILD`）一个、部分还是所有分区。分区索引不能在线重建。请记住，执行影响所有分区的操作可能代价高昂。\n\
  \n如果在索引（即使是分区索引）上指定了压缩，则必须确保在执行`ALTER INDEX`操作时将压缩设置为其之前的值；否则，压缩设置将会丢失，你将不得不重建索引。这对于非聚集索引尤其重要，因为它们不会从表继承压缩设置。\n\
  \n### 碎片整理与分区\n\n如果你拥有大型数据库，有效管理数据的一个标准机制是将其分解为分区。虽然在极少数情况下，分区可能有助于提高性能，但它们首先是用于管理数据。但是，索引和分区的一个问题是，如果重建索引，在重建期间它将不可用。这意味着对于大型索引上的分区，在重建期间，你可能预期数据的主要部分将离线。SQL\
  \ Server 2012 引入了在线重建的能力。如果你有一个分区索引，它将如下所示：\n\n```\nALTER INDEX i1 ON dbo.Test1\n\
  REBUILD PARTITION = ALL\nWITH (ONLINE = ON);\n```\n\n这可以重建整个分区，并将其作为在线操作进行，这意味着它在重建期间使索引基本保持可用。但是，对于某些分区来说，这是一个巨大的任务，可能会导致服务器负载过高，并需要更多的\
  \ tempdb 存储。SQL Server 2014 引入了新功能，允许你指定单个分区。\n\n```\nALTER INDEX i1 ON dbo.Test1\n\
  REBUILD PARTITION = 1\nWITH (ONLINE = ON);\n```\n\n这降低了重建操作的开销，同时在重建期间仍保持索引基本可用。我强调是“基本”在线，因为在重建期间仍会发生一定程度的锁定和争用。这不是一个完全免费的操作。它只是比替代方案有了极大的改进。\n\
  \n谈到分区重建操作涉及的锁定，SQL Server 2014 还引入了另一项新功能。你可以通过调整`REBUILD`命令来修改重建操作期间使用的锁优先级。\n\
  \n```\nALTER INDEX i1\nON dbo.Test1\nREBUILD PARTITION = 1\nWITH (ONLINE = ON (WAIT_AT_LOW_PRIORITY\
  \ (MAX_DURATION = 20,\nABORT_AFTER_WAIT = SELF)));\n```\n\n这样做是设置重建操作愿意等待的持续时间（以分钟为单位）。然后，它允许你确定中止哪些进程以为索引重建清除系统。你可以让它停止自己或阻塞进程。最有趣的是，等待进程被设置为低优先级，因此它不会使用大量系统资源，并且任何传入的事务都不会被此进程阻塞。\n\
  \n\n\n## `填充因子`的重要性\n\n在行存储索引上，通过让索引的每个叶级页面容纳更多行来减少索引的内部碎片。在一个叶级页面中获得更多的行，减少了索引所需的总页数，进而降低了检索一系列索引行所需的磁盘\
  \ I/O 和逻辑读取。另一方面，如果索引键值具有高度的事务性，那么完全填满的索引页会导致页面拆分。因此，对于一个事务性表，需要在最大化页面中的行数和避免页面拆分之间取得良好的平衡。\n\
  \nSQL Server 允许你通过使用 `填充因子` 来控制索引叶级页面内的可用空间量。如果你知道表上会有大量的 `INSERT` 查询或对索引键列的 `UPDATE`\
  \ 查询，那么你可以使用填充因子预先在索引叶级页面中添加可用空间，以最小化页面拆分。如果表是只读的，你可以创建具有高填充因子的索引以减少索引页的数量。不过，在处理针对\
  \ `IDENTITY` 列（或任何包含有序数据、可能形成热点页面的索引键）的插入时，保留一些可用空间是个好主意。\n\n默认的填充因子是 0，这意味着叶级页面被填充到\
  \ 100%，尽管在 B 树结构的分支节点中会保留一些可用空间。索引的填充因子仅在索引创建时应用。随着键的插入和更新，索引中行的密度最终会稳定在一个狭窄的范围内。正如你在前一章关于\
  \ `UPDATE` 和 `INSERT` 导致的页面拆分的章节中所看到的，当发生页面拆分时，通常会将原始页面的一半移动到一个新页面，这与索引创建时使用的填充因子无关。\n\
  \n为了理解填充因子的重要性，让我们使用一个包含 24 行的小型测试表。\n\n```sql\nDROP TABLE IF EXISTS dbo.Test1;\n\
  GO\nCREATE TABLE dbo.Test1 (C1 INT,\nC2 CHAR(999));\nWITH Nums\nAS (SELECT 1 AS\
  \ n\nUNION ALL\nSELECT n + 1\nFROM Nums\nWHERE n < 24)\nINSERT INTO dbo.Test1 (C1,\n\
  C2)\nSELECT n * 100,\n'a'\nFROM Nums;\n```\n\n通过使用默认填充因子创建聚集索引来增加叶级（或数据）页面中的最大行数。\n\
  \n```sql\nCREATE CLUSTERED INDEX FillIndex ON Test1(C1);\n```\n\n由于平均行大小为 1,010\
  \ 字节，一个聚集索引叶级页面（或表数据页）最多可包含八行。因此，24 行至少需要三个叶级页面。你可以在图 14-23 所示的 `sys.dm_db_index_physical_stats`\
  \ 输出中确认这一点。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig23_HTML.jpg](img/323849_5_En_14_Fig23_HTML.jpg)\n\
  *图 14-23：填充因子设置为默认值 0*\n\n请注意，`avg_page_space_used_in_percent` 为 100%，因为默认填充因子允许页面中压入最大行数。由于一个页面无法包含部分行来完全填满页面，即使使用默认填充因子，`avg_page_space_used_in_percent`\
  \ 也通常会略低于 100%。\n\n为了减少由 `INSERT` 和 `UPDATE` 操作引起的初始页面拆分频率，通过使用如下填充因子重新创建聚集索引，在叶级（或数据）页面内创建一些可用空间：\n\
  \n```sql\nALTER INDEX FillIndex ON dbo.Test1 REBUILD\nWITH  (FILLFACTOR= 75);\n\
  ```\n\n因为每个页面总共有八行的空间，75% 的填充因子将允许每页六行。因此，对于 24 行，叶级页面的数量应增加到四个，如图 14-24 所示的 `sys.dm_db_index_physical_stats`\
  \ 输出。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig24_HTML.jpg](img/323849_5_En_14_Fig24_HTML.jpg)\n\
  *图 14-24：填充因子设置为 75*\n\n请注意，`avg_page_space_used_in_percent` 约为 75%，正如填充因子所设定的。这允许在每个页面中再插入两行而不会引起页面拆分。你可以通过向第一组六行（`C1`\
  \ = 100 – 600，包含在第一页中）添加两行来确认这一点。\n\n```sql\nINSERT  INTO dbo.Test1\nVALUES  (110,\
  \ 'a'),  --第 25 行\n(120, 'a') ;  --第 26 行\n```\n\n图 14-25 显示了当前的碎片情况。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig25_HTML.jpg](img/323849_5_En_14_Fig25_HTML.jpg)\n\
  *图 14-25：新记录后的碎片情况*\n\n从输出中可以看到，添加这两行并没有为索引增加任何页面。因此，`avg_page_space_used_in_percent`\
  \ 从 74.99% 增加到 81.25%。随着向第一组六行添加两行，第一页应该完全填满（八行）。在前八行的范围内进一步添加任何行都将导致页面拆分，从而使索引页数量增加到五。\n\
  \n```sql\nINSERT  INTO dbo.Test1\nVALUES  (130, 'a') ;  --第 27 行\n```\n\n现在，`sys.dm_db_index_physical_stats`\
  \ 在图 14-26 中显示了差异。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig26_HTML.jpg](img/323849_5_En_14_Fig26_HTML.jpg)\n\
  *图 14-26：页数增加*\n\n请注意，即使索引的填充因子是 75%，`平均页面密度（满）` 也下降到了 67.49%，这可以计算如下：\n\n```\n\
  平均页面密度（满）\n= 平均每页行数 / 每页最大行数\n= (27 / 5) / 8\n= 67.5%\n```\n\n从前面的例子中，你可以看到填充因子在索引创建时应用。但后来，随着数据的修改，它就不再具有意义了。无论填充因子如何，每当发生页面拆分时，原始页面的行都会分布在两个页面之间，`avg_page_space_used_in_percent`\
  \ 也会相应稳定下来。因此，如果你使用非默认的填充因子，你应该确保定期重新应用填充因子以保持其效果。\n\n你可以通过重新创建索引，或使用 `ALTER INDEX\
  \ REORGANIZE` 或 `ALTER INDEX REBUILD` 来重新应用填充因子，如前所示。`ALTER INDEX REORGANIZE` 会考虑索引创建时指定的填充因子。`ALTER\
  \ INDEX REBUILD` 也会考虑原始填充因子，但如果需要，它允许指定一个新的填充因子。\n\n如果不进行填充因子的定期维护，无论是对于默认还是非默认的填充因子设置，索引（或表）的\
  \ `avg_page_space_used_in_percent` 最终都会稳定在一个狭窄的范围内。\n\n有一种观点认为，与其一遍又一遍地尝试碎片整理索引（并带来所有相关的开销），你可能更倾向于确定一个填充因子，使得索引中页面的数据分布相当标准。有些人确实使用这种方法，牺牲一些读取性能和磁盘空间来避免页面拆分及其导致的相关问题。你需要在自己的系统上进行测试，以找到合适的填充因子，并确定该方法是否有效。\n\
  \n\n\n## 自动维护\n\n在一个拥有大量事务的数据库中，表和索引会随着时间推移而碎片化（假设你没有使用前面提到的填充因子方法）。因此，为了提升性能，你应该定期检查表和索引的碎片化程度，并对碎片化程度较高的对象进行碎片整理。你可能还需要考虑工作负载，并根据负载以及索引的碎片化水平来决定何时整理索引碎片。你可以通过以下步骤对一个数据库进行此分析：\n\
  \n1.  识别当前数据库中所有需要分析碎片化的用户表。\n2.  确定每个用户表和索引的碎片化程度。\n3.  根据以下注意事项，确定需要进行碎片整理的用户表和索引：\n\
  \    *   碎片化程度较高，即 `avg_fragmentation_in_percent` 大于 20%\n    *   表/索引并非非常小——即 `pagecount`\
  \ 大于 8\n4.  对碎片化程度高的表和索引进行碎片整理。\n\n对于一个功能全面的脚本，我强烈建议使用位于 [`http://bit.ly/2EGsmYU`](http://bit.ly/2EGsmYU)\
  \ 的 Minion Reindex 应用程序，或者 Ola Hollengren 的脚本 [`http://bit.ly/JijaNI`](http://bit.ly/JijaNI)。\n\
  \n除了这些脚本，你也可以使用 SQL Server 内置的维护计划。但是，我不推荐它们，因为为了那一点点易用性，你放弃了太多控制权。使用前面推荐的一套脚本，你会对获得的结果满意得多。\n\
  \n## 总结\n\n正如你在本章所学，在一个高度事务性的数据库中，由 `INSERT` 和 `UPDATE` 语句引起的页面拆分可能会使表和索引碎片化，从而增加数据检索的成本。你可以通过使用填充因子在页面内预留空闲空间来避免这些页面拆分。由于填充因子仅在索引创建时应用，因此你应该定期重新应用它以保持其有效性。对列存储索引的数据操作也会导致碎片化和性能下降。你可以使用\
  \ `sys.dm_db_index_physical_stats`（针对行存储索引）或 `sys.column_store_row_groups`（针对列存储索引）来确定索引（或表）的碎片化程度。在确定碎片化程度较高后，你可以根据所需的碎片整理量、数据库并发性以及你处理的是行存储还是列存储索引，选择使用\
  \ `ALTER INDEX REBUILD` 或 `ALTER INDEX REORGANIZE`。\n\n碎片整理会重新排列数据，使其在磁盘上的物理顺序与表/索引中的逻辑顺序一致，从而提高查询性能。然而，除非优化器为查询决定一个有效的执行计划，否则即使在碎片整理后，查询性能也可能仍然不佳。因此，让优化器使用高效的技术来生成高性价比的执行计划非常重要。\n\
  \n在下一章中，我将解释执行计划的生成过程以及优化器用来决定有效执行计划的技术。\n\n"
- '# 15. 执行计划生成


  正如你在前几章所学，任何查询的性能都取决于优化器所决定的执行计划的有效性。因为执行查询所需的总时间等于生成执行计划所需的时间加上基于此执行计划执行查询所需的时间之和，所以生成执行计划本身的成本要低，或者该计划能从缓存中重用以完全避免此成本，这一点很重要。生成执行计划时产生的成本取决于生成执行计划的过程、缓存计划的过程以及从计划缓存中重用计划的可能性。在本章中，你将学习执行计划是如何生成的。


  在本章中，我将涵盖以下主题：


  *   执行计划的生成与缓存

  *   用于生成执行计划的 SQL Server 组件

  *   优化执行计划生成成本的方法

  *   影响并行计划生成的因素


  ## 执行计划生成


  SQL Server 使用基于成本的优化技术来确定查询的处理策略。优化器在决定应使用哪个索引和连接策略时，会同时考虑数据库对象的元数据（如唯一约束或索引大小）以及查询中引用列的当前分布统计信息。


  基于成本的优化使数据库开发人员可以专注于实现业务规则，而不是查询的确切语法。同时，确定查询处理策略的过程仍然相当复杂，并可能消耗大量资源。SQL Server
  使用多种技术来优化资源消耗。


  *   基于语法的查询优化

  *   针对简单查询进行平凡计划匹配以避免深入优化

  *   基于当前分布统计信息的索引和连接策略

  *   分阶段进行查询优化以控制优化成本

  *   执行计划缓存以避免不必要的查询计划重新生成


  以下技术按顺序执行，如图 15-1 所示。


  ![../images/323849_5_En_15_Chapter/323849_5_En_15_Fig1_HTML.png](img/323849_5_En_15_Fig1_HTML.png)


  图 15-1


  SQL Server 优化查询执行的技术


  1.  解析

  2.  绑定

  3.  查询优化

  4.  执行计划生成、缓存和哈希计划生成

  5.  查询执行


  让我们更详细地看看这些步骤。


  ### 解析器


  当提交查询时，SQL Server 将其传递给 *关系引擎* 内的代数器。（这个关系引擎是 SQL Server 数据检索和操作的两个主要部分之一，另一个是 *存储引擎*，负责数据访问、修改和缓存。）关系引擎负责解析、名称和类型解析以及优化。它还根据查询执行计划执行查询，并向存储引擎请求数据。


  代数器进程的第一部分是解析器。解析器检查传入的查询，验证其语法是否正确。如果检测到语法错误，查询将被终止。如果多个查询作为一个批处理一起提交（注意下面的语法错误），那么解析器会检查整个批处理的语法，并在检测到语法错误时取消整个批处理。（注意，一个批处理中可能出现多个语法错误，但解析器只报告第一个错误就不再继续。）


  ```

  CREATE TABLE dbo.Test1 (c1 INT);

  INSERT  INTO dbo.Test1

  VALUES  (1);

  CEILEKT * FROM dbo.t1; --Error:  I meant,  SELECT * FROM t1

  ```


  在验证查询语法正确后，解析器会为代数器生成一个称为 *解析树* 的内部数据结构。解析器和代数器合在一起称为 *查询编译*。



  ### 绑定


  解析器生成的解析树会被传递给代数化器的下一个部分进行处理。代数化器现在会解析所有不同对象的名称，即 T-SQL 中引用的表、列等等，这个过程称为 `绑定`。它还会识别所有正在处理的各类数据类型。它甚至会检查聚合函数（如
  `GROUP BY` 和 `MAX`）的位置。所有这些验证和解析的输出是一个二进制数据集，称为 `查询处理器树`。


  要查看代数化器的这部分实际操作，如果提交了以下批处理查询，则错误语句之前的前三条语句会被执行，而错误的语句及其后的语句则被取消。


  ```

  IF (SELECT OBJECT_ID(''dbo.Test1'')) IS NOT NULL

  DROP TABLE dbo.Test1;

  GO

  CREATE TABLE dbo.Test1 (C1 INT);

  INSERT INTO dbo.Test1

  VALUES (1);

  SELECT ''Before Error'',

  C1

  FROM dbo.Test1 AS t;

  SELECT ''error'',

  c1

  FROM dbo.no_Test1;

  --Error:  Table doesn''t exist

  SELECT ''after error'' AS c1

  FROM dbo.Test1 AS t;

  ```


  如果查询包含隐式数据转换，则规范化过程会向查询树添加适当的步骤。该过程还执行一些基于语法的转换。例如，如果提交以下查询，基于语法的优化会转换查询的语法，如图 15-2
  所示（取自执行计划中 `SELECT` 操作符的属性），其中 `BETWEEN` 变成了 `>=` 和 `<=`。


  ![../images/323849_5_En_15_Chapter/323849_5_En_15_Fig2_HTML.jpg](img/323849_5_En_15_Fig2_HTML.jpg)

  图 15-2 基于语法的优化


  ```

  SELECT soh.AccountNumber,

  soh.OrderDate,

  soh.PurchaseOrderNumber,

  soh.SalesOrderNumber

  FROM Sales.SalesOrderHeader AS soh

  WHERE soh.SalesOrderID BETWEEN 62500

  AND     62550;

  ```


  你还可以看到一些参数化的证据，本章稍后将更详细地讨论。从该查询生成的执行计划如图 15-3 所示。


  ![../images/323849_5_En_15_Chapter/323849_5_En_15_Fig3_HTML.jpg](img/323849_5_En_15_Fig3_HTML.jpg)

  图 15-3 带有警告的执行计划


  你还应该注意 `SELECT` 操作符上的警告指示器。查看此操作符的属性，你可以看到 `SalesOrderID` 实际上在转换过程中被处理了，优化器正在向你发出警告。


  ```

  Type conversion in expression (CONVERT(nvarchar(23),[soh].[SalesOrderID],0)) may
  affect "CardinalityEstimate" in query plan choice

  ```


  我保留了这个带有警告的例子，以说明几点。首先，警告可能不明确。在这个例子中，警告来自计算列 `SalesOrderNumber`。它正在将 `SalesOrderID`
  转换为字符串并给它添加一个值。通过它的方式，优化器认识到这可能是有问题的，所以它给了你一个警告。但是，你并没有以任何过滤方式（如 `WHERE` 子句、`JOIN`
  或 `HAVING`）引用该列。因此，你可以安全地忽略此警告。我保留它也是因为它很好地说明了 AdventureWorks 是一个很好的示例数据库，因为它包含了现实世界数据库中有时也会出现的同样糟糕的选择。


  对于大多数数据定义语言（DDL）语句（如 `CREATE TABLE`、`CREATE PROC` 等），经过代数化器后，查询会直接编译执行，因为优化器无需在多种处理策略中进行选择。特别是对于一个
  DDL 语句 `CREATE INDEX`，优化器可以根据表上其他现有索引来确定高效的处理策略，如第 8 章所述。


  因此，你永远不会在执行计划中看到对 `CREATE TABLE` 的引用，但你会看到对 `CREATE INDEX` 的引用。如果规范化后的查询是数据操作语言（DML）语句（如
  `SELECT`、`INSERT`、`UPDATE` 或 `DELETE`），则查询处理器树会被传递给优化器，以决定查询的处理策略。


  ### 优化


  根据查询的复杂性，包括涉及的表的数量和可用的索引，执行查询处理器树中的查询可能有多种方式。详尽比较所有执行查询方式的成本可能会耗费大量时间，这有时可能超过找到最优化查询带来的好处。图
  15-4 显示，为了避免优化开销相对于查询实际执行成本过高的情况，优化器采用了不同的技术，即以下几种：


  ![../images/323849_5_En_15_Chapter/323849_5_En_15_Fig4_HTML.jpg](img/323849_5_En_15_Fig4_HTML.jpg)

  图 15-4 查询优化步骤


  *   简化

  *   简单计划匹配

  *   多阶段优化

  *   并行计划优化


  #### 简化


  在优化器开始处理你的查询之前，逻辑引擎已经识别了数据库中所有引用的对象。当优化器开始构建执行计划时，它首先确保所有被引用的对象确实被使用，并且是准确返回数据所必需的。如果你编写了一个三表连接的查询，但实际上只有两个表被
  `SELECT` 标准或 `WHERE` 子句引用，优化器可能会选择将另一个表排除在处理之外。这被称为 `简化` 步骤。它实际上是一个更大处理集合的一部分，该集合收集统计数据并开始估计查询中涉及数据的基数。优化器还收集有关约束的必要信息，特别是外键约束，这将有助于它稍后决定连接顺序，它可以重新排列顺序以获得足够好的计划。同时，在简化过程中，子查询会被转换为连接。其他简化过程包括移除冗余连接。


  #### 简单计划匹配


  有时可能只有一种执行查询的方式。例如，没有索引的堆表只能通过一种方式访问：表扫描。为了避免优化此类查询的运行时开销，SQL Server 维护了一个定义简单计划的模式列表。如果优化器找到匹配项，则会为查询生成一个类似的计划，而无需任何优化。生成的计划随后存储在过程缓存中。省去优化阶段意味着生成简单计划的成本非常低。这并不意味着简单计划是理想的或比更复杂的计划更可取。简单计划仅适用于极其简单的查询。一旦查询的复杂性上升，它必须经过优化。


  ## 多个优化阶段


  对于一个复杂的查询，需要分析的替代处理策略的数量可能很大，评估每个选项可能需要很长时间。因此，优化器会经历三个不同级别的优化。这些被称为 search 0、search
  1 和 search 2。但将它们理解为*事务*、*快速计划*和*完全优化*更容易。根据查询的大小和复杂性，这些不同的优化可能会逐一尝试，或者优化器可能直接跳到完全优化。每种优化都会考虑使用不同的连接技术以及通过扫描、寻道和其他操作访问数据的不同方式。


  索引变体考虑不同的索引方面，例如单列索引、复合索引、索引列顺序、列密度等。同样，连接变体考虑 SQL Server 中可用的不同连接技术：嵌套循环连接、合并连接和哈希连接。（第
  4 章详细介绍了这些连接技术。）诸如唯一值和外键约束等约束也是优化决策过程的一部分。


  优化器会考虑 `WHERE`、`JOIN` 和 `HAVING` 子句中引用的列的统计信息，以评估索引和连接策略的有效性。基于当前的统计信息，它在多个优化阶段评估各种配置的成本。成本包括许多因素，包括但不限于执行查询所需的
  CPU、内存和磁盘 I/O（包括随机与顺序 I/O 估计）的使用情况。每个优化阶段之后，优化器都会评估处理策略的成本。这个成本只是一个估计值，不是对行为的实际测量或预测；它是基于统计信息和所考虑过程的数学构造。


  ### 注意


  成本估计仅仅是估计。此外，由一个执行计划表示的一组估计在实际中可能比另一组估计（一个不同的执行计划）的成本更高，也可能不更高。比较计划之间的成本可能是一种危险的方法。


  如果发现成本足够低廉，那么优化器会停止在优化阶段的进一步迭代并退出优化过程。否则，它会持续在优化阶段中迭代，以确定一个成本效益高的处理策略。


  有时，一个查询可能非常复杂，以至于优化器需要广泛地推进优化阶段。在优化查询时，如果发现处理策略的成本超过了并行度的成本阈值（cost threshold for
  parallelism），那么它会评估使用多个 CPU 处理查询的成本。否则，优化器将继续使用串行计划。您也可能会看到，在优化器选择了一个并行计划之后，该计划的成本可能实际上低于并行度的成本阈值，并且低于串行计划的成本。


  您可以通过两个来源了解在多个优化阶段期间发生的一些细节。以这个查询为例：


  ```sql

  SELECT soh.SalesOrderNumber,

  sod.OrderQty,

  sod.LineTotal,

  sod.UnitPrice,

  sod.UnitPriceDiscount,

  p.Name AS ProductName,

  p.ProductNumber,

  ps.Name AS ProductSubCategoryName,

  pc.Name AS ProductCategoryName

  FROM Sales.SalesOrderHeader AS soh

  JOIN Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  JOIN Production.Product AS p

  ON sod.ProductID = p.ProductID

  JOIN Production.ProductModel AS pm

  ON p.ProductModelID = pm.ProductModelID

  JOIN Production.ProductSubcategory AS ps

  ON p.ProductSubcategoryID = ps.ProductSubcategoryID

  JOIN Production.ProductCategory AS pc

  ON ps.ProductCategoryID = pc.ProductCategoryID

  WHERE soh.CustomerID = 29658;

  ```


  当运行此查询时，会返回如图 15-5 所示的执行计划，这无疑是一个复杂的计划。


  ![../images/323849_5_En_15_Chapter/323849_5_En_15_Fig5_HTML.jpg](img/323849_5_En_15_Fig5_HTML.jpg)


  图 15-5


  复杂的执行计划


  我意识到这个执行计划很难阅读。这里的目的不是通读这个计划。重要的是，它涉及了相当多的表，每个表都有索引和统计信息，所有这些都必须被考虑在内才能得出这个执行计划。您可以查看此执行计划优化器工作信息的第一个地方是第一个操作符的属性页，在本例中是
  T-SQL `SELECT` 操作符，位于执行计划的最左侧。图 15-6 显示了属性页。


  ![../images/323849_5_En_15_Chapter/323849_5_En_15_Fig6_HTML.jpg](img/323849_5_En_15_Fig6_HTML.jpg)


  图 15-6


  SELECT 操作符属性页


  从顶部开始，您可以看到与创建和优化此执行计划直接相关的信息。


  *   缓存计划的大小，为 72KB

  *   编译计划使用的 CPU 周期数，为 51ms

  *   使用的内存量，为 1329KB

  *   编译时间，为 62ms


  优化级别属性（在 XML 计划中为 `StatementOptmLevel`）显示了优化器内发生的处理类型。在这种情况下，`FULL` 表示优化器执行了完全优化。这在“语句提前终止原因”（Reason
  for Early Termination of Statement）属性中进一步显示，其值为 Good Enough Plan Found（找到足够好的计划）。因此，优化器花了
  62ms 来追踪一个它认为在此情况下足够好的计划。您还可以看到 `QueryPlanHash` 值，也称为*指纹*（*fingerprint*）（您可以在“查询计划哈希和查询哈希”一节中找到更多详细信息）。`SELECT`（以及
  `INSERT`、`UPDATE` 和 `DELETE`）操作符的属性是评估任何执行计划时重要的第一站，因为这些信息。


  在 SQL Server 2017 中新增的功能是，您还可以看到任何捕获的实际执行计划的 `QueryTimeStats` 和 `WaitStats`。这可以是捕获查询指标的有用方法。


  第二个优化器信息来源是动态管理视图 `sys.dm_exec_query_optimizer_info`。此 DMV 是随时间推移的优化事件的聚合。它不会显示给定查询的个别优化，但会跟踪已执行的优化。这对于调整单个查询不是立即方便的，但如果您致力于随时间减少工作负载的成本，能够跟踪此信息可以帮助您确定您的查询调整是否产生了积极的差异，至少在优化时间方面如此。返回的一些数据仅供
  SQL Server 内部使用。图 15-7 显示了从以下查询结果中有用数据的截断示例：


  ![../images/323849_5_En_15_Chapter/323849_5_En_15_Fig7_HTML.jpg](img/323849_5_En_15_Fig7_HTML.jpg)


  图 15-7


  sys.dm_exec_query_optimizer_info 的输出


  ```sql

  SELECT deqoi.counter,

  deqoi.occurrence,

  deqoi.value

  FROM sys.dm_exec_query_optimizer_info AS deqoi;

  ```


  在另一个查询之前和之后运行此查询可以显示已完成优化的数量和类型所发生的变化。但是，如果您可以将查询隔离在测试服务器上，您就可以更有把握地获得仅与您试图测量的查询直接相关的前后差异。



  #### 并行计划优化


  优化器在评估使用并行计划处理查询的成本时会考虑多种因素。其中一些因素如下：


  *   SQL Server 可用的 CPU 数量

  *   SQL Server 版本

  *   可用内存

  *   并行成本阈值

  *   正在执行的查询类型

  *   给定流中需要处理的行数

  *   活动并发连接数


  如果 SQL Server 只有一个 CPU 可用，那么优化器将不会考虑并行计划。可以通过 SQL Server 配置的 `affinity` 设置来限制 SQL
  Server 可用的 CPU 数量。亲和性值可以设置为特定的 CPU 或特定的 NUMA 节点。您也可以将其设置为范围。例如，要允许 SQL Server 在一台八路服务器上仅使用
  CPU0 到 CPU3，请执行以下语句：


  ```

  USE master;

  EXEC sp_configure ''show advanced option'',''1'';

  RECONFIGURE;

  ALTER SERVER CONFIGURATION SET PROCESS AFFINITY CPU = 0 TO 3;

  GO

  ```


  此配置立即生效。`affinity` 是一个特殊设置，我建议您仅在将控制权从 SQL Server 手中夺回有意义的情况下使用它，例如当您在同一台机器上运行多个
  SQL Server 实例并希望将它们彼此隔离时。


  即使 SQL Server 有多个 CPU 可用，如果单个查询不允许使用超过一个 CPU 来执行，那么优化器也会放弃并行计划选项。并行查询可以使用的最大 CPU
  数量由 SQL Server 配置的 `max degree of parallelism` 设置控制。默认值为 0，这允许所有 CPU（由 `affinity
  mask` 设置提供）都可用于并行查询。您也可以通过资源调控器控制并行度。如果您想允许并行查询在 `affinity mask` 设置限定的 CPU0 到 CPU3
  范围内使用不超过两个 CPU，请执行以下语句：


  ```

  USE master;

  EXEC sp_configure ''show advanced option'',''1'';

  RECONFIGURE;

  EXEC sp_configure ''max degree of parallelism'',2;

  RECONFIGURE;

  ```


  此更改立即生效，无需任何重启。`max degree of parallelism` 设置也可以使用 `MAXDOP` 查询提示在查询级别进行控制。


  ```

  SELECT  *

  FROM    dbo.t1

  WHERE   C1 = 1

  OPTION  (MAXDOP 2);

  ```


  更改 `max degree of parallelism` 设置最好由应用程序的需求及其上的工作负载决定。除非出现表明需要更改的迹象，否则我通常会将最大并行度保留为默认值。我通常会立即将并行成本阈值从其默认值
  5 向上调整。然而，理解成本阈值是为服务器设置这一点非常重要。挑选一个对服务器上所有数据库都最优的单一值可能有些棘手。


  由于并行查询需要更多内存，优化器在选择并行计划之前会确定可用内存量。所需内存量随着并行度的增加而增加。如果对于给定的并行度，并行计划的内存需求无法满足，那么 SQL
  Server 会在给定的工作负载上下文中自动降低并行度，或者完全放弃该查询的并行计划。您可以在图 15-6 的 `SELECT` 属性中看到这部分评估。


  具有非常高 CPU 开销的查询是并行计划的最佳候选者。示例包括连接大表、执行大量聚合以及对大型结果集进行排序，这些都是报表系统上的常见操作（在 OLTP 系统上较少）。对于通常在事务处理应用程序中发现的简单查询，初始化、同步和终止并行计划所需的额外协调超出了潜在的性能优势。


  一个查询是否简单，是通过将其估计执行成本与成本阈值进行比较来确定的。此成本阈值由 SQL Server 配置的 `cost threshold for parallelism`
  设置控制。默认情况下，此设置的值为 5，这意味着如果序列化计划的估计执行成本（CPU 和 IO）超过 5，那么优化器会考虑为查询使用并行计划。例如，要将成本阈值修改为
  35，请执行以下语句：


  ```

  USE master;

  EXEC sp_configure ''show advanced option'',''1'';

  RECONFIGURE;

  EXEC sp_configure ''cost threshold for parallelism'',35;

  RECONFIGURE;

  ```


  此更改立即生效，无需任何重启。如果 SQL Server 只有一个 CPU 可用，则此设置将被忽略。我发现当并行成本阈值设置得如此之低时，OLTP 系统会受到影响。通常将该值增加到
  30 到 50 之间的某个值会有所裨益。对于分析查询，较低的值可能更好。请务必根据您的系统测试此建议，以确保它对您有效。


  另一个选择是简单地查看缓存中的计划，然后根据其中的查询及其所代表的查询类型进行估计，以得出一个特定的数字。您可以将 OLTP 查询与报表查询分开，然后重点关注最可能从并行执行中受益的报表查询。取这些成本的平均值，并将您的成本阈值设置为该数字。


  DML 操作查询（`INSERT`、`UPDATE` 和 `DELETE`）是序列化执行的。但是，`INSERT` 语句的 `SELECT` 部分以及 `UPDATE`
  或 `DELETE` 语句的 `WHERE` 子句可以并行执行。实际的数据更改是序列化应用到数据库的。此外，如果优化器确定估计成本太低，则不会引入并行运算符。


  请注意，即使在执行时，SQL Server 也会确定当前系统工作负载和配置信息是否允许并行查询执行。如果允许并行查询执行，SQL Server 会确定最佳线程数，并将查询的执行分散到这些线程上。当一个查询开始并行执行时，它会使用相同数量的线程直到完成。SQL
  Server 在下次执行并行查询之前会重新检查最佳线程数。


  一旦通过使用序列化计划或并行计划确定了处理策略，优化器就会生成查询的执行计划。执行计划包含优化器决定用于执行查询的详细处理策略。这包括诸如数据检索、结果集连接、结果集排序等步骤。第
  4 章详细解释了如何分析执行计划中包含的处理步骤。为查询生成的执行计划会被保存在计划缓存中以备将来重用。


  综上所述，我们可以总结这个过程。优化器首先简化并规范化输入树。从那里它生成可能的逻辑树，这些逻辑树等同于该简化树。然后优化器将逻辑树转换为可能的物理树，对它们进行成本评估，并选择成本最低的树。简而言之，这就是优化过程。



  ### 执行计划缓存


  查询优化器生成的查询执行计划会被保存在 SQL Server 内存池的一个特殊区域中，称为`计划缓存`。将计划保存在缓存中，使得当相同查询再次提交时，SQL Server
  可以避免重新运行整个查询优化过程。SQL Server 支持不同的技术，例如`计划缓存老化`和`计划缓存类型`，以提高缓存计划的可重用性。它还存储两个二进制值，称为`查询哈希`和`查询计划哈希`。


  ### 注意


  在本章中，我将讨论 SQL Server 为提高执行计划重用的有效性而支持的技术 15。


  ## 执行计划的组成部分


  优化器生成的执行计划包含两个组件。


  *   `查询计划`：此组件包含指定执行查询所需的所有物理操作的命令。

  *   `执行上下文`：此组件在给定用户的上下文中维护查询的可变部分。


  我将在接下来的章节中更详细地介绍这些组件。


  ### 查询计划


  `查询计划`是一个可重入的、只读的数据结构，其中的命令指定了执行查询所需的所有物理操作。可重入属性允许多个连接并发访问查询计划。物理操作包括指定要访问哪些表和索引、应如何及按何种顺序访问它们、要在多个表之间执行的连接操作类型等等。`查询计划`中不存储任何用户上下文。


  ### 执行上下文


  `执行上下文`是另一个数据结构，用于维护查询的可变部分。尽管服务器在过程缓存中跟踪执行计划，但这些计划是上下文无关的。因此，每个执行查询的用户都会有一个独立的`执行上下文`，其中保存着特定于其执行的数据，例如参数值和连接详细信息。


  ## 执行计划的老化


  `计划缓存`是 SQL Server 缓冲区缓存的一部分，该缓存同时也保存数据页。随着新的执行计划被添加到`计划缓存`，`计划缓存`的大小不断增长，这会影响内存中有用数据页的保留。为了避免这种情况，SQL
  Server 动态控制执行计划在`计划缓存`中的保留时间，保留频繁使用的执行计划，并丢弃在一定时间内未被使用的计划。


  SQL Server 通过为每个执行计划关联一个“年龄”字段来跟踪其重用频率。当生成一个执行计划时，“年龄”字段会填充生成该计划的“成本”。一个需要大量优化的复杂查询，其“年龄”字段值会高于一个更简单查询的值。


  SQL Server 的延迟写入器进程（负责管理 SQL Server 中的大多数后台进程）会定期检查`计划缓存`中所有执行计划的当前成本。如果一个执行计划长时间未被重用，那么其当前成本最终会降至
  0。生成计划的成本越低（即计划越“便宜”），其成本降至 0 的速度就越快。一旦执行计划的成本达到 0，该计划就成为了从内存中移除的候选者。当内存压力增大到没有足够空闲内存来处理新请求时，SQL
  Server 会从`计划缓存`中移除所有成本为 0 的计划。然而，如果系统有足够的内存，并且有空闲内存页可用于处理新请求，那么成本为 0 的执行计划可以在`计划缓存`中保留很长时间，以便日后需要时可以重用。


  除了降低成本，每次计划被重用时，执行计划的成本也可以增加到其生成的最大成本（或者对于即席计划，增加到其当前成本）。例如，假设有两个执行计划，其生成成本分别为 100
  和 10。那么它们的起始成本值将分别是 100 和 10。如果两个执行计划都被立即重用，它们的“年龄”字段将被重置回各自的最大成本。在这些成本值下，除非第二个计划被更频繁地重用，否则延迟写入器会将第二个计划的成本降至
  0 的时间远早于第一个计划。因此，即使一个高成本计划的重用频率低于一个低成本计划，由于初始成本的影响，高成本计划保持在非零成本值的时间也可能更长。


  ## 总结


  SQL Server 基于成本的查询优化器，并非根据查询的确切语法，而是通过评估使用不同处理策略执行查询的成本来决定有效的执行计划。对使用不同处理策略的成本评估在多个优化阶段完成，以避免花费过多时间优化单个查询。然后，执行计划被缓存起来，以便在重新执行相同查询时节省生成执行计划的成本。


  在下一章中，我将讨论这些计划如何根据调用方式的不同，以不同方式从缓存中被重用。


  '
- '# 16. 执行计划缓存行为


  一旦生成执行计划所需的所有处理工作完成，如果 SQL Server 在每次调用查询时都丢弃已完成的工作并全部重做，那将是疯狂的。相反，它将创建的计划保存在服务器上一个名为`计划缓存`的内存空间中。本章将介绍如何监控`计划缓存`，以了解
  SQL Server 如何重用执行计划。


  在本章中，我将涵盖以下主题：


  *   如何分析执行计划缓存

  *   查询计划哈希和查询哈希作为识别待优化查询的机制

  *   提高执行计划缓存可重用性的方法

  *   查询存储与`计划缓存`之间的交互


  ## 分析执行计划缓存


  通过访问各种动态管理对象，你可以获取有关计划缓存中执行计划的大量信息。用于处理执行计划的初始动态管理对象是 `sys.dm_exec_cached_plans`。


  ```sql

  SELECT decp.refcounts,

  decp.usecounts,

  decp.size_in_bytes,

  decp.cacheobjtype,

  decp.objtype,

  decp.plan_handle

  FROM sys.dm_exec_cached_plans AS decp;

  ```


  表 16-1 展示了 `sys.dm_exec_cached_plans` 提供的一些有用信息。


  表 16-1: `sys.dm_exec_cached_plans`


  | **列名** | **描述** |

  | --- | --- |

  | `refcounts` | 表示缓存中引用此计划的其他对象的数量。 |

  | `usecounts` | 表示自该对象添加到缓存以来被使用的次数。 |

  | `size_in_bytes` | 表示存储在缓存中的计划的大小。 |

  | `cacheobjtype` | 指定此计划的类型；有多种类型，但特别值得关注的有：已编译计划：一个完整的执行计划。已编译计划存根：用于即席查询的标记（你可以在本章的“即席工作负载”部分找到更多详细信息）。分析树：为访问视图而存储的计划。
  |

  | `objtype` | 表示生成此计划的对象类型。同样，有多种类型，但特别值得关注的有：`Proc`、`Prepared`、`Adhoc`、`View`。
  |


  单独使用动态管理视图 `sys.dm_exec_cached_plans` 只能让你获得一小部分信息。动态管理对象最好与其他动态管理对象及其他系统视图结合使用。例如，将动态管理函数
  `sys.dm_exec_query_plan(plan_handle)` 与 `sys.dm_exec_cached_plans` 结合使用，还会返回 XML
  执行计划本身，以便你可以显示并操作它。如果你再引入 `sys.dm_exec_sql_text(plan_handle)`，你还可以检索原始的查询文本。在运行本章示例中的已知查询时，这可能看起来没什么用，但当你转到生产系统并开始从缓存中提取执行计划时，拥有原始查询可能会很方便。要获取有关缓存计划的聚合性能指标，你可以对批处理使用
  `sys.dm_exec_query_stats`，对存储过程和内联函数使用 `sys.dm_exec_procedure_stats`，对触发器使用 `sys.dm_exec_trigger_stats`
  来返回相同的数据。除其他数据外，查询哈希和查询计划哈希也存储在此动态管理函数中。最后，要找到当前正在执行的查询的执行计划，你可以使用 `sys.dm_exec_requests`。


  在以下部分中，我将通过实际查询这些动态管理对象来探讨计划缓存的工作原理。


  ## 执行计划重用


  当提交一个查询时，SQL Server 会检查计划缓存中是否存在匹配的执行计划。如果未找到，SQL Server 将执行查询编译和优化以生成新的执行计划。然而，如果该计划存在于计划缓存中，它将与私有执行上下文一起被重用。这节省了原本将花费在计划生成上的
  CPU 周期。如果某个计划不在缓存中，但该计划在查询存储中被标记为强制执行，则优化过程照常进行，但会使用强制计划（假设它仍然是有效计划）。


  查询提交到 SQL Server 时通常带有筛选条件以限制结果集的大小。相同的查询通常会使用不同的筛选条件值重新提交。例如，考虑以下查询：


  ```sql

  SELECT soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  JOIN Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE soh.CustomerID = 29690

  AND sod.ProductID = 711;

  ```


  当此查询被提交时，优化器会创建一个执行计划并将其保存在计划缓存中，以备将来重用。如果使用不同的筛选条件值重新提交此查询——例如 `soh.CustomerID
  = 29500`——重用先前提供的筛选条件值所创建的执行计划将是有益的（除非这是一个糟糕的参数嗅探场景）。为一个筛选条件值创建的执行计划是否可以重用于另一个筛选条件值，取决于查询是如何提交给
  SQL Server 的。


  提交到 SQL Server 的查询（或工作负载）可以大致分为两类，这两类决定了当查询的变量部分发生变化时，执行计划是否可重用。


  *   即席查询


  *   已参数化查询


  ### 提示


  要测试本章中 `sys.dm_exec_cached_plans` 的输出，有时需要通过执行 `DBCC FREEPROCCACHE` 从缓存中删除计划。除非你按照这里概述的方法传递计划句柄，否则不要在生产服务器上运行此命令。否则，你将清空缓存，并在执行时要求重建所有执行计划，这会给你的生产系统带来严重压力，而且没有充分的理由。你可以使用
  `DBCC FREEPROCCACHE(plan_handle)` 来针对特定计划。使用我已经讨论过并在后面演示的动态管理对象来检索 `plan_handle`。你也可以使用
  `ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE CACHE` 来清空单个数据库的缓存。然而，同样，除非你打算删除该数据库的所有计划，否则我不建议在生产服务器上运行此命令。


  ## 即席工作负载


  查询可以在没有显式地将变量与查询分离的情况下提交到 SQL Server。这些在未显式地将查询的变量部分转换为参数的情况下执行的查询被称为*即席工作负载*（或查询）。到目前为止，本书中的大多数示例都是即席查询，例如前面的代码清单。


  如果查询按原样提交，没有显式地将任何一个硬编码值转换为参数（可以在执行时提供给查询），那么该查询就是即席查询。使用 `DECLARE` 语句将值设置为局部变量与参数不同。


  在此查询中，筛选条件值嵌入在查询本身中，没有被显式参数化以从查询中分离出来。这意味着你无法重用此查询的执行计划，除非你使用相同的值，并且所有的间距和回车符都完全相同。但是，查询中使用值的位置可以通过三种不同的方式进行显式参数化，这些方式被共同归类为已参数化工作负载。



  ### 预准备的工作负载


  `预准备的工作负载`（或查询）显式地对查询的可变部分进行参数化，从而使得查询计划不依赖于可变部分的具体值。在 SQL Server 中，可以通过以下三种方法将查询作为预准备的工作负载提交：


  *   `存储过程`：允许保存一组可以接受和返回用户提供参数的 SQL 语句。

  *   `sp_executesql`：允许执行一条可能包含用户参数的 SQL 语句或 SQL 批处理，而无需保存该语句或批处理。

  *   `Prepare/execute 模型`：允许 SQL 客户端请求生成一个查询计划，该计划可在后续使用不同参数值执行同一查询时重复使用，而无需在 SQL
  Server 中保存 SQL 语句。这是诸如 Entity Framework 之类的 ORM 工具最常见的做法。


  例如，前面展示的 `SELECT` 语句可以通过存储过程显式地参数化，如下所示：


  ```sql

  CREATE OR ALTER PROC dbo.BasicSalesInfo

  @ProductID INT,

  @CustomerID INT

  AS

  SELECT soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  JOIN Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE soh.CustomerID = @CustomerID

  AND sod.ProductID = @ProductID;

  ```


  该存储过程中包含的 `SELECT` 语句的计划将嵌入参数（`@ProductID` 和 `@Customerld`），而不是具体的变量值。我将在稍后更详细地介绍这些方法。


  ### 即席工作负载的计划可重用性


  当查询作为即席工作负载提交时，SQL Server 会生成一个执行计划并将其存储在缓存中。如果相同的即席查询被再次提交，该计划可以被重用。由于没有参数，硬编码的值会作为计划的一部分存储。要使计划能从缓存中重用，T-SQL
  语句必须完全匹配。这包括所有的空格、回车符以及计划附带的任何值。如果其中任何一项发生变化，计划就无法重用。


  为了理解这一点，请考虑之前使用过的即席查询，如下所示：


  ```sql

  SELECT  soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM    Sales.SalesOrderHeader AS soh

  JOIN    Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE   soh.CustomerID = 29690

  AND sod.ProductID = 711;

  ```


  为此即席查询生成的执行计划基于查询的确切文本，包括注释、大小写、尾随空格和硬回车。你必须使用确切的文本来从 `sys.dm_exec_cached_plans`
  中检索信息。


  ```sql

  SELECT    c.usecounts

  ,c.cacheobjtype

  ,c.objtype

  FROM       sys.dm_exec_cached_plans c

  CROSS APPLY sys.dm_exec_sql_text(c.plan_handle) t

  WHERE      t.text =  ''SELECT  soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM    Sales.SalesOrderHeader AS soh

  JOIN    Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE   soh.CustomerID = 29690

  AND sod.ProductID = 711;'';

  ```


  图 16-1 显示了 `sys.dm_exec_cached_plans` 的输出。


  ![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig1_HTML.jpg](img/323849_5_En_16_Fig1_HTML.jpg)


  图 16-1：`sys.dm_exec_cached_plans` 的输出


  从图 16-1 中你可以看到，针对上述即席查询生成并保存了一个已编译的计划到计划缓存中。为了找到特定的查询，我在 `WHERE` 子句中使用了查询本身。你可以看到，到目前为止该计划已被使用了一次（`usecounts
  = 1`）。如果重新执行此即席查询，SQL Server 将重用计划缓存中现有的可执行计划，如图 16-2 所示。


  ![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig2_HTML.jpg](img/323849_5_En_16_Fig2_HTML.jpg)


  图 16-2：从计划缓存中重用可执行计划


  在图 16-2 中，你可以看到先前查询的可执行计划的 `usecounts` 值已增加到 2，这确认了该查询的现有计划已被重用。如果此查询被重复执行，每次都会重用现有的计划。


  由于为前述查询生成的计划包含了筛选条件值，因此该计划的可重用性仅限于使用相同的筛选条件值。重新执行查询，但将 `son.CustomerlD` 改为 `29500`。


  ```sql

  SELECT soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  JOIN Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE soh.CustomerID = 29500

  AND sod.ProductID = 711;

  ```


  现有的计划无法被重用，如果照原样重新运行 `sys.dm_exec_cached_plans`，你会发现执行计数没有增加（图 16-3）。


  ![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig3_HTML.jpg](img/323849_5_En_16_Fig3_HTML.jpg)


  图 16-3：`sys.dm_exec_cached_plans` 显示现有计划未被重用


  相反，我会调整对 `sys.dm_exec_cached_plans` 的查询。


  ```sql

  SELECT  c.usecounts,

  c.cacheobjtype,

  c.objtype,

  t.text,

  c.plan_handle

  FROM    sys.dm_exec_cached_plans c

  CROSS APPLY sys.dm_exec_sql_text(c.plan_handle) t

  WHERE   t.text LIKE ''SELECT  soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM    Sales.SalesOrderHeader AS soh

  JOIN    Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID%'';

  ```


  你可以在图 16-4 中看到此查询的输出。


  ![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig4_HTML.jpg](img/323849_5_En_16_Fig4_HTML.jpg)


  图 16-4：`sys.dm_exec_cached_plans` 显示现有计划无法被重用


  从图 16-4 的 `sys.dm_exec_cached_plans` 输出中，你可以看到查询之前的计划未被重用；相应的 `usecounts` 值保持在旧值
  2。系统没有重用现有计划，而是为该查询生成了一个新计划，并以新的 `plan_handle` 保存在计划缓存中。如果使用不同的筛选条件值重复执行此即席查询，每次都会生成一个新的执行计划。这种对即席查询执行计划的低效重用，通过消耗额外的
  CPU 周期来重新生成计划，从而增加了 CPU 的负载。


  总而言之，即席计划缓存使用语句级缓存，并且仅限于精确的文本匹配。如果即席查询不复杂，SQL Server 可以通过一个称为 `简单参数化` 的功能隐式地对查询进行参数化，以提高计划的可重用性。简单参数化的查询定义仅限于非常基本的情况，例如仅涉及单个表的即席查询。如前面的示例所示，大多数需要连接操作的查询无法被自动参数化。



  ### 为即席工作负载优化


  如果您的服务器主要支持即席查询，则有可能实现小幅度的性能改进。服务器上有一个选项称为 `optimize for ad hoc workloads`。在服务器上启用此选项会改变引擎处理即席查询的方式。第一次调用查询时，它不再保存完整的已编译计划，而是存储一个编译计划存根。该存根没有关联完整的执行计划，从而节省了其所需的存储空间以及保存到缓存的时间。此选项可以在不重新启动服务器的情况下启用。


  ```sql

  EXEC sp_configure ''show advanced option'', ''1'';

  GO

  RECONFIGURE

  GO

  EXEC sp_configure ''optimize for ad hoc workloads'', 1;

  GO

  RECONFIGURE;

  ```


  更改选项后，清空缓存，然后重新运行即席查询。修改针对 `sys.dm_exec_cached_plans` 的查询，使其包含 `size_in_bytes` 列；然后运行它，结果如图
  16-5 所示。


  ![`../images/323849_5_En_16_Chapter/323849_5_En_16_Fig5_HTML.jpg`](img/323849_5_En_16_Fig5_HTML.jpg)


  图 16-5

  `sys.dm_exec_cached_plans` 显示编译计划存根


  图 16-5 中的 `cacheobjtype` 列显示缓存中的新对象是一个编译计划存根。与完整的编译计划相比，可以为更多的查询创建存根，对服务器的影响更小。但当下一次执行即席查询时，将创建一个完整的编译计划。要查看此效果，请再运行一次查询，并检查
  `sys.dm_exec_cached_plans` 中的结果，如图 16-6 所示。


  ![`../images/323849_5_En_16_Chapter/323849_5_En_16_Fig6_HTML.jpg`](img/323849_5_En_16_Fig6_HTML.jpg)


  图 16-6

  编译计划存根已变为编译计划


  检查 `cacheobjtype` 的值。它已从 `Compiled Plan Stub` 变为 `Compiled Plan`。最后，要查看存根与完整计划之间的真正区别，请查看图
  16-5 和图 16-6 中的 `size_in_bytes` 列。大小从存根中的 424 变为完整计划中的 73728。这精确地显示了处理大量即席查询时节省的资源。在继续之前，请确保禁用
  `optimize for ad hoc workloads`。


  ```sql

  EXEC sp_configure ''optimize for ad hoc workloads'', 0;

  GO

  RECONFIGURE;

  GO

  EXEC sp_configure ''show advanced option'', ''0'';

  GO

  RECONFIGURE;

  ```


  就个人而言，我认为在几乎任何系统上实施此选项都没有什么缺点。与所有建议一样，您应该进行测试以确保您的系统没有例外情况。然而，与通过不存储那些只会被使用一次的计划所获得的整体内存节省相比，在第二次调用时将计划写入内存的成本是微不足道的。根据我所有的测试和经验，这是一个纯收益，缺点很小。您现在还可以使用数据库范围内的配置设置在
  Azure SQL Database 中启用此功能：


  ```sql

  ALTER DATABASE SCOPED CONFIGURATION SET OPTIMIZE_FOR_AD_HOC_WORKLOADS = ON;

  ```


  #### 简单参数化


  当提交即席查询时，SQL Server 会分析查询以确定传入文本的哪些部分可能是参数。它会查看即席查询的可变部分，以确定是否可以安全地自动对它们进行参数化，并在查询中使用参数（而不是可变部分），从而使查询计划可以独立于变量值。这种自动将查询的可变部分转换为参数的功能（即使没有显式参数化，使用的是预加载工作负载技术）称为
  `简单参数化`。


  在简单参数化期间，SQL Server 确保如果即席查询被转换为参数化模板，参数值的变化不会广泛改变计划需求。确定简单参数化安全后，SQL Server 为即席查询创建一个参数化模板，并将参数化计划保存在计划缓存中。


  要理解 SQL Server 的简单参数化功能，请考虑以下查询：


  ```sql

  SELECT *

  FROM Person.Address AS a

  WHERE a.AddressID = 42;

  ```


  当提交此即席查询时，SQL Server 可以按原样处理此查询以进行计划创建。但是，在查询执行之前，SQL Server 会尝试确定是否可以安全地对其进行参数化。在确定查询的可变部分可以在不影响查询基本结构的情况下进行参数化后，SQL
  Server 会对查询进行参数化，并为参数化查询生成计划。您可以从图 16-7 所示的 `sys.dm_exec_cached_plans` 输出中观察到这一点。


  ![`../images/323849_5_En_16_Chapter/323849_5_En_16_Fig7_HTML.jpg`](img/323849_5_En_16_Fig7_HTML.jpg)


  图 16-7

  `sys.dm_exec_cached_plans` 输出显示自动参数化计划


  参数化查询的可执行计划的 `usecounts` 恰当地将重用次数表示为 1。另外，请注意，自动参数化可执行计划的 `objtype` 不再是 `Adhoc`；它反映了该计划是用于参数化查询的事实，即
  `Prepared`。


  原始的即席查询即使没有执行，也会被编译以创建简单参数化所需的查询树。即席查询的编译计划将保存在计划缓存中。但在为即席查询创建可执行计划之前，SQL Server
  发现自动参数化是安全的，因此自动对查询进行了参数化以进行进一步处理。


  参数值基于即席查询的值。让我们编辑之前的查询以使用不同的 `AddressID` 值。


  ```sql

  SELECT *

  FROM Person.Address AS a

  WHERE a.AddressID = 42000;

  ```


  如果我们重新查询 `sys.dm_exec_cached_plans`，我们将看到已添加了一个额外的计划，如图 16-8 所示。


  ![`../images/323849_5_En_16_Chapter/323849_5_En_16_Fig8_HTML.jpg`](img/323849_5_En_16_Fig8_HTML.jpg)


  图 16-8

  具有简单参数化的附加计划


  如图 16-8 所示，已创建了一个具有 `int` 数据类型参数的新计划。您可能会看到 `smallint` 和 `bigint` 的计划。这确实给缓存增加了一些开销，但不如因各种不同值而需要大量额外计划所带来的开销那么大。以下是简单参数化的完整查询文本：


  ```sql

  (@1 int)SELECT * FROM [Person].[Address] [a] WHERE [a].[AddressID]=@1

  ```


  由于此即席查询已自动参数化，如果您使用可变部分的不同值重新执行查询，SQL Server 将重用现有的执行计划。


  ```sql

  SELECT *

  FROM Person.Address AS a

  WHERE a.AddressID = 52;

  ```


  图 16-9 显示了 `sys.dm_exec_cached_plans` 的输出。



  '
- "# 16.3.2 简单参数化与执行计划重用\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig9_HTML.jpg](img/323849_5_En_16_Fig9_HTML.jpg)\n\
  \n**图 16-9**\n`sys.dm_exec_cached_plans` 输出显示自动参数化计划的重用\n\n从图 16-9 可以看出，尽管为这个即席查询生成了一个新计划（即使用\
  \ `Addressld` 值为 52 的那个），但现有的预备计划被重用了，这由相应的 `usecounts` 值增加到 2 所表明。即席查询可以使用不同的筛选条件值反复执行，重用现有的执行计划——尽管两个查询的原始文本并不匹配。因为它们参数化后的查询会是相同的，所以得以重用。\n\
  \n关于缓存执行计划的参数化查询，还有另一点需要注意。在图 16-7 中，观察参数化查询的主体与提交的即席查询主体并不完全匹配。例如，在即席查询中，任何对象上都没有方括号。\n\
  \n意识到即席查询可以安全地进行自动参数化后，SQL Server 会选择一个模板来替代查询的确切文本。\n\n为了理解这一点的重要性，请考虑以下查询：\n\n\
  ```sql\nSELECT  a.*\nFROM    Person.Address AS a\nWHERE   a.AddressID BETWEEN 40\
  \ AND 60;\n```\n\n图 16-10 显示了 `sys.dm_exec_cached_plans` 的输出。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig10_HTML.jpg](img/323849_5_En_16_Fig10_HTML.jpg)\n\
  \n**图 16-10**\n`sys.dm_exec_cached_plans` 输出显示使用模板的简单参数化\n\n从图 16-10 可以看出，SQL Server\
  \ 对查询执行了简化过程，并用一对 `>=` 和 `<=` 操作符替代了 `BETWEEN` 操作符，它们是等价的。然后，参数化步骤再次修改了查询。这意味着，如果没有提交前面使用\
  \ `BETWEEN` 子句的即席查询，而是提交了一个使用一对 `>=` 和 `<=` 的类似查询，SQL Server 也能够重用现有的执行计划。为了确认此行为，让我们按如下方式修改即席查询：\n\
  \n```sql\nSELECT  a.*\nFROM    Person.Address AS a\nWHERE   a.AddressID >= 40\n\
  AND a.AddressID <= 60;\n```\n\n图 16-11 显示了 `sys.dm_exec_cached_plans` 的输出。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig11_HTML.jpg](img/323849_5_En_16_Fig11_HTML.jpg)\n\
  \n**图 16-11**\n`sys.dm_exec_cached_plans` 输出显示自动参数化计划的重用\n\n从图 16-11 可以看出，现有的计划被重用了，即使该查询在语法上与之前执行的查询不同。SQL\
  \ Server 生成的自动参数化计划不仅允许在使用不同变量值重新提交查询时重用现有计划，也允许查询具有相同模板形式时重用。\n\n#### 简单参数化的限制\n\
  \nSQL Server 在简单参数化过程中非常保守，因为一个糟糕的计划的成本可能远远超过生成一个新计划的成本。这种保守方法可以防止 SQL Server 创建不安全的自动参数化计划。因此，简单参数化仅限于相当简单的情况，例如只涉及单个表的即席查询。涉及两个（或更多）表之间联接操作的即席查询（如“即席工作负载的计划可重用性”一节前面所示）则被认为不适合进行简单参数化。\n\
  \n在一个可扩展的系统中，不要依赖简单参数化来实现计划重用。SQL Server 的简单参数化功能只是对哪些变量和常量可以进行参数化做出有根据的猜测。与其依赖\
  \ SQL Server 进行简单参数化，不如在构建应用程序时以编程方式明确指定参数化。\n\n\n#### 强制参数化\n\n如果你正在处理的系统主要由即席查询组成，你可能希望尝试增加接受参数化的查询数量。你可以修改一个数据库，尝试在特定限制下强制所有查询都进行参数化，就像简单参数化一样。\n\
  \n为此，你需要使用 `ALTER DATABASE` 将数据库选项 `PARAMETERIZATION` 更改为 `FORCED`，如下所示：\n\n```\n\
  ALTER DATABASE AdventureWorks2017 SET PARAMETERIZATION FORCED;\n```\n\n但是，如果你的查询有任何复杂之处，你将不会获得简单参数化。\n\
  \n```\nSELECT ea.EmailAddress,\ne.BirthDate,\na.City\nFROM Person.Person AS p\n\
  JOIN HumanResources.Employee AS e\nON p.BusinessEntityID = e.BusinessEntityID\n\
  JOIN Person.BusinessEntityAddress AS bea\nON e.BusinessEntityID = bea.BusinessEntityID\n\
  JOIN Person.Address AS a\nON bea.AddressID = a.AddressID\nJOIN Person.StateProvince\
  \ AS sp\nON a.StateProvinceID = sp.StateProvinceID\nJOIN Person.EmailAddress AS\
  \ ea\nON p.BusinessEntityID = ea.BusinessEntityID\nWHERE ea.EmailAddress LIKE 'david%'\n\
  AND sp.StateProvinceCode = 'WA';\n```\n\n当你运行这个查询时，简单参数化不会被应用，正如你在图 16-12 中看到的那样。\n\
  \n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig12_HTML.jpg](img/323849_5_En_16_Fig12_HTML.jpg)\n\
  \n图 16-12\n更复杂的查询不会被参数化\n\n在 `sys.dm_exec_cached_plans` 的输出中看不到任何预备计划。但是，如果我们使用之前的脚本将\
  \ `PARAMETERIZATION` 设置为 `FORCED`，我们可以在清除缓存后重新运行查询。\n\n```\nALTER DATABASE SCOPED\
  \ CONFIGURATION CLEAR PROCEDURE_CACHE;\n```\n\n`sys.dm_exec_cached_plans` 的输出发生了变化，看起来不同了，如图\
  \ 16-13 所示。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig13_HTML.jpg](img/323849_5_En_16_Fig13_HTML.jpg)\n\
  \n图 16-13\n强制参数化改变了执行计划\n\n现在在第三行可以看到一个预备计划。然而，只提供了一个参数 `@0 varchar(8000)`。如果你从\
  \ `sys.dm_exec_querytext` 中获取预备计划的完整文本并进行格式化，它看起来像这样：\n\n```\n(@0 varchar(8000))\n\
