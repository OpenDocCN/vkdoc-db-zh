  ### 注意


  因为一个表只能有一个聚集索引，并且该索引就是数据存储的位置，我通常会将聚集索引保留给最常用的数据访问路径。


  ### 非聚集索引相对于聚集索引的优势


  正如你在上一节所学，在以下情况下，非聚集索引优于聚集索引：


  *   当索引键大小较大时。

  *   为帮助避免阻塞，让数据库读取器在非聚集索引的页上工作，而数据库写入器修改数据页中的其他列（未包含在非聚集索引中）；在这种情况下，处理数据页的写入器不会阻塞读取器，因为读取器无需访问基础表，即可从非聚集索引中获取所有必需的列值。我将在第
  13 章详细解释这一点。

  *   当查询引用的所有（来自表的）列都可以安全地容纳在非聚集索引本身中时，如本节所述。

  *   当你针对聚集列存储索引执行点查询或有限范围查询时。聚集列存储索引非常适合分析式查询，但它完全不擅长点查找。这就是为什么你要专门为点查询添加一个非聚集索引。


  如前所述，使用非聚集索引时的数据检索性能通常比使用聚集索引时差，因为需要从非聚集索引行跳转到基础表中的数据行，这会产生开销。在不需要跳转到数据行的情况下，非聚集索引的性能应该与聚集索引一样好，甚至更好。如果非聚集索引（键加上页面级别的任何包含列）包含了表中所需的所有列，这种情况是可能的。


  为了理解非聚集索引何时能优于聚集索引，请考虑以下示例。假设你需要检查在 2008 年 6 月至 2008 年 9 月之间到期的信用卡。你可能有一个返回大量行的查询，如下所示：


  ```

  SELECT cc.CreditCardID,

  cc.CardNumber,

  cc.ExpMonth,

  cc.ExpYear

  FROM Sales.CreditCard cc

  WHERE cc.ExpMonth

  BETWEEN 6 AND 9

  AND cc.ExpYear = 2008

  ORDER BY cc.ExpMonth;

  ```


  以下是 I/O 和时间结果。图 8-22 显示了执行计划。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig22_HTML.jpg](img/323849_5_En_8_Fig22_HTML.jpg)


  图 8-22

  扫描聚集索引时的执行计划


  ```

  Table ''CreditCard''. Scan count 1, logical reads 189

  CPU time = 0 ms,  elapsed time = 176 ms.

  ```


  聚集索引建立在主键上，虽然对该表的大多数访问可能都是通过该键进行，使得该索引有用，但在这种情况下，聚集索引的表现并不符合你的需求。虽然你可以扩展索引的定义以包含查询中的所有其他列，但这并非使聚集索引功能正常所必需的，并且会干扰主键的操作。相反，你可以使用
  `INCLUDE` 操作将定义的列存储在索引的叶级别。它们不会以任何方式影响索引的键结构，而是通过牺牲一些额外的磁盘空间，提供使非聚集索引成为覆盖索引的能力（稍后将更详细地介绍）。在这种情况下，创建一个不同的索引是合适的。


  ```

  CREATE NONCLUSTERED INDEX ixTest

  ON Sales.CreditCard

  (

  ExpYear,

  ExpMonth)

  INCLUDE

  (

  CardNumber);

  ```


  现在再次运行查询，结果如下：


  ```

  Table ''CreditCard''. Scan count 1, logical reads 12

  CPU time = 0 ms,  elapsed time = 152 ms.

  ```


  图 8-23 显示了相应的执行计划。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig23_HTML.jpg](img/323849_5_En_8_Fig23_HTML.jpg)


  图 8-23

  使用非聚集索引时的执行计划



