  如你所见，即使使用内存优化表，也完全有可能获得正常的执行计划。运算符甚至都是相同的。在这个例子中，你有三种不同的索引查找操作。其中两个是针对你创建内存优化表时定义的非聚集哈希索引，另一个是针对标准表的标准聚集索引查找。你可能还会注意到，此计划上的估计成本总和达到了
  101%。在处理内存优化表时，你偶尔会看到这种异常，因为优化器为它们计算的成本与常规表截然不同。


  主要的性能提升来自于没有锁和闩锁，允许在进行大规模插入和更新的同时进行查询。但是，查询本身运行得也更快。之前的查询产生了如图 24-3 所示的执行时间和读取次数。


  ![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig3_HTML.jpg](img/323849_5_En_24_Fig3_HTML.jpg)


  **图 24-3** 内存优化表的查询指标


  在 `AdventureWorks2017` 数据库上运行类似的查询，结果如图 24-4 所示。


  ![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig4_HTML.jpg](img/323849_5_En_24_Fig4_HTML.jpg)


  **图 24-4** 常规表的查询指标



  '
- "# 内存表与索引\n\n虽然很明显，使用内存表的执行时间要好得多，但尚不清楚的是读取操作是如何处理的。但是，由于我谈论的是从内存存储中读取，而不是内存中的页面或磁盘上的页面，而是哈希索引，因此在衡量性能方面情况完全不同。您不会使用与之前完全相同的度量标准，而是将依赖于执行时间。在这种情况下，读取是对系统活动的一种度量，因此您可以预期，较高的值意味着更多的数据访问，而较低的值意味着更少的数据访问。\n\
  \n在表就位并证明了插入和选择的性能都有所提高之后，让我们来谈谈您可以与内存表一起使用的索引，以及它们与标准索引有何不同。\n\n### 内存索引\n\n一个内存表一次最多可以创建八个索引。但是，每个内存优化表必须至少有一个索引。由主键定义的索引也算数。持久表必须有一个主键。您可以创建三种索引类型：之前使用的非聚集哈希索引、非聚集索引和列存储索引。这些索引与标准表创建的索引类型不同。首先，它们以内存表相同的方式在内存中维护。其次，关于索引持久性的规则与内存表相同。内存索引也没有固定的页面大小，因此它们不会受到碎片化的影响。让我们更详细地讨论每种索引类型。\n\
  \n#### 哈希索引\n\n哈希索引并不是仅仅存储在内存中的平衡树索引。相反，哈希索引使用预定义的哈希桶（或表）和键的哈希值来提供检索表数据的机制。SQL Server\
  \ 有一个哈希函数，对于提供的输入，该函数始终会产生一个恒定的哈希值。这意味着对于给定的键值，您将始终具有相同的哈希值。您可以在哈希桶中存储哈希值的多个副本。拥有哈希值来检索点查找（单行）使得操作效率极高，也就是说，只要您没有遇到大量的哈希冲突。哈希冲突是指多个值存储在同一个位置。\n\
  \n这意味着正确使用哈希索引的关键是在各个桶中实现正确的值分布。您可以通过定义索引的桶数来实现这一点。对于我创建的第一个表 `dbo.Address`，我将桶数设置为\
  \ 50,000。当前表中有 19,000 行。因此，通过 50,000 的桶数，我确保有足够的存储空间来容纳现有的值集，并提供了充足的未来增长余量。您需要设置桶数，使其足够大但不过大。如果桶数太小，您将在一个桶中存储大量数据，严重影响系统高效检索数据的能力。简而言之，最好让您的桶足够大。如果您查看图\
  \ 24-5，您可以看到以不同方式展示这一点。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig5_HTML.png](img/323849_5_En_24_Fig5_HTML.png)\n\
  \n图 24-5\n\n大量桶与少量桶中的哈希值\n\n第一组桶具有所谓的*浅分布*，即少量哈希值分布在大量桶中。这是一个更优的存储计划。如您所见，一些桶可能是空的，但查找速度很快，因为每个桶只包含一个值。第二组桶显示了较小的桶数，或称为*深分布*。这意味着在给定桶中有更多的哈希值，需要在桶内进行扫描以识别单个哈希值。\n\
  \nMicrosoft 关于桶数的建议是介于表行数的一到两倍之间。但是，由于您不能更改内存表，因此您还需要考虑预计的增长。如果您认为您的内存表在未来三到六个月内可能会增长到原来的三倍，您可能希望扩大桶数。桶数过大时您会遇到的唯一问题是扫描需要更长时间，因此您将分配更多内存。但是，如果您的查询很可能导致扫描，那么您真的不应该使用非聚集哈希索引。相反，应该转而使用非聚集索引。目前的建议是，在设置桶数时，不超过您可能处理的唯一值数量的十倍。\n\
  \n您还需要担心每个哈希值可以返回多少个值。唯一索引和主键是使用哈希索引的首要候选，因为它们始终是唯一的。Microsoft 的建议是，如果平均而言，对于任何一个哈希值，您会看到超过五个值，那么您应该放弃非聚集哈希索引，转而使用非聚集索引。这是因为哈希桶只是充当指向存储在该桶中的第一行的指针。然后，如果桶中存储了重复或额外的值，第一行指向第二行，每一行依次指向下一行。这可能会将点查找转变为扫描操作，从而严重影响性能。这就是为什么具有少量重复（少于五个）或唯一值时，哈希索引效果最佳。\n\
  \n要查看哈希表中索引的分布情况，您可以使用 `sys.dm_db_xtp_hash_index_stats`。\n\n```sql\nSELECT i.name\
  \ AS [index name],\nhs.total_bucket_count,\nhs.empty_bucket_count,\nhs.avg_chain_length,\n\
  hs.max_chain_length\nFROM sys.dm_db_xtp_hash_index_stats AS hs\nJOIN sys.indexes\
  \ AS i\nON hs.object_id = i.object_id\nAND hs.index_id = i.index_id\nWHERE OBJECT_NAME(hs.object_id)\
  \ = 'Address';\n```\n\n图 24-6 显示了此查询的结果。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig6_HTML.jpg](img/323849_5_En_24_Fig6_HTML.jpg)\n\
  \n图 24-6\n\n查询 `sys.dm_db_xtp_hash_index_stats` 的结果\n\n由此，您可以看到关于哈希索引创建和维护方式的一些有趣事实。您会注意到总桶数不是我设置的值\
  \ 50,000。桶数被向上舍入到最接近的 2 的幂，在本例中是 65,536。有 48,652 个空桶。平均链长度，因为这是一个唯一索引，值为 1，因为值是唯一的。存在一些链值，因为当行被修改或更新时，在一切解决之前会有数据版本存储。\n\
  \n\n### 非聚集索引\n\n非聚集索引基本上就像常规索引一样，但它们与数据一起存储在内存中，以辅助数据检索。它们也有指向数据存储位置的指针，类似于非聚集索引在堆表上的行为。内存中非聚集索引与标准非聚集索引的一个有趣区别是，SQL\
  \ Server 无法从内存中索引以相反顺序检索数据。其他行为似乎与标准索引大致相同。\n\n要查看非聚集索引的实际效果，让我们看这个查询：\n\n```sql\n\
  SELECT  a.AddressLine1,\n        a.City,\n        a.PostalCode,\n        sp.Name\
  \ AS StateProvinceName,\n        cr.Name AS CountryName\nFROM    dbo.Address AS\
  \ a\nJOIN    dbo.StateProvince AS sp\n        ON sp.StateProvinceID = a.StateProvinceID\n\
  JOIN    dbo.CountryRegion AS cr\n        ON cr.CountryRegionCode = sp.CountryRegionCode\n\
  WHERE   a.City = 'Walla Walla';\n```\n\n目前的性能如图 24-7 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig7_HTML.jpg](img/323849_5_En_24_Fig7_HTML.jpg)\n\
  \n图 24-7\n没有索引时的查询指标\n\n图 24-8 显示了执行计划。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig8_HTML.jpg](img/323849_5_En_24_Fig8_HTML.jpg)\n\
  \n图 24-8\n导致表扫描的执行计划\n\n虽然内存中的表扫描肯定比磁盘上表的相同扫描要快，但这仍然不是一个好的情况。另外，考虑到优化器认为需要满足 `Merge\
  \ Join` 而产生的 `Filter` 操作和 `Sort` 操作的额外工作，这是一个有问题的查询。因此，你应该给表添加索引以加速它。\n\n但是，你不能直接在\
  \ `dbo.Address` 表上运行 `CREATE INDEX`。相反，你有两个选择：重新创建表或修改表。你需要测试你的系统以确定哪种方法效果更好。用于向内存中表添加索引的\
  \ `ALTER TABLE` 命令可能成本很高。如果你想删除表并重新创建它，表创建脚本现在看起来像这样：\n\n```sql\nCREATE TABLE dbo.Address\
  \ (\n    AddressID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY NONCLUSTERED HASH\n \
  \       WITH (BUCKET_COUNT = 50000),\n    AddressLine1 NVARCHAR(60) NOT NULL,\n\
  \    AddressLine2 NVARCHAR(60) NULL,\n    City NVARCHAR(30) NOT NULL,\n    StateProvinceID\
  \ INT NOT NULL,\n    PostalCode NVARCHAR(15) NOT NULL,\n    ModifiedDate DATETIME\
  \ NOT NULL\n        CONSTRAINT DF_Address_ModifiedDate\n        DEFAULT (GETDATE()),\n\
  \    INDEX nci NONCLUSTERED (City))\n    WITH (MEMORY_OPTIMIZED = ON);\n```\n\n\
  使用 `ALTER TABLE` 命令创建相同的索引如下所示：\n\n```sql\nALTER TABLE dbo.Address ADD INDEX nci\
  \ (City);\n```\n\n将数据重新加载到新创建的表中后，你可以再次尝试查询。这次在我的系统上运行时间为 800 微秒，比之前的 3.7 毫秒快得多。读取次数保持不变。图\
  \ 24-9 显示了执行计划。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig9_HTML.jpg](img/323849_5_En_24_Fig9_HTML.jpg)\n\
  \n图 24-9\n利用非聚集索引改进的执行计划\n\n如你所见，非聚集索引被使用而不是表扫描来提高性能，就像你在标准表上的索引所期望的那样。然而，与标准表不同，虽然这个查询拉取了不属于非聚集索引的列，但不需要键查找来从内存中的表检索数据，因为每个索引直接指向内存中所需数据的存储位置。这又是相对于标准表行为的一个微小但重要的改进。\n\
  \n##### 列存储索引\n\n关于向内存中的表添加列存储索引，其实没有太多可说的。由于列存储索引在包含 100,000 行或更多行的表上效果最佳，因此你需要相当多的内存来支持它们在内存中表上的实现。你被限制为聚集列存储索引。你也不能将筛选的列存储索引应用于内存中的表。除了这些限制之外，创建内存中的列存储索引与我们已经见过的索引相同：\n\
  \n```sql\nALTER TABLE dbo.Address ADD INDEX ccs CLUSTERED COLUMNSTORE;\n```\n\n\
  ### 统计信息维护\n\n在索引创建方式上，内存中的表与标准表相比存在许多根本差异。索引维护（即索引碎片整理）不是你必须考虑的事情。然而，你确实需要担心内存中表的统计信息。内存中的索引会维护需要更新的统计信息。你还需要有关内存中索引的信息，例如它们是使用扫描还是查找进行访问的。虽然跟踪所有这些的需求是相同的，但实现的机制却不同。\n\
  \n实际上，你无法查看哈希索引上的统计信息。你可以对索引运行 `DBCC SHOW_STATISTICS`，但输出看起来像图 24-10。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig10_HTML.jpg](img/323849_5_En_24_Fig10_HTML.jpg)\n\
  \n图 24-10\n内存中索引统计信息的空输出\n\n这意味着无法查看内存中索引的统计信息。你可以检查任何非聚集索引的统计信息。无论你是否能看到这些统计信息，随着数据的变化，它们仍然会过时。在\
  \ SQL Server 2016 及更高版本中，内存中的表和索引的统计信息是自动维护的。规则与基于磁盘的统计信息相同。SQL Server 2014 没有自动统计信息维护，因此你必须使用手动方法。\n\
  \n你可以使用 `sp_updatestats`。该过程的当前版本完全了解内存中索引及其差异。你也可以使用 `UPDATE STATISTICS`，但在 SQL\
  \ Server 2014 中，你必须将 `FULLSCAN` 或 `RESAMPLE` 与 `NORECOMPUTE` 一起使用，如下所示：\n\n```sql\n\
  UPDATE STATISTICS dbo.Address WITH FULLSCAN, NORECOMPUTE;\n```\n\n如果你不使用此语法，似乎表明你试图更改内存中表上的统计信息，而你无法做到这一点。你会看到一个相当明确的错误。\n\
  \n```sql\nMsg 41346, Level 16, State 2, Line 1\nCREATE and UPDATE STATISTICS for\
  \ memory optimized tables requires the WITH FULLSCAN or RESAMPLE and the NORECOMPUTE\
  \ options. The WHERE clause is not supported.\n```\n\n定义采样为 `FULLSCAN` 或 `RESAMPLE`，然后使用\
  \ `NORECOMPUTE` 让其知道你没有试图打开自动更新，统计信息就会得到更新。\n\n在 SQL Server 2016 及更高版本中，你可以像控制其他统计信息一样控制采样方法。\n\
  \n## 原生编译存储过程\n\n仅仅将表加载到内存中并通过乐观方法大幅减少锁争用，就能带来显著的性能提升。为了让速度真正快起来，你还可以实现一项新特性：将存储过程编译成在\
  \ SQL Server 可执行文件内部运行的 DLL。这确实能让性能“尖叫”起来。语法很简单。下面展示如何拿之前的查询来编译它：\n\n```\nCREATE\
  \ PROC dbo.AddressDetails @City NVARCHAR(30)\nWITH NATIVE_COMPILATION,\nSCHEMABINDING,\n\
  EXECUTE AS OWNER\nAS\nBEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT,\
  \ LANGUAGE = N'us_english')\nSELECT a.AddressLine1,\na.City,\na.PostalCode,\nsp.Name\
  \ AS StateProvinceName,\ncr.Name AS CountryName\nFROM dbo.Address AS a\nJOIN dbo.StateProvince\
  \ AS sp\nON sp.StateProvinceID = a.StateProvinceID\nJOIN dbo.CountryRegion AS cr\n\
  ON cr.CountryRegionCode = sp.CountryRegionCode\nWHERE a.City = @City;\nEND\n```\n\
  \n不幸的是，如果你尝试运行当前定义的此查询定义，你会收到以下错误：\n\n```\nMsg 10775, Level 16, State 1, Procedure\
  \ AddressDetails, Line 7 [Batch Start Line 5013]\nObject 'dbo.CountryRegion' is\
  \ not a memory optimized table or a natively compiled inline table-valued function\
  \ and cannot be accessed from a natively compiled module.\n```\n\n虽然你可以查询内存中表和标准表的混合体，但你只能基于内存中表创建原生编译的存储过程。我将使用前面展示的相同方法将\
  \ `dbo.CountryRegion` 表加载到内存中，然后再次运行脚本。这次它将成功编译。如果你随后像之前一样使用 `@City = 'Walla Walla'`\
  \ 执行查询，执行时间在 SSMS 中甚至不会显示。你必须通过 Extended Events 捕获事件，如图 24-11 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig11_HTML.jpg](img/323849_5_En_24_Fig11_HTML.jpg)\n\
  \n图 24-11 显示原生编译过程执行时间的 Extended Events\n\n那里的执行时间单位不是毫秒，而是微秒。因此，查询执行时间从原生的 3.7ms\
  \ 下降到内存中的 800 微秒，最后降到 451 微秒。这是一个相当可观的性能提升。\n\n但是，存在限制。如前所述，你只能引用内存中表。分配给过程的参数值不能接受\
  \ `NULL` 值。如果你选择将参数设置为 `NOT NULL`，则还必须提供一个初始值。否则，所有参数都是必需的。你必须对底层表强制实施架构绑定。最后，你需要让过程存在于一个\
  \ `ATOMIC BLOCK` 中。原子块要求事务中的所有语句都成功，否则事务中的所有语句都将被回滚。\n\n关于原生编译过程，还有另外几个有趣的要点。你只能检索估计的执行计划，而不是实际计划。如果你在\
  \ SSMS 中打开实际计划然后执行查询，则不会出现任何内容。但是，如果你请求估计的计划，则可以检索到一个。图 24-12 展示了之前创建的该过程的估计计划。\n\
  \n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig12_HTML.jpg](img/323849_5_En_24_Fig12_HTML.jpg)\n\
  \n图 24-12 原生编译过程的估计执行计划\n\n你会注意到它看起来很大程度上像一个常规的执行计划，但在幕后有很多不同。如果你点击 `SELECT` 运算符，它没有那么多属性。将前面展示的编译存储过程的属性与图\
  \ 24-13 中早先运行的常规查询的属性进行比较。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig13_HTML.jpg](img/323849_5_En_24_Fig13_HTML.jpg)\n\
  \n图 24-13 两个不同执行计划中的 SELECT 运算符属性\n\n你期望看到的许多信息都消失了，因为原生编译过程的操作方式与其他查询不同。使用执行计划来确定这些查询的行为在这里与在标准查询中一样有价值，但内部机制将会不同。\n\
  \n## 建议\n\n虽然内存中表和原生编译过程可以显著提升 SQL Server 内的性能，但你仍然需要评估它们的使用是否适合你的情况。对这些对象行为的限制意味着它们并非在所有情况下都有用。此外，由于对硬件和\
  \ SQL Server 企业版安装的需求，许多人将无法实现这些新对象及其行为。要确定你的工作负载是否适合使用这些新对象，你可以做几件事。\n\n### 基线\n\
  \n你应该已经计划通过使用性能监视器、动态管理对象、Extended Events 以及你掌握的所有其他工具来收集各种度量指标，从而建立系统的性能基线。一旦有了基线，你就可以判断你的工作负载是否可能受益于减少的锁和内存中表带来的速度提升。\n\
  \n### 正确的工作负载\n\n这项技术被称为内存 OLTP 表是有原因的。如果你处理的系统主要是读取为主、仅具有夜间或间歇性负载、或其在线事务处理工作负载水平非常低，那么内存中表和原生编译过程不太可能对你有重大益处。如果你处理系统中存在大量延迟，内存中表可能是一个好的解决方案。微软概述了其他几种可能有益的工作负载，你可以考虑使用内存中表和原生编译过程；请参阅在线文档（`http://bit.ly/1r6dmKY`）。\n\
  \n\n## 内存优化顾问\n\n为了快速轻松地判断一个表是否适合迁移到内存存储，微软在 SSMS 中提供了一个工具。如果你在对象资源管理器中导航到特定的表，可以右键单击该表并从上下文菜单中选择**内存优化顾问**。这将打开一个向导。如果我选择之前手动迁移的`Person.Address`表，初始检查会找出所有在内存表中不受支持的列。这将使向导停止，并且没有其他可用选项。输出结果如图\
  \ 24-14 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig14_HTML.jpg](img/323849_5_En_24_Fig14_HTML.jpg)\n\
  **图 24-14** 表内存优化顾问显示所有不支持的数据类型\n\n这意味着该表，按当前结构，不适合迁移到内存存储。为了让你能清晰地看一遍该工具的操作流程，我将在之前创建的`InMemoryTest`数据库中创建一个该表的干净副本，如下所示：\n\
  \n```sql\nUSE InMemoryTest;\nGO\nCREATE TABLE dbo.AddressStaging\n(\nAddressID INT\
  \ NOT NULL\nIDENTITY(1, 1)\nPRIMARY KEY,\nAddressLine1 NVARCHAR(60) NOT NULL,\n\
  AddressLine2 NVARCHAR(60) NULL,\nCity NVARCHAR(30) NOT NULL,\nStateProvinceID INT\
  \ NOT NULL,\nPostalCode NVARCHAR(15) NOT NULL\n);\n```\n\n现在，运行**内存优化顾问**在第一步得到了完全不同的结果，如图\
  \ 24-15 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig15_HTML.jpg](img/323849_5_En_24_Fig15_HTML.jpg)\n\
  **图 24-15** 内存优化顾问的首次检查成功\n\n向导的下一步显示了一组相当标准的警告，关于使用内存表将在你的 T-SQL 中引起的差异，以及指向有关这些限制的进一步阅读的链接。这是一个有用的提醒，如果你选择将此表迁移到内存存储，可能需要处理你的代码。你可以在图\
  \ 24-16 中看到这一点。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig16_HTML.jpg](img/323849_5_En_24_Fig16_HTML.jpg)\n\
  **图 24-16** 数据迁移警告\n\n你可以在此处停止，并点击**报告**按钮生成针对你的表运行的检查报告。或者，你可以使用向导实际将表移入内存。从警告页面点击**下一步**将打开一个选项页面，你可以在其中确定表将如何迁移到内存。你可以选择旧表的命名方式。它假设你会为内存表保留相同的表名。还有其他几个选项可用，如图\
  \ 24-17 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig17_HTML.jpg](img/323849_5_En_24_Fig17_HTML.jpg)\n\
  **图 24-17** 设置将标准表迁移到内存的选项\n\n点击**下一步**，你可以决定如何为表创建主键。你可以为其提供一个名称。然后你必须选择是使用非聚集哈希还是非聚集索引。如果你选择非聚集哈希，则必须提供桶数。图\
  \ 24-18 展示了我如何配置密钥，其方式与我之前使用 T-SQL 配置的方式非常相似。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig18_HTML.jpg](img/323849_5_En_24_Fig18_HTML.jpg)\n\
  **图 24-18** 选择新内存表主键的配置\n\n点击**下一步**将显示你所做选择的摘要，并在屏幕底部启用一个按钮以立即迁移表。它将迁移表，按照指示重命名旧表，如果你选择了该选项，它还将迁移数据。成功迁移的输出如图\
  \ 24-19 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig19_HTML.jpg](img/323849_5_En_24_Fig19_HTML.jpg)\n\
  **图 24-19** 使用向导成功迁移内存表\n\n然后，**内存优化顾问**可以识别哪些表在物理上可以移入内存，并可以为你完成这项工作。但是，它并不具备判断哪些表应该被移入内存的智慧。你仍然需要自己仔细考虑这一点。\n\
  \n## 本地编译顾问\n\n功能上与**内存优化顾问**类似，**本地编译顾问**可以针对现有的存储过程运行，以确定它是否可以本地编译。然而，它的功能比之前的向导简单得多。为了展示其实际操作，我将创建两个不同的过程，如下所示：\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.FailWizard (@City NVARCHAR(30))\nAS\nSELECT\
  \ a.AddressLine1,\na.City,\na.PostalCode,\nsp.Name AS StateProvinceName,\ncr.Name\
  \ AS CountryName\nFROM dbo.Address AS a\nJOIN dbo.StateProvince AS sp\nON sp.StateProvinceID\
  \ = a.StateProvinceID\nJOIN dbo.CountryRegion AS cr WITH (NOLOCK)\nON cr.CountryRegionCode\
  \ = sp.CountryRegionCode\nWHERE a.City = @City;\nGO\nCREATE OR ALTER PROCEDURE dbo.PassWizard\
  \ (@City NVARCHAR(30))\nAS\nSELECT a.AddressLine1,\na.City,\na.PostalCode,\nsp.Name\
  \ AS StateProvinceName,\ncr.Name AS CountryName\nFROM dbo.Address AS a\nJOIN dbo.StateProvince\
  \ AS sp\nON sp.StateProvinceID = a.StateProvinceID\nJOIN dbo.CountryRegion AS cr\n\
  ON cr.CountryRegionCode = sp.CountryRegionCode\nWHERE a.City = @City;\nGO\n```\n\
  \n第一个过程包含一个`NOLOCK`提示，该提示无法在内存表上运行。第二个过程只是本章一直在使用的那个过程的重复。执行创建这两个过程的脚本后，我可以通过右键单击存储过程`dbo.FailWizard`并从上下文菜单中选择**本地编译顾问**来访问它。在通过向导起始屏幕后，第一步识别出过程中的问题，如图\
  \ 24-20 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig20_HTML.jpg](img/323849_5_En_24_Fig20_HTML.jpg)\n\
  **图 24-20** 本地编译顾问已识别出不适当的 T-SQL 语法\n\n请特别注意图 24-20 顶部的注释。它指出所有表都必须是内存优化表才能本地编译该过程。但是，该检查并不是**本地编译顾问**检查的一部分。\n\
  \n按照提示点击**下一步**，然后你可以看到向导识别出的问题，如图 24-21 所示。\n\n![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig21_HTML.jpg](img/323849_5_En_24_Fig21_HTML.jpg)\n\
  **图 24-21** 本地编译顾问识别出代码中的问题\n\n向导显示了有问题的 T-SQL，并显示了该 T-SQL 发生的行号。这就是该向导提供的全部信息。如果我对另一个过程`dbo.WizardPass`运行相同的检查，它只会报告没有任何不恰当的\
  \ T-SQL 语句。没有额外的操作来为我编译过程。要使过程编译，需要添加本章前面定义的额外功能。除了这个语法检查之外，本地编译存储过程没有其他帮助。\n\n\n"
- '# 本章小结


  本章介绍了内存表与原生编译存储过程的概念。这些是用于实现潜在大规模性能提升的高端方法。然而，在大规模实施这些新对象方面存在许多限制。你需要一台拥有足够内存的机器来支持额外的负载。在将这种方法投入生产环境之前，你还需要仔细测试数据与负载。但是，如果你确实需要让你的
  OLTP 系统比以往任何时候都运行得更快，这是一项可行的技术。它也在 Azure SQL Database 中得到支持。


  下一章将概述在 SQL Server 2017 和 Azure SQL Database 中，查询与索引优化是如何实现部分自动化的。


  '
- '# 25. Azure SQL Database 和 SQL Server 中的自动调优


  尽管许多查询性能调优涉及对系统、查询、统计信息、索引以及本书中提出的所有其他信息的详细了解，但查询调优的某些方面本质上是相当机械化的。发现缺失索引建议，然后测试该索引对查询是有帮助还是损害，以及是否会损害其他查询，这个过程可以实现自动化。对于某些类型的错误参数嗅探（其中一种计划明显优于另一种）同样如此。微软已开始着手自动化查询调优的这些方面。此外，它还在
  Azure SQL Database 和 SQL Server 中引入了其他形式的自动化机制，这些机制将通过即时调优查询的某些方面来帮助你。别担心，本书的其余部分仍将非常有用，因为这些方法只能解决相当有限范围的问题。你仍然会有大量具有挑战性的工作要做。


  在本章中，我将涵盖以下内容：


  *   自动计划更正

  *   Azure SQL Database 自动索引管理

  *   自适应查询处理


  ## 自动计划更正


  SQL Server 2017 和 Azure SQL Database 能够自动更正执行计划的机制，最好这样总结：微软利用了现在可获取的数据（这要归功于 `Query
  Store`；有关 `Query Store` 的更多详情，请参见 `第 11 章`），并将这些数据加以利用，实现了一些惊人的功能。随着数据变化，你的统计信息可能会改变。你可能有一个编写良好的查询和适当的索引，但随着时间的推移，随着统计信息的变动，你可能会看到引入一个新的执行计划，从而损害性能，这基本上就是
  `第 17 章` 概述的错误参数嗅探问题。其他因素也可能导致良好的查询性能变差，例如 `累积更新` 改变了引擎行为。无论原因如何，你的代码和结构仍然支持良好的性能，只要你能采用正确的计划。显然，你可以自己使用
  `Query Store` 提供的工具来识别性能下降的查询，以及哪些计划提供了更好的性能，然后强制使用那些计划。然而，请注意上述整个过程是非常直接的。


  1.  监控查询性能，并注意一个过去未曾改变的查询突然发生性能变化。

  2.  确定该查询的执行计划是否已更改。

  3.  如果计划已更改且性能下降，则强制使用之前的计划。

  4.  衡量性能，看其是下降、改善还是保持不变。

  5.  如果性能下降，则撤销该更改。


  简而言之，这就是在 SQL Server 内部发生的事情。SQL Server 中的一个进程通过 `Query Store` 观察查询性能。如果它看到查询本身保持不变，但执行计划改变时性能下降，它会将此记录为建议的计划回归。如果你启用了查询自动调优功能，当识别出回归时，它将自动强制使用上一个良好的计划。然后，自动进程会观察行为，以判断强制使用计划是否是一个错误的选择。如果是，它会纠正问题并记录该事实供你以后查看。简而言之，微软通过利用
  `Query Store` 中可用的数据，借助自动计划强制功能，自动化了修复诸如错误参数嗅探之类的问题。



  '
- "# 调优建议\n\n首先，我们来看看 SQL Server 如何识别调优建议。由于此过程完全依赖于 `查询存储`，因此只能在已启用 `查询存储` 的数据库上启用它（参见第\
  \ 11 章）。启用 `查询存储` 后，无论是 SQL Server 2017 还是 Azure SQL 数据库，都将自动开始监控性能回退的计划。一旦启用了 `查询存储`，您无需再启用其他任何功能。\n\
  \n微软没有精确定义一个计划性能“回退”到何种程度才会被标记为回退。因此，我们不想碰运气。我们将使用 Adam Machanic 的脚本（`make_big_adventure.sql`）在\
  \ `AdventureWorks` 数据库中创建一些非常大的表。该脚本可从 [`http://bit.ly/2mNBIhg`](http://bit.ly/2mNBIhg)\
  \ 下载。我们在第 9 章处理列存储索引时也用过这个脚本。如果您仍在使用同一个数据库，请删除那些表并重新创建。这将为我们提供一个非常大的数据集，我们可以从中创建一个查询，该查询会根据传入的数据值表现出两种不同的行为。要查看一个性能回退的计划，让我们看下面的脚本：\n\
  \n```sql\nCREATE INDEX ix_ActualCost ON dbo.bigTransactionHistory (ActualCost);\n\
  GO\n--用于实验的简单查询\nCREATE OR ALTER PROCEDURE dbo.ProductByCost (@ActualCost MONEY)\n\
  AS\nSELECT bth.ActualCost\nFROM dbo.bigTransactionHistory AS bth\nJOIN dbo.bigProduct\
  \ AS p\nON p.ProductID = bth.ProductID\nWHERE bth.ActualCost = @ActualCost;\nGO\n\
  --确保查询存储已开启并拥有干净的数据集\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE = ON;\n\
  ALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR;\nGO\n```\n\n这段代码在 `dbo.bigTransactionHistory`\
  \ 表上创建了一个索引。它还创建了一个简单的存储过程供我们测试。最后，该脚本确保 `查询存储` 设置为 `ON` 并且清除了所有数据。所有这些准备就绪后，我们可以如下运行我们的测试脚本：\n\
  \n```sql\n--建立查询性能的历史记录\nEXEC dbo.ProductByCost @ActualCost = 8.2205;\nGO 30\n--从缓存中移除计划\n\
  DECLARE @PlanHandle VARBINARY(64);\nSELECT  @PlanHandle = deps.plan_handle\nFROM\
  \    sys.dm_exec_procedure_stats AS deps\nWHERE   deps.object_id = OBJECT_ID('dbo.ProductByCost');\n\
  IF @PlanHandle IS NOT NULL\nBEGIN\nDBCC FREEPROCCACHE(@PlanHandle);\nEND\nGO\n--执行一个将产生不同计划的查询\n\
  EXEC dbo.ProductByCost @ActualCost = 0.0;\nGO\n--建立一段新的性能不佳的历史记录\nEXEC dbo.ProductByCost\
  \ @ActualCost = 8.2205;\nGO 15\n```\n\n这需要一段时间才能执行完成。一旦完成，我们的数据库中应该会有一条调优建议。参考前面的代码清单，我们通过至少执行查询\
  \ 30 次来建立特定的查询行为。当使用值 `8.2205` 时，查询本身只返回单行数据。所使用的计划如图 25-1 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig1_HTML.jpg](img/323849_5_En_25_Fig1_HTML.jpg)\n\
  \n*图 25-1：返回小数据集时查询的初始执行计划*\n\n尽管图 25-1 所示的计划可能有一些调优机会（特别是包含了 `键查找` 操作），但对于小数据集来说它运行良好。多次运行查询会在\
  \ `查询存储` 中建立起历史记录。接下来，我们将计划从缓存中移除，当我们使用值 `0.0` 时会生成一个新计划，如图 25-2 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig2_HTML.jpg](img/323849_5_En_25_Fig2_HTML.jpg)\n\
  \n*图 25-2：用于更大数据集的执行计划*\n\n在该计划生成之后，我们再多次执行该存储过程（`15` 次似乎有效），以便清楚地表明我们看到的不是一个简单的异常，而是一个真正的计划回退正在进行。这将产生一条调优建议。\n\
  \n我们可以通过查看名为 `sys.dm_db_tuning_recommendations` 的新 DMV 来验证这组查询是否导致了调优建议。以下是一个返回有限结果集的示例查询：\n\
  \n```sql\nSELECT ddtr.type,\nddtr.reason,\nddtr.last_refresh,\nddtr.state,\nddtr.score,\n\
  ddtr.details\nFROM sys.dm_db_tuning_recommendations AS ddtr;\n```\n\n从 `sys.dm_db_tuning_recommendations`\
  \ 可以获取更多信息，但让我们基于之前的计划回退，逐步分析当前看到的内容。您可以在图 25-3 中看到此查询的结果。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig3_HTML.jpg](img/323849_5_En_25_Fig3_HTML.jpg)\n\
  \n*图 25-3：来自 sys.dm_db_tuning_recommendations DMV 的第一条调优建议*\n\n这里提供的信息既直观又有些令人困惑。首先，`TYPE`\
  \ 值很容易理解。这里的建议是我们需要对此查询使用 `FORCE_LAST_GOOD_PLAN`。目前，在发布时这是唯一可用的选项，但随着实现更多自动调优机制，这将会改变。`reason`\
  \ 值是事情变得有趣的地方。在本例中，需要恢复到之前计划的解释如下：\n\n```\n平均查询 CPU 时间从 0.12 毫秒变为 2180.37 毫秒\n```\n\
  \n每次执行查询，我们的 CPU 时间从不到 `1 毫秒` 变成了超过 `2.2 秒`。这是一个很容易识别的问题。`last_refresh` 值告诉我们建议中任何数据最后一次更改的时间。我们得到的状态值是一个小型\
  \ JSON 文档，由两个字段组成：`currentValue` 和 `reason`。以下是上一个结果集中的文档：\n\n```\n{\"currentValue\"\
  :\"Active\",\"reason\":\"AutomaticTuningOptionNotEnabled\"}\n```\n\n它显示此建议处于 `Active`\
  \ 状态，但尚未实施，因为我们尚未启用自动调优。`状态` 字段有多种可能的值。我们将在下一节“启用自动调优”中介绍它们以及 `reason` 字段的值。分数是一个估计的影响值，范围在\
  \ `0` 到 `100` 之间。值越高，表示建议过程的影响越大。最后，您会看到 `details`，这是另一个包含更多信息的 JSON 文档，如下所示：\n\n\
  ```\n{\"planForceDetails\":{\"queryId\":2,\"regressedPlanId\":4,\"regressedPlanExecutionCount\"\
  :15,\"regressedPlanErrorCount\":0,\"regressedPlanCpuTimeAverage\":2.180373266666667e+006,\"\
  regressedPlanCpuTimeStddev\":1.680328201712986e+006,\"recommendedPlanId\":2,\"recommendedPlanExecutionCount\"\
  :30,\"recommendedPlanErrorCount\":0,\"recommendedPlanCpuTimeAverage\":1.176333333333333e+002,\"\
  recommendedPlanCpuTimeStddev\":6.079253426385694e+001},\"implementationDetails\"\
  :{\"method\":\"TSql\",\"script\":\"exec sp_query_store_force_plan @query_id = 2,\
  \ @plan_id = 2\"}}\n```\n\n这些信息在一个数据块中显得很多，所以让我们更直接地将其分解到一个表格中：\n\n\n\n| `planForceDetails`\
  \ |   |   |\n| --- | --- | --- |\n|   | `queryID` | 2：来自查询存储的 `query_id` 值 |\n|\
  \   | `regressedPlanID` | 4：问题计划来自查询存储的 `plan_id` 值 |\n|   | `regressedPlanExecutionCount`\
  \ | 15：该回归计划被执行的次数 |\n|   | `regressedPlanErrorCount` | 0：当有值时，表示执行期间发生的错误数 |\n\
  |   | `regressedPlanCpuTimeAverage` | 2.18037326666667e+006：该计划的平均 CPU 时间 |\n| \
  \  | `regressedPlanCpuTimeStddev` | 1.60328201712986e+006：该值的标准差 |\n|   | `recommendedPlanID`\
  \ | 2：调优建议所提议的 `plan_id` |\n|   | `recommendedPlanExecutionCount` | 30：该推荐计划被执行的次数\
  \ |\n|   | `recommendedPlanErrorCount` | 0：当有值时，表示执行期间发生的错误数 |\n|   | `recommendedPlanCpuTimeAverage`\
  \ | 1.176333333333333e+002：该计划的平均 CPU 时间 |\n|   | `recommendedPlanCpuTimeStddev`\
  \ | 6.079253426385694e+001：该值的标准差 |\n| `implementationDetails` |   |   |\n|   |\
  \ Method | `TSql`：值将始终为 T-SQL |\n|   | `script` | `exec sp_query_store_force_plan\
  \ @query_id = 2, @plan_id = 2` |\n\n这代表了调优建议的完整细节。无需启用任何自动调优，你就可以查看关于计划回归的建议以及提出这些建议背后的全部细节。你甚至可以得到脚本，如果你愿意，无需启用自动计划纠正，就能执行建议的修复。\n\
  \n有了这些信息，你就可以编写一个更复杂的查询，检索所有能使你全面调查这些建议的信息，包括查看执行计划。你需要做的就是直接查询 JSON 数据，然后像这个脚本一样，将其与从查询存储获得的其他信息连接起来：\n\
  \n```sql\nWITH DbTuneRec\nAS (SELECT ddtr.reason,\nddtr.score,\npfd.query_id,\n\
  pfd.regressedPlanId,\npfd.recommendedPlanId,\nJSON_VALUE(ddtr.state,\n'$.currentValue')\
  \ AS CurrentState,\nJSON_VALUE(ddtr.state,\n'$.reason') AS CurrentStateReason,\n\
  JSON_VALUE(ddtr.details,\n'$.implementationDetails.script') AS ImplementationScript\n\
  FROM sys.dm_db_tuning_recommendations AS ddtr\nCROSS APPLY\nOPENJSON(ddtr.details,\n\
  '$.planForceDetails')\nWITH (query_id INT '$.queryId',\nregressedPlanId INT '$.regressedPlanId',\n\
  recommendedPlanId INT '$.recommendedPlanId') AS pfd)\nSELECT qsq.query_id,\ndtr.reason,\n\
  dtr.score,\ndtr.CurrentState,\ndtr.CurrentStateReason,\nqsqt.query_sql_text,\nCAST(rp.query_plan\
  \ AS XML) AS RegressedPlan,\nCAST(sp.query_plan AS XML) AS SuggestedPlan,\ndtr.ImplementationScript\n\
  FROM DbTuneRec AS dtr\nJOIN sys.query_store_plan AS rp\nON rp.query_id = dtr.query_id\n\
  AND rp.plan_id = dtr.regressedPlanId\nJOIN sys.query_store_plan AS sp\nON sp.query_id\
  \ = dtr.query_id\nAND sp.plan_id = dtr.recommendedPlanId\nJOIN sys.query_store_query\
  \ AS qsq\nON qsq.query_id = rp.query_id\nJOIN sys.query_store_query_text AS qsqt\n\
  ON qsqt.query_text_id = qsq.query_text_id;\n```\n\n在观察到调优建议是如何得出之后，接下来的步骤是调查它们、实施它们，然后观察它们随时间的行为表现；或者，你可以启用自动调优，这样就不必全程监督这个过程。\n\
  \n你确实需要知道 `sys.dm_db_tuning_recommendations` 中的信息不会持久保存。如果数据库或服务器因任何原因离线，这些信息就会丢失。如果你发现自己需要定期使用这些信息，应该计划将其定期导出到一个更永久的地方。\n\
  \n## 启用自动调优\n\n启用自动调优的流程完全取决于你是在 Azure SQL Database 中工作，还是在 SQL Server 2017 中工作。由于自动调优依赖于查询存储，因此开启它也是一个需要逐个数据库进行的任务。Azure\
  \ 提供了两种方法：使用 Azure 门户或使用 T-SQL 命令。SQL Server 2017 只支持 T-SQL。我们将从 Azure 门户开始。\n\n\
  ### 注意\n\nAzure 门户会频繁更新。本书中的屏幕截图可能已过时，当你自己操作时，可能会看到不同的图形界面。\n\n## Azure 门户\n\n我假设你已经拥有一个\
  \ Azure 账户，并且知道如何创建 Azure SQL 数据库以及如何导航到它。我们将从一个数据库的主界面开始。你可以在左侧看到所有各种标准设置。页面顶部将显示数据库的常规设置。页面中心将显示性能指标。最后，在页面的右下角是数据库的功能选项。你可以在图\
  \ 25-4 中看到所有这些。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig4_HTML.jpg](img/323849_5_En_25_Fig4_HTML.jpg)\n\
  \n*图 25-4：Azure 门户上的数据库界面*\n\n我们将聚焦于屏幕右下角的细节部分，并点击自动调优功能。这将打开一个新界面，其中包含 Azure 内自动调优的设置，如图\
  \ 25-5 所示。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig5_HTML.jpg](img/323849_5_En_25_Fig5_HTML.jpg)\n\
  \n*图 25-5：Azure SQL 数据库的自动调优功能*\n\n要在此数据库中启用自动调优，我们将 FORCE PLAN 的设置从 INHERIT（默认为\
  \ OFF）更改为 ON。然后，你必须点击页面顶部的“应用”按钮。此过程完成后，你的选项应与图 25-6 中我的设置相似。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig6_HTML.jpg](img/323849_5_En_25_Fig6_HTML.jpg)\n\
  \n*图 25-6：自动调优选项变更为 FORCE PLAN 为 ON*\n\n你可以为服务器更改这些设置，然后每个数据库可以自动继承它们。开启或关闭这些设置不会重置连接，也不会以任何方式使数据库离线。其他选项将在本章后面题为“Azure\
  \ SQL 数据库自动索引管理”的部分中讨论。\n\n完成此设置后，Azure SQL 数据库将开始在查询发生回归时强制使用最后一个良好计划，正如你在前面“调优建议”部分所看到的。和之前一样，你可以查询\
  \ DMV 来检索信息。你也可以使用门户查看这些信息。在 SQL 数据库界面的左侧是功能列表。在“支持 + 故障排除”标题下，你会看到“性能建议”。点击它将显示一个类似于图\
  \ 25-7 的屏幕。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig7_HTML.jpg](img/323849_5_En_25_Fig7_HTML.jpg)\n\
  \n*图 25-7：门户上的性能建议页面*\n\n图 25-7 中显示的信息应该有一部分看起来很熟悉。你已经从我们在前面“调优建议”部分查询的 DMV 中看到了操作、建议和影响。从这里，你可以手动应用建议，或者查看已丢弃的建议。你也可以通过点击“自动化”按钮返回到设置屏幕。所有这些都利用了查询存储，它在所有新数据库中默认是启用的。\n\
  \n这就是在 Azure 中启用自动调优所需的全部步骤。让我们看看如何在 SQL Server 2017 中完成它。\n\n\n\n## SQL Server\
  \ 2017\n\n目前，SQL Server 2017 中没有用于启用自动查询调优的图形界面。相反，你必须使用一条 T-SQL 命令。你也可以在 Azure\
  \ SQL Database 中使用相同的命令。该命令如下：\n\n```sql\nALTER DATABASE current SET AUTOMATIC_TUNING\
  \ (FORCE_LAST_GOOD_PLAN = ON);\n```\n\n当然，你可以用适当的数据库名替换这里我使用的默认值 `current`。此命令一次只能在一个数据库上运行。如果希望为实例上的所有数据库启用自动调优，必须在创建这些其他数据库之前，在\
  \ `model` 数据库中启用它，或者需要为服务器上的每个数据库手动将其打开。\n\n目前 `automatic_tuning` 的唯一选项就是像我们这样做，启用强制使用上一个好的执行计划。你可以使用以下命令禁用此功能：\n\
  \n```sql\nALTER DATABASE current SET AUTOMATIC_TUNING (FORCE_LAST_GOOD_PLAN = OFF);\n\
  ```\n\n如果你运行此脚本，请记得再次使用 `ON` 运行它，以保持执行计划的自动调优处于开启状态。\n\n## 自动调优实战\n\n启用自动调优后，我们可以重新运行那个生成了性能退化计划的脚本。不过，为了确认自动调优正在运行，让我们使用一个新的系统视图\
  \ `sys.database_automatic_tuning_options` 来进行验证。\n\n```sql\nSELECT name,\n     \
  \  desired_state,\n       desired_state_desc,\n       actual_state,\n       actual_state_desc,\n\
  \       reason,\n       reason_desc\nFROM sys.database_automatic_tuning_options;\n\
  ```\n\n结果显示 `desired_state` 值为 `1`，且 `desired_state_desc` 值为 `On`。\n\n我在测试时首先清除缓存，如下所示：\n\
  \n```sql\nALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\nGO\nEXEC dbo.ProductByCost\
  \ @ActualCost = 8.2205;\nGO 30\n-- 将计划从缓存中移除\nDECLARE @PlanHandle VARBINARY(64);\n\
  SELECT  @PlanHandle = deps.plan_handle\nFROM    sys.dm_exec_procedure_stats AS deps\n\
  WHERE   deps.object_id = OBJECT_ID('dbo.ProductByCost');\nIF @PlanHandle IS NOT\
  \ NULL\nBEGIN\n    DBCC FREEPROCCACHE(@PlanHandle);\nEND\nGO\n-- 执行一个将导致不同计划的查询\n\
  EXEC dbo.ProductByCost @ActualCost = 0.0;\nGO\n-- 建立新的性能不佳的历史记录\nEXEC dbo.ProductByCost\
  \ @ActualCost = 8.2205;\nGO 15\n```\n\n现在，当我们使用我之前的示例脚本查询 DMV 时，结果是不同的，如图 25-8 所示。\n\
  \n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig8_HTML.jpg](img/323849_5_En_25_Fig8_HTML.jpg)\n\
  \n图 25-8\n\n性能退化的查询已被强制使用\n\n`CurrentState` 值已更改为 `Verifying`。它将像之前一样，在多次执行期间衡量性能。如果性能下降，它将取消强制该计划。此外，如果出现超时或执行中止等错误，该计划也将被取消强制。在此事件中，你还会看到\
  \ `sys.dm_db_tuning_recommendations` 中的 `error_prone` 列的值变为 `Yes`。\n\n如果你重启服务器，`sys.dm_db_tuning_recommendations`\
  \ 中的信息将被删除。同样，所有已被强制执行的计划也将被删除。一旦查询再次出现性能退化，假设查询存储历史记录存在，任何计划强制都将自动重新启用。如果这是个问题，你始终可以手动强制该计划。\n\
  \n如果一个查询被强制使用计划，然后性能下降，它将被取消强制，如前所述。如果该查询再次出现性能退化，计划强制将被移除，并且该查询将被标记为——至少在服务器重启（信息被移除）之前——不会再次被强制。\n\
  \n我们也可以通过查看查询存储报告来查看强制的计划。图 25-9 显示了自动调优导致计划强制的结果。\n\n![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig9_HTML.jpg](img/323849_5_En_25_Fig9_HTML.jpg)\n\
  \n图 25-9\n\n“具有强制计划的查询”报告显示了自动调优的结果\n\n这些报告不会告诉你计划被强制的原因。不过，如果需要，你始终可以前往 DMV 获取该信息。\n\
  \n## Azure SQL Database 自动索引管理\n\n自动索引管理直指 Azure SQL Database 作为平台即服务（PaaS）定位的核心概念。大量的功能，如打补丁、备份、损坏测试，以及高可用性和许多其他功能，都由微软云为你管理。他们将其知识和系统管理能力用于处理索引问题，这也是顺理成章的。此外，由于\
  \ Azure SQL Database 的所有处理都在微软位于 Azure 的服务器场中进行，他们可以在监控你的系统时运用机器学习算法。\n\n请注意，微软不会从你的查询、数据或存储在那里的任何信息中收集私人信息。它只是使用查询指标来衡量行为。重要的是要事先说明这一点，因为关于这些功能的错误信息一直在流传。\n\
  \n在启用索引管理之前，让我们先生成一些糟糕的查询行为。我针对 Azure 中的示例数据库 AdventureWorksLT 使用了两个脚本。当你在 Azure\
  \ 中配置数据库时，示例数据库是门户中的选项之一，它简单且易于立即实施。这就是我喜欢在示例中使用它的原因。首先，这是一个生成一些存储过程的 T-SQL 脚本：\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.CustomerInfo\n(@Firstname NVARCHAR(50))\n\
  AS\nSELECT c.FirstName,\n       c.LastName,\n       c.Title,\n       a.City\nFROM\
  \ SalesLT.Customer AS c\nJOIN SalesLT.CustomerAddress AS ca\n    ON ca.CustomerID\
  \ = c.CustomerID\nJOIN SalesLT.Address AS a\n    ON a.AddressID = ca.AddressID\n\
  WHERE c.FirstName = @Firstname;\nGO\nCREATE OR ALTER PROCEDURE dbo.EmailInfo (@EmailAddress\
  \ nvarchar(50))\nAS\nSELECT c.EmailAddress,\n       c.Title,\n       soh.OrderDate\n\
  FROM SalesLT.Customer AS c\nJOIN SalesLT.SalesOrderHeader AS soh\n    ON soh.CustomerID\
  \ = c.CustomerID\nWHERE c.EmailAddress = @EmailAddress;\nGO\nCREATE OR ALTER PROCEDURE\
  \ dbo.SalesInfo (@firstName NVARCHAR(50))\nAS\nSELECT c.FirstName,\n       c.LastName,\n\
  \       c.Title,\n       soh.OrderDate\nFROM SalesLT.Customer AS c\nJOIN SalesLT.SalesOrderHeader\
  \ AS soh\n    ON soh.CustomerID = c.CustomerID\nWHERE c.FirstName = @firstName\n\
  GO\nCREATE OR ALTER PROCEDURE dbo.OddName (@FirstName NVARCHAR(50))\nAS\nSELECT\
  \ c.FirstName\nFROM SalesLT.Customer AS c\nWHERE c.FirstName BETWEEN 'Brian'\n \
  \                     AND     @FirstName\nGO\n```\n\n接下来，这是一个 PowerShell 脚本，用于多次调用这些过程：\n\
  \n\n"
- '# 生成测试负载


  ```powershell

  $SqlConnection = New-Object System.Data.SqlClient.SqlConnection

  $SqlConnection.ConnectionString = ''Server=qpf.database.windows.net;Database=QueryPerformanceTuning;trusted_connection=false;user=UserName;password=YourPassword''

  ### 加载客户名称

  $DatCmd = New-Object System.Data.SqlClient.SqlCommand

  $DatCmd.CommandText = "SELECT c.FirstName, c.EmailAddress

  FROM SalesLT.Customer AS c;"

  $DatCmd.Connection = $SqlConnection

  $DatDataSet = New-Object System.Data.DataSet

  $SqlAdapter = New-Object System.Data.SqlClient.SqlDataAdapter

  $SqlAdapter.SelectCommand = $DatCmd

  $SqlAdapter.Fill($DatDataSet)

  $Proccmd = New-Object System.Data.SqlClient.SqlCommand

  $Proccmd.CommandType = [System.Data.CommandType]''StoredProcedure''

  $Proccmd.CommandText = "dbo.CustomerInfo"

  $Proccmd.Parameters.Add("@FirstName",[System.Data.SqlDbType]"nvarchar")

  $Proccmd.Connection = $SqlConnection

  $EmailCmd = New-Object System.Data.SqlClient.SqlCommand

  $EmailCmd.CommandType = [System.Data.CommandType]''StoredProcedure''

  $EmailCmd.CommandText = "dbo.EmailInfo"

  $EmailCmd.Parameters.Add("@EmailAddress",[System.Data.SqlDbType]"nvarchar")

  $EmailCmd.Connection = $SqlConnection

  $SalesCmd = New-Object System.Data.SqlClient.SqlCommand

  $SalesCmd.CommandType = [System.Data.CommandType]''StoredProcedure''

  $SalesCmd.CommandText = "dbo.SalesInfo"

  $SalesCmd.Parameters.Add("@FirstName",[System.Data.SqlDbType]"nvarchar")

  $SalesCmd.Connection = $SqlConnection

  $OddCmd = New-Object System.Data.SqlClient.SqlCommand

  $OddCmd.CommandType = [System.Data.CommandType]''StoredProcedure''

  $OddCmd.CommandText = "dbo.OddName"

  $OddCmd.Parameters.Add("@FirstName",[System.Data.SqlDbType]"nvarchar")

  $OddCmd.Connection = $SqlConnection

  while(1 -ne 0)

  {

  foreach($row in $DatDataSet.Tables[0])

  {

  $name = $row[0]

  $email = $row[1]

  $SqlConnection.Open()

  $Proccmd.Parameters["@FirstName"].Value = $name

  $Proccmd.ExecuteNonQuery() | Out-Null

  $EmailCmd.Parameters["@EmailAddress"].Value = $email

  $EmailCmd.ExecuteNonQuery() | Out-Null

  $SalesCmd.Parameters["@FirstName"].Value = $name

  $SalesCmd.ExecuteNonQuery() | Out-Null

  $OddCmd.Parameters["@FirstName"].Value = $name

  $OddCmd.ExecuteNonQuery() | Out-Null

  $SqlConnection.Close()

  }

  }

  ```


  这些脚本将使我们能够生成必要的负载以触发自动索引管理功能。PowerShell 脚本必须运行大约 12 到 18 小时，才能在 Azure 中收集到足够数量的数据。但是，您必须首先更改一些要求和设置。


  ### 启用必要功能


  为了使自动索引管理正常工作，您必须在 Azure SQL 数据库上启用查询存储。查询存储在 Azure 中默认是启用的，因此您只需要在将其关闭后重新打开。要确保其已启用，您可以运行以下脚本：


  ```sql

  ALTER DATABASE CURRENT SET QUERY_STORE = ON;

  ```


  启用查询存储后，您现在需要导航到数据库的“概述”屏幕。图 25-2 显示了完整的屏幕。作为提醒，屏幕底部有几个选项，其中一个是“自动调优”，如图 25-10 所示。


