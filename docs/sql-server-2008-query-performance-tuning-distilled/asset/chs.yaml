  \ indexes）是基于 B-tree 结构创建的，它为数据检索提供了快速的访问路径。其数据页（data page）包含实际的数据行。聚簇索引适用于频繁更新的列、堆表（heap\
  \ tables）以及需要窄的、非聚簇的 B-tree 结构的情况。\n\n创建或重建聚簇索引时，可以使用 `uniqueifier` 来处理非唯一键（wide\
  \ keys）。`dbo.DatabaseLog` 是一个例子。相关的操作包括 `execution plan` 中的 `heap table` 的 `nested\
  \ loop operation` 和 `RID lookup` 操作。\n\n##### 非聚簇索引\n\n非聚簇索引（nonclustered）具有独立于数据行的结构，其行定位器（row\
