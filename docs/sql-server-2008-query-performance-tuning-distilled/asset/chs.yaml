  尽管使用具有高选择性的列来检索小结果集是建议在该列上创建非聚集索引的良好依据，但在同一列上创建聚集索引可能同样有益，甚至效果更佳。为了评估聚集索引为何比非聚集索引更有优势，请在同一列上创建聚集索引。


  ```

  CREATE CLUSTERED INDEX icl ON dbo.Test1(C1);

  ```


  再次运行相同的 `SELECT` 命令。从得到的执行计划（如图 8-22 所示）中可以看出，即使对于小结果集，优化器也使用了聚集索引（而非非聚集索引）。`SELECT`
  语句的逻辑读取次数从三次减少到了两次（图 8-21）。你看到这种行为变化是因为聚集索引本质上是一个覆盖索引，包含了表中的所有列。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig21_HTML.jpg](img/323849_5_En_8_Fig21_HTML.jpg)


  图 8-21

