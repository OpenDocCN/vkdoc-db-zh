  图 8-19

  无索引时的执行计划


  ```

  Table ''Test1''. Scan count 1, logical reads 22

  CPU time = 0 ms,  elapsed time = 0 ms.

  ```


  考虑到上述 `SELECT` 语句检索的结果集很小，在 `c1` 列上创建非聚集索引可能是一个不错的选择。


  ```

  CREATE NONCLUSTERED INDEX incl ON dbo.Test1(C1);

  ```


  你可以再次运行相同的 `SELECT` 命令。由于通过非聚集索引检索少量行比全表扫描更高效，优化器使用了列 `c1` 上的非聚集索引，如图 8-20 所示。`STATISTICS
  IO` 报告的逻辑读取次数如下：


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig20_HTML.jpg](img/323849_5_En_8_Fig20_HTML.jpg)


