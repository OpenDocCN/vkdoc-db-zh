  \ 1222——来捕获死锁数据。你还有一个默认情况下捕获多种事件（包括死锁）的 `system_health` 会话。如果你尚未准备好捕获此类信息，这是一个很好的资源。只需记住，它只保留四个\
  \ 5MB 的文件在线。当这些文件填满时，最旧文件中的数据将会丢失。根据系统中的事务数量以及可能填满这些文件的死锁或其他事件的数量，你可能只能访问到近期的数据。此外，如前所述，由于\
  \ `system_health` 会话使用环形缓冲区来捕获事件，你可能会遇到一些事件丢失的情况，因此你的死锁事件也可能丢失。\n\n这个示例演示了一个经典的循环引用。虽然不那么显而易见，但死锁是由\
  \ `Purchasing.PurchaseOrderDetail` 表上的一个触发器引起的。当 `Purchasing.PurchaseOrderDetail`\
  \ 表上的 `Quantity` 被更新时，它会尝试更新 `Purchasing.PurchaseOrderHeader` 表。当前两个查询分别在开放事务中运行时，这只是一个阻塞情况。第二个查询正在等待第一个查询完成，以便它也能更新\
  \ `Purchasing.PurchaseOrderHeader` 表。但是当引入第三个查询（即第一个事务中的第二个查询）时，就形成了循环引用。解决它的唯一方法是终止其中一个进程。\n\
  \n在继续之前，请确保回滚所有未完成的事务。\n\n现阶段有个显而易见的问题：你能避免这个死锁吗？如果答案是“能”，那么如何避免？\n\n## 避免死锁\n\n\
  避免死锁场景的方法取决于死锁的性质。以下是一些可用于避免死锁的技术：\n\n*   按相同的物理顺序访问资源。\n*   减少访问的资源数量。\n*   最小化锁争用。\n\
  *   优化查询。\n\n### 按相同的物理顺序访问资源\n\n避免死锁最常用的技术之一是确保每个事务都以相同的物理顺序访问资源。例如，假设两个事务需要访问两个资源。如果每个事务都以相同的物理顺序访问资源，那么第一个事务将成功获取资源上的锁，而不会被第二个事务阻塞。第二个事务在尝试获取第一个资源上的锁时将被第一个事务阻塞。这将导致典型的阻塞场景，而不会导致循环阻塞和死锁。\n\
  \n如果资源没有按相同的物理顺序访问（如前面的死锁分析示例所示），则可能导致两个事务之间的循环阻塞。\n\n*   事务 1：\n    *   访问资源 1\n\
  \    *   访问资源 2\n*   事务 2：\n    *   访问资源 2\n    *   访问资源 1\n\n在当前的死锁场景中，以下资源涉及死锁：\n\
  \n*   资源 1，`hobtid=72057594046578688`：这是 `Purchasing.PurchaseOrderDetail` 表上索引 `PK_PurchaseOrderDetail_PurchaseOrderId_PurchaseOrderDetailId`\
  \ 中的索引行。\n*   资源 2，`hobtid=72057594046644224`：这是 `Purchasing.PurchaseOrderHeader`\
  \ 表上聚集索引 `PK_PurchaseOrderHeader_PurchaseOrderId` 中的行。\n\n两个会话都试图访问该资源；不幸的是，它们访问键的顺序是不同的。\n\
  \n在使用诸如 nHibernate 和 Entity Framework 等工具生成的代码时，经常会在不同的查询中看到对象以不同的顺序被引用。你必须与开发团队合作，消除生成代码中的这类问题。\n\
  \n### 减少访问的资源数量\n\n死锁至少涉及两个资源。一个会话持有第一个资源，然后请求第二个资源。另一个会话持有第二个资源，然后请求第一个资源。如果你能阻止会话（或至少其中一个）访问死锁涉及的资源之一，就可以防止死锁。你可以通过重新设计应用程序来实现这一点，而这在项目后期是开发人员强烈抵制的解决方案。然而，你可以考虑使用\
  \ SQL Server 的以下功能，而无需更改应用程序设计：\n\n*   将非聚集索引转换为聚集索引。\n*   为 `SELECT` 语句使用覆盖索引。\n\
  \n#### 将非聚集索引转换为聚集索引\n\n如你所知，非聚集索引的叶级页与堆或聚集索引的数据页是分开的。因此，非聚集索引需要两个锁：一个用于基表（聚集索引或堆），一个用于非聚集索引本身。然而，在聚集索引的情况下，索引的叶级页与表的数据页是相同的；它只需要一个锁，这一个锁同时保护聚集索引和表，因为叶级页和数据页是相同的。与访问非聚集索引相比，这减少了同一查询需要访问的资源数量。但是，这完全取决于它是否是一个合适的聚集索引。聚集索引并非万能，将其应用于任何列并不一定有帮助。你仍然需要评估其适用性。\n\
  \n#### 为 SELECT 语句使用覆盖索引\n\n你也可以使用覆盖索引来减少 `SELECT` 语句访问的资源数量。由于 `SELECT` 语句可以直接从覆盖索引本身获取所有内容，因此它不需要访问基表。否则，`SELECT`\
  \ 语句需要同时访问索引和基表以检索所有需要的列值。使用覆盖索引可以阻止 `SELECT` 语句访问基表，使基表可以被另一个会话自由锁定。\n\n### 最小化锁争用\n\
  \n你也可以通过避免对某个争用资源的锁请求来解决死锁。当资源仅用于读取数据时，可以这样做。修改资源总是会在资源上获取排他锁（X 锁）以维护资源的一致性；因此，在死锁情况下，识别那些只读访问的资源，并尽可能通过使用脏读功能来避免它们的锁请求。你可以使用以下技术来避免对争用资源的锁请求：\n\
  \n*   实现行版本控制。\n*   降低隔离级别。\n*   使用锁提示。\n\n#### 实现行版本控制\n\n与其尝试使用更严格的锁定方案来阻止对资源的访问，不如通过\
  \ `READ_COMMITTED_SNAPSHOT` 隔离级别或 `SNAPSHOT` 隔离级别来实现行版本控制。行版本控制隔离级别用于减少阻塞，如第 21\
  \ 章所述。由于它们减少了阻塞（这是死锁的根本原因），因此也有助于解决死锁问题。通过以下 T-SQL 引入 `READ_COMMITTED_SNAPSHOT`，你可以在\
  \ tempdb 中获取行的一个版本，从而可能消除前面死锁场景中由锁引起的争用：\n\n```sql\nALTER DATABASE AdventureWorks2017\n\
  SET READ_COMMITTED_SNAPSHOT ON;\n```\n\n这将允许任何必要的读取操作，而不会引起锁争用，因为读取的是数据的不同版本。行版本控制存在开销，特别是在\
  \ tempdb 中以及当需要从多个资源（而不仅仅是查询中使用的表或索引）中整合数据时。但是，增加 tempdb 开销与减少死锁和提高并发性所带来的好处之间的权衡可能是值得的。\n\
  \n#### 降低隔离级别\n\n有时，`SELECT` 语句请求的（S）锁会导致循环阻塞的形成。你可以通过将包含 `SELECT` 语句的事务的隔离级别降低到\
  \ `READ COMMITTED SNAPSHOT` 来避免这种类型的循环阻塞。这将允许 `SELECT` 语句在不请求（S）锁的情况下读取数据，从而避免循环阻塞。你可能还会在游标周围看到这类问题，因为它们倾向于使用悲观并发。\n\
  \n同时检查连接是否将自己设置为 `SERIALIZABLE`。有时，在线连接字符串生成器会包含此选项，开发人员可能会无意中使用它。MSDTC 默认使用可序列化，但可以更改。\n\
  \n#### 使用锁定提示\n\n我绝对不推荐这种方法。但是，你可以使用以下锁定提示来解决前面技术中展示的死锁：\n\n*   `NOLOCK`\n*   `READUNCOMMITTED`\n\
  \n与 `READ UNCOMMITTED` 隔离级别类似，`NOLOCK` 或 `READUNCOMMITTED` 锁定提示将避免给定会话请求的（S）锁，从而防止循环阻塞的形成。\n\
  \n锁定提示的作用是在查询级别上，并且仅限于应用它的表（及其索引）。`NOLOCK` 和 `READUNCOMMITTED` 锁定提示仅允许在 `SELECT`\
  \ 语句以及 `INSERT`、`DELETE` 和 `UPDATE` 语句的数据选择部分中使用。\n\n最小化锁争用的解决技术会引入脏读的副作用，这在每个事务中可能都是不可接受的。脏读可能涉及由于页面拆分和重新排列页面而导致的行丢失或行多余。因此，仅在数据质量要求不高的情况下使用这些解决技术。\n\
  \n#### 优化查询\n\n从根本上讲，死锁是关于性能的。如果所有查询在资源争用可能发生之前就完成了执行，那么你就可以完全避免这个问题。\n\n## 总结\n\
  \n正如你在本章中学到的，死锁是进程之间冲突阻塞的结果，并以错误号 1205 报告给应用程序。你可以通过使用各种资源收集死锁信息来分析死锁的原因，但扩展事件 `xml:deadlock_report`\
  \ 可能是最好的。\n\n你可以使用多种技术来避免死锁；哪种技术适用取决于参与会话执行的查询类型、所涉及资源上保持和请求的锁，以及管理所需隔离级别的业务规则。通常，你可以通过重新配置索引和事务隔离级别来解决死锁。然而，有时你可能需要重新设计应用程序或在发生死锁时自动重新执行事务。请记住，死锁的核心是一个性能问题，任何能让查询运行更快的方法都将有助于缓解（即使不能消除）查询中的死锁。\n\
  \n在下一章中，我将介绍游标的性能方面以及如何优化使用游标的成本开销。\n\n"
- '# 23. 逐行处理


  常见的情况是，数据库应用程序使用游标一次处理一行。开发人员倾向于以逐行的方式思考数据处理。Oracle 甚至使用一种称为游标的机制作为高速数据访问方式。SQL
  Server 中的游标则不同。因为在 SQL Server 中通过游标进行数据操作会带来显著的额外开销，数据库应用程序应避免使用游标。T-SQL 和 SQL Server
  的设计初衷是处理数据集，而不是一次处理一行。Jeff Moden 著名地将这种处理方式称为 RBAR（发音为 "ree-bar"），意思是“逐行痛苦地处理”。然而，如果必须使用游标，那么请使用成本最低的游标。


  在本章中，我将涵盖以下主题：


  *   游标的基础知识

  *   游标不同特性的成本分析

  *   默认结果集相对于游标的优势和缺点

  *   最小化游标成本开销的建议



  '
- '# 游标基础


  当应用程序执行一个查询时，SQL Server 会返回一个由行组成的数据集。通常，应用程序无法一次性处理多行数据；它们通过遍历 SQL Server 返回的结果集来一次处理一行。这一功能由
  `cursor`（游标）提供，它是一种从多行结果集中一次处理一行的机制。


  T-SQL 游标处理通常涉及以下步骤：


  1.  声明游标，将其与一条 `SELECT` 语句关联，并定义游标的特征。

  2.  打开游标以访问 `SELECT` 语句返回的结果集。

  3.  从游标中提取一行。可选择通过游标修改该行。

  4.  移动到结果集中的其他行。

  5.  一旦结果集中的所有行都被处理完毕，关闭游标并释放分配给游标的资源。


  你可以使用 T-SQL 语句或用于连接到 SQL Server 的数据访问层来创建游标。使用数据访问层创建的游标通常称为 `client`（客户端）游标。用 T-SQL
  编写的游标称为 `server`（服务器端）游标。以下是一个服务器端游标处理表中查询结果的示例：


  ```

  --将 SELECT 语句关联到游标并定义游标的特性

  USE AdventureWorks2017;

  GO

  SET NOCOUNT ON

  DECLARE MyCursor CURSOR /**/

  FOR

  SELECT adt.AddressTypeID,

  adt.Name,

  adt.ModifiedDate

  FROM Person.AddressType AS adt;

  --打开游标以访问 SELECT 语句返回的结果集

  OPEN MyCursor;

  --一次从 SELECT 语句返回的结果集中提取一行

  DECLARE @AddressTypeId INT,

  @Name VARCHAR(50),

  @ModifiedDate DATETIME;

  FETCH NEXT FROM MyCursor

  INTO @AddressTypeId,

  @Name,

  @ModifiedDate;

  WHILE @@FETCH_STATUS = 0

  BEGIN

  PRINT ''NAME =   '' + @Name;

  --可选择通过游标修改该行

  UPDATE Person.AddressType

  SET Name = Name + ''z''

  WHERE CURRENT OF MyCursor;

  --在数据集中移动到其他行

  FETCH NEXT FROM MyCursor

  INTO @AddressTypeId,

  @Name,

  @ModifiedDate;

  END

  --关闭游标并释放分配给游标的所有资源

  CLOSE MyCursor;

  DEALLOCATE MyCursor;

  ```


  游标的部分开销取决于其特性。SQL Server 和数据访问层提供的游标特性大致可分为三类。


  *   `游标位置`：定义游标创建的位置。

  *   `游标并发性`：定义游标与底层内容的隔离和同步程度。

  *   `游标类型`：定义游标的特定特征。


  在探讨游标成本之前，我将用几页的篇幅介绍游标的各项特性。你可以使用以下查询来撤销对 `Person.AddressType` 表的更改：


  ```

  UPDATE Person.AddressType

  SET Name = LEFT(Name, LEN(Name) - 1);

  ```


  ## 游标位置


  根据其创建位置，游标可分为以下两类。


  *   客户端游标

  *   服务器端游标


  T-SQL 游标总是在 SQL Server 上创建。但是，数据库 API 游标可以在客户端或服务器端创建。


  ##### 客户端游标


  顾名思义，`客户端游标`是在运行应用程序的机器上创建的，无论该应用程序是服务、数据访问层还是用户前端。它具有以下特征：


  *   在客户端机器上创建。

  *   游标元数据保存在客户端机器上。

  *   使用数据访问层创建。

  *   适用于大多数数据访问层（OLEDB 提供程序和 ODBC 驱动程序）。

  *   可以是仅向前游标或静态游标。


  **注意**：游标类型，包括仅向前和静态类型，将在本章后面的“游标类型”部分进行描述。


  #### 服务器端游标


  `服务器端游标`是在 SQL Server 机器上创建的。它具有以下特征：


  *   在服务器机器上创建。

  *   游标元数据保存在服务器机器上。

  *   使用数据访问层或 T-SQL 语句创建。

  *   使用 T-SQL 语句创建的服务器端游标与 SQL Server 紧密集成。

  *   可以是任何类型的游标。（游标类型将在本章后面解释。）


  **注意**：客户端游标与服务器端游标的成本比较将在本章后面的“游标类型成本比较”部分介绍。


  ## 游标并发性


  根据与底层内容所需的隔离和同步程度，游标可分为以下并发模型：


  *   `只读`：不可更新的游标。

  *   `乐观`：使用乐观并发模型的可更新游标（不对底层数据行保留锁）。

  *   `滚动锁`：对任何要更新的数据行持有锁的可更新游标。


  ##### 只读


  只读游标是不可更新的；不对基表持有锁。在提取游标行时，是否会对底层行获取（`S`）锁取决于连接的隔离级别以及用于游标 `SELECT` 语句中使用的任何锁提示。但是，一旦行被提取，默认情况下锁就会被释放。以下
  T-SQL 语句创建一个只读 T-SQL 游标：


  ```

  DECLARE MyCursor CURSOR READ_ONLY FOR

  SELECT adt.Name

  FROM Person.AddressType AS adt

  WHERE adt.AddressTypeID = 1;

  ```


  尽可能使用最少的锁开销使得只读类型的游标更快、更安全。只需记住，你不能通过只读游标操作数据，这是为提升性能所做的牺牲。



  '
- '# 乐观并发


  基于值的乐观并发模型使游标可更新。不对底层数据持锁。决定是否在底层行上获取 (S) 锁的因素与只读游标相同。


  乐观并发模型使用行版本控制来确定自该行被读入游标以来是否已被修改，而不是在读入游标时锁定该行。基于版本的乐观并发要求在创建游标的底层用户表中包含一个 `ROWVERSION`
  列。`ROWVERSION` 数据类型是一个二进制数字，表示行上修改的相对顺序。每次修改包含 `ROWVERSION` 列的行时，SQL Server 会将全局
  `ROWVERSION` 值 `@@DBTS` 的当前值存储在该行的 `ROWVERSION` 列中；然后递增 `@@DBTS` 值。


  在通过乐观游标应用修改之前，SQL Server 会确定该行的当前 `ROWVERSION` 列值是否与读入游标时该行的 `ROWVERSION` 列值匹配。只有当
  `ROWVERSION` 值匹配时，才修改底层行，这表明在此期间该行未被其他用户修改。否则，将引发错误。如果发生错误，请使用更新后的数据刷新游标。


  如果底层表不包含 `ROWVERSION` 列，则游标默认使用基于值的乐观并发，这需要将行的当前值与读入游标时的值进行匹配。基于版本的并发控制比基于值的并发控制更高效，因为它确定底层行是否被修改所需的处理更少。因此，为了获得具有乐观并发模型的游标的最佳性能，请确保底层表具有
  `ROWVERSION` 列。


  以下 T-SQL 语句创建了一个乐观的 T-SQL 游标：

  ```sql

  DECLARE MyCursor CURSOR OPTIMISTIC FOR

  SELECT adt.Name

  FROM Person.AddressType AS adt

  WHERE adt.AddressTypeID = 1;

  ```


  '
- "# 滚动锁并发\n\n具有滚动锁并发的游标在底层行上持有 (U) 锁，直到获取了另一个游标行或游标关闭。这可以防止在游标获取该行时其他用户修改它。滚动锁并发模型使游标可更新。\n\
  \n以下 T-SQL 语句创建了一个采用滚动锁并发模型的 T-SQL 游标：\n```sql\nDECLARE MyCursor CURSOR SCROLL_LOCKS\
  \ FOR\nSELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID\
  \ = 1;\n```\n\n由于在引用行期间（直到获取另一个游标行或关闭游标）一直持有锁，因此会阻塞所有在此期间尝试修改该行的其他用户。这损害了数据库并发性，但确保了如果通过游标修改数据则不会出错。\n\
  \n## 游标类型\n\n游标可以分为以下四种类型：\n*   只进游标\n*   静态游标\n*   键集驱动游标\n*   动态游标\n\n我们将在接下来的章节中更详细地探讨这四种类型。\n\
  \n### 只进游标\n\n只进游标具有以下特征：\n*   它们直接在基表上操作。\n*   通常直到使用游标 `FETCH` 操作获取游标行时，才会从底层表检索行。但是，具有以下附加特性的数据库\
  \ API 只进游标类型会首先从底层表检索所有行：\n    *   客户端游标位置\n    *   服务器端游标位置且只读游标并发\n*   它们仅支持通过游标向前滚动（`FETCH\
  \ NEXT`）。\n*   它们允许通过游标进行所有更改（`INSERT`、`UPDATE` 和 `DELETE`）。此外，这些游标会反映对底层表所做的所有更改。\n\
  \n数据库 API 游标和 T-SQL 游标实现只进特性的方式不同。数据访问层将只进游标特性实现为前面列出的四种游标类型之一。但 T-SQL 游标并未将只进游标特性实现为一种游标类型；而是将其实现为定义游标可滚动行为的一个属性。因此，对于\
  \ T-SQL 游标，只进特性可用于定义其余三种游标类型之一的可滚动行为。\n\nT-SQL 语法提供了一个特定的游标类型选项 `FAST_FORWARD` 来创建快速只进游标。`FAST_FORWARD`\
  \ 游标的昵称是 `fire hose`，因为它是通过游标移动数据的最快方式，并且所有信息单向流动。但是，当“消防水管”仍然不如传统的基于集合的操作快时，请不要惊讶。以下\
  \ T-SQL 语句创建了一个快速只进 T-SQL 游标：\n```sql\nDECLARE MyCursor CURSOR FAST_FORWARD FOR\n\
  SELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID = 1;\n\
  ```\n\n`FAST_FORWARD` 属性指定了一个只进、只读的游标，并启用了性能优化。\n\n#### 静态游标\n\n静态游标具有以下特征：\n* \
  \  它们在打开游标时在 `tempdb` 数据库中创建游标结果的快照。此后，静态游标在 `tempdb` 数据库中的快照上操作。\n*   数据在打开游标时从底层表检索。\n\
  *   静态游标支持所有滚动选项：`FETCH FIRST`、`FETCH NEXT`、`FETCH PRIOR`、`FETCH LAST`、`FETCH ABSOLUTE\
  \ n` 和 `FETCH RELATIVE n`。\n*   静态游标始终是只读的；不允许通过静态游标进行数据修改。此外，对底层表所做的更改（`INSERT`、`UPDATE`\
  \ 和 `DELETE`）不会反映在游标中。\n\n以下 T-SQL 语句创建了一个静态 T-SQL 游标：\n```sql\nDECLARE MyCursor\
  \ CURSOR STATIC FOR\nSELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID\
  \ = 1;\n```\n\n一些测试表明，静态游标可以表现得与只进游标一样好，有时甚至更快。在必须使用游标的情况下，请务必在您自己的系统上测试此行为。\n\n\
  #### 键集驱动游标\n\n键集驱动游标具有以下特征：\n*   键集游标由一组称为 `keyset` 的唯一标识符（或键）控制。键集由一组唯一标识结果集中行的列构建而成。\n\
  *   这些游标在打开游标时在 `tempdb` 数据库中创建行的键集。\n*   游标中的行成员资格仅限于打开游标时在 `tempdb` 数据库中创建的行键集。\n\
  *   在获取游标行时，数据库引擎首先查看 `tempdb` 中的行键集，然后导航到相应底层表中的数据行以检索剩余的列。\n*   它们支持所有滚动选项。\n\
  *   键集游标允许通过游标进行所有更改。在游标外部执行的 `INSERT` 不会反映在游标中，因为游标的行成员资格仅限于打开游标时在 `tempdb` 数据库中创建的行键集。通过游标的\
  \ `INSERT` 会出现在游标末尾。在底层表上执行 `DELETE` 时，当游标导航到已删除行会引发错误。对底层表的非键集列执行的 `UPDATE` 会反映在游标中。对键集列的\
  \ `UPDATE` 会被视为对旧键值的 `DELETE` 和对新键值的 `INSERT`。如果更改使某行不符合成员资格或影响行的顺序，则该行不会消失或移动，除非游标关闭并重新打开。\n\
  \n以下 T-SQL 语句创建了一个键集驱动的 T-SQL 游标：\n```sql\nDECLARE MyCursor CURSOR KEYSET FOR\n\
  SELECT adt.Name\nFROM Person.AddressType AS adt\nWHERE adt.AddressTypeID = 1;\n\
  ```\n\n#### 动态游标\n\n以下是动态游标的特性：\n\n*   动态游标直接在基表上操作。\n*   由于直接在基表上操作，游标中的行成员关系不是固定的。\n\
  *   与仅向前游标类似，基础表中的行在通过游标 `FETCH` 操作获取游标行之前不会被检索。\n*   动态游标支持除 `FETCH ABSOLUTE n`\
  \ 以外的所有滚动选项，因为游标中的行成员关系不固定。\n*   这些游标允许通过游标进行所有更改。此外，对基础表所做的所有更改都会反映在游标中。\n*   动态游标不支持数据库\
  \ API 游标实现的所有属性和方法。诸如 `AbsolutePosition`、`Bookmark` 和 `RecordCount` 等属性，以及 `clone`\
  \ 和 `Resync` 等方法，不受动态游标支持。相反，它们由键集驱动游标支持。\n\n以下 T-SQL 语句创建了一个动态 T-SQL 游标：\n\n```sql\n\
  DECLARE MyCursor CURSOR DYNAMIC FOR\nSELECT adt.Name\nFROM Person.AddressType AS\
  \ adt\nWHERE adt.AddressTypeID = 1;\n```\n\n动态游标在所有情况下绝对是最慢的游标类型。它需要获取更多的锁并持有更长时间，这极大地增加了其糟糕的性能。在设计系统时请考虑这一点。\n\
  \n### 游标成本比较\n\n既然你已经看到了不同类型的游标，现在让我们来看看它们的成本。如果你必须使用游标，你应该总是使用能满足应用程序要求的最轻量级的游标。接下来将详细说明不同游标特性之间的成本比较。\n\
  \n#### 游标位置的成本比较\n\n客户端和服务器端游标各自具有其成本效益和开销，如下节所述。\n\n##### 客户端游标\n\n与服务器端游标相比，客户端游标具有以下成本效益：\n\
  \n*   *更高的可伸缩性*：由于游标元数据维护在连接到服务器的各个客户端机器上，维护游标元数据的开销由客户端机器承担。因此，服务更多用户的能力不受服务器资源的限制。\n\
  *   *更少的网络往返*：由于 `SELECT` 语句返回的结果集被传递到维护游标的客户端，因此在从游标检索行时不需要额外的网络往返服务器。\n*   *更快的滚动*：由于游标在客户端本地维护，遍历游标行可能更快。\n\
  *   *高度可移植*：由于游标是使用数据访问层实现的，它适用于多种数据库：SQL Server、Oracle、Sybase 等。\n\n客户端游标具有以下成本开销或缺点：\n\
  \n*   *对客户端资源压力更大*：由于游标在客户端管理，它增加了客户端资源的压力。但这可能并不那么糟糕，因为大多数时候客户端应用程序是 Web 应用程序，并且使用标准的负载均衡解决方案可以轻松地横向扩展\
  \ Web 应用程序（或 Web 服务器）。另一方面，横向扩展事务性 SQL Server 数据库仍然是一门艺术！\n*   *仅支持有限的游标类型*：不支持动态和键集驱动游标。\n\
  *   *一个连接上只能有一个活动的基于游标的语句*：结果集的尽可能多的行以网络包的形式安排并发送到客户端应用程序，直到客户端网络缓冲区满为止。因此，在应用程序获取所有游标行之前，数据库连接保持忙状态，将行推送到客户端。在此期间，其他基于游标的语句不能使用该连接。通过利用多个活动结果集（MARS）可以抵消这一点，它允许一个连接拥有第二个活动游标。\n\
  \n#### 服务器端游标\n\n服务器端游标具有以下成本效益：\n\n*   *一个连接上可以有多个活动的基于游标的语句*：使用服务器端游标时，游标操作之间连接上没有未完成的结果。这释放了连接，允许在一个连接上同时使用多个基于游标的语句。在客户端游标的情况下，如前所述，连接在应用程序获取所有游标行之前保持忙状态。这意味着它们不能被多个基于游标的语句同时使用。\n\
  *   *靠近数据的行处理*：如果行处理涉及与其他表的连接以及相当多的集合操作，那么使用服务器端游标靠近数据执行行处理是有利的。\n*   *对客户端资源压力更小*：它减少了对客户端资源的压力。但这可能不那么可取，因为如果服务器资源耗尽（而不是客户端资源），那么将需要横向扩展数据库，这是一个困难的命题。\n\
  *   *支持所有游标类型*：客户端游标在支持的游标类型上有限制。服务器端游标没有限制。\n\n服务器端游标具有以下成本开销或缺点：\n\n*   *更低的可伸缩性*：它们消耗服务器资源来管理游标，从而降低了服务器的可伸缩性。\n\
  *   *更多的网络往返*：如果在客户端应用程序中进行游标行处理，它们会增加网络往返。可以通过在存储过程中处理游标行或使用数据访问层的缓存大小特性来优化网络往返次数。\n\
  *   *可移植性较差*：使用 T-SQL 游标实现的服务器端游标不容易移植到其他数据库，因为管理游标的数据库代码语法在不同数据库之间是不同的。\n\n####\
  \ 游标并发的成本比较\n\n正如预期的那样，并发模型更高的游标在数据库中创建的阻塞最少，并支持更高的可伸缩性，如下节所述。\n\n##### 只读\n\n只读并发模型提供以下成本效益：\n\
  \n*   *最低的锁开销*：只读并发模型对数据库引入的锁和同步开销最少。由于在获取游标行后不会在底层行上持有（S）锁，因此其他用户不会被阻止访问该行。此外，通过在游标的\
  \ `SELECT` 语句中使用 `NO_LOCK` 锁定提示，可以避免在获取游标行时获取底层行的（S）锁，但这仅在你不关心由于脏读而返回的数据类型时才适用。\n\
  *   *最高的并发性*：由于不持有对底层行的额外锁，只读游标不会阻止其他用户访问底层表。共享锁仍然会被获取。\n\n只读游标的主要缺点如下：\n\n*   *不可更新*：不能通过游标修改底层表的内容。\n\
  \n\n"
- "# 游标并发模型类型详解\n\n## 乐观并发模型\n\n乐观并发模型提供以下优点：\n\n*   *低锁开销*：与只读模型类似，乐观并发模型在获取行后不会在游标行上持有（S）锁。为了进一步提高并发性，也可以使用`NOLOCK`锁定提示，就像在只读并发模型中一样。但是，请注意`NOLOCK`绝对可能导致数据不正确或行缺失、多余，因此使用它需要仔细规划。通过游标修改基础行需要如操作查询所要求的对该行的独占权利。\n\
  \n*   *高并发性*：由于仅在基础上的行使用共享锁，游标不会阻止其他用户访问基础表。但是，通过游标对基础行的修改会在修改期间阻止其他用户访问该行。\n\n\
  以下示例详细说明了乐观并发模型的成本开销：\n\n*   *行版本控制*：由于乐观并发模型允许游标可更新，因此会产生额外成本以确保在通过游标应用修改之前，首先将当前的基础行（使用基于版本或基于值的并发控制）与最初获取的游标行进行比较。这可以防止通过游标的修改意外覆盖在获取游标行后由另一用户所做的修改。\n\
  \n*   *无 ROWVERSION 列的并发控制*：如前所述，基础表中的`ROWVERSION`列允许游标执行高效的基于版本的并发控制。如果基础表不包含`ROWVERSION`列，游标将采用基于值的并发控制，这需要将行的当前值与读入游标时的值进行匹配。这增加了并发控制的成本。两种形式的并发控制都会在`tempdb`中产生额外开销。\n\
  \n## 滚动锁并发模型\n\n滚动锁并发模型的主要优点如下：\n\n*   *简单的并发控制*：通过锁定游标中最后获取行所对应的基础行，游标确保该基础行不能被另一用户修改。这消除了乐观锁的版本控制开销。此外，由于该行不能被另一用户修改，应用程序也免于检查行不匹配错误。\n\
  \n滚动锁并发模型会产生以下成本开销：\n\n*   *最高的锁开销*：滚动锁并发模型引入了悲观锁的特性。对最后获取的游标行持有（U）锁，直到获取另一个游标行或关闭游标。\n\
  \n*   *最低的并发性*：由于在基础上的行持有（U）锁，所有其他请求对该基础上行的（U）或（X）锁的用户都将被阻塞。这会严重损害并发性。因此，除非绝对必要，请避免使用此游标并发模型。\n\
  \n## 游标类型的成本比较\n\n本章前面“游标基础”部分提到的四种基本游标类型每种都会在服务器上产生不同的成本开销。选择不正确的游标类型会损害数据库性能。除了四种基本游标类型外，还提供了一种快速前向游标（前向游标的一种变体）以增强性能。这些游标类型的成本开销将在以下部分中解释。\n\
  \n### 前向游标\n\n前向游标的成本优点如下：\n\n*   *比静态和键集驱动游标更低的游标打开成本*：由于在打开游标时，游标行不是从基础表中检索的，也没有复制到`tempdb`数据库中，因此前向\
  \ T-SQL 游标打开速度快。类似地，具有乐观/滚动锁并发的前向服务器端 API 游标也打开得快，因为它们在打开游标时不检索行。\n\n*   *更低的滚动开销*：由于只能在此游标类型上执行`FETCH\
  \ NEXT`，因此支持不同滚动操作所需的开销更少。\n\n*   *对 tempdb 数据库的影响比静态和键集驱动游标更小*：由于前向 T-SQL 游标不会将行从基础表复制到`tempdb`数据库，因此不会对该数据库产生额外压力。\n\
  \n前向游标类型有以下缺点：\n\n*   *较低的并发性*：每次获取游标行时，对应的行会根据游标并发模型（如前面并发讨论中所述）使用锁定请求进行访问。它可能阻止其他用户访问该资源。\n\
  \n*   *不支持向后滚动*：需要双向滚动的应用程序不能使用此游标类型。但如果应用程序设计得当，不使用向后滚动也并非难事。\n\n### 快速前向游标\n\n\
  快速前向游标是最快且开销最小的游标类型。这种前向且只读的游标经过了专门的性能优化。因此，您应该始终优先选择它，而不是其他 SQL Server 游标类型。\n\n\
  此外，数据访问层在客户端提供了快速前向游标。该类型的游标使用所谓的*默认结果集*，使游标开销几乎消失。\n\n> **注意**\n>\n> 默认结果集将在本章后面的“默认结果集”部分进行解释。\n\
  \n#### 静态游标\n\n静态游标的成本优点如下：\n\n*   *比其他游标类型更低的提取成本*：由于在打开游标时从基础行在`tempdb`数据库中创建了快照，游标行的提取是针对快照进行的，而不是针对基础行。这避免了否则提取游标行所需的锁开销。\n\
  \n*   *不会阻塞基础行*：由于快照是在`tempdb`数据库中创建的，因此其他尝试访问基础行的用户不会被阻塞。\n\n另一方面，静态游标有以下成本开销：\n\
  \n*   *比其他游标类型更高的打开成本*：静态游标的游标打开操作比其他游标类型慢，因为在打开游标时必须从基础表中检索结果集的所有行，并且必须在`tempdb`数据库中创建快照。\n\
  \n*   *对 tempdb 的影响比其他游标类型更大*：在`tempdb`数据库中创建、填充和清理快照可能会对服务器资源产生显著影响。\n\n\n\n####\
  \ 键集驱动游标\n\n键集驱动游标具有以下成本优势：\n\n*   *打开成本低于静态游标*：由于仅在`tempdb`数据库中创建键集，而非完整的快照，因此键集驱动游标的打开速度比静态游标更快。SQL\
  \ Server 会异步填充大型键集驱动游标的键集，这缩短了从游标打开到获取第一行游标行之间的时间。\n\n*   *对 tempdb 的影响小于静态游标*：由于键集驱动游标更小，它在`tempdb`中占用的空间更少。\n\
  \n键集驱动游标的成本开销如下：\n\n*   *打开成本高于只进游标和动态游标*：在`tempdb`数据库中填充键集使得键集驱动游标的打开操作比只进游标（除了前面提到的例外情况）和动态游标的成本更高。\n\
  \n*   *获取成本高于其他游标类型*：对于每次游标行获取，必须先访问键集中的键，然后才能访问用户数据库中对应的基础行。每次游标行获取都需要访问`tempdb`和用户数据库，这使得获取操作的成本高于其他游标类型。\n\
  \n*   *对 tempdb 的影响大于只进游标和动态游标*：在`tempdb`中创建、填充和清理键集会影响服务器资源。\n\n*   *锁开销和阻塞高于静态游标*：由于从游标获取行时是从基础表中检索行，因此在行获取操作期间会对基础行获取一个(S)锁（除非使用了`NOLOCK`锁提示）。\n\
  \n#### 动态游标\n\n动态游标具有以下成本优势：\n\n*   *打开成本低于静态游标和键集驱动游标*：由于游标直接在基础行上打开，无需将任何内容复制到`tempdb`数据库，因此动态游标的打开速度比静态游标和键集驱动游标更快。\n\
  \n*   *对 tempdb 的影响小于静态游标和键集驱动游标*：由于没有内容被复制到`tempdb`，动态游标对`tempdb`造成的压力远小于其他游标类型。\n\
  \n动态游标具有以下成本开销：\n\n*   *锁开销和阻塞高于静态游标*：动态游标中的每次游标行获取都会重新查询游标的`SELECT`语句中涉及的基础表。动态获取通常开销较大，因为可能需要重新执行原始的查询条件。\n\
  \n关于不同游标及其优缺点的总结，请参见表 23-1。\n\n表 23-1\n\n游标比较\n\n| `游标类型` | `优点` | `缺点` |\n| ---\
  \ | --- | --- |\n| 只进 | 成本较低，滚动开销较低，对`tempdb`影响较小 | 并发性较低，不能向后滚动 |\n| 快速只进 | 最快的游标，成本最低，影响最小\
  \ | 不能向后滚动，没有并发性 |\n| 静态 | 获取成本较低，没有阻塞，支持向前和向后滚动 | 打开成本较高，对`tempdb`影响较大，没有并发性 |\n\
  | 键集驱动 | 打开成本较低，对`tempdb`影响较小，支持向前和向后滚动，具有并发性 | 打开成本较高，获取成本最高，对`tempdb`影响最大，锁成本较高\
  \ |\n| 动态 | 打开成本较低，对`tempdb`影响较小，支持向前和向后滚动，具有并发性 | 锁成本最高 |\n\n### 默认结果集\n\n数据访问层（`ADO`、`OLEDB`和`ODBC`）的默认游标类型是只进且只读的。数据访问层创建的默认游标类型不是真正的游标，而是从服务器到客户端的数据流，通常被称为*默认结果集*或*快速只进游标*（由数据访问层创建）。在[ADO.NET](http://ado.net)中，`DataReader`控件具有只进和只读属性，它可以被视为[ADO.NET](http://ado.net)环境中的默认结果集。SQL\
  \ Server 在以下情况下使用此类结果集处理：\n\n*   应用程序使用数据访问层（`ADO`、`OLEDB`、`ODBC`）并将所有游标特性保留为默认设置，这请求的是只进且只读的游标。\n\
  \n*   应用程序执行的是`SELECT`语句，而不是执行`DECLARE CURSOR`语句。\n\n### 注意\n\n由于 SQL Server 设计用于处理数据集，而不是逐条遍历记录，因此默认结果集始终比任何其他类型的游标更快。\n\
  \n从客户端发送到 SQL Server 的唯一请求是与默认游标关联的 SQL 语句。SQL Server 执行查询，将结果集的行组织到网络数据包中（尽可能填满数据包），然后将数据包发送到客户端。这些网络数据包被缓存在客户端的网络缓冲区中。SQL\
  \ Server 将尽可能多的结果集行发送到客户端，只要客户端网络缓冲区能够缓存。随着客户端应用程序逐行请求数据，客户端计算机上的数据访问层从客户端网络缓冲区中提取行并将其传输到客户端应用程序。\n\
  \n以下部分概述了默认结果集的优点和缺点。\n\n#### 优点\n\n默认结果集通常是从 SQL Server 返回行的最佳且最高效的方式，原因如下：\n\n\
  *   *客户端与 SQL Server 之间的网络往返次数最少*：由于 SQL Server 返回的结果集缓存在客户端网络缓冲区中，因此客户端不必通过网络发出请求来获取各个行。SQL\
  \ Server 将尽可能多的行放入网络缓冲区，并发送到客户端网络缓冲区能够缓存的最大数据量。\n\n*   *服务器开销最小*：由于 SQL Server 不需要在服务器上存储数据，这减少了服务器资源的使用。\n\
  \n#### 多个活动结果集\n\nSQL Server 2005 引入了多个活动结果集的概念，即单个连接在任何给定时刻可以运行多个批处理。在早期版本中，在提交下一个请求之前，必须处理或关闭单个结果集。MARS\
  \ 允许通过同一个连接同时提交多个请求。MARS 在 SQL Server 上始终启用。除非连接显式调用它，否则连接不会启用它。事务必须在客户端级别处理，并且必须显式声明、提交或回滚。使用\
  \ MARS 时，如果某个语句上的事务未提交且连接关闭，则属于该单个连接的所有其他事务都将回滚。MARS 通过应用程序连接属性启用。\n\n\n\n### 缺点\n\
  \n尽管默认结果集有其优势，但也存在一些缺点。使用默认结果集要获得最佳性能，需要满足一些特定条件：\n\n*   *它不支持所有属性和方法*：诸如 `AbsolutePosition`、`Bookmark`\
  \ 和 `RecordCount` 等属性，以及 `Clone`、`MoveLast`、`MovePrevious` 和 `Resync` 等方法均不受支持。\n\
  \n*   *可能持有对基础资源的锁*：SQL Server 会将尽可能多的结果集行发送到客户端网络缓冲区能够缓存的范围内。如果结果集的大小很大，客户端网络缓冲区可能无法接收所有行。此时，SQL\
  \ Server 将会持有基础表下一页的锁，该页尚未发送到客户端。\n\n为了演示这些概念，请看下面的测试表：\n\n```sql\nUSE AdventureWorks2017;\n\
  GO\nDROP TABLE IF EXISTS dbo.Test1;\nGO\nCREATE TABLE dbo.Test1 (C1 INT,\nC2 CHAR(996));\n\
  CREATE CLUSTERED INDEX Test1Index ON dbo.Test1 (C1);\nINSERT INTO dbo.Test1\nVALUES\
  \ (1, '1'),\n(2, '2');\nGO\n```\n\n现在看这个 PowerShell 脚本，它使用 ADO 与 OLEDB 以及数据库 API\
  \ 游标（`ADODB.Recordset` 对象）的默认游标类型来访问测试表的行，如下所示：\n\n```powershell\n$AdoConn = New-Object\
  \ -comobject ADODB.Connection\n$AdoRecordset = New-Object -comobject ADODB.Recordset\n\
  ##将数据源更改为你的服务器\n$AdoConn.Open(\"Provider= SQLOLEDB; Data Source=DOJO\\RANDORI; Initial\
  \ Catalog=AdventureWorks2017; Integrated Security=SSPI\")\n$AdoRecordset.Open(\"\
  SELECT * FROM dbo.Test1\", $AdoConn)\ndo {\n$C1 = $AdoRecordset.Fields.Item(\"C1\"\
  ).Value\n$C2 = $AdoRecordset.Fields.Item(\"C2\").Value\nWrite-Output \"C1 = $C1\
  \ and C2 = $C2\"\n$AdoRecordset.MoveNext()\n} until     ($AdoRecordset.EOF -eq $True)\n\
  $AdoRecordset.Close()\n$AdoConn.Close()\n```\n\n这并非通常从 PowerShell 访问数据库的方式，但它确实展示了客户端游标如何操作。请注意，该表有两行，每行大小等于\
  \ 1,000 字节（= `INT` 的 4 字节 + `CHAR(996)` 的 996 字节），不考虑内部开销。因此，`SELECT` 语句返回的完整结果集大小约为\
  \ 2,000 字节（= 2 × 1,000 字节）。\n\n在执行游标打开语句（`$AdoRecordset.Open()`）时，运行代码的客户端机器上会创建一个默认结果集。默认结果集保存的行数等于客户端网络缓冲区能够缓存的行数。\n\
  \n由于结果集的大小足够小，可以被客户端网络缓冲区缓存，因此所有游标行在游标打开语句执行期间就已缓存在客户端机器上，而无需在 `dbo.Test1` 表上保留任何锁。你可以使用\
  \ `sys.dm_tran_locks` 动态管理视图来验证连接的锁状态。在整个游标操作期间，客户端向 SQL Server 发出的唯一请求就是与游标关联的\
  \ `SELECT` 语句，如扩展事件输出图 23-1 所示。\n\n![../images/323849_5_En_23_Chapter/323849_5_En_23_Fig1_HTML.jpg](img/323849_5_En_23_Fig1_HTML.jpg)\n\
  \n图 23-1\n\n分析器跟踪输出，显示默认结果集发出的数据库请求\n\n为了了解大型结果集对默认结果集处理的影响，让我们向测试表添加更多行。\n\n```sql\n\
  SELECT TOP 100000\nIDENTITY(INT, 1, 1) AS n\nINTO #Tally\nFROM master.dbo.syscolumns\
  \ AS scl,\nmaster.dbo.syscolumns AS sc2;\nINSERT INTO dbo.Test1 (C1,\nC2)\nSELECT\
  \ n,\nn\nFROM #Tally AS t;\nGO\n```\n\n此示例生成的附加行大大增加了结果集的大小。取决于客户端网络缓冲区的大小，只能缓存部分结果集。在执行\
  \ `$AdoRecordset.Open` 语句时，客户端机器上的默认结果集将获得部分结果集，而 SQL Server 则在网络的另一端等待发送剩余的行。\n\
  \n在我的机器上，在此期间，从 `sys.dm_tran_locks` 的输出获得的锁如图 23-2 所示，这些锁持有在基础 `Test1` 表上。\n\n![../images/323849_5_En_23_Chapter/323849_5_En_23_Fig2_HTML.jpg](img/323849_5_En_23_Fig2_HTML.jpg)\n\
  \n图 23-2\n\n`sys.dm_tran_locks` 输出，显示在处理大型结果集时默认结果集持有的锁\n\n表上的 (IS) 锁将阻止其他用户尝试获取\
  \ (X) 锁。为最大限度地减少阻塞问题，请遵循以下建议：\n\n*   立即处理默认结果集的所有行。\n\n*   保持结果集较小。如示例所示，如果结果集的大小较小，则默认结果集将能够在游标打开操作本身期间读取所有行。\n\
  \n## 游标开销\n\n在应用程序中实现以游标为中心的功能时，你有两种选择。你可以使用 T-SQL 游标或数据库 API 游标。由于 T-SQL 游标和数据库\
  \ API 游标的内部实现不同，这些游标在 SQL Server 上产生的负载也不同。这些游标对数据库的影响还取决于游标的不同特性，例如位置、并发性和类型。你可以使用扩展事件来分析\
  \ T-SQL 和数据库 API 游标产生的负载。当然，用于监控查询的标准事件会很有用。在 *游标* 类别下还有许多事件。其中最有用的事件包括：\n\n*  \
  \ `cursor_open`\n\n*   `cursor_close`\n\n*   `cursor_execute`\n\n*   `cursor_prepare`\n\
  \n其他事件也很有用，但你只在尝试对特定问题进行故障排除时才需要它们。甚至这些游标的优化选项也是不同的。让我们逐一分析这些游标的开销。\n\n\n### 使用\
  \ T-SQL 游标分析开销\n\n使用 T-SQL 语句实现的 T-SQL 游标总是在 SQL Server 上执行，因为它们需要 SQL Server 引擎来处理其\
  \ T-SQL 语句。你可以结合先前解释的游标特性来减少这些游标的开销。如前所述，最轻量级的 T-SQL 游标不是使用默认设置创建的，而是通过调整设置以得到仅向前、只读游标。即便如此，用于实现游标操作的\
  \ T-SQL 语句仍需由 SQL Server 处理。游标的全部负载都由 SQL Server 支持，客户端机器不提供任何协助。假设一个应用程序需求导致必须支持以下任务列表：\n\
  \n*   识别所有已报废的产品（来自 `Production.WorkOrder` 表）。\n*   对于每个报废的产品，确定损失的金额，其中每个产品的损失金额等于库存单位乘以产品的单价。\n\
  *   计算总损失。\n*   根据总损失，确定业务状态。\n\n第二点中的 `FOR EACH` 短语表明，这些应用程序任务可以由一个游标来满足。然而，在 SQL\
  \ Server 中使用 `FOR`、`WHILE`、游标或任何其他此类处理方式可能是危险的。尽管这种方法很有吸引力，但它不是基于集合的，也不应该是你处理此类请求的方式。不过，让我们看看使用游标是如何工作的。你可以使用\
  \ T-SQL 游标如下实现这个应用程序需求：\n\n```sql\nCREATE OR ALTER PROC dbo.TotalLoss_CursorBased\n\
  AS --使用默认设置（即快速仅向前）声明一个 T-SQL 游标以检索已废弃的产品\nDECLARE ScrappedProducts CURSOR FOR\n\
  SELECT p.ProductID,\nwo.ScrappedQty,\np.ListPrice\nFROM Production.WorkOrder AS\
  \ wo\nJOIN Production.ScrapReason AS sr\nON wo.ScrapReasonID = sr.ScrapReasonID\n\
  JOIN Production.Product AS p\nON wo.ProductID = p.ProductID;\n--打开游标，一次处理一个产品\n\
  OPEN ScrappedProducts;\nDECLARE @MoneyLostPerProduct MONEY = 0,\n@TotalLoss MONEY\
  \ = 0;\n--通过一次处理一个产品来计算每个产品的损失金额\nDECLARE @ProductId INT,\n@UnitsScrapped SMALLINT,\n\
  @ListPrice MONEY;\nFETCH NEXT FROM ScrappedProducts\nINTO @ProductId,\n@UnitsScrapped,\n\
  @ListPrice;\nWHILE @@FETCH_STATUS = 0\nBEGIN\nSET @MoneyLostPerProduct = @UnitsScrapped\
  \ * @ListPrice; --计算总损失\nSET @TotalLoss = @TotalLoss + @MoneyLostPerProduct;\nFETCH\
  \ NEXT FROM ScrappedProducts\nINTO @ProductId,\n@UnitsScrapped,\n@ListPrice;\nEND\n\
  --确定状态\nIF (@TotalLoss > 5000)\nSELECT 'We are bankrupt!' AS Status;\nELSE\nSELECT\
  \ 'We are safe!' AS Status;\n--关闭游标并释放分配给游标的所有资源\nCLOSE ScrappedProducts;\nDEALLOCATE\
  \ ScrappedProducts;\nGO\n```\n\n可以按如下方式执行存储过程，但你应该执行两次以利用计划缓存（图 23-3）：\n![../images/323849_5_En_23_Chapter/323849_5_En_23_Fig3_HTML.jpg](img/323849_5_En_23_Fig3_HTML.jpg)\n\
  *图 23-3：扩展事件输出，显示了使用 T-SQL 游标进行数据处理的部分总成本*\n\n```sql\nEXEC dbo.TotalLoss_CursorBased;\n\
  ```\n\n该存储过程执行的逻辑读总数为 8,786（由图 23-3 中的 `sql_batch_completed` 事件指示）。那么，这个数字是高还是低？考虑到\
  \ `Production.Products` 表只有 6,196 页，而 `Production.WorkOrder` 表只有 926 页，这肯定不算低。你可以通过查询动态管理视图\
  \ `sys.dm_db_index_physical_stats` 来确定分配给这些表的页数。\n\n```sql\nSELECT  SUM(page_count)\n\
  FROM    sys.dm_db_index_physical_stats(DB_ID(N'AdventureWorks2017'),\nOBJECT_ID('Production.WorkOrder'),\n\
  DEFAULT, DEFAULT, DEFAULT);\n```\n\n### 注意\n\n`sys.dm_db_index_physical_stats` DMV\
  \ 在第 13 章有详细解释。\n\n在大多数情况下，你可以通过使用 SQL 查询重写功能来避免游标操作，专注于基于集合的数据访问方法。例如，你可以使用 SQL\
  \ 查询（代替游标操作）重写前面的存储过程，如下所示：\n\n```sql\nCREATE OR ALTER PROC dbo.TotalLoss\nAS\n\
  SELECT CASE --根据以下计算确定状态\nWHEN SUM(MoneyLostPerProduct) > 5000 THEN\n'We are bankrupt!'\n\
  ELSE\n'We are safe!'\nEND AS Status\nFROM\n( --计算所有已废弃产品的总损失金额\nSELECT SUM(wo.ScrappedQty\
  \ * p.ListPrice) AS MoneyLostPerProduct\nFROM Production.WorkOrder AS wo\nJOIN Production.ScrapReason\
  \ AS sr\nON wo.ScrapReasonID = sr.ScrapReasonID\nJOIN Production.Product AS p\n\
  ON wo.ProductID = p.ProductID\nGROUP BY p.ProductID) AS DiscardedProducts;\nGO\n\
  ```\n\n在这个存储过程中，使用了 SQL Server 的聚合函数来计算每个产品的损失金额和总损失。`CASE` 语句用于根据产生的总损失确定业务状态。可以按如下方式执行该存储过程；但同样，你应该执行两次，以便看到计划缓存的结果：\n\
  \n```sql\nEXEC dbo.TotalLoss;\n```\n\n图 23-4 显示了相应的扩展事件输出。\n![../images/323849_5_En_23_Chapter/323849_5_En_23_Fig4_HTML.jpg](img/323849_5_En_23_Fig4_HTML.jpg)\n\
  *图 23-4：扩展事件输出，显示了使用等效 SELECT 语句进行数据处理的总成本*\n\n在图 23-4 中，你可以看到存储过程的第二次执行（重用了现有计划）总共使用了\
  \ 547 次逻辑读。然而，你可以看到一个比读取次数更重要的结果：持续时间从 32.7 毫秒下降到了 10.3 毫秒。使用 SQL 查询代替游标操作使执行速度提高了三倍。\n\
  \n因此，为了获得更好的性能，几乎总是建议你在 SQL 查询中使用基于集合的操作，而不是 T-SQL 游标。\n\n\n## 游标使用建议\n\n游标的不当使用可能会引入额外的网络往返次数和服务器资源负载，从而降低应用程序性能。为了降低游标开销，请尽量遵循以下建议：\n\
  \n*   优先使用基于集合的 SQL 语句而非 T-SQL 游标，因为 SQL Server 是为处理数据集而设计的。\n\n*   使用开销最低的游标。\n\
  \    *   使用 SQL Server 游标时，请使用`FAST FORWARD`游标类型。\n    *   使用由 ADO、OLEDB 或 ODBC\
  \ 实现的 API 游标时，请使用默认游标类型，通常称为`默认结果集`。\n    *   使用`ADO.NET`时，请使用`DataReader`对象。\n\n\
  *   最小化对服务器资源的影响。\n    *   对于 API 游标，使用客户端游标。\n    *   不要通过游标对底层表执行操作。\n    *  \
  \ 尽早释放游标。这有助于释放资源，尤其是在 tempdb 中。\n    *   重新设计游标的`SELECT`语句（或应用程序），以返回最小的行集和列集。\n\
  \    *   通过将游标逻辑重写为基于集合的语句来完全避免使用 T-SQL 游标，这通常比游标更高效。\n    *   对于动态游标，使用`ROWVERSION`列，以利用高效、基于版本的并发控制，而不是依赖基于值的技术。\n\
  \n*   最小化对 tempdb 的影响。\n    *   避免使用静态游标和键集驱动游标，以减少 tempdb 中的资源争用。\n    *   静态游标和键集游标会给\
  \ tempdb 带来额外负载，因此如果必须使用它们，请考虑这一点，或者如果您的 tempdb 压力较大，请避免使用它们。\n\n*   最小化阻塞。\n  \
  \  *   使用默认结果集、仅向前游标或静态游标。\n    *   尽快处理所有游标行。\n    *   避免使用滚动锁或悲观锁。\n\n*   使用 API\
  \ 游标时最小化网络往返次数。\n    *   使用 ADO 的`CacheSize`属性在一次往返中获取多行数据。\n    *   使用客户端游标。\n\
  \    *   使用断开连接的记录集。\n\n## 总结\n\n正如您在本章中所学，游标是 SQL Server 返回的结果集的自然扩展，使调用应用程序能够一次处理一行数据。游标会增加应用程序性能的开销，并影响服务器资源。\n\
  \n您应该始终寻找避免使用游标的方法。在几乎所有情况下，基于集合的解决方案都更有效。但是，如果必须使用游标操作，那么请选择游标位置、并发性、类型和缓存大小特性的最佳组合，以最小化游标的开销。\n\
  \n在下一章中，我们将探讨内存中表、本机编译过程以及内存优化对象的其他方面所引入的特殊功能。\n\n"
- '# 24. 内存优化 OLTP 表与过程


  在线事务处理（OLTP）系统的一个主要需求是从系统中获取尽可能高的速度。考虑到这一点，微软引入了内存 OLTP 增强功能。这些功能在后续版本中得到了改进，并添加到
  Azure SQL Database 中。内存优化技术包括内存中表和本机编译存储过程。这套功能专为高端、事务密集型、专注于 OLTP 的系统而设计。在 SQL
  Server 2014 中，您只能在 SQL Server 的企业版中使用内存 OLTP 功能。自 SQL Server 2016 起，所有版本都支持此增强功能。内存优化技术是查询调优工具箱中的另一个工具，但它是一个高度专业化的工具，仅适用于某些应用程序。采用此技术时需谨慎。话虽如此，在拥有足够内存的合适系统上，内存中表和本机存储过程能带来极快的速度。


  本章将涵盖以下主题：


  *   内存中表工作原理的基础知识

  *   通过本机编译存储过程提高性能

  *   本机编译过程和内存 OLTP 表的优缺点

  *   何时使用内存 OLTP 表的建议


  ## 内存 OLTP 基础


  归根结底，您可以对查询进行调优，使其运行得非常快。但是，无论您让它们运行得多快，在某种程度上，您都受到现代计算机内部的一些架构问题以及 SQL Server 行为基本原理的限制。通常，硬件的头号瓶颈是存储系统。无论您仍在使用旋转盘片还是已转向某种
  SSD 或类似技术，磁盘仍然是系统中最慢的部分。这意味着对于读取或写入操作，您必须等待。但是内存速度快，并且在 64 位操作系统上，它可以非常充足。因此，如果您有可以完全移入内存的表，就可以显著提高速度。这就是内存
  OLTP 表的核心理念之一：将数据访问（包括读取和写入）移至内存中，而非磁盘上。


  然而，微软所做的不仅仅是简单地将表移入内存。它认识到，虽然磁盘速度慢，但系统减慢速度的另一个方面是数据如何通过事务系统进行访问和管理。因此，微软在这方面也进行了一系列更改。主要的一个是取消了事务的悲观处理方法。现有产品强制所有事务在允许数据更改刷新到磁盘之前写入事务日志。这在事务处理中造成了瓶颈。因此，微软采取了一种乐观的方法，认为大多数情况下事务会成功完成，而不是对事务能否成功完成持悲观态度。此外，微软对数据进行了版本化处理，而不是让一个事务在下一个事务可以访问或更新数据之前必须完成更新的阻塞情况。这消除了系统中的一个主要争用点，消除了锁，并且由于所有这些都在内存中，因此速度更快。


  微软随后又将这一切推进了一步。它将乐观方法扩展到内存锁存器管理，而不是采用防止多个进程访问页面进行写入的悲观内存锁存器方法。现在，通过版本控制，内存中表基于一个“最终”一致性的模型运行，该模型具有冲突解决过程，该过程将回滚事务，但绝不会让一个事务阻塞另一个事务。这有可能导致一些数据丢失，但它使数据访问层内的一切都变得快速。


  数据确实会被写入磁盘以在重新启动或类似情况下持久化。但是，除了在服务器启动（或数据库联机）时之外，没有任何数据从磁盘读取。然后，内存中表的所有数据都被加载到内存中，并且不会再针对磁盘读取任何这些数据。但是，如果您处理的是临时数据，甚至可以通过将数据定义为根本不持久化到磁盘来绕过此功能，从而减少启动时间。


  最后，正如您在本书其他部分所看到的，查询调优的一个主要部分是弄清楚如何与查询优化器协作以获得良好的执行计划，然后多次重用该计划。这也可能是一个密集且缓慢的过程。SQL
  Server 2014 引入了本机编译存储过程的概念。这些实际上是 T-SQL 代码编译成 DLL，并成为 SQL Server 操作系统的一部分。这个编译过程成本高昂，不应仅用于任何旧查询。主要思想是花费时间和精力将过程编译为本机代码，然后以显著提升的速度使用该过程数百万次。




  所有这些技术结合在一起，创造出新的功能性，你可以单独使用它们，也可以结合现有的表结构和标准`T-SQL`一起使用。事实上，你可以像操作普通`SQL Server`表一样来操作内存中表，并仍然能获得一些性能提升。但是，你不能在任何地方都随意这样做。要利用内存中
  OLTP 表和存储过程，有一些相当具体的要求。


  ## 系统要求


  在你考虑内存优化表是否可行之前，你必须满足几个标准要求。


  -   现代 64 位处理器

  -   为打算放入内存的数据准备两倍的可用磁盘存储空间

  -   大量内存


  显然，对于大多数系统来说，关键在于大量的内存。你需要有足够的内存来保证操作系统和`SQL Server`正常运行。然后，你还需要内存来满足系统所有非内存优化需求，包括数据缓存。最后，你还需要在此基础之上，为你的内存优化表分配内存。如果你的系统规模不算相当大（至少需要
  64GB 内存），我甚至不建议你考虑这个选项。较小的系统根本无法在内存中提供足够的存储空间，使得付出的时间和精力值得。


  仅在`SQL Server 2014`中，你必须运行`SQL Server`的企业版。当然，你也可以在`SQL Server 2014`中使用开发者版，但不能在其上运行生产负载。对于比`SQL
  Server 2014`更新的版本，根据微软发布的版本不同，存在内存限制。


  ## 基本设置


  除了硬件要求之外，你还必须对数据库进行额外操作才能启用内存中表。我将从一个新数据库开始演示。


  ```sql

  CREATE DATABASE InMemoryTest

  ON PRIMARY (NAME = N''InMemoryTest_Data'',

  FILENAME = N''D:\Data\InMemoryTest_Data.mdf'',

  SIZE = 5GB)

  LOG ON (NAME = N''InMemoryTest_Log'',

  FILENAME = N''L:\Log\InMemoryTest_Log.ldf'');

  ```


  为了使内存中表保持持久性，它们必须同时写入磁盘和内存，因为内存会随断电而消失。持久性（关系数据集的`ACID`属性之一）意味着一旦事务提交，它就会保持已提交状态。你可以拥有持久化的内存中表，也可以拥有非持久化表。对于非持久化表，你可能拥有已提交的事务，但仍然可能丢失该数据，这与`SQL
  Server`中标准表的工作方式不同。非持久化数据最广为人知的用途包括会话状态或时间敏感的信息，例如电子购物车。总之，内存中存储与你标准关系表中的通常存储方式不同。因此，必须创建独立的文件组和文件。为此，你可以像下面这样修改数据库：


  ```sql

  ALTER DATABASE InMemoryTest

  ADD FILEGROUP InMemoryTest_InMemoryData

  CONTAINS MEMORY_OPTIMIZED_DATA;

  ALTER DATABASE InMemoryTest

  ADD FILE (NAME = ''InMemoryTest_InMemoryData'',

  FILENAME = ''D:\Data\InMemoryTest_InMemoryData.ndf'')

  TO FILEGROUP InMemoryTest_InMemoryData;

  ```


  我本可以简单地修改你一直在试验的`AdventureWorks2017`数据库，但内存优化表的另一个考虑是，一旦创建了特殊的文件组就无法移除。你只能删除整个数据库。这就是为什么我只用一个单独的数据库做实验，这样更安全。这也是你在考虑如何以及在何处实施内存技术时需要谨慎的原因之一。你根本无法在你的生产服务器上尝试它，因为那会永久性地改变它们。


  对于使用内存中 OLTP 的数据库，其可用功能存在一些限制。


  -   `DBCC CHECKDB`：你可以运行一致性检查，但将跳过内存优化表。如果你尝试运行`DBCC CHECKTABLE`，则会得到错误。

  -   `AUTO_CLOSE`：不支持此功能。

  -   `DATABASE SNAPSHOT`：不支持此功能。

  -   `ATTACH_REBUILD_LOG`：也不支持此功能。

  -   数据库镜像：你无法镜像包含`MEMORY_OPTIMIZED_DATA`文件组的数据库。但是，可用性组提供了无缝体验，而故障转移群集支持内存中表（但这会影响恢复时间）。


  一旦这些修改完成，你就可以开始在系统中创建内存中表了。



  ### 创建表


  数据库设置完成后，你就可以按照前面的描述，创建内存优化的表了。实际的语法非常简单。我将尽可能复制 `AdventureWorks2017` 数据库中的 `Person.Address`
  表。


  ```sql

  USE InMemoryTest;

  GO

  CREATE TABLE dbo.Address

  (AddressID INT IDENTITY(1, 1) NOT NULL PRIMARY KEY NONCLUSTERED HASH

  WITH (BUCKET_COUNT = 50000),

  AddressLine1 NVARCHAR(60) NOT NULL,

  AddressLine2 NVARCHAR(60) NULL,

  City NVARCHAR(30) NOT NULL,

  StateProvinceID INT NOT NULL,

  PostalCode NVARCHAR(15) NOT NULL,

  --SpatialLocation geography NULL,

  --rowguid uniqueidentifier ROWGUIDCOL  NOT NULL CONSTRAINT DF_Address_rowguid  DEFAULT
  (newid()),

  ModifiedDate DATETIME NOT NULL

  CONSTRAINT DF_Address_ModifiedDate

  DEFAULT (GETDATE()))

  WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA);

  ```


  这条语句在系统内存中创建了一个持久化的表，使用你定义的磁盘空间来保留数据的持久副本，确保在断电情况下不会丢失数据。它有一个像常规 SQL Server 表一样的
  `IDENTITY` 值作为主键（但是，在此版本的 SQL Server 中，要使用 `IDENTITY` 而不是 `SEQUENCE`，你就无法将定义设置为除
  `(1,1)` 以外的任何值）。你会注意到索引定义不是聚集的，而是 `NONCLUSTERED HASH`。我将在下一节讨论索引和 `BUCKET_COUNT`
  等问题。你还会注意到我不得不注释掉两列：`SpatialLocation` 和 `rowguid`。这些列使用的数据类型在内存优化表中不可用。最后，`WITH`
  子句通过定义 `MEMORY_OPTIMIZED=ON`，让 SQL Server 知道将此表放置在何处。通过修改 `WITH` 子句使用 `DURABILITY=SCHEMA_ONLY`，你可以创建一个更快的表。这允许数据丢失，但由于没有任何内容写入磁盘，使得表速度更快。


  #### 限制条件


  有许多不支持的数据类型可能会阻止你利用内存优化表的优势。


  * `XML`

  * `ROWVERSION`

  * `SQL_VARIANT`

  * `HIERARCHYID`

  * `DATETIMEOFFSET`

  * `GEOGRAPHY/GEOMETRY`

  * 用户定义的数据类型


  除了数据类型，你还会遇到其他限制。我将在“内存索引”一节中讨论索引要求。从 SQL Server 2016 开始，增加了对外键、检查约束和唯一约束的支持。


  #### 查询与数据加载


  在内存中创建表后，你可以像访问常规表一样访问它。如果我现在对它运行一个查询，它不会返回任何行，但功能是正常的。


  ```sql

  SELECT a.AddressID

  FROM dbo.Address AS a

  WHERE a.AddressID = 42;

  ```


  所以，为了在数据库中试验一些实际数据，请继续将 `AdventureWorks2017` 数据库中 `Person.Address` 表存储的信息加载到这个新数据库中存储在内存中的新表中。


  ```sql

  CREATE TABLE dbo.AddressStaging (AddressLine1 NVARCHAR(60) NOT NULL,

  AddressLine2 NVARCHAR(60) NULL,

  City NVARCHAR(30) NOT NULL,

  StateProvinceID INT NOT NULL,

  PostalCode NVARCHAR(15) NOT NULL);

  INSERT dbo.AddressStaging (AddressLine1,

  AddressLine2,

  City,

  StateProvinceID,

  PostalCode)

  SELECT a.AddressLine1,

  a.AddressLine2,

  a.City,

  a.StateProvinceID,

  a.PostalCode

  FROM AdventureWorks2017.Person.Address AS a;

  INSERT dbo.Address (AddressLine1,

  AddressLine2,

  City,

  StateProvinceID,

  PostalCode)

  SELECT a.AddressLine1,

  a.AddressLine2,

  a.City,

  a.StateProvinceID,

  a.PostalCode

  FROM dbo.AddressStaging AS a;

  DROP TABLE dbo.AddressStaging;

  ```


  你不能在跨数据库查询中结合使用内存优化表，所以我不得不将大约 19,000 行数据加载到一个临时表，然后再加载到内存优化表中。这并非性能示例的一部分，但值得注意的是，在我的系统上，将数据插入标准表花了将近
  850 毫秒，而将相同数据加载到内存优化表中只用了 2 毫秒。


  但是，数据就位后，我可以重新运行查询并实际看到结果，如图 [24-1 所示。


  ![../images/323849_5_En_24_Chapter/323849_5_En_24_Fig1_HTML.jpg](img/323849_5_En_24_Fig1_HTML.jpg)


  **图 24-1** 内存优化表的首次查询结果


  诚然，这并不那么令人兴奋。所以，为了有一些有意义的数据可操作，我将创建另外几个表，以便你可以看到更多的查询行为展示。


  ```sql

  CREATE TABLE dbo.StateProvince (StateProvinceID INT IDENTITY(1, 1) NOT NULL PRIMARY
  KEY NONCLUSTERED HASH

  WITH (BUCKET_COUNT = 10000),

  StateProvinceCode NCHAR(3) COLLATE Latin1_General_100_BIN2 NOT NULL,

  CountryRegionCode NVARCHAR(3) NOT NULL,

  Name VARCHAR(50) NOT NULL,

  TerritoryID INT NOT NULL,

  ModifiedDate DATETIME NOT NULL

