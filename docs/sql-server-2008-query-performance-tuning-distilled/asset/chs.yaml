  \ Azure 中看到一个调优建议，建议你开启 `FORCED PARAMETERIZATION`。这是我将在第 25 章详细介绍的自动调优建议的一个方面。\n\
  \n### 准备好的工作负载的计划重用性\n\n将查询定义为准备好的工作负载允许显式地对查询的可变部分进行参数化。这使得 SQL Server 能够生成一个不绑定到查询可变部分的查询计划，并将可变部分保留在单独的执行上下文中。正如你在上一节中看到的，SQL\
  \ Server 支持三种提交准备好的工作负载的技术。\n\n*   存储过程\n*   `sp_executesql`\n*   Prepare/execute\
  \ 模型\n\n在接下来的部分中，我将更深入地介绍这些技术中的每一种，并指出参数化执行计划可能在哪些地方导致问题。\n\n#### 存储过程\n\n使用存储过程是提高计划缓存有效性的标准技术。当存储过程在执行时编译（对于本机编译过程则不同，这将在第\
  \ 24 章中介绍），会为存储过程中的每个 SQL 语句生成一个计划。为存储过程生成的执行计划可以在使用不同参数值重新执行该存储过程时重复使用。\n\n除了检查\
  \ `sys.dm_exec_cached_plans`，您还可以使用扩展事件工具跟踪存储过程的执行计划缓存。扩展事件提供了表 16-2 中列出的事件来跟踪存储过程的计划缓存。\n\
  \n表 16-2\n\n用于分析存储过程计划缓存的事件类\n\n| 事件 | 描述 |\n| --- | --- |\n| `sp_cache_hit` | 在缓存中找到计划。\
  \ |\n| `sp_cache_miss` | 在缓存中未找到计划。 |\n| `sp_cache_insert` | 当计划被添加到缓存时触发该事件。 |\n\
  | `sp_cache_remove` | 当计划从缓存中移除时触发该事件。 |\n\n要使用跟踪事件跟踪存储过程计划缓存，您可以将这些事件与其他存储过程事件一起使用。为了理解存储过程如何改进计划缓存，请重新检查前面创建的名为\
  \ `BasicSalesInfo` 的过程。为清晰起见，此处重复该过程：\n\n```sql\nCREATE OR ALTER PROC dbo.BasicSalesInfo\n\
  @ProductID INT,\n@CustomerID INT\nAS\nSELECT soh.SalesOrderNumber,\nsoh.OrderDate,\n\
  sod.OrderQty,\nsod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod\nON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID = @CustomerID\n\
  AND sod.ProductID = @ProductID;\n```\n\n要为 `soh.Customerld = 29690` 和 `sod.ProductId=711`\
  \ 检索结果集，您可以像这样执行存储过程：\n\n```sql\nEXEC dbo.BasicSalesInfo @CustomerID = 29690, @ProductID\
  \ = 711;\n```\n\n图 16-14 显示了 `sys.dm_exec_cached_plans` 的输出。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig14_HTML.jpg](img/323849_5_En_16_Fig14_HTML.jpg)\n\
  \n图 16-14\n\n显示存储过程计划缓存的 `sys.dm_exec_cached_plans` 输出\n\n从图 16-14 可以看到，生成了一个类型为\
  \ `Proc` 的已编译计划并为存储过程缓存。由于存储过程仅执行了一次，可执行计划的 `usecounts` 值为 1。\n\n图 16-15 显示了此存储过程执行的扩展事件输出。\n\
  \n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig15_HTML.jpg](img/323849_5_En_16_Fig15_HTML.jpg)\n\
  \n图 16-15\n\n显示存储过程计划不易在缓存中找到的扩展事件输出\n\n从扩展事件输出中，您可以看到存储过程的计划未在缓存中找到。当第一次执行存储过程时，SQL\
  \ Server 在计划缓存中查找，但未能找到过程 `BasicSalesInfo` 的任何缓存条目，从而导致 `sp_cache_miss` 事件。由于未找到缓存的计划，SQL\
  \ Server 会安排编译该存储过程。随后，SQL Server 生成并保存计划，然后继续执行存储过程。您可以在 `sp_cache_insert` 事件中看到这一点。\n\
  \n如果重新执行此存储过程以检索 `@Productld = 777` 的结果集，则会重用现有计划，如图 16-16 中的 `sys.dm_exec_cached_plans`\
  \ 输出所示。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig16_HTML.jpg](img/323849_5_En_16_Fig16_HTML.jpg)\n\
  \n图 16-16\n\n显示存储过程计划重用的 `sys.dm_exec_cached_plans` 输出\n\n```sql\nEXEC dbo.BasicSalesInfo\
  \ @CustomerID = 29690, @ProductID = 777;\n```\n\n您也可以从扩展事件输出中确认执行计划的重用，如图 16-17\
  \ 所示。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig17_HTML.jpg](img/323849_5_En_16_Fig17_HTML.jpg)\n\
  \n图 16-17\n\n显示存储过程计划重用的 Profiler 跟踪输出\n\n从扩展事件输出中，您可以看到在计划缓存中找到了现有计划。在搜索缓存时，SQL\
  \ Server 找到了存储过程 `BasicSalesInfo` 的可执行计划，从而导致 `sp_cache_hit` 事件。一旦找到现有的执行计划，SQL\
  \ 就会重用该计划来执行存储过程。一个值得注意的有趣现象是，在 `sp_cache_hit` 之前正好有一个 `sp_cache_miss` 事件，该事件是针对调用该过程的\
  \ SQL 批处理的。由于参数值的更改，该语句未在缓存中找到，但过程的执行计划找到了。这个看似“额外”的缓存未命中事件可能会引起混淆。\n\n存储过程的其他方面也值得考虑：\n\
  \n*   存储过程在首次执行时编译。\n*   存储过程具有其他性能优势，例如减少网络流量。\n*   存储过程具有额外优势，例如数据隔离。\n\n### 存储过程在首次执行时编译\n\
  \n存储过程的执行计划在首次执行时生成。创建存储过程时，它仅被解析并保存在数据库中。在存储过程创建期间不执行规范化和优化过程。这允许在创建存储过程所访问的所有对象之前创建存储过程。例如，即使存储过程中引用的表\
  \ `NotHere` 不存在，您也可以创建以下存储过程：\n\n```sql\nCREATE OR ALTER PROCEDURE dbo.MyNewProc\n\
  AS\nSELECT MyID\nFROM dbo.NotHere; --Table dbo.NotHere doesn't exist\n```\n\n存储过程将成功创建，因为在存储过程创建期间不执行将引用的对象绑定到查询树（在存储过程执行期间由命令解析器生成）的规范化过程。如果到那时尚未创建表\
  \ `NotHere`，存储过程将在第一次执行时报告错误，因为存储过程在第一次执行时编译。\n\n### 存储过程的其他性能优势\n\n除了通过执行计划可重用性来提升性能外，存储过程还提供以下性能优势：\n\
  \n- **业务逻辑贴近数据**：对数据库中存储的数据执行大量操作的业务逻辑部分，应当置于存储过程中，因为 `SQL Server` 的引擎对于关系型和集合论操作极为强大。\n\
  \n- **减少网络流量**：数据库应用程序仅通过网络发送存储过程的名称和参数值。只有处理后的结果集才会被返回给应用程序。中间数据无需在应用程序和数据库之间来回传递。\n\
  \n- **应用程序与数据结构变更隔离**：如果所有关键的数据访问都通过存储过程进行，那么当数据库架构发生变化时，可以重新创建存储过程，而不影响通过这些存储过程访问数据的应用程序代码。实际上，甚至无需停止访问数据库的应用程序。\n\
  \n- **存在单一管理点**：所有在存储过程中实现的业务逻辑都作为数据库的一部分进行维护，并可以在数据库本身上进行集中管理。当然，这个优势具有高度的相对性，取决于你问的是谁。要获得不同的意见，请问问非\
  \ `DBA` 人员！\n\n- **可以增强安全性**：可以对数据库表的用户权限进行限制，并仅允许通过存储过程中实现的标准业务逻辑来执行。例如，如果你想限制用户\
  \ `UserOne` 从表 `RestrictedAccess` 中物理删除行，并仅允许其通过存储过程 `MarkDeleted`，将行的状态设置为 `'Deleted'`\
  \ 来虚拟标记删除，那么你可以按如下方式执行 `DENY` 和 `GRANT` 命令：\n\n```sql\nDROP TABLE IF EXISTS dbo.RestrictedAccess;\n\
  GO\nCREATE TABLE dbo.RestrictedAccess (ID INT,\nStatus VARCHAR(7));\nINSERT INTO\
  \ dbo.RestrictedAccess\nVALUES (1, 'New');\nGO\nIF (SELECT OBJECT_ID('dbo.MarkDeleted'))\
  \ IS NOT NULL\nDROP PROCEDURE dbo.MarkDeleted;\nGO\nCREATE PROCEDURE dbo.MarkDeleted\
  \ @ID INT\nAS\nUPDATE dbo.RestrictedAccess\nSET Status = 'Deleted'\nWHERE ID = @ID;\n\
  GO\n--防止用户 u1 删除行\nDENY DELETE ON dbo.RestrictedAccess TO  UserOne;\n--允许用户 u1 将行标记为“已删除”\n\
  GRANT EXECUTE ON dbo.MarkDeleted TO UserOne;\n```\n\n这假设了用户 `UserOne` 的存在。请注意，如果存储过程\
  \ `MarkDeleted` 中的查询是动态构建为字符串（`@SQL`）的，如下所示，那么授予存储过程的权限将不会授予该查询任何权限，因为动态查询不被视为存储过程的一部分：\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.MarkDeleted @ID INT\nAS\nDECLARE @SQL NVARCHAR(MAX);\n\
  SET @SQL = 'UPDATE  dbo.RestrictedAccess\nSET     Status = \"Deleted\"\nWHERE  \
  \ ID = ' + @ID;\nEXEC sys.sp_executesql @SQL;\nGO\nGRANT EXECUTE ON dbo.MarkDeleted\
  \ TO UserOne;\n```\n\n因此，用户 `UserOne` 将无法使用存储过程 `MarkDeleted` 将行标记为 `'Deleted'`。（我将在下一章介绍在存储过程中使用动态查询的各个方面。）但是，如果该用户拥有明确的权限或授予该执行权限的角色成员身份，这种方法就行不通了。\n\
  \n由于存储过程是作为数据库对象保存的，它们给数据库管理增加了部署和管理开销。很多时候，你可能只需要从应用程序中执行一条或几条查询。如果这些单例查询频繁执行，你应该致力于重用它们的执行计划以提高性能。但是为这些单独的单例查询创建存储过程，会在数据库中增加大量的存储过程，从而显著增加数据库管理开销。为了避免使用存储过程的维护开销，同时又能获得计划重用的好处，可以使用系统存储过程\
  \ `sp_executesql` 将单例查询作为预处理的工作负载提交。\n\n\n### sp_executesql\n\n`sp_executesql` 是一个系统存储过程，它提供了一种将一个或多个查询作为预处理工作负载提交的机制。它允许显式参数化查询中的可变部分，因此可以提供与存储过程一样有效的执行计划重用性。下面展示了如何通过\
  \ `sp_executesql` 提交来自 `BasicSalesInfo` 的 `SELECT` 语句：\n\n```sql\nDECLARE @query\
  \ NVARCHAR(MAX),\n        @paramlist NVARCHAR(MAX);\nSET @query\n= N'SELECT soh.SalesOrderNumber,\n\
  \          soh.OrderDate,\n          sod.OrderQty,\n          sod.LineTotal\n  \
  \ FROM Sales.SalesOrderHeader AS soh\n   JOIN Sales.SalesOrderDetail AS sod\n  \
  \   ON soh.SalesOrderID = sod.SalesOrderID\n   WHERE soh.CustomerID = @CustomerID\n\
  \     AND sod.ProductID = @ProductID';\nSET @paramlist = N'@CustomerID INT, @ProductID\
  \ INT';\nEXEC sp_executesql @query,\n                   @paramlist,\n          \
  \         @CustomerID = 29690,\n                   @ProductID = 711;\n```\n\n请注意，传递给\
  \ `sp_executesql` 存储过程的字符串被声明为 `NVARCHAR` 类型，并且在构建时带有 `N` 前缀。这是必需的，因为 `sp_executesql`\
  \ 将 Unicode 字符串作为输入参数。\n\n`sys.dm_exec_cached_plans` 的输出如下所示（参见图 16-18）：\n\n![图\
  \ 16-18：显示使用 sp_executesql 生成的参数化计划的 sys.dm_exec_cached_plans 输出](img/323849_5_En_16_Fig18_HTML.jpg)\n\
  \n```sql\nSELECT c.usecounts,\n       c.cacheobjtype,\n       c.objtype,\n     \
  \  t.text\nFROM sys.dm_exec_cached_plans AS c\nCROSS APPLY sys.dm_exec_sql_text(c.plan_handle)\
  \ AS t\nWHERE text LIKE '(@CustomerID%';\n```\n\n在图 16-18 中，您可以看到计划是为通过 `sp_executesql`\
  \ 提交的查询的参数化部分生成的。由于该计划不绑定到查询的可变部分，因此如果使用不同的参数值（例如 `@ProductID=777`）重新提交此查询，就可以重用现有的执行计划，如下所示：\n\
  \n```sql\nEXEC sp_executesql @query, @paramlist, @CustomerID = 29690, @ProductID\
  \ = 777;\n```\n\n图 16-19 显示了 `sys.dm_exec_cached_plans` 的输出。\n\n![图 16-19：显示使用 sp_executesql\
  \ 生成的参数化计划被重用的 sys.dm_exec_cached_plans 输出](img/323849_5_En_16_Fig19_HTML.jpg)\n\
  \n从图 16-19 可以看到，当使用不同的变量值重新提交查询时，现有计划被重用（第 2 行的计划的 `usecounts` 为 2）。如果此查询使用可变部分的不同值多次重新提交，现有的执行计划可以被重用，而无需重新生成新的执行计划。\n\
  \n为其创建计划的查询（`text` 列）与通过 `sp_executesql` 提交的参数化查询的文本字符串完全匹配。因此，如果相同的查询从应用程序的不同部分提交，请确保在所有地方使用相同的文本字符串。例如，如果相同的查询以查询字符串的微小修改（比如使用小写字母代替大写字母）重新提交，则不会重用现有计划，而是会创建一个新计划，如图\
  \ 16-20 中的 `sys.dm_exec_cached_plans` 输出所示。\n\n![图 16-20：显示使用 sp_executesql 生成的计划敏感性的\
  \ sys.dm_exec_cached_plans 输出](img/323849_5_En_16_Fig20_HTML.jpg)\n\n```sql\nSET\
  \ @query = N'SELECT    soh.SalesOrderNumber ,\n                         soh.OrderDate\
  \ ,\n                         sod.OrderQty ,\n                         sod.LineTotal\n\
  \               FROM       Sales.SalesOrderHeader AS soh\n               JOIN  \
  \     Sales.SalesOrderDetail AS sod\n                 ON       soh.SalesOrderID\
  \ = sod.SalesOrderID\n               where      soh.CustomerID = @CustomerID\n \
  \                AND      sod.ProductID = @ProductID' ;\n```\n\n另一种查看缓存中创建了两个不同计划的方法是使用其他动态管理对象来查看缓存中计划的属性。\n\
  \n```sql\nSELECT  decp.usecounts,\n        decp.cacheobjtype,\n        decp.objtype,\n\
  \        dest.text,\n        deqs.creation_time,\n        deqs.execution_count,\n\
  \        deqs.query_hash,\n        deqs.query_plan_hash\nFROM    sys.dm_exec_cached_plans\
  \ AS decp\nCROSS APPLY sys.dm_exec_sql_text(decp.plan_handle) AS dest\nJOIN    sys.dm_exec_query_stats\
  \ AS deqs\n  ON    decp.plan_handle = deqs.plan_handle\nWHERE   dest.text LIKE '(@CustomerID\
  \ INT, @ProductID INT)%' ;\n```\n\n图 16-21 显示了此查询的结果。\n\n![图 16-21：来自 sys.dm_exec_query_stats\
  \ 的附加输出](img/323849_5_En_16_Fig21_HTML.jpg)\n\n`sys.dm_exec_query_stats` 的输出显示查询的两个版本具有不同的\
  \ `creation_time` 值。更有趣的是，它们具有相同的 `query_hash` 值但不同的 `query_plan_hash` 值（关于这些哈希值将在后面章节详述）。所有这些都表明，更改大小写会导致存储在缓存中的执行计划不同。\n\
  \n通常，使用 `sp_executesql` 来显式参数化查询，以便在使用可变部分的不同值重新提交查询时，其执行计划可以重用。这提供了可重用计划的性能优势，而没有管理任何持久对象（如存储过程所要求的）的开销。此功能通过\
  \ `SQLExecDirect` 和 `ICommandWithParameters` 分别由 ODBC 和 OLEDB 公开。与 .NET 开发人员或 [ADO.NET](http://ado.net)（ADO\
  \ 2.7 或更新版本）用户一样，您可以使用 ADO `Command` 和 `Parameters` 提交前面的 `SELECT` 语句。如果您将 ADO `Command\
  \ Prepared` 属性设置为 `FALSE` 并使用 ADO `Command`（例如 `('SELECT * FROM \"Order Details\"\
  \ d, Orders o WHERE d.OrderID=o.OrderID and d.ProductID=?)'`）以及 ADO `Parameters`，那么\
  \ [ADO.NET](http://ado.net) 将使用 `sp_executesql` 发送 `SELECT` 语句。大多数对象关系映射工具，如 nHibernate\
  \ 或 Entity Framework，也具有允许准备语句和使用参数的机制。\n\n最后，如果您必须像之前那样通过字符串构建查询，请务必使用参数。当您传入参数时，无论使用哪种方法，请确保您使用的是强类型参数，并将这些参数作为参数在您的\
  \ T-SQL 语句中使用。所有这些都将有助于避免 SQL 注入攻击。\n\n除了参数之外，`sp_executesql` 每次重新执行查询时都会通过网络发送整个查询字符串。您可以通过使用\
  \ ODBC 和 OLEDB（或 OLEDB .NET）的准备/执行模型来避免这一点。\n\n### 准备/执行模型\n\nODBC 和 OLEDB 提供了一个准备/执行模型，用于将查询作为预处理工作负载提交。与\
  \ `sp_executesql` 类似，此模型允许显式参数化查询的可变部分。准备阶段允许 SQL Server 为查询生成执行计划，并将执行计划的句柄返回给应用程序。该执行计划句柄由执行阶段用于使用不同的参数值执行查询。此模型只能用于通过\
  \ ODBC 或 OLEDB 提交查询，它不能在 SQL Server 内部使用——存储过程内的查询无法使用此模型执行。\n\nSQL Server ODBC\
  \ 驱动程序提供了 `SQLPrepare` 和 `SQLExecute` API 来支持准备/执行模型。SQL Server OLEDB 提供程序通过 `ICommandPrepare`\
  \ 接口公开此模型。[ADO.NET](http://ado.net) 的 OLEDB .NET 提供程序的行为类似。\n\n### 注意\n\n有关如何在数据库应用程序中使用准备/执行模型的详细说明，请参阅\
  \ MSDN 文章 “SqlCommand.Prepare Method”（ [`http://bit.ly/2DBzN4b`](http://bit.ly/2DBzN4b)\
  \ ）。\n\n\n\n## 查询计划哈希与查询哈希\n\n在 SQL Server 2008 中，引入了围绕执行计划和缓存的新功能，称为 `查询计划哈希` 和\
  \ `查询哈希`。这些是二进制对象，通过对查询或查询计划应用算法来生成二进制哈希值。这对于开发中一种常见的做法——*复制粘贴*——非常有用。你会发现通用的模式和实践会在整个代码中重复出现。在最好的情况下，这是一件好事，因为你看到的最佳类型的查询、联接、基于集合的操作等，会根据需要从一个过程复制到另一个过程。但有时，你会看到最糟糕的实践在你的代码中一遍又一遍地重复。这正是\
  \ `查询哈希` 和 `查询计划哈希` 发挥作用、为你提供帮助的地方。\n\n你可以从 `sys.dm_exec_query_stats` 或 `sys.dm_exec_requests`\
  \ 中检索 `查询计划哈希` 和 `查询哈希`。你也可以从查询存储中获取这些哈希值。尽管这是一种识别查询及其计划的机制，但哈希值并非唯一。不同的计划可能得到相同的哈希值，因此你不能依赖它作为替代主键。\n\
  \n要查看实际运行的哈希值，请创建两个查询。\n\n```sql\nSELECT *\nFROM Production.Product AS p\nJOIN Production.ProductSubcategory\
  \ AS ps\nON p.ProductSubcategoryID = ps.ProductSubcategoryID\nJOIN Production.ProductCategory\
  \ AS pc\nON ps.ProductCategoryID = pc.ProductCategoryID\nWHERE pc.Name = 'Bikes'\n\
  AND ps.Name = 'Touring Bikes';\nSELECT *\nFROM Production.Product AS p\nJOIN Production.ProductSubcategory\
  \ AS ps\nON p.ProductSubcategoryID = ps.ProductSubcategoryID\nJOIN Production.ProductCategory\
  \ AS pc\nON ps.ProductCategoryID = pc.ProductCategoryID\nwhere pc.Name = 'Bikes'\n\
  and ps.Name = 'Road Bikes';\n```\n\n请注意，两个查询之间唯一的实质性区别在于 `ProductSubcategory.Name`\
  \ 的值不同，一个是 `Touring Bikes`，另一个是 `Road Bikes`。同时，请注意第二个查询中的 `WHERE` 和 `AND` 关键字是小写的。执行这两个查询后，你可以通过以下查询从\
  \ `sys.dm_exec_query_stats` 中看到这些格式变化的结果，如图 16-22 所示：\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig22_HTML.jpg](img/323849_5_En_16_Fig22_HTML.jpg)\n\
  图 16-22: `sys.dm_exec_query_stats` 显示计划哈希值\n\n```sql\nSELECT deqs.execution_count,\n\
  deqs.query_hash,\ndeqs.query_plan_hash,\ndest.text\nFROM sys.dm_exec_query_stats\
  \ AS deqs\nCROSS APPLY sys.dm_exec_sql_text(deqs.plan_handle) AS dest\nWHERE dest.text\
  \ LIKE 'SELECT *\nFROM Production.Product AS p%';\n```\n\n创建了两个不同的计划，因为这些不是参数化查询；它们过于复杂，无法被视为简单参数化，并且强制参数化是关闭的。这两个计划的哈希值相同，因为它们仅在传递的值上有所不同。大小写的差异对于\
  \ `查询哈希` 或 `查询计划哈希` 值并不重要。但是，如果你更改了 `SELECT` 条件，那么从 `sys.dm_exec_query_stats` 中检索到的值将如图\
  \ 16-23 所示，查询将发生变化。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig23_HTML.jpg](img/323849_5_En_16_Fig23_HTML.jpg)\n\
  图 16-23: `sys.dm_exec_query_stats` 显示不同的哈希值\n\n```sql\nSELECT  p.ProductID\nFROM\
  \    Production.Product AS p\nJOIN    Production.ProductSubcategory AS ps\nON p.ProductSubcategoryID\
  \ = ps.ProductSubcategoryID\nJOIN    Production.ProductCategory AS pc\nON ps.ProductCategoryID\
  \ = pc.ProductCategoryID\nWHERE   pc.[Name] = 'Bikes'\nAND ps.[Name] = 'Touring\
  \ Bikes';\n```\n\n尽管查询的基本结构相同，但返回列的更改足以改变 `查询哈希` 值和 `查询计划哈希` 值。\n\n由于数据分布和索引的差异可能导致相同的查询产生两个不同的计划，因此\
  \ `query_hash` 可以相同，而 `query_plan_hash` 可以不同。为了说明这一点，请执行两个新的查询。\n\n```sql\nSELECT\
  \ p.Name,\ntha.TransactionDate,\ntha.TransactionType,\ntha.Quantity,\ntha.ActualCost\n\
  FROM Production.TransactionHistoryArchive AS tha\nJOIN Production.Product AS p\n\
  ON tha.ProductID = p.ProductID\nWHERE p.ProductID = 461;\nSELECT p.Name,\ntha.TransactionDate,\n\
  tha.TransactionType,\ntha.Quantity,\ntha.ActualCost\nFROM Production.TransactionHistoryArchive\
  \ AS tha\nJOIN Production.Product AS p\nON tha.ProductID = p.ProductID\nWHERE p.ProductID\
  \ = 712;\n```\n\n与之前使用的原始查询类似，这些查询仅在传递给 `ProductID` 列的值上有所不同。运行这两个查询后，你可以从 `sys.dm_exec_query_stats`\
  \ 中选择数据以查看哈希值（图 16-24）。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig24_HTML.jpg](img/323849_5_En_16_Fig24_HTML.jpg)\n\
  图 16-24: `query_plan_hash` 的差异\n\n你可以看到 `query_hash` 值是相同的，但 `query_plan_hash` 值不同。这是因为基于传递值的统计信息所创建的执行计划差异很大，如图\
  \ 16-25 所示。\n\n![../images/323849_5_En_16_Chapter/323849_5_En_16_Fig25_HTML.jpg](img/323849_5_En_16_Fig25_HTML.jpg)\n\
  图 16-25: 不同的参数导致截然不同的计划\n\n`查询计划哈希` 和 `查询哈希` 值可以是用于追踪不同查询之间常见问题的有用工具，但正如你所看到的，它们不可能在每种情况下都检索到一组准确的信息。它们确实为识别其他可能存在的查询性能问题的位置增添了另一个有用的工具。它们也可以用于跟踪随时间变化的执行计划。你可以在将查询部署到生产环境后捕获其\
  \ `query_plan_hash`，然后随时间观察它是否因数据更改而发生变化。借此，你还可以通过计划跟踪聚合的查询统计信息，参考 `sys.dm_exec_querystats`，但请记住，聚合数据在服务器重启或以任何方式清除计划缓存时会被重置。然而，查询存储中的相同信息会通过备份、服务器重启、清除计划缓存等方式持久保存。在调优查询时，请记住这些工具。\n\
  \n## 执行计划缓存建议\n\n计划缓存的基本目的是通过重用执行计划来提高性能。因此，确保你的执行计划真正可重用至关重要。由于即席查询的计划重用效率低下，通常建议尽可能依赖预处理的负载技术。为确保高效使用计划缓存，请遵循以下建议：\n\
  \n*   显式参数化查询的可变部分。\n*   使用存储过程来实现业务功能。\n*   使用 `sp_executesql` 以避免存储过程维护。\n*  \
  \ 使用准备/执行模型以避免重新发送查询字符串。\n*   避免即席查询。\n*   对于动态查询，使用 `sp_executesql` 而非 `EXECUTE`。\n\
  *   谨慎参数化查询的可变部分。\n*   避免在连接之间修改环境设置。\n*   避免查询中对象的隐式解析。\n\n让我们更仔细地看看这些要点。\n\n\n"
- '# SQL 查询优化最佳实践


  ## 显式参数化查询的可变部分


  查询通常会运行多次，每次运行的唯一区别在于可变部分的取值不同。如果能够将查询的静态部分与可变部分分离开来，它们的执行计划便可以被重用。尽管 SQL Server
  提供了简单参数化和强制参数化功能，但它们有严重的局限性。因此，应始终使用标准的预执行工作负载技术来显式地执行参数化。


  ## 创建存储过程以实现业务功能


  如果你已经显式地参数化了查询，那么将其放入存储过程将带来最佳的可重用性。由于只需要将参数随存储过程名称一起发送，因此网络流量得以减少。同时，因为存储过程从缓存中被重用，它们可以比即席查询运行得更快。


  如同其他事情一样，好事也可能过头。有些业务过程理应属于数据库，但也有些业务过程绝不应放在数据库内。例如，在存储过程中格式化数据通常由应用程序完成更好。基本上，你的数据库及其周围的查询应专注于直接的数据检索和数据存储。任何其他处理都应在别处进行。


  ## 使用 `sp_executesql` 编码以避免存储过程部署


  如果存储过程所需的对象部署成为一个考虑因素，或者你正在使用客户端生成的查询，那么可以使用 `sp_executesql` 将查询作为预执行工作负载提交。与存储过程模型不同，`sp_executesql`
  不会在数据库中创建任何持久对象。它适用于执行单次查询或小型批处理查询。


  在存储过程中实现的完整业务逻辑也可以作为一个大的查询字符串通过 `sp_executesql` 提交。然而，随着业务逻辑复杂性的增加，为完整逻辑创建和维护一个查询字符串会变得困难。


  此外，使用带有适当参数的 `sp_executesql` 和存储过程可以防止服务器上的 SQL 注入攻击。


  尽管如此，我仍然强烈建议在可能的情况下在数据库中使用存储过程。


  ## 实施准备/执行模型以避免重新发送查询字符串


  `sp_executesql` 每次重新执行查询时都需要通过网络发送查询字符串。它还需要在服务器上进行查询字符串匹配的开销，以在计划缓存中识别相应的执行计划。在
  ODBC 或 OLEDB（或 OLEDB .NET）应用程序的情况下，你可以使用准备/执行模型来避免在多次执行期间重新发送查询字符串，因为只需要提交计划句柄和参数。在准备/执行模型中，由于计划句柄会返回给应用程序，计划可以被其他用户连接重用；它不局限于创建该计划的用户。


  ## 避免即席查询


  不要设计使用即席查询的新应用程序！为即席查询创建的执行计划在查询以可变部分的不同值重新提交时无法被重用。尽管 SQL Server 具有简单参数化和强制参数化功能来隔离查询的可变部分，但由于
  SQL Server 在参数化方面的严格保守性，该功能仅限于简单查询。为了获得更好的计划可重用性，请将查询作为预执行工作负载提交。


  有些系统完全建立在即席查询的概念之上。这在功能上可行，并且可以在 SQL Server 中运行，但正如你所见，它带来了大量的额外开销，你需要为此进行规划。此外，即席查询通常是
  SQL 注入被引入系统的方式。


  ## 对于动态查询，优先使用 `sp_executesql` 而非 `EXECUTE`


  在存储过程或数据库应用程序中动态生成的 SQL 查询字符串应使用 `sp_executesql` 执行，而不是使用 `EXECUTE` 命令。`EXECUTE`
  命令不允许显式地参数化查询的可变部分。


  为了理解前面 `sp_executesql` 和 `EXECUTE` 之间的比较，请考虑用于在 `adhocsproc` 中执行 `SELECT` 语句的动态
  SQL 查询字符串。


  ```

  DECLARE @n VARCHAR(3) = ''776'',

  @sql VARCHAR(MAX);

  SET @sql

  = ''SELECT * FROM Sales.SalesOrderDetail sod  '' + ''JOIN Sales.SalesOrderHeader
  soh  ''

  + ''ON sod.SalesOrderID=soh.SalesOrderID '' + ''WHERE    sod.ProductID="'' + @n
  + "";

  -- 使用 EXECUTE 语句执行动态查询

  EXECUTE (@sql);

  ```


  `EXECUTE` 语句将查询与 `d.ProductID` 的值一起作为即席查询提交，因此可能不会导致简单参数化。你可以通过查看缓存自行检查输出。


  ```

  SELECT deqs.execution_count,

  deqs.query_hash,

  deqs.query_plan_hash,

  dest.text,

  deqp.query_plan

  FROM sys.dm_exec_query_stats AS deqs

  CROSS APPLY sys.dm_exec_sql_text(deqs.plan_handle) AS dest

  CROSS APPLY sys.dm_exec_query_plan(deqs.plan_handle) AS deqp

  WHERE dest.text LIKE ''SELECT * FROM Sales.SalesOrderDetail sod%'';

  ```


  为了提高计划缓存的可重用性，请使用 `sp_executesql` 将动态 SQL 字符串作为参数化查询执行。


  ```

  DECLARE @n NVARCHAR(3) = ''776'',

  @sql NVARCHAR(MAX),

  @paramdef NVARCHAR(6);

  SET @sql

  = ''SELECT * FROM Sales.SalesOrderDetail sod  '' + ''JOIN Sales.SalesOrderHeader
  soh  ''

  + ''ON sod.SalesOrderID=soh.SalesOrderID '' + ''WHERE    sod.ProductID=@1'';

  SET @paramdef = N''@1 INT'';

  -- 使用 sp_executesql 系统存储过程执行动态查询

  EXECUTE sp_executesql @sql, @paramdef, @1 = @n;

  ```


  使用 `sp_executesql` 将查询作为显式参数化查询执行，会为该查询生成一个参数化计划，从而增加执行计划的可重用性。


  ## 谨慎地参数化查询的可变部分


  将查询的可变部分转换为参数时要小心。某些变量的值范围可能变化非常剧烈，以至于某个值范围的执行计划可能不适用于其他值。这可能导致糟糕的参数嗅探（在第 17 章中介绍）。


  ## 不允许在查询中隐式解析对象


  SQL Server 允许在不同的架构下创建具有相同名称的多个数据库对象。例如，表 `t1` 可以使用两个不同的架构（`u1` 和 `u2`）在它们各自的所有权下创建。大多数系统中的默认所有者是
  `dbo`（数据库所有者）。如果用户 `u1` 执行以下查询，那么 SQL Server 首先尝试查找表 `t1` 是否存在于用户 `u1` 的默认架构中。


  ```

  SELECT *

  FROM tl

  WHERE cl = 1;

  ```


  如果不存在，则尝试查找表 `t1` 是否存在于 `dbo` 用户下。这种隐式解析允许用户 `u1` 在不同的架构下创建另一个表 `t1` 的实例并临时访问它（使用相同的应用程序代码），而不影响其他用户。


  在生产数据库上，我建议使用架构所有者并避免隐式解析。否则，使用隐式解析会在生产服务器上增加以下开销：


  *   需要更多时间来识别对象。

  *   会降低计划缓存可重用性的有效性。



  ## 概述


  SQL Server 基于成本的查询优化器不仅根据查询的确切语法，还基于使用不同处理策略执行查询的成本来决定有效的执行计划。对不同处理策略的成本评估在多个优化阶段中进行，以避免在优化查询上花费过多时间。然后，执行计划会被缓存，以便在重新执行相同查询时节省生成执行计划的成本。为了提高缓存计划的可重用性，SQL
  Server 支持在变量部分取不同值重新运行查询时，使用不同的技术来重用执行计划。


  使用存储过程通常是提高执行计划可重用性的最佳技术。SQL Server 为存储过程生成参数化的执行计划，以便在使用相同或不同参数值重新运行存储过程时可以重用现有计划。但是，如果存储过程的现有执行计划失效，则无法在不重新编译的情况下重用该计划，从而降低了计划缓存的可重用性。


  在下一章中，我将讨论如何对错误的参数探测进行故障排除和解决。


  '
- "# 17. 参数探测\n\n在上一章中，我讨论了如何将执行计划放入缓存以及如何从那里重用它们。这是一个值得称赞的目标，也是提高系统整体性能的众多方法之一。确保计划重用的最佳机制之一是参数化查询，可以通过存储过程、预备语句或`sp_executesql`来实现。所有这些机制都创建一个参数，在创建计划时使用该参数代替硬编码值。这些参数可以被优化器采样或探测，以在创建执行计划时使用其中包含的值。当它运行良好时（大多数情况下确实如此），你会受益于更准确的计划。但是当它出错并变成错误的参数探测时，你可能会遇到严重的性能问题。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   参数探测背后的有益机制\n*   参数探测如何会变坏\n*   处理错误参数探测的机制\n\n## 参数探测\n\
  \n当参数化查询被发送到优化器且缓存中没有现有计划时，优化器将执行其功能，为操作 T-SQL 语句请求的数据创建执行计划。当调用此参数化查询时，参数的值会被设置，无论是通过你的程序还是通过参数定义中的默认值。无论哪种方式，那里都有一个值。优化器知道这一点。因此，它利用这一事实并读取参数的值。这就是被称为*参数探测*的过程中“探测”的方面。有了这些可用值，优化器将使用这些特定值来查看参数所引用的数据的统计信息。有了特定值和一组准确的统计信息，你将获得更好的执行计划。这种有益的参数探测过程会自动持续运行（假设没有对默认值进行更改），适用于你所有的参数化查询，无论它们来自哪里。\n\
  \n你也可以对局部变量进行探测。但在继续之前，让我们区分一下局部变量和参数，因为在 T-SQL 语句中，它们看起来可能相同。此示例显示了局部变量和参数：\n\n\
  ```sql\nCREATE PROCEDURE dbo.ProductDetails (@ProductID INT)\nAS\nDECLARE @CurrentDate\
  \ DATETIME = GETDATE();\nSELECT p.Name,\n       p.Color,\n       p.DaysToManufacture,\n\
  \       pm.CatalogDescription\nFROM Production.Product AS p\nJOIN Production.ProductModel\
  \ AS pm\n    ON pm.ProductModelID = p.ProductModelID\nWHERE p.ProductID = @ProductID\n\
  \    AND pm.ModifiedDate < @CurrentDate;\nGO\n```\n\n上一个查询中的参数是`@ProductID`。局部变量是`@CurrentDate`。参数是随存储过程（或在那种情况下的预备语句）定义的。局部变量是代码的一部分。区分它们很重要，因为当你看到`WHERE`子句时，它们看起来完全一样。\n\
  \n如果任何使用局部变量的语句发生重新编译，这些变量可以被优化器以探测参数的方式探测。只需要意识到这一点。除了这种重新编译的独特情况外，局部变量在优化器尝试编译计划时通常是未知量。通常只有参数可以被探测。\n\
  \n为了实际查看参数探测并展示它的有用性，让我们从另一个存储过程开始。\n\n```sql\nCREATE OR ALTER PROC dbo.AddressByCity\
  \ @City NVARCHAR(30)\nAS\nSELECT a.AddressID,\n       a.AddressLine1,\n       AddressLine2,\n\
  \       a.City,\n       sp.Name AS StateProvinceName,\n       a.PostalCode\nFROM\
  \ Person.Address AS a\nJOIN Person.StateProvince AS sp\n    ON a.StateProvinceID\
  \ = sp.StateProvinceID\nWHERE a.City = @City;\nGO\n```\n\n创建过程后，使用此参数运行它：\n\n```sql\n\
  EXEC dbo.AddressByCity @City = N'London';\n```\n\n这将产生以下 I/O 和执行时间，以及图 17-1 中的查询计划：\n\
  \n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig1_HTML.jpg](img/323849_5_En_17_Fig1_HTML.jpg)\n\
  \n图 17-1\n\nAddressByCity 的执行计划\n\n```\n读取次数：219\n持续时间：97.1ms\n```\n\n优化器探测了值`London`，并根据`Address`表上统计信息中伦敦市所代表的数据分布得出了一个计划。该查询或表上的索引可能还有其他调优机会，但该计划对于值`London`和现有数据结构是最优的。你可以像这样使用局部变量编写一个完全相同的查询：\n\
  \n```sql\nDECLARE @City NVARCHAR(30) = N'London';\nSELECT  a.AddressID,\n      \
  \  a.AddressLine1,\n        AddressLine2,\n        a.City,\n        sp.[Name] AS\
  \ StateProvinceName,\n        a.PostalCode\nFROM    Person.Address AS a\nJOIN  \
  \  Person.StateProvince AS sp\n    ON a.StateProvinceID = sp.StateProvinceID\nWHERE\
  \   a.City = @City;\n```\n\n当此查询执行时，I/O 和执行时间的结果不同。\n\n```\n读取次数：1084\n持续时间：127.5ms\n\
  ```\n\n执行时间增加了，总读取次数从 219 次增加到 1084 次。这在一定程度上可以通过查看图 17-2 中显示的新执行计划来解释。\n\n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig2_HTML.jpg](img/323849_5_En_17_Fig2_HTML.jpg)\n\
  \n图 17-2\n\n使用局部变量创建的执行计划\n\n发生的情况是优化器无法采样或探测局部变量的值，因此必须使用统计信息中的平均行数。通过查看`Index\
  \ Scan`运算符属性中的估计行数可以看到这一点。它显示为 34.113。然而，如果你查看返回的数据，值`London`实际上有 434 行。简而言之，如果优化器认为需要检索\
  \ 434 行，它会使用归并连接创建计划，只需要 219 次读取。但是，如果它认为只返回大约 34 行，它会使用带有嵌套循环连接的计划，该计划本质上是针对上层数据集中的每个值在下层中进行一次查找，导致\
  \ 1084 次读取和更慢的性能。\n\n这就是实际提高性能的参数探测。现在，让我们看看当参数探测出问题时会发生什么。\n\n\n## 参数嗅探问题\n\n当统计信息存在问题时，参数嗅探会带来麻烦。传入参数的值可能具有代表性，反映了统计信息中的数据和数据分布。在这种情况下，你会看到一个良好的执行计划。但是，当传入的参数不具有表中其余数据的代表性时，会发生什么？这种情况可能是因为你的数据恰好以非平均方式分布。例如，统计信息中的大多数值只会返回少量行，比如六行，但某些值会返回数百行。反之亦然，常见的是大量数据的分布，而不常见的是少量值的分布。在这种情况下，执行计划是基于不具代表性的数据创建的，但它对大多数查询并不实用。这种情况最常表现为性能突然、有时相当严重的下降。它甚至会在发生重新编译事件，允许一个更具代表性的数据值传入参数时，看似随机地自行修复。\n\
  \n当统计信息过时、因采样而非全表扫描导致不准确（有关统计信息的一般详情，请参见第 13 章），或者即使完美构建但数据分布非常不规则（奇怪的数据分布）时，你也会看到这种情况发生。无论如何，这种情况会创建一个用处不大的计划并将其存储在缓存中。例如，考虑以下存储过程：\n\
  \n```sql\nCREATE OR ALTER PROC dbo.AddressByCity @City NVARCHAR(30)\nAS\nSELECT\
  \ a.AddressID,\na.AddressLine1,\nAddressLine2,\na.City,\nsp.Name AS StateProvinceName,\n\
  a.PostalCode\nFROM Person.Address AS a\nJOIN Person.StateProvince AS sp\nON a.StateProvinceID\
  \ = sp.StateProvinceID\nWHERE a.City = @City;\nGO\n```\n\n如果先前创建的存储过程 `dbo.AddressByCity`\
  \ 再次运行，但这次使用不同的参数，则它会返回不同的 I/O 和执行时间集，但执行计划相同，因为它从缓存中重用。\n\n```sql\nEXEC dbo.AddressByCity\
  \ @City = N'Mentor';\nReads: 218\nDuration: 2.8ms\n```\n\n由于重用了相同的执行计划，I/O 几乎相同。执行时间更快是因为返回的行数更少。你可以通过查看\
  \ `sys.dm_exec_query_stats` 的输出（如图 17-3 所示）来验证计划被重用。\n\n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig3_HTML.jpg](img/323849_5_En_17_Fig3_HTML.jpg)\n\
  \n图 17-3\n\n`sys.dm_exec_query_stats` 的输出验证了过程重用\n\n```sql\nSELECT  dest.text,\n\
  deqs.execution_count,\ndeqs.creation_time\nFROM    sys.dm_exec_query_stats AS deqs\n\
  CROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS dest\nWHERE   dest.text LIKE\
  \ 'CREATE PROC dbo.AddressByCity%';\n```\n\n为了展示糟糕的参数嗅探如何发生，你可以反向执行这些过程的顺序。首先通过运行\
  \ `DBCC FREEPROCCACHE` 来清空缓冲区缓存，**不应**在生产机器上运行此命令，除非你小心地执行我这里展示的操作，这将仅从缓存中移除单个执行计划：\n\
  \n```sql\nDECLARE @PlanHandle VARBINARY(64);\nSELECT @PlanHandle = deps.plan_handle\n\
  FROM sys.dm_exec_procedure_stats AS deps\nWHERE deps.object_id = OBJECT_ID('dbo.AddressByCity');\n\
  IF @PlanHandle IS NOT NULL\nBEGIN\nDBCC FREEPROCCACHE(@PlanHandle);\nEND\nGO\n```\n\
  \n另一个选择是通过 `ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;` 仅清除给定数据库的计划。\n\
  \n现在，以相反的顺序重新运行查询。第一个查询，使用参数值 `Mentor`，产生以下 I/O 和执行计划（图 17-4）：\n\n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig4_HTML.jpg](img/323849_5_En_17_Fig4_HTML.jpg)\n\
  \n图 17-4\n\n执行计划发生变化\n\n```sql\nReads: 218\nDuration: 1.8ms\n```\n\n图 17-4 与图 17-2\
  \ 中显示的执行计划不同。读取次数略有下降，但执行时间大致相同。第二次执行，使用 `London` 作为参数的值，产生以下 I/O 和执行时间：\n\n```sql\n\
  Reads:1084\nDuration:97.7ms\n```\n\n这次读取次数急剧增加，达到了使用局部变量时的水平，执行时间也增加了。第一次使用参数 `London`\
  \ 执行过程时创建的计划，最适合检索数据库中符合该条件的 434 行。然后，下一次使用参数值 `Mentor` 执行过程时，使用第一次执行生成的相同计划表现尚可。当顺序反过来时，为值\
  \ `Mentor` 创建了一个新的执行计划，但这个计划对值 `London` 效果极差。\n\n在这些示例中，我实际上稍微取了点巧。如果你查看相关统计信息中的数据分布，你会发现返回的平均行数大约是\
  \ 34，而 `London` 的 434 是一个异常值。当过程为 `London` 编译时看到的略好性能，反映了需要不同计划的事实。然而，对于像 `Mentor`\
  \ 这样的值，使用 `London` 的计划性能略有下降。但是，为 `Mentor` 改进的计划对像 `London` 这样的值来说绝对是灾难性的。现在困难的部分来了。\n\
  \n你必须确定哪个计划更适合你的系统负载。一个计划对于平均值稍差，而另一个计划对于平均值更好，但会严重损害异常值。问题是，是让所有可能的数据集性能稍慢但支持异常值获得更好性能更好，还是让异常值受苦以支持更大范围的常见数据（因为它可能被更频繁地调用）更好？你必须根据自己的系统来找出答案。\n\
  \n\n## 识别错误的参数嗅探\n\n错误的参数嗅探通常是一个间歇性问题。你有时可能会获得一个运行良好的执行计划，没人抱怨；而有时又会获得另一个，突然间投诉系统速度慢的电话就会响个不停。因此，这个问题很难追踪。关键在于识别出你是否为某个参数化查询获得了两个（或有时更多）执行计划。当你开始遇到这种性能的间歇性变化时，必须捕获相关的查询计划。一种方法是使用\
  \ `sys.dm_exec_query_plan` 这个 DMO 直接从缓存中提取估计的计划，如下所示：\n\n```\nSELECT deps.execution_count,\n\
  deps.total_elapsed_time,\ndeps.total_logical_reads,\ndeps.total_logical_writes,\n\
  deqp.query_plan\nFROM sys.dm_exec_procedure_stats AS deps\nCROSS APPLY sys.dm_exec_query_plan(deps.plan_handle)\
  \ AS deqp\nWHERE deps.object_id = OBJECT_ID('AdventureWorks2012.dbo.AddressByCity');\n\
  ```\n\n这个查询使用 `sys.dm_exec_procedure_stats` DMO 来检索缓存中关于该存储过程的信息和查询计划。\n\n如果你启用了查询存储，另一种方法是从那里检索计划：\n\
  \n```\nSELECT SUM(qsrs.count_executions) AS ExecutionCount,\nAVG(qsrs.avg_duration)\
  \ AS AvgDuration,\nAVG(qsrs.avg_logical_io_reads) AS AvgReads,\nAVG(qsrs.avg_logical_io_writes)\
  \ AS AvgWrites,\nCAST(qsp.query_plan AS XML) AS Query_Plan,\nqsp.query_id,\nqsp.plan_id\n\
  FROM sys.query_store_query AS qsq\nJOIN sys.query_store_plan AS qsp\nON qsp.query_id\
  \ = qsq.query_id\nJOIN sys.query_store_runtime_stats AS qsrs\nON qsrs.plan_id =\
  \ qsp.plan_id\nWHERE qsq.object_id = OBJECT_ID('dbo.AddressByCity')\nGROUP BY qsp.query_plan,\n\
  qsp.query_id,\nqsp.plan_id;\n```\n\n与前一个查询不同，这个查询可以返回多个执行计划。\n\n在 SSMS 中运行这两个查询中的任何一个，结果都会包含一个可点击的\
  \ `query_plan` 列。点击它会打开一个图形化计划，即使检索到的是 XML。如果你处理的是来自缓存的单个计划，可以在计划本身上右键单击，然后从上下文菜单中选择“将执行计划另存为”。这样你就可以保存这个计划，以便稍后与另一个计划进行比较。如果你使用的是查询存储，在遇到错误参数嗅探的情况下，会有多个计划可供使用。\n\
  \n你要查看的是第一个操作符的属性，本例中是 `SELECT` 操作符。在那里你会找到“参数列表”项，它会显示优化器编译计划时使用的值，如图 17-5 所示。\n\
  \n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig5_HTML.jpg](img/323849_5_En_17_Fig5_HTML.jpg)\n\
  \n图 17-5\n\n用于编译查询计划的参数值\n\n然后，你可以使用这个值来查看你的统计信息，以理解为什么你看到的计划与预期不同。在这个例子中，如果我运行以下查询，我可以检查直方图，看看像\
  \ `London` 这样的值可能存储在哪里，以及可以预期多少行：\n\n```\nDBCC SHOW_STATISTICS('Person.Address','_WA_Sys_00000004_164452B1');\n\
  ```\n\n图 17-6 显示了直方图的相关部分。\n\n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig6_HTML.jpg](img/323849_5_En_17_Fig6_HTML.jpg)\n\
  \n图 17-6\n\n显示预期行数的直方图部分\n\n你可以看到，`London` 的值返回的行数比 `AVG_RANGE_ROWS` 中显示的任何平均行数都要多得多，并且高于存储在\
  \ `EQ_ROWS` 中的许多其他 `RANG_HI_KEY` 计数。简而言之，`London` 的值与其余数据相比存在偏斜。这就是为什么该处的计划与其他计划不同。\n\
  \n你必须对统计信息和编译时的参数值进行类似的评估，才能理解错误的参数嗅探源自何处。\n\n但是，如果你有一个正在遭受错误参数嗅探之苦的参数化查询，你可以通过几种不同的方式来控制并尝试减少这个问题。\n\
  \n## 减轻错误的参数嗅探\n\n一旦你确认某个情况正在经历错误的参数嗅探，你不必默默忍受。你可以为此做些什么，但必须做出决定。你有多种选择来减轻错误参数嗅探的行为。\n\
  \n*   你可以在执行前对存储过程运行 `sp_recompile`，强制在执行时重新编译计划。\n*   强制重新编译的另一种方法是使用 `EXEC <过程名>\
  \ WITH RECOMPILE`。\n*   另一种在每次执行时强制重新编译的机制是在过程定义中使用 `WITH RECOMPILE` 来创建该过程。\n*\
  \   你还可以在单个语句上使用 `OPTION` (`RECOMPILE`)，以便仅重新编译这些语句而不是整个过程。如果你打算强制重新编译，这通常是最佳方法。但要知道这是在执行时间和编译时间之间的权衡。如果此查询被频繁调用并且每次都重新编译，你可能会看到严重的问题。\n\
  *   你可以将输入参数重新分配给局部变量。这种流行的修复方法强制优化器通过查看所引用数据的统计信息来猜测可能使用的值，这可以并确实消除了将具体参数值考虑在内的情况。这是一种老方法，已经被\
  \ `OPTIMIZE FOR UNKNOWN` 所取代。此方法也存在在重新编译期间变量值被“嗅探”的可能性。\n*   你可以在创建过程时使用查询提示 `OPTIMIZE\
  \ FOR`，并为其提供已知良好的参数，这些参数将为大多数查询生成一个运行良好的计划。你可以指定一个生成特定计划的值，或者可以指定 `UNKNOWN` 以获取基于统计信息平均值的通用计划。\n\
  *   你可以使用计划指南，这是一种使查询以某种方式行为而无需修改过程的机制。这将在第 18 章中详细介绍。\n*   如果你启用了查询存储，可以使用计划强制来选择首选计划。这是一个优雅的解决方案，因为它不需要任何代码更改即可实现。\n\
  *   你可以通过设置跟踪标志 4136 为开启状态来为服务器禁用参数嗅探。请理解，这种有益的行为将对整个服务器关闭，而不仅仅是一个有问题的查询。这对你的系统来说可能是一个非常危险的选择。\n\
  *   现在，你可以使用 `DATABASE SCOPED CONFIGURATION` 在数据库级别禁用参数嗅探。这比使用前面提到的跟踪标志要安全得多。但它仍然可能存在问题，因为大多数数据库都在受益于参数嗅探。\n\
  *   如果你有一个导致错误参数嗅探的特定查询模式，你可以通过建立两个或更多不同的过程，使用一个包装过程来决定调用哪一个，从而将功能隔离。这可以帮助你同时使用多种不同的方法。你也可以使用动态字符串执行来解决这个问题；只是要警惕\
  \ SQL 注入。\n\n这些可能的解决方案中的每一个都伴随着必须考虑的权衡。如果你决定每次调用查询时都重新编译它，你将不得不为重新编译查询所需的额外 CPU\
  \ 付出代价。这违背了使用参数化查询以尝试获取计划重用的初衷，但在你的特定情况下，这可能是最佳解决方案。将参数重新分配给局部变量是一种有些老派的方法；代码看起来可能会很傻。\n\
  \n\n```sql\nCREATE OR ALTER PROC dbo.AddressByCity @City NVARCHAR(30)\nAS\nDECLARE\
  \ @LocalCity NVARCHAR(30) = @City;\nSELECT a.AddressID,\na.AddressLine1,\nAddressLine2,\n\
  a.City,\nsp.Name AS StateProvinceName,\na.PostalCode\nFROM Person.Address AS a\n\
  JOIN Person.StateProvince AS sp\nON a.StateProvinceID = sp.StateProvinceID\nWHERE\
  \ a.City = @LocalCity;\n```\n\n通过这种方法，优化器会基于相关列的密度进行**基数估计**，而不是使用直方图。但这在查询中看起来有些奇怪。实际上，如果你采用这种方法，我强烈建议在变量声明前添加注释，以清楚地说明原因。例如：\n\
  \n```sql\n-- 这允许查询绕过不良的参数嗅探\n```\n\n但是，采用这种方法后，你就要面临**变量嗅探**的可能性，因此并不真正推荐使用，除非你使用的\
  \ SQL Server 实例版本低于 2008。从 SQL Server 2008 及之后的版本开始，你最好使用 `OPTIMIZE FOR UNKNOWN`\
  \ 查询提示来达到相同的效果，而不会引入变量嗅探可能带来的问题。\n\n## 使用 OPTIMIZE FOR 查询提示\n\n你可以使用 `OPTIMIZE FOR`\
  \ 查询提示并传递一个特定值。例如，如果你想确保始终使用由值 `Mentor` 生成的执行计划，可以对查询进行如下操作：\n\n```sql\nCREATE OR\
  \ ALTER PROC dbo.AddressByCity @City NVARCHAR(30)\nAS\nSELECT a.AddressID,\na.AddressLine1,\n\
  AddressLine2,\na.City,\nsp.Name AS StateProvinceName,\na.PostalCode\nFROM Person.Address\
  \ AS a\nJOIN Person.StateProvince AS sp\nON a.StateProvinceID = sp.StateProvinceID\n\
  WHERE a.City = @City\nOPTION (OPTIMIZE FOR (@City = 'Mentor'));\n```\n\n现在，优化器将忽略传递给\
  \ `@City` 的任何值，并始终使用值 `Mentor`。你甚至可以通过修改查询（如所示）来实际看到这一点，这将从缓存中移除查询，然后你使用参数值 `London`\
  \ 执行它。这将在缓存中生成一个新计划。如果你打开该计划并查看 `SELECT` 属性，你将在图 17-7 中看到提示的证据。\n\n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig7_HTML.jpg](img/323849_5_En_17_Fig7_HTML.jpg)\n\
  \n*图 17-7：运行时值和编译时值不同*\n\n如你所见，优化器完全按照你的指定行事，使用值 `Mentor` 来编译计划，即使你也可以看到你是使用值 `London`\
  \ 执行的查询。这种方法的问题在于数据会随时间变化，某个时间点对你的数据来说是最优的计划，之后可能就不再是了。如果你选择使用 `OPTIMIZE FOR` 提示，你需要计划定期重新评估它。\n\
  \n## 使用数据库范围配置或跟踪标志完全禁用参数嗅探\n\n如果你选择使用跟踪标志或 `DATABASE SCOPED CONFIGURATION` 完全禁用参数嗅探，请理解这会在整个服务器或数据库上将其关闭。由于大多数情况下，参数嗅探绝对对你有帮助，你最好确定你没有从中获得任何益处，并且处理它的唯一希望就是关闭嗅探。这甚至不需要重启服务器，因此会立即生效。生成的计划将基于可用统计信息的平均值，因此根据你的数据，计划可能会严重次优。在执行此操作之前，请探索在你最有问题的查询上使用\
  \ `RECOMPILE` 提示的可能性。即使你无法获得计划重用，通过这种方式你更可能获得更好的计划。\n\n### 使用查询存储强制计划\n\n处理参数嗅探最简单的方法，假设你处于某个特定计划最有用的情况下，就是通过查询存储使用计划强制。你可以使用\
  \ GUI 中的报告，或者直接从系统视图中检索信息。\n\n```sql\nSELECT CAST(qsp.query_plan AS XML) AS query_plan,\n\
  qsp.plan_id,\nqsq.query_id\nFROM sys.query_store_plan AS qsp\nJOIN sys.query_store_query\
  \ AS qsq\nON qsq.query_id = qsp.query_id\nWHERE qsq.object_id = OBJECT_ID('dbo.AddressByCity');\n\
  ```\n\n你拥有了确定哪个执行计划最适合你的系统所需的一切。一旦确定，强制优化器选择该计划就很简单了。为了实际看到这一点，让我们强制使用更适合值 `Mentor`\
  \ 的计划。假设你一直启用着查询存储运行，你应该能够使用之前的查询检索数据并挑选出该计划。如果没有，请启用查询存储（详见第 11 章），然后运行两个查询，并在执行之间使用之前的脚本花时间从缓存中清除计划。\n\
  \n完成后，你必须使用 `query_id` 和 `plan_id` 的值以及 `sys.sp_query_store_force_plan` 函数。\n\n\
  ```sql\nEXEC sys.sp_query_store_force_plan 1545, 1602;\n```\n\n结果不会立即显现。然而，如果我们重新运行存储过程并传递值\
  \ `London`，我们将看到图 17-8 中的计划。\n\n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig8_HTML.jpg](img/323849_5_En_17_Fig8_HTML.jpg)\n\
  \n*图 17-8：一个强制的执行计划*\n\n你可以尝试从缓存中移除计划并为值 `London` 重新运行它。然而，此时无论你做什么都不会带回那个执行计划，因为优化器现在正在强制使用该计划。你可以使用扩展事件监控计划强制。你也可以查询查询存储视图以查看哪些计划是强制的。最后，计划本身存储了一点信息，让你知道它是一个强制计划。查看第一个运算符，这里是\
  \ `SELECT` 运算符，你可以在图 17-9 中看到属性。\n\n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig9_HTML.jpg](img/323849_5_En_17_Fig9_HTML.jpg)\n\
  \n*图 17-9：显示强制执行计划的“使用计划”属性*\n\n这是你在执行计划内可以看到它已被强制的唯一迹象。没有来源指示，因此你必须查看 SSMS 中的报告或查询表以自行追踪信息。有一个专门的报告显示在图\
  \ 17-10 中。\n\n![../images/323849_5_En_17_Chapter/323849_5_En_17_Fig10_HTML.jpg](img/323849_5_En_17_Fig10_HTML.jpg)\n\
  \n*图 17-10：具有强制计划的查询报告*\n\n你可以看到该查询有两个不同的计划。你甚至可以在图 17-10 中的计划 1602 上看到复选标记，表明它是一个强制计划。\n\
  \n在继续之前，请使用 GUI 或以下命令移除计划强制：\n\n```sql\nEXEC sys.sp_query_store_unforce_plan 1545,\
  \ 1602;\n```\n\n## 总结与建议\n\n面对所有这些可能的缓解方法，在决定采用哪种方法之前，请在你的系统上仔细测试。这些方法都有效，但它们的工作方式可能在一种情况下比另一种更好，因此了解不同的方法是好的，你可以根据你的情况对所有方法进行实验。\n\
  \n最后，请记住这是由统计信息驱动的，因此如果你的统计信息不准确或过时，你更有可能遇到不良的参数嗅探。重新检查你的统计信息维护例程以确保其有效性，通常是最好的单一解决方案。\n\
  \n\n"
- '# 本章小结


  在本章中，我详细阐述了**参数嗅探**到底是什么，以及它在大多数情况下如何使所有参数化查询受益。这一点至关重要，因为当你遇到不良的参数嗅探时，可能会觉得它弊大于利。我讨论了统计信息和数据分布如何可能导致执行计划对于数据集的某些部分是最优的，而对于其他部分却是次优的——这正是不良的参数嗅探在起作用。有几种方法可以缓解不良的参数嗅探，但每种方法都是一种权衡，因此需要仔细审视，以确保为你的系统做出最佳选择。


  在下一章中，我将探讨导致查询重编译的原因以及相应的处理方法。


  '
- "# 18. 查询重编译\n\n存储过程和参数化查询通过显式地将查询的可变部分转换为参数，提高了执行计划的可重用性。这使得当查询以相同或不同的可变部分值重新提交时，执行计划能够被重用。由于存储过程通常用于实现复杂的业务规则，一个典型的存储过程包含一组复杂的\
  \ SQL 语句，这使得生成存储过程中查询的执行计划成本相对较高。因此，重用存储过程现有的执行计划通常是有益的，而不是生成新的计划。然而，有时现有计划可能并非最优，或者在重用时无法提供最佳的处理策略。SQL\
  \ Server 通过重编译存储过程中的语句来生成新的执行计划，从而解决这种情况。本章涵盖以下主题：\n*   重编译的优缺点\n*   如何识别导致重编译的语句\n\
  *   如何分析重编译的原因\n*   必要时避免重编译的方法\n\n## 重编译的优缺点\n\n查询重编译可能有益，也可能有害。有时，特别是当表中的数据分布及相应的统计信息发生变化后，考虑为查询采用新的处理策略而非重用现有计划可能是有益的。新增索引、约束或修改表中现有结构也可能导致重编译后的查询性能更佳。SQL\
  \ Server 和 Azure SQL Database 中的重编译是在语句级别进行的。这增加了过程内可能发生的重编译总次数，但总体上降低了重编译的影响和开销。语句级重编译减少了开销，因为它只重编译单个语句，而不是过程内的所有语句；而在\
  \ SQL Server 2000 中，重编译会导致整个过程被一遍又一遍地重新编译。尽管重编译的影响范围较小，但通常仍被认为需要根据实际情况尽可能地减少和控制。\n\
  \n标准重编译过程的一个例外是当使用查询存储启用计划强制时。在这种情况下，重编译仍会发生。但是，只有当查询存储中被标记为强制计划的现有计划失效时，新生成的计划才会被使用。如果该标记计划失效，则将使用新生成的计划。\n\
  \n为了理解重新编译现有计划有时为何有益，假设你需要从`Production.WorkOrder`表中检索一些信息。存储过程可能如下所示：\n\n```\nCREATE\
  \ OR ALTER PROCEDURE dbo.WorkOrder\nAS\nSELECT wo.WorkOrderID,\n       wo.ProductID,\n\
  \       wo.StockedQty\nFROM   Production.WorkOrder AS wo\nWHERE  wo.StockedQty BETWEEN\
  \ 500\n                      AND     700;\n```\n\n在当前索引下，作为存储过程计划一部分的`SELECT`语句的执行计划会扫描索引`PK_WorkOrder_WorkOrderID`，如图\
  \ 18-1 所示。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig1_HTML.jpg](img/323849_5_En_18_Fig1_HTML.jpg)\n\
  \n图 18-1\n存储过程的执行计划\n\n此计划保存在过程缓存中，以便在重新执行存储过程时可以重用。但如果像下面这样在表上新增一个索引，那么现有计划将不再是执行查询最高效的处理策略。\n\
  \n```\nCREATE INDEX IX_Test ON Production.WorkOrder(StockedQty,ProductID);\n```\n\
  \n在这种情况下，花费额外的 CPU 周期来重编译存储过程以生成更好的执行计划是有益的。\n\n由于索引`IX_Test`可以作为`SELECT`语句的覆盖索引，通过使用`IX_Test`而不是扫描`PK_WorkOrder_WorkOrderID`，可以避免书签查找的成本。SQL\
  \ Server 会自动检测到新计划已创建，并重编译现有计划以考虑使用新索引的好处。这导致了存储过程的一个新执行计划（当执行时），如图 18-2 所示。\n\n\
  ![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig2_HTML.jpg](img/323849_5_En_18_Fig2_HTML.jpg)\n\
  \n图 18-2\n存储过程的新执行计划\n\n\n\nSQL Server 会自动检测需要重新编译现有执行计划的条件。它遵循特定规则来确定现有计划何时需要重新编译。如果某个查询的具体实现符合重新编译规则（例如执行计划过期、`SET`\
  \ 选项被更改等），那么该语句每次满足重新编译要求时都将被重新编译，而 SQL Server 可能生成、也可能不生成更好的执行计划。若要观察此现象，你需要一个不同的存储过程。以下过程从\
  \ `WorkOrder` 表中返回所有行：\n\n```\nCREATE OR ALTER PROCEDURE dbo.WorkOrderAll\nAS\n\
  SELECT *\nFROM Production.WorkOrder AS wo;\n```\n\n在执行此过程之前，请先删除索引 `IX_Test`。\n\n\
  ```\nDROP INDEX Production.WorkOrder.IX_Test;\n```\n\n当你执行此过程时，`SELECT` 语句返回表中的完整数据集（所有行和列），因此通过对表\
  \ `WorkOrder` 进行表扫描来处理是最合适的。如果我们有一个 `SELECT` 列表更有限的更合适的查询，扫描非聚集索引可能是一个选择。正如第 4 章所解释的，`SELECT`\
  \ 语句的处理不会受益于任何列上的非聚集索引。因此，理想情况下，在存储过程执行前创建非聚集索引（如下所示）应该没有影响。\n\n```\nEXEC dbo.WorkOrderAll;\n\
  GO\nCREATE INDEX IX_Test ON Production.WorkOrder(StockedQty,ProductID);\nGO\nEXEC\
  \ dbo.WorkOrderAll; --在创建索引 IX_Test 之后执行\n```\n\n但是，在索引创建后执行的存储过程面临着重新编译，如图 18-3\
  \ 中相应的扩展事件输出所示。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig3_HTML.jpg](img/323849_5_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3\n存储过程的非有益重新编译\n\n`sql_statement_recompile` 事件被用于跟踪语句重新编译。在较旧的跟踪事件中单独存在的存储过程重新编译事件已不再有。\n\
  \n在这种情况下，重新编译对存储过程并无实际益处。但不幸的是，它符合导致 SQL Server 在每次架构发生更改的执行中都重新编译存储过程的条件。这会使存储过程的计划缓存失效，并在此次执行中浪费\
  \ CPU 周期来重新生成相同的计划。因此，了解导致查询重新编译的条件至关重要，并且在实现旨在重用计划的存储过程和参数化查询时，应尽一切努力避免这些条件。在识别出在各种情况下导致\
  \ SQL Server 重新编译语句的具体语句之后，我将在接下来讨论这些条件。\n\n## 识别导致重新编译的语句\n\nSQL Server 可以重新编译存储过程内的单个语句或整个存储过程。因此，要找到重新编译的原因，识别出无法重用现有计划的\
  \ SQL 语句非常重要。\n\n你可以使用扩展事件会话来跟踪语句重新编译。你也可以使用相同的事件来识别导致重新编译的存储过程语句。以下是你可使用的相关事件：\n\
  \n- `sql_batch_completed` 和/或 `rpc_completed`\n- `sql_statement_recompile`\n- `sql_batch_starting`\
  \ 和/或 `rpc_starting`\n- `sql_statement_completed` 和/或 `sp_statement_completed` *(可选)*\n\
  - `sql_statement_starting` 和/或 `sp_statement_completed` *(可选)*\n\n### 注意\n\nSQL\
  \ Server 2008 支持扩展事件，但 `rpc_completed` 和 `rpc_starting` 事件不能返回正确的信息。对于较旧的查询，你可能需要使用\
  \ `module_end` 和 `module_starting` 代替。\n\n考虑以下简单的存储过程：\n\n```\nCREATE OR ALTER PROC\
  \ dbo.TestProc\nAS\nCREATE TABLE #TempTable (C1 INT);\nINSERT INTO #TempTable (C1)\n\
  VALUES (42);\n-- 数据更改导致重新编译\nGO\n```\n\n在首次执行此存储过程时，你会得到如图 18-4 所示的扩展事件输出。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig4_HTML.jpg](img/323849_5_En_18_Fig4_HTML.jpg)\n\
  \n图 18-4\n显示由重新编译产生的 `sql_statement_recompile` 事件的扩展事件输出\n\n```\nEXEC dbo.TestProc;\n\
  ```\n\n在图 18-4 中，你可以看到有一个重新编译事件 (`sql_statement_recompile`)，表明存储过程内部的一个语句经历了重新编译。正如前一章所述，当首次执行存储过程时，SQL\
  \ Server 会编译该存储过程并为其内部所有语句生成执行计划。\n\n顺便提一下，如果你使用扩展事件进行跟踪，可能会看到其他语句。只需按数据库 ID 进行筛选或分组，以便更容易查看你感兴趣的事件。在扩展事件会话上设置筛选器始终是一个好习惯。\n\
  \n由于执行计划仅保存在易失性内存中，当 SQL Server 重新启动时它们会被丢弃。在服务器重启后，下一次执行存储过程时，SQL Server 会再次编译该存储过程并生成执行计划。这些编译不被视为存储过程重新编译，因为缓存中没有可供重用的计划。`sql_statement_recompile`\
  \ 事件表明已经存在一个计划但无法重用。\n\n### 注意\n\n我将在后面的“分析重新编译的原因”一节中讨论 `recompile_cause` 数据列的重要性。\n\
  \n要查看是哪个语句导致了重新编译，请查看 `sql_statement_recompile` 事件中的 `statement` 列。它具体显示了正在被重新编译的语句。你也可以通过结合使用各种语句开始事件和重新编译事件，来识别导致重新编译的存储过程语句。如果在扩展事件会话中启用了因果跟踪，你将获得一个事件开始的标识符，以及同一事件链中其他事件的序列号。图\
  \ 18-4 的前两列就是 Id 和序列号。\n\n请注意，在语句重新编译之后，导致重新编译的存储过程语句会再次启动以使用新计划执行。你可以捕获事件中的语句，通过时间戳按序列关联事件，或者最好是在扩展事件上使用因果跟踪。这些方法中的任何一种都可以用来追踪具体是哪个语句导致了重新编译。\n\
  \n\n## 分析重编译的原因\n\n为了提升性能，分析重编译的原因至关重要。很多时候，重编译可能并非必要，避免它可以提高性能。例如，每次经历编译或重编译过程，你都在消耗\
  \ CPU 资源让优化器完成工作。在编译过程中，执行计划也会被换入换出内存。当一个查询发生重编译时，在该重编译过程运行期间，该查询会被阻塞。这意味着频繁调用的查询如果还需要经历重编译，就可能成为主要的性能瓶颈。了解导致重编译的不同条件，有助于你评估重编译的原因，并确定如何在非必要时避免重编译。语句重编译发生的原因如下：\n\
  \n*   存储过程语句中引用的常规表、临时表或视图的架构已发生更改。架构更改包括表或表上索引的元数据变更。\n*   绑定到常规表或临时表列的项目（例如默认值）已更改。\n\
  *   表索引或列上的统计信息已发生变化，这种变化可能是自动或手动的，且超出了第 13 章讨论的阈值。\n*   某个对象在存储过程编译时不存在，但在执行期间被创建。这称为*延迟对象解析*，是前述重编译的原因。\n\
  *   `SET`选项已更改。\n*   执行计划因老化而被释放。\n*   显式调用了系统存储过程`sp_recompile`。\n*   显式使用了`RECOMPILE`提示。\n\
  \n你可以在扩展事件中看到这些原因。原因由`sql_statement_recompile`事件的`recompile_cause`数据列值指示。让我们更详细地看看上面列出的一些重编译原因，并讨论如何避免它们。\n\
  \n### 架构或绑定更改\n\n当视图、常规表或临时表的架构或绑定发生更改时，现有查询的执行计划将失效。在执行任何引用已修改对象的语句之前，必须重新编译该查询。SQL\
  \ Server 会自动检测这种情况并重新编译存储过程。\n\n**注意：** 我将在“重编译的优缺点”一节中更详细地讨论由于架构更改导致的重编译。\n\n###\
  \ 统计信息更改\n\nSQL Server 会跟踪对表的更改次数。如果更改次数超过了重编译阈值（RT）值，那么当语句中引用该表时，SQL Server 会自动更新统计信息，正如你在第\
  \ 13 章所见。当检测到自动更新统计信息的条件时，SQL Server 会自动将该语句标记为重编译，并同时更新统计信息。\n\nRT 由一个公式决定，该公式取决于表是永久表还是临时表（而非表变量）以及表中的行数。表\
  \ 18-1 显示了基本公式，以便你确定何时可能因数据更改而导致语句重编译。\n\n表 18-1：确定数据更改的公式\n\n| 表类型 | 公式 |\n| :---\
  \ | :--- |\n| 永久表 | 如果行数（`n`）<= 500，则 `RT = 500`。 |\n|  | 如果 `n > 500`，则 `RT = .2\
  \ * n` 或 `Sqrt(1000*NumberOfRows)`。 |\n| 临时表 | 如果 `n < 6`，则 `RT = 6`。 |\n|  | 如果\
  \ `6 <= n <= 500`，则 `RT = 500`。如果 `n > 500`，则 `RT = .2 * n` 或 `Sqrt(1000*NumberOfRows)`。\
  \ |\n\n要理解统计信息更改如何导致重编译，请考虑以下示例。存储过程在第一次执行时表中只有一行数据。在第二次执行存储过程之前，向表中添加了大量行。\n\n\
  **注意：** 请确保数据库的 `AUTO_UPDATE_STATISTICS` 设置为 `ON`。你可以通过执行以下查询来确定 `AUTO_UPDATE_STATISTICS`\
  \ 设置：\n\n```sql\nSELECT DATABASEPROPERTYEX('AdventureWorks2017', 'IsAutoUpdateStatistics');\n\
  ```\n\n```sql\nIF EXISTS (   SELECT *\n              FROM sys.objects AS o\n   \
  \           WHERE o.object_id = OBJECT_ID(N'dbo.NewOrderDetail')\n             \
  \   AND o.type IN ( N'U' ))\n    DROP TABLE dbo.NewOrderDetail;\nGO\n\nSELECT *\n\
  INTO dbo.NewOrderDetail\nFROM Sales.SalesOrderDetail;\nGO\n\nCREATE INDEX IX_NewOrders_ProductID\
  \ ON dbo.NewOrderDetail (ProductID);\nGO\n\nCREATE OR ALTER PROCEDURE dbo.NewOrders\n\
  AS\n    SELECT nod.OrderQty,\n           nod.CarrierTrackingNumber\n    FROM dbo.NewOrderDetail\
  \ AS nod\n    WHERE nod.ProductID = 897;\nGO\n\nSET STATISTICS XML ON;\nEXEC dbo.NewOrders;\n\
  SET STATISTICS XML OFF;\nGO\n```\n\n接下来，你需要在重新执行存储过程之前修改一定数量的行。\n\n```sql\nUPDATE\
  \ dbo.NewOrderDetail\nSET ProductID = 897\nWHERE ProductID BETWEEN 800\n       \
  \           AND     900;\nGO\n\nSET STATISTICS XML ON;\nEXEC dbo.NewOrders;\nSET\
  \ STATISTICS XML OFF;\nGO\n```\n\n第一次执行时，SQL Server 使用 `Index Seek` 操作来执行存储过程的 `SELECT`\
  \ 语句，如图 18-5 所示。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig5_HTML.jpg](img/323849_5_En_18_Fig5_HTML.jpg)\n\
  *图 18-5：数据更改前的执行计划*\n\n**注意：** 请确保图形执行计划的设置为 `OFF`；否则，`STATISTICS XML` 的输出将不会显示。\n\
  \n在重新执行存储过程时，SQL Server 自动检测到索引上的统计信息已更改。这导致了存储过程内 `SELECT` 语句的重编译，优化器在执行 `SELECT`\
  \ 语句之前确定了更佳的处理策略，如图 18-6 所示。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig6_HTML.jpg](img/323849_5_En_18_Fig6_HTML.jpg)\n\
  *图 18-6：统计信息更改对执行计划的影响*\n\n图 18-7 显示了相应的扩展事件输出。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig7_HTML.jpg](img/323849_5_En_18_Fig7_HTML.jpg)\n\
  *图 18-7：统计信息更改对存储过程重编译的影响*\n\n在图 18-7 中，你可以看到在第二次执行存储过程时，为了执行 `SELECT` 语句，需要一次重编译。从\
  \ `recompile_cause` 的值（`Statistics Changed`）可以理解，重编译是由于统计信息变更引起的。作为创建新计划的一部分，统计信息会自动更新，这由语句重编译调用之后发生的\
  \ `Auto Stats` 事件所指示。你也可以使用 `DBCC SHOW_STATISTICS` 语句或 `sys.dm_db_stats_properties`\
  \ 来验证统计信息的自动更新，如第 13 章所述。\n\n\n### 延迟对象解析\n\n查询通常会动态创建并随后访问数据库对象。当此类查询首次执行时，其第一个执行计划不会包含有关将在运行时创建的对象的信息。因此，在第一个执行计划中，对这些对象的处理策略被延迟，直到查询运行时才确定。当引用这些对象之一的\
  \ DML 语句（在查询内）被执行时，查询会被重新编译，以生成一个包含该对象处理策略的新计划。\n\n在存储过程内可以创建普通表或本地临时表来保存中间结果集。由于延迟对象解析导致的语句重新编译，对于普通表和本地临时表的表现是不同的，如下一节所述。\n\
  \n#### 因普通表导致的重新编译\n\n要理解在存储过程中创建普通表所引发的查询重新编译问题，请看下面的例子：\n\n```sql\nCREATE OR ALTER\
  \ PROC dbo.TestProc\nAS\nCREATE TABLE dbo.ProcTest1 (C1 INT); --确保表不存在\nSELECT *\n\
  FROM dbo.ProcTest1; --导致重新编译\nDROP TABLE dbo.ProcTest1;\nGO\nEXEC dbo.TestProc;\
  \ --第一次执行\nEXEC dbo.TestProc; --第二次执行\n```\n\n当存储过程第一次执行时，在实际执行存储过程之前会生成一个执行计划。如果在创建存储过程之前，存储过程中创建的表不存在（如前面代码所预期的那样），那么该计划将不包含处理引用该表的\
  \ `SELECT` 语句的策略。因此，为了执行 `SELECT` 语句，需要重新编译该语句，如图 18-8 所示。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig8_HTML.jpg](img/323849_5_En_18_Fig8_HTML.jpg)\n\
  \n图 18-8：显示因普通表导致的存储过程重新编译的扩展事件输出\n\n可以看到，`SELECT` 语句在第二次执行时被重新编译。在第一次执行期间删除表，并不会删除保存在计划缓存中的查询计划。在后续执行存储过程时，现有计划已包含对该表的处理策略。然而，由于在存储过程中重新创建了表，SQL\
  \ Server 将其视为表架构的更改。因此，在后续执行存储过程的其余部分、执行 `SELECT` 语句之前，SQL Server 会重新编译存储过程中的语句。对应的\
  \ `sql_statement_recompile` 事件的 `recompile_clause` 值反映了重新编译的原因。\n\n#### 因本地临时表导致的重新编译\n\
  \n在存储过程中，大多数时候你创建的是本地临时表而不是普通表。要了解本地临时表如何以不同的方式影响存储过程重新编译，只需将前面示例中的普通表替换为本地临时表。\n\
  \n```sql\nCREATE OR ALTER PROC dbo.TestProc\nAS\nCREATE TABLE #ProcTest1 (C1 INT);\
  \ --确保表不存在\nSELECT *\nFROM #ProcTest1; --导致重新编译\nDROP TABLE #ProcTest1;\nGO\nEXEC\
  \ dbo.TestProc; --第一次执行\nEXEC dbo.TestProc; --第二次执行\n```\n\n由于本地临时表在存储过程执行结束时会自动删除，因此无需显式删除临时表。但是，遵循良好的编程实践，你可以在其工作完成后立即删除本地临时表。图\
  \ 18-9 显示了前面示例的扩展事件输出。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig9_HTML.jpg](img/323849_5_En_18_Fig9_HTML.jpg)\n\
  \n图 18-9：显示因本地临时表导致的存储过程重新编译的扩展事件输出\n\n可以看到，查询在第一次执行时被重新编译。如对应的 `recompile_cause`\
  \ 值所示，重新编译的原因与普通表导致重新编译的原因相同。但是，请注意，当存储过程重新执行时，它不会被重新编译，这与普通表的情况不同。\n\n在后续执行存储过程时，本地临时表的架构与之前执行时保持一致。本地临时表在存储过程的作用域之外不可用，因此它的架构在多次执行之间无法被任何方式更改。因此，在后续执行存储过程时，SQL\
  \ Server 可以安全地重用现有计划（基于本地临时表的先前实例），从而避免重新编译。\n\n### 注意\n\n为避免重新编译，在存储过程中使用本地临时表来保存中间结果集，而不是使用临时创建的普通表，这是有意义的。但是，这只有在你能避免数据倾斜的情况下才成立，数据倾斜可能导致其他糟糕的执行计划。在那种情况下，重新编译可能还算不上大问题。\n\
  \n### SET 选项更改\n\n存储过程的执行计划依赖于环境设置。如果在存储过程中更改了环境设置，那么 SQL Server 会在每次执行时重新编译查询。例如，考虑以下代码：\n\
  \n```sql\nCREATE OR ALTER PROC dbo.TestProc\nAS\nSELECT  'a' + NULL + 'b'; --第 1\
  \ 条\nSET CONCAT_NULL_YIELDS_NULL OFF;\nSELECT  'a' + NULL + 'b'; --第 2 条\nSET ANSI_NULLS\
  \ OFF;\nSELECT  'a' + NULL + 'b';\n--第 3 条\nGO\nEXEC dbo.TestProc; --第一次执行\nEXEC\
  \ dbo.TestProc; --第二次执行\n```\n\n在存储过程中更改 `SET` 选项会导致 SQL Server 在执行 `SET` 语句之后的语句之前重新编译存储过程。因此，这个存储过程会被重新编译两次：一次在执行第二个\
  \ `SELECT` 语句之前，一次在执行第三个 `SELECT` 语句之前。图 18-10 中的扩展事件输出显示了这一点。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig10_HTML.jpg](img/323849_5_En_18_Fig10_HTML.jpg)\n\
  \n图 18-10：显示因 SET 选项更改导致的存储过程重新编译的扩展事件输出\n\n如果重新执行该过程，你不会看到重新编译，因为这些现在已成为执行计划的一部分。\n\
  \n由于 `SET NOCOUNT` 不会更改环境设置，不像前面所示用于更改 ANSI 设置的 `SET` 语句，因此 `SET NOCOUNT` 不会导致存储过程重新编译。我将在\
  \ 19 章详细解释如何使用 `SET NOCOUNT`。\n\n### 执行计划老化\n\n正如你在 16 章所见，SQL Server 通过维护缓存中执行计划的年龄来管理过程缓存的大小。如果一个存储过程很长时间没有重新执行，其执行计划的年龄字段可能会降至\
  \ 0，并且由于内存压力，该计划可能会从缓存中移除。当这种情况发生并且存储过程被重新执行时，将生成一个新计划并缓存在过程缓存中。但是，如果系统中有足够的内存，未使用的计划在内存压力增加之前不会从缓存中移除。\n\
  \n\n### 显式调用 `sp_recompile`\n\n当架构更改或统计信息发生足够变化时，SQL Server 会自动重编译查询。它还提供了 `sp_recompile`\
  \ 系统存储过程，用于手动将整个存储过程标记为待重编译。此存储过程可以对表、视图、存储过程或触发器调用。如果在存储过程或触发器上调用，该存储过程或触发器将在下次执行时重编译。在表或视图上调用\
  \ `sp_recompile` 会标记所有引用该表/视图的存储过程和触发器，使它们在下次执行时进行重编译。\n\n例如，如果在表 `Test1` 上调用 `sp_recompile`，所有引用表\
  \ `Test1` 的存储过程和触发器都会被标记为待重编译，并在下次执行时重编译，如下所示：\n\n```sql\nsp_recompile 'Test1';\n\
  ```\n\n您可以使用 `sp_recompile` 在使用 `sp_executesql` 执行动态查询时，取消对现有执行计划的重用。如前一章所述，对于变量部分的值范围可能需要不同处理策略的查询，不应对其变量部分进行参数化。例如，回顾相应的示例，您知道查询的第二次执行重用了为第一次执行生成的计划。为方便参考，此处重复该示例：\n\
  \n```sql\n--清除过程缓存\nDECLARE @planhandle VARBINARY(64)\nSELECT @planhandle = deqs.plan_handle\n\
  FROM sys.dm_exec_query_stats AS deqs\nCROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle)\
  \ AS dest\nWHERE dest.text LIKE '%SELECT soh.SalesOrderNumber,%'\nIF @planhandle\
  \ IS NOT NULL\nDBCC FREEPROCCACHE(@planhandle);\nGO\nDECLARE @query NVARCHAR(MAX);\n\
  DECLARE @param NVARCHAR(MAX);\nSET @query\n= N'SELECT soh.SalesOrderNumber,\nsoh.OrderDate,\n\
  sod.OrderQty,\nsod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod\nON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID >= @CustomerId;'\n\
  SET @param = N'@CustomerId INT';\nEXEC sp_executesql @query, @param, @CustomerId\
  \ = 1;\nEXEC sp_executesql @query, @param, @CustomerId = 30118;\n```\n\n该查询的第二次执行对\
  \ `SalesOrderHeader` 表执行了 `索引扫描` 操作以检索数据。如第 8 章所述，对于第二次执行，本可能更倾向于在 `SalesOrderHeader`\
  \ 表上使用 `索引查找` 操作。您可以通过在 `SalesOrderHeader` 表上执行 `sp_recompile` 系统存储过程来实现这一点，如下所示：\n\
  \n```sql\nEXEC sp_recompile 'Sales.SalesOrderHeader'\n```\n\n现在，如果使用第二个参数值重新执行该查询，查询计划将如前面的\
  \ `sp_recompile` 语句所标记的那样进行重编译。这使得 SQL Server 能够为第二次执行生成一个最优计划。\n\n嗯，这里有个小问题：您很可能还想重新执行第一条语句。由于计划存在于缓存中，即使对于第一条语句，使用\
  \ `索引查找` 操作（利用筛选条件列 `soh.CustomerID` 上的索引）可能更优，SQL Server 也会重用该计划（对 `SalesOrderHeader`\
  \ 表的 `索引扫描` 操作）。避免此问题的一种方法是为查询创建一个存储过程，并在语句上使用 `OPTION` (`RECOMPILE`) 子句。接下来我将介绍控制重编译的各种方法。\n\
  \n### 显式使用 `RECOMPILE`\n\nSQL Server 允许使用 `RECOMPILE` 命令以三种方式显式重编译存储过程和查询：在 `CREATE\
  \ PROCEDURE` 语句中、作为 `EXECUTE` 语句的一部分以及在查询提示中。这些方法会降低计划重用的效率，并可能导致 CPU 的大量使用，因此您应仅在以下小节所述的特定情况下考虑使用它们。\n\
  \n#### 在 `CREATE PROCEDURE` 语句中使用 `RECOMPILE` 子句\n\n有时，存储过程的计划需求会随着传递给该存储过程的参数值的变化而变化。在这种情况下，为不同的参数值重用同一个计划可能会降低存储过程的性能。您可以通过在\
  \ `CREATE PROCEDURE` 语句中使用 `RECOMPILE` 子句来避免这种情况。例如，对于上一节中的查询，您可以创建一个带有 `RECOMPILE`\
  \ 子句的存储过程。\n\n```sql\nCREATE OR ALTER PROCEDURE dbo.CustomerList @CustomerId INT\n\
  WITH RECOMPILE\nAS\nSELECT soh.SalesOrderNumber,\nsoh.OrderDate,\nsod.OrderQty,\n\
  sod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail AS\
  \ sod\nON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID >= @CustomerId;\n\
  GO\n```\n\n`RECOMPILE` 子句会阻止缓存存储过程内每个语句的计划。每次执行该存储过程时，都会生成新的计划。因此，如果使用 `soh.CustomerID`\
  \ 值为 30118 或 1 来执行存储过程，\n\n```sql\nEXEC CustomerList @CustomerId = 1;\nEXEC CustomerList\
  \ @CustomerId = 30118;\n```\n\n在每次执行期间都会生成一个新计划，如图 18-11 所示。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig11_HTML.jpg](img/323849_5_En_18_Fig11_HTML.jpg)\n\
  \n图 18-11：在创建存储过程中使用 `RECOMPILE` 子句的效果\n\n#### 在 `EXECUTE` 语句中使用 `RECOMPILE` 子句\n\
  \n如前所示，存储过程中的特定参数值根据其性质可能需要不同的计划。您可以将 `RECOMPILE` 子句从存储过程中移出，仅在执行存储过程时按需使用，如下所示：\n\
  \n```sql\nEXEC dbo.CustomerList @CustomerId = 1\nWITH RECOMPILE;\n```\n\n当使用 `RECOMPILE`\
  \ 子句执行存储过程时，会临时生成一个新计划。这个新计划不会被缓存，也不会影响现有计划。当不带 `RECOMPILE` 子句执行存储过程时，计划照常缓存。相比于在\
  \ `CREATE PROCEDURE` 语句中使用 `RECOMPILE` 子句，这种方式提供了一些对现有计划缓存重用性的控制。\n\n由于带 `RECOMPILE`\
  \ 子句执行时的存储过程计划不会被缓存，因此每次带 `RECOMPILE` 子句执行该存储过程时，计划都会重新生成。但是，为了获得更好的性能，您应考虑创建单独的存储过程（为每组需要不同计划的参数值各创建一个），而不是使用\
  \ `RECOMPILE`，前提是这些计划易于识别，并且您只处理少量可能的计划。\n\n\n#### 使用 RECOMPILE 查询提示控制单条语句\n\n虽然您可以使用前面提到的任一方法来重新编译整个存储过程，但如果过程包含多条命令，这可能会带来问题。使用前面任一方法都会重新编译过程内的所有语句。对于某些查询而言，编译时间可能是执行过程中最昂贵的部分，因此应尽量避免重编译。为此，一种更精细的方法是：仅对需要重编译的特定语句进行隔离处理。这可以通过使用\
  \ `RECOMPILE` 查询提示来实现，如下所示：\n\n```sql\nCREATE OR ALTER PROCEDURE dbo.CustomerList\
  \ @CustomerId INT\nAS\nSELECT a.AddressLine1,\na.AddressLine2,\na.City,\na.PostalCode\n\
  FROM Person.Address AS a\nJOIN Sales.SalesOrderHeader AS soh\nON soh.ShipToAddressID\
  \ = a.AddressID\nWHERE soh.CustomerID = @CustomerId;\nSELECT soh.SalesOrderNumber,\n\
  soh.OrderDate,\nsod.OrderQty,\nsod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\n\
  JOIN Sales.SalesOrderDetail AS sod\nON soh.SalesOrderID = sod.SalesOrderID\nWHERE\
  \ soh.CustomerID >= @CustomerId\nOPTION (RECOMPILE);\nSELECT bom.BillOfMaterialsID,\n\
  p.Name,\nsod.OrderQty\nFROM Production.BillOfMaterials AS bom\nJOIN Production.Product\
  \ AS p\nON p.ProductID = bom.ProductAssemblyID\nJOIN Sales.SalesOrderDetail AS sod\n\
  ON sod.ProductID = p.ProductID\nJOIN Sales.SalesOrderHeader AS soh\nON soh.SalesOrderID\
  \ = sod.SalesOrderID\nWHERE soh.CustomerID = @CustomerId;\nGO\n```\n\n在这个过程里，中间的查询看起来与将\
  \ `RECOMPILE` 应用于整个过程时的行为相同，但如果您在此查询中添加了多个语句，那么只有带有 `OPTION (RECOMPILE)` 查询提示的语句会在过程每次执行时进行编译。\n\
  \n## 避免重编译\n\n有时重编译是有益的，但有时则值得避免。如果在查询的 `WHERE` 或 `JOIN` 子句所引用的列上创建了新索引，那么重新生成引用该表的存储过程的执行计划是合理的，这样它们就能从使用索引中获益。然而，如果认为重编译对性能有害，例如它导致了阻塞或耗尽了\
  \ CPU 等资源，您可以通过遵循以下实现实践来避免它：\n\n*   不要交错使用 DDL 和 DML 语句。\n*   避免由统计信息更改引起的重编译。\n\
  *   使用 `KEEPFIXED PLAN` 选项。\n*   在表上禁用自动更新统计信息功能。\n*   使用表变量。\n*   避免在存储过程中更改 `SET`\
  \ 选项。\n*   使用 `OPTIMIZE FOR` 查询提示。\n*   使用计划指南。\n\n### 不要交错使用 DDL 和 DML 语句\n\n在存储过程中，DDL\
  \ 语句常用于创建本地临时表并更改其架构（包括添加索引）。这样做会影响现有计划的有效性，并在执行引用这些表的存储过程语句时导致重编译。要理解对本地临时表使用 DDL\
  \ 语句如何导致存储过程重复重编译，请看以下示例：\n\n```sql\nIF (SELECT OBJECT_ID('dbo.TempTable')) IS NOT\
  \ NULL\nDROP PROC dbo.TempTable\nGO\nCREATE PROC dbo.TempTable\nAS\nCREATE TABLE\
  \ #MyTempTable (ID INT,\nDsc NVARCHAR(50))\nINSERT INTO #MyTempTable (ID,\nDsc)\n\
  SELECT pm.ProductModelID,\npm.Name\nFROM Production.ProductModel AS pm; --需要第 1\
  \ 次重编译\nSELECT *\nFROM #MyTempTable AS mtt;\nCREATE CLUSTERED INDEX iTest ON #MyTempTable\
  \ (ID);\nSELECT *\nFROM #MyTempTable AS mtt; --需要第 2 次重编译\nCREATE TABLE #t2 (c1\
  \ INT);\nSELECT *\nFROM #t2;\n--需要第 3 次重编译\nGO\nEXEC dbo.TempTable; --首次执行\n```\n\
  \n该存储过程交错使用了 DDL 和 DML 语句。图 18-12 显示了此代码的扩展事件输出。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig12_HTML.jpg](img/323849_5_En_18_Fig12_HTML.jpg)\n\
  \n图 18-12 扩展事件输出，显示了由于 DDL 和 DML 交错导致的重编译\n\n语句被重新编译了四次。\n\n*   查询首次执行时生成的执行计划不包含任何关于本地临时表的信息。因此，最初生成的计划永远无法用于通过\
  \ DML 语句访问临时表。\n*   第二次重编译源于表中数据在加载过程中遇到的更改。\n*   第三次重编译是由于第一个临时表 (`#MyTempTable`)\
  \ 的架构发生更改。在 `#MyTempTable` 上创建索引使现有计划失效，导致再次访问该表时发生重编译。如果此索引是在第一次重编译之前创建的，那么现有计划对于第二个\
  \ `SELECT` 语句也将保持有效。因此，您可以通过将 `CREATE INDEX` DDL 语句置于所有引用该表的 DML 语句之前来避免这次重编译。\n\
  *   第四次重编译生成了一个包含 `#t2` 处理策略的计划。现有计划没有关于 `#t2` 的信息，因此无法用于通过第三个 `SELECT` 语句访问 `#t2`。如果\
  \ `#t2` 的 `CREATE TABLE` DDL 语句被放置在所有可能引起重编译的 DML 语句之前，那么第一次重编译本身就会包含 `#t2` 的信息，从而避免第三次重编译。\n\
  \n### 避免由统计信息更改引起的重编译\n\n在“分析重编译的原因”一节中，您已经了解到统计信息更改是重编译的原因之一。对于数据分布均匀的简单表，由统计信息更改引起的重编译可能生成与先前计划相同的计划。在这种情况下，重编译可能是不必要的，如果成本太高则应该避免。但是，大多数时候，统计信息的更改需要反映在执行计划中。我这里指的是那些重编译时间过长或过度重编译影响\
  \ CPU 的情况。\n\n您有两种技术可以避免由统计信息更改引起的重编译。\n\n*   使用 `KEEPFIXED PLAN` 选项。\n*   在表上禁用自动更新统计信息功能。\n\
  \n\n### 使用 `KEEPFIXED PLAN` 选项\n\nSQL Server 提供了 `KEEPFIXED PLAN` 选项，以避免因统计信息更改而导致的重编译。要了解如何使用\
  \ `KEEPFIXED PLAN`，请考虑 `statschanges.sql` 脚本，其中已适当修改以使用 `KEEPFIXED PLAN` 选项。\n\n\
  ```\nIF (SELECT OBJECT_ID('dbo.Test1')) IS NOT NULL\nDROP TABLE dbo.Test1;\nGO\n\
  CREATE TABLE dbo.Test1 (C1 INT,\nC2 CHAR(50));\nINSERT INTO dbo.Test1\nVALUES (1,\
  \ '2');\nCREATE NONCLUSTERED INDEX IndexOne ON dbo.Test1 (C1);\nGO\n--创建引用上述表的存储过程\n\
  CREATE OR ALTER PROC dbo.TestProc\nAS\nSELECT *\nFROM dbo.Test1 AS t\nWHERE t.C1\
  \ = 1\nOPTION (KEEPFIXED PLAN);\nGO\n--首次执行存储过程（表中只有 1 行数据）\nEXEC dbo.TestProc;\n\
  --第一次执行\n--向表中添加大量行以导致统计信息更改\nWITH Nums\nAS (SELECT 1 AS n\nUNION ALL\nSELECT n\
  \ + 1\nFROM Nums\nWHERE n < 1000)\nINSERT INTO dbo.Test1 (C1,\nC2)\nSELECT 1,\n\
  n\nFROM Nums\nOPTION (MAXRECURSION 1000);\nGO\n--在统计信息更改后重新执行存储过程\nEXEC dbo.TestProc;\
  \ --数据分布已更改\n```\n\n图 18-13 显示了扩展事件输出。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig13_HTML.jpg](img/323849_5_En_18_Fig13_HTML.jpg)\n\
  \n图 18-13\n\n扩展事件输出，显示 `KEEPFIXED PLAN` 选项在减少重编译中的作用\n\n可以看到，与之前数据更改的示例不同，这里没有 `auto_stats`\
  \ 事件（参见图 18-7）。因此，没有额外的重编译。所以，通过使用 `KEEPFIXED PLAN` 选项，可以避免因统计信息更改而导致的重编译。\n\n图\
  \ 18-13 中可见一个重编译事件，但这是数据修改查询的结果，而不是像在没有 `KEEPFIXED PLAN` 选项时所预期的那样由存储过程的执行引起的。\n\
  \n### 注意\n\n这是一个潜在危险的选择。在考虑使用此选项之前，请确保本应生成的新计划并不优于现有计划，并且您已穷尽所有其他可能的解决方案。在大多数情况下，重新编译查询是更可取的，尽管可能代价高昂。\n\
  \n### 在表上禁用自动更新统计信息\n\n您也可以通过禁用相关表上的自动统计信息更新，来避免因统计信息更新而导致的重编译。例如，可以在表 `Test1` 上禁用自动更新统计信息功能，如下所示：\n\
  \n```\nEXEC sp_autostats\n'dbo.Test1',\n'OFF' ;\n```\n\n如果您在插入导致统计信息更改的大量行之前禁用此表上的功能，则可以避免因统计信息更改而导致的重编译。\n\
  \n但是，请谨慎使用此技术，因为过时的统计信息会对基于成本的优化器的有效性产生不利影响，如第 13 章所述。此外，如第 13 章所述，如果禁用统计信息的自动更新，则应设置一个\
  \ SQL 作业来手动定期更新统计信息。\n\n### 使用表变量\n\nSQL Server 2014 支持的变量类型之一是表变量。您可以像使用其他数据类型一样，使用\
  \ `DECLARE` 语句创建表变量数据类型。它的行为类似于局部变量，您可以在存储过程中使用它来保存中间结果集，就像使用临时表一样。\n\n如果使用表变量，则可以避免由临时表引起的重编译。由于不会为表变量创建统计信息，因此与临时表相关的不同重编译问题不适用于它。例如，考虑“表”一节中使用的脚本（原文此处似乎有误，根据上下文理解）：\n\
  \n```\nCREATE OR ALTER PROC dbo.TestProc\nAS\nCREATE TABLE #TempTable (C1 INT);\n\
  INSERT INTO #TempTable (C1)\nVALUES (42);\n-- 数据更改导致重编译\nGO\nEXEC dbo.TestProc;\
  \ --首次执行\n```\n\n由于延迟的对象解析，存储过程在首次执行期间会重编译。您可以使用表变量避免这种由临时表引起的重编译，如下所示：\n\n```\n\
  CREATE OR ALTER PROC dbo.TestProc\nAS\nDECLARE @TempTable TABLE (C1 INT);\nINSERT\
  \ INTO @TempTable (C1)\nVALUES (42);\n--无需重编译\nGO\nEXEC dbo.TestProc; --首次执行\n```\n\
  \n图 18-14 显示了存储过程首次执行的扩展事件输出。通过使用表变量，避免了由临时表引起的重编译。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig14_HTML.jpg](img/323849_5_En_18_Fig14_HTML.jpg)\n\
  \n图 18-14\n\n扩展事件输出，显示表变量在解决重编译问题中的作用\n\n然而，表变量有其局限性。主要如下：\n\n*   一旦创建表变量，就无法对其执行任何\
  \ DDL 语句，这意味着以后无法向表变量添加索引或约束。约束只能作为表变量的 `DECLARE` 语句的一部分指定。因此，只能使用 `PRIMARY KEY`\
  \ 或 `UNIQUE` 约束在表变量上创建一个索引。\n\n*   不会为表变量创建统计信息，这意味着它们在执行计划中被解析为单行表。当表实际只包含少量数据（大约少于\
  \ 100 行）时，这不是问题。当表变量包含更多数据时，它会成为一个主要的性能问题，因为执行计划中对正确操作类型的适当决策完全依赖于统计信息。\n\n### 避免在存储过程中更改\
  \ `SET` 选项\n\n通常建议不要在存储过程中更改环境设置，从而避免因 `SET` 选项更改而导致的重编译。为了 ANSI 兼容性，建议将以下 `SET`\
  \ 选项保持为 `ON`：\n\n*   `ARITHABORT`\n*   `CONCAT_NULL_YIELDS_NULL`\n*   `QUOTED_IDENTIFIER`\n\
  *   `ANSI_NULLS`\n*   `ANSI_PADDING`\n*   `ANSI_WARNINGS`\n*   而 `NUMERIC_ROUNDABORT`\
  \ 应设置为 `OFF`。\n\n前面的示例说明了如果您确实选择在过程中修改 `SET` 选项会发生什么情况。\n\n\n## 使用 `OPTIMIZE FOR`\
  \ 查询提示\n\n尽管你可能并不总是能减少或消除重新编译，但使用 `OPTIMIZE FOR` 查询提示可以帮助你在重新编译发生时，获得你想要的执行计划。`OPTIMIZE\
  \ FOR` 查询提示使用你提供的参数值来编译计划，而忽略调用应用程序传入的参数的实际值。\n\n举个例子，回顾本章前面提到的 `CustomerList` 存储过程。你知道如果这个存储过程接收到某些特定的参数值，它将需要创建一个新的执行计划。基于对自身数据的了解，你还知道两个更重要的事实：该查询返回很小数据集的频率极低，并且当该查询使用了错误的计划时，性能会显著下降。与其让它一遍又一遍地重新编译，不如修改它，使其创建那个在大多数情况下效果最好的计划。\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.CustomerList @CustomerID INT\nAS\nSELECT\
  \ soh.SalesOrderNumber,\nsoh.OrderDate,\nsod.OrderQty,\nsod.LineTotal\nFROM Sales.SalesOrderHeader\
  \ AS soh\nJOIN Sales.SalesOrderDetail AS sod\nON soh.SalesOrderID = sod.SalesOrderID\n\
  WHERE soh.CustomerID >= @CustomerID\nOPTION (OPTIMIZE FOR (@CustomerID = 1));\n\
  GO\n```\n\n当这个查询首次执行或因任何原因重新编译时，它总是基于传入参数的统计值获得相同的执行计划。为了测试这一点，可以按如下方式执行存储过程：\n\n\
  ```sql\nEXEC dbo.CustomerList\n@CustomerID = 7920\nWITH RECOMPILE;\nEXEC dbo.CustomerList\n\
  @CustomerID = 30118\nWITH RECOMPILE;\n```\n\n正如本章前面所示，这将强制该存储过程在每次执行时都重新编译。`图 18-15`\
  \ 展示了得到的执行计划。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig15_HTML.jpg](img/323849_5_En_18_Fig15_HTML.jpg)\n\
  \n**图 18-15**\n使用 `WITH RECOMPILE` 不会改变相同的执行计划\n\n与本章前面的情况不同，现在重新编译存储过程并不会产生新的执行计划。相反，无论输入参数是什么，都生成了相同的计划，这是因为查询优化器在优化查询时，收到了指令，要求使用提示所提供的值，即\
  \ `@CustomerID = 1`。\n\n这并没有真正减少重新编译的次数，但它确实帮助你控制了生成的执行计划。这要求你非常了解你的数据。如果你的数据随时间发生了变化，你可能需要重新审视那些使用了\
  \ `OPTIMIZE FOR` 查询提示的地方。\n\n要查看执行计划中的提示，只需查看 `SELECT` 算子的属性，如 `图 18-16` 所示。\n\n\
  ![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig16_HTML.jpg](img/323849_5_En_18_Fig16_HTML.jpg)\n\
  \n**图 18-16**\n参数编译值与查询提示提供的值相匹配\n\n你可以看到，虽然查询被重新编译并且被赋予了一个值 `30118`，但由于提示的存在，使用的编译值是提示所指定的\
  \ `1`。\n\n你可以指定查询使用 `OPTIMIZE FOR UNKNOWN` 进行优化。这几乎是 `OPTIMIZE FOR` 提示的反面。`OPTIMIZE\
  \ FOR` 提示会尝试使用直方图，而 `OPTIMIZE FOR UNKNOWN` 提示将使用统计信息的密度向量。你是在指示处理器始终基于统计信息的平均值进行优化，并忽略查询优化时传入的实际值。你可以将它与\
  \ `OPTIMIZE FOR <value>` 结合使用。它会针对该参数上提供的值进行优化，但会对所有其他参数使用统计信息。正如前一章所讨论的，这两种都是处理“参数嗅探”问题的机制。\n\
  \n## 使用计划指南\n\n计划指南允许你在不修改查询或存储过程文本的情况下使用查询提示或其他优化技术。这在你有一个性能不佳的第三方产品存储过程，需要进行调优却又无法修改其代码时，尤其有用。作为优化过程的一部分，如果在存储过程编译或重新编译时存在计划指南，它将使用该指南来创建执行计划。\n\
  \n在上一节中，我向你展示了使用 `OPTIMIZE FOR` 会如何影响为存储过程创建的执行计划。以下是原始存储过程中的查询，未包含任何提示：\n\n```sql\n\
  CREATE OR ALTER PROCEDURE dbo.CustomerList @CustomerID INT\nAS\nSELECT soh.SalesOrderNumber,\n\
  soh.OrderDate,\nsod.OrderQty,\nsod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\n\
  JOIN Sales.SalesOrderDetail AS sod\nON soh.SalesOrderID = sod.SalesOrderID\nWHERE\
  \ soh.CustomerID >= @CustomerID;\nGO\n```\n\n现在，假设这个查询是一个第三方应用程序的一部分，你无法修改它来添加 `OPTION\
  \ (OPTIMIZE FOR)`。为了给它应用 `OPTIMIZE FOR` 查询提示，可以按如下方式创建一个计划指南：\n\n```sql\nsp_create_plan_guide\
  \ @name = N'MyGuide',\n@stmt = N'SELECT soh.SalesOrderNumber,\nsoh.OrderDate,\n\
  sod.OrderQty,\nsod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod\nON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID >= @CustomerID;',\n\
  @type = N'OBJECT',\n@module_or_batch = N'dbo.CustomerList',\n@params = NULL,\n@hints\
  \ = N'OPTION (OPTIMIZE FOR (@CustomerID = 1))';\n```\n\n现在，当使用不同的参数执行该存储过程时，即使像下面这样强制使用\
  \ `RECOMPILE`，`OPTIMIZE FOR` 提示也会被应用。`图 18-17` 展示了得到的执行计划。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig17_HTML.jpg](img/323849_5_En_18_Fig17_HTML.jpg)\n\
  \n**图 18-17**\n使用计划指南来应用 `OPTIMIZE FOR` 查询提示\n\n```sql\nEXEC dbo.CustomerList\n\
  @CustomerID = 7920\nWITH RECOMPILE;\nEXEC dbo.CustomerList\n@CustomerID = 30118\n\
  WITH RECOMPILE;\n```\n\n结果与修改存储过程时相同，但在这种情况下，无需进行任何修改。你可以再次通过查看 `SELECT` 算子的属性（`图\
  \ 18-18`）看到，执行计划中应用了一个计划指南。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig18_HTML.jpg](img/323849_5_En_18_Fig18_HTML.jpg)\n\
  \n**图 18-18**\n`SELECT` 算子属性显示了计划指南\n\n存在多种类型的计划指南。前面的示例是一个 *对象* 计划指南，它是匹配数据库中特定对象的指南，在本例中是\
  \ `CustomerList`。你还可以为重复进入系统的即席查询创建计划指南，通过创建一个 SQL 计划指南来查找特定的 SQL 语句。假设以下查询（而非存储过程）被传递到你的系统，并且需要应用一个\
  \ `OPTIMIZE FOR` 查询提示：\n\n```sql\nSELECT soh.SalesOrderNumber,\nsoh.OrderDate,\n\
  sod.OrderQty,\nsod.LineTotal\nFROM Sales.SalesOrderHeader AS soh\nJOIN Sales.SalesOrderDetail\
  \ AS sod\nON soh.SalesOrderID = sod.SalesOrderID\nWHERE soh.CustomerID >= 1;\n```\n\
  \n运行此查询会产生你在 `图 18-19` 中看到的执行计划。\n\n![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig19_HTML.jpg](img/323849_5_En_18_Fig19_HTML.jpg)\n\
  \n**图 18-19**\n该查询使用的执行计划与期望的不同\n\n要创建查询计划指南，你首先需要知道查询使用的精确格式，以防参数化（强制或简单）改变了查询的文本。文本必须精确。如果你第一次尝试创建查询计划指南像这样：\n\
  \n\n"
- '# 第 18 章 重编译：问题与解决方案


  执行`sp_create_plan_guide`创建计划指南。


  ```

  EXECUTE sp_create_plan_guide @name = N''MyBadSQLGuide'',

  @stmt = N''SELECT  soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  join Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE   soh.CustomerID >= @CustomerID'',

  @type = N''SQL'',

  @module_or_batch = NULL,

  @params = N''@CustomerID int'',

  @hints = N''OPTION  (TABLE HINT(soh,  FORCESEEK))'';

  ```


  当运行`SELECT`查询时，你仍然会得到相同的执行计划。这是因为查询看起来与计划指南中键入的内容不同。有几处差异，例如间距和`JOIN`语句的大小写。你可以使用
  T-SQL 语句删除这个错误的计划指南。


  ```

  EXECUTE sp_control_plan_guide @operation = ''Drop'',

  @name = N''MyBadSQLGuide'';

  ```


  输入正确的语法将创建一个新的计划。


  ```

  EXECUTE sp_create_plan_guide @name = N''MyGoodSQLGuide'',

  @stmt = N''SELECT soh.SalesOrderNumber,

  soh.OrderDate,

  sod.OrderQty,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  JOIN Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  WHERE soh.CustomerID >= 1;'',

  @type = N''SQL'',

  @module_or_batch = NULL,

  @params = NULL,

  @hints = N''OPTION  (TABLE HINT(soh,  FORCESEEK))'';

  ```


  现在运行查询时，会创建一个完全不同的计划，如图 18-20 所示。


  ![../images/323849_5_En_18_Chapter/323849_5_En_18_Fig20_HTML.jpg](img/323849_5_En_18_Fig20_HTML.jpg)


  图 18-20


  计划指南强制对同一查询使用新的执行计划


  当你缓存中有一个计划，并且你认为它的执行方式符合预期时，还存在另一个选项。你可以将该计划捕获到计划指南中，以确保下次运行查询时执行相同的计划。这通过运行`sp_create_plan_guide_from_handle`来完成。


  为了测试，首先清除过程缓存（假设我们不在生产实例上运行），以便精确控制使用哪个查询计划。


  ```

  ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE

  ```


  在过程缓存清空且现有计划指南`MyGoodSQLGuide`就位的情况下，重新运行查询。它将使用计划指南来获得如图 18-18 所示的执行计划。要查看此计划是否可以保持，首先删除强制`Index
  Seek`操作的计划指南。


  ```

  EXECUTE sp_control_plan_guide @operation = ''Drop'',

  @name = N''MyGoodSQLGuide'';

  ```


  如果现在重新运行查询，它将恢复到其原始计划。然而，当前在计划缓存中，你有如图 18-18 所示的计划。要保留它，请运行以下脚本：


  ```

  DECLARE @plan_handle VARBINARY(64),

  @start_offset INT;

  SELECT @plan_handle = deqs.plan_handle,

  @start_offset = deqs.statement_start_offset

  FROM sys.dm_exec_query_stats AS deqs

  CROSS APPLY sys.dm_exec_sql_text(sql_handle)

  CROSS APPLY sys.dm_exec_text_query_plan(deqs.plan_handle,

  deqs.statement_start_offset,

  deqs.statement_end_offset) AS qp

  WHERE text LIKE N''SELECT soh.SalesOrderNumber%''

  EXECUTE sp_create_plan_guide_from_handle @name = N''ForcedPlanGuide'',

  @plan_handle = @plan_handle,

  @statement_start_offset = @start_offset;

  GO

  ```


  这基于当前缓存中存在的执行计划创建了一个计划指南。为了确保其有效，再次清除缓存。这样，查询必须生成一个新计划。重新运行查询，并观察执行计划。由于使用`sp_create_plan_guide_from_handle`创建的计划指南，它将与图
  18-19 所示的计划相同。


  计划指南是控制 SQL 查询和存储过程行为的有用机制，但你应该仅在彻底理解执行计划、数据和系统结构时才使用它们。


  ### 使用查询存储强制计划


  与`OPTIMIZE FOR`和计划指南一样，通过查询存储强制计划实际上并不会减少系统上的重编译次数。然而，它将允许你更好地控制这些重编译的结果。类似于计划指南的工作原理，随着数据随时间变化，你可能需要重新评估已强制的计划（参见第
  11 章）。


  ## 小结


  正如你在本章所学，查询重编译既可能有益也可能损害性能。生成更好计划的重编译提高了存储过程的性能。然而，重新生成相同计划的重编译会消耗额外的 CPU 周期，而没有任何处理策略的改进。因此，你应该仔细检查重编译以确定其有用性。你可以使用扩展事件来识别是哪个存储过程语句导致了重编译，并且你可以从扩展事件输出中的`recompile_clause`数据列值确定原因。一旦确定了重编译的原因，你就可以应用不同的技术来避免不必要的重编译。


  到目前为止，你已经了解了如何从正确的索引和计划缓存中受益。然而，这些技术的性能优势取决于查询的设计方式。SQL Server 的成本优化器处理了许多查询设计问题。但是，在设计查询时，你应该采用一些最佳实践。在下一章中，我将介绍一些影响性能的常见查询设计问题。


  '
- "# 19. 查询设计分析\n\n数据库架构可能包含许多增强性能的特性，如索引、统计信息和存储过程。但是，如果你的查询从一开始就写得很糟糕，这些特性都无法保证良好的性能。SQL\
  \ 查询可能无法有效地使用可用的索引。SQL 查询的结构可能会给查询成本增加可避免的开销。查询可能试图以逐行的方式（或者引用 Jeff Moden 的话，Row\
  \ By Agonizing Row，缩写为 RBAR，发音为“reebar”）处理数据，而不是以逻辑集合的方式。为了提高数据库应用程序的性能，理解与不同查询编写方式相关的成本非常重要。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   影响性能的查询设计方面\n*   查询设计如何有效地使用索引\n*   优化器提示对查询性能的作用\n*   数据库约束对查询性能的作用\n\
  \n## 查询设计建议\n\n当你需要运行查询时，通常可以使用许多不同的方法来获取相同的数据。在许多情况下，优化器生成相同的计划，而不考虑查询的结构。然而，在某些情况下，查询结构将不允许优化器选择最佳的处理策略。重要的是你要意识到这种情况可能发生，并且如果发生，你能做些什么来避免它。\n\
  \n一般来说，请牢记以下建议以确保最佳性能：\n\n*   操作小型结果集。\n*   有效地使用索引。\n*   最小化优化器提示的使用。\n*   使用域和引用完整性。\n\
  *   避免资源密集型查询。\n*   减少网络往返次数。\n*   降低事务成本。（我将在下一章中介绍最后三点。）\n\n仔细的测试对于在特定数据库环境中识别提供最佳性能的查询形式至关重要。你应该熟悉编写和比较不同的\
  \ SQL 查询形式，以便评估在给定环境中提供最佳性能的查询形式。你还需要能够自动化你的测试。\n\n\n## 对小型结果集进行操作\n\n为提升查询性能，应限制其操作的数据量，包括列和行。对小型结果集进行操作可减少查询消耗的资源量，并提高索引的有效性。为限制数据集的大小，应遵循以下两条规则：\n\
  \n*   限制选择列表中的列数，仅包含实际需要的列。\n*   使用高选择性的 `WHERE` 子句来限制返回的行数。\n\n需要注意的是，有时你会被要求向\
  \ OLTP 系统返回数万行数据。仅仅因为有人告诉你这是业务需求，并不意味着这些需求就是合理的。人类无法处理数万行的数据。很少有人能处理数千行数据。你要准备好对这些要求提出质疑，并能够说明理由。此外，你经常会听到并必须准备好反驳的一个理由是“以防将来我们需要它”。\n\
  \n### 限制 select_list 中的列数\n\n在 `SELECT` 语句的选择列表中，使用最小化的列集合。不要使用输出结果集中不需要的列。例如，不要使用\
  \ `SELECT *` 来返回所有列。`SELECT *` 语句会使覆盖索引失效，因为将所有列都包含在索引中通常是不切实际的。例如，考虑以下查询：\n\n```sql\n\
  SELECT Name,\nTerritoryID\nFROM Sales.SalesTerritory AS st\nWHERE st.Name = 'Australia';\n\
  ```\n\n在 `Name` 列（以及通过聚集键 `ProductID`）上的覆盖索引可以通过索引本身快速服务该查询，而无需访问聚集索引。当你启用扩展事件会话时，会得到以下逻辑读次数和执行时间，以及相应的执行计划（如图\
  \ 19-1 所示）：\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig1_HTML.jpg](img/323849_5_En_19_Fig1_HTML.jpg)\n\
  *图 19-1：显示引用少量列带来的好处的执行计划*\n\n```text\nReads: 2\nDuration: 920 mcs\n```\n\n如果将此查询修改为在选择列表中包含所有列，如下所示，则之前的覆盖索引将失效，因为该查询所需的所有列并未全部包含在该索引中：\n\
  \n```sql\nSELECT *\nFROM Sales.SalesTerritory AS st\nWHERE st.Name = 'Australia';\n\
  ```\n\n随后，必须访问包含所有列的基础表（或聚集索引），如下所示。逻辑读次数和执行时间均有所增加。\n\n```text\nTable 'SalesTerritory'.\
  \ Scan count 0, logical reads 4\nCPU time = 0 ms,   elapsed time = 6.4 ms\n```\n\
  \n选择列表中的列越少，改善查询性能的潜力就越大。请记住，我们一直在分析的这个查询只是一个返回单行少量数据的简单查询，它已经使读取次数加倍，执行时间增加了六倍。选择超过严格需要的列也会增加网络上的数据传输，进一步降低性能。图\
  \ 19-2 显示了执行计划。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig2_HTML.jpg](img/323849_5_En_19_Fig2_HTML.jpg)\n\
  *图 19-2：说明引用过多列带来的额外开销的执行计划*\n\n### 使用高选择性的 WHERE 子句\n\n如第 8 章所述，在 `WHERE`、`ON`\
  \ 和 `HAVING` 子句中引用的列的选择性决定了是否能使用该列上的索引。请求从表中返回大量行可能无法从使用索引中受益，要么是因为根本无法使用索引，要么（在非聚集索引的情况下）是因为查找操作的开销成本。为确保使用索引，`WHERE`\
  \ 子句中引用的列应具有高选择性。\n\n大多数情况下，最终用户一次只关注有限数量的行。因此，你应该设计数据库应用程序，使其在用户浏览数据时以增量方式请求数据。对于依赖大量数据进行数据分析或报告的应用程序，可以考虑使用\
  \ Analysis Services 或 PowerPivot 等数据分析解决方案。如果分析围绕聚合进行并涉及大量数据，请利用列存储索引。记住，返回巨大的结果集代价高昂，而且这些数据不太可能被全部使用。唯一的常见例外是与数据科学家合作时，他们经常需要检索给定数据集中的所有数据作为其操作的第一步。仅在这种情况下，你可能需要寻找其他方法来提高性能，例如使用辅助服务器、升级硬件或其他机制。但是，要与他们合作以确保数据只移动一次，而不是重复移动。\n\
  \n## 有效使用索引\n\n在数据库表上建立有效的索引对于提高性能至关重要。然而，同样重要的是确保查询设计得当，以有效使用这些索引。以下是一些应遵循的查询设计规则，以改进索引的使用：\n\
  \n*   避免非 sargable 的搜索条件。\n*   避免在 `WHERE` 子句的列上使用算术运算符。\n*   避免在 `WHERE` 子句的列上使用函数。\n\
  \n我将在以下各节中详细介绍每条规则。\n\n### 避免非 Sargable 搜索条件\n\n查询中的 *sargable* 谓词是指可以使用索引的谓词。这个词是\
  \ “Search ARGument ABLE” 的缩写。优化器从索引中获益的能力取决于搜索条件的选择性，而这又取决于在 `WHERE`、`ON` 和 `HAVING`\
  \ 子句中引用的列的选择性，这些都依赖于索引上的统计信息。在 `WHERE` 子句列上使用的搜索谓词决定了是否可以对该列执行索引操作。\n\n\n\n### 注意\n\
  \n索引及其他函数在过滤子句中的使用主要围绕着`WHERE`、`ON`和`HAVING`。为了便于阅读（和编写），在许多本应包含`ON`和`HAVING`的情况下，我将仅使用`WHERE`。除非另有说明，请自行在脑海中包含它们。\n\
  \n表 19-1 中列出的可搜索条件通常允许优化器使用`WHERE`子句中引用列的索引。这些可搜索条件通常允许 SQL Server 在索引中定位到一行并检索该行（或者在搜索条件保持为真的情况下检索相邻范围的行）。\n\
  \n表 19-1\n常见可搜索与不可搜索的搜索条件\n\n| 类型 | 搜索条件 |\n| --- | --- |\n| 可搜索 | 包含条件 `=`、`>`、`>=`、`<`、`<=`、`BETWEEN`\
  \ 以及一些 `LIKE` 条件，例如 `LIKE '<literal>%'` |\n| 不可搜索 | 排除条件 `<>`、`!=`、`!>`、`!<`、`NOT\
  \ EXISTS`、`NOT IN` 和 `NOT LIKE`、`OR`，以及一些 `LIKE` 条件，例如 `LIKE '%<literal>'` |\n\n\
  另一方面，表 19-1 中列出的*不可搜索*条件通常会阻止优化器使用`WHERE`子句中引用列的索引。排除性搜索条件通常不允许 SQL Server 执行可搜索条件所支持的`Index\
  \ Seek`操作。例如，`!=`条件需要扫描所有行来识别匹配行。\n\n尝试为这些不可搜索条件实现变通方法以提高性能。在某些情况下，可以重写查询以避免不可搜索条件。例如，在某些情况下，可以用两个（或多个）`UNION\
  \ ALL`查询替换一个`OR`条件，使多个寻道操作优于单次扫描。你还可以考虑用`BETWEEN`条件替换`IN`/`OR`搜索条件，如下一节所述。关键在于尝试不同的机制，看看在特定情况下哪一种更有效。SQL\
  \ Server 中的方法没有绝对糟糕或完美的。每种方法都有其适用的场景和时机。在尝试提高性能时要灵活并进行实验。\n\n### BETWEEN 与 IN/OR\
  \ 对比\n\n考虑以下使用`IN`搜索条件的查询：\n\n```sql\nSELECT sod.*\nFROM Sales.SalesOrderDetail\
  \ AS sod\nWHERE sod.SalesOrderID IN ( 51825, 51826, 51827, 51828 );\n```\n\n编写相同查询的另一种方式是使用`OR`命令。\n\
  \n```sql\nSELECT sod.*\nFROM Sales.SalesOrderDetail AS sod\nWHERE sod.SalesOrderID\
  \ = 51825\nOR sod.SalesOrderID = 51826\nOR sod.SalesOrderID = 51827\nOR sod.SalesOrderID\
  \ = 51828;\n```\n\n你可以用`BETWEEN`子句替换此查询中的任一搜索条件，如下所示：\n\n```sql\nSELECT sod.*\n\
  FROM Sales.SalesOrderDetail AS sod\nWHERE sod.SalesOrderID BETWEEN 51825\nAND  \
  \   51828;\n```\n\n这三个查询返回相同的结果。表面上看，三个查询的执行计划是相同的，如图 19-3 所示。\n\n图 19-3\n使用`BETWEEN`子句的简单`SELECT`语句的执行计划\n\
  \n然而，仔细观察执行计划会揭示它们在数据检索机制上的差异，如图 19-4 所示。\n\n图 19-4\n`BETWEEN`条件（左）与`IN`条件（右）的执行计划详情\n\
  \n如图 19-4 所示，SQL Server 将包含四个值的`IN`条件解析为四个`OR`条件。因此，为了检索四个`IN`和`OR`条件的行，聚簇索引（`PKSalesTerritoryTerritoryld`）被访问了四次（`Scan\
  \ count 4`），如下列相应的`STATISTICS IO`输出所示。另一方面，`BETWEEN`条件被解析为一对`>=`和`<=`条件，如图 19-4\
  \ 所示。SQL Server 只访问聚簇索引一次（`Scan count 1`），从第一个匹配行开始直到匹配条件为假，如下列相应的`STATISTICS IO`和`QUERY\
  \ TIME`输出所示。\n\n*   使用`IN`条件时：\n\n```sql\nTable  'SalesOrderDetail'.  Scan count\
  \ 4,  logical reads 18\nCPU time = 0 ms,    elapsed time = 140 ms.\n```\n\n*   使用`BETWEEN`条件时：\n\
  \n```sql\nTable  'SalesOrderDetail'.  Scan count 1,  logical reads 6\nCPU time =\
  \ 0 ms,    elapsed time = 72 ms.\n```\n\n用`BETWEEN`替换搜索条件`IN`，将此查询的逻辑读取次数从 18 减少到\
  \ 6。如上所示，尽管三个查询都使用了`OrderID`上的聚簇索引寻道，但优化器使用`BETWEEN`子句比使用`IN`子句更快地定位到行范围。当你比较`BETWEEN`条件与`OR`子句时，也会发生同样的情况。因此，如果在`IN`/`OR`和`BETWEEN`搜索条件之间有选择，请始终选择`BETWEEN`条件，因为它通常比`IN`/`OR`条件高效得多。事实上，你应该更进一步，使用`>=`和`<=`的组合代替`BETWEEN`子句，因为这样可以让优化器少做一点工作。\n\
  \n同样值得注意的是，这个查询违反了早先关于仅返回有限列集而非使用`SELECT *`的建议。如果你查看`BETWEEN`操作的属性，它也已通过简单参数化更改为参数化查询。这可能导致计划重用，如第\
  \ 18 章所讨论。\n\n并非每个使用排除性搜索条件的`WHERE`子句都会阻止优化器使用搜索条件中引用列的索引。在许多情况下，SQL Server 优化器在将排除性搜索条件转换为可搜索条件方面做得非常出色。为了理解这一点，考虑以下两个搜索条件，我将在后续章节中讨论：\n\
  \n*   `LIKE`条件\n*   `!<`条件与`>=`条件的对比\n\n\n\n### LIKE 条件\n\n在使用 `LIKE` 搜索条件时，尽可能在\
  \ `WHERE` 子句中使用一个或多个前导字符。在 `LIKE` 子句中使用前导字符，可使 `优化器` 将 `LIKE` 条件转换为对索引友好的搜索条件。`LIKE`\
  \ 条件中的前导字符越多，`优化器` 就越能确定有效的索引。请注意，在 `LIKE` 条件中使用通配符作为首字符会*阻止* `优化器` 在索引上执行 `查找`（或窄范围扫描）；它转而依赖于扫描整张表。\n\
  \n要理解 SQL Server `优化器` 的这个能力，请看下面这个在 `LIKE` 条件中使用了前导字符的 `SELECT` 语句：\n\n```sql\n\
  SELECT c.CurrencyCode\nFROM Sales.Currency AS c\nWHERE c.Name LIKE 'Ice%';\n```\n\
  \nSQL Server `优化器` 会自动进行此转换，如图 19-5 所示。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig5_HTML.jpg](img/323849_5_En_19_Fig5_HTML.jpg)\n\
  \n*图 19-5. 执行计划显示带有尾部 % 符号的 LIKE 子句自动转换为可索引的搜索条件*\n\n如你所见，`优化器` 自动将 `LIKE` 条件转换为等效的一对\
  \ `>=` 和 `<` 条件。因此，你可以重写这个 `SELECT` 语句，用可索引的搜索条件替换 `LIKE` 条件，如下所示：\n\n```sql\nSELECT\
  \ c.CurrencyCode\nFROM Sales.Currency AS c\nWHERE c.Name >= N'Ice'\nAND c.Name <\
  \ N'IcF';\n```\n\n请注意，在这两种情况下，逻辑读取次数、带 `LIKE` 条件的查询执行时间以及手动转换的可搜索条件查询的执行时间都是相同的。因此，如果在\
  \ `LIKE` 子句中包含前导字符，SQL Server `优化器` 会优化搜索条件，从而允许使用该列上的索引。\n\n### !< 条件与 >= 条件\n\n\
  尽管 `!<` 和 `>=` 搜索条件检索的结果集相同，但它们内部执行的操作可能不同。`>=` 比较运算符允许 `优化器` 使用搜索参数中引用的列上的索引，因为该运算符的\
  \ `=` 部分允许 `优化器` 查找索引中的一个起点，并从那里访问所有后续的索引行。另一方面，`!<` 运算符没有 `=` 元素，需要访问每一行的列值。\n\n\
  真的是这样吗？如第 15 章所述，SQL Server `优化器` 在执行查询前会执行基于语法的优化，以提高性能。这使得 SQL Server 能够通过将 `!<`\
  \ 运算符转换为 `>=` 来处理其性能问题，如下面两个 `SELECT` 语句的执行计划图 19-6 所示：\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig6_HTML.jpg](img/323849_5_En_19_Fig6_HTML.jpg)\n\
  \n*图 19-6. 执行计划显示不可索引的 !< 运算符自动转换为可索引的 >= 运算符*\n\n```sql\nSELECT *\nFROM Purchasing.PurchaseOrderHeader\
  \ AS poh\nWHERE poh.PurchaseOrderID >= 2975;\n\nSELECT *\nFROM Purchasing.PurchaseOrderHeader\
  \ AS poh\nWHERE poh.PurchaseOrderID !< 2975;\n```\n\n如你所见，`优化器` 通常为你提供了灵活性，让你可以用偏好的\
  \ T-SQL 语法编写查询，而无需牺牲性能。\n\n尽管 SQL Server `优化器` 在许多情况下可以自动优化查询语法以提高性能，但你不应依赖它来这样做。养成一开始就编写高效查询的习惯是良好的实践。\n\
  \n### 避免在 WHERE 子句列上使用算术运算符\n\n在 `WHERE` 子句的列上使用算术运算符会阻止 `优化器` 使用该列上的统计信息或索引。例如，考虑以下\
  \ `SELECT` 语句：\n\n```sql\nSELECT *\nFROM Purchasing.PurchaseOrderHeader AS poh\n\
  WHERE poh.PurchaseOrderID * 2 = 3400;\n```\n\n乘法运算符 `*` 被应用在了 `WHERE` 子句的列上。你可以通过重写\
  \ `SELECT` 语句来避免在此列上使用它，如下所示：\n\n```sql\nSELECT *\nFROM Purchasing.PurchaseOrderHeader\
  \ AS poh\nWHERE poh.PurchaseOrderID = 3400 / 2;\n```\n\n该表在 `PurchaseOrderID` 列上有一个聚集索引。如第\
  \ 4 章所述，对此索引执行 `索引查找` 操作非常适合此查询，因为它只返回一行。尽管两个查询返回相同的结果集，但第一个查询在 `PurchaseOrderID`\
  \ 列上使用乘法运算符会阻止 `优化器` 使用该列上的索引，如图 19-7 所示。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig7_HTML.jpg](img/323849_5_En_19_Fig7_HTML.jpg)\n\
  \n*图 19-7. 执行计划显示 WHERE 子句列上算术运算符的不利影响*\n\n以下是相应的性能指标：\n\n- 在 `PurchaseOrderID`\
  \ 列上使用 `*` 运算符时：\n    读取次数: 11\n    持续时间: 210mcs\n- 在 `PurchaseOrderID` 列上不使用运算符时：\n\
  \    读取次数: 2\n    持续时间: 105mcs\n\n因此，为了有效使用索引并提高查询性能，当表达式预期与索引配合使用时，应避免在 `WHERE`\
  \ 子句或 `JOIN` 条件中的列上使用算术运算符。\n\n值得注意的是，图 19-7 中显示的查询都足够简单，符合参数化条件，如查询中的 `@1` 和 `@2`\
  \ 所示，它们代替了提供的值。\n\n### 注意\n\n对于小型结果集，尽管 `索引查找` 通常比表扫描（或完整的聚集索引扫描）是更好的数据检索策略，但对于小表（所有数据行都适合一页的表），表扫描的成本可能更低。我在第\
  \ 8 章中有更详细的解释。\n\n### 避免在 WHERE 子句列上使用函数\n\n与算术运算符类似，在 `WHERE` 子句列上使用函数也会损害查询性能——并且出于同样的原因。尽量避免在\
  \ `WHERE` 子句列上使用函数，如下两个示例所示：\n\n- `SUBSTRING` 与 `LIKE`\n- 日期部分比较\n- 自定义标量用户定义函数\n\
  \n#### SUBSTRING 与 LIKE\n\n在下面的 `SELECT` 语句中，使用 `SUBSTRING` 函数会阻止使用 `ShipPostalCode`\
  \ 列上的索引：\n\n```sql\nSELECT d.Name\nFROM HumanResources.Department AS d\nWHERE SUBSTRING(d.Name,\n\
  \                1,\n                1) = 'F';\n```\n\n图 19-8 说明了这一点。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig8_HTML.jpg](img/323849_5_En_19_Fig8_HTML.jpg)\n\
  \n*图 19-8. 执行计划显示在 WHERE 子句列上使用 SUBSTRING 函数的不利影响*\n\n如你所见，使用 `SUBSTRING` 函数阻止了\
  \ `优化器` 使用 `[Name]` 列上的索引。列上的这个函数迫使 `优化器` 使用聚集索引扫描。如果没有 `DepartmentID` 列上的聚集索引，则会执行表扫描。\n\
  \n你可以重新设计这个 `SELECT` 语句，以避免在列上使用函数，如下所示：\n\n```sql\nSELECT d.Name\nFROM HumanResources.Department\
  \ AS d\nWHERE d.Name LIKE 'F%';\n```\n\n此查询允许 `优化器` 选择 `[Name]` 列上的索引，如图 19-9 所示。\n\
  \n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig9_HTML.jpg](img/323849_5_En_19_Fig9_HTML.jpg)\n\
  \n*图 19-9. 执行计划显示不在 WHERE 子句列上使用 SUBSTRING 函数的好处*\n\n\n\n#### 日期部分比较\n\nSQL Server\
  \ 可以将日期和时间数据存储为独立的字段，或者存储为一个包含两者的组合字段 `DATETIME`。尽管你可能需要将日期和时间数据保存在一个字段中，但有时你只需要日期部分，这通常意味着你必须应用转换函数从\
  \ `DATETIME` 数据类型中提取日期部分。这样做会阻止优化器选择该列上的索引，如下例所示。\n\n首先，需要为其中一个表的 `DATETIME` 列创建一个良好的索引。使用\
  \ `Sales.SalesOrderHeader` 并创建以下索引：\n\n```sql\nIF EXISTS (   SELECT *\n        \
  \      FROM sys.indexes\n              WHERE object_id = OBJECT_ID(N'[Sales].[SalesOrderHeader]')\n\
  \                AND name = N'IndexTest')\n    DROP INDEX IndexTest ON Sales.SalesOrderHeader;\n\
  GO\nCREATE INDEX IndexTest ON Sales.SalesOrderHeader (OrderDate);\n```\n\n要从 `Sales.SalesOrderHeader`\
  \ 中检索 `OrderDate` 在 2008 年 4 月的所有行，你可以执行以下 `SELECT` 语句：\n\n```sql\nSELECT soh.SalesOrderID,\n\
  \       soh.OrderDate\nFROM   Sales.SalesOrderHeader AS soh\n       JOIN Sales.SalesOrderDetail\
  \ AS sod\n           ON soh.SalesOrderID = sod.SalesOrderID\nWHERE  DATEPART(yy,\
  \ soh.OrderDate) = 2008\n       AND DATEPART(mm, soh.OrderDate) = 4;\n```\n\n在列\
  \ `OrderDate` 上使用 `DATEPART` 函数会阻止优化器正确使用该列上的索引 `IndexTest`，转而执行索引扫描，如图 19-10 所示。\n\
  \n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig10_HTML.jpg](img/323849_5_En_19_Fig10_HTML.jpg)\n\
  \n图 19-10\n\n显示在 WHERE 子句列上使用 DATEPART 函数带来的不利影响的执行计划\n\n性能指标如下：\n\n```text\nReads:\
  \ 73\nDuration: 2.5ms\n```\n\n日期部分的比较可以在不将函数应用于 `DATETIME` 列的情况下完成。\n\n```sql\n\
  SELECT  soh.SalesOrderID,\n        soh.OrderDate\nFROM    Sales.SalesOrderHeader\
  \ AS soh\n        JOIN    Sales.SalesOrderDetail AS sod\n            ON soh.SalesOrderID\
  \ = sod.SalesOrderID\nWHERE   soh.OrderDate >= '2008-04-01'\n        AND soh.OrderDate\
  \ < '2008-05-01';\n```\n\n这允许优化器正确引用在 `DATETIME` 列上创建的索引 `IndexTest`，如图 19-11 所示。\n\
  \n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig11_HTML.jpg](img/323849_5_En_19_Fig11_HTML.jpg)\n\
  \n图 19-11\n\n显示在 WHERE 子句列上不使用 CONVERT 函数带来的好处的执行计划\n\n性能指标如下：\n\n```text\nReads:\
  \ 2\nDuration: 104mcs\n```\n\n因此，为了让优化器能够考虑 `WHERE` 子句中引用的列上的索引，务必避免在该索引列上使用函数。这提高了索引的有效性，从而可以提升查询性能。不过，在此实例中值得注意的是，性能提升很小，因为仍然对\
  \ `SalesOrderDetail` 表执行了扫描。\n\n请确保删除之前创建的索引。\n\n```sql\nDROP INDEX Sales.SalesOrderHeader.IndexTest;\n\
  ```\n\n#### 自定义标量 UDF\n\n标量函数是代码复用的一种有吸引力的方式，特别是当你只需要单个值时。然而，虽然你可以将它们用于数据检索，但这并不是它们的强项。事实上，根据所讨论的\
  \ UDF 以及为满足其结果集所需的数据操作量，你可能会看到一些显著的性能问题。为了实际观察这一点，让我们从一个检索产品成本的标量函数开始。\n\n```sql\n\
  CREATE OR ALTER FUNCTION dbo.ProductCost (@ProductID INT)\nRETURNS MONEY\nAS\nBEGIN\n\
  \    DECLARE @Cost MONEY\n    SELECT TOP 1\n        @Cost = pch.StandardCost\n \
  \   FROM Production.ProductCostHistory AS pch\n    WHERE pch.ProductID = @ProductID\n\
  \    ORDER BY pch.StartDate DESC;\n    IF @Cost IS NULL\n        SET @Cost = 0\n\
  \    RETURN @Cost\nEND\n```\n\n调用该函数只需在查询中使用它即可。\n\n```sql\nSELECT p.Name,\n   \
  \    dbo.ProductCost(p.ProductID)\nFROM   Production.Product AS p\nWHERE  p.ProductNumber\
  \ LIKE 'HL%';\n```\n\n该查询的平均性能约为 413 微秒和 16 次逻辑读取。对于这样一个结果集很小的简单查询，这可能还可以。图 19-12\
  \ 显示了它的执行计划。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig12_HTML.jpg](img/323849_5_En_19_Fig12_HTML.jpg)\n\
  \n图 19-12\n\n包含标量 UDF 的执行计划\n\n通过使用索引 `AK_Product_ProductNumber` 的 `Seek` 操作来检索数据。由于该索引不是覆盖索引，因此使用\
  \ `Key Lookup` 操作来检索必要的额外数据 `p.Name`。然后，`Compute Scalar` 操作符就是那个标量 UDF。我们可以通过查看“定义值”对话框中\
  \ `Compute Scalar` 操作符的属性来验证这一点，如图 19-13 所示。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig13_HTML.jpg](img/323849_5_En_19_Fig13_HTML.jpg)\n\
  \n图 19-13\n\n显示标量 UDF 工作的 Compute Scalar 操作符属性\n\n问题在于，你无法看到函数内部的数据访问。该信息是隐藏的。你可以使用估计的执行计划来捕获它，或者查询查询存储以查看像这个\
  \ UDF 这样通常无法立即看到的对象的执行计划：\n\n```sql\nSELECT CAST(qsp.query_plan AS XML)\nFROM  \
  \ sys.query_store_query AS qsq\n       JOIN sys.query_store_plan AS qsp\n      \
  \     ON qsp.query_id = qsq.query_id\nWHERE  qsq.object_id = OBJECT_ID('dbo.ProductCost');\n\
  ```\n\n得到的执行计划如图 19-14 所示。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig14_HTML.jpg](img/323849_5_En_19_Fig14_HTML.jpg)\n\
  \n图 19-14\n\n标量函数的执行计划\n\n虽然你看不到正在执行的工作，但正如执行计划所示，它实际上做了更多的工作。如果我们重写这个查询，消除函数的使用，性能也会发生变化：\n\
  \n```sql\nSELECT p.Name,\n       pc.StandardCost\nFROM   Production.Product AS p\n\
  \       CROSS APPLY\n       (   SELECT TOP 1\n                  pch.StandardCost\n\
  \           FROM   Production.ProductCostHistory AS pch\n           WHERE  pch.ProductID\
  \ = p.ProductID\n           ORDER BY pch.StartDate DESC) AS pc\nWHERE  p.ProductNumber\
  \ LIKE 'HL%';\n```\n\n进行此更改后，性能略有提升，从 413 微秒提升到约 295 微秒，逻辑读取次数从 16 次减少到 14 次。虽然执行计划更加复杂，如图\
  \ 19-15 所示，但整体性能得到了改善。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig15_HTML.jpg](img/323849_5_En_19_Fig15_HTML.jpg)\n\
  \n图 19-15\n\n包含标量函数的执行计划与不包含标量函数的执行计划\n\n虽然优化器建议包含标量函数的计划的估计成本低于不包含的计划，但实际性能指标几乎相反。这是因为标量函数的成本被固定为每行的固定成本，并未考虑支持它的过程的复杂性，在本例中即访问一个表。这最终导致包含计算标量的查询不仅更慢，而且资源消耗更大。\n\
  \n\n"
- "# 最小化优化器提示\n\nSQL Server 的基于成本的优化器会根据当前的表/索引结构和统计信息，动态确定查询的处理策略。可以使用优化器提示来覆盖这种动态行为，通过指示优化器使用某种特定的处理策略，从而将部分决策权从优化器手中夺走。这使得优化器的行为变为静态，不允许其随着表/索引结构或统计信息的变化而动态更新处理策略。\n\
  \n由于通常很难比优化器更聪明，因此通常的建议是避免使用优化器提示。某些提示可能极其有益（例如 `OPTIMIZE FOR`），但其他一些提示只在非常特定的情况下才有效。一般来说，让优化器根据数据分布统计信息、索引和其他因素来确定一个经济高效的处理策略是有益的。强迫优化器（使用提示）采用特定的处理策略，往往弊大于利，如下列提示的示例所示：\n\
  \n- `JOIN` 提示\n- `INDEX` 提示\n\n## JOIN 提示\n\n如第 6 章所述，优化器会根据表/索引结构和数据，动态地在两个数据集之间确定一个经济高效的\
  \ `JOIN` 策略。表 19-2 总结了 SQL Server 2017 支持的 `JOIN` 类型，以供快速参考。\n\n表 19-2: SQL Server\
  \ 2017 支持的 JOIN 类型\n\n| JOIN 类型 | 连接列上的索引 | 连接表的通常大小 | 预排序的 JOIN 子句 |\n| --- | ---\
  \ | --- | --- |\n| 嵌套循环 | 内表必须有索引<br>外表最好有索引 | 小 | 可选 |\n| 合并 | 两表都必须有索引<br>最佳条件：两表都有聚集索引或覆盖索引\
  \ | 大 | 是 |\n| 哈希 | 内表*没有*索引<br>最佳条件：内表大，外表小 | 任意 | 否 |\n| 自适应 | 根据查询返回的数据，使用哈希或循环\
  \ | 可变，但通常非常大，因为它目前仅适用于列存储索引 | 取决于连接类型 |\n\nSQL Server 2017 引入了新的连接类型：自适应连接。它实际上只是对嵌套循环或哈希连接的动态确定，但这种自适应处理方法有效地形成了一种新的连接类型，这就是我在此列出它的原因。\n\
  \n> **注意：** 外表通常是两个连接表中较小的一个。\n\n你可以通过使用表 19-3 中的 `JOIN` 提示来指示 SQL Server 使用特定的\
  \ `JOIN` 类型。\n\n表 19-3: JOIN 提示\n\n| JOIN 类型 | JOIN 提示 |\n| --- | --- |\n| 嵌套循环\
  \ | `LOOP` |\n| 合并 | `MERGE` |\n| 哈希 | `HASH` |\n| | `REMOTE` |\n\n自适应连接没有对应的提示。有一个\
  \ `REMOTE` 连接的提示。当连接中的某个表位于当前数据库的远程服务器上时，可以使用此提示。它允许你根据输入大小，指定连接中的哪一方应执行工作。\n\n\
  要了解使用 `JOIN` 提示如何影响性能，请考虑以下 `SELECT` 语句：\n\n```sql\nSELECT s.Name AS StoreName,\n\
  p.LastName + ', ' + p.FirstName\nFROM Sales.Store AS s\nJOIN Sales.SalesPerson AS\
  \ sp\nON s.SalesPersonID = sp.BusinessEntityID\nJOIN HumanResources.Employee AS\
  \ e\nON sp.BusinessEntityID = e.BusinessEntityID\nJOIN Person.Person AS p\nON e.BusinessEntityID\
  \ = p.BusinessEntityID;\n```\n\n图 19-16 显示了执行计划。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig16_HTML.jpg](img/323849_5_En_19_Fig16_HTML.jpg)\n\
  \n*图 19-16: 显示优化器所做选择的执行计划*\n\n如你所见，SQL Server 动态决定使用 `LOOP JOIN` 来添加来自 `Person.Person`\
  \ 表的数据，并使用 `HASH JOIN` 来连接 `Sales.Salesperson` 和 `Sales.Store` 表。正如第 6 章所演示的，对于影响小结果集的简单查询，`LOOP\
  \ JOIN` 通常比 `HASH JOIN` 或 `MERGE JOIN` 提供更好的性能。由于来自 `Sales.Salesperson` 表的行数相对较少，你可能会觉得可以强制使用\
  \ `LOOP` 连接，如下所示：\n\n```sql\nSELECT s.Name AS StoreName,\np.LastName + ',   ' +\
  \ p.FirstName\nFROM Sales.Store AS s\nJOIN Sales.SalesPerson AS sp\nON s.SalesPersonID\
  \ = sp.BusinessEntityID\nJOIN HumanResources.Employee AS e\nON sp.BusinessEntityID\
  \ = e.BusinessEntityID\nJOIN Person.Person AS p\nON e.BusinessEntityID = p.BusinessEntityID\n\
  OPTION (LOOP JOIN);\n```\n\n运行此查询时，执行计划会发生变化，如图 19-17 所示。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig17_HTML.jpg](img/323849_5_En_19_Fig17_HTML.jpg)\n\
  \n*图 19-17: 使用 JOIN 查询提示所做的更改*\n\n以下是每个查询相应的性能输出：\n\n- 无 `JOIN` 提示：\n\n```\n读取次数:\
  \ 2364\n持续时间: 84ms\n```\n\n- 使用 `JOIN` 提示：\n\n```\n读取次数: 3740\n持续时间: 97ms\n```\n\
  \n你可以看到，带有 `JOIN` 提示的查询比没有提示的查询运行时间更长。它还增加了读取次数。你可以让情况变得更糟。除了告诉查询中使用的所有提示都为 `LOOP`\
  \ 连接外，还可以仅针对你感兴趣的那一个连接，如下所示：\n\n```sql\nSELECT s.Name AS StoreName,\np.LastName\
  \ + ',   ' + p.FirstName\nFROM Sales.Store AS s\nINNER LOOP JOIN Sales.SalesPerson\
  \ AS sp\nON s.SalesPersonID = sp.BusinessEntityID\nJOIN HumanResources.Employee\
  \ AS e\nON sp.BusinessEntityID = e.BusinessEntityID\nJOIN Person.Person AS p\nON\
  \ e.BusinessEntityID = p.BusinessEntityID;\n```\n\n运行此查询会产生如图 19-18 所示的执行计划。\n\n\
  ![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig18_HTML.jpg](img/323849_5_En_19_Fig18_HTML.jpg)\n\
  \n*图 19-18: 使用 LOOP 连接提示带来的更多变化*\n\n如你所见，查询计划中现在引用了四个表。在之前的执行过程中实际上都引用了四个表，但优化器能够通过优化的简化过程（在第\
  \ 8 章中提到）从查询中消除一个表。现在，提示强迫优化器做出了与原本可能不同的选择，并从过程中移除了简化。读取次数下降了，尽管执行时间比上一个查询略有改善。\n\
  \n```\n读取次数: 3749\n持续时间: 86ms\n```\n\n`JOIN` 提示强制优化器忽略其自身的优化策略，转而使用查询指定的策略。`JOIN`\
  \ 提示可能损害查询性能，原因如下：\n\n- 提示阻止了自动参数化。\n- 优化器无法动态决定表的连接顺序。\n\n因此，不使用 `JOIN` 提示，而是让优化器动态确定经济高效的处理策略是明智的。当然也有例外，但这些例外必须通过彻底的测试来验证。\n\
  \n\n### 索引提示\n\n如前所述，在`WHERE`子句的列上使用算术运算符会阻止优化器选择该列上的索引。为了提升性能，您可以重写查询，避免在`WHERE`子句中使用算术运算符，如对应示例所示。或者，您甚至可能想到使用`INDEX`提示（一种优化器提示）来强制优化器使用该列上的索引。然而，大多数情况下，最好避免使用`INDEX`提示，让优化器动态地运行。\n\
  \n要理解`INDEX`提示对查询性能的影响，请考虑“避免在 WHERE 子句列上使用算术运算符”一节中的示例。`PurchaseOrderID`列上的乘法运算符阻止了优化器选择该列上的索引。您可以使用`INDEX`提示来强制优化器使用`OrderID`列上的索引，如下所示：\n\
  \n```sql\nSELECT *\nFROM Purchasing.PurchaseOrderHeader AS poh WITH (INDEX(PK_PurchaseOrderHeader_PurchaseOrderID))\n\
  WHERE poh.PurchaseOrderID * 2 = 3400;\n```\n\n请注意使用`INDEX`提示与不使用`INDEX`提示时的相对成本比较，如图\
  \ 19-18 所示。同时，请注意以下性能指标中显示的逻辑读次数差异：\n\n*   无提示（在`WHERE`子句列上使用算术运算符）：\n\n    ```text\n\
  \    Reads: 11\n    Duration: 210mcs\n    ```\n\n*   无提示（不在`WHERE`子句列上使用算术运算符）：\n\
  \n    ```text\n    Reads: 2\n    Duration: 105mcs\n    ```\n\n*   `INDEX`提示：\n\n\
  \    ```text\n    Reads: 44\n    Duration: 380mcs\n    ```\n\n从执行计划的相对成本和逻辑读次数可以明显看出，使用`INDEX`提示的查询实际上损害了查询性能。尽管它允许优化器使用`PurchaseOrderID`列上的索引，但它没有允许优化器确定合适的索引访问机制。因此，优化器使用了索引扫描来访问仅仅一行。相比之下，避免在`WHERE`子句列上使用算术运算符且不使用`INDEX`提示，不仅允许优化器使用`PurchaseOrderID`列上的索引，还允许其确定合适的索引访问机制：`INDEX\
  \ SEEK`。\n\n因此，一般来说，应让优化器为查询选择最佳的索引策略，而不要使用`INDEX`提示来覆盖优化器的行为。此外，不使用`INDEX`提示允许优化器根据数据随时间的变化动态地决定最佳索引策略。图\
  \ 19-19 显示了指定索引提示与不指定索引提示之间的区别。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig19_HTML.jpg](img/323849_5_En_19_Fig19_HTML.jpg)\n\
  *图 19-19：使用和不使用不同 INDEX 提示的查询成本*\n\n## 使用域完整性和引用完整性\n\n域完整性和引用完整性有助于定义和强制列的有效值，维护数据库的完整性。这是通过列/表约束来实现的。\n\
  \n由于数据访问通常是查询执行中最耗时的操作之一，避免冗余数据访问有助于优化器减少查询执行时间。域完整性和引用完整性帮助 SQL Server 优化器在不实际访问数据的情况下分析有效的数据值，从而减少查询时间。\n\
  \n为了理解这是如何发生的，请考虑以下示例：\n*   `NOT NULL`约束\n*   声明性引用完整性\n\n### NOT NULL 约束\n\n`NOT\
  \ NULL`列约束用于实现域完整性，它定义了某个特定列不能输入`NULL`值。SQL Server 在运行时自动强制执行此规则，以维护该列的域完整性。此外，定义`NOT\
  \ NULL`列约束有助于优化器在查询中对该列使用`ISNULL`函数时生成高效的处理策略。\n\n要理解`NOT NULL`列约束的性能优势，请考虑以下示例。这两个查询旨在返回所有不等于`'B'`的值。这两个查询针对大小相似的列运行，每个查询都需要进行表扫描来返回数据：\n\
  \n```sql\nSELECT p.FirstName\nFROM Person.Person AS p\nWHERE p.FirstName = 'C';\n\
  SELECT p.MiddleName\nFROM Person.Person AS p\nWHERE p.MiddleName = 'C';\n```\n\n\
  这两个查询使用了相似的执行计划，如图 19-20 所示。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig20_HTML.jpg](img/323849_5_En_19_Fig20_HTML.jpg)\n\
  *图 19-20：因缺少索引而导致的表扫描*\n\n差异主要是由估计要返回的行数引起的。虽然两个查询都针对同一个索引并对其进行扫描，但每个查询仍然有不同的谓词和估计行数，如图\
  \ 19-21 所示。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig21_HTML.jpg](img/323849_5_En_19_Fig21_HTML.jpg)\n\
  *图 19-21：因 WHERE 子句不同而导致的不同估计行数*\n\n由于`Person.MiddleName`列可以包含`NULL`，返回的数据是不完整的。这是因为，根据定义，虽然`NULL`值满足不以任何方式等于`'B'`的必要条件，但您不能以这种方式返回`NULL`值。需要添加一个`OR`子句。这意味着需要像这样修改第二个查询：\n\
  \n```sql\nSELECT p.FirstName\nFROM Person.Person AS p\nWHERE p.FirstName = 'C';\n\
  SELECT p.MiddleName\nFROM Person.Person AS p\nWHERE p.MiddleName = 'C'\nOR p.MiddleName\
  \ IS NULL;\n```\n\n另外，如图 19-19 执行计划中缺失索引语句所示，这两个查询都可以从在其表上创建索引中受益。创建如下测试索引应能满足要求：\n\
  \n```sql\nCREATE INDEX TestIndex1 ON Person.Person (MiddleName);\nCREATE INDEX TestIndex2\
  \ ON Person.Person (FirstName);\n```\n\n当重新执行查询时，图 19-22 显示了两个`SELECT`语句的结果执行计划。\n\
  \n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig22_HTML.jpg](img/323849_5_En_19_Fig22_HTML.jpg)\n\
  *图 19-22：使用 IS NULL 选项的效果*\n\n如图 19-22 所示，优化器能够利用`Person.FirstName`列上的索引`TestIndex2`来获得`Index\
  \ Seek`操作。不幸的是，处理`NULL`列的需求则大不相同。索引`TestIndex1`的使用方式不同。取而代之的是，为查询中定义的三个条件中的每一个创建了三个常量。然后通过`Concatenation`操作将它们连接在一起，进行排序和合并，然后通过`Nested\
  \ Loop`操作符三次寻求索引以得到结果集。尽管从执行计划中的估计成本来看，这似乎是成本较低的查询（42% 对 58%），但性能指标却讲述了不同的故事。\n\n\
  ```text\nReads: 43\nDuration: 143ms\n```\n对比\n```text\nReads: 68\nDuration: 168ms\n\
  ```\n\n务必删除已创建的测试索引。\n\n```sql\nDROP INDEX TestIndex1 ON Person.Person;\nDROP INDEX\
  \ TestIndex2 ON Person.Person;\n```\n\n\n### NULL 值与数据库设计\n\n尽可能避免在数据库中使用 `NULL`\
  \ 值。然而，当数据未知且无法使用默认值时，`NULL` 又会回到设计中。我认为 `NULL` 是不可避免的，但应尽可能将其最小化。\n\n当不得不处理 `NULL`\
  \ 值时，请记住可以使用过滤索引来从索引中移除 `NULL` 值，从而提升该索引的性能。这在第 7 章中有详细说明。稀疏列提供了另一个帮助处理 `NULL` 值的选项。稀疏列主要旨在更高效地存储\
  \ `NULL` 值以减少空间占用——但会牺牲性能。此选项专门针对商务智能数据库，而非 OLTP 数据库，因为在事实表中存在大量 `NULL` 值是常见的设计。\n\
  \n### 声明式引用完整性\n\n声明式引用完整性用于定义父表和子表之间的引用完整性。它确保子表中的记录仅在父表中存在对应记录时才存在。此规则的唯一例外是，子表可以包含一个\
  \ `NULL` 值作为链接子表行与父表行的标识符。对于子表中该标识符的所有其他值，父表中必须存在对应的值。在 SQL Server 中，DRI 是通过父表上的\
  \ `PRIMARY KEY` 约束和子表上的 `FOREIGN KEY` 约束来实现的。\n\n在两个表之间建立了 DRI，并且子表的外键列被设置为 `NOT\
  \ NULL` 后，SQL Server 优化器就能确信子表中的每条记录在父表中都有对应记录。有时这有助于优化器提升性能，因为不需要访问父表来验证子记录对应的父记录是否存在。\n\
  \n为了理解实现声明式引用完整性带来的性能优势，让我们看一个例子。首先，使用以下脚本消除两个表 `Person.Address` 和 `Person.StateProvince`\
  \ 之间的引用完整性：\n\n```sql\nIF EXISTS (   SELECT *\nFROM sys.foreign_keys\nWHERE object_id\
  \ = OBJECT_ID(N'[Person].[FK_Address_StateProvince_StateProvinceID]')\nAND parent_object_id\
  \ = OBJECT_ID(N'[Person].[Address]'))\nALTER TABLE Person.Address\nDROP CONSTRAINT\
  \ FK_Address_StateProvince_StateProvinceID;\n```\n\n考虑以下 `SELECT` 语句：\n\n```sql\n\
  SELECT a.AddressID,\nsp.StateProvinceID\nFROM Person.Address AS a\nJOIN Person.StateProvince\
  \ AS sp\nON a.StateProvinceID = sp.StateProvinceID\nWHERE a.AddressID = 27234;\n\
  ```\n\n请注意，此 `SELECT` 语句从父表（`Person.StateProvince`）中获取 `StateProvinceID` 列的值。如果数据的性质要求子表（`Person.StateProvince`）中的每个产品（由\
  \ `StateProvinceID` 标识）在父表（`Person.Address`）中都包含对应的产品，那么你可以将前面的 `SELECT` 语句重写如下，改为引用\
  \ `Address` 表来获取 `StateProvinceID` 列：\n\n```sql\nSELECT a.AddressID,\na.StateProvinceID\n\
  FROM Person.Address AS a\nJOIN Person.StateProvince AS sp\nON a.StateProvinceID\
  \ = sp.StateProvinceID\nWHERE a.AddressID = 27234;\n```\n\n两个 `SELECT` 语句应该返回相同的结果集。在移除外键约束后，优化器为两个\
  \ `SELECT` 语句生成了相同的执行计划，如图 19-23 所示。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig23_HTML.jpg](img/323849_5_En_19_Fig23_HTML.jpg)\n\
  \n图 19-23\n两个表之间未定义 DRI 时的执行计划\n\n为了理解声明式引用完整性如何影响查询性能，请替换之前删除的 `FOREIGN KEY` 约束。\n\
  \n```sql\nALTER TABLE Person.Address WITH CHECK\nADD CONSTRAINT FK_Address_StateProvince_StateProvinceID\n\
  FOREIGN KEY\n(\nStateProvinceID\n)\nREFERENCES Person.StateProvince\n(\nStateProvinceID\n\
  );\n```\n\n### 注意\n\n现在两个表之间已存在引用完整性。\n\n图 19-24 显示了两个 `SELECT` 语句的结果执行计划。\n\n![../images/323849_5_En_19_Chapter/323849_5_En_19_Fig24_HTML.jpg](img/323849_5_En_19_Fig24_HTML.jpg)\n\
  \n图 19-24\n显示在两个表之间定义 DRI 带来好处的执行计划\n\n如你所见，第二个 `SELECT` 语句的执行计划得到了高度优化：没有访问 `Person.StateProvince`\
  \ 表。在声明式引用完整性就位（且 `Address.StateProvinceID` 被设置为 `NOT NULL`）的情况下，优化器可以确信子表中的每条记录在父表中都包含对应记录。因此，第二个\
  \ `SELECT` 语句中父表和子表之间的 `JOIN` 子句是多余的，因为没有从父表请求其他数据。\n\n你可能已经知道域完整性和引用完整性是好事，但你可以看到它们不仅确保数据完整性，还能提升性能。如上所示，域完整性和引用完整性为优化器生成具有成本效益的执行计划并提升性能提供了更多选择。\n\
  \n为了获得 DRI 的性能优势，如前所述，子表中的外键列应设置为 `NOT NULL`。否则，子表中可能存在一些行（其外键列值为 `NULL`），这些行在父表中没有对应表示。这不会阻止优化器在之前的查询中访问主表（`Prod`）。默认情况下——即如果未为列指定\
  \ `NOT NULL` 属性——该列可以包含 `NULL` 值。考虑到 `NOT NULL` 属性的好处以及本节解释的其他益处，如果 `NULL` 对于某列不是有效值，请始终将其属性标记为\
  \ `NOT NULL`。\n\n你还必须确保在构建外键约束时使用了 `WITH CHECK` 选项。如果使用了 `NOCHECK` 选项，这些约束会被优化器视为不可信约束，你将无法实现它们可能带来的性能优势。\n\
  \n## 总结\n\n正如本章所讨论的，为了提升数据库应用程序的性能，确保 SQL 查询设计得当以受益于索引、存储过程、数据库约束等性能增强技术至关重要。确保查询不会妨碍索引的使用。在许多情况下，无论查询结构如何，优化器都有能力生成具有成本效益的执行计划，但从一开始就正确设计查询仍然是一个好习惯。即使你为单个查询设计了高性能，数据库应用程序的整体性能也可能不尽如人意。不仅提升单个查询的性能很重要，确保它们不耗尽系统上的可用资源也同样重要。下一章将介绍如何减少查询中的资源使用。\n\
  \n\n"
- "# 20. 减少查询资源使用\n\n在上一章中，你专注于以充分利用索引和统计信息的方式编写查询。在本章中，你将确保以不会不当消耗资源的方式编写查询。编写查询有避免使用内存、CPU\
  \ 和 I/O 的方法，也有使用这些资源超出实际所需的方法。我将介绍一系列机制，以确保由你控制的查询能最优地使用资源。\n\n本章涵盖以下主题：\n\n*  \
  \ 资源消耗较少的查询设计\n*   有效利用过程缓存的查询设计\n*   减少网络开销的查询设计\n*   降低查询事务成本的技术\n\n## 避免资源密集型查询\n\
  \n许多数据库功能可以通过多种查询技术来实现。你应该采用的方法是使用对资源友好且基于集合的查询技术。以下是几种可用于减少查询资源占用的技术：\n\n*   避免数据类型转换。\n\
  *   使用 `EXISTS` 而非 `COUNT(*)` 来验证数据是否存在。\n*   使用 `UNION ALL` 而非 `UNION`。\n*   为聚合和排序操作使用索引。\n\
  *   在批处理查询中谨慎使用局部变量。\n*   命名存储过程时要注意。\n\n我将在接下来的章节中更详细地介绍这些要点。\n\n### 避免数据类型转换\n\
  \nSQL Server 在某些情况下（由联机丛书中提供的大型数据转换表定义）允许将不同但兼容数据类型的值/常量与列的数据进行比较。SQL Server 会自动将数据从一种数据类型转换为另一种数据类型。这个过程称为*隐式数据类型转换*。尽管有用，但隐式转换会给查询优化器增加开销。为了提高性能，请使用与被比较列的数据类型相同的值/常量。\n\
  \n为了理解隐式数据类型转换如何影响性能，请考虑以下示例：\n\n```sql\nIF EXISTS (   SELECT *\n              FROM\
  \ sys.objects\n              WHERE object_id = OBJECT_ID(N'dbo.Test1'))\n    DROP\
  \ TABLE dbo.Test1;\nCREATE TABLE dbo.Test1 (Id INT IDENTITY(1, 1),\n           \
  \             MyKey VARCHAR(50),\n                        MyValue VARCHAR(50));\n\
  CREATE UNIQUE CLUSTERED INDEX Test1PrimaryKey ON dbo.Test1 (Id ASC);\nCREATE UNIQUE\
  \ NONCLUSTERED INDEX TestIndex ON dbo.Test1 (MyKey);\nGO\nSELECT TOP 10000\n   \
  \    IDENTITY(INT, 1, 1) AS n\nINTO   #Tally\nFROM   master.dbo.syscolumns AS scl,\n\
  \       master.dbo.syscolumns AS sc2;\nINSERT INTO dbo.Test1 (MyKey,\n         \
  \              MyValue)\nSELECT TOP 10000\n       'UniqueKey' + CAST(n AS VARCHAR),\n\
  \       'Description'\nFROM   #Tally;\nDROP TABLE #Tally;\nSELECT t.MyValue\nFROM\
  \   dbo.Test1 AS t\nWHERE  t.MyKey = 'UniqueKey333';\nSELECT t.MyValue\nFROM   dbo.Test1\
  \ AS t\nWHERE  t.MyKey = N'UniqueKey333';\n```\n\n在创建表 `Test1`、为其创建两个索引并插入一些数据后，定义了两个查询。两个查询返回相同的结果集。如你所见，除了与\
  \ `MyKey` 列相等的变量的数据类型不同外，这两个查询是相同的。由于该列是 `VARCHAR`，第一个查询不需要隐式数据类型转换。第二个查询使用了与 `MyKey`\
  \ 列不同的数据类型，需要进行隐式数据类型转换，从而增加了查询性能的开销。图 20-1 显示了这两个查询的执行计划。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig1_HTML.jpg](img/323849_5_En_20_Fig1_HTML.jpg)\n\
  \n图 20-1\n有和没有隐式数据类型转换的查询计划\n\n隐式数据类型转换的复杂性取决于比较中涉及的数据类型的优先级。SQL Server 的数据类型优先级规则指定了哪种数据类型会转换为另一种。通常，优先级较低的数据类型会转换为优先级较高的数据类型。例如，`TINYINT`\
  \ 数据类型的优先级低于 `INT` 数据类型。有关 SQL Server 中数据类型优先级的完整列表，请参阅 MSDN 文章“数据类型优先级”( `http://bit.ly/1cN7AYc`\
  \ )。关于哪种数据类型可以隐式转换为哪种数据类型的更多信息，请参阅 MSDN 文章“数据类型转换”( `http://bit.ly/1j7kIJf` )。\n\
  \n注意 `SELECT` 运算符上的警告图标。它让你知道这个查询中有可疑之处。在本例中，是存在数据类型转换操作。优化器让你知道这可能会负面影响其查找和使用索引来辅助查询性能的能力。这也可能是一个误报。如果在任何谓词中都不使用的列上存在转换，那么发生隐式甚至显式转换真的无关紧要。\n\
  \n要查看具体的过程，请查看 `Clustered Index Scan` 运算符的属性和 `Predicate` 值。我的列出如下：\n\n```sql\n\
  CONVERT_IMPLICIT(nvarchar(50),[AdventureWorks2017].[dbo].[Test1].[MyKey] as [t].[MyKey],0)=[@1]\n\
  ```\n\n平均持续时间从约 110 微秒增加到 1,400 微秒，逻辑读取从 4 次增加到 56 次。\n\n当 SQL Server 比较具有某种数据类型的列值和具有不同数据类型的变量（或常量）时，变量（或常量）的数据类型总是被转换为列的数据类型。这样做是因为列值的访问是基于变量（或常量）的隐式转换值进行的。因此，在这种情况下，隐式转换总是应用于变量（或常量）。\n\
  \n如你所见，隐式数据类型转换既因糟糕的执行计划，也因增加的 CPU 转换成本，给查询性能增加了开销。因此，为了提高性能，请始终对两个表达式使用相同的数据类型。\n\
  \n### 使用 EXISTS 而非 COUNT(*) 来验证数据是否存在\n\n一个常见的数据库需求是验证一组数据是否存在。通常你会看到使用一批 SQL 查询来实现这一点，如下所示：\n\
  \n```sql\nDECLARE @n INT;\nSELECT @n = COUNT(*)\nFROM   Sales.SalesOrderDetail AS\
  \ sod\nWHERE  sod.OrderQty = 1;\nIF @n > 0\n    PRINT 'Record Exists';\n```\n\n\
  使用 `COUNT(*)` 来验证数据存在是高度资源密集型的，因为 `COUNT(*)` 必须扫描表中的所有行。`EXISTS` 只需扫描并在匹配 `EXISTS`\
  \ 条件的第一条记录处停止。为了提高性能，请使用 `EXISTS` 代替 `COUNT(*)` 方法。\n\n```sql\nIF EXISTS (   SELECT\
  \ sod.*\n              FROM   Sales.SalesOrderDetail AS sod\n              WHERE\
  \  sod.OrderQty = 1)\n    PRINT 'Record Exists';\n```\n\n`EXISTS` 技术相对于 `COUNT(*)`\
  \ 技术的性能优势可以通过查询性能指标以及图 20-2 中的执行计划来比较，从运行这些查询的输出中可以看出。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig2_HTML.jpg](img/323849_5_En_20_Fig2_HTML.jpg)\n\
  \n图 20-2\nCOUNT 与 EXISTS 的区别\n\n```text\nCOUNT 持续时间: 8.9ms\n读取: 1248\nEXISTS 持续时间:\
  \ 1.7ms\n读取: 17\n```\n\n如你所见，`EXISTS` 技术仅使用了 17 次逻辑读取，而 `COUNT(*)` 技术使用了 1,246 次，执行时间从\
  \ 8.9 毫秒减少到 1.7 毫秒。因此，要确定数据是否存在，请使用 `EXISTS` 技术。\n\n\n### 使用 UNION ALL 代替 UNION\n\
  \n你可以使用 `UNION` 子句来连接多个 `SELECT` 语句的结果集，如下所示，如图 20-3：\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig3_HTML.jpg](img/323849_5_En_20_Fig3_HTML.jpg)\n\
  \n图 20-3\n\n使用 `UNION` 子句的查询的执行计划\n\n```\nSELECT sod.ProductID,\nsod.SalesOrderID\n\
  FROM Sales.SalesOrderDetail AS sod\nWHERE sod.ProductID = 934\nUNION\nSELECT sod.ProductID,\n\
  sod.SalesOrderID\nFROM Sales.SalesOrderDetail AS sod\nWHERE sod.ProductID = 932\n\
  UNION\nSELECT sod.ProductID,\nsod.SalesOrderID\nFROM Sales.SalesOrderDetail AS sod\n\
  WHERE sod.ProductID = 708;\n```\n\n`UNION` 子句处理来自三个 `SELECT` 语句的结果集，会从最终结果集中移除重复项，相当于对每个查询有效地执行了\
  \ `DISTINCT`，并使用 `Stream Aggregate` 进行聚合。如果参与 `UNION` 子句的 `SELECT` 语句的结果集彼此互斥，或者你允许最终结果集中包含重复行，那么请使用\
  \ `UNION ALL` 而不是 `UNION`。这样可以避免检测和移除重复项的开销，从而提高性能，如图 20-4 所示。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig4_HTML.jpg](img/323849_5_En_20_Fig4_HTML.jpg)\n\
  \n图 20-4\n\n使用 `UNION ALL` 的查询的执行计划\n\n如你所见，在第一种情况下（使用 `UNION`），优化器对记录进行聚合以消除重复项，同时使用\
  \ `MERGE` 来组合三个 `SELECT` 语句的结果集。由于结果集彼此互斥，你可以使用 `UNION ALL` 代替 `UNION` 子句。使用 `UNION\
  \ ALL` 子句避免了检测重复项和连接数据的开销，从而提高了性能。\n\n查询性能指标也说明了类似的情况，`UNION` 查询耗时 125ms，而 `UNION\
  \ ALL` 查询耗时 95ms。有趣的是，逻辑读次数相同，都是 20。在这种情况下，使得性能产生差异的原因是，一个查询需要额外的处理，而另一个查询则不需要。\n\
  \n### 为聚合和排序条件使用索引\n\n通常，像 `MIN` 和 `MAX` 这样的聚合函数会受益于对应列上的索引。正如前面章节所展示的，它们从列存储索引中获益更多。然而，即使是标准索引也能辅助某些聚合查询。如果这些列上没有任何类型的索引，优化器就必须扫描基表（或行存储聚集索引），检索所有行，并对包含所有行的分组执行流聚合以找出\
  \ `MIN`/`MAX` 值，如下例所示（参见图 20-5）：\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig5_HTML.jpg](img/323849_5_En_20_Fig5_HTML.jpg)\n\
  \n图 20-5\n\n扫描整个表并过滤到单行\n\n```\nSELECT  MIN(sod.UnitPrice)\nFROM    Sales.SalesOrderDetail\
  \ AS sod;\n```\n\n使用 `MIN` 聚合函数的 `SELECT` 语句的性能指标如下：\n\n```\nDuration: 15.8ms\n\
  Reads: 1248\n```\n\n该查询仅为了检索包含 `UnitPrice` 列最小值的行，就执行了超过 1,200 次逻辑读。你可以在图 20-5 的执行计划中看到这一点。一个巨大的数据行从\
  \ `Clustered Index Scan` 操作中出来，却仅被 `Stream Aggregate` 操作过滤到单行。如果你在 `UnitPrice` 列上创建索引，那么索引的叶子页将预先对\
  \ `UnitPrice` 值进行排序。\n\n```\nCREATE INDEX TestIndex ON Sales.SalesOrderDetail (UnitPrice\
  \ ASC);\n```\n\n在 `UnitPrice` 列上的索引显著提高了 `MIN` 聚合函数的性能。优化器可以通过寻址到索引中最顶部的行来检索最小的\
  \ `UnitPrice` 值。这减少了查询的逻辑读次数，如相应的指标和执行计划所示（参见图 20-6）。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig6_HTML.jpg](img/323849_5_En_20_Fig6_HTML.jpg)\n\
  \n图 20-6\n\n索引极大地提高了性能\n\n```\nDuration: 97 mcs\nReads: 3\n```\n\n类似地，在 `ORDER BY`\
  \ 子句引用的列上创建索引有助于优化器快速组织结果集，因为列值在索引中已经预先排序。`GROUP BY` 子句的内部实现也会首先对列值进行排序，因为排序后的列值允许相邻的匹配值快速分组。因此，与\
  \ `ORDER BY` 子句类似，`GROUP BY` 子句也受益于 `GROUP BY` 子句中引用的列值的预先排序。\n\n需要重申的是，对于大多数聚合查询，列存储索引很可能比常规的行存储索引带来更好的性能。然而，在某些情况下，列存储索引可能是资源浪费，因此了解可能存在的选项是好的，这取决于你的查询和结构。\n\
  \n\n### 在批处理查询中谨慎使用局部变量\n\n通常，多个查询会作为批处理一起提交，以避免多次网络往返。在查询批处理中使用局部变量在各个独立查询之间传递值是一种常见做法。然而，在批处理查询的\
  \ `WHERE` 子句中使用局部变量，并非在所有情况下都能让优化器生成高效的执行计划。\n\n要理解在批处理查询的 `WHERE` 子句中使用局部变量如何影响性能，请考虑以下批处理查询：\n\
  \n```sql\nDECLARE @Id INT = 67260;\nSELECT  p.Name,\n        p.ProductNumber,\n\
  \        th.ReferenceOrderID\nFROM    Production.Product AS p\nJOIN    Production.TransactionHistory\
  \ AS th\n        ON th.ProductID = p.ProductID\nWHERE   th.ReferenceOrderID = @Id;\n\
  ```\n\n图 20-7 展示了这个 `SELECT` 语句的执行计划。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig7_HTML.jpg](img/323849_5_En_20_Fig7_HTML.jpg)\n\
  **图 20-7**\n显示批处理查询中局部变量影响的执行计划\n\n如您所见，执行了 `Index Seek` 操作来访问 `Production.TransactionHistory`\
  \ 主键中的行。通过循环联接，需要对聚集索引进行 `Key Lookup`。最后，通过另一个循环联接，针对 `Product` 表的 `Clustered Index\
  \ Seek` 将结果添加到结果集中。如果 `SELECT` 语句在不使用局部变量的情况下执行，即将局部变量值替换为适当的常量值，如下列查询所示，优化器会做出不同的选择：\n\
  \n```sql\nSELECT  p.Name,\n        p.ProductNumber,\n        th.ReferenceOrderID\n\
  FROM    Production.Product AS p\nJOIN    Production.TransactionHistory AS th\n \
  \       ON th.ProductID = p.ProductID\nWHERE   th.ReferenceOrderID = 67260;\n```\n\
  \n图 20-8 展示了结果。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig8_HTML.jpg](img/323849_5_En_20_Fig8_HTML.jpg)\n\
  **图 20-8**\n未使用局部变量时的查询执行计划\n\n您会得到一个完全不同的执行计划。其中部分操作是相似的。您有相同的 `Index Seek` 和 `Key\
  \ Lookup` 运算符，但它们的数据是通过 `Clustered Index Scan` 和 `Merge Join` 进行联接的。在考虑性能时，快速比较计划会变得困难，因此让我们查看性能指标以了解是否存在差异。首先，这是使用局部变量的初始查询的信息：\n\
  \n```\nDuration: 696ms\nReads: 242\n```\n\n然后是第二个查询，没有使用局部变量：\n\n```\nDuration:\
  \ 817ms\nReads: 197\n```\n\n使用局部变量的计划执行速度稍快一些，696ms 对比 817ms，但读取次数却多了不少，242 对比 197。是什么导致了计划之间的差异以及性能上的不同？这都归结于一个事实：除了在语句级重新编译的情况下，操作符无法获知局部变量的具体值。因此，无法基于统计信息中值的具体数量来估计行数，而是根据密度图进行计算估计。\n\
  \n`TransactionHistory` 表中有 113,443 行。密度值为 2.694111E-05。将它们相乘，我们得到值 3.05628。现在，让我们看一下第一个执行计划（即图\
  \ 20-8 中的计划）的估计行数。\n\n估计行数，在图 20-9 底部，是 3.05628。这与计算结果完全相同。但请注意，图 20-9 顶部的实际行数是\
  \ 48。这变得很重要。如果我们查看第二个计划（图 20-8 中的计划）中同一运算符的相同属性，我们会看到估计行数和实际行数相同，都是 48。在这种情况下，优化器认为返回\
  \ 48 行数据太多，无法通过针对 `Product` 表的 `Index Seek` 实现良好性能。因此，它选择使用有序扫描（您可以通过 `Index Scan`\
  \ 运算符的属性验证）然后进行合并联接。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig9_HTML.jpg](img/323849_5_En_20_Fig9_HTML.jpg)\n\
  **图 20-9**\n估计行数与实际行数对比\n\n事实上，第一个计划更快；然而，它确实导致了更高的 I/O 输出。这就是我们需要谨慎的地方。在这种情况下，性能稍好一些，但如果系统处于负载之下，尤其是在\
  \ I/O 压力下，那么第二个计划可能会运行得更快，对资源的争用更少，因为它的总读取次数更少。谨慎之处在于识别在特定情况下哪个计划更好。\n\n为避免这种潜在的性能问题，请使用以下方法。不要在批处理中将局部变量用作此类查询的过滤条件。局部变量与参数值不同，如第\
  \ 17 章所示。为批处理创建一个存储过程，并按如下方式执行：\n\n```sql\nCREATE OR ALTER PROCEDURE ProductDetails\
  \ (@id INT)\nAS\nSELECT p.Name,\n       p.ProductNumber,\n       th.ReferenceOrderID\n\
  FROM Production.Product AS p\nJOIN Production.TransactionHistory AS th\n  ON th.ProductID\
  \ = p.ProductID\nWHERE th.ReferenceOrderID = @id;\nGO\nEXEC ProductDetails @id =\
  \ 1;\n```\n\n这种方法可能适得其反。使用传递给参数的值的过程称为 `parameter sniffing`。参数探测会自动发生在所有存储过程和参数化查询中。根据统计信息的准确性和传递给参数的值，使用特定值可能会得到一个糟糕的计划，而使用采样值（当您使用局部变量时会发生）可能会得到一个好的计划。测试是在任何特定情况下确定哪种方法效果更好的唯一途径。然而，在大多数情况下，拥有准确值比采样值更好。有关参数探测的更多详细信息，请参见第\
  \ 17 章。\n\n作为一般准则，最好避免硬编码值。如果值必须更改，您可能需要在大量代码中进行更改。如果您确实需要在查询中编写值，局部变量可以让您在批处理顶部的单个位置控制它们，从而使代码管理更容易。然而，正如我们刚才看到的，当用于数据检索时，局部变量会影响计划选择。在这种情况下，参数值是更可取的。您甚至可以设置参数值并为其提供默认值。这些值仍将作为常规参数被探测。\n\
  \n\n\n### 谨慎命名存储过程\n\n存储过程的名称确实很重要。你不应该用 `sp_` 前缀来命名你的过程。开发者经常在他们的存储过程前加上 `sp_`\
  \ 前缀，以便轻松识别这些存储过程。然而，SQL Server 会假定任何带有此前缀的存储过程很可能是一个系统存储过程，其位置在 `master` 数据库中。当提交一个带有\
  \ `sp_` 前缀的存储过程执行时，SQL Server 会按以下顺序在以下位置查找该存储过程：\n\n*   在 master 数据库中\n*   在当前数据库中，基于提供的任何限定符（数据库名或所有者）\n\
  *   如果未指定架构，则在当前数据库中使用 `dbo` 作为架构\n\n因此，尽管带有 `sp_` 前缀的用户创建的存储过程存在于当前数据库中，`master`\
  \ 数据库仍会被首先检查。即使存储过程已用数据库名限定，这种情况也会发生。\n\n要理解为存储过程名称添加 `sp_` 前缀的影响，请考虑以下存储过程：\n\n\
  ```\nIF EXISTS ( SELECT  *\nFROM    sys.objects\nWHERE   object_id = OBJECT_ID(N'[dbo].[sp_Dont]')\n\
  AND type IN (N'P', N'PC') )\nDROP PROCEDURE  [dbo].[sp_Dont]\nGO\nCREATE PROC [sp_Dont]\n\
  AS\nPRINT 'Done!'\nGO\n--Add plan of sp_Dont to procedure cache\nEXEC AdventureWorks2017.dbo.[sp_Dont]\
  \ ;\nGO\n--Use the above cached plan of sp_Dont\nEXEC AdventureWorks2012.dbo.[sp_Dont]\
  \ ;\nGO\n```\n\n存储过程的第一次执行会将其执行计划添加到过程缓存中。随后对该存储过程的执行会复用过程缓存中现有的计划，除非需要重新编译该计划（存储过程重新编译的原因在第\
  \ 10 章解释）。因此，如图 20-10 所示的存储过程 `sp_Dont` 的第二次执行应该会在过程缓存中找到一个计划。这由相应扩展事件输出中的 `SP:CacheHit`\
  \ 事件表示。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig10_HTML.jpg](img/323849_5_En_20_Fig10_HTML.jpg)\n\
  图 20-10：显示 `sp_` 前缀对存储过程名称影响的扩展事件输出\n\n请注意，在 SQL Server 尝试在过程缓存中定位存储过程的计划之前，会触发一个\
  \ `SP:CacheMiss` 事件。`SP:CacheMiss` 事件是由 SQL Server 在 master 数据库中查找存储过程引起的，即使该存储过程的执行已正确地用用户数据库名限定。\n\
  \n当你用一个现有系统存储过程的名称创建存储过程时，`sp_` 前缀的这个特性会变得更加有趣。\n\n```\nCREATE OR ALTER PROC sp_addmessage\
  \ @param1 NVARCHAR(25)\nAS\nPRINT  '@param1 =  '  + @param1 ;\nGO\nEXEC AdventureWorks2017.dbo.[sp_addmessage]\
  \   'AdventureWorks';\n```\n\n如图 20-11 所示，执行这个用户定义的存储过程会导致执行来自 `master` 数据库的系统存储过程\
  \ `sp_addmessage`。\n\n![../images/323849_5_En_20_Chapter/323849_5_En_20_Fig11_HTML.jpg](img/323849_5_En_20_Fig11_HTML.jpg)\n\
  图 20-11：显示 `sp_` 前缀对存储过程名称影响的存储过程执行结果\n\n不幸的是，无法执行这个用户定义的存储过程。现在你可以明白为什么不应该用 `sp_`\
  \ 前缀来命名用户定义的存储过程了。请使用其他命名约定。从纯粹的性能角度来看，这是一个微不足道的改进。但是，如果你处理量大且响应时间至关重要，那么避免使用 `sp_`\
  \ 命名标准是你多争取到的一个有利的小细节。\n\n## 减少网络往返次数\n\n数据库应用程序通常执行多个查询来实现一个数据库操作。除了优化单个查询的性能外，优化批处理的性能也很重要。为了减少多次网络往返的开销，请考虑以下技术：\n\
  \n*   一起执行多个查询。\n*   使用 `SET NOCOUNT`。\n\n让我们更深入地看看这些技术。\n\n### 一起执行多个查询\n\n最好将一组查询一起作为批处理或存储过程提交。除了减少数据库应用程序和服务器之间的网络往返次数外，存储过程还提供多种性能和管理优势，如第\
  \ 16 章所述。这意味着应用程序中的代码需要能够处理多个结果集。这也意味着你的 T-SQL 代码可能需要处理 XML 数据或其他大型数据集，而不是单行插入或更新。\n\
  \n### 使用 SET NOCOUNT\n\n在执行批处理或存储过程时，你还需要考虑另一个因素。在批处理或存储过程中的每个查询执行后，服务器都会报告受影响的行数。\n\
  \n```\n( row(s) affected)\n```\n\n此信息返回给数据库应用程序，并增加了网络开销。使用 T-SQL 语句 `SET NOCOUNT`\
  \ 来避免此开销。\n\n```\nSET NOCOUNT ON  SET NOCOUNT OFF\n```\n\n请注意，与某些 `SET` 语句不同，`SET\
  \ NOCOUNT` 语句不会导致存储过程出现任何重新编译问题，如第 18 章所述。\n\n## 降低事务成本\n\nSQL Server 中的每个操作查询都是作为*原子*操作执行的，以便数据库表的状态从一个*一致*状态转换到另一个状态。SQL\
  \ Server 自动执行此操作，且无法禁用。如果从一个一致状态到另一个一致状态的转换需要多个数据库查询，则应使用显式定义的数据库事务来维护跨多个查询的原子性。每个原子操作的新旧状态都保存在事务日志（磁盘上）中，以确保*持久性*，这保证了原子操作一旦成功完成其结果就不会丢失。原子操作在执行期间通过数据库锁与其他数据库操作*隔离*。\n\
  \n基于事务的特性，以下是降低事务成本的两大建议：\n\n*   减少日志记录开销。\n*   减少锁开销。\n\n\n### 减少日志开销\n\n一个数据库查询可能由多个数据操作查询组成。如果为每个查询单独维持原子性，则会在事务日志上执行大量磁盘写入。由于磁盘活动比内存或\
  \ CPU 活动慢得多，过度的磁盘活动会增加数据库功能的执行时间。例如，考虑以下批处理查询：\n\n```\n--创建测试表\nIF (SELECT  OBJECT_ID('dbo.Test1')\n\
  ) IS NOT NULL\nDROP TABLE dbo.Test1;\nGO\nCREATE TABLE dbo.Test1 (C1 TINYINT);\n\
  GO\n--插入 10000 行\nDECLARE @Count INT = 1;\nWHILE @Count <= 10000\nBEGIN\nINSERT\
  \  INTO dbo.Test1\n(C1)\nVALUES  (@Count % 256);\nSET @Count = @Count + 1;\nEND\n\
  ```\n\n由于 `INSERT` 语句的每次执行本身都是原子的，SQL Server 将为 `INSERT` 语句的每次执行写入事务日志。\n\n减少日志磁盘写入次数的一个简单方法是将操作查询包含在显式事务中。\n\
  \n```\nDECLARE @Count INT = 1;\nDBCC SQLPERF(LOGSPACE);\nBEGIN TRANSACTION\nWHILE\
  \ @Count <= 10000\nBEGIN\nINSERT  INTO dbo.Test1\n(C1)\nVALUES  (@Count % 256) ;\n\
  SET @Count = @Count + 1 ;\nEND\nCOMMIT\nDBCC SQLPERF(LOGSPACE);\n```\n\n定义的事务范围（在\
  \ `BEGIN TRANSACTION` 和 `COMMIT` 命令对之间）将原子性的范围扩展到事务内包含的多个 `INSERT` 语句。这减少了日志磁盘写入次数，并提升了数据库功能的性能。要验证此理论，请在每个\
  \ `WHILE` 循环前后运行以下 T-SQL 命令：\n\n```\nDBCC SQLPERF(LOGSPACE);\n```\n\n这将向您显示日志空间使用百分比。在我的数据库上运行第一组插入时，日志使用率从\
  \ 3.2% 上升到 3.3%。运行第二组插入时，日志增长了约 6%。\n\n最佳方法是处理数据集而非单独的行。`WHILE` 循环本身可能是一项成本高昂的操作，就像游标一样（关于游标的更多详情见第\
  \ 23 章）。因此，运行一个避免 `WHILE` 循环而改用基于集合的方法的查询效果更佳。\n\n```\nSELECT TOP 10000\nIDENTITY(INT,\
  \ 1, 1) AS n\nINTO #Tally\nFROM master.dbo.syscolumns AS scl,\nmaster.dbo.syscolumns\
  \ AS sc2;\nDBCC SQLPERF(LOGSPACE);\nBEGIN TRANSACTION\nINSERT INTO dbo.Test1 (C1)\n\
  SELECT TOP 1000\n(n % 256)\nFROM #Tally AS t\nCOMMIT\n```\n\n在运行此查询前后使用 `DBCC SQLPERF()`\
  \ 函数进行测试，显示日志内已用空间的增长不到 0.01%，并且它运行耗时 41 毫秒，而 `WHILE` 循环则超过 2 秒。\n\n然而，需要注意的一个问题是，在一个事务中包含过多数据操作查询会增加事务的持续时间。在此期间，所有其他试图访问事务中引用的资源的查询都会被阻塞。由于长事务，回滚持续时间和恢复期间的恢复时间也会增加。\n\
  \n### 减少锁开销\n\n默认情况下，所有四种 SQL 语句（`SELECT`、`INSERT`、`UPDATE` 和 `DELETE`）都使用数据库锁将其工作与其他\
  \ SQL 语句的工作隔离。这种锁管理会给查询增加性能开销。通过请求更少的锁，可以提高查询的性能。进而，其他查询的性能也会得到改善，因为它们等待获取自身锁的时间更短。\n\
  \n默认情况下，SQL Server 可以提供行级锁。对于处理大量行的查询，为所有单独的行请求行锁会给锁管理过程增加显著的开销。您可以通过降低锁粒度（例如页级或表级）来减少此锁开销。SQL\
  \ Server 会动态执行锁升级，同时考虑锁开销。因此，通常无需手动升级锁级别。但如果需要，您可以使用如下锁提示以编程方式控制查询的并发性：\n\n```\n\
  SELECT * FROM  WITH(PAGLOCK)  --使用页级锁\n```\n\n类似地，默认情况下，SQL Server 除了为 `INSERT`、`UPDATE`\
  \ 和 `DELETE` 语句使用锁外，也为 `SELECT` 语句使用锁。这允许 `SELECT` 语句读取未被修改的数据。在某些情况下，数据可能相当静态，并不会经历太多修改。在此类情况下，您可以通过以下方式之一减少\
  \ `SELECT` 语句的锁开销：\n\n*   将数据库标记为 `READONLY`（只读）。\n\n```\nALTER DATABASE  SET READ_ONLY\n\
  ```\n\n这允许用户从数据库检索数据，但阻止他们修改数据。此设置立即生效。如果偶尔需要修改数据库，则可暂时将其转换为 `READWRITE`（读写）模式。\n\
  \n*   使用快照隔离级别之一。\n\n    SQL Server 提供了一种机制，在更新发生时将数据版本放入 tempdb，从而显著减少读取操作的锁开销和阻塞。您可以使用\
  \ `ALTER` 语句更改数据库的隔离级别。\n\n```\nALTER DATABASE  SET READ_WRITE\n\nALTER DATABASE\
  \  SET READONLY\n```\n\n*   阻止 `SELECT` 语句请求任何锁。\n\n```\nALTER DATABASE AdventureWorks2017\
  \ SET READ_COMMITTED_SNAPSHOT ON;\n```\n\n```\nSELECT * FROM  WITH(NOLOCK)\n```\n\
  \n这可以防止 `SELECT` 语句请求任何锁，并且仅适用于 `SELECT` 语句。虽然 `NOLOCK` 提示不能直接在操作查询（`INSERT`、`UPDATE`\
  \ 和 `DELETE`）中引用的表上使用，但可以用于操作查询的数据检索部分，如下所示：\n\n```\nDELETE Sales.SalesOrderDetail\n\
  FROM Sales.SalesOrderDetail AS sod WITH (NOLOCK)\nJOIN Production.Product AS p WITH\
  \ (NOLOCK)\nON sod.ProductID = p.ProductID\nAND p.ProductID = 0;\n```\n\n需要知道的是，这会导致脏读，可能引起重复行或丢失行，因此被认为是控制锁的最后手段。事实上，这被认为是相当危险的，并会导致不正确的结果。最佳方法是将数据库标记为只读或使用快照隔离级别之一。\n\
  \n这是一个很大的主题，还有很多内容可以讨论。我将在下一章讨论不同类型的锁请求以及如何管理锁开销。如果您对本节中的数据库进行了任何建议的更改，我建议从备份中恢复。\n\
  \n## 总结\n\n正如本章所讨论的，为了提高数据库应用程序的性能，确保 SQL 查询设计得当以受益于索引、存储过程、数据库约束等性能增强技术至关重要。确保查询对资源友好，并且不会妨碍索引的使用。在许多情况下，优化器有能力生成成本效益高的执行计划，无论查询结构如何，但首先正确设计查询仍然是良好的实践。即使您为单个查询设计了高性能，数据库应用程序的整体性能也可能不尽如人意。不仅提高单个查询的性能很重要，还要确保它们与其他查询良好协作，不会引起严重的阻塞问题也很关键。在下一章中，您将了解数据库应用程序的不同阻塞方面。\n\
  \n\n"
- "# 21. 阻塞与被阻塞进程\n\n理想情况下，您希望数据库应用程序能够随着数据库用户数量和数据量的增加而线性扩展。然而，常见的情况是，随着用户数量的增加和数据量的增长，性能会下降。导致性能下降的一个原因，特别是与规模不断扩大相关的，就是阻塞。事实上，数据库阻塞通常是数据库应用程序可扩展性的最大敌人之一。\n\
  \n本章将涵盖以下主题：\n\n*   SQL Server 中阻塞的基础知识\n*   事务性数据库的 ACID 属性\n*   数据库锁的粒度、升级、模式和兼容性\n\
  *   ANSI 隔离级别\n*   索引对锁定的影响\n*   分析阻塞所需的信息\n*   用于收集阻塞信息的 SQL 脚本\n*   解决阻塞问题和建议\n\
  *   自动化阻塞检测和信息收集过程的技术\n\n## 阻塞基础知识\n\n在理想世界中，每个 SQL 查询都能够并发执行，而不会被其他查询阻塞。然而，在现实世界中，查询*确实*会相互阻塞，类似于汽车在交叉路口绿灯时通行，会阻挡其他等待通过路口的汽车。在\
  \ SQL Server 中，这种交通管理以 `锁管理器` 的形式实现，它控制对数据库资源的并发访问以维护数据一致性。对数据库资源的并发访问是跨多个数据库连接进行控制的。\n\
  \n在继续之前，我想先明确一点。数据库中使用了三个听起来相同、相互关联但含义不同的术语。这些术语经常被混淆，人们经常错误地、互换地使用它们。这些术语是 `锁定`、`阻塞`\
  \ 和 `死锁`。锁定是 SQL Server 管理多个会话过程中不可或缺的一部分。当会话需要访问一段数据时，会对该数据放置某种类型的锁。这与阻塞不同，阻塞是指一个会话或线程需要访问一段数据，并且必须等待另一个会话的锁被释放。最后，死锁是指两个会话或线程形成了有时被称为\
  \ `致命拥抱` 的状态。它们相互等待对方释放锁。死锁也可以被称为永久性阻塞情况，但它是即使等待任何时间段也不会自行解决的阻塞。死锁将在第 22 章中更详细地介绍。因此，锁可能导致阻塞，而锁和阻塞都在死锁中起作用，但这三个是截然不同的概念。请理解这些术语之间的区别并正确使用它们。这将有助于您理解系统、排查故障以及与其他数据库管理员和开发人员进行交流。\n\
  \n在 SQL Server 中，数据库连接由一个会话 ID 标识。连接可能来自一个或多个应用程序，以及这些应用程序上的一个或多个用户；就 SQL Server\
  \ 而言，每个连接都被视为一个独立的会话。两个会话同时访问同一数据时发生的阻塞是 SQL Server 中的自然现象。每当两个会话试图以冲突的方式访问同一数据库资源时，锁管理器会确保第二个会话等待，直到第一个会话结合系统内事务的管理完成其工作。例如，一个会话可能正在修改表记录，而另一个会话试图删除该记录。由于这两个数据访问请求不兼容，第二个会话将被阻塞，直到第一个会话完成其任务。\n\
  \n另一方面，如果两个会话试图同时读取一个表，则两个请求都被允许执行而不会发生阻塞，因为这些数据访问请求彼此兼容。\n\n通常，阻塞对会话的影响很小，并且不会显著影响其性能。然而，有时由于查询和/或事务设计不佳（或者可能是运气不佳），阻塞会显著影响查询性能。在数据库应用程序中，应尽一切努力最小化阻塞，从而增加可以使用数据库的并发用户数量。\n\
  \n随着 SQL Server 2014 引入内存中表，锁定（至少对于这些表而言）呈现出全新的维度。我将在第 24 章中单独介绍它们的行为。\n\n## 理解阻塞\n\
  \n在 SQL Server 中，数据库查询可以作为独立的工作逻辑单元执行，也可以参与更大的工作逻辑单元。更大的工作逻辑单元可以使用 `BEGIN TRANSACTION`\
  \ 语句以及 `COMMIT` 和/或 `ROLLBACK` 语句来定义。每个工作逻辑单元必须符合一组称为 `ACID` 属性的四个属性：\n\n*   原子性\n\
  *   一致性\n*   隔离性\n*   持久性\n\n我将在接下来的章节中介绍这些属性，因为理解事务的工作原理是理解阻塞的基础。\n\n\n### 原子性\n\
  \n一个逻辑工作单元必须是原子的。也就是说，逻辑工作单元中的所有操作要么全部完成，要么不保留任何效果。要理解逻辑工作单元的原子性，请考虑以下示例：\n\n```sql\n\
  USE AdventureWorks2017;\nGO\nDROP TABLE IF EXISTS dbo.ProductTest;\nGO\nCREATE TABLE\
  \ dbo.ProductTest (ProductID INT\nCONSTRAINT ValueEqualsOne CHECK (ProductID = 1));\n\
  GO\n--All ProductIDs are added into ProductTest as a logical unit of work\nINSERT\
  \ INTO dbo.ProductTest\nSELECT p.ProductID\nFROM Production.Product AS p;\nGO\n\
  SELECT pt.ProductID\nFROM dbo.ProductTest AS pt; --Returns 0 rows\n```\n\nSQL Server\
  \ 将前面的 `INSERT` 语句视为一个逻辑工作单元。`dbo.ProductTest` 表中 `ProductID` 列上的 `CHECK` 约束只允许值为\
  \ `1`。虽然 `Production.Product` 表中的 `ProductID` 列以值 `1` 开头，但它也包含其他值。因此，`INSERT` 语句根本不会向\
  \ `dbo.ProductTest` 表添加任何记录，并且由于 `CHECK` 约束而引发错误。因此，SQL Server 会自动确保原子性。\n\n到目前为止，一切都很好。但在更大的逻辑工作单元情况下，你应该注意\
  \ SQL Server 的一个有趣行为。想象一下，前面的插入任务由多个 `INSERT` 语句组成。这些语句可以组合起来形成一个更大的逻辑工作单元，如下所示：\n\
  \n```sql\nBEGIN TRAN\n--Start:  Logical unit of work\n--First:\nINSERT  INTO dbo.ProductTest\n\
  SELECT  p.ProductID\nFROM    Production.Product AS p;\n--Second:\nINSERT  INTO dbo.ProductTest\n\
  VALUES  (1);\nCOMMIT --End:   Logical unit of work\nGO\n```\n\n在前面脚本中已创建 `dbo.ProductTest`\
  \ 表的情况下，`BEGIN TRAN` 和 `COMMIT` 语句对定义了一个逻辑工作单元，表明事务内的所有语句本质上都应是原子的。然而，SQL Server\
  \ 的默认行为并不确保用户定义事务范围内的某个语句失败时会撤销先前语句的效果。在前面的事务中，第一个 `INSERT` 语句会如前所述失败，而第二个 `INSERT`\
  \ 语句则完全正常。即使第一个 `INSERT` 语句失败，SQL Server 的默认行为也允许第二个 `INSERT` 语句执行。如下面的代码所示，一条 `SELECT`\
  \ 语句将返回由第二个 `INSERT` 语句插入的行：\n\n```sql\nSELECT  *\nFROM    dbo.ProductTest; --Returns\
  \ a row with t1.c1 = 1\n```\n\n用户定义事务的原子性可以通过以下两种方式确保：\n\n*   `SET XACT_ABORT ON`\n\
  *   显式回滚\n\n让我们简要地看看这些方法。\n\n#### SET XACT_ABORT ON\n\n你可以使用 `SET XACT_ABORT ON`\
  \ 语句来修改前面一节中 `INSERT` 任务的原子性。\n\n```sql\nSET XACT_ABORT ON;\nGO\nBEGIN TRAN\n--Start:\
  \  Logical unit of work\n--First:\nINSERT  INTO dbo.ProductTest\nSELECT  p.ProductID\n\
  FROM    Production.Product AS p;\n--Second:\nINSERT  INTO dbo.ProductTest\nVALUES\
  \  (1);\nCOMMIT\n--End:   Logical unit of work GO\nSET XACT_ABORT OFF;\nGO\n```\n\
  \n`SET XACT_ABORT` 语句指定当事务中的某个语句失败时，SQL Server 是否应自动回滚并中止整个事务。第一个 `INSERT` 语句的失败将自动暂停整个事务，因此第二个\
  \ `INSERT` 语句将不会执行。`SET XACT_ABORT` 的作用范围是连接级别，在重新配置或关闭连接之前一直有效。默认情况下，`SET XACT_ABORT`\
  \ 为 `OFF`。\n\n#### 显式回滚\n\n你也可以通过使用 SQL Server 中的 `TRY/CATCH` 错误捕获机制来管理用户定义事务的原子性。如果\
  \ `TRY` 代码块中的某个语句产生错误，则 `CATCH` 代码块将处理该错误。如果发生错误并激活了 `CATCH` 块，则可以回滚用户定义事务的全部工作，并阻止进一步执行语句，如下所示：\n\
  \n```sql\nBEGIN TRY\nBEGIN TRAN\n--Start: Logical unit of work\n--First:\nINSERT\
  \ INTO dbo.ProductTest\nSELECT p.ProductID\nFROM Production.Product AS p\nSecond:\n\
  INSERT INTO dbo.ProductTest (ProductID)\nVALUES (1)\nCOMMIT --End: Logical unit\
  \ of work\nEND TRY\nBEGIN CATCH\nROLLBACK\nPRINT 'An error occurred'\nRETURN\nEND\
  \ CATCH\n```\n\n`ROLLBACK` 语句回滚事务中到该点为止执行的所有操作。有关如何在基于 SQL Server 的应用程序中实现错误处理的详细描述，请参阅\
  \ MSDN 库文章 \"Using TRY...CATCH in Transact SQL\" ( [`http://bit.ly/PNlAHF`](http://bit.ly/PNlAHF)\
  \ )。\n\n由于原子性属性要求逻辑工作单元的所有操作要么全部完成，要么不保留任何效果，SQL Server 通过授予事务对受影响资源的独占访问权，将其工作与其他事务*隔离*。这意味着事务可以在需要时安全地回滚其所有操作的效果。授予事务对受影响资源的独占访问权会在此期间阻止所有其他试图访问这些资源的事务（或数据库请求）。因此，虽然原子性是维护数据完整性所必需的，但它会引入不希望的副作用：阻塞。\n\
  \n### 一致性\n\n一个工作单元应使数据库的状态从一个*一致*状态转移到另一个一致状态。在事务结束时，数据库的状态应完全一致。SQL Server 始终通过自动应用受影响数据库资源的所有约束（作为事务的一部分）来确保数据库的内部状态正确且有效。SQL\
  \ Server 确保事务之后内部结构（如数据和索引布局）的状态是正确的。例如，当修改表的数据时，SQL Server 会自动识别表上的所有索引、约束和其他依赖对象，并作为事务的一部分对所有依赖的数据库对象应用必要的修改。这意味着\
  \ SQL Server 将维护数据和对象的物理一致性。\n\n数据的逻辑一致性由业务规则定义，并应由数据库开发人员实施。业务规则可能要求对多个表进行更改、限制特定类型的数据或任何其他数量的要求。数据库开发人员应相应地定义一个逻辑工作单元，以确保考虑到业务规则的所有标准。此外，开发人员将确保已设置适当的结构来支持已定义的业务规则。SQL\
  \ Server 提供了不同的事务管理功能，数据库开发人员可以使用它们来确保数据的逻辑一致性。\n\n因此，SQL Server 与逻辑的、业务定义的、确保面向业务的数据一致性的约束协同工作，以在底层结构上创建物理一致性。逻辑工作单元的一致性特性会在此期间阻止所有其他试图访问受影响对象的事务（或数据库请求）。因此，即使一致性是维护数据库有效逻辑和物理状态所必需的，它也会引入相同的副作用：阻塞。\n\
  \n### 隔离性\n\n在多用户环境中，可能会有多个事务同时执行。这些并发事务应该彼此隔离，这样一个事务所做的中间更改不会影响其他事务的数据一致性。一个事务所需的`隔离性`程度可能各不相同。SQL\
  \ Server 提供了不同的事务隔离级别特性，来实现事务所需的隔离程度。\n\n> 事务隔离级别将在本章后面的“隔离级别”一节中解释。\n\n一个数据库资源上操作的事务的隔离要求，可能会阻塞其他试图访问该资源的事务。在多用户数据库环境中，通常会有多个事务同时执行。至关重要的是，一个正在进行的事务所做的数据修改必须免受其他事务修改的影响。例如，假设一个事务正在修改表中的若干行。在此期间，为了维护数据库一致性，你必须确保其他事务不会修改或删除相同的行。SQL\
  \ Server 通过适当地阻塞其他事务，在逻辑上将一个事务的活动与其他事务的活动隔离开来，这允许多个事务同时执行，而不会破坏彼此的工作。\n\n由隔离引起的过度阻塞会对数据库应用程序的可扩展性产生不利影响。一个事务可能会无意中长时间阻塞其他事务，从而损害数据库并发性。由于\
  \ SQL Server 使用锁来管理隔离，因此理解 SQL Server 的锁架构非常重要。这有助于你分析阻塞场景并实施解决方案。\n\n> 数据库锁的基础知识将在本章后面的“捕获阻塞信息”一节中解释。\n\
  \n### 持久性\n\n一旦事务完成，该事务所做的更改应该是`持久的`。即使在事务完成后立即切断机器的电源，事务中所有操作的效果也应该被保留。SQL Server\
  \ 通过在事务日志中跟踪被修改数据的所有修改前和修改后映像来确保持久性。事务完成后，SQL Server 立即确保该事务所做的所有更改都被保留——即使 SQL\
  \ Server、操作系统或硬件发生故障（日志磁盘除外）。在重新启动时，SQL Server 运行其数据库恢复功能，该功能从事务日志中识别已完成事务的未决更改，并将其应用到数据库资源。此数据库功能称为`前滚`。\n\
  \n恢复间隔时间取决于在重新启动时需要应用于数据库资源的未决更改数量。为了缩短恢复间隔时间，SQL Server 会按照恢复间隔选项的配置，间歇性地应用正在运行的事务所做的中间更改。恢复间隔选项可以使用\
  \ `sp_configure` 语句进行配置。间歇性应用中间更改的过程被称为`检查点`过程。在重新启动时，恢复过程会识别所有未提交的更改，并利用事务日志中数据的修改前映像将它们从数据库资源中移除。\n\
  \n从 SQL Server 2016 开始，`TARGET_RECOVERY_TIME` 的默认值已从 0（这意味着数据库将进行所有自动检查点）更改为一分钟。自动检查点的默认间隔也是一分钟，但现在默认情况下通过\
  \ `TARGET_RECOVERY_TIME` 值进行控制。如果需要更改检查点操作的频率，请使用 `sp_configure` 更改恢复间隔值。设置此值意味着数据库正在使用间接检查点。你可以使用间接检查点，而不是依赖自动检查点。这是一种基本上让检查点持续发生以满足恢复间隔的方法。对于数据修改量极高的系统，你可能会因为间接检查点而看到高\
  \ I/O。从 SQL Server 2016 开始，所有新创建的数据库都自动使用间接检查点，因为已设置了 `TARGET_RECOVERY_TIME`。从早期版本迁移的任何数据库将使用其在早期版本中使用的检查点方法。你可能也希望更改它们的行为。对于大多数系统来说，使用间接检查点可以带来更一致的检查点行为和更快的恢复。\n\
  \n持久性特性并不是大多数阻塞的直接原因，因为它不要求一个事务的操作与其他事务的操作隔离。但间接地，它会增加阻塞的持续时间。由于持久性特性要求将被修改数据的修改前和修改后映像保存到磁盘上的事务日志，这增加了事务的持续时间，从而增加了阻塞的可能性。\n\
  \nSQL Server 2014 引入了一项功能，可以通过修改给定数据库的持久性行为来减少延迟（等待查询提交并写入日志的时间）。你现在可以使用延迟持久性。这意味着当一个事务完成时，它会立即向应用程序报告为成功事务，从而减少了延迟。但此时日志的写入尚未发生。这也可能允许在等待系统将所有输出写入事务日志的同时，完成更多事务。虽然这可能会提高系统内部的表观速度，并可能减少事务日志\
  \ I/O 上的争用，但这本质上是一个危险的选择。这是一个难以给出的建议。微软提出了三种可能使其具有吸引力的情况。\n\n*   你不在意可能丢失部分数据：由于你可能会遇到需要从日志备份恢复到某个时间点的情况，选择将数据库置于延迟持久性模式后，在必须进行恢复操作时可能会丢失一些数据。\n\
  *   你在日志写入期间存在高度争用：如果你在事务写入日志时看到大量等待，延迟持久性可能是一个可行的解决方案。但是，如前所述，你也需要能够容忍数据丢失。\n*\
  \   你正经历整体资源高度争用：服务器上的大量资源争用归根结底是由于锁被持有时间过长。如果你看到大量争用，并且看到日志写入时间长或也在日志上遇到争用，同时你对数据丢失有很高的容忍度，那么这可能是一种有助于减少系统争用的可行方法。\n\
  \n换句话说，我建议仅当你符合所有这些标准时才使用延迟持久性，其中第一条最为重要。另外，不要忘记前面提到的对检查点行为的更改。如果你处于一个高流量系统，有大量数据更改，你可能还需要调整恢复间隔以辅助系统行为。\n\
  \n> 在 ACID 四大特性中，`隔离性`特性也是确保原子性和一致性的主要手段，它是 SQL Server 数据库中阻塞的主要原因。在 SQL Server\
  \ 中，隔离性是通过锁实现的，这将在下一节中解释。\n\n## 锁\n\n当一个会话执行查询时，SQL Server 会确定需要访问的数据库资源；并且，如果需要，锁管理器会授予该会话不同类型的锁。如果另一个会话已经获得了锁，该查询就会被阻塞；然而，为了同时提供事务隔离和并发性，SQL\
  \ Server 使用了不同的锁粒度，如下文各节所述。\n\n### 锁粒度\n\nSQL Server 数据库在物理磁盘上以文件的形式维护。对于传统的非数据库文件（例如桌面上的\
  \ Excel 文件），一次只能由一个用户写入。任何其他用户尝试写入该文件都会失败。然而，与非数据库文件有限的并发性不同，SQL Server 允许多个用户同时修改（或访问）内容，只要他们不影响彼此的数据一致性即可。这减少了阻塞并提高了事务间的并发性。\n\
  \n为了提高并发性，SQL Server 在以下资源级别按此顺序实现锁粒度：\n\n*   行 (`RID`)\n*   键 (`KEY`)\n*   页 (`PAG`)\n\
  *   区 (`EXT`)\n*   堆或 B 树 (`HoBT`)\n*   表 (`TAB`)\n*   文件 (`FIL`)\n*   应用程序 (`APP`)\n\
  *   元数据 (`MDT`)\n*   分配单元 (`AU`)\n*   数据库 (`DB`)\n\n让我们更详细地了解这些锁级别。\n\n### 行级锁\n\
  \n此锁维护在表中的单行上，是数据库表上的最低级别锁。当查询修改表中的一行时，会授予该查询一个针对该行的 `RID` 锁。例如，考虑在以下测试表上的事务：\n\n\
  ```sql\nDROP TABLE IF EXISTS dbo.Test1;\nCREATE TABLE dbo.Test1 (C1 INT);\nINSERT\
  \ INTO dbo.Test1\nVALUES (1);\nGO\nBEGIN TRAN\nDELETE dbo.Test1\nWHERE C1 = 1;\n\
  SELECT dtl.request_session_id,\ndtl.resource_database_id,\ndtl.resource_associated_entity_id,\n\
  dtl.resource_type,\ndtl.resource_description,\ndtl.request_mode,\ndtl.request_status\n\
  FROM sys.dm_tran_locks AS dtl\nWHERE dtl.request_session_id = @@SPID;\nROLLBACK\n\
  ```\n\n动态管理视图 `sys.dm_tran_locks` 可用于显示锁状态。图 21-1 中针对 `sys.dm_tran_locks` 的查询显示，`DELETE`\
  \ 语句获取了若干锁，其中包括对要删除的行的排他 `RID` 锁。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig1_HTML.jpg](img/323849_5_En_21_Fig1_HTML.jpg)\n\
  图 21-1：`sys.dm_tran_locks` 的输出，显示授予 `DELETE` 语句的行级锁\n\n> 注意：本章后面的“锁模式”部分将解释锁模式。\n\
  \n授予 `DELETE` 语句一个 `RID` 锁可防止其他事务访问该行。\n\n`RID` 锁锁定的资源可以在 `resource_description`\
  \ 列中以以下格式表示：\n\n```text\nFileID:PageID:Slot(row)\n```\n\n在图 21-1 中针对 `sys.dm_tran_locks`\
  \ 的查询输出中，`DatabaseID` 单独显示在 `resource_database_id` 列下。对于 `RID` 类型，`resource_description`\
  \ 列值将 `RID` 资源的剩余部分表示为 `1:121321:0`。在此情况下，`FileID` 为 `1` 表示主数据文件，`PageID` 为 `121321`\
  \ 表示属于 `dbo.Test1` 表的一页（通过 `C1` 列标识），而 `Slot (row)` 为 `0` 表示该行在页面内的位置。您可以通过执行以下\
  \ SQL 语句获取表名和数据库名：\n\n```sql\nSELECT OBJECT_NAME(1940201962),\nDB_NAME(6);\n```\n\
  \n行级锁提供了非常高的并发性，因为阻塞仅限于受影响的行。\n\n### 键级锁\n\n这是索引内的行锁，被标识为 `KEY` 锁。如您所知，对于具有聚集索引的表，表的数据页和聚集索引的叶页是相同的。由于对于具有聚集索引的表，两者的行是相同的，因此在访问表（或聚集索引）中的行时，只会在聚集索引行或有限的行范围内获取一个\
  \ `KEY` 锁。例如，考虑在 `Test1` 表上有一个聚集索引。\n\n```sql\nCREATE CLUSTERED INDEX TestIndex\
  \ ON dbo.Test1(C1);\n```\n\n接下来，重新运行以下代码：\n\n```sql\nBEGIN TRAN\nDELETE  dbo.Test1\n\
  WHERE   C1 = 1 ;\nSELECT  dtl.request_session_id,\ndtl.resource_database_id,\ndtl.resource_associated_entity_id,\n\
  dtl.resource_type,\ndtl.resource_description,\ndtl.request_mode,\ndtl.request_status\n\
  FROM    sys.dm_tran_locks AS dtl\nWHERE   dtl.request_session_id = @@SPID ;\nROLLBACK\n\
  ```\n\n`sys.dm_tran_locks` 的相应输出显示的是 `KEY` 锁而非 `RID` 锁，如图 21-2 所示。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig2_HTML.jpg](img/323849_5_En_21_Fig2_HTML.jpg)\n\
  图 21-2：`sys.dm_tran_locks` 的输出，显示授予 `DELETE` 语句的键级锁\n\n当您查询 `sys.dm_tran_locks`\
  \ 时，您将能够检索数据库标识符 `resource_database_id`。您也可以从 `resource_associated_entity_id` 获取有关被锁定对象的信息；但是，要获取特定资源（本例中是键所在的页），您必须查看\
  \ `resource_description` 列的值，即 `1:34064`。在此情况下，`Index ID` 为 `1` 表示 `dbo.Test1` 表上的聚集索引。您还会看到发出的请求类型：S、IX、X\
  \ 等。我将在即将到来的“锁模式”部分更详细地介绍这些。\n\n> 注意：您将在本章的“索引对锁的影响”部分了解 `IndId` 列的不同值以及如何确定对应的索引名称。\n\
  \n与行级锁类似，键级锁也提供非常高的并发性。\n\n### 页级锁\n\n页级锁维护在表或索引中的单个页上，被标识为 `PAG` 锁。当查询请求一个页内的多行时，可以通过在各个行上获取\
  \ `RID/KEY` 锁，或者在整个页上获取一个 `PAG` 锁，来维护所有请求行的一致性。锁管理器会从查询计划中确定获取多个 `RID/KEY` 锁的资源压力，如果发现压力很高，锁管理器会改为请求一个\
  \ `PAG` 锁。\n\n`PAG` 锁锁定的资源在 `sys.dm_tran_locks` 的 `resource_description` 列中可能表示为以下格式：\n\
  \n```text\nFileID:PageID\n```\n\n页级锁可以通过减少其锁定开销来提高单个查询的性能，但它会阻塞对页面中所有行的访问，从而损害数据库的并发性。\n\
  \n### 区级锁\n\n区级锁维护在一个区（八个连续数据或索引页的组）上，被标识为 `EXT` 锁。例如，当对表执行 `ALTER INDEX REBUILD`\
  \ 命令，并且表的页可能从现有区移动到新区时，就会使用此锁。在此期间，使用 `EXT` 锁来保护区的完整性。\n\n### 堆或 B 树锁\n\n堆或 B 树锁用于描述何时可能对这两种对象类型之一加锁。目标对象可以是无序堆表（即没有聚集索引的表），也可以是\
  \ B 树对象（通常指分区）。`ALTER TABLE` 中的一个设置允许您控制锁升级（在“锁升级”部分介绍）对分区的影响方式。由于分区可以跨多个文件组，每个分区必须有自己的数据分配定义。这就是\
  \ `HoBT` 锁发挥作用的地方。它就像表级锁，但作用于分区本身，而不是整个表。\n\n\n#### 表级锁\n\n这是表上的最高级别锁，标识为`TAB`锁。表级锁保留对整个表及其所有索引的访问权限。\n\
  \n当执行查询时，锁管理器会自动确定在较低级别获取多个锁的锁定开销。如果确定在行级或页级获取锁的资源压力很高，则锁管理器会直接为查询获取表级锁。\n\n`TAB`锁锁定的资源将在`resource_description`中以以下格式表示：\n\
  \n```\nObjectID\n```\n\n与其他锁相比，表级锁所需的开销最小，因此可以提高单个查询的性能。另一方面，由于表级锁会阻塞整个表（包括索引）上的所有写请求，因此可能会显著损害数据库并发性。\n\
  \n有时，应用程序特性可能受益于对查询中引用的表使用特定的锁定级别。例如，如果在非高峰时段执行管理查询，则表级锁可能不会对系统用户造成太大影响；但是，它可以减少查询的锁定开销，从而提高其性能。在这种情况下，查询开发人员可以使用锁定提示覆盖锁管理器对查询中引用表的锁定级别选择。\n\
  \n```\nSELECT * FROM <table_name> WITH(TABLOCK)\n```\n\n但是，在像这样从 SQL Server 拿走控制权时要小心。在实施之前要进行彻底的测试。\n\
  \n### 数据库级锁\n\n数据库级锁在数据库上维护，并标识为`DB`锁。当应用程序建立数据库连接时，锁管理器会为相应的`session_id`分配一个数据库级共享锁。这可以防止用户在其他用户连接到数据库时意外删除或恢复数据库。\n\
  \nSQL Server 确保在一个级别请求的锁尊重在其他级别授予的锁。例如，一旦用户在表行上获得了行级锁，另一个用户就无法获取可能影响该行完整性的任何其他级别的锁。第二个用户可以在其他行上获取行级锁，或在其他页上获取页级锁，但不会向其他用户授予包含该行的、不兼容的页级或表级锁。\n\
  \n用户或数据库管理员无需指定应应用锁的级别；锁管理器会自动确定。当访问少量行以辅助并发性时，它通常倾向于行级锁和键级锁。但是，如果多个低级别锁的锁定开销非常高，锁管理器会自动选择适当的高级别锁。\n\
  \n## 锁操作和模式\n\n由于 SQL Server 需要执行的操作多种多样，因此维护了同样庞大且复杂的锁定机制集。除了不同类型的锁之外，还有一条升级路径用于从一种类型的锁更改为另一种类型的锁。以下部分描述了这些模式和过程，以及它们的用途。\n\
  \n### 锁升级\n\n当执行查询时，SQL Server 确定查询所引用的数据库对象所需的锁定级别，并在获取所需锁后开始执行查询。在查询执行期间，锁管理器跟踪查询请求的锁的数量，以确定是否需要将锁定级别从当前级别升级到更高级别。\n\
  \n锁升级阈值由 SQL Server 在事务过程中确定。当事务超过其阈值时，行锁和页锁会自动升级为表锁。将锁定级别升级到表级锁后，表上所有较低级别的锁都会自动释放。锁管理器的这种动态锁升级功能优化了查询的锁定开销。\n\
  \n可以对给定表上的锁定机制建立一定程度的控制。例如，你可以控制是否发生锁升级。以下是进行该更改的 T-SQL 语法：\n\n```sql\nALTER TABLE\
  \ schema.table\nSET (LOCK_ESCALATION = DISABLE);\n```\n\n此语法将完全禁用表上的锁升级（除了少数特殊情况）。你也可以将其设置为`TABLE`，这将导致每次升级都转到表锁。你还可以将表上的锁升级设置为`AUTO`，这将允许\
  \ SQL Server 确定锁定模式和任何必要的升级。如果该表已分区，你可能会看到升级更改为分区级别。同样，在修改标准 SQL Server 行为时要谨慎使用这些类型的修改。\n\
  \n你还可以通过使用跟踪标志 1224 在更广泛的范围内禁用锁升级。这会基于锁的数量禁用锁升级，但保留基于内存压力的锁升级。你也可以通过使用跟踪标志 1211\
  \ 来同时禁用基于内存压力和基于锁数量的锁升级，但这是一个危险的选择，可能导致系统错误。我强烈建议在使用这两种选项之前进行彻底测试。\n\n### 锁模式\n\n\
  不同事务所需的隔离程度可能有所不同。例如，如果两个事务同时读取数据，数据的一致性不会受到影响；但是，如果允许两个事务同时修改数据，则会影响一致性。根据请求的访问类型，SQL\
  \ Server 在锁定资源时使用不同的锁模式。\n\n*   共享 (S)\n\n*   更新 (U)\n\n*   排他 (X)\n\n*   意向锁\n\
  \    *   意向共享 (IS)\n\n    *   意向排他 (IX)\n\n    *   共享意向排他 (SIX)\n\n*   架构锁\n   \
  \ *   架构修改 (Sch-M)\n\n    *   架构稳定性 (Sch-S)\n\n*   批量更新 (BU)\n\n*   键范围\n\n####\
  \ 共享 (S) 模式\n\n共享模式用于只读查询，例如`SELECT`语句。它不会阻止其他只读查询同时访问数据，因为数据的完整性不会因并发读取而受损。但是，为了维护数据完整性，会阻止对数据的并发数据修改查询。`(S)`锁在数据被读取之前一直保持。默认情况下，`SELECT`语句获取的`(S)`锁在数据读取后立即释放。例如，考虑以下事务：\n\
  \n```sql\nBEGIN TRAN\nSELECT  *\nFROM    Production.Product AS p\nWHERE   p.ProductID\
  \ = 1;\n--其他查询\nCOMMIT\n```\n\n在默认隔离级别`read_committed`下，`SELECT`语句获取的`(S)`锁不会一直保持到事务结束；而是在`SELECT`语句读取数据后立即释放。`(S)`锁的这种行为可以通过使用更高的隔离级别或锁定提示来改变。\n\
  \n\n"
- "# 更新（U）锁模式\n\n更新（U）锁模式可能被认为类似于共享（S）锁，但它还包含在同一查询中修改数据的目标。与（S）锁不同，（U）锁表明数据是为修改而读取。由于数据是为修改而读取的，SQL\
  \ Server 不允许同时对数据持有一个以上的（U）锁。此规则有助于维护数据完整性。请注意，并发的（S）锁在数据上是允许的。（U）锁与 `UPDATE` 语句相关联，而\
  \ `UPDATE` 语句的操作实际上涉及两个中间步骤：首先读取要修改的数据，然后修改数据。\n\n在这两个中间步骤中使用了不同的锁模式以最大化并发性。在读取数据时，第一步不是获取排他锁，而是获取数据上的（U）锁。在第二步中，（U）锁被转换为用于修改的排他（X）锁。如果不需要修改，则释放（U）锁；换句话说，它不会一直持有到事务结束。考虑以下脚本，它将导致阻塞，直到\
  \ `UPDATE` 语句完成：\n\n```sql\nUPDATE Sales.Currency\nSET Name = 'Euro'\nWHERE CurrencyCode\
  \ = 'EUR';\n```\n\n要理解 `UPDATE` 语句中间步骤的锁行为，你需要在查询运行时从 `sys.dm_tran_locks` 获取数据。你可以按照下面概述的步骤，在\
  \ `UPDATE` 语句的每一步之后获取锁状态。你需要打开三个连接，我将它们称为连接 1、连接 2 和连接 3。这将需要在 Management Studio\
  \ 中打开三个不同的查询窗口。你将按照我指定的顺序在列出的连接中运行查询，以到达一个阻塞情况。这样做的目的是观察这些阻塞的发生过程。表 21-1 显示了在不同的\
  \ T-SQL 查询窗口中的不同连接，以及需要在其中运行的查询顺序。\n\n**表 21-1**\n\n演示 UPDATE 阻塞的脚本顺序\n\n| 脚本顺序\
  \ | T-SQL 窗口 1 (连接 1) | T-SQL 窗口 2 (连接 2) | T-SQL 窗口 3 (连接 3) |\n| :--- | :--- |\
  \ :--- | :--- |\n| **1** | `BEGIN TRANSACTION LockTran2`<br>`--Retain an (S) lock\
  \ on the resource`<br>`SELECT *`<br>`FROM Sales.Currency AS c WITH (REPEATABLEREAD)`<br>`WHERE\
  \ c.CurrencyCode = 'EUR' ;`<br>`--Allow DMVs to be executed before second step of`<br>`--\
  \ UPDATE statement is executed by transaction LockTran1`<br>`WAITFOR DELAY '00:00:10';`<br>`COMMIT`\
  \ | | |\n| **2** | | `BEGIN TRANSACTION LockTran1`<br>`UPDATE Sales.Currency`<br>`SET\
  \ Name = 'Euro'`<br>`WHERE CurrencyCode = 'EUR';`<br>`-- NOTE: We're not committing\
  \ yet` | |\n| **3** | | | `SELECT dtl.request_session_id,`<br>`dtl.resource_database_id,`<br>`dtl.resource_associated_entity_id,`<br>`dtl.resource_type,`<br>`dtl.resource_description,`<br>`dtl.request_mode,`<br>`dtl.request_status`<br>`FROM\
  \ sys.dm_tran_locks AS dtl`<br>`ORDER BY dtl.request_session_id;` |\n| **4) 等待 10\
  \ 秒** | | | |\n| **5** | | | `SELECT dtl.request_session_id,`<br>`dtl.resource_database_id,`<br>`dtl.resource_associated_entity_id,`<br>`dtl.resource_type,`<br>`dtl.resource_description,`<br>`dtl.request_mode,`<br>`dtl.request_status`<br>`FROM\
  \ sys.dm_tran_locks AS dtl`<br>`ORDER BY dtl.request_session_id;` |\n| **6** | |\
  \ `COMMIT` | |\n\n连接 1 中运行的 `REPEATABLEREAD` 锁定提示允许 `SELECT` 语句保留资源上的（S）锁。连接 3 中\
  \ `sys.dm_tran_locks` 的输出将提供 `UPDATE` 语句第一步之后的锁状态，因为 `UPDATE` 语句向排他（X）锁的转换被 `SELECT`\
  \ 语句阻塞了。接下来，让我们看看当你逐步执行 `UPDATE` 语句的各个步骤时，`sys.dm_tran_locks` 提供的锁状态。\n\n图 21-3\
  \ 显示了 `UPDATE` 语句第一步之后的锁状态（如前所述，从在第三个连接，即连接 3 上执行的 `sys.dm_tran_locks` 的输出中获得）。\n\
  \n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig3_HTML.jpg](img/323849_5_En_21_Fig3_HTML.jpg)\n\
  \n**图 21-3**\n\n`sys.dm_tran_locks` 的输出，显示 UPDATE 语句的锁转换状态\n\n> **注意**\n>\n> 这些行的顺序并不那么重要。我按\
  \ `session_id` 排序是为了将每个查询的锁分组在一起。\n\n*   图 21-4 显示了 `UPDATE` 语句第二步之后的锁状态。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig4_HTML.jpg](img/323849_5_En_21_Fig4_HTML.jpg)\n\
  \n**图 21-4**\n\n`sys.dm_tran_locks` 的输出，显示 UPDATE 语句持有的最终锁状态\n\n从 `UPDATE` 语句第一步之后的\
  \ `sys.dm_tran_locks` 输出中，你可以注意到以下几点：\n\n*   数据行上授予了 SPID 一个（U）锁。\n*   请求了数据行上向（X）锁的转换。\n\
  \n从 `UPDATE` 语句第二步之后的 `sys.dm_tran_locks` 输出中，你可以看到 `UPDATE` 语句仅在数据行上持有一个（X）锁。本质上，数据行上的（U）锁被转换为（X）锁。\n\
  \n这一点很重要，通过不在第一步获取排他锁，`UPDATE` 语句在此期间允许其他事务使用 `SELECT` 语句读取数据。这是可能的，因为（U）锁和（S）锁彼此兼容。这提高了数据库的并发性。\n\
  \n> **注意**\n>\n> 我将在本章后面讨论不同锁模式之间的锁兼容性。\n\n你可能好奇为什么在 `UPDATE` 语句的第一步使用（U）锁而不是（S）锁。要理解在\
  \ `UPDATE` 语句的第一步使用（S）锁而不是（U）锁的缺点，让我们将 `UPDATE` 语句分解为两个步骤。\n\n1.  使用（S）锁而不是（U）锁读取要修改的数据。\n\
  2.  通过获取（X）锁来修改数据。\n\n考虑以下代码：\n\n```sql\nBEGIN TRAN\n--1.Read data to be modified\
  \ using (S)lock instead of (U)lock.\n--    Retain the (S)lock using REPEATABLEREAD\
  \ locking hint, since\n--    the original (U)lock is retained until the conversion\
  \ to\n--    (X)lock.\nSELECT  *\nFROM    Sales.Currency AS c WITH (REPEATABLEREAD)\n\
  WHERE   c.CurrencyCode = 'EUR' ;\n--Allow another equivalent update action to start\
  \ concurrently\nWAITFOR DELAY '00:00:10' ;\n--2. Modify the data by acquiring (X)lock\n\
  UPDATE  Sales.Currency WITH (XLOCK)\nSET     Name = 'EURO'\nWHERE   CurrencyCode\
  \ = 'EUR' ;\nCOMMIT\n```\n\n如果这个事务从两个连接同时执行，那么，在延迟之后，它会导致死锁，如下所示：\n\n```\nMsg 1205,\
  \ Level 13, State 51, Line 13\nTransaction (Process ID 58) was deadlocked on lock\
  \ resources with another process and has been chosen as the deadlock victim. Rerun\
  \ the transaction.\n```\n\n两个事务都使用（S）锁读取要修改的数据，然后请求（X）锁进行修改。当第一个事务尝试转换为（X）锁时，它被第二个事务持有的（S）锁阻塞。同样，当第二个事务尝试从（S）锁转换为（X）锁时，它被第一个事务持有的（S）锁阻塞，而第一个事务又反过来被第二个事务阻塞。这导致了循环阻塞——因此，发生了死锁。\n\
  \n> **注意**\n>\n> 死锁将在第 22 章更详细地介绍。\n\n为了避免这种典型的死锁，`UPDATE` 语句在其第一个中间步骤中使用（U）锁而不是（S）锁。与（S）锁不同，（U）锁不允许同时对同一资源持有另一个（U）锁。这迫使第二个并发的\
  \ `UPDATE` 语句等待，直到第一个 `UPDATE` 语句完成。\n\n\n### 排他模式\n\n排他模式为数据操作查询（如 `INSERT`、`UPDATE`\
  \ 和 `DELETE`）提供对数据库资源的独占修改权限。它阻止其他并发事务访问正在修改的资源。`INSERT` 和 `DELETE` 语句都在其执行之初就获取（X）锁。如前所述，`UPDATE`\
  \ 语句在读取要修改的数据后转换为（X）锁。授予事务的（X）锁将一直保持到事务结束。\n\n（X）锁有两个作用。\n\n*   它阻止其他事务访问正在修改的资源，这样它们看到的值是修改前或修改后的值，而不是一个正在被修改的值。\n\
  *   它允许修改资源的事务在需要时安全地回滚到修改前的原始值，因为此时不允许其他事务同时修改该资源。\n\n### 意向共享、意向排他和共享意向排他模式\n\n\
  意向共享、意向排他和共享意向排他锁表明查询意图在较低的锁级别获取相应的（S）或（X）锁。例如，考虑对 `Sales.Currency` 表执行以下事务：\n\n\
  ```\nBEGIN TRAN\nDELETE  Sales.Currency\nWHERE   CurrencyCode = 'ALL';\nSELECT \
  \ tl.request_session_id,\n        tl.resource_database_id,\n        tl.resource_associated_entity_id,\n\
  \        tl.resource_type,\n        tl.resource_description,\n        tl.request_mode,\n\
  \        tl.request_status\nFROM    sys.dm_tran_locks tl;\nROLLBACK TRAN\n```\n\n\
  图 21-5 显示了 `sys.dm_tran_locks` 的输出结果。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig5_HTML.jpg](img/323849_5_En_21_Fig5_HTML.jpg)\n\
  \n图 21-5\n\n`sys.dm_tran_locks` 的输出，显示了在较高级别授予的意向锁\n\n表级的（IX）锁（`PAGE`）表明 `DELETE`\
  \ 语句意图在页、行或键级别获取（X）锁。类似地，页级的（IX）锁（`PAGE`）表明查询意图在该页中的某一行上获取（X）锁。较高层级的（IX）锁可以防止另一个事务在表或包含该行的页上获取不兼容的锁。\n\
  \n事务在较高层级标记意向锁——（IS）或（IX）——同时持有较低层级的锁，可以防止其他事务在较高层级获取不兼容的锁。如果不使用意向锁，那么尝试在较高层级获取锁的事务将必须扫描较低层级以检测较低层级锁的存在。虽然较高层级的意向锁表明了较低层级锁的存在，但在较高层级获取锁的开销得到了优化。授予事务的意向锁将保持到事务结束。\n\
  \n一次只能在给定资源上放置一个（SIX）锁。这可以防止其他事务进行更新。在（SIX）锁生效期间，其他事务可以在较低级别的资源上放置（IS）锁。\n\n此外，在某个层级请求（或获取）的锁与打算在较低层级拥有的锁之间可能存在组合。例如，可能存在（SIU）和（UIX）锁组合，表示已在相应层级获取（S）或（U）锁，并且打算在较低层级获取（U）或（X）锁。\n\
  \n### 架构修改和架构稳定模式\n\n架构修改和架构稳定锁由依赖于表结构的 SQL 语句在表上获取。处理表结构的 DDL 语句会在表上获取（Sch-M）锁，并阻止其他事务访问该表。（Sch-S）锁是为依赖于架构但不修改架构的数据库活动获取的，例如查询编译。它可以防止在表上获取（Sch-M）锁，但允许在表上授予其他锁。\n\
  \n由于在生产数据库上，架构修改并不常见，（Sch-M）锁通常不会成为阻塞问题。而且因为（Sch-S）锁除了（Sch-M）锁外不会阻塞其他锁，所以并发性通常也不会受到（Sch-S）锁的影响。\n\
  \n### 批量更新模式\n\n批量更新锁模式是批量加载操作独有的。这些操作包括旧式的 `bcp`（批量复制）、`BULK INSERT` 语句，以及使用 `BULK`\
  \ 选项从 `OPENROWSET` 进行的插入。作为一种加速这些过程的机制，你可以提供 `TABLOCK` 提示或在表上设置相关选项以使其在批量加载时锁定。（BUN）锁模式的关键在于，它允许多个针对正在被锁定的表的批量操作，但在批量进程运行期间阻止其他操作。\n\
  \n### 键范围模式\n\n键范围模式仅在隔离级别设置为可序列化时适用（你将在后面的“隔离级别”小节中了解更多关于事务隔离级别的内容）。键范围锁应用于一系列或某个范围的键值，这些值在事务打开期间会被重复使用。在可序列化事务期间锁定一个范围，可以确保其他行不会插入到该范围内，从而可能改变事务内的结果集。该范围可以使用其他锁模式进行锁定，这使得它更像是一种组合锁模式，而不是一种独特独立的锁模式。要使键范围锁模式生效，必须使用索引来定义范围内的值。\n\
  \n### 锁兼容性\n\nSQL Server 通过阻止其他事务以不兼容的方式访问同一资源来为事务提供隔离。然而，如果一个事务尝试对同一资源执行兼容的任务，那么为了提高并发性，它不会被第一个事务阻塞。SQL\
  \ Server 通过防止事务获取其他事务所持资源的不兼容锁来实现这种选择性阻塞。例如，一个事务在资源上获取的（S）锁允许其他事务在同一资源上获取（S）锁。然而，一个事务在资源上获取的（Sch-M）锁会阻止其他事务在该资源上获取任何锁。\n\
  \n\n## 隔离级别\n\n前一节介绍的锁模式有助于事务保护其数据一致性免受其他并发事务的影响。事务获得的数据保护或隔离程度不仅取决于锁模式，还取决于事务的隔离级别。此级别会影响锁模式的行为。例如，默认情况下，(S)\
  \ 锁在读取数据后会立即释放，而不会一直持有到事务结束。这种行为可能不适用于某些应用程序功能。在这种情况下，您可以配置事务的隔离级别以实现所需的隔离程度。\n\n\
  SQL Server 实现了六种隔离级别，其中四种由 ISO 定义：\n\n*   未提交读\n*   已提交读\n*   可重复读\n*   可序列化\n\n\
  另外两种隔离级别提供了行版本控制，这是一种在数据操作查询中创建行版本的机制。这个额外的行版本允许读取查询访问数据而无需获取锁。这两个额外的隔离级别如下：\n\n\
  *   快照已提交读（实际上是已提交读隔离的一部分）\n*   快照\n\n上述四种 ISO 隔离级别按隔离程度递增的顺序列出。您可以使用 `SET TRANSACTION\
  \ ISOLATION LEVEL` 语句在连接级别配置它们，或者使用锁提示在查询级别配置。连接级别的隔离级别配置会一直有效，直到使用 `SET` 语句重新配置隔离级别或连接关闭。所有隔离级别将在以下章节中解释。\n\
  \n### 未提交读\n\n未提交读是四种隔离级别中最低的一种，它允许 `SELECT` 语句在不请求 (S) 锁的情况下读取数据。由于 `SELECT` 语句不请求\
  \ (S) 锁，因此它既不会被 (X) 锁阻塞，也不会阻塞 (X) 锁。它允许 `SELECT` 语句在数据被修改时读取数据。这种数据读取被称为*脏读*。\n\n\
  假设您有一个应用程序，其中数据修改量极少，并且您的应用程序对其发出的用于读取数据的 `SELECT` 语句的准确性要求不高。在这种情况下，您可以使用未提交读隔离级别来避免其他数据修改活动阻塞\
  \ `SELECT` 语句。\n\n您可以使用以下 `SET` 语句将数据库连接的隔离级别配置为未提交读隔离级别：\n\n```\nSET TRANSACTION\
  \ ISOLATION LEVEL READ UNCOMMITTED\n```\n\n您也可以使用 `NOLOCK` 锁提示在查询基础上实现这种隔离程度。\n\n\
  ```\nSELECT  *\nFROM    Production.Product AS p WITH (NOLOCK);\n```\n\n锁提示的效果仅对该查询适用，不会更改连接的隔离级别。\n\
  \n未提交读隔离级别避免了由 `SELECT` 语句引起的阻塞，但如果事务依赖于 `SELECT` 语句读取数据的准确性，或者事务无法承受另一个事务并发更改数据，则不应使用它。\n\
  \n理解脏读的含义非常重要。很多人认为这意味着当字段的值从 `Tusa` 更新为 `Tulsa` 时，查询仍然可以在提交之前读取到旧值，甚至是更新后的值。虽然这确实是真的，但可能会发生更严重的数据问题。由于读取数据时不放置锁，索引可能会被拆分。这可能导致返回给查询的数据行多出或缺失。需要明确的是，在任何同时发生数据操作和数据读取的环境中使用未提交读，都可能导致不可预期的行为。此隔离级别主要针对侧重于报告和商业智能的系统，而非在线事务处理系统。由于使用了未提交的数据，您可能会看到完全不正确的数据。这一点无论怎样强调都不为过。\n\
  \n### 已提交读\n\n已提交读隔离级别防止了未提交读隔离级别引起的脏读。这意味着在此隔离级别下，`SELECT` 语句会请求 (S) 锁。这是 SQL Server\
  \ 的默认隔离级别。如果需要，您可以使用以下 `SET` 语句将连接的隔离级别更改为已提交读：\n\n```\nSET TRANSACTION ISOLATION\
  \ LEVEL READ COMMITTED\n```\n\n已提交读隔离级别适用于大多数情况，但由于 `SELECT` 语句获取的 (S) 锁不会一直持有到事务结束，因此可能导致不可重复读或幻读问题，如后续章节所述。\n\
  \n`READ_COMMITTED_SNAPSHOT` 数据库选项可以改变已提交读隔离级别的行为。当此选项设置为 `ON` 时，数据操作事务使用行版本控制。这会给\
  \ tempdb 带来额外负担，因为在事务未提交期间，被更改行的先前版本存储在那里。这允许其他事务访问数据进行读取，而无需在数据上放置锁，从而提高了系统中所有查询的速度和效率，同时避免了使用\
  \ `NOLOCK` 或 `READ UNCOMMITTED` 时因页面拆分导致的问题。在 Azure SQL 数据库中，默认设置为 `READ_COMMITTED_SNAPSHOT`。\n\
  \n接下来，修改 AdventureWorks2017 数据库以启用 `READ_COMMITTED_SNAPSHOT`。\n\n```\nALTER DATABASE\
  \ AdventureWorks2017 SET READ_COMMITTED_SNAPSHOT ON;\n```\n\n现在设想一个业务场景。第一个连接和事务将从\
  \ `Production.Product` 表中提取数据，获取特定项目的颜色。\n\n```\nBEGIN TRANSACTION;\nSELECT  p.Color\n\
  FROM    Production.Product AS p\nWHERE   p.ProductID = 711;\n```\n\n建立第二个连接和新事务，该事务将修改同一项目的颜色。\n\
  \n```\nBEGIN TRANSACTION ;\nUPDATE  Production.Product\nSET     Color = 'Coyote'\n\
  WHERE   ProductID = 711;\nSELECT  p.Color\nFROM    Production.Product AS p\nWHERE\
  \   p.ProductID = 711;\n```\n\n在更新颜色后运行 `SELECT` 语句，您可以看到颜色已被更新。但如果您切换回第一个连接并重新运行原始的\
  \ `SELECT` 语句（不要再次运行 `BEGIN TRAN` 语句），您会看到颜色仍然是 `Blue`。切换回第二个连接并完成事务。\n\n```\nCOMMIT\
  \ TRANSACTION;\n```\n\n再次切换到第一个事务，提交该事务，然后重新运行原始的 `SELECT` 语句。您将看到该项目的颜色已更新为 `Coyote`。在继续之前，您可以重置\
  \ AdventureWorks2017 上的隔离级别。\n\n```\nALTER DATABASE AdventureWorks2017 SET READ_COMMITTED_SNAPSHOT\
  \ OFF;\n```\n\n### 注意\n\n如果 tempdb 已满，使用行版本控制的数据修改将继续成功，但读取操作可能会失败，因为版本化的行将不可用。如果您在数据库中启用任何类型的行版本控制隔离，您必须格外注意在\
  \ tempdb 中保留可用空间。\n\n## 可重复读\n\n“可重复读”隔离级别允许 `SELECT` 语句将其（共享）锁保持到事务结束，从而防止其他事务在此期间修改数据。数据库功能可能会基于事务内\
  \ `SELECT` 语句读取的数据，在事务内部做出逻辑决策。如果决策的结果依赖于 `SELECT` 语句读取的数据，那么你应考虑防止其他并发事务修改该数据。例如，考虑以下两个事务：\n\
  \n*   标准化 `ProductID = 1` 的价格：对于 `ProductID = 1`，如果 `Price > 10`，则将价格降低 `10`。\n\n\
  *   应用折扣：对于 `Price > 10` 的产品，应用 `40%` 的折扣。\n\n现在考虑以下测试表：\n\n```sql\nDROP TABLE IF\
  \ EXISTS dbo.MyProduct;\nGO\nCREATE TABLE dbo.MyProduct (ProductID INT,\nPrice MONEY);\n\
  INSERT INTO dbo.MyProduct\nVALUES (1, 15.0);\n```\n\n你可以这样编写这两个事务：\n\n```sql\nDECLARE\
  \ @Price INT ;\nBEGIN TRAN NormailizePrice\nSELECT  @Price = mp.Price\nFROM    dbo.MyProduct\
  \ AS mp\nWHERE   mp.ProductID = 1 ;\n/*Allow transaction 2 to execute*/\nWAITFOR\
  \ DELAY '00:00:10' ;\nIF @Price > 10\nUPDATE  dbo.MyProduct\nSET     Price = Price\
  \ - 10\nWHERE   ProductID = 1 ;\nCOMMIT\n--Transaction 2 from Connection 2\nBEGIN\
  \ TRAN ApplyDiscount\nUPDATE  dbo.MyProduct\nSET     Price = Price * 0.6 --Discount\
  \ = 40%\nWHERE   Price > 10 ;\nCOMMIT\n```\n\n表面上看，前面的事务似乎没问题，是的，它们在单用户环境中确实能正常工作。但在多用户环境中，多个事务可以并发执行，你这里就有问题了！\n\
  \n为了弄清楚问题，让我们按以下顺序从不同连接执行这两个事务：\n\n1.  先启动事务 1。\n\n2.  在事务 1 启动后的十秒内启动事务 2。\n\n\
  正如你可能已经猜到的，事务结束后，产品（`ProductID = 1`）的新价格将是 `-1.0`。哎呀——看起来你马上就要破产了！\n\n问题发生的原因是，事务\
  \ 1 已读完数据并即将基于其做出决策时，事务 2 被允许修改数据。事务 1 需要比默认隔离级别（读已提交）所提供的更高的隔离级别。\n\n作为解决方案，你希望防止事务\
  \ 2 在事务 1 正在处理数据时修改数据。换句话说，为事务 1 提供稍后在事务中再次读取数据而不被他人修改的能力。这个功能称为 *可重复读*。考虑到上下文，解决方案的实现可能已经很明显了。重新创建示例表后，你可以这样写：\n\
  \n```sql\nSET TRANSACTION ISOLATION LEVEL REPEATABLE READ ;\nGO\n--Transaction 1\
  \ from Connection 1\nDECLARE @Price INT ;\nBEGIN TRAN NormalizePrice\nSELECT  @Price\
  \ = Price\nFROM    dbo.MyProduct AS mp\nWHERE   mp.ProductID = 1 ;\n/*Allow transaction\
  \ 2 to execute*/\nWAITFOR DELAY  '00:00:10' ;\nIF @Price > 10\nUPDATE  dbo.MyProduct\n\
  SET     Price = Price - 10\nWHERE   ProductID = 1 ;\nCOMMIT\nGO\nSET TRANSACTION\
  \ ISOLATION LEVEL READ COMMITTED --Back to default\nGO\n```\n\n将事务 1 的隔离级别提高到可重复读，将防止事务\
  \ 2 在事务 1 执行期间修改数据。因此，你将不会出现产品价格不一致的情况。由于目的是直到事务结束才释放 `SELECT` 语句获取的（共享）锁，因此将隔离级别设置为可重复读的效果也可以通过使用锁提示在查询级别实现。\n\
  \n```sql\nDECLARE @Price INT ;\nBEGIN TRAN NormalizePrice\nSELECT  @Price = Price\n\
  FROM    dbo.MyProduct AS mp WITH (REPEATABLEREAD)\nWHERE   mp.ProductID = 1 ;\n\
  /*Allow transaction 2 to execute*/\nWAITFOR DELAY  '00:00:10'\nIF @Price > 10\n\
  UPDATE  dbo.MyProduct\nSET     Price = Price - 10\nWHERE   ProductID = 1 ;\nCOMMIT\n\
  ```\n\n这个解决方案避免了 `MyProduct.Price` 的数据不一致，但它为此场景引入了另一个问题。观察事务 2 的结果，你会发现它可能导致死锁。因此，尽管前面的解决方案防止了数据不一致，但它并不是一个完整的解决方案。仔细观察可重复读隔离级别对事务的影响，你会发现它引入了之前解释过的、通过\
  \ `UPDATE` 语句内部实现所避免的典型死锁问题。`SELECT` 语句获取并保留了（共享）锁，而不是（更新）锁，即使它打算在事务后期修改数据。（共享）锁允许事务\
  \ 2 获取（更新）锁，但它阻止了（更新）锁向（排他）锁的转换。事务 1 后期尝试获取数据上的（更新）锁导致了循环阻塞，从而造成死锁。\n\n为了防止死锁并仍然避免数据损坏，你可以采用与\
  \ `UPDATE` 语句内部实现所采用的等效策略。因此，事务 1 可以通过执行 `SELECT` 语句时使用 `UPDLOCK` 锁提示来请求（更新）锁，而不是请求（共享）锁。\n\
  \n```sql\nDECLARE @Price INT ;\nBEGIN TRAN NormalizePrice\nSELECT  @Price = Price\n\
  FROM    dbo.MyProduct AS mp WITH (UPDLOCK)\nWHERE   mp.ProductID = 1 ;\n/*Allow\
  \ transaction 2 to execute*/\nWAITFOR DELAY  '00:00:10'\nIF @Price > 10\nUPDATE\
  \  dbo.MyProduct\nSET     Price = Price - 10\nWHERE   ProductID = 1 ;\nCOMMIT\n\
  ```\n\n这个解决方案既防止了数据不一致，也消除了死锁的可能性。如果将隔离级别提高到可重复读没有引入典型的死锁问题，那么它本可以完成任务。由于保留（共享）锁直到事务结束有可能发生死锁，因此通常更倾向于获取（更新）锁，而不是持有（共享）锁，如上所述。\n\
  \n\n"
- "# 可序列化\n\n可序列化（Serializable）是六个隔离级别中最高的。与仅对要访问的行获取锁不同，可序列化隔离级别会对数据集中请求顺序的当前行和下一行获取范围锁。例如，在可序列化隔离级别下执行的\
  \ `SELECT` 语句会对要访问的行及其顺序中的下一行获取一个 (RangeS-S) 锁。这可以防止其他事务在第一个事务操作的数据集中添加行，并保护第一个事务在其事务范围内不会在其数据集中发现新行。在事务内的数据集中发现新行也称为*幻读*。\n\
  \n要理解可序列化隔离级别的必要性，让我们考虑一个例子。假设公司中的一个组（`GroupID = 10`）有一笔 100 美元的基金，需要在该组员工中作为奖金分配。奖金支付后的基金余额应为\
  \ 0 美元。考虑以下测试表：\n\n```sql\nDROP TABLE IF EXISTS dbo.MyEmployees;\nGO\nCREATE TABLE\
  \ dbo.MyEmployees (EmployeeID INT,\nGroupID INT,\nSalary MONEY);\nCREATE CLUSTERED\
  \ INDEX i1 ON dbo.MyEmployees (GroupID);\n--Employee 1 in group 10\nINSERT INTO\
  \ dbo.MyEmployees\nVALUES (1, 10, 1000),\n--Employee 2 in group 10\n(2, 10, 1000),\n\
  --Employees 3 & 4 in different groups\n(3, 20, 1000),\n(4, 9, 1000);\n```\n\n所述的业务功能可以实现如下：\n\
  \n```sql\nDECLARE @Fund MONEY = 100,\n@Bonus MONEY,\n@NumberOfEmployees INT;\nBEGIN\
  \ TRAN PayBonus\nSELECT  @NumberOfEmployees = COUNT(*)\nFROM    dbo.MyEmployees\n\
  WHERE   GroupID = 10;\n/*Allow transaction 2 to execute*/\nWAITFOR DELAY  '00:00:10';\n\
  IF @NumberOfEmployees > 0\nBEGIN\nSET @Bonus = @Fund / @NumberOfEmployees;\nUPDATE\
  \  dbo.MyEmployees\nSET     Salary = Salary + @Bonus\nWHERE   GroupID = 10;\nPRINT\
  \ 'Fund balance =\n' + CAST((@Fund - (@@ROWCOUNT * @Bonus)) AS VARCHAR(6)) + ' \
  \  $';\nEND\nCOMMIT\n```\n\n您会看到返回的基金余额值为 0 美元，因为更新成功完成。`PayBonus` 事务在单用户环境中运行良好。然而，在多用户环境中，存在问题。\n\
  \n考虑另一个事务，该事务添加一个新员工到 `GroupID = 10`，如下所示，并且从第二个连接并发执行（在 `PayBonus` 事务开始后立即执行）：\n\
  \n```sql\nBEGIN TRAN NewEmployee\nINSERT  INTO MyEmployees\nVALUES  (5, 10, 1000);\n\
  COMMIT\n```\n\n`PayBonus` 事务后的基金余额将是 -50 美元！尽管新员工可能喜欢这样，但小组基金将出现赤字。这导致了数据逻辑状态的不一致。\n\
  \n为了防止这种数据不一致，应阻止在操作下的组（或数据集）中添加新员工。在讨论的五个隔离级别中，只有快照隔离可以提供类似的功能，因为事务不仅需要受到现有数据的保护，还需要防止新数据进入数据集。可序列化隔离级别可以通过在受影响的行以及由\
  \ `GroupID` 列上的 `MyEmployees` 索引确定的顺序中的下一行上获取范围锁来提供这种隔离。因此，通过将事务隔离级别设置为可序列化，可以防止\
  \ `PayBonus` 事务的数据不一致。\n\n请记住首先重新创建表。\n\n```sql\nSET TRANSACTION ISOLATION LEVEL\
  \ SERIALIZABLE;\nGO\nDECLARE @Fund MONEY = 100,\n@Bonus MONEY,\n@NumberOfEmployees\
  \ INT;\nBEGIN TRAN PayBonus\nSELECT  @NumberOfEmployees = COUNT(*)\nFROM    dbo.MyEmployees\n\
  WHERE   GroupID = 10;\n/*Allow transaction 2 to execute*/\nWAITFOR DELAY  '00:00:10';\n\
  IF @NumberOfEmployees > 0\nBEGIN\nSET @Bonus = @Fund / @NumberOfEmployees;\nUPDATE\
  \  dbo.MyEmployees\nSET     Salary = Salary + @Bonus\nWHERE   GroupID = 10;\nPRINT\
  \ 'Fund balance =\n' + CAST((@Fund - (@@ROWCOUNT * @Bonus)) AS VARCHAR(6)) + ' \
  \  $';\nEND\nCOMMIT\nGO\n--Back to default\nSET TRANSACTION ISOLATION LEVEL READ\
  \ COMMITTED ;\nGO\n```\n\n可序列化隔离级别的效果也可以在查询级别通过在 `SELECT` 语句上使用 `HOLDLOCK` 锁定提示来实现，如下所示：\n\
  \n```sql\nDECLARE @Fund MONEY = 100,\n@Bonus MONEY,\n@NumberOfEmployees INT ;\n\
  BEGIN TRAN PayBonus\nSELECT  @NumberOfEmployees = COUNT(*)\nFROM    dbo.MyEmployees\
  \ WITH (HOLDLOCK)\nWHERE   GroupID = 10 ;\n/*Allow transaction 2 to execute*/\n\
  WAITFOR DELAY  '00:00:10' ;\nIF @NumberOfEmployees > 0\nBEGIN\nSET @Bonus = @Fund\
  \ / @NumberOfEmployees\nUPDATE  dbo.MyEmployees\nSET     Salary = Salary + @Bonus\n\
  WHERE   GroupID = 10 ;\nPRINT 'Fund balance =\n' + CAST((@Fund - (@@ROWCOUNT * @Bonus))\
  \ AS VARCHAR(6)) + '   $' ;\nEND\nCOMMIT\n```\n\n您可以通过在 `PayBonus` 事务执行时从另一个连接查询\
  \ `sys.dm_tran_locks` 来观察该事务获取的范围锁，如图 21-6 所示。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig6_HTML.jpg](img/323849_5_En_21_Fig6_HTML.jpg)\n\
  \n图 21-6\n\nsys.dm_tran_locks 的输出显示授予序列化事务的范围锁\n\n`sys.dm_tran_locks` 的输出显示，在三个索引行上获取了共享范围\
  \ (RangeS-S) 锁：`GroupID = 10` 中的第一个员工、`GroupID = 10` 中的第二个员工以及 `GroupID = 20` 中的第三个员工。这些范围锁阻止了任何新员工进入\
  \ `GroupID = 10`。\n\n刚刚显示的范围锁引入了一些有趣的副作用。\n\n*   在此期间，无法添加 `GroupID` 在 10 到 20 之间的新员工。例如，尝试添加\
  \ `GroupID` 为 15 的新员工将被 `PayBonus` 事务阻止。\n\n```sql\n    BEGIN TRAN NewEmployee\n\
  \    INSERT  INTO dbo.MyEmployees\n    VALUES  (6, 15, 1000);\n    COMMIT\n```\n\
  \n*   如果 `PayBonus` 事务的数据集最终是按索引排序的现有数据中的最后一组，那么在数据集最后一行之后所需的范围锁将获取在表中最后可能的数据值上。\n\
  \n要理解此行为，请删除 `GroupID > 10` 的员工，以使 `GroupID = 10` 数据集成为聚簇索引（或表）中的最后一组数据。\n\n```sql\n\
  DELETE  dbo.MyEmployees\nWHERE   GroupID > 10;\n```\n\n再次运行更新后的奖金和 `NewEmployee`\
  \ 事务。图 21-7 显示了 `PayBonus` 事务的 `sys.dm_tran_locks` 的输出结果。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig7_HTML.jpg](img/323849_5_En_21_Fig7_HTML.jpg)\n\
  \n图 21-7\n\nsys.dm_tran_locks 的输出显示授予序列化事务的扩展范围锁\n\n如图 21-7 所示，聚簇索引中最后一行（`KEY =\
  \ ffffffffffff`）上的范围锁将阻止添加所有 `GroupID` 大于或等于 10 的员工。您知道锁在最后一行上，不是因为它在 `sys.dm_tran_locks`\
  \ 的输出中以可见的方式显示，而是因为您之前已经清除了直到该行的所有内容。例如，尝试添加 `GroupID = 999` 的新员工将被 `PayBonus` 事务阻止。\n\
  \n```sql\nBEGIN TRAN NewEmployee\nINSERT  INTO dbo.MyEmployees\nVALUES  (7, 999,\
  \ 1000);\nCOMMIT\n```\n\n\n\n"
- "# 猜猜如果表的 `GroupID` 列上没有索引会发生什么？\n\n（换句话说，如果 `WHERE` 子句中的列没有索引）？在你思考的同时，我会在另一个列上重新创建带聚集索引的表。\n\
  \n```sql\nDROP TABLE IF EXISTS dbo.MyEmployees;\nGO\nCREATE TABLE dbo.MyEmployees\
  \ (EmployeeID INT,\nGroupID INT,\nSalary MONEY);\nCREATE CLUSTERED INDEX i1 ON dbo.MyEmployees\
  \ (EmployeeID);\n--Employee 1 in group 10\nINSERT INTO dbo.MyEmployees\nVALUES (1,\
  \ 10, 1000),\n--Employee 2 in group 10\n(2, 10, 1000),\n--Employees 3 & 4 in different\
  \ groups\n(3, 20, 1000),\n(4, 9, 1000);\n```\n\n现在重新运行更新后的奖金查询和新员工查询。图 21-8 显示了`PayBonus`事务的`sys.dm_tran_locks`输出结果。\n\
  \n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig8_HTML.jpg](img/323849_5_En_21_Fig8_HTML.jpg)\n\
  \n图 21-8\n\n`sys.dm_tran_locks`的输出，显示了在`WHERE`子句列上无索引时授予可序列化事务的范围锁\n\n再次说明，如图 21-8\
  \ 所示，新聚集索引中最后一行可能的行（`KEY = ffffffffffff`）上的范围锁，将阻止任何新行添加到表中。我将在本章后面的“索引对可序列化隔离级别影响”一节中讨论这种广泛锁定背后的原因。\n\
  \n正如你所见，可序列化隔离级别不仅像可重复读隔离级别一样持有共享锁直到事务结束，还通过持有范围锁来防止任何新行出现在数据集中。因为这种增加的阻塞会损害数据库并发性，所以你应该避免使用可序列化隔离级别。如果你必须使用可序列化，那么请确保拥有良好的索引和查询来优化性能，以最小化事务的大小和持续时间。\n\
  \n## 快照\n\n快照隔离是自 SQL Server 2005 以来可用的第二种基于行版本控制的隔离级别。与已提交读快照隔离不同，快照隔离需要在事务开始时显式调用\
  \ `SET TRANSACTION ISOLATION LEVEL`。它还需要在数据库上设置隔离级别。快照隔离旨在成为比已提交读快照隔离更严格的隔离级别。快照隔离将尝试对其打算修改的数据放置排他锁。如果该数据上已有锁，快照事务将失败。它提供事务级读一致性，这使得它比已提交读快照更适合财务类型的系统。\n\
  \n## 索引对锁定的影响\n\n索引影响表上的锁定行为。在没有索引的表上，锁的粒度是 `RID`、`PAG`（包含 `RID` 的页面）和 `TAB`。向表添加索引会影响要锁定的资源。例如，考虑以下没有索引的测试表：\n\
  \n```sql\nDROP TABLE IF EXISTS dbo.Test1;\nGO\nCREATE TABLE dbo.Test1 (C1 INT,\n\
  C2 DATETIME);\nINSERT INTO dbo.Test1\nVALUES (1, GETDATE());\n```\n\n接下来，观察该表上事务的锁定行为：\n\
  \n```sql\nBEGIN TRAN LockBehavior\nUPDATE  dbo.Test1 WITH (REPEATABLEREAD)  --Hold\
  \ all acquired locks\nSET     C2 = GETDATE()\nWHERE   C1 = 1 ;\n--Observe lock behavior\
  \ from another connection\nWAITFOR DELAY  '00:00:10' ;\nCOMMIT\n```\n\n图 21-9 显示了适用于测试表的`sys.dm_tran_locks`输出。\n\
  \n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig9_HTML.jpg](img/323849_5_En_21_Fig9_HTML.jpg)\n\
  \n图 21-9\n\n`sys.dm_tran_locks`的输出，显示了无索引表上授予的锁\n\n事务获取了以下锁：\n\n*   表上的 (IX) 锁\n\
  *   包含数据行的页面上的 (IX) 锁\n*   表中数据行上的 (X) 锁\n\n当 `resource_type` 是对象时，`sys.dm_tran_locks`\
  \ 中的 `resource_associated_entity_id` 列值指示锁所放置对象的 `objectid`。你可以从 `sys.object` 系统表中获取锁所放置的具体对象名称，如下所示：\n\
  \n```sql\nSELECT OBJECT_NAME();\n```\n\n索引对表锁定行为的影响随 `WHERE` 子句列上索引的类型而异。这种差异源于非聚集索引和聚集索引的叶级页与表的数据页具有不同的关系。让我们探讨一下这些索引对表锁定行为的影响。\n\
  \n### 非聚集索引的影响\n\n因为非聚集索引的叶级页与表的数据页是分开的，所以与非聚集索引关联的资源也受到保护以防止损坏。SQL Server 会自动确保这一点。要查看实际效果，请在测试表上创建一个非聚集索引。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX iTest ON dbo.Test1(C1);\n```\n\n再次运行 `LockBehavior`\
  \ 事务并从另一个连接查询 `sys.dm_tran_locks`，你会得到如图 21-10 所示的结果。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig10_HTML.jpg](img/323849_5_En_21_Fig10_HTML.jpg)\n\
  \n图 21-10\n\n`sys.dm_tran_locks`的输出，显示了非聚集索引对锁定行为的影响\n\n事务获取了以下锁：\n\n*   包含非聚集索引行的页面上的\
  \ (IU) 锁\n*   索引页中非聚集索引行上的 (U) 锁\n*   表上的 (IX) 锁\n*   包含数据行的页面上的 (IX) 锁\n*   数据页中数据行上的\
  \ (X) 锁\n\n请注意，只有行级和页级锁直接与非聚集索引关联。非聚集索引的下一个更高的锁粒度级别是对应表上的表级锁。\n\n因此，非聚集索引会给表带来额外的锁定开销。你可以通过在\
  \ `ALTER INDEX` 中使用 `ALLOW_ROW_LOCKS` 和 `ALLOW_PAGE_LOCKS` 选项来避免索引上的锁定开销。不过要明白，这是一种权衡，可能会涉及性能损失，并且需要仔细测试以确保它不会对你的系统产生负面影响。\n\
  \n```sql\nALTER INDEX iTest ON dbo.Test1\nSET (ALLOW_ROW_LOCKS = OFF ,ALLOW_PAGE_LOCKS=\
  \ OFF);\nBEGIN TRAN LockBehavior\nUPDATE  dbo.Test1 WITH (REPEATABLEREAD)  --Hold\
  \ all acquired locks\nSET     C2 = GETDATE()\nWHERE   C1 = 1;\n--Observe lock behavior\
  \ using sys.dm_tran_locks\n--from another connection\nWAITFOR DELAY  '00:00:10';\n\
  COMMIT\nALTER INDEX iTest ON dbo.Test1\nSET (ALLOW_ROW_LOCKS = ON ,ALLOW_PAGE_LOCKS=\
  \ ON);\n```\n\n你可以在使用索引时使用这些选项来启用/禁用索引上的 `KEY` 锁和 `PAG` 锁。仅禁用 `KEY` 锁会导致索引上的最低锁粒度为\
  \ `PAG` 锁。在索引上配置的锁粒度设置将一直有效，直到重新配置为止。\n\n\n### 注意\n\n修改锁设置这样的操作，应是在尝试过许多其他选项之后的最后手段。这可能会导致显著的锁开销，严重影响系统性能。\n\
  \n图 21-11 展示了从另一个连接执行 `sys.dm_tran_locks` 的输出结果。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig11_HTML.jpg](img/323849_5_En_21_Fig11_HTML.jpg)\n\
  \n**图 21-11**\n\n`sys.dm_tran_locks` 的输出，展示了 `sp_index` 选项对锁粒度的影响\n\n事务在测试表上获得的唯一锁是一个表级别的排他锁（X）。\n\
  \n从新的锁行为可以看出，禁用 `KEY` 锁会将锁粒度升级到表级别。这将阻塞对该表或其索引的所有并发访问；因此，它会严重损害数据库并发性。但是，如果非聚集索引在阻塞场景中成为争用点，那么禁用索引上的\
  \ `PAG` 锁（只允许索引上的 `KEY` 锁）可能是有益的。\n\n### 注意\n\n使用此选项可能会产生严重的副作用。应仅作为最后手段使用。\n\n\
  ### 聚集索引的影响\n\n对于聚集索引，索引的叶级页与表的数据页是相同的，因此聚集索引可以用来避免非聚集索引引入的锁定额外页（叶级页）和行的开销。为了理解与聚集索引相关的锁开销，请将前面的非聚集索引转换为聚集索引。\n\
  \n```sql\nCREATE CLUSTERED INDEX iTest ON dbo.Test1(C1) WITH DROP_EXISTING;\n```\n\
  \n如果再次运行锁定脚本，并在不同的连接中查询 `sys.dm_tran_locks`，你应该会看到 `LockBehavior` 事务在 `iTest` 上的结果输出，如图\
  \ 21-12 所示。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig12_HTML.jpg](img/323849_5_En_21_Fig12_HTML.jpg)\n\
  \n**图 21-12**\n\n`sys.dm_tran_locks` 的输出，展示了聚集索引对锁行为的影响\n\n事务获取了以下锁：\n\n*   表上的意向排他锁（IX）\n\
  *   包含聚集索引行的页上的意向排他锁（IX）\n*   表或聚集索引中的聚集索引行上的排他锁（X）\n\n聚集索引行和叶级页上的锁实际上也是数据行和数据页上的锁，因为数据页和叶级页是相同的。因此，与非聚集索引相比，聚集索引减少了表上的锁开销。\n\
  \n聚集索引减少锁开销是使用聚集索引优于堆表的另一个好处。\n\n### 索引对可序列化隔离级别影响\n\n索引在确定可序列化隔离级别引起的阻塞程度方面起着重要作用。在\
  \ `WHERE` 子句列（导致数据集被锁定的列）上存在索引，允许 SQL Server 确定要锁定行的顺序。例如，考虑在可序列化隔离级别一节中使用的例子。`SELECT`\
  \ 语句使用对 `GroupID` 列的过滤器来形成其数据集，如下所示：\n\n```sql\nDECLARE @NumberOfEmployees INT;\n\
  SELECT  @NumberOfEmployees = COUNT(*)\nFROM    dbo.MyEmployees WITH (HOLDLOCK)\n\
  WHERE   GroupID = 10;\n```\n\n`GroupID` 列上存在聚集索引，允许 SQL Server 在要访问的行和正确顺序的下一行上获取（RangeS-S）锁。\n\
  \n如果移除 `GroupID` 列上的索引，则 SQL Server 无法确定应在其上获取范围锁的行，因为不再保证行的顺序。因此，`SELECT` 语句在表级别获取（IS）锁，而不是在行级别获取更低粒度的锁，如图\
  \ 21-13 所示。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig13_HTML.jpg](img/323849_5_En_21_Fig13_HTML.jpg)\n\
  \n**图 21-13**\n\n`sys.dm_tran_locks` 的输出，展示了在 `WHERE` 子句列上没有索引时 `SELECT` 语句被授予的锁\n\
  \n如果在过滤列上没有索引，你会显著增加可序列化隔离级别引起的阻塞程度。这是在 `WHERE` 子句列上创建索引的另一个好理由。\n\n## 捕获阻塞信息\n\n\
  尽管阻塞对于将事务与其他并发事务隔离是必要的，但有时它可能上升到过高的水平，对数据库并发性产生不利影响。在最简单的阻塞场景中，一个会话在资源上获得的锁会阻塞另一个请求该资源上不兼容锁的会话。为了提高并发性，分析阻塞原因并采取适当的解决方案非常重要。\n\
  \n在阻塞场景中，你需要以下信息来清楚地了解阻塞的原因：\n\n*   阻塞和被阻塞会话的连接信息：你可以从 `sys.dm_os_waiting_tasks`\
  \ 动态管理视图获取此信息。\n*   阻塞和被阻塞会话的锁信息：你可以从 `sys.dm_tran_locks` DMO 获取此信息。\n*   阻塞和被阻塞会话最后执行的\
  \ SQL 语句：你可以使用 `sys.dm_exec_requests` DMV 结合 `sys.dm_exec_sql_text` 和 `sys.dm_exec_queryplan`\
  \ 或扩展事件来获取此信息。\n\n你也可以通过运行活动监视器从 SQL Server Management Studio 获取以下信息。进程页面提供了所有 SPID\
  \ 的连接信息。这显示了被阻塞的 SPID、阻塞它们的进程以及任何阻塞链的头部，并详细说明了进程已运行多长时间、其 SPID 及其他信息。可以使用扩展事件配合阻塞报告来收集大量相同的信息。对于锁的即时检查，请使用\
  \ DMO；对于扩展监控和历史跟踪，你会需要使用扩展事件。你可以在“扩展事件和 blocked_process_report 事件”一节中找到更多相关内容。\n\
  \n为了为收集阻塞信息的过程提供更强大的功能和灵活性，SQL Server 管理员可以使用 SQL 脚本来提供此处列出的相关信息。\n\n\n### 使用 SQL\
  \ 捕获阻塞信息\n\n要获取关于被阻塞进程和阻塞进程的足够信息，你可以调动多个动态管理视图。此查询将根据那些正在等待的进程，显示识别被阻塞进程所必需的信息。你可以轻松地添加筛选条件，例如仅访问阻塞超过特定时长或仅在特定数据库内的进程，等等。\n\
  \n```\nSELECT  dtl.request_session_id AS WaitingSessionID,\nder.blocking_session_id\
  \ AS BlockingSessionID,\ndowt.resource_description,\nder.wait_type,\ndowt.wait_duration_ms,\n\
  DB_NAME(dtl.resource_database_id) AS DatabaseName,\ndtl.resource_associated_entity_id\
  \ AS WaitingAssociatedEntity,\ndtl.resource_type AS WaitingResourceType,\ndtl.request_type\
  \ AS WaitingRequestType,\ndest.[text] AS WaitingTSql,\ndtlbl.request_type BlockingRequestType,\n\
  destbl.[text] AS BlockingTsql\nFROM    sys.dm_tran_locks AS dtl\nJOIN    sys.dm_os_waiting_tasks\
  \ AS dowt\nON dtl.lock_owner_address = dowt.resource_address\nJOIN    sys.dm_exec_requests\
  \ AS der\nON der.session_id = dtl.request_session_id\nCROSS APPLY sys.dm_exec_sql_text(der.sql_handle)\
  \ AS dest\nLEFT JOIN sys.dm_exec_requests derbl\nON derbl.session_id = dowt.blocking_session_id\n\
  OUTER APPLY sys.dm_exec_sql_text(derbl.sql_handle) AS destbl\nLEFT JOIN sys.dm_tran_locks\
  \ AS dtlbl\nON derbl.session_id = dtlbl.request_session_id;\n```\n\n要理解如何分析阻塞场景以及阻塞脚本提供的相关信息，请考虑以下示例。首先，创建一个测试表。\n\
  \n```\nDROP TABLE IF EXISTS dbo.BlockTest;\nGO\nCREATE TABLE dbo.BlockTest (C1 INT,\n\
  C2 INT,\nC3 DATETIME);\nINSERT INTO dbo.BlockTest\nVALUES (11, 12, GETDATE()),\n\
  (21, 22, GETDATE());\n```\n\n现在打开三个连接，并发运行以下两个查询。运行后，在第三个连接中使用阻塞脚本。在一个连接中执行以下代码：\n\
  \n```\nBEGIN TRAN User1\nUPDATE  dbo.BlockTest\nSET     C3 = GETDATE();\n```\n\n\
  接下来，在 `User1` 事务执行期间，执行此代码：\n\n```\nBEGIN TRAN User2\nSELECT  C2\nFROM    dbo.BlockTest\n\
  WHERE   C1 = 11;\nCOMMIT\n```\n\n这就创建了一个简单的阻塞场景，其中 `User1` 事务阻塞了 `User2` 事务。\n\n\
  阻塞脚本的输出提供了立即有助于开始解决阻塞问题的信息。首先，你可以识别具体的会话信息，包括阻塞会话和等待会话的会话 ID。你可以立即获取等待资源的描述、等待类型以及进程已等待的时长（以毫秒为单位）。正是这个值允许你提供筛选条件以消除属于正常处理一部分的短期阻塞。\n\
  \n提供了数据库名称，因为阻塞可能发生在系统中的任何地方，而不仅仅是在 AdventureWorks2017 中。你需要在它发生的地方识别它。为等待进程检索了基本锁定信息中的资源和类型。\n\
  \n会显示阻塞请求类型，并且如果可用，会同时显示等待的 T-SQL 和阻塞的 T-SQL。一旦你获得了发生阻塞的对象，并拥有 T-SQL（以便你能确切理解进程是如何阻塞或被阻塞的），这便是消除或减少阻塞量的关键部分。所有这些信息都可以从一个简单的查询中获得。图\
  \ 21-14 显示了先前被阻塞进程的示例输出。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig14_HTML.jpg](img/323849_5_En_21_Fig14_HTML.jpg)\n\
  图 21-14 阻塞脚本的输出\n\n务必返回到连接 1 并提交或回滚事务。\n\n### 扩展事件与 `blocked_process_report` 事件\n\
  \n扩展事件提供了一个名为 `blocked_process_report` 的事件。此事件基于你提供给系统配置的“被阻塞进程阈值”来工作。此脚本将阈值设置为五秒：\n\
  \n```\nEXEC sp_configure 'show advanced option', '1';\nRECONFIGURE;\nEXEC sp_configure\n\
  'blocked process threshold',\n5;\nRECONFIGURE;\n```\n\n在大多数系统中，这通常是一个非常低的值。如果你有既定的性能服务级别协议\
  \ (SLA)，你可以将其用作阈值。设置该值后，你可以配置警报，以便在任何进程被阻塞的时间超过你设定的值时，发送电子邮件、推文或即时消息。它也充当扩展事件的触发器。`blocked\
  \ process threshold` 的默认值为零，意味着它实际上永远不会触发。如果你打算使用扩展事件来跟踪被阻塞的进程，你将需要调整此默认值。\n\n要设置一个捕获\
  \ `blocked_process_report` 的会话，首先打开扩展事件会话属性窗口。（虽然在生产环境中你应该使用脚本来设置此事件，但我将展示如何使用 GUI。）为会话提供一个名称，然后导航到“事件”页面。在“事件库”文本框中键入\
  \ `block`，这将找到 `blocked_process_report` 事件。通过单击右箭头选择该事件。你应该会看到类似于图 21-15 的内容。\n\n\
  ![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig15_HTML.jpg](img/323849_5_En_21_Fig15_HTML.jpg)\n\
  图 21-15 在扩展事件窗口中选择的“被阻塞进程报告”事件\n\n所有事件字段都已为你预选。如果你仍然运行着上一节中创建阻塞的查询，你现在只需单击“运行”按钮即可捕获事件。否则，请返回到我们在上一节中用于生成被阻塞进程报告的查询，并在两个不同的连接中运行它们。在超过被阻塞进程阈值后，你会看到事件触发……并且会持续触发。如果你配置成那样并且让连接保持运行，它将每五秒触发一次。实时数据流中的输出如图\
  \ 21-16 所示。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig16_HTML.jpg](img/323849_5_En_21_Fig16_HTML.jpg)\n\
  图 21-16 `blocked_process_report` 事件的输出\n\n有些信息不言自明；要深入了解细节，你需要查看 `blocked_process`\
  \ 字段中生成的 XML。\n\n```\nBEGIN TRAN User2\nSELECT  C2\nFROM    dbo.BlockTest\nWHERE\
  \   C1 = 11;\nCOMMIT   \n\nBEGIN TRAN User1\nUPDATE  dbo.BlockTest\nSET     C3 =\
  \ GETDATE();   \n```\n\n如果你浏览此 XML，这些元素就很清晰。`<blocked-process>` 显示有关被阻塞进程的信息，包括熟悉的信息，例如会话\
  \ ID（此处标记为老式的 SPID）、数据库 ID 等。你可以在 `<inputbuf>` 元素中看到查询。诸如 `lockMode` 之类的详细信息可在 `<process>`\
  \ 元素中获得。请注意，XML 并不包括一些你可以轻松地从 T-SQL 查询中获取的其他信息，例如被阻塞和等待进程的查询字符串。但是，有了可用的 SPID，如果缓存中可用，你可以从中获取它们，或者你可以将“被阻塞进程报告”与其他事件（如\
  \ `rpc_starting`）结合使用以显示查询信息。然而，这样做会增加在数据库中长期使用那些事件的开销。如果你知道存在阻塞问题，这可以作为短期监控项目的一部分，以捕获必要的阻塞信息。\n\
  \n\n\n## 阻塞解决方案\n\n在分析完阻塞的原因后，下一步是确定任何可能的解决方案。以下是你可以用来实现这一目标的一些技术：\n\n*   优化由阻塞和被阻塞的\
  \ SPID 执行的查询。\n*   降低隔离级别。\n*   对争用数据进行分区。\n*   在争用数据上使用覆盖索引。\n\n### 注意\n\n避免阻塞的详细建议列表将在本章后面的“减少阻塞的建议”部分出现。\n\
  \n为了理解这些解决技术，让我们将它们依次应用到前面的阻塞场景中。\n\n#### 优化查询\n\n优化由阻塞和被阻塞进程执行的查询有助于减少阻塞持续时间。在阻塞场景中，参与阻塞的进程执行的查询如下：\n\
  \n*   阻塞进程：\n\n```\nBEGIN TRAN User1\nUPDATE  dbo.BlockTest\nSET     C3 = GETDATE();\n\
  ```\n\n*   被阻塞进程：\n\n```\nBEGIN TRAN User2\nSELECT  C2\nFROM    dbo.BlockTest\n\
  WHERE   C1 = 11;\nCOMMIT\n```\n\n请注意，除了第一个查询缺少 `COMMIT` 外，在没有 `WHERE` 子句的情况下运行 `UPDATE`\
  \ 肯定是有潜在问题的，并且性能不会好。随着数据规模的增长，情况会变得更糟。然而，这只是一个用于演示目的的测试。\n\n接下来，让我们分析由阻塞和被阻塞的 SPID\
  \ 执行的各个 SQL 语句，以优化它们的性能。\n\n*   阻塞 SPID 的 `UPDATE` 语句在没有 `WHERE` 子句的情况下访问数据。这使得该查询在大表上本质上是成本高昂的。如果可能，请使用适当的\
  \ `WHERE` 子句将 `UPDATE` 语句的操作拆分为多个批次。记住尝试使用基于集合的操作，例如 `TOP` 语句来限制行数。如果批次的各个 `UPDATE`\
  \ 语句在单独的事务中执行，那么在一个事务内持有资源锁的数量会更少，持续时间也更短。这也有助于减少或避免锁升级。\n\n*   被阻塞的 SPID 执行的 `SELECT`\
  \ 语句在 `C1` 列上有一个 `WHERE` 子句。从测试表的索引结构可以看出，该列上没有索引。为了优化 `SELECT` 语句，你可以在 `C1` 列上创建一个聚集索引。\n\
  \n```\nCREATE CLUSTERED INDEX i1 ON dbo.BlockTest(C1);\n```\n\n### 注意\n\n由于 `example`\
  \ 表适合放在一个页面内，添加聚集索引对查询性能不会有太大影响。然而，随着表中行数的增加，索引的有益效果将变得更加明显。\n\n优化查询减少了进程持有锁的持续时间。查询优化减少了阻塞的影响，但它并不能完全阻止阻塞。但是，只要优化后的查询在可接受的性能限制内执行，少量的阻塞可以忽略不计。\n\
  \n#### 降低隔离级别\n\n另一种解决阻塞的方法是尽可能使用更低的隔离级别。`User2` 事务的 `SELECT` 语句在请求数据行的共享 (S) 锁时被阻塞。可以利用\
  \ `SNAPSHOT` 隔离级别（已提交读快照）来减轻此事务的隔离级别，这样 `SELECT` 语句就不会请求 (S) 锁。可以使用 `SET` 语句为连接配置已提交读快照隔离级别。\n\
  \n```\nSET TRANSACTION ISOLATION LEVEL SNAPSHOT;\nGO\nBEGIN TRAN User2\nSELECT \
  \ C2\nFROM    dbo.BlockTest\nWHERE   C1 = 11;\nCOMMIT\nGO\n--恢复为默认设置\nSET TRANSACTION\
  \ ISOLATION LEVEL READ COMMITTED;\nGO\n```\n\n此示例展示了降低隔离级别的效用。使用此 `SNAPSHOT` 隔离级别远优于使用任何可能导致脏读的方法，因为脏读可能导致数据不正确或丢失、多余的行。\n\
  \n### 对争用数据进行分区\n\n在处理大数据集或可以离散存储的数据时，可以对数据应用表分区。分区数据是水平拆分的，即按某些值拆分（例如，按月拆分销售数据）。这允许事务在各个分区上并发执行，而不会相互阻塞。这些独立的分区在查询、更新和插入时被视为单个单元；只有存储和访问由\
  \ SQL Server 分隔。应注意，分区仅在 SQL Server 的开发者版和企业版中可用。\n\n在前面的阻塞场景中，可以按日期分离数据。如果你关心性能，这需要设置多个文件组（或者如果担心管理问题，只需将所有内容放在\
  \ `PRIMARY` 上），并根据定义的规则拆分数据。一旦 `UPDATE` 语句有了 `WHERE` 子句，那么它与原始的 `SELECT` 语句就能够在两个独立的分区上并发执行。这要求\
  \ `WHERE` 子句仅在分区键列上进行筛选。一旦你混合了其他条件，你不太可能从分区消除中受益，这意味着性能可能会更差，而不是更好。\n\n### 注意\n\n\
  如果操作得当，分区可以提高大数据集的性能和并发性。但是，分区几乎完全是一种数据管理解决方案，而不是性能调整选项。\n\n### 使用覆盖索引\n\n在阻塞场景中，你应该分析阻塞或被阻塞进程的查询是否可以通过覆盖索引完全满足。如果其中一个进程的查询可以通过覆盖索引满足，那么它将阻止该进程在争用资源上请求锁。此外，如果另一个进程不需要在覆盖索引上加锁（以维护数据完整性），那么两个进程将能够并发执行而不会相互阻塞。\n\
  \n例如，在前面的阻塞场景中，被阻塞进程的 `SELECT` 语句可以通过在 `C1` 和 `C2` 列上的覆盖索引完全满足。\n\n```\nCREATE NONCLUSTERED\
  \ INDEX iAvoidBlocking ON dbo.BlockTest(C1,  C2) ;\n```\n\n阻塞进程的事务无需在覆盖索引上获取锁，因为它只访问表的\
  \ `C3` 列。覆盖索引将允许 `SELECT` 语句获取 `C1` 和 `C2` 列的值，而无需访问基表。因此，被阻塞进程的 `SELECT` 语句可以在覆盖索引行上获取共享\
  \ (S) 锁，而不会被阻塞进程在数据行上获取的排他 (X) 阻塞。这允许两个事务并发执行，没有任何阻塞。\n\n将覆盖索引视为一种“复制”部分表数据的机制，其中一致性由\
  \ SQL Server 自动维护。如果此覆盖索引主要是只读的，它可以让某些事务从“复制”数据中得到服务，而基表（和其他索引）可以继续为其他事务服务。这种方法的权衡之处在于需要额外的存储空间，以及在数据修改时可能存在额外的开销。\n\
  \n\n\n## 减少阻塞的建议\n\n对于数据库应用而言，单用户性能和随多用户扩展的能力都很重要。在多用户环境中，确保数据库操作不会长时间持有数据库资源至关重要。这使得数据库能够支持大量操作（或数据库用户）并发执行，而不会出现严重的性能下降。以下是一份用于减少/避免数据库阻塞的技巧列表：\n\
  \n*   保持事务简短。\n    *   在事务中执行最少量的步骤/逻辑。\n    *   不要在事务中执行代价高昂的外部活动，例如发送确认电子邮件或执行由最终用户驱动的操作。\n\
  \    *   优化查询。\n    *   根据需要创建索引，以确保系统中查询的最佳性能。\n    *   避免在频繁更新的列上创建聚集索引。更新聚集索引键列需要对聚集索引和所有非聚集索引加锁（因为它们的行定位器包含聚集索引键）。\n\
  \    *   考虑使用覆盖索引来服务于被阻塞的 `SELECT` 语句。\n\n*   使用查询超时或资源调控器来控制失控的查询。有关资源调控器的更多信息，请参阅在线丛书：[`http://bit.ly/1jiPhfS`](http://bit.ly/1jiPhfS)。\n\
  \    *   避免因错误处理例程或应用程序逻辑不佳而失去对事务范围的控制。\n    *   使用 `SET XACT_ABORT ON` 来避免在事务内部出现错误条件时事务保持打开状态。\n\
  \    *   在执行包含事务的 SQL 批处理或存储过程后，从客户端错误处理程序 (`TRY/CATCH`) 执行以下 SQL 语句。\n        ```\n\
  \        IF @@TRANCOUNT > 0 ROLLBACK\n        ```\n\n*   使用所需的最低隔离级别。\n    *   考虑使用行版本控制（`SNAPSHOT`\
  \ 隔离级别之一）来帮助减少争用。\n\n## 自动检测和收集阻塞信息\n\n除了使用扩展事件捕获信息外，您还可以使用 SQL Server 代理自动化检测阻塞条件和收集相关信息的过程。SQL\
  \ Server 提供了表 21-2 中所示的性能监视器计数器来跟踪等待时间量。\n\n**表 21-2**\n\n**性能监视器计数器**\n\n| **对象**\
  \ | **计数器** | **实例** | **描述** |\n| --- | --- | --- | --- |\n| `SQLServer:Locks`\
  \ (对于 SOL Server 命名实例 `MSSOL$<InstanceName>:Locks`) | `Average Wait Time(ms)` |\
  \ `_Total` | 每个导致等待的锁的平均等待时间 |\n|   | `Lock Wait Time (ms)` | `_Total` | 上一秒中锁的总等待时间\
  \ |\n\n您可以创建 SQL Server 警报和作业的组合来自动化以下过程：\n\n1.  使用 `Average Wait Time (ms)` 计数器确定平均等待时间何时超过可接受的阻塞量。根据您的偏好，您也可以使用\
  \ `Lock Wait Time (ms)` 计数器。\n2.  一旦确定了最小等待时间，就设置 `Blocked Process Threshold`。当平均等待时间超过限制时，通过电子邮件通知\
  \ SQL Server DBA 阻塞情况。\n3.  使用阻塞脚本或依赖于阻塞进程报告的跟踪，在一段时间内自动收集阻塞信息。\n\n要设置阻塞进程报告自动运行，首先创建名为“阻塞分析”的\
  \ SQL Server 作业，以便稍后创建的 SQL Server 警报可以使用它。您可以通过以下步骤在 SQL Server Management Studio\
  \ 中创建此 SQL Server 作业来收集阻塞信息：\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig17_HTML.jpg](img/323849_5_En_21_Fig17_HTML.jpg)\n\
  \n**图 21-17**\n\n输入运行阻塞脚本的命令\n\n1.  使用 `blocked_process_report` 事件生成一个扩展事件脚本（如第\
  \ 6 章详述）。\n2.  运行该脚本以在服务器上创建会话，但暂时不要启动它。\n3.  在 Management Studio 中，通过选择 *<ServerName>*\
  \ ➤ SQL Server 代理 ➤ 作业来展开服务器。最后，右键单击并选择新建作业。\n4.  在新建作业对话框的“常规”页上，输入作业名称和其他详细信息。\n\
  5.  在“步骤”页上，单击“新建”，并输入通过 T-SQL 启动和停止会话的命令，如图 21-17 所示。\n\n您可以使用以下命令执行此操作：\n\n```\n\
  ALTER EVENT SESSION Blocking\nON SERVER\nSTATE = START;\nWAITFOR DELAY '00:10';\n\
  ALTER EVENT SESSION Blocking\nON SERVER\nSTATE = STOP;\n```\n\n会话的输出取决于您在创建目标时如何定义目标。\n\
  \n1.  单击“确定”返回到新建作业对话框。\n2.  单击“确定”以创建 SQL Server 作业。将创建处于启用和可运行状态的 SQL Server 作业，以使用跟踪脚本收集十分钟的阻塞信息。\n\
  \n您可以创建 SQL Server 警报来自动化以下任务：\n\n*   通过电子邮件、短信或寻呼机通知 DBA。\n*   执行“阻塞分析”作业以收集十分钟的阻塞信息。\n\
  \n您可以通过以下步骤在 SQL Server 企业管理器中创建 SQL Server 警报：\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig18_HTML.jpg](img/323849_5_En_21_Fig18_HTML.jpg)\n\
  \n**图 21-18**\n\n输入警报名称和其他详细信息\n\n1.  在 Management Studio 中，仍然在对象资源管理器的 SQL 代理区域中，右键单击“警报”并选择“新建警报”。\n\
  2.  在新警报属性对话框的“常规”页上，输入警报名称和其他详细信息，如图 21-18 所示。您需要为其捕获实例信息的特定对象是 `Locks`（图 21-18\
  \ 中的 `MSSQL$GF2008:Locks`）。我选择了 `500ms` 作为希望查询超过该值时知晓的严格 SLA 示例。\n3.  在“响应”页上，定义您认为合适的响应，例如通知操作员。\n\
  4.  单击“确定”返回到新警报的属性对话框。\n5.  在“响应”页上，输入图 21-19 所示的其余信息。\n\n![../images/323849_5_En_21_Chapter/323849_5_En_21_Fig19_HTML.jpg](img/323849_5_En_21_Fig19_HTML.jpg)\n\
  \n**图 21-19**\n\n输入警报触发时要执行的操作\n\n6.  选择“阻塞分析”作业以自动收集阻塞信息。\n7.  输入完所有信息后，单击“确定”以创建\
  \ SQL Server 警报。将创建处于启用状态的 SQL Server 警报以执行预定任务。\n8.  确保 SQL Server 代理正在运行。\n\n\
  SQL Server 警报和作业共同实现了阻塞检测和信息收集过程的自动化。这种自动收集阻塞信息的方式将确保在系统进入大规模阻塞状态时，能够获得足够数量的阻塞信息。\n\
  \n\n\n## 摘要\n\n尽管阻塞是不可避免的，并且实际上对维护事务间的隔离性至关重要，但它有时会对数据库并发性产生不利影响。在多用户数据库应用中，你必须将并发事务之间的阻塞降至最低。\n\
  \nSQL Server 提供了不同的技术来避免/减少阻塞，数据库应用应利用这些技术，以实现随着数据库用户数量增加而线性扩展的能力。当应用程序面临高度阻塞时，你可以使用各种工具收集相关的阻塞信息，以理解阻塞的根本原因。下一步就是使用适当的技术来避免或减少阻塞。\n\
  \n阻塞不仅会损害并发性，而且在进程之间甚至单个进程内发生相互阻塞的情况下，还可能导致数据库请求被突然终止。我们将在下一章中介绍这一被称为 `死锁` 的事件。\n\
  \n"
- "# 22. 死锁的原因与解决方案\n\n在上一章中，我讨论了阻塞的工作原理。阻塞是性能不佳的主要原因之一。阻塞可能导致一种被称为 `死锁` 的特殊情况，这意味着死锁本质上是一个性能问题。当两个或多个事务之间发生死锁时，SQL\
  \ Server 允许一个事务完成，并终止另一个事务，回滚该事务。然后，SQL Server 会向相应的应用程序返回一个错误，通知用户他已被选为死锁的牺牲品。这使得应用程序只有两个选择：重新提交事务，或向最终用户致歉。为了成功完成事务并避免道歉，理解死锁的成因以及处理死锁的方法至关重要。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   死锁基础\n*   用于捕获死锁的错误处理\n*   分析死锁原因的方法\n*   解决死锁的技术\n\n##\
  \ 死锁基础\n\n一个 `死锁` 是一种特殊的阻塞场景，其中两个进程相互阻塞。每个进程在持有自己资源的同时，试图访问被另一个进程锁定的资源。这将导致一种被称为\
  \ `致命拥抱` 的阻塞场景，如图 22-1 所示。\n\n![../images/323849_5_En_22_Chapter/323849_5_En_22_Fig1_HTML.jpg](img/323849_5_En_22_Fig1_HTML.jpg)\n\
  \n图 22-1：一个死锁场景\n\n当两个进程试图在相同资源上升级其锁定机制时，死锁也经常发生。在这种情况下，两个进程都对一个资源（如一个 `RID`）持有共享锁，并且每个进程都试图将锁从共享锁升级为排他锁；然而，在对方释放其共享锁之前，双方都无法完成升级。这同样会导致其中一个进程被选为死锁牺牲品。\n\
  \n最后，单个进程在并行操作期间也可能发生死锁。在并行操作期间，一个线程可能持有一个资源 A 的锁，同时在等待另一个资源 B；与此同时，另一个线程可能持有资源\
  \ B 的锁，同时在等待资源 A。这与涉及多个进程的情况一样，都属于死锁场景，只不过这里涉及的是单个进程内的多个线程。这是一个罕见事件，但有可能发生，并且通常被认为是一个\
  \ bug，可能已在某个累积更新中被修复。\n\n死锁是一种特别讨厌的阻塞类型，因为即使给予无限时间，死锁也无法自行解决。死锁需要一个外部进程来打破循环阻塞。\n\
  \nSQL Server 有一个死锁检测例程，称为 `锁监视器`，它会定期检查 SQL Server 中是否存在死锁。一旦检测到死锁情况，SQL Server\
  \ 会选择参与死锁的会话之一作为 `牺牲品` 来打破循环阻塞。牺牲品通常是估算回滚成本最低的进程，因为这意味着该进程对 SQL Server 来说最容易回滚。此操作涉及撤销牺牲品会话持有的所有资源。SQL\
  \ Server 通过回滚被选为牺牲品的会话的未提交事务来实现这一点。\n\n死锁是一个性能问题，并且像任何性能问题一样，需要处理。与其他性能问题一样，存在一个普遍的痛苦阈值。偶尔发生的罕见死锁并不值得惊慌。然而，频繁且持续发生的死锁绝对是问题。正如你可能遇到一个查询在极少数情况下运行稍长，而不需要大量调优关注一样，你也可能遇到同样不需要你重点关注的死锁情况。请确保你处理的是系统中最为痛苦的部分。\n\
  \n### 选择死锁牺牲品\n\nSQL Server 通过评估参与会话的事务回滚成本来决定哪个会话成为死锁牺牲品，并选择估算成本最低的那个。你可以通过将会话连接的死锁优先级设置为\
  \ `LOW`，来对该会话被选为牺牲品施加一些控制。\n\n```\nSET DEADLOCK_PRIORITY LOW;\n```\n\n这会引导 SQL Server\
  \ 在发生死锁时选择此特定会话作为牺牲品。你可以通过执行以下 `SET` 语句将会话连接的死锁优先级重置为其正常值：\n\n```\nSET DEADLOCK_PRIORITY\
  \ NORMAL;\n```\n\n`SET` 语句也允许将会话标记为 `HIGH` 死锁优先级。这不会阻止给定会话上发生死锁，但会降低给定会话被选为牺牲品的可能性。你甚至可以将优先级级别设置为一个数字值，从\
  \ -10（最低优先级）到 10（最高优先级）。\n\n### 注意\n\n设置死锁优先级不应随意应用。你可能会意外地在某个报表上设置优先级，导致关键任务进程被选为牺牲品。此设置需要仔细测试。\n\
  \n在平局的情况下，会选择其中一个进程作为牺牲品并回滚，就像它的成本最低一样。有些进程对被选为死锁牺牲品是“免疫”的。这些进程在死锁图中被标记出来，并且永远不会被选为死锁牺牲品。我所见过最常见的例子是当进程已经处于回滚状态时。\n\
  \n\n\n### 使用错误处理捕获死锁\n\n当 SQL Server 将某个会话选为受害者时，它会引发一个带有错误号的错误。你可以在 T-SQL 中使用 `TRY/CATCH`\
  \ 结构来处理该错误。SQL Server 通过自动回滚受害者会话的事务来确保数据库的一致性。此回滚操作确保会话返回到其事务开始前相同的状态。在错误处理器中确定是死锁情况后，可以在将错误返回给应用程序之前，尝试在\
  \ T-SQL 中重启事务若干次。\n\n以下 T-SQL 语句展示了一种处理死锁错误的方法示例：\n\n```sql\nDECLARE @retry AS TINYINT\
  \ = 1,\n    @retrymax AS TINYINT = 2,\n    @retrycount AS TINYINT = 0;\nWHILE @retry\
  \ = 1 AND @retrycount <= @retrymax\nBEGIN\n    SET @retry = 0;\n    BEGIN TRY\n\
  \        UPDATE HumanResources.Employee\n        SET LoginID = '54321'\n       \
  \ WHERE BusinessEntityID = 100;\n    END TRY\n    BEGIN CATCH\n        IF (ERROR_NUMBER()\
  \ = 1205)\n        BEGIN\n            SET @retrycount = @retrycount + 1;\n     \
  \       SET @retry = 1;\n        END\n    END CATCH\nEND\n```\n\n`TRY/CATCH` 方法使你能够捕获错误。然后，你可以使用\
  \ `ERROR_NUMBER()` 函数检查错误号，以确定是否发生了死锁。一旦确认是死锁，就有可能尝试重启事务设定的次数——本例中是两次。使用错误捕获将帮助你的应用程序处理间歇性或偶发的死锁，但最佳方法是分析死锁原因并在可能的情况下解决它。\n\
  \n## 死锁分析\n\n有时，你可以通过分析原因来防止死锁发生。你需要以下信息来完成此分析：\n\n*   参与死锁的会话\n*   死锁涉及的资源\n* \
  \  会话执行的查询\n\n### 收集死锁信息\n\n你有四种收集死锁信息的方法：\n\n*   使用扩展事件。\n*   设置跟踪标志 1222。\n* \
  \  设置跟踪标志 1204。\n*   使用跟踪事件。\n\n跟踪标志用于自定义某些 SQL Server 行为，例如在本例中生成死锁信息。但是，它们是一种较旧的捕获此信息的方式。在\
  \ SQL Server 中，自 2008 年起的每个实例上，都有一个名为 `system_health` 的扩展事件会话。此会话自动运行，并且它默认收集的事件之一就是死锁图。这是在不以任何方式修改服务器的情况下立即获取死锁信息的最简单方法。`system_health`\
  \ 会话也是你从 Azure SQL Database 获取死锁信息的方式。\n\n`system_health` 会话默认写入磁盘。文件的大小和数量是有限的，因此根据系统上的活动情况，如果你调查的死锁发生在过去某个时间，你可能会发现死锁信息已丢失。如果你需要收集更长时间的信息并确保捕获尽可能多的事件，扩展事件提供了几种收集死锁信息的方法。这可能是你可以应用于服务器收集死锁信息的最佳方法。你可以使用以下选项：\n\
  \n*   `lock_deadlock`：显示关于死锁事件的基本信息。\n*   `lock_deadlock_chain`：捕获死锁中每个参与者的信息。\n\
  *   `xml:deadlock_report`：显示一个包含死锁原因的 XML 死锁图。\n\n死锁图生成 XML 输出。扩展事件捕获死锁事件后，你可以在\
  \ SSMS 中查看死锁图，既可以使用事件查看器，也可以通过打开 XML 文件（如果你将事件结果输出到那里）。虽然所有三个事件显示的信息类似，但对于基本的死锁信息，最容易理解的是\
  \ `xml:deadlock_report`。在专门监控死锁的情况下，特别是当你试图处理某个特定死锁时，我还建议同时捕获 `lock_deadlock_chain`，以便在你需要时拥有有关涉及死锁的各个会话的更详细信息。对于大多数情况，死锁图应该能提供你需要的信息。\n\
  \n要直接从 `system_health` 会话中检索死锁图，你可以像这样查询输出：\n\n```sql\nDECLARE @path NVARCHAR(260)\n\
  --to retrieve the local path of system_health files\nSELECT @path = dosdlc.path\n\
  FROM sys.dm_os_server_diagnostics_log_configurations AS dosdlc;\nSELECT @path =\
  \ @path + N'system_health_*';\nWITH fxd\nAS (SELECT CAST(fx.event_data AS XML) AS\
  \ Event_Data\n    FROM sys.fn_xe_file_target_read_file(@path,\n                \
  \                         NULL,\n                                         NULL,\n\
  \                                         NULL) AS fx )\nSELECT dl.deadlockgraph\n\
  FROM\n(   SELECT dl.query('.') AS deadlockgraph\n    FROM fxd\n    CROSS APPLY event_data.nodes('(/event/data/value/deadlock)')\
  \ AS d(dl) ) AS dl;\n```\n\n你可以在管理工作室中打开死锁图。你可以搜索 XML，但从 XML 生成的死锁图几乎可以像死锁的执行计划一样工作，如图\
  \ 22-2 所示。\n\n![../images/323849_5_En_22_Chapter/323849_5_En_22_Fig2_HTML.jpg](img/323849_5_En_22_Fig2_HTML.jpg)\n\
  \n图 22-2 在分析器中显示的死锁图\n\n我将在本章后面的“分析死锁”部分向你展示如何使用它。\n\n生成死锁信息的两个跟踪标志可以单独使用，也可以一起使用以生成不同的信息集。通常人们更倾向于运行其中一个，因为它们会向\
  \ SQL Server 的错误日志中写入大量信息。跟踪标志将收集到的信息写入发生死锁事件的服务器上的日志文件中。跟踪标志 1222 提供有关死锁的最详细信息。\n\
  \n\n\n## 用于死锁信息的追踪标志\n\n追踪标志 1204 提供死锁信息，有助于分析死锁原因。它按参与死锁的每个节点对信息进行排序。追踪标志 1222\
  \ 提供详细的死锁信息，但其信息分类方式不同。追踪标志 1222 按资源和进程对信息进行分类，并提供更多信息。这两组数据将在“分析死锁”一节中讨论。\n\n`DBCC\
  \ TRACEON`语句用于开启（或启用）追踪标志。追踪标志将保持启用状态，直到使用`DBCC TRACEOFF`语句将其禁用。如果服务器重启，此追踪标志将被清除。您可以使用`DBCC\
  \ TRACESTATUS`语句确定追踪标志的状态。同时设置这两个死锁追踪标志如下所示：\n\n```\nDBCC TRACEON (1222, -1);\n\
  DBCC TRACEON (1204, -1);\n```\n\n为确保追踪标志始终设置，可以按照以下步骤，在 SQL Server 配置管理器中将它们设为 SQL\
  \ Server 启动的一部分：\n\n![../images/323849_5_En_22_Chapter/323849_5_En_22_Fig3_HTML.jpg](img/323849_5_En_22_Fig3_HTML.jpg)\n\
  \n图 22-3：显示“启动参数”选项卡的 SQL Server 实例属性对话框\n\n1.  打开 SQL Server 实例的属性对话框。\n2.  切换到属性对话框的“启动参数”选项卡，如图\
  \ 22-3 所示。\n3.  在“指定启动参数”文本框中键入`-T1222`，然后单击“添加”以添加追踪标志 1222。\n4.  单击“确定”按钮关闭所有对话框。\n\
  \n在您重启 SQL Server 实例后，这些追踪标志设置将生效。\n\n对于大多数系统，使用`system_health`会话是一种更简单、更高效的机制。它默认安装并启用。您无需执行任何操作即可使其运行。`system_health`会话不会向服务器错误日志添加冗余信息，使其更干净、更易于处理。追踪标志仍然可用，较旧的系统可能会发现它们是必需的。然而，更新的系统根本不需要它们。\n\
  \n### 分析死锁\n\n为了分析死锁的原因，让我们考虑一个简单的例子。我将使用`system_health`会话来显示死锁信息。\n\n在一个连接中，执行此脚本：\n\
  \n```\nBEGIN TRAN\nUPDATE Purchasing.PurchaseOrderHeader\nSET Freight = Freight\
  \ * 0.9 -- 运费 10%折扣\nWHERE PurchaseOrderID = 1255;\n```\n\n在第二个连接中，执行此脚本：\n\n```\n\
  BEGIN TRANSACTION\nUPDATE Purchasing.PurchaseOrderDetail\nSET OrderQty = 4\nWHERE\
  \ ProductID = 448\nAND PurchaseOrderID = 1255;\n```\n\n这些脚本中的每一个都打开一个事务并操作数据，但既不提交也不回滚事务。切换回第一个事务并运行此附加查询：\n\
  \n```\nUPDATE  Purchasing.PurchaseOrderDetail\nSET     OrderQty = 2\nWHERE   ProductID\
  \ = 448\nAND PurchaseOrderID = 1255;\n```\n\n不幸的是，可能几秒钟后，第一个连接会遇到死锁。\n\n```\nMsg\
  \ 1205, Level 13, State 51, Line 1\n事务(进程 ID 52)在锁资源上与另一个进程发生了死锁，并被选作死锁牺牲品。请重新运行该事务。\n\
  ```\n\n知道问题出在哪里吗？\n\n让我们通过检查通过跟踪事件收集的死锁图来分析死锁。事件资源管理器窗口中有一个单独的选项卡用于`xml:deadlock_report`事件。打开该选项卡将显示死锁图（参见图\
  \ 22-4）。\n\n![../images/323849_5_En_22_Chapter/323849_5_En_22_Fig4_HTML.jpg](img/323849_5_En_22_Fig4_HTML.jpg)\n\
  \n图 22-4：在 Profiler 工具中显示的死锁图\n\n从图 22-4 中显示的死锁图来看，很明显有两个进程参与：左边是会话 53，右边是会话 63。被大*X*划掉的会话\
  \ 53（在死锁图屏幕上为蓝色）被选为死锁牺牲品。涉及两个不同的键。顶部的键由会话 53 拥有，如指向会话对象的箭头所示，名为`所有者模式`，并标记为`X`（排他）。会话\
  \ 63 正试图请求相同的键进行更新。另一个键由会话 63 拥有，会话 53 请求更新，由`U`指示。您可以看到死锁所涉对象的确切 HoBt ID、对象 ID、对象名称和索引名称。对于像这样的经典、简单的死锁，您拥有所需的大部分信息。最后一部分是每个进程中运行的查询。如果您将鼠标悬停在每个会话上，这些查询是可用的，如图\
  \ 22-5 所示。\n\n![../images/323849_5_En_22_Chapter/323849_5_En_22_Fig5_HTML.jpg](img/323849_5_En_22_Fig5_HTML.jpg)\n\
  \n图 22-5：死锁牺牲品的 T-SQL 语句\n\n死锁每一方的 T-SQL 语句都可以通过这种方式读取，以便您可以准确地关注信息所在的位置。\n\n这种死锁的可视化表示可以完成工作。但是，您可能需要深入研究底层\
  \ XML 以检查死锁的某些细节，例如所涉及进程的隔离级别。如果您直接从扩展事件值打开该 XML 文件，您可以找到比图形化死锁图中为您显示的简单集合多得多的信息。看一下图\
  \ 22-6。\n\n![../images/323849_5_En_22_Chapter/323849_5_En_22_Fig6_HTML.jpg](img/323849_5_En_22_Fig6_HTML.jpg)\n\
  \n图 22-6：定义死锁图的 XML 信息\n\n如果您浏览这个文件，您可以看到死锁图中显示的一些信息，但您也会看到更多内容。例如，此死锁的一部分实际上涉及我未编写或未作为示例一部分执行的代码。表上有一个名为`uPurchaseOrderDetail`的触发器。您还可以看到我用来生成死锁的代码。所有这些信息都可以帮助您准确识别导致死锁的代码片段。您还会获得诸如`sqlhandle`之类的信息，然后您可以将其与\
  \ DMO 结合使用，从缓存或查询存储中提取语句和执行计划。由于计划是在查询运行之前创建的，因此即使对于被选为死锁牺牲品的查询，它也将对您可用。\n\n值得花一些时间更详细地探索此\
  \ XML。表 22-1 显示了扩展事件中的一些元素及其代表的信息。\n\n表 22-1：XML 死锁图数据\n\n\n"
