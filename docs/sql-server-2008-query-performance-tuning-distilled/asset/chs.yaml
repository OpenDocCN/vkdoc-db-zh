- '# SQL Server 内存管理


  SQL Server 在一个称为 `缓冲池` 的大型内存池中管理数据库所需的内存，包括数据和查询执行计划的内存需求。过去，缓冲池由一组 8KB 的缓冲区来管理内存。如今，数据页和计划缓存页、空闲页等则使用多种页面分配方式。缓冲池通常是
  SQL Server 内存中最大的部分。SQL Server 通过动态增长或缩减其内存池大小来管理内存。


  您可以在 `SQL Server Management Studio (SSMS)` 中配置 SQL Server 的动态内存管理。转到“服务器属性”对话框的“内存”文件夹，如图
  2-3 所示。


  ![../images/323849_5_En_2_Chapter/323849_5_En_2_Fig3_HTML.jpg](img/323849_5_En_2_Fig3_HTML.jpg)

  *图 2-3：SQL Server 内存配置*


  ## SQL Server 内存配置


  动态内存范围通过两个配置属性控制：`最小值(MB)` 和 `最大值(MB)`。


  *   `最小值(MB)`，也称为 `最小服务器内存`，作为内存池的下限值。一旦内存池达到与该下限值相同的大小，SQL Server 可以继续提交内存池中的页面，但不能将其缩减到小于该下限值。请注意，SQL
  Server 并非以 `最小服务器内存` 配置值启动，而是根据需要动态提交内存。

  *   `最大值(MB)`，也称为 `最大服务器内存`，作为上限值以限制内存池的最大增长。这些配置设置立即生效，无需重启。在 Windows 上运行时，SQL
  Server 2017 Express 版的最低最大内存为 512MB，其他所有版本为 1GB。在 Linux 上的内存要求为 3.5GB。


  Microsoft 建议对 SQL Server 使用动态内存配置，其中 `最小服务器内存` 设为 0，`最大服务器内存` 设置为在操作系统之外留出一些内存（假设计算机上运行单个实例）。分配给操作系统的内存量首先取决于操作系统类型，其次取决于所配置服务器的规模。


  在 Windows 中，对于内存为 8GB 到 16GB 的小型系统，您应为操作系统预留大约 2GB 到 4GB 的内存。随着服务器内存量的增加，您需要为操作系统分配更多内存。一个常见的建议是，总系统内存在
  32GB 以上时，每 16GB 额外内存预留 4GB。您需要根据自己系统的需求和内存分配情况进行调整。不应在运行 SQL Server 的同一服务器上运行其他内存密集型应用程序，但如果必须这样做，我建议您首先估算其他应用程序所需的内存量，然后配置
  SQL Server 的 `最大服务器内存` 值，以防止其他应用程序导致 SQL Server 内存不足。在运行多个 SQL Server 实例的服务器上，您需要调整这些内存设置，以确保每个实例都有足够的值。只需确保为操作系统和外部进程预留了足够的内存。


  在 Linux 中，一般指南是为操作系统预留大约 20% 的系统内存。操作系统需要内存来管理其各种资源以支持 SQL Server，因此将适用相同类型的处理需求。


  无论操作系统如何，SQL Server 内部的内存大致可分为缓冲池内存（代表数据页和空闲页）和非缓冲内存（由线程、DLL、链接服务器等组成）。SQL Server
  使用的大部分内存都用于缓冲池。但您可能会遇到缓冲池之外的分配，称为 `专用字节`，这可能导致内存压力，而在正常监控缓冲池过程中并不明显。如果您怀疑系统存在此问题，请检查
  `Process: sqlservr: Private Bytes` 与 `SQL Server: Buffer Manager: Total pages` 的对比情况。


  ## 使用 sp_configure 管理内存配置


  您也可以使用 `sp_configure` 系统存储过程来管理 `最小服务器内存` 和 `最大服务器内存` 的配置值。要查看这些参数的配置值，请执行 `sp_configure`
  存储过程，如下所示：


  ```sql

  EXEC sp_configure ''show advanced options'', 1;

  GO

  RECONFIGURE;

  GO

  EXEC sp_configure  ''min server memory'';

  EXEC sp_configure  ''max server memory'';

  ```


  图 2-4 显示了运行这些命令的结果。


  ![../images/323849_5_En_2_Chapter/323849_5_En_2_Fig4_HTML.jpg](img/323849_5_En_2_Fig4_HTML.jpg)

  *图 2-4：SQL Server 内存配置属性*


  请注意，`最小服务器内存` 设置的默认值是 0MB，而 `最大服务器内存` 设置的默认值是 2147483647MB。


  您也可以使用 `sp_configure` 存储过程修改这些配置值。例如，要将 `最大服务器内存` 设置为 10GB，`最小服务器内存` 设置为 5GB，请执行以下语句集（下载中的
  `setmemory.sql`）：


  ```sql

  USE master;

  EXEC sp_configure  ''show advanced option'',   1;

  RECONFIGURE;

  exec sp_configure  ''min server memory (MB)'',  5120;

  exec sp_configure  ''max server memory (MB)'',  10240;

  RECONFIGURE WITH OVERRIDE;

  ```


  `最小服务器内存` 和 `最大服务器内存` 配置被归类为高级选项。默认情况下，`sp_configure` 存储过程不影响/不显示高级选项。如前所述，将 `show
  advanced option` 设置为 1，可使 `sp_configure` 存储过程能够影响/显示高级选项。


  `RECONFIGURE` 语句更新由 `sp_configure` 设置的内存配置值。由于不建议对包含内存配置值的系统目录进行临时更新，因此使用 `OVERRIDE`
  标志与 `RECONFIGURE` 语句一起以强制执行内存配置。如果您通过 Management Studio 进行内存配置，Management Studio
  会在配置设置后自动执行 `RECONFIGURE WITH OVERRIDE` 语句。


  另一种查看设置而不对其进行操作的方法是使用 `sys.configurations` 系统视图。您可以使用标准的 T-SQL 从 `sys.configurations`
  中进行选择，而不必执行命令。


  ## 内存共享与专用服务器


  您可能需要考虑 SQL Server 共享系统内存的情况。详细来说，设想一台同时运行 SQL Server 和 SharePoint 的计算机。这两个服务器都是内存消耗大户，因此会不断相互争夺内存。SQL
  Server 的动态内存行为允许它在某个时刻将内存释放给 SharePoint，又在 SharePoint 释放内存时将其夺回。您可以通过为 SQL Server
  配置固定内存大小来避免这种动态内存管理的开销。然而，请记住，由于 SQL Server 是一个极其耗费资源的进程，强烈建议您使用专用的 SQL Server 生产机器。


  ## 用于内存压力的性能计数器


  既然您已经从很高层面理解了 SQL Server 内存管理，现在让我们考虑可用于分析内存压力的性能计数器，如表 2-1 所示。


  *表 2-1：用于分析内存压力的性能监视器计数器*




  | `Memory:Available Bytes` | `Counter` | `Description` | `Values` |

  | --- | --- | --- | --- |

  | `Memory` | `Available Bytes` | 可用物理内存 | 取决于系统 |

  | | `Pages/sec` | 硬页面错误速率 | 与基线对比 |

  | | `Page Faults/sec` | 总页面错误速率 | 与其基线值对比以进行趋势分析 |

  | | `Pages Input/sec` | 输入页面错误速率 | |

  | | `Pages Output/sec` | 输出页面错误速率 | |

  | | `Paging File %Usage Peak` | 内存分页文件中的峰值 | |

  | | `Paging File: %Usage` | 内存分页文件的使用率 | |

  | `SQLServer:Buffer Manager` | `Buffer cache hit ratio` | 从缓冲区缓存中获得服务的请求百分比 | 与其基线值对比以进行趋势分析
  |

  | | `Page Life Expectancy` | 页面在缓冲区缓存中停留的时间 | 与其基线值对比以进行趋势分析 |

  | | `Checkpoint Pages/sec` | 由检查点写入磁盘的页数 | 与基线对比 |

  | | `Lazy writes/sec` | 从缓冲区刷新的脏页（老化）速率 | 与基线对比 |

  | `SQLServer:Memory Manager` | `Memory Grants Pending` | 等待内存授予的进程数 | 平均值 = 0 |

  | | `Target Server Memory (KB)` | SQL Server 在该机器上可以拥有的最大物理内存 | 接近物理内存大小 |

  | | `Total Server Memory (KB)` | 当前分配给 SQL 的物理内存 | 接近目标服务器内存 (KB) |

  | `Process` | `Private Bytes` | 此进程已分配且无法与其他进程共享的内存大小（字节） | |


  内存与磁盘 I/O 密切相关。即使你认为遇到的问题直接与内存相关，也应当收集 I/O 指标，以理解系统在这两种资源之间的行为表现。接下来，我将为你讲解这些计数器，以便你更好地理解其可能用途。


  ### `Available Bytes`

  `Available Bytes` 计数器代表系统中可用的物理内存。你也可以查看 `Available Kbytes` 和 `Available Mbytes`
  以获取相同的数据，但其精度较低。为了获得良好的性能，此计数器的值不应过低。如果 SQL Server 配置为动态内存使用，那么此值将由调用 Windows API
  来控制，该 API 决定何时以及释放多少内存。如果此值在很长一段时间内都非常低，并且 SQL Server 内存没有变化，则表明服务器正承受严重的内存压力。


  ### `Pages/Sec` 和 `Page Faults/Sec`

  要理解 `Pages/sec` 和 `Page Faults/sec` 计数器的重要性，首先需要了解页面错误（page fault）。当进程需要其`工作集`（即其在物理内存中的空间）中不存在的代码或数据时，就会发生`页面错误`。它可能导致`软页面错误`或`硬页面错误`。如果所请求的页面在物理内存的其他地方找到，则称为`软页面错误`。当进程需要其工作集中或物理内存其他地方都不存在的代码或数据，而必须从磁盘检索时，则会发生`硬页面错误`。


  磁盘访问的速度对于机械硬盘来说在毫秒量级，对于固态硬盘（SSD）则可低至 0.1 毫秒，而内存访问的速度在纳秒量级。磁盘访问与内存访问之间这种巨大的速度差异，使得硬页面错误的影响与软页面错误相比非常显著。


  `Pages/sec` 计数器表示为了解决硬页面错误而每秒从磁盘读取或写入磁盘的页数。`Page Faults/sec` 性能计数器表示系统处理的每秒总页面错误数——软页面错误加上硬页面错误。这些主要是负载的度量，并非性能问题的直接指标。


  由 `Pages/sec` 指示的硬页面错误，不应持续高于正常水平。没有严格的数字可以表明存在问题，因为这些数字会因系统的内存量和类型以及磁盘访问速度的不同而在系统间存在很大差异。


  如果 `Pages/sec` 计数器的值很高，可以将其分解为 `Pages Input/sec` 和 `Pages Output/sec` 来分析。


  *   `Pages Input/sec`：应用程序只会在输入页面上等待，而不会在输出页面上等待。

  *   `Pages Output/sec`：页面输出会给系统带来压力，但应用程序通常不会直接感受到这种压力。页面输出通常由应用程序需要写出到磁盘的脏页（dirty
  pages）表示。只有当磁盘负载成为问题时，`Pages Output/sec` 才是个问题。


  另外，在 `Pages/sec` 值高的情况下，可以检查 `Process:Page Faults/sec` 以找出是哪个进程导致了过多的分页。`Process`
  对象是提供系统上运行的进程性能数据的系统组件，每个进程由其相应的实例名称表示。


  例如，SQL Server 进程由 `Process` 对象的 `sqlservr` 实例表示。此计数器的高数值通常意义不大，除非 `Pages/sec` 也很高。`Page
  Faults/sec` 在正常应用程序行为下可能数值范围很广，从每秒 0 到 1,000 都被认为是可接受的。整个数据集意味着，必须有一个基线来确定预期的正常行为。


  ### `Paging File %Usage` 和 `Page File %Usage`

  Windows 系统中的所有内存并非物理机器的物理内存。Windows 会将那些并非立即处于活动状态的内存，在物理内存空间和分页文件之间交换进出。这些计数器用于了解这种操作在你的系统上发生的频率。作为系统性能的一般度量，这些计数器仅适用于
  Windows 操作系统，而不直接适用于 SQL Server。然而，虚拟内存不足的影响会影响到 SQL Server。收集这些计数器是为了了解 SQL Server
  上的内存压力是内部的还是外部的。如果是外部内存压力，你将需要深入 Windows 操作系统以确定可能的问题所在。


  ### `Buffer Cache Hit Ratio`

  `缓冲区缓存`是数据页被读入的缓冲页池，它通常是 SQL Server 内存池中最大的部分。此计数器的值应尽可能高，特别是对于 OLTP（联机事务处理）系统——它们应该具有相当规律的数据访问模式，这与仓库或报告系统不同。对于大多数生产服务器，发现此计数器的值达到
  99% 或更高是极其常见的。较低的 `Buffer cache hit ratio` 值表明很少有请求可以从缓冲区缓存中获得服务，其余请求则需从磁盘获得服务。


  当这种情况发生时，要么是 SQL Server 仍在预热阶段，要么是缓冲区缓存的内存需求超过了可用于其增长的最大可用内存。如果缓存命中率持续较低，你可能需要考虑为系统增加更多内存，或者通过使用良好的索引和其他查询调优机制来减少内存需求——除非你处理的是包含大量即席查询（ad
  hoc queries）的报告系统。在处理报告系统时，持续看到缓存命中率变得极低是可能的。


  这使得缓冲区缓存命中率成为一个了解系统行为某些方面的有趣数值，但它本身并不是一个能直接暗示潜在性能问题的指标。虽然这个数字代表了系统内一种有趣的行为，但它并不是用于精确定位问题的绝佳度量标准，而是显示了一种行为类型。关于此主题的更多详情，请阅读
  Simple-Talk 上的文章“Great SQL Server Debates: Buffer Cache Hit Ratio”。

  ```

  https://bit.ly/2rzWJv0

  ```




  #### 页面预期寿命


  `Page Life Expectancy`（页面预期寿命）指示一个页面在不被引用的情况下将在缓冲池中停留多久。通常，此计数器的数值较低意味着页面正从缓冲区中移除，这会降低缓存效率，并表明可能存在内存压力。在报表系统（与
  OLTP 系统相对）上，此数值可能保持在较低的值，因为报表系统会访问更多数据。在夜间加载期间，看到 `Page Life Expectancy` 下降到非常低的水平也很常见。由于这取决于你拥有的可用内存量以及系统上运行的查询类型，因此没有适用于广泛受众的硬性数字标准。因此，你需要为你的系统建立一个基线并持续监控它。


  如果你运行在具有非统一内存访问（NUMA）的机器上，你需要知道标准的 `Page Life Expectancy` 计数器是一个平均值。要查看特定度量，你需要使用
  `Buffer Node:Page Life Expectancy` 计数器。


  #### 检查点页数/秒


  `Checkpoint Pages/sec` 计数器表示由检查点操作移动到磁盘的页数。这些数字应该相对较低，例如，对于大多数系统而言，应少于每秒 30 页。数值越高意味着缓存中被标记为脏的页越多。`脏页`
  是指在缓冲区中被修改的页。当它被修改时，它会被标记为脏，并在下一个检查点期间写回磁盘。此计数器的较高值表明系统内发生了大量写入操作，可能预示着 I/O 问题。但是，如果你利用了间接检查点（它允许你控制检查点发生的时间以减少恢复间隔），你可能会看到不同的数字。在监控配置了间接检查点的数据库时，请将此考虑在内。关于
  SQL Server 2016 及以上版本的检查点行为的更多信息，我建议你阅读 MSDN 上的文章“SQL Server 2016 中检查点行为的更改”（ [`https://bit.ly/2pdggk3`](https://bit.ly/2pdggk3)
  ）。


  #### 惰性写入/秒


  `Lazy writes/sec` 计数器记录了缓冲区管理器的惰性写入进程每秒写入的缓冲区数量。该进程通过系统进程移除缓冲池中陈旧的脏缓冲区，以释放内存供其他用途。一个陈旧的脏缓冲区是指包含更改并需要写入磁盘的缓冲区。此计数器的较高值可能表明存在
  I/O 问题甚至内存问题。对于普通系统，`Lazy writes/sec` 值应持续低于 20。然而，与所有其他计数器一样，你必须将你的值与基线度量进行比较。


  #### 待处理内存授予


  `Memory Grants Pending` 计数器表示在 SQL Server 内存中等待内存授予的进程数量。如果此计数器的值很高，则说明 SQL Server
  缺乏缓冲内存，这可能不仅仅是因为内存不足，还可能是由于统计信息过时导致行数估计不正确，从而引起内存授予过大等问题。在正常情况下，对于大多数生产服务器，此计数器的值应持续为
  0。


  另一种实时检索此值的方法是查询动态管理视图（DMV）`sys.dm_exec_query_memory_grants`。`grant_time` 列中的 `null`
  值表示该进程仍在等待内存授予。这是一种可用于排查查询超时的方法，通过识别出查询（或某些查询）正在等待内存以便执行。


  #### 目标服务器内存（KB）和服务器总内存（KB）


  `Target Server Memory (KB)`（目标服务器内存）表示 SQL Server 愿意消耗的动态内存总量。`Total Server Memory
  (KB)`（服务器总内存）表示当前分配给 SQL Server 的内存量。如果系统专用于 SQL Server，则 `Total Server Memory (KB)`
  计数器的值可能非常高。如果 `Total Server Memory (KB)` 远小于 `Target Server Memory (KB)`，则要么是 SQL
  Server 的内存需求较低，要么是 SQL Server 的 `max server memory`（最大服务器内存）配置参数设置得太低，要么是系统正处于预热阶段。预热阶段是指
  SQL Server 启动后，数据库服务器在动态扩展其内存分配的过程中访问更多数据集，从而将更多数据页带入内存的时期。


  你可以通过存在大量空闲页（通常为 5,000 页或更多）来确认 SQL Server 的低内存需求。此外，你可以通过查询 DMV `sys.dm_os_ring_buffers`
  直接检查内存状态，该视图返回有关 SQL Server 内部内存分配的信息。我将在下一节更详细地介绍 `sys.dm_os_ring_buffers`。


  ## 其他的内存监控工具


  虽然你可以从性能监视器计数器获得 SQL Server 内存行为的基础信息，但一旦你知道需要花时间研究内存使用情况，你将需要利用其他工具和工具集。以下是一些常用的参考点，用于识别
  SQL Server 系统上的内存问题。其中一些工具仅用于内存 OLTP 管理。其中一些工具，尽管被大量 SQL Server 社区积极使用，但并未记录在 SQL
  Server 联机丛书中。这意味着它们绝对可能被更改或删除。


  ### DBCC MEMORYSTATUS


  此命令深入 SQL Server 内存并读取当前的分配情况。它是一个瞬间的测量，一个快照。它提供了一组关于当前内存分配位置的度量。运行该命令的结果会以两个基本结果集的形式返回，如图
  2-5 所示。


  ![../images/323849_5_En_2_Chapter/323849_5_En_2_Fig5_HTML.jpg](img/323849_5_En_2_Fig5_HTML.jpg)


  图 2-5


  `DBCC MEMORYSTATUS` 的输出


  第一个数据集显示基本的内存分配和事件计数。例如，`Available Physical Memory`（可用物理内存）是系统可用内存的一个度量，而 `Page
  Faults`（页面错误）只是一个已发生页面错误数量的计数。


  第二个数据集显示了 SQL Server 内的不同内存管理器以及调用 `MEMORYSTATUS` 命令时它们消耗的内存量。


  这些都可以用来理解系统中内存分配发生的位置。例如，在大多数系统的大部分时间里，主要的内存消费者是缓冲池。你可以将 `Target Committed`（目标提交量）值与
  `Current Committed`（当前提交量）值进行比较，以了解你是否看到缓冲池面临压力。当 `Target Committed` 高于 `Current
  Committed` 时，你可能遇到了缓冲区缓存问题，需要找出当前执行的 SQL Server 进程中哪个进程使用了最多的内存。这可以使用动态管理对象 `sys.dm_os_performance_counters`
  来完成。


  剩余的数据集是 `DBCC MEMORYSTATUS` 产生的完整内存转储中的各种内存管理器、内存 clerk 和其他内存存储。它们仅在处理 SQL Server
  管理的特定方面的狭窄情况下才具有意义，并且它们完全超出了本文档全面记录的范围。你可以在 MSDN 文章“如何使用 DBCC MEMORYSTATUS 命令”（
  [`http://bit.ly/1eJ2M2f`](http://bit.ly/1eJ2M2f) ）中阅读更多内容。




  ##### 动态管理视图


  SQL Server 中有大量与内存相关的 DMV。其中一些已随 SQL Server 2017 进行了更新，并且新增了一些。全面审视所有这些视图超出了本书的范围。在确定
  SQL Server 中是否存在内存瓶颈时，有三个是最常用的。此外，当你需要监控内存中 OLTP 的内存使用情况时，另外两个也很有用。


  #### `Sys.dm_os_memory_brokers`


  虽然 SQL Server 中的大部分内存被分配给了缓冲池缓存，但其中的一些进程也会消耗内存。这些进程通过此 DMV 公开其内存分配情况。在有其他迹象表明存在内存瓶颈时，你可以使用此视图查看哪些进程可能正在从缓冲池缓存中抢占资源。


  #### `Sys.dm_os_memory_clerks`


  内存 clerk 是在 SQL Server 中分配内存的进程。观察这些进程的活动可以帮助你了解 SQL Server 内部是否存在内存分配问题，这些问题可能会抢占过程缓存所需的内存。如果性能监视器中“私有字节”计数器的值很高，你可以通过
  DMV 确定系统的哪些部分正在被消耗。


  如果你有一个使用内存中 OLTP 存储的数据库，可以使用 `sys.dm_db_xtp_table_memory_stats` 查看单个数据库对象的内存情况。但如果你想查看整个实例中这些对象的分配情况，则需要使用
  `sys.dm_os_memory_clerks`。


  #### `Sys.dm_os_ring_buffers`


  此 DMV 在“联机丛书”中没有文档说明，因此它可能会被更改或移除。它在 SQL Server 2008R2 和 SQL Server 2012 之间发生了变化。我通常运行的查询在
  SQL Server 2017 上似乎仍然有效，但你不能指望这一点。此 DMV 以 XML 格式输出。通常你可以肉眼阅读输出，但要实现对环形缓冲区的复杂读取，可能需要使用
  XQuery。


  环形缓冲区无非是对一个通知的记录响应。环形缓冲区保存在此 DMV 中，访问 `sys.dm_os_ring_buffers` 可以让你看到内存内部的变化。表 2-2
  描述了与内存相关的主要环形缓冲区。


  表 2-2

  与内存相关的主要环形缓冲区


  | **环形缓冲区** | **`ring_buffer_type`** | **用途** |

  | --- | --- | --- |

  | 资源监视器 | `RING_BUFFER_RESOURCE_MONITOR` | 随着内存分配的变化，此变化的通知会记录在此处。此信息有助于识别外部内存压力。
  |

  | 内存不足 | `RING_BUFFER_OOM` | 当你遇到内存不足问题时，它们会记录在此处，这样你就能判断哪种内存操作失败了。 |

  | 内存代理 | `RING_BUFFER_MEMORY_BROKER` | 当 SQL Server 内部内存下降时，低内存通知将强制进程为缓冲区释放内存。这些通知记录在此处，使其成为衡量内部内存压力何时发生的有用指标。
  |

  | 缓冲池 | `RING_BUFFER_BUFFER_POOL` | 缓冲池本身内存不足的通知记录在此处。这只是内存压力的一个总体指示。 |


  还有其他可用的环形缓冲区，但它们与内存分配问题无关。


  #### `Sys.dm_db_xtp_table_memory_stats`


  要查看你在内存中创建的表和索引的使用情况，可以查询此 DMV。输出会衡量为表和索引分配和使用的内存量。它只输出 `object_id`，因此你还需要查询系统视图
  `sys.objects` 以获取表或索引的名称。此 DMV 在查询时输出当前连接到的数据库的信息。


  #### `Sys.dm_xtp_system_memory_consumers`


  此 DMV 显示用于管理内存中引擎内部结构的系统结构。通常你不需要直接处理它，但在排查内存问题时，了解你是直接处理系统内部发生的某些情况，还是仅仅处理加载到内存中的数据量，是很有帮助的。你在此处查找的主要指标是每个管理结构显示的已分配字节数和已使用字节数。


  ### 在 Linux 中监控内存


  在 Linux 操作系统中，你不会有 Perfmon。然而，这并不意味着你无法观察服务器上的内存行为来了解系统是如何运行的。你可以在运行于 Linux 上的 SQL
  Server 2017 实例中查询 DMV `sys.dm_os_performance_counters` 和 `sys.dm_os_wait_stats`，以此方式观察内存行为。


  可以通过 Linux 原生工具对 Linux 操作系统进行额外的监控。工具有很多，但常用的一个是 Grafana。它是开源的，网上有大量的文档可用。SQL Server
  客户顾问团队有一个记录在案的监控 Linux 的方法，我推荐一下：[`http://bit.ly/2wi73bA`](http://bit.ly/2wi73bA)
  。


  ### 内存瓶颈解决方案


  当内存承受高压时（表现为大量的硬页错误），你可以使用图 2-6 所示的流程图来解决内存瓶颈。


  ![../images/323849_5_En_2_Chapter/323849_5_En_2_Fig6_HTML.jpg](img/323849_5_En_2_Fig6_HTML.jpg)


  图 2-6

  内存瓶颈解决流程图


  一些常见的内存瓶颈解决方案如下：


  *   优化应用程序工作负载

  *   为 SQL Server 分配更多内存

  *   将内存中的表移回标准存储

  *   增加系统内存

  *   从 32 位处理器更改为 64 位处理器

  *   启用 3GB 进程空间

  *   压缩数据

  *   处理碎片问题


  当然，修复任何可能导致过度内存使用的查询问题始终是一个选择。让我们依次看看每一项。


  ### 优化应用程序工作负载


  在大多数情况下，优化应用程序工作负载是最有效的解决方案，但由于此过程涉及的复杂性和挑战，它通常被最后考虑。要识别内存密集型查询，请使用扩展事件捕获所有 SQL
  查询（你将在第 6 章学习如何使用）或使用查询存储（我们将在第 11 章介绍），然后按 `Reads` 列对输出进行分组。逻辑读取次数最多的查询通常最常导致内存压力，但两者之间并非线性相关。你也可以使用
  `sys.dm_exec_query_stats`（一个为活动缓存中的查询收集查询指标的 DMV）来识别同样的事情。但是，由于此 DMV 基于缓存，它可能不如使用扩展事件捕获指标准确，尽管它会更快、更容易。在本书中，你将更详细地了解如何优化这些查询。


  #### 为 SQL Server 分配更多内存


  正如你在“SQL Server 内存管理”部分所学的，“最大服务器内存”配置可以限制 SQL Server 缓冲内存池的最大大小。如果 SQL Server 的内存需求超过了“最大服务器内存”值（你可以通过硬页错误的数量来判断），那么增加这个值将允许内存池增长。要从增加“最大服务器内存”值中获益，请确保系统中有足够的物理内存。


  如果你使用的是内存中 OLTP 存储，你可能需要调整为内存中对象定义的资源池所分配的内存百分比。但这会从 SQL Server 实例的其他部分占用内存。




  '
- '# 3. 磁盘性能分析


  #### 将内存表移回标准存储


  SQL Server 2014 引入了一种名为 `内存` 表的新表类型。这将表的存储从磁盘转移到内存，从而显著提升了性能。但是，并非所有表或所有工作负载都能从这一新功能中受益。你需要密切关注
  `内存` 表的常规查询性能指标，并利用特定的动态管理视图来监控 `内存` 表。我将在第 24 章详细讨论这些内容。如果你的工作负载与 `内存` 表配合不佳，或者系统内存不足，你可能需要将这些
  `内存` 表移回磁盘存储。


  ### 增加系统内存


  SQL Server 的内存需求取决于 SQL 活动处理的数据总量。它与数据库的大小或传入的 SQL 查询数量没有直接关联。例如，如果一个内存密集型查询在两个小表之间执行交叉连接，且没有任何过滤条件来缩小结果集，就可能给系统内存带来巨大压力。


  最简单、最快捷的解决方法之一就是通过购买并安装更多内存来直接增加系统内存。然而，找出消耗物理内存的原因仍然很重要，因为如果应用程序工作负载极其耗费内存，你可能很快就会受限于系统可访问的最大内存量。要确定哪些查询使用了更多内存，可以查询
  `sys.dm_exec_query_memory_grants` 动态管理视图，并收集查询及其 I/O 使用情况的指标。但在使用 `JOIN` 或 `ORDER
  BY` 语句对此动态管理视图运行查询时需要小心；如果你的系统已经处于内存压力之下，这些操作可能导致你的查询本身需要分配内存。


  #### 从 32 位处理器更改为 64 位处理器


  将物理服务器从 32 位处理器切换到 64 位处理器（以及随之进行的 Windows Server 软件升级）会彻底改变 SQL Server 的内存管理能力。SQL
  Server 的内存限制从 3GB 提升到取决于操作系统版本和特定处理器类型的高达 24TB 的限制。


  在 SQL Server 2012 之前，可以通过使用地址窗口扩展插件向 SQL Server 实例添加最多 64GB 的数据缓存。这些功能在 SQL Server
  2012 中被移除，因此 32 位的 SQL Server 实例被限制为只能访问 3GB 内存。由于这一限制，只有小型系统才应该运行 2017 年之前的 32
  位版本 SQL Server。


  SQL Server 2017 不支持 `x86` 芯片组。你必须使用 64 位处理器才能运行 2017 版本。


  #### 压缩数据


  数据压缩在存储和检索信息方面有许多显著的优点。它还有一个许多人没有意识到的好处：当压缩信息存储在内存中时，它会保持压缩状态。这意味着可以在使用更少系统内存的情况下传输更多信息，从而提高整体内存吞吐量。所有这些确实需要付出一定的
  CPU 代价，因此你需要密切关注 CPU 使用情况，以确保你不仅仅是转移了压力。有时，由于数据的性质，你可能看不到太大的压缩效果。


  #### 启用 3GB 进程地址空间


  标准的 32 位地址最多可以映射 4GB 内存。因此，32 位 Windows 操作系统进程的标准地址空间被限制为 4GB。在这 4GB 的进程空间中，默认情况下，上部的
  2GB 预留给操作系统，下部的 2GB 提供给应用程序使用。如果你在 32 位操作系统的 `boot.ini` 文件中指定 `/3GB` 开关，则操作系统仅保留
  1GB 的地址空间，应用程序可以访问最多 3GB。这也被称为 *4GB 调整*（4GT）。此目的不需要新的 API。


  因此，在一台拥有 4GB 物理内存且采用默认 Windows 配置的机器上，你会发现可用内存约为 2GB 或更多。为了让 SQL Server 使用最多 3GB
  的可用内存，你可以在 `boot.ini` 文件中添加 `/3GB` 开关，如下所示：


  ```

  [boot loader]

  timeout=30

  default=multi(o)disk(o)rdisk(o)partition(l)\WINNT

  [operating systems]

  multi(o)disk(o)rdisk(o)partition(l)\WINNT=

  "Microsoft Windows Server 2016 Advanced Server"

  /fastdetect /3GB

  ```


  对于物理内存超过 16GB 的系统（如下一节所述），或需要更多内核内存的系统，不应使用 `/3GB` 开关。


  运行在 64 位系统上的 SQL Server 2017 在 `x64` 平台上最多可支持 24TB 内存。将生产系统，特别是企业级生产系统，放在 32 位架构上已经没有太大意义了，而且使用
  SQL Server 2017 也无法做到。


  #### 处理碎片化


  虽然存储碎片化听起来可能不像一个性能问题，因为 SQL Server 是从磁盘将信息检索到内存中，但访问的是信息页。如果你有高水平的碎片化，它将直接转化为你的内存管理问题，因为你必须原样存储从磁盘检索到内存中的页，包括空白空间。因此，碎片化不仅会影响存储，也会影响内存。我将在第
  17 章讨论碎片化问题。


  '
- '# 本章小结


  在本章中，你了解了性能监视器和动态管理视图。你探索了收集 SQL Server 中内存和内存行为指标的不同方法。理解内存的行为方式将帮助你了解系统的性能表现。你还看到了一些解决内存问题的可能方案，而不仅仅是简单地购买更多内存。SQL
  Server 会尽可能多地利用你能提供的内存，因此请好好管理这一资源。


  在下一章中，你将接触到下一个系统瓶颈：磁盘和磁盘子系统。


  '
- "# 3. 磁盘性能分析\n\n磁盘及其磁盘子系统（包括控制器、连接器和管理软件）是任何计算系统中最慢的部分之一。多年来，内存变得越来越快。CPU 也是如此。但是磁盘，除了我们最近在固态硬盘等技术上看到的一些显著改进外，变化并不大；磁盘仍然是大多数系统中速度最慢的部分之一。这意味着你需要能够监控你的磁盘以了解其行为。在本章中，你将探索以下领域：\n\
  \n*   使用系统计数器收集磁盘性能指标\n\n*   使用其他机制收集磁盘行为信息\n\n*   解决磁盘性能问题\n\n*   处理 Linux 操作系统和磁盘\
  \ I/O 时的差异\n\n\n## 磁盘瓶颈分析\n\nSQL Server 可能有很高的 I/O 需求，由于磁盘速度相比内存和处理器速度慢得多，I/O 资源的争用会显著降低\
  \ SQL Server 性能。分析和解决任何 I/O 路径瓶颈都可以显著改善 SQL Server 性能。与任何性能指标一样，仅根据单个计数器或单次测量值来判断性能好坏会导致问题。在传统的\
  \ RAID 系统与现代磁盘虚拟化之间的现代磁盘和 I/O 管理系统方面，这一点尤其正确，因为测量 I/O 是一个复杂的主题。请计划使用多个指标来理解环境中 I/O\
  \ 子系统的行为。尽管本章内容丰富，但仅涵盖基础知识。\n\n现代系统中还有其他机制使得测量 I/O 更加困难。更多系统以虚拟化方式运行并共享资源，包括磁盘。这将导致更多的随机\
  \ I/O，因此在查看本章中的各项测量值时，您必须考虑到这一点。防病毒程序是 I/O 方面的常见问题，因此在开始使用我们将要讨论的 I/O 指标之前，请务必验证您是否遇到了此问题。您还可能看到作为\
  \ I/O 路径瓶颈的筛选驱动程序问题，所以这是另一个需要关注的点。\n\n在我们讨论指标和解决方案之前，您需要了解检查点过程的工作原理。当 SQL Server\
  \ 写入数据时，首先将其全部写入内存（我们将在第 4 章讨论内存问题）。内存中所有包含更改的页面被称为`脏页`。检查点过程根据内部度量标准和您的恢复间隔设置定期发生。检查点过程将`脏页`写入磁盘，并将所有更改记录到事务日志中。检查点过程是您在\
  \ SQL Server 中看到的写入 I/O 活动的主要驱动因素。\n\n让我们看看如何衡量 I/O 子系统的行为。\n\n### 磁盘计数器\n\n要分析磁盘性能，您可以使用表\
  \ 3-1 中所示的计数器。\n\n表 3-1\n\n用于分析 I/O 压力的性能监视器计数器\n\n| 对象 (实例[,实例 N]) | 计数器 | 描述 |\
  \ 值 |\n| --- | --- | --- | --- |\n| `PhysicalDisk`(数据磁盘, 日志磁盘) | `Disk Transfers/sec`\
  \ | 磁盘上读/写操作的速率 | 最大值取决于 I/O 子系统 |\n|   | `Disk Bytes/sec` | 每秒每磁盘传输到/从磁盘的数据量 |\
  \ 最大值取决于 I/O 子系统 |\n|   | `Avg. Disk Sec/Read` | 从磁盘读取的平均时间（毫秒） | 平均值 < 10 毫秒，但需与基线比较\
  \ |\n|   | `Avg. Disk Sec/Write` | 写入磁盘的平均时间（毫秒） | 平均值 < 10 毫秒，但需与基线比较 |\n| `SQLServer:Buffer\
  \ Manager` | `Page reads/sec` | 读入缓冲区管理器的页数 | 与基线比较 |\n|   | `Page writes/sec` |\
  \ 写出缓冲区管理器的页数 | 与基线比较 |\n\n`PhysicalDisk`计数器代表物理磁盘上的活动。`LogicalDisk`计数器代表在物理磁盘上创建的逻辑子单元（或分区）。如果您在物理磁盘上创建两个分区，例如\
  \ R: 和 S:，那么您可以使用逻辑磁盘计数器分别监控各个逻辑磁盘的活动。然而，由于磁盘瓶颈最终发生在物理磁盘上，而不是逻辑磁盘上，因此通常更倾向于使用`PhysicalDisk`计数器。\n\
  \n请注意，对于硬件独立磁盘冗余阵列（RAID）子系统（更多关于 RAID 的内容请参见“使用 RAID 阵列”部分），计数器将阵列视为单个物理磁盘。例如，即使您在\
  \ RAID 配置中有十个磁盘，它们在操作系统看来也只是一个物理磁盘，因此您将只有一组针对该 RAID 子系统的`PhysicalDisk`计数器。同样的道理也适用于存储区域网络（SAN）磁盘（具体请参见“使用\
  \ SAN 系统”部分）。您在许多更新的磁盘系统和虚拟磁盘中也会看到这种情况。因此，表 3-1 中显示的一些数字可能远低于（或远高于）您的系统实际能支持的值。\n\
  \n请将这些数字作为监控磁盘的一般指导原则，并根据技术不断发展的事实进行调整，因为随着硬件的改进，您可能会看到不同的性能表现。我们正越来越多地转向固态硬盘甚至\
  \ SSD 阵列，这使得磁盘 I/O 操作的速度提高了数个数量级。在没有采用 SSD 的地方，我们也在利用 iSCSI 接口。在使用这类硬件时，请记住这些数字更符合传统盘片式磁盘驱动器的情况，而这类驱动器正迅速被淘汰。\n\
  \n### 每秒磁盘传输数 (Disk Transfers/Sec)\n\n`Disk Transfers/sec`监控磁盘上读写操作的速率。当今典型的硬盘驱动器对于顺序\
  \ I/O (IOPS) 每秒大约可以执行 180 次磁盘传输，对于随机 I/O 每秒大约 100 次。在随机 I/O 的情况下，`Disk Transfers/sec`较低，因为涉及更多的磁盘臂和磁头移动。OLTP\
  \ 工作负载（主要用于单例操作、小型操作和随机访问的工作负载）通常受限于每秒磁盘传输数。因此，对于 OLTP 工作负载，您更多是受到磁盘每秒只能执行 100 次传输的限制，而不是其\
  \ 1000MB 每秒的吞吐量规格的限制。\n\n### 注意\n\nSSD 的每秒 I/O 操作数 (IOPS) 可以在大约 5,000 到某些高端 SSD\
  \ 系统的 500,000 之间。您对`Disk Transfers/sec`的监控需要相应地调整比例。有关此度量的详细信息，请咨询您的供应商。\n\n由于磁盘固有的慢速特性，建议您尽可能保持每秒磁盘传输数较低。\n\
  \n### 每秒磁盘字节数 (Disk Bytes/Sec)\n\n`Disk Bytes/sec`计数器监控在读写操作期间每秒传输到磁盘或从磁盘传输的字节数。一个转速为\
  \ 7200RPM 的典型磁盘每秒可以传输大约 1000MB。通常，OLTP 应用程序不受磁盘子系统传输容量的限制，因为 OLTP 应用程序在单个数据库请求中访问少量数据。如果数据传输量超过了磁盘子系统的容量，那么磁盘子系统上就会开始出现积压，这反映在`Disk\
  \ Queue Length`计数器上。\n\n同样，对于 SSD 访问，这些数字可能会高得多，因为它主要只受限于驱动器到主机接口引起的延迟。\n\n### 平均磁盘读取秒数和平均磁盘写入秒数\
  \ (Avg. Disk Sec/Read and Avg. Disk Sec/Write)\n\n`Avg. Disk Sec/Read`和`Avg. Disk\
  \ Sec/Write`跟踪从磁盘读取或写入磁盘平均所需的时间（以毫秒为单位）。了解磁盘处理接收到的写入和读取的速度如何，可以有力地指示问题所在。如果将数据移出或移入磁盘需要超过大约\
  \ 10 毫秒的时间，您可能需要检查硬件和配置以确保一切正常运行。为了让事务日志表现良好，您需要获得更好的响应时间。\n\n就衡量 I/O 系统性能而言，这些是单一最佳度量。`Sec/读取`或`Sec/写入`可能无法告诉您是哪个或哪些查询导致了问题。这些度量将绝对准确地告诉您\
  \ I/O 系统的行为方式，因此我会将它们与您收集的任何其他指标集一起包含在内。\n\n\n### 缓冲区管理器页面读写\n\n虽然如前所述，衡量 I/O 系统很重要，但你需要不止一个指标来展示\
  \ I/O 系统的运行状况。了解进出缓冲区管理器的页面，可以很好地指示你看到的 I/O 活动是否发生在 SQL Server 内部。当你试图证明存在 I/O 问题时，这是你希望添加到任何其他指标中的一项重要度量。\n\
  \n## 附加的 I/O 监控工具\n\n就像所有其他工具一样，你需要用其他来源可用的数据来补充从性能监视器收集的信息。关于 I/O 和磁盘问题的真正有价值的信息都存在于\
  \ DMO 中。\n\n### Sys.dm_io_virtual_file_stats\n\n这是一个返回构成数据库的文件信息的函数。你可以像下面这样调用它：\n\
  \n```sql\nSELECT  *\nFROM    sys.dm_io_virtual_file_stats(DB_ID('AdventureWorks2017'),\
  \ 2) AS divfs;\n```\n\n它会返回关于该文件的若干有趣的信息列。最有趣的是延迟数据，即用户等待不同 I/O 操作的时间。首先，`io_stall_read_ms`表示用户等待读操作的毫秒数。然后是`io_stall_write_ms`，它显示在此数据库文件中写操作必须等待的时间量。你还可以查看通用数值`io_stall`，它代表了对该文件所有\
  \ I/O 的等待总和。为了让这些数字有意义，你还会得到另一个值`sample_ms`，它显示了已测量的时间量。你可以将此值与其他值进行比较，以了解 I/O 问题在多大程度上阻碍了你的系统。此外，你可以将其缩小到特定文件，从而知道是日志还是特定的数据文件拖慢了速度。这是确定是否存在\
  \ I/O 瓶颈的一个极其有用的度量。它对于识别具体瓶颈帮助不大。请将此与等待统计信息以及前面提到的 Perfmon 指标结合使用。\n\n### Sys.dm_os_wait_stats\n\
  \n这是一个有用的 DMO，它显示了系统上等待的汇总信息。要确定是否存在 I/O 瓶颈，你可以利用此 DMO 进行如下查询：\n\n```sql\nSELECT\
  \  *\nFROM    sys.dm_os_wait_stats AS dows\nWHERE   wait_type LIKE 'PAGEIOLATCH%';\n\
  ```\n\n你正在查看的是导致等待发生的各种 I/O 闩锁操作。与`sys.dm_io_virtual_file_stats`类似，你不会从此 DMO 获得具体的查询，但它确实能识别是否存在\
  \ I/O 瓶颈。像许多性能计数器一样，你不能仅仅在这里寻找一个数值。你需要将当前值与基线值进行比较，以得出当前情况。\n\n前面展示的 WHERE 子句使用了`PAGEIOLATCH%`，但你还应该查找与其他\
  \ I/O 进程相关的等待，例如`WRITELOG`、`LOGBUFFER`和`ASYNC_IO_COMPLETION`。\n\n当你运行此查询时，你会得到发生的等待次数以及总等待时间的汇总。你还会得到这些等待的最大值，这样你就知道最长的一次等待是多久，因为有可能单次等待就造成了大部分的等待时间。\n\
  \n别忘了，你可以在查询存储中查看等待统计信息。我们将在第 11 章详细讨论这些。\n\n### 监控 Linux I/O\n\n对于 I/O 监控，你只能局限于\
  \ SQL Server 内部机制，或者利用第 2 章提到的特定于 Linux 的监控工具。Linux 系统内的输入输出基本原理与 Windows 操作系统中的原理没有太大区别。主要区别仅在于如何在操作系统级别捕获磁盘行为。\n\
  \n## 磁盘瓶颈解决方案\n\n一些常见的磁盘瓶颈解决方案如下：\n\n*   优化应用程序工作负载\n*   使用更快的 I/O 路径\n*   使用 RAID\
  \ 阵列\n*   使用 SAN 系统\n*   使用固态硬盘\n*   正确对齐磁盘\n*   增加系统内存\n*   创建多个文件和文件组\n*   将日志文件移动到单独的物理驱动器\n\
  *   使用分区表\n\n现在我将逐一介绍这些解决方案。\n\n### 优化应用程序工作负载\n\n我无法充分强调优化应用程序工作负载在解决性能问题时的重要性。读取或写入次数最多的查询将是导致大量磁盘\
  \ I/O 的元凶。本书的剩余部分将更详细地介绍优化这些查询的策略。\n\n### 使用更快的 I/O 路径\n\n最高效的解决方案之一，并且是你在可能的情况下会采用的，就是使用每秒磁盘传输速度更快的驱动器、控制器和其他架构。但是，你不应该在没有进一步调查的情况下仅仅升级磁盘驱动器；你需要找出是什么给磁盘带来了压力。\n\
  \n### 使用 RAID 阵列\n\n获得磁盘 I/O 并行性的一种方法是创建一个单一的驱动器池来为所有 SQL Server 数据库文件（事务日志文件除外）提供服务。这个池可以是一个单一的\
  \ RAID 阵列，在 Windows Server 2016 中表示为单个物理磁盘驱动器。驱动器池的有效性取决于 RAID 磁盘的配置。\n\n在所有可用的\
  \ RAID 配置中，最常用的 RAID 配置如下（也如图 3-1 所示）：\n\n![../images/323849_5_En_3_Chapter/323849_5_En_3_Fig1_HTML.jpg](img/323849_5_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1：RAID 配置\n\n*   `RAID 0`：带区卷，无容错能力\n*   `RAID 1`：镜像卷\n*   `RAID 5`：带奇偶校验的带区卷\n\
  *   `RAID 1+0`：镜像带区卷\n\n#### RAID 0\n\n由于此 RAID 配置没有容错能力，你只能在数据可靠性不是问题的场景中使用它。阵列中任何磁盘的故障都会导致磁盘子系统中数据的完全丢失。因此，你不应将其用于构成数据库的任何数据文件或事务日志文件，可能的例外是名为`tempdb`的系统临时数据库。`RAID\
  \ 0`中每个磁盘的 I/O 数量由以下等式表示：\n\n```\n每个磁盘的 I/O 数 = (读取次数 + 写入次数) / 阵列中的磁盘数\n```\n\n\
  在此等式中，`读取次数`是对磁盘子系统的读请求次数，`写入次数`是对磁盘子系统的写请求次数。\n\n#### RAID 1\n\n`RAID 1`通过将数据磁盘镜像到单独的磁盘上，为关键数据提供高容错能力。它可以用于整个数据可以容纳在一个磁盘中的情况。用户数据库的数据库事务日志文件、操作系统文件以及\
  \ SQL Server 系统数据库（`master`和`msdb`）通常足够小，可以使用`RAID 1`。\n\n`RAID 1`中每个磁盘的 I/O 数量由以下等式表示：\n\
  \n```\n每个磁盘的 I/O 数 = (读取次数 + 2 X 写入次数) / 2\n```\n\n\n#### RAID 5\n\n在许多情况下，RAID\
  \ 5 是一个可接受的选择。它通过有效地仅使用一个额外磁盘来保存其他磁盘数据的计算奇偶校验信息，从而提供合理的容错能力，如图 3-1 所示。当 RAID 5 配置中出现磁盘故障时，I/O\
  \ 性能会变得非常糟糕，尽管系统在故障驱动器下运行时仍然可用。\n\n任何写入操作占总磁盘请求超过 10% 的数据都不适合使用 RAID 5。因此，请在只读卷或磁盘写入百分比低的卷上使用\
  \ RAID 5。\n\nRAID 5 中每个磁盘的 I/O 数由以下公式表示：\n\n```\n每个磁盘的 I/O 数 = (读取次数 + 4 X 写入次数)\
  \ / 阵列中的磁盘数量\n```\n\n如这个等式所示，RAID 5 磁盘子系统上的写入操作被放大了四倍。对于每个传入的写入请求，磁盘子系统上会有以下四个对应的\
  \ I/O 请求：\n\n*   一个读取 I/O，用于从要修改内容的数据磁盘读取现有数据\n*   一个读取 I/O，用于从相应的奇偶校验磁盘读取现有奇偶校验信息\n\
  *   一个写入 I/O，用于将新数据写入要修改内容的数据磁盘\n*   一个写入 I/O，用于将新的奇偶校验信息写入相应的奇偶校验磁盘\n\n因此，每个写入请求的四个\
  \ I/O 包括两个读取 I/O 和两个写入 I/O。\n\n在 OLTP 数据库中，所有数据修改都会作为数据库事务的一部分立即写入事务日志文件，但数据文件本身的内容是通过批处理操作与事务日志文件内容异步同步的。此操作由\
  \ SQL Server 的内部进程 `检查点进程` 管理。此操作的频率可以通过使用 SQL Server 的 `恢复间隔（分钟）` 配置参数来控制。只需记住，检查点的时机可以通过\
  \ SQL Server 2012 中引入的间接检查点来控制。\n\n由于高度事务性的 OLTP 数据库中事务日志文件持续进行写入操作，将事务日志文件放置在 RAID\
  \ 5 阵列上会降低阵列的性能。虽然在可能的情况下，不应将事务日志文件放置在 RAID 5 阵列上，但数据文件可以放置在 RAID 5 上，因为对数据文件的写入操作是间歇性的，并且会批量处理以提高写入操作的效率。\n\
  \n#### RAID 6\n\nRAID 6 是在 RAID 5 之上增加的一层。它在 RAID 5 的存储中添加了一个额外的奇偶校验块。这不会以任何方式对读取产生负面影响。这意味着，对于读取操作，其性能与\
  \ RAID 5 相同。额外的写入会带来额外开销，但并不算大。添加这个额外的奇偶校验块是因为如今 RAID 阵列变得如此之大，数据丢失在所难免。额外的奇偶校验块充当了防止这种情况的检查机制，以更好地确保您的数据安全。\n\
  \n#### RAID 1+0 (RAID 10)\n\nRAID 1+0（也称为 RAID 10）配置通过镜像阵列中的每个数据磁盘，提供了高度的容错能力。它比\
  \ RAID 5 昂贵得多，因为需要两倍的数据磁盘数量来提供容错能力。当需要大容量卷来保存数据且超过 10% 的磁盘请求是写入时，应使用此 RAID 配置。由于\
  \ RAID 1+0 支持 `拆分寻道`（能够将读取操作分布到数据磁盘和镜像磁盘上，然后合并两个数据流），读取性能也非常出色。因此，在性能至关重要的任何地方都使用\
  \ RAID 1+0。\n\nRAID 1+0 中每个磁盘的 I/O 数由以下公式表示：\n\n```\n每个磁盘的 I/O 数 = (读取次数 + 2 X 写入次数)\
  \ / 阵列中的磁盘数量\n```\n\n### 使用 SAN 系统\n\n尽管成本已经下降，但 SAN 在很大程度上仍然是大型企业系统的领域。SAN 可用于通过简单地提供更多的主轴和磁盘驱动器进行读写来提高存储子系统的性能。由于其规模、复杂性和成本，SAN\
  \ 并不一定是所有情况下的良好解决方案。此外，根据数据量，`DAS`（直接附加存储）可以配置得运行更快。SAN 系统的主要优势并不体现在性能上，而是在可扩展性、可用性和维护性方面。\n\
  \nSAN 发展的另一个领域是使用互联网小型计算机系统接口 (`iSCSI`) 将设备连接到网络的 SAN 设备。由于 `iSCSI` 接口的工作方式，您可以使网络设备看起来像是本地附加存储。实际上，它的速度几乎与本地附加存储一样快，但您可以整合您的存储系统。\n\
  \n相反，通过转而使用本地磁盘并摆脱 SAN，您可能会获得性能提升。SAN 系统在设计上具有极高的冗余性。但是，这种冗余性给磁盘操作增加了很多开销，特别是 SQL\
  \ Server 通常执行的那种操作：大量快速执行的小型写入。虽然从单个本地磁盘迁移到 SAN 可能是一种改进，但根据您的系统和您组合的磁盘子系统，您可能在 SAN\
  \ 之外获得更好的性能。\n\n### 使用固态硬盘\n\n固态硬盘正在席卷磁盘性能领域。这些驱动器使用内存而不是旋转磁盘来存储信息。它们安静、功耗低且速度极快。然而，与硬盘驱动器\
  \ (HDD) 相比，它们也相当昂贵。在撰写本文时，HDD 的成本约为每 GB 0.03 美元，而 SSD 约为每 GB 0.90 美元。但这一成本被速度的提升所抵消，速度从大约每秒\
  \ 100 次操作提高到每秒 5,000 次操作甚至更高。您还可以通过 SAN 或 RAID 将 SSD 放入阵列中，进一步提高性能优势。SSD 驱动器的写入操作次数是有限的，但到目前为止，其故障率并不高于\
  \ HDD。还有一些具有不同价格点和性能指标的混合解决方案。对于纯硬件解决方案，为 I/O 受限的系统实施 SSD 可能是您能做的最佳操作。\n\n### 正确对齐磁盘\n\
  \nWindows Server 2016 在安装过程中会对磁盘进行对齐，因此现代服务器不应遇到此问题。但是，如果您使用的是旧服务器，这仍然是个问题。如果您要将卷从\
  \ Windows Server 2008 之前的系统迁移，也需要担心这个问题。您将需要重新格式化这些卷以正确设置对齐。数据存储在磁盘上的方式是一系列存储在磁道上的\
  \ `扇区`（也称为 `块`）。当由供应商确定的磁道大小包含的扇区数量与您写入的默认大小不同时，磁盘就是未对齐的。这意味着一个扇区会被正确写入，但下一个扇区将不得不跨越两个磁道。这可能使写入或读取磁盘所需的\
  \ I/O 量增加一倍以上。关键是对齐分区，以便为磁道存储正确数量的扇区。\n\n### 增加系统内存\n\n当物理内存不足时，系统开始将内存内容写回磁盘，并更频繁地读取较小的数据块，或者读取较大的块，这两种情况都会导致大量分页。系统内存越少，磁盘子系统的使用就越多。这可以通过使用上一节列举的内存瓶颈解决方案来解决。\n\
  \n### 创建多个文件和文件组\n\n在 SQL Server 中，每个用户数据库由一个或多个数据文件以及通常一个事务日志文件组成。属于数据库的数据文件可以分组到一个或多个文件组中，用于管理和数据分配/放置的目的。例如，如果一个数据文件被放置在一个单独的文件组中，那么通过将该文件组设置为只读，可以集体控制对该文件组中所有表的写访问（事务日志文件不属于任何文件组）。\n\
  \n您可以从 SQL Server Management Studio 为数据库创建文件组，如图 3-2 所示。数据库的文件组在“数据库属性”对话框的“文件组”窗格中呈现。\n\
  \n![../images/323849_5_En_3_Chapter/323849_5_En_3_Fig2_HTML.png](img/323849_5_En_3_Fig2_HTML.png)\n\
  \n图 3-2\n\n文件组配置\n\n在图 3-2 中，您可以看到为 `WideWorldImporters` 数据库定义了三个文件组。您可以将多个文件添加到分布在多个\
  \ I/O 路径上的多个文件组中，这样在将数据库对象也移动到这些不同的组中后，工作就可以跨组并行执行并利用分布式存储，实质上让多个磁盘主轴和多个 I/O 路径协同工作。但是，简单地通过单个磁盘控制器在多个磁盘（即使是不同的磁盘）上放置大量文件可能会导致更差的性能，而不是更好。\n\
  \n您可以在“数据库属性”对话框的“文件”窗口中，通过从下拉列表中选择来向文件组添加数据文件，如图 3-3 所示。\n\n![../images/323849_5_En_3_Chapter/323849_5_En_3_Fig3_HTML.jpg](img/323849_5_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n*数据文件配置*\n\n您也可以通过编程方式执行此操作，如下所示：\n\n```sql\nALTER DATABASE WideWorldImporters\n\
  ADD FILEGROUP Indexes;\nALTER DATABASE WideWorldImporters\nADD FILE\n(\nNAME = AdventureWorks2017_Data2,\n\
  FILENAME = 'c:\\DATA\\WWI_Index.ndf',\nSIZE = 20GB,\nFILEGROWTH = 10%\n)\nTO FILEGROUP\
  \ Indexes;\n```\n\n通过将经常连接的表分隔到不同的文件组中，然后将文件组内的文件放置在不同的磁盘或 LUN 上，分离的 I/O 路径可以提高性能，当然前提是指向这些磁盘的路径配置正确且不过载（不要误以为更多的磁盘就自动意味着更多的\
  \ I/O；事情并非如此）。例如，考虑以下查询：\n\n```sql\nSELECT si.StockItemName,\ns.SupplierName\nFROM\
  \ Warehouse.StockItems AS si\nJOIN Purchasing.Suppliers AS s\nON si.SupplierID =\
  \ s.SupplierID;\n```\n\n如果表 `Warehouse.StockItems` 和 `Purchasing.Suppliers` 被放置在各自包含一个文件的不同文件组中，磁盘可以从多个\
  \ I/O 路径读取，从而提升性能。\n\n出于性能和恢复目的，建议如果要使用多个文件组，主文件组应仅用于系统对象，辅助文件组应仅用于用户对象。这种方法提高了从损坏中恢复的能力。如果主数据文件和日志文件完好无损，数据库的可恢复性会更高。仅对系统对象使用主文件组，并将所有用户相关对象存储在一个或多个辅助文件组上。\n\
  \n将数据库分散到多个文件中，即使在同一驱动器上，也使得将来将数据库文件移动到独立驱动器上更加容易。例如，要将用户数据库文件 (`WWI_Index.ndf`)\
  \ 移动到新的磁盘子系统 (F:)，您可以按照以下步骤操作：\n\n1.  分离用户数据库，如下所示：\n\n    ```sql\n    USE master;\n\
  \    GO\n    EXEC sp_detach_db 'WideWorldImporters';\n    GO\n    ```\n\n2.  将数据文件\
  \ `WWI_Index.ndf` 复制到新磁盘子系统上的文件夹 `F:\\Data\\` 中。\n\n3.  通过引用适当位置的文件重新附加用户数据库，如下所示：\n\
  \n    ```sql\n    USE master;\n    GO\n    sp_attach_db 'WideWorldImporters',\n\
  \    'R:\\DATA\\WWI_Primary.mdf',\n    'R:\\DATA\\WWI_UserData.ndf',\n    'F:\\\
  DATA\\WWI_Indexes.ndf',\n    'R:\\DATA\\WWI_InMemory.ndf',\n    'S:\\LOG\\WWI_Log.1df\
  \ ';\n    GO\n    ```\n\n4.  要验证属于数据库的文件，请执行以下命令：\n\n    ```sql\n    USE WideWorldImporters;\n\
  \    GO\n    SELECT * FROM sys.database_files;\n    GO\n    ```\n\n### 将日志文件移动到单独的物理磁盘\n\
  \n只要可能，SQL Server 事务日志文件应始终与所有其他 SQL Server 数据库文件位于单独的硬盘驱动器上。事务日志活动主要包括顺序写 I/O，与数据文件所需的非顺序（或随机）I/O\
  \ 不同。将事务日志活动与其他非顺序磁盘 I/O 活动分离可以提高 I/O 性能，因为它允许包含日志文件的硬盘驱动器专注于顺序 I/O。但是，请记住，也存在随机的日志读取，并且数据读写也可以像事务日志一样是顺序的。只是事务日志写入具有强烈的顺序性倾向。\n\
  \n然而，为所有日志文件创建一个单一磁盘只会让您再次面临随机 I/O。如果这个特定的日志文件对任务至关重要，它可能需要自己的存储和路径以最大化性能。\n\n从硬盘访问数据所需时间的主要部分花费在定位数据所需的磁盘主轴头的物理移动上。一旦数据被定位，数据就会以比物理移动快得多的电子方式读取。如果日志磁盘上只有顺序\
  \ I/O 操作，则日志磁盘的主轴头可以用最少的物理移动写入日志磁盘。但是，如果同一磁盘用于数据文件，则主轴头必须在写入日志文件之前移动到正确的位置。这增加了写入日志文件所需的时间，从而损害了性能。\n\
  \n即使是 SSD 磁盘，将数据与事务日志隔离也意味着工作将被分配到多个位置，从而提高性能。\n\n此外，对于具有多个 OLTP 数据库的 SQL Server，事务日志文件应在不同的物理驱动器上彼此物理分离以提高性能。此要求的例外是只读数据库或数据库更改很少的数据库。由于只读数据库不进行在线更改，因此不在日志文件上执行写入操作。因此，对于只读数据库，不需要将日志文件放在单独的磁盘上。\n\
  \n作为一般经验法则，您应尽可能尝试将具有最高 I/O 的文件与其他具有高 I/O 的文件隔离。这将减少磁盘上的争用并可能提高性能。要识别那些使用最多 I/O\
  \ 的文件，请参考 `sys.dm_io_virtual_file_stats`。\n\n\n### 使用分区表\n\n除了简单地将文件添加到文件组并让 SQL\
  \ Server 在它们之间分配数据之外，还可以定义称为*分区*的数据水平分割，以便数据根据分区在多个文件之间划分。一组过滤后的数据是一个段（segment）；例如，如果按月分区，那么数据段就是任何给定的月份。创建分区会将该数据段移动到特定的文件组，并且仅移动到那个文件组。虽然分区主要是使数据管理更轻松的工具，但在某些情况下你可能会看到速度的提升，因为在针对定义良好的分区进行查询时，通过一个称为*分区消除（partition\
  \ elimination）* 的过程，只会访问包含你感兴趣的数据分区的文件。如果你假设数据按月分区，那么每个月的数据文件可以在月份结束时设置为只读。这种只读状态意味着你将更快地恢复系统，并且你可以压缩存储，从而带来一些性能提升。请记住，分区主要是一个可管理性特性。虽然你在某些情况下可能会从中看到一些性能好处，但它不应被视为数据分区的一部分来指望。SQL\
  \ Server 2017 最多支持 15,000 个分区（请记住，这是一个限制，而不是目标）。我再说一遍，分区绝对不是一个性能增强工具。\n\n## 本章总结\n\
  \n本章重点介绍收集和解释有关磁盘行为的指标。请记住，每套硬件从根本上都可能是不同的，因此应用任何硬性的行为指标都可能是有问题的。你现在拥有了使用性能监视器和一些\
  \ `T-SQL` 命令来收集磁盘性能指标的工具。解决磁盘瓶颈的方法多种多样，但如果你正在处理与磁盘行为相关的瓶颈，就必须探索这些方法。\n\n下一章将通过讨论\
  \ `CPU` 来完成对系统瓶颈的检查。\n\n"
- '# 4. CPU 性能分析


  本章通过讨论 `CPU`、网络和一般 `SQL Server` 指标，结束本书对系统的探索。`CPU` 是系统的工作引擎，保持一切运行。收集和传递数据、维护系统以及排序访问所需的所有不同计算都由
  `CPU` 执行。在 `CPU` 上遇到瓶颈可能是一个难以摆脱的过程。不像内存，你有时可以轻松安装更多，或者磁盘，你有时可以轻松添加更多或升级，`CPU` 是你所运行系统的一个组成部分，并且通常只能通过购买新机器来升级。因此，你需要密切关注
  `CPU` 使用情况。网络很少是 `SQL Server` 的主要瓶颈，当然在处理 `Azure SQL Database` 时除外，但密切关注它们也是好的。最后，还有一些
  `SQL Server` 内部进程，你需要收集相关指标。本章涵盖以下主题：


  *   如何收集有关处理器的指标

  *   通过 `T-SQL` 查询可用的其他指标

  *   解决处理器瓶颈的方法


  ## 处理器瓶颈分析


  SQL Server 大量使用任何可用的处理器资源。你更可能在 `I/O` 或内存上遇到瓶颈，但你也可能会遇到 `CPU` 问题。我们在此介绍的措施侧重于操作系统和
  SQL Server。然而，在虚拟化环境中，我们正在查看的 `CPU` 措施不太可能反映现实。你需要处理你用于虚拟化的任何管理程序或系统，以确切了解某些操作系统级别的
  `CPU` 措施实际上如何反映现实。你可能正在经历外部压力甚至外部限制，这些都不会在以下概述的计数器中可见。


  你可以使用表 4-1 中的性能监视器计数器来分析处理器资源上的压力。


  表 4-1


  用于分析 `CPU` 压力的性能监视器计数器


  | 对象（实例[,实例 N]） | 计数器 | 描述 | 值 |

  | --- | --- | --- | --- |

  | `Processor(_Total)%` | `Processor Time` | 处理器处于繁忙状态的时间百分比 | 平均值 < 80%，但需与基线比较
  |

  | `% Privileged` | 在特权模式下花费的处理器时间百分比 | 平均值 < 10%，但需与基线比较 |

  | `System` | `Processor Queue Length` | 处理器上未完成的请求数量 | 平均值 < 2，但需与基线比较 |

  | `Context Switches/sec` | 处理器每秒从一个线程切换到另一个线程的速率 | 平均值 < 5,000，但需与基线比较 |

  | `SQL Server:SQL Statistics` | `Batch Requests/sec` | 每秒收到的 `SQL` 命令批处理数 | 基于你的标准工作负载
  |

  | `SQL Compilations/sec` | `SQL` 被编译的次数 | 基于你的标准工作负载 |

  | `SQL Recompilations/sec` | 重编译的次数 |  |


  让我们更详细地讨论这些计数器。


  ### % Processor Time


  `% Processor Time` 不应持续偏高（大于 80%）。任何持续超过 90% 的处理器时间的效果实际上等同于 100%。如果 `% Processor
  Time` 持续偏高，而磁盘和网络计数器值较低，你的首要任务必须是减少处理器上的压力。请记住，这里的数字只是建议；人们可能出于有效原因不同意这些数字。将它们作为评估系统的起点，而不是具体的建议。


  例如，如果 `% Processor Time` 是 85%，并且通过监控 `I/O` 计数器发现磁盘使用过多，那么很可能很大一部分处理器时间用于管理磁盘活动。这将在处理器的
  `% Privileged Time` 计数器中反映出来，如下一节所述。在这种情况下，首先优化磁盘瓶颈将是有利的。此外，请记住，磁盘瓶颈反过来可能是由于内存瓶颈造成的，正如本章前面所解释的。


  你可以跟踪机器上所有处理器的聚合处理器时间，也可以单独跟踪特定处理器的使用百分比。这允许你在 `SQL Server` 运行在四处理器机器中的三个处理器上的情况下隔离数据收集。记住，你可能会看到一个处理器满负荷运行，而另一个处理器负载很小。在这种情况下，平均值不会反映现实。使用平均值仅作为一个指标，而使用单个值作为系统上实际负载和处理的更准确度量。


  在虚拟化环境中，`CPU` 可能是虚拟化的，因此你所看到的并不准确。所以，例如，在 `VMware` 系统中，如果你安装了 `VMware Tools`，你将能够查看
  `VM Processor` 计数器以查看主机机器的处理器使用情况。使用这个度量，你可以判断你在操作系统中看到的 `CPU` 用法是否反映在主机机器上，或者你是否实际上只是用完了你的虚拟
  `CPU`。另一方面，运行 `Hyper-V` 时，你需要查看 `\Hyper-V Hypervisor Logical Processor(_Total)\%
  Total Run Time` 以获得相同的度量。根据你使用的管理程序，你还会看到其他度量。




  ### % 特权时间


  在 Windows 服务器上，处理分为两种模式：*用户模式* 和 *特权*（或*内核*）模式。所有系统级活动，包括磁盘访问，都在特权模式下进行。如果你在专用 SQL
  Server 系统上发现 `% 特权时间` 达到 20% 到 25% 或更高，那么该系统可能正在进行大量外部处理。这可能是 I/O、过滤驱动程序（如加密服务）、有缺陷的
  I/O 组件，甚至是过时的驱动程序造成的。在专用 SQL Server 系统上，`% 特权时间` 计数器应最多为 5% 到 10%，但请使用你的基线来确定你的系统上什么表现看起来是正常的。


  ### 处理器队列长度


  `处理器队列长度` 是处理器队列中的线程数量。（即使在具有多个处理器的计算机上，也只有一个处理器队列。）与磁盘计数器不同，`处理器队列长度` 计数器不读取已经在运行的线程。在
  CPU 利用率较低的系统上，`处理器队列长度` 计数器通常为 0 或 1。


  持续大于 2 的 `处理器队列长度` 计数器通常表示处理器拥堵。由于存在多个处理器，你可能需要考虑处理处理器队列长度的调度器数量。超过调度器数量（通常与处理器数量
  1:1 对应）两倍的处理器队列长度也可能表明存在处理器瓶颈。虽然高的 `% 处理器时间` 计数器表示处理器繁忙，但持续高的 `处理器队列长度` 计数器是一个更确定的指标。如果超过建议值，这通常表示准备运行的线程数量超出了当前处理器数量所能最优处理的范围。


  ### 上下文切换/秒


  `上下文切换/秒` 计数器监视计算机上所有处理器从一个线程切换到另一个线程的组合速率。当正在运行的线程自愿放弃处理器、被更高优先级的就绪线程抢占，或在用户模式和特权模式之间切换以使用执行体或子系统服务时，就会发生上下文切换。它是计算机中所有处理器上所有运行线程的
  `线程:上下文切换/秒` 的总和，以切换次数衡量。


  较高的数值主要由你的 CPU 速度决定，因此请随时间测量性能，并将此数字与你的基线进行比较，以了解你何时可能偏离正常状态。


  ### 批处理请求/秒


  `批处理请求/秒` 很好地指示了系统上承载的负载量，这与处理器上的负载量有直接关联。由于你可能在系统上看到大量低成本查询或少数高成本查询，因此你不能单独看这个数字，而必须参考本节定义的其他计数器；每秒
  10,000 个请求将被视为繁忙系统。更高的数值可能值得关注，这完全取决于你的系统什么是正常的。了解哪个值在你自己的系统中具有意义的最佳方法是建立一个基线，然后据此进行监控。请记住，这里的高数字不一定值得关注。如果你的所有其他资源都在掌控之中，并且你维持着较高的
  `批处理请求/秒` 数字，那只是意味着你的服务器很忙。


  ### SQL 编译/秒


  `SQL 编译/秒` 计数器在其聚合中显示了批编译和语句重编译。当服务器首次启动（或在故障转移或任何其他启动类型事件之后），这个数字可能非常高，但它会随着时间的推移而稳定下来。一旦稳定，与基线测量相比出现显著或持续的编译峰值是值得关注的原因，并且肯定会在处理器中表现为问题，因为查询编译是一项昂贵的操作。如果你正在使用某种对象关系映射引擎，例如
  nHibernate 或 Entity Framework，高编译次数可能是正常的，尽管成本同样高昂。第 14 章详细介绍了 SQL 编译。


  ### SQL 重编译/秒


  `SQL 重编译/秒` 是批处理和语句重编译的度量。大量的重编译可能导致处理器压力。由于语句重编译是此计数的一部分，因此它可能比 2005 年之前的 SQL Server
  版本高得多。第 17 章详细介绍了查询重编译。


  ## 用于测量 CPU 性能的其他工具


  你也可以使用 DMO 来捕获有关 CPU 的信息。这些 DMO 中的信息需要通过运行查询来捕获，然后将其作为基线测量的一部分保存。


  ### Sys.dm_os_wait_stats


  等待统计是了解系统是否存在瓶颈的好方法。不过，你不能简单地说某个大于 *x* 的数字就是坏的。你需要随时间收集指标，以了解什么在你的系统上代表正常。偏离正常值的部分是有趣的。针对此
  DMO 的查询，如果查找信号等待时间，可以指示 CPU 瓶颈。


  过去，`CXPACKET` 等待被认为是在测量 CPU 性能时浪费时间。然而，随着 SQL Server 2016 SP2 和 SQL Server 2017
  CU3 的发布，等待统计出现了一个新的拆分。现在有一个 `CXPACKET` 等待（我们需要关注的），和一个 `CXCONSUMER` 等待（不重要的）。如果你运行的是
  Azure SQL Database，你也会看到这种相同的拆分。这种拆分的核心是为了涵盖并行性的消费者和生产者，这是某些系统上 CPU 瓶颈的主要原因。并行性的消费者，即接收数据的操作，通常具有可忽略但可测量的等待，换句话说，就是
  `CXCONSUMER` 等待。现在，`CXPACKET` 衡量的是生产者，或推送数据的操作符。这改变了情况。`CXPACKET` 现在是一个指示系统上影响你的
  CPU 的实际负载的等待。


  ### Sys.dm_os_workers 和 Sys.dm_os_schedulers


  这些 DMO 显示 Windows 操作系统中的工作线程和调度器线程。定期运行针对这些 DMO 的查询将使你能够获取处于可运行状态的进程数量。这是处理器负载的一个极好指示。


  ### 查询存储


  查询存储并不是专门测量 CPU 的工具，但它捕获的信息确实包括相关查询的聚合 CPU 使用率，以及这些查询的等待统计，包括任何与 CPU 相关的统计。


  ### 在 Linux 中测量 CPU 行为


  在 Linux 上运行时，你仍然可以使用 `sys.dm_os_wait_stats`。这将为你提供可以指示 CPU 负载的等待统计。否则，你需要进入 Linux
  系统本身。查看 CPU 的通常推荐方法是使用 `top` 命令。该工具的输出记录在这里：[`https://bit.ly/2KbZmuZ`](https://bit.ly/2KbZmuZ)。


  ## 处理器瓶颈解决方案


  以下是几个常见的处理器瓶颈解决方案：


  *   优化应用程序工作负载

  *   消除或减少过多的编译/重编译

  *   使用更多或更快的处理器

  *   不运行不必要的软件


  让我们依次考虑这些解决方案。




  ### 优化应用程序工作负载


  要识别处理器密集型查询，请使用扩展事件会话（将在下一章讨论）捕获所有 SQL 查询，然后按 CPU 列对输出进行分组。另一种方法是利用查询存储（在第 11 章讨论）。您可以从
  `sys.query_store_runtime_stats` 检索信息，以查看每个查询的多个聚合 CPU 指标。CPU 时间最高的查询对 CPU 压力的贡献最大。您应随后分析并优化这些查询，以减轻
  CPU 的压力。通常，CPU 压力的原因并非查询内的大量计算，而是逻辑 I/O 内的争用。解决 I/O 问题通常也有助于解决 CPU 问题。您还可以直接查询 `sys.dm_exec_query_stats`
  或 `sys.dm_exec_procedure_stats` 动态管理视图，以实时查看即时问题。最后，使用 `query hash` 和 `query plan
  hash`，您可以识别并调优常见查询或常见执行计划（这将在第 14 章详细讨论）。本书的大部分章节都涉及优化应用程序工作负载。


  ### 消除过多的编译/重新编译


  一定数量的查询编译和重新编译是预料之中的事，特别是如前所述，当使用 ORM 工具时。但当这些操作在持续期间内大量出现时，就存在问题。同样值得注意的是它们之间的比例。编译数量高而重新编译数量低，意味着系统内查询重用较少（查询重用在第
  9 章详细讨论）。大量的重新编译将导致处理器使用率高。解决重新编译的方法在第 17 章介绍。


  ### 使用更多或更快的处理器


  最简单的解决方案之一，也是您大多数时候会采用的方案，就是增加系统处理能力。然而，由于处理器升级涉及高昂成本，您应首先尽可能优化 CPU 密集型操作。


  可以通过增加单个处理器的性能或添加更多处理器来提高系统的处理能力。当您的 `% Processor Time` 计数器较高而 `Processor Queue
  Length` 计数器较低时，增加单个处理器的性能是合理的。如果 `% Processor Time` 计数器和 `Processor Queue Length`
  计数器都高，则应考虑添加更多处理器。增加处理器数量允许系统同时执行更多请求。


  ### 不运行不必要的软件


  公司政策通常要求在服务器上安装病毒检查软件。服务器上也可能运行着其他产品。在可能的情况下，不应在 SQL Server 所在的同一服务器上运行不必要的软件。与维护
  Windows Server 或 SQL Server 无关的外部应用程序最好放在不同的机器上。


  ## 网络瓶颈分析


  在 SQL Server OLTP 生产环境中，您很少会遇到因网络问题导致的性能问题。在 OLTP 环境中遇到的大多数网络问题实际上是由硬件或驱动程序限制、或交换机或路由器问题引起的。大多数此类问题最好使用网络监视器工具进行诊断。但是，性能监视器也提供了收集网络活动数据的对象，如表
  4-2 所示。


  表 4-2


  用于分析网络压力的性能监视器计数器


  | 对象（实例[,实例 N]） | 计数器 | 描述 | 值 |

  | --- | --- | --- | --- |

  | 网络接口（网卡） | `字节总数/秒` | 网络接口卡（NIC）上传输字节的速率 | 平均值 < NIC 容量的 50%，但需与基线比较 |

  | 网络段 | `网络利用率百分比` | 网络段上正在使用的网络带宽百分比 | 平均值 < 网络带宽的 80%，但需与基线比较 |


  ### 字节总数/秒


  您可以使用 `字节总数/秒` 计数器来确定网络接口卡（NIC）或网络适配器的性能。`字节总数/秒` 计数器应报告较高的值，表示大量成功的传输。将此值与 `网络接口\当前带宽`
  性能计数器报告的值进行比较，后者反映了每个适配器的带宽。


  为了为流量高峰留出空间，通常平均不应超过容量的 50%。如果此数字接近连接容量，并且处理器和内存使用率适中，则该连接很可能存在问题。


  ### 网络利用率百分比


  `网络利用率百分比` 计数器代表网络段上正在使用的网络带宽百分比。此计数器的阈值取决于网络类型。例如，对于以太网，当 SQL Server 位于共享网络集线器上时，建议阈值为
  30%。对于位于专用全双工网络上的 SQL Server，即使网络利用率接近 100% 也是可以接受的，但将网络利用率保持在可接受的阈值以下是有利的，以便为负载高峰留出空间。


  ### 注意


  必须安装网络监视器驱动程序才能使用 `网络段` 对象计数器收集性能数据。


  在 Windows Server 2012 R2 中，您可以从网络适配器的本地连接属性安装网络监视器驱动程序。网络监视器驱动程序在网络适配器的网络组件的网络协议列表中可用。


  您还可以查看 `sys.dm_os_wait_stats` 中与网络相关的等待统计信息。但是，经常出现的一个等待类型是 `ASYNC_NETWORK_IO`。虽然这可能表明存在与网络相关的等待，但它更常见地反映了因编程代码不佳（未高效地使用结果集）而导致的等待。


  ## 网络瓶颈解决方案


  一些常见的网络瓶颈解决方案如下：


  *   优化应用程序工作负载

  *   添加网络适配器

  *   调节和避免中断


  让我们更详细地考虑这些解决方案。


  ### 优化应用程序工作负载


  要优化数据库应用程序和数据库服务器之间的网络流量，请在应用程序中进行以下设计更改：


  *   不要发送长的 SQL 字符串，而是为 SQL 查询创建一个存储过程。然后，您只需通过网络发送存储过程的名称及其参数。

  *   将多个数据库请求分组到一个存储过程中。然后，对于存储过程中实现的一组 SQL 查询，只需通过网络发出一次数据库请求。当谈论 Azure SQL 数据库时，这一点变得极其重要。

  *   请求小型数据集。不要请求应用程序逻辑中未使用的表列。

  *   将数据密集型业务逻辑移到数据库中作为存储过程或数据库触发器，以减少网络往返次数。

  *   如果数据不经常更改，尝试将信息缓存在应用程序上，而不是频繁调用数据库获取与上次调用完全相同的信息。

  *   最小化网络调用，例如返回未使用的多个结果集。一个常见的问题是由 SQL Server 返回的结果集包含每个语句的行计数引起的。您可以在查询顶部使用 `SET
  NOCOUNT ON` 来禁用此功能。




  该请求被拒绝，因为它被认为是高风险




  ### 不可重用的执行计划


  由于为存储过程查询生成执行计划需要消耗 CPU 周期，您可以通过重用执行计划来减轻 CPU 的压力。要分析正在重新编译的存储过程数量，您可以查看表 4-6 中的计数器。


  表 4-6


  用于分析执行计划可重用性的性能监视器计数器


  | 对象(实例[,实例 N]) | 计数器 |

  | --- | --- |

  | `SQLServer:SQL Statistics` | `SQL Re-Compilations/sec` |


  存储过程的重新编译会给处理器带来额外开销。您希望 `SQL Re-Compilations/sec` 计数器的值尽可能接近 0，但这几乎不可能实现。如果您持续看到偏离基线测量值或剧烈波动的值，则应使用扩展事件来进一步调查正在经历重新编译的存储过程。一旦识别出相关的存储过程，您应尝试分析并解决导致重新编译的原因。在第
  17 章中，您将学习如何分析和解决各种重新编译的原因。


  ### 一般行为


  SQL Server 提供了额外的性能计数器来跟踪 SQL Server 系统的一些一般方面。表 4-7 列出了一些最常用的计数器。


  表 4-7


  用于分析传入请求量的性能监视器计数器


  | 对象(实例[,实例 N]) | 计数器 |

  | --- | --- |

  | `SQLServer:General Statistics` | `User Connections` |

  | `SQLServer:SQL Statistics` | `Batch Requests/sec` |


  ### 用户连接


  多个只读的 SQL Server 实例可以在负载均衡环境（其中 SQL Server 分布在多台机器上）中协同工作，以支持大量的数据库请求。在这种情况下，最好监控
  `User Connections` 计数器，以评估用户连接在多个 SQL Server 实例间的分布情况。`User Connections` 在正常的 application
  行为下可能覆盖很宽的范围。这正是基线对于确定预期行为至关重要的地方。您很快将看到如何建立此基线。


  ### 批请求/秒


  此计数器是 SQL Server 上负载的一个良好指标。根据系统资源利用率和 `Batch Requests/sec` 的水平，您可以估计 SQL Server
  在不出现资源瓶颈的情况下可能支持的用户数量。此计数器在不同负载周期下的值，有助于您理解其与数据库连接数量的关系。这也有助于您理解 SQL Server 与 `Web
  Request/sec` 的关系，即对于使用 Microsoft Internet Information Services (IIS) 和 Active Server
  Pages (ASP) 的 Web 应用程序来说，是 Active Server Pages.Requests/sec。所有这些分析有助于您更好地理解和预测随着用户负载变化而产生的系统行为。


  在正常的 application 行为下，此计数器的值可能覆盖很宽的范围。一个正常的基线对于确定预期行为至关重要。


  ## 总结


  在本章中，您学习了如何收集关于 CPU、网络和 SQL Server 本身的一般指标。所有这些信息都有助于您在深入尝试调整查询之前，理解系统上正在发生的事情。请记住，CPU
  会受到其他资源的影响，因为它需要管理这些资源，因此一些看似 CPU 问题的情况，可能更适合解释为磁盘或内存问题。网络很少成为 SQL Server 的主要瓶颈。您可以通过性能监视器计数器，像观察系统其他部分一样，使用多种方法来观察
  SQL Server 内部行为。关于各种系统指标的讨论到此结束。接下来，您将学习如何将这些内容整合起来以创建基线。


  '
- '# 5. 创建基线


  在前三章中，您学到了很多关于由内存、磁盘和 CPU 引起的各种可能的系统瓶颈的知识。我还介绍了一些用于收集系统这些部分数据的性能监视器指标。在大多数计数器的描述中，我都提到了将您的指标与基线进行比较。本章将介绍如何收集您的指标，以便您拥有该基线用于后续比较。我将概述如何配置一种自动化方法来收集这些信息。基线是理解系统行为的基础部分，因此您应该始终有一个可用的基线。本章涵盖以下主题：


  *   监控虚拟机和托管机器的注意事项

  *   如何设置性能监视器指标的自动收集

  *   使用性能监视器时避免问题的注意事项

  *   Azure SQL Database 的基线

  *   创建基线




  ## 监控虚拟机和托管机器的注意事项


  在开始创建基准之前，我将讨论一下虚拟机。越来越多的 SQL Server 实例运行在虚拟机上。当你使用虚拟机或将虚拟机托管在亚马逊或微软 Azure 等远程环境中时，许多标准性能计数器将不再显示准确的信息。如果你在虚拟机内部监控这些计数器，从故障排除的角度来看，你的数值可能没有帮助。如果你在物理机上监控这些计数器（假设你能访问它，这台物理机无疑被多个不同的虚拟机所共享），你将无法识别特定
  SQL Server 实例的资源瓶颈。因此，在使用虚拟机时，必须监控额外的信息。你收集的大多数关于磁盘和网络性能的信息在虚拟机环境中仍然适用。所有查询度量信息对于那些查询来说是准确的。查询运行多长时间、发生了多少次读取，这些就是确切的时长和读取量。你主要会发现内存和
  CPU 指标完全不同且相当不可靠。


  这是因为在虚拟化服务器环境中，CPU 和内存在机器之间是共享的。你可能在一个 CPU 上启动一个进程，却在另一个完全不同的 CPU 上完成它。某些虚拟环境实际上会根据机器对内存需求的变化而改变分配给该机器的内存在。面对这类变化，传统的监控方式就不适用了。好消息是，主要的虚拟机供应商都提供了关于如何监控他们的系统以及如何在他们的系统中使用
  SQL Server 的指导。在监控虚拟机的具体细节上，你很大程度上可以依赖这些第三方文档。以两个最常见的虚拟机监控程序 `VMware` 和 `HyperV`
  为例，这里分别是来自两者的文档：


  *   `VMware` 监控虚拟机性能 ([`http://bit.ly/1f37tEh`](http://bit.ly/1f37tEh))


  *   在 `HyperV` 上测量性能 ([`http://bit.ly/2y2U6Iw`](http://bit.ly/2y2U6Iw))


  队列计数器，例如 `处理器队列长度`，在虚拟机内部监控时仍然适用。这些指标表明虚拟机本身资源匮乏，从而导致你的 SQL Server 实例资源匮乏，不得不等待访问虚拟
  CPU。需要记住的重要一点是，在虚拟机上，CPU 和内存的速度可能会变慢，因为虚拟机管理系统会对系统资源的调用形成干扰。由于托管资源的共享特性，你可能还会在托管虚拟机上看到较慢的
  I/O。


  在 `Azure SQL Database` 和任何 `SQL Server 2016` 或更高版本的实例中，还有一个内置的、自动化的基准机制，称为 `Query
  Store`（查询存储）。我们将在第 11 章详细介绍 `Query Store`。


  另一个可用于了解系统行为的机制是 `DMV`（动态管理视图）。很难将它们与基准等同视之，因为它们会因缓存、重启、故障转移和其他机制而发生很大变化。然而，它们确实提供了一种查看查询性能聚合视图的方法。我们将在第
  6 章及本书的后续部分更详细地介绍它们。


  ## 创建基准


  现在你已经了解了一些主要的性能计数器，让我们看看如何将这些计数器整合起来创建系统基准。以下是需要遵循的步骤：


  1.  创建一个可复用的性能计数器列表。

  2.  使用你的性能计数器列表创建一个计数器日志。

  3.  最小化 `性能监视器` 的开销。


  ### 创建可复用的性能计数器列表


  在连接到 SQL Server 系统所在同一网络的 `Windows Server 2016` 机器上运行 `性能监视器` 工具。通过 `属性` ➤ `数据`
  ➤ `添加计数器` 对话框，将性能计数器添加到 `性能监视器` 的 `查看图表` 显示中，如图 5-1 所示。


