- "# 9. 索引分析\n\n在上一章中，我介绍了围绕 B 树索引的概念。本章将基于这些信息，扩展更多功能和更多索引类型。索引之间存在许多有趣的交互作用，你可以加以利用。此外，还有一些在前一章未涉及的、会影响索引行为的设置。我将向你展示如何从系统中挤出更多性能。最重要的是，我们将深入探讨列存储索引的细节，以及它们为分析查询带来的根本性性能提升。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   高级索引技术\n*   列存储索引\n*   特殊索引类型\n*   索引的附加特性\n\n## 高级索引技术\n\
  \n这里列举了一些你可以考虑的更高级的索引技术：\n\n*   `覆盖索引`：这些在第 8 章中已介绍过。\n*   `索引交叉`：使用多个非聚集索引来满足查询所需的所有列要求（来自一个表）。\n\
  *   `索引联接`：结合使用索引交叉和覆盖索引技术，以避免访问基础表。\n*   `筛选索引`：为了能够索引具有不规则数据分布或稀疏列的字段，你可以向索引应用筛选器，使其仅索引部分数据。\n\
  *   `索引视图`：这些将视图的输出具体化存储在磁盘上。\n*   `索引压缩`：可以通过 SQL Server 压缩索引的存储，从而在单个数据页上存放更多行数据，提升性能。\n\
  \n我将在以下各节中更详细地介绍这些主题。\n\n### 覆盖索引\n\n一个 `覆盖索引` 是一个建立在 SQL 查询所需的所有列上的非聚集索引，而无需访问堆或聚集索引。如果一个查询遇到一个索引，并且根本不需要引用底层结构，那么该索引就可以被视为覆盖索引。\n\
  \n例如，在下面的 `SELECT` 语句中，无论列在语句中的哪个位置使用，所有列（`StateProvinceID` 和 `PostalCode`）都应包含在非聚集索引中，以完全覆盖该查询：\n\
  \n```sql\nSELECT  a.PostalCode\nFROM    Person.Address AS a\nWHERE   a.StateProvinceID\
  \ = 42;\n```\n\n这样，查询所需的所有数据都可以从非聚集索引页获取，而无需访问数据页。这有助于 SQL Server 节省逻辑读和物理读。如果你运行该查询，你将得到以下\
  \ I/O 和执行时间，以及如图 9-1 所示的执行计划：\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig1_HTML.jpg](img/323849_5_En_9_Fig1_HTML.jpg)\n\
  \n*图 9-1 无覆盖索引的查询*\n\n```text\nTable 'Address'. Scan count 1, logical reads 19\n\
  CPU time = 0 ms,  elapsed time = 0 ms.\n```\n\n这里发生了一个经典的查找操作，`Key Lookup` 运算符从聚集索引中提取\
  \ `PostalCode` 数据，并将其与针对 `IX_Address_StateProvinceId` 索引的 `Index Seek` 运算符进行连接。\n\
  \n虽然你可以重新创建包含两个键列的索引，但另一种使索引成为覆盖索引的方法是使用新的 `INCLUDE` 子句。它可以在不改变索引结构的情况下，将数据与索引一起存储。我稍后会详细说明为什么要使用\
  \ `INCLUDE` 子句。使用以下语句重新创建索引：\n\n```sql\nCREATE NONCLUSTERED INDEX IX_Address_StateProvinceID\n\
  ON Person.Address\n(\nStateProvinceID ASC\n)\nINCLUDE\n(\nPostalCode\n)\nWITH (DROP_EXISTING\
  \ = ON);\n```\n\n如果你重新运行查询，执行计划（图 9-2）、I/O 和执行时间都会发生变化。（另外，值得注意的是，0ms 并非正确的执行时间。使用以微秒（μs）记录执行时间的扩展事件会话，实际为\
  \ 177μs。）\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig2_HTML.jpg](img/323849_5_En_9_Fig2_HTML.jpg)\n\
  \n*图 9-2 有覆盖索引的查询*\n\n```text\nTable 'Address'. Scan count 1, logical reads 2\n\
  CPU time = 0 ms,  elapsed time = 0 ms.\n```\n\n读取次数从 19 次下降到了 2 次，执行计划也尽可能简化了；它只是一个针对新的、改进后的（现在已是覆盖）索引的单一\
  \ `Index Seek` 操作。覆盖索引是减少查询逻辑读取次数的有用技术。使用 `INCLUDE` 子句添加列可以更轻松地实现此功能，而不会增加索引中的列数或索引键的大小，因为包含的列仅存储在索引的叶级。\n\
  \n`INCLUDE` 子句最好在以下情况下使用：\n\n*   你不希望增加索引键的大小，但仍希望使索引成为覆盖索引。\n*   你有一个数据类型不能作为索引键列，但可以通过\
  \ `INCLUDE` 命令添加到非聚集索引中。\n*   你已经超出了索引的最大键列数（尽管这是一个最好避免的问题）。\n\n在继续之前，请将索引恢复为其原始格式。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_Address_StateProvinceID\nON Person.Address\n\
  (\nStateProvinceID ASC\n)\nWITH (DROP_EXISTING = ON);\n```\n\n在这个例子中，`SELECT` 语句不包含任何需要从非聚集索引页跳转到表的数据页的列，而这通常使得非聚集索引对于大型结果集和/或排序输出比聚集索引成本更高。这种非聚集索引被称为\
  \ `覆盖索引`。\n\n同样值得注意的是，我试验了将哪个列放在索引的引导边缘，`ExpMonth` 还是 `ExpYear`。经过测试，将 `ExpMonth`\
  \ 放在前面时的读取次数为 37，而将 `ExpYear` 放在前面则为 12。这是因为先按年份筛选比先按月份筛选需要查看的页面更少。请记住，在创建索引时要通过彻底的测试来验证你的选择。\n\
  \n测试完成后清理索引。\n\n```sql\nDROP INDEX Sales.CreditCard.ixTest;\n```\n\n## 总结\n\n在本章中，你了解到索引是减少查询逻辑读取次数和磁盘\
  \ I/O 的有效方法。虽然索引可能会增加操作查询的开销，但即使是像 `UPDATE` 和 `DELETE` 这样的操作查询也能从索引中受益。\n\n要为特定查询决定索引键列，需要评估查询的\
  \ `WHERE` 子句和连接条件。列的选择性、宽度、数据类型和列顺序等因素对于决定索引键中的列至关重要。由于索引主要用于检索少量行，因此索引列的选择性应该非常高。需要注意的是，非聚集索引包含聚集索引键的值作为其行定位器，因为此行为极大地影响了索引类型的选择。\n\
  \n在下一章中，你将学习更多关于可用于帮助你调整查询的其他功能和索引类型。\n\n\n\n### 一种伪聚集索引\n\n覆盖索引在物理上按照连续顺序组织所有索引列的数据。因此，从磁盘\
  \ I/O 的角度来看，一个不使用包含列的覆盖索引，对于完全由覆盖索引中列所满足的所有查询而言，就变成了一个聚集索引。如果查询的结果集需要排序输出，那么覆盖索引可以在物理上保持列数据与结果集要求相同的顺序——然后它可以像聚集索引一样用于排序输出。正如前面的例子所示，对于请求一定范围行和/或排序输出的查询，覆盖索引能提供比聚集索引更好的性能。包含列不是索引键的一部分，因此无法像索引的键列那样提供相同的排序优势。\n\
  \n## 建议\n\n为了利用覆盖索引的优势，请谨慎处理 `SELECT` 语句中的列列表，只移动你需要的数据（因此有禁止使用 `SELECT *` 的标准规范）。同时，尽可能使用较少的列，以保持覆盖索引的索引键尺寸较小。在合适的地方使用\
  \ `INCLUDE` 语句来添加列。由于覆盖索引包含了查询中使用的所有列，它往往非常宽，这增加了覆盖索引的维护成本。你必须在维护成本与覆盖索引带来的性能提升之间取得平衡。如果索引中所有列的字节数与该表单个数据行的字节数相比很小，并且你确定利用覆盖索引的查询会频繁执行，那么使用覆盖索引可能是有益的。\n\
  \n### 提示\n\n覆盖索引也有助于解决阻塞和死锁问题，你将在第 20 和 21 章中看到相关内容。\n\n在构建大量覆盖索引之前，请考虑 SQL Server\
  \ 如何能够有效地、自动地使用索引交叉，为查询动态创建覆盖索引。\n\n## 索引交叉\n\n如果一个表有多个索引，那么 SQL Server 可以使用多个索引来执行查询。SQL\
  \ Server 可以利用多个索引，根据每个索引选择较小的数据子集，然后执行这两个子集的交集（即，只返回满足所有条件的那些行）。SQL Server 可以利用表上的多个索引，然后采用连接算法来获取两个子集之间的\
  \ *索引交叉*。\n\n在下面的 `SELECT` 语句中，对于 `WHERE` 子句中的列，该表在 `SalesPersonID` 列上有一个非聚集索引，但在\
  \ `OrderDate` 列上没有索引：\n\n```\n--SELECT * is intentionally used in this query\nSELECT\
  \ soh.*\nFROM Sales.SalesOrderHeader AS soh\nWHERE soh.SalesPersonID = 276\nAND\
  \ soh.OrderDate\nBETWEEN '4/1/2005' AND '7/1/2005';\n```\n\n图 9-3 展示了此查询的执行计划。\n\
  \n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig3_HTML.jpg](img/323849_5_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n在 OrderDate 列上没有索引时的执行计划\n\n如你所见，优化器没有使用 `SalesPersonID` 列上的非聚集索引。由于也需要\
  \ `OrderDate` 列的值，优化器选择了聚集索引来获取所有引用列的值。检索这些数据的 I/O 和时间如下：\n\n```\nTable 'SalesOrderHeader'.\
  \ Scan count 1, logical reads 689\nCPU time = 0 ms,  elapsed time = 3 ms.\n```\n\
  \n为了提高查询性能，可以将 `OrderDate` 列添加到 `SalesPersonId` 列上的非聚集索引中，或者将其定义为同一索引的包含列。但在这种实际场景中，修改现有索引时你可能需要考虑以下因素：\n\
  \n*   出于各种原因，可能不允许修改现有索引。\n*   现有的非聚集索引键可能已经相当宽了。\n*   修改会影响使用现有索引的其他查询的成本。\n\n\
  在这种情况下，你可以在 `OrderDate` 列上创建一个新的非聚集索引。\n\n```\nCREATE NONCLUSTERED INDEX IX_Test\n\
  ON Sales.SalesOrderHeader (OrderDate);\n```\n\n再次运行你的 `SELECT` 命令。\n\n图 9-4 展示了\
  \ `SELECT` 语句的最终执行计划。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig4_HTML.jpg](img/323849_5_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n在 OrderDate 列上有索引时的执行计划\n\n如你所见，SQL Server 利用了这两个非聚集索引作为索引查找（而不是扫描），然后采用了一个交叉算法来获取两个子集的索引交叉。这由\
  \ `Hash Join` 表示。然后它从结果数据集中执行了一次 `Key Lookup` 来检索索引中未包含的其余数据。但是，计划的复杂性表明性能可能更差。检查统计信息\
  \ I/O 和时间后，你会发现实际上你获得了很好的性能提升：\n\n```\nTable 'SalesOrderHeader'. Scan count 2, logical\
  \ reads 10\nTable 'Workfile'. Scan count 0, logical reads 0,\nTable 'Worktable'.\
  \ Scan count 0, logical reads 0\nCPU time = 0 ms,  elapsed time = 2 ms.\n```\n\n\
  即使该计划在表内使用了三个不同的访问点，并且必须为处理 `Hash Join` 创建存储空间，读取次数还是从 689 次降到了 10 次。执行时间也减少了（在扩展事件中从\
  \ 3,333μs 降至 2,279μs）。你还可以看到计划中发生了额外的操作，例如 `Key Lookup`，通过进一步调整索引，你可能能够消除它。然而，值得注意的是，由于你通过\
  \ `SELECT *` 命令返回所有列，无法通过使用 `INCLUDE` 列来有效地消除 `Key Lookup`，因此你可能还需要调整查询本身。\n\n\n\
  ## 索引交叉\n\n为了提升查询性能，SQL Server 可能会在一个表上使用多个索引，尽管这比较少见，因为它需要良好的统计信息和针对特定查询的精确索引。通常，我倾向于在索引上使用更小、更窄的键，而不是宽键。SQL\
  \ Server 经常能够组合使用索引，即使不组合，使用窄索引的性能也**更好**。\n\n在创建覆盖索引时，请识别现有非聚集索引中是否已包含覆盖索引所需的大部分列。您可能已经有两个现有的非聚集索引，它们共同覆盖了覆盖索引所需的所有列。如果可能，适当调整现有非聚集索引的列顺序，允许优化器考虑这两个非聚集索引之间的索引交叉。\n\
  \n有时，您可能需要创建一个单独的非聚集索引，原因如下：\n\n*   不允许重新排列现有索引中的列。\n*   覆盖索引所需的某些列未包含在现有的非聚集索引中。\n\
  *   现有非聚集索引中的列总数可能多于覆盖索引所需的列数。\n\n在这种情况下，您可以为剩余的列创建一个非聚集索引。如果新索引与现有非聚集索引的组合列顺序满足覆盖索引的要求，优化器就可能使用索引交叉。在确定新索引的列及其顺序时，也要留意其他查询，以最大化其收益。\n\
  \n不要指望索引交叉能频繁生效。它依赖于优化器内部做出的选择。然而，在创建索引时努力朝这个方向尝试并没有坏处。\n\n删除为测试而创建的索引。\n\n```sql\n\
  DROP INDEX Sales.SalesOrderHeader.IX_Test;\n```\n\n### 索引连接\n\n`索引连接`是索引交叉的一种变体，它将覆盖索引技术应用于索引交叉。如果没有单个索引能覆盖查询，但多个索引组合起来可以覆盖查询，那么\
  \ SQL Server 可以使用索引连接来完全满足查询，而无需访问基表。\n\n让我们看看这种索引技术的应用。对“索引交叉”部分的查询稍作修改，如下所示：\n\
  \n```sql\nSELECT soh.SalesPersonID,\nsoh.OrderDate\nFROM Sales.SalesOrderHeader\
  \ AS soh\nWHERE soh.SalesPersonID = 276\nAND soh.OrderDate\nBETWEEN '4/1/2013' AND\
  \ '7/1/2013';\n```\n\n此查询的执行计划如图 9-5 所示，读取次数如下：\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig5_HTML.jpg](img/323849_5_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5 无索引连接的执行计划\n\n```\nTable 'SalesOrderHeader'. Scan count 1, logical reads\
  \ 689\nCPU time = 0 ms, elapsed time = 2 ms. (2345 us)\n```\n\n如图 9-5 所示，优化器没有使用\
  \ `SalesPersonID` 列上现有的非聚集索引。由于查询还需要 `OrderDate` 列的值，优化器选择了聚集索引来检索查询引用的所有列的值。如果在\
  \ `OrderDate` 列上创建如下索引：\n\n```sql\nCREATE NONCLUSTERED INDEX IX_Test\nON Sales.SalesOrderHeader\
  \ (OrderDate ASC);\n```\n\n并重新运行查询，那么图 9-6 显示了结果，您可以在这里看到读取次数：\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig6_HTML.jpg](img/323849_5_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6 带索引连接的执行计划\n\n```\nTable 'Workfile'. Scan count 0, logical reads 0\nTable\
  \ 'Worktable'. Scan count 0, logical reads 0\nTable 'SalesOrderHeader'. Scan count\
  \ 2, logical reads 10\nCPU time = 0 ms, elapsed time = 1 ms (1657 us).\n```\n\n\
  两个索引的组合起到了覆盖索引的作用，将表的读取次数从 689 次减少到 10 次，因为它使用了两个组合在一起的 `Index Seek` 操作，而不是一个聚集索引扫描。\n\
  \n但如果 `WHERE` 子句没有导致两个索引都被使用呢？相反，您知道两个索引都存在，并且像前面的查询那样对每个索引进行查找是可行的，因此您选择使用索引提示。\n\
  \n```sql\nSELECT soh.SalesPersonID,\nsoh.OrderDate\nFROM Sales.SalesOrderHeader\
  \ AS soh\nWITH (INDEX(IX_Test, IX_SalesOrderHeader_SalesPersonID))\nWHERE soh.OrderDate\n\
  BETWEEN '4/1/2013' AND '7/1/2013';\n```\n\n这个新查询的结果如图 9-7 所示，I/O 如下：\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig7_HTML.jpg](img/323849_5_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7 通过提示实现索引连接的执行计划\n\n```\nTable 'Workfile'. Scan count 0, logical reads 0\n\
  Table 'Worktable'. Scan count 0, logical reads 0\nTable 'SalesOrderHeader'. Scan\
  \ count 2, logical reads 64\nCPU time = 0 ms, elapsed time = 68 ms.\n```\n\n读取次数明显增加，执行时间也增加了。大多数情况下，优化器在索引和执行计划方面的选择是好的。尽管查询提示允许您从优化器手中接管控制权，但这种控制可能带来的问题和它解决的一样多。在试图强制使用索引连接以获得性能提升时，强制选择索引反而减慢了查询的执行。\n\
  \n在继续之前删除测试索引。\n\n```sql\nDROP INDEX Sales.SalesOrderHeader.IX_Test;\n```\n\n###\
  \ 注意\n\n在生成查询执行计划时，SQL Server 优化器会经历优化阶段，不仅要确定要使用的索引类型和连接策略，还要评估索引交叉和索引连接等高级索引技术。因此，在某些情况下，可以考虑创建多个窄索引，而不是创建宽覆盖索引。SQL\
  \ Server 可以将它们组合起来用作覆盖索引，也可以在需要时单独使用它们。但您需要测试以确定在您的情况下哪种方式更好——更宽的索引还是索引交叉与连接。\n\n\
  \n## 筛选索引\n\n筛选索引是一种非聚集索引，它使用一个过滤器（本质上是一个 `WHERE` 子句）来理想地针对一个或多个列创建一个高度选择性的键集，而这些列本身可能不具备良好的选择性。例如，一个包含大量\
  \ `NULL` 值的列可以存储为稀疏列以减少这些 `NULL` 值的开销。为该列添加筛选索引将使你能够拥有一个针对非 `NULL` 数据的可用索引。理解这一点的最好方法是看一个实际例子。\n\
  \n`Sales.SalesOrderHeader` 表有超过 30,000 行。在这些行中，有 27,000 多行在 `PurchaseOrderNumber`\
  \ 列和 `SalesPersonId` 列中具有 `null` 值。如果你想要获取一个简单的采购订单号列表，查询可能如下所示：\n\n```sql\nSELECT\
  \ soh.PurchaseOrderNumber,\nsoh.OrderDate,\nsoh.ShipDate,\nsoh.SalesPersonID\nFROM\
  \ Sales.SalesOrderHeader AS soh\nWHERE PurchaseOrderNumber LIKE 'PO5%'\nAND soh.SalesPersonID\
  \ IS NOT NULL;\n```\n\n如你所料，运行此查询会导致聚集索引扫描，以及如图 9-8 所示的 I/O 和执行时间：\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig8_HTML.jpg](img/323849_5_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8：没有索引的执行计划\n\n```\nTable 'SalesOrderHeader'. Scan count 1, logical reads\
  \ 689\nCPU time = 0 ms,  elapsed time = 52 ms.\n```\n\n为了解决这个问题，可以创建一个索引并包含查询中的部分列，使其成为一个覆盖索引。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_Test\nON Sales.SalesOrderHeader\n(\nPurchaseOrderNumber,\n\
  SalesPersonID\n)\nINCLUDE\n(\nOrderDate,\nShipDate\n);\n```\n\n当你重新运行查询时，性能提升相当显著（参见图\
  \ 9-9 及以下结果中的 I/O 和时间）。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig9_HTML.jpg](img/323849_5_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9：带有覆盖索引的执行计划\n\n```\nTable 'SalesOrderHeader'. Scan count 1, logical reads\
  \ 5\nCPU time = 0 ms,  elapsed time = 40 ms.\n```\n\n如你所见，覆盖索引将读取次数从 689 降到了 5，时间从\
  \ 52 毫秒降到了 40 毫秒。通常，这会被认为是一个不错的改进，对于系统可能已经足够。现在，假设这个查询需要频繁调用。那么，你能从中榨取的每一分速度都会带来回报。了解到索引列中有如此多的数据是\
  \ `null`，你可以调整索引，过滤掉 `null` 值（这些值无论如何也不会被索引使用），从而减小树的大小，因此减少了所需的搜索量。\n\n```sql\n\
  CREATE NONCLUSTERED INDEX IX_Test\nON Sales.SalesOrderHeader\n(\nPurchaseOrderNumber,\n\
  SalesPersonID\n)\nINCLUDE\n(\nOrderDate,\nShipDate\n)\nWHERE PurchaseOrderNumber\
  \ IS NOT NULL\nAND SalesPersonID IS NOT NULL\nWITH (DROP_EXISTING = ON);\n```\n\n\
  查询的最终运行结果如下性能指标：\n\n```\nTable 'SalesOrderHeader'. Scan count 1, logical reads 4\n\
  CPU time = 0 ms, elapsed time = 38 ms.\n```\n\n执行计划看起来相同，带有 `Index Seek`。要查看覆盖索引计划与筛选的覆盖索引计划之间的差异，我们可以使用\
  \ SSMS 来比较计划。将第一个计划保存为文件（右键单击该计划并选择“另存执行计划为”），然后，在第二个计划中，右键单击计划内部并选择“比较计划”。你将看到类似图\
  \ 9-10 的内容。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig10_HTML.jpg](img/323849_5_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10：两个计划的比较\n\n执行计划中几乎没有直接的差异指标。在右侧的属性中，我突出显示了一个很大的不同点。虽然查询是相同的，但由于索引过滤掉了所有空值，谓词被更改以移除\
  \ `IS NOT NULL`，因为它不再需要。这是优化器内部称为*简化*过程的一部分。\n\n尽管从绝对值上看，将读取次数从 5 次减少到 4 次不算多，但这意味着查询的\
  \ I/O 成本降低了 20%，如果这个查询像某些查询那样，在一分钟内运行数百甚至数千次，那么这 20% 的减少确实会带来巨大的回报。另一个可见的回报证据是执行时间，它再次从\
  \ 40 毫秒下降到 38 毫秒。\n\n筛选索引通过多种方式提高性能。\n\n*   通过减小索引大小来提高查询效率。\n*   通过创建更小的索引来降低存储成本。\n\
  *   由于索引体积减小，从而降低了索引维护成本。\n\n但是，任何事物都是有代价的。你可能会遇到参数化查询与筛选索引不匹配的问题，从而阻止其使用。统计信息不是基于过滤条件更新的，而是像常规索引一样基于整个表更新的。如同本书中的任何建议一样，在你的环境中进行测试，以确保筛选索引是有帮助的。\n\
  \n首先建议使用它们的场景之一就是像前面的例子一样，从索引中消除 `NULL` 值。你还可以通过特殊索引隔离经常访问的数据集，从而大大提高针对该数据的查询性能。你可以使用\
  \ `WHERE` 子句来过滤数据，方式类似于创建索引视图（在“索引视图”一节有更详细的介绍），但通过创建筛选索引作为覆盖索引（就像前面的例子），可以避免与索引视图相关的数据维护难题。\n\
  \n筛选索引在访问或创建时需要一组特定的 ANSI 设置。\n\n*   `ON`: `ANSI_NULLS`, `ANSI_PADDING`, `ANSI_WARNINGS`,\
  \ `ARITHABORT`, `CONCAT_NULL_YIELDS_NULL`, `QUOTED_IDENTIFIER`\n*   `OFF`: `NUMERIC_R0UNDAB0RT`\n\
  \n完成后，删除测试索引。\n\n```sql\nDROP INDEX Sales.SalesOrderHeader.IX_Test;\n```\n\n## 索引视图\n\
  \nSQL Server 中的数据库视图不存储任何数据。视图只是一个存储起来的 `SELECT` 语句。你使用 `CREATE VIEW` 语句来创建视图。你可以像对待表一样针对视图编写查询。当查询视图时，优化器会收到\
  \ `SELECT` 语句的完整定义，并以此作为优化针对该视图查询的基础。通过优化过程，`SELECT` 语句的部分或全部定义可能被用于满足对视图的查询。这里发生多大程度的简化，是由\
  \ `SELECT` 语句本身和对 `SELECT` 语句的查询共同决定的。\n\n通过在视图上创建唯一的聚集索引，可以将数据库视图具体化到磁盘上。这样的视图被称为*索引视图*或*物化视图*。在视图上创建唯一的聚集索引后，视图的结果集会立即物化并持久化在数据库的物理存储中，从而省去了在查询执行期间执行昂贵操作的开销。在视图物化之后，可以在索引视图上创建多个非聚集索引。这有效地将视图（再次说明，只是一个查询）变成了一个具有定义存储的真实表。\n\
  \n### 好处\n\n你可以使用索引视图通过以下方式提高查询性能：\n\n*   可以预先计算聚合并将其存储在索引视图中，以最小化查询执行期间昂贵的计算。\n\
  *   可以预先连接表，并将生成的数据集物化。\n*   可以将连接或聚合的组合物化。\n\n\n### 开销\n\n索引视图可能会给 OLTP 数据库带来显著开销。索引视图的部分开销如下：\n\
  \n*   基表中的任何更改都必须通过执行视图的`SELECT`语句反映到索引视图中。\n*   对定义了索引视图的基表进行任何更改，都可能引发索引视图的一个或多个非聚集索引的更改。如果更新了聚集键，则聚集索引也必须进行更改。\n\
  *   索引视图增加了数据库的持续维护开销。\n*   数据库需要额外的存储空间。\n\n创建索引视图的限制包括：\n\n*   视图上的第一个索引必须是唯一的聚集索引。\n\
  *   只有在创建了唯一的聚集索引后，才能在索引视图上创建非聚集索引。\n*   视图定义必须是*确定性*的，即对于给定查询，它只能返回一种可能的结果。（确定性和非确定性函数的列表可在\
  \ SQL Server 联机丛书中找到。）\n*   索引视图必须只引用同一数据库中的基表，不能引用其他视图。\n*   索引视图可以包含浮点列。但是，此类列不能包含在聚集索引键中。\n\
  *   索引视图必须与视图中引用的表进行架构绑定，以防止修改表架构（这是一个常见的重要问题）。\n*   视图定义的语法有几个限制。（视图定义的语法限制列表可在\
  \ SQL Server 联机丛书中找到。）\n*   必须固定的`SET`选项列表如下：\n    *   `ON`：`ARITHABORT`、`CONCAT_NULL_YIELDS_NULL`、`QUOTED_IDENTIFIER`、`ANSI_NULLS`、`ANSI_PADDING`和`ANSI_WARNING`\n\
  \    *   `OFF`：`NUMERIC_ROUNDABORT`\n\n### 注意\n\n如果查询连接设置与这些 ANSI 标准设置不匹配，在对索引视图中使用的表进行插入/更新/删除操作时可能会出现错误。\n\
  \n### 使用场景\n\n报表系统从索引视图中受益最大。具有频繁写入操作的 OLTP 系统可能无法充分利用索引视图，因为更新视图和底层基表在单个事务中会增加维护成本。索引视图提供的净性能提升是视图提供的总查询执行节省与存储和维护视图的成本之间的差值。\n\
  \n如果您使用的是 SQL Server 企业版，查询优化器在查询执行期间使用索引视图时，无需在查询中显式引用它。这允许现有应用程序从新创建的索引视图中受益，而无需更改这些应用程序。否则，在\
  \ SQL Server 的企业版以外的版本中，您需要在 T-SQL 代码中直接引用它。查询优化器只为成本较高的查询考虑索引视图。您也可能会发现新的列存储索引比索引视图更适合您，特别是当您对数据运行聚合或分析查询时。我将在本章后面介绍列存储索引。\n\
  \n让我们通过以下示例看看索引视图是如何工作的。考虑以下三个查询：\n\n```sql\nSELECT  p.[Name] AS ProductName,\n\
  SUM(pod.OrderQty) AS OrderOty,\nSUM(pod.ReceivedQty) AS ReceivedOty,\nSUM(pod.RejectedQty)\
  \ AS RejectedOty\nFROM    Purchasing.PurchaseOrderDetail AS pod\nJOIN Production.Product\
  \ AS p\nON p.ProductID = pod.ProductID\nGROUP BY p.[Name];\nSELECT  p.[Name] AS\
  \ ProductName,\nSUM(pod.OrderQty) AS OrderOty,\nSUM(pod.ReceivedQty) AS ReceivedOty,\n\
  SUM(pod.RejectedQty) AS RejectedOty\nFROM    Purchasing.PurchaseOrderDetail AS pod\n\
  JOIN Production.Product AS p\nON p.ProductID = pod.ProductID\nGROUP BY p.[Name]\n\
  HAVING  (SUM(pod.RejectedQty) / SUM(pod.ReceivedQty)) > .08;\nSELECT  p.[Name] AS\
  \ ProductName,\nSUM(pod.OrderQty) AS OrderQty,\nSUM(pod.ReceivedQty) AS ReceivedQty,\n\
  SUM(pod.RejectedQty) AS RejectedQty\nFROM    Purchasing.PurchaseOrderDetail AS pod\n\
  JOIN Production.Product AS p\nON p.ProductID = pod.ProductID\nWHERE   p.[Name] LIKE\
  \ 'Chain%'\nGROUP BY p.[Name];\n```\n\n所有三个查询都对`PurchaseOrderDetail`表的列使用聚合函数`SUM`。因此，您可以创建一个索引视图来预计算这些聚合，并在查询执行期间最小化这些复杂计算的成本。\n\
  \n以下是这些查询访问相应表时执行的逻辑读取次数：\n\n```\nTable 'Workfile'. Scan count 0, logical reads\
  \ 0\nTable 'Worktable'. Scan count 0, logical reads 0\nTable 'Product'. Scan count\
  \ 1, logical reads 6\nTable 'PurchaseOrderDetail'. Scan count 1, logical reads 66\n\
  CPU time = 0 ms,  elapsed time = 31 ms.\nTable 'Workfile'. Scan count 0, logical\
  \ reads 0\nTable 'Worktable'. Scan count 0, logical reads 0\nTable 'Product'. Scan\
  \ count 1, logical reads 6\nTable 'PurchaseOrderDetail'. Scan count 1, logical reads\
  \ 66\nCPU time = 0 ms,  elapsed time = 16 ms.\nTable 'PurchaseOrderDetail'. Scan\
  \ count 5, logical reads 894\nTable 'Product'. Scan count 1, logical reads 2\nCPU\
  \ time = 0 ms,  elapsed time = 1 ms.\n```\n\n我将使用以下脚本创建一个索引视图来预计算这些昂贵的计算并连接表：\n\n\
  ```sql\nCREATE OR ALTER VIEW Purchasing.IndexedView\nWITH SCHEMABINDING\nAS\nSELECT\
  \ pod.ProductID,\nSUM(pod.OrderQty) AS OrderQty,\nSUM(pod.ReceivedQty) AS ReceivedQty,\n\
  SUM(pod.RejectedQty) AS RejectedQty,\nCOUNT_BIG(*) AS Count\nFROM Purchasing.PurchaseOrderDetail\
  \ AS pod\nGROUP BY pod.ProductID;\nGO\nCREATE UNIQUE CLUSTERED INDEX iv\nON Purchasing.IndexedView\
  \ (ProductID);\nGO\n```\n\n某些结构如`AVG`是不允许的。（有关不允许的结构的完整列表，请参阅 SQL Server 联机丛书。）如果视图中包含聚合（如本例所示），则默认情况下必须包含`COUNT_BIG`。\n\
  \n\n"
- "# 索引视图与索引压缩\n\n## 索引视图性能\n\n索引视图将聚合函数的输出结果**物化**到磁盘上。这消除了在查询执行过程中为获取聚合输出而重新计算聚合函数的需要。例如，第三个查询请求从\
  \ `PurchaseOrderDetail` 表中获取特定产品的 `ReceivedQty` 和 `RejectedQty` 之和。由于这些值已在索引视图中为\
  \ `PurchaseOrderDetail` 表中的每个产品预先物化，因此你可以使用以下 `SELECT` 语句直接从索引视图中获取这些预聚合的值：\n\n\
  ```sql\nSELECT  iv.ProductID,\n        iv.ReceivedQty,\n        iv.RejectedQty\n\
  FROM    Purchasing.IndexedView AS iv;\n```\n\n如执行计划图 9-11 所示，该 `SELECT` 语句直接从索引视图中检索值，而无需访问基表\
  \ (`PurchaseOrderDetail`)。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig11_HTML.jpg](img/323849_5_En_9_Fig11_HTML.jpg)\n\
  \n*图 9-11：使用索引视图的执行计划*\n\n索引视图不仅使直接基于该视图的查询受益，也可能使其他查询能够利用这些物化数据。例如，有了索引视图，对 `PurchaseOrderDetail`\
  \ 的三个查询无需重写即可受益（第一个查询的执行计划见图 9-12），并且逻辑读取次数减少，如下所示：\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig12_HTML.jpg](img/323849_5_En_9_Fig12_HTML.jpg)\n\
  \n*图 9-12：自动使用了索引视图的执行计划*\n\n```\nTable 'Product'. Scan count 1, logical reads 13\n\
  Table 'IndexedView'. Scan count 1, logical reads 4\nCPU time = 0 ms,  elapsed time\
  \ = 53 ms.\nTable 'Product'. Scan count 1, logical reads 13\nTable 'IndexedView'.\
  \ Scan count 1, logical reads 4\nCPU time = 0 ms,  elapsed time = 1 ms.\nTable 'IndexedView'.\
  \ Scan count 0, logical reads 10\nTable 'Product'. Scan count 1, logical reads 2\n\
  CPU time = 0 ms,  elapsed time = 0 ms. (214 us)\n```\n\n即使查询并未修改以引用新的索引视图，优化器仍然会使用索引视图来提升性能。因此，数据库应用程序中的现有查询也能从新的索引视图中受益，而无需对查询进行任何修改。如果你需要的聚合方式与索引视图所提供的不同，那么你就没那么幸运了。这里又是列存储索引大放异彩的地方。\n\
  \n确保进行清理。\n\n```sql\nDROP VIEW Purchasing.IndexedView;\n```\n\n## 索引压缩\n\n数据和索引压缩功能在\
  \ SQL Server 2008 中引入（适用于企业版和开发者版，目前所有版本均可用）。*压缩*索引意味着将更多的键信息存储到单个页面上。这可以带来显著的性能提升，因为存储索引所需的页面和索引层级更少。由于索引中的键值需要被压缩和解压缩，CPU\
  \ 会有一些开销，因此这可能并非适用于所有索引的解决方案。内存也会受益，因为压缩后的页面在内存中是以压缩状态存储的。\n\n默认情况下，索引不会被压缩。你必须在创建索引时显式要求对其进行压缩。压缩有两种类型：行级压缩和页级压缩。*行级压缩*识别可压缩的列（详情请查阅在线手册），并压缩该列的存储，对每一行都如此操作。*页级压缩*实际上先使用行级压缩，然后在顶层增加额外的压缩，以减少页面上存储的非行元素的存储空间。索引中的非叶子页在页压缩类型下不会获得压缩。要查看索引压缩的实际效果，请看以下索引：\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_Test\nON Person.Address\n(\n    City ASC,\n\
  \    PostalCode ASC\n);\n```\n\n此索引在本章前面已经创建。如果你按照这里的定义重新创建它，这将在具有与第一个测试索引 `IX_Test`\
  \ 相同两列的索引上创建行类型压缩。\n\n```sql\nCREATE NONCLUSTERED INDEX IX_Comp_Test\nON Person.Address\n\
  (\n    City,\n    PostalCode\n)\nWITH (DATA_COMPRESSION = ROW);\n```\n\n再创建一个索引。\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_Comp_Page_Test\nON Person.Address\n(\n  \
  \  City,\n    PostalCode\n)\nWITH (DATA_COMPRESSION = PAGE);\n```\n\n要检查存储的索引，请修改原始的针对\
  \ `sys.dm_db_index_physical_stats` 的查询，添加另一列 `compressed_page_count`。\n\n```sql\n\
  SELECT i.name,\n       i.type_desc,\n       s.page_count,\n       s.record_count,\n\
  \       s.index_level,\n       s.compressed_page_count\nFROM sys.indexes AS i\n\
  JOIN sys.dm_db_index_physical_stats(DB_ID(N'AdventureWorks2017'),\n            \
  \                       OBJECT_ID(N'Person.Address'),\n                        \
  \           NULL,\n                                   NULL,\n                  \
  \                 'DETAILED') AS s\n  ON i.index_id = s.index_id\nWHERE i.object_id\
  \ = OBJECT_ID(N'Person.Address');\n```\n\n运行查询后，你将得到图 9-13 所示的结果。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig13_HTML.jpg](img/323849_5_En_9_Fig13_HTML.jpg)\n\
  \n*图 9-13：关于压缩索引的 sys.dm_db_index_physical_stats 输出*\n\n对于这个索引，你可以看到页压缩成功地将索引从 106\
  \ 页减少到 25 页，其中 25 页是压缩的。在此实例中，行类型压缩在索引页面数量上产生了影响，但远不如页压缩那样显著。\n\n要查看压缩在不修改代码的情况下为你带来的效果，请运行以下查询：\n\
  \n```sql\nSELECT  a.City,\n        a.PostalCode\nFROM    Person.Address AS a\nWHERE\
  \   a.City = 'Newton'\n  AND   a.PostalCode = 'V2M1N7';\n```\n\n在我的系统上，优化器选择使用 `IX_Comp_Page_Test`\
  \ 索引。即使我强制它使用 `IX_Test` 索引，性能也是相同的，尽管第二个查询多读取了一个页面：\n\n```sql\nSELECT  a.City,\n\
  \        a.PostalCode\nFROM    Person.Address AS a WITH (INDEX = IX_Test)\nWHERE\
  \   a.City = 'Newton'\n  AND   a.PostalCode = 'V2M1N7';\n```\n\n因此，尽管一个索引占用的空间急剧减少（大约只有原来的四分之一页面），但性能上没有任何代价。\n\
  \n压缩对 SQL Server 内部的其他一系列进程有影响，因此在实施之前，应彻底探究可能的负面影响和潜在益处。在大多数情况下，CPU 的成本完全被其他所有地方的益处所抵消，但你应该测试并监控你的系统。\n\
  \n测试完成后，清理索引。\n\n```sql\nDROP INDEX Person.Address.IX_Test;\nDROP INDEX Person.Address.IX_Comp_Test;\n\
  DROP INDEX Person.Address.IX_Comp_Page_Test;\n```\n\n\n##### 列存储索引\n\n列存储索引于 SQL\
  \ Server 2012 中引入，它用于按列而非按行来索引信息。这在处理数据仓库系统时特别有用，因为该系统需要快速聚合和访问大量数据。列存储索引中存储的信息在每一列上进行分组，并且这些分组是单独存储的。这使得对不同列集合的聚合操作变得极其快速，因为可以访问列存储索引，而无需访问大量行来聚合信息。此外，由于存储是面向列的，因此你只会触及你感兴趣的列所对应的存储，而不是整行的列，这带来了更高的速度。最后，由于列数据是以压缩形式存储的，你会看到来自列存储的一些性能提升。列存储有两种类型，类似于常规索引：聚集列存储和非聚集列存储。在\
  \ SQL Server 2016 之前，非聚集列存储无法更新。你必须删除它，然后重新创建它（或者，如果你正在使用分区，则可以切换进和切换出不同的分区）。从 SQL\
  \ Server 2016 开始，你可以在事务数据库内部使用非聚集列存储来支持实时分析查询。聚集列存储于 SQL Server 2014 中引入，并在该版本以及仅在生产机器的企业版中可用。在\
  \ SQL Server 2016 和 SQL Server 2017 中，列存储在所有版本中均可用。使用列存储索引存在许多限制。\n\n你不能使用某些数据类型，例如\
  \ `binary`、`text`、`varchar(max)`（在 SQL Server 2017 中受支持）、`uniqueidentifier`（在 SQL\
  \ Server 2012 中，此数据类型在 SQL Server 2014 及更高版本中有效）、`clr` 数据类型或 `xml`。\n\n*   你无法在稀疏列上创建列存储索引。\n\
  *   你想要在其上创建聚集列存储索引的表不能有任何约束，包括主键或外键约束。\n\n有关限制的完整列表，请参阅 SQL Server 联机丛书。\n\n列存储主要旨在用于数据仓库内部，因此在处理星型模式等相关的存储样式时效果最佳。由于列存储索引中数据的存储方式，你会在处理分区数据时频繁看到列存储的使用。列存储索引的设计方式，使其在处理至少\
  \ 10 万行的大型数据集时能发挥最佳性能。在 AdventureWorks2017 数据库中，没有表按当前配置足够大到真正发挥列存储的作用。为了有足够的数据，我将使用\
  \ Adam Machanic 的脚本 `make_big_adventure.sql` 来创建两个大型表 `dbo.bigTransactionHistory`\
  \ 和 `dbo.bigProduct`。该脚本可以从 [`http://bit.ly/2mNBIhg`](http://bit.ly/2mNBIhg) 下载。\n\
  \n### 列存储索引存储\n\n列存储索引的真正妙处在于，通过聚集列存储和非聚集列存储，你可以根据系统的目的定制系统内部的存储行为，而无需牺牲其他查询行为。如果你的系统是一个拥有大型事实表的数据仓库，你可以使用聚集列存储来定义你的数据存储，因为绝大多数查询都将从该聚集列存储中受益。但是，如果你有一个偶尔需要运行分析型查询的\
  \ OLTP 系统，你可以在常规的聚集和非聚集索引（也称为 `行存储索引`）之外，额外使用非聚集列存储。\n\n以下是列存储索引的优势：\n\n*   在数据仓库和分析工作负载中性能更佳\n\
  *   优异的数据压缩\n*   减少 I/O\n*   更多数据可放入内存\n\n为了更全面地理解列存储，我应该定义几个术语。\n\n*   `行组`：一组以列式方式压缩和存储的行。\n\
  *   `段`：也称为列段，是压缩并存储在磁盘上的一列数据。每个行组对应表中的每一列都有一个列段。\n*   `字典`：定义段的某些数据类型的编码。这些编码可以是全局的（适用于所有段），也可以是局部的（用于一个段）。\n\
  \n列存储数据不像行存储索引那样存储在 B 树中。相反，数据在表内的每一列上进行旋转和聚合。信息还被分解为称为 `行组` 的子集。每个行组最多包含 1,048,576\
  \ 行。当数据以批处理方式加载到列存储中时，如果行数超过 100,000，它会自动分解为行组。随着列存储索引中的数据被更新，更改会存储在所谓的 `增量存储` 中。这实际上是一个由\
  \ SQL Server 引擎在后台控制的 B 树索引。新增的行会累积在增量存储中，直到达到 102,400 行，然后它们将被旋转并压缩到行组中。执行此过程的机制称为\
  \ `元组移动程序`。从列存储中删除行取决于行所在的位置。增量存储中的行会被直接移除。已经压缩到行组中的行会经历逻辑删除。另一个 B 树索引（同样在后台控制）管理着已删除行的标识符列表。更新操作的工作方式类似，包括一次删除（根据位置进行逻辑删除或实际删除）和一次插入到增量存储中。\n\
  \n如果你是以小批量方式进行加载，并且有大量的更新操作，你将需要处理增量存储。如果你在行存储表上使用非聚集列存储索引，这种情况极有可能发生。总的来说，增量存储是自我管理的。然而，在可能的情况下，重建列存储索引以清除逻辑删除的行并获得压缩的行组，这不失为一个好主意。你可以使用\
  \ `ALTER INDEX REORGANIZE` 命令来完成此操作。我们将在第 14 章详细讨论。\n\n列存储的旋转、分组和压缩存储方式在处理分组数据时能带来令人难以置信的性能提升。然而，在进行\
  \ OLTP 风格查询所需的单行或范围查找时，它的速度要慢得多，问题也更多。\n\n聚集和非聚集列存储索引的行为基本相同。区别在于，聚集列存储索引（如同聚集行存储索引）正在存储数据。另一方面，非聚集列存储索引必须将数据存储并管理在其他地方的行存储索引中。\n\
  \n\n### 列存储索引行为\n\n以下面这个查询为例：\n\n```sql\nSELECT bp.Name AS ProductName,\nCOUNT(bth.ProductID),\n\
  SUM(bth.Quantity),\nAVG(bth.ActualCost)\nFROM dbo.bigProduct AS bp\nJOIN dbo.bigTransactionHistory\
  \ AS bth\nON bth.ProductID = bp.ProductID\nGROUP BY bp.Name;\n```\n\n如果按当前配置的表运行此查询，你将看到一个类似于\
  \ 9-14 的执行计划。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig14_HTML.jpg](img/323849_5_En_9_Fig14_HTML.jpg)\n\
  **图 9-14**\nGROUP BY 查询的多重聚合\n\n查询的读取次数和执行时间如下：\n\n```\nTable 'Worktable'. Scan\
  \ count 0, logical reads 0\nTable 'bigTransactionHistory'. Scan count 1, logical\
  \ reads 131819\nTable 'bigProduct'. Scan count 1, logical reads 601\nCPU time =\
  \ 16 ms,  elapsed time = 13356 ms.\n```\n\n读取次数非常多，此查询也消耗了相当多的 CPU 资源，执行速度不够快。我们有两种类型的列存储索引可供选择。如果你想仅为现有表添加一个非聚集列存储索引，这也是可行的。我们可以将数据迁移到聚集列存储索引上，但查询的行为是相同的。为了简化示例，我们将仅使用非聚集列存储索引。创建非聚集列存储索引时，你可以选择要包含的列，以避免任何可能不受列存储索引支持的列。\n\
  \n```sql\nCREATE NONCLUSTERED COLUMNSTORE INDEX ix_csTest\nON dbo.bigTransactionHistory\n\
  (\nProductID,\nQuantity,\nActualCost\n);\n```\n\n有了非聚集列存储索引后，优化器现在可以选择使用该索引来满足之前的查询。就像优化器可用的所有其他索引一样，列存储索引也有相关联的成本，因此对于针对该表的任何给定查询，它可能会被选择，也可能不会。在这种情况下，如果你重新运行最初的聚合查询，可以看到优化器判断使用列存储索引带来的成本对查询是有益的。执行计划现在看起来如\
  \ 9-15 所示。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig15_HTML.jpg](img/323849_5_En_9_Fig15_HTML.jpg)\n\
  **图 9-15**\n列存储索引代替了聚集索引\n\n如你所见，计划中有许多不同之处。这里有很多内容需要解读，但在我们这样做之前，先看看读取次数和执行时间。结果是相同的：在我的系统上是\
  \ 24,975 行。真正的差异体现在查询的读取次数和执行时间上。\n\n```\nTable 'bigTransactionHistory'. Scan count\
  \ 4, logical reads 0\nTable 'bigTransactionHistory'. Segment reads 31, segment skipped\
  \ 0.\nTable 'bigProduct'. Scan count 3, logical reads 620\nTable 'Worktable'. Scan\
  \ count 0, logical reads 0\nTable 'Worktable'. Scan count 0, logical reads 0\nCPU\
  \ time = 1922 ms,  elapsed time = 1554 ms.\n```\n\n检索数据所需的读取次数急剧减少，以及速度的边际提升，都是能够引用按列而非按行索引的信息的结果。我们的执行时间从\
  \ 13.3 秒缩短到了 1.5 秒。这就是你可以期待的巨大性能提升。\n\n让我们稍微解读一下执行计划，因为这是我们看到的第一个真正复杂的计划。首先要注意的是，优化器选择将此作为一个并行计划。你可以在带有黄色符号的操作符中看到这一点，例如\
  \ 9-16 中的 `Columnstore Index Scan` 操作符。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig16_HTML.jpg](img/323849_5_En_9_Fig16_HTML.jpg)\n\
  **图 9-16**\n并行执行中的 Columnstore Index Scan 操作符\n\n有一种处理数据的新方法称为 *批处理模式*。目前，只有包含列存储索引的查询才有批处理模式处理，但微软已宣布这将会改变。批处理模式在计划的操作中以批次处理行。这是一个巨大的优势。行模式处理意味着每一行在计划中的操作符之间移动时都要经历一个协商过程：10,000\
  \ 行，10,000 次协商。这非常耗费资源。批处理模式以批次移动行，而不是单独移动。批次大致均匀分布，每批最多 1,000 行（尽管这会变化）。这意味着移动\
  \ 10,000 行只需 10 次协商，而不是 10,000 次。这是一个巨大的性能优势。此外，批处理模式利用多个处理器来帮助加速执行。要确定计划中操作符的执行模式，请查看该操作符的属性。9-17\
  \ 显示了 `Columnstore Index Scan` 的相应属性。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig17_HTML.jpg](img/323849_5_En_9_Fig17_HTML.jpg)\n\
  **图 9-17**\n实际执行模式\n\n批处理模式是处理列存储索引时的首选方法，因为它通常比替代方法——行模式——快得多。在 SQL Server 2017\
  \ 之前，它通常需要一个并行执行计划才能让查询进入批处理模式处理。然而，SQL Server 2017 允许在非并行执行计划中进行批处理模式处理。\n\n有一组有限的操作（在\
  \ SQL Server 联机丛书中有所记录）会导致批处理模式处理，但当在具有足够处理器的系统上处理这些操作时，你将看到又一个显著的性能提升。\n\n与聚集和非聚集索引不同，列存储索引不要求列以特定顺序排列。同样与这些其他索引不同的是，你应该将多个列包含在列存储索引中，以便在这些列上获得收益。换句话说，如果你预计将来需要查询某个列，就主动将其添加到列存储索引定义中。但如果你从列存储索引中检索大量列，可能会看到一些性能下降。\n\
  \n列存储索引增强性能的另一个方面是段消除。每个段显示该段内的最小值和最大值（使用实际值或字典引用）。如果一个段不包含给定值，它就会被跳过。当你将分区与列存储索引结合使用时，这一点变得尤为重要。这样，即使你没有获得分区消除，段消除也会有效地跳过某个分区，前提是该分区中包含的段内的数据都不符合我们的筛选条件。\n\
  \n在 9-15 的执行计划中还可以看到列存储索引的另一种行为。在 SQL Server 2017 和 Azure SQL Database 中引入的是批处理模式自适应联接。让我们看一下\
  \ 9-18 中该计划子集的扩展视图。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig18_HTML.jpg](img/323849_5_En_9_Fig18_HTML.jpg)\n\
  **图 9-18**\n自适应联接及其伴随行为\n\n\n\n因为选择错误的连接类型会严重损害性能，所以新增了一种新的连接样式，即自适应连接。自适应连接将为给定的执行计划创建两个可能的分支。你可以在图\
  \ 9-18 中看到这两个分支，分别是针对 `pk_bigProduct` 索引的 `聚集索引扫描` 和 `聚集索引查找`。自适应连接可以在执行时决定使用哈希连接或嵌套循环连接。它是通过将数据加载到一个内部管理的自适应缓冲区来实现的；我们无法看到它。如果未达到行阈值，该缓冲区将成为循环连接的外部行驱动程序。否则，将构建哈希表以执行常规的哈希连接。然而，一旦表创建完成，它就可以根据行数确定哪种连接类型更优。自适应连接选定其打算使用的连接类型后，将继续执行两个分支中的一个。顶部分支用于哈希匹配连接，底部分支用于循环连接。用于确定给定连接类型的信息存储在执行计划的属性中，如图\
  \ 9-19 所示。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig19_HTML.jpg](img/323849_5_En_9_Fig19_HTML.jpg)\n\
  \n**图 9-19**\n自适应连接属性的一个子集\n\n在图 9-19 所示属性的中间位置附近是 `自适应阈值行` 属性。当哈希表中的行数达到或低于此值时，自适应连接将使用循环连接。超过此相同值，自适应连接将使用哈希匹配连接。你还可以看到用于估算和实际使用连接类型的属性，因此你可以看到特定查询的行为如何随着其访问数据的变化而变化。\n\
  \n从这个连接中还可以看出，你可以随意混合使用列存储和行存储表进行查询。相同的基本规则始终适用。\n\n有许多 DMO 可用于查看列存储索引的状态。一个立即有用的\
  \ DMO 是 `sys.dm_db_column_store_row_group_physical_stats`。它显示了行组的状态，并且很容易查询它。\n\n\
  ```sql\nSELECT ddcsrgps.row_group_id,\nddcsrgps.state_desc,\nddcsrgps.total_rows,\n\
  ddcsrgps.trim_reason_desc,\nddcsrgps.transition_to_compressed_state_desc\nFROM sys.dm_db_column_store_row_group_physical_stats\
  \ AS ddcsrgps\nWHERE ddcsrgps.object_id = OBJECT_ID('dbo.bigTransactionHistory')\n\
  ORDER BY ddcsrgps.row_group_id DESC;\n```\n\n`dbo.bigTransationHistory` 的列存储索引输出如图\
  \ 9-20 所示。\n\n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig20_HTML.jpg](img/323849_5_En_9_Fig20_HTML.jpg)\n\
  \n**图 9-20**\n`sys.dm_db_column_store_row_group_physical_stats` 的输出\n\n你现在可以看到行是如何加载到索引中并分组的，是否有压缩，以及通过查看\
  \ `transition_to_compressed_state_desc` 了解行是如何移动的。\n\n我将保留表和列存储索引，供本书后续示例使用。\n\n\
  ## 建议\n\n首先，你应该始终专注于为相关数据选择正确的聚集索引。通常，OLTP 系统将从行存储、B-树索引中获益最多。同样通常，数据仓库、报表或分析系统将从列存储索引中获益最多。两者都可能存在例外，但这应该是基本的指导原则。\n\
  \n因为你可以向聚集列存储添加行存储索引，也可以向行存储表添加非聚集列存储索引，所以你可以处理任一情况下的异常行为。列存储对于行数非常多的表是理想的。较小的表可能仍会获得一些好处，但也可能不会。请在你的系统上测试以确定。\n\
  \n在处理列存储索引时，你通常应遵循以下规则：\n\n*   将数据加载到列存储中，如果可能，使用单个事务；如果不可能，则使用大于 102,400 的批次，以利用压缩行组。\n\
  *   尽量减少对聚集列存储内数据的小规模更新，以避免处理差异存储的开销。\n*   根据数据移动情况，计划定期重建索引（对于聚集和非聚集列存储索引），以从行组中完全消除已删除的数据，并将修改后的数据从差异存储移动到行组中。\n\
  *   维护列存储索引上的统计信息，类似于你对行存储索引所做的操作。虽然它们不像行存储索引那样以相同方式可见，但它们仍然必须维护。\n\n## 特殊索引类型\n\
  \n随着 Microsoft 向 SQL Server 引入特殊数据类型和存储机制，为这些特殊存储类型编制索引的方法也得到了发展。详细解释所有这些特殊索引类型的细节超出了本书的范围。在以下部分中，我将介绍每种索引类型的基本概念，以促进它们在优化查询中的使用可能性。\n\
  \n### 全文索引\n\n你可以使用 `VARCHAR`、`NVARCHAR`、`CHAR` 和 `NCHAR` 字段中的 `MAX` 值在 SQL Server\
  \ 中存储大量文本。针对这些大字段的常规聚集或非聚集索引将无法支持，因为单个值可能远远超过索引中的页面大小。因此，索引文本的不同机制是使用全文引擎，该引擎必须正在运行才能处理全文索引。你也可以在\
  \ `VARBINARY` 数据上构建全文索引。\n\n你需要在表上有一个唯一的列。性能最佳的候选列是整数：`INT` 或 `BIGINT`。然后，此列与单词一起使用，以标识它所属的表中的行以及其在字段中的位置。SQL\
  \ Server 允许对全文索引进行增量更改（无论是更改跟踪还是基于时间的）以及完全重建。\n\nSQL Server 2012 引入了另一种处理文本的方法，称为语义搜索。它使用文档中的短语来标识存储在数据库内的不同文本集之间的关系。\n\
  \n#### 空间索引\n\nSQL Server 2008 引入了存储空间数据的功能。此数据可以是几何类型，也可以是非常复杂的地理类型，确切地说是标识地球上的一个点。可以毫不夸张地说，索引这种类型的数据很复杂。SQL\
  \ Server 将这些索引存储在扁平的 B-树中，类似于常规索引，只是它也是一个由四个链接在一起的网格组成的层次结构。每个网格可以被赋予低、中或高的密度，以概述每个网格的大小。有一些机制支持空间数据类型的索引，以便不同类型的查询（例如查找一个对象何时在另一个对象的边界内或附近）可以从索引固有的性能提升中受益。\n\
  \n空间索引只能针对 `geometry` 或 `geography` 类型的列创建。它必须在基础表上，表不能有索引视图，并且表必须具有主键。你可以在表的任何给定列上创建最多\
  \ 249 个空间索引。不同的索引用于定义不同类型的索引行为。更多信息请参阅 Alastair Aitchison 所著的《Pro Spatial with SQL\
  \ Server 2012》（Apress，2012）一书。\n\n\n\n### XML\n\n作为在 SQL Server 2005 中引入的数据类型，`XML`\
  \ 可以在 SQL Server 中存储格式良好的 XML 数据，而非纯文本。可以使用 SQL Server 支持的 `XQuery` 语言查询此数据。为了增强性能，定义了一组特殊的索引。`XML`\
  \ 列可以有一个主索引和几个辅助索引。主 `XML` 索引会分解 `XML` 数据的属性、属性和元素，并将其存储为内部表。该表上必须有一个主键，并且该主键必须是聚集的，才能创建\
  \ `XML` 索引。创建 `XML` 索引后，就可以创建辅助索引。这些索引的类型为 `Path`、`Value` 和 `Property`，具体取决于你如何查询\
  \ `XML`。更多详情，请参阅 Jason Strate 和 Grant Fritchey 所著的《SQL Server 专家级索引优化实战》（Apress，2015）。\n\
  \n### 索引的其他特性\n\n其他索引属性也会对性能产生积极或消极的影响。这里探讨其中的一些行为。\n\n### 不同的列排序顺序\n\nSQL Server\
  \ 支持为复合索引中的不同列指定不同的排序顺序。假设你想要一个索引，其中第一列按升序 (`ASC`) 排序，第二列按降序 (`DESC`) 排序，以消除可能成本很高的排序操作。你可以按如下方式实现：\n\
  \n```sql\nCREATE NONCLUSTERED INDEX i1 ON t1(c1 ASC, c2 DESC);\n```\n\n### 在计算列上创建索引\n\
  \n你可以在计算列上创建索引，只要为计算列定义的表达式满足某些限制，例如它仅引用包含该计算列的表中的列，并且它是确定性的。\n\n### 在 BIT 数据类型列上创建索引\n\
  \nSQL Server 允许你在 `BIT` 数据类型的列上创建索引。单独在 `BIT` 数据类型列上创建索引的能力并不是一个很大的优势，因为这样的列只能有两个唯一值，除非在极少数情况下，绝大多数数据是一个值，而只有少数行是另一个值。如前所述，具有如此低选择性（唯一值的数量）的列通常不是索引的良好候选者。然而，当你考虑覆盖索引时，这个特性就显得很重要。因为覆盖索引需要包含索引中的所有列，能够将\
  \ `BIT` 数据类型列添加到索引键中，使得覆盖索引在需要时可以包含这样的列（在 `INCLUDE` 子句所涵盖的列之外）。\n\n### CREATE INDEX\
  \ 语句作为查询处理\n\n`CREATE INDEX` 操作被集成到查询处理器中。优化器可以在创建索引时使用现有索引来减少扫描成本和排序。\n\n以 `Person.Address`\
  \ 表为例。假设存在一个包含多个列的非聚集索引：`AddressLine1`、`AddressLine2`、`City`、`StateProvinceId` 和\
  \ `PostalCode`。如果你需要根据现有的索引对 `City` 列运行查询，你将得到该索引的扫描。现在像这样创建一个新索引：\n\n```sql\nCREATE\
  \ NONCLUSTERED INDEX IX_Test\nON Person.Address(City);\n```\n\n如图 9-21 所示，优化器选择扫描索引来创建新索引，而不是扫描表，因为新索引所需的列已包含在另一个非聚集索引中。\n\
  \n![../images/323849_5_En_9_Chapter/323849_5_En_9_Fig21_HTML.jpg](img/323849_5_En_9_Fig21_HTML.jpg)\n\
  \n图 9-21：`CREATE INDEX` 的执行计划\n\n请务必在完成后删除该索引。\n\n```sql\nDROP INDEX IX_Test ON\
  \ Person.Address;\n```\n\n### 并行索引创建\n\nSQL Server 支持 `CREATE INDEX` 语句的并行计划，如同支持其他\
  \ SQL 查询一样。在多处理器机器上，索引创建不会局限于单个处理器，而是会从多个处理器中受益。你可以使用 SQL Server 的 `max degree of\
  \ parallelism` 配置参数来控制 `CREATE INDEX` 语句中使用的处理器数量。此参数的默认值为 `0`，你可以通过执行 `sp_configure`\
  \ 存储过程（在设置 `show advanced options` 之后）看到。\n\n```sql\nEXEC sp_configure 'max degree\
  \ of parallelism';\n```\n\n默认值 `0` 意味着 SQL Server 可以使用系统中所有可用的 CPU 来并行执行 T-SQL 语句。在具有四个处理器的系统上，可以通过执行\
  \ `sp_configure` 将最大并行度设置为 `2`。\n\n```sql\nEXEC sp_configure 'max degree of parallelism',\
  \ 2;\nRECONFIGURE WITH OVERRIDE;\n```\n\n这允许 SQL Server 最多使用两个 CPU 来并行执行 T-SQL 语句。此配置设置立即生效，无需重启服务器。\n\
  \n查询提示 `MAXDOP` 可用于 `CREATE INDEX` 语句。此外，请注意并行 `CREATE INDEX` 功能仅在 SQL Server 企业版中可用。\n\
  \n### 联机索引创建\n\n默认的索引创建是作为离线操作完成的。这意味着表上会放置排他锁，在创建索引期间限制用户访问。可以在线创建索引。这允许用户在索引创建期间继续访问数据。代价是增加创建索引所需的时间和资源。从\
  \ SQL Server 2012 开始，包含 `varchar(MAX)`、`nvarchar(MAX)` 和 `varbinary(MAX)` 的索引实际上可以在线重新生成。联机索引操作仅在\
  \ SQL Server 企业版中可用。\n\n### 考虑使用数据库引擎优化顾问\n\n一个简单的索引方法是使用 SQL Server 提供的 Database\
  \ Engine Tuning Advisor 工具。该工具是基于使用情况的工具，它查看特定的工作负载，并与查询优化器合作以确定各种索引组合的相关成本。根据该工具的分析，你可以适当地添加或删除索引。\n\
  \n### 注意\n\n我将在第 10 章更深入地介绍 Database Engine Tuning Advisor 工具。\n\n"
- '# 本章小结


  在本章中，你了解到索引内外有许多额外的功能，它们扩展了前一章定义的行为。


  在下一章中，你将了解更多关于 Database Engine Tuning Advisor 的知识，这是 SQL Server 提供的一个工具，可以帮助你确定给定
  SQL 工作负载下数据库中正确的索引。


  '
- '# 10. 数据库引擎优化顾问


  SQL Server 的性能通常取决于数据库表上是否有合适的索引。然而，随着工作负载和数据随时间变化，现有的索引可能不完全合适，可能需要新的索引。决定正确索引的任务很复杂，因为对一组查询有益的索引更改可能对另一组查询有害。


  为了帮助你完成这个过程，SQL Server 提供了一个名为 Database Engine Tuning Advisor 的工具。该工具无需深入理解数据库架构、工作负载或
  SQL Server 内部机制，即可帮助识别给定工作负载的一组最优索引和统计信息。它还可以为一小部分问题查询推荐调优选项。除了该工具的优点，我还将在本章中介绍它的局限性，因为如果使用不当，它可能弊大于利。


  在本章中，我将介绍以下主题：


  *   Database Engine Tuning Advisor 的工作原理

  *   如何在问题查询集上使用 Database Engine Tuning Advisor 以获取索引建议，包括如何定义跟踪

  *   Database Engine Tuning Advisor 的局限性




  ## 数据库引擎调优顾问机制


  你可以通过选择 Microsoft SQL Server 2017 ➤ SQL Server 2017 数据库引擎调优顾问来直接运行数据库引擎调优顾问。你也可以从命令提示符（`dta.exe`）、SQL
  Profiler（工具 ➤ 数据库引擎调优顾问）、 Management Studio 中的查询（高亮显示所需查询并选择查询 ➤ 在数据库引擎调优顾问中分析查询）或
  Management Studio（选择工具 ➤ 数据库引擎调优顾问）来运行它。一旦工具启动并连接到服务器，你应该会看到一个类似图 10-1 的窗口。在本节中，我将介绍定义和运行分析的选项，然后在下一节中提供一些详细的示例。


  ![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig1_HTML.jpg](img/323849_5_En_10_Fig1_HTML.jpg)


  图 10-1：在数据库引擎调优顾问中选择服务器和数据库


  数据库引擎调优顾问已连接到服务器。从这里开始，你需要概述工作负荷和你想要调优的对象。创建会话名称对于为文档目的标记会话是必要的。然后你需要选择一个工作负荷。工作负荷可以来自跟踪文件或表、计划缓存中存在的查询，或来自查询存储中的查询（查询存储将在第
  11 章详细讨论）。最后，你需要浏览到适当的位置。工作负荷的定义取决于你启动数据库引擎调优顾问的方式。如果是从查询窗口启动的，你会看到一个 `查询` 单选按钮，而
  `文件` 和 `表` 单选按钮会被禁用。你还需要定义 `工作负荷分析数据库` 设置，最后选择一个要调优的数据库。


  选择数据库时，你还可以通过单击屏幕右侧的下拉框来选择要调优的单个表；你会看到一个表列表，如图 10-2 所示。


  ![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig2_HTML.jpg](img/323849_5_En_10_Fig2_HTML.jpg)


  图 10-2：单击复选框在数据库引擎调优顾问中为调优定义单个表


  一旦定义了工作负荷，你需要选择 `调优选项` 选项卡，如图 10-3 所示。


  ![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig3_HTML.jpg](img/323849_5_En_10_Fig3_HTML.jpg)


  图 10-3：在数据库引擎调优顾问中定义选项


  通过选择 `限制调优时间` 然后定义调优停止的日期和时间，你可以定义希望数据库引擎调优顾问运行的时间长度。数据库引擎调优顾问运行的时间越长，它应该能提出更好的建议。你选择数据库引擎调优顾问考虑创建的物理设计结构类型，还可以设置分区策略，以便调优顾问知道是否应考虑将表和索引分区作为分析的一部分。请记住，分区首先是一种数据管理工具，而不是性能调优机制。如果你的数据和结构不需要，分区可能并不一定是理想的结果。最后，你可以定义希望在数据库中保持不变的物理设计结构。更改这些选项将会缩小或扩大数据库引擎调优顾问可以用来提高性能的选择范围。你可以选择是否包括筛选索引，并且数据库引擎调优顾问可以建议列存储索引。


  你可以单击 `高级选项` 按钮查看更多选项，如图 10-4 所示。


  ![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig4_HTML.jpg](img/323849_5_En_10_Fig4_HTML.jpg)


  图 10-4：高级调优选项对话框


  此对话框允许你限制建议的空间以及索引中可包含的列数。你可以决定是否要包含系统中每个数据库的计划缓存事件。最后，你可以定义新的索引或索引的更改是作为联机还是脱机索引操作执行。


  一旦你适当地定义了所有这些设置，就可以通过单击 `开始分析` 按钮来启动数据库引擎调优顾问。针对你运行数据库引擎调优顾问的任何服务器实例，创建的会话都保存在 `msdb`
  数据库中。它显示正在分析的内容以及取得的进度，如图 10-5 所示。


  ![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig5_HTML.jpg](img/323849_5_En_10_Fig5_HTML.jpg)


  图 10-5：调优进度


  在下一节的示例分析中，你将看到显示的进度更详细的示例。


  分析完成后，你将获得一个建议列表（在图 10-6 中可见），并且多个报告将变得可用。表 10-1 描述了这些报告。


  ### 数据库引擎调优顾问报告


  表 10-1


  ```

  | 报告名称 | 报告描述 |

  | --- | --- |

  | 列访问 | 列出工作负荷中引用的列和表 |

  | 数据库访问 | 列出工作负荷中引用的每个数据库以及每个数据库的工作负荷语句百分比 |

  | 事件频率 | 按发生频率顺序列出工作负荷中的所有事件 |

  | 索引详细信息（当前） | 定义工作负荷引用的索引及其属性 |

  | 索引详细信息（建议） | 与“索引详细信息（当前）”报告相同，但显示有关数据库引擎调优顾问建议的索引的信息 |

  | 索引使用情况（当前） | 列出工作负荷引用的索引及其使用百分比 |

  | 索引使用情况（建议） | 与“索引使用情况（当前）”报告相同，但针对的是建议的索引 |

  | 语句成本 | 列出如果实施建议，每条语句的性能改进情况 |

  | 语句成本范围 | 按百分位数分解成本改进，以显示对于任何给定的更改集可以实现多少收益；这些成本是优化器提供的估计值 |

  | 语句详细信息 | 列出工作负荷中的语句、其成本以及如果实施建议后降低的成本 |

  | 语句到索引的关系 | 列出单个语句引用的索引；提供报告的当前版本和建议版本 |

  | 表访问 | 列出工作负荷引用的表 |

  | 视图到表的关系 | 列出物化视图引用的表 |

  | 工作负荷分析 | 提供有关工作负荷的详细信息，包括语句数量、成本降低的语句数量以及成本保持不变的语句数量 |

  ```


  '
- "# 数据库引擎调优顾问示例\n\n学习如何使用数据库引擎调优顾问的最佳方法就是使用它。掌握它并非难事，因此我建议打开它并开始使用。\n\n\n\n### 调优查询\n\
  \n你可以使用 `数据库引擎优化顾问`，通过一个能代表所有 SQL 活动的工作负荷，来为整个数据库推荐索引。你也可以用它来为一组有问题的查询推荐索引。\n\n\
  要了解如何使用 `数据库引擎优化顾问` 为一组有问题的查询获取索引建议，假设你有一个相当频繁执行的简单查询。由于其执行频率高，你希望调优能快速完成。这个查询是：\n\
  ```sql\nSELECT soh.DueDate,\nsoh.CustomerID,\nsoh.Status\nFROM Sales.SalesOrderHeader\
  \ AS soh\nWHERE soh.DueDate\nBETWEEN '1/1/2008' AND '2/1/2008';\n```\n\n要分析此查询，请在查询窗口中右键单击它，然后选择\
  \ `在数据库引擎优化顾问中分析查询`。优化顾问会打开一个窗口，你可以将会话名称更改为有意义的名字。在这个例子中，我选择了 `Report Query Round\
  \ 1 – 1/16/2014`。数据库和表无需编辑。完成设置后，第一个选项卡 `常规` 将如图 10-6 所示。\n\n![图 10-6：查询调优常规设置](img/323849_5_En_10_Fig6_HTML.jpg)\n\
  \n由于此查询很重要，对其进行调优对业务极其关键，我将在 `调优选项` 选项卡上更改一些设置，以尝试最大化可能的建议。出于示例目的，我将让 `数据库引擎优化顾问`\
  \ 按默认运行一小时，但对于更大的负载或更复杂的查询，你可能需要考虑给系统更多时间。我将勾选 `包括筛选索引` 复选框，这样如果筛选索引有帮助，它就会被考虑。我也会让它推荐\
  \ `列存储索引`。最后，我将允许 `数据库引擎优化顾问` 进行结构更改，如果它能找到任何有帮助的更改，通过将 `保留所有现有 PDS` 切换为 `不保留任何现有\
  \ PDS`。完成后，`调优选项` 选项卡将如图 10-7 所示。\n\n![图 10-7：调整后的调优选项选项卡](img/323849_5_En_10_Fig7_HTML.jpg)\n\
  \n请注意，当你更改上方选择的定义时，屏幕底部的描述也会随之改变。开始分析后，进度屏幕应该会出现。尽管设置是评估一小时，但 `DTA` 仅用了大约一分钟就评估了此查询。初步的建议并不是一个好的选择。如你在图\
  \ 10-8 中所看到的，`数据库引擎优化顾问` 建议删除数据库中大量的索引。这不是你运行此工具时希望得到的建议类型。\n\n![图 10-8：查询调优初步建议](img/323849_5_En_10_Fig8_HTML.jpg)\n\
  \n`数据库引擎优化顾问` 假定正在测试的负载是数据库的完整负载。每一次测试都是如此。如果你运行的测试不是具有代表性的负载，那么根据建议进行更改可能会导致严重问题。\n\
  \n如果有索引未被使用，那么应该删除它们。这是最佳实践，应在任何数据库上实施。然而，在本例中，这是单个查询，而不是系统的完整负载。要看看优化顾问是否能提出更有意义的一组建议，你必须启动一个新的会话。\n\
  \n这次，我将调整选项，使 `数据库引擎优化顾问` 无法删除任何现有结构。这在 `调优选项` 选项卡上设置（如前面的图 10-7 所示）。在那里，我将 `要在数据库中保留的物理设计结构\
  \ (PDS)` 设置从 `不保留任何现有 PDS` 更改为 `保留所有现有 PDS`。我将保持运行时间不变，因为评估在时间范围内运行良好。再次运行 `数据库引擎优化顾问`\
  \ 后，它在一分钟内完成，并显示如图 10-9 所示的建议。\n\n![图 10-9：查询调优建议](img/323849_5_En_10_Fig9_HTML.jpg)\n\
  \n第一次运行时，`数据库引擎优化顾问` 建议删除正在测试的表及其相关表上的大部分索引。这次，它建议在查询引用的列上创建一个覆盖索引。如第 9 章所述，覆盖索引可能是检索数据的最佳性能方法之一。`数据库引擎优化顾问`\
  \ 能够识别出一个包含查询引用的所有列的索引（即覆盖索引）将具有最佳性能。\n\n收到建议后，你应该仔细检查拟议的 `T-SQL` 命令。这些建议并不总是有帮助，因此你需要评估并测试它们以确认。假设检查后的建议看起来不错，你会希望应用它。选择\
  \ `操作 ➤ 评估建议`。这将打开一个新的 `数据库引擎优化顾问` 会话，并允许你使用与最初提出建议相同的衡量标准来评估这些建议是否有效。所有这些都是为了验证原始建议是否具有其声称的效果。新会话看起来就像一个常规的评估报告。如果你仍然对建议满意，请选择\
  \ `操作 ➤ 应用建议`。这将打开一个对话框，允许你立即应用建议或安排应用（见图 10-10）。\n\n![图 10-10：应用建议对话框](img/323849_5_En_10_Fig10_HTML.jpg)\n\
  \n如果你单击 `确定` 按钮，`数据库引擎优化顾问` 会将索引应用到你一直在测试查询的数据库（见图 10-11）。\n\n![图 10-11：成功应用的调优会话](img/323849_5_En_10_Fig11_HTML.jpg)\n\
  \n生成建议后，你可能希望不是立即应用它们，而是将 `T-SQL` 语句保存到文件中，并累积一系列更改，在计划的部署窗口期间发布到生产环境。此外，仅使用默认设置，你最终会得到很多类似这样的索引名称：`_dta_index_SalesOrderHeader_5_1266103551__K4_6_11`。这不是很清晰，因此将更改保存到\
  \ `T-SQL` 也将使你能够使更改更具可读性。请记住，将索引应用到表，尤其是大表，可能会在创建索引期间对系统上正在运行的进程造成性能影响。\n\n虽然一次获取一个索引建议很好，但能够一次性检查数据库的大部分区域会更好。这就是调优跟踪工作负荷的用武之地。\n\
  \n\n\n### 调优跟踪工作负载\n\n从针对生产服务器运行的真实查询中捕获跟踪，是向数据库引擎调优顾问提供有意义数据的一种方式。（捕获跟踪将在第 18 章介绍。）为数据库引擎调优顾问定义跟踪最简单的方法是使用调优模板实现跟踪。在需要调优的系统上启动跟踪。我通过\
  \ PowerShell `sqlps.exe` 命令提示符在一个循环中运行查询来生成人工负载。这是带有 SQL Server 配置设置的 PowerShell\
  \ 命令提示符。它随 SQL Server 一起安装。\n\n为了找到一些有趣的点，我将创建一个具有明显调优问题的存储过程。\n\n```sql\nCREATE\
  \ PROCEDURE dbo.uspProductSize\nAS\nSELECT  p.ProductID,\n        p.Size\nFROM \
  \   Production.Product AS p\nWHERE   p.Size = '62';\n```\n\n这是我使用的简单 PowerShell\
  \ 脚本。你需要根据你的环境调整连接字符串。将文件下载到某个位置后，你只需通过命令提示符引用该文件及其完整路径即可运行它。由于这是一个未签名、原始的脚本，你可能会遇到安全问题。如果需要，请遵循该错误消息中提供的帮助指导（`queryload.ps1`）。\n\
  \n```powershell\n$SqlConnection = New-Object System.Data.SqlClient.SqlConnection\n\
  $SqlConnection.ConnectionString = 'Server=WIN-8A2LQANSO51;Database=AdventureWorks2017;trusted_connection=true'\n\
  ### Load Product data\n$ProdCmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $ProdCmd.CommandText = \"SELECT ProductID FROM Production.Product\"\n$ProdCmd.Connection\
  \ = $SqlConnection\n$SqlAdapter = New-Object System.Data.SqlClient.SqlDataAdapter\n\
  $SqlAdapter.SelectCommand = $ProdCmd\n$ProdDataSet = New-Object System.Data.DataSet\n\
  $SqlAdapter.Fill($ProdDataSet)\n### Set up the procedure to be run\n$WhereCmd =\
  \ New-Object System.Data.SqlClient.SqlCommand\n$WhereCmd.CommandText = \"dbo.uspGetWhereUsedProductID\
  \ @StartProductID = @ProductId, @CheckDate=NULL\"\n$WhereCmd.Parameters.Add(\"@ProductID\"\
  ,[System.Data.SqlDbType]\"Int\")\n$WhereCmd.Connection = $SqlConnection\n### And\
  \ another one\n$BomCmd = New-Object System.Data.SqlClient.SqlCommand\n$BomCmd.CommandText\
  \ = \"dbo.uspGetBillOfMaterials @StartProductID = @ProductId, @CheckDate=NULL\"\n\
  $BomCmd.Parameters.Add(\"@ProductID\",[System.Data.SqlDbType]\"Int\")\n$BomCmd.Connection\
  \ = $SqlConnection\n### Bad Query\n$BadQuerycmd = New-Object System.Data.SqlClient.SqlCommand\n\
  $BadQuerycmd.CommandText = \"dbo.uspProductSize\"\n$BadQuerycmd.Connection = $SqlConnection\n\
  while(1 -ne 0)\n{\n    $RefID = $row[0]\n    $SqlConnection.Open()\n    $BadQuerycmd.ExecuteNonQuery()\
  \ | Out-Null\n    $SqlConnection.Close()\n    foreach($row in $ProdDataSet.Tables[0])\n\
  \    {\n        $SqlConnection.Open()\n        $BomCmd.Parameters[\"@ProductID\"\
  ].Value = $ProductId\n        $BomCmd.ExecuteNonQuery() | Out-Null\n        $SqlConnection.Close()\n\
  \        $SqlConnection.Open()\n        $ProductId = $row[0]\n        $WhereCmd.Parameters[\"\
  @ProductID\"].Value = $ProductId\n        $WhereCmd.ExecuteNonQuery() | Out-Null\n\
  \        $SqlConnection.Close()\n    }\n}\n```\n\n### 注意\n\n有关 PowerShell 的更多信息，请查阅\
  \ Don Jones 和 Jeffrey Hicks 所著的`PowerShell in a Month of Lunches`（Manning，2016）。\n\
  \n创建跟踪文件后，打开数据库引擎调优顾问。它在“工作负载”部分默认为文件类型，因此你只需浏览到跟踪文件位置即可。和之前一样，你需要从下拉列表中选择 `AdventureWorks2017`\
  \ 数据库作为工作负载分析的数据库。为了限制建议，也从屏幕底部的数据库列表中选择 `AdventureWorks2012`。设置适当的调优选项并开始分析。这次，运行时间将超过一分钟（参见图\
  \ 10-12）。\n\n![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig12_HTML.jpg](img/323849_5_En_10_Fig12_HTML.jpg)\n\
  \n图 10-12 数据库调优引擎运行中\n\n在我的机器上，处理过程大约运行了 15 分钟。然后它会生成输出，如图 10-13 所示。\n\n![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig13_HTML.jpg](img/323849_5_En_10_Fig13_HTML.jpg)\n\
  \n图 10-13 关于手动统计信息的建议\n\n在通过数据库引擎调优顾问运行所有查询后，顾问提出了一个针对`Product`表的新索引建议，这将提高该查询的性能。现在我只需要将其保存到一个\
  \ T-SQL 文件中，以便在应用到数据库之前编辑其名称。\n\n### 从过程缓存调优\n\n你可以利用存储在缓存中的查询计划作为调优建议的来源。过程很简单。“常规”页面上有一个选项，可让你选择计划缓存作为调优工作的来源，如图\
  \ 10-14 所示。\n\n![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig14_HTML.jpg](img/323849_5_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14 选择计划缓存作为 DTA 的来源\n\n所有其他选项的行为与本章前面概述的完全一样。处理时间比顾问处理工作负载时要少得多。它只有缓存中的查询需要处理，因此，根据系统内存的大小，这可能是一个很短的列表。处理我的缓存后的结果建议了几个索引和一些单独的统计信息，如图\
  \ 10-15 所示。\n\n![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig15_HTML.jpg](img/323849_5_En_10_Fig15_HTML.jpg)\n\
  \n图 10-15 来自计划缓存的建议\n\n这为你提供了另一种尝试以自动化方式调优系统的机制。但它仅限于当前在缓存中的查询。根据缓存的易变性（计划老化或被新计划替换的速度），这可能有用，也可能没用。\n\
  \n### 从查询存储调优\n\n我们将在第 11 章介绍查询存储。但是，我们可以利用查询存储收集的信息，尝试从调优顾问获得调优建议。你从图 10-14 所示的列表中选择查询存储工作负载。然后你必须选择一个数据库，因为查询存储只对单个数据库启用。然而，从那里开始，调优选项和行为是相同的。在我的系统上，建议比从计划缓存中提取的要多一些，如图\
  \ 10-16 所示。\n\n![../images/323849_5_En_10_Chapter/323849_5_En_10_Fig16_HTML.jpg](img/323849_5_En_10_Fig16_HTML.jpg)\n\
  \n图 10-16 来自查询存储的建议\n\n建议更多的原因是查询存储包含的计划比计划缓存中或在单个跟踪运行期间捕获的计划更多。这种改进的数据使查询存储成为用于调优建议的绝佳资源。\n\
  \n\n\n\n## 数据库引擎调优顾问的局限性\n\n数据库引擎调优顾问的建议是基于输入的工作负载。如果输入的工作负载未能真实反映实际负载，那么所建议的索引有时可能会对工作负载中缺失的某些查询产生负面影响。但最重要的一点是，在许多情况下，数据库引擎调优顾问可能无法识别出潜在的优化机会。它拥有一个复杂的测试引擎，但在某些场景下，其能力是有限的。\n\
  \n对于生产服务器，你应确保 SQL 跟踪能完整地代表数据库工作负载。对于大多数数据库应用程序，捕获一整天的跟踪通常能涵盖在数据库上执行的大部分查询，不过也存在例外情况，例如每周、每月或年末处理。务必了解你的负载情况以及如何恰当地捕获它。数据库引擎调优顾问的其他一些考虑因素/局限性如下：\n\
  \n*   使用 `SQL:BatchCompleted` 事件的跟踪输入：如前所述，输入到数据库引擎调优顾问的 SQL 跟踪必须包含 `SQL:BatchCompleted`\
  \ 事件；否则，该向导将无法识别工作负载中的查询。\n*   查询在工作负载中的分布：在一个工作负载中，一个查询可能使用相同的参数值执行多次。与仅执行一次的查询的性能大幅改进相比，对最常见查询的微小性能改进对整体工作负载性能的贡献可能更大。\n\
  *   索引提示：SQL 查询中的索引提示可能会阻止数据库引擎调优顾问选择更好的执行计划。该向导会将 SQL 查询中使用的所有索引提示作为其建议的一部分。由于这些索引对于表来说可能并非最优，在将工作负载提交给向导之前，应从查询中移除所有索引提示，同时记住你需要将它们添加回去以查看它们是否真的能提高性能。\n\
  \n请记住，调优顾问的建议仅仅是建议。它提供的建议可能不会如顾问所建议的那样生效，并且你可能已经拥有了与所建议索引效果相当的现有索引。在实施之前，请测试并验证所有建议。\n\
  \n## 总结\n\n正如你在本章所学，数据库引擎调优顾问可以是一个用于分析现有索引有效性并为 SQL 工作负载推荐新索引的有用工具。随着 SQL 工作负载随时间变化，你可以使用此工具来确定哪些现有索引已不再使用，以及需要哪些新索引来提高性能。偶尔运行一下这个向导来检查你的现有索引是否确实最适合当前负载，可能是个好主意。这假设你自己没有捕获指标并进行评估。数据库引擎调优顾问还提供了许多有用的报告，用于分析\
  \ SQL 工作负载及其自身建议的有效性。只需记住，该工具的局限性使其无法发现所有的优化机会。同时也要记住，DTA 提供的建议质量取决于你向其提供的输入质量。如果你的数据库状况不佳，这个工具可以给你一个快速的帮助。如果你已经在定期监控和调优查询，你可能看不到数据库引擎调优顾问的建议带来什么好处。\n\
  \n捕获查询指标和执行计划过去在自动化和维护方面需要大量工作。然而，捕获这些信息对于你的查询调优工作至关重要。从 SQL Server 2016 开始，`查询存储`\
  \ 提供了一个用于捕获查询指标等信息的绝佳机制。下一章将让你全面了解 `查询存储` 提供的所有功能。\n\n"
- "# 11. 查询存储\n\n`查询存储` 最初于 2015 年在 Azure SQL Database 中引入，并于 2016 年首次引入 SQL Server。`查询存储`\
  \ 提供了三个你将想要利用的功能。首先，你获得了查询指标和执行计划，这些信息被永久存储在数据库中易于访问的结构中，因此你拥有关于系统上查询性能的良好、灵活的信息。其次，`查询存储`\
  \ 创建了一种以前从未有过的、直接控制执行计划行为的方法。最后，`查询存储` 充当数据库升级的安全和报告机制，使你能够以新的方式保护你的系统。\n\n在本章中，我将涵盖以下主题：\n\
  \n*   `查询存储` 的工作原理及其收集的信息\n*   通过 Management Studio 暴露的关于 `查询存储` 行为的报告和机制\n*   计划强制，一种控制\
  \ SQL Server 和 Azure SQL Database 使用哪些执行计划的方法\n*   一种有助于保护系统行为的升级方法\n\n虽然扩展事件会话是你进行精确测量的首选方法，但对于大多数系统来说，`查询存储`\
  \ 应该是监控查询性能的主要手段。\n\n## 查询存储的功能与设计\n\n就对系统的影响而言，`查询存储` 可能是最轻量级的机制。它提供了你正确理解系统查询性能所需的核心内容。另外，因为围绕\
  \ `查询存储` 的所有工作都是通过系统视图完成的，你可以使用 `T-SQL` 来操作它，因此使用起来变得极其容易。随着 `查询存储` 的引入，使用 `DMO`、跟踪事件，甚至在一定程度上使用\
  \ `扩展事件` 作为监控查询指标的机制，真的可以被认为是老派的做法了。\n\n\n## 查询存储行为\n\n查询存储收集两类信息。首先，它收集每个查询在您系统上行为的聚合数据。其次，默认情况下，查询存储会捕获系统上创建的每个执行计划，直至达到每个查询的最大计划数（默认为\
  \ 200）。您可以按数据库为单位开启或关闭 `Query Store`。当开启时，`Query Store` 的运作方式如图 11-1 所示。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig1_HTML.jpg](img/323849_5_En_11_Fig1_HTML.jpg)\n\
  图 11-1 查询存储收集数据的行为\n\n查询优化过程照常进行。当向系统提交一个查询时，会创建一个执行计划（详见第 15 章）并存储在 `plan cache`（计划缓存）中（将在第\
  \ 16 章解释）。这些过程完成后，`Query Store` 会启动一个异步进程从 `plan cache` 中捕获执行计划。最初，它将这些计划写入一块单独的内存进行临时存储。随后，另一个异步进程会将这些执行计划写入数据库中的\
  \ `Query Store`。所有这些都属于异步进程，以确保对系统内的其他进程影响最小（虽然不是零）。此流程的唯一例外是 `plan forcing`（计划强制），我们将在本章后面介绍。\n\
  \n然后，查询执行过程与其他任何查询一样。一旦查询执行完成，查询运行时指标（例如读取次数、写入次数、查询持续时间和等待统计信息）会被异步写入另一个独立的内存空间。稍后，另一个异步进程会将该信息写入磁盘。收集并写入磁盘的信息是聚合过的。默认的聚合时间间隔是\
  \ 60 分钟。\n\n存储在 `Query Store` 系统表中的所有信息都会被永久写入启用了 `Query Store` 的数据库。查询指标和查询的执行计划随数据库一起保存。它们随数据库一起备份，也随数据库一起恢复。如果系统离线或发生故障转移，可能会丢失一些仍驻留在内存中、尚未写入磁盘的\
  \ `Query Store` 信息。默认的写入磁盘间隔是 15 分钟。考虑到这是聚合数据，对于可能因某些 `Query Store` 数据丢失（这不应被视为生产级别数据）造成的损失，这个间隔时间是可以接受的。\n\
  \n当您从 `Query Store` 查询信息时，它会合并内存中的数据和已写入磁盘的数据。您无需执行任何额外操作即可访问该信息。\n\n在继续本章剩余内容之前，如果您想跟随一些代码和操作过程，您需要在一个数据库上启用\
  \ `Query Store`。此命令将完成该操作：\n\n```\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE\
  \ = ON;\n```\n\n为确保您在跟随操作时 `Query Store` 中有查询记录，让我们使用以下存储过程：\n\n```\nCREATE OR ALTER\
  \ PROC dbo.ProductTransactionHistoryByReference (\n    @ReferenceOrderID int\n)\n\
  AS\nBEGIN\n    SELECT  p.Name,\n            p.ProductNumber,\n            th.ReferenceOrderID\n\
  \    FROM    Production.Product AS p\n    JOIN    Production.TransactionHistory\
  \ AS th\n            ON th.ProductID = p.ProductID\n    WHERE   th.ReferenceOrderID\
  \ = @ReferenceOrderID;\nEND\n```\n\n如果您使用这三个值执行该存储过程，并在每次执行后将其从缓存中清除，您实际上会得到三个不同的执行计划。\n\
  \n```\nDECLARE @Planhandle VARBINARY(64);\n\nEXEC dbo.ProductTransactionHistoryByReference\
  \ @ReferenceOrderID = 0;\n\nSELECT @Planhandle = deps.plan_handle\nFROM sys.dm_exec_procedure_stats\
  \ AS deps\nWHERE deps.object_id = OBJECT_ID('dbo.ProductTransactionHistoryByReference');\n\
  \nIF @Planhandle IS NOT NULL\nBEGIN\n    DBCC FREEPROCCACHE(@Planhandle);\nEND\n\
  \nEXEC dbo.ProductTransactionHistoryByReference @ReferenceOrderID = 53465;\n\nSELECT\
  \ @Planhandle = deps.plan_handle\nFROM sys.dm_exec_procedure_stats AS deps\nWHERE\
  \ deps.object_id = OBJECT_ID('dbo.ProductTransactionHistoryByReference');\n\nIF\
  \ @Planhandle IS NOT NULL\nBEGIN\n    DBCC FREEPROCCACHE(@Planhandle);\nEND\n\n\
  EXEC dbo.ProductTransactionHistoryByReference @ReferenceOrderID = 3849;\n```\n\n\
  通过这个操作，您可以确保 `Query Store` 中会有信息。\n\n## 查询存储收集的信息\n\n`Query Store` 收集的数据范围相当窄，但极其丰富。图\
  \ 11-2 展示了其系统表及其关系。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig2_HTML.png](img/323849_5_En_11_Fig2_HTML.png)\n\
  图 11-2 查询存储的系统视图\n\n`Query Store` 中存储的信息分为两个基本集合。一个是关于查询本身的信息，包括查询文本、执行计划和查询上下文设置。然后是运行时信息，包括运行时区间、等待统计信息和查询运行时统计信息。我们将从查询信息开始，分别介绍每个部分的信息。\n\
  \n\n"
- "# 查询信息\n\n查询存储的核心数据就是查询本身。查询独立于存储过程或批处理而存在，尽管它可能是其中的一部分。它归结为基本的查询文本和 `query_hash`\
  \ 值（查询文本的哈希值），后者使你能够识别任何给定的查询。这些数据随后与查询计划和实际的查询文本相结合。图 11-3 展示了其基本结构和一些数据。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig3_HTML.jpg](img/323849_5_En_11_Fig3_HTML.jpg)\n\
  \n### 图 11-3\n存储在查询存储中的查询信息\n\n这些是系统表，存储在任何启用了查询存储的数据库的主文件组中。虽然 Management Studio\
  \ 界面内置了很好的报表，但你可以编写自己的查询来访问查询存储中的信息。例如，以下查询可以检索给定存储过程的所有查询语句及其执行计划：\n\n```sql\n\
  SELECT qsq.query_id,\nqsq.object_id,\nqsqt.query_sql_text,\nCAST(qsp.query_plan\
  \ AS XML) AS QueryPlan\nFROM sys.query_store_query AS qsq\nJOIN sys.query_store_query_text\
  \ AS qsqt\nON qsq.query_text_id = qsqt.query_text_id\nJOIN sys.query_store_plan\
  \ AS qsp\nON qsp.query_id = qsq.query_id\nWHERE qsq.object_id = OBJECT_ID('dbo.ProductTransactionHistoryByReference');\n\
  ```\n\n虽然每个单独的查询语句都存储在查询存储中，但你也会获得 `object_id`，因此可以使用像 `OBJECT_ID()` 这样的函数（如我所做的那样）来检索信息。请注意，我还必须对\
  \ `query_plan` 列使用 `CAST` 命令。这是因为查询存储正确地将该列存储为文本，而非 XML。SQL Server 中的 XML 数据类型有嵌套限制，这需要两个列来处理：对于符合要求的使用\
  \ XML 类型，对于不符合的则使用 `NVARCHAR(MAX)`。在构建查询存储时，他们通过设计解决了这个问题。如果你想能够点击结果（类似于图 11-4）来查看执行计划，就需要像我之前那样使用\
  \ `CAST`。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig4_HTML.jpg](img/323849_5_En_11_Fig4_HTML.jpg)\n\
  \n### 图 11-4\n使用 T-SQL 从查询存储中检索的信息\n\n在这个例子中，对于一个单独的查询（`query_id` = 75），这是一个单语句的存储过程，我有三个不同的执行计划，由三个不同的\
  \ `plan_id` 值标识。我们稍后会查看这些计划。\n\n从查询存储的结果中需要注意的另一点是文本是如何存储的。由于此语句是带参数的存储过程的一部分，T-SQL\
  \ 文本中使用的参数值是被定义的。这就是该语句在查询存储中的样子（格式保持不变）：\n\n```sql\n(@ReferenceOrderID int)SELECT\
  \  p.Name,              p.ProductNumber,              th.ReferenceOrderID      FROM\
  \    Production.Product AS p      JOIN    Production.TransactionHistory AS th  \
  \            ON th.ProductID = p.ProductID      WHERE   th.ReferenceOrderID = @ReferenceOrderID\n\
  ```\n\n请注意语句开头的参数定义。提醒一下，实际的存储过程定义如下所示：\n\n```sql\nCREATE OR ALTER PROC dbo.ProductTransactionHistoryByReference\
  \ (\n@ReferenceOrderID int\n)\nAS\nBEGIN\nSELECT  p.Name,\np.ProductNumber,\nth.ReferenceOrderID\n\
  FROM    Production.Product AS p\nJOIN    Production.TransactionHistory AS th\nON\
  \ th.ProductID = p.ProductID\nWHERE   th.ReferenceOrderID = @ReferenceOrderID;\n\
  END\n```\n\n过程内的语句与存储在查询存储中的语句是不同的。这可能导致在尝试查找特定查询时出现问题。让我们看一个不同的例子：\n\n```sql\n\
  SELECT a.AddressID,\na.AddressLine1\nFROM Person.Address AS a\nWHERE a.AddressID\
  \ = 72;\n```\n\n这是一个批处理，而不是存储过程。首次执行此查询将按照前面概述的过程将其加载到查询存储中。如果我们运行一些 T-SQL 来检索此语句的信息，如下所示，将不会返回任何内容：\n\
  \n```sql\nSELECT qsq.query_id,\nqsq.query_hash,\nqsqt.query_sql_text\nFROM sys.query_store_query\
  \ AS qsq\nJOIN sys.query_store_query_text AS qsqt\nON qsqt.query_text_id = qsq.query_text_id\n\
  WHERE qsqt.query_sql_text = 'SELECT a.AddressID,\na.AddressLine1\nFROM Person.Address\
  \ AS a\nWHERE a.AddressID = 72;';\n```\n\n因为这个语句非常简单，优化器能够对它执行一个称为**简单参数化**的过程。幸运的是，查询存储有一个用于处理自动参数化的函数\
  \ `sys.fn_stmt_sql_handle_from_sql_stmt`。该函数允许你按如下方式查找查询信息：\n\n```sql\nSELECT qsq.query_id,\n\
  qsq.query_hash,\nqsqt.query_sql_text,\nqsq.query_parameterization_type\nFROM sys.query_store_query_text\
  \ AS qsqt\nJOIN sys.query_store_query AS qsq\nON qsq.query_text_id = qsqt.query_text_id\n\
  JOIN sys.fn_stmt_sql_handle_from_sql_stmt(\n'SELECT a.AddressID,\na.AddressLine1\n\
  FROM Person.Address AS a\nWHERE a.AddressID = 72;',\n2)  AS fsshfss\nON fsshfss.statement_sql_handle\
  \ = qsqt.statement_sql_handle;\n```\n\n格式和空格都必须完全相同，此方法才能生效。硬编码的值可以更改，但其余部分必须完全相同。运行此查询的结果如图\
  \ 11-5 所示。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig5_HTML.jpg](img/323849_5_En_11_Fig5_HTML.jpg)\n\
  \n### 图 11-5\n显示简单参数化结果的截图\n\n你可以在 `query_sql_text` 列中看到，简单参数化的参数值已被添加到文本中，就像存储过程那样。坏消息是\
  \ `sy.fn_stmt_sql_handl_from_sql_stmt` 目前仅适用于自动参数化。它无法帮助你定位来自任何其他来源的参数化语句。要检索这些信息，你将被迫使用\
  \ `LIKE` 命令在文本中搜索，或者像我之前那样，对存储过程中的查询使用 `object_id`。\n\n\n### 查询运行时数据\n\n在检索到有关查询和计划的信息后，你接下来需要的将是查看运行时指标。理解运行时指标有两个关键点。首先，这些指标是关联回**计划**，而不是关联回查询。由于每个计划的行为可能不同，涉及针对不同索引的不同操作、不同的连接类型等等，因此捕获运行时数据和等待统计信息意味着要关联回计划。其次，运行时和等待统计信息是聚合的，但它们是**按运行时区间**进行聚合的。运行时区间的默认值为\
  \ 60 分钟。这意味着对于每个计划的每个运行时区间，你都将得到一组不同的指标。\n\n所有这些信息如图 11-6 所示。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig6_HTML.jpg](img/323849_5_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6: 包含运行时和等待统计信息的系统表\n\n当你开始查询运行时指标时，你可以轻松地将它们与查询本身的信息结合起来。你必须处理区间问题，而处理区间的最佳方法可能是对它们进行分组和聚合，取平均值的平均值，依此类推。这看起来可能很麻烦，但你需要理解信息为何如此划分。当你查看查询性能时，你需要多个数字，例如当前性能、期望性能以及我们进行更改后的未来性能。如果没有这些数字进行比较，你就无法知道某个操作是慢还是已经得到了改善。查询存储中的信息也是如此。通过将所有内容分解成区间，你可以将今天与昨天进行比较，将一个时间点与另一个时间点进行比较。这样你才能知道性能是否真的下降了（或提高了），昨天运行得更快/更慢等等。如果你只有平均值而不是随时间变化的平均值，那么你将无法看到行为如何随时间变化。通过时间区间，你可以获得一些使用扩展事件自己捕获指标的粒度，同时结合查询缓存的易用性。\n\
  \n检索给定时间点的性能指标的查询可以这样编写：\n\n```sql\nDECLARE @CompareTime DATETIME = '2017-11-28\
  \ 21:37';\nSELECT CAST(qsp.query_plan AS XML),\n       qsrs.count_executions,\n\
  \       qsrs.avg_duration,\n       qsrs.stdev_duration,\n       qsws.wait_category_desc,\n\
  \       qsws.avg_query_wait_time_ms,\n       qsws.stdev_query_wait_time_ms\nFROM\
  \ sys.query_store_plan AS qsp\nJOIN sys.query_store_runtime_stats AS qsrs\n    ON\
  \ qsrs.plan_id = qsp.plan_id\nJOIN sys.query_store_runtime_stats_interval AS qsrsi\n\
  \    ON qsrsi.runtime_stats_interval_id = qsrs.runtime_stats_interval_id\nJOIN sys.query_store_wait_stats\
  \ AS qsws\n    ON qsws.plan_id = qsrs.plan_id\n    AND qsws.execution_type = qsrs.execution_type\n\
  \    AND qsws.runtime_stats_interval_id = qsrs.runtime_stats_interval_id\nWHERE\
  \ qsq.object_id = OBJECT_ID('dbo.ProductTransactionHistoryByReference')\n    AND\
  \ @CompareTime BETWEEN qsrsi.start_time\n        AND     qsrsi.end_time;\n```\n\n\
  让我们分解一下。你可以看到我们像前面的查询一样，从 `sys.query_store_plan` 开始获取查询计划。然后我们将它与包含所有运行时指标（如平均持续时间和持续时间的标准差）的表\
  \ `sys.query_store_runtime_stats` 结合起来。因为我打算基于特定时间进行筛选，所以我想确保连接到存储该数据的 `sys.query_store_runtime_stats_interval`\
  \ 表。接着，我连接到 `sys.query_store_wait_stats`。在那里，我必须使用复合键来直接链接等待和运行时统计信息，即 `plan_id`、`execution_type`\
  \ 和 `runtime_stats_interval_id`。我使用了本章前面的一个 `plan_id`，并设置数据返回特定的时间范围。图 11-7 显示了结果数据。\n\
  \n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig7_HTML.jpg](img/323849_5_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7: 一个查询在一个时间区间内的运行时指标和等待统计信息\n\n理解 `sys.query_store_wait_stats` 和 `sys.query_store_runtime_stats`\
  \ 中的信息如何聚合非常重要。它不仅仅是按 `runtime_stats_interval_id` 和 `plan_id` 聚合。`execution_type`\
  \ 也决定了聚合方式，因为一个给定的查询可能出错或被取消。这会影响查询的行为和数据收集方式，因此它被包含在性能指标中以区分一组行为与另一组行为。让我们通过运行以下脚本来查看这一点：\n\
  \n```sql\nSELECT *\nFROM sys.columns AS c,\n     sys.syscolumns AS s;\n```\n\n这个脚本会导致一个笛卡尔积连接，在我的系统上大约需要两分钟运行。如果我们让查询在运行时取消一次，再让它完成一次，我们就可以看到查询存储中的内容。\n\
  \n```sql\nSELECT qsqt.query_sql_text,\n       qsrs.execution_type,\n       qsrs.avg_duration\n\
  FROM sys.query_store_query AS qsq\nJOIN sys.query_store_query_text AS qsqt\n   \
  \ ON qsqt.query_text_id = qsq.query_text_id\nJOIN sys.query_store_plan AS qsp\n\
  \    ON qsp.query_id = qsq.query_id\nJOIN sys.query_store_runtime_stats AS qsrs\n\
  \    ON qsrs.plan_id = qsp.plan_id\nWHERE qsqt.query_sql_text like '%FROM sys.columns\
  \ AS c%';\n```\n\n你可以在图 11-8 中看到结果。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig8_HTML.jpg](img/323849_5_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8: 中止的执行显示为不同的执行类型\n\n你会看到中止的查询和出错的查询显示为不同的类型。此外，它们的持续时间、等待时间等运行时指标是分开存储的。要从这两个相应的表中获得正确的等待和持续时间度量集，你必须包含\
  \ `execution_type`。\n\n如果你对给定查询的所有查询指标感兴趣，可以使用类似这样的查询从查询存储中检索信息：\n\n```sql\nWITH\
  \ QSAggregate\nAS (SELECT qsrs.plan_id,\n           SUM(qsrs.count_executions) AS\
  \ CountExecutions,\n           AVG(qsrs.avg_duration) AS AvgDuration,\n        \
  \   AVG(qsrs.stdev_duration) AS StdDevDuration,\n           qsws.wait_category_desc,\n\
  \           AVG(qsws.avg_query_wait_time_ms) AS AvgWaitTime,\n           AVG(qsws.stdev_query_wait_time_ms)\
  \ AS StDevWaitTime\n    FROM sys.query_store_runtime_stats AS qsrs\n    JOIN sys.query_store_wait_stats\
  \ AS qsws\n        ON qsws.plan_id = qsrs.plan_id\n        AND qsws.runtime_stats_interval_id\
  \ = qsrs.runtime_stats_interval_id\n    GROUP BY qsrs.plan_id,\n             qsws.wait_category_desc)\n\
  SELECT CAST(qsp.query_plan AS XML),\n       qsa.*\nFROM sys.query_store_plan AS\
  \ qsp\nJOIN QSAggregate AS qsa\n    ON qsa.plan_id = qsp.plan_id\nWHERE qsq.object_id\
  \ = OBJECT_ID('dbo.ProductTransactionHistoryByReference');\n```\n\n此查询的结果将是指定 `plan_id`\
  \ 当前在查询存储中包含的所有信息。今后，你可以根据需要以任何方式组合查询存储中的信息。接下来，让我们来掌控查询存储。\n\n\n### 控制查询存储\n\n\
  你已经了解了如何为数据库启用查询存储。要禁用查询存储，可以使用类似的操作。\n\n```sql\nALTER DATABASE AdventureWorks2017\
  \ SET QUERY_STORE = OFF;\n```\n\n此命令将禁用查询存储，但不会删除查询存储信息。查询存储收集和管理的那些数据将在重启、故障转移、备份以及数据库离线后持续存在。甚至在禁用查询存储后，这些数据也会保留。要删除查询存储数据，你必须像下面这样直接控制：\n\
  \n```sql\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR;\n```\n\n这将清除查询存储中的所有数据。如果你愿意，可以选择性地删除。你可以简单地删除一个给定的查询。\n\
  \n```sql\nEXEC sys.sp_query_store_remove_query @query_id = @queryid;\n```\n\n你可以删除一个查询计划。\n\
  \n```sql\nEXEC sys.sp_query_store_remove_plan @plan_id = @PlanID;\n```\n\n你还可以重置性能指标。\n\
  \n```sql\nEXEC sys.sp_query_store_reset_exec_stats @plan_id = @PlanID;\n```\n\n\
  所有这些操作只需要你找到想要控制的那个计划或查询，然后就可以操作了。你可能还会发现，你想保留查询存储中那些已写入缓存但尚未写入磁盘的数据。你可以强制将缓存刷新到磁盘。\n\
  \n```sql\nEXEC sys.sp_query_store_flush_db;\n```\n\n最后，你可以更改查询存储内的默认设置。首先，了解去哪里获取这些信息是个好主意。你可以通过运行以下命令，以每个数据库为基础检索查询存储的当前设置：\n\
  \n```sql\nSELECT * FROM sys.database_query_store_options AS dqso;\n```\n\n与查询存储的许多其他方面一样，这些设置是在每个数据库级别上控制的。这使你能够，例如，只更改一个数据库的统计信息聚合时间间隔而不影响另一个。控制查询存储设置的各个方面只需运行此查询：\n\
  \n```sql\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE (MAX_STORAGE_SIZE_MB\
  \ = 200);\n```\n\n该命令将查询存储的默认存储大小从 100MB 更改为 200MB，为被修改的数据库提供了更多空间。进行这些更改时，无需重启服务器。你也不会影响计划缓存中的计划行为或你正在修改的数据库中查询处理的任何其他部分。对于大多数情况下的大多数人来说，默认设置应该是足够的。根据你的具体情况，你可能希望修改查询存储的行为方式。进行这些更改时，请务必监控你的服务器，以确保没有对服务器产生负面影响。\n\
  \n我建议你开箱即用唯一值得考虑更改的设置是查询存储捕获模式。默认情况下，它捕获所有查询和所有查询计划，无论它们被调用的频率、运行时间长短或其他任何设置。对我们许多人来说，这种行为是足够的。然而，如果你已将系统设置更改为“优化即席查询”，你这样做是因为你收到了大量的即席查询，并且你正试图管理内存使用（更多内容见第\
  \ 16 章）。该设置意味着你对捕获每一个计划的兴趣降低了。你也可能处于这样的情况：由于事务量很大，你根本不希望捕获每一个查询或计划。这些情况可能促使你更改查询存储捕获模式设置。其他选项是“无”和“自动”。“无”将停止查询存储捕获查询和指标，但如果你为任何查询设置了计划强制（本章稍后将详细介绍计划强制），则仍允许其工作。“自动”只会捕获那些运行一定时长、消耗一定资源或被调用一定次数的查询。这些值都可能由微软更改，并在查询存储内部进行控制。你不能控制这里的值，只能控制是否使用它们。在大多数系统上，为了帮助减少噪音和开销，我建议从“全部”更改为“自动”。然而，这绝对是一个个人决定，你的情况可能要求不同。\n\
  \n你也可以使用 SQL Server Management Studio (SSMS) 图形用户界面来控制查询存储。在对象资源管理器窗口中右键单击任意数据库，从上下文菜单中选择“属性”。当属性窗口打开时，你可以单击“查询存储”窗格，应该会看到类似图\
  \ 11-9 的内容。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig9_HTML.jpg](img/323849_5_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9\n\n用于控制查询存储的 SSMS 图形用户界面\n\n你立即可以看到我们在本章探索查询存储时已经介绍过的一些设置。你还可以看到查询存储正在使用多少数据以及分配空间中还剩多少容量。与前面显示的\
  \ T-SQL 命令一样，此处进行的任何更改都会立即反映在查询存储行为中，并且不需要系统进行任何形式的重启。\n\n\n## 查询存储报告\n\n在某些工作中，直接使用\
  \ T-SQL 控制查询存储并使用系统表检索相关数据是首选方法。然而，对于大部分工作，我们可以利用其内置报告及其在与查询存储协同时的行为。\n\n要查看这些报告，只需在\
  \ Management Studio 的“对象资源管理器”窗口中展开数据库。对于任何启用了查询存储的数据库，都会有一个包含可见报告的新文件夹，如图 11-10\
  \ 所示。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig10_HTML.jpg](img/323849_5_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10\nAdventureWorks2017 数据库中的查询存储报告\n\n报告如下：\n\n*   `Regressed Queries`：你将看到那些性能随时间推移发生负面变化的查询。\n\
  *   `Overall Resource Consumption`：此报告显示在定义的时间范围内（默认是上个月）不同查询的资源消耗情况。\n*   `Top\
  \ Resource Consuming Queries`：在这里你可以找到消耗资源最多的查询，而不考虑时间范围。\n*   `Query With Forced\
  \ Plans`：任何你定义为强制计划的查询都将在此报告中可见。\n*   `Queries With High Variation`：此报告显示运行时统计信息变化程度高的查询，通常伴随着不止一个执行计划。\n\
  *   `Tracked Queries`：通过查询存储，你可以将一个查询定义为感兴趣的对象，而无需尝试在其他报告中追踪它，你可以标记该查询并在此处找到它。\n\
  \n这些报告中的每一个都是独特的，并且各有不同的用途，但我们没有时间和空间来详细探索全部。相反，我将重点介绍 `Top Resource Consuming Queries`\
  \ 报告的行为，因为它通常代表了所有其他报告的行为，而且它可能是你会相当频繁使用的一个。打开报告，你会看到类似于图 11-11 的内容。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig11_HTML.jpg](img/323849_5_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11\n查询存储的前 25 个资源消耗者报告\n\n报告中有三个窗口。第一个在左上角，按 `query_id` 值聚合显示查询。右侧的第二个窗口显示各种查询行为随时间的变化以及这些查询的不同计划。你可以看到，排名第一的查询（在第一个窗格中高亮显示）有三个不同的执行计划。点击其中任何一个计划都会在屏幕底部的第三个窗口中打开该计划。\n\
  \n你不仅限于默认行为。第一个窗口（默认按 `Duration` 聚合）驱动着其他两个窗口。屏幕顶部有一个下拉菜单，目前提供 13 个选项，如图 11-12 所示。\n\
  \n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig12_HTML.jpg](img/323849_5_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12\n“前 25 个资源消耗者”报告的不同聚合方式\n\n选择其中任何一个都会改变报告聚合的值。你还可以使用另一个下拉菜单更改报告的聚合方式。此列表包括\
  \ `average`、`minimum`、`maximum`、`total` 和 `standard deviation`。第一个窗口的其他功能包括：能够切换到网格格式、标记一个查询以便后续追踪（在\
  \ `Tracked Queries` 报告中）、刷新报告以及查看查询文本。所有这些功能在试图确定性能问题时，有助于识别需要花时间研究的查询。\n\n下一个窗口显示从第一个窗口中选定的查询的性能指标。每个点既代表一个时间点，也代表一个特定的执行计划。图\
  \ 11-13 中的信息说明了查询性能如何从上午 8:45 到 9:45 发生变化，以及查询的性能和执行计划在此时间范围内如何改变。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig13_HTML.jpg](img/323849_5_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13\n一个查询的不同性能行为和不同的执行计划\n\n每个点的大小对应于给定计划在给定时间范围内的执行次数。如果你将鼠标悬停在任何给定的点上，它会显示有关该时间点的附加信息。图\
  \ 11-14 显示了屏幕顶部（`plan_id` = 76）在上午 9:45 时间点的信息。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig14_HTML.jpg](img/323849_5_En_11_Fig14_HTML.jpg)\n\
  \n图 11-14\n给定计划显示信息的详细信息\n\n你可以看到该特定计划的执行次数和其他指标。无论你点击哪个点，你都将在最终窗口中看到该点对应的执行计划。显示的执行计划的使用方式与\
  \ Management Studio 中的任何其他图形计划相同，因此我不会在此详细描述其行为。这里展示的一个额外功能是强制计划的能力。你可以在执行计划窗口的右上角看到两个按钮，如图\
  \ 11-15 所示。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig15_HTML.jpg](img/323849_5_En_11_Fig15_HTML.jpg)\n\
  \n图 11-15\n从报告中强制和取消强制计划\n\n你可以直接从报告中强制或取消强制一个计划。我将在下一节详细讨论计划强制。\n\n\n## 计划强制\n\n\
  虽然查询存储的大部分功能都围绕着收集和观察查询及查询计划的行为，但有一项功能彻底改变了这一切，那就是计划强制。计划强制是指你将某个特定的计划标记为你希望 SQL\
  \ Server 使用的计划。由于查询存储中的所有内容都写入数据库，因此能在重启、备份等操作后得以保留，这意味着你可以确保某个给定的计划始终会被使用。这个过程确实改变了一点查询存储与优化过程及计划缓存的交互方式，如图\
  \ 11-16 所示。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig16_HTML.jpg](img/323849_5_En_11_Fig16_HTML.jpg)\n\
  \n图 11-16：添加计划强制后的查询优化过程\n\n现在的情况是，如果一个计划被标记为强制计划，那么当优化器完成其过程后，在将计划存储到缓存以供查询使用之前，它会首先检查查询存储中的计划。如果此查询有一个强制计划，则将始终使用该计划。唯一的例外是，如果系统内部发生了某些变化，导致该计划对该查询无效。\n\
  \n计划强制的功能其实相当简单。你必须提供一个 `plan_id` 和一个 `query_id`，就可以强制一个计划。例如，我的系统中，与 `query_id`\
  \ 值 75 匹配的查询（其语法、查询哈希和查询设置相符）有三个可能的计划。请注意，虽然我使用 `query_id` 来标记查询，但那是一个人工键。查询的识别因素是文本、哈希和上下文设置。强制计划的查询则极其简单。\n\
  \n```sql\nEXEC sys.sp_query_store_force_plan 75,82;\n```\n\n这就是所需的全部操作。从此时起，无论查询是重新编译还是从缓存中移除，当优化过程完成后，都将使用与\
  \ `plan_id` 82 对应的计划。有了这个，我们可以查看“带有强制计划的查询”报告，看看显示了什么内容，如图 11-17 所示。\n\n![../images/323849_5_En_11_Chapter/323849_5_En_11_Fig17_HTML.jpg](img/323849_5_En_11_Fig17_HTML.jpg)\n\
  \n图 11-17：“带有强制计划的查询”报告\n\n你可以看到，虽然这份报告整体上与“资源消耗最高的查询”报告相同，但存在差异。第一个窗口中的查询列表就是查询列表。第二个窗口几乎与图\
  \ 11-11 和图 11-13 中显示的前一个窗口完全相同。但是，区别在于，被标记为强制的计划旁边有一个勾选标记。最后一个窗口基本相同，只有一个细微差别。顶部，“强制计划”按钮未启用，而“取消强制计划”按钮是启用的。你可以通过单击该按钮轻松地从此处取消强制计划。你也可以使用单个命令取消强制计划。\n\
  \n```sql\nEXEC sys.sp_query_store_unforce_plan 214,248;\n```\n\n就像单击按钮一样，这将停止计划强制。从此时起，优化过程恢复正常。我打算把计划强制的完整演示留到我们讨论参数嗅探的第\
  \ 17 章。可以说，在处理糟糕的参数嗅探时，计划强制变得极其有用。它在处理性能回退时也很方便，即 SQL Server 的更改导致先前表现良好的查询突然生成性能不佳的执行计划。这种情况最常发生在升级期间，当兼容性模式在未经测试的情况下被更改时。\n\
  \n## 用于升级的查询存储\n\n虽然一般的查询性能监控和调优可能是查询存储的日常常见用途，但该工具最强大的用途之一是作为升级 SQL Server 的安全网。\n\
  \n假设你正计划从 SQL Server 2012 迁移到 SQL Server 2017。传统上，你会在某个测试实例上升级你的数据库，然后运行一系列测试以确保一切正常工作。如果你发现并记录了所有问题，那很好。不幸的是，由于优化器或基数估算器的一些更改，可能需要重写一些代码。这可能会导致升级延迟，或者业务方甚至可能决定完全避免升级（这是一个常见但糟糕的选择）。这假设你发现了问题。完全有可能因为估算行数或其他方面的更改而忽略某个特定查询突然开始表现不佳的情况。\n\
  \n这就是查询存储成为你升级安全网的地方。首先，你应该使用标准方法进行所有测试并尝试解决问题。这不应该改变。然而，查询存储为标准方法增加了额外的功能。以下是应遵循的步骤：\n\
  \n1.  将你的数据库还原到新的 SQL Server 实例或升级你的实例。这假设是生产机器，但你也可以在测试机器上执行此操作。\n2.  将数据库保留在旧的兼容性模式。不要将其更改为新模式，因为你将在捕获数据之前启用新的优化器和新的基数估算器。\n\
  3.  启用查询存储。它可以收集在旧兼容性模式下运行的指标。\n4.  运行你的测试或运行你的系统一段时间，以确保覆盖系统中的大部分查询。这段时间将根据你的需求而变化。\n\
  5.  更改兼容性模式。\n6.  运行 `Regressed Queries`（性能回退的查询）报告。此报告将查找突然开始比以前运行得更慢的查询。\n7. \
  \ 调查这些查询。如果很明显查询计划已更改并且是性能变化的原因，那么选择更改之前的一个计划，并使用计划强制使其成为 SQL Server 使用的计划。\n8.\
  \  在必要时，花时间重写查询或重组系统，以确保查询能够自行编译一个在系统上性能良好的计划。\n\n这种方法不能预防所有问题。你仍然必须测试你的系统。然而，使用查询存储将为你提供处理\
  \ SQL Server 内部更改的机制，这些更改会影响你的查询计划并进而影响性能。你也可以使用类似的过程来应用累积更新或服务包。你还可以通过使用数据库作用域配置设置（在\
  \ SQL Server 2016 SP1 及更高版本中可用）来启用 `LEGACY_CARDINALITY_ESTIMATION`，或者添加一个提示来处理回退。这些是除了使用计划强制之外或代替其使用的选项。你也可以直接恢复到旧的兼容性模式，但这会丧失许多功能。\n\
  \n\n\n## 摘要\n\n**查询存储** 增强了你识别性能不佳查询的能力。尽管查询存储的功能非常出色，但它并不会完全替代大多数人已经习惯使用的任何工具。它的粒度不如扩展事件。它也不具备查询计划缓存的某些即时性。话虽如此，查询存储通过包含额外信息（例如值的标准差）并保存所有执行计划（即使是那些已从缓存中移除或替换的计划），对这两种方法都进行了补充。此外，查询存储还增加了执行极其简单的计划强制功能，这不仅有助于解决参数或其他行为相关的问题，还能处理由\
  \ Microsoft 升级引起的计划退化。所有这些结合起来，使查询存储成为查询调优工具包中一个极其有用的补充。\n\n通常，你会依赖非聚集索引来改善 SQL\
  \ 工作负载的性能。这假设你已经为表分配了聚集索引。由于非聚集索引的性能高度依赖于与其关联的书签查找的成本，你将在下一章中了解如何分析和解决查找问题。\n\n"
- "# 12. 键查找及其解决方案\n\n为了最大化非聚集索引的收益，你必须尽可能地最小化数据检索的成本。与非聚集索引相关的一个主要开销是过多查找的成本（以前称为\
  \ *书签查找*），这是一种从非聚集索引行导航到聚集索引或堆中相应数据行的机制。因此，研究查找的原因并评估如何避免这种成本是有意义的。\n\n在本章中，我将涵盖以下主题：\n\
  \n- 查找的目的\n- 使用查找的缺点\n- 查找原因的分析\n- 解决查找问题的技术\n\n## 查找的目的\n\n当应用程序通过查询请求信息时，优化器可以利用（如果存在）`WHERE`、`JOIN`\
  \ 或 `HAVING` 子句中列上的非聚集索引来导航至数据。当然，它也可以扫描堆或聚集索引，但我们这里假设谓词值和非聚集索引的键值是对齐的。如果查询引用的列不属于用于检索数据的非聚集索引的一部分（无论是键列还是\
  \ `INCLUDE` 列表），则需要从索引行导航到表中聚集索引或堆中的相应数据行，以访问这些剩余的列。\n\n例如，在下面的 `SELECT` 语句中，如果优化器使用的非聚集索引不包含所有列，则需要从非聚集索引行导航到聚集索引或堆中的数据行以检索这些列的值。\n\
  \n```sql\nSELECT p.Name,\nAVG(sod.LineTotal)\nFROM Sales.SalesOrderDetail AS sod\n\
  JOIN Production.Product AS p\nON sod.ProductID = p.ProductID\nWHERE sod.ProductID\
  \ = 776\nGROUP BY sod.CarrierTrackingNumber,\np.Name\nHAVING MAX(sod.OrderQty) >\
  \ 1\nORDER BY MIN(sod.LineTotal);\n```\n\n`SalesOrderDetail` 表在 `ProductID` 列上有一个非聚集索引。优化器可以使用该索引来过滤表中的行。该表在\
  \ `SalesOrderID` 和 `SalesOrderDetailID` 上有一个聚集索引，因此它们会包含在非聚集索引中。但由于查询中没有引用它们，它们对查询毫无帮助。查询引用的其他列（`LineTotal`、`CarrierTrackingNumber`、`OrderQty`\
  \ 和 `LineTotal`）在非聚集索引中不可用。为了获取这些列的值，需要通过聚集索引从非聚集索引行导航到相应的数据行，这个操作就是键查找。你可以在图 12-1\
  \ 中看到实际效果。\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig1_HTML.jpg](img/323849_5_En_12_Fig1_HTML.jpg)\n\
  \n**图 12-1** 键查找是一个更复杂执行计划的一部分\n\n为了更好地理解非聚集索引如何导致查找，考虑以下 `SELECT` 语句，它通过使用列 `ProductID`\
  \ 上的筛选条件，仅请求 `SalesOrderDetail` 表中的几行，但由于通配符 `*` 而请求所有列：\n\n```sql\nSELECT  *\n\
  FROM Sales.SalesOrderDetail AS sod\nWHERE sod.ProductID = 776 ;\n```\n\n优化器评估 `WHERE`\
  \ 子句，发现 `WHERE` 子句中包含的列 `ProductID` 上有一个非聚集索引，可以减少行数。由于只请求了少量行（228 行），通过非聚集索引检索数据比扫描聚集索引（包含超过\
  \ 120,000 行）来识别匹配行更便宜。列 `ProductID` 上的非聚集索引将有助于快速识别匹配行。该非聚集索引包含列 `ProductID` 以及聚集索引列\
  \ `SalesOrderID` 和 `SalesOrderDetailID`；所有其他被请求的列都未包含在内。因此，正如你可能猜到的，在使用非聚集索引的同时检索剩余的列，你需要一次查找。\n\
  \n这一点在以下扩展事件指标和图 12-2 的执行计划中显示。寻找 `Key Lookup (Clustered)` 运算符。那就是正在进行的查找。\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig2_HTML.jpg](img/323849_5_En_12_Fig2_HTML.jpg)\n\
  \n**图 12-2** 包含书签查找的执行计划\n\n```text\n持续时间：176ms\n读取次数：755\n```\n\n\n\n## 查找操作的缺点\n\
  \n除了访问索引页外，查找操作还需要访问数据页。访问两组页面会增加查询的逻辑读取次数。此外，如果这些页面不在内存中，查找操作很可能需要在磁盘上进行一次随机（或非顺序）I/O\
  \ 操作，以便从索引页跳转到数据页，同时还需要足够的 CPU 能力来整理此数据并执行必要的操作。这是因为，对于大表而言，索引页和对应的数据页在磁盘上通常不会直接相邻。\n\
  \n增加的逻辑读取以及（如果需要）代价高昂的物理读取，使得查找操作的数据检索操作成本相当高。此外，你还需要处理将从索引检索的数据与通过查找操作检索的数据进行组合的过程，这通常通过\
  \ `JOIN` 运算符之一来完成。查找操作的成本因素是非聚集索引更适合返回表中一小部分行的查询的原因。随着查询检索的行数增加，查找操作的开销成本变得不可接受。另外，如果优化器统计信息不准确并低估了返回的行数，查找操作会很快变得比扫描操作昂贵得多。\n\
  \n为了理解随着检索行数增加，查找操作如何使非聚集索引失效，让我们看一个不同的例子。产生图 12-2 执行计划的查询仅从 `SalesOrderDetail`\
  \ 表返回了几行。保持查询不变，但将筛选器更改为不同的值，当然会改变返回的行数。如果将参数值更改如下：\n\n```sql\nSELECT  *\nFROM \
  \   Sales.SalesOrderDetail AS sod\nWHERE   sod.ProductID = 793;\n```\n\n那么运行该查询将返回超过\
  \ 700 行，其性能指标不同，且执行计划完全不同（图 12-3）。\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig3_HTML.jpg](img/323849_5_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3：返回更多行的不同执行计划\n\n```\nDuration: 195ms\nReads: 1,262\n```\n\n为了确定使用非聚集索引的成本，请考虑查询在执行表扫描时产生的逻辑读取次数（`1,262`）。如果通过使用索引提示强制优化器使用非聚集索引，如下所示：\n\
  \n```sql\nSELECT  *\nFROM    Sales.SalesOrderDetail AS sod WITH (INDEX (IX_SalesOrderDetail_ProductID))\n\
  WHERE   sod.ProductID = 793 ;\n```\n\n那么逻辑读取次数会从 `1,262` 增加到 `2,292`。\n\n```\nDuration:\
  \ 1,114ms\nReads: 2,292\n```\n\n图 12-4 显示了相应的执行计划。\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig4_HTML.jpg](img/323849_5_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4：使用索引提示获取更多行的执行计划\n\n为了从非聚集索引中获益，查询应请求一个相对明确的数据集。对于处理大型结果集的应用程序设计，应用设计起着重要作用。例如，网页上的搜索引擎每次大多只返回有限数量的文章，即使搜索条件返回了数千篇匹配的文章。如果查询请求大量行，那么查找操作增加的开销成本可能会使非聚集索引变得不合适；随后，你必须考虑避免查找操作的可能性。\n\
  \n## 分析查找操作的原因\n\n由于查找操作可能是一项成本高昂的操作，你应该分析是什么原因导致查询计划在执行计划中选择查找步骤。你可能会发现，通过将缺失的列包含在非聚集索引键中，或者作为索引页级别的\
  \ `INCLUDE` 列，可以避免查找操作，从而避免与之相关的开销成本。\n\n要了解如何识别未包含在非聚集索引中的列，请考虑以下查询，该查询基于 `NationalIDNumber`\
  \ 从 `HumanResources.Employee` 表中提取信息：\n\n```sql\nSELECT NationalIDNumber,\nJobTitle,\n\
  HireDate\nFROM HumanResources.Employee AS e\nWHERE e.NationalIDNumber = '693168613';\n\
  ```\n\n这会产生以下性能指标和执行计划（参见图 12-5）：\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig5_HTML.jpg](img/323849_5_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5：带有查找操作的执行计划\n\n```\nDuration: 169 mc\nReads: 4\n```\n\n如执行计划所示，这里有一个键查找操作。`SELECT`\
  \ 语句引用了 `NationalIDNumber`、`JobTitle` 和 `HireDate` 列。在 `NationalIDNumber` 列上的非聚集索引不提供\
  \ `JobTitle` 和 `HireDate` 列的值，因此需要通过查找操作从数据存储位置检索这些列。之所以称为 `键查找`，是因为它通过与非聚集索引一起存储的聚集键来检索数据。如果表是堆，则会是\
  \ `RID` 查找。然而，在现实世界中，识别查询使用的所有列通常不会这么容易。请记住，如果查询任何部分（不仅仅是选择列表）引用的所有列不是所用非聚集索引的一部分，就会导致查找操作。\n\
  \n在基于视图和用户定义函数的复杂查询情况下，可能很难找到查询引用的所有列。因此，你需要一个标准机制来查找由查找操作返回的、未包含在非聚集索引中的列。\n\n\
  如果查看 `键查找（聚集）` 操作的属性，你可以看到该操作的输出列表。这显示了查找操作输出的列。要快速轻松地获取输出列列表并能够复制它们，请右键单击运算符（本例中为\
  \ `键查找（聚集）`）。然后选择“属性”菜单项。在打开的属性窗口中向下滚动到“输出列表”属性（图 12-6）。该属性有一个扩展箭头，允许你展开列列表，并且每列旁边还有进一步的扩展箭头，允许你展开列的属性。\n\
  \n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig6_HTML.jpg](img/323849_5_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6：键查找属性窗口\n\n要直接从属性窗口获取列列表，请单击“输出列表”属性右侧的省略号。这将在文本窗口中打开输出列表，你可以从中复制数据以供修改索引时使用（图\
  \ 12-7）。\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig7_HTML.jpg](img/323849_5_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7：非聚集索引中不可用的必需列\n\n使用该方法确实可以检索数据，但如图 12-6 和 12-7 之间信息的比较所示，如果你深入研究属性，可以获得更多信息。\n\
  \n## 解决查找问题\n\n由于查找操作的相对成本可能很高，你应该尽可能尝试消除查找操作。在上一节中，你需要在不从索引行导航到数据行的情况下获取 `JobTitle`\
  \ 和 `HireDate` 列的值。你可以通过以下三种不同的方式来实现，将在接下来的章节中进行解释。\n\n\n\n### 使用聚簇索引\n\n对于聚簇索引，索引的叶子页与表的数据页相同。因此，在读取聚簇索引键列的值时，数据库引擎无需从索引行进行任何导航即可同时读取其他列的值。在前面的例子中，如果你将特定行的非聚簇索引转换为聚簇索引，SQL\
  \ Server 可以从同一页检索所有列的值。\n\n简单地说你想将非聚簇索引转换为聚簇索引是很容易做到的。然而，在这种情况下，以及你可能遇到的大多数情况下，这是无法做到的，因为表已经存在一个聚簇索引。该表上的聚簇索引恰好也是主键。你将不得不删除所有外键约束，删除主键并重新创建为非聚簇索引，然后重新创建针对\
  \ `NationalIDNumber` 的索引。你不仅需要考虑所涉及的工作量，还可能会严重影响依赖于现有聚簇索引的其他查询。\n\n**注意**\n\n请记住，一个表只能有一个聚簇索引。\n\
  \n### 使用覆盖索引\n\n在第 8 章中，你了解到覆盖索引对于查询来说就像一个伪聚簇索引，因为它可以无需借助表数据即可返回结果。因此，你也可以使用覆盖索引来避免查找。\n\
  \n要了解如何使用覆盖索引来避免查找，请再次检查针对 `HumanResources.Employee` 表的查询。\n\n```sql\nSELECT  NationalIDNumber,\n\
  \        JobTitle,\n        HireDate\nFROM    HumanResources.Employee AS e\nWHERE\
  \   e.NationalIDNumber = '693168613';\n```\n\n为了避免此书签查找，你可以将查询中引用的列 `JobTitle` 和\
  \ `HireDate` 直接添加到非聚簇索引键中。这将使该非聚簇索引成为此查询的覆盖索引，因为所有列都可以从索引中检索，而无需访问堆或聚簇索引。\n\n```sql\n\
  CREATE UNIQUE NONCLUSTERED INDEX AK_Employee_NationalIDNumber\nON HumanResources.Employee\n\
  (\n    NationalIDNumber ASC,\n    JobTitle ASC,\n    HireDate ASC\n)\nWITH DROP_EXISTING;\n\
  ```\n\n现在，当查询运行时，你将看到以下指标和不同的执行计划（图 12-8）：\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig8_HTML.jpg](img/323849_5_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8：使用覆盖索引的执行计划\n\n```text\n持续时间：164mc\n读取次数：2\n```\n\n然而，通过更改键来创建覆盖索引有几个注意事项。如果你向非聚簇索引添加太多列，它会变得过宽。如第\
  \ 8 章所讨论的，与操作查询相关的索引维护成本可能会增加。因此，需要仔细评估添加键值是否会为索引的常规使用带来好处。如果某个键值不会用于索引内的搜索，那么将其添加到键中就没有意义。同时评估要添加到非聚簇索引键中的列数（考虑大小和数据类型）。如果附加列的总宽度不是太大（最好通过测试和测量所得索引大小来确定），那么这些列可以添加到非聚簇索引键中，用作覆盖索引。此外，如果你向索引键添加列，当然取决于索引，可能会对其他查询产生负面影响。它们可能期望以特定顺序看到索引键列，或者可能不引用键中的某些列，导致优化器不使用该索引。仅当根据这些评估有意义时才通过添加键来修改索引，尤其是因为你有替代方案来修改键。\n\
  \n另一种实现覆盖索引而无需通过添加键列来重塑索引的方法是使用 `INCLUDE` 列。将索引修改为如下所示：\n\n```sql\nCREATE UNIQUE\
  \ NONCLUSTERED INDEX AK_Employee_NationalIDNumber\nON HumanResources.Employee\n\
  (\n    NationalIDNumber ASC\n)\nINCLUDE\n(\n    JobTitle,\n    HireDate\n)\nWITH\
  \ DROP_EXISTING;\n```\n\n现在，当查询运行时，你将得到以下指标和执行计划（图 12-9）：\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig9_HTML.jpg](img/323849_5_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9：使用 INCLUDE 列的执行计划\n\n```text\n持续时间：152mc\n读取次数：2\n```\n\n在这种情况下，索引的大小只是稍微小一点，因为\
  \ `INCLUDE` 仅在叶子页上存储数据，而不是在每一页上。索引仍然是覆盖索引，与图 12-8 中显示的执行计划一样。因为数据存储在索引的叶子级别，所以当使用索引检索键值时，`INCLUDE`\
  \ 语句中的其余列可供使用，几乎就像它们是键的一部分一样。请参阅图 12-10。\n\n\n\n## 使用 INCLUDE 关键字\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig10_HTML.jpg](img/323849_5_En_12_Fig10_HTML.jpg)\n\
  **图 12-10**\n\n使用 `INCLUDE` 关键字的索引存储\n\n获取覆盖索引的另一种方法是利用 SQL Server 的内部结构。如果稍微修改前面的查询，使其不是检索特定的\
  \ `NationalIDNumber` 及其关联的 `JobTitle` 和 `HireDate`，而是检索不同的数据集合——这次查询以 `NationalIDNumber`\
  \ 作为备用键，并在一定值域范围内检索表的主键 `BusinessEntityID`。\n\n```sql\nSELECT  NationalIDNumber,\n\
  \        BusinessEntityID\nFROM    HumanResources.Employee AS e\nWHERE   e.NationalIDNumber\
  \ BETWEEN '693168613'\n                           AND     '7000000000';\n```\n\n\
  表上原有的索引（我们现在重新创建）以任何方式都没有引用 `BusinessEntityID` 列。\n\n```sql\nCREATE UNIQUE NONCLUSTERED\
  \ INDEX AK_Employee_NationalIDNumber\nON HumanResources.Employee\n(\n    NationalIDNumber\
  \ ASC\n)\nWITH DROP_EXISTING;\n```\n\n当针对表运行该查询时，你可以看到如图 12-11 所示的结果。\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig11_HTML.jpg](img/323849_5_En_12_Fig11_HTML.jpg)\n\
  **图 12-11**\n\n意外的覆盖索引\n\n优化器是如何基于提供的索引为这个查询得出覆盖索引的？它知道，在具有聚集索引的表上，聚集索引键（本例中是 `BusinessEntityID`\
  \ 列）作为指向非聚集索引中数据的指针被存储。这意味着任何在查询的过滤机制（`WHERE` 子句）或连接条件中包含聚集索引和非聚集索引中一组列的查询，都可以利用覆盖索引。\n\
  \n要查看这三个不同索引在存储中是如何体现的，你可以使用 `DBCC SHOWSTATISTICS` 查看索引本身的统计信息。当对索引运行以下查询时，你可以在图\
  \ 12-12 中看到输出：\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig12_HTML.jpg](img/323849_5_En_12_Fig12_HTML.jpg)\n\
  **图 12-12**\n\n原始索引的 `DBCC SHOW_STATISTICS` 输出\n\n```sql\nDBCC SHOW_STATISTICS('HumanResources.Employee',\
  \ AK_Employee_NationalIDNumber);\n```\n\n正如你在统计信息的密度图中看到的，`NationalIDNumber` 被首先列出。表的主键作为索引的一部分被包含，因此密度图中还包含一行包含\
  \ `BusinessEntityID` 列的信息。这使得键的平均长度约为 22 字节。这就是引用主键值以及索引键值的索引如何能够充当覆盖索引的原理。\n\n\
  如果你在第一个尝试的备用索引（所有三个列都包含在键中）上运行相同的 `DBCC SHOW_STATISTICS`，像这样，你将看到一组不同的统计信息（图 12-13）：\n\
  \n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig13_HTML.jpg](img/323849_5_En_12_Fig13_HTML.jpg)\n\
  **图 12-13**\n\n宽键覆盖索引的 `DBCC SHOW_STATISTICS` 输出\n\n```sql\nCREATE UNIQUE NONCLUSTERED\
  \ INDEX AK_Employee_NationalIDNumber\nON HumanResources.Employee\n(\n    NationalIDNumber\
  \ ASC,\n    JobTitle ASC,\n    HireDate ASC\n)\nWITH DROP_EXISTING;\n```\n\n你现在看到所有三个索引键列相加，最后是主键。宽度从\
  \ 22 字节增长到了 74 字节。这反映了 `JobTitle` 列（一个 `VARCHAR(50)`）以及 6 字节宽的 `datetime` 字段的增加。\n\
  \n最后，查看第二个备用索引（带有包含列）的统计信息，你将在图 12-14 中看到输出。\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig14_HTML.jpg](img/323849_5_En_12_Fig14_HTML.jpg)\n\
  **图 12-14**\n\n使用 `INCLUDE` 的覆盖索引的 `DBCC SHOW_STATISTICS` 输出\n\n```sql\nCREATE UNIQUE\
  \ NONCLUSTERED INDEX AK_Employee_NationalIDNumber\nON HumanResources.Employee\n\
  (\n    NationalIDNumber ASC\n)\nINCLUDE\n(\n    JobTitle,\n    HireDate\n)\nWITH\
  \ DROP_EXISTING;\n```\n\n现在键宽度恢复到原始大小，因为 `INCLUDE` 语句中的列不是与键一起存储，而是存储在索引的叶级别。\n\n\
  从存储的统计信息数据中还可以收集到更多有趣的信息，但我会在第 13 章中介绍。\n\n## 使用索引连接\n\n如果覆盖索引变得非常宽，那么你可能会考虑使用更窄的索引。如第\
  \ 9 章所述，如果情况正好合适，优化器可以在两个或多个索引之间使用索引交集来完全覆盖查询。由于索引连接需要访问多个索引，它必须对索引连接中使用的所有索引执行逻辑读取。因此，它比覆盖索引需要更高的逻辑读取次数。但是由于用于索引连接的多个窄索引可以比一个宽覆盖索引服务更多的查询（如第\
  \ 9 章所述），你当然可以使用多个窄索引来测试你的查询，看看是否能通过索引连接避免查找操作。\n\n\n\n### 注意\n\n虽然可以通过索引连接（index\
  \ join）来提升性能，但有时让优化器识别它可能有一定难度。您确实需要准确的统计信息来辅助优化器做出这一选择。\n\n为了更好地理解如何使用索引连接来避免查找（lookup），可以对\
  \ `PurchaseOrderHeader` 表执行以下查询，以检索特定供应商在特定日期的 `PurchaseOrderID`：\n\n```sql\nSELECT\
  \ poh.PurchaseOrderID,\n       poh.VendorID,\n       poh.OrderDate\nFROM Purchasing.PurchaseOrderHeader\
  \ AS poh\nWHERE VendorID = 1636\n  AND poh.OrderDate = '2014/6/24';\n```\n\n执行此查询会导致一个“键查找（Key\
  \ Lookup）”操作（参见图 12-15）和以下 I/O 统计：\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig15_HTML.jpg](img/323849_5_En_12_Fig15_HTML.jpg)\n\
  \n图 12-15\n一个键查找操作\n\n```plaintext\n持续时间: 251 mc\n读取次数: 10\n```\n\n发生查找的原因是，`SELECT`\
  \ 语句和 `WHERE` 子句引用的所有列并未全部包含在 `VendorID` 列上的非聚集索引中。尽管如此，使用非聚集索引仍然比不使用它要好，因为不使用它将需要对表进行扫描（在此情况下是聚集索引扫描），导致更多的逻辑读取。\n\
  \n要避免查找，可以考虑在 `OrderDate` 列上创建一个覆盖索引（covering index），如前一节所述。但除了覆盖索引方案，您还可以考虑使用索引连接。如您所知，索引连接需要比覆盖索引更窄的索引，从而提供以下两个好处：\n\
  \n*   多个窄索引可以服务于比宽覆盖索引更多的查询。\n*   窄索引比宽覆盖索引需要更少的维护开销。\n\n要使用索引连接来避免查找，请在 `OrderDate`\
  \ 列上创建一个新的、窄的非聚集索引（该列未包含在现有的非聚集索引中）。\n\n```sql\nCREATE NONCLUSTERED INDEX IX_TEST\n\
  ON Purchasing.PurchaseOrderHeader\n(\n    OrderDate\n);\n```\n\n如果再次运行 `SELECT`\
  \ 语句，将返回以下输出以及图 12-16 所示的执行计划：\n\n![../images/323849_5_En_12_Chapter/323849_5_En_12_Fig16_HTML.jpg](img/323849_5_En_12_Fig16_HTML.jpg)\n\
  \n图 12-16\n无查找操作的执行计划\n\n```plaintext\n持续时间: 219 mc\n读取次数: 4\n```\n\n从前面的执行计划可以看出，优化器使用了\
  \ `VendorlD` 列上的非聚集索引 `IX_PurchaseOrder_VendorID` 和 `OrderlD` 列上的新非聚集索引 `IX_TEST`\
  \ 来完全满足查询，而无需访问数据的其余存储位置。这种索引连接操作避免了查找，从而将逻辑读取次数从 10 次减少到 4 次。\n\n诚然，在 `VendorlD`\
  \ 和 `OrderlD` 列上创建覆盖索引可以进一步减少逻辑读取次数。但覆盖索引并非总是可行，因为它们可能很宽，并带来相关的开销。在这种情况下，索引连接可以是一个很好的替代方案。\n\
  \n## 小结\n\n正如本章所演示的，与非聚集索引相关的查找步骤可能使得通过非聚集索引检索数据代价高昂。SQL Server 优化器在生成执行计划时会考虑到这一点，如果它发现使用非聚集索引的开销成本过高，就会放弃该索引并执行表扫描（或者，如果表存储为聚集索引，则执行聚集索引扫描）。因此，要提高非聚集索引的有效性，分析查找产生的原因，并考虑是否可以通过向索引键或\
  \ `INCLUDE` 列添加字段（或使用索引连接）来创建覆盖索引以完全避免查找，是明智的做法。\n\n至此，您已经专注于索引技术，并假定 SQL Server\
  \ 优化器能够确定索引对查询的有效性。在下一章中，您将看到统计信息在帮助优化器确定索引有效性方面的重要性。\n\n"
- "# 13. 统计信息、数据分布与基数\n\n至此，您应该已经很好地理解了索引的重要性。然而，优化器并非仅凭索引来决定如何访问数据。它还利用强制的引用约束和其他表结构。最后，也可能是最重要的一点，优化器必须拥有定义索引或列的数据信息。该信息被称为*统计信息*。统计信息定义了数据的分布以及数据的唯一性或选择性。系统会在索引和列上维护统计信息。您甚至可以手动定义统计信息。\n\
  \n在本章中，您将了解统计信息在查询优化中的重要性。具体来说，我将涵盖以下主题：\n\n*   统计信息在查询优化中的作用\n*   索引列上统计信息的重要性\n\
  *   连接和过滤条件中使用的未索引列上统计信息的重要性\n*   单列和多列统计信息的分析，包括计算用于索引的列的选择性\n*   统计信息维护\n*   有效评估查询执行中使用的统计信息\n\
  \n## 统计信息在查询优化中的作用\n\nSQL Server 的查询优化器是一个基于成本的优化器；它通过识别选择性（数据的唯一程度）以及用于过滤数据的列（即通过\
  \ `WHERE`、`HAVING` 或 `JOIN` 子句）来决定最佳的数据访问机制和连接策略。统计信息会随索引自动创建，但也存在于用作谓词一部分的未索引列上。正如您在第\
  \ 7 章中学到的，非聚集索引是检索被索引覆盖的数据的绝佳方式，而对于需要索引键之外列的查询，聚集索引可能效果更好。对于大型结果集，直接访问聚集索引或表通常更有益。\n\
  \n有关作为谓词引用的列中数据分布的最新信息，有助于优化器决定要使用的查询策略。在 SQL Server 中，这些信息以统计信息的形式维护，对于基于成本的优化器创建有效的查询执行计划至关重要。通过统计信息，优化器可以相当准确地估计返回结果集或中间结果集所需的时间，从而确定最有效的操作来高效地检索或修改\
  \ T-SQL 语句定义的数据。只要确保数据库的默认统计信息设置正确，优化器就能尽其所能地动态确定有效的处理策略。此外，在排查性能问题时，作为一项安全措施，您应确保自动统计信息维护例程按预期工作。在必要时，您甚至可能需要手动控制统计信息的创建和/或维护。（我将在“手动维护”一节中介绍这一点，并在“分析统计信息”一节中介绍统计信息的确切性质和形态。）在下一节中，我将向您展示为什么统计信息对于作为谓词的索引列和未索引列都很重要。\n\
  \n\n\n### 索引列的统计信息\n\n索引的可用性在很大程度上取决于索引列的统计信息；没有统计信息，SQL Server 基于成本的查询优化器无法决定使用索引的最有效方式。为满足此要求，SQL\
  \ Server 在创建索引时会自动创建索引键的统计信息。无法关闭此功能。这适用于行存储索引和列存储索引。\n\n随着数据变化，保持低查询成本所需的数据检索机制也可能发生变化。例如，如果表中某个列值只有一个匹配行，那么通过该列的非聚集索引检索匹配行是有意义的。但如果表中的数据发生变化，添加了大量具有相同列值的行，那么使用非聚集索引可能就不再有意义。为了使\
  \ SQL Server 能够随着时间的推移在数据变化时决定处理策略的这种变更，拥有最新的统计信息至关重要。\n\nSQL Server 可以在索引列内容被修改时，保持索引上的统计信息更新。默认情况下，此功能是开启的，并且可以通过数据库的“属性”➤“选项”➤“自动更新统计信息”设置进行配置。更新统计信息会消耗额外的\
  \ CPU 周期和相关的 I/O。为了优化更新过程，SQL Server 使用了“自动维护”部分详述的一种高效算法。\n\n这种内置的智能特性使每个进程的 CPU\
  \ 利用率保持在较低水平。也可以异步更新统计信息。这意味着当一个查询通常会触发统计信息更新时，该查询会使用旧的统计信息继续执行，而统计信息则在后台异步更新。当数据库很大或超时期限很短时，这可以加快某些查询的响应时间。如果统计信息的变化足以导致执行计划发生根本性改变，这也可能会降低性能。\n\
  \n你可以使用 `ALTER DATABASE` 命令手动禁用（或启用）“自动更新统计信息”和“异步自动更新统计信息”功能。默认情况下，“自动更新统计信息”功能和“自动创建”功能是启用的，强烈建议保持启用。“异步自动更新统计信息”功能默认是禁用的。只有在你确定它有助于解决由统计信息更新引起的超时或等待问题时，才开启此功能。\n\
  \n### 注意\n\n我将在本章后面的“手动维护”部分解释 `ALTER DATABASE`。\n\n### 更新统计信息的好处\n\n对于大多数系统而言，执行自动更新的好处通常大于其对系统资源的成本。如果你有大表（我指的是单表达到数百\
  \ GB），你可能处于自动更新统计信息益处较小的情况。在这种情况下，你可能想尝试使用通过跟踪标志 2371 提供的滑动标尺，或者你可能处于自动统计信息维护效果不佳的情况。然而，这是一个极端的边缘情况，即使在这里，你可能也会发现自动更新统计信息并不会对你的系统产生负面影响。\n\
  \n为了更直接地控制数据行为，本系列示例将不再使用 AdventureWorks2017 中的表，而是手动创建一个。具体来说，创建一个只有三行和一个非聚集索引的测试表。\n\
  \n```sql\nDROP TABLE IF EXISTS dbo.Test1;\nGO\nCREATE TABLE dbo.Test1 (C1 INT,\n\
  C2 INT IDENTITY);\nSELECT TOP 1500\nIDENTITY(INT, 1, 1) AS n\nINTO #Nums\nFROM master.dbo.syscolumns\
  \ AS sC1,\nmaster.dbo.syscolumns AS sC2;\nINSERT INTO dbo.Test1 (C1)\nSELECT n\n\
  FROM #Nums;\nDROP TABLE #Nums;\nCREATE NONCLUSTERED INDEX i1 ON dbo.Test1 (C1);\n\
  ```\n\n如果你在索引列上执行带有选择性过滤条件的 `SELECT` 语句以仅检索一行，如下面的代码行所示，那么优化器将使用非聚集索引查找，如图 13-1\
  \ 所示的执行计划：\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig1_HTML.jpg](img/323849_5_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1**\n小结果集的执行计划\n\n```sql\nSELECT *\nFROM dbo.Test1\nWHERE C1 = 2;\n```\n\
  \n为了理解小型数据修改对统计信息更新的影响，使用扩展事件创建一个会话。在会话中，添加捕获统计信息更新和创建事件的 `auto_stats` 事件，并添加 `sql_batch_completed`。以下是创建和启动扩展事件会话的脚本：\n\
  \n```sql\nCREATE EVENT SESSION [Statistics]\nON SERVER\nADD EVENT sqlserver.auto_stats\n\
  (ACTION (sqlserver.sql_text)\nWHERE (sqlserver.database_name = N'AdventureWorks2017')),\n\
  ADD EVENT sqlserver.sql_batch_completed\n(WHERE (sqlserver.database_name = N'AdventureWorks2017'));\n\
  GO\nALTER EVENT SESSION [Statistics] ON SERVER STATE = START;\nGO\n```\n\n仅向表中添加一行。\n\
  \n```sql\nINSERT  INTO dbo.Test1\n(C1)\nVALUES  (2);\n```\n\n当你重新执行前面的 `SELECT`\
  \ 语句时，会得到与图 13-1 所示相同的执行计划。图 13-2 显示了由 `SELECT` 查询生成的事件。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig2_HTML.jpg](img/323849_5_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2**\n添加少量行后的会话输出\n\n会话输出不包含任何表示统计信息更新的活动，因为变化数量低于阈值——对于超过 500 行的表，必须有 20%\
  \ 的行被添加、修改或删除，或者，根据较新的行为，变化量未达到足够的比例。\n\n为了理解大型数据修改对统计信息更新的影响，向表中添加 1,500 行。\n\n\
  ```sql\nSELECT TOP 1500\nIDENTITY(INT, 1, 1) AS n\nINTO #Nums\nFROM master.dbo.syscolumns\
  \ AS scl,\nmaster.dbo.syscolumns AS sC2;\nINSERT INTO dbo.Test1 (C1)\nSELECT 2\n\
  FROM #Nums;\nDROP TABLE #Nums;\n```\n\n现在，如果你像下面这样重新执行 `SELECT` 语句，将检索到一个大的结果集（3,001\
  \ 行中的 1,502 行）：\n\n```sql\nSELECT  *\nFROM    dbo.Test1\nWHERE   C1 = 2;\n```\n\n\
  \n\n由于请求的是大型结果集，直接扫描基表比通过非聚集索引访问基表 1,502 次更为可取。直接访问基表将避免与该非聚集索引相关联的书签查找开销。这体现在最终的执行计划中（见图\
  \ 13-3）。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig3_HTML.jpg](img/323849_5_En_13_Fig3_HTML.jpg)\n\
  *图 13-3：大型结果集的执行计划*\n\n图 13-4 显示了最终的会话输出。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig4_HTML.jpg](img/323849_5_En_13_Fig4_HTML.jpg)\n\
  *图 13-4：添加大量行后的会话输出*\n\n由于此次大规模更新超过了阈值，会话输出中包含了多个`auto_stats`事件。你可以通过查看详细信息来判断每个事件正在做什么。图\
  \ 13-4 显示了`job_type`值，在本例中为`StatsUpdate`。你还会看到`statistics_list`列中列出了正在更新的统计信息。另一个值得关注的点是“状态”列，它可以告诉你更多关于统计信息更新过程中哪个部分正在发生的信息，在本例中是“Loading\
  \ and update stats”。图 13-4 中可见的第二个`auto_stats`事件显示`statistics_list`值为“Updated: dbo.Test1.i1”，表明更新过程已完成。然后你可以看到紧接着该`auto_stats`事件之后，查询本身的`sql_batch_completed`事件。这些活动消耗了一些额外的\
  \ CPU 周期来使统计信息保持最新。然而，通过这样做，优化器确定了一个更好的数据处理策略，并保持了查询的总体成本较低。由此产生的向更高效执行计划的转变，即图\
  \ 13-3 中的`Table Scan`操作，就是为什么自动更新统计信息如此理想的原因。这也说明了异步更新统计信息可能会潜在地导致问题，因为查询本将使用旧的、效率较低的执行计划执行。\n\
  \n## 过时统计信息的缺点\n\n如前一节所述，自动更新统计信息功能允许优化器随着数据的变化为查询决定高效的处理策略。然而，如果统计信息变得过时，那么优化器决定的处理策略可能不适用于当前的数据集，从而会降低性能。\n\
  \n要理解拥有过时统计信息的有害影响，请按照以下步骤操作：\n\n1.  仅使用 1,500 行重新创建前面的测试表以及相应的非聚集索引。\n\n2.  防止\
  \ SQL Server 在数据更改时自动更新统计信息。为此，通过执行以下 SQL 语句禁用自动更新统计信息功能：\n    ```\n    ALTER DATABASE\
  \ AdventureWorks2017 SET AUTO_UPDATE_STATISTICS OFF;\n    ```\n\n3.  像之前一样向表中添加\
  \ 1,500 行。\n\n现在，重新执行`SELECT`语句以了解过时统计信息对查询优化器的影响。为清晰起见，该查询在此重复：\n```\nSELECT *\n\
  FROM dbo.Test1\nWHERE C1 = 2;\n```\n\n图 13-5 和图 13-6 分别显示了此查询的最终执行计划和会话输出。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig6_HTML.jpg](img/323849_5_En_13_Fig6_HTML.jpg)\n\
  *图 13-6：AUTO_UPDATE_STATISTICS OFF 时的会话输出详情*\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig5_HTML.jpg](img/323849_5_En_13_Fig5_HTML.jpg)\n\
  *图 13-5：AUTO_UPDATE_STATISTICS OFF 时的执行计划*\n\n在自动更新统计信息功能关闭的情况下，查询优化器选择了与开启此功能时不同的执行计划。基于过时的统计信息（其中过滤条件`C1\
  \ = 2`只有一行），优化器决定使用非聚集索引查找。优化器无法根据列中当前的数据分布做出决策。出于性能考虑，由于请求的是大型结果集（3,000 行中的 1,501\
  \ 行），直接访问基表而不是通过非聚集索引会更好。\n\n通过比较此查询在更新和未更新统计信息情况下的成本，你可以看到关闭自动更新统计信息功能对性能有负面影响。表\
  \ 13-1 显示了此查询成本的差异。\n\n*表 13-1：统计信息更新与未更新时的查询成本*\n\n| 统计信息更新状态 | 图例 | 持续时间（毫秒） |\
  \ 读取次数 |\n| :--- | :--- | :--- | :--- |\n| 已更新 | 图 13-4 | 171 | 9 |\n| 未更新 | 图 13-6\
  \ | 678 | 1510 |\n\n当统计信息过时时，即使返回的数据完全相同且查询完全一致，读取次数和持续时间也显著更高。因此，建议你保持自动更新统计信息功能开启。保持统计信息更新的好处通常超过执行更新的成本。在结束本节之前，请将`AUTO_UPDATE_STATISTICS`重新打开（尽管你也可以选择手动更新统计信息）。\n\
  ```\nALTER DATABASE AdventureWorks2017 SET AUTO_UPDATE_STATISTICS ON;\n```\n\n##\
  \ 非索引列上的统计信息\n\n有时，你可能在连接或过滤条件中拥有没有任何索引的列。即使对于此类非索引列，如果查询优化器知道这些列的基数和数据分布（即*统计信息*），它也更有可能做出更好的选择。基数是集合中的对象数量，在本例中是行数。数据分布是指我们正在处理的数据整体集的唯一性程度。\n\
  \n除了索引上的统计信息外，SQL Server 还可以在没有索引的列上构建统计信息。有关数据分布的信息，或者说某个特定值出现在非索引列中的可能性，可以帮助查询优化器确定最优的处理策略。即使它无法使用索引实际定位值，这对查询优化器也有益。如果\
  \ SQL Server 认为这些信息对于创建更好的计划有价值（通常在列用于谓词中时），它会自动在非索引列上构建统计信息。默认情况下，此功能是开启的，并且可以通过数据库的属性\
  \ ➤ 选项 ➤ 自动创建统计信息设置进行配置。你可以使用`ALTER DATABASE`命令以编程方式覆盖此设置。但是，为了获得更好的性能，强烈建议你保持此功能开启。\n\
  \n你可能考虑禁用此功能的场景之一是在执行一系列你永远不会再执行的即席 T-SQL 活动时。另一种情况是当你确定一个静态、稳定但可能不够充分的统计信息集比最佳可能的统计信息集效果更好，但它们可能由于数据分布的变化而导致性能不均匀。即使在这种情况下，你也应该测试一下，在这种特定情况下支付自动创建统计信息的成本以获得更好的计划，是否比影响其他\
  \ SQL Server 活动的性能更划算。对于大多数系统，你应该保持此功能开启，除非你看到统计信息创建明显导致性能问题的证据，否则无需担心。\n\n\n\n\
  ### 在非索引列上统计信息的优势\n\n要理解对没有索引的列拥有统计信息的好处，可以创建两个数据分布不均的测试表，如下面的代码所示。两个表都包含 10,001\
  \ 行。表 `Test1` 只有一行，其第二列 (`Test1_C2`) 的值等于 1，而其余 10,000 行中，该列的值均为 2。表 `Test2` 的数据分布则恰好相反。\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.Test1')) IS NOT NULL\nDROP TABLE dbo.Test1;\n\
  GO\nCREATE TABLE dbo.Test1 (Test1_C1 INT IDENTITY,\nTest1_C2 INT);\nINSERT INTO\
  \ dbo.Test1 (Test1_C2)\nVALUES (1);\nSELECT TOP 10000\nIDENTITY(INT, 1, 1) AS n\n\
  INTO #Nums\nFROM master.dbo.syscolumns AS scl,\nmaster.dbo.syscolumns AS sC2;\n\
  INSERT INTO dbo.Test1 (Test1_C2)\nSELECT 2\nFROM #Nums\nGO\nCREATE CLUSTERED INDEX\
  \ i1 ON dbo.Test1 (Test1_C1)\n--创建第二个包含 10001 行的表，但数据分布相反\nIF (SELECT OBJECT_ID('dbo.Test2'))\
  \ IS NOT NULL\nDROP TABLE dbo.Test2;\nGO\nCREATE TABLE dbo.Test2 (Test2_C1 INT IDENTITY,\n\
  Test2_C2 INT);\nINSERT INTO dbo.Test2 (Test2_C2)\nVALUES (2);\nINSERT INTO dbo.Test2\
  \ (Test2_C2)\nSELECT 1\nFROM #Nums;\nDROP TABLE #Nums;\nGO\nCREATE CLUSTERED INDEX\
  \ il ON dbo.Test2 (Test2_C1);\n```\n\n表 13-2 展示了这些表的样子。\n\n**表 13-2** 示例表\n\n| |\
  \ 表 Test1 | 表 Test2 |\n| --- | --- | --- |\n| **列** | `Test1_c1` | `Test1_C2` |\
  \ `Test2_c1` | `Test2_C2` |\n| `Row1` | 1 | 1 | 1 | 2 |\n| `Row2` | 2 | 2 | 2 |\
  \ 1 |\n| `RowN` | N | 2 | N | 1 |\n| `Rowl000l` | 10001 | 2 | 10001 | 1 |\n\n要理解在非索引列上拥有统计信息的重要性，请使用自动创建统计信息功能的默认设置。默认情况下，此功能是开启的。你可以使用\
  \ `DATABASEPROPERTYEX` 函数来验证这一点（尽管你也可以查询 `sys.databases` 视图）。\n\n```sql\nSELECT\
  \ DATABASEPROPERTYEX('AdventureWorks2017',\n'IsAutoCreateStatistics');\n```\n\n\
  ### 注意\n\n本章稍后将详细介绍如何配置自动创建统计信息功能。\n\n使用以下 `SELECT` 语句从表 `Test1` 访问大型结果集，从表 `Test2`\
  \ 访问小型结果集。表 `Test1` 有 10,000 行的 `Test1_C2 = 2`，而表 `Test2` 只有 1 行的 `Test2_C2 = 2`。请注意，这些用于连接和筛选条件中的列在任何一个表上都没有索引。\n\
  \n```sql\nSELECT t1.Test1_C2,\nt2.Test2_C2\nFROM dbo.Test1 AS t1\nJOIN dbo.Test2\
  \ AS t2\nON t1.Test1_C2 = t2.Test2_C2\nWHERE t1.Test1_C2 = 2;\n```\n\n图 13-7 显示了此查询的实际执行计划。\n\
  \n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig7_HTML.jpg](img/323849_5_En_13_Fig7_HTML.jpg)\n\
  \n**图 13-7** `AUTO_CREATE_STATISTICS` 开启时的执行计划\n\n图 13-8 显示了由此查询引发的 `auto_stats`\
  \ 事件的会话输出。你可以使用它来评估给定查询的一些额外开销。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig8_HTML.jpg](img/323849_5_En_13_Fig8_HTML.jpg)\n\
  \n**图 13-8** `AUTO_CREATE_STATISTICS` 开启时的扩展事件会话输出\n\n图 13-8 中显示的会话输出包括四个 `auto_stats`\
  \ 事件，它们在 `JOIN` 和 `WHERE` 子句中引用的非索引列 `Test2_C2` 和 `Test1_C2` 上创建统计信息，然后加载这些统计信息以供优化器内部使用。此活动消耗了额外的少量\
  \ CPU 周期（因为无法检测到统计信息），并花费了大约 20,000 微秒 (mc)，即 20 毫秒。然而，通过消耗这些额外的 CPU 周期，优化器决定采用更好的处理策略，以保持查询的整体成本较低。\n\
  \n要验证 SQL Server 在每个表的非索引列上自动创建的统计信息，可以针对 `sys.stats` 表运行此 `SELECT` 语句。\n\n```sql\n\
  SELECT s.name,\ns.auto_created,\ns.user_created\nFROM sys.stats AS s\nWHERE object_id\
  \ = OBJECT_ID('Test1');\n```\n\n图 13-9 显示了为表 `Test1` 自动创建的统计信息。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig9_HTML.jpg](img/323849_5_En_13_Fig9_HTML.jpg)\n\
  \n**图 13-9** 表 `Test1` 的自动统计信息\n\n名为 `_WA_SYS*` 的统计信息是系统生成的列统计信息。这可以通过统计信息的名称以及\
  \ `auto_created` 值来判断，此例中该值为 1，而索引 `i1` 的该值为 0。这很有趣，因为为索引创建的统计信息也是自动创建的，但它们不被视为\
  \ `AUTO_CREATE_STATISTICS` 过程的一部分，因为索引上的统计信息始终会被创建。\n\n要验证来自两个表的不同结果集大小如何影响查询优化器的决策，修改查询的筛选条件，以便从两个表中访问相反的结果集大小（`Test1`\
  \ 为小，`Test2` 为大）。将筛选条件从 `Test1.Test1_C2 = 2` 改为筛选 1。\n\n```sql\nSELECT t1.Test1_C2,\n\
  t2.Test2_C2\nFROM dbo.Test1 AS t1\nJOIN dbo.Test2 AS t2\nON t1.Test1_C2 = t2.Test2_C2\n\
  WHERE t1.Test1_C2 = 1;\n```\n\n图 13-10 显示了生成的执行计划，图 13-11 显示了此查询的扩展事件会话输出。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig11_HTML.jpg](img/323849_5_En_13_Fig11_HTML.jpg)\n\
  \n**图 13-11** 不同结果集的扩展事件输出\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig10_HTML.jpg](img/323849_5_En_13_Fig10_HTML.jpg)\n\
  \n**图 13-10** 不同结果集的执行计划\n\n\n\n"
- "# SQL Server 非索引列统计信息的作用与影响\n\n生成的会话输出没有执行任何额外的 SQL 活动来管理统计信息。非索引列（`Test1.Test1_C2`\
  \ 和 `Test2.Test2_C2`）上的统计信息在创建索引本身时就已创建，并随着数据的变更而更新。\n\n为了实现有效的成本优化，查询优化器在每种情况下都选择了不同的处理策略，这取决于非索引列（`Test1.Test1_C2`\
  \ 和 `Test2.Test2_C2`）上的统计信息。你可以从之前的两个执行计划中看到这一点。在第一个计划中，表 `Test1Test1` 是嵌套循环连接的外表；而在最新的计划中，表\
  \ `Test2` 是外表。通过在非索引列（`Test1.Test1_C2` 和 `Test2.Test2_C2`）上拥有统计信息，查询优化器可以为每种情况创建一个经济高效的执行计划。\n\
  \n一个更好的解决方案是在该列上创建索引。这不仅会创建该列的统计信息，还能通过 `Index Seek` 操作快速检索数据，尤其是在检索的结果集较小时。然而，对于那些查询在\
  \ `WHERE` 子句中引用了非索引列的数据库应用程序，保持自动创建统计信息功能开启仍然允许优化器根据列中现有的数据分布确定最佳的处理策略。\n\n如果你想了解某个统计信息覆盖了哪个（或哪些）列，需要查看\
  \ `sys.stats_columns` 系统表。你可以像查询 `sys.stats` 表一样查询它。\n\n```sql\nSELECT  *\nFROM\
  \    sys.stats_columns\nWHERE   object_id = OBJECT_ID('Test1');\n```\n\n这将显示由自动创建的统计信息所引用的列。如果你决定需要创建索引来替代这些统计信息，这些信息可以提供帮助，因为你需要知道在哪些列上创建索引。这里列出的列是表中列的序号位置。要查看列名，你需要修改查询。\n\
  \n```sql\nSELECT c.name,\nsc.object_id,\nsc.stats_column_id,\nsc.stats_id\nFROM\
  \ sys.stats_columns AS sc\nJOIN sys.columns AS c\nON c.object_id = sc.object_id\n\
  AND c.column_id = sc.column_id\nWHERE sc.object_id = OBJECT_ID('Test1');\n```\n\n\
  ### 非索引列缺少统计信息的弊端\n\n要理解非索引列上没有统计信息的有害影响，请按照以下步骤删除 SQL Server 自动创建的统计信息，并阻止 SQL\
  \ Server 在没有索引的列上自动创建统计信息：\n\n1.  使用以下 SQL 命令删除列 `Test1.Test1_C2` 上自动创建的统计信息，将系统自动赋予的统计信息名称替换以下语句中的\
  \ `StatisticsName`：\n    ```sql\n    DROP STATISTICS [Test1].StatisticsName;\n \
  \   ```\n\n2.  同样地，删除列 `Test2.Test2_C2` 上对应的统计信息。\n\n3.  通过取消选中相应数据库的“自动创建统计信息”复选框，或执行以下\
  \ SQL 命令，禁用自动创建统计信息功能：\n    ```sql\n    ALTER DATABASE AdventureWorks2017 SET AUTO_CREATE_STATISTICS\
  \ OFF;\n    ```\n\n现在重新执行 `SELECT` 语句 `--nonindexed_select`。\n\n```sql\nSELECT \
  \ Test1.Test1_C2,\n        Test2.Test2_C2\nFROM    dbo.Test1\nJOIN    dbo.Test2\n\
  \        ON Test1.Test1_C2 = Test2.Test2_C2\nWHERE   Test1.Test1_C2 = 2;\n```\n\n\
  图 13-12 和 图 13-13 分别显示了生成的执行计划和扩展事件输出。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig13_HTML.jpg](img/323849_5_En_13_Fig13_HTML.jpg)\n\
  \n图 13-13：`AUTO_CREATE_STATISTICS OFF` 时的跟踪输出\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig12_HTML.jpg](img/323849_5_En_13_Fig12_HTML.jpg)\n\
  \n图 13-12：`AUTO_CREATE_STATISTICS OFF` 时的执行计划\n\n当自动创建统计信息功能关闭时，查询优化器选择的执行计划与开启该功能时选择的计划不同。在未找到相关列上的统计信息后，优化器选择\
  \ `FROM` 子句中的第一个表（`Test1`）作为嵌套循环连接操作的外表。优化器无法根据列中实际的数据分布做出决策。你可以在执行计划中看到警告（一个感叹号），它指示在数据访问运算符（聚集索引扫描）上缺少统计信息。如果你修改查询，将表\
  \ `Test2` 引用为 `FROM` 子句中的第一个表，那么优化器会选择表 `Test2` 作为嵌套循环连接操作的外表。图 13-14 显示了执行计划。\n\
  \n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig14_HTML.jpg](img/323849_5_En_13_Fig14_HTML.jpg)\n\
  \n图 13-14：`AUTO_CREATE_STATISTICS OFF` 时的执行计划（一个变体）\n\n```sql\nSELECT  Test1.Test1_C2,\n\
  \        Test2.Test2_C2\nFROM    dbo.Test2\nJOIN    dbo.Test1\n        ON Test1.Test1_C2\
  \ = Test2.Test2_C2\nWHERE   Test1.Test1_C2 = 2;\n```\n\n通过比较有和没有非索引列统计信息时此查询的成本，你可以看到关闭自动创建统计信息功能会对性能产生负面影响。表\
  \ 13-3 显示了此查询在有无统计信息情况下的成本差异。\n\n表 13-3：有统计信息与无统计信息的非索引列上的查询成本比较\n\n| 非索引列上的统计信息\
  \ | 图号 | 成本 |   |\n| :--- | :--- | :--- | :--- |\n|   |   | 平均持续时间（毫秒） | 读取次数 |\n\
  | 有统计信息 | 图 13-11 | 98 | 48 |\n| 无统计信息 | 图 13-13 | 262 | 20273 |\n\n当非索引列上没有统计信息时，逻辑读取次数和\
  \ CPU 利用率更高。没有这些统计信息，优化器无法创建经济高效的执行计划，因为它实际上必须通过一组内置的启发式计算来猜测选择性。\n\n查询执行计划通过在原本会使用统计信息的运算符上放置一个感叹号来突出显示缺少的统计信息。你可以在之前的执行计划（图\
  \ 13-12 和 图 13-14）中的聚集索引扫描运算符上看到这一点，也可以在图形执行计划节点的属性“警告”部分的详细描述中看到，如图 13-15 中表 `Test1`\
  \ 的示例所示。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig15_HTML.jpg](img/323849_5_En_13_Fig15_HTML.jpg)\n\
  \n图 13-15：图形计划中的缺少统计信息指示\n\n\n### 注意事项\n\n在数据库应用程序中，使用没有索引的列进行查询的可能性总是存在的。因此，在大多数系统中，出于性能考虑，强烈建议保持\
  \ SQL Server 数据库的自动创建统计信息功能处于开启状态。\n\n你可以查询缓存中的执行计划，以识别那些可能存在统计信息缺失的计划。\n\n```sql\n\
  SELECT dest.text AS query,\ndeqs.execution_count,\ndeqp.query_plan\nFROM sys.dm_exec_query_stats\
  \ AS deqs\nCROSS APPLY sys.dm_exec_text_query_plan(deqs.plan_handle,\ndeqs.statement_start_offset,\n\
  deqs.statement_end_offset) AS detqp\nCROSS APPLY sys.dm_exec_query_plan(deqs.plan_handle)\
  \ AS deqp\nCROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS dest\nWHERE detqp.query_plan\
  \ LIKE '%ColumnsWithNoStatistics%';\n```\n\n这个查询稍微有些取巧。我在 `LIKE` 运算符的变量两侧都使用了通配符，这实际上是一个常见的代码问题（在第\
  \ 20 章有更详细的讨论），但在这种情况下，另一种选择是运行 XQuery，这需要加载 XML 解析器。根据系统可用内存量的不同，这种通配符搜索方法可能比直接查询执行计划的\
  \ XML 要快得多。查询调优不仅仅是使用单一方法，而是要理解所有这些方法如何协同工作。\n\n如果你处于需要禁用自动创建统计信息的情况，你可能仍然希望追踪统计信息在哪些地方可能对你的查询有用。你可以使用扩展事件\
  \ `missing_column_statistics` 事件来捕获该信息。对于前面的例子，你可以在图 13-16 中看到此事件输出的示例。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig16_HTML.png](img/323849_5_En_13_Fig16_HTML.png)\n\
  \n图 13-16\n\n`missing_column_statistics` 扩展事件的输出\n\n`column_list` 将显示哪些列没有统计信息。然后，你可以决定是否要创建自己的统计信息以使相关查询受益。\n\
  \n在继续之前，请确保将自动创建统计信息功能重新打开。\n\n```sql\nALTER DATABASE AdventureWorks2017 SET AUTO_CREATE_STATISTICS\
  \ ON;\n```\n\n## 分析统计信息\n\n统计信息是在三组数据中定义的信息集合：标头、密度图和直方图。其中最常用的数据集之一是直方图。*直方图*是一种统计结构，用于显示数据落入不同类别（称为*步骤*）的频率。SQL\
  \ Server 存储的直方图由对列或索引键（或多列索引键的第一列）数据分布的采样组成，最多包含 200 行。两个连续采样之间的索引键值范围信息构成一个*步骤*。这些步骤由存储的\
  \ 200 个值之间大小不一的区间组成。一个步骤提供以下信息：\n\n*   给定步骤的最高值 (`RANGE_HI_KEY`)\n*   等于 `RANGE_HI_KEY`\
  \ 的行数 (`EQ_ROWS`)\n*   介于前一个最高值和当前最高值之间的行数（不计算这两个边界点）(`RANGE_ROWS`)\n*   范围内的不同值数量\
  \ (`DISTINCT_RANGE_ROWS`)；如果范围内的所有值都是唯一的，则 `RANGE_ROWS` 等于 `DISTINCT_RANGE_ROWS`\n\
  *   范围内任何潜在键值的平均行数 (`AVG_RANGE_ROWS`)\n\n例如，在引用索引时，直方图中步骤内键值的 `AVG_RANGE_ROWS` 值有助于优化器决定在\
  \ `WHERE` 子句中引用索引列时如何（以及是否）使用该索引。由于优化器可以执行 `SEEK` 或 `SCAN` 操作从表中检索行，因此优化器可以根据索引键值的潜在匹配行数来决定执行哪个操作。当引用\
  \ `RANGE_HI_KEY` 时，这甚至可以更精确，因为优化器可以知道它应该从该值中找到相当精确的行数（假设统计信息是最新的）。\n\n为了理解优化器的数据检索策略如何依赖于匹配行的数量，可以在索引列上创建具有不同数据分布的测试表。\n\
  \n```sql\nIF (SELECT  OBJECT_ID('dbo.Test1')\n) IS NOT NULL\nDROP TABLE dbo.Test1\
  \ ;\nGO\nCREATE TABLE dbo.Test1 (C1 INT, C2 INT IDENTITY) ;\nINSERT  INTO dbo.Test1\n\
  (C1)\nVALUES  (1) ;\nSELECT TOP 10000\nIDENTITY( INT,1,1 ) AS n\nINTO    #Nums\n\
  FROM    Master.dbo.SysColumns sc1,\nMaster.dbo.SysColumns sc2 ;\nINSERT  INTO dbo.Test1\n\
  (C1)\nSELECT  2\nFROM    #Nums ;\nDROP TABLE #Nums;\nCREATE NONCLUSTERED INDEX FirstIndex\
  \ ON dbo.Test1 (C1) ;\n```\n\n当创建上述非聚集索引时，SQL Server 会自动在索引键上创建统计信息。你可以通过执行 `DBCC\
  \ SHOW_STATISTICS` 命令来获取此非聚集索引 (`FirstIndex`) 的统计信息。\n\n```sql\nDBCC SHOW_STATISTICS(Test1,\
  \ FirstIndex);\n```\n\n图 13-17 显示了统计信息输出。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig17_HTML.jpg](img/323849_5_En_13_Fig17_HTML.jpg)\n\
  \n图 13-17\n\n索引 `FirstIndex` 上的统计信息\n\n现在，为了理解优化器如何根据统计信息有效地决定不同的数据检索策略，请执行以下两个查询，它们请求不同数量的行：\n\
  \n```sql\n--Retrieve 1 row;\nSELECT  *\nFROM    dbo.Test1\nWHERE   C1 = 1;\n--Retrieve\
  \ 10000 rows;\nSELECT  *\nFROM    dbo.Test1\nWHERE   C1 = 2;\n```\n\n图 13-18 显示了这些查询的执行计划。\n\
  \n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig18_HTML.jpg](img/323849_5_En_13_Fig18_HTML.jpg)\n\
  \n图 13-18\n\n小结果集和大结果集查询的执行计划\n\n根据统计信息，优化器可以找到上述两个查询所需的行数。了解到第一个查询只有一行需要检索，优化器选择了\
  \ `Index Seek` 操作，然后进行必要的 `RID Lookup` 以检索未与聚集索引存储在一起的数据。对于第二个查询，优化器知道将影响大量行（10,000\
  \ 行），因此避免使用索引以试图提高性能。（第 8 章详细解释了索引策略。）\n\n除了直方图中包含的信息外，标头还包含其他有用信息，包括：\n\n*   统计信息上次更新的时间\n\
  *   表中的行数\n*   平均索引键长度\n*   为直方图采样的行数\n*   列组合的密度\n\n上次更新时间的信息可以帮助你决定是否应手动更新统计信息。平均键长代表索引键列中数据的平均大小。它有助于你理解索引键的宽度，这是确定索引有效性的一个重要度量。如第\
  \ 6 章所述，宽索引的维护成本可能很高，并且需要更多的磁盘空间和内存页，但如下一节所述，它可以使索引具有极高的选择性。\n\n\n### 密度\n\n在创建执行计划时，查询优化器会分析过滤条件和\
  \ `JOIN` 子句中使用的列的统计信息。具有高选择性的过滤条件会将来自表的行数限制在一个小的结果集中，并有助于优化器保持较低的查询成本。具有唯一索引的列将具有高选择性，因为它可以将匹配的行数限制为一。\n\
  \n另一方面，具有低选择性的过滤条件将从表中返回一个大的结果集。低选择性的过滤条件可能会使该列上的非聚集索引失效。对于一个大结果集，通过非聚集索引导航到基表通常比直接扫描基表（或聚集索引）成本更高，因为这涉及与非聚集索引关联的查找操作开销。你可以在图\
  \ 13-18 中的第一个执行计划中观察到这种行为。\n\n统计信息以密度比率的形式跟踪列的选择性。具有高选择性（或唯一性）的列将具有低密度。具有低密度（即高选择性）的列适合作为过滤条件，因为它可以帮助优化器非常快速地检索少量行。这也是筛选索引的工作原理，因为筛选的目标是提高索引的选择性或密度。\n\
  \n密度可以表示如下：\n\n```\nDensity = 1 / 列中不同值的数量\n```\n\n密度的结果总是在 0 到 1 之间的某个数字。列的密度越低，它就越适合作为索引键。你可以进行自己的计算来确定索引和统计信息中列的密度。例如，要计算由前一个脚本构建的测试表中的列\
  \ `C1` 的密度，请使用以下语句（结果如图 13-19 所示）：\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig19_HTML.jpg](img/323849_5_En_13_Fig19_HTML.jpg)\n\
  \n图 13-19\n列 C1 的密度计算结果\n\n```\nSELECT 1.0 / COUNT(DISTINCT C1)\nFROM dbo.Test1;\n\
  ```\n\n你可以在 `DBCC SHOW_STATISTICS` 输出的 `All density` 列中看到这个实际数据。列的高密度值使其不太适合作为索引候选，即使是筛选索引也是如此。然而，在步骤中维护的索引键值的统计信息有助于查询优化器将该索引用于谓词\
  \ `C1 = 1`，如前面的执行计划所示。\n\n### 多列索引的统计信息\n\n对于单列索引，统计信息包含该列的直方图和一个密度值。对于具有多列的复合索引，统计信息仅包含第一列的一个直方图和多个密度值。这就是为什么在构建复合索引或复合统计信息时，通常将选择性更高的列（即密度最低的列）放在前面是一个好的做法。密度值包括第一列的密度以及索引键列的每个额外组合的密度。多个密度值有助于优化器在\
  \ `WHERE`、`HAVING` 和 `JOIN` 子句中的谓词引用多个列时，找到复合索引的选择性。虽然第一列有助于确定直方图，但无论列的顺序如何，列本身的最终密度都是相同的。\n\
  \n多列密度图可以来自索引键中的多列，也可以来自手动创建的统计信息。但是，你永远不会看到由自动统计信息创建过程创建的多列统计信息，以及随之而来的密度图。让我们看一个简单的例子。下面是一个查询，它很容易从包含两列的统计信息集中受益：\n\
  \n```\nSELECT  p.Name,\n        p.Class\nFROM    Production.Product AS p\nWHERE\
  \   p.Color = 'Red' AND\n        p.DaysToManufacture > 15;\n```\n\n在列 `p.Color`\
  \ 和 `p.DaysToManufacture` 上创建的索引将具有一个多列密度值。在运行这个查询之前，这里有一个可以让你查看给定表上统计信息基本构成的查询：\n\
  \n```\nSELECT  s.name,\n        s.auto_created,\n        s.user_created,\n     \
  \   s.filter_definition,\n        sc.column_id,\n        c.name AS ColumnName\n\
  FROM    sys.stats AS s\n        JOIN sys.stats_columns AS sc\n            ON  sc.stats_id\
  \ = s.stats_id\n            AND sc.object_id = s.object_id\n        JOIN sys.columns\
  \ AS c\n            ON  c.column_id = sc.column_id\n            AND c.object_id\
  \ = s.object_id\nWHERE   s.object_id = OBJECT_ID('Production.Product');\n```\n\n\
  对 `Production.Product` 表运行此查询的结果如图 13-20 所示。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig20_HTML.jpg](img/323849_5_En_13_Fig20_HTML.jpg)\n\
  \n图 13-20\nProduct 表的统计信息列表\n\n你可以看到表上的索引，每个索引都由单列组成。现在我将运行那个可能受益于多列密度图的查询。但是，与其尝试通过\
  \ `SHOWSTATISTICS` 追踪统计信息，我将再次查询系统表。结果如图 13-21 所示。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig21_HTML.jpg](img/323849_5_En_13_Fig21_HTML.jpg)\n\
  \n图 13-21\nProduct 表中已添加两个新的统计信息\n\n如你所见，系统没有添加一个包含多列的统计信息，而是创建了两个新的统计信息。只有在具有多列索引键或使用手动创建的统计信息时，你才会获得多列统计信息。\n\
  \n为了更好地理解为多列索引维护的密度值，你可以修改之前使用的非聚集索引以包含两列。\n\n```\nCREATE NONCLUSTERED INDEX FirstIndex\n\
  ON dbo.Test1\n(\n    C1,\n    C2\n)\nWITH (DROP_EXISTING = ON);\n```\n\n图 13-22\
  \ 显示了由 `DBCC SHOWSTATISTICS` 提供的统计信息结果。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig22_HTML.jpg](img/323849_5_En_13_Fig22_HTML.jpg)\n\
  \n图 13-22\n多列索引 FirstIndex 上的统计信息\n\n如你所见，`All density` 列下有两个密度值。\n\n*   第一列的密度\n\
  *   （第一列 + 第二列）组合的密度\n\n对于具有三列的多列索引，索引的统计信息还将包含（第一列 + 第二列 + 第三列）组合的密度值。直方图不会包含任何其他列组合的选择性值。因此，这个索引\
  \ (`FirstIndex`) 对于仅基于第二列 (`C2`) 过滤行不是很有用，因为第二列 (`C2`) 单独的值并未维护在直方图中，并且它本身也不是密度图的一部分。\n\
  \n你可以通过以下步骤计算图 13-19 中显示的第二个密度值 (0.000099990000)。这是列组合 (`C1`, `C2`) 的不同值的数量。\n\n\
  ```\nSELECT 1.0 / COUNT(*)\nFROM\n    (SELECT DISTINCT C1, C2 FROM dbo.Test1) AS\
  \ DistinctRows;\n```\n\n\n\n## 筛选索引上的统计信息\n\n筛选索引的目的是限制构成索引的数据，从而改变密度和直方图，使索引性能更佳。本例将不使用测试表，而是使用\
  \ `AdventureWorks2017` 数据库中的一个表。在 `Sales.PurchaseOrderHeader` 表的 `PurchaseOrderNumber`\
  \ 列上创建一个索引。\n\n```sql\nCREATE INDEX IX_Test ON Sales.SalesOrderHeader (PurchaseOrderNumber);\n\
  ```\n\n图 13-23 显示了针对此新索引运行 `DBCC SHOWSTATISTICS` 输出的头部信息和密度。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig23_HTML.jpg](img/323849_5_En_13_Fig23_HTML.jpg)\n\
  \n图 13-23：未筛选索引的统计信息头部\n\n```sql\nDBCC SHOW_STATISTICS ('Sales.SalesOrderHeader',IX_Test);\n\
  ```\n\n如果重新创建相同的索引以处理列值不为 `null` 的情况，它看起来会像这样：\n\n```sql\nCREATE INDEX IX_Test\n\
  ON Sales.SalesOrderHeader\n(\nPurchaseOrderNumber\n)\nWHERE PurchaseOrderNumber\
  \ IS NOT NULL\nWITH (DROP_EXISTING = ON);\n```\n\n现在，在图 13-24 中，来看一下统计信息。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig24_HTML.jpg](img/323849_5_En_13_Fig24_HTML.jpg)\n\
  \n图 13-24：筛选索引的统计信息头部\n\n首先可以看到，由于应用了筛选器，构成统计信息的行数在筛选索引中急剧下降，从 `31465` 降至 `3806`。还要注意，由于不再处理零长度字符串，平均键长增加了。这里定义了一个筛选表达式，而不是图\
  \ 13-23 中可见的 `NULL` 值。但两组数据中的未筛选行是相同的。\n\n密度测量值很有趣。注意两者的密度值接近，但筛选后的密度略低，这意味着唯一值更少。这是因为筛选后的数据虽然选择性稍低，但实际上更准确，消除了所有不会对搜索产生贡献的空值。第二个值的密度（代表聚集索引指针）与单独\
  \ `PurchaseOrderNumber` 的密度值相同，因为每个都代表相同数量的唯一数据。前一列中额外聚集索引的密度是一个小得多的数字，这是因为所有 `SalesOrderld`\
  \ 的唯一值由于消除了 `NULL` 值而未包含在筛选数据中。你还可以在图 13-23 中看到直方图的第一列显示 `NULL` 值，而在图 13-24 中则有一个值。\n\
  \n另一个可用的选项是创建筛选统计信息。这允许你创建更精细调整的直方图。这在分区表上尤其有用。这是必要的，因为统计信息不会在分区表上自动创建，而且你无法使用 `CREATE\
  \ STATISTICS` 创建自己的统计信息。你可以按分区创建筛选索引并获取统计信息，或者专门按分区创建筛选统计信息。\n\n在继续之前，清理已创建的索引（如果有）。\n\
  \n```sql\nDROP INDEX Sales.SalesOrderHeader.IX_Test;\n```\n\n## 基数\n\n统计信息（包括直方图和密度）被查询优化器用来计算查询执行过程中每个操作预计涉及的行数。这个用于确定返回行数的计算称为*基数估计*。基数代表一组数据中的行数，这意味着它与\
  \ SQL Server 中的密度度量直接相关。从 SQL Server 2014 开始，启用了一个不同的基数估计器。这是自 SQL Server 7.0 以来核心基数估计过程的首次变更。对估计器某些领域的更改意味着优化器以与之前相同的方式读取统计信息，但优化器会根据已修改的基数计算，采用不同类型的计算来确定执行计划中每个操作将处理的行数。\n\
  \n在我们讨论细节之前，先看看实际效果。首先，我们将更改数据库的基数估计以使用旧估计器。\n\n```sql\nALTER DATABASE SCOPED CONFIGURATION\
  \ SET LEGACY_CARDINALITY_ESTIMATION = ON;\n```\n\n设置好之后，我想运行一个简单的查询。\n\n```sql\n\
  SELECT a.AddressID,\na.AddressLine1,\na.AddressLine2\nFROM Person.Address AS a\n\
  WHERE a.AddressLine1 = '5980 Icicle Circle'\nAND AddressLine2 = 'Unit H';\n```\n\
  \n这里无需探索整个执行计划。相反，我想看一下 `SELECT` 运算符上的 `Estimated Row Count` 值，如图 13-25 所示。\n\n\
  ![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig25_HTML.jpg](img/323849_5_En_13_Fig25_HTML.jpg)\n\
  \n图 13-25：使用旧基数估计引擎时的行数\n\n你可以看到 `Estimated Number of Rows` 等于 `1`。现在，让我们将传统基数估计重新关闭。\n\
  \n```sql\nALTER DATABASE SCOPED CONFIGURATION SET LEGACY_CARDINALITY_ESTIMATION\
  \ = OFF;\n```\n\n如果我们重新运行查询并再次查看 `SELECT` 运算符，情况发生了变化（见图 13-26）。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig26_HTML.jpg](img/323849_5_En_13_Fig26_HTML.jpg)\n\
  \n图 13-26：使用现代基数估计引擎时的行数\n\n你可以看到 `estimated number of rows` 已从 `1` 变为 `1.43095`。这是较新的基数估计器的直接反映。\n\
  \n大多数情况下，用于驱动执行计划的数据来自直方图。对于单个谓词的情况，值只需使用直方图定义的选择性。但是，当使用多个列进行筛选时，基数计算必须考虑每个列的潜在选择性。在\
  \ SQL Server 2014 之前，使用几个简单的计算来确定基数。对于 `AND` 组合，计算基于第一列的选择性乘以第二列的选择性，类似于这样：\n\n\
  ```sql\nSelectivity1 * Selectivity2 * Selectivity3 ...\n```\n\n两个列之间的 `OR` 计算则更为复杂。新的\
  \ `AND` 计算如下所示：\n\n```sql\nSelectivity1 * Power(Selectivity2,1/2) * Power(Selectivity3,1/4)\
  \ ...\n```\n\n\n\n简而言之，新的计算方法并非简单地将每列的选择性相乘以使整体选择性越来越高，而是采用了一种不同的计算方式：从选择性最低的数据开始，逐步处理到选择性最高的数据，但最终得到一个更柔和、偏斜度更低的估计值。这是通过获取选择性值的二分之一次方、四分之一次方、八分之一次方等来实现的，具体取决于涉及的数据列数量。其基本假设是，数据并非一组与下一组毫无关联的列；相反，数据之间存在相关性，使得某种程度的重复成为可能。这种新的计算方式不会改变生成的所有执行计划，但潜在更准确的估计值可能会在部分位置改变它们。当使用\
  \ `OR` 子句时，计算方式再次改变，以表明列之间可能存在相关性。\n\n在前面的例子中，我们确实看到了这种情况。返回了三行数据，而 1.4 行的估计值比 1\
  \ 行的估计值更接近实际值 3。\n\n从兼容级别为 120 的 SQL Server 2014 开始，引入了更多新的计算方式。这意味着，对于大多数查询而言，平均而言，如果你的统计信息是最新的，你可能会看到性能提升，因为更准确的基数计算意味着优化器能做出更好的选择。但是，由于基数计算方式的改变，你也可能在某些查询上看到性能下降。这是可以预料的，因为你可能会遇到各种各样的工作负载、架构和数据分布情况。\n\
  \nSQL Server 2014 中还改变了另一个基数估计假设。在 SQL Server 2012 及更早版本中，当索引中的值（例如标识列或 datetime\
  \ 值）以递增或递减的增量方式变化，并且新引入的行超出现有直方图范围时，优化器会回退到其对无统计数据的数据的默认估计值，即一行。这可能导致严重不准确的查询计划，从而引发性能问题。现在，有了全新的计算方式。\n\
  \n首先，如果你使用 `FULLSCAN`（在“统计信息维护”部分有详细解释）创建了统计信息，并且数据未被修改，那么基数估计的工作方式与之前相同。但是，如果统计信息是使用默认抽样创建的，或者数据已被修改，那么基数估计器将基于该统计信息集内返回的平均行数进行工作，并假定该值而非单一行。这可以生成更准确的执行计划，但前提是数据分布相对一致。不均匀的分布（称为偏斜数据）可能导致糟糕的基数估计，进而产生类似于第\
  \ 18 章详述的糟糕参数嗅探行为。\n\n现在，你可以使用扩展事件中的 `query_optimizer_estimate_cardinality` 事件来观察基数估计的实际运作。我不会深入探讨事件所有可能输出的细节，但我确实想展示如何观察优化器行为，并将其与执行计划和基数估计关联起来。对于绝大多数查询调优而言，这并非特别有用，但如果你不确定优化器是如何进行估计的，或者那些估计似乎不准确，你可以使用此方法来进一步调查信息。\n\
  \n### 注意\n\n`query_optimizer_estimate_cardinality` 事件位于扩展事件的 `Debug` 包中。调试事件主要供\
  \ Microsoft 内部使用。`Debug` 包中包含的事件，包括 `query_optimizer_estimate_cardinality`，可能会在不通知的情况下更改或移除。\n\
  \n首先，你应该使用 `query_optimizer_estimate_cardinality` 事件设置一个扩展事件会话。我创建了一个包含 `auto_stats`\
  \ 和 `sql_batch_complete` 事件的示例。然后，我运行了一个查询。\n\n```sql\nSELECT  so.Description,\n\
  \        p.Name AS ProductName,\n        p.ListPrice,\n        p.Size,\n       \
  \ pv.AverageLeadTime,\n        pv.MaxOrderQty,\n        v.Name AS VendorName\nFROM\
  \    Sales.SpecialOffer AS so\nJOIN    Sales.SpecialOfferProduct AS sop\nON    \
  \  sop.SpecialOfferID = so.SpecialOfferID\nJOIN    Production.Product AS p\nON \
  \     p.ProductID = sop.ProductID\nJOIN    Purchasing.ProductVendor AS pv\nON  \
  \    pv.ProductID = p.ProductID\nJOIN    Purchasing.Vendor AS v\nON      v.BusinessEntityID\
  \ = pv.BusinessEntityID\nWHERE so.DiscountPct > .15;\n```\n\n我选择了一个稍微复杂一点的查询，以便执行计划中有足够多的操作符。当我运行查询后，我便可以看到扩展事件会话的输出，如图\
  \ 13-27 所示。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig27_HTML.jpg](img/323849_5_En_13_Fig27_HTML.jpg)\n\
  \n图 13-27\n\n显示 `query_optimizer_estimate_cardinality` 事件输出的会话\n\n图 13-27 中可见的前两个事件显示\
  \ `auto_stats` 事件触发，它加载了两个列的统计信息：`Sales.SpecialOffer.PK_SpecailOffer_SpecialOfferID`\
  \ 和 `Sales.SpecialOfferProduct.PK_SpecialOfferProduct_SpecialOfferID_ProductID`。这意味着统计信息在基数估计计算触发之前就已准备就绪。“详细信息”选项卡上的信息是基数估计计算的输出。详细信息作为\
  \ JSON 包含在 `calculator`、`input_relation` 和 `stats_collection` 字段中。这些字段将显示计算类型以及计算中使用的值。例如，以下是图\
  \ 13-27 中 `calculator` 字段的输出：\n\n虽然计算本身并不总是清晰，但你可以看到计算所使用的值以及它们的来源。在这个例子中，计算正在比较两个值，并基于该计算得出一个新的选择性值。\n\
  \n在图 13-27 的底部，你可以看到 `stats_collection_id` 值，在本例中是 7。你可以使用这个值来跟踪执行计划中的某些计算，以理解计算的功能及其使用方式。\n\
  \n我们首先要获取执行计划。即使你是从查询存储或其他来源获取计划，`stats_collection_id` 值也会与计划一起存储。一旦你有了计划，就可以利用\
  \ SSMS 2017 中的新功能。在图形化计划中右键单击将打开一个上下文菜单，如图 13-28 所示。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig28_HTML.jpg](img/323849_5_En_13_Fig28_HTML.jpg)\n\
  \n图 13-28\n\n显示“查找节点”菜单选择的执行计划上下文菜单\n\n我们要做的是使用“查找节点”命令搜索执行计划。点击该菜单选项将在执行计划顶部打开一个小窗口，我在图\
  \ 13-29 中已填写完毕。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig29_HTML.jpg](img/323849_5_En_13_Fig29_HTML.jpg)\n\
  \n图 13-29\n\n图形化执行计划中的“查找节点”界面\n\n\n\n我已经选择了感兴趣的执行计划属性 `StatsCollectionId`，并提供了图\
  \ 13-27 中扩展事件显示的值。当我点击箭头时，这将直接跳转到具有该属性匹配值的节点并选中它。这样，我就能将扩展事件收集的信息与执行计划内的信息结合起来，从而更深入地理解优化器是如何使用统计信息的。\n\
  \n最后，在 SQL Server Management Studio 2017 中，你还可以获取优化器专门用于构建执行计划的统计信息列表。在第一个操作符（此处为\
  \ `SELECT` 操作符）的属性中，你可以获得一个完整的统计信息列表，类似于你在图 13-30 中看到的那样。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig30_HTML.jpg](img/323849_5_En_13_Fig30_HTML.jpg)\n\
  图 13-30\n为查询生成的执行计划中使用的统计信息\n\n#### 启用和禁用基数估计器\n\n如果你在 SQL Server 2014 或更高版本中创建数据库，它将自动设置兼容级别为\
  \ 120 或更高，这是适用于最新 SQL Server 的正确版本。但是，如果你从早期版本的 SQL Server 还原或附加数据库，兼容级别将设置为该版本（110\
  \ 或更早）。然后，该数据库将使用 SQL Server 7 的基数估计器。你可以通过查看执行计划中第一个操作符（`SELECT`/`INSERT`/`UPDATE`/`DELETE`）的\
  \ `CardinalityEstimationModelVersion` 属性来判断这一点，如图 13-31 所示。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig31_HTML.jpg](img/323849_5_En_13_Fig31_HTML.jpg)\n\
  图 13-31\n第一个操作符中显示正在使用的基数估计器的属性\n\nSQL Server 2014–2017 显示的值将对应于版本号，`120`、`130`、`140`。这就是你判断正在使用的基数估计器版本的方法。这一点很重要，因为估计值的变化可能导致执行计划的更改，因此了解如何排查因新的基数估计而导致的性能下降问题至关重要。\n\
  \n如果你怀疑遇到了升级带来的问题，你应该绝对比较一下执行计划中操作返回的实际行数与估计行数。这始终是判断统计信息或基数估计是否导致问题的好方法。你应该在测试升级和作为升级过程的一部分时使用查询存储（如第\
  \ 11 章所述）。查询存储是捕获基数估计引擎更改前后情况的最佳方式，也是处理可能出错的单个查询的最佳方式。\n\n你可以通过将兼容级别设置为 `110` 来选择禁用新的基数估计功能，但这也会禁用其他较新的\
  \ SQL Server 功能，因此可能不是好的选择。你可以针对数据库的还原运行一个跟踪标志，使用 `OPTION` (`QUERYTRACEON` `9481`)；这样你将只针对该数据库的基数估计器。如果你在某个特定查询中确定新的基数估计器有问题，你可以用同样的方式在查询中利用跟踪标志。\n\
  \n```\nSELECT p.Name,\n       p.Class\nFROM   Production.Product AS p\nWHERE  p.Color\
  \ = 'Red'\n       AND p.DaysToManufacture > 15\nOPTION (QUERYTRACEON 9481);\n```\n\
  \n相反，如果你使用跟踪标志或兼容级别关闭了基数估计器，你可以使用相同的功能有选择地为某个查询开启它，只需将跟踪标志值替换为 `2312`。\n\n最后，SQL\
  \ Server 2016 引入了一项新功能：数据库作用域配置。在其他设置中（我们将在书中适当的地方讨论），你可以仅禁用基数估计引擎，而不禁用所有现代功能。新语法如下所示：\n\
  \n```\nALTER DATABASE SCOPED CONFIGURATION SET LEGACY_CARDINALITY_ESTIMATION = ON;\n\
  ```\n\n使用此命令，你可以在不改变所有其他行为的情况下更改数据库的行为。你也可以使用相同的命令关闭旧的基数估计器。你还可以选择对单个查询使用 `USE`\
  \ 提示。在查询提示中设置 `FORCE_LEGACY_CARDINALITY_ESTIMATION` 将使该查询（且仅该查询）使用旧的基数估计。这可能是最安全的选择，尽管它确实涉及代码更改。\n\
  \n### 统计信息 DMO\n\n在 SQL Server 2016 之前，获取统计信息的唯一方法是使用 `DBCC SHOW_STATISTICS`。但是，后来引入了一些新的\
  \ DMF，它们可能很有用。`sys.dm_db_stats_properties` 函数返回一组统计信息的头信息。这意味着你可以快速从头信息中提取信息。例如，使用以下查询检索统计信息最后更新的时间：\n\
  \n```\nSELECT ddsp.object_id,\n       ddsp.stats_id,\n       ddsp.last_updated\n\
  FROM   sys.dm_db_stats_properties(OBJECT_ID('HumanResources.Employee'),\n      \
  \                            2) AS ddsp;\n```\n\n该函数要求你传递感兴趣的 `object_id` 及其对应的\
  \ `statistics_id`。在此示例中，我们查看 `HumanResources.Employee` 表上的列统计信息。\n\n另一个函数是 `sys.dm_db_stats_histogram`。它的工作方式非常相似，允许我们将统计信息的直方图视为可查询的对象。例如，假设我们想在直方图中查找一组特定的值。通常，你会查找\
  \ `range_hi_key` 值，然后查看你要找的值是否小于某个 `range_high_key` 但大于另一个。现在完全可以实现自动化。\n\n```\n\
  WITH histo\n     AS (SELECT ddsh.step_number,\n                ddsh.range_high_key,\n\
  \                ddsh.range_rows,\n                ddsh.equal_rows,\n          \
  \      ddsh.average_range_rows\n         FROM   sys.dm_db_stats_histogram(OBJECT_ID('HumanResources.Employee'),\n\
  \                                          1) AS ddsh ),\n     histojoin\n     AS\
  \ (SELECT h1.step_number,\n                       h1.range_high_key,\n         \
  \              h2.range_high_key AS range_high_key_step1,\n                    \
  \   h1.range_rows,\n                       h1.equal_rows,\n                    \
  \   h1.average_range_rows\n                FROM   histo AS h1\n                \
  \       LEFT JOIN histo AS h2\n                             ON h1.step_number =\
  \ h2.step_number + 1)\nSELECT hj.range_high_key,\n       hj.equal_rows,\n      \
  \ hj.average_range_rows\nFROM   histojoin AS hj\nWHERE  hj.range_high_key >= 17\n\
  \       AND (   hj.range_high_key_step1 < 17\n                OR hj.range_high_key_step1\
  \ IS NULL);\n```\n\n此查询将检查 `HumanResources.Employee` 表上的相关统计信息，并找出直方图中哪一行包含值 `17`。\n\
  \n### 统计信息维护\n\nSQL Server 允许用户手动覆盖单个数据库中统计信息的维护。控制 SQL Server 自动统计信息维护行为的四个主要配置如下：\n\
  \n*   为没有索引的列创建新统计信息（自动创建统计信息）\n*   更新现有统计信息（自动更新统计信息）\n*   用于生成统计信息的抽样程度\n*   异步更新现有统计信息（自动异步更新统计信息）\n\
  \n你可以在数据库级别（所有表上的所有索引和统计信息）或在个别索引或统计信息上根据具体情况控制上述配置。自动创建统计信息设置仅适用于非索引列，因为 SQL Server\
  \ 在创建索引时总是会为索引键创建统计信息。自动更新统计信息设置及其异步版本适用于索引上的统计信息和非索引列上的统计信息。\n\n\n\n## 自动维护\n\n\
  默认情况下，SQL Server 会自动处理统计信息。自动创建统计信息和自动更新统计信息这两项设置默认都是开启的。如前所述，通常最好保持这些设置为开启状态。而“自动异步更新统计信息”设置默认是关闭的。\n\
  \n当你重建索引时（如果你选择重建索引），它会基于对数据的完整扫描为该索引创建所有新的统计信息（稍后会详细介绍）。这意味着重建过程会产生一套非常高质量的统计信息，这是微软帮助你自动维护统计信息的另一种方式。\n\
  \n然而，有时手动创建和维护统计信息效果会更好。对于我们许多人来说，确保我们的统计信息比自动化进程更及时，意味着工作负载的可预测性更高。我们知道何时以及如何维护统计信息，因为它们在我们的控制之下。你还可以停止随机发生的统计信息维护，并精确控制它们发生的时间，以及控制它们导致的重新编译。这有助于将生产系统的负载集中到非高峰时段。\n\
  \n##### 自动创建统计信息\n\n“自动创建统计信息”功能会在查询的 `WHERE` 子句中引用到非索引列时，自动为这些列创建统计信息。例如，当针对 `Sales.SalesOrderHeader`\
  \ 表上没有索引的列运行以下 `SELECT` 语句时，就会为该列创建统计信息：\n\n```sql\nSELECT  cc.CardNumber,\n   \
  \     cc.ExpMonth,\n        cc.ExpYear\nFROM    Sales.CreditCard AS cc\nWHERE  \
  \ cc.CardType = 'Vista';\n```\n\n然后，“自动创建统计信息”功能（如果你曾将其关闭，请确保重新开启）会自动在 `CardType`\
  \ 列上创建统计信息。你可以在图 13-32 的扩展事件会话输出中看到这一点。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig32_HTML.jpg](img/323849_5_En_13_Fig32_HTML.jpg)\n\
  \n图 13-32\n\n`AUTO_CREATE_STATISTICS ON` 时的会话输出\n\n`auto_stats` 事件触发以创建新的统计信息集合。你可以在\
  \ `statistics_list` 字段 `Created: CardType` 中看到正在发生的事情的详细信息。随后是新列统计信息的加载过程，以及表上其中一个索引的统计信息，最后是查询的执行。\n\
  \n##### 自动更新统计信息\n\n“自动更新统计信息”功能会在永久表的索引或列的统计信息被标记为过时，并且该表在查询中被引用时，自动更新这些现有统计信息。导致统计信息过时的操作类型是操作语句，例如\
  \ `INSERT`、`UPDATE` 和 `DELETE`。更改数量的默认阈值取决于表中的行数。这是一个相当简单的计算：\n\n```sql\nSqrt(1000*NumberOfRows)\n\
  ```\n\n这意味着如果你有一个包含 500,000 行的表，代入该计算的结果是 22,360.68。你需要在这个 50 万行的表中新增、编辑或删除这么多行，才会触发自动统计信息更新。\n\
  \n对于 SQL Server 2014 及更早版本，在未启用跟踪标志 2371 的情况下，统计信息维护方式如表 13-4 所示。\n\n表 13-4\n\n\
  基于更改数量的更新统计信息阈值\n\n| 行数 | 更改数量阈值 |\n| --- | --- |\n| 0 | > 1 次插入 |\n| <500 | > 500\
  \ 次更改 |\n| >500 | 行更改的 20% |\n\n行更改被计为表中插入、更新或删除的次数。\n\n使用阈值可以降低自动更新统计信息的频率。例如，考虑以下表：\n\
  \n```sql\nIF (SELECT OBJECT_ID('dbo.Test1')) IS NOT NULL\n    DROP TABLE dbo.Test1;\n\
  CREATE TABLE dbo.Test1 (C1 INT);\nCREATE INDEX ixl ON dbo.Test1 (C1);\nINSERT INTO\
  \ dbo.Test1 (C1)\nVALUES (0);\n```\n\n非聚集索引创建后，表中添加了一行数据。这使非聚集索引上的现有统计信息过时。如果执行以下带有\
  \ `WHERE` 子句引用索引列的 `SELECT` 语句，如下所示，“自动更新统计信息”功能将自动更新非聚集索引上的统计信息，如图 13-33 的会话输出所示：\n\
  \n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig33_HTML.jpg](img/323849_5_En_13_Fig33_HTML.jpg)\n\
  \n图 13-33\n\n`AUTO_UPDATE_STATISTICS ON` 时的会话输出\n\n```sql\nSELECT  C1\nFROM    dbo.Test1\n\
  WHERE   C1 = 0;\n```\n\n一旦统计信息更新完毕，对应表的更改跟踪机制会被重置为 0。这样，SQL Server 就能跟踪对表所做的更改次数，并管理自动更新统计信息的频率。\n\
  \nSQL Server 2016 及更高版本的新功能意味着，对于更大的表，你会获得更频繁的统计信息更新。在旧版本的 SQL Server 上，你需要利用跟踪标志\
  \ 2371 来实现相同的功能。如果自动更新发生的频率不够高，你可以直接进行控制，这将在本章后面的“手动维护”部分讨论。\n\n#### 自动异步更新统计信息\n\
  \n如果“自动异步更新统计信息”设置为开启，SQL Server 中统计信息的基本行为不会发生根本性改变。当一组统计信息被标记为过时，并且随后有查询基于这些统计信息运行时，统计信息更新不会像通常那样中断查询的执行。相反，查询将使用旧的统计信息集合完成执行。一旦查询完成，统计信息就会被更新。这样做的原因可能是，当更新统计信息时，过程缓存中的查询计划会被移除，而正在运行的查询必须重新编译。这会导致查询执行出现延迟。因此，与其让查询同时等待统计信息更新和重新编译过程，不如让查询先完成其运行。下次调用同一个查询时，它将有更新好的统计信息可用，并且只需要重新编译即可。\n\
  \n尽管此功能确实使更新统计信息和重新编译过程所需的步骤速度有所提升，但它也可能导致那些本可立即从更新的统计信息和新执行计划中受益的查询，继续使用旧的执行计划。在开启此功能之前，需要仔细测试，以确保它不会弊大于利。\n\
  \n### 注意\n\n如果你尝试异步更新统计信息，还必须将 `AUTO_UPDATE_STATISTICS` 设置为 `ON`。\n\n\n\n### 手动维护\n\
  \n以下情况需要您干预或辅助统计信息的自动维护：\n\n*   *当试验统计信息时*：只是个友善的建议——请让您的生产服务器远离诸如本书中正在进行的实验。\n\
  *   *从早期版本升级到 SQL Server 2017 后*：在本书的早期版本中，我建议在升级到新版本的 SQL Server 后立即更新统计信息。这是因为\
  \ SQL Server 2014 中引入的统计信息变更。立即更新统计信息是有意义的，这样您就能看到新基数估算器的效果。随着查询存储的引入，我不能再以同样的方式推荐这种做法。相反，我会建议您在从\
  \ SQL Server 2014 升级到更新版本时考虑这一点，但即便如此，我也不会建议默认手动更新统计信息。我会先进行测试，以了解特定升级后的表现。\n* \
  \  *当执行一系列您不会再次执行的即席 SQL 活动时*：在这种情况下，您必须决定是否愿意为那一次的情况付出自动统计信息维护的代价以获得更好的计划，同时影响其他\
  \ SQL Server 活动的性能。因此，一般来说，您可能不需要关注此类单一事件。这主要适用于较大的数据库，但如果您认为可能适用，可以在您的环境中进行测试。\n\
  *   *当您遇到自动统计信息维护的问题，而目前唯一的解决方法是暂时关闭该功能时*：即使在这种情况下，您也可以仅针对面临问题的特定表关闭该功能，而不是为整个数据库禁用它。此类问题可能出现在数据更新频繁但不足以触发阈值更新的大型数据集中。此外，当自动更新的采样级别对于某些数据分布不够充分时，也可以使用此方法。\n\
  *   *在分析查询性能时，您发现查询引用的某些数据库对象缺少统计信息*：这可以从图形和 XML 执行计划中评估出来，如本章前面所述。\n*   *在分析统计信息有效性时，您发现它们不准确*：当根据本应良好的统计信息集生成了糟糕的执行计划时，就可以确定这一点。\n\
  \nSQL Server 允许用户控制其许多自动统计信息维护功能。您可以使用 `auto create statistics` 和 `auto update statistics`\
  \ 设置分别启用（或禁用）自动创建和更新统计信息功能，然后就可以开始动手操作了。\n\n#### 管理统计信息设置\n\n您可以在数据库级别控制 `auto create\
  \ statistics` 设置。要禁用此设置，请使用 `ALTER DATABASE` 命令。\n\n```\nALTER DATABASE AdventureWorks2017\
  \ SET AUTO_CREATE_STATISTICS OFF;\n```\n\n您可以在数据库的不同级别控制 `auto update statistics`\
  \ 设置，包括表上的所有索引和统计信息，或在单个索引或统计信息级别。要在数据库级别禁用 `auto update statistics`，请使用 `ALTER\
  \ DATABASE` 命令。\n\n```\nALTER DATABASE AdventureWorks2017 SET AUTO_UPDATE_STATISTICS\
  \ OFF;\n```\n\n在数据库级别禁用此设置会覆盖较低级别的单个设置。`Auto update statistics asynchronously` 要求首先启用\
  \ `auto update statistics`。然后，您可以启用异步更新。\n\n```\nALTER DATABASE AdventureWorks2017\
  \ SET AUTO_UPDATE_STATISTICS_ASYNC ON;\n```\n\n要为当前数据库中表的所有索引和统计信息配置 `auto update\
  \ statistics`，请使用 `sp_autostats` 系统存储过程。\n\n```\nUSE AdventureWorks2017;\nEXEC sp_autostats\n\
  'HumanResources.Department',\n'OFF';\n```\n\n您也可以使用相同的存储过程为单个索引或统计信息配置此设置。要为 `AdventureWorks2017`.`HumanResources.Department`\
  \ 上的 `AK_Department_Name` 索引禁用此设置，请执行以下语句：\n\n```\nEXEC sp_autostats\n'HumanResources.Department',\n\
  'OFF',\nAK_Department_Name;\n```\n\n您还可以使用 `UPDATE STATISTICS` 命令的 `WITH NORECOMPUTE`\
  \ 选项，为当前数据库中表上的所有或单个索引和统计信息禁用此设置。`sp_createstats` 存储过程也有 `NORECOMPUTE` 选项。`NORECOMPUTE`\
  \ 选项不会禁用数据库的自动统计信息更新，但会针对给定的统计信息集禁用。\n\n除非您已通过测试确认这会带来性能优势，否则请避免禁用自动统计信息功能。如果禁用了自动统计信息功能，那么您需要负责手动识别并在未索引的列上创建缺失的统计信息，然后保持现有统计信息为最新状态。一般来说，您只会希望为非常大的表禁用自动统计信息功能，并且只有在仔细测量了阻塞和锁定情况，从而了解更改统计信息行为会有所帮助之后才会这样做。\n\
  \n如果您想检查表是否关闭了自动统计信息，可以使用以下语句：\n\n```\nEXEC sp_autostats 'HumanResources.Department';\n\
  ```\n\n重置索引的自动维护，以便在已关闭的地方重新开启。\n\n```\nEXEC sp_autostats\n'HumanResources.Department',\n\
  'ON';\nEXEC sp_autostats\n'HumanResources.Department',\n'ON',\nAK_Department_Name;\n\
  ```\n\n\n\n#### 生成统计信息\n\n要手动创建统计信息，请使用以下选项之一：\n\n*   `CREATE STATISTICS`：您可以使用此选项在表或索引视图的单列或多列上创建统计信息。与\
  \ `CREATE INDEX` 命令不同，`CREATE STATISTICS` 默认使用采样。\n\n*   `sys.sp_createstats`：使用此存储过程为当前数据库中所有用户表的所有符合条件的列创建单列统计信息。这包括除计算列、数据类型为\
  \ `NTEXT`、`TEXT`、`GEOMETRY`、`GEOGRAPHY` 或 `IMAGE` 的列、稀疏列以及已有统计信息或是索引首列的列之外的所有列。此函数旨在用于向后兼容，我不建议使用它。\n\
  \n虽然会为列存储索引创建统计信息对象，但该索引内部的值是空的。列存储索引上的各个列可以创建常规的系统生成统计信息。在处理列存储索引时，如果您发现自己仍在引用各个列，您可能会发现，在某些情况下，创建多列统计信息是有用的。示例如下：\n\
  \n```sql\nCREATE STATISTICS MultiColumnExample\nON dbo.bigProduct (ProductNumber,\n\
  Name);\n```\n\n除了各个列的统计信息和您创建的任何统计信息外，无需担心列存储索引上自动创建的索引统计信息。\n\n如果您对列存储索引进行分区（分区不是一种性能增强工具，而是一种数据管理工具），则需要使用以下命令将您的统计信息更改为增量式，以确保统计信息更新仅按分区进行：\n\
  \n```sql\nUPDATE STATISTICS dbo.bigProduct WITH RESAMPLE, INCREMENTAL=ON;\n```\n\
  \n要手动更新统计信息，请使用以下选项之一：\n\n*   `UPDATE STATISTICS`：您可以使用此选项更新表或索引视图的单个或所有索引键及非索引列的统计信息。\n\
  \n*   `sys.sp_updatestats`：使用此存储过程更新当前数据库中所有用户表的统计信息。但是请注意，它只能采样统计信息，不能使用 `FULLSCAN`，并且它会在对某个统计信息仅执行单个操作时就进行更新。简而言之，这是一个维护统计信息的较为粗略的工具。\n\
  \n您可能会发现，允许自动更新统计信息对您的系统来说并不完全足够。在非高峰时段安排对数据库执行 `UPDATE STATISTICS` 是解决此问题的可接受方法。`UPDATE\
  \ STATISTICS` 是首选机制，因为它提供了更大程度的灵活性和控制力。由于插入的数据类型，用于收集统计信息的采样方法（之所以使用采样是因为它更快）可能无法收集到合适的数据。在这些情况下，您可以强制执行\
  \ `FULLSCAN`，以便使用所有数据来更新统计信息，就像统计信息最初创建时那样。这可能是一项成本高昂的操作，因此最好有选择性地确定哪些索引接受这种处理以及何时运行。此外，如果您确实为统计信息重建设置了采样率（包括\
  \ `FULLSCAN`），则应使用 `PERSIST_SAMPLE_PERCENT` 以确保任何触发的自动化过程都使用相同的采样率。\n\n### 注意\n\n\
  一般来说，您应始终使用自动统计信息的默认设置。只有在确认默认设置似乎降低了性能后，才考虑修改这些设置。\n\n#### 统计信息维护状态\n\n您可以使用以下方法验证\
  \ `autostats` 功能的当前设置：\n\n*   `sys.databases`\n\n*   `DATABASEPROPERTYEX`\n\n* \
  \  `sp_autostats`\n\n#### 自动创建统计信息的状态\n\n您可以通过查询 `sys.databases` 系统表来验证自动创建统计信息的当前设置。\n\
  \n```sql\nSELECT  is_auto_create_stats_on\nFROM    sys.databases\nWHERE   [name]\
  \ = 'AdventureWorks2017';\n```\n\n返回值 1 表示已启用，0 表示已禁用。\n\n您也可以使用系统存储过程 `sp_autostats`\
  \ 来验证特定索引的状态，如下面的代码所示。向该存储过程提供任何表名，都将在全局统计信息设置的 `Output` 部分提供当前数据库的自动创建统计信息配置值。\n\
  \n```sql\nUSE AdventureWorks2017;\nEXEC sys.sp_autostats 'HumanResources.Department';\n\
  ```\n\n图 13-34 显示了前述 `sp_autostats` 语句输出的摘录。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig34_HTML.jpg](img/323849_5_En_13_Fig34_HTML.jpg)\n\
  \n图 13-34\n\n`sp_autostats` 输出\n\n返回值 `ON` 表示已启用，`OFF` 表示已禁用。如本章前面所述，在验证自动更新统计信息的状态时，此存储过程更有用。\n\
  \n您还可以以类似于验证自动创建统计信息的方式，验证自动更新统计信息以及异步自动更新统计信息的当前设置。使用函数 `DATABASEPROPERTYEX` 的方法如下：\n\
  \n```sql\nSELECT  DATABASEPROPERTYEX('AdventureWorks2017', 'IsAutoUpdateStatistics');\n\
  ```\n\n使用 `sp_autostats` 的方法如下：\n\n```sql\nUSE AdventureWorks2017;\nEXEC sp_autostats\n\
  'Sales.SalesOrderDetail';\n```\n\n#### 分析统计信息对查询的有效性\n\n出于性能原因，在数据库对象上维护适当的统计信息极为重要。与统计信息相关的问题可能相当常见。在分析查询性能时，您需要时刻关注统计信息出现问题的可能性。如果统计信息确实出现问题，那真的会让人头疼。事实上，在查询调优会话开始时检查统计信息是否最新，可以消除一个容易修复的问题。在本节中，您将了解当发现统计信息缺失或过时时可以采取的措施。\n\
  \n在分析查询的执行计划时，请注意以下几点，以确保采用具有成本效益的处理策略：\n\n*   在筛选和联接条件引用的列上存在索引。\n\n*   在缺少索引的情况下，应在没有索引的列上存在统计信息。拥有索引本身可能是更可取的。\n\
  \n*   由于过时的统计信息不仅无用甚至可能产生误导，因此优化器使用的统计信息估计值保持最新至关重要。\n\n您已经在第 9 章分析了如何使用适当的索引。在本节中，您将分析统计信息对查询的有效性。\n\
  \n\n#### 解决统计信息缺失问题\n\n要了解如何识别和解决统计信息缺失问题，请考虑以下示例。为了更直接地控制数据，我将使用一个测试表，而不是 `AdventureWorks2017`\
  \ 中的表。首先使用 `ALTER DATABASE` 命令禁用自动创建统计信息和自动更新统计信息功能。\n\n```sql\nALTER DATABASE AdventureWorks2017\
  \ SET AUTO_CREATE_STATISTICS OFF;\nALTER DATABASE AdventureWorks2017 SET AUTO_UPDATE_STATISTICS\
  \ OFF;\n```\n\n创建一个包含大量行和一个非聚集索引的测试表。\n\n```sql\nIF EXISTS (   SELECT *\nFROM sys.objects\n\
  WHERE object_id = OBJECT_ID(N'dbo.Test1'))\nDROP TABLE dbo.Test1;\nGO\nCREATE TABLE\
  \ dbo.Test1 (C1 INT,\nC2 INT,\nC3 CHAR(50));\nINSERT INTO dbo.Test1 (C1,\nC2,\n\
  C3)\nVALUES (51, 1, 'C3'),\n(52, 1, 'C3');\nCREATE NONCLUSTERED INDEX iFirstIndex\
  \ ON dbo.Test1 (C1, C2);\nSELECT TOP 10000\nIDENTITY(INT, 1, 1) AS n\nINTO #Nums\n\
  FROM master.dbo.syscolumns AS scl,\nmaster.dbo.syscolumns AS sC2;\nINSERT INTO dbo.Test1\
  \ (C1,\nC2,\nC3)\nSELECT n % 50,\nn,\n'C3'\nFROM #Nums;\nDROP TABLE #Nums;\n```\n\
  \n由于索引是创建在 (`C1`, `C2`) 上的，索引的统计信息包含第一列 `C1` 的直方图，以及前缀列组合 (`C1` 和 `C1` * `C2`) 的密度值。对于列\
  \ `C2`，则没有单独的直方图或密度值。\n\n要了解如何识别没有索引的列上的缺失统计信息，请执行以下 `SELECT` 语句。由于自动创建统计信息功能已关闭，优化器将无法找到\
  \ `WHERE` 子句中使用的列 `C2` 的数据分布情况。在执行查询之前，请确保通过点击查询工具栏或按下 `Ctrl+M` 来启用“包含实际执行计划”。\n\
  \n```sql\nSELECT  *\nFROM    dbo.Test1\nWHERE   C2 = 1;\n```\n\n图形化执行计划也提供了关于缺失统计信息的信息，如图\
  \ 13-35 所示。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig35_HTML.jpg](img/323849_5_En_13_Fig35_HTML.jpg)\n\
  \n图 13-35: 图形化计划中的缺失统计信息指示\n\n图形化执行计划显示了一个带有黄色感叹号的运算符。这表明该运算符存在某些问题。你可以通过右键单击 `Table\
  \ Scan` 运算符，然后从上下文菜单中选择 `属性`，来获取警告的详细描述。属性页面中有一个警告部分可以展开查看，如图 13-36 所示。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig36_HTML.jpg](img/323849_5_En_13_Fig36_HTML.jpg)\n\
  \n图 13-36: 来自索引扫描运算符警告的属性值\n\n图 13-36 显示该列的统计信息缺失。这可能阻碍优化器选择最佳的处理策略。根据 `扩展事件` 的记录，此查询当前的平均开销是\
  \ 100 次逻辑读和 850 微秒。\n\n要解决这个统计信息缺失问题，你可以使用 `CREATE STATISTICS` 语句在列 `Test1.C2` 上创建统计信息。\n\
  \n```sql\nCREATE STATISTICS Stats1 ON Test1(C2);\n```\n\n在重新运行查询之前，请务必清理过程缓存，因为此查询将受益于简单参数化。\n\
  \n```sql\nDECLARE @Planhandle VARBINARY(64);\nSELECT @Planhandle = deqs.plan_handle\n\
  FROM sys.dm_exec_query_stats AS deqs\nCROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle)\
  \ AS dest\nWHERE dest.text LIKE '%SELECT  *\nFROM    dbo.Test1\nWHERE   C2 = 1;%'\n\
  IF @Planhandle IS NOT NULL\nBEGIN\nDBCC FREEPROCCACHE(@Planhandle);\nEND\nGO\n```\n\
  \n### 注意\n\n在生产系统上运行前面的查询时，使用 `LIKE '%...%'` 通配符可能效率低下。查找特定字符串是更准确地从计划缓存中移除单个查询的方法。\n\
  \n图 13-37 显示了在列 `C2` 上创建统计信息后的执行计划结果。\n\n![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig37_HTML.jpg](img/323849_5_En_13_Fig37_HTML.jpg)\n\
  \n图 13-37: 包含统计信息的执行计划\n\n```\n逻辑读取次数: 34\n持续时间: 4.3 毫秒。\n```\n\n查询优化器使用复合索引中非首列上的统计信息来判断，扫描复合索引的叶级以获取\
  \ `RID` 查找信息，是否比扫描整张表是更高效的处理策略。在此情况下，在列 `C2` 上创建统计信息使得优化器能够判断：相比于扫描基表，扫描 (`C1`,\
  \ `C2`) 上的复合索引并为少数匹配行执行书签查找回基表的开销更低。因此，逻辑读取次数从 100 减少到 34，但由于需要额外处理来联接来自两个不同运算符的数据，经过时间显著增加。\n\
  \n\n"
- '# 解决过时的统计信息问题


  有时，过时或不正确的统计信息比缺失的统计信息更具破坏性。基于过旧的统计信息或仅对变更数据的部分扫描，优化器可能会决定采用某种特定的索引策略，而这可能对于当前的数据分布而言极不合适。不幸的是，对于过时或不正确的统计信息，执行计划不会像对缺失统计信息那样显示出明显的警告。不过，存在一个名为
  `inaccurate_cardinality_estimate` 的扩展事件。这是一个调试事件，这意味着在生产系统上使用它可能有些问题。我强烈建议谨慎使用，仅在经过适当过滤且仅在短时间内使用，但我想指出它的存在。作为替代方案，请利用第
  7 章详述的 Showplan 分析功能。


  识别过时统计信息的更传统且更安全的方法，是检查优化器估计的影响行数与实际影响行数之间的接近程度。


  以下示例向您展示如何识别和解决过时的统计信息问题。图 13-38 显示了由 `DBCC SHOW_STATISTICS` 提供的、列 `C1` 上非聚集索引键的统计信息。


  ![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig38_HTML.jpg](img/323849_5_En_13_Fig38_HTML.jpg)


  图 13-38 索引 FirstIndex 上的统计信息


  ```

  DBCC SHOW_STATISTICS (Test1, iFirstIndex);

  ```


  这些结果显示，列 `C1` 的密度值为 0.5。现在考虑以下 `SELECT` 语句：


  ```

  SELECT *

  FROM dbo.Test1

  WHERE C1 = 51;

  ```


  由于表中的总行数当前为 10,002，因此筛选条件 `C1 = 51` 的匹配行数可以估计为 5,001 (= 0.5 × 10,002)。这个估计行数 (5,001)
  与此列值的实际匹配行数相差甚远。该表实际上只包含一行 `C1 = 51` 的数据。


  您可以从执行计划中获取估计行数和实际行数的信息。估计计划仅引用并使用统计信息，而非实际数据。这意味着它可能与实际数据大相径庭，正如您现在所见。而实际执行计划则同时具有估计行数和实际行数。


  执行查询会得到图 13-39 中的执行计划以及以下性能：


  ![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig39_HTML.jpg](img/323849_5_En_13_Fig39_HTML.jpg)


  图 13-39 使用过时统计信息的执行计划


  ```

  读取次数: 100

  持续时间: 681 毫秒

  ```


  要查看估计行数和实际行数，您可以查看 `表扫描` 运算符的属性（图 13-40）。


  ![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig40_HTML.jpg](img/323849_5_En_13_Fig40_HTML.jpg)


  图 13-40 显示行数差异的属性


  从估计行数与实际行数的对比可以清楚看出，优化器基于过时的统计信息做出了不正确的估计。如果估计行数和实际行数之间的差异超过 10 倍，那么所选择的处理策略很可能对于当前的数据分布而言成本效益不高。不准确的估计可能会误导优化器决定处理策略。统计信息出现偏差的原因有多种。表变量和多语句用户定义函数根本没有统计信息，因此对这些对象的所有估计都假设为单行，而不考虑这些对象实际涉及多少行。


  我们也可以使用 Showplan 分析功能查看“不准确的基数估计”报告。右键单击一个实际执行计划，然后从上下文菜单中选择“分析实际执行计划”。当分析窗口打开时，选择“方案”选项卡。对于之前的计划，您会看到类似图
  13-41 的内容。


  ![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig41_HTML.jpg](img/323849_5_En_13_Fig41_HTML.jpg)


  图 13-41 显示实际值与估计值差异的“不准确基数估计”报告


  为了帮助优化器做出准确的估计，您应该更新列 `C1` 上非聚集索引键的统计信息（当然，作为替代方案，您也可以直接保持自动更新统计信息功能开启）。


  ```

  UPDATE STATISTICS Test1 iFirstIndex WITH FULLSCAN;

  ```


  这里可能不需要 `FULLSCAN`。采用抽样方法创建统计信息通常相当准确，且速度快得多。但是，在系统压力不大或非高峰时段，我倾向于使用 `FULLSCAN`，因为其准确性更高。只要您能获得所需的统计信息，两种方法都是有效的。


  如果您再次运行该查询，您将获得如下所示的更新统计信息，结果输出如图 13-42 所示：


  ![../images/323849_5_En_13_Chapter/323849_5_En_13_Fig42_HTML.jpg](img/323849_5_En_13_Fig42_HTML.jpg)


  图 13-42 使用最新统计信息后的实际行数与估计行数


  ```

  读取次数: 4

  持续时间: 184 毫秒

  ```


  优化器利用更新的统计信息准确地估计了行数，因此能够制定出更高效的计划。由于估计行数为 1，通过 `C1` 上的非聚集索引检索行而不是扫描基表是合理的。


  在索引键列上保持更新、准确的统计信息，有助于优化器对处理策略做出更优决策，从而将逻辑读取次数从 84 次减少到 4 次，并将执行时间从 16 毫秒减少到 0 毫秒（存在
  -4 毫秒的延迟时间）。


  在继续之前，请为数据库重新开启统计信息。


  ```

  ALTER DATABASE AdventureWorks2017 SET AUTO_CREATE_STATISTICS ON;

  ALTER DATABASE AdventureWorks2017 SET AUTO_UPDATE_STATISTICS ON;

  ```


  ## 建议


  在本章中，我涵盖了关于统计信息的各种建议。为方便查阅，我将这些建议整理并扩展，置于以下各节中。


  ## 统计信息的向后兼容性


  SQL Server 2014 及更高版本中的统计信息生成方式可能与之前版本的 SQL Server 不同。SQL Server 在升级过程中会传输统计信息，并且默认情况下，会随着数据的变化随时间自动更新这些统计信息。最佳方法是遵循第
  10 章（关于查询存储）中概述的指导，让统计信息随时间更新。


  ##### 自动创建统计信息


  此功能通常应保持开启。在默认设置下，在创建执行计划期间，SQL Server 会确定非索引列上的统计信息是否有用。如果认为有益，SQL Server 就会在该非索引列上创建统计信息。但是，如果您计划手动在非索引列上创建统计信息，那么您必须准确识别哪些非索引列上的统计信息会带来好处。




  ##### 自动更新统计信息


  此功能通常应保持开启，以便 SQL Server 能够根据数据分布随时间的变化来决定合适的执行计划。通常，此功能带来的性能收益会超过其开销成本。您很少需要干预统计信息的自动维护，这类要求通常是在排查故障或分析性能时才被识别出来。为了确保您不会因自动统计信息功能而面临意外情况，在诊断
  SQL Server 问题时，分析统计信息的有效性至关重要。


  不幸的是，如果您遇到自动更新统计信息功能的问题并不得不将其关闭，请务必创建一个 SQL Server 作业来更新统计信息，并将其安排在定期的时间间隔运行。出于性能原因，在可能的情况下，请确保该
  SQL 作业被安排在非高峰时段运行。


  最佳的统计信息维护方法之一是运行由 Ola Holengren 开发和维护的脚本（`http://bit.ly/JijaNI`）。


  ## 异步自动更新统计信息


  在大多数情况下，默认行为（在生成执行计划前等待统计信息更新）是可行的。在极少数情况下，如果统计信息更新或由此更新导致的执行计划重新编译开销很大（比过时统计信息的开销还要大），那么您可以开启统计信息的异步更新。需要理解的是，这可能意味着那些本可从最新的统计信息中受益的存储过程，在下一次运行之前性能会受到影响。别忘了——您确实需要启用自动更新统计信息才能启用异步更新。


  ## 用于收集统计信息的采样量


  通常建议使用默认采样率。这个比率是由一个高效的算法根据数据大小和修改数量决定的。尽管默认采样率在大多数情况下被证明是最佳的，但如果对于某个特定查询，您发现统计信息不是很准确或缺失了关键的数据分布，那么您可以使用
  `FULLSCAN` 手动更新它们。您也可以使用 `SAMPLE` number 选项来设置特定的采样百分比。该数值可以是百分比，也可以是固定的行数。


  如果这种情况需要重复处理，那么您可以添加一个 SQL Server 作业来处理它。出于性能原因，请确保 SQL 作业安排在非高峰时段运行。要识别默认采样率并非最佳的情况，请在排查数据库性能问题时，分析高开销查询的统计信息有效性。请记住，`FULLSCAN`
  开销很大，因此只应在那些您确定真正会受益的表或索引上运行它。


  ## 总结


  正如本章所讨论的，SQL Server 基于成本的优化器需要关于过滤和连接条件中使用的列的准确统计信息，以确定高效的处理策略。索引键上的统计信息总是在创建索引时创建，并且默认情况下，SQL
  Server 也会随着数据的变化而更新索引列和非索引列上的统计信息。这使其能够确定适用于当前数据分布的最佳处理策略。


  尽管您可以禁用自动创建统计信息和自动更新统计信息功能，但建议您保持这些功能为 `on` 状态，因为它们给优化器带来的好处几乎总是超过其开销成本。对于一个开销大的查询，应分析统计信息以确保自动统计信息维护能兑现其承诺。最好的消息是，只要稍加留心，您就可以高枕无忧，因为自动统计信息在大多数时候都能很好地完成工作。如果使用手动统计信息维护程序，那么您可以使用
  SQL Server 作业来自动化这些程序。


  即使有适当的索引和统计信息，一个严重碎片化的数据库也会导致数据检索成本增加。在下一章中，您将了解索引中的碎片如何影响查询性能，并将学习如何在需要时分析和解决碎片问题。


  '
- "# 14. 索引碎片\n\n如第 8 章所述，行存储索引列值存储在索引的 B 树结构的叶级页中。列存储索引也存储在页中，但不在 B 树结构中。当您在表上创建索引（聚集或非聚集）时，通过正确排序索引的叶级页和叶级页内的行，可以降低数据检索成本，而列存储则将数据透视成列然后进行压缩，同样旨在辅助数据检索。在\
  \ OLTP 数据库中，数据不断变化，导致索引碎片化。结果，返回相同行数所需的读取次数随时间增加。当数据从增量存储移动到分段存储区域时，列存储也会出现类似情况。这两种情况都可能导致性能下降。\n\
  \n在本章中，我将涵盖以下主题：\n\n*   索引碎片的原因，包括对由 `INSERT` 和 `UPDATE` 语句引起的页拆分的分析\n\n*   列存储索引碎片的原因\n\
  \n*   与碎片相关的开销成本\n\n*   如何分析行存储和列存储索引中的碎片量\n\n*   用于解决碎片的技术\n\n*   填充因子在帮助控制行存储索引碎片方面的重要性\n\
  \n*   如何自动化碎片分析过程\n\n\n\n## 关于碎片化的讨论\n\n当前，在数据平台社区内，关于碎片化到底在多大程度上构成问题，存在着大量讨论。在深入探讨什么是碎片化、它可能如何影响您的查询，以及如果它确实发生您该如何应对这些细节之前，我们应当立即解答这个问题：您应该对索引进行碎片整理吗？我决定将这个讨论置于碎片化工作原理的所有细节之前，因此如果您对此仍感疑惑，请跳过本节，直接阅读“碎片化的成因”。\n\
  \n当您的索引和表出现碎片时，它们确实会占用更多空间，即需要更多的页。这会根据索引类型的不同，以不同方式将它们分布在磁盘上。在处理一个存在碎片的索引并进行点查找（point\
  \ lookup）或非常有限的范围扫描时，碎片化根本不会影响性能。但在处理一个存在碎片的索引并进行大型扫描时，需要在磁盘上穿过更多的页，这肯定会影响性能。从这个角度来看，您可以简单地决定只在进行大量扫描和大规模数据移动时才对索引进行碎片整理。\n\
  \n然而，事情远不止于此。碎片整理本身会给系统带来负载，导致阻塞和额外工作，从而影响系统性能。随后，您的索引又会再次开始碎片化的过程，包括页拆分和行重新排列，再次带来性能问题。有一种有力的观点认为，让系统达到一个平衡点，在这个点上页足够空，使得拆分停止（或大幅减少），将实现更好的整体性能。这是因为，相比于给系统施加压力重建索引，然后忍受索引再次变动时所有的页拆分，您只需减少页拆分的发生。您仍然需要处理较慢的扫描，但对于现代磁盘子系统来说，这就不那么令人头疼了。\n\
  \n考虑到所有这些因素，我强烈倾向于“停止对索引进行碎片整理”这一阵营。只要您设置了适当的填充因子，您就应该看到页拆分活动的大幅减少。然而，您最好的选择是使用本章概述的工具来监控您的系统。很可能我们所有人都处于混合模式中，即一些表和索引需要进行碎片整理，而另一些则应该置之不理。这完全取决于您系统的行为。\n\
  \n## 碎片化的成因\n\n当表中的数据被修改时，就会发生碎片化。对于 `rowstore` 和 `columnstore` 索引都是如此。当您在表中添加或删除数据（通过\
  \ `INSERT` 或 `DELETE`）时，表对应的聚集索引和受影响的非聚集索引都会被修改。`rowstore` 和 `columnstore` 这两种索引类型从这一点开始有所不同。我们将从\
  \ `rowstore` 开始逐一讨论。\n\n### 数据修改与行存储索引\n\n通过 `INSERT`、`UPDATE` 或 `MERGE` 修改数据时，如果对索引的修改无法在同一页面内容纳，就可能导致索引叶页拆分。通过\
  \ `DELETE` 删除数据则只是在现有页面中留下空白。当发生页拆分时，将添加一个新的叶页，其中包含原页面的一部分，并维护索引键中行的逻辑顺序。尽管新的叶页维护了原页面中数据行的*逻辑*顺序，但这个新页面通常不会在磁盘上与原页面*物理*相邻。说得稍微不同一点，就是索引的逻辑键顺序与文件内的物理顺序不匹配。\n\
  \n例如，假设一个索引有九个键值（或索引行），并且索引行的平均大小允许一个叶页最多容纳四个索引行。如第 9 章所述，8KB 的叶页与前一个和后一个叶页相连，以维护索引的逻辑顺序。图\
  \ 14-1 展示了该索引叶页的布局。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig1_HTML.jpg](img/323849_5_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1：叶页布局\n\n由于叶页中的索引键值始终是排序的，一个键值为 25 的新索引行必须占据现有键值 20 和 30 之间的位置。因为包含这些现有索引键值的叶页已经满了（有四个索引行），新索引行将导致相应的叶页拆分。将为索引分配一个新的叶页，并将第一个叶页的一部分移动到这个新叶页，以便新的索引键可以按正确的逻辑顺序插入。索引页之间的链接也会被更新，使页面按索引顺序逻辑连接。如图\
  \ 14-2 所示，新的叶页即使按正确的逻辑顺序链接到其他页面，在物理顺序上也可能错乱。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig2_HTML.jpg](img/323849_5_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2：顺序错乱的叶页\n\n页面被分组到更大的单元中，称为 `区`（`extents`），每个区可以包含八个页面。SQL Server 使用 `区`\
  \ 作为磁盘上分配的物理单元。理想情况下，包含索引叶页的区的物理顺序应该与索引的逻辑顺序相同。这减少了检索一系列索引行时在区之间切换的次数。然而，页拆分会导致区内的页面物理顺序错乱，也可能导致区本身物理顺序错乱。例如，假设索引的前两个叶页在区\
  \ 1 中，第三个叶页在区 2 中。如果区 2 有空闲空间，那么由于页拆分而分配给索引的新叶页将位于区 2 中，如图 14-3 所示。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig3_HTML.jpg](img/323849_5_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3：分布在不同区上的顺序错乱的叶页\n\n叶页分布在两个区之间，理想情况下，您期望读取一系列索引行时最多只需要在两个区之间切换一次。然而，页面在区之间的错乱组织可能导致在检索一系列索引行时需要进行多次区切换。例如，要检索键值在\
  \ 25 到 90 之间的一系列索引行，您将需要在两个区之间进行三次区切换，如下所示：\n\n*   第一次区切换：在键值 25 之后读取键值 30\n*  \
  \ 第二次区切换：在键值 40 之后读取键值 50\n*   第三次区切换：在键值 80 之后读取键值 90\n\n这种碎片化称为 `外部碎片化`。`外部碎片化`\
  \ 可能是不可取的。\n\n碎片化也可能发生在一个索引页面内部。如果一次 `INSERT` 或 `UPDATE` 操作导致了页拆分，那么原始叶页中就会留下空闲空间。`DELETE`\
  \ 操作也可能造成空闲空间。最终效果是减少了叶页中包含的行数。例如，在图 14-3 中，由 `INSERT` 操作引起的页拆分在第一个叶页内创建了空白空间。这被称为\
  \ `内部碎片化`。\n\n对于一个高事务性的数据库，有意在叶页中留出一些空闲空间是可取的，这样您就可以在不引起页拆分的情况下添加新行或更改现有行的大小。在图\
  \ 14-3 中，第一个叶页内的空闲空间允许将一个键值为 26 的索引添加到叶页，而不会引起页拆分。\n\n\n\n### 注意\n\n请注意，此处的索引碎片与磁盘碎片不同。由于\
  \ SQL Server 文件中页面的顺序仅由 SQL Server 理解，操作系统并不理解，因此无法简单地通过运行磁盘碎片整理工具来修复索引碎片。\n\n堆表页面也可能以相同方式变得碎片化。不幸的是，由于堆的存储方式以及任何非聚集索引如何使用物理数据位置从堆中检索数据，对堆进行碎片整理是相当有问题的。你可以使用\
  \ `ALTER TABLE` 的 `REBUILD` 命令来执行堆重建，但需要明白这会强制重建与该表关联的所有非聚集索引。\n\nSQL Server 2017\
  \ 通过一个名为 `sys.dm_db_index_physical_stats` 的动态管理视图公开叶子和非叶子页面以及其他数据。它存储索引大小和碎片信息。我将在下一节更详细地介绍它。这个\
  \ DMV 比旧的 `DBCC SHOWCONTIG` 更容易使用。\n\n现在让我们来看看碎片化的机制。\n\n#### 由 UPDATE 语句引起的页面拆分\n\
  \n为了演示由 `UPDATE` 语句导致的页面拆分，我将使用一个构造的表。这个小测试表将有一个聚集索引，该索引将一个叶子（或数据）页内的行排序如下：\n\n\
  ```\nUSE AdventureWorks2017;\nGO\nDROP TABLE IF EXISTS dbo.Test1;\nGO\nCREATE TABLE\
  \ dbo.Test1 (C1 INT,\nC2 CHAR(999),\nC3 VARCHAR(10))\nINSERT INTO dbo.Test1\nVALUES\
  \ (100, 'C2', ''),\n(200, 'C2', ''),\n(300, 'C2', ''),\n(400, 'C2', ''),\n(500,\
  \ 'C2', ''),\n(600, 'C2', ''),\n(700, 'C2', ''),\n(800, 'C2', '');\nCREATE CLUSTERED\
  \ INDEX iClust ON dbo.Test1 (C1);\n```\n\n聚集索引叶子页（不包括内部开销）中的行平均大小不仅是聚集索引列平均大小的总和；它是表中所有列平均大小的总和，因为聚集索引的叶子页和表的数据页是同一个。因此，基于先前示例数据的聚集索引中行的平均大小如下：\n\
  \n```\n= (Average size of [C1]) + (Average size of [C2]) + (Average size of [C3])\
  \ bytes = (Size of INT) + (Size of CHAR(999)) + (Average size of data in [C3]) bytes\n\
  = 4 + 999 + 0 = 1,003 bytes\n```\n\nSQL Server 中行的最大大小为 8,060 字节。因此，如果内部开销不是非常高，所有八行都可以容纳在一个\
  \ 8KB 页面中。\n\n要确定分配给 `iClust` 聚集索引的叶子页数量，请针对 `sys.dm_db_index_physical_stats` 执行\
  \ `SELECT` 语句。\n\n```\nSELECT ddips.avg_fragmentation_in_percent,\nddips.fragment_count,\n\
  ddips.page_count,\nddips.avg_page_space_used_in_percent,\nddips.record_count,\n\
  ddips.avg_record_size_in_bytes\nFROM sys.dm_db_index_physical_stats(DB_ID('AdventureWorks2017'),\n\
  OBJECT_ID(N'dbo.Test1'),\nNULL,\nNULL,\n'Sampled') AS ddips;\n```\n\n你可以在图 14-4\
  \ 中看到此查询的结果。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig4_HTML.jpg](img/323849_5_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4　索引 iClust 的物理布局\n\n从这个输出的 `page_count` 列中，你可以看到分配给聚集索引的页数为 1。你还可以在 `avg_page_space_used_in_percent`\
  \ 列中看到平均使用空间为 100。由此你可以推断，该页没有剩余的自由空间来扩展 `C3` 的内容，`C3` 的类型为 `VARCHAR(10)`，当前为空。\n\
  \n> **注意**：我将在本章后面的“分析碎片量”一节中分析 `sys.dm_db_index_physical_stats` 提供的更多信息。\n\n因此，如果你尝试按如下方式扩展其中一行\
  \ `C3` 列的内容，它将导致页面拆分：\n\n```\nUPDATE dbo.Test1\nSET C3 = 'Add data'\nWHERE C1 =\
  \ 200;\n```\n\n从 `sys.dm_db_index_physical_stats` 中选择数据，会得到图 14-5 中的信息。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig5_HTML.jpg](img/323849_5_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5　数据更新后的 i1 索引\n\n从图 14-5 的输出中，你可以看到 SQL Server 已向索引添加了一个新页面。在页面拆分时，SQL Server\
  \ 通常将原始页面中的总行数的一半移动到新页面。因此，两个页面中的行分布如图 14-6 所示。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig6_HTML.jpg](img/323849_5_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6　由 UPDATE 语句引起的页面拆分\n\n从前表可以看出，由 `UPDATE` 语句引起的页面拆分导致叶子页面中的数据出现内部碎片。如果新的叶子页无法物理上写在原始叶子页旁边，那么也会出现外部碎片。对于碎片量大的大表，将需要更多的叶子页来容纳所有索引行。\n\
  \n另一种查看页面分布的方法是使用一些未充分记录的 `DBCC` 命令。首先，你可以使用 `DBCC IND` 查看表中的页面。\n\n```\nDBCC IND(AdventureWorks2017,\
  \ 'dbo.Test1', -1);\n```\n\n此命令列出构成表的页面。你会得到类似图 14-7 的输出。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig7_HTML.jpg](img/323849_5_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7　显示两个页面的 DBCC IND 输出\n\n如果你关注 `PageType`，你可以看到现在有两个 `PageType = 1` 的页面，这是数据页。输出中还有其他列也显示了页面是如何链接在一起的。\n\
  \n要查看前述页面中行的最终分布，你可以在每个页面末尾添加一行。\n\n```\nINSERT INTO dbo.Test1\nVALUES (410, 'C4',\
  \ ''),\n(900, 'C4', '');\n```\n\n这些新行被容纳在现有的两个叶子页中，而不会导致页面拆分。你可以通过查询查看页面信息的另一种机制\
  \ `DBCC PAGE` 来确认这一点。要调用此命令，你需要从 `DBCC IND` 的输出中获取 `PagePID`。这将使你能够拉回页面上所有内容的完整转储。\n\
  \n```\nDBCC TRACEON(3604);\nDBCC PAGE('AdventureWorks2017',1,24256,3);\n```\n\n\
  此命令的输出解释起来很复杂，但如果你向下滚动到末尾，可以看到输出，如图 14-8 所示。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig8_HTML.jpg](img/323849_5_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8　添加更多行后的页面\n\n在屏幕的右侧，你可以看到内存转储的输出，一个值 `C4`。那是先前的数据添加的。在我的测试中，两行都被添加到同一页中。全面解释这两个\
  \ `DBCC` 调用的所有可能排列远远超出了本章的范围。要知道，你可以确定任何给定表的数据存储在哪个页面上。\n\n\n\n### 由 INSERT 语句导致的页分裂\n\
  \n要理解 `INSERT` 语句如何导致页分裂，请创建与之前相同的测试表，包含八行初始数据和聚集索引。由于单个索引叶页已完全填满，任何尝试添加如下中间行的操作都将导致叶页发生页分裂：\n\
  \n```sql\nINSERT INTO Test1\nVALUES (110, 'C2', '');\n```\n\n您可以通过检查 `sys.dm_db_index_physical_stats`\
  \ 的输出来验证这一点（图 14-9）。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig9_HTML.jpg](img/323849_5_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9\n\n插入后的页\n\n如前所述，原始叶页中的一半行被移动到新页。一旦原始叶页中清除了空间，新行就会按适当的顺序添加到原始叶页中。请注意，一行只与一个页相关联；它不能跨多个页。图\
  \ 14-10 显示了两个页中行的最终分布。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig10_HTML.jpg](img/323849_5_En_14_Fig10_HTML.jpg)\n\
  \n图 14-10\n\n由 INSERT 语句导致的页分裂\n\n从之前的索引页中，您可以看到由 `INSERT` 语句导致的页分裂使行稀疏地分布在叶页上，从而导致了内部碎片。它通常也会导致外部碎片，因为新的叶页在物理上可能不与原始页相邻。对于具有大量碎片的大型表，由\
  \ `INSERT` 语句引起的页分裂将需要更多数量的叶页来容纳所有索引行。\n\n为了演示索引页中显示的行分布，您可以再次运行创建 `dbo.Test1` 的脚本，并向这些页添加更多行。\n\
  \n```sql\nINSERT  INTO dbo.Test1\nVALUES  (410, 'C4', ''),\n(900, 'C4', '');\n```\n\
  \n结果与之前的示例相同：这些新行可以容纳在两个现有的叶页中，不会引起任何页分裂。您可以通过调用 `DBCC IND` 和 `DBCC PAGE` 来验证这一点。请注意，在第一个页中，新行被添加到该页中其他行之间。由于页内有可用空间，这不会导致页分裂。\n\
  \n那么，当您必须向索引的末尾添加行时呢？在这种情况下，即使需要一个新页，它也不会拆分任何现有页。例如，添加一个 `C1` 等于 1,300 的新行将需要一个新页，但由于该行不是添加在中间位置，因此不会导致页分裂。因此，如果新行是按照聚集索引的顺序添加的，那么索引行将始终添加在索引的末尾，从而防止了原本可能由\
  \ `INSERT` 语句引起的页分裂。但是，在这种情况下，您也会遇到所谓的 *热页*。热页是指所有插入操作都试图写入数据库中的单个页，从而导致阻塞。根据您的系统及其负载情况，这可能比页分裂更成问题，因此请务必监视您的等待统计信息以了解系统的行为。\n\
  \n### 数据修改与列存储索引\n\n与行存储索引类似，列存储索引也可能受到碎片化的影响。当首次加载列存储索引时（假设至少有 102,400 行），数据会存储到构成列存储索引的压缩列段中。任何少于\
  \ 102,400 行的数据都存储在增量存储中，如果您还记得第 9 章的内容，它只是一个常规的 B 树索引。存储在压缩列段中的数据没有碎片。为了避免随着时间的推移产生碎片，在可能的情况下，所有更改都存储在增量存储中，正是为了避免碎片化压缩列段。所有更改、更新和删除，在索引被重组或重建之前，都作为逻辑更改存储在增量存储中。所谓逻辑更改，我的意思是对于删除操作，数据被标记为已删除，但并未被移除。对于更新操作，旧值被标记为已删除，新值被添加。虽然列存储不会以页分裂的方式产生碎片，但这些逻辑删除代表了列存储索引的碎片化。逻辑删除越多，索引的逻辑碎片就越多。最终，您需要修复它。\n\
  \n为了直观地看到碎片化，我将使用在第 9 章创建的大列存储表。在这里，我将修改其中一个表，将其转换为聚集列存储索引：\n\n```sql\nALTER TABLE\
  \ dbo.bigTransactionHistory\nDROP CONSTRAINT pk_bigTransactionHistory;\nCREATE CLUSTERED\
  \ COLUMNSTORE INDEX cci_bigTransactionHistory\nON dbo.bigTransactionHistory;\n```\n\
  \n要查看聚集列存储索引内的逻辑碎片化，我们将查看系统视图 `sys.column_store_row_groups`，执行类似这样的查询：\n\n```sql\n\
  SELECT OBJECT_NAME(i.object_id) AS TableName,\n       i.name AS IndexName,\n   \
  \    i.type_desc,\n       csrg.partition_number,\n       csrg.row_group_id,\n  \
  \     csrg.delta_store_hobt_id,\n       csrg.state_description,\n       csrg.total_rows,\n\
  \       csrg.deleted_rows,\n       100 * (total_rows - ISNULL(deleted_rows, 0))\
  \ / total_rows AS PercentFull\nFROM sys.indexes AS i\nJOIN sys.column_store_row_groups\
  \ AS csrg\n    ON i.object_id = csrg.object_id\n    AND i.index_id = csrg.index_id\n\
  WHERE name = 'cci_bigTransactionHistory'\nORDER BY OBJECT_NAME(i.object_id),\n \
  \        i.name,\n         row_group_id;\n```\n\n在 `dbo.bigTransactionHistory` 上新建索引后，我们可以预期没有由删除行引起的逻辑碎片。如果您运行前面的查询，可以看到这一点。它将显示\
  \ 31 个行组，其中任何行组删除的行数都为零。您会看到一些行组的行数少于最大值。这不是问题；这只是数据加载的产物。让我们删除几行。\n\n```sql\nDELETE\
  \ dbo.bigTransactionHistory\nWHERE Quantity = 13;\n```\n\n现在当我们运行前面的查询时，我们可以看到列存储索引的逻辑碎片，如图\
  \ 14-11 所示。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig11_HTML.jpg](img/323849_5_En_14_Fig11_HTML.jpg)\n\
  \n图 14-11\n\n聚集列存储索引的碎片化\n\n您可以看到所有行组都受到 `DELETE` 操作的影响，现在碎片化程度在 98% 到 99% 之间。\n\
  \n## 碎片化开销\n\n碎片化开销主要包括从磁盘读取更多页所带来的额外开销。从磁盘读取更多页意味着读入内存的页也更多。这两者都会给系统带来压力，因为您需要使用越来越多的资源来处理索引碎片化的存储。正如我在开篇关于碎片化的讨论中所述，对于某些系统，这可能不是问题。然而，对于另一些系统，它确实是问题。我们将详细讨论行存储和列存储索引中负载的具体来源细节。\n\
  \n\n\n### 行存储开销\n\n内部和外部碎片都会对数据检索性能产生不利影响。外部碎片导致磁盘上的索引页序列不连续，新的叶页远离原始的叶页，并且其物理排序与逻辑排序不同。因此，正如本章前面所解释的，对索引进行范围扫描将需要比理想情况下更多的在相应区之间的切换。此外，对索引进行范围扫描将无法受益于磁盘执行的预读操作。如果页被连续排列，那么预读操作可以提前读取页而无需过多的磁头移动。\n\
  \n为了获得更好的性能，最好使用顺序 I/O，因为这可以在单个磁盘 I/O 操作中读取整个区（八个 8KB 页）。相比之下，页的非连续布局需要非顺序或随机 I/O\
  \ 操作来从磁盘检索索引页，而随机 I/O 操作在单个磁盘操作中只能读取 8KB 数据（但是，如果你只检索一行，这也许可以接受）。硬盘驱动器，尤其是 SSD 的速度不断提高，已经降低了这个问题的影响，但在某些情况下它仍然存在。\n\
  \n在内部碎片的情况下，行稀疏地分布在大量页上，增加了将索引页读入内存所需的磁盘 I/O 操作数量，并增加了从内存中检索多个索引行所需的逻辑读取数量。如前所述，尽管它增加了数据检索的成本，但少量的内部碎片可能是有益的，因为它允许你执行\
  \ `INSERT` 和 `UPDATE` 查询而不会导致页面拆分。对于不需要遍历一系列页面来检索数据的查询，碎片的影响可能微乎其微。换句话说，从索引中检索单个值不会受到碎片的影响；或者，最多，它可能需要在\
  \ B 树中多向下遍历一层。\n\n要了解碎片如何影响查询的性能，请创建一个带有聚集索引的测试表，并向表中插入一个高度碎片化的数据集。由于在有序数据集之间执行\
  \ `INSERT` 操作可能导致页面拆分，你可以通过按以下顺序添加行来轻松创建碎片化的数据集：\n\n```\nDROP TABLE IF EXISTS dbo.Test1;\n\
  GO\nCREATE TABLE dbo.Test1 (C1 INT,\nC2 INT,\nC3 INT,\nc4 CHAR(2000));\nCREATE CLUSTERED\
  \ INDEX i1 ON dbo.Test1 (C1);\nWITH Nums\nAS (SELECT TOP (10000)\nROW_NUMBER() OVER\
  \ (ORDER BY (SELECT 1)) AS n\nFROM master.sys.all_columns AS ac1\nCROSS JOIN master.sys.all_columns\
  \ AS ac2)\nINSERT INTO dbo.Test1 (C1,\nC2,\nC3,\nc4)\nSELECT n,\nn,\nn,\n'a'\nFROM\
  \ Nums;\nWITH Nums\nAS (SELECT 1 AS n\nUNION ALL\nSELECT n + 1\nFROM Nums\nWHERE\
  \ n < 10000)\nINSERT INTO dbo.Test1 (C1,\nC2,\nC3,\nc4)\nSELECT 10000 - n,\nn,\n\
  n,\n'a'\nFROM Nums\nOPTION (MAXRECURSION 10000);\n```\n\n要确定从这个碎片化的表中检索小结果集和大结果集所需的逻辑读取次数，请使用扩展事件会话执行以下两个\
  \ `SELECT` 语句（在这种情况下，`sql_batch_completed` 就足够了），以监控查询性能：\n\n```\n--读取 6 行\nSELECT\
  \ *\nFROM dbo.Test1\nWHERE C1 BETWEEN 21\nAND     23;\n--读取所有行\nSELECT *\nFROM dbo.Test1\n\
  WHERE C1 BETWEEN 1\nAND     10000;\n```\n\n各个查询执行的逻辑读取次数分别如下：\n\n```\n6 行\n读取次数:8\n\
  持续时间:2.6ms\n所有行\n读取次数:2542\n持续时间:475ms\n```\n\n要评估碎片化数据集如何影响逻辑读取次数，请通过重建聚集索引重新排列索引叶页的物理顺序。\n\
  \n```\nALTER INDEX i1 ON dbo.Test1 REBUILD;\n```\n\n索引叶页按正确顺序重新排列后，重新运行查询。前述两个 `SELECT`\
  \ 语句所需的逻辑读取次数分别减少到 5 和 13。\n\n```\n6 行\n读取次数:6\n持续时间:1ms\n所有行\n读取次数:2536\n持续时间:497ms\n\
  ```\n\n较小数据集的性能有所改善，但较大数据集的性能变化不大，因为仅仅减少几个页不太可能产生太大影响。由于碎片导致的成本开销通常随着检索行数的增加而增加，因为这涉及到读取更多乱序的页。对于*点查询*（只检索一行的查询），碎片通常无关紧要，因为该行仅从一个叶页检索，但情况并非总是如此。由于索引的内部结构，碎片甚至可能增加点查询的成本。\n\
  \n### 注意\n\n本节的经验是，为了获得更好的查询性能，分析索引中的碎片量并在需要时重新排列它非常重要。\n\n### 列存储开销\n\n虽然在处理列存储索引的逻辑碎片时，你不需要处理磁盘上重新排列的页，但你仍然会看到性能影响。被删除的值存储在与行组关联的\
  \ B 树索引中。任何数据检索都必须对这些数据执行额外的外部连接。你无法在执行计划中看到这一点，因为它是一个内部过程。然而，你可以在针对碎片化列存储索引的查询性能中看到它。\n\
  \n为了演示这一点，我们将从一个利用列存储索引的查询开始，如下所示：\n\n```\nSELECT bth.Quantity,\nAVG(bth.ActualCost)\n\
  FROM dbo.bigTransactionHistory AS bth\nWHERE bth.Quantity BETWEEN 8\nAND     15\n\
  GROUP BY bth.Quantity;\n```\n\n如果你运行此查询，平均会得到如下性能指标：\n\n```\n读取次数:20932\n持续时间:70ms\n\
  ```\n\n如果我们要对索引进行碎片化，特别是在我们查询的信息范围内，如下所示：\n\n```\nDELETE dbo.bigTransactionHistory\n\
  WHERE Quantity BETWEEN 9\nAND     12;\n```\n\n那么性能指标会发生变化，如下所示：\n\n```\n读取次数:20390\n\
  持续时间:79ms\n```\n\n请注意，读取次数已经下降，因为为了得到结果，总体上处理的数据量变少了。然而，性能从 70ms 下降到了 79ms。这是因为索引的碎片化，我们可以看到在图\
  \ 14-12 中情况变得更糟了。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig12_HTML.jpg](img/323849_5_En_14_Fig12_HTML.jpg)\n\
  \n图 14-12\n\n聚集列存储索引的碎片化增加\n\n\n\n## 分析碎片化程度\n\n你已经了解了如何确定列存储索引的碎片化情况。对于行存储索引，我们可以做同样的事情。你可以通过使用\
  \ `sys.dm_db_index_physical_stats` 动态管理函数来分析索引的碎片化比率。对于具有聚集索引的表，聚集索引的碎片化与数据页的碎片化一致，因为聚集索引的叶级页和数据页是相同的。`sys.dm_db_index_physical_stats`\
  \ 也会指出堆表（即没有聚集索引的表）的碎片化程度。由于堆表不要求任何行排序，因此页的逻辑顺序对堆表来说并不相关。\n\n`sys.dm_db_index_physical_stats`\
  \ 的输出显示了索引（或表）的页和区的信息。对于索引中的 B 树的每一层，都会返回一行。对于堆中的每个分配单元，也会返回一行。如前所述，在 SQL Server\
  \ 中，八个连续的 8KB 页被组合在一起，形成一个大小为 64KB 的区。对于小表（远小于 64KB），一个区中的页可以属于多个索引或表——这些被称为 *mixed\
  \ extents* 。如果数据库中有大量小表，混合区有助于 SQL Server 节省磁盘空间。\n\n随着表（或索引）增长并请求超过八个页，SQL Server\
  \ 会创建一个专用于该表（或索引）的区，并分配该区中的页。这样的区称为 *uniform extent* ，它为同一个表（或索引）提供最多八个页请求。统一区有助于\
  \ SQL Server 连续地布局表（或索引）的页。它们还将页创建请求数量减少了八分之一，因为一组八个页是以区的形式创建的。存储在统一区中的信息仍然可能是碎片化的，但访问页的分配将高效得多。如果你有混合区，即多个对象共享的页，以及这些区内的碎片化，访问信息就会变得更加成问题。但是对混合区不会进行碎片整理。\n\
  \n为了分析索引的碎片化，让我们使用“碎片化开销”部分中使用的碎片化数据集重新创建表。你可以通过执行之前使用的针对 `sys.dm_db_index_physical_stats`\
  \ 动态视图的查询来获取聚集索引的碎片化详细信息（图 14-13）。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig13_HTML.jpg](img/323849_5_En_14_Fig13_HTML.jpg)\n\
  \n图 14-13 碎片化统计信息\n\n```sql\nSELECT ddips.avg_fragmentation_in_percent,\nddips.fragment_count,\n\
  ddips.page_count,\nddips.avg_page_space_used_in_percent,\nddips.record_count,\n\
  ddips.avg_record_size_in_bytes\nFROM sys.dm_db_index_physical_stats(DB_ID('AdventureWorks2017'),\n\
  OBJECT_ID(N'dbo.Test1'),\nNULL,\nNULL,\n'Sampled') AS ddips;\n```\n\n动态管理函数 `sys.dm_db_index_physical_stats`\
  \ 扫描索引的页来返回数据。你可以控制扫描的级别，这会影响扫描的速度和准确性。要快速检查索引的碎片化，请使用 Limited 选项。通过使用 Sample 选项（如前面的示例所示，扫描\
  \ 1% 的页），你可以在速度仅适度降低的情况下获得更高的准确性。对于最高的准确性，请使用 Detailed 扫描，它会访问索引中的所有页。但要注意，根据表和索引的大小，Detailed\
  \ 扫描可能对性能有重大影响。如果索引少于 10,000 页并且你选择了 Sample 模式，那么将使用 Detailed 模式。这意味着无论之前查询中如何选择，都使用了\
  \ Detailed 扫描模式。默认模式是 Limited。\n\n通过定义不同的参数，你可以获取不同数据集上的碎片化信息。如果从前面的查询中移除 `OBJECT_ID`\
  \ 函数并提供 `NULL` 值，该查询将返回数据库中所有索引的信息。不要对此感到惊讶，以免不小心对所有索引运行 Detailed 扫描。你也可以指定你想要信息的索引，甚至是分区索引的分区。\n\
  \n`sys.dm_db_index_physical_stats` 的输出包括 24 个不同的列。我选择了用于确定索引碎片化和大小的基本列集。此输出代表以下内容：\n\
  \n*   `avg_fragmentation_in_percent`：这个数字表示索引和堆的逻辑平均碎片化百分比。如果表是堆并且模式是 Sampled，则此值将为\
  \ `NULL`。如果平均碎片化小于 10% 到 20%，并且表不是非常大，碎片化不太可能成为问题。如果索引在 20% 到 40% 之间，碎片化可能是个问题，但通常可以通过索引重新组织来改善（有关索引重新组织和索引重建的更多信息，请参见“碎片化解决方案”部分）。大规模碎片化，通常大于\
  \ 40%，可能需要索引重建。你的系统可能有不同的要求，这些数字仅供参考。\n\n*   `fragment_count`：这个数字表示构成索引的碎片或分离的页组的数量。这是一个有用的数字，可以了解索引的分布情况，特别是与\
  \ `page_count` 值进行比较时。当采样模式是 Sampled 时，`fragment_count` 为 `NULL`。大的碎片数是存储碎片化的另一个迹象。\n\
  \n*   `page_count`：这个数字是构成统计信息的索引或数据页数量的字面计数。这个数字是大小的度量，但也可以帮助指示碎片化。如果你知道数据或索引的大小，你可以计算多少行可以放在一个页上。如果你将此与表中的行数相关联，你应该得到一个接近\
  \ `page_count` 值的数字。如果 `page_count` 值明显更高，你可能正在处理碎片化问题。请参考 `avg_fragmentation_in_percent`\
  \ 值以获取精确的度量。\n\n*   `avg_page_space_used_in_percent`：要了解索引页内分配的空间量，请使用此数字。当采样模式为\
  \ Limited 时，此值为 `NULL`。\n\n*   `record_count`：简单来说，这是统计信息所代表的记录数。对于索引，这是从扫描模式所代表的\
  \ B 树当前级别中的记录数。（Detailed 扫描将显示 B 树的所有级别，而不仅仅是叶级。）对于堆，此数字表示存在的记录，但此数字可能无法与表中的行数精确对应，因为堆在更新后可能有两条记录，并且可能发生页拆分。\n\
  \n*   `avg_record_size_in_bytes`：这个数字简单地表示索引或堆记录中存储数据量的一个有用度量。\n\n使用 Detailed 扫描运行\
  \ `sys.dm_db_index_physical_stats` 将为给定索引返回多行。也就是说，如果该索引跨越多个级别，则会显示多行。当索引跨越多个页时，索引中会存在多个级别。为了查看这是什么样子，并观察动态管理函数中存在的其他列数据，请按如下方式运行查询：\n\
  \n```sql\nSELECT ddips.*\nFROM sys.dm_db_index_physical_stats(DB_ID('AdventureWorks2017'),\n\
  OBJECT_ID(N'dbo.Test1'),\nNULL,\nNULL,\n'Detailed') AS ddips;\n```\n\n为了使数据可读，我将结果数据表分解为三个部分放在一个图形中；参见图\
  \ 14-14。\n\n\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig14_HTML.jpg](img/323849_5_En_14_Fig14_HTML.jpg)\n\
  \n**图 14-14**  碎片化索引的详细扫描\n\n如你所见，返回了三行数据，分别代表索引的叶级 (`index_level = 0`)、B 树的第一级\
  \ (`index_level = 1`)，即第二行，以及 B 树的第三级 (`index_level = 2`)。你可以看到 `sys.dm_db_index_physical_stats`\
  \ 提供了额外信息，可以对你的索引进行更详细的分析。例如，你可以看到最小和最大的记录大小，以及索引深度（B 树中的级数）和每一级有多少条记录。对于基本的碎片分析来说，这些信息大多不太有用，这就是为什么我在示例中选择限制列数并使用采样扫描模式。你看到的列存储信息主要是非聚集列存储内部结构。`sys.dm_db_index_physical_stats`\
  \ 不会返回有关聚集列存储的信息。相反，如前面所示，你应该使用 `sys.dm_db_column_store_row_group_physical_stats`。\n\
  \n## 分析小表的碎片\n\n不要过度担心 `sys.dm_db_index_physical_stats` 对小表的输出结果。对于小于八页的小表或索引，SQL\
  \ Server 为这些页使用混合区。例如，如果一个表（`SmallTable1` 或其聚集索引）只包含两页，那么 SQL Server 会从一个混合区中分配这两页，而不是将一个专用区分配给该表。该混合区可能还包含其他小表/索引的页，如图\
  \ 14-15 所示。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig15_HTML.jpg](img/323849_5_En_14_Fig15_HTML.jpg)\n\
  \n**图 14-15**  混合区\n\n页分布在多个混合区上，这可能会让你认为表或索引存在大量的外部碎片，但实际上这在 SQL Server 中是设计如此，因此是完全可以接受的。\n\
  \n为了理解小表或索引的碎片信息可能是什么样子，创建一个带有聚集索引的小表。\n\n```sql\nDROP TABLE IF EXISTS dbo.Test1;\n\
  GO\nCREATE TABLE dbo.Test1 (C1 INT,\nC2 INT,\nC3 INT,\nC4 CHAR(2000));\nDECLARE\
  \ @n INT = 1;\nWHILE @n <= 28\nBEGIN\nINSERT INTO dbo.Test1\nVALUES (@n, @n, @n,\
  \ 'a');\nSET @n = @n + 1;\nEND\nCREATE CLUSTERED INDEX FirstIndex ON dbo.Test1 (C1);\n\
  ```\n\n在上面的表中，每个 `INT` 占用 4 字节，平均行大小为 2,012 (= 4 + 4 + 4 + 2,000) 字节。因此，默认的 8KB\
  \ 页最多可以容纳四行。将所有 28 行添加到表中后，创建聚集索引以物理地排列行并将碎片降至最低。在内部碎片最小的情况下，聚集索引（或基表）需要七页 (= 28\
  \ / 4)。由于页数不超过八页，SQL Server 为聚集索引（或基表）使用来自混合区的页。如果用于聚集索引的混合区不是相邻的，那么 `sys.dm_db_index_physical_stats`\
  \ 的输出可能会显示大量的外部碎片。但作为 SQL 用户，你无法减少由此产生的外部碎片。图 14-16 显示了 `sys.dm_db_index_physical_stats`\
  \ 的输出。\n\n![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig16_HTML.jpg](img/323849_5_En_14_Fig16_HTML.jpg)\n\
  \n**图 14-16**  小型聚集索引的碎片\n\n从 `sys.dm_db_index_physical_stats` 的输出中，你可以如下分析小型聚集索引（或表）的碎片：\n\
  \n*   `avg_fragmentation_in_percent`：尽管此索引可能跨越多个区，但此处显示的碎片并不是外部碎片的指示，因为此索引存储在混合区上。\n\
  *   `Avg_page_space_used_in_percent`：这显示了所有或大部分数据都良好地存储在 `pagecount` 字段显示的七页内。这排除了逻辑碎片的可能性。\n\
  *   `Fragment_count`：这显示数据是碎片化的，并且存储在多个区上，但由于其长度小于八页，SQL Server 在存储数据的位置上没有太多选择。\n\
  \n尽管有上述误导性的数值，但小于八页的小表（或索引）不太可能从消除碎片的努力中受益，因为它将存储在混合区上。\n\n一旦确定索引（或表）中的碎片需要处理，就需要决定使用哪种碎片整理技术。影响此决定的因素以及不同的技术将在下一节中解释。\n\
  \n## 碎片解决方案\n\n你可以通过重新排列索引行和页，使其物理顺序和逻辑顺序相匹配来解决索引中的碎片问题。为了减少外部物理碎片，你可以物理地重新排序索引的叶级页，使其遵循索引的逻辑顺序。对于列存储索引，你是在调用\
  \ Tuple Mover，它将关闭增量存储并将其放入压缩段中，或者你在做这件事并强制重新组织数据以实现最佳压缩。你可以通过以下技术实现所有这些：\n\n* \
  \  删除并重新创建索引\n*   使用 `DROP_EXISTING = ON` 子句重新创建索引\n*   在索引上执行 `ALTER INDEX REBUILD`\
  \ 语句\n*   在索引上执行 `ALTER INDEX REORGANIZE` 语句\n\n### 删除并重新创建索引\n\n一种看似最简单的消除索引碎片的方法是删除索引然后重新创建。删除并重新创建索引能最大程度地减少碎片，因为它允许\
  \ SQL Server 为索引使用全新的页面，并适当地用现有数据填充它们。这避免了内部和外部碎片。不幸的是，这种方法有许多严重的缺点。\n\n*   *阻塞*：这种碎片整理技术会给系统增加大量开销，并导致阻塞。删除和重新创建索引会阻塞对该表（或表上任何其他索引）的所有其他请求。它也可能被其他针对该表的请求阻塞。\n\
  *   *索引缺失*：索引被删除后，并且可能被阻塞并等待重新创建，针对该表的查询将无法使用该索引。这可能导致索引原本旨在解决的性能问题。\n*   *非聚集索引*：如果要删除的索引是聚集索引，那么表上的所有非聚集索引必须在聚集索引删除后重建。然后它们必须在聚集索引重新创建后再次重建。这会导致进一步的阻塞和其他问题，例如语句重新编译（在第\
  \ 19 章中详述）。\n*   *唯一约束*：用于定义主键或唯一约束的索引不能使用 `DROP INDEX` 语句移除。此外，唯一约束和主键都可以被外键约束引用。在删除主键之前，必须先移除所有引用该主键的外键。虽然这是可行的，但对于索引碎片整理来说，这是一种有风险且耗时的方法。\n\
  \n可以使用 `ONLINE` 选项来删除聚集索引，这意味着在删除索引时索引仍然可读，但这只能解决之前的阻塞问题。由于所有这些原因，删除并重新创建索引不是生产数据库的推荐技术，尤其是在非高峰时段以外的时间。\n\
  \n\n### 使用 DROP_EXISTING 子句重建索引\n\n为了避免在重建聚集索引时产生重建非聚集索引的额外开销，可以使用 `CREATE INDEX`\
  \ 语句的 `DROP_EXISTING` 子句。这种方法在原子步骤中重建聚集索引，由于行定位器使用的聚集索引键值保持不变，因此避免了重建非聚集索引。要使用 `DROP_EXISTING`\
  \ 子句以原子步骤重建聚集索引键，请按如下方式执行 `CREATE INDEX` 语句：\n\n```sql\nCREATE UNIQUE CLUSTERED\
  \ INDEX FirstIndex\nON dbo.Test1\n(\nC1\n)\nWITH (DROP_EXISTING = ON);\n```\n\n\
  `DROP_EXISTING` 子句可用于聚集和非聚集索引，甚至可以将非聚集索引转换为聚集索引。但是，不能使用它将聚集索引转换为非聚集索引。\n\n这种碎片整理技术的缺点如下：\n\
  \n*   **阻塞**：与 `DROP` 和 `CREATE` 方法类似，此技术也会导致并面临来自访问该表（或该表上的任何索引）的其他查询的阻塞。\n*  \
  \ **带约束的索引**：与第一种方法不同，带有 `DROP_EXISTING` 的 `CREATE INDEX` 语句可用于重建带约束的索引。如果约束是主键或唯一约束与外键关联，那么在\
  \ `CREATE` 语句中未包含 `UNIQUE` 关键字将导致类似以下错误：\n\n```\nMsg 1907, Level 16, State 1, Line\
  \ 1\nCannot recreate index 'PK_Name'. The new index definition does not match the\
  \ constraint being enforced by the existing index.\n```\n\n*   **具有多个碎片化索引的表**：随着表数据碎片化，索引通常也会碎片化。如果使用这种碎片整理技术，则必须识别表上的所有索引并逐个重建。\n\
  \n通过使用 `ALTER INDEX REBUILD`（下一节将解释），可以避免与此技术相关的最后两个限制。\n\n### 执行 ALTER INDEX REBUILD\
  \ 语句\n\n`ALTER INDEX REBUILD` 在原子步骤中重建索引，就像使用 `DROP_EXISTING` 子句的 `CREATE INDEX`\
  \ 一样。由于 `ALTER INDEX REBUILD` 也物理地重建索引，它允许 SQL Server 分配新的页，从而将内部和外部碎片降至最低。但与使用\
  \ `DROP_EXISTING` 的 `CREATE INDEX` 不同，它允许在动态删除和重新创建约束的情况下重建支持 `PRIMARY KEY` 或 `UNIQUE`\
  \ 约束的索引。\n\n对于列存储索引，`REBUILD` 语句将以离线方式完全重建列存储，调用 `Tuple Mover` 移除 `deltastore`，但也会重新排列数据以确保最大有效压缩。对于行存储索引，处理索引碎片化的首选机制是\
  \ `REBUILD`。对于列存储索引，首选方法是下一节详细介绍的 `REORGANIZE` 语句。\n\n要理解使用 `ALTER INDEX REBUILD`\
  \ 来整理行存储索引碎片，请考虑“碎片开销”和“分析碎片量”部分中使用的碎片化表。该表在此重复：\n\n```sql\nDROP TABLE IF EXISTS\
  \ dbo.Test1;\nGO\nCREATE TABLE dbo.Test1 (C1 INT,\nC2 INT,\nC3 INT,\nc4 CHAR(2000));\n\
  CREATE CLUSTERED INDEX i1 ON dbo.Test1 (C1);\nWITH Nums\nAS (SELECT TOP (10000)\n\
  ROW_NUMBER() OVER (ORDER BY (SELECT 1)) AS n\nFROM master.sys.all_columns AS ac1\n\
  CROSS JOIN master.sys.all_columns AS ac2)\nINSERT INTO dbo.Test1 (C1,\nC2,\nC3,\n\
  c4)\nSELECT n,\nn,\nn,\n'a'\nFROM Nums;\nWITH Nums\nAS (SELECT 1 AS n\nUNION ALL\n\
  SELECT n + 1\nFROM Nums\nWHERE n < 10000)\nINSERT INTO dbo.Test1 (C1,\nC2,\nC3,\n\
  c4)\nSELECT 10000 - n,\nn,\nn,\n'a'\nFROM Nums\nOPTION (MAXRECURSION 10000);\n```\n\
  \n如果你查看当前的碎片情况，会发现它同时存在内部和外部碎片。\n\n![内部和外部碎片](img/323849_5_En_14_Fig17_HTML.jpg)\n\
  *图 14-17 内部和外部碎片*\n\n你可以使用 `ALTER INDEX REBUILD` 语句来整理聚集索引（或表）的碎片。\n\n```sql\nALTER\
  \ INDEX i1 ON dbo.Test1 REBUILD;\n```\n\n下图显示了针对 `sys.dm_db_index_physical_stats`\
  \ 执行标准 `SELECT` 语句的输出结果。\n\n![通过 ALTER INDEX REBUILD 解决的碎片](img/323849_5_En_14_Fig18_HTML.jpg)\n\
  *图 14-18 通过 ALTER INDEX REBUILD 解决的碎片*\n\n将图 14-18 中查询的先前结果与之前图 14-18 中的结果进行比较。你可以看到内部和外部碎片都已有效减少。以下是输出分析：\n\
  \n*   **内部碎片**：该表有 20,000 行，平均行大小（2,022.999 字节）允许每页最多容纳四行。如果行经过高度整理以将内部碎片降至最低，则表中应大约有\
  \ 6,000 个数据页（或聚集索引中的叶级页）。在前面的输出中可以观察到以下内容：\n    *   **叶级（或数据）页数**：`pagecount` =\
  \ 6667\n    *   **页中的信息量**：`avg_page_space_used_in_percent` = 75.02%\n*   **外部碎片**：需要大量的区来容纳\
  \ 6,667 页。为了达到最小的外部碎片，区之间不应有任何间隙，并且所有页都应按照索引的逻辑顺序物理排列。前面的输出显示乱序页数 = `avg_fragmentation_in_percent`\
  \ = 0%。这表明该索引得到了有效的碎片整理。随着相互对齐的区减少，访问速度将更快。\n\n\n"
- '# 优化索引重建与整理


  在 SQL Server 2005 及更新版本中，重建索引也会压缩大型对象（LOB）页。您可以通过设置 `LOB_COMPACTION = OFF` 来选择不执行此操作。如果您不担心存储空间，但关心索引重组所需的时间，那么关闭此选项可能是可取的。


  在创建索引时使用 `PAD_INDEX` 设置，它决定了索引中间页上要保留多少可用空间，这有助于处理页拆分。在索引重建过程中会考虑这一点，除非您另有指定，否则新页面将被设置回您在索引创建时确定的原始值。我几乎从未见过这对大多数系统产生重大影响。您需要在您的系统上进行测试，以确定它是否能提供帮助。


  如果您没有另行指定，默认行为是跨所有分区对所有索引进行碎片整理。如果想控制该过程，您只需指定要重建哪个分区。


  如前所述，`ALTER INDEX REBUILD` 技术能有效减少碎片。您也可以使用它在一条语句中重建表的所有索引。

  ```sql

  ALTER INDEX ALL ON dbo.Test1 REBUILD;

  ```

  虽然这是最有效的碎片整理技术，但它确实有一些开销和限制。


  *   **阻塞**：与之前的两种索引重建技术类似，`ALTER INDEX REBUILD` 会在系统中引入阻塞。它会阻止其他所有尝试访问该表（或该表的任何索引）的查询。它也可能被那些查询阻塞。您可以使用
  `ONLINE INDEX REBUILD` 来减少这种情况。

  *   **事务回滚**：由于 `ALTER INDEX REBUILD` 在操作中是完全原子性的，如果它在完成前停止，那么到那时为止执行的所有碎片整理操作都将丢失。您可以使用
  `ONLINE` 关键字运行 `ALTER INDEX REBUILD`，这将减少锁定机制，但会增加重建索引所需的时间。


  在 Azure SQL Database 中引入并在 SQL Server 2017 中可用，您现在有能力重启索引重建操作。您可以重启失败的索引重建，或者可以暂停重建操作，稍后再重启。为此，您还必须使用
  `ONLINE` 重建选项。`ONLINE` 选项显著减少了与重建操作相关的阻塞。要重建一个既是 `ONLINE` 又是 `RESUMABLE` 的索引，您必须在命令中指定所有这些内容。

  ```sql

  ALTER INDEX i1 ON dbo.Test1 REBUILD WITH (ONLINE=ON, RESUMABLE=ON);

  ```

  这将运行索引重建操作，直到完成或直到您发出以下命令：

  ```sql

  ALTER INDEX i1 ON dbo.Test1 PAUSE;

  ```

  这将暂停 `ONLINE` 重建操作，并且相关的表和索引将保持可访问，没有任何阻塞。要重启操作，请使用：

  ```sql

  ALTER INDEX i1 ON dbo.Test1 RESUME;

  ```


  ### 执行 ALTER INDEX REORGANIZE 语句


  对于行存储索引，`ALTER INDEX REORGANIZE` 无需重建索引即可减少索引的碎片。它通过按索引键的逻辑顺序重新排列索引的现有叶级页来减少外部碎片。它压缩页面内的行，减少内部碎片，并丢弃产生的空页。此技术不使用任何新页面进行碎片整理。


  对于列存储索引，`ALTER INDEX REORGANIZE` 将确保列存储索引内的增量存储（deltastore）被清理，并且所有逻辑删除都得到处理。它在保持索引在线且可访问的同时执行此操作。这将确保索引被碎片整理。此外，您可以选择强制压缩所有行组。其功能类似于运行
  `ALTER INDEX REBUILD`，但与 `REBUILD` 过程不同，它在操作期间继续保持索引在线。因此，对于列存储索引，更推荐使用 `ALTER INDEX
  REORGANIZE`。


  为了避免与 `ALTER INDEX REBUILD` 相关的阻塞开销，此技术使用非原子的在线方法。它在执行步骤时，会请求少量锁并持有很短时间。一旦每个步骤完成，它就会释放锁并进入下一步骤。当尝试访问一个页面时，如果发现该页面正在被使用，它会跳过该页面并不再返回。这允许其他查询与
  `ALTER INDEX REORGANIZE` 操作一起在表上运行。此外，如果此操作中途停止，则到那时为止执行的所有碎片整理步骤都将被保留。


  对于行存储索引，由于 `ALTER INDEX REORGANIZE` 不使用任何新页面来重新排序索引，并且它会跳过被锁定的页面，因此此方法提供的碎片整理量通常少于
  `ALTER INDEX REBUILD`。要观察 `ALTER INDEX REORGANIZE` 与 `ALTER INDEX REBUILD` 相比的相对有效性，请使用上一节关于
  `ALTER INDEX REBUILD` 中的测试表进行重建。


  使用之前的脚本重建碎片化的行存储表。要减少聚集行存储索引的碎片，请按如下所示使用 `ALTER INDEX REORGANIZE`：

  ```sql

  ALTER INDEX i1 ON dbo.Test1 REORGANIZE;

  ```

  图 14-19 显示了 `sys.dm_db_index_physical_stats` 的输出结果。


  ![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig19_HTML.jpg](img/323849_5_En_14_Fig19_HTML.jpg)


  **图 14-19** ALTER INDEX REORGANIZE 的结果


  从输出中可以看到，正如前面章节所示，`ALTER INDEX REORGANIZE` 减少碎片的效果不如 `ALTER INDEX REBUILD`。对于高度碎片化的索引，`ALTER
  INDEX REORGANIZE` 操作可能比重建索引花费更长的时间。此外，如果一个索引跨越多个文件，`ALTER INDEX REORGANIZE` 不会在文件之间迁移页面。然而，使用
  `ALTER INDEX REORGANIZE` 的主要优点是它允许其他查询同时访问表（或索引）。


  为了查看列存储索引碎片整理的结果，让我们使用本章前面“Columnstore Overhead”部分中已经碎片化的列存储索引。

  ```sql

  ALTER INDEX ClusteredColumnStoreTest ON dbo.bigTransactionHistory REORGANIZE;

  ```

  `REORGANIZE` 语句的结果如图 14-20 所示。


  ![../images/323849_5_En_14_Chapter/323849_5_En_14_Fig20_HTML.jpg](img/323849_5_En_14_Fig20_HTML.jpg)


  **图 14-20** 在列存储索引上不带压缩执行 REORGANIZE 的结果




