  \ `VARCHAR(8)`，不会引起问题。\n\n在你开始使用强制参数化之前，以下限制列表可能会提供信息来帮助你决定强制参数化是否适用于你的数据库。（这是一个部分列表；完整列表请查阅在线手册。）\n\
  \n*   `INSERT ... EXECUTE` 查询\n*   存储过程、触发器和用户定义函数内部的语句，因为它们已经有执行计划\n*   客户端预备语句（本章后面将详细介绍）\n\
