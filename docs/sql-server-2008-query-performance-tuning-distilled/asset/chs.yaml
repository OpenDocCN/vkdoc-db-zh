  ## 自适应查询处理


  调优查询是本书的目的，所以谈论那些能让你不必调优那么多查询的机制似乎有些违反直觉，但理解 SQL Server 将在哪些地方自动帮助你是值得的。自适应查询处理概述的新机制从根本上是为了在查询执行时改变查询行为。这有助于处理与错误估计的行数和内存分配相关的一些基本问题。目前有三种类型的自适应查询处理，我们将在本章中演示所有三种：

  - 批处理模式内存授予反馈

  - 批处理模式自适应连接

  - 交错执行


  我们已经在第 9 章介绍了自适应连接。我们将按顺序处理自适应查询处理的另外两种机制，从批处理模式内存授予反馈开始。


  ### 批处理模式内存授予反馈


  截至本文撰写时，批处理模式仅受涉及列存储索引（聚集或非聚集）的查询支持。批处理模式本身值得简要解释。在执行计划中的行模式执行期间，每对操作符必须协商它们之间传输的每一行。如果有十行，就有十次协商。如果有一千万行，就有一千万次协商。正如你所能想象的，这变得相当昂贵。因此，在批处理操作中，不是一次处理一行，而是分批进行处理，通常每批最多分布到
  900 行，但这有很多变化。这意味着，移动一千万行不再需要一千万次协商，而只需要这么多：


  一千万行 / ~ 每批 900 行 = 约 11,111 批次


  从一千万次协商减少到大约 11,000 次是一个巨大的改进。此外，因为处理时间被释放出来，并且因为更好的行估计成为可能，你可以在查询执行中获得不同的行为。


  我们将探讨的第一个行为是批处理模式内存授予反馈。在这种情况下，当一个查询以批处理模式执行时，会计算该查询是否获得了过剩或不足的内存。内存不足尤其是一个问题，因为它导致必须分配和使用磁盘来管理过剩，这被称为
  `spill`。拥有更好的内存分配可以提高性能。让我们探索一个例子。


  首先，为了使其工作，请确保你仍然在 `bigTransactionHistory` 表上有一个列存储索引，并且数据库的兼容性模式设置为 140。


  在我们开始之前，我们还可以通过使用 Extended Events 来捕获与内存授予反馈过程直接相关的事件，从而确保我们可以观察到行为。以下是一个执行此操作的脚本：


  ```sql

  CREATE EVENT SESSION MemoryGrant

  ON SERVER

  ADD EVENT sqlserver.memory_grant_feedback_loop_disabled

  (WHERE (sqlserver.database_name = N''AdventureWorks2017'')),

  ADD EVENT sqlserver.memory_grant_updated_by_feedback

  (WHERE (sqlserver.database_name = N''AdventureWorks2017'')),

  ADD EVENT sqlserver.sql_batch_completed

  (WHERE (sqlserver.database_name = N''AdventureWorks2017''))

  WITH (TRACK_CAUSALITY = ON);

  ```


  第一个事件 `memory_grant_feedback_loop_disabled` 在相关查询受参数值影响过大时发生。与其让内存授予剧烈波动，查询引擎会禁用某些计划的反馈。当某个计划发生这种情况时，此事件将在执行期间触发。第二个事件
  `memory_grant_updated_by_feedback` 在处理反馈时发生。让我们看看它的实际效果。


  这里有一个过程，包含一个从 `bigTransactionHistory` 表聚合一些信息的查询：


  ```sql

  CREATE OR ALTER PROCEDURE dbo.CostCheck (@Cost MONEY)

  AS

  SELECT p.Name,

  AVG(th.Quantity),

  AVG(th.ActualCost)

  FROM dbo.bigTransactionHistory AS th

  JOIN dbo.bigProduct AS p

  ON p.ProductID = th.ProductID

  WHERE th.ActualCost = @Cost

  GROUP BY p.Name;

  GO

  ```


  如果我们执行此查询，传入值 0，并捕获实际执行计划，它看起来如图 25-17 所示。


  ![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig17_HTML.jpg](img/323849_5_En_25_Fig17_HTML.jpg)

  *图 25-17 SELECT 运算符上带有警告的执行计划*


  这个查询应该立即吸引你眼球的是 `SELECT` 运算符上的警告。我们可以打开“属性”窗口以查看计划的所有警告。请注意，工具提示只显示第一个警告，如图 25-18
  所示。


  ![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig18_HTML.jpg](img/323849_5_En_25_Fig18_HTML.jpg)

  *图 25-18 执行计划中的过度内存授予警告*




  此处的定义相当清晰。根据列存储索引中存储数据的统计信息，SQL Server 假定处理此查询的数据需要 85,624KB 内存。实际使用的内存为 4,056KB。两者相差超过
  81,000KB。如果此类查询频繁运行且存在如此大的差异，我们将面临严重的内存压力，而获益甚微。我们还可以通过**扩展事件**来查看反馈过程的实际运作情况。图
  25-19 显示了作为执行查询的一部分而触发的 `memory_grant_updated_by_feedback` 事件。


  ![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig19_HTML.jpg](img/323849_5_En_25_Fig19_HTML.jpg)


  图 25-19: `memory_grant_updated_by_feedback` 事件的扩展事件属性


  您可以在图 25-19 中看到一些重要信息。`activity_id` 值显示此事件在扩展事件会话中发生于其他事件之前，因为 `seq` 值为 1。如果您正在运行代码，您会发现您的
  `sql_batch_completed` 的 `seq` 值为 2。这意味着内存授予调整发生在查询完成执行之前，尽管您仍然会在执行计划中看到警告。这些调整是针对该查询的后续执行的。实际上，让我们再次执行该查询，并查看扩展事件中的查询执行结果，如图
  25-20 所示。


  ![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig20_HTML.jpg](img/323849_5_En_25_Fig20_HTML.jpg)


  图 25-20: 显示内存授予反馈仅发生一次的扩展事件


  另一个值得注意的有趣之处是，如果您再次捕获执行计划，如图 25-21 所示，您将不再看到警告。


  ![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig21_HTML.jpg](img/323849_5_En_25_Fig21_HTML.jpg)


  图 25-21: 相同的执行计划，但没有警告


  如果我们继续使用这些参数值运行此存储过程，您不会看到任何其他变化。但是，如果我们按如下方式修改参数值：


  ```

  EXEC dbo.CostCheck @Cost = 15.035;

  ```


  我们将根本看不到任何变化。这是因为虽然结果集差异很大（1 行对比 9000 行），但内存需求并不像第一次执行第一个查询时那样差异巨大。但是，如果我们清除内存缓存，然后使用这些值执行存储过程，您将再次看到
  `memory_grant_updated_by_feedback` 事件被触发。


  如果您遇到因更改内存授予而导致的一定程度的系统颠簸问题，可以使用 `DATABASE SCOPED CONFIGURATION` 在数据库级别禁用它，如下所示：


  ```

  ALTER DATABASE SCOPED CONFIGURATION SET DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK
  = ON;

  ```


  要重新启用它，只需使用相同命令将其设置为 `OFF`。还有一个查询提示，可用于禁用单个查询的内存反馈。只需将 `DISABLE_BATCH_MODE_MEMORY_GRANT_FEEDBACK`
  添加到查询提示的 `USE` 部分即可。


  ### 交错执行


  虽然我仍然建议避免使用多语句表值函数，但您可能会发现自己不得不处理它们。在 SQL Server 2017 之前，使这些函数运行更快的唯一真正选择是重写代码以完全不使用它们。然而，SQL
  Server 2017 现在为这些对象提供了**交错执行**功能。其工作原理是，优化器会识别到它正在处理其中一个多语句函数。它会暂停优化过程。处理表值函数的那部分计划将会执行，并返回准确的行数。然后，这些行数将在后续的优化过程中被使用。如果您有多个多语句函数，您将获得多次执行，直到所有此类对象都返回了更准确的行数。


  为了实际观察这一过程，我想创建以下多语句函数：


  ```

  CREATE OR ALTER FUNCTION dbo.SalesInfo ()

  RETURNS @return_variable TABLE (SalesOrderID INT,

  OrderDate DATETIME,

  SalesPersonID INT,

  PurchaseOrderNumber dbo.OrderNumber,

  AccountNumber dbo.AccountNumber,

  ShippingCity NVARCHAR(30))

  AS

  BEGIN;

  INSERT INTO @return_variable (SalesOrderID,

  OrderDate,

  SalesPersonID,

  PurchaseOrderNumber,

  AccountNumber,

  ShippingCity)

  SELECT soh.SalesOrderID,

  soh.OrderDate,

  soh.SalesPersonID,

  soh.PurchaseOrderNumber,

  soh.AccountNumber,

  a.City

  FROM Sales.SalesOrderHeader AS soh

  JOIN Person.Address AS a

  ON soh.ShipToAddressID = a.AddressID;

  RETURN;

  END;

  GO

  CREATE OR ALTER FUNCTION dbo.SalesDetails ()

  RETURNS @return_variable TABLE (SalesOrderID INT,

  SalesOrderDetailID INT,

  OrderQty SMALLINT,

  UnitPrice MONEY)

  AS

  BEGIN;

  INSERT INTO @return_variable (SalesOrderID,

  SalesOrderDetailID,

  OrderQty,

  UnitPrice)

  SELECT sod.SalesOrderID,

  sod.SalesOrderDetailID,

  sod.OrderQty,

  sod.UnitPrice

  FROM Sales.SalesOrderDetail AS sod;

  RETURN;

  END;

  GO

  CREATE OR ALTER FUNCTION dbo.CombinedSalesInfo ()

  RETURNS @return_variable TABLE (SalesPersonID INT,

  ShippingCity NVARCHAR(30),

  OrderDate DATETIME,

  PurchaseOrderNumber dbo.OrderNumber,

  AccountNumber dbo.AccountNumber,

  OrderQty SMALLINT,

  UnitPrice MONEY)

  AS

  BEGIN;

  INSERT INTO @return_variable (SalesPersonID,

  ShippingCity,

  OrderDate,

  PurchaseOrderNumber,

  AccountNumber,

  OrderQty,

  UnitPrice)

  SELECT si.SalesPersonID,

  si.ShippingCity,

  si.OrderDate,

  si.PurchaseOrderNumber,

  si.AccountNumber,

  sd.OrderQty,

  sd.UnitPrice

  FROM dbo.SalesInfo() AS si

  JOIN dbo.SalesDetails() AS sd

  ON si.SalesOrderID = sd.SalesOrderID;

  RETURN;

  END;

  GO

  ```


  这些正是我在处理多语句函数时经常看到的那种反模式（或代码异味）。一个函数调用另一个函数，后者又与第三个函数连接，依此类推。因为优化器对这些函数会采取两种处理方式之一（取决于所使用的基数估算引擎版本），所以您实际上没有太多选择。在
  SQL Server 2014 之前，优化器假定这些对象只有一行。SQL Server 2014 及更高版本采用了不同的假定，即 100 行。因此，如果兼容级别设置为
  140 或更高，您将看到 100 行的假定，除非启用了交错执行。


  我们可以针对这些函数运行一个查询。但是，首先我们希望在禁用交错执行的情况下运行它。然后我们将重新启用它，清除缓存，并再次执行查询，如下所示：




  ```

  ALTER DATABASE SCOPED CONFIGURATION SET DISABLE_INTERLEAVED_EXECUTION_TVF = ON;

  GO

  SELECT csi.OrderDate,

  csi.PurchaseOrderNumber,

  csi.AccountNumber,

  csi.OrderQty,

  csi.UnitPrice,

  sp.SalesQuota

  FROM dbo.CombinedSalesInfo() AS csi

  JOIN Sales.SalesPerson AS sp

  ON csi.SalesPersonID = sp.BusinessEntityID

  WHERE csi.SalesPersonID = 277

  AND csi.ShippingCity = ''Odessa'';

  GO

  ALTER DATABASE SCOPED CONFIGURATION SET DISABLE_INTERLEAVED_EXECUTION_TVF = OFF;

  GO

  ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;

  GO

  SELECT csi.OrderDate,

  csi.PurchaseOrderNumber,

  csi.AccountNumber,

  csi.OrderQty,

  csi.UnitPrice,

  sp.SalesQuota

  FROM dbo.CombinedSalesInfo() AS csi

  JOIN Sales.SalesPerson AS sp

  ON csi.SalesPersonID = sp.BusinessEntityID

  WHERE csi.SalesPersonID = 277

  AND csi.ShippingCity = ''Odessa'';

  GO

  ```


  得到的执行计划是不同的，但差异很细微，如图 25-22 所示。


  ![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig22_HTML.jpg](img/323849_5_En_25_Fig22_HTML.jpg)


  图 25-22：两个执行计划，一个启用了交错执行


  观察这些计划，实际上很难看出差异，因为所有的运算符都是一样的。然而，差异在于估计的成本值。在第一个计划顶部，表值函数的估计成本为 1%，表明与`聚集索引查找`和`表扫描`操作相比，它的开销几乎可以忽略不计。但在第二个计划中，`聚集索引查找`（预计返回一行）的成本突然只占总量的估计值
  1%，其余的成本则合理地重新分配给了其他操作。正是这些行数估计上的差异，在某些情况下可能导致性能提升。然而，让我们通过数值来看一下实际情况。


  `序列`运算符强制按顺序执行附加到它的每个子树。在此例中，首先执行的是表值函数。它为两个计划底部的`表扫描`运算符提供数据。图 25-23 显示了顶部计划（即以旧方式执行的计划）的属性。


  ![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig23_HTML.jpg](img/323849_5_En_25_Fig23_HTML.jpg)


  图 25-23：旧式计划的属性


  在图 25-23 截取的图像底部，你可以看到该运算符预计读取的行数为 100。其中，预期匹配的行数为 3.16228。实际的行数在顶部，为 148。这种差异是导致多语句函数执行时间如此之差的主要原因。


  现在，让我们看看以交错方式执行的函数的相同属性，如图 25-24 所示。


  ![../images/323849_5_En_25_Chapter/323849_5_En_25_Fig24_HTML.jpg](img/323849_5_En_25_Fig24_HTML.jpg)


  图 25-24：交错执行的属性


  因为这是针对相同结果集的相同查询，所以返回的实际行数是相同的。但是，请看`预计读取行数`的值。不再是硬编码的 100（无论涉及什么数据），现在变成了 121317。这是一个更准确的估计。它导致预计返回
  18.663 行。这仍然不是实际值 148，但它正朝着更准确的估计迈进。


  由于这些计划相似，执行时间和读取次数出现很大差异的可能性不大。不过，我们还是从扩展事件中获取度量值吧。平均而言，非交错执行耗时 1.48 秒，读取次数为 341,000
  次。交错执行平均耗时 1.45 秒，读取次数为 340,000 次。有微小的改进。


  现在，我们实际上可以显著提高性能，同时仍然使用多语句函数。与其将函数连接在一起，如果我们像这样重写代码：


  ```

  CREATE OR ALTER FUNCTION dbo.AllSalesInfo (@SalesPersonID INT,

  @ShippingCity VARCHAR(50))

  RETURNS @return_variable TABLE (SalesPersonID INT,

  ShippingCity NVARCHAR(30),

  OrderDate DATETIME,

  PurchaseOrderNumber dbo.OrderNumber,

  AccountNumber dbo.AccountNumber,

  OrderQty SMALLINT,

  UnitPrice MONEY)

  AS

  BEGIN;

  INSERT INTO @return_variable (SalesPersonID,

  ShippingCity,

  OrderDate,

  PurchaseOrderNumber,

  AccountNumber,

  OrderQty,

  UnitPrice)

  SELECT soh.SalesPersonID,

  a.City,

  soh.OrderDate,

  soh.PurchaseOrderNumber,

  soh.AccountNumber,

  sod.OrderQty,

  sod.UnitPrice

  FROM Sales.SalesOrderHeader AS soh

  JOIN Person.Address AS a

  ON a.AddressID = soh.ShipToAddressID

  JOIN Sales.SalesOrderDetail AS sod

  ON sod.SalesOrderID = soh.SalesOrderID

  WHERE soh.SalesPersonID = @SalesPersonID

  AND a.City = @ShippingCity;

  RETURN;

  END;

  GO

  ```


  我们不使用`WHERE`子句来执行最终查询，而是像这样执行它：


  ```

  SELECT asi.OrderDate,

  asi.PurchaseOrderNumber,

  asi.AccountNumber,

  asi.OrderQty,

  asi.UnitPrice,

  sp.SalesQuota

  FROM dbo.AllSalesInfo(277,''Odessa'') AS asi

  JOIN Sales.SalesPerson AS sp

  ON asi.SalesPersonID = sp.BusinessEntityID;

  ```


  通过将参数传递给函数，我们允许交错执行有可供参考的测量值。这种方式返回的数据完全相同，但性能下降到了 65 毫秒，读取次数仅为 1,135 次。对于多语句函数来说，这相当惊人。然而，即使以非交错函数方式运行，执行时间也下降到
  69 毫秒，读取次数为 1,428 次。虽然我们讨论的是不需要代码或结构更改的改进，但这些改进是非常微小的。


  由于交错执行，可能会出现另一个问题，特别是如果你像我在第二个查询中那样传递值。它将根据手头的值创建一个计划。这实际上类似于参数嗅探。它使用这些硬编码值直接创建执行计划，利用这些值与统计信息进行比对来估计行数。如果你的统计信息变化很大，你可能会遇到类似于我们在第
  15 章中讨论的性能问题。


  你也可以使用查询提示来禁用交错执行。只需通过提示向查询提供`DISABLE_INTERLEAVED_EXECUTION_TVF`，它就会仅对正在执行的查询禁用该功能。


  ## 总结


  随着 SQL Server 2017 中调优建议的增加，以及 Azure SQL Database 中索引自动化的引入，你在 SQL Server 自动化方面获得了更多帮助。你仍然需要利用本书其他部分学到的知识来理解这些建议何时有帮助，何时仅仅是为你自己的选择提供线索。不过，事情变得更加简单，因为通过自适应查询处理，SQL
  Server 可以自动进行调整，而你完全无需做任何工作。请记住，所有这些都有帮助，但没有一个是完整的解决方案。这只意味着你的工具箱里有了更多的工具来帮助处理性能不佳的查询。


  下一章将讨论你可以用来通过分布式重放自动化查询测试的方法。



  '
- '# 26. 数据库性能测试


  掌握如何识别性能问题并知晓修复方法，这是一项极好的技能。然而，问题在于你需要能够证明你所做的改进是真正的提升。虽然你可以在调整查询或添加索引前后捕获性能指标，但确保你看到的是可衡量改进的最佳方法，是将你所做的更改付诸实践。测试不仅仅是简单地运行几次查询，然后怀着侥幸心理将其投入生产系统。你需要一种系统化的方法，以现实的方式使用针对你的系统运行的全套查询来验证性能改进。SQL
  Server 自 2012 版本起，通过其 **Distributed Replay** 工具提供了这样一种机制。


  **Distributed Replay** 与 SQL Profiler 生成的信息以及它创建的跟踪事件协同工作。跟踪事件捕获信息的方式与 Extended
  Events 工具略有相似，但跟踪事件是一种较旧（且功能较弱）的系统中捕获事件的机制。在 SQL Server 2012 发布之前，你可以使用 SQL Server
  的 Profiler 工具通过服务器端跟踪重放捕获的事件。这可行，但该过程极其有限。例如，该工具只能在单台机器上运行，并且它处理重放机制的方式——一个以串行方式运行的单线程过程——与实际情况不同。Microsoft
  已经为 SQL Server 添加了从多台机器以并行方式运行的能力。在 Microsoft 提供一种通过 Extended Events 输出使用 **Distributed
  Replay** 的机制之前，你仍然需要使用跟踪事件来进行性能测试的这一环节。


  **Distributed Replay** 并非一个被广泛采用的工具。大多数人完全跳过了实现可重复测试的想法。其他人可能会选择一些提供更多功能的第三方工具。我强烈建议你进行某种形式的测试，以确保你的调整工作对你的系统产生了可以准确衡量的积极影响。


  本章涵盖以下主题：


  *   数据库测试的概念

  *   如何创建服务器端跟踪

  *   使用 **Distributed Replay** 进行数据库测试


  ## 概述


  数据库性能和负载测试的一般方法相当简单。你需要捕获生产系统在正常负载下的调用，然后能够在测试系统上反复重放该负载。这使你能够直接测量由代码或结构更改引起的性能变化。不幸的是，在现实世界实现这一点并不像听起来那么简单。


  首先，你不能简单地捕获查询的记录。相反，你首先必须确保可以在测试系统上将生产数据库还原到某个时间点。具体来说，你需要能够恢复到你开始在系统上录制事务的确切点，因为如果你恢复到任何其他时间点，你可能会有不同的数据甚至不同的结构。这将导致重放机制生成错误而不是有用的信息。这意味着，首先，你必须有一个处于完整恢复模式的数据库，以便你可以进行定期的完整备份和日志备份，从而在测试开始时恢复到特定的时间点。


  一旦你建立了恢复到适当时间的能力，你将需要配置你的查询捕获机制——在本例中，是由 Profiler 生成的服务器端跟踪定义。重放机制将精确定义你需要捕获哪些事件。你需要设置捕获过程，使其对系统的影响尽可能小。


  接下来，你将必须处理跟踪捕获的大量数据。根据你的系统规模大小，你可能在短时间内有大量的事务。所有这些数据都必须存储和管理，并且会有很多文件。


  你可以在单台机器上设置此过程；然而，为了真正看到好处，你会希望设置多台机器来支持 **Distributed Replay** 工具的重放功能。这意味着作为测试过程的一部分，你需要有这些机器可供使用。不幸的是，除了
  Enterprise 版之外的所有版本，你只能有一个客户端，因此在设置测试环境时请考虑到这一点。


  此外，你不能忽视这样一个事实：最好的数据、数据库和代码是来自你的生产系统。然而，根据你对本地和国际法律合规性的需求，你可能必须选择一种完全不同的机制来记录你的服务器端跟踪。你不希望危及组织内管理的数据的隐私和保护。如果是这种情况，你可能必须从用于其他类型自动化测试的
  QA 服务器或预生产服务器捕获你的负载。这些可能是难以克服的问题。


  当你把所有这些不同的部分都准备就绪后，就可以开始测试了。当然，这引出了一个新的问题：你到底在用数据库测试做什么？


  ### 可重复的过程


  如第 1 章所述，性能调优你的系统是一个迭代过程，你可能需要经历多次才能使性能达到并保持在你需要的水平。由于业务会随时间变化，你的数据分布、应用程序、数据结构以及所有支持的代码也会随之变化。鉴于所有这些，你能为测试做的最重要的事情之一就是创建一个可以反复运行的过程。


  你需要创建一个可重复测试过程的主要原因是，你不能总是确定本书前面章节中概述的方法在每种情况下都有效。这无疑意味着你需要能够验证你所做的更改是否带来了性能的积极改进。如果没有，你需要能够移除你所做的任何更改，进行一组新的更改，然后重复测试，迭代地重复这个过程。你可能会发现你需要重复整个调优周期，直到你达到这一轮的目标。


  由于这个过程的迭代性质，你绝对需要专注于尽可能多地将其自动化。这正是 **Distributed Replay** 工具发挥作用的地方。


  ##### 分布式重放


  分布式重放工具由三个架构组件组成。


  -   `Distributed Replay Controller`：此服务管理分布式重放系统的进程。

  -   `Distributed Replay Administrator`：这是一个允许您控制分布式重放控制器和分布式重放过程的界面。

  -   `Distributed Replay Client`：这是一个在一个或多个机器（最多 16 台）上运行的界面，用于向数据库服务器发出所有调用。


  您可以将所有三个组件安装在一台机器上；然而，理想的方法是将控制器放在一台机器上，然后将一个或多个客户端机器与控制器完全分离，以便每台机器只处理针对测试机器的部分事务。仅出于说明目的，我将所有组件运行在一个实例上。


  首先将 `Distributed Replay Controller` 服务安装到一台机器上。分布式重放工具本身没有用户界面。相反，您将使用 XML 配置文件来控制分布式重放架构的不同部分。您可以将分布式重放用于各种任务，例如基本查询重放、服务器端游标或预准备服务器语句。由于我主要介绍查询调优，我将重点关注查询和预准备服务器语句（也称为*参数化查询*）。这定义了一组必须捕获的特定事件。我将在下一节介绍如何做到这一点。


  一旦信息被捕获到跟踪文件中，您就需要使用 `Distributed Replay Controller` 通过预处理事件运行该文件。这将基本的跟踪数据修改为一种不同的格式，以便可以分发到各个
  `Distributed Replay Client` 机器。然后您可以启动重放过程。重新格式化的数据被发送到客户端，客户端随后将创建查询以在目标服务器上运行。您可以从客户端机器捕获另一个跟踪输出，以确切查看它们进行了哪些调用，以及这些调用的
  I/O 和 CPU。您可能还会在目标服务器上设置标准监控，以查看您生成的负载如何影响该服务器。


  当您准备在服务器上运行系统时，可以选择两种类型的重放之一：同步模式或压力模式。在同步模式下，您将获得与原始重放完全相同的副本，尽管您可以影响系统上的空闲时间量。这对于精确的性能调优很有用，因为它有助于您了解系统的工作方式，尤其是在对结构、索引或
  T-SQL 代码进行更改时。压力模式不以任何特定顺序运行，但在单个连接内除外，查询将在该连接内按正确顺序流式传输。在这种情况下，调用会以客户端机器尽可能快的速度发出——以任何顺序——只要服务器能接收它们。简而言之，它执行压力测试。这对于测试数据库设计或硬件安装非常有用。


  一个重要的注意事项是，作为一般规则，当您仅对最新版本的跟踪数据使用最新版本的 SQL Server 进行重放时，是最安全的。但是，您可以在 SQL Server
  2017 上重放 SQL Server 2005 的数据。此外，分布式重放或跟踪事件不支持 Azure SQL Database，因此您无法将其用于您的 Azure
  数据库。


  ## 使用服务器端跟踪捕获数据


  使用跟踪事件捕获数据类似于使用扩展事件捕获查询执行。为了支持分布式重放过程，您需要捕获一些特定事件和这些事件的特定列。如果您想构建自己的跟踪事件，您需要捕获表
  26-1 中列出的事件。


  表 26-1 要捕获的事件


  | 事件 | 列 |

  | --- | --- |

  | `Prepare SQL` `Exec Prepared SQL` `SQL:BatchStarting` `SQL:BatchCompleted` `RPC:Starting`
  `RPC:Completed` `RPC Output Parameter` `Audit Login` `Audit Logout` `Existing Connection`
  `Server-side Cursor` `Server-side prepared SQL` | `Event Class` `EventSequence`
  `TextData` `Application Name` `LoginName` `DatabaseName` `Database ID` `HostName`
  `Binary Data` `SPID` `Start Time` `EndTime` `IsSystem` |


  设置这些事件有两个选项。首先，您可以使用 T-SQL 来设置服务器端跟踪。其次，您可以使用一个名为 `Profiler` 的外部工具。虽然 `Profiler`
  可以直接连接到您的 SQL Server 实例，但我强烈建议不要使用此工具来捕获数据。`Profiler` 最好用作提供捕获模板的方式。您应该使用 T-SQL
  来生成实际的服务器端跟踪。


  在测试或开发机器上，打开 `Profiler` 并从“模板”列表中选择 `TSQL_Replay`，如图 26-1 所示。


  ![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig1_HTML.jpg](img/323849_5_En_26_Fig1_HTML.jpg)


  图 26-1 分布式重放跟踪模板


  由于您需要一个用于分布式重放的文件，您会希望将跟踪输出保存到文件。无论如何，这是设置服务器端跟踪的最佳方式，因此这很合适。您会希望输出到具有足够空间的位置。根据您的系统必须支持的事务数量，跟踪文件可能会非常大。此外，最好限制文件大小并允许它们滚动覆盖，根据需要创建新文件。您将需要处理更多文件，但操作系统实际上可以更好地处理大量较小文件的写入操作，而不是单个大文件。我发现这是真的，原因有二。首先，使用较小的文件大小，滚动覆盖更快，这意味着如果您需要将前一个文件加载到表中或复制到另一台服务器，该文件已可用于处理。其次，根据我的经验，简单日志文件的写入通常需要更长时间，因为此类文件的大小会变得非常大。我还建议为跟踪过程定义停止时间；这同样有助于确保您不会填满为存储跟踪数据指定的驱动器。


  由于这是一个模板，事件和列已为您选择好了。您可以通过单击“事件选择”选项卡来验证事件和列，以确保您获得所需的内容。图 26-2 显示了一些事件和列，所有这些都已为您预定义。


  ![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig2_HTML.jpg](img/323849_5_En_26_Fig2_HTML.jpg)


  图 26-2 `TSQL_Replay` 模板事件和列


  此模板是通用的，因此它包含了完整的事件列表，包括所有游标事件。您可以通过单击框来取消选择事件进行编辑；但是，如果您要删除任何事件，我建议只删除游标事件。



  '
- '# SQL Server 跟踪与分布式重放工具


  ## 背景介绍


  我将这个模板连接到测试服务器而不是生产机器，因为一旦设置妥当，您必须点击 **运行** 来启动跟踪。我不会在生产系统上那样做。然而，在测试系统上，您可以观察屏幕以确保获取您认为应该获得的事件。它会显示事件，同时将它们捕获到文件中。当您确信其正确后，可以暂停跟踪。接下来，单击
  **文件** 菜单，然后选择 **导出** ➤ **脚本化跟踪定义**。最后，选择 **For SQL Server 2005 – 2014**（参见图 26-3）。


  ![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig3_HTML.jpg](img/323849_5_En_26_Fig3_HTML.jpg)


  **图 26-3** 输出跟踪定义的菜单选择


  此模板允许您将刚刚创建的跟踪保存为 T-SQL 文件。一旦拥有了 T-SQL，您就可以将其配置为在任何您喜欢的服务器上运行。文件路径必须替换，并且您可以通过脚本内的参数重置停止时间。以下脚本展示了用于设置服务器端跟踪事件的
  T-SQL 过程的开头部分：


  ```

  /****************************************************/

  /* Created by: SQL Server 2017 Profiler          */

  /* Date: 05/08/2018  08:27:40 PM         */

  /****************************************************/

  -- Create a Queue

  declare @rc int

  declare @TraceID int

  declare @maxfilesize bigint

  set @maxfilesize = 5

  -- Please replace the text InsertFileNameHere, with an appropriate

  -- filename prefixed by a path, e.g., c:\MyFolder\MyTrace. The .trc extension

  -- will be appended to the filename automatically. If you are writing from

  -- remote server to local drive, please use UNC path and make sure server has

  -- write access to your network share

  exec @rc = sp_trace_create @TraceID output, 0, N''InsertFileNameHere'', @maxfilesize,
  NULL

  if (@rc != 0) goto error

  ```


  您可以编辑其中写着 `InsertFileNameHere` 的路径，并为 `@DateTime` 提供不同的值。此时，您的脚本可以在任何 SQL Server
  2017 服务器上运行。您很可能可以将相同的脚本一直运行到 SQL Server 2008R2；自那时起，跟踪事件的变化如此之少，以至于它现在已成为固定的标准。然而，为了安全起见，请务必进行测试。


  您收集的信息量实际上取决于您想要运行哪种测试。对于标准的性能测试，收集至少一个小时的信息可能是个好主意；然而，在大多数情况下，您不希望捕获超过两到三小时的数据。另外，必须强调的是，跟踪事件不如扩展事件轻量级，因此捕获数据的时间越长，对生产服务器的负面影响就越大。捕获更多数据将意味着管理大量数据，这也意味着您计划运行测试很长时间。这完全取决于您打算在测试中处理的业务和应用程序行为。


  在捕获数据之前，您确实需要考虑将在哪里运行测试。假设您不担心磁盘空间，并且不需要保护法律上需要审计的数据（如果您有这些问题，您需要单独解决它们）。如果您的数据库不是
  **完整恢复** 模式，那么您无法使用日志备份将其恢复到某个时间点。如果是这种情况，我强烈建议将数据库备份作为启动跟踪数据收集的一部分。原因在于，您需要数据库在开始记录事务时处于相同的条件。如果不是，您可能会遇到大量错误，这可能会严重改变您的性能测试运行方式。例如，尝试选择或修改不存在的数据会影响
  I/O 和 CPU 在测试中的测量结果。如果您的数据库保持在您开始跟踪时或接近开始时的状态，那么您应该很少（如果有的话）遇到错误。


  准备好数据库副本和一组跟踪数据后，您就可以运行分布式重放工具了。


  ## 用于数据库测试的分布式重放


  假设您使用了分布式重放模板来捕获跟踪信息，您应该准备好开始处理文件了。如前所述，第一步是将跟踪文件转换为不同的格式，一种可以分发到多台客户端机器上进行重放的格式。但这不仅仅是针对您的文件运行可执行文件那么简单。您还需要就您希望分布式重放如何运行做出一些决定；这些决定是在预处理跟踪文件时做出的。


  这些决定相当直接。首先，您需要决定是否要重放系统进程以及用户进程。除非您正在处理特定的系统问题，否则我建议将此值设置为 `否`。这也是默认值。其次，您需要决定如何处理空闲时间。您可以使用调用数据库频率的实际值；或者，您可以输入一个以秒为单位的值，将等待时间限制为不超过该值。这实际上取决于您要运行的重放类型。假设您使用
  **同步** 模式重放（最适合进行直接性能测量的模式），通过将值设置为较低的值（例如三到五秒）来消除空闲时间是个好主意。


  如果您选择使用默认值，则不需要修改配置文件。但如果您选择包含系统调用或更改空闲时间，则需要更改配置文件 `DReplay.Exe.Preprocess.config`。这是一个简单的
  XML 配置文件。我使用的文件如下所示：


  ```

  <MaxdIdleTime>5</MaxdIdleTime>

  ```


  我只做了一处更改，调整了 `MaxdIdleTime` 以限制重放期间的任何停顿时间。


  在运行预处理之前，请确保已安装 `DRController` 并且 `DReplay` 服务正在您的系统上运行。如果满足条件，您只需要调用 `DReplay.exe`
  来执行预处理。


  ```

  dreplay preprocess –i c:\perfdata\dr.trc –d c:\DRProcess

  ```


  在上面的代码中，您可以看到 `DReplay` 运行了预处理事件。输入文件由 `–i` 参数提供，用于存放输出的文件夹则通过 `–d` 参数提供。跟踪文件将被处理，输出将转到指定的文件夹。输出内容将类似于图
  26-4。


  ![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig4_HTML.jpg](img/323849_5_En_26_Fig4_HTML.jpg)


  **图 26-4** 分布式重放预处理步骤的输出


  预处理完成后，您就可以继续运行分布式重放过程了。但在这样做之前，您需要确保一台或多台客户端系统已准备就绪。




  ### 配置客户端


  客户端机器需要配置为与分布式重放控制器协同工作。首先，将客户端安装到不同的机器上。仅用于演示目的，我在单台机器上运行所有组件；但是，即使使用多台机器，设置过程也并无不同。你需要配置客户端以与某个控制器协同工作，且一个客户端一次只能与一个控制器协同工作。你的系统还需要为两项内容预留空间。首先，你需要一个位置来存放每次重放时被覆盖的工作文件。其次，如果你想从该客户端收集执行数据，你还需要为客户端输出的跟踪文件预留空间。你还需要决定客户端进程的日志记录级别。所有这些设置都在另一个
  XML 配置文件 `DReplayClient.config` 中完成。以下是我的配置：


  ```

  PerfTune

  C:\DRClientWork\

  C:\DRClientOutput\

  CRITICAL

  ```


  目录和日志记录级别一目了然。我还必须将客户端指向运行分布式重放服务的服务器。对于多个客户端协同工作，不需要其他设置；你只需要确保它们指向了正确的控制器系统。


  ### 运行分布式测试


  至此，你已经完成了所有配置并捕获了数据。接下来，你需要回到命令行，通过 `Dreplay.exe` 可执行文件来运行。大部分控制是通过配置文件完成的，因此可执行文件本身几乎不需要输入。你使用以下命令调用测试：


  ```

  Dreplay replay –d c:\data –w DOJO

  ```


  你需要输入预处理输出的位置，这意味着你需要以逗号分隔的列表形式列出参与测试的客户端机器。执行的输出类似于图 26-5。


  ![../images/323849_5_En_26_Chapter/323849_5_En_26_Fig5_HTML.jpg](img/323849_5_En_26_Fig5_HTML.jpg)


  图 26-5


  运行 `DReplay.exe` 的输出


  如图所示，捕获了 62 个事件，并且所有 62 个事件都成功重放。另一方面，如果出现错误或事件失败，你可能需要查明有关某些事件失败原因的信息。这些信息可在日志中找到。然后，只需重新配置测试并再次运行即可。拥有可重复测试过程的核心理念在于你可以反复运行它。前面的例子代表了针对我的本地
  AdventureWorks2017 副本执行的一次轻负载运行，捕获过程大约持续了五分钟。但是，我配置了空闲时间的限制，因此重放仅用了 26 秒就完成了。


  从这里开始，你可以根据需要重新配置测试，重置数据库，并反复运行测试。请注意，更改配置文件将需要重启相关服务，以确保这些更改在下一组测试中生效。处理此类测试的最佳方法之一是启用查询存储。你可以捕获一组结果，重置测试，对系统进行任何你计划做的更改，然后从第二次测试中捕获另一组结果。接着，你可以轻松地查看关于性能回退的查询、消耗资源最多的查询等的报告。


  ## 结论


  通过包含分布式重放工具，SQL Server 现在使你能够对数据库执行负载和功能测试。你通过服务器端跟踪以简单的方式捕获代码来完成此操作。但是，如果你打算利用此功能，请务必验证你根据本书提出的原则对查询所做的更改是否确实有效，并且是否有助于提高系统的性能。你还应确保重置数据库以尽可能避免错误。


  '
- '# 27. 数据库工作负载优化


  到目前为止，你已经了解了可能影响查询性能的多个方面、可用于分析查询性能的工具以及可用于提高查询性能的优化技术。接下来，你将学习如何应用这些信息来分析、诊断和优化数据库工作负载的性能。我将引导你完成一个调优过程，包括可能尝试一两个错误的方向，因此请耐心跟随我们导航这个过程。


  在本章中，我将涵盖以下主题：


  *   数据库工作负载的特征

  *   数据库工作负载优化涉及的步骤

  *   如何识别工作负载中的高开销查询

  *   如何测量高开销查询的基线资源使用情况和性能

  *   如何分析影响高开销查询性能的因素

  *   如何应用技术来优化高开销查询

  *   如何分析查询优化对整个工作负载的影响


  ## 工作负载优化基础


  优化数据库工作负载通常符合 80/20 法则：80% 的工作负载消耗大约 20% 的服务器资源。尝试优化大部分工作负载的性能通常效率不高。因此，工作负载优化的第一步是找出消耗
  80% 服务器资源的那 20% 的工作负载。


  优化工作负载需要一组工具来衡量工作负载不同部分的资源消耗和响应时间。正如你在第 4 章和第 5 章中所见，SQL Server 提供了一套工具和实用程序来分析数据库工作负载和单个查询的性能。


  除了使用这些工具外，了解如何运用不同技术来优化工作负载也很重要。关于工作负载优化需要记住的最重要一点是，没有一种优化技术能保证解决每一个性能问题。许多优化技术针对特定的数据库应用程序设计和数据库环境。因此，对于每一种优化技术，你都需要在应用前后测量工作负载每个部分（即每个单独查询）的性能。你可以使用第
  26 章讨论的技术来实现这一点。


  发现一种优化技术对工作负载的其他部分影响甚微，甚至产生负面影响，从而损害工作负载的整体性能，这种情况并不少见。例如，为优化 `SELECT` 语句而添加的非聚集索引可能会损害修改索引列值的
  `UPDATE` 语句的性能。`UPDATE` 语句除了更新数据行外，还必须更新索引行。然而，正如第 6 章所演示的，有时索引也可以提高操作查询的性能。因此，提高特定查询的性能可能有益于也可能损害整个工作负载的性能。一如既往，你最好的行动方针是通过测试来验证任何假设。




  ## 工作负载优化步骤


  优化数据库工作负载的过程遵循一系列特定的步骤。作为此过程的一部分，你将使用前面章节介绍的一套优化技术。由于每个性能问题都是一个新的挑战，你可以使用不同的优化技术组合来排查不同的性能问题。请记住，第一步始终是确保服务器配置良好且在可接受的限制范围内运行，正如第
  2 章和第 3 章所定义的那样。


  为了理解查询优化过程，你将使用一组查询来模拟一个样本工作负载。


  查询调优的核心归结为几个步骤。


  1.  确定要调优的查询。

  2.  查看执行计划以了解资源使用情况和行为。

  3.  修改查询或修改结构以提高性能。


  大多数情况下，答案就是修改查询。简而言之，这就是进行查询调优所需做的全部。然而，这假设了你对系统有大量了解，并且你已经查看了诸如统计信息之类的历史数据。当你首次进行查询调优或在一个新系统上工作时，这个过程会详细得多。为了对调优查询所需的步骤给出一个全面而完整的定义，以下是你要执行的操作。这些是你在优化样本工作负载时将遵循的优化步骤：


  1.  捕获工作负载。

  2.  分析工作负载。

  3.  识别开销最大/调用最频繁/运行时间最长的查询。

  4.  量化开销最大查询的基线资源使用情况。

  5.  确定总体资源使用情况。

  6.  汇编关于资源使用的详细信息。

  7.  分析和优化外部因素。

  8.  分析索引的使用情况。

  9.  分析应用程序使用的批处理级别选项。

  10. 分析统计信息的有效性。

  11. 评估碎片整理的必要性。

  12. 分析开销最大查询的内部行为。

  13. 分析查询执行计划。

  14. 识别执行计划中开销最大的操作符。

  15. 分析处理策略的有效性。

  16. 优化开销最大的查询。

  17. 分析更改对数据库工作负载的影响。

  18. 在多个优化阶段中迭代进行。


  正如第 1 章所解释的，性能调优是一个迭代过程。因此，你应该多次迭代执行性能优化步骤，直到达到期望的应用程序性能目标。一段时间后，你将需要重复该过程，以应对数据和数据库更改对工作负载造成的影响。此外，当你在一段时间内负责维护一台服务器时，你可能会跳过许多前面的步骤，因为你已经验证了事务方法、统计信息维护或其他步骤。你不必严格遵循这个列表。它旨在作为一个指南。关于调优查询所需的步骤的图形化表示，我建议你参考第
  1 章。


  ## 样本工作负载


  要对 SQL Server 性能问题进行故障排除，你需要了解在服务器上执行的 SQL 工作负载。然后，你可以分析工作负载以确定性能不佳的原因和适用的优化步骤。理想情况下，你应该在面临性能问题的
  SQL Server 上捕获工作负载。在本章中，你将使用一组查询来模拟一个样本工作负载，以便你可以遵循上一节列出的优化步骤。你将使用的样本工作负载由良好查询和不良查询组合而成。


  ### 注意


  我建议你恢复一个干净的 `AdventureWorks2017` 数据库副本，以便完全删除先前章节留下的任何工件。


  简单的测试工作负载由以下一组示例存储过程模拟；你使用第二个脚本在 `AdventureWorks2017` 数据库上执行它们：


  ```sql

  USE AdventureWorks2017;

  GO

  CREATE OR ALTER PROCEDURE dbo.ShoppingCart @ShoppingCartId VARCHAR(50)

  AS

  --provides the output from the shopping cart including the line total

  SELECT sci.Quantity,

  p.ListPrice,

  p.ListPrice * sci.Quantity AS LineTotal,

  p.Name

  FROM Sales.ShoppingCartItem AS sci

  JOIN Production.Product AS p

  ON sci.ProductID = p.ProductID

  WHERE sci.ShoppingCartID = @ShoppingCartId;

  GO

  CREATE OR ALTER PROCEDURE dbo.ProductBySalesOrder @SalesOrderID INT

  AS

  /*provides a list of products from a particular sales order,

  and provides line ordering by modified date but ordered

  by product name*/

  SELECT ROW_NUMBER() OVER (ORDER BY sod.ModifiedDate) AS LineNumber,

  p.Name,

  sod.LineTotal

  FROM Sales.SalesOrderHeader AS soh

  JOIN Sales.SalesOrderDetail AS sod

  ON soh.SalesOrderID = sod.SalesOrderID

  JOIN Production.Product AS p

  ON sod.ProductID = p.ProductID

  WHERE soh.SalesOrderID = @SalesOrderID

  ORDER BY p.Name ASC;

  GO

  CREATE OR ALTER PROCEDURE dbo.PersonByFirstName @FirstName NVARCHAR(50)

  AS

  --gets anyone by first name from the Person table

  SELECT p.BusinessEntityID,

  p.Title,

  p.LastName,

  p.FirstName,

  p.PersonType

  FROM Person.Person AS p

  WHERE p.FirstName = @FirstName;

  GO

  CREATE OR ALTER PROCEDURE dbo.ProductTransactionsSinceDate

  @LatestDate DATETIME,

  @ProductName NVARCHAR(50)

  AS

  --Gets the latest transaction against

  --all products that have a transaction

  SELECT p.Name,

  th.ReferenceOrderID,

  th.ReferenceOrderLineID,

  th.TransactionType,

  th.Quantity

  FROM Production.Product AS p

  JOIN Production.TransactionHistory AS th

  ON p.ProductID = th.ProductID

  AND th.TransactionID = (   SELECT TOP (1)

  th2.TransactionID

  FROM Production.TransactionHistory AS th2

  WHERE th2.ProductID = p.ProductID

  ORDER BY th2.TransactionID DESC)

  WHERE th.TransactionDate > @LatestDate

  AND p.Name LIKE @ProductName;

  GO

  CREATE OR ALTER PROCEDURE dbo.PurchaseOrderBySalesPersonName

  @LastName NVARCHAR(50),

  @VendorID INT = NULL

  AS

  SELECT poh.PurchaseOrderID,

  poh.OrderDate,

  pod.LineTotal,

  p.Name AS ProductName,

  e.JobTitle,

  per.LastName + '', '' + per.FirstName AS SalesPerson,

  poh.VendorID

  FROM Purchasing.PurchaseOrderHeader AS poh

  JOIN Purchasing.PurchaseOrderDetail AS pod

  ON poh.PurchaseOrderID = pod.PurchaseOrderID

  JOIN Production.Product AS p

  ON pod.ProductID = p.ProductID

  JOIN HumanResources.Employee AS e

  ON poh.EmployeeID = e.BusinessEntityID

  JOIN Person.Person AS per

  ON e.BusinessEntityID = per.BusinessEntityID

  WHERE per.LastName LIKE @LastName

  AND poh.VendorID = COALESCE(@VendorID,

  poh.VendorID)

  ORDER BY per.LastName,

  per.FirstName;

  GO

  CREATE OR ALTER PROCEDURE dbo.TotalSalesByProduct @ProductID INT

  AS

  --retrieve aggregation of sales based on a productid

  SELECT SUM((isnull((sod.UnitPrice*((1.0)-sod.UnitPriceDiscount))*sod.OrderQty,(0.0))))
  AS TotalSales,

  AVG(sod.OrderQty) AS AverageQty,

  AVG(sod.UnitPrice) AS AverageUnitPrice,

  SUM(sod.LineTotal)

  FROM Sales.SalesOrderDetail AS sod

  WHERE sod.ProductID = @ProductID

  GROUP BY sod.ProductID;

  GO

  ```


  请记住，这只是一个说明性的示例，而不是实际施加在服务器上的真实负载。真实的存储过程通常要复杂得多，但我们在设置模拟生产负载方面只能投入这么多篇幅。在这些过程就绪后，你可以使用以下脚本执行它们：



  ```

  EXEC dbo.PurchaseOrderBySalesPersonName @LastName = ''Hill%'';

  GO

  EXEC dbo.ShoppingCart @ShoppingCartId = ''20621'';

  GO

  EXEC dbo.ProductBySalesOrder @SalesOrderID = 43867;

  GO

  EXEC dbo.PersonByFirstName @FirstName = ''Gretchen'';

  GO

  EXEC dbo.ProductTransactionsSinceDate @LatestDate = ''9/1/2004'',

  @ProductName = ''Hex Nut%'';

  GO

  EXEC dbo.PurchaseOrderBySalesPersonName @LastName = ''Hill%'',

  @VendorID = 1496;

  GO

  EXEC dbo.TotalSalesByProduct @ProductID = 707;

  GO

  ```


  我知道我在重复自己，但我想说清楚。这是一个极其简单的工作负载，仅用于说明流程。在典型的系统中，您将看到跨越更多存储过程和即席查询的成百上千个额外调用。然而，尽管它很简单，这个示例工作负载却包含了通常在`SQL
  Server`上执行的不同类型的查询。


  *   使用聚合函数的查询


  *   仅检索单行或少量行的点查询


  *   连接多个表的查询


  *   检索窄范围行的查询


  *   执行额外结果集处理的查询，例如提供排序输出


  第一个优化步骤是捕获工作负载，即查看这些查询的性能表现，如下一节所述。


  '
- "# 捕获工作负载\n\n作为诊断数据收集步骤的一部分，您必须定义一个`扩展事件`会话来捕获数据库服务器上的工作负载。您可以使用第 6 章推荐的工具和方法来完成此操作。表\
  \ 27-1 列出了可用于测量查询资源使用情况的具体事件。\n\n**表 27-1**\n\n捕获关于高成本查询信息的事件\n\n| 类别 | 事件 |\n|\
  \ --- | --- |\n| 执行 | `rpc_completed`，`sql_batch_completed` |\n\n如第 6 章所述，对于生产数据库，建议将`扩展事件`会话的输出捕获到文件中。将输出捕获到文件有几个显著优势：\n\
  \n*   由于您打算在工作负载捕获后分析`SQL`查询，因此在捕获时无需显示这些`SQL`查询。\n\n*   通过`SSMS`运行会话无法提供对跟踪过程的灵活时间控制。\n\
  \n让我们更仔细地看看时间控制。假设您想在晚上 11 点开始捕获事件，并记录`SQL`工作负载 24 小时。您可以使用`GUI`或`T-SQL`定义一个`扩展事件`会话。但是，您不必在准备好之前启动该进程。这意味着您可以在`SQL\
  \ 代理`或使用其他调度工具中创建命令，通过`ALTER EVENT SESSION`命令来启动和停止该进程。\n\n```sql\nALTER EVENT SESSION\
  \ \nON SERVER\nSTATE = ;\n```\n\n在此示例中，我在会话上设置了一个筛选器，仅捕获来自`AdventureWorks2017`数据库的事件。该文件将仅捕获针对该数据库的查询，从而减少了我需要处理的信息量。这对于您的系统可能也是一个不错的选择。虽然`扩展事件`会话的成本可以非常低（特别是与较旧的跟踪事件相比），但它们并非免费。应始终应用良好的筛选以确保最小影响。\n\
  \n"
- "# 分析工作负载\n\n一旦工作负载被捕获到文件中，您就可以通过使用`SSMS`浏览数据或将输出文件的内容导入数据库表来分析工作负载。\n\n`SSMS`提供了以下两种分析文件内容的方法，两者都相对简单：\n\
  \n*   通过右键单击数据列来选择排序顺序或按特定列进行排序：您可能希望从“详细信息”选项卡中选择列，并使用“在表中显示列”命令将它们上移。一旦它们出现，您就可以对该列发出分组和排序命令。\n\
  \n*   重新排列输出为选择性的列和事件列表：您可以通过右键单击表格并从上下文菜单中选择“选择列”来更改通过`SSMS`显示的输出。这使您不仅仅是简单地挑选列；它还允许您将它们组合成新的列。\n\
  \n正如我在本书中所展示的，`SSMS`中的实时数据资源管理器与`扩展事件`结合使用时，可用于进行基本的聚合。例如，如果您想按查询文本或对象`ID`分组，然后获取平均持续时间或执行次数，您是可以做到的。事实上，`SSMS`是进行此类更简单聚合的一种方式。\n\
  \n另一方面，如果您想对工作负载进行深入分析，则必须将跟踪文件的内容导入数据库表。然后您可以创建更复杂的查询。会话的输出将大多数重要数据放入`XML`字段中，因此您需要在加载数据时查询它，如下所示：\n\
  \n```sql\nDROP TABLE IF EXISTS dbo.ExEvents;\nGO\nWITH xEvents\nAS (SELECT object_name\
  \ AS xEventName,\nCAST(event_data AS XML) AS xEventData\nFROM sys.fn_xe_file_target_read_file('C:\\\
  PerfData\\QueryPerfTuning2017*.xel',\nNULL,\nNULL,\nNULL) )\nSELECT xEventName,\n\
  xEventData.value('(/event/data[@name=\"duration\"]/value)[1]',\n'bigint') AS Duration,\n\
  xEventData.value('(/event/data[@name=\"physical_reads\"]/value)[1]',\n'bigint')\
  \ AS PhysicalReads,\nxEventData.value('(/event/data[@name=\"logical_reads\"]/value)[1]',\n\
  'bigint') AS LogicalReads,\nxEventData.value('(/event/data[@name=\"cpu_time\"]/value)[1]',\n\
  'bigint') AS CpuTime,\nCASE xEventName\nWHEN 'sql_batch_completed' THEN\nxEventData.value('(/event/data[@name=\"\
  batch_text\"]/value)[1]',\n'varchar(max)')\nWHEN 'rpc_completed' THEN\nxEventData.value('(/event/data[@name=\"\
  statement\"]/value)[1]',\n'varchar(max)')\nEND AS SQLText,\nxEventData.value('(/event/data[@name=\"\
  query_plan_hash\"]/value)[1]',\n'binary(8)') AS QueryPlanHash\nINTO dbo.ExEvents\n\
  FROM xEvents;\n```\n\n您需要用您自己的路径和文件名替换`<ExEventsFileName>`。一旦您将内容放入表中，就可以使用`SQL`查询来分析工作负载。例如，要查找最慢的查询，您可以执行此`SQL`查询：\n\
  \n```sql\nSELECT  *\nFROM    dbo.ExEvents AS ee\nORDER BY ee.Duration DESC;\n```\n\
  \n前面的查询将显示单个成本最高的查询，这对于您在本章中运行的测试来说已经足够了。在生产系统上，您可能还想运行类似的查询；但是，更有可能的是，您希望从数据聚合入手，如下例所示：\n\
  \n```sql\nSELECT  ee.SQLText,\nSUM(Duration) AS SumDuration,\nAVG(Duration) AS AvgDuration,\n\
  COUNT(Duration) AS CountDuration\nFROM    dbo.ExEvents AS ee\nGROUP BY ee.SQLText;\n\
  ```\n\n执行此查询可以让您按您最感兴趣的字段排序——例如，按`CountDuration`排序以获取最常调用的过程，或按`SumDuration`排序以获取累计运行时间最长的过程。您需要一种方法来移除或替换参数及参数值。这对于仅基于过程名称或仅基于不带参数或参数值的查询文本来进行聚合是必要的（因为这些值会不断变化）。\n\
  ```\n\n\n另一种机制是直接查询缓存，以查看其中成本最高的查询。这比配置扩展事件（Extended Events）更简单。此外，在大多数情况下，这种方法很可能捕获到大部分有问题的查询。因此，如果你是第一次开始对系统进行查询调优，你可能希望跳过设置扩展事件来识别成本最高的查询。然而，我发现随着时间的推移，当你开始量化系统行为时，你会需要扩展事件所能提供的那种详细数据。\n\
  \n我们在本书中已经探讨过的另一种方法是使用查询存储（Query Store）来收集系统中查询行为的度量指标。它的优势在于设置极其简单，查询方便，不涉及 XML。唯一的缺点是，如果你需要针对单个查询和存储过程调用的细粒度详细性能指标，那么你还是会需要依靠扩展事件来满足对此类数据的需求。\n\
  \n简而言之，在如何整合这些信息方面，你有许多选择和灵活性。对于 SQL Server 2016 和 SQL Server 2017，你甚至可以开始利用 R 或\
  \ Python 的数据分析来增强呈现的信息。不过，为了我们的目的，我将坚持使用我概述的第一种方法，即在 SSMS 中使用实时数据（Live Data）。\n\n\
  分析工作负荷的目标是识别出成本最高的查询（或通常意义上的高成本查询）；下一节将介绍如何做到这一点。\n\n## 识别成本最高的查询\n\n如前所述，你可以使用\
  \ SSMS 或查询技术，根据不同的标准来识别高成本查询。工作负荷中的查询可以根据 `CPU`、`读取` 或 `写入` 列进行排序，以识别成本最高的查询，如第\
  \ 3 章所讨论。你也可以使用聚合函数来得出累积成本以及单个成本。在生产系统中，了解累积运行时间最长、CPU 使用率最高或读写次数最多的存储过程，通常比仅仅识别单次执行数值最高的查询更有用。\n\
  \n因为即使在最繁忙的 OLTP 数据库中，总读取次数通常至少是总写入次数的七到八倍，所以按 `读取` 列排序查询通常比按 `写入` 列排序能发现更多有问题的查询（但你应该总是在自己的系统上测试这一点）。同样值得查看那些执行时间最长的查询。如第\
  \ 5 章所述，你可以使用性能监视器（Performance Monitor）捕获等待状态，并将其与特定查询一起查看，以帮助识别为什么某个查询运行时间过长。你还可以使用扩展事件捕获特定查询的等待情况，并将其添加到你的计算中。每个系统都是不同的。通常，我会首先处理最常调用的存储过程，然后是运行时间最长的，最后是读取次数最多的。当然，性能调优是一个迭代过程，因此你需要定期重新检查每个类别。\n\
  \n为了分析示例工作负荷中性能最差的查询，你需要了解查询在持续时间或读取方面的成本。由于这些值只有在查询执行完成后才能知道，因此你主要关注的是完成的事件。（使用完成事件进行性能分析的原理在第\
  \ 6 章中有详细解释。）\n\n出于展示目的，在 SSMS 中打开跟踪文件。图 27-1 显示了将几列移动到网格中，然后通过单击持续时间列（单击两次以获得降序而非升序排序）进行排序后捕获的跟踪输出。\n\
  \n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig1_HTML.jpg](img/323849_5_En_27_Fig1_HTML.jpg)\n\
  \n图 27-1\n\n显示 SQL 工作负荷的扩展事件会话输出\n\n就持续时间而言，性能最差的查询在 CPU 使用率和读取方面也是最差的之一。该存储过程 `dbo.PurchaseOrderBySalesPersonName`\
  \ 位于图 27-1 的顶部（你的值可能不同，但此查询很可能是性能最差的查询，或者至少是示例查询中最差的之一）。\n\n一旦你识别出性能最差的查询，下一个优化步骤是确定该查询消耗的资源。\n\
  \n### 确定成本最高查询的基线资源使用情况\n\n在你应用任何优化技术之前，当前性能最差查询的资源使用情况可以被视为一个基线数据。你可能对该查询应用不同的优化技术，并且可以将查询优化后的资源使用情况与基线数据进行比较，以确定给定优化技术的有效性。查询的资源使用情况可以分为两类呈现。\n\
  \n*   整体资源使用情况\n\n*   详细资源使用情况\n\n### 整体资源使用情况\n\n查询的整体资源使用情况提供了性能最差查询所消耗硬件资源的总体数据。你可以将优化后查询的资源使用情况与未优化查询的整体资源使用情况相比较，以确保你所应用性能技术的整体有效性。\n\
  \n你可以从工作负荷跟踪中确定查询的整体资源使用情况。你将使用该存储过程的第一次调用，因为它显示了最差的行为。表 27-2 显示了从图 27-1 的跟踪中得到的该查询的整体使用情况。需要注意一点，表中的持续时间单位是毫秒，而图\
  \ 27-1 中的值单位是微秒。在处理扩展事件时请记住考虑这一点。\n\n表 27-2\n\n表示查询所用资源数量的数据列\n\n| 数据列 | 值 | 描述\
  \ |\n| --- | --- | --- |\n| `LogicalReads` | 8671 | 查询执行的逻辑读取次数。如果在内存中找不到某个页，则对该页进行逻辑读取需要先从磁盘进行物理读取，将该页提取到内存中。\
  \ |\n|    `Writes` | 0 | 查询修改的页数。 |\n|    `CPU` | 62ms | 查询使用 CPU 的时长。 |\n|    `Duration`\
  \ | 464.1ms | SQL Server 处理此查询所花费的时间，从编译到返回结果集。 |\n\n### 注意\n\n在你的环境中，上述数据列的值可能不同。无论数据列的绝对值是多少，跟踪这些值以便稍后与相应值进行比较是很重要的。\n\
  \n\n\n## 详细的资源使用情况\n\n你可以分解查询的总体资源使用情况，以定位查询所访问的不同数据库对象上的瓶颈。这种详细的资源使用情况有助于你确定哪些操作问题最大。理解系统中的等待状态将帮助你确定需要重点关注调优的地方。一个粗略的经验法则是简单地查看持续时间；然而，持续时间会受到许多因素的影响，尤其是阻塞，因此它充其量只是一个不完美的衡量标准。在这种情况下，我将花时间在三个方面：CPU\
  \ 使用率、读取和持续时间。读取是一个流行的性能衡量指标，但孤立地看待它可能和持续时间一样有问题。这就是为什么我更喜欢捕获多个值，并能够跨查询的迭代进行比较。\n\
  \n正如你在第 6 章中看到的，你可以从查询的`STATISTICS IO`输出中获取该查询访问的各个表上执行的读取次数。你还可以设置`STATISTICS TIME`选项来获取查询的基本执行时间和\
  \ CPU 时间，包括其编译时间。你可以通过使用以下`SET`语句重新执行查询来获取此输出（或通过在查询窗口中选择“设置统计信息时间”复选框）：\n\n```\n\
  ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\nDBCC DROPCLEANBUFFERS;\n\
  GO\nSET STATISTICS TIME ON;\nGO\nSET STATISTICS IO ON;\nGO\nEXEC dbo.PurchaseOrderBySalesPersonName\
  \ @LastName = 'Hill%';\nGO\nSET STATISTICS TIME OFF;\nGO\nSET STATISTICS IO OFF;\n\
  GO\n```\n\n为了模拟图 27-1 所示的首次运行，使用`DBCC DROPCLEANBUFFERS`清除存储在内存中的数据（不要在生产系统上运行），并使用数据库作用域配置命令`CLEAR\
  \ PROCEDURE_CACHE`将指定数据库的查询从缓存中移除（同样不要在生产系统上运行）。\n\n性能最差的查询的`STATISTICS`输出如下所示：\n\
  \n```\nDBCC execution completed. If DBCC printed error messages, contact your system\
  \ administrator.\nSQL Server parse and compile time:\nCPU time = 0 ms, elapsed time\
  \ = 0 ms.\nSQL Server Execution Times:\nCPU time = 0 ms,  elapsed time = 0 ms.\n\
  SQL Server parse and compile time:\nCPU time = 0 ms, elapsed time = 0 ms.\nSQL Server\
  \ parse and compile time:\nCPU time = 31 ms, elapsed time = 40 ms.\n(1496 rows affected)\n\
  Table 'Employee'. Scan count 0, logical reads 2992, physical reads 2, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Table 'Product'. Scan count 0, logical reads 2992, physical reads 4, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Table 'PurchaseOrderDetail'. Scan count 763, logical reads 1539, physical reads\
  \ 9, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\nTable 'Worktable'. Scan count 0, logical reads 0, physical reads 0,\
  \ read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
  \ reads 0.\nTable 'Workfile'. Scan count 0, logical reads 0, physical reads 0, read-ahead\
  \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Table 'PurchaseOrderHeader'. Scan count 1, logical reads 44, physical reads 1, read-ahead\
  \ reads 42, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
  Table 'Person'. Scan count 1, logical reads 4, physical reads 1, read-ahead reads\
  \ 2, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\nSQL Server\
  \ Execution Times:\nCPU time = 15 ms,  elapsed time = 93 ms.\nSQL Server Execution\
  \ Times:\nCPU time = 46 ms,  elapsed time = 133 ms.\nSQL Server parse and compile\
  \ time:\nCPU time = 0 ms, elapsed time = 0 ms.\n```\n\n值得一提的一个注意事项是，返回此信息以及数据会带来一些开销，并且会影响一些性能指标，包括查询的持续时间衡量。对我们大多数人来说，在大多数情况下，这不是问题，但有时它会明显导致问题。请注意，通过这种方式捕获信息，你是在做出一种选择。\n\
  \n表 27-3 总结了`STATISTICS IO`的输出。\n\n表 27-3\n分解 STATISTICS IO 的输出\n\n| 表 | 逻辑读取 |\n\
  | --- | --- |\n| `Person.Employee` | 2,992 |\n| `Production.Product` | 2,992 |\n\
  | `Purchasing.PurchaseOrderDetail` | 1,539 |\n| `Purchasing.PurchaseOrderHeader`\
  \ | 44 |\n| `Person.Person` | 4 |\n\n通常，查询中引用的各个表的读取总和将小于查询执行的总读取次数。这是因为必须读取额外的页面来访问内部数据库对象，例如`sysobjects`、`syscolumns`和`sysindexes`。\n\
  \n表 27-4 总结了`STATISTICS TIME`的输出。\n\n表 27-4\n分解 STATISTICS TIME 的输出\n\n| 事件 | 持续时间\
  \ | CPU |\n| --- | --- | --- |\n| `编译` | 40 ms | 31 ms |\n| `执行` | 93 ms | 15 ms\
  \ |\n| `完成` | 133 ms | 46 ms |\n\n不要将逻辑读取与执行时间孤立地使用。在确定性能不佳的查询时，你需要考虑所有衡量指标。反之，也不要假设执行时间是一个完美的衡量标准。资源争用在执行时间中扮演着重要角色，因此你会看到此衡量指标存在一些变化。同时使用这两个值，但要充分理解，孤立地使用任何一个都可能无法准确反映实际情况。\n\
  \n你还可以为这些详细信息添加额外的指标。正如我在第 2-4 章中概述的，等待统计信息是理解系统上发生情况的重要衡量标准。这对于查询也同样适用。在 SQL Server\
  \ 2016 及更新版本中，当你捕获实际执行计划时，可以看到超过 1 毫秒的等待信息。该信息位于查询执行计划中 `SELECT` 操作符的属性中。你还可以使用扩展事件来捕获给定查询的等待统计信息，这将显示所有的等待，而不仅仅是那些超过\
  \ 1 毫秒的等待。这些是用于衡量查询性能的详细指标的有用补充。\n\n一旦确定了性能最差的查询并测量了其资源使用情况，下一步优化步骤就是确定影响查询性能的因素。然而，在此之前，你应该检查是否存在任何查询外部因素可能导致这种性能不佳。\n\
  \n## 分析和优化外部因素\n\n除了查询设计和索引等因素外，外部因素也会影响查询性能。因此，在深入研究查询的执行计划之前，你应该分析并优化可能影响查询性能的主要外部因素。以下是一些外部因素：\n\
  \n*   应用程序使用的连接选项\n*   查询所访问的数据库对象的统计信息\n*   查询所访问的数据库对象的碎片化程度\n\n\n\n## 分析应用程序使用的连接选项\n\
  \n在连接 SQL Server 时，可以设置各种选项（如 `ANSI_NULL` 或 `CONCAT_NULL_YIELDS_NULL`），使其与服务器或数据库的默认值不同。然而，为每个连接更改这些设置可能导致存储过程重新编译，从而引发性能下降。此外，某些选项（如\
  \ `ARITHABORT`）在处理索引视图和某些其他特殊索引时必须设置为 `ON`。如果未设置，可能会导致性能低下甚至代码错误。例如，将 `ANSI_WARNINGS`\
  \ 设置为 `OFF` 会导致优化器在生成执行计划时忽略索引视图和索引计算列。你可以再次查看执行计划的属性以获取此信息。创建执行计划时，ANSI 设置会与其一同存储。因此，如果你查询缓存以查看计划，并通过扩展事件或\
  \ SSMS 从查询存储中检索它，你将获得计划编译时的 ANSI 设置。此外，如果调用相同的查询且 ANSI 设置与当前缓存中的不同，则将编译一个新计划（并与另一个计划一起存储在查询存储中）。这些属性位于\
  \ `SELECT` 运算符中，如图 27-2 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig2_HTML.jpg](img/323849_5_En_27_Fig2_HTML.jpg)\n\
  \n图 27-2\n\n显示\"设置选项\"属性的执行计划属性\n\n我建议使用 ANSI 标准设置，即将以下选项设置为 `TRUE`：`ANSI_NULLS`、`ANSI_NULL_DFLT_ON`、`ANSI_PADDING`、`ANSI_WARNINGS`、`CURS0R_CLOSE_ON_COMMIT`、`IMPLICIT_TRANSACTIONS`\
  \ 和 `QUOTED_IDENTIFIER`。你可以使用单个命令 `SET ANSI_DEFAULTS ON` 将它们全部同时设置为 `TRUE`。查询 `sys.query_context_settings`\
  \ 也是查看跨工作负载所用设置历史的有用方法。\n\n## 分析统计信息的有效性\n\n查询中引用的数据库对象的统计信息是查询优化器用来决定某些执行计划的关键信息之一。如第\
  \ 13 章所述，优化器基于查询中引用的对象的统计信息生成查询的执行计划。统计信息所建议的行数是驱动优化器的成本估算过程的主要部分。通过这种方式，它决定了查询的处理策略。如果数据库对象的统计信息不准确，那么优化器可能会为查询生成低效的执行计划。可能会出现几个问题：由于禁用了\
  \ `auto_create` 统计信息而导致完全缺乏统计信息；由于未启用自动更新而导致统计信息过时；由于统计信息自然老化而导致统计信息过期；或者由于数据分布或采样大小问题而导致统计信息不准确。\n\
  \n如第 13 章所述，你可以使用 `DBCC SHOW_STATISTICS` 或 `sys.dm_db_stats_properties` 与 `sys.dm_db_stats_histogram`\
  \ 来检查表及其索引的统计信息。此查询中引用了五个表：`Purchasing.PurchaseOrderHeader`、`Purchasing.PurchaseOrderDetail`、`Person.Employee`、`Person.Person`\
  \ 和 `Production.Product`。你必须知道查询中使用了哪些索引，才能获取有关它们的统计信息。你可以在查看执行计划时确定这一点。具体来说，你现在可以查看执行计划，以获取优化器在构建执行计划时使用的特定统计信息。就像许多其他有趣的信息一样，这存储在\
  \ `SELECT` 运算符中，如图 27-3 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig3_HTML.jpg](img/323849_5_En_27_Fig3_HTML.jpg)\n\
  \n图 27-3\n\n优化器用于为正在探索的查询创建执行计划的统计信息\n\n虽然有五个表，但你可以看到在生成计划时使用了七个统计信息对象。如你所见，`PurchaseOrderDetail`\
  \ 表中使用了多个对象。你可能会看到来自任何给定表的多个不同的统计信息在使用中。这是轻松识别需要确定其效率的统计信息的好方法。\n\n现在，我将检查 `HumanResources`.`Employee`\
  \ 表主键上的统计信息，因为它具有最多的读取次数。现在运行以下查询：\n\n```\nDBCC SHOW_STATISTICS('HumanResources.Employee',\
  \ 'PK_Employee_BusinessEntityID');\n```\n\n前面的查询完成后，你将看到如图 27-4 所示的输出。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig4_HTML.jpg](img/323849_5_En_27_Fig4_HTML.jpg)\n\
  \n图 27-4\n\nHumanResources.Employee 的 SHOW_STATISTICS 输出\n\n你可以看到索引的选择性非常高，因为密度相当低，如\
  \ `All density` 列所示。你可以看到这些统计信息扫描了所有行，并且分布分为 146 个步骤。在此情况下，统计信息不太可能是此查询性能不佳的原因。在可能的情况下，查看实际执行计划并在那里比较估计行数与实际行数可能是个好主意。你还可以检查\
  \ `Updated` 列以确定上次更新此组统计信息的时间。如果统计信息更新已超过几天，那么你需要检查统计信息维护计划，并且应该手动更新这些统计信息。这当然取决于你数据库中数据更改的频率。在此情况下，考虑到提供的数据，这些统计信息可能已严重过时（然而，它们并没有，因为这是一个未更新的示例数据库）。\n\
  \n\n\n### 分析碎片整理的必要性\n\n如第 14 章所述，表的碎片化会增加执行扫描操作的查询所需访问的页面数量，从而对性能产生不利影响。然而，对于**点查询**而言，碎片通常不是问题。如果你观察到大量的扫描操作，你应该确保查询中涉及的数据库对象没有过度碎片化。\n\
  \n你可以通过查询 `sys.dm_db_index_physical_stats` 来确定性能最差查询所访问的五个表的碎片情况。首先对 `HumanResources.Employee`\
  \ 表运行查询。\n\n```sql\nSELECT s.avg_fragmentation_in_percent,\ns.fragment_count,\n\
  s.page_count,\ns.avg_page_space_used_in_percent,\ns.record_count,\ns.avg_record_size_in_bytes,\n\
  s.index_id\nFROM sys.dm_db_index_physical_stats(DB_ID('AdventureWorks2017'),\nOBJECT_ID(N'HumanResources.Employee'),\n\
  NULL,\nNULL,\n'Sampled') AS s\nWHERE s.record_count > 0\nORDER BY s.index_id;\n\
  ```\n\n图 27-5 显示了此查询的输出。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig5_HTML.jpg](img/323849_5_En_27_Fig5_HTML.jpg)\n\
  \n图 27-5: `HumanResources.Employee` 表的索引碎片情况\n\n如果你对其余四个表（按顺序 `Purchasing.PurchaseOrderHeader`、`Purchasing.PurchaseOrderDetail`、`Production.Product`\
  \ 和 `Person.Person`）运行相同的查询，输出将类似图 27-6。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig6_HTML.jpg](img/323849_5_En_27_Fig6_HTML.jpg)\n\
  \n图 27-6: 问题查询中涉及的四个表的索引碎片情况\n\n所有索引的碎片率都非常低，并且它们的空间利用率都非常高。这意味着它们中的任何一个都不太可能对性能产生负面影响。如果你还注意到这里的大多数索引包含的页面都少于\
  \ 100 个，这使得它们成为非常小的索引，即使它们存在碎片，其影响查询的程度也必定是微乎其微的。事实上，人们常常过于频繁地将碎片问题当作一种借口，试图在没有识别系统中真正问题（通常是查询的内部行为）的情况下改善性能。\n\
  \n值得注意的是，有一个索引拥有 301,696 行数据，而其他索引只有 19,972 行。如果你去查询一下，会发现它是一个 XML 索引，因此差异在于 XML\
  \ 树。它在当前这些查询中并未使用，所以我们在此忽略它。\n\n一旦你分析了可能影响查询性能的外部因素并解决了其中非最优的部分，你就应该分析内部因素，例如不恰当的索引和查询设计。\n\
  \n## 分析最耗资源查询的内部行为\n\n现在你需要分析优化器为该查询选择的内部处理策略，以确定影响查询性能的内部因素。分析可能影响查询性能的内部因素涉及以下步骤：\n\
  \n*   分析查询执行计划\n*   识别执行计划中代价最高的步骤\n*   分析处理策略的有效性\n\n### 分析查询执行计划\n\n要查看执行计划，请点击“显示实际执行计划”按钮以启用它，然后运行存储过程。请确保你在非生产系统上执行此类测试，同时尽可能使其与生产环境相似，以便其行为能反映你在生产环境中看到的情况。我们在第\
  \ 16 章介绍了执行计划。有关阅读执行计划的更多详细信息，请查阅我的书 *SQL Server 执行计划* (Red Gate Publishing, 2018)。图\
  \ 27-7 显示了性能最差查询的图形化执行计划。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig7_HTML.jpg](img/323849_5_En_27_Fig7_HTML.jpg)\n\
  \n图 27-7: 性能最差查询的实际执行计划\n\n这个计划的图形有些难以阅读。如果你没有结合代码查看，我会分解一些有趣的细节。你可以从该执行计划中观察到以下信息：\n\
  \n*   `SELECT` 属性\n    *   `优化级别: Full`\n    *   `提前终止原因: 找到足够好的计划`\n    *   查询时间统计:\
  \ 30 毫秒 CPU 时间 和 244 毫秒 已用时间\n    *   等待统计: 等待次数 4, 等待时间 214 毫秒, 等待类型 `ASYNC_NETWORK_IO`\n\
  *   数据访问\n    *   在非聚集索引 `Person.IX_Person_LastName_FirstName_MiddleName` 上进行索引查找\n\
  \    *   在 `PurchaseOrderHeader.PK_PruchaseOrderHeader_PurchaseOrderID` 上进行聚集索引扫描\n\
  \    *   在 `PurchaseOrderDetail.PK_PurchaseOrderDetail_PurchaseOrderDetailID` 上进行聚集索引查找\n\
  \    *   在 `Product.PK_Product_ProductID` 上进行聚集索引查找\n    *   在 `Employee.PK_Employee_BusinessEntityID`\
  \ 上进行聚集索引查找\n*   连接策略\n    *   在常量扫描和 `Person.Person` 表之间进行嵌套循环连接，其中 `Person.Person`\
  \ 表作为外表\n    *   在上一个连接的输出和 `Purchasing.PurchaseOrderHeader` 之间进行嵌套循环连接，其中 `Purchasing.PurchaseOrderHeader`\
  \ 表作为外表\n    *   在上一个连接的输出和 `Purchasing.PurchaseOrderDetail` 表之间进行嵌套循环连接，该表同样作为外表\n\
  \    *   在上一个连接的输出和 `Production.Product` 表之间进行嵌套循环连接，其中 `Production.Product` 作为外表\n\
  \    *   在上一个连接的输出和 `HumanResources.Employee` 表之间进行嵌套循环连接，其中 `HumanResource.Employee`\
  \ 表作为外表\n*   额外处理\n    *   常量扫描，为 `@LastName` 变量的 `LIKE` 操作提供占位符\n    *   计算标量，定义了\
  \ `@LastName` 变量 `LIKE` 操作的结构，显示了范围的上下界以及要检查的值\n    *   计算标量，将 `FirstName` 和 `LastName`\
  \ 列组合成一个新列\n    *   计算标量，从 `Purchasing.PurchaseOrderDetail` 表计算 `LineTotal` 列\n\
  \    *   计算标量，获取计算出的 `LineTotal` 并将其作为永久值存储在结果集中以供进一步处理\n\n通过浏览图形化执行计划属性表中公开的操作符详细信息，可以获得所有这些信息。\n\
  \n### 识别执行计划中代价最高的步骤\n\n一旦你理解了查询的执行计划，下一步就是识别执行计划中被估算为代价最高的步骤。尽管这些代价是估算值，并不能反映现实情况，但它们是你能获得的唯一用于衡量计划功能的数字，因此识别、理解并可能处理代价最高的操作可以带来巨大的性能收益。你可以看到以下两个代价最高的步骤：\n\
  \n*   代价最高步骤 1: 在 `Purchasing.PurchaseOrderHeader` 表上的聚集索引扫描，代价为 36%。\n*   代价最高步骤\
  \ 2: 哈希匹配连接操作，代价为 32%。\n\n接下来的优化步骤是分析这些代价最高的步骤，以确定是否可以通过重新设计查询或索引等技术来优化它们。\n\n\n\
  ### 分析处理策略\n\n虽然优化器已经完成了对计划的优化（这一点你可以通过优化过程因“找到足够好的计划”而提前终止，或者显示`FULL`优化且无提前终止原因得知），但这并不意味着查询和结构中没有调优的空间。你可以按照传统步骤开始对其进行评估。\n\
  \n代价最高的第一步是聚集索引扫描。扫描不一定是个问题。它仅仅表明，对于所需的信息检索，对相关对象（本例中是整个表）进行全表扫描比其他替代方案的开销更小。\n\n\
  代价最高的第二步是查询中的哈希匹配连接操作。这同样不一定是个问题。但是，哈希匹配有时表明存在不良索引、缺失索引，或者查询无法利用现有索引，因此它们通常是一个需要处理的区域。至少，对于\
  \ OLTP 系统来说通常是这样。对于大型数据仓库系统，哈希匹配可能是处理此类查询的理想方式。\n\n### 提示\n\n有时你可能会发现无法对处理策略中代价最高的步骤进行任何改进。在这种情况下，请集中精力分析下一个代价最高的步骤以识别问题。如果所有步骤都没有显示出优化的迹象，那么你可能需要考虑更改数据库设计或查询结构。\n\
  \n## 优化代价最高的查询\n\n一旦你诊断出具有高开销步骤的查询，下一个阶段就是实施必要的修正以降低这些步骤的代价。\n\n针对一个问题步骤的纠正措施可能有一个或多个替代解决方案。例如，你是应该创建一个新索引，还是以不同方式构建查询？在这种情况下，你应该根据预期效果和所需工作量来优先考虑解决方案。例如，如果一个窄索引或多或少能完成工作，那么通常应优先选择它，而不是可能导致业务测试的代码更改。修改代码也可能是侵入性更小的方法。你需要根据所处理的业务和应用程序情况来评估每种情况。\n\
  \n按照预期收益的顺序单独应用解决方案，并衡量它们各自对查询性能的影响。最后，你可以应用能带来最大性能提升的解决方案（或多个解决方案）来修正问题步骤。有时，最佳解决方案可能会损害工作负载中的其他查询，这一点可能显而易见。例如，在大量列上创建新索引可能会损害操作查询的性能。然而，由于这并非总是问题，最好通过测试来确定此类优化技术对整个工作负载的影响。如果某个特定解决方案损害了工作负载的整体性能，请选择次优方案，同时密切关注工作负载的整体性能。\n\
  \n### 修改代码\n\n查询中代价最高的操作是对`PurchaseOrderHeader`表的聚集索引扫描。你首先需要了解的是，对于返回的查询和数据，聚集索引扫描是必需的，还是由于代码导致的，或者是因为其他索引或不同的索引结构可能更有效。要开始理解为何会出现聚集索引扫描，你应该查看扫描操作的属性。既然得到了扫描结果，你还需要检查代码以确保其是可搜索的。具体来说，你关注的是`Predicate`属性，如`Figure\
  \ 27-8`所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig8_HTML.jpg](img/323849_5_En_27_Fig8_HTML.jpg)\n\
  \n`图 27-8` 聚集索引扫描的谓词\n\n这是一个计算。`PurchaseOrderTable`表的`VendorID`列上存在一个现有索引，可能对该查询有用，但因为你使用了`COALESCE`语句来过滤值，所以必须扫描整个表才能检索信息。`COALESCE`运算符基本上是一种考虑给定值可能为`NULL`，如果为`NULL`则提供一个替代值（可能是多个替代值）的方法。然而，它是一个函数，在`WHERE`子句、`JOIN`条件或`HAVING`子句中对列使用函数很可能导致扫描，因此你需要移除这个函数。因为这个函数，你不能简单地添加或修改索引，因为最终仍然会得到扫描。你可以尝试用`OR`子句重写查询，像这样：\n\
  \n```\n...WHERE   per.LastName LIKE @LastName AND\n          poh.VendorID = @VendorID\n\
  \          OR poh.VendorID = poh.VendorID…\n```\n\n但从逻辑上讲，这与`COALESCE`操作并不相同。它只是用`WHERE`子句的一部分替换了另一部分，而不仅仅是使用`OR`结构。因此，你可以像下面这样重写整个存储过程定义：\n\
  \n```\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderBySalesPersonName\n@LastName NVARCHAR(50),\n\
  @VendorID INT = NULL\nAS\nIF @VendorID IS NULL\nBEGIN\n    SELECT poh.PurchaseOrderID,\n\
  \           poh.OrderDate,\n           pod.LineTotal,\n           p.Name AS ProductName,\n\
  \           e.JobTitle,\n           per.LastName + ', ' + per.FirstName AS SalesPerson,\n\
  \           poh.VendorID\n    FROM   Purchasing.PurchaseOrderHeader AS poh\n   \
  \        JOIN Purchasing.PurchaseOrderDetail AS pod\n             ON poh.PurchaseOrderID\
  \ = pod.PurchaseOrderID\n           JOIN Production.Product AS p\n             ON\
  \ pod.ProductID = p.ProductID\n           JOIN HumanResources.Employee AS e\n  \
  \           ON poh.EmployeeID = e.BusinessEntityID\n           JOIN Person.Person\
  \ AS per\n             ON e.BusinessEntityID = per.BusinessEntityID\n    WHERE \
  \ per.LastName LIKE @LastName\n    ORDER BY per.LastName,\n           per.FirstName;\n\
  END\nELSE\nBEGIN\n    SELECT poh.PurchaseOrderID,\n           poh.OrderDate,\n \
  \          pod.LineTotal,\n           p.Name AS ProductName,\n           e.JobTitle,\n\
  \           per.LastName + ', ' + per.FirstName AS SalesPerson,\n           poh.VendorID\n\
  \    FROM   Purchasing.PurchaseOrderHeader AS poh\n           JOIN Purchasing.PurchaseOrderDetail\
  \ AS pod\n             ON poh.PurchaseOrderID = pod.PurchaseOrderID\n          \
  \ JOIN Production.Product AS p\n             ON pod.ProductID = p.ProductID\n  \
  \         JOIN HumanResources.Employee AS e\n             ON poh.EmployeeID = e.BusinessEntityID\n\
  \           JOIN Person.Person AS per\n             ON e.BusinessEntityID = per.BusinessEntityID\n\
  \    WHERE  per.LastName LIKE @LastName\n           AND poh.VendorID = @VendorID\n\
  \    ORDER BY per.LastName,\n           per.FirstName;\nEND\nGO\n```\n\n使用`IF`结构将查询一分为二。使用相同的参数集运行后，执行时间从\
  \ 434 毫秒变为 128 毫秒（在扩展事件中测量），这是一个相当显著的改进。读取次数从 8,671 增加到 9,243。虽然执行时间下降了很多，但读取次数略有增加。执行计划肯定不同了，如`图\
  \ 27-9`所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig9_HTML.jpg](img/323849_5_En_27_Fig9_HTML.jpg)\n\
  \n`图 27-9` 拆分查询后的新执行计划\n\n现在，代价最高的两个运算符不同了。不再有扫描操作，所有的连接操作现在都变成了循环连接。但是，增加了一个新的数据访问操作。你现在看到了一个`键查找`操作，如`第\
  \ 12 章`所述，因此你还有更多的调优机会。\n\n\n### 修复键查找操作\n\n既然你已经知道存在一个键查找操作，就需要确定第 12 章中建议的解决方法中有哪些可以应用。首先，你需要了解该操作正在检索哪些列。这意味着要访问\
  \ `Key Lookup` 运算符的属性。属性显示了 `VendorID` 和 `OrderDate` 列。这意味着你只需通过非聚簇索引的 `INCLUDE`\
  \ 部分，将这些列添加到索引的叶级页面中。你可以按如下方式修改该索引：\n\n```sql\nCREATE NONCLUSTERED INDEX IX_PurchaseOrderHeader_EmployeeID\n\
  ON Purchasing.PurchaseOrderHeader\n(\nEmployeeID ASC\n)\nINCLUDE\n(\nVendorID,\n\
  OrderDate\n)\nWITH DROP_EXISTING;\n```\n\n应用此索引会导致执行计划发生变化，并改善了性能。之前的结构和代码耗时 128\
  \ 毫秒。应用这个新索引后，查询执行时间降至 110 毫秒，读取次数降至 7748。执行计划现在完全不同了，如图 27-10 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig10_HTML.jpg](img/323849_5_En_27_Fig10_HTML.jpg)\n\
  **图 27-10** 修改索引后的新执行计划\n\n此时，执行计划中只剩下嵌套循环联接和索引查找。尽管查询中有 `ORDER BY` 语句，但甚至不再有排序操作。这是因为对\
  \ `Person` 表的索引查找输出是**有序**的，并且后续操作都保持了这个顺序。简而言之，对于这个查询，你基本上已经处理得很好了，但现在存储过程中有两个查询。\n\
  \n### 调优第二个查询\n\n消除 `COALESCE` 函数使你能够使用现有索引，但这样做实际上为你的查询创建了两条路径。因为之前只使用单个参数，你只探索了第一条路径，而忽略了第二个查询。现在让我们修改测试脚本，看看查询的第二条路径将如何工作。\n\
  \n```sql\nEXEC dbo.PurchaseOrderBySalesPersonName @LastName = 'Hill%',\n@VendorID\
  \ = 1496;\n```\n\n运行这个查询会产生一个完全不同的执行计划。你可以在图 27-11 中看到其中最有趣的部分。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig11_HTML.jpg](img/323849_5_En_27_Fig11_HTML.jpg)\n\
  **图 27-11** 存储过程中另一个查询的执行计划\n\n这个新查询由于查询条件的差异而表现出不同的行为。这里的主要问题是对 `PurchaseOrderHeader`\
  \ 表的一个聚集索引扫描。尽管在 `VendorID` 上有索引，但你看到的却是一次扫描。同样，你可以查看该运算符的输出包含哪些列。这次，不止两列：`OrderDate`、`EmployeeID`、`PurchaseOrderID`。这些列本身不大，但它们会增加索引的大小。你需要评估索引大小的增加是否值得换取消除索引扫描所带来的性能提升。我打算直接尝试，按如下方式修改索引：\n\
  \n```sql\nCREATE NONCLUSTERED INDEX IX_PurchaseOrderHeader_VendorID\nON Purchasing.PurchaseOrderHeader\n\
  (\nVendorID ASC\n)\nINCLUDE\n(\nOrderDate,\nEmployeeID,\nPurchaseOrderID\n)\nWITH\
  \ DROP_EXISTING;\nGO\n```\n\n在应用索引之前，执行时间约为 4.3 毫秒，读取次数为 273。应用索引后，执行时间降至 2.3 毫秒，读取次数为\
  \ 263。执行计划现在如图 27-12 所示。\n\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig12_HTML.jpg](img/323849_5_En_27_Fig12_HTML.jpg)\n\
  **图 27-12** 修改索引后的第二个执行计划\n\n新的执行计划由索引查找和嵌套循环联接组成。有一个排序运算符（计划中代价第二高的），它按照 `LastName`\
  \ 和 `FirstName` 对数据进行排序。让检索过程来处理排序可能有助于提高性能，但到目前为止调优已经相当成功，所以我暂时保持原样。\n\n对于拆分后的查询，还应考虑一个额外因素。当优化器处理这样的查询时，两个语句都将针对传入的参数值进行优化。因此，你可能会看到糟糕的执行计划，特别是对于使用\
  \ `VendorID` 进行筛选的第二个查询，这是由于**参数嗅探**出了问题。为了避免这种情况，应该进行一次额外的调优工作。\n\n### 创建包装器过程\n\
  \n因为你已经在存储过程中创建了两条路径以适应不同的数据查询机制，所以存在获得糟糕参数嗅探的可能性，因为无论传入什么参数，两条路径都会被编译。解决此问题的一个机制是将你现有的存储过程包装到一个包装器过程中。但首先，你必须为每个查询创建两个新过程，如下所示：\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderByLastName @LastName NVARCHAR(50)\n\
  AS\nSELECT poh.PurchaseOrderID,\npoh.OrderDate,\npod.LineTotal,\np.Name AS ProductName,\n\
  e.JobTitle,\nper.LastName + ', ' + per.FirstName AS SalesPerson,\npoh.VendorID\n\
  FROM Purchasing.PurchaseOrderHeader AS poh\nJOIN Purchasing.PurchaseOrderDetail\
  \ AS pod\nON poh.PurchaseOrderID = pod.PurchaseOrderID\nJOIN Production.Product\
  \ AS p\nON pod.ProductID = p.ProductID\nJOIN HumanResources.Employee AS e\nON poh.EmployeeID\
  \ = e.BusinessEntityID\nJOIN Person.Person AS per\nON e.BusinessEntityID = per.BusinessEntityID\n\
  WHERE per.LastName LIKE @LastName\nORDER BY per.LastName,\nper.FirstName;\nGO\n\
  ```\n\n```sql\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderByLastNameVendor\n@LastName\
  \ NVARCHAR(50),\n@VendorID INT\nAS\nSELECT poh.PurchaseOrderID,\npoh.OrderDate,\n\
  pod.LineTotal,\np.Name AS ProductName,\ne.JobTitle,\nper.LastName + ', ' + per.FirstName\
  \ AS SalesPerson,\npoh.VendorID\nFROM Purchasing.PurchaseOrderHeader AS poh\nJOIN\
  \ Purchasing.PurchaseOrderDetail AS pod\nON poh.PurchaseOrderID = pod.PurchaseOrderID\n\
  JOIN Production.Product AS p\nON pod.ProductID = p.ProductID\nJOIN HumanResources.Employee\
  \ AS e\nON poh.EmployeeID = e.BusinessEntityID\nJOIN Person.Person AS per\nON e.BusinessEntityID\
  \ = per.BusinessEntityID\nWHERE per.LastName LIKE @LastName\nAND poh.VendorID =\
  \ @VendorID\nORDER BY per.LastName,\nper.FirstName;\nGO\n```\n\n然后，你必须修改现有的存储过程，使其如下所示：\n\
  \n```sql\nCREATE OR ALTER PROCEDURE dbo.PurchaseOrderBySalesPersonName\n@LastName\
  \ NVARCHAR(50),\n@VendorID INT = NULL\nAS\nIF @VendorID IS NULL\nBEGIN\nEXEC dbo.PurchaseOrderByLastName\
  \ @LastName;\nEND\nELSE\nBEGIN\nEXEC dbo.PurchaseOrderByLastNameVendor @LastName,\
  \ @VendorID;\nEND\nGO\n```\n\n这样，无论选择哪条代码路径，这些查询第一次被调用时，每个过程都将获得自己唯一的执行计划，从而避免了糟糕的参数嗅探。而且，这不会对性能时间产生负面影响。如果我现在运行这两个查询，结果大致相同。这种模式对于少量路径非常有效。如果你有大量的路径，肯定超过\
  \ 10 条左右，这种模式就会失效，你可能需要寻找动态执行方法。\n\n根据新的查询，将执行时间从 434 毫秒降低到 110 毫秒或 2.3 毫秒，这是一个相当不错的改进，我们在读取次数上也取得了同样大的收益。如果这个查询在一分钟内被调用数百次，那么这种级别的降低确实会非常显著。但是，你应该始终回头评估其对整体数据库工作负载的影响。\n\
  \n\n\n## 分析对数据库工作负载的影响\n\n一旦你优化了性能最差的查询，就必须确保它不会损害其他查询的性能；否则，你的工作将是徒劳的。\n\n要分析整体工作负载的最终性能，你需要使用第\
  \ 15 章概述的技术。为了进行这个小测试，请重新执行完整的工作负载并捕获扩展事件以记录整体性能。\n\n### 提示\n\n为了与原始扩展事件进行正确比较，请确保图形执行计划已关闭。\n\
  \n图 27-13 显示了捕获到的相应扩展事件输出。\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig13_HTML.jpg](img/323849_5_En_27_Fig13_HTML.jpg)\n\
  图 27-13: 扩展事件输出，显示了优化代价最高的查询对完整工作负载的影响。\n\n有可能，对性能最差的查询进行优化可能会损害工作负载中其他某个查询的性能。然而，只要工作负载的整体性能得到提升，你就可以保留对该查询执行的优化。在本例中，其他查询未受影响。但现在，有一个查询的耗时比其他查询长。它可能也需要优化，整个过程又重新开始。这也是\
  \ `Query Store`（查询存储）发挥作用的地方，有了它，你可以轻松查找性能回归或行为变化，成为一个极好的资源。\n\n## 迭代优化阶段\n\n需要记住的一个重要点是，你需要多次迭代优化步骤。在每次迭代中，你可以识别一个或多个性能不佳的查询，并对其进行优化以改进整体工作负载的性能。你必须持续迭代优化步骤，直到达到足够的性能或满足你的服务级别协议（`SLA`）。\n\
  \n除了分析工作负载中资源密集型的查询外，你还必须分析工作负载中的错误条件。例如，如果你尝试向具有唯一约束保护的列的表中插入重复行，`SQL Server` 将拒绝新行并向应用程序报告错误条件。虽然数据未被输入表中，也没有执行有用的工作，但宝贵的资源却被用来确定数据无效并必须被拒绝。\n\
  \n为了识别由数据库请求引起的错误条件，你需要在扩展事件会话中包含以下内容（或者，你可以创建一个新的会话，在 `errors`（错误）或 `warnings`（警告）类别中查找这些事件）：\n\
  \n*   `error_reported`\n*   `execution_warning`\n*   `hash_warning`\n*   `missing_column_statistics`\n\
  *   `missing_join_predicate`\n*   `sort_warning`\n*   `hash_spill_details`\n\n例如，考虑以下\
  \ `SQL` 查询：\n```\nINSERT  INTO Purchasing.PurchaseOrderDetail\n(PurchaseOrderID,\n\
  DueDate,\nOrderQty,\nProductID,\nUnitPrice,\nReceivedQty,\nRejectedQty,\nModifiedDate\n\
  )\nVALUES  (1066,\n'1/1/2009',\n1,\n42,\n98.6,\n5,\n4,\n'1/1/2009'\n) ;\nGO\nSELECT\
  \  p.[Name],\npsc.[Name]\nFROM    Production.Product AS p,\nProduction.ProductSubCategory\
  \ AS psc ;\nGO\n```\n图 27-14 显示了相应的会话输出。\n![../images/323849_5_En_27_Chapter/323849_5_En_27_Fig14_HTML.jpg](img/323849_5_En_27_Fig14_HTML.jpg)\n\
  图 27-14: 扩展事件输出，显示了由 `SQL` 工作负载引发的错误。\n\n从图 27-14 的扩展事件输出中，你可以看到我有意生成的两个错误发生了：`error_reported`\
  \ 和 `missing_join_predicate`。\n\n`error_reported` 错误是由 `INSERT` 语句引起的，该语句试图插入未通过引用完整性检查的数据；具体来说，它试图插入\
  \ `Productld = 42`，而 `Production.Product` 表中没有这个值。从 `error_number` 列中，你可以看到错误号是\
  \ 547。`message` 列显示了错误的完整描述。不过值得注意的是，`error_reported` 可能相当“唠叨”，返回大量数据，但并非所有数据都有用。\n\
  \n第二种错误类型 `missing_join_predicate` 是由 `SELECT` 语句引起的：\n```\nSELECT p.Name,\nc.Name\n\
  FROM Production.Product AS p,\nProduction.ProductSubcategory AS c;\n```\n如果你仔细查看\
  \ `SELECT` 语句，会发现该查询没有在两个表之间指定 `JOIN` 子句。表之间缺少连接谓词通常会导致不准确的结果集和代价高昂的查询计划。这就是所谓的\
  \ `Cartesian join`（笛卡尔连接），它会导致 `Cartesian product`（笛卡尔积），其中一个表中的每一行与另一个表中的每一行组合。你必须在\
  \ `Errors and Warnings`（错误和警告）部分识别引起此类事件的查询，并实施必要的修复。例如，在上面的 `SELECT` 语句中，你不应该将\
  \ `Production.ProductCategory` 表的每一行与 `Production.Product` 表的每一行连接起来——你必须只连接具有匹配\
  \ `ProductCategorylD` 的行，如下所示：\n```\nSELECT p.Name,\nc.Name\nFROM Production.Product\
  \ AS p\nJOIN Production.ProductSubcategory AS c\nON p.ProductSubcategoryID = c.ProductSubcategoryID;\n\
  ```\n即使在你彻底分析并优化了工作负载之后，也必须记住工作负载优化不是一蹴而就的过程。数据库上的工作负载或数据分布会随时间变化，因此你应该定期检查你的查询是否针对当前情况进行了优化。你也可能会发现数据库本身设计上的缺陷。过度规范化导致的过多连接或不当反规范化导致的过多列，都可能导致查询性能不佳，且没有真正的优化机会。在这种情况下，你将需要考虑重新设计数据库以获得更优化的结构。\n\
  \n## 总结\n\n正如你在本章所学，优化数据库工作负载需要一系列工具、实用程序和命令来分析工作负载中涉及查询的不同方面。你可以使用扩展事件来分析工作负载的大局并识别代价高昂的查询。一旦识别出代价高昂的查询，就可以使用执行计划和各种\
  \ `SQL` 命令来排查与这些查询相关的问题。根据在代价高昂的查询中检测到的问题，你可以应用一组或多组优化技术来提高查询性能。对代价高昂查询的优化应能改善工作负载的整体性能；如果情况并非如此，你应该回滚这些更改。\n\
  \n在下一章中，我将把与性能相关的最佳实践进行简明扼要的总结。你将能够把这些信息作为一个快速易读的参考来使用。\n\n\n\n# 28. SQL Server\
  \ 优化清单\n\n如果您已阅读本书前 27 章，那么您就理解了性能优化的主要方面。您也理解这是一项具有挑战性且持续进行的活动。\n\n我希望在本章中做的是提供一个性能监控清单，可以作为现场数据库开发人员和\
  \ DBA 的快速参考。其理念类似于*最佳实践*的撕卡概念。本章并未涵盖所有内容，但它将一些能对 SQL Server 系统性能产生快速且显著影响的主要调优活动总结在一个地方。我已将这些清单项目分类为以下几个部分：\n\
  \n*   数据库设计\n*   配置设置\n*   数据库管理\n*   数据库备份\n*   查询设计\n\n每个部分都包含若干优化建议和技术。在适当的情况下，每个部分也会交叉引用本书中提供更详细信息的特定章节。\n\
  \n###### 数据库设计\n\n数据库设计是一个广泛的主题，在这本查询调优书籍的一小节中无法给予其应有的重视；尽管如此，我建议您关注以下设计方面，以确保从早期阶段就注意到数据库性能：\n\
  \n*   使用实体完整性约束。\n*   维护域和引用完整性约束。\n*   采用索引设计最佳实践。\n*   避免在存储过程名称中使用 `sp_` 前缀。\n\
  *   最小化触发器的使用。\n*   将表放入内存存储。\n*   使用列存储索引。\n\n### 使用实体完整性约束\n\n*数据完整性*对于确保数据库中的数据质量至关重要。数据完整性的一个基本组成部分是*实体完整性*，它将一行定义为特定表中的唯一实体；也就是说，表中的每一行都必须是唯一可识别的。用作表中唯一行标识符的列或列集必须表示为表的主键。\n\
  \n有时，一个表可能包含一个额外的列（或列集），该列也可以用于唯一标识表中的一行。例如，`Employee` 表可能包含 `EmployeeID` 和 `SocialSecurityNumber`\
  \ 列。`EmployeeID` 列用作唯一行标识符，可以将其定义为*主键*。同样，`SocialSecurityNumber` 列可以定义为*替代键*。在 SQL\
  \ Server 中，可以使用唯一约束来定义替代键，唯一约束本质上是主键的“小弟”。实际上，唯一约束和主键约束在后台都使用唯一索引。\n\n值得注意的是，对于使用自然键（例如前面示例中的\
  \ `SocialSecurityNumber` 列）还是人工键（例如 `EmployeeID` 列），存在合理的争议。我见过两种设计都取得了成功，但每种方法都有其优点和缺点。与其建议一种优于另一种，我将为您提供使用两者的几个理由以及与每种方法相关的一些成本，从而避免这种宗教式的争论。标识列通常是\
  \ `INT` 或 `BIGINT`，这使得它窄小且易于索引，从而提高性能。此外，将主键的值与任何业务知识分离在某些圈子中被认为是好的设计。有时全局唯一标识符\
  \ (`GUIDs`) 可能被用作主键。它们工作正常但难以阅读，因此会影响故障排除，并且可能导致更大的索引碎片。键的宽度也可能对性能产生负面影响。人工键的缺点之一是这些数字有时会获得业务含义，这绝不应该发生。另一件需要记住的事情是，您必须为替代键创建唯一约束，以防止在不应存在的情况下创建多行。这增加了您必须存储和维护的信息量。自然键提供了一个清晰、人类可读、具有真正业务含义的主键。它们往往是较宽的字段——有时非常宽——使得它们在索引中效率较低。此外，有时数据可能会发生变化，这会在您的数据库中产生深远的连锁反应，因为您将不得不更新使用该键值的每一个地方，而使用人工键只需更新一处。随着欧盟《通用数据保护条例》（GDPR）等合规性的引入，在担心无需删除数据即可修改数据的能力时，自然键变得更加成问题。\n\
  \n让我重申一下，任何一种方法都可以很好地工作，并且每种方法都提供了大量调优的机会。任何一种方法，只要应用得当并妥善维护，都将保护您数据的完整性。\n\n\n\
  # 唯一索引与数据完整性约束的性能优势\n\n除了维护数据完整性之外，唯一索引——作为实体完整性约束的主要载体——还有助于优化器生成高效的执行计划。SQL Server\
  \ 通常可以比搜索非唯一索引更快地搜索唯一索引。这是因为唯一索引中的每一行都是唯一的；一旦找到一行，SQL Server 就不必进一步查找其他匹配行（优化器知道这一事实）。如果一列用于排序（或\
  \ `GROUP BY` 或 `DISTINCT`）操作，请考虑在该列上定义唯一约束（使用唯一索引），因为具有唯一约束的列通常比没有唯一约束的列排序更快。此外，唯一约束为优化器的基数估计提供了额外信息。即使是一个“未使用”或“已停用”的索引，由于对基数估计的影响，也可能对优化有益。\n\
  \n为了理解实体完整性或唯一约束带来的性能优势，请看一个示例。假设你想修改 `Production.Product` 表上现有的唯一索引。\n\n```sql\n\
  CREATE NONCLUSTERED INDEX AK_Product_Name\nON Production.Product\n(\nName ASC\n\
  )\nWITH (DROP_EXISTING = ON)\nON [PRIMARY];\nGO\n```\n\n这个非聚集索引不包含 `UNIQUE` 约束。因此，尽管\
  \ `[Name]` 列包含唯一值，但非聚集索引中缺少 `UNIQUE` 约束，无法预先将这一信息提供给优化器。现在，让我们考虑 `UNIQUE` 约束（或缺少\
  \ `UNIQUE` 约束）对以下 `SELECT` 语句的性能影响：\n\n```sql\nSELECT DISTINCT\n(p.Name)\nFROM Production.Product\
  \ AS p;\n```\n\n图 28-1 显示了此 `SELECT` 语句的执行计划。\n\n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig1_HTML.jpg](img/323849_5_En_28_Fig1_HTML.jpg)\n\
  \n图 28-1 在 [Name] 列上没有 UNIQUE 约束的执行计划\n\n从执行计划中可以看到，使用了非聚集 `AK_ProductName` 索引来检索数据，然后在数据上执行\
  \ `Stream Aggregate` 操作，以便在 `[Name]` 列上对数据进行分组，从而可以从最终结果集中删除重复的 `[Name]` 值。请注意，如果优化器预先被告知\
  \ `[Name]` 列的唯一性，就不需要 `Stream Aggregate` 操作。你可以通过使用 `UNIQUE` 约束定义非聚集索引来实现这一点，如下所示：\n\
  \n```sql\nCREATE UNIQUE NONCLUSTERED INDEX [AK_Product_Name]\nON [Production].Product\n\
  WITH (\nDROP_EXISTING = ON)\nON    [PRIMARY];\nGO\n```\n\n图 28-2 显示了该 `SELECT` 语句新的执行计划。\n\
  \n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig2_HTML.jpg](img/323849_5_En_28_Fig2_HTML.jpg)\n\
  \n图 28-2 在 [Name] 列上有 UNIQUE 约束的执行计划\n\n总的来说，实体完整性约束（即主键和唯一约束）为优化器提供了有关预期结果的有用信息，协助优化器生成高效的执行计划。值得注意的是，`sys.dm_db_index_usage_stats`\
  \ 不会显示针对定义唯一约束的索引运行的约束检查。\n\n## 维护域和引用完整性约束\n\n数据完整性的另外两个重要组成部分是 **域完整性** 和 **引用完整性**。列的域完整性可以通过限制列的数据类型、定义输入数据的格式以及限制列的可接受值范围来强制实施。引用完整性则通过在表之间定义的外键约束来强制实施。SQL\
  \ Server 提供以下功能来实现域和引用完整性：数据类型、`FOREIGN KEY` 约束、`CHECK` 约束、`DEFAULT` 定义和 `NOT NULL`\
  \ 定义。如果应用程序要求将数据列的值限制在某个值范围内，则此业务规则可以在应用程序代码中实现，也可以在数据库架构中实现。使用域约束（如 `CHECK` 约束）在数据库中实现此类业务规则，可以帮助优化器生成高效的执行计划。\n\
  \n为了理解域完整性的性能优势，请看这个示例：\n\n```sql\nDROP TABLE IF EXISTS dbo.Test1;\nGO\nCREATE TABLE\
  \ dbo.Test1 (\nC1 INT,\nC2 INT CHECK (C2 BETWEEN 10 AND 20)\n) ;\nINSERT  INTO dbo.Test1\n\
  VALUES  (11, 12);\nGO\nDROP TABLE IF EXISTS dbo.Test2;\nGO\nCREATE TABLE dbo.Test2\
  \ (C1 INT, C2 INT);\nINSERT  INTO dbo.Test2\nVALUES  (101, 102);\n```\n\n现在执行以下两个\
  \ `SELECT` 语句：\n\n```sql\nSELECT T1.C1,\nT1.C2,\nT2.C2\nFROM dbo.Test1 AS T1\nJOIN\
  \ dbo.Test2 AS T2\nON T1.C1 = T2.C2\nAND T1.C2 = 20;\nGO\nSELECT T1.C1,\nT1.C2,\n\
  T2.C2\nFROM dbo.Test1 AS T1\nJOIN dbo.Test2 AS T2\nON T1.C1 = T2.C2\nAND T1.C2 =\
  \ 30;\n```\n\n这两个 `SELECT` 语句看起来相同，除了谓词值（第一个语句中是 `20`，第二个语句中是 `30`）。尽管这两个 `SELECT`\
  \ 语句形式相同，但由于 `Tl.C2` 列上的 `CHECK` 约束，优化器对它们的处理方式不同，如图 28-3 中的执行计划所示。\n\n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig3_HTML.jpg](img/323849_5_En_28_Fig3_HTML.jpg)\n\
  \n图 28-3 谓词值在 CHECK 约束范围内和范围外的执行计划\n\n从执行计划中可以看到，对于第一个查询（`T1.C2` = `20`），优化器访问了两个表的数据。对于第二个查询（`Tl.C2`\
  \ = `30`），优化器根据列 `Tl.C2` 上的相应 `CHECK` 约束，理解该列不能包含 `10` 到 `20` 范围之外的任何值。因此，优化器甚至不会访问任一表的数据。因此，第二个查询的相对估计成本，以及几乎不做任何事的实际性能测量结果，都是\
  \ `0%`。\n\n我已在第 19 章的“声明式引用完整性”一节中详细解释了引用完整性的性能优势。\n\n因此，你不仅应该使用域和引用约束来实现数据完整性，还应该利用它们来协助优化器生成高效的查询计划。确保你的外键约束是使用\
  \ `WITH CHECK` 选项创建的，否则优化器会忽略它们。要了解域和引用完整性的其他性能优势，请参考第 19 章的“使用域和引用完整性”一节。\n\n\n\
  ### 采用索引设计的最佳实践\n\n最常见的优化建议之一——也通常是提升良好性能的最大贡献因素之一——是为数据库工作负载实施正确的索引。索引不同于表，表用于存储数据，即使没有深入了解查询也可以设计（只要表能正确表示业务实体）。相反，索引必须通过仔细审查数据库查询来设计。除了常见且显而易见的情况（例如主键和唯一索引）外，请不要陷入在不了解查询的情况下设计索引的陷阱。即使是对于主键和唯一索引，我也建议在开始设计数据库查询时验证这些索引的适用性。考虑到索引对于数据库性能的重要性，在设计索引时必须谨慎。\n\
  \n尽管索引的性能方面在第 8、9、12 和 13 章中有详细解释，但我会在此重申一份简短的建议列表，以便于参考：\n\n*   为索引键选择窄列。\n*  \
  \ 确保候选列中数据的选择性非常高（即，该列返回的候选值数量必须很少）。\n*   优先选择具有整数数据类型（或整数数据类型的变体）的列。同时，避免在具有字符串数据类型（如\
  \ `VARCHAR`）的列上创建索引。\n*   在多列索引中，考虑将选择性较高的列列在前面。\n*   在索引中使用 `INCLUDE` 列表，作为一种在不更改索引键结构的情况下使索引覆盖该结构的方法。通过将列添加到键中来实现这一点，这使您可以避免昂贵的查找操作。\n\
  *   在决定对哪些列建立索引时，要额外关注查询的 `WHERE` 子句、`JOIN` 条件列和 `HAVING` 子句。这些可以作为进入表的入口点，特别是如果某个列上的\
  \ `WHERE` 子句条件在高选择性的值或常量上过滤数据。这样的子句可以使该列成为索引的首选候选。\n*   在选择索引类型（聚集或非聚集、列存储或行存储）时，请牢记各种索引类型的优缺点。\n\
  \n设计聚集索引时要格外小心，因为表上的每个非聚集索引都依赖于聚集索引。因此，在设计和实施聚集索引时，请遵循以下建议：\n\n*   尽可能保持聚集索引窄。您不希望因为一个宽的聚集索引而加宽所有的非聚集索引。\n\
  *   先创建聚集索引，然后再在表上创建非聚集索引。\n*   如果需要，使用 `CREATE INDEX` 命令中的 `DROP_EXISTING = {ON|OFF}`\
  \ 命令，以单步方式重建聚集索引。您不希望重建表上的所有非聚集索引两次：一次是在聚集索引被删除时，另一次是在聚集索引被重新创建时。\n*   不要在频繁更新的列上创建聚集索引。如果您这样做，表上的非聚集索引将通过保持与聚集索引键值同步而产生额外负载。\n\
  \n为了跟踪您已创建的索引并确定需要创建的其他索引，您应该利用 SQL Server 2017 和 Azure SQL Database 提供的动态管理视图。通过定期（比如每周一次左右）检查\
  \ `sys.dm_db_index_usage_stats` 中的数据，您可以确定哪些索引实际被使用，哪些是冗余的。那些没有为您的查询做出贡献以帮助提高性能的索引，只会消耗系统资源。当表中的数据发生变化时，它们不仅需要更多的磁盘空间，还需要额外的\
  \ I/O 来维护索引内的数据。另一方面，查询 `sys.dm_db_missing_indexes_details` 将显示系统认为缺失的潜在索引，甚至会建议\
  \ `INCLUDE` 列。您可以访问 DMV `sys.dm_db_missing_indexes_groups_stats` 查看关于可能受益于特定索引组的查询被调用次数的汇总信息。请记住要彻底测试这些建议，不要假设它们一定是正确的。所有这些建议都仅仅是建议。所有这些技巧可以结合起来，为您提供一个长期维护系统中索引的优化方法。\n\
  \n### 避免在存储过程名称中使用 `sp_` 前缀\n\n作为规则，不要对用户存储过程使用 `sp_` 前缀，因为 SQL Server 假定带有 `sp_`\
  \ 前缀的存储过程是系统存储过程，并且这些过程应该位于 master 数据库中。使用 `sp` 或 `usp` 作为用户存储过程的前缀非常普遍。这既不是一个重大的性能打击，也不是一个主要问题，但为什么要自找麻烦呢？`sp_`\
  \ 前缀带来的性能影响在第 20 章的“小心命名存储过程”一节中有详细解释。完全去掉前缀是一个不错的选择。您有足够的空间用于描述性的对象名称。没有必要使用那些不能增加查询功能定义的奇怪缩写。\n\
  \n### 最小化触发器的使用\n\n触发器为在数据库内自动化行为提供了一种有吸引力的方法。由于它们在数据被其他进程操作时触发（无论进程如何），触发器可用于确保在数据更改时运行某些功能。正是这种功能使它们变得危险，因为对于正在处理系统的开发人员或\
  \ DBA 来说，它们并非立即可见。在设计查询和排查性能问题时，必须考虑到它们。因为它们带有某种隐藏的成本，所以应仔细考虑触发器。在使用触发器之前，请确保解决所提出问题的唯一方法是使用触发器。如果您确实使用了触发器，请在尽可能多的地方记录这一事实，以确保其他开发人员和\
  \ DBA 能考虑到触发器的存在。\n\n### 将表放入内存中存储\n\n虽然内存存储机制有大量限制，但其性能收益很高。如果您有一个高容量的 OLTP 系统，并且看到大量\
  \ I/O 争用，尤其是在闩锁方面，那么内存存储是一个可行的选择。您可能还想探索将内存存储用于表变量，以帮助增强其性能。如果您的数据不需要持久化，您甚至可以使用\
  \ `SCHEMA_ONLY` 持久性选项在内存中创建表。一般方法是将内存对象用于高吞吐量的 OLTP，在这些场景中您可能会遇到并发问题，而不是数据仓库场景中遇到的更大程度的扫描等问题。所有这些方法都会带来显著的性能优势。但请记住，您必须有足够的内存来支持这些选项。这里没有什么魔法。您是通过投入大量的内存（也就是金钱）来增强性能的。\n\
  \n\n\n## 使用列存储索引\n\n如果你正在设计和构建数据仓库，使用列存储索引几乎是自然而然的事情。你的大多数查询都可能涉及跨大量数据的聚合，因此列存储索引是天然的性能增强器。不过，别忘了在非聚簇列存储索引中发挥作用，特别是在你经常运行分析型查询的\
  \ **OLTP** 系统中。虽然这会带来额外的维护开销，并且会增加数据库的大小，但其带来的益处是巨大的。你可以创建一个由聚簇索引定义的 **行存储表**，该表可以使用列存储索引。你也可以创建一个由其聚簇索引定义的\
  \ **列存储表**，该表可以使用行存储索引。通过这两种机制，你可以确保满足最常见的查询类型（分析型与 **OLTP**），同时仍然支持其他类型。\n\n#####\
  \ 配置设置\n\n以下是一份对数据库性能有重大影响的服务器和数据库配置设置清单：\n\n*   内存配置选项\n*   并行度成本阈值\n*   最大并行度\n\
  *   针对即席工作负载进行优化\n*   被阻塞进程阈值\n*   数据库文件布局\n*   数据库压缩\n\n我将在接下来的章节中更详细地介绍这些设置。\n\
  \n### 内存配置选项\n\n正如第 2 章“**SQL Server 内存管理**”部分所解释的，强烈建议将 `max server memory`（最大服务器内存）设置配置为一个由系统配置确定的非默认值。这些\
  \ **SQL Server** 的内存配置在第 2 章的“**内存瓶颈分析**”和“**内存瓶颈解决方案**”部分有详细说明。\n\n### 并行度成本阈值\n\
  \n在具有多个处理器的系统上，查询的并行执行是可能的。并行度的默认值为 **5**。这代表优化器估计查询执行需要五秒的成本。在大多数情况下，我发现这个值明显过低；换句话说，更高的并行度阈值会带来更好的性能。在你的系统上进行测试将帮助你确定合适的值。为这个值提供建议可能有些危险，但我还是要这么做。我会从测试\
  \ **35** 这个值开始，然后看看情况如何。更好的方法是使用 **查询存储** 的数据来确定所有查询的平均成本，然后将 `Cost Threshold for\
  \ Parallelism`（并行度成本阈值）的值设定为高于该平均值两到三个标准差。这样，大约 **95%** 到 **98%** 的查询将不会并行执行，而那些真正需要的查询则会并行执行。最后，记住你运行的是什么类型的系统。**OLTP**\
  \ 系统更可能从大量使用少量 **CPU** 的查询中受益，而分析系统则更可能从更多使用更多 **CPU** 的查询中受益。\n\n### 最大并行度\n\n\
  当系统有多个可用处理器时，默认情况下，**SQL Server** 会在并行执行期间使用所有处理器。为了更好地控制机器负载，你可能会发现限制并行执行使用的处理器数量是有用的。此外，你可能还需要设置关联性，以便为操作系统以及与\
  \ **SQL Server** 一起运行的其他服务保留某些处理器。**OLTP** 系统可能会从完全禁用并行性中受益，尽管这是一个有争议的选择。首先尝试提高并行度成本阈值，因为即使在\
  \ **OLTP** 系统中，也有一些查询（尤其是维护作业）会从并行执行中受益。你也可以探索使用资源调控器来控制某些工作负载的可能性。\n\n### 针对即席工作负载进行优化\n\
  \n如果你的系统主要调用是作为即席或动态 **T-SQL** 提交的，而不是通过定义良好的存储过程或参数化查询（例如你可能在某些对象关系映射（**ORM**）软件实现中找到的那种），那么开启\
  \ `optimize for ad hoc workloads`（针对即席工作负载进行优化）设置将减少过程缓存的消耗，因为对于初始查询调用，系统会创建计划存根，而不是完整的执行计划。这在第\
  \ 18 章中有详细说明。\n\n### 被阻塞进程阈值\n\n`blocked process threshold`（被阻塞进程阈值）设置以秒为单位定义，当达到该值时会触发被阻塞进程报告。当查询运行并超过此阈值时，报告会被触发。同时也会触发一个警报，可用于发送电子邮件或短信。需要通过测试单个系统来确定应设置为何值。你可以使用扩展事件中的事件来监视此情况。\n\
  \n### 数据库文件布局\n\n为方便参考，以下是规划数据库文件布局时应考虑的最佳实践：\n\n*   将用户数据库的数据文件和事务日志文件放在不同的 **I/O**\
  \ 路径上。这允许事务日志磁头顺序前进，而不会被数据文件常用的非顺序 **I/O** 随意移动。\n*   将事务日志放在专用磁盘上还能增强数据保护。如果数据库磁盘发生故障，你将能够通过备份事务日志来保存直到故障点的所有已完成事务。在恢复过程中使用这个最后的事务日志备份，你将能够将数据库恢复到故障点。这被称为\
  \ **时间点恢复**。\n*   避免为事务日志使用 **RAID 5**，因为对于每次写入请求，**RAID 5** 磁盘阵列所产生的磁盘 **I/O**\
  \ 数量是 **RAID 1** 或 **10** 的两倍。\n*   你可以选择 **RAID 5** 用于数据文件，因为即使在繁重的 **OLTP** 系统中，请求数量通常是写入请求数量的七到八倍。此外，对于读取请求，在总磁盘数量相同的情况下，**RAID\
  \ 5** 的性能与 **RAID 1** 和 **RAID 10** 相似。\n*   考虑迁移到更现代的磁盘子系统，如 **SSD** 或 **FusionIO**。\n\
  *   为 `tempdb` 创建多个文件。一般规则是文件数量为逻辑处理器核心数的一半或四分之一。现在 `tempdb` 中的所有分配都使用统一区。你还会看到文件现在会自动以相同大小增长。\n\
  \n要详细了解数据库文件布局和 **RAID** 子系统，请参阅第 3 章的“**磁盘瓶颈解决方案**”部分。\n\n### 数据库压缩\n\n自 **2008**\
  \ 年起，**SQL Server** 企业版和开发版就提供了数据压缩功能。由于更多数据存储在一个页面上，这可以在空间使用和性能方面带来巨大好处。这些好处是以增加系统的\
  \ **CPU** 和内存开销为代价的；然而，好处通常远远超过成本。在实施压缩时请考虑到这一点。\n\n###### 数据库管理\n\n供你参考，以下是作为管理数据库服务器过程的一部分，你应该定期执行的与性能相关的数据库管理活动的简短列表：\n\
  \n*   保持统计信息为最新状态。\n*   将索引碎片保持在最低水平。\n*   避免使用诸如 `AUTOCLOSE`（自动关闭）或 `AUTOSHRINK`（自动收缩）之类的自动数据库功能。\n\
  \n在以下部分中，我将更详细地介绍上述活动。\n\n### 注意\n\n有关 **SQL Server 2017** 管理需求和方法的详细说明，请参阅 **Microsoft\
  \ SQL Server** 联机丛书文章“**数据库引擎功能和任务**”（ [`http://bit.ly/SIlz8d`](http://bit.ly/SIlz8d)\
  \ ）。\n\n\n\n### 保持统计信息最新\n\n数据库统计信息对性能的影响在第 13 章（以及本书各处）有详细解释；不过，下面这个简短列表可以作为快速参考，助你保持统计信息的最新状态：\n\
  \n*   允许 SQL Server 使用配置参数 `AUTO_CREATE_STATISTICS` 和 `AUTO_UPDATE_STATISTICS` 的默认设置，自动维护表中数据分布的统计信息。\n\
  \n*   作为一种主动措施，你可以根据系统需求和支持情况，按计划以编程方式更新每个数据库对象的统计信息。这种做法能在自动更新统计信息功能未能提供满意结果时，部分保护你的数据库免受统计信息过时的影响。在第\
  \ 13 章中，我将说明如何设置一个 SQL Server 作业来按计划以编程方式更新统计信息。\n\n*   请记住，你还可以以异步方式更新统计信息。这减少了更新统计信息时的争用；因此，如果你的系统访问量相当稳定，可以使用此方法更频繁地更新统计信息。如果你观察到统计信息更新存在等待，异步方式更可能有所帮助。\n\
  \n### 注意\n\n请确保在索引碎片整理作业完成之前，安排好统计信息更新作业，如本章后面所述。\n\n### 将索引碎片保持在最低限度\n\n以下最佳实践将帮助你将索引碎片保持在最低限度：\n\
  \n*   在非高峰时段定期对数据库进行碎片整理。\n\n*   定期确定索引的碎片级别；然后，根据该碎片情况，要么重建索引，要么通过执行第 14 章中概述的碎片整理查询来整理索引碎片。\n\
  \n*   请记住，非常小的表完全不需要进行碎片整理。\n\n*   在整理非常大的数据库的索引时，可能适用不同的规则。\n\n*   如果你的索引仅用于单次查找操作，那么碎片不会影响性能。\n\
  \n*   在 Azure SQL Database 中，仅在真正需要时才重建索引要重要得多。索引重建会消耗大量 I/O 带宽，并可能导致限流。\n\n同时请记住，索引碎片远没有大多数人想象的那么严重。一些专家甚至认为整理索引碎片是在浪费时间。虽然我仍然认为它有好处，但这取决于具体情况，因此务必仔细监控和衡量你的性能指标，以便能够判断碎片整理是否有益。\n\
  \n### 避免使用 `AUTO_CLOSE` 或 `AUTO_SHRINK` 等数据库函数\n\n`AUTO_CLOSE` 会在最后一个用户连接关闭时，干净地关闭数据库并释放其所有资源。这意味着缓存中的所有数据和查询都会被自动清空。当下一个连接到来时，数据库不仅需要重启，所有数据还必须重新加载到缓存中。此外，存储过程和其他查询也必须重新编译。这对于大多数数据库系统来说是一项极其昂贵的操作。请将\
  \ `AUTO_CLOSE` 保留为默认设置 `OFF`。\n\n`AUTO_SHRINK` 会定期缩小数据库的大小。它可以缩小数据文件，在简单恢复模式下，还可以缩小日志文件。在执行此操作时，它可能会阻塞其他进程，严重拖慢你的系统。更常见的情况是，在启用了\
  \ `AUTO_SHRINK` 的系统上，文件增长也被设置为自动发生，因此当数据或日志文件需要增长时，你的系统会再次变慢。此外，你会看到物理文件存储在操作系统级别变得碎片化，严重影响性能。请将数据库大小设置为合适的大小，并监控其增长需求。如果你必须自动增长它们，请按物理增量进行，而不是按百分比。\n\
  \n## 数据库备份\n\n数据库备份是一个广泛的话题，在这本查询优化书中无法给予其应有的全面讨论。尽管如此，我建议当涉及到数据库性能时，关注数据库备份过程的以下几个方面：\n\
  \n*   差异备份和事务日志备份的频率\n\n*   备份的分布\n\n*   备份压缩\n\n接下来的章节将更详细地阐述这些建议。\n\n### 差异备份和事务日志备份频率\n\
  \n对于 OLTP 数据库，定期备份数据库是强制性的，以便在发生故障时，数据库可以在另一台服务器上恢复。对于大型数据库，完整的数据库备份通常需要很长时间，因此无法频繁执行完整备份。因此，完整备份在较长的时间间隔进行，在两个连续完整备份之间更频繁地安排差异备份和事务日志备份。通过设置频繁的差异备份和事务日志备份，如果数据库完全故障，可以将数据库恢复到某个时间点。\n\
  \n差异备份可用于减少完整备份的开销，因为它只备份自上次完整备份以来发生更改的数据。由于这可能快得多，因此对生产系统造成的减慢也会更少。每种情况都是独特的，因此你需要找到最适合你的方法。作为一般规则，我建议每周进行一次完整备份，然后每天进行差异备份。在此基础上，你可以确定事务日志备份的需求。\n\
  \n频繁备份事务日志会给服务器增加少量开销，尤其是在高峰时段。\n\n对于大多数企业来说，可接受的数据丢失量（以时间计）通常优先于节省日志磁盘空间或提供理想的数据库性能。因此，在安排事务日志备份时，你必须考虑可接受的数据丢失量，而不是随意将备份计划设置为很短的时间间隔。\n\
  \n\n\n### 备份调度分布\n\n当需要备份多个数据库时，必须确保所有完整备份不安排在同一时间，以免同时冲击硬件资源。如果备份过程涉及将数据库备份到中央\
  \ SAN 磁盘阵列，那么所有数据库服务器的完整备份必须分布在备份时间窗口内，以免中央备份基础设施同时承受过多备份请求的冲击。同一时间向中央基础设施涌入大量备份请求，会迫使基础设施的组件将大量资源用于管理过多的请求。这种资源的误用会显著增加备份时长，导致完整备份在高峰时段持续进行，从而影响用户请求的性能。\n\
  \n为了最小化完整备份过程对数据库性能的影响，首先需要确定可安排完整备份的非高峰时段，然后将完整备份分布在非高峰时段内，具体步骤如下：\n\n1.  确定必须备份的数据库数量。\n\
  2.  根据数据库对业务的重要性进行优先级排序。\n3.  确定可以安排完整数据库备份的非高峰时段。\n4.  计算两个连续完整备份之间的时间间隔，公式如下：`时间间隔\
  \ = (总备份时间窗口) / (完整备份数量)`。\n5.  按照数据库优先级顺序安排完整备份，第一个备份从备份窗口的开始时间启动，后续备份按上述公式计算的时间间隔均匀分布。\n\
  \n这种完整备份的均匀分布将确保备份基础设施不会因同时收到过多备份请求而不堪重负，从而减少完整备份对数据库性能的影响。\n\n### 备份压缩\n\n对于相对较大的数据库，备份时长和备份文件大小通常会成为问题。较长的备份时长使得在管理时间窗口内完成备份变得困难，进而开始影响最终用户的体验。备份文件体积庞大使得其空间管理颇具挑战性，并且在通过网络将备份执行到中央备份基础设施时，会增加网络压力。压缩还能加快备份过程，因为需要写入磁盘的数据更少。\n\
  \n优化备份时长、备份文件大小及由此产生的网络压力的推荐方法是使用`备份压缩`。\n\n###### 查询设计\n\n设计数据库查询时，应遵循以下与性能相关的最佳实践列表：\n\
  \n*   使用命令 `SET NOCOUNT ON`。\n*   显式定义对象的所有者。\n*   避免`不可参数化搜索条件`。\n*   避免在`WHERE`子句的列上使用算术运算符和函数。\n\
  *   避免使用优化器提示。\n*   避免嵌套视图。\n*   确保没有隐式数据类型转换。\n*   最小化日志记录开销。\n*   采用重用执行计划的最佳实践。\n\
  *   采用数据库事务的最佳实践。\n*   消除或减少数据库游标的开销。\n*   使用本机编译的存储过程。\n*   利用列存储索引处理分析查询。\n\n\
  我将在后续章节中详细说明每项最佳实践。\n\n### 使用命令 SET NOCOUNT ON\n\n作为规则，始终在存储过程、触发器和其他批处理查询中将 `SET\
  \ NOCOUNT ON` 作为第一条语句。这可以避免在每次执行 SQL 语句后，因返回受影响的行数而产生的网络开销。`SET NOCOUNT` 命令在第 20\
  \ 章的“使用 SET NOCOUNT”一节中有详细说明。\n\n### 显式定义对象的所有者\n\n作为一项性能最佳实践，始终使用所有者来限定数据库对象，以避免验证对象所有者所需的运行时成本。显式限定数据库对象所有者的性能优势在第\
  \ 16 章的“不允许查询中隐式解析对象”一节中有详细说明。\n\n### 避免不可参数化搜索条件\n\n在定义查询中的搜索条件时要保持警惕。如果在 `WHERE`\
  \ 子句中使用的列上定义的搜索条件阻止了优化器有效地使用该列上的索引，那么即使存在正确的索引，查询的执行成本也会很高。不可参数化搜索条件的性能影响在第 19 章的相应章节中有详细说明。\n\
  \n此外，请注意不要在搜索功能上提供过多的灵活性。如果您定义诸如“检索产品名称以‘caps’结尾的所有产品”这样的应用特性，那么您将得到扫描完整表（或聚集索引）的查询。如您所知，扫描拥有数百万行的表会损害数据库性能。除非使用索引提示，否则您将无法从该列上的索引中获益。然而，使用索引提示会覆盖查询优化器的决策，因此通常也不建议使用索引提示（更多信息请参见第\
  \ 19 章）。要理解此类业务规则对性能的影响，请考虑以下 `SELECT` 语句：\n\n```sql\nSELECT p.*\nFROM Production.Product\
  \ AS p\nWHERE p.Name LIKE '%Caps';\n```\n\n在图 28-4 中，您可以看到执行计划使用了 `[Name]` 列上的索引，但它必须执行扫描而不是查找。由于字符数据类型（如\
  \ `CHAR` 和 `VARCHAR`）列上的索引会根据该列的前导字符对数据值进行排序，在 `LIKE` 条件中使用前导的 `%` 不允许对索引执行查找操作。匹配的行可能分布在整个索引行中，使得该索引对搜索条件无效，从而损害查询性能。\n\
  \n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig4_HTML.jpg](img/323849_5_En_28_Fig4_HTML.jpg)\n\
  \n图 28-4：显示由不可参数化的 `LIKE` 子句引起的聚集索引扫描的执行计划。\n\n\n\n### 避免在 WHERE 子句列上使用算术表达式\n\n\
  始终尽量避免在 `WHERE` 和 `JOIN` 子句中的列上使用算术运算符和函数。在列上使用运算符和函数会阻止使用这些列上的索引。在 `WHERE` 子句列上使用算术运算符的性能影响在第\
  \ 18 章的“避免在 WHERE 子句列上使用算术运算符”一节中有详细解释，而使用函数的影响在同一章的“避免在 WHERE 子句列上使用函数”一节中有详细说明。\n\
  \n为了直观理解这一点，请考虑以下查询：\n\n```sql\nSELECT  soh.SalesOrderNumber\nFROM    Sales.SalesOrderHeader\
  \ AS soh\nWHERE   'SO5' = LEFT(SalesOrderNumber, 3);\n\nSELECT  soh.SalesOrderNumber\n\
  FROM    Sales.SalesOrderHeader AS soh\nWHERE   SalesOrderNumber LIKE 'SO5%';\n```\n\
  \n这些查询基本上实现了相同的逻辑：它们检查 `SalesOrderNumber` 是否等于 `S05`。然而，第一个查询对 `SalesOrderNumber`\
  \ 列执行了一个函数，而第二个则使用 `LIKE` 子句来检查相同的数据。图 28-5 展示了由此产生的执行计划。\n\n![../images/323849_5_En_28_Chapter/323849_5_En_28_Fig5_HTML.jpg](img/323849_5_En_28_Fig5_HTML.jpg)\n\
  \n图 28-5：显示了阻止使用索引的函数的执行计划\n\n如图 28-5 所示，第一个查询强制执行了 `索引扫描` 操作，而第二个则能够执行一个高效、干净的\
  \ `索引查找`。这些例子清楚地演示了为什么你应该避免在 `WHERE` 子句列上使用函数和运算符。\n\n你在执行计划中看到的警告与 `SalesOrderHeader`\
  \ 表中计算列发生的隐式转换有关。\n\n### 避免使用优化器提示\n\n作为一条规则，避免使用优化器提示，例如索引提示和连接提示，因为它们会覆盖优化器的决策过程。在大多数情况下，优化器足够智能，能够生成高效的执行计划，并且在没有施加任何优化器提示的情况下工作得最好。关于优化器提示对性能影响的详细理解，请参考第\
  \ 19 章的“避免使用优化器提示”一节。\n\n### 远离嵌套视图\n\n当一个视图调用另一个视图，而该视图又调用更多视图，如此层层嵌套时，就存在嵌套视图。这可能导致代码混乱，原因有二。首先，视图掩盖了正在执行的操作。其次，查询可能看起来简单，但执行计划和\
  \ SQL 引擎随后的操作可能复杂且代价高昂。这是因为优化器没有时间去简化查询，消除它不需要的表和列；相反，优化器会假定所有表和列都是必需的。同样的规则也适用于嵌套用户定义函数。\n\
  \n### 确保没有隐式数据类型转换\n\n当你在查询中创建变量时，请确保这些变量的数据类型与它们将用于比较的列的数据类型相同。尽管 SQL Server 可以并且将会进行转换，例如将\
  \ `VARCHAR` 转换为 `DATE`，但这种隐式转换可能会阻止索引的使用。在诸如表连接等情况下，你也必须同样小心，确保一个表的主键数据类型与被连接表的外键数据类型匹配。你偶尔可能会在执行计划中看到一个警告来帮助你发现这个问题，但你不能依赖于此。\n\
  \n### 最小化日志记录开销\n\nSQL Server 在事务日志中维护每个原子操作（或事务）的新旧状态，以确保数据库的一致性和持久性。这可能会给日志磁盘带来巨大压力，常常使日志磁盘成为争用点。因此，为了提高数据库性能，你必须尝试优化事务日志开销。除了本章后面讨论的硬件解决方案之外，你还应采用以下查询设计最佳实践：\n\
  \n*   对于小结果集（少于 20 到 50 行），尽可能选择表变量而不是临时表。记住，如果结果集不小，你可能会遇到严重问题。表变量的性能优势在第 18 章的“使用表变量”一节中有详细解释。\n\
  *   将多个操作查询批量打包在一个事务中。使用此选项时必须小心，因为如果在单个事务中影响的行太多，相应的数据库对象将被长时间锁定，从而阻塞所有其他试图访问这些对象的用户。\n\
  *   通过使用大容量日志恢复模型来减少某些操作的日志记录量。此规则主要适用于处理大规模数据操作时。当你启用大容量日志恢复模型，并且使用 `UPDATE` 语句的\
  \ `WRITE` 子句或删除、创建索引时，你也会使用最小日志记录。\n\n### 采用重用执行计划的最佳实践\n\n优化计划生成成本的最佳实践可大致分为以下两类：\n\
  \n*   有效地缓存执行计划\n*   最小化执行计划的重新编译\n\n#### 有效地缓存执行计划\n\n你必须确保查询的执行计划不仅被缓存，而且被频繁重用。通过采用以下最佳实践来实现：\n\
  \n*   避免以非参数化的即席查询方式执行查询。相反，对查询的可变部分进行参数化，并使用存储过程或系统存储过程 `sp_executesql` 提交参数化查询。\n\
  *   如果你必须使用大量即席查询，请启用“即席工作负载优化”选项，该选项将在首次调用查询时创建一个计划存根而不是完整的计划。这极大地减少了过程缓存的使用量。\n\
  *   在执行相同参数化查询的每个连接中使用相同的环境设置（例如 `ANSI_NULLS`）。这很重要，因为查询的执行计划依赖于连接的环境设置。\n*   如前面“明确定义对象的所有者”一节所述，在查询中访问对象时，明确限定对象的所有者。\n\
  \n整个思路是确保缓存中只有你需要的计划，并且你重复使用这些计划，而不是一直编译新的计划。计划缓存的上述方面在第 17 章中有详细解释。\n\n#### 最小化执行计划的重新编译\n\
  \n为了最小化查询不必要的执行计划生成，你必须确保缓存中的计划不会因为你能控制的原因而失效或重新编译。以下推荐的最佳实践可以最小化存储过程计划的重新编译：\n\n\
  *   不要在存储过程中交错使用 DDL 和 DML 语句。你应该将所有 DDL 语句放在存储过程的顶部。\n*   在存储过程中，避免使用在存储过程外部创建的临时表。\n\
  *   对于小数据集，优先使用表变量而不是临时表。\n*   不要在存储过程中更改 `ANSI SET` 选项。\n*   如果你确实无法避免重新编译，那么识别导致重新编译的存储过程语句，并通过系统存储过程\
  \ `sp_executesql` 执行它。\n\n存储过程重新编译的原因和推荐的解决方案在第 18 章中有详细解释。\n\n\n### 采用数据库事务最佳实践\n\
  \n你为并发设计查询的效率越高，查询就越能更快地完成而不会相互阻塞。在设计查询中的事务时，请考虑以下建议：\n\n*   尽可能缩短事务的作用域。在事务中，只包含那些为了数据一致性必须一起提交的语句。\n\
  *   避免因错误处理例程或应用程序逻辑不佳而导致事务保持打开状态的可能性。可通过以下技术实现：\n    *   使用 `SET XACTABORT ON`\
  \ 确保在事务内发生错误条件时中止或回滚事务。\n    *   从客户端代码执行包含事务的存储过程或查询批处理后，务必检查是否有打开的事务，然后使用以下 SQL\
  \ 语句回滚任何打开的事务：\n        ```\n        IF @@TRANC0UNT > 0 ROLLBACK\n        ```\n\
  *   根据应用程序要求，使用能维护数据一致性的最低级别事务隔离。默认隔离级别 Read Committed 所提供的隔离级别在大多数情况下是足够的。如果发生过多的锁，请考虑使用\
  \ Read Committed Snapshot 隔离级别。\n\n事务对数据库性能的影响在第 20 章中有详细解释。\n\n### 消除或减少数据库游标的开销\n\
  \n由于 SQL Server 设计为处理数据集，因此使用 DML 语句处理多行通常比使用数据库游标逐行处理行要快得多。如果你发现自己使用了大量游标，请重新检查逻辑，看看是否有办法消除游标。如果必须使用数据库游标，请使用开销最小的数据库游标：`FAST_FORWARD`\
  \ 游标类型（通常称为 `只进快进游标`）。你也可以在 [ADO.NET](http://inado.net) 中使用等效的 `DataReader` 对象。\n\
  \n数据库游标的性能开销在第 23 章中有详细解释。\n\n### 使用本机编译存储过程\n\n当只访问内存中表时，你还有一个额外的性能增强方法可用，即将存储过程编译成在\
  \ SQL Server 可执行文件内运行的 DLL。如第 24 章所示，这对性能有相当显著的影响。只需确保以正确的方式调用过程，通过序数位置而非参数名称传递参数。虽然这感觉像是违反了最佳实践，但它能提高编译后过程的性能。\n\
  \n### 利用查询存储进行分析查询\n\n大多数使用关系数据库存储信息的应用程序都有一定程度的分析查询。无论是包含少量分析查询的 OLTP 系统，还是包含大量分析查询的数据仓库或报告系统，都可以利用列存储索引来支持执行大量聚合和分析的查询。当大多数查询是分析型时，聚集列存储索引是最佳选择，但对于\
  \ OLTP 点查找式查询效果不佳。当大多数查询侧重于 OLTP，但其中一些需要进行分析时，非聚集列存储索引可以增加分析功能。在这种情况下，关键在于为工作选择合适的工具。\n\
  \n## 总结\n\n性能优化是一个持续的过程。它需要持续关注影响性能的数据库和查询特征。本章的目标是为你提供一个此类特征的检查清单，以便在数据库应用程序的开发和维护阶段作为快速简便的参考。\n\
