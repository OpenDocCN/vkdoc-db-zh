- "# T-SQL 批处理与事件监控\n\n## T-SQL 批处理\n\n一个 *T-SQL 批处理* 是一组一起提交给 SQL Server 的 SQL 查询。T-SQL\
  \ 批处理通常以一个 `GO` 命令结束。`GO` 命令并非一条 T-SQL 语句，而是由 `sqlcmd` 实用程序以及 Management Studio\
  \ 识别，用于标志一个批处理的结束。批处理中的每个 SQL 查询被视为一条 T-SQL 语句。因此，一个 T-SQL 批处理由一条或多条 T-SQL 语句组成。\n\
  \n语句或 T-SQL 语句也是存储过程中独立、离散的命令。使用 `sp_statement_completed` 或 `sql_statement_completed`\
  \ 事件来捕获单个语句可能是一项开销较大的操作，具体取决于查询中单个语句的数量。\n\n假设你的系统中每个存储过程都只包含一条且仅一条 T-SQL 语句。在这种情况下，收集已完成语句的开销非常低，无论是对收集数据时系统行为的影响，还是对存储数据所需的空间而言都是如此。现在，假设你的过程中包含多条语句，并且其中一些过程调用的是包含其他语句的其他过程。那么，收集所有这些额外数据现在就变成了系统上一个更明显的负载。捕获语句的影响完全取决于你所捕获语句的大小和数量。\n\
  \n语句完成事件应谨慎收集，尤其是在生产系统上。你应该应用筛选器来限制这些事件的返回结果。本章后续部分将介绍筛选器。\n\n## 向会话添加事件\n\n要向会话添加一个事件，请在事件库中找到该事件。这很简单；你只需键入名称。在图\
  \ 6-2 中，你可以看到在搜索框中键入了 `sql_batch`，并且事件名称的相应部分已高亮显示。找到事件后，使用箭头按钮将事件从库移动到“选定事件”列表中。要移除不需要的事件，请单击箭头将其从列表中移回库中。\n\
  \n## 其他性能事件\n\n尽管表 6-1 中列出的事件是用于确定查询性能的最常用事件，但有时你也可以使用一些其他事件来诊断相同的问题。例如，如第 1 章所述，存储过程的重复重新编译会增加处理开销，从而损害数据库请求的性能。事件库中的执行类别包含一个事件\
  \ `sql_statement_recompile`，用于指示语句的重新编译（该事件在第 12 章中有深入解释）。事件库还包含其他事件，用于指示数据库工作负载的其他性能相关问题。\n\
  \n### 表 6-2：用于查询性能的事件\n\n| 事件类别 | 事件 | 描述 |\n| --- | --- | --- |\n| 会话 | `login`\
  \ `logout` | 跟踪用户连接和断开与 SQL Server 时的数据库连接。 |\n| | `existing_connection` | 代表在会话启动之前已连接到\
  \ SQL Server 的所有用户。 |\n| 错误 | `attention` | 代表由于客户端取消查询或数据库连接断开（包括超时）等操作导致的请求中途终止。\
  \ |\n| | `error_reported` | 在报告错误时发生。 |\n| | `execution_warning` | 指示语句等待内存授予的时间超过一秒，或语句的内存授予失败。\
  \ |\n| | `hash_warning` | 指示哈希操作中发生内存不足。将此与捕获执行计划结合使用，以了解哪个操作出现了错误。 |\n| 警告 | `missing_column_statistics`\
  \ | 指示缺少列统计信息，这是优化器决定处理策略所需的统计信息。 |\n| | `missing_join_predicate` | 指示查询在两个表之间没有联接谓词的情况下执行。\
  \ |\n| | `sort_warnings` | 指示查询（如 `SELECT`）中执行的排序操作未能容纳在内存中。 |\n| 锁 | `lock_deadlock`\
  \ | 当一个进程被选为死锁牺牲品时发生。 |\n| | `lock_deadlock_chain` | 显示造成死锁的查询链的跟踪信息。 |\n| | `lock_timeout`\
  \ | 表示锁已超过由 `SET LOCK_TIMEOUT timeout_period(ms)` 设置的超时参数。 |\n| 执行 | `sql_statement_recompile`\
  \ | 指示查询语句的执行计划必须重新编译，因为不存在执行计划、强制重新编译或现有执行计划无法重用。这发生在语句级别，而不是批处理级别，无论该批处理是临时查询、存储过程还是预处理语句。\
  \ |\n| | `rpc_starting` | 代表存储过程的开始。这对于识别那些因导致 Attention 事件的操作而启动但未能完成的过程非常有用。 |\n\
  | | `Query_post_compilation_showplan` | 显示 SQL 语句编译后的执行计划。 |\n| | `Query_post_execution_showplan`\
  \ | 显示 SQL 语句执行后的执行计划，其中包含执行统计信息。注意，此事件的开销可能相当大，因此应极其谨慎地使用，仅在短时间内使用并设置良好的筛选器。 |\n\
  | 事务 | `sql_transaction` | 提供有关数据库事务的信息，包括事务何时开始、完成和回滚等信息。 |\n\n\n#### 全局字段\n\n\
  在“事件”页面上选择了感兴趣的事件后，您可能需要配置一些设置，例如全局字段。在“事件”屏幕上，单击“配置”按钮。这将改变“事件”屏幕的视图，如图 6-3 所示。\n\
  \n![../images/323849_5_En_6_Chapter/323849_5_En_6_Fig3_HTML.jpg](img/323849_5_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n“事件”页面配置部分中的全局字段选择\n\n全局字段（在 T-SQL 中称为 `actions`）代表事件的不同属性，例如与事件相关的用户、事件的执行计划、事件的一些额外资源开销以及事件的来源。这些是与事件一起可以收集的附加信息片段。它们会增加事件收集的开销。每个事件都有一组它收集的数据（我将在本章后面讨论），但这是您添加更多信息的机会。大多数时候，在可能的情况下，我会避免为大多数数据收集承担这种开销。但有时，这里的信息是您希望收集的。\n\
  \n要添加操作，只需在图 6-3 所示的“全局字段”页面提供的列表中勾选相应的复选框即可。您可以不时地使用额外的数据列来诊断性能不佳的原因。例如，在存储过程重新编译的情况下，事件通过\
  \ `recompile_cause` 事件字段指出重新编译的原因。（该字段在第 18 章中有深入解释。）一些常用的附加操作如下：\n\n*   `plan_handle`\n\
  *   `query_hash`\n*   `query_plan_hash`\n*   `database_id`\n*   `client_app_name`\n\
  *   `transaction_id`\n*   `session_id`\n\n其他信息可作为事件字段的一部分获得。例如，`binary_data` 和 `integer_data`\
  \ 事件字段提供有关给定 SQL Server 活动的特定信息。例如，对于游标，它们指定了请求的游标类型和创建的游标类型。尽管这些附加字段的名称在很大程度上表明了它们的用途，但我会在后续章节中，当您使用它们时，解释这些全局字段的有用性。\n\
  \n#### 事件过滤器\n\n除了为扩展事件会话定义事件和操作之外，您还可以定义各种筛选条件。这有助于保持会话输出量较小，这通常是个好主意。您可以为事件字段或全局字段添加筛选器。您还可以选择希望每个筛选器是“或”(OR)\
  \ 还是“与”(AND)，以进一步控制筛选方法。您可以决定比较运算符，例如小于、等于等等。最后，您为比较设置一个值。所有这些都将对捕获的事件进行筛选，减少您需要处理的数据量，并可能降低系统负载。表\
  \ 6-3 描述了您在性能分析期间可能常用的筛选条件。\n\n表 6-3\n\nSQL 跟踪筛选器\n\n| 事件 | 筛选条件示例 | 用途 |\n| ---\
  \ | --- | --- |\n| `sqlserver.username` | = <某个值> | 仅捕获单个用户或登录名的事件。 |\n| `sqlserver.database_id`\
  \ | = <要监视的数据库 ID> | 过滤掉由其他数据库生成的事件。您可以根据数据库名称确定其 ID，如下所示：`SELECT DB_ID('AdventureWorks20012')`。\
  \ |\n| `duration` | >= 200 | 对于性能分析，您通常会捕获大型工作负载的跟踪。在大型跟踪中，会有许多持续时间小于您感兴趣的事件日志。请过滤掉这些事件日志，因为几乎没有优化这些\
  \ SQL 活动的余地。 |\n| `physical_reads` | >= 2 | 这与持续时间筛选条件类似。 |\n| `sqlserver.session_id`\
  \ | = <要监视的数据库用户> | 这用于排除特定服务器会话发送的查询的问题。 |\n\n图 6-4 显示了在“会话”窗口中选择前述筛选条件的片段。\n\n\
  ![../images/323849_5_En_6_Chapter/323849_5_En_6_Fig4_HTML.jpg](img/323849_5_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n\n在“会话”窗口中应用的筛选器\n\n如果您查看图 6-4 中的“字段”值，您会注意到它显示的是 `sqlserver.session_id`。这是因为有不同类型的数据集可供您使用，并且它们由所引用的数据类型限定。在这种情况下，我特指\
  \ `sqlserver.session_id`。但我可能指的是来自 SQL OS 甚至扩展事件包本身的内容。\n\n#### 事件字段\n\n标准事件字段随事件类型自动包含。表\
  \ 6-4 显示了一些您用于性能分析的常见操作。\n\n表 6-4\n\n用于查询分析的操作命令\n\n| 数据列 | 描述 |\n| --- | --- |\n\
  | `Statement` | 来自 `rpc_completed` 事件的 SQL 文本。 |\n| `Batch_text` | 来自 `sql_batch_completed`\
  \ 事件的 SQL 文本。 |\n| `cpu_time` | 事件的 CPU 成本（微秒，mc）。例如，`SELECT` 语句的 CPU = 100 表示该语句执行花费了\
  \ 100 mc。 |\n| `logical_reads` | 为事件执行的逻辑读取次数。例如，`SELECT` 语句的 logical_reads = 800\
  \ 表示该语句总共需要进行 800 次页读取。 |\n| `Physical_reads` | 为事件执行的物理读取次数。由于访问磁盘子系统，这可能与 `logical_reads`\
  \ 值不同。 |\n| `writes` | 为事件执行的逻辑写入次数。 |\n| `duration` | 事件的执行时间（毫秒，ms）。 |\n\n每次逻辑读写都包含内存中\
  \ 8KB 页的活动，这可能需要零次或多次物理 I/O 操作。您可以通过单击图 6-5 中显示的“事件字段”选项卡来查看任何给定事件的字段。\n\n![../images/323849_5_En_6_Chapter/323849_5_En_6_Fig5_HTML.jpg](img/323849_5_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n\n“新建会话”窗口，显示配置中的“事件字段”选项卡\n\n一些事件字段是可选的，但大多数字段随事件自动包含。您可以决定是否要包含可选字段。在图\
  \ 6-5 中，您可以通过单击其旁边的复选框来排除 `batch_text` 字段。\n\n\n#### 数据存储\n\n在新会话窗口的下一页，“选择一个页面”窗格中的\
  \ **数据存储** 用于确定您将如何处理会话生成的数据。输出机制被称为 *target*（目标）。您有两个基本选择：将信息输出到文件，或者仅使用缓冲区来捕获事件。有七种不同类型的输出，但其中大多数超出了本书的范围。出于收集性能信息的目的，您将使用\
  \ `event_file` 或 `ring_buffer`。您应该仅对小数据集使用缓冲区，因为它会消耗内存。由于它在系统内存内工作，缓冲区被设计为，与其压倒系统内存，不如丢弃事件，因此使用缓冲区更可能丢失信息。在大多数监控查询性能的情况下，您应该将会话的输出捕获到文件中。\n\
  \n您必须选择您的目标，如图 6-6 所示。\n\n![新会话窗口中的数据存储窗口](img/323849_5_En_6_Fig6_HTML.jpg)\n\n\
  您应该在系统上指定一个合适的存储位置。您还可以决定是否使用多个文件、使用多少个文件，以及这些文件是否滚动更新。所有这些都是管理决策，您需要根据您的环境和 SQL\
  \ 查询监控的工作来处理。您可以 24/7 运行此操作，但必须准备好处理大量数据，具体取决于您创建的过滤器的严格程度。\n\n除了缓冲区或文件，您还有其他输出选项，但它们通常保留用于特殊类型的监控，并且通常对于查询性能调优不是必需的。\n\
  \n#### 完成会话\n\n一旦定义了存储，您就为会话设置了所有需要的内容。还有一个“高级”页面，但在大多数系统上，您真的不需要修改其默认值。单击“确定”后，会话将被创建。如果您在第一个选项卡中指示会话在创建后启动，它将立即启动，但无论它是否启动，它都将存储在服务器上。扩展事件会话的一个优点是它们存储在服务器上，因此您可以根据需要打开和关闭它们，而无需重新创建会话。会话将永久存储，直到您删除它们，甚至会在重启后保留，尽管根据您配置会话的方式，您可能需要在必要时重新启动它们。\n\
  \n假设您要么没有自动启动会话，要么选择了实时观看数据的选项，您可以对刚刚创建的会话执行这两项操作。右键单击该会话，您将看到一个操作菜单，包括“启动会话”、“停止会话”和“实时查看数据”。如果您启动了会话并选择了观察输出，您应该会在\
  \ Management Studio 中看到一个新窗口出现，显示您正在捕获的事件。这些事件来自与写入磁盘的缓冲区相同的缓冲区，因此您可以实时观看事件。请查看图\
  \ 6-7 以查看此操作。\n\n![向导创建的扩展事件会话的实时输出](img/323849_5_En_6_Fig7_HTML.jpg)\n\n您可以在窗口顶部看到事件，显示事件类型以及事件的日期和时间。单击顶部的事件将打开屏幕底部随该事件捕获的字段。如您所见，我一直在谈论的所有信息都可供您使用。此外，如果您对分割输出不满意，可以右键单击某列并从上下文菜单中选择“在表中显示列”。这将把它移动到屏幕顶部，将所有信息显示在一个位置，如图\
  \ 6-8 所示。\n\n![语句列已添加到表中。](img/323849_5_En_6_Fig8_HTML.jpg)\n\n您还可以通过此界面打开收集的文件，并使用它浏览数据。您可以在收集的数据中对某一列进行搜索、排序和分组。查看对特定查询的所有调用的聚合的一种好方法是使用\
  \ `query_hash`，这是一个可以添加到数据收集中的全局字段。GUI 提供了许多方法来操作您收集的信息。\n\n通过 GUI 观看这些信息并浏览文件是可以的，但您会想要自动化创建这些会话。这就是下一节要介绍的内容。\n\
  \n#### 内置的 system_health 会话\n\nSQL Server 内置并默认自动运行着一个名为 `system_health` 的扩展事件会话。它主要用作观察系统整体健康状况以及收集内部错误和诊断信息的机制。然而，它也会自动捕获一些在我们讨论查询性能调优时有用的信息。\n\
  \n默认情况下，开箱即用，它会收集有关发生的死锁的完整信息。死锁绝对是一个性能问题，并在第 22 章中有所介绍。`system_health` 扩展事件会话意味着我们无需做任何其他工作即可开始诊断死锁情况。\n\
  \n`system_health` 会话捕获任何等待闩锁超过 15 秒的进程的 `sql_text` 和 `session_id`。该信息对于立即识别可能需要调优的查询非常有用。您还会获得任何等待锁超过\
  \ 30 秒的查询的 `sql_text` 和 `session_id`。同样，这是一种无需其他工作（只需搜索 `system_health` 信息）即可立即识别可能需要调优的查询的方法。\n\
  \n由于这只是一个会话，您可以完全控制它，甚至可以从系统中删除它，尽管我当然不建议这样做。它将信息收集在一个 5MB 的文件中，并保留一组滚动的四个文件。有了这些信息，您将无法回溯到服务器安装的开始，但它应该包含服务器最近的行为。文件默认与其他日志文件位于同一位置。您可以像这样找到位置：\n\
  \n```sql\nSELECT path\nFROM sys.dm_os_server_diagnostics_log_configurations;\n```\n\
  \n有了该位置，您可以查询会话或在“实时数据”资源管理器窗口中打开它，如图 6-9 所示。\n\n![system_health 扩展事件会话中的 Wait_info\
  \ 事件](img/323849_5_En_6_Fig9_HTML.jpg)\n\n图 6-9 中显示的事件是 `wait_info` 事件，它显示我有一个进程等待获取锁超过\
  \ 30 秒。`sql_text` 字段将显示有问题的查询。如您所见，从性能调优的角度来看，这是非常宝贵的信息。最重要的是，它现在就在您的系统上可用。您无需做任何设置工作。\n\
  \n\n\n## 扩展事件自动化\n\n能够使用 GUI 构建会话并定义要捕获的事件确实使操作变得简单，但不幸的是，这种模式无法扩展。如果你需要管理多台服务器，并计划创建会话来捕获关键的查询性能指标，你肯定不希望连接到每一台服务器，然后通过\
  \ GUI 来选择事件、输出方式等等。如果考虑到出错的可能性，情况就更是如此。相反，学会如何直接通过 T-SQL 来处理会话要好得多。这将使你能够构建一个可以在系统中多台服务器上运行的会话。更好的是，你会发现，与使用\
  \ GUI 相比，在某些方面直接构建会话更容易，而且你对这些过程如何运作的理解也会深入得多。\n\n### 使用 GUI 创建会话脚本\n\n你可以通过两种方式之一创建脚本化跟踪：手动创建或使用\
  \ GUI 创建。在你熟悉脚本的所有要求之前，简单的方法是使用扩展事件 GUI。你需要执行以下步骤：\n\n1.  定义一个会话。\n2.  右键单击该会话，然后选择\
  \ `将会话脚本编写为`、`CREATE 到` 和 `文件` 以直接输出到文件。或者，使用\"新建会话\"窗口顶部的 `脚本` 按钮，在查询窗口中创建 T-SQL\
  \ 命令。\n\n这些步骤将生成创建会话并将其输出到文件所需的脚本。\n\n要手动创建这个新的跟踪，请按以下方式使用 Management Studio：\n\n\
  1.  打开脚本文件或导航到查询窗口。\n2.  修改你正在创建会话的服务器的路径和文件位置。\n3.  执行脚本。\n\n会话创建后，你可以使用以下命令来启动它：\n\
  \n```\nALTER EVENT SESSION QueryMetrics\nON SERVER\nSTATE = START;\n```\n\n你可能希望通过\
  \ SQL Agent 自动化执行最后一步，或者甚至可以使用 `sqlcmd.exe` 命令行实用程序从命令行运行脚本。无论你使用哪种方法，最后一步都将启动会话。要停止会话，只需运行相同的脚本，并将\
  \ `STATE` 设置为 `stop`。我将在下一节展示如何操作。\n\n### 使用 T-SQL 定义会话\n\n如果你按照上一节的步骤创建了一个脚本，你会在查询编辑器窗口中看到类似下面这样的内容：\n\
  \n```\nCREATE EVENT SESSION [QueryMetrics]\nON SERVER\nADD EVENT sqlserver.sql_batch_completed\n\
  (SET collect_batch_text = (1)\nWHERE ([sqlserver].[database_name] = N'AdventureWorks2017')\n\
  )\nADD TARGET package0.event_file\n(SET filename = N'q:\\PerfData\\QueryMetrics')\n\
  WITH\n(\nMAX_MEMORY = 4096KB,\nEVENT_RETENTION_MODE = ALLOW_SINGLE_EVENT_LOSS,\n\
  MAX_DISPATCH_LATENCY = 30 SECONDS,\nMAX_EVENT_SIZE = 0KB,\nMEMORY_PARTITION_MODE\
  \ = NONE,\nTRACK_CAUSALITY = OFF,\nSTARTUP_STATE = OFF\n);\nGO\n```\n\n要创建扩展事件会话，只需一条命令即可定义会话，即\
  \ `CREATE EVENT SESSION`。然后，你只需在该命令中使用 `ADD EVENT` 来定义会话。筛选器只是添加到每个事件定义中的一个 `WHERE`\
  \ 子句。最后，你添加一个目标，定义捕获的数据应存储在何处。`WITH` 子句实际上只是 GUI 中\"高级\"页面上的默认值。你可以省略 `WITH` 子句及其值，它们仍会为会话进行设置。\n\
  \n一旦会话定义完成，你可以使用 `ALTER EVENT` 来激活它，如前所示。\n\n会话在服务器上启动后，你就不再需要保持 Management Studio\
  \ 或查询编辑器处于打开状态了。你可以使用动态管理视图 `sys.dm_xe_sessions` 来识别活动会话，如下列查询所示：\n\n```\nSELECT\
  \  dxs.name,\n        dxs.create_time\nFROM    sys.dm_xe_sessions AS dxs;\n```\n\
  \n图 6-10 显示了该视图的输出。\n\n![../images/323849_5_En_6_Chapter/323849_5_En_6_Fig10_HTML.jpg](img/323849_5_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n`sys.dm_xe_sessions` 的输出\n\n返回的行数指示了 SQL Server 上活动的会话数。除了我在本章创建的那个会话外，我还有另外四个系统默认的会话在运行。你可以通过执行存储过程\
  \ `ALTER EVENT SESSION` 来停止特定的会话。\n\n```\nALTER EVENT SESSION QueryMetrics\nON SERVER\n\
  STATE = STOP;\n```\n\n要验证会话是否已成功停止，请重新执行对目录视图 `sys.dm_xe_sessions` 的查询，并确保视图的输出中不包含该命名会话。\n\
  \n使用脚本创建会话使你能够在大量服务器上实现自动化。使用脚本来启动和停止会话意味着你可以通过计划事件（例如通过 SQL Agent）来控制它们。在第 20 章中，你将学习如何在捕获\
  \ SQL 工作负载活动（在较长时间段内）的同时控制会话的计划。\n\n### 注意\n\n通过本节所述方式定义的会话所捕获的时间以微秒为单位存储，而不是毫秒。单位之间的这种差异如果不加以考虑，可能会引起混淆。你必须基于微秒进行筛选。\n\
  \n## 使用因果跟踪\n\n通过 GUI 或 T-SQL 定义会话相当简单。使用这些信息也相当容易。然而，你很快就会发现，你不仅希望观察单个批处理语句或单个过程调用。你会希望看到一个过程内的所有语句以及该过程调用本身。你会希望看到语句级别的重新编译、等待以及各种其他事件，并让它们全部直接关联回单个存储过程或语句。这就是\
  \ `因果跟踪` 的用武之地。\n\n如前所述，你可以通过 GUI 启用因果跟踪，也可以将其包含在 SQL 命令中。以下脚本捕获远程过程调用的开始和停止以及这些调用中的所有语句。我还启用了因果跟踪。\n\
  \n```\nCREATE EVENT SESSION ProcedureMetrics\nON SERVER\nADD EVENT sqlserver.rpc_completed\n\
  (WHERE (sqlserver.database_name = N'AdventureWorks2017')),\nADD EVENT sqlserver.rpc_starting\n\
  (WHERE (sqlserver.database_name = N'AdventureWorks2017')),\nADD EVENT sqlserver.sp_statement_completed\n\
  (SET collect_object_name = (1))\nADD TARGET package0.event_file\n(SET filename =\
  \ N'C:\\PerfData\\ProcedureMetrics.xel')\nWITH\n(\n    TRACK_CAUSALITY = ON\n);\n\
  ```\n\n## 扩展事件建议\n\n扩展事件在信息收集方式上是一个如此重大的变革，以至于过去使用跟踪事件时经常出现的许多问题区域已在很大程度上被消除。你不再需要像以前那样过分担心严重限制收集的事件数量或返回的字段数。但是，如前所述，过度加载要收集的事件仍然可能对系统产生负面影响。仍然有一些特定的领域需要你特别注意。\n\
  \n*   适当设置最大文件大小。\n*   对调试事件保持谨慎。\n*   避免使用 `No_Event_Loss`。\n\n我将在以下各节中更详细地讨论这些内容。\n\
  \n### 适当设置最大文件大小\n\n文件的默认值是 1GB。考虑到扩展事件可以收集的信息量，这实际上非常小。最好将这个数字设置得更高一些，在 50GB 到\
  \ 100GB 之间，以确保你有足够的空间来捕获信息，并且不会因为等待文件子系统为你创建文件而导致缓冲区填满。这可能导致事件丢失。但这确实取决于你的系统。如果你对预期的输出级别有很好的把握，请为你的特定环境设置更合适的文件大小。\n\
  \n\n### 谨慎对待调试事件\n\n扩展事件不仅为你提供了一种远超跟踪事件能力的机制来观察 SQL Server 的行为及其内部机制，而且 Microsoft\
  \ 也将其用于 SQL Server 的故障排除。许多事件与 SQL Server 调试相关。这些事件默认情况下无法通过向导获得，但你可以通过 T-SQL 命令访问它们，并且可以通过\"\
  会话编辑器\"窗口中的通道选择来启用它们。\n\n**除非有 Microsoft 的直接指导，否则请勿使用它们。** 这些事件可能发生变化，并且仅供 Microsoft\
  \ 内部使用。如果你确实需要进行试验，请密切关注任何包含**中断操作**的事件。这意味着，一旦该事件触发，SQL Server 将在触发事件的确切代码行停止。这将导致你的服务器完全脱机并处于未知状态。如果你在生产系统上这样做，可能会导致重大中断。这可能导致数据丢失和数据库损坏。\n\
  \n不过，并非所有调试事件都会导致中断操作，有些甚至被推荐使用。一个例子是 `query_thread_profile` 事件。运行此事件能够以轻量级的方式捕获实时执行计划事件。我们将在第\
  \ 15 章讨论执行计划时详细介绍这一点。\n\n### 避免使用 No_Event_Loss\n\n扩展事件的设计使得某些事件可能会丢失。这是极其可能发生的，并且是设计使然。但是，在配置会话时，你可以使用一个设置\
  \ `No_Event_Loss`。如果你在已经处于负载下的系统上这样做，你可能会看到系统被施加了显著的额外负载，因为你实际上是在告诉系统无论后果如何都要保留缓冲区中的信息。对于针对特定行为的小型且专注的会话，这种方法是可以接受的。\n\
  \n## 获取查询性能指标的其他方法\n\n设置扩展事件会话允许你收集大量数据以供日后使用，但收集过程可能有点昂贵。此外，你必须等待结果，然后还要处理大量数据。另一种总体成本较低的机制是查询存储。我们将在第\
  \ 11 章详细介绍它。如果你需要立即捕获关于你系统的性能指标，特别是与查询性能相关的指标，那么你需要动态管理视图 `sys.dm_exec_query_stats`（用于查询）和\
  \ `sys.dm_exec_procedure_stats`（用于存储过程）。如果你仍然需要查询何时运行及其各自成本的历史跟踪，扩展事件会话仍然是最佳工具。但如果你只是需要知道此时运行时间最长的查询或物理读取最多的查询，那么你可以从这两个动态管理对象中获得该信息。但是，这些对象中的数据依赖于查询计划保留在缓存中。如果计划因老化而从缓存中清除，这些数据就会消失。`sys.dm_exec_query_stats`\
  \ DMO 将返回所有查询（包括存储过程）的结果，但 `sys.dm_exec_procedure_stats` 将仅返回存储过程的信息。\n\n由于这两个 DMO\
  \ 只是视图，你可以简单地对它们进行查询，获取有关服务器计划缓存中查询统计信息的信息。表 6-5 显示了从 `sys.dm_exec_query_stats`\
  \ DMO 返回的一些数据。\n\n表 6-5 只是一个抽样。完整详情请参阅联机丛书。\n\n**表 6-5**\n`sys.dm_exec_query_stats`\
  \ 输出\n\n| 列 | 描述 |\n| --- | --- |\n| `Plan_handle` | 指向执行计划的指针 |\n| `Creation_time`\
  \ | 计划创建的时间 |\n| `Last_execution time` | 计划上次被查询使用的时间 |\n| `Execution_count` | 计划已被使用的次数\
  \ |\n| `Total_worker_time` | 自计划创建以来使用的总 CPU 时间 |\n| `Total_logical_reads` | 自计划创建以来使用的总逻辑读取次数\
  \ |\n| `Total_logical_writes` | 自计划创建以来使用的总逻辑写入次数 |\n| `Query_hash` | 可用于标识具有相似逻辑的查询的二进制哈希值\
  \ |\n| `Query_plan_hash` | 可用于标识具有相似逻辑的计划的二进制哈希值 |\n| `Max_dop` | 查询所使用的最大并行度 |\n\
  | `Max_columnstore_segment_skips` | 在查询过程中被跳过的段数量 |\n\n要过滤从 `sys.dm_exec_query_stats`\
  \ 返回的信息，你需要将其与其他动态管理函数（如 `sys.dm_exec_sql_text`，它显示与计划关联的查询文本）或 `sys.dm_query_plan`，它包含查询的执行计划）进行连接。一旦连接到这些其他\
  \ DMO，你就可以按你想要查看的数据库或过程进行过滤。这些其他 DMO 在本书的其他章节中有详细介绍。我将在本书的后续部分展示结合使用 `sys.dm_exec_query_stats`\
  \ 和其他 DMO 的示例。请记住，这些查询依赖于缓存。当某个执行计划因老化从缓存中清除时，这些信息将会丢失。\n\n## 总结\n\n在本章中，你了解了如何使用扩展事件来识别\
  \ SQL 工作负载中对系统资源造成大量压力的查询。收集会话数据可以并且应该使用系统存储过程实现自动化。要立即访问有关正在运行查询的统计信息，请使用 DMV `sys.dm_exec_query_stats`。\n\
  \n现在你已经掌握了一种收集有关系统上已运行查询指标的方法，在下一章中，你将学习如何在查询运行时收集信息，从而不必每次运行查询时都诉诸于这些测量工具。\n\n"
- "# 7. 分析查询性能\n\n上一章展示了如何收集查询性能指标。本章将展示如何利用这些指标来识别运行时间长或频繁调用的查询。然后我将介绍 Management\
  \ Studio 的内置工具，以便你理解特定查询的性能表现。我还将花大量时间讨论如何使用执行计划，这是你深入了解查询优化器所做决策的最佳途径。\n\n在本章中，我将涵盖以下主题：\n\
  \n*   如何使用 Management Studio 分析代价高昂的 SQL 查询的处理策略\n*   如何分析查询优化器对 SQL 查询使用的方法\n*\
  \   如何使用 T-SQL 命令衡量 SQL 查询的成本\n\n## 成本较高的查询\n\n现在你已经看到了两种收集查询性能指标的不同方法，接下来让我们看看这些数据代表什么：即那些**成本较高的查询**本身。当\
  \ SQL Server 的性能变差时，很可能发生了以下几件事：\n\n*   首先，某些查询对系统资源造成了**高压力**。这些查询会影响整个系统的性能，因为服务器无法足够快速地处理其他\
  \ SQL 查询。\n*   此外，这些成本较高的查询会阻塞所有请求相同数据库资源的其他查询，从而进一步降低那些查询的性能。优化成本较高的查询不仅能提升它们自身的性能，还能通过减少数据库阻塞和对\
  \ SQL Server 资源的压力来改善其他查询的性能。\n*   有可能数据的变化或传递给查询的值的改变，会导致查询行为的变化，从而使其性能下降。\n* \
  \  最后，一个本身成本不高的查询，如果每分钟被调用数千次，仅仅因为*非最优代码*的累积效应，就可能导致主要的资源瓶颈。\n\n要开始确定你需要花时间处理哪些查询，你将使用到目前为止我讨论过的资源。例如，假设查询在缓存中，你将能够使用\
  \ DMO 来汇总有意义的数据，以确定成本最高的查询。或者，由于你已使用**扩展事件**捕获了查询，因此可以将该数据作为识别成本最高查询的一种手段。还有另一种选择也是可能的，它是在\
  \ SQL Server 2016 中引入的；你可以使用**查询存储**来捕获和检查查询性能指标。我们将在第 11 章详细探讨该机制。\n\n在这里，我们将从**扩展事件**开始。捕获查询指标最简单、最直接的方法是通过针对当前在缓存中的查询使用\
  \ DMO。不幸的是，这是聚合数据，并且完全依赖于当前缓存中的内容（我们将在第 16 章更多讨论缓存），因此你没有历史记录，也无法获得存储过程的单独测量值和单个参数值。第二种最简单、同样直接查看查询指标的方法是通过**查询存储**。它提供的记录比\
  \ DMO 更完整，但其中的数据也是聚合的。我们将探索这三种方法，但为了精确起见，我们将从**扩展事件**开始。\n\n关于扩展事件数据的一个小提示：如果数据将被收集到文件中，那么你需要将数据加载到表中，或者直接查询它。你可以使用以下系统函数直接查询扩展事件文件：\n\
  \n```sql\nSELECT module_guid,\npackage_guid,\nobject_name,\nevent_data,\nfile_name,\n\
  file_offset,\ntimestamp_utc\nFROM sys.fn_xe_file_target_read_file('C:\\Sessions\\\
  QueryPerformanceMetrics*.xel',\nNULL,\nNULL,\nNULL);\n```\n\n所需的参数首先是路径，我已提供。你可以像我一样使用\
  \ * 来处理存在多个滚存文件的情况。第二个参数是 SQL Server 2008R2 的遗留参数，可以忽略。第三个参数允许你选择一个初始文件名；否则，如果你像我这样做，它将读取路径下的所有文件。最后，最后一个参数允许你指定一个偏移量，以便你可以选择跳过某些事件。它只是一个数字，因此你无法真正对事件进行筛选；只能计数到你想开始的那个事件。\n\
  \n查询将每个事件作为单行返回。关于事件的数据存储在 XML 列 `event_data` 中。你需要使用 XQuery 来直接读取数据，但一旦读取，你就可以搜索、排序和聚合捕获的数据。我将在下一节带你完成此机制的一个完整示例。\n\
  \n### 识别成本较高的查询\n\nSQL Server 的目标是在最短时间内向用户返回结果集。为此，SQL Server 有一个内置的、基于成本的优化器，称为\
  \ `查询优化器`，它生成一个称为 `查询执行计划` 的具有成本效益的策略。查询优化器权衡许多因素，包括（但不限于）执行查询所需的 CPU、内存和磁盘 I/O\
  \ 的使用情况，这些都源自各种来源，例如由索引维护或动态生成的数据统计信息、数据约束，以及关于查询运行系统的一些知识，例如 CPU 数量和内存量。优化器基于所有这些信息创建一个具有成本效益的执行计划。\n\
  \n在从会话返回的数据中，`cpu_time` 和 `logical_reads` 或 `physical_reads` 字段也显示了查询在哪些方面代价高昂。`cpu_time`\
  \ 字段表示执行查询所使用的 CPU 时间。两个 `reads` 字段表示查询操作的页数（每页 8KB），从而表明查询引起的内存或 I/O 压力大小。它们还表明了磁盘压力，因为对于操作查询，内存页必须备份，在首次数据访问时填充，并在内存瓶颈时换出到磁盘。查询的逻辑读取次数越高，可能对磁盘造成的压力就越大。过多的逻辑页也会增加\
  \ CPU 在管理这些页上的负载。这不是一个自动的关联。你不能总是指望读取次数最多的查询就是性能最差的查询。但这是一种通用指标，也是一个良好的起点。尽管最小化\
  \ I/O 次数并不是一个具有成本效益的计划的必备条件，但你经常会发现，通常成本最低的计划具有最少的 I/O，因为 I/O 操作是昂贵的。\n\n导致大量逻辑读取的查询通常会对相应的大批量数据获取锁。甚至读取（相对于写入）也可能需要在所有数据上获取共享锁，具体取决于隔离级别。这些查询会阻塞所有其他请求此数据（或部分数据）以进行修改（而非读取）的查询。由于这些查询本质上成本高昂且需要较长的执行时间，它们会长时间阻塞其他查询。被阻塞的查询进而会对更多查询造成阻塞，在数据库中引入一系列阻塞链。（第\
  \ 13 章涵盖了锁模式。）\n\n因此，识别成本较高的查询并首先优化它们是有意义的，从而达到以下效果：\n\n*   提高成本较高查询本身的性能\n*   降低系统资源的整体压力\n\
  *   减少数据库阻塞\n\n成本较高的查询可分为以下两种类型：\n\n*   `单次执行`：单个查询的执行成本很高。\n*   `多次执行`：查询本身成本可能不高，但重复执行该查询会对系统资源造成压力。\n\
  \n你可以使用不同的方法来识别这两种类型的成本较高的查询，如下节所述。\n\n\n### 单次执行的高成本查询\n\n您可以通过分析会话输出文件、使用查询存储，或查询\
  \ `sys.dm_exec_query_stats` 来识别高成本查询。在本例中，我们将从识别执行大量逻辑读取的查询开始，因此您应该会话输出按 `logical_reads`\
  \ 数据列排序。您可以更改此设置，按持续时间或 CPU 排序，甚至以有趣的方式将它们组合起来。您可以通过以下步骤访问会话信息：\n\n1.  捕获一个包含典型工作负载的会话。\n\
  2.  将会话输出保存到文件。\n3.  使用“文件” ➤ “打开”打开该文件，并选择一个 `.xel` 文件以使用数据浏览器窗口。在那里对信息进行排序。\n\
  4.  或者，您可以查询跟踪文件进行分析，按 `logical_reads` 字段排序。\n\n```\nWITH    xEvents\nAS (SELECT\
  \    object_name AS xEventName,\n              CAST (event_data AS XML) AS xEventData\n\
  \    FROM      sys.fn_xe_file_target_read_file('C:\\Sessions\\QueryPerformanceMetrics*.xel',\n\
  \                                              NULL, NULL, NULL)\n)\nSELECT  xEventName,\n\
  \        xEventData.value('(/event/data[@name=\"duration\"]/value)[1]',\n      \
  \                   'bigint') Duration,\n        xEventData.value('(/event/data[@name=\"\
  physical_reads\"]/value)[1]', 'bigint') PhysicalReads,\n        xEventData.value('(/event/data[@name=\"\
  logical_reads\"]/value)[1]',\n                         'bigint') LogicalReads,\n\
  \        xEventData.value('(/event/data[@name=\"cpu_time\"]/value)[1]',\n      \
  \                   'bigint') CpuTime,\n        CASE xEventName\n            WHEN\
  \ 'sql_batch_completed'\n            THEN xEventData.value('(/event/data[@name=\"\
  batch_text\"]/value)[1]',\n                                  'varchar(max)')\n \
  \           WHEN 'rpc_completed'\n            THEN xEventData.value('(/event/data[@name=\"\
  statement\"]/value)[1]',\n                                  'varchar(max)')\n  \
  \      END AS SQLText,\n        xEventData.value('(/event/data[@name=\"query_hash\"\
  ]/value)[1]',\n                         'binary(8)') QueryHash\nINTO    Session_Table\n\
  FROM    xEvents;\n\nSELECT  st.xEventName,\n        st.Duration,\n        st.PhysicalReads,\n\
  \        st.LogicalReads,\n        st.CpuTime,\n        st.SQLText,\n        st.QueryHash\n\
  FROM    Session_Table AS st\nORDER BY st.LogicalReads DESC;\n```\n\n让我们稍微分解一下这个查询。首先，我创建了一个名为\
  \ `xEvents` 的公用表表达式（CTE）。我这样做只是因为它使代码更容易阅读。它并没有从根本上改变任何行为。当我必须从文件读取并转换数据类型时，我更喜欢这样。这样，我后面语句中的\
  \ XML 查询就更有意义了。请注意，我在读取文件时使用了通配符 `QueryPerformanceMetrics*.xel`。这使我能够读取扩展事件会话创建的所有回滚文件（更多详细信息，请参阅第\
  \ 6 章）。\n\n根据收集的数据量和文件大小，直接对从扩展事件收集的文件运行查询可能异常缓慢。在这种情况下，请使用相同的基本函数 `sys.fn_xe_file_target_read_file`\
  \ 将数据加载到表中，而不是直接查询。完成后，您可以对表应用索引以加快查询速度。我使用前面的脚本将数据放入表中，然后查询该表以获取输出。这对于测试来说没问题，但对于更永久的解决方案，您会希望有一个专门的数据库来存储此类数据，其表具有适当的结构，而不是像我在这里那样使用\
  \ `INTO` 这样的捷径。\n\n在某些情况下，您可能从系统监视器输出中识别出 CPU 压力很大。CPU 压力可能源于大量的 CPU 密集型操作，例如存储过程重新编译、聚合函数、数据排序、哈希联接等。在这种情况下，您应该按\
  \ `cpu_time` 字段对会话输出进行排序，以识别占用大量处理器周期的查询。\n\n### 多次执行的高成本查询\n\n正如我前面提到的，有时一个查询本身可能成本不高，但同一查询多次执行的累积效应可能会给系统资源带来压力。在这种情况下，按\
  \ `logical_reads` 字段排序将无法帮助您识别此类高成本查询。相反，您需要了解查询多次执行的总读取次数、总 CPU 时间或仅累计持续时间。\n\n\
  *   查询会话输出并按您感兴趣的一些值进行分组。\n*   查询查询存储中的信息。\n*   访问 `sys.dm_exec_query_stats` DMO\
  \ 以从生产服务器检索信息。这假设您处理的是最近发生的或不依赖于已知历史记录的问题，因为此数据仅是当前存储在过程缓存中的内容。\n\n如果您正在寻找数据的准确历史视图，可以转到您使用扩展事件收集的指标或查询存储中的信息，具体取决于您清除该数据的频率（更多内容见第\
  \ 11 章）。查询存储具有可用于此类调查的聚合数据。但是，它只有聚合信息。如果您还想要详细的单次调用信息，您将需要重新使用扩展事件。\n\n将会话数据导入数据库表后，执行\
  \ `SELECT` 语句以查找同一查询多次执行执行的总读取次数，如下所示：\n\n```\nSELECT COUNT(*) AS TotalExecutions,\n\
  \       st.xEventName,\n       st.SQLText,\n       SUM(st.Duration) AS DurationTotal,\n\
  \       SUM(st.CpuTime) AS CpuTotal,\n       SUM(st.LogicalReads) AS LogicalReadTotal,\n\
  \       SUM(st.PhysicalReads) AS PhysicalReadTotal\nFROM Session_Table AS st\nGROUP\
  \ BY st.xEventName, st.SQLText\nORDER BY LogicalReadTotal DESC;\n```\n\n前面脚本中的 `TotalExecutions`\
  \ 列表示查询执行的次数。`LogicalReadTotal` 列表示查询多次执行执行的总逻辑读取次数。\n\n通过这种方法识别的高成本查询比通过会话识别的单次执行的高成本查询更能反映负载情况。例如，一个需要\
  \ 50 次读取的查询可能被执行了 1,000 次。查询本身可能被认为足够“便宜”，但该查询执行的总读取次数结果是 50,000 (= 50 × 1,000)，这不能被认为是便宜的。优化此查询以将单次执行的读取次数减少\
  \ 10 次，可将总读取次数减少 10,000 (= 10 × 1,000)，这可能比优化一个单次查询需要 5,000 次读取更有益。\n\n这种方法的问题是，大多数查询的\
  \ `WHERE` 子句中会有一组不同的条件，或者过程调用会传入不同的值。这使得简单地按带参数的查询或过程进行分组变得不可能。您可以采用多种方法来处理此问题。因为您拥有扩展事件，所以实际上可以将其用于为您服务。例如，`rpc_completed`\
  \ 事件将过程名捕获为一个字段。您可以简单地按该字段分组。对于批处理，您可以添加 `query_hash` 字段，然后按该字段分组。另一种方法是清理数据，删除参数值，如\
  \ Microsoft 开发者网络 [`http://bit.ly/1e1I38f`](http://bit.ly/1e1I38f) 上所述。虽然它是最初为 SQL\
  \ Server 2005 编写的，但其概念适用于直到 SQL Server 2017 的其他 SQL Server 版本。\n\n要从 `sys.dm_exec_query_stats`\
  \ 视图中获取相同的信息，只需针对该 DMV 运行查询即可。\n\n\n## 监控查询性能\n\n```sql\nSELECT s.TotalExecutionCount,\n\
  t.text,\ns.TotalExecutionCount,\ns.TotalElapsedTime,\ns.TotalLogicalReads,\ns.TotalPhysicalReads\n\
  FROM\n(\nSELECT deqs.plan_handle,\nSUM(deqs.execution_count) AS TotalExecutionCount,\n\
  SUM(deqs.total_elapsed_time) AS TotalElapsedTime,\nSUM(deqs.total_logical_reads)\
  \ AS TotalLogicalReads,\nSUM(deqs.total_physical_reads) AS TotalPhysicalReads\n\
  FROM sys.dm_exec_query_stats AS deqs\nGROUP BY deqs.plan_handle\n) AS s\nCROSS APPLY\
  \ sys.dm_exec_sql_text(s.plan_handle) AS t\nORDER BY s.TotalLogicalReads DESC;\n\
  ```\n\n利用来自执行动态管理对象 (DMO) 的数据的另一种方法是使用 `query_hash` 和 `query_plan_hash` 作为聚合机制。虽然一个给定的存储过程或参数化查询可能传入不同的值，但这些查询的\
  \ `query_hash` 和 `query_plan_hash` 在大多数情况下是相同的。这意味着您可以针对哈希值进行聚合，以识别那些原本无法看到的常见计划或常见查询模式。下面的查询只是对前一个查询稍作修改：\n\
  \n```sql\nSELECT s.TotalExecutionCount,\nt.text,\ns.TotalExecutionCount,\ns.TotalElapsedTime,\n\
  s.TotalLogicalReads,\ns.TotalPhysicalReads\nFROM\n(\nSELECT deqs.query_plan_hash,\n\
  SUM(deqs.execution_count) AS TotalExecutionCount,\nSUM(deqs.total_elapsed_time)\
  \ AS TotalElapsedTime,\nSUM(deqs.total_logical_reads) AS TotalLogicalReads,\nSUM(deqs.total_physical_reads)\
  \ AS TotalPhysicalReads\nFROM sys.dm_exec_query_stats AS deqs\nGROUP BY deqs.query_plan_hash\n\
  ) AS s\nCROSS APPLY\n(\nSELECT plan_handle\nFROM sys.dm_exec_query_stats AS deqs\n\
  WHERE s.query_plan_hash = deqs.query_plan_hash\n) AS p\nCROSS APPLY sys.dm_exec_sql_text(p.plan_handle)\
  \ AS t\nORDER BY TotalLogicalReads DESC;\n```\n\n这比收集会话数据所需的所有工作要简单得多，以至于让人疑惑为什么还要使用扩展事件。主要原因，正如我在本章开头所写，在于**精确性**。`sys.dm_exec_query_stats`\
  \ 视图是一个针对给定计划在内存中存在期间的**运行中聚合**。而另一方面，扩展事件会话则是在您运行它的任何时间范围内的**历史轨迹**。您甚至可以将扩展事件的会话结果添加到数据库中。有了一个数据列表，您可以更精确地生成关于事件的总计，而不是仅仅依赖于某个特定时刻。然而，请理解，许多性能问题的故障排除都侧重于服务器上最近发生的情况，并且由于\
  \ `sys.dm_exec_query_stats` 基于缓存，这个动态管理视图通常代表了系统近期的状态，因此 `sys.dm_exec_query_stats`\
  \ 极其重要。但是，如果您正在处理更为具体的“现在到底是什么在运行缓慢”的情况，您会使用 `sys.dm_exec_requests`。\n\n您会发现查询存储在易用性方面与\
  \ DMO 相同。然而，由于其中的信息不依赖于缓存，它可能比 DMO 数据更有用。不过，与 DMO 一样，查询存储也没有扩展事件会话那样的详细记录。\n\n###\
  \ 识别运行缓慢的查询\n\n由于用户的体验受到其请求响应时间的很大影响，您应该定期监控传入 SQL 查询的执行时间，并找出运行缓慢查询的响应时间，从而创建一个查询性能基线。如果运行缓慢查询的响应时间（或持续时间）变得不可接受，那么您就应该分析性能下降的原因。然而，并非每个性能不佳的查询都是由资源问题引起的。其他问题，例如阻塞，也可能导致查询性能缓慢。阻塞将在第\
  \ 12 章中详细讨论。\n\n要识别运行缓慢的查询，只需更改针对会话数据的查询，改变您排序的依据，像这样：\n\n```sql\nWITH xEvents\n\
  AS (SELECT object_name AS xEventName,\nCAST(event_data AS XML) AS xEventData\nFROM\
  \ sys.fn_xe_file_target_read_file('Q:\\Sessions\\QueryPerformanceMetrics*.xel',\
  \ NULL, NULL, NULL)\n)\nSELECT xEventName,\nxEventData.value('(/event/data[@name=\"\
  duration\"]/value)[1]', 'bigint') Duration,\nxEventData.value('(/event/data[@name=\"\
  physical_reads\"]/value)[1]', 'bigint') PhysicalReads,\nxEventData.value('(/event/data[@name=\"\
  logical_reads\"]/value)[1]', 'bigint') LogicalReads,\nxEventData.value('(/event/data[@name=\"\
  cpu_time\"]/value)[1]', 'bigint') CpuTime,\nxEventData.value('(/event/data[@name=\"\
  batch_text\"]/value)[1]', 'varchar(max)') BatchText,\nxEventData.value('(/event/data[@name=\"\
  statement\"]/value)[1]', 'varchar(max)') StatementText,\nxEventData.value('(/event/data[@name=\"\
  query_plan_hash\"]/value)[1]', 'binary(8)') QueryPlanHash\nFROM xEvents\nORDER BY\
  \ Duration DESC;\n```\n\n对于一个运行缓慢的系统，您应该在优化过程前后记录运行缓慢查询的持续时间。应用优化技术后，您应该评估其对系统的整体影响。您的优化步骤有可能对其他查询产生不利影响，使它们变得更慢。\n\
  \n\n## 执行计划\n\n一旦你识别出一个代价高昂的查询，就需要找出它代价高昂的 `原因`。你可以从 `Extended Events`、`Query Store`\
  \ 或 `sys.dm_exec_procedure_stats` 中找出代价高昂的过程；在 `Management Studio` 中重新运行它；并查看查询优化器使用的执行计划。执行计划展示了查询优化器用于执行查询的处理策略（包括多个中间步骤）。\n\
  \n为了创建执行计划，查询优化器会评估索引、统计信息、约束和连接策略的各种排列组合。由于可能存在大量潜在计划，这个优化过程可能需要较长时间才能生成最具成本效益的执行计划。为了防止对执行计划进行过度优化，该过程被分为多个阶段。每个阶段都是一组转换规则，用于评估与优化过程直接相关的各种数据库对象和设置，最终目标是找到一个“足够好”的计划，而非一个完美的计划。正是这种“足够好”与“完美”之间的区别，可能导致因执行计划优化不足而性能不佳。查询优化器只会尝试有限次数的优化，之后便会直接采用当前代价最低的计划（这被称为\
  \ `超时`）。\n\n完成一个阶段后，查询优化器会检查所得计划的预估代价。如果查询优化器判定该计划的代价足够低，它就会使用该计划，而不再进行后续的优化阶段。然而，如果计划的代价不够低，优化器将进入下一个优化阶段。我将在第\
  \ 15 章更深入地介绍执行计划的生成。\n\nSQL Server 以多种形式和两种不同类型显示查询执行计划。在 SQL Server 2017 中，最常用的形式是图形化执行计划和\
  \ XML 执行计划。实际上，图形化执行计划只是为屏幕显示而解析的 XML 执行计划。两种执行计划类型分别是估计计划和实际计划。`估计`计划代表来自查询优化器的结果，而\
  \ `实际`计划是同一计划加上一些运行时指标。估计计划的优点在于它不需要实际执行查询。这些类型生成的计划可能不同，但仅当执行期间发生语句级重新编译时才会如此。大多数情况下，两种类型的计划是相同的。主要区别在于实际计划中包含了一些执行统计信息，而这些信息在估计计划中不存在。\n\
  \n图形化执行计划使用图标来表示查询的处理策略。要获取图形化估计执行计划，请选择“查询” ➤ “显示估计的执行计划”。XML 执行计划包含与图形化计划相同的数据，但格式更便于以编程方式访问。此外，借助\
  \ SQL Server 的 XQuery 功能，可以像查询表一样查询 XML 执行计划。XML 执行计划通过语句 `SET SHOWPLAN_XML`（用于估计计划）和\
  \ `SET STATISTICS XML`（用于实际执行计划）生成。你也可以右键单击图形化执行计划并选择 `显示执行计划 XML`。你还可以使用 DMO `sys.dm_exec_query_plan`\
  \ 直接从计划缓存中提取计划。缓存中存储的计划没有运行时信息，因此从技术上讲它们是估计计划。存储在 `Query Store` 中的计划也是如此。\n\n###\
  \ 注意\n\n你应确保数据库设置为兼容模式 140，以便它能准确反映 SQL Server 2017 的更新。\n\n你可以使用 `SET SHOWPLAN_XML`\
  \ 命令获取先前识别出的代价最高查询的估计 XML 执行计划，如下所示：\n\n```\nUSE AdventureWorks2017;\nGO\nSET SHOWPLAN_XML\
  \ ON;\nGO\nSELECT soh.AccountNumber,\nsod.LineTotal,\nsod.OrderQty,\nsod.UnitPrice,\n\
  p.Name\nFROM Sales.SalesOrderHeader soh\nJOIN Sales.SalesOrderDetail sod\nON soh.SalesOrderID\
  \ = sod.SalesOrderID\nJOIN Production.Product p\nON sod.ProductID = p.ProductID\n\
  WHERE sod.LineTotal > 20000;\nGO\nSET SHOWPLAN_XML OFF;\nGO\n```\n\n运行此查询会生成一个指向执行计划的链接，而不是执行计划或任何数据。点击该链接将打开一个执行计划。虽然该计划将以图形化形式显示，但右键单击该计划并选择\
  \ `显示执行计划 XML` 将显示 XML 数据。图 7-1 显示了部分 XML 执行计划输出。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig1_HTML.jpg](img/323849_5_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\nXML 执行计划输出\n\n\n\n### 分析查询执行计划\n\n让我们从上一节识别出的代价高昂的查询开始。将其（去掉 `SET SHOWPLAN_XML`\
  \ 语句）复制到 Management Studio 的查询窗口中。通过单击\"显示估计执行计划\"按钮或按下 `Ctrl+L`，我们可以立即捕获一个执行计划。你将在图\
  \ 7-2 中看到该执行计划。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig2_HTML.jpg](img/323849_5_En_7_Fig2_HTML.jpg)\n\
  图 7-2：查询执行计划\n\n执行计划展示了两种不同的信息流。从左侧开始阅读，你可以看到逻辑流，从 `SELECT` 运算符开始，依次经过每个执行步骤。从右侧开始并向相反方向阅读，则是信息的物理流，首先从\
  \ `聚集索引扫描` 运算符提取数据，然后进行到后续每个步骤。大多数情况下，按照数据的物理流向阅读更利于理解执行计划中发生的事情，但并非总是如此。有时，理解执行计划中正在发生什么的唯一方法是按照逻辑处理顺序从左到右阅读。每个步骤代表为获取查询最终输出而执行的一个操作。\n\
  \n执行计划的一个重要方面是其中显示的值。书中会用到许多值，但最显而易见的是 `成本`（`Cost`），它显示了估计的成本百分比。你可以在图 7-2 中看到它。左侧的\
  \ `SELECT` 运算符的 `成本` 值为 0%，右侧的 `聚集索引扫描` 操作的 `成本` 值为 60%。这些成本应简单地视为成本单位。它们不是任何类型性能的字面度量。它们是由查询优化器分配或计算的值。名义上，它们代表了\
  \ I/O 和 CPU 使用的数学构造。然而，它们并不代表字面上的 I/O 和 CPU 使用。这些值始终是估计值，单位就是简单的成本单位。这是我们首先需要确立的一个至关重要的理解点。\n\
  \n执行计划所表示的查询执行的某些方面如下：\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig3_HTML.jpg](img/323849_5_En_7_Fig3_HTML.jpg)\n\
  图 7-3：执行计划运算符的工具提示表\n\n*   如果一个查询由多个查询的批次组成，则每个查询的执行计划将按执行顺序显示。批次中的每个执行计划都有一个相对估计成本，整个批次的总成本为\
  \ 100%。\n*   执行计划中的每个图标代表一个运算符。它们各自都有一个相对估计成本，执行计划中所有节点的总成本为 100%。（尽管统计信息不准确，甚至\
  \ SQL Server 中的错误可能导致你看到超过 100% 的成本，但这主要出现在旧版本的 SQL Server 中。）\n*   通常，执行计划中的第一个物理运算符代表从数据库对象（表或索引）检索数据的机制。例如，在图\
  \ 7-2 的执行计划中，三个起点代表从 `SalesOrderHeader`、`SalesOrderDetail` 和 `Product` 表中检索数据。\n\
  *   数据检索通常是表操作或索引操作。例如，在图 7-2 的执行计划中，所有三个数据检索步骤都是索引操作。\n*   索引上的数据检索将是索引扫描或索引查找。例如，在图\
  \ 7-2 中可以看到聚集索引扫描、聚集索引查找和索引扫描。\n*   索引上数据检索操作的命名约定是 `[表名].[索引名]`。\n*   计划的逻辑流是从左到右，就像阅读英文书籍一样。数据在运算符之间从右向左流动，由运算符之间的连接箭头指示。\n\
  *   运算符之间连接箭头的粗细代表传输行数的图形化表示。\n*   同一列中两个运算符之间的连接机制将是嵌套循环联接、哈希匹配联接、合并联接或自适应联接（在\
  \ SQL Server 2017 和 Azure SQL Database 中添加）。例如，在图 7-2 所示的执行计划中，有一个哈希联接和一个循环联接。（联接机制稍后会有更详细的介绍。）\n\
  *   将鼠标悬停在执行计划中的节点上会显示一个包含一些详细信息的弹出窗口。工具提示在大多数情况下用处不大。图 7-3 显示了一个例子。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig4_HTML.jpg](img/323849_5_En_7_Fig4_HTML.jpg)\n\
  图 7-4：选择运算符属性\n\n*   关于运算符的完整详细信息可在\"属性\"窗口中获得，如图 7-4 所示。你可以通过右键单击运算符并从上下文菜单中选择\"\
  属性\"来打开它。\n*   运算符详细信息在顶部同时显示物理和逻辑操作类型。物理操作代表存储引擎实际使用的操作，而逻辑操作是优化器用来构建估计执行计划的构造。如果逻辑和物理操作相同，则只显示物理操作。它还显示其他有用的信息，如行数、I/O\
  \ 成本、CPU 成本等。\n*   阅读许多运算符上的属性对于理解查询在 SQL Server 内如何执行，从而更好地知道如何优化该查询，可能是必要的。\n\n\
  值得注意的是，在 SQL Server 2017 Management Studio 生成的实际执行计划中，你还可以看到查询的执行时间统计信息，作为查询计划的一部分。它们在图\
  \ 7-4 的 `QueryTimeStats` 部分可见。这提供了一种衡量查询性能的额外机制。当等待统计信息超过 1 毫秒时，你还可以在执行计划中看到这些等待统计信息。任何小于该值的等待不会出现在执行计划中。\n\
  \n\n### 识别执行计划中的高成本步骤\n\n执行计划中最直接的方法是找出哪些步骤的成本相对较高。这些步骤是你进行查询优化的起点。你可以采用以下技术来选择起始步骤：\n\
  \n*   执行计划中的每个节点都会显示其在完整执行计划中的相对估计成本，整个计划的总成本为 100%。因此，请重点关注相对成本最高的节点。例如，图 7-2 中的执行计划有一个步骤的估计成本为\
  \ 59%。\n\n*   一个执行计划可能来自一批语句，因此你可能还需要找出估计成本最高的语句。在图 7-2 中，你可以在计划顶部看到文本“Query 1”。在批处理情况下，会有多个计划，它们将按照在批处理中发生的顺序编号。\n\
  \n*   观察节点间连接箭头的粗细。粗的连接箭头表示在相应节点之间传输了大量数据。分析箭头左侧的节点，以理解其为何需要这么多数据行。同时检查箭头的属性。你可能会看到估计行数与实际行数不同。这可能是由统计信息过时等原因造成的。如果你看到计划大部分都是粗箭头，而结尾处是细箭头，或许可以通过修改查询或索引，使过滤操作在计划中更早执行。\n\
  \n*   寻找哈希连接操作。对于小的结果集，嵌套循环连接通常是首选的连接技术。本章稍后将详细介绍哈希连接与嵌套循环连接的比较。请记住，哈希连接不一定就差，循环连接也不一定就好。这取决于查询返回的数据量。\n\
  \n*   寻找键查找操作。对大结果集进行查找操作可能导致大量的随机读取。我将在第 11 章更详细地介绍键查找。\n\n*   可能存在警告，表现为某个操作符上有一个感叹号，这些是需要立即关注的区域。这些问题可能由多种原因引起，包括缺少连接条件的连接、缺少统计信息的索引或表。通常解决警告情况有助于提升性能。\n\
  \n*   寻找执行排序操作的步骤。这表明数据未按正确的排序顺序检索。同样，这可能不是问题，但它指出了潜在问题的迹象，可能是缺少索引或索引不正确。使用 `ORDER\
  \ BY` 确保数据按指定方式排序没有问题，但排序可能导致性能下降。\n\n*   注意那些可能给系统带来额外负载的操作符，例如表假脱机。它们可能是查询运行所必需的，也可能表明查询编写不当或索引设计糟糕。\n\
  \n*   并行查询执行的默认成本阈值是估计成本 5，这个值非常低。注意那些不合理的并行操作。请记住，估计成本是查询优化器分配的代表 CPU 和 I/O 数学模型的数字，并非实际测量值。\n\
  \n### 分析索引有效性\n\n为了进一步检查执行计划中的高成本步骤，你应该分析相关表或索引的数据检索机制。首先，你应该检查索引操作是 `查找` 还是 `扫描`。通常，为了获得最佳性能，你应该从表中检索尽可能少的行，而索引\
  \ `查找` 通常是访问少量行最有效的方法。`扫描` 操作通常表示访问了较大量的行。因此，通常更优选 `查找` 而非 `扫描`。然而，这并不是说查找天生就好，扫描天生就坏。数据检索机制需要准确反映查询的需求。一个检索表中所有行的查询将受益于扫描，而对同一查询进行查找反而会导致性能不佳。这里的关键是通过检查操作符的属性来理解操作的细节，从而理解优化器做出其选择的原因。\n\
  \n接下来，你需要确保索引机制已正确设置。查询优化器评估可用索引，以发现哪个索引能以最高效的方式从表中检索数据。如果没有所需的索引，优化器会使用次优的索引。为了获得最佳性能，你应该始终确保在数据检索操作中使用了最佳索引。你可以通过分析节点详细信息的“参数”部分来判断索引有效性（是否使用了最佳索引），具体关注以下内容：\n\
  \n*   数据检索操作\n\n*   连接操作\n\n让我们查看估计执行计划中 `SalesOrderHeader` 表的数据检索机制。图 7-5 显示了操作符属性。\n\
  \n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig5_HTML.jpg](img/323849_5_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\n\n`SalesOrderHeader` 表的数据检索机制\n\n在 `SalesOrderHeader` 表的操作符属性中，`Object`\
  \ 属性指定了所使用的索引 `PK_SalesOrderHeader_SalesOrderID`。它使用以下命名约定：`[数据库].[所有者].[表名].[索引名]`。`Seek\
  \ Predicates` 属性指定了用于在索引中查找键的列。`SalesOrderHeader` 表通过 `SalesOrderld` 列与 `SalesOrderDetail`\
  \ 表进行连接。`SEEK` 操作基于这样一个事实：连接条件 `SalesOrderld` 是聚集索引和主键 `PK_SalesOrderHeader` 的前导列。\n\
  \n有时你可能会遇到不同的数据检索机制。图 7-6 展示的不是你在图 7-5 中看到的 `Seek Predicates` 属性，而是一个简单的谓词，这表明了完全不同的数据检索机制。\n\
  \n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig6_HTML.jpg](img/323849_5_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n\n数据检索机制的变体，一个 `扫描`\n\n在图 7-6 的属性中，没有查找谓词。由于对列执行了函数操作 `ISNULL` 和 `CONVERT_IMPLICIT`，必须检查整个表是否存在\
  \ `Predicate` 值。\n\n```\nisnull(CONVERT_IMPLICIT(numeric(19,4),[AdventureWorks2017].[Sales].[SalesOrderDetail].[UnitPrice]\
  \ as [sod].[UnitPrice],0)*((1.0)-CONVERT_IMPLICIT(numeric(19,4),[AdventureWorks2017].[Sales].[SalesOrderDetail].[UnitPriceDiscount]\
  \ as [sod].[UnitPriceDiscount],0))*CONVERT_IMPLICIT(numeric(5,0),[AdventureWorks2017].[Sales].[SalesOrderDetail].[OrderQty]\
  \ as [sod].[OrderQty],0),(0.000000))>(20000.000000)\n```\n\n因为对数据执行了计算，索引并不存储计算结果，所以无法简单地在索引上查找信息，而是必须扫描所有数据，执行计算，然后检查数据是否与我们要查找的值匹配。\n\
  \n### 分析连接有效性\n\n除了分析所使用的索引外，您还应该检查优化器决定的连接策略的有效性。SQL Server 使用四种类型的连接。\n\n- 哈希连接\n\
  - 合并连接\n- 嵌套循环连接\n- 自适应连接\n\n在许多影响少量行的简单查询中，嵌套循环连接远优于哈希连接和合并连接。随着连接变得更加复杂，其他连接类型会在适当的地方被使用。没有任何连接类型天生就是坏的或错误的。您主要是在寻找优化器可能选择了与当前数据不兼容的类型的地方。这通常是由于优化器在决定使用哪种类型时，其可用的统计信息存在差异所导致的。\n\
  \n#### 哈希连接\n\n要理解 SQL Server 的哈希连接策略，请考虑以下简单查询：\n\n```sql\nSELECT p.Name AS ProductName,\n\
  pc.Name AS ProductCategoryName\nFROM Production.Product p\nJOIN Production.ProductCategory\
  \ pc\nON p.ProductSubcategoryID = pc.ProductCategoryID;\n```\n\n表 7-1 显示了这两个表的索引和行数。\n\
  \n表 7-1\n产品表和产品类别表的索引及行数\n\n| 表 | 索引 | 行数 |\n| --- | --- | --- |\n| `Product` |\
  \ 在 `ProductID` 上的聚集索引 | 504 |\n| `ProductCategory` | 在 `ProductCategoryld` 上的聚集索引\
  \ | 4 |\n\n图 7-7 显示了上述查询的执行计划。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig7_HTML.jpg](img/323849_5_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n带有哈希连接的执行计划\n\n您可以看到优化器在两个表之间使用了哈希连接。\n\n哈希连接将两个连接输入用作 *生成输入* 和 *探测输入*。生成输入在执行计划中由顶部的输入表示，探测输入是底部的输入。通常两个输入中较小的一个用作生成输入，因为它将被存储在系统上，因此优化器试图最小化所使用的内存。\n\
  \n哈希连接分两个阶段执行其操作：*生成阶段* 和 *探测阶段*。在最常用的哈希连接形式（*内存中的哈希连接*）中，整个生成输入被扫描或计算，然后在内存中构建一个哈希表。外部输入中的每一行根据为\
  \ *哈希键*（等式谓词中的列集）计算的哈希值被插入到一个哈希桶中。哈希只是对相关值运行的一种数学结构，用于比较目的。\n\n生成阶段之后是探测阶段。整个探测输入被逐行扫描或计算，对于每个探测行，都会计算一个哈希键值。然后扫描探测输入哈希键值对应的哈希桶，并生成匹配项。图\
  \ 7-8 说明了内存中哈希连接的过程。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig8_HTML.jpg](img/323849_5_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8\n内存中哈希连接的工作流程\n\n查询优化器使用哈希连接来高效处理大型、未排序、无索引的输入。现在让我们看看下一种连接类型：合并连接。\n\n\
  #### 合并连接\n\n在前面的例子中，`Product` 表的输入较大，并且该表在连接列 (`ProductCategorylD`) 上没有索引。使用下面的简单查询，您可以看到不同的行为：\n\
  \n```sql\nSELECT pm.Name AS ProductModelName,\npmpd.CultureID\nFROM Production.ProductModel\
  \ pm\nJOIN Production.ProductModelProductDescriptionCulture pmpd\nON pm.ProductModelID\
  \ = pmpd.ProductModelID;\n```\n\n图 7-9 显示了此查询的执行计划结果。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig9_HTML.jpg](img/323849_5_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9\n带有合并连接的执行计划\n\n对于此查询，优化器在两个表之间使用了合并连接。合并连接要求两个连接输入都按合并列（由连接条件定义）排序。如果两个连接列上都有索引，则连接输入将通过索引排序。由于每个连接输入都是排序的，合并连接从每个输入中获取一行并比较它们是否相等。如果相等，则生成一个匹配行。此过程重复进行，直到处理完所有行。\n\
  \n在数据已通过索引排序的情况下，合并连接可以是最快的连接操作之一，但如果数据未排序而优化器仍然选择执行合并连接，则数据必须通过一个额外的操作（排序）进行排序。这可能会使合并连接变慢，并在内存和\
  \ I/O 资源方面成本更高。如果内存分配不准确且排序在 tempdb 中溢出到磁盘，情况会变得更糟。\n\n在这种情况下，查询优化器发现连接输入在其连接列上都是已排序（或已索引）的。您可以在\
  \ `索引扫描` 运算符的属性中看到这一点，如图 7-10 所示。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig10_HTML.jpg](img/323849_5_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10\n显示数据已排序的聚集索引扫描属性\n\n由于数据已通过正在使用的索引排序，因此在此情况下选择合并连接作为比任何其他连接更快的连接策略。\n\n\
  \n#### 嵌套循环连接\n\n接下来我要介绍的连接类型是嵌套循环连接。为了获得更好的性能，你应当始终致力于从各个表中访问有限数量的行。要理解使用较小结果集的效果，请按如下方式减少查询中的连接输入：\n\
  \n```sql\nSELECT pm.Name AS ProductName,\npmpd.CultureID\nFROM Production.ProductModel\
  \ pm\nJOIN Production.ProductModelProductDescriptionCulture pmpd\nON pm.ProductModelID\
  \ = pmpd.ProductModelID\nWHERE pm.Name = 'HL Mountain Front Wheel';\n```\n\n图 7-11\
  \ 显示了新查询的执行计划结果。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig11_HTML.jpg](img/323849_5_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11：使用嵌套循环连接的执行计划\n\n如你所见，优化器在两个表之间使用了嵌套循环连接。\n\n嵌套循环连接使用一个连接输入作为外部输入表，另一个作为内部输入表。外部输入表在执行计划中显示为顶部输入，内部输入表显示为底部输入表。外部循环逐行消耗外部输入表。内部循环针对每一行外部行执行，在内部输入表中搜索匹配的行。\n\
  \n如果外部输入非常小，而内部输入较大但已建立索引，那么嵌套循环连接非常有效。在许多影响少量行的简单查询中，嵌套循环连接远优于哈希连接和合并连接。连接操作通过其他牺牲来获取速度。循环连接可能很快，因为它使用内存将一小部分数据与第二部分数据快速进行比较。合并连接类似地使用内存和一部分\
  \ `tempdb` 来进行有序比较。哈希连接则使用内存和 `tempdb` 来构建连接的哈希表。虽然循环连接在小数据集上可能更快，但随着数据集变大或没有支持数据检索的索引，它可能会变慢。这就是\
  \ SQL Server 提供不同连接机制的原因。\n\n即使对于小的连接输入，如前面的查询，在连接列上建立索引也很重要。正如你在前面的执行计划中所看到的，对于小的结果集，连接列上的索引允许查询优化器考虑嵌套循环连接策略。如果输入的连接列上缺少索引，将迫使查询优化器转而使用哈希连接。\n\
  \n表 7-2 总结了三种连接类型的使用情况。\n\n表 7-2：三种连接类型的特性\n\n| 连接类型 | 连接列上的索引 | 连接表的通常大小 | 预排序\
  \ | 连接子句 |\n| --- | --- | --- | --- | --- |\n| 哈希连接 | 内部表：未索引<br>外部表：可选<br>最佳条件：小的外部表，大的内部表\
  \ | 任意 | 否 | 等值连接 |\n| 合并连接 | 两个表：必须<br>最佳条件：两个表上都有聚集或覆盖索引 | 大 | 是 | 等值连接 |\n| 嵌套循环连接\
  \ | 内部表：必须<br>外部表：最好有 | 小 | 可选 | 所有 |\n\n### 注意\n\n在哈希和循环连接中，外部表通常是两个连接表中较小的那个。\n\
  \n我将在第 8 章介绍索引类型，包括聚集和覆盖索引。\n\n#### 自适应连接\n\n自适应连接是在 Azure SQL Database 和 SQL Server\
  \ 2017 中引入的。它是一种新的连接类型，可以在运行时在嵌套循环连接或哈希连接之间进行选择。截至撰写本文时，它仅适用于列存储索引，但未来可能会改变。为了演示这一点，我将创建一个带有聚集列存储索引的表。\n\
  \n```sql\nSELECT *\nINTO dbo.TransactionHistory\nFROM Production.TransactionHistory\
  \ AS th;\nCREATE CLUSTERED COLUMNSTORE INDEX ClusteredColumnStoreTest\nON dbo.TransactionHistory;\n\
  ```\n\n在准备好此表和索引，并且我们的兼容性模式设置正确后，我们可以运行一个利用聚集列存储索引的简单查询。\n\n```sql\nSELECT p.Name,\n\
  th.Quantity\nFROM dbo.TransactionHistory AS th\nJOIN Production.Product AS p\nON\
  \ p.ProductID = th.ProductID\nWHERE th.Quantity > 550;\n```\n\n捕获该查询的实际执行计划后，我们将看到图\
  \ 7-12。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig12_HTML.jpg](img/323849_5_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12：使用自适应连接的执行计划\n\n自适应连接使用的哈希连接或嵌套循环连接的功能与前面定义的完全一致。不同之处在于，自适应连接可以判断在给定情况下哪种连接类型更高效。它的工作方式是，首先构建一个隐藏的自适应缓冲区。如果超过行数阈值，行将流入常规哈希表。剩余的行被加载到哈希表中，为探测过程做好准备，如前所述。如果所有行都加载到自适应缓冲区中，并且该数量低于行数阈值，则该缓冲区将用作嵌套循环连接的外部引用。\n\
  \n如你在图 7-12 中所见，每个连接都显示为 `Adaptive Join` 算子下方的一个单独分支。`Adaptive Join` 下方的第一个分支用于哈希连接。在这种情况下，`Index\
  \ Scan` 算子和 `Filter` 算子满足使用哈希连接时的查询需求。`Adaptive Join` 下方的第二个分支用于嵌套循环连接。这里将是 `Clustered\
  \ Index Seek` 操作。\n\n计划被生成并存储在缓存中，包含两个可能的分支。然后查询引擎将根据所讨论的结果集决定沿哪个分支执行。你可以通过查看 `Adaptive\
  \ Join` 算子的属性来了解所做的选择，如图 7-13 所示。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig13_HTML.jpg](img/323849_5_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13：自适应连接算子的属性，显示实际的连接类型\n\n此连接在哈希匹配和嵌套循环之间切换的阈值是在计划编译时计算的。它作为 `AdaptiveThresholdRows`\
  \ 存储在计划的属性中。当查询执行并确定其达到、超过或未达到阈值时，处理继续沿自适应连接的正确分支进行。此过程不需要计划重新编译。重新编译将在第 16 章进一步讨论。\n\
  \n当数据集的情况是嵌套循环的性能远优于哈希匹配时，自适应连接能显著增强性能。虽然构建哈希匹配然后不使用它会产生一些成本，但这会被嵌套循环连接在小数据集上增强的性能所抵消。当数据集很大时，此过程不会以任何方式对哈希连接操作产生负面影响。\n\
  \n虽然从技术上讲，这并不代表一种全新的连接类型，但在我看来，其在嵌套循环和哈希匹配这两种核心类型之间动态切换的行为，使其实际上成为一种新的连接类型。再加上你现在有一个新的算子，即\
  \ `Adaptive Join` 算子，并且嵌套循环和哈希匹配都不可见，这看起来确实像是一种新的连接类型。\n\n\n### 实际与估计执行计划\n\n存在估计执行计划和实际执行计划。在某种程度上，它们可以互换。但是，实际计划包含了查询执行时的信息，特别是受影响的行数和其他一些在估计计划中不可用的信息。这些信息非常有用，尤其是在试图理解统计估计时。因此，在调优查询时，优先选择实际执行计划。\n\
  \n不幸的是，你并不总能访问到它们。你可能无法执行查询，例如在生产环境中。你可能只能访问缓存中的计划，而它不包含运行时信息。因此，有些情况下，你只能使用估计计划来工作。然而，由于运行时指标是收集在实际计划中的，所以通常更推荐获取实际计划。\n\
  \n还有一种情况，估计计划根本无法工作。考虑下面的存储过程：\n\n```sql\nCREATE OR ALTER PROC p1\nAS\nCREATE TABLE\
  \ t1 (c1 INT);\nINSERT INTO t1\nSELECT ProductID\nFROM Production.Product;\nSELECT\
  \ *\nFROM t1;\nDROP TABLE t1;\nGO\n```\n\n你可以尝试使用 `SHOWPLAN_XML` 来获取查询的估计 XML 执行计划，如下所示：\n\
  \n```sql\nSET SHOWPLAN_XML ON;\nGO\nEXEC p1 ;\nGO\nSET SHOWPLAN_XML OFF;\nGO\n```\n\
  \n但这会失败并显示以下错误：\n\n```sql\nMsg 208, Level 16, State 1, Procedure p1, Line 249\n\
  Invalid object name 't1'.\n```\n\n由于 `SHOWPLAN_XML` 实际上并不执行查询，查询优化器无法为表 `t1` 上的\
  \ `INSERT` 和 `SELECT` 语句生成执行计划，因为该表直到查询执行时才会存在。相反，你可以使用 `STATISTICS XML`，如下所示：\n\
  \n```sql\nSET STATISTICS XML ON;\nGO\nEXEC p1;\nGO\nSET STATISTICS XML OFF;\nGO\n\
  ```\n\n由于 `STATISTICS XML` 会执行查询，表在查询中被创建和访问，这一切都被执行计划捕获。图 7-14 显示了查询结果以及 `STATISTICS\
  \ XML` 提供的存储过程内两个语句的两个计划。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig14_HTML.jpg](img/323849_5_En_7_Fig14_HTML.jpg)\n\
  \n**图 7-14**\nSTATISTICS PROFILE 输出\n\n### 提示\n\n记住在 Management Studio 中关闭 **Query\
  \ ➤ Show Execution Plan**，否则你看到的是图形执行计划，而不是文本执行计划。\n\n### 计划缓存\n\n访问执行计划的另一个地方是直接从它们存储的内存空间中读取，即计划缓存。SQL\
  \ Server 提供了动态管理视图和函数来访问此数据。缓存中存储的所有计划都是估计计划。要查看缓存中的执行计划列表，请运行以下查询：\n\n```sql\n\
  SELECT p.query_plan,\nt.text\nFROM sys.dm_exec_cached_plans r\nCROSS APPLY sys.dm_exec_query_plan(r.plan_handle)\
  \ p\nCROSS APPLY sys.dm_exec_sql_text(r.plan_handle) t;\n```\n\n该查询返回一个 XML 执行计划链接列表。打开其中任何一个都会显示执行计划。这些执行计划是编译后的计划，但它们不包含执行指标。通过使用动态管理视图中提供的列，可以进一步搜索特定的存储过程或执行计划。\n\
  \n虽然没有运行时数据有一定局限性，但能够访问执行计划，即使在查询执行时，对于进行性能调优的人来说也是非常宝贵的资源。如前所述，在生产环境中你可能无法执行查询，所以能获取到任何计划都是有用的。\n\
  \n如第 11 章所述，你也可以从查询存储中检索计划。与缓存中存储的计划一样，这些都是估计计划。\n\n### 执行计划工具\n\n虽然你刚刚开始看到执行计划的实践应用，但你只看到了用于理解这些计划如何工作的一部分可用资源。除了\
  \ SSMS 中以图形计划呈现的 XML 信息及其固有属性之外，Management Studio 还提供了一些额外的计划功能，这些功能在你探索任何给定执行计划所揭示的关于查询性能的信息时值得了解。\n\
  \n##### 查找节点\n\n首先，你实际上可以在计划的运算符内搜索特定的属性值。让我们用本章开始时的原始查询为例，为其生成一个计划。查询如下：\n\n```sql\n\
  SELECT soh.AccountNumber,\nsod.LineTotal,\nsod.OrderQty,\nsod.UnitPrice,\np.Name\n\
  FROM Sales.SalesOrderHeader soh\nJOIN Sales.SalesOrderDetail sod\nON soh.SalesOrderID\
  \ = sod.SalesOrderID\nJOIN Production.Product p\nON sod.ProductID = p.ProductID\n\
  WHERE sod.LineTotal > 20000;\n```\n\n使用你喜欢的任何方式生成执行计划后，在执行计划内右键单击。会出现一个上下文菜单，其中包含许多控制计划的有趣资源，如图\
  \ 7-15 所示。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig15_HTML.jpg](img/323849_5_En_7_Fig15_HTML.jpg)\n\
  \n**图 7-15**\n执行计划上下文菜单\n\n如果我们选择 **Find Node** 菜单项，执行计划的右上角会出现一个新界面，类似于图 7-16。\n\
  \n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig16_HTML.jpg](img/323849_5_En_7_Fig16_HTML.jpg)\n\
  \n**图 7-16**\nFind Node 界面\n\n左侧是所有运算符的所有属性。你可以选择要搜索的任何属性。然后选择一个运算符。图 7-16 中显示的默认是等于运算符。还有一个\
  \ `Contains` 运算符。最后，你输入一个值。单击向左或向右箭头将找到符合你条件的运算符。再次单击将移动到下一个运算符（如果有的话），使你能够处理大型而复杂的执行计划，而不必自己对每个运算符的属性进行目视搜索。\n\
  \n例如，我们可以查找任何引用了模式 `Product` 的运算符，如图 7-17 所示。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig17_HTML.jpg](img/323849_5_En_7_Fig17_HTML.jpg)\n\
  \n**图 7-17**\n查找任何 Schema 值包含 Product 的运算符\n\n单击向右箭头将带你到第一个引用 `Product` 模式的运算符。在示例中，它会先到\
  \ `SELECT` 运算符，然后是 `Adaptive Join` 运算符、`Filter` 运算符，接着是 `Index Scan` 和 `Index Seek`\
  \ 运算符。它唯一不会选择的运算符是 `Columnstore Index Scan`，因为它属于 `TransactionHistory` 模式。\n\n####\
  \ 比较计划\n\n有时你可能想知道两个执行计划之间的区别，特别是当这种区别在图形化计划中不易看出时。如果我们运行以下查询，它们的计划看起来基本是相同的：\n\n\
  ```\nSELECT p.Name,\nth.Quantity\nFROM dbo.TransactionHistory AS th\nJOIN Production.Product\
  \ AS p\nON p.ProductID = th.ProductID\nWHERE th.Quantity > 550;\nSELECT p.Name,\n\
  th.Quantity\nFROM dbo.TransactionHistory AS th\nJOIN Production.Product AS p\nON\
  \ p.ProductID = th.ProductID\nWHERE th.Quantity > 35000;\n```\n\n这些计划实际上存在一些明显的差异，但它们看起来又很相似。仅凭肉眼去精确比较它们的区别可能会导致很多错误。相反，我们可以在其中一个计划上`右键单击`，调出如`图\
  \ 7-15`所示的上下文菜单。使用顶部的选项将该计划保存到文件中。这是必要的步骤。然后，在另一个计划内`右键单击`，再次调出上下文菜单。选择`比较执行计划`选项。这将打开`SSMS`内的一个新窗口，看起来很像`图\
  \ 7-18`。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig18_HTML.png](img/323849_5_En_7_Fig18_HTML.png)\n\
  `图 7-18` `SSMS` 内的执行计划比较\n\n你看到的是相似但存在明显差异的计划。高亮为粉红色的区域是相同之处。计划中未高亮的部分（在此例中是 `SELECT`\
  \ 运算符）表示较大的差异。你可以使用屏幕底部的`语句`选项来控制高亮显示。\n\n此外，你还可以查看运算符的属性。`右键单击`其中一个运算符并选择`属性`菜单选项，将打开一个类似`图\
  \ 7-19`的窗口。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig19_HTML.jpg](img/323849_5_En_7_Fig19_HTML.jpg)\n\
  `图 7-19` 两个计划之间 `SELECT` 运算符的属性差异\n\n你可以看到，不匹配的属性上会有一个亮黄色的“不等于”符号。这让你能轻松地找到并查看两个执行计划之间的差异。\n\
  \n#### 场景分析\n\n最后，还有一个额外的新工具是 `Management Studio` 能够分析你的执行计划并指出其中可能存在的问题。这些分析被称为`场景`，列在`图\
  \ 7-18`所示屏幕的底部。要查看此功能的实际应用，`图 7-20`展示了该选项卡被选中且其中一个运算符被选中的状态。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig20_HTML.jpg](img/323849_5_En_7_Fig20_HTML.jpg)\n\
  `图 7-20` `执行计划分析`窗口中的不同`估计行数`场景\n\n目前 `Microsoft` 仅提供了一个场景，但到你阅读本书时，可能已有更多场景可用。我当前高亮显示的场景是`不同的估计行数`。这与列和索引上缺失、不正确或过时的统计信息这一常见问题直接相关。这是一个普遍问题，我们将在本书的多个章节中解决，特别是`第\
  \ [13] 章 (#323849_5_En_13_Chapter.xhtml)`。简而言之，当估计行数与实际行数存在差异时，可能会导致性能问题，因为生成的计划可能不适用于实际数据。\n\
  \n屏幕左侧是可能存在估计行数与实际行数差异的运算符。右侧是描述为何高亮显示此差异的说明。我们将在本书后面更详细地探讨这一点。\n\n当你使用 `XML STATISTICS`\
  \ 捕获计划，或者直接打开包含计划的文件时，也可以进入`分析`屏幕。目前，你无法在 `SSMS` 中捕获计划后直接进入`执行计划分析`屏幕。\n\n\n####\
  \ 实时执行计划\n\n其官方名称是**实时查询统计信息**，但你实际看到的将是**实时执行计划**。从 SQL Server 2014 开始引入的动态管理视图（DMV）`sys.dm_exec_query_profiles`，实际上让你能够实时观察执行计划操作，查看每个操作正在处理的行数。然而，在\
  \ SQL Server 2014 中，以及在其他版本的默认设置下，你必须捕获一个实际执行计划此功能才能工作。此外，查询需要运行一段时间才能看到效果。因此，这里有一个不带\
  \ `JOIN` 条件、会产生笛卡尔积的查询，它会花一点时间来完成：\n\n```sql\nSELECT *\nFROM sys.columns AS c,\n\
  sys.syscolumns AS s;\n```\n\n将此查询放入一个查询窗口，并在捕获实际执行计划的同时执行它。在它执行时，在第二个查询窗口中运行此查询：\n\
  \n```sql\nSELECT deqp.physical_operator_name,\ndeqp.node_id,\ndeqp.thread_id,\n\
  deqp.row_count,\ndeqp.rewind_count,\ndeqp.rebind_count\nFROM sys.dm_exec_query_profiles\
  \ AS deqp;\n```\n\n你将看到与图 7-21 类似的数据。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig21_HTML.png](img/323849_5_En_7_Fig21_HTML.png)\n\
  \n**图 7-21 来自正在执行查询的操作符行数统计**\n\n在问题查询执行期间，反复对 `sys.dm_exec_query_profiles` 运行查询。你会看到各种行计数持续增加。通过这种方法，你可以收集关于正在执行的查询的度量指标。\n\
  \n从 SQL Server Management Studio 2016 开始，有一种更简单的方法来查看这一过程。无需查询 DMV，你只需在包含问题查询的查询窗口中单击\
  \ `包含实时查询统计信息` 按钮。然后，当你执行查询时，视图将变为执行计划，但它会动态地向你显示行数在操作符之间流动的情况。图 7-22 显示了一个计划的部分内容。\n\
  \n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig22_HTML.jpg](img/323849_5_En_7_Fig22_HTML.jpg)\n\
  \n**图 7-22 显示行在操作符之间移动的实时执行计划**\n\n除了通常显示操作符之间数据流的箭头外，你现在会看到移动的虚线（显然，在书籍中不可见）。随着操作完成，虚线会变为实线，就像它们在常规执行计划中的表现一样。\n\
  \n这是理解长时间运行查询情况的一个有用工具，但如果查询已经在执行（例如在生产服务器上），捕获实时执行计划的要求并不方便。此外，捕获实时执行计划虽然有用，但并非没有成本。因此，在\
  \ SQL Server 2016 SP1 中引入并在所有其他版本的 SQL Server 中可用的是一个新的跟踪标志 `7412`。启用该跟踪标志可以按需查看实时查询统计信息（即实时执行计划）。你还可以创建一个扩展事件会话并使用\
  \ `query_thread_profile` 事件（下一节将详细介绍）。当该会话正在运行或跟踪标志已启用时，你可以在任何时间从 `sys.dm_exec_query_profiles`\
  \ 获取信息或查看任何查询的实时执行计划。为了实际查看效果，让我们首先在我们的系统上启用该跟踪标志。\n\n```sql\nDBCC TRACEON(7412);\n\
  ```\n\n启用后，我们将再次运行问题查询。有一个我并不常用的工具，但在此功能加入后变得更具吸引力，那就是 `活动监视器`。它是一种查看系统上活动情况的方法。你可以通过在对象资源管理器窗口中右键单击服务器，然后从上下文菜单中选择\
  \ `活动监视器` 来访问它。启用跟踪标志并执行问题查询后，我系统上的 `活动监视器` 如图 7-23 所示。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig23_HTML.jpg](img/323849_5_En_7_Fig23_HTML.jpg)\n\
  \n**图 7-23 活动监视器显示“活动的高开销查询”**\n\n你需要单击 `活动的高开销查询` 才能看到正在运行的查询。然后，你可以右键单击该查询，如果查询正在主动执行，则可以选择\
  \ `显示实时执行计划`。\n\n不幸的是，所有这些的命名有些不一致。原始 DMV 称为查询配置文件，而 SSMS 中的查询窗口使用查询统计信息，DMV 使用线程配置文件，然后\
  \ `活动监视器` 又谈论实时执行计划。它们基本上含义相同：一种观察主动执行查询中操作行为的方法。有了无需先主动捕获执行计划即可立即访问此信息的新能力，原本算是有趣新奇事物的东西已经变成了一个极其有用的工具。你可以精确地看到是哪些操作拖慢了长时间运行的查询。\n\
  \n#### 查询线程配置文件\n\n前文提到，新的扩展事件 `query_thread_profile` 为系统增添了新功能。此事件是一个调试事件。如第 6\
  \ 章所述，应谨慎使用调试事件。然而，微软确实提倡使用此事件。运行它将允许你查看长时间运行查询的实时执行计划。但它做的不止于此。它还在计划执行结束时捕获执行计划内所有操作符的行数和线程计数。这是一种成本非常低且简便的方法来捕获这些指标，特别是对于运行速度快的查询，你永远无法在实时执行计划中真正看到它们的活动行计数。这些是你在执行计划中可以获得的数据，但这比捕获计划的成本要低得多。以下是一个创建会话的脚本，用于捕获查询线程配置文件以及核心查询指标：\n\
  \n```sql\nCREATE EVENT SESSION QueryThreadProfile\nON SERVER\nADD EVENT sqlserver.query_thread_profile\n\
  (WHERE (sqlserver.database_name = N'AdventureWorks2017')),\nADD EVENT sqlserver.sql_batch_completed\n\
  (WHERE (sqlserver.database_name = N'AdventureWorks2017'))\nWITH (TRACK_CAUSALITY\
  \ = ON)\nGO\n```\n\n在此会话运行时，如果你运行一个小查询，例如我们在“执行计划工具”部分开头使用的那个，输出如图 7-24 所示。\n\n\
  ![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig24_HTML.jpg](img/323849_5_En_7_Fig24_HTML.jpg)\n\
  \n**图 7-24 显示 query_thread_profile 信息的扩展事件会话**\n\n你可以看到事件的详细信息，包括估计行数、实际行数以及许多我们经常在评估统计信息和索引使用情况等时转向执行计划的信息。你现在可以动态地捕获查询的这些信息，而无需经历成本高昂得多的捕获执行计划的过程。请记住，这不是一个零成本的操作。它只是一个成本较低的操作。它也不会取代执行计划的所有用途，因为执行计划显示的内容远不止线程、持续时间和行数。\n\
  \n\n\n## 查询资源成本\n\n尽管查询的执行计划提供了详细的处理策略和涉及各步骤的估计相对成本，但如果这是一个估计计划，它并不会提供查询在 CPU 使用率、磁盘读写或查询持续时间方面的实际成本。在优化查询时，您可能会添加索引来降低某一步骤的相对成本。这可能对执行计划中依赖的步骤产生不利影响，有时甚至会修改执行计划本身。因此，如果只查看估计的执行计划，您无法确定查询优化是使整个查询受益，而不仅仅是执行计划中的那一个步骤。您可以通过不同方式分析查询的总体成本。\n\
  \n在优化查询时，您应监控其总体成本。如前所述，您可以使用扩展事件来监控查询的 `duration`、`cpu`、`reads` 和 `writes` 信息。扩展事件是一种极其高效的指标收集机制。您应该计划利用这一事实，并使用此机制来收集查询性能指标。只是需要理解，收集这些信息会产生大量数据，您需要在系统内找到地方来维护它们。\n\
  \n还有其他收集性能数据的方法，它们比扩展事件更直接、更易于访问。除了我接下来详述的方法外，别忘了我们还有 DMO，如 `sys.dm_exec_query_stats`\
  \ 和 `sys.dm_exec_procedure_stats`，以及查询存储系统视图和报告，`sys.query_store_runtime_stats`\
  \ 和 `sys.query_store_wait_stats`。\n\n### 客户端统计信息\n\n客户端统计信息从您的计算机作为服务器客户端的角度捕获执行信息。这意味着记录的任何时间都包括通过网络传输数据所需的时间，而不仅仅是\
  \ SQL Server 机器上的处理时间。要使用它们，只需选择“查询”➤“包含客户端统计信息”。现在，每次运行查询时，都会收集一组有限的数据，包括执行时间、受影响的行数、到服务器的往返次数等。此外，每次查询执行都会在“客户端统计信息”选项卡上单独显示，并且有一个汇总多次执行的列会显示所收集数据的平均值。统计信息还会显示某个时间或计数是否在连续运行之间发生了变化，以箭头形式显示，如图\
  \ 7-13 所示。例如，考虑以下查询：\n\n```sql\nSELECT TOP 100\np.Name,\np.ProductNumber\nFROM Production.Product\
  \ p;\n```\n\n该查询的客户端统计信息应类似于图 7-25 所示的内容。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig25_HTML.jpg](img/323849_5_En_7_Fig25_HTML.jpg)\n\
  \n图 7-25\n客户端统计信息\n\n尽管捕获客户端统计信息是一种有用的数据收集方式，但它是一组有限的数据，并且无法显示一次执行与另一次执行有何不同。您甚至可以运行一个完全不同的查询，其数据也会与其他查询混合在一起，使得平均值变得毫无用处。如果需要，您可以重置客户端统计信息。选择“查询”菜单，然后选择“重置客户端统计信息”菜单项。\n\
  \n### 执行时间\n\n`持续时间`和 `CPU` 都代表查询的时间因素。要获取有关解析、编译和执行查询所需时间（以毫秒为单位）的详细信息，请按如下方式使用\
  \ `SET STATISTICS TIME`：\n\n```sql\nSET STATISTICS TIME ON;\nGO\nSELECT soh.AccountNumber,\n\
  sod.LineTotal,\nsod.OrderQty,\nsod.UnitPrice,\np.Name\nFROM Sales.SalesOrderHeader\
  \ soh\nJOIN Sales.SalesOrderDetail sod\nON soh.SalesOrderID = sod.SalesOrderID\n\
  JOIN Production.Product p\nON sod.ProductID = p.ProductID\nWHERE sod.LineTotal >\
  \ 1000;\nGO\nSET STATISTICS TIME OFF;\nGO\n```\n\n上述 `SELECT` 语句的 `STATISTICS TIME`\
  \ 输出如下所示：\n\n```sql\nSQL Server parse and compile time:\nCPU time = 0 ms, elapsed\
  \ time = 9 ms.\n(32101 row(s) affected)\nSQL Server Execution Times:\nCPU time =\
  \ 156 ms,  elapsed time = 400 ms.\nSQL Server parse and compile time:\nCPU time\
  \ = 0 ms, elapsed time = 0 ms.\n```\n\n执行时间中的 `CPU time = 156 ms` 部分代表扩展事件提供的 CPU\
  \ 值。类似地，相应的 `Elapsed time = 400 ms` 代表其他机制提供的持续时间值。\n\n0 毫秒的解析时间和 9 毫秒的编译时间意味着优化器必须先解析查询以检查语法，然后编译它以生成执行计划。\n\
  \n\n##### STATISTICS IO\n\n如本章前面“识别高成本查询”部分所讨论的，`Reads`列中的读取次数通常是`duration`、`cpu`、`reads`和`writes`这些指标中最显著的成本因素。查询执行的总读取次数是所有涉及表的读取次数之和。单个表上的读取次数可能差异很大，这取决于从该表请求的结果集大小以及可用的索引。\n\
  \n为了减少总读取次数，找出查询中访问的所有表及其对应的读取次数是很有用的。这些详细信息有助于你集中优化那些读取次数较多的表的数据访问。每个表的读取次数也有助于你评估针对一个表进行的优化步骤对查询中引用的其他表的影响。\n\
  \n在一个简单的查询中，你可以通过仔细查看查询来确定访问的单个表。随着查询变得越来越复杂，这会变得越来越困难。对于存储过程、数据库视图或函数，识别优化器实际访问的所有表就变得更加困难。你可以使用`STATISTICS\
  \ IO`来获取这些信息，无论查询复杂度如何。\n\n要开启`STATISTICS IO`，请在 Management Studio 中导航到 查询 ➤ 查询选项\
  \ ➤ 高级 ➤ 设置 STATISTICS IO。你也可以通过以下方式以编程方式获取此信息：\n\n```\nSET STATISTICS IO ON;\n\
  GO\nSELECT soh.AccountNumber,\nsod.LineTotal,\nsod.OrderQty,\nsod.UnitPrice,\np.Name\n\
  FROM Sales.SalesOrderHeader soh\nJOIN Sales.SalesOrderDetail sod\nON soh.SalesOrderID\
  \ = sod.SalesOrderID\nJOIN Production.Product p\nON sod.ProductID = p.ProductID\n\
  WHERE sod.SalesOrderID = 71856;\nGO\nSET STATISTICS IO OFF;\nGO\n```\n\n如果你运行此查询并查看其执行计划，它包含三个聚集索引查找和两个循环联接。如果删除`WHERE`子句并再次运行查询，你会得到一组扫描和一些哈希联接。这是一个有趣的事实——但你不知道它如何影响查询的\
  \ I/O 使用情况！你可以像前面所示使用`SET STATISTICS IO`来比较优化器使用的两种处理策略之间的查询成本（以逻辑读取为度量）。\n\n当查询使用哈希联接时，你会得到如下的`STATISTICS\
  \ IO`输出：\n\n```\n(121317 row(s) affected)\nTable 'Workfile'. Scan count 0, logical\
  \ reads 0...\nTable 'Worktable'. Scan count 0, logical reads 0...\nTable 'SalesOrderDetail'.\
  \ Scan count 1, logical reads 1248...\nTable 'SalesOrderHeader'. Scan count 1, logical\
  \ reads 689...\nTable 'Product'. Scan count 1, logical reads 6...\n(1 row(s) affected)\n\
  ```\n\n现在，当你重新添加`WHERE`子句以适当地过滤数据时，最终的`STATISTICS IO`输出如下：\n\n```\n(2 row(s) affected)\n\
  Table 'Product'. Scan count 0, logical reads 4...\nTable 'SalesOrderDetail'. Scan\
  \ count 1, logical reads 3...\nTable 'SalesOrderHeader'. Scan count 0, logical reads\
  \ 3...\n(1 row(s) affected)\n```\n\n`SalesOrderDetail`表的逻辑读取次数从 1,248 减少到 3，这得益于索引查找和循环联接。这也并未显著影响`Product`表的数据检索成本。\n\
  \n在解释`STATISTICS IO`的输出时，你主要参考逻辑读取的次数。当数据不在内存中时，物理读取和预读读取的次数可能不为零，但一旦数据被填充到内存中，物理读取和预读读取的次数往往趋于零。\n\
  \n了解查询使用的所有表及其对应的读取次数还有另一个优势。即使表模式（包括索引）或数据没有变化，重新执行相同的查询时，`duration`和`CPU`值也可能波动很大，因为\
  \ SQL Server 机器上运行的基本服务和后台应用程序会影响被观察查询的处理时间。但是，不要忘记逻辑读取并不总是最准确的度量标准。持续时间和 CPU 绝对是有用的，并且是任何查询调优的重要组成部分。\n\
  \n在优化步骤中，你需要一个不波动的成本数字作为参考。对于具有固定表模式和数据的查询，其读取次数（或逻辑读取）在多次执行之间不会变化。例如，如果你执行前面的`SELECT`语句十次，你可能会得到十个不同的`duration`和`CPU`数值，但`Reads`每次都会保持不变。因此，在优化过程中，你可以参考单个表的读取次数，以确保你确实降低了该表的数据访问成本。只是永远不要假设这是你唯一的度量标准，甚至不是主要的。它只是一个恒定的度量标准，因此很有用。\n\
  \n即使逻辑读取次数也可以从扩展事件中获得，但使用`STATISTICS IO`时你还能获得另一个好处。由 Profiler 或 Server Trace 选项显示的查询逻辑读取次数，会随着你将不同的`SET`语句（前文提到的）与查询一起使用而增加。但由`STATISTICS\
  \ IO`显示的逻辑读取次数不包括因使用`SET`语句而访问的额外页面。因此，`STATISTICS IO`提供了一个逻辑读取次数的一致数字。\n\n### Actual\
  \ Execution Plans\n\n如本章前面所述，实际执行计划现在会在执行计划本身内捕获并显示一些查询性能指标以及传统指标。如果我们打开前一个查询（不含`WHERE`子句的那个）和计划的`SELECT`运算符，图\
  \ 7-26 显示了`QueryTimeStats`和`WaitStats`的值。\n\n![../images/323849_5_En_7_Chapter/323849_5_En_7_Fig26_HTML.jpg](img/323849_5_En_7_Fig26_HTML.jpg)\n\
  \n图 7-26\n\n*实际执行计划内的 QueryTimeStats 和 WaitStats*\n\n只要捕获的是实际执行计划，你现在就可以直接在执行计划中看到查询的`CpuTime`和`ElapsedTime`。这些值以毫秒为单位测量。你还可以看到查询的一个或多个主要等待。在图\
  \ 7-26 示例中是`ASYNC_NETWORK_IO`，可能因为我们正在通过网络返回 121,000 行数据。等待统计信息仅在等待时间超过 1 毫秒时才会显示。这确实导致执行计划内显示的等待信息不如其他捕获等待的机制准确。然而，这是一个方便的工具，有助于在执行计划内评估查询行为。\n\
  \n这为你提供了另一种快速简便地查看查询性能的方法。如果你查看其他运算符之一，你还可以看到该运算符的 I/O，以页面为单位测量。\n\n\n## 总结\n\n\
  在本章中，你了解到可以使用扩展事件来识别 SQL 工作负载中对系统资源造成巨大压力的查询。会话数据的收集可以并且应该使用系统存储过程来实现自动化。若要即时访问正在运行的查询的统计信息，请使用动态视图\
  \ `sys.dm_exec_query_stats`。你可以使用 Management Studio 进一步分析这些查询，以找出查询处理策略中代价高昂的步骤。为了获得更好的性能，在分析查询时，考虑执行计划中使用的索引和连接机制非常重要。通过\
  \ `SET STATISTICS IO` 提供的各个表的数据检索（或读取）次数有助于将注意力集中在读取次数最多的表的数据访问机制上。你还应该关注代价最高的查询的\
  \ CPU 开销和总耗时。\n\n一旦你识别出一个代价高昂的查询并完成了初步分析，下一步就应该是针对性能优化该查询。由于索引是最常用的性能调优技术之一，下一章我将深入讨论\
  \ SQL Server 中可用的各种索引机制。\n\n"
- '# 8. 索引架构与行为


  在正确的列（或列组合）上创建正确的索引，是查询调优的起点。缺失索引或在错误的列（或列组合）上创建索引，可能成为所有性能问题的根源——从基本的数据访问开始，经过连接，最终到筛选子句。因此，对每个人（而不仅仅是
  DBA）来说，理解可用于优化数据库设计的不同索引技术都极其重要。


  在本章中，我将涵盖以下主题：


  *   什么是索引

  *   索引的益处与开销

  *   索引设计的一般建议

  *   聚集索引与非聚集索引的行为及比较

  *   对聚集索引和非聚集索引的建议


  ## 什么是索引？


  减少磁盘 I/O 的最佳方法之一是使用索引。索引允许 SQL Server 无需扫描整个表即可在表中查找数据。数据库中的索引类似于书籍的索引。例如，假设你想在本书中查找
  `table scan`（表扫描）这个短语。在纸质版本中，如果没有书末的索引，你就必须翻阅整本书才能找到所需的内容。有了索引，你就能确切知道所需信息存储的位置。


  在为数据库性能进行调优时，你会在查询所使用的不同列上创建索引，以帮助 SQL Server 快速查找数据。例如，针对 `Production.Product`
  表的以下查询会产生如图 8-1 所示的数据（500+ 行中的前 10 行）：


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig1_HTML.jpg](img/323849_5_En_8_Fig1_HTML.jpg)


  图 8-1 示例 Production.Product 表


  ```sql

  SELECT TOP 10

  p.ProductID,

  p.[Name],

  p.StandardCost,

  p.[Weight],

  ROW_NUMBER() OVER (ORDER BY p.Name DESC) AS RowNumber

  FROM Production.Product p

  ORDER BY p.Name DESC;

  ```


  上述查询扫描了整个表，因为没有 `WHERE` 子句。如果你需要通过 `WHERE` 子句添加筛选条件来检索所有 `StandardCost` 大于 150 的产品，在没有索引的情况下，表仍然需要被扫描，逐行检查
  `StandardCost` 的值以确定哪些行的值大于 150。在 `StandardCost` 列上创建索引可以通过提供一种允许对数据进行结构化搜索而非逐行检查的机制来加速此过程。你可以采用两种不同且基本的方法来创建此索引。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig2_HTML.jpg](img/323849_5_En_8_Fig2_HTML.jpg)


  图 8-2 按 StandardCost 排序的产品表


  *   *像字典一样*：字典是按字母顺序排列的单词列表。索引可以以类似的方式存储。数据是有序的，尽管仍可能存在重复项。前 10 行数据，按 `StandardCost
  DESC` 而不是按 `Name` 排序，将如图 8-2 所示。注意 `RowNumber` 列显示了按 `Name` 排序时行的原始位置。


  因此，如果你想查找所有 `StandardCost` 大于 150 的行中的数据，索引将允许你立即找到它们，只需移动到第一个大于 150 的值即可。一种根据索引键顺序对存储的数据应用顺序的索引被称为
  `聚集索引`。由于 SQL Server 存储数据的方式，这是数据库设计中最重要的索引之一。我将在本章后面详细解释这一点。


  表 8-1 Manufacturer 索引的结构


  | StandardCost | RowNumber |

  | --- | --- |

  | 2171.2942 | 125 |

  | 2171.2942 | 126 |

  | 2171.2942 | 127 |

  | 2171.2942 | 128 |

  | 2171.2942 | 129 |

  | 1912.1544 | 170 |


  *   *像书籍的索引架构一样*：可以在不改变表布局的情况下创建一个有序列表，类似于书籍索引的创建方式。就像书籍的关键词索引在一个单独的部分列出关键词，并带有页码指向书籍的主体内容一样，`StandardCost`
  值的列表被创建为一个独立的结构，并通过一个指针指向 `Product` 表中对应的行。在这个例子中，我将使用 `RowNumber` 作为指针。表 8-1 显示了
  Manufacturer 索引的结构。


  SQL Server 可以扫描 Manufacturer 索引来查找 `StandardCost` 大于 150 的行。由于 `StandardCost` 值按排序顺序排列，SQL
  Server 一旦遇到值为 150 或更小的行就可以停止扫描。这种类型的索引称为 `非聚集索引`，我将在本章后面详细解释。


  在任何一种情况下，在大多数情况下，SQL Server 都能够比没有索引时更快地找到所有 `StandardCost` 大于 150 的产品。


  你可以在表的单个列（如前所述）或列的组合上创建索引。SQL Server 还会自动为某些类型的约束（例如，`PRIMARY KEY` 和 `UNIQUE` 约束）创建索引。




  '
- "# 索引的好处\n\n即使表上没有索引，SQL Server 也必须能够查找数据。当没有聚集索引来为数据建立存储顺序时，存储引擎将简单地读取整个表来查找所需内容。没有聚集索引的表称为\
  \ `heap table`（堆表）。堆只是一个无序的数据堆栈，带有一个指向存储位置的行标识符。除了通过逐行扫描数据（这一过程称为 `scan`）外，这些数据无法排序或搜索。当在表上创建聚集索引时，索引的键值为数据建立了顺序。此外，有了聚集索引，数据与索引一起存储，因此数据本身现在是有序的。当存在聚集索引时，非聚集索引上的指针由定义聚集索引键的值组成。这是聚集索引如此重要的一大原因。\n\
  \nSQL Server 中的数据存储在大小为 8KB 的页面上。页面是信息从磁盘移入内存的最小单位，因此一个页面能存储多少数据变得很重要。由于页面空间有限，如果行包含的列数较少或列的尺寸较小，它就能存储更多的行。非聚集索引通常不（也不应该）包含表的所有列；它通常只包含有限的列。因此，一个页面将能够存储非聚集索引的更多行，而非聚集索引所对应的表行包含所有列。因此，对于代表该列的非聚集索引的页面，SQL\
  \ Server 能够从中读取的该列值数量，将比从包含该列的表页面读取的更多。\n\n非聚集索引的另一个好处是，由于它与数据表是分开的结构，可以将其放在不同的文件组中，使用不同的\
  \ I/O 路径（如第 3 章所述）。这意味着 SQL Server 可以同时访问索引和表，从而使搜索速度更快。\n\n索引将其信息存储在称为 `B-tree`（B\
  \ 树）结构的平衡树中，因此定位特定行所需的读取次数被最小化。以下示例展示了 B 树结构的好处。\n\n考虑一个包含 27 行、随机排序且每个叶级页面只有 3\
  \ 行的单列表。假设页面中行的布局如图 8-3 所示。\n\n![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig3_HTML.jpg](img/323849_5_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3 27 行的初始布局\n\n要搜索列值为 5 的行，SQL Server 必须扫描所有行和页面，因为即使最后一页的最后一行也可能具有值 5。因为读取次数取决于访问的页面数，所以在该列上没有索引的情况下，必须执行九次读取操作（从磁盘检索页面并将其传输到内存）。可以通过在该列上创建索引来使这些内容有序，结果行的布局和页面如图\
  \ 8-4 所示。\n\n![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig4_HTML.jpg](img/323849_5_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4 27 行的有序布局\n\n对列进行索引会使内容按排序方式排列。这使得 SQL Server 能够根据列中一个行位置的值，确定另一个行位置可能的值。例如，在图\
  \ 8-4 中，当 SQL Server 找到第一个列值为 6 的行时，它可以确定不再有列值为 5 的行。因此，当内容被索引时，只需要两次读取操作就可以获取值为\
  \ 5 的行。但是，如果要搜索列值 25 呢？这将需要九次读取操作！通过使用 B 树结构（如图 8-5 所示）实现索引，可以解决这个问题。\n\n![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig5_HTML.jpg](img/323849_5_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5 27 行的 B 树布局\n\nB 树由一个称为 `root node`（根节点）的起始节点（或页面）组成，`branch nodes`（分支节点）（或页面）从中生长出来（或与之链接）。所有键都存储在叶子中。每个内部节点（叶节点之上）都包含指向其分支节点的指针，以及表示在分支节点中找到的最小值的值。键在每个节点内按排序顺序保持。B\
  \ 树使用平衡树结构进行高效的记录检索——当所有叶节点距离根节点的层级相同时，B 树是平衡的。例如，在前面的内容上创建索引将生成如图 8-5 所示的平衡 B 树结构。在底层，所有叶节点通过一个双向链表相互连接，意味着每个页面指向其后的页面，而其后的页面又指向前一个页面。这可以防止在遍历页面超出中间页面的定义范围时，需要回溯链。\n\
  \nB 算法最小化了定位所需键所需访问的页面数，从而加快了数据访问过程。例如，在图 8-5 中，搜索键值 5 从顶部的根节点开始。由于键值在 1 和 10 之间，搜索过程沿着左侧分支进入下一个节点。因为键值\
  \ 5 介于值 4 和 7 之间，搜索过程沿着中间分支进入下一个起始键值为 4 的节点。搜索过程从这个叶页面检索到键值 5。如果此页面中不存在键值 5，搜索过程将停止，因为它是叶页面。同样，搜索键值\
  \ 25 也可以使用相同的读取次数完成。\n\n\n\n### 索引开销\n\n索引带来的性能提升确实伴随着一定的代价。带有索引的表除了需要存储表的数据页外，还需要额外的存储空间和内存来存放索引页。数据操作查询（`INSERT`、`UPDATE`\
  \ 和 `DELETE` 语句，即增删改查 [CRUD] 中的增、改、删部分）可能会耗时更长，并且需要更多的处理时间来维护频繁变化表的索引。这是因为，与 `SELECT`\
  \ 语句不同，数据操作查询会修改表的数据内容。如果 `INSERT` 语句向表中添加一行，那么它也必须在索引结构中添加一行。如果索引是聚集索引，开销会更大，因为这一行必须按正确的顺序添加到数据页本身中，这可能需要重新定位其他数据行在新行插入位置之后。`UPDATE`\
  \ 和 `DELETE` 数据操作查询以类似的方式更改索引页。\n\n在设计索引时，你将从两个不同的角度进行操作：一是已投入生产的现有系统，此时你需要衡量索引的整体影响；二是战术性方法，通常在初始设计系统时，你只关心索引的即时收益。当你处理现有系统时，应确保索引的性能收益超过其消耗的额外处理资源成本。你可以使用扩展事件（在第\
  \ 3 章中解释）进行整体工作负载优化（在第 27 章中解释）来实现这一点。当你只关注索引的即时收益时，SQL Server 提供了一系列动态管理视图，这些视图提供了有关索引性能的详细信息，例如\
  \ `sys.dm_db_index_operational_stats` 或 `sys.dm_db_index_usage_stats`。视图 `sys.dm_db_index_operational_stats`\
  \ 显示正在使用的索引上的低级别活动，如锁和 I/O。视图 `sys.dm_db_index_usage_stats` 返回随时间推移在索引上发生的各种索引操作的统计计数。在讨论阻塞的第\
  \ 21 章中，我们将更广泛地使用这两个视图。\n\n### 注意\n\n在本书的某些部分，我对正在运行的查询使用了 `STATISTICS IO` 和 `STATISTICS\
  \ TIME` 测量。你可以向代码中添加 `SET` 命令，也可以更改查询窗口的连接设置。我建议只更改连接设置。然而，这里也应该有一个警告。同时使用 `STATISTICS\
  \ IO` 和 `STATISTICS TIME` 有时会导致问题。检索 I/O 信息所花费的时间会被计入 `STATISTICS TIME` 信息中，从而扭曲结果。如果你不需要表级\
  \ I/O，最好使用扩展事件来捕获执行指标。如果你正在捕获查询的实际执行计划，也可以从其中获取 `CpuTime` 和 `ElapsedTime`。\n\n为了理解索引对数据操作查询的开销成本，请考虑以下示例。首先，创建一个包含\
  \ 10,000 行的测试表。\n\n```\nDROP TABLE IF EXISTS dbo.Test1;\nGO\nCREATE TABLE dbo.Test1\n\
  (\nC1 INT,\nC2 INT,\nC3 VARCHAR(50)\n);\nWITH Nums\nAS (SELECT TOP (10000)\nROW_NUMBER()\
  \ OVER (ORDER BY (SELECT 1)) AS n\nFROM master.sys.all_columns ac1\nCROSS JOIN master.sys.all_columns\
  \ ac2\n)\nINSERT INTO dbo.Test1\n(\nC1,\nC2,\nC3\n)\nSELECT n,\nn,\n'C3'\nFROM Nums;\n\
  ```\n\n运行一个 `UPDATE` 语句，如下所示：\n\n```\nUPDATE dbo.Test1\nSET C1 = 1,\nC2 = 1\nWHERE\
  \ C2 = 1;\n```\n\n然后，`SET STATISTICS I0` 报告的逻辑读次数如下：\n\n```\nTable 'Test1'. Scan\
  \ count 1, logical reads 29\n```\n\n在列 `C1` 上添加一个索引，如下所示：\n\n```\nCREATE CLUSTERED\
  \ INDEX iTest\nON dbo.Test1(C1);\n```\n\n那么，对于同一个 `UPDATE` 语句，逻辑读次数从 29 增加到 38，同时还增加了一个临时工作表，额外产生了\
  \ 5 次读取，总计 43 次。\n\n```\nTable 'Test1'. Scan count 1, logical reads 38\nTable 'Worktable'.\
  \ Scan count 1, logical reads 5\n```\n\n读取次数增加是因为有必要重新排列数据，以便在聚集索引中按正确的顺序存储，这比堆表仅仅将数据添加到现有存储末尾所需的读取次数要多。\n\
  \n### 注意\n\n`worktable`（工作表）是 SQL Server 内部用于处理查询中间结果的临时表。工作表在 `tempdb` 数据库中创建，并在查询执行后自动删除。\n\
  \n尽管维护索引所需的开销量确实会增加数据操作查询的成本，但请注意，SQL Server 必须首先找到一行才能更新或删除它；因此，对于带有必要 `WHERE`\
  \ 子句的 `UPDATE` 和 `DELETE` 语句，索引仍然是有帮助的。使用索引定位行的效率提升通常可以抵消更新索引所需的额外开销，除非表有大量的索引或大量的更新操作。此外，绝大多数系统都是读取密集型的，这意味着检索的数据量远大于插入或修改的数据量。\n\
  \n为了理解索引如何有益于甚至数据修改查询，让我们在示例的基础上继续。在表 `Test1` 上创建另一个索引。这次，在 `UPDATE` 语句的 `WHERE`\
  \ 子句中引用的列 `C2` 上创建索引。\n\n```\nCREATE NONCLUSTERED INDEX iTest2\nON dbo.Test1(C2);\n\
  ```\n\n添加这个新索引后，再次运行 `UPDATE` 命令。\n\n```\nUPDATE  dbo.Test1\nSET     C1 = 1,\nC2\
  \ = 1\nWHERE   C2 = 1;\n```\n\n该 `UPDATE` 语句的总逻辑读次数从 43 减少到 20 (= 15 + 5)。\n\n```\n\
  Table 'Test1'. Scan count 1, logical reads 15\nTable 'Worktable'. Scan count 1,\
  \ logical reads 5\n```\n\n本节中的示例表明，尽管拥有索引会给操作查询增加一些开销成本，但由于索引对搜索的有益影响，整体结果可能是成本的降低，即使在更新期间也是如此。\n\
  \n## 索引设计建议\n\n索引设计的主要建议如下：\n\n*   检查 `WHERE` 子句和 `JOIN` 条件列。\n*   使用窄索引。\n*   检查列的唯一性和选择性。\n\
  *   检查列数据类型。\n*   考虑列顺序。\n*   考虑索引类型（聚集索引与非聚集索引）。\n\n让我们依次考虑这些建议。\n\n### 检查 WHERE\
  \ 子句和 JOIN 条件列\n\n当查询提交给 SQL Server 时，查询优化器会尝试为查询中引用的每个表找到最佳的数据访问机制。以下是它的工作方式：\n\
  \n1.  优化器识别 `WHERE` 子句和 `JOIN` 条件中包含的列。谓词是评估为真、假或未知的逻辑条件。它们包括 `IN` 或 `BETWEEN` 之类的内容。\n\
  2.  然后优化器检查这些列上的索引。\n3.  优化器通过确定子句的选择性（即，将返回多少行）来评估每个索引的有用性，选择性是基于维护的索引统计信息计算的。\n\
  4.  约束（如主键和外键）也会被评估并由优化器用来确定查询中使用对象的选择性。\n5.  最后，优化器基于先前步骤收集的信息，估算出检索合格行的成本最低的方法。\n\
  \n\n\n### 第 8 章：查询优化与索引\n\n第 13 章更深入地涵盖了统计信息。\n\n要理解查询中 `WHERE` 子句列的重要性，让我们考虑一个示例。回到那个帮助你理解索引是什么的原始代码清单；该查询由一个没有任何\
  \ `WHERE` 子句的 `SELECT` 语句组成，如下所示：\n\n```sql\nSELECT p.ProductID,\n       p.Name,\n\
  \       p.StandardCost,\n       p.Weight\nFROM Production.Product p;\n```\n\n查询优化器执行聚集索引扫描，这相当于对具有聚集索引的表上的堆进行表扫描，以读取行，如图\
  \ 8-6 所示（在查询窗口中按 `Ctrl+M` 打开“包括实际执行计划”选项，并通过右键单击、选择“查询选项”，然后在“高级”选项卡上选择相应的复选框来打开“设置统计\
  \ IO”选项）。\n\n![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig6_HTML.jpg](img/323849_5_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6 不带 WHERE 子句的执行计划\n\n由 `SET STATISTICS IO` 报告的该 `SELECT` 语句的逻辑读取次数如下：\n\n\
  ```text\nTable 'Product'. Scan count 1, logical reads 15\n```\n\n> **注意**\n> 捕获执行计划会影响你使用几乎所有方法收集的任何时间指标。因此，在真正需要测量时间时，请记住关闭执行计划捕获。\n\
  \n为了理解 `WHERE` 子句列对查询优化器决策的影响，让我们添加一个 `WHERE` 子句来检索单行。\n\n```sql\nSELECT p.ProductID,\n\
  \       p.Name,\n       p.StandardCost,\n       p.Weight\nFROM Production.Product\
  \ AS p\nWHERE p.ProductID = 738;\n```\n\n有了 `WHERE` 子句后，查询优化器会检查 `WHERE` 子句列 `ProductID`，确认列\
  \ `ProductID` 上存在索引 `PK_Product_ProductId`，根据索引 `PK_Product_ProductId` 的统计信息评估该\
  \ `WHERE` 子句具有高选择性（即只返回一行），并决定使用该索引来检索数据，如图 8-7 所示。\n\n![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig7_HTML.jpg](img/323849_5_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7 带 WHERE 子句的执行计划\n\n由此产生的逻辑读取次数如下：\n\n```text\nTable 'Product'. Scan count\
  \ 0, logical reads 2\n```\n\n查询优化器的行为表明，`WHERE` 子句列有助于优化器为查询选择最佳的索引操作。这也适用于两个表之间\
  \ `JOIN` 条件中使用的列。优化器会查找 `WHERE` 子句列或 `JOIN` 条件列上的索引，如果可用，则考虑使用该索引从表中检索行。查询优化器在执行查询时会考虑\
  \ `WHERE` 子句列和 `JOIN` 条件列上的索引。因此，在 SQL 查询的 `WHERE` 子句、`HAVING` 子句和 `JOIN` 条件中频繁使用的列上创建索引，有助于优化器避免扫描基表。\n\
  \n当表内的数据量非常小，以至于可以放入单个页面（8KB）时，表扫描可能比索引查找效果更好。如果你有一个很好的索引，但仍然得到扫描结果，请考虑这种效应。\n\n\
  ### 使用窄索引\n\n为了获得最佳性能，在创建索引时应使用尽可能窄（即小）的数据类型。“窄”在这里的含义是尽可能小的数据类型。你还应该避免在索引中使用非常宽的数据类型列。具有字符串数据类型（`CHAR`、`VARCHAR`、`NCHAR`\
  \ 和 `NVARCHAR`）的列有时可能相当宽，二进制和全局唯一标识符（GUID）也是如此。除非绝对必要，否则应尽量减少在索引中使用具有大长度的宽数据类型列。你可以在表的多个列组合上创建索引。为了获得最佳性能，索引中应使用尽可能少的列。但是，应使用你需要使用的列来为索引定义一个有用的键。\n\
  \n窄索引比宽索引在 8KB 的索引页中能容纳更多的行。这有以下效果：\n\n*   减少 I/O（因为需要读取的 8KB 页面更少）\n*   使数据库缓存更有效，因为\
  \ SQL Server 可以缓存更少的索引页，从而减少内存中索引页所需的逻辑读取\n*   减少数据库的存储空间\n\n为了理解窄索引如何减少逻辑读取次数，创建一个包含\
  \ 20 行和一个索引的测试表。\n\n```sql\nDROP TABLE IF EXISTS dbo.Test1;\nGO\nCREATE TABLE dbo.Test1\
  \ (C1 INT, C2 INT);\nWITH    Nums\n        AS (SELECT    1 AS n\n            UNION\
  \ ALL\n            SELECT    n + 1\n            FROM      Nums\n            WHERE\
  \     n < 20\n           )\nINSERT  INTO dbo.Test1\n        (C1, C2)\n        SELECT\
  \  n, n\n        FROM    Nums;\nCREATE INDEX iTest ON dbo.Test1(C1);\n```\n\n由于索引列很窄（`INT`\
  \ 数据类型为 4 字节），所有的索引行都可以容纳在一个 8KB 的索引页中。如图 8-8 所示，你可以在与索引关联的动态管理视图中确认这一点。如果你的数据库\
  \ ID 解析为 NULL，可能会出错。\n\n![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig8_HTML.jpg](img/323849_5_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8 窄的非聚集索引的页数\n\n```sql\nSELECT i.name,\n       i.type_desc,\n       ddips.page_count,\n\
  \       ddips.record_count,\n       ddips.index_level\nFROM   sys.indexes i\nJOIN\
  \   sys.dm_db_index_physical_stats(   DB_ID(N'AdventureWorks2017'),\n          \
  \                               OBJECT_ID(N'dbo.Test1'),\n                     \
  \                    NULL,\n                                         NULL,\n   \
  \                                      'DETAILED'\n                            \
  \           ) AS ddips\n       ON i.index_id = ddips.index_id\nWHERE  i.object_id\
  \ = OBJECT_ID(N'dbo.Test1');\n```\n\n系统表 `sys.indexes` 存储在每个数据库中，包含数据库中每个索引的基本信息。动态管理函数\
  \ `sys.dm_db_index_physical_stats` 包含有关索引统计信息的更详细信息（你将在第 14 章了解更多关于此 DMV 的内容）。为了理解宽索引键的缺点，将索引列\
  \ `C1` 的数据类型从 `INT` 修改为 `CHAR(500)`（下载文件中的 `narrow_alter.sql`）。\n\n```sql\nDROP\
  \ INDEX dbo.Test1.iTest;\nALTER TABLE dbo.Test1 ALTER COLUMN C1 CHAR(500);\nCREATE\
  \ INDEX iTest ON dbo.Test1(C1);\n```\n\n`INT` 数据类型列的宽度为 4 字节，而 `CHAR(500)` 数据类型列的宽度为\
  \ 500 字节。由于索引列宽度很大，需要两个索引页来容纳所有 20 个索引行。你可以通过再次对其运行查询来在 `sys.dm_db_index_physical_stats`\
  \ 动态管理函数中确认这一点（见图 8-9）。\n\n![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig9_HTML.jpg](img/323849_5_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9 宽的非聚集索引的页数\n\n大的索引键大小会增加索引页的数量，从而增加索引所需的内存和磁盘活动量。始终建议将索引键大小设置得尽可能窄。\n\n\
  在继续之前删除测试表。\n\n```sql\nDROP TABLE dbo.Test1;\n```\n\n\n\n"
- '# 检查列的唯一性


  在具有极低范围可能唯一值（例如`MaritalStatus`）的列上创建索引不会对性能有益，因为查询优化器将无法使用索引来有效缩小要返回的行范围。考虑一个只有两个唯一值`M`和`S`的`MaritalStatus`列。当您执行一个在`WHERE`子句中包含`MaritalStatus`列的查询时，最终会从表中获取大量行（假设`M`和`S`的分布相对均匀），导致代价高昂的表或聚集索引扫描。在`WHERE`子句中使用具有大量唯一行（或**高选择性**）的列来限制访问的行数总是更可取的。您应该在这些列上创建索引，以帮助优化器访问较小的结果集。


  此外，在多列上创建索引（也称为**复合索引**）时，列的顺序很重要。在许多情况下，首先使用最具选择性的列将有助于更有效地过滤索引行。


  ### 注意


  列在复合索引中的重要性将在本章后面的“考虑列顺序”部分进行解释。


  由此可见，在列上创建索引之前了解其选择性非常重要。您可以通过执行如下查询来找到这一点；只需替换表名和列名：


  ```sql

  SELECT COUNT(DISTINCT e.MaritalStatus) AS DistinctColValues,

  COUNT(e.MaritalStatus) AS NumberOfRows,

  (CAST(COUNT(DISTINCT e.MaritalStatus) AS DECIMAL)

  / CAST(COUNT(e.MaritalStatus) AS DECIMAL)) AS Selectivity,

  (1.0 / (COUNT(DISTINCT e.MaritalStatus))) AS Density

  FROM HumanResources.Employee AS e;

  ```


  当然，您不需要对每个列或每个索引运行这种查询。此查询展示了 SQL Server 使用的一些统计信息是如何组合在一起的。您可以直接使用`DBCC SHOW_STATISTICS`或通过查询
  DMF `sys.dm_db_stats_histogram`和`sys.dm_db_stats_properties`来查看统计信息。我们将在第 13 章中详细介绍所有这些内容。


  当在`WHERE`子句或联接条件中引用时，具有最多唯一值（或选择性最高）的列可能是索引的最佳候选。您也可能遇到特殊数据，其中有数百行常见数据，只有少数是唯一的。这少数唯一值也将受益于索引。您可以通过使用筛选索引（在第
  9 章中有更详细的讨论）使其更加有益。


  为了理解索引键列的选择性如何影响索引的使用，请查看`HumanResources.Employee`表中的`MaritalStatus`列。如果您运行前面的查询，您会看到它在
  290 行中只包含两个不同的值，选择性为 0.0069，密度为 0.5。一个查找`MaritalStatus`为`M`以及特定`BirthDate`值的查询如下所示：


  ```sql

  SELECT e.MaritalStatus,

  e.BirthDate

  FROM HumanResources.Employee AS e

  WHERE e.MaritalStatus = ''M''

  AND e.BirthDate = ''1982-02-11'';

  ```


  这将产生如图 8-10 所示的执行计划以及以下 I/O 和用时：


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig10_HTML.jpg](img/323849_5_En_8_Fig10_HTML.jpg)


  图 8-10


  无索引时的执行计划


  ```

  Table ''Employee''. Scan count 1, logical reads 9

  CPU time = 0 ms,  elapsed time = 2 ms.

  ```


  数据是通过扫描聚集索引（数据存储的位置）来查找`MaritalStatus = ''M''`的适当值而返回的。如果您在该列上放置一个索引，如下所示，并再次运行查询，执行计划保持不变：


  ```sql

  CREATE INDEX IX_Employee_Test ON HumanResources.Employee (MaritalStatus);

  ```


  数据选择性不够，无法使用该索引，更不用说有用了。如果您改用如下所示的复合索引：


  ```sql

  CREATE INDEX IX_Employee_Test

  ON HumanResources.Employee

  (

  BirthDate,

  MaritalStatus

  )

  WITH (DROP_EXISTING = ON);

  ```


  那么，当您重新运行查询时，会生成一个完全不同的执行计划。您可以在图 8-11 中看到它以及性能结果。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig11_HTML.jpg](img/323849_5_En_8_Fig11_HTML.jpg)


  图 8-11


  使用复合索引时的执行计划


  ```

  Table ''Employee''. Scan count 1, logical reads 2

  CPU time = 0 ms,  elapsed time = 2 ms.

  ```


  现在您比使用聚集索引扫描时表现得更好。一个干净利落的索引查找操作花费不到一半的时间来收集数据。


  尽管这些列中没有一个可能具有足够选择性来单独构成一个好的索引（除了`BirthDate`列可能例外），但它们一起提供了足够的选择性，使优化器能够利用所提供的索引。


  可以尝试强制查询使用您创建的第一个测试索引。如果您删除复合索引，重新创建原始索引，然后通过使用查询提示强制使用原始索引结构来修改查询，如下所示：


  ```sql

  CREATE INDEX IX_Employee_Test

  ON HumanResources.Employee

  (

  MaritalStatus

  )

  WITH (DROP_EXISTING = ON);


  SELECT e.MaritalStatus,

  e.BirthDate

  FROM HumanResources.Employee AS e WITH (INDEX(IX_Employee_Test))

  WHERE e.MaritalStatus = ''M''

  AND e.BirthDate = ''1982-02-11'';

  ```


  那么，图 8-12 所示的结果和执行计划虽然相似，但并不相同。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig12_HTML.jpg](img/323849_5_En_8_Fig12_HTML.jpg)


  图 8-12


  使用查询提示选择索引时的执行计划


  ```

  Table ''Employee''. Scan count 1, logical reads 294

  CPU time = 0 ms,  elapsed time = 47 ms.

  ```


  您看到相同的索引查找，但读取次数急剧增加，并且执行计划本身也发生了变化。您现在有一个`Nested Loops`联接和一个添加到计划中的`Key Lookup`操作符。虽然强制优化器选择索引是可能的，但这显然并不总是最优的方法。查询提示剥夺了优化器的选择，并强制它走通常次优的路径。提示不考虑结构的变化，例如优化器可能用于更好地生效的新索引。提示还迫使优化器忽略可能导致更好计划的数据更改。


  ### 注意


  您将在第 12 章中了解键查找。


  自 SQL Server 2012 以来，强制不同行为的另一种方法是`FORCESEEK`查询提示。`FORCESEEK`使得优化器只选择`Index Seek`操作。如果查询被重写如下：


  ```sql

  SELECT e.MaritalStatus,

  e.BirthDate

  FROM HumanResources.Employee AS e WITH (FORCESEEK)

  WHERE e.MaritalStatus = ''M''

  AND e.BirthDate = ''1982-02-11'';

  ```


  此查询产生的执行计划与图 8-12 相同，性能同样糟糕。


  限制优化器的选项并强制行为在某些情况下可能有帮助，但通常情况下，如这里显示的结果所示，执行时间和读取次数的增加并无帮助。


  在继续之前，请确保从表中删除测试索引。


  ```sql

  DROP INDEX HumanResources.Employee.IX_Employee_Test;

  ```




  ## 检查列数据类型


  索引列的数据类型至关重要。例如，在整数键上的索引搜索速度很快，这是因为 `INTEGER`（或 `INT`）数据类型体积小且易于进行算术运算。你也可以使用其他整数数据类型变体（`BIGINT`、`SMALLINT`
  和 `TINYINT`）作为索引列，而字符串数据类型（`CHAR`、`VARCHAR`、`NCHAR` 和 `NVARCHAR`）则需要进行字符串匹配操作，这通常比整数匹配操作的开销更大。


  假设你想要在一个列上创建索引，并且有两个候选列——一列的数据类型是 `INTEGER`，另一列是 `CHAR(4)`。尽管在 SQL Server 2017 和
  Azure SQL Database 中，这两种数据类型的大小都是 4 字节，你仍然应该优先选择 `INTEGER` 数据类型的索引。以算术操作为例，`CHAR(4)`
  数据类型中的值 `1` 实际上存储为 `1` 后跟三个空格，即以下四个字节的组合：`0x35`、`0x20`、`0x20` 和 `0x20`。CPU 不知道如何对此数据执行算术操作，因此会在进行算术运算之前将其转换为
  `integer` 数据类型。而 `integer` 数据类型中的值 `1` 则保存为 `0x00000001`。CPU 可以轻松地对此数据执行算术操作。


  当然，大多数时候，你不会在大小相同的数据类型之间做简单的选择，从而让你能选择更优的类型。在设计和构建索引时，请牢记这一点。


  ## 考虑索引列顺序


  索引键首先按照索引的第一列排序，然后在前一列的每个值内，再按下一列进行子排序。复合索引的第一列通常被称为索引的 `前导列`。例如，考虑表 8-2。


  表 8-2：示例表


  | `c1` | `c2` |

  | --- | --- |

  | 1 | 1 |

  | 2 | 1 |

  | 3 | 1 |

  | 1 | 2 |

  | 2 | 2 |

  | 3 | 2 |


  如果在列 (`c1`, `c2`) 上创建一个复合索引，那么索引的顺序将如表 8-3 所示。


  表 8-3：列 (`c1`, `c2`) 上的复合索引


  | `c1` | `c2` |

  | --- | --- |

  | 1 | 1 |

  | 1 | 2 |

  | 2 | 1 |

  | 2 | 2 |

  | 3 | 1 |

  | 3 | 2 |


  如表 8-3 所示，数据首先按照复合索引中的第一列 (`c1`) 排序。在第一列的每个值内，数据会进一步按照第二列 (`c2`) 排序。


  因此，复合索引中的列顺序是影响索引有效性的重要因素。通过考虑以下几点可以看出这一点：


  *   列的唯一性

  *   列的宽度

  *   列的数据类型


  例如，假设你对表 `t1` 的大多数查询都类似于以下语句：


  ```sql

  SELECT p.ProductID FROM Production.Product AS p

  WHERE p.ProductSubcategoryID = 1;

  SELECT p.ProductID FROM Production.Product AS p

  WHERE p.ProductSubcategoryID = 1

  AND p.ProductModelID = 19;

  ```


  在 (`ProductSubcategoryID`, `ProductModelID`) 上创建的索引将使这两个查询都受益。但是，在 (`ProductModelID`,
  `ProductSubCategoryID`) 上创建的索引对这两个查询都没有帮助，因为它会首先按照 `ProductModelID` 列对数据进行排序，而第一个
  `SELECT` 语句需要数据按照 `ProductSubCategoryID` 列排序。


  为了理解列顺序在索引中的重要性，请考虑以下示例。在 `Person.Address` 表中，有一个 `City` 列和一个 `PostalCode` 列。按如下方式在表上创建索引：


  ```sql

  CREATE INDEX IX_Test ON Person.Address (City, PostalCode);

  ```


  一个使用这个新索引的简单 `SELECT` 语句看起来像这样：


  ```sql

  SELECT a.City,

  a.PostalCode

  FROM Person.Address AS a

  WHERE a.City = ''Dresden'';

  ```


  该查询的 I/O 和执行时间如下：


  ```

  Table ''Address''. Scan count 1, logical reads 2

  CPU time = 0 ms,  elapsed time = 0 ms. (或在扩展事件中为 164 微秒)

  ```


  图 8-13 中的执行计划显示了索引的使用情况。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig13_HTML.jpg](img/323849_5_En_8_Fig13_HTML.jpg)


  图 8-13：针对索引前导列的查询执行计划


  因此，这个查询利用索引的前导列执行 `Seek` 操作来检索数据。如果，你不使用前导列进行查询，而是使用索引中的另一列，如下一个查询所示：


  ```sql

  SELECT a.City,

  a.PostalCode

  FROM Person.Address AS a

  WHERE a.PostalCode = '' 01071'';

  ```


  结果如下：


  ```

  Table ''Address''. Scan count 1, logical reads 108

  CPU time = 0 ms,  elapsed time = 2 ms.

  ```


  执行计划明显不同，如图 8-14 所示。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig14_HTML.jpg](img/323849_5_En_8_Fig14_HTML.jpg)


  图 8-14：针对内部列的查询执行计划


  两个查询都从同一张表返回 31 行数据，但读取次数从 2 跃升至 108。你开始看到图 8-13 中的 `Index Seek` 操作和图 8-14 中的 `Index
  Scan` 操作之间的区别。I/O 和时间的剧烈变化代表了复合索引的另一个优势，即覆盖索引。这将在第 9 章详细讨论。


  完成后，删除索引。


  ```sql

  DROP INDEX Person.Address.IX_Test;

  ```


  ## 考虑索引类型


  在 SQL Server 中，对于所有可用的不同类型的索引，大多数时候你将处理两种主要的索引类型：`聚集索引` 和 `非聚集索引`。这两种类型都具有 B 树结构。两者之间的主要区别在于，聚集索引的叶子页就是表的数据页，因此它们与它们所指向的数据具有相同的顺序。这意味着聚集索引就是表本身。随着你深入学习，你会发现这两种索引类型在叶子级别的差异在确定使用哪种索引类型时变得很重要。


  还有其他一些索引类型，我们将在第 9 章中更详细地介绍它们。


  ## 聚集索引


  聚集索引的叶子页和其所基于表的数据页是同一个。正因为如此，表行在物理上按照聚集索引列排序，并且由于表数据只能有一种物理顺序，因此一个表只能有一个聚集索引。


  ### 提示


  当你创建主键约束时，如果尚未存在聚集索引，并且没有显式指定索引应为唯一非聚集索引，SQL Server 会自动在主键上创建唯一聚集索引。这不是必须的；这只是默认行为。你可以在表上创建主键之前更改其定义。


  ## 堆表


  如本章前面所述，没有聚集索引的表称为 `堆表`。堆表的数据行不以任何特定顺序存储，也不与表中的相邻页面链接。与访问大型非堆表（具有聚集索引的表）相比，堆表的这种无组织结构通常会增加访问大型堆表的开销。




  ### 与非聚集索引的关系


  在 SQL Server 中，聚集索引与非聚集索引之间存在一种有趣的关系。非聚集索引的索引行包含一个指向表中对应数据行的指针。这个指针被称为 `行定位器`。行定位器的值取决于数据页是存储在堆中还是存储在聚集索引中。对于非聚集索引，如果数据存储在堆中，行定位器是指向数据行在堆中的行标识符的指针。对于具有聚集索引的表，行定位器是聚集索引键值。


  例如，假设你有一个没有聚集索引的堆表，如表 8-4 所示。


  表 8-4

  示例表的数据页


  | RowID (非真实列) | c1 | c2 | c3 |

  | --- | --- | --- | --- |

  | 1 | A1 | A2 | A3 |

  | 2 | B1 | B2 | B3 |


  在堆表的 `c1` 列上创建的非聚集索引，其索引行的行定位器将包含指向数据库表中对应数据行的指针，如表 8-5 所示。


  表 8-5

  无聚集索引时的非聚集索引页


  | c1 | 行定位器 |

  | --- | --- |

  | A1 | 指向 `RID = 1` |

  | B1 | 指向 `RID = 2` |


  当在 `c2` 列上创建聚集索引后，非聚集索引行的行定位器值会被更改。新的行定位器值将包含聚集索引键值，如表 8-6 所示。


  表 8-6

  在 c2 上创建聚集索引后的非聚集索引页


  | c1 | 行定位器 |

  | --- | --- |

  | A1 | A2 |

  | B1 | B2 |


  为了验证聚集索引与非聚集索引之间的这种依赖关系，让我们看一个例子。在 AdventureWorks2017 数据库中，表 `dbo.DatabaseLog` 没有聚集索引，只有一个非聚集主键。如果运行如下查询，其执行计划将如图
  8-15 所示：


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig15_HTML.jpg](img/323849_5_En_8_Fig15_HTML.jpg)


  图 8-15

  针对堆表的执行计划


  ```

  SELECT dl.DatabaseLogID,

  dl.PostTime

  FROM dbo.DatabaseLog AS dl

  WHERE dl.DatabaseLogID = 115;

  ```


  如你所见，索引被用于 `Seek` 操作。但由于数据与非聚集索引分开存储，并且该索引不包含满足查询所需的所有列，因此需要一个额外的操作，即 `RID 查找` 操作，来检索数据。然后，来自堆和非聚集索引这两个来源的数据通过
  `Nested Loop` 操作连接起来。这是一个经典的 `查找` 示例，在本例中是 RID 查找，这在“定义查找”一节中有更详细的解释。针对已有聚集索引的表运行的类似查询如下所示：


  ```

  SELECT d.DepartmentID,

  d.ModifiedDate

  FROM HumanResources.Department AS d

  WHERE d.DepartmentID = 10;

  ```


  图 8-16 显示了返回的执行计划。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig16_HTML.jpg](img/323849_5_En_8_Fig16_HTML.jpg)


  图 8-16

  带有聚集索引的执行计划


  尽管主键的使用方式与上一个查询相同，但这次它是针对聚集索引的。这意味着数据与索引存储在一起，因此额外的列不需要通过查找操作来获取数据。所有内容都通过简单的 `聚集索引查找`
  操作返回。


  要从非聚集索引行导航到数据行，这两种索引类型之间的这种关系要求在遍历聚集索引的 B 树结构时增加一次额外的间接寻址。如果没有聚集索引，非聚集索引的行定位器将能够直接从非聚集索引行导航到基表中的数据行。聚集索引的存在导致从非聚集索引行到数据行的导航必须经过聚集索引的
  B 树结构，因为新的行定位器值指向的是聚集索引键。


  另一方面，考虑在聚集索引键顺序中插入一个中间行，或者扩展一个中间行的内容。例如，想象一个聚集索引表，每页包含四行，聚集索引列的值分别为 `1`、`2`、`4`
  和 `5`。在表中插入一个聚集索引值为 `3` 的新行，将需要在值 `2` 和 `4` 之间的页面位置有空间。如果该位置没有足够的空间，数据页（或聚集索引叶子页）上将发生页面拆分。即使数据页拆分会导致数据行重新定位，也不需要更新非聚集索引的行定位器值。这些行定位器继续指向相同的聚集索引键逻辑键值，即使数据行已经物理移动到了不同的位置。在数据页拆分的情况下，非聚集索引的行定位器不需要更新。这一点很重要，因为表通常有大量的非聚集索引。


  对于堆表，情况并非如此。堆中的页面拆分并不常见，而且当堆确实拆分时，它们不会像聚集索引那样重新排列位置。然而，堆中的行可能会移动，通常是由于更新导致堆无法容纳在当前页面中。任何导致堆中行位置移动的操作，都会导致在原始位置放置一个指向新位置的转发记录，从而需要更多的
  I/O 活动。


  ### 注意


  页面拆分及其对性能的影响在第 14 章中有更详细的解释。


  ### 聚集索引建议


  聚集索引与非聚集索引之间的关系对聚集索引施加了一些需要考虑的因素，这些将在接下来的章节中解释。


  #### 首先创建聚集索引


  由于所有非聚集索引都在其索引行中保存聚集索引键，因此非聚集索引和聚集索引的创建顺序很重要。例如，如果在创建聚集索引之前构建了非聚集索引，那么非聚集索引的行定位器将包含指向表中相应
  RID 的指针。稍后创建聚集索引将修改所有非聚集索引，将聚集索引键作为新的行定位器值。这实际上会重建所有非聚集索引。


  为了获得最佳性能，我建议你在创建任何非聚集索引*之前*创建聚集索引。这允许非聚集索引在创建时将其行定位器设置为聚集索引键。这对最终性能没有任何影响，但重建索引可能是一项相当大的工作。


  作为首先创建聚集索引的一部分，我还建议你在 OLTP 数据库中围绕聚集索引来设计表。它应该是第一个创建的索引，因为默认情况下你应该将数据存储为聚集索引。


  对于分析型和数据仓库数据，还有另一种数据存储选项可用，即聚集列存储索引。我们将在第 9 章讨论该索引。



  #### 保持聚簇索引的窄小


  由于所有非聚簇索引都将聚簇键作为其行定位器，为了获得最佳性能，应尽可能保持聚簇索引的整体字节大小较小。如果你创建了一个宽的聚簇索引，例如 `CHAR(500)`，除了聚簇中每页容纳的行数会减少外，这还会给每个非聚簇索引增加
  500 字节。因此，应将聚簇索引中的列数保持在最少，并仔细考虑要包含在聚簇索引中的每一列的字节大小。`integer` 数据类型的列通常是聚簇索引的良好候选者，而字符串数据类型的列则是一个次优选择。反之，即使这意味着键值更宽，也要为聚簇索引选择正确的键值。宽键可能会损害性能，但错误的聚簇键对性能的损害可能更大。


  为了理解宽聚簇索引对非聚簇索引的影响，请考虑以下示例。创建一个带有聚簇索引和非聚簇索引的小型测试表。


  ```sql

  DROP TABLE IF EXISTS dbo.Test1;

  GO

  CREATE TABLE dbo.Test1 (

  C1 INT,

  C2 INT);

  WITH Nums

  AS (SELECT TOP (20)

  ROW_NUMBER() OVER (ORDER BY (SELECT 1)) AS n

  FROM master.sys.all_columns ac1

  CROSS JOIN master.sys.all_columns ac2)

  INSERT INTO dbo.Test1 (

  C1,

  C2)

  SELECT n,

  n + 1

  FROM Nums;

  CREATE CLUSTERED INDEX iClustered ON dbo.Test1 (C2);

  CREATE NONCLUSTERED INDEX iNonClustered ON dbo.Test1 (C1);

  ```


  由于该表具有聚簇索引，非聚簇索引的行定位器包含聚簇索引键值。因此：


  *   非聚簇索引行的宽度 = 非聚簇索引列的宽度 + 聚簇索引列的宽度 = `INT` 数据类型的大小 + `INT` 数据类型的大小


  ```sql

  = 4 字节 + 4 字节 = 8 字节

  ```


  由于非聚簇索引行的尺寸很小，所有行都可以存储在一个索引页中。你可以通过查询索引统计信息来确认这一点，如图 8-17 所示。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig17_HTML.jpg](img/323849_5_En_8_Fig17_HTML.jpg)


  图 8-17


  窄索引的索引页数


  ```sql

  SELECT i.name,

  i.type_desc,

  s.page_count,

  s.record_count,

  s.index_level

  FROM sys.indexes i

  JOIN sys.dm_db_index_physical_stats(DB_ID(N''AdventureWorks2017''),

  OBJECT_ID(N''dbo.Test1''),

  NULL,

  NULL,

  ''DETAILED'') AS s

  ON i.index_id = s.index_id

  WHERE i.object_id = OBJECT_ID(N''dbo.Test1'');

  ```


  为了理解宽聚簇索引对非聚簇索引的影响，将聚簇索引列 `c2` 的数据类型从 `INT` 修改为 `CHAR(500)`。


  ```sql

  DROP INDEX dbo.Test1.iClustered;

  ALTER TABLE dbo.Test1 ALTER COLUMN C2 CHAR(500);

  CREATE CLUSTERED INDEX iClustered ON dbo.Test1(C2);

  ```


  再次对 `sys.dm_db_index_physical_stats` 运行查询会返回图 8-18 中的结果。


  ![../images/323849_5_En_8_Chapter/323849_5_En_8_Fig18_HTML.jpg](img/323849_5_En_8_Fig18_HTML.jpg)


  图 8-18


  宽索引的索引页数


  你可以看到，宽聚簇索引增加了非聚簇索引行的宽度。由于非聚簇索引行的宽度很大，一个 8KB 的索引页无法容纳所有索引行。相反，需要两个索引页来存储全部 20 个索引行。对于大型表而言，由于聚簇索引键尺寸大而导致非聚簇索引尺寸的扩大，可以显著增加非聚簇索引的页数。


  因此，大的聚簇索引键尺寸不仅影响其自身的宽度，还会使表上的所有非聚簇索引变宽。这增加了表上所有索引的索引页数，从而增加了索引所需的逻辑读取和磁盘 I/O。


  #### 单步重建聚簇索引


  由于非聚簇索引对聚簇索引的依赖性，将重建聚簇索引作为单独的 `DROP INDEX` 和 `CREATE INDEX` 语句会导致所有非聚簇索引被重建两次。为避免这种情况，请使用
  `CREATE INDEX` 语句的 `DROP_EXISTING` 子句在单个原子步骤中重建聚簇索引。类似地，你也可以将 `DROP_EXISTING` 子句用于非聚簇索引。


  值得注意的是，在 SQL Server 2005 及更新版本中，当你直接重建聚簇索引时，不会同时看到非聚簇索引也被重建。


  #### 尽可能使聚簇索引唯一


  由于聚簇索引用于存储数据，你必须能够找到每一行。虽然仅从定义和存储角度看，聚簇索引不必是唯一的，但如果键值不唯一，除非有办法使聚簇唯一地标识每个独立数据行的位置，否则
  SQL Server 将无法找到这些行。因此，SQL Server 会向非唯一的聚簇索引添加一个值以使其唯一。这个值被称为 `uniqueifier`（唯一标识符）。如前所述，它会增加聚簇索引以及所有非聚簇索引的大小。在插入每一行时，获取这个唯一值还需要一点额外的处理。基于所有这些原因，尽可能使聚簇索引唯一是有意义的。这也是为什么主键的默认行为是将其设为聚簇索引的一个重要原因。


  你*不*必须使聚簇索引唯一。但是在定义存储和索引时，你确实需要考虑唯一标识符。此外，值得注意的是，由于唯一标识符使用整数数据类型，它将任何一键（或多键）值允许的重复键值数量限制为
  21 亿个重复项。这通常不会成为问题，但它是一种可能性。


  ### 何时使用聚簇索引


  在某些情况下，使用聚簇索引是有帮助的。我将在接下来的章节中讨论这些情况。


  #### 直接访问数据


  由于所有数据都存储在聚簇索引的叶级页上，任何时候访问聚簇，数据都是立即可用的。聚簇索引的一个用途是支持最常用的数据访问路径。任何对聚簇索引的访问都不需要额外的读取来检索数据，这意味着对聚簇索引的查找或扫描不需要额外的读取来检索该数据。这可能是
  Microsoft 默认将主键设为聚簇索引的另一个原因。由于主键通常是访问表中数据的最可能方式，它非常适合作为聚簇索引。


  请记住，主键作为聚簇索引是一种默认行为，但不一定是最常见的数据访问路径。访问路径可能是通过外键约束、表中的备用键或其他列。在规划和设计聚簇时，考虑存储和访问，这样应该就没问题。


  聚簇索引作为数据的主要路径只有在你访问表中相当大一部分数据时才有效。另一方面，如果你访问的是数据的小子集，使用非聚簇覆盖索引可能更好。此外，你必须考虑定义数据访问路径的列的数量和类型。由于聚簇索引的键成为非聚簇索引的指针，过宽的聚簇键会严重影响非聚簇索引的性能和存储。


  如前所述，如果你的大多数查询是包含大量聚合的分析类型查询，使用聚簇列存储来存储数据可能更合适（详见第 9 章）。



  #### 检索预排序数据


  聚簇索引在数据检索需要排序时特别有效（覆盖非聚簇索引对此也有用）。如果你在可能需要排序的列或列集上创建聚簇索引，那么行将按该顺序物理存储，从而消除了检索后对数据排序的开销。


  让我们看看实际效果。创建如下测试表：


  ```

  DROP TABLE IF EXISTS dbo.od;

  GO

  SELECT pod.*

  INTO dbo.od

  FROM Purchasing.PurchaseOrderDetail AS pod;

  ```


  新表 `od` 仅包含数据创建，没有任何索引。你可以通过执行以下命令来验证表上的索引，该命令返回空结果：


  ```

  EXEC sp_helpindex ''dbo.od'';

  ```


  为了理解聚簇索引的用途，获取按特定列排序的大范围行。


  ```

  SELECT od.*

  FROM dbo.od

  WHERE od.ProductID

  BETWEEN 500 AND 510

  ORDER BY od.ProductID;

  ```


  你可以从 `STATISTICS IO` 输出中获取执行此查询（没有任何索引）的开销。


  ```

  Table ''od''. Scan count 1, logical reads 78

  CPU time = 0 ms,  elapsed time = 173 ms.

  ```


  为了提高此查询的性能，你应该在 `WHERE` 子句的列上创建索引。此查询既需要行范围，也需要排序输出。此查询的结果集要求符合聚簇索引的建议。因此，创建聚簇索引如下并重新检查查询开销：


  ```

  CREATE CLUSTERED INDEX i1 ON od(ProductID);

  ```


  当你再次运行查询时，查询的结果开销（带聚簇索引）如下：


  ```

  Table  ''od''.  Scan count 1,  logical reads 8

  CPU time = 0 ms,  elapsed time = 121 ms.

  ```


  创建聚簇索引减少了逻辑读取次数，因此应有助于提高查询性能。


  另一方面，如果你在候选列上创建非聚簇索引（而不是聚簇索引），那么查询性能可能会受到不利影响。让我们在这种情况下验证非聚簇索引的效果。


  ```

  DROP INDEX od.i1;

  CREATE NONCLUSTERED INDEX i1 on dbo.od(ProductID);

  ```


  查询的结果开销（带非聚簇索引）如下：


  ```

  Table ''od''. Scan count 1, logical reads 87

  CPU time = 0 ms,  elapsed time = 163 ms.

  ```


  非聚簇索引在产生的执行计划中甚至没有直接使用。相反，你会得到一个表扫描，但由于索引为优化器提供了额外的选择性来估计开销，即使索引未被使用，此新计划中排序数据的估计开销也与原始表扫描不同。完成后删除测试表。


  ```

  DROP TABLE dbo.od;

  ```


  ### 聚簇索引的不良设计实践


  在某些情况下，最好不使用聚簇索引。我将在接下来的章节中讨论这些情况。


  #### 频繁更新的列


  如果聚簇索引列经常更新，这将导致所有非聚簇索引的行定位器相应地更新，显著增加相关操作查询的开销。这还会通过在此期间阻塞引用同一表部分和非聚簇索引的所有其他查询来影响数据库并发性。因此，避免在高度可更新的列上创建聚簇索引。


  ### 注意


  第 22 章更深入地涵盖了阻塞。


  为了理解仅修改聚簇键列的 `UPDATE` 语句的开销如何因表上非聚簇索引的存在而增加，请考虑以下示例。`Sales.SpecialOfferProduct`
  表在主键上有一个复合聚簇索引，该主键也是来自两个不同表的外键；这是一个经典的多对多连接。在此示例中，我使用以下语句更新两个列之一（注意使用事务来保持测试数据完整）：


  ```

  BEGIN TRAN;

  SET STATISTICS IO ON;

  UPDATE Sales.SpecialOfferProduct

  SET ProductID = 345

  WHERE SpecialOfferID = 1

  AND ProductID = 720;

  SET STATISTICS IO OFF;

  ROLLBACK TRAN;

  ```


  `STATISTICS IO` 输出显示了必要的读取次数。


  ```

  Table ''Product''. Scan count 0, logical reads 2

  Table ''SalesOrderDetail''. Scan count 1, logical reads 1248

  Table ''SpecialOfferProduct''. Scan count 0, logical reads 10

  ```


  如果你向表中添加非聚簇索引，你会看到读取次数增加，如下所示：


  ```

  CREATE NONCLUSTERED INDEX ixTest

  ON Sales.SpecialOfferProduct (ModifiedDate);

  ```


  当你再次运行相同的查询时，`SpecialOfferProduct` 表的 `STATISTICS IO` 输出会发生变化。


  ```

  Table ''Product''. Scan count 0, logical reads 2

  Table ''SalesOrderDetail''. Scan count 1, logical reads 1248

  Table ''SpecialOfferProduct''. Scan count 0, logical reads 19

  ```


  由于添加了非聚簇索引，聚簇索引更新引起的读取次数增加了。请务必删除该索引。


  ```

  DROP INDEX Sales.SpecialOfferProduct.ixTest;

  ```


  #### 宽键


  由于所有非聚簇索引都将聚簇键作为其行定位器，出于性能原因，你应该避免在非常宽的列（或列集）上或在太多列上创建聚簇索引。如前一节所述，聚簇索引必须尽可能窄。


  ##### 非聚簇索引


  非聚簇索引不影响表页面中的数据顺序，因为非聚簇索引的叶级页面和表的数据页面是分开的。需要一个指针（行定位器）来从非聚簇索引中的索引行导航到数据行，无论数据存储在聚簇还是堆中。正如你在前面的“聚簇索引”部分所了解到的，行定位器的结构取决于数据页面是存储在堆中还是聚簇索引中。对于堆，行定位器是指向数据行的
  RID 的指针；对于具有聚簇索引的表，行定位器是聚簇索引键；对于具有聚簇列存储索引的表，行定位器是一个 8 字节的值，由列存储索引的 `row_group_id`
  和 `tuple_id` 组成。


  ### 非聚簇索引维护


  即使聚簇索引行在物理上重新定位，非聚簇索引的行定位器值仍然保持相同的聚簇索引值。


  在堆表中（没有聚簇索引），为了优化此维护成本，SQL Server 在页面拆分后向旧数据页面添加一个指针，指向新数据页面，而不是更新所有相关非聚簇索引的行定位器。虽然这降低了非聚簇索引的维护成本，但它增加了从非聚簇索引行到堆中数据行的导航成本，因为在旧数据页面和新数据页面之间添加了一个额外的链接。因此，使用聚簇索引作为行定位器可以减少与非聚簇索引相关的开销。


  当表是聚簇列存储索引时，存储值（即数据实际存储的位置）会随着索引重建以及数据从增量存储移动到压缩存储而改变。这会导致各种问题，除非聚簇列存储索引内部有一项新功能，允许在非聚簇索引认为值所在的位置与其实际位置之间进行映射。有趣的是，这被称为*映射索引*。当数据在聚簇列存储内的位置发生变化时，值会被添加到其中。当表数据包含在聚簇列存储中时，它可能会稍微减慢非聚簇索引的使用速度。




  ### 定义查找操作


  当一个查询请求的列不属于优化器选定的非聚集索引时，就需要进行查找。这可能是针对聚集索引（无论是否为列存储）进行的关键查找，或者是针对堆进行的 RID 查找。过去，这类查找的通用术语源于其旧定义名称
  `bookmark lookup`。由于自 SQL Server 2000 之后人们在执行计划中再也没见过这个短语，该术语的使用越来越少。现在你只需将其称为查找，然后定义类型，如
  `key` 或 `RID`。查找操作通过遵循索引行中的行定位器值，从表中获取对应的数据行，这需要除了在索引页上进行逻辑读取外，还要在数据页上进行一次逻辑读取，以及一个连接操作来将数据组合到一个共同的输出中。但是，如果查询所需的所有列在索引本身中都可用，则不需要访问数据页。这被称为
  `覆盖索引`。


  这些查找操作是为什么大型结果集更适合使用聚集索引的原因。聚集索引不需要查找，因为聚集索引的叶级页和数据页是相同的。


  ### 注意


  第 12 章更详细地介绍了查找操作。


  ### 非聚集索引建议


  由于一个表只能有一个聚集索引，你可以利用多个非聚集索引的灵活性来帮助提升性能。我将在以下章节中解释决定是否使用非聚集索引的因素。


  #### 何时使用非聚集索引


  当你只想从一个大表中检索单词少量行和列时，非聚集索引最为有用。随着要检索的列数增加，拥有 `覆盖索引` 的可能性会降低。然后，如果你还要检索单词大量的行，任何查找操作的开销成本都会成比例地增加。要从一个表中检索单词少量行，被索引的列应该具有高选择性。


  此外，会有一些索引需求不适合聚集索引，正如“聚集索引”一节所解释的。


  *   `频繁可更新的列`

  *   `宽键`


  在这些情况下，你可以使用非聚集索引，因为它与聚集索引不同，不会影响表中的其他索引。在频繁可更新的列上创建非聚集索引，其成本不像在该列上创建聚集索引那么高。对非聚集索引的
  `UPDATE` 操作仅限于基表和该非聚集索引本身，不会影响表上的任何其他非聚集索引。同样，在宽列（或列集）上的非聚集索引也不会像聚集索引那样增加任何其他索引的大小。但是，即使在高度可更新的列或宽列（或列集）上创建非聚集索引时也要保持谨慎，因为正如本章前面所解释的，这可能会增加操作查询的成本。


  ### 提示


  非聚集索引也有助于解决阻塞和死锁问题。我将在第 21 章和第 22 章中更深入地讨论这一点。


  #### 何时不使用非聚集索引


  非聚集索引不适用于检索单词大量行的查询，除非它们是 `覆盖索引`。这类查询更适合使用聚集索引，后者不需要单独的查找来检索单词数据行。由于除了在非聚集索引页上进行逻辑读取外，查找还需要额外的逻辑读取来访问数据页，因此对于检索单词大量行的情况（例如在循环连接中需要一个接一个地进行查找时），使用非聚集索引的查询成本会显著增加。SQL
  Server 查询优化器会考虑这个成本，因此在检索单词大型结果集时可能会放弃使用非聚集索引。对于包含更多聚合的分析型查询，非聚集索引也不如列存储索引有用。


  如果你的需求是从一个表中检索单词大型结果集，那么在筛选条件（或连接条件）列上创建非聚集索引可能没有用，除非你使用一种特殊类型的非聚集索引，称为 `覆盖索引`。我将在第
  9 章详细描述这种索引类型。


  ### 聚集索引 vs. 非聚集索引


  在聚集索引和非聚集索引之间做选择的主要考虑因素如下：


  ```

  * 要检索的行数

  * 数据排序需求

  * 索引键宽度

  * 列更新频率

  * 查找成本

  * 任何磁盘热点

  ```



  ### 聚集索引相对于非聚集索引的优势


  在为一个没有索引的表选择索引类型时，聚集索引通常是更优选。因为索引页和数据页是相同的，聚集索引不需要像覆盖型非聚集索引那样，从索引行跳转到基础表中的数据行。


  为了理解在这些情况下，即使检索少量行，聚集索引为何能比非聚集索引表现更优，请创建一个在某一列上具有高选择性的测试表。


  ```

  DROP TABLE IF EXISTS dbo.Test1;

  CREATE TABLE dbo.Test1 (

  C1 INT,

  C2 INT);

  WITH Nums

  AS (SELECT TOP (10000)

  ROW_NUMBER() OVER (ORDER BY (SELECT 1)) AS n

  FROM master.sys.all_columns AS ac1

  CROSS JOIN master.sys.all_columns AS ac2)

  INSERT INTO dbo.Test1 (

  C1,

  C2)

  SELECT n,

  n

  FROM Nums;

  ```


  以下的 `SELECT` 语句仅从表中获取 10,000 行中的 1 行：


  ```

  SELECT t.C1,

  t.C2

  FROM dbo.Test1 AS t

  WHERE C1 = 1000;

  ```


  此查询生成的图形化执行计划如图 8-19 所示，`SET STATISTICS IO` 和 `STATISTICS TIME` 的输出如下：


