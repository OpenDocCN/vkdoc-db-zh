- fmt: '# Introducing SQL Server 2022


    Now that you know the history and "behind the scenes" of how we made it to the
    release of SQL Server 2022, let''s step through an overview of what is in SQL
    Server 2022 to set the stage for the rest of the book.


    ## Built on a Foundation


    One of the lessons I learned as I toured the world in 2018 and 2019 presenting
    SQL Server 2019 at big events and directly to customers was that I forgot to talk
    about previous releases and the foundation of SQL Server 2019.


    ![](Images/525217_1_En_1_Fig6_HTML.png)


    An illustration titled the next step for SQL server. It includes the SQL servers
    2016, 2017, and 2019 with the SQL features of each year.


    Figure 1-6. Major capabilities of previous SQL Server releases


    Customers I would talk to were not even on SQL Server 2016 and were not aware
    of features like `Query Store`, `Polybase`, `Always Encrypted`, or `Intelligent
    Query Processing`. This wasn''t their fault but mine for not getting the word
    out more about SQL Server 2016 and 2017. SQL Server releases are cumulative, so
    everything you learn about in this book for SQL Server 2022 comes with features
    as you see in Figure 1-6. *SQL Server 2019 Revealed* can give you deep insights
    into what was in SQL Server 2019 that you also get when you upgrade to SQL Server
    2022. More importantly, we built new features in SQL Server 2022 as `enhancements`
    to these capabilities or used them in new and innovative ways. With this context
    in mind, let''s look at the major `new` enhancements for SQL Server 2022.


    ## Wheel of Power


    In 2019, I built a slide for my presentations on SQL Server 2019 with "quadrants"
    to show the major capabilities of the release. (You can see this slide in the
    first chapter of *SQL Server 2019 Revealed*.) After presenting SQL Server 2019
    several times, I started to call this my "camera slide." That is because anytime
    I would display it at an event, everyone took photos of it (which is pretty humbling).
    But the concept is the same. Create a single slide that captures the major capabilities
    of the release.


    For SQL Server 2022, I did something similar with a different twist. Figure 1-7
    represents what I call the "Wheel of Power."


    ![](Images/525217_1_En_1_Fig7_HTML.png)


    An illustration of SQL server 2022 capabilities. It comprises of SQL server 2022
    in the center connected with features of extending T-SQL, cloud-connected, built-in
    query, security, and data virtualization.


    Figure 1-7. The SQL Server 2022 "Wheel of Power"


    The "dash" lines represent areas where SQL Server can connect to sources outside
    of the server or VM. Not every area has the same investment, but this provides
    a nice categorization of our features. And as you read the rest of the book, you
    can see several chapters are organized around the spokes of the wheel.


    ## Cloud Connected


    Cloud connected represents a set of features to connect SQL Server to Azure in
    new and exciting ways never seen before. These cloud-connected features give SQL
    Server 2022 a unique place in `hybrid computing`. You will learn all the details
    of these features in Chapter 3 of the book. Here are the highlights:


    - **Link feature for Azure SQL Managed Instance**

    Using the power of built-in Distributed Availability Groups, you can now use Azure
    SQL Managed Instance for disaster recovery. Azure SQL Managed Instance is a managed
    SQL instance in the form of Platform as a Service (`PaaS`). You will be able to
    fail over back and forth between SQL Server 2022 and Azure SQL Managed Instance.
    The first iteration of this capability uses an offline approach (backup and restore)
    with a complete online failover to come in the future.

    - **Synapse Link for SQL Server 2022**

    Use your SQL Server 2022 instance to feed operational database changes to Synapse
    Analytics for near-real-time analytics. This is a great solution to reduce the
    need for `ETL` applications and use the power of Synapse to combine your SQL Server
    data with other data sources to support analytics.

    - **Microsoft Purview policy management**

    Managing authentication and access to SQL Server resources at scale can be painful
    and error-prone. Microsoft Purview will allow you to publish `policies` from a
    central location to manage access to SQL Server or any Azure SQL virtual machine,
    instance, or database. Microsoft Purview is dependent on Azure Active Directory
    (`AAD`) authentication, which is also now available for SQL Server 2022.


    ## Built-In Query Intelligence


    In SQL Server 2016, we introduced `Query Store` to capture in the database key
    performance information. In SQL Server 2017, we enhanced the query processor (`QP`)
    in the engine to help you get faster performance with no code changes. In SQL
    Server 2019, we stepped up the game by adding more query processor scenarios and
    branded this `Intelligent Query Processing` (`IQP`).


    In SQL Server 2022, we have enabled `Query Store` by default, added support for
    read replicas, and introduced hints to shape query plans. We built a new set of
    enhancements for the `next generation` of `Intelligent Query Processing` including
    some features that work together with `Query Store`.


    This is one of the most exciting areas of investments for SQL Server 2022, and
    you will learn all about this in Chapters 4 and 5 of the book.


    ## Industry-Proven Database Engine


    We don''t have a product if we don''t have an industry-proven database engine.
    And we don''t have an engine if we don''t invest in security, scalability, and
    availability in every release. I call this the "meat and potatoes" of SQL Server.
    You will read about many of these features in Chapter 6 of the book, but here
    a few highlights:


    - **Ledger for SQL Server**

    Blockchain technology can provide tamper-evident "ledgers" of changes but has
    traditionally been implemented in distributed systems. SQL Server 2022 includes
    the ability to declare database tables as `ledger tables` to provide a built-in,
    tamper-evident record of changes.

    - **System page latch concurrency**

    `System page latch concurrency` has been a significant pain point for workloads
    using `tempdb` since SQL Server has been a product. We have chipped away at this
    problem by guiding users how to create multiple files for `tempdb` and introducing
    features like `tempdb` metadata optimization in SQL Server 2019 and concurrent
    `PFS` updates. In SQL Server 2022, we have further improved concurrency for operations
    that require access to other system pages. I personally believe we might have
    achieved a "hands-free" management of `tempdb`, but you need to see it for yourself.

    - **Contained Availability Groups**

    An often asked feature from our customers is now a reality. You can now create
    a `Contained Availability Group`, and we will replicate instance-level objects
    like `SQL Agent` jobs, linked servers, and logins to secondary replicas.'
