- fmt: "# 3. Connect Your Database to the Cloud\n\n## Configuration\n\nAlthough this\
    \ chapter is specifically designed to give you guidance on installation and upgrades,\
    \ the configuration of SQL Server post installation is also an important topic.\
    \ However, there are very few changes to SQL Server instance configuration in\
    \ SQL Server 2022:\n\n*   There are a few new server-level `sp_configure` options.\
    \ They will be discussed throughout this book as they relate to new features for\
    \ SQL Server 2022.\n\n*   The SQL Server Configuration Manager has been enhanced\
    \ to allow you to control the services (start and stop) for the Azure extension\
    \ for SQL Server feature.\n\nOther than that, there are no new instance-level\
    \ configuration changes.\n\nYou will learn about new database-level configuration\
    \ options as you explore new features throughout the book.\n\n## Easy to Install\
    \ and Upgrade\n\nSQL Server has been known for some time as a simple install-and-upgrade\
    \ experience, and none of that changes in SQL Server 2022. As part of that experience,\
    \ we have provided an integrated setup to get connected to Azure if that is part\
    \ of your hybrid strategy.\n\nIf you read over all the details of this chapter,\
    \ you are pretty much ready to dive in and learn about features. So let’s roll!\
    \ The next chapter is about connecting SQL Server to the cloud in ways never before\
    \ seen in the industry, which brings together SQL Server and Azure to provide\
    \ disaster recovery, analytics, and security.\n\nSQL Server runs on any platform\
    \ you need, edge to cloud. Regardless of where you run SQL Server, we have seen\
    \ a trend in the industry and for our customers to *connect* SQL Server to the\
    \ cloud. *Connect* is a pretty broad term, so in this chapter you will learn the\
    \ details of exactly how SQL Server 2022 can be connected to the cloud.\n\nFirst,\
    \ I’ll give you my perspective on what *hybrid* means and how SQL Server has been\
    \ a hybrid platform over the years. Then I’ll go into each of the main areas where\
    \ SQL Server 2022 is now Azure enabled in ways never seen before. This includes\
    \ managed disaster recovery, near-real-time analytics, and new security capabilities.\
    \ As part of this story, I’ll describe how Azure Arc is used to enable some of\
    \ these technologies.\n\nIn this chapter there are examples for you to go through\
    \ to learn how these features work. For any of these features, you will need an\
    \ Azure subscription and the ability to connect your SQL Server to Azure, either\
    \ directly connected to the Internet or through a proxy. Your company or organization\
    \ may already have an Azure account for you to use or a subscription. However,\
    \ if you need your own, start at `https://azure.microsoft.com/get-started`. I’ll\
    \ describe more throughout this chapter specific access rights you may need for\
    \ each scenario and any special connection configurations you may want to use\
    \ like a proxy.\n\n## The Hybrid SQL Server\n\nIn this section of the book, I’ll\
    \ give you my perspective on what the term *hybrid* means in relation to SQL Server,\
    \ a brief history of how SQL Server has had hybrid capabilities in previous releases,\
    \ and an overview of what is special about SQL Server 2022.\n\n### What Is *Hybrid*?\n\
    \nI’m sure many of you have thought about what *hybrid* means, and my research\
    \ shows there are several definitions and thoughts in the industry. I like to\
    \ simply define the term *hybrid* in relation to a compute or data platform as\
    \ the following:\n\n*   A product or service offered both on-premises and the\
    \ cloud *with consistency*\n\n    SQL Server definitely meets this qualification\
    \ given that SQL Server runs in the cloud with Azure SQL: SQL on Azure Virtual\
    \ Machines, Azure SQL Managed Instance, and Azure SQL Database. Notice my emphasis\
    \ at the end of the phrase: “with consistency.” I say this because you might be\
    \ able to find other products that exist on-premises and in the cloud, but do\
    \ they have the same consistency story as SQL Server? Same core database engine,\
    \ same T-SQL language, and same tools.\n\n*   A product on-premises connected\
    \ to the cloud to *enhance* data capabilities\n\nThere are two keywords in this\
    \ phrase: connected and enhance. *Connected* means to connect data *somehow* from\
    \ an existing feature in the on-premises product. *Enhance* means there is true\
    \ business value to this connection. You will see in this chapter that I believe\
    \ SQL Server 2022 does both.\n\nLet’s first look at how SQL Server has been connected\
    \ to Azure over the years to set some context.\n\n### SQL Server Hybrid Over the\
    \ Years\n\nThe most basic feature SQL Server has included for hybrid for several\
    \ releases is backup. Starting with SQL Server 2012, you are able to back up or\
    \ restore databases to and from Azure Blob Storage using a syntax that includes\
    \ a URL. This feature has been enhanced over the years and still exists today,\
    \ which you can read about at `https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`.\n\
    \nThere are other methods to connect SQL Server to Azure including using existing\
    \ features to extend high availability, redundancy, or queries. For example, you\
    \ can extend an Always On Availability Group to Azure, which you can read about\
    \ at `https://docs.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability`.\n\
    \nYou can also set up transaction replication where the publisher is an on-premises\
    \ SQL Server and a subscriber database is on an Azure Virtual Machine, Azure SQL\
    \ Managed Instance, or even Azure SQL Database (you can read specific instructions\
    \ on how to set this up for Azure SQL Database at `https://docs.microsoft.com/azure/azure-sql/database/replication-to-sql-database`).\n\
    \nAnd finally, any Azure SQL service can be the data source for a linked server\
    \ query from SQL Server. These are fundamental methods to connect SQL Server to\
    \ Azure, but SQL Server 2022 takes it to the next level.\n\n### The SQL Server\
    \ 2022 Hybrid Lineup\n\nFigure [3-1](#525217_1_En_3_Chapter.xhtml#Fig1) provides\
    \ a visual of all Azure-enabled capabilities with SQL Server 2022.\n\n![](Images/525217_1_En_3_Fig1_HTML.png)\n\
    \nThe S Q L server 2022 with 3 built in abilities is cloud connected to 5 azure-enabled\
    \ capabilities from replicated data failover to assessments alerts.\n\nFigure\
    \ 3-1\n\nSQL Server 2022 is cloud connected\n\nFrom left to right at the top,\
    \ SQL Server 2022 has built in the ability to provide these cloud-connected features.\n\
    \n#### Azure SQL Managed Instance\n\nThe link feature for Azure SQL Managed Instance\
    \ provides *managed* disaster recovery for SQL Server 2022. The built-in capability\
    \ of a Distributed Availability Group (DAG) is used to bridge SQL Server and Azure\
    \ SQL Managed Instance.\n\n#### Azure Synapse Analytics\n\nAzure Synapse Link\
    \ for SQL Server allows SQL Server 2022 to seamlessly synchronize data in selected\
    \ tables directly to Azure Synapse–dedicated SQL pools. The self-hosted integration\
    \ runtime (SHIR) is used to coordinate between Synapse and SQL Server, but SQL\
    \ Server also has built-in capabilities to send data to Azure.\n\n#### Azure Active\
    \ Directory Authentication\n\nSQL Server 2022 can now authenticate login using\
    \ an Azure Active Directory (AAD) account. This allows support for concepts like\
    \ Multi-factor Authentication. You have to enable AAD with SQL Server 2022 to\
    \ support Purview-integrated policy management. AAD for SQL Server 2022 requires\
    \ the Azure extension for SQL Server."
