    \ SQL Server 擅长的两个方面。\n\n#### SQL Server 账本的背景\n\n2018 年，微软开始探索区块链和关系数据库的世界是否能融合成一个数字账本解决方案。根据微软首席软件工程师\
    \ Panagiotis Antonopoulos 的说法：\n\n> *2018 年，我们与微软研究院一起，开始致力于寻找一种架构，以弥合区块链与关系数据库之间的鸿沟，从而提供两种技术的优势。我们评估了不同的设计选项，包括让\
    \ SQL Server 在去中心化配置中运行（使用区块链的高级共识算法），或在更符合传统 SQL Server 设置的中心化环境中运行。我们分析了这些选项的技术可行性，并与大量区块链客户进行了交流，以了解他们在采用该技术时面临的挑战。这是一个非常有教育意义的过程，它让我们清楚地认识到，去中心化尽管有其安全优势，却使得区块链的开发和管理变得昂贵而复杂，给企业客户的采用带来了巨大阻力。*\n\
    \n> **注意**\n>\n> 如果你认出 Panagiotis Antonopoulos 这个名字，他是我们在 SQL Server 2019 中引入的极其酷炫的技术——加速数据库恢复（ADR）的主要开发者之一。他就是在构建出色的软件！\n\
    \n这项研究努力促成了 SQL Server 账本的开发。这项工作最初在 Azure SQL Database 中开始。你可以在 [`https://aka.ms/sqlledgerpaper`](https://aka.ms/sqlledgerpaper)\
    \ 阅读关于原始项目的介绍。\n\nSQL Server 的账本使用了成熟的区块链技术，如加密数据结构（例如哈希链和 Merkle 树）。（如果你感兴趣，白皮书详细介绍了什么是\
    \ Merkle 树。）SQL Server 账本的关键之一是充分利用……嗯，SQL Server。SQL Server 的账本内置于产品本身，无需更改应用程序、特殊提供程序或代码。只需使用\
    \ T-SQL。\n\nPanagiotis 总结了 SQL Server 账本的强大之处：*“尽管数据是集中存储的，但各个组织可以使用这些摘要来验证数据完整性。这种解决方案的简单性和透明度使我们能够将区块链商品化，并使所有\
    \ SQL 用户能够以极低的成本和复杂性利用其优势。”*\n\n由于这种能力，我喜欢将账本视为一种**数据完整性**的形式。让我们看看它是如何工作的，以了解原因。\n\
    \n#### 工作原理\n\nSQL Server 的账本由以下组件构成：\n\n*   `Ledger tables`（账本表）\n    *   用户使用\
    \ `CREATE TABLE` 语法的扩展来创建账本表。账本表可以是*可更新的*或*仅追加的*。可更新的账本表非常适合审计场景。仅追加表只允许 `INSERT`\
    \ 语句，这可以是多方信任场景的一个很好的解决方案。\n*   `Ledger history tables`（账本历史表）\n    *   可更新的账本表具有类似时间表的内置历史记录，但附带额外的事务信息，这些信息与发起更改的\
    \ SQL 主体相关联。\n*   `Ledger views`（账本视图）\n    *   当你创建一个账本表时，我们会自动构建一个视图，该视图将账本表与账本历史表连接起来，以提供一个整合的视图。\n\
    *   `Database ledger`（数据库账本）\n    *   *数据库账本*是一组系统表，包含数据库中所有账本表的所有事务的详细信息、加密哈希和\
    \ Merkle 树。这是提供数据防篡改记录的关键组件之一。\n*   `Digests`（摘要）\n    *   数据库账本中最新区块的哈希称为数据库**摘要**。它代表了该区块生成时数据库中所有账本表的状态。我喜欢将摘要视为数据库中区块链的*校验和*。摘要是实现防篡改记录的另一个关键组件，因为它是生成并存储在\
    \ SQL Server *之外*的。\n\n图 6-1 展示了这些组件如何为一个可更新的账本表协同工作。\n\n![](img/525217_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1\n带有可更新账本的 SQL Server\n\n在这个例子中，对于像银行这样的公司，他们可以简单地使用 `CREATE TABLE` 的这个扩展来创建一个可更新的账本表：\n\
    \n```\nWITH\n(\nSYSTEM_VERSIONING = ON,\nLEDGER = ON\n);\n```\n\nSQL Server 将自动创建一个历史表和一个与该账本表对应的账本视图。\n\
    \n当对表进行任何修改（`INSERT`、`UPDATE` 或 `DELETE`）时，每个事务的审计记录和加密哈希都会记录在数据库账本以及区块链的区块中。\n\
    \n摘要（实际上是 JSON 数据）可以手动或自动在单独的存储位置生成。这使得像银行监管机构这样的人可以使用摘要来随时验证账本的完整性。\n\n图 6-2\
    \ 展示了仅追加账本表的组件。\n\n![](img/525217_1_En_6_Fig2_HTML.jpg)\n\n图 6-2\n用于仅追加账本表的 SQL\
    \ Server\n\n仅追加账本表不需要历史表，因为你只能执行 `INSERT` 语句。仅追加账本表非常适合多方场景，因为没有任何一方可以“更新”账本表。只允许保留新记录的历史记录（即使是拥有\
    \ `sysadmin` 权限的 DBA 也无法进行更新以伪造账本）。\n\n考虑到这些组件，以下是账本如何提供数据完整性、信任和数据防篡改记录的：\n\n\
    *   账本表具有内置的审计功能，因此你可以看到对表的每次修改的确切日期时间和 SQL 主体。\n*   仅追加账本表通过只允许 `INSERT` 语句，只允许“向记录添加内容”。\n\
    *   你可以随时通过数据库账本中的加密哈希来验证没有人篡改账本表（例如，在引擎底层）。\n*   存储在账本之外的摘要可用于验证没有人篡改数据库账本。\n\
    \n为了更详细地了解这些组件如何工作，让我们尝试一个例子。\n"
- fmt: "## Exercise to Use Ledger for SQL Server\n\nLet’s walk through an exercise\
    \ to see how Ledger works. There are four parts to this exercise: using an updateable\
    \ ledger table, using an append-only ledger table, protection from dropping a\
    \ ledger table, and an interesting example when I tried to “hack” the ledger.\n\
    \n### Prerequisites\n\n*   SQL Server 2022 Evaluation Edition. You must configure\
    \ `SQL Server` for mixed-mode authentication.\n*   Virtual machine or computer\
    \ with minimum of two CPUs and 8Gb RAM.\n*   SQL Server Management Studio (`SSMS`).\
    \ The latest `SSMS` 18.x will work, but `SSMS` 19.x has a new visualization for\
    \ ledger tables, so the examples in this exercise were done with the latest `SSMS`\
    \ 19.x build.\n*   Get the scripts for this exercise from the book samples at\
    \ `ch06_meatandpotatoes\\security\\sqlledger`.\n\nNote: Any name of identifiable\
    \ information in this exercise is purely fictional and does not represent any\
    \ real person.\n\n### Setting Up the Exercise\n\nWe will create two new SQL logins\
    \ and a database for the exercise:\n\n1.  Execute the script `addsysadminlogin.sql`\
    \ to add a sysadmin SQL login. This script executes the following T-SQL statements:\n\
    \n```sql\nUSE master;\nGO\n-- Create a login for bob and make him a sysadmin\n\
    IF EXISTS (SELECT * FROM sys.server_principals WHERE NAME = 'bob')\nBEGIN\n  \
    \  DROP LOGIN bob;\nEND\nCREATE LOGIN bob WITH PASSWORD = N'StrongPassw0rd!';\n\
    EXEC sp_addsrvrolemember 'bob', 'sysadmin';\nGO\n```\n\n2.  Log in with the SQL\
    \ login `bob` you created in step 1. Create the database and add a login for an\
    \ “app” by executing the script `createdb.sql`. This script executes the following\
    \ T-SQL statements:\n\n```sql\nUSE master;\nGO\n-- Create the ContosoHR database\n\
    --\nDROP DATABASE IF EXISTS ContosoHR;\nGO\nCREATE DATABASE ContosoHR;\nGO\nUSE\
    \ ContosoHR;\nGO\n-- Create a login for the app\nIF EXISTS (SELECT * FROM sys.server_principals\
    \ WHERE NAME = 'app')\nBEGIN\n    DROP LOGIN app;\nEND\nCREATE LOGIN app WITH\
    \ PASSWORD = N'StrongPassw0rd!', DEFAULT_DATABASE = ContosoHR;\nGO\n-- Enable\
    \ snapshot isolation to allow ledger to be verified\nALTER DATABASE ContosoHR\
    \ SET ALLOW_SNAPSHOT_ISOLATION ON;\nGO\n-- Create an app user for the app login\n\
    CREATE USER app FROM LOGIN app;\nGO\nEXEC sp_addrolemember 'db_owner', 'app';\n\
    GO\n```\n\n### Exercise 1: Using an Updateable Ledger Table\n\nConnect with the\
    \ SQL login `bob` for all steps in this first exercise.\n\n1.  Create an updateable\
    \ ledger table for Employees by executing the script `createemployeeledger.sql`.\
    \ This script executes the following T-SQL statements:\n\n```sql\nUSE ContosoHR;\n\
    GO\n-- Create the Employees table and make it an updatetable Ledger table\nDROP\
    \ TABLE IF EXISTS [dbo].[Employees];\nGO\nCREATE TABLE [dbo].[Employees](\n  \
    \  [EmployeeID] [int] IDENTITY(1,1) NOT NULL,\n    [SSN] [char](11) NOT NULL,\n\
    \    [FirstName] [nvarchar](50) NOT NULL,\n    [LastName] [nvarchar](50) NOT NULL,\n\
    \    [Salary] [money] NOT NULL\n)\nWITH\n(\n    SYSTEM_VERSIONING = ON,\n    LEDGER\
    \ = ON\n);\nGO\n```\n\nIf you are using `SSMS` 19.X, then you can see the visual\
    \ properties of ledger tables and the corresponding history table name as in Figure\
    \ [6-3](#525217_1_En_6_Chapter.xhtml#Fig3).\n\n![](Images/525217_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3 Ledger tables and views in `SSMS` Object Explorer\n\n2.  Populate\
    \ initial employee data using the script `populateemployees.sql`. This script\
    \ executes the following T-SQL statements:\n\n```sql\nUSE ContosoHR;\nGO\n-- Clear\
    \ Employees table\nDELETE FROM [dbo].[Employees];\nGO\n-- Insert 10 employees.\
    \ The names and SSN are completely fictional and not associated with any person\n\
    DECLARE @SSN1 char(11) = '795-73-9833'; DECLARE @Salary1 Money = 61692.00; INSERT\
    \ INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN1,\
    \ 'Catherine', 'Abel', @Salary1);\nDECLARE @SSN2 char(11) = '990-00-6818'; DECLARE\
    \ @Salary2 Money = 990.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName],\
    \ [LastName], [Salary]) VALUES (@SSN2, 'Kim', 'Abercrombie', @Salary2);\nDECLARE\
    \ @SSN3 char(11) = '009-37-3952'; DECLARE @Salary3 Money = 5684.00; INSERT INTO\
    \ [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN3,\
    \ 'Frances', 'Adams', @Salary3);\nDECLARE @SSN4 char(11) = '708-44-3627'; DECLARE\
    \ @Salary4 Money = 55415.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName],\
    \ [LastName], [Salary]) VALUES (@SSN4, 'Jay', 'Adams', @Salary4);\nDECLARE @SSN5\
    \ char(11) = '447-62-6279'; DECLARE @Salary5 Money = 49744.00; INSERT INTO [dbo].[Employees]\
    \ ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN5, 'Robert', 'Ahlering',\
    \ @Salary5);\nDECLARE @SSN6 char(11) = '872-78-4732'; DECLARE @Salary6 Money =\
    \ 38584.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary])\
    \ VALUES (@SSN6, 'Stanley', 'Alan', @Salary6);\nDECLARE @SSN7 char(11) = '898-79-8701';\
    \ DECLARE @Salary7 Money = 11918.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName],\
    \ [LastName], [Salary]) VALUES (@SSN7, 'Paul', 'Alcorn', @Salary7);\nDECLARE @SSN8\
    \ char(11) = '561-88-3757'; DECLARE @Salary8 Money = 17349.00; INSERT INTO [dbo].[Employees]\
    \ ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN8, 'Mary', 'Alexander',\
    \ @Salary8);\nDECLARE @SSN9 char(11) = '904-55-0991'; DECLARE @Salary9 Money =\
    \ 70796.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary])\
    \ VALUES (@SSN9, 'Michelle', 'Alexander', @Salary9);\nDECLARE @SSN10 char(11)\
    \ = '293-95-6617'; DECLARE @Salary10 Money = 96956.00; INSERT INTO [dbo].[Employees]\
    \ ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN10, 'Marvin', 'Allen',\
    \ @Salary10);\nGO\n```\n\n3.  Examine the data in the Employees table using the\
    \ script `getallemployees.sql`. This script executes the following T-SQL statements:\n\
    \n```sql\nUSE ContosoHR;\nGO\n-- Use * for all columns\nSELECT * FROM dbo.Employees;\n\
    GO\n-- List out all the columns\nSELECT EmployeeID, SSN, FirstName, LastName,\
    \ Salary,\n    ledger_start_transaction_id, ledger_end_transaction_id, ledger_start_sequence_number,\n\
    \    ledger_end_sequence_number\nFROM dbo.Employees;\nGO\n```\n\nNotice there\
    \ are “hidden” columns that are not shown if you execute a `SELECT *`. Some of\
    \ these columns are `NULL` or 0 because no updates have been made to the data.\
    \ You normally will not use these columns, but you can use the ledger view to\
    \ see information about changes to the Employees table.\n\n4.  Look at the Employees\
    \ ledger view by executing the script `getemployeesledger.sql`. This script executes\
    \ the following T-SQL statements:\n\n```sql\nUSE ContosoHR;\nGO\nSELECT * FROM\
    \ dbo.Employees_Ledger;\nGO\n```\n\nThis is a view that uses the Employees table\
    \ and the ledger *history* table. Notice the ledger has the transaction information\
    \ from hidden columns in the table plus an indication of what type of operation\
    \ was performed on the ledger for a specific row.\n\n5.  Let’s look at the definition\
    \ of the ledger view by executing the script `getemployeesledgerview.sql`. This\
    \ script executes the following T-SQL statements:"
