  trans: '

    **注意** 你注意到最终测试中每秒只出现了一次闩锁启动吗？如果没有闩锁争用，为什么还会发生这种情况？这是因为仍有少数系统页（即 BOOT 和 FILE_HEADER
    页）可能存在少量闩锁争用。但这不会对性能产生影响，因此我称之为 99.99%无闩锁！


    谁赢得了测试？如果一切按计划进行，结果（按速度排序）应为：


    1.  **测试 3** – 启用 tempdb 元数据优化并启用 GAM/SGAM 并发（默认开启）。

    2.  **测试 1** – 禁用 tempdb 元数据优化并禁用 GAM/SGAM 增强功能。

    3.  **测试 2** – 启用 tempdb 元数据优化并禁用 GAM/SGAM。


    测试 3 应该获胜，因为我们开启了所有优化。


    测试 1 位居第二，因为尽管系统表页闩锁争用严重，但每次闩锁等待的时间较短。


    测试 2 表现最差，因为 GAM 页的闩锁等待时间非常长。


    注意


    请使用`restoretempdbfiles.cmd`和`restoretempdbfiles.sql`来恢复你的 tempdb 配置。


    你可能想知道，如果使用多个 tempdb 文件，测试 3 的结果会如何。结果与单个文件时几乎相同——我知道在使用多年多文件配置后，这听起来可能令人惊讶。我的建议是坚持使用推荐的多个文件数量；只需让
    SQL Server 安装程序为你配置即可。这也是我倡导“免手动”安装的另一个原因：使用默认设置运行 SQL Server 安装程序，并开启`tempdb
    metadata optimization`。然后运行你的工作负载。时间将证明我的大胆论断对你和社区而言是否会成为现实。


    ## 更多并发改进


    SQL Server 中的并发问题会损害性能和可扩展性。确保工作负载能够并发运行而不会遇到阻塞或等待问题，对于最大化你在应用程序和基础设施上的扩展投资至关重要。


    SQL Server 2022 解决了更多实际场景，包括数据库收缩和自动统计信息更新的并发问题。


    ### 数据库收缩并发


    在 SQL Server 2014 中，我们为联机索引构建添加了一个选项，可以较低优先级获取锁，称为`WAIT_AT_LOW_PRIORITY`。即使是联机索引构建（参见文档`https://docs.microsoft.com/sql/relational-databases/indexes/how-online-index-operations-work?#source-structure-activities`）也必须获取锁，并且可能需要等待。在此等待期间，其他通常可以继续的操作可能会被联机索引构建阻塞。`WAIT_AT_LOW_PRIORITY`允许通常会被阻塞的用户继续操作。


    事实证明，数据库收缩和文件收缩操作也存在同样的问题。因此，在 SQL Server 2022 中，我们为`DBCC SHRINKDATABASE`和`DBCC
    SHRINKFILE`添加了一个新的`WAIT_AT_LOW_PRIORITY`。你可以在`https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-shrinkdatabase-transact-sql`查看新语法的工作方式。通常，建议避免收缩数据库或其文件，但有时这是必要的。


    ### 自动更新统计信息并发


    在我们为 SQL Server 2022 预览版发布构建功能说明时，我认识的一位开发人员 Parag Paul 联系了我：*“Bob，你看到 SQL Server
    2022 中即将推出的自动更新统计信息改进了吗？”* 我告诉 Parag，我记得 Azure SQL 中似乎有相关内容，但不太了解细节，也不知道它会在 SQL
    Server 2022 中推出。


    我们讨论了细节，然后我想起了我的同事 Dimitri Furman 的一篇博客文章。他不仅是团队中顶级的 SQL 专家之一，也是我在微软 Azure SQL
    方面的“求助”专家之一。你可以在`https://techcommunity.microsoft.com/t5/azure-sql-blog/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687`阅读他的博文。


    问题在于，尽管可以将 SQL Server 和 Azure SQL 配置为异步自动更新统计信息，但执行更新的后台进程可能会导致并发问题。Dimitri 在博文中提供了一个非常好的详细图表和解释。实际上，该问题源于查询与需要系统元数据上架构锁的后台进程之间的并发冲突。我们引入了一个新的数据库范围配置选项`ASYNC_STATS_UPDATE_WAIT_AT_LOW_PRIORITY`。当你开启此选项时，更新统计信息的后台进程将等待所有正在运行的、可能导致并发问题的进程释放锁，实际上是以“较低优先级”运行。默认情况下，此选项是关闭的，因为它可能导致统计信息无法像预期（或目前习惯的那样）频繁更新，从而可能导致不理想的查询计划。但我们添加此选项是因为我们发现有些场景下，用户希望优先考虑并发性，而不是更频繁的定时统计信息更新。


    你可以在`https://docs.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`阅读如何配置此数据库范围选项。


    ## 可用性


    虽然所有数据和工作负载都需要安全性和性能，但任何可靠的生产系统都必须具备高可用性和可靠的灾难恢复能力。在 SQL Server 2022 中，我们提供了一系列丰富的新功能，涵盖
    Always On 可用性组、恢复与重做、备份与还原以及复制。

    '
- fmt: '### Contained Availability Groups


    At the 2018 PASS Summit, I found myself on stage with my former Microsoft colleague
    Amit Banerjee presenting the latest updates on `SQL Server 2019`. We had just
    announced the first Public Preview of `SQL Server 2019` at the Microsoft Ignite
    conference in September of 2018.


    For PASS we surprised the audience by announcing that `SQL Server 2019` would
    support instance-level object replication with `Always On Availability Groups`.
    So no longer would you have to manually replicate linked servers, `SQL Agent`
    jobs, and logins after a `failover` for a secondary replica. We literally received
    a standing ovation from the audience because this has been such a long-standing
    request. Unfortunately, we were premature in making this announcement. I remember
    when we had to make the decision not to ship this in `SQL Server 2019`. I was
    devastated, and I’m sure all the community was as well.


    In early 2022 we continued to evaluate what would be in project Dallas. We had
    already announced the Private Preview, and I remember we discussed about reviving
    this capability. In comes the heroics of Kevin Farlee, a longtime program manager
    veteran in our team, and David Liao, Principal Software Engineer on the `SQL Server`
    team. They made it their `mission` to complete the work we had started in the
    past and ship this feature in `SQL Server 2022`. We would call it `Contained Availability
    Groups`. We made a small announcement about this at the SQLBits conference in
    March of 2022 and made it more widely known when we announced `SQL Server 2022
    CTP 2.0` at `Microsoft //build`. I asked Kevin about his thoughts on the importance
    of getting this into the product:


    When we first shipped `Always On Availability Groups` in `SQL Server 2012`, it
    was very well received, and a big step forward in the HA space. However a request
    quickly popped up and has been upvoted and reinforced to this day: “It’s a pain
    to make sure all of the replica instances in an `AG` have the users, logins, permissions,
    agent jobs, and all the rest of the infrastructure configuration in sync.” Customers
    worked around this by creating jobs or manual processes to force synchronization,
    but that was not a good solution. As it turned out, some of the Azure HA configurations
    such as Managed Instance as well as Azure Arc-enabled SQL Managed Instance had
    the same challenges so we combined forces and arrived at a solution to replicate
    portions of `master` and `msdb` databases for each `AG`. This is what we now call
    `Contained AGs` when used in the `SQL Server` product. I am very happy to be able
    to ship this to customers.


    So are we, Kevin!


    #### How Does It Work?


    The concept of a `Contained Availability Group` is to include a version of the
    `master` and `msdb` system databases inside the `availability group`, along with
    user databases. If anyone connects to the `listener` of the `availability group`
    or a user database context directly inside the `AG`, any instance information
    in `master` and `msdb` will be seen from these system databases. Anyone connecting
    to the instance directly would see the normal `master` and `msdb` databases. It
    is not a copy of the instance `master` and `msdb` databases; it is a special version
    of these databases used in the context of the `AG`. On creation of a `Contained
    AG`, these system databases are empty except any existing admin logins are copied
    into the `contained AG master` so that an admin can connect to the `AG` and start
    adding instance objects.


    Figure [6-5](#525217_1_En_6_Chapter.xhtml#Fig5) shows the various components of
    a `Contained AG`.


    ![](Images/525217_1_En_6_Fig5_HTML.png)


    An illustration of various components of a `Contained A G`. `Listener` or direct
    d b context in the center is connected to primary and secondary. The primary and
    secondary are connected by log changes.


    Figure 6-5


    The `Contained AG` architecture


    When a user creates an `availability group`, there is a new syntax keyword for
    the `WITH` clause called `CONTAINED`. When this keyword is used, `SQL Server`
    will create two databases called `<agname>_master` and `<agname>_msdb` and add
    these to the `availability group`. Existing admin logins in the `master` database
    of the primary are added to the `Contained AG master`.


    When a user connects to the `listener` of the `AG` or a direct database context
    (i.e., uses the database name in the connection string), this user is considered
    in the `context` of the `Contained AG`. Any operation that would normally apply
    to `master` or `msdb` applies to the `Contained AG master` and `msdb`. For example,
    if you were connected to the `listener` and created a new `SQL Server Agent` job,
    that job would exist in `<agname>_msdb` and NOT in the `msdb` of the instance
    of the primary. Since the `<agname>_msdb` is part of the `AG`, any logged operations
    such as adding a new job are replicated to the `<agname>_msdb` on the secondary.


    If a `failover` occurs, the replicated `Contained AG master` and `msdb` will now
    be used for new primary `listener` connections.


    When I first saw this design, I was puzzled about `SQL Server Agent`. How could
    `SQL Server Agent` know to look for jobs in the `Contained AG msdb`? Well, turns
    out we enhanced `SQL Server Agent` in 2022 to recognize multiple `msdb` databases
    that may be needed to use for `Agent` jobs. Any job in the `Contained AG msdb`
    only gets executed on the `primary replica`.


    You can read more about how `Contained AGs` work at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview).


    I think you will understand further how this works by seeing an example.'
