    of SQL Server: 2017, 2019, and 2022.


    *   **Efficiency** – Patching SQL Server with a cumulative update on Windows requires
    you to install a separate program that installs the update on top of the existing
    RTM build or update. SQL Server on Linux has an upgrade option to upgrade to a
    newer CU build. Containers do not require any patching. In fact, you can’t patch
    a container. Instead, you *switch* containers. Read more in the section titled
    “**The Container Switch Method**” to see how it works.


    Here is a talk I gave at SQLBits on SQL Server containers to learn more: [`https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_Containers`](https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_Containers).


    ### Using SQL Server 2022 Containers


    I forgot to mention one of the most powerful capabilities of SQL Server containers.
    SQL Server containers are a preinstalled SQL Server (and by default Developer
    Edition, so it is free!). We have built our container images for SQL Server so
    that when you run them, SQL Server just starts up and executes. Part of the magic
    is that SQLSERVR.EXE was built to run as a standalone program (in effect, a daemon
    program) and our container image is set up to configure and start the SQL Server
    engine.'
  trans: '

    ## SQL Server 2022 容器


    我记得大约在 2010 年，在虚拟机上运行 `SQL Server` 变得非常流行。这种从裸机抽象出来的能力，以及能够将多台机器整合到一台主机上的优势，在许多方面引发了计算领域的革命。


    近年来，在 `Linux` 系统上，容器的概念对于应用程序，特别是对于开发人员来说，变得极其流行。`SQL Server 2022` 中的 `SQL Server`
    容器在技术上并没有根本性的新变化。但回顾一下为何可以使用容器、如何使用它们，以及一些它们能发挥强大作用的有趣场景，仍然非常有价值。


    请通过 [`https://aka.ms/sqlcontainers`](https://aka.ms/sqlcontainers) 随时了解关于 `SQL
    Server` 容器的最新动态。


    ### 为何使用容器？


    关于容器，我总是需要破除的一个迷思是它们被用来替代虚拟机。这实际上是可以实现的，但我发现它们通常是对虚拟机的补充。容器的一个强大用途是将应用程序整合到运行在虚拟机中的多个容器里。


    容器实际上是一个不可变镜像的实例，该镜像包含一个或多个程序，这些程序在隔离的环境中运行，并拥有完整的私有文件系统。容器仅包含从镜像运行其内部程序所必需的文件。


    例如，`SQL Server` 并不需要 `Linux` 系统上运行的每一个文件和进程。因此，现在你可以在一个虚拟机中部署多个 `SQL Server` 容器，而不是部署多个虚拟机，从而节省空间和资源使用。事实上，运行多个
    `SQL` 容器正是你可以在同一台虚拟机或 `Linux` 计算机上运行多个 `SQL Server` 实例的方式，因为我们不支持命名实例。


    关于容器的另一个迷思是，它们的性能不如普通进程，因为它们在线程、内存、I/O 等方面从底层的 `Linux` 操作系统中被抽象了出来。这并不正确。容器只是以隔离的方式在操作系统中运行（容器只知道其内部的进程），但它们可以直接访问操作系统资源。因此，在
    `Linux` 上运行的 `SQL` 容器应该与在 `Linux` 上运行的 `SQL Server` 具有相同的性能。


    注意：请确保你是在正确的环境下进行比较。`Windows` 上的 `SQL` 容器运行在由 `Windows`（或 `WSL`）托管的 `Linux` 虚拟机上。这与直接在由
    `Linux` 托管的 `Linux` 虚拟机中运行容器相比，多了一层抽象。


    容器由像 `Docker` 这样的容器运行时来运行。实际上，像 `Docker` 这样的容器运行时知道如何获取容器镜像，并使用原生的 `Linux` API（例如
    `namespaces` 和 `cgroups`）以隔离的方式执行与容器关联的程序。容器运行时还知道如何管理容器，例如停止和启动容器。


    容器还有其他优势，包括：


    *   **可移植性** – 容器可以在任何支持像 `Docker` 这样的容器运行时的操作系统上运行，并且你可以确信这是同一个容器镜像。因此，`SQL Server`
    容器可以在 `Windows`、`Linux` 或 `macOS` 上运行，并且你可以确信这是同一个 `SQL Server` 引擎。在 `Windows`
    和 `macOS` 上运行的 `Linux` 容器通过某种虚拟化技术来运行 `Linux` 程序。这种可移植性对于开发来说意义重大。无需试图维护一个供所有开发人员共享的
    `SQL Server` 开发服务器，只需为他们提供 `SQL Server` 容器，让他们在任何操作系统的自有环境中运行即可。


    *   **一致性** – 假设你希望所有开发人员都使用特定的 `SQL Server 2019`（或者当我们开始发布 `CU` 版本时的 `2022`）累积更新版本，以及特定的数据库架构和脚本。容器提供了跨任何操作系统实现此功能的能力。微软为
    `SQL Server` 主要版本（2017、2019 和 2022）的每个 `CU` 版本都制作了容器镜像。


    *   **效率** – 在 `Windows` 上为 `SQL Server` 打累积更新补丁，需要你安装一个单独的程序，该程序会在现有的 `RTM` 版本或更新之上安装更新。`SQL
    Server` 在 `Linux` 上有一个升级选项，可以升级到较新的 `CU` 版本。容器则不需要任何补丁更新。事实上，你无法给容器打补丁。取而代之的是，你可以切换容器。在标题为“容器切换方法”的部分中阅读更多信息，了解其工作原理。


    以下是我在 `SQLBits` 上做的一个关于 `SQL Server` 容器的演讲，以了解更多内容：[`https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_Containers`](https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_Containers)。


    ### 使用 SQL Server 2022 容器


    我忘了提及 `SQL Server` 容器最强大的功能之一。`SQL Server` 容器是预安装的 `SQL Server`（并且默认是 `Developer
    Edition`，所以它是免费的！）。我们为 `SQL Server` 构建的容器镜像，使得当你运行它们时，`SQL Server` 会直接启动并执行。其部分奥秘在于
    `SQLSERVR.EXE` 被设计为一个独立程序（实际上是一个守护程序）运行，而我们的容器镜像被设置用来配置和启动 `SQL Server` 引擎。

    '
- fmt: '# Running a SQL Server Container


    I dusted off my exercises from *SQL Server 2019 Revealed* where I showed readers
    the basics of running a SQL Server container. You can find the SQL Server 2022
    version of these scripts at [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers).


    How easy is it to run a SQL Server container? If you look at these scripts, you
    will find the first step is this command:


    ```

    docker run `

    -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=Sql2022isfast'' `

    --hostname sql2022 `

    -p 1401:1433 `

    -v sql2022volume:/var/opt/mssql `

    --name sql2022 `

    -d `

    mcr.microsoft.com/mssql/server:2022-latest

    ```


    This is an example using the Docker container runtime on Windows with PowerShell
    (Docker Desktop on Windows can now use the Windows Subsystem for Linux, which
    means it is run as a virtualized process and not a full Linux VM). By default
    images are cached locally on your machine. If you run a container and the image
    does not exist locally, it is first *pulled* into your local cache. You can pull
    the image yourself with the `docker pull` command.


    Let’s look at the parameters of this command to run a container:


    The `-e` parameters are to set environment variables (you can use any valid SQL
    Server Linux environment variable such as setting the edition).


    The `--hostname` parameter is nice because this becomes `@@SERVERNAME` for the
    container. This will help scenarios like DTC, replication, and linked servers.


    The `-p` parameter is a port mapping so that you can run multiple instances (multiple
    SQL instances using port `1433` would be a conflict).


    The `-v` parameter is important. It maps the local directory in the container
    private file system to persisted storage. In this case Docker takes the name `sql2022volume`
    and associates this with a directory on the storage of my local computer that
    will survive any container restart or delete operation. Otherwise, when a container
    is deleted, the private file system would be deleted, which contains databases.


    The `--name` parameter is a convenient name to use to manage the container with
    Docker (e.g., stop the container).


    The `-d` parameter runs the program in the background so any `stdout` would be
    suppressed. (Without this the `stdout` of `SQLSERVR.EXE` would be displayed, which
    is the `ERRORLOG` file entries. Removing this parameter can be helpful to debug
    problems.)


    The last parameter is the location of the container image. Microsoft hosts official
    product container images in the Microsoft Container Repository or `mcr.microsoft.com`.
    In this case the image name


    ```

    mcr.microsoft.com/mssql/server:2022-latest

    ```


    is this latest version of SQL Server 2022 images based on Ubuntu. We produce an
    image for each cumulative update. Using the “latest” tag just gives you the latest
    version. This was very convenient for me as I just changed `2019-latest` to `2022-latest`
    and at the time of the writing of this book, I got the latest preview build of
    SQL Server 2022.


    Note


    You can browse a list of container images based on RHEL at [`https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list`](https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list)
    and Ubuntu at [`https://mcr.microsoft.com/v2/mssql/server/tags/list`](https://mcr.microsoft.com/v2/mssql/server/tags/list).
    To be supported you need to make sure and run a container image that matches the
    host OS. For example, Docker on Windows with WSL is based on Ubuntu, so only the
    SQL Server images based on Ubuntu are supported. You can learn more at [`https://docs.microsoft.com/troubleshoot/sql/general/support-policy-sql-server#guidelines`](https://docs.microsoft.com/troubleshoot/sql/general/support-policy-sql-server#guidelines).


    This base SQL Server container image comes with the core SQL Server engine and
    tools like `sqlcmd`.


    Get a complete reference for Docker at [`https://docs.docker.com/reference`](https://docs.docker.com/reference).
    I’ve been using Docker for some time, and it is important that you should know
    that in 2021 Docker announced some changes to their licensing, which could affect
    your ability to use Docker Desktop for free. Read more at [`www.docker.com/blog/updating-product-subscriptions`](http://www.docker.com/blog/updating-product-subscriptions).
    SQL Server containers are OCI compliant, so they are supported by other container
    runtime engines like `podman` ([`https://podman.io`](https://podman.io)).


    Since SQL Server containers are based on Linux, all the features supported and
    not supported by SQL Server on Linux are the same. One exception in SQL Server
    2022 is that the Azure extension for SQL Server is not supported with containers.


    ## Connecting to a SQL Server Container


    Since this is the SQL Server engine, just connect to the container like you would
    any SQL Server with tools like SSMS or Azure Data Studio. Remember that if you
    used port mapping using the `-p` parameter, you need to use the new port number
    in the connection string. A simple example to connect to a container with `sqlcmd`
    outside the container can be found at [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step4_querysql.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step4_querysql.ps1).


    Since SQL Server containers include `sqlcmd` in the container image, you can also
    connect *inside* the container. Here is a script that uses `sqlcmd` inside the
    container to restore a database backup: [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step3_restoredb.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step3_restoredb.ps1).


    Speaking of backups, you can restore a backup for a SQL Server container from
    the container file system. You first need to copy the backup file into the container
    file system. You can see an example with the script at [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step2_copyintocontainer.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step2_copyintocontainer.ps1).


    ## Building a Customized Container Image


    You can see the power of containers, but what about all the other packages for
    SQL Server on Linux such as Polybase? How do they run in a SQL Server container?
    Docker includes the ability to build a new container image *based* on other images
    and a set of files like packages you install into the image. In fact, the core
    SQL Server container image is an image we build based on a base Linux OS image
    combined with our files for SQL Server.


    The `docker build` command is used to build container images. You create a text
    file called a `Dockerfile`, which contains a set of commands on how to build the
    new image. You can see an example of how to build new packages combining the core
    SQL Server container image with other SQL Linux packages at [`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples).
    `docker build` doesn’t run a container. It is used to build an image that is run
    as a container with `docker run`.


    This customization capability is very powerful. You can build your own container
    images that combine the SQL Server core image with your own set of scripts and
    even database backup files.


    One tool to help build a complex set of container images and run them including
    applications is called `docker-compose` ([`https://github.com/docker/compose`](https://github.com/docker/compose)).
    Check out this example I built (thanks to my former colleague Vin Yu) to install
    SQL Server replication with containers using `docker-compose` at [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers/replication`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers/replication).'
  raw: '#### Running a SQL Server Container


    I dusted off my exercises from *SQL Server 2019 Revealed* where I showed readers
    the basics of running a SQL Server container. You can find the SQL Server 2022
    version of these scripts at [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers).


    How easy is it to run a SQL Server container? If you look at these scripts, you
    will find the first step is this command:


    ```

    docker run `

    -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=Sql2022isfast'' `

    --hostname sql2022 `

    -p 1401:1433 `

    -v sql2022volume:/var/opt/mssql `

    --name sql2022 `

    -d `

    mcr.microsoft.com/mssql/server:2022-latest

    ```


    This is an example using the Docker container runtime on Windows with PowerShell
    (Docker Desktop on Windows can now use the Windows Subsystem for Linux, which
    means it is run as a virtualized process and not a full Linux VM). By default
    images are cached locally on your machine. If you run a container and the image
    does not exist locally, it is first *pulled* into your local cache. You can pull
    the image yourself with the docker pull command.


    Let’s look at the parameters of this command to run a container:


    The -e parameters are to set environment variables (you can use any valid SQL
    Server Linux environment variable such as setting the edition).


    The --hostname parameter is nice because this becomes @@SERVERNAME for the container.
    This will help scenarios like DTC, replication, and linked servers.


    The -p parameter is a port mapping so that you can run multiple instances (multiple
    SQL instances using port 1433 would be a conflict).


    The -v parameter is important. It maps the local directory in the container private
    file system to persisted storage. In this case Docker takes the name sql2022volume
    and associates this with a directory on the storage of my local computer that
    will survive any container restart or delete operation. Otherwise, when a container
    is deleted, the private file system would be deleted, which contains databases.


    The --name parameter is a convenient name to use to manage the container with
    Docker (e.g., stop the container).


    The -d parameter runs the program in the background so any stdout would be suppressed.
    (Without this the stdout of SQLSERVR.EXE would be displayed, which is the ERRORLOG
    file entries. Removing this parameter can be helpful to debug problems.)


    The last parameter is the location of the container image. Microsoft hosts official
    product container images in the Microsoft Container Repository or mcr.microsoft.com.
    In this case the image name


    ```

    mcr.microsoft.com/mssql/server:2022-latest

    ```


    is this latest version of SQL Server 2022 images based on Ubuntu. We produce an
    image for each cumulative update. Using the “latest” tag just gives you the latest
    version. This was very convenient for me as I just changed 2019-latest to 2022-latest
    and at the time of the writing of this book, I got the latest preview build of
    SQL Server 2022.


    Note


    You can browse a list of container images based on RHEL at [`https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list`](https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list)
    and Ubuntu at [`https://mcr.microsoft.com/v2/mssql/server/tags/list`](https://mcr.microsoft.com/v2/mssql/server/tags/list).
    To be supported you need to make sure and run a container image that matches the
    host OS. For example, Docker on Windows with WSL is based on Ubuntu, so only the
    SQL Server images based on Ubuntu are supported. You can learn more at [`https://docs.microsoft.com/troubleshoot/sql/general/support-policy-sql-server#guidelines`](https://docs.microsoft.com/troubleshoot/sql/general/support-policy-sql-server#guidelines).


    This base SQL Server container image comes with the core SQL Server engine and
    tools like sqlcmd.


    Get a complete reference for Docker at [`https://docs.docker.com/reference`](https://docs.docker.com/reference).
    I’ve been using Docker for some time, and it is important that you should know
    that in 2021 Docker announced some changes to their licensing, which could affect
    your ability to use Docker Desktop for free. Read more at [`www.docker.com/blog/updating-product-subscriptions`](http://www.docker.com/blog/updating-product-subscriptions).
    SQL Server containers are OCI compliant, so they are supported by other container
    runtime engines like **podman** ([`https://podman.io`](https://podman.io)).


    Since SQL Server containers are based on Linux, all the features supported and
    not supported by SQL Server on Linux are the same. One exception in SQL Server
    2022 is that the Azure extension for SQL Server is not supported with containers.


    #### Connecting to a SQL Server Container


    Since this is the SQL Server engine, just connect to the container like you would
    any SQL Server with tools like SSMS or Azure Data Studio. Remember that if you
    used port mapping using the -p parameter, you need to use the new port number
    in the connection string. A simple example to connect to a container with sqlcmd
    outside the container can be found at [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step4_querysql.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step4_querysql.ps1).


    Since SQL Server containers include sqlcmd in the container image, you can also
    connect *inside* the container. Here is a script that uses sqlcmd inside the container
    to restore a database backup: [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step3_restoredb.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step3_restoredb.ps1).


    Speaking of backups, you can restore a backup for a SQL Server container from
    the container file system. You first need to copy the backup file into the container
    file system. You can see an example with the script at [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step2_copyintocontainer.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step2_copyintocontainer.ps1).


    ### Building a Customized Container Image


    You can see the power of containers, but what about all the other packages for
    SQL Server on Linux such as Polybase? How do they run in a SQL Server container?
    Docker includes the ability to build a new container image *based* on other images
    and a set of files like packages you install into the image. In fact, the core
    SQL Server container image is an image we build based on a base Linux OS image
    combined with our files for SQL Server.


    The **docker build** command is used to build container images. You create a text
    file called a **Dockerfile**, which contains a set of commands on how to build
    the new image. You can see an example of how to build new packages combining the
    core SQL Server container image with other SQL Linux packages at [`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples).
    Docker build doesn’t run a container. It is used to build an image that is run
    as a container with docker run.


    This customization capability is very powerful. You can build your own container
    images that combine the SQL Server core image with your own set of scripts and
    even database backup files.


    One tool to help build a complex set of container images and run them including
    applications is called **docker-compose** ([`https://github.com/docker/compose`](https://github.com/docker/compose)).
    Check out this example I built (thanks to my former colleague Vin Yu) to install
    SQL Server replication with containers using docker-compose at [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers/replication`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers/replication).'
  trans: '

    # 运行 SQL Server 容器


    我重新整理了 *《SQL Server 2019 揭秘》* 中的练习，当时我向读者展示了运行 SQL Server 容器的基础知识。你可以在 [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers)
    找到这些脚本的 SQL Server 2022 版本。


    运行一个 SQL Server 容器有多容易？如果你查看这些脚本，你会发现第一步是这条命令：


    ```

    docker run `

    -e ''ACCEPT_EULA=Y'' -e ''MSSQL_SA_PASSWORD=Sql2022isfast'' `

    --hostname sql2022 `

    -p 1401:1433 `

    -v sql2022volume:/var/opt/mssql `

    --name sql2022 `

    -d `

    mcr.microsoft.com/mssql/server:2022-latest

    ```


    这是一个在 Windows 上使用 PowerShell 和 Docker 容器运行时的示例（Windows 上的 Docker Desktop 现在可以使用
    Windows Subsystem for Linux，这意味着它作为虚拟化进程运行，而不是一个完整的 Linux 虚拟机）。默认情况下，镜像会缓存在你的本地机器上。如果你运行一个容器而本地没有该镜像，它会首先被
    *拉取* 到你的本地缓存中。你可以使用 `docker pull` 命令自己拉取镜像。


    让我们看看运行容器的这个命令的参数：


    `-e` 参数用于设置环境变量（你可以使用任何有效的 SQL Server Linux 环境变量，例如设置版本）。


    `--hostname` 参数很好，因为它会成为容器的 `@@SERVERNAME`。这将有助于 DTC、复制和链接服务器等场景。


    `-p` 参数是一个端口映射，这样你就可以运行多个实例（多个使用端口 `1433` 的 SQL 实例会发生冲突）。


    `-v` 参数很重要。它将容器私有文件系统中的本地目录映射到持久化存储。在这个例子中，Docker 使用名称 `sql2022volume` 并将其与我本地计算机存储上的一个目录关联起来，该目录在容器重启或删除操作后仍然存在。否则，当容器被删除时，包含数据库的私有文件系统也会被删除。


    `--name` 参数是一个方便使用的名称，用于通过 Docker 管理容器（例如，停止容器）。


    `-d` 参数在后台运行程序，因此任何 `stdout` 都会被抑制。（没有这个参数，`SQLSERVR.EXE` 的 `stdout` 会被显示出来，也就是
    `ERRORLOG` 文件条目。移除这个参数有助于调试问题。）


    最后一个参数是容器镜像的位置。微软在 Microsoft Container Repository 或 `mcr.microsoft.com` 托管官方产品容器镜像。在这个例子中，镜像名称


    ```

    mcr.microsoft.com/mssql/server:2022-latest

    ```


    是这个基于 Ubuntu 的 SQL Server 2022 镜像的最新版本。我们为每个累积更新制作一个镜像。使用 “latest” 标签只会给你最新版本。这对我来说非常方便，因为我只需将
    `2019-latest` 改为 `2022-latest`，在撰写本文时，我就得到了 SQL Server 2022 的最新预览构建版本。


    注意


    你可以在 [`https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list`](https://mcr.microsoft.com/v2/mssql/rhel/server/tags/list)
    浏览基于 RHEL 的容器镜像列表，在 [`https://mcr.microsoft.com/v2/mssql/server/tags/list`](https://mcr.microsoft.com/v2/mssql/server/tags/list)
    浏览基于 Ubuntu 的列表。为了获得支持，你需要确保运行的容器镜像与主机操作系统匹配。例如，基于 WSL 的 Windows 上的 Docker 是基于
    Ubuntu 的，因此只支持基于 Ubuntu 的 SQL Server 镜像。你可以在 [`https://docs.microsoft.com/troubleshoot/sql/general/support-policy-sql-server#guidelines`](https://docs.microsoft.com/troubleshoot/sql/general/support-policy-sql-server#guidelines)
    了解更多信息。


    这个基础 SQL Server 容器镜像包含核心 SQL Server 引擎和工具，如 `sqlcmd`。


    在 [`https://docs.docker.com/reference`](https://docs.docker.com/reference) 获取
    Docker 的完整参考。我使用 Docker 已经有一段时间了，重要的是你应该知道，在 2021 年，Docker 宣布了一些对其许可的更改，这可能会影响你免费使用
    Docker Desktop 的能力。更多信息请阅读 [`www.docker.com/blog/updating-product-subscriptions`](http://www.docker.com/blog/updating-product-subscriptions)。SQL
    Server 容器符合 OCI 标准，因此它们也得到其他容器运行时引擎的支持，如 `podman` ([`https://podman.io`](https://podman.io))。


    由于 SQL Server 容器基于 Linux，SQL Server on Linux 所支持和不支持的所有功能都是一样的。SQL Server 2022
    中的一个例外是 Azure extension for SQL Server 在容器中不受支持。


    ## 连接到 SQL Server 容器


    由于这是 SQL Server 引擎，只需像连接任何 SQL Server 一样使用 SSMS 或 Azure Data Studio 等工具连接到容器。请记住，如果你使用了
    `-p` 参数进行端口映射，则需要在连接字符串中使用新的端口号。一个在容器外使用 `sqlcmd` 连接到容器的简单示例可以在 [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step4_querysql.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step4_querysql.ps1)
    找到。


    由于 SQL Server 容器在容器镜像中包含了 `sqlcmd`，你也可以在容器*内部*连接。这是一个在容器内使用 `sqlcmd` 来还原数据库备份的脚本：[`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step3_restoredb.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step3_restoredb.ps1)。


    说到备份，你可以从容器文件系统还原 SQL Server 容器的备份。你首先需要将备份文件复制到容器文件系统中。你可以在脚本 [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step2_copyintocontainer.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/containers/deploy/step2_copyintocontainer.ps1)
    中看到一个示例。


    ## 构建自定义容器镜像


    你可以看到容器的强大之处，但是像 Polybase 这样的 SQL Server on Linux 的其他软件包呢？它们如何在 SQL Server 容器中运行？Docker
    包含了基于其他镜像和一组文件（如你安装到镜像中的软件包）来构建新容器镜像的能力。实际上，核心 SQL Server 容器镜像是我们基于基础 Linux 操作系统镜像结合我们的
    SQL Server 文件构建的一个镜像。


    `docker build` 命令用于构建容器镜像。你创建一个名为 `Dockerfile` 的文本文件，其中包含一组关于如何构建新镜像的命令。你可以在 [`https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples`](https://github.com/microsoft/mssql-docker/tree/master/linux/preview/examples)
    看到如何将核心 SQL Server 容器镜像与其他 SQL Linux 软件包结合构建新软件包的示例。`docker build` 不运行容器。它用于构建一个镜像，该镜像通过
    `docker run` 作为容器运行。


    这种定制能力非常强大。你可以构建自己的容器镜像，将 SQL Server 核心镜像与你自己的一组脚本甚至数据库备份文件结合起来。


    一个帮助构建和运行复杂容器镜像（包括应用程序）的工具叫做 `docker-compose` ([`https://github.com/docker/compose`](https://github.com/docker/compose))。查看我构建的这个示例（感谢我以前的同事
    Vin Yu），它使用 `docker-compose` 通过容器安装 SQL Server 复制：[`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers/replication`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers/replication)。

