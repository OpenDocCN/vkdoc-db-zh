- fmt: "### Let’s Try It Out\n\nLet’s walk through an exercise to see how a Contained\
    \ Availability Group works. For this exercise I’m going to set up a *clusterless*\
    \ availability group. In other words, I’m not going to use a Windows cluster,\
    \ so my availability group does not have auto-failover capabilities. A clusterless\
    \ availability group is the simplest method to show a Contained Availability Group.\
    \ Because I’m using a clusterless availability group, you can also easily set\
    \ up this exercise on Linux. You can also set up your own type of availability\
    \ group and still use most of the examples here.\n\n#### Caution\n\nThe steps\
    \ for this exercise are very detailed. You need to follow each step carefully,\
    \ or this exercise will not work.\n\n## Prerequisites\n\n*   Two Virtual Machines\
    \ running Windows Server each with four vCPUs and `8Gb` RAM. The VMs need to be\
    \ on the same network and subnet. I used Azure Virtual Machines and put the two\
    \ VMs in the same resource group, which automatically puts them in the same VNet\
    \ and subnet. To make my scripts easier, I manually added each IP address for\
    \ each VM in the `C:\\windows\\system32\\drivers\\etc\\hosts` file. This allows\
    \ me to use server names instead of direct IP addresses. Designate one of the\
    \ VMs as the primary and one as the secondary. In the following steps, I’ll refer\
    \ to the primary or secondary instance or VM.\n*   SQL Server Evaluation Editon\
    \ installed on each VM with mixed-mode authentication enabled (also known as SQL\
    \ Server and Windows authentication mode). We will use SQL logins to make the\
    \ exercise simpler. You can do this during install or post install (post install\
    \ requires an instance restart).\n*   On each VM, create firewall rules that allow\
    \ incoming traffic for ports `1433` and `5022`.\n*   Enable the Always On Availability\
    \ Group feature for each SQL instance using the SQL Server Configuration Manager\
    \ and restart SQL Server. You can read more about how to do this at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/enable-and-disable-always-on-availability-groups-sql-server#SQLCM2Procedure`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/enable-and-disable-always-on-availability-groups-sql-server#SQLCM2Procedure)\
    \ (ignore the instructions about the Windows cluster). This requires an instance\
    \ restart.\n*   Use SQL Server Management Studio (`SSMS`). You can use the latest\
    \ `18.x` build, but `19.x` includes new functionality to see Contained Availability\
    \ Groups in Object Explorer and graphic interfaces to create a Contained AG. We\
    \ will “do it the hard way” in this exercise using T-SQL, but `SSMS 19.X` will\
    \ recognize a Contained AG.\n*   Get the scripts from the book samples from the\
    \ **ch06_meatandpotatoes\\availability\\containedag** directory.\n\n## Steps for\
    \ the Exercise\n\n![A screenshot of a folder titled always on high availability.\
    \ It has various folders and files under it. The cursor points to always on high\
    \ availability.](Images/525217_1_En_6_Fig6_HTML.jpg)\n*Figure 6-6: A Contained\
    \ Availability Group in SQL Server 2022*\n\n1.  Connected **directly to the instance**\
    \ using the default sysadmin login from setup, execute the script **sqlsysadminlogin.sql**\
    \ on both the primary and secondary instances. This script executes the following\
    \ T-SQL statements:\n\n    ```\n    USE master;\n    GO\n    CREATE LOGIN sqladmin\
    \ WITH PASSWORD = '$Strongpassw0rd';\n    GO\n    EXEC sp_addsrvrolemember 'sqladmin',\
    \ 'sysadmin';\n    GO\n    ```\n    You will use this login to connect to each\
    \ instance for the rest of the exercise.\n\n2.  Start the `SQL Server Agent` service\
    \ on both the primary and secondary VMs.\n\n3.  Connect with `SSMS` on the primary\
    \ VM to **both** the primary and secondary using the **sqladmin** login.\n\n4.\
    \  Execute the script **dbmcreds.sql** on both the primary and secondary instances.\
    \ This script executes the following T-SQL statements:\n\n    ```\n    USE master;\n\
    \    GO\n    CREATE LOGIN dbm_login WITH PASSWORD = '$Strongpassw0rd';\n    GO\n\
    \    CREATE USER dbm_user FOR LOGIN dbm_login;\n    GO\n    ```\n\n5.  Execute\
    \ the script **createcert.sql** only on the primary instance. This script executes\
    \ the following T-SQL statements:\n\n    ```\n    USE master;\n    GO\n    CREATE\
    \ MASTER KEY ENCRYPTION BY PASSWORD = '$Strongpassw0rd';\n    GO\n    DROP CERTIFICATE\
    \ dbm_certificate;\n    GO\n    CREATE CERTIFICATE dbm_certificate WITH SUBJECT\
    \ = 'dbm';\n    GO\n    BACKUP CERTIFICATE dbm_certificate\n    TO FILE = 'C:\\\
    Program Files\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\DATA\\dbm_certificate.cer'\n\
    \    WITH PRIVATE KEY (\n        FILE = 'c:\\Program Files\\Microsoft SQL Server\\\
    MSSQL16.MSSQLSERVER\\MSSQL\\DATA\\dbm_certificate.pvk',\n        ENCRYPTION BY\
    \ PASSWORD = '$Strongpassw0rd');\n    GO\n    ```\n    This script assumes the\
    \ default installation path for SQL Server on Windows. You will have to modify\
    \ this script if your install path is different. You will also need to modify\
    \ this script for Linux to match the correct install path.\n\n6.  Copy the files\
    \ **dbm_certificate.cer** and **dbm_certificate.pvk** from the path of the primary\
    \ VM into the same exact file path on the secondary VM (the default is `C:\\Program\
    \ Files\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\DATA`).\n\n7.  Execute\
    \ the script **importcert.sql** only on the secondary instance. This script executes\
    \ the following T-SQL statements (you will need to modify the path if it is not\
    \ the default as in the following):\n\n    ```\n    USE master;\n    GO\n    CREATE\
    \ MASTER KEY ENCRYPTION BY PASSWORD = '$Strongpassw0rd';\n    GO\n    CREATE CERTIFICATE\
    \ dbm_certificate\n        AUTHORIZATION dbm_user\n        FROM FILE = 'C:\\Program\
    \ Files\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\DATA\\dbm_certificate.cer'\n\
    \        WITH PRIVATE KEY (\n            FILE = 'c:\\Program Files\\Microsoft\
    \ SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\DATA\\dbm_certificate.pvk',\n      \
    \      DECRYPTION BY PASSWORD = '$Strongpassw0rd');\n    GO\n    ```\n\n8.  Execute\
    \ the script **dbm_endpoint.sql** on **both instances**. This script executes\
    \ the following T-SQL statements:\n\n    ```\n    USE master;\n    GO\n    CREATE\
    \ ENDPOINT [Hadr_endpoint]\n        AS TCP (LISTENER_PORT = 5022)\n        FOR\
    \ DATA_MIRRORING (\n            ROLE = ALL,\n            AUTHENTICATION = CERTIFICATE\
    \ dbm_certificate,\n            ENCRYPTION = REQUIRED ALGORITHM AES\n        \
    \    );\n    GO\n    ALTER ENDPOINT [Hadr_endpoint] STATE = STARTED;\n    GRANT\
    \ CONNECT ON ENDPOINT::[Hadr_endpoint] TO [dbm_login];\n    GO\n    ```\n\n9.\
    \  Edit the script **createag.sql**. Put in your two VM server names (that you\
    \ put in the hosts file) for `<node1>` (primary) and `<node2>` (secondary). This\
    \ script executes the following T-SQL statements:\n\n    ```\n    USE master;\n\
    \    GO\n    CREATE AVAILABILITY GROUP [ag1]\n        WITH (CLUSTER_TYPE = NONE,\
    \ CONTAINED)\n        FOR REPLICA ON\n            N'' WITH (\n               \
    \ ENDPOINT_URL = N'tcp://:5022',\n                AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n\
    \                FAILOVER_MODE = MANUAL,\n                SEEDING_MODE = AUTOMATIC,\n\
    \                SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n                ),\n\
    \            N'' WITH (\n                ENDPOINT_URL = N'tcp://:5022',\n    \
    \            AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n                FAILOVER_MODE\
    \ = MANUAL,\n                SEEDING_MODE = AUTOMATIC,\n                SECONDARY_ROLE\
    \ (ALLOW_CONNECTIONS = ALL)\n                );\n    GO\n    ALTER AVAILABILITY\
    \ GROUP [ag1] GRANT CREATE ANY DATABASE;\n    GO\n    ```\n    Notice the use\
    \ of the option `CLUSTER_TYPE = NONE` (clusterless) and `CONTAINED`. Any type\
    \ of availability group will support `CONTAINED`. I’m just using a clusterless\
    \ type to simplify the exercise.\n\n    For my system, my script looks like this:\n\
    \n    ```\n    USE master;\n    GO\n    CREATE AVAILABILITY GROUP [ag1]\n    \
    \    WITH (CLUSTER_TYPE = NONE, CONTAINED)\n        FOR REPLICA ON\n         \
    \   N'bwsql2022vm1' WITH (\n                ENDPOINT_URL = N'tcp://bwsql2022vm1:5022',\n\
    \                AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n                FAILOVER_MODE\
    \ = MANUAL,\n                SEEDING_MODE = AUTOMATIC,\n                SECONDARY_ROLE\
    \ (ALLOW_CONNECTIONS = ALL)\n                ),\n            N'bwsql2022vm2' WITH\
    \ (\n                ENDPOINT_URL = N'tcp://bwsql2022vm2:5022',\n            \
    \    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n                FAILOVER_MODE =\
    \ MANUAL,\n                SEEDING_MODE = AUTOMATIC,\n                SECONDARY_ROLE\
    \ (ALLOW_CONNECTIONS = ALL)\n                );\n    GO\n    ```"
