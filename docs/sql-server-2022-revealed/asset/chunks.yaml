  trans: '

    ## 云连接、智能且经行业验证的数据平台


    我常将 SQL Server 2019 称为现代化数据平台，因为该版本的功能远不止数据库引擎所提供的。SQL Server 2019 提供了构建数据平台所需的能力，包括数据虚拟化、强大的引擎以及机器学习服务。


    SQL Server 2022 将混合数据平台提升到了新的高度。它以前所未有的创新方式，按照您自己的条件连接到云。SQL Server 2022 内置查询智能，解决了您和开发人员当前面临的一些最常见且代价高昂的查询调优问题。并且，SQL
    Server 2022 配备了经过行业验证的数据库引擎，在安全性、可扩展性、可用性、数据虚拟化方面进行了创新，并对世界上最流行的数据库语言 `T-SQL`
    进行了增强。


    我们的 SQL Server 首席集团项目经理 Ajay Jagannathan 分享了他的看法：


    > 这是一个特别的 SQL Server 版本。在为每个主要版本的 SQL Server 进行规划时，我们都会投入大量精力来审视定义该版本的几个关键主题。这包括行业领先的创新、云原生以及任务关键型功能，最重要的是客户和社区的反馈。这帮助我们将
    SQL Server 打造成了地球上最流行的商业关系型数据库。对于 SQL Server 2022，让这个版本通过引入一些最新创新（如托管实例的 Link
    功能、通过 Azure Synapse Link 进行近实时分析以及通过 Microsoft Purview 进行治理），成为微软智能数据平台不可或缺的一部分，是至关重要的。不仅如此，我们的客户还将能够利用
    SQL Server 行业领先的任务关键型能力的进步，这些进步涵盖了围绕 T-SQL 语言、智能查询处理、性能、安全性、可用性和可扩展性等备受期待的主题。并且，通过成为第一个开箱即用支持
    Azure Arc 的版本，我们的客户可以在任何地方，在他们选择的环境中，通过混合和多云部署来利用 Azure 的优势。我不仅为整个 SQL Server
    产品团队将此版本交付给我们的客户、合作伙伴和社区所完成的工作感到自豪，而且我的好友兼同事 Bob Ward 在这本书中也做得非常出色，帮助深入探讨产品的多个领域，并为读者简化内容。阅读本书将使热情的
    SQL Server 用户清晰地理解这些功能，并有能力在其环境中最大化利用这些功能。我迫不及待地希望我们的客户开始使用 SQL Server 2022，并聆听他们利用这些功能解决业务问题的所有精彩场景。


    如果您想了解更多关于 SQL Server 2022 的安装和升级体验，可以从第 2 章开始您的旅程。


    **注意**

    对于那些安装 SQL Server 的老手来说，安装程序变化不大，因此如果您想安装 Windows 版的 Developer Edition 并直接跳到第
    3 章开始学习，请直接开始吧！安装中有一个方面会启用一些云连接功能，因此您可能需要先在第 2 章中了解更多相关信息。请记住，使用容器镜像、Linux 和 Kubernetes
    安装 SQL Server 的部署指南在第 9 章，如何通过 Azure 虚拟机部署的详细信息在第 10 章。


    # 2. 安装与升级


    您首先想做的事情之一就是安装 SQL Server 2022，以便探索它所提供的所有优秀功能。对于任何熟悉 SQL Server 的人来说，好消息是 SQL
    Server 2022 的安装体验与之前的版本基本相同，只有一些微小的改变。


    如果您是经验丰富的 SQL Server 用户，在本章中您可以回顾 SQL Server 2022 的不同之处。如果您是 SQL Server 的新手，也不必担心。首先，安装过程极其简单，我们的用户体验会引导您完成整个过程。其次，如果您需要一个“分步”流程，请直接访问我们的文档
    [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022)。


    ## 如何安装 SQL Server 2022


    您可能习惯于通过安装免费的 Developer 或 Evaluation 版 SQL Server 来开始评估该产品。SQL Server 2022 支持这两种版本，所以如果您只想直接开始，请访问
    [`https://aka.ms/getsqlserver2022`](https://aka.ms/getsqlserver2022) 并开始测试！


    我知道有些人希望在“直接获取二进制文件”之前了解更多关于 SQL Server 安装的信息。在本章的这一部分，我将回顾安装 SQL Server 的先决条件，并讨论与之前版本的差异以及部署选项。


    本章这一部分重点介绍在 Windows 上安装 SQL Server。本章后面标题为“在其他平台上部署”的部分将讨论在 Linux、容器、Kubernetes
    和 Azure 上的安装。在这些平台上部署的详细信息可以在本书的第 9 章和第 10 章中找到。


    ### 先决条件


    在 Windows 上安装 SQL Server 2022 的先决条件（包括所需资源）与之前的 SQL Server 主要版本相比没有变化，除了我们支持的特定
    Windows 操作系统版本或 Linux 发行版。和过去一样，我们将支持“官方”支持的 Windows Server 和 Windows（客户端）版本，包括所需的任何特定
    Windows 更新。请查阅 [`https://docs.microsoft.com/sql/sql-server/sql-server-2022-release-notes`](https://docs.microsoft.com/sql/sql-server/sql-server-2022-release-notes)
    上的 SQL Server 2022 发行说明，了解 SQL Server 2022 先决条件的任何可能变更。


    与之前版本的 SQL Server 相比，先决条件的一个不同之处是需要连接到 Azure 以支持一些新的*云连接*场景。最重要的要求是，如果您在安装过程中选择设置
    Azure 连接的场景，您将需要一个 Azure 订阅和一个服务主体。


    **注意**

    一些云连接场景，如托管实例和 Synapse Link，在安装过程中不需要任何特殊步骤。而像 Azure Active Directory (`AAD`)
    和 Microsoft Purview 集成这样的新功能则需要此配置。


    我将在本章后面标题为“为 SQL Server 设置 Azure 扩展”的部分描述此要求的确切步骤。我还将在本书第 3 章更详细地介绍 SQL Server
    如何连接到 Azure。


    要查找在 Windows 上安装 SQL Server 2022 所需的所有确切资源要求，请查阅文档 [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022)。

    '
- fmt: '### What Is Different for SQL Server 2022?


    Installing SQL Server 2022 on Windows using the “wizard” is remarkably similar
    to installing SQL Server from previous releases. Therefore, I won’t show you a
    “screen-by-screen” experience. See the complete set of steps at [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022).


    Note


    I will make the boastful claim that I have probably installed and uninstalled
    SQL Server 2022 more than anyone in the world. I honestly lost count from November
    2021 to November 2022 how many times I’ve installed and uninstalled SQL Server
    2022. Maybe only beat by our automation tests at Microsoft!


    Rather, I’ll discuss differences from previous releases. Let’s look at each of
    these differences from a perspective of running a SQL Server setup.


    #### Azure Extension for SQL Server


    The first option you will be presented with before choosing features is the Azure
    extension for SQL Server. The Azure extension for SQL Server feature represents
    software running on the computer or VM where SQL Server is installed to connect
    it to Azure. The capability for this extension is not new as it is found through
    `Azure Arc–enabled SQL Server` (you can read more at [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview)).
    You can still use the method in the documentation to connect SQL Server 2022 to
    Azure. We are just providing a method to do this as an integrated part of SQL
    Server setup.


    This is a big topic to cover, so to learn more about the prerequisites and how
    to fill out the information for this feature, see the section later in this chapter
    titled `Setting Up the Azure Extension for SQL Server.`


    #### Feature Differences


    There are several differences when choosing features during installation, mostly
    around features that are removed. You can see these differences by looking at
    the SQL Server 2019 setup feature selection in Figure [2-1](#525217_1_En_2_Chapter.xhtml#Fig1)
    and the features I’ve highlighted that are now removed.


    ![](Images/525217_1_En_2_Fig1_HTML.png)


    A screenshot of the S Q L server 2019. The instance features of python, java connector,
    machine learning server, and distributed replay client are highlighted.


    Figure 2-1


    SQL Server 2019 setup features with features removed highlighted


    Figure [2-2](#525217_1_En_2_Chapter.xhtml#Fig2) shows a shorter list of features
    now available during setup.


    ![](Images/525217_1_En_2_Fig2_HTML.png)


    A screenshot of the S Q L server 2022. Under the feature selection file is a list
    of instance features selected for S Q L server 2022.


    Figure 2-2


    The SQL Server 2022 feature selection


    Let’s look further at the features removed from SQL Server 2022.


    #### Removal of R, Python, and Java


    In SQL Server 2016, 2017, and 2019, we included options to install open source
    runtime packages for R, Python, and Java as part of machine learning services
    and the language extension feature. While this was convenient for many, we found
    a lot of our customers using this feature wanted to use their own runtime package.
    We also had to figure out how to update the open source packages we installed.
    Because of this, we felt it didn’t make sense to continue to install these packages
    as part of setup. In SQL Server 2022, we no longer offer these packages as an
    option during setup. If you want to use machine learning services or language
    extensions, you still must choose this feature during setup.


    Instead you can install your own packages. See the documentation at [`https://docs.microsoft.com/sql/machine-learning/install/sql-machine-learning-services-windows-install`](https://docs.microsoft.com/sql/machine-learning/install/sql-machine-learning-services-windows-install)
    to get started for R and Python. For the Java language extension, you can start
    at [`https://docs.microsoft.com/sql/language-extensions/install/windows-java`](https://docs.microsoft.com/sql/language-extensions/install/windows-java).


    #### Removal of Polybase Hadoop Connectivity with Java


    In SQL Server 2016, we introduced the concept of Polybase, the ability to query
    data in different formats and storage “where they live” using T-SQL. The original
    design translated T-SQL statements into Java code to query files in Hadoop systems.
    It was revolutionary, but the specific connection to Hadoop systems never really
    took off as a popular feature among a lot of our customers.


    In SQL Server 2022, we have discontinued providing this feature along with Polybase
    scale-out groups. You can read more about the retirement of Polybase to Hadoop
    with Java, scale-out groups, and Big Data Clusters at [`https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics/`](https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics/).
    However, the concept of Polybase is still alive and well. You will see in this
    book in Chapter [7](#525217_1_En_7_Chapter.xhtml) a new implementation of Polybase
    using REST APIs.


    Important


    In order to use Polybase REST APIs, you need to select the Polybase Query Service
    for External Data feature. This will install the Polybase services. The Polybase
    REST APIs do not use these services but are baked directly into the engine. However,
    for now you must select this feature to enable configuration options to support
    Polybase REST APIs. Polybase services for ODBC drivers also require you to select
    this feature and do use Polybase services.


    #### Removal of Machine Learning Server


    In the summer of 2022, we announced the retirement of Machine Learning Server
    and stated it would no longer be a feature in the next version of SQL Server.
    Therefore, it is not a feature option in SQL Server 2022 setup. You can read more
    about this retirement statement at [`https://docs.microsoft.com/lifecycle/announcements/microsoft-machine-learning-server-retiring`](https://docs.microsoft.com/lifecycle/announcements/microsoft-machine-learning-server-retiring).


    #### Removal of Distributed Replay


    Distributed replay is a tool to replay SQL Profiler traces and has been in the
    product for many years. We have decided to unbundle this feature from SQL Server
    installation and will make it available in a separable download package. I will
    be transparent with the readers of this book that we have not enhanced this capability
    for quite some time.


    #### Memory Recommendations


    In the past we introduced in setup the ability to configure `max server memory`
    for the instance of SQL Server, which includes *recommended* values. The recommend
    value for `max server memory` comes from our documentation at [`https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options).


    We have determined that we didn’t quite calculate this correctly, and we’ve updated
    the method in SQL Server 2022 setup. Be aware that this recommendation is very
    conservative in my opinion, so I would be careful about using it. The calculation
    for `max server memory` is ~75% of *available* free memory at the time setup is
    run. We built this to apply it across many different workloads and configurations.
    It is also important to note that this recommendation doesn’t consider other SQL
    instances, so if you run multiple SQL instances on the same server, you need to
    carefully consider the value for `max server memory` for each instance.'
