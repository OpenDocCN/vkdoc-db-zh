    SQL Server 2022 comes with enhancements to boost performance for columnstore indexes
    and batch-mode operations (which do not require columnstore in SQL Server 2019
    and later).


    #### Ordered Clustered Columnstore Index


    Both Azure Synapse Analytics and SQL Server support columnstore indexes. An entire
    book could be devoted to columnstore indexes and why they can be beneficial to
    applications. I still find this an underused feature of SQL Server. Almost any
    customer I encounter who doesn’t know columnstore immediately sees how they can
    use them once they understand how they work. If you don’t know columnstore, go
    right to the documentation to get started at [`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview).


