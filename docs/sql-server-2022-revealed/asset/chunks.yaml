- fmt: '## SQL Server on Azure Virtual Machines


    SQL Server on Azure Virtual Machines is one of the services in Azure as part of
    the `Azure SQL` family. Azure Virtual Machines are also known as Infrastructure
    as a Service (`IaaS`). You learned all the details of `SQL Server 2022` on Azure
    Virtual Machines in Chapter [10](#525217_1_En_10_Chapter) of the book. You saw
    in this chapter how to deploy, use, and manage `SQL Server 2022` in the Azure
    Virtual Machine ecosystem. You learned one of the most valuable pieces of information
    about this option. `It is just SQL Server`. It is the complete SQL Server “box
    product” running on Windows or Linux operating systems where you manage everything
    `inside` the virtual machine. Microsoft manages everything outside the virtual
    machine but also provides the necessary resources (size choices, networking, storage,
    built-in VM `HA`, etc.) for a complete managed virtual machine experience.


    Because Microsoft manages the infrastructure, we give you options called virtual
    machine sizes. Think of this like a big dinner menu for what kind of CPU speed
    you need along with how many CPUs, memory, and storage for your SQL Server. You
    can find out all the size choices at [`https://aka.ms/azurevmsizes`](https://aka.ms/azurevmsizes).


    Get started with SQL Server on Azure Virtual Machines at [`https://aka.ms/azuresqlvm`](https://aka.ms/azuresqlvm).


    ### When to Use SQL Server on Azure Virtual Machines


    If you need to choose the complete SQL Server product because you need all the
    features and services like `SSAS` or `SSRS` or your application requires a specific
    version of SQL Server but you don’t want to manage the hardware and hosts for
    a virtual machine, then SQL Server on Azure Virtual Machines could be for you.


    As you saw in Chapter [10](#525217_1_En_10_Chapter), we do provide some services
    to help you with the Azure Virtual Machine experience including easy deployment
    with the marketplace and the `SQL Server IaaS Agent extension` to help with backups,
    security updates, best practices assessment, `Microsoft Defender`, and a “SQL”
    Azure portal experience.


    Also if you are concerned you cannot build a complete `HA` solution with failover
    clusters or `Always On Availability Groups`, that is all possible in the Azure
    Virtual Machine environment.


    One big difference from SQL Server is that you pay for SQL Server on Azure Virtual
    Machines using `cloud billing`. This means that you use an Azure subscription
    to pay for using SQL Server and the virtual machine on a monthly basis. This will
    seem very different for you at first if you are used to SQL Server licensing and
    pricing. But we have some options to help. First, you can apply your existing
    SQL Server licenses using a concept called `Azure Hybrid Benefit` ([`https://aka.ms/azurehybridbenefit`](https://aka.ms/azurehybridbenefit)).
    Furthermore, you can sign up for a contract to use Virtual Machines for a longer
    period of time and get discounts called `Azure Reserved Virtual Machine Instances`.
    Also if an Azure Virtual Machine is stopped (deallocated), then you don’t pay
    for any compute costs until it is started. This could be a very nice option for
    development and testing purposes.


    Many customers are choosing this option to migrate SQL Server on-premises deployments
    because it can provide the fastest and easiest `lift-and-shift` migration experience.
    Given it is the complete SQL Server product, there shouldn’t be any application
    compatibility issues because you are just shifting where your existing SQL Server
    is hosted.


    One other point to consider: Once you deploy SQL Server on an Azure Virtual Machine,
    we have options for you to migrate online in the future to Azure SQL Managed Instance.
    So an Azure Virtual Machine could be a steppingstone for you to the complete managed
    experience.


    Get started with migration to Azure Virtual Machines at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/migrate-to-vm-from-sql-server`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/migrate-to-vm-from-sql-server).


    ## Azure SQL Managed Instance


    Let’s say that you need the complete SQL Server engine with databases and instance
    capabilities like `SQL Server Agent`, `replication`, `resource governor`, and
    `DTC`. However, you are not tied down to a version of SQL Server. In fact, you
    would love to not have to worry about patching like applying cumulative updates
    anymore. It is more than patching. You would like a SQL option that is `versionless`
    so we can provide you with new features on a much more frequent basis than SQL
    Server. And you really don’t care what the virtual machine or OS hosting SQL Server
    looks like. You want choices on number of cores, memory, storage, and even `I/O`
    latency and throughput, but don’t want to have to manage the virtual machine or
    even worry about physical placement of files.


    This all sounds very interesting. Let’s make it even better. Let’s say you would
    love to have a system that automatically executes backups and even keeps them
    around at any time you need them for a point-in-time restore. And then it would
    be nice if the system could provide built-in high availability including `Always
    On Availability Groups`. Oh, and I would love the `auto-HA` to come with a money
    back guarantee.


    Welcome to Azure SQL Managed Instance. Azure SQL Managed Instance is an example
    of `Platform as a Service` (`PaaS`) and the second option in the Azure SQL family.
    I remember telling Anna Hoffman one time about how I would summarize Azure SQL
    Managed Instance: “It is the best of SQL Server and the cloud together.” It truly
    is a `managed SQL Server`. Azure SQL Managed Instance was a large part of my last
    book, `Azure SQL Revealed`. In the book I compared SQL Server with Azure SQL Managed
    Instance at a very detailed level. Think of just about any core SQL Server feature
    you need with a managed SQL Server.


    When you connect to Azure SQL Managed instance from `SSMS`, it looks like a complete
    SQL Server! One big difference you will notice is that the option for `Always
    On Availability Groups` is missing. That is because if you choose the `Business
    Critical` service tier for Azure SQL Managed Instance, we create an `Always On
    Availability Group` behind the scenes including a free read replica. And then
    we maintain it for you. Azure SQL Managed Instance is built in the Azure ecosystem
    and uses a service fabric to support `HA` decisions. The `General Purpose` service
    tier behaves like a `Failover Cluster Instance` without having to set up a Windows
    Failover Cluster. You can even connect two instances together across regions with
    `Auto Failover Groups`. Furthermore, when you deploy Azure SQL Managed Instance,
    we provide a `Service-Level Agreement` (`SLA`) for availability, which you can
    read at [`https://azure.microsoft.com/support/legal/sla/azure-sql-sql-managed-instance/v1_0`](https://azure.microsoft.com/support/legal/sla/azure-sql-sql-managed-instance/v1_0).


    Our migration tools support migration from SQL Server to Azure SQL Managed Instance.
    You can read the migration guide at [`https://docs.microsoft.com/azure/azure-sql/migration-guides/managed-instance/sql-server-to-managed-instance-guide`](https://docs.microsoft.com/azure/azure-sql/migration-guides/managed-instance/sql-server-to-managed-instance-guide).


    Get started with Azure SQL Managed Instance today at [`https://aka.ms/azuresqlmi`](https://aka.ms/azuresqlmi).'
