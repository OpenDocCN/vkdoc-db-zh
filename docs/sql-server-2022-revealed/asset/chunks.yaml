    and doesn’t support all features. And finally Enterprise Edition has the highest
    price of any edition but with all the features and unlimited resource usage.


    SQL Server is produced by Microsoft and released through a major version such
    as SQL Server 2022\. There is no specific guarantee from Microsoft when major
    versions are released, but the pattern since 2016 is every few years. Each major
    version is updated on a regular cadence through a concept called a cumulative
    update or security update called General Distribution Release (GDR).


    SQL Server is a complete data platform and is now one of the most popular database
    products in the world. You can deploy SQL Server on laptops, desktops, servers,
    and virtual machines both private and in public clouds. Customers deploy databases
    with SQL Server from a few megabytes to several petabytes.


    Even though SQL Server solves so many data problems, the burden is on you to deploy
    and manage it. For example, SQL Server comes with a robust high-availability solution
    called Always On Availability Groups (you read about the new Contained AGs in
    this book). But the burden is on you to set it up, configure it, and keep it healthy.
    SQL Server comes with an intelligent engine helping you do your best, but the
    full SQL Server product is managed by you.


    Our main page to get started to learn everything about SQL Server is [`https://aka.ms/sqlserver`](https://aka.ms/sqlserver).


    ### When to Use SQL Server


    SQL Server is your best choice if you need complete control over all aspects of
    deploying and managing SQL Server. You want every feature that comes with the
    product, and you want the flexibility to deploy it on any type of machine or virtual
    machine. You would also want to choose SQL Server if you wanted complete control
    over configuration aspects such as physical placement of files.


    Another reason to choose SQL Server is application version requirements. Let’s
    say your company uses an application that is only supported on specific version(s)
    of SQL Server. SQL Server is going to be your only choice since options such as
    Azure SQL Managed Instance, Azure SQL Database, and Azure Arc–enabled SQL Managed
    Instance are *versionless.*


    Note


    We have worked over the last few years to convince developers and customers to
    base support on a database compatibility level (dbcompat) vs. a major version.
    You can read more at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).


    Another reason to choose SQL Server is the supported set of services outside the
    engine such as SSIS, SSAS, and SSRS. Note that only SQL Server on Windows supports
    SSAS and SSRS.


    ### Azure Arc–Enabled SQL Server


    One of the options you can use *in addition* to deploying SQL Server is to connect
    your instance to Azure through Azure Arc. You saw the process for doing this with
    SQL Server 2022 in Chapter [3](#525217_1_En_3_Chapter.xhtml) of the book. Using
    this capability allows you to see SQL Server information in the Azure portal,
    secure your SQL Server with Microsoft Defender, and perform a SQL assessment.
    You saw in Chapter [3](#525217_1_En_3_Chapter.xhtml) that for SQL Server 2022,
    you can also configure Azure Active Directory (AAD), which enables you to use
    Microsoft Purview for policy management.


    You can set up SQL Server 2012 and later on Azure Arc–enabled servers on Windows
    and Linux. Get started with Azure Arc–enabled SQL Server at [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview).


    ## Linux, Containers, and Kubernetes


    You have read in Chapter [9](#525217_1_En_9_Chapter.xhtml) details about how to
    deploy and use SQL Server on Linux, on containers, and in a Kubernetes cluster.


    Here is a summary of when these options may be best for your needs.'
  trans: '## Azure SQL Edge


    物联网设备遍布我们生活的每个角落，其存在方式或许超乎你的想象。几年前，我们启动了一个项目，旨在将数据库处理能力*下沉*到物联网设备本身。我们找到了一种巧妙的方法，将
    SQL Server 引擎的占用空间缩减到仅几百兆字节，使其能够部署在最小的物联网设备上。这样，核心引擎便可通过 SQL Linux 容器在设备上处理数据。


    即使是如此小巧的设备，也能运行列存储索引等核心引擎的基础功能。部分引擎功能（如内存中 OLTP）暂不支持，但开发者所需的大部分核心引擎功能均可使用。你可以在[`https://docs.microsoft.com/azure/azure-sql-edge/features`](https://docs.microsoft.com/azure/azure-sql-edge/features)查看所有支持的功能。


    我们深知遥测数据处理的重要性。因此，我们加入了特定功能以助力流数据、处理时序数据以及通过机器学习进行数据分析。


    对于流处理，我们整合了流行的 Kafka 流引擎，并提供了基于与 Azure 流分析相同概念的 T-SQL 流处理支持。你可以在[`https://docs.microsoft.com/azure/azure-sql-edge/stream-data`](https://docs.microsoft.com/azure/azure-sql-edge/stream-data)了解更多关于
    Azure SQL Edge 流处理的信息。


    对于时序数据，我们加入了包括`DATE_BUCKET()`、`FIRST_VALUE()`和`LAST_VALUE()`在内的 T-SQL 函数。使用这些函数的原因之一是为了帮助填补数据中的时间间隔。你在第
    8 章中已经了解到，这些 T-SQL 函数现在也存在于 SQL Server 2022 中。


    客户和开发者对 Azure SQL Edge 最兴奋的场景之一是，你可以训练机器学习模型，然后直接通过 SQL Server 在物联网设备上执行。Azure
    SQL Edge 支持 T-SQL 的`PREDICT`函数，允许开发者执行原生的 ONYX 模型。


    至此，Azure SQL Edge 的场景就完整了。你不再需要将原始遥测数据流传到 Azure 甚至边缘中心，而是可以将*数据处理下推*到设备本身。


    Azure SQL Edge 还附带数据保留功能，并支持通过 Azure 数据工厂或 SQL 数据同步进行数据同步。


    尽管 Azure SQL Edge 由包含 SQL Server Linux 引擎的容器组成，但该产品在 Azure 上的定价是按设备计费的。你可以在[`https://aka.ms/azuresqledge`](https://aka.ms/azuresqledge)获取
    Azure SQL Edge 的所有最新信息。


    ### 何时使用 Azure SQL Edge


    Azure SQL Edge 针对物联网设备部署有非常特定的用例。其小巧的占用空间和独特功能专为物联网设备场景而打造。


    ## SQL Server


    整本书都在讲述 SQL Server，但重点是 SQL Server 2022 的新特性。SQL Server 是一款授权产品，运行在 Windows 和
    Linux 操作系统上。SQL Server 也被称为“盒装产品”，因为过去我们是以盒装形式交付产品的，盒内包含文档（是的，精装书）和软件。


    SQL Server 包含数据库引擎以及*围绕*引擎的功能，如复制、Polybase、SQL Server 代理和机器学习服务。SQL Server 授权产品还包括服务，如
    SQL Server 集成服务、SQL Server 分析服务和 SQL Server 报表服务。


    SQL Server 可通过许可协议购买，或直接按实例使用每核许可模型购买。用户会选择版本以决定其愿意支付的 SQL Server 功能。你可以选择免费的
    SQL Server 版本，包括评估版、开发者版或速归版。性价比最佳的是标准版，它具备完整产品的功能范围，但有资源限制且不支持所有功能。最后，企业版是所有版本中价格最高的，但拥有所有功能且资源使用不受限。


    SQL Server 由微软公司生产，并通过诸如 SQL Server 2022 这样的主要版本发布。微软不承诺主要版本发布的确切时间，但自 2016 年以来的模式是每几年发布一次。每个主要版本会通过累积更新或称为一般分发发布的安全更新进行定期更新。


    SQL Server 是一个完整的数据平台，如今是世界上最受欢迎的数据库产品之一。你可以在笔记本电脑、台式机、服务器以及私有和公共云中的虚拟机上部署 SQL
    Server。客户使用 SQL Server 部署的数据库规模从几兆字节到几拍字节不等。


    尽管 SQL Server 能解决众多数据问题，但部署和管理它的责任在你身上。例如，SQL Server 附带一个强大的高可用性解决方案，称为 Always
    On 可用性组（你在本书中读到了新的包含可用性组）。但设置、配置和维护它的责任在于你。SQL Server 附带智能引擎以助你尽力而为，但完整的 SQL Server
    产品由你管理。


    我们学习关于 SQL Server 一切知识的主页面是[`https://aka.ms/sqlserver`](https://aka.ms/sqlserver)。


    ### 何时使用 SQL Server


    如果你需要完全控制 SQL Server 部署和管理的所有方面，SQL Server 是你的最佳选择。你希望拥有产品附带的所有功能，并希望将其灵活部署到任何类型的机器或虚拟机上。如果你还想完全控制配置方面，例如文件的物理放置，你也会选择
    SQL Server。


    选择 SQL Server 的另一个原因是应用程序的版本要求。假设你的公司使用的一个应用程序仅在特定版本的 SQL Server 上受支持。那么 SQL Server
    将是你唯一的选择，因为诸如 Azure SQL 托管实例、Azure SQL 数据库和启用 Azure Arc 的 SQL 托管实例等选项是*无版本*的。


    注意


    过去几年，我们一直在努力说服开发人员和客户基于数据库兼容级别而非主要版本来提供支持。你可以在[`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)了解更多。


    选择 SQL Server 的另一个原因是引擎外支持的服务集，如 SSIS、SSAS 和 SSRS。请注意，只有 Windows 上的 SQL Server
    才支持 SSAS 和 SSRS。


    ### 启用 Azure Arc 的 SQL Server


    除了部署 SQL Server，你还可以使用的一个选项是通过 Azure Arc 将你的实例连接到 Azure。你在本书第 3 章中看到了使用 SQL Server
    2022 完成此操作的过程。利用此功能，你可以在 Azure 门户中查看 SQL Server 信息，使用 Microsoft Defender 保护你的
    SQL Server，并执行 SQL 评估。你在第 3 章中看到，对于 SQL Server 2022，你还可以配置 Azure Active Directory，从而使你能够使用
    Microsoft Purview 进行策略管理。


    你可以在 Windows 和 Linux 的启用 Azure Arc 的服务器上设置 SQL Server 2012 及更高版本。请访问[`https://docs.microsoft.com/sql/sql-server/azure-arc/overview`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview)开始使用启用
    Azure Arc 的 SQL Server。


    ## Linux、容器和 Kubernetes


    你在第 9 章中详细阅读了如何在 Linux、容器上以及 Kubernetes 集群中部署和使用 SQL Server。


    以下是当这些选项可能最适合你需求时的总结。'
- fmt: '### When to Use SQL Server on Linux


    SQL Server on Linux is the complete "box product" supported for Linux distributions
    such as Red Hat Enterprise Linux (RHEL), Ubuntu, and SUSE Linux Enterprise Server.
    SQL Server on Linux supports all editions and is deployed through a set of downloadable
    packages native to the Linux distribution.


    There are some features from SQL Server that are not supported on Linux including
    services such as `SSAS` and `SSRS`. A list of unsupported features for SQL Server
    2022 on Linux can be found at [`https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2022#unsupported-features-and-services`](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2022#unsupported-features-and-services).


    One of the myths about SQL Server on Linux is that it doesn''t support high-availability
    features like `Always On Availability Groups`. Far from it. You saw in Chapter
    [6](#525217_1_En_6_Chapter.xhtml) of the book the use of a clusterless AG, which
    was built back in 2017 to support Linux. But SQL Server on Linux can also support
    automatic failover capabilities using software like `Pacemaker`.


    You should choose SQL Server on Linux when you have the same situation as SQL
    Server including version support or need for complete control but you want to
    run SQL Server on Linux operating systems instead of Windows. Don''t forget that
    databases are completely compatible between SQL on Windows and Linux (just back
    up and restore between them).


    ### When to Use SQL Server Containers


    As you learned in Chapter [9](#525217_1_En_9_Chapter.xhtml), a SQL Server container
    is a pre-packaged image of a preinstalled SQL Server Linux package(s). So your
    first decision on using SQL containers is that the SQL Server Linux feature set
    meets your requirements.


    Your second decision to use SQL Server containers is you have reason to use a
    container. Remember that containers don''t replace virtual machines; they complement
    them. For example, the only way to run multiple instances of SQL Server on Linux
    is to use multiple containers in a virtual machine. One myth about containers
    is that they don''t perform as fast as a SQL Server on Linux instance installed
    directly in the virtual machine or on a bare-metal server. This is simply not
    true. Containers are just processes run in an isolated fashion so they have complete
    direct access to the Linux operating system. Containers do require a container
    runtime such as `Docker`. One consideration for you is that `Docker` has announced
    some changes to their pricing and licensing, which you can read at [`www.docker.com/pricing`](http://www.docker.com/pricing).


    Note


    SQL Server container images are `OCI` compliant, so other container runtimes like
    `podman` are supported. You can find out more about `podman` at [`https://docs.podman.io/en/latest`](https://docs.podman.io/en/latest).


    Another consideration for containers is patching. Containers are never updated.
    To apply a cumulative update (CU) for SQL Server, you simply "switch" to a new
    container running the new cumulative update version. You can even safely roll
    back a CU with this type of switch operation.


    One final scenario that is very compelling for containers is developer and DevOps.
    Since containers are supported anywhere container runtimes like `Docker` run,
    SQL Server containers can be used on Windows, Linux, and MacOS systems. Furthermore,
    the default edition for SQL Server containers is Developer Edition. So as a developer
    you can build applications for SQL Server for free on any OS and assured it is
    the same SQL Server engine. How is this possible? That is because container runtimes
    like `Docker` are compatible on non-Linux systems. For Windows, `Docker` can use
    a virtual machine with Linux or Windows Subsystem for Linux. For MacOS, `Docker`
    uses a lightweight virtualization solution. In all cases, it just looks like Linux,
    so SQL Server containers run the same.


    Note


    Even though SQL Server containers run the same on all of these platforms, it is
    not fair to do a performance comparison for a SQL Server container running natively
    on "bare-metal" Linux and the container running in virtualization solutions.


    The message here is that for developers on platforms like MacOS, you have a solution
    to build applications for SQL Server without installing any Windows software.
    Check out my blog post at [`https://aka.ms/sqlmacchallenge`](https://aka.ms/sqlmacchallenge)
    for more details.


    SQL Server containers are also used to power the new local developer experience
    for `Azure SQL Database` (read more at [`https://docs.microsoft.com/azure/azure-sql/database/local-dev-experience-set-up-dev-environment?view=azuresql&tabs=vscode`](https://docs.microsoft.com/azure/azure-sql/database/local-dev-experience-set-up-dev-environment?view=azuresql&tabs=vscode)).
    In addition, SQL Server containers can be a great solution for DevOps scenarios.
    Check out my demo for this capability from Microsoft Build 2020 at [`https://docs.microsoft.com/en-us/events/build-2020/int128`](https://docs.microsoft.com/en-us/events/build-2020/int128).


    ### When to Use SQL Server on Kubernetes


    Kubernetes (`k8s`) is a software platform to execute and orchestrate containerized
    applications. The concept is that if you want to run a complete software system
    at scale with containers, you should consider running Kubernetes ([`https://kubernetes.io`](https://kubernetes.io)).
    Kubernetes provides rich networking and storage capabilities built on the Linux
    OS. It includes built-in high availability and abstraction connection capabilities
    like load balancers.


    Note


    If you want a quick fun way to learn `k8s`, you will love this video: [`https://youtu.be/4ht22ReBjno`](https://youtu.be/4ht22ReBjno).


    So if you want to run SQL Server containers on Linux in a VM or bare metal, that
    is perfectly fine for a production solution. But if you want to run many SQL Server
    containers and other containerized applications at scale, you should consider
    Kubernetes.


    Kubernetes has now been around for over a decade, and there are plenty of case
    studies on how companies, big and small, have used Kubernetes ([`https://kubernetes.io/case-studies`](https://kubernetes.io/case-studies)).
    Kubernetes can be run for free from open source, but you have to manage the entire
    solution. Kubernetes is also offered with managed solutions like `Azure Kubernetes
    Service (AKS)` on Azure Stack HCI, `RedHat OpenShift`, and `Rancher`. Kubernetes
    is also very popular in public clouds like `Azure Kubernetes Service (AKS)`, `Google
    Kubernetes Engine (GKE)`, and `Amazon Elastic Kubernetes Service (EKS)`.


    Because SQL Server supports containers, it automatically supports running in a
    Kubernetes platform. If you need built-in high availability (think HA without
    needing a Windows Failover Cluster), load balancing (think listener), and a system
    to deploy many SQL Server containers at scale, Kubernetes could be the solution
    for you. The object of execution in Kubernetes is a `pod`, which can be one or
    more groupings of containers.


    I would say for many customers I meet the learning curve for Kubernetes is usually
    the impedance to moving right to this type of solution. Even though many `k8s`
    providers provide a "managed Kubernetes" product or service, there are still concepts
    you must understand to properly use SQL Server on Kubernetes.


    You can get started with SQL Server on Kubernetes at [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s).


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```'
