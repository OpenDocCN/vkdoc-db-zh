    \ would result in slower performance of the query.\n\n*   If the memory grant\
    \ was too large for query execution, other queries could be forced to wait, especially\
    \ if multiple queries needed memory grants of a certain size. The symptom would\
    \ be a wait_type = RESOURCE_SEMAPHORE.\n\nInaccurate memory grants can occur for\
    \ many reasons. One of the most common is inaccurate cardinality estimations for\
    \ operators that feed something like a hash join or sort. It could simply be that\
