- fmt: '# Learn How to Use Delta Files


    This next exercise assumes you have completed all the prerequisites for the previous
    exercise with parquet. Furthermore, it assumes you have completed all the steps
    in the previous exercise to restore the WideWorldImporters database, configure
    Polybase, and create a master key, database-scoped credential, external data source,
    and external file format. You can leave the previous wwi bucket. You will create
    a new bucket as part of this exercise.


    All *new* scripts and files specifically for this exercise can be found in the
    `ch07_datavirt_objectstorage\datavirt\delta` folder. If you don’t want to go through
    the exercise to use minio for delta, you can view the results in the notebook
    `querydelta.ipynb`.


    Note


    The people-10m delta table is a sample delta table from a sample dataset from
    Databricks as found at [`https://docs.microsoft.com/azure/databricks/data/databricks-datasets#sql`](https://docs.microsoft.com/azure/databricks/data/databricks-datasets#sql).
    This dataset contains names, birthdates, and SSN, which are all fictional and
    don''t represent actual people. This dataset falls under the Creative Commons
    license at [`http://creativecommons.org/licenses/by/4.0/legalcode`](http://creativecommons.org/licenses/by/4.0/legalcode)
    and can be shared and provided in this book. My colleague Hugo Queiroz wrote a
    Spark job to grab the delta table from this dataset and downloaded it into all
    the files that make up the delta table. Hugo also provided many of the queries
    and ideas for this exercise. I could not have written this chapter without his
    help!


    1.  Use the minio console to create a new bucket called `delta`. Use the Upload
    folder option in the console to upload the folder from the example files called
    `people-10m`. This will create a folder under the delta bucket called `people-10m`
    with several parquet files and a folder called `_delta_log`.


    2.  Query the delta table by executing the script `querydeltatable.sql`. This
    script executes the following T-SQL statements:


    ```sql

    USE [WideWorldImporters];

    GO

    SELECT * FROM OPENROWSET

    (BULK ''/delta/people-10m'',

    FORMAT = ''DELTA'', DATA_SOURCE = ''s3_wwi'') as [people];

    GO

    ```


    There are 10 million rows in the delta table spread across all the parquet formatted
    files. It will take around 1 minute to bring back all the results. Pay attention
    to the various columns in the table. Most of the query execution time is spent
    displaying all the rows in SSMS, not actually reading the data.


    3.  By default, the delta table was partitioned by the `id` column. Let’s run
    a query to filter rows on a column that is not partitioned. Execute the script
    `querybyssn.sql`. This script executes the following T-SQL statements:


    ```sql

    USE [WideWorldImporters];

    GO

    SELECT * FROM OPENROWSET

    (BULK ''/delta/people-10m'',

    FORMAT = ''DELTA'', DATA_SOURCE = ''s3_wwi'') as [people]

    WHERE [people].ssn = ''992-28-8780'';

    GO

    ```


    This query only returns one row but takes around 4 seconds. SQL Server had to
    read all 10 million rows from the delta table, but it used a Filter operator to
    only return the one row based on `ssn`.


    4.  Now let’s run a query and filter by the id column. Execute the script `querybyid.sql`.
    This script executes the following T-SQL statements:


    ```sql

    USE [WideWorldImporters];

    GO

    SELECT * FROM OPENROWSET

    (BULK ''/delta/people-10m'',

    FORMAT = ''DELTA'', DATA_SOURCE = ''s3_wwi'') as [people]

    WHERE [people].id = 10000000;

    GO

    ```


    I specifically chose an id value that is “at the end” of one of the files. Notice
    the query comes back in ~1 second. That is because the delta table is partitioned
    by the id column; it is a form of predicate pushdown that can make queries faster.


    **Note** When you look at a query execution plan, the optimizer does not know
    the partition column for delta. The power is within the REST API calls to get
    the data from the delta table. Therefore, you may see a Filter operator after
    a remote scan. But only one row is returned from the REST API calls, so the Filter
    operator is not indicative of any performance issues. In the future, we plan to
    investigate how to make the optimizer more efficient in conjunction with delta-partitioned
    columns.


    5.  One of the concepts I mentioned with CETAS is the ability to create an external
    table based on an `OPENROWSET()` query. Let’s look at an example and at the same
    time use a folder within S3 to narrow what data to query.


    6.  Create a new set of parquet files as an external table in a new folder for
    a subset of the delta table by executing the script `createparquetfromdelta.sql`.
    This script executes the following T-SQL statements:


    ```sql

    USE [WideworldImporters];

    GO

    IF EXISTS (SELECT * FROM sys.objects WHERE NAME = ''PEOPLE10M_60s'')

    DROP EXTERNAL TABLE PEOPLE10M_60s;

    GO

    CREATE EXTERNAL TABLE PEOPLE10M_60s

    WITH

    (   LOCATION = ''/delta/1960s'',

    DATA_SOURCE = s3_wwi,

    FILE_FORMAT = ParquetFileFormat)

    AS

    SELECT * FROM OPENROWSET

    (BULK ''/delta/people-10m'', FORMAT = ''DELTA'', DATA_SOURCE = ''s3_wwi'') as
    [people]

    WHERE YEAR(people.birthDate) > 1959 AND YEAR(people.birthDate) < 1970;

    GO

    ```


    This script will create a new folder called `1960s` under the delta bucket. It
    will generate parquet files only for people in the delta table who were born in
    the 1960s (chosen because that is my birth decade).


    To be clear about the flow here, SQL Server executes the `OPENROWSET()` query
    against the delta table to bring back all 10 million rows, but then filters out
    rows based on the `WHERE` clause. It takes those results and creates a set of
    parquet files in the `/delta/1960s` folder and stores the metadata about the table
    and columns in system tables.


    7.  Use the minio console to browse the `1960s` folder under the delta bucket
    to see the new parquet files created.


    8.  Query the new external table by executing the script `query1960speople.sql`.
    This script executes the following T-SQL statements:


    ```sql

    USE [WideWorldImporters];

    GO

    SELECT * FROM PEOPLE10M_60s

    ORDER BY birthDate;

    GO

    ```


    You have now seen several examples of how to query parquet files and delta tables
    using the new REST API interfaces for S3. You have also seen some interesting
    ways to export SQL data or results of `OPENROWSET` queries into parquet formatted
    files.


    ## What Else Do You Need to Know


    Going through these exercises has allowed you to see various aspects of using
    Polybase v3 with new REST API connectors.


    There are a few details that are worth noting as you consider using this innovative
    technology:


    *   There are other options I didn’t show you for `CREATE EXTERNAL TABLE` like
    “reject options” to handle data that doesn’t match columns and data types. You
    can get a complete set of options and limitations when using external tables at
    [`https://docs.microsoft.com/sql/t-sql/statements/create-external-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-external-table-transact-sql).


    *   There are some limits when using S3 compatible storage such as the number
    of files. You can read the complete set of limits and requirements for using S3
    at [`https://docs.microsoft.com/sql/relational-databases/polybase/polybase-configure-s3-compatible`](https://docs.microsoft.com/sql/relational-databases/polybase/polybase-configure-s3-compatible).


    *   The focus of the exercises was how to use S3. You can see an example of how
    to use delta tables on `abs` and `adls` at [`https://docs.microsoft.com/sql/relational-databases/polybase/virtualize-delta`](https://docs.microsoft.com/sql/relational-databases/polybase/virtualize-delta).'
  raw: "#### Learn How to Use Delta Files\n\nThis next exercise assumes you have completed\
    \ all the prerequisites for the previous exercise with parquet. Furthermore, it\
    \ assumes you have completed all the steps in the previous exercise to restore\
    \ the WideWorldImporters database, configure Polybase, and create a master key,\
    \ database-scoped credential, external data source, and external file format.\
    \ You can leave the previous wwi bucket. You will create a new bucket as part\
    \ of this exercise.\n\nAll *new* scripts and files specifically for this exercise\
    \ can be found in the **ch07_datavirt_objectstorage\\datavirt\\delta** folder**.**\
    \ If you don’t want to go through the exercise to use minio for delta, you can\
