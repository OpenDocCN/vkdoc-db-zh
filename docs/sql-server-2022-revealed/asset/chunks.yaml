    \ MB”。\n\n图 4-8\n\n内存授权反馈已调整\n\n`IsMemoryGrantFeedbackAdjusted = YesAdjusting`\
    \ 表示反馈已根据前一次执行情况应用，用于调整内存授权。没有发生 tempdb 溢出，因此执行时间显著缩短。\n\n1.  再次执行脚本 `get_plan_feedback.sql`。你将在结果中看到\
    \ `last_query_memory_kb` 的值反映了新的、更大的内存授权。\n\n2.  此时，此场景的行为与 SQL Server 2019 完全相同，只是以前内存授权反馈仅存储在缓存的查询计划中。现在你可以看到反馈被持久化在查询存储中。执行脚本\
    \ `clear_proc_cache.sql` 以清除计划缓存。此脚本使用以下 T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImportersDW];\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n\
    \    ```\n\n3.  再次执行脚本 `execute_query.sql`。你将看到查询在几秒内完成，并使用了存储在查询存储的 feedback_data\
    \ 列中的反馈信息所提供的相同内存授权。\n\n你可以使用以下数据库作用域配置选项来禁用内存授权反馈持久化：\n\n```sql\nALTER DATABASE\
    \ SCOPED CONFIGURATION SET MEMORY_GRANT_FEEDBACK_PERSISTENCE = OFF\n```\n\n你还可以在查询提示级别使用选项\
    \ `DISABLE_MEMORY_GRANT_FEEDBACK_PERSISTENCE` 来禁用内存授权反馈持久化。\n\n现在，内存授权反馈将支持使用百分位数处理更广泛的工作负载，并将反馈持久化到查询存储中，以在服务器重启和计划缓存清除后得以保留。\n\
    \n请通过以下链接跟踪有关 SQL Server 2022 内存授权增强功能的所有最新信息：[`https://docs.microsoft.com/sql/relational-databases/performance/intelligent-query-processing-details?#percentile-and-persistence-mode-memory-grant-feedback`](https://docs.microsoft.com/sql/relational-databases/performance/intelligent-query-processing-details?#percentile-and-persistence-mode-memory-grant-feedback)。\n\
    \n## 智能查询处理器\n\n在本章中，你探索了内置查询智能的含义。简而言之，它意味着无需更改代码即可获得更快的查询。它利用了查询存储的增强功能——用于查询性能统计的内置存储现默认为新数据库启用，以及对提示和只读副本的增强。它关乎下一代智能查询处理器的能力，通过近似百分位数、优化的计划强制执行以及内存授权反馈的增强来获得更好的性能。即使不使用\
    \ SQL Server 2022 的新数据库兼容级别 160，你也能获得所有这些改进。\n\n我询问了智能查询处理器领域的高级项目经理 Kate Smith，关于她对\
    \ SQL Server 2022 中内置查询智能重要性的看法：\n\n> 在我看来，查询处理是 SQL Server 功能核心跳动的心脏。所有查询都利用它，所有查询都从中受益。智能查询处理领域的最新工作延续了这一趋势——通过允许优化器根据客户的特定需求进行自我调优，我们将需要手动干预的范围扩展，迈向自我调节系统。SQL\
    \ Server 2022 中发布的新特性在许多方面扩展了功能——解决了内存授权反馈先前的挑战，引入了优化器在使用基数估计反馈时采用不同 CE 模型的能力，创建了参数敏感计划，甚至无需用户输入即可调整查询的并行度。更重要的是，这些功能可以协同工作，无缝衔接。因此，在\
    \ SQL Server 2022 之前，一个有问题的查询可能需要多次手动调整迭代，而现在同一个查询可以在多个维度上即时调整，无需任何用户操作。这些调整可以跨重启持久化，并且可以跨不同副本应用。综合来看，最新的智能查询处理器功能将极大地减轻各地\
    \ SQL Server DBA 的负担。我很高兴看到这些功能的落地，也期待用户开始看到它们带来的好处。但请注意：我们还没完成！这个团队始终着眼未来，思考我们还能提供什么。所以，敬请期待。\n\
    \n如果你准备好了，故事在下一章会变得更加精彩。如果你准备好了切换到数据库兼容级别 160，请继续阅读下一章，了解内置查询智能如何通过解决三个由来已久的问题——参数敏感计划、基数估计模型问题和并行度——而进一步发展。\n\
    \n# 5. 内置查询智能变得更强大\n\n在第 4 章中，你了解了内置查询智能背后的历史及其承诺：无需更改代码即可获得更快的性能。你了解了 SQL Server\
    \ 2022 的新功能，如新的查询存储、内存授权反馈持久化等。这些都不需要更改为 SQL Server 2022 的新数据库兼容级别 160。\n\n如果你想获得第\
    \ 4 章中读到的所有内容，甚至更多呢？如果你将数据库兼容级别更改为 160，你肯定会获得更多。这包括以下内容：\n\n*   参数敏感计划优化\n*  \
    \ 基数估计模型反馈\n*   并行度反馈\n\n在本章中，你将了解每一项功能，包括我们要解决的问题、它们的工作原理以及如何使用它们的示例。这个故事始于试图将世界从参数嗅探中拯救出来。\n\
    \n## 参数敏感计划优化\n\n我相信 SQL Server 中的查询处理器是引擎中最健壮和最优秀的部分之一。我们在智能查询处理器上的投入表明，我们致力于适应所有类型的工作负载，无需更改代码即可获得性能提升。但多年来，一直有一种特定类型的场景是用户的一个痛点问题。\n"
- fmt: '# What Is a Parameter-Sensitive Plan?


    Consider the scenario where you build a stored procedure and use a parameter as
    input. You then use the parameter in T-SQL statements to filter data (i.e., in
    a `WHERE` clause). When a query is first compiled, the optimizer will determine
    the *value* of the parameter to make decisions on what query plan is best for
    the statement. This query plan is then used for *any* subsequent execution of
    the stored procedure regardless of the parameter value passed in, until the procedure
    is recompiled. Only one query plan can exist for a single statement in the plan
    cache. Therefore, the plan is sensitive to the value of the parameter when the
    query is first compiled. This problem is known as *parameter sniffing*.


    Note


    Many in the SQL community have said I’m the person who many years ago coined the
    term *parameter sniffing*. Some have said it was Conor Cuningham. I guess it will
    just remain a mystery.


    For many workloads and datasets, this scenario does not pose a problem. But what
    if the query plan that was built for a particular parameter value is not the best
    plan for execution of the query with other parameter values? *Some* users may
    experience poor or inconsistent performance. The problem typically happens when
    the data involved in the query to be filtered with the parameter is *skewed* –
    in other words, is not evenly distributed across values that match the parameter.


    I have personally seen this problem cause performance issues for customers for
    almost my entire three-decade career at Microsoft. You can read a few resources
    describing this problem further and the various workarounds you can try if you
    encounter this problem including


    [`https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide?#parameter-sensitivity`](https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide?#parameter-sensitivity)
    and [`https://docs.microsoft.com/azure/azure-sql/identify-query-performance-issues?#resolving-queries-with-suboptimal-query-execution-plans`](https://docs.microsoft.com/azure/azure-sql/identify-query-performance-issues?#resolving-queries-with-suboptimal-query-execution-plans)


    *But* *SQL Server 2022* *has a better solution, one that is built into the query
    processor and does not require any code changes.*


    ## Learn PSP Through a Scenario


    Here is a simple visual sequence of a scenario where PSP can cause a problem as
    seen in Figure 5-1.


    ![](Images/525217_1_En_5_Fig1_HTML.jpg)


    A schematic diagram of the scenario where P S P can cause a problem. The diagram
    is as follows. `Exec my proc 1` rightward arrow `seek`.


    **Figure 5-1**


    Stored procedure execution results in a plan with an `index seek`


    In this first scenario, a user executes a stored procedure with a parameter value
    of 1 (could be based on user input from an application). The query in the procedure
    that uses this parameter value to filter rows is compiled, and a query plan uses
    an `index seek` operator because there are only a few rows in the table that match
    a value of 1\. This query probably runs extremely fast.


    Let’s say for circumstances outside of anyone’s control, memory pressure causes
    the query plan to be evicted from the plan cache. Now what if another user comes
    in at this time and executes the same stored procedure with a parameter of 10,
    as seen in Figure 5-2?


    ![](Images/525217_1_En_5_Fig2_HTML.jpg)


    A schematic diagram of the scenario another user comes in at this time and executes
    the same stored procedure with a parameter of 10\. The diagram is as follows.
    `Exec my proc 1` and `exec my proc 1` rightward arrow `scan`.


    **Figure 5-2**


    Same stored procedure with a different parameter generates a plan with `index
    scan`


    If many rows match a value of 10 as a filter for the table, when compiling the
    new plan, the optimizer instead might use a clustered `index scan` (and even uses
    parallelism). This is perfectly normal, and for a user who is executing the procedure
    with a value of 10, the performance could be considered normal. Both users are
    now tied into the plan with a scan.


    What about the first user who now executes the procedure with a parameter of 1?
    As you can see in Figure 5-3, this situation is likely not good.


    ![](Images/525217_1_En_5_Fig3_HTML.jpg)


    A schematic diagram of the execution of the procedure with a parameter of 1\.
    The diagram is as follows. `Exec my proc 1` and `exec my proc 1` rightward arrow
    `scan`.


    **Figure 5-3**


    First user experiences performance degradation due to PSP


    A query that only needs to find a few rows could now be scanning millions of rows
    to get the result. The behavior could easily cause degradation in performance.
    Most likely, a user of the application using this procedure would simply say,
    “It just got slow all of a sudden.” Sounds familiar?


    The problem all stems from the fact that only one plan can be in cache for a specific
    T-SQL statement. And a skew of data may mean that one plan cannot meet the needs
    of various parameter values. And as a developer of the stored procedure, it is
    not your fault the data is skewed. So instead of all the workarounds and performance
    tuning madness that you may encounter, let’s look at a solution to this problem
    in `SQL Server 2022` that is quite frankly a “game changer.”


    # How It All Started


    In early 2020 I was in the Microsoft offices in Irving, Texas. In those days I
    had an actual office in the building where the CSS team lived. Since I had worked
    for CSS for so many years, when I joined the engineering team, they let me keep
    my office. And by then one of my former CSS colleagues, Jack Li, had also joined
    engineering as a developer. He kept a cube in the Irving office for his job as
    well. It was pretty late in the day, and I was going to head out when I stopped
    by Jack’s cube to see if he was in. It was my good luck he was, so we chatted
    a bit about family, some fun stories together from CSS, and how each of our jobs
    was going with engineering. And then I said to Jack, *“Hey*, what are you working
    on these days?” He is such a humble person, but he said, *“Well*, something pretty
    big actually. I’m working on some code to solve parameter sniffing.” I stopped
    for a second to take that in, and I said something like *“You are kidding m*e.
    I want to know more.” Much to the chagrin of probably both of our wives, we spent
    the next 2 hours talking about this project staying late. When we were done, I
    remember saying to him, *“Jack, this is keynote*-worthy demo material. The SQL
    world will freak out when you deliver this.”


    And as you can imagine from the timeline, the world kind of blew up, and I lost
    track of talking to Jack about this. Fast forward to spring of 2021, and I got
    an email from Jack: *“Hey*, Bob, remember the parameter sniffing project on which
    I was working? Well, it is going to happen, and we think we can put this in project
    Dallas*.”* Jack called the solution **Parameter-Sensitive Plan (PSP) optimization**.
    My work stopped that day. I called him immediately to get the scoop on the details.
    When we were done talking, I knew I really did have a keynote-worthy demo and
    a major highlight for a feature for `SQL Server 2022`.


    Note


    The reality of doing this in a keynote did happen at the PASS Community Summit
    in 2021\. And thanks to Jack for giving a demo I could use for the keynote. The
    keynote was virtual, but it was still great to do it. Check out this video at
    [`https://youtu.be/Ydlg1KpmrKU`](https://youtu.be/Ydlg1KpmrKU) and fast forward
    to about 17 minutes in. Peter Carlin introduced me to demonstrate this new capability,
    and of course the Conor and Bob show had to exist even if we were not in the same
    room or city!'
