- fmt: '### Gap Filling with FIRST_VALUE and LAST_VALUE


    When working with telemetry or measurement time series data, it is common for
    there to be *gaps* in the data usually represented by `NULL` values. SQL Server
    provides functions to fill in these gaps based on other values in the measurement
    set called `FIRST_VALUE` and `LAST_VALUE`. These functions have been in previous
    releases of SQL Server, but we now include new options in SQL Server 2022:


    **`IGNORE NULLS`** *–* Ignore null values in the dataset when computing the first/last
    value over a partition.


    **`RESPECT NULLS`** *–* Respect null values in the dataset when computing first/last
    value over a partition.


    Let’s go through an exercise:


    ![](Images/525217_1_En_8_Fig5_HTML.jpg)


    A table comprises 5 columns and 5 rows. The columns are titled time stamp, voltage
    reading, first value, and last value. They have data underneath.


    Figure 8-5


    Using `FIRST_VALUE` for gap filling


    1.  Execute the script **`setup_gapfilling.sql`** to set up the demo, which executes
    the following T-SQL statements:


    ```

    USE master;

    GO

    DROP DATABASE IF EXISTS GapFilling;

    GO

    CREATE DATABASE GapFilling;

    GO

    USE GapFilling;

    GO

    DROP TABLE IF EXISTS MachineTelemetry;

    GO

    CREATE TABLE MachineTelemetry (

    timestamp DATETIME

    , VoltageReading NUMERIC(9, 6)

    , PressureReading NUMERIC(9, 6)

    );

    GO

    INSERT INTO MachineTelemetry

    (

    [timestamp]

    , VoltageReading

    , PressureReading

    )

    VALUES

    (''2020-09-07 06:14:50.000'', NULL, NULL)

    , (''2020-09-07 06:14:51.000'', 164.990400, 7.223600)

    , (''2020-09-07 06:14:52.000'', 162.241300, 93.992800)

    , (''2020-09-07 06:14:53.000'', 163.271200, NULL)

    , (''2020-09-07 06:14:54.000'', 161.368100, 93.403700)

    , (''2020-09-07 06:14:55.000'', NULL, NULL)

    , (''2020-09-07 06:14:56.000'', NULL, 98.364800)

    , (''2020-09-07 06:14:59.000'', NULL, 94.098300)

    , (''2020-09-07 06:15:01.000'', 157.695700, 103.359100)

    , (''2020-09-07 06:15:02.000'', 157.019200, NULL)

    , (''2020-09-07 06:15:04.000'', NULL, 95.352000)

    , (''2020-09-07 06:15:06.000'', 159.183500, 100.748200);

    GO

    ```


    You can see from this script we are setting up a measurement table, which contains
    gaps or `NULL` values in some of the readings.


    2.  Execute the script **`gapfilling.sql`**, which executes the following T-SQL
    statements:


    ```

    -- Use FIRST_VALUE and LAST_VALUE to fill in gaps

    USE GapFilling;

    GO

    SELECT timestamp

    , VoltageReading

    , FIRST_VALUE (VoltageReading) IGNORE NULLS OVER (

    ORDER BY timestamp ASC ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS [FIRST_VALUE]

    , LAST_VALUE (VoltageReading) IGNORE NULLS OVER (

    ORDER BY timestamp DESC ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [LAST_VALUE]

    FROM MachineTelemetry

    ORDER BY [timestamp];

    GO

    ```


    When you look at the results, you can see how `FIRST_VALUE` and `LAST_VALUE` could
    be used to fill in gaps that are `NULL` depending on your needs.


    You can see I used the `IGNORE NULLS` clause. The syntax is a bit hard to understand,
    so let’s look at the example for `FIRST_VALUE`:


    ```

    FIRST_VALUE (VoltageReading) IGNORE NULLS OVER (

    ORDER BY timestamp ASC ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS [FIRST_VALUE]

    ```


    What this means is that the value for a given row will be the first value (ignoring
    `NULL` values) based on the current row until the end of all rows ordered by the
    `timestamp` column.


    Let’s look at some of the results to understand them. First, look at the first
    five rows as in Figure [8-5](#525217_1_En_8_Chapter.xhtml#Fig5).


    You can see the `FIRST_VALUE` column is based on the current `VoltageReading`
    row except `IGNORE NULLS` is used so the first row is actually the second row’s
    value.


    Now look at the next several rows as in Figure [8-6](#525217_1_En_8_Chapter.xhtml#Fig6).


    ![](Images/525217_1_En_8_Fig6_HTML.jpg)


    A table comprises 5 columns and 4 rows with various data. The first column indicates
    the serial number ranging between 6 and 9.


    Figure 8-6


    How `FIRST_VALUE` handles `NULL` values


    You can see here that for row 6 we have to use the value in row 9 to generate
    the “first value” because we are ignoring the `NULL` values.


    This is just an example of how you can use `FIRST_VALUE` and `LAST_VALUE` for
    gap filling. There are other uses for these functions. You can learn more about
    `FIRST_VALUE` at [`https://docs.microsoft.com/sql/t-sql/functions/first-value-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/first-value-transact-sql)
    and `LAST_VALUE` at [`https://docs.microsoft.com/sql/t-sql/functions/last-value-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/last-value-transact-sql).
    Neither of these functions requires a specific `dbcompat` level.


    ## T-SQL Is Alive and Well


    The T-SQL language has so much functionality and built-in capabilities. Our goal
    is for developers to push logic into the server vs. application code. It makes
    your application lighter and allows you to use the full power of the SQL Server
    engine, even combining these language capabilities with all the other features
    of SQL Server.


    Derek Wilson is a principal program manager in the SQL Server team, and I saw
    firsthand how he poured his heart and soul into this release. One of his areas
    of focus was T-SQL, and I asked him about the importance of our investment in
    this space. Derek said, “`I am most excited about the new T-SQL language enhancements
    that are part of this release. We have sprinkled in a few T-SQL delighters, some
    new functions, and a few extensions to the language in SQL Server 2022. Our intent
    is to continue to not only bring more language parity for cloud native or SQL
    developers who have worked with other SQL dialects, but to provide productivity
    enhancements to the language that can provide a more natural experience when writing
    SQL statements. I cannot thank the SQL Server community enough for all the support
    and fantastic feedback that continues to have a tremendous impact on the evolution
    of SQL Server and the T-SQL language space.`”'
  raw: "### Gap Filling with FIRST_VALUE and LAST_VALUE\n\nWhen working with telemetry\
    \ or measurement time series data, it is common for there to be *gaps* in the\
    \ data usually represented by NULL values. SQL Server provides functions to fill\
    \ in these gaps based on other values in the measurement set called FIRST_VALUE\
    \ and LAST_VALUE. These functions have been in previous releases of SQL Server,\
    \ but we now include new options in SQL Server 2022:\n\n**IGNORE NULLS** *–* Ignore\
    \ null values in the dataset when computing the first/last value over a partition.\n\
    \n**RESPECT NULLS** *–* Respect null values in the dataset when computing first/last\
    \ value over a partition.\n\nLet’s go through an exercise:\n\n![](Images/525217_1_En_8_Fig5_HTML.jpg)\n\
    \nA table comprises 5 columns and 5 rows. The columns are titled time stamp, voltage\
    \ reading, first value, and last value. They have data underneath.\n\nFigure 8-5\n\
    \nUsing FIRST_VALUE for gap filling\n\n1.  Execute the script **setup_gapfilling.sql**\
    \ to set up the demo, which executes the following T-SQL statements:\n\n```\n\
    \    USE master;\n    GO\n    DROP DATABASE IF EXISTS GapFilling;\n    GO\n  \
    \  CREATE DATABASE GapFilling;\n    GO\n    USE GapFilling;\n    GO\n    DROP\
    \ TABLE IF EXISTS MachineTelemetry;\n    GO\n    CREATE TABLE MachineTelemetry\
    \ (\n    timestamp DATETIME\n    , VoltageReading NUMERIC(9, 6)\n    , PressureReading\
    \ NUMERIC(9, 6)\n    );\n    GO\n    INSERT INTO MachineTelemetry\n    (\n   \
    \ [timestamp]\n    , VoltageReading\n    , PressureReading\n    )\n    VALUES\n\
    \    ('2020-09-07 06:14:50.000', NULL, NULL)\n    , ('2020-09-07 06:14:51.000',\
    \ 164.990400, 7.223600)\n    , ('2020-09-07 06:14:52.000', 162.241300, 93.992800)\n\
    \    , ('2020-09-07 06:14:53.000', 163.271200, NULL)\n    , ('2020-09-07 06:14:54.000',\
    \ 161.368100, 93.403700)\n    , ('2020-09-07 06:14:55.000', NULL, NULL)\n    ,\
    \ ('2020-09-07 06:14:56.000', NULL, 98.364800)\n    , ('2020-09-07 06:14:59.000',\
    \ NULL, 94.098300)\n    , ('2020-09-07 06:15:01.000', 157.695700, 103.359100)\n\
    \    , ('2020-09-07 06:15:02.000', 157.019200, NULL)\n    , ('2020-09-07 06:15:04.000',\
    \ NULL, 95.352000)\n    , ('2020-09-07 06:15:06.000', 159.183500, 100.748200);\n\
    \    GO\n    ```\n\nYou can see from this script we are setting up a measurement\
    \ table, which contains gaps or NULL values in some of the readings.\n\n2.  Execute\
