    因为特定的 IQP 功能依赖于 Query Store，所以正确维护和配置 Query Store 变得更加重要。你应该将 Query Store 视为一组*生产*数据（即使它是用户数据库中系统表的集合）。


    因此，请务必查阅以下关于 Query Store 最佳实践和维护的文档页面：


    - [`https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store)

    - [`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios)

    '
- fmt: '## IQP Nextgen Defaults


    When you upgrade to SQL Server 2022, several IQP features are simply “turned on”
    without any dbcompat change required. This means that you could be using a dbcompat
    level from versions of SQL Server prior to when IQP “was born,” like SQL Server
    2016 (dbcompat 130), and take advantage of new IQP features. This includes approximate
    percentile and optimized plan forcing. Let’s explain how each of these features
    works and how you can take advantage of them.


    ### Approximate Percentile


    In SQL Server 2019, we introduced a new T-SQL function called `APPROX_COUNT_DISTINCT`
    to allow you to get an approximation for the number of distinct values for a query.
    Even though this is not as accurate as using a SELECT COUNT DISTINCT, it can perform
    much faster and have an accuracy of around 97%. We have found that this type of
    function can greatly improve the performance of analytic workloads. You can read
    more about `APPROX_COUNT_DISTINCT` at [`https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql).


    SQL Server includes two functions to help an analytic workload calculate a `percentile`
    of a range of values: `PERCENTILE_CONT` (which you can read about at [`https://docs.microsoft.com/sql/t-sql/functions/percentile-cont-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/percentile-cont-transact-sql))
    and `PERCENTILE_DISC` (which you can read about at [`https://docs.microsoft.com/sql/t-sql/functions/percentile-disc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/percentile-disc-transact-sql)).


    SQL Server 2022 provides `approximate` equivalent to these two functions: `APPROX_PERCENTILE_CONT`
    and `APPROX_PERCENTILE_DISC`. These can be extremely useful for analytic workloads
    with exceptionally large sets of data. These functions will perform faster, and
    the implementation guarantees up to a 1.33% error rate within a 99% probability.
    Here is a T-SQL example for `APPROX_PERCENTILE_CONT`:


    ```

    SELECT DeptId,

    APPROX_PERCENTILE_CONT(0.10) WITHIN GROUP(ORDER BY Salary) AS ''P10'',

    APPROX_PERCENTILE_CONT(0.90) WITHIN GROUP(ORDER BY Salary) AS ''P90''

    FROM tblEmployee

    GROUP BY DeptId;

    ```


    The argument for `APPROX_PERCENTILE_CONT` is the `percentile` to compute for the
    range of data.


    You can read more about how to use `APPROX_PERCENTILE_CONT` at [`https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-cont-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-cont-transact-sql)
    and `APPROX_PERCENTILE_DISC` at [`https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-disc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-disc-transact-sql).


    I spoke with Balmukund Lakhani, Senior Program Manager at Microsoft, about why
    T-SQL users should consider using these new functions:


    In `SQL Server 2022`, we have the newest member in approximate query processing
    family: approximate percentile functions (`APPROX_PERCENTILE_CONT` for continuous
    and `APPROX_PERCENTILE_DISC` for discrete). These are aggregate functions which
    can be used in place of earlier analytic percentile functions (`PERCENTILE_CONT`
    for continuous and `PERCENTILE_DISC` for discrete) when faster performance is
    desirable at the cost of minimal error in output. Imagine a table of temperature
    sensor data which has millions of rows and you want to find 99^th percentile quickly
    with acceptable rank based error bound to take quick decisions. These functions
    can give output in a single pass with less CPU and memory usage.


    ### Optimized Plan Forcing


    `Optimized plan forcing` is a new capability in SQL Server 2022 intended to reduce
    the time it takes to compile certain queries if the query plan is forced in Query
    Store.


    Note

    Forcing a query plan in Query Store is different than using query plan hints.
    Forcing a query plan allows you to take a specific query plan in Query Store and
    “tell” the optimizer to use the plan vs. creating a new plan on compilation. You
    use the system procedure `sp_query_store_force_plan` to force a query plan.


    #### The Background


    By 2019, our engineering team along with CSS had noticed a pattern of performance
    problems for some customers called a `compile storm`. In these situations, all
    query plans were evicted from cache due to some unforeseen event (e.g., failover,
    restart, memory pressure). Then the application would immediately generate a large
    number of concurrent connections, each with queries that required compilation
    in a truly brief period.


    The typical symptom of this problem was a significant amount of CPU utilization
    across all processors (e.g., 100% CPU utilization or “pegged”). Applications were
    effectively halted as all users were running queries that required query compilation
    of significant duration. Query compilation is almost an entirely CPU-bound operation,
    and certain query patterns can take a prolonged period of time to compile and
    generate a query plan.


    For several of these examples, the problem could occur even if the customer were
    using Query Store to force a specific query plan. Even when a query plan is forced
    in Query Store, the query still must go through compilation when the plan is not
    in cache.


    #### How Does It Work?


    In SQL Server 2022, we have enhanced Query Store and the query processor to shortcut
    the time of compilation for forced query plans if we believe compilation of the
    query can take a significant amount of time. We call this concept `optimized plan
    forcing`.


    Here is how `optimized plan forcing` works:


    *   If Query Store is enabled when a query is compiled, it is eligible to have
    a `compilation script` generated if query compilation takes a significant amount
    of time. What is significant? We don’t document the threshold for this or allow
    you to change it, but it effectively means the `compilation phase` for query execution
    is affecting the overall query duration. You will see in the next section titled
    “**See It in Action**” an example**.** In addition, only queries that require
    “full optimization” (i.e., queries that don’t have trivial plans) are eligible.
    You can review all the different considerations that determine what queries are
    eligible for `optimized plan forcing` at [`https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store?#considerations`](https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store?#considerations).


    *   The compilation script is binary data encoded into the binary representation
    of the XML query plan stored in Query Store as represented by the `query_plan`
    column from the `sys.query_store_plan` view. You will not see this information
    if you “cast” the `query_plan` column to XML. It is a binary format that is not
    documented and not part of the showplan XML schema.


    *   We also mark the query plan as having a compilation script by setting the
    column `has_compile_replay_script` to `1` as seen in the `sys.query_store_plan`
    view.


    All of this happens by default in SQL Server 2022 for any dbcompat level if Query
    Store is enabled with READ_WRITE for the database. If you use `sp_query_store_force_plan`
    to force a plan that has a compilation script, the next time we need to compile
    the query, we will use the compilation script to shorten compile time. This will
    occur as long as the query plan is marked as forced in Query Store.


    When I’ve presented this concept, I have been asked, “Why would we need this feature
    if the query plan is forced?” A forced query plan simply “locks in” a specific
    query plan when a query is compiled. It doesn’t mean we don’t have to compile
    the query’s plan. If we can shortcut the time to compile the plan, it can end
    up saving a lot of CPU cycles, especially during these “compile storm” scenarios.'
