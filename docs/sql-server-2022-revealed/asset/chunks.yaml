  trans: '### 使用 FIRST_VALUE 和 LAST_VALUE 进行数据填充


    在处理遥测或测量时间序列数据时，数据中出现*缺口*是很常见的，这些缺口通常由 `NULL` 值表示。SQL Server 提供了基于测量集中其他值来填充这些缺口的函数，称为
    `FIRST_VALUE` 和 `LAST_VALUE`。这些函数在 SQL Server 的早期版本中已经存在，但我们在 SQL Server 2022
    中引入了新的选项：


    **`IGNORE NULLS`** *–* 在计算分区上的第一个/最后一个值时，忽略数据集中的空值。


    **`RESPECT NULLS`** *–* 在计算分区上的第一个/最后一个值时，尊重（考虑）数据集中的空值。


    让我们来看一个练习：


    ![](img/525217_1_En_8_Fig5_HTML.jpg)


    一个包含 5 列 5 行的表格。列标题为时间戳、电压读数、首值和末值。列下方有数据。


    图 8-5


    使用 `FIRST_VALUE` 进行数据填充


    1.  执行脚本 **`setup_gapfilling.sql`** 来设置演示环境，该脚本执行以下 T-SQL 语句：


    ```

    USE master;

    GO

    DROP DATABASE IF EXISTS GapFilling;

    GO

    CREATE DATABASE GapFilling;

    GO

    USE GapFilling;

    GO

    DROP TABLE IF EXISTS MachineTelemetry;

    GO

    CREATE TABLE MachineTelemetry (

    timestamp DATETIME

    , VoltageReading NUMERIC(9, 6)

    , PressureReading NUMERIC(9, 6)

    );

    GO

    INSERT INTO MachineTelemetry

    (

    [timestamp]

    , VoltageReading

    , PressureReading

    )

    VALUES

    (''2020-09-07 06:14:50.000'', NULL, NULL)

    , (''2020-09-07 06:14:51.000'', 164.990400, 7.223600)

    , (''2020-09-07 06:14:52.000'', 162.241300, 93.992800)

    , (''2020-09-07 06:14:53.000'', 163.271200, NULL)

    , (''2020-09-07 06:14:54.000'', 161.368100, 93.403700)

    , (''2020-09-07 06:14:55.000'', NULL, NULL)

    , (''2020-09-07 06:14:56.000'', NULL, 98.364800)

    , (''2020-09-07 06:14:59.000'', NULL, 94.098300)

    , (''2020-09-07 06:15:01.000'', 157.695700, 103.359100)

    , (''2020-09-07 06:15:02.000'', 157.019200, NULL)

    , (''2020-09-07 06:15:04.000'', NULL, 95.352000)

    , (''2020-09-07 06:15:06.000'', 159.183500, 100.748200);

    GO

    ```


    从这个脚本中可以看出，我们正在设置一个测量表，其中某些读数存在缺口或 `NULL` 值。


    2.  执行脚本 **`gapfilling.sql`**，该脚本执行以下 T-SQL 语句：


    ```

    -- 使用 FIRST_VALUE 和 LAST_VALUE 填充缺口

    USE GapFilling;

    GO

    SELECT timestamp

    , VoltageReading

    , FIRST_VALUE (VoltageReading) IGNORE NULLS OVER (

    ORDER BY timestamp ASC ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS [FIRST_VALUE]

    , LAST_VALUE (VoltageReading) IGNORE NULLS OVER (

    ORDER BY timestamp DESC ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS [LAST_VALUE]

    FROM MachineTelemetry

    ORDER BY [timestamp];

    GO

    ```


    当你查看结果时，你可以看到 `FIRST_VALUE` 和 `LAST_VALUE` 如何根据你的需要用来填充那些为 `NULL` 的缺口。


    你可以看到我使用了 `IGNORE NULLS` 子句。这个语法有点难以理解，所以让我们看一下 `FIRST_VALUE` 的例子：


    ```

    FIRST_VALUE (VoltageReading) IGNORE NULLS OVER (

    ORDER BY timestamp ASC ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS [FIRST_VALUE]

    ```


    这意味着，对于给定行的值，将是基于当前行直到按 `timestamp` 列排序的所有行的末尾的第一个值（忽略 `NULL` 值）。


    让我们看一些结果来理解它们。首先，查看前五行，如图 8-5 所示。


    你可以看到 `FIRST_VALUE` 列是基于当前的 `VoltageReading` 行，但由于使用了 `IGNORE NULLS`，所以第一行的值实际上是第二行的值。


    现在再看接下来的几行，如图 8-6 所示。


    ![](img/525217_1_En_8_Fig6_HTML.jpg)


    一个包含 5 列 4 行的表格，带有各种数据。第一列指示序号，范围在 6 到 9 之间。


    图 8-6


    `FIRST_VALUE` 如何处理 `NULL` 值


    你可以在这里看到，对于第 6 行，我们必须使用第 9 行的值来生成“首值”，因为我们忽略了 `NULL` 值。


    这只是一个如何使用 `FIRST_VALUE` 和 `LAST_VALUE` 进行数据填充的示例。这些函数还有其他用途。你可以在 [`https://docs.microsoft.com/sql/t-sql/functions/first-value-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/first-value-transact-sql)
    了解更多关于 `FIRST_VALUE` 的信息，在 [`https://docs.microsoft.com/sql/t-sql/functions/last-value-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/last-value-transact-sql)
    了解更多关于 `LAST_VALUE` 的信息。这两个函数都不需要特定的 `dbcompat` 兼容级别。


    ## T-SQL 依然充满活力


    T-SQL 语言拥有丰富的功能和内置能力。我们的目标是让开发人员将逻辑推送到服务器端，而不是应用程序代码中。这使得你的应用程序更轻量，并允许你充分利用 SQL
    Server 引擎的全部力量，甚至可以将这些语言功能与 SQL Server 的所有其他功能结合起来。


    Derek Wilson 是 SQL Server 团队的首席项目经理，我亲眼目睹了他为这个版本倾注的心血。他关注的领域之一是 T-SQL，我问他我们在这个领域投资的重要性。Derek
    说：“`我最兴奋的是作为此版本一部分的新 T-SQL 语言增强功能。我们在 SQL Server 2022 中加入了一些让 T-SQL 开发者欣喜的新函数和一些语言扩展。我们的意图不仅是继续为云原生或使用过其他
    SQL 方言的 SQL 开发人员带来更多的语言一致性，而且还要提供语言上的生产力增强，使得编写 SQL 语句时能获得更自然的体验。我无法用言语充分感谢 SQL
    Server 社区给予的所有支持和出色的反馈，这些持续对 SQL Server 的演进和 T-SQL 语言领域产生了巨大影响。`”'
- fmt: '# 9. SQL Server 2022 on Linux, Containers, and Kubernetes


    In 2016 we shocked the database industry by announcing we would be releasing SQL
    Server on Linux operating systems (you can see the original blog post by Scott
    Guthrie at [`https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux`](https://blogs.microsoft.com/blog/2016/03/07/announcing-sql-server-on-linux)).
    This announcement led to the release of SQL Server on Linux with SQL Server 2017.
    We built SQL Server on Linux using an innovative approach with software called
    the Platform Abstraction Layer (`PAL`). This allowed us to bring SQL Server on
    Linux to the marketplace quickly without rewriting the entire engine. The `PAL`
    also provided compatibility so that the core engine code remained the same, allowing
    you to back up and restore databases across operating systems. This means that
    core engine capabilities like the query processor and columnstore indexes are
    exactly the same across SQL Server on Windows and Linux. In SQL Server 2019, we
    shored up most of the features that didn’t exist in SQL Server 2017 including
    replication, `CDC`, `DTC` transactions, machine learning, and data virtualization.


    We made sure that our approach using the `PAL` would allow SQL Server to perform
    as fast as or faster than SQL Server on Windows (you can read the original `PAL`
    approach in a blog post by our engineering ream at [`https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction`](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction)).
    `TPC-H` results submitted by our partners proved the point (you can see examples
    of these at [`www.tpc.org/tpch/results/tpch_price_perf_results5.asp?resulttype=noncluster&version=3`](http://www.tpc.org/tpch/results/tpch_price_perf_results5.asp?resulttype=noncluster&version=3)).


    By supporting SQL Server on Linux, we opened up new possibilities with containers
    and support for Kubernetes. This allowed us to reach new customers and applications,
    which was never possible before.


    SQL Server 2022 continues the support for Linux, containers, and Kubernetes. This
    chapter is not a deep dive into how SQL Server on Linux works. I actually wrote
    an entire book on that topic called `Pro SQL Server on Linux`. In this chapter
    I’ll cover differences for SQL Server 2022 but also review with you some of the
    fundamentals on how you can use and optimize SQL Server on Linux, containers,
    and Kubernetes.


    ## SQL Server 2022 on Linux


    SQL Server 2022 on Linux is very similar to SQL Server 2019 with a few minor differences.
    This includes the Linux distribution versions we support, enhanced support for
    `DTC` transactions, and some features we won’t support. For all the latest information
    on SQL Server Linux, stay connected to [`https://aka.ms/sqllinux`](https://aka.ms/sqllinux).


    ### What’s New for SQL Server 2022


    SQL Server 2022 is *officially* supported on the following Linux distributions:


    *   Red Hat Enterprise Linux 8.0–8.5 Server

    *   Ubuntu 20.04 LTS

    *   SUSE Linux Enterprise Server (`SLES`) 15


    I often get questions about support for other Linux distributions like `CentOS`.
    SQL Server on Linux can run just fine on other Linux distributions, but we only
    officially support `RHEL`, `Ubuntu`, and `SLES`. These are distributions we have
    tested, and we have agreements with these companies to provide official production
    support.


    Note: We do not support running SQL Server on Linux on Windows Subsystem for Linux
    (`WSL`). However, do we support running SQL Server containers with Docker on Windows
    including `WSL` integration.


    #### New Capabilities Specific to Linux


    One thing that is new for SQL Server 2022 for Linux is managing `DTC` transactions.
    We added `DTC` support for Linux in SQL Server 2019. However, there is limited
    support for monitoring and managing transactions, especially when there is an
    issue. In SQL Server 2022 we were able to add `WMI` support within the `PAL` to
    support this new capability. You can read more at [`https://docs.microsoft.com/sql/linux/sql-server-linux-configure-msdtc`](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-msdtc).


    Also, as I described in Chapter [6](#525217_1_En_6_Chapter.xhtml) of the book,
    we now support `T-SQL` snapshot backups, so you can perform snapshot backups on
    Linux without writing a `VDI` program or relying on programs like Windows `VSS`.


    There are some new enhancements for SQL Server 2022 that we do not support:


    *   Azure extension for SQL Server during setup (you can use a different method
    to install the extension)

    *   Multiple `TCP` connections for Distributed Availability Groups

    *   `TLS 1.3`

    *   Intel `QAT` backup compression

    *   Microsoft Purview policies


    Note: `Synapse Link` requires the self-hosted integration runtime (`SHIR`) as
    you learned in Chapter [3](#525217_1_En_3_Chapter.xhtml) of the book. `SHIR` only
    works on the Windows `OS`, but you can direct it to connect to a SQL Server on
    Linux instance.


    This was the list at the time of the writing of this book. It is possible that
    we have added support for these features by the time we ship SQL Server 2022.
    Keep up with all the latest details at [`https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2022#unsupported-features-and-services`](https://docs.microsoft.com/sql/linux/sql-server-linux-editions-and-components-2022#unsupported-features-and-services).


    I received a question when presenting early on about SQL Server 2022 that went
    like this: “Bob, it doesn’t seem like you are investing much these days on Linux.”
    My response was that we are. We may not be investing in new features that are
    specific to Linux, but look at all the rich capabilities in the engine that work
    on both Windows and Linux including cloud-connected features, built-in query intelligence,
    Ledger for SQL Server, `tempdb`, Contained `AGs`, `REST`-based `Polybase`, and
    new `T-SQL` enhancements. That is the power of the compatible story we built for
    SQL Server on Linux.'
