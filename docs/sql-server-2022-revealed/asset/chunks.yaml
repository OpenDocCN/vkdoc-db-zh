- fmt: 'If you want to delete the Synapse workspace, you should first stop all linked
    connections and delete the linked service to ensure SQL Server is fully aware
    that Synapse Link is disabled. Otherwise, you might run into log truncation issues.


    You should know that you can create multiple linked connections for the same database,
    but you cannot add the same source table in more than one linked connection.


    ### Landing zone storage


    The initial snapshot of tables creates a parquet file for which the size will
    vary based on how much data is in the SQL source table. Changes to SQL Server
    data result in a series of `CSV` and manifest files. We don’t support you reading
    or directly changing the landing zone, so these files will remain in the landing
    zone until they are cleaned up. Cleanup happens in the background on a periodic
    basis or if the link connection is stopped (all files are removed).


    ### SQL pool table index types


    For SQL pool tables that are targets for Synapse Link, you have choices when you
    set up the linked connection for index types. To learn about possible index choices
    for your workload, read our documentation at [`https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/sql-data-warehouse-tables-index`](https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/sql-data-warehouse-tables-index).


    A nice deep dive by Steve Howard that talks about some of these choices and others
    can be found at [`https://techcommunity.microsoft.com/t5/azure-synapse-analytics-blog/synapse-link-for-sql-deep-dive/ba-p/3567645`](https://techcommunity.microsoft.com/t5/azure-synapse-analytics-blog/synapse-link-for-sql-deep-dive/ba-p/3567645).


    ### Transaction Consistency


    Synapse Link is designed to only submit changes that are committed to the landing
    zone. This is a similar concept as replication and CDC technologies. For fault
    tolerance Synapse Link tracks Log Sequence Numbers (`LSNs`) to understand which
    transactions are committed to be fed into the landing zone.


    You should expect any performance impact for Synapse Link to be similar to replication
    or `CDC`. One difference is that changes are kept in in-memory queues before being
    published to the landing zone, so performance to the original transactions can
    be less than other change feed technologies. We limit the size of what data is
    kept in queues and publish them to the landing zone to ensure we don’t overcommit
    memory for these queues.


    The one issue to keep track of is transaction log truncation. Like replication,
    we cannot truncate transactions from the log that have not been committed to the
    landing zone if they involve a table that is enabled for Synapse Link. So latency
    or issues with the landing zone can affect the ability to truncate the log.


    Another option for Synapse Link is transaction consistency across tables. While
    this option may allow you to use small `DWU` options and core counts on Synapse,
    it affects latency of changes applied to Synapse SQL pool tables.


    ### Monitoring Synapse Link


    You have several methods to monitor Synapse Link including some that are available
    in Synapse Studio as you have seen in the exercises in this chapter.


    You also have a series of system tables in SQL Server under the `changefeed` schema
    of the database you can query to see settings, table groups, and tables including
    some performance statistics.


    There are also Dynamic Management Views (`DMVs`) you can use including `sys.dm_change_feed_errors`
    and `sys.dm_change_feed_log_scan_sessions`.


    If you need to do deep debugging for Synapse Link, there are a series of Extended
    Events you can use. Search for names in `sys.dm_xe_objects` that start with `synapse_link`.


    I’ve also observed a number of wait types in `sys.dm_os_wait_stats` that include
    the name `synapse`, so you can look at some of these waits using the following
    query:


    ```sql

    select * from sys.dm_os_wait_stats where wait_type like ''%synapse%''

    ```


    ### Limits and Restrictions


    There are some limits and restrictions for Synapse Link. These limits are evolving
    and could even be updated by the time SQL Server 2022 becomes generally available.
    I built the exercises in this book to ensure they would work with limits documented
    during the preview.


    You will find in the documentation certain limits such as source data types, size
    of rows, the need for a primary key, and unsupported features such as replication,
    `CDC`, and In-Memory `OLTP`. Keep track of the detailed list at [`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/synapse-link-for-sql-known-issues`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/synapse-link-for-sql-known-issues).


    Synapse Link is supported when using `SQL HA` features like `Always On Availability
    Groups`. In an `AG` scenario, you need to use the name of the listener for the
    `SQL Server` name to ensure `SHIR` always connects to the primary.


    ## Synapse Link Could Change Analytics for You


    There are many ways to run analytic workloads in some cases directly against SQL
    Server. But if you are looking to separate your primary SQL Server application
    from analytic workloads, Synapse Link could be a great solution. The ability to
    have SQL Server automatically capture changes and feed them to Synapse is a compelling
    story.


    I asked Chuck Heinzelman, Principal Program Manger over analytics for SQL Server,
    his thoughts about Synapse Link: “Azure Synapse Link for SQL allows customers
    to automatically move data from their transactional systems into an `MPP`-based
    analytical system without having to write `ETL` code for the data movement. In
    addition to the low code/no code approach, customers can benefit from near-real-time
    data movement as opposed to batch-based processing that comes with traditional
    `ETL` systems.”


    ## Azure Active Directory (AAD) Authentication


    For as long as SQL Server has been a product, it has supported SQL authentication,
    the simplest but not the most secure method to log in to SQL Server. As far back
    as SQL Server 4.2 for Windows NT (I had to go back verify this with my old, printed
    manuals), SQL Server has supported a concept to log in using integrated authentication
    with the operating system. In SQL Server 4.2 we called this `Integrated Security`.
    Windows NT supported the concept of a directory server, which can be used to authenticate
    accounts. This technology would eventually become Active Directory (`AD`) for
    Windows Server. SQL Server has therefore supported the ability to create logins
    based on `AD` accounts and authenticate these logins using servers that support
    `AD` (domain controllers). Today we call this Windows authentication for SQL Server.


    Along comes Azure Active Directory (`AAD`). `AAD` is a managed service for authentication
    for all types of applications and services. Think of this as a Microsoft managed
    set of domain controllers that you can use to create your own directory, users,
    groups, and authentication schemes.


    Because Azure SQL Database and Azure SQL Managed Instance are `PaaS` services,
    you can’t deploy your own domain controller for Active Directory. Therefore, in
    order to support an alternative to SQL authentication, we added support for logins
    and users for Azure SQL using `AAD`. Now you could add a login like the following
    to Azure SQL:


    ```sql

    CREATE LOGIN [bob@contoso.com] FROM EXTERNAL PROVIDER

    GO

    ```


    The new `EXTERNAL PROVIDER` syntax indicates to SQL to use `AAD` for authentication.
    To use `AAD` with Azure SQL, consult our documentation at [`https://docs.microsoft.com//azure/azure-sql/database/authentication-aad-overview`](https://docs.microsoft.com//azure/azure-sql/database/authentication-aad-overview).


    Now with SQL Server 2022, we have taken our implementation to support `AAD` and
    added this to SQL Server. The syntax is almost identical with Azure SQL. The engine
    itself already has all the code to support `AAD` from Azure SQL. The only difference
    is your SQL Server is probably not running in Azure and the virtual machine or
    computer is in your network.'
