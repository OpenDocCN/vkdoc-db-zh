- fmt: "### The Container Switch Method\n\nI mentioned earlier in this chapter that\
    \ you don’t patch SQL Server containers. You `switch` them to apply a cumulative\
    \ update. Here is how the magic works. When you run a container and specify a\
    \ persistent volume with the `-v` command, any files in this volume survive a\
    \ container restart or delete. If you put your SQL Server database files (including\
    \ system databases) into a directory that is mapped to persisted storage, you\
    \ can `point` any SQL Server container to this volume, one at time.\n\nIn addition,\
    \ SQL Server cumulative updates are compatible with each other in a major version.\
    \ Therefore, I could do the following:\n\n1.  Start a SQL Server 2022 RTM container\
    \ image, pointing it to a persisted volume for `/var/opt/mssql`.\n2.  Let’s say\
    \ the first cumulative update for SQL Server 2022 comes out and I want to use\
    \ it.\n3.  Stop the SQL Server 2022 RTM container.\n4.  Then run a new SQL Server\
    \ container based on SQL Server 2022 CU1, pointing it to the same persisted volume.\
    \ The new SQL Server will start up and recognize the new master database and user\
    \ databases. In a manner of minutes, I’ve updated SQL Server.\n5.  Let’s now say\
    \ a problem occurs and you want to roll back to the SQL Server 2022 RTM container.\n\
    6.  Stop the new SQL Server 2022 CU1 container and start the SQL Server 2022 RTM\
    \ container. Within a few minutes, you have rolled back.\n\nYou can see examples\
    \ of how to do this with SQL Server 2019 from *SQL Server 2019 Revealed* at [`https://github.com/microsoft/bobsql/tree/master/sql2019book/ch7_inside_sql_containers/update/dockerpowershell`](https://github.com/microsoft/bobsql/tree/master/sql2019book/ch7_inside_sql_containers/update/dockerpowershell).\n\
    \n### SQL Server 2022 on Kubernetes\n\nSupporting Linux for SQL Server opened\
    \ up a whole new world for us, including containers. Containers opened up the\
    \ world to us for Kubernetes. Do you want to learn Kubernetes in a fun way? Nothing\
    \ compares to The Illustrated Children’s Guide to Kubernetes at [`https://youtu.be/4ht22ReBjno`](https://youtu.be/4ht22ReBjno).\n\
    \n### Why k8s\n\nKubernetes originated at Google. The founders of Kubernetes like\
    \ Brendan Burns (who now works for Microsoft) wanted a way to run containers at\
    \ scale. Linux on its own didn’t provide for this, so they built a set of software\
    \ services on top of Linux called Kubernetes. Brendan has built a really nice\
    \ playlist of videos explaining Kubernetes at [`www.youtube.com/watch?v=daVUONZqn88&list=PLLasX02E8BPCrIhFrc_ZiINhbRkYMKdPT`](http://www.youtube.com/watch?v=daVUONZqn88&list=PLLasX02E8BPCrIhFrc_ZiINhbRkYMKdPT).\n\
    \nSince SQL Server supports containers, why not also support Kubernetes? Okay,\
    \ enough of that long word. Let’s use `k8s` (k<eight letters>s) like the cool\
    \ kids do. Admittedly the support for SQL Server on `k8s` is very basic. You can\
    \ deploy SQL Server, connect to the instance, and store data in persisted storage.\
    \ But `k8s` does provide some nice built-in capabilities like load balancers and\
    \ basic high availability. If you are looking for a complete managed experience\
    \ using `k8s` and SQL Server, you should take a look at Azure Arc–enabled SQL\
    \ Managed Instance (Arc SQL MI) ([`https://aka.ms/azurearcsqlmi`](https://aka.ms/azurearcsqlmi)).\n\
    \nKeep up to date on the latest with SQL Server on `k8s` at [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s).\
    \ You can also watch a presentation I did for SQLBits to dive deeper at [`https://youtu.be/USfCJDoCMr8`](https://youtu.be/USfCJDoCMr8).\n\
    \nIt is worth understanding the basics so you can see how SQL Server on `k8s`\
    \ works and whether it could be a platform for you to scale many SQL Server containers.\n\
    \n### Deploying SQL Server on k8s\n\nLet’s look at the basics of deploying a single\
    \ SQL Server container on `k8s`.\n\n#### What Are the Major Components of k8s?\n\
    \nThere a few terms for `k8s` you need to understand when you see the deployment\
    \ experience. This is a very basic set of definitions. For a more complete reference\
    \ to these components and architecture, see the `k8s` documentation at [`https://kubernetes.io/docs/concepts/overview/components`](https://kubernetes.io/docs/concepts/overview/components).\n\
    \nLet’s review these components through Figure [9-1](#525217_1_En_9_Chapter.xhtml#Fig1)\
    \ (not all components are shown here).\n\n![](Images/525217_1_En_9_Fig1_HTML.png)\n\
    \nFigure 9-1 `k8s` components\n\n*   `Cluster`\n    Think of a cluster like a\
    \ host that contains all the `k8s` internal software and a series of virtual machines\
    \ or nodes (can be physical servers) to run containers.\n*   `Node`\n    Think\
    \ of a node like a virtual machine (it can be a physical machine) that can help\
    \ orchestrate other nodes or run user programs as containers.\n*   `Control plane`\n\
    \    All the internal `k8s` software that runs the system is called the control\
    \ plane and runs on every node. For example, `k8s` is all API based, so the API\
    \ server can take requests and orchestrate across nodes.\n*   `Pod`\n    A pod\
    \ is defined as one or more containers to execute on a node. It is the smallest\
    \ component of execution in the `k8s` system.\n*   `Container runtime`\n    Since\
    \ containers are at the heart of execution of pods, a container runtime like Docker\
    \ must exist on all nodes to pull container images and run containers.\n*   `Namespace`\n\
    \    A namespace is a logical group of `k8s` objects and makes it very convenient\
    \ to organize projects. Every `k8s` system has a default namespace, but I recommend\
    \ you always create other namespaces for your pods and other `k8s` objects.\n\
    *   `Load balancer service`\n    You have seen connection abstraction with SQL\
    \ Server in the form of a listener. Think of a load balancer service (another\
    \ type is called a node port) as a listener. A load balancer is a way to abstract\
    \ a connection to a fixed IP address and port so that if the underlying IP address\
    \ changes, it will always be directed to the right location.\n*   `Storage class`\
    \ and `PersistentVolumeClaim`\n    Storage class is a mapping of the storage types\
    \ on your system. For example, Azure Kubernetes Service has a storage class defined\
    \ by the system called `managed-premium` that gives you access to Azure Premium\
    \ managed disks. Think of a PersistedVolumeClaim (PVC) as a volume of a fixed\
    \ size from the storage class. The key to using PVC is that your data is stored\
    \ in the cluster independent of a node. If you store your database files on a\
    \ PVC, they will be available no matter what node the pod for SQL Server is running.\n\
    *   `Replicaset` and `Statefulset`\n    One of the coolest features of `k8s` is\
    \ the ability to declare a form of high availability for our pods. For example,\
    \ you can `tell` `k8s`, “I always want one copy of my pod running at any point\
    \ in time.” So if the pod fails (SQL Server crashes) or even the node fails (VM\
    \ crashes), `k8s` will automatically try to start the pod again (could be on the\
    \ same node or another node if one is available).\n\n#### How Do I Get k8s?\n\n\
    `K8s` was built as an open source project, and you can deploy your own `k8s` cluster\
    \ based on open source. For example, you can use the open source tool `kubeadm`\
    \ to install `k8s` as documented at [`https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/).\n\
    \nMost `k8s` customers use a licensed product for `k8s` production such as Azure\
    \ Stack HCI, Red Hat OpenShift, or Rancher. You can use cloud-based `k8s` systems\
    \ such as Azure Kubernetes Service (AKS), Google Kubernetes Engine (GKE), and\
    \ Amazon Elastic Kubernetes Service (EKS). The big advantage of licensed products\
    \ is some of the `k8s` system is managed and you can receive commercial production\
    \ support."
