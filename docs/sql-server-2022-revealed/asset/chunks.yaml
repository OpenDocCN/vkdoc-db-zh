    \n我们还有一个非常强大的主机和基础设施维护系统，以确保您的高可用性。您可以在 [`https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates`](https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates)\
