    \ Azure 存储。\n\n要开始为 Azure 虚拟机上的 SQL Server 配置 FCI，请访问 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/hadr-windows-server-failover-cluster-overview`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/hadr-windows-server-failover-cluster-overview)。"
- fmt: '### Always On Availability Groups


    虽然故障转移群集实例（FCI）是 SQL Server 高可用性的热门选项，但 Always On 可用性组（AG）代表了一种更强大的解决方案，它使用本地存储和副本。最大的优势是辅助服务器是可用的（只读、备份等）。


    Azure 虚拟机支持所有形式的 Always On 可用性组。请记住，在本书第 6 章中，我向您展示了如何设置无群集的 AG。我正是使用 Azure 虚拟机完成的。


    但假设您想要自动故障转移功能。那么您将需要与 Azure 中的 FCI 相同的设置，但无需共享存储。对于使用 Windows Server 故障转移群集（WSFC）的
    FCI 和 AG 设置，一个很好的新特性是能够使用子网，而不必配置负载均衡器。


    图 10-12 展示了 Azure 中一个具有多个子网的 AG 的可能配置。


    ![图 10-12](Images/525217_1_En_10_Fig12_HTML.png)


    一个 AG 配置的示意图。顶部是 DC 子网，下方是 SQL-subnet-1 和 SQL-subnet-2。


    **图 10-12** Azure 中具有多个子网的 AG 配置


    要了解有关配置具有子网的 AG 的更多信息，请参阅[使用多个子网在 Azure 虚拟机上手动配置 Always On 可用性组先决条件教程](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-prerequisites-tutorial-multi-subnet)。


    使用 Azure 虚拟机配置 AG 的一个好处是，一旦您的群集、网络和域设置完毕，SQL 部分的操作与本地部署是相同的。


    如果您希望在 Linux 上设置 AG 的体验，我们与合作伙伴 Red Hat 共同构建了一份很棒的快速入门指南，您可以查看[在 RHEL 上为 SQL Server
    虚拟机设置高可用性 Always On 可用性组](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/rhel-high-availability-stonith-tutorial)。


    我一直想要一个简单快速的方法来设置整个系统，以便我能够测试并查看一个完整的自动故障转移 AG 的实际运作。我的同事 Taryn Pratt，她是负责 Azure
    上 SQL Server 高可用性/灾难恢复（HA/DR）的高级项目经理，向我展示了这个 ARM 模板：[为 Azure SQL VM 端到端设置 Always
    On 可用性组](https://github.com/microsoft/tigertoolbox/tree/master/AzureSQLVM/e2e-ag-setup)。所以请试试看，并通过
    GitHub 问题站点向 Taryn 提供反馈。我想向 Taryn 了解我们在 Azure 虚拟机上 SQL Server 的 HA 体验方面的未来计划。Taryn
    说：“*Azure IaaS 上的 SQL Server 团队正在努力改善在 Azure VM 上运行的客户的 HA/DR 体验。我们的目标之一是增强门户功能，以便在使用
    Always On 可用性组时提供从开始到结束的更好整体体验。这包括在 SQL Server 创建时增加部署多子网 Always On 可用性组的能力，以及扩展现有的故障排除工具以包含有关
    AG 健康状况的更多详细信息。我们希望为客户提供一种在 Azure VM 上轻松创建和支持 SQL Server HA/DR 解决方案的方法。*”


    ## 灾难恢复


    虽然设置 Always On 可用性组（AG）也可以提供灾难恢复选项，因为您的数据通过本地存储复制到另一个节点，但对于 Azure 虚拟机上的 SQL Server
    灾难恢复还有其他考虑因素。


    ### 存储容错


    我在本章前面已经讨论过在 Azure 存储上为数据库和日志文件选择存储方案。事实证明，Azure 存储帐户具有内置的冗余选项。这些选项包括本地冗余存储（LRS）、区域冗余存储（ZRS）和地域冗余存储（GRS）。由于
    SQL Server 进行 I/O 的性质，我们仅支持使用 LRS 存储数据和日志文件。但即使使用 LRS，您的数据在数据中心内也已自动保存了多个最新的副本。


    ### 备份数据库选项


    因为我们只支持使用 LRS 存储数据和日志文件，所以您需要制定一个备份策略，将备份存储与数据和日志存储分开，同时选择更冗余的选项，如 ZRS 或 GRS。


    并且由于 SQL Server 引擎内置了备份到 `Azure 存储` 的功能，因此使用 Azure 实现稳健的备份策略并不困难。此外，如果您以完整模式注册
    IaaS 代理扩展，则可以利用自动备份功能，该功能使用您选择的 Azure 存储帐户。这种方法的一个缺点是备份有 12TB 的限制（压缩可能对此有帮助）。


    您确实可以选择配置一个新的 `Azure 托管磁盘`，以便简单地在虚拟机内备份到另一个驱动器或挂载的文件系统。虽然使用这种方法允许更大的备份大小（因为您使用的是
    `BACKUP TO DISK`），但其缺点是虚拟机必须可用才能访问备份，而对于 Azure 存储，您可以随时访问备份。


    使用 T-SQL 直接进行 Azure 备份的第三个选项是 `高级文件共享`。当您配置高级文件共享时，您将使用 `BACKUP TO DISK` 备份数据库，但存储独立于虚拟机，因此您可以轻松地将高级文件共享附加到另一台虚拟机。此外，高级文件共享支持高达
    100TB。


    还要记住，在本书第 6 章中，我们讨论了 SQL Server 2022 的新 `T-SQL 快照备份` 方法，这对于大型数据库非常有用，可以大大减少备份或恢复所需的时间。


    请记住，由于您使用的是 SQL Server 引擎，您始终可以在两台 Azure 虚拟机上的 SQL Server 之间设置日志传送方案。日志传送仍然是 SQL
    Server 基本 HA/DR 的流行选项。


    ### 使用 Azure 备份


    备份的另一个选项是 `Azure 备份` 服务。Azure 备份 for SQL VM 是一项集成服务，用于将自动备份计划到称为恢复服务保管库的单独 Azure
    存储位置。Azure 备份对于希望使用集中服务来管理其备份（尤其是跨多台虚拟机）的用户来说是一个很好的解决方案。请通过快速入门指南[在 Azure 虚拟机上备份
    SQL Server](https://docs.microsoft.com/azure/backup/tutorial-sql-backup) 开始使用
    Azure 备份。


    ## 监控


    如果您以前使用过 SQL Server，您可能有自己的流程集，使用内置的操作系统和 SQL Server 功能来监控 SQL Server，包括 Windows
    的性能监视器、Linux 的 Grafana、动态管理视图（DMV）、查询存储和扩展事件。


    由于您无法直接访问 Azure 虚拟机的主机计算机，因此了解如何在 Azure 之外监控 Azure 虚拟机上的 SQL Server 会很有趣。


    ### Azure Monitor


    这时就需要 `Azure Monitor`，这是一个用于所有 Azure 服务的监控基础结构。对于 Azure 虚拟机，默认情况下，主要围绕性能的指标会被存储，并可在
    Azure 门户中供您查看。您可以在虚拟机的主页上看到这一点。同样，您可以使用左侧菜单中的 `指标` 选项进一步深入查看。默认情况下，这些指标是从 *主机视角*
    获取的关于虚拟机的数据。使用这些指标可能非常有帮助，尤其是为了了解更多关于存储性能的信息。还记得我在本章前面提到的虚拟机大小上限问题吗？主机的 Azure
    指标是查看您的工作负载是否遇到此问题的一种方法。'
  raw: '### Always On Availability Groups


    While FCI is a popular option for high availability for SQL Server, Always On
    Availability Groups (AGs) represent a more robust solution using local storage
    and replicas. And the biggest advantage is that the secondary server is usable
    (read-only, backups, etc.).


    An Azure virtual machine supports Always On Availability Groups in all forms.
    Remember in Chapter [6](#525217_1_En_6_Chapter.xhtml) I showed you how to set
    up a clusterless AG. I did this using Azure virtual machines.


    But let’s say you wanted automatic failover capabilities. Then you will need the
    same type of setup for an FCI in Azure but without shared storage. And one of
    the nice new features for both an FCI and AG setup with WSFC is the ability to
    use subnets instead of having to configure a load balancer.


    Figure [10-12](#525217_1_En_10_Chapter.xhtml#Fig12) shows a possible configuration
    for an AG with multiple subnets in Azure.


    ![](Images/525217_1_En_10_Fig12_HTML.png)


    A schematic of an A G configuration. On the top is D C-subnet and below them are
    S Q L-subnet-1 and S Q L-subnet-2.


    Figure 10-12


    An AG configuration in Azure with multiple subnets


    To learn more about configuring an AG with subnets, check out [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-prerequisites-tutorial-multi-subnet`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-prerequisites-tutorial-multi-subnet).


    The nice thing about configuring an AG with an Azure virtual machine is that the
    SQL pieces are the same as if you were doing this on-premises once everything
    is set up for your cluster, network, and domains.


    If you are looking for an experience to set up an AG on Linux, we have a great
    quick-start guide built with our partner Red Hat you can see at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/rhel-high-availability-stonith-tutorial`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/rhel-high-availability-stonith-tutorial).


    I’ve always wanted an easy quick way to set up the entire system so I can test
    and see a complete auto-failover AG in action. My colleague Taryn Pratt, Senior
    Program Manager who owns HA/DR for SQL Server in Azure VM, showed me this ARM
    template: [`https://github.com/microsoft/tigertoolbox/tree/master/AzureSQLVM/e2e-ag-setup`](https://github.com/microsoft/tigertoolbox/tree/master/AzureSQLVM/e2e-ag-setup).
    So give it a try and use the GitHub issues site to give Taryn feedback. I wanted
    to know from Taryn our future plans for the HA experience for SQL Server on Azure
    Virtual Machines. Taryn said, *“The SQL Server on Azure IaaS team is w*orking
    to improve the HA/DR experience for customers running on Azure VMs. One of our
    goals is to enhance the portal to provide a better overall experience from start
    to finish when using Always On availability groups. This includes adding the ability
    to deploy a multi-subnet Always On availability group on SQL Server creation,
    to expanding the existing troubleshooting tools to include more details about
    the health of an AG. We want to provide *customers with an easy way to create
    and support SQL Server HA/DR solutions on Azure VMs.”*


    ## Disaster Recovery


    While setting up an Always On Availability Group (AG) can also provide a disaster
    recovery option since your data is replicated to another node using local storage,
    there are other considerations for disaster recovery with SQL Server on Azure
    virtual machines.


    ### Storage Fault Tolerance


    I’ve talked earlier in this chapter about storage choices for your databases and
    log files on Azure storage. Turns out Azure has built-in redundancy options for
    Azure storage accounts. These options include locally redundant storage (LRS),
    zone-redundant storage (ZRS), and geo-redundant storage (GRS). Due to the nature
    of how SQL Server does I/O, we only support LRS for data and log file storage.
    But even with LRS, your data already has built-in multiple copies automatically
    kept up to date within the data center.


    ### Backup Database Options


    Because we only support LRS for data and log file storage, you will want to create
    a backup strategy that separates storage for backups from data and log but also
    choose more redundant options like ZRS or GRS.


    And since SQL Server has built-in capabilities to back up to **Azure storage**
    in the engine, it is not hard to implement a robust backup strategy with Azure.
    In addition, if you register the IaaS Agent Extension in full mode, you can take
    advantage of automatic backups, which use the Azure storage account of your choice.
    One disadvantage of this approach is a 12TB limit for the backup (compression
    may help you here).


    You do have the option of configuring a new **Azure managed disk** to simply back
    up within the virtual machine to another drive or mounted file system. While using
    this approach allows for larger backup sizes since you are using BACKUP TO DISK,
    the disadvantage of this approach is that the virtual machine must be available
    to get to the backups, whereas with Azure storage you can access your backups
    at any time.


    A third option for a direct Azure backup using T-SQL is **Premium file shares**.
    When you configure a Premium file share, you will back up your database using
    BACKUP TO DISK, but storage is independent of the virtual machine, so you can
    easily attach the Premium file share to another virtual machine. In addition Premium
    file shares support up to 100TB.


    Also remember that in Chapter [6](#525217_1_En_6_Chapter.xhtml) of the book, we
    talked about the new **T-SQL snapshot backup** approach for SQL Server 2022, which
    could be very useful for large databases and greatly reduce the time it takes
    to back up or restore.


    Remember that since you are using the SQL Server engine, you can always set up
    a log shipping scheme across two SQL Servers on Azure virtual machines. Log shipping
    is still a popular option for basic HA/DR for SQL Server.


    ### Using Azure Backup


    One other option for backups is the **Azure Backup** service. Azure Backup for
    SQL VMs is an integrated service to schedule automatic backups to a separate Azure
    storage location called a Recovery Service vault. Azure Backup is a good solution
    for those wanting to use a central service to manage their backups especially
    across multiple virtual machines. Get started with Azure Backup with a quick-start
    guide at [`https://docs.microsoft.com/azure/backup/tutorial-sql-backup`](https://docs.microsoft.com/azure/backup/tutorial-sql-backup).


    ## Monitoring


    If you have used SQL Server before, you probably have your own set of processes
    to use built-in OS and SQL Server capabilities to monitor SQL Server including
    Performance Monitor for Windows, Grafana for Linux, Dynamic Management Views (DMVs),
    Query Store, and Extended Events.


    Since you don’t have direct access to host computers for Azure virtual machines,
    it would be interesting to know how to monitor SQL Server on an Azure virtual
    machine outside of Azure.


    ### Azure Monitor


    In comes **Azure Monitor**, a monitoring infrastructure for all Azure services.
    By default for an Azure virtual machine, metrics mostly around performance are
    stored and available for you to see in the Azure portal. You can see this on the
    home page of the virtual machine. As well you can dive in further using the **Metrics**
    option in the left-hand menu. These metrics by default are about the virtual machine
    from the *host perspective*. It could be very helpful to use these especially
    to see more about storage performance. Remember virtual machine size cap issues
    I have mentioned earlier in this chapter? Azure metrics for the host are one way
    to see if this is happening for your workload.'
  trans: '### Always On 可用性组


    虽然故障转移群集实例（FCI）是 SQL Server 高可用性的热门选项，但 Always On 可用性组（AG）代表了一种更强大的解决方案，它使用本地存储和副本。其最大优势在于辅助服务器是可用的（可用于只读查询、备份等）。


    Azure 虚拟机支持所有形式的 Always On 可用性组。请记住，在本书第 6 章中，我向您展示了如何在无群集的情况下设置 AG。我正是使用 Azure
    虚拟机完成的。


    但假设您想要自动故障转移功能。那么您将需要与 Azure 中的 FCI 类似的设置，但无需共享存储。对于使用 Windows Server 故障转移群集（WSFC）的
    FCI 和 AG 设置，一个很好的新特性是能够使用子网，而不必配置负载均衡器。


    图 10-12 展示了 Azure 中一个具有多个子网的 AG 的可能配置。


    ![图 10-12](img/525217_1_En_10_Fig12_HTML.png)


    一个 AG 配置的示意图。顶部是 DC 子网，下方是 SQL-subnet-1 和 SQL-subnet-2。


    **图 10-12** Azure 中具有多个子网的 AG 配置


    要了解有关配置具有子网的 AG 的更多信息，请参阅[使用多个子网在 Azure 虚拟机上手动配置 Always On 可用性组先决条件教程](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-prerequisites-tutorial-multi-subnet)。


    使用 Azure 虚拟机配置 AG 的一个好处是，一旦您的群集、网络和域设置完毕，SQL 部分的运维操作与本地部署是相同的。


    如果您希望了解在 Linux 上设置 AG 的体验，我们与合作伙伴 Red Hat 共同构建了一份很棒的快速入门指南，您可以查看[在 RHEL 上为 SQL
    Server 虚拟机设置高可用性 Always On 可用性组](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/rhel-high-availability-stonith-tutorial)。


    我一直想要一个简单快速的方法来设置整个系统，以便我能够测试并查看一个完整的自动故障转移动作。我的同事 Taryn Pratt，她是负责 Azure 上 SQL
    Server 高可用性/灾难恢复（HA/DR）的高级项目经理，向我展示了这个 ARM 模板：[为 Azure SQL VM 端到端设置 Always On
    可用性组](https://github.com/microsoft/tigertoolbox/tree/master/AzureSQLVM/e2e-ag-setup)。所以请试试看，并通过
    GitHub 问题站点向 Taryn 提供反馈。我想向 Taryn 了解我们在 Azure 虚拟机上 SQL Server 的 HA 体验方面的未来计划。Taryn
    说：“*Azure IaaS 上的 SQL Server 团队正在努力改善在 Azure VM 上运行的客户的 HA/DR 体验。我们的目标之一是增强门户功能，以便在使用
    Always On 可用性组时提供从开始到结束的更好整体体验。这包括在 SQL Server 创建时增加部署多子网 Always On 可用性组的能力，以及扩展现有的故障排除工具以包含有关
    AG 健康状况的更多详细信息。我们希望为客户提供一种在 Azure VM 上轻松创建和支持 SQL Server HA/DR 解决方案的方法。*”


    ## 灾难恢复


    虽然设置 Always On 可用性组（AG）也可以提供灾难恢复选项，因为您的数据通过本地存储复制到另一个节点，但对于 Azure 虚拟机上的 SQL Server
    灾难恢复还有其他考虑因素。


    ### 存储容错


    我在本章前面已经讨论过在 Azure 存储上为数据库和日志文件选择存储方案。事实证明，Azure 存储帐户具有内置的冗余选项。这些选项包括本地冗余存储（LRS）、区域冗余存储（ZRS）和地域冗余存储（GRS）。由于
    SQL Server 进行 I/O 的性质，我们仅支持使用 LRS 存储数据和日志文件。但即使使用 LRS，您的数据在数据中心内也已自动保存了多个最新的副本。


    ### 备份数据库选项


    因为我们只支持使用 LRS 存储数据和日志文件，所以您需要制定一个备份策略，将备份存储与数据和日志存储分开，同时选择更冗余的选项，如 ZRS 或 GRS。


    并且由于 SQL Server 引擎内置了备份到 `Azure 存储` 的功能，因此使用 Azure 实现稳健的备份策略并不困难。此外，如果您以完整模式注册
    IaaS 代理扩展，则可以利用自动备份功能，该功能使用您选择的 Azure 存储帐户。这种方法的一个缺点是备份有 12TB 的限制（压缩可能对此有帮助）。


    您确实可以选择配置一个新的 `Azure 托管磁盘`，以便简单地在虚拟机内备份到另一个驱动器或挂载的文件系统。虽然使用这种方法允许更大的备份大小（因为您使用的是
    `BACKUP TO DISK`），但其缺点是虚拟机必须可用才能访问备份，而对于 Azure 存储，您可以随时访问备份。


    使用 T-SQL 直接进行 Azure 备份的第三个选项是 `高级文件共享`。当您配置高级文件共享时，您将使用 `BACKUP TO DISK` 备份数据库，但存储独立于虚拟机，因此您可以轻松地将高级文件共享附加到另一台虚拟机。此外，高级文件共享支持高达
    100TB。


    还要记住，在本书第 6 章中，我们讨论了 SQL Server 2022 的新 `T-SQL 快照备份` 方法，这对于大型数据库非常有用，可以大大减少备份或恢复所需的时间。


    请记住，由于您使用的是 SQL Server 引擎，您始终可以在两台 Azure 虚拟机上的 SQL Server 之间设置日志传送方案。日志传送仍然是 SQL
    Server 基本 HA/DR 的流行选项。


    ### 使用 Azure 备份


    备份的另一个选项是 `Azure 备份` 服务。Azure 备份 for SQL VM 是一项集成服务，用于将自动备份计划到称为恢复服务保管库的单独 Azure
    存储位置。Azure 备份对于希望使用集中服务来管理其备份（尤其是跨多台虚拟机）的用户来说是一个很好的解决方案。请通过快速入门指南[在 Azure 虚拟机上备份
    SQL Server](https://docs.microsoft.com/azure/backup/tutorial-sql-backup) 开始使用
    Azure 备份。


    ## 监控


    如果您以前使用过 SQL Server，您可能有自己的流程集，使用内置的操作系统和 SQL Server 功能来监控 SQL Server，包括 Windows
    的性能监视器、Linux 的 Grafana、动态管理视图（DMV）、查询存储和扩展事件。


    由于您无法直接访问 Azure 虚拟机的主机计算机，因此了解如何在 Azure 之外监控 Azure 虚拟机上的 SQL Server 会很有趣。


    ### Azure Monitor


    这时就需要 `Azure Monitor`，这是一个用于所有 Azure 服务的监控基础结构。对于 Azure 虚拟机，默认情况下，主要围绕性能的指标会被存储，并可在
    Azure 门户中供您查看。您可以在虚拟机的主页上看到这一点。同样，您可以使用左侧菜单中的 `指标` 选项进一步深入查看。默认情况下，这些指标是从 *主机视角*
    获取的关于虚拟机的数据。使用这些指标可能非常有帮助，尤其是为了了解更多关于存储性能的信息。还记得我在本章前面提到的虚拟机大小上限问题吗？主机的 Azure
    指标是查看您的工作负载是否遇到此问题的一种方法。'
- fmt: '### Virtual Machine Metrics and Logs


    What about metrics for the guest virtual machine itself? If you use the Azure
    virtual machine portal page and select `Diagnostic Settings` on the left-hand
    menu, you can enable guest machine metrics and logging.


    Here you can enable guest machine and SQL Server metrics and log information.
    When this is enabled, you use the Metrics option with the Azure virtual machine
    to view key performance metrics for the OS and SQL Server as seen in Figure [10-13](#525217_1_En_10_Chapter.xhtml#Fig13).


    ![](Images/525217_1_En_10_Fig13_HTML.png)


    A screenshot. Under the heading chart title, a drop-down menu to select aggregation
    is open and 1 file is selected.


    Figure 10-13


    SQL Server metrics from Azure Monitor


    ### Azure Insights


    One of the features I love about Azure virtual machines and monitoring you may
    not know about is `Insights`. `Insights` is available from the left-hand menu
    of the virtual machine portal page. You have to enable `Insights`, but when you
    do, look at the rich metrics about the virtual machine you can get as seen in
    Figure [10-14](#525217_1_En_10_Chapter.xhtml#Fig14).


    ![](Images/525217_1_En_10_Fig14_HTML.png)


    A screenshot. Under the performance tab is a table for the logical disk. Below
    the table are 2 line graphs for C P U utilization and available memory.


    Figure 10-14


    Azure Insights for the virtual machine


    It is like having a multi-window view of Performance Monitor, and it works automatically
    with history, so you can look for trends over time with alerting.


    ## Azure Is the Best Cloud for SQL Server


    I believe Azure is the best cloud for SQL Server especially when used on Azure
    virtual machines. Consider the following:


    *   The only way to get the latest versions of SQL Server fastest to market in
    a cloud service is through Azure.

    *   Azure has the largest number of options for regions and data centers globally
    than any other provider.

    *   Microsoft has the most innovative integration of virtual machines with SQL
    Server than any cloud provider through our SQL Server IaaS Agent Extension and
    the features it enables.

    *   We build the SQL Server product, so we know more than anyone else how to optimize
    performance, security, and availability for SQL Server on a virtual machine.

    *   Use your existing SQL Server licenses on Azure with Azure Hybrid Benefit to
    reduce costs.

    *   I believe in actual proof to say Azure is the best cloud for SQL Server. GigaOm
    recently did a benchmark study to compare price and performance of SQL Server
    on Azure virtual machines vs. AWS EC2\. The results speak for themselves at [`https://research.gigaom.com/report/sql-transaction-processing-and-analytic-performance-price-performance-testing`](https://research.gigaom.com/report/sql-transaction-processing-and-analytic-performance-price-performance-testing).


    We are constantly improving the SQL Server on Azure Virtual Machines experience.
    Keep up to date with all the latest information at [`https://aka.ms/azuresqlvm`](https://aka.ms/azuresqlvm).


    Pam Lahoud manages our team for SQL Server on Azure virtual machines. Pam is a
    well-known expert on SQL Server in the community and at Microsoft. She summed
    up for me the value of running SQL Server on Azure:


    *No one knows SQL Server like Microsoft, so naturally we know how to run it best.
    On top of ensuring that our customers have the infrastructure options they need
    to deploy even their most demanding SQL Server workloads on Azure VMs, we also
    provide a suite of free tools that help you configure your SQL Servers correctly
    and keep them healthy. Combine this with industry-leading price-performance and
    Microsoft-only features like Azure Hybrid Benefit and you can easily see why SQL
    Server runs better on Azure.*


    # 11. SQL Edge to Cloud


    When I joined Microsoft in 1993, we had just released SQL Server 4.2 on Windows
    NT (the predecessor to Windows Server). We had previously only offered SQL Server
    on OS/2 systems, and our code was still based on the original Sybase server. These
    are the days of small to medium servers, and we as a product were trying to find
    our place in the industry.


    Fast forward to the last 5 years, and SQL Server has innovated in so many ways
    it may be hard to keep up with “all the flavors.” So I thought a great way to
    conclude this book is a chapter on all the ways SQL can be deployed from *edge
    to cloud*. I’ll talk about all the options and why you may consider each one for
    your workload.


    ## Develop Once, Deploy Anywhere


    A great way to see all the SQL options is with Figure [11-1](#525217_1_En_11_Chapter.xhtml#Fig1).


    ![](Images/525217_1_En_11_Fig1_HTML.png)


    An illustration of S Q L from edge to cloud on the left and right, respectively.
    The S Q L on top lists 7 S Q L options with familiarity, tools, and flexibility
    options on the bottom.


    Figure 11-1


    SQL from edge to cloud


    I’m not sure I would ever think in my career and lifetime that SQL as a technology
    could exist in so many different ways. SQL can now be deployed on everything from
    a small IoT device to the largest servers in the world to public clouds. I use
    the term *develop once, deploy anywhere* because it is very possible to build
    an application targeted to SQL and deploy it across all these options without
    changing the code.


    For many customers I talk to today, these options are not an *and* decision but
    an *or* decision. In other words, many customers may need to deploy SQL in many
    of these destinations per their business needs. But do all these choices pose
    a big question? How is it possible to learn all these options?


    The good news is not just the *flexibility* that SQL edge to cloud provides. But
    it is also the common *familiarity* across them. Consider this:


    *   The same languages and providers such as `.Net` and `Java` work across all
    of these options.

    *   The same `T-SQL` language is supported across all of these options. There
    can be some differences per the needs of a given option, but the same fundamental
    `T-SQL` just works.

    *   The same core database engine code is used across all of these. This is a
    statement that many customers find hard to believe. We have a common code base
    for the SQL Server engine edge to cloud. We may turn on some features in only
    some options. We may build new features and only release them first in some of
    these options. But the core code is the same.

    *   Our common tools such as SQL Server Management Studio (`SSMS`), Azure Data
    Studio (`ADS`), `sqlcmd`, and others work across all of these options. One of
    the keys is the Tabular Data Stream (`TDS`) protocol. `TDS` is supported across
    all of these because it has the same core engine edge to cloud.


    So flexibility with familiarity. A great combination for you to choose which options
    are best for you. Let’s spend the rest of the chapter learning more about each
    option. For each option I’ve included a summary of *When to Use…*, so you will
    understand my recommendation when one of these options may match your requirements.
    I listed Azure Arc–enable SQL Managed Instance last in this chapter because it
    is easier to understand this option after comparing it with all the other options
    for SQL.


    Note


    I’ve seen different people use the term *edge* in many ways. For purposes of this
    chapter, the *edge* refers to SQL running in any option that is not the Azure
    cloud. What you will find interesting is all the options now connect SQL running
    on the edge to the cloud. These worlds are coming together.'
  raw: '### Virtual Machine Metrics and Logs


    What about metrics for the guest virtual machine itself? If you use the Azure
    virtual machine portal page and select **Diagnostic Settings** on the left-hand
    menu, you can enable guest machine metrics and logging.


    Here you can enable guest machine and SQL Server metrics and log information.
    When this is enabled, you use the Metrics option with the Azure virtual machine
    to view key performance metrics for the OS and SQL Server as seen in Figure [10-13](#525217_1_En_10_Chapter.xhtml#Fig13).


    ![](Images/525217_1_En_10_Fig13_HTML.png)


    A screenshot. Under the heading chart title, a drop-down menu to select aggregation
    is open and 1 file is selected.


    Figure 10-13


    SQL Server metrics from Azure Monitor


    ### Azure Insights


    One of the features I love about Azure virtual machines and monitoring you may
    not know about is **Insights**. Insights is available from the left-hand menu
    of the virtual machine portal page. You have to enable Insights, but when you
    do, look at the rich metrics about the virtual machine you can get as seen in
    Figure [10-14](#525217_1_En_10_Chapter.xhtml#Fig14).


    ![](Images/525217_1_En_10_Fig14_HTML.png)


    A screenshot. Under the performance tab is a table for the logical disk. Below
    the table are 2 line graphs for C P U utilization and available memory.


    Figure 10-14


    Azure Insights for the virtual machine


    It is like having a multi-window view of Performance Monitor, and it works automatically
    with history, so you can look for trends over time with alerting.


    ## Azure Is the Best Cloud for SQL Server


    I believe Azure is the best cloud for SQL Server especially when used on Azure
    virtual machines. Consider the following:


    *   The only way to get the latest versions of SQL Server fastest to market in
    a cloud service is through Azure.


    *   Azure has the largest number of options for regions and data centers globally
    than any other provider.


    *   Microsoft has the most innovative integration of virtual machines with SQL
    Server than any cloud provider through our SQL Server IaaS Agent Extension and
    the features it enables.


    *   We build the SQL Server product, so we know more than anyone else how to optimize
    performance, security, and availability for SQL Server on a virtual machine.


    *   Use your existing SQL Server licenses on Azure with Azure Hybrid Benefit to
    reduce costs.


    *   I believe in actual proof to say Azure is the best cloud for SQL Server. GigaOm
    recently did a benchmark study to compare price and performance of SQL Server
    on Azure virtual machines vs. AWS EC2\. The results speak for themselves at [`https://research.gigaom.com/report/sql-transaction-processing-and-analytic-performance-price-performance-testing`](https://research.gigaom.com/report/sql-transaction-processing-and-analytic-performance-price-performance-testing).


    We are constantly improving the SQL Server on Azure Virtual Machines experience.
    Keep up to date with all the latest information at [`https://aka.ms/azuresqlvm`](https://aka.ms/azuresqlvm).


    Pam Lahoud manages our team for SQL Server on Azure virtual machines. Pam is a
    well-known expert on SQL Server in the community and at Microsoft. She summed
    up for me the value of running SQL Server on Azure*:*


    *No one knows SQL Server like Microsoft, so naturally we know how to run it best.
    On top of ensuring that our customers have the infrastructure options they need
    to deploy even their most demanding SQL Server workloads on Azure VMs, we also
    provide a suite of free tools that help you configure your SQL Servers correctly
    and keep them healthy. Combine this with industry-leading price-performance and
    Microsoft-only features like Azure Hybrid Benefit and you can easily see why SQL
    Server runs better on Azure.*


    # 11. SQL Edge to Cloud


    When I joined Microsoft in 1993, we had just released SQL Server 4.2 on Windows
    NT (the predecessor to Windows Server). We had previously only offered SQL Server
    on OS/2 systems, and our code was still based on the original Sybase server. These
    are the days of small to medium servers, and we as a product were trying to find
    our place in the industry.


    Fast forward to the last 5 years, and SQL Server has innovated in so many ways
    it may be hard to keep up with “all the flavors.” So I thought a great way to
    conclude this book is a chapter on all the ways SQL can be deployed from *edge
    to cloud*. I’ll talk about all the options and why you may consider each one for
    your workload.


    ## Develop Once, Deploy Anywhere


    A great way to see all the SQL options is with Figure [11-1](#525217_1_En_11_Chapter.xhtml#Fig1).


    ![](Images/525217_1_En_11_Fig1_HTML.png)


    An illustration of S Q L from edge to cloud on the left and right, respectively.
    The S Q L on top lists 7 S Q L options with familiarity, tools, and flexibility
    options on the bottom.


    Figure 11-1


    SQL from edge to cloud


    I’m not sure I would ever think in my career and lifetime that SQL as a technology
    could exist in so many different ways. SQL can now be deployed on everything from
    a small IoT device to the largest servers in the world to public clouds. I use
    the term *develop once, deploy anywhere* because it is very possible to build
    an application targeted to SQL and deploy it across all these options without
    changing the code.


    For many customers I talk to today, these options are not an *and* decision but
    an *or* decision. In other words, many customers may need to deploy SQL in many
    of these destinations per their business needs. But do all these choices pose
    a big question? How is it possible to learn all these options?


    The good news is not just the *flexibility* that SQL edge to cloud provides. But
    it is also the common *familiarity* across them. Consider this:


    *   The same languages and providers such as .Net and Java work across all of
    these options.


    *   The same T-SQL language is supported across all of these options. There can
    be some differences per the needs of a given option, but the same fundamental
    T-SQL just works.


    *   The same core database engine code is used across all of these. This is a
    statement that many customers find hard to believe. We have a common code base
    for the SQL Server engine edge to cloud. We may turn on some features in only
    some options. We may build new features and only release them first in some of
    these options. But the core code is the same.


    *   Our common tools such as SQL Server Management Studio (SSMS), Azure Data Studio
    (ADS), sqlcmd, and others work across all of these options. One of the keys is
    the Tabular Data Stream (TDS) protocol. TDS is supported across all of these because
    it has the same core engine edge to cloud.


    So flexibility with familiarity. A great combination for you to choose which options
    are best for you. Let’s spend the rest of the chapter learning more about each
    option. For each option I’ve included a summary of *When to Use…*, so you will
    understand my recommendation when one of these options may match your requirements.
    I listed Azure Arc–enable SQL Managed Instance last in this chapter because it
    is easier to understand this option after comparing it with all the other options
    for SQL.


    Note


    I’ve seen different people use the term *edge* in many ways. For purposes of this
    chapter, the *edge* refers to SQL running in any option that is not the Azure
    cloud. What you will find interesting is all the options now connect SQL running
    on the edge to the cloud. These worlds are coming together.'
  trans: '### 虚拟机指标与日志


    对于客户虚拟机本身的指标怎么办？如果您使用 Azure 虚拟机门户页面并在左侧菜单中选择 `诊断设置`，即可启用客户机指标和日志记录。


    在这里，您可以启用客户机以及 SQL Server 的指标和日志信息。启用此功能后，您可以使用 Azure 虚拟机中的“指标”选项来查看操作系统和 SQL
    Server 的关键性能指标，如图 10-13 所示。


    ![](img/525217_1_En_10_Fig13_HTML.png)


    一张截图。在“图表标题”标题下，一个用于选择聚合方式的下拉菜单处于打开状态，并且已选中 1 个文件。


    图 10-13


    来自 Azure Monitor 的 SQL Server 指标


    ### Azure Insights


    关于 Azure 虚拟机和监控，我特别喜爱的一个功能您可能还不知道，那就是 `Insights`。`Insights` 可从虚拟机门户页面的左侧菜单获取。您需要启用
    `Insights`，但一旦启用，您就可以查看关于虚拟机的丰富指标，如图 10-14 所示。


    ![](img/525217_1_En_10_Fig14_HTML.png)


    一张截图。在“性能”选项卡下是一个用于逻辑磁盘的表格。表格下方是两个折线图，分别显示 CPU 利用率和可用内存。


    图 10-14


    虚拟机的 Azure Insights


    这就像拥有一个性能监视器的多窗口视图，并且它能自动处理历史数据，因此您可以结合警报功能来查看随时间推移的趋势。


    ## Azure 是 SQL Server 的最佳云平台


    我相信 Azure 是 SQL Server 的最佳云平台，尤其是在 Azure 虚拟机上使用时。请考虑以下几点：


    *   在云服务中最快上市获得最新版 SQL Server 的唯一途径是通过 Azure。

    *   Azure 在全球范围内提供的区域和数据中心选项比其他任何供应商都多。

    *   通过我们的 SQL Server IaaS 代理扩展及其所支持的功能，Microsoft 拥有比其他任何云供应商都更具创新性的虚拟机与 SQL Server
    集成方案。

    *   我们构建了 SQL Server 产品，因此我们比任何人都更了解如何优化虚拟机上 SQL Server 的性能、安全性和可用性。

    *   使用您现有的 SQL Server 许可证，并通过 Azure 混合权益在 Azure 上降低成本。

    *   我相信实际证据能证明 Azure 是 SQL Server 的最佳云平台。GigaOm 最近进行了一项基准研究，比较了 Azure 虚拟机与 AWS
    EC2 上 SQL Server 的价格和性能。结果不言自明，请参见 [`https://research.gigaom.com/report/sql-transaction-processing-and-analytic-performance-price-performance-testing`](https://research.gigaom.com/report/sql-transaction-processing-and-analytic-performance-price-performance-testing)。


    我们正在不断改进 Azure 虚拟机上的 SQL Server 体验。请通过 [`https://aka.ms/azuresqlvm`](https://aka.ms/azuresqlvm)
    获取所有最新信息。


    Pam Lahoud 负责我们 Azure 虚拟机上的 SQL Server 团队。Pam 在社区和 Microsoft 内都是著名的 SQL Server
    专家。她向我总结了在 Azure 上运行 SQL Server 的价值：


    *没有人比 Microsoft 更了解 SQL Server，因此我们自然知道如何最佳地运行它。除了确保我们的客户拥有必要的基础架构选项，以便在 Azure
    VM 上部署他们最苛刻的 SQL Server 工作负载外，我们还提供了一套免费工具，帮助您正确配置 SQL Server 并保持其健康运行。再加上行业领先的价格性能以及仅
    Microsoft 提供的功能（如 Azure 混合权益），您就能轻易明白为何 SQL Server 在 Azure 上运行得更好。*


    # 11. 从边缘到云的 SQL


    当我于 1993 年加入 Microsoft 时，我们刚刚在 Windows NT（Windows Server 的前身）上发布了 SQL Server 4.2。此前我们仅在
    OS/2 系统上提供 SQL Server，并且我们的代码仍然基于最初的 Sybase 服务器。那是中小型服务器的时代，我们作为一个产品正在努力寻找在行业中的定位。


    快进到过去 5 年，SQL Server 在许多方面都进行了创新，其“各种版本”可能多得让人难以跟上。因此，我认为本书的完美收尾方式，是专门用一章来介绍 SQL
    从*边缘到云*的所有部署方式。我将讨论所有选项，并说明为何您可能会为您的工作负载考虑其中每一个。


    ## 一次开发，随处部署


    图 11-1 是查看所有 SQL 选项的一个绝佳方式。


    ![](img/525217_1_En_11_Fig1_HTML.png)


    一幅插图，分别展示了左侧和右侧的 SQL 从边缘到云。顶部的 SQL 列出了 7 个 SQL 选项，底部则列出了熟悉度、工具和灵活性选项。


    图 11-1


    从边缘到云的 SQL


    在我整个职业生涯和人生中，我可能从未想过 SQL 作为一种技术能够以如此多的不同方式存在。现在，SQL 可以部署在从小型 IoT 设备到世界上最大的服务器，再到公共云的一切环境中。我使用*一次开发，随处部署*这个术语，是因为构建一个针对
    SQL 的应用程序并将其部署到所有这些选项上而无需更改代码，是完全可能的。


    对于我今天交谈的许多客户来说，这些选项并非*并且*的关系，而是*或者*的关系。换句话说，许多客户可能需要根据其业务需求，将 SQL 部署到许多这些目的地中。但所有这些选择提出了一个大问题：怎么可能学会所有这些选项呢？


    好消息不仅仅是 SQL 从边缘到云所提供的*灵活性*。还包括它们之间共有的*熟悉度*。请考虑以下几点：


    *   相同的语言和提供程序，如 `.Net` 和 `Java`，在所有选项中均可工作。

    *   相同的 `T-SQL` 语言在所有这些选项中都得到支持。根据特定选项的需求可能会有一些差异，但相同的基本 `T-SQL` 就是能工作。

    *   所有这些选项都使用相同的核心数据库引擎代码。这是许多客户觉得难以置信的一个声明。我们拥有一个从边缘到云的 SQL Server 引擎通用代码库。我们可能只在某些选项中启用某些功能。我们可能构建新功能并且只首先在其中一些选项中发布。但核心代码是相同的。

    *   我们的通用工具，如 SQL Server Management Studio (`SSMS`)、Azure Data Studio (`ADS`)、`sqlcmd`
    等，在所有这些选项中均可工作。其中一个关键是表格数据流 (`TDS`) 协议。`TDS` 在所有这些选项中都得到支持，因为它在从边缘到云的所有环境中拥有相同的核心引擎。


    因此，是灵活性与熟悉度的结合。这是一个绝佳的组合，让您能选择最适合您的选项。让我们在本章剩余部分深入了解每个选项。对于每个选项，我都包含了*何时使用...*的摘要，这样当某个选项符合您的要求时，您就能理解我的建议。我在本章最后列出了启用
    Azure Arc 的 SQL 托管实例，因为在与其他 SQL 选项进行比较后，更容易理解此选项。


    注意


    我见过不同的人以多种方式使用*边缘*一词。就本章而言，*边缘*指的是在任何非 Azure 云的选项中运行的 SQL。您会发现有趣的是，现在所有选项都能将运行在边缘的
    SQL 连接到云。这些世界正在融合。'
- fmt: '## Azure SQL Edge


    IoT devices are part of our world everywhere you look or probably in ways you
    didn’t know. We embarked on a project several years ago to bring database processing
    *down* to the IoT device itself. We found a clever way to reduce the footprint
    of the SQL Server engine to only a few hundred megabytes so it could fit on even
    the smallest IoT device. So the core engine could process data on the device using
    a SQL Linux container.


    Fundamental core engine functionality like columnstore indexes can even run on
    such a small device. There are some engine features that are not supported, such
    as In-Memory OLTP, but most of the core engine features that a developer would
    need work. You can read all the supported features at [`https://docs.microsoft.com/azure/azure-sql-edge/features`](https://docs.microsoft.com/azure/azure-sql-edge/features).


    We knew that processing of telemetry data would be important. Therefore, we included
    specific features to help stream data, process time series data, and analyze data
    with machine learning.


    For streaming we included the popular Kafka stream engine and T-SQL support for
    streaming based on the same concepts as Azure Stream Analytics. You can read more
    about streaming with Azure SQL Edge at [`https://docs.microsoft.com/azure/azure-sql-edge/stream-data`](https://docs.microsoft.com/azure/azure-sql-edge/stream-data).


    For time series, we included T-SQL functions including `DATE_BUCKET()`, `FIRST_VALUE()`,
    and `LAST_VALUE()`. One of the reasons to use these functions is to help fill
    in time gaps in the data. You saw in Chapter [8](#525217_1_En_8_Chapter.xhtml)
    how these T-SQL functions now exist in SQL Server 2022.


    One of the scenarios that customers and developers seem most excited about Azure
    SQL Edge is that you can train machine learning models and then execute them directly
    on the IoT device with SQL Server. Azure SQL Edge supports the T-SQL `PREDICT`
    function, which allows a developer to execute a native ONYX model.


    So the scenario is complete for Azure SQL Edge. Instead of requiring a device
    to stream raw telemetry to Azure or even an edge hub, you can *push data processing*
    down to the device.


    Azure SQL Edge also comes with data retention capabilities and the ability to
    synchronize data with Azure Data Factory or SQL Data Sync.


    Even though Azure SQL Edge is comprised of containers including a SQL Server Linux
    engine, the product is priced with Azure on a per-device basis. You can stay in
    touch with all the latest information about Azure SQL Edge at [`https://aka.ms/azuresqledge`](https://aka.ms/azuresqledge).


    ### When to Use Azure SQL Edge


    Azure SQL Edge has a very specific use case for IoT device deployments. Its small
    footprint and unique features are built specifically for IoT device scenarios.


    ## SQL Server


    The entire book has been about SQL Server, but the focus has been on what is new
    for SQL Server 2022. SQL Server is a licensed product that runs on Windows and
    Linux operating systems. SQL Server is also known as the “box product” because
    back in the day that is how we shipped the product, in a box with documentation
    (yes, hard-bound books) and the software.


    SQL Server includes the database engine and features *surrounding* the engine
    like replication, Polybase, SQL Server Agent, and machine learning services. The
    SQL Server licensed product also includes services such SQL Server Integration
    Services (SSIS), SQL Server Analysis Services (SSAS), and SQL Server Reporting
    Services (SSRS).


    SQL Server is purchased using a licensing agreement or directly per instance using
    a per-core licensing model. A user will choose editions to decide the capabilities
    of SQL Server for the price you pay. You can choose free editions of SQL Server
    including Evaluation, Developer, or Express. The best price per value is Standard
    Edition, which has the surface area of the complete product but has resource limits
    and doesn’t support all features. And finally Enterprise Edition has the highest
    price of any edition but with all the features and unlimited resource usage.


    SQL Server is produced by Microsoft and released through a major version such
    as SQL Server 2022. There is no specific guarantee from Microsoft when major versions
    are released, but the pattern since 2016 is every few years. Each major version
    is updated on a regular cadence through a concept called a cumulative update or
    security update called General Distribution Release (GDR).


    SQL Server is a complete data platform and is now one of the most popular database
    products in the world. You can deploy SQL Server on laptops, desktops, servers,
    and virtual machines both private and in public clouds. Customers deploy databases
    with SQL Server from a few megabytes to several petabytes.


    Even though SQL Server solves so many data problems, the burden is on you to deploy
    and manage it. For example, SQL Server comes with a robust high-availability solution
    called Always On Availability Groups (you read about the new Contained AGs in
    this book). But the burden is on you to set it up, configure it, and keep it healthy.
    SQL Server comes with an intelligent engine helping you do your best, but the
    full SQL Server product is managed by you.


    Our main page to get started to learn everything about SQL Server is [`https://aka.ms/sqlserver`](https://aka.ms/sqlserver).


    ### When to Use SQL Server


    SQL Server is your best choice if you need complete control over all aspects of
    deploying and managing SQL Server. You want every feature that comes with the
    product, and you want the flexibility to deploy it on any type of machine or virtual
    machine. You would also want to choose SQL Server if you wanted complete control
    over configuration aspects such as physical placement of files.


    Another reason to choose SQL Server is application version requirements. Let’s
    say your company uses an application that is only supported on specific version(s)
    of SQL Server. SQL Server is going to be your only choice since options such as
    Azure SQL Managed Instance, Azure SQL Database, and Azure Arc–enabled SQL Managed
    Instance are *versionless.*


    Note


    We have worked over the last few years to convince developers and customers to
    base support on a database compatibility level (dbcompat) vs. a major version.
    You can read more at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).


    Another reason to choose SQL Server is the supported set of services outside the
    engine such as SSIS, SSAS, and SSRS. Note that only SQL Server on Windows supports
    SSAS and SSRS.


    ### Azure Arc–Enabled SQL Server


    One of the options you can use *in addition* to deploying SQL Server is to connect
    your instance to Azure through Azure Arc. You saw the process for doing this with
    SQL Server 2022 in Chapter [3](#525217_1_En_3_Chapter.xhtml) of the book. Using
    this capability allows you to see SQL Server information in the Azure portal,
    secure your SQL Server with Microsoft Defender, and perform a SQL assessment.
    You saw in Chapter [3](#525217_1_En_3_Chapter.xhtml) that for SQL Server 2022,
    you can also configure Azure Active Directory (AAD), which enables you to use
    Microsoft Purview for policy management.


    You can set up SQL Server 2012 and later on Azure Arc–enabled servers on Windows
    and Linux. Get started with Azure Arc–enabled SQL Server at [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview).


    ## Linux, Containers, and Kubernetes


    You have read in Chapter [9](#525217_1_En_9_Chapter.xhtml) details about how to
    deploy and use SQL Server on Linux, on containers, and in a Kubernetes cluster.


    Here is a summary of when these options may be best for your needs.'
