    ### 注意事项


    使用 Azure SQL 托管实例时，请牢记以下几点细节：


    *   一个链接只允许对应一个数据库。您可以在一个 SQL Server 上创建多个链接，或让多个服务器指向同一个托管实例。目前，一个托管实例最多可支持 100
    个链接。同时，请考虑您的托管实例需要多少存储空间来支持链接中的数据库。

    *   任何 Azure SQL 托管实例不支持的功能（例如 `filestream`）也不支持链接功能。

    *   如果目标 Azure SQL 托管实例使用的是通用服务层，则不支持内存中 OLTP，因为该服务层不支持内存中 OLTP。

    *   请遵循最佳实践，例如定期进行事务日志备份，这是任何 `DAG` 设置都应执行的操作。

    *   对您主要 SQL Server 上工作负载的性能影响，与您自己设置基于异步的 `DAG` 相同。由于我们使用的是异步方式，您应该会看到对写入性能的影响很小。

    *   链接功能没有监听器概念，因此在故障转移后，您的应用程序需要手动更改指向托管实例。

    *   实例级对象（如 `SQL Agent` 作业）不会被复制。故障转移后，您需要手动将这些对象迁移到托管实例。


    有关限制和约束的最新更新，请访问我们的文档：`https://docs.microsoft.com//azure/azure-sql/managed-instance/managed-instance-link-feature-overview#limitations`。


    ### Azure SQL 托管实例链接功能的未来


    在撰写本书时，我们仅为 `SQL Server 2016`、`SQL Server 2019` 和 `SQL Server 2022` 提供单向链接。正如您在书中所见，我们还正在发布将
    Azure SQL 托管实例用作离线灾难恢复站点的功能，因为您必须手动将完整备份还原到 `SQL Server 2022` 才能故障回复。


    未来无法保证，但我们打算通过诸如在线故障回复等功能来增强灾难恢复场景，类似于当今使用 `SQL Server` 时通过可用性组进行故障回复的方式。我们还想探索像同步
    `DAG` 这样的可能性。我询问了 Dani Ljepava 关于团队的愿景，以及为什么将链接功能发展到其全部功能对微软和我们的客户如此重要*：*


    *“Azure SQL 托管实例于 2018 年 11 月作为一项服务推出，旨在提供与 SQL Server 兼容性最高的最佳 PAAS 服务。当时我们在内部将该项目称为‘云提升器’，主要理念是我们希望使客户能够将其工作负载从
    SQL Server 直接迁移到完全托管的 PAAS 服务。自从我们推出该服务以来，客户一直向我们提出以下问题——我还没准备好迁移到 Azure，我想在 Azure
    中实现现代化但不进行迁移；我希望能够在托管实例上运行分析和读取扩展，同时仍然运行在我的 SQL Server 上。当准备好迁移时，客户询问如何降低迁移到 Azure
    的风险？如果出现任何问题，我能轻松回退到 SQL Server 吗？我的工作负载很关键，我需要尽可能短的最小迁移停机时间。一些客户问——我需要在云中我的 SQL
    Server 和托管实例之间建立灾难恢复。法律要求我能够轻松地从 Azure 回退到 SQL Server，并定期执行灾难恢复演练。现在，如果您发现自己问的是这些问题之一，那么我们正是为您构建了
    MI 链接。该链接是我们‘云提升器’承诺的延伸，通过提供极致的混合灵活性，让您以自己的条款、步调和时间使用 Azure。”*


    请在 `https://aka.ms/milink` 关注 Azure SQL 托管实例链接功能的所有最新动态。


    ## Azure Synapse Link for SQL Server


    Azure Synapse Analytics 是解决所有类型大数据的完美方案。它是一个分析解决方案，因为它拥有用于需要分析数据的应用程序所需的强大功能和工具。然而，问题在于：要分析的数据在哪里？在许多情况下，数据可能存在于您想要使用
    Synapse 分析的 `SQL Server` 实例中。挑战在于如何在不依赖复制数据或 `ETL` 作业的情况下，将所需的数据从 `SQL Server`
    引入 `Synapse`。任何想要分析数据的人通常都希望在某种*近实时*的时间范围内完成。


    ### 什么是 Synapse Link for SQL Server？


    Synapse Link for SQL Server 是 `SQL Server` 和 `Synapse` 的一项功能，可将近实时地将 `SQL Server`
    中的数据与 `Synapse` 链接起来，且无缝衔接。这涉及您最初同步数据，然后 `Synapse Link` 将以增量方式自动捕获更改，使您能够在近实时查询
    `Synapse` 中的数据。


    `SQL Server` 多年来一直包含内置在 `SQL Server` 引擎中用于捕获更改的技术，称为*更改流*，包括复制和变更数据捕获（`CDC`）。这些功能内置于
    `SQL Server` 引擎中，以从事务日志中*提取*更改并将其*输送*到另一个目标。在目标提交更改之前，事务不会从事务日志中被截断。`Synapse Link`
    使用了更改流的一些核心功能来实现相同的目标，只不过目标将是 Azure Synapse。


    Azure Synapse Link 适用于 `SQL Server 2022` 和 Azure SQL Database。在 `SQL Server 2022`
    中使用此功能不需要 Azure 扩展。Synapse 还为 Cosmos DB 和 Dataverse 提供链接服务。Synapse Link for SQL
    的一个很大区别是数据被同步并输送到 SQL 池中。请在 `https://aka.ms/synapselinksqlserver` 获取有关 Synapse
    Link for SQL Server 的最新信息。

    '
- fmt: '# How Does Synapse Link Work?


    There are several components that make Synapse Link work. Let’s review Figure
    [3-12](#525217_1_En_3_Chapter.xhtml#Fig12) to understand these components and
    data flow.


    ![](Images/525217_1_En_3_Fig12_HTML.png)


    A 6-step flowchart of the azure synapse link for the s q l server. The steps start
    with synapse workspace and end with change feed queue.


    Figure 3-12


    The Synapse Link for SQL Server architecture


    Let’s use the numbers in the figure to see the sequence of how components are
    created and data flows. Don’t worry about the details of how to create these components.
    You will see these details in the next section with an exercise.


    1.  First, you will need an Azure Synapse workspace.

    2.  Now create a SQL dedicated pool to host the data.

    3.  Create a `linked service for SQL Server 2022`. This establishes a control
    plane within Synapse and the ability to link together SQL Server and Synapse.
    You will install the self-hosted integration runtime (`SHIR`) on the computer
    or network of SQL Server. This linked service is dedicated to this specific SQL
    Server and database. If you want to set up a link for a different database on
    the same SQL instance, you would need a unique linked service, which requires
    a different `SHIR`. You can only have one `SHIR` program running at a time on
    a `VM` or computer. But since `SHIR` can connect to SQL Server remotely, you could
    run a different copy of the program on a different `VM` or computer in your network.
    `SHIR` only works on Windows, so if you use Synapse Link for SQL Server on Linux,
    you will need to install `SHIR` on a Windows `VM` or computer on your network
    that can connect to your SQL Server on Linux.

    4.  Create an Azure storage account called a `landing zone` and a linked service
    for the landing zone. This landing zone account will be dedicated to this SQL
    Server and database. The landing zone will store files extracted from SQL Server
    that Synapse understands how to ingest into SQL pool tables.

    5.  Create a `linked connection` based on the linked service for SQL. Choose your
    tables to link from the source database on SQL Server. Start the connection. `SHIR`
    executes system stored procedures in SQL Server 2022 to start the process. Snapshots
    of tables are captured and submitted to the landing zone via `HTTPS` in the form
    of parquet and schema files. The ingestion service in the control plane takes
    the landing zone files and creates tables in the SQL pools. Data is inserted into
    the pool tables based on the initial snapshot. Linked connections target specific
    tables within a database. You can have multiple linked connections for the same
    database, but a table can only be in one linked connection.

    6.  Any modifications to tables in SQL Server are recorded in the transaction
    log. Change feed tasks within SQL Server harvest log changes and put them in a
    queue, which are memory structures within SQL Server. Internal tasks publish changes
    from the queue to the landing zone in the form of `CSV` and manifest files via
    `HTTPS`. We try to keep the amount of memory required as small as possible, balanced
    with the need to have good throughput capturing log changes and publishing to
    the landing zone. SQL Server uses a pool of worker threads for the tasks to capture
    log changes and publish these changes to the landing zone. The worker pool is
    a dedicated pool for Synapse Link change feed capture and works across all databases
    enabled for Synapse Link for the instance. The ingestion service in Synapse takes
    the landing zone files and executes modifications to affected tables in the SQL
    pools.

    7.  Optionally create a Power BI report to visualize your data directly on SQL
    pool tables.


    Now that you understand the components and flow, let’s try an exercise to see
    Synapse Link come alive.


    ## Try Out Synapse Link for SQL Server


    In order to complete this exercise successfully, you need to carefully follow
    the prerequisites, steps to set up the exercise, and each exercise step.


    I want to thank Chuck Heinzelman, Mine Token, Milos Vucic, and Tim Chen for helping
    me understand how Synapse Link works and creating all the resources for this exercise.


    ### Prerequisites


    *   A virtual machine or computer with at least two CPUs and `8Gb` RAM. For my
    tests I used an `E4ds_v5` Azure `VM` that comes with four `vCPUs` and `32Gb` RAM.
    Your virtual machine or computer needs to be capable of connecting to Azure over
    the Internet or run as an Azure Virtual Machine.

    *   SQL Server 2022 Evaluation Edition. You only need the database engine feature
    for this exercise.

    *   An Azure subscription with permissions to create an Azure Synapse workspace
    and Azure Data Lake Storage Gen2 account (Synapse uses its own storage account,
    but you need a separate one for the landing zone).

    *   SQL Server Management Studio (`SSMS`). The latest 18.x build or 19.x build
    will work.

    *   Download the WideWorldImporters `Standard` sample backup from [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak)
    to the machine where you will run SQL Server. The Standard backup is used because
    features like In-Memory OLTP are not supported with Synapse Link.

    *   A copy of the scripts from book samples from the `ch3_cloudconnected\synapselink`
    folder.'
