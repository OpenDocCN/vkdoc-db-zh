    option during setup. If you want to use machine learning services or language
    extensions, you still must choose this feature during setup.


    Instead you can install your own packages. See the documentation at [`https://docs.microsoft.com/sql/machine-learning/install/sql-machine-learning-services-windows-install`](https://docs.microsoft.com/sql/machine-learning/install/sql-machine-learning-services-windows-install)
    to get started for R and Python. For the Java language extension, you can start
    at [`https://docs.microsoft.com/sql/language-extensions/install/windows-java`](https://docs.microsoft.com/sql/language-extensions/install/windows-java).


    #### Removal of Polybase Hadoop Connectivity with Java


    In SQL Server 2016, we introduced the concept of Polybase, the ability to query
    data in different formats and storage “where they live” using T-SQL. The original
    design translated T-SQL statements into Java code to query files in Hadoop systems.
    It was revolutionary, but the specific connection to Hadoop systems never really
    took off as a popular feature among a lot of our customers.


    In SQL Server 2022, we have discontinued providing this feature along with Polybase
    scale-out groups. You can read more about the retirement of Polybase to Hadoop
    with Java, scale-out groups, and Big Data Clusters at [`https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics/`](https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics/).
    However, the concept of Polybase is still alive and well. You will see in this
    book in Chapter [7](#525217_1_En_7_Chapter.xhtml) a new implementation of Polybase
    using REST APIs.


    Important


    In order to use Polybase REST APIs, you need to select the Polybase Query Service
    for External Data feature. This will install the Polybase services. The Polybase
    REST APIs do not use these services but are baked directly into the engine. However,
    for now you must select this feature to enable configuration options to support
    Polybase REST APIs. Polybase services for ODBC drivers also require you to select
    this feature and do use Polybase services.


    #### Removal of Machine Learning Server


    In the summer of 2022, we announced the retirement of Machine Learning Server
    and stated it would no longer be a feature in the next version of SQL Server.
    Therefore, it is not a feature option in SQL Server 2022 setup. You can read more
    about this retirement statement at [`https://docs.microsoft.com/lifecycle/announcements/microsoft-machine-learning-server-retiring`](https://docs.microsoft.com/lifecycle/announcements/microsoft-machine-learning-server-retiring).


    #### Removal of Distributed Replay


    Distributed replay is a tool to replay SQL Profiler traces and has been in the
    product for many years. We have decided to unbundle this feature from SQL Server
    installation and will make it available in a separable download package. I will
    be transparent with the readers of this book that we have not enhanced this capability
    for quite some time.


    #### Memory Recommendations


    In the past we introduced in setup the ability to configure “max server memory”
    for the instance of SQL Server, which includes *recommended* values. The recommend
    value for “max server memory” comes from our documentation at [`https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options).


    We have determined that we didn’t quite calculate this correctly, and we’ve updated
    the method in SQL Server 2022 setup. Be aware that this recommendation is very
    conservative in my opinion, so I would be careful about using it. The calculation
    for “max server memory” is ~75% of *available* free memory at the time setup is
    run. We built this to apply it across many different workloads and configurations.
    It is also important to note that this recommendation doesn’t consider other SQL
    instances, so if you run multiple SQL instances on the same server, you need to
    carefully consider the value for “max server memory” for each instance.'
  trans: '### SQL Server 2022 有何不同？


    在 Windows 上使用“向导”安装 SQL Server 2022 与安装以前版本的 SQL Server 非常相似。因此，我不会向你展示“逐屏”体验。完整步骤请参见
    [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022)。


    > 注意

    > 我可以自夸地说，我安装和卸载 SQL Server 2022 的次数可能比世界上任何人都多。老实说，从 2021 年 11 月到 2022 年 11 月，我已经数不清安装和卸载了多少次
    SQL Server 2022。可能只有我们在微软的自动化测试能胜过我！


    相反，我将讨论与之前版本的差异。让我们从运行 SQL Server 安装程序的角度来看看这些差异。


    #### SQL Server 的 Azure 扩展


    在选择功能之前，你将看到的第一个选项是 SQL Server 的 Azure 扩展。SQL Server 的 Azure 扩展功能代表运行在安装了 SQL
    Server 的计算机或虚拟机上的软件，用于将其连接到 Azure。此扩展的功能并非新功能，它通过 `Azure Arc–enabled SQL Server`
    提供（你可以在 [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview)
    阅读更多内容）。你仍然可以使用文档中的方法将 SQL Server 2022 连接到 Azure。我们只是将其作为 SQL Server 安装程序的集成部分提供了一种实现方法。


    这是一个很大的主题，因此要了解有关先决条件以及如何填写此功能信息的更多信息，请参阅本章后面的标题为 `设置 SQL Server 的 Azure 扩展` 的部分。


    #### 功能差异


    在安装过程中选择功能时存在一些差异，主要涉及被移除的功能。你可以通过查看图 2-1 中的 SQL Server 2019 安装功能选择以及我已突出显示现已移除的功能来查看这些差异。


    ![](img/525217_1_En_2_Fig1_HTML.png)


    SQL Server 2019 的截图。实例功能中的 Python、Java 连接器、机器学习服务器和分布式重放客户端被突出显示。


    图 2-1


    SQL Server 2019 安装功能，其中被移除的功能已突出显示


    图 2-2 显示了安装程序中现在可用的功能列表更短了。


    ![](img/525217_1_En_2_Fig2_HTML.png)


    SQL Server 2022 的截图。功能选择文件下是为 SQL Server 2022 选择的实例功能列表。


    图 2-2


    SQL Server 2022 功能选择


    让我们进一步看看从 SQL Server 2022 中移除的功能。


    #### 移除 R、Python 和 Java


    在 SQL Server 2016、2017 和 2019 中，我们包含了安装 R、Python 和 Java 的开源运行时包作为机器学习服务和语言扩展功能的一部分。虽然这对许多人来说很方便，但我们发现许多使用此功能的客户希望使用他们自己的运行时包。我们还必须弄清楚如何更新我们安装的开源包。因此，我们认为在安装程序中继续安装这些包没有意义。在
    SQL Server 2022 中，我们在安装程序中不再提供这些包作为选项。如果你想使用机器学习服务或语言扩展，你仍然必须在安装程序中选择此功能。


    相反，你可以安装自己的包。有关 R 和 Python 的入门，请参阅 [`https://docs.microsoft.com/sql/machine-learning/install/sql-machine-learning-services-windows-install`](https://docs.microsoft.com/sql/machine-learning/install/sql-machine-learning-services-windows-install)
    的文档。对于 Java 语言扩展，你可以从 [`https://docs.microsoft.com/sql/language-extensions/install/windows-java`](https://docs.microsoft.com/sql/language-extensions/install/windows-java)
    开始。


    #### 移除基于 Java 的 Polybase Hadoop 连接


    在 SQL Server 2016 中，我们引入了 Polybase 的概念，即使用 T-SQL 查询“其所在位置”的不同格式和存储中的数据的能力。原始设计将
    T-SQL 语句转换为 Java 代码以查询 Hadoop 系统中的文件。这具有革命性，但特定于 Hadoop 系统的连接从未在广大客户中真正流行起来。


    在 SQL Server 2022 中，我们已停止提供此功能以及 Polybase 横向扩展组。你可以在 [`https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics/`](https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics/)
    阅读有关停止支持基于 Java 的 Polybase 到 Hadoop、横向扩展组和大数据群集的更多信息。然而，Polybase 的概念仍然存在并运行良好。你将在本书第
    7 章中看到使用 REST API 的 Polybase 新实现。


    > 重要提示

    > 为了使用 Polybase REST API，你需要选择“Polybase 外部数据查询服务”功能。这将安装 Polybase 服务。Polybase
    REST API 不使用这些服务，而是直接内置在引擎中。但是，目前你必须选择此功能才能启用支持 Polybase REST API 的配置选项。用于 ODBC
    驱动程序的 Polybase 服务也需要你选择此功能并且确实使用了 Polybase 服务。


    #### 移除机器学习服务器


    在 2022 年夏天，我们宣布了机器学习服务器的退役，并声明它将不再作为下一个版本 SQL Server 的功能。因此，在 SQL Server 2022
    安装程序中它不是一个功能选项。你可以在 [`https://docs.microsoft.com/lifecycle/announcements/microsoft-machine-learning-server-retiring`](https://docs.microsoft.com/lifecycle/announcements/microsoft-machine-learning-server-retiring)
    阅读更多关于此退役声明的信息。


    #### 移除分布式重放


    分布式重放是一个重放 SQL Profiler 跟踪的工具，已在产品中存在多年。我们决定将此功能从 SQL Server 安装中解绑，并将以单独的下载包形式提供。我向本书的读者坦率地说，我们已经很长时间没有增强此功能了。


    #### 内存建议


    过去，我们在安装程序中引入了为 SQL Server 实例配置 `最大服务器内存` 的能力，其中包括*建议*值。`最大服务器内存` 的建议值来自我们的文档
    [`https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options)。


    我们已经确定我们之前计算得不太正确，并且我们已经在 SQL Server 2022 安装程序中更新了方法。请注意，在我看来这个建议非常保守，所以在使用它时要小心。`最大服务器内存`
    的计算方式是运行安装程序时*可用*空闲内存的约 75%。我们这样设计是为了适用于许多不同的工作负载和配置。同样重要的是要注意，此建议不考虑其他 SQL 实例，因此如果你在同一服务器上运行多个
    SQL 实例，则需要仔细考虑每个实例的 `最大服务器内存` 值。'
- fmt: '## Other Installation Methods


    SQL Server setup for Windows still supports options without a user interface through
    the command line. You can find examples of how to do this and see all the options
    at [`https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt`](https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt).
    The only differences for SQL Server 2022 are the removal of options for discontinued
    features as described earlier in this chapter and the addition of new parameters
    to support the `Azure extension for SQL Server`.


    If you are new to setting up SQL Server, you should know that the SQL Server Evaluation
    and Developer Editions come with an "easy setup" mode with an installer that installs
    just the defaults without going through any screens. If you choose this method,
    the `Azure extension for SQL Server` feature is not selected. If you want the
    full setup experience with the Evaluation or Developer Edition, choose the `Custom`
    option from the initial setup screen.


    ## Setting Up the Azure Extension for SQL Server


    In 2020, we announced a new hybrid capability for SQL Server called `Azure Arc–enabled
    SQL Server`. The concept is to take an existing installation of SQL Server and
    connect to Azure to provide new capabilities such as viewing instance details
    in the Azure portal, `Microsoft Defender`, and best practices assessments. The
    process of setting up SQL Server with `Azure Arc` is done from the Azure portal
    or through scripts. SQL Server 2022 provides an integrated method to install this
    in the SQL Server setup process, through a setup feature called the `Azure extension
    for SQL Server`.


    The `Azure extension for SQL Server` provides the following capabilities for SQL
    Server 2022:


    *   `Microsoft Defender` for SQL


    *   `SQL Assessment` (which you can read more about at [`https://docs.microsoft.com/sql/sql-server/azure-arc/assess`](https://docs.microsoft.com/sql/sql-server/azure-arc/assess))


    *   View of a connected SQL Server in the Azure portal along with other Azure
    SQL resources


    *   `Azure Active Directory (AAD)` authentication


    *   Access policies in `Microsoft Purview` (`Purview` integration requires `AAD`,
    which also requires the `Azure extension for SQL Server`)


    You will learn more about these features in Chapter [3](#525217_1_En_3_Chapter.xhtml)
    of the book. I will describe more about the role of `Azure Arc–enabled SQL Server`
    in Chapter [11](#525217_1_En_11_Chapter.xhtml) of the book. Just connecting SQL
    Server to Azure does not cost you anything. It is only when you select certain
    services such as `Microsoft Defender` or `Purview` that you incur subscription
    costs.


    Note


    The `Azure extension for SQL Server` is not supported when running SQL Server
    on an Azure Virtual Machine. SQL Server uses the `Infrastructure-as-a-Service
    (IaaS) Agent Extension` to provide capabilities like `Defender`, assessments,
    and `AAD` authentication. You can read more about the `IaaS Agent Extension` at
    [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management).


    Figure [2-3](#525217_1_En_2_Chapter.xhtml#Fig3) shows the information needed to
    set up the `Azure extension for SQL Server`.


    ![](Images/525217_1_En_2_Fig3_HTML.png)


    A screenshot of the S Q L server 2022. It has options for azure service and subscription
    I D, resource group, region, tenant I D, and server U R L for azure extension.


    Figure 2-3


    Setting up the `Azure extension for SQL Server`


    I''ll describe how to fill out these fields with information for Azure. I have
    some example files that can help you in this chapter in the `ch2_install` folder
    for the samples that come with the book.


    ### What You Should Know First


    Let me stop here before you read on to give you some guidance on Azure topics
    that I will discuss as part of filling out these fields:


    *   The following information assumes you have an `Azure subscription` and your
    SQL Server is connected to the Internet directly or will be through a proxy. If
    you don''t have an `Azure subscription`, check with your organization. Or you
    can get started at [`https://azure.microsoft.com/get-started/`](https://azure.microsoft.com/get-started/).


    *   Read up on the concept of `Azure Role-Based Access Control (RBAC)`. `RBAC`
    is a permission system in Azure to give you rights to perform certain actions
    in Azure. You can learn more about `Azure RBAC` at [`https://docs.microsoft.com/azure/role-based-access-control/overview`](https://docs.microsoft.com/azure/role-based-access-control/overview).


    *   You need to check your permissions within your `Azure subscription` to ensure
    you can create a `resource group` and custom permissions for `Azure Arc` or the
    ability to create a `custom role` and a `service principal`. If these examples
    fail due to lack of permissions, check with the administrator of your `Azure subscription`.
    The permissions for your `Azure account` or a `custom role` to be used with a
    `service principal` can be found at [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions).


    *   A valid `Azure Resource Group`. You may have one already you want to use,
    or you can create a new one. You can use this documentation page to learn how
    to create a new `resource group`: [`https://docs.microsoft.com/azure/azure-resource-manager/management/manage-resource-groups-portal`](https://docs.microsoft.com/azure/azure-resource-manager/management/manage-resource-groups-portal).
    When you create the `resource group`, choose an `Azure region` that is supported
    for `Azure Arc–enabled servers`, which is documented at [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#supported-azure-regions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#supported-azure-regions).


    *   I recommend you install the `az` command line interface (`CLI`) from [`https://docs.microsoft.com/cli/azure/`](https://docs.microsoft.com/cli/azure/)
    or use the `Azure Cloud Shell` (which you can learn more about at [`https://docs.microsoft.com/azure/cloud-shell/overview`](https://docs.microsoft.com/azure/cloud-shell/overview)).


    *   If you decide to use a `service principal`, you will need to create a `custom
    role` in Azure that includes the following permissions: [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions).
    To learn how to create a `custom role`, go to [`https://docs.microsoft.com/azure/active-directory/roles/custom-create`](https://docs.microsoft.com/azure/active-directory/roles/custom-create).


    Note


    For my tenant at Microsoft, I didn''t have permission to create a `custom role`
    in the Azure portal. However, I was able to create one using the `az CLI` as documented
    at [`https://docs.microsoft.com/azure/role-based-access-control/custom-roles-cli`](https://docs.microsoft.com/azure/role-based-access-control/custom-roles-cli).
    You can see my example JSON file from the samples for this chapter called `sqlazureext.json`.
    The script to create the role using this JSON file is in the sample file `createcustomrole.ps1`.


    *   If you decide to use a `service principal`, you can do this with the `az`
    command line interface (`CLI`) to create one for your subscription and `resource
    group`: [`https://docs.microsoft.com/cli/azure/create-an-azure-service-principal-azure-cli`](https://docs.microsoft.com/cli/azure/create-an-azure-service-principal-azure-cli).'
