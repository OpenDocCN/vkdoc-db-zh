    \ This may not be an issue for you if you use character data in your database\
    \ that is not dependent on different collations. Select Next.\n\n![](Images/525217_1_En_3_Fig6_HTML.png)\n\
    \nA screenshot shows the new managed instance link. The results option is selected\
    \ on the left pane. Task titled scripting setup is selected under summary on the\
    \ right pane.\n\nFigure 3-6\n\nA successful creation of a link to Azure SQL Managed\
    \ Instance\n\n1.  The next screen shows options to create the **Distributed Availability\
    \ Group** (DAG). Leave these defaults and select Next.\n\n2.  The next screen\
    \ is the **final step**. Select Finish. Note that the time it takes to complete\
    \ the link creation depends on the size of your source database because database\
    \ seeding takes place here. There is also a button to generate a script for what\
    \ the wizard does. When this is finished, your screen should look like Figure\
    \ [3-6](#525217_1_En_3_Chapter.xhtml#Fig6).\n\n![](Images/525217_1_En_3_Fig7_HTML.png)\n\
    \nA screenshot of azure replicated database shows 1 managed instance database.\
    \ The wide world importers database is online and it has no restore point available.\n\
    \nFigure 3-7\n\nA replicated database in Managed Instance\n\n1.  Navigate in the\
    \ Azure portal to your Managed Instance. You should see your database is replicated\
    \ in Azure and has a status of Online as seen in Figure [3-7](#525217_1_En_3_Chapter.xhtml#Fig7).\n\
    \nNote the tag at the top of this figure shows the Managed Instance is compatible\
    \ with SQL Server 2022.\n\n![](Images/525217_1_En_3_Fig8_HTML.png)\n\nA screenshot\
    \ shows a folder list with parent node s q l 2022 client. Databases, security,\
    \ available groups, D A G, and other collapsible items are visible under the parent\
    \ node.\n\nFigure 3-8\n\nDatabase, AG, and DAG status after link creation\n\n\
    1.  Use Object Explorer in SSMS connected to SQL Server to see the status of the\
    \ database as Synchronized (you will need to refresh to see this) and a detailed\
    \ list of the AG and DAG created for the link. Your screen should look similar\
    \ to Figure [3-8](#525217_1_En_3_Chapter.xhtml#Fig8).\n\nSince we are using the\
    \ built-in capabilities of SQL Server for an AG and DAG, you can also use a rich\
    \ set of Dynamic Management Views (DMVs) to inspect the configuration. Check out\
    \ these examples at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#monitor-health`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#monitor-health).\n\
    \n1.  Execute the script **checkstatus.sql** against the SQL Server 2022 instance,\
    \ which uses the following T-SQL statements:\n\n```\n    SELECT @@SERVERNAME;\n\
    \    GO\n    SELECT DATABASEPROPERTYEX('WideWorldImporters', 'Updateability');\n\
    \    GO\n    SELECT DATABASEPROPERTYEX('WideWorldImporters', 'Version');\n   \
    \ GO\n    ```\n\nYou will see the status of READ_WRITE and a database version\
    \ that is the locked-in version for SQL Server 2022.\n\n2.  Connect with SSMS\
    \ to the Managed Instance you have deployed. Execute the **checkstatus.sql** script.\
    \ You should see the Updateability is READ_ONLY, and the database version should\
    \ match SQL Server 2022."
  trans: "\n## 准备环境\n\n首先，您需要做一些准备工作，以便创建到托管实例的链接。完整详细信息请查阅 [`https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-preparation`](https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-preparation)。请仔细阅读这些内容。涉及以下步骤：\n\
    \n- 在主数据库中创建一个主密钥。\n- 为 SQL Server 启用可用性组功能（如果尚未启用）。\n- （可选但推荐）启用启动跟踪标志以提升性能。\n\
    - 配置 SQL Server 与 Azure SQL 托管实例之间的网络连接。\n- 为端口 `5022`（dbm 端点）开放防火墙和 Azure 网络安全组（NSG）设置。\n\
    - 如果您的 SQL Server 数据库使用了透明数据加密（TDE），则需要将证书迁移到托管实例，以便链接该数据库。\n\n## 创建链接以复制数据库\n\
    \n现在，让我们逐步介绍如何使用 SSMS 中的向导创建到托管实例的链接，以复制 SQL Server 上的数据库：\n\n![Images/525217_1_En_3_Fig4_HTML.png](img/525217_1_En_3_Fig4_HTML.png)\n\
    \n*屏幕截图显示了 sql 2022 客户端文件夹的内容。已选择“wide world importers”子文件夹用于“azure sql managed\
    \ instance link”，其中包含“复制”和“故障转移”选项。*\n\n**图 3-4** 使用 SSMS 创建到 Azure SQL 托管实例的链接\n\
    \n1.  执行脚本 `restorewwi_std.sql`，将 `WideWorldImporters` 数据库还原到 SQL Server 2022。您可能需要编辑备份文件以及数据和日志文件的文件路径。此脚本使用以下\
    \ T-SQL 语句：\n\n    ```\n    USE master;\n    GO\n    RESTORE DATABASE WideWorldImporters\
    \ FROM DISK = 'c:\\sql_sample_databases\\WideWorldImporters-Standard.bak' WITH\n\
    \    MOVE 'WWI_Primary' TO 'f:\\data\\WideWorldImporters.mdf',\n    MOVE 'WWI_UserData'\
    \ TO 'f:\\data\\WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log' TO 'g:\\\
    log\\WideWorldImporters.ldf',\n    stats=5;\n    GO\n    ```\n\n2.  我们需要将恢复模式更改为\
    \ `FULL` 并备份数据库。执行脚本 `fullandbackup.sql`，其中包含以下 T-SQL 语句。您可能需要编辑备份文件的路径：\n\n \
    \   ```\n    -- 在 SQL Server 上运行\n    -- 为所有要复制的数据库设置完整恢复模式。\n    ALTER DATABASE\
    \ WideWorldImporters SET RECOVERY FULL;\n    GO\n    -- 为所有要复制的数据库执行备份。\n    BACKUP\
    \ DATABASE WideWorldImporters TO DISK = N'c:\\sql_sample_databases\\wwi.bak';\n\
    \    GO\n    ```\n\n3.  启动 `SSMS` 并连接到 SQL Server 2022。右键单击您的数据库，选择复制数据库的选项，如图\
    \ 3-4 所示。\n\n![Images/525217_1_En_3_Fig5_HTML.png](img/525217_1_En_3_Fig5_HTML.png)\n\
    \n*屏幕截图显示了新的托管实例链接。左侧窗格选择了“选择托管实例”。右侧窗格中的警告消息显示“数据库排序规则不匹配”。*\n\n**图 3-5** 选择托管实例以创建链接\n\
    \n1.  现在，您将进入“复制数据库向导”的一系列步骤。选择 `下一步`。第一个屏幕会验证您是否满足使用链接功能的 `要求`。\n2.  现在 `选择您的数据库`\
    \ 进行复制，然后选择 `下一步`。\n3.  接下来，您需要提供已部署托管实例的信息。这需要您登录 Azure 并选择订阅、资源组和托管实例。您还需要选择\
    \ `登录` 以连接到所选的托管实例。完成后，您的屏幕应如图 3-5 所示。\n\n请注意关于排序规则的警告。我为我的托管实例选择了不同的排序规则，以便向您展示如果排序规则不匹配时您将看到的警告。如果您的数据库中使用的字符数据不依赖于不同的排序规则，这可能对您不是问题。选择\
    \ `下一步`。\n\n![Images/525217_1_En_3_Fig6_HTML.png](img/525217_1_En_3_Fig6_HTML.png)\n\
    \n*屏幕截图显示了新的托管实例链接。左侧窗格选择了“结果”选项。右侧窗格的“摘要”下选择了名为“脚本设置”的任务。*\n\n**图 3-6** 成功创建到\
    \ Azure SQL 托管实例的链接\n\n1.  下一个屏幕显示创建 `分布式可用性组`（DAG）的选项。保留这些默认设置并选择 `下一步`。\n2.\
    \  下一个屏幕是 `最后一步`。选择 `完成`。请注意，完成链接创建所需的时间取决于源数据库的大小，因为此处会进行数据库设定。还有一个按钮可以生成向导操作的脚本。完成后，您的屏幕应如图\
    \ 3-6 所示。\n\n![Images/525217_1_En_3_Fig7_HTML.png](img/525217_1_En_3_Fig7_HTML.png)\n\
    \n*Azure 复制数据库的屏幕截图，显示了 1 个托管实例数据库。Wide World Importers 数据库处于联机状态，并且没有可用的恢复点。*\n\
    \n**图 3-7** 托管实例中已复制的数据库\n\n1.  在 Azure 门户中导航到您的托管实例。您应该会看到您的数据库已在 Azure 中复制，并且状态为\
    \ `联机`，如图 3-7 所示。\n\n请注意，此图顶部的标签显示该托管实例与 SQL Server 2022 兼容。\n\n![Images/525217_1_En_3_Fig8_HTML.png](img/525217_1_En_3_Fig8_HTML.png)\n\
    \n*屏幕截图显示了一个文件夹列表，其父节点是“sql 2022 客户端”。在父节点下可以看到“数据库”、“安全性”、“可用性组”、“DAG”和其他可折叠项目。*\n\
    \n**图 3-8** 链接创建后的数据库、AG 和 DAG 状态\n\n1.  使用连接到 SQL Server 的 `SSMS` 中的对象资源管理器，可以看到数据库状态为\
    \ `已同步`（您需要刷新才能看到此状态），以及为链接创建的 AG 和 DAG 的详细列表。您的屏幕应类似于图 3-8。\n\n由于我们使用的是 SQL Server\
    \ 用于 AG 和 DAG 的内置功能，您还可以使用丰富的动态管理视图（`DMV`）来检查配置。请查看 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#monitor-health`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#monitor-health)\
    \ 上的这些示例。\n\n1.  针对 SQL Server 2022 实例执行脚本 `checkstatus.sql`，该脚本使用以下 T-SQL 语句：\n\
    \n    ```\n    SELECT @@SERVERNAME;\n    GO\n    SELECT DATABASEPROPERTYEX('WideWorldImporters',\
    \ 'Updateability');\n    GO\n    SELECT DATABASEPROPERTYEX('WideWorldImporters',\
    \ 'Version');\n    GO\n    ```\n\n    您将看到状态为 `READ_WRITE`，以及锁定为 SQL Server 2022\
    \ 的数据库版本。\n\n2.  使用 `SSMS` 连接到您已部署的托管实例。执行 `checkstatus.sql` 脚本。您应该看到 `Updateability`\
    \ 为 `READ_ONLY`，并且数据库版本应与 SQL Server 2022 匹配。\n"
- fmt: "#### 查看更改的复制情况\n\n1.  在 SQL Server 2022 数据库上执行脚本 `ddl.sql` 以创建两个新表。此脚本使用以下\
    \ T-SQL 语句：\n\n    ```\n    USE [WideWorldImporters];\n    GO\n    DROP TABLE\
    \ IF EXISTS [Warehouse].[Vehicles];\n    GO\n    CREATE TABLE [Warehouse].[Vehicles](\n\
    \    [Vehicle_Registration] [nchar](20) NOT NULL,\n    [Vehicle_Type] [nchar](20)\
    \ NULL,\n    [Vehicle_State] [nvarchar](100) NULL,\n    [Vehicle_City] [nvarchar](100)\
    \ NULL,\n    [Vehicle_Status] [nvarchar](10) NULL,\n    PRIMARY KEY CLUSTERED\n\
    \    (\n    [Vehicle_Registration] ASC\n    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
    \ = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON, OPTIMIZE_FOR_SEQUENTIAL_KEY\
    \ = OFF) ON [USERDATA]\n    ) ON [USERDATA];\n    GO\n    DROP TABLE IF EXISTS\
    \ [Warehouse].[Vehicle_StockItems];\n    GO\n    CREATE TABLE [Warehouse].[Vehicle_StockItems](\n\
    \    [Vehicle_Registration] [nchar](20) NOT NULL,\n    [StockItemID] [int] NOT\
    \ NULL,\n    CONSTRAINT [PK_Vehicle_StockItems] PRIMARY KEY CLUSTERED\n    (\n\
    \    [Vehicle_Registration] ASC,\n    [StockItemID] ASC\n    )WITH (PAD_INDEX\
    \ = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS =\
    \ ON, ALLOW_PAGE_LOCKS = ON, OPTIMIZE_FOR_SEQUENTIAL_KEY = OFF) ON [USERDATA]\n\
    \    ) ON [USERDATA];\n    GO\n    ```\n\n2.  执行脚本 `populatedata.sql` 向这些表添加数据。注意脚本中，每个车辆将获得一件货物。\n\
    3.  在 SSMS 中对 SQL Server 和托管实例执行脚本 `getcargocounts.sql`。此脚本使用以下 T-SQL 语句：\n\n\
    \    ```\n    USE WideWorldImporters;\n    GO\n    SELECT v.Vehicle_Registration,\
    \ v.Vehicle_City, count(*) AS cargo\n    FROM Warehouse.Vehicles v\n    JOIN Warehouse.Vehicle_StockItems\
    \ vs\n    ON v.Vehicle_Registration = vs.Vehicle_Registration\n    GROUP BY v.Vehicle_Registration,\
    \ v.Vehicle_City;\n    GO\n    ```\n\n    你应该看到 SQL Server 和托管实例的结果相同。\n\n####\
    \ 故障转移到托管实例\n\n现在让我们看看故障转移到托管实例的过程。\n\n![](Images/525217_1_En_3_Fig9_HTML.png)\n\
    \n截图显示，在父节点 `s q l 2022 client` 下选择了 `wide world importers` 选项。从下拉菜单中选择了“从 Azure\
    \ SQL 托管实例链接故障转移数据库”。\n\n图 3-9\n使用 SSMS 执行故障转移\n\n1.  在 SSMS 中使用对象资源管理器，选择“故障转移数据库”，使用与你复制数据库时相同的选择，如图\
    \ [3-9](#525217_1_En_3_Chapter.xhtml#Fig9) 所示。\n\n![](Images/525217_1_En_3_Fig10_HTML.png)\n\
    \n截图显示“故障转移数据库到托管实例”。左侧窗格中突出显示了故障转移类型。右侧窗格中选择了“计划的手动故障转移”。\n\n图 3-10\n选择故障转移类型\n\
    \n1.  选择“下一步”，你将看到一个登录 Azure 的屏幕。选择你的托管实例部署的订阅，然后选择“下一步”。\n2.  你可以选择“计划或强制故障转移”。选择“计划手动故障转移”并选择你已停止工作负载的选项（我们没有运行任何写入操作）。你的屏幕应如图\
    \ [3-10](#525217_1_En_3_Chapter.xhtml#Fig10) 所示。\n    选择 **下一步**。\n\n![](Images/525217_1_En_3_Fig11_HTML.png)\n\
    \n截图显示“故障转移数据库到托管实例”。左侧窗格中选择了“结果”选项。右侧可见六个任务，其中四个带有复选标记，脚本设置被突出显示。\n\n图 3-11\n\
    已完成的故障转移到托管实例\n\n1.  你现在可以选择“清理”之前创建的 AG 和/或 DAG。你可以选择保留这些并在以后重新创建链接，但出于本练习的目的，我将勾选两个选项并选择“下一步”。\n\
    2.  你现在处于完成故障转移的最终屏幕。选择“完成”。此步骤将 DAG 更改为同步模式，通过比较两个系统上的 LSN 值来检查所有日志更改是否已同步，然后删除链接。完成后，你的屏幕应如图\
    \ [3-11](#525217_1_En_3_Chapter.xhtml#Fig11) 所示。\n3.  使用 SSMS 再次对托管实例执行脚本 `checkstatus.sql`，查看状态现在为\
    \ `READ_WRITE`。\n4.  你也可以从 SQL Server 的 SSMS 中看到 AG 和 DAG 已被移除。\n\n在真实的故障转移中，你现在需要将应用程序更改为连接到托管实例，并将任何实例级对象（如\
    \ SQL Agent 作业、登录名等）迁移到托管实例。\n\n#### 将数据库还原回 SQL Server\n\n正如我们在本章所述，此灾难恢复选项称为离线，因为即使你可以执行在线故障转移，但要故障恢复回\
    \ SQL Server 需要数据库备份和还原。完全备份和还原可能需要一些时间，因此你的停机时间更长，故称为离线。\n\n将数据库从托管实例还原到 SQL\
    \ Server 的步骤如下：\n\n1.  如果你希望故障恢复包含对 SQL Server 的所有更改，请停止对 Azure SQL 托管实例工作负载的所有写入。\n\
    2.  从 Azure SQL 托管实例创建数据库的 `COPY_ONLY` 备份。使用文档了解如何通过连接到托管实例的 SSMS 将数据库备份到 Azure\
    \ 存储。（如果你需要，也有 T-SQL 选项。从步骤 [`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#create-credential`](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#create-credential)\
    \ 开始。）\n3.  使用 SSMS（也有 T-SQL 选项）连接到 SQL Server，从 Azure 存储还原数据库。从 [`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#restore-database`](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#restore-database)\
    \ 开始按照文档中的步骤操作。如果链接功能的原始数据库存在，你将需要为 SQL Server 上的数据库选择一个不同的名称。\n4.  你还需要再次将应用程序指向\
    \ SQL Server 而不是托管实例。此外，你需要迁移实例对象，例如 SQL Agent 作业。\n5.  你现在可以选择重新创建到托管实例的链接，以重建你的灾难恢复站点。在执行此操作之前，你需要删除之前在托管实例上链接的数据库。"
  raw: "#### See Changes Replicated\n\n1.  Execute the script **ddl.sql** against\
    \ the SQL Server 2022 database to create two new tables. This script uses the\
    \ following T-SQL statements:\n\n    ```\n    USE [WideWorldImporters];\n    GO\n\
    \    DROP TABLE IF EXISTS [Warehouse].[Vehicles];\n    GO\n    CREATE TABLE [Warehouse].[Vehicles](\n\
    \    [Vehicle_Registration] [nchar](20) NOT NULL,\n    [Vehicle_Type] [nchar](20)\
    \ NULL,\n    [Vehicle_State] [nvarchar](100) NULL,\n    [Vehicle_City] [nvarchar](100)\
    \ NULL,\n    [Vehicle_Status] [nvarchar](10) NULL,\n    PRIMARY KEY CLUSTERED\n\
    \    (\n    [Vehicle_Registration] ASC\n    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
    \ = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON, OPTIMIZE_FOR_SEQUENTIAL_KEY\
    \ = OFF) ON [USERDATA]\n    ) ON [USERDATA];\n    GO\n    DROP TABLE IF EXISTS\
    \ [Warehouse].[Vehicle_StockItems];\n    GO\n    CREATE TABLE [Warehouse].[Vehicle_StockItems](\n\
    \    [Vehicle_Registration] [nchar](20) NOT NULL,\n    [StockItemID] [int] NOT\
    \ NULL,\n    CONSTRAINT [PK_Vehicle_StockItems] PRIMARY KEY CLUSTERED\n    (\n\
    \    [Vehicle_Registration] ASC,\n    [StockItemID] ASC\n    )WITH (PAD_INDEX\
    \ = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS =\
    \ ON, ALLOW_PAGE_LOCKS = ON, OPTIMIZE_FOR_SEQUENTIAL_KEY = OFF) ON [USERDATA]\n\
    \    ) ON [USERDATA];\n    GO\n    ```\n\n2.  Execute the script **populatedata.sql**\
    \ to add data to these tables. Note from the script that each vehicle will get\
    \ one piece of cargo.\n\n3.  Execute the script **getcargocounts.sql** against\
    \ both SQL Server and Managed Instance in SSMS. This script uses the following\
    \ T-SQL statements:\n\n    ```\n    USE WideWorldImporters;\n    GO\n    SELECT\
    \ v.Vehicle_Registration, v.Vehicle_City, count(*) AS cargo\n    FROM Warehouse.Vehicles\
    \ v\n    JOIN Warehouse.Vehicle_StockItems vs\n    ON v.Vehicle_Registration =\
    \ vs.Vehicle_Registration\n    GROUP BY v.Vehicle_Registration, v.Vehicle_City;\n\
    \    GO\n    ```\n\n    You should see the same results for both SQL Server and\
    \ Managed Instance.\n\n#### Failover to Managed Instance\n\nNow let’s see the\
    \ process to fail over to Managed Instance.\n\n![](Images/525217_1_En_3_Fig9_HTML.png)\n\
    \nA screenshot shows the wide world importers option is selected under the parent\
    \ node s q l 2022 client. Failover database from azure s q l managed instance\
    \ link is selected from the dropdown.\n\nFigure 3-9\n\nUsing SSMS to perform a\
    \ failover\n\n1.  Using Object Explorer in SSMS, select **Failover database**\
    \ using the same option as you did to replicate the database as seen in Figure\
    \ [3-9](#525217_1_En_3_Chapter.xhtml#Fig9).\n\n![](Images/525217_1_En_3_Fig10_HTML.png)\n\
    \nA screenshot shows failover database to managed instance. The failover type\
    \ in the left pane is highlighted. The planned manual failover in the right pane\
    \ is selected.\n\nFigure 3-10\n\nChoosing a failover type\n\n1.  Select Next,\
    \ and you will be presented with a screen to **log in to Azure.** Choose your\
    \ subscription for your Managed Instance deployment and select Next.\n\n2.  You\
    \ have a choice for a **planned or forced failover**. Select Planned manual failover\
    \ and select the option you have stopped your workload (we don’t have one running\
    \ doing any writes). Your screen should look like Figure [3-10](#525217_1_En_3_Chapter.xhtml#Fig10).\n\
    \nSelect **Next**.\n\n![](Images/525217_1_En_3_Fig11_HTML.png)\n\nA screenshot\
    \ shows the failover database to managed instance. Results option is selected\
    \ in the left pane. Six tasks with 4 checkmarks are visible on the right with\
    \ scripting setup highlighted.\n\nFigure 3-11\n\nA completed failover to Managed\
    \ Instance\n\n1.  You now have a choice to **clean up** the AG and/or DAG that\
    \ was created earlier. You could choose to keep these and recreate the link later,\
    \ but for purposes of this exercise, I’ll check both options and select Next.\n\
    \n2.  You are now on the final screen to complete the failover. Select Finish.\
    \ This step changes the DAG to synchronize mode, checks that all log changes are\
    \ synchronized by comparing LSN values on both systems, and then removes the link.\
    \ When done, your screen should look like Figure [3-11](#525217_1_En_3_Chapter.xhtml#Fig11).\n\
    \n1.  Using SSMS execute the script **checkstatus.sql** again against Managed\
    \ Instance to see the status is now READ_WRITE.\n\n2.  You can also see from SSMS\
    \ on SQL Server the AG and DAG are removed.\n\nIn a real-world failover, you would\
    \ now need to change your application to connect to Managed Instance and migrate\
    \ any instance-level objects to Managed Instance like SQL Agent jobs, logins,\
    \ etc.\n\n#### Restoring a Database Back to SQL Server\n\nAs we have described\
    \ in this chapter, this disaster recovery option is called offline because even\
    \ though you can perform an online failover, your ability to fail back to SQL\
    \ Server requires a database backup and restore. A full backup and restore could\
    \ take some time, so your downtime is longer, hence offline.\n\nThe steps to restore\
    \ a database from Managed Instance to SQL Server are the following:\n\n1.  Stop\
    \ all writes to your workload for Azure SQL Managed Instance if you want the failback\
    \ to include all changes to SQL Server.\n\n2.  Create a COPY_ONLY backup of your\
    \ database from Azure SQL Managed Instance. Use the documentation to learn how\
    \ to back up a database to Azure storage using SSMS connected to Managed Instance.\
    \ (There are options for T-SQL as well if you want those. Start at the step [`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#create-credential`](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#create-credential).)\n\
    \n3.  Restore the database from Azure storage connected to SQL Server using SSMS\
    \ (there are also T-SQL options). Use the steps in the documentation starting\
    \ at [`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#restore-database`](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#restore-database).\
    \ You will need to choose a different database name on SQL Server if the original\
    \ database for the link feature exists.\n\n4.  You will also need to change the\
    \ application again to point to SQL Server instead of Managed Instance. In addition,\
    \ you will need to migrate instance objects such as SQL Agent jobs.\n\n5.  You\
    \ now have the option to recreate the link to Managed Instance to reestablish\
    \ your disaster recovery site. Before you do this, you will need to drop the database\
    \ linked before on Managed Instance."
  trans: "#### 查看更改的复制情况\n\n1.  在 SQL Server 2022 数据库上执行脚本 `ddl.sql` 以创建两个新表。此脚本使用以下\
    \ T-SQL 语句：\n\n    ```\n    USE [WideWorldImporters];\n    GO\n    DROP TABLE\
    \ IF EXISTS [Warehouse].[Vehicles];\n    GO\n    CREATE TABLE [Warehouse].Vehicles\
    \ NOT NULL,\n    [Vehicle_Type] nchar NULL,\n    [Vehicle_State] nvarchar NULL,\n\
    \    [Vehicle_City] nvarchar NULL,\n    [Vehicle_Status] nvarchar NULL,\n    PRIMARY\
    \ KEY CLUSTERED\n    (\n    [Vehicle_Registration] ASC\n    )WITH (PAD_INDEX =\
    \ OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON,\
    \ ALLOW_PAGE_LOCKS = ON, OPTIMIZE_FOR_SEQUENTIAL_KEY = OFF) ON [USERDATA]\n  \
    \  ) ON [USERDATA];\n    GO\n    DROP TABLE IF EXISTS [Warehouse].[Vehicle_StockItems];\n\
    \    GO\n    CREATE TABLE [Warehouse].Vehicle_StockItems NOT NULL,\n    [StockItemID]\
    \ [int] NOT NULL,\n    CONSTRAINT [PK_Vehicle_StockItems] PRIMARY KEY CLUSTERED\n\
    \    (\n    [Vehicle_Registration] ASC,\n    [StockItemID] ASC\n    )WITH (PAD_INDEX\
    \ = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS =\
    \ ON, ALLOW_PAGE_LOCKS = ON, OPTIMIZE_FOR_SEQUENTIAL_KEY = OFF) ON [USERDATA]\n\
    \    ) ON [USERDATA];\n    GO\n    ```\n\n2.  执行脚本 `populatedata.sql` 向这些表添加数据。请注意，在此脚本中，每辆车将关联一件货物。\n\
    3.  在 SSMS 中，针对 SQL Server 和托管实例执行脚本 `getcargocounts.sql`。此脚本使用以下 T-SQL 语句：\n\n\
    \    ```\n    USE WideWorldImporters;\n    GO\n    SELECT v.Vehicle_Registration,\
    \ v.Vehicle_City, count(*) AS cargo\n    FROM Warehouse.Vehicles v\n    JOIN Warehouse.Vehicle_StockItems\
    \ vs\n    ON v.Vehicle_Registration = vs.Vehicle_Registration\n    GROUP BY v.Vehicle_Registration,\
    \ v.Vehicle_City;\n    GO\n    ```\n\n    你应该会看到 SQL Server 和托管实例返回的结果相同。\n\n\
    #### 故障转移到托管实例\n\n现在，让我们看看故障转移到托管实例的过程。\n\n![](img/525217_1_En_3_Fig9_HTML.png)\n\
    \n截图显示，在父节点 `sql 2022 client` 下选择了 `wide world importers` 选项。从下拉菜单中选择了“从 Azure\
    \ SQL 托管实例链接故障转移数据库”。\n\n图 3-9\n使用 SSMS 执行故障转移\n\n1.  在 SSMS 中使用对象资源管理器，选择“故障转移数据库”，使用与你复制数据库时相同的选择，如图\
    \ 3-9 所示。\n\n![](img/525217_1_En_3_Fig10_HTML.png)\n\n截图显示“故障转移数据库到托管实例”窗口。左侧窗格中突出了故障转移类型。右侧窗格中选择了“计划的手动故障转移”。\n\
    \n图 3-10\n选择故障转移类型\n\n1.  选择“下一步”，你将看到一个登录 Azure 的屏幕。选择你的托管实例部署所使用的订阅，然后选择“下一步”。\n\
    2.  你可以选择“计划或强制故障转移”。选择“计划手动故障转移”，并勾选你已停止工作负载的选项（我们没有运行任何写入操作）。你的屏幕应如图 3-10 所示。\n\
    \    选择 **下一步**。\n\n![](img/525217_1_En_3_Fig11_HTML.png)\n\n截图显示“故障转移数据库到托管实例”窗口。左侧窗格中选择了“结果”选项。右侧显示了六个任务，其中四个带有复选标记，脚本设置被突出显示。\n\
    \n图 3-11\n已完成的故障转移到托管实例\n\n1.  你现在可以选择“清理”之前创建的 AG 和/或 DAG。你可以选择保留它们并在以后重新创建链接，但为了本练习的目的，我将勾选两个选项并选择“下一步”。\n\
    2.  你现在处于完成故障转移的最终屏幕。选择“完成”。此步骤将 DAG 更改为同步模式，通过比较两个系统上的 LSN 值来检查所有日志更改是否已同步，然后删除链接。完成后，你的屏幕应如图\
    \ 3-11 所示。\n3.  使用 SSMS 再次对托管实例执行脚本 `checkstatus.sql`，查看状态现在是否为 `READ_WRITE`。\n\
    4.  你也可以从连接到 SQL Server 的 SSMS 中看到 AG 和 DAG 已被移除。\n\n在真实的故障转移场景中，你现在需要将应用程序更改为连接到托管实例，并将任何实例级对象（如\
    \ SQL Agent 作业、登录名等）迁移到托管实例。\n\n#### 将数据库还原回 SQL Server\n\n正如我们在本章所述，此灾难恢复选项被称为“离线”，因为即使你可以执行在线故障转移，但要故障恢复回\
    \ SQL Server 则需要数据库备份和还原。完全备份和还原可能需要一些时间，因此你的停机时间更长，故称为“离线”。\n\n将数据库从托管实例还原到 SQL\
    \ Server 的步骤如下：\n\n1.  如果你希望故障恢复包含对 SQL Server 的所有更改，请停止对 Azure SQL 托管实例工作负载的所有写入操作。\n\
    2.  从 Azure SQL 托管实例创建数据库的 `COPY_ONLY` 备份。请参阅文档了解如何通过连接到托管实例的 SSMS 将数据库备份到 Azure\
    \ 存储。（如果你需要，也有 T-SQL 选项。从步骤 [`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#create-credential`](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#create-credential)\
    \ 开始。）\n3.  使用 SSMS（也有 T-SQL 选项）连接到 SQL Server，从 Azure 存储还原数据库。从 [`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#restore-database`](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#restore-database)\
    \ 开始按照文档中的步骤操作。如果链接功能的原始数据库仍然存在，你将需要为 SQL Server 上的数据库选择一个不同的名称。\n4.  你还需要将应用程序重新指向\
    \ SQL Server 而非托管实例。此外，你需要迁移实例对象，例如 SQL Agent 作业。\n5.  你现在可以选择重新创建到托管实例的链接，以重建你的灾难恢复站点。在执行此操作之前，你需要先删除之前在托管实例上链接的数据库。\n"
- fmt: '### 注意事项


    使用 Azure SQL Managed Instance 时，请牢记以下几点细节：


    *   一个链接只允许对应一个数据库。您可以在一个 SQL Server 上创建多个链接，或让多个服务器指向同一个托管实例。目前，一个托管实例最多可支持 100
    个链接。同时，请考虑您的托管实例需要多少存储空间来支持链接中的数据库。

    *   任何 Azure SQL Managed Instance 不支持的功能（例如 `filestream`）也不支持链接功能。

    *   如果目标 Azure SQL Managed Instance 使用的是通用服务层，则不支持内存中 OLTP，因为该服务层不支持内存中 OLTP。

    *   请遵循最佳实践，例如定期进行事务日志备份，这是任何 `DAG` 设置都应执行的操作。

    *   对您主要 SQL Server 上工作负载的性能影响，与您自己设置基于异步的 `DAG` 相同。由于我们使用的是异步方式，您应该会看到对写入性能的影响很小。

    *   链接功能没有监听器概念，因此在故障转移后，您的应用程序需要手动更改指向托管实例。

    *   实例级对象（如 `SQL Agent` 作业）不会被复制。故障转移后，您需要手动将这些对象迁移到托管实例。


    有关限制和约束的最新更新，请访问我们的文档：`https://docs.microsoft.com//azure/azure-sql/managed-instance/managed-instance-link-feature-overview#limitations`。


    ### Azure SQL Managed Instance 链接功能的未来


    在撰写本书时，我们仅为 `SQL Server 2016`、`SQL Server 2019` 和 `SQL Server 2022` 提供单向链接。正如您在书中所见，我们还正在发布将
    Azure SQL Managed Instance 用作离线灾难恢复站点的功能，因为您必须手动将完整备份还原到 `SQL Server 2022` 才能故障回复。


    未来无法保证，但我们打算通过诸如在线故障回复等功能来增强灾难恢复场景，类似于当今使用 `SQL Server` 时通过可用性组进行故障回复的方式。我们还想探索像同步
    `DAG` 这样的可能性。我询问了 Dani Ljepava 关于团队的愿景，以及为什么将链接功能发展到其全部功能对微软和我们的客户如此重要*：*


    *“Azure SQL Managed Instance 于 2018 年 11 月作为一项服务推出，旨在提供与 SQL Server 兼容性最高的最佳 PAAS
    服务。当时我们在内部将该项目称为‘云提升器’，主要理念是我们希望使客户能够将其工作负载从 SQL Server 直接迁移到完全托管的 PAAS 服务。自从我们推出该服务以来，客户一直向我们提出以下问题——我还没准备好迁移到
    Azure，我想在 Azure 中实现现代化但不进行迁移；我希望能够在托管实例上运行分析和读取扩展，同时仍然运行在我的 SQL Server 上。当准备好迁移时，客户询问如何降低迁移到
    Azure 的风险？如果出现任何问题，我能轻松回退到 SQL Server 吗？我的工作负载很关键，我需要尽可能短的最小迁移停机时间。一些客户问——我需要在云中我的
    SQL Server 和托管实例之间建立灾难恢复。法律要求我能够轻松地从 Azure 回退到 SQL Server，并定期执行灾难恢复演练。现在，如果您发现自己问的是这些问题之一，那么我们正是为您构建了
    MI 链接。该链接是我们‘云提升器’承诺的延伸，通过提供极致的混合灵活性，让您以自己的条款、步调和时间使用 Azure。”*


    请在 `https://aka.ms/milink` 关注 Azure SQL Managed Instance 链接功能的所有最新动态。


    ## Azure Synapse Link for SQL Server


    Azure Synapse Analytics 是解决所有类型大数据的完美方案。它是一个分析解决方案，因为它拥有用于需要分析数据的应用程序所需的强大功能和工具。然而，问题在于：要分析的数据在哪里？在许多情况下，数据可能存在于您想要使用
    Synapse 分析的 `SQL Server` 实例中。挑战在于如何在不依赖复制数据或 `ETL` 作业的情况下，将所需的数据从 `SQL Server`
    引入 `Synapse`。任何想要分析数据的人通常都希望在某种*近实时*的时间范围内完成。


    ### 什么是 Synapse Link for SQL Server？


    Synapse Link for SQL Server 是 `SQL Server` 和 `Synapse` 的一项功能，可将近实时地将 `SQL Server`
    中的数据与 `Synapse` 链接起来，且无缝衔接。这涉及您最初同步数据，然后 `Synapse Link` 将以增量方式自动捕获更改，使您能够在近实时查询
    `Synapse` 中的数据。


    `SQL Server` 多年来一直包含内置在 `SQL Server` 引擎中用于捕获更改的技术，称为*更改流*，包括复制和变更数据捕获（`CDC`）。这些功能内置于
    `SQL Server` 引擎中，以从事务日志中*提取*更改并将其*输送*到另一个目标。在目标提交更改之前，事务不会从事务日志中被截断。`Synapse Link`
    使用了更改流的一些核心功能来实现相同的目标，只不过目标将是 Azure Synapse。


    Azure Synapse Link 适用于 `SQL Server 2022` 和 Azure SQL Database。在 `SQL Server 2022`
    中使用此功能不需要 Azure 扩展。Synapse 还为 Cosmos DB 和 Dataverse 提供链接服务。Synapse Link for SQL
    的一个很大区别是数据被同步并输送到 SQL 池中。请在 `https://aka.ms/synapselinksqlserver` 获取有关 Synapse
    Link for SQL Server 的最新信息。'
  raw: '### Keep in Mind These Details


    There are a few details to keep in mind about Azure SQL Managed Instance including
    the following:


    *   Only one database is allowed for a created link. You can create multiple links
    on a SQL Server or multiple servers pointing to a single Managed Instance. Today
    a Managed Instance can have a maximum of 100 links. Also consider the storage
    required for your Managed Instance to support databases from your links.


    *   Any feature not supported by Azure SQL Managed Instance (e.g., filestream)
    is not supported with the link feature.


    *   In-Memory OLTP is not supported if the target Azure SQL Managed Instance uses
    the General Purpose service tier because this tier doesn’t support In-Memory OLTP.


    *   Use best practices like taking regular transaction log backups, which is something
    you would do with any DAG setup.


    *   The performance impact to your workload on the primary SQL Server will be
    the same as if you had set up your own async-based DAG. Since we are using async,
    you should see a minimal impact to write performance.


    *   There is no listener concept for the link feature, so your application will
    need to be manually changed to point to Managed Instance after a failover.


    *   Instance-level objects such as SQL Agent jobs are not replicated. You will
    need to manually migrate these to Managed Instance after a failover.


    For the latest updates on limits and restrictions, visit our documentation at
    [`https://docs.microsoft.com//azure/azure-sql/managed-instance/managed-instance-link-feature-overview#limitations`](https://docs.microsoft.com//azure/azure-sql/managed-instance/managed-instance-link-feature-overview#limitations).


    ### The Future for the Link Feature for Azure SQL Managed Instance


    At the time of the writing of this book, we only offered a one-way link for SQL
    Server 2016, SQL Server 2019, and SQL Server 2022\. As you saw in this book, we
    also are releasing the ability to use Azure SQL Managed Instance as an offline
    DR site because you must manually restore a full backup to SQL Server 2022 to
    fail back.


    There is never a guarantee for the future, but it is our intention to enhance
    the disaster recovery scenario with capabilities like online failback similar
    to how you can fail back with an availability group today with SQL Server. We
    would also like to explore possibilities like a synchronous DAG. I asked Dani
    Ljepava the vision of the team and why building the link feature to its fullest
    capabilities is important to Microsoft and our customers*:*


    *Azure SQL Managed Instance was launched as a service in November of 2018 with
    the aim to provide the best PAAS service that is the most compatible with SQL
    Server. We called the project internally at the time “cloud lifter” with the main
    idea that we wanted to enable customers just to lift and shift their workloads
    from SQL Server to a fully managed PAAS service. Since we’ve launched the service,
    our customers have asked us the following questions – I’m not yet ready to move
    to Azure, and I’d like to modernize in Azure, but without migrating. I want to
    be able to run analytics and read scale-out on Managed Instance, while still running
    on my SQL Server. When ready to migrate, customers asked how can I de-risk my
    migration to Azure? Can I easily revert back to SQL Server in case of any issues?
    My workload is critical, and I need the best possible minimum migration downtime.
    Some customers asked – I need to have a DR in the cloud between my SQL Server
    and Managed Instance. I’m required legally to have the ability to easily fall
    back to SQL Server from Azure and perform DR drills periodically. Now, if you
    find yourself asking one of these questions, we’ve built the MI link having with
    you in mind. The link is our extension of the “cloud lifter” promise through providing
    an ultimate hybrid flexibility to use Azure at your own terms, pace and time.*


    Keep up with all the latest on the link feature for Azure SQL Managed Instance
    at [`https://aka.ms/milink`](https://aka.ms/milink).


    ## Azure Synapse Link for SQL Server


    Azure Synapse Analytics is a perfect solution for big data of all types. It is
    an analytics solution because it has the power and tools for applications that
    need to analyze data. However, the problem is: Where is the data to analyze? In
    many cases the data may exist in a SQL Server instance you want to analyze with
    Synapse. The challenge is to get the data you need from SQL Server into Synapse
    without having to rely on copying the data or ETL jobs. Anyone who wants to analyze
    data typically wants to do this in some type of *near-real timeframe.*


    ### What Is Synapse Link for SQL Server?


    Synapse Link for SQL Server is a feature of *both* SQL Server and Synapse to link
    data from SQL Server with Synapse in near-real time and in a seamless fashion.
    This involves you initially synchronizing data, and then Synapse Link will automatically
    capture changes in an incremental fashion allowing you to query the data in Synapse
    near-real time.


    SQL Server has for many years included technology built into the SQL Server engine
    to capture changes called *change feed* including replication and change data
    capture (CDC). These features are built inside the SQL Server engine to *harvest*
    changes from the transaction log and *feed* them to another target. Transactions
    are not truncated from the transaction log until the target has committed the
    changes. Synapse Link uses some of the core capabilities of change feed to accomplish
    the same goal except the target will be Azure Synapse.


    Azure Synapse Link is available for both SQL Server 2022 and Azure SQL Database.
    The Azure extension for SQL Server is not required to use this feature in SQL
    Server 2022\. Synapse also offers link services for Cosmos DB and Dataverse. One
    big difference for Synapse Link for SQL is that the data is synchronized and fed
    into SQL pools. Keep up to date with the latest information on Synapse Link for
    SQL Server at [`https://aka.ms/synapselinksqlserver`](https://aka.ms/synapselinksqlserver).'
