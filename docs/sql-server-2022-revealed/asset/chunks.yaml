    \ within S3 to narrow what data to query.\n\n6.  Create a new set of parquet files\
    \ as an external table in a new folder for a subset of the delta table by executing\
    \ the script **createparquetfromdelta.sql**. This script executes the following\
    \ T-SQL statements:\n\n```\n    USE [WideworldImporters];\n    GO\n    IF EXISTS\
    \ (SELECT * FROM sys.objects WHERE NAME = 'PEOPLE10M_60s')\n    DROP EXTERNAL\
    \ TABLE PEOPLE10M_60s;\n    GO\n    CREATE EXTERNAL TABLE PEOPLE10M_60s\n    WITH\n\
    \    (   LOCATION = '/delta/1960s',\n    DATA_SOURCE = s3_wwi,\n    FILE_FORMAT\
    \ = ParquetFileFormat)\n    AS\n    SELECT * FROM OPENROWSET\n    (BULK '/delta/people-10m',\
    \ FORMAT = 'DELTA', DATA_SOURCE = 's3_wwi') as [people]\n    WHERE YEAR(people.birthDate)\
    \ > 1959 AND YEAR(people.birthDate) < 1970;\n    GO\n    ```\n\nThis script will\
    \ create a new folder called 1960s under the delta bucket. It will generate parquet\
    \ files only for people in the delta table who were born in the 1960s (chosen\
    \ because that is my birth decade).\n\nTo be clear about the flow here, SQL Server\
    \ executes the OPENROWSET() query against the delta table to bring back all 10\
    \ million rows, but then filters out rows based on the WHERE clause. It takes\
    \ those results and creates a set of parquet files in the /delta/1960s folder\
    \ and stores the metadata about the table and columns in system tables.\n\n7.\
    \  Use the minio console to browse the **1960s** folder under the delta bucket\
    \ to see the new parquet files created.\n\n8.  Query the new external table by\
    \ executing the script **query1960speople.sql**. This script executes the following\
    \ T-SQL statements:\n\n```\n    USE [WideWorldImporters];\n    GO\n    SELECT\
    \ * FROM PEOPLE10M_60s\n    ORDER BY birthDate;\n    GO\n    ```\n\nYou have now\
    \ seen several examples of how to query parquet files and delta tables using the\
    \ new REST API interfaces for S3\\. You have also seen some interesting ways to\
    \ export SQL data or results of OPENROWSET queries into parquet formatted files.\n\
    \n### What Else Do You Need to Know\n\nGoing through these exercises has allowed\
    \ you to see various aspects of using Polybase v3 with new REST API connectors.\n\
    \nThere are a few details that are worth noting as you consider using this innovative\
    \ technology:\n\n*   There are other options I didn’t show you for CREATE EXTERNAL\
    \ TABLE like “reject options” to handle data that doesn’t match columns and data\
    \ types. You can get a complete set of options and limitations when using external\
    \ tables at [`https://docs.microsoft.com/sql/t-sql/statements/create-external-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-external-table-transact-sql).\n\
    \n*   There are some limits when using S3 compatible storage such as the number\
    \ of files. You can read the complete set of limits and requirements for using\
    \ S3 at [`https://docs.microsoft.com/sql/relational-databases/polybase/polybase-configure-s3-compatible`](https://docs.microsoft.com/sql/relational-databases/polybase/polybase-configure-s3-compatible).\n\
    \n*   The focus of the exercises was how to use S3\\. You can see an example of\
    \ how to use delta tables on **abs** and **adls** at [`https://docs.microsoft.com/sql/relational-databases/polybase/virtualize-delta`](https://docs.microsoft.com/sql/relational-databases/polybase/virtualize-delta)."
  trans: "# 学习如何使用 Delta 文件\n\n接下来的这个练习假设你已经完成了上一个关于 Parquet 文件的练习的所有先决条件。此外，它还假设你已经完成了上一个练习中的所有步骤，以恢复\
    \ WideWorldImporters 数据库、配置 Polybase，并创建主密钥、数据库范围凭据、外部数据源和外部文件格式。你可以保留之前的 wwi\
    \ 存储桶。作为本练习的一部分，你将创建一个新的存储桶。\n\n本练习专用的所有*新的*脚本和文件都可以在 `ch07_datavirt_objectstorage\\\
    datavirt\\delta` 文件夹中找到。如果你不想进行使用 minio 处理 delta 的练习，可以在笔记本 `querydelta.ipynb`\
    \ 中查看结果。\n\n> **注意**\n>\n> people-10m delta 表是来自 Databricks 的一个示例数据集中的示例 delta\
    \ 表，如 [`https://docs.microsoft.com/azure/databricks/data/databricks-datasets#sql`](https://docs.microsoft.com/azure/databricks/data/databricks-datasets#sql)\
    \ 所示。此数据集包含姓名、出生日期和 SSN，均为虚构，不代表真实人物。该数据集遵循 [`http://creativecommons.org/licenses/by/4.0/legalcode`](http://creativecommons.org/licenses/by/4.0/legalcode)\
    \ 的知识共享许可协议，可在本书中共享和提供。我的同事 Hugo Queiroz 编写了一个 Spark 作业来从该数据集中抓取 delta 表，并将其下载为构成该\
    \ delta 表的所有文件。Hugo 还为本练习提供了许多查询和想法。没有他的帮助，我无法撰写本章！\n\n1.  使用 minio 控制台创建一个名为\
    \ `delta` 的新存储桶。在控制台中使用“上传文件夹”选项，从示例文件中上传名为 `people-10m` 的文件夹。这将在 delta 存储桶下创建一个名为\
    \ `people-10m` 的文件夹，其中包含几个 Parquet 文件和一个名为 `_delta_log` 的文件夹。\n\n2.  通过执行脚本 `querydeltatable.sql`\
    \ 来查询 delta 表。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImporters];\n\
    \    GO\n    SELECT * FROM OPENROWSET\n    (BULK '/delta/people-10m',\n    FORMAT\
    \ = 'DELTA', DATA_SOURCE = 's3_wwi') as [people];\n    GO\n    ```\n\n    该 delta\
    \ 表中有 1000 万行数据，分布在所有 Parquet 格式的文件中。获取所有结果大约需要 1 分钟。请注意表中的各个列。大部分查询执行时间花在了在 SSMS\
    \ 中显示所有行上，而不是实际读取数据。\n\n3.  默认情况下，delta 表是按 `id` 列分区的。现在让我们运行一个查询，在非分区列上过滤行。执行脚本\
    \ `querybyssn.sql`。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImporters];\n\
    \    GO\n    SELECT * FROM OPENROWSET\n    (BULK '/delta/people-10m',\n    FORMAT\
    \ = 'DELTA', DATA_SOURCE = 's3_wwi') as [people]\n    WHERE [people].ssn = '992-28-8780';\n\
    \    GO\n    ```\n\n    此查询仅返回一行，但耗时约 4 秒。SQL Server 必须从 delta 表中读取全部 1000 万行，但它使用了一个\
    \ Filter 运算符来仅根据 `ssn` 返回那一行。\n\n4.  现在，让我们运行一个查询并按 id 列进行过滤。执行脚本 `querybyid.sql`。此脚本执行以下\
    \ T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImporters];\n    GO\n    SELECT *\
    \ FROM OPENROWSET\n    (BULK '/delta/people-10m',\n    FORMAT = 'DELTA', DATA_SOURCE\
    \ = 's3_wwi') as [people]\n    WHERE [people].id = 10000000;\n    GO\n    ```\n\
    \n    我特意选择了一个“位于某个文件末尾”的 id 值。请注意，查询在约 1 秒内返回结果。这是因为 delta 表是按 id 列分区的；这是一种可以加快查询速度的谓词下推形式。\n\
    \n    **注意** 当你查看查询执行计划时，优化器并不知道 delta 的分区列。其优势在于通过 REST API 调用从 delta 表获取数据。因此，你可能会在远程扫描后看到一个\
    \ Filter 运算符。但只有一行数据从 REST API 调用中返回，因此该 Filter 运算符并不表示任何性能问题。未来，我们计划研究如何使优化器与\
    \ delta 分区列更高效地协同工作。\n\n5.  我在 CETAS 中提到的一个概念是能够基于 `OPENROWSET()` 查询创建外部表。让我们看一个例子，同时使用\
    \ S3 中的一个文件夹来缩小查询数据的范围。\n\n6.  通过执行脚本 `createparquetfromdelta.sql`，为 delta 表的子集创建一组新的\
    \ Parquet 文件作为外部表，并存入新文件夹。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    USE [WideworldImporters];\n\
    \    GO\n    IF EXISTS (SELECT * FROM sys.objects WHERE NAME = 'PEOPLE10M_60s')\n\
    \    DROP EXTERNAL TABLE PEOPLE10M_60s;\n    GO\n    CREATE EXTERNAL TABLE PEOPLE10M_60s\n\
    \    WITH\n    (   LOCATION = '/delta/1960s',\n    DATA_SOURCE = s3_wwi,\n   \
    \ FILE_FORMAT = ParquetFileFormat)\n    AS\n    SELECT * FROM OPENROWSET\n   \
    \ (BULK '/delta/people-10m', FORMAT = 'DELTA', DATA_SOURCE = 's3_wwi') as [people]\n\
    \    WHERE YEAR(people.birthDate) > 1959 AND YEAR(people.birthDate) < 1970;\n\
    \    GO\n    ```\n\n    此脚本将在 delta 存储桶下创建一个名为 `1960s` 的新文件夹。它将仅为 delta 表中出生于\
    \ 1960 年代的人生成 Parquet 文件（之所以选择这个年代，因为那是我出生的年代）。\n\n    为了明确这里的流程，SQL Server 对\
    \ delta 表执行 `OPENROWSET()` 查询以获取全部 1000 万行数据，然后根据 `WHERE` 子句过滤掉行。接着，它将这些结果创建为\
    \ `/delta/1960s` 文件夹中的一组 Parquet 文件，并将有关表和列的元数据存储在系统表中。\n\n7.  使用 minio 控制台浏览\
    \ delta 存储桶下的 `1960s` 文件夹，查看新创建的 Parquet 文件。\n\n8.  通过执行脚本 `query1960speople.sql`\
    \ 来查询新的外部表。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImporters];\n  \
    \  GO\n    SELECT * FROM PEOPLE10M_60s\n    ORDER BY birthDate;\n    GO\n    ```\n\
    \n现在，你已经看到了几个关于如何使用新的 S3 REST API 接口查询 Parquet 文件和 delta 表的示例。你还看到了一些有趣的方法，用于将\
    \ SQL 数据或 `OPENROWSET` 查询的结果导出为 Parquet 格式的文件。\n\n## 你还需要了解什么\n\n通过这些练习，你已经看到了使用带有新\
    \ REST API 连接器的 Polybase v3 的各个方面。\n\n在你考虑使用这项创新技术时，有几个细节值得注意：\n\n*   `CREATE\
    \ EXTERNAL TABLE` 还有其他选项我没有向你展示，例如用于处理与列和数据类型不匹配的数据的“拒绝选项”。你可以在 [`https://docs.microsoft.com/sql/t-sql/statements/create-external-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-external-table-transact-sql)\
    \ 获取使用外部表时的完整选项集和限制。\n\n*   使用 S3 兼容存储时存在一些限制，例如文件数量。你可以在 [`https://docs.microsoft.com/sql/relational-databases/polybase/polybase-configure-s3-compatible`](https://docs.microsoft.com/sql/relational-databases/polybase/polybase-configure-s3-compatible)\
    \ 阅读使用 S3 的完整限制和要求集。\n\n*   练习的重点是如何使用 S3。你可以在 [`https://docs.microsoft.com/sql/relational-databases/polybase/virtualize-delta`](https://docs.microsoft.com/sql/relational-databases/polybase/virtualize-delta)\
    \ 看到一个关于如何在 `abs` 和 `adls` 上使用 delta 表的示例。"
- fmt: "## Backup and Restore with S3 Compatible Object Storage\n\nA long-standing\
    \ best practice for SQL Server is to separate the storage of backups from your\
    \ data. A very long time ago, customers would put backups in separate drives,\
    \ network file shares, or tapes (yikes!). Then SANs came along, and separate SAN\
    \ storage could be used.\n\nWith the innovation of Azure, SQL Server embraced\
    \ the ability to store backups in the cloud by writing directly to Azure storage\
    \ starting in SQL Server 2012. We enhanced the `BACKUP` and `RESTORE` T-SQL syntax\
    \ to support the `URL` option, and we still support this today. you can see all\
    \ the details about how to use Azure storage as offsite storage at [`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url).\
    \ Inside the SQL engine, we use `REST API` calls through `HTTPS` to send and receive\
    \ data for backups to Azure.\n\nAnd since we have figured out how to use `REST\
    \ APIs` to support `S3` object storage for data virtualization, why not just enhance\
    \ the storage engine to support a database backup and restore to any `S3`-compatible\
    \ storage?\n\n### How Does It Work?\n\nWhen you back up or restore a database,\
    \ you have the option of using the `URL` syntax for a backup:\n\n```sql\nBACKUP\
    \ DATABASE WideWorldImporters\nTO URL = 'https://.blob.core.windows.net//WideWorldImporters.bak';\n\
    ```\n\nSQL Server will take the data from the data file, and instead of streaming\
    \ this to a local disk, it will stream the data over `REST API` calls to a `.bak`\
    \ file in Azure Blob Storage. Notice the `https` keyword.\n\nThis is all completely\
    \ supported in SQL Server 2022. For `S3`, we simply extended the `URL` syntax\
    \ to support `S3`:\n\n```sql\nBACKUP DATABASE WideWorldImporters\nTO URL = 's3://://wwi.bak'\n\
    ```\n\nIf the engine detects the keyword `s3` as part of the `URL` syntax, it\
    \ will use code built to support the `S3` protocol to send data to an `S3`-compatible\
    \ object storage provider.\n\nWhat is great about this feature is that just about\
    \ anything you can do with `BACKUP` and `RESTORE` works with `S3`, just like backup\
    \ and restore to Azure storage. Full database, differential, log, and file backups\
    \ are all supported. And most of the `RESTORE` options work as well including\
    \ `VERIFYONLY`, `HEADERONLY`, and `FILELISTONLY`.\n\nThere are some limits and\
    \ caveats to consider, such as maximum size, and some backup options are not supported.\
    \ One of the biggest factors to consider is that the `S3` object provider will\
    \ store the backup file internally into multiple parts, which then affects the\
    \ maximum backup size. But there are options like `MAXTRANSFERSIZE` to help. Read\
    \ more about parts, file sizes, and limitations at [`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url-s3-compatible-object-storage`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url-s3-compatible-object-storage).\n\
    \n### Let's Look at an Example\n\nUsing the same `minio` server setup (including\
    \ the restore of `WideWorldImporters`) with the data virtualization example in\
    \ this chapter, use scripts from `ch07_datavirt_objectstorage\\s3objectstorage`\
    \ to see a basic backup and restore with `S3`. You do not have to configure `Polybase`\
    \ to use backup and restore with `S3`.\n\nIf you have not set up `minio` and just\
    \ want to see the results of this exercise, you can use the Azure Data Studio\
    \ notebook `backuprestores3.ipynb`.\n\n1.  Use the `minio` console to create a\
    \ new bucket called `backups`.\n\n2.  Edit the script `creates3creds.sql` to enter\
    \ your local IP, user, and password (without the `<>`) from the `minio` setup\
    \ earlier in this chapter. Create a credential for the backup by executing the\
    \ script `creates3creds.sql`. This script executes the following T-SQL statements:\n\
    \n    ```sql\n    USE MASTER\n    GO\n    CREATE CREDENTIAL [s3://:9000/backups]\n\
    \    WITH IDENTITY = 'S3 Access Key',\n    SECRET = ':';\n    GO\n    ```\n\n\
    \    You cannot use the same database-scoped credential that was used in the data\
    \ virtualization example. This credential is specifically created against the\
    \ `S3` storage and is created in the context of the `master` database.\n\n3. \
    \ Edit the script `backupdbtos3.sql` and enter in your local IP in all instances.\
    \ You can review basic `BACKUP` commands to `S3` by executing the script `backupdbtos3.sql`.\
    \ This script executes the following T-SQL statements:\n\n    ```sql\n    USE\
    \ MASTER;\n    GO\n    ALTER DATABASE WideWorldImporters SET RECOVERY FULL;\n\
    \    GO\n    BACKUP DATABASE WideWorldImporters\n    TO URL = 's3://:9000/backups/wwi.bak'\n\
    \    WITH CHECKSUM, INIT, FORMAT;\n    GO\n    BACKUP DATABASE WideWorldImporters\n\
    \    TO URL = 's3://:9000/backups/wwidiff.bak'\n    WITH CHECKSUM, INIT, FORMAT,\
    \ DIFFERENTIAL\n    GO\n    BACKUP LOG WideWorldImporters\n    TO URL = 's3://:9000/backups/wwilog.bak'\n\
    \    WITH CHECKSUM, INIT, FORMAT\n    GO\n    BACKUP DATABASE WideWorldImporters\n\
    \    FILE = 'WWI_UserData'\n    TO URL = 's3://:9000/backups/wwiuserdatafile.bak'\n\
    \    WITH CHECKSUM, INIT, FORMAT;\n    GO\n    ```\n\n4.  Use the `minio` console\
    \ to browse the `backups` bucket to see the new backup files stored in `S3`.\n\
    \n    **Tip** Another way to look at files for any `S3`-compatible storage is\
    \ to use the free tool `S3 Browser` at [`https://s3browser.com`](https://s3browser.com).\n\
    \n5.  Edit the script `restoredbfroms3.sql` to enter your local IP in all instances.\
    \ Let's restore the full database backup to another database name by executing\
    \ the script `restoredbfroms3.sql`. This script executes the following T-SQL statements:\n\
    \n    ```sql\n    USE MASTER;\n    GO\n    RESTORE VERIFYONLY FROM URL = 's3://:9000/backups/wwi.bak';\n\
    \    GO\n    RESTORE HEADERONLY FROM URL = 's3://:9000/backups/wwi.bak';\n   \
    \ GO\n    RESTORE FILELISTONLY FROM URL = 's3://:9000/backups/wwi.bak';\n    GO\n\
    \    DROP DATABASE IF EXISTS WideWorldImporters2;\n    GO\n    RESTORE DATABASE\
    \ WideWorldImporters2\n    FROM URL = 's3://:9000/backups/wwi.bak'\n    WITH MOVE\
    \ 'WWI_Primary' TO 'c:\\sql_sample_databases\\WideWorldImporters2.mdf',\n    MOVE\
    \ 'WWI_UserData' TO 'c:\\sql_sample_databases\\WideWorldImporters2_UserData.ndf',\n\
    \    MOVE 'WWI_Log' TO 'c:\\sql_sample_databases\\WideWorldImporters2.ldf',\n\
    \    MOVE 'WWI_InMemory_Data_1' TO 'c:\\sql_sample_databases\\WideWorldImporters2_InMemory_Data_1';\n\
    \    GO\n    ```\n\n6.  Since this is implemented in the engine, all the standard\
    \ backup and restore history exists in the `msdb` database such as `backupmediafamily`,\
    \ `backupset`, and `restorehistory`. You can browse these system tables to see\
    \ the results from this exercise."
  raw: "## Backup and Restore with S3 Compatible Object Storage\n\nA long-standing\
    \ best practice for SQL Server is to separate the storage of backups from your\
    \ data. A very long time ago, customers would put backups in separate drives,\
    \ network file shares, or tapes (yikes!). Then SANs came along, and separate SAN\
    \ storage could be used.\n\nWith the innovation of Azure, SQL Server embraced\
    \ the ability to store backups in the cloud by writing directly to Azure storage\
    \ starting in SQL Server 2012\\. We enhanced the BACKUP and RESTORE T-SQL syntax\
    \ to support the URL option, and we still support this today. you can see all\
    \ the details about how to use Azure storage as offsite storage at [`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url).\
    \ Inside the SQL engine, we use REST API calls through HTTPS to send and receive\
    \ data for backups to Azure.\n\nAnd since we have figured out how to use REST\
    \ APIs to support S3 object storage for data virtualization, why not just enhance\
    \ the storage engine to support a database backup and restore to any S3-compatible\
    \ storage?\n\n### How Does It Work?\n\nWhen you back up or restore a database,\
    \ you have the option of using the URL syntax for a backup:\n\n```\nBACKUP DATABASE\
    \ WideWorldImporters\nTO URL = 'https://.blob.core.windows.net//WideWorldImporters.bak';\n\
    ```\n\nSQL Server will take the data from the data file, and instead of streaming\
    \ this to a local disk, it will stream the data over REST API calls to a .bak\
    \ file in Azure Blob Storage. Notice the **https** keyword.\n\nThis is all completely\
    \ supported in SQL Server 2022\\. For S3, we simply extended the URL syntax to\
    \ support S3:\n\n```\nBACKUP DATABASE WideWorldImporters\nTO URL = 's3://://wwi.bak'\n\
    ```\n\nIf the engine detects the keyword s3 as part of the URL syntax, it will\
    \ use code built to support the S3 protocol to send data to an S3-compatible object\
    \ storage provider.\n\nWhat is great about this feature is that just about anything\
    \ you can do with BACKUP and RESTORE works with S3, just like backup and restore\
    \ to Azure storage. Full database, differential, log, and file backups are all\
    \ supported. And most of the RESTORE options work as well including VERIFYONLY,\
    \ HEADERONLY, and FILELISTONLY.\n\nThere are some limits and caveats to consider,\
    \ such as maximum size, and some backup options are not supported. One of the\
    \ biggest factors to consider is that the S3 object provider will store the backup\
    \ file internally into multiple parts, which then affects the maximum backup size.\
    \ But there are options like MAXTRANSFERSIZE to help. Read more about parts, file\
    \ sizes, and limitations at [`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url-s3-compatible-object-storage`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url-s3-compatible-object-storage).\n\
    \n### Let’s Look at an Example\n\nUsing the same minio server setup (including\
    \ the restore of WideWorldImporters) with the data virtualization example in this\
    \ chapter, use scripts from **ch07_datavirt_objectstorage\\s3objectstorage** to\
    \ see a basic backup and restore with S3\\. You do not have to configure Polybase\
    \ to use backup and restore with S3.\n\nIf you have not set up minio and just\
    \ want to see the results of this exercise, you can use the Azure Data Studio\
    \ notebook **backuprestores3.ipynb**.\n\n1.  Use the minio console to create a\
    \ new bucket called **backups**.\n\n2.  Edit the script **creates3creds.sql**\
    \ to enter your local IP, user, and password (without the <>) from the minio setup\
    \ earlier in this chapter. Create a credential for the backup by executing the\
    \ script **creates3creds.sql.** This script executes the following T-SQL statements:\n\
    \n    ```\n    USE MASTER\n    GO\n    CREATE CREDENTIAL [s3://:9000/backups]\n\
    \    WITH IDENTITY = 'S3 Access Key',\n    SECRET = ':';\n    GO\n    ```\n\n\
    \    You cannot use the same database-scoped credential that was used in the data\
    \ virtualization example. This credential is specifically created against the\
    \ S3 storage and is created in the context of the master database.\n\n3.  Edit\
    \ the script **backupdbtos3.sql** and enter in your local IP in all instances.\
    \ You can review basic BACKUP commands to S3 by executing the script **backupdbtos3.sql**.\
    \ This script executes the following T-SQL statements:\n\n    ```\n    USE MASTER;\n\
    \    GO\n    ALTER DATABASE WideWorldImporters SET RECOVERY FULL;\n    GO\n  \
    \  BACKUP DATABASE WideWorldImporters\n    TO URL = 's3://:9000/backups/wwi.bak'\n\
    \    WITH CHECKSUM, INIT, FORMAT;\n    GO\n    BACKUP DATABASE WideWorldImporters\n\
    \    TO URL = 's3://:9000/backups/wwidiff.bak'\n    WITH CHECKSUM, INIT, FORMAT,\
    \ DIFFERENTIAL\n    GO\n    BACKUP LOG WideWorldImporters\n    TO URL = 's3://:9000/backups/wwilog.bak'\n\
    \    WITH CHECKSUM, INIT, FORMAT\n    GO\n    BACKUP DATABASE WideWorldImporters\n\
    \    FILE = 'WWI_UserData'\n    TO URL = 's3://:9000/backups/wwiuserdatafile.bak'\n\
    \    WITH CHECKSUM, INIT, FORMAT;\n    GO\n    ```\n\n4.  Use the minio console\
    \ to browse the **backups** bucket to see the new backup files stored in S3.\n\
    \n    **Tip** Another way to look at files for any S3-compatible storage is to\
    \ use the free tool S3 Browser at [`https://s3browser.com`](https://s3browser.com).\n\
    \n5.  Edit the script **restoredbfroms3.sql** to enter your local IP in all instances.\
    \ Let’s restore the full database backup to another database name by executing\
    \ the script **restoredbfroms3.sql**. This script executes the following T-SQL\
    \ statements:\n\n    ```\n    USE MASTER;\n    GO\n    RESTORE VERIFYONLY FROM\
    \ URL = 's3://:9000/backups/wwi.bak';\n    GO\n    RESTORE HEADERONLY FROM URL\
    \ = 's3://:9000/backups/wwi.bak';\n    GO\n    RESTORE FILELISTONLY FROM URL =\
    \ 's3://:9000/backups/wwi.bak';\n    GO\n    DROP DATABASE IF EXISTS WideWorldImporters2;\n\
    \    GO\n    RESTORE DATABASE WideWorldImporters2\n    FROM URL = 's3://:9000/backups/wwi.bak'\n\
    \    WITH MOVE 'WWI_Primary' TO 'c:\\sql_sample_databases\\WideWorldImporters2.mdf',\n\
    \    MOVE 'WWI_UserData' TO 'c:\\sql_sample_databases\\WideWorldImporters2_UserData.ndf',\n\
    \    MOVE 'WWI_Log' TO 'c:\\sql_sample_databases\\WideWorldImporters2.ldf',\n\
    \    MOVE 'WWI_InMemory_Data_1' TO 'c:\\sql_sample_databases\\WideWorldImporters2_InMemory_Data_1';\n\
    \    GO\n    ```\n\n6.  Since this is implemented in the engine, all the standard\
    \ backup and restore history exists in the **msdb** database such as **backupmediafamily**,\
    \ **backupset**, and **restorehistory**. You can browse these system tables to\
    \ see the results from this exercise."
  trans: "\n## 使用 S3 兼容对象存储进行备份和还原\n\nSQL Server 的一项长期最佳实践是将备份存储与数据存储分离。很久以前，客户会将备份存放在独立的驱动器、网络文件共享或磁带（哎呀！）中。后来\
    \ SAN 出现了，于是可以使用独立的 SAN 存储。\n\n随着 Azure 的创新，从 SQL Server 2012 开始，SQL Server 通过支持直接写入\
    \ Azure 存储，实现了将备份存储在云端的能力。我们增强了 `BACKUP` 和 `RESTORE` T-SQL 语法以支持 `URL` 选项，至今我们仍然支持它。你可以在\
    \ [`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url)\
    \ 查看关于如何使用 Azure 存储作为异地存储的所有详细信息。在 SQL 引擎内部，我们通过 `HTTPS` 使用 `REST API` 调用来向 Azure\
    \ 发送和接收备份数据。\n\n既然我们已经弄清楚如何使用 `REST API` 来支持用于数据虚拟化的 `S3` 对象存储，那为何不直接增强存储引擎，以支持向任何\
    \ `S3` 兼容存储进行数据库备份和还原呢？\n\n### 它是如何工作的？\n\n当你备份或还原数据库时，可以选择使用 `URL` 语法进行备份：\n\n\
    ```sql\nBACKUP DATABASE WideWorldImporters\nTO URL = 'https://.blob.core.windows.net//WideWorldImporters.bak';\n\
    ```\n\nSQL Server 会从数据文件中获取数据，并且不是将其流式传输到本地磁盘，而是通过 `REST API` 调用将数据流式传输到 Azure\
    \ Blob 存储中的 `.bak` 文件。注意这里的 `https` 关键字。\n\n这一切在 SQL Server 2022 中得到了完全支持。对于 `S3`，我们简单地扩展了\
    \ `URL` 语法以支持 `S3`：\n\n```sql\nBACKUP DATABASE WideWorldImporters\nTO URL = 's3://://wwi.bak'\n\
    ```\n\n如果引擎检测到 `URL` 语法中包含关键字 `s3`，它将使用为支持 `S3` 协议而构建的代码，将数据发送到 `S3` 兼容的对象存储提供商。\n\
    \n此功能很棒的一点是，几乎任何你能对 `BACKUP` 和 `RESTORE` 执行的操作都适用于 `S3`，就像备份和还原到 Azure 存储一样。完整数据库、差异、日志和文件备份都得到支持。并且大多数\
    \ `RESTOR` 选项也有效，包括 `VERIFYONLY`、`HEADERONLY` 和 `FILELISTONLY`。\n\n存在一些需要考虑的限制和注意事项，例如最大大小，并且某些备份选项不受支持。需要考虑的最大因素之一是，`S3`\
    \ 对象提供商会将备份文件在内部分割成多个部分存储，这会影响最大备份大小。但是，有一些选项如 `MAXTRANSFERSIZE` 可以提供帮助。请在 [`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url-s3-compatible-object-storage`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url-s3-compatible-object-storage)\
    \ 阅读更多关于分段、文件大小和限制的信息。\n\n### 看一个例子\n\n使用本章数据虚拟化示例中相同的 `minio` 服务器设置（包括 `WideWorldImporters`\
    \ 的还原），通过 `ch07_datavirt_objectstorage\\s3objectstorage` 中的脚本查看一个基本的 `S3` 备份和还原。你无需配置\
    \ `Polybase` 即可使用 `S3` 进行备份和还原。\n\n如果你尚未设置 `minio` 并且只想查看本练习的结果，可以使用 Azure Data\
    \ Studio 的笔记本 `backuprestores3.ipynb`。\n\n1.  使用 `minio` 控制台创建一个名为 `backups` 的新存储桶。\n\
    \n2.  编辑脚本 `creates3creds.sql`，输入你本章前面 `minio` 设置中的本地 IP、用户和密码（不含 `<>`）。通过执行脚本\
    \ `creates3creds.sql` 为备份创建一个凭据。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    USE MASTER\n\
    \    GO\n    CREATE CREDENTIAL [s3://:9000/backups]\n    WITH IDENTITY = 'S3 Access\
    \ Key',\n    SECRET = ':';\n    GO\n    ```\n\n    你不能使用在数据虚拟化示例中使用的相同数据库作用域凭据。此凭据是专门为\
    \ `S3` 存储创建的，并且是在 `master` 数据库的上下文中创建的。\n\n3.  编辑脚本 `backupdbtos3.sql` 并在所有实例中输入你的本地\
    \ IP。通过执行脚本 `backupdbtos3.sql` 可以查看基本的向 `S3` 的 `BACKUP` 命令。此脚本执行以下 T-SQL 语句：\n\
    \n    ```sql\n    USE MASTER;\n    GO\n    ALTER DATABASE WideWorldImporters SET\
    \ RECOVERY FULL;\n    GO\n    BACKUP DATABASE WideWorldImporters\n    TO URL =\
    \ 's3://:9000/backups/wwi.bak'\n    WITH CHECKSUM, INIT, FORMAT;\n    GO\n   \
    \ BACKUP DATABASE WideWorldImporters\n    TO URL = 's3://:9000/backups/wwidiff.bak'\n\
    \    WITH CHECKSUM, INIT, FORMAT, DIFFERENTIAL\n    GO\n    BACKUP LOG WideWorldImporters\n\
    \    TO URL = 's3://:9000/backups/wwilog.bak'\n    WITH CHECKSUM, INIT, FORMAT\n\
    \    GO\n    BACKUP DATABASE WideWorldImporters\n    FILE = 'WWI_UserData'\n \
    \   TO URL = 's3://:9000/backups/wwiuserdatafile.bak'\n    WITH CHECKSUM, INIT,\
    \ FORMAT;\n    GO\n    ```\n\n4.  使用 `minio` 控制台浏览 `backups` 存储桶，查看存储在 `S3` 中的新备份文件。\n\
    \n    **提示** 查看任何 `S3` 兼容存储文件的另一种方法是使用免费工具 `S3 Browser`，网址为 [`https://s3browser.com`](https://s3browser.com)。\n\
    \n5.  编辑脚本 `restoredbfroms3.sql` 并在所有实例中输入你的本地 IP。让我们通过执行脚本 `restoredbfroms3.sql`\
    \ 将完整数据库备份还原到另一个数据库名称。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    USE MASTER;\n    GO\n\
    \    RESTORE VERIFYONLY FROM URL = 's3://:9000/backups/wwi.bak';\n    GO\n   \
    \ RESTORE HEADERONLY FROM URL = 's3://:9000/backups/wwi.bak';\n    GO\n    RESTORE\
    \ FILELISTONLY FROM URL = 's3://:9000/backups/wwi.bak';\n    GO\n    DROP DATABASE\
    \ IF EXISTS WideWorldImporters2;\n    GO\n    RESTORE DATABASE WideWorldImporters2\n\
    \    FROM URL = 's3://:9000/backups/wwi.bak'\n    WITH MOVE 'WWI_Primary' TO 'c:\\\
    sql_sample_databases\\WideWorldImporters2.mdf',\n    MOVE 'WWI_UserData' TO 'c:\\\
    sql_sample_databases\\WideWorldImporters2_UserData.ndf',\n    MOVE 'WWI_Log' TO\
    \ 'c:\\sql_sample_databases\\WideWorldImporters2.ldf',\n    MOVE 'WWI_InMemory_Data_1'\
    \ TO 'c:\\sql_sample_databases\\WideWorldImporters2_InMemory_Data_1';\n    GO\n\
    \    ```\n\n6.  由于这是在引擎中实现的，所有标准的备份和还原历史记录都存在于 `msdb` 数据库中，例如 `backupmediafamily`、`backupset`\
    \ 和 `restorehistory`。你可以浏览这些系统表以查看本练习的结果。\n"
- fmt: '## 从 AWS 迁移


    2022 年春天，当我正在研究使用 S3 对象存储进行备份和恢复的概念时，某天下午散步时我忽然灵光一现（我就是那种在走路和锻炼时会思考 SQL Server
    问题的奇怪的人）。


    既然 AWS 发明了 S3，而 SQL Server 2022 支持从 S3 恢复数据库，那么（你懂的）……我应该能够使用新的 `RESTORE FROM
    S3` 功能，将 SQL Server 数据库从 AWS 迁移到 SQL Server，对吧？


    是的，我做到了。虽然我没有为你准备具体的练习，但我将分享我采取的步骤：


    *   我使用 SQL Server 2019 版本部署了一个 AWS RDS SQL Server 数据库。

    *   我在 AWS 中创建了一个 S3 存储桶用于存储。我参考了 AWS 的以下文档进行操作：[`https://docs.aws.amazon.com/AmazonS3/latest/userguide/setting-up-s3.html`](https://docs.aws.amazon.com/AmazonS3/latest/userguide/setting-up-s3.html)。

    *   我按照以下说明启用了 AWS RDS 的按需备份/恢复功能：[`https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Appendix.SQLServer.Options.BackupRestore.html`](https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Appendix.SQLServer.Options.BackupRestore.html)。

    *   我在 AWS RDS 中创建了一个新数据库，并将其备份到 S3 存储桶。

    *   我获取了用于 S3 存储的 AWS Access Key ID 和 Secret Key。

    *   我使用针对 SQL Server 2022 的 T-SQL 语句，为 S3 存储桶创建了一个凭据（我的 S3 URL 基于创建 S3 存储桶的区域）：

    *   然后我运行了以下针对 SQL Server 2022 的 T-SQL 语句来恢复数据库：


    ```sql

    IF EXISTS (SELECT * FROM sys.credentials WHERE [name] = ''s3://s3.us-east-1.amazonaws.com/bwsqlbackups'')

    BEGIN

    DROP CREDENTIAL [s3://s3.us-east-1.amazonaws.com/];

    END

    GO

    CREATE CREDENTIAL   [s3://s3.us-east-1.amazonaws.com/]

    WITH

    IDENTITY    = ''S3 Access Key''

    ,       SECRET      = '':;

    GO

    ```


    ```sql

    RESTORE DATABASE  FROM URL = ''s3://s3.us-east-1.amazonaws.com//.bak’

    ```


    就是这样。我通过将 AWS RDS 的完整备份恢复到 SQL Server 2022，完成了一次非常简单的离线迁移。很酷，对吧？


    ## SQL Server 是一个数据枢纽


    我在谈论 SQL Server 2019 时曾提出，SQL Server 已成为数据枢纽。我得承认这个术语是从我的副总裁 Rohan Kumar 那里借来的。我记得他在我们讨论
    SQL Server 及其未来连接几乎任何数据源 *而无需移动数据* 的能力时使用了这个术语。简而言之，这就是数据虚拟化的概念。让你的应用程序通过 T-SQL
    指向 SQL Server，SQL 引擎的强大功能将为任何类型的数据访问几乎任何数据源。我们在 SQL Server 2022 中的创新通过连接包括 S3
    对象存储在内的 REST API 连接器扩展了这一能力。我们还增加了创新功能，允许 SQL 备份使用 S3 对象存储进行存储和恢复。我请 Hugo Queiroz
    总结他对数据虚拟化和 SQL Server 2022 的看法。Hugo 说：“*我们在 SQL Server 2022 中的一个主要目标是让数据虚拟化更灵活、*
    更易于每个人使用。更少的依赖、更低的复杂性、更少的代码，以及更广泛支持的文件类型和连接器。为了实现这一点，改用 Rest-API 实现是根本性的，它允许 SQL
    Server 2022 被用作数据枢纽并利用数据库内分析*。”*


    ## 8. T-SQL 的新应用场景


    Transact-SQL (T-SQL) 可能是世界上最流行的查询语言。T-SQL 符合行业标准（在 [`https://docs.microsoft.com/en-us/openspecs/sql_standards/ms-sqlstandlp/89fb00b1-4b9e-4296-92ce-a2b3f7ca01d2`](https://docs.microsoft.com/en-us/openspecs/sql_standards/ms-sqlstandlp/89fb00b1-4b9e-4296-92ce-a2b3f7ca01d2)
    阅读详细信息），并且在标准的数据操作语言 (DML) 和数据定义语言 (DDL) 语句之上拥有非常丰富的扩展。你可以在 [`https://aka.ms/tsql`](https://aka.ms/tsql)
    查看完整的 T-SQL 参考指南。


    T-SQL 擅长的领域之一是提供丰富的 *内置* 函数集合 ([`https://aka.ms/tsqlfunc`](https://aka.ms/tsqlfunc))。这包括分析、转换、加密、数学、安全性、空间、字符串和统计等类别。可以把它看作程序员的
    SQL 函数库。在 SQL Server 2022 中，我们有意识地努力扩展 T-SQL 函数支持，并在其他方面增强该语言。这可能是我们几个版本以来对该语言进行的最大规模的增补。我们觉得有必要扩展语言以确保它能提升开发者的体验。我们甚至在
    SQL 工程部门内部组建了一个专注于此事的新团队。该团队向架构师 Conor Cunningham 汇报。Conor 和我谈到了这个团队及其章程：


    *在 SQL Server 2019 之后，我打算在专业上尝试一些不同的事情，并且一直在讨论在我居住的德克萨斯州奥斯汀建立一个工程团队。在这个过程中，我准备了一份关于团队初始章程及其可能交付成果的提案。我决定专注于扩展
    T-SQL 语言，原因有几个。首先，在云数据库时代，需要改进开发者体验，以更容易、更快地编写云应用程序。其次，我们积累了客户在特定领域改进语法的许多请求。最后，我们没有人为此领域积极提供资金，因此这是一个团队介入并基本独立工作（在疫情期间）的绝佳机会。事实证明，这些
    T-SQL 客户需求中的许多都是很好的机会，可以教导职业生涯早期的工程师如何进行那种底层的、* *性能敏感的系统编程*，而该团队也非常享受作为他们在微软的第一个项目构建自己功能的挑战。*


    在本章中，我将探索并展示增强的和新的 T-SQL 函数及扩展，以使你更高效。这些增强功能分为三类：


    *   **JSON –** 用于处理 JSON 数据的增强和新的 T-SQL 函数。

    *   **“表面区域”** – 这些是分布在多个领域的核心函数和 T-SQL 语言增强。

    *   **时间序列** – 这些是用于处理时间序列数据的新的 T-SQL 函数。'
  raw: '### Migration from AWS


    In the spring of 2022, as I was studying the concept of backup and restore with
    S3 object storage, something dawned on me on an afternoon walk (I am one of those
    strange people who comes up with ideas about SQL Server while I walk and exercise).


    If AWS invented S3 and SQL Server 2022 supports restoring a database from S3,
    then (wait for it)…I should be able to migrate a SQL Server database from AWS
    into SQL Server using the new RESTORE from S3, right?


    Right. I did it. I don’t have a specific exercise for you, but I’ll share the
    steps I took:


    *   I deployed an AWS RDS SQL Server database using a version of SQL Server 2019.


    *   I created an S3 bucket in AWS for storage. I used the following documentation
    from AWS to do this: [`https://docs.aws.amazon.com/AmazonS3/latest/userguide/setting-up-s3.html`](https://docs.aws.amazon.com/AmazonS3/latest/userguide/setting-up-s3.html).


    *   I enabled on-demand backup/restore for AWS RDS using the following instructions:
    [`https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Appendix.SQLServer.Options.BackupRestore.html`](https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Appendix.SQLServer.Options.BackupRestore.html).


    *   I created a new database in AWS RDS and backed it up to the S3 bucket.


    *   I obtained the AWS Access Key ID and Secret Key for the S3 storage.


    *   I created a credential against the S3 bucket using a T-SQL statement against
    SQL Server 2022 (my S3 URL is based on the region where my S3 bucket was created):


    *   I then ran the following T-SQL statement against SQL Server 2022 to restore
    the database:


    ```

    IF EXISTS (SELECT * FROM sys.credentials WHERE [name] = ''s3://s3.us-east-1.amazonaws.com/bwsqlbackups'')

    BEGIN

    DROP CREDENTIAL [s3://s3.us-east-1.amazonaws.com/];

    END

    GO

    CREATE CREDENTIAL   [s3://s3.us-east-1.amazonaws.com/]

    WITH

    IDENTITY    = ''S3 Access Key''

    ,       SECRET      = '':;

    GO

    ```


    ```

    RESTORE DATABASE  FROM URL = ''s3://s3.us-east-1.amazonaws.com//.bak’

    ```


    That was it. I completed a very simple offline migration by restoring a full backup
    from AWS RDS into SQL Server 2022\. Pretty cool, right?


    ## SQL Server Is a Data Hub


    I made the claim with SQL Server 2019 that SQL Server had become a data hub. I
    have to admit I borrowed that term from my Vice President Rohan Kumar. I remember
    him using this term as we talked about SQL Server and its future capability to
    connect to just about any data source *without moving the data*. That is, in a
    nutshell, the concept of data virtualization. Point your application to SQL Server
    using T-SQL, and the power of the SQL engine will access just about any data source
    for any type of data. Our innovations in SQL Server 2022 expand this capability
    by connecting with REST API connectors including S3 object storage. We also added
    innovations to allow SQL backups to be stored and restored with S3 object storage.
    I asked Hugo Queiroz to sum up his thoughts about data virtualization and SQL
    Server 2022\. Hugo said, *“One of our major goals for SQL Server 2022 is to make
    Data Virtualization more flexible and* easier for everyone to use. Less dependencies,
    less complexity, less code, and a broader range of supported file types and connectors.
    To make this happen changing to a Rest-API implementation was fundamental, it
    allows SQL Server 2022 to be used as a data hub and leverage in-database analytics*.”*


    # 8. New Application Scenarios with T-SQL


    Transact-SQL (T-SQL) may just be the most popular query language in the world.
    T-SQL is compliant with industry standards (read the details at [`https://docs.microsoft.com/en-us/openspecs/sql_standards/ms-sqlstandlp/89fb00b1-4b9e-4296-92ce-a2b3f7ca01d2`](https://docs.microsoft.com/en-us/openspecs/sql_standards/ms-sqlstandlp/89fb00b1-4b9e-4296-92ce-a2b3f7ca01d2))
    and has a very rich extension from standard Data Manipulation Language (DML) and
    Data Definition Language (DDL) statements. You can see the complete T-SQL reference
    guide at [`https://aka.ms/tsql`](https://aka.ms/tsql).


    One of the areas that T-SQL excels at is providing a rich set of *built-in* functions
    ([`https://aka.ms/tsqlfunc`](https://aka.ms/tsqlfunc)). This includes categories
    for analytics, conversion, cryptography, mathematics, security, spatial, string,
    and statistics. Think of this like the programmer’s library of SQL functions.
    In SQL Server 2022 we made a conscious effort to expand T-SQL function support
    and enhance the language in other areas. It may be the biggest set of additions
    we have made to the language in several releases. We felt we needed to expand
    the language to ensure it enhanced the developer experience. We even built a new
    team within SQL engineering to focus on this. This team reports to architect Conor
    Cunningham. Conor talked to me about this team and their charter:


    *After SQL Server 2019, I was looking to try my hand at something different professionally
    and I had been discussing starting an engineering team where I live in Austin,
    Texas. As part of that process, I put together a proposal for an initial charter
    for the team and what deliverables it might have. I decided to focus on extending
    the T-SQL language for a couple of reasons. First, in the era of cloud databases,
    there is a greater need for improving the developer experience to make it easier
    and faster to write cloud applications. Second, we had accumulated a number of
    requests from customers for improving the syntax in specific areas. Finally, we
    didn’t have anyone actively funding this area so it was a great opportunity for
    a team to step in and work mostly independently (during a pandemic). It turned
    out that a number of these T-SQL customer asks were great opportunities to teach
    early-in-career engineers how to do the kinds of low-level,* *performance-sensitive
    systems programming**, and the team has really enjoyed the challenge to build
    their own features as their first projects at Microsoft.*


    In this chapter I’ll explore and show you enhanced and new T-SQL functions and
    extensions to make you more productive. These enhancements fall into three categories:


    *   **JSON –** Enhanced and new T-SQL functions to process JSON data.


    *   **“Surface area”** – These are core functions and enhancements to the T-SQL
    language spread across several areas.


    *   **Time series** – These are new T-SQL functions to process time series data.'
