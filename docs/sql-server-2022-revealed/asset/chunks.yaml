    I’ll describe the exact steps for this requirement later in this chapter in the
    section titled “**Setting Up the Azure Extension for SQL Server**.” I’ll also
    go more into the specifics of how SQL Server is connected to Azure in Chapter
    [3](#525217_1_En_3_Chapter.xhtml) of the book.


    To find all the exact resource requirements you need to install SQL Server 2022
