    \ should not see any impact. Updateable ledger tables could see the same impact\
    \ as temporal tables.\n\nKeep up with all the latest information on Ledger for\
    \ SQL Server at [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger).\n\n###\
    \ Encryption Enhancements\n\nEncryption of data is a key aspect to security, and\
    \ SQL Server provides several different capabilities to encrypt data end-to-end.\
    \ End-to-end means from a connection to SQL Server, data in the SQL Server engine,\
    \ and data stored at rest. To read about the complete lineup of encryption capabilities\
    \ of SQL Server, check our documentation at [`https://docs.microsoft.com/sql/relational-databases/security/encryption/sql-server-encryption`](https://docs.microsoft.com/sql/relational-databases/security/encryption/sql-server-encryption).\n\
    \nIn SQL Server 2022 we have a few enhancements around encryption including enhancements\
    \ for Always Encrypted, crypto enhancements, and enhancements for connection encryption."
  trans: "\n你可以看到，应用程序记录了 `bob` 发起了一个查询（`app` 登录记录了该查询），该查询导致了 Mary 的薪资变更。由于表是仅追加的，其他用户无法进入并尝试抹去应用程序所做操作的任何记录。\n\
    \n### 练习 3：保护 Ledger 对象\n\n在本练习中，你将学习 SQL Server 如何保护 ledger 对象。\n\n1.  执行脚本 `getledgerobjects.sql`\
    \ 以查看已创建的 ledger 表和列的历史记录。该脚本执行以下 T-SQL 语句：\n\n```sql\n    USE ContosoHR;\n  \
    \  GO\n    SELECT * FROM sys.ledger_table_history;\n    GO\n    SELECT * FROM\
    \ sys.ledger_column_history;\n    GO\n```\n\n2.  尝试修改或删除 ledger 对象。执行脚本 `admindropledger.sql`。该脚本执行以下\
    \ T-SQL 语句：\n\n```sql\n    USE ContosoHR;\n    GO\n    -- 无法为 ledger 表关闭版本控制\n\
    \    ALTER TABLE Employees SET (SYSTEM_VERSIONING = OFF);\n    GO\n    -- 无法删除\
    \ ledger 历史表\n    DROP TABLE dbo.MSSQL_LedgerHistoryFor_901578250;\n    GO\n \
    \   -- 可以删除 ledger 表\n    DROP TABLE Employees;\n    GO\n    -- 但我们保留了已删除表的历史记录\n\
    \    SELECT * FROM sys.objects WHERE name like '%DroppedLedgerTable%';\n    GO\n\
    ```\n\n从输出中你可以看到，无法为 ledger 表关闭版本控制（没有设置 `LEDGER = OFF` 的语法）。你也不能删除历史表。你可以删除 ledger\
    \ 表，但我们会保留关于删除了什么的记录。而且你无法删除“已删除”的 ledger 表。此外，即使你删除了 ledger 表，与该表关联的事务仍会保留在数据库\
    \ ledger（系统表）中。删除已存在的已删除 ledger 表的唯一方法是删除整个数据库。\n\n你也可以再次执行脚本 `getledgerobjects.sql`\
    \ 来查看删除历史。SSMS 中的对象资源管理器也可以向你显示哪些 ledger 表已被删除。\n\n### 练习 4：被篡改的 Ledger 是什么样子？\n\
    \n当我第一次听说 Ledger 时，我心想：“我对内部机制相当了解。我能击败这个系统吗？” 于是，我开始了一段尝试 *篡改* ledger 的旅程。\n\n\
    我不能分享我做了什么的细节，但基本上，在一次基本的 T-SQL 更新之后，我尝试了各种 *超出支持 SQL 范围* 的方法来 *入侵* ledger。我试图通过一种极其未记录的方式操纵数据库\
    \ ledger 系统表，来隐藏对 ledger 表的更新。我实际上找到了一种方法让它工作，直到 Panagiotis 对我说：“那摘要呢？” 说中了！我确实可以入侵\
    \ SQL Server，使其看起来我的更新从未存在过，但摘要存储在独立的存储中，所以我无法入侵它。你可以在示例目录的 T-SQL 笔记本 `ledger.ipynb`\
    \ 中看到我早期尝试的结果。你也可以在 2022 年 SQLBits 主题演讲中，看到我与 Buck Woody 现场演示，地址是 [`https://youtu.be/_R9FE2ZclVk`](https://youtu.be/_R9FE2ZclVk)（从大约\
    \ 12 分钟处开始）。\n\n#### 你还应该知道什么？\n\nSQL Server 的 Ledger 在很多方面都是一项惊人的技术。对我而言，我意识到\
    \ SQL 现在为行业问题提供了解决方案，例如多方信任场景，这些并非 SQL 的传统解决方案。\n\n事实上，很早就有客户开始采用这项技术来解决实际问题。联想（Lenovo）看到了将其信任融入供应链的机会。他们的供应链跨越多方，但谁来监督数据？这就是\
    \ Ledger 的力量。你可以在 [`https://customers.microsoft.com/story/1497685499820529889-lenovo-manufacturing-azure-SQL-database-ledger`](https://customers.microsoft.com/story/1497685499820529889-lenovo-manufacturing-azure-SQL-database-ledger)\
    \ 阅读联想的故事。\n\n作为一个团队，我们致力于寻找新颖创新的方式，将 Ledger 引入 SQL 从未被视为解决方案的市场。\n\n为 SQL Server\
    \ 的 Ledger 添加的一个非常棒的功能是自动摘要存储。在示例中，你学习了如何手动生成和使用摘要。SQL Server 2022 可以配置为自动将摘要保存到\
    \ Azure Blob 存储。你可以在 [`https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-how-to-enable-automatic-digest-storage`](https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-how-to-enable-automatic-digest-storage)\
    \ 阅读所有细节。\n\n与任何功能一样，它存在一些限制，Ledger 也不例外。请在 [`https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-limits`](https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-limits)\
    \ 保持对所有限制的更新。\n\n当我研究 Ledger 时，我积累了一系列问题，并与 Panagiotis 和我们 Ledger 的首席项目经理 Pieter\
    \ Vanhove 一起进行了探讨：\n\n*   这与时间表有何不同？\n\n    Ledger 对于可更新的 ledger 表使用了时间表功能，但与时间表不同的是，它具有内置的审计功能并支持仅追加表。\n\
    \n*   这与 SQL Server 审计有何不同？\n\n    Ledger 将审计功能内置于事务变更中，所有审计信息都存储在数据库中。此外，所有变更都通过加密哈希和独立的摘要存储进行跟踪。一旦创建了\
    \ ledger，就无法撤销它，而拥有适当权限的系统管理员无法抹去审计记录。创建 ledger 表后，抹去它的唯一方法是完全删除数据库，但即便如此，独立的摘要仍然存在。\n\
    \n*   我需要多久保存一次摘要？\n\n    摘要是验证 ledger 未被篡改的主要机制。理论上，你需要为每个事务生成一个独立的摘要，但这不切实际。根据你验证\
    \ ledger 的业务需求，尽可能频繁地保存摘要。自动摘要管理每 30 秒保存一次摘要。\n\n*   Ledger 需要更多空间吗？\n\n    可更新的\
    \ ledger 表所需的额外空间与时间表大致相同。每个事务需要独立的系统表行来存储加密哈希。内部区块链需要最少的空间，但这取决于你保留 ledger 的时间长短。摘要本身很小，同样，你需要保留与包含\
    \ ledger 表的数据库一样长的历史记录。\n\n*   是否有任何性能影响？\n\n    我们没有针对 Ledger 运行特定的性能基准测试，因为我们认为影响会很小。考虑到仅追加的\
    \ ledger 表不应看到任何影响。可更新的 ledger 表可能会看到与时间表相同的影响。\n\n请在 [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger)\
    \ 关注 SQL Server Ledger 的所有最新信息。\n\n### 加密增强功能\n\n数据加密是安全的一个关键方面，SQL Server 提供了多种不同的功能来端到端地加密数据。端到端意味着从连接到\
    \ SQL Server、SQL Server 引擎中的数据，到静态存储的数据。要了解 SQL Server 加密功能的完整阵容，请查看我们的文档：[`https://docs.microsoft.com/sql/relational-databases/security/encryption/sql-server-encryption`](https://docs.microsoft.com/sql/relational-databases/security/encryption/sql-server-encryption)。\n\
    \n在 SQL Server 2022 中，我们在加密方面有一些增强，包括 Always Encrypted 的增强、加密增强以及连接加密的增强。\n"
- fmt: '## Always Encrypted 增强功能


    在 SQL Server 2016 中，我们引入了一种称为 Always Encrypted 的端到端加密新概念。其核心思想是数据在客户端应用程序中加密，并且在
    SQL Server 引擎中始终保持加密状态（因此得名）。此外，用于解密数据的密钥由应用程序拥有。因此，SQL Server 的管理员无法解密数据；只有应用程序能做到这一点。如果您不熟悉
    Always Encrypted，可以通过访问 [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine)
    来了解如何配置和使用它。


    由于数据在 SQL Server 引擎内永远不会以*明文*形式出现，原始设计存在一些限制。例如，使用 `LIKE` 等运算符的查询将无法工作，因为引擎需要将数据解密为明文才能执行操作。


    在 SQL Server 2019 中，我们通过一项称为 *secure enclaves*（安全飞地）的概念增强了 Always Encrypted。安全飞地是
    SQL Server 引擎内部的一个安全内存区域。即使在数据库引擎内部，代码也无法在飞地中看到明文数据。飞地技术提供了一种方法，使 SQL Server 能够将密钥从应用程序传递到飞地中，以执行任何需要明文的操作，例如模式匹配操作。SQL
    Server 2019 支持称为虚拟化飞地或 VBS 飞地的概念（Azure 则通过 Intel Software Guard Extensions (Intel
    SGX) 支持硬件飞地）。由于解密发生在服务器上，我个人发现使用安全飞地还能显著提升对使用 Always Encrypted 加密的列进行的几乎所有操作的性能。


    您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves)
    阅读关于带有安全飞地的 Always Encrypted 的完整介绍。


    在 SQL Server 2022 中，我们对带有安全飞地的 Always Encrypted 进行了增强，提供了以下新功能：


    *   SQL Server 2022 可以在 VBS 安全飞地内使用多线程和密钥缓存，以进一步提升性能。

    *   SQL Server 2022 可以支持新的联接类型以及 `ORDER BY` 和 `GROUP BY` 操作。此项支持与 Azure SQL Database
    的功能保持一致。


    ## 加密功能增强


    我们希望确保 SQL Server 符合最新的密码学或加密标准。SQL Server 在引擎的许多不同功能中使用加密技术，包括证书和密钥支持。根据 SQL
    安全方面的高级项目经理 Shoham Dasgupta 的说法，“*我们希望增强 SQL Server 中的默认加密技术*，以达到/超越行业标准，并保护客户的机密数据，以应对不断演变的威胁格局。”


    我们内部进行的一项未对客户直接可见的增强是强化了我们的算法，以符合当前美国国家标准与技术研究院 (NIST) 的标准，具体包括：


    *   所有系统生成的证书的最小强度为 RSA-3072，这是 NIST 推荐的位密钥大小。

    *   增强我们用于签名生成的内部哈希算法，使用 SHA-2 512，这是一种比 SHA-1 更安全的方法。


    另一项旨在强化安全性以符合当今标准的投资是支持个人信息交换 (PFX) 格式。SQL Server 支持在数据库引擎内创建证书来保护对象、连接和数据。SQL
    Server 2022 现在支持为 PFX 创建证书。PFX 或 PKCS#12 是一种现代的证书格式，SQL Server 现在支持使用 PFX 文件，通过
    `CREATE CERTIFICATE` 语句在 SQL Server 中创建证书。您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql)
    阅读更多关于如何使用 PFX 文件创建证书的信息。


    加密方面的最后一项增强是支持将密钥备份和还原到 Azure Blob Storage 或从其还原。数据库主密钥通常用于保护凭证，例如用于外部数据源的凭证。但您经常需要将此密钥与数据库分开备份。SQL
    Server 2022 现在允许您将这些密钥之一备份或还原到 Azure Blob Storage 或从其还原，而不是备份或还原到本地或网络文件路径。您可以在
    [`https://docs.microsoft.com/sql/t-sql/statements/backup-master-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-master-key-transact-sql)
    阅读如何使用新的 URL 语法。对称密钥 (`SYMMETRIC keys`) 也存在相同的支持，您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/backup-symmetric-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-symmetric-key-transact-sql)
    阅读相关信息。'
  raw: '#### Always Encrypted Enhancements


    In SQL Server 2016 we introduced a new concept for end-to-end encryption called
    Always Encrypted. The concept is that data is encrypted at the client application
    and always encrypted in the SQL Server engine (hence the name). Furthermore, the
    keys to unencrypt the data are owned by the application. As a result, administrators
    of SQL Server cannot unencrypt the data; only the application can do this. If
    you are not familiar with Always Encrypted, you can read about how to configure
    and use it at [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine).


    Because data can never appear in *plaintext* inside the SQL Server engine, there
    were limitations with the original design. For example, queries using operators
    such as LIKE won’t work because the engine would need to unencrypt the data into
    plaintext to perform the operation.


    In SQL Server 2019 we enhanced Always Encrypted with a concept called *secure
    enclaves*. A secure enclave is a secure region of memory inside the SQL Server
    engine. Even in the database engine, code cannot see data in plaintext in the
    enclave. Enclave technologies provide a method for SQL Server to pass keys from
    the application to the enclave to perform any operations required in plaintext
    such as pattern matching operations. SQL Server 2019 supports a concept called
    virtualized enclaves or VBS enclaves (Azure supports hardware enclaves through
    Intel Software Guard Extensions (Intel SGX)). Since decryption happens on the
    server, I have personally found that using secure enclaves can also boost performance
    for almost any operation on columns that are encrypted with Always Encrypted.


    You can read the complete story of Always Encrypted with secure enclaves at [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves).


    In SQL Server 2022 we have enhanced Always Encrypted with secure enclaves with
    the following new capabilities:


    *   SQL Server 2022 can use multi-threads and key caching inside the VBS secure
    enclave to further boost performance.


    *   SQL Server 2022 can support new join types and ORDER BY and GROUP BY operations.
    This support is in line with Azure SQL Database support.


    #### Crypto Enhancements


    We want to make sure SQL Server is up to date with the latest standards for cryptography
    or crypto. SQL Server uses crypto for many different types of capabilities in
    the engine including certificate and key support. According to Shoham Dasgupta,
    Senior Program Manager for security for SQL, *“We wanted to enhance default* cryptography
    in SQL Server to meet/exceed industry standards and protect customer’s confidential
    data to meet the evolving threat landscape.”


    One of the enhancements we made internally that is not visibly seen by customers
    is a strengthening of our algorithms to align with the current National Institute
    of Standards and Technology (NIST) including the following:


    *   All system-generated certificates have a minimum strength of RSA-3072, a bit
    key size recommended by NIST.


    *   Enhance our internal hashing algorithm used for signature generation to use
    SHA-2 512, a more secure method than SHA-1.


    Another investment to strengthen security to today’s standards is support for
    personal information exchange (PFX) format. SQL Server supports the ability to
    create a certificate inside the database engine to secure objects, connections,
    and data. SQL Server 2022 now supports creating certificates for PFX. PFX or PKCS#12
    is a modern format for certificates, and SQL Server now supports using a PFX file
    to create a certificate in SQL Server with the CREATE CERTIFICATE statement. You
    can read more about how to create a certificate with a PFX file at [`https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql).


    The final enhancement for crypto is to support backup and restore for keys to
    and from Azure Blob Storage. A database master key is often used to secure a credential
    such as used for external data sources. But you often need to back up this key
    separate from the database. SQL Server 2022 allows you now to back up or restore
    one of these keys to or from Azure Blob Storage instead of a local or network
    file path. You can read how to use the new URL syntax at [`https://docs.microsoft.com/sql/t-sql/statements/backup-master-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-master-key-transact-sql).
    The same support exists for SYMMETRIC keys, which you can read about at [`https://docs.microsoft.com/sql/t-sql/statements/backup-symmetric-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-symmetric-key-transact-sql).'
