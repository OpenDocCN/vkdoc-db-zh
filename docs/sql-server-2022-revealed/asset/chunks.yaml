  trans: '## IQP 下一代默认功能


    当您升级到 SQL Server 2022 时，多项 IQP 功能只需“开启”即可，无需更改任何数据库兼容性级别。这意味着，即使您使用的是 IQP“诞生”之前版本的
    SQL Server（如 SQL Server 2016，数据库兼容性级别 130）的兼容性级别，也能利用新的 IQP 功能。这包括近似百分位数和优化计划强制。让我们来解释一下这些功能各自的工作原理以及如何利用它们。


    ### 近似百分位数


    在 SQL Server 2019 中，我们引入了一个新的 T-SQL 函数 `APPROX_COUNT_DISTINCT`，使您能够近似获取查询中不同值的数量。尽管这不如使用
    SELECT COUNT DISTINCT 精确，但其执行速度可能快得多，准确度约为 97%。我们发现，这类函数可以显著提升分析工作负载的性能。您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql)
    阅读更多关于 `APPROX_COUNT_DISTINCT` 的内容。


    SQL Server 包含两个函数来帮助分析工作负载计算值范围的 `百分位数`：`PERCENTILE_CONT`（您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/percentile-cont-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/percentile-cont-transact-sql)
    阅读相关内容）和 `PERCENTILE_DISC`（您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/percentile-disc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/percentile-disc-transact-sql)
    阅读相关内容）。


    SQL Server 2022 为这两个函数提供了 `近似` 等效项：`APPROX_PERCENTILE_CONT` 和 `APPROX_PERCENTILE_DISC`。对于拥有异常庞大数据集的分析工作负载，这些函数可能极其有用。它们的执行速度更快，其实现保证在
    99% 概率下误差率高达 1.33%。以下是 `APPROX_PERCENTILE_CONT` 的一个 T-SQL 示例：


    ```

    SELECT DeptId,

    APPROX_PERCENTILE_CONT(0.10) WITHIN GROUP(ORDER BY Salary) AS ''P10'',

    APPROX_PERCENTILE_CONT(0.90) WITHIN GROUP(ORDER BY Salary) AS ''P90''

    FROM tblEmployee

    GROUP BY DeptId;

    ```


    `APPROX_PERCENTILE_CONT` 的参数是需要为数据范围计算的 `百分位数`。


    您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-cont-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-cont-transact-sql)
    阅读更多关于如何使用 `APPROX_PERCENTILE_CONT` 的内容，在 [`https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-disc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-disc-transact-sql)
    阅读关于 `APPROX_PERCENTILE_DISC` 的内容。


    我与微软高级项目经理 Balmukund Lakhani 讨论了 T-SQL 用户为何应该考虑使用这些新函数：


    在 `SQL Server 2022` 中，我们近似查询处理家族迎来了最新成员：近似百分位数函数（用于连续值的 `APPROX_PERCENTILE_CONT`
    和用于离散值的 `APPROX_PERCENTILE_DISC`）。当您希望以最小的输出误差为代价换取更快的性能时，这些聚合函数可以替代早期的分析百分位数函数（用于连续值的
    `PERCENTILE_CONT` 和用于离散值的 `PERCENTILE_DISC`）。想象一下，一个温度传感器数据表拥有数百万行数据，而您希望快速找到第
    99 百分位数，并接受可接受的基于排序的误差边界，以便快速决策。这些函数可以在单次扫描中输出结果，且使用更少的 CPU 和内存。


    ### 优化计划强制


    `优化计划强制` 是 SQL Server 2022 中的一项新功能，旨在减少在查询存储中强制查询计划后，某些查询编译所需的时间。


    注意

    在查询存储中强制查询计划与使用查询计划提示不同。强制查询计划允许您获取查询存储中的特定查询计划，并“告知”优化器在编译时使用该计划，而不是创建新计划。您使用系统存储过程
    `sp_query_store_force_plan` 来强制查询计划。


    #### 背景


    到 2019 年，我们的工程团队与 CSS（客户支持服务）注意到一些客户遇到的一种称为 `编译风暴` 的性能问题模式。在这些情况下，由于某些不可预见的事件（例如，故障转移、重启、内存压力），所有查询计划都从缓存中被清除。然后应用程序会立即生成大量并发连接，每个连接都在极其短暂的时间内发出需要编译的查询。


    此问题的典型症状是所有处理器上出现大量的 CPU 利用率（例如，100% CPU 利用率或“满载”）。应用程序实际上处于停滞状态，因为所有用户运行的查询都需要进行耗时较长的查询编译。查询编译几乎完全是受
    CPU 限制的操作，某些查询模式可能需要很长时间才能编译并生成查询计划。


    在几个示例中，即使客户使用查询存储强制特定查询计划，问题也可能发生。即使在查询存储中强制了查询计划，当计划不在缓存中时，查询仍必须进行编译。


    #### 它是如何工作的？


    在 SQL Server 2022 中，我们增强了查询存储和查询处理器，如果认为查询编译可能需要大量时间，则可以缩短强制查询计划的编译时间。我们将此概念称为
    `优化计划强制`。


    以下是 `优化计划强制` 的工作方式：


    *   如果在编译查询时启用了查询存储，并且查询编译需要大量时间，则它有资格生成 `编译脚本`。什么是“大量”？我们不记录此阈值，也不允许您更改它，但它实际上意味着查询执行的
    `编译阶段` 正在影响整体查询持续时间。您将在下一节“**实际应用**”中看到一个示例。此外，只有需要“完全优化”的查询（即，没有平凡计划的查询）才有资格。您可以在
    [`https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store?#considerations`](https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store?#considerations)
    查看决定哪些查询有资格进行 `优化计划强制` 的所有不同考虑因素。


    *   编译脚本是二进制数据，被编码到存储在查询存储中的 XML 查询计划的二进制表示中，如 `sys.query_store_plan` 视图中的 `query_plan`
    列所示。如果您将 `query_plan` 列“转换”为 XML，将看不到此信息。它是一种未记录的二进制格式，不是 showplan XML 架构的一部分。


    *   我们还通过将 `sys.query_store_plan` 视图中的 `has_compile_replay_script` 列设置为 `1`，将查询计划标记为具有编译脚本。


    所有这些在 SQL Server 2022 中都是默认发生的，无论数据库兼容性级别如何，前提是数据库启用了查询存储并处于 READ_WRITE 模式。如果您使用
    `sp_query_store_force_plan` 强制一个具有编译脚本的计划，那么下次我们需要编译该查询时，我们将使用编译脚本来缩短编译时间。只要查询计划在查询存储中被标记为强制，此操作就会发生。


    当我介绍这个概念时，有人问我：“如果查询计划已被强制，为什么我们还需要此功能？”强制查询计划只是在编译查询时“锁定”一个特定的查询计划。这并不意味着我们不必编译查询的计划。如果我们能缩短编译计划所需的时间，最终可以节省大量
    CPU 周期，尤其是在这些“编译风暴”场景中。'
- fmt: "# See It in Action\n\n## 背景与发现\n\n我必须承认，我一直在努力寻找场景来触发编译脚本。当我研究我们为这个功能设计的一些背景时，我们有时会使用\
    \ TPC-H 基准的查询来进行测试。事实证明，任何人都可以通过使用 HammerDB ([`www.hammerdb.com`](http://www.hammerdb.com))\
    \ 来运行模拟 TPC-H 的工作负载。我按照 HammerDB 文档中针对 SQL Server 的 TPC-H 说明进行了操作（使用了尽可能小的规模）。然后我启用了查询存储（捕获模式\
    \ = ALL）并运行了一个示例工作负载。有几个查询出现在 `sys.query_store_plan` 中，其 `has_compile_replay_script`\
    \ 列的值为 `1`。\n\n我检查了这些查询中的几个，并注意到了这个模式：\n\n*   这些查询中的大多数 SQL 文本量比其他大多数查询都要大得多。\n\
    *   这些查询中有许多涉及多表连接。\n\n然后我能够使用 **WideWorldImporters** 示例数据库来构建我自己的演示。\n\n## 前提条件\n\
    \n以下是运行此示例的前提条件：\n\n*   SQL Server 2022 评估版。\n*   至少有 4 个 CPU 和 8GB 内存的虚拟机或计算机（使用更少的\
    \ CPU 也有可能看到此功能，但这是我用于测试的最低配置）。\n*   SQL Server Management Studio (SSMS)。最新的 18.x\
    \ 或 19.x 版本均可。\n*   从本书的 GitHub 仓库的 `ch4_builtinqueryintelligence\\opf` 目录下载的脚本副本。\n\
    \n## 操作步骤\n\n以下是您可以自己查看此功能的步骤：\n\n1.  从 [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
    \ 复制 **WideWorldImporters** 的示例备份文件。后续步骤中的还原脚本假设备份文件位于 `c:\\sql_sample_databases`。\n\
    \n2.  执行脚本 `restorewwi.sql`。根据您的需要编辑文件位置。该脚本执行以下 T-SQL 语句：\n\n```sql\n    USE\
    \ master;\n    GO\n    DROP DATABASE IF EXISTS WideWorldImporters;\n    GO\n \
    \   RESTORE DATABASE WideWorldImporters FROM DISK = 'c:\\sql_sample_databases\\\
    WideWorldImporters-Full.bak' with\n    MOVE 'WWI_Primary' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters.mdf',\n    MOVE 'WWI_UserData' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters.ldf',\n    MOVE 'WWI_InMemory_Data_1' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters_InMemory_Data_1',\n    stats=5;\n    GO\n    ALTER DATABASE\
    \ WideWorldImporters SET QUERY_STORE CLEAR ALL;\n    GO\n```\n\n3.  执行脚本 `bigjoin.sql`。该查询大约需要\
    \ 7-10 秒完成。该脚本执行以下 T-SQL：\n\n```sql\n    USE WideWorldImporters;\n    GO\n   \
    \ ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n    SET\
    \ STATISTICS TIME ON\n    GO\n    SELECT o.OrderID, ol.OrderLineID, c.CustomerName,\
    \ cc.CustomerCategoryName, p.FullName, city.CityName, sp.StateProvinceName, country.CountryName,\
    \ si.StockItemName\n    FROM Sales.Orders o\n    JOIN Sales.Customers c\n    ON\
    \ o.CustomerID = c.CustomerID\n    JOIN Sales.CustomerCategories cc\n    ON c.CustomerCategoryID\
    \ = cc.CustomerCategoryID\n    JOIN Application.People p\n    ON o.ContactPersonID\
    \ = p.PersonID\n    JOIN Application.Cities city\n    ON city.CityID = c.DeliveryCityID\n\
    \    JOIN Application.StateProvinces sp\n    ON city.StateProvinceID = sp.StateProvinceID\n\
    \    JOIN Application.Countries country\n    ON sp.CountryID = country.CountryID\n\
    \    JOIN Sales.OrderLines owl\n    ON ol.OrderID = o.OrderID\n    JOIN Warehouse.StockItems\
    \ si\n    ON ol.StockItemID = si.StockItemID\n    JOIN Warehouse.StockItemStockGroups\
    \ sisg\n    ON si.StockItemID = sisg.StockItemID\n    UNION ALL\n    SELECT o.OrderID,\
    \ ol.OrderLineID, c.CustomerName, cc.CustomerCategoryName, p.FullName, city.CityName,\
    \ sp.StateProvinceName, country.CountryName, si.StockItemName\n    FROM Sales.Orders\
    \ o\n    JOIN Sales.Customers c\n    ON o.CustomerID = c.CustomerID\n    JOIN\
    \ Sales.CustomerCategories cc\n    ON c.CustomerCategoryID = cc.CustomerCategoryID\n\
    \    JOIN Application.People p\n    ON o.ContactPersonID = p.PersonID\n    JOIN\
    \ Application.Cities city\n    ON city.CityID = c.DeliveryCityID\n    JOIN Application.StateProvinces\
    \ sp\n    ON city.StateProvinceID = sp.StateProvinceID\n    JOIN Application.Countries\
    \ country\n    ON sp.CountryID = country.CountryID\n    JOIN Sales.OrderLines\
    \ ol\n    ON ol.OrderID = o.OrderID\n    JOIN Warehouse.StockItems si\n    ON\
    \ ol.StockItemID = si.StockItemID\n    JOIN Warehouse.StockItemStockGroups sisg\n\
    \    ON si.StockItemID = sisg.StockItemID\n    ORDER BY OrderID;\n    GO\n```\n\
    \n注意 SQL 文本的数量、多个连接和 `UNION ALL` 子句。数据库的过程缓存被清除，以确保每次执行查询时都会进行编译。这可能不是一个写得很好的查询，但它代表了一个查询编译时间占执行所需\
    \ CPU 时间很大比例的示例。\n\n使用 SSMS 结果窗口中的“消息”选项卡并滚动到底部。您的结果应类似于以下内容：\n\n```\n    SQL\
    \ Server parse and compile time:\n    CPU time = 353 ms, elapsed time = 353 ms.\n\
    \    (916540 rows affected)\n    SQL Server Execution Times:\n    CPU time = 2531\
    \ ms,  elapsed time = 7827 ms.\n```\n\n在此示例中，您可以看到编译时间大约占查询执行总 CPU 时间的 13%。\n\n\
    4.  现在让我们看看这个查询是否是优化计划强制的候选者。执行脚本 `find_query_in_query_store.sql`。该脚本使用以下 T-SQL：\n\
    \n```sql\n    USE WideWorldImporters;\n    GO\n    SELECT query_id, plan_id, avg_compile_duration/1000\
    \ as avg_compile_ms,\n    last_compile_duration/1000 as last_compile_ms, is_forced_plan,\n\
    \    has_compile_replay_script,\n    cast(query_plan as xml) query_plan_xml\n\
    \    FROM sys.query_store_plan;\n    GO\n```\n\n结果应类似于以下内容（我将结果翻转为垂直显示每个字段）：\n\
    \n```\n    query_id                        2\n    plan_id                    \
    \     1\n    avg_compile_ms                  353.088\n    last_compile_ms    \
    \             353\n    is_forced_plan                  0\n    has_compile_replay_script\
    \       1\n    query_plan_xml                  \n```\n\n`query_id` 和 `plan_id`\
    \ 可能不同，您的编译时间也可能有所不同。但是，它们应该大约在查询执行总 CPU 时间的 10-15% 之间。关键是 `has_compile_replay_script`\
    \ 的值为 `1`。"
  raw: "#### See It in Action\n\nI must admit I was struggling to produce scenarios\
    \ to trigger a compilation script. When I researched some of the background of\
    \ our design for this feature, we sometimes used queries from the TPC-H benchmark\
    \ to test it. As it turns out, anyone can run a workload that *simulates* TPC-H\
    \ by using HammerDB ([`www.hammerdb.com`](http://www.hammerdb.com)). I followed\
    \ the instructions in the HammerDB documentation for TPC-H for SQL Server (using\
    \ the smallest size possible). I then enabled Query Store (capture mode = ALL)\
    \ and ran a sample workload. Several queries showed up in **sys.query_store_plan**\
    \ with a column value of **1** for **has_compile_replay_script**.\n\nI looked\
    \ over several of these queries and noticed this pattern:\n\n*   Most of these\
    \ queries had fairly larger SQL text than most other queries.\n\n*   Many of these\
    \ queries involved joins for many tables.\n\nI was able then to construct my own\
    \ demonstration using the **WideWorldImporters** sample database.\n\nHere are\
    \ the prerequisites to run this example:\n\n*   SQL Server 2022 Evaluation Edition.\n\
    \n*   Virtual machine or computer with minimum of four CPUs and 8Gb RAM (it may\
    \ be possible to see this in action with fewer CPUs, but this is the minimum I\
    \ used for the test).\n\n*   SQL Server Management Studio (SSMS). The latest 18.x\
    \ or 19.x build will work.\n\n*   A copy of the scripts from the GitHub repo of\
    \ this book from the **ch4_builtinqueryintelligence\\opf** directory.\n\nHere\
    \ are the steps you can use to see this for yourself:\n\n1.  Copy the sample backup\
    \ for **WideWorldImporters** from [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters).\
    \ The restore script in the next steps assumes a location for the backup in **c:\\\
    sql_sample_databases**.\n\n2.  Execute the script **restorewwi.sql**. Edit the\
    \ file locations per your needs. The script executes the following T-SQL statements:\n\
    \n```\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS WideWorldImporters;\n\
    \    GO\n    RESTORE DATABASE WideWorldImporters FROM DISK = 'c:\\sql_sample_databases\\\
    WideWorldImporters-Full.bak' with\n    MOVE 'WWI_Primary' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters.mdf',\n    MOVE 'WWI_UserData' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters.ldf',\n    MOVE 'WWI_InMemory_Data_1' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters_InMemory_Data_1',\n    stats=5;\n    GO\n    ALTER DATABASE\
    \ WideWorldImporters SET QUERY_STORE CLEAR ALL;\n    GO\n    ```\n\n3.  Execute\
    \ the script **bigjoin.sql**. The query should take around ~7–10 seconds to complete.\
    \ The script executes the following T-SQL:\n\n```\n    USE WideWorldImporters;\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n\
    \    SET STATISTICS TIME ON\n    GO\n    SELECT o.OrderID, ol.OrderLineID, c.CustomerName,\
    \ cc.CustomerCategoryName, p.FullName, city.CityName, sp.StateProvinceName, country.CountryName,\
    \ si.StockItemName\n    FROM Sales.Orders o\n    JOIN Sales.Customers c\n    ON\
    \ o.CustomerID = c.CustomerID\n    JOIN Sales.CustomerCategories cc\n    ON c.CustomerCategoryID\
    \ = cc.CustomerCategoryID\n    JOIN Application.People p\n    ON o.ContactPersonID\
    \ = p.PersonID\n    JOIN Application.Cities city\n    ON city.CityID = c.DeliveryCityID\n\
    \    JOIN Application.StateProvinces sp\n    ON city.StateProvinceID = sp.StateProvinceID\n\
    \    JOIN Application.Countries country\n    ON sp.CountryID = country.CountryID\n\
    \    JOIN Sales.OrderLines owl\n    ON ol.OrderID = o.OrderID\n    JOIN Warehouse.StockItems\
    \ si\n    ON ol.StockItemID = si.StockItemID\n    JOIN Warehouse.StockItemStockGroups\
    \ sisg\n    ON si.StockItemID = sisg.StockItemID\n    UNION ALL\n    SELECT o.OrderID,\
    \ ol.OrderLineID, c.CustomerName, cc.CustomerCategoryName, p.FullName, city.CityName,\
    \ sp.StateProvinceName, country.CountryName, si.StockItemName\n    FROM Sales.Orders\
    \ o\n    JOIN Sales.Customers c\n    ON o.CustomerID = c.CustomerID\n    JOIN\
    \ Sales.CustomerCategories cc\n    ON c.CustomerCategoryID = cc.CustomerCategoryID\n\
    \    JOIN Application.People p\n    ON o.ContactPersonID = p.PersonID\n    JOIN\
    \ Application.Cities city\n    ON city.CityID = c.DeliveryCityID\n    JOIN Application.StateProvinces\
    \ sp\n    ON city.StateProvinceID = sp.StateProvinceID\n    JOIN Application.Countries\
    \ country\n    ON sp.CountryID = country.CountryID\n    JOIN Sales.OrderLines\
    \ ol\n    ON ol.OrderID = o.OrderID\n    JOIN Warehouse.StockItems si\n    ON\
    \ ol.StockItemID = si.StockItemID\n    JOIN Warehouse.StockItemStockGroups sisg\n\
    \    ON si.StockItemID = sisg.StockItemID\n    ORDER BY OrderID;\n    GO\n   \
    \ ```\n\nNotice the amount of SQL text, multiple joins, and UNION ALL clause.\
    \ The procedure cache for the database is cleared to make sure the query is compiled\
    \ for each execution. This may not be a beautifully written query, but it represents\
    \ an example of a query where the compile time can represent a sizable percentage\
    \ of the CPU time required to execute the query.\n\nUse the **Messages** tab in\
    \ the SSMS results window and scroll down to the bottom. Your result should look\
    \ similar to the following:\n\n```\n    SQL Server parse and compile time:\n \
    \   CPU time = 353 ms, elapsed time = 353 ms.\n    (916540 rows affected)\n  \
    \  SQL Server Execution Times:\n    CPU time = 2531 ms,  elapsed time = 7827 ms.\n\
    \    ```\n\nYou can see in this example that the compile time is ~13% of the overall\
    \ CPU time for query execution.\n\n4.  Now let’s see if this query is a candidate\
    \ for optimized plan forcing. Execute the script **find_query_in_query_store.sql**.\
    \ The script uses the following T-SQL:\n\n```\n    USE WideWorldImporters;\n \
    \   GO\n    SELECT query_id, plan_id, avg_compile_duration/1000 as avg_compile_ms,\n\
    \    last_compile_duration/1000 as last_compile_ms, is_forced_plan,\n    has_compile_replay_script,\n\
    \    cast(query_plan as xml) query_plan_xml\n    FROM sys.query_store_plan;\n\
    \    GO\n    ```\n\nThe results should look like the following (I flipped the\
    \ results to show each field vertically):\n\n```\n    query_id               \
    \         2\n    plan_id                         1\n    avg_compile_ms       \
    \           353.088\n    last_compile_ms                 353\n    is_forced_plan\
    \                  0\n    has_compile_replay_script       1\n    query_plan_xml\
    \                  \n    ```\n\nThe **query_id** and **plan_id** could be different,\
    \ and your compile times could vary. However, they should be somewhere around\
    \ 10–15% of the overall CPU time for the execution of the query. The key is the\
    \ value of **has_compile_replay_script** is **1**."
