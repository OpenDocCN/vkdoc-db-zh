    ### 使用 Microsoft Purview 访问策略


    ![一张截图显示了注册源选项卡。其中包含名称、Azure 订阅、服务器名称、服务器端点、选择集合和应用程序 ID 等条目。数据使用管理已启用。](img/525217_1_En_3_Fig48_HTML.png)


    图 3-48：为 Purview 访问策略注册 SQL Server 数据源


    1.  我们需要做的第一件事是将 SQL Server 2022 实例注册为数据源。从 Azure 门户启动 Purview Studio。选择左侧菜单中的
    `数据地图` 图标（将鼠标悬停在图标上可看到“数据地图”）。你的 Purview 帐户可能已经注册了其他数据源，这些数据源可能以可视树或表格形式显示。选择屏幕顶部的
    `注册`。在 `注册源` 屏幕上的 `按关键字筛选` 字段中输入 `Arc`。选择 `Azure Arc 托管服务器上的 SQL Server`，然后选择
    `继续`。


    现在，你可以在 `注册源（Azure Arc 托管服务器上的 SQL Server）` 屏幕上选择并填写字段。选择一个名称（我建议与你注册的服务器名称相同）、订阅和服务器名称（你已注册的服务器）。在
    `服务器端点` 字段中输入你已注册的服务器名称，并将 `(Root)` 集合保留为默认值。


    为 `数据使用管理` 选择 `已启用` 选项，这应会自动填充 `应用程序 ID`（这是 SQL Server – Azure Arc 的 Azure Active
    Directory 屏幕上列出的应用程序注册 ID）。你的屏幕应与图 3-48 类似。


    选择 `注册`。几秒钟后，你将再次看到数据源列表。选择屏幕顶部的 `刷新` 以确认你的数据源。


    > **注意**

    > 如果你想对多个 SQL Server 实例应用策略，你需要先注册每一个实例。你只需注册一次 SQL Server 数据源，即可用于任意数量的策略。


    2.  现在让我们为另一个 AAD 帐户创建一个数据策略。我将使用 `annahoffman@aadsqlmi.net` 来授予对我们 SQL Server
    实例数据的读取访问权限。对我而言，由于我在 AAD 的练习中将此帐户创建为了登录名，为了避免混淆，我首先删除了该登录名。结果证明，如果某个登录名与策略使用的是同一个
    AAD 帐户，我们将使用登录名和策略权限的*并集*。


    > **注意**

    > 在撰写本书时，我们正计划在未来为特定对象（如特定数据库和/或表）添加更精细的读取访问权限。这将需要使用 Microsoft Purview 的数据目录功能扫描
    SQL Server 实例。


    使用 Purview Studio，选择左侧菜单中的 `数据策略` 图标。选择 `数据策略`，然后选择 `+ 新建策略`。现在，在 `策略类型` 下选择 `访问控制`。


    在 `访问控制策略` 上，输入一个名为 `sqlreader` 的名称，描述相同。然后选择 `+ 新建策略语句`。现在你需要通过一些选择来构建语句：


    *   对于 `效果`，选择 `允许`。

    *   对于 `操作`，选择 `读取`。

    *   对于新屏幕上的 `数据资源`，选择 `数据源类型`，然后选择 `Azure Arc 托管服务器上的 SQL Server`。不要动 `资产`，选择
    `继续`。在 `数据源名称` 下选择你的服务器，然后选择 `添加`。


    > **注意**

    > 如果你注册了多个 SQL Server 数据源，你可以在此处将策略应用于其中一个或多个。


    *   对于 `主体`，在 `选择主体` 搜索窗口中输入你想要授予读取访问权限的 AAD 帐户，然后选择 `确定`。


    你的策略语句应如图 3-49 所示。


    ![一张截图显示了访问控制策略选项卡。名称和描述字段条目为 s q l reader。策略语句选项卡在底部可见。](img/525217_1_En_3_Fig49_HTML.png)


    图 3-49：为 SQL Server 2022 创建读取策略


    选择 `保存`。策略保存后，你将在策略列表中看到你的新策略。


    ![一张截图显示了新策略选项卡。可见策略语句、数据资源路径和 DevOps 角色窗格，以及用于主体的添加或删除按钮。](img/525217_1_En_3_Fig50_HTML.png)


    图 3-50：为 SQL 性能监控创建 DevOps 策略。


    3.  要使策略生效，我们需要发布它。选择你的策略，然后在屏幕右侧选择 `发布`。选择你的数据源，并在新屏幕底部选择 `发布`。现在，你应该在屏幕上看到策略的
    `发布于` 日期和时间。

    4.  让我们为新帐户创建一个数据库和数据以供读取。以你的默认系统管理员身份，对你的 SQL Server 2022 实例执行脚本 `howboutthemcowboys.sql`。

    5.  策略不会立即应用。SQL Server 将在轮询间隔定期检查新策略。连接到你的 SQL Server 2022 以立即应用新策略。执行脚本 `policyrefresh.sql`，该脚本使用以下
    T-SQL 语句：


    ```sql

    -- 强制立即下载最新发布的策略

    USE master;

    GO

    exec sp_external_policy_refresh reload;

    GO

    ```


    > **注意**

    > 当 SQL Server 在服务器启动时从 Microsoft Purview 获取策略信息时，你可能会在 ERRORLOG 中看到类似以下的消息：

    >

    > `IMDS resource information. Subscription ID: 4fe118d0-bc41-4d7b-869f-0820c87df124,
    Resource Group: aad-auth-demo-env, Name: SQLSERVER2022.`

    >

    > `[JSONWebTokenService::GetCertificateFromCertificateStoreBySubjectName] [AADAuthThumbprint]
    Thumbprint being used for AAD authentication aRgwszCertificateThumbprint 26289598dfe34092c141edc8a319505bdf0882b6`

    >

    > `[CBabylonConfigSubscriber] Purview frequency setting changed. New value: 300`

    >

    > `[CBabylonConfigSubscriber] Purview policy expiration time changed to 480 mins`

    >

    > `[CBabylonConfigSubscriber] Received update to the config settings`

    >

    > `[CBabylonConfigSubscriber] Purview frequency setting changed. New value: 300`

    >

    > `[CBabylonConfigSubscriber] Purview policy expiration time changed to 480 mins`

    >

    > `[CBabylonConfigSubscriber] Registered for setting updates successfully`

    >

    > **有趣的事实**

    > Babylon 是 Microsoft Purview 的原始项目名称。


    6.  使用你本章前面学到的 SSMS 技巧，使用你为其发布了策略的帐户登录 SSMS（使用 MFA 选项，别忘了勾选 `信任服务器证书` 选项）。让我们以读者身份检查新权限以确保其生效。执行脚本
    `querythecowboys.sql`，该脚本执行以下 T-SQL 语句：


    ```sql

    USE howboutthemcowboys;

    GO

    SELECT * FROM tothesuperbowl;

    GO

    ```


    你应该会返回一行数据（我希望今年是我们的年份<g>）。读取数据的权限包括系统目录视图和有限的动态管理视图 (DMV)。


    7.  让我们证明你只有读取权限。执行脚本 `dropthecowboys.sql`，该脚本执行以下 T-SQL 语句：


    ```sql

    USE howboutthemcowboys;

    GO

    DROP TABLE tothesuperbowl;

    GO

    ```


    你现在应该会得到类似以下的错误：


    ```

    Msg 3701, Level 14, State 20, Line 3

    Cannot drop the table ''tothesuperbowl'', because it does not exist or you do
    not have permission.

    ```


    8.  让我们快速查看几个新的动态管理视图 (DMV)，以查看已从 Microsoft Purview 拉取的策略信息。以系统管理员身份连接到你的 SQL
    Server 2022 实例，并执行脚本 `policydmvs.sql`，该脚本使用以下 T-SQL 语句：

