- fmt: '## Project Dallas


    In December of 2019, I found myself celebrating the release of SQL Server 2019
    and catching up with all my colleagues on the SQL Server team in building 43 on
    the Microsoft campus in Redmond. It was a heady time for SQL Server and me. I
    had just traveled some 50,000 miles over the last calendar year getting the message
    out on SQL Server 2019. I had launched my second book, `SQL Server 2019 Revealed`
    ([`https://aka.ms/sql2019book`](https://aka.ms/sql2019book)), telling the entire
    story of our latest SQL Server release. I felt proud of the release and was able
    to tell all the great customer feedback and stories to many in the engineering
    team. On that trip I spoke to a large crowd of all the engineers who worked on
    the release in an internal meeting organized by the famous Slava Oks, Distinguished
    Engineer at Microsoft and Lead Development Manager for the SQL Server 2019 release.


    I spent some of my time in Redmond catching up with my longtime friend from CSS,
    Robert Dorr, who now worked for Slava. I spent time at lunch telling Bob all the
    tales from my travels and my experiences launching the product and authoring the
    book. SQL Server 2019 was tagged project Seattle by Slava, Travis Wright, and
    Tobias Ternstrom. I told Bob at lunch, “Hey, I think you and I should come up
    with the project name for the next version of SQL Server.” Bob started a year
    after me, so together we represented 55+ years of experience with SQL Server.
    That day Bob (as he often does) was sporting a Dallas Cowboys jersey. I proposed
    the project name should be called Dallas. After lunch I stopped by Slava’s desk
    and pitched the idea. He told me, “It makes sense. This new version should be
    a tribute to the two ‘Bobs’ who have worked so hard for SQL Server over the years.”
    Slava sent out an email the next day to our teams, and thus the project name Dallas
    was born. Sometimes that is how project names are created at Microsoft.


    Even though we had just shipped SQL Server 2019, discussions had already begun
    about what type of new functionality could be part of project Dallas. For me,
    my focus would change drastically. On this same trip, I had meetings with my manager,
    Asad Khan, Vice President of Program Management (PM) across all of Azure SQL and
    SQL Server, which would lead me to start working on Azure SQL. But I still had
    my ear to the ground on project Dallas.


    Already in late December of 2019, my colleague Amit Banerjee was putting together
    a proposal for the project. As we turned the corner to start 2020, little did
    I or anyone know all of us would have to adapt to a worldwide pandemic. In all
    honesty, the pandemic accelerated work for our teams in the cloud, which led to
    a slowdown in planning for project Dallas. The good news is that based on our
    engineering systems, much of the work we design and build in the cloud just naturally
    applies to SQL Server; Intelligent Query Processing (IQP) and SQL Ledger are great
    examples.


    The focus on the cloud worked out very well for me personally, as I was already
    on the path to work on Azure SQL. I didn’t realize that the pandemic would speed
    up that work in the form of a partnership with Anna Hoffman for the Azure SQL
    Workshop ([`https://aka.ms/azuresqlworkshop`](https://aka.ms/azuresqlworkshop)),
    which then led to the popular Azure SQL Fundamentals learning path ([`https://aka.ms/azuresqlfundamentals`](https://aka.ms/azuresqlfundamentals))
    and a huge series of videos called Azure SQL for Beginners ([`https://aka.ms/azuresql4beginners`](https://aka.ms/azuresql4beginners)).
    And since we had moved to all digital for our content, why not a third book? Thus
    was born `Azure SQL Revealed` ([`https://aka.ms/azuresqlbook`](https://aka.ms/azuresqlbook)),
    which launched in the fall of 2020.


    But what about project Dallas?


    Throughout calendar year 2020, project Dallas work had started under the leadership
    of Slava on the development side and Amit for program management. One example
    is degree of parallelism (DOP) feedback under a project called Gaia. Gaia had
    big ambitions and is an endeavor we are still working on, but the DOP feedback
    concept was born out of it, and you will hear more about this in Chapter [5](#525217_1_En_5_Chapter.xhtml)
    of the book. Other capabilities like Parameter-Sensitive Plan (PSP) optimization,
    cross-platform backups, buffer pool scan, Query Store hints, multi-write replication,
    SQL Ledger, T-SQL language improvements, and more were all under way. We were
    actively working through improvements for project Dallas but had not really landed
    on the full plan for a release. Again, the cool thing about how we do things now
    is that many of these features were designed for Azure SQL, but we knew because
    of our engine compatibility they could be fit into Dallas at any time.


    As we moved further along calendar year 2020, it became clear to me that project
    Dallas would not make it into an actual release until calendar year 2022 at the
    earliest. I had meetings with Slava, Amit, Asad, and Travis Wright late in 2020
    to discuss the plan. All of us agreed, along with our Vice President of Azure
    Data, Rohan Kumar, that we needed a new major version of SQL Server sooner rather
    than later. But we also agreed that trying to do anything sooner than 2022 would
    not result in a great release. In late calendar year 2020, I would hear for the
    first time the words `SQL Server 2022`.'
  raw: '## Project Dallas


    In December of 2019, I found myself celebrating the release of SQL Server 2019
    and catching up with all my colleagues on the SQL Server team in building 43 on
    the Microsoft campus in Redmond. It was a heady time for SQL Server and me. I
    had just traveled some 50,000 miles over the last calendar year getting the message
    out on SQL Server 2019\. I had launched my second book, *SQL Server 2019 Revealed*
    ([`https://aka.ms/sql2019book`](https://aka.ms/sql2019book)), telling the entire
    story of our latest SQL Server release. I felt proud of the release and was able
    to tell all the great customer feedback and stories to many in the engineering
    team. On that trip I spoke to a large crowd of all the engineers who worked on
    the release in an internal meeting organized by the famous Slava Oks, Distinguished
    Engineer at Microsoft and Lead Development Manager for the SQL Server 2019 release.


    I spent some of my time in Redmond catching up with my longtime friend from CSS,
    Robert Dorr, who now worked for Slava. I spent time at lunch telling Bob all the
    tales from my travels and my experiences launching the product and authoring the
    book. SQL Server 2019 was tagged project Seattle by Slava, Travis Wright, and
    Tobias Ternstrom. I told Bob at lunch, “Hey, I think you and I should come up
    with the project name for the next version of SQL Server.” Bob started a year
    after me, so together we represented 55+ years of experience with SQL Server.
    That day Bob (as he often does) was sporting a Dallas Cowboys jersey. I proposed
    the project name should be called Dallas. After lunch I stopped by Slava’s desk
    and pitched the idea. He told me, “It makes sense. This new version should be
    a tribute to the two ‘Bobs’ who have worked so hard for SQL Server over the years.”
    Slava sent out an email the next day to our teams, and thus the project name Dallas
    was born. Sometimes that is how project names are created at Microsoft.


    Even though we had just shipped SQL Server 2019, discussions had already begun
    about what type of new functionality could be part of project Dallas. For me,
    my focus would change drastically. On this same trip, I had meetings with my manager,
    Asad Khan, Vice President of Program Management (PM) across all of Azure SQL and
    SQL Server, which would lead me to start working on Azure SQL. But I still had
    my ear to the ground on project Dallas.


    Already in late December of 2019, my colleague Amit Banerjee was putting together
    a proposal for the project. As we turned the corner to start 2020, little did
    I or anyone know all of us would have to adapt to a worldwide pandemic. In all
    honesty, the pandemic accelerated work for our teams in the cloud, which led to
    a slowdown in planning for project Dallas. The good news is that based on our
    engineering systems, much of the work we design and build in the cloud just naturally
    applies to SQL Server; Intelligent Query Processing (IQP) and SQL Ledger are great
    examples.


    The focus on the cloud worked out very well for me personally, as I was already
    on the path to work on Azure SQL. I didn’t realize that the pandemic would speed
    up that work in the form of a partnership with Anna Hoffman for the Azure SQL
    Workshop ([`https://aka.ms/azuresqlworkshop`](https://aka.ms/azuresqlworkshop)),
    which then led to the popular Azure SQL Fundamentals learning path ([`https://aka.ms/azuresqlfundamentals`](https://aka.ms/azuresqlfundamentals))
    and a huge series of videos called Azure SQL for Beginners ([`https://aka.ms/azuresql4beginners`](https://aka.ms/azuresql4beginners)).
    And since we had moved to all digital for our content, why not a third book? Thus
    was born *Azure SQL Revealed* ([`https://aka.ms/azuresqlbook`](https://aka.ms/azuresqlbook)),
    which launched in the fall of 2020.


    But what about project Dallas?


    Throughout calendar year 2020, project Dallas work had started under the leadership
    of Slava on the development side and Amit for program management. One example
    is degree of parallelism (DOP) feedback under a project called Gaia. Gaia had
    big ambitions and is an endeavor we are still working on, but the DOP feedback
    concept was born out of it, and you will hear more about this in Chapter [5](#525217_1_En_5_Chapter.xhtml)
    of the book. Other capabilities like Parameter-Sensitive Plan (PSP) optimization,
    cross-platform backups, buffer pool scan, Query Store hints, multi-write replication,
    SQL Ledger, T-SQL language improvements, and more were all under way. We were
    actively working through improvements for project Dallas but had not really landed
    on the full plan for a release. Again, the cool thing about how we do things now
    is that many of these features were designed for Azure SQL, but we knew because
    of our engine compatibility they could be fit into Dallas at any time.


    As we moved further along calendar year 2020, it became clear to me that project
    Dallas would not make it into an actual release until calendar year 2022 at the
    earliest. I had meetings with Slava, Amit, Asad, and Travis Wright late in 2020
    to discuss the plan. All of us agreed, along with our Vice President of Azure
    Data, Rohan Kumar, that we needed a new major version of SQL Server sooner rather
    than later. But we also agreed that trying to do anything sooner than 2022 would
    not result in a great release. In late calendar year 2020, I would hear for the
    first time the words *SQL Server 2022*.'
