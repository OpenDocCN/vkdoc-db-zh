    The reality of doing this in a keynote did happen at the PASS Community Summit
    in 2021\. And thanks to Jack for giving a demo I could use for the keynote. The
    keynote was virtual, but it was still great to do it. Check out this video at
    [`https://youtu.be/Ydlg1KpmrKU`](https://youtu.be/Ydlg1KpmrKU) and fast forward
    to about 17 minutes in. Peter Carlin introduced me to demonstrate this new capability,
    and of course the Conor and Bob show had to exist even if we were not in the same
    room or city!'
  trans: '# 什么是参数敏感计划？


    假设你创建了一个存储过程，并使用参数作为输入。然后你在 T-SQL 语句（例如 `WHERE` 子句）中使用该参数来筛选数据。查询首次编译时，优化器会确定参数的*值*，以决定该语句的最佳查询计划。这个查询计划随后将用于该存储过程的*任何*后续执行，无论传入的参数值是什么，直到该过程重新编译。计划缓存中，单个语句只能存在一个查询计划。因此，该计划在查询首次编译时对参数值是*敏感*的。这个问题被称为*参数嗅探*。


    注意

    许多 SQL 社区人士都说，我是多年前创造“*参数嗅探*”这个术语的人。有些人说是康纳·坎宁安 (Conor Cunningham)。我想这将永远是个谜。


    对于许多工作负载和数据集，这种情况不会造成问题。但是，如果为某个特定参数值构建的查询计划并非执行其他参数值查询的最佳计划呢？*一些*用户可能会遇到糟糕或不一致的性能问题。当要被参数筛选的查询所涉及的数据是*倾斜的*——换句话说，在匹配参数的值上分布不均匀时，这个问题通常就会发生。


    我在微软近三十年的职业生涯中，亲眼目睹过这个问题给客户带来性能问题。你可以阅读以下资源，进一步了解此问题以及如果你遇到此问题可以尝试的各种解决方法，包括


    [`https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide?#parameter-sensitivity`](https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide?#parameter-sensitivity)
    和 [`https://docs.microsoft.com/azure/azure-sql/identify-query-performance-issues?#resolving-queries-with-suboptimal-query-execution-plans`](https://docs.microsoft.com/azure/azure-sql/identify-query-performance-issues?#resolving-queries-with-suboptimal-query-execution-plans)


    *但是，SQL Server 2022 有一个更好的解决方案，它内置于查询处理器中，无需任何代码更改。*


    ## 通过场景学习 PSP


    这里是一个简单的可视化序列，展示了 PSP 可能引发问题的场景，如图 5-1 所示。


    ![](img/525217_1_En_5_Fig1_HTML.jpg)


    PSP 可能引发问题的场景示意图。图示如下：`Exec my proc 1` 向右箭头 `seek`。


    **图 5-1**


    存储过程执行导致了一个带有 `index seek` 的计划


    在这个第一个场景中，用户执行存储过程时使用的参数值为 1（可能基于应用程序的用户输入）。过程中使用此参数值筛选行的查询被编译，查询计划使用了 `index
    seek` 运算符，因为表中只有少数行匹配值 1。这个查询可能运行得极快。


    假设在不受任何人控制的情况下，内存压力导致该查询计划被从计划缓存中清除。那么，如果此时另一个用户来执行相同的存储过程，但参数为 10，会怎样呢？如图 5-2
    所示。


    ![](img/525217_1_En_5_Fig2_HTML.jpg)


    另一个用户此时来执行相同存储过程但参数为 10 的场景示意图。图示如下：`Exec my proc 1` 和 `exec my proc 1` 向右箭头 `scan`。


    **图 5-2**


    相同的存储过程使用不同的参数生成了一个带有 `index scan` 的计划


    如果表中有许多行匹配值 10 作为筛选条件，在编译新计划时，优化器可能转而使用聚集 `index scan`（甚至使用并行）。这完全正常，对于使用值 10
    执行过程的用户来说，性能可能被认为是正常的。现在，两个用户都被绑定到这个扫描计划中。


    那么，现在使用参数 1 执行过程的第一个用户会怎样呢？如图 5-3 所示，这种情况可能就不妙了。


    ![](img/525217_1_En_5_Fig3_HTML.jpg)


    使用参数 1 执行过程的示意图。图示如下：`Exec my proc 1` 和 `exec my proc 1` 向右箭头 `scan`。


    **图 5-3**


    第一个用户体验到由于 PSP 导致的性能下降


    一个只需查找少数几行的查询，现在可能需要扫描数百万行才能得到结果。这种行为很容易导致性能下降。很可能，使用该过程的应用程序用户会简单地说：“它突然就变慢了。”听起来熟悉吗？


    这个问题完全源于一个事实：对于特定的 T-SQL 语句，缓存中只能存在一个计划。而数据的倾斜可能意味着一个计划无法满足各种参数值的需求。并且，作为存储过程的开发者，数据倾斜并非你的错。因此，与其面对你可能遇到的各种变通方法和性能调优的困扰，不如让我们看看
    `SQL Server 2022` 中针对此问题的一个解决方案，坦率地说，这是一个“改变游戏规则”的方案。


    # 一切如何开始


    2020 年初，我在德克萨斯州欧文市的微软办公室。那时，我在 CSS 团队所在的大楼里有一间真正的办公室。由于我为 CSS 工作了多年，当我加入工程团队时，他们让我保留了办公室。那时，我的一位前
    CSS 同事，Jack Li，也作为一名开发人员加入了工程部。他也在欧文办公室保留了一个工位。当时天色已晚，我正准备离开，顺道去 Jack 的工位看看他在不在。幸运的是他在，于是我们聊了一会儿家常、一些在
    CSS 时的趣事，以及我们各自在工程部门的工作情况。然后我对 Jack 说：*“嘿*，你最近在忙什么？” 他是个非常谦虚的人，但他说：*“嗯*，实际上是件大事。我正在写一些代码来解决参数嗅探问题。”
    我停顿了一下消化这个信息，然后说了类似*“你在开玩笑吧。我想了解更多。” 可能让我们俩的妻子都懊恼的是，接下来的两个小时我们一直待到很晚在讨论这个项目。结束时，我记得对他说：*“Jack，这可是主题演讲级别的演示材料。当你展示这个时，SQL
    世界会为之沸腾。”*


    正如你可以从时间线想象到的，世界有点乱套了，我与 Jack 关于此事的讨论也就搁置了。时间快进到 2021 年春天，我收到了 Jack 的一封电子邮件：*“嘿，Bob，还记得我之前在研究的参数嗅探项目吗？嗯，它要实现了，我们认为可以把它放进项目
    Dallas*。” Jack 将此解决方案称为**参数敏感计划 (PSP) 优化**。那天我的工作都停了。我立刻打电话给他了解细节。当我们谈完，我知道我确实拥有了一个主题演讲级别的演示，以及
    `SQL Server 2022` 一个主要功能的亮点。


    注意

    在主题演讲中展示这个功能确实在 2021 年的 PASS Community Summit 上发生了。感谢 Jack 给了我可以在主题演讲中使用的演示。主题演讲是虚拟的，但做起来仍然很棒。请查看此视频链接
    [`https://youtu.be/Ydlg1KpmrKU`](https://youtu.be/Ydlg1KpmrKU) 并快进到大约 17 分钟处。Peter
    Carlin 介绍我来演示这项新功能，当然，即使我们不在同一个房间或城市，康纳和鲍勃的节目也必须存在！'
- fmt: '### How Does PSP Optimization Work?


    The concept of PSP optimization is simple but powerful.


    Note


    I will say to you up front we really don’t know if we will solve all PSP problems.
    We know there are limits to the first version of this work. But we do believe
    it has a real possibility to make a difference for applications that are affected
    by parameter sniffing.


    To implement PSP optimization, we have built new concepts in the query processor
    for query plans. A `dispatcher` query plan is a parent query plan for a `parameterized`
    SQL statement and is stored in the `plan cache`. A parameterized statement can
    be in a stored procedure, parameterized by an application, or even auto-parameterized
    by the SQL Server engine. You can read more about parametrization at [`https://docs.microsoft.com/sql/relational-databases/performance/parameter-sensitivity-plan-optimization?#understanding-parameterization`](https://docs.microsoft.com/sql/relational-databases/performance/parameter-sensitivity-plan-optimization?#understanding-parameterization).


    A dispatcher plan itself is not used for execution. Rather, a dispatcher plan
    can have more than one `variant` plan. Variant plans are created based on buckets
    or ranges of values for `predicates` or filters used in parameterized queries.
    Figure [5-4](#525217_1_En_5_Chapter.xhtml#Fig4) shows a visual of how dispatchers
    and variants work.


    ![](Images/525217_1_En_5_Fig4_HTML.png)


    A chart of how a dispatcher and variant work. Parameterized query leads to dispatcher
    plan. The dispatcher plan leads to query variant agents with less than 10 k listings,
    query variant agents with greater than 10 k to 1 M listings, query variant agents
    greater than or equal to 1 k listings, and so on.


    Figure 5-4


    Dispatcher and query variants with PSP optimization


    In this figure you can see there are three variants, each for a query that covers
    a certain “range” (i.e., bucket) of values that match a predicate or filter. What
    is interesting about this concept is that it can also help resolve some of the
    `memory grant` issues I discussed in Chapter [4](#525217_1_En_4_Chapter.xhtml).
    This is because each variant plan is “its own plan” in the `plan cache` and can
    contain a different memory grant even if two variants use a similar `plan shape`
    (e.g., an index scan).


    Note


    Figure [5-4](#525217_1_En_5_Chapter.xhtml#Fig4) is a diagram showing the concepts
    of a dispatcher and variants. The design of how many variants or buckets we can
    use for a dispatcher is internal and not documented.


    When a query is first compiled, the query processor can identify a parameterized
    statement to see if it is eligible for a dispatcher and query variants. The first
    execution will result in a dispatcher and variant. If the same statement is executed
    with a different parameter that falls into another bucket, a new variant plan
    can be compiled and stored into cache.


    The dispatcher and variant plans are not persisted. They exist only in the plan
    cache but can be rebuilt on new compilation as needed. Variant plans can be recompiled
    as needed on their own.


    Let’s look back at the visual scenario earlier in this section showing a PSP problem.
    In that same scenario, if `dbcompat 160` was enabled, the story now looks like
    Figure [5-5](#525217_1_En_5_Chapter.xhtml#Fig5).


    ![](Images/525217_1_En_5_Fig5_HTML.jpg)


    A schematic diagram of P S P optimization that allows more than one plan in cache.
    The diagram is as follows. `Exec my proc 1` rightward arrow seek, and `exec my
    proc 10` rightward arrow scan.


    Figure 5-5


    PSP optimization allows for more than one plan in cache


    With no code changes, the optimizer can use variants to have more than one plan
    in cache for a stored procedure or parameterized statement. There is no better
    way to learn more about how PSP optimization works than to try it out.


    ### Let’s See PSP Optimization in Action


    There is a long set of steps for this exercise, but I think you will find it worth
    it.


    #### Prerequisites


    To go through this exercise, you will need the following prerequisites:


    *   `SQL Server 2022 Evaluation Edition`.


    *   Virtual machine or computer with minimum of two CPUs with 8Gb RAM.


    *   `SQL Server Management Studio (SSMS)`. The latest 18.x or 19.x build will
    work.


    *   Download `ostress.exe` from [`https://aka.ms/ostress`](https://aka.ms/ostress).
    Install using the `RMLSetup.msi` file that is downloaded. Use all defaults. Only
    download this tool on Windows systems. Part of the following exercise will only
    work on Windows systems.


    *   A copy of the scripts from the GitHub repo of this book from the `ch05_builtinqueryintelligence_getsbetter\pspopt`
    directory.'
