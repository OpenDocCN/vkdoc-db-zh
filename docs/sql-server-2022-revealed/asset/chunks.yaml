  raw: "The concept of the feedback system was to evaluate how memory was *actually\
    \ used* compared with the initial memory grant at the start of execution. On the\
    \ next execution, if the memory used was significantly higher than the initial\
    \ grant, the memory grant would be increased. If memory used was lower, the grant\
    \ would be decreased.\n\nSQL Server effectively *learns* from previous executions\
    \ to make future executions more efficient. This innovation for me personally\
    \ was groundbreaking. All those support cases over the years where customers struggled\
    \ with spills or blocking problems could be solved automatically by the engine.\n\
    \nHowever, we discovered two areas of improvement from what we shipped in SQL\
    \ Server 2017 and 2019:\n\n*   **Volatility**\n\n*   We baked into the initial\
    \ design the ability to disable memory grant feedback if we discovered we were\
    \ constantly having to adjust the memory grant for the same query over time. Parameter-Sensitive\
    \ Plans (PSPs) are a notable example of this type of scenario. You could see if\
    \ we needed to disable memory grant feedback by looking at the **IsMemoryGrantFeedbackAdjusted**\
    \ attribute in the query plan and discovering a value of **No: Feedback disabled**.\n\
    \n*   **Persistence**\n\n*   The feedback system works for most workloads but\
    \ unfortunately is not persisted to disk. Therefore, if the server is restarted\
    \ or the query plan is evicted from cache, all feedback is lost.\n\n### Memory\
    \ Grant Percentiles\n\nTo improve the volatility problem with the initial design,\
    \ memory grant feedback in SQL Server 2022 uses a percentile-based approach instead\
    \ of disabling memory grant feedback. Rather than using the previous used memory\
    \ from query execution, we consider a history of previous memory used to adjust\
    \ a memory grant that is applicable across many query executions.\n\nThis approach\
    \ favors avoiding spills, so it is possible that more memory may be granted than\
    \ is required. If we use this approach for memory grants, you can observe this\
    \ in the **IsMemoryGrantFeedbackAdjusted** attribute in the query plan with a\
    \ value of **Yes: Percentile Adjusting**.\n\nThis behavior is on by default for\
    \ SQL Server 2022 if you are using dbcompat 140 or greater. If you want to disable\
    \ this feature, set the database-scoped configuration option **MEMORY_GRANT_FEEDBACK_PERCENTILE**\
    \ to OFF.\n\n### Memory Grant Feedback Persistence\n\nIf you are using dbcompat\
    \ 140 or greater with SQL Server 2022 and Query Store is enabled for READ_WRITE,\
    \ we will persist memory grant feedback details to Query Store. This allows any\
    \ memory grant feedback to survive server restart or plan cache eviction.\n\n\
    What better way to learn than through an exercise? I’m all about efficiency, so\
    \ I’ll reuse the example for memory grant feedback I introduced in *SQL Server\
    \ 2019 Revealed* in Chapter [2](#525217_1_En_2_Chapter.xhtml) with a few additions.\n\
    \nA quick comment about this example before you go through it: I’m inducing the\
    \ conditions where memory grant feedback is needed by forcing a hash join on a\
    \ query and simulating cardinality problems. But the innovation here is real.\
    \ This capability is solving real-world problems faced by applications every day\
    \ that are not worried about whether a hash join is used by the query processor\
    \ or don’t even know what a memory grant is. That is the intention of IQP. Just\
    \ make it work!\n\n#### Prerequisites\n\nThe prerequisites for using this example\
    \ are as follows:\n\n*   SQL Server 2022 Evaluation Edition.\n\n*   Virtual machine\
    \ or computer with minimum of two CPUs with 8Gb RAM.\n\n*   SQL Server Management\
    \ Studio (SSMS). The latest 18.x or 19.x build will work.\n\n*   A copy of the\
    \ scripts from the GitHub repo of this book from the **ch4_builtinqueryintelligence\\\
    persistedmgf** directory.\n\n#### Follow These Steps for the Exercise\n\nFollow\
    \ these steps to see memory grant feedback with persistence on SQL Server 2022:\n\
    \n![](Images/525217_1_En_4_Fig3_HTML.jpg)\n\nA flowchart of the query plan. The\
    \ flow starts with table scan and clustered index scan, and goes through hash\
    \ match to end with the select cost of 0%.\n\nFigure 4-3\n\nQuery plan with spill\n\
    \n1.  Download the **WideWorldImportersDW** database backup from [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak).\
    \ The restore script in the next steps assumes the backup is located in **c:\\\
    sql_sample_databases**. There is a customized backup available with extended data\
    \ preloaded you can use at [`https://github.com/microsoft/sqlworkshops-sql2022workshop/releases`](https://github.com/microsoft/sqlworkshops-sql2022workshop/releases).\n\
    \n2.  Restore this database to your SQL Server 2022 instance. Execute the script\
    \ **restorewwidw.sql**. You may need to change the directory paths for the location\
    \ of your backup and where you will restore the database files. This script runs\
    \ the following T-SQL statements:\n\n```\n    USE master;\n    GO\n    DROP DATABASE\
    \ IF EXISTS WideWorldImportersDW;\n    GO\n    RESTORE DATABASE WideWorldImportersDW\
    \ FROM DISK = 'c:\\sql_sample_databases\\wideworldimportersdw-full.bak'\n    WITH\
    \ MOVE 'wwi_primary' TO 'c:\\sql_sample_databases\\wideworldimportersdw.mdf',\n\
    \    MOVE 'wwi_userdata' TO 'c:\\sql_sample_databases\\wideworldimportersdw_userdata.ndf',\n\
    \    MOVE 'wwi_log' TO 'c:\\sql_sample_databases\\wideworldimportersdw.ldf',\n\
    \    MOVE 'wwidw_inmemory_data_1' TO 'c:\\sql_sample_databases\\wideworldimportersdw_inmemory_data'\n\
    \    GO\n    ```\n\n3.  In order to run some of the examples, you will need a\
    \ larger table than what exists by default in WideWorldImportersDW that does not\
    \ have a columnstore index. Therefore, execute the script **extendwwidw.sql**\
    \ to create a larger table. Extending this database will increase its size, including\
    \ the transaction log, to about 8Gb overall. This script runs the following T-SQL\
    \ statements:"
  trans: "\n反馈系统的核心理念在于评估内存的实际使用情况，并与执行开始时分配的初始内存授予进行对比。在下一次执行时，如果实际使用的内存显著高于初始授予量，则会增加内存授予。如果实际使用的内存较低，则会减少授予量。\n\
    \nSQL Server 能够有效地从之前的执行中学习，使未来的执行更加高效。对我个人而言，这项创新具有开创性意义。多年来那些让客户困扰于内存溢出或阻塞问题的支持案例，现在都可以由引擎自动解决了。\n\
    \n然而，我们从 SQL Server 2017 和 2019 中发现并改进了两个方面：\n\n*   **易变性**\n    我们在初始设计中内置了一项能力：如果我们发现针对同一查询需要持续调整内存授予，则会禁用内存授予反馈。参数敏感型计划就是这类场景的一个显著例子。你可以通过查看查询计划中的\
    \ `IsMemoryGrantFeedbackAdjusted` 属性并发现值为 `No: Feedback disabled`，来判断我们是否需要禁用内存授予反馈。\n\
    \n*   **持久性**\n    该反馈系统适用于大多数工作负载，但遗憾的是，它无法持久化到磁盘。因此，如果服务器重启或查询计划被逐出缓存，所有反馈信息都将丢失。\n\
    \n### 内存授予百分位数\n\n为了改进初始设计的易变性问题，SQL Server 2022 中的内存授予反馈采用了基于百分位数的方法，而不是直接禁用内存授予反馈。我们不再仅使用查询执行中上一次的已用内存量，而是考虑一系列历史内存使用情况，来调整一个适用于多次查询执行的内存授予量。\n\
    \n这种方法倾向于避免溢出，因此有可能授予比实际需求更多的内存。如果我们对内存授予使用这种方法，你可以在查询计划的 `IsMemoryGrantFeedbackAdjusted`\
    \ 属性中观察到值为 `Yes: Percentile Adjusting`。\n\n在 SQL Server 2022 中，如果你使用数据库兼容性级别 140\
    \ 或更高版本，默认启用此行为。如果你想禁用此功能，请将数据库作用域配置选项 `MEMORY_GRANT_FEEDBACK_PERCENTILE` 设置为\
    \ OFF。\n\n### 内存授予反馈持久化\n\n如果你在 SQL Server 2022 中使用数据库兼容性级别 140 或更高版本，并且为查询存储启用了\
    \ READ_WRITE 模式，我们将把内存授予反馈的详细信息持久化到查询存储中。这使得任何内存授予反馈都能在服务器重启或计划缓存被逐出后仍然保留。\n\n\
    还有什么比通过练习来学习更好的方式呢？我一向追求效率，所以我将重用我在 *SQL Server 2019 Revealed* 第 2 章中介绍的内存授予反馈示例，并稍作补充。\n\
    \n在你开始这个练习之前，我想快速说明一下：我通过强制查询使用哈希联接并模拟基数问题，来引发需要内存授予反馈的条件。但这里的创新是真实存在的。这项功能正在解决应用程序日常面临的真实世界问题，这些应用程序并不关心查询处理器是否使用了哈希联接，甚至不知道什么是内存授予。这正是智能查询处理的初衷。就是让它能用起来！\n\
    \n#### 先决条件\n\n使用此示例的先决条件如下：\n\n*   SQL Server 2022 评估版。\n*   虚拟机或计算机，至少配备两个 CPU\
    \ 和 8GB 内存。\n*   SQL Server Management Studio。最新的 18.x 或 19.x 版本均可。\n*   本书 GitHub\
    \ 仓库中 `ch4_builtinqueryintelligence\\persistedmgf` 目录下的脚本副本。\n\n#### 按照以下步骤进行练习\n\
    \n请按照以下步骤在 SQL Server 2022 上查看具有持久化功能的内存授予反馈：\n\n![](img/525217_1_En_4_Fig3_HTML.jpg)\n\
    \n一个查询计划流程图。流程从表扫描和聚集索引扫描开始，经过哈希匹配，最终以 0% 的选择成本结束。\n\n图 4-3：存在溢出的查询计划\n\n1.  从\
    \ [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)\
    \ 下载 `WideWorldImportersDW` 数据库备份文件。后续步骤中的还原脚本假设备份文件位于 `c:\\sql_sample_databases`。你可以在\
    \ [`https://github.com/microsoft/sqlworkshops-sql2022workshop/releases`](https://github.com/microsoft/sqlworkshops-sql2022workshop/releases)\
    \ 找到预加载了扩展数据的自定义备份。\n\n2.  将此数据库还原到你的 SQL Server 2022 实例。执行脚本 `restorewwidw.sql`。你可能需要根据你的备份文件位置和数据库文件还原目标位置更改目录路径。此脚本运行以下\
    \ T-SQL 语句：\n\n    ```sql\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS\
    \ WideWorldImportersDW;\n    GO\n    RESTORE DATABASE WideWorldImportersDW FROM\
    \ DISK = 'c:\\sql_sample_databases\\wideworldimportersdw-full.bak'\n    WITH MOVE\
    \ 'wwi_primary' TO 'c:\\sql_sample_databases\\wideworldimportersdw.mdf',\n   \
    \ MOVE 'wwi_userdata' TO 'c:\\sql_sample_databases\\wideworldimportersdw_userdata.ndf',\n\
    \    MOVE 'wwi_log' TO 'c:\\sql_sample_databases\\wideworldimportersdw.ldf',\n\
    \    MOVE 'wwidw_inmemory_data_1' TO 'c:\\sql_sample_databases\\wideworldimportersdw_inmemory_data'\n\
    \    GO\n    ```\n\n3.  为了运行部分示例，你需要一个比 WideWorldImportersDW 默认表更大的、且没有列存储索引的表。因此，请执行脚本\
    \ `extendwwidw.sql` 来创建一个更大的表。扩展此数据库会将其大小（包括事务日志）增加到总共约 8GB。此脚本运行以下 T-SQL 语句：\n"
- fmt: '# 内存授予反馈演示


    以下脚本将在 `WideWorldImportersDW` 数据库中创建 `Fact.OrderHistory` 表，并用数据填充它。


    ```

    USE WideWorldImportersDW;

    GO

    -- Build a new rowmode table called OrderHistory based off of Orders

    --

    DROP TABLE IF EXISTS Fact.OrderHistory;

    GO

    SELECT ''Buliding OrderHistory from Orders...''

    GO

    SELECT [Order Key], [City Key], [Customer Key], [Stock Item Key], [Order Date
    Key], [Picked Date Key], [Salesperson Key], [Picker Key], [WWI Order ID], [WWI
    Backorder ID], Description, Package, Quantity, [Unit Price], [Tax Rate], [Total
    Excluding Tax], [Tax Amount], [Total Including Tax], [Lineage Key]

    INTO Fact.OrderHistory

    FROM Fact.[Order];

    GO

    ALTER TABLE Fact.OrderHistory

    ADD CONSTRAINT PK_Fact_OrderHistory PRIMARY KEY NONCLUSTERED([Order Key] ASC,
    [Order Date Key] ASC)WITH(DATA_COMPRESSION=PAGE);

    GO

    CREATE INDEX IX_Stock_Item_Key

    ON Fact.OrderHistory([Stock Item Key])

    INCLUDE(Quantity)

    WITH(DATA_COMPRESSION=PAGE);

    GO

    CREATE INDEX IX_OrderHistory_Quantity

    ON Fact.OrderHistory([Quantity])

    INCLUDE([Order Key])

    WITH(DATA_COMPRESSION=PAGE);

    GO

    -- Table should have 231,412 rows

    SELECT ''Number of rows in Fact.OrderHistory = '', COUNT(*) FROM Fact.OrderHistory;

    GO

    SELECT ''Increasing number of rows for OrderHistory...'';

    GO

    -- Make the table bigger

    INSERT Fact.OrderHistory([City Key], [Customer Key], [Stock Item Key], [Order
    Date Key], [Picked Date Key], [Salesperson Key], [Picker Key], [WWI Order ID],
    [WWI Backorder ID], Description, Package, Quantity, [Unit Price], [Tax Rate],
    [Total Excluding Tax], [Tax Amount], [Total Including Tax], [Lineage Key])

    SELECT [City Key], [Customer Key], [Stock Item Key], [Order Date Key], [Picked
    Date Key], [Salesperson Key], [Picker Key], [WWI Order ID], [WWI Backorder ID],
    Description, Package, Quantity, [Unit Price], [Tax Rate], [Total Excluding Tax],
    [Tax Amount], [Total Including Tax], [Lineage Key]

    FROM Fact.OrderHistory;

    GO 4

    -- Table should have 3,702,592 rows

    SELECT ''Number of rows in Fact.OrderHistory = '', COUNT(*) FROM Fact.OrderHistory;

    GO

    ```


    ## 4. 设置演示环境


    通过执行脚本 `setup.sql` 来设置演示环境。此脚本运行以下 T-SQL 语句：


    ```

    USE [WideWorldImportersDW];

    GO

    ALTER DATABASE [WideWorldImportersDW] SET COMPATIBILITY_LEVEL = 150;

    GO

    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;

    GO

    ALTER DATABASE WideWorldImportersDW SET QUERY_STORE CLEAR ALL;

    GO

    ```


    此脚本将 `dbcompat` 设置为 150，以允许启用针对行模式的内存授予反馈。此数据库已启用查询存储，因此我们只需清除过程缓存（以确保获得新的编译）和查询存储统计信息，以便我们只关注此查询。


    ## 5. 模拟不准确的基数估计


    为了轻松模拟由于基数不准确导致内存授予不准确的问题，请执行脚本 `set_stats.sql`。此脚本执行以下 T-SQL 语句：


    ```

    USE WideWorldImportersDW;

    GO

    UPDATE STATISTICS Fact.OrderHistory

    WITH ROWCOUNT = 1000;

    GO

    ```


    ## 6. 执行查询并捕获执行计划


    在 SSMS 的查询编辑器中，选择 **Query** > **Include Actual Execution Plan**（也可以使用 `Ctrl+M`
    启用）。然后执行脚本 `execute_query.sql`，该脚本大约需要 30 秒才能完成（此示例中行结果无关紧要）。此脚本执行以下 T-SQL 语句：


    ```

    USE WideWorldImportersDW;

    GO

    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]

    FROM  Fact.OrderHistory AS fo

    INNER HASH JOIN Dimension.[Stock Item] AS si

    ON fo.[Stock Item Key] = si.[Stock Item Key]

    WHERE fo.[Lineage Key] = 9

    AND si.[Lead Time Days] > 19;

    GO

    ```


    ## 7. 分析第一次执行的执行计划


    从结果窗口中选择 **Execution Plan** 选项卡。你将看到一个图形化的执行计划输出，类似于图 [4-3](#525217_1_En_4_Chapter.xhtml#Fig3)。


    请注意 Hash Match 运算符顶部的黄色警告。如果将光标悬停在此运算符上，可以看到一个关于溢出到 `tempdb` 的警告，类似于图 [4-4](#525217_1_En_4_Chapter.xhtml#Fig4)。


    ![](Images/525217_1_En_4_Fig4_HTML.png)


    *图 4-4：查询计划中的溢出警告*


    你可以看到哈希联接需要大约 426MB（`52024*8192`）的内存，而原始授予仅为约 1.4MB。


    ![](Images/525217_1_En_4_Fig5_HTML.png)


    *图 4-5：导致溢出的内存授予*


    1.  如果将光标悬停在 `SELECT` 运算符上，可以确认内存授予约为 1.4MB，如图 [4-5](#525217_1_En_4_Chapter.xhtml#Fig5)
    所示。


    如果右键单击 `SELECT` 运算符并选择 **Properties**，可以展开 `MemoryGrantInfo` 属性，如图 [4-6](#525217_1_En_4_Chapter.xhtml#Fig6)
    所示。


    ![](Images/525217_1_En_4_Fig6_HTML.jpg)


    *图 4-6：首次执行时的内存授予反馈*


    `IsMemoryGrantFeedbackAdjusted = NoFirstExecution` 意味着查询是首次执行，因此没有发生反馈调整。请注意，`MaxUsedMemory`
    值并未反映溢出到 `tempdb` 的页面。


    ## 8. 检查内存授予反馈


    1.  由于我们使用的是 SQL Server 2022，在此查询执行后，反馈会存储在查询存储中。你可以通过执行脚本 `get_plan_feedback.sql`
    来查看此反馈。此脚本执行以下 T-SQL 语句：


    ```

    USE WideWorldImportersDW;

    GO

    SELECT qpf.feature_desc, qpf.feedback_data, qpf.state_desc, qt.query_sql_text,
    (qrs.last_query_max_used_memory * 8192)/1024 as last_query_memory_kb

    FROM sys.query_store_plan_feedback qpf

    JOIN sys.query_store_plan qp

    ON qpf.plan_id = qp.plan_id

    JOIN sys.query_store_query qq

    ON qp.query_id = qq.query_id

    JOIN sys.query_store_query_text qt

    ON qq.query_text_id = qt.query_text_id

    JOIN sys.query_store_runtime_stats qrs

    ON qp.plan_id = qrs.plan_id;

    GO

    ```


    你的结果应类似于以下内容（我将结果垂直翻转，以便你可以看到每列对应的内容）：


    ```

    feature_desc      Memory Grant Feedback

    feedback_data

    [{"NodeId":"0","AdditionalMemoryKB":"624504"}]

    state_desc        FEEDBACK_VALID

    query_sql_text

    SELECT fo.[Order Key], fo.Description, si.[Lead Time Days]  FROM  Fact.OrderHistory
    AS fo  INNER HASH JOIN Dimension.[Stock Item] AS si   ON fo.[Stock Item Key] =
    si.[Stock Item Key]  WHERE fo.[Lineage Key] = 9  AND si.[Lead Time Days] > 19

    last_query_memory_kb      1424

    ```


    `feedback_data` 列显示了下一次执行同一查询时将使用的新内存授予，根据第一次执行的 `tempdb` 溢出情况，这应该是足够的。


    ## 9. 再次执行查询验证反馈


    再次执行 `execute_query.sql` 脚本。你应该看到查询现在只需几秒钟即可完成。


    如果查看图形化查询计划，你会注意到哈希联接运算符没有警告。如果将光标悬停在 `SELECT` 运算符上，你应该会看到类似于图 [4-7](#525217_1_En_4_Chapter.xhtml#Fig7)
    的内存授予。


    ![](Images/525217_1_En_4_Fig7_HTML.jpg)


    *图 4-7：反馈后的内存授予*


    如果右键单击 `SELECT` 运算符并选择 **Properties**，你可以展开 `MemoryGrantInfo` 并查看类似于图 [4-8](#525217_1_En_4_Chapter.xhtml#Fig8)
    的详细信息。


    ![](Images/525217_1_En_4_Fig8_HTML.jpg)'
