    Server 2022 现在支持为 PFX 创建证书。PFX 或 PKCS#12 是一种现代的证书格式，SQL Server 现在支持使用 PFX 文件，通过
    `CREATE CERTIFICATE` 语句在 SQL Server 中创建证书。您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql)
    阅读更多关于如何使用 PFX 文件创建证书的信息。


    加密方面的最后一项增强是支持将密钥备份和还原到 Azure Blob Storage 或从其还原。数据库主密钥通常用于保护凭证，例如用于外部数据源的凭证。但您经常需要将此密钥与数据库分开备份。SQL
    Server 2022 现在允许您将这些密钥之一备份或还原到 Azure Blob Storage 或从其还原，而不是备份或还原到本地或网络文件路径。您可以在
    [`https://docs.microsoft.com/sql/t-sql/statements/backup-master-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-master-key-transact-sql)
    阅读如何使用新的 URL 语法。对称密钥 (`SYMMETRIC keys`) 也存在相同的支持，您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/backup-symmetric-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-symmetric-key-transact-sql)
    阅读相关信息。'
- fmt: "#### Strict Connected Encryption\n\nThe Tabular Data Stream (TDS) is the `data\
    \ protocol` used for applications to connect to and transfer data to and from\
    \ SQL Server. TDS has been around for as long as SQL Server has been a product.\
    \ As time has gone by, TDS has been enhanced and changed using a version numbering\
    \ system. Typically, as new versions of TDS were released, applications would\
    \ need to use a provider or driver to support it. Microsoft changed the major\
    \ version of TDS to 7.0 when SQL Server 7.0 was released in 1998. Since then,\
    \ minor version changes have come with the latest, TDS 7.4, supporting SQL Server\
    \ 2012 and later. Users, admins, and developers don’t need to know the details\
    \ of the TDS protocol, just the features it supports with changes or the need\
    \ to use updated drivers. As a support engineer for many years at Microsoft, I\
    \ often needed the details of TDS to solve complex customer problems. You can\
    \ read all the details yourself at [`https://docs.microsoft.com/openspecs/windows_protocols/ms-tds/b46a581a-39de-4745-b076-ec4dbb7d13ec`](https://docs.microsoft.com/openspecs/windows_protocols/ms-tds/b46a581a-39de-4745-b076-ec4dbb7d13ec).\n\
    \nSQL Server 2022 introduces a new major version of TDS, TDS 8.0. Drivers and\
    \ providers using TDS 7.4 are still fully supported. New drivers understand TDS\
    \ 8.0 and can use this protocol. The main reason behind this new version is connecting\
    \ encryption. SQL Server has supported encryption of the communication between\
    \ an application and SQL Server for years. Like many applications, SQL Server\
    \ uses Transport Layer Security (TLS) to implement communication encryption. SQL\
    \ Server has always allowed applications to make decisions on whether they want\
    \ to encrypt communications with SQL Server using connection string options called\
    \ `Encrypt` and `TrustServerCertificate`. You also have the ability on the server\
    \ side to force encryption for client connections. The combination of these two\
    \ connection strings is significant, and you can read more details at [`https://docs.microsoft.com/dotnet/framework/data/adonet/connection-string-syntax#using-trustservercertificate`](https://docs.microsoft.com/dotnet/framework/data/adonet/connection-string-syntax#using-trustservercertificate).\n\
    \nTDS 8.0 introduces the concept of `strict connection` encryption. If an application\
    \ uses a value of `Encrypt = strict`, then the TDS 8.0 protocol is enabled. One\
    \ of the significant changes here is that if strict connection encryption is used,\
    \ then the communication between the client and SQL Server **must** be encrypted\
    \ (hence the term `strict`). The other significance is how TDS 8.0 handles connection\
    \ encryption. Prior to TDS 8.0, SQL Server would perform a handshake or prelogin\
    \ with the client that was not encrypted. Now with TDS 8.0, that handshake is\
    \ completely encrypted with TLS. This works with all TLS versions. This is very\
    \ significant because it aligns with the standards of protocols like HTTPS and\
    \ allows network appliances to safely pass through SQL communication. The latest\
    \ providers are required to be able to use TDS 8.0. You can learn more at [`https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3#strict-connection-encryption`](https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3#strict-connection-encryption).\n\
    \nIn addition, but independent of TDS 8.0, SQL Server 2022 now supports the latest\
    \ version of TLS 1.3. TLS 1.3 is the most secure TLS version. You can read more\
    \ about differences between TLS 1.2 and 1.3 at [`https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3?#differences-between-tls-12-and-tls-13`](https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3?#differences-between-tls-12-and-tls-13).\n\
    \nNote\n\nWe are also looking into ways to enforce this option at the server level\
    \ when the product becomes generally available.\n\n### Security Permission Enhancements\n\
    \nIn SQL Server 2022 we also have introduced some enhancements for authorization\
    \ or permission scenarios. This includes new fixed server-level roles and a new\
    \ permission for dynamic data masking.\n\n#### New Fixed Server-Level Roles\n\n\
    Up until SQL Server 2022, the product came with a certain set of `fixed` server-level\
    \ roles. They are fixed because you cannot change the access level or definition\
    \ of the role. They are server-level because they apply to the entire SQL Server\
    \ instance, not just a single database.\n\nYou are probably familiar with some\
    \ of these like `sysadmin`, `securityadmin`, `dbcreator`, and `public`. You can\
    \ view the complete list of these roles at [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles).\n\
    \nOne request we have seen from customers for some time is for `more granularity`\
    \ of roles we provide with the product – in other words, more fixed roles that\
    \ have fewer privileges for specific tasks. My colleague at Microsoft, Andreas\
    \ Wolter, wrote an interesting blog on the topic of `least privilege` at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/security-the-principle-of-least-privilege-polp/ba-p/2067390`](https://techcommunity.microsoft.com/t5/azure-sql-blog/security-the-principle-of-least-privilege-polp/ba-p/2067390).\n\
    \nSQL Server 2022 now provides built-in new fixed server-level roles that follow\
    \ this principle. You can see the complete list at [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles?#fixed-server-level-roles-introduced-in-sql-server-2022`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles?#fixed-server-level-roles-introduced-in-sql-server-2022).\n\
    \nI picked out a few I found interesting:\n\n*   `##MS_DefinitionReader##`\n \
    \   *   A member of this role is granted permissions to view catalog views that\
    \ require the `VIEW ANY DEFINITION` or `VIEW DEFINITION` permission with a database\
    \ (assuming they have a user account in the database). It is a great way to give\
    \ someone the right to “view” important information about a server or database\
    \ without allowing them to make changes.\n\n*   `##MS_ServerStateReader##`\n \
    \   *   A member of this role is granted permissions to view Dynamic Management\
    \ Views (DMVs) or functions that require the `VIEW SERVER STATE` or `VIEW DATABASE`\
    \ state within a database (assuming they have a user account within the database).\n\
    \n*   `##MS_ServerPerformanceStateReader##`\n    *   This is similar to the previous\
    \ fixed role but is more focused on viewing specific performance information from\
    \ Dynamic Management Views (DMVs). Users in this fixed role are granted the same\
    \ permission as objects that require the `VIEW SERVER PERFORMANCE STATE` permission.\n\
    \nImagine a situation where you want to hire a consultant to come in and view\
    \ important information about the system and database to provide you with an analysis.\
    \ You don’t want to give access to any user data for privacy reasons, nor do you\
    \ want to allow them to make changes. Adding them as members to these two roles\
    \ could help you achieve this, whereas before you would have to use a fixed server-level\
    \ role that had more privileges than necessary or set up custom permissions to\
    \ their account for the instance and in all databases for which you need their\
    \ consultation.\n\nYou will also love that SSMS 19 has been enhanced to support\
    \ these new fixed server-level roles as you can see in Figure 6-4.\n\n![A screenshot\
    \ of a folder titled server roles. It contains 19 files under it.](Images/525217_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4 SQL Server 2022 fixed server-level roles"
  raw: '#### Strict Connected Encryption


    The Tabular Data Stream (TDS) is the *data protocol* used for applications to
    connect to and transfer data to and from SQL Server. TDS has been around for as
    long as SQL Server has been a product. As time has gone by, TDS has been enhanced
    and changed using a version numbering system. Typically, as new versions of TDS
    were released, applications would need to use a provider or driver to support
    it. Microsoft changed the major version of TDS to 7.0 when SQL Server 7.0 was
    released in 1998\. Since then, minor version changes have come with the latest,
    TDS 7.4, supporting SQL Server 2012 and later. Users, admins, and developers don’t
    need to know the details of the TDS protocol, just the features it supports with
    changes or the need to use updated drivers. As a support engineer for many years
    at Microsoft, I often needed the details of TDS to solve complex customer problems.
    You can read all the details yourself at [`https://docs.microsoft.com/openspecs/windows_protocols/ms-tds/b46a581a-39de-4745-b076-ec4dbb7d13ec`](https://docs.microsoft.com/openspecs/windows_protocols/ms-tds/b46a581a-39de-4745-b076-ec4dbb7d13ec).


    SQL Server 2022 introduces a new major version of TDS, TDS 8.0. Drivers and providers
    using TDS 7.4 are still fully supported. New drivers understand TDS 8.0 and can
    use this protocol. The main reason behind this new version is connecting encryption.
    SQL Server has supported encryption of the communication between an application
    and SQL Server for years. Like many applications, SQL Server uses Transport Layer
    Security (TLS) to implement communication encryption. SQL Server has always allowed
    applications to make decisions on whether they want to encrypt communications
    with SQL Server using connection string options called **Encrypt** and **TrustServerCertificate**.
    You also have the ability on the server side to force encryption for client connections.
    The combination of these two connection strings is significant, and you can read
    more details at [`https://docs.microsoft.com/dotnet/framework/data/adonet/connection-string-syntax#using-trustservercertificate`](https://docs.microsoft.com/dotnet/framework/data/adonet/connection-string-syntax#using-trustservercertificate).


    TDS 8.0 introduces the concept of **strict connection** encryption. If an application
    uses a value of **Encrypt = strict**, then the TDS 8.0 protocol is enabled. One
    of the significant changes here is that if strict connection encryption is used,
    then the communication between the client and SQL Server **must** be encrypted
    (hence the term *strict*). The other significance is how TDS 8.0 handles connection
    encryption. Prior to TDS 8.0, SQL Server would perform a handshake or prelogin
    with the client that was not encrypted. Now with TDS 8.0, that handshake is completely
    encrypted with TLS. This works with all TLS versions. This is very significant
    because it aligns with the standards of protocols like HTTPS and allows network
    appliances to safely pass through SQL communication. The latest providers are
    required to be able to use TDS 8.0\. You can learn more at [`https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3#strict-connection-encryption`](https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3#strict-connection-encryption).


    In addition, but independent of TDS 8.0, SQL Server 2022 now supports the latest
    version of TLS 1.3\. TLS 1.3 is the most secure TLS version. You can read more
    about differences between TLS 1.2 and 1.3 at [`https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3?#differences-between-tls-12-and-tls-13`](https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3?#differences-between-tls-12-and-tls-13).


    Note


    We are also looking into ways to enforce this option at the server level when
    the product becomes generally available.


    ### Security Permission Enhancements


    In SQL Server 2022 we also have introduced some enhancements for authorization
    or permission scenarios. This includes new fixed server-level roles and a new
    permission for dynamic data masking.


    #### New Fixed Server-Level Roles


    Up until SQL Server 2022, the product came with a certain set of *fixed* server-level
    roles. They are fixed because you cannot change the access level or definition
    of the role. They are server-level because they apply to the entire SQL Server
    instance, not just a single database.


    You are probably familiar with some of these like **sysadmin**, **securityadmin**,
    **dbcreator**, and **public**. You can view the complete list of these roles at
    [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles).


    One request we have seen from customers for some time is for *more granularity*
    of roles we provide with the product – in other words, more fixed roles that have
    fewer privileges for specific tasks. My colleague at Microsoft, Andreas Wolter,
    wrote an interesting blog on the topic of *least privilege* at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/security-the-principle-of-least-privilege-polp/ba-p/2067390`](https://techcommunity.microsoft.com/t5/azure-sql-blog/security-the-principle-of-least-privilege-polp/ba-p/2067390).


    SQL Server 2022 now provides built-in new fixed server-level roles that follow
    this principle. You can see the complete list at [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles?#fixed-server-level-roles-introduced-in-sql-server-2022`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles?#fixed-server-level-roles-introduced-in-sql-server-2022).


    I picked out a few I found interesting:


    *   **##MS_DefinitionReader##**


    *   A member of this role is granted permissions to view catalog views that require
    the VIEW ANY DEFINITION or VIEW DEFINITION permission with a database (assuming
    they have a user account in the database). It is a great way to give someone the
    right to “view” important information about a server or database without allowing
    them to make changes.


    *   **##MS_ServerStateReader##**


    *   A member of this role is granted permissions to view Dynamic Management Views
    (DMVs) or functions that require the VIEW SERVER STATE or VIEW DATABASE state
    within a database (assuming they have a user account within the database).


    *   **##MS_ServerPerformanceStateReader##**


    *   This is similar to the previous fixed role but is more focused on viewing
    specific performance information from Dynamic Management Views (DMVs). Users in
    this fixed role are granted the same permission as objects that require the VIEW
    SERVER PERFORMANCE STATE permission.


    Imagine a situation where you want to hire a consultant to come in and view important
    information about the system and database to provide you with an analysis. You
    don’t want to give access to any user data for privacy reasons, nor do you want
    to allow them to make changes. Adding them as members to these two roles could
    help you achieve this, whereas before you would have to use a fixed server-level
    role that had more privileges than necessary or set up custom permissions to their
    account for the instance and in all databases for which you need their consultation.


    You will also love that SSMS 19 has been enhanced to support these new fixed server-level
    roles as you can see in Figure [6-4](#525217_1_En_6_Chapter.xhtml#Fig4).


    ![](Images/525217_1_En_6_Fig4_HTML.jpg)


    A screenshot of a folder titled server roles. It contains 19 files under it.


    Figure 6-4


    SQL Server 2022 fixed server-level roles'
  trans: "\n#### 严格连接加密\n\n表格数据流（TDS）是应用程序连接 SQL Server 并进行数据传输所使用的 `数据协议`。自 SQL Server\
    \ 成为产品以来，TDS 便已存在。随着时间的推移，TDS 通过版本号系统不断得到增强和修改。通常，随着新版本 TDS 的发布，应用程序需要使用相应的提供程序或驱动程序来支持它。微软在\
    \ 1998 年发布 SQL Server 7.0 时，将 TDS 的主版本号更改为 7.0。此后，次版本号也随之更新，最新的 TDS 7.4 支持 SQL\
    \ Server 2012 及更高版本。用户、管理员和开发人员无需了解 TDS 协议的细节，只需了解其功能变化或需要使用更新的驱动程序即可。我曾在微软担任多年的支持工程师，为了解决复杂的客户问题，我经常需要\
    \ TDS 的详细信息。您可以在 [`https://docs.microsoft.com/openspecs/windows_protocols/ms-tds/b46a581a-39de-4745-b076-ec4dbb7d13ec`](https://docs.microsoft.com/openspecs/windows_protocols/ms-tds/b46a581a-39de-4745-b076-ec4dbb7d13ec)\
    \ 自行阅读所有细节。\n\nSQL Server 2022 引入了 TDS 的一个新主版本，即 TDS 8.0。使用 TDS 7.4 的驱动程序和提供程序仍然得到完全支持。新的驱动程序理解\
    \ TDS 8.0 并能够使用此协议。推出这个新版本的主要原因是连接加密。多年来，SQL Server 一直支持应用程序与 SQL Server 之间通信的加密。与许多应用程序一样，SQL\
    \ Server 使用传输层安全性（TLS）来实现通信加密。SQL Server 始终允许应用程序通过名为 `Encrypt` 和 `TrustServerCertificate`\
    \ 的连接字符串选项来决定是否使用加密与 SQL Server 进行通信。您还可以在服务器端强制对客户端连接进行加密。这两种连接字符串的组合非常重要，您可以在\
    \ [`https://docs.microsoft.com/dotnet/framework/data/adonet/connection-string-syntax#using-trustservercertificate`](https://docs.microsoft.com/dotnet/framework/data/adonet/connection-string-syntax#using-trustservercertificate)\
    \ 阅读更多细节。\n\nTDS 8.0 引入了 `严格连接` 加密的概念。如果应用程序使用 `Encrypt = strict` 值，则会启用 TDS 8.0\
    \ 协议。这里的一个显著变化是，如果使用了严格连接加密，那么客户端和 SQL Server 之间的通信**必须**是加密的（因此称为 `strict`）。另一个重要之处在于\
    \ TDS 8.0 处理连接加密的方式。在 TDS 8.0 之前，SQL Server 会与客户端执行未加密的握手或预登录。现在，借助 TDS 8.0，该握手过程完全通过\
    \ TLS 加密。这适用于所有 TLS 版本。这一点非常重要，因为它符合 HTTPS 等协议的标准，并允许网络设备安全地传递 SQL 通信。最新的提供程序必须能够使用\
    \ TDS 8.0。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3#strict-connection-encryption`](https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3#strict-connection-encryption)\
    \ 了解更多信息。\n\n此外，但与 TDS 8.0 独立的是，SQL Server 2022 现在支持最新版本的 TLS 1.3。TLS 1.3 是最安全的\
    \ TLS 版本。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3?#differences-between-tls-12-and-tls-13`](https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3?#differences-between-tls-12-and-tls-13)\
    \ 阅读更多关于 TLS 1.2 和 1.3 之间差异的信息。\n\n注意\n\n当产品正式发布时，我们也在研究在服务器级别强制执行此选项的方法。\n\n\
    ### 安全权限增强\n\n在 SQL Server 2022 中，我们还针对授权或权限场景引入了一些增强功能。这包括新的固定服务器级角色和用于动态数据屏蔽的新权限。\n\
    \n#### 新的固定服务器级角色\n\n直到 SQL Server 2022 之前，该产品都附带一组特定的 `固定` 服务器级角色。它们是固定的，因为您无法更改角色的访问级别或定义。它们是服务器级的，因为它们适用于整个\
    \ SQL Server 实例，而不仅仅是单个数据库。\n\n您可能熟悉其中一些角色，例如 `sysadmin`、`securityadmin`、`dbcreator`\
    \ 和 `public`。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles)\
    \ 查看这些角色的完整列表。\n\n我们长期以来从客户那里看到的一个请求是，希望我们提供的产品角色具有 `更细的粒度`——换句话说，就是拥有更少特定任务权限的更多固定角色。我在微软的同事\
    \ Andreas Wolter 就 `最低权限` 主题撰写了一篇有趣的博客，地址是 [`https://techcommunity.microsoft.com/t5/azure-sql-blog/security-the-principle-of-least-privilege-polp/ba-p/2067390`](https://techcommunity.microsoft.com/t5/azure-sql-blog/security-the-principle-of-least-privilege-polp/ba-p/2067390)。\n\
    \nSQL Server 2022 现在提供了遵循此原则的内置新固定服务器级角色。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles?#fixed-server-level-roles-introduced-in-sql-server-2022`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles?#fixed-server-level-roles-introduced-in-sql-server-2022)\
    \ 查看完整列表。\n\n我挑选了几个我觉得很有趣的角色：\n\n*   `##MS_DefinitionReader##`\n    *   此角色的成员被授予查看需要\
    \ `VIEW ANY DEFINITION` 或 `VIEW DEFINITION` 权限（假设他们在该数据库中拥有用户账户）的目录视图的权限。这是一种很好的方式，可以赋予某人“查看”有关服务器或重要信息的权限，而不允许他们进行更改。\n\
    \n*   `##MS_ServerStateReader##`\n    *   此角色的成员被授予查看需要 `VIEW SERVER STATE` 或\
    \ `VIEW DATABASE` 状态（假设他们在该数据库中拥有用户账户）的动态管理视图（DMV）或函数的权限。\n\n*   `##MS_ServerPerformanceStateReader##`\n\
    \    *   此角色与前一个固定角色类似，但更侧重于查看来自动态管理视图（DMV）的特定性能信息。此固定角色中的用户被授予与需要 `VIEW SERVER\
    \ PERFORMANCE STATE` 权限的对象相同的权限。\n\n想象一下这种情况：您想聘请一位顾问来查看系统和数据库的重要信息，以便为您提供分析。出于隐私原因，您不希望他们访问任何用户数据，也不希望他们进行更改。将他们添加为这两个角色的成员可以帮助您实现这一目标，而在此之前，您必须使用一个权限超过必要的固定服务器级角色，或者为他们的账户在实例以及您需要他们提供咨询的所有数据库中设置自定义权限。\n\
    \n您还会喜欢 SSMS 19 已得到增强以支持这些新的固定服务器级角色，如图 6-4 所示。\n\n![一张标题为“服务器角色”的文件夹截图。它包含 19\
    \ 个文件。](img/525217_1_En_6_Fig4_HTML.jpg)\n\n图 6-4 SQL Server 2022 固定服务器级角色\n"
- fmt: 'I did a quick test to see the difference for membership in the `MS_ServerPerformanceStateReader`
    role vs. just the public role. If you have just the public fixed role, you are
    allowed to see your session only when you query `sys.dm_exec_requests`. But if
    you are a member of the `MS_ServerPerformanceStateReader` role, you can see all
    sessions from `sys.dm_exec_requests`. An example of a DMV that would require `MS_ServerStateReader`
    or `MS_ServerSecurityStateReader` membership is the `sys.dm_server_audit_status`
    DMV. Anyone in just the `MS_ServerPerformanceStateReader` would not have access
    to this DMV. Effectively what we have done here is separate `MS_ServerStateReader`
    into two different roles: `MS_ServerPerformanceStateReader` and `MS_ServerSecurityStateReader`.


    ## Dynamic Data Masking Enhancements


    Dynamic data masking is the concept of providing logic within a table schema to
    mask data when viewed by a user (think of masking an email address with characters
    like xxxx@xxxx). We introduced this concept in SQL Server 2016, and it was quite
    popular. Prior to this feature, applications would have to put masking logic in
    their code. If the masking logic needed to be changed, the application would have
    to be changed and deployed. Dynamic data masking provides a way to define mask
    rules when defining columns in a table. If you are new to dynamic data masking,
    start with our documentation at [`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking).


    One nice aspect of dynamic data masking is that we provide built-in functions
    for common mask scenarios. So a column definition like this


    ```sql

    Email   varchar(100) MASKED WITH (FUNCTION = ''email()'') NOT NULL

    ```


    would result in any value stored in this column seen by users as XXX@XXXX.com.


    You can see a complete list of functions for dynamic data masking at [`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#defining-a-dynamic-data-mask`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#defining-a-dynamic-data-mask).


    In SQL Server 2022 we added a new function for datetime column types. You can
    mask all or part of the datetime values such as year, month, day, hour, minute,
    or second.


    The original implementation of dynamic data masking by default did not allow “non-admin”
    users to see unmasked data. However, we provided a T-SQL command option called
    `GRANT UNMASK` so that a user could be granted the ability to see data unmasked.
    The problem with this original design is that the unmasking permission was for
    any masked rule in the database.


    In 2021, we introduced the concept of granular `UNMASK` to Azure so that this
    permission could be applied at the schema, table, or column level. You can see
    the original announcement at [`https://azure.microsoft.com/updates/general-availability-dynamic-data-masking-granular-permissions-for-azure-sql-and-azure-synapse-analytics/`](https://azure.microsoft.com/updates/general-availability-dynamic-data-masking-granular-permissions-for-azure-sql-and-azure-synapse-analytics/).


    SQL Server 2022 simply brings this implementation from the cloud to SQL Server.
    You can see examples for granular unmasking at [`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#granular`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#granular).


    # Performance and Scalability


    I always love to see the innovation and enhancements in any SQL Server release
    for performance and scalability. One of the reasons is that almost everything
    in this area comes from tuning exercises, real customer stories, or research we
    do for benchmarking. SQL Server 2022 comes with a variety of investments in performance
    and scalability across the entire spectrum of workload and engine components.


    ## Columnstore and Batch Mode Improvements


    SQL Server 2022 comes with enhancements to boost performance for columnstore indexes
    and batch-mode operations (which do not require columnstore in SQL Server 2019
    and later).


    ### Ordered Clustered Columnstore Index


    Both Azure Synapse Analytics and SQL Server support columnstore indexes. An entire
    book could be devoted to columnstore indexes and why they can be beneficial to
    applications. I still find this an underused feature of SQL Server. Almost any
    customer I encounter who doesn’t know columnstore immediately sees how they can
    use them once they understand how they work. If you don’t know columnstore, go
    right to the documentation to get started at [`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview).


    Azure Synapse Analytics added an option to create a clustered columnstore index
    as *ordered*. While building an ordered clustered columnstore index can take longer,
    the performance benefits to certain queries can be significant. SQL Server 2022
    now supports ordered clustered columnstore indexes. Learn more at [`https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci`](https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci).


    ### Columnstore String Improvements


    We don’t have specific documentation on this one, but when I chatted with Ryan
    Stonecipher, the veteran SQL engineer about this, his quote to me was “Simply
    rebuild your indexes and we will maintain min/max values for deep data (e.g.,
    *char and *binary + guid). Furthermore, we now support LIKE pushdown operations
    on column stores and a fast string-equal implementation.”'
