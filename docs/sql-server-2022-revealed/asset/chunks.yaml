    ## 在 Azure 虚拟机上部署 SQL Server


    利用您关于规划部署的知识，让我们通过 Azure 门户和市场映像进行一个练习，了解如何在 Azure 虚拟机上部署 SQL Server。此练习旨在展示如何在
    Azure 虚拟机上部署运行 Windows Server 的 SQL Server `standalone`实例。您可以在 Azure 虚拟机上阅读更多关于在
