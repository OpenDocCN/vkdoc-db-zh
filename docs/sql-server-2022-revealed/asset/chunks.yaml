    #### Columnstore Segment Elimination Enhancements


    Columnstore index columns are organized into segments. Columnstore includes a
    concept called segment elimination so that segments can be eliminated or not ready
    depending on the query. Prior to SQL Server 2022, only columns with data types
    of numeric, date, and time and datetimeoffset with scale less than or equal to
    two were candidates for segment elimination. Now in SQL Server 2022, we have extended
    segment elimination to new data types including string, binary, and guid data
    types and the datetimeoffset data type for scale greater than two.


    ### Scalability Improvements


    There are several improvements to help scalability of your queries, workload,
    and use of SQL Server. The last thing you want is to invest in revised application
    design, new servers, or infrastructure only to have SQL Server prevent you from
    scaling. All the work in this area is a direct result of customer cases or benchmark
    and testing we do internally or with our partners.


    #### Buffer Pool Parallel Scan


    If you look at my site for all my talks (I’m an open source presenter), [`https://aka.ms/bobwardms`](https://aka.ms/bobwardms),
    you will find a folder called SQL PASS 2013\. At the PASS Community Summit in
    2013, I gave a half-day talk on memory. If you look at this deck, you will see
    that I have some internals on the buffer pool of SQL Server. As part of these
    slides, I talk about a BUF hash table and BUF structure. BUF structures point
    to pages, and a BUF hash table is a way to organize all the BUF structures to
    easily find a page. Therefore, finding a specific page is not all that hard using
    a lookup of the BUF hash table.


    Unfortunately, some operations in SQL Server must scan all the BUF structures.
    Think of this like scanning a clustered index vs. using an index seek. And like
    a clustered index scan, if you only need a few rows, it still may take a very
    long time to get the results if the clustered index is large.


    The same problem can occur for certain operations with the buffer pool, and we
    would see this type of scenario with customers. They would have a server with,
    say, 1TB of RAM and allow the buffer pool to consume most of this memory. Then
    they would go perform some maintenance operation, and even against a very small
    database, it would take an unusually long time. This is because we would scan
    the entire ~1TB of BUF structures to finish the operation. We even added ERRORLOG
    messages to warn the user this condition was happening. See the article [`https://docs.microsoft.com/troubleshoot/sql/performance/buffer-pool-scan-runs-slowly-large-memory-machines`](https://docs.microsoft.com/troubleshoot/sql/performance/buffer-pool-scan-runs-slowly-large-memory-machines)
    for more information. This is a classic problem of an architecture that for years
    didn’t cause problems, but as hardware technology became vastly bigger, this design
    needed to be updated.


    We took a look at this problem and said something to the effect, “If queries can
    run in parallel to obtain a faster result, why can’t we do this when scanning
    the buffer pool?” (This is not an exact quote; it’s my paraphrasing when I read
    the design documents for this.)


    The result of this work is buffer pool parallel scan, which is enabled by default
    in SQL Server 2022 for systems with large amounts of memory. My colleague David
    Pless at Microsoft worked on this feature and explains how it works at [`https://cloudblogs.microsoft.com/sqlserver/2022/07/07/improve-scalability-with-buffer-pool-parallel-scan-in-sql-server-2022`](https://cloudblogs.microsoft.com/sqlserver/2022/07/07/improve-scalability-with-buffer-pool-parallel-scan-in-sql-server-2022).


    David shows some great numbers we’ve seen for improvements in SQL Server 2022\.
    In addition, check out his Data Exposed episode where he shows even more details
    with a nifty demonstration at [`https://youtu.be/4GvU106Xiag`](https://youtu.be/4GvU106Xiag).
    I have included an example of the results David found in a T-SQL notebook you
    can view with Azure Data Studio in the example **ch06_meatandpotatoes\scalability\Buffer_pool_parallel_scan_BPP_notebook_quick.ipynb**.'
