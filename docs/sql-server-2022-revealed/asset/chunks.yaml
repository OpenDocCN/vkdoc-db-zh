- fmt: "### DATE_BUCKET\n\n你可以使用`DATE_BUCKET` T-SQL函数，根据年、月、日、季度、分钟等日期或时间部分来查找一个时间间隔或“桶”。`DATE_BUCKET`与本章前面介绍的新函数`DATETRUNC`相似，但存在一些关键区别。如果你想为时间序列生成间隔或桶数据，我推荐使用`DATE_BUCKET`。\n\
    \n让我们通过一个练习来了解如何使用`DATE_BUCKET`。此练习不需要任何特定的数据库上下文。\n\n1.  加载脚本**date_bucket.sql**，其中包含多个步骤。\n\
    2.  执行脚本中的**Step 1**，它使用以下语句：\n    ```\n    -- Step 1: Calculate DATE_BUCKET with\
    \ a bucket width of 1 with various dateparts\n    USE master;\n    GO\n    DECLARE\
    \ @date DATETIME = '2022-05-14 13:30:05';\n    SELECT 'Now' AS [BucketName], @date\
    \ AS [DateBucketValue]\n    UNION ALL\n    SELECT 'Year', DATE_BUCKET (YEAR, 1,\
    \ @date)\n    UNION ALL\n    SELECT 'Quarter', DATE_BUCKET (QUARTER, 1, @date)\n\
    \    UNION ALL\n    SELECT 'Month', DATE_BUCKET (MONTH, 1, @date)\n    UNION ALL\n\
    \    SELECT 'Week', DATE_BUCKET (WEEK, 1, @date)\n    UNION ALL\n    SELECT 'Day',\
    \ DATE_BUCKET (DAY, 1, @date)\n    UNION ALL\n    SELECT 'Hour', DATE_BUCKET (HOUR,\
    \ 1, @date)\n    UNION ALL\n    SELECT 'Minutes', DATE_BUCKET (MINUTE, 1, @date)\n\
    \    UNION ALL\n    SELECT 'Seconds', DATE_BUCKET (SECOND, 1, @date);\n    GO\n\
    \    ```\n    查看结果，了解如何从原始日期时间值中提取一个日期或时间单位作为桶。\n3.  执行**Step 2**，它使用以下语句：\n \
    \   ```\n    -- Step 2: Use a date instead of datetime\n    USE master;\n    GO\n\
    \    DECLARE @date DATE = '2022-05-14';\n    SELECT DATE_BUCKET(week, 1, @date);\n\
    \    GO\n    ```\n    这是`DATE_BUCKET`如何返回与输入数据类型相同的结果值的一个例子，因此这里的结果是`2022-05-09`，它是`2022-05-14`所在周的起始日期，但返回的是日期值而非完整的日期时间值。\n\
    4.  执行**Step 3**，它使用以下语句：\n    ```\n    -- Step 3: Generate fixed bucket sizes\n\
    \    USE master;\n    GO\n    DECLARE @dt DATETIME = '2022-05-14 13:35:12';\n\
    \    SELECT '5 Minute Buckets' AS [BucketName], DATE_BUCKET (MINUTE, 5, @dt)\n\
    \    UNION ALL\n    SELECT 'Quarter Hour', DATE_BUCKET (MINUTE, 15, @dt);\n  \
    \  GO\n    ```\n    这是`DATE_BUCKET`的一个便利特性，可以根据日期部分的数量创建固定大小的桶。`DATETRUNC`没有此功能。此查询的结果是\n\
    \    ```\n    BucketName              (No column name)\n    5 Minute Buckets \
    \       2022-05-14 13:35:00.000\n    Quarter Hour            2022-05-14 13:30:00.000\n\
    \    ```\n    因此，对于传入的日期时间，5分钟间隔是`13:35`，但一刻钟则回到了`13:30`。\n\n你可以在[`https://docs.microsoft.com/sql/t-sql/functions/date-bucket-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/date-bucket-transact-sql)了解更多关于`DATE_BUCKET`的信息。`DATE_BUCKET`不需要特定的数据库兼容性级别。\n\
    \n### GENERATE_SERIES\n\n处理时间序列数据的另一个概念是创建或生成数据，尤其是一系列的值。`GENERATE_SERIES` T-SQL函数可以接受一系列数字或数字范围作为输入，并在指定的间隔内自动生成数字。\n\
    \n这是SQL Server 2022中的一个新函数，Azure SQL Edge中没有。让我们来看一个练习。你必须在数据库兼容性级别为`dbcompat\
    \ 160`的数据库上下文中运行此脚本。SQL Server 2022中的`master`数据库会自动设置为`dbcompat 160`。\n\n1.  加载脚本**generate_series.sql**，其中包含多个步骤。\n\
    2.  执行脚本中的**Step 1**，它使用以下语句：\n    ```\n    -- Step 1: Generate a series of integer\
    \ values with a default interval of 1\n    USE master;\n    GO\n    SELECT value\n\
    \    FROM GENERATE_SERIES(1, 100);\n    GO\n    ```\n    你应该得到100行，值从1到100。注意这里你可以使用关键字`value`来表示`GENERATE_SERIES`函数的结果。\n\
    3.  执行脚本中的**Step 2**，它使用以下语句：\n    ```\n    -- Step 2: Generate a series of integer\
    \ values backwards with an interval of 5\n    USE master;\n    GO\n    SELECT\
    \ value\n    FROM GENERATE_SERIES(100, 1, -5);\n    GO\n    ```\n    这里我们生成从100递减到1的值，间隔为5。\n\
    4.  间隔不必是整数。执行**Step 3**，它使用以下语句：\n    ```\n    -- Step 3: Generate a series of\
    \ decimal values between 0 and 1.0 in increments of 0.05\n    USE master;\n  \
    \  GO\n    SELECT value\n    FROM GENERATE_SERIES(0.0, 1.0, 0.05);\n    GO\n \
    \   ```\n    你的结果应该是一系列从0到1的数字，增量为`0.05`。\n5.  执行**Step 4**，它使用以下T-SQL语句：\n  \
    \  ```\n    -- Step 4: Data types must match! The first batch results in an error\n\
    \    -- To get around this, either explicitly cast to matching data types or use\
    \ parameters\n    USE master;\n    GO\n    SELECT value\n    FROM GENERATE_SERIES(1,\
    \ 10, 0.5);\n    GO\n    DECLARE @start numeric(2,1) = 1;\n    DECLARE @end numeric(3,1)\
    \ = 10;\n    DECLARE @step numeric(2,1) = 0.5;\n    SELECT value\n    FROM GENERATE_SERIES(@start,\
    \ @end, @step);\n    GO\n    ```\n    在第一个批处理中，你应该会遇到以下错误：\n    ```\n    Msg 8116,\
    \ Level 16, State 3, Line 3\n    Argument data type numeric is invalid for argument\
    \ 3 of generate_series function.\n    ```\n    接着还会有一系列其他错误。为了解决这个问题，我们将使用变量来确保`GENERATE_SERIES`的所有参数都使用相同的类型。\n\
    \n你可以在[`https://docs.microsoft.com/sql/t-sql/functions/generate-series-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/generate-series-transact-sql)了解更多关于`GENERATE_SERIES`的信息。此函数**要求数据库兼容性级别为`dbcompat\
    \ 160`**，否则你会得到错误代码208，提示`GENERATE_SERIES`是无效的对象名。"
  raw: "### DATE_BUCKET\n\nYou can use the DATE_BUCKET T-SQL function to find an interval\
    \ or bucket based on a date or time part like year, month, day, quarter, minute,\
    \ etc. DATE_BUCKET is similar to the new DATETRUNC function you learned about\
    \ earlier in this chapter, but there are some key differences. If you are looking\
    \ to generate interval or bucket data for time series, I would recommend DATE_BUCKET.\n\
    \nLet’s use an exercise to see how to use DATE_BUCKET. This exercise does not\
    \ require any specific database context.\n\n1.  Load the script **date_bucket.sql**,\
    \ which has multiple steps.\n\n2.  Execute **Step 1** from the script, which uses\
    \ the following statements:\n\n    ```\n    -- Step 1: Calculate DATE_BUCKET with\
    \ a bucket width of 1 with various dateparts\n    USE master;\n    GO\n    DECLARE\
    \ @date DATETIME = '2022-05-14 13:30:05';\n    SELECT 'Now' AS [BucketName], @date\
    \ AS [DateBucketValue]\n    UNION ALL\n    SELECT 'Year', DATE_BUCKET (YEAR, 1,\
    \ @date)\n    UNION ALL\n    SELECT 'Quarter', DATE_BUCKET (QUARTER, 1, @date)\n\
    \    UNION ALL\n    SELECT 'Month', DATE_BUCKET (MONTH, 1, @date)\n    UNION ALL\n\
    \    SELECT 'Week', DATE_BUCKET (WEEK, 1, @date)\n    UNION ALL\n    SELECT 'Day',\
    \ DATE_BUCKET (DAY, 1, @date)\n    UNION ALL\n    SELECT 'Hour', DATE_BUCKET (HOUR,\
    \ 1, @date)\n    UNION ALL\n    SELECT 'Minutes', DATE_BUCKET (MINUTE, 1, @date)\n\
    \    UNION ALL\n    SELECT 'Seconds', DATE_BUCKET (SECOND, 1, @date);\n    GO\n\
    \    ```\n\n    Go through the results and see how you extract a date or time\
    \ unit as a bucket from the original datetime value.\n\n3.  Execute **Step 2**,\
    \ which uses the following statements:\n\n    ```\n    -- Step 2: Use a date instead\
    \ of datetime\n    USE master;\n    GO\n    DECLARE @date DATE = '2022-05-14';\n\
    \    SELECT DATE_BUCKET(week, 1, @date);\n    GO\n    ```\n\n    Here is an example\
    \ of how DATE_BUCKET will return a value at the data type of input, so the result\
    \ here is 2022-05-09, which is the beginning of the week (or interval) for 2022-05-14\
    \ but returned not as full datetime but a date value.\n\n4.  Execute **Step 3**,\
    \ which uses the following statements:\n\n    ```\n    -- Step 3: Generate fixed\
    \ bucket sizes\n    USE master;\n    GO\n    DECLARE @dt DATETIME = '2022-05-14\
    \ 13:35:12';\n    SELECT '5 Minute Buckets' AS [BucketName], DATE_BUCKET (MINUTE,\
    \ 5, @dt)\n    UNION ALL\n    SELECT 'Quarter Hour', DATE_BUCKET (MINUTE, 15,\
    \ @dt);\n    GO\n    ```\n\n    This is a nice feature for DATE_BUCKET to create\
    \ fixed-size buckets based on number of the date part. DATETRUNC does not have\
    \ this capability. The results for this query are\n\n    ```\n    BucketName \
    \             (No column name)\n    5 Minute Buckets        2022-05-14 13:35:00.000\n\
    \    Quarter Hour            2022-05-14 13:30:00.000\n    ```\n\n    So for the\
    \ datetime passed in, a 5-minute interval is 13:35, but the quarter hour is back\
    \ to 13:30.\n\nYou can learn more about DATE_BUCKET at [`https://docs.microsoft.com/sql/t-sql/functions/date-bucket-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/date-bucket-transact-sql).\
    \ DATE_BUCKET does not require a specific dbcompat level.\n\n### GENERATE_SERIES\n\
    \nAnother concept for time series data is create or generate data, especially\
    \ a range of values. The GENERATE_SERIES T-SQL function can take as input a series\
    \ of numbers or number range and automatically generate numbers including within\
    \ a specified interval.\n\nThis is a new function for SQL Server 2022 and not\
    \ in Azure SQL Edge. Let’s go through an exercise. You must run this script in\
    \ the context of a database that has dbcompat 160\\. The master database in SQL\
    \ Server 2022 is automatically set to dbcompat 160.\n\n1.  Load the script **generate_series.sql**,\
    \ which has multiple steps.\n\n2.  Execute **Step 1** in the script, which uses\
    \ the following statements:\n\n    ```\n    -- Step 1: Generate a series of integer\
    \ values with a default interval of 1\n    USE master;\n    GO\n    SELECT value\n\
    \    FROM GENERATE_SERIES(1, 100);\n    GO\n    ```\n\n    You should get 100\
    \ rows with values 1–100\\. Notice here you can use the keyword **value** to represent\
    \ the result of the GENERATE_SERIES function.\n\n3.  Execute **Step 2** in the\
    \ script, which uses the following statements:\n\n    ```\n    -- Step 2: Generate\
    \ a series of integer values backwards with an interval of 5\n    USE master;\n\
    \    GO\n    SELECT value\n    FROM GENERATE_SERIES(100, 1, -5);\n    GO\n   \
    \ ```\n\n    Here we generate values 100 down to 1 by an interval of 5.\n\n4.\
    \  Intervals don’t have to be whole integers. Execute **Step 3**, which uses the\
    \ following statements:\n\n    ```\n    -- Step 3: Generate a series of decimal\
    \ values between 0 and 1.0 in increments of 0.05\n    USE master;\n    GO\n  \
    \  SELECT value\n    FROM GENERATE_SERIES(0.0, 1.0, 0.05);\n    GO\n    ```\n\n\
    \    Your results should be a series of numbers from 0 to 1 with an increment\
    \ of 0.05.\n\n5.  Execute **Step 4**, which uses the following T-SQL statements:\n\
    \n    ```\n    -- Step 4: Data types must match! The first batch results in an\
    \ error\n    -- To get around this, either explicitly cast to matching data types\
    \ or use parameters\n    USE master;\n    GO\n    SELECT value\n    FROM GENERATE_SERIES(1,\
    \ 10, 0.5);\n    GO\n    DECLARE @start numeric(2,1) = 1;\n    DECLARE @end numeric(3,1)\
    \ = 10;\n    DECLARE @step numeric(2,1) = 0.5;\n    SELECT value\n    FROM GENERATE_SERIES(@start,\
    \ @end, @step);\n    GO\n    ```\n\n    In the first batch, you should get the\
    \ following error:\n\n    ```\n    Msg 8116, Level 16, State 3, Line 3\n    Argument\
    \ data type numeric is invalid for argument 3 of generate_series function.\n \
    \   ```\n\n    This is followed by a series of other errors. To fix this we will\
    \ use variables to ensure all arguments for GENERATE_SERIES use the same types.\n\
    \nYou can learn more about GENERATE_SERIES at [`https://docs.microsoft.com/sql/t-sql/functions/generate-series-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/generate-series-transact-sql).\
    \ This function **requires dbcompat 160**, or you will get a syntax error 208\
    \ saying GENERATE_SERIES is an invalid object name."
