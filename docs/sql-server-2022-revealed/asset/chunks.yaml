  trans: '

    ## 其他安装方法


    Windows 上的 SQL Server 安装程序仍然支持通过命令行进行无用户界面选项安装。你可以找到相关示例并查看所有选项，地址是 [`https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt`](https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt)。SQL
    Server 2022 的唯一区别在于：如本章前文所述，移除了已停止使用功能的选项，并添加了支持 `Azure extension for SQL Server`
    的新参数。


    如果你是初次设置 SQL Server，需要知道 SQL Server 评估版和开发版附带了一个“简易安装”模式，其安装程序会直接安装默认组件，无需经过任何设置界面。如果你选择此方法，则不会选中
    `Azure extension for SQL Server` 功能。如果你想要使用评估版或开发版的完整安装体验，请从初始设置界面选择 `Custom`
    选项。


    ## 设置 Azure extension for SQL Server


    2020 年，我们宣布了一项名为 `Azure Arc–enabled SQL Server` 的 SQL Server 新混合功能。其理念是将现有的 SQL
    Server 安装连接到 Azure，以提供新功能，例如在 Azure 门户中查看实例详情、使用 `Microsoft Defender` 以及进行最佳实践评估。使用
    `Azure Arc` 设置 SQL Server 的过程是通过 Azure 门户或脚本完成的。SQL Server 2022 在安装过程中提供了一种集成方法来安装此功能，通过一个名为
    `Azure extension for SQL Server` 的安装功能实现。


    `Azure extension for SQL Server` 为 SQL Server 2022 提供以下功能：


    *   `Microsoft Defender` for SQL

    *   `SQL Assessment`（你可以在 [`https://docs.microsoft.com/sql/sql-server/azure-arc/assess`](https://docs.microsoft.com/sql/sql-server/azure-arc/assess)
    阅读更多相关内容）

    *   在 Azure 门户中查看已连接的 SQL Server 以及其他的 Azure SQL 资源

    *   `Azure Active Directory (AAD)` 身份验证

    *   `Microsoft Purview` 中的访问策略（`Purview` 集成需要 `AAD`，而 `AAD` 也需要 `Azure extension
    for SQL Server`）


    你将在本书的第 3 章了解更多关于这些功能的内容。我将在本书的第 11 章进一步描述 `Azure Arc–enabled SQL Server` 的作用。仅仅将
    SQL Server 连接到 Azure 不会产生任何费用。只有当你选择了某些服务，例如 `Microsoft Defender` 或 `Purview`
    时，才会产生订阅费用。


    注意


    在 Azure 虚拟机上运行 SQL Server 时，不支持 `Azure extension for SQL Server`。SQL Server 使用
    `Infrastructure-as-a-Service (IaaS) Agent Extension` 来提供诸如 `Defender`、评估和 `AAD`
    身份验证等功能。你可以在 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management)
    阅读更多关于 `IaaS Agent Extension` 的信息。


    图 2-3 展示了设置 `Azure extension for SQL Server` 所需的信息。


    ![](img/525217_1_En_2_Fig3_HTML.png)


    SQL Server 2022 的屏幕截图。其中包含 Azure 服务、订阅 ID、资源组、区域、租户 ID 和 Azure 扩展的服务器 URL 等选项。


    图 2-3


    设置 `Azure extension for SQL Server`


    我将描述如何用 Azure 信息填写这些字段。在本书示例代码的 `ch2_install` 文件夹中，我提供了一些可以帮助你的示例文件。


    ### 你首先应该了解什么


    在你继续阅读之前，让我先就填写这些字段时会涉及的 Azure 主题，给你一些指导：


    *   以下信息假设你拥有一个 `Azure subscription`（Azure 订阅），并且你的 SQL Server 直接连接到互联网或通过代理连接。如果你没有
    `Azure subscription`，请咨询你所在组织。或者你也可以在 [`https://azure.microsoft.com/get-started/`](https://azure.microsoft.com/get-started/)
    开始使用。

    *   请阅读 `Azure Role-Based Access Control (RBAC)`（Azure 基于角色的访问控制）的概念。`RBAC` 是
    Azure 中的一个权限系统，用于授予你在 Azure 中执行某些操作的权限。你可以在 [`https://docs.microsoft.com/azure/role-based-access-control/overview`](https://docs.microsoft.com/azure/role-based-access-control/overview)
    了解更多关于 `Azure RBAC` 的信息。

    *   你需要检查你在 `Azure subscription` 中的权限，以确保你可以创建一个 `resource group`（资源组）以及为 `Azure
    Arc` 设置自定义权限，或者有能力创建 `custom role`（自定义角色）和 `service principal`（服务主体）。如果这些示例因权限不足而失败，请咨询你的
    `Azure subscription` 管理员。你的 `Azure account`（Azure 账户）或要与 `service principal` 一起使用的
    `custom role` 的权限可以在 [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions)
    找到。

    *   一个有效的 `Azure Resource Group`（Azure 资源组）。你可能已经有一个想要使用的，或者可以新建一个。你可以使用此文档页面学习如何创建新的
    `resource group`：[`https://docs.microsoft.com/azure/azure-resource-manager/management/manage-resource-groups-portal`](https://docs.microsoft.com/azure/azure-resource-manager/management/manage-resource-groups-portal)。创建
    `resource group` 时，请选择一个支持 `Azure Arc–enabled servers` 的 `Azure region`（Azure
    区域），其支持列表记录在 [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#supported-azure-regions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#supported-azure-regions)。

    *   我建议你从 [`https://docs.microsoft.com/cli/azure/`](https://docs.microsoft.com/cli/azure/)
    安装 `az` 命令行界面（`CLI`），或者使用 `Azure Cloud Shell`（你可以在 [`https://docs.microsoft.com/azure/cloud-shell/overview`](https://docs.microsoft.com/azure/cloud-shell/overview)
    了解更多）。

    *   如果你决定使用 `service principal`，你将需要在 Azure 中创建一个包含以下权限的 `custom role`：[`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions)。要学习如何创建
    `custom role`，请前往 [`https://docs.microsoft.com/azure/active-directory/roles/custom-create`](https://docs.microsoft.com/azure/active-directory/roles/custom-create)。


    注意


    在我位于 Microsoft 的租户中，我没有在 Azure 门户中创建 `custom role` 的权限。但是，我能够使用 `az CLI` 创建一个，如
    [`https://docs.microsoft.com/azure/role-based-access-control/custom-roles-cli`](https://docs.microsoft.com/azure/role-based-access-control/custom-roles-cli)
    所述。你可以在本章示例的 `sqlazureext.json` 文件中看到我的示例 JSON 文件。使用此 JSON 文件创建角色的脚本在示例文件 `createcustomrole.ps1`
    中。


    *   如果你决定使用 `service principal`，你可以使用 `az` 命令行界面（`CLI`）为你的订阅和 `resource group`
    创建一个：[`https://docs.microsoft.com/cli/azure/create-an-azure-service-principal-azure-cli`](https://docs.microsoft.com/cli/azure/create-an-azure-service-principal-azure-cli)。

    '
- fmt: "You will assign the service principal to the custom role and resource group\
    \ you created. You can see an example of how to do this with the script `sqlazureextsp.ps1`.\n\
    \nWhen you create a service principal with the CLI, you will get a JSON result\
    \ that will contain values for fields you will need for this screen. **Be sure\
    \ to save this result, especially the password.** I’ll show you how each field\
    \ from the output lines up with the fields on the feature screen for SQL Server\
    \ setup.\n\nThe resulting JSON should look like this:\n```\n{\n\"appId\": \"\"\
    ,\n\"displayName\": \"\",\n\"password\": \"\",\n\"tenant\": \"\"\n}\n```\n\nNote:\
    \ Don’t include the quotation marks when using these values on the feature setup\
    \ screen.\n\nService principals are highly privileged accounts in Azure. I created\
    \ my service principal at the resource group scope, but the permissions assigned\
    \ with the custom role are highly privileged. If you decide to disconnect and\
    \ remove your SQL Server from Azure, make sure to remove the service principal.\n\
    \n### Providing Values for the Feature Setup\n\nWith these resources created,\
    \ you can fill out the fields from Figure [2-3](#525217_1_En_2_Chapter.xhtml#Fig3)\
    \ (all of these fields except Proxy Server URL are required).\n\n#### Checking\
    \ the Azure Extension for SQL Server\n\nIf you don’t want to install the Azure\
    \ extension for SQL Server, you can uncheck this box. Leave it checked to install\
    \ the extension. Remember that you don’t incur any costs just to set up the extension.\n\
    \n#### Login or Service Principal\n\nYou have a choice to use an Azure login from\
    \ your subscription or a service principal. If you select `Use Azure Login`, you\
    \ will be presented with a screen to log in with your credentials per your company\
    \ requirements (Microsoft requires MFA). Once you sign in, we validate your account\
    \ has the right permissions to set up the extension. Then we will auto-populate\
    \ the following fields:\n\n*   `Azure Tenant ID`\n    *   This is an ID for your\
    \ Azure Active Directory associated with your account.\n*   `Azure Subscription\
    \ ID`\n    *   This is the default subscription ID for your Azure account. We\
    \ will register your SQL Server under this subscription. You can choose a different\
    \ subscription from a drop-down list.\n*   `Azure Resource Group`\n    *   We\
    \ will choose a resource group under your subscription, which we will use to register\
    \ your SQL Server. You can choose from a drop-down list a different resource group.\n\
    *   `Azure Region`\n    *   We will choose the Azure region from the resource\
    \ group, but you can choose a different region from a drop-down list.\n*   `Proxy\
    \ Server URL`\n    *   You can optionally put in a proxy URL if your SQL Server\
    \ cannot directly connect to the Internet. By default, the agents installed with\
    \ the extension on the server will use outbound TCP port 443 to connect to Azure\
    \ services over the Internet. You can set up a proxy server. If you use a proxy\
    \ server, put in the URL of the proxy in this field. You can read more about this\
    \ at [`https://docs.microsoft.com/azure/azure-arc/servers/manage-agent#update-or-remove-proxy-settings`](https://docs.microsoft.com/azure/azure-arc/servers/manage-agent#update-or-remove-proxy-settings).\
    \ **Leave this field blank** if you are not using a proxy.\n\nIf you decide to\
    \ use a service principal, you will need to fill in information that you collected\
    \ when you created the service principal using a custom role:\n\n*   `Azure Service\
    \ Principal ID`\n    *   This is the value of `appId` from the JSON result of\
    \ creating the service principal.\n*   `Azure Service Principal Secret`\n    *\
    \   This is the value of `password` from the JSON result.\n*   `Azure Subscription\
    \ ID`\n    *   This is the subscription ID value you used as part of the `–scopes`\
    \ parameter when you created the service principal.\n*   `Azure Resource Group`\n\
    \    *   This is the name of the resource group you created as a prerequisite\
    \ and used in the `–scopes` parameter to create the service principal.\n*   `Azure\
    \ Region`\n    *   The name of the Azure region where you created the resource\
    \ group. The name of the region here should not contain spaces and should be lowercase.\
    \ My region was East US, so the value should be `eastus`.\n*   `Azure Tenant ID`\n\
    \    *   This is the value of the `tenant` from the JSON result when you created\
    \ the service principal.\n\n`Proxy Server URL` can also be used in this scenario.\n\
    \nWhat happens now?\n\nWhen you hit the Next button, there will be a delay of\
    \ several minutes before you can proceed. This is to do some validation to connect\
    \ to Azure. During the installation, the Azure Arc Agent and the Azure extension\
    \ for SQL Server will be installed to connect and register with Azure. You can\
    \ see these agents by looking at installed programs after setup has successfully\
    \ completed as seen in Figure [2-4](#525217_1_En_2_Chapter.xhtml#Fig4).\n\n![](Images/525217_1_En_2_Fig4_HTML.jpg)\n\
    \nA screenshot. 2 files titled azure connected machine agent and Microsoft S Q\
    \ L server extension are highlighted with their publisher, size and version.\n\
    \nFigure 2-4: Azure Arc Agent and Azure extension for SQL Server\n\nIn addition,\
    \ the `Azure Connected SQL Server Onboarding role` will be assigned automatically\
    \ to the service principal. This role is required to connect SQL Server to Azure.\n\
    \nThe setup logs show the details of what happens with a PowerShell script that\
    \ setup executes (this is in the `details.txt` file from the SQL Server setup\
    \ logs):"
  raw: 'You will assign the service principal to the custom role and resource group
    you created. You can see an example of how to do this with the script **sqlazureextsp.ps1**.


    When you create a service principal with the CLI, you will get a JSON result that
    will contain values for fields you will need for this screen. ***Be sure to save
    this result, especially the password.*** I’ll show you how each field from the
    output lines up with the fields on the feature screen for SQL Server setup.


    The resulting JSON should look like this:


    ```

    {

    "appId": "",

    "displayName": "",

    "password": "",

    "tenant": ""

    }

    ```


    Note


    Don’t include the quotation marks when using these values on the feature setup
    screen.


    Service principals are highly privileged accounts in Azure. I created my service
    principal at the resource group scope, but the permissions assigned with the custom
    role are highly privileged. If you decide to disconnect and remove your SQL Server
    from Azure, make sure to remove the service principal.


    ### Providing Values for the Feature Setup


    With these resources created, you can fill out the fields from Figure [2-3](#525217_1_En_2_Chapter.xhtml#Fig3)
    (all of these fields except Proxy Server URL are *required*).


    #### Checking the Azure Extension for SQL Server


    If you don’t want to install the Azure extension for SQL Server, you can uncheck
    this box. Leave it checked to install the extension. Remember that you don’t incur
    any costs just to set up the extension.


    #### Login or Service Principal


    You have a choice to use an Azure login from your subscription or a service principal.
    If you select **Use Azure Login**, you will be presented with a screen to log
    in with your credentials per your company requirements (Microsoft requires MFA).
    Once you sign in, we validate your account has the right permissions to set up
    the extension. Then we will auto-populate the following fields:


    *   **Azure Tenant ID**


    *   This is an ID for your Azure Active Directory associated with your account.


    *   **Azure Subscription ID**


    *   This is the default subscription ID for your Azure account. We will register
    your SQL Server under this subscription. You can choose a different subscription
    from a drop-down list.


    *   **Azure Resource Group**


    *   We will choose a resource group under your subscription, which we will use
    to register your SQL Server. You can choose from a drop-down list a different
    resource group.


    *   **Azure Region**


    *   We will choose the Azure region from the resource group, but you can choose
    a different region from a drop-down list.


    *   **Proxy Server URL**


    *   You can optionally put in a proxy URL if your SQL Server cannot directly connect
    to the Internet. By default, the agents installed with the extension on the server
    will use outbound TCP port 443 to connect to Azure services over the Internet.
    You can set up a proxy server. If you use a proxy server, put in the URL of the
    proxy in this field. You can read more about this at [`https://docs.microsoft.com/azure/azure-arc/servers/manage-agent#update-or-remove-proxy-settings`](https://docs.microsoft.com/azure/azure-arc/servers/manage-agent#update-or-remove-proxy-settings).
    **Leave this field blank** if you are not using a proxy.


    If you decide to use a service principal, you will need to fill in information
    that you collected when you created the service principal using a custom role:


    *   **Azure Service Principal ID**


    *   This is the value of **appId** from the JSON result of creating the service
    principal.


    *   **Azure Service Principal Secret**


    *   This is the value of **password** from the JSON result.


    *   **Azure Subscription ID**


    *   This is the subscription ID value you used as part of the –scopes parameter
    when you created the service principal.


    *   **Azure Resource Group**


    *   This is the name of the resource group you created as a prerequisite and used
    in the –scopes parameter to create the service principal.


    *   **Azure Region**


    *   The name of the Azure region where you created the resource group. The name
    of the region here should not contain spaces and should be lowercase. My region
    was East US, so the value should be eastus.


    *   **Azure Tenant ID**


    *   This is the value of the **tenant** from the JSON result when you created
    the service principal.


    Proxy Server URL can also be used in this scenario.


    What happens now?


    When you hit the Next button, there will be a delay of several minutes before
    you can proceed. This is to do some validation to connect to Azure. During the
    installation, the Azure Arc Agent and the Azure extension for SQL Server will
    be installed to connect and register with Azure. You can see these agents by looking
    at installed programs after setup has successfully completed as seen in Figure
    [2-4](#525217_1_En_2_Chapter.xhtml#Fig4).


    ![](Images/525217_1_En_2_Fig4_HTML.jpg)


    A screenshot. 2 files titled azure connected machine agent and Microsoft S Q L
    server extension are highlighted with their publisher, size and version.


    Figure 2-4


    Azure Arc Agent and Azure extension for SQL Server


    In addition, the **Azure Connected SQL Server Onboarding role** will be assigned
    automatically to the service principal. This role is required to connect SQL Server
    to Azure.


    The setup logs show the details of what happens with a PowerShell script that
    setup executes (this is in the **details.txt** file from the SQL Server setup
    logs):'
