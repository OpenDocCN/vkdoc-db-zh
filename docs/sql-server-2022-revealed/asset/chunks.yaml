    \ in Object Explorer in SSMS and select Watch Live Data.\n\n9.  Run the script\
    \ **workload_index_scan_users.cmd** from the command prompt. This script takes\
    \ about 15 minutes to complete. This script executes the procedure you have created\
    \ in a repeated loop.\n\n**Note** This script assumes a local server connection\
    \ with Windows authentication.\n\n10.  When this script completes, you can observe\
    \ DOP feedback using the live data from Extended Events. You should see a series\
    \ of events like Figure [5-20](#525217_1_En_5_Chapter.xhtml#Fig20).\n\nWithin\
    \ the Live Data Viewer in SSMS, you can add columns to the default view to see\
    \ the sequence of feedback (right-click any field in the Details pane and select\
    \ Show Column in Table). Over time you can see the **feedback_dop** lowering and\
    \ the decrease in elapsed time and CPU time for the query. You can also see the\
    \ iterations for validations with a feedback_state of PendingValidationTest and\
    \ also Stable. Whenever Stable is reached, the feedback is persisted to Query\
    \ Store.\n\nLet’s focus on the last two events as in Figure [5-21](#525217_1_En_5_Chapter.xhtml#Fig21).\n\
    \n![](Images/525217_1_En_5_Fig21_HTML.png)\n\nD O P feedback validation and stabilization\
    \ event. Arrows point to d o p feedback validation, 2, null, 13637, 23466, and\
    \ pending validation test, d o p feedback stabilized, 4, null, 12417, 25591, and\
    \ null; and reason: validation test failed with recent feedback, stabilized feedback\
    \ at feedback d o p value.\n\nFigure 5-21\n\nDOP feedback stabilization event\n\
    \nNotice that the **dop_feedback_stabilized** event is fired after feedback_dop\
    \ is attempted at 2 but not stable. The elapsed time goes up after trying DOP\
    \ feedback of 2, but CPU goes down. In order to adhere to our “do not harm” policy,\
    \ we have to stop at DOP of 4\\. The **dop_feedback_stabilized** event shows the\
    \ reason for stabilization. In this case, the validation for DOP 2 fails because\
    \ the query duration is longer. This ends the feedback loop as we have found the\
    \ best and lowest possible DOP value of 4\\. However, remember that when feedback\
    \ is provided and feedback state is **Stable**, the feedback is persisted to Query\
    \ Store. This allows the stable state to be persisted even though it could be\
    \ lowered with further feedback.\n\n**I’ve run this test and scenario several\
    \ times, and in some cases I’ve seen DOP feedback lower to 2 and stabilize at\
    \ that number.**\n\n![](Images/525217_1_En_5_Fig22_HTML.png)\n\nA screenshot of\
    \ the top 25 resource consumers for database wide world importers. The screenshot\
    \ has a bar chart on the left, a scatterplot of the plan summary for query 1 on\
    \ the right, and plan 1, not forced at the bottom. Arrows point to the patterns\
    \ of the plots.\n\nFigure 5-22\n\nAvg duration for DOP feedback\n\n1.  Execute\
    \ the script **dop_query_stats.sql**. This script runs the following T-SQL statements:\n\
    \n```\n    USE WideWorldImporters;\n    GO\n    -- The hash value of 4128150668158729174\
    \ should be fixed for the plan from the workload\n    SELECT qsp.query_plan_hash,\
    \ avg_duration/1000 as avg_duration_ms,\n    avg_cpu_time/1000 as avg_cpu_ms,\
    \ last_dop, min_dop, max_dop, qsrs.count_executions\n    FROM sys.query_store_runtime_stats\
    \ qsrs\n    JOIN sys.query_store_plan qsp\n    ON qsrs.plan_id = qsp.plan_id\n\
    \    and qsp.query_plan_hash = CONVERT(varbinary(8), cast(4128150668158729174\
    \ as bigint))\n    ORDER by qsrs.last_execution_time;\n    GO\n    ```\n\nLooking\
    \ at the results, you should see the progression of lower duration (elapsed) time\
    \ and CPU as DOP is lowered based on feedback. But notice when the value of last_dop\
    \ = 2, the duration is higher, which is why DOP feedback is considered stable\
    \ at 4.\n\n2.  Execute the script **check_query_feedback.sql.** This script runs\
    \ the following T-SQL statements:\n\n```\n    USE WideWorldImporters;\n    GO\n\
    \    SELECT * from sys.query_store_plan_feedback;\n    GO\n    ```\n\nYour results\
    \ should look similar to the following (I flipped the results vertically for readability\
    \ and did not include the datetime columns):\n\n```\n    plan_feedback_id    \
    \    1\n    plan_id                 1\n    feature_id              3\n    feature_desc\
    \            DOP Feedback\n    feedback_data\n    {\"BaselineStats\":{\"dop\"\
    :\"8\",\"avg_cpu_time_ms\":\"35023\",\"avg_elapsed_time_ms\":\"16995\",\"avg_wait_time_ms\"\
    :\"4578\"},\"LastGoodFeedback\":{\"dop\":\"4\",\"avg_cpu_time_ms\":\"25591\",\"\
    avg_elapsed_time_ms\":\"12440\",\"avg_wait_time_ms\":\"23\"}}\n    State     \
    \              7\n    state_desc              FEEDBACK_VALID\n    ```\n\nThe **feedback_data**\
    \ shows the DOP feedback persisted to use **LastGoodFeedback** for subsequent\
    \ executions of this query by the query engine, with the feedback surviving any\
    \ restarts or plan cache eviction. Persistence in Query Store is the key, which\
    \ makes DOP feedback effective over time.\n\n3.  Look at the **Top Resource-Consuming\
    \ Queries** report in SSMS. Change the Statistic to Avg for Duration. You should\
    \ see a report like in Figure [5-22](#525217_1_En_5_Chapter.xhtml#Fig22).\n\n\
    Notice the drop in duration over time until stabilization is reached when it flattens\
    \ out. Not all scenarios will result in a decrease in duration. The key is that\
    \ DOP feedback should at least result in similar duration values over time.\n\n\
    Use the same report but change for Metric CPU Time with Statistic Avg. You should\
    \ see a report like in Figure [5-23](#525217_1_En_5_Chapter.xhtml#Fig23).\n\n\
    ![](Images/525217_1_En_5_Fig23_HTML.png)\n\nA screenshot of the top 25 resource\
    \ consumers for database wide world importers. The screenshot has a bar chart\
    \ on the left, a plan summary for query 1 on the right, and plan 1, not forced\
    \ at the bottom. An arrow points from the bar chart to a text that reads lead\
    \ time days from the warehouse in plan 2, not forced.\n\nFigure 5-23\n\nAvg CPU\
    \ for DOP feedback\n\nThis report shows the *true power of DOP feedback*: a significant\
    \ reduction in CPU resources required to achieve a similar or lower duration for\
    \ the query.\n\nNote\n\nIf you were to look at actual query execution plans (such\
    \ as from the Extended Event **query_post_execution_plan_profile**) while this\
    \ workload was running, you would see an XML property of `DOPFeedbackAdjusted=\"\
    Yes: Adjusting\"` and then eventually `\"Yes: Stable\"` once DOP feedback was\
    \ stabilized."
