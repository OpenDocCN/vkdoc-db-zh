- fmt: "## JSON Functions\n\nBy SQL Server 2016 we knew the popularity of processing\
    \ and storing data as JSON was important to new applications and developers. So\
    \ we added into the T-SQL language functions to process JSON data stored as strings\
    \ in SQL Server tables. This included functions to test the existence of JSON,\
    \ extract JSON values, modify JSON parts, and even format results of SQL row data\
    \ into JSON documents. You can see a complete list of these functions at [`https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server).\n\
    \nIn SQL Server 2022, we have enhanced and added new functions to process JSON.\
    \ This includes testing existence of JSON and functions to generate JSON arrays\
    \ and objects. JSON functions do not require a specific `dbcompat` level.\n\n\
    I turned to the longtime SQL veteran Umachandar Jayachandran (UC) to find out\
    \ our motivation to do this new work for JSON. UC told me:\n\n*SQL Server currently\
    \ has support for manipulating and querying JSON data. This approach is based\
    \ on built-in functions, `OPENJSON` & `FOR JSON` operators. This functionality\
    \ implements a subset of features specified in JSON specification (RFC 8259) and\
    \ ANSI SQL standard (Part 2: SQL/Foundation) specification. The JSON enhancements\
    \ in SQL Server 2022 provide functionality for some of the additional features\
    \ in these specifications. The `ISJSSON` function now supports an optional JSON\
    \ type constraint parameter that can be used to test if the input string is a\
    \ valid JSON scalar, value, array, or object per RFC 8259. The new `JSON_PATH_EXISTS`\
    \ function provides a compatible syntax for the `JSON_EXISTS` predicate in the\
    \ ANSI SQL standard and allows for testing existence of a specific SQL/JSON path\
    \ in a JSON document. The JSON value constructors – `JSON_OBJECT` and `JSON_ARRAY`\
    \ provide ANSI SQL compatible functionality for construction of JSON object or\
    \ array. The JSON value constructors also allow construction of complex structures\
    \ in a JSON document that require workarounds or string manipulation in older\
    \ versions of SQL Server. Together, the new JSON enhancements provide rich functionality\
    \ to manipulate JSON data and is a small step towards providing more standard\
    \ compatible functionality in future version(s) of SQL Server.*\n\nThe easiest\
    \ way to see how these new T-SQL statements work is to go through some exercises.\
    \ I’ve provided prerequisites first for the exercises. Then I’ll combine some\
    \ of the JSON functions together in two different exercises.\n\n### Prerequisites\
    \ for Exercises\n\n*   SQL Server 2022 Evaluation Edition.\n*   Virtual machine\
    \ or computer with at least two CPUs and at least 8Gb RAM.\n*   SQL Server Management\
    \ Studio (SSMS). The latest 18.x build or 19.x build will work.\n*   There is\
    \ no user database required for these exercises. They all work from any database\
    \ context including `master`.\n*   Scripts from the book samples from the `ch08_tsql\\\
    json` folder.\n\n### JSON_ARRAY and ISJSON\n\nWhile the `FOR JSON` clause of a\
    \ `SELECT` statement allows you to return formatted JSON data, in SQL Server 2022\
    \ we have introduced a new function to produce JSON array text using an expression,\
    \ which can be from columns in tables. In addition, even though we have had the\
    \ `ISJSON` function to test for the existence of valid JSON, in SQL Server 2022\
    \ we added an option to look for a valid JSON array, object, or scalar.\n\nLet’s\
    \ look at an exercise:\n\n![](Images/525217_1_En_8_Fig1_HTML.jpg)\n\nA table comprises\
    \ 3 columns and rows, each. The columns are titled session I D, and no column\
    \ name. Each column has data underneath. The rows are numbered 1, 2, and 3.\n\n\
    Figure 8-1\n\nBasic JSON_ARRAY results\n\n1.  Open up the script `json_array.sql`\
    \ to follow multiple steps as outlined in the comments of the script.\n2.  Execute\
    \ the T-SQL statements for `Step 1`, which in the script are the following:\n\n\
    ```sql\n    -- Step 1: Show a simple JSON array\n    USE master;\n    GO\n   \
    \ SELECT s.session_id, JSON_ARRAY(s.host_name, s.program_name)\n    FROM sys.dm_exec_sessions\
    \ AS s\n    WHERE s.is_user_process = 1;\n    GO\n```\n\nYour results will vary\
    \ based on how many user requests are active and your host. For my system the\
    \ results looked like Figure [8-1](#525217_1_En_8_Chapter.xhtml#Fig1).\n\nYou\
    \ can see for the second column the results are a JSON text array from several\
    \ columns from the DMV `sys.dm_exec_requests`.\n\n![](Images/525217_1_En_8_Fig2_HTML.png)\n\
    \nA table comprises 4 columns and 13 rows. The columns are titled session I D,\
    \ J SON array, and command. Each column has data underneath, across rows numbered\
    \ 47 through 60.\n\nFigure 8-2\n\nCreating a table with a JSON array string\n\n\
    1.  Execute the statements for `Step 2`, which in the script are the following:\n\
    \n```sql\n    -- Step 2: Create a table based on a JSON array\n    USE master;\n\
    \    GO\n    DROP TABLE IF EXISTS sql_requests_json_array;\n    GO\n    SELECT\
    \ r.session_id, JSON_ARRAY(r.command, r.status, r. database_id, r.wait_type, r.wait_resource,\
    \ s.is_user_process) as json_array, r.command\n    INTO sql_requests_json_array\n\
    \    FROM sys.dm_exec_requests r\n    JOIN sys.dm_exec_sessions s\n    ON r.session_id\
    \ = s.session_id\n    ORDER BY r.session_id;\n    GO\n    SELECT * FROM sql_requests_json_array;\n\
    \    GO\n```\n\nIn this scenario you created a new table, which includes three\
    \ columns. Two of the columns are strings, but only one is formatted as a JSON\
    \ array based on a combination of columns from the DMV.\n\nYour results will vary,\
    \ but here is a portion of the results from my system as seen in Figure [8-2](#525217_1_En_8_Chapter.xhtml#Fig2).\n\
    \n![](Images/525217_1_En_8_Fig3_HTML.jpg)\n\nA table comprises 5 columns and 10\
    \ rows. The columns are titled, is J SON, is J SON object, is J SON array, and\
    \ is J SON. Each column has data given.\n\nFigure 8-3\n\nTesting for a valid JSON\
    \ array\n\n1.  Let’s use `ISJSON` to see which strings in the table are a valid\
    \ JSON array. Execute `Step 3` in the script, which contains the following T-SQL\
    \ statements:\n\n```sql\n    -- Step 3: Use ISJSON to test if JSON data exists\
    \ in the array or other columns\n    USE master;\n    GO\n    SELECT ISJSON(json_array)\
    \ as is_json, ISJSON(json_array, OBJECT) as is_json_object, ISJSON(json_array,\
    \ ARRAY) as is_json_array, ISJSON(command) as is_json\n    FROM sql_requests_json_array;\n\
    \    GO\n    -- Cleanup the table\n    DROP TABLE IF EXISTS sql_requests_json_array;\n\
    \    GO\n```\n\nYou can see from these statements that we test whether the `json_array`\
    \ column is JSON, a JSON object, or a JSON array. We also test whether the column\
    \ `command` is JSON.\n\nOn my system you can see a portion of the results as in\
    \ Figure [8-3](#525217_1_En_8_Chapter.xhtml#Fig3).\n\nYou can see that the `json_array`\
    \ column is valid JSON and a valid JSON array but not a JSON object. The `command`\
    \ column is a string and not valid JSON.\n\nYou can learn more about `JSON_ARRAY`\
    \ at [`https://docs.microsoft.com/sql/t-sql/functions/json-array-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-array-transact-sql)\
    \ and `ISJSON` at [`https://docs.microsoft.com/sql/t-sql/functions/isjson-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/isjson-transact-sql)."
  raw: "## JSON Functions\n\nBy SQL Server 2016 we knew the popularity of processing\
    \ and storing data as JSON was important to new applications and developers. So\
    \ we added into the T-SQL language functions to process JSON data stored as strings\
    \ in SQL Server tables. This included functions to test the existence of JSON,\
    \ extract JSON values, modify JSON parts, and even format results of SQL row data\
    \ into JSON documents. You can see a complete list of these functions at [`https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server).\n\
    \nIn SQL Server 2022, we have enhanced and added new functions to process JSON.\
    \ This includes testing existence of JSON and functions to generate JSON arrays\
    \ and objects. JSON functions do not require a specific dbcompat level.\n\nI turned\
    \ to the longtime SQL veteran Umachandar Jayachandran (UC) to find out our motivation\
    \ to do this new work for JSON. UC told me:\n\n*SQL Server currently has support\
    \ for manipulating and querying JSON data. This approach is based on built-in\
    \ functions, OPENJSON & FOR JSON operators. This functionality implements a subset\
    \ of features specified in JSON specification (RFC 8259) and ANSI SQL standard\
    \ (Part 2: SQL/Foundation) specification. The JSON enhancements in SQL Server\
    \ 2022 provide functionality for some of the additional features in these specifications.\
    \ The ISJSSON function now supports an optional JSON type constraint parameter\
    \ that can be used to test if the input string is a valid JSON scalar, value,\
    \ array, or object per RFC 8259\\. The new JSON_PATH_EXISTS function provides\
    \ a compatible syntax for the JSON_EXISTS predicate in the ANSI SQL standard and\
    \ allows for testing existence of a specific SQL/JSON path in a JSON document.\
    \ The JSON value constructors – JSON_OBJECT and JSON_ARRAY provide ANSI SQL compatible\
    \ functionality for construction of JSON object or array. The JSON value constructors\
    \ also allow construction of complex structures in a JSON document that require\
    \ workarounds or string manipulation in older versions of SQL Server. Together,\
    \ the new JSON enhancements provide rich functionality to manipulate JSON data\
    \ and is a small step towards providing more standard compatible functionality\
    \ in future version(s) of SQL Server.*\n\nThe easiest way to see how these new\
    \ T-SQL statements work is to go through some exercises. I’ve provided prerequisites\
    \ first for the exercises. Then I’ll combine some of the JSON functions together\
    \ in two different exercises.\n\n### Prerequisites for Exercises\n\n*   SQL Server\
    \ 2022 Evaluation Edition.\n\n*   Virtual machine or computer with at least two\
    \ CPUs and at least 8Gb RAM.\n\n*   SQL Server Management Studio (SSMS). The latest\
    \ 18.x build or 19.x build will work.\n\n*   There is no user database required\
    \ for these exercises. They all work from any database context including master.\n\
    \n*   Scripts from the book samples from the **ch08_tsql\\json** folder.\n\n###\
    \ JSON_ARRAY and ISJSON\n\nWhile the FOR JSON clause of a SELECT statement allows\
    \ you to return formatted JSON data, in SQL Server 2022 we have introduced a new\
    \ function to produce JSON array text using an expression, which can be from columns\
    \ in tables. In addition, even though we have had the ISJSON function to test\
    \ for the existence of valid JSON, in SQL Server 2022 we added an option to look\
    \ for a valid JSON array, object, or scalar.\n\nLet’s look at an exercise:\n\n\
    ![](Images/525217_1_En_8_Fig1_HTML.jpg)\n\nA table comprises 3 columns and rows,\
    \ each. The columns are titled session I D, and no column name. Each column has\
    \ data underneath. The rows are numbered 1, 2, and 3.\n\nFigure 8-1\n\nBasic JSON_ARRAY\
    \ results\n\n1.  Open up the script **json_array.sql** to follow multiple steps\
    \ as outlined in the comments of the script.\n\n2.  Execute the T-SQL statements\
    \ for **Step 1**, which in the script are the following:\n\n```\n    -- Step 1:\
    \ Show a simple JSON array\n    USE master;\n    GO\n    SELECT s.session_id,\
    \ JSON_ARRAY(s.host_name, s.program_name)\n    FROM sys.dm_exec_sessions AS s\n\
    \    WHERE s.is_user_process = 1;\n    GO\n    ```\n\nYour results will vary based\
    \ on how many user requests are active and your host. For my system the results\
    \ looked like Figure [8-1](#525217_1_En_8_Chapter.xhtml#Fig1).\n\nYou can see\
    \ for the second column the results are a JSON text array from several columns\
    \ from the DMV **sys.dm_exec_requests**.\n\n![](Images/525217_1_En_8_Fig2_HTML.png)\n\
    \nA table comprises 4 columns and 13 rows. The columns are titled session I D,\
    \ J SON array, and command. Each column has data underneath, across rows numbered\
    \ 47 through 60.\n\nFigure 8-2\n\nCreating a table with a JSON array string\n\n\
    1.  Execute the statements for **Step 2**, which in the script are the following:\n\
    \n```\n    -- Step 2: Create a table based on a JSON array\n    USE master;\n\
    \    GO\n    DROP TABLE IF EXISTS sql_requests_json_array;\n    GO\n    SELECT\
    \ r.session_id, JSON_ARRAY(r.command, r.status, r. database_id, r.wait_type, r.wait_resource,\
    \ s.is_user_process) as json_array, r.command\n    INTO sql_requests_json_array\n\
    \    FROM sys.dm_exec_requests r\n    JOIN sys.dm_exec_sessions s\n    ON r.session_id\
    \ = s.session_id\n    ORDER BY r.session_id;\n    GO\n    SELECT * FROM sql_requests_json_array;\n\
    \    GO\n    ```\n\nIn this scenario you created a new table, which includes three\
    \ columns. Two of the columns are strings, but only one is formatted as a JSON\
    \ array based on a combination of columns from the DMV.\n\nYour results will vary,\
    \ but here is a portion of the results from my system as seen in Figure [8-2](#525217_1_En_8_Chapter.xhtml#Fig2).\n\
    \n![](Images/525217_1_En_8_Fig3_HTML.jpg)\n\nA table comprises 5 columns and 10\
    \ rows. The columns are titled, is J SON, is J SON object, is J SON array, and\
    \ is J SON. Each column has data given.\n\nFigure 8-3\n\nTesting for a valid JSON\
    \ array\n\n1.  Let’s use ISJSON to see which strings in the table are a valid\
    \ JSON array. Execute **Step 3** in the script, which contains the following T-SQL\
    \ statements:\n\n```\n    -- Step 3: Use ISJSON to test if JSON data exists in\
    \ the array or other columns\n    USE master;\n    GO\n    SELECT ISJSON(json_array)\
    \ as is_json, ISJSON(json_array, OBJECT) as is_json_object, ISJSON(json_array,\
    \ ARRAY) as is_json_array, ISJSON(command) as is_json\n    FROM sql_requests_json_array;\n\
    \    GO\n    -- Cleanup the table\n    DROP TABLE IF EXISTS sql_requests_json_array;\n\
    \    GO\n    ```\n\nYou can see from these statements that we test whether the\
    \ json_array column is JSON, a JSON object, or a JSON array. We also test whether\
    \ the column command is JSON.\n\nOn my system you can see a portion of the results\
    \ as in Figure [8-3](#525217_1_En_8_Chapter.xhtml#Fig3).\n\nYou can see that the\
    \ json_array column is valid JSON and a valid JSON array but not a JSON object.\
    \ The command column is a string and not valid JSON.\n\nYou can learn more about\
    \ JSON_ARRAY at [`https://docs.microsoft.com/sql/t-sql/functions/json-array-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-array-transact-sql)\
    \ and ISJSON at [`https://docs.microsoft.com/sql/t-sql/functions/isjson-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/isjson-transact-sql)."
  trans: "\n## JSON 函数\n\n到 SQL Server 2016 时，我们已经了解到，以 JSON 格式处理和存储数据对于新应用和开发者非常重要。因此，我们在\
    \ T-SQL 语言中添加了函数，用于处理存储在 SQL Server 表中以字符串形式存在的 JSON 数据。这些函数包括测试 JSON 的存在性、提取\
    \ JSON 值、修改 JSON 部分，甚至将 SQL 行数据的结果格式化为 JSON 文档。你可以在 [`https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server`](https://docs.microsoft.com/sql/relational-databases/json/json-data-sql-server)\
    \ 查看这些函数的完整列表。\n\n在 SQL Server 2022 中，我们增强并添加了新的 JSON 处理函数。这包括测试 JSON 存在性的函数以及生成\
    \ JSON 数组和对象的函数。JSON 函数不需要特定的 `dbcompat`（数据库兼容性）级别。\n\n我请教了资深 SQL 专家 Umachandar\
    \ Jayachandran (UC)，以了解我们进行这项新的 JSON 工作背后的动机。UC 告诉我：\n\n*SQL Server 当前支持操作和查询\
    \ JSON 数据。该方法基于内置函数、`OPENJSON` 和 `FOR JSON` 运算符。此功能实现了 JSON 规范（RFC 8259）和 ANSI\
    \ SQL 标准（第 2 部分：SQL/基础）规范中指定的特性子集。SQL Server 2022 中的 JSON 增强功能为这些规范中的一些附加特性提供了功能。`ISJSON`\
    \ 函数现在支持一个可选的 JSON 类型约束参数，可用于根据 RFC 8259 测试输入字符串是否为有效的 JSON 标量、值、数组或对象。新的 `JSON_PATH_EXISTS`\
    \ 函数为 ANSI SQL 标准中的 `JSON_EXISTS` 谓词提供了兼容的语法，并允许测试特定 SQL/JSON 路径在 JSON 文档中的存在性。JSON\
    \ 值构造函数 — `JSON_OBJECT` 和 `JSON_ARRAY` 提供了符合 ANSI SQL 标准的用于构造 JSON 对象或数组的功能。JSON\
    \ 值构造函数还允许构造复杂的 JSON 文档结构，这些结构在旧版本的 SQL Server 中需要变通方法或字符串操作。总的来说，新的 JSON 增强功能提供了丰富的功能来操作\
    \ JSON 数据，这是在未来版本的 SQL Server 中提供更多标准兼容功能的一小步。*\n\n了解这些新的 T-SQL 语句如何工作的最简单方法是进行一些练习。我首先提供了练习的先决条件。然后，我将在两个不同的练习中将一些\
    \ JSON 函数结合起来使用。\n\n### 练习的先决条件\n\n*   SQL Server 2022 评估版。\n*   至少有两个 CPU 和至少\
    \ 8GB 内存的虚拟机或计算机。\n*   SQL Server Management Studio (SSMS)。最新的 18.x 或 19.x 版本均可。\n\
    *   这些练习不需要用户数据库。它们都可以在包括 `master` 在内的任何数据库上下文中运行。\n*   来自书籍示例中 `ch08_tsql\\json`\
    \ 文件夹的脚本。\n\n### JSON_ARRAY 和 ISJSON\n\n虽然 `SELECT` 语句的 `FOR JSON` 子句允许你返回格式化的\
    \ JSON 数据，但在 SQL Server 2022 中，我们引入了一个新函数，可以使用表达式（可以来自表中的列）生成 JSON 数组文本。此外，尽管我们已经有\
    \ `ISJSON` 函数来测试有效的 JSON 是否存在，但在 SQL Server 2022 中，我们添加了一个选项，用于查找有效的 JSON 数组、对象或标量。\n\
    \n让我们看一个练习：\n\n![](img/525217_1_En_8_Fig1_HTML.jpg)\n\n一个表包含 3 列和 3 行。列标题为 session\
    \ I D，以及一个无列名的列。每列下方都有数据。行编号为 1、2 和 3。\n\n图 8-1\n\n基本的 JSON_ARRAY 结果\n\n1.  打开脚本\
    \ `json_array.sql`，按照脚本注释中概述的多个步骤进行操作。\n2.  执行 `Step 1` 的 T-SQL 语句，脚本中如下所示：\n\n\
    ```sql\n    -- Step 1: 显示一个简单的 JSON 数组\n    USE master;\n    GO\n    SELECT s.session_id,\
    \ JSON_ARRAY(s.host_name, s.program_name)\n    FROM sys.dm_exec_sessions AS s\n\
    \    WHERE s.is_user_process = 1;\n    GO\n```\n\n你的结果将根据活动的用户请求数量和主机而有所不同。在我的系统上，结果如图\
    \ 8-1 所示。\n\n你可以看到第二列的结果是一个 JSON 文本数组，源自 DMV `sys.dm_exec_requests` 的多个列。\n\n\
    ![](img/525217_1_En_8_Fig2_HTML.png)\n\n一个表包含 4 列和 13 行。列标题为 session I D、J SON\
    \ array 和 command。每列下方都有数据，跨行编号为 47 到 60。\n\n图 8-2\n\n创建包含 JSON 数组字符串的表\n\n1.\
    \  执行 `Step 2` 的语句，脚本中如下所示：\n\n```sql\n    -- Step 2: 基于 JSON 数组创建表\n    USE master;\n\
    \    GO\n    DROP TABLE IF EXISTS sql_requests_json_array;\n    GO\n    SELECT\
    \ r.session_id, JSON_ARRAY(r.command, r.status, r. database_id, r.wait_type, r.wait_resource,\
    \ s.is_user_process) as json_array, r.command\n    INTO sql_requests_json_array\n\
    \    FROM sys.dm_exec_requests r\n    JOIN sys.dm_exec_sessions s\n    ON r.session_id\
    \ = s.session_id\n    ORDER BY r.session_id;\n    GO\n    SELECT * FROM sql_requests_json_array;\n\
    \    GO\n```\n\n在这个场景中，你创建了一个新表，其中包含三列。其中两列是字符串，但只有一列是基于来自 DMV 的列组合格式化为 JSON 数组的。\n\
    \n你的结果会有所不同，但这里是我系统上看到的部分结果，如图 8-2 所示。\n\n![](img/525217_1_En_8_Fig3_HTML.jpg)\n\
    \n一个表包含 5 列和 10 行。列标题为 is J SON、is J SON object、is J SON array 和 is J SON。每列都给出了数据。\n\
    \n图 8-3\n\n测试有效的 JSON 数组\n\n1.  让我们使用 `ISJSON` 来查看表中哪些字符串是有效的 JSON 数组。执行脚本中的 `Step\
    \ 3`，其中包含以下 T-SQL 语句：\n\n```sql\n    -- Step 3: 使用 ISJSON 测试数组或其他列中是否存在 JSON 数据\n\
    \    USE master;\n    GO\n    SELECT ISJSON(json_array) as is_json, ISJSON(json_array,\
    \ OBJECT) as is_json_object, ISJSON(json_array, ARRAY) as is_json_array, ISJSON(command)\
    \ as is_json\n    FROM sql_requests_json_array;\n    GO\n    -- 清理表\n    DROP\
    \ TABLE IF EXISTS sql_requests_json_array;\n    GO\n```\n\n从这些语句中，你可以看到我们测试了 `json_array`\
    \ 列是否是 JSON、JSON 对象或 JSON 数组。我们还测试了 `command` 列是否是 JSON。\n\n在我的系统上，你可以看到部分结果如图\
    \ 8-3 所示。\n\n你可以看到 `json_array` 列是有效的 JSON，并且是有效的 JSON 数组，但不是 JSON 对象。`command`\
    \ 列是一个字符串，不是有效的 JSON。\n\n你可以在 [`https://docs.microsoft.com/sql/t-sql/functions/json-array-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-array-transact-sql)\
    \ 了解更多关于 `JSON_ARRAY` 的信息，在 [`https://docs.microsoft.com/sql/t-sql/functions/isjson-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/isjson-transact-sql)\
    \ 了解更多关于 `ISJSON` 的信息。\n"
- fmt: "### JSON_OBJECT and JSON_PATH_EXISTS\n\n现在让我们通过另一个练习来看看如何在 T-SQL 中使用 JSON\
    \ 对象：\n\n![](Images/525217_1_En_8_Fig4_HTML.png)\n\n一个表格包含 3 列和 8 行。列标题为 `J SON\
    \ underscore object` 和 `command`。每列都有数据，行号从 49 到 56。\n\n图 8-4\n\n创建包含 JSON 对象的表格\n\
    \n1.  加载脚本 **`json_object.sql`** 以遵循脚本注释中概述的多个步骤。\n\n2.  执行脚本中的 **Step 1**，它使用以下语句：\n\
    \n    ```sql\n    -- Step 1: Create a JSON object using same data\n    USE master;\n\
    \    GO\n    DROP TABLE IF EXISTS sql_requests_table_json_object;\n    GO\n  \
    \  SELECT JSON_OBJECT('command': r.command, 'status': r.status, 'database_id':\
    \ r.database_id, 'wait_type': r.wait_type, 'wait_resource': r.wait_resource, 'user':\
    \ s.is_user_process) as json_object, r.command\n    INTO sql_requests_table_json_object\n\
    \    FROM sys.dm_exec_requests r\n    JOIN sys.dm_exec_sessions s\n    ON r.session_id\
    \ = s.session_id\n    ORDER BY r.session_id;\n    GO\n    SELECT * FROM sql_requests_table_json_object;\n\
    \    GO\n    ```\n\n    这次我们使用了与之前构建数组完全相同的列，而是用一系列与 DMV 中的列匹配的字段构建了一个 JSON 对象。图\
    \ [8-4](#525217_1_En_8_Chapter.xhtml#Fig4) 显示了我系统上结果的一部分。\n\n从这个结果中，你可以看到 JSON\
    \ 数组和对象之间的区别。数组只是一个值列表，而对象具有`<field>:<value>`对。\n\n1.  现在执行脚本中的 **Step 2**，它使用以下语句：\n\
    \n    ```sql\n    -- Step 2: See if status exists in the json path of the object\n\
    \    USE master;\n    GO\n    SELECT JSON_PATH_EXISTS(json_object, '$.status'),\
    \ JSON_PATH_EXISTS(command, '$.status')\n    FROM sql_requests_table_json_object;\n\
    \    GO\n    ```\n\n    结果的第一列应为 1，第二列应为 0。这是因为 `status` 字段存在于 `json_object` 列中，但不存在于\
    \ `command` 列的字符串中。\n\n你可以在以下链接了解更多关于 `JSON_OBJECT` 的信息：[`https://docs.microsoft.com/sql/t-sql/functions/json-object-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-object-transact-sql)，以及关于\
    \ `JSON_PATH_EXISTS` 的信息：[`https://docs.microsoft.com/sql/t-sql/functions/json-path-exists-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-path-exists-transact-sql)。\n\
    \n## T-SQL Surface Area\n\nT-SQL 语言有几个新的函数和增强功能，涉及多个领域。因此，我决定将本章的这一部分称为“T-SQL\
    \ Surface Area”，因为我们正在扩展 T-SQL 语言的多个覆盖范围。接下来的每一节都涵盖了一系列这些新的增强功能。与 JSON 一样，学习这些内容的最佳方式是通过练习。\n\
    \n### Prerequisites\n\n以下是本章本节所有练习的先决条件：\n\n*   SQL Server 2022 Evaluation Edition。\n\
    *   至少有两个 CPU 和至少 8GB 内存的虚拟机或计算机。\n*   SQL Server Management Studio (SSMS)。最新的\
    \ 18.x 或 19.x 版本均可使用。\n*   书籍示例中的脚本，位于 **`ch08_tsql\\surfacearea`** 文件夹。\n*  \
    \ 对于 **`IS [NOT] DISTINCT FROM`** 的练习，你需要从 [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
    \ 还原 `WideWorldImporters` 示例备份。所有其他练习都不需要用户数据库。\n*   对于新的 **`WINDOW`** 子句的练习，你将只*检查*示例查询而不执行练习。\n\
    \n### DATETRUNC\n\n基于客户的请求以及对其他数据库产品的响应，我们在 SQL Server 2022 中将 `DATETRUNC` 函数添加到了\
    \ T-SQL 中。Aashna Bafna 是 Conor 团队的软件工程师，她向我讲述了 `DATETRUNC` 背后的故事。Aashna 说：“我们决定实现此功能，以响应大量客户的请求，旨在消除复杂的工作日期截断变通方法，并继续努力使\
    \ T-SQL 查询更快、更用户友好。此外，此功能将使从其他已有日期截断功能的竞争对手数据库迁移到 SQL 更加容易。”\n\n使用以下步骤查看 `DATETRUNC`\
    \ 的练习。此练习不需要用户数据库。可以使用任何数据库上下文，包括 `master`。\n\n1.  加载脚本 **`datetrunc.sql`** 以执行脚本中的多个步骤。\n\
    \n2.  执行脚本中的 **Step 1**，它使用以下 T-SQL 语句：\n\n    ```sql\n    -- Step 1: Truncate\
    \ just the year from a date with a variable\n    USE master;\n    GO\n    DECLARE\
    \ @d date = '2022-05-14';\n    SELECT DATETRUNC(year, @d);\n    GO\n    ```\n\n\
    \    `DATETRUNC` 返回源数据的数据类型，因此返回的结果应该是 `2022-01-01`。\n\n3.  执行脚本中的 **Step 2**，它使用以下\
    \ T-SQL 语句：\n\n    ```sql\n    -- Step 2: Truncate the hour from a granular datetime\
    \ value\n    USE master;\n    GO\n    SELECT DATETRUNC(hour, '1963-12-29 02:04:23.1234567');\n\
    \    GO\n    ```\n\n    由于源是完整的 `datetime` 类型，你的结果应该是：\n\n    ```sql\n    1963-12-29\
    \ 02:00:00.0000000\n    ```\n\n    这是 `datetime` 值向下取整到的小时，但以完整的 `datetime` 值返回。\n\
    \n4.  执行脚本中的 **Step 3**，它使用以下 T-SQL 语句：\n\n    ```sql\n    -- Step 3: Truncate\
    \ to the day of the year\n    USE master;\n    GO\n    SELECT DATETRUNC(dayofyear,\
    \ '1996-03-27 08:05:30');\n    GO\n    ```\n\n    结果应如下所示，这是将 `datetime` 值截断到午夜：\n\
    \n1.  执行脚本中的 **Step 4**，它使用以下 T-SQL 语句：\n\n    ```sql\n    -- Step 4: Truncate\
    \ to the quarter of the year using a date type\n    USE master;\n    GO\n    DECLARE\
    \ @date date = '1993-08-30'\n    SELECT DATETRUNC(Quarter, @date);\n    GO\n \
    \   ```\n\n    因为我们使用的是 `date` 类型，结果应该是该日期所在季度的开始日期，即 `1993-07-01`。\n\n```sql\n\
    1996-03-27 00:00:00.0000000\n```\n\n`DATETRUNC` 函数不需要特定的数据库兼容性级别，你可以在以下链接了解更多：[`https://docs.microsoft.com/sql/t-sql/functions/datetrunc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/datetrunc-transact-sql)。"
  raw: "### JSON_OBJECT and JSON_PATH_EXISTS\n\nNow let’s look at JSON objects with\
    \ T-SQL using another exercise:\n\n![](Images/525217_1_En_8_Fig4_HTML.png)\n\n\
    A table comprises 3 columns and 8 rows. The columns are titled J SON underscore\
    \ object and command. Each column has data underneath, across rows numbered 49\
    \ through 56.\n\nFigure 8-4\n\nCreating a table with a JSON object\n\n1.  Load\
    \ the script **json_object.sql** to follow multiple steps as outlined in the comments\
    \ of the script.\n\n2.  Execute **Step 1** in the script, which uses the following\
    \ statements:\n\n    ```\n    -- Step 1: Create a JSON object using same data\n\
    \    USE master;\n    GO\n    DROP TABLE IF EXISTS sql_requests_table_json_object;\n\
    \    GO\n    SELECT JSON_OBJECT('command': r.command, 'status': r.status, 'database_id':\
    \ r.database_id, 'wait_type': r.wait_type, 'wait_resource': r.wait_resource, 'user':\
    \ s.is_user_process) as json_object, r.command\n    INTO sql_requests_table_json_object\n\
    \    FROM sys.dm_exec_requests r\n    JOIN sys.dm_exec_sessions s\n    ON r.session_id\
    \ = s.session_id\n    ORDER BY r.session_id;\n    GO\n    SELECT * FROM sql_requests_table_json_object;\n\
    \    GO\n    ```\n\n    This time we used the exact same columns previously used\
    \ to build an array and instead built a JSON object with a series of fields matching\
    \ the columns from the DMV. Figure [8-4](#525217_1_En_8_Chapter.xhtml#Fig4) shows\
    \ a portion of the results on my system.\n\nYou can see from this result the difference\
    \ between the JSON array and object. The array was just a list of values, where\
    \ the object has a <field>:<value> pair.\n\n1.  Now execute **Step 2** in the\
    \ script, which uses the following statements:\n\n    ```\n    -- Step 2: See\
    \ if status exists in the json path of the object\n    USE master;\n    GO\n \
    \   SELECT JSON_PATH_EXISTS(json_object, '$.status'), JSON_PATH_EXISTS(command,\
    \ '$.status')\n    FROM sql_requests_table_json_object;\n    GO\n    ```\n\n \
    \   The results should be 1 for the first column and 0 for the second. This is\
    \ because the field status exists in the json_object column but not in the string\
    \ from the command column.\n\nYou can learn more about JSON_OBJECT at [`https://docs.microsoft.com/sql/t-sql/functions/json-object-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-object-transact-sql)\
    \ and JSON_PATH_EXISTS at [`https://docs.microsoft.com/sql/t-sql/functions/json-path-exists-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-path-exists-transact-sql).\n\
    \n## T-SQL Surface Area\n\nThere are several new T-SQL functions and enhancements\
    \ to the language that cross several areas. Therefore, I decided to call this\
    \ section of the chapter “T-SQL Surface Area,” since we are expanding several\
    \ areas of coverage of the T-SQL language. Each following section covers a range\
    \ of these new enhancements. As with JSON, the best way to learn these is through\
    \ exercises.\n\n### Prerequisites\n\nHere are the prerequisites for all the exercises\
    \ in this section of the chapter:\n\n*   SQL Server 2022 Evaluation Edition.\n\
    \n*   Virtual machine or computer with at least two CPUs and at least 8Gb RAM.\n\
    \n*   SQL Server Management Studio (SSMS). The latest 18.x build or 19.x build\
    \ will work.\n\n*   Scripts from the book samples from the **ch08_tsql\\surfacearea**\
    \ folder.\n\n*   For the exercise on **IS [NOT] DISTINCT FROM**, you will need\
    \ to restore the WideWorldImporters sample backup from [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters).\
    \ All other exercises do not require a user database.\n\n*   For the exercise\
    \ on the new **WINDOW** clause, you will only *examine* the example queries and\
    \ not execute the exercise.\n\n### DATETRUNC\n\nBased on requests from our customers\
    \ and response to other database products, we added the DATETRUNC function to\
    \ T-SQL in SQL Server 2022\\. Aashna Bafna is a software engineer on Conor’s team\
    \ and told me the story behind DATETRUNC. Aashna said, “We decided to implement\
    \ this feature in response to numerous customer requests to eliminate the need\
    \ for complex date truncation workarounds and continue our efforts to make T-SQL\
    \ queries faster and more user-friendly. Additionally, this feature will enable\
    \ easier migrations to SQL from other competitors which already have a date truncation\
    \ feature*.”*\n\nUse these steps to see an exercise for DATETRUNC. There is no\
    \ user database required for this exercise. Any database context can be used including\
    \ master.\n\n1.  Load the script **datetrunc.sql** to execute multiple steps in\
    \ the script.\n\n2.  Execute **Step 1** in the script, which uses the following\
    \ T-SQL statements:\n\n    ```\n    -- Step 1: Truncate just the year from a date\
    \ with a variable\n    USE master;\n    GO\n    DECLARE @d date = '2022-05-14';\n\
    \    SELECT DATETRUNC(year, @d);\n    GO\n    ```\n\n    DATETRUNC returns the\
    \ data type of the source, so a date value of `2022-01-01` should be your returned\
    \ result.\n\n3.  Execute **Step 2** in the script, which uses the following T-SQL\
    \ statements:\n\n    ```\n    -- Step 2: Truncate the hour from a granular datetime\
    \ value\n    USE master;\n    GO\n    SELECT DATETRUNC(hour, '1963-12-29 02:04:23.1234567');\n\
    \    GO\n    ```\n\n    Since the source is a full datetime type, your result\
    \ should be\n\n    ```\n    1963-12-29 02:00:00.0000000\n    ```\n\n    This is\
    \ the rounded-down hour for the datetime value but returned as a full datetime\
    \ value.\n\n4.  Execute **Step 3** in the script, which uses the following T-SQL\
    \ statements:\n\n    ```\n    -- Step 3: Truncate to the day of the year\n   \
    \ USE master;\n    GO\n    SELECT DATETRUNC(dayofyear, '1996-03-27 08:05:30');\n\
    \    GO\n    ```\n\n    The result should be the following, which is a truncation\
    \ to midnight of the datetime value:\n\n1.  Execute **Step 4** in the script,\
    \ which uses the following T-SQL statements:\n\n    ```\n    -- Step 4: Truncate\
    \ to the quarter of the year using a date type\n    USE master;\n    GO\n    DECLARE\
    \ @date date = '1993-08-30'\n    SELECT DATETRUNC(Quarter, @date);\n    GO\n \
    \   ```\n\n    Since we are using a date type, the result should be the start\
    \ of the quarter for this date, which is `1993-07-01`.\n\n```\n1996-03-27 00:00:00.0000000\n\
    ```\n\nThe DATETRUNC function does not require a specific dbcompat level, and\
    \ you can learn more at [`https://docs.microsoft.com/sql/t-sql/functions/datetrunc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/datetrunc-transact-sql)."
  trans: "\n### JSON_OBJECT 和 JSON_PATH_EXISTS\n\n现在，让我们通过另一个练习来看看如何在 T-SQL 中使用 JSON\
    \ 对象：\n\n![](img/525217_1_En_8_Fig4_HTML.png)\n\n一个表格包含 3 列和 8 行。列标题为 `J SON underscore\
    \ object` 和 `command`。每列都有数据，行号从 49 到 56。\n\n图 8-4\n\n创建包含 JSON 对象的表格\n\n1.  加载脚本\
    \ **`json_object.sql`** 以遵循脚本注释中概述的多个步骤。\n\n2.  执行脚本中的 **Step 1**，它使用以下语句：\n\n\
    \    ```sql\n    -- 步骤 1：使用相同数据创建一个 JSON 对象\n    USE master;\n    GO\n    DROP\
    \ TABLE IF EXISTS sql_requests_table_json_object;\n    GO\n    SELECT JSON_OBJECT('command':\
    \ r.command, 'status': r.status, 'database_id': r.database_id, 'wait_type': r.wait_type,\
    \ 'wait_resource': r.wait_resource, 'user': s.is_user_process) as json_object,\
    \ r.command\n    INTO sql_requests_table_json_object\n    FROM sys.dm_exec_requests\
    \ r\n    JOIN sys.dm_exec_sessions s\n    ON r.session_id = s.session_id\n   \
    \ ORDER BY r.session_id;\n    GO\n    SELECT * FROM sql_requests_table_json_object;\n\
    \    GO\n    ```\n\n    这次我们使用了与之前构建数组完全相同的列，而是用一系列与 DMV 中的列匹配的字段构建了一个 JSON 对象。图\
    \ 8-4 显示了我系统上结果的一部分。\n\n从这个结果中，你可以看到 JSON 数组和对象之间的区别。数组只是一个值列表，而对象具有`<字段>:<值>`对。\n\
    \n1.  现在执行脚本中的 **Step 2**，它使用以下语句：\n\n    ```sql\n    -- 步骤 2：查看状态是否存在于对象的 JSON\
    \ 路径中\n    USE master;\n    GO\n    SELECT JSON_PATH_EXISTS(json_object, '$.status'),\
    \ JSON_PATH_EXISTS(command, '$.status')\n    FROM sql_requests_table_json_object;\n\
    \    GO\n    ```\n\n    结果的第一列应为 1，第二列应为 0。这是因为 `status` 字段存在于 `json_object` 列中，但不存在于\
    \ `command` 列的字符串中。\n\n你可以在以下链接了解更多关于 `JSON_OBJECT` 的信息：[`https://docs.microsoft.com/sql/t-sql/functions/json-object-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-object-transact-sql)，以及关于\
    \ `JSON_PATH_EXISTS` 的信息：[`https://docs.microsoft.com/sql/t-sql/functions/json-path-exists-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/json-path-exists-transact-sql)。\n\
    \n## T-SQL 功能领域\n\nT-SQL 语言有几个新的函数和增强功能，涉及多个领域。因此，我决定将本章的这一部分称为“T-SQL 功能领域”，因为我们正在扩展\
    \ T-SQL 语言的多个覆盖范围。接下来的每一节都涵盖了一系列这些新的增强功能。与 JSON 一样，学习这些内容的最佳方式是通过练习。\n\n### 先决条件\n\
    \n以下是本章本节所有练习的先决条件：\n\n*   SQL Server 2022 评估版。\n*   至少有两个 CPU 和至少 8GB 内存的虚拟机或计算机。\n\
    *   SQL Server Management Studio (SSMS)。最新的 18.x 或 19.x 版本均可使用。\n*   书籍示例中的脚本，位于\
    \ **`ch08_tsql\\surfacearea`** 文件夹。\n*   对于 **`IS [NOT] DISTINCT FROM`** 的练习，你需要从\
    \ [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters) 还原\
    \ `WideWorldImporters` 示例备份。所有其他练习都不需要用户数据库。\n*   对于新的 **`WINDOW`** 子句的练习，你将只*检查*示例查询而不执行练习。\n\
    \n### DATETRUNC\n\n基于客户的请求以及对其他数据库产品的响应，我们在 SQL Server 2022 中将 `DATETRUNC` 函数添加到了\
    \ T-SQL 中。Aashna Bafna 是 Conor 团队的软件工程师，她向我讲述了 `DATETRUNC` 背后的故事。Aashna 说：“我们决定实现此功能，以响应大量客户的请求，旨在消除复杂的工作日期截断变通方法，并继续努力使\
    \ T-SQL 查询更快、更用户友好。此外，此功能将使从其他已有日期截断功能的竞争对手数据库迁移到 SQL 更加容易。”\n\n使用以下步骤查看 `DATETRUNC`\
    \ 的练习。此练习不需要用户数据库。可以使用任何数据库上下文，包括 `master`。\n\n1.  加载脚本 **`datetrunc.sql`** 以执行脚本中的多个步骤。\n\
    \n2.  执行脚本中的 **Step 1**，它使用以下 T-SQL 语句：\n\n    ```sql\n    -- 步骤 1：使用变量从日期中仅截断年份\n\
    \    USE master;\n    GO\n    DECLARE @d date = '2022-05-14';\n    SELECT DATETRUNC(year,\
    \ @d);\n    GO\n    ```\n\n    `DATETRUNC` 返回源数据的数据类型，因此返回的结果应该是 `2022-01-01`。\n\
    \n3.  执行脚本中的 **Step 2**，它使用以下 T-SQL 语句：\n\n    ```sql\n    -- 步骤 2：从精细的 datetime\
    \ 值中截断小时\n    USE master;\n    GO\n    SELECT DATETRUNC(hour, '1963-12-29 02:04:23.1234567');\n\
    \    GO\n    ```\n\n    由于源是完整的 `datetime` 类型，你的结果应该是：\n\n    ```sql\n    1963-12-29\
    \ 02:00:00.0000000\n    ```\n\n    这是 `datetime` 值向下取整到的小时，但以完整的 `datetime` 值返回。\n\
    \n4.  执行脚本中的 **Step 3**，它使用以下 T-SQL 语句：\n\n    ```sql\n    -- 步骤 3：截断到一年中的某天\n\
    \    USE master;\n    GO\n    SELECT DATETRUNC(dayofyear, '1996-03-27 08:05:30');\n\
    \    GO\n    ```\n\n    结果应如下所示，这是将 `datetime` 值截断到午夜：\n\n1.  执行脚本中的 **Step 4**，它使用以下\
    \ T-SQL 语句：\n\n    ```sql\n    -- 步骤 4：使用 date 类型截断到季度\n    USE master;\n    GO\n\
    \    DECLARE @date date = '1993-08-30'\n    SELECT DATETRUNC(Quarter, @date);\n\
    \    GO\n    ```\n\n    因为我们使用的是 `date` 类型，结果应该是该日期所在季度的开始日期，即 `1993-07-01`。\n\
    \n```sql\n1996-03-27 00:00:00.0000000\n```\n\n`DATETRUNC` 函数不需要特定的数据库兼容性级别，你可以在以下链接了解更多：[`https://docs.microsoft.com/sql/t-sql/functions/datetrunc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/datetrunc-transact-sql)。\n"
- fmt: "### WINDOW Clause\n\nSQL Server has supported powerful analytic T-SQL capabilities\
    \ through functions so users can let the engine do more. One of these T-SQL statements\
    \ is the `OVER` clause to support a *window*. You can read more about how to use\
    \ the `OVER` clause with examples at [`https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql).\n\
    \nI noticed in the enhancements for SQL Server 2022 something called a `WINDOW`\
    \ clause but was not sure how it could be used. So I reached out to Sharanya Bhat,\
    \ a software engineer on Conor’s team, to find out. Sharanya explained it this\
    \ way: “Without the support for `WINDOW` clause, our customers were facing the\
    \ inconvenience of redefining specifications in `OVER` clause for every window\
    \ function in the select list, even if the specifications are identical. There\
    \ were numerous requests from them for this feature and so we decided to implement\
    \ it in SQL Server 2022.”\n\nSharanya provided me an example script, which if\
    \ you restore the AdventureWorks sample database you can try yourself. I’ve provided\
    \ the script `window.sql` so you can examine the difference before and after using\
    \ the `WINDOW` clause.\n\nHere is an example script using `OVER` without the `WINDOW`\
    \ clause:\n\n```sql\n-- Without the WINDOW clause\nSELECT SalesOrderID, ProductID,\
    \ OrderQty\n,SUM(OrderQty) OVER (PARTITION BY SalesOrderID ORDER BY SalesOrderID,\
    \ ProductID ) AS Total\n,AVG(OrderQty) OVER (PARTITION BY SalesOrderID ORDER BY\
    \ SalesOrderID, ProductID) AS \"Avg\"\n,COUNT(OrderQty) OVER (PARTITION BY SalesOrderID\
    \ ORDER BY SalesOrderID, ProductID) AS \"Count\"\nFROM Sales.SalesOrderDetail\n\
    WHERE SalesOrderID IN(43659,43664);\nGO\n```\n\nHere is the same query now using\
    \ the new `WINDOW` clause:\n\n```sql\n-- With the WINDOW clause\nSELECT SalesOrderID,\
    \ ProductID, OrderQty\n,SUM(OrderQty) OVER win1 AS Total\n,AVG(OrderQty) OVER\
    \ win1 AS \"Avg\"\n,COUNT(OrderQty) OVER win1 AS \"Count\"\nFROM Sales.SalesOrderDetail\n\
    WHERE SalesOrderID IN(43659,43664)\nWINDOW win1 AS (PARTITION BY SalesOrderID\
    \ ORDER BY SalesOrderID, ProductID );\nGO\n```\n\nThe new `WINDOW` clause requires\
    \ `dbcompat` 160 to be used, or you will get a syntax error. You can learn more\
    \ about using the `WINDOW` clause at [`https://docs.microsoft.com/sql/t-sql/queries/select-window-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/select-window-transact-sql).\n\
    \n### GREATEST and LEAST\n\nTrying to find values that are the highest or lowest\
    \ among a list and returning a result has typically involved a complex use of\
    \ T-SQL `CASE` statements. In April of 2021, we introduced the T-SQL functions\
    \ `GREATEST` and `LEAST` to Azure SQL Database and Azure SQL Analytics. You can\
    \ read this announcement at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-the-greatest-and-least-t-sql-functions/ba-p/2281726`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-the-greatest-and-least-t-sql-functions/ba-p/2281726).\
    \ We are now bringing these functions into SQL Server 2022.\n\nLet’s see how they\
    \ work from an exercise. There is no user database required for this exercise.\
    \ Any database context can be used including `master`.\n\n1.  Load the script\
    \ `greatest_least.sql`, which contains multiple steps for the exercise.\n2.  Execute\
    \ **Step 1** in the script, which uses the following T-SQL statements:\n\n```sql\n\
    \    -- Step 1: A simple set of numbers\n    USE master;\n    GO\n    SELECT GREATEST(6.5,\
    \ 3.5, 7) as greatest_of_numbers;\n    GO\n    ```\n\nThis is a very simple example\
    \ as the highest of these numbers is `7`.\n3.  Execute **Step 2** in the script,\
    \ which uses the following T-SQL statements:\n\n```sql\n    -- Step 2: Does it\
    \ work even if datatypes are not the same?\n    USE master;\n    GO\n    SELECT\
    \ GREATEST(6.5, 3.5, N'7') as greatest_of_values;\n    GO\n    ```\n\nThe result\
    \ is still `7`, but it is interesting SQL Server can recognize a `7` as higher\
    \ even when it is a character value (it assumes you were comparing all numbers).\n\
    4.  Execute **Step 3** in the script, which uses the following T-SQL statements:\n\
    \n```sql\n    -- Step 3: What about strings?\n    USE master;\n    GO\n    SELECT\
    \ GREATEST('Buffalo Bills', 'Cleveland Browns', 'Dallas Cowboys') as the_best_team\n\
    \    GO\n    ```\n\nThis shows that the engine can compare strings and determine\
    \ the highest character order. It is amazing that SQL Server knows the `Dallas\
    \ Cowboys` are the best team!\n5.  Execute **Step 4** in the script, which uses\
    \ the following T-SQL statements:\n\n```sql\n    -- Step 4: Use it in a comparison\n\
    \    USE master;\n    GO\n    CREATE TABLE dbo.studies (\n    VarX varchar(10)\
    \ NOT NULL,\n    Correlation decimal(4, 3) NULL\n    );\n    INSERT INTO dbo.studies\
    \ VALUES ('Var1', 0.2), ('Var2', 0.825), ('Var3', 0.61);\n    GO\n    DECLARE\
    \ @PredictionA DECIMAL(4,3) = 0.7;\n    DECLARE @PredictionB DECIMAL(4,3) = 0.65;\n\
    \    SELECT VarX, Correlation\n    FROM dbo.studies\n    WHERE Correlation > GREATEST(@PredictionA,\
    \ @PredictionB);\n    GO\n    ```\n\nHere is an example where `GREATEST` can be\
    \ used to do a comparison to a column in a `WHERE` clause. The results for this\
    \ query should be one row with the following values:\n\n```sql\n    VarX    Correlation\n\
    \    Var2    0.825\n    ```\n6.  Let’s look at a simple example for `LEAST`. Execute\
    \ **Step 5** in the script, which uses the following T-SQL statements:\n\n```sql\n\
    \    -- Step 5: Simple LEAST example\n    USE master;\n    GO\n    SELECT LEAST(6.5,\
    \ 3.5, 7) as least_of_numbers;\n    GO\n    ```\n\nYour result should be `3.5`.\n\
    7.  Execute **Step 6** in the script, which uses the following T-SQL statements:\n\
    \n```sql\n    -- Step 6: Combine with variables\n    USE master;\n    GO\n   \
    \ DECLARE @VarX decimal(4, 3) = 0.59;\n    SELECT VarX, Correlation, LEAST(Correlation,\
    \ 1.0, @VarX) AS LeastVar\n    FROM dbo.studies;\n    GO\n    -- Clean up table\n\
    \    DROP TABLE IF EXISTS studies;\n    GO\n    ```\n\nThis is an example of using\
    \ variables with the `LEAST` function. Your results should have three rows like\
    \ this:\n\n```sql\n    VarX    Correlation    LeastVar\n    Var1    0.200    \
    \      0.200\n    Var2    0.825          0.590\n    Var3    0.610          0.590\n\
    \    ```\n\n`GREATEST` and `LEAST` do not require a specific `dbcompat` level.\
    \ You can learn more about `GREATEST` at [`https://docs.microsoft.com/sql/t-sql/functions/logical-functions-greatest-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/logical-functions-greatest-transact-sql)\
    \ and `LEAST` at [`https://docs.microsoft.com/sql/t-sql/functions/logical-functions-least-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/logical-functions-least-transact-sql)."
  raw: "### WINDOW Clause\n\nSQL Server has supported powerful analytic T-SQL capabilities\
    \ through functions so users can let the engine do more. One of these T-SQL statements\
    \ is the OVER clause to support a *window*. You can read more about how to use\
    \ the OVER clause with examples at [`https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql).\n\
    \nI noticed in the enhancements for SQL Server 2022 something called a WINDOW\
    \ clause but was not sure how it could be used. So I reached out to Sharanya Bhat,\
    \ a software engineer on Conor’s team, to find out. Sharanya explained it this\
    \ way: “Without the support for Window clause, our customers were facing the inconvenience\
    \ of redefining specifications in OVER clause for every window function in the\
    \ select list, even if the specifications are identical. There were numerous requests\
    \ from them for this feature and so we decided to implement it in SQL Server 2022.”\n\
    \nSharanya provided me an example script, which if you restore the AdventureWorks\
    \ sample database you can try yourself. I’ve provided the script **window.sql**\
    \ so you can examine the difference before and after using the WINDOW clause.\n\
    \nHere is an example script using OVER without the WINDOW clause:\n\n```\n-- Without\
    \ the WINDOW clause\nSELECT SalesOrderID, ProductID, OrderQty\n,SUM(OrderQty)\
    \ OVER (PARTITION BY SalesOrderID ORDER BY SalesOrderID, ProductID ) AS Total\n\
    ,AVG(OrderQty) OVER (PARTITION BY SalesOrderID ORDER BY SalesOrderID, ProductID)\
    \ AS \"Avg\"\n,COUNT(OrderQty) OVER (PARTITION BY SalesOrderID ORDER BY SalesOrderID,\
    \ ProductID) AS \"Count\"\nFROM Sales.SalesOrderDetail\nWHERE SalesOrderID IN(43659,43664);\n\
    GO\n```\n\nHere is the same query now using the new WINDOW clause:\n\n```\n--\
    \ With the WINDOW clause\nSELECT SalesOrderID, ProductID, OrderQty\n,SUM(OrderQty)\
    \ OVER win1 AS Total\n,AVG(OrderQty) OVER win1 AS \"Avg\"\n,COUNT(OrderQty) OVER\
    \ win1 AS \"Count\"\nFROM Sales.SalesOrderDetail\nWHERE SalesOrderID IN(43659,43664)\n\
    WINDOW win1 AS (PARTITION BY SalesOrderID ORDER BY SalesOrderID, ProductID );\n\
    GO\n```\n\nThe new WINDOW clause requires dbcompat 160 to be used, or you will\
    \ get a syntax error. You can learn more about using the WINDOW clause at [`https://docs.microsoft.com/sql/t-sql/queries/select-window-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/select-window-transact-sql).\n\
    \n### GREATEST and LEAST\n\nTrying to find values that are the highest or lowest\
    \ among a list and returning a result has typically involved a complex use of\
    \ T-SQL CASE statements. In April of 2021, we introduced the T-SQL functions GREATEST\
    \ and LEAST to Azure SQL Database and Azure SQL Analytics. You can read this announcement\
    \ at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-the-greatest-and-least-t-sql-functions/ba-p/2281726`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-the-greatest-and-least-t-sql-functions/ba-p/2281726).\
    \ We are now bringing these functions into SQL Server 2022.\n\nLet’s see how they\
    \ work from an exercise. There is no user database required for this exercise.\
    \ Any database context can be used including master.\n\n1.  Load the script **greatest_least.sql**,\
    \ which contains multiple steps for the exercise.\n\n2.  Execute **Step 1** in\
    \ the script, which uses the following T-SQL statements:\n\n```\n    -- Step 1:\
    \ A simple set of numbers\n    USE master;\n    GO\n    SELECT GREATEST(6.5, 3.5,\
    \ 7) as greatest_of_numbers;\n    GO\n    ```\n\nThis is a very simple example\
    \ as the highest of these numbers is `7`.\n\n3.  Execute **Step 2** in the script,\
    \ which uses the following T-SQL statements:\n\n```\n    -- Step 2: Does it work\
    \ even if datatypes are not the same?\n    USE master;\n    GO\n    SELECT GREATEST(6.5,\
    \ 3.5, N'7') as greatest_of_values;\n    GO\n    ```\n\nThe result is still 7,\
    \ but it is interesting SQL Server can recognize a 7 as higher even when it is\
    \ a character value (it assumes you were comparing all numbers).\n\n4.  Execute\
    \ **Step 3** in the script, which uses the following T-SQL statements:\n\n```\n\
    \    -- Step 3: What about strings?\n    USE master;\n    GO\n    SELECT GREATEST('Buffalo\
    \ Bills', 'Cleveland Browns', 'Dallas Cowboys') as the_best_team\n    GO\n   \
    \ ```\n\nThis shows that the engine can compare strings and determine the highest\
    \ character order. It is amazing that SQL Server knows the `Dallas Cowboys` are\
    \ the best team!\n\n5.  Execute **Step 4** in the script, which uses the following\
    \ T-SQL statements:\n\n```\n    -- Step 4: Use it in a comparison\n    USE master;\n\
    \    GO\n    CREATE TABLE dbo.studies (\n    VarX varchar(10) NOT NULL,\n    Correlation\
    \ decimal(4, 3) NULL\n    );\n    INSERT INTO dbo.studies VALUES ('Var1', 0.2),\
    \ ('Var2', 0.825), ('Var3', 0.61);\n    GO\n    DECLARE @PredictionA DECIMAL(4,3)\
    \ = 0.7;\n    DECLARE @PredictionB DECIMAL(4,3) = 0.65;\n    SELECT VarX, Correlation\n\
    \    FROM dbo.studies\n    WHERE Correlation > GREATEST(@PredictionA, @PredictionB);\n\
    \    GO\n    ```\n\nHere is an example where GREATEST can be used to do a comparison\
    \ to a column in a WHERE clause. The results for this query should be one row\
    \ with the following values:\n\n```\n    VarX    Correlation\n    Var2    0.825\n\
    \    ```\n\n6.  Let’s look at a simple example for LEAST. Execute **Step 5** in\
    \ the script, which uses the following T-SQL statements:\n\n```\n    -- Step 5:\
    \ Simple LEAST example\n    USE master;\n    GO\n    SELECT LEAST(6.5, 3.5, 7)\
    \ as least_of_numbers;\n    GO\n    ```\n\nYour result should be `3.5`.\n\n7.\
    \  Execute **Step 6** in the script, which uses the following T-SQL statements:\n\
    \n```\n    -- Step 6: Combine with variables\n    USE master;\n    GO\n    DECLARE\
    \ @VarX decimal(4, 3) = 0.59;\n    SELECT VarX, Correlation, LEAST(Correlation,\
    \ 1.0, @VarX) AS LeastVar\n    FROM dbo.studies;\n    GO\n    -- Clean up table\n\
    \    DROP TABLE IF EXISTS studies;\n    GO\n    ```\n\nThis is an example of using\
    \ variables with the LEAST function. Your results should have three rows like\
    \ this:\n\n```\n    VarX    Correlation    LeastVar\n    Var1    0.200       \
    \   0.200\n    Var2    0.825          0.590\n    Var3    0.610          0.590\n\
    \    ```\n\nGREATEST and LEAST do not require a specific dbcompat level. You can\
    \ learn more about GREATEST at [`https://docs.microsoft.com/sql/t-sql/functions/logical-functions-greatest-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/logical-functions-greatest-transact-sql)\
    \ and LEAST at [`https://docs.microsoft.com/sql/t-sql/functions/logical-functions-least-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/logical-functions-least-transact-sql)."
  trans: "\n### WINDOW 子句\n\nSQL Server 通过函数支持了强大的分析 T-SQL 功能，让用户能利用引擎完成更多工作。其中一项\
    \ T-SQL 语句是用于支持*窗口*的 `OVER` 子句。你可以在 [`https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/select-over-clause-transact-sql)\
    \ 阅读更多关于如何使用 `OVER` 子句的示例。\n\n我在 SQL Server 2022 的增强功能中注意到了一个叫 `WINDOW` 子句的东西，但不确定它该如何使用。于是，我联系了\
    \ Conor 团队的软件工程师 Sharanya Bhat 来了解情况。Sharanya 这样解释道：“在没有 `WINDOW` 子句支持的情况下，我们的客户即使在各个窗口函数的规格完全相同，也必须在\
    \ `OVER` 子句中为 SELECT 列表里的每个窗口函数重复定义规格，这带来了不便。他们对此功能提出了大量需求，因此我们决定在 SQL Server\
    \ 2022 中实现它。”\n\nSharanya 提供了一个示例脚本，如果你恢复了 AdventureWorks 示例数据库，可以自己尝试一下。我提供了脚本\
    \ `window.sql`，以便你可以在使用 `WINDOW` 子句前后检查其差异。\n\n这是一个不使用 `WINDOW` 子句的 `OVER` 示例脚本：\n\
    \n```sql\n-- 不使用 WINDOW 子句\nSELECT SalesOrderID, ProductID, OrderQty\n,SUM(OrderQty)\
    \ OVER (PARTITION BY SalesOrderID ORDER BY SalesOrderID, ProductID ) AS Total\n\
    ,AVG(OrderQty) OVER (PARTITION BY SalesOrderID ORDER BY SalesOrderID, ProductID)\
    \ AS \"Avg\"\n,COUNT(OrderQty) OVER (PARTITION BY SalesOrderID ORDER BY SalesOrderID,\
    \ ProductID) AS \"Count\"\nFROM Sales.SalesOrderDetail\nWHERE SalesOrderID IN(43659,43664);\n\
    GO\n```\n\n这是使用新的 `WINDOW` 子句的相同查询：\n\n```sql\n-- 使用 WINDOW 子句\nSELECT SalesOrderID,\
    \ ProductID, OrderQty\n,SUM(OrderQty) OVER win1 AS Total\n,AVG(OrderQty) OVER\
    \ win1 AS \"Avg\"\n,COUNT(OrderQty) OVER win1 AS \"Count\"\nFROM Sales.SalesOrderDetail\n\
    WHERE SalesOrderID IN(43659,43664)\nWINDOW win1 AS (PARTITION BY SalesOrderID\
    \ ORDER BY SalesOrderID, ProductID );\nGO\n```\n\n新的 `WINDOW` 子句需要 `dbcompat`\
    \ 为 160 才能使用，否则会报语法错误。你可以在 [`https://docs.microsoft.com/sql/t-sql/queries/select-window-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/select-window-transact-sql)\
    \ 了解更多关于 `WINDOW` 子句的使用方法。\n\n### GREATEST 和 LEAST\n\n过去，要在一个列表中找出最高或最低的值并返回结果，通常需要复杂的\
    \ T-SQL `CASE` 语句。2021 年 4 月，我们将 T-SQL 函数 `GREATEST` 和 `LEAST` 引入了 Azure SQL Database\
    \ 和 Azure SQL Analytics。你可以在 [`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-the-greatest-and-least-t-sql-functions/ba-p/2281726`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-the-greatest-and-least-t-sql-functions/ba-p/2281726)\
    \ 阅读该公告。我们现在将这些函数引入了 SQL Server 2022。\n\n让我们通过一个练习来看看它们是如何工作的。此练习不需要任何用户数据库。可以使用任何数据库上下文，包括\
    \ `master`。\n\n1.  加载脚本 `greatest_least.sql`，其中包含了此练习的多个步骤。\n2.  执行脚本中的**步骤 1**，该步骤使用以下\
    \ T-SQL 语句：\n\n```sql\n    -- 步骤 1：一组简单的数字\n    USE master;\n    GO\n    SELECT\
    \ GREATEST(6.5, 3.5, 7) as greatest_of_numbers;\n    GO\n    ```\n\n    这是一个非常简单的例子，这些数字中的最高值是\
    \ `7`。\n3.  执行脚本中的**步骤 2**，该步骤使用以下 T-SQL 语句：\n\n```sql\n    -- 步骤 2：即使数据类型不同也能工作吗？\n\
    \    USE master;\n    GO\n    SELECT GREATEST(6.5, 3.5, N'7') as greatest_of_values;\n\
    \    GO\n    ```\n\n    结果仍然是 `7`，但有趣的是 SQL Server 能够识别字符值 `7` 更大（它假设你是在比较数字）。\n\
    4.  执行脚本中的**步骤 3**，该步骤使用以下 T-SQL 语句：\n\n```sql\n    -- 步骤 3：字符串呢？\n    USE master;\n\
    \    GO\n    SELECT GREATEST('Buffalo Bills', 'Cleveland Browns', 'Dallas Cowboys')\
    \ as the_best_team\n    GO\n    ```\n\n    这表明引擎可以比较字符串并确定最高的字符排序顺序。令人惊讶的是，SQL\
    \ Server 知道 `Dallas Cowboys` 是最好的球队！\n5.  执行脚本中的**步骤 4**，该步骤使用以下 T-SQL 语句：\n\n\
    ```sql\n    -- 步骤 4：在比较中使用它\n    USE master;\n    GO\n    CREATE TABLE dbo.studies\
    \ (\n    VarX varchar(10) NOT NULL,\n    Correlation decimal(4, 3) NULL\n    );\n\
    \    INSERT INTO dbo.studies VALUES ('Var1', 0.2), ('Var2', 0.825), ('Var3', 0.61);\n\
    \    GO\n    DECLARE @PredictionA DECIMAL(4,3) = 0.7;\n    DECLARE @PredictionB\
    \ DECIMAL(4,3) = 0.65;\n    SELECT VarX, Correlation\n    FROM dbo.studies\n \
    \   WHERE Correlation > GREATEST(@PredictionA, @PredictionB);\n    GO\n    ```\n\
    \n    这是一个 `GREATEST` 可用于在 `WHERE` 子句中进行比较的例子。此查询的结果应为一行，包含以下值：\n\n```sql\n  \
    \  VarX    Correlation\n    Var2    0.825\n    ```\n6.  让我们看一个 `LEAST` 的简单例子。执行脚本中的**步骤\
    \ 5**，该步骤使用以下 T-SQL 语句：\n\n```sql\n    -- 步骤 5：简单的 LEAST 例子\n    USE master;\n\
    \    GO\n    SELECT LEAST(6.5, 3.5, 7) as least_of_numbers;\n    GO\n    ```\n\
    \n    你的结果应为 `3.5`。\n7.  执行脚本中的**步骤 6**，该步骤使用以下 T-SQL 语句：\n\n```sql\n    -- 步骤\
    \ 6：与变量结合使用\n    USE master;\n    GO\n    DECLARE @VarX decimal(4, 3) = 0.59;\n\
    \    SELECT VarX, Correlation, LEAST(Correlation, 1.0, @VarX) AS LeastVar\n  \
    \  FROM dbo.studies;\n    GO\n    -- 清理表\n    DROP TABLE IF EXISTS studies;\n\
    \    GO\n    ```\n\n    这是一个将变量与 `LEAST` 函数结合使用的例子。你的结果应有三行，如下所示：\n\n```sql\n\
    \    VarX    Correlation    LeastVar\n    Var1    0.200          0.200\n    Var2\
    \    0.825          0.590\n    Var3    0.610          0.590\n    ```\n\n`GREATEST`\
    \ 和 `LEAST` 不需要特定的 `dbcompat` 级别。你可以在 [`https://docs.microsoft.com/sql/t-sql/functions/logical-functions-greatest-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/logical-functions-greatest-transact-sql)\
    \ 了解更多关于 `GREATEST` 的信息，在 [`https://docs.microsoft.com/sql/t-sql/functions/logical-functions-least-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/logical-functions-least-transact-sql)\
    \ 了解更多关于 `LEAST` 的信息。\n"
- fmt: "### IS [NOT] DISTINCT FROM\n\n可能许多使用 SQL 的人认为引入 NULL 值可能是该语言历史上最糟糕的错误，因为 NULL\
    \ 意味着*未知*。与其在本书中争论这一点，不如看一个例子，我们试图通过它来帮助处理一些涉及 NULL 值的有趣场景。我们引入了一种新语法，称为 `IS [NOT]\
    \ DISTINCT FROM`。要了解这个新语法如何帮助处理 NULL，没有比请教著名的 Itzik Ben-Gan 更合适的人了。据我所知，Itzik\
    \ 可能是 Microsoft 内外对 T-SQL 最了解的人。他写了以下博文，讨论了 SQL Server 2022 中新的 T-SQL 增强功能：[`https://sqlperformance.com/2022/08/sql-server-2022/additional-t-sql-improvements-in-sql-server-2022`](https://sqlperformance.com/2022/08/sql-server-2022/additional-t-sql-improvements-in-sql-server-2022)。在这篇文章中，他通过处理\
    \ NULL 值问题的例子讨论了其复杂性。\n\n我对 Itzik 博客中的例子进行了一些调整，形成了一道练习，以便你了解我们的新语法将如何帮助你查询 NULL\
    \ 值，同时还能获得良好的执行计划。\n\n正如我在本节开头提到的，你需要从 [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
    \ 恢复 `WideWorldImporters` 示例数据库备份，才能进行此练习。\n\n1.  执行脚本 `setup_isnotdistinct.sql`，在\
    \ `Sales.Order` 表的 `PickingCompletedWhen` 列上创建一个新索引。此脚本执行以下 T-SQL 语句：\n\n    ```\n\
    \    USE [WideWorldImporters];\n    GO\n    DROP INDEX IF EXISTS Sales.Orders.pickingdateidx;\n\
    \    GO\n    CREATE INDEX pickingdateidx ON Sales.Orders (PickingCompletedWhen);\n\
    \    GO\n    ```\n\n2.  加载脚本 `isnotdistinct.sql` 以运行多个步骤。对于每个步骤，在 SSMS 中启用“包含实际执行计划”。\n\
    \n3.  执行脚本中的 **步骤 1**，它使用以下语句：\n\n    ```\n    -- Step 1: Query for a specific\
    \ value which should yield 35 rows using an Index Seek for pickingdateidx\n  \
    \  USE [WideWorldImporters];\n    GO\n    DECLARE @dt datetime2 = '2013-01-01\
    \ 12:00:00.0000000'\n    SELECT * FROM Sales.Orders WHERE\n    PickingCompletedWhen\
    \ = @dt;\n    GO\n    ```\n\n    这会生成 35 行，并对新索引使用索引查找。\n\n4.  执行脚本中的 **步骤 2**，它使用以下语句：\n\
    \n    ```\n    -- Step 2: Find all the orders where picking was not completed.\
    \ This shows 0 rows even though there is ~ 3000 rows with a NULL value\n    USE\
    \ [WideWorldImporters];\n    GO\n    DECLARE @dt datetime2 = NULL\n    SELECT\
    \ * FROM Sales.Orders WHERE\n    PickingCompletedWhen = @dt;\n    GO\n    ```\n\
    \n    这显示 0 行，尽管有大约 3000 行的值是 NULL。\n\n5.  执行脚本中的 **步骤 3**，它使用以下语句：\n\n    ```\n\
    \    -- Step 3: Try to use ISNULL. Works but requires a scan\n    USE [WideWorldImporters];\n\
    \    GO\n    DECLARE @dt AS DATE = NULL;\n    SELECT * FROM Sales.Orders\n   \
    \ WHERE ISNULL(PickingCompletedWhen, '99991231') = ISNULL(@dt, '99991231');\n\
    \    GO\n    ```\n\n    这有效并给出了正确的结果，但需要索引扫描。\n\n6.  执行脚本中的 **步骤 4**，它使用以下语句：\n\
    \n    ```\n    -- Step 4: Try to use the new operator. Should yield ~3000 rows\
    \ but use an index seek\n    USE [WideWorldImporters];\n    GO\n    DECLARE @dt\
    \ datetime2 = NULL\n    SELECT *\n    FROM Sales.Orders\n    WHERE PickingCompletedWhen\
    \ IS NOT DISTINCT FROM @dt;\n    GO\n    ```\n\n    现在我们得到了正确的结果，并且使用了索引查找。有了这个新运算符，我们实现了\
    \ Itzik 所说的搜索参数或 SARG，这允许使用索引。\n\n`IS [NOT] DISTINCT FROM` 不需要特定的数据库兼容性级别。你可以在\
    \ [`https://docs.microsoft.com/sql/t-sql/queries/is-distinct-from-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/is-distinct-from-transact-sql)\
    \ 阅读更多关于这个新语法的信息。\n\nNicholas Simmons 是 Conor 团队的软件工程师，他开发了这个新的增强功能，他总结了这项重要工作：“`IS\
    \ [NOT] DISTINCT FROM` 允许用户在值之间进行相等和不等比较，同时保证结果为 `true` 或 `false`。`NULL = NULL`\
    \ 会返回未知，而 `NULL IS NOT DISTINCT FROM NULL` 会返回 `true`。`NULL != NULL` 会返回未知，而 `NULL\
    \ IS DISTINCT FROM NULL` 会返回 `false`。这种语法是比较这些值的更简洁方式，并且可以在 `ANSI_NULLS` 设置不适用的场景中使用。这是在\
    \ SQL22 中添加 `IS [NOT] DISTINCT FROM` 的主要动机。它为用户提供了一种更清晰的方式来进行这些比较，并且可以在任何地方使用，不受\
    \ `ANSI_NULLS` 设置为 `OFF` 时进行这些比较的限制。”\n\n### STRING_SPLIT\n\nSQL Server 有多个 T-SQL\
    \ 函数来帮助你在表数据中操作和搜索字符串数据。这些函数的完整列表可以在 [`https://docs.microsoft.com/sql/t-sql/functions/string-functions-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/string-functions-transact-sql)\
    \ 找到。\n\n`STRING_SPLIT` 是我们在 SQL Server 2016 中引入的一个函数。它需要数据库兼容性级别 130 或更高才能使用。`STRING_SPLIT`\
    \ 非常方便将字符串“拆分”为单独的字符串值。此函数的一个限制是，新拆分的值没有*序号*。换句话说，不能保证返回值的顺序。SQL Server 2022 提供了一个新的增强功能来包含序号。我发现了\
    \ SQL 社区传奇成员 Aaron Bertrand（也是《SQL Server 2019 Revealed》的技术审阅者）的这篇优秀博文：[`www.mssqltips.com/sqlservertip/7265/sql-server-2022-t-sql-enhancements`](http://www.mssqltips.com/sqlservertip/7265/sql-server-2022-t-sql-enhancements)。\n\
    \n让我们看看基于 Aaron 发布内容的一个练习。此练习不需要用户数据库。可以使用任何数据库上下文，包括 `master`。\n\n1.  加载脚本 `string_split.sql`，其中包含多个步骤。\n\
    \n2.  执行脚本中的 **步骤 1**，它使用以下语句：\n\n    ```\n    -- Step 1: Use STRING_SPLIT to\
    \ get back a list of NFL teams. There is no guarantee for the order but it may\
    \ work.\n    USE master;\n    GO\n    DECLARE @nflteams NVARCHAR(max) = N'Cowboys,Browns,Seahawks,Broncos,Eagles';\n\
    \    SELECT value as nfl_team FROM STRING_SPLIT(@nflteams, N',');\n    GO\n  \
    \  ```\n\n    你的结果可能会有所不同，因为结果的顺序没有保证。你应该为 `@nflteams` 变量中的每个字符串“部分”返回五行。\n\n\
    3.  执行脚本中的 **步骤 2**，它使用以下语句：\n\n    ```\n    -- Step 2: Use the new ordinal option\
    \ to ensure order without a sort\n    USE master;\n    GO\n    DECLARE @nflteams\
    \ NVARCHAR(max) = N'Cowboys,Browns,Seahawks,Broncos,Eagles';\n    SELECT value\
    \ as nfl_team, ordinal as rank FROM STRING_SPLIT(@nflteams, N',', 1)\n    ORDER\
    \ BY ordinal;\n    GO\n    ```\n\n    这使用了新的序号语法。`STRING_SPLIT` 的第三个参数是 `0` 或\
    \ `1`。`1` 表示启用序号。然后我们可以在结果中将关键字 `ordinal` 作为一个列使用。SQL Server 再次认可这里的排名顺序是合理的——牛仔队排第一，老鹰队排最后。\n\
    \n你可以在 [`https://docs.microsoft.com/sql/t-sql/functions/string-split-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/string-split-transact-sql)\
    \ 阅读更多关于 `STRING_SPLIT` 的详细信息和示例。"
  raw: "### IS [NOT] DISTINCT FROM\n\nThere may be many who use SQL who think the\
    \ introduction of a NULL value could have been the worst mistake in the history\
    \ of the language because NULL means *unknown*. Rather than debate that here in\
    \ the book, let’s see an example where we are trying to help with some interesting\
    \ scenarios involving NULL values. We have introduced a new syntax called IS [NOT]\
    \ DISTINCT FROM. What better person to turn to for how this new syntax helps with\
    \ NULL than the famous Itzik Ben-Gan. Itzik may be the most knowledgeable person\
    \ on T-SQL I know in or out of Microsoft. He wrote the following blog post talking\
    \ about new SQL Server 2022 T-SQL enhancements at [`https://sqlperformance.com/2022/08/sql-server-2022/additional-t-sql-improvements-in-sql-server-2022`](https://sqlperformance.com/2022/08/sql-server-2022/additional-t-sql-improvements-in-sql-server-2022).\
    \ In this article he talked about the complexity of handling NULL values with\
    \ examples of this problem.\n\nI took the examples in Itzik’s blog post and made\
    \ some tweaks. The result is an exercise so you can see how our new syntax will\
    \ help you query for NULL values but also achieve a good execution plan.\n\nAs\
    \ I mentioned in the beginning of this section, you will need to restore the WideWorldImporters\
    \ sample database backup from [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
    \ in order to go through this exercise.\n\n1.  Execute the script **setup_isnotdistinct.sql**\
    \ to create a new index on the Sales.Order table for the PickingCompletedWhen\
    \ column. This script executes the following T-SQL statements:\n\n```\n    USE\
    \ [WideWorldImporters];\n    GO\n    DROP INDEX IF EXISTS Sales.Orders.pickingdateidx;\n\
    \    GO\n    CREATE INDEX pickingdateidx ON Sales.Orders (PickingCompletedWhen);\n\
    \    GO\n    ```\n\n2.  Load the script **isnotdistinct.sql** to run multiple\
    \ steps. For each step enable **Include Actual Execution Plan** in SSMS.\n\n3.\
    \  Execute **Step 1** in the script, which uses the following statements:\n\n\
    ```\n    -- Step 1: Query for a specific value which should yield 35 rows using\
    \ an Index Seek for pickingdateidx\n    USE [WideWorldImporters];\n    GO\n  \
    \  DECLARE @dt datetime2 = '2013-01-01 12:00:00.0000000'\n    SELECT * FROM Sales.Orders\
    \ WHERE\n    PickingCompletedWhen = @dt;\n    GO\n    ```\n\nThis yields 35 rows\
    \ and uses an index seek for the new index.\n\n4.  Execute **Step 2** from the\
    \ script, which uses the following statements:\n\n```\n    -- Step 2: Find all\
    \ the orders where picking was not completed. This shows 0 rows even though there\
    \ is ~ 3000 rows with a NULL value\n    USE [WideWorldImporters];\n    GO\n  \
    \  DECLARE @dt datetime2 = NULL\n    SELECT * FROM Sales.Orders WHERE\n    PickingCompletedWhen\
    \ = @dt;\n    GO\n    ```\n\nThis shows 0 rows even though there are ~3000 rows\
    \ with a NULL value.\n\n5.  Execute **Step 3** in the script, which uses the following\
    \ statements:\n\n```\n    -- Step 3: Try to use ISNULL. Works but requires a scan\n\
    \    USE [WideWorldImporters];\n    GO\n    DECLARE @dt AS DATE = NULL;\n    SELECT\
    \ * FROM Sales.Orders\n    WHERE ISNULL(PickingCompletedWhen, '99991231') = ISNULL(@dt,\
    \ '99991231');\n    GO\n    ```\n\nThis works and gives the right results but\
    \ requires an index scan.\n\n6.  Execute **Step 4** in the script, which uses\
    \ the following statements:\n\n```\n    -- Step 4: Try to use the new operator.\
    \ Should yield ~3000 rows but use an index seek\n    USE [WideWorldImporters];\n\
    \    GO\n    DECLARE @dt datetime2 = NULL\n    SELECT *\n    FROM Sales.Orders\n\
    \    WHERE PickingCompletedWhen IS NOT DISTINCT FROM @dt;\n    GO\n    ```\n\n\
    Now we get the right results, but also an index seek is used. Now with this new\
    \ operator, we have achieved what Itzik calls a search argument or SARG, which\
    \ allows the index to be used.\n\nIS [NOT] DISTINCT FROM does not require a specific\
    \ dbcompat level. You can read more about this new syntax at [`https://docs.microsoft.com/sql/t-sql/queries/is-distinct-from-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/is-distinct-from-transact-sql).\n\
    \nNicholas Simmons, a software engineer who works on Conor’s team who developed\
    \ this new enhancement, summarized this important work: “IS [NOT] DISTINCT FROM\
    \ allows users to make equality and inequality comparisons between values while\
    \ guaranteeing a true or false result. Where NULL = NULL would return unknown,\
    \ NULL IS NOT DISTINCT FROM NULL would return true. Where NULL != NULL would return\
    \ unknown, NULL IS DISTINCT FROM NULL would return false. This syntax is a more\
    \ succinct way to make these comparisons, and it can be used in scenarios where\
    \ the ANSI_NULLS setting does not apply. This is the main motivation for the addition\
    \ of IS [NOT] DISTINCT FROM in SQL22\\. It gives users a cleaner way to make these\
    \ comparisons, and it can be used anywhere without the limitations involved with\
    \ making these comparisons when ANSI_NULLS is set to OFF*.”*\n\n### STRING_SPLIT\n\
    \nSQL Server has several T-SQL functions to help you manipulate and search string\
    \ data inside table data. The complete list of these functions can be found at\
    \ [`https://docs.microsoft.com/sql/t-sql/functions/string-functions-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/string-functions-transact-sql).\n\
    \n**STRING_SPLIT** is a function we introduced in SQL Server 2016\\. It requires\
    \ dbcompat 130 or higher to be used. STRING_SPLIT is very handy to “split apart”\
    \ strings into separate string values. One of the limitations of this function\
    \ is that there is no *ordinal* for the new separate values. In other words, there\
    \ is no guarantee of what order the values are returned. SQL Server 2022 provides\
    \ a new enhancement to include an ordinal. I found this excellent blog by the\
    \ legendary SQL community member Aaron Bertrand (who also was the tech reviewer\
    \ for *SQL Server 2019 Revealed*): [`www.mssqltips.com/sqlservertip/7265/sql-server-2022-t-sql-enhancements`](http://www.mssqltips.com/sqlservertip/7265/sql-server-2022-t-sql-enhancements).\n\
    \nLet’s look at an exercise based on what Aaron posted. There is no user database\
    \ required for this exercise. Any database context can be used including master.\n\
    \n1.  Load the script **string_split.sql**, which has multiple steps.\n\n2.  Execute\
    \ **Step 1** in the script, which uses the following statements:\n\n    ```\n\
    \    -- Step 1: Use STRING_SPLIT to get back a list of NFL teams. There is no\
    \ guarantee for the order but it may work.\n    USE master;\n    GO\n    DECLARE\
    \ @nflteams NVARCHAR(max) = N'Cowboys,Browns,Seahawks,Broncos,Eagles';\n    SELECT\
    \ value as nfl_team FROM STRING_SPLIT(@nflteams, N',');\n    GO\n    ```\n\n \
    \   Your results may vary because there is no guarantee in the order of the results.\
    \ You should get back five rows for each string “part” in the @nflteams variable.\n\
    \n3.  Execute **Step 2** in the script, which uses the following statements:\n\
    \n    ```\n    -- Step 2: Use the new ordinal option to ensure order without a\
    \ sort\n    USE master;\n    GO\n    DECLARE @nflteams NVARCHAR(max) = N'Cowboys,Browns,Seahawks,Broncos,Eagles';\n\
    \    SELECT value as nfl_team, ordinal as rank FROM STRING_SPLIT(@nflteams, N',',\
    \ 1)\n    ORDER BY ordinal;\n    GO\n    ```\n\n    This uses the new ordinal\
    \ syntax. The third argument to STRING_SPLIT is a 0 or 1\\. 1 means to enable\
    \ ordinals. Then we can use the keyword **ordinal** as a column in the results.\
    \ And it makes sense that SQL Server would once again recognize the ranking order\
    \ here with the Cowboys being first and the Eagles being last<g>.\n\nYou can read\
    \ more details with examples about STRING_SPLIT at [`https://docs.microsoft.com/sql/t-sql/functions/string-split-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/string-split-transact-sql)."
  trans: "\n### IS [NOT] DISTINCT FROM\n\n许多使用 SQL 的人可能认为，引入 NULL 值可能是该语言历史上最糟糕的错误，因为\
    \ NULL 意味着*未知*。与其在本书中争论这一点，不如看一个我们试图用它来帮助处理涉及 NULL 值的有趣场景的例子。我们引入了一种新语法，称为 `IS\
    \ [NOT] DISTINCT FROM`。要了解这个新语法如何帮助处理 NULL，没有比请教著名的 Itzik Ben-Gan 更合适的人了。据我所知，Itzik\
    \ 可能是 Microsoft 内外对 T-SQL 最了解的人。他写了以下博文，讨论了 SQL Server 2022 中新的 T-SQL 增强功能：[`https://sqlperformance.com/2022/08/sql-server-2022/additional-t-sql-improvements-in-sql-server-2022`](https://sqlperformance.com/2022/08/sql-server-2022/additional-t-sql-improvements-in-sql-server-2022)。在这篇文章中，他通过处理\
    \ NULL 值问题的例子讨论了其复杂性。\n\n我对 Itzik 博客中的例子进行了一些调整，形成了一道练习，以便你了解我们的新语法将如何帮助你查询 NULL\
    \ 值，同时还能获得良好的执行计划。\n\n正如我在本节开头提到的，你需要从 [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
    \ 恢复 `WideWorldImporters` 示例数据库备份，才能进行此练习。\n\n1.  执行脚本 `setup_isnotdistinct.sql`，在\
    \ `Sales.Order` 表的 `PickingCompletedWhen` 列上创建一个新索引。此脚本执行以下 T-SQL 语句：\n\n    ```\n\
    \    USE [WideWorldImporters];\n    GO\n    DROP INDEX IF EXISTS Sales.Orders.pickingdateidx;\n\
    \    GO\n    CREATE INDEX pickingdateidx ON Sales.Orders (PickingCompletedWhen);\n\
    \    GO\n    ```\n\n2.  加载脚本 `isnotdistinct.sql` 以运行多个步骤。对于每个步骤，在 SSMS 中启用“包含实际执行计划”。\n\
    \n3.  执行脚本中的 **步骤 1**，它使用以下语句：\n\n    ```\n    -- Step 1: Query for a specific\
    \ value which should yield 35 rows using an Index Seek for pickingdateidx\n  \
    \  USE [WideWorldImporters];\n    GO\n    DECLARE @dt datetime2 = '2013-01-01\
    \ 12:00:00.0000000'\n    SELECT * FROM Sales.Orders WHERE\n    PickingCompletedWhen\
    \ = @dt;\n    GO\n    ```\n\n    这会生成 35 行，并对新索引使用索引查找。\n\n4.  执行脚本中的 **步骤 2**，它使用以下语句：\n\
    \n    ```\n    -- Step 2: Find all the orders where picking was not completed.\
    \ This shows 0 rows even though there is ~ 3000 rows with a NULL value\n    USE\
    \ [WideWorldImporters];\n    GO\n    DECLARE @dt datetime2 = NULL\n    SELECT\
    \ * FROM Sales.Orders WHERE\n    PickingCompletedWhen = @dt;\n    GO\n    ```\n\
    \n    这显示 0 行，尽管有大约 3000 行的值是 NULL。\n\n5.  执行脚本中的 **步骤 3**，它使用以下语句：\n\n    ```\n\
    \    -- Step 3: Try to use ISNULL. Works but requires a scan\n    USE [WideWorldImporters];\n\
    \    GO\n    DECLARE @dt AS DATE = NULL;\n    SELECT * FROM Sales.Orders\n   \
    \ WHERE ISNULL(PickingCompletedWhen, '99991231') = ISNULL(@dt, '99991231');\n\
    \    GO\n    ```\n\n    这有效并给出了正确的结果，但需要索引扫描。\n\n6.  执行脚本中的 **步骤 4**，它使用以下语句：\n\
    \n    ```\n    -- Step 4: Try to use the new operator. Should yield ~3000 rows\
    \ but use an index seek\n    USE [WideWorldImporters];\n    GO\n    DECLARE @dt\
    \ datetime2 = NULL\n    SELECT *\n    FROM Sales.Orders\n    WHERE PickingCompletedWhen\
    \ IS NOT DISTINCT FROM @dt;\n    GO\n    ```\n\n    现在我们得到了正确的结果，并且使用了索引查找。有了这个新运算符，我们实现了\
    \ Itzik 所说的搜索参数或 SARG，这允许使用索引。\n\n`IS [NOT] DISTINCT FROM` 不需要特定的数据库兼容性级别。你可以在\
    \ [`https://docs.microsoft.com/sql/t-sql/queries/is-distinct-from-transact-sql`](https://docs.microsoft.com/sql/t-sql/queries/is-distinct-from-transact-sql)\
    \ 阅读更多关于这个新语法的信息。\n\nNicholas Simmons 是 Conor 团队的软件工程师，他开发了这个新的增强功能，他总结了这项重要工作：“`IS\
    \ [NOT] DISTINCT FROM` 允许用户在值之间进行相等和不等比较，同时保证结果为 `true` 或 `false`。`NULL = NULL`\
    \ 会返回未知，而 `NULL IS NOT DISTINCT FROM NULL` 会返回 `true`。`NULL != NULL` 会返回未知，而 `NULL\
    \ IS DISTINCT FROM NULL` 会返回 `false`。这种语法是比较这些值的更简洁方式，并且可以在 `ANSI_NULLS` 设置不适用的场景中使用。这是在\
    \ SQL22 中添加 `IS [NOT] DISTINCT FROM` 的主要动机。它为用户提供了一种更清晰的方式来进行这些比较，并且可以在任何地方使用，不受\
    \ `ANSI_NULLS` 设置为 `OFF` 时进行这些比较的限制。”\n\n### STRING_SPLIT\n\nSQL Server 有多个 T-SQL\
    \ 函数来帮助你在表数据中操作和搜索字符串数据。这些函数的完整列表可以在 [`https://docs.microsoft.com/sql/t-sql/functions/string-functions-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/string-functions-transact-sql)\
    \ 找到。\n\n`STRING_SPLIT` 是我们在 SQL Server 2016 中引入的一个函数。它需要数据库兼容性级别 130 或更高才能使用。`STRING_SPLIT`\
    \ 非常方便将字符串“拆分”为单独的字符串值。此函数的一个限制是，新拆分的值没有*序号*。换句话说，不能保证返回值的顺序。SQL Server 2022 提供了一个新的增强功能来包含序号。我发现了\
    \ SQL 社区传奇成员 Aaron Bertrand（也是《SQL Server 2019 Revealed》的技术审阅者）的这篇优秀博文：[`www.mssqltips.com/sqlservertip/7265/sql-server-2022-t-sql-enhancements`](http://www.mssqltips.com/sqlservertip/7265/sql-server-2022-t-sql-enhancements)。\n\
    \n让我们看看基于 Aaron 发布内容的一个练习。此练习不需要用户数据库。可以使用任何数据库上下文，包括 `master`。\n\n1.  加载脚本 `string_split.sql`，其中包含多个步骤。\n\
    \n2.  执行脚本中的 **步骤 1**，它使用以下语句：\n\n    ```\n    -- Step 1: Use STRING_SPLIT to\
    \ get back a list of NFL teams. There is no guarantee for the order but it may\
    \ work.\n    USE master;\n    GO\n    DECLARE @nflteams NVARCHAR(max) = N'Cowboys,Browns,Seahawks,Broncos,Eagles';\n\
    \    SELECT value as nfl_team FROM STRING_SPLIT(@nflteams, N',');\n    GO\n  \
    \  ```\n\n    你的结果可能会有所不同，因为结果的顺序没有保证。你应该为 `@nflteams` 变量中的每个字符串“部分”返回五行。\n\n\
    3.  执行脚本中的 **步骤 2**，它使用以下语句：\n\n    ```\n    -- Step 2: Use the new ordinal option\
    \ to ensure order without a sort\n    USE master;\n    GO\n    DECLARE @nflteams\
    \ NVARCHAR(max) = N'Cowboys,Browns,Seahawks,Broncos,Eagles';\n    SELECT value\
    \ as nfl_team, ordinal as rank FROM STRING_SPLIT(@nflteams, N',', 1)\n    ORDER\
    \ BY ordinal;\n    GO\n    ```\n\n    这使用了新的序号语法。`STRING_SPLIT` 的第三个参数是 `0` 或\
    \ `1`。`1` 表示启用序号。然后我们可以在结果中将关键字 `ordinal` 作为一个列使用。SQL Server 再次认可这里的排名顺序是合理的——牛仔队排第一，老鹰队排最后。\n\
    \n你可以在 [`https://docs.microsoft.com/sql/t-sql/functions/string-split-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/string-split-transact-sql)\
    \ 阅读更多关于 `STRING_SPLIT` 的详细信息和示例。\n"
- fmt: "### TRIM Function Extensions\n\nAnother set of T-SQL functions can be used\
    \ to trim characters from strings. This includes the `TRIM`, `LTRIM`, and `RTRIM`\
    \ functions. In order to bring our implementation of these functions up to the\
    \ latest ANSI standards and other database products, we have extended these functions.\
    \ Let’s see in an exercise how these new extensions open up new capabilities.\n\
    \n1. Load the script **trim.sql**, which has multiple steps.\n2. Execute **Step\
    \ 1** in the script, which uses the following statements:\n    ```\n    -- Step\
    \ 1: Use new extensions for the TRIM functions\n    USE master;\n    GO\n    --\
    \ The first statement is what was previously only supported\n    SELECT TRIM('STR'\
    \ FROM 'STRmydataSTR') as trim_strings;\n    SELECT TRIM(LEADING 'STR' FROM 'STRmydataSTR')\
    \ as leading_string;\n    SELECT TRIM(TRAILING 'STR' FROM 'STRmydataSTR') as trailing_string;\n\
    \    -- Same as the previous release behavior but explicitly specifying BOTH\n\
    \    SELECT TRIM(BOTH 'STR' FROM 'STRmydataSTR') as both_strings_trimmed;\n  \
    \  GO\n    ```\n    Notice that before SQL Server 2022, the `TRIM` function removed\
    \ spaces or characters from the beginning and end of a string. We added a new\
    \ argument to specify how you want to trim characters: `LEADING` (at the front),\
    \ `TRAILING` (at the end), and `BOTH`. `BOTH` is the same as the default behavior\
    \ before SQL Server 2022.\n3. Execute **Step 2** in the script, which uses the\
    \ following statements:\n    ```\n    -- Step 2: Use the new extension to the\
    \ LTRIM function\n    USE master;\n    GO\n    SELECT LTRIM('STRmydataSTR', 'STR')\
    \ as left_trimmed_string;\n    GO\n    ```\n    `LTRIM` previously only trimmed\
    \ leading spaces. Now you can trim spaces or any string expression.\n4. Execute\
    \ **Step 3** in the script, which uses the following statements:\n    ```\n  \
    \  -- Step 3: Use the new extension to the RTRIM function\n    USE master;\n \
    \   GO\n    SELECT RTRIM('STRmydataSTR', 'STR') as right_trimmed_string;\n   \
    \ GO\n    ```\n    Like `LTRIM`, `RTRIM` only supported trimming spaces at the\
    \ end of a string. Now you can specify a character expression to trim.\n\nThese\
    \ new extensions **require dbcompat 160**. You can read more details about the\
    \ `TRIM` function at [`https://docs.microsoft.com/sql/t-sql/functions/trim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/trim-transact-sql).\
    \ You can read more about `LTRIM` at [`https://docs.microsoft.com/sql/t-sql/functions/ltrim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/ltrim-transact-sql)\
    \ and `RTRIM` at [`https://docs.microsoft.com/sql/t-sql/functions/rtrim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/rtrim-transact-sql).\n\
    \n### Bit T-SQL Functions\n\nIn my previous career at Microsoft, debugging SQL\
    \ Server problems was a daily job. Often I would find myself looking through complex\
    \ data structures inside the engine including how the source code works. A common\
    \ programming technique when writing software as complex as SQL Server is to manipulate\
    \ data using `bit` operators. SQL Server actually has bitwise operators to compare\
    \ numbers at the bit level, which you can read about at [`https://docs.microsoft.com/sql/t-sql/language-elements/bitwise-operators-transact-sql`](https://docs.microsoft.com/sql/t-sql/language-elements/bitwise-operators-transact-sql).\n\
    \nThere are other types of bit operators used in programming languages like C++\
    \ like bit shift operators and specific bit searching operators. The C++ language\
    \ has keywords built in to do this. SQL Server 2022 comes with functions to mirror\
    \ some of this capability, which are called **bit manipulation functions**.\n\n\
    You may be wondering why SQL Server would include operators for these types of\
    \ bit manipulation functions. Time will tell how T-SQL programmers will use this,\
    \ but I created a few interesting exercises using data from SQL Server.\n\n####\
    \ Getting Packed Bits\n\nHere is an exercise using the `BIT_COUNT` and `GET_BIT`\
    \ functions to look at a number that is *packed* with bits, meaning different\
    \ values into one value. Some of the steps in this exercise don’t require a database\
    \ context. The context of `master` is used in some steps, but the scripts change\
    \ that context.\n\n1. Load the script **getbits.sql**, which has multiple steps.\n\
    \    **Note** The use of `DBCC PAGE` is not supported, and this script should\
    \ only be used in test or development environments.\n2. Execute **Step 1** in\
    \ the script, which uses the following statements with a bunch of comments to\
    \ explain the results:\n    ```\n    -- Step 1: Run DBCC page against the PFS\
    \ page and look at a member of the BUF structure\n    -- Dump out the PFS page\
    \ in master\n    -- Look at the BUF structure output\n    -- bstat should be 0x9\n\
    \    -- It could be 0xb if someone has made any page allocations and master has\
    \ not been checkpointed. For a new installed SQL Server it should be 0x9\n   \
    \ -- If you see 0x109 it could because of an internal bit for checkpointing but\
    \ it can be ignored\n    -- Here are several bstat values packed into this number\n\
    \    /*\n    BUF_ONLRU = 0x000001\n    BUF_DIRTY = 0x000002\n    BUF_IO      0x000004\n\
    \    BUF_HASHED  0x000008\n    */\n    USE master;\n    GO\n    -- Checkpoint\
    \ master to clear any dirty bits for PFS\n    CHECKPOINT;\n    GO\n    DBCC TRACEON(3604);\n\
    \    GO\n    DBCC PAGE(1,1,1,3);\n    GO\n    ```\n    The results of the `DBCC\
    \ PAGE` command can be found in the Messages tab, not the Results tab. If you\
    \ scroll in these results, you will find information about a `BUFFER:` structure.\
    \ Look at the output for this string:\n    ```\n    bstat = 0x9\n    ```\n   \
    \ As the comments show, this is an example of packing in multiple values in a\
    \ single number. So `0x9` represents several bits to reflect certain *status*\
    \ values ON like the following:\n    ```\n    BUF_ONLRU = 0x000001\n    BUF_DIRTY\
    \ = 0x000002\n    BUF_IO      0x000004\n    BUF_HASHED  0x000008\n    ```\n  \
    \  `BUF_ONLRU` means the page (in this case a PFS system page) is on a least recently\
    \ used list.\n    `BUF_DIRTY` means the page is modified but not flushed to disk.\n\
    \    `BUF_IO` means the page is in the middle of I/O read or write (Note this\
    \ is how we know the difference between a `PAGELATCH` and `PAGEIOLATCH`).\n  \
    \  `BUF_HASHED` means the buffer is on a hash list for easy searching.\n    There\
    \ are more `bstat` values than I’m showing here, and in fact in some tests, you\
    \ may see a value of `0x109`. `0x100` is used for internal checkpoint purposes\
    \ and can be ignored for the purposes of this demonstration.\n    This technique\
    \ is a very common programming practice to save storage in memory by packing bits\
    \ into a single number (instead of having to have a separate field for each status\
    \ value). You could do the same thing with a status value in a column in a SQL\
    \ table.\n3. Execute **Step 2** in the script, which uses the following statements:\n\
    \    ```\n    -- Step 2: Get a count of bits that are 1 in the value\n    USE\
    \ master;\n    GO\n    DECLARE @bstat varbinary(4);\n    SET @bstat = 0x9;\n \
    \   SELECT BIT_COUNT(@bstat);\n    GO\n    ```\n    The new `BIT_COUNT` function\
    \ can tell us how many bits are ON or 1 in the hex value.\n    The results for\
    \ `0x9` should be 2 because two of the bits are ON.\n4. Execute **Step 3** in\
    \ the script, which uses the following statements:\n    ```\n    -- Step 3: Which\
    \ bits are on in the packed value\n    USE master;\n    GO\n    DECLARE @bstat\
    \ varbinary(4);\n    SET @bstat = 0x9;\n    SELECT GET_BIT(@bstat, 3) as \"2^3\
    \ BUF_HASHED\", GET_BIT(@bstat, 2) as \"2^2 BUF_IO\", GET_BIT(@bstat, 1) as \"\
    2^1 BUF_DIRTY\", GET_BIT(@bstat, 0) as \"2^0 BUF_ONLRU\";\n    GO\n    ```\n \
    \   Bits should be read from right to left, so the output of this query should\
    \ be the following for `0x9` (I flipped the results vertically):\n    ```\n  \
    \  2^3 BUF_HASHED    1\n    2^2 BUF_IO        0\n    2^1 BUF_DIRTY     0\n   \
    \ 2^0 BUF_ONLRU     1\n    ```"
  raw: "### TRIM Function Extensions\n\nAnother set of T-SQL functions can be used\
    \ to trim characters from strings. This includes the **TRIM**, **LTRIM**, and\
    \ **RTRIM** functions. In order to bring our implementation of these functions\
    \ up to the latest ANSI standards and other database products, we have extended\
    \ these functions. Let’s see in an exercise how these new extensions open up new\
    \ capabilities.\n\n1.  Load the script **trim.sql**, which has multiple steps.\n\
    \n2.  Execute **Step 1** in the script, which uses the following statements:\n\
    \n    ```\n    -- Step 1: Use new extensions for the TRIM functions\n    USE master;\n\
    \    GO\n    -- The first statement is what was previously only supported\n  \
    \  SELECT TRIM('STR' FROM 'STRmydataSTR') as trim_strings;\n    SELECT TRIM(LEADING\
    \ 'STR' FROM 'STRmydataSTR') as leading_string;\n    SELECT TRIM(TRAILING 'STR'\
    \ FROM 'STRmydataSTR') as trailing_string;\n    -- Same as the previous release\
    \ behavior but explicitly specifying BOTH\n    SELECT TRIM(BOTH 'STR' FROM 'STRmydataSTR')\
    \ as both_strings_trimmed;\n    GO\n    ```\n\n    Notice that before SQL Server\
    \ 2022, the TRIM function removed spaces or characters from the beginning and\
    \ end of a string. We added a new argument to specify how you want to trim characters:\
    \ LEADING (at the front), TRAILING (at the end), and BOTH. BOTH is the same as\
    \ the default behavior before SQL Server 2022.\n\n3.  Execute **Step 2** in the\
    \ script, which uses the following statements:\n\n    ```\n    -- Step 2: Use\
    \ the new extension to the LTRIM function\n    USE master;\n    GO\n    SELECT\
    \ LTRIM('STRmydataSTR', 'STR') as left_trimmed_string;\n    GO\n    ```\n\n  \
    \  LTRIM previously only trimmed leading spaces. Now you can trim spaces or any\
    \ string expression.\n\n4.  Execute **Step 3** in the script, which uses the following\
    \ statements:\n\n    ```\n    -- Step 3: Use the new extension to the RTRIM function\n\
    \    USE master;\n    GO\n    SELECT RTRIM('STRmydataSTR', 'STR') as right_trimmed_string;\n\
    \    GO\n    ```\n\n    Like LTRIM, RTRIM only supported trimming spaces at the\
    \ end of a string. Now you can specify a character expression to trim.\n\nThese\
    \ new extensions **require dbcompat 160**. You can read more details about the\
    \ TRIM function at [`https://docs.microsoft.com/sql/t-sql/functions/trim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/trim-transact-sql).\
    \ You can read more about LTRIM at [`https://docs.microsoft.com/sql/t-sql/functions/ltrim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/ltrim-transact-sql)\
    \ and RTRIM at [`https://docs.microsoft.com/sql/t-sql/functions/rtrim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/rtrim-transact-sql).\n\
    \n### Bit T-SQL Functions\n\nIn my previous career at Microsoft, debugging SQL\
    \ Server problems was a daily job. Often I would find myself looking through complex\
    \ data structures inside the engine including how the source code works. A common\
    \ programming technique when writing software as complex as SQL Server is to manipulate\
    \ data using **bit** operators. SQL Server actually has bitwise operators to compare\
    \ numbers at the bit level, which you can read about at [`https://docs.microsoft.com/sql/t-sql/language-elements/bitwise-operators-transact-sql`](https://docs.microsoft.com/sql/t-sql/language-elements/bitwise-operators-transact-sql).\n\
    \nThere are other types of bit operators used in programming languages like C++\
    \ like bit shift operators and specific bit searching operators. The C++ language\
    \ has keywords built in to do this. SQL Server 2022 comes with functions to mirror\
    \ some of this capability, which are called **bit manipulation functions**.\n\n\
    You may be wondering why SQL Server would include operators for these types of\
    \ bit manipulation functions. Time will tell how T-SQL programmers will use this,\
    \ but I created a few interesting exercises using data from SQL Server.\n\n####\
    \ Getting Packed Bits\n\nHere is an exercise using the BIT_COUNT and GET_BIT functions\
    \ to look at a number that is *packed* with bits, meaning different values into\
    \ one value. Some of the steps in this exercise don’t require a database context.\
    \ The context of master is used in some steps, but the scripts change that context.\n\
    \n1.  Load the script **getbits.sql**, which has multiple steps.\n\n**Note** The\
    \ use of DBCC PAGE is not supported, and this script should only be used in test\
    \ or development environments.\n\n2.  Execute **Step 1** in the script, which\
    \ uses the following statements with a bunch of comments to explain the results:\n\
    \n```\n    -- Step 1: Run DBCC page against the PFS page and look at a member\
    \ of the BUF structure\n    -- Dump out the PFS page in master\n    -- Look at\
    \ the BUF structure output\n    -- bstat should be 0x9\n    -- It could be 0xb\
    \ if someone has made any page allocations and master has not been checkpointed.\
    \ For a new installed SQL Server it should be 0x9\n    -- If you see 0x109 it\
    \ could because of an internal bit for checkpointing but it can be ignored\n \
    \   -- Here are several bstat values packed into this number\n    /*\n    BUF_ONLRU\
    \ = 0x000001\n    BUF_DIRTY = 0x000002\n    BUF_IO      0x000004\n    BUF_HASHED\
    \  0x000008\n    */\n    USE master;\n    GO\n    -- Checkpoint master to clear\
    \ any dirty bits for PFS\n    CHECKPOINT;\n    GO\n    DBCC TRACEON(3604);\n \
    \   GO\n    DBCC PAGE(1,1,1,3);\n    GO\n    ```\n\nThe results of the DBCC PAGE\
    \ command can be found in the Messages tab, not the Results tab. If you scroll\
    \ in these results, you will find information about a BUFFER: structure. Look\
    \ at the output for this string:\n\n```\nbstat = 0x9\n```\n\nAs the comments show,\
    \ this is an example of packing in multiple values in a single number. So 0x9\
    \ represents several bits to reflect certain *status* values ON like the following:\n\
    \n```\nBUF_ONLRU = 0x000001\nBUF_DIRTY = 0x000002\nBUF_IO      0x000004\nBUF_HASHED\
    \  0x000008\n```\n\nBUF_ONLRU means the page (in this case a PFS system page)\
    \ is on a least recently used list.\n\nBUF_DIRTY means the page is modified but\
    \ not flushed to disk.\n\nBUF_IO means the page is in the middle of I/O read or\
    \ write (Note this is how we know the difference between a PAGELATCH and PAGEIOLATCH).\n\
    \nBUF_HASHED means the buffer is on a hash list for easy searching.\n\nThere are\
    \ more bstat values than I’m showing here, and in fact in some tests, you may\
    \ see a value of 0x109\\. 0x100 is used for internal checkpoint purposes and can\
    \ be ignored for the purposes of this demonstration.\n\nThis technique is a very\
    \ common programming practice to save storage in memory by packing bits into a\
    \ single number (instead of having to have a separate field for each status value).\
    \ You could do the same thing with a status value in a column in a SQL table.\n\
    \n1.  Execute **Step 2** in the script, which uses the following statements:\n\
    \n```\n    -- Step 2: Get a count of bits that are 1 in the value\n    USE master;\n\
    \    GO\n    DECLARE @bstat varbinary(4);\n    SET @bstat = 0x9;\n    SELECT BIT_COUNT(@bstat);\n\
    \    GO\n    ```\n\nThe new BIT_COUNT function can tell us how many bits are ON\
    \ or 1 in the hex value.\n\nThe results for 0x9 should be 2 because two of the\
    \ bits are ON.\n\n2.  Execute **Step 3** in the script, which uses the following\
    \ statements:\n\n```\n    -- Step 3: Which bits are on in the packed value\n \
    \   USE master;\n    GO\n    DECLARE @bstat varbinary(4);\n    SET @bstat = 0x9;\n\
    \    SELECT GET_BIT(@bstat, 3) as \"2^3 BUF_HASHED\", GET_BIT(@bstat, 2) as \"\
    2^2 BUF_IO\", GET_BIT(@bstat, 1) as \"2^1 BUF_DIRTY\", GET_BIT(@bstat, 0) as \"\
    2^0 BUF_ONLRU\";\n    GO\n    ```\n\nBits should be read from right to left, so\
    \ the output of this query should be the following for 0x9 (I flipped the results\
    \ vertically):\n\n```\n    2^3 BUF_HASHED    1\n    2^2 BUF_IO        0\n    2^1\
    \ BUF_DIRTY     0\n    2^0 BUF_ONLRU     1\n    ```"
  trans: "\n### TRIM 函数扩展\n\n另一组 T-SQL 函数可用于从字符串中修剪字符。这包括 `TRIM`、`LTRIM` 和 `RTRIM`\
    \ 函数。为了将这些函数的实现提升至最新的 ANSI 标准并与其他数据库产品保持一致，我们扩展了这些函数。让我们通过一个练习来看看这些新扩展如何开启新的能力。\n\
    \n1.  载入包含多个步骤的脚本 **trim.sql**。\n2.  执行脚本中的 **步骤 1**，其使用了以下语句：\n    ```\n    --\
    \ Step 1: Use new extensions for the TRIM functions\n    USE master;\n    GO\n\
    \    -- The first statement is what was previously only supported\n    SELECT\
    \ TRIM('STR' FROM 'STRmydataSTR') as trim_strings;\n    SELECT TRIM(LEADING 'STR'\
    \ FROM 'STRmydataSTR') as leading_string;\n    SELECT TRIM(TRAILING 'STR' FROM\
    \ 'STRmydataSTR') as trailing_string;\n    -- Same as the previous release behavior\
    \ but explicitly specifying BOTH\n    SELECT TRIM(BOTH 'STR' FROM 'STRmydataSTR')\
    \ as both_strings_trimmed;\n    GO\n    ```\n    请注意，在 SQL Server 2022 之前，`TRIM`\
    \ 函数仅移除字符串开头和结尾的空格。我们添加了一个新参数来指定您希望如何修剪字符：`LEADING`（在开头）、`TRAILING`（在末尾）和 `BOTH`。`BOTH`\
    \ 与 SQL Server 2022 之前版本的默认行为相同。\n3.  执行脚本中的 **步骤 2**，其使用了以下语句：\n    ```\n   \
    \ -- Step 2: Use the new extension to the LTRIM function\n    USE master;\n  \
    \  GO\n    SELECT LTRIM('STRmydataSTR', 'STR') as left_trimmed_string;\n    GO\n\
    \    ```\n    `LTRIM` 之前仅修剪前导空格。现在您可以修剪空格或任何字符串表达式。\n4.  执行脚本中的 **步骤 3**，其使用了以下语句：\n\
    \    ```\n    -- Step 3: Use the new extension to the RTRIM function\n    USE\
    \ master;\n    GO\n    SELECT RTRIM('STRmydataSTR', 'STR') as right_trimmed_string;\n\
    \    GO\n    ```\n    与 `LTRIM` 类似，`RTRIM` 之前只支持修剪字符串末尾的空格。现在您可以指定一个字符表达式来修剪。\n\
    \n这些新扩展 **需要 dbcompat 160**。您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/trim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/trim-transact-sql)\
    \ 阅读更多关于 `TRIM` 函数的详细信息。您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/ltrim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/ltrim-transact-sql)\
    \ 阅读更多关于 `LTRIM` 的信息，在 [`https://docs.microsoft.com/sql/t-sql/functions/rtrim-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/rtrim-transact-sql)\
    \ 阅读关于 `RTRIM` 的信息。\n\n### 位 T-SQL 函数\n\n在我先前于微软的职业生涯中，调试 SQL Server 问题是日常工作。我常常会发现自己深入查看引擎内部的复杂数据结构，包括源代码如何工作。在编写像\
    \ SQL Server 这样复杂的软件时，一个常见的编程技术是使用 `bit` 运算符来操作数据。SQL Server 实际上有位运算符来在比特级别比较数字，您可以在\
    \ [`https://docs.microsoft.com/sql/t-sql/language-elements/bitwise-operators-transact-sql`](https://docs.microsoft.com/sql/t-sql/language-elements/bitwise-operators-transact-sql)\
    \ 阅读相关信息。\n\n在 C++ 等编程语言中还使用其他类型的位运算符，如位移运算符和特定位搜索运算符。C++ 语言有内置关键字来实现此功能。SQL Server\
    \ 2022 提供了函数来镜像其中一些功能，这些函数被称为**位操作函数**。\n\n您可能想知道为什么 SQL Server 会包含这些类型的位操作函数运算符。时间会证明\
    \ T-SQL 程序员将如何使用此功能，但我使用 SQL Server 中的数据创建了几个有趣的练习。\n\n#### 获取打包的比特位\n\n这里有一个使用\
    \ `BIT_COUNT` 和 `GET_BIT` 函数来查看一个*打包*了比特位的数字的练习，这意味着将不同的值打包进一个值中。此练习中的某些步骤不需要数据库上下文。在某些步骤中使用了\
    \ `master` 上下文，但脚本会更改该上下文。\n\n1.  载入包含多个步骤的脚本 **getbits.sql**。\n    **注意** 不支持使用\
    \ `DBCC PAGE`，此脚本应仅在测试或开发环境中使用。\n2.  执行脚本中的 **步骤 1**，其使用了以下带有一大堆注释以解释结果的语句：\n\
    \    ```\n    -- Step 1: Run DBCC page against the PFS page and look at a member\
    \ of the BUF structure\n    -- Dump out the PFS page in master\n    -- Look at\
    \ the BUF structure output\n    -- bstat should be 0x9\n    -- It could be 0xb\
    \ if someone has made any page allocations and master has not been checkpointed.\
    \ For a new installed SQL Server it should be 0x9\n    -- If you see 0x109 it\
    \ could because of an internal bit for checkpointing but it can be ignored\n \
    \   -- Here are several bstat values packed into this number\n    /*\n    BUF_ONLRU\
    \ = 0x000001\n    BUF_DIRTY = 0x000002\n    BUF_IO      0x000004\n    BUF_HASHED\
    \  0x000008\n    */\n    USE master;\n    GO\n    -- Checkpoint master to clear\
    \ any dirty bits for PFS\n    CHECKPOINT;\n    GO\n    DBCC TRACEON(3604);\n \
    \   GO\n    DBCC PAGE(1,1,1,3);\n    GO\n    ```\n    `DBCC PAGE` 命令的结果可以在“消息”选项卡中找到，而不是“结果”选项卡中。如果您滚动查看这些结果，您将找到关于\
    \ `BUFFER:` 结构的信息。查找此字符串的输出：\n    ```\n    bstat = 0x9\n    ```\n    正如注释所示，这是一个将多个值打包进单个数字的示例。因此\
    \ `0x9` 代表几个比特位，以反映某些*状态*值为 ON，如下所示：\n    ```\n    BUF_ONLRU = 0x000001\n    BUF_DIRTY\
    \ = 0x000002\n    BUF_IO      0x000004\n    BUF_HASHED  0x000008\n    ```\n  \
    \  `BUF_ONLRU` 表示该页面（此处为 PFS 系统页面）位于最近最少使用列表上。\n    `BUF_DIRTY` 表示该页面已被修改但尚未刷新到磁盘。\n\
    \    `BUF_IO` 表示该页面正在进行 I/O 读或写（注意，这就是我们区分 `PAGELATCH` 和 `PAGEIOLATCH` 的方式）。\n\
    \    `BUF_HASHED` 表示该缓冲区位于哈希列表上以便于搜索。\n    这里显示的 `bstat` 值不止于此，实际上在某些测试中，您可能会看到\
    \ `0x109` 的值。`0x100` 用于内部检查点目的，出于本演示的目的可以忽略。\n    这种技术是一种非常常见的编程实践，通过将比特位打包进单个数字（而不必为每个状态值拥有单独的字段）来节省内存中的存储空间。您可以在\
    \ SQL 表的一列中对状态值执行相同的操作。\n3.  执行脚本中的 **步骤 2**，其使用了以下语句：\n    ```\n    -- Step 2:\
    \ Get a count of bits that are 1 in the value\n    USE master;\n    GO\n    DECLARE\
    \ @bstat varbinary(4);\n    SET @bstat = 0x9;\n    SELECT BIT_COUNT(@bstat);\n\
    \    GO\n    ```\n    新的 `BIT_COUNT` 函数可以告诉我们十六进制值中有多少位是 ON 或 1。\n    `0x9` 的结果应为\
    \ 2，因为有两位是 ON。\n4.  执行脚本中的 **步骤 3**，其使用了以下语句：\n    ```\n    -- Step 3: Which bits\
    \ are on in the packed value\n    USE master;\n    GO\n    DECLARE @bstat varbinary(4);\n\
    \    SET @bstat = 0x9;\n    SELECT GET_BIT(@bstat, 3) as \"2³ BUF_HASHED\", GET_BIT(@bstat,\
    \ 2) as \"2² BUF_IO\", GET_BIT(@bstat, 1) as \"2¹ BUF_DIRTY\", GET_BIT(@bstat,\
    \ 0) as \"2⁰ BUF_ONLRU\";\n    GO\n    ```\n    比特位应从右向左读取，因此对于 `0x9`，此查询的输出应如下所示（我已将结果垂直翻转）：\n\
    \    ```\n    2³ BUF_HASHED    1\n    2² BUF_IO        0\n    2¹ BUF_DIRTY   \
    \  0\n    2⁰ BUF_ONLRU     1\n    ```\n"
- fmt: "### PFS 页上的 BUF 结构\n\n因此，此 PFS 页的 BUF 结构位于 LRU 列表中并经过哈希处理，就像系统中的每一个 BUF 结构一样。该缓冲区没有脏（`dirty`），因为它未被修改，也没有处于\
    \ I/O 读或写的过程中。\n\n#### 执行步骤 4\n\n执行脚本中的**步骤 4**，该步骤使用以下语句：\n\n```sql\n-- Step\
    \ 4: Combine the packed bits back into the number\nUSE master;\nGO\nDECLARE @bstat\
    \ varbinary(4);\nSET @bstat = 0x9;\nSELECT GET_BIT(@bstat, 3)*2*2*2+GET_BIT(@bstat,\
    \ 2)*2*2+GET_BIT(@bstat, 1)*2+GET_BIT(@bstat, 0)*1;\nSELECT cast((GET_BIT(@bstat,\
    \ 3)*2*2*2+GET_BIT(@bstat, 2)*2*2+GET_BIT(@bstat, 1)*2+GET_BIT(@bstat, 0)*1) as\
    \ varbinary(4));\nGO\n```\n\n为了证明 `0x9` 代表了这些位，我们来做一个二进制的运算。`2⁰` 应该是 `1`，`2¹`\
    \ 应该是 `2`，`2²` 应该是 `4`，`2³` 应该是 `8`。但是位 1 和位 2 是 `OFF` 或 `0`，所以我们实际上是将 `1+8` 相加得到\
    \ `9` 或 `0x9`。\n\n#### 通过页面分配间接修改 PFS 页\n\n让我们看看如果我们通过页面分配间接修改 PFS 页会发生什么。执行脚本中的**步骤\
    \ 5**，该步骤使用以下语句：\n\n```sql\n-- Step 5: Create a table in master and see if there\
    \ are changes\nUSE master;\nGO\nDROP TABLE IF EXISTS cowboysrule;\nGO\nCREATE\
    \ TABLE cowboysrule (col1 int);\nINSERT INTO cowboysrule VALUES (1);\nGO\n-- bstat\
    \ should now be 0xb\nDBCC TRACEON(3604);\nGO\nDBCC PAGE(1,1,1,3);\nGO\n-- BUF_DIRTY\
    \ is now ON which means the page has been modified but not written.\n-- The PFS\
    \ page is modified because a page allocation was required for the new table data\n\
    DECLARE @bstat varbinary(4);\nSET @bstat = 0xb;\nSELECT GET_BIT(@bstat, 3) as\
    \ \"2^3 BUF_HASHED\", GET_BIT(@bstat, 2) as \"2^2 BUF_IO\", GET_BIT(@bstat, 1)\
    \ as \"2^1 BUF_DIRTY\", GET_BIT(@bstat, 0) as \"2^0 BUF_ONLRU\";\nGO\n```\n\n\
    此时，BUF 结构的结果应为 `0xb`。新查询的结果应显示 `BUF_DIRTY` 位现在是 `1`。所以，如果位 0、1 和 3 是 `ON`，你得到的是\
    \ `11`，这也是十六进制的 `0xb`。\n\n#### 清理并检查点\n\n执行脚本中的**步骤 6**，该步骤使用以下语句删除创建的表并检查点 `master`\
    \ 数据库以清除脏位：\n\n```sql\n-- Step 6: Cleanup the table we created in master and checkpoint\
    \ it to clear the dirty bit\nUSE master;\nGO\nDROP TABLE IF EXISTS cowboysrule;\n\
    GO\nCHECKPOINT;\nGO\n```\n\n### 将位打包到一个值中\n\n本练习将使用 `LEFT_SHIFT`、`RIGHT_SHIFT`\
    \ 和 `SET_BIT` 函数将多个值打包到单个字节中。本练习可以在任何数据库上下文中完成。\n\n1.  加载脚本 `packbits.sql`，该脚本包含多个步骤。\n\
    2.  执行脚本中的**步骤 1**，该步骤使用以下语句：\n    ```sql\n    -- Step 1: Pack 6 into the upper\
    \ bits and 4 into the lower bits\n    -- The value of 100 is a byte that combines\
    \ 6 in the upper bits and 4 in the lower bits\n    USE master;\n    GO\n    DECLARE\
    \ @x tinyint;\n    SELECT @x = LEFT_SHIFT(6, 4) + 4;\n    SELECT @x = (6 << 4\
    \ ) + 4;\n    SELECT @x;\n    ```\n    我这里的目标是将数字 `6` 和 `4` 作为*独立的*数字打包到同一个字节值中。\n\
    \n    结果应该是 `100`，但我是如何得到它的呢？让我分解一下。`tinyint` 是单个字节或 8 位。让我们看看 `100` 的二进制形式：\n\
    \n    `0110 0100`\n\n    高位（左边 4 位）代表数字 `6`。\n\n    低位（右边 4 位）代表数字 `4`。\n\n  \
    \  所以我使用了 `LEFT_SHIFT` 函数（我也展示了如何使用 `<<` 运算符，因此两者都可以使用）将 `6` 移位到高位，现在数字的二进制形式如下：\n\
    \n    `0110 0000`\n\n    现在只需加上 `4`，我就得到了最终结果，因为 `4` 将被放入低位。\n\n    组合起来的值是 `100`，但如果你了解这里的*协议*，你知道这实际上是一个\
    \ `6` 和一个 `4`。因此，我可以用表中的一个 `tinyint` 列来代替 `6` 和 `4` 的两个 `tinyint` 列。\n\n    那么如何“提取”出\
    \ `6` 和 `4` 呢？请转到下一步。\n\n3.  执行脚本中的**步骤 2**，该步骤使用以下语句：\n    ```sql\n    -- Step\
    \ 2: Only give me upper bits from the 100 packed value. The result should be a\
    \ 6\n    USE master;\n    GO\n    DECLARE @x tinyint;\n    DECLARE @y tinyint;\n\
    \    SELECT @x = LEFT_SHIFT(6, 4) + 4;\n    SELECT @x = (6 << 4 ) + 4;\n    SELECT\
    \ @y = RIGHT_SHIFT(@x, 4);\n    SELECT @y;\n    ```\n    答案应该是 `6`。所以，使用原始的 `100`\
    \ 值，我可以使用 `RIGHT_SHIFT` 函数（我也展示了如何使用 `>>` 运算符，因此两者都可以使用）将 `6` 移位到低位（将 `4` 挤出去）。二进制结果现在是这个值：\n\
    \n    `0000 0110`\n\n    我现在可以获取结果，并对 `6` 值进行任何需要的操作。转到下一步，看看如何从打包的字节中提取出 `4`\
    \ 的值。\n\n4.  执行脚本中的**步骤 3**，该步骤使用以下语句：\n    ```sql\n    -- Step 3: Let's use SET_BIT\
    \ to clear the upper bits to get the lower so the result should be a 4\n    USE\
    \ master;\n    GO\n    DECLARE @x tinyint;\n    SELECT @x = LEFT_SHIFT(6, 4) +\
    \ 4;\n    SELECT @x = (6 << 4 ) + 4;\n    SELECT @x = SET_BIT(@x, 4, 0);\n   \
    \ SELECT @x = SET_BIT(@x, 5, 0);\n    SELECT @x = SET_BIT(@x, 6, 0);\n    SELECT\
    \ @x = SET_BIT(@x, 7, 0);\n    SELECT @x;\n    GO\n    ```\n    我现在可以取 `100` 的值，并使用\
    \ `SET_BIT` 函数清除高位，得到一个新值：\n\n    `0000 0100`\n\n    即 `4`。\n\n你可以在 SQL Server\
    \ 2022 中阅读更多关于位操作函数的信息：`https://docs.microsoft.com/sql/t-sql/functions/bit-manipulation-functions-overview`。这些位操作函数不需要特定的数据库兼容性级别。\n\
    \n### 时序数据\n\n*时序数据*是带有时间戳的数据，通常用于收集测量值或指标。时序数据通常被组织成称为间隔或桶的概念。许多物联网设备产生遥测数据，这需要时序数据处理。\n\
    \n尽管 SQL Server 没有实际的时序数据类型或数据库，但你可以使用 SQL Server 表来存储和处理时序数据。事实上，我们为物联网场景在 Azure\
    \ SQL Edge 中构建了使用 T-SQL 处理时序数据的功能，你可以在 `https://docs.microsoft.com/azure/azure-sql-edge/imputing-missing-values`\
    \ 阅读更多相关信息。\n\n我们决定将这些来自 Edge 的 T-SQL 函数引入 SQL Server 2022 并进行增强。我们认识到你可能有想要直接导入\
    \ SQL Server 引擎的时序数据，并且希望使用 T-SQL 的强大功能来处理这类数据。\n\n我询问了时序和我们的 EAP 的高级项目经理 Kendal\
    \ Van Dyke，关于 T-SQL 中时序数据的价值。Kendal 说：“*我们生活在一个数据被持续测量并以重复的时间间隔存储的世界里*——股价、天气数据、零售销售和工厂车间传感器测量值只是几个例子。然后我们使用这些数据来跟踪变化、寻找趋势，并以时间作为其中一个轴来构建报告。SQL\
    \ Server 2022 中的时序功能使分析师、数据科学家和开发人员能够直接在数据库中完成这项工作，通过增强的 T-SQL 语言，这些语言既易于编写又具有高性能，并且使用他们已经熟悉的工具。”\n\
    \n在本章的这一部分，我们将了解四个 T-SQL 函数，这些函数对于处理存储为 SQL Server 行和列的时序数据非常有用。在每一节中，我们将使用一个练习来展示这些函数的工作原理。\n\
    \n#### 先决条件\n\n要使用本章这一节的练习，你需要：\n\n*   SQL Server 2022 评估版。\n*   具有两个 CPU 和至少\
    \ 8GB RAM 的虚拟机或计算机。\n*   SQL Server Management Studio (SSMS)。最新的 18.x 或 19.x 版本均可。\n\
    *   来自书籍示例中 **ch08_tsql\\timeseries** 文件夹的脚本。"
  raw: "So the BUF structure for this PFS page is on the LRU list and hashed as is\
    \ the case for every BUF structure in the system. The buffer is not dirty because\
    \ it has not been modified and is not in the middle of an I/O read or write.\n\
    \n3.  Execute **Step 4** in the script, which uses the following statements:\n\
    \n```\n    -- Step 4: Combine the packed bits back into the number\n    USE master;\n\
    \    GO\n    DECLARE @bstat varbinary(4);\n    SET @bstat = 0x9;\n    SELECT GET_BIT(@bstat,\
    \ 3)*2*2*2+GET_BIT(@bstat, 2)*2*2+GET_BIT(@bstat, 1)*2+GET_BIT(@bstat, 0)*1;\n\
    \    SELECT cast((GET_BIT(@bstat, 3)*2*2*2+GET_BIT(@bstat, 2)*2*2+GET_BIT(@bstat,\
    \ 1)*2+GET_BIT(@bstat, 0)*1) as varbinary(4));\n    GO\n    ```\n\nTo prove that\
    \ 0x9 represents these bits, let’s do 2-based arithmetic. 2⁰ should be 1, 2¹ should\
    \ be 2, 2² should 4, and 2³ should be 8\\. But bit 1 and bit 2 are OFF or 0, so\
    \ we really are adding 1+8 to get 9 or 0x9.\n\n4.  Let’s see what happens if we\
    \ modify the PFS page indirectly through a page allocation. Execute **Step 5**\
    \ in the script, which uses the following:\n\n```\n    -- Step 5: Create a table\
    \ in master and see if there are changes\n    USE master;\n    GO\n    DROP TABLE\
    \ IF EXISTS cowboysrule;\n    GO\n    CREATE TABLE cowboysrule (col1 int);\n \
    \   INSERT INTO cowboysrule VALUES (1);\n    GO\n    -- bstat should now be 0xb\n\
    \    DBCC TRACEON(3604);\n    GO\n    DBCC PAGE(1,1,1,3);\n    GO\n    -- BUF_DIRTY\
    \ is now ON which means the page has been modified but not written.\n    -- The\
    \ PFS page is modified because a page allocation was required for the new table\
    \ data\n    DECLARE @bstat varbinary(4);\n    SET @bstat = 0xb;\n    SELECT GET_BIT(@bstat,\
    \ 3) as \"2^3 BUF_HASHED\", GET_BIT(@bstat, 2) as \"2^2 BUF_IO\", GET_BIT(@bstat,\
    \ 1) as \"2^1 BUF_DIRTY\", GET_BIT(@bstat, 0) as \"2^0 BUF_ONLRU\";\n    GO\n\
    \    ```\n\nYour results for the BUF structure should now be 0xb. The results\
    \ of the new query should show the BUF_DIRTY bit is now 1\\. So now if bits 0,\
    \ 1, and 3 are ON, you get 11, which is also 0xb in hex.\n\n5.  Execute **Step\
    \ 6** in the script, which uses the following statements to drop the created table\
    \ and checkpoint master:\n\n```\n    -- Step 6: Cleanup the table we created in\
    \ master and checkpoint it to clear the dirty bit\n    USE master;\n    GO\n \
    \   DROP TABLE IF EXISTS cowboysrule;\n    GO\n    CHECKPOINT;\n    GO\n    ```\n\
    \n#### Packing Bits into a Value\n\nThis exercise will use the LEFT_SHIFT, RIGHT_SHIFT,\
    \ and SET_BIT functions to pack multiple values into a single byte. This exercise\
    \ can be done under any database context.\n\n1.  Load the script **packbits.sql**,\
    \ which has multiple steps.\n\n2.  Execute **Step 1** in the script, which uses\
    \ the following statements:\n\n    ```\n    -- Step 1: Pack 6 into the upper bits\
    \ and 4 into the lower bits\n    -- The value of 100 is a byte that combines 6\
    \ in the upper bits and 4 in the lower bits\n    USE master;\n    GO\n    DECLARE\
    \ @x tinyint;\n    SELECT @x = LEFT_SHIFT(6, 4) + 4;\n    SELECT @x = (6 << 4\
    \ ) + 4;\n    SELECT @x;\n    ```\n\n    My goal here is to pack in the numbers\
    \ 6 and 4 as *separate* numbers but into the same byte value.\n\n    The result\
    \ should be 100, but how did I produce this? Let me break this down. A tinyint\
    \ is a single byte or 8 bits. Let’s look at the value 100 in binary:\n\n    0110\
    \ 0100\n\n    The upper bits (left 4 bits) represent the number 6.\n\n    The\
    \ lower bits (right 4 bits) represent the number 4.\n\n    So I used the LEFT_SHIFT\
    \ function (I also show how to use the << operator, so either one can be used)\
    \ to shift a 6 to the upper bits, which would now make the number like this in\
    \ binary:\n\n    0110 0000\n\n    Now just add a 4, and I get the final result\
    \ because the 4 will be placed into the lower bits.\n\n    Together the value\
    \ is 100, but if you know the *protocol* here, you know this is really a 6 and\
    \ a 4\\. So instead of having two tinyint columns in a table for the 6 and for\
    \ the 4, I can use just one.\n\n    So how do you “extract” the 6 and 4? Go to\
    \ the next step.\n\n3.  Execute **Step 2** in the script, which uses the following\
    \ statements:\n\n    ```\n    -- Step 2: Only give me upper bits from the 100\
    \ packed value. The result should be a 6\n    USE master;\n    GO\n    DECLARE\
    \ @x tinyint;\n    DECLARE @y tinyint;\n    SELECT @x = LEFT_SHIFT(6, 4) + 4;\n\
    \    SELECT @x = (6 > 4;\n    SELECT @y;\n    ```\n\n    The answer should be\
    \ 6\\. So taking the original 100 value, I can use the RIGHT_SHIFT function (I\
    \ also show how to use the >> operator, so either one can be used) to shift the\
    \ 6 into the lower bits (pushing out the 4). The result in binary is now this\
    \ value:\n\n    0000 0110\n\n    I can now take the result and do whatever I need\
    \ to do with the 6 value. Go to the next step to see how you can extract out the\
    \ value of 4 from the packed byte.\n\n4.  Execute **Step 3** in the script, which\
    \ uses the following statements:\n\n    ```\n    -- Step 3: Let's use SET_BIT\
    \ to clear the upper bits to get the lower so the result should be a 4\n    USE\
    \ master;\n    GO\n    DECLARE @x tinyint;\n    SELECT @x = LEFT_SHIFT(6, 4) +\
    \ 4;\n    SELECT @x = (6 << 4 ) + 4;\n    SELECT @x = SET_BIT(@x, 4, 0);\n   \
    \ SELECT @x = SET_BIT(@x, 5, 0);\n    SELECT @x = SET_BIT(@x, 6, 0);\n    SELECT\
    \ @x = SET_BIT(@x, 7, 0);\n    SELECT @x;\n    GO\n    ```\n\n    I can now take\
    \ the value of 100 and just clear the upper bits using the SET_BIT function to\
    \ get a new value of\n\n    0000 0100\n\n    which is 4.\n\nYou can read more\
    \ about bit manipulation functions in SQL Server 2022 at [`https://docs.microsoft.com/sql/t-sql/functions/bit-manipulation-functions-overview`](https://docs.microsoft.com/sql/t-sql/functions/bit-manipulation-functions-overview).\
    \ These bit manipulation functions do not require a specific dbcompat level.\n\
    \n## Time Series\n\n*Time series data* is data that is time-stamped usually to\
    \ collect measurements or metrics. Time series data is usually organized into\
    \ a concept called intervals or buckets. Many IoT devices produce telemetry, which\
    \ requires time series data processing.\n\nEven though SQL Server doesn’t contain\
    \ an actual time series data type or database, you can use SQL Server tables to\
    \ store and process time series data. In fact, we built capabilities to use T-SQL\
    \ to process time series data in Azure SQL Edge for IoT scenarios, which you can\
    \ read more about at [`https://docs.microsoft.com/azure/azure-sql-edge/imputing-missing-values`](https://docs.microsoft.com/azure/azure-sql-edge/imputing-missing-values).\n\
    \nWe decided to bring these same T-SQL functions from Edge and enhance them in\
    \ SQL Server 2022\\. We recognized that you may have time series data you want\
    \ to bring directly into the SQL Server engine and would like to use the power\
    \ of T-SQL to process this type of data.\n\nI asked Kendal Van Dyke, the senior\
    \ program manager for time series and our EAP, the value of time series in T-SQL.\
    \ Kendal said, *“We live in a world where data is constantly measured and stored\
    \ on repeated intervals over time* – stock prices, weather data, retail sales,\
    \ and factory floor sensor measurements are just a few examples. We then use that\
    \ data to track changes, look for trends, and build reports with time being one\
    \ of the axes. The Time Series capabilities in SQL Server 2022 make it easy for\
    \ analysts, data scientists, and developers to do that work directly in the database,\
    \ through enhancements to the T-SQL language that are both easy to write and highly\
    \ performant and using tools with which they are already familiar.”\n\nIn this\
    \ section of the chapter, we will look at four T-SQL functions that can be useful\
    \ for processing time series data stored as SQL Server rows and columns. In each\
    \ section we will use an exercise to show how the functions work.\n\n### Prerequisites\n\
    \nTo use the exercises in this section of the chapter, you will need\n\n*   SQL\
    \ Server 2022 Evaluation Edition.\n\n*   Virtual machine or computer with two\
    \ CPUs and at least 8Gb RAM.\n\n*   SQL Server Management Studio (SSMS). The latest\
    \ 18.x build or 19.x build will work.\n\n*   Scripts from the book samples from\
    \ the **ch08_tsql\\timeseries** folder."
  trans: "### PFS 页上的 BUF 结构\n\n因此，此 PFS 页的 BUF 结构位于 LRU 列表中并经过哈希处理，就像系统中的每一个 BUF\
    \ 结构一样。该缓冲区没有脏（`dirty`），因为它未被修改，也没有处于 I/O 读或写的过程中。\n\n#### 执行步骤 4\n\n执行脚本中的**步骤\
    \ 4**，该步骤使用以下语句：\n\n```sql\n-- Step 4: Combine the packed bits back into the number\n\
    USE master;\nGO\nDECLARE @bstat varbinary(4);\nSET @bstat = 0x9;\nSELECT GET_BIT(@bstat,\
    \ 3)*2*2*2+GET_BIT(@bstat, 2)*2*2+GET_BIT(@bstat, 1)*2+GET_BIT(@bstat, 0)*1;\n\
    SELECT cast((GET_BIT(@bstat, 3)*2*2*2+GET_BIT(@bstat, 2)*2*2+GET_BIT(@bstat, 1)*2+GET_BIT(@bstat,\
    \ 0)*1) as varbinary(4));\nGO\n```\n\n为了证明 `0x9` 代表了这些位，我们来做一个二进制的运算。`2⁰` 应该是\
    \ `1`，`2¹` 应该是 `2`，`2²` 应该是 `4`，`2³` 应该是 `8`。但是位 1 和位 2 是 `OFF` 或 `0`，所以我们实际上是将\
    \ `1+8` 相加得到 `9` 或 `0x9`。\n\n#### 通过页面分配间接修改 PFS 页\n\n让我们看看如果我们通过页面分配间接修改 PFS\
    \ 页会发生什么。执行脚本中的**步骤 5**，该步骤使用以下语句：\n\n```sql\n-- Step 5: Create a table in master\
    \ and see if there are changes\nUSE master;\nGO\nDROP TABLE IF EXISTS cowboysrule;\n\
    GO\nCREATE TABLE cowboysrule (col1 int);\nINSERT INTO cowboysrule VALUES (1);\n\
    GO\n-- bstat should now be 0xb\nDBCC TRACEON(3604);\nGO\nDBCC PAGE(1,1,1,3);\n\
    GO\n-- BUF_DIRTY is now ON which means the page has been modified but not written.\n\
    -- The PFS page is modified because a page allocation was required for the new\
    \ table data\nDECLARE @bstat varbinary(4);\nSET @bstat = 0xb;\nSELECT GET_BIT(@bstat,\
    \ 3) as \"2³ BUF_HASHED\", GET_BIT(@bstat, 2) as \"2² BUF_IO\", GET_BIT(@bstat,\
    \ 1) as \"2¹ BUF_DIRTY\", GET_BIT(@bstat, 0) as \"2⁰ BUF_ONLRU\";\nGO\n```\n\n\
    此时，BUF 结构的结果应为 `0xb`。新查询的结果应显示 `BUF_DIRTY` 位现在是 `1`。所以，如果位 0、1 和 3 是 `ON`，你得到的是\
    \ `11`，这也是十六进制的 `0xb`。\n\n#### 清理并检查点\n\n执行脚本中的**步骤 6**，该步骤使用以下语句删除创建的表并检查点 `master`\
