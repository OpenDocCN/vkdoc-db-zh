  trans: '


    ## 迁移至 Azure 虚拟机上的 SQL Server


    您可能正计划在 Azure 虚拟机上部署 SQL Server，目的是将现有的 SQL Server 实例从本地环境或其他云平台迁移过来。要全面了解将 SQL
    Server 迁移到 Azure 的各种选项，请查阅 [`https://azure.microsoft.com/migration/sql-server`](https://azure.microsoft.com/migration/sql-server)。


    **提示**


    如果您正考虑将许多 SQL Server 实例迁移到 Azure 虚拟机，请查看 Azure Migrate 服务，网址为 [`https://azure.microsoft.com/services/azure-migrate`](https://azure.microsoft.com/services/azure-migrate)。该服务介绍了从本地环境，乃至
    AWS 和 GCP 等其他云平台进行发现与评估的选项。


    执行此迁移有三种选择：


    1.  在 Azure 虚拟机上部署 SQL Server。然后使用数据库的完整备份和恢复执行 `离线迁移` 到 Azure。使用 Azure 存储作为备份文件的托管位置。您需要手动迁移任何其他实例级别的对象或设置。

    2.  在 Azure 虚拟机上部署 SQL Server。然后使用 Azure Data Studio 中的 `Azure SQL 迁移扩展` 执行离线或在线迁移。您可以在
    [`https://docs.microsoft.com/azure/dms/migration-using-azure-data-studio`](https://docs.microsoft.com/azure/dms/migration-using-azure-data-studio)
    了解更多关于此选项的信息。这个选项我很喜欢的一点是，其评估工具可以观察您的 SQL Server 配置和工作负载，然后为 Azure 虚拟机大小和存储提供建议。因此，在部署前，请先使用此工具。离线迁移通过备份和恢复完成。在线迁移则使用日志传送技术以减少停机时间。

    3.  您可以使用 Azure Migrate 或 Azure Site Recovery 将整个虚拟机从本地环境直接迁移 (`lift and shift`)
    到 Azure。您可以在 [`https://docs.microsoft.com/azure/site-recovery/migrate-tutorial-on-premises-azure`](https://docs.microsoft.com/azure/site-recovery/migrate-tutorial-on-premises-azure)
    了解更多关于此选项的信息。请注意此选项，因为迁移后您可能需要进行一些更改以优化您的 SQL Server Azure 虚拟机设置，包括存储配置。


    ## 优化性能


    如果您阅读过本章前面的章节，那么您可能已经做了许多正确的事情来优化 Azure 虚拟机上 SQL Server 的性能。


    但让我们回顾一些重要的选择，并向您介绍我们针对最佳实践的一个新选项。


    ### 虚拟机大小


    您选择的虚拟机大小决定了 CPU 速度、CPU 数量限制、内存、本地磁盘、磁盘数量、最大存储容量、存储性能等等。


    因此，就像在其他云平台或您的数据中心中一样，这是一个重要的选择，对于 Azure 虚拟机上 SQL Server 的最佳性能至关重要。


    如果您查看我们的指南 [`https://aka.ms/SQLIaaSSizing`](https://aka.ms/SQLIaaSSizing)，您会注意到我们的大小选择通常指向
    `E` 系列或 `M` 系列。但该建议是基于 2022 日历年的情况。过去几年我见证了 Azure 虚拟机的大量创新，因此请关注此站点，我们会及时更新最新的大小建议。请记住，正如本章前面已经展示的，即使您仔细选择了正确的存储选项，您的性能也可能受到虚拟机大小的限制。David
    Pless 在一期精彩的 Data Exposed 节目中解释了这一点，链接为 [`https://docs.microsoft.com/shows/data-exposed/azure-sql-vm-caching-and-storage-capping-ep-1-data-exposed`](https://docs.microsoft.com/shows/data-exposed/azure-sql-vm-caching-and-storage-capping-ep-1-data-exposed)。


    请记住，您通常可以对虚拟机进行向上或向下调整大小，您可以在 [`https://docs.microsoft.com/azure/virtual-machines/resize-vm`](https://docs.microsoft.com/azure/virtual-machines/resize-vm)
    了解相关信息。此操作通常可以在停机时间很短的情况下完成，但我也见过在某些情况下耗时较长的情况；具体取决于您的订阅和区域，某些大小选项可能不可用。


    ### 存储性能


    根据我的经验，我相信存储性能可能是客户在 Azure 虚拟机上使用 SQL Server 时最常见的问题之一。


    请密切关注您的存储选择，在部署过程中使用我们的建议，并阅读包含实用检查清单的指南 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-storage`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-storage)。


    让我总结几点我们的建议：


    *   不要在 OS 磁盘上存储任何与 SQL Server 相关的内容，包括系统数据库和 `LOG` 目录。

    *   利用本地 SSD 存储 `tempdb`。

    *   将数据和日志分离到不同的磁盘。使用高级托管磁盘，并根据我们的指南调整其大小，不仅考虑容量，还要考虑 `IOPS` 和吞吐量。利用我们的建议为数据磁盘启用读取缓存，为日志磁盘禁用缓存。


    **注意**


    在 2022 年夏天，我们宣布了 Azure 高级磁盘 V2 的预览版。我们正在评估如何最好地将其与 SQL Server 配合使用，敬请关注。在 [`https://docs.microsoft.com/azure/virtual-machines/disks-types#premium-ssd-v2-preview`](https://docs.microsoft.com/azure/virtual-machines/disks-types#premium-ssd-v2-preview)
    阅读更多关于高级磁盘 V2 的信息。


    *   如果单个磁盘在大小、`IOPS` 或吞吐量方面不够用，请使用存储空间 (Storage Spaces) 等技术将它们组合起来。

    *   还有另一个选项称为超级磁盘 (Ultra disks)。这是一个更昂贵的选项，只有当磁盘延迟对您的 SQL Server 非常敏感时才应考虑此选项。例如，我们有一些客户已将超级磁盘用于内存
    OLTP 的事务日志。


    '
- fmt: "# SQL Best Practices Assessment\n\n注册 Azure 虚拟机上的 SQL Server 的一个显著优势是能够以数字化的形式获取\
    \ Microsoft 关于配置的最佳实践建议。\n\n我们称之为 **SQL best practices assessment**（SQL 最佳实践评估）。\n\
    \n要使用此功能，需要在部署后启用它。在 SQL 虚拟机门户中，从左侧菜单选择 SQL best practices assessment。\n\n然后选择\
    \ **Enable SQL best practices assessment**。系统会要求勾选一个框以启用该功能，并选择一个 Log Analytics\
    \ 工作区。Log Analytics 工作区是 Azure 的一项服务，用于托管指标和其他“日志”信息。我们已将最佳实践评估结果集成到 Log Analytics\
    \ 中。您还有另一个选项来启用最佳实践的定期调度，以便我们定期扫描您的配置（而非您的数据）并持续更新建议。启用此功能后，可能需要几分钟时间，因为我们需要配置\
    \ IaaS 代理扩展和 Log Analytics。\n\n启用此功能后，您可以等待计划运行，或选择 **Run Assessment**（或顶部菜单中的\
    \ **Run**）。\n\n> **注意**\n> 我们为评估收集的大部分信息来自 SQL 查询。您可以使用 SSMS 中的 XEvent Profiler，通过\
    \ XEvent 追踪评估正在进行的操作。查找 `client_app_name` 为 `Microsoft SQL Server IaaS Agent`\
    \ 和 `Microsoft SQL Server IaaS Agent Query Service` 的事件。\n\n一次评估可能需要一些时间，因为它会对您的虚拟机和\
    \ SQL Server 进行非常全面的检查。评估完成后，您可以选择最新的成功评估。我的评估完成时，结果如图 [10-10](#525217_1_En_10_Chapter.xhtml#Fig10)\
    \ 所示。\n\n![](Images/525217_1_En_10_Fig10_HTML.png)\n\n*图 10-10：Azure 虚拟机上 SQL\
    \ Server 的 SQL 最佳实践评估结果截图。下方是两个饼图，分别显示所有问题的总数和按类别分类的问题。底部是两个表格。*\n\n您可以根据严重性和类型查看结果。您会发现各种各样的建议，包括与虚拟机配置相关的建议以及特定于\
    \ SQL Server 的建议。我们的一些建议是 Microsoft 和社区多年来一直在使用的*久经考验*的推荐做法。\n\n我最喜欢的最佳实践评估功能之一是，只要至少运行过一次评估，顶级结果就会直接显示在\
    \ Azure 门户主页的 SQL 虚拟机上，如图 [10-11](#525217_1_En_10_Chapter.xhtml#Fig11) 所示。\n\n\
    ![](Images/525217_1_En_10_Fig11_HTML.png)\n\n*图 10-11：SQL 最佳实践评估通知截图。下方是基本详细信息，其下是一个柱状图，右侧是\
    \ SQL 最佳实践评估的通知列表。*\n\n请访问 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm)\
    \ 获取 SQL 最佳实践评估的所有最新更新。\n\n# High Availability\n\n在规划部署时，您可能需要确保为 Azure 虚拟机上的\
    \ SQL Server 构建高可用性解决方案。或者，您可能只想确保了解以后扩展高可用性的选项。\n\n## Built-In Fault Tolerance\
    \ with Azure\n\n您是否知道，仅通过在 Azure 虚拟机上安装 SQL Server，您就获得了 VM 级别的内置高可用性和容错能力？如果由于数据中心或维护问题需要移动您的虚拟机，我们会使用\
    \ **live migration**（实时迁移）的概念。但我们不仅仅是在问题发生时做出反应。我们还使用机器学习模型来帮助我们采取主动措施，让您的系统运行时间更长、更可预测。请阅读这篇精彩的博客文章，了解其在\
    \ Azure 中的幕后工作原理：[`https://azure.microsoft.com/blog/improving-azure-virtual-machine-resiliency-with-predictive-ml-and-live-migration`](https://azure.microsoft.com/blog/improving-azure-virtual-machine-resiliency-with-predictive-ml-and-live-migration/)。\n\
    \n我们还有一个非常强大的主机和基础设施维护系统，以确保您的高可用性。您可以在 [`https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates`](https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates)\
    \ 阅读更多信息。\n\n## Failover Cluster Instance (FCI)\n\n故障转移群集实例 (FCI) 是 SQL Server\
    \ 客户实现高可用性的一个非常受欢迎的选项。Azure 虚拟机支持使用 Windows Server 故障转移群集 (WSFC) 和 Linux 的 Pacemaker\
    \ 来构建此类系统。\n\n为了支持 FCI，您至少需要多个虚拟机作为 SQL Server 节点。这就是在部署虚拟机时考虑使用可用性选项的地方，例如 **Availability\
    \ Sets**（可用性集），它确保您在 Azure 上部署的 VM 分布在多个隔离的硬件集群中。或者您可以选择 **Availability Zone**（可用性区域），它是每个\
    \ Azure 区域内物理上独立的、能够容忍本地故障的位置。可用性区域为您带来最佳的冗余性。\n\n由于 FCI 需要在节点之间使用**共享存储**，您需要在\
    \ Azure 中使用以下选项之一：\n\n*   **Azure shared disks**（Azure 共享磁盘）\n\n    本质上，这与您在本章练习中为\
    \ Azure 虚拟机设置的托管磁盘相同，但您可以使其共享。\n\n*   **Storage Spaces Direct (SSD) – 仅限 Windows**\n\
    \n    这是 Windows Server 本地环境中的一个流行选项。SSD 使用带有本地磁盘的虚拟存储区域网络 (SAN) 方法。\n\n*   **Premium\
    \ file shares**（高级文件共享）\n\n    高级文件共享是 Azure 文件中的一项功能，本质上是一个共享文件系统。\n\n在这三个选项中，高级文件共享支持最大的容量并且限制最少。\n\
    \n最后一个重要的概念是 **quorum**（仲裁），FCI 需要它来支持故障转移决策。就像本地环境一样，Azure 虚拟机支持使用 Azure 磁盘和文件共享的基于磁盘的\
    \ *witness*（见证人）来实现仲裁。但我推荐的一个独特选项是 **cloud witness**（云见证）。云见证易于设置并使用 Azure 存储。\n\
    \n要开始为 Azure 虚拟机上的 SQL Server 配置 FCI，请访问 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/hadr-windows-server-failover-cluster-overview`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/hadr-windows-server-failover-cluster-overview)。"
  raw: "### SQL Best Practices Assessment\n\nOne of the nice advantages of registering\
    \ your SQL Server on an Azure virtual machine is the ability to get best practices\
    \ from Microsoft in a digital form of recommendations assessing your configuration.\n\
    \nWe call this the **SQL best practices assessment.**\n\nTo use this feature,\
    \ you need to enable it after your deployment. In the SQL virtual machine portal,\
    \ select SQL best practices assessment on the left-hand menu.\n\nThen select **Enable\
    \ SQL best practices assessment**. You will be asked to check a box to enable\
    \ the feature and choose a Log Analytics workspace. A Log Analytics workspace\
    \ is an Azure service where you can host metrics and other “log” information.\
    \ We have integrated the best practice results into Log Analytics. You have another\
    \ option to enable scheduling for best practices so that on a regular basis we\
    \ scan your configuration (not your data) and continually update our recommendations.\
    \ When you enable this feature, it will take a few minutes as we have to configure\
    \ the IaaS Agent Extension and configure the Log Analytics.\n\nWith this feature\
    \ enabled, you can wait for a scheduled run or select Run Assessment (or Run at\
    \ the top menu).\n\nNote\n\nMuch of the information we collect for an assessment\
    \ comes from SQL queries. You can trace with XEvent what the assessment is doing\
    \ using XEvent Profiler from SSMS. Look for client_app_name of Microsoft SQL Server\
    \ IaaS Agent and Microsoft SQL Server IaaS Agent Query Service.\n\nAn assessment\
    \ can take a while as it is a very robust check of your virtual machine and SQL\
    \ Server. When the assessment is done, you can select latest successful assessment.\
    \ When mine was complete, the results looked like Figure [10-10](#525217_1_En_10_Chapter.xhtml#Fig10).\n\
    \n![](Images/525217_1_En_10_Fig10_HTML.png)\n\nA screenshot of S Q L best practices\
    \ assessment results. Below are 2 pie charts for total issues and category under\
    \ all issues tab. At the bottom are 2 tables.\n\nFigure 10-10\n\nSQL best practices\
    \ assessment for SQL Server on an Azure virtual machine\n\nYou can see results\
    \ based on severity and type. You will find a wide range of recommendations including\
    \ ones related to the virtual machine configuration and others specific to SQL\
    \ Server. Some of our recommendations are *tried-and-true* recommendations that\
    \ Microsoft and the community have been using for years.\n\nOne of the things\
    \ I love about the best practices assessment is that when at least one assessment\
    \ has been run, the top results are right in front of me on the Azure portal home\
    \ page for the SQL virtual machine like in Figure [10-11](#525217_1_En_10_Chapter.xhtml#Fig11).\n\
    \n![](Images/525217_1_En_10_Fig11_HTML.png)\n\nA screenshot with details of essentials.\
    \ Below them is a column chart and on the right is a list of notifications for\
    \ S Q L best practices assessment.\n\nFigure 10-11\n\nSQL best practices assessment\
    \ notifications\n\nGet all the latest updates for SQL best practices assessment\
    \ at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm).\n\
    \n## High Availability\n\nAs part of planning for deployment, you may want to\
    \ make sure you build a highly available solution for SQL Server on an Azure virtual\
    \ machine. Or you just want to make sure you know the options to extend HA later.\n\
    \n### Built-In Fault Tolerance with Azure\n\nDid you know that just by installing\
    \ SQL Server on an Azure virtual machine, you have built-in HA and fault tolerance\
    \ at the VM level? We use the concept of **live migration** should we need to\
    \ move your virtual machine due to a problem in the data center or maintenance.\
    \ But we go further than just react to a problem. We have machine learning models\
    \ helping us take proactive actions to keep you running longer and more predictably.\
    \ Read this excellent blog post on how it works behind the scenes in Azure at\
    \ [`https://azure.microsoft.com/blog/improving-azure-virtual-machine-resiliency-with-predictive-ml-and-live-migration`](https://azure.microsoft.com/blog/improving-azure-virtual-machine-resiliency-with-predictive-ml-and-live-migration/).\n\
    \nWe also have a very robust system for maintenance of hosts and infrastructure\
    \ to keep you highly available. You can read more at [`https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates`](https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates).\n\
    \n### Failover Cluster Instance (FCI)\n\nA Failover Cluster Instance (FCI) is\
    \ a very popular option for SQL Server customers for high availability. Azure\
    \ virtual machines support building this type of system with Windows Server Failover\
    \ Cluster (WSFC) and Pacemaker for Linux.\n\nIn order to support an FCI, you will\
    \ need multiple virtual machines at minimum for the SQL Server nodes. This is\
    \ where you would consider using Availability options when deploying the virtual\
    \ machine such as **Availability Sets**, which ensure that the VMs you deploy\
    \ on Azure are distributed across multiple isolated hardware clusters. Or you\
    \ can choose an **Availability Zone**, which is physically separate locations\
    \ within each Azure region that are tolerant to local failures. Zones bring you\
    \ the best redundancy.\n\nSince an FCI requires **shared storage** across nodes,\
    \ you need to use one of the following choices in Azure:\n\n*   **Azure shared\
    \ disks**\n\n    Effectively this is the same managed disk you set up for an Azure\
    \ virtual machine for the exercises in this chapter, but you have the ability\
    \ to make it shared.\n\n*   **Storage Spaces Direct (SSD) –** Windows only\n\n\
    \    This is a popular option on Windows Server on-premises. SSD uses a virtual\
    \ Storage Area Network (SAN) approach with local disks.\n\n*   **Premium file\
    \ shares**\n\n    Premium file shares are a feature in Azure for Azure files that\
    \ are effectively a shared file system.\n\nOut of the three options, Premium file\
    \ shares support the largest sizes and have the lowest set of limitations.\n\n\
    One last important concept is **quorum**, which is required in FCI to support\
    \ decisions on failover. Just like on-premises, an Azure virtual machine will\
    \ support a disk-based *witness* for quorum using Azure disks and file shares.\
    \ But a unique option I recommend is a **cloud witness**. A cloud witness is easy\
    \ to set up and uses Azure storage.\n\nTo get started with an FCI for SQL Server\
    \ on an Azure virtual machine, go to [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/hadr-windows-server-failover-cluster-overview`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/hadr-windows-server-failover-cluster-overview)."
  trans: "# SQL 最佳实践评估\n\n在 Azure 虚拟机上注册 SQL Server 的一个显著优势，是能够以数字化形式获取 Microsoft\
    \ 关于配置的最佳实践建议。\n\n我们将其称为 **SQL best practices assessment**（SQL 最佳实践评估）。\n\n要使用此功能，需要在部署后启用它。在\
    \ SQL 虚拟机门户中，从左侧菜单选择 **SQL best practices assessment**。\n\n然后选择 **Enable SQL best\
    \ practices assessment**。系统会要求勾选一个框以启用该功能，并选择一个 Log Analytics 工作区。Log Analytics\
    \ 工作区是 Azure 的一项服务，用于托管指标和其他“日志”信息。我们已将最佳实践评估结果集成到 Log Analytics 中。您还有另一个选项来启用最佳实践的定期调度，以便我们定期扫描您的配置（而非您的数据）并持续更新建议。启用此功能后，可能需要几分钟时间，因为我们需要配置\
    \ IaaS 代理扩展和 Log Analytics。\n\n启用此功能后，您可以等待计划运行，或选择 **Run Assessment**（或顶部菜单中的\
    \ **Run**）。\n\n> **注意**\n> 我们为评估收集的大部分信息来自 SQL 查询。您可以使用 SSMS 中的 XEvent Profiler，通过\
    \ XEvent 追踪评估正在进行的操作。查找 `client_app_name` 为 `Microsoft SQL Server IaaS Agent`\
    \ 和 `Microsoft SQL Server IaaS Agent Query Service` 的事件。\n\n一次评估可能需要一些时间，因为它会对您的虚拟机和\
    \ SQL Server 进行非常全面的检查。评估完成后，您可以选择最新的成功评估。在我的评估完成时，结果如图 10-10 所示。\n\n![](img/525217_1_En_10_Fig10_HTML.png)\n\
    \n*图 10-10：Azure 虚拟机上 SQL Server 的 SQL 最佳实践评估结果截图。下方是两个饼图，分别显示所有问题的总数和按类别分类的问题。底部是两个表格。*\n\
    \n您可以根据严重性和类型查看结果。您会发现各种各样的建议，包括与虚拟机配置相关的建议以及特定于 SQL Server 的建议。我们的一些建议是 Microsoft\
    \ 和社区多年来一直在使用的*久经考验*的推荐做法。\n\n我最喜欢的最佳实践评估功能之一是，只要至少运行过一次评估，顶级结果就会直接显示在 Azure 门户主页的\
    \ SQL 虚拟机上，如图 10-11 所示。\n\n![](img/525217_1_En_10_Fig11_HTML.png)\n\n*图 10-11：SQL\
    \ 最佳实践评估通知截图。下方是基本详细信息，其下是一个柱状图，右侧是 SQL 最佳实践评估的通知列表。*\n\n请访问 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-assessment-for-sql-vm)\
    \ 获取 SQL 最佳实践评估的所有最新更新。\n\n# 高可用性\n\n在规划部署时，您可能需要确保为 Azure 虚拟机上的 SQL Server 构建高可用性解决方案。或者，您可能只想确保了解以后扩展高可用性的选项。\n\
    \n## Azure 的内置容错能力\n\n您是否知道，仅通过在 Azure 虚拟机上安装 SQL Server，您就获得了 VM 级别的内置高可用性和容错能力？如果由于数据中心或维护问题需要移动您的虚拟机，我们会使用\
    \ **live migration**（实时迁移）的概念。但我们不仅仅是在问题发生时做出反应。我们还使用机器学习模型来帮助我们采取主动措施，让您的系统运行时间更长、更可预测。请阅读这篇精彩的博客文章，了解其在\
