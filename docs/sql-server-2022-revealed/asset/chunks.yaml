- fmt: 'One level above the parquet file is a JSON file with schema information. You
    can find out which table this parquet file belongs to by using the `table_id`
    from the folder and running a query against your SQL Server 2022 database like
    in the script `getchangefeedtable.sql`. You will need to substitute the GUID for
    your `table_id` in the script before executing it:


    ```sql

    USE [WideWorldImporters];

    GO

    SELECT object_name(object_id), *

    FROM changefeed.change_feed_tables

    WHERE table_id =  ''05fc889f-689f-438c-b1fd-cdb9a1333a4f'';

    GO

    ```


    `changefeed.change_feed_tables` also has some interesting statistics about the
    snapshot creation of the table.


    Now that your tables have been initially synchronized into Synapse, let’s see
    how changes are captured and automatically fed into Synapse.


    #### Near-Real-Time Analytics with Changes from SQL Server


    You have everything set up and synchronized. Now what happens? Well, the power
    of Synapse Link for SQL Server is that now that everything is set up, changes
    you make with SQL Server just show up in near-real time in Synapse.


    ![](Images/525217_1_En_3_Fig37_HTML.png)


    A screenshot of the landing zone of the containers page. It has a table with columns
    for name, modified, access tier, archive status, and blob type.


    Figure 3-37


    Files in the landing zone for changes


    1.  Let’s make changes and see them show up in Synapse. Add random amounts of
    cargo in SQL Server 2022 using the script `modifyvehicledata.sql` running against
    your SQL Server instance.

    2.  Look at the landing zone to see CSV files by looking at the container and
    drilling into the `indexWorkingDir` folder instead of `Tables` like in Figure
    [3-37](#525217_1_En_3_Chapter.xhtml#Fig37).


    ![](Images/525217_1_En_3_Fig38_HTML.png)


    A screenshot shows s q l script 1\. The top pane has a 6-line code. The bottom
    pane has a table with columns for vehicle registration, vehicle city, and cargo.


    Figure 3-38


    Updated cargo counts in Synapse


    3.  Go back to Synapse Studio and run the same query from `getcargocounts.sql`
    to see the changes have been applied like in Figure [3-38](#525217_1_En_3_Chapter.xhtml#Fig38).


    So all those steps to set up but only a few steps to see changes appear in Synapse.
    That is what Synapse Link provides, near-real-time changes from SQL Server automatically
    available in Synapse.


    ### More Details About Synapse Link


    There are a few details about Synapse Link I think you should know about. To get
    all the details and latest updates, be sure to consult the documentation at [`https://aka.ms/synapselinksqlserver`](https://aka.ms/synapselinksqlserver).


    #### Configuration Choices


    As you set Synapse Link, there are configuration choices you can make including
    the following:


    ![](Images/525217_1_En_3_Fig39_HTML.png)


    A screenshot of a tab titled s q l 2022 link connection. An arrow points to the
    checked box for the drop and recreate table on target option under target pool.


    Figure 3-39


    Dropping and recreating tables in Synapse pools on a linked connection start


    *   **SQL pool**


    When you create a SQL dedicated pool in Synapse, you can choose a performance
    level called a Data Warehouse Unit (`DWU`). We chose the default in our exercise,
    but for a production workload, you may want to choose another level. Your choice
    of `DWU` affects the performance of queries you run against tables in the SQL
    pool. But there is also a price for your performance decision. The `DWU` choice
    you make can also affect the ability to concurrently process tables for ingestion.
    You can change the `DWU` setting after you create the pool (scale up or down).
    You can learn more about `DWU` settings at [`https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/what-is-a-data-warehouse-unit-dwu-cdwu#change-data-warehouse-units`](https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/what-is-a-data-warehouse-unit-dwu-cdwu#change-data-warehouse-units).


    *   **Stopping and restarting the linked connection**


    If you stop the linked connection to SQL Server, all the Synapse Link system table
    data is removed, and the files in the landing zone container are deleted. All
    current data in SQL pool tables is not affected.


    If you start the linked connection again, we will take a new snapshot of all tables
    from SQL Server and place them in the landing zone. Here is an important warning.
    If you restart the linked connection and don’t select the option `Drop and recreate
    table on target`, your linked connection will show errors because the target tables
    already exist. So you can either drop the tables yourself first in Synapse or
    use this option when starting the connection. This option can be found on the
    General tab under the window where you start the connection as seen in Figure
    [3-39](#525217_1_En_3_Chapter.xhtml#Fig39).


    Note


    We are also looking at an enhancement to be able to pause and resume the linked
    connection. If the linked connection is paused, SQL Server will keep feeding data
    and changes into the landing zone, but these changes won’t appear in Synapse until
    you resume the linked connection.


    *   **Core counts for linked connections**


    When you create the linked connection, you have a choice called core counts. These
    core counts are specifically designed for ingestion processing. The more cores
    you select, the faster your data can be ingested. But larger core counts can also
    affect costs. We recommend you start with smaller core counts to save costs and
    adjust upward. The only issue with changing core counts is you must stop and restart
    the linked connection, which requires a re-snapshot of all the tables (until pause
    and resume is available).


    *   **Scheduled or continuous mode**


    Another option when you create the linked connection is scheduled or continuous
    mode. Continuous mode means the ingestion service will always be looking for changes
    in the landing zone to process data. Scheduled mode allows you to schedule ingestion
    for certain time ranges. Scheduled mode will help you save ingestion costs but
    will also delay when data is available to read in SQL pool tables. Using scheduled
    mode will not affect any latency of transaction processing or log truncation on
    SQL Server 2022.


    *   **Adding or dropping tables to/from the linked connection**


    You can add or drop tables to/from the linked connection. A new snapshot for the
    new table will be created and synchronized to the new SQL pool table.


