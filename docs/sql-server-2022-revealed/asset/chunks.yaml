- fmt: '### What Else Should I Know About DOP Feedback?


    There are several key points about DOP feedback you need to know as you take advantage
    of this feature:


    *   If you set the database-scoped configuration value `DOP_FEEDBACK = OFF` and
    feedback has not been persisted, it will be lost, and you have effectively “reset
    the system.” If feedback is persisted, then queries will revert to “default” DOP
    behavior, but feedback is not lost. If you turn it ON again, DOP feedback will
    be used.


    *   If feedback is not persisted, then any recompile causes a reset to “start
    over.” If feedback is persisted, then feedback survives a restart or recompile,
    which is the benefit of using `Query Store` to save feedback.


    *   The current context of the database where a query is executed is the basis
    for considering DOP feedback. Therefore, if you execute a query that crosses multiple
    databases, the database context in which you executed the query is used if `DOP_FEEDBACK`
    is ON for that database.


    *   Queries using temporary tables are eligible for `DOP_FEEDBACK`. I modified
    the preceding exercise to use a temporary table in the stored procedure and ran
    through the entire exercise. It behaved the same as when using a user table.


    *   I mentioned earlier about the original DOP and precedence order for using
    DOP feedback. Assuming that the database option `DOP_FEEDBACK` is ON and you are
    not using the `DISABLE_DOP_FEEDBACK` query hint, we will “start” the baseline
    DOP to use for feedback consideration on your settings for a query hint, resource
    group, database-scoped configuration, or instance configuration.


    As an example, if you are not using query hints or any other configuration value
    except you have ‘max degree of parallelism’ set to 8, we will start the baseline
    for DOP feedback at 8 (even if you have more CPUs than 8).


    *   In SQL Server 2017, we introduced the concept of Automatic Plan Correction
    (`APRC`), which also leverages `Query Store`. The concept is to automatically
    revert to a “last known good” plan if a regression has occurred. If you have `APRC`
    enabled, that takes precedence over using DOP feedback. You can learn more about
    `APRC` at `https://docs.microsoft.com/sql/relational-databases/automatic-tuning/automatic-tuning?#automatic-plan-correction.ack`.


    Keep up to date with all the latest documentation and updates for DOP feedback
    at `https://aka.ms/dopfeedback`.


    ## An Engine That Works for You


    Think about all the innovation that is now poured into built-in query intelligence
    in SQL Server 2022.


    Starting in `SQL Server 2016`, we introduced `Query Store`, and now it is more
    powerful and useable than ever in SQL Server 2022 with hints, support for read
    replicas, and integration with `IQP`.


    In `SQL Server 2017` we introduced these `IQP` capabilities:


    *   Adaptive joins


    *   Interleaved execution


    *   Memory grant feedback for batch mode


    Then in `SQL Server 2019` we added


    *   Memory grant feedback for row mode


    *   Batch mode for row mode (non-columnstore queries)


    *   Scalar UDF inlining


    *   Table variable deferred compilation


    *   Approximate count distinct


    And now in `SQL Server 2022`, along come


    *   Approximate percentile


    *   Optimized plan forcing


    *   DOP feedback


    *   Memory grant percentiles and persistence


    *   Parameter-Sensitive Plan optimization


    *   CE feedback


    I know I’m biased, but for me this is an engine that works for you. Aside from
    coding up examples for approximate functions, every one of these features doesn’t
    require any code changes. And these are not special add-on features. They are
    built into the core of the engine, everywhere SQL exists. They are some of the
    brightest areas of innovation in our product based on real-world scenarios, scenarios
    that you see every day.


    I think Hanuma Kodavalla, Technical Fellow at Microsoft, summed it up best when
    he told me:


    > The power of the query is what distinguishes relational databases from others
    and SQL Server provides one of the most sophisticated query processing engines
    in the industry. SQL Server engineers and program managers routinely use the telemetry
    collected from millions of cloud databases, of varying sizes – a few GB to a hundred
    TB, running a large spectrum of workloads – OLTP, Datawarehouse, HTAP – to understand
    common query patterns and design features that improve query performance. Stemming
    from that effort are many SQL Server 2202 features – Parameter-Sensitive Plans,
    Cardinality Estimate feedback, Approximate Query Processing, Optimized Plan Forcing,
    QDS on readable secondaries, improvements to QDS hints, Memory Grant Feedback,
    and intelligent selection of Degree of Parallelism. In all of these features,
    a constant theme is to develop innovative algorithms that adapt to the various
    query patterns and system load at run-time to come up with better plans and improve
    query execution. Due to these features, workloads often see dramatic performance
    improvements without requiring any changes to the application. Further, all of
    these features are deployed to the cloud and tested on mission-critical workloads
    before releasing to the SQL Server 2022 customers, so they are all ready to be
    used in production.


    # 6. The Meat and Potatoes of SQL Server


    Several years ago I was preparing for one of the famous “Conor and Bob” shows
    for the PASS Summit keynote. I created this elaborate idea involving machine learning,
    analytics, and other types of new features. I showed this to Conor, and he simply
    said, “Bob, I think we should stick to the meat and potatoes for our show.” Being
    from Texas I knew what he meant. Highlight the `core engine` capabilities of SQL
    Server.


    Of course, SQL has core capabilities for things like machine learning and analytics,
    but what Conor really meant was security, scalability (performance), and availability.
    For every major release, we have to invest in these three areas, or we really
    don’t have an engine.


    ## The Core Engine Is the Meat and Potatoes of SQL Server


    This chapter is all about the core engine areas of security, scalability (performance),
    and availability – plus some other “stuff” that doesn’t quite fit those categories.
    Built-in query intelligence is certainly a part of the core engine, but it deserved
    its own chapters. Here I’ll cover all the new features to help:


    *   Secure your application and data.


    *   Ensure your application can scale and perform.


    *   Ensure your application is highly available.


    And then a list of features that are just “pure goodness” for the engine. You
    may start reading this chapter and feel that this is “just a list of features.”
    But every new enhancement in this chapter has a story and a reason behind it.
    I’ll try to give you those details for many of these new features. These categories
    are not in a particular order, but I usually start with security.


    ## Security


    I’ve always felt our engineering team deeply cares about security, not just because
    we are the least vulnerable database in the industry for well over a decade (we
    didn’t produce this – you can see for yourself from the National Institute of
    Standards and Technology Comprehensive Vulnerability Database) but because we
    pour in new features to help keep applications and data more secure.


    For SQL Server 2022, this includes enhancements for data integrity, encryption,
    and authorization. The story all starts with a revolutionary innovation called
    `Ledger for SQL Server`.


    Note


    I consider `Azure Active Directory (AAD)` authentication, `Microsoft Purview`
    policy management, and `Microsoft Defender` all “security” features. But these
    are covered in more detail in Chapter 3 of the book.'
