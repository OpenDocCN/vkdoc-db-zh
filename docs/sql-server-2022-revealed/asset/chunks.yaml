    \ to be used for the exercise using the script **proc.sql**. This script uses\
    \ the following T-SQL statements:\n\n    ```\n    USE WideWorldImporters;\n  \
    \  GO\n    CREATE OR ALTER PROCEDURE [Warehouse].[GetStockItemsbySupplier]  @SupplierID\
    \ int\n    AS\n    BEGIN\n    SELECT StockItemID, SupplierID, StockItemName, TaxRate,\
    \ LeadTimeDays\n    FROM Warehouse.StockItems s\n    WHERE SupplierID = @SupplierID\n\
    \    ORDER BY StockItemName;\n    END;\n    GO\n    ```\n\n    You can see the\
    \ stored procedure takes in a single parameter, @SupplierID, and will use this\
    \ parameter as a predicate or filter to find rows in the StockItems table.\n\n\
    6.  Execute the script **setup.sql** using SSMS. This will ensure the WideWorldImporters\
    \ database is at dbcompat 150 (so PSP is not initially enabled) and clear Query\
    \ Store. This script uses the following T-SQL statements:\n\n    ```\n    USE\
    \ WideWorldImporters;\n    GO\n    ALTER DATABASE current SET COMPATIBILITY_LEVEL\
    \ = 150;\n    GO\n    ALTER DATABASE current SET QUERY_STORE CLEAR;\n    GO\n\
    \    ```\n\n7.  In SSMS open a new query editor window (I like to select Databases\
    \ in Object Explorer and use the File ➤ New ➤ Database Engine Query menu) and\
    \ choose the button on the menu for Include Actual Execution Plan. Execute the\
    \ script **query_plan_seek.sql** twice in a query window in SSMS. The script uses\
    \ the following T-SQL statements:\n\n    ```\n    USE WideWorldImporters;\n  \
    \  GO\n    SET STATISTICS TIME ON;\n    GO\n    USE WideWorldImporters;\n    GO\n\
    \    -- The best plan for this parameter is an index seek\n    EXEC Warehouse.GetStockItemsbySupplier\
    \ 2;\n    GO\n    ```\n\n    Note the query execution time is fast (< 1 second).\
    \ Check the timings from SET STATISTICS TIME ON from the second execution (use\
    \ the last set of timings). The query is run twice, so the second execution will\
    \ not require a compile. This is the time we want to compare. If you select the\
    \ **Messages** tab and scroll down for the last set of timings, your results should\
    \ look similar to the following (your timings may vary, but it should be fairly\
    \ close to these):\n\n    ```\n    SQL Server Execution Times:\n    CPU time =\
    \ 15 ms,  elapsed time = 34 ms.\n    SQL Server Execution Times:\n    CPU time\
    \ = 15 ms,  elapsed time = 34 ms.\n    ```\n\n    If you select the Execution\
    \ Plan tab in the results window, you can see the query plan uses an index seek\
    \ as seen in Figure [5-6](#525217_1_En_5_Chapter.xhtml#Fig6).\n\n![](Images/525217_1_En_5_Fig7_HTML.png)\n\
    \nA flowchart of clustered index scan for different parameters. Clustered index\
    \ scan, stock items P K underscore warehouse, cost 18 percentage, 2.792s 3999847\
    \ of 3999850, 99 percentage, leads to sort, cost 76 percentage, 4.948s, 3999847\
    \ of 3999850, 99 percentage to Parallelism, cost 7 percentage, 8.597s, 3999847\
    \ of 3999850, 99 percentage to select, cost 0 percentage.\n\nFigure 5-7\n\nClustered\
    \ index scan for a different parameter\n\n1.  In a different query window, choose\
    \ the menu button for Include Actual Execution Plan in SSMS. Execute the script\
    \ **query_plan_scan.sql**. The execution can take up to ~30 seconds. This script\
    \ uses the following T-SQL statements:\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n\
    \    -- The best plan for this parameter is an index scan\n    EXEC Warehouse.GetStockItemsbySupplier\
    \ 4;\n    GO\n    ```\n\n    This script will simulate a plan cache eviction so\
    \ that when the stored procedure is executed, the query processor will have to\
    \ compile a new query plan. If you select the Execution Plan tab in the results\
    \ window, you will see a query plan similar to Figure [5-7](#525217_1_En_5_Chapter.xhtml#Fig7).\n\
    \nYou can see that the new query plan uses a clustered index scan and parallelism.\n\
    \n![](Images/525217_1_En_5_Fig8_HTML.png)\n\nA screenshot of a line graph and\
    \ various options of a window. The line graph plots numbers versus time for percentage\
    \ processor time and batch request slash sec. An arrow points to the maximum of\
    \ batch request slash sec.\n\nFigure 5-8\n\nWorkload throughput with an initial\
    \ index seek plan\n\n1.  Run the script **query_plan_seek.sql** again. The elapsed\
    \ time is still fast (< 1 second), but if you look at the timings in the Messages\
    \ tab, you will see it is significantly slower. If you select the Execution Plan\
    \ tab, you will now see this query is using the new plan with a clustered index\
    \ scan. This is because only one plan can be in cache for the statement in the\
    \ same stored procedure.\n\n    **Note** If you want to just see PSP optimization\
    \ from a single execution, you have the option here to execute the script **dbcompat160.sql**\
    \ and then repeat the preceding steps with **query_index_seek.sql** and **query_index_scan.sql**.\
    \ You will see each execution can have its own plan. To see the workload impact\
    \ for PSP optimization, proceed to the next steps. If you try out PSP optimization\
    \ with these SQL scripts and want to proceed to next steps, run setup.sql to reset\
    \ the exercise. **These next steps will only work on Windows systems, but you\
    \ could change the scripts to run ostress.exe on a Windows system connecting to\
    \ SQL Server on Linux or a container.**\n\n2.  Launch Windows Performance Monitor\
    \ (you can just type **perfmon** from a command prompt). Leave the default counter\
    \ of **% Processor Time**. Add the counter **SQL Server:SQL Statistics Batch Requests/Sec**.\
    \ I like to use batch requests/sec as a simple measure of workload throughput.\
    \ I recommend you change the colors for one of the counters. I also like to increase\
    \ the width of the counter to make it more readable (color and width are available\
    \ by right-clicking a counter and selecting Properties).\n\n3.  Examine the script\
    \ **workload_index_seek.cmd**. This script will use ostress.exe to simulate multiple\
    \ users repeatedly executing the stored procedure with a value that will ideally\
    \ use an index seek in the query plan. The script assumes a connection to a local\
    \ server and Windows authentication. Change the script per your needs. The script\
    \ uses the following command:\n    *   The -n parameter is number of users (ostress\
    \ uses threads). This is a value you provide when you execute the script. On a\
    \ two-CPU machine, ten users are enough. You may want to increase this number\
    \ on machines with more CPUs to see more impact.\n\n    *   The -r parameter is\
    \ number of iterations.\n\n    *   The -q parameter is “quiet mode” to throw away\
    \ results because we just want to see how fast this will run.\n\n    ```\n   \
    \ \"c:\\Program Files\\Microsoft Corporation\\RMLUtils\\ostress\" -E -Q\"EXEC\
    \ Warehouse.GetStockItemsbySupplier 2;\" -n%1 -r200 -q –dWideWorldImporters\n\
    \    ```\n\n4.  Execute the script **workload_index_seek.cmd 10** from a command\
    \ prompt. The command should finish in a second or two. Take note of the values\
    \ in perfmon. Your results should look similar to Figure [5-8](#525217_1_En_5_Chapter.xhtml#Fig8).\n\
    \n![](Images/525217_1_En_5_Fig9_HTML.png)\n\nA screenshot of a line graph and\
    \ various options of a window. The line graph plots numbers versus time for percentage\
    \ processor time and batch request slash sec, and so on.\n\nFigure 5-9\n\nWorkload\
    \ throughput drops due to PSP\n\n1.  Execute the script **workload_index_scan.cmd**\
    \ from a command prompt. This should take longer but still complete in a few seconds.\
    \ This script uses the following commands:\n\n    ```\n    \"c:\\Program Files\\\
    Microsoft Corporation\\RMLUtils\\ostress\" -E -Q\"ALTER DATABASE SCOPED CONFIGURATION\
    \ CLEAR PROCEDURE_CACHE;\" -n1 -r1 -q -oworkload_wwi_regress -dWideWorldImporters\n\
    \    \"c:\\Program Files\\Microsoft Corporation\\RMLUtils\\ostress\" -E -Q\"EXEC\
    \ Warehouse.GetStockItemsbySupplier 4;\" -n1 -r1 -q -oworkload_wwi_regress -dWideWorldImporters\n\
    \    ```\n\n    This script simulates plan cache eviction and executes the stored\
    \ procedure that will cause a query plan to be compiled into cache using a clustered\
    \ index scan.\n\n2.  Execute the script **workload_index_seek.cmd 10** from a\
    \ command prompt again. Notice the command does not complete after a few seconds.\
    \ Look at perfmon and compare it with the previous execution. You will see a severe\
    \ drop in batch requests/sec and a jump to 100% CPU utilization as shown in Figure\
    \ [5-9](#525217_1_En_5_Chapter.xhtml#Fig9).\n\nThis example demonstrates the overall\
    \ impact of the change to a plan with a clustered index scan. Multiple users are\
    \ now all scanning the table using parallelism at the same time.\n\n![](Images/525217_1_En_5_Fig10_HTML.png)\n\
    \nA screenshot of a line graph and various options of a window. The line graph\
    \ plots numbers versus time for percentage processor time and batch request slash\
    \ sec, and so on. A pop-up notification on the top left reads View Current Activity.\n\
    \nFigure 5-10\n\nConsistent performance with PSP optimization\n\n1.  Before you\
    \ look at the solution, execute the script **suppliercount.sql** from SSMS. This\
    \ script uses the following T-SQL statements:\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    SELECT SupplierID, count(*) as supplier_count\n    FROM Warehouse.StockItems\n\
    \    GROUP BY SupplierID;\n    GO\n    ```\n\n    If you look at the results,\
    \ you will see the skew in data. There are only a few rows for SupplierID = 2\
    \ but millions for SupplierID = 4.\n\n2.  Now let’s see how SQL Server 2022 can\
    \ solve this problem with no code changes. Execute the SQL script **dbcompat160.sql**\
    \ in SSMS. This script uses the following T-SQL statements:\n\n    ```\n    USE\
    \ WideWorldImporters;\n    GO\n    ALTER DATABASE CURRENT SET COMPATIBILITY_LEVEL\
    \ = 160;\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n\
    \    GO\n    ALTER DATABASE CURRENT SET QUERY_STORE CLEAR;\n    GO\n    ```\n\n\
    \    This script will update the dbcompat level to 160, thereby enabling PSP optimization.\
    \ To reset the environment, we will clear the plan cache and Query Store.\n\n\
    3.  Execute the script **workload_index_seek.cmd 10** from a command prompt. It\
    \ should finish in a few seconds. Next, execute **workload_index_scan.cmd** from\
    \ a command prompt. Finally, execute **workload_index_seek.cmd 10** from a command\
    \ prompt again. Notice both executions finish at approximately the same time.\
    \ Perfmon should also show consistent results from both executions as seen in\
    \ Figure [5-10](#525217_1_En_5_Chapter.xhtml#Fig10).\n\nThe two rectangular shapes\
    \ in purple represent the consistent performance between both executions of workload_index_seek.cmd\
    \ with PSP optimization enabled.\n\nYou can see that with PSP optimization, you\
    \ can now achieve consistent performance with no code changes.\n\n1.  With Query\
    \ Store enabled, we can get insights into the different plans, dispatcher, and\
    \ variants.\n\n    **Note** Query Store is not required for PSP optimization but\
    \ can be useful to get insights into query performance.\n\nUsing SSMS, select\
    \ from Query Store in Object Explorer the **Top Resource-Consuming Queries** report.\
    \ Figure [5-11](#525217_1_En_5_Chapter.xhtml#Fig11) shows the query variant plan\
    \ using the clustered index scan for the query from the stored procedure.\n\n\
    ![](Images/525217_1_En_5_Fig11_HTML.png)\n\nA screenshot of the top 25 resource\
    \ consumers for database wide world importers. The screenshot has a bar chart\
    \ on the left, a plan summary for query 3, and plan 3, not forced at the bottom.\
    \ An arrow points from the bar chart to a text that reads lead time days from\
    \ warehouse in plan 3, not forced.\n\nFigure 5-11\n\nClustered index scan query\
    \ variant plan\n\nFigure [5-12](#525217_1_En_5_Chapter.xhtml#Fig12) shows another\
    \ query_id using the index seek but for the same query text.\n\n![](Images/525217_1_En_5_Fig12_HTML.png)\n\
    \nA screenshot of the top 25 resource consumers for database wide world importers.\
    \ The screenshot has a bar chart on the left, a plan summary for query 2 on the\
    \ right, and plan 2, not forced at the bottom. An arrow points from the bar chart\
    \ to a text that reads lead time days from warehouse in plan 2, not forced.\n\n\
    Figure 5-12\n\nIndex seek query variant plan\n\nI said PSP optimization allows\
    \ for multiple plans for the same query, but why does Query Store think there\
    \ are two “queries”? Let’s look further using Query Store metadata.\n\n![](Images/525217_1_En_5_Fig13_HTML.png)\n\
    \nA graphical show plan operator. The text in the show plan operator reads query\
    \ 1, query cost, 100 percentage; select stock items I D, supplier I D, stock item\
    \ name, lead time days from warehouse dot stock items where supplier I D equals\
    \ at supplier I D order by stock item name; and multiple plan, cost 0 percentage.\n\
    \nFigure 5-13\n\nA dispatcher plan operator\n\n1.  Execute the script **query_store_plans.sql**.\
    \ This script executes the following T-SQL statements:\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    -- Look at the queries and plans for variants\n    -- Notice each\
    \ query is from the same parent_query_id and the query_hash is the same\n    SELECT\
    \ qt.query_sql_text, qq.query_id, qv.query_variant_query_id, qv.parent_query_id,\n\
    \    qq.query_hash,qr.count_executions, qp.plan_id, qv.dispatcher_plan_id, qp.query_plan_hash,\n\
    \    cast(qp.query_plan as XML) as xml_plan\n    FROM sys.query_store_query_text\
    \ qt\n    JOIN sys.query_store_query qq\n    ON qt.query_text_id = qq.query_text_id\n\
    \    JOIN sys.query_store_plan qp\n    ON qq.query_id = qp.query_id\n    JOIN\
    \ sys.query_store_query_variant qv\n    ON qq.query_id = qv.query_variant_query_id\n\
    \    JOIN sys.query_store_runtime_stats qr\n    ON qp.plan_id = qr.plan_id\n \
    \   ORDER BY qv.parent_query_id;\n    GO\n    ```\n\n    If you look at the results,\
    \ you will see the following interesting things:\n    *   The **query_hash** value\
    \ is the same for both **query_id** values.\n\n    *   There are two **query_variant_id**\
    \ values with the same **parent_query_id** (dispatcher). These values come from\
    \ a new DMV in Query Store called **sys.query_store_query_variant**.\n\n    *\
    \   If you expand the **query_sql_text** values, you will see the SELECT statement\
    \ from the stored procedure but with an added option like **option (PLAN PER VALUE(ObjectID\
    \ = 1835153583, QueryVariantID = 1, predicate_range([WideWorldImporters].[Warehouse].[StockItems].[SupplierID]\
    \ = @SupplierID, 100.0, 1000000.0)))**\n\n        and\n\n        **option (PLAN\
    \ PER VALUE(ObjectID = 1835153583, QueryVariantID = 3, predicate_range([WideWorldImporters].[Warehouse].[StockItems].[SupplierID]\
    \ = @SupplierID, 100.0, 1000000.0)))**.\n\n        This added text is why there\
    \ are technically two queries that *hash* to the same query_hash value.\n\n  \
    \      The implementation details of how we decide query variants and the predicate_range()\
    \ function are internal-only at present. We don’t want anyone relying on these\
    \ details because as we improve PSP optimization, we may change them.\n\n    \
    \    But I’ll give you a few insights:\n\n        The concepts of variants and\
    \ predicate_range are based on how I described PSP optimization concepts in the\
    \ section titled “**How Does PSP Optimization Work?**” and Figure [5-4](#525217_1_En_5_Chapter.xhtml#Fig4).\n\
    \n        For this parent plan, there are three possible variants based on cardinality\
    \ and predicate matches: those with <=100 rows, those with rows between 100 and\
    \ 1M, and those with rows >= 1M.\n\n    *   If you look at the details of the\
    \ **xml_plan** column for each query variant, a new section called `<Dispatcher>`\
    \ contains a `QueryVariantID` in the section `<QueryPlan>` with details of the\
    \ variant and predicate_range.\n\n2.  Execute the script **query_store_parent_query.sql**.\
    \ This script uses the following T-SQL statements:\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    -- Look at the “parent” query\n    -- Notice this is the SELECT statement\
    \ from the procedure with no OPTION for variants.\n    SELECT qt.query_sql_text\n\
    \    FROM sys.query_store_query_text qt\n    JOIN sys.query_store_query qq\n \
    \   ON qt.query_text_id = qq.query_text_id\n    JOIN sys.query_store_query_variant\
    \ qv\n    ON qq.query_id = qv.parent_query_id;\n    GO\n    ```\n\n    The results\
    \ will be the SQL statement text for the query in the stored procedure *without*\
    \ the options for variants like the following:\n\n    ```\n    (@SupplierID int)SELECT\
    \ StockItemID, SupplierID, StockItemName, TaxRate, LeadTimeDays  FROM Warehouse.StockItems\
    \ s  WHERE SupplierID = @SupplierID  ORDER BY StockItemName\n    ```\n\n3.  Execute\
    \ the script **query_store_dispatcher_plan.sql**. This script uses the following\
    \ T-SQL statements:\n\n    ```\n    USE WideWorldImporters;\n    GO\n    -- Look\
    \ at the dispatcher plan\n    -- If you “click” on the SHOWPLAN XML output you\
    \ will see a “multiple plans” operator\n    SELECT qp.plan_id, qp.query_plan_hash,\
    \ cast (qp.query_plan as XML) as dispatcher_plan\n    FROM sys.query_store_plan\
    \ qp\n    JOIN sys.query_store_query_variant qv\n    ON qp.plan_id = qv.dispatcher_plan_id;\n\
    \    GO\n    ```\n\n    If you click the value of the **dispatcher_plan**, you\
    \ will see a graphical showplan operator like in Figure [5-13](#525217_1_En_5_Chapter.xhtml#Fig13).\n\
    \nThis is a new operator for a dispatcher plan that doesn’t execute a query but\
    \ is the parent of variant query plans.\n\nI know that was a long exercise to\
    \ go through, but I hope you found it worth it! This example showed you the power\
    \ of PSP optimization as well as some insights on how it works."
  trans: "#### 遵循以下练习步骤\n\n请遵循以下步骤，了解 PSP 优化如何工作：\n\n![](img/525217_1_En_5_Fig6_HTML.jpg)\n\
    \n一个使用索引查找的查询计划流程图。其中包含：键查找（聚集，StockItems.PK_Warehouse，成本 33%，0.000 秒，3/3，100%）、索引查找（非聚集，StockItems.FK_Warehouse，成本\
    \ 15%，0.000 秒，3/3，100%），这些操作导向嵌套循环，等等。\n\n图 5-6\n\n存储过程参数的索引查找计划\n\n1.  从 [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
    \ 下载 WideWorldImporters 的备份副本。下一步中的脚本假设备份文件位于 `c:\\sql_sample_databases`。你也可以使用一个预加载了扩展数据的定制备份，可从\
    \ [`https://github.com/microsoft/sqlworkshops-sql2022workshop/releases`](https://github.com/microsoft/sqlworkshops-sql2022workshop/releases)\
    \ 获取。\n\n2.  还原 WideWorldImporters 示例备份。你可以编辑并使用 `restorewwi.sql` 脚本。此脚本专为 Azure\
    \ 虚拟机市场映像上的 SQL Server 设计，该映像为数据和日志文件提供了单独的磁盘。请编辑此文件以匹配你的文件路径。此脚本包含以下 T-SQL 语句：\n\
    \n    ```\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS WideWorldImporters;\n\
    \    GO\n    -- 编辑文件位置以匹配你的存储\n    RESTORE DATABASE WideWorldImporters FROM DISK\
    \ = 'c:\\sql_sample_databases\\WideWorldImporters-Full.bak' with\n    MOVE 'WWI_Primary'\
    \ TO 'e:\\data\\WideWorldImporters.mdf',\n    MOVE 'WWI_UserData' TO 'e:\\data\\\
    WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log' TO 'f:\\log\\WideWorldImporters.ldf',\n\
    \    MOVE 'WWI_InMemory_Data_1' TO 'e:\\data\\WideWorldImporters_InMemory_Data_1',\n\
    \    stats=5;\n    GO\n    ```\n\n3.  执行 `populatedata.sql` 脚本，向 `Warehouse.StockItems`\
    \ 表加载更多数据。此脚本需要运行 5-10 分钟（具体时间取决于 CPU 数量和磁盘速度）。此脚本执行以下 T-SQL 语句（练习中不会为我最喜欢的运动队道歉），这些语句向\
    \ Warehouse.StockItems 表添加数据以创建数据倾斜场景：\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    -- 添加 StockItems 以在供应商中造成数据倾斜\n    --\n    DECLARE @StockItemID int;\n\
    \    DECLARE @StockItemName varchar(100);\n    DECLARE @SupplierID int;\n    SELECT\
    \ @StockItemID = 228;\n    SET @StockItemName = 'Dallas Cowboys Shirt'+convert(varchar(10),\
    \ @StockItemID);\n    SET @SupplierID = 4;\n    DELETE FROM Warehouse.StockItems\
    \ WHERE StockItemID >= @StockItemID;\n    SET NOCOUNT ON;\n    BEGIN TRANSACTION;\n\
    \    WHILE @StockItemID <= 8000000\n    BEGIN\n    INSERT INTO Warehouse.StockItems\n\
    \    (StockItemID, StockItemName, SupplierID, UnitPackageID, OuterPackageID, LeadTimeDays,\n\
    \    QuantityPerOuter, IsChillerStock, TaxRate, UnitPrice, TypicalWeightPerUnit,\
    \ LastEditedBy\n    )\n    VALUES (@StockItemID, @StockItemName, @SupplierID,\
    \ 10, 9, 12, 100, 0, 15.00, 100.00, 0.300, 1);\n    SET @StockItemID = @StockItemID\
    \ + 1;\n    SET @StockItemName = 'Dallas Cowboys Mug'+convert(varchar(10), @StockItemID);\n\
    \    END;\n    COMMIT TRANSACTION;\n    SET NOCOUNT OFF;\n    GO\n    ```\n\n\
    4.  使用脚本 `rebuild_index.sql` 重建与表关联的索引。\n\n    **重要提示** 如果错过此步骤，将无法看到 PSP 优化带来的性能提升。此脚本使用以下\
    \ T-SQL 语句：\n\n    `USE WideWorldImporters;`\n    `GO`\n    `ALTER INDEX FK_Warehouse_StockItems_SupplierID\
    \ ON Warehouse.StockItems REBUILD;`\n    `GO`\n\n5.  使用脚本 `proc.sql` 创建一个用于练习的新过程。此脚本使用以下\
    \ T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    CREATE OR ALTER\
    \ PROCEDURE [Warehouse].[GetStockItemsbySupplier]  @SupplierID int\n    AS\n \
    \   BEGIN\n    SELECT StockItemID, SupplierID, StockItemName, TaxRate, LeadTimeDays\n\
    \    FROM Warehouse.StockItems s\n    WHERE SupplierID = @SupplierID\n    ORDER\
    \ BY StockItemName;\n    END;\n    GO\n    ```\n\n    可以看到，此存储过程接受单个参数 `@SupplierID`，并将使用此参数作为谓词或筛选器来查找\
    \ `StockItems` 表中的行。\n\n6.  使用 SSMS 执行脚本 `setup.sql`。这将确保 `WideWorldImporters`\
    \ 数据库处于 `dbcompat` 150（因此最初未启用 PSP）并清空查询存储。此脚本使用以下 T-SQL 语句：\n\n    ```\n    USE\
    \ WideWorldImporters;\n    GO\n    ALTER DATABASE current SET COMPATIBILITY_LEVEL\
    \ = 150;\n    GO\n    ALTER DATABASE current SET QUERY_STORE CLEAR;\n    GO\n\
    \    ```\n\n7.  在 SSMS 中打开一个新的查询编辑器窗口（我喜欢在对象资源管理器中选择数据库，然后使用文件 ➤ 新建 ➤ 数据库引擎查询菜单），并选择菜单上的“包括实际执行计划”按钮。在\
    \ SSMS 的查询窗口中执行脚本 `query_plan_seek.sql` 两次。该脚本使用以下 T-SQL 语句：\n\n    ```\n    USE\
    \ WideWorldImporters;\n    GO\n    SET STATISTICS TIME ON;\n    GO\n    USE WideWorldImporters;\n\
    \    GO\n    -- 此参数的最佳计划是索引查找\n    EXEC Warehouse.GetStockItemsbySupplier 2;\n\
    \    GO\n    ```\n\n    注意查询执行速度很快（< 1 秒）。检查第二次执行时 `SET STATISTICS TIME ON` 的计时（使用最后一组计时）。查询运行两次，因此第二次执行不需要编译。这是我们想要比较的时间。如果选择\
    \ `消息` 选项卡并向下滚动到最后一组计时，你的结果应类似于以下内容（你的计时可能有所不同，但应相当接近）：\n\n    ```\n    SQL Server\
    \ 执行时间:\n       CPU 时间 = 15 ms，已用时间 = 34 ms。\n    SQL Server 执行时间:\n       CPU\
    \ 时间 = 15 ms，已用时间 = 34 ms。\n    ```\n\n    如果选择结果窗口中的“执行计划”选项卡，可以看到查询计划使用了索引查找，如图\
    \ 5-6 所示。\n\n![](img/525217_1_En_5_Fig7_HTML.png)\n\n一个针对不同参数的聚集索引扫描流程图。包含：聚集索引扫描（StockItems.PK_Warehouse，成本\
    \ 18%，2.792 秒，3999847/3999850，99%）导向排序（成本 76%，4.948 秒，3999847/3999850，99%），再导向并行度（成本\
    \ 7%，8.597 秒，3999847/3999850，99%），最后导向选择（成本 0%）。\n\n图 5-7\n\n不同参数的聚集索引扫描\n\n1.\
    \  在另一个查询窗口中，在 SSMS 中选择“包括实际执行计划”菜单按钮。执行脚本 `query_plan_scan.sql`。执行可能需要长达 ~30\
    \ 秒。此脚本使用以下 T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    ALTER\
    \ DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n    -- 此参数的最佳计划是索引扫描\n\
    \    EXEC Warehouse.GetStockItemsbySupplier 4;\n    GO\n    ```\n\n    此脚本将模拟计划缓存清除，以便在执行存储过程时，查询处理器必须编译新的查询计划。如果选择结果窗口中的“执行计划”选项卡，你将看到类似于图\
    \ 5-7 的查询计划。\n\n你可以看到新的查询计划使用了聚集索引扫描和平行度。\n\n![](img/525217_1_En_5_Fig8_HTML.png)\n\
    \n一个折线图窗口截图，包含各种选项。该折线图绘制了“处理器时间百分比”和“批处理请求数/秒”随时间变化的数字。一个箭头指向“批处理请求数/秒”的最大值。\n\
    \n图 5-8\n\n初始索引查找计划的工作负载吞吐量\n\n1.  再次运行脚本 `query_plan_seek.sql`。已用时间仍然很快（< 1 秒），但如果你查看“消息”选项卡中的计时，会发现它明显变慢了。如果选择“执行计划”选项卡，你现在会看到此查询正在使用带有聚集索引扫描的新计划。这是因为同一存储过程中的语句在缓存中只能有一个计划。\n\
    \n    **注意** 如果你想仅从单次执行中查看 PSP 优化，你可以选择在此处执行脚本 `dbcompat160.sql`，然后使用 `query_index_seek.sql`\
    \ 和 `query_index_scan.sql` 重复前面的步骤。你将看到每次执行都可以有它自己的计划。要查看 PSP 优化对工作负载的影响，请继续后续步骤。如果你尝试使用这些\
    \ SQL 脚本体验 PSP 优化并希望继续后续步骤，请运行 `setup.sql` 来重置练习。**后续步骤仅适用于 Windows 系统，但你可以修改脚本以在\
    \ Windows 系统上运行 ostress.exe 来连接 Linux 或容器上的 SQL Server。**\n\n2.  启动 Windows 性能监视器（你可以直接在命令提示符下键入\
    \ `perfmon`）。保留默认计数器 `% Processor Time`。添加计数器 `SQL Server:SQL Statistics Batch\
    \ Requests/Sec`。我喜欢使用批处理请求数/秒作为工作负载吞吐量的简单度量。我建议你更改其中一个计数器的颜色。我还喜欢增加计数器的宽度以使其更易于阅读（通过右键单击计数器并选择“属性”可获取颜色和宽度）。\n\
    \n3.  检查脚本 `workload_index_seek.cmd`。此脚本将使用 `ostress.exe` 模拟多个用户重复执行存储过程，其值理想情况下将在查询计划中使用索引查找。该脚本假定连接到本地服务器并使用\
    \ Windows 身份验证。请根据需要修改脚本。该脚本使用以下命令：\n    *   `-n` 参数是用户数（`ostress` 使用线程）。这是你在执行脚本时提供的值。在双\
    \ CPU 机器上，十个用户就足够了。你可能希望在具有更多 CPU 的机器上增加此数字以看到更明显的影响。\n    *   `-r` 参数是迭代次数。\n\
    \    *   `-q` 参数是“安静模式”，用于丢弃结果，因为我们只想看运行速度有多快。\n\n    ```\n    \"c:\\Program Files\\\
    Microsoft Corporation\\RMLUtils\\ostress\" -E -Q\"EXEC Warehouse.GetStockItemsbySupplier\
    \ 2;\" -n%1 -r200 -q –dWideWorldImporters\n    ```\n\n4.  从命令提示符执行脚本 `workload_index_seek.cmd\
    \ 10`。该命令应在一两秒内完成。记下 `perfmon` 中的值。你的结果应类似于图 5-8。\n\n![](img/525217_1_En_5_Fig9_HTML.png)\n\
    \n一个折线图窗口截图，包含各种选项。该折线图绘制了“处理器时间百分比”和“批处理请求数/秒”等随时间变化的数字。\n\n图 5-9\n\n因 PSP 导致工作负载吞吐量下降\n\
    \n1.  从命令提示符执行脚本 `workload_index_scan.cmd`。这可能需要更长时间，但仍应在几秒内完成。此脚本使用以下命令：\n\n\
    \    ```\n    \"c:\\Program Files\\Microsoft Corporation\\RMLUtils\\ostress\"\
    \ -E -Q\"ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\" -n1 -r1\
    \ -q -oworkload_wwi_regress -dWideWorldImporters\n    \"c:\\Program Files\\Microsoft\
    \ Corporation\\RMLUtils\\ostress\" -E -Q\"EXEC Warehouse.GetStockItemsbySupplier\
    \ 4;\" -n1 -r1 -q -oworkload_wwi_regress -dWideWorldImporters\n    ```\n\n   \
    \ 此脚本模拟计划缓存清除，并执行将导致使用聚集索引扫描编译查询计划到缓存中的存储过程。\n\n2.  再次从命令提示符执行脚本 `workload_index_seek.cmd\
    \ 10`。注意该命令不会在几秒内完成。查看 `perfmon` 并将其与之前的执行进行比较。你会看到批处理请求数/秒严重下降，CPU 利用率飙升至 100%，如图\
    \ 5-9 所示。\n\n此示例演示了更改为使用聚集索引扫描的计划所带来的整体影响。现在，多个用户同时使用并行度扫描表。\n\n![](img/525217_1_En_5_Fig10_HTML.png)\n\
    \n一个折线图窗口截图，包含各种选项。该折线图绘制了“处理器时间百分比”和“批处理请求数/秒”等随时间变化的数字。左上角弹出通知写着“查看当前活动”。\n\n\
    图 5-10\n\n使用 PSP 优化实现一致的性能\n\n1.  在查看解决方案之前，从 SSMS 执行脚本 `suppliercount.sql`。此脚本使用以下\
    \ T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    SELECT SupplierID,\
    \ count(*) as supplier_count\n    FROM Warehouse.StockItems\n    GROUP BY SupplierID;\n\
    \    GO\n    ```\n\n    如果查看结果，你会看到数据存在倾斜。`SupplierID = 2` 只有几行，而 `SupplierID\
    \ = 4` 有数百万行。\n\n2.  现在让我们看看 SQL Server 2022 如何在不更改代码的情况下解决此问题。在 SSMS 中执行 SQL\
    \ 脚本 `dbcompat160.sql`。此脚本使用以下 T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    ALTER DATABASE CURRENT SET COMPATIBILITY_LEVEL = 160;\n    GO\n \
    \   ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n    ALTER\
    \ DATABASE CURRENT SET QUERY_STORE CLEAR;\n    GO\n    ```\n\n    此脚本将 `dbcompat`\
    \ 级别更新为 160，从而启用 PSP 优化。为了重置环境，我们将清除计划缓存和查询存储。\n\n3.  从命令提示符执行脚本 `workload_index_seek.cmd\
    \ 10`。它应在几秒内完成。接下来，从命令提示符执行 `workload_index_scan.cmd`。最后，再次从命令提示符执行 `workload_index_seek.cmd\
    \ 10`。注意两次执行几乎在同一时间完成。`Perfmon` 也应显示两次执行的结果一致，如图 5-10 所示。\n\n紫色的两个矩形形状代表了启用 PSP\
    \ 优化后，`workload_index_seek.cmd` 两次执行之间的一致性能。\n\n你可以看到，借助 PSP 优化，现在无需更改代码即可实现一致的性能。\n\
    \n1.  启用查询存储后，我们可以深入了解不同的计划、调度程序和变体。\n\n    **注意** 查询存储对于 PSP 优化不是必需的，但对于深入了解查询性能可能很有用。\n\
    \n使用 SSMS，在对象资源管理器的查询存储中，选择“资源消耗最高的查询”报告。图 5-11 显示了来自存储过程的查询使用聚集索引扫描的查询变体计划。\n\
    \n![](img/525217_1_En_5_Fig11_HTML.png)\n\n一个名为“WideWorldImporters 数据库的前 25 个资源消耗者”的截图。截图左侧有一个条形图，右侧是查询\
    \ 3 的计划摘要，底部是“计划 3，未强制”。一个箭头从条形图指向文本，文本写着“仓库中的前置时间天数（计划 3，未强制）”。\n\n图 5-11\n\n\
    聚集索引扫描查询变体计划\n\n图 5-12 显示了另一个 `query_id`，它使用索引查找，但针对的是相同的查询文本。\n\n![](img/525217_1_En_5_Fig12_HTML.png)\n\
    \n一个名为“WideWorldImporters 数据库的前 25 个资源消耗者”的截图。截图左侧有一个条形图，右侧是查询 2 的计划摘要，底部是“计划\
    \ 2，未强制”。一个箭头从条形图指向文本，文本写着“仓库中的前置时间天数（计划 2，未强制）”。\n\n图 5-12\n\n索引查找查询变体计划\n\n\
    我说过 PSP 优化允许同一查询有多个计划，但为什么查询存储认为有两个“查询”？让我们使用查询存储元数据进一步查看。\n\n![](img/525217_1_En_5_Fig13_HTML.png)\n\
    \n一个图形化的显示计划运算符。显示计划运算符中的文本写着：查询 1，查询成本，100%；从仓库.库存项目中选择库存项目 ID、供应商 ID、库存项目名称、前置时间天数，其中供应商\
    \ ID 等于 @供应商 ID，按库存项目名称排序；以及多重计划，成本 0%。\n\n图 5-13\n\n一个调度程序计划运算符\n\n1.  执行脚本 `query_store_plans.sql`。此脚本执行以下\
    \ T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    -- 查看变体的查询和计划\n\
    \    -- 注意每个查询都来自相同的 parent_query_id，并且 query_hash 相同\n    SELECT qt.query_sql_text,\
    \ qq.query_id, qv.query_variant_query_id, qv.parent_query_id,\n    qq.query_hash,qr.count_executions,\
    \ qp.plan_id, qv.dispatcher_plan_id, qp.query_plan_hash,\n    cast(qp.query_plan\
    \ as XML) as xml_plan\n    FROM sys.query_store_query_text qt\n    JOIN sys.query_store_query\
    \ qq\n    ON qt.query_text_id = qq.query_text_id\n    JOIN sys.query_store_plan\
    \ qp\n    ON qq.query_id = qp.query_id\n    JOIN sys.query_store_query_variant\
    \ qv\n    ON qq.query_id = qv.query_variant_query_id\n    JOIN sys.query_store_runtime_stats\
    \ qr\n    ON qp.plan_id = qr.plan_id\n    ORDER BY qv.parent_query_id;\n    GO\n\
    \    ```\n\n    如果查看结果，你会看到以下有趣之处：\n    *   两个 `query_id` 的 `query_hash` 值相同。\n\
    \    *   有两个 `query_variant_id` 值，它们具有相同的 `parent_query_id`（调度程序）。这些值来自查询存储中一个名为\
    \ `sys.query_store_query_variant` 的新 DMV。\n    *   如果展开 `query_sql_text` 值，你将看到来自存储过程的\
    \ SELECT 语句，但添加了类似 `option (PLAN PER VALUE(ObjectID = 1835153583, QueryVariantID\
    \ = 1, predicate_range([WideWorldImporters].[Warehouse].[StockItems].[SupplierID]\
    \ = @SupplierID, 100.0, 1000000.0)))` 和 `option (PLAN PER VALUE(ObjectID = 1835153583,\
    \ QueryVariantID = 3, predicate_range([WideWorldImporters].[Warehouse].[StockItems].[SupplierID]\
    \ = @SupplierID, 100.0, 1000000.0)))` 的选项。这个附加文本就是为什么技术上有两个查询，但它们*哈希*到相同的 `query_hash`\
    \ 值。我们如何决定查询变体以及 `predicate_range()` 函数的实现细节目前是内部专用的。我们不希望任何人依赖这些细节，因为随着我们改进 PSP\
    \ 优化，可能会更改它们。但我会给你一些见解：变体和 `predicate_range` 的概念基于我在标题为“**PSP 优化如何工作？**”的章节和图\
    \ 5-4 中描述的 PSP 优化概念。对于此父计划，基于基数和谓词匹配，存在三种可能的变体：行数 <=100 的变体、行数在 100 到 1M 之间的变体以及行数\
    \ >= 1M 的变体。\n    *   如果查看每个查询变体的 `xml_plan` 列的详细信息，一个名为 `<Dispatcher>` 的新部分包含\
    \ `<QueryPlan>` 部分中的 `QueryVariantID`，其中包含变体和 `predicate_range` 的详细信息。\n\n2. \
    \ 执行脚本 `query_store_parent_query.sql`。此脚本使用以下 T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    -- 查看“父”查询\n    -- 注意这是存储过程中的 SELECT 语句，没有变体的 OPTION。\n    SELECT\
    \ qt.query_sql_text\n    FROM sys.query_store_query_text qt\n    JOIN sys.query_store_query\
    \ qq\n    ON qt.query_text_id = qq.query_text_id\n    JOIN sys.query_store_query_variant\
    \ qv\n    ON qq.query_id = qv.parent_query_id;\n    GO\n    ```\n\n    结果将是存储过程中查询的\
    \ SQL 语句文本，*没有*变体选项，如下所示：\n\n    ```\n    (@SupplierID int)SELECT StockItemID,\
    \ SupplierID, StockItemName, TaxRate, LeadTimeDays  FROM Warehouse.StockItems\
    \ s  WHERE SupplierID = @SupplierID  ORDER BY StockItemName\n    ```\n\n3.  执行脚本\
    \ `query_store_dispatcher_plan.sql`。此脚本使用以下 T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    -- 查看调度程序计划\n    -- 如果你“点击” SHOWPLAN XML 输出，你将看到一个“多重计划”运算符\n   \
    \ SELECT qp.plan_id, qp.query_plan_hash, cast (qp.query_plan as XML) as dispatcher_plan\n\
    \    FROM sys.query_store_plan qp\n    JOIN sys.query_store_query_variant qv\n\
    \    ON qp.plan_id = qv.dispatcher_plan_id;\n    GO\n    ```\n\n    如果点击 `dispatcher_plan`\
    \ 的值，你将看到一个如图 5-13 所示的图形化显示计划运算符。\n\n这是一个用于调度程序计划的新运算符，它不执行查询，而是变体查询计划的父级。\n\n\
    我知道这是一个漫长的练习，但我希望你觉得它值得！此示例向你展示了 PSP 优化的强大功能以及一些关于其工作原理的见解。"
- fmt: '### What Other Details About PSP Optimization Should I Know?


    Here are some other details I think you will find useful about PSP optimization.


    #### Check the Latest Information


    First, be sure to check in on all the latest information in our documentation
    about PSP optimization at [`https://aka.ms/pspopt`](https://aka.ms/pspopt).


    #### Known Limitations


    There are limitations for PSP optimization in the initial release with SQL Server
    2022:


    *   We only support predicates in `WHERE` clauses using an `=` operator.

    *   We do support multiple parameters, but there are limits on the number and
    how many we can support in a stored procedure.

    *   You cannot configure the number of variants, buckets, or predicate ranges
    with PSP optimization except to enable or disable it. Because of the limited number
    of predicates per plan, your plan cache should not become “bloated.” The possible
    downside is that you may experience situations within a variant where multiple
    parameter values may still have issues with `one plan per variant`.

    *   If you have disabled “parameter sniffing” in SQL Server, we will not use PSP
    optimization. Parameter sniffing can be disabled with trace flag `4136`, the database-scoped
    configuration `PARAMETER_SNIFFING`, or the query hint `USE HINT(''DISABLE_PARAMETER_SNIFFING'')`.

    *   If you use a `RECOMPILE` hint or option, we don’t consider this “cacheable,”
    so we will not use PSP optimization for the query.

    *   If you use the `OPTIMIZE FOR` query hint, which is a workaround used by some
    for PSP problems, we will not use PSP optimization for the query.

    *   PSP optimization `is supported` for queries against temporary tables.

    *   One issue we have discovered as we built out the feature during the preview
    is tracking performance information between stored procedures and statements in
    the procedure. For example, it can now be difficult to tie in statements and procedures
    together for performance using DMVs like `sys.dm_exec_query_stats` and `sys.dm_exec_procedure_stats`.
    In addition, in `Query Store` to associate statements with stored procedures,
    you will need to use `sys.query_store_query_variant`, which has information associating
    the dispatcher plan (stored procedure) with query variants (statements in the
    procedure). We do store the `object_id` in the query `SHOWPLAN` and in the statement
    text of the variant saved in `Query Store`.


    One reality of letting PSP optimization work is to “let go” of some of the things
    you have done in the past to avoid this problem. It could be something you have
    to do in phases (e.g., use workarounds at a query level vs. at a database-scoped
    level) until you can see how much PSP optimization will solve your problems without
    requiring other solutions.


    #### Use the Diagnostics


    We have `Extended Events` to help you look further at PSP optimization including
    the following:


    `parameter_sensitive_plan_optimization_skipped_reason`


    If you believe PSP optimization should be working but it is not, enable this event.
    The `reason` for the event gives more context on why PSP was not used. The two
    reason values you might find valuable are


    *   `NonCacheable` – A query that cannot be saved into the plan cache. It could
    be you are using hints for `RECOMPILE` that could cause this state, which has
    been a common workaround for the PSP problem.

    *   `SkewnessThresholdNotMet` – This means there is not enough “data skew” to
    enable PSP optimization. We do not document the threshold. You can see in the
    example I used “millions” of rows, but the threshold doesn’t necessarily have
    to be that. Note also that if statistics are not up to date, you might encounter
    this problem even if you have data skew because we rely on statistics.


    `parameter_sensitive_plan_optimization`


    This is a `debug` channel-only event but can show that the query processor is
    using query variants.


    You can intentionally `disable` PSP optimization by (other than the workarounds
    listed previously that disable its use)


    *   Using `dbcompat level < 160`

    *   Using the database-scoped configuration `PARAMETER_SENSITIVE_PLAN_OPTIMIZATION
    = OFF` (and you can enable it again with this option)


    ### PSP Optimization Is a Powerful Innovation


    I personally think the innovation here will help so many people avoid expensive
    and time-consuming query performance problems. For me, PSP optimization is clearly
    one of the best things to come out of SQL Server 2022. Jack Li summed it up best
    when I asked him his perspective on PSP optimization: *“When it comes to parameterized
    queries involving scenarios such as data skewness, having one plan per query makes
    it impossible for optimizer to pick a plan that will meet the needs for all conditions.
    By allowing multiple plans per query, Parameter Sensitive Plan Optimization enables
    the ability to choose plans based on cardinality of predicates to achieve optimal
    performance.”*


    ### Cardinality Estimation (CE) Model Feedback


    I vividly remember back before SQL Server 2014 shipped, I was in Redmond for what
    was called a “milestone review” for the release. I was working in CSS in those
    days and often found myself meeting “early” on a release internally to give a
    supportability and customer perspective to the engineering team. This is when
    I first learned about a new cardinality estimation (CE) model to be introduced
    in SQL Server 2014.


    I understood the concept. We needed to update our query processor assumptions
    about cardinality. We were using assumptions from 1998, when SQL Server 7.0 was
    released, and we created a new query processor from the old Sybase code. But I
    had my “support hat” on for those meetings, so even though I understood this was
    probably the right thing to do, I made sure to ask for a way to “turn it off”
    in case of problems.


