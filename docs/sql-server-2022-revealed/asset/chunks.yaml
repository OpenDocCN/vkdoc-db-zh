    \ on-premises connected to the cloud to *enhance* data capabilities\n\nThere are\
    \ two keywords in this phrase: connected and enhance. *Connected* means to connect\
    \ data *somehow* from an existing feature in the on-premises product. *Enhance*\
    \ means there is true business value to this connection. You will see in this\
    \ chapter that I believe SQL Server 2022 does both.\n\nLet’s first look at how\
    \ SQL Server has been connected to Azure over the years to set some context.\n\
    \n### SQL Server Hybrid Over the Years\n\nThe most basic feature SQL Server has\
    \ included for hybrid for several releases is backup. Starting with SQL Server\
    \ 2012, you are able to back up or restore databases to and from Azure Blob Storage\
    \ using a syntax that includes a URL. This feature has been enhanced over the\
    \ years and still exists today, which you can read about at [`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url).\n\
    \nThere are other methods to connect SQL Server to Azure including using existing\
