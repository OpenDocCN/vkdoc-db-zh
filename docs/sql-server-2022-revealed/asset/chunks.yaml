    TEMPDB_METADATA = ON` and restart SQL Server, critical system tables are memory
    optimized and won’t encounter latch contention.


    Note


    tempdb latching issues were never about slow I/O. However, you should always make
    sure to eliminate any I/O issues for tempdb by placing tempdb data and log files
    on a separate drive from your user data and preferably on a SSD. If you have I/O
    issues for tempdb, they are typically seen in the form of PAGELATCH_IO, IO_COMPLETION,
    and WRITELOG (tempdb log) wait types.'
  trans: '


    #### 历年解决方案


    当我们最初在 SQL Server 7.0 乃至 SQL Server 2000 中真正开始遇到这个问题时，CSS（客户服务与支持）团队的许多人都会建议客户为
    tempdb 数据创建多个文件。为什么？因为这是在自然地为这些分配页的**闩锁并发**进行 `分区`。这是因为 SQL Server 会以轮询方式分配页，并在多个文件之间利用比例填充算法来处理数据页。这个方案确实帮助解决了许多这类闩锁争用问题。但随后出现了一个新问题：需要创建多少个文件才能解决问题？不幸的是，许多人矫枉过正，建议文件数量应该匹配
    SQL Server 的 CPU 数量。我以及社区中的其他人，比如 Paul Randal，则有不同的看法。例如，我们知道对于一台 64 核 CPU 的机器，你可能并不需要
    64 个文件。常识告诉我们，这似乎弊大于利。我最终对此课题进行了一些详细研究，由此我建议的最佳方法是：对于 8 个 CPU 使用 8 个文件，然后每次增加
    4 个文件，直到你的工作负载达到性能平衡点。关于这种方法的更多细节，你可以查看我在 2011 年 PASS Summit 大会上做的演示：[`www.youtube.com/watch?v=SvseGMobe2w`](http://www.youtube.com/watch?v=SvseGMobe2w)。


    我们做的另一件事是引入了 `跟踪标志 1118`，以便所有表的分配都使用统一区，从而减轻文件的 `SGAM` 页的压力。我们还发现，使用多个文件来缓解系统页闩锁争用，只有在所有文件大小完全相同时才有效。因此，我们引入了
    `跟踪标志 1117`，以便任何自动增长活动都会增长所有文件以保持它们大小相同。


    任何真正的瓶颈都需要像剥洋葱一样层层深入。即使采用了这种多文件方法，一个系统如果用户数量极大，`PFS`、`GAM` 和 `SGAM` 闩锁争用仍然可能发生，但与新的主要问题——系统表页闩锁争用——相比，它就相形见绌了。我们起初很难认识到这一点。我们已经习惯于运行脚本来识别特定页的闩锁争用：`PFS`、`GAM`
    和 `SGAM`。


    一旦我们发现热点是系统表页，老实说，我们别无他法，只能告诉客户减少他们的 tempdb 工作负载争用。我们确实创建了一些有帮助的解决方案，称为 `tempdb
    缓存`。我们发现可以保存临时表的元数据，包括一些针对重复模式的页。你可以在 [`https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database?#performance-improvements-in-tempdb-for-sql-server`](https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database?#performance-improvements-in-tempdb-for-sql-server)
    查看更多关于这个概念的信息。即使有了 `tempdb 缓存`，它也没有消除问题，而且并非所有 tempdb 场景都能使用缓存。


    在 SQL Server 2016 中，我们通过包含一个默认配置（在安装时创建与检测到的 CPU 数量相匹配的文件，最多 8 个）来帮助客户确保为 tempdb
    创建多个文件。我们还通过将 `跟踪标志 1117 和 1118` 转变为 `ALTER DATABASE` 选项并将其设为 tempdb 的默认设置，从而消除了对它们的需要。


    工作负载持续对 tempdb 施加压力，我们仍然看到问题存在。我们在 SQL Server 2019 中引入了两项重大改进来帮助解决闩锁问题：


    -   `PFS` 页现在将不再有闩锁问题。我们找到了即使在共享闩锁下也能更新 `PFS` 页的方法。

    -   我们引入了 tempdb 元数据优化作为一个新的服务器选项。启用此选项后（需要重启服务器），我们会将 tempdb 中的关键系统表转换为内存优化表。内存优化表是“无锁的”，因此对这些表的任何读写操作都不会遇到闩锁争用。


    改进是巨大的。有了这两项增强功能，我看到许多工作负载不再因闩锁争用而出现显著问题。但核心问题偶尔仍能看到，即 `SGAM` 和 `GAM` 页上的闩锁争用。当我第一次看到
    `SGAM` 争用继续发生时，我感到困惑，因为我们已经将 tempdb 改为始终使用统一区。然而，有一个页仍然必须为临时表或索引分配，而且它不在统一区内，那就是
    `IAM` 页，它跟踪对象的分配情况。


    #### 为何现在可以“免维护”？


    当我看到项目 Dallas 的最初一套引擎改进时，我非常高兴地了解到 `GAM` 和 `SGAM` 的并发性得到了增强，其方式与 SQL Server 2019
    中 `PFS` 页的增强相同。


    现在，tempdb 在闩锁问题方面可以真正做到“免维护”了。


    请考虑以下几点：


    -   `PFS`、`GAM` 和 `SGAM` 闩锁争用完全消失。

    -   如果你执行此语句 `ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA
    = ON` 并重新启动 SQL Server，关键系统表将是内存优化的，不会遇到闩锁争用。


    注意：tempdb 闩锁问题从未与缓慢的 I/O 有关。但是，你应该始终通过将 tempdb 数据和日志文件放在与用户数据不同的驱动器上，并且最好放在 SSD
    上，来确保消除 tempdb 的任何 I/O 问题。如果你的 tempdb 存在 I/O 问题，通常表现为 `PAGELATCH_IO`、`IO_COMPLETION`
    和 `WRITELOG`（tempdb 日志）等待类型。


    '
- fmt: "# Try It Yourself\n\nIf you want to see how we have hopefully forever removed\
    \ tempdb latch contention for users, go through the following exercise:\n\n##\
    \ Prerequisites\n\n*   SQL Server 2022 Evaluation Edition.\n*   VM or computer\
    \ with four CPUs and at least 8Gb RAM.\n*   SQL Server Management Studio (SSMS).\
    \ The latest 18.x or 19.x build will work.\n*   Download `` `ostress.exe` `` from\
    \ [`https://aka.ms/ostress`](https://aka.ms/ostress). Install using the `RMLSetup.msi`\
    \ file that is downloaded. Use all defaults.\n*   Use the scripts from the book\
    \ samples as found in the `` `ch06_meatandpotatoes\\scalability\\tempdb` `` directory.\n\
    \nNote: This exercise will require you to restart the instance multiple times.\n\
    \n## Set Up the Exercise\n\nFollow these steps to set up the exercise:\n\n1. \
    \ Configure perfmon to track `` `SQL Server SQL Statistics:SQL Statistics/Batch\
    \ requests/sec` `` (set Scale to 0.1) and `` `SQL Server:Wait Statistics/Page\
    \ latch waits/Waits started per second` ``.\n2.  Execute the script `` `findtempdbdbilfes.sql`\
    \ `` and save the output. A script is provided for the end of this demo to restore\
    \ your tempdb file settings. This script executes the following T-SQL statements:\n\
    \n    ```sql\n    USE master;\n    GO\n    SELECT name, physical_name, size*8192/1024\
    \ as size_kb, growth*8192/1024 as growth_kb\n    FROM sys.master_files\n    WHERE\
    \ database_id = 2;\n    GO\n    ```\n\n3.  Start SQL Server in *minimal* mode\
    \ using the command script `` `startsqlminimal.cmd` ``. Minimal mode (/f startup\
    \ parameter) allows you to remove tempdb files and only have one data file. This\
    \ script executes the following commands:\n\n    ```bat\n    net stop mssqlserver\n\
    \    net start mssqlserver /f\n    ```\n\n4.  Execute the command script `` `modifytempdbfiles.cmd`\
    \ ``. This will execute the SQL script `` `modifytempdbfiles.sql` `` to expand\
    \ the log to 200Mb (avoid any autogrow) and remove all tempdb files other than\
    \ the first one (tempdev). If you have more than four tempdb files, you need to\
    \ edit this script to remove all of them except for `` `tempdev` ``.\n\n    ``\
    \ `modifytempdbfiles.cmd` `` executes the following command:\n\n    ```bat\n \
    \   sqlcmd -E -imodifytempdbfiles.sql\n    ```\n\n    `` `modifytempdbfiles.sql`\
    \ `` executes the following T-SQL statements:\n\n    ```sql\n    USE master;\n\
    \    GO\n    ALTER DATABASE tempdb MODIFY FILE (NAME=templog, SIZE = 200Mb, FILEGROWTH\
    \ = 65536Kb);\n    GO\n    ALTER DATABASE tempdb REMOVE FILE temp2;\n    GO\n\
    \    ALTER DATABASE tempdb REMOVE FILE temp3;\n    GO\n    ALTER DATABASE tempdb\
    \ REMOVE FILE temp4;\n    GO\n    ```\n\n## Steps for the Exercise\n\nYou are\
    \ now ready to run the exercise, which is comprised of three different tests.\
    \ In each test you will run the same workload and observe perfmon counters and\
    \ overall workload duration.\n\n### Test 1: Disable tempdb metadata optimization\
    \ and disable GAM/SGAM enhancements.\n\nThe first test shows performance of a\
    \ workload where no optimizations are enabled. But since we are using SQL Server\
    \ 2022, even with one file, PFS concurrency enhancements are enabled since this\
    \ was built into the code in SQL Server 2019. This is why you won’t see any latch\
    \ contention on PFS pages.\n\n1.  Run the script `` `disableoptimizetempdb.cmd`\
    \ ``. This script runs the following commands:\n\n    ```bat\n    sqlcmd -E -idisableopttempdb.sql\n\
    \    net stop mssqlserver\n    net start mssqlserver\n    ```\n\n    `` `disableopttempdb.sql`\
    \ `` executes the following T-SQL statements:\n\n    ```sql\n    ALTER SERVER\
    \ CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = OFF;\n    GO\n    ```\n\
    \n    Even though tempdb metadata optimization is not on by default, we will disable\
    \ it to confirm.\n\n2.  Run the script `` `disablegamsgam.cmd` ``. This scripts\
    \ runs the following commands:\n\n    ```bat\n    net stop mssqlserver\n    net\
    \ start mssqlserver /T6950 /T6962\n    ```\n\n    These are undocumented trace\
    \ flags that disable new SQL Server 2022 enhancements. These are not supported\
    \ and only used for the purposes of this exercise.\n\n    Now the server is running\
    \ with no optimizations except for PFS concurrency carried over from SQL Server\
    \ 2019.\n\n3.  Load the script `` `pageinfo.sql` `` into SSMS. When the workload\
    \ starts, you will run this to see what the latch contention looks like. This\
    \ script executes the following T-SQL statements:\n\n    ```sql\n    USE tempdb;\n\
    \    GO\n    SELECT object_name(page_info.object_id), page_info.*\n    FROM sys.dm_exec_requests\
    \ AS d\n    CROSS APPLY sys.fn_PageResCracker(d.page_resource) AS r\n    CROSS\
    \ APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,'DETAILED')\n    AS\
    \ page_info;\n    GO\n    ```\n\n    This script uses T-SQL built-in functions\
    \ introduced in SQL Server 2019 to “crack a page” and look at its contents. In\
    \ addition, it uses a function to get metadata about a page such as the `object_id`\
    \ it belongs to and page type.\n\n4.  Execute the script `` `tempsql22stress.cmd`\
    \ `` from the command prompt with the following syntax (you only need `.\\` in\
    \ PowerShell):\n\n    ```powershell\n    .\\tempsql22stress.cmd 25\n    ```\n\n\
    \    Move forward to the next steps but come back after the command is over to\
    \ look more at the syntax.\n\n    This script executes the following command with\
    \ `` `ostress.exe` ``:\n\n    ```bat\n    \"c:\\Program Files\\Microsoft Corporation\\\
    RMLUtils\\ostress\" -E -Q\"declare @t table (c1 varchar(100)); insert into @t\
    \ values ('x');\" -n%1 -r1000 -q\n    ```\n\n    Let’s look at the arguments:\n\
    \n    - `-Q` is used to run a query. Notice this is a batch to use a table variable.\
    \ This particular syntax won’t allow for temporary table caching, so we are putting\
    \ a lot of pressure on allocation and system tables.\n    - `-n` is number of\
    \ users. We’ve supplied a value of 25 concurrent users.\n    - `-r` is the number\
    \ of iterations of the query each user will run.\n    - `-q` suppresses all result\
    \ set processing to make it faster as we don’t care about looking at the results.\n\
    \n5.  Execute the `` `pageinfo.sql` `` script and observe the results. Notice\
    \ the latch contention is for pages that belong to system tables in tempdb. There\
    \ are hardly any latch waits on GAM pages because system table page latch contention\
    \ is the “hot spot.”\n\n6.  Observe perfmon counters. Record the averages and\
    \ max values to compare with the second and third tests.\n\n7.  Observe the duration\
    \ of the workload `` `tempsql22stress.cmd` `` as displayed by elapsed time. Record\
    \ this value to compare with the second and third tests.\n\n### Test 2: Enable\
    \ tempdb metadata optimization and disable GAM/SGAM enhancements.\n\nWe will run\
    \ the exact same test, except this time we will enable tempdb metadata optimization\
    \ and disable the new SQL Server 2022 enhancements.\n\n1.  Run the script `` `optimizetempdb.cmd`\
    \ ``. This script will execute `` `optimizetempdb.sql` ``, which turns **ON**\
    \ tempdb metadata optimization.\n\n2.  Run the script `` `disablegamsgam.cmd`\
    \ `` again to use trace flags to disable new GAM/SGAM optimizations.\n\n3.  Run\
    \ `` `tempsql22stress.cmd 25` `` as you did in Test 1.\n\n4.  Execute `` `pageinfo.sql`\
    \ `` as you did in Test 1. Now you should see that the majority of latch contention\
    \ problems are on GAM pages.\n\n5.  Observe perfmon counters and elapsed time.\
    \ Record these numbers to compare them with Test 1.\n\nYou should see fewer latch\
    \ waits started per second, but a lower number of batch requests/sec and a longer\
    \ duration. This is because the latch waits are held longer, causing a drop of\
    \ throughput from Test 1. If we had multiple files, we could greatly reduce the\
    \ GAM contention, and we would get better performance (and feel free to test this\
    \ yourself). But with SQL Server 2022, there is another way.\n\n### Test 3: Enable\
    \ tempdb metadata optimization and enable GAM/SGAM enhancements (default for SQL\
    \ Server 2022).\n\nSince tempdb metadata optimization is already enabled, all\
    \ we need to do is restart SQL Server (with no trace flags) to see the built-in\
    \ enhancements for GAM and SGAM contention.\n\n1.  Execute the script `` `restartsql.cmd`\
    \ ``. This script runs the following commands:\n\n    ```bat\n    net stop mssqlserver\n\
    \    net start mssqlserver\n    ```\n\n2.  Run `` `tempsql22stress.cmd 25` ``\
    \ again.\n\n3.  Execute the `` `pageinfo.sql` `` script. You should not see any\
    \ latches.\n\n4.  Observe perfmon counters and elapsed time. Record these values\
    \ to compare them with Tests 1 and 2."
  raw: "#### Try It Yourself\n\nIf you want to see how we have hopefully forever removed\
    \ tempdb latch contention for users, go through the following exercise:\n\n**Prerequisites**\n\
    \n*   SQL Server 2022 Evaluation Edition.\n\n*   VM or computer with four CPUs\
    \ and at least 8Gb RAM.\n\n*   SQL Server Management Studio (SSMS). The latest\
    \ 18.x or 19.x build will work.\n\n*   Download **ostress.exe** from [`https://aka.ms/ostress`](https://aka.ms/ostress).\
    \ Install using the RMLSetup.msi file that is downloaded. Use all defaults.\n\n\
    *   Use the scripts from the book samples as found in the **ch06_meatandpotatoes\\\
    scalability\\tempdb** directory.\n\nNote: This exercise will require you to restart\
    \ the instance multiple times.\n\n**Set Up the Exercise**\n\nFollow these steps\
    \ to set up the exercise:\n\n1.  Configure perfmon to track **SQL Server SQL Statistics:SQL\
    \ Statistics/Batch requests/sec** (set Scale to 0.1) and **SQL Server:Wait Statistics/Page\
    \ latch waits/Waits started per second**.\n\n2.  Execute the script **findtempdbdbilfes.sql**\
    \ and save the output. A script is provided for the end of this demo to restore\
    \ your tempdb file settings. This script executes the following T-SQL statements:\n\
    \n```\n    USE master;\n    GO\n    SELECT name, physical_name, size*8192/1024\
    \ as size_kb, growth*8192/1024 as growth_kb\n    FROM sys.master_files\n    WHERE\
    \ database_id = 2;\n    GO\n    ```\n\n3.  Start SQL Server in *minimal* mode\
    \ using the command script **startsqlminimal.cmd**. Minimal mode (/f startup parameter)\
    \ allows you to remove tempdb files and only have one data file. This script executes\
    \ the following commands:\n\n```\n    net stop mssqlserver\n    net start mssqlserver\
    \ /f\n    ```\n\n4.  Execute the command script **modifytempdbfiles.cmd**. This\
    \ will execute the SQL script **modifytempdbfiles.sql** to expand the log to 200Mb\
    \ (avoid any autogrow) and remove all tempdb files other than the first one (tempdev).\
    \ If you have more than four tempdb files, you need to edit this script to remove\
    \ all of them except for **tempdev**.\n\n**modifytempdbfiles.cmd** executes the\
    \ following command:\n\n```\nsqlcmd -E -imodifytempdbfiles.sql\n```\n\n**modifytempdbfiles.sql**\
    \ executes the following T-SQL statements:\n\n```\nUSE master;\nGO\nALTER DATABASE\
    \ tempdb MODIFY FILE (NAME=templog, SIZE = 200Mb, FILEGROWTH = 65536Kb);\nGO\n\
    ALTER DATABASE tempdb REMOVE FILE temp2;\nGO\nALTER DATABASE tempdb REMOVE FILE\
    \ temp3;\nGO\nALTER DATABASE tempdb REMOVE FILE temp4;\nGO\n```\n\n**Steps for\
    \ the Exercise**\n\nYou are now ready to run the exercise, which is comprised\
    \ of three different tests. In each test you will run the same workload and observe\
    \ perfmon counters and overall workload duration.\n\n**Test 1: Disable tempdb\
    \ metadata optimization and disable GAM/SGAM enhancements.**\n\nThe first test\
    \ shows performance of a workload where no optimizations are enabled. But since\
    \ we are using SQL Server 2022, even with one file, PFS concurrency enhancements\
    \ are enabled since this was built into the code in SQL Server 2019\\. This is\
    \ why you won’t see any latch contention on PFS pages.\n\n1.  Run the script **disableoptimizetempdb.cmd**.\
    \ This script runs the following commands:\n\n```\n    sqlcmd -E -idisableopttempdb.sql\n\
    \    net stop mssqlserver\n    net start mssqlserver\n    ```\n\n**disableopttempdb.sql**\
    \ executes the following T-SQL statements:\n\n```\n    ALTER SERVER CONFIGURATION\
    \ SET MEMORY_OPTIMIZED TEMPDB_METADATA = OFF;\n    ```\n\n```\nGO\n```\n\nEven\
    \ though tempdb metadata optimization is not on by default, we will disable it\
    \ to confirm.\n\n1.  Run the script **disablegamsgam.cmd**. This scripts runs\
    \ the following commands:\n\n```\n    net stop mssqlserver\n    net start mssqlserver\
    \ /T6950 /T6962\n    ```\n\nThese are undocumented trace flags that disable new\
    \ SQL Server 2022 enhancements. These are not supported and only used for the\
    \ purposes of this exercise.\n\nNow the server is running with no optimizations\
    \ except for PFS concurrency carried over from SQL Server 2019.\n\n2.  Load the\
    \ script **pageinfo.sql** into SSMS. When the workload starts, you will run this\
    \ to see what the latch contention looks like. This script executes the following\
    \ T-SQL statements:\n\n```\n    USE tempdb;\n    GO\n    SELECT object_name(page_info.object_id),\
    \ page_info.*\n    FROM sys.dm_exec_requests AS d\n    CROSS APPLY sys.fn_PageResCracker(d.page_resource)\
    \ AS r\n    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,'DETAILED')\n\
    \    AS page_info;\n    GO\n    ```\n\nThis script uses T-SQL built-in functions\
    \ introduced in SQL Server 2019 to “crack a page” and look at its contents. In\
    \ addition, it uses a function to get metadata about a page such as the object_id\
    \ it belongs to and page type.\n\n3.  Execute the script **tempsql22stress.cmd**\
    \ from the command prompt with the following syntax (you only need .\\ in PowerShell):\n\
    \n```\n.\\tempsql22stress.cmd 25\n```\n\nMove forward to the next steps but come\
    \ back after the command is over to look more at the syntax.\n\nThis script executes\
    \ the following command with ostress.exe:\n\n```\n\"c:\\Program Files\\Microsoft\
    \ Corporation\\RMLUtils\\ostress\" -E -Q\"declare @t table (c1 varchar(100));\
    \ insert into @t values ('x');\" -n%1 -r1000 -q\n```\n\nLet’s look at the arguments:\n\
    \n-Q is used to run a query. Notice this is a batch to use a table variable. This\
    \ particular syntax won’t allow for temporary table caching, so we are putting\
    \ a lot of pressure on allocation and system tables.\n\n-n is number of users.\
    \ We’ve supplied a value of 25 concurrent users.\n\n-r is the number of iterations\
    \ of the query each user will run.\n\n-q suppresses all result set processing\
    \ to make it faster as we don’t care about looking at the results.\n\n1.  Execute\
    \ the **pageinfo.sql** script and observe the results. Notice the latch contention\
    \ is for pages that belong to system tables in tempdb. There are hardly any latch\
    \ waits on GAM pages because system table page latch contention is the “hot spot.”\n\
    \n2.  Observe perfmon counters. Record the averages and max values to compare\
    \ with the second and third tests.\n\n3.  Observe the duration of the workload\
    \ **tempsql22stress.cmd** as displayed by elapsed time. Record this value to compare\
    \ with the second and third tests.\n\n**Test 2: Enable tempdb metadata optimization\
    \ and disable GAM/SGAM enhancements.**\n\nWe will run the exact same test, except\
    \ this time we will enable tempdb metadata optimization and disable the new SQL\
    \ Server 2022 enhancements.\n\n1.  Run the script **optimizetempdb.cmd**. This\
    \ script will execute **optimizetempdb.sql**, which turns **ON** tempdb metadata\
    \ optimization.\n\n2.  Run the script **disablegamsgam.cmd** again to use trace\
    \ flags to disable new GAM/SGAM optimizations.\n\n3.  Run **tempsql22stress.cmd\
    \ 25** as you did in Test 1.\n\n4.  Execute **pageinfo.sql** as you did in Test\
    \ 1\\. Now you should see that the majority of latch contention problems are on\
    \ GAM pages.\n\n5.  Observe perfmon counters and elapsed time. Record these numbers\
    \ to compare them with Test 1.\n\nYou should see fewer latch waits started per\
    \ second, but a lower number of batch requests/sec and a longer duration. This\
    \ is because the latch waits are held longer, causing a drop of throughput from\
    \ Test 1. If we had multiple files, we could greatly reduce the GAM contention,\
    \ and we would get better performance (and feel free to test this yourself). But\
    \ with SQL Server 2022, there is another way.\n\n**Test 3: Enable tempdb metadata\
    \ optimization and enable GAM/SGAM enhancements (default for SQL Server 2022).**\n\
    \nSince tempdb metadata optimization is already enabled, all we need to do is\
    \ restart SQL Server (with no trace flags) to see the built-in enhancements for\
    \ GAM and SGAM contention.\n\n1.  Execute the script **restartsql.cmd**. This\
    \ script runs the following commands:\n\n```\n    net stop mssqlserver\n    net\
    \ start mssqlserver\n    ```\n\n2.  Run **tempsql22stress.cmd 25** again.\n\n\
    3.  Execute the **pageinfo.sql** script. You should not see any latches.\n\n4.\
    \  Observe perfmon counters and elapsed time. Record these values to compare them\
    \ with Tests 1 and 2."
  trans: "# 亲自试试看\n\n如果你想了解我们如何有望永久消除用户的 tempdb 闩锁争用问题，请完成以下练习：\n\n## 先决条件\n\n*  \
    \ SQL Server 2022 评估版。\n*   配备四个 CPU 和至少 8GB 内存的虚拟机或计算机。\n*   SQL Server Management\
    \ Studio (SSMS)。最新的 18.x 或 19.x 版本均可。\n*   从 [`https://aka.ms/ostress`](https://aka.ms/ostress)\
    \ 下载 `` `ostress.exe` ``。使用下载的 `RMLSetup.msi` 文件进行安装。所有选项均使用默认设置。\n*   使用书本示例中找到的脚本，位于\
    \ `` `ch06_meatandpotatoes\\scalability\\tempdb` `` 目录中。\n\n注意：此练习需要你多次重启实例。\n\
    \n## 设置练习\n\n请按照以下步骤设置练习：\n\n1.  配置性能监视器（perfmon）以跟踪 `` `SQL Server SQL Statistics:SQL\
    \ Statistics/Batch requests/sec` ``（将比例设置为 0.1）和 `` `SQL Server:Wait Statistics/Page\
    \ latch waits/Waits started per second` ``。\n2.  执行脚本 `` `findtempdbdbilfes.sql`\
    \ `` 并保存输出。本演示末尾提供了一个脚本，用于恢复你的 tempdb 文件设置。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n \
    \   USE master;\n    GO\n    SELECT name, physical_name, size*8192/1024 as size_kb,\
    \ growth*8192/1024 as growth_kb\n    FROM sys.master_files\n    WHERE database_id\
    \ = 2;\n    GO\n    ```\n\n3.  使用命令脚本 `` `startsqlminimal.cmd` `` 以 *最小* 模式启动\
    \ SQL Server。最小模式（/f 启动参数）允许你删除 tempdb 文件，仅保留一个数据文件。此脚本执行以下命令：\n\n    ```bat\n\
    \    net stop mssqlserver\n    net start mssqlserver /f\n    ```\n\n4.  执行命令脚本\
    \ `` `modifytempdbfiles.cmd` ``。这将执行 SQL 脚本 `` `modifytempdbfiles.sql` ``，以将日志文件扩大到\
    \ 200MB（避免任何自动增长）并删除除第一个文件（tempdev）之外的所有 tempdb 文件。如果你的 tempdb 文件超过四个，则需要编辑此脚本以删除除\
    \ `` `tempdev` `` 之外的所有文件。\n\n    `` `modifytempdbfiles.cmd` `` 执行以下命令：\n\n  \
    \  ```bat\n    sqlcmd -E -imodifytempdbfiles.sql\n    ```\n\n    `` `modifytempdbfiles.sql`\
    \ `` 执行以下 T-SQL 语句：\n\n    ```sql\n    USE master;\n    GO\n    ALTER DATABASE\
    \ tempdb MODIFY FILE (NAME=templog, SIZE = 200Mb, FILEGROWTH = 65536Kb);\n   \
    \ GO\n    ALTER DATABASE tempdb REMOVE FILE temp2;\n    GO\n    ALTER DATABASE\
    \ tempdb REMOVE FILE temp3;\n    GO\n    ALTER DATABASE tempdb REMOVE FILE temp4;\n\
    \    GO\n    ```\n\n## 练习步骤\n\n现在你已准备好运行练习，该练习包含三个不同的测试。在每个测试中，你将运行相同的工作负载，并观察性能监视器计数器和工作负载总时长。\n\
    \n### 测试 1：禁用 tempdb 元数据优化并禁用 GAM/SGAM 增强功能。\n\n第一个测试展示了未启用任何优化时的工作负载性能。但由于我们使用的是\
    \ SQL Server 2022，即使只有一个文件，PFS 并发增强功能也是启用的，因为这是在 SQL Server 2019 中内置到代码中的。这就是为什么你不会看到任何\
    \ PFS 页上的闩锁争用。\n\n1.  运行脚本 `` `disableoptimizetempdb.cmd` ``。此脚本运行以下命令：\n\n  \
    \  ```bat\n    sqlcmd -E -idisableopttempdb.sql\n    net stop mssqlserver\n  \
    \  net start mssqlserver\n    ```\n\n    `` `disableopttempdb.sql` `` 执行以下 T-SQL\
    \ 语句：\n\n    ```sql\n    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA\
    \ = OFF;\n    GO\n    ```\n\n    尽管 tempdb 元数据优化默认未开启，但我们仍将其禁用以作确认。\n\n2.  运行脚本\
    \ `` `disablegamsgam.cmd` ``。此脚本运行以下命令：\n\n    ```bat\n    net stop mssqlserver\n\
    \    net start mssqlserver /T6950 /T6962\n    ```\n\n    这些是未文档化的跟踪标志，用于禁用 SQL\
    \ Server 2022 的新增强功能。这些不受支持，仅用于本练习的目的。\n\n    现在，服务器运行时除了从 SQL Server 2019 继承的\
    \ PFS 并发外，没有任何优化。\n\n3.  将脚本 `` `pageinfo.sql` `` 加载到 SSMS 中。当工作负载开始时，你将运行此脚本以查看闩锁争用的情况。此脚本执行以下\
    \ T-SQL 语句：\n\n    ```sql\n    USE tempdb;\n    GO\n    SELECT object_name(page_info.object_id),\
    \ page_info.*\n    FROM sys.dm_exec_requests AS d\n    CROSS APPLY sys.fn_PageResCracker(d.page_resource)\
    \ AS r\n    CROSS APPLY sys.dm_db_page_info(r.db_id, r.file_id, r.page_id,'DETAILED')\n\
    \    AS page_info;\n    GO\n    ```\n\n    此脚本使用了 SQL Server 2019 中引入的 T-SQL 内置函数来“解析页面”并查看其内容。此外，它还使用了一个函数来获取页面的元数据，例如其所属的\
    \ `object_id` 和页面类型。\n\n4.  在命令提示符下使用以下语法执行脚本 `` `tempsql22stress.cmd` ``（在 PowerShell\
    \ 中你只需要 `.\\`）：\n\n    ```powershell\n    .\\tempsql22stress.cmd 25\n    ```\n\
    \n    可以继续后续步骤，但在命令结束后请返回查看更详细的语法。\n\n    此脚本使用 `` `ostress.exe` `` 执行以下命令：\n\n\
    \    ```bat\n    \"c:\\Program Files\\Microsoft Corporation\\RMLUtils\\ostress\"\
    \ -E -Q\"declare @t table (c1 varchar(100)); insert into @t values ('x');\" -n%1\
    \ -r1000 -q\n    ```\n\n    让我们看看这些参数：\n    - `-Q` 用于运行查询。注意这是一个使用表变量的批处理。这种特定语法不允许临时表缓存，因此我们给分配和系统表施加了很大压力。\n\
    \    - `-n` 表示用户数量。我们提供了 25 个并发用户的值。\n    - `-r` 表示每个用户将运行查询的迭代次数。\n    - `-q`\
    \ 抑制所有结果集处理以加快速度，因为我们不关心查看结果。\n\n5.  执行 `` `pageinfo.sql` `` 脚本并观察结果。注意，闩锁争用是针对\
    \ tempdb 中属于系统表的页面。在 GAM 页上几乎没有闩锁等待，因为系统表页闩锁争用是“热点”。\n\n6.  观察性能监视器计数器。记录平均值和最大值，以便与第二和第三个测试进行比较。\n\
    \n7.  观察工作负载 `` `tempsql22stress.cmd` `` 的持续时间（显示为已用时间）。记录此值，以便与第二和第三个测试进行比较。\n\
    \n### 测试 2：启用 tempdb 元数据优化并禁用 GAM/SGAM 增强功能。\n\n我们将运行完全相同的测试，但这次我们将启用 tempdb 元数据优化并禁用\
    \ SQL Server 2022 的新增强功能。\n\n1.  运行脚本 `` `optimizetempdb.cmd` ``。此脚本将执行 `` `optimizetempdb.sql`\
    \ ``，该脚本将 **开启** tempdb 元数据优化。\n\n2.  再次运行脚本 `` `disablegamsgam.cmd` ``，以使用跟踪标志禁用新的\
    \ GAM/SGAM 优化。\n\n3.  像在测试 1 中一样运行 `` `tempsql22stress.cmd 25` ``。\n\n4.  像在测试\
    \ 1 中一样执行 `` `pageinfo.sql` ``。现在你应该看到大部分闩锁争用问题出现在 GAM 页上。\n\n5.  观察性能监视器计数器和已用时间。记录这些数字，以便与测试\
    \ 1 进行比较。\n\n你应该看到每秒开始的闩锁等待减少了，但批处理请求/秒的数量降低了，且持续时间更长。这是因为闩锁等待持有时间更长，导致与测试 1 相比吞吐量下降。如果我们有多个文件，我们可以大大减少\
    \ GAM 争用，并且会获得更好的性能（你可以自己测试一下）。但对于 SQL Server 2022，还有另一种方法。\n\n### 测试 3：启用 tempdb\
    \ 元数据优化并启用 GAM/SGAM 增强功能（SQL Server 2022 的默认设置）。\n\n由于 tempdb 元数据优化已经启用，我们需要做的就是重启\
    \ SQL Server（不带跟踪标志）以查看内置的 GAM 和 SGAM 争用增强功能。\n\n1.  执行脚本 `` `restartsql.cmd`\
    \ ``。此脚本运行以下命令：\n\n    ```bat\n    net stop mssqlserver\n    net start mssqlserver\n\
    \    ```\n\n2.  再次运行 `` `tempsql22stress.cmd 25` ``。\n\n3.  执行 `` `pageinfo.sql`\
    \ `` 脚本。你不应该看到任何闩锁。\n\n4.  观察性能监视器计数器和已用时间。记录这些值，以便与测试 1 和测试 2 进行比较。"
- fmt: '**Note** Did you notice one latch started per second on this final test? Why
    would that occur if there was no latch contention? It is because there are a few
    system pages, namely, the BOOT and FILE_HEADER pages, that may still have a small
    amount of latch contention. However, there should be no performance impact, and
    that is why I said 99.99% latch-free!


    Who won the test for you? If all worked as planned, the results – in order of
    who was faster – should be


    1.  **Test 3** – Enable tempdb metadata optimization and enable GAM/SGAM concurrency
    (on by default).

    2.  **Test 1** – Disable tempdb metadata optimization and disable GAM/SGAM enhancements.

    3.  **Test 2** – Enable tempdb metadata optimization and disable GAM/SGAM.


    Test 3 should win because we have all optimizations turned on.


    Test 1 was second because even though system table page latch contention was heavy,
    latch wait times were shorter for each latch wait.


    Test 2 was the worst because latch wait times for GAM pages were very long.


    Note


    Use the `restoretempdbfiles.cmd` and `restoretempdbfiles.sql` to restore your
    tempdb configuration.


    You may be wondering what the results would look like for Test 3 if you had multiple
    tempdb files. Just about the same as with one file, which I know may seem amazing
    after all these years of using multiple files. My advice is to stick with the
    recommended number of multiple files; just let SQL Server setup configure it for
    you. It is another reason I’m advocating “hands-free” installation: Run SQL Server
    setup with the defaults and turn on `tempdb metadata optimization`. Then just
    run your workload. Time will tell whether my bold statement will become true for
    you and the community.


    ## More Concurrency Improvements


    Concurrency problems in SQL Server hurt performance and scalability. Ensuring
    that workloads can run concurrently but not experience blocking or waiting problems
    is essential to maximize your investments for application and infrastructure for
    scale.


    SQL Server 2022 solves more real-world scenarios including concurrency issues
    for shrink database and automatic statistics update.


    ### Shrink Database Concurrency


    In SQL Server 2014 we added an option for online index builds to take locks at
    lower priorities called `WAIT_AT_LOW_PRIORITY`. Even an online index build (see
    the documentation at `https://docs.microsoft.com/sql/relational-databases/indexes/how-online-index-operations-work?#source-structure-activities`)
    has to obtain locks and may have to wait. During this wait period, other operations
    might be blocked by the online index build that could normally continue. `WAIT_AT_LOW_PRIORITY`
    allows users that would normally be blocked to continue.


    It turns out that shrink database and shrink file operations have these same issues.
    Therefore, in SQL Server 2022 we added a new `WAIT_AT_LOW_PRIORITY` for `DBCC
    SHRINKDATABASE` and `DBCC SHRINKFILE`. You can see how the new syntax works at
    `https://docs.microsoft.com/sql/t-sql/database-console-commands/dbcc-shrinkdatabase-transact-sql`.
    In general, it is recommended to avoid shrinking a database or its files, but
    sometimes it is a necessity.


    ### Auto-update Stats Concurrency


    As we were building out the story for SQL Server 2022 preview launch, one of the
    developers I know, Parag Paul, reached out to me: *“Bob, have you seen the auto-update
    stats improvement coming in SQL Server 2022?”* I told Parag I thought I remembered
    something in Azure SQL about this, but I didn’t know much about it or that it
    would be in SQL Server 2022.


    We discussed the details, and I then remembered a blog post by my colleague Dimitri
    Furman, who not only is one of the top SQL experts in our team but is one of my
    “go-to” people at Microsoft on Azure SQL. You can read his blog post at `https://techcommunity.microsoft.com/t5/azure-sql-blog/improving-concurrency-of-asynchronous-statistics-update/ba-p/1441687`.


    The problem is that while SQL Server and Azure SQL can be configured for auto-update
    statistics to happen asynchronously, the background processes doing the updates
    can cause concurrency issues. Dimitri has a very nice, detailed diagram and explanation
    of the problem in this blog post. Effectively, the issue is concurrency between
    queries and background processes needing schema locks on system metadata. We introduced
    a new database-scope configuration option called `ASYNC_STATS_UPDATE_WAIT_AT_LOW_PRIORITY`.
    When you turn this on, the background processes to update stats will wait for
    all running processes to release locks that could cause a concurrency issue, effectively
    running at a “lower priority.” This option is off by default because it is possible
    this option could result in statistics not being updated as often as desired (or
    as often as folks are used to now), which could lead to undesirable query plans.
    But we added this option because we saw scenarios where the user wanted to favor
    concurrency over more frequent, timed updates of statistics.


    You can read how to configure this database-scoped option at `https://docs.microsoft.com/sql/t-sql/statements/alter-database-scoped-configuration-transact-sql`.


    ## Availability


    While all data and workloads need security and performance, any credible production
    system must have high availability and dependable disaster recovery. In SQL Server
    2022 we have a rich set of new features that span Always On Availability Groups,
    recovery and redo, backup and restore, and replication.'
