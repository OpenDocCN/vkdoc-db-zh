  trans: '### 什么是 CE 模型问题？


    我认为我们文档中对基数的描述已经相当到位，具体可参考：[`https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server`](https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server)。以下是我从该文档中摘录的一段喜欢的引述：


    > 查询优化器根据两个主要因素确定执行查询计划的成本：

    >

    > 在查询计划的每个级别处理的总行数，称为该计划的基数。

    >

    > 查询中使用的运算符所决定的算法成本模型。

    >

    > 第一个因素，即基数，被用作第二个因素（成本模型）的输入参数。因此，改进的基数估计能带来更优的成本估计，进而生成更快的执行计划。


    基数估计是查询优化器在编译计划时，对运算符任一部分的唯一性进行估计的过程。有时这显而易见且简单，有时则不然。


    当情况不那么明显时，`CE 模型`规定了 SQL Server 中的查询优化器如何对基数做出某些假设。在 SQL Server 7.0 中，我们在构建新查询处理器时重新设计了
    CE 模型的假设。这些假设类型涉及的领域在我们的文档中有描述：[`https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server?#versions-of-the-ce`](https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server?#versions-of-the-ce)。该文档引入了
    CE `版本`的概念。存在两个 CE 版本：(1) 我们在 SQL Server 7.0 中引入的 CE 模型；(2) 我们在 SQL Server 2014
    中引入的新 CE 模型。文档还讨论了不同的 CE 模型场景，包括 `独立性`、`均匀性`、`包含性`和`包含关系`。


    所有这些场景中，都没有绝对的对错答案。这是一个经典的“视情况而定”的情况。SQL Server 7.0 的 CE 模型，即 `遗留` CE 模型，做出了一些特定的假设。在
    SQL Server 2014 中，我们对 CE 模型进行了更改，使其我们认为更符合“现代”工作负载。像 `关联性` 和 `包含性` 这样的概念得到了更新。关联性是其中比较有趣的问题之一，它涉及优化器如何决定列之间是否
    `相关`。


    我们相信这会让优化器更“准确”。在许多情况下，我们确实做到了。事实上，在许多情况下，我们通过这个新模型提高了查询性能。如果你使用的 `dbcompat` 级别是
    120（SQL Server 2014 的默认级别），那么 `新` CE 模型就会生效。


    不幸的是，这个新模型所做的某些假设并不适用于所有工作负载。尽管我们试图构建一个更准确的模型，但这并不总是带来相同或更好的性能，有时甚至会导致性能下降。


    我们引入了跟踪标志、查询提示，甚至数据库选项来使用 `遗留` CE 模型。这些主题本身可能很详细，即使对于经验丰富的 SQL 专业人士来说也难以理解。我鼓励你阅读以下两份额外资源以了解更多信息：


    *   我们撰写的一篇关于为何构建新 CE 模型的博客：[`https://cloudblogs.microsoft.com/sqlserver/2014/03/17/the-new-and-improved-cardinality-estimator-in-sql-server-2014/`](https://cloudblogs.microsoft.com/sqlserver/2014/03/17/the-new-and-improved-cardinality-estimator-in-sql-server-2014/)

    *   由著名专家 Joe Sack 撰写的一份极其详细的白皮书：[`https://download.microsoft.com/download/d/2/0/d20e1c5f-72ea-4505-9f26-fef9550efd44/optimizing%20your%20query%20plans%20with%20the%20sql%20server%202014%20cardinality%20estimator.docx`](https://download.microsoft.com/download/d/2/0/d20e1c5f-72ea-4505-9f26-fef9550efd44/optimizing%2520your%2520query%2520plans%2520with%2520the%2520sql%2520server%25202014%2520cardinality%2520estimator.docx)


    关键问题是，客户会告诉我们，他们升级到 SQL Server 2014 并使用了新的 `dbcompat` 120 级别后，“速度反而变慢了”。虽然这不是普遍存在的投诉，但也足以引起问题。因此，多年来，客户已经习惯于使用遗留
    CE 模型配合最新的 `dbcompat` 级别。


    于是，`CE 反馈` 机制应运而生，试图帮助解决其中一些冲突。


    #### CE 反馈如何工作？


    `CE 反馈` 是查询优化器与查询存储之间的一种协作机制，旨在识别符合 CE 模型问题的查询模式，然后使用查询提示来纠正问题。


    优化器会执行查询编译过程。如果它识别出一个适合进行 CE 模型反馈的 CE 模型模式，它将保存一个可能使查询运行更快的查询提示。我们采取的方法是保守的，查询必须以相同的查询文本运行一定次数后，我们才会尝试
    `分析` 是否适用 CE 反馈。


    一旦我们分析出适用 CE 反馈，那么在下一次查询执行时，我们会尝试应用该查询提示，并执行一次 `验证`，以检查该提示是否使查询的 CPU 时间变得更好或更差（它可能只是略有改善，这不被认为足够好到可以继续使用该提示）。如果验证成功，我们会将查询提示和反馈保存在查询存储中。如果不成功，则视为一次性能下降，我们不会使用或保存该提示。我们还会在查询存储中记录该反馈导致性能下降的事实。


    ### 尝试一个练习


    让我们通过一个涉及 `关联性` 场景的 CE 反馈练习。


    #### 先决条件


    为了尝试此练习，你需要满足以下先决条件：


    *   SQL Server 2022 评估版。

    *   虚拟机或计算机，至少配备两个 CPU 和 8Gb 内存。


    > **注意**

    >

    > 此示例的计时对 `CPU 非常敏感`。我使用过几台虚拟机和计算机都能看到此问题，但较旧或速度较慢的 CPU 可能无法让你在这个特定练习中观察到 CE 反馈的效果。我的测试使用的是
    Azure 虚拟机 Standard_D2ds_v5（两个 vCPU，8Gb 内存）。我们的 Azure 文档指出，此虚拟机大小使用的是第三代 Intel®
    Xeon® Platinum 8370C（Ice Lake）处理器，全核睿频时钟速度最高可达 3.5 GHz。我认为关键之一是要使用 `专用` 虚拟机或计算机。其他程序的任何
    CPU 周期都可能干扰纯粹的 CPU 工作负载。


    *   SQL Server Management Studio (SSMS)。最新的 18.x 或 19.x 版本均可。

    *   本书 GitHub 仓库中 `ch05_builtinqueryintelligence_getsbetter\cefeedback` 目录下的脚本副本。'
- fmt: "# Follow These Steps for the Exercise\n\nFollow these steps to see CE feedback\
    \ in action:\n\n![Images/525217_1_En_5_Fig14_HTML.png](Images/525217_1_En_5_Fig14_HTML.png)\n\
    \nA representation of the output of the C E feedback analysis. The output is titled\
    \ displaying 1 event. An arrow points to feedback underscore hint, the option\
    \ left parenthesis single quotes assume underscore min underscore selectivity\
    \ underscore for underscore filter underscore estimates single quotes right parenthesis\
    \ right parenthesis.\n\n**Figure 5-14** CE feedback analysis\n\n1.  Download the\
    \ `AdventureWorks2016_EXT` sample backup from [`https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2016_EXT.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2016_EXT.bak).\
    \ The restore scripts assume a directory of `c:\\sql_sample_databases`.\n2.  Restore\
    \ the `AdventureWorks_EXT` sample backup using the script `restore_adventureworks_ext.sql`.\
    \ Edit the file path per your needs. This script runs the following T-SQL statements:\n\
    ```sql\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS AdventureWorks_EXT;\n\
    \    GO\n    RESTORE DATABASE AdventureWorks_EXT FROM DISK = 'c:\\sql_sample_databases\\\
    AdventureWorks2016_EXT.bak'\n    WITH MOVE 'AdventureWorks2016_EXT_Data' TO 'c:\\\
    sql_sample_databases\\AdventureWorks2016_Data.mdf',\n    MOVE 'AdventureWorks2016_EXT_Log'\
    \ TO 'c:\\sql_sample_databases\\AdventureWorks2016_log.ldf',\n    MOVE 'AdventureWorks2016_EXT_Mod'\
    \ TO 'c:\\sql_sample_databases\\AdventureWorks2016_EXT_mod'\n    GO\n```\nQuery\
    \ Store is already enabled after restoring this backup.\n3.  Execute the script\
    \ `create_xevent_seassion.sql` to create and start an Extended Events session\
    \ to view feedback events. Use SSMS in Object Explorer to view the session with\
    \ Watch Live Data. The script uses the following T-SQL statements:\n```sql\n \
    \   IF EXISTS (SELECT * FROM sys.server_event_sessions WHERE name = 'CEFeedback')\n\
    \    DROP EVENT SESSION [CEFeedback] ON SERVER;\n    GO\n    CREATE EVENT SESSION\
    \ [CEFeedback] ON SERVER\n    ADD EVENT sqlserver.query_feedback_analysis(\n \
    \   ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text)),\n\
    \    ADD EVENT sqlserver.query_feedback_validation(\n    ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text))\n\
    \    WITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=NO_EVENT_LOSS,MAX_DISPATCH_LATENCY=1\
    \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=OFF);\n\
    \    GO\n    -- Start XE\n    ALTER EVENT SESSION [CEFeedback] ON SERVER\n   \
    \ STATE = START;\n    GO\n```\n4.  Execute the script `create_index_on_city.sql`\
    \ to add an index on the `City` column for the `Person.Address` table. This script\
    \ uses the following T-SQL statements:\n```sql\n    USE [AdventureWorks_EXT];\n\
    \    GO\n    CREATE NONCLUSTERED INDEX [IX_Address_City] ON [Person].[Address]\n\
    \    (\n    [City] ASC\n    );\n    GO\n```\n5.  Execute the script `dbcompat160.sql`\
    \ to turn on dbcompat 160 and clear Query Store and cache. This script uses the\
    \ following T-SQL statements:\n```sql\n    USE master;\n    GO\n    ALTER DATABASE\
    \ [AdventureWorks_EXT] SET COMPATIBILITY_LEVEL = 160;\n    GO\n    ALTER DATABASE\
    \ [AdventureWorks_EXT] SET QUERY_STORE CLEAR ALL;\n    GO\n    USE [AdventureWorks_EXT];\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n\
    ```\n6.  Execute the script `cefeedbackquerybatch.sql` to *prime* CE feedback.\
    \ This script uses the following T-SQL statements:\n```sql\n    USE AdventureWorks_EXT;\n\
    \    GO\n    SELECT AddressLine1, City, PostalCode FROM Person.Address\n    WHERE\
    \ StateProvinceID = 79\n    AND City = 'Redmond';\n    GO 15\n```\nThe script\
    \ should finish in seconds. Here is the classic correlation example. Is the city\
    \ of Redmond correlated to be in the state where `StateProvinceID = 79`? Which\
    \ assumption should the optimizer make about correlation? We will see later what\
    \ CE feedback does. The script is run 15 times to ensure we run a query at a minimum\
    \ level of times before trying to provide feedback. This number is not documented,\
    \ so do not rely specifically on the magic number of 15.\n7.  Now execute the\
    \ script `cefeedbackquery.sql`, which runs the same query one more time. If you\
    \ check the Extended Events live data, you should see an event called `query_feedback_analysis`.\
    \ The output should look something like Figure [5-14](#525217_1_En_5_Chapter.xhtml#Fig14).\
    \ One of the key columns is the `feedback_hint`. You will learn more about this\
    \ over the rest of the exercise.\n\n![Images/525217_1_En_5_Fig15_HTML.png](Images/525217_1_En_5_Fig15_HTML.png)\n\
    \nA representation of the output of the C E feedback validation. The output is\
    \ titled displaying 2 events. Arrows point to feedback underscore validation underscore\
    \ c p u underscore time, 1521, and original underscore c p u underscore time,\
    \ 8476.\n\n**Figure 5-15** CE feedback validation\n\n1.  Execute the query `check_query_hints_and_feedback.sql`.\
    \ This script uses the following T-SQL statements:\n```sql\n    USE AdventureWorks_EXT;\n\
    \    GO\n    SELECT * from sys.query_store_query_hints;\n    GO\n    SELECT *\
    \ from sys.query_store_plan_feedback;\n    GO\n```\n`sys.query_store_query_hints`\
    \ is where all query hints are stored whether you supply a hint or the system\
    \ does. `sys.query_store_plan_feedback` is used to show any feedback the system\
    \ is providing for query processing. You saw examples of this in Chapter [4](#525217_1_En_4_Chapter.xhtml)\
    \ for memory grant persistence.\n\nYour output should look similar to the following\
    \ for the second query (I flipped the results vertically but left out the datetime\
    \ values):\n```sql\n    plan_feedback_id        2\n    plan_id               \
    \  22\n    feature_id              1\n    feature_desc            CE Feedback\n\
    \    feedback_data           {\"Feedback hints\":\"\"}\n    state            \
    \       2\n    state_desc              PENDING_VALIDATION\n```\nThis data indicates\
    \ that CE feedback is eligible to be provided, but validation is needed. The validation\
    \ is to ensure the feedback doesn’t make the query slower (more specially, the\
    \ feedback hint doesn’t lead to a plan that uses more CPU). The first query doesn’t\
    \ return any rows because we have not “locked” in the hint to be used for CE feedback.\n\
    2.  Execute the script `cefeedbackquery.sql` again.\n3.  Check the Extended Events\
    \ live data. Now an event has fired called `query_feedback_validation`. Your results\
    \ should be similar to Figure [5-15](#525217_1_En_5_Chapter.xhtml#Fig15). Notice\
    \ the value of `feedback_validation_cpu_time` is less than `original_cpu_time`.\
    \ This means the hint we are using requires less CPU for the query.\n4.  Run the\
    \ script `check_query_hints_and_feedback.sql` again. You should see results now\
    \ like the following for the first query from `sys.query_store_query_hints`:\n\
    ```sql\n    query_hint_id                              1\n    query_id       \
    \                            22\n    query_hint_text\n    OPTION(USE HINT('ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES'))\n\
    \    last_query_hint_failure_reason             0\n    last_query_hint_failure_reason_desc\
    \        NONE\n    query_hint_failure_count                   0\n    source  \
    \                                   1\n    source_desc                       \
    \         CE feedback\n    comment                                    NULL\n```\n\
    And results for the second query from `sys.query_store_plan_feedback` should look\
    \ like\n```sql\n    plan_feedback_id        2\n    plan_id                 22\n\
    \    feature_id              1\n    feature_desc            CE Feedback\n    feedback_data\n\
    \    {\"Feedback hints\":\"Min selectivity\"}\n    state                   5\n\
    \    state_desc              VERIFICATION_PASSED\n```"
