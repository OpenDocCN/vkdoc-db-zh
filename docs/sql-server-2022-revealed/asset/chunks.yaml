  trans: '

    ### 关于 DOP 反馈我还应该了解什么？


    在您利用此功能时，关于 DOP 反馈，您需要了解以下几个关键点：


    *   如果您将数据库作用域的配置值 `DOP_FEEDBACK` 设置为 `OFF`，且反馈信息尚未持久化，那么反馈将会丢失，这相当于您“重置了系统”。如果反馈已持久化，那么查询将恢复到“默认”的
    DOP 行为，但反馈不会丢失。如果您再次将其开启，则将使用 DOP 反馈。


    *   如果反馈未持久化，那么任何重新编译都会导致“重新开始”。如果反馈已持久化，那么反馈在重启或重新编译后依然存在，这正是使用 `查询存储` 来保存反馈的好处。


    *   查询执行时的当前数据库上下文是考虑 DOP 反馈的基础。因此，如果您执行一个跨越多个数据库的查询，并且该数据库的 `DOP_FEEDBACK` 设置为
    `ON`，则使用您执行查询时的数据库上下文。


    *   使用临时表的查询符合 `DOP_FEEDBACK` 的条件。我修改了前面的练习，在存储过程中使用了临时表，并完成了整个练习。其行为与使用用户表时相同。


    *   我之前提到过原始 DOP 以及使用 DOP 反馈的优先级顺序。假设数据库选项 `DOP_FEEDBACK` 处于开启状态，并且您没有使用 `DISABLE_DOP_FEEDBACK`
    查询提示，我们将根据您对查询提示、资源组、数据库作用域配置或实例配置的设置，“开始”用于反馈考虑的基线 DOP。


    例如，如果您没有使用查询提示，也没有使用其他任何配置值，只是将‘最大并行度’设置为 8，我们将从 8 开始 DOP 反馈的基线（即使您的 CPU 数量超过
    8 个）。


    *   在 SQL Server 2017 中，我们引入了自动计划修正（`APRC`）的概念，它同样利用了 `查询存储`。其概念是，如果发生性能回退，则自动恢复到“最后已知的良好”计划。如果您启用了
    `APRC`，它的优先级将高于使用 DOP 反馈。您可以在 `https://docs.microsoft.com/sql/relational-databases/automatic-tuning/automatic-tuning?#automatic-plan-correction.ack`
    了解更多关于 `APRC` 的信息。


    请在 `https://aka.ms/dopfeedback` 获取所有关于 DOP 反馈的最新文档和更新。


    ## 为您服务的引擎


    想想如今融入 SQL Server 2022 内置查询智能的所有创新。


    从 `SQL Server 2016` 开始，我们引入了 `查询存储`，现在，在 SQL Server 2022 中，借助提示、对只读副本的支持以及与 `IQP`
    的集成，它变得比以往任何时候都更强大、更可用。


    在 `SQL Server 2017` 中，我们引入了以下 `IQP` 功能：


    *   自适应联接


    *   交错执行


    *   批处理模式的内存授予反馈


    然后在 `SQL Server 2019` 中，我们添加了


    *   行模式的内存授予反馈


    *   用于行模式查询（非列存储查询）的批处理模式


    *   标量 UDF 内联


    *   表变量延迟编译


    *   近似 COUNT DISTINCT


    而现在在 `SQL Server 2022` 中，随之而来的是


    *   近似百分位数


    *   优化的计划强制


    *   DOP 反馈


    *   内存授予百分位数和持久化


    *   参数敏感型计划优化


    *   CE 反馈


    我知道我有偏见，但对我来说，这就是一个为您服务的引擎。除了为近似函数编写示例之外，这些功能中的每一个都不需要任何代码更改。而且这些并非特殊的附加功能。它们被内置于引擎的核心中，存在于
    SQL 所在的任何地方。它们是我们产品中基于现实场景的最亮点创新领域之一，这些场景您每天都会遇到。


    我认为微软技术院士 Hanuma Kodavalla 总结得最好，他告诉我：


    > 查询的能力是关系数据库区别于其他数据库的关键，而 SQL Server 提供了业界最复杂的查询处理引擎之一。SQL Server 的工程师和项目经理例行使用从数百万个云数据库（规模从几
    GB 到一百 TB 不等）收集的遥测数据，这些数据库运行着广泛的工作负载——OLTP、数据仓库、HTAP——以理解常见的查询模式，并设计改进查询性能的功能。由此产生了
    SQL Server 2022 的许多功能——参数敏感型计划、基数估计反馈、近似查询处理、优化的计划强制、可读辅助副本上的 QDS、对 QDS 提示的改进、内存授予反馈以及智能选择并行度。在所有这些功能中，一个不变的主题是开发创新的算法，这些算法能在运行时适应各种查询模式和系统负载，从而得出更好的计划并提高查询执行效率。由于这些功能，工作负载通常能在不要求应用程序进行任何更改的情况下看到显著的性能提升。此外，所有这些功能在发布给
    SQL Server 2022 客户之前，都已在云中部署并在关键任务工作负载上进行了测试，因此它们都已准备好在生产环境中使用。


    # 6. SQL Server 的核心基础


    几年前，我正在为 PASS 大会主题演讲中著名的“Conor and Bob”环节做准备。我构思了一个涉及机器学习、分析和其他类型新功能的复杂想法。当我展示给
    Conor 看时，他只是简单地说：“Bob，我认为我们的环节应该坚持核心基础。” 作为德克萨斯人，我明白他的意思。要突出 SQL Server 的 `核心引擎`
    能力。


    当然，SQL 在机器学习和分析等方面具有核心能力，但 Conor 真正指的是安全性、可扩展性（性能）和可用性。对于每一个主要版本，我们都必须在这三个领域进行投资，否则我们实际上就没有一个真正的引擎。


    ## 核心引擎是 SQL Server 的核心基础


    本章节完全关于核心引擎领域：安全性、可扩展性（性能）和可用性——外加一些不完全属于这些类别的其他“内容”。内置查询智能无疑是核心引擎的一部分，但它值得拥有自己的章节。在这里，我将涵盖所有有助于实现以下目标的新功能：


    *   保护您的应用程序和数据安全。


    *   确保您的应用程序能够扩展并保持高性能。


    *   确保您的应用程序具有高可用性。


    然后是一个对引擎来说纯粹是“锦上添花”的功能列表。您开始阅读本章时可能会觉得这只是“一个功能列表”。但本章中的每一个新增强都有其背后的故事和原因。我会尝试为许多这些新功能提供这些细节。这些类别没有特定的顺序，但我通常从安全性开始。


    ## 安全性


    我一直认为我们的工程团队非常重视安全性，不仅因为十多年来我们一直是业界漏洞最少的数据库（这不是我们发布的——您可以自行从美国国家标准与技术研究院综合漏洞数据库查看），还因为我们不断投入新功能来帮助保护应用程序和数据更加安全。


    对于 SQL Server 2022，这包括数据完整性、加密和授权方面的增强。这一切都始于一项名为 `SQL Server 总账` 的革命性创新。


    注意


    我认为 `Azure Active Directory (AAD)` 身份验证、`Microsoft Purview` 策略管理和 `Microsoft Defender`
    都属于“安全”功能。但这些在本书第 3 章中有更详细的介绍。

