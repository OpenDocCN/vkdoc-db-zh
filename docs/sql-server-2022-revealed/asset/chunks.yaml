  trans: '

    ### 何时在 Linux 上使用 SQL Server


    SQL Server on Linux 是一个完整的“盒装产品”，支持 Red Hat Enterprise Linux (RHEL)、Ubuntu 和 SUSE
    Linux Enterprise Server 等 Linux 发行版。SQL Server on Linux 支持所有版本，并通过一组特定于 Linux
