  trans: '

    ### 连接到 Azure 虚拟机


    如果你在自有环境中拥有虚拟机，那么用于操作系统访问、连接到该虚拟机的两种最常见方法，分别是用于 Windows 的远程桌面 (`rdp`) 和用于 Linux
    的 `ssh`。


    基本上有三种方法可以连接到 Azure 虚拟机。首先，在 Azure 门户中，选择屏幕顶部菜单中的 `连接` 选项。你将看到如图 10-8 所示的选项。


    ![](img/525217_1_En_10_Fig8_HTML.png)


    一个屏幕截图。顶部是一个安全警告。其下方，在 `RDP` 选项卡下是连接方法，带有 `IP` 地址和端口号的选项。


    **图 10-8**

    Azure 虚拟机的连接选项


    如果你使用的是 Windows，可以下载一个文件，用于任何支持 `rdp` 的程序。请注意端口号。在部署虚拟机时，你已将默认的 `rdp` 端口设为公开。对于你的组织而言，这可能不是一个安全的方法（在微软内部是不允许的）。一个选项是更改默认的
    `rdp` 端口，然后你需要在此处提供不同的端号。以下是一套在 Azure 门户中为虚拟机更改 `rdp` 端口的详细步骤：[`https://docs.microsoft.com/archive/blogs/technet/drew/1195`](https://docs.microsoft.com/archive/blogs/technet/drew/1195)。


    如果在通过 `rdp` 连接到 Azure 虚拟机时遇到问题，请查阅我们的文档：[`https://docs.microsoft.com/troubleshoot/azure/virtual-machines/troubleshoot-rdp-connection`](https://docs.microsoft.com/troubleshoot/azure/virtual-machines/troubleshoot-rdp-connection)。


    对于 Linux，`ssh` 选项卡下存在相同的选项。任何支持 `ssh` 的程序或 Shell 都可以使用。


    第三个选项是最安全的，称为 Bastion。Bastion 是在你的 Azure 虚拟网络中运行的一项安全的 Azure 服务，它允许你通过 Web 浏览器以安全的方式获得
    `rdp` 或 `ssh` 的体验。了解更多关于 Bastion 的信息：[`https://docs.microsoft.com/azure/bastion/bastion-overview`](https://docs.microsoft.com/azure/bastion/bastion-overview)。


    一旦你可以使用 `rdp` 或 `ssh`，现在就可以像访问自有机器或数据中心里的任何虚拟机一样，访问这台虚拟机了。


    ### 在门户中探索 SQL 虚拟机


    由于我们部署了虚拟机，`SQL Server IaaS 代理扩展` 已被安装，并且我们的 `SQL Server` 已以 `完整模式` 注册。因此，我们可以前往
    Azure 门户，并将我们的虚拟机视为 `SQL 虚拟机` 进行查看。在门户中有几种查看 `SQL 虚拟机` 的方式。你可以使用 Azure 虚拟机资源菜单中的
    `SQL Server 配置` 选项，或者从 Azure 主页搜索 `SQL 虚拟机`。你也可以在 Azure SQL 资源列表中看到 `SQL 虚拟机`。


    图 10-9 展示了我在门户中的 `SQL 虚拟机`。


    ![](img/525217_1_En_10_Fig9_HTML.png)


    一个 `SQL 2022` 的屏幕截图。在“概述”下方，菜单是基本属性的详细信息。其下方是一个柱状图，右侧是 `SQL` 的 7 个功能。


    **图 10-9**

    门户中已部署在 Azure 虚拟机上的 `SQL Server`


    请注意，菜单中的所有属性、数据和选项都是非常 `SQL Server` 特定的。我在部署虚拟机时向你展示过的大多数 `SQL Server` 特定项目，在这里也可以进行配置。


    `存储配置` 选项仅用于扩展你在部署期间所做的选择，但如果你超过了虚拟机大小的存储上限，同样的警告仍然适用。


    我将在本章后面的“**优化性能**”一节中讨论 `SQL 最佳实践评估` 选项。


    关于屏幕顶部选项的一个重要提示：`删除` 选项用于通过 `IaaS 代理扩展` 取消注册 `SQL Server`。在 `删除` 屏幕上还有一个删除虚拟机的选项，但这需要你明确选择该选项。


    ### 连接到 Azure 虚拟机上的 SQL Server


    现在 `SQL Server` 已经部署好了，如何使用 `SSMS` 或你的应用程序等工具连接到 `SQL Server` 呢？


    这完全取决于你想要从哪里连接。以下是你的选项：


    *   使用 `rdp` 或 `ssh` 登录后，在虚拟机内部使用工具或应用程序进行连接。

    *   创建另一台虚拟机或在同一虚拟网络中构建应用程序。一旦设置好，你就自动处于同一私有网络中，因此可以使用服务器名称或私有 `IP` 地址。

    *   使用 VPN 网关或 Express Route 等技术将你的本地环境或 Azure 资源连接到虚拟网络。了解更多：[`https://docs.microsoft.com/azure/architecture/reference-architectures/hybrid-networking`](https://docs.microsoft.com/azure/architecture/reference-architectures/hybrid-networking)。

    *   连接到虚拟机的公共 `IP` 地址或 `DNS` 名称。这需要你为虚拟机启用公共连接，但请注意。如果你打算使用端口 `1433`，我不推荐此选项。即使你更改了端口，你也绝对需要配置一个
    `网络安全组 (NSG)`。了解更多：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/ways-to-connect-to-sql#connect-to-sql-server-over-the-internet`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/ways-to-connect-to-sql#connect-to-sql-server-over-the-internet)。


    无论你选择哪种方法，连接到 Azure 虚拟机上的 `SQL Server`，就像使用你选择的、与 `SQL Server` 兼容的工具或应用程序连接到任何
    `SQL Server` 一样。


    > **提示**

    >

    > 我们的 SQL 市场镜像在虚拟机中预装了 `SSMS` 和 `Azure Data Studio` 等工具！

    '
- fmt: '## Migrating to SQL Server on an Azure Virtual Machine


    You may be deploying SQL Server on an Azure virtual machine with the intention
    of migrating an existing SQL Server instance from an on-premises environment or
    other clouds. For an overview of all your options to migrate SQL Server to Azure,
    check out [`https://azure.microsoft.com/migration/sql-server`](https://azure.microsoft.com/migration/sql-server).


    **Tip**


    If you are considering migrating many SQL Server instances to an Azure virtual
    machine, take a look at the Azure Migrate service at [`https://azure.microsoft.com/services/azure-migrate`](https://azure.microsoft.com/services/azure-migrate).
    This service talks about options for discovery and assessment from on-premises
    and even other clouds like AWS and GCP.


    You have three choices to perform this migration:


    1.  Deploy SQL Server on an Azure virtual machine. Then perform an `offline migration`
    using a full backup and restore of your database(s) to Azure. Use Azure storage
    as the place to host the backup. You will need to manually migrate any other instance-level
    objects or settings.


    2.  Deploy SQL Server on an Azure virtual machine. Then perform an offline or
    online migration using the `Azure SQL migrate extension` with Azure Data Studio.
    You can learn more about this option at [`https://docs.microsoft.com/azure/dms/migration-using-azure-data-studio`](https://docs.microsoft.com/azure/dms/migration-using-azure-data-studio).
    One thing I like about this option is that the assessment tool can observe your
    configuration and workload for SQL Server and then provide recommendations for
    Azure virtual machine sizes and storage. So use this tool first before you deploy.
    An offline migration is accomplished with backup and restore. An online migration
    uses log shipping technology to allow for less downtime.


    3.  You can lift and shift your entire virtual machine from on-premises into Azure
    using Azure Migrate or Azure Site Recovery. You can learn more about his option
    at [`https://docs.microsoft.com/azure/site-recovery/migrate-tutorial-on-premises-azure`](https://docs.microsoft.com/azure/site-recovery/migrate-tutorial-on-premises-azure).
    Be careful with this option because you might have to make some changes to optimize
    your SQL Server Azure virtual machine settings including storage configuration
    after you migrate.


    ## Optimizing Performance


    If you read previous sections of this chapter, then you have probably done many
    of the right things to optimize performance of SQL Server on an Azure virtual
    machine.


    But let’s review some of the important choices and also introduce you to a new
    option we have for best practices.


    ### Virtual Machine Size


    Your virtual machine size choice determines CPU speed and limits on number of
    CPUs, memory, local disk, number of disks, maximum storage, storage performance,
    and more.


    So just as it would be an important choice for you to make in other clouds or
    in your data center, it is important for optimal performance for SQL Server on
    an Azure virtual machine.


    If you look at our guidance at [`https://aka.ms/SQLIaaSSizing`](https://aka.ms/SQLIaaSSizing),
    you will notice that our size choices usually point to the `E` series or `M` series.
    But that advice is of the calendar year 2022. I’ve seen a lot of innovation in
    Azure virtual machines over the last few years, so stay in touch with this site
    as we will keep it updated for the latest size advice. And remember as we have
    shown already in this chapter, even if you have carefully selected the right storage
    options, your performance may be limited by the virtual machine size. There is
    a very nice Data Exposed show with David Pless explaining this at [`https://docs.microsoft.com/shows/data-exposed/azure-sql-vm-caching-and-storage-capping-ep-1-data-exposed`](https://docs.microsoft.com/shows/data-exposed/azure-sql-vm-caching-and-storage-capping-ep-1-data-exposed).


    Remember that you can often resize the virtual machine up or down as you can read
    at [`https://docs.microsoft.com/azure/virtual-machines/resize-vm`](https://docs.microsoft.com/azure/virtual-machines/resize-vm).
    This operation can often happen with very little downtime, but I’ve also seen
    it take longer in some cases; depending on your subscription and region, some
    size options are not offered.


    ### Storage Performance


    I believe from my experience that storage performance is probably one of the most
    common issues for customers using SQL Server on an Azure virtual machine.


    Pay close attention to your storage choices, use our recommendations during the
    deployment process, and read our guidance that includes a great checklist at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-storage`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-storage).


    Let me summarize a few points from our recommendations:


    *   Don’t store anything related to SQL Server on the OS disk including system
    databases and the `LOG` directory.

    *   Take advantage of storing `tempdb` on the local SSD.

    *   Separate data and log into different disks. Use Premium managed disks and
    size them per our guidance for not just size but `IOPS` and throughput. Take advantage
    of our advice for read caching for the data disk and no caching for the log disk.


    **Note**


    In the summer of 2022, we announced the preview of Azure Premium disks V2. We
    are evaluating how to best use these with SQL Server, so stay tuned. Read more
    about Premium disks V2 at [`https://docs.microsoft.com/azure/virtual-machines/disks-types#premium-ssd-v2-preview`](https://docs.microsoft.com/azure/virtual-machines/disks-types#premium-ssd-v2-preview).


    *   If a single disk is not big enough for size, `IOPS`, or throughput, combine
    them with technologies like Storage Spaces.

    *   There is another option called Ultra disks. This is a more expensive option,
    and you should only consider this option if disk latency is very sensitive to
    your SQL Server. For example, we have some customers who have used an Ultra disk
    for the transaction log for In-Memory OLTP.'
