  trans: "\n# 3. 将数据库连接至云端\n\n## 配置\n\n尽管本章专门为您提供安装和升级方面的指导，但安装后 SQL Server 的配置同样是一个重要主题。不过，在\
    \ SQL Server 2022 中，实例配置的改动非常少：\n\n*   新增了少量服务器级别的 `sp_configure` 选项。这些选项将在本书中结合\
    \ SQL Server 2022 的新特性进行讨论。\n\n*   SQL Server 配置管理器已得到增强，允许您控制 Azure SQL Server\
    \ 扩展功能的服务（启动和停止）。\n\n除此之外，没有新的实例级别配置变更。\n\n您将在探索本书中各种新特性时，了解到新的数据库级别配置选项。\n\n\
    ## 易于安装和升级\n\nSQL Server 一直以来以其简便的安装和升级体验而闻名，这一点在 SQL Server 2022 中并未改变。作为该体验的一部分，我们提供了集成设置，以便在您需要实现混合策略时连接到\
    \ Azure。\n\n如果您通读了本章的所有细节，那么您已基本准备好深入探索各项功能了。那么，让我们开始吧！下一章将介绍如何以前所未有的行业方式将 SQL\
    \ Server 连接到云端，该方式将 SQL Server 与 Azure 相结合，以提供灾难恢复、分析和安全功能。\n\nSQL Server 可在您需要的任何平台上运行，从边缘到云端。无论您在何处运行\
    \ SQL Server，我们都看到了行业和客户将 SQL Server *连接* 到云端的趋势。*连接* 是一个相当宽泛的术语，因此在本章中，您将详细了解\
    \ SQL Server 2022 如何连接到云端。\n\n首先，我将分享我对 *混合* 含义的理解，以及 SQL Server 多年来如何成为一个混合平台。然后，我将深入介绍\
    \ SQL Server 2022 现在在哪些主要领域以空前的方式启用了 Azure 功能。这包括托管的灾难恢复、近实时分析以及新的安全功能。作为此部分内容的一部分，我将描述如何使用\
    \ Azure Arc 来实现其中一些技术。\n\n本章包含供您实践学习的示例，以了解这些功能的工作原理。对于其中任何一项功能，您都需要一个 Azure 订阅，并且需要能够将您的\
    \ SQL Server 连接到 Azure，无论是直接连接互联网还是通过代理连接。您的公司或组织可能已为您提供了 Azure 账户或订阅。但是，如果您需要自己的账户，请从\
    \ `https://azure.microsoft.com/get-started` 开始。在本章中，我将详细说明每种场景可能需要的特定访问权限，以及您可能希望使用的任何特殊连接配置（如代理）。\n\
    \n## 混合 SQL Server\n\n在本书的这一部分，我将分享我对 *混合* 一词在 SQL Server 相关语境下含义的理解，简要回顾 SQL\
    \ Server 在以往版本中如何具备混合功能，并概述 SQL Server 2022 的独特之处。\n\n### 什么是 *混合*？\n\n我相信你们很多人都思考过\
    \ *混合* 的含义，我的研究表明行业内对此有多种定义和见解。我喜欢将 *混合* 一词简单地定义为与计算或数据平台相关的概念：\n\n*   同时在本地和云端提供的产品或服务，*且具有一致性*\n\
    \n    SQL Server 绝对符合这一条件，因为它可在 Azure 云端的 Azure SQL 中运行：Azure 虚拟机上的 SQL、Azure\
    \ SQL 托管实例以及 Azure SQL 数据库。请注意我在短语末尾的强调：“且具有一致性”。我这样说是因为，您可能会找到其他同时存在于本地和云端的产品，但它们是否具备与\
    \ SQL Server 相同的一致性故事呢？相同的核心数据库引擎、相同的 T-SQL 语言以及相同的工具。\n\n*   一种在本地运行的产品，通过连接到云端以\
    \ *增强* 数据能力\n\n这个短语有两个关键词：连接和增强。*连接* 意味着通过某种方式将本地产品现有功能的数据连接起来。*增强* 意味着这种连接能带来真正的商业价值。您将在本章中看到，我认为\
    \ SQL Server 2022 同时做到了这两点。\n\n首先，让我们回顾一下 SQL Server 历年来如何连接到 Azure，以建立一些背景知识。\n\
    \n### 历年 SQL Server 的混合特性\n\nSQL Server 历年来包含的最基本的混合功能是备份。从 SQL Server 2012 开始，您就可以使用包含\
    \ URL 的语法，将数据库备份到 Azure Blob 存储或从其中恢复。此功能多年来不断增强，至今仍然存在，您可以在 `https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`\
    \ 阅读相关内容。\n\n还有其他连接 SQL Server 到 Azure 的方法，包括使用现有功能来扩展高可用性、冗余或查询。例如，您可以将 Always\
    \ On 可用性组扩展到 Azure，您可以在 `https://docs.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability`\
    \ 阅读相关信息。\n\n您还可以设置事务复制，其中发布服务器是本地 SQL Server，而订阅服务器数据库位于 Azure 虚拟机、Azure SQL\
    \ 托管实例，甚至 Azure SQL 数据库上（您可以在 `https://docs.microsoft.com/azure/azure-sql/database/replication-to-sql-database`\
    \ 阅读有关如何为 Azure SQL 数据库设置此功能的具体说明）。\n\n最后，任何 Azure SQL 服务都可以作为本地 SQL Server 通过链接服务器查询的数据源。这些都是连接\
    \ SQL Server 到 Azure 的基本方法，但 SQL Server 2022 将其提升到了一个新的水平。\n\n### SQL Server 2022\
    \ 混合功能阵容\n\n图 3-1 直观地展示了 SQL Server 2022 的所有 Azure 启用功能。\n\n![](img/525217_1_En_3_Fig1_HTML.png)\n\
    \nSQL Server 2022 具备 3 项内置能力，可云连接至 5 项 Azure 启用功能，从复制数据故障转移到评估警报。\n\n图 3-1\n\n\
    SQL Server 2022 实现云连接\n\n从左至右，SQL Server 2022 在顶部内置了提供这些云连接功能的能力。\n\n#### Azure\
    \ SQL 托管实例\n\nAzure SQL 托管实例的链接功能为 SQL Server 2022 提供 *托管式* 灾难恢复。内置的分布式可用性组 (DAG)\
    \ 功能用于桥接 SQL Server 和 Azure SQL 托管实例。\n\n#### Azure Synapse Analytics\n\n适用于 SQL\
    \ Server 的 Azure Synapse Link 允许 SQL Server 2022 将选定表中的数据无缝同步到 Azure Synapse 的专用\
    \ SQL 池。自承载集成运行时 (SHIR) 用于协调 Synapse 和 SQL Server 之间的通信，但 SQL Server 也具备向 Azure\
    \ 发送数据的内置能力。\n\n#### Azure Active Directory 身份验证\n\nSQL Server 2022 现在可以使用 Azure\
    \ Active Directory (AAD) 账户进行登录身份验证。这支持了诸如多因素身份验证等概念。您必须在 SQL Server 2022 上启用\
    \ AAD 才能支持 Purview 集成的策略管理。SQL Server 2022 的 AAD 需要 Azure SQL Server 扩展。\n"
- fmt: '# Microsoft SQL Server 2022 云连接功能


    ## Microsoft Purview


    Microsoft Purview 具备许多功能，但与 SQL Server 2022 集成的具体新功能是 `policy management`。您可以使用
    Purview 发布一个将推送到 SQL Server 2022 的策略，以支持身份验证和访问。Purview 策略管理与 SQL Server 2022
    要求您已为 SQL Server 配置了 Azure Active Directory (AAD) 身份验证，因为策略将基于 AAD 帐户。Purview
    策略管理还需要 Azure 扩展 for SQL Server。


    ## Microsoft Defender for SQL


    Microsoft Defender for SQL 是 Microsoft Defender for Cloud 家族的一员，支持对 SQL Server
    2022 进行漏洞评估和高级威胁防护 (ATP)。Microsoft Defender for SQL 适用于多种 SQL 技术，并支持早期版本的 SQL
    Server。适用于本地 SQL Server 的 Microsoft Defender for SQL 需要 Azure Arc Agent 和用于监视的扩展。本章不会详细介绍此服务。您可以在
    [`https://docs.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage`](https://docs.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage)
    阅读更多关于 Microsoft Defender for SQL 的信息。


    ## Azure Arc Agents and Azure Extension for SQL Server


    `Azure Arc Agent` 是在您选择在 SQL Server 安装期间或通过脚本方法连接到 Azure 时安装的，用于连接 Microsoft Purview、启用
    Azure Active Directory 身份验证 (AAD) 并支持 Microsoft Defender for SQL。Azure Arc Agent
    支持一个用于特定功能的扩展框架。我们构建了一个名为 `Azure extension for SQL Server` 的扩展。此扩展与 Azure 通信，将信息存储在注册表（对于
    Linux 是 `mssql.conf`）中，数据库引擎已增强以支持 AAD 和 Purview。Microsoft Defender for SQL 使用另一个名为
    Monitoring Agent 的扩展。您可以在 [`https://docs.microsoft.com/azure/azure-arc/servers/agent-overview`](https://docs.microsoft.com/azure/azure-arc/servers/agent-overview)
    阅读有关 Azure Arc Agent 架构的详细信息。Azure Arc Agent 和扩展是为本地 SQL Server 设计的。Azure 虚拟机上的
    SQL Server 有类似的概念，但使用不同的架构，包括 SQL Server IaaS Agent Extension ([`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management))。在本书撰写时，Microsoft
    Purview 和 Azure Active Directory 身份验证尚未得到 IaaS Agent Extension 的支持。然而，我们计划启用此功能，并且我们可以在不同于发布
    SQL Server 主要版本的时间框架内增强该扩展。


    本章的其余部分将深入介绍这些云连接功能中的每一项。您可以阅读所有部分，或直接跳转到您想了解的特定云服务。


    # 使用 Azure SQL Managed Instance 进行托管灾难恢复


    您只会在……嗯，发生灾难时才需要担心灾难恢复。但当然没有人知道那是什么时候，这就是为什么为 SQL Server 数据和安装制定灾难恢复计划是任何生产系统的关键组成部分。


    您如何构建灾难恢复系统通常取决于您可能知道的行业术语，例如恢复时间目标 (RTO) 和恢复点目标 (RPO)。我们的高可用性解决方案，例如 SQL Server
    的内置崩溃恢复和故障转移群集，可以帮助满足这些要求。这些解决方案通常不能帮助灾难恢复的原因是，真正的灾难通常意味着您的本地数据副本不可用。


    SQL Server 提供了许多帮助解决方案，包括一个基本的数据库备份和还原解决方案，您通常将备份存储在另一个物理位置，如果在灾难情况下发生，可以检索和还原这些备份。您甚至可以建立一个
    Always On 可用性组，将辅助副本放在不同的物理位置，但这可能需要更复杂的群集设置。


    对于 SQL Server 2022，我们希望为灾难恢复提供一个新选项，我称之为 `managed disaster recovery`。


    ## Project Chimera 和 DAG


    为了理解我们如何构建托管灾难恢复解决方案，让我们看看这个新功能的背景。


    ### 分布式可用性组


    为了帮助灾难恢复场景，我们在 SQL Server 2016 中构建了一个名为 `Distributed Availability Groups` (DAG)
    的新功能。DAG 是一个跨越多个可用性组 (AG) 的可用性组，通常跨越遥远的区域。DAG 技术最棒的地方在于它完全内置于 SQL Server 中。实际上，AG
    技术也内置于 SQL Server 中以管理数据复制。诸如 Windows Server 故障转移群集 (WSFC) 和 Pacemaker (Linux)
    之类的技术用于协调故障转移。


    图 [3-2](#525217_1_En_3_Chapter.xhtml#Fig2) 显示了一个可能的 DAG 配置。


    ![图 3-2](Images/525217_1_En_3_Fig2_HTML.png)


    图 3-2：SQL Server 分布式可用性组 (DAG)


    您可以看到此设计的一个有趣方面是，可用性组 1 (AG1) 中的主副本不仅将其事务日志更改发送到其 AG 中的辅助副本，还发送到可用性组 2 (AG2) 的主副本。AG2
    的主副本将其日志更改转发到其辅助副本。用户只能向 AG1 的主副本写入更改。但如果出现情况，您可以故障转移到 AG2，然后用户就可以向 AG2 的主副本写入更改。副本和
    AG 之间的所有通信和数据复制都在 SQL Server 引擎内管理。


    AG 和 DAG 都内置于 SQL Server 中，这一事实让我们想到将这个概念扩展为混合方法。为什么第二个 AG 不能在 Azure 中呢？但不仅仅是在
    Azure 中，因为您肯定可以在您的数据中心中的 SQL Server 与 Azure 虚拟机上的第二个 AG 之间构建一个 DAG。我们希望构建一些新的、革命性的东西。


    ### Project Chimera


    大约 3 年前，负责 Azure SQL Managed Instance 的工程团队提出了一个想法，导致了一个名为 Chimera 的项目。正如 Managed
    Instance 团队的高级项目经理 Dani Ljepava 告诉我的那样，*“Chimera 是希腊神话中的神话怪兽，看起来像一条龙，有多个来自不同动物的头合而为一。正如我们正在构建
    SQL Server 和云之间的混合能力，Chimera 似乎是这个项目的完美名称，因为它指的是一个混合怪兽——多个动物合为一体。”*


    团队最初只是想在 SQL Server 和 Azure SQL Managed Instance (MI) 之间建立一个链接，以便 MI 可以用作只读副本，并最终成为从
    SQL Server 在线迁移的目标。最终，随着我们为项目 Dallas 制定计划，该项目章程不断扩展，以便此功能可以支持 SQL Server 2022
    的灾难恢复场景。


    Dani 告诉我，*“我们面临着解决微软以前没有人解决过的问题，并且不得不在此过程中经历一些独特的挑战（并且在我们说话的今天仍在进行中）。尽管如此，以前从未有人在
    SQL Server 和完全托管的 Azure PaaS 服务之间构建过在线 DR。”*


    随着我们朝着 SQL Server 2022 的私人预览版发布迈进，我们将 Chimera 品牌化为 `Azure SQL Managed Instance`
    的 `link feature`。'
  raw: '#### Microsoft Purview


    Microsoft Purview has many capabilities, but the specific new feature integrated
    with SQL Server 2022 is *policy management*. You can use Purview to publish a
    policy that will be pushed to SQL Server 2022 to support authentication and access.
    Purview policy management with SQL Server 2022 requires that you have configured
    Azure Active Directory (AAD) authentication for SQL Server because policies will
    be based on an AAD account. Purview policy management also requires the Azure
    extension for SQL Server.


    #### Microsoft Defender for SQL


    Microsoft Defender for SQL, a member of the Microsoft Defender for Cloud family,
    supports vulnerability assessments and advanced threat protection (ATP) for SQL
    Server 2022\. Microsoft Defender for SQL works across many SQL technologies and
    supports previous versions of SQL Server. Microsoft Defender for SQL for SQL Server
    on-premises requires the Azure Arc Agent and an extension for monitoring. I do
    not cover this service in detail in the chapter. You can read more about Microsoft
    Defender for SQL at [`https://docs.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage`](https://docs.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage).


    #### Azure Arc Agents and Azure Extension for SQL Server


    The **Azure Arc Agent**, which is installed when you choose to connect to Azure
    in SQL Server setup or through a script method, is used to connect Microsoft Purview,
    enable Azure Active Directory Authentication (AAD), and support Microsoft Defender
    for SQL. The Azure Arc Agent supports an extension framework for specific capabilities.
    We have built an extension called the **Azure extension for SQL Server**. This
    extension communicates with Azure to store information in the registry (or mssql.conf
    for Linux) that the engine has enhanced to support for AAD and Purview. Microsoft
    Defender for SQL uses another extension called the Monitoring Agent. You can read
    details about the Azure Arc Agent architecture at [`https://docs.microsoft.com/azure/azure-arc/servers/agent-overview`](https://docs.microsoft.com/azure/azure-arc/servers/agent-overview).
    The Azure Arc Agent and extensions are designed for SQL Server on-premises. SQL
    Server on an Azure Virtual Machine has a similar concept but uses a different
    architecture including the SQL Server IaaS Agent Extension ([`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management)).
    At the time of the writing of this book, Microsoft Purview and Azure Active Directory
    authentication were not yet supported by the IaaS Agent Extension. However, it
    is our plan to enable this capability, and we can enhance the extension on a timeframe
    different than releasing a major version of SQL Server.


    The rest of the chapter is devoted to a deep dive into each of these cloud-connected
    capabilities. You can read all sections or jump straight to a particular cloud
    service you want to learn about.


    ## Managed Disaster Recovery with Azure SQL Managed Instance


    You only need to worry about disaster recovery when you…well, have a disaster.
    But of course no one ever knows when that is, which is why having a plan for disaster
    recovery for your SQL Server data and installation is a key component for any
    production system.


    How you build your disaster recovery system is typically dependent on industry
    terms you may know such as Recovery Time Objective (RTO) and Recovery Point Objective
    (RPO). Our high-availability solutions such as built-in crash recovery for SQL
    Server and failover clusters can help with these requirements. The reason these
    solutions typically don’t help with disaster recovery is because a true disaster
    usually means your local copy of data is not available.


    SQL Server provides many solutions to help including a basic database backup and
    restore solution where you typically store your backups in a different physical
    location that could be retrieved and restored should a disaster situation occur.
    You could even set up an Always On Availability Group with secondaries in different
    physical locations, but this could require a more complex cluster setup.


    For SQL Server 2022, we wanted to provide a new option for disaster recovery,
    which I call *managed disaster recovery*.


    ### Project Chimera and DAG


    In order to understand how we built a managed disaster recovery solution, let’s
    look at the background of this new capability.


    #### Distributed Availability Groups


    To help with disaster recovery scenarios, we built a new feature in SQL Server
    2016 called **Distributed Availability Groups** (DAGs). A DAG is an availability
    group that spans multiple availability groups (AGs) typically across distant regions.
    The great thing about DAG technology is it is all built into SQL Server. In fact,
    AG technology is also built into SQL Server to manage data replication. Technologies
    like Windows Server Failover Cluster (WSFC) and Pacemaker (Linux) are used to
    coordinate failovers.


    Figure [3-2](#525217_1_En_3_Chapter.xhtml#Fig2) shows a possible DAG configuration.


    ![](Images/525217_1_En_3_Fig2_HTML.png)


    A diagram shows D A G -configured S Q L server. Log changes flow from datacenter
    1 to datacenter 2\. Each datacenter has primary and secondary units.


    Figure 3-2


    A SQL Server Distributed Availability Group (DAG)


    You can see one interesting aspect to this design is that the primary replica
    in Availability Group 1 (AG1) sends transaction log changes to a secondary replica
    in its AG but also sends changes to the primary replica of Availability Group
    2 (AG2). The primary replica of AG2 forwards log changes to its secondary replica.
    Users can only write changes to the primary replica of AG1\. But should circumstances
    arise, you could fail over to AG2, and now users could write to the primary replica
    of AG2\. All the communication and replication of data between the replicas and
    AGs are managed within the SQL Server engine.


    The fact that both an AG and DAG were built into SQL Server gave us the idea to
    extend this concept as a hybrid approach. Why couldn’t the second AG be in Azure?
    But not just in Azure, as you could definitely build a DAG between a SQL Server
    in your data center and the second AG on an Azure Virtual Machine. We wanted to
    build something new and revolutionary.


    #### Project Chimera


    Around 3 years ago, our engineering team that works on Azure SQL Managed Instance
    came up with an idea that led to a project called Chimera. As Dani Ljepava, Senior
    Program Manager with the Managed Instance team, told me, *“Chimera is a mythical
    beast from Greek mythology, looking like a dragon with multiple heads from different
    animals all in one. As we are building a hybrid capability between SQL Server
    and the cloud, Chimera seemed like a perfect name for the project at i*t was referring
    to a hybrid beast – many animals in one.”


    The team first started out to simply build a link between a SQL Server and an
    Azure SQL Managed Instance (MI) so that MI could be used as a read replica and
    eventually a target for online migration from SQL Server. Eventually the project
    charter grew as we laid plans for project Dallas so that this feature could support
    a disaster recovery scenario for SQL Server 2022.


    Dani told me, *“We were faced with solving problems* that nobody has addressed
    before at Microsoft and had to go through some unique challenges along the way
    (and still going on today as we speak). Having said that, nobody before has built
    an online DR between SQL Server and fully managed Azure PaaS service*.”*


    As we moved toward the Private Preview announcement of SQL Server 2022, we branded
    Chimera as the **link feature for Azure SQL Managed Instance**.'
  trans: '# Microsoft SQL Server 2022 云连接功能


    ## Microsoft Purview


    Microsoft Purview 具备许多功能，但与 SQL Server 2022 集成的具体新功能是 `policy management`（策略管理）。您可以使用
    Purview 发布一个将推送到 SQL Server 2022 的策略，以支持身份验证和访问。Purview 策略管理与 SQL Server 2022
    要求您已为 SQL Server 配置了 Azure Active Directory (AAD) 身份验证，因为策略将基于 AAD 帐户。Purview
    策略管理还需要 Azure 扩展 for SQL Server。


    ## Microsoft Defender for SQL


    Microsoft Defender for SQL 是 Microsoft Defender for Cloud 家族的一员，支持对 SQL Server
    2022 进行漏洞评估和高级威胁防护 (ATP)。Microsoft Defender for SQL 适用于多种 SQL 技术，并支持早期版本的 SQL
    Server。适用于本地 SQL Server 的 Microsoft Defender for SQL 需要 Azure Arc Agent 和用于监视的扩展。本章不会详细介绍此服务。您可以在
    [`https://docs.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage`](https://docs.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage)
    阅读更多关于 Microsoft Defender for SQL 的信息。


    ## Azure Arc Agents and Azure Extension for SQL Server


    `Azure Arc Agent` 是在您选择在 SQL Server 安装期间或通过脚本方法连接到 Azure 时安装的，用于连接 Microsoft Purview、启用
    Azure Active Directory 身份验证 (AAD) 并支持 Microsoft Defender for SQL。Azure Arc Agent
    支持一个用于特定功能的扩展框架。我们构建了一个名为 `Azure extension for SQL Server` 的扩展。此扩展与 Azure 通信，将信息存储在注册表（对于
    Linux 是 `mssql.conf`）中，数据库引擎已增强以支持 AAD 和 Purview。Microsoft Defender for SQL 使用另一个名为
    Monitoring Agent 的扩展。您可以在 [`https://docs.microsoft.com/azure/azure-arc/servers/agent-overview`](https://docs.microsoft.com/azure/azure-arc/servers/agent-overview)
    阅读有关 Azure Arc Agent 架构的详细信息。Azure Arc Agent 和扩展是为本地 SQL Server 设计的。Azure 虚拟机上的
    SQL Server 有类似的概念，但使用不同的架构，包括 SQL Server IaaS Agent Extension ([`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management))。在本书撰写时，Microsoft
    Purview 和 Azure Active Directory 身份验证尚未得到 IaaS Agent Extension 的支持。然而，我们计划启用此功能，并且我们可以在不同于发布
    SQL Server 主要版本的时间框架内增强该扩展。


    本章的其余部分将深入介绍这些云连接功能中的每一项。您可以阅读所有部分，或直接跳转到您想了解的特定云服务。


    # 使用 Azure SQL Managed Instance 进行托管灾难恢复


    您只会在……嗯，发生灾难时才需要担心灾难恢复。但当然没有人知道那是什么时候，这就是为什么为 SQL Server 数据和安装制定灾难恢复计划是任何生产系统的关键组成部分。


