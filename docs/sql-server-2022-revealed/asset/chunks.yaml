    \ 150 was enabled to include row-mode operations (but batch mode was also introduced\
    \ in SQL Server 2019 to be used without columnstore).\n\nNote\n\nRead through\
    \ the following about batch- and row-mode operations for SQL Server at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-batch-mode-on-rowstore/ba-p/386256`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-batch-mode-on-rowstore/ba-p/386256)."
  trans: "\n如果在 SSMS 中\"单击\"`query_plan_xml` 的输出，SSMS 将打开一个新窗口并显示 XML 文本。如果你仔细查看以\
    \ `<StmtSimple…` 开头的行并向右滚动，你会看到这两个值：\n\n```\nQueryCompilationReplay=\"1\" StatementOptmLevel=\"\
    FULL\"\n```\n\n这意味着此查询是优化计划强制的候选对象。其\"脚本\"或\"编译步骤\"已被内置于查询存储的计划 XML 中。这些步骤将在下次编译此查询时使用，但前提是该查询计划在查询存储中被强制。\n\
    \n1.  让我们尝试一下。加载脚本 `forceplan.sql`。编辑该脚本，填入步骤 4 结果中的 `query_id` 和 `plan_id` 值。执行该脚本。该脚本使用了以下\
    \ T-SQL：\n\n    ```\n    EXEC sp_query_store_force_plan @query_id = , @plan_id\
    \ = ;\n    GO\n    ```\n\n2.  再次执行脚本 `find_query_in_query_store.sql` 以验证查询计划已被强制。你应该看到\
    \ `is_forced_plan` 的值为 `1`。\n\n3.  下次编译此查询时，我们应该会看到编译时间显著减少。再次运行脚本 `bigjoin.sql`（请确保运行整个脚本，因为它会强制一次新的编译）。再次使用\"\
    消息\"选项卡，观察编译时间与总 CPU 时间。你的结果应类似于以下内容：\n\n    ```\n    SQL Server parse and compile\
    \ time:\n    CPU time = 38 ms, elapsed time = 38 ms.\n    (916540 rows affected)\n\
    \    SQL Server Execution Times:\n    CPU time = 2672 ms,  elapsed time = 7636\
    \ ms.\n    ```\n\n    从这些结果可以看出，编译查询的时间现在约占总 CPU 时间的 1%。\n\n4.  要查看查询存储视图中的新值，首先使用脚本\
    \ `flush_query_store.sql` 将数据刷新到查询存储中，以便我们可以看到最近的统计信息。该脚本使用了以下 T-SQL：\n\n    ```\n\
    \    USE WideWorldImporters;\n    GO\n    EXEC sys.sp_query_store_flush_db;\n\
    \    GO\n    ```\n\n5.  现在，通过再次执行脚本 `find_query_in_query_store.sql`，查看查询存储中的最新统计信息。`last_compile_ms`\
    \ 应与步骤 7 中最新的 \"SQL Server parse and compile time\" 的值相匹配。\n\n#### 使用优化计划强制的注意事项\n\
    \n我们在 SQL Server 2022 中默认为新数据库启用了此功能，因为使用它确实没有任何坏处。它确实要求启用查询存储。如果你正在强制查询计划，任何符合编译脚本条件的计划都将只是编译得更快。使用它没有实际开销。\n\
    \n话虽如此，你可以使用以下方法禁用优化计划强制：\n\n*   使用选项 `OPTIMIZED_PLAN_FORCING` 设置 `ALTER DATABASE\
    \ SCOPED CONFIGURATION` 语句为 OFF。（你也可以使用此选项将其重新打开。）\n*   当你使用系统存储过程 `sp_query_store_force_plan`\
    \ 强制查询计划时，可以通过使用 `@disable_optimized_plan_forcing` 选项来禁用优化计划强制。\n*   你可以使用名为 `DISABLE_OPTIMIZED_PLAN_FORCING`\
    \ 的查询提示。\n\n提示\n\n当你想要获取所有可能的查询提示（即 `USE HINT`）列表时，请执行系统过程 `sys.dm_exec_valid_use_hints`。\n\
    \n请通过我们的文档 [`https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store)\
    \ 关注有关优化计划强制的最新信息。\n\n### 具有 dbcompat 140+ 的下一代 IQP\n\n基于上一节，你可以看到，如果你升级到 SQL\
    \ Server 2022 且使用任何支持的 dbcompat 级别，你都有资格从这些功能中获得性能提升：\n\n*   近似百分位\n*   优化计划强制\n\
    \n例如，如果你从 SQL Server 2016 升级并保持 dbcompat 级别为 130，你将能够利用这些功能（前提是你符合每个功能的标准）。\n\n\
    但假设你从 SQL Server 2017 或 2019 升级，并且 dbcompat 设置为 140 或 150。你可以使用哪些额外功能来提高性能？首先，请记住，根据\
    \ dbcompat 140 或 150，2017 和 2019 中发布的任何 IQP 功能你都可以使用。\n\n注意\n\n近似不同值是在 SQL Server\
    \ 2019 中添加的，与 dbcompat 级别无关。你可以在 [`https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql)\
    \ 阅读更多信息。\n\n在 SQL Server 2022 中，如果你使用的是 dbcompat 140 或更高版本，那么你就可以利用 `内存授予反馈`\
    \ 的增强功能。\n\n在 *SQL Server 2019 Revealed* 的第 2 章中，我提供了关于内存授予反馈的详细背景和解释。让我在此总结一下我在该章中关于内存授予反馈的关键点。\n\
    \n查询计划中有某些运算符需要自己的内存分配，例如哈希联接和排序。当查询被编译时，SQL Server 将决定这些类型的运算符需要多少内存；这被称为*内存授予*。我喜欢我们的资深开发者之一\
    \ Jay Choe 关于内存授予的这篇详细博文：[`https://docs.microsoft.com/en-us/archive/blogs/sqlqueryprocessing/understanding-sql-server-memory-grant`](https://docs.microsoft.com/en-us/archive/blogs/sqlqueryprocessing/understanding-sql-server-memory-grant)。内存授予也称为*查询内存*。\n\
    \n多年来我在支持工作中经常遇到的一个问题是，内存授予与运算符实际所需的内存不准确。这个问题可能以两种形式出现：\n\n*   如果对于查询执行来说内存授予太小，则可能发生*溢出*。实际上，如果在查询执行期间，查询开始时预先分配的内存授予不足，引擎将不得不使用\
    \ tempdb 作为*分页文件*。即使 tempdb 的磁盘速度再快，也不如所有需要的内存都在 RAM 中快。因此，溢出会导致查询性能变慢。\n*   如果对于查询执行来说内存授予太大，其他查询可能会被迫等待，尤其是当多个查询需要特定大小的内存授予时。症状将是\
    \ wait_type = `RESOURCE_SEMAPHORE`。\n\n内存授予不准确可能由多种原因造成。最常见的原因之一是为像哈希联接或排序这样的运算符提供输入的基数估计不准确。可能仅仅是统计信息过时了。\n\
    \n像处理任何其他问题一样，我们的支持团队会与客户合作提供解决方法。有许多选项，例如查询提示或资源调控器设置。但没有真正解决根本问题。用户很难深入调查为什么内存授予不准确。\n\
    \n在 SQL Server 2017 中，如果你使用 dbcompat 140，我们为批处理模式操作（当时仅限列存储）创建了内存授予反馈模型。在 SQL\
    \ Server 2019 中，如果启用了 dbcompat 150，我们增强了反馈系统，以包含行模式操作（但在 SQL Server 2019 中也引入了批处理模式，无需列存储即可使用）。\n\
    \n注意\n请通读以下关于 SQL Server 中批处理和行模式操作的内容：[`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-batch-mode-on-rowstore/ba-p/386256`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-batch-mode-on-rowstore/ba-p/386256)。\n"
- fmt: "The concept of the feedback system was to evaluate how memory was actually\
    \ used compared with the initial memory grant at the start of execution. On the\
    \ next execution, if the memory used was significantly higher than the initial\
    \ grant, the memory grant would be increased. If memory used was lower, the grant\
    \ would be decreased.\n\nSQL Server effectively learns from previous executions\
    \ to make future executions more efficient. This innovation for me personally\
    \ was groundbreaking. All those support cases over the years where customers struggled\
    \ with spills or blocking problems could be solved automatically by the engine.\n\
    \nHowever, we discovered two areas of improvement from what we shipped in SQL\
    \ Server 2017 and 2019:\n\n*   **Volatility**\n    We baked into the initial design\
    \ the ability to disable memory grant feedback if we discovered we were constantly\
    \ having to adjust the memory grant for the same query over time. Parameter-Sensitive\
    \ Plans (PSPs) are a notable example of this type of scenario. You could see if\
    \ we needed to disable memory grant feedback by looking at the `IsMemoryGrantFeedbackAdjusted`\
    \ attribute in the query plan and discovering a value of `No: Feedback disabled`.\n\
    \n*   **Persistence**\n    The feedback system works for most workloads but unfortunately\
    \ is not persisted to disk. Therefore, if the server is restarted or the query\
    \ plan is evicted from cache, all feedback is lost.\n\n### Memory Grant Percentiles\n\
    \nTo improve the volatility problem with the initial design, memory grant feedback\
    \ in SQL Server 2022 uses a percentile-based approach instead of disabling memory\
    \ grant feedback. Rather than using the previous used memory from query execution,\
    \ we consider a history of previous memory used to adjust a memory grant that\
    \ is applicable across many query executions.\n\nThis approach favors avoiding\
    \ spills, so it is possible that more memory may be granted than is required.\
    \ If we use this approach for memory grants, you can observe this in the `IsMemoryGrantFeedbackAdjusted`\
    \ attribute in the query plan with a value of `Yes: Percentile Adjusting`.\n\n\
    This behavior is on by default for SQL Server 2022 if you are using dbcompat 140\
    \ or greater. If you want to disable this feature, set the database-scoped configuration\
    \ option `MEMORY_GRANT_FEEDBACK_PERCENTILE` to OFF.\n\n### Memory Grant Feedback\
    \ Persistence\n\nIf you are using dbcompat 140 or greater with SQL Server 2022\
    \ and Query Store is enabled for READ_WRITE, we will persist memory grant feedback\
    \ details to Query Store. This allows any memory grant feedback to survive server\
    \ restart or plan cache eviction.\n\nWhat better way to learn than through an\
    \ exercise? I’m all about efficiency, so I’ll reuse the example for memory grant\
    \ feedback I introduced in *SQL Server 2019 Revealed* in Chapter [2](#525217_1_En_2_Chapter.xhtml)\
    \ with a few additions.\n\nA quick comment about this example before you go through\
    \ it: I’m inducing the conditions where memory grant feedback is needed by forcing\
    \ a hash join on a query and simulating cardinality problems. But the innovation\
    \ here is real. This capability is solving real-world problems faced by applications\
    \ every day that are not worried about whether a hash join is used by the query\
    \ processor or don’t even know what a memory grant is. That is the intention of\
