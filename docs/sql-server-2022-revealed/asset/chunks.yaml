  trans: '

    ### 项目“重力”演变为 Polybase v3


    基于以上背景，SQL Server 2022 彻底改变了 Polybase 模型。SQL 引擎现在包含了利用外部数据源 `连接器` 的能力，以支持以下存储提供程序：


    *   Azure Blob 存储 (`abs`)

    *   Azure Data Lake Storage Gen2 (`adls`)

    *   S3 兼容的对象存储 (`s3`)


    注意


    Azure SQL 托管实例也支持 `abs` 和 `adls`。


    创建外部数据源时，这些连接器的名称会作为 `LOCATION` 语法的一部分使用。基于 ODBC 驱动程序的连接器使用诸如 `oracle`、`teradata`、`mongodb`、`sqlserver`
    和 `odbc` 之类的名称。


    基于 ODBC 驱动程序的连接器在 Polybase 服务上下文中运行。REST API 连接器则在 SQL Server 引擎内部运行。


    注意


    尽管 REST API 连接器在引擎内部运行，技术上不需要 Polybase 服务，但在 SQL Server 2022 中，您仍然必须启用 Polybase
    功能，该功能会安装这些服务。


    微软负责 Polybase 的高级项目经理 Hugo Queiroz 帮助我构建了以下示意图，以展示如图 7-1 所示的连接器架构。


    ![](img/525217_1_En_7_Fig1_HTML.png)


    SQL 引擎示意图。它通过 REST API 和 abs、adls 以及 s3 与 open row set、external table、polybase
    services、parquet、delta、c s v 和 text 相连。


    图 7-1


    SQL Server 2022 中的数据虚拟化


    在此图中，T-SQL 操作如 `OPENROWSET` 和 `CREATE EXTERNAL TABLE` 用于从连接器访问外部数据源。在此图的左侧，ODBC
    连接器通过引擎连接 Polybase 服务（这些是实际的 Windows 服务）来访问。在此图的右侧，SQL Server 引擎通过 REST API 与
    `abs`、`adls` 和 `s3` 连接器通信，以访问 `text`/`csv`（您提供格式）或 `parquet`/`delta`（格式内置于文件中）文件。我将在本章的下一节详细描述
    `parquet` 和 `delta` 等文件格式类型。


    您可能想知道使用 `abs` 和 `adls` 有什么区别。Azure Blob 存储 (`abs`) 是一个通用存储系统，而 Azure Data Lake
    存储 (`adls`) 则专为分析工作负载而构建。您可以在 [`https://docs.microsoft.com/azure/data-lake-store/data-lake-store-comparison-with-blob-storage`](https://docs.microsoft.com/azure/data-lake-store/data-lake-store-comparison-with-blob-storage)
    阅读详细比较。Azure Blob 存储和 Azure Data Lake 存储都被认为是像 `s3` 一样的对象存储系统。


    我已经提到了 T-SQL 语句 `OPENROWSET` 和 `CREATE EXTERNAL TABLE`。`CETAS` 代表 `CREATE EXTERNAL
    TABLE AS SELECT`。这个概念源自通过 Azure Synapse 的 Polybase，它允许您在 SQL Server 中将 `SELECT`
    语句的结果创建为外部表。`OPENROWSET` 和 `EXTERNAL TABLE` 是“读取”操作，而 `CETAS` 允许您将数据从 SQL Server
    “导出”到文件，并记录外部表的元数据。


    ### Polybase v3 文件格式


    您可能知道 `CSV`（逗号分隔）或 `text`（任何您想要的格式）文件格式是什么，但您可能不熟悉 `parquet` 或 `delta`。让我们回顾一下这些文件格式，并讨论为什么它们变得流行起来。


    #### Parquet


    `Parquet` 文件是一种由 Apache 项目于 2013 年启动的格式化文件。Apache 项目网站 [`https://parquet.apache.org`](https://parquet.apache.org)
    有一个简单的定义：“Apache Parquet 是一种开源的、面向列的数据文件格式，旨在实现高效的数据存储和检索。”面向列的特性使 `parquet` 成为分析工作负载的高效格式，就像
    SQL Server 中的列存储索引一样。`Parquet` 是一种二进制格式化文件，与 `CSV` 或 `text` 不同。它在文件内部包含有关列和数据类型的元数据。尽管
    `parquet` 使用二进制格式，但有关于细节的文档，因此开发人员知道如何读写该格式。您可以在 [`https://parquet.apache.org/docs/file-format/`](https://parquet.apache.org/docs/file-format/)
    阅读格式细节。


    `Parquet` 已成为从本地到云端分析最流行的文件格式之一。它的流行是我们选择在 SQL Server 2022 中原生支持 `parquet` 作为数据虚拟化格式的原因之一。SQL
    Server 2022 原生支持读取 `parquet` 文件并将 SQL 数据写入格式化的 `parquet` 文件。


    #### Delta


    `Parquet` 文件是作为整个文件单元进行读写的静态文件。一个由多家公司创建的名为 `Delta Lake` 的开源项目，旨在支持基于 `delta tables`
    的*数据湖仓*。`Delta tables` 实际上是一个 `parquet` 格式化文件的集合，并通过 JSON 文件提供*类事务日志*的功能。我在 Databricks
    上找到了一篇关于 `delta` “事务日志”内部原理的有趣文章，地址是 [`https://databricks.com/blog/2019/08/21/diving-into-delta-lake-unpacking-the-transaction-log.html`](https://databricks.com/blog/2019/08/21/diving-into-delta-lake-unpacking-the-transaction-log.html)。


    您可以在 [`https://delta.io`](https://delta.io) 阅读关于 `Delta Lake` 项目的所有资源。由于 `Delta
    Lake` 是一个完整的开源项目（GitHub 项目地址为 [`https://github.com/delta-io/delta`](https://github.com/delta-io/delta)），您可以阅读所有关于
    `delta tables` 如何格式化的细节，但大多数用户通过诸如 Spark 之类的接口来创建和使用 `delta tables`。例如，您可以在 [`https://docs.delta.io/latest/delta-batch.html#-ddlcreatetable`](https://docs.delta.io/latest/delta-batch.html#-ddlcreatetable)
    看到如何使用 T-SQL 与 Spark 来创建新的 `delta table`。


    SQL Server 2022 原生支持读取 `delta tables`，但您无法将 SQL Server 中的数据导出到 `delta tables`。您可以将
    SQL 数据导出到 `parquet` 文件。如果您需要这样做，Spark 提供了将 `parquet` 转换为 `delta` 的功能。


    使用 `parquet` 文件无法利用谓词下推或将“筛选器”推送到文件以仅获取所需数据的功能。`Delta tables` 确实提供了这种类型的功能，通过一个称为*分区列*的概念。您将在本章中看到如何在
    SQL Server 2022 中同时使用 `parquet` 和 `delta` 的示例。


    ### 使用新的 Polybase v3


    要使用 Polybase v3 或基于 REST API 的数据虚拟化，您将使用一系列 T-SQL 语句来创建对象，如图 7-2 所示。


    ![](img/525217_1_En_7_Fig2_HTML.png)


    SQL 引擎示意图。它有一个数据库的流程图，通过 abs、adls 和 s3 与 parquet、delta、c s v 和 text 相连。


    图 7-2


    在 SQL Server 2022 中使用 REST API 数据虚拟化


    让我们浏览此图，了解如何在 SQL Server 2022 中使用 REST API 数据虚拟化。您将在标题为“**试用 Polybase v3**”的章节中看到这些步骤的每个示例。


    #### 安装和配置 Polybase


    尽管在 SQL Server 2022 中 REST API 不使用 Polybase 服务，但您必须安装“外部数据的 Polybase 查询服务”功能（或添加该功能）。您还必须通过将
    `sp_configure` `''polybase enabled''` 选项设置为 `1` 来启用 Polybase。如果您计划使用 `CETAS`，还需要将
    `''allow polybase export''` 设置为 `1`。

    '
- fmt: '#### 设置凭据与数据源


    在用户数据库的上下文中，下一步是使用 `CREATE DATABASE SCOPED CREDENTIAL` 语句创建数据库范围凭据，以及使用 `CREATE
    EXTERNAL DATA SOURCE` 语句创建外部数据源（后者需要凭据）。您需要为您计划使用的每个连接器执行此操作。在创建数据库范围凭据之前，必须先使用
    `CREATE MASTER KEY` 语句创建一个主密钥，但无论您想在数据库中创建多少个凭据和数据源，此操作只需执行一次。这些对象作为元数据存储在用户数据库的系统表中。


    #### 使用 OPENROWSET( ) 直接查询文件


    创建了外部数据源后，您可以使用带有 `BULK` 选项的 `OPENROWSET()` T-SQL 函数直接查询文件。像 PARQUET 和 DELTA 这样的文件格式不需要任何列名或类型的选项；CSV
    和文本文件则需要这些选项。


    #### 创建外部表


    您也可以使用 `CREATE EXTERNAL TABLE` 语句创建一个外部表。外部表需要一个外部数据源，并且可以使用 `LOCATION` 直接映射到连接器的文件。您必须先使用
    `CREATE EXTERNAL FILE FORMAT` 语句创建一个文件格式，以供外部表使用。该文件格式可以是“已知”格式，如 `ParquetFileFormat`，也可以是
    CSV 文件，后者将要求您提供更多细节。外部表可以提供源文件的所有列名或其子集。外部表不存储任何数据，仅在系统表中存储元数据，这与文件格式相同。


    您还可以使用 `CREATE EXTERNAL TABLE AS SELECT` (CETAS) 语法创建一个外部表，并将用户表的结果存储在 `LOCATION`
    目标中。这是一种将数据“导出”到 REST API 连接器的方法。您甚至可以将 CETAS 与查询 `OPENROWSET()` 的源一起使用。


    一旦创建了外部表，您就可以像查询任何其他 SQL 表一样查询它（甚至可以为其分配权限）。您可以与其他用户表或其他外部表进行联接，并执行 `OPENROWSET()`
    查询。您可以使用标准的 T-SQL，如 `INSERT..SELECT` 或 `SELECT INTO`，从外部表获取数据并填充用户表（即数据摄入）。


    ### 尝试 Polybase v3


    让我们通过一些示例来看看使用 S3 对象提供程序进行基于 REST API 的数据虚拟化。


    > 注意

    >

    > 如果您不想安装此练习所需的非 Microsoft 软件，可以在 SQL notebook 文件 `queryparquet.ipynb` 和 `querydelta.ipynb`
    中查看练习的结果，这些文件可以在示例文件和脚本的 `ch07_datavirt_objectstorage\datavirt\parquet` 与 `ch07_datavirt_objectstorage\datavirt\delta`
    文件夹中找到。您需要安装 Azure Data Studio 才能使用这些 notebook，或者您可以在 GitHub 仓库中用浏览器查看这些 notebook。


    #### 先决条件


    要进行此练习，您需要满足以下先决条件：


    *   安装了数据库引擎和 Polybase Query Service for External Data 功能的 SQL Server 2022 评估版。


    > 注意

    >

    > 对于 Linux，请在 [`https://docs.microsoft.com/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/sql/relational-databases/polybase/polybase-linux-setup)
    安装 Polybase 包。


    *   具有至少两个 CPU 和 8GB RAM 的虚拟机或计算机。

    *   SQL Server Management Studio (SSMS)。最新的 18.x 或 19.x 版本均可。

    *   最新版本的 Azure Data Studio (ADS)。**这是可选的**。我已包含了一个带有此练习结果的 SQL notebook，因此如果您不想安装非
    MSFT 软件，可以使用 ADS 查看结果。


    > 注意

    >

    > 以下先决条件适用于非 Microsoft 软件。使用此软件不代表 Microsoft 的任何官方认可。此软件不受 Microsoft 支持，因此使用此软件出现的任何问题都由用户自行解决。


    *   适用于 Windows 的 `minio` 服务器，您可以从 [`https://min.io/download#/windows`](https://min.io/download#/windows)
