    这是我在 `Apress` 出版的第四本书，我要亲自感谢 `Apress` 的 Jonathan Gennick。当许多出版公司拒绝我时，Jonathan
    给了我首次著书的机会。谢谢你，Jonathan，感谢你一直以来的支持，让我可以“按自己的方式写作”。我还要感谢 `Apress` 的 Jill Balzano，我从未与她本人谋面，但尽管我们总是面对疯狂的截止日期，她始终如此友善和专业。


    我邀请 Erin Stellato 担任我的技术审校，因为她是 `SQL` 领域最资深的专家之一，也是一位了不起的人。事实证明，她在本书写作期间加入 `Microsoft`
    是一种福气，因为我们可以讨论机密信息。Erin，感谢你的细致入微和出色态度，我们所有人都在最后阶段给你施加了巨大压力来审阅如此多的章节。


    `Microsoft` 有许多人支持我完成本书的工作。但首先，我要感谢 Joe Sack、Pedro Lopes 和 James Rowland-Jones，他们虽然已不在
    `Microsoft` 工作，但在帮助我构建本书中呈现的 `SQL Server 2022` 故事方面发挥了巨大作用。


    在 `Microsoft`，我要感谢支持我所有努力的领导们，包括 Rohan Kumar、Peter Carlin、Asad Khan 和 Sanjay Mishra。本书真正的英雄是
    `Microsoft` 工程团队中的所有人，他们不厌其烦地回答我所有问题，审阅复杂主题，并为我提供了一些精彩的引述。这份名单很长，但我必须感谢每一位提供帮助的人，因为他们每个人都以自己的方式让整本书和产品变得有价值。感谢：Ajay
    Jagannathan, David Pless, Kevin Farlee, Derek Wilson, Kate Smith, Kendal Van Dyke,
    Sasha Nosov, Travis Wright, Hanuma Kodavalla, Naveen Prakash, Joachim Hammer,
    Chuck Heinzelman, Mine Tokus, Hugo Queiroz, Tim Chen, Dani Ljepava, Mladen Andzic,
    Andreas Wolter, Srdan Bozovic, Vlad Rodriguez, Mirek Sztajno, Dylan Gray, Devin
    Rider, Robert Dorr, Peter Byrne, Jack Li, Mike Ray, Van To, Lee Woods, Sarah Kaufman,
    Conor Cunningham, Tejas Shah, Amit Khandelwal, Pam Lahoud, Purvi Shah, Aditya
    Badramraju, Taryn Pratt, Lani O''Brien, Nancy McGrory, Ebru Ersan, Umachandar
    Jayachandran (UC), Nicholas Simmons, Sharanya Bhat, Dilan Galindo Reyna, Ryan
    Stonecipher, Ravinder Vuppula, Thierry Fevrier, Aashna Bafna, Panagiotis Antonopoulos,
    Pieter Vanhove, Ankit Mahajan, Swaroop Moida, Fang Hou, Balmukund Lakhani, Parag
    Paul, Jakub Szymaszek, Yuqing Li, Perry Skountrianos, Pratim Dasgupta, Milos Vucic,
    Nikolas Ogg, David Liao, Chandrashekhar Kadiam, and Brian Carrig.


    我还要感谢工程团队中一些不知疲倦地帮助我筹办研讨会和活动的同事。谢谢你们，Marisa Mathews 和 Rie Merritt。你们在幕后辛勤工作，无人知晓你们付出的努力。特别感谢我的同事
    Buck Woody。你是一位亲爱的朋友，也是我认识的最有才华的人之一。你总是让出差旅行成为一次有趣的冒险。


    同样感谢 `Microsoft Mechanics` 团队帮助我们展示 `SQL` 的卓越技术。谢谢你们，Jeremy Chapman 和 Celine Allee。参加你们的节目总是一种特权和有趣的体验。


    我还要感谢我们市场团队的成员，他们在 `SQL Server 2022` 的发布期间是出色的合作伙伴，包括 Matthew Burrows, Miwa Monji,
    Eric Hudson, Sonya Waitman, Guy Schoonmaker（感谢你的幻灯片制作技巧），以及 Emilija Dufresne。


    感谢大家，即使是那些最小的邮件回复，也帮助了本书的完成。


    关于作者与技术审校  关于作者  关于技术审校


    # 1. 项目 Dallas 演变为 SQL Server 2022


    `SQL Server 2022` 在 `SQL Server 2019` 发布之前就已在酝酿之中。在本书的这一章中，我将带你了解 `SQL Server
    2022` 的历史，它始于一个项目，并最终成为 `SQL Server` 历史上最成功的版本之一。


    我还将介绍为什么你会希望考虑使用 `SQL Server 2022` 作为数据平台，因为它连接云端、具备智能且经过行业验证。


    我的目标是，你读完本章后会感到兴奋，并渴望深入研读后续章节，以了解所有你需要知道的关于 `SQL Server 2022` 的细节。

