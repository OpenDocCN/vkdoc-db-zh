- fmt: "# Deploying SQL Server 2022 on Linux\n\nDeploying SQL Server 2022 on Linux\
    \ is the same as it has been with SQL Server 2017 and 2019. You choose your supported\
    \ Linux distribution and use the `package managers` that come with the Linux distribution\
    \ to install SQL Server. This is because we post Linux packages for you to use\
    \ with RHEL, Ubuntu, and SLES. We provide instructions on how to download a `repo\
    \ file`, which contains the source on the Web where our packages can be found.\n\
    \n**Tip**\n\nDid you know you can browse all of our packages at `https://packages.microsoft.com`?\n\
    \nFor example, on RHEL, there are two simple commands to install the core SQL\
    \ Server engine package:\n\n```bash\nsudo curl -o /etc/yum.repos.d/mssql-server.repo\
    \ https://packages.microsoft.com/config/rhel/8/mssql-server-preview.repo\nsudo\
    \ yum install -y mssql-server\n```\n\n**Note**\n\nThe package name will change\
    \ from `mssql-server-preview.repo` to a different name like `mssql-server-2022.repo`\
    \ when SQL Server becomes generally available. You can stay up to date at `https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat`.\n\
    \nIt is a very simple install process, and the core engine package has just about\
    \ everything you need for the fundamentals all built into these steps.\n\nThere\
    \ are a few unique aspects to SQL Server on Linux deployment:\n\n*   In order\
    \ to complete the setup, you must run the following command no matter what distribution\
    \ you are using:\n\n    ```bash\n    sudo /opt/mssql/bin/mssql-conf setup\n  \
    \  ```\n\n    `mssql-conf` is a script that can perform configuration operations\
    \ outside of the SQL instance. The setup option is used to establish the admin\
    \ password, choose an edition, and other options to complete the setup process.\n\
    \n*   Unlike SQL Server on Windows, other features may require you to install\
    \ additional packages such as tools, full-text search, SSIS, Java extension and\
    \ ML services, Polybase, and HA (for availability groups). You can get a list\
    \ of all of these packages on the following site under the Package details section:\
    \ `https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes-2022#supported-platforms`.\n\
    \n*   One interesting aspect of Linux is that each cumulative update (CU) and\
    \ General Distribution Release (GDR) is a separate package so you could install\
    \ a CU directly without installing RTM and then have to apply a CU package (which\
    \ is required for Windows).\n\n## What Else Should I Know?\n\n*   SQL Server on\
    \ Linux is installed as a service on Linux. Therefore, you can see the status\
    \ of SQL Server (running, stopped, etc.) at any time with the following command:\n\
    \n    ```bash\n    systemctl status mssql-server\n    ```\n\n*   The default directory\
    \ for data, log, log files, and backups is based on `/var/opt/mssql`. This directory\
    \ must always exist, but you can change the default location for your files such\
    \ as databases and backups.\n\n*   SQL Server on Linux allows you to perform uninstalls,\
    \ upgrades, offline installs, and automatic installs (using environment variables).\n\
    \n*   Licensing for SQL Server on Linux is the same as on Windows. You can use\
    \ your existing SQL Server licenses on either operating system.\n\n## Ansible\
    \ with RHEL\n\nOne of the nice capabilities unique to Red Hat Enterprise Linux\
    \ is `Ansible`. Ansible provides a great platform for `automation`. Therefore,\
    \ it can be a solution to automate the installation of many computers or virtual\
    \ machines for SQL Server on Linux through a concept called a `playbook`.\n\n\
    We have worked with Red Hat to include a special role for using playbooks with\
    \ SQL Server on Linux.\n\nYou can learn more about how to do this with the following\
    \ resources:\n\n*   `https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html/administration_and_configuration_tasks_using_system_roles_in_rhel/assembly_configuring-microsoft-sql-server-using-microsoft-sql-server-ansible-role_assembly_updating-packages-to-enable-automation-for-the-rhel-system-roles`\n\
    \n*   `https://docs.microsoft.com/sql/linux/sql-server-linux-deploy-ansible`\n\
    \n# How to Connect and Use SQL Server 2022 on Linux\n\nOnce you have deployed\
    \ SQL Server on Linux, you are going to want to connect and start using the instance\
    \ with T-SQL statements. I’ve included some brief tips in this section of the\
    \ chapter. If you are looking for exercises for SQL Server on Linux, you can easily\
    \ use the scripts from *Pro SQL Server on Linux* (you will need to retrofit package\
    \ names for SQL Server 2022) from `https://github.com/microsoft/bobsql/tree/master/sqllinuxbook`.\n\
    \n## ssh vs. rdp\n\nFor those in the Windows world used to using Remote Desktop\
    \ (`rdp`), Linux has a standard remote shell called secure shell (`ssh`), which\
    \ is a command line interface into a bash shell on the computer or VM. There are\
    \ many ways to use `ssh` to connect to your Linux computer or VM. Here are some\
    \ ways I use `ssh`:\n\n*   `ssh` just comes with PowerShell, so you can use it\
    \ right from a PowerShell command prompt.\n\n*   If you have deployed in Azure,\
    \ the Azure Cloud Shell comes with a bash shell interface, and `ssh` is included.\n\
    \n*   I personally love using the free tool MobaXterm, which you can download\
    \ from `https://mobaxterm.mobatek.net`. One thing that is nice about this tool\
    \ is that there is a graphical interface to upload and download files from your\
    \ local computer into Linux.\n\n## Connecting with Our Tools\n\nSince SQL Server\
    \ on Linux is a compatible SQL Server engine, you can use your favorite tool that\
    \ normally connects to SQL Server on Windows such as SSMS.\n\nAzure Data Studio\
    \ (ADS) has become very popular and works well with Linux. One of the nice advantages\
    \ of ADS is that it works cross-platform, so it can run on Windows, Linux, or\
    \ macOS. ADS also comes with the concept of notebooks, which you have seen already\
    \ in some exercises in this book.\n\nThe command line tool `sqlcmd` works well\
    \ with SQL Server on Linux. There is a Linux version of the tool, which comes\
    \ as a separate package to install depending on your Linux distribution.\n\nWe\
    \ also have a cross-platform alternative command line tool called `mssql-cli`,\
    \ which you can read more about at `https://docs.microsoft.com/sql/tools/mssql-cli`.\n\
    \n## Configuring with mssql-conf\n\nFor SQL Server on Windows, you may be used\
    \ to using the SQL Server Configuration Manager tool. For SQL Server on Linux,\
    \ the equivalent tool is called `mssql-conf`. `mssql-conf` can be used to configure\
    \ a variety of settings like enabling SQL Server Agent or setting trace flags.\
    \ You can read more about all the options supported by `mssql-conf` at `https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf`.\n\
    \n**Note**\n\nConfiguration inside SQL Server is still supported by using `ALTER\
    \ SERVER CONFIGURATION` or `sp_configure`."
  raw: '### Deploying SQL Server 2022 on Linux


    Deploying SQL Server 2022 on Linux is the same as it has been with SQL Server
    2017 and 2019\. You choose your supported Linux distribution and use the *package
    managers* that come with the Linux distribution to install SQL Server. This is
    because we post Linux packages for you to use with RHEL, Ubuntu, and SLES. We
    provide instructions on how to download a *repo file*, which contains the source
    on the Web where our packages can be found.


    Tip


    Did you know you can browse all of our packages at [`https://packages.microsoft.com`](https://packages.microsoft.com)?


    For example, on RHEL, there are two simple commands to install the core SQL Server
    engine package:


    ```

    sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/8/mssql-server-preview.repo

    sudo yum install -y mssql-server

    ```


    Note


    The package name will change from mssql-server-preview.repo to a different name
    like mssql-server-2022.repo when SQL Server becomes generally available. You can
    stay up to date at [`https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat`](https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat).


    It is a very simple install process, and the core engine package has just about
    everything you need for the fundamentals all built into these steps.


    There are a few unique aspects to SQL Server on Linux deployment:


    *   In order to complete the setup, you must run the following command no matter
    what distribution you are using:


    ```

    sudo /opt/mssql/bin/mssql-conf setup

    ```


    **mssql-conf** is a script that can perform configuration operations outside of
    the SQL instance. The setup option is used to establish the admin password, choose
    an edition, and other options to complete the setup process.


    *   Unlike SQL Server on Windows, other features may require you to install additional
    packages such as tools, full-text search, SSIS, Java extension and ML services,
    Polybase, and HA (for availability groups). You can get a list of all of these
    packages on the following site under the Package details section: [`https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes-2022#supported-platforms`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes-2022#supported-platforms).


    *   One interesting aspect of Linux is that each cumulative update (CU) and General
    Distribution Release (GDR) is a separate package so you could install a CU directly
    without installing RTM and then have to apply a CU package (which is required
    for Windows).


    #### What Else Should I Know?


    *   SQL Server on Linux is installed as a service on Linux. Therefore, you can
    see the status of SQL Server (running, stopped, etc.) at any time with the following
    command:


    *   The default directory for data, log, log files, and backups is based on /var/opt/mssql.
    This directory must always exist, but you can change the default location for
    your files such as databases and backups.


    *   SQL Server on Linux allows you to perform uninstalls, upgrades, offline installs,
    and automatic installs (using environment variables).


    *   Licensing for SQL Server on Linux is the same as on Windows. You can use your
    existing SQL Server licenses on either operating system.


    ```

    systemctl status mssql-server

    ```


    #### Ansible with RHEL


    One of the nice capabilities unique to Red Hat Enterprise Linux is **Ansible**.
    Ansible provides a great platform for *automation*. Therefore, it can be a solution
    to automate the installation of many computers or virtual machines for SQL Server
    on Linux through a concept called a *playbook*.


    We have worked with Red Hat to include a special role for using playbooks with
    SQL Server on Linux.


    You can learn more about how to do this with the following resources:


    *   [`https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html/administration_and_configuration_tasks_using_system_roles_in_rhel/assembly_configuring-microsoft-sql-server-using-microsoft-sql-server-ansible-role_assembly_updating-packages-to-enable-automation-for-the-rhel-system-roles`](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html/administration_and_configuration_tasks_using_system_roles_in_rhel/assembly_configuring-microsoft-sql-server-using-microsoft-sql-server-ansible-role_assembly_updating-packages-to-enable-automation-for-the-rhel-system-roles)


    *   [`https://docs.microsoft.com/sql/linux/sql-server-linux-deploy-ansible`](https://docs.microsoft.com/sql/linux/sql-server-linux-deploy-ansible)


    ### How to Connect and Use SQL Server 2022 on Linux


    Once you have deployed SQL Server on Linux, you are going to want to connect and
    start using the instance with T-SQL statements. I’ve included some brief tips
    in this section of the chapter. If you are looking for exercises for SQL Server
    on Linux, you can easily use the scripts from *Pro SQL Server on Linux* (you will
    need to retrofit package names for SQL Server 2022) from [`https://github.com/microsoft/bobsql/tree/master/sqllinuxbook`](https://github.com/microsoft/bobsql/tree/master/sqllinuxbook).


    #### ssh vs. rdp


    For those in the Windows world used to using Remote Desktop (rdp), Linux has a
    standard remote shell called secure shell (ssh), which is a command line interface
    into a bash shell on the computer or VM. There are many ways to use ssh to connect
    to your Linux computer or VM. Here are some ways I use ssh:


    *   ssh just comes with PowerShell, so you can use it right from a PowerShell
    command prompt.


    *   If you have deployed in Azure, the Azure Cloud Shell comes with a bash shell
    interface, and ssh is included.


    *   I personally love using the free tool MobaXterm, which you can download from
    [`https://mobaxterm.mobatek.net`](https://mobaxterm.mobatek.net). One thing that
    is nice about this tool is that there is a graphical interface to upload and download
    files from your local computer into Linux.


    #### Connecting with Our Tools


    Since SQL Server on Linux is a compatible SQL Server engine, you can use your
    favorite tool that normally connects to SQL Server on Windows such as SSMS.


    Azure Data Studio (ADS) has become very popular and works well with Linux. One
    of the nice advantages of ADS is that it works cross-platform, so it can run on
    Windows, Linux, or macOS. ADS also comes with the concept of notebooks, which
    you have seen already in some exercises in this book.


    The command line tool sqlcmd works well with SQL Server on Linux. There is a Linux
    version of the tool, which comes as a separate package to install depending on
    your Linux distribution.


    We also have a cross-platform alternative command line tool called mssql-cli,
    which you can read more about at [`https://docs.microsoft.com/sql/tools/mssql-cli`](https://docs.microsoft.com/sql/tools/mssql-cli).


    #### Configuring with mssql-conf


    For SQL Server on Windows, you may be used to using the SQL Server Configuration
    Manager tool. For SQL Server on Linux, the equivalent tool is called mssql-conf.
    mssql-conf can be used to configure a variety of settings like enabling SQL Server
    Agent or setting trace flags. You can read more about all the options supported
    by mssql-conf at [`https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf`](https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf).


    Note


    Configuration inside SQL Server is still supported by using ALTER SERVER CONFIGURATION
    or sp_configure.'
  trans: "\n# 在 Linux 上部署 SQL Server 2022\n\n在 Linux 上部署 SQL Server 2022 的过程与 SQL\
    \ Server 2017 和 2019 相同。您选择一个受支持的 Linux 发行版，然后使用该 Linux 发行版自带的`包管理器`来安装 SQL Server。这是因为我们发布了适用于\
    \ RHEL、Ubuntu 和 SLES 的 Linux 软件包。我们提供了如何下载`仓库文件`的说明，该文件包含了可在哪里找到我们软件包的网络源。\n\n\
    **提示**\n\n您知道可以在 `https://packages.microsoft.com` 浏览我们所有的软件包吗？\n\n例如，在 RHEL 上，有两个简单的命令来安装核心\
    \ SQL Server 引擎软件包：\n\n```bash\nsudo curl -o /etc/yum.repos.d/mssql-server.repo\
    \ https://packages.microsoft.com/config/rhel/8/mssql-server-preview.repo\nsudo\
    \ yum install -y mssql-server\n```\n\n**注意**\n\n当 SQL Server 正式发布后，软件包名称将从 `mssql-server-preview.repo`\
    \ 更改为其他名称，如 `mssql-server-2022.repo`。您可以在 `https://docs.microsoft.com/sql/linux/quickstart-install-connect-red-hat`\
    \ 保持信息更新。\n\n这是一个非常简单的安装过程，核心引擎软件包几乎包含了基础功能所需的一切，所有内容都内置在这些步骤中。\n\n在 Linux 上部署\
    \ SQL Server 有一些独特之处：\n\n*   无论使用何种发行版，您都必须运行以下命令来完成设置：\n\n    ```bash\n    sudo\
    \ /opt/mssql/bin/mssql-conf setup\n    ```\n\n    `mssql-conf` 是一个可以在 SQL 实例外部执行配置操作的脚本。`setup`（设置）选项用于建立管理员密码、选择版本以及其他选项以完成设置过程。\n\
    \n*   与 Windows 上的 SQL Server 不同，其他功能可能需要您安装额外的软件包，例如工具、全文搜索、SSIS、Java 扩展和 ML\
    \ 服务、Polybase 以及 HA（用于可用性组）。您可以在以下网站的“软件包详细信息”部分获取所有这些软件包的列表：`https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes-2022#supported-platforms`。\n\
    \n*   Linux 的一个有趣之处在于，每个累积更新（CU）和常规分发版本（GDR）都是独立的软件包，因此您可以直接安装 CU，而无需先安装 RTM，然后再应用\
    \ CU 软件包（这是 Windows 所必需的）。\n\n## 我还应该了解什么？\n\n*   Linux 上的 SQL Server 在 Linux\
    \ 上作为服务安装。因此，您可以随时使用以下命令查看 SQL Server 的状态（运行中、已停止等）：\n\n    ```bash\n    systemctl\
    \ status mssql-server\n    ```\n\n*   数据、日志、日志文件和备份的默认目录基于 `/var/opt/mssql`。此目录必须始终存在，但您可以更改文件（如数据库和备份）的默认位置。\n\
    \n*   Linux 上的 SQL Server 允许您执行卸载、升级、离线安装和自动安装（使用环境变量）。\n\n*   Linux 上的 SQL Server\
    \ 许可与 Windows 上相同。您可以在任一操作系统上使用现有的 SQL Server 许可证。\n\n## 与 RHEL 配合使用 Ansible\n\
    \nRed Hat Enterprise Linux (RHEL) 独有的一个强大功能是 `Ansible`。Ansible 为`自动化`提供了一个出色的平台。因此，通过称为\
    \ `playbook` 的概念，它可以成为自动化为多台计算机或虚拟机安装 Linux 上 SQL Server 的解决方案。\n\n我们与 Red Hat\
    \ 合作，为在 Linux 上使用 SQL Server 的 playbook 包含了一个特殊的角色。\n\n您可以通过以下资源了解更多关于如何实现这一点的信息：\n\
    \n*   `https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html/administration_and_configuration_tasks_using_system_roles_in_rhel/assembly_configuring-microsoft-sql-server-using-microsoft-sql-server-ansible-role_assembly_updating-packages-to-enable-automation-for-the-rhel-system-roles`\n\
    \n*   `https://docs.microsoft.com/sql/linux/sql-server-linux-deploy-ansible`\n\
    \n# 如何连接和使用 Linux 上的 SQL Server 2022\n\n一旦您在 Linux 上部署了 SQL Server，您就会想要连接该实例并开始使用\
    \ T-SQL 语句。我在本章的这一部分包含了一些简要提示。如果您正在寻找 Linux 上 SQL Server 的练习，您可以轻松使用来自 *Pro SQL\
    \ Server on Linux* 一书的脚本（您需要为 SQL Server 2022 调整软件包名称），网址是 `https://github.com/microsoft/bobsql/tree/master/sqllinuxbook`。\n\
    \n## ssh 与 rdp\n\n对于习惯使用远程桌面（`rdp`）的 Windows 用户，Linux 有一个标准的远程 shell，称为安全外壳（`ssh`），它是一个命令行界面，用于连接到计算机或虚拟机上的\
    \ bash shell。有多种方法可以使用 `ssh` 连接到您的 Linux 计算机或虚拟机。以下是我使用 `ssh` 的一些方式：\n\n*   `ssh`\
    \ 内置于 PowerShell 中，因此您可以直接从 PowerShell 命令提示符使用它。\n\n*   如果您在 Azure 中进行了部署，Azure\
    \ Cloud Shell 附带一个 bash shell 界面，并且包含了 `ssh`。\n\n*   我个人喜欢使用免费的 MobaXterm 工具，您可以从\
    \ `https://mobaxterm.mobatek.net` 下载。这个工具的一个优点是它有一个图形界面，可以方便地从本地计算机上传和下载文件到 Linux。\n\
    \n## 使用我们的工具连接\n\n由于 Linux 上的 SQL Server 是一个兼容的 SQL Server 引擎，您可以使用通常连接到 Windows\
    \ 上 SQL Server 的喜爱工具，例如 SSMS。\n\nAzure Data Studio (ADS) 已经变得非常流行，并且与 Linux 配合良好。ADS\
    \ 的一个优势是它是跨平台的，因此可以在 Windows、Linux 或 macOS 上运行。ADS 还附带了笔记本的概念，您已经在本书的一些练习中见过。\n\
    \n命令行工具 `sqlcmd` 与 Linux 上的 SQL Server 配合良好。该工具有一个 Linux 版本，根据您的 Linux 发行版，它作为单独的软件包需要安装。\n\
    \n我们还有一个跨平台的替代命令行工具叫做 `mssql-cli`，您可以在 `https://docs.microsoft.com/sql/tools/mssql-cli`\
    \ 阅读更多信息。\n\n## 使用 mssql-conf 进行配置\n\n对于 Windows 上的 SQL Server，您可能习惯于使用 SQL Server\
    \ 配置管理器工具。对于 Linux 上的 SQL Server，等效的工具叫做 `mssql-conf`。`mssql-conf` 可用于配置各种设置，例如启用\
    \ SQL Server Agent 或设置跟踪标志。您可以在 `https://docs.microsoft.com/sql/linux/sql-server-linux-configure-mssql-conf`\
    \ 阅读有关 `mssql-conf` 支持的所有选项的更多信息。\n\n**注意**\n\nSQL Server 内部的配置仍然可以通过使用 `ALTER\
    \ SERVER CONFIGURATION` 或 `sp_configure` 来支持。\n"
- fmt: '## Active Directory Authentication with adutil


    SQL Server on Linux supports both SQL and Active Directory (AD) authentication
    for logins. When we first shipped SQL Server on Linux for SQL Server 2017 and
    even 2019, setting up AD authentication was fairly complex. We now have a tool
    called `adutil` that can simplify this process. The `adutil` tool works for SQL
    Server 2019 and 2022 and is also supported for containers. You can read more about
    how to use `adutil` at `https://docs.microsoft.com/sql/linux/sql-server-linux-ad-auth-adutil-introduction`.


    ## Azure Extension for SQL Server


    The Azure extension for SQL Server is not currently included in the setup process
    for SQL Server on Linux. But you can use a method that has already existed to
    support SQL Server on Azure Arc–enabled servers for Linux as documented at `https://docs.microsoft.com/sql/sql-server/azure-arc/connect`.


    As I described in Chapter 3 of the book, the Azure extension for SQL Server is
    a Windows service that is part of the Azure Arc Agent framework, which also runs
    as a Windows service. On Linux, these programs run as daemon programs called `himds`
    (Arc agent) and `SqlServerExtension.Service` (SQL extension).


    ## Optimizing SQL Server 2022 on Linux


    Besides the typical SQL Server optimization techniques you use such as proper
    indexes, there are some optimizations to consider for running SQL Server on Linux:


    Since we have shipped SQL Server 2017 with Linux, we have learned across customer
    experiences and benchmarks how to tune the Linux kernel and SQL Server in very
    specific ways to achieve optimal performance. There is a very detailed list of
    these recommendations at `https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices`.
    If you are just trying out SQL Server on Linux, you may not need to consider any
    or all of these. However, for the optimal production experience, I highly recommend
    you read through all of these.


    There are some settings outside SQL Server on Windows like Instant File Initialization
    (IFI) and Lock Pages in Memory. These settings do not apply to SQL Server on Linux.


    You may notice these two messages appear right after you install SQL Server on
    Linux:


    ```

    ForceFlush is enabled for this instance

    ForceFlush feature is enabled for log durability

    ```


    My longtime colleague Robert Dorr spent a considerable amount of time researching
    SQL Server I/O consistency and performance on Linux. This work led to a series
    of configuration options we recommend, which you can read at `https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices#linux-os-configuration`
    under the section titled “SQL Server and Forced Unit Access (FUA) I/O subsystem
    capability.” And if you love reading the inside story, check out Bob’s blog post
    at `https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-linux-forced-unit-access-fua-internals/ba-p/3199102`.


    Avoid the OOM killer.


    Sounds like a horror movie, right? Well, if you encounter an out-of-memory (OOM)
    situation that kills your program, it can be horrific. SQL Server does a great
    job of dynamic memory management, but if it consumes too much memory within Linux,
    it could be subject to this problem. This is why we created a configuration option
    called `memorylimitmb`. By default we actually limit the overall memory SQL Server
    can use on Linux, so this may not be an issue for you. But I encourage you to
    read more details at `https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices#sql-server-configuration`
    under the section titled **Set a memory limit with mssql-conf** to ensure your
    instance will be stable.


    ## HADR for SQL Server 2022 on Linux


    SQL Server comes with powerful high-availability and disaster recovery (HADR)
    features including failover clustering, Always On Availability Groups (AGs), and
    a rich set of BACKUP/RESTORE options.


    Let’s look at how each of these can be used with SQL Server on Linux.


    ### Failover Clustering


    On SQL Server on Windows, SQL Server is integrated with Windows Server Failover
    Cluster (WSFC) to support a shared storage automatic high-availability feature.
    Since WSFC is not available on Linux, you can use a software package called `Pacemaker`
    to support a SQL Server failover cluster. You can read more about how to set this
    up at `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure`.


    ### Always On Availability Groups (AGs)


    The core AG software is all built into the SQL Server engine. This is why for
    SQL Server on Linux (or Windows), you can set up a *clusterless* availability
    group (if you remember I showed you how to do this in Chapter 6 of the book for
    a Contained Availability Group). This option doesn’t provide automatic failover,
    but it does provide a replica scheme. We also call this a read-scale availability
    group because it can be a perfect solution to separate your read-only workloads.
    You can read more about setting up a read-scale availability group at `https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-configure-rs`.


    We also support a fully automatic failover solution with AGs using Pacemaker supported
    on RHEL, Ubuntu, and SLES. You can read more about how to set this up for RHEL
    at `https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel`.
    You can also set up this configuration with Azure Virtual Machines, which you
    can read about at `https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/rhel-high-availability-stonith-tutorial`.


    ### HPE Serviceguard


    Turns out one of the things we did is take our code to support how SQL Server
    controls failover for an Always On Availability Group and put it into an open
    source project, which you can find at `https://github.com/Microsoft/mssql-server-ha`.
    By doing this we allowed other partners to integrate their failover solution with
    SQL Server. And one of those solutions is from HPE called Serviceguard. You can
    read more about how to use HPE Serviceguard with SQL Server at `https://docs.microsoft.com/sql/linux/sql-server-availability-group-ha-hpe`.


    ### BACKUP/RESTORE


    All the BACKUP/RESTORE features for SQL Server are available on SQL Server on
    Linux including backup to Azure storage with the URL syntax and the new S3 object
    storage backup capabilities with SQL Server 2022.


    You also read in Chapter 6 of the book that snapshot backups are supported using
    T-SQL and don’t require you to write a VDI program or rely on Windows VSS. In
    fact, we also call this feature *cross-platform snapshot backups* because we wanted
    to support snapshot backups on Linux.'
