    \ menu (or left-hand menu) and has many options to view and configure the virtual\
    \ machine. There are so many options it would take another chapter to cover them.\
    \ Here are few though I regularly use:\n    *   **Size** – This is where you would\
    \ view more details about the virtual machine size or change the size. Read more\
    \ about resizing a virtual machine at [`https://docs.microsoft.com/azure/virtual-machines/resize-vm`](https://docs.microsoft.com/azure/virtual-machines/resize-vm).\n\
    \n*   **Networking** – I may need to go to this option to configure the Network\
    \ Security Group (NSG), which is like firewall rules.\n\n*   **SQL Server configuration**\
    \ – Here I can go to a SQL Server view of the virtual machine. I’ll talk more\
    \ about this in the section titled “**Exploring a SQL Virtual Machine in the Portal**.”\n\
    \n*   **Microsoft Defender for Cloud** – If you enabled this, see Defender recommendations\
    \ or alerts for security.\n\n*   **Bastion** – This option gives you a secure\
    \ way to have a Remote Desktop experience using a browser.\n\n*   **Run command**\
    \ – An interesting way to run programs inside the virtual machine without connecting\
    \ to the virtual machine.\n\n*   **Metrics** – Get key performance counters without\
    \ having to connect inside the virtual machine. Some of the performance information\
    \ such as the virtual machine from a host perspective is only available here.\n\
    \n*   **Export template** – You can build an ARM template based on the current\
    \ deployment. I sometimes deploy through the portal and then use this option to\
    \ build a template for other virtual machines to deploy.\n\n*   **Boot diagnostics**\
    \ – This is a cool feature to see the “console” screen of the virtual machine\
    \ to make sure it is not in a hung state.\n\n*   **Reset password** – Forgot your\
    \ admin password? You can reset it here. And if you are concerned with security,\
    \ only accounts that have permissions to the virtual machine in Azure can do this.\n\
    \n*   **Redeploy + reapply** – I’ve had a few situations come up where using this\
    \ option allowed my virtual machine to be restarted successfully when it appeared\
    \ to be in a hung state. You may never need this, but it’s nice to know it exists.\n\
    \n*   **Serial console** – This is like having the monitor of the computer available\
    \ to you, and it really pays off when there seems to be an issue starting the\
    \ virtual machine. Again you may never need this, but it’s nice to know it exists.\n\
    \n2.  At the top of the screen is a menu of important options:\n    *   **Connect**\
    \ – This gives you details on how to connect to the virtual machine using Remote\
    \ Desktop (rdp) or ssh for Linux.\n\n*   **Start** – If you shut down the virtual\
    \ machine inside the OS or stop it using the portal, this is how you would start\
    \ it again.\n\n*   **Restart** – There could be several scenarios where you need\
    \ to restart the virtual machine without having OS access.\n\n*   **Stop** – This\
    \ option allows you to shut down the virtual machine without OS access. There\
    \ is a distinct difference between stopping a virtual machine with this option\
    \ and stopping inside the virtual machine with an OS method. If you shut down\
    \ the virtual machine with the OS, the virtual machine has a status of **Stopped**,\
    \ but you are still paying for compute resources. If you use this option, the\
    \ virtual machine has a status of **Stopped (deallocated)**, and you don’t pay\
    \ for compute resources. Using this option could cause a longer delay to start\
    \ the virtual machine but is a convenient method to save compute costs.\n\nNow\
    \ let’s review the basics of how to connect to a virtual machine."
  trans: "\n### 在门户中探索你的 Azure 虚拟机\n\n让我们通过查看图 10-6 中展示的部署情况，来探索 Azure 门户中的你的 Azure\
    \ 虚拟机。\n\n![](img/525217_1_En_10_Fig6_HTML.png)\n\n一个 SQL 2022 虚拟机的截图。菜单列表、概述、属性和工具栏从\
    \ 1 到 4 进行了编号。\n\n图 10-6\n\n门户中已部署的 Azure 虚拟机\n\n如果你想了解如何轻松进入虚拟机部署视图，请使用 Azure\
    \ 主页上的搜索字段，或者在 Azure 主页的左侧菜单中，选择“虚拟机”。\n\n让我们根据图中的编号，来看看部署的主要区域以及你可以对每个区域进行的操作：\n\
    \n> 注意\n>\n> 你在门户中看到的几乎所有用于查看或配置虚拟机的选项，也可以通过 `az` 命令行界面 (CLI) 或 `PowerShell` 来完成。而运行这些命令的一个简便方法是通过\
    \ `Azure Cloud Shell`。如果你还没用过，你会爱上这个云 Shell 的。你可以在 [`https://docs.microsoft.com/azure/cloud-shell/overview`](https://docs.microsoft.com/azure/cloud-shell/overview)\
    \ 阅读更多信息。此外，还有一个 Azure 移动应用程序，我甚至能够用我的手机管理我的虚拟机和其他 Azure 资源！在门户的左侧菜单中还有一个 API\
    \ 选项，允许你运行一些 `az` CLI 命令。另外，在屏幕顶部，你可以使用 CLI/PS 选项。\n\n![](img/525217_1_En_10_Fig7_HTML.png)\n\
    \n一个窗口的截图。监控选项卡下方是一个警报框。该框下方是在“关键指标”标题下的 5 个折线图。\n\n图 10-7\n\nAzure 虚拟机的内置监控\n\
    \n1.  屏幕顶部区域称为 `概述`，你可以在此查看有关部署的基本信息。一个重要的属性是“状态”，这样你就可以看到虚拟机是 `正在运行` 还是 `已停止`。\n\
    \n2.  屏幕主页面包含多个选项卡，可查看虚拟机属性的更多 `详细信息`、监控统计信息、你可以启用的其他功能以及建议。`监控` 选项卡非常有趣，如图 10-7\
    \ 所示。\n\n这就好比你随时拥有 Windows 任务管理器的性能信息，而无需连接到虚拟机内部。请注意启用警报的功能。你可以配置警报，以便在任何关键指标出现问题时（例如，如果\
    \ CPU 使用率超过阈值）获得通知。\n\n3.  屏幕左侧称为资源菜单（或左侧菜单），包含许多查看和配置虚拟机的选项。选项如此之多，以至于需要另写一章来涵盖它们。以下是我经常使用的几个：\n\
    \    *   `大小` – 在这里你可以查看有关虚拟机大小的更多详细信息或更改大小。在 [`https://docs.microsoft.com/azure/virtual-machines/resize-vm`](https://docs.microsoft.com/azure/virtual-machines/resize-vm)\
    \ 阅读更多关于调整虚拟机大小的信息。\n    *   `网络` – 我可能需要进入此选项来配置网络安全组 (NSG)，这类似于防火墙规则。\n    *\
    \   `SQL Server 配置` – 在这里我可以进入虚拟机的 SQL Server 视图。我将在题为“在门户中探索 SQL 虚拟机”的部分中对此进行更多讨论。\n\
    \    *   `Microsoft Defender for Cloud` – 如果你启用了此功能，可以查看 Defender 的安全建议或警报。\n\
    \    *   `Bastion` – 此选项为你提供了一种使用浏览器进行远程桌面体验的安全方式。\n    *   `运行命令` – 一种无需连接到虚拟机即可在其内部运行程序的有趣方式。\n\
    \    *   `指标` – 无需连接到虚拟机内部即可获取关键性能计数器。一些性能信息，例如从主机视角看虚拟机的信息，只能在此处获取。\n    *  \
    \ `导出模板` – 你可以基于当前部署构建一个 ARM 模板。我有时通过门户进行部署，然后使用此选项为其他要部署的虚拟机构建模板。\n    *   `启动诊断`\
    \ – 这是一个很酷的功能，可以查看虚拟机的“控制台”屏幕，以确保它没有处于挂起状态。\n    *   `重置密码` – 忘记了管理员密码？你可以在这里重置它。如果你担心安全问题，只有在\
    \ Azure 中对虚拟机拥有权限的账户才能执行此操作。\n    *   `重新部署 + 重新应用` – 我遇到过几次情况，使用此选项可以使我的虚拟机在似乎处于挂起状态时成功重启。你可能永远不需要这个，但知道它的存在是件好事。\n\
    \    *   `串行控制台` – 这就像你可以使用计算机的显示器一样，当虚拟机启动似乎出现问题时，它确实能派上用场。同样，你可能永远不需要它，但知道它的存在是件好事。\n\
    \n4.  在屏幕顶部是一个重要选项的菜单：\n    *   `连接` – 这为你提供了如何使用远程桌面 (`rdp`) 或 Linux 的 `ssh`\
    \ 连接到虚拟机的详细信息。\n    *   `启动` – 如果你在操作系统内部关闭了虚拟机或使用门户停止了它，这是你再次启动它的方式。\n    * \
    \  `重启` – 可能有几种场景需要在没有操作系统访问权限的情况下重启虚拟机。\n    *   `停止` – 此选项允许你在没有操作系统访问权限的情况下关闭虚拟机。使用此选项停止虚拟机与在虚拟机内部使用操作系统方法停止有显著区别。如果你通过操作系统关闭虚拟机，虚拟机的状态是\
    \ `已停止`，但你仍需为计算资源付费。如果你使用此选项，虚拟机的状态是 `已停止（已解除分配）`，你无需为计算资源付费。使用此选项可能会导致启动虚拟机的时间更长，但它是节省计算成本的一种便捷方法。\n\
    \n现在，让我们回顾一下如何连接到虚拟机的基本知识。\n"
- fmt: '### Connecting to the Azure Virtual Machine


    If you have a virtual machine in your own environment, the two most common methods
    to connect to the virtual machine for OS access are Remote Desktop (`rdp`) for
    Windows and `ssh` for Linux.


    There are basically three methods to connect to the Azure virtual machine. To
    get started, in the Azure portal select the `Connect` option in the top menu of
    the screen. You will see options as shown in Figure 10-8.


    ![](Images/525217_1_En_10_Fig8_HTML.png)


    A screenshot. At the top is a security warning. Below it, under the `RDP` tab
    are methods for connecting with options of `IP` address and port number.


    **Figure 10-8**

    Connection options for the Azure virtual machine


    If you are using Windows, you can download a file to use with any program that
    supports `rdp`. Note the port number. When you deployed the virtual machine, you
    enabled the default `rdp` port to be public. It could be that this is not a secure
    method for your organization (it is not allowed at Microsoft). One option you
    have is to change the default `rdp` port, and then you would need to supply a
    different port number here. Here is a nice set of steps to change the `rdp` port
    in the Azure portal for the virtual machine at [`https://docs.microsoft.com/archive/blogs/technet/drew/1195`](https://docs.microsoft.com/archive/blogs/technet/drew/1195).


    If you are running into issues with `rdp` to the Azure virtual machine, check
    out our documentation at [`https://docs.microsoft.com/troubleshoot/azure/virtual-machines/troubleshoot-rdp-connection`](https://docs.microsoft.com/troubleshoot/azure/virtual-machines/troubleshoot-rdp-connection).


    The same options exist for Linux with the `ssh` tab. Any program or shell that
    supports `ssh` can be used.


    The third option is the most secure called Bastion. Bastion is a secure Azure
    service running in your Azure virtual network that allows you to have a `rdp`
    or `ssh` experience in a secure fashion using a web browser. Learn more about
    Bastion at [`https://docs.microsoft.com/azure/bastion/bastion-overview`](https://docs.microsoft.com/azure/bastion/bastion-overview).


    Once you can use `rdp` or `ssh`, you can now access the virtual machine like you
    would any virtual machine in your own machine or data center.


    ### Exploring a SQL Virtual Machine in the Portal


    Since we deployed the virtual machine, the `SQL Server IaaS Agent Extension` was
    installed, and our `SQL Server` was registered in `full mode`. So we can go to
    the Azure portal and view our virtual machine as a `SQL virtual machine`. There
    are a few ways to see the `SQL virtual machine` in the portal. You can use the
    `SQL Server configuration` option from the Azure virtual machine resource menu
    or search for `SQL virtual machines` from the Azure home page. You can also see
    a `SQL virtual machine` in a list of Azure SQL resources.


    Figure 10-9 shows my `SQL virtual machine` in the portal.


    ![](Images/525217_1_En_10_Fig9_HTML.png)


    A screenshot of `SQL 2022`. Under the overview, the menu is details of essentials.
    Below them is a column chart and on the right are 7 features of `SQL`.


    **Figure 10-9**

    A deployed `SQL Server` on an Azure Virtual Machine in the portal


    Notice all the properties, data, and options in the menu are very `SQL Server`
    specific. Most of the items that I showed you that were `SQL Server` specific
    to deploy the virtual machine are available here to configure as well.


    The `Storage configuration` option is only used to extend the choices you made
    during deployment, but the same warnings exist if you exceed the storage caps
    for the virtual machine size.


    I will discuss the option `SQL best practices assessment` in the section titled
    “**Optimizing Performance**” later in this chapter.


    One important point about the options at the top of the screen: The `Delete` option
    is used to unregister `SQL Server` with the `IaaS Agent Extension`. There is also
    an option on the `Delete` screen to delete the virtual machine, but that requires
    you to explicitly choose that option.


    ### Connecting to SQL Server on an Azure Virtual Machine


    Now that `SQL Server` is deployed, how do you connect to `SQL Server` with tools
    like `SSMS` or your application?


    That all depends on where you want to connect from. Here are your options:


    *   Connect inside the virtual machine with tools or applications after you have
    used `rdp` or `ssh`.

    *   Create another virtual machine or build an application in the same virtual
    network. Once you have this set up, you are automatically in the same private
    network, so you can use server names or private `IP` addresses.

    *   Connect your on-premises environment or Azure resources to the virtual network
    using technologies like VPN gateways or Express Route. Learn more at [`https://docs.microsoft.com/azure/architecture/reference-architectures/hybrid-networking`](https://docs.microsoft.com/azure/architecture/reference-architectures/hybrid-networking).

    *   Connect to the public `IP` address or `DNS` name of the virtual machine. This
    requires you to enable public connectivity for your virtual machine, but be cautioned.
    I do not recommend this option if you are going to use port `1433`. Even if you
    change the port, you absolutely want a `Network Security Group (NSG)` configured.
    Learn more at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/ways-to-connect-to-sql#connect-to-sql-server-over-the-internet`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/ways-to-connect-to-sql#connect-to-sql-server-over-the-internet).


    Whatever method you choose, connecting to `SQL Server` on an Azure Virtual Machine
    is just like connecting to any `SQL Server` with the tool or application of your
    choice that is compatible to connect to `SQL Server`.


    > **Tip**

    >

    > Our SQL marketplace images include tools like `SSMS` and `Azure Data Studio`
    preinstalled in the virtual machine!'
