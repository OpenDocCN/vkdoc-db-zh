    SQL Server 2022.


    Our sessions were very well attended, and I thought the survey results showed
    folks were excited. This is because during the virtual Microsoft Ignite, we didn’t
    really get to go into many details about all the features of SQL Server 2022\.
    PASS was our first chance to do this for the community in a public fashion. If
    you registered for that event (the general sessions were free), you can watch
    the recordings of our talks. But you can also see the original decks we used at
    [`https://aka.ms/sqlserver2022decks`](https://aka.ms/sqlserver2022decks) (use
    the Private Preview folder to see our original decks). If you look closely at
    the first slide for these decks which you can see below in Figure [1-3](#525217_1_En_1_Chapter.xhtml#Fig3),
    you will notice an image of downtown Dallas, Texas, paying tribute to project
    Dallas. The backstory there is that for the webinar filmed in October 2021, our
    production team built a cool intro slide and it had a downtown city on it but
    it was Chicago (just to show a cool downtown image – they didn’t know the project
    name). I asked the team to change to an image for downtown Dallas. Kind of my
    “Easter egg” in the original decks paying tribute to our project name.


    ![](Images/525217_1_En_1_Fig3_HTML.png)


    An introduction to Microsoft S Q L server 2022 original deck with a skyscraper
    view of a city on the right. The name of principal architect Bob Ward is mentioned.


    Figure 1-3


    The intro SQL Server 2022 deck with the city of downtown Dallas


    As we were moving toward the end of calendar year 2021, someone told me that our
    PASS Summit sessions were only available for free to those who signed up for the
    event. So I asked Rie Merrit if she knew anyone who would host me for a free virtual
    presentation on SQL Server 2022\. Rie quickly found the Virtual DBA Fundamentals
    group, so I did an overall SQL Server 2022 presentation for them, which you can
    see at [`https://youtu.be/M1h4kSZYdu4`](https://youtu.be/M1h4kSZYdu4). Shortly
    after this I found out that PASS had posted all of our SQL Server 2022 sessions
    on PASStv at [`https://www.youtube.com/user/SQLPASSTV/videos`](https://www.youtube.com/user/SQLPASSTV/videos).


    All was going well into December of 2021, and we were riding high and ready to
    crank it up in 2022\. And then one day Joe Sack called me to tell me he was leaving
    Microsoft. As much as I was happy for Joe to pursue new opportunities, privately
    I was crushed because not only is Joe a friend but I really felt he would be vital
    to make SQL Server 2022 a success. But SQL Server is more than one person. It
    is the legacy and tradition of one of the most successful products in the history
    of Microsoft. I knew we still had all the right people to bring it home for a
    successful release in 2022.


    ## Private to Public Preview


    After the announcement of Joe Sack leaving, I received another call from my longtime
    friend at Microsoft, Ajay Jagannathan. Ajay told me that he would be taking over
    from Joe to manage all the program management for SQL Server (as well as Azure
    Arc data). We have a deep bench at Microsoft, so knowing that Ajay and Pedro would
    be leading our efforts to release SQL Server 2022 buoyed my spirits.


    Early in the year, we faced some challenges (which also caused some challenges
    for me for this book) and encountered some surprises. The biggest challenge was
    that several features we had announced for SQL Server 2022 were not available
    yet in CTP builds. CTP 1.0 was the first build to come out in November in 2021
    followed by CTP 1.1 in December 2021 and CTP 1.2 in January 2022\. You can see
    my SSMS connected to the very first official CTP build here in Figure [1-4](#525217_1_En_1_Chapter.xhtml#Fig4).


    ![](Images/525217_1_En_1_Fig4_HTML.png)


    A screenshot of the C T P build of the S Q L query window. On the left, the object
    explorer files are listed with a S Q L query result on the right.


    Figure 1-4


    The first CTP build of SQL Server 2022


    Unfortunately, not all features were fully baked at this point, and some were
    not even in these early CTP builds. The good news is that our PM team had started
    to document existing features in a GitHub repo created by Kendal Van Dyke. Here
    is a look at the GitHub repo we used during Private Preview in the following Figure
    [1-5](#525217_1_En_1_Chapter.xhtml#Fig5).


    ![](Images/525217_1_En_1_Fig5_HTML.png)


    A screenshot of the S Q L server early adoption program repository. It lists the
    releases and the working GitHub files with a few folders on top.


    Figure 1-5


    The Private Preview GitHub repo


    With these challenges also came some great momentum. I found many internal Microsoft
    customer teams and sales groups wanting me to present to them SQL Server 2022\.
    The word had spread fast about the new capabilities of SQL Server 2022, especially
    the cloud-connected features. Folks at Microsoft wanted to learn this quickly
    so they could start educating their accounts.


    Then I found out that I would hit the road again at more events than I could have
    imagined. SQLBits was back in person in London in March 2022\. The SQL Server
    and Azure SQL Conference was held in Las Vegas in April 2022\. And Dell Technologies
    World was back in person in Las Vegas in early May of 2022\. At each of these
    events, I gave the message of SQL Server 2022 and all its rich capabilities (with
    the amazing assistance of so many of my colleagues to make it all happen).


    Then as we prepared to launch the first Public Preview (CTP 2.0) of SQL Server
    2022, my friend Pedro Lopes announced he was leaving Microsoft in May of 2022\.
    Could our team take these losses of key experts and leaders for SQL Server and
    still deliver? As much as I was saddened to see Pedro leave, I realized something
    as I saw other people on our team step up. We all have a great passion to do what
    is right to build and deliver a great product. One that matters. One that has
    value.


    ## The Path to General Availability


    We moved forward and announced the first Public Preview at the Microsoft Build
    virtual conference in late May of 2022\. You can see myself and others present
    at Build at [`https://aka.ms/sqlserver2022build`](https://aka.ms/sqlserver2022build).
    The summer moved fast. I presented SQL Server 2022 both internally and externally
    at events like HPE Discover, Microsoft Inspire, the Data Platform Summit, and
    various other user group and Data Saturday events. Along the way we updated our
    CTP build to 2.1, and then came the first Release Candidate build in August of
    2022\. When a Release Candidate build comes out, you know the General Availability
    is imminent. As I make my final updates to this chapter the General Availability
    is very close. I’m excited to know we will “make the name”.


    For me it was an interesting challenge for the book because I wanted to squeeze
    every possible update to our features that came in preview builds right up to
    the product launch. I believe I was able to accomplish that, but you will find
    a few “at the time of the writing of this book” moments in some of the chapters.'
