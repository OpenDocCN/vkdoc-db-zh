    # 注意


    如果验证失败，你将看到 `state_desc` 值为 `VERIFICATION_REGRESSED`。典型原因是在验证过程中，提示导致查询的 CPU 时间增加。


    系统已自动应用一个查询提示以加快查询速度。但这个提示 `ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES` 是什么意思呢？回到前一节标题为“**什么是
    CE 模型问题**？”中，我描述了一个与如何处理相关性相关的 CE 模型问题。`ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES`
    提示假设*完全相关性*。你可以在我们的文档 [`https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query`](https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query)
    中找到更多详细信息。以下是关于此提示的引用：


    > *导致 SQL Server 在估算筛选器的 AND 谓词时使用最小选择性来生成计划，以考虑完全相关性。此提示名称等效于 SQL Server 2012
    (11.x) 及更早版本的基数估算模型中的跟踪标志 4137，并且在 SQL Server 2014 (12.x) 或更高版本的基数估算模型中使用跟踪标志
    9471 时具有类似效果。*


    ![](img/525217_1_En_5_Fig16_HTML.png)


    数据库 Adventure Works 的前 25 个资源消耗者的截图。截图左侧有柱状图，右侧有查询 22 的计划摘要，底部显示了未强制的计划 22。


    图 5-16：CE 反馈提示之前的原始查询计划


    1.  再次运行脚本 `cefeedbackquerybatch.sql`，以比较与第一次运行的时间。

    2.  使用 SSMS 中的查询存储报告查看差异。使用对象资源管理器中的**资源消耗最多的查询报告**查看 CPU 时间的差异。该查询有两个计划。耗时较长的原始计划如图
    5-16 所示。


    请注意，此计划使用了多个索引上的多个联接。部分原因是优化器使用“新” CE 模型来假设不存在相关性或仅存在部分相关性。图 5-17 显示了应用带有 CE 反馈的新提示后的新计划。


    ![](img/525217_1_En_5_Fig17_HTML.png)


    数据库 Adventure Works 的前 25 个资源消耗者的截图。截图左侧有柱状图，右侧有查询 22 的计划摘要，底部显示了未强制的计划 22。


    图 5-17：带有 CE 反馈提示的新计划


    此计划运行速度更快，消耗的 CPU 更少。新计划使用单个索引扫描来获取数据。如果将光标悬停在索引扫描运算符上，可以看到扫描使用了筛选谓词来解析两个谓词值，如图
    5-18 所示。


    ![](img/525217_1_En_5_Fig18_HTML.png)


    数据库 Adventure Works 的前 25 个资源消耗者的截图。截图左侧有柱状图，右侧有查询 22 的计划摘要，底部显示了未强制的计划 27。一个箭头指向谓词部分的详细信息。


    图 5-18：新查询计划中的谓词下推


    这种情况称为*谓词下推*。其思想是优化器可以在索引上同时进行“扫描和筛选”。著名的 Pedro Lopes 在博文 [`https://techcommunity.microsoft.com/t5/sql-server-blog/predicate-pushdown-and-why-should-i-care/ba-p/385946`](https://techcommunity.microsoft.com/t5/sql-server-blog/predicate-pushdown-and-why-should-i-care/ba-p/385946)
    中对这个概念有很好的解释。由于优化器现在使用了 `ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES` 提示，它可以轻松决定使用此技术，因为它假设了完全相关性。


    相当巧妙，对吧？并且由于反馈和提示保存在查询存储中，即使计划从缓存中被淘汰，它仍将被使用。


    # 关于 CE 反馈的限制和更多详情


    请在 [`https://aka.ms/cefeedback`](https://aka.ms/cefeedback) 关注 CE 反馈的所有最新动态。


    当你查看使用了 CE 反馈的查询的实际执行计划 XML 时，你会发现以下属性已添加到 `<StmtSimple>` 子句中：


    ```

    QueryStoreStatementHintId="1"

    ```


    这将匹配 `sys.query_store_query_hints.query_hint_id`：


    ```

    QueryStoreStatementHintText="OPTION(USE HINT(''ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES''))"
    QueryStoreStatementHintSource="CE feedback"

    ```


    在以下情况下，将不会使用 CE 反馈：


    *   你使用的是数据库兼容性级别 < 160。

    *   你使用的是自己的查询存储提示。

    *   你在查询存储中强制了计划。

    *   你执行了以下 T-SQL 以在数据库级别关闭 CE 反馈：`ALTER DATABASE SCOPED CONFIGURATION SET CE_FEEDBACK
    = OFF`。

    *   你执行的查询不符合我们在文档 [`https://aka.ms/cefeedback`](https://aka.ms/cefeedback) 中概述的相关性、联接包含或优化器行目标类别下的模式。

    *   你使用了查询提示 `DISABLE_CE_FEEDBACK`。


    我预计 CE 反馈对应用程序和工作负载的效果会存在差异。由于我们通过验证过程应用“不造成损害”的策略，我希望客户在升级到数据库兼容性级别 160 后，会观察到它对他们的工作负载有所帮助。

    '
- fmt: '## Degree of Parallelism (DOP) Feedback


    At its deepest level, the SQL Server engine is powered by a series of worker threads
    coordinated by SQLOS. We have designed the engine to make smart decisions to partition
    out work for certain operations using multiple threads concurrently. These operations
    range from creating database backups and rebuilding indexes to running queries
    that retrieve data using `SELECT` statements. When the engine uses multiple threads
    to perform some of these operations in parallel, we use the term `degree of parallelism`
    (DOP). DOP refers to the number of threads that run concurrently to perform a
    task. A task could be building an index, or it could be an operator used to execute
    part of a query plan for a `SELECT` statement. The history of using parallel threads
    for query execution dates all the way back to SQL Server 7.0 when we built a new
    query processor from the SQL 6.X versions.


    ### Note


    Step back in time. I found the original SQL Server 7.0 docs on our announcement
    of this new feature at [`https://docs.microsoft.com/en-us/previous-versions//cc917537(v=technet.10)?redirectedfrom=MSDN`](https://docs.microsoft.com/en-us/previous-versions//cc917537(v=technet.10)?redirectedfrom=MSDN).
    Also, take a look at this slide deck built by Lubor Kollar, who was one of the
    original architects of query parallelism in SQL Server: [`www.slideserve.com/gilon/parallel-query-processing-in-sql-server-powerpoint-ppt-presentation`](http://www.slideserve.com/gilon/parallel-query-processing-in-sql-server-powerpoint-ppt-presentation).


    I remember working in support when this new feature came out. It definitely helped
    boost the performance for certain workloads, especially those with analytic-type
    queries. But it came with a cost. In support, we started noticing customers contacting
    us with problems where all CPUs were “pegged” at 100% for minutes at a time, hampering
    performance for all users. When we introduced this feature in SQL Server 7.0,
    we built into the query processor heuristics to decide when to use parallelism
    and to dynamically decide what the maximum degree of parallelism should be for
    a query. We introduced a `sp_configure` setting called `''max degree of parallelism''`.
    The default value was 0, which means “let the engine decide.” And most of the
    time, this means use all available processors. For the one query that uses parallelism,
    that’s great. But for all other users, this can spell trouble.


    Keith Elmore, Robert Dorr, and I were working in support in those days, and we
    found ourselves starting to recommend to customers to set `''max degree of parallelism''`
    to a value other than 0 (our recommendation was complicated because this setting
    is an advanced setting and originally required a server restart). But what value
    should we tell them to use? For the most extreme critical problems, some customers
    would set this value to 1, which means do not allow any queries to use parallelism.
    I was hesitant to recommend this because it effectively means disabling a feature
    of the product. For the most part, we would recommend some setting that was lower
    than the total number of available processors.


    In later releases, SQL Server would support NUMA architectures, resource governor,
    database-scoped configuration, and query hints, which can affect how to set `MAXDOP`.
    We built knowledge base articles with guidance. All of this experience has led
    to the following documentation page for guidance on setting `MAXDOP`: [`https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option`](https://docs.microsoft.com/sql/database-engine/configure-windows/configure-the-max-degree-of-parallelism-server-configuration-option?).


    Even with this guidance and all of these options, our users continually fight
    a battle to decide how best to set this value to allow some queries to benefit
    from parallelism while not greatly affecting the overall application workload.
    Along comes the concept of `DOP feedback`. DOP feedback is designed to dynamically
    adjust the DOP used by operators in a query plan. Let’s look at the background
    of the project and how it works, go through an example, and understand considerations
    for using this feature.


    #### Why Did We Build DOP Feedback?


    If you read and study how parallelism works, you can see a certain amount of CPU
    cycles are required to run many different threads in parallel and coordinate between
    them. What may not be clear in some cases is whether a query could run with a
    lower number of threads and achieve the same overall final execution duration,
    therefore using less CPU resources.


    Back in 2019 (before SQL Server 2019 shipped), I remember seeing a new project
    launched by Slava Oks and Pedro Lopes called `Gaia`. The concept was to build
    a new service that would be able to observe telemetry from the engine and provide
    `feedback` to certain core engine components. The Gaia service would run outside
    the engine and maintain its own database with the purpose of collecting telemetry
    and providing feedback. As Pedro Lopes tells it, *“..the purpose is to be the
    all-encompassing framework for product internal feedback telemetry, it’s just
    like Gaia in Greek mythology, where she is the mother of all life.”*


    A real-world scenario was needed to test out Gaia, and one of the early ones was
    DOP. The concept of Gaia is still around as a project, but the decision was made
    for SQL Server 2022 to take the concept of DOP feedback and infuse this into the
    engine using data captured in Query Store.


    #### What Is DOP Feedback?


    I looked back at some of our original design docs and found this statement that
    summarizes our goal: “Improve system throughput by lowering `MAXDOP` for parallel
    queries to `reduce CPU usage` while maintaining the Do No Harm principle in regard
    to performance.”


    So the question becomes: How do you know if a lower degree of parallelism for
    the query will achieve a good enough result? You need a way to execute the query
    and get feedback on trying lower DOP values. That is effectively what DOP feedback
    does. DOP feedback is a coordination between the query processor and Query Store
    to execute, try, and validate DOP values for an `eligible` query until the lowest
    possible DOP value is found that reduces CPU usage and achieves the “no harm”
    principle over time.


    ### Note


    One of the interesting aspects I found in the design of the feature was the use
    of workloads like TPC-H to see what kind of optimal DOP values across various
    queries in the benchmark could still achieve a great result. We also looked at
    telemetry we see in Azure to find out what typical DOP values were used across
    many different queries over time.'
