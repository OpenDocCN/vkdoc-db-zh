    Figure 2-6


    Azure Arc–enabled SQL Server main portal page


    ### Connect to Azure After Setup


    If you decide not to select the Azure extension for SQL Server feature during
    SQL Server 2022 setup, you can connect your SQL Server 2022 instance with Azure
    at a later time following the steps at [`https://docs.microsoft.com/sql/sql-server/azure-arc/connect`](https://docs.microsoft.com/sql/sql-server/azure-arc/connect).
    Or you can go back and “add a feature” to the existing SQL Server 2022 instance,
    which provides you with the same screens as with the original setup. You can also
    connect many SQL instances at scale using steps found at [`https://docs.microsoft.com/sql/sql-server/azure-arc/connect-at-scale`](https://docs.microsoft.com/sql/sql-server/azure-arc/connect-at-scale).


    ### Removing the Azure Extension for SQL Server


    You can disconnect your SQL Server 2022 instance at any time from Azure using
    the steps documented at [`https://learn.microsoft.com/en-us/sql/sql-server/azure-arc/connect#delete-your-arc-enabled-sql-server-resource`](https://learn.microsoft.com/en-us/sql/sql-server/azure-arc/connect#delete-your-arc-enabled-sql-server-resource).
    If you decide to completely remove the connection to Azure, I recommend you also
    remove the Azure extension for SQL Server using SQL Server setup.


    ## Deploying on Other Platforms


    This chapter has focused more on the experience of installing SQL Server on Windows.
    SQL Server is supported on other platforms including Linux, containers, and Kubernetes.
    Chapter [9](#525217_1_En_9_Chapter.xhtml) of this book will cover those experiences,
    but if you want to jump right in, you can use these resources:


    **SQL Server on Linux** – [`https://aka.ms/sqllinux`](https://aka.ms/sqllinux)


    **SQL Server on containers** – [`https://aka.ms/sqlcontainers`](https://aka.ms/sqlcontainers)


    **SQL Server on Kubernetes** – [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s)


    Note


    This page contains instructions on deploying a SQL container on Azure Kubernetes
    Service (AKS). Consult your Kubernetes platform documentation on the proper method
    to deploy pods and containers.


    Be sure to consult the latest release notes for SQL Server 2022 on Linux and containers
    at [`https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes-2022`](https://docs.microsoft.com/sql/linux/sql-server-linux-release-notes-2022).


    In addition, SQL Server 2022 can be deployed on Azure Virtual Machines. Chapter
    [10](#525217_1_En_10_Chapter.xhtml) of this book will go through more details
    on this experience. To get more information on SQL Server on Azure Virtual Machines,
    consult our documentation at [`https://aka.ms/sqlazurevm`](https://aka.ms/sqlazurevm).


    ## Side-by-Side and Multi-instance Installations


    Like previous releases of SQL Server, SQL Server 2022 supports side-by-side installations
    on the same computer with different versions (supported versions) and multiple
    instances (aka named instances). There are no differences in support for both
    side-by-side and multi-instance installations from previous SQL Server releases.
    For more information, consult our documentation at [`https://docs.microsoft.com/sql/sql-server/install/work-with-multiple-versions-and-instances-of-sql-server`](https://docs.microsoft.com/sql/sql-server/install/work-with-multiple-versions-and-instances-of-sql-server).
    SQL Server on Linux supports multiple instances by using containers.


    ## How to Upgrade to SQL Server 2022


    SQL Server 2022 supports upgrades from previous releases of SQL Server with the
    same methods as in previous versions. You can read more at [`https://docs.microsoft.com/sql/database-engine/install-windows/upgrade-sql-server`](https://docs.microsoft.com/sql/database-engine/install-windows/upgrade-sql-server)
    for all the details.


    At the time of the writing of this book, the plan was to support an “in-place”
    upgrade from SQL Server 2012 Service Pack 4 or any higher version and database
    restore upgrades from SQL Server 2008/2008R2 and higher.


    ## The Importance of dbcompat


    Over my career at Microsoft, it has become apparent that one of the reasons customers
    do not upgrade to a new major version of SQL Server is because the latest version
    is not compatible with their application.


    For the past several SQL Server versions, we have been trying to convince customers
    and developers to test for compatibility with the database compatibility level
    (dbcompat) of user databases. If you upgrade a SQL Server database to a new version,
    we maintain the previous dbcompat. You can read more on why this could be a new
    strategy for compatibility for you at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat).
    Note that using an older dbcompat gives you more time to explore and test the
    latest dbcompat levels, which enable new capabilities like Intelligent Query Processing
    (IQP), which is discussed more in Chapters [4](#525217_1_En_4_Chapter.xhtml) and
    [5](#525217_1_En_5_Chapter.xhtml) of this book.'
