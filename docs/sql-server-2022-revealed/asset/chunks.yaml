- fmt: "If you \"click\" in SSMS on the `query_plan_xml` output, SSMS will open a\
    \ new window and show XML text. If you look closely at the line starting with\
    \ `<StmtSimple…` and scroll to the right, you will see these two values:\n\n```\n\
    QueryCompilationReplay=\"1\" StatementOptmLevel=\"FULL\"\n```\n\nThis means that\
    \ this query is a candidate for optimized plan forcing. The \"script\" or \"compile\
    \ steps\" have been baked into the plan XML in Query Store. These steps will be\
    \ used the next time this query is compiled, but only if the query plan is forced\
    \ in Query Store.\n\n1.  Let’s try it. Load the script `forceplan.sql`. Edit the\
    \ script to put in the `query_id` and `plan_id` values from the results in step\
    \ 4. Execute the script. The script uses the following T-SQL:\n\n    ```\n   \
    \ EXEC sp_query_store_force_plan @query_id = , @plan_id = ;\n    GO\n    ```\n\
    \n2.  Verify the query plan is forced by executing the script `find_query_in_query_store.sql`\
    \ again. You should see a value for `is_forced_plan` of `1`.\n\n3.  The next time\
    \ this query is compiled, we should see a significant reduction in compilation\
    \ time. Run the script `bigjoin.sql` again (be sure to run the entire script as\
    \ it forces a new compile). Using the Messages tab again, observe the compile\
    \ time vs. overall CPU time. Your result should look similar to the following:\n\
    \n    ```\n    SQL Server parse and compile time:\n    CPU time = 38 ms, elapsed\
    \ time = 38 ms.\n    (916540 rows affected)\n    SQL Server Execution Times:\n\
    \    CPU time = 2672 ms,  elapsed time = 7636 ms.\n    ```\n\n    You can see\
    \ from these results that the time to compile the query is now ~1% of the overall\
    \ CPU time.\n\n4.  To see the new values in Query Store views, first, flush data\
    \ to Query Store so we can see all the recent statistics using the script `flush_query_store.sql`.\
    \ This script uses the following T-SQL:\n\n    ```\n    USE WideWorldImporters;\n\
    \    GO\n    EXEC sys.sp_query_store_flush_db;\n    GO\n    ```\n\n5.  Now look\
    \ at the latest statistics in Query Store by executing the script `find_query_in_query_store.sql`\
    \ again. The `last_compile_ms` should match the value of the latest \"SQL Server\
    \ parse and compile time\" from step 7.\n\n#### Considerations for Using Optimized\
    \ Plan Forcing\n\nWe enabled this feature by default for new databases in SQL\
    \ Server 2022 because there is really no harm in using it. It does require Query\
    \ Store to be enabled. If you are forcing query plans, any of the plans that are\
    \ eligible for a compilation script will simply compile faster. There is no real\
    \ overhead in using it.\n\nHaving said that, you can disable optimized plan forcing\
    \ using the following methods:\n\n*   Set the `ALTER DATABASE SCOPED CONFIGURATION`\
    \ statement using the option `OPTIMIZED_PLAN_FORCING` to OFF. (You can also use\
    \ this option to turn it back on.)\n*   You can disable optimized plan forcing\
    \ when you force a query plan with the system stored procedure `sp_query_store_force_plan`\
    \ by using the `@disable_optimized_plan_forcing` option.\n*   You can use a query\
    \ hint called `DISABLE_OPTIMIZED_PLAN_FORCING`.\n\nTip\n\nWhen you want to get\
    \ a list of all possible query hints (i.e., `USE HINT`), execute the system procedure\
    \ `sys.dm_exec_valid_use_hints`.\n\nKeep up with all the latest information on\
    \ optimized plan forcing in our documentation at [`https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store).\n\
    \n### IQP Nextgen with dbcompat 140+\n\nBased on the previous section, you can\
    \ see that if you upgrade to SQL Server 2022 with any supported dbcompat level,\
    \ you are eligible to gain performance from these features:\n\n*   Approximate\
    \ percentile\n*   Optimized plan forcing\n\nFor example, if you upgraded from\
    \ SQL Server 2016 and kept the dbcompat level at 130, you would able to take advantage\
    \ of these features (provided you meet the criteria for each).\n\nBut let’s say\
    \ you upgrade from SQL Server 2017 or 2019 and have dbcompat set at 140 or 150.\
    \ What additional features can you use to improve performance? First, remember\
    \ that any IQP features that shipped in 2017 and 2019 are available to you depending\
    \ on dbcompat 140 or 150.\n\nNote\n\nApproximate distinct was added to SQL Server\
    \ 2019 independent of dbcompat level. You can read more at [`https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql).\n\
    \nIn SQL Server 2022, if you are using dbcompat 140 or greater, then you can take\
    \ advantage of enhancements for `memory grant feedback`.\n\nIn Chapter 2 of *SQL\
    \ Server 2019 Revealed*, I provided a detailed background and explanation of memory\
    \ grant feedback. Let me summarize here the key points I made in that chapter\
    \ about memory grant feedback.\n\nThere are certain operators in a query plan\
    \ that require their own memory allocation such as hash joins and sorts. When\
    \ a query is compiled, SQL Server will decide how much memory is needed for these\
    \ types of operators; this is called a *memory grant*. I love this detailed blog\
    \ post by one of our longtime developers Jay Choe on memory grants: [`https://docs.microsoft.com/en-us/archive/blogs/sqlqueryprocessing/understanding-sql-server-memory-grant`](https://docs.microsoft.com/en-us/archive/blogs/sqlqueryprocessing/understanding-sql-server-memory-grant).\
    \ Memory grants are also known as *query memory*.\n\nA frequent problem I saw\
    \ in support over the years occurred when the memory grant was not accurate compared\
    \ with the memory actually required for the operator. This problem could come\
    \ in two forms:\n\n*   If the memory grant was too small for query execution,\
    \ then a *spill* could occur. Effectively, if during query execution the memory\
    \ grant allocated up front at the start of the query was not enough, the engine\
    \ would have to use tempdb as a *paging file.* Even the fastest disk for tempdb\
    \ is not as fast as if the entire memory required was in RAM. As a result, a spill\
    \ would result in slower performance of the query.\n*   If the memory grant was\
    \ too large for query execution, other queries could be forced to wait, especially\
    \ if multiple queries needed memory grants of a certain size. The symptom would\
    \ be a wait_type = `RESOURCE_SEMAPHORE`.\n\nInaccurate memory grants can occur\
    \ for many reasons. One of the most common is inaccurate cardinality estimations\
    \ for operators that feed something like a hash join or sort. It could simply\
    \ be that statistics are out of date.\n\nLike any other problem, our support team\
    \ would work with customers to provide workarounds. There were many options such\
    \ as query hints or resource governor settings. But nothing really solved the\
    \ underlying problem. Users would struggle to do a deep investigation on why the\
    \ memory grant was not accurate.\n\nIn SQL Server 2017, we created a feedback\
    \ model for memory grants for batch-mode operations (only columnstore at the time)\
    \ if you used dbcompat 140. In SQL Server 2019, we enhanced the feedback system\
    \ if dbcompat 150 was enabled to include row-mode operations (but batch mode was\
    \ also introduced in SQL Server 2019 to be used without columnstore).\n\nNote\n\
    \nRead through the following about batch- and row-mode operations for SQL Server\
    \ at [`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-batch-mode-on-rowstore/ba-p/386256`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-batch-mode-on-rowstore/ba-p/386256)."
