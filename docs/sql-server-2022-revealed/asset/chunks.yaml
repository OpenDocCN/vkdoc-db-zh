    # 4. 内置查询智能


    自我加入微软以来，我们一直致力于打造业内最佳的查询处理器（QP）之一，并倾注了全部心血。但正如我在多年技术支持工作中所见，QP 在某些场景下仍会遇到困难。早在
    2016 年，我们的团队便开始了一项旅程，旨在使查询处理器能够适应各种工作负载，帮助用户在无需更改代码的情况下实现一致或更优的性能。


    我们最初将这一努力称为 `自适应查询处理（AQP）`。我第一次听到这个术语来自 Joe Sack，他是 SQL Server 2017 中 `AQP` 的首席产品经理。`AQP`
    增加了响应内存授予、支持自适应连接的功能，并为分析查询引入了批处理模式。这些功能均通过将数据库兼容性（`dbcompat`）级别更改为 `140`（SQL
    Server 2017 的默认级别）即可启用，无需更改代码。更多关于 `dbcompat` 级别的信息，请访问 [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)。而这仅仅是个开始。


    > 注意

    > 趣味回顾，穿越时光。观看 Conor Cunningham 和我在 2018 年 SQLBits 大会上对 `AQP` 的演讲：[`https://sqlbits.com/Sessions/Event17/Adaptive_query_processing_in_SQL_databases?msclkid=2b8c0902c4ca11ecb9e5158053df6fa9`](https://sqlbits.com/Sessions/Event17/Adaptive_query_processing_in_SQL_databases?msclkid=2b8c0902c4ca11ecb9e5158053df6fa9)。


    我们加倍努力，在 SQL Server 2019 中将这一概念重新命名为 `智能查询处理（IQP）`。`IQP` 包含了强大而新颖的场景，例如表变量延迟编译、扩展的内存授予，以及为基于行的表启用批处理模式。您可以在我的著作《`SQL
    Server 2019 Revealed`》的第 2 章中阅读关于 `IQP` 的详细内容，或者直接查阅我们的文档：[`https://aka.ms/iqp`](https://aka.ms/iqp)。所有这些场景均可通过简单地将
    `dbcompat` 级别更改为 `150` 来启用，无需更改代码。


    > 注意

    > 近似查询处理不需要 `dbcompat 150`，只需升级到 SQL Server 2019 即可。


    随着我们步入 SQL Server 2022 时代，我们决定保留 `IQP` 这一品牌，同时将一整套新场景纳入 `内置查询智能` 这一术语中。这包括了 `新一代（nextgen）`
    的 `IQP`、对查询存储的新增强，以及这些场景的协同工作。


    SQL Server 2022 中的 `内置查询智能` 效果如何？我将这些能力分成了两章来介绍。本章将介绍所有 `内置查询智能` 的概念，然后深入探讨查询存储以及那些不需要
    `dbcompat 160` 的 `智能查询处理（IQP）` 功能。第 5 章将深入介绍三个新的 `IQP` 功能，这些功能在您启用 `dbcompat 160`
    后可用（同样，无需更改代码）。


    为什么仅 SQL Server 2022 的这一部分就有如此多的内容？请考虑以下几点：


    - 这是 SQL Server 2022 投资最丰富的领域之一。

    - 这两章中几乎每个场景背后都有一个故事。我不仅喜欢讲故事，而且许多故事背后都有我亲身经历。

    - 尽管 `内置查询智能` 的核心理念是以最少的努力获取性能和洞察力，但我在这两章中都花时间详细解释了每个功能背后的细节。

    - 两章中都提供了许多示例供您试用这些新功能。


    在阅读接下来的两章时，请牢记我们团队在这一领域始终遵循的以下原则：


    - 尽可能做到“无害”。换句话说，确保不破坏现有工作负载，也不会因该功能不可用而导致它们运行得更慢。

    - 无需更改代码即可利用这些功能（查询存储提示和近似百分位数等例外情况除外）。

    - 允许单独关闭任何这些功能。这让您可以使用您喜欢的功能，并禁用那些可能不适合您工作负载的功能。


    我们的创新真的有效吗？我们引擎的合作伙伴工程组经理 Naveen Prakash 认为如此：“*不可预测的* 查询性能曾导致人们无法将货物装入汽车或卡车，无法驶离仓库。SQL
    Server 2022 *通过智能监控和自适应执行，持续提升透明、可预测和高效查询处理的标杆*。”


    所以，请放松身心，继续阅读。选择您现在想读的部分，也许稍后再回来继续。想象自己在接下来的两章中，仿佛置身于我过去一场“烧脑”的演讲之中。


    让我们先概览一下新功能的整体阵容，深入了解一下 `全新的` 查询存储，然后一步步看看如何利用 `新一代 IQP` 中的一些功能。


    ## SQL Server 2022 中的内置查询智能


    在 SQL Server 2022 早期规划阶段，Pedro Lopes 和我提出了 `内置查询智能` 这一术语。我们这样做是为了代表 SQL Server
    2022 中全新的创新，旨在 **无需更改代码即可获得并保持一致的性能**。此外，这些变更还让您能够通过增强的查询存储，获得对查询性能的新洞察，并以更快、更新颖的方式调优查询。这些创新被“内置”到引擎本身，并利用“数据”进行智能操作。这些数据基于统计信息或来自查询存储等数据源的执行信息。


    这系列新功能包括：


    - 查询存储增强功能，例如新数据库默认开启、支持针对只读副本执行的查询以及查询存储提示。

    - 新的 `IQP` 场景，包括为 SQL Server 查询性能的“古老”问题提供了一些惊人的解决方案；事实上，其中一些新功能 `使用了查询存储`。


    图 4-1 展示了所有新 `IQP` 功能的可视化图，并标注了哪些功能使用了查询存储。


    ![](img/525217_1_En_4_Fig1_HTML.png)


    图 4-1：SQL Server 2022 `IQP` 新功能


    本章将涵盖无需 `dbcompat 160` 即可获得的功能（左侧两列）。第 5 章将深入探讨如果您启用 `dbcompat 160` 后可用的 `IQP`
    功能，包括 `参数敏感计划（PSP）` 优化、`基数估计（CE）` 模型反馈和 `并行度（DOP）` 反馈。


    请注意右下角的方框，描述了 “`IQP Gen1`” 是通过 `dbcompat 140` 启用的。这代表了我们在 SQL Server 2017 中引入的
    `IQP` 能力。“`IQP Gen1+2`” 代表了我们在 SQL Server 2019 加上 SQL Server 2017 中引入的 `IQP` 能力。了解这一点很重要，因为您可能正从
    SQL Server 2016 或更早版本升级到 SQL Server 2022，却没有意识到可以使用所有之前的 `IQP` 能力。您始终可以在 [`https://aka.ms/iqp`](https://aka.ms/iqp)
    了解所有 `IQP` 功能。


    让我们从查询存储的增强功能开始看起。SQL Server 2022 有足够多的新增强，我称之为 `全新的` 查询存储。

    '
- fmt: "## The New Query Store\n\nIn my opinion, Query Store is simply one of the\
    \ coolest features we have ever put in the SQL Server engine. As far back as the\
    \ mid-2000s, the famous Conor Cunningham approached several of us in customer\
    \ support about a new way to track query performance. Up to this point, we were\
    \ all “polling” Dynamic Management Views (`DMVs`) to persist query performance\
    \ execution data. Conor had the idea of baking telemetry about query performance\
    \ execution into the query processor itself. This telemetry would be persisted\
    \ in the user database in the form of system tables. He called it Query Disk Store\
    \ (`QDS`), which is now known today as Query Store.\n\nIt took several iterations,\
    \ but Conor’s dream of this innovation was realized in `SQL Server 2016`. It was\
    \ also a key piece for the success of Azure SQL Database as we turned it on by\
    \ default for all new databases.\n\nI still find today that many customers I talk\
    \ to do not use Query Store. Some don’t know exactly what it is, some have heard\
    \ of it but haven’t tried to turn it on, and others have used it but had issues.\n\
    \nBy `SQL Server 2019`, we completed new enhancements to fix some performance\
    \ issues, added wait stats information (added in `SQL Server 2017`), and introduced\
    \ extra controls to help with query capture and better storage management of the\
    \ data. All of this has set us up to move forward with a new Query Store for everyone.\n\
    \nIf you are new to Query Store, I recommend you read over our documentation first\
    \ at [`https://aka.ms/querystore`](https://aka.ms/querystore) before you read\
    \ our `SQL Server 2022` enhancements. With that in mind, there are a few fundamental\
    \ principles about Query Store you need to keep in mind as you use new capabilities\
    \ in `SQL Server 2022`:\n\n*   Query Store has an option called **capture mode**.\
    \ Capture mode controls what type of queries are kept in Query Store. A value\
    \ of `ALL` means all queries are collected (well, not exactly all since some SQL\
    \ statements are never candidates for Query Store like `CREATE TABLE`). A value\
    \ of `AUTO` means only meaningful queries are collected, which effectively means\
    \ only queries that you care about collecting performance information are kept.\
    \ A value of `CUSTOM` allows you to configure a more granular control of what\
    \ is kept vs. `ALL` or `AUTO`. The reason this concept is important is that you\
    \ may be trying to use a feature that relies on Query Store but it doesn’t appear\
    \ to be working. It could be that the query was not eligible to be kept in Query\
    \ Store based on capture policies. You can read more about Query Store capture\
    \ mode at [`https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store?#set-the-optimal-query-store-capture-mode`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store?#set-the-optimal-query-store-capture-mode).\n\
    \n*   Query Store keeps all data within system tables within the context of a\
    \ user database. This extends the storage required for the database. There are\
    \ options (with defaults) that control what is the maximum size of the space used\
    \ for Query Store and cleanup policies. In addition, there are ways to manually\
    \ remove all data, or subsets of data, within Query Store. You can read more about\
    \ Query Store maintenance at [`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios).\n\
    \nArmed with this knowledge, in this section I will show you why I call Query\
    \ Store in `SQL Server 2022` *new* including the following:\n\n*   Query Store\
    \ is now on by default for new databases.\n*   Query Store hints to shape query\
    \ plans with no code changes.\n*   Query Store supports telemetry for queries\
    \ against read-only replicas.\n*   Some new IQP features use Query Store to improve\
    \ performance with no code changes.\n\n### On by Default\n\nI remember vividly\
    \ when we were talking about new features for project Dallas when Pedro Lopes\
    \ and Joe Sack said to me, “Bob, we are going to turn on Query Store by default.”\
    \ My reaction was “Hey, we don’t do that for SQL Server. We are pretty conservative\
    \ when it comes to turning things like this on by default.” But their explanation\
    \ as to why we were doing this was a good one.\n\nHere is a summary of the facts\
    \ they presented:\n\n*   Query Store has been around for several releases since\
    \ `SQL Server 2016`.\n*   We have this on by default for Azure SQL for millions\
    \ of databases. And we have been doing this for several years.\n*   We changed\
    \ the default on how to capture queries to a mode to ease burden on applications\
    \ with ad hoc workloads (`QUERY_CAPTURE_MODE` to `AUTO`).\n*   We added a new\
    \ `CUSTOM` option in `SQL Server 2019` for `QUERY_CAPTURE_MODE` to give more control\
    \ on what was captured by Query Store using the `QUERY_CAPTURE_POLICY` options.\n\
    *   We plan to add Query Store hints and support for read replicas in `SQL Server\
    \ 2022`.\n*   Finally, and the most important reason, some new IQP scenarios would\
    \ *require* Query Store. This statement really caught my eye. I remember saying\
    \ something like “Say that again?” You will see what we mean by requiring Query\
    \ Store when you read about new IQP scenarios for `SQL Server 2022` in this and\
    \ the next chapter.\n\nThis is all nice, but I’m sure you are reading this and\
    \ still may be asking, “Is there any impact to my application?”\n\nThe answer\
    \ as with any general question like this is “It depends.” All the reasons Joe\
    \ and Pedro gave me previously make me feel comfortable telling anyone that the\
    \ impact to any application with Query Store enabled could be negligible.\n\n\
    Having said that, here are a few thoughts in my personal opinion to consider:\n\
    \n*   We only enable Query Store for newly created databases in `SQL Server 2022`.\
    \ Any databases restored from a previous version of SQL Server will only have\
    \ Query Store enabled if it was already turned on.\n*   I always recommend to\
    \ any customer to test their application with any system or program that is capturing\
    \ telemetry. This includes third-party applications, use of Dynamic Management\
    \ Views (`DMVs`), Extended Events, or Query Store.\n*   We have had Query Store\
    \ on by default for Azure SQL Database for several years with no report of customer\
    \ workloads being impacted.\n*   New capture policies allow you to “capture what\
    \ you need,” therefore decreasing overall impact to the system.\n*   We still\
    \ recommend for some production workloads the use of trace flag `7745` to avoid\
    \ impact of shutdown. You can read more about this trace flag and all the best\
    \ practices for Query Store at [`https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store).\n\
    \n    ```\n    DBCC TRACEON(7745, -1)\n    ```"
  raw: '## The New Query Store


    Query Store in my opinion is simply one of the coolest features we have ever put
    in the SQL Server engine. As far back as the mid-2000s, the famous Conor Cunningham
    approached several of us in customer support about a new way to track query performance.
    Up to this point, we were all “polling” Dynamic Management Views to persist query
    performance execution data. Conor had the idea baking into the query processor
    itself telemetry about query performance execution. This telemetry would be persisted
    in the user database in the form of system tables. He called it Query Disk Store
    (QDS), which is now known today as Query Store.


    It took several iterations, but Conor’s dream of this innovation was realized
    in SQL Server 2016\. It was also a key piece for success of Azure SQL Database
    as we turned it on by default for all new databases.


    I still find today many customers I talk to do not use Query Store. Some don’t
    know exactly what it is, some have heard of it but haven’t tried to turn it on,
    and others have used it but had issues.


    By SQL Server 2019, we completed new enhancements to fix some performance issues,
    added wait stats information (added in SQL Server 2017), and introduced extra
    controls to help with query capture and better storage management of the data.
    All of this has set us up to move forward with a new Query Store for everyone.


    If you are new to Query Store, I recommend you read over our documentation first
    at [`https://aka.ms/querystore`](https://aka.ms/querystore) before you read our
    SQL Server 2022 enhancements. With that in mind, there are a few fundamental principles
    about Query Store you need to keep in mind as you use new capabilities in SQL
    Server 2022:


    *   Query Store has an option called **capture mode**. Capture mode controls what
    type of queries are kept in Query Store. A value of ALL means all queries are
    collected (well, not exactly all since some SQL statements are never candidates
    for Query Store like CREATE TABLE). A value of AUTO means only meaningful queries
    are collected, which effectively means only queries that you care about collecting
    performance information are kept. A value of CUSTOM allows you to configure a
    more granular control of what is kept vs. ALL or AUTO. The reason this concept
    is important is that you may trying to use a feature that relies on Query Store
    but it doesn’t appear to be working. It could be that the query was not eligible
    to be kept in Query Store based on capture policies. You can read more about Query
    Store capture mode at [`https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store?#set-the-optimal-query-store-capture-mode`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store?#set-the-optimal-query-store-capture-mode).


    *   Query Store keeps all data within system tables within the context of a user
    database. This extends the storage required for the database. There are options
    (with defaults) that control what is the maximum size of the space used for Query
    Store and cleanup policies. In addition, there are ways to manually remove all
    data, or subsets of data, within Query Store. You can read more about Query Store
    maintenance at [`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios).


    Armed with this knowledge, in this section I will show you why I call Query Store
    in SQL Server 2022 *new* including the following:


    *   Query Store is now on by default for new databases.


    *   Query Store hints to shape query plans with no code changes.


    *   Query Store supports telemetry for queries against read-only replicas.


    *   Some new IQP features use Query Store to improve performance with no code
    changes.


    ### On by Default


    I remember vividly when we were talking about new features for project Dallas
    when Pedro Lopes and Joe Sack said to me, *“Bob*, we are going to turn on Query
    Store by default.” My reaction was *“Hey*, we don’t do that for SQL Server. We
    are pretty conservative when it comes to turning things like this on by default.”
    But their explanation as to why we were doing this was a good one.


    Here is a summary of the facts they presented:


    *   Query Store has been around for several releases since SQL Server 2016.


    *   We have this on by default for Azure SQL for millions of databases. And we
    have been doing this for several years.


    *   We changed the default on how to capture queries to a mode to ease burden
    on applications with ad hoc workloads (**QUERY_CAPTURE_MODE** to AUTO).


    *   We added a new **CUSTOM** option in SQL Server 2019 for QUERY_CAPTURE_MODE
    to give more control on what was captured by Query Store using the **QUERY_CAPTURE_POLICY**
    options.


    *   We plan to add Query Store hints and support for read replicas in SQL Server
    2022.


    *   Finally, and the most important reason, some new IQP scenarios would *require*
    Query Store. This statement really caught my eye. I remember saying something
    like “Say that again?” You will see what we mean by requiring Query Store when
    you read about new IQP scenarios for SQL Server 2022 in this and the next chapter.


    This is all nice, but I’m sure you are reading this and still may be asking, “Is
    there any impact to my application?”


    The answer as with any general question like this is “It depends.” All the reasons
    Joe and Pedro gave me previously make me feel comfortable telling anyone that
    the impact to any application with Query Store enabled could be negligible.


    Having said that here are a few thoughts in my personal opinion to consider:


    *   We only enable Query Store for newly created databases in SQL Server 2022\.
    Any databases restored from a previous version of SQL Server will only have Query
    Store enabled if it was already turned on.


    *   I always recommend to any customer to test their application with any system
    or program that is capturing telemetry. This includes third-party applications,
    use of Dynamic Management Views (DMVs), Extended Events, or Query Store.


    *   We have had Query Store on by default for Azure SQL Database for several years
    with no report of customer workloads being impacted.


    *   New capture policies allow you to “capture what you need,” therefore decreasing
    overall impact to the system.


    *   We still recommend for some production workloads the use of trace flag 7745
    to avoid impact of shutdown. You can read more about this trace flag and all the
    best practices for Query Store at [`https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store).'
  trans: "\n## 全新查询存储\n\n在我看来，查询存储是我们嵌入 SQL Server 引擎中最酷的功能之一。早在 2000 年代中期，著名的 Conor\
    \ Cunningham 就曾向我们客户支持团队的几个人提出过一种追踪查询性能的新方法。在此之前，我们都是通过“轮询”动态管理视图 (`DMVs`) 来持久化查询性能执行数据。Conor\
    \ 的想法是将有关查询性能执行的遥测数据直接内置于查询处理器本身。这些遥测数据将以系统表的形式持久化存储在用户数据库中。他称之为查询磁盘存储 (`QDS`)，也就是现在众所周知的查询存储。\n\
    \n经过几次迭代，Conor 这一创新梦想在 `SQL Server 2016` 中得以实现。它也是 Azure SQL Database 成功的关键一环，因为我们为所有新数据库默认启用了它。\n\
    \n时至今日，我仍然发现许多我交谈过的客户并未使用查询存储。有些人不太清楚它到底是什么，有些人听说过但未曾尝试启用，还有一些人用过但遇到了问题。\n\n到\
    \ `SQL Server 2019` 时，我们完成了新的增强功能，以修复一些性能问题，添加了等待统计信息（在 `SQL Server 2017` 中引入），并引入了额外的控件来帮助查询捕获和更好的数据存储管理。所有这些都为我们面向所有人推进全新的查询存储奠定了基础。\n\
    \n如果你初次接触查询存储，我建议你在阅读我们关于 `SQL Server 2022` 的增强功能之前，先通读我们的文档（[查询存储](https://aka.ms/querystore)）。考虑到这一点，当你在\
    \ `SQL Server 2022` 中使用新功能时，需要牢记关于查询存储的几个基本原则：\n\n*   查询存储有一个称为 **捕获模式** 的选项。捕获模式控制哪些查询会被保留在查询存储中。值为\
    \ `ALL` 意味着收集所有查询（嗯，并非完全是所有，因为像 `CREATE TABLE` 这样的 SQL 语句永远不会是查询存储的候选对象）。值为 `AUTO`\
    \ 意味着只收集有意义的查询，这实际上意味着只保留你关心的、需要收集性能信息的查询。值为 `CUSTOM` 允许你配置比 `ALL` 或 `AUTO` 更精细的控制，决定保留哪些查询。这个概念之所以重要，是因为你可能正在尝试使用一个依赖查询存储的功能，但它似乎不起作用。原因可能是根据捕获策略，该查询不符合保留在查询存储中的条件。你可以在\
    \ [设置最佳的查询存储捕获模式](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store?#set-the-optimal-query-store-capture-mode)\
    \ 阅读更多关于查询存储捕获模式的信息。\n\n*   查询存储将所有数据保留在用户数据库上下文中的系统表内。这扩展了数据库所需的存储空间。有一些选项（带有默认值）用于控制用于查询存储的空间最大大小和清理策略。此外，还可以手动删除查询存储中的所有数据或部分数据。你可以在\
    \ [使用查询存储监视性能 - 场景](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios)\
    \ 阅读更多关于查询存储维护的信息。\n\n掌握了这些知识后，在本节中，我将向你展示为什么我将 `SQL Server 2022` 中的查询存储称为*全新*的，包括以下内容：\n\
    \n*   查询存储现在对于新数据库默认开启。\n*   查询存储提示（Query Store hints）可在无需更改代码的情况下塑造查询计划。\n* \
    \  查询存储支持针对只读副本的查询的遥测数据。\n*   一些新的智能查询处理 (IQP) 功能使用查询存储来提升性能，且无需更改代码。\n\n### 默认开启\n\
    \n我清晰地记得，当我们讨论项目 Dallas（SQL Server 的代号）的新功能时，Pedro Lopes 和 Joe Sack 对我说：“Bob，我们打算默认开启查询存储。”我的反应是：“嘿，我们\
    \ SQL Server 不这么做。在默认开启这类功能方面，我们相当保守。”但他们解释为什么要这样做的理由很充分。\n\n以下是他们提出的事实概要：\n\n\
    *   查询存储自 `SQL Server 2016` 起已经存在多个版本。\n*   我们在 Azure SQL 中为数百万个数据库默认开启了此功能。而且我们已经这样做了好几年。\n\
    *   我们更改了捕获查询的默认模式，以减轻具有即席工作负载的应用程序的负担（将 `QUERY_CAPTURE_MODE` 改为 `AUTO`）。\n* \
    \  我们在 `SQL Server 2019` 中为 `QUERY_CAPTURE_MODE` 添加了一个新的 `CUSTOM` 选项，使用 `QUERY_CAPTURE_POLICY`\
    \ 选项来更精细地控制查询存储捕获的内容。\n*   我们计划在 `SQL Server 2022` 中添加查询存储提示和支持只读副本。\n*   最后，也是最重要的原因，一些新的智能查询处理\
    \ (IQP) 场景将*需要*查询存储。这句话确实引起了我的注意。我记得我说了类似“再说一遍？”的话。当你在本章和下一章阅读关于 `SQL Server 2022`\
    \ 的新 IQP 场景时，就会明白我们所说的“需要”查询存储是什么意思。\n\n这一切都很好，但我敢肯定你读到这里时可能仍在问：“这会对我的应用程序有影响吗？”\n\
    \n对于任何此类普遍问题，答案都是“视情况而定。”Joe 和 Pedro 之前给我的所有理由都让我可以放心地告诉任何人，为任何应用程序启用查询存储所带来的影响可能是微乎其微的。\n\
    \n话虽如此，以下是我个人认为需要考虑的几点想法：\n\n*   我们仅为 `SQL Server 2022` 中新创建的数据库启用查询存储。任何从早期版本\
    \ SQL Server 还原的数据库，只有在其原先已开启查询存储的情况下才会保持启用状态。\n*   我总是建议任何客户在使用任何捕获遥测数据的系统或程序时测试他们的应用程序。这包括第三方应用程序、动态管理视图\
    \ (`DMVs`) 的使用、扩展事件或查询存储。\n*   我们在 Azure SQL Database 中默认开启查询存储已有数年，未有客户工作负载受影响的报告。\n\
    *   新的捕获策略允许你“捕获所需”，从而减少对系统的整体影响。\n*   对于某些生产工作负载，我们仍然建议使用跟踪标志 `7745` 以避免关闭操作的影响。你可以在\
    \ [使用查询存储的最佳实践](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store)\
    \ 阅读更多关于此跟踪标志以及所有查询存储最佳实践的信息。\n\n    ```\n    DBCC TRACEON(7745, -1)\n    ```\n"
- fmt: '# Query Store Hints


    在2021年夏天，我们为 Azure SQL Database 引入了 Query Store hints 的概念。Query Store hints 的理念是在不更改应用程序代码的情况下塑造查询执行计划。


    > **Note**

    >

    > 您可以在此期 Data Exposed 节目中阅读关于 Query Store hints 最初发布的信息，由 Anna Hoffman 和 Joe Sack
    主讲：[https://youtu.be/pYB6Uik_Q7A](https://youtu.be/pYB6Uik_Q7A)。


    *查询提示*的概念并不新鲜，您可能已经在使用它们。通过向 T-SQL 语句添加 `OPTION` 子句，您可以影响查询优化器构建查询计划。我见过两个常用的查询提示是
    `RECOMPILE`（每次执行查询时重新编译）和 `MAXDOP`（在查询级别控制最大并行度）。您可以在[https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query](https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query)阅读所有可能的查询提示和示例。


    如果您没有使用查询提示，也不必担心。查询提示是为那些由于某种原因您的应用程序与查询处理器默认编译的查询计划配合不佳的场景而设计的。


    然而，出于实际生产工作负载的原因，确实需要这些提示。查询提示要求能够更改 T-SQL 语句。但是，如果 T-SQL 语句在应用程序代码中被调用，更改应用程序代码来应用提示不切实际或不可能，该怎么办？这正是
    Query Store hints 可以发挥作用的地方，因为查询优化器可以基于 Query Store 中存储的内容应用提示，而无需更改应用程序代码。


    ## 如何使用 Query Store Hints？


    以下是使用 Query Store hint 的步骤，假设 Query Store 已启用读写功能：


    *   执行查询，其计划存储在 Query Store 中。

    *   您使用 Query Store 目标视图找到要对其应用提示的查询的 `query_id`。

    *   您执行存储过程 `sys.sp_query_store_set_hints`，指定 `query_id` 和要应用的提示。

    *   您可以使用视图 `sys.query_store_query_hints` 查看现有的 Query Store hints。


    我们将提示保存在 Query Store 中，这样查询处理器将在下次执行该查询时使用提供的提示。由于提示是持久化的，它将在重启和计划缓存清除后依然存在。


    并非所有查询提示都支持 Query Store。有关支持的查询提示的完整列表，请查阅文档[https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sys-sp-query-store-set-hints-transact-sql](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sys-sp-query-store-set-hints-transact-sql)。还有一些情况下，根据给定查询的编译规则，查询优化器无法使用您指定的查询提示。这被称为
    Query Store hint *失败*，并将记录在视图 `sys.query_store_query_hints` 中。


    文档在[https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#examples](https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#examples)提供了一个非常好的端到端使用
    Query Store hints 的示例。我将在第5章中向您展示一个系统生成的 Query Store hint 的示例，称为**基数估计 (CE) 模型反馈**。


    ## 我应该在什么时候使用 Query Store Hint？


    虽然查询提示可能是您长期与应用程序一起使用的有用功能，但我见过的大多数查询提示用法都是临时措施。因此，当您想临时应用查询提示而不更改（或无法更改）应用程序代码时，Query
    Store hints 可以是一个极其有用的功能。在您想覆盖应用程序代码中查询的提示时，Query Store hints 也很方便。


    > **Note**

    >

    > 在使用 Query Store hints 之前，您应该了解一些使用它们的注意事项，您可以在[https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#query-store-hints-and-feature-interoperability](https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#query-store-hints-and-feature-interoperability)阅读相关内容。


    在使用 Query Store hint 之前，请确认您试图解决的问题无法通过其他方式完成。例如，许多人使用 `RECOMPILE` 或 `OPTIMIZE
    FOR` 提示来解决经典的**参数敏感计划**问题。在 SQL Server 2022 中，我们有一个针对此问题的新解决方案，可能让您避免使用那些查询提示。您可以在第5章中阅读更多关于**参数敏感计划
    (PSP)** 优化的信息。


    ## 这与计划指南有何不同？


    与 Query Store hints 类似，计划指南提供了一种在不更改应用程序代码的情况下塑造查询计划的方法。计划指南在 SQL Server 中已经存在了很多个版本。Query
    store hints 提供了一个更简单的接口来塑造查询计划，主要是因为您只需要向 Query Store 中存储的现有查询添加一个或多个查询提示。


    计划指南可以通过提供应用程序中查询的原始 SQL 文本或使用缓存中计划的计划句柄来创建。因此，Query Store hints 具有实现更简单的优势，并且可以用于随时间持久化的查询。计划指南优于
    Query Store hints 的一个优势是它们不需要启用 Query Store。


    # Query Store 对辅助副本的支持


    虽然 Query Store 是 SQL Server 的一项伟大创新，但一个经常被请求的增强功能是支持收集 Always On 可用性组中针对辅助只读副本运行的查询的性能执行统计信息。


    > **Note**

    >

    > 您可以在我们的[https://aka.ms/sqlfeedback](https://aka.ms/sqlfeedback)站点[https://feedback.azure.com/d365community/idea/eade91be-4e25-ec11-b6e6-000d3a4f0da0](https://feedback.azure.com/d365community/idea/eade91be-4e25-ec11-b6e6-000d3a4f0da0)上看到这个请求有多受欢迎。


    使用 SQL Server 2022，您现在可以配置 Always On 可用性组以支持在查询定向到只读副本时捕获统计信息。


    我认为深入理解这个新功能的最佳方式是回答一些“如何”问题。


    ## 如何配置？


    在 Always On 可用性组的主副本上启用 Query Store 后，您可以在主数据库的上下文中运行以下 T-SQL：


    ```sql

    ALTER DATABASE CURRENT FOR SECONDARY SET QUERY_STORE = ON ( OPERATION_MODE = READ_WRITE);

    ```


    > **Note**

    >

    > 在本书编写时，该功能尚未正式发布（GA），需要跟踪标志 12606 来启用此功能。请在正式发布时查阅文档，看此跟踪标志是否仍然必需。启用此功能时，将捕获可用性组中所有辅助副本的
    Query Store 信息。没有办法为每个辅助副本单独控制此设置。


    一旦您执行此语句，针对*任何*辅助副本执行的任何查询都将被捕获到 Query Store 中。


    但是，如果查询针对辅助副本运行，如果副本数据库是只读的，Query Store 如何捕获有关查询的信息呢？让我们看看它是如何工作的。'
  raw: '### Query Store Hints


    In the summer of 2021, we introduced the concept of Query Store hints for Azure
    SQL Database. The concept of Query Store hints is to shape query execution plans
    without changing application code.


    Note


    You can read about the original launch of Query Store hints in this episode of
    Data Exposed with Anna Hoffman and Joe Sack: [`https://youtu.be/pYB6Uik_Q7A`](https://youtu.be/pYB6Uik_Q7A).


    The concept of a *query hint* is not new, and you may use them already today.
    By adding an OPTION clause to your T-SQL statement, you can influence the query
    optimizer on the building of a query plan. Two common query hints I’ve seen used
    are RECOMPILE (for a compilation each time a query is executed) and MAXOP (control
    the max degree of parallelism at the query level). You can read about all the
    possible query hints and examples at [`https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query`](https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query).


    If you are not using query hints, don’t be concerned. Query hints are designed
    for scenarios where for some reason your application is not working well with
    the query plan compiled by the query processor by default.


    However, there are practical reasons when these hints are needed for production
    workloads. Query hints require the ability to change the T-SQL statement. But
    what if the T-SQL statement is called in application code and it is not practical
    or not possible to change application code to apply the hint? This is where Query
    Store hints can be beneficial because the query optimizer can apply the hint based
    on what is stored in Query Store without changing application code.


    #### How Do You Use Query Store Hints?


    Here is how you would use a Query Store hint assuming Query Store is enabled for
    read/write:


    *   A query is executed, and the plan is stored in Query Store.


    *   You find the **query_id** using Query Store catalog views for the query to
    which you want to apply the hint.


    *   You execute the stored procedure **sys.sp_query_store_set_hints** specifying
    the **query_id** and the hint you want to apply.


    *   You can view existing Query Store hints with the view **sys.query_store_query_hints.**


    We save the hint in Query Store so the query processor will use the hint provided
    for the next execution of the query. Because the hint is persisted, it will survive
    restarts and plan cache eviction.


    Not all query hints are supported with Query Store. For a complete list of supported
    query hints, check the documentation at [`https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sys-sp-query-store-set-hints-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sys-sp-query-store-set-hints-transact-sql).
    There are also some scenarios where the query optimizer cannot use a query hint
    you specify based on the compilation rules for a given query. This is called a
    Query Store hint *failure* and will be logged in the view **sys.query_store_query_hints**.


    The documentation has a very nice end-to-end example for using Query Store hints
    at [`https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#examples`](https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#examples).
    I’ll show you an example of a system-generated Query Store hint in Chapter [5](#525217_1_En_5_Chapter.xhtml)
    called **cardinality estimation (CE) model feedback**.


    #### When Should I Use a Query Store Hint?


    While query hints could be a useful feature for you to use long-term with your
    application, most of the uses of query hints I’ve seen are a temporary measure.
    Therefore, Query Store hints can be an extremely useful feature when you want
    to temporarily apply a query hint and not change (or can’t change) application
    code. Query Store hints are also nice in situations where you want to override
    a query hint in a query from the application code.


    Note


    There are some aspects of using Query Store hints you should understand before
    using them, which you can read about at [`https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#query-store-hints-and-feature-interoperability`](https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#query-store-hints-and-feature-interoperability).


    Before you use a Query Store hint, confirm that the problem you are trying to
    solve can’t be done another way. For example, many have used the RECOMPLIE or
    OPTIMIZE FOR hint to solve the classic problem of Parameter-Sensitive Plans. In
    SQL Server 2022, we have a new solution for this problem that may allow you to
    avoid the use of those query hints. You can read more about Parameter-Sensitive
    Plan (PSP) optimization in Chapter [5](#525217_1_En_5_Chapter.xhtml).


    #### How Is This Different Than Plan Guides?


    Like Query Store hints, plan guides provide a method to shape query plans without
    changing application code. Plan guides have been in SQL Server for many versions.
    Query store hints provide a much simpler interface to shape query plans mainly
    because you only need to add a query hint(s) to an existing query stored in Query
    Store.


    Plan guides can be created by providing the original SQL text of the query from
    the application or by using a plan handle from a plan in cache. Therefore, Query
    Store hints have the advantage of being a simpler method for implementation and
    can be used for queries persisted over time. One advantage plan guides have over
    Query Store hints is that they do not require Query Store to be enabled.


    ### Query Store Support for Secondary Replicas


    While Query Store has been a great innovation for SQL Server, a frequently requested
    enhancement is to support collecting performance execution statistics for queries
    run against secondary read replicas for Always On Availability Groups.


    Note


    You can see how popular this request has been on our [`https://aka.ms/sqlfeedback`](https://aka.ms/sqlfeedback)
    site at [`https://feedback.azure.com/d365community/idea/eade91be-4e25-ec11-b6e6-000d3a4f0da0`](https://feedback.azure.com/d365community/idea/eade91be-4e25-ec11-b6e6-000d3a4f0da0).


    With SQL Server 2022, you can now configure an Always On Availability Group to
    support capturing statistics if queries are directed at a read replica.


    I think the best way to dive deeper into this new capability is to answer some
    “how” questions.


    #### How to Do You Configure It?


    Once Query Store is enabled on the primary replica of the Always On Availability
    Group, you can run the following T-SQL in the context of the primary database:


    ```

    ALTER DATABASE CURRENT FOR SECONDARY SET QUERY_STORE = ON ( OPERATION_MODE = READ_WRITE);

    ```


    Note


    At the time of the writing of the book before General Availability, trace flag
    12606 was required to enable this feature. Please consult the documentation at
    General Availability to see if this trace flag is still required. When you enable
    this feature, Query Store information is captured for all secondary replicas in
    the availability group. There is no method to control this per secondary replica.


    Once you execute this statement, any query executed against *any* secondary replica
    will be captured in Query Store.


    But if the query is run against a secondary replica, how can Query Store capture
    information about the query if the replica database is read-only? Let’s see how
    it works.'
