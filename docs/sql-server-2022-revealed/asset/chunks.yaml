    优化的信息。


    ## 这与计划指南有何不同？


    与查询存储提示类似，计划指南提供了一种在不更改应用程序代码的情况下塑造查询计划的方法。计划指南在 SQL Server 中已经存在了很多个版本。查询存储提示提供了一个更简单的接口来塑造查询计划，主要是因为您只需要向查询存储中存储的现有查询添加一个或多个查询提示。


    计划指南可以通过提供应用程序中查询的原始 SQL 文本或使用缓存中计划的计划句柄来创建。因此，查询存储提示具有实现更简单的优势，并且可以用于随时间持久化的查询。计划指南优于查询存储提示的一个优势是它们不需要启用查询存储。


    # 查询存储对辅助副本的支持


    虽然查询存储是 SQL Server 的一项伟大创新，但一个经常被请求的增强功能是支持收集 Always On 可用性组中针对辅助只读副本运行的查询的性能执行统计信息。


    > **注意**

    >

    > 您可以在我们的[`aka.ms/sqlfeedback`](https://aka.ms/sqlfeedback)站点[`feedback.azure.com/d365community/idea/eade91be-4e25-ec11-b6e6-000d3a4f0da0`](https://feedback.azure.com/d365community/idea/eade91be-4e25-ec11-b6e6-000d3a4f0da0)上看到这个请求有多受欢迎。


    使用 SQL Server 2022，您现在可以配置 Always On 可用性组以支持在查询定向到只读副本时捕获统计信息。


    我认为深入理解这个新功能的最佳方式是回答一些“如何”问题。


    ## 如何配置？


    在 Always On 可用性组的主副本上启用查询存储后，您可以在主数据库的上下文中运行以下 T-SQL：


    ```sql

    ALTER DATABASE CURRENT FOR SECONDARY SET QUERY_STORE = ON ( OPERATION_MODE = READ_WRITE);

    ```


    > **注意**

    >

    > 在本书编写时，该功能尚未正式发布（GA），需要跟踪标志 12606 来启用此功能。请在正式发布时查阅文档，看此跟踪标志是否仍然必需。启用此功能时，将捕获可用性组中所有辅助副本的查询存储信息。没有办法为每个辅助副本单独控制此设置。


    一旦您执行此语句，针对*任何*辅助副本执行的任何查询都将被捕获到查询存储中。


    但是，如果查询针对辅助副本运行，如果副本数据库是只读的，查询存储如何捕获有关查询的信息呢？让我们看看它是如何工作的。'
- fmt: '#### 工作原理


    当你启用 Query Store 并捕获查询的性能信息时，它首先被记录在一组内存结构中。随后，Query Store 信息会异步刷新到磁盘（刷新到用户数据库中的一组系统表中）。运行时统计数据的刷新基于一个名为
    `DATA_FLUSH_INTERVAL_SECONDS` 的配置值。你可以在以下网址阅读更多关于 Query Store 如何收集信息的内容：[`https://docs.microsoft.com/sql/relational-databases/performance/how-query-store-collects-data`](https://docs.microsoft.com/sql/relational-databases/performance/how-query-store-collects-data)。


    如果你已为辅助副本启用了 Query Store 捕获，Query Store 信息会在辅助副本的内存结构中被捕获，但不会刷新到辅助副本数据库的磁盘（因为数据库是只读的）。相反，这些信息会被发送回主副本，并在那里刷新到磁盘。Always
    On 可用性组副本之间有一个*通道*可以相互通信，我们只需使用该通道将数据发送回主副本。SQL Server 2022 引擎得到了增强，能够理解这种发送回主副本的新信息类型，然后将数据添加到主副本的
    Query Store 中，如图 [4-2](#525217_1_En_4_Chapter.xhtml#Fig2) 所示。


    ![](Images/525217_1_En_4_Fig2_HTML.png)


    图 4-2：Query Store 与辅助副本


    让我们更详细地探索其工作流程。假设你已经设置并配置了一个 Always On 可用性组，用于在辅助副本上运行 Query Store。当用户对辅助读取副本发起查询时，引擎将在内存中收集
    Query Store 统计数据。这些统计数据不会在辅助副本上持久化，因为数据库是只读的。


    - 后台任务会在辅助副本引擎中将这些统计数据排入内存队列。在*某个时刻*（一个内部实现细节），这些统计数据将通过用于可用性组日志更改的同一通信通道（dbm
    端点）发送。我们努力确保这些性能统计数据的优先级低于日志更改，以免干扰日志更改的复制。


    注意


    在我撰写本章时，我们的团队正在研究是否可以启用系统存储过程 `sp_query_store_flush_db` 来强制从辅助副本向主副本发送统计数据。


    - 在主副本上，后台任务将接收这些 Query Store 统计数据并将其持久化到磁盘，同时跟踪副本详细信息和统计数据。由于这些统计数据存储在数据库中并且是记录的更改，它们也会像所有记录的更改一样被发送到辅助副本。


    - 现在，任何用户都可以针对主副本或辅助副本运行查询或报告来获取 Query Store 统计信息。


    为了区分在主副本和辅助副本上执行的查询，Query Store 视图 `sys.query_store_runtime_stats` 中添加了一个名为 `replica_group_id`
    的新列。该列映射到一个名为 `sys.query_store_replicas` 的新视图，该视图包含所有副本名称、角色及其 ID 值。


    关于此功能的预期行为，我认为有几点你应该了解：


    - 如果启用此功能，你可能需要增加 `MAX_STORAGE_SIZE_MB` 的值，特别是如果你有多个辅助副本并在其上执行查询时。


    - 查询结果不会立即出现在主副本上。由于我们使用相同的通道向副本复制更改，我们不希望对事务更改产生负面影响。因此，我们以延迟的方式将数据发送回主副本。目前没有可调整此时间的配置值。根据我的经验，在辅助副本上执行查询后，查询性能信息可能需要几分钟才会出现在主副本上。


    - 即使存在此延迟，如果你的应用程序对在 Always On 可用性组中复制的更改很敏感，则应仔细测试此选项，以确保用于副本更改的标准通信通道不受影响。吞吐量也可能取决于你在辅助副本上执行查询的频率以及可用性组中辅助副本的数量。


    - 唯一捕获 `replica_group_id` 的 Query Store 视图是 `sys.query_store_runtime_stats` 和
    `sys.query_store_wait_stats`。如果你想找出特定副本的*计划存储*（即 `Sys.query_store_query`）中的信息，你将需要联接到这些视图之一（使用
    `plan_id` 作为联接列）。换句话说，如果你只查询 `sys.query_store_plan`，你将无法判断计划是从主副本还是辅助副本捕获的。


    - 在撰写本章时，我们仍在研究使用 Query Store 的哪些功能可能支持或不支持只读副本。这包括 Query Store 提示、优化计划强制、DOP
    反馈和 CE 反馈。你可以在以下文档中跟踪此功能的最新更新：[`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#query-store-for-secondary-replicas`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#query-store-for-secondary-replicas)。


    #### 如何使用


    由于我们只是在增强现有的 Query Store 功能，你现在可以像以往一样使用 Query Store 来分析查询性能。而且因为所有数据都在主副本中，任何主副本数据库的备份都包含来自所有副本的信息。


    ### 用于 IQP 的存储


    由于 Query Store 数据持久化在数据库中，它能 survives 重启，包含重要的遥测信息，因此成为新 IQP 功能的完美“存储”。


    此外，由于 Query Store 具有持久化存储，查询处理器可以将特定信息保存在 Query Store 中以启用新功能。再者，引擎中的 Query Store
    实现具有后台任务，可用于执行分析以避免影响查询执行。


    例如，Query Store 后台任务可用于记录查询性能统计数据和针对有资格进行*并行度 (DOP) 反馈*的查询的*反馈*数据。这些数据持久化在 Query
    Store 表中，查询处理器在确定查询的并行度 (DOP) 时可以使用它。你可以在第 [5](#525217_1_En_5_Chapter.xhtml) 章阅读更多关于
    DOP 反馈的详细信息。


    因为特定的 IQP 功能依赖于 Query Store，所以正确维护和配置 Query Store 变得更加重要。你应该将 Query Store 视为一组*生产*数据（即使它是用户数据库中系统表的集合）。


    因此，请务必查阅以下关于 Query Store 最佳实践和维护的文档页面：


    - [`https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store)

    - [`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios)'
  raw: '#### How Does It Work?


    When you enable Query Store and performance information is captured for a query,
    it is first recorded in a set of memory structures. Asynchronously, Query Store
    information is flushed to disk (to a collection of system tables in the user database).
    Runtime statistics are flushed to disk based on a configuration value called **DATA_FLUSH_INTERVAL_SECONDS**.
    You can read more about how Query Store collects information at [`https://docs.microsoft.com/sql/relational-databases/performance/how-query-store-collects-data`](https://docs.microsoft.com/sql/relational-databases/performance/how-query-store-collects-data).


    If you have enabled Query Store capture for secondary replicas, Query Store information
    is captured in memory structures on the secondary replica, but not flushed to
    the disk for the secondary replica database (because the database is read-only).
    Instead, the information is sent back to the primary replica where it is flushed
    to disk. Always On Availability Group replicas have a *channel* to communicate
    with each other, and we simply use that channel to send data back to the primary.
    The SQL Server 2022 engine has been enhanced to understand this new type of information
    sent back to the primary and then adds the data to Query Store on the primary
    replica as seen in Figure [4-2](#525217_1_En_4_Chapter.xhtml#Fig2).


    ![](Images/525217_1_En_4_Fig2_HTML.png)


    A flowchart of query store and stats. The flow starts with queries and ends at
    query store queries for S Q L.


    Figure 4-2


    Query Store and secondary replicas


    Let’s explore more the flow of how this works. Let’s assume you have an Always
    On Availability Group set up and configured for Query Store on secondaries. When
    a user issues a query against the secondary read replica, the engine will collect
    Query Store stats in memory. These stats are not persisted on the secondary because
    the database is read-only.


    *   Background tasks will queue these stats in memory in the secondary replica
    engine. At *some point* (an internal implementation detail), these stats will
    be sent on the same communication channel used for availability group log changes
    (the dbm endpoint). We try to make sure that these performance stats have a lower
    priority than log changes so as not to disrupt replica of log changes.


    Note


    As I was writing this chapter, our team was investigating whether we could enable
    the system stored procedure **sp_query_store_flush_db** to force the sending of
    stats from the secondary to the primary.


    *   On the primary replica, background tasks will receive these Query Store stats
    and persist them to disk, tracking the replica details along with the stats. Since
    these stats are stored in the database and are logged changes, they are also sent
    to secondary replicas like all logged changes.


    *   Now, any user can run queries or reports for Query Store stats against the
    primary replica or secondary replicas.


    In order to distinguish the difference between queries on the primary and secondary
    replicas, a new column has been added to Query Store view **sys.query_store_runtime_stats**
    called **replica_group_id**. This maps to a new view called **sys.query_store_replicas**,
    which contains all the replica names, roles, and their ID value.


    There are a few things I think you should know about the expected behavior of
    this capability:


    *   If you enable this feature, you may need to increase the value of MAX_STORAGE_SIZE_MB,
    especially if you have multiple secondary replicas where you are executing queries.


    *   The results do not show up on the primary replica immediately. Since we use
    the same channel for replicating changes to replicas, we don’t want to negatively
    impact transaction changes. Therefore, we send back data to the primary in a delayed
    fashion. Today there is no configuration value to adjust this time. In my experience,
    it can take several minutes for query performance information to appear on the
    primary after executing a query on a secondary replica.


    *   Even with this delay, if your application is sensitive to changes to be replicated
    in your Always On Availability Group, you should test this option carefully to
    ensure the use of the standard communication channel for replica changes is not
    impacted. Throughput can also depend on how often you execute queries on secondary
    replicas and how many secondary replicas are in the availability group.


    *   The only Query Store views that capture the **replica_group_id** are **sys.query_store_runtime_stats**
    and **sys.query_store_wait_stats**. If you want to find out information in the
    *plan store* (i.e., **Sys.query_store_query**) specific to a replica, you will
    need to join to one of these views (using the **plan_id** as the join column).
    In other words, if you only query **sys.query_store_plan**, you will not be able
    to tell whether plans were captured from the primary or secondary replicas.


    *   At the time of the writing of this chapter, we were still working out what
    features that use Query Store may or may not be supported for read replicas. This
    includes Query Store hints, optimized plan forcing, DOP feedback, and CE feedback.
    You can keep track of all the latest updates with this feature in the documentation
    at [`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#query-store-for-secondary-replicas`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#query-store-for-secondary-replicas).


    #### How Do You Use It?


    Since we are just enhancing the existing Query Store functionality, you can now
    use Query Store like you do today to analyze query performance. And because all
    the data is in the primary replica, any backup of the primary replica database
    includes all the information from all replicas.


    ### Store for IQP


    Since Query Store data is persisted in the database, it survives restarts, contains
    important telemetry information, and therefore serves as a perfect “store” for
    new IQP features.


    In addition, since Query Store has persistent storage, the query processor can
    save specific information in Query Store to enable new capabilities. Furthermore,
    Query Store implementation in the engine has background tasks, which can be used
    to perform analysis to avoid impacting query execution.


    For example, Query Store background tasks can be used to record query performance
    statistics and *feedback* data for queries that are eligible for **degree of parallelism
    (DOP) feedback**. This data is persisted in Query Store tables and can be used
    by the query processor when determining the degree of parallelism (DOP) for a
    query. You can read more about the details of DOP feedback in Chapter [5](#525217_1_En_5_Chapter.xhtml).


    Because specific IQP features rely on Query Store, it is even more important to
    maintain and configure Query Store properly. You should treat Query Store as a
    *production* set of data (even though it is a collection of system tables within
    the user database).


    Therefore, be sure to review these documentation pages on best practices and maintenance
    of Query Store:


    *   [`https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store).


    *   [`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios)'
