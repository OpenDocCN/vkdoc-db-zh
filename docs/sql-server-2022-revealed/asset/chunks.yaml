    \ on dbcompat 140 or 150.\n\nNote\n\nApproximate distinct was added to SQL Server\
    \ 2019 independent of dbcompat level. You can read more at [`https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql).\n\
    \nIn SQL Server 2022, if you are using dbcompat 140 or greater, then you can take\
    \ advantage of enhancements for **memory grant feedback**.\n\nIn Chapter [2](#525217_1_En_2_Chapter.xhtml)\
    \ of *SQL Server 2019 Revealed*, I provided a detailed background and explanation\
    \ of memory grant feedback. Let me summarize here the key points I made in that\
    \ chapter about memory grant feedback.\n\nThere are certain operators in a query\
    \ plan that require their own memory allocation such as hash joins and sorts.\
    \ When a query is compiled, SQL Server will decide how much memory is needed for\
    \ these types of operators; this is called a *memory grant*. I love this detailed\
    \ blog post by one of our longtime developers Jay Choe on memory grants: [`https://docs.microsoft.com/en-us/archive/blogs/sqlqueryprocessing/understanding-sql-server-memory-grant`](https://docs.microsoft.com/en-us/archive/blogs/sqlqueryprocessing/understanding-sql-server-memory-grant).\
