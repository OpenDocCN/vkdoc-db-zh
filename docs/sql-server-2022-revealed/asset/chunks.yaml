    sense said that it seemed like it could cause more harm than good. I eventually
    did some detailed research on this topic, which led me to recommend that using
    eight files for eight CPUs and then adding by four until you see the performance
    balance for your workload would be the best approach. You can see more details
    about this approach in a presentation I did way back in the PASS Summit in 2011
