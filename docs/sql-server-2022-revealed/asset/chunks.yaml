- fmt: "### How Does AAD Authentication Work?\n\nIn Azure SQL, we enhanced the engine\
    \ to communicate directly with AAD using protocols like OAuth and OpenID. Most\
    \ developers authenticate users for AAD using libraries such as [`https://docs.microsoft.com/azure/active-directory/develop/reference-v2-libraries`](https://docs.microsoft.com/azure/active-directory/develop/reference-v2-libraries).\
    \ SQL Server as a host engine needed to do this authentication on behalf of the\
    \ application. Since AAD doesn’t allow direct communication to any programs, there\
    \ is some setup required for SQL Server such as an `Azure app registration` and\
    \ certificates. You can read more on the details about the use of these protocols\
    \ with AAD at [`https://docs.microsoft.com/en-us/azure/active-directory/develop/active-directory-v2-protocols`](https://docs.microsoft.com/en-us/azure/active-directory/develop/active-directory-v2-protocols).\n\
    \nFor SQL Server to have all the right information to communicate with AAD, it\
    \ needs specific information stored somewhere. Therefore, this is where the `Azure\
    \ extension for SQL Server` comes in. The extension communicates with Azure during\
    \ your setup of AAD to write into the Windows registry information the engine\
    \ can read and use to communicate with AAD.\n\nNote\n\nThe registry keys are internal\
    \ to the product, but if you have access, you can see them at `HKEY_LOCAL_MACHINE\\\
    SOFTWARE\\Microsoft\\Microsoft SQL Server\\MSSQL15.MSSQLSERVER\\MSSQLServer\\\
    FederatedAuthentication`. Linux uses similar settings in the `mssql.conf` file.\n\
    \nAAD authentication for SQL Server is separate from Windows authentication. These\
    \ are not integrated together. Azure SQL Managed Instance does provide a service\
    \ to keep your Windows authentication accounts but integrate your authentication\
    \ with AAD. You can read more at [`https://docs.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview`](https://docs.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview).\n\
    \nKeep up to date with all the latest information about SQL Server and AAD at\
    \ [`https://aka.ms/aadsqlserver`](https://aka.ms/aadsqlserver).\n\n### Setting\
    \ Up and Using AAD Authentication\n\nLet’s walk through an exercise to set up\
    \ and configure AAD authentication for SQL Server 2022. These steps are based\
    \ on the following tutorial at [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial).\n\
    \n#### Prerequisites\n\nThe following are prerequisites to set up and configure\
    \ AAD for SQL Server 2022. I will admit to you that there are requirements for\
    \ the account you use with your Azure subscription that may take you some time\
    \ to work through.\n\n*   A virtual machine or computer with at least two CPUs\
    \ and 8Gb RAM. Your virtual machine or computer needs to be capable of connecting\
    \ to Azure over the Internet.\n*   SQL Server 2022 Evaluation Edition. You will\
    \ need the database engine feature, and you will also need to set up the `Azure\
    \ extension for SQL Server` option during or after setup. You can use instructions\
    \ that I created in Chapter [2](#525217_1_En_2_Chapter.xhtml) of the book under\
    \ the section titled “`Setting Up the Azure Extension for SQL Server`” or use\
    \ the instructions in the documentation at [`https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-installation-wizard-setup`](https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-installation-wizard-setup).\
    \ For Linux users, please check the Linux documentation at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#azure-ad`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#azure-ad).\n\
    *   An Azure subscription using an Azure Active Directory (AAD) account in your\
    \ organization you have deemed to be the `AAD admin` for SQL Server. This account\
    \ should have the following permissions:\n    *   Member of the Azure Connected\
    \ Machine Onboarding group or Contributor role in the resource group associated\
    \ with the `Azure extension for SQL Server`\n    *   Member of the Azure Connected\
    \ Machine Resource Administrator role in the resource group associated with the\
    \ `Azure extension for SQL Server`\n    *   Member of the Reader role in the resource\
    \ group associated with the `Azure extension for SQL Server`\n    *   Permissions\
    \ to create an Azure Key Vault\n\nImportant\n\nYou will need to be able to grant\
    \ `admin consent` for an Azure application. In order to grant admin consent, your\
    \ AAD account must be a member of the Azure AD Global Administrator or Privilege\
    \ Role Administrator. It is possible in your organization you don’t have this\
    \ permission, so either you will need to be granted this permission or have another\
    \ AAD administrator configure this. Do not move forward until you have this permission\
    \ resolved.\n\n*   SQL Server Management Studio (`SSMS`). The latest 18.x build\
    \ or 19.x build will work.\n*   A copy of the scripts from book samples from the\
    \ `ch3_cloudconnected\\aad` folder."
  raw: "### How Does AAD Authentication Work?\n\nIn Azure SQL, we enhanced the engine\
    \ to communicate directly with AAD using protocols like OAuth and OpenID. Most\
    \ developers authenticate users for AAD using libraries such as [`https://docs.microsoft.com/azure/active-directory/develop/reference-v2-libraries`](https://docs.microsoft.com/azure/active-directory/develop/reference-v2-libraries).\
    \ SQL Server as a host engine needed to do this authentication on behalf of the\
    \ application. Since AAD doesn’t allow direct communication to any programs, there\
    \ is some setup required for SQL Server such as an *Azure app registration* and\
    \ certificates. You can read more on the details about the use of these protocols\
    \ with AAD at [`https://docs.microsoft.com/en-us/azure/active-directory/develop/active-directory-v2-protocols`](https://docs.microsoft.com/en-us/azure/active-directory/develop/active-directory-v2-protocols).\n\
    \nFor SQL Server to have all the right information to communicate with AAD, it\
    \ needs specific information stored somewhere. Therefore, this is where the **Azure\
    \ extension for SQL Server** comes in. The extension communicates with Azure during\
    \ your setup of AAD to write into the Windows registry information the engine\
    \ can read and use to communicate with AAD.\n\nNote\n\nThe registry keys are internal\
    \ to the product, but if you have access, you can see them at HKEY_LOCAL_MACHINE\\\
    SOFTWARE\\Microsoft\\Microsoft SQL Server\\MSSQL15.MSSQLSERVER\\MSSQLServer\\\
    FederatedAuthentication. Linux uses similar settings in the mssql.conf file.\n\
    \nAAD authentication for SQL Server is separate from Windows authentication. These\
    \ are not integrated together. Azure SQL Managed Instance does provide a service\
    \ to keep your Windows authentication accounts but integrate your authentication\
    \ with AAD. You can read more at [`https://docs.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview`](https://docs.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview).\n\
    \nKeep up to date with all the latest information about SQL Server and AAD at\
    \ [`https://aka.ms/aadsqlserver`](https://aka.ms/aadsqlserver).\n\n### Setting\
    \ Up and Using AAD Authentication\n\nLet’s walk through an exercise to set up\
    \ and configure AAD authentication for SQL Server 2022\\. These steps are based\
    \ on the following tutorial at [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial).\n\
    \n#### Prerequisites\n\nThe following are prerequisites to set up and configure\
    \ AAD for SQL Server 2022\\. I will admit to you that there are requirements for\
    \ the account you use with your Azure subscription that may take you some time\
    \ to work through.\n\n*   A virtual machine or computer with at least two CPUs\
    \ and 8Gb RAM. Your virtual machine or computer needs to be capable of connecting\
    \ to Azure over the Internet.\n\n*   SQL Server 2022 Evaluation Edition. You will\
    \ need the database engine feature, and you will also need to set up the **Azure\
    \ extension for SQL Server** option during or after setup. You can use instructions\
    \ that I created in Chapter [2](#525217_1_En_2_Chapter.xhtml) of the book under\
    \ the section titled “**Setting Up the Azure Extension for SQL Server**” or use\
    \ the instructions in the documentation at [`https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-installation-wizard-setup`](https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-installation-wizard-setup).\
    \ For Linux users, please check the Linux documentation at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#azure-ad`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#azure-ad).\n\
    \n*   An Azure subscription using an Azure Active Directory (AAD) account in your\
    \ organization you have deemed to be the **AAD admin** for SQL Server. This account\
    \ should have the following permissions:\n    *   Member of the Azure Connected\
    \ Machine Onboarding group or Contributor role in the resource group associated\
    \ with the Azure extension for SQL Server\n\n    *   Member of the Azure Connected\
    \ Machine Resource Administrator role in the resource group associated with the\
    \ Azure extension for SQL Server\n\n    *   Member of the Reader role in the resource\
    \ group associated with the Azure extension for SQL Server\n\n    *   Permissions\
    \ to create an Azure Key Vault\n\nImportant\n\nYou will need to be able to grant\
    \ **admin consent** for an Azure application. In order to grant admin consent,\
    \ your AAD account must be a member of the Azure AD Global Administrator or Privilege\
    \ Role Administrator. It is possible in your organization you don’t have this\
    \ permission, so either you will need to be granted this permission or have another\
    \ AAD administrator configure this. Do not move forward until you have this permission\
    \ resolved.\n\n*   SQL Server Management Studio (SSMS). The latest 18.x build\
    \ or 19.x build will work.\n\n*   A copy of the scripts from book samples from\
    \ the **ch3_cloudconnected\\aad** folder."
  trans: "\n### Azure Active Directory (AAD) 认证如何工作？\n\n在 Azure SQL 中，我们增强了引擎，使其能够使用\
    \ OAuth 和 OpenID 等协议直接与 AAD 通信。大多数开发者使用诸如 [`https://docs.microsoft.com/azure/active-directory/develop/reference-v2-libraries`](https://docs.microsoft.com/azure/active-directory/develop/reference-v2-libraries)\
    \ 之类的库为 AAD 进行用户认证。而 SQL Server 作为宿主引擎，需要代表应用程序执行此认证。由于 AAD 不允许任何程序直接进行通信，因此 SQL\
    \ Server 需要进行一些设置，例如 `Azure 应用注册` 和证书。你可以在 [`https://docs.microsoft.com/en-us/azure/active-directory/develop/active-directory-v2-protocols`](https://docs.microsoft.com/en-us/azure/active-directory/develop/active-directory-v2-protocols)\
    \ 阅读更多关于在 AAD 中使用这些协议的详细信息。\n\n为了使 SQL Server 拥有与 AAD 通信所需的所有正确信息，它需要将特定信息存储在某个地方。因此，`Azure\
    \ SQL Server 扩展` 正是在这里发挥作用。该扩展会在你设置 AAD 的过程中与 Azure 通信，将信息写入 Windows 注册表，供引擎读取并用于与\
    \ AAD 通信。\n\n注意\n\n注册表项对产品是内部的，但如果你有访问权限，可以在 `HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\\
    Microsoft SQL Server\\MSSQL15.MSSQLSERVER\\MSSQLServer\\FederatedAuthentication`\
    \ 看到它们。Linux 在 `mssql.conf` 文件中使用类似的设置。\n\nSQL Server 的 AAD 认证与 Windows 认证是分开的。它们并未集成在一起。Azure\
    \ SQL 托管实例提供了一项服务，可以保留你的 Windows 认证账户，但将你的认证与 AAD 集成。你可以在 [`https://docs.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview`](https://docs.microsoft.com/azure/azure-sql/managed-instance/winauth-azuread-overview)\
    \ 阅读更多信息。\n\n请在 [`https://aka.ms/aadsqlserver`](https://aka.ms/aadsqlserver) 保持对\
    \ SQL Server 和 AAD 所有最新信息的更新。\n\n### 设置和使用 AAD 认证\n\n让我们通过一个练习来为 SQL Server 2022\
    \ 设置和配置 AAD 认证。这些步骤基于 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial)\
    \ 的教程。\n\n#### 先决条件\n\n以下是设置和配置 SQL Server 2022 AAD 的先决条件。我需要向你说明，你用于 Azure 订阅的账户有一些要求，可能需要你花费一些时间来完成。\n\
    \n*   一个至少配备两个 CPU 和 8GB 内存的虚拟机或计算机。你的虚拟机或计算机需要能够通过互联网连接到 Azure。\n*   SQL Server\
    \ 2022 评估版。你需要数据库引擎功能，并且需要在安装期间或之后设置 `Azure SQL Server 扩展` 选项。你可以参考我在本书第 2 章“`设置\
    \ Azure SQL Server 扩展`”一节中创建的说明，或使用文档 [`https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-installation-wizard-setup`](https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-installation-wizard-setup)\
    \ 中的说明。对于 Linux 用户，请查阅 Linux 文档 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#azure-ad`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-configure-mssql-conf#azure-ad)。\n\
    *   一个 Azure 订阅，使用你组织中已确定为 SQL Server `AAD 管理员` 的 Azure Active Directory (AAD)\
    \ 账户。此账户应具有以下权限：\n    *   Azure Connected Machine Onboarding 组的成员，或与 `Azure SQL\
    \ Server 扩展` 关联的资源组中的贡献者角色\n    *   与 `Azure SQL Server 扩展` 关联的资源组中的 Azure Connected\
    \ Machine Resource Administrator 角色成员\n    *   与 `Azure SQL Server 扩展` 关联的资源组中的读取者角色成员\n\
    \    *   创建 Azure Key Vault 的权限\n\n重要提示\n\n你需要能够为 Azure 应用程序授予 `管理员同意`。为了授予管理员同意，你的\
    \ AAD 账户必须是 Azure AD 全局管理员或特权角色管理员的成员。在你的组织中，你可能没有此权限，因此你需要被授予此权限，或者让另一位 AAD 管理员来配置。在解决此权限问题之前，请勿继续。\n\
    \n*   SQL Server Management Studio (`SSMS`)。最新的 18.x 或 19.x 版本均可使用。\n*   一本从本书示例的\
    \ `ch3_cloudconnected\\aad` 文件夹中复制的脚本副本。\n"
- fmt: "# Set Up AAD with SQL Server 2022\n\n![](Images/525217_1_En_3_Fig40_HTML.png)\n\
    \n一张截图显示了“添加访问策略”选项卡。为密钥权限、机密权限和证书权限选择的选项分别为0、2和2。\n\n**图 3-40** 为Azure Key Vault添加访问策略\n\
    \n1.  权限正确配置后，创建一个新的 `Azure Key Vault` 资源。Azure Key Vault是Azure的一项服务，用于存储和保护密钥、机密和证书。使用此快速入门指南在\
    \ [`https://docs.microsoft.com/azure/key-vault/general/quick-create-portal`](https://docs.microsoft.com/azure/key-vault/general/quick-create-portal)\
    \ 创建新的密钥保管库。使用与SQL Server Azure Arc注册相同的资源组和区域。将你的AAD管理员账户添加到所创建密钥保管库的“贡献者”角色中。\n\
    \n2.  设置SQL Server 2022实例访问Azure Key Vault。使用密钥保管库资源菜单上的“访问策略”选项。选择“添加访问策略”。“密钥权限”保持选中0。为“机密”和“证书”添加“获取”和“列出”权限。然后对于“选择主体”，使用你的SQL\
    \ Server主机名称（即Azure Arc SQL Server的名称）。你的屏幕应如图[3-40](#525217_1_En_3_Chapter.xhtml#Fig40)所示。\n\
    \    点击`Add`，然后点击`Save`。\n\n3.  现在，将Azure Key Vault的访问权限授予你希望设为SQL Server AAD管理员的AAD账户。这与上一步骤类似，只是对于密钥权限，你需要“获取”、“列出”和“创建”。对于机密，你需要“获取”、“列出”和“设置”；对于证书，你需要“获取”、“列出”和“创建”。如果你使用AAD管理员账户创建了Azure\
    \ Key Vault，则可能不需要此步骤。\n\n4.  现在我们将使用Azure门户设置SQL Server的AAD管理员。\n    > **注意** 还有其他设置选项，包括az\
    \ CLI、PowerShell和ARM模板。要了解更多信息，请参阅 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial#setting-up-the-azure-ad-admin-for-the-sql-server`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial#setting-up-the-azure-ad-admin-for-the-sql-server)\
    \ 上的文档。\n\n    在Azure门户中找到你的SQL Server Azure Arc资源。你可以通过在门户顶部的“搜索”字段中键入*SQL Server*，然后在服务下选择`SQL\
    \ Server – Azure Arc`来完成此操作。选择你的SQL Server实例。\n\n    在此资源的资源菜单中，转到“设置”下的`Azure\
    \ Active Directory`。现在选择`设置管理员`。选择你选定的AAD账户作为AAD管理员。现在，你将填写屏幕上的信息来设置管理员：\n   \
    \ *   选择`服务管理的证书`。\n    *   将你的密钥保管库更改为已创建的Azure Key Vault。\n    *   选择`服务管理的应用程序注册`。\n\
    \    *   将`Purview`选项保持为禁用状态。我们将在本章的下一节启用Purview策略。\n\n    你的选项应与图[3-41](#525217_1_En_3_Chapter.xhtml#Fig41)相似。\n\
    \n    ![](Images/525217_1_En_3_Fig41_HTML.png)\n\n    一张截图显示了`bwsql2022`。左侧窗格中选中了“Azure\
    \ Active Directory”。SQL Server的服务证书和应用程序注册是服务管理的。\n\n    **图 3-41** 为SQL Server设置AAD管理员\n\
    \n    现在选择`Save`。屏幕顶部将显示`正在进行…`。Azure现在正在通过Azure SQL Server扩展向你的SQL Server发送信息。这可能需要几分钟时间。成功时，你将看到如下消息：\n\
    \    > 已成功保存，但可能需要授予应用‘bwsql2022-MSSQLSERVER<nnnnn>’的管理员同意。\n    >\n    > **注意**\n\
    \    >\n    > 如本章前面所述，现在会有信息写入你的SQL Server的Windows注册表（对于Linux则是`mssql.conf`文件），路径类似于`Computer\\\
    HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\\
    MSSQLServer\\FederatedAuthentication`。我们不支持你修改这些注册表项，但了解我们的软件如何连接是很有趣的。SQL Server\
    \ 2022引擎经过增强，可读取这些密钥以了解如何连接Azure Active Directory进行身份验证。\n\n    此步骤成功后，你应该在SQL\
    \ Server的`ERRORLOG`中看到以下条目：\n    ```\n    AAD Authentication is enabled. This\
    \ is an informational message only; no user action is required.\n    ```\n   \
    \ AAD管理员账户会自动作为登录名添加到SQL Server中，并成为`sysadmin`角色的成员。\n\n5.  这直接引出了设置的最后一步。SQL\
    \ Server必须使用Azure应用程序作为与AAD通信的一部分。你在上一步看到的应用名称是自动为你创建的。现在你必须为该Azure应用程序授予`管理员同意`。在Azure门户中，搜索`Azure\
    \ Active Directory`并选择你的组织。在左侧菜单上选择`应用程序注册`。你想要选择的应用程序是步骤4中创建的那个（我的是‘bwsql2022-MSSQLSERVER<nnnnn>’）。然后在左侧菜单上选择`API权限`。如果你拥有适当的权限，请选择`授予管理员同意…`。\n\
    \    > **注意** 此步骤要求你拥有AAD的“全局管理员”或“特权角色管理员”权限。这些是高度特权权限，因此你可能需要组织中的某人来执行此步骤。\n\
    \n    如果你没有适当的权限，此选项将显示为灰色。此步骤完成后，你的屏幕应如图[3-42](#525217_1_En_3_Chapter.xhtml#Fig42)所示。\n\
    \    ![](Images/525217_1_En_3_Fig42_HTML.png)\n    一张截图显示了`bwsql2022`的`API`权限。右侧窗格列出了在`Microsoft\
    \ Graph`下配置的5个权限。\n    **图 3-42** 授予Azure应用AAD身份验证的访问权限\n    如果你不执行此步骤，你仍然可以使用为SQL\
    \ Server 2022设置的AAD管理员账户。但你将无法向SQL Server添加任何其他AAD登录名或用户。你会遇到类似`Server identity\
    \ does not have permissions to access MS Graph`的错误。\n    > **注意**\n    >\n   \
    \ > MS Graph代表Microsoft Graph，它是Microsoft Identity平台中用于Azure应用程序访问的一项服务。\n\n我知道设置这些需要很多步骤。但当你全部完成后，使用AAD身份验证就变得非常简单且强大。"
  raw: '#### Set Up AAD with SQL Server 2022


    ![](Images/525217_1_En_3_Fig40_HTML.png)


    A screenshot shows the add access policy tab. The options selected for key permissions,
    secret permissions, and certificate permissions are 0, 2, and 2 respectively.


    Figure 3-40


    Adding access policy for Azure Key Vault


    1.  With your permissions properly configured, create a new **Azure Key Vault**
    resource. Azure Key Vault is an Azure service to store and protect keys, secrets,
    and certificates. Use this quick-start guide to create a new key vault at [`https://docs.microsoft.com/azure/key-vault/general/quick-create-portal`](https://docs.microsoft.com/azure/key-vault/general/quick-create-portal).
    Use the same resource group and region from the SQL Server Azure Arc registration.
    Add your AAD admin account in the Contributor role for the key vault you created.


    2.  Set up access for the SQL Server 2022 instance to the Azure Key Vault. Use
    the Access policies option on the resource menu for the key vault. Select Add
    access policy. Keep 0 selected for Key permissions. Add the Get and List permissions
    for Secret and Certificate. Then for Select principal, use the name of the host
    of your SQL Server (the name of the Azure Arc SQL Server). Your screen should
    look like Figure [3-40](#525217_1_En_3_Chapter.xhtml#Fig40).


    Click **Add** and then **Save**.


    1.  Now grant access to the Azure Key Vault to the AAD account you would like
    to make the AAD admin for SQL Server. This is a similar process to the preceding
    step except for Key permissions you need Get, List, and Create. You also need
    Get, List, and Set for Secret and Get, List, and Create for Certificate. It is
    possible you don’t need this step if you used the AAD admin account to create
    the Azure Key Vault.


    2.  Now we will set up the AAD admin for SQL Server using the Azure portal.


    **Note** There are other options for set this including az CLI, PowerShell, and
    an ARM template. To learn more see the documentation at [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial#setting-up-the-azure-ad-admin-for-the-sql-server`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial#setting-up-the-azure-ad-admin-for-the-sql-server).


    Find your SQL Server Azure Arc resource in the Azure portal. You can do this by
    typing the word *SQL Server* in the Search field at the top of the portal and
    selecting **SQL Server – Azure Arc** under services. Choose your SQL Server instance.


    On the resource menu for this resource under Settings, choose Azure Active Directory.
    Now choose Set Admin. Pick the AAD account you have selected as your AAD admin.
    You now will fill out information on a screen to set the admin:


    *   Choose Service-managed cert.


    *   Change your key vault to the Azure Key Vault you have created.


    *   Choose Service-managed app registration.


    *   Leave the option for Purview disabled. We will enable Purview policies in
    the next section of the chapter.


    Your options should look similar to Figure [3-41](#525217_1_En_3_Chapter.xhtml#Fig41).


    ![](Images/525217_1_En_3_Fig41_HTML.png)


    A screenshot shows the b w s q l 2022\. The Azure active directory is selected
    in the left pane. The service certificate and app registration of the s q l server
    are service managed.


    Figure 3-41


    Setting the AAD admin for SQL Server


    Now select **Save**. The top of the screen will show **in Progress…** Azure is
    now sending information to your SQL Server through the Azure extension for SQL
    Server. This can take a few minutes. When successful you will see a message like


    Saved successfully, but admin consent may need to be granted to app ''bwsql2022-MSSQLSERVER<nnnnn>''


    Note


    As mentioned earlier in this chapter, you will now have information written into
    the Windows registry of your SQL Server (or mssql.conf file for Linux) with a
    path like Computer\HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL16.MSSQLSERVER\MSSQLServer\FederatedAuthentication.
    We don’t support you modifying these registry keys, but it is interesting to see
    how our software connects. The SQL Server 2022 engine is enhanced to read these
    keys to know how to connect with Azure Active Directory to authenticate.


    When this step is successful, you should see the following entry in your ERRORLOG
    for SQL Server:


    ```

    AAD Authentication is enabled. This is an informational message only; no user
    action is required.

    ```


    The AAD admin account is added automatically as a login in SQL Server and placed
    as a member of the sysadmin role.


    1.  This leads right into the last step for setup. SQL Server has to use an Azure
    application as part of communicating with AAD. The app name you saw in the last
    step was created automatically for you. Now you must grant an *admin consent*
    for the Azure application. In the Azure portal, search for Azure Active Directory
    and choose your organization. Select **App registrations** on the left-hand menu.
    The application you want to choose was the one created in step 4 (mine is ''bwsql2022-MSSQLSERVER<nnnnn>).
    Now select **API permissions** on the left-hand menu. If you have the proper rights,
    select **Grant admin consent…**


    **Note** This is the step that requires you to have Global Administrator or Privileged
    Role Administrator rights with your AAD. These are highly privileged rights, so
    you may need someone in your organization to perform this step.


    If you don’t have proper permissions, this option will be grayed out. When this
    step is done, your screen should like Figure [3-42](#525217_1_En_3_Chapter.xhtml#Fig42).


    ![](Images/525217_1_En_3_Fig42_HTML.png)


    A screenshot shows a p i permissions for b w s q l 2022\. The right pane for a
    p i permission lists 5 configured permissions under Microsoft graph.


    Figure 3-42


    Granting access to the Azure app for AAD authentication


    If you don’t do this step, you can still use the AAD admin account already set
    up for SQL Server 2022\. But you will not be able to add any other AAD logins
    or users to SQL Server. You will get an error like `Server identity does not have
    permissions to access MS Graph`.


    Note


    MS Graph stands for Microsoft Graph, which is a service in the Microsoft Identity
    platform used for Azure application access.


    I know there are a lot of steps to set this up. But when you have it all done,
    using AAD authentication is very easy and powerful.'
  trans: "\n# 使用 SQL Server 2022 设置 Azure Active Directory 身份验证\n\n![](img/525217_1_En_3_Fig40_HTML.png)\n\
    \n一张截图显示了“添加访问策略”选项卡。为密钥权限、机密权限和证书权限选择的选项分别为 0、2 和 2。\n\n**图 3-40** 为 Azure Key\
    \ Vault 添加访问策略\n\n1.  权限正确配置后，创建一个新的 `Azure Key Vault` 资源。Azure Key Vault 是 Azure\
    \ 的一项服务，用于存储和保护密钥、机密和证书。使用此快速入门指南在 [`https://docs.microsoft.com/azure/key-vault/general/quick-create-portal`](https://docs.microsoft.com/azure/key-vault/general/quick-create-portal)\
    \ 创建新的密钥保管库。使用与注册 SQL Server Azure Arc 时相同的资源组和区域。将你的 Azure Active Directory 管理员账户添加到所创建密钥保管库的“贡献者”角色中。\n\
    \n2.  设置 SQL Server 2022 实例访问 Azure Key Vault。使用密钥保管库资源菜单上的“访问策略”选项。选择“添加访问策略”。“密钥权限”保持选中\
    \ 0。为“机密”和“证书”添加“获取”和“列出”权限。然后对于“选择主体”，使用你的 SQL Server 主机名称（即 Azure Arc SQL Server\
    \ 的名称）。你的屏幕应如图 3-40 所示。\n    点击`Add`，然后点击`Save`。\n\n3.  现在，将 Azure Key Vault 的访问权限授予你希望设为\
    \ SQL Server Azure Active Directory 管理员的账户。这与上一步骤类似，只是对于密钥权限，你需要“获取”、“列出”和“创建”。对于机密，你需要“获取”、“列出”和“设置”；对于证书，你需要“获取”、“列出”和“创建”。如果你使用\
    \ Azure Active Directory 管理员账户创建了 Azure Key Vault，则可能不需要此步骤。\n\n4.  现在我们将使用 Azure\
    \ 门户设置 SQL Server 的 Azure Active Directory 管理员。\n    > **注意** 还有其他设置选项，包括 az CLI、PowerShell\
    \ 和 ARM 模板。要了解更多信息，请参阅 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial#setting-up-the-azure-ad-admin-for-the-sql-server`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-automation-setup-tutorial#setting-up-the-azure-ad-admin-for-the-sql-server)\
    \ 上的文档。\n\n    在 Azure 门户中找到你的 SQL Server Azure Arc 资源。你可以通过在门户顶部的“搜索”字段中键入*SQL\
    \ Server*，然后在服务下选择`SQL Server – Azure Arc`来完成此操作。选择你的 SQL Server 实例。\n\n    在此资源的资源菜单中，转到“设置”下的`Azure\
    \ Active Directory`。现在选择`设置管理员`。选择你选定的 Azure Active Directory 账户作为管理员。现在，你将填写屏幕上的信息来设置管理员：\n\
    \    *   选择`服务管理的证书`。\n    *   将你的密钥保管库更改为已创建的 Azure Key Vault。\n    *   选择`服务管理的应用程序注册`。\n\
    \    *   将`Purview`选项保持为禁用状态。我们将在本章的下一节启用 Purview 策略。\n\n    你的选项应与图 3-41 相似。\n\
    \n    ![](img/525217_1_En_3_Fig41_HTML.png)\n\n    一张截图显示了`bwsql2022`。左侧窗格中选中了“Azure\
    \ Active Directory”。SQL Server 的服务证书和应用程序注册是服务管理的。\n\n    **图 3-41** 为 SQL Server\
    \ 设置 Azure Active Directory 管理员\n\n    现在选择`Save`。屏幕顶部将显示`正在进行…`。Azure 现在正在通过\
    \ Azure SQL Server 扩展向你的 SQL Server 发送信息。这可能需要几分钟时间。成功时，你将看到如下消息：\n    > 已成功保存，但可能需要授予应用‘bwsql2022-MSSQLSERVER<nnnnn>’的管理员同意。\n\
    \    >\n    > **注意**\n    >\n    > 如本章前面所述，现在会有信息写入你的 SQL Server 的 Windows 注册表（对于\
    \ Linux 则是`mssql.conf`文件），路径类似于`Computer\\HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\\
    Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQLServer\\FederatedAuthentication`。我们不支持你修改这些注册表项，但了解我们的软件如何连接是很有趣的。SQL\
    \ Server 2022 引擎经过增强，可读取这些密钥以了解如何连接 Azure Active Directory 进行身份验证。\n\n    此步骤成功后，你应该在\
    \ SQL Server 的`ERRORLOG`中看到以下条目：\n    ```\n    AAD Authentication is enabled.\
    \ This is an informational message only; no user action is required.\n    ```\n\
    \    Azure Active Directory 管理员账户会自动作为登录名添加到 SQL Server 中，并成为`sysadmin`角色的成员。\n\
    \n5.  这直接引出了设置的最后一步。SQL Server 必须使用 Azure 应用程序作为与 Azure Active Directory 通信的一部分。你在上一步看到的应用名称是自动为你创建的。现在你必须为该\
    \ Azure 应用程序授予`管理员同意`。在 Azure 门户中，搜索`Azure Active Directory`并选择你的组织。在左侧菜单上选择`应用程序注册`。你想要选择的应用程序是步骤\
    \ 4 中创建的那个（我的是‘bwsql2022-MSSQLSERVER<nnnnn>’）。然后在左侧菜单上选择`API 权限`。如果你拥有适当的权限，请选择`授予管理员同意…`。\n\
    \    > **注意** 此步骤要求你拥有 Azure Active Directory 的“全局管理员”或“特权角色管理员”权限。这些是高度特权权限，因此你可能需要组织中的某人来执行此步骤。\n\
    \n    如果你没有适当的权限，此选项将显示为灰色。此步骤完成后，你的屏幕应如图 3-42 所示。\n    ![](img/525217_1_En_3_Fig42_HTML.png)\n\
    \    一张截图显示了`bwsql2022`的`API`权限。右侧窗格列出了在`Microsoft Graph`下配置的 5 个权限。\n    **图\
    \ 3-42** 授予 Azure 应用 Azure Active Directory 身份验证的访问权限\n    如果你不执行此步骤，你仍然可以使用为\
    \ SQL Server 2022 设置的 Azure Active Directory 管理员账户。但你将无法向 SQL Server 添加任何其他 Azure\
    \ Active Directory 登录名或用户。你会遇到类似`Server identity does not have permissions to\
    \ access MS Graph`的错误。\n    > **注意**\n    >\n    > MS Graph 代表 Microsoft Graph，它是\
    \ Microsoft Identity 平台中用于 Azure 应用程序访问的一项服务。\n\n我知道设置这些需要很多步骤。但当你全部完成后，使用 Azure\
    \ Active Directory 身份验证就变得非常简单且强大。\n"
- fmt: "## Using AAD with SQL Server\n\nYou have done all the hard work. Now it is\
    \ time to try out connecting to your SQL Server 2022 instance with AAD accounts.\n\
    \n![](Images/525217_1_En_3_Fig43_HTML.png)\n\nA screenshot shows the connect to\
    \ server tab. The highlighted field entry under login for server name is `b w\
    \ sq l 2022`. The connect button is highlighted at the bottom.\n\nFigure 3-43:\
    \ Logging into SQL Server with AAD using MFA\n\n1.  You already have an AAD-based\
    \ login added from the AAD admin account you set up earlier. Let’s find it. Execute\
    \ the script `findaadlogin.sql` logged in as the local administrator account.\
    \ This script uses the following T-SQL statements:\n\n```\n    USE master;\n \
    \   GO\n    SELECT * FROM sys.server_principals WHERE type = 'E'\n    GO\n```\n\
    \nThe result should be a single login with the AAD credentials you created earlier.\
    \ The `type = E` stands for `EXTERNAL_LOGIN`. The only type of external logins\
    \ supported today is AAD.\n\n2.  Let’s try to log in with SSMS using the AAD login.\
    \ From SSMS for Authentication, choose `Azure Active Directory – Universal with\
    \ MFA`. Then type in the AAD account. Select `Options` and make sure `Encrypt\
    \ connection` and `Trust server certificate` are checked. My login screen before\
    \ I selected Connect looks like Figure [3-43](#525217_1_En_3_Chapter.xhtml#Fig43).\n\
    \nSelect `Connect`, and you will be prompted for you Azure account information.\
    \ If your AAD supports or requires MFA, you will be prompted to use whatever method\
    \ has been set up (e.g., using your phone). After you have successfully signed\
    \ in, you will be connected with Object Explorer in SSMS.\n\nIf you don’t have\
    \ other AAD logins in your group, you can just read the next set of steps, or\
    \ you substitute in your own AAD accounts.\n\n3.  Let’s try to add a new AAD account\
    \ as a SQL login. Let’s say one of my colleagues Anna Hoffman needs `sysadmin`\
    \ access to this SQL Server but wants to use her direct AAD account instead of\
    \ creating a different account. Anna’s AAD account is `annahoffman@aadsqlmi.net`.\
    \ Now logged in as the AAD `sysadmin` login that was originally created and you\
    \ just connected with, execute the script `createaadlogin.sql`, which uses the\
    \ following T-SQL statements:\n\n```\n    USE master;\n    GO\n    CREATE LOGIN\
    \ [annahoffman@aadsqlmi.net] FROM EXTERNAL PROVIDER;\n    GO\n    EXEC sp_addsrvrolemember\
    \ @loginame='annahoffman@aadsqlmi.net', @rolename='sysadmin';\n    GO\n```\n\n\
    Note the new syntax `FROM EXTERNAL PROVIDER` (which we already have supported\
    \ with Azure SQL Database and Azure SQL Managed Instance).\n\nYou can now connect\
    \ to SSMS with AAD with MFA or password-based authentication using this new login.\n\
    \n4.  Now let’s say another colleague Marisa Mathews needs access to a specific\
    \ database as a user but doesn’t really need a login or to be a member of the\
    \ `sysadmin` role. You can do this with AAD authentication. Connected as the AAD\
    \ `sysadmin` login, execute the script `createaaduser.sql`, which uses the following\
    \ T-SQL statements:\n\n```\n    DROP DATABASE IF EXISTS howaboutthemcowboys;\n\
    \    GO\n    CREATE DATABASE howboutthemcowboys;\n    GO\n    USE howboutthemcowboys;\n\
    \    GO\n    CREATE USER [marisamathews@aadsqlmi.net] FROM EXTERNAL PROVIDER;\n\
    \    GO\n```\n\nNow when you try to connect using SSMS with this AAD account,\
    \ you need to use the `Connect to database` option under `Connection Properties`\
    \ and specify this database. This user will only have access to the database and\
    \ not the complete instance. This is very similar to the capability we provide\
    \ with Azure SQL Database.\n\n5.  One other nice option is AAD groups. Let’s say\
    \ Anna and Marisa were part of an AAD group called `sqlusers`. Connected as a\
    \ `sysadmin` login, you can execute the script `createaadgrouplogin.sql`. This\
    \ script uses the following T-SQL statements:\n\n```\n    USE master;\n    GO\n\
    \    CREATE LOGIN [sqlusers] FROM EXTERNAL PROVIDER;\n    GO\n```\n\nUnfortunately\
    \ procedures like `xp_logininfo` don’t work against AAD groups, so to view membership,\
    \ you will need methods to list AAD groups.\n\nThere a few other syntax options\
    \ for you to create logins and users including Azure applications (passwordless\
    \ accounts), which you can read more about at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-setup-tutorial#create-logins-and-users`](https://docs.microsoft.com/en-us/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-setup-tutorial#create-logins-and-users).\n\
    \nWe even support AAD authentication for linked servers, which you can read more\
    \ at [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-linked-server`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-linked-server).\n\
    \n## Microsoft Purview Policy Management\n\nTo understand the power of Microsoft\
    \ Purview policy management, let’s take a scenario. You need to hire a consultant\
    \ who has very strong skills in performance monitoring for SQL Server. You want\
    \ this consultant to have access to your SQL Server but only to monitor things\
    \ like Dynamic Management Views (DMVs) related to performance. You don’t want\
    \ to have to grant them full `sysadmin` rights. You will learn in Chapter [6](#525217_1_En_6_Chapter.xhtml)\
    \ of the book we have new fixed server roles for just this purpose like `##MS_ServerPerformanceStateReader##`.\
    \ This could meet your needs perfectly. You could even create a guest account\
    \ in your Azure Active Directory and create a SQL Server login based on that account\
    \ and assign them to the new role.\n\nNow what if you had to do this across, say,\
    \ 50 SQL Server instances? You will need to create some scripts to connect to\
    \ all the instances to create the logins and assign the roles. What happens when\
    \ the contract is up? It is up to you to create scripts to remove the logins you\
    \ created earlier across all the instances.\n\nWhat if you could use a central\
    \ place to do all of this without creating and maintaining scripts or even directly\
    \ creating the logins? Microsoft Purview provides a central governance hub to\
    \ establish **access policies** for Azure SQL resources including SQL Server 2022\
    \ as an Azure Arc–enabled SQL Server. In addition, Microsoft has created some\
    \ built-in policies to match certain scenarios such as performance monitoring,\
    \ security auditing, or reading of user table data.\n\nThe following blog post\
    \ at [`https://cloudblogs.microsoft.com/sqlserver/2022/08/11/microsoft-purview-access-policies-for-sql-server-2022/`](https://cloudblogs.microsoft.com/sqlserver/2022/08/11/microsoft-purview-access-policies-for-sql-server-2022/)\
    \ by Srdan Bozovic, Lead Program Manager at Microsoft for Purview access policies\
    \ for SQL, is a great glance at what is possible.\n\nI asked Joachim Hammer, Principal\
    \ Group Program Manager for security across SQL, his perspective on what Microsoft\
    \ Purview provides for SQL customers. He said:\n\n*Comprehensive, unified data\
    \ governance provided by Microsoft Purview helps protect sensitive data across\
    \ clouds, apps, and devices and is an important tool in the fight against the\
    \ growing number of security threats. Microsoft Purview-based access policies,\
    \ which are now available in SQL Server 2022, provide two advantages over the\
    \ access controls that are built into today’s database management systems: Access\
    \ to data is efficiently managed in one place using Purview’s easy-to-use policy\
    \ dashboard while the enforcement happens at scale across the entire data estate.\
    \ We are extremely proud to offer powerful, cloud-based data governance in the\
    \ form of Purview-based access policies to our SQL Server customers, helping them\
    \ govern and secure all of their SQL Server data, irrespective of where it resides,\
    \ ground to cloud.*\n\nLet’s dive into the details. Let’s see how Purview access\
    \ policies work and then see them in action with an exercise."
