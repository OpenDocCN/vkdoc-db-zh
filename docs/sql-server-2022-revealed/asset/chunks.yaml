- fmt: "## SQL Server 2022 新特性\n\n### Always On 可用性组的可靠性与可维护性\n\n我们修复了 Always On 可用性组的一些可靠性问题（无需您进行更改，这些修复已内置），包括以下内容：\n\
    \n*   数据库恢复任务现在以更高的死锁优先级运行，以避免成为用户事务的死锁牺牲品。\n*   修复了一个副本数据库可能卡在“恢复挂起”状态的问题。\n\
    *   确保由于内部日志块错误，数据移动不会暂停到副本。\n*   消除了辅助副本上的架构锁争用问题（此问题在 SQL Server 2019 中也已修复）。\n\
    \n我们还在 SQL Server 2022 中引入了几项诊断变更，这些变更也包含在 SQL Server 2019 的最新累积更新中：\n\n*   在\
    \ Alwayson_health 扩展事件会话中出现错误时捕获 `sp_server_diagnostics` 事件。\n*   在 Alwayson_health\
    \ 扩展事件会话中，为可用性组线程池耗尽的场景添加错误信息。\n*   向 Alwayson_health 扩展事件会话添加一个新的扩展事件 `hadr_trace_message`，用于详细跟踪。\n\
    *   增加为 Alwayson_health 扩展事件会话保留的默认文件大小和数量。\n*   移除与 Always On 可用性组活动相关的不必要的 `ERRORLOG`\
    \ 条目。\n*   为连接超时错误向 Alwayson_health 扩展事件会话添加更多诊断信息。\n\n您可以看到，大多数诊断改进都与 Alwayson_health\
    \ 扩展事件会话有关。您可以在 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/always-on-extended-events#BKMK_alwayson_health`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/always-on-extended-events#BKMK_alwayson_health)\
    \ 阅读更多关于 Alwayson_health 会话及其对于调试问题的重要性。\n\n### 分布式可用性组（DAG）增强功能\n\n在 SQL Server\
    \ 2016 中，我们引入了分布式可用性组（DAG）的概念。DAG 本质上是两个连接在一起的可用性组，通常跨越较长的距离。您可能使用 DAG 的一个常见场景是灾难恢复。您在主要位置配置一个可用性组（AG），然后在远程位置配置第二个\
    \ AG。接着，您使用一个 DAG 将它们连接起来，但采用异步提交模式。如果您想了解 DAG 的基础知识，可以从 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups)\
    \ 开始。\n\nDAG 也支持同步提交。您应仔细考虑此选项，具体取决于对属于 DAG 的辅助 AG 的连接性。默认情况下，即使对于单个 AG 的同步副本模型，在允许主要副本上的事务继续之前，也不会等待事务在辅助副本上提交。它只等待日志记录在辅助副本上固化。然而，在\
    \ SQL Server 2017 中，我们引入了一个名为 `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT` 的选项。此选项允许您设置在主要副本提交事务之前所需的同步辅助副本的最小数量。默认值为\
    \ `0`。以前，此选项只允许在可用性组上配置。在 SQL Server 2022 中，您可以为分布式可用性组配置此选项。\n\n另一个针对 DAG 的微妙但重要的变化是，我们可以使用多个\
    \ TCP 连接来提高对延迟敏感的连接的吞吐量。我们发现使用这种设计可以改进我们自己的 Azure 地理复制，因此我们将其引入了 SQL Server。无需额外配置。我们内部决定如何使用它来提高吞吐量。\n\
    \n### 恢复增强功能\n\n恢复 SQL Server 数据库所需的时间通常不是您会花很多时间考虑的事情，直到（a）发生需要恢复的事件，并且（b）恢复需要很长时间，从而导致意外停机。\n\
    \n我们在 SQL Server 2022 中针对恢复相关操作增强了两个领域：加速数据库恢复（ADR）和并行重做操作。\n\n#### 加速数据库恢复（ADR）增强功能\n\
    \n我相信 SQL Server 2019 最重要的新功能之一就是加速数据库恢复（ADR）。您将不再会遇到事务日志大小失控增长、长时间回滚导致停机或恢复耗时过长的问题（我鼓励您阅读我在\
    \ 2019 年关于此主题的文章：[`www.linkedin.com/pulse/sql-server-2019-how-saved-world-from-long-recovery-bob-ward`](http://www.linkedin.com/pulse/sql-server-2019-how-saved-world-from-long-recovery-bob-ward)）。如果您想深入了解，请查看白皮书\
    \ [`https://aka.ms/sqladr`](https://aka.ms/sqladr)。\n\nADR 有很多优点，但总有改进的空间。因此，在\
    \ SQL Server 2022 中，我们进行了一些改进，分为两类：\n\n*   清理增强功能\n    这些增强功能包括在用户事务内进行更高效的清理、更高效的清理以减少页面占用空间，以及多线程版本清理，包括每个数据库一个线程。我们有一个新的\
    \ `sp_configure` 选项，名为 **“ADR Cleaner Thread Count”**，它允许每个数据库有更多的清理线程。此选项对于较大的数据库或变更率较高的数据库可能有用。\n\
    \n*   版本控制增强功能\n    这些增强功能包括减少跟踪版本的内存占用空间，以及减少持久化版本存储区（PVS）所需的增量。\n\n您可以在 [`https://docs.microsoft.com/sql/relational-databases/accelerated-database-recovery-concepts#adr-improvements-in-`](https://docs.microsoft.com/sql/relational-databases/accelerated-database-recovery-concepts#adr-improvements-in-)\
    \ 阅读更多关于 SQL Server 2022 中这些改进的详细信息。\n\n#### 并行重做增强功能\n\n在 SQL Server 2016 年，我的同事\
    \ Bob Dorr 和我发起了一个名为“它运行得更快”的草根运动，指出了内置于引擎中并使您的应用程序和查询运行得更快的 SQL Server 2016 增强功能。其中一个功能称为\
    \ **并行重做**。其概念是，在恢复期间的重做操作中，我们可以使用多个线程安全地并行重做已提交的事务。\n\n为了查看实际效果，我去了“视频库”并找到了一个名为\
    \ **SQL Server 2016 它运行得更快** 的会议录像，该录像最初由 Brent Ozar 主持的虚拟研讨会系列 GroupBy 举办。您可以在\
    \ [`https://youtu.be/pTEDfmQnpzA`](https://youtu.be/pTEDfmQnpzA) 找到该视频。您可以观看整个演讲，或者对于并行重做部分，请快进到演示大约\
    \ 22 分钟处。您还可以在 [`https://aka.ms/bobwardms`](https://aka.ms/bobwardms) 获取该演讲使用的幻灯片和演示文稿。查找\
    \ **GroupBy Org Jan 2017** 文件夹。\n\n> **注意**\n>\n> 有趣的事实：我这个视频演示的摄像头位于我在德克萨斯州欧文市的微软办公室，时间是在\
    \ 2017 年。这绝对是一个存档，因为那栋大楼已经重新设计，那个办公室已经不存在了。\n\n在演示中，我解释了并行重做如何真正提升恢复性能。然而，我们将并行线程的工作池限制为\
    \ 100 个，因此对于运行恢复的数据库数量较多的系统，有些数据库将无法利用并行重做线程（并且您无法配置哪些数据库可以）。\n\n在 SQL Server\
    \ 2022 中，我们不再限制此线程池，因此所有数据库都可以利用并行重做。我们还引入了并行重做的 **批处理** 概念，以提高并发性并加速所有操作。这些改进都不需要您进行任何更改或配置。它直接生效。"
  raw: "#### AG Reliability and Supportability\n\nWe shored up some reliability issues\
    \ for Always On Availability Groups (no changes required for you; these are built\
    \ in) including the following:\n\n*   The database recovery task is now run with\
    \ a higher deadlock priority to avoid being chosen as a deadlock victim with user\
    \ transactions.\n\n*   We fixed a problem where a replica database would get stuck\
    \ in a recovery pending state.\n\n*   Ensured data movement is not paused to replicas\
    \ due to internal log block errors.\n\n*   Eliminated schema lock contention problems\
    \ on secondary replicas (this problem is also fixed in SQL Server 2019).\n\nWe\
    \ also introduced several diagnostic changes in SQL Server 2022, which were also\
    \ included in the latest cumulative update for SQL Server 2019:\n\n*   Capture\
    \ the sp_server_diagnostics event in case of errors in the Alwayson_health Extended\
    \ Events session.\n\n*   Add error information in the Alwayson_health Extended\
    \ Events session for scenarios where the worker pool of threads was exhausted\
    \ for availability groups.\n\n*   Add a new Extended Event, hadr_trace_message,\
    \ to the Alwayson_health Extended Events session for detailed tracing.\n\n*  \
    \ Increase the default size and number of files retained for the Alwayson_health\
    \ Extended Events session.\n\n*   Remove unnecessary ERRORLOG entries for Always\
    \ On Availability Group activity.\n\n*   Add more diagnostics to the Alwayson_health\
    \ Extended Events session for connection timeout errors.\n\nYou can see that the\
    \ majority of diagnostic improvements are related to the Alwayson_health Extended\
    \ Events session. You can read more about the Alwayson_health session and its\
    \ importance for debugging issues at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/always-on-extended-events#BKMK_alwayson_health`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/always-on-extended-events#BKMK_alwayson_health).\n\
    \n#### Distributed Availability Group (DAG) Enhancements\n\nIn SQL Server 2016\
    \ we introduced the concept of a Distributed Availability Group (DAG). A DAG effectively\
    \ is two availability groups connected together, typically over a long distance.\
    \ A common scenario in which you might use a DAG is for disaster recovery. You\
    \ configure an availability group (AG) in your primary location. You configure\
    \ a second AG in a remote location. You then use a DAG to tie them together but\
    \ with async commit. If you want to learn the fundamentals of DAG, you can start\
    \ at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups).\n\
    \nA DAG also supports sync commit. You should carefully consider this option depending\
    \ on the connectivity to the secondary AG that is part of the DAG. By default,\
    \ even a sync replica model for a single AG does not wait for a transaction to\
    \ be committed on the secondary before allowing a transaction on the primary to\
    \ continue. It only waits for the log records to be hardened on the secondary.\
    \ However, in SQL Server 2017 we introduced an option called REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT.\
    \ This option allows you to set a minimum number of synchronous secondary replicas\
    \ required to commit before the primary commits a transaction. The default is\
    \ 0\\. Previously this option was only allowed on an availability group. In SQL\
    \ Server 2022 you can configure this option for a Distributed Availability Group.\n\
    \nAnother subtle, yet important, change for DAG is that we can use multiple TCP\
    \ connections to improve throughput for latency-sensitive connections. We found\
    \ out we can improve our own Azure geo-replication with this design, so we have\
    \ brought it to SQL Server. No additional configuration is required. We internally\
    \ decide how to use this to improve throughput.\n\n### Recovery Enhancements\n\
    \nThe time it takes to recover a SQL Server database is usually not something\
    \ you spend much time thinking about until (a) an event requires recovery and\
    \ (b) it takes a long time to recovery, thereby causing you to have unexpected\
    \ downtime.\n\nWe have two areas we have enhanced in SQL Server 2022 for recovery-related\
    \ operations: Accelerated Database Recovery (ADR) and parallel redo operations.\n\
    \n#### Accelerated Database Recovery (ADR) Enhancements\n\nI believe one of the\
    \ most important new capabilities for SQL Server 2019 was Accelerated Database\
    \ Recovery (ADR). No longer will you encounter transaction log size growing out\
    \ of control, long rollbacks causing downtime, or recovery taking forever (I encourage\
    \ you to read my article from 2019 on the topic at [`www.linkedin.com/pulse/sql-server-2019-how-saved-world-from-long-recovery-bob-ward`](http://www.linkedin.com/pulse/sql-server-2019-how-saved-world-from-long-recovery-bob-ward)).\
    \ And if you want to dig deeper, check out the whitepaper at [`https://aka.ms/sqladr`](https://aka.ms/sqladr).\n\
    \nADR has so many benefits, but there is always room for improvement. As such,\
    \ in SQL Server 2022 we have made a few enhancements that fall under two categories:\n\
    \n*   Cleanup enhancements\n\n    These enhancements include more efficient cleanup\
    \ inside user transactions, more efficient cleanup to reduce page footprint, and\
    \ multi-threaded version cleanup, including a thread per database. We have a new\
    \ **sp_configure** option called **“ADR Cleaner Thread Count**,” which allows\
    \ more cleanup threads per database. This option may be useful for larger databases\
    \ or those with a high rate of change.\n\n*   Versioning enhancements\n\n    These\
    \ enhancements include reducing the memory footprint to track versions and a reduction\
    \ in the growth required for the Persisted Version Store (PVS).\n\nYou can read\
    \ all about these improvements in SQL Server 2022 in more detail at [`https://docs.microsoft.com/sql/relational-databases/accelerated-database-recovery-concepts#adr-improvements-in-`](https://docs.microsoft.com/sql/relational-databases/accelerated-database-recovery-concepts#adr-improvements-in-).\n\
    \n#### Parallel Redo Enhancements\n\nIn SQL Server 2016, my colleague Bob Dorr\
    \ and I started our own grassroots campaign called “It just runs faster,” calling\
    \ out enhancements in SQL Server 2016 that were built into the engine and just\
    \ made your application and queries *run faster*. One of the features was called\
    \ **parallel redo**. The concept is that for redo operations during recovery,\
    \ we can safely redo committed transactions in parallel with multiple threads.\n\
    \nTo see this in action, I went to the *video vault* and found about a session\
    \ I did titled **SQL Server 2016 It just runs faster** on a virtual webinar series\
    \ originally hosted by Brent Ozar called GroupBy. You can find the video at [`https://youtu.be/pTEDfmQnpzA`](https://youtu.be/pTEDfmQnpzA).\
    \ You can watch the entire talk, or for parallel redo fast forward to about 22\
    \ minutes into the presentation. You can also get the deck and demos I used for\
    \ that talk at [`https://aka.ms/bobwardms`](https://aka.ms/bobwardms). Look for\
    \ the **GroupBy Org Jan 2017** folder.\n\nNote\n\nFun fact: My camera for this\
    \ video presentation was at my office at Microsoft in Irving, Texas, way back\
    \ in 2017\\. It is definitely an archive, as the building has been redesigned\
    \ and that office does not exist anymore.\n\nIn the presentation I explained how\
    \ parallel redo can really boost recovery performance. However, we limited the\
    \ worker pool for parallel threads to 100, so for systems with a large number\
    \ of databases running recovery, some would not be able to take advantage of parallel\
    \ redo threads (and you cannot configure which databases can).\n\nIn SQL Server\
    \ 2022, we no longer limit this thread pool, so all databases can take advantage\
    \ of parallel redo. We have also introduced a concept of *batching* with parallel\
    \ redo to increase concurrency and speed up all operations. None of these improvements\
    \ require any change or configuration on your part. It just works."
  trans: "\n## SQL Server 2022 新特性\n\n### Always On 可用性组的可靠性与可维护性\n\n我们修复了 Always\
    \ On 可用性组的一些可靠性问题（无需您进行更改，这些修复已内置），包括以下内容：\n\n*   数据库恢复任务现在以更高的死锁优先级运行，以避免成为用户事务的死锁牺牲品。\n\
    *   修复了一个副本数据库可能卡在“恢复挂起”状态的问题。\n*   确保由于内部日志块错误，数据移动不会暂停到副本。\n*   消除了辅助副本上的架构锁争用问题（此问题在\
    \ SQL Server 2019 中也已修复）。\n\n我们还在 SQL Server 2022 中引入了几项诊断变更，这些变更也包含在 SQL Server\
    \ 2019 的最新累积更新中：\n\n*   在 Alwayson_health 扩展事件会话中出现错误时捕获 `sp_server_diagnostics`\
    \ 事件。\n*   在 Alwayson_health 扩展事件会话中，为可用性组线程池耗尽的场景添加错误信息。\n*   向 Alwayson_health\
    \ 扩展事件会话添加一个新的扩展事件 `hadr_trace_message`，用于详细跟踪。\n*   增加为 Alwayson_health 扩展事件会话保留的默认文件大小和数量。\n\
    *   移除与 Always On 可用性组活动相关的不必要的 `ERRORLOG` 条目。\n*   为连接超时错误向 Alwayson_health 扩展事件会话添加更多诊断信息。\n\
    \n您可以看到，大多数诊断改进都与 Alwayson_health 扩展事件会话有关。您可以在 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/always-on-extended-events#BKMK_alwayson_health`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/always-on-extended-events#BKMK_alwayson_health)\
    \ 阅读更多关于 Alwayson_health 会话及其对于调试问题的重要性。\n\n### 分布式可用性组（DAG）增强功能\n\n在 SQL Server\
    \ 2016 中，我们引入了分布式可用性组（DAG）的概念。DAG 本质上是两个连接在一起的可用性组，通常跨越较长的距离。您可能使用 DAG 的一个常见场景是灾难恢复。您在主要位置配置一个可用性组（AG），然后在远程位置配置第二个\
    \ AG。接着，您使用一个 DAG 将它们连接起来，但采用异步提交模式。如果您想了解 DAG 的基础知识，可以从 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups)\
    \ 开始。\n\nDAG 也支持同步提交。您应仔细考虑此选项，具体取决于对属于 DAG 的辅助 AG 的连接性。默认情况下，即使对于单个 AG 的同步副本模型，在允许主要副本上的事务继续之前，也不会等待事务在辅助副本上提交。它只等待日志记录在辅助副本上固化。然而，在\
    \ SQL Server 2017 中，我们引入了一个名为 `REQUIRED_SYNCHRONIZED_SECONDARIES_TO_COMMIT` 的选项。此选项允许您设置在主要副本提交事务之前所需的同步辅助副本的最小数量。默认值为\
    \ `0`。以前，此选项只允许在可用性组上配置。在 SQL Server 2022 中，您可以为分布式可用性组配置此选项。\n\n另一个针对 DAG 的微妙但重要的变化是，我们可以使用多个\
    \ TCP 连接来提高对延迟敏感的连接的吞吐量。我们发现使用这种设计可以改进我们自己的 Azure 地理复制，因此我们将其引入了 SQL Server。无需额外配置。我们内部决定如何使用它来提高吞吐量。\n\
    \n### 恢复增强功能\n\n恢复 SQL Server 数据库所需的时间通常不是您会花很多时间考虑的事情，直到（a）发生需要恢复的事件，并且（b）恢复需要很长时间，从而导致意外停机。\n\
    \n我们在 SQL Server 2022 中针对恢复相关操作增强了两个领域：加速数据库恢复（ADR）和并行重做操作。\n\n#### 加速数据库恢复（ADR）增强功能\n\
    \n我认为 SQL Server 2019 最重要的新功能之一就是加速数据库恢复（ADR）。您将不再会遇到事务日志大小失控增长、长时间回滚导致停机或恢复耗时过长的问题（我鼓励您阅读我在\
    \ 2019 年关于此主题的文章：[`www.linkedin.com/pulse/sql-server-2019-how-saved-world-from-long-recovery-bob-ward`](http://www.linkedin.com/pulse/sql-server-2019-how-saved-world-from-long-recovery-bob-ward)）。如果您想深入了解，请查看白皮书\
    \ [`https://aka.ms/sqladr`](https://aka.ms/sqladr)。\n\nADR 有很多优点，但总有改进的空间。因此，在\
    \ SQL Server 2022 中，我们进行了一些改进，分为两类：\n\n*   清理增强功能\n    这些增强功能包括在用户事务内进行更高效的清理、更高效的清理以减少页面占用空间，以及多线程版本清理，包括每个数据库一个线程。我们有一个新的\
    \ `sp_configure` 选项，名为 **“ADR Cleaner Thread Count”**，它允许每个数据库有更多的清理线程。此选项对于较大的数据库或变更率较高的数据库可能有用。\n\
    \n*   版本控制增强功能\n    这些增强功能包括减少跟踪版本的内存占用空间，以及减少持久化版本存储区（PVS）所需的增量。\n\n您可以在 [`https://docs.microsoft.com/sql/relational-databases/accelerated-database-recovery-concepts#adr-improvements-in-`](https://docs.microsoft.com/sql/relational-databases/accelerated-database-recovery-concepts#adr-improvements-in-)\
    \ 阅读更多关于 SQL Server 2022 中这些改进的详细信息。\n\n#### 并行重做增强功能\n\n在 SQL Server 2016 年，我的同事\
    \ Bob Dorr 和我发起了一个名为“它运行得更快”的草根运动，指出了内置于引擎中并使您的应用程序和查询运行得更快的 SQL Server 2016 增强功能。其中一个功能称为\
    \ **并行重做**。其概念是，在恢复期间的重做操作中，我们可以使用多个线程安全地并行重做已提交的事务。\n\n为了查看实际效果，我去了“视频库”并找到了一个名为\
    \ **SQL Server 2016 它运行得更快** 的会议录像，该录像最初由 Brent Ozar 主持的虚拟研讨会系列 GroupBy 举办。您可以在\
    \ [`https://youtu.be/pTEDfmQnpzA`](https://youtu.be/pTEDfmQnpzA) 找到该视频。您可以观看整个演讲，或者对于并行重做部分，请快进到演示大约\
    \ 22 分钟处。您还可以在 [`https://aka.ms/bobwardms`](https://aka.ms/bobwardms) 获取该演讲使用的幻灯片和演示文稿。查找\
    \ **GroupBy Org Jan 2017** 文件夹。\n\n> **注意**\n>\n> 有趣的事实：我这个视频演示的摄像头位于我在德克萨斯州欧文市的微软办公室，时间是在\
    \ 2017 年。这绝对是一个存档，因为那栋大楼已经重新设计，那个办公室已经不存在了。\n\n在演示中，我解释了并行重做如何真正提升恢复性能。然而，我们将并行线程的工作池限制为\
    \ 100 个，因此对于运行恢复的数据库数量较多的系统，有些数据库将无法利用并行重做线程（并且您无法配置哪些数据库可以）。\n\n在 SQL Server\
    \ 2022 中，我们不再限制此线程池，因此所有数据库都可以利用并行重做。我们还引入了并行重做的 **批处理** 概念，以提高并发性并加速所有操作。这些改进都不需要您进行任何更改或配置。它直接生效。\n"
- fmt: "### 备份/恢复功能增强\n\n我们对引擎核心的备份和恢复操作进行了多项增强，包括跨平台快照、用于压缩的硬件卸载以及改进的备份元数据。\n\n>\
    \ **注意**\n>\n> [第7章](#525217_1_En_7_Chapter.xhtml) 涵盖了向S3对象存储提供商备份和恢复的新功能。\n\n\
    #### 跨平台快照备份\n\n假设你有一个非常大的数据库需要备份。默认情况下，SQL Server 通过读取数据库和日志文件并将数据复制到备份目标来流式传输备份。很久以前（我不得不查记录，因为这要追溯到SQL\
    \ Server 7.0），我们引入了用于备份和恢复的虚拟设备接口概念。其核心思想是，开发者可以基于已发布的库编写代码来接受备份流（或为恢复发送流），并以任何他们想要的方式处理此备份流（例如，将流发送到特殊存储设备）。T-SQL语言得到了扩展，除了已支持的目标（`DISK`、`TAPE`、`PIPE`；我知道`TAPE`和`PIPE`，很疯狂！）之外，还支持了`VIRTUAL_DEVICE`目标。当使用VDI目标时，SQL\
    \ Server会与VDI程序进行协议交互以备份或恢复数据库、日志或文件。作为此协议的一部分，数据将流式传输到VDI程序进行备份或恢复。\n\n随着VDI的引入，执行数据库备份快照成为可能。如果VDI程序与可以简单“复制文件”的设备协同工作，则快照备份可以比流式备份快得多。这需要新的`BACKUP`语法（`WITH\
    \ SNAPSHOT`）以及与VDI程序的新协议。使快照工作的关键是，SQL Server引擎必须冻结数据库的所有I/O操作，以确保数据库备份快照的一致性。\n\
    \n我们还在Windows上引入了使用Windows卷影复制服务与一个名为SQL Writer的程序协同执行数据库备份快照的功能，你可以在[`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-vss-writer-backup-guide`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-vss-writer-backup-guide)阅读更多信息。\n\
    \n在SQL Server 2016中，我们引入了将数据库和日志文件存储在Azure Blob存储中的功能，这使得我们能够在Azure虚拟机中支持基于文件的快照备份。更多信息请阅读[`https://docs.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://docs.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure)。\n\
    \n考虑到所有这些背景，我们希望有一种更简单的方法，既能支持Azure虚拟机中的快照备份，也能跨操作系统支持，而无需VDI应用程序或Windows VSS。正如Azure数据团队的首席软件工程师Ravinder\
    \ Vuppula所言：\n\n*SQL Server 允许用户执行快照备份已经有一段时间了。然而，它要求用户要么编写自定义VDI客户端（复杂），要么使用SQLWriter（灵活性较差）来执行快照备份。从SQL\
    \ Server 2016开始，用户还可以通过FILE_SNAPSHOT功能执行基于T-SQL的快照备份，但这仅限于存储在Azure Blob存储上的文件。此外，即使多个数据库位于同一底层存储上，用户也被限制一次只能对一个数据库执行快照备份。SQL\
    \ Server 2022中的快照备份功能旨在消除这些限制。我们追求一个易于使用、存储无关（只要底层存储允许快照）、操作系统无关（SQL Server可运行的任何地方）、API无关（可以灵活使用VDI客户端或仅使用T-SQL，无需依赖对底层存储的API调用）的解决方案。当然，我们希望该解决方案是可靠的（防止任何类型的死锁），但同时提供对单个数据库或同时对多个数据库执行快照备份的能力。*\n\
    \n#### 它是如何工作的？\n\n这项新功能结合使用T-SQL命令和数据库及日志文件的底层存储层来捕获文件的快照。\n\n以下是基本工作流程：\n\n\
    > **提示**\n>\n> 想在一个没有底层快照支持的磁盘系统上自己测试吗？使用未文档化的跟踪标志3661启动SQL Server。这允许SQL Server“共享”数据库和日志文件。在你暂停I/O后，它将允许你使用标准文件复制。此跟踪标志未被文档化，不受支持，并且绝对不建议在生产环境中使用。但它为我们提供了一种简单便捷的方式来测试这项新功能。\n\
    \n1.  用户执行一个新的T-SQL语句，如下所示：\n\n    ```sql\n    ALTER DATABASE <database_name>\n\
    \    SET SUSPEND_FOR_SNAPSHOT_BACKUP = ON\n    ```\n\n    SQL Server将在此时冻结I/O。请注意，在我的测试中，来自用户事务的大多数写入操作都会在日志写入时被阻塞，因此你会看到`WRITELOG`等待类型。\n\
    \n    一个新的动态管理视图，`sys.dm_server_suspend_status`，显示了任何为快照备份而暂停的数据库状态的更多详细信息。\n\n\
    2.  然后，你可以使用支持快照的受支持存储提供商（或像Azure存储这样支持磁盘快照的系统）。\n\n    > **注意** 你可以在[`https://github.com/microsoft/sql-server-samples/blob/master/samples/features/t-sql-snapshot-backup/snapshot-backup-restore-azurevm-single-db.ps1`](https://github.com/microsoft/sql-server-samples/blob/master/samples/features/t-sql-snapshot-backup/snapshot-backup-restore-azurevm-single-db.ps1)看到支持Azure上新备份快照功能的PowerShell脚本示例。\n\
    \n3.  为“解冻”I/O，用户需要执行以下T-SQL语句来备份关于备份的元数据信息：\n\n    ```sql\n    BACKUP DATABASE\
    \ <database_name>\n    TO DISK='\\<path_to_file>.bkm'\n    WITH METADATA_ONLY,\
    \ FORMAT\n    ```\n\n    如果快照失败，你也可以使用以下T-SQL语句解冻数据库：\n\n    ```sql\n    ALTER\
    \ DATABASE <database_name>\n    SET SUSPEND_FOR_SNAPSHOT_BACKUP = OFF\n    ```\n\
    \n    在进行快照恢复时，你将使用`.bkm`文件。\n\n这项新功能有一些有趣的选项，包括能够将数据库的快照备份到组中，甚至可以在实例级别暂停所有数据库。\n\
    \n请在[`https://docs.microsoft.com/sql/relational-databases/backup-restore/create-a-transact-sql-snapshot-backup`](https://docs.microsoft.com/sql/relational-databases/backup-restore/create-a-transact-sql-snapshot-backup)阅读关于新的基于T-SQL的快照备份的全部内容。"
  raw: "### Backup/Restore Enhancements\n\nWe have made several enhancements to backup\
    \ and restore operations core to the engine including cross-platform snapshots,\
    \ hardware offloading for compression, and improved backup metadata.\n\nNote\n\
    \nChapter [7](#525217_1_En_7_Chapter.xhtml) covers new capabilities to back up\
    \ and restore to and from S3 object storage providers.\n\n#### Cross-Platform\
    \ SNAPSHOT Backup\n\nLet’s say you have a very large database to back up. SQL\
    \ Server by default *streams* the backup by reading the database and log files\
    \ and copying the data to the backup target. A very long time ago (I had to check\
    \ my records because this goes back to SQL Server 7.0), we introduced the concept\
    \ of a Virtual Device Interface (VDI) for backup and restore. The concept is that\
    \ a developer could write code based on published libraries to accept a backup\
    \ stream (or send a stream for restore) and process this backup stream in whatever\
    \ way they wanted to (e.g., send the stream to a special storage device). The\
    \ T-SQL language was extended to support a VIRTUAL_DEVICE target in addition to\
    \ what we already supported (DISK, TAPE, PIPE; I know TAPE and PIPE. Crazy!).\
    \ When a VDI target was used, SQL Server would engage in a protocol with the VDI\
    \ program to back up or restore a database, log, or file. As part of this protocol,\
    \ data would be streamed to the VDI program for backup or restore.\n\nWith the\
    \ introduction of VDI came the ability to perform a database *backup snapshot*.\
    \ If the VDI program was working in coordination with a device that could simply\
    \ “copy the files,” a snapshot backup could be significantly faster than a streaming\
    \ backup. This required a new syntax for BACKUP (WITH SNAPSHOT) and a new protocol\
    \ with VDI programs. The key to making a snapshot work is that the SQL Server\
    \ engine has to *freeze* all I/O for the database so that the database backup\
    \ snapshot is consistent.\n\nWe also introduced on Windows the ability to use\
    \ the Windows Volume Snapshot Service (VSS) to work in coordination with a program\
    \ called SQL Writer to perform database backup snapshots, and you can read more\
    \ at [`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-vss-writer-backup-guide`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-vss-writer-backup-guide).\n\
    \nIn SQL Server 2016 we introduced the ability to store database and log files\
    \ in Azure Blob Storage, which allowed us to support file-based snapshot backups\
    \ in Azure Virtual Machines. Read more at [`https://docs.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://docs.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure).\n\
    \nWith all this context in mind, we wanted a simpler way to allow snapshot backups\
    \ both in Azure Virtual Machines and across operating systems without requiring\
    \ a VDI application or Windows VSS. As Ravinder Vuppula, Principal Software Engineer\
    \ on the Azure Data team, tells it:\n\n*SQL Server has allowed users to perform\
    \ snapshot backups for some time. However, it required users to either write a\
    \ custom VDI client (complex) or use SQLWriter (less flexible) to perform snapshot\
    \ backups. Starting with SQL Server 2016, users could also perform T-SQL based\
    \ snapshot backups with FILE_SNAPSHOT feature but it was limited to files stored\
    \ on Azure Blob Storage. Furthermore, users* *were limited to performing snapshot\
    \ backup of one database at a time even when there could be multiple databases\
    \ placed on the same underlying storage The snapshot backups feature in SQL Server\
    \ 2022 is designed to remove these restrictions. We were in pursuit of a solution\
    \ that was easy to use, storage agnostic (as long as the underlying storage allowed\
    \ snapshots), OS agnostic (wherever SQL Server can run), API agnostic (flexibility\
    \ to use either VDI client or just T-SQL without any dependency on the API calls\
    \ to the underlying storage). Of course, we wanted the solution to be reliable\
    \ (prevent any kind of deadlocks) but also offered the ability to perform snapshot\
    \ backup of either a single database or multiple databases at the same time.*\n\
    \n#### How Does It Work?\n\nThis new capability uses a combination of T-SQL commands\
    \ and the underlying storage layer for your database and log files to capture\
    \ a snapshot of the files.\n\nHere is the basic sequence for how this works:\n\
    \nTip\n\nWant to test this yourself on a disk system that doesn’t have underlying\
    \ snapshot support? Start SQL Server with the undocumented trace flag 3661\\.\
    \ This allows SQL Server to “share” database and log files. It will allow you\
    \ to use a standard file copy once you have suspended I/O. This trace flag is\
    \ not documented, not supported, and definitely not recommended for production.\
    \ But it gives us a nice and easy way to test this new capability.\n\n1.  A user\
    \ executes a new T-SQL statement like the following:\n\n    ```\n    ALTER DATABASE\
    \ \n    SET SUSPEND_FOR_SNAPSHOT_BACKUP = ON\n    ```\n\n    SQL Server will freeze\
    \ I/O at this point. Note that in my testing, most write operations from user\
    \ transactions are blocked on log writes, so you will see WRITELOG wait types.\n\
    \n    A new Dynamic Management View, **sys.dm_server_suspend_status**, shows more\
    \ details on the status of any suspended databases for snapshot backups.\n\n2.\
    \  You can then use a supported storage provider that supports snapshots (or a\
    \ system like Azure storage, which supports taking disk snapshots).\n\n    **Note** You\
    \ can see a sample PowerShell script that supports the new backup snapshot support\
    \ on Azure at [`https://github.com/microsoft/sql-server-samples/blob/master/samples/features/t-sql-snapshot-backup/snapshot-backup-restore-azurevm-single-db.ps1`](https://github.com/microsoft/sql-server-samples/blob/master/samples/features/t-sql-snapshot-backup/snapshot-backup-restore-azurevm-single-db.ps1).\n\
    \n3.  To “unfreeze” I/O, a user would execute the following T-SQL statement to\
    \ back up metadata information about the backup:\n\n    ```\n    BACKUP DATABASE\
    \ \n    TO DISK='\\.bkm'\n    WITH METADATA_ONLY, FORMAT\n    ```\n\n    If the\
    \ snapshot failed, you could also unfreeze the database with the following T-SQL\
    \ statement:\n\n    ```\n    ALTER DATABASE \n    SET SUSPEND_FOR_SNAPSHOT_BACKUP\
    \ = OFF\n    ```\n\n    You will use the .bkm file when doing a snapshot restore.\n\
    \nThere are some interesting options with this new capability, including the ability\
    \ to perform a backup snapshot of databases into groups and even suspend all databases\
    \ at the instance level.\n\nRead all about the new T-SQL-based snapshot backups\
    \ at [`https://docs.microsoft.com/sql/relational-databases/backup-restore/create-a-transact-sql-snapshot-backup`](https://docs.microsoft.com/sql/relational-databases/backup-restore/create-a-transact-sql-snapshot-backup)."
  trans: "\n### 备份/恢复功能增强\n\n我们对引擎核心的备份和恢复操作进行了多项增强，包括跨平台快照、用于压缩的硬件卸载以及改进的备份元数据。\n\
    \n> **注意**\n>\n> 第 7 章 涵盖了向 S3 对象存储提供商备份和恢复的新功能。\n\n#### 跨平台快照备份\n\n假设你有一个非常大的数据库需要备份。默认情况下，SQL\
    \ Server 通过读取数据库和日志文件并将数据复制到备份目标来流式传输备份。很久以前（我不得不查记录，因为这要追溯到 SQL Server 7.0），我们引入了用于备份和恢复的虚拟设备接口概念。其核心思想是，开发者可以基于已发布的库编写代码来接受备份流（或为恢复发送流），并以任何他们想要的方式处理此备份流（例如，将流发送到特殊存储设备）。T-SQL\
    \ 语言得到了扩展，除了已支持的目标（`DISK`、`TAPE`、`PIPE`；我知道`TAPE`和`PIPE`，很疯狂！）之外，还支持了`VIRTUAL_DEVICE`目标。当使用\
    \ VDI 目标时，SQL Server 会与 VDI 程序进行协议交互以备份或恢复数据库、日志或文件。作为此协议的一部分，数据将流式传输到 VDI 程序进行备份或恢复。\n\
    \n随着 VDI 的引入，执行数据库备份快照成为可能。如果 VDI 程序与可以简单“复制文件”的设备协同工作，则快照备份可以比流式备份快得多。这需要新的`BACKUP`语法（`WITH\
    \ SNAPSHOT`）以及与 VDI 程序的新协议。使快照工作的关键是，SQL Server 引擎必须冻结数据库的所有 I/O 操作，以确保数据库备份快照的一致性。\n\
    \n我们还在 Windows 上引入了使用 Windows 卷影复制服务与一个名为 SQL Writer 的程序协同执行数据库备份快照的功能，你可以在[`https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-vss-writer-backup-guide`](https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-vss-writer-backup-guide)阅读更多信息。\n\
    \n在 SQL Server 2016 中，我们引入了将数据库和日志文件存储在 Azure Blob 存储中的功能，这使得我们能够在 Azure 虚拟机中支持基于文件的快照备份。更多信息请阅读[`https://docs.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure`](https://docs.microsoft.com/sql/relational-databases/backup-restore/file-snapshot-backups-for-database-files-in-azure)。\n\
    \n考虑到所有这些背景，我们希望有一种更简单的方法，既能支持 Azure 虚拟机中的快照备份，也能跨操作系统支持，而无需 VDI 应用程序或 Windows\
    \ VSS。正如 Azure 数据团队的首席软件工程师 Ravinder Vuppula 所言：\n\n*SQL Server 允许用户执行快照备份已经有一段时间了。然而，它要求用户要么编写自定义\
    \ VDI 客户端（复杂），要么使用 SQLWriter（灵活性较差）来执行快照备份。从 SQL Server 2016 开始，用户还可以通过 FILE_SNAPSHOT\
    \ 功能执行基于 T-SQL 的快照备份，但这仅限于存储在 Azure Blob 存储上的文件。此外，即使多个数据库位于同一底层存储上，用户也被限制一次只能对一个数据库执行快照备份。SQL\
    \ Server 2022 中的快照备份功能旨在消除这些限制。我们追求一个易于使用、存储无关（只要底层存储允许快照）、操作系统无关（SQL Server 可运行的任何地方）、API\
    \ 无关（可以灵活使用 VDI 客户端或仅使用 T-SQL，无需依赖对底层存储的 API 调用）的解决方案。当然，我们希望该解决方案是可靠的（防止任何类型的死锁），但同时提供对单个数据库或同时对多个数据库执行快照备份的能力。*\n\
    \n#### 它是如何工作的？\n\n这项新功能结合使用 T-SQL 命令和数据库及日志文件的底层存储层来捕获文件的快照。\n\n以下是基本工作流程：\n\n\
    > **提示**\n>\n> 想在一个没有底层快照支持的磁盘系统上自己测试吗？使用未文档化的跟踪标志 3661 启动 SQL Server。这允许 SQL\
    \ Server“共享”数据库和日志文件。在你暂停 I/O 后，它将允许你使用标准文件复制。此跟踪标志未被文档化，不受支持，并且绝对不建议在生产环境中使用。但它为我们提供了一种简单便捷的方式来测试这项新功能。\n\
    \n1.  用户执行一个新的 T-SQL 语句，如下所示：\n\n    ```sql\n    ALTER DATABASE <database_name>\n\
    \    SET SUSPEND_FOR_SNAPSHOT_BACKUP = ON\n    ```\n\n    SQL Server 将在此时冻结 I/O。请注意，在我的测试中，来自用户事务的大多数写入操作都会在日志写入时被阻塞，因此你会看到`WRITELOG`等待类型。\n\
    \n    一个新的动态管理视图，`sys.dm_server_suspend_status`，显示了任何为快照备份而暂停的数据库状态的更多详细信息。\n\n\
    2.  然后，你可以使用支持快照的受支持存储提供商（或像 Azure 存储这样支持磁盘快照的系统）。\n\n    > **注意** 你可以在[`https://github.com/microsoft/sql-server-samples/blob/master/samples/features/t-sql-snapshot-backup/snapshot-backup-restore-azurevm-single-db.ps1`](https://github.com/microsoft/sql-server-samples/blob/master/samples/features/t-sql-snapshot-backup/snapshot-backup-restore-azurevm-single-db.ps1)看到支持\
    \ Azure 上新备份快照功能的 PowerShell 脚本示例。\n\n3.  为“解冻”I/O，用户需要执行以下 T-SQL 语句来备份关于备份的元数据信息：\n\
    \n    ```sql\n    BACKUP DATABASE <database_name>\n    TO DISK='\\<path_to_file>.bkm'\n\
    \    WITH METADATA_ONLY, FORMAT\n    ```\n\n    如果快照失败，你也可以使用以下 T-SQL 语句解冻数据库：\n\
    \n    ```sql\n    ALTER DATABASE <database_name>\n    SET SUSPEND_FOR_SNAPSHOT_BACKUP\
    \ = OFF\n    ```\n\n    在进行快照恢复时，你将使用`.bkm`文件。\n\n这项新功能有一些有趣的选项，包括能够将数据库的快照备份到组中，甚至可以在实例级别暂停所有数据库。\n\
    \n请在[`https://docs.microsoft.com/sql/relational-databases/backup-restore/create-a-transact-sql-snapshot-backup`](https://docs.microsoft.com/sql/relational-databases/backup-restore/create-a-transact-sql-snapshot-backup)阅读关于新的基于\
    \ T-SQL 的快照备份的全部内容。\n"
- fmt: '## Intel QuickAssist (QAT) 备份压缩


    当任何软件执行压缩或加密等操作时，支持这些操作的指令会非常消耗 CPU 资源。当 SQL Server 创建带压缩或加密的备份时，执行备份的线程会消耗主 CPU
    核心上的 CPU 周期。


    我们微软的工程团队一直在寻找硬件创新，以协助将此类操作所需的 CPU 资源从主 CPU 周期中卸载出来。我们将这个概念称为 `硬件卸载`。


    我们紧密合作的合作伙伴之一是英特尔。最近，我们的工程团队与英特尔合作，集成了一种名为 **Intel QuickAssist (QAT)** 的技术，它可以为压缩和加密需求执行硬件卸载。您可以在
    [`www.intel.com/content/www/us/en/architecture-and-technology/intel-quick-assist-technology-overview.html`](http://www.intel.com/content/www/us/en/architecture-and-technology/intel-quick-assist-technology-overview.html)
    阅读更多关于 **Intel QuickAssist** 工作原理的信息。您可以从他们的文档中看到，在某些情况下，该技术内置在主 CPU 结构中，而在其他情况下，您可以安装单独的硬件卡（此外，该技术有一个所谓的
    `软件模式`，它确实会使用核心 CPU 周期）。


    为了对备份和恢复（解压缩/解密）执行此集成，我们需要执行以下操作：


    *   构建一个基础设施来加载用于硬件卸载的 `加速器`。


    *   确定如何进行正确的 API 调用以使用 **Intel QuickAssist** 技术（即驱动程序）并将其加载到 SQL Server 中。


    *   添加配置选项以允许硬件卸载和特定加速器。


    *   增强 `BACKUP` 和 `RESTORE` 语法以支持 `COMPRESSION` 选项，用于一个名为 **QAT** 的新算法。


    虽然我们在某些情况下确实观察到使用 **QAT** 获得了更好的备份吞吐量和压缩率，但这项技术的关键在于从 SQL Server 卸载 CPU 资源，以便查询和工作负载可以最大化可用的
    CPU 资源。


    **QAT** 确实有一个 `软件模式`，在该模式下使用驱动程序但不使用硬件。这 `不会` 有助于减少 CPU 资源，因为它完全构建在软件中，但它可能比 SQL
    Server 当前使用的默认压缩更有效。默认情况下，SQL Server 使用 XPRESS 压缩库和算法。您可以在 [`https://docs.microsoft.com/windows/win32/cmpapi/-compression-portal`](https://docs.microsoft.com/windows/win32/cmpapi/-compression-portal)
    阅读更多关于 XPRESS 压缩的信息。


    我在示例中包含了 David Pless 创建的 T-SQL 笔记本，向您展示了 QAT 和硬件卸载的所有不同语法选项和配置，路径是 **ch06_meatandpotatoes\availability\
    Intel_QuickAssistTech_SQLServer2022.ipynb**。您可以使用 Azure Data Studio 或 Web 浏览器查看此笔记本。


    您可以在 [`https://community.intel.com/t5/Blogs/Tech-Innovation/Data-Center/Accelerate-your-SQL-Server-2022-database-backups-using-Intel/post/1335102`](https://community.intel.com/t5/Blogs/Tech-Innovation/Data-Center/Accelerate-your-SQL-Server-2022-database-backups-using-Intel/post/1335102)
    阅读英特尔观察到的使用 QAT 进行备份的性能信息。


    David 与我分享了一些有趣的观察：


    *   如果您的系统处于空闲状态（没有来自 SQL 工作负载的 CPU 负载），通常在硬件模式下使用 **QAT** 不会获得巨大收益。这完全取决于您设备的可用计算和内存与运行
    SQL Server 的服务器相比的情况。

    *   当您备份到多个文件时（因为我们将使用执行压缩的不同线程），并且您有一个相当 CPU 密集型的工作负载时，您可以在硬件模式下从 **QAT** 中获得最大收益。此外，文件数量会增加
    `buffercount`，这可能对备份性能产生显著影响。

    *   在软件模式下的 **QAT** 通常会在各种组合中优于默认的 XPRESS 压缩。


    **提示**


    来自 David Pless：如果您安装了驱动程序但未检测到 **QAT** 硬件，您将被允许以软件模式安装。最新的 **QAT** 驱动程序可以在 [`www.intel.com/content/www/us/en/developer/topic-technology/open/quick-assist-technology/overview.html`](http://www.intel.com/content/www/us/en/developer/topic-technology/open/quick-assist-technology/overview.html)
    找到。


    ## 备份元数据


    您是否曾经想知道何时可以对数据库执行最近的时间点恢复（PITR）？我们现在对 **msdb.backupset** 表有了一个很好的补充，即名为 **last_valid_restore_time**
    的列。使用此列，您可以确定可以执行 PITR 的最后一个有效时间。您现在可以在 [`https://docs.microsoft.com/sql/relational-databases/system-tables/backupset-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-tables/backupset-transact-sql)
    找到 **msdb.backupset** 表中此列的文档。


    ## 多写复制


    SQL Server 复制的一个有趣增强是具有最后写入者获胜（LWW）的多写复制。此增强专门针对对等复制。对等复制允许跨 SQL 实例对同一组数据进行多个写入者和读取者（在
    [`https://docs.microsoft.com/sql/relational-databases/replication/transactional/peer-to-peer-transactional-replication`](https://docs.microsoft.com/sql/relational-databases/replication/transactional/peer-to-peer-transactional-replication)
    阅读有关对等复制的所有详细信息）。任何此类系统都需要 `冲突解决`。如果两个用户同时更新同一行，谁获胜？在这些增强功能之前，冲突解决实际上会暂停整个系统，并且需要手动干预，而这种干预不是基于逻辑的（基于节点
    ID）。通过此增强功能，冲突检测是自动的，最后一个进行更改的用户（基于同步的时间戳）赢得冲突。


    在设计项目 Dallas 时，我们决定此功能也应包含在 SQL Server 2019 的更新中，因此从技术上讲，这对 SQL Server 2022 并不是新的。请查看
    Kevin Farlee 在此博客文章中提供的更多细节：[`https://techcommunity.microsoft.com/t5/sql-server-blog/replication-enhancements-in-the-sql-server-2019-cu13-release/ba-p/2814727`](https://techcommunity.microsoft.com/t5/sql-server-blog/replication-enhancements-in-the-sql-server-2019-cu13-release/ba-p/2814727)。


    ## 其他引擎“内容”


    我们还有其他针对特定客户挑战的引擎增强功能，这些解决方案基于我们多年的经验或直接来自用户反馈。以下列出的改进之一可能正是您希望在 SQL Server 中看到的。


    ### XML 原生数据类型在某些开发人员中很受欢迎，但 XML 数据可能变得相当大。诸如 SQL Server 行压缩之类的功能不影响 XML 数据类型，并且
    XML 索引无法被压缩。现在在 SQL Server 2022 中，我们引入了压缩 XML 列的功能，这可以大大减小使用 XML 数据类型的数据大小。我们增强了
    `CREATE TABLE` 语句以支持 `XML_COMPRESSION` 关键字。您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/create-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-table-transact-sql)
    阅读更多信息。


    相同的概念存在于压缩包含 XML 列的索引，您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/create-index-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-index-transact-sql)
    阅读相关内容。


    我们还支持 `ALTER TABLE` 和 `ALTER INDEX` 语句的 `XML_COMPRESSION`。'
  raw: '#### Intel QuickAssist (QAT) Backup Compression


    When any software performs operations like compression or encryption, the instructions
    to support these are very CPU intensive. When SQL Server creates a backup with
    compression or encryption, the threads that perform the backup run code that chews
    up CPU cycles on the main CPU cores.


    Our engineering team at Microsoft is always looking for hardware innovations that
    can assist in offloading the CPU resources required for operations like these
    for main CPU cycles. We call this concept *hardware offloading*.


    One of the partners we work closely with is Intel. Most recently, our engineering
    team worked with Intel to integrate a technology called **Intel QuickAssist (QAT)**
    that can perform hardware offloading for compression and encryption needs. You
    can read more about how **Intel QuickAssist** works at [`www.intel.com/content/www/us/en/architecture-and-technology/intel-quick-assist-technology-overview.html`](http://www.intel.com/content/www/us/en/architecture-and-technology/intel-quick-assist-technology-overview.html).
    You can see from their documentation that in some cases the technology is built
    into the main CPU structure and in other cases you can install a separate hardware
    card (in addition, this technology has what is called *software mode*, which does
    use core CPU cycles).


    To perform this integration for backup and restore (decompress/unencrypt), we
    needed to do the following:


    *   Build an infrastructure to load *accelerators* for hardware offloading.


    *   Determine how to make the right API calls to use **Intel QuickAssist** technologies
    (aka drivers) and load this into SQL Server.


    *   Add configuration options to allow hardware offloading and specific accelerators.


    *   Enhance the BACKUP and RESTORE syntax to support COMPRESSION options for a
    new algorithm called **QAT**.


    While we have both observed in some cases better backup throughput and better
    compression using **QAT**, the big key to this technology is offloading CPU resources
    from SQL Server so queries and workloads can maximize available CPU resources.


    **QAT** does come with a *software mode*, in which the drivers are used but hardware
    is not. This will *not* help reduce CPU resources since it is all built into the
    software, but it can be more effective than the default compression used today
    by SQL Server. By default, SQL Server uses the XPRESS compression library and
    algorithms. You can read more about XPRESS compression at [`https://docs.microsoft.com/windows/win32/cmpapi/-compression-portal`](https://docs.microsoft.com/windows/win32/cmpapi/-compression-portal).


    I’ve included a T-SQL notebook created by David Pless that shows you all the different
    syntax options and configurations for QAT and hardware offloading in the samples
    at **ch06_meatandpotatoes\availability\ Intel_QuickAssistTech_SQLServer2022.ipynb**.
    You can view this notebook with Azure Data Studio or a web browser.


    You can read performance information using QAT for backups that Intel observed
    at [`https://community.intel.com/t5/Blogs/Tech-Innovation/Data-Center/Accelerate-your-SQL-Server-2022-database-backups-using-Intel/post/1335102`](https://community.intel.com/t5/Blogs/Tech-Innovation/Data-Center/Accelerate-your-SQL-Server-2022-database-backups-using-Intel/post/1335102).


    David did share some interesting observations with me:


    *   If your system is idle (no CPU load from SQL workloads), you usually won’t
    get a huge benefit of **QAT** in hardware mode. This all depends on the available
    compute and memory of your device as compared with the server on which SQL Server
    is running.


    *   You get the most out of **QAT** in hardware mode when you back up to multiple
    files (because we will use different threads all doing compression) and you have
    a fairly CPU-intensive workload. Additionally, the file count increases the buffercount,
    which can have a significant impact on backup performance.


    *   **QAT** in software mode will usually outperform the default XPRESS compression
    in various combinations.


    Tip


    From David Pless: If you install the drivers and no **QAT** hardware is detected,
    you are allowed to install in software mode. The latest **QAT** drivers can be
    found at [`www.intel.com/content/www/us/en/developer/topic-technology/open/quick-assist-technology/overview.html`](http://www.intel.com/content/www/us/en/developer/topic-technology/open/quick-assist-technology/overview.html).


    #### Backup Metadata


    Have you ever found yourself wondering when you can perform the most recent point-in-time
    restore (PITR) of a database? We now have a nice addition to the **msdb.backupset**
    table, the column named **last_valid_restore_time**. With this column you can
    determine exactly the last valid time to which you can perform a PITR. You can
    find this column now documented for the **msdb.backupset** table at [`https://docs.microsoft.com/sql/relational-databases/system-tables/backupset-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-tables/backupset-transact-sql).


    ### Multi-write Replication


    One interesting enhancement for SQL Server replication is multi-write replication
    with Last Writer Wins (LWW). This enhancement is specifically targeted for peer-to-peer
    replication. Peer-to-peer replication allows for multiple writers and readers
    against the same set of data across SQL instances (read all the details of peer-to-peer
    replication at [`https://docs.microsoft.com/sql/relational-databases/replication/transactional/peer-to-peer-transactional-replication`](https://docs.microsoft.com/sql/relational-databases/replication/transactional/peer-to-peer-transactional-replication).)
    Any type of system like this needs *conflict resolution*. If two users update
    the same row at the same time, who wins? Prior to these enhancements, conflict
    resolution effectively paused the entire system, and a manual intervention was
    required that was not logical (based on node ID). With this enhancement, conflict
    detection is automatic, and the last user to make the change (based on a synchronized
    timestamp) wins the conflict.


    As we designed project Dallas, we decided that this feature should also be included
    in an update to SQL Server 2019, so this is not technically new to SQL Server
    2022\. Check out more details in this blog post by Kevin Farlee at [`https://techcommunity.microsoft.com/t5/sql-server-blog/replication-enhancements-in-the-sql-server-2019-cu13-release/ba-p/2814727`](https://techcommunity.microsoft.com/t5/sql-server-blog/replication-enhancements-in-the-sql-server-2019-cu13-release/ba-p/2814727).


    ## Other Engine “Stuff”


    We have other engine enhancements that target specific customer challenges with
    solutions based on our experiences over the years or directly from user feedback.
    It’s possible that one of the improvements listed in the following is one you
    have been looking to see in SQL Server.


    ### XML Compression


    XML native data types are popular among some developers, but XML data can get
    quite large. Features like SQL Server row compression don’t affect XML data types,
    and XML indexes cannot be compressed. Now in SQL Server 2022, we have introduced
    the ability to compress an XML column, which can greatly reduce the size of your
    data that uses XML data types. We enhanced the CREATE TABLE statement to support
    an XML_COMPRESSION keyword. You can read more at [`https://docs.microsoft.com/sql/t-sql/statements/create-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-table-transact-sql).


    The same concept exists to compress an index that contains an XML column, which
    you can read about at [`https://docs.microsoft.com/sql/t-sql/statements/create-index-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-index-transact-sql).


    We also support XML_COMPRESSION for both ALTER TABLE and ALTER INDEX statements.'
  trans: '

    ## Intel QuickAssist (QAT) 备份压缩


    当任何软件执行压缩或加密等操作时，支持这些操作的指令会非常消耗 CPU 资源。当 SQL Server 创建带压缩或加密的备份时，执行备份的线程会消耗主 CPU
    核心上的 CPU 周期。


    我们微软的工程团队一直在寻找硬件创新，以协助将此类操作所需的 CPU 资源从主 CPU 周期中卸载出来。我们将这个概念称为 `硬件卸载`。


    我们紧密合作的合作伙伴之一是英特尔。最近，我们的工程团队与英特尔合作，集成了一种名为 **Intel QuickAssist (QAT)** 的技术，它可以为压缩和加密需求执行硬件卸载。您可以在
    [`www.intel.com/content/www/us/en/architecture-and-technology/intel-quick-assist-technology-overview.html`](http://www.intel.com/content/www/us/en/architecture-and-technology/intel-quick-assist-technology-overview.html)
    阅读更多关于 **Intel QuickAssist** 工作原理的信息。您可以从他们的文档中看到，在某些情况下，该技术内置在主 CPU 结构中，而在其他情况下，您可以安装单独的硬件卡（此外，该技术有一个所谓的
    `软件模式`，它确实会使用核心 CPU 周期）。


    为了对备份和恢复（解压缩/解密）执行此集成，我们需要执行以下操作：


    *   构建一个基础设施来加载用于硬件卸载的 `加速器`。


    *   确定如何进行正确的 API 调用以使用 **Intel QuickAssist** 技术（即驱动程序）并将其加载到 SQL Server 中。


    *   添加配置选项以允许硬件卸载和特定加速器。


    *   增强 `BACKUP` 和 `RESTORE` 语法以支持 `COMPRESSION` 选项，用于一个名为 **QAT** 的新算法。


    虽然我们在某些情况下确实观察到使用 **QAT** 获得了更好的备份吞吐量和压缩率，但这项技术的关键在于从 SQL Server 卸载 CPU 资源，以便查询和工作负载可以最大化可用的
    CPU 资源。


    **QAT** 确实有一个 `软件模式`，在该模式下使用驱动程序但不使用硬件。这 `不会` 有助于减少 CPU 资源，因为它完全构建在软件中，但它可能比 SQL
    Server 当前使用的默认压缩更有效。默认情况下，SQL Server 使用 XPRESS 压缩库和算法。您可以在 [`https://docs.microsoft.com/windows/win32/cmpapi/-compression-portal`](https://docs.microsoft.com/windows/win32/cmpapi/-compression-portal)
    阅读更多关于 XPRESS 压缩的信息。


    我在示例中包含了 David Pless 创建的 T-SQL 笔记本，向您展示了 QAT 和硬件卸载的所有不同语法选项和配置，路径是 **ch06_meatandpotatoes\availability\
    Intel_QuickAssistTech_SQLServer2022.ipynb**。您可以使用 Azure Data Studio 或 Web 浏览器查看此笔记本。


    您可以在 [`https://community.intel.com/t5/Blogs/Tech-Innovation/Data-Center/Accelerate-your-SQL-Server-2022-database-backups-using-Intel/post/1335102`](https://community.intel.com/t5/Blogs/Tech-Innovation/Data-Center/Accelerate-your-SQL-Server-2022-database-backups-using-Intel/post/1335102)
    阅读英特尔观察到的使用 QAT 进行备份的性能信息。


    David 与我分享了一些有趣的观察：


    *   如果您的系统处于空闲状态（没有来自 SQL 工作负载的 CPU 负载），通常在硬件模式下使用 **QAT** 不会获得巨大收益。这完全取决于您设备的可用计算和内存与运行
    SQL Server 的服务器相比的情况。

    *   当您备份到多个文件时（因为我们将使用执行压缩的不同线程），并且您有一个相当 CPU 密集型的工作负载时，您可以在硬件模式下从 **QAT** 中获得最大收益。此外，文件数量会增加
    `buffercount`，这可能对备份性能产生显著影响。

    *   在软件模式下的 **QAT** 通常会在各种组合中优于默认的 XPRESS 压缩。


    **提示**


    来自 David Pless：如果您安装了驱动程序但未检测到 **QAT** 硬件，您将被允许以软件模式安装。最新的 **QAT** 驱动程序可以在 [`www.intel.com/content/www/us/en/developer/topic-technology/open/quick-assist-technology/overview.html`](http://www.intel.com/content/www/us/en/developer/topic-technology/open/quick-assist-technology/overview.html)
    找到。


    ## 备份元数据


    您是否曾经想知道何时可以对数据库执行最近的时间点恢复（PITR）？我们现在对 **msdb.backupset** 表有了一个很好的补充，即名为 **last_valid_restore_time**
    的列。使用此列，您可以确定可以执行 PITR 的最后一个有效时间。您现在可以在 [`https://docs.microsoft.com/sql/relational-databases/system-tables/backupset-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-tables/backupset-transact-sql)
    找到 **msdb.backupset** 表中此列的文档。


    ## 多写复制


    SQL Server 复制的一个有趣增强是具有最后写入者获胜（LWW）的多写复制。此增强专门针对对等复制。对等复制允许跨 SQL 实例对同一组数据进行多个写入者和读取者（在
    [`https://docs.microsoft.com/sql/relational-databases/replication/transactional/peer-to-peer-transactional-replication`](https://docs.microsoft.com/sql/relational-databases/replication/transactional/peer-to-peer-transactional-replication)
    阅读有关对等复制的所有详细信息）。任何此类系统都需要 `冲突解决`。如果两个用户同时更新同一行，谁获胜？在这些增强功能之前，冲突解决实际上会暂停整个系统，并且需要手动干预，而这种干预不是基于逻辑的（基于节点
    ID）。通过此增强功能，冲突检测是自动的，最后一个进行更改的用户（基于同步的时间戳）赢得冲突。


    在设计项目 Dallas 时，我们决定此功能也应包含在 SQL Server 2019 的更新中，因此从技术上讲，这对 SQL Server 2022 并不是新的。请查看
    Kevin Farlee 在此博客文章中提供的更多细节：[`https://techcommunity.microsoft.com/t5/sql-server-blog/replication-enhancements-in-the-sql-server-2019-cu13-release/ba-p/2814727`](https://techcommunity.microsoft.com/t5/sql-server-blog/replication-enhancements-in-the-sql-server-2019-cu13-release/ba-p/2814727)。


    ## 其他引擎“内容”


    我们还有其他针对特定客户挑战的引擎增强功能，这些解决方案基于我们多年的经验或直接来自用户反馈。以下列出的改进之一可能正是您希望在 SQL Server 中看到的。


    ### XML 原生数据类型在某些开发人员中很受欢迎，但 XML 数据可能变得相当大。诸如 SQL Server 行压缩之类的功能不影响 XML 数据类型，并且
    XML 索引无法被压缩。现在在 SQL Server 2022 中，我们引入了压缩 XML 列的功能，这可以大大减小使用 XML 数据类型的数据大小。我们增强了
    `CREATE TABLE` 语句以支持 `XML_COMPRESSION` 关键字。您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/create-table-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-table-transact-sql)
    阅读更多信息。


    相同的概念存在于压缩包含 XML 列的索引，您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/create-index-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-index-transact-sql)
    阅读相关内容。


    我们还支持 `ALTER TABLE` 和 `ALTER INDEX` 语句的 `XML_COMPRESSION`。

    '
- fmt: '# SQL Server 2022 新特性概览


    ## In-Memory OLTP 内存管理


    我们在 SQL Server 2022 中进行了增强，以改进针对 In-Memory OLTP 操作的内存管理。这些改进大多是为了避免内存不足（OOM）场景的具体优化，不需要您进行任何操作；它们已内置在引擎中。


    我们还在 SQL Server 2019 中引入了一个新的系统存储过程，该过程在 SQL Server 2022 中同样可用，名为`sys.sp_xtp_force_gc`。此过程以数据库名称作为输入，用于按需释放内存优化表数据的未使用内存，而无需内存压力。


    ## 自动删除统计信息


    这里有一个有趣的增强功能，用于解决一个长期存在的问题。假设 SQL Server 基于某个查询自动在列上创建了统计信息，或者第三方软件程序在列上创建了统计信息。如果您随后尝试删除这些统计信息所基于的列（或进行其他影响该列的架构更改），可能会遇到如下错误：


    ```

    Msg 5074, Level 16, State 1, Line 20

    The statistics '' is dependent on column ''''.

    ```


    您需要先去删除统计信息。现在，您可以使用`WITH AUTO_DROP = ON`选项创建统计信息。在上述场景中，统计信息将被自动删除，而不会阻止架构更改。默认情况下，自动创建的统计信息未启用自动删除。


    ## 可恢复的添加表约束


    在 SQL Server 2017 和 2019 中，我们增加了使用*可恢复*选项创建和重建索引的能力。这意味着如果在索引构建过程中发生错误（或您暂停它），我们可以从“暂停的地方”恢复，而不必从头开始。


    对于需要很长时间的索引构建来说，这是一个相当不错的功能。您可以在 [`https://docs.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?#resumable-index-considerations`](https://docs.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?#resumable-index-considerations)
    阅读更多关于可恢复索引的内容。


    然而，我们意识到许多索引是作为约束添加的，因此我们增强了`ALTER TABLE ADD CONSTRAINT`的语法以支持可恢复操作。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/resumable-add-table-constraints`](https://docs.microsoft.com/sql/relational-databases/security/resumable-add-table-constraints)
    阅读确切的语法。


    ## 新的等待类型


    随着 SQL Server 每个新版本的发布，我们都会添加新的等待类型作为构建新功能的一部分。在 SQL Server 2022 与 SQL Server
    2019 之间，我发现了大约300个新的等待类型。


    在审查这些新类型时，我的一个观察是，SQL Server 2022 中新增了`PREEMPTIVE_*`等待类型。具有此名称的等待类型指示我们代码中的某些位置，工作线程被切换到“抢占”模式，不再属于
    SQLOS 调度的一部分。这通常是因为我们正在调用 API 或运行无法控制线程调度的代码。两个指示抢占调度的新等待类型是`PREEMPTIVE_SYNAPSESTREAMING_HTTP_EVENT_WAIT`和`PREEMPTIVE_AAD_HTTP_EVENT_WAIT`，它们可能在使用
    Synapse Link 或 Azure Active Directory (AAD) 认证时出现。


    ## 新的扩展事件


    几乎每个新功能都有一组新的扩展事件，您已经在[第4章](#525217_1_En_4_Chapter.xhtml)和[第5章](#525217_1_En_5_Chapter.xhtml)中看到了一些与
    IQP 功能相关的事件，本章中也有几个。


    我杰出的同事兼老朋友 Robert Dorr 告诉我一个有趣的新事件，它与某个功能无关，而是他添加的，用于帮助进行查询性能故障排除和调试。该事件的名称是`query_abort`（它是一个调试通道事件）。此事件包括会话、输入缓冲区，甚至调用堆栈，并在查询因任何原因被中止时触发。如果您看到查询被取消、中止或超时，并且不确定原因，这个新事件可能会有所帮助。


    ## 行业验证的引擎


    #sqllegend David Campbell 曾经告诉我，*“Bob，如果我们不在引擎中创新，我们就没有产品。”* 我想从本章中您可以看到，我们在安全性、可扩展性和可用性方面提供了大量的创新。回想一下您在本章中看到的内容：仅举几例，如
    Ledger for SQL Server、“hands-free” tempdb 和 Contained Availability Groups。


    我的同事 David Pless 可能比我们团队中任何人都更多地参与了新的 SQL Server 2022 引擎功能。我请他分享了他的看法：


    *我一直在思考围绕我们在本版本中所完成工作的主题，特别是回顾之前的版本。在 SQL Server 2016 中，它是“It''s just faster”，我们在
    SQL Server 2017 中说它是“all about choice”。在本版本中，它是“return to performance”，但不仅如此——我们所做的是对可扩展性做出坚定承诺。对可扩展性的承诺不仅仅是单一功能，而是多个功能，使
    SQL Server 2022 能够充分利用我们最大的系统来运行最关键的工作负载。我们通过缓冲池并行扫描实现了这一点，使客户能够扩展到可用的大型内存服务器，并获得他们对
    SQL Server 所期望的完整性能。我们通过并发 GAM 和 SGAM 更新实现了这一点，将 tempdb 性能提升到一个因子，以至于我们甚至质疑是否仍然需要近四分之一世纪以来一直有效的
    tempdb 最佳实践。而且这两项重大改进都是默认开启的——您只需将数据放在 SQL Server 2022 上，让可扩展的 SQL Server 引擎完成剩下的工作。还有更多。加速数据库恢复改进使我们能够比以往更快地恢复数据库。此外，我们与
    Intel 的合作引入了一个全新的功能，不仅帮助 SQL Server 提高备份容量和吞吐量——而且通过 Intel QuickAssist Technology
    硬件，我们可以通过将备份过程的计算开销从主机 SQL Server 系统卸载下来，来保护主机机器的 CPU。我为这个团队感到骄傲；我为我们在这个版本中取得的成就感到骄傲。*'
  raw: '### In-Memory OLTP Memory Management


    We built enhancements in SQL Server 2022 to improve our memory management for
    In-Memory OLTP operations. Most of these are specific improvements to avoid out-of-memory
    (OOM) scenarios and don’t require any action from you; they are just built into
    the engine.


    We also introduced a new system procedure in SQL Server 2019, which is also available
    in SQL Server 2022, called **sys.sp_xtp_force_gc**. This procedure takes as input
    a database name to release unused memory on demand, without memory pressure, for
    memory-optimized table data.


    ### Auto-drop Statistics


    Here is an interesting enhancement to help with a long-standing problem. Let’s
    say SQL Server auto-creates statistics on a column based on a query or a third-party
    software program creates statistics on a column. If you try to then drop the column
    these statistics are based on (or make other schema changes that affect the column),
    you may encounter an error like this:


    ```

    Msg 5074, Level 16, State 1, Line 20

    The statistics '' is dependent on column ''''.

    ```


    You then need to go and drop the statistics first. Now you can create statistics
    using the WITH AUTO_DROP = ON option. In the preceding scenario, the statistics
    would be automatically dropped and not block the schema change. Auto-created statistics
    are not enabled with auto-drop by default.


    ### Resumable Add Table Constraints


    In SQL Server 2017 and 2019 we added the ability to create and rebuild indexes
    with a *resumable* option. This means if an error occurs during the build of an
    index (or you pause it), we can resume “where we left off” vs. having to start
    over.


    This is quite a nice feature for index builds that take a very long time. You
    can read more about resumable indexes at [`https://docs.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?#resumable-index-considerations`](https://docs.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?#resumable-index-considerations).


    We realize though that many indexes are added as constraints, so we have enhanced
    the syntax for ALTER TABLE ADD CONSTRAINT to support resumable operations. You
    can read the exact syntax at [`https://docs.microsoft.com/sql/relational-databases/security/resumable-add-table-constraints`](https://docs.microsoft.com/sql/relational-databases/security/resumable-add-table-constraints).


    ### New Wait Types


    With each new release of SQL Server, we add new wait types as part of building
    new features. I found around ~300 new wait types in SQL Server 2022 vs. SQL Server
    2019.


    One observation I had when reviewing these new types is that there are new PREEMPTIVE_*
    wait types for SQL Server 2022\. Wait types with this name indicate places in
    our code where a worker is switched to “preemptive” mode and no longer part of
    SQLOS scheduling. This is because we are typically calling an API or running code
    where we can’t control thread scheduling. Two new wait types that indicate preemptive
    scheduling are PREEMPTIVE_SYNAPSESTREAMING_HTTP_EVENT_WAIT and PREEMPTIVE_AAD_HTTP_EVENT_WAIT,
    which can show up when using Synapse Link or Azure Active Directory (AAD) authentication.


    ### New Extended Events


    Almost every new feature has a set of new Extended Events, and you have already
    seen some related to IQP features in Chapters [4](#525217_1_En_4_Chapter.xhtml)
    and [5](#525217_1_En_5_Chapter.xhtml) as well as several in this chapter.


    My incredible colleague and longtime friend Robert Dorr told me about one interesting
    new event, not related to a feature but one he added to help with query performance
    troubleshooting and debugging. The name of the event is **query_abort** (it is
    a debug channel event). This event includes the session, the input buffer, and
    even a callstack and fires whenever a query is aborted for any reason. If you
    are seeing queries that are canceled, aborted, or timed out and are not sure why,
    this new event can probably help.


    ## An Industry-Proven Engine


    The #sqllegend David Campbell once told me, *“Bob, if we don’t innovate in the
    engine, we don’t have a product.”* I think you can see from this chapter that
    we have provided plenty of innovation into security, scalability, and availability.
    Think about what you have seen in this chapter: Ledger for SQL Server, “hands-free”
    tempdb, and Contained Availability Groups just to name a few.


    My colleague David Pless spent maybe more than anyone on our team across the new
    SQL Server 2022 engine features. I asked him for his perspective:


    *I have been thinking about the theme around what we have accomplished in this
    release, especially thinking back over the previous releases. In SQL Server 2016,
    it was “It''s just faster” and we said in SQL Server 2017 it was “all about choice.”
    In this release it is a “return to performance,” but more than that* – *what we
    have done is made a firm commitment to scalability. The commitment for scalability
    is more than a single feature, but several features that give SQL Server 2022
    the ability to take the most advantage of our largest systems for our most critical
    workloads. We did it with buffer pool parallel scan by allowing customers to be
    able to scale up to the largest memory servers available and get the full performance
    they would expect for SQL Server. We did it with concurrent GAM and SGAM updates
    improving tempdb performance at a factor that we are even questioning whether
    we still need the tempdb best practices that have stood true for nearly a quarter
    of a century. And both of these major improvements are on by default – you just
    have to get your data on SQL Server 2022 and let the scalable SQL Server engine
    do the rest. And there is so much more. Accelerated Database Recovery improvements
    recovers our databases faster than ever. Additionally, our partnership with Intel
    introduces a brand-new feature to help SQL Server not only improve backup capacity
    and throughput* – *but with Intel QuickAssist Technology hardware we can protect
    the CPU of the host machine by offloading the compute overhead of the backup process
    away from the host SQL Server system. I am proud of this team; I am proud of what
    we have accomplished with this release.*'
  trans: '

    # SQL Server 2022 新特性概览


    ## 内存 OLTP 内存管理


    我们在 SQL Server 2022 中进行了增强，以改进针对内存 OLTP 操作的内存管理。这些改进大多是为了避免内存不足（OOM）场景的具体优化，不需要您进行任何操作；它们已内置在引擎中。


    我们还在 SQL Server 2019 中引入了一个新的系统存储过程，该过程在 SQL Server 2022 中同样可用，名为`sys.sp_xtp_force_gc`。此过程以数据库名称作为输入，用于按需释放内存优化表数据的未使用内存，而无需内存压力。


    ## 自动删除统计信息


    这里有一个有趣的增强功能，用于解决一个长期存在的问题。假设 SQL Server 基于某个查询自动在列上创建了统计信息，或者第三方软件程序在列上创建了统计信息。如果您随后尝试删除这些统计信息所基于的列（或进行其他影响该列的架构更改），可能会遇到如下错误：


    ```

    Msg 5074, Level 16, State 1, Line 20

    The statistics '' is dependent on column ''''.

    ```


    您需要先去删除统计信息。现在，您可以使用`WITH AUTO_DROP = ON`选项创建统计信息。在上述场景中，统计信息将被自动删除，而不会阻止架构更改。默认情况下，自动创建的统计信息未启用自动删除。


    ## 可恢复的添加表约束


    在 SQL Server 2017 和 2019 中，我们增加了使用*可恢复*选项创建和重建索引的能力。这意味着如果在索引构建过程中发生错误（或您暂停它），我们可以从“暂停的地方”恢复，而不必从头开始。


    这对于需要很长时间的索引构建来说是一个相当不错的功能。您可以在 [`https://docs.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?#resumable-index-considerations`](https://docs.microsoft.com/sql/relational-databases/indexes/guidelines-for-online-index-operations?#resumable-index-considerations)
    阅读更多关于可恢复索引的内容。


    然而，我们意识到许多索引是作为约束添加的，因此我们增强了`ALTER TABLE ADD CONSTRAINT`的语法以支持可恢复操作。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/resumable-add-table-constraints`](https://docs.microsoft.com/sql/relational-databases/security/resumable-add-table-constraints)
    阅读确切的语法。


    ## 新的等待类型


    随着 SQL Server 每个新版本的发布，我们都会添加新的等待类型作为构建新功能的一部分。在 SQL Server 2022 与 SQL Server
    2019 之间，我发现了大约 300 个新的等待类型。


    在审查这些新类型时，我的一个观察是，SQL Server 2022 中新增了`PREEMPTIVE_*`等待类型。具有此名称的等待类型指示我们代码中的某些位置，工作线程被切换到“抢占”模式，不再属于
    SQLOS 调度的一部分。这通常是因为我们正在调用 API 或运行无法控制线程调度的代码。两个指示抢占调度的新等待类型是`PREEMPTIVE_SYNAPSESTREAMING_HTTP_EVENT_WAIT`和`PREEMPTIVE_AAD_HTTP_EVENT_WAIT`，它们可能在使用
    Synapse Link 或 Azure Active Directory (AAD) 认证时出现。


    ## 新的扩展事件


    几乎每个新功能都有一组新的扩展事件，您已经在第 4 章和第 5 章中看到了一些与 IQP 功能相关的事件，本章中也有几个。


    我杰出的同事兼老朋友 Robert Dorr 告诉我一个有趣的新事件，它与某个功能无关，而是他添加的，用于帮助进行查询性能故障排除和调试。该事件的名称是`query_abort`（它是一个调试通道事件）。此事件包括会话、输入缓冲区，甚至调用堆栈，并在查询因任何原因被中止时触发。如果您看到查询被取消、中止或超时，并且不确定原因，这个新事件可能会有所帮助。


    ## 行业验证的引擎


    #sqllegend David Campbell 曾经告诉我，*“Bob，如果我们不在引擎中创新，我们就没有产品。”* 我想从本章中您可以看到，我们在安全性、可扩展性和可用性方面提供了大量的创新。回想一下您在本章中看到的内容：仅举几例，如
    SQL Server 的分类账、“免触碰”的 tempdb 和包含的可用性组。


    我的同事 David Pless 可能比我们团队中任何人都更多地参与了新的 SQL Server 2022 引擎功能。我请他分享了他的看法：


    *我一直在思考围绕我们在本版本中所完成工作的主题，特别是回顾之前的版本。在 SQL Server 2016 中，它是“It''s just faster”，我们在
    SQL Server 2017 中说它是“all about choice”。在本版本中，它是“return to performance”，但不仅如此——我们所做的是对可扩展性做出坚定承诺。对可扩展性的承诺不仅仅是单一功能，而是多个功能，使
    SQL Server 2022 能够充分利用我们最大的系统来运行最关键的工作负载。我们通过缓冲池并行扫描实现了这一点，使客户能够扩展到可用的大型内存服务器，并获得他们对
    SQL Server 所期望的完整性能。我们通过并发 GAM 和 SGAM 更新实现了这一点，将 tempdb 性能提升到一个因子，以至于我们甚至质疑是否仍然需要近四分之一世纪以来一直有效的
    tempdb 最佳实践。而且这两项重大改进都是默认开启的——您只需将数据放在 SQL Server 2022 上，让可扩展的 SQL Server 引擎完成剩下的工作。还有更多。加速数据库恢复改进使我们能够比以往更快地恢复数据库。此外，我们与
    Intel 的合作引入了一个全新的功能，不仅帮助 SQL Server 提高备份容量和吞吐量——而且通过 Intel QuickAssist Technology
    硬件，我们可以通过将备份过程的计算开销从主机 SQL Server 系统卸载下来，来保护主机机器的 CPU。我为这个团队感到骄傲；我为我们在这个版本中取得的成就感到骄傲。*

    '
- fmt: '# 7. Data Virtualization and Object Storage


    As far back as SQL Server 7.0, we provided a way to query data `outside` of SQL
    Server, even for data sources that were not SQL Server. We called this capability
    linked servers. We used OLE-DB as a mechanism to allow the query processor to
    push a query to another data source and bring the results back into SQL Server.
    There were even OLE-DB drivers to query “file” data such as Excel spreadsheet
    files. In a way, the concept of a linked server query is `data virtualization`.
    Data virtualization means accessing data “where it lives” vs. copying data into
    SQL Server. Linked server queries were baked into normal SQL statements like `SELECT`
    but also through a new T-SQL function called `OPENROWSET()`. You will see later
    in this chapter that `OPENROWSET()` is still alive and well.


    In SQL Server 2016, we introduced a concept that was first implemented with Parallel
    Data Warehouse called `Polybase`. Polybase was brought to Parallel Data Warehouse
    by David Dewitt and the Microsoft research team. The concept was to use the T-SQL
    language to execute queries against a Hadoop file system, all from the database
    engine. In SQL Server 2016, we implemented the Polybase concept with Hadoop calling
    it Polybase services. Polybase services included separate Windows services that
    were integrated with the SQL Server engine. Polybase services would take T-SQL
    requests from the engine and translate them into Hadoop MapReduce jobs using Java.
    Users accessed files from Hadoop systems through T-SQL statements like `CREATE
    EXTERNAL TABLE` and `OPENROWSET()`. This feature has been removed in SQL Server
    2019.


    In SQL Server 2019, we expanded the concept of `data virtualization` and `Polybase`
    by adding the ability to use ODBC data sources for accessing data through external
    tables and `OPENROWSET()`. We even included built-in `connectors` with drivers
    like Oracle, MongoDB, Teradata, and SQL Server and `generic` ODBC drivers (in
    other words, any ODBC driver). SQL Server had truly become a `data hub`. You could
    use the power of T-SQL and query to just about any data source, without using
    ETL or copying the data. This functionality continues to exist in SQL Server 2022.


    Both of these capabilities were transforming. We realized customers didn’t always
    have their data in SQL Server and didn’t want to have to build expensive ETL applications
    to copy data, often out of date. However, the `Polybase` design using services
    outside the engine had its downsides. We started to look for another method to
    continue the vision of `data virtualization` but implemented in a different way.
    We also recognized a trend in the industry for data storage. The trend was the
    expansion of companies offering object storage using the Simple Storage Service
    (`S3`) protocol.


    ## Data Virtualization in SQL Server 2022


    Back in the early days of project Dallas, I had a meeting with James Rowland-Jones
    (we all called him JRJ) about what he was working on. He brought up the name `project
    Gravity`. Project Gravity was effectively `Polybase v3`, as JRJ called it. Version
    1 was our original support for Hadoop using Java. Version 2 was the inclusion
    of ODBC drivers in SQL Server 2019. JRJ told me `project Gravity`, version 3,
    would use REST APIs to access data. One of the biggest targets for this project
    was object storage providers using `S3`.


    ### REST, Azure Storage, and S3


    Representational state transfer (`REST`) is an interface for software components
    to communicate, typically over a remote or Internet connection. `REST` has been
    around a long time and uses typical HTTP methods to send and receive data between
    software components. I think Wikipedia has a good description of `REST` at [`https://en.wikipedia.org/wiki/Representational_state_transfer`](https://en.wikipedia.org/wiki/Representational_state_transfer),
    but also there is a good summary in Azure documentation at [`https://docs.microsoft.com/rest/api/azure/devops/?view=azure-devops-rest-7.1`](https://docs.microsoft.com/rest/api/azure/devops/?view=azure-devops-rest-7.1).
    In the Azure docs I really like this description of `REST`: “Representational
    State Transfer (REST) APIs are service endpoints that support sets of HTTP operations
    (methods), which provide create, retrieve, update, or delete access to the service''s
    resources.”


    `REST` has many benefits. It is lightweight and uniform, uses HTTP(S), and is
    portable. It pretty much works across all operating systems, platforms, and clouds.
    I don’t always find it intuitive, but once you get used to the use of HTTP `verbs`,
    it becomes more natural.


    One of the benefits of `REST` is that systems like Azure storage (including Azure
    Data Lake) and Amazon Simple Storage Service (`S3`) can be accessed via a known
    set of `REST` commands. Instead of requiring an ODBC driver, any client that can
    submit HTTP(S) to these providers can send and receive data.


    Given that we already know in the engine how to send HTTP(S) requests (that is
    how we back up to URL), we decided to implement the next set of `Polybase` innovation
    using `REST` inside the engine, instead of through Polybase services.


    I will admit while Azure Blob Storage and Azure Data Lake Storage support `REST`,
    a big motivator to innovate with `REST` was `S3`. Simple Storage Service (`S3`)
    from Amazon originates as far back as 2006 ([`https://en.wikipedia.org/wiki/Amazon_S3`](https://en.wikipedia.org/wiki/Amazon_S3)).
    One of the things that Amazon did was “open up” the protocol to access `S3` `object
    storage`. `S3` is called object storage because objects are files and metadata
    that describes the files. Objects are collected in `buckets` or containers for
    files. The core concepts of how object storage, files, and buckets work can be
    found at [`https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html#CoreConcepts`](https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html#CoreConcepts).
    Amazon `S3` object storage is accessed using a specific set of `REST` API as documented
    at [`https://docs.aws.amazon.com/AmazonS3/latest/userguide/RESTAPI.html`](https://docs.aws.amazon.com/AmazonS3/latest/userguide/RESTAPI.html).
    Since Amazon launched `S3`, several companies have come forward to offer `S3-compatible
    object storage services`. Provided you follow the `S3` `REST` API protocol, you
    can set up an object storage endpoint and allow clients to use it. We have seen
    a proliferation in providers offering `S3` object storage. Therefore, we decided
    to add to our `REST` API story for `Polybase` by implementing the ability to query
    files from `S3` object endpoints.'
