  trans: '### 部署步骤


    ![Azure SQL 创建资源窗口的截图。其中包含创建 SQL 数据库、托管实例和虚拟机的选项。](img/525217_1_En_10_Fig1_HTML.png)


    **图 10-1** 创建 Azure SQL 资源


    1.  在浏览器中访问 Azure 门户 [`https://portal.azure.com`](https://portal.azure.com)，并使用你的
    Azure 订阅登录。

    2.  在主页上，选择 **+ 创建资源**。在搜索框中，输入 `Azure SQL`。在下拉结果中，选择 `Azure SQL`。然后选择 **创建**。你现在应该会看到一个类似图
    10-1 的屏幕。


    `Azure 虚拟机上的 SQL Server`是`Azure SQL`系列的一部分，这个屏幕是选择多种 SQL 虚拟机选项的便捷方式。


    ![一个用于创建虚拟机的窗口截图。在“基本信息”选项卡下有需要查看并创建的详细信息选项。](img/525217_1_En_10_Fig2_HTML.png)


    **图 10-2** Azure 虚拟机部署的“基本信息”界面板


    1.  对于 SQL 虚拟机，选择“向下箭头”以查看市场映像选项。你可以滚动浏览这些选项，查看操作系统和 SQL 版本的各种组合。目前，选择`SQL Server
    2022`的`免费许可`选项。当`SQL Server 2022`正式发布时，此选项应为`免费 SQL Server 许可：Windows Server 2022
    上的 SQL Server 2022 Developer 版`。（正式发布时还会有标准版和企业版的选项）。点击 **创建**。

    2.  现在，你将能够在一系列称为*界面板*的屏幕上填写规划好的信息。第一个界面板是 **基本信息**。图 10-2 展示了我为创建新虚拟机所填写的“基本信息”界面板。


    让我们仔细看看这些选项：


    ![一个窗口的截图。在“SQL Server 设置”选项卡下有安全与网络、服务器许可和自动备份等选项。](img/525217_1_En_10_Fig3_HTML.png)


    **图 10-3** Azure 部署过程中的 SQL Server 设置


    1.  对于 **磁盘** 界面板，可能有一些供你探索的选项，但这仅针对操作系统磁盘。稍后你将获得其他数据磁盘的选项，用于存储 SQL Server 数据、日志和`tempdb`文件。点击
    **下一步: 网络**。

    2.  对于 **网络** 界面板，我将保留所有默认设置。这是因为我将默认加入资源组的 Azure 虚拟网络。如果你选择了新建资源组，你将有选项自动创建一个新网络。可能存在特定场景，即
    Azure 网络已预先设置好，你可以在此处加入该网络。有一个名为`加速网络`的选项，我建议你选中以获得最佳网络性能。如果你选择的虚拟机大小支持此功能，它默认是选中的。点击
    **下一步: 管理**。

    3.  对于 **管理** 界面板，我将使用默认值，但我建议你在此探索几个选项，包括启用`Microsoft Defender for Cloud`（我的订阅已自动启用此项），为测试或面向开发的虚拟机启用`自动关闭`，以及启用`热补丁`（但仅适用于特定的操作系统选择）。点击
    **下一步: 监视**。

    4.  在 **监视** 界面板上，我保留了默认值，但你应该探索此处其他用于诊断的选项。这些选项独立于 SQL，是针对操作系统和虚拟机的。点击 **下一步:
    高级**。

    5.  对于 **高级** 界面板，我保留了默认值，但根据你组织的需求可能会有一些自定义设置，例如安装不同的扩展。（这不是选择`SQL Server IaaS
    代理扩展`的地方。你通过选择 SQL Server 市场映像已经做出了该选择。）点击 **下一步: SQL Server 设置**。

    6.  **SQL Server 设置** 界面板仅在你选择了 SQL Server 市场映像时才会出现。它提供了多个用于配置 SQL Server 设置的选项，以及诸如存储等重要选项。图
    10-3 展示了此界面板首次出现时的默认选项。


    *   你的`Azure 订阅`将根据你账户的默认订阅自动填写，但如果你有多个订阅，可以更改此项。

    *   我选择了一个已为多个虚拟机创建的现有`资源组`。你也可以在此处创建一个新的资源组。


    **提示** 当你在新资源组中创建虚拟机时，会同时创建一个虚拟网络。如果你向同一资源组添加其他虚拟机，Azure 门户会将你的新虚拟机添加到同一个 Azure
    网络中。因此，你的虚拟机现在位于它们自己的私有网络中，可以轻松地相互发现。


    *   选择一个`虚拟机名称`，该名称在你的资源组中必须是唯一的。这将成为虚拟机的计算机名。

    *   选择部署虚拟机的`Azure 区域`。

    *   对于`可用性选项`，我不需要 Azure 已提供选项之外的任何额外可用性。当你构建`故障转移集群实例 (FCI)`或`Always On 可用性组`时，你需要在此处选择一个选项。

    *   对于`安全类型`，我选择了`标准`。你的虚拟机确实有一些新的安全选项，包括支持`安全启动`和`新 TPM 加密`等功能的选项。SQL Server
    市场映像可能并非对所有这些选项都可用。

    *   对于`映像`，我只保留了使用`Azure SQL`屏幕时选择的选项。你可以使用此处来更改不同的版本或操作系统选项。

    *   对于`虚拟机体系结构`，对于 SQL Server 市场映像，`x64`是唯一选项。

    *   我未勾选`使用 Azure Spot 折扣运行`，因为该选项不适用于基于 SQL Server 的虚拟机。（此选项意味着你支付的费用更低，但内置可用性可能降低。）

    *   `大小`是关键所在。你的规划在此发挥作用。如果你点击 **查看所有大小**，可以更改虚拟机的大小。`Ev5`系列是 SQL Server 的推荐系列之一，因此我选择了这个。出于我的测试目的，4
    个 vCPU 和 32GB 内存已经足够。基于大小还有其他限制，主要围绕存储性能。因此，尽管你以后可以更改此设置，但最好从一开始就规划好。请访问我们的网站
    [`https://aka.ms/SQLIaaSSizing`](https://aka.ms/SQLIaaSSizing) 获取更多信息。请密切注意基于所选大小的虚拟机整体存储性能上限，以及你数据、日志和`tempdb`所需的特定存储选择。


    **注意** 可能存在一些场景，例如开发场景，你希望支付更少费用，但不介意资源或存储性能有所降低。可以考虑`D`系列或`B`系列等可突发性能的大小。


    *   为`管理员账户`填写用户名和密码。尽管你以后可以更改密码（即使忘记了也可以在门户中更改），但你也可以通过操作系统的标准选项在虚拟机内部创建新的管理员账户。

    *   为了测试目的，我将保留标准的`RDP`端口作为公共入站端口开放。对于生产环境，你可能不希望这样做，而使用其他选项。我将在本章下一节“**连接到 Azure
    虚拟机上的 SQL Server**”中介绍这些选项。

    *   对于`许可`，我肯定想节省成本。假设我拥有尚未使用的`Windows Server`现有许可证。我可以勾选此框并声明我希望使用我的 Windows
    许可证来支付虚拟机的 Windows 成本。


    选择 **下一步: 磁盘**。


    让我们了解更多关于这些设置的信息：


    ![一个关于虚拟机 I/O 上限的警告文本。](img/525217_1_En_10_Fig4_HTML.png)


    **图 10-4** 虚拟机 I/O 上限警告'
- fmt: '# Deploying SQL Server on an Azure Virtual Machine


    ## Security & Networking


    对于**安全和网络**，我建议您为端口 `1433` 保留私有选项。这意味着，对虚拟机中 SQL Server 的任何 SQL 连接都需要来自连接到 Azure
    虚拟网络（或连接到此虚拟网络的网络）的计算机。如果您选择公共，我强烈建议您更改端口号，以避免在公共互联网上暴露端口 `1433`。如果您必须使用公共端点和端口
    `1433`，可以选择在事后创建网络安全组（NSG）防火墙规则等选项。


    ## SQL Authentication


    对于 **SQL 身份验证**，您可以选择启用，这将允许“混合模式”身份验证，并提示您输入 SQL 系统管理员帐户和密码（`sa` 帐户仍会被禁用）。


    ## Azure Key Vault Integration


    对于 **Azure Key Vault 集成**，您可以保留默认的禁用状态，如果您想将用户管理的密钥（例如用于 TDE 的密钥）存储在 Azure Key
    Vault 中，可以稍后启用此功能。


    ## Storage Configuration


    接下来是**存储配置**，这可能是您为 Azure 虚拟机上的 SQL Server 性能做出的最重要的单一选择。我们为您提供了数据、日志和 `tempdb`
    的托管磁盘类型的推荐设置。我强烈建议您单击“更改配置”并查看这些设置。您将获得如何为数据、日志和 `tempdb` 配置各种磁盘的选项。以下是一些要点：


    *   我之前在规划章节中提到过，请阅读我们的最佳实践，其中包括存储选择，链接位于 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist)。

    *   按照建议将 `tempdb` 放在临时驱动器上。没有理由不选择此选项。您必须拥有支持临时磁盘的虚拟机大小才能使用此功能。此外，此屏幕还为您提供了 `tempdb`
    文件数量和自动增长等选项。

    *   请仔细查看此屏幕上的警告，如图 [10-4](#525217_1_En_10_Chapter.xhtml#Fig4) 所示。


    您在此屏幕上所做的磁盘选择决定了 IOPS 和吞吐量等因素。较大的磁盘大小通常具有更好的性能。然而，您选择的虚拟机大小**可能会限制虚拟机的整体 I/O 吞吐量**，这正是此警告所提示的内容。对于任何生产虚拟机，我强烈建议您将虚拟机大小与存储选择对齐。对我而言，我降低了存储大小以符合虚拟机大小的限制。如果您需要更大的大小，您可能需要返回并选择不同的虚拟机大小。


    在部署后，您确实可以选择扩展存储配置。


    ## Tags


    **标签**页是完全可选的。它用于为 Azure 资源添加标签。我建议在共享订阅等情况下使用标签，以便您可以按使用类型或部门组织并轻松查找某些类型的 Azure
    资源。选择“下一步: 审阅 + 创建”。


    ## Review + Create


    您现在会看到一个屏幕，这可以说是部署前的“最后机会”。我们首先在此处进行验证，然后您可以查看预估成本和所有设置。准备就绪后，选择“创建”。


    ## SQL Instance Settings


    接下来是 **SQL 实例设置**。这些是您通常可以在 SQL Server 安装过程中选择的设置，例如 `MAXDOP`，但功能更多。例如，您可以启用即时文件初始化（IFI）和锁定内存页。您始终可以在虚拟机内自由地稍后更改这些设置。


    ## SQL Server License


    对于 **SQL Server 许可证**，您可以在此处选择将现有的 SQL Server 许可证应用于您的部署以节省成本。这是 Azure 混合权益（AHUB）选项。我的选项显示为灰色，因为我选择了免费版本的
    SQL Server。


    ## Final Options


    您最后的一组选项包括配置自动备份和安全更新，以及将 SQL Server 机器学习服务作为一项功能启用。除了机器学习服务外，您可以稍后更改这些选项，机器学习服务您可以稍后通过虚拟机中的
    SQL Server 安装程序作为功能添加。


    选择“下一步: 标签”。


    您不必在此处等待，因为部署是一个异步操作。但是，如果您保持门户原样，您将看到一个**部署正在进行中**屏幕，该屏幕会动态更新并显示创建虚拟机所有资源和安装
    SQL Server 的进度。


    预装 SQL Server 的虚拟机的部署时间可能会有所不同，有时因区域而异。但根据我的经验，部署应在大约 10 分钟内完成。


    部署完成后，选择“转到资源”。您的屏幕应如图 [10-5](#525217_1_En_10_Chapter.xhtml#Fig5) 所示。


    ![](Images/525217_1_En_10_Fig5_HTML.png)


    图 10-5


    已部署的 Azure 虚拟机上的 SQL Server


    ## Other Deployment Methods


    除了门户之外，您还有其他选项可以部署 Azure 虚拟机，包括 `az` CLI 和 PowerShell。一种用于自动化的非常强大的部署 Azure 虚拟机（以及几乎所有
    Azure 资源）的方法是使用 Azure 资源管理器（ARM）模板。请从以下链接开始了解虚拟机的 ARM 模板：[`https://docs.microsoft.com/azure/virtual-machines/windows/quick-create-template`](https://docs.microsoft.com/azure/virtual-machines/windows/quick-create-template)。这里还有一个使用
    ARM 模板在 Azure 虚拟机上快速部署 SQL Server 的指南：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-resource-manager-template`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-resource-manager-template)。


    现在您该做什么？请继续阅读下一节，了解如何探索您的部署并连接到 Azure 虚拟机上的 SQL Server。


    ## Exploring and Connecting to the SQL Server Virtual Machine


    让我们了解如何探索、连接和配置您的 Azure 虚拟机以及您的 SQL Server Azure 虚拟机。'
  raw: "*   For **Security & Networking**, I recommend you leave the Private option\
    \ for port 1433\\. This means any SQL connectivity to SQL Server in the VM will\
    \ need to come from a computer that is connected in the Azure virtual network\
    \ (or a network connected to this virtual network). If you choose Public, I highly\
    \ recommend you change the port number to avoid exposing port 1433 on the public\
    \ Internet. There are options like creating a Network Security Group (NSG) firewall\
    \ rule after the fact if you have to use a public endpoint and port 1433.\n\n\
    *   For **SQL Authentication** you can choose Enable, and it will allow “mixed-mode”\
    \ authentication and prompt you for a SQL sysadmin account and password (sa will\
    \ still be disabled).\n\n*   For **Azure Key Vault integration**, you can leave\
    \ the default disabled and later enable this if you want to store user-managed\
    \ keys (such as for TDE) in Azure Key Vault.\n\n*   Now comes **Storage configuration**,\
    \ which could be the single most important choice you make for performance for\
    \ SQL Server on an Azure virtual machine. We have recommend settings for you on\
    \ the type of managed disk for data, log, and tempdb. I highly recommend you click\
    \ Change configuration and review these settings. You will be provided with options\
    \ for how to configure various disks for data, log, and tempdb. Here are a few\
    \ pointers:\n    *   I mentioned earlier in the chapter on planning to read over\
    \ our best practices, which include storage choices, at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist).\n\
    \n*   Place tempdb on the temporary drive as recommended. There is no reason not\
    \ to choose this option. You must have a VM size that supports the temporary disk\
    \ to use this. Also this screen gives you choices for number of tempdb files and\
    \ options like autogrow.\n\n*   Look carefully on this screen for a warning like\
    \ Figure [10-4](#525217_1_En_10_Chapter.xhtml#Fig4).\n\nThe disk choices you make\
    \ on this screen dictate things like IOPS and throughput. Larger disks sizes usually\
    \ have better performance. However, your virtual machine size choice **could cap\
    \ the overall I/O throughput of the VM**, and that is what this warning is telling\
    \ you. I highly recommend for any production virtual machine to align your virtual\
    \ machine size with your storage choices. For me I changed my storage sizes lower\
    \ to align with the virtual machine size cap. If you need a larger size, you may\
    \ need to go back and choose a different VM size.\n\nYou do have options to extend\
    \ the storage configuration after you have deployed.\n\n1.  The **Tags** blade\
    \ is completely optional. It is used for you to label an Azure resource. I recommend\
    \ using Tags for situations like a shared subscription so you can organize and\
    \ easily find certain types of Azure resources by usage type or department. Select\
    \ **Next: Review + create**.\n\n2.  You are now presented with a screen, which\
    \ is kind of your “last chance” before deployment. We do a validation here first,\
    \ and then you can review estimated costs and all of your settings. When you are\
    \ ready, select **Create**.\n\n*   Next comes **SQL instance settings**. These\
    \ are settings that you could normally choose during SQL Server setup such as\
    \ MAXDOP but even more. For example, you can enable Instant File Initialization\
    \ (IFI) and Locked Pages in Memory. You are always free inside the VM to make\
    \ any changes to these later.\n\n*   For **SQL Server License**, this is where\
    \ you can choose to apply an existing SQL Server license to your deployment to\
    \ save costs. This is the Azure Hybrid Benefit (AHUB) option. My option is grayed\
    \ out because I chose a free version of SQL Server.\n\n*   Your last set of options\
    \ include configuring automatic backups and security updates and enabling SQL\
    \ Server machine learning services as a feature. You can change these options\
    \ later except for machine learning services, which you can add as a feature in\
    \ the virtual machine through SQL Server setup later.\n\nSelect **Next: Tags**.\n\
    \nYou don’t have to wait at this point as the deployment is an asynchronous operation.\
    \ But if you leave the portal as is, you will be presented with a **Deployment\
    \ in Progress** screen, which is dynamically updated and shows the progress of\
    \ creating all the resources for the virtual machine and installing SQL Server.\n\
    \nThe times to deploy the virtual machine with SQL Server preinstalled can always\
    \ vary, sometimes by region. But in my experience the deployment should be complete\
    \ within about 10 minutes.\n\nWhen the deployment is complete, select **Go to\
    \ Resource**. Your screen should look like Figure [10-5](#525217_1_En_10_Chapter.xhtml#Fig5).\n\
    \n![](Images/525217_1_En_10_Fig5_HTML.png)\n\nA screenshot of S Q L 2022 v m.\
    \ Under the overview, the menu is details of essentials. Below them are properties\
    \ of virtual machines and networking.\n\nFigure 10-5\n\nA deployed SQL Server\
    \ on an Azure Virtual Machine\n\n### Other Deployment Methods\n\nYou have other\
    \ options to deploy an Azure virtual machine than the portal including the az\
    \ CLI and PowerShell. A very powerful way to deploy Azure virtual machines (and\
    \ almost all Azure resources) for automation is to use an Azure Resource Manager\
    \ (ARM) template. Get started with ARM template for virtual machines at [`https://docs.microsoft.com/azure/virtual-machines/windows/quick-create-template`](https://docs.microsoft.com/azure/virtual-machines/windows/quick-create-template).\
    \ Here is also a quick-start guide to deploy SQL Server on an Azure virtual machine\
    \ with ARM templates at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-resource-manager-template`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-resource-manager-template).\n\
    \nNow what do you do? Read on to the next section on how to explore your deployment\
    \ and connect to SQL Server on an Azure Virtual Machine.\n\n## Exploring and Connecting\
    \ to the SQL Server Virtual Machine\n\nLet’s learn about how to explore, connect\
    \ to, and configure your Azure virtual machine and your SQL Server Azure virtual\
    \ machine."
  trans: '# 在 Azure 虚拟机上部署 SQL Server


    ## 安全与网络配置


    关于**安全与网络**，我建议您为端口 `1433` 选择“私有”选项。这意味着，任何连接到虚拟机中 SQL Server 的请求，都必须来自已连接到 Azure
    虚拟网络（或连接到此虚拟网络的其他网络）中的计算机。如果您选择了“公共”，我强烈建议您更改端口号，以避免在公共互联网上暴露端口 `1433`。如果您必须使用公共端点和端口
    `1433`，可以选择在后续步骤中创建网络安全组（NSG）防火墙规则等选项。


    ## SQL 身份验证


    对于 **SQL 身份验证**，您可以选择启用，这将允许“混合模式”身份验证，并会提示您输入 SQL 系统管理员账户和密码（`sa` 账户仍默认被禁用）。


    ## Azure Key Vault 集成


    对于 **Azure Key Vault 集成**，您可以保留默认的禁用状态。如果您想将用户管理的密钥（例如用于透明数据加密的密钥）存储在 Azure Key
    Vault 中，可以稍后启用此功能。


    ## 存储配置


    接下来是**存储配置**，这可能是您在 Azure 虚拟机上为 SQL Server 性能所做的最重要的一项选择。我们为您提供了数据文件、日志文件和 `tempdb`
    的托管磁盘类型的推荐设置。我强烈建议您单击“更改配置”并查看这些设置。您将获得如何为数据文件、日志文件和 `tempdb` 配置各种磁盘的选项。以下是一些要点：


    *   正如我之前在规划章节中提到的，请阅读我们的最佳实践指南，其中包含存储选择建议，链接位于 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist)。

    *   按照建议将 `tempdb` 放置在临时驱动器上。您没有理由不选择此选项。要使用此功能，您的虚拟机大小必须支持临时磁盘。此外，此屏幕还为您提供了 `tempdb`
    文件数量和自动增长等选项。

    *   请仔细查看此屏幕上的警告，如图 10-4 所示。


    您在此屏幕上所做的磁盘选择决定了 IOPS 和吞吐量等关键因素。通常，较大的磁盘具有更好的性能。然而，您选择的虚拟机大小**可能会限制虚拟机的整体 I/O
    吞吐量**，这正是此警告所提示的内容。对于任何生产环境的虚拟机，我强烈建议您将虚拟机大小与存储选择对齐。就我个人而言，我降低了存储大小以符合虚拟机大小的限制。如果您需要更大的存储，您可能需要返回并选择不同的虚拟机大小。


    在部署之后，您确实可以选择扩展存储配置。


    ## 标签


    **标签**页是完全可选的。它用于为 Azure 资源添加标记。我建议在共享订阅等情况下使用标签，以便您可以按使用类型或部门来组织并轻松查找某些类型的 Azure
    资源。选择“下一步：审阅 + 创建”。


    ## 审阅 + 创建


    您现在会看到一个屏幕，这可以说是部署前的“最后机会”。我们首先在此处进行验证，然后您可以查看预估成本和所有设置。准备就绪后，选择“创建”。


    ## SQL 实例设置


    接下来是 **SQL 实例设置**。这些是您通常可以在 SQL Server 安装过程中选择的设置，例如 `MAXDOP`，但这里提供更多选项。例如，您可以启用即时文件初始化和锁定内存页。您始终可以在虚拟机内部自由地稍后更改这些设置。


    ## SQL Server 许可证


    对于 **SQL Server 许可证**，您可以在此处选择将现有的 SQL Server 许可证应用于您的部署以节省成本。这是 Azure 混合权益选项。我的选项显示为灰色，因为我选择了免费版本的
    SQL Server。


    ## 最终选项


    您最后的一组选项包括配置自动备份和安全更新，以及将 SQL Server 机器学习服务作为一项功能启用。除了机器学习服务外，您可以稍后更改这些选项；而机器学习服务，您可以通过虚拟机中的
    SQL Server 安装程序稍后作为功能添加。


    选择“下一步：标签”。


    您不必在此处等待，因为部署是一个异步操作。但是，如果您保持门户原样，您将看到一个**部署正在进行中**的屏幕，该屏幕会动态更新并显示创建虚拟机所有资源和安装
    SQL Server 的进度。


    预装 SQL Server 的虚拟机的部署时间可能会有所不同，有时因区域而异。但根据我的经验，部署应在大约 10 分钟内完成。


    部署完成后，选择“转到资源”。您的屏幕应如图 10-5 所示。


    ![](img/525217_1_En_10_Fig5_HTML.png)


    图 10-5

    已部署在 Azure 虚拟机上的 SQL Server


    ## 其他部署方法


    除了门户之外，您还有其他选项可以部署 Azure 虚拟机，包括 `az` CLI 和 PowerShell。一种用于自动化的、非常强大的部署 Azure 虚拟机（以及几乎所有
    Azure 资源）的方法是使用 Azure 资源管理器模板。请从以下链接开始了解虚拟机的 ARM 模板：[`https://docs.microsoft.com/azure/virtual-machines/windows/quick-create-template`](https://docs.microsoft.com/azure/virtual-machines/windows/quick-create-template)。这里还有一个使用
    ARM 模板在 Azure 虚拟机上快速部署 SQL Server 的指南：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-resource-manager-template`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/create-sql-vm-resource-manager-template)。


    现在您该做什么？请继续阅读下一节，了解如何探索您的部署并连接到 Azure 虚拟机上的 SQL Server。


    ## 探索并连接到 SQL Server 虚拟机


    让我们了解如何探索、连接和配置您的 Azure 虚拟机以及您的 SQL Server Azure 虚拟机。'
- fmt: "### Exploring Your Azure Virtual Machine in the Portal\n\nLet’s explore your\
    \ Azure virtual machine in the Azure portal wait by examining the deployment as\
    \ seen in Figure [10-6](#525217_1_En_10_Chapter.xhtml#Fig6).\n\n![](Images/525217_1_En_10_Fig6_HTML.png)\n\
    \nA screenshot of S Q L 2022 v m. The menu list, essentials, properties, and toolbar\
    \ are numbered from 1 to 4.\n\nFigure 10-6\n\nA deployed Azure virtual machine\
    \ in the portal\n\nIf you want to know how to easily get to a virtual machine\
    \ deployment, use the Search field on the Azure home page, or on the left-hand\
    \ menu of the Azure home page, select Virtual machines.\n\nLet’s look at the major\
    \ areas of a deployment and what you can do with each by following the numbers\
    \ in the figure:\n\nNote\n\nAlmost every option you see in the portal to view\
    \ or configure the virtual machine can also be done via the `az` command line\
    \ interface (CLI) or `PowerShell`. And an easy way to run these is through the\
    \ `Azure Cloud Shell`. You will love the cloud shell if you have not seen it.\
    \ You can read more at [`https://docs.microsoft.com/azure/cloud-shell/overview`](https://docs.microsoft.com/azure/cloud-shell/overview).\
    \ In addition there is a mobile application for Azure, and I’ve been able to manage\
    \ my virtual machine and other Azure resources from my phone! There is also an\
    \ API option in the left-hand menu of the portal to allow you to run some `az`\
    \ CLI commands. In addition at the top of the screen, you can use the CLI/PS option.\n\
    \n![](Images/525217_1_En_10_Fig7_HTML.png)\n\nA screenshot of a window. Under\
    \ the monitoring tab is an alert box. Below the box are 5 line graphs under the\
    \ heading key metrics.\n\nFigure 10-7\n\nBuilt-in monitoring with the Azure virtual\
    \ machine\n\n1.  The top section of the screen is called `Essentials` where you\
    \ can view basic information about the deployment. One important property is Status\
    \ so you can see if the virtual machine is `Running` or `Stopped`.\n\n2.  The\
    \ main page of the screen includes tabs to see more `details` on the properties\
    \ of the virtual machine, monitoring statistics, other features you can enable,\
    \ and recommendations. The `Monitoring` tab is very interesting as seen in Figure\
    \ [10-7](#525217_1_En_10_Chapter.xhtml#Fig7).\n\nIt’s like having the Windows\
    \ Task Manager performance information at any time without having to connect inside\
    \ the VM. Notice the ability to enable alerts. You can configure alerts so you\
    \ can get notifications if any key metric becomes a problem (e.g., if CPU goes\
    \ above a threshold).\n\n3.  The left-hand side of the screen is called the resource\
    \ menu (or left-hand menu) and has many options to view and configure the virtual\
    \ machine. There are so many options it would take another chapter to cover them.\
    \ Here are few though I regularly use:\n    *   `Size` – This is where you would\
    \ view more details about the virtual machine size or change the size. Read more\
    \ about resizing a virtual machine at [`https://docs.microsoft.com/azure/virtual-machines/resize-vm`](https://docs.microsoft.com/azure/virtual-machines/resize-vm).\n\
    \    *   `Networking` – I may need to go to this option to configure the Network\
    \ Security Group (NSG), which is like firewall rules.\n    *   `SQL Server configuration`\
    \ – Here I can go to a SQL Server view of the virtual machine. I’ll talk more\
    \ about this in the section titled “Exploring a SQL Virtual Machine in the Portal.”\n\
    \    *   `Microsoft Defender for Cloud` – If you enabled this, see Defender recommendations\
    \ or alerts for security.\n    *   `Bastion` – This option gives you a secure\
    \ way to have a Remote Desktop experience using a browser.\n    *   `Run command`\
    \ – An interesting way to run programs inside the virtual machine without connecting\
    \ to the virtual machine.\n    *   `Metrics` – Get key performance counters without\
    \ having to connect inside the virtual machine. Some of the performance information\
    \ such as the virtual machine from a host perspective is only available here.\n\
    \    *   `Export template` – You can build an ARM template based on the current\
    \ deployment. I sometimes deploy through the portal and then use this option to\
    \ build a template for other virtual machines to deploy.\n    *   `Boot diagnostics`\
    \ – This is a cool feature to see the “console” screen of the virtual machine\
    \ to make sure it is not in a hung state.\n    *   `Reset password` – Forgot your\
    \ admin password? You can reset it here. And if you are concerned with security,\
    \ only accounts that have permissions to the virtual machine in Azure can do this.\n\
    \    *   `Redeploy + reapply` – I’ve had a few situations come up where using\
    \ this option allowed my virtual machine to be restarted successfully when it\
    \ appeared to be in a hung state. You may never need this, but it’s nice to know\
    \ it exists.\n    *   `Serial console` – This is like having the monitor of the\
    \ computer available to you, and it really pays off when there seems to be an\
    \ issue starting the virtual machine. Again you may never need this, but it’s\
    \ nice to know it exists.\n\n4.  At the top of the screen is a menu of important\
    \ options:\n    *   `Connect` – This gives you details on how to connect to the\
    \ virtual machine using Remote Desktop (`rdp`) or `ssh` for Linux.\n    *   `Start`\
    \ – If you shut down the virtual machine inside the OS or stop it using the portal,\
    \ this is how you would start it again.\n    *   `Restart` – There could be several\
    \ scenarios where you need to restart the virtual machine without having OS access.\n\
    \    *   `Stop` – This option allows you to shut down the virtual machine without\
    \ OS access. There is a distinct difference between stopping a virtual machine\
    \ with this option and stopping inside the virtual machine with an OS method.\
    \ If you shut down the virtual machine with the OS, the virtual machine has a\
    \ status of `Stopped`, but you are still paying for compute resources. If you\
    \ use this option, the virtual machine has a status of `Stopped (deallocated)`,\
    \ and you don’t pay for compute resources. Using this option could cause a longer\
    \ delay to start the virtual machine but is a convenient method to save compute\
    \ costs.\n\nNow let’s review the basics of how to connect to a virtual machine."
