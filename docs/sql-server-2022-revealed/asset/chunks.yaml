- fmt: '# 4. Built-In Query Intelligence


    For as long as I''ve been at Microsoft, we have attempted to put our heart and
    soul into one of the best query processors (QPs) in the industry. But as I saw
    in technical support for so many years, there were some scenarios where the QP
    struggled. Back in 2016, our team started a journey to make the query processor
    adaptable to a variety of workloads, helping users achieve consistent or improved
    performance with no code changes.


    We first called this effort `Adaptive Query Processing (AQP)`. I first heard of
    this term from Joe Sack, who was the lead program manager for `AQP` in SQL Server
    2017. `AQP` added the ability to respond to memory grants and support adaptive
    joins and introduced batch mode for analytic queries. These were all enabled by
    changing the database compatibility (`dbcompat`) level to `140` (the default for
    SQL Server 2017) with no code changes required. Read more about `dbcompat` levels
    at [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat). This was just the beginning.


    > Note

    > Have fun and go back in time. See Conor Cunningham and me present `AQP` at SQLBits
    in 2018: [`https://sqlbits.com/Sessions/Event17/Adaptive_query_processing_in_SQL_databases?msclkid=2b8c0902c4ca11ecb9e5158053df6fa9`](https://sqlbits.com/Sessions/Event17/Adaptive_query_processing_in_SQL_databases?msclkid=2b8c0902c4ca11ecb9e5158053df6fa9).


    We doubled our efforts and rebranded this concept `Intelligent Query Processing
    (IQP)` in SQL Server 2019. `IQP` included new and powerful scenarios like table
    variable deferred compilation and expanded memory grants and batch mode to row-based
    tables. You can read a detailed coverage of `IQP` in Chapter [2](#525217_1_En_2_Chapter.xhtml)
    of my book `SQL Server 2019 Revealed`, or you can dive into our documentation
    at [`https://aka.ms/iqp`](https://aka.ms/iqp). These scenarios were all enabled
    with no code changes by simply changing to `dbcompat` level `150`.


    > Note

    > Approximate Query Processing did not require `dbcompat 150`, just an upgrade
    to SQL Server 2019.


    As we rolled into SQL Server 2022, we decided to keep the `IQP` branding but also
    roll up the entire new set of scenarios into the term `built-in query intelligence`.
    This includes the `next generation (nextgen)` of `IQP`, new enhancements to Query
    Store, and these scenarios working together.


    How good is `built-in query intelligence` in SQL Server 2022? I broke up these
    capabilities into two chapters. This chapter will include an introduction to all
    the `built-in query intelligence` concepts and then dive into Query Store and
    `Intelligent Query Processing (IQP)` features that don''t require `dbcompat 160`.
    Chapter [5](#525217_1_En_5_Chapter.xhtml) will dive into three new `IQP` capabilities
    that are available when you enable `dbcompat 160` (but again, no code changes
    are required).


    Why so much content for just one part of SQL Server 2022? Consider these points:


    - This is one of the richest areas of investment for SQL Server 2022.

    - Almost every scenario in these two chapters has a story behind it. Not only
    do I like telling stories but I have firsthand experiences behind many of them.

    - While the entire concept of `built-in query intelligence` is to gain performance
    and insights with little effort, I take time in both chapters to explain details
    behind each of them.

    - There are many examples in both chapters for you to try out these new capabilities.


    As you read these next two chapters, keep in mind the following principles our
    team has always used in this area:


    - As much as possible, "do no harm." In other words, make sure not to break existing
    workloads and not make them run slower than they would if the feature were not
    available.

    - Require no code changes to take advantage of these features (with exceptions
    like Query Store hints and approximate percentile).

    - Allow any of these features to be individually turned off. This allows you to
    take advantage of ones you like and disable others that may not be the best for
    your workload.


    Does our innovation really work? Our partner group engineering manager for the
    engine, Naveen Prakash, thinks so: *"Unpredictable* query performance has resulted
    in people unable to get in their cars or trucks failing to leave the warehouse.
    SQL Server 2022 *continues to raise the bar for transparent, predictable, and
    efficient query* processing through intelligent monitoring and adaptive execution."


    So sit back and read on. Pick sections you want to read now and maybe come back
    later for more. Imagine yourself over the next two chapters in a past "brain melting"
    session I''ve presented.


    Let''s look at the overall lineup of new capabilities, dive into the `new` Query
    Store, and then go step-by-step to see how you can take advantage of some of the
    capabilities in the `nextgen IQP`.


    ## Built-In Query Intelligence in SQL Server 2022


    Early in the planning for SQL Server 2022, Pedro Lopes and I came up with the
    term `built-in query intelligence`. We did this to represent the innovation that
    is new in SQL Server 2022 to **gain and maintain consistent performance with no
    code changes**. In addition, these changes allow you to gain new insights into
    query performance and tune queries faster and in new ways with enhancements to
    Query Store. These innovations are "built in" to the engine itself and use "data"
    to act intelligently. That data is based on statistics or execution information
    from data sources like Query Store.


    This collection of new capabilities includes the following:


    - Query Store enhancements such as being on by default for new databases, support
    for queries executed against read replicas, and Query Store hints.

    - New `IQP` scenarios including some amazing solutions to "age-old" problems for
    SQL Server query performance; in fact, some of the new capabilities `use Query
    Store`.


    Figure [4-1](#525217_1_En_4_Chapter.xhtml#Fig1) shows a visualization of all the
    new `IQP` features and notes which ones use Query Store.


    ![](Images/525217_1_En_4_Fig1_HTML.png)


    Figure 4-1: SQL Server 2022 `IQP` new features


    This chapter will cover capabilities you can get without `dbcompat 160` (the left
    two columns). Chapter [5](#525217_1_En_5_Chapter.xhtml) will dive into `IQP` capabilities
    if you enable `dbcompat 160` including `Parameter-Sensitive Plan (PSP)` optimization,
    `cardinality estimation (CE)` model feedback, and `degree of parallelism (DOP)`
    feedback.


    Note in the bottom-right corner a box describing that "`IQP Gen1`" is enabled
    with `dbcompat 140`. This represents the `IQP` capabilities we introduced in SQL
    Server 2017. "`IQP Gen1+2`" represents the `IQP` capabilities we introduced in
    SQL Server 2019 plus SQL Server 2017. It is important to know this because you
    might be upgrading from SQL Server 2016 or earlier to SQL Server 2022 and not
    realize all the previous `IQP` capabilities you could be using. You can always
    keep up with all `IQP` features at [`https://aka.ms/iqp`](https://aka.ms/iqp).


    Let''s start by looking at enhancements for Query Store. There are enough new
    enhancements to SQL Server 2022 I call it the `new` Query Store.'
