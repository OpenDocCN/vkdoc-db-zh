    \ in the master database.\n\n*   Enable the availability group feature for SQL\
    \ Server if not already enabled.\n\n*   As an optional but recommended step, enable\
    \ startup trace flags for performance.\n\n*   Configure network connectivity between\
    \ SQL Server and Azure SQL Managed Instance.\n\n*   Open up firewall and Azure\
    \ Network Security Group (NSG) settings for port 5022 (dbm endpoint).\n\n*   Migrate\
    \ your certificate for Transparent Data Encryption (TDE) to Managed Instance if\
    \ your database is to be linked on SQL Server uses TDE.\n\n#### Creating the Link\
    \ to Replicate the Database\n\nLet’s now go through the steps to create the link\
    \ to Managed Instance to replicate the database on SQL Server using the wizard\
