    \ 10 分钟。\n\n![](img/525217_1_En_3_Fig31_HTML.png)\n*一张显示 B W Synapse Analytics\
    \ 选项卡的截图。箭头指向左侧窗格中“集成”下的“链接连接”选项。右窗格列出了链接连接名称、源、目标、状态。*\n\n# 监控 SQL Server 的链接连接\n\
    \n## 观察初始同步过程\n\n在此连接启动期间，您可以返回 SSMS 并查看您的 XEvent Profiler 会话。查找来自 `client_app_name`\
    \ 字段、名为 `AzureDataMovement` 的事件。这些是来自 SHIR 的查询。\n\n在这些事件中，您将看到使用存储过程和 T-SQL 的批处理，例如：\n\
    *   `sys.sp_change_feed_enable_db`。现在，该数据库的 `sys.databases.is_change_feed_enabled`\
    \ 列被设置为 1。\n*   为着陆区存储账户创建的数据库范围凭据。\n*   `sys.sp_change_feed_create_table_group`，它创建一个指向\
    \ Synapse 工作区和着陆区的*表组*。每个数据库的每个链接连接都会创建一个表组。\n*   `sys.sp_change_feed_enable_table`。由于我们在链接连接中选择了所有表，您将看到对数据库中每个表执行一次\
    \ `sys.sp_change_feed_enable_table`。\n*   针对系统目录视图的查询，以获取每个表的架构，包括列和数据类型。\n\n\
    **注意** 在本书撰写时，这些存储过程和 T-SQL 尚未被记录或支持。Synapse Link 必须通过 Synapse Studio 进行配置，它与\
    \ SHIR 进行通信。\n\n## 查看连接状态\n\n使用 Synapse Studio 监控链接连接，如图 3-31 所示。\n\n点击链接连接名称以深入了解详细信息，如图\
    \ 3-32 所示。\n\n![](img/525217_1_En_3_Fig32_HTML.png)\n*一张显示 SQL 2022 link connection\
    \ 的截图。它包含一个 33 项的表，详细信息包括：源架构、目标架构、状态、链接表 ID 等。*\n\n# 监控链接表的状态\n\n状态 `Replicating`\
    \ 表示表的初始快照已同步到 SQL 池表。\n\n![](img/525217_1_En_3_Fig33_HTML.jpg)\n*一张显示 Microsoft\
    \ Azure 中 Synapse Analytics 的截图。光标悬停在“数据”图标上。右侧的工作区显示从 tables 文件夹中选择了 application.cities\
    \ 文件。*\n\n# SQL 池中的表列表\n\n## 查看同步的表\n\n现在，让我们通过使用 Synapse Studio 来查看 SQL 池中的表，如图\
    \ 3-33 所示。\n\n![](img/525217_1_En_3_Fig34_HTML.png)\n*一张显示 sql script 1 的截图。顶部窗格有\
    \ 6 行代码。底部窗格是一个包含 vehicle registration、vehicle city 和 cargo 列的表。*\n\n# 执行查询获取货物计数\n\
    \n## 运行示例查询\n\n现在使用 Synapse Studio 像之前一样运行查询。粘贴以下 T-SQL（在脚本 `getcargocounts.sql`\
    \ 中找到）来运行查询以查看货物计数：\n\n```sql\n    SELECT v.Vehicle_Registration, v.Vehicle_City,\
    \ count(*) AS cargo\n    FROM Warehouse.Vehicles v\n    JOIN Warehouse.Vehicle_StockItems\
    \ vs\n    ON v.Vehicle_Registration = vs.Vehicle_Registration\n    GROUP BY v.Vehicle_Registration,\
    \ v.Vehicle_City;\n    GO\n```\n\n结果应如图 3-34 所示，这与这些表中的初始数据填充相匹配。\n\n![](img/525217_1_En_3_Fig35_HTML.png)\n\
    *一张标题为 wwi data 的容器页面截图。左侧窗格中选择了“概述”。箭头指向右侧窗格中的文件夹。*\n\n# 着陆区中的表组\n\n## 浏览着陆区容器\n\
    \n我们不支持复制或修改着陆区中的文件，但为了学习目的，值得查看容器中的文件。如果您进入着陆区账户中的容器并深入查看，您的结果将类似于图 3-35。\n\n\
    文件夹的 GUID 值与在 WideWorldImporters 数据库的系统表 `changefeed.change_feed_table_groups`\
    \ 中创建并存储的表组 ID 相匹配。\n\n当您深入查看此文件夹时，您将看到另一个名为 `Tables` 的文件夹。深入其中，您将看到一系列更多文件夹。每个文件夹代表一个表。名称是存储在\
    \ WideWorldImporters 数据库的系统表 `changefeed.change_feed_tables` 中的 `table_id`。深入第一个文件夹直到找到一个\
