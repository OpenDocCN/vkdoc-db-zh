    storage*. S3 is called object storage because objects are files and metadata that
    describes the files. Objects are collected in *buckets* or containers for files.
    The core concepts of how object storage, files, and buckets work can be found
    at [`https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html#CoreConcepts`](https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html#CoreConcepts).
    Amazon S3 object storage is accessed using a specific set of REST API as documented
