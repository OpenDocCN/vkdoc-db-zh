  trans: '

    在 Parquet 文件之上，是一个包含架构信息的 JSON 文件。你可以利用文件夹中的`table_id`，并通过运行类似脚本`getchangefeedtable.sql`中的查询，来找出这个
    Parquet 文件属于哪个表。在执行脚本前，你需要将 GUID 替换为你自己的`table_id`：


    ```sql

    USE [WideWorldImporters];

    GO

    SELECT object_name(object_id), *

    FROM changefeed.change_feed_tables

    WHERE table_id =  ''05fc889f-689f-438c-b1fd-cdb9a1333a4f'';

    GO

    ```


    `changefeed.change_feed_tables`表也包含一些关于表快照创建的有用统计信息。


    现在你的表已经初步同步到 Synapse，让我们看看变更如何被捕获并自动馈送到 Synapse 中。


    #### 利用 SQL Server 的变更进行近实时分析


    你已经完成所有设置并进行了同步。接下来会发生什么？嗯，Synapse Link for SQL Server 的强大之处在于，一旦设置完成，你在 SQL Server
    中所做的变更几乎会实时地显示在 Synapse 中。


    ![](img/525217_1_En_3_Fig37_HTML.png)


    着陆区容器页面的截图。它有一个包含名称、修改时间、访问层、存档状态和 Blob 类型列的表格。


    图 3-37


    变更的着陆区中的文件


    1.  让我们进行一些变更，并观察它们如何显示在 Synapse 中。使用脚本 `modifyvehicledata.sql` 在你的 SQL Server
    实例上运行，向 SQL Server 2022 中添加随机数量的货物。

    2.  查看着陆区以查看 CSV 文件，方法是查看容器并深入到 `indexWorkingDir` 文件夹，而不是像图 3-37 中的 `Tables` 文件夹。


    ![](img/525217_1_En_3_Fig38_HTML.png)


    截图显示了 SQL 脚本 1。顶部窗格有 6 行代码。底部窗格有一个包含车辆注册号、车辆城市和货物列的表格。


    图 3-38


    Synapse 中已更新的货物数量


    3.  回到 Synapse Studio 并运行 `getcargocounts.sql` 中的相同查询，以查看变更已被应用，如图 3-38 所示。


    所以，尽管设置步骤很多，但只需几个步骤就能看到变更出现在 Synapse 中。这就是 Synapse Link 提供的功能：来自 SQL Server 的近实时变更自动在
    Synapse 中可用。


    ### 关于 Synapse Link 的更多细节


    关于 Synapse Link，我认为有几个细节你应该了解。要获取所有细节和最新更新，请务必查阅文档 [`https://aka.ms/synapselinksqlserver`](https://aka.ms/synapselinksqlserver)。


    #### 配置选择


    在设置 Synapse Link 时，你可以进行多项配置选择，包括以下内容：


    ![](img/525217_1_En_3_Fig39_HTML.png)


    一个标题为“SQL 2022 链接连接”的选项卡的截图。一个箭头指向“目标池”下已勾选的“在目标上删除并重新创建表”选项框。


    图 3-39


    在启动链接连接时删除并重新创建 Synapse 池中的表


    *   **SQL 池**


    当你在 Synapse 中创建 SQL 专用池时，你可以选择一个称为数据仓库单位 (`DWU`) 的性能级别。我们在练习中选择了默认值，但对于生产工作负载，你可能需要选择另一个级别。你选择的
    `DWU` 会影响你针对 SQL 池中表运行的查询的性能。但你的性能决定也有代价。你所做的 `DWU` 选择也会影响并发处理表进行摄入的能力。你可以在创建池后更改
    `DWU` 设置（向上或向下扩展）。你可以在 [`https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/what-is-a-data-warehouse-unit-dwu-cdwu#change-data-warehouse-units`](https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/what-is-a-data-warehouse-unit-dwu-cdwu#change-data-warehouse-units)
    了解更多关于 `DWU` 设置的信息。


    *   **停止和重启链接连接**


    如果你停止到 SQL Server 的链接连接，所有 Synapse Link 系统表数据将被移除，着陆区容器中的文件将被删除。SQL 池表中的所有当前数据不受影响。


    如果你再次启动链接连接，我们将从 SQL Server 获取所有表的新快照，并将其放入着陆区。这里有一个重要的警告：如果你重启链接连接并且没有选择 `在目标上删除并重新创建表`
    选项，你的链接连接将显示错误，因为目标表已经存在。因此，你可以先在 Synapse 中自行删除表，或者在启动连接时使用此选项。你可以在启动连接的窗口的“常规”选项卡下找到此选项，如图
    3-39 所示。


    注意


    我们也在考虑增强功能，以便能够暂停和恢复链接连接。如果链接连接被暂停，SQL Server 将继续向着陆区馈送数据和变更，但这些变更直到你恢复链接连接后才会出现在
    Synapse 中。


    *   **链接连接的核心数**


    创建链接连接时，你可以选择核心数。这些核心数专为摄入处理而设计。你选择的核心越多，你的数据摄入速度就越快。但更大的核心数也会影响成本。我们建议你从较小的核心数开始以节省成本，然后向上调整。更改核心数的唯一问题是，你必须停止并重新启动链接连接，这需要重新对所有表进行快照（直到暂停和恢复功能可用）。


    *   **计划模式或连续模式**


    创建链接连接时的另一个选项是计划模式或连续模式。连续模式意味着摄入服务将始终监视着陆区中的变更以处理数据。计划模式允许你为某些时间范围安排摄入。计划模式将帮助你节省摄入成本，但也会延迟数据在
    SQL 池表中可供读取的时间。使用计划模式不会影响 SQL Server 2022 上的任何事务处理延迟或日志截断。


    *   **向链接连接添加或删除表**


    你可以向链接连接添加或从中删除表。新表的快照将被创建并同步到新的 SQL 池表中。


