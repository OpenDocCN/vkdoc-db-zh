    ## 达拉斯项目


    2019 年 12 月，我庆祝了 SQL Server 2019 的发布，并与位于雷德蒙德微软园区 43 号楼的 SQL Server 团队所有同事相聚。对于
    SQL Server 和我个人而言，那都是一段令人振奋的时光。在刚过去的一个日历年里，我飞行了大约 50,000 英里，向外界推广 SQL Server 2019。我还发行了我的第二本书`SQL
    Server 2019 Revealed`（[`https://aka.ms/sql2019book`](https://aka.ms/sql2019book)），讲述了我们最新版
    SQL Server 发布的完整故事。我为这次发布感到自豪，并向工程团队的许多人讲述了所有来自客户的积极反馈和故事。在那次行程中，我在由微软杰出工程师、SQL
    Server 2019 发布首席开发经理斯拉瓦·奥克斯组织的一次内部会议上，向参与发布的全体工程师发表了演讲。


    在雷德蒙德期间，我花了一些时间与我在 CSS 的长期好友罗伯特·多尔叙旧，他现在为斯拉瓦工作。午餐时，我向鲍勃讲述了所有旅途见闻以及发布产品和著书的经历。SQL
    Server 2019 被斯拉瓦、特拉维斯·赖特和托比亚斯·特恩斯特罗姆标记为西雅图项目。午餐时我告诉鲍勃：“嘿，我想你和我应该为下一版 SQL Server
    想个项目名。”鲍勃比我晚入职一年，所以我们加起来代表了超过 55 年的 SQL Server 经验。那天鲍勃（他经常这样）穿着一件达拉斯牛仔队的球衣。我提议项目名称应该叫达拉斯。午餐后，我顺道去了斯拉瓦的工位，向他提出了这个想法。他告诉我：“这很有道理。这个新版本应该是对多年来为
    SQL Server 辛勤工作的两位‘鲍勃’的致敬。”斯拉瓦第二天就给我们团队发了一封邮件，于是达拉斯这个项目名就此诞生。有时候，微软的项目名称就是这样创造出来的。


    尽管我们刚刚发布了 SQL Server 2019，但关于达拉斯项目可以包含哪些新功能的讨论早已开始。对我来说，我的工作重点将发生巨大变化。在这同一次行程中，我与我的经理、负责整个
    Azure SQL 和 SQL Server 程序管理的副总裁阿萨德·汗进行了会晤，这将引导我开始从事 Azure SQL 方面的工作。但我仍然密切关注着达拉斯项目的进展。


    早在 2019 年 12 月末，我的同事阿米特·班纳吉就在为该项目准备提案。当我们迈入 2020 年时，我和任何人都没有料到，我们所有人都将不得不适应一场全球疫情。坦率地说，疫情加速了我们在云端的工作，这导致达拉斯项目的规划进度放缓。好消息是，基于我们的工程系统，我们在云端设计和构建的大部分工作都自然适用于
    SQL Server；智能查询处理和 SQL 账本就是很好的例子。


    对我个人而言，专注于云端工作非常合适，因为我当时已经走上了从事 Azure SQL 工作的道路。我没想到疫情会加速这项工作，其形式是与安娜·霍夫曼合作开发
    Azure SQL Workshop（[`https://aka.ms/azuresqlworkshop`](https://aka.ms/azuresqlworkshop)），这进而催生了广受欢迎的
    Azure SQL 基础知识学习路径（[`https://aka.ms/azuresqlfundamentals`](https://aka.ms/azuresqlfundamentals)）以及一个名为
    Azure SQL 入门系列的大型视频系列（[`https://aka.ms/azuresql4beginners`](https://aka.ms/azuresql4beginners)）。既然我们的内容已经全部转向数字化，为什么不写第三本书呢？于是`Azure
    SQL Revealed`（[`https://aka.ms/azuresqlbook`](https://aka.ms/azuresqlbook)）在 2020
    年秋季应运而生。


    但达拉斯项目怎么样了呢？


    在 2020 年全年，在开发方面由斯拉瓦领导、程序管理方面由阿米特领导，达拉斯项目的工作已经启动。一个例子是项目名为盖亚下的并行度反馈功能。盖亚雄心勃勃，是我们仍在努力的一项事业，但并行度反馈的概念从中诞生，你将在本书第
    5 章听到更多相关内容。其他功能，如参数敏感型计划优化、跨平台备份、缓冲池扫描、查询存储提示、多写入复制、SQL 账本、T-SQL 语言改进等等，都在进行中。我们正在积极推进达拉斯项目的改进工作，但尚未真正确定一个完整的发布计划。同样，我们现在的做事方式很酷的一点是，这些功能中有许多是为
    Azure SQL 设计的，但我们知道由于引擎的兼容性，它们随时可以融入到达拉斯项目中。


    随着 2020 年继续推进，我越来越清楚地意识到，达拉斯项目最早也要到 2022 年才能真正发布。2020 年末，我与斯拉瓦、阿米特、阿萨德和特拉维斯·赖特开会讨论计划。我们所有人，连同我们的
    Azure 数据副总裁罗翰·库马尔，都一致认为我们需要一个新版的 SQL Server，宜早不宜迟。但我们也一致认为，在 2022 年之前仓促行事不会带来一个出色的版本。在
    2020 年末，我第一次听到了`SQL Server 2022`这个词。

    '
- fmt: '## 项目背景与团队变动


    When this book is released, I will have been at Microsoft 29 years, all working
    on SQL. Throughout these years I’ve seen many changes, reorganizations, and transitions,
    more than I can even remember. But two changes happened early in calendar year
    2021 that surprised me and gave me concern for project Dallas. Slava Oks left
    the SQL team to work in Azure (note: Slava would eventually leave Microsoft in
    the fall of 2021), and Amit Banerjee left Microsoft. In addition, Travis Wright
    pivoted from a role in the program management leadership team to work as a development
    manager for Azure Arc. Losing someone like Slava was pretty hard for me personally.
    I have worked with Slava in SQL for 20 years. All the journeys we had together
    (Slava is the one who taught me debugging in case anyone ever wanted to know that
    small fact; I thought I knew what debugging was until I met Slava) from SQL Server
    2005 to SQL Server on Linux and of course SQL Server 2019. I also would deeply
    miss Amit. I actually mentored Amit when he first joined Microsoft and then enjoyed
    all those years as colleagues in engineering. I was really looking forward to
    partnering with Amit to release Dallas. But I knew the opportunity he was moving
    to was important for him and his family. I was happy and excited for these folks,
    but as you can imagine, I quickly was in a few meetings with Asad Khan on how
    to handle the situation and ensure Dallas moved forward.


    For other teams or other companies, losing leaders like this would rock them to
    the core and greatly affect the ability to release a product. But not SQL Server.
    Asad was still our PM leader. Peter Carlin, the longtime SQL Server and Azure
    SQL engineering leader, would become our vice president over all of Azure SQL
    and SQL Server (and even more today). Rohan Kumar was still our Vice President
    of Azure Data. Hanuma Kodavalla, Technical Fellow at Microsoft and longtime SQL
    veteran, would be our engineering leader for all the developers to make Dallas
    a reality. Asad would promote the famous Joe Sack to run the program managers
    for all of SQL Server. And in a huge move, we promoted Pedro Lopes to be the technical
    lead PM for Dallas. Pedro is not only an incredibly talented, well-respected technical
    leader but someone I personally call a friend. And well, I guess we still had
    me. SQL Server is in my blood, so of course I needed to stay the course and see
    project Dallas to the end no matter what challenges came up.


    In the spring of 2021 with these organizational announcements, we also tentatively
    agreed on some key aspects to Dallas:


    *   Project Dallas would be called SQL Server 2022.

    *   We would announce this release as a Private Preview in the fall of 2021.

    *   We would announce a Public Preview in late spring of 2022.

    *   We would target the General Availability of SQL Server 2022 in the fall of
    2022.


    ## 构建演示文稿与发布策略


    With a goal for a Private Preview in the fall of 2021 (we made the decision to
    announce this at the Microsoft Ignite virtual event, which we knew at this time
    was in early November 2021), we had to get more organized than ever and start
    cranking out some builds. Joe assigned Pedro to be our de facto release program
    manager holding the reins to ensure everyone was meeting release criteria and
    getting features lined up for an announcement.


    Our marketing team assigned Matthew Burrows to be the lead marketing manager for
    SQL Server 2022. Matt quickly started building weekly virtual team meetings to
    talk about SQL vNext (we always call a version `vNext` until we 100% agree on
    the exact name) including myself, Joe Sack, Pedro Lopes, James Rowland-Jones,
    and Sonya Waitman (Sonya works with Matt in marketing and was so valuable throughout
    the entire release). We would soon add another party to this band, Kendal Van
    Dyke. Joe hired Kendal to run our Early Adoption Program (`EAP`) since our first
    announcement would be a Private Preview program, which required customers to register
    with Microsoft to test and try out early builds. Kendal was a longtime veteran
    of Microsoft as a customer engineer and a well-respected person in the community
    and within Microsoft.


    I quickly met with Pedro and Joe and asked how I could best help us march toward
    Private Preview. They both responded very quickly, “Build us a deck!”


    So in the late spring of 2021, I started “doing my thing” to build an “NDA” (for
    anyone with a nondisclosure agreement with Microsoft) deck we could use. The very
    first attempt for an overview of SQL Server `vNext` looked like the following
    Figure 1-1.


    ![](Images/525217_1_En_1_Fig1_HTML.png)


    Figure 1-1: The first SQL Server `vNext` slide


    You can see in Figure 1-1 there are not really any specific features listed, just
    themes. Plus, you will notice at the time we were still debating the future of
    Big Data Clusters (`BDC`). Project Austin, named by James Rowland-Jones, was an
    early proposal to reinvent `BDC` with serverless SQL and Spark.


    **Note**

    You may have read that in February of 2022 we announced the retirement of SQL
    Server Big Data Clusters, which explains why it was not a part of the SQL Server
    2022 release. You can read more at [`https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics`](https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics).


    I knew all the planned features for Dallas, but at this time I didn’t have a 100%
    commitment that we could talk about all of them yet. One thing I knew is that
    these “pillars” represented the major categories for features in the release.


    To build a foundation for a true public deck on SQL Server `vNext`, we first needed
    acknowledgment on the name. We got that from Matthew Burrows about 1 month out
    from Ignite. SQL Server 2022 would be the name. We also got a much clearer picture
    of all the features we knew would make the release, so I built this first version
    of an all-up SQL Server 2022 slide with major features with some rebranding for
    categories which you can see in the following Figure 1-2.


    ![](Images/525217_1_En_1_Fig2_HTML.png)


    Figure 1-2: The first all-up SQL Server 2022 slide


    ## 功能展示与保密策略


    With this in mind, we all decided to keep the announcement for SQL Server 2022
    very close to the chest. I was still presenting virtually and even in person (yes,
    it is true I started presenting at in-person events such as the SQL Server and
    Azure SQL Conference as early as June 2021). And I would always get asked the
    question, “When is the next version of SQL Server coming out?” or even better
    “Will there be a new version of SQL Server?” Both fair questions since we were
    very quiet on this subject, and by the summer of 2021, it would have been almost
    2 years since we released SQL Server or even talked about it.


    I then built out more slides talking about each of these areas, including all
    the features we knew would be in the release. I consulted with Pedro regularly
    on exactly what we could commit would be in the release, even if it were not immediately
    in Private Preview builds.'
