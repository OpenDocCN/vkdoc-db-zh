  trans: '

    ## 使用 adutil 进行 Active Directory 身份验证


    Linux 上的 SQL Server 支持 SQL 和 Active Directory (AD) 两种登录身份验证方式。当我们最初推出适用于 SQL Server
    2017 甚至 2019 的 Linux 版 SQL Server 时，设置 AD 身份验证相当复杂。我们现在拥有一个名为 `adutil` 的工具，可以简化此过程。`adutil`
    工具适用于 SQL Server 2019 和 2022，并且也支持容器。您可以在 `https://docs.microsoft.com/sql/linux/sql-server-linux-ad-auth-ad-util-introduction`
    阅读更多关于如何使用 `adutil` 的信息。


    ## SQL Server 的 Azure 扩展


    目前，SQL Server 的 Azure 扩展并未包含在 Linux 版 SQL Server 的安装过程中。但您可以使用一种已有的方法，通过 Azure
    Arc 启用的服务器来支持 Linux 上的 SQL Server，具体文档请参见 `https://docs.microsoft.com/sql/sql-server/azure-arc/connect`。


    正如我在本书第 3 章所述，SQL Server 的 Azure 扩展是一项 Windows 服务，它是 Azure Arc 代理框架的一部分，该框架本身也作为
    Windows 服务运行。在 Linux 上，这些程序以守护进程形式运行，分别称为 `himds`（Arc 代理）和 `SqlServerExtension.Service`（SQL
    扩展）。


    ## 优化 Linux 上的 SQL Server 2022


    除了您使用的典型 SQL Server 优化技术（如创建适当的索引）外，运行 Linux 版 SQL Server 时还需考虑一些优化措施：


    自从我们推出适用于 Linux 的 SQL Server 2017 以来，我们已经从客户经验和基准测试中学习到如何以非常具体的方式调整 Linux 内核和
    SQL Server，以实现最佳性能。`https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices`
    提供了一份非常详细的推荐配置列表。如果您只是试用 Linux 上的 SQL Server，可能不需要考虑这些配置。然而，为了获得最佳的生产环境体验，我强烈建议您通读所有这些配置。


    在 Windows 上的 SQL Server 之外，存在一些设置，例如即时文件初始化 (IFI) 和锁定内存页。这些设置不适用于 Linux 上的 SQL
    Server。


    您可能会在 Linux 上安装 SQL Server 后立即看到这两条消息出现：


    ```

    ForceFlush is enabled for this instance

    ForceFlush feature is enabled for log durability

    ```


    我的长期同事 Robert Dorr 花费了大量时间研究 Linux 上 SQL Server 的 I/O 一致性和性能。这项工作促成了一系列我们推荐的配置选项，您可以在
    `https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices#linux-os-configuration`
    的标题为“SQL Server 和强制单元访问 (FUA) I/O 子系统功能”部分阅读这些内容。如果您喜欢阅读内幕故事，请查看 Bob 的博客文章：`https://techcommunity.microsoft.com/t5/sql-server-blog/sql-server-on-linux-forced-unit-access-fua-internals/ba-p/3199102`。


    避免 OOM killer。


    听起来像恐怖电影，对吧？嗯，如果您遇到内存不足 (OOM) 并导致程序被终止的情况，那可能确实很可怕。SQL Server 在动态内存管理方面做得很好，但如果它在
    Linux 内消耗过多内存，就可能会遇到此问题。这就是我们创建名为 `memorylimitmb` 的配置选项的原因。默认情况下，我们实际上限制了 SQL
    Server 在 Linux 上可以使用的总内存，因此这对您来说可能不是问题。但我鼓励您在 `https://docs.microsoft.com/sql/linux/sql-server-linux-performance-best-practices#sql-server-configuration`
    的标题为 **使用 mssql-conf 设置内存限制** 的部分阅读更多细节，以确保您的实例保持稳定。


    ## Linux 上 SQL Server 2022 的 HADR


    SQL Server 内置了强大的高可用性和灾难恢复 (HADR) 功能，包括故障转移群集、Always On 可用性组 (AG) 以及丰富的备份/恢复选项。


    让我们看看如何将这些功能用于 Linux 上的 SQL Server。


    ### 故障转移群集


    在 Windows 上的 SQL Server 中，SQL Server 与 Windows Server 故障转移群集 (WSFC) 集成，以支持共享存储的自动高可用性功能。由于
    Linux 上没有 WSFC，您可以使用名为 `Pacemaker` 的软件包来支持 SQL Server 故障转移群集。您可以在 `https://docs.microsoft.com/sql/linux/sql-server-linux-shared-disk-cluster-configure`
    阅读更多关于如何设置此功能的信息。


    ### Always On 可用性组 (AG)


    核心 AG 软件都内置于 SQL Server 引擎中。这就是为什么对于 Linux（或 Windows）上的 SQL Server，您可以设置一个*无群集*的可用性组（如果您记得我在本书第
    6 章展示了如何为包含式可用性组执行此操作）。此选项不提供自动故障转移，但提供了一个副本方案。我们也将其称为读取横向扩展可用性组，因为它是分离只读工作负载的完美解决方案。您可以在
    `https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-configure-rs`
    阅读更多关于设置读取横向扩展可用性组的信息。


    我们还支持使用 Pacemaker 在 RHEL、Ubuntu 和 SLES 上运行的 AG 实现完全自动故障转移解决方案。您可以在 `https://docs.microsoft.com/sql/linux/sql-server-linux-availability-group-cluster-rhel`
    阅读更多关于如何在 RHEL 上设置此功能的信息。您也可以使用 Azure 虚拟机设置此配置，相关信息请参阅 `https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/rhel-high-availability-stonith-tutorial`。


    ### HPE Serviceguard


    事实证明，我们所做的一项工作是将支持 SQL Server 控制 Always On 可用性组故障转移的代码放入了一个开源项目，您可以在 `https://github.com/Microsoft/mssql-server-ha`
    找到。通过这样做，我们允许其他合作伙伴将其故障转移解决方案与 SQL Server 集成。其中一种解决方案来自 HPE，名为 Serviceguard。您可以在
    `https://docs.microsoft.com/sql/linux/sql-server-availability-group-ha-hpe` 阅读更多关于如何将
    HPE Serviceguard 与 SQL Server 配合使用的信息。


    ### 备份/恢复


    SQL Server 的所有备份/恢复功能在 Linux 上的 SQL Server 中均可用，包括使用 URL 语法备份到 Azure 存储，以及 SQL
    Server 2022 新增的 S3 对象存储备份功能。


    您在本书第 6 章也了解到，支持使用 T-SQL 进行快照备份，无需编写 VDI 程序或依赖 Windows VSS。实际上，我们也称此功能为*跨平台快照备份*，因为我们希望在
    Linux 上支持快照备份。

    '
- fmt: '## SQL Server 2022 Containers


    I remember back around 2010 when it became very popular to run `SQL Server` on
    a virtual machine. The power of abstraction from a bare-metal machine plus being
    able to consolidate multiple machines on one host revolutionized computing in
    many ways.


    In recent years on `Linux` systems, the concept of a container has become extremely
    popular for applications, especially for developers. There is nothing fundamentally
    new for `SQL Server` containers in `SQL Server 2022`. But it is worth reviewing
    why containers can be used, how to use them, and some interesting scenarios where
    they can be quite powerful.


    Keep up to date with all the latest on `SQL Server` containers at [`https://aka.ms/sqlcontainers`](https://aka.ms/sqlcontainers).


    ### Why Containers?


    One myth for containers I always have to bust is that they are used to replace
    virtual machines. That is actually possible, but I’ve found they typically complement
    virtual machines. One powerful use of containers is to consolidate applications
    into multiple containers running in a virtual machine.


    Containers are actually an instance of an immutable image that contains a program(s)
    that is run in an isolated manner with a complete private file system. A container
    only includes the files necessary to run the programs in it from the image.


    For example, `SQL Server` does not require every file and process that runs on
    a `Linux` system. So now you can deploy multiple `SQL Server` containers in a
    virtual machine instead of deploying multiple virtual machines, saving space and
    resource usage. In fact, running multiple `SQL` containers is exactly how you
    can run multiple instances of `SQL Server` in the same virtual machine or computer
    for `Linux` since we don’t support named instances.


    Another myth about containers is that they don’t perform as well as a normal process
    because they are abstracted from the underlying `Linux` OS for threads, memory,
    I/O, etc. This is not true. Containers are just run in the OS in an isolated manner
    (containers only know about processes inside them) but have direct access to OS
    resources. So a `SQL` container running on `Linux` should have the same performance
    as `SQL Server` on `Linux`.


    Note: Make sure you are comparing the right environment with containers. `SQL`
    containers on `Windows` run on a `Linux` virtual machine hosted by `Windows` (or
    `WSL`). That is a layer of abstraction that is different than running a container
    directly in a `Linux` VM hosted by `Linux`.


    Containers are run by a container runtime like `Docker`. Effectively a container
    runtime like `Docker` understands how to take a container image and execute the
    program(s) associated with the container in an isolated manner using native `Linux`
    APIs (such as `namespaces` and `cgroups`). Container runtimes also understand
    how to manage containers such as stopping and starting a container.


    Containers have other advantages including:


    *   **Portability** – Containers can run on any operating system that supports
    a container runtime like `Docker`, and you can be assured it is the same container
    image. So `SQL Server` containers can run on `Windows`, `Linux`, or `macOS`, and
    you can be assured it is the same `SQL Server` engine. `Linux` containers on `Windows`
    and `macOS` have some type of virtualization that allows them to run `Linux` programs.
    This portability is huge for development. Instead of trying to maintain a development
    server for `SQL Server` that all developers share, just provide them with `SQL
    Server` containers to run on their own environment for any OS.


    *   **Consistency** – Let’s say you want all developers to use a specific cumulative
    update of `SQL Server 2019` (or `2022` when we start shipping `CU` builds) along
    with a specific database schema and scripts. Containers provide that capability
    across any OS. Microsoft produces container images for each `CU` build of a major
    version of `SQL Server`: 2017, 2019, and 2022.


    *   **Efficiency** – Patching `SQL Server` with a cumulative update on `Windows`
    requires you to install a separate program that installs the update on top of
    the existing `RTM` build or update. `SQL Server` on `Linux` has an upgrade option
    to upgrade to a newer `CU` build. Containers do not require any patching. In fact,
    you can’t patch a container. Instead, you switch containers. Read more in the
    section titled “The Container Switch Method” to see how it works.


    Here is a talk I gave at `SQLBits` on `SQL Server` containers to learn more: [`https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_Containers`](https://sqlbits.com/Sessions/Event18/Inside_SQL_Server_Containers).


    ### Using SQL Server 2022 Containers


    I forgot to mention one of the most powerful capabilities of `SQL Server` containers.
    `SQL Server` containers are a preinstalled `SQL Server` (and by default `Developer
    Edition`, so it is free!). We have built our container images for `SQL Server`
    so that when you run them, `SQL Server` just starts up and executes. Part of the
    magic is that `SQLSERVR.EXE` was built to run as a standalone program (in effect,
    a daemon program) and our container image is set up to configure and start the
    `SQL Server` engine.'
