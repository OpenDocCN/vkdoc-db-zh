  trans: '

    # Synapse Link 如何工作？


    Synapse Link 的工作涉及多个组件。让我们回顾图 3-12 来理解这些组件和数据流。


    ![](img/525217_1_En_3_Fig12_HTML.png)


    Azure Synapse Link for SQL Server 的六步流程图。步骤从 Synapse 工作区开始，以更改数据流队列结束。


    图 3-12


    SQL Server 的 Synapse Link 架构


    让我们使用图中的数字来了解组件创建和数据流的顺序。不用担心如何创建这些组件的细节。你将在下一节的练习中看到这些细节。


    1.  首先，你需要一个 Azure Synapse 工作区。

    2.  现在创建一个 SQL 专用池来承载数据。

    3.  创建一个 `SQL Server 2022 的链接服务`。这在 Synapse 内建立了一个控制平面，并能够将 SQL Server 和 Synapse
    连接起来。你将在 SQL Server 的计算机或网络上安装自承载集成运行时 (`SHIR`)。此链接服务专用于此特定的 SQL Server 和数据库。如果你想为同一
    SQL 实例上的不同数据库设置链接，则需要一个唯一的链接服务，这需要另一个不同的 `SHIR`。一次只能在 `VM` 或计算机上运行一个 `SHIR` 程序。但由于
    `SHIR` 可以远程连接到 SQL Server，你可以在网络中的不同 `VM` 或计算机上运行该程序的另一个副本。`SHIR` 仅在 Windows 上工作，因此如果你在
    Linux 上使用 Synapse Link for SQL Server，你将需要在网络中的一台可以连接到你的 Linux 上的 SQL Server 的
    Windows `VM` 或计算机上安装 `SHIR`。

    4.  创建一个名为 `暂存区` 的 Azure 存储帐户以及该暂存区的链接服务。此暂存区帐户将专用于此 SQL Server 和数据库。暂存区将存储从 SQL
    Server 提取的文件，Synapse 知道如何将这些文件摄取到 SQL 池表中。

    5.  基于 SQL 的链接服务创建一个 `链接连接`。从 SQL Server 上的源数据库选择要链接的表。启动连接。`SHIR` 在 SQL Server
    2022 中执行系统存储过程以启动该过程。表的快照被捕获并通过 `HTTPS` 以 Parquet 和架构文件的形式提交到暂存区。控制平面中的摄取服务获取暂存区文件并在
    SQL 池中创建表。数据根据初始快照插入到池表中。链接连接针对数据库中的特定表。你可以为同一个数据库拥有多个链接连接，但一个表只能位于一个链接连接中。

    6.  对 SQL Server 中表的任何修改都会记录在事务日志中。SQL Server 中的更改数据捕获任务获取日志更改并将其放入队列，这些队列是 SQL
    Server 内的内存结构。内部任务将更改从队列以 `CSV` 和清单文件的形式通过 `HTTPS` 发布到暂存区。我们尽量将所需的内存量保持在尽可能小的水平，同时平衡需要有良好的吞吐量来捕获日志更改并发布到暂存区。SQL
    Server 使用一个工作线程池来执行捕获日志更改并将这些更改发布到暂存区的任务。工作线程池是专用于 Synapse Link 更改数据捕获的池，并且跨实例上所有启用了
    Synapse Link 的数据库工作。Synapse 中的摄取服务获取暂存区文件并执行对 SQL 池中受影响表的修改。

    7.  可选地创建一个 Power BI 报表，直接在 SQL 池表上可视化你的数据。


    现在你已经了解了组件和流程，让我们尝试一个练习，看看 Synapse Link 如何运作。


    ## 尝试 Synapse Link for SQL Server


    为了成功完成本练习，你需要仔细遵循先决条件、设置练习的步骤以及每个练习步骤。


    我要感谢 Chuck Heinzelman、Mine Token、Milos Vucic 和 Tim Chen 帮助我理解 Synapse Link 的工作原理，并为本练习创建了所有资源。


    ### 先决条件


    *   一台至少有两个 CPU 和 `8Gb` 内存的虚拟机或计算机。对于我的测试，我使用了 Azure `E4ds_v5` `VM`，它带有四个 `vCPU`
    和 `32Gb` 内存。你的虚拟机或计算机需要能够通过 Internet 连接到 Azure，或者作为 Azure 虚拟机运行。

    *   SQL Server 2022 评估版。本练习只需要数据库引擎功能。

    *   一个具有创建 Azure Synapse 工作区和 Azure Data Lake Storage Gen2 帐户权限的 Azure 订阅（Synapse
    使用自己的存储帐户，但你需要一个单独的帐户作为暂存区）。

    *   SQL Server Management Studio (`SSMS`)。最新的 18.x 或 19.x 版本均可使用。

    *   将 WideWorldImporters `Standard` 示例备份从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak)
    下载到你将运行 SQL Server 的计算机上。之所以使用 Standard 备份，是因为像内存中 OLTP 这样的功能不被 Synapse Link 支持。

    *   一份来自书籍示例 `ch3_cloudconnected\synapselink` 文件夹中的脚本副本。

    '
- fmt: "#### Set Up the Exercise\n\n![](Images/525217_1_En_3_Fig13_HTML.png)\n*A screenshot\
    \ shows b w synapse analytics. The overview is selected in the left pane. The\
    \ right pane shows the essentials, getting started, analytics pools, and Apache\
    \ Spark pools.*\n**Figure 3-13**\n*An Azure Synapse Analytics workspace*\n\n1.\
    \  Create an `Azure Synapse Analytics` workspace. The following is a quick-start\
    \ guide on how to create a workspace: [`https://docs.microsoft.com/azure/synapse-analytics/get-started-create-workspace`](https://docs.microsoft.com/azure/synapse-analytics/get-started-create-workspace).\n\
    \    Here are important points to follow as you create the workspace:\n    * \
    \  The `Data Lake Storage Gen2` account you use during the workspace is for `Synapse`.\
    \ You will create another for the `landing zone` later in this exercise.\n   \
    \ *   For network settings you must select `Disable` for `Managed virtual network`\
    \ and check `Allow connections from all IP addresses`. If you are concerned about\
    \ this requirement for security, you can set up firewall rules.\n    *   Although\
    \ not required I like to organize my `Azure` resources into specific resource\
    \ groups. For this exercise I created an `Azure Virtual Machine` running `SQL\
    \ Server 2022` in the same resource group as `Synapse` because I’ll use the `Allow\
    \ Azure services and resources to access this workspace` option to access `Synapse`\
    \ instead of setting up a firewall rule.\n    *   For everything else I chose\
    \ the defaults. `Synapse Link` should be supported in any region where `Synapse`\
    \ is supported, but check [`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#prerequisites`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#prerequisites)\
    \ for the latest updates.\n    In my experience `Synapse` workspaces don’t take\
    \ longer than 5–10 minutes to deploy.\n    Figure [3-13](#525217_1_En_3_Chapter.xhtml#Fig13)\
    \ shows a portal view of my `Synapse` workspace after it was created.\n\n![](Images/525217_1_En_3_Fig14_HTML.png)\n\
    *A screenshot shows b w landing zone. The overview is selected in the left pane.\
    \ The right pane shows the essentials, data lake storage, file service, security,\
    \ and networking.*\n**Figure 3-14**\n*The Azure storage landing zone account*\n\
    \n2.  Next, we need a place to host our data, which for `Synapse Link` is called\
    \ a `dedicated SQL pool`. Think of this as a database within `Synapse` to host\
    \ `SQL`-based tables from the source `SQL Server`. There are a few ways to do\
    \ this. One simple way is from the `Azure` portal. Go to the resource menu on\
    \ the left side of the screen on your workspace and select `SQL pools` under `Analytics\
    \ pools`. Select `+ New`. For this exercise put in a pool name (I chose `wwisqlpool`)\
    \ and leave the defaults. For a production system, you may want to choose different\
    \ options here. See the section later in this chapter titled “More Details About\
    \ Synapse Link” for more details.\n3.  Create a new `Azure` storage account to\
    \ be used for `Azure Data Lake Storage Gen2`, which is the `landing zone`. I used\
    \ the instructions at this documentation page to create my storage account: [`https://docs.microsoft.com/azure/storage/blobs/create-data-lake-storage-account`](https://docs.microsoft.com/azure/storage/blobs/create-data-lake-storage-account).\
    \ For this exercise I used the same region and resource group as my `Synapse`\
    \ workspace (not required), and I chose the `Standard` option for `Performance`\
    \ (for production workloads, you may want `Premium`). For everything else I chose\
    \ the defaults except on the `Advanced` blade, you **MUST choose `Enabled for\
    \ Hierarchical Namespace`**. Figure [3-14](#525217_1_En_3_Chapter.xhtml#Fig14)\
    \ shows my storage account after creation.\n\n![](Images/525217_1_En_3_Fig15_HTML.png)\n\
    *A screenshot shows add role assignment under access control. The role, scope,\
    \ members, description, and condition options are visible under review + assign\
    \ menu.*\n**Figure 3-15**\n*Assign the Synapse workspace access to the landing\
    \ zone container*\n\n4.  A storage account is not enough to store files from `SQL\
    \ Server`. You need a folder or `container`. On the resource menu for the storage\
    \ account on the left-hand side of the screen under `Data storage`, select `Containers`.\
    \ Then on the new screen, select `+ Container`. Type in the name of your choice\
    \ (you will need it later). I called mine `wwidata`. Leave the default and select\
    \ `Create`. This should only take seconds.\n5.  You now need to grant access for\
    \ the `Synapse` workspace to the `landing zone` storage account. Follow steps\
    \ 1 and 2 at this link in the documentation to assign the `Managed Identity` access\
    \ to the `landing zone`: [`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#create-linked-service-to-connect-to-your-landing-zone-on-azure-data-lake-storage-gen2`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#create-linked-service-to-connect-to-your-landing-zone-on-azure-data-lake-storage-gen2).\n\
    \    My role assignment looked like Figure [3-15](#525217_1_En_3_Chapter.xhtml#Fig15).\n\
    \nThat was a lot of steps to set things up, but take your time to make sure you\
    \ are ready to work with `Synapse Link`."
  raw: "#### Set Up the Exercise\n\n![](Images/525217_1_En_3_Fig13_HTML.png)\n\nA\
    \ screenshot shows b w synapse analytics. The overview is selected in the left\
    \ pane. The right pane shows the essentials, getting started, analytics pools,\
    \ and Apache Spark pools.\n\nFigure 3-13\n\nAn Azure Synapse Analytics workspace\n\
    \n1.  Create an Azure Synapse Analytics workspace. The following is a quick-start\
    \ guide on how to create a workspace: [`https://docs.microsoft.com/azure/synapse-analytics/get-started-create-workspace`](https://docs.microsoft.com/azure/synapse-analytics/get-started-create-workspace).\n\
    \nHere are important points to follow as you create the workspace:\n    *   The\
    \ Data Lake Storage Gen2 account you use during the workspace is for Synapse.\
    \ You will create another for the landing zone later in this exercise.\n\n*  \
    \ For network settings you must select Disable for Managed virtual network and\
    \ check Allow connections from all IP addresses. If you are concerned about this\
    \ requirement for security, you can set up firewall rules.\n\n*   Although not\
    \ required I like to organize my Azure resources into specific resource groups.\
    \ For this exercise I created an Azure Virtual Machine running SQL Server 2022\
    \ in the same resource group as Synapse because I’ll use the **Allow Azure services\
    \ and resources to access this workspace** option to access Synapse instead of\
    \ setting up a firewall rule.\n\n*   For everything else I chose the defaults.\
    \ Synapse Link should be supported in any region where Synapse is supported, but\
    \ check [`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#prerequisites`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#prerequisites)\
    \ for the latest updates.\n\nIn my experience Synapse workspaces don’t take longer\
    \ than 5–10 minutes to deploy.\n\nFigure [3-13](#525217_1_En_3_Chapter.xhtml#Fig13)\
    \ shows a portal view of my Synapse workspace after it was created.\n\n![](Images/525217_1_En_3_Fig14_HTML.png)\n\
    \nA screenshot shows b w landing zone. The overview is selected in the left pane.\
    \ The right pane shows the essentials, data lake storage, file service, security,\
    \ and networking.\n\nFigure 3-14\n\nThe Azure storage landing zone account\n\n\
    1.  Next, we need a place to host our data, which for Synapse Link is called a\
    \ **dedicated SQL pool**. Think of this as a database within Synapse to host SQL-based\
    \ tables from the source SQL Server. There are a few ways to do this. One simple\
    \ way is from the Azure portal. Go to the resource menu on the left side of the\
    \ screen on your workspace and select **SQL pools** under Analytics pools. Select\
    \ **+ New**. For this exercise put in a pool name (I chose **wwisqlpool**) and\
    \ leave the defaults. For a production system, you may want to choose different\
    \ options here. See the section later in this chapter titled “**More Details About\
    \ Synapse Link**” for more details.\n\n2.  Create a new Azure storage account\
    \ to be used for Azure Data Lake Storage Gen2, which is the **landing zone**.\
    \ I used the instructions at this documentation page to create my storage account:\
    \ [`https://docs.microsoft.com/azure/storage/blobs/create-data-lake-storage-account`](https://docs.microsoft.com/azure/storage/blobs/create-data-lake-storage-account).\
    \ For this exercise I used the same region and resource group as my Synapse workspace\
    \ (not required), and I chose the Standard option for Performance (for production\
    \ workloads, you may want Premium). For everything else I chose the defaults except\
    \ on the Advanced blade, you **MUST choose Enabled for Hierarchical namespace**.\
    \ Figure [3-14](#525217_1_En_3_Chapter.xhtml#Fig14) shows my storage account after\
    \ creation.\n\n![](Images/525217_1_En_3_Fig15_HTML.png)\n\nA screenshot shows\
    \ add role assignment under access control. The role, scope, members, description,\
    \ and condition options are visible under review + assign menu.\n\nFigure 3-15\n\
    \nAssign the Synapse workspace access to the landing zone container\n\n1.  A storage\
    \ account is not enough to store files from SQL Server. You need a folder or ***container***.\
    \ On the resource menu for the storage account on the left-hand side of the screen\
    \ under **Data storage**, select **Containers**. Then on the new screen, select\
    \ **+ Container**. Type in the name of your choice (you will need it later). I\
    \ called mine **wwidata**. Leave the default and select Create. This should only\
    \ take seconds.\n\n2.  You now need to grant access for the Synapse workspace\
    \ to the landing zone storage account. Follow steps 1 and 2 at this link in the\
    \ documentation to assign the Managed Identity access to the landing zone: [`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#create-linked-service-to-connect-to-your-landing-zone-on-azure-data-lake-storage-gen2`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#create-linked-service-to-connect-to-your-landing-zone-on-azure-data-lake-storage-gen2).\n\
    \nMy role assignment looked like Figure [3-15](#525217_1_En_3_Chapter.xhtml#Fig15).\n\
    \nThat was a lot of steps to set things up, but take your time to make sure you\
    \ are ready to work with Synapse Link."
  trans: "\n#### 设置练习\n\n![](img/525217_1_En_3_Fig13_HTML.png)\n*一张截图显示了 Azure Synapse\
    \ Analytics。左侧窗格中选择了“概述”。右侧窗格显示了基本信息、入门、分析池和 Apache Spark 池。*\n**图 3-13**\n*一个\
    \ Azure Synapse Analytics 工作区*\n\n1.  创建一个 `Azure Synapse Analytics` 工作区。以下是如何创建工作区的快速入门指南：[`https://docs.microsoft.com/azure/synapse-analytics/get-started-create-workspace`](https://docs.microsoft.com/azure/synapse-analytics/get-started-create-workspace)。\n\
    \    在创建工作区时，需要遵循以下要点：\n    *   你在工作区创建过程中使用的 `Data Lake Storage Gen2` 存储账户是给\
    \ `Synapse` 用的。在本练习的后续步骤中，你将为 `登陆区` 另外创建一个。\n    *   对于网络设置，你必须为 `托管虚拟网络` 选择 `禁用`，并勾选\
    \ `允许来自所有 IP 地址的连接`。如果担心此要求的安全性，你可以设置防火墙规则。\n    *   虽然不是必须的，但我喜欢将 `Azure` 资源整理到特定的资源组中。在本练习中，我在与\
    \ `Synapse` 相同的资源组中创建了一个运行 `SQL Server 2022` 的 `Azure 虚拟机`，因为我将使用 `允许 Azure 服务和资源访问此工作区`\
    \ 选项来访问 `Synapse`，而不是设置防火墙规则。\n    *   其他所有选项我都保留了默认值。`Synapse Link` 应该在支持 `Synapse`\
    \ 的任何区域都可用，但请查看 [`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#prerequisites`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#prerequisites)\
    \ 以获取最新更新。\n    根据我的经验，`Synapse` 工作区的部署时间不会超过 5-10 分钟。\n    图 3-13 展示了我的 `Synapse`\
    \ 工作区创建后的门户视图。\n\n![](img/525217_1_En_3_Fig14_HTML.png)\n*一张截图显示了 Azure 存储登陆区账户。左侧窗格中选择了“概述”。右侧窗格显示了基本信息、数据湖存储、文件服务、安全性和网络。*\n\
    **图 3-14**\n*Azure 存储登陆区账户*\n\n2.  接下来，我们需要一个地方来存放数据，对于 `Synapse Link` 来说，这个地方称为\
    \ `专用 SQL 池`。你可以将其理解为 `Synapse` 内部的一个数据库，用于承载来自源 `SQL Server` 的基于 `SQL` 的表。有几种方法可以创建它。一种简单的方法是通过\
    \ `Azure` 门户。转到屏幕左侧工作区的资源菜单，在 `分析池` 下选择 `SQL 池`。选择 `+ 新建`。对于本练习，输入一个池名称（我选择了 `wwisqlpool`）并保留默认值。对于生产系统，你可能需要在此处选择不同的选项。有关更多详情，请参阅本章后面的标题为“关于\
    \ Synapse Link 的更多细节”的部分。\n3.  创建一个新的 `Azure` 存储账户，用作 `Azure Data Lake Storage\
    \ Gen2`，即 `登陆区`。我使用此文档页面中的说明创建了我的存储账户：[`https://docs.microsoft.com/azure/storage/blobs/create-data-lake-storage-account`](https://docs.microsoft.com/azure/storage/blobs/create-data-lake-storage-account)。对于本练习，我使用了与我的\
    \ `Synapse` 工作区相同的区域和资源组（非必需），并且对于 `性能` 我选择了 `标准` 选项（对于生产工作负载，你可能需要 `高级`）。除了在\
    \ `高级` 选项卡上，我**必须选择 `启用分层命名空间`** 外，其他所有选项我都保留了默认值。图 3-14 展示了我创建后的存储账户。\n\n![](img/525217_1_En_3_Fig15_HTML.png)\n\
    *一张截图显示了访问控制下的“添加角色分配”。在“查看 + 分配”菜单下可以看到角色、范围、成员、描述和条件选项。*\n**图 3-15**\n*将 Synapse\
    \ 工作区访问权限分配给登陆区容器*\n\n4.  仅仅有一个存储账户不足以存储来自 `SQL Server` 的文件。你还需要一个文件夹或 `容器`。在屏幕左侧存储账户的资源菜单下，`数据存储`\
    \ 部分，选择 `容器`。然后在新屏幕上，选择 `+ 容器`。输入你选择的名称（稍后你会需要它）。我将我的容器命名为 `wwidata`。保留默认设置并选择\
    \ `创建`。这应该只需要几秒钟。\n5.  你现在需要为 `Synapse` 工作区授予对 `登陆区` 存储账户的访问权限。按照文档中此链接的步骤 1 和\
    \ 2，将 `托管标识` 的访问权限分配给 `登陆区`：[`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#create-linked-service-to-connect-to-your-landing-zone-on-azure-data-lake-storage-gen2`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#create-linked-service-to-connect-to-your-landing-zone-on-azure-data-lake-storage-gen2)。\n\
    \    我的角色分配如图 3-15 所示。\n\n设置这些步骤确实很多，但请花点时间确保你已准备好使用 `Synapse Link`。\n"
- fmt: "# Synchronizing Data with Synapse Link\n\nI have provided a series of detailed\
    \ steps to set up and do your initial sync of data from SQL Server to Synapse.\
    \ It will seem a bit daunting as you go through all of these steps. But once you\
    \ get this set up and initialized, it \"just works\" for changes.\n\n![](Images/525217_1_En_3_Fig16_HTML.png)\n\
    \nA screenshot shows the essentials and getting started. An arrow points toward\
    \ the open Synapse studio option under getting started.\n\n**Figure 3-16** Launching\
    \ Synapse Studio\n\n## Launching Synapse Studio\n\n1.  Since we will use the WideWorldImporters\
    \ backup, you need to restore this to your SQL Server instance. You can use the\
    \ `restorewwi_std.sql` script logged in as a sysadmin account. You may need to\
    \ edit the file path for the backup and data/log files. This script executes the\
    \ following T-SQL statements:\n\n```sql\nUSE master;\nGO\nRESTORE DATABASE WideWorldImporters\
    \ FROM DISK = 'c:\\sql_sample_databases\\WideWorldImporters-Standard.bak' WITH\n\
    MOVE 'WWI_Primary' TO 'f:\\data\\WideWorldImporters.mdf',\nMOVE 'WWI_UserData'\
    \ TO 'f:\\data\\WideWorldImporters_UserData.ndf',\nMOVE 'WWI_Log' TO 'g:\\log\\\
    WideWorldImporters.ldf',\nstats=5;\nGO\n```\n\n2.  Let's add two new tables to\
    \ the database to track vehicle cargo. Execute the script `extendwwitables.sql`\
    \ against SQL Server, which executes the following T-SQL statements:\n\n```sql\n\
    USE [WideWorldImporters];\nGO\nDROP TABLE IF EXISTS [Warehouse].[Vehicles];\n\
    GO\nCREATE TABLE [Warehouse].[Vehicles](\n[Vehicle_Registration] [nchar](20) NOT\
    \ NULL,\n[Vehicle_Type] [nchar](20) NULL,\n[Vehicle_State] [nvarchar](100) NULL,\n\
    [Vehicle_City] [nvarchar](100) NULL,\n[Vehicle_Status] [nvarchar](10) NULL,\n\
    PRIMARY KEY CLUSTERED\n(\n[Vehicle_Registration] ASC\n));\nGO\nDROP TABLE IF EXISTS\
    \ [Warehouse].[Vehicle_StockItems];\nGO\nCREATE TABLE [Warehouse].[Vehicle_StockItems](\n\
    [Vehicle_Registration] [nchar](20) NOT NULL,\n[StockItemID] [int] NOT NULL\nPRIMARY\
    \ KEY CLUSTERED\n(\n[Vehicle_Registration] ASC,\n[StockItemID] ASC\n));\nGO\n\
    ```\n\n3.  Populate data into these tables by executing the script `populatedata.sql`\
    \ against SQL Server.\n\n4.  The WideWorldImporters database includes some features\
    \ and data types that are not supported by Synapse Link. Therefore, execute the\
    \ script `alterwwi.sql` against SQL Server to remove some of these features (e.g.,\
    \ temporal tables) and columns with unsupported data types.\n\n**Note** It is\
    \ possible that some of these data types can be supported by the time SQL Server\
    \ 2022 is released, but to be safe for the purposes of this exercise, I removed\
    \ all features or types that could cause an issue.\n\n5.  Both Synapse and SQL\
    \ Server 2022 need a master key for encryption purposes and schemas built for\
    \ Synapse.\n    1.  Connect to SQL Server 2022 and run the script `createmasterkey.sql`,\
    \ which executes the following T-SQL statements:\n\n```sql\nUSE [WideWorldImporters];\n\
    GO\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = 'Strongpassw0rd!';\nGO\n```\n\n\
    \    2.  The Synapse pool also needs a master key, but you don't need a password.\
    \ Let's get introduced to Synapse Studio (because you will need it throughout\
    \ this exercise) to do this. In the Azure portal for the Synapse workspace, in\
    \ the middle of the page, click Open for the box that says **Open Synapse Studio**\
    \ as in Figure [3-16](#525217_1_En_3_Chapter.xhtml#Fig16).\n\nOnce you open Synapse\
    \ Studio, click the icon on the left-hand menu for Data, expand the `wwipool`\
    \ database, and select New SQL Script. Then type in `CREATE MASTER KEY;` and hit\
    \ Run as seen in Figure [3-17](#525217_1_En_3_Chapter.xhtml#Fig17).\n\n![](Images/525217_1_En_3_Fig17_HTML.png)\n\
    \nA screenshot shows b w synapse analytics tab under Microsoft Azure. Arrows point\
    \ at the data icon, w w i s q l pool option, new s q l script option, and the\
    \ run icon.\n\n**Figure 3-17** Creating the master key in the SQL dedicated pool\n\
    \n![](Images/525217_1_En_3_Fig18_HTML.png)\n\nA screenshot shows part of the b\
    \ w synapse analytics tab. Arrows point toward the manage icon, linked services\
    \ option, and the new button.\n\n**Figure 3-18** Creating a new linked service\
    \ for SQL Server 2022\n\n1.  We are now ready to create the **linked service to\
    \ SQL Server 2022** from Synapse Studio. In Synapse Studio click the Manage icon\
    \ on the left-hand menu (the last one), Linked services, and then + New as seen\
    \ in Figure [3-18](#525217_1_En_3_Chapter.xhtml#Fig18).\n\n2.  Synapse Link does\
    \ not automatically create schemas when synchronizing tables from SQL Server.\
    \ Since WideWorldImporters uses schemas, we need to create these first in Synapse.\
    \ Use the same window you created the master key in Synapse Studio to run these\
    \ SQL statements after clearing out the `CREATE MASTER KEY` statement:\n\n```sql\n\
    CREATE SCHEMA Application;\nGO\nCREATE SCHEMA Purchasing;\nGO\nCREATE SCHEMA Sales;\n\
    GO\nCREATE SCHEMA Warehouse;\nGO\nCREATE SCHEMA Website;\nGO\n```\n\nType in `sql`\
    \ in the search window and select SQL Server and hit Continue as seen in Figure\
    \ [3-19](#525217_1_En_3_Chapter.xhtml#Fig19).\n\n![](Images/525217_1_En_3_Fig19_HTML.png)\n\
    \nA screenshot shows the new linked service tab with s q l typed in the search\
    \ bar below. Amongst the 9 icons under menu option all, the s q l server is selected.\n\
    \n**Figure 3-19** Choosing SQL Server as a linked service\n\nYou are presented\
    \ with a screen to fill out several pieces of information. Stay with me on these\
    \ steps because you are going to fill out some information here, move over to\
    \ your machine hosting SQL Server, and then come back to this page.\n\nType in\
    \ the name of the linked service and then in the **Connect via integration runtime**\
    \ field, select the \"down\" arrow and then **+ New** as seen in Figure [3-20](#525217_1_En_3_Chapter.xhtml#Fig20).\n\
    \n![](Images/525217_1_En_3_Fig20_HTML.png)\n\nA screenshot shows the new linked\
    \ service. The cursor is placed over the new option from the drop-down menu for\
    \ connect via integration runtime.\n\n**Figure 3-20** Selecting an integration\
    \ runtime for Synapse Link for SQL\n\nSelect **Self-Hosted** and click **Continue.**\n\
    \nLeave the Default name field and click Create. You will now be presented with\
    \ a screen like Figure [3-21](#525217_1_En_3_Chapter.xhtml#Fig21).\n\n![](Images/525217_1_En_3_Fig21_HTML.png)\n\
    \nA screenshot shows the integration runtime setup. Key 1 and key 2 are visible\
    \ under option 2 manual setup from the settings tab.\n\n**Figure 3-21** Instructions\
    \ to install the self-hosted integration runtime\n\nThe integration runtime code\
    \ is now installed in the control plane for the Synapse workspace. You need to\
    \ now install the self-hosted integration runtime (SHIR) software on your machine\
    \ or VM where SQL Server is installed.\n\n**Note**\n\nSHIR can be installed anywhere\
    \ on the network where it can connect to and discover SQL Server. For this exercise\
    \ we will just install it locally.\n\nOption 1 in the screen in Figure [3-21](#525217_1_En_3_Chapter.xhtml#Fig21)\
    \ would be the right choice if you launched Synapse Studio from the computer or\
    \ VM where you planned to install SHIR. I used the portal from my own laptop when\
    \ I did this exercise, so I chose Option 2 to install manually. When you click\
    \ Option 2, a new browser tab will be launched to download the software. Keep\
    \ the Synapse Studio browser tab open. You will need the **Authentication Key**\
    \ on that screen, and when you are done installing SHIR, we need to come back\
    \ to this place to finish installing the linked service.\n\nAfter I clicked Download\
    \ on the new web page, I chose the latest MSI version and then copied this downloaded\
    \ .MSI file into my virtual machine in Azure. This file is ~1Gb in size, so it\
    \ may take a few minutes to copy into your VM or machine.\n\nWhile you are copying\
    \ this file, launch the Standard SQL XEvent Profiler from SSMS for SQL Server\
    \ (click Launch Session) as seen in Figure [3-22](#525217_1_En_3_Chapter.xhtml#Fig22).\n\
    \n![](Images/525217_1_En_3_Fig22_HTML.jpg)"
