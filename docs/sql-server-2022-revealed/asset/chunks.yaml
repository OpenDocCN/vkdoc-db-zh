    ### Project Chimera


    大约 3 年前，负责 Azure SQL Managed Instance 的工程团队提出了一个想法，导致了一个名为 Chimera 的项目。正如 Managed
    Instance 团队的高级项目经理 Dani Ljepava 告诉我的那样，*“Chimera 是希腊神话中的神话怪兽，看起来像一条龙，有多个来自不同动物的头合而为一。正如我们正在构建
    SQL Server 和云之间的混合能力，Chimera 似乎是这个项目的完美名称，因为它指的是一个混合怪兽——多个动物合为一体。”*


    团队最初只是想在 SQL Server 和 Azure SQL Managed Instance (MI) 之间建立一个链接，以便 MI 可以用作只读副本，并最终成为从
    SQL Server 在线迁移的目标。最终，随着我们为项目 Dallas 制定计划，该项目章程不断扩展，以便此功能可以支持 SQL Server 2022
    的灾难恢复场景。


    Dani 告诉我，*“我们面临着解决微软以前没有人解决过的问题，并且不得不在此过程中经历一些独特的挑战（并且在我们说话的今天仍在进行中）。尽管如此，以前从未有人在
    SQL Server 和完全托管的 Azure PaaS 服务之间构建过在线 DR。”*


    随着我们朝着 SQL Server 2022 的私人预览版发布迈进，我们将 Chimera 品牌化为 `Azure SQL Managed Instance`
    的 `link feature`（链接功能）。'
- fmt: "# The Link Feature for Azure SQL Managed Instance\n\nThe link feature for\
    \ Azure SQL Managed Instance allows you to connect or link an existing SQL Server\
    \ database to a Managed Instance in a simple and seamless manner. We use the power\
    \ of built-in availability group and `Distributed Availability Group` technology\
    \ in the SQL Server engine along with some magic behind the scenes for Azure SQL\
    \ Managed Instance.\n\nThe link feature for Azure SQL Managed Instance can be\
    \ used with databases for `SQL Server 2016`, `SQL Server 2019`, or `SQL Server\
    \ 2022` (`SQL Server 2017` support to be added later). The feature supports the\
    \ ability to replicate data through AG technology to an Azure SQL Managed Instance\
    \ (MI) and use the MI database for read-scale scenarios. If you eventually want\
    \ to migrate from SQL Server to MI, you can then fail over to MI, and it now becomes\
    \ the primary system. This is a `one-way` operation, which is why it can help\
    \ you set up an online migration solution to Azure (and since we are using AG\
    \ technology, it is the fastest method to migrate online to MI). This capability\
    \ is sometimes referred to as `unidirectional` replication to Azure MI.\n\nUnique\
    \ to `SQL Server 2022` is the ability to set up a link to Azure SQL Managed Instance\
    \ where Managed Instance is declared as a disaster recovery site, failover to\
    \ MI `online`, but then at some point failback `offline` to `SQL Server 2022`.\
    \ This capability is sometimes called `bidirectional` replication to Azure MI.\
    \ I’ll explain in the section later in this chapter called \"`Using the Link Feature\
    \ for Offline Disaster Recovery`\" how the failback is offline and why I call\
    \ it managed disaster recovery.\n\n## How It Works\n\nLet’s take a look at how\
    \ the link feature for Azure SQL Managed Instance (MI) works by seeing how to\
    \ create the link and failover to MI.\n\n### Creating and Using the Link\n\nThe\
    \ link feature for Azure SQL Managed Instance uses a combination of built-in `T-SQL`\
    \ and `PowerShell` scripts to create an availability group on `SQL Server 2022`\
    \ (if one does not exist) and a `Distributed Availability Group` across `SQL Server\
    \ 2022` and Azure SQL Managed Instance (any service tier) that includes a database\
    \ from your `SQL Server 2022` instance. The process to create the link is also\
    \ made easier through new GUI wizards in `SQL Server Management Studio (SSMS)`\
    \ with an option in Object Explorer from a database context called `Azure SQL\
    \ Managed Instance link ➤ Replicate database`.\n\nFigure [3-3](#525217_1_En_3_Chapter.xhtml#Fig3)\
    \ shows the architecture and flow of creating a link to Azure SQL Managed Instance.\n\
    \n![](Images/525217_1_En_3_Fig3_HTML.png)\n\nA diagram shows link for Azure S\
    \ Q L managed instance. Steps 1 to 6 are azure network, availability group 1,\
    \ D A G async, create link database seeding, log changes, and availability group\
    \ 2.\n\nFigure 3-3\n\nLink feature for Azure SQL Managed Instance\n\nLet’s break\
    \ down the components of the link feature in terms of the process to create the\
    \ link. `SSMS` automates these steps:\n\n1.  **Establish networking connectivity**\
    \ between SQL Server and Azure SQL Managed Instance using Azure networking and\
    \ database mirroring (`dbm`) endpoints.\n\n2.  **Create an availability group**\
    \ (AG) on `SQL Server 2022` and database mirroring (`dbm`) endpoint if one does\
    \ not already exist. Build the AG as `clusterless` or `CLUSTER_TYPE = NONE`. We\
    \ won’t use any clustering technology for the AG because this is not an automatic\
    \ failover-based solution. An existing AG could have a secondary replica already.\
    \ It turns out that an interesting but not well-known feature is that if you build\
    \ your own AG, `you don’t have to have a secondary replica` (availability mode\
    \ is not used in this case). But you must create an AG so you can create a DAG.\n\
    \n3.  **Create a Distributed Availability Group (DAG)** including the `SQL Server\
    \ 2022` AG and your Managed Instance name.\n\n4.  **Create a link to Azure SQL\
    \ Managed Instance** (`PowerShell` cmdlet). This establishes an AG for a `General\
    \ Purpose` service tier Managed Instance or uses an existing AG from a `Business\
    \ Critical` service tier (which already has a secondary replica). Note again that\
    \ an AG doesn’t have to have a secondary replica, which is why this solution can\
    \ work very nicely for a `General Purpose` service tier. Creating the link also\
    \ initiates a copy or seeding of the database to Azure SQL Managed Instance. Seeding\
    \ uses the `dbm` endpoint to stream a copy of the database to Managed Instance.\
    \ You can read more about how seeding works at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/automatically-initialize-always-on-availability-group`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/automatically-initialize-always-on-availability-group).\n\
    \n5.  **Changes** now made on the primary will be transmitted automatically as\
    \ log changes to Azure SQL Managed Instance.\n\n6.  Users can connect to Azure\
    \ SQL Managed Instance and access the database as `read-only` and also access\
    \ secondary replicas for `Business Critical` service tiers.\n\n**Note** When the\
    \ final version of the link feature for Azure SQL Managed Instance is released,\
    \ it is possible we may offer an option for you to declare your Managed Instance\
    \ for disaster recovery (DR) purposes. The concept would be to make Managed Instance\
    \ in this scenario license-free so you would only pay for compute and storage.\
    \ If this option becomes available, you would not be able to read from the Azure\
    \ SQL Managed Instance database since you are only using this for DR purposes.\n\
    \nOnce the database is synchronized in Azure SQL Managed Instance, any changes\
    \ in the transaction log are sent automatically to Azure SQL Managed Instance\
    \ just like if you built your own DAG. Users can also access the database in Azure\
    \ SQL Managed Instance for read purposes just like a secondary replica in a DAG.\n\
    \n### Failing Over to Azure SQL Managed Instance\n\nLet’s say now you are ready\
    \ to move your primary workload to Azure SQL Managed Instance. You can use the\
    \ link feature to perform a failover. For versions of SQL Server prior to `SQL\
    \ Server 2022`, this is a `one-way operation`.\n\nYou have two choices on the\
    \ failover operation (both are manual):\n\n*   **Planned manual failover**\n \
    \   *   If you use this option, your SQL Server instance is available, and you\
    \ want to ensure there is no data loss in the failover. This will require stopping\
    \ your application from making modifications to the primary replica and synchronizing\
    \ the DAG.\n\n*   **Forced failover**\n    *   With this option you are willing\
    \ to accept some data loss (even though there may be no loss if the DAG is already\
    \ synchronized). This option is your only choice to fail over if the SQL Server\
    \ instance is not available.\n\nWhen you fail over to Azure SQL Managed Instance,\
    \ the database is set to read/write. We handle all the logistics for the AGs on\
    \ Managed Instance. On the SQL Server side, you have the option of also dropping\
    \ an AG if it was created and/or the DAG.\n\nYou will now need to change your\
    \ application to connect to the Azure SQL Managed Instance server name. You also\
    \ will need to migrate any instance-level objects (`SQL Agent` jobs, login, etc.)\
    \ manually. Therefore, it is a good idea to script out all of these objects beforehand\
    \ to prepare for a failover.\n\n## Using the Link Feature for Offline Disaster\
    \ Recovery\n\nSo far this doesn’t sound like a disaster recovery solution but\
    \ a one-way migration solution, which is true. However, for `SQL Server 2022`,\
    \ we will allow you to use Managed Instance as an offline disaster recovery site.\
    \ I call this feature offline disaster recovery because even though the failover\
    \ to Managed Instance is considered online, the failback is offline. The key capability\
    \ we have added is the ability to restore a database from Azure SQL Managed Instance\
    \ `back` to SQL Server."
  raw: '### The Link Feature for Azure SQL Managed Instance


    The link feature for Azure SQL Managed Instance allows you to connect or link
    an existing SQL Server database to a Managed Instance in a simple and seamless
    manner. We use the power of built-in availability group and Distributed Availability
    Group technology in the SQL Server engine along with some magic behind the scenes
    for Azure SQL Managed Instance.


    The link feature for Azure SQL Managed Instance can be used with databases for
    SQL Server 2016, SQL Server 2019, or SQL Server 2022 (SQL Server 2017 support
    to be added later). The feature supports the ability to replicate data through
    AG technology to an Azure SQL Managed Instance (MI) and use the MI database for
    read-scale scenarios. If you eventually want to migrate from SQL Server to MI,
    you can then fail over to MI, and it now becomes the primary system. This is a
    *one-way* operation, which is why it can help you set up an online migration solution
    to Azure (and since we are using AG technology, it is the fastest method to migrate
    online to MI). This capability is sometimes referred to as *unidirectional* replication
    to Azure MI.


    Unique to SQL Server 2022 is the ability to set up a link to Azure SQL Managed
    Instance where Managed Instance is declared as a disaster recovery site, failover
    to MI *online*, but then at some point failback *offline* to SQL Server 2022\.
    This capability is sometimes called *bidirectional replication* to Azure MI. I’ll
    explain in the section later in this chapter called “**Using the Link Feature
    for Offline Disaster Recovery**” how the failback is offline and why I call it
    managed disaster recovery.


    ### How It Works


    Let’s take a look at how the link feature for Azure SQL Managed Instance (MI)
    works by seeing how to create the link and failover to MI.


    #### Creating and Using the Link


    The link feature for Azure SQL Managed Instance uses a combination of built-in
    T-SQL and PowerShell scripts to create an availability group on SQL Server 2022
    (if one does not exist) and a Distributed Availability Group across SQL Server
    2022 and Azure SQL Managed Instance (any service tier) that includes a database
    from your SQL Server 2022 instance. The process to create the link is also made
    easier through new GUI wizards in SQL Server Management Studio (SSMS) with an
    option in Object Explorer from a database context called **Azure SQL Managed Instance
    link ➤ Replicate database**.


    Figure [3-3](#525217_1_En_3_Chapter.xhtml#Fig3) shows the architecture and flow
    of creating a link to Azure SQL Managed Instance.


    ![](Images/525217_1_En_3_Fig3_HTML.png)


    A diagram shows link for Azure S Q L managed instance. Steps 1 to 6 are azure
    network, availability group 1, D A G async, create link database seeding, log
    changes, and availability group 2.


    Figure 3-3


    Link feature for Azure SQL Managed Instance


    Let’s break down the components of the link feature in terms of the process to
    create the link. SSMS automates these steps:


    1.  **Establish** **networking connectivity** between SQL Server and Azure SQL
    Managed Instance using Azure networking and database mirroring (dbm) endpoints.


    2.  **Create an availability group** (AG) on SQL Server 2022 and database mirroring
    (dbm) endpoint if one does not already exist. Build the AG as *clusterless* or
    CLUSTER_TYPE = NONE. We won’t use any clustering technology for the AG because
    this is not an automatic failover-based solution. An existing AG could have a
    secondary replica already. It turns out that an interesting but not well-known
    feature is that if you build your own AG, *you don’t have to have a secondary
    replica* (availability mode is not used in this case). But you must create an
    AG so you can create a DAG.


    3.  **Create a** **Distributed Availability Group (DAG)** including the SQL Server
    2022 AG and your Managed Instance name.


    4.  **Create a link to Azure SQL Managed Instance** (PowerShell cmdlet). This
    establishes an AG for a General Purpose service tier Managed Instance or uses
    an existing AG from a Business Critical service tier (which already has a secondary
    replica). Note again that an AG doesn’t have to have a secondary replica, which
    is why this solution can work very nicely for a General Purpose service tier.
    Creating the link also initiates a copy or seeding of the database to Azure SQL
    Managed Instance. Seeding uses the dbm endpoint to stream a copy of the database
    to Managed Instance. You can read more about how seeding works at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/automatically-initialize-always-on-availability-group`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/automatically-initialize-always-on-availability-group).


    5.  **Changes** now made on the primary will be transmitted automatically as log
    changes to Azure SQL Managed Instance.


    6.  Users can connect to Azure SQL Managed Instance and access the database as
    **read-only** and also access secondary replicas for Business Critical service
    tiers.


    **Note** When the final version of the link feature for Azure SQL Managed Instance
    is released, it is possible we may offer an option for you to declare your Managed
    Instance for disaster recovery (DR) purposes. The concept would be to make Managed
    Instance in this scenario license-free so you would only pay for compute and storage.
    If this option becomes available, you would not be able to read from the Azure
    SQL Managed Instance database since you are only using this for DR purposes.


    Once the database is synchronized in Azure SQL Managed Instance, any changes in
    the transaction log are sent automatically to Azure SQL Managed Instance just
    like if you built your own DAG. Users can also access the database in Azure SQL
    Managed Instance for read purposes just like a secondary replica in a DAG.


    #### Failing Over to Azure SQL Managed Instance


    Let’s say now you are ready to move your primary workload to Azure SQL Managed
    Instance. You can use the link feature to perform a failover. For versions of
    SQL Server prior to SQL Server 2022, this is a **one-way operation**.


    You have two choices on the failover operation (both are manual):


    *   **Planned manual failover**


    *   If you use this option, your SQL Server instance is available, and you want
    to ensure there is no data loss in the failover. This will require stopping your
    application from making modifications to the primary replica and synchronizing
    the DAG.


    *   **Forced failover**


    *   With this option you are willing to accept some data loss (even though there
    may be no loss if the DAG is already synchronized). This option is your only choice
    to fail over if the SQL Server instance is not available.


    When you fail over to Azure SQL Managed Instance, the database is set to read/write.
    We handle all the logistics for the AGs on Managed Instance. On the SQL Server
    side, you have the option of also dropping an AG if it was created and/or the
    DAG.


    You will now need to change your application to connect to the Azure SQL Managed
    Instance server name. You also will need to migrate any instance-level objects
    (SQL Agent jobs, login, etc.) manually. Therefore, it is a good idea to script
    out all of these objects beforehand to prepare for a failover.


    ### Using the Link Feature for Offline Disaster Recovery


    So far this doesn’t sound like a disaster recovery solution but a one-way migration
    solution, which is true. However, for SQL Server 2022, we will allow you to use
    Managed Instance as an offline disaster recovery site. I call this feature offline
    disaster recovery because even though the failover to Managed Instance is considered
    online, the failback is offline. The key capability we have added is the ability
    to restore a database from Azure SQL Managed Instance *back* to SQL Server.'
  trans: "\n# Azure SQL 托管实例的链接功能\n\nAzure SQL 托管实例的链接功能，让你能够以简单无缝的方式，将现有的 SQL Server\
    \ 数据库连接或链接到一个托管实例。我们利用了 SQL Server 引擎中内置的可用性组和 `分布式可用性组` 技术的强大功能，再加上一些幕后的技术，实现了\
    \ Azure SQL 托管实例的这一功能。\n\nAzure SQL 托管实例的链接功能可用于 `SQL Server 2016`、`SQL Server\
    \ 2019` 或 `SQL Server 2022` 的数据库（`SQL Server 2017` 的支持将在稍后添加）。此功能支持通过 AG 技术将数据复制到\
    \ Azure SQL 托管实例（MI），并将该 MI 数据库用于读取横向扩展场景。如果你最终希望从 SQL Server 迁移到 MI，那么可以故障转移到\
    \ MI，此时 MI 就成为了主系统。这是一个 `单向` 操作，这也是为什么它能帮助你建立一个向 Azure 迁移的在线解决方案（并且由于我们使用的是 AG\
    \ 技术，这是向 MI 进行在线迁移的最快方法）。此功能有时被称为向 Azure MI 进行 `单向` 复制。\n\n`SQL Server 2022` 独有的功能是能够设置一个到\
    \ Azure SQL 托管实例的链接，其中托管实例被声明为灾难恢复站点，可以 `在线` 故障转移到 MI，但在某个时间点可以 `离线` 故障回退到 `SQL\
    \ Server 2022`。此功能有时被称为向 Azure MI 进行 `双向` 复制。我将在本章后面名为 \"`使用链接功能进行离线灾难恢复`\" 的部分解释故障回退为何是离线的，以及我为何称其为受控灾难恢复。\n\
    \n## 工作原理\n\n让我们通过查看如何创建链接和故障转移到 MI，来了解 Azure SQL 托管实例（MI）的链接功能是如何工作的。\n\n###\
    \ 创建和使用链接\n\nAzure SQL 托管实例的链接功能结合使用内置的 `T-SQL` 和 `PowerShell` 脚本，在 `SQL Server\
    \ 2022` 上创建一个可用性组（如果不存在的话），并在 `SQL Server 2022` 和 Azure SQL 托管实例（任何服务层级）之间创建一个\
    \ `分布式可用性组`，其中包含来自你的 `SQL Server 2022` 实例的数据库。通过 `SQL Server Management Studio\
    \ (SSMS)` 中新增的 GUI 向导，创建链接的过程也变得更加容易，在对象资源管理器中数据库的上下文菜单里有一个选项叫做 `Azure SQL 托管实例链接\
    \ ➤ 复制数据库`。\n\n图 3-3 展示了创建到 Azure SQL 托管实例链接的架构和流程。\n\n![](img/525217_1_En_3_Fig3_HTML.png)\n\
    \n一个图表展示了 Azure SQL 托管实例的链接。步骤 1 到 6 分别是 Azure 网络、可用性组 1、DAG 异步、创建链接数据库种子设定、日志更改和可用性组\
    \ 2。\n\n图 3-3\n\nAzure SQL 托管实例的链接功能\n\n让我们从创建链接的过程来拆解链接功能的组成部分。`SSMS` 会自动化这些步骤：\n\
    \n1.  **建立网络连接**，使用 Azure 网络和数据库镜像（`dbm`）端点，在 SQL Server 和 Azure SQL 托管实例之间建立连接。\n\
    \n2.  在 `SQL Server 2022` 上**创建一个可用性组（AG）**和数据库镜像（`dbm`）端点（如果尚不存在）。将 AG 构建为 `无群集`\
    \ 或 `CLUSTER_TYPE = NONE`。我们不会对 AG 使用任何群集技术，因为这不是一个基于自动故障转移的解决方案。现有的 AG 可能已经有一个辅助副本。事实证明，有一个有趣但不太为人所知的特性是，如果你自己构建\
    \ AG，`你不必拥有辅助副本`（在这种情况下不使用可用性模式）。但你必须创建一个 AG，以便能够创建一个 DAG。\n\n3.  **创建一个分布式可用性组（DAG）**，其中包含\
    \ `SQL Server 2022` 的 AG 和你的托管实例名称。\n\n4.  **创建到 Azure SQL 托管实例的链接**（`PowerShell`\
    \ cmdlet）。这会为 `常规用途` 服务层级的托管实例建立一个 AG，或使用 `业务关键` 服务层级中现有的 AG（该层级已有一个辅助副本）。再次注意，AG\
    \ 不一定必须有辅助副本，这就是为什么此解决方案能很好地适用于 `常规用途` 服务层级。创建链接还会启动到 Azure SQL 托管实例的数据库复制或种子设定。种子设定使用\
    \ `dbm` 端点将数据库的副本流式传输到托管实例。你可以在 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/automatically-initialize-always-on-availability-group`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/automatically-initialize-always-on-availability-group)\
    \ 阅读更多关于种子设定工作原理的信息。\n\n5.  现在对主数据库所做的**更改**将作为日志更改自动传输到 Azure SQL 托管实例。\n\n6.\
    \  用户可以连接到 Azure SQL 托管实例并以 `只读` 方式访问数据库，对于 `业务关键` 服务层级，还可以访问辅助副本。\n\n**注意** 当\
    \ Azure SQL 托管实例的链接功能最终版本发布时，我们可能会提供一个选项，让你为灾难恢复（DR）目的声明你的托管实例。这个概念是在这种情况下使托管实例免许可费用，因此你只需支付计算和存储费用。如果此选项可用，你将无法从\
    \ Azure SQL 托管实例数据库读取，因为你仅将其用于灾难恢复目的。\n\n一旦数据库在 Azure SQL 托管实例中同步，事务日志中的任何更改都会自动发送到\
    \ Azure SQL 就像你自己构建了一个 DAG 一样。用户也可以访问 Azure SQL 托管实例中的数据库进行读取，就像访问 DAG 中的辅助副本一样。\n\
    \n### 故障转移到 Azure SQL 托管实例\n\n假设现在你已准备好将你的主要工作负载迁移到 Azure SQL 托管实例。你可以使用链接功能执行故障转移。对于\
    \ `SQL Server 2022` 之前的 SQL Server 版本，这是一个 `单向操作`。\n\n在故障转移操作上你有两个选择（两者都是手动的）：\n\
    \n*   **计划内手动故障转移**\n    *   如果你使用此选项，你的 SQL Server 实例是可用的，并且你希望确保故障转移中没有数据丢失。这将需要停止你的应用程序对主副本进行修改，并同步\
    \ DAG。\n\n*   **强制故障转移**\n    *   使用此选项，你愿意接受一些数据丢失（即使在 DAG 已经同步的情况下可能没有丢失）。如果\
    \ SQL Server 实例不可用，这是你进行故障转移的唯一选择。\n\n当你故障转移到 Azure SQL 托管实例时，数据库将被设置为读/写。我们会处理托管实例上所有\
    \ AG 的后勤工作。在 SQL Server 端，你也可以选择删除 AG（如果它是被创建的）和/或 DAG。\n\n现在你需要更改你的应用程序以连接到 Azure\
    \ SQL 托管实例服务器名称。你还需要手动迁移任何实例级别的对象（`SQL Agent` 作业、登录名等）。因此，事先将这些对象全部编写成脚本以准备故障转移是一个好主意。\n\
    \n## 使用链接功能进行离线灾难恢复\n\n到目前为止，这听起来不像一个灾难恢复解决方案，而是一个单向迁移解决方案，这确实是真的。然而，对于 `SQL Server\
    \ 2022`，我们将允许你使用托管实例作为离线灾难恢复站点。我称此功能为离线灾难恢复，因为尽管到托管实例的故障转移被认为是在线的，但故障回退是离线的。我们添加的关键功能是能够将数据库从\
    \ Azure SQL 托管实例 `恢复回` SQL Server。\n"
- fmt: '#### Why Managed Disaster Recovery?


    The title of this section of the chapter started with the words *managed disaster
    recovery*. I called it *managed* because with this capability your disaster recovery
    (DR) site uses a Platform as a Service (PaaS) SQL. SQL Server has all the capabilities
    for you to build a DR site, but you must manage it and make sure it is available
    when you need it.


    Once you link your SQL Server to Managed Instance, Microsoft manages the DR site
    for you. Microsoft manages the entire infrastructure, availability, and backups
    of the SQL Server database with Managed Instance. This way you can be assured
    when your need your DR site, it will be available and ready to go.


    #### SQL Server and Database Version Compatibility


    You may have known for some time that we don’t allow you to restore a backup of
    a database from a newer major version of SQL Server to an older major version.
    You will encounter an error on a `RESTORE` T-SQL statement that tells you the
    version of the backup is *higher* than the current version.


    In reality the incompatibility is at the database level, not the instance. Each
    database for a major version of SQL Server has a version number. You can see this
    version using the T-SQL function `DATABASEPROPERTYEX(<db>, ‘Version’)`. You can
    also use the `RESTORE HEADERONLY` T-SQL statement to see the `DatabaseVersion`
    for the backup.


    What happens is that when we build a major version of SQL Server, we often make
    changes that affect the version compatibility (not dbcompat) of the database *while*
    we are building the new version of the software. This includes changes like system
    table modifications. Since these changes rely on new version code, there is no
    way to access new code in older versions. There could be several *bumps* or *steps*
    to database versions when we build a new major version of SQL Server (turns out
    that each CTP build typically gets a few bumps). Once we ship the General Availability
    of a major version, we lock in the database version until the next major version.
    We never change this version in cumulative updates, which explains why they are
    compatible with each other. You can see the progress of these version bumps when
    you restore a database backup from an older version to a new version. You may
    see several messages in the `RESTORE` output like


    ```

    Database ''WideWorldImporters'' running the upgrade step from version 928 to version
    929.

    ```


    There can be several “steps” within each major version as we build it. You can
    see from the version numbers we have done several of these over the years.


    Since Azure SQL Managed Instance is *versionless*, it will always be *ahead* of
    SQL Server major versions. This is why you cannot restore a database backup from
    Azure SQL Managed Instance to SQL Server.


    With the release of the link feature for Azure SQL Managed Instance and SQL Server
    2022, we are providing a capability so an Azure SQL Managed Instance can be *compatible*
    with SQL Server 2022 at the database version level. This is how we can support
    an offline disaster recovery process. A backup of an Azure SQL Managed Instance
    that is marked to be compatible can be restored to a SQL Server 2022 instance
    because they will be using the **same database version**.


    The disaster recovery concept is *offline* because your SQL Server 2022 application
    will be down until you have restored the database from Azure SQL Managed Instance
    to SQL Server 2022 and it is recovered and running.


    Let’s see how the link feature for Azure SQL Managed Instance could be used for
    offline disaster recovery with an exercise.


    This exercise is based on our steps in the documentation at `https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview#use-the-link-feature`.
    For this exercise we will use the steps to replicate and fail over using SSMS.
    You can see from this documentation page there are steps to follow the same process
    using T-SQL and PowerShell. This can be interesting to read to understand how
    replication and failover work behind the scenes.


    I want to personally thank Dani Ljepava and Mladen Andzic from Microsoft. They
    both were instrumental in helping me create these exercises.


    #### Prerequisites


    *   Deploy an Azure SQL Managed Instance with your Azure subscription. You can
    view a quick-start guide in our documentation at `https://docs.microsoft.com/azure/azure-sql/managed-instance/instance-create-quickstart`.
    When you deploy your Managed Instance, be sure to choose a collation that matches
    your source SQL Server collation. You can check your SQL Server collation with
    the T-SQL statement `SELECT SERVERPROPERTY(N''Collation'')`. Also take note of
    the SQL Admin account you created as you need that to log in to the Managed Instance
    with SSMS.

    *   An Azure storage account with a container to store a database backup for Managed
    Instance. Use this documentation page for a quick-start guide to create a storage
    account in Azure: `https://docs.microsoft.com/azure/storage/common/storage-account-create`.
    Use this quick-start page to create a container in your storage account: `https://docs.microsoft.com/azure/storage/blobs/storage-quickstart-blobs-portal#create-a-container`.

    *   A virtual machine or computer with at least two CPUs and 8Gb RAM. The link
    feature is supported for both Windows and Linux. The exercises in this chapter
    will show you the instructions for using the link feature on Windows.

    *   SQL Server 2022 Evaluation Edition with the database engine feature.

    *   SQL Server Management Studio (SSMS). The latest 18.x build or 19.x build will
    work.

    *   You need Azure network connectivity between SQL Server and Azure. If your
    SQL Server is running on-premises, use a VPN link or Express route. If your SQL
    Server is running on an Azure VM, either deploy your VM to the same subnet as
    your Managed Instance or use global VNet peering to connect two separate subnets.
    For this exercise, I deployed an Azure Virtual Machine for SQL Server and placed
    it in the same subnet as Azure SQL Managed Instance. This is the fastest way to
    test out this feature. If you need another option, you may need to get some assistance
    with Azure networking. There is a complete guide to Azure networking available
    at `https://docs.microsoft.com/azure/networking`.

    *   Download the WideWorldImporters `Standard` sample backup from `https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak`
    to the machine where you will run SQL Server. The `Standard` backup is used because
    it does not contain memory-optimized tables, which would not be supported if you
    chose the General Purpose service tier for Managed Instance.

    *   A copy of the scripts from book samples from the `ch3_cloudconnected\milinkdr`
    folder.'
