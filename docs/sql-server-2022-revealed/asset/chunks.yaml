- fmt: '## A Cloud-Connected, Intelligent, and Industry-Proven Data Platform


    I often called SQL Server 2019 a modern data platform because that release can
    be used for so much more than just what a database engine provides. SQL Server
    2019 provides capabilities needed for a data platform including data virtualization,
    a robust engine, and machine learning services.


    SQL Server 2022 takes a hybrid data platform to the next level. SQL Server 2022
    is connected to the cloud on your terms in new and innovative ways never seen
    before. SQL Server 2022 comes with built-in query intelligence, solving some of
    the most common and expensive query tuning problems you and developers face today.
    And SQL Server 2022 comes with an industry-proven database engine with innovations
    in security, scalability, availability, and data virtualization and enhancements
    to the most popular database language in the world: `T-SQL`.


    Ajay Jagannathan, our Principal Group Program Manager over SQL Server, gave me
    his perspective:


    > This is a special release of SQL Server. During planning for every major version
    of SQL Server, we spend considerable cycles to look at several key themes that
    will define the release. This includes industry leading innovations, cloud born
    as well as mission-critical features and most importantly customer and community
    feedback. This has helped us in shaping SQL Server as the most popular commercial
    relational database on the planet. For SQL Server 2022, it was critical for this
    release to be an integral part of the Microsoft Intelligent Data Platform by bringing
    some of the latest innovations such as Link feature for MI, near real-time analytics
    with Azure Synapse Link and governance with Microsoft Purview. It doesn’t stop
    there, our customers will also get to leverage advancements to SQL Server’s industry
    leading mission critical capabilities spanning much desired themes around T-SQL
    language, intelligent query processing, performance, security, availability, and
    scalability to name a few. And by becoming the first Azure Arc integrated release
    out of the box our customers can leverage Azure benefits anywhere, in their environment
    of choice through hybrid and multi-cloud deployments. Not only am I proud of the
    work done by the entire SQL Server product team to bring this release to our customers,
    partners and community, my dear friend and colleague Bob Ward does a phenomenal
    job in this book to help deep dive into several areas of the product and simplify
    it for the audience. Reading this book will give passionate SQL Server users a
    clear understanding of the features and the ability to maximize these capabilities
    in their environments. I can’t wait for our customers to get started with SQL
    Server 2022 and hear all the cool scenarios where they are leveraging the features
    to solve their business problems.


    If you want to learn more about the installation and upgrade experience of SQL
    Server 2022, Chapter 2 can be used to start your journey.


    **Note**

    For those who are veterans to install SQL Server, not much has changed for setup,
    so if you want to install the Developer Edition for Windows and just dive into
    Chapter 3 to start learning, fire away! There is one aspect to installation that
    enables some cloud-connected features, so you may want to read more about those
    in Chapter 2 first. Remember that deployment guides to install SQL Server with
    container images, Linux, and Kubernetes are in Chapter 9 and details on how to
    deploy with an Azure Virtual Machine are in Chapter 10.


    # 2. Install and Upgrade


    One of the first things you will want to do is to install SQL Server 2022 so you
    can explore all the goodness it has to offer. The great news for anyone familiar
    with SQL Server is that the installation experience for SQL Server 2022 is fairly
    identical to previous releases with a few minor changes.


    If you are an experienced SQL Server user, in this chapter you can review the
    highlights of what is different for SQL Server 2022. If you are someone new to
    SQL Server, don’t worry. First, the installation process is amazingly simple,
    and our user experiences walk you through all of it. Second, if you need a “step-by-step”
    process, go straight to our documentation at [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022).


    ## How to Install SQL Server 2022


    You may be used to getting started with SQL Server by installing the Developer
    or Evaluation free edition of SQL Server and evaluating the product. SQL Server
    2022 supports both of these editions, so if you just want to jump in, go to [`https://aka.ms/getsqlserver2022`](https://aka.ms/getsqlserver2022)
    and start testing!


    I know that some people want to know more about the installation of SQL Server
    before they go “straight for the bits.” In this section of the chapter, I’ll review
    the prerequisites to install SQL Server and discuss the differences from previous
    versions and deployment options.


    This section of the chapter focuses on installation of SQL Server on Windows.
    The section titled “Deploying on Other Platforms” later in this chapter discusses
    installation on Linux, containers, Kubernetes, and Azure. The details for deploying
    on these platforms can be found in Chapters 9 and 10 of the book.


    ### Prerequisites


    The prerequisites, including resources required, to install SQL Server 2022 on
    Windows have not changed from previous major versions of SQL Server, except the
    specific Windows operating system versions or Linux distributions we support.
    As in the past, we will support versions of Windows Server and Windows (client)
    that are “officially” supported, including any specific updates of Windows required
    to be supported. Consult the SQL Server 2022 release notes for any possible changes
    to prerequisites for SQL Server 2022 at [`https://docs.microsoft.com/sql/sql-server/sql-server-2022-release-notes`](https://docs.microsoft.com/sql/sql-server/sql-server-2022-release-notes).


    One difference for prerequisites from previous versions of SQL Server is the requirement
    to be connected to Azure to support some of the new *cloud-connected* scenarios.
    The most important requirement is that if you choose to set up Azure-connected
    scenarios during installation, you will need an Azure subscription and a service
    principal.


    **Note**

    Some cloud-connected scenarios like Managed Instance and Synapse Link do not require
    any special steps during setup. New capabilities like Azure Active Directory (`AAD`)
    and Microsoft Purview integration do require this configuration.


    I’ll describe the exact steps for this requirement later in this chapter in the
    section titled “Setting Up the Azure Extension for SQL Server.” I’ll also go more
    into the specifics of how SQL Server is connected to Azure in Chapter 3 of the
    book.


    To find all the exact resource requirements you need to install SQL Server 2022
    on Windows, review the documentation at [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022).'
  raw: '## A Cloud-Connected, Intelligent, and Industry-Proven Data Platform


    I often called SQL Server 2019 a modern data platform because that release can
    be used for so much more than just what a database engine provides. SQL Server
    2019 provides capabilities needed for a data platform including data virtualization,
    a robust engine, and machine learning services


    SQL Server 2022 takes a hybrid data platform to the next level. SQL Server 2022
    is connected to the cloud on your terms in new and innovative ways never seen
    before. SQL Server 2022 comes with built-in query intelligence, solving some of
    the most common and expensive query tuning problems you and developers face today.
    And SQL Server 2022 comes with an industry-proven database engine with innovations
    in security, scalability, availability, and data virtualization and enhancements
    to the most popular database language in the world: T-SQL.


    Ajay Jagannathan, our Principal Group Program Manager over SQL Server, gave me
    his perspective:


    *This is a special release of SQL Server. During planning for every major version
    of SQL Server, we spend considerable cycles to look at several key themes that
    will define the release. This includes industry leading innovations, cloud born
    as well as mission-critical features and most importantly customer and community
    feedback. This has helped us in shaping SQL Server as the most popular commercial
    relational database on the planet. For SQL Server 2022, it was critical for this
    release to be an integral part of the Microsoft Intelligent Data Platform by bringing
    some of the latest innovations such as Link feature for MI, near real-time analytics
    with Azure Synapse Link and governance with Microsoft Purview. It doesn’t stop
    there, our customers will also get to leverage advancements to SQL Server’s industry
    leading mission critical capabilities spanning much desired themes around T-SQL
    language, intelligent query processing, performance, security, availability, and
    scalability to name a few. And by becoming the first Azure Arc integrated release
    out of the box our customers can leverage Azure benefits anywhere, in their environment
    of choice through hybrid and multi-cloud deployments. Not only am I proud of the
    work done by the entire SQL Server product team to bring this release to our customers,
    partners and community, my dear friend and colleague Bob Ward does a phenomenal
    job in this book to help deep dive into several areas of the product and simplify
    it for the audience. Reading this book will give passionate SQL Server users a
    clear understanding of the features and the ability to maximize these capabilities
    in their environments. I can’t wait for our customers to get started with SQL
    Server 2022 and hear all the cool scenarios where they are leveraging the features
    to solve their business problems.*


    If you want to learn more about the installation and upgrade experience of SQL
    Server 2022, Chapter [2](#525217_1_En_2_Chapter.xhtml) can be used to start your
    journey.


    Note


    For those who are veterans to install SQL Server, not much has changed for setup,
    so if you want to install the Developer Edition for Windows and just dive into
    Chapter [3](#525217_1_En_3_Chapter.xhtml) to start learning, fire away! There
    is one aspect to installation that enables some cloud-connected features, so you
    may want to read more about those in Chapter [2](#525217_1_En_2_Chapter.xhtml)
    first. Remember that deployment guides to install SQL Server with container images,
    Linux, and Kubernetes are in Chapter [9](#525217_1_En_9_Chapter.xhtml) and details
    on how to deploy with an Azure Virtual Machine are in Chapter [10](#525217_1_En_10_Chapter.xhtml).


    # 2. Install and Upgrade


    One of the first things you will want to do is to install SQL Server 2022 so you
    can explore all the goodness it has to offer. The great news for anyone familiar
    with SQL Server is that the installation experience for SQL Server 2022 is fairly
    identical to previous releases with a few minor changes.


    If you are an experienced SQL Server user, in this chapter you can review the
    highlights of what is different for SQL Server 2022\. If you are someone new to
    SQL Server, don’t worry. First, the installation process is amazingly simple,
    and our user experiences walk you through all of it. Second, if you need a “step-by-step”
    process, go straight to our documentation at [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022).


    ## How to Install SQL Server 2022


    You may be used to getting started with SQL Server by installing the Developer
    or Evaluation free edition of SQL Server and evaluating the product. SQL Server
    2022 supports both of these editions, so if you just want to jump in, go to [`https://aka.ms/getsqlserver2022`](https://aka.ms/getsqlserver2022)
    and start testing!


    I know that some people want to know more about the installation of SQL Server
    before they go “straight for the bits.” In this section of the chapter, I’ll review
    the prerequisites to install SQL Server and discuss the differences from previous
    versions and deployment options.


    This section of the chapter focuses on installation of SQL Server on Windows.
    The section titled “**Deploying on Other Platforms”** later in this chapter discusses
    installation on Linux, containers, Kubernetes, and Azure. The details for deploying
    on these platforms can be found in Chapters [9](#525217_1_En_9_Chapter.xhtml)
    and [10](#525217_1_En_10_Chapter.xhtml) of the book.


    ### Prerequisites


    The prerequisites, including resources required, to install SQL Server 2022 on
    Windows have not changed from previous major versions of SQL Server, except the
    specific Windows operating system versions or Linux distributions we support.
    As in the past, we will support versions of Windows Server and Windows (client)
    that are “officially” supported, including any specific updates of Windows required
    to be supported. Consult the SQL Server 2022 release notes for any possible changes
    to prerequisites for SQL Server 2022 at [`https://docs.microsoft.com/sql/sql-server/sql-server-2022-release-notes`](https://docs.microsoft.com/sql/sql-server/sql-server-2022-release-notes).


    One difference for prerequisites from previous versions of SQL Server is the requirement
    to be connected to Azure to support some of the new *cloud-connected* scenarios.
    The most important requirement is that if you choose to set up Azure-connected
