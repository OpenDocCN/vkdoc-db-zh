    I mentioned earlier in this chapter that you don’t patch SQL Server containers.
    You *switch* them to apply a cumulative update. Here is how the magic works. When
    you run a container and specify a persistent volume with the -v command, any files
    in this volume survive a container restart or delete. If you put your SQL Server
    database files (including system databases) into a directory that is mapped to
    persisted storage, you can *point* any SQL Server container to this volume, one
    at time.


    In addition, SQL Server cumulative updates are compatible with each other in a
    major version. Therefore, I could do the following:


    1.  Start a SQL Server 2022 RTM container image, pointing it to a persisted volume
    for /var/opt/mssql.


    2.  Let’s say the first cumulative update for SQL Server 2022 comes out and I
    want to use it.


    3.  Stop the SQL Server 2022 RTM container.


    4.  Then run a new SQL Server container based on SQL Server 2022 CU1, pointing
    it to the same persisted volume. The new SQL Server will start up and recognize
    the new master database and user databases. In a manner of minutes, I’ve updated
    SQL Server.


    5.  Let’s now say a problem occurs and you want to roll back to the SQL Server
    2022 RTM container.


    6.  Stop the new SQL Server 2022 CU1 container and start the SQL Server 2022 RTM
    container. Within a few minutes, you have rolled back.


    You can see examples of how to do this with SQL Server 2019 from *SQL Server 2019
    Revealed* at [`https://github.com/microsoft/bobsql/tree/master/sql2019book/ch7_inside_sql_containers/update/dockerpowershell`](https://github.com/microsoft/bobsql/tree/master/sql2019book/ch7_inside_sql_containers/update/dockerpowershell).


    ## SQL Server 2022 on Kubernetes


    Supporting Linux for SQL Server opened up a whole new world for us, including
    containers. Containers opened up the world to us for Kubernetes. Do you want to
    learn Kubernetes in a fun way? Nothing compares to The Illustrated Children’s
    Guide to Kubernetes at [`https://youtu.be/4ht22ReBjno`](https://youtu.be/4ht22ReBjno).


    ### Why k8s


    Kubernetes originated at Google. The founders of Kubernetes like Brendan Burns
    (who now works for Microsoft) wanted a way to run containers at scale. Linux on
    its own didn’t provide for this, so they built a set of software services on top
    of Linux called Kubernetes. Brendan has built a really nice playlist of videos
    explaining Kubernetes at [`www.youtube.com/watch?v=daVUONZqn88&list=PLLasX02E8BPCrIhFrc_ZiINhbRkYMKdPT`](http://www.youtube.com/watch?v=daVUONZqn88&list=PLLasX02E8BPCrIhFrc_ZiINhbRkYMKdPT).


    Since SQL Server supports containers, why not also support Kubernetes? Okay, enough
    of that long word. Let’s use k8s (k<eight letters>s) like the cool kids do. Admittedly
    the support for SQL Server on k8s is very basic. You can deploy SQL Server, connect
    to the instance, and store data in persisted storage. But k8s does provide some
    nice built-in capabilities like load balancers and basic high availability. If
    you are looking for a complete managed experience using k8s and SQL Server, you
    should take a look at Azure Arc–enabled SQL Managed Instance (Arc SQL MI) ([`https://aka.ms/azurearcsqlmi`](https://aka.ms/azurearcsqlmi)).


    Keep up to date on the latest with SQL Server on k8s at [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s).
    You can also watch a presentation I did for SQLBits to dive deeper at [`https://youtu.be/USfCJDoCMr8`](https://youtu.be/USfCJDoCMr8)


    It is worth understanding the basics so you can see how SQL Server on k8s works
    and whether it could be a platform for you to scale many SQL Server containers.


    ### Deploying SQL Server on k8s


    Let’s look at the basics of deploying a single SQL Server container on k8s.


    #### What Are the Major Components of k8s?


    There a few terms for k8s you need to understand when you see the deployment experience.
    This is a very basic set of definitions. For a more complete reference to these
    components and architecture, see the k8s documentation at [`https://kubernetes.io/docs/concepts/overview/components`](https://kubernetes.io/docs/concepts/overview/components).


    Let’s review these components through Figure [9-1](#525217_1_En_9_Chapter.xhtml#Fig1)
    (not all components are shown here).


    ![](Images/525217_1_En_9_Fig1_HTML.png)


    An illustration of the major K 8 components. It has a box marked cluster with
    2 node boxes that have 2 and 1, pod private I P address boxes on the left and
    right.


    Figure 9-1


    k8s components


    *   **Cluster**


    *   Think of a cluster like a host that contains all the k8s internal software
    and a series of virtual machines or nodes (can be physical servers) to run containers.


    *   **Node**


    *   Think of a node like a virtual machine (it can be a physical machine) that
    can help orchestrate other nodes or run user programs as containers.


    *   **Control plane**


    *   All the internal k8s software that runs the system is called the control plane
    and runs on every node. For example, k8s is all API based, so the API server can
    take requests and orchestrate across nodes.


    *   **Pod**


    *   A pod is defined as one or more containers to execute on a node. It is the
    smallest component of execution in the k8s system.


    *   **Container runtime**


    *   Since containers are at the heart of execution of pods, a container runtime
    like Docker must exist on all nodes to pull container images and run containers.


    *   **Namespace**


    *   A namespace is a logical group of k8s objects and makes it very convenient
    to organize projects. Every k8s system has a default namespace, but I recommend
    you always create other namespaces for your pods and other k8s objects.


    *   **Load balancer service**


    *   You have seen connection abstraction with SQL Server in the form of a listener.
    Think of a load balancer service (another type is called a node port) as a listener.
    A load balancer is a way to abstract a connection to a fixed IP address and port
    so that if the underlying IP address changes, it will always be directed to the
    right location.


    *   **Storage class** and **PersistentVolumeClaim**


    *   Storage class is a mapping of the storage types on your system. For example,
    Azure Kubernetes Service has a storage class defined by the system called managed-premium
    that gives you access to Azure Premium managed disks. Think of a PersistedVolumeClaim
    (PVC) as a volume of a fixed size from the storage class. The key to using PVC
    is that your data is stored in the cluster independent of a node. If you store
    your database files on a PVC, they will be available no matter what node the pod
    for SQL Server is running.


    *   **Replicaset** and **Statefulset**


    *   One of the coolest features of k8s is the ability to declare a form of high
    availability for our pods. For example, you can *tell* k8s, “I always want one
    copy of my pod running at any point in time.” So if the pod fails (SQL Server
    crashes) or even the node fails (VM crashes), k8s will automatically try to start
    the pod again (could be on the same node or another node if one is available).


    #### How Do I Get k8s?


    K8s was built as an open source project, and you can deploy your own k8s cluster
    based on open source. For example, you can use the open source tool kubeadm to
    install k8s as documented at [`https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/).


    Most k8s customers use a licensed product for k8s production such as Azure Stack
    HCI, Red Hat OpenShift, or Rancher. You can use cloud-based k8s systems such as
    Azure Kubernetes Service (AKS), Google Kubernetes Engine (GKE), and Amazon Elastic
    Kubernetes Service (EKS). The big advantage of licensed products is some of the
    k8s system is managed and you can receive commercial production support.'
  trans: "\n### 容器切换方法\n\n我在本章前面提到过，你不会去修补 SQL Server 容器。你会通过`切换`它们来应用累积更新。以下是其魔法般的原理。当你运行一个容器并通过\
    \ `-v` 命令指定一个持久卷时，该卷中的任何文件在容器重启或删除后都会保留。如果你将 SQL Server 数据库文件（包括系统数据库）放入一个映射到持久化存储的目录中，你就可以一次`指向`任何一个\
    \ SQL Server 容器到这个卷。\n\n此外，SQL Server 累积更新在同一主版本内是兼容的。因此，我可以执行以下操作：\n\n1.  启动一个\
    \ SQL Server 2022 RTM 容器镜像，将其指向 `/var/opt/mssql` 的一个持久卷。\n2.  假设 SQL Server 2022\
    \ 的第一个累积更新发布，而我想使用它。\n3.  停止 SQL Server 2022 RTM 容器。\n4.  然后运行一个基于 SQL Server\
    \ 2022 CU1 的新 SQL Server 容器，将其指向同一个持久卷。新的 SQL Server 将启动并识别新的 master 数据库和用户数据库。只需几分钟，我就更新了\
    \ SQL Server。\n5.  现在假设出现问题，你想回滚到 SQL Server 2022 RTM 容器。\n6.  停止新的 SQL Server\
    \ 2022 CU1 容器并启动 SQL Server 2022 RTM 容器。几分钟之内，你就完成了回滚。\n\n你可以从《*SQL Server 2019\
    \ Revealed*》一书中查看如何对 SQL Server 2019 执行此操作的示例，地址是 [`https://github.com/microsoft/bobsql/tree/master/sql2019book/ch7_inside_sql_containers/update/dockerpowershell`](https://github.com/microsoft/bobsql/tree/master/sql2019book/ch7_inside_sql_containers/update/dockerpowershell)。\n\
    \n### 在 Kubernetes 上运行 SQL Server 2022\n\n为 SQL Server 提供 Linux 支持为我们打开了一个全新的世界，包括容器。容器则为我们打开了通往\
    \ Kubernetes 的世界。你想以一种有趣的方式学习 Kubernetes 吗？没有什么能比得上《给孩子们看的 Kubernetes 图解指南》：[`https://youtu.be/4ht22ReBjno`](https://youtu.be/4ht22ReBjno)。\n\
    \n### 为什么用 k8s\n\nKubernetes 源自 Google。Kubernetes 的创始人，如 Brendan Burns（现就职于微软），希望找到一种大规模运行容器的方法。Linux\
    \ 本身并未为此提供方案，因此他们在 Linux 之上构建了一套名为 Kubernetes 的软件服务。Brendan 制作了一个非常棒的视频播放列表来解释\
    \ Kubernetes：[`www.youtube.com/watch?v=daVUONZqn88&list=PLLasX02E8BPCrIhFrc_ZiINhbRkYMKdPT`](http://www.youtube.com/watch?v=daVUONZqn88&list=PLLasX02E8BPCrIhFrc_ZiINhbRkYMKdPT)。\n\
    \n既然 SQL Server 支持容器，为何不也支持 Kubernetes 呢？好吧，这个长单词说得够多了。让我们像那些酷孩子一样使用 `k8s`（k<八个字母>s）吧。必须承认，SQL\
    \ Server 在 `k8s` 上的支持目前还非常基础。你可以部署 SQL Server，连接到实例，并将数据存储在持久存储中。但 `k8s` 确实提供了一些不错的内置功能，如负载均衡器和基本的高可用性。如果你正在寻找一个使用\
    \ `k8s` 和 SQL Server 的完整托管体验，你应该看看 Azure Arc 托管实例 (Arc SQL MI)（[`https://aka.ms/azurearcsqlmi`](https://aka.ms/azurearcsqlmi)）。\n\
    \n请在 [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s) 关注 SQL Server 在 `k8s` 上的最新动态。你也可以观看我在\
    \ SQLBits 上做的演讲以更深入地了解：[`https://youtu.be/USfCJDoCMr8`](https://youtu.be/USfCJDoCMr8)。\n\
    \n理解基础知识是值得的，这样你就能了解 SQL Server 在 `k8s` 上是如何工作的，以及它是否可以成为你扩展多个 SQL Server 容器的平台。\n\
    \n### 在 k8s 上部署 SQL Server\n\n让我们来看看在 `k8s` 上部署单个 SQL Server 容器的基础知识。\n\n####\
    \ k8s 的主要组件有哪些？\n\n当你看到部署体验时，有几个 `k8s` 术语你需要理解。这是一组非常基础的定义。关于这些组件和架构的更完整参考，请参阅\
    \ `k8s` 文档：[`https://kubernetes.io/docs/concepts/overview/components`](https://kubernetes.io/docs/concepts/overview/components)。\n\
    \n让我们通过图 9-1 来回顾这些组件（此处并未显示所有组件）。\n\n![](img/525217_1_En_9_Fig1_HTML.png)\n\n\
    图 9-1 `k8s` 组件\n\n*   `集群 (Cluster)`\n    把集群想象成一个主机，它包含所有 `k8s` 内部软件以及一系列用于运行容器的虚拟机或节点（可以是物理服务器）。\n\
    *   `节点 (Node)`\n    把节点想象成一个虚拟机（可以是物理机），它可以帮助协调其他节点或以容器形式运行用户程序。\n*   `控制平面 (Control\
    \ plane)`\n    所有运行系统的内部 `k8s` 软件称为控制平面，它运行在每个节点上。例如，`k8s` 完全基于 API，因此 API 服务器可以接收请求并在节点间进行编排。\n\
    *   `Pod`\n    Pod 被定义为在一个节点上执行的一个或多个容器。它是 `k8s` 系统中执行的最小单元。\n*   `容器运行时 (Container\
    \ runtime)`\n    由于容器是 Pod 执行的核心，因此所有节点上必须存在一个像 Docker 这样的容器运行时，以拉取容器镜像并运行容器。\n\
    *   `命名空间 (Namespace)`\n    命名空间是 `k8s` 对象的逻辑分组，使组织项目变得非常方便。每个 `k8s` 系统都有一个默认命名空间，但我建议你始终为你的\
    \ Pod 和其他 `k8s` 对象创建其他命名空间。\n*   `负载均衡器服务 (Load balancer service)`\n    你已经看到过\
    \ SQL Server 中以侦听器形式出现的连接抽象。可以把负载均衡器服务（另一种类型称为节点端口）看作一个侦听器。负载均衡器是一种将连接抽象到固定 IP\
    \ 地址和端口的方式，这样即使底层 IP 地址发生变化，连接也始终会被定向到正确的位置。\n*   `存储类 (Storage class)` 和 `持久卷声明\
    \ (PersistentVolumeClaim)`\n    存储类是系统上存储类型的映射。例如，Azure Kubernetes Service 有一个由系统定义的名为\
    \ `managed-premium` 的存储类，它使你能够访问 Azure 高级托管磁盘。可以把持久卷声明 (PVC) 想象成从存储类中划出的一个固定大小的卷。使用\
    \ PVC 的关键在于，你的数据独立于节点存储在集群中。如果你将数据库文件存储在 PVC 上，那么无论 SQL Server 的 Pod 运行在哪个节点上，这些文件都是可用的。\n\
    *   `副本集 (Replicaset)` 和 `有状态集 (Statefulset)`\n    `k8s` 最酷的功能之一是能够为我们的 Pod 声明一种形式的高可用性。例如，你可以`告诉`\
    \ `k8s`，“我希望在任何时间点都始终有一个 Pod 副本在运行。”因此，如果 Pod 失败（SQL Server 崩溃）甚至节点失败（虚拟机崩溃），`k8s`\
    \ 将自动尝试重新启动 Pod（如果可用，可能会在同一节点或其他节点上启动）。\n\n#### 如何获取 k8s？\n\n`K8s` 是作为一个开源项目构建的，你可以基于开源部署自己的\
    \ `k8s` 集群。例如，你可以使用开源工具 `kubeadm` 来安装 `k8s`，具体文档见 [`https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/)。\n\
    \n大多数 `k8s` 客户使用许可产品进行 `k8s` 生产部署，例如 Azure Stack HCI、Red Hat OpenShift 或 Rancher。你可以使用基于云的\
    \ `k8s` 系统，例如 Azure Kubernetes Service (AKS)、Google Kubernetes Engine (GKE) 和\
    \ Amazon Elastic Kubernetes Service (EKS)。许可产品的巨大优势是部分 `k8s` 系统由服务商管理，并且你可以获得商业生产支持。\n"
- fmt: "# 在 Kubernetes 上部署 SQL Server\n\n### 部署步骤是什么？\n\n我们为您构建了一个简单的教程，用于在 AKS 上试用\
    \ SQL Server，详见 [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s)。\n\n我还构建了一系列脚本，以更详细地解释部署步骤，详见\
    \ [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/deploy`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/deploy)。\n\
    \n其核心概念是，您向 `k8s` *声明*一个包含单个 SQL Server 容器镜像的 `Pod` 定义。命令行工具 `kubectl` 常用于向 `k8s`\
    \ 提交您的声明（`kubectl` 使用 `k8s` API）。您还经常使用一个名为 `YAML` 文件的文本来提供声明的详细信息。\n\n在示例脚本中，您需要执行以下步骤：\n\
    \n1.  为 `k8s` 对象创建一个新的命名空间。\n2.  为管理员密码创建一个 Secret。\n3.  创建一个新的映射到端口 `1433` 的负载均衡器服务。\n\
    4.  从 `managed-premium` 存储类创建一个 PVC。\n5.  使用 `YAML` 文件部署一个使用 SQL Server 容器镜像的\
    \ `Pod`，该镜像引用了 Secret、负载均衡器和 PVC。在 `YAML` 文件中，声明一个副本数为 `1` 的 `Replicaset`，以确保始终有一个\
    \ SQL Server `Pod` 在运行。\n\n部署 `Pod` 是一个异步操作。容器镜像如果在节点中不存在则会被拉取并执行。`Pod` 的整体编排远比这复杂。`K8s`\
    \ 拥有复杂的算法来决定在哪些节点上调度和运行 `Pod`。它还必须通过事件通知来检测 `Pod` 故障或资源限制，并采取相应措施。\n\n### 连接和使用\
    \ Kubernetes 上的 SQL Server\n\n在像 `AKS` 这样的系统上，负载均衡器 `IP` 地址和端口是对外可用的，因此可以使用像 `SSMS`\
    \ 这样的工具通过负载均衡器连接到在 `Pod` 中运行的 `SQL` 实例。在我位于 [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/sqlk8s/deploy/step12_querysql.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/sqlk8s/deploy/step12_querysql.ps1)\
    \ 的示例脚本中，您可以看到一种动态确定负载均衡器 `IP` 地址以连接到 `SQL Server` 的方法。\n\n`K8s` 包含内置服务来监控资源使用情况，以确保系统保持健康。我们看到的一个与\
    \ `k8s` 和 `SQL Server` 相关的问题是，`SQL Server` 可能会在节点内使用大量内存。这可能会触发 `k8s` 强制终止 `Pod`\
    \ 并将其迁移到另一个节点。这是因为 `k8s` 包含检测节点内应有多少可用内存以保持其健康的算法。然而，`SQL Server` 并不了解这些算法。著名的\
    \ `SQL` 和 `Linux` 社区专家 Anthony Nocentino 对此场景进行了很好的阐述，详见 [`www.centinosystems.com/posts/2019-09-28-memory-settings-for-running-sql-server-in-kubernetes`](http://www.centinosystems.com/posts/2019-09-28-memory-settings-for-running-sql-server-in-kubernetes)，其中也包括了如何解决此问题。\n\
    \n### 使用 Kubernetes 实现高可用性\n\n高可用性对于生产环境的 `SQL Server` 至关重要，因此 `k8s` 在系统中提供内置的*基础*高可用性是非常好的。\n\
    \n#### 使用 SQL Server 和 Kubernetes 实现基本高可用性\n\n当您在 `k8s` 上部署一个 `SQL Server Pod`\
    \ 并使用负载均衡器、`PVC` 和 `Replicaset` 时，您已经向 `k8s` 声明您希望使用基本的高可用性。\n\n考虑以下两种场景：\n\n\
    *   **Pod 故障**\n    *   如果 `SQL Server` 因任何原因崩溃，这将被视为 `Pod` 故障，`k8s` 将自动启动一个新的\
    \ `Pod`，该 `Pod` 通常会在同一节点上（如果资源可用）启动一个新的 `SQL Server` 容器。由于所有数据库都在 `PVC` 上，这类似于\
    \ `SQL Server` 容器的持久化存储。`SQL Server` 只需对所有数据库运行恢复。\n    *   `Pod` 故障也可能因其他原因在\
    \ `k8s` 内部发生，`k8s` 可能决定在另一个节点上启动新的 `Pod`。节点具有私有 `IP` 地址，但由于您使用了负载均衡器，您的连接会自动重定向到新节点。并且由于您使用了\
    \ `PVC`，所有数据库即使在新节点上也是可用的。这就像一个具有共享存储的故障转移集群，而您无需设置或配置任何故障转移集群软件。\n*   **节点故障**\n\
    \    *   如果您在构建 `k8s` 集群时部署了多个节点，那么当某个节点发生故障时，也可能出现相同的情况。事实上，我建议您在任何用于 `SQL Server`\
    \ 的 `k8s` 集群中*至少*拥有三个节点。一个节点将用于编排其他工作节点，您至少会有两个工作节点以实现冗余。\n    *   以下是我的脚本，用于查看\
    \ `AKS` 上 `SQL Server` 的 `HA` 实战：[`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/ha`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/ha)。\n\
    \n#### Always On 可用性组与 Kubernetes\n\n在 `SQL Server 2019` 的预览版中，我们引入了一个与 `k8s`\
    \ 集成的 `Always On` 可用性组部署概念。不幸的是，该功能未能出现在 `SQL Server 2019` 的最终版本中。我们在那里的工作确实演变为\
    \ `Azure Arc` 启用的 `SQL` 托管实例所附带的内置 `AG` 功能（通过商业服务层）。\n\n还有另一个来自我们合作伙伴 `DH2i` ([`https://dh2i.com`](https://dh2i.com))\
    \ 的解决方案。您可以在 [`https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes-dh2i`](https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes-dh2i)\
    \ 查看如何使用 `DH2i` 的解决方案在 `k8s` 上部署 `AG`。\n\n### Helm 图表\n\n有些人觉得 `k8s` 的部署体验有点复杂。于是出现了\
    \ `Helm` 图表的概念 ([`https://helm.sh`](https://helm.sh))。可以将 `Helm` 视为 `k8s` 的包管理器。您可以在\
    \ [`https://docs.microsoft.com/sql/linux/sql-server-linux-containers-deploy-helm-charts-kubernetes`](https://docs.microsoft.com/sql/linux/sql-server-linux-containers-deploy-helm-charts-kubernetes)\
    \ 查看如何使用 `Helm` 部署 `SQL Server`。\n\n## Linux、容器和 Kubernetes 的世界\n\n对许多人来说，`SQL\
    \ Server on Linux` 开启了新的大门和可能性。我曾与一些客户交谈，他们组织的不同部门使用 `Windows`，而另一些部门使用 `Linux`，但需要像\
    \ `SQL Server` 这样跨平台的一致数据库平台。\n\n但 `Linux` 支持还开启了更多可能性。`SQL Server` 容器可能会改变您组织构建应用程序的方式。想象一下，您公司中的开发人员使用他们选择的操作系统，针对相同的、一致的\
    \ `SQL Server` 引擎和数据库构建应用程序。事实上，新的 `Azure SQL Database` 本地开发体验 ([`https://docs.microsoft.com/azure/azure-sql/database/local-dev-experience-overview`](https://docs.microsoft.com/azure/azure-sql/database/local-dev-experience-overview))\
    \ 就使用了 `SQL Server` 容器。或者考虑一下，您可以在单个虚拟机中使用容器整合多个 `SQL Server` 实例。\n\n有了容器，就有了\
    \ `k8s`，而我们的 `Azure Arc` 启用的 `SQL` 托管实例证明了您可以使用 `k8s` 将 `Azure` 托管服务的强大功能引入您的基础设施。\n\
    \n所有这些都讲述了 `SQL Server` 的选择故事。具有兼容性的选择。您的应用程序无需更改，并且无论 `SQL Server` 部署在哪里，数据库都是可互换的。"
  raw: '#### What Are the Deployment Steps?


    We built a simple tutorial for you to try out SQL Server on AKS at [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s).


    I also built a series of scripts to explain the deployment steps in more detail
    at [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/deploy`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/deploy).


    The concepts are for you to *declare* to k8s the definition of a pod with a single
    SQL Server container image. The command line tool **kubectl** is often used to
    state your declaration to k8s (kubectl uses the k8s API). You also often use a
    text file called a YAML file to provide details of your declaration.


    In the sample scripts, you do the following steps:


    1.  Create a new namespace for k8s objects.


    2.  Create a secret for the admin password.


    3.  Create a new load balancer service mapped to port 1433.


    4.  Create a PVC from the managed-premium storage class.


    5.  Use a YAML file to deploy a pod using the SQL Server container image referencing
    the secret, load balancer, and PVC. In the YAML file, declare a Replicaset of
    1 so a SQL Server pod is always running.


    Deploying the pod is an asynchronous operation. Container images are pulled if
    they do not exist in a node and executed. The overall orchestration of pods is
    far more complex than this. K8s has sophisticated algorithms to decide which nodes
    to schedule and run pods. It also must have event notifications to look for pod
    failures or resource limits and take action.


    ### Connecting and Using SQL Server on k8s


    On a system like AKS, the load balancer IP address and port are available externally,
    so a tool like SSMS can be used to connect through the load balancer to the SQL
    instance running in the pod. In my example script at [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/sqlk8s/deploy/step12_querysql.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/sqlk8s/deploy/step12_querysql.ps1),
    you can see a way to dynamically determine the IP address of the load balancer
    to connect to SQL Server.


    K8s includes built-in services to monitor resource usage to ensure the system
    remains healthy. One issue we have seen with k8s and SQL Server is that SQL Server
    can use a lot of memory within the node. It could cause a trigger for k8s to forcefully
    fail the pod and move it to another node. This is because k8s contains algorithms
    to detect the amount of memory that should be available within a node to keep
    it healthy. SQL Server though doesn’t know about these algorithms. Famed SQL and
    Linux community expert Anthony Nocentino has a nice writeup on this scenario at
    [`www.centinosystems.com/posts/2019-09-28-memory-settings-for-running-sql-server-in-kubernetes`](http://www.centinosystems.com/posts/2019-09-28-memory-settings-for-running-sql-server-in-kubernetes)
    including how you can address it.


    ### High Availability with k8s


    High availability is critical to a production SQL Server, so it is very nice that
    k8s provides built-in *basic* high availability within the system.


    #### Basic HA with SQL and k8s


    When you deploy a SQL Server pod on k8s and use a load balancer, PVC, and Replicaset,
    you have already declared to k8s you would like to use basic high availability.


    Consider these two scenarios:


    *   **Pod failure**


    *   If for any reason SQL Server crashes, this is recognized as a pod failure,
    and k8s will automatically start a new pod, which will start a new SQL Server
    container typically on the same node if resources are available. Since all databases
    are on a PVC, this is like persisted storage for a SQL Server container. SQL Server
    will just run recovery on all databases.


    *   A pod failure can occur within k8s for other reasons, and k8s may decide to
    start a new pod on a different node. Nodes have private IP addresses, but since
    you are using a load balancer, your connection is automatically redirected to
    the new node. And since you are using a PVC, all databases are available even
    on the new node. This is like a failover cluster with shared storage without you
    having to set up or configure any failover cluster software.


    *   **Node failure**


    *   The same situation can occur if a node fails assuming you have deployed multiple
    nodes when you built your k8s cluster. In fact, I recommend you have *at least*
    three nodes on any k8s cluster for SQL Server. One node will serve to orchestrate
    other worker nodes, and you will have at least two worker nodes for redundancy.


    *   Here are my scripts to see HA in action with SQL Server on AKS at [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/ha`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/ha).


    #### Always On Availability Groups and k8s


    In the preview of SQL Server 2019, we introduced a concept to deploy an Always
    On Availably Group integrated with k8s. Unfortunately, that capability did not
    make the final release of SQL Server 2019\. The work we did there did evolve into
    the built-in AG feature (through the Business Critical service tier) that comes
    with Azure Arc–enabled SQL Managed Instance.


    There is another solution that comes with our partner DH2i ([`https://dh2i.com`](https://dh2i.com)).
    You can see how to deploy an AG on k8s with DH2i’s solution at [`https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes-dh2i`](https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes-dh2i).


    ### Helm Charts


    Some find the k8s deployment experience a bit complicated. Along comes the concept
    of Helm charts ([`https://helm.sh`](https://helm.sh)). Think of Helm as a package
    manager for k8s. You can see how to deploy SQL Server using Helm at [`https://docs.microsoft.com/sql/linux/sql-server-linux-containers-deploy-helm-charts-kubernetes`](https://docs.microsoft.com/sql/linux/sql-server-linux-containers-deploy-helm-charts-kubernetes).


    ## The World of Linux, Containers, and k8s


    For many SQL Server on Linux has opened up new doors and possibilities. I’ve spoken
    to customers who have different parts of their organization use Windows, while
    others use Linux but need a consistent database platform like SQL Server across
    them.


    But Linux support opens up so many other possibilities. SQL Server containers
    could change the way your organization builds applications. Imagine developers
    across your company using the OS of their choice to build applications against
    the same consistent SQL Server engine and database. In fact, the new Azure SQL
    Database local development experience ([`https://docs.microsoft.com/azure/azure-sql/database/local-dev-experience-overview`](https://docs.microsoft.com/azure/azure-sql/database/local-dev-experience-overview))
    uses SQL Server containers. Or consider the fact that you can consolidate multiple
    SQL Server instances in a single VM with containers.


    With containers comes k8s, and our Azure Arc–enabled SQL Managed Instance proves
    you can bring the power of Azure managed services to your infrastructure using
    k8s.


    All of these tell the story of choice for SQL Server. Choice with compatibility.
    Your application doesn’t have to change, and databases are interchangeable no
    matter where SQL Server is deployed.'
  trans: "\n# 在 Kubernetes 上部署 SQL Server\n\n### 部署步骤是什么？\n\n我们为您构建了一个简单的教程，用于在 AKS\
    \ 上试用 SQL Server，详见 [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s)。\n\n我还构建了一系列脚本，以更详细地解释部署步骤，详见\
    \ [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/deploy`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/deploy)。\n\
    \n其核心概念是，您向 `k8s` *声明*一个包含单个 SQL Server 容器镜像的 `Pod` 定义。命令行工具 `kubectl` 常用于向 `k8s`\
    \ 提交您的声明（`kubectl` 使用 `k8s` API）。您还经常使用一个名为 `YAML` 文件的文本来提供声明的详细信息。\n\n在示例脚本中，您需要执行以下步骤：\n\
    \n1.  为 `k8s` 对象创建一个新的命名空间。\n2.  为管理员密码创建一个 Secret。\n3.  创建一个新的映射到端口 `1433` 的负载均衡器服务。\n\
    4.  从 `managed-premium` 存储类创建一个 PVC。\n5.  使用 `YAML` 文件部署一个使用 SQL Server 容器镜像的\
    \ `Pod`，该镜像引用了 Secret、负载均衡器和 PVC。在 `YAML` 文件中，声明一个副本数为 `1` 的 `Replicaset`，以确保始终有一个\
    \ SQL Server `Pod` 在运行。\n\n部署 `Pod` 是一个异步操作。容器镜像如果在节点中不存在则会被拉取并执行。`Pod` 的整体编排远比这复杂。`K8s`\
    \ 拥有复杂的算法来决定在哪些节点上调度和运行 `Pod`。它还必须通过事件通知来检测 `Pod` 故障或资源限制，并采取相应措施。\n\n### 连接和使用\
    \ Kubernetes 上的 SQL Server\n\n在像 `AKS` 这样的系统上，负载均衡器 `IP` 地址和端口是对外可用的，因此可以使用像 `SSMS`\
    \ 这样的工具通过负载均衡器连接到在 `Pod` 中运行的 `SQL` 实例。在我位于 [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/sqlk8s/deploy/step12_querysql.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/sqlk8s/deploy/step12_querysql.ps1)\
    \ 的示例脚本中，您可以看到一种动态确定负载均衡器 `IP` 地址以连接到 `SQL Server` 的方法。\n\n`K8s` 包含内置服务来监控资源使用情况，以确保系统保持健康。我们看到的一个与\
    \ `k8s` 和 `SQL Server` 相关的问题是，`SQL Server` 可能会在节点内使用大量内存。这可能会触发 `k8s` 强制终止 `Pod`\
    \ 并将其迁移到另一个节点。这是因为 `k8s` 包含检测节点内应有多少可用内存以保持其健康的算法。然而，`SQL Server` 并不了解这些算法。著名的\
    \ `SQL` 和 `Linux` 社区专家 Anthony Nocentino 对此场景进行了很好的阐述，详见 [`www.centinosystems.com/posts/2019-09-28-memory-settings-for-running-sql-server-in-kubernetes`](http://www.centinosystems.com/posts/2019-09-28-memory-settings-for-running-sql-server-in-kubernetes)，其中也包括了如何解决此问题。\n\
    \n### 使用 Kubernetes 实现高可用性\n\n高可用性对于生产环境的 `SQL Server` 至关重要，因此 `k8s` 在系统中提供内置的*基础*高可用性是非常好的。\n\
    \n#### 使用 SQL Server 和 Kubernetes 实现基本高可用性\n\n当您在 `k8s` 上部署一个 `SQL Server Pod`\
    \ 并使用负载均衡器、`PVC` 和 `Replicaset` 时，您已经向 `k8s` 声明您希望使用基本的高可用性。\n\n考虑以下两种场景：\n\n\
    *   **Pod 故障**\n    *   如果 `SQL Server` 因任何原因崩溃，这将被视为 `Pod` 故障，`k8s` 将自动启动一个新的\
    \ `Pod`，该 `Pod` 通常会在同一节点上（如果资源可用）启动一个新的 `SQL Server` 容器。由于所有数据库都在 `PVC` 上，这类似于\
    \ `SQL Server` 容器的持久化存储。`SQL Server` 只需对所有数据库运行恢复。\n    *   `Pod` 故障也可能因其他原因在\
    \ `k8s` 内部发生，`k8s` 可能决定在另一个节点上启动新的 `Pod`。节点具有私有 `IP` 地址，但由于您使用了负载均衡器，您的连接会自动重定向到新节点。并且由于您使用了\
    \ `PVC`，所有数据库即使在新节点上也是可用的。这就像一个具有共享存储的故障转移集群，而您无需设置或配置任何故障转移集群软件。\n*   **节点故障**\n\
    \    *   如果您在构建 `k8s` 集群时部署了多个节点，那么当某个节点发生故障时，也可能出现相同的情况。事实上，我建议您在任何用于 `SQL Server`\
    \ 的 `k8s` 集群中*至少*拥有三个节点。一个节点将用于编排其他工作节点，您至少会有两个工作节点以实现冗余。\n    *   以下是我的脚本，用于查看\
    \ `AKS` 上 `SQL Server` 的 `HA` 实战：[`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/ha`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/ha)。\n\
    \n#### Always On 可用性组与 Kubernetes\n\n在 `SQL Server 2019` 的预览版中，我们引入了一个与 `k8s`\
    \ 集成的 `Always On` 可用性组部署概念。不幸的是，该功能未能出现在 `SQL Server 2019` 的最终版本中。我们在那里的工作确实演变为\
    \ `Azure Arc` 启用的 `SQL` 托管实例所附带的内置 `AG` 功能（通过商业服务层）。\n\n还有另一个来自我们合作伙伴 `DH2i` ([`https://dh2i.com`](https://dh2i.com))\
    \ 的解决方案。您可以在 [`https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes-dh2i`](https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes-dh2i)\
    \ 查看如何使用 `DH2i` 的解决方案在 `k8s` 上部署 `AG`。\n\n### Helm 图表\n\n有些人觉得 `k8s` 的部署体验有点复杂。于是出现了\
    \ `Helm` 图表的概念 ([`https://helm.sh`](https://helm.sh))。可以将 `Helm` 视为 `k8s` 的包管理器。您可以在\
    \ [`https://docs.microsoft.com/sql/linux/sql-server-linux-containers-deploy-helm-charts-kubernetes`](https://docs.microsoft.com/sql/linux/sql-server-linux-containers-deploy-helm-charts-kubernetes)\
    \ 查看如何使用 `Helm` 部署 `SQL Server`。\n\n## Linux、容器和 Kubernetes 的世界\n\n对许多人来说，`SQL\
    \ Server on Linux` 开启了新的大门和可能性。我曾与一些客户交谈，他们组织的不同部门使用 `Windows`，而另一些部门使用 `Linux`，但需要像\
    \ `SQL Server` 这样跨平台的一致数据库平台。\n\n但 `Linux` 支持还开启了更多可能性。`SQL Server` 容器可能会改变您组织构建应用程序的方式。想象一下，您公司中的开发人员使用他们选择的操作系统，针对相同的、一致的\
    \ `SQL Server` 引擎和数据库构建应用程序。事实上，新的 `Azure SQL Database` 本地开发体验 ([`https://docs.microsoft.com/azure/azure-sql/database/local-dev-experience-overview`](https://docs.microsoft.com/azure/azure-sql/database/local-dev-experience-overview))\
    \ 就使用了 `SQL Server` 容器。或者考虑一下，您可以在单个虚拟机中使用容器整合多个 `SQL Server` 实例。\n\n有了容器，就有了\
    \ `k8s`，而我们的 `Azure Arc` 启用的 `SQL` 托管实例证明了您可以使用 `k8s` 将 `Azure` 托管服务的强大功能引入您的基础设施。\n\
    \n所有这些都讲述了 `SQL Server` 的选择故事。具有兼容性的选择。您的应用程序无需更改，并且无论 `SQL Server` 部署在哪里，数据库都是可互换的。\n"
- fmt: '# 10. SQL Server 2022 on Azure Virtual Machines


    Today when you deploy SQL Server 2022, you have choices to run SQL Server on a
    laptop, a "bare-metal" server, or even a container. The most common choice to
    deploy and run SQL Server is a `virtual machine`. While running SQL Server with
    virtualization technologies such as Hyper-V and VMWare is extremely popular, many
    customers are now turning to the cloud to get the Infrastructure-as-a-Service
    (IaaS) experience. I believe using an `Azure Virtual Machine` provides you with
    a great experience.


    The SQL Server on Azure Virtual Machines experience is constantly evolving and
    getting better. So while there are no new specific capabilities in Azure Virtual
    Machines for SQL Server 2022, I thought a chapter devoted to SQL Server on Azure
    Virtual Machines would be valuable for readers of this book.


    In this chapter I''ll show how to deploy SQL Server on Azure Virtual Machines
    as well as using, managing, optimizing, and monitoring it.


    ## What Is SQL Server on Azure Virtual Machines?


    You may have an existing SQL Server virtual machine (VM) deployment or may be
    thinking about a new one. Now, where to host the VM? One of these choices is in
    Azure called an Azure Virtual Machine. An Azure Virtual Machine is known as an
    Infrastructure as a Service (IaaS) because Azure provides the hosting infrastructure
    as a service to you for a virtual machine running Windows or Linux. This means
    that Azure will host your virtual machine and provide all the hardware including
    compute, storage, and networking. You will be responsible to manage everything
    inside the `guest` virtual machine including the operating system and SQL Server.
    We do certain things to help you manage the `guest` virtual machine environment,
    and you will see that in this chapter.


    Since you have complete control inside the virtual machine, you are free to use
    either a Windows or Linux operating system (including containers). And SQL Server
    running in this environment is the complete "box" product including the database
    engine and all services. Effectively, any SQL Server feature you can run in a
    VM in your environment can be run in an Azure Virtual Machine. This includes services
    outside the engine like SQL Server Integration Services (SSIS), SQL Server Analysis
    Services (SSAS), and SQL Server Reporting Services (SSRS).


    ## Planning for Deployment


    Anytime you are going to deploy a new SQL Server instance, a certain healthy amount
    of planning will save you time, money, and effort. When you plan a new SQL deployment
    on a Hyper-V virtual machine, you have factors you consider like number of CPUs,
    CPU type and speed, and memory. What kind of storage capacity, performance, and
    number of drives are required? You might even work in a company that has data
    centers where you are required to use a website to request a virtual machine to
    be provisioned. It would be typical in those scenarios to choose a VM `size`,
    which dictates the resources you have available for your SQL Server instance.


    You also need to know how an application and tools will connect to SQL Server.
    Will you use Remote Desktop (`rdp`) to run tools like SSMS inside the VM or remotely?
    How will you set up the network of your virtual machine to connect to your applications?
    What about high availability and disaster recovery? All questions to be thought
    through for any production SQL Server deployment.


    These decisions are no different with an Azure Virtual Machine. One big difference
    is now your virtual machine with SQL Server is being hosted in Azure. This means
    your choices on possible virtual machine resources are dictated by what Microsoft
    provides (but you will see the choices are vast).


    Let''s review some of the important decisions you need to consider to make the
    overall experience the best possible. You will use these planning decisions to
    make choices during and after deployment. A big reason I think you should consider
    these choices before you deploy is you may become blocked on deployment because
    you are not sure about what choice to make.


    - You need an `Azure subscription` to deploy a virtual machine and also to decide
    what `resource group` to use. Resource groups are a great way to organize multiple
    Azure resources, but they also can be a convenient method to create your own virtual
    network in Azure. Read more about resource groups at [`https://docs.microsoft.com/azure/azure-resource-manager/management/overview#resource-groups`](https://docs.microsoft.com/azure/azure-resource-manager/management/overview#resource-groups).


    - **Review the possible virtual machine sizes** available in Azure at [`https://aka.ms/azurevmsizes`](https://aka.ms/azurevmsizes).
    To help you narrow down your choices, check out our advice on Azure VM sizes for
    SQL Server at [`https://aka.ms/SQLIaaSSizing`](https://aka.ms/SQLIaaSSizing).
    Also take heart, in many cases, you can change your VM size after you have deployed
    often with a very small amount of downtime.


    > **Tip**

    >

    > You will see an issue later in this chapter where the virtual machine size I
    choose has a cap on storage performance that is less than the disk storage choices
    for data, log, and tempdb. This can cause an unexpected and hard-to-detect performance
    problem. Take time reading our documentation at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist)
    to align these choices.


    - Are there **trust concerns** about hosting SQL Server and data in Azure? Check
    out [`https://aka.ms/azuretrust`](https://aka.ms/azuretrust) for more information
    on Azure privacy, compliance, security layers, and monitoring.'
