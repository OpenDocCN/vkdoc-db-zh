    \    ```\n    -- Step 2: Use a date instead of datetime\n    USE master;\n   \
    \ GO\n    DECLARE @date DATE = '2022-05-14';\n    SELECT DATE_BUCKET(week, 1,\
    \ @date);\n    GO\n    ```\n    这是 `DATE_BUCKET` 如何返回与输入数据类型相同的结果值的一个例子，因此这里的结果是\
