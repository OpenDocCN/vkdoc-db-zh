  trans: "\n# 让我们尝试 DOP 反馈\n\n## 先决条件\n\n运行此示例的先决条件如下：\n\n*   SQL Server 2022 评估版。\n\
    *   拥有八个 CPU 和至少 24Gb 内存的虚拟机或计算机。\n\n> **注意**\n>\n> 此练习对 CPU 非常敏感。您应该在专用于 SQL\
    \ Server 且具有快速 I/O 存储的虚拟机或计算机上执行此练习。较慢的 CPU 速度或其他正在运行的进程可能会影响观察此练习结果的能力。我使用 Azure\
    \ 虚拟机 `Standard+E8ads_v5`（八个 vCPU，64Gb 内存）完成了此练习。使用 `D32ds_v5` Azure 虚拟机，并将实例的\
    \ DOP 从 32 降低到 12，我也成功运行了此示例。\n\n*   SQL Server Management Studio (SSMS)。最新的 18.x\
    \ 或 19.x 版本均可使用。\n*   从 [`https://aka.ms/ostress`](https://aka.ms/ostress) 下载\
    \ `ostress.exe`。使用随附的 `RMLSetup.msi` 文件进行安装，并使用所有默认设置。\n*   本书 GitHub 仓库中 `ch05_builtinqueryintelligence_getsbetter\\\
    dopfeedback` 目录下的脚本副本。\n\n## 步骤\n\n按照以下步骤查看 DOP 反馈的实际效果：\n\n![DOP 扩展事件序列](img/525217_1_En_5_Fig20_HTML.png)\n\
    \n**图 5-20** DOP 扩展事件序列\n\n1.  从 [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
    \ 下载 WideWorldImporters 备份文件的副本。下一步中的脚本假设备份文件位于 `c:\\sql_sample_databases`。您可以使用从\
    \ [`https://github.com/microsoft/sqlworkshops-sql2022workshop/releases`](https://github.com/microsoft/sqlworkshops-sql2022workshop/releases)\
    \ 获取的预加载了扩展数据的定制备份。\n\n2.  还原 WideWorldImporters 示例备份。您可以编辑并使用 `restorewwi.sql`\
    \ 脚本。此脚本专为 Azure 虚拟机市场映像上的 SQL Server 设计，该映像的数据和日志文件位于独立的磁盘上。请编辑此脚本以匹配您的文件路径。此脚本包含以下\
    \ T-SQL 语句：\n\n    ```sql\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS\
    \ WideWorldImporters;\n    GO\n    -- 编辑文件位置以匹配您的存储\n    RESTORE DATABASE WideWorldImporters\
    \ FROM DISK = 'c:\\sql_sample_databases\\WideWorldImporters-Full.bak' with\n \
    \   MOVE 'WWI_Primary' TO 'e:\\data\\WideWorldImporters.mdf',\n    MOVE 'WWI_UserData'\
    \ TO 'e:\\data\\WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log' TO 'f:\\\
    log\\WideWorldImporters.ldf',\n    MOVE 'WWI_InMemory_Data_1' TO 'e:\\data\\WideWorldImporters_InMemory_Data_1',\n\
    \    stats=5;\n    GO\n    ```\n\n3.  执行脚本 `configmaxdop.sql`。这将运行以下 T-SQL 语句：\n\
    \n    ```sql\n    sp_configure 'show advanced', 1;\n    go\n    reconfigure;\n\
    \    go\n    sp_configure 'max degree of parallelism', 0;\n    go\n    reconfigure;\n\
    \    go\n    ```\n\n    为了正确建立基线，我将实例的 `MAXDOP` 设置为 0，以使用所有可用的 CPU。没有配置其他 `MAXDOP`\
    \ 设置。\n\n4.  执行 `populatedata.sql` 脚本以向 `Warehouse.StockItems` 表加载更多数据。此脚本运行大约需要\
    \ 15 分钟（计时取决于 CPU 数量和磁盘速度）。此脚本执行以下 T-SQL 语句（练习中完全坦诚：此代码源自我最初构建 PSP 优化的地方）：\n\n\
    \    ```sql\n    USE WideWorldImporters;\n    GO\n    -- 添加 StockItem 以在 Suppliers\
    \ 中导致数据偏斜\n    --\n    DECLARE @StockItemID int;\n    DECLARE @StockItemName varchar(100);\n\
    \    DECLARE @SupplierID int;\n    SELECT @StockItemID = 228;\n    SET @StockItemName\
    \ = 'Dallas Cowboys Shirt'+convert(varchar(10), @StockItemID);\n    SET @SupplierID\
    \ = 4;\n    DELETE FROM Warehouse.StockItems WHERE StockItemID >= @StockItemID;\n\
    \    SET NOCOUNT ON;\n    BEGIN TRANSACTION;\n    WHILE @StockItemID <= 20000000\n\
    \    BEGIN\n    INSERT INTO Warehouse.StockItems\n    (StockItemID, StockItemName,\
    \ SupplierID, UnitPackageID, OuterPackageID, LeadTimeDays,\n    QuantityPerOuter,\
    \ IsChillerStock, TaxRate, UnitPrice, TypicalWeightPerUnit, LastEditedBy\n   \
    \ )\n    VALUES (@StockItemID, @StockItemName, @SupplierID, 10, 9, 12, 100, 0,\
    \ 15.00, 100.00, 0.300, 1);\n    SET @StockItemID = @StockItemID + 1;\n    SET\
    \ @StockItemName = 'Dallas Cowboys Shirt'+convert(varchar(10), @StockItemID);\n\
    \    END\n    COMMIT TRANSACTION;\n    SET NOCOUNT OFF;\n    GO\n    ```\n\n5.\
    \  执行脚本 `rebuild_index.sql` 以重建添加数据后的索引。此脚本运行以下 T-SQL 语句：\n\n    ```sql\n    USE\
    \ WideWorldImporters;\n    GO\n    ALTER INDEX FK_Warehouse_StockItems_SupplierID\
    \ ON Warehouse.StockItems REBUILD;\n    GO\n    ```\n\n6.  执行脚本 `dopfeedback.sql`\
    \ 以启用 DOP 反馈，将 `dbcompat` 设置为 160，并清除练习的设置。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n \
    \   USE WideWorldImporters;\n    GO\n    -- 确保查询存储已开启，并将运行时收集间隔设置得比默认值低\n    ALTER\
    \ DATABASE WideWorldImporters SET QUERY_STORE = ON;\n    GO\n    ALTER DATABASE\
    \ WideWorldImporters SET QUERY_STORE (OPERATION_MODE = READ_WRITE, DATA_FLUSH_INTERVAL_SECONDS\
    \ = 60, INTERVAL_LENGTH_MINUTES = 1, QUERY_CAPTURE_MODE = ALL);\n    GO\n    ALTER\
    \ DATABASE WideWorldImporters SET QUERY_STORE CLEAR ALL;\n    GO\n    -- 您必须将数据库兼容级别更改为\
    \ 160\n    ALTER DATABASE WideWorldImporters SET COMPATIBILITY_LEVEL = 160;\n\
    \    GO\n    -- 启用 DOP 反馈\n    ALTER DATABASE SCOPED CONFIGURATION SET DOP_FEEDBACK\
    \ = ON;\n    GO\n    -- 清除过程缓存以使用新计划开始\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ CLEAR PROCEDURE_CACHE;\n    GO\n    ```\n\n    注意，我们不需要为此数据库更改 `dbcompat`（当前设置为\
    \ 130）。我还将 `INTERVAL_LENGTH_MINUTES` 设置为 1，以便在查看查询存储和报告时能够以更精细的级别显示详细的查询统计信息。这不是生产环境推荐的查询存储配置。\n\
    \n7.  执行脚本 `proc.sql` 以创建一个存储过程来查询数据，该过程将使用并行查询计划。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n\
    \    USE WideWorldImporters;\n    GO\n    CREATE OR ALTER PROCEDURE [Warehouse].[GetStockItemsbySupplier]\
    \  @SupplierID int\n    AS\n    BEGIN\n    SELECT StockItemID, SupplierID, StockItemName,\
    \ TaxRate, LeadTimeDays\n    FROM Warehouse.StockItems s\n    WHERE SupplierID\
    \ = @SupplierID\n    ORDER BY StockItemName;\n    END;\n    GO\n    ```\n\n  \
    \  > **注意**\n    >\n    > 您可能从参数敏感计划（PSP）优化中认出这个例子。我坦率地说：这个练习使用了我最初构建 PSP 优化时使用的这个过程和代码。我意识到该示例的一部分使用了并行查询计划。所以您首先看到的是\
    \ DOP 反馈，但它“诞生于”我首先进行的 PSP 优化工作。想象一下，这两个特性实际上和谐地协同工作，从而“全面”提高性能。\n\n8.  执行脚本 `dopxe.sql`\
    \ 以设置一个扩展事件会话来跟踪 DOP 反馈的状态。此脚本运行以下 T-SQL 语句：\n"
- fmt: '# 使用 DOP 反馈进行性能调优


    ```

    IF EXISTS (SELECT * FROM sys.server_event_sessions WHERE name = ''DOPFeedback'')

    DROP EVENT SESSION [DOPFeedback] ON SERVER;

    GO

    CREATE EVENT SESSION [DOPFeedback] ON SERVER

    ADD EVENT sqlserver.dop_feedback_eligible_query(

    ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text)),

    ADD EVENT sqlserver.dop_feedback_provided(

    ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text)),

    ADD EVENT sqlserver.dop_feedback_reverted(

    ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text)),

    ADD EVENT sqlserver.dop_feedback_stabilized(

    ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text)),

    ADD EVENT sqlserver.dop_feedback_validation(

    ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text))

    WITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=NO_EVENT_LOSS,MAX_DISPATCH_LATENCY=1
    SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=OFF);

    GO

    -- Start XE

    ALTER EVENT SESSION [DOPFeedback] ON SERVER

    STATE = START;

    GO

    ```


    在 SSMS 的对象资源管理器中，右键单击新的 Extended Events 会话并选择 **Watch Live Data**。


    ### 9. 运行工作负载脚本


    从命令提示符运行脚本 `workload_index_scan_users.cmd`。此脚本大约需要 15 分钟完成，它会在一个重复的循环中执行你创建的存储过程。


    > **注意**：此脚本假定使用 Windows 身份验证连接到本地服务器。


    ### 10. 观察 DOP 反馈


    当脚本完成后，你可以使用 Extended Events 的实时数据观察 DOP 反馈。你应该会看到一系列类似于图 [5-20](#525217_1_En_5_Chapter.xhtml#Fig20)
    的事件。


    在 SSMS 的 **Live Data Viewer** 中，你可以向默认视图添加列以查看反馈的顺序（右键单击 **Details** 窗格中的任意字段，然后选择
    **Show Column in Table**）。随着时间的推移，你会看到 **`feedback_dop`** 值降低，以及查询的经过时间和 CPU 时间减少。你还可以看到验证的迭代，其
    `feedback_state` 为 `PendingValidationTest` 和 `Stable`。每当达到 `Stable` 状态时，反馈就会持久保存到
    **Query Store** 中。


    让我们关注最后两个事件，如图 [5-21](#525217_1_En_5_Chapter.xhtml#Fig21) 所示。


    ![DOP feedback validation and stabilization event.](Images/525217_1_En_5_Fig21_HTML.png)


    *图 5-21 DOP 反馈稳定化事件*


    注意，`dop_feedback_stabilized` 事件是在 `feedback_dop` 尝试设置为 2 但未稳定后触发的。尝试 DOP 反馈为 2
    后，经过时间增加了，但 CPU 使用率下降了。为了遵循“不造成损害”的原则，我们必须在 DOP 为 4 时停止。`dop_feedback_stabilized`
    事件显示了稳定的原因。在本例中，对 DOP 2 的验证失败是因为查询持续时间更长。这结束了反馈循环，因为我们已经找到了最佳且最低的可能 DOP 值 4。然而，请记住，当反馈被提供且反馈状态为
    **`Stable`** 时，反馈会被持久保存到 **Query Store** 中。这允许稳定状态被持久保存，即使通过进一步的反馈可能会将其降低。


    > **我多次运行过这个测试和场景，在某些情况下，我看到 DOP 反馈降低到 2 并稳定在那个数值。**


    ![Avg duration for DOP feedback.](Images/525217_1_En_5_Fig22_HTML.png)


    *图 5-22 DOP 反馈的平均持续时间*


    ### 1. 执行查询统计信息脚本


    执行脚本 `dop_query_stats.sql`。此脚本运行以下 T-SQL 语句：


    ```sql

    USE WideWorldImporters;

    GO

    -- The hash value of 4128150668158729174 should be fixed for the plan from the
    workload

    SELECT qsp.query_plan_hash, avg_duration/1000 as avg_duration_ms,

    avg_cpu_time/1000 as avg_cpu_ms, last_dop, min_dop, max_dop, qsrs.count_executions

    FROM sys.query_store_runtime_stats qsrs

    JOIN sys.query_store_plan qsp

    ON qsrs.plan_id = qsp.plan_id

    and qsp.query_plan_hash = CONVERT(varbinary(8), cast(4128150668158729174 as bigint))

    ORDER by qsrs.last_execution_time;

    GO

    ```


    查看结果，你应该会看到随着 DOP 根据反馈降低，持续时间（经过时间）和 CPU 的减少过程。但请注意，当 `last_dop = 2` 时，持续时间更高，这就是为什么
    DOP 反馈被认为在 4 时稳定。


    ### 2. 检查查询反馈


    执行脚本 `check_query_feedback.sql`。此脚本运行以下 T-SQL 语句：


    ```sql

    USE WideWorldImporters;

    GO

    SELECT * from sys.query_store_plan_feedback;

    GO

    ```


    你的结果应类似于以下内容（为了可读性，我将结果垂直翻转，并且未包含日期时间列）：


    ```

    plan_feedback_id        1

    plan_id                 1

    feature_id              3

    feature_desc            DOP Feedback

    feedback_data

    {"BaselineStats":{"dop":"8","avg_cpu_time_ms":"35023","avg_elapsed_time_ms":"16995","avg_wait_time_ms":"4578"},"LastGoodFeedback":{"dop":"4","avg_cpu_time_ms":"25591","avg_elapsed_time_ms":"12440","avg_wait_time_ms":"23"}}

    State                   7

    state_desc              FEEDBACK_VALID

    ```


    **`feedback_data`** 显示了持久保存的 DOP 反馈，用于查询引擎对该查询的后续执行，该反馈在重启或计划缓存清除后仍然有效。在 **Query
    Store** 中的持久性是关键，这使得 DOP 反馈能够长期有效。


    ### 3. 查看资源消耗报告


    在 SSMS 中查看 **Top Resource-Consuming Queries** 报告。将统计信息 (**Statistic**) 更改为 **Avg
    for Duration**。你应该会看到一个类似于图 [5-22](#525217_1_En_5_Chapter.xhtml#Fig22) 的报告。


    注意持续时间随时间下降，直到达到稳定状态后趋于平稳。并非所有场景都会导致持续时间减少。关键在于 DOP 反馈应至少导致持续时间值随时间保持相似。


    使用相同的报告，但将指标 (**Metric**) 更改为 **CPU Time**，统计信息 (**Statistic**) 保持为 **Avg**。你应该会看到一个类似于图
    [5-23](#525217_1_En_5_Chapter.xhtml#Fig23) 的报告。


    ![Avg CPU for DOP feedback.](Images/525217_1_En_5_Fig23_HTML.png)


    *图 5-23 DOP 反馈的平均 CPU*


    此报告显示了 **DOP 反馈的真正威力**：在实现相似或更低的查询持续时间的同时，显著减少了所需的 CPU 资源。


    > **注意**

    > 如果你在此工作负载运行期间查看实际的查询执行计划（例如来自 **`query_post_execution_plan_profile`** 扩展事件），你会看到一个
    XML 属性 `DOPFeedbackAdjusted="Yes: Adjusting"`，最终在 DOP 反馈稳定后变为 `"Yes: Stable"`。'
