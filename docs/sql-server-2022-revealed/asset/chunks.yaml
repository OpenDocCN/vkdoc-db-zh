  trans: '

    我快速进行了一项测试，以查看属于 `MS_ServerPerformanceStateReader` 角色与仅属于公共固定角色之间的权限差异。如果你只有公共固定角色，那么在查询
    `sys.dm_exec_requests` 时，你只能看到自己的会话。但如果你是 `MS_ServerPerformanceStateReader` 角色的成员，你就能从
    `sys.dm_exec_requests` 中看到所有会话。一个需要 `MS_ServerStateReader` 或 `MS_ServerSecurityStateReader`
    角色成员资格才能访问的 DMV 示例是 `sys.dm_server_audit_status` DMV。任何仅属于 `MS_ServerPerformanceStateReader`
    角色的用户都将无权访问此 DMV。实际上，我们在这里所做的是将 `MS_ServerStateReader` 角色拆分为两个不同的角色：`MS_ServerPerformanceStateReader`
    和 `MS_ServerSecurityStateReader`。


    ## 动态数据屏蔽功能增强


    动态数据屏蔽是指在表架构中提供逻辑，以便在用户查看数据时进行屏蔽（例如，将电子邮件地址屏蔽为 xxxx@xxxx 的格式）。我们在 SQL Server 2016
    中引入了此概念，并且它非常受欢迎。在此功能出现之前，应用程序必须在代码中实现屏蔽逻辑。如果需要更改屏蔽逻辑，则必须更改并重新部署应用程序。动态数据屏蔽提供了一种在定义表列时定义屏蔽规则的方法。如果你是动态数据屏蔽的新手，请从我们的文档开始：[`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking)。


    动态数据屏蔽的一个优点是我们为常见的屏蔽场景提供了内置函数。因此，像这样的列定义：


    ```sql

    Email   varchar(100) MASKED WITH (FUNCTION = ''email()'') NOT NULL

    ```


    将导致此列中存储的任何值在用户看来都是 XXX@XXXX.com。


    你可以在以下位置查看动态数据屏蔽的完整函数列表：[`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#defining-a-dynamic-data-mask`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#defining-a-dynamic-data-mask)。


    在 SQL Server 2022 中，我们为 datetime 列类型添加了一个新函数。你可以屏蔽 datetime 值的全部或部分，例如年、月、日、时、分或秒。


    动态数据屏蔽的原始实现默认不允许“非管理员”用户查看未屏蔽的数据。但是，我们提供了一个名为 `GRANT UNMASK` 的 T-SQL 命令选项，以便授予用户查看未屏蔽数据的能力。这个原始设计的问题在于，未屏蔽权限是针对数据库中的任何屏蔽规则。


    2021 年，我们将细粒度 `UNMASK` 的概念引入 Azure，使得此权限可以应用于架构、表或列级别。你可以在以下位置查看原始公告：[`https://azure.microsoft.com/updates/general-availability-dynamic-data-masking-granular-permissions-for-azure-sql-and-azure-synapse-analytics/`](https://azure.microsoft.com/updates/general-availability-dynamic-data-masking-granular-permissions-for-azure-sql-and-azure-synapse-analytics/)。


    SQL Server 2022 只是将此实现从云端引入到了 SQL Server。你可以在以下位置查看细粒度未屏蔽的示例：[`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#granular`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#granular)。


    # 性能与可伸缩性


    我总是乐于看到任何 SQL Server 版本在性能和可伸缩性方面的创新和增强。原因之一是，这个领域的几乎所有改进都源于调优实践、真实客户案例或我们为基准测试所做的研究。SQL
    Server 2022 在整个工作负载和引擎组件的各个方面都进行了各种性能与可伸缩性投资。


    ## 列存储与批处理模式改进


    SQL Server 2022 包含增强功能，以提升列存储索引和批处理模式操作（在 SQL Server 2019 及更高版本中，批处理模式操作不再强制要求列存储）的性能。


    ### 有序聚集列存储索引


    Azure Synapse Analytics 和 SQL Server 都支持列存储索引。关于列存储索引以及它们为何对应用程序有益，可以写一整本书。我仍然认为这是
    SQL Server 中一个未被充分利用的功能。我遇到的几乎所有不了解列存储的客户，一旦理解了它们的工作原理，立即就能看出如何利用它们。如果你不了解列存储，请直接查阅文档开始学习：[`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview)。


    Azure Synapse Analytics 增加了一个选项，可以创建 *有序* 的聚集列存储索引。虽然构建有序聚集列存储索引可能需要更长时间，但对某些查询的性能提升可能非常显著。SQL
    Server 2022 现在支持有序聚集列存储索引。了解更多：[`https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci`](https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci)。


    ### 列存储字符串处理改进


    我们没有关于此的特定文档，但当我与资深 SQL 工程师 Ryan Stonecipher 聊到这个话题时，他对我说的原话是：“只需重建你的索引，我们就会为深层数据（例如
    *char 和 *binary + guid）维护最小/最大值。此外，我们现在支持在列存储上进行 LIKE 下推操作，以及一种快速的字符串相等实现。”

    '
- fmt: '#### Vector Extension to Improve Batch Mode


    In SQL Server 2016 we added code to take advantage of special processor instructions
    called `vector`-based hardware capabilities. Vector-based hardware capabilities
    allow programs to simply process data faster and in more parallel manner due to
    vector registers in the processor. If you would love to read some very deep content
    on this topic, here is a nice article: [`www.techspot.com/article/2166-mmx-sse-avx-explained`](http://www.techspot.com/article/2166-mmx-sse-avx-explained).


    SQL Server 2016 could recognize two different types of vector capabilities, namely,
    `SEE` and `AVX`, and use them to speed up columnstore operations especially when
    using batch mode. Robert Dorr outlines how we did this in this blog post: [`https://docs.microsoft.com/archive/blogs/bobsql/sql-2016-it-just-runs-faster-column-store-uses-vector-instructions-sseavx`](https://docs.microsoft.com/archive/blogs/bobsql/sql-2016-it-just-runs-faster-column-store-uses-vector-instructions-sseavx).


    The latest vector hardware technology is `AVX-512`, and SQL Server 2022 can recognize
    this new hardware capability to gain even more performance specifically for batch-mode
    operators for columnstore and rowstore. I was curious what led us to looking into
    `AVX-512` and found this interesting quote from Conor Cunningham:


    During the pandemic, I found an academic paper that explained how to use `AVX-512`
    instructions to do a fast quicksort. These instructions essentially do N operations
    at a time instead of one, meaning that it can potentially speed up performance-critical
    code substantially. I implemented the sort from the paper and started making it
    better than the paper. Eventually I wanted to start playing with implementing
    something in SQL’s code. There is logic that we have that uses the prior generation
    of vector instructions (`AVX2`) and I looked at that code and figured out how
    to write an equivalent version that used the newer, wider vectors as a side project.
    When I had it finished, we got good performance gains on our key analytics benchmark
    (`TPC-H`). The fun part is that I did not tell anyone I was doing this until one
    day I showed up and just gave this present to the team – it wasn’t a formally
    funded effort that was intended for SQL Server 2022, but we prioritized it once
    we realized what value it delivered for customers.


    At the time of the writing of this book, we were keeping this enhancement under
    a trace flag, and it is possible we will launch the product with this still requiring
    a trace flag – mostly because the use of this capability is an advanced concept
    and not for everyone. Check out the documentation at [`https://aka.ms/sqlserver2022docs`](https://aka.ms/sqlserver2022docs)
    for the latest information.


    One aspect of this work is a new `ERRORLOG` entry you may see that looks like
    this:


    ```

    CPU vectorization level(s) detected:  SSE SSE2 SSE3 SSSE3 SSE41 SSE42 AVX AVX2
    POPCNT BMI1 BMI2

    ```


    These monikers are various vector CPU capabilities we have detected in the processor.
    `AVX-512` would appear if you are using a chipset that supports this new vector
    model.


    #### Columnstore Segment Elimination Enhancements


    Columnstore index columns are organized into segments. Columnstore includes a
    concept called segment elimination so that segments can be eliminated or not ready
    depending on the query. Prior to SQL Server 2022, only columns with data types
    of numeric, date, and time and `datetimeoffset` with scale less than or equal
    to two were candidates for segment elimination. Now in SQL Server 2022, we have
    extended segment elimination to new data types including string, binary, and `guid`
    data types and the `datetimeoffset` data type for scale greater than two.


    ### Scalability Improvements


    There are several improvements to help scalability of your queries, workload,
    and use of SQL Server. The last thing you want is to invest in revised application
    design, new servers, or infrastructure only to have SQL Server prevent you from
    scaling. All the work in this area is a direct result of customer cases or benchmark
    and testing we do internally or with our partners.


    #### Buffer Pool Parallel Scan


    If you look at my site for all my talks (I’m an open source presenter), [`https://aka.ms/bobwardms`](https://aka.ms/bobwardms),
    you will find a folder called `SQL PASS 2013`. At the `PASS Community Summit`
    in 2013, I gave a half-day talk on memory. If you look at this deck, you will
    see that I have some internals on the buffer pool of SQL Server. As part of these
    slides, I talk about a `BUF` hash table and `BUF` structure. `BUF` structures
    point to pages, and a `BUF` hash table is a way to organize all the `BUF` structures
    to easily find a page. Therefore, finding a specific page is not all that hard
    using a lookup of the `BUF` hash table.


    Unfortunately, some operations in SQL Server must scan all the `BUF` structures.
    Think of this like scanning a clustered index vs. using an index seek. And like
    a clustered index scan, if you only need a few rows, it still may take a very
    long time to get the results if the clustered index is large.


    The same problem can occur for certain operations with the buffer pool, and we
    would see this type of scenario with customers. They would have a server with,
    say, 1TB of RAM and allow the buffer pool to consume most of this memory. Then
    they would go perform some maintenance operation, and even against a very small
    database, it would take an unusually long time. This is because we would scan
    the entire ~1TB of `BUF` structures to finish the operation. We even added `ERRORLOG`
    messages to warn the user this condition was happening. See the article [`https://docs.microsoft.com/troubleshoot/sql/performance/buffer-pool-scan-runs-slowly-large-memory-machines`](https://docs.microsoft.com/troubleshoot/sql/performance/buffer-pool-scan-runs-slowly-large-memory-machines)
    for more information. This is a classic problem of an architecture that for years
    didn’t cause problems, but as hardware technology became vastly bigger, this design
    needed to be updated.


    We took a look at this problem and said something to the effect, “If queries can
    run in parallel to obtain a faster result, why can’t we do this when scanning
    the buffer pool?” (This is not an exact quote; it’s my paraphrasing when I read
    the design documents for this.)


    The result of this work is buffer pool parallel scan, which is enabled by default
    in SQL Server 2022 for systems with large amounts of memory. My colleague David
    Pless at Microsoft worked on this feature and explains how it works at [`https://cloudblogs.microsoft.com/sqlserver/2022/07/07/improve-scalability-with-buffer-pool-parallel-scan-in-sql-server-2022`](https://cloudblogs.microsoft.com/sqlserver/2022/07/07/improve-scalability-with-buffer-pool-parallel-scan-in-sql-server-2022).


    David shows some great numbers we’ve seen for improvements in SQL Server 2022.
    In addition, check out his Data Exposed episode where he shows even more details
    with a nifty demonstration at [`https://youtu.be/4GvU106Xiag`](https://youtu.be/4GvU106Xiag).
    I have included an example of the results David found in a T-SQL notebook you
    can view with Azure Data Studio in the example `ch06_meatandpotatoes\scalability\Buffer_pool_parallel_scan_BPP_notebook_quick.ipynb`.'
