    Azure 区域组织为*地理区域*。您可以查看部署 Azure 虚拟机的众多区域选择：[`https://azure.microsoft.com/global-infrastructure/geographies`](https://azure.microsoft.com/global-infrastructure/geographies)。Azure
    区域的选择基于多种因素，主要围绕您的应用程序将连接到 Azure 虚拟机中 SQL Server 的位置。我认为从一开始就选择合适的区域很重要，但也有方法可以将虚拟机移动到其他区域，详情请阅读：[`https://docs.microsoft.com/azure/resource-mover/tutorial-move-region-virtual-machines`](https://docs.microsoft.com/azure/resource-mover/tutorial-move-region-virtual-machines)。Azure
    虚拟机被视为*核心服务*，因此每当建立新区域时，Azure 虚拟机都将可用。然而，并非所有虚拟机规格在所有区域都可用。


    ### 管理员账户与密码

    *   决定使用一个**管理员账户**和密码。您需要为 Windows 或 Linux 提供一个管理员账户。我遇到过客户因为公司管理员账户标准而完全受阻的情况。如果您使用
    SQL Server 市场映像，我们会自动将此管理员账户添加为`sysadmin`角色的成员。


    ### 部署方式与许可证

    *   **如何部署？**


    在 Azure 虚拟机上部署 SQL Server 有几种方式。我将在本章后面展示使用 Azure 门户逐步部署的过程，但您也可以使用脚本和一种称为**ARM
    模板**的概念进行部署。


    您还需要决定是否使用**SQL Server 市场映像**，它预装了操作系统和 SQL Server。我们有多种操作系统和 SQL Server 组合可供选择。这种方法的优点包括自动安装**SQL
    Server IaaS 扩展**，您将在本章后面的“**SQL Server IaaS 代理扩展**”一节中了解更多。


    **注意** SQL Server 的市场映像可能包含所有服务，包括 SQL Server Reporting Services (SSRS)和 SQL Server
    Analysis Services (SSAS)，或者您也可以仅选择数据库引擎。也有单独的 SSRS 或 SSAS 市场映像。


    有些情况下您希望自己安装 SQL Server。我有时会在安装特定版本的 SQL Server 时这样做。因此，我将使用 Azure 市场仅安装操作系统。然后，我将
    SQL 安装包复制到虚拟机中并安装 SQL Server。使用 SQL Server 市场映像的一个好处是，我们会将安装保留在虚拟机内，因此您可以为命名实例场景卸载和重新安装。


    无论使用哪种方法，您都必须决定**许可证**。您是否有现有的 SQL Server、Windows 和/或 Linux 许可证，还是将选择按需付费方法？使用现有的
    SQL Server 和 Windows 许可证称为**Azure Hybrid Benefit (AHUB)**。您可以阅读更多关于 AHUB 的信息：[`https://azure.microsoft.com/pricing/hybrid-benefit`](https://azure.microsoft.com/pricing/hybrid-benefit)。还有另一个用于**DR**的许可证选项，您可以仅为灾难恢复部署
    Azure 虚拟机，并免费获得 SQL Server 许可证。您可以在此处了解更多信息：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/business-continuity-high-availability-disaster-recovery-hadr-overview#free-dr-replica-in-azure`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/business-continuity-high-availability-disaster-recovery-hadr-overview#free-dr-replica-in-azure)。


    您还可以通过使用称为**预留实例**的概念来节省成本，您可以在此处阅读：[`https://azure.microsoft.com/pricing/reserved-vm-instances`](https://azure.microsoft.com/pricing/reserved-vm-instances)。即使您选择使用现有的
    Windows 和 SQL Server 软件许可证，您仍会产生计算和存储成本。


    ### 高可用性选项

    *   您需要**故障转移集群实例 (FCI)** 还是**Always On 可用性组？**


    如果您计划将 SQL Server 作为故障转移集群实例 (FCI) 或 Always On 可用性组的一部分部署，那么您需要做出一些选择，包括可用性、存储和网络。有关更多详细信息，请参阅本章后面的“**高可用性**”部分。


    还有其他部署选择要做，但我将在本章后面标题为“**在 Azure 虚拟机上部署 SQL Server**”的练习中向您展示这些，该练习展示了如何通过 Azure
    门户使用 SQL Server 市场映像进行部署。


    ## SQL Server IaaS 代理扩展


    您已经了解了 Azure Arc 代理和扩展的概念，例如 Azure SQL Server 扩展。Azure 虚拟机通过虚拟机扩展具有相同的概念。您可以在此处阅读更多关于扩展概念的信息：[`https://docs.microsoft.com/azure/virtual-machines/extensions/overview`](https://docs.microsoft.com/azure/virtual-machines/extensions/overview)。扩展架构也适用于
    Linux，您可以在此处阅读：[`https://docs.microsoft.com/azure/virtual-machines/extensions/features-linux`](https://docs.microsoft.com/azure/virtual-machines/extensions/features-linux)。


    ### 什么是 SQL Server IaaS 代理扩展？


    对于 SQL Server，我们为 Azure 虚拟机构建了一个扩展，称为**SQL Server IaaS 代理扩展**。此扩展在虚拟机内部安装一组服务，为您提供管理虚拟机和
    SQL Server 的真正价值，包括


    *   Azure 门户管理

    *   自动 SQL 数据库备份

    *   自动安全更新

    *   许可证和版本管理，包括 AHUB

    *   SQL 配置管理，如`tempdb`

    *   SQL 最佳实践评估

    *   Microsoft Defender for Cloud


    **注意** 在撰写本书时，SQL Server IaaS 代理扩展不支持 Azure Active Directory (AAD)身份验证和 Microsoft
    Purview 访问策略与 SQL Server 2022。我们的团队计划在未来添加这些功能。


    使用 SQL Server IaaS 代理扩展没有相关成本。


    ### IaaS 代理扩展模式


    该扩展有两种不同的模式和安装方法。


    #### 完全模式


    这是使用 SQL 市场映像时的默认模式，并启用所有功能。'
- fmt: '### Lightweight


    轻量模式不安装代理软件，但提供有限的门户体验，包括许可和版本管理。例如，您可以使用此方法来利用Azure混合权益。您可以随时升级到完整模式，因为对于轻量模式，我们会将代理二进制文件复制到虚拟机中但不安装它们。


    ### 安装代理扩展


    当您使用Azure市场映像部署SQL Server时，我们会自动以完整模式安装代理扩展。您也可以在部署后以任何模式安装代理扩展。我们将扩展的安装称为*注册*。您可以在Windows上阅读有关如何注册扩展的更多信息：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm)，或在Linux上阅读：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-iaas-agent-extension-register-vm-linux`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-iaas-agent-extension-register-vm-linux)。


    注册扩展不需要重启虚拟机。您可以选择对虚拟机进行批量注册，以及修复和注销扩展。


    ### 代理扩展的详细信息


    如果您选择了完整模式，您将在Windows虚拟机中看到名为`Microsoft Monitoring Agent`和`Microsoft SQL Server
    IaaS Agent`的程序。这些程序使用多个不同的Windows服务（或在Linux上的守护程序）。


    例如，如果您使用扩展事件来跟踪进入SQL Server的活动，您将看到一个名为`Microsoft SQL Server IaaS Agent Query
    Service`的应用程序。


    要查看更多关于SQL Server在Linux上差异的详细信息，请阅读此文档页面：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux)。


    根据我的经验，代理扩展不会消耗大量资源。如果您觉得它导致了任何问题，您始终可以选择注销该扩展。


    关于扩展还有其他几个重要点：


    *   我们仅对故障转移集群实例（FCI）支持轻量模式，但对Always On可用性组支持完整模式。

    *   我们不支持在SQL Server Windows虚拟机上为多个实例安装扩展。我们最多只支持一个实例。如果您需要支持的实例是命名实例，默认注册使用轻量模式，但您可以升级到完整模式。

    *   目前，我们不支持为在Azure虚拟机中运行的SQL Server Linux容器注册扩展。


    我询问了Azure虚拟机上SQL Server的高级项目经理Aditya Badramraju关于SQL Server IaaS代理扩展的重要性。他告诉我：*“在Azure
    IaaS上运行SQL Server与其他云不同，因为我们提供IaaS++产品，例如自动备份、SQL VM最佳实践评估等，默认情况下，当客户选择在Azure
    VM/IaaS上运行SQL Server时提供。这些产品通过SQL IaaS代理扩展成为可能。该扩展有助于将SQL Server和Azure基础设施的优势结合在一起，使客户能够自信地运行其关键任务工作负载。”*


    ## 在Azure虚拟机上部署SQL Server


    利用您关于规划部署的知识，让我们通过Azure门户和市场映像进行一个练习，了解如何在Azure虚拟机上部署SQL Server。此练习旨在展示如何在Azure虚拟机上部署运行Windows
    Server的SQL Server `standalone`实例。您可以在Azure虚拟机上阅读更多关于在Linux上部署SQL Server的信息：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-vm-create-portal-quickstart`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-vm-create-portal-quickstart)。您可以在本章后面的标题为“`High
    Availability`”的部分中阅读更多关于部署故障转移集群实例（FCI）或Always On可用性组的内容。


    此练习基于文档中的快速入门指南：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-vm-create-portal-quickstart`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-vm-create-portal-quickstart)。


    ### 先决条件


    ```

    *   您已阅读本章中名为“`Planning for Deployment`”的部分。

    *   您需要一个具有创建Azure虚拟机权限的Azure订阅（通常`Contributor`角色的成员即可）。验证您是否也有在订阅配额内创建Azure虚拟机的权限，并且您要使用的区域在您的订阅中受支持。

    ```'
  raw: '#### Lightweight


    Lightweight mode does not install the agent software but does give you a limited
    portal experience including licensing and edition management. For example, you
    can use this method to use Azure Hybrid Benefit. You can upgrade to full mode
    at any time because for lightweight mode, we copy the agent binaries into the
    virtual machine but do not install them.


    ### Installing the Agent Extension


    When you deploy SQL Server using Azure marketplace images, we automatically install
    the Agent Extension in full mode. You also can install the Agent Extension in
    any mode after you deploy. We call the installation of the extension *registration*.
    You can read more about how to register the extension on Windows at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-agent-extension-manually-register-single-vm)
    or Linux at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-iaas-agent-extension-register-vm-linux`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-iaas-agent-extension-register-vm-linux).


    Registering the extension does not require a restart of the virtual machine. You
    have options to do a bulk registration of virtual machines and repair and unregister
    the extension.


    ### Details of the Agent Extension


    If you have chosen full mode, you will see programs installed in your Windows
    virtual machine called the Microsoft Monitoring Agent and the Microsoft SQL Server
    IaaS Agent. These programs use several different Windows services (or daemon programs
    on Linux).


    For example, if you use Extended Events to trace activity coming into your SQL
    Server, you will see an application called Microsoft SQL Server IaaS Agent Query
    Service.


    To see more details on the differences for SQL Server on Linux, read this documentation
    page: [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-server-iaas-agent-extension-linux).


    In my experience the Agent Extension does not consume a lot of resources. You
    always have the option to unregister the extension if you feel it is causing any
    problems.


    There are a few other important points about the extension:


    *   We only support lightweight mode for a Failover Cluster Instance (FCI), but
    full mode is supported for Always On Availability Groups.


    *   We don’t support the extension for multiple instances on a SQL Server Windows
    virtual machine. We only support at maximum one instance. If the instance you
    need supported is a named instance, the default registration uses lightweight
    mode, but you can upgrade to full mode.


    *   Today we don’t support registering the extension for SQL Server Linux containers
    running in an Azure Virtual Machine.


    I asked Aditya Badramraju, Senior Program Manager for SQL Server on Azure Virtual
    Machines, about the importance of the SQL Server IaaS Agent Extension. He told
    me, *“Running SQL Server on Azure IaaS is different to other clouds as we provide
    IaaS++ offerin*gs such as Automated Backup, SQL VM Best Practices assessment etc.
    by default, when customers choose to run SQL Server on Azure VMs/IaaS. These offerings
    are made possible by SQL IaaS Agent extension. This extension helps bringing greatness
    of both SQL Server and Azure infrastructure together such that customers can confidently
    run their mission critical workloads.”


    ## Deploying SQL Server on an Azure Virtual Machine


    Using your knowledge about planning for a deployment, let’s go through an exercise
    with the Azure portal and a marketplace image to see how to deploy SQL Server
    on an Azure Virtual Machine. This exercise is designed to show you how to deploy
    a *standalone* instance of SQL Server running Windows Server on an Azure Virtual
    Machine. You can read more about deploying SQL Server on Linux on an Azure Virtual
    Machine at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-vm-create-portal-quickstart`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/sql-vm-create-portal-quickstart).
    You can read more about deploying a Failover Cluster Instance (FCI) or Always
    On Availability Group in the section titled “**High Availability**” later in this
    chapter.


    This exercise is based on a quick-start guide in the documentation at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-vm-create-portal-quickstart`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-vm-create-portal-quickstart).


    ### Prerequisites


    *   You have reviewed the section in this chapter called “**Planning for Deployment**.”


    *   You will need an Azure subscription with permissions to create an Azure Virtual
    Machine (typically a member of the Contributor role will do). Verify you also
    have permissions to create an Azure virtual machine within your subscription quota
    and the region you want to use is supported within your subscription.'
