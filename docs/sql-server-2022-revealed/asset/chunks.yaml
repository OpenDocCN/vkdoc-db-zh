- fmt: "A screenshot of a table with 2 columns for memory grant and 611 M B. Memory\
    \ grant info is selected in memory grant. 2 arrows point to 6 2 5 5 2 8 and yes\
    \ adjusting in 611 M B.\n\nFigure 4-8\n\nMemory grant feedback adjusted\n\n`IsMemoryGrantFeedbackAdjusted\
    \ = YesAdjusting` means that feedback has been applied from the previous execution\
    \ to adjust the memory grant. No tempdb spill results in a significantly faster\
    \ execution time.\n\n1.  Execute the script `get_plan_feedback.sql` again. You\
    \ will see in the results the value for `last_query_memory_kb` will reflect the\
    \ new, larger memory grant.\n\n2.  At this point, the behavior of this scenario\
    \ is exactly like SQL Server 2019, except previously the memory grant feedback\
    \ was only stored in the cached query plan. Now you can see that the feedback\
    \ is persisted in Query Store. Execute the script `clear_proc_cache.sql` to clear\
    \ the plan cache. This script uses the following T-SQL statements:\n\n    ```sql\n\
    \    USE [WideWorldImportersDW];\n    GO\n    ALTER DATABASE SCOPED CONFIGURATION\
    \ CLEAR PROCEDURE_CACHE;\n    GO\n    ```\n\n3.  Execute the script `execute_query.sql`\
    \ again. You will see the query finishes in a few seconds and uses the same memory\
    \ grant as stored in the feedback_data column in Query Store.\n\nYou can disable\
    \ memory grant feedback persistence by using the following database-scoped configuration\
    \ option:\n\n```sql\nALTER DATABASE SCOPED CONFIGURATION SET MEMORY_GRANT_FEEDBACK_PERSISTENCE\
    \ = OFF\n```\n\nYou can also disable memory grant feedback persistence at the\
    \ query hint level using the option `DISABLE_MEMORY_GRANT_FEEDBACK_PERSISTENCE`.\n\
    \nNow memory grant feedback will support a wider variety of workloads using percentiles\
    \ and persist feedback to Query Store to survive server restarts and plan cache\
    \ eviction.\n\nKeep track of all the latest information about memory grant enhancements\
    \ for SQL Server 2022 at [`https://docs.microsoft.com/sql/relational-databases/performance/intelligent-query-processing-details?#percentile-and-persistence-mode-memory-grant-feedback`](https://docs.microsoft.com/sql/relational-databases/performance/intelligent-query-processing-details?#percentile-and-persistence-mode-memory-grant-feedback).\n\
    \n## The Intelligent Query Processor\n\nIn this chapter you explored what built-in\
    \ query intelligence means. Simply put, it’s faster queries with no code changes.\
    \ It leverages enhancements to Query Store, with the built-in store for query\
    \ performance statistics now on by default for new databases and enhancements\
    \ for hints and read replicas. It is about nextgen IQP capabilities to get you\
    \ better performance using approximate percentile, optimized plan forcing, and\
    \ enhancements to memory grant feedback. You can get all of these improvements\
    \ even without using the new dbcompat level 160 for SQL Server 2022.\n\nI asked\
    \ Kate Smith, Senior Program Manager over the IQP space, about her thoughts on\
    \ the significance of built-in query intelligence in SQL Server 2022:\n\n> In\
    \ my opinion, query processing is the beating heart at the center of SQL Server’s\
    \ capabilities. All queries leverage it, and all benefit from our efforts there.\
    \ The latest work in Intelligent Query Processing continues this trend – by allowing\
    \ the optimizer to self-tune to a customer’s specific needs, we expand the scope\
    \ of what is possible from requiring manual intervention and move towards a self-regulating\
    \ system. The features released in SQL 22 expand the capabilities in many ways\
    \ – addressing previous challenges in memory grant feedback, introducing the ability\
    \ for the optimizer to use different CE models with cardinality estimation feedback,\
    \ creating parameter sensitive plans, and even adjusting the degree of parallelism\
    \ for a query without user input. What’s more, these features can all work together,\
    \ seamlessly. So while before SQL 22 a problematic query might have required multiple\
    \ iterations of manual tuning, that same query can now be adjusted, on the fly,\
    \ across many dimensions, without any user action. These adjustments can be persisted\
    \ across restarts and can apply across different replicas. Taken together, the\
    \ latest IQP features will greatly reduce headaches for SQL Server DBAs everywhere.\
    \ I’m thrilled to see these features land, and I’m excited for users to start\
    \ seeing their benefit. Be warned though: we are not done! This team is always\
    \ looking to the future, and what more we can deliver. So, stay tuned.\n\nIf you\
    \ are ready for more, the story gets better in the next chapter. If you are ready\
    \ to move to dbcompat 160, read on to the next chapter about how built-in query\
    \ intelligence evolves even further with solutions to three age-old problems:\
    \ Parameter-Sensitive Plans, cardinality estimation model issues, and degree of\
    \ parallelism.\n\n# 5. Built-In Query Intelligence Gets Even Better\n\nIn Chapter\
    \ [4](#525217_1_En_4_Chapter.xhtml) you learned the history behind built-in query\
    \ intelligence and its promise: getting you faster performance with no code changes.\
    \ You learned about new SQL Server 2022 capabilities like the new Query Store,\
    \ memory grant feedback persistence, and others. None of these require a change\
    \ to the new dbcompat level 160 for SQL Server 2022.\n\nWhat if you want all of\
    \ what you read in Chapter [4](#525217_1_En_4_Chapter.xhtml) and more? If you\
    \ change your dbcompat level to 160, you will definitely get more. This includes\
    \ the following:\n\n*   Parameter-Sensitive Plan (PSP) optimization\n\n*   Cardinality\
    \ estimation (CE) model feedback\n\n*   Degree of parallelism (DOP) feedback\n\
    \nIn this chapter you will learn about each of these, including what problem we\
    \ are trying to solve, how they work, and examples on how to use them. The story\
    \ begins by trying to save the world from parameter sniffing.\n\n## Parameter-Sensitive\
    \ Plan (PSP) Optimization\n\nI believe the query processor in SQL Server is one\
    \ of the most robust and best parts of the engine. Our investments in IQP show\
    \ that we are committed to adapting to all types of workloads, gaining performance\
    \ with no code changes. But for years there’s been a particular type of scenario\
    \ that has been a painful problem for our users."
