    \              (No column name)\n    5 Minute Buckets        2022-05-14 13:35:00.000\n\
    \    Quarter Hour            2022-05-14 13:30:00.000\n    ```\n    因此，对于传入的日期时间，5\
    \ 分钟间隔是 `13:35`，但一刻钟则回到了 `13:30`。\n\n你可以在 [`https://docs.microsoft.com/sql/t-sql/functions/date-bucket-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/date-bucket-transact-sql)\
    \ 了解更多关于 `DATE_BUCKET` 的信息。`DATE_BUCKET` 不需要特定的数据库兼容性级别。\n\n### GENERATE_SERIES\n\
