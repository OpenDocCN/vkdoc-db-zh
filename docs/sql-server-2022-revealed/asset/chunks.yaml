    \ IGNORE NULLS OVER (\n    ORDER BY timestamp DESC ROWS BETWEEN UNBOUNDED PRECEDING\
    \ AND CURRENT ROW\n    ) AS [LAST_VALUE]\n    FROM MachineTelemetry\n    ORDER\
    \ BY [timestamp];\n    GO\n    ```\n\nWhen you look at the results, you can see\
    \ how FIRST_VALUE and LAST_VALUE could be used to fill in gaps that are NULL depending\
    \ on your needs.\n\nYou can see I used the IGNORE NULLS clause. The syntax is\
    \ a bit hard to understand, so let’s look at the example for FIRST_VALUE:\n\n\
    ```\n    FIRST_VALUE (VoltageReading) IGNORE NULLS OVER (\n    ORDER BY timestamp\
    \ ASC ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING\n    ) AS [FIRST_VALUE]\n\
    \    ```\n\nWhat this means is that the value for a given row will be the first\
