    from S3 object endpoints.'
  trans: '

    # 7. 数据虚拟化与对象存储


    早在 SQL Server 7.0 中，我们就提供了一种查询 SQL Server `外部` 数据的方法，即使数据源并非 SQL Server 本身。我们将此功能称为链接服务器。我们使用
    OLE-DB 作为机制，允许查询处理器将查询推送到另一个数据源，并将结果取回 SQL Server。当时甚至已有 OLE-DB 驱动程序可用于查询“文件”数据，例如
    Excel 电子表格文件。在某种程度上，链接服务器查询的概念就是 `数据虚拟化`。数据虚拟化意味着“在数据所在之处”访问数据，而非将数据复制到 SQL Server
    中。链接服务器查询被内置于常规 SQL 语句（如 `SELECT`）中，也可通过一个名为 `OPENROWSET()` 的新 T-SQL 函数来使用。在本章后续内容中，你会看到
    `OPENROWSET()` 至今仍被广泛使用且功能完备。


    在 SQL Server 2016 中，我们引入了一个概念，该概念最初在 Parallel Data Warehouse 中实现，称为 `PolyBase`。PolyBase
    由 David Dewitt 和微软研究团队带入 Parallel Data Warehouse。其核心理念是使用 T-SQL 语言直接从数据库引擎针对 Hadoop
    文件系统执行查询。在 SQL Server 2016 中，我们实现了与 Hadoop 配合的 PolyBase 概念，称之为 PolyBase 服务。PolyBase
    服务包括独立的 Windows 服务，这些服务与 SQL Server 引擎集成。PolyBase 服务会接收来自引擎的 T-SQL 请求，并将其使用 Java
    转化为 Hadoop MapReduce 作业。用户通过 T-SQL 语句（如 `CREATE EXTERNAL TABLE` 和 `OPENROWSET()`）访问
    Hadoop 系统中的文件。此功能在 SQL Server 2019 中已被移除。


    在 SQL Server 2019 中，我们通过增加对 ODBC 数据源的支持，扩展了 `数据虚拟化` 和 `PolyBase` 的概念，允许通过外部表和
    `OPENROWSET()` 访问数据。我们甚至内置了预置的 `连接器`，其中包含如 Oracle、MongoDB、Teradata 和 SQL Server
    的驱动程序，以及 `通用` ODBC 驱动程序（即任何 ODBC 驱动程序）。SQL Server 真正成为了一个 `数据枢纽`。你可以利用 T-SQL 的强大功能查询几乎任何数据源，而无需使用
    ETL 或复制数据。此功能在 SQL Server 2022 中得以延续。


    这两项能力都具有变革性。我们意识到客户的数据并非总在 SQL Server 中，而且他们不希望构建昂贵且往往数据滞后的 ETL 应用来复制数据。然而，使用引擎外部服务的
    `PolyBase` 设计有其缺点。我们开始寻求另一种方法，以不同的方式继续实现 `数据虚拟化` 的愿景。同时，我们也认识到行业中的一个数据存储趋势：提供基于简单存储服务（`S3`）协议的公司越来越多，对象存储正在扩张。


    ## SQL Server 2022 中的数据虚拟化


    早在项目 Dallas 的初期，我曾与 James Rowland-Jones（我们都称他为 JRJ）开会讨论他的工作。他提到了 `项目 Gravity`。项目
    Gravity 实质上就是 JRJ 所称的 `PolyBase v3`。版本 1 是我们最初使用 Java 支持 Hadoop。版本 2 是在 SQL Server
    2019 中加入了 ODBC 驱动程序。JRJ 告诉我，`项目 Gravity`（版本 3）将使用 REST API 来访问数据。该项目的主要目标之一是使用
    `S3` 协议的对象存储提供商。


    ### REST、Azure 存储与 S3


    具象状态传输（`REST`）是一种供软件组件通信的接口，通常通过远程或互联网连接进行。`REST` 已存在很长时间，它使用典型的 HTTP 方法在软件组件之间发送和接收数据。我认为维基百科对
    `REST` 有很好的描述，网址是 [`https://en.wikipedia.org/wiki/Representational_state_transfer`](https://en.wikipedia.org/wiki/Representational_state_transfer)，同时
    Azure 文档中也有一份很好的总结，网址是 [`https://docs.microsoft.com/rest/api/azure/devops/?view=azure-devops-rest-7.1`](https://docs.microsoft.com/rest/api/azure/devops/?view=azure-devops-rest-7.1)。在
    Azure 文档中，我特别喜欢这个对 `REST` 的描述：“具象状态传输 (REST) API 是支持一组 HTTP 操作（方法）的服务端点，这些操作提供对服务资源的创建、检索、更新或删除访问。”


    `REST` 有许多优点。它轻量级且统一，使用 HTTP(S)，并且具有可移植性。它几乎可以在所有操作系统、平台和云环境中工作。虽然我并不总是觉得它直观，但一旦你习惯了
    HTTP `动词` 的用法，就会变得更加自然。


    `REST` 的一个好处是，像 Azure 存储（包括 Azure Data Lake）和 Amazon 简单存储服务（`S3`）这样的系统，可以通过一组已知的
    `REST` 命令访问。无需 ODBC 驱动程序，任何能向这些提供商提交 HTTP(S) 请求的客户端都可以发送和接收数据。


    鉴于我们已经知道如何在引擎内部发送 HTTP(S) 请求（这就是我们备份到 URL 的方式），我们决定在引擎内部使用 `REST` 来实现下一组 `PolyBase`
    创新，而不是通过 PolyBase 服务。


    我承认，虽然 Azure Blob 存储和 Azure Data Lake 存储支持 `REST`，但推动我们使用 `REST` 进行创新的一大动力是 `S3`。亚马逊的简单存储服务（`S3`）最早可追溯到
    2006 年（[`https://en.wikipedia.org/wiki/Amazon_S3`](https://en.wikipedia.org/wiki/Amazon_S3)）。亚马逊所做的一件事就是“开放”了访问
    `S3` `对象存储` 的协议。`S3` 被称为对象存储，因为对象是文件以及描述这些文件的元数据。对象被收集在 `存储桶` 或文件容器中。关于对象存储、文件和存储桶如何运作的核心概念可以在
    [`https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html#CoreConcepts`](https://docs.aws.amazon.com/AmazonS3/latest/userguide/Welcome.html#CoreConcepts)
    找到。亚马逊 `S3` 对象存储使用一组特定的 `REST` API 进行访问，相关文档见 [`https://docs.aws.amazon.com/AmazonS3/latest/userguide/RESTAPI.html`](https://docs.aws.amazon.com/AmazonS3/latest/userguide/RESTAPI.html)。自从亚马逊推出
    `S3` 以来，已有数家公司相继提供 `S3 兼容的对象存储服务`。只要你遵循 `S3` `REST` API 协议，就可以设置一个对象存储端点并允许客户端使用它。我们看到提供
    `S3` 对象存储的供应商激增。因此，我们决定通过实现从 `S3` 对象端点查询文件的功能，为我们的 `PolyBase` `REST` API 故事再添一笔。

    '
- fmt: '### Project Gravity Becomes Polybase v3


    With this context in mind, SQL Server 2022 changes the Polybase model entirely.
    The SQL engine now includes the ability to leverage external data source `connectors`
    for the following storage providers:


    *   Azure Blob Storage (`abs`)

    *   Azure Data Lake Storage Gen2 (`adls`)

    *   S3 compatible object storage (`s3`)


    Note


    Azure SQL Managed Instance also supports `abs` and `adls`.


    The monikers for each of these connectors are used as part of the syntax for `LOCATION`
    when creating an external data source. ODBC driver–based connectors use monikers
    like `oracle`, `teradata`, `mongodb`, `sqlserver`, and `odbc`.


    ODBC driver–based connectors run in the context of Polybase services. REST API
    connectors run inside the SQL Server engine.


    Note


    Even though REST API connectors run inside the engine and don’t technically require
    Polybase services, in SQL Server 2022, you still must enable the Polybase feature,
    which installs these services.


    Hugo Queiroz, Senior Program Manager at Microsoft over Polybase, helped me build
    the following visual to show the connector architecture as seen in Figure [7-1](#525217_1_En_7_Chapter.xhtml#Fig1).


    ![](Images/525217_1_En_7_Fig1_HTML.png)


    A schematic of the S Q L engine. It is connected with an open row set, external
    table, polybase services, parquet, delta, c s v, and text through rest A P I and
    a b s, a d l s and s 3.


    Figure 7-1


    Data virtualization in SQL Server 2022


    In this figure, T-SQL operations like `OPENROWSET` and `CREATE EXTERNAL TABLE`
    are used to access external data sources from connectors. On the left-hand side
    of this figure, ODBC connectors are accessed by the engine connecting with Polybase
    services (which are actual Windows services). On the right-hand side of the figure,
    the SQL Server engine communicates with `abs`, `adls`, and `s3` connectors through
    REST APIs to access files that are `text`/`csv` (you provide the format) or `parquet`/`delta`
    (the format is baked into the file). I’ll describe more about the types of file
    formats like `parquet` and `delta` in the next section of this chapter.


    You might be wondering what is the difference between using `abs` and `adls`.
    Azure Blob Storage (`abs`) is a general-purpose storage system where Azure Data
    Lake Storage (`adls`) is specifically built for data analytic workloads. You can
    read further a detailed comparison at [`https://docs.microsoft.com/azure/data-lake-store/data-lake-store-comparison-with-blob-storage`](https://docs.microsoft.com/azure/data-lake-store/data-lake-store-comparison-with-blob-storage).
    Both Azure Blob Storage and Azure Data Lake Storage are considered object storage
    systems like `s3`.


    I’ve already mentioned the T-SQL statements `OPENROWSET` and `CREATE EXTERNAL
    TABLE`. `CETAS` stands for `CREATE EXTERNAL TABLE AS SELECT`. The concept comes
    from Polybase via Azure Synapse and allows you to create an external table as
    the result of a `SELECT` statement in SQL Server. While `OPENROWSET` and `EXTERNAL
    TABLE` are “read” operations, `CETAS` allows you to “export” data from SQL Server
    into files and record the metadata of an external table.


    ### Polybase v3 File Formats


    You probably know what a `CSV` (comma-delimited) or `text` (any format you want)
    file format is, but you may not be familiar with `parquet` or `delta`. Let’s review
    these file formats and discuss why they have become popular to use.


    #### Parquet


    `Parquet` files are a formatted file founded by an Apache project that was started
    in 2013\. The Apache project website at [`https://parquet.apache.org`](https://parquet.apache.org)
    has a simple definition: *“*Apache Parquet is an open source, column-oriented
    data file format designed for efficient data storage and retrieval.” Column-oriented
    makes `parquet` an efficient format for analytic workloads, like columnstore indexes
    in SQL Server. `Parquet` is a binary formatted file as opposed to `CSV` or `text`.
    It contains metadata inside the file about the columns and data types. Even though
    `parquet` uses a binary format, there is documentation on the details, so developers
    know how to read and write the format. You can read the format details at [`https://parquet.apache.org/docs/file-format/`](https://parquet.apache.org/docs/file-format/).


    `Parquet` has become one of the most popular file formats to use for analytics
    from ground to cloud. Its popularity is one of the reasons we chose to support
    `parquet` as a native format for data virtualization in SQL Server 2022\. SQL
    Server 2022 natively supports reading `parquet` files and writing out SQL data
    as formatted `parquet` files.


    #### Delta


    `Parquet` files are static files to read and write as an entire file unit. An
    open source project was created by several companies called `Delta Lake` to support
    a *lakehouse* of data based on `delta tables`. `Delta tables` are effectively
    a collection of `parquet` formatted files with *transaction log type* capabilities
    through JSON files. I found this interesting article by Databricks on the internals
    of the “transaction log” for `delta` at [`https://databricks.com/blog/2019/08/21/diving-into-delta-lake-unpacking-the-transaction-log.html`](https://databricks.com/blog/2019/08/21/diving-into-delta-lake-unpacking-the-transaction-log.html).


    You can read about the `Delta Lake` project and all resources at [`https://delta.io`](https://delta.io).
    Since `Delta Lake` is a complete open source project (the GitHub project is at
    [`https://github.com/delta-io/delta`](https://github.com/delta-io/delta)), you
    can read all the details of how `delta tables` are formatted, but most users create
    and use `delta tables` through interfaces such as Spark. For example, you can
    see at [`https://docs.delta.io/latest/delta-batch.html#-ddlcreatetable`](https://docs.delta.io/latest/delta-batch.html#-ddlcreatetable)
    how to use T-SQL with Spark to create a new `delta table`.


    SQL Server 2022 supports natively reading `delta tables`, but you cannot export
    data in SQL Server to `delta tables`. You can export SQL data to `parquet` files.
    Spark offers functionality to convert `parquet` to `delta` should you need to
    do that.


    Using `parquet` files offers no capabilities to use predicate pushdown or push
    your “filter” to a file to get only the data you need. `Delta tables` do offer
    this type of capability through a concept called a *partition column*. You will
    see in this chapter examples of how to use both `parquet` and `delta` with SQL
    Server 2022.


    ### Using the New Polybase v3


    To use Polybase v3 or REST API–based data virtualization, you will use a series
    of T-SQL statements to create objects as seen in Figure [7-2](#525217_1_En_7_Chapter.xhtml#Fig2).


    ![](Images/525217_1_En_7_Fig2_HTML.png)


    A schematic of the S Q L engine. It has a flow diagram of the database which is
    connected with parquet, delta, c s v, and text through a b s, a d l s, and s 3.


    Figure 7-2


    Using REST API data virtualization in SQL Server 2022


    Let’s go through this figure to see how to use REST API data virtualization in
    SQL Server 2022\. You will see an example of each of these steps in the section
    titled “**Try Out Polybase v3**.”


    #### Install and Configure Polybase


    Even though REST APIs do not use Polybase services in SQL Server 2022, you must
    install the Polybase Query Service for External Data feature (or add the feature).
    You must also enable Polybase setting the `sp_configure` `''polybase enabled''`
    option to `1`. If you plan to use `CETAS`, you will also need to set `''allow
    polybase export''` to `1`.'
