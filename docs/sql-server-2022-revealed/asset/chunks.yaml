  trans: "\n## 在 SQL Server 中使用 AAD\n\n最难的部分你已经完成了。现在，是时候尝试使用 AAD 账户连接到你的 SQL Server\
    \ 2022 实例了。\n\n![](img/525217_1_En_3_Fig43_HTML.png)\n\n一张截图显示了“连接到服务器”选项卡。登录名下的服务器名称高亮字段条目是\
    \ `b w sq l 2022`。底部的“连接”按钮被高亮显示。\n\n图 3-43：使用 MFA 通过 AAD 登录 SQL Server\n\n1.\
    \  你已经从先前设置的 AAD 管理员账户中添加了一个基于 AAD 的登录名。让我们找到它。以本地管理员账户登录，执行脚本 `findaadlogin.sql`。该脚本使用了以下\
    \ T-SQL 语句：\n\n```\n    USE master;\n    GO\n    SELECT * FROM sys.server_principals\
    \ WHERE type = 'E'\n    GO\n```\n\n结果应该是一个使用你先前创建的 AAD 凭据的单一登录名。`type = E` 代表\
    \ `EXTERNAL_LOGIN`。目前支持的唯一外部登录类型就是 AAD。\n\n2.  让我们尝试使用 SSMS 通过 AAD 登录名登录。在 SSMS\
    \ 的“身份验证”中，选择 `Azure Active Directory - 具有多重身份验证的通用`。然后输入 AAD 账户。选择 `选项` 并确保勾选了\
    \ `加密连接` 和 `信任服务器证书`。在我选择“连接”之前的登录屏幕如图 3-43 所示。\n\n选择 `连接`，系统将提示你输入 Azure 账户信息。如果你的\
    \ AAD 支持或要求 MFA，系统将提示你使用任何已设置的方法（例如，使用你的手机）。成功登录后，你将通过 SSMS 的对象资源管理器连接。\n\n如果你的组中没有其他\
    \ AAD 登录名，你可以直接阅读下一步，或者用你自己的 AAD 账户替代。\n\n3.  让我们尝试添加一个新的 AAD 账户作为 SQL 登录名。假设我的同事\
    \ Anna Hoffman 需要 `sysadmin` 访问权限来操作此 SQL Server，但她希望直接使用她的 AAD 账户，而不是创建一个不同的账户。Anna\
    \ 的 AAD 账户是 `annahoffman@aadsqlmi.net`。现在，以最初创建并刚连接使用的 AAD `sysadmin` 登录名登录，执行脚本\
    \ `createaadlogin.sql`，它使用了以下 T-SQL 语句：\n\n```\n    USE master;\n    GO\n    CREATE\
    \ LOGIN [annahoffman@aadsqlmi.net] FROM EXTERNAL PROVIDER;\n    GO\n    EXEC sp_addsrvrolemember\
    \ @loginame='annahoffman@aadsqlmi.net', @rolename='sysadmin';\n    GO\n```\n\n\
    注意新的语法 `FROM EXTERNAL PROVIDER`（我们已经对 Azure SQL Database 和 Azure SQL 托管实例提供了支持）。\n\
    \n你现在可以使用这个新登录名，通过 AAD 使用 MFA 或基于密码的身份验证连接到 SSMS。\n\n4.  现在假设另一位同事 Marisa Mathews\
    \ 需要作为用户访问特定数据库，但实际上不需要登录名或成为 `sysadmin` 角色的成员。你可以通过 AAD 身份验证来实现。以 AAD `sysadmin`\
    \ 登录名连接，执行脚本 `createaaduser.sql`，它使用了以下 T-SQL 语句：\n\n```\n    DROP DATABASE IF\
    \ EXISTS howaboutthemcowboys;\n    GO\n    CREATE DATABASE howboutthemcowboys;\n\
    \    GO\n    USE howboutthemcowboys;\n    GO\n    CREATE USER [marisamathews@aadsqlmi.net]\
    \ FROM EXTERNAL PROVIDER;\n    GO\n```\n\n现在，当你尝试使用此 AAD 账户通过 SSMS 连接时，你需要在 `连接属性`\
    \ 下使用 `连接到数据库` 选项并指定此数据库。该用户将只能访问该数据库，而不是整个实例。这与我们为 Azure SQL Database 提供的功能非常相似。\n\
    \n5.  另一个不错的选项是 AAD 组。假设 Anna 和 Marisa 是一个名为 `sqlusers` 的 AAD 组的成员。以 `sysadmin`\
    \ 登录名连接，你可以执行脚本 `createaadgrouplogin.sql`。该脚本使用以下 T-SQL 语句：\n\n```\n    USE master;\n\
    \    GO\n    CREATE LOGIN [sqlusers] FROM EXTERNAL PROVIDER;\n    GO\n```\n\n\
    不幸的是，像 `xp_logininfo` 这样的存储过程不适用于 AAD 组，因此要查看成员身份，你需要使用列出 AAD 组的方法。\n\n还有一些其他的语法选项可用于创建登录名和用户，包括\
    \ Azure 应用程序（无密码账户），你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-setup-tutorial#create-logins-and-users`](https://docs.microsoft.com/en-us/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-setup-tutorial#create-logins-and-users)\
    \ 阅读更多相关信息。\n\n我们甚至支持链接服务器的 AAD 身份验证，你可以在 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-linked-server`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-linked-server)\
    \ 阅读更多内容。\n\n## Microsoft Purview 策略管理\n\n要理解 Microsoft Purview 策略管理的强大功能，让我们看一个场景。你需要雇佣一名在\
    \ SQL Server 性能监控方面技能非常强的顾问。你希望这位顾问能够访问你的 SQL Server，但只能监控与性能相关的动态管理视图 (DMV) 等内容。你不想授予他们完整的\
    \ `sysadmin` 权限。你将在本书的第 6 章了解到，我们为此目的引入了新的固定服务器角色，例如 `##MS_ServerPerformanceStateReader##`。这可以完美满足你的需求。你甚至可以在你的\
    \ Azure Active Directory 中创建一个来宾账户，并基于该账户创建一个 SQL Server 登录名，然后将他们分配到新角色。\n\n\
    那么，如果你需要跨，比如说，50 个 SQL Server 实例执行此操作呢？你将需要创建一些脚本来连接所有实例以创建登录名并分配角色。当合同结束时会发生什么？你需要自己创建脚本来在所有实例上删除你先前创建的登录名。\n\
    \n如果你能使用一个中心位置来完成所有这些工作，而无需创建和维护脚本，甚至无需直接创建登录名呢？Microsoft Purview 提供了一个中心治理中心，为包括作为\
    \ Azure Arc 启用的 SQL Server 的 SQL Server 2022 在内的 Azure SQL 资源建立**访问策略**。此外，Microsoft\
    \ 还创建了一些内置策略来匹配某些场景，例如性能监控、安全审计或读取用户表数据。\n\n以下由微软负责 SQL 的 Purview 访问策略首席项目经理 Srdan\
    \ Bozovic 撰写的博客文章 [`https://cloudblogs.microsoft.com/sqlserver/2022/08/11/microsoft-purview-access-policies-for-sql-server-2022/`](https://cloudblogs.microsoft.com/sqlserver/2022/08/11/microsoft-purview-access-policies-for-sql-server-2022/)\
    \ 很好地展示了可能实现的功能。\n\n我询问了 SQL 安全首席集团项目经理 Joachim Hammer 对 Microsoft Purview 为 SQL\
    \ 客户提供哪些价值的看法。他说：\n\n*Microsoft Purview 提供的**全面、统一的数据治理**有助于跨云、应用和设备保护敏感数据，是应对日益增长的安全威胁的重要工具。现已在\
    \ SQL Server 2022 中可用的基于 Purview 的访问策略，与当今数据库管理系统内置的访问控制相比具有两大优势：使用 Purview 易于使用的策略仪表板在一个地方高效地管理数据访问，同时执行规模可扩展到整个数据资产。我们非常自豪能够以基于\
    \ Purview 的访问策略形式，为我们 SQL Server 客户提供强大的、基于云的数据治理，帮助他们治理和保护其所有 SQL Server 数据，无论数据位于何处，从本地到云端。*\n\
    \n让我们深入细节。让我们看看 Purview 访问策略是如何工作的，然后通过一个练习来看看它们的实际操作。\n"
- fmt: "### How Do Purview Access Policies Work?\n\nLike Synapse Link, you will use\
    \ Purview in Azure to *author* the experience of building policies that affect\
    \ SQL Server. You will learn to do this through a tool called **Purview Governance\
    \ Portal** (I often call this Purview Studio).\n\nA policy is made up of the following\
    \ components:\n\n*   The **type of access** (read, performance monitoring, etc.)\n\
    *   A **data source**. This will be a SQL Server instance you will register with\
    \ Purview.\n*   A **principal** to give access. This is an Azure Active Directory\
    \ account.\n\nThere are two types of policies that you can create with Purview\
    \ for SQL Server:\n\n*   **Data** – This is to support the concept of a user who\
    \ just needs to read data perhaps to build reports.\n*   **DevOps** – This is\
    \ to support *admin* users for, for example, performance monitoring and security\
    \ auditing.\n\n**Note**\n\nWe will continue to invest here and add more types\
    \ of access policies such as modification of data and self-service data access.\
    \ Self-service data access allows users to request access to data through a scanned\
    \ data source, and approvals can be automatically done without creating a specific\
    \ policy.\n\nPurview access policies are not just for SQL Server. Purview access\
    \ policies are part of a broader concept for Purview called **Data Use Management**\
    \ (DUM), which you can read more about at `https://docs.microsoft.com/azure/purview/how-to-enable-data-use-management`.\n\
    \nMicrosoft Purview access policies rely on three capabilities you have seen already\
    \ in this chapter:\n\n*   Azure Active Directory (AAD) authentication for SQL\
    \ Server. This is because policies are only supported for an AAD account.\n* \
    \  Azure extension for SQL Server. This agent is used for AAD authentication but\
    \ will also be used by Purview to provide information for the SQL Server engine\
    \ to connect to Purview to extract policies.\n*   Enhancements built into the\
    \ SQL Server engine to the security system to understand how to take policy information\
    \ and allow connections and access to SQL Server based on the policy.\n\nFigure\
    \ 3-44 shows an architecture view of how Purview access policies work.\n\n![](Images/525217_1_En_3_Fig44_HTML.png)\n\
    \nA 4-step flowchart shows the Microsoft Purview s q l server policy architecture.\
    \ Steps start with Azure extension for s q l server and end with a a d login.\n\
    \n**Figure 3-44** Architecture of Purview access policies for SQL Server\n\nLet’s\
    \ look at these components further:\n\n1.  After creating a Purview account, you\
    \ will use the Azure extension for SQL Server to **enable Purview** through the\
    \ Azure Arc–enabled SQL Server capability (remember you already did this to get\
    \ AAD authentication enabled, which is first required). When you enable Purview,\
    \ the extension stores key information in the Windows registry or `mssql.conf`\
    \ file (Linux) so the SQL Server engine knows how to communicate with Purview.\n\
    \n    **Note** For Windows, the registry key is `Computer\\HKEY_LOCAL_MACHINE\\\
    SOFTWARE\\Microsoft\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQLServer\\\
    PurviewConfig`. This is internal information, and we do not support you reading\
    \ or modifying these registry keys.\n\n2.  You will then use Purview Studio to\
    \ register your Arc-enabled SQL Server instance with Purview and enable Data Use\
    \ Management (DUM). You can now create policies for Data and DevOps scenarios.\n\
    3.  The SQL Server engine can then pull policy information from Purview and store\
    \ in a policy cache (system tables and memory structures). The engine periodically\
    \ checks for updates to policies and updates the cache (or you can force a refresh).\n\
    4.  The principal granted access through the policy can then log in to SQL Server\
    \ and be authenticated with AAD. The engine then can use the policy cache to determine\
    \ what permissions this principal has access to in SQL Server and user databases.\n\
    \nTo make this more real to you, let’s look at an exercise to see an example of\
    \ a Data and DevOps policy.\n\n### Using Purview Access Policies\n\nIn this exercise\
    \ I’ll show you how to use two types of access policies for Purview: Data to read\
    \ user data and DevOps for performance monitoring.\n\n#### Prerequisites\n\nHere\
    \ are the perquisites for this exercise to use Microsoft Purview access policies\
    \ with SQL Server 2022. I’d like to personally thank Vlad Rodriguez, Srdan Bozovic,\
    \ and Nikolas Ogg from our Microsoft engineering teams for helping me get these\
    \ exercises working:\n\n*   A virtual machine or computer with at least two CPUs\
    \ and 8Gb RAM. Your virtual machine or computer needs to be capable of connecting\
    \ to Azure over the Internet.\n*   You have fulfilled all the prerequisites earlier\
    \ in this chapter for Azure Active Directory (AAD) authentication and have followed\
    \ all the steps as instructed earlier in this chapter to set up AAD with SQL Server\
    \ 2022.\n*   Permissions in your Azure subscription to create a Microsoft Purview\
    \ account.\n*   Note that during our preview for SQL Server 2022, Purview data\
    \ access policies were restricted to certain Azure regions. Please consult with\
    \ this documentation for the latest updates: `https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server?branch=release-build-purview-sql-policy#prerequisites`."
  raw: "### How Do Purview Access Policies Work?\n\nLike Synapse Link, you will use\
    \ Purview in Azure to *author* the experience of building policies that affect\
    \ SQL Server. You will learn to do this through a tool called **Purview Governance\
    \ Portal** (I often call this Purview Studio).\n\nA policy is made up of the following\
    \ components:\n\n*   The **type of access** (read, performance monitoring, etc.)\n\
    \n*   A **data source**. This will be a SQL Server instance you will register\
    \ with Purview.\n\n*   A **principal** to give access. This is an Azure Active\
    \ Directory account.\n\nThere are two types of policies that you can create with\
    \ Purview for SQL Server:\n\n*   **Data** – This is to support the concept of\
    \ a user who just needs to read data perhaps to build reports.\n\n*   **DevOps**\
    \ – This is to support *admin* users for, for example, performance monitoring\
    \ and security auditing.\n\nNote\n\nWe will continue to invest here and add more\
    \ types of access policies such as modification of data and self-service data\
    \ access. Self-service data access allows users to request access to data through\
    \ a scanned data source, and approvals can be automatically done without creating\
    \ a specific policy.\n\nPurview access policies are not just for SQL Server. Purview\
    \ access policies are part of a broader concept for Purview called **Data Use\
    \ Management** (DUM), which you can read more about at [`https://docs.microsoft.com/azure/purview/how-to-enable-data-use-management`](https://docs.microsoft.com/azure/purview/how-to-enable-data-use-management).\n\
    \nMicrosoft Purview access policies rely on three capabilities you have seen already\
    \ in this chapter:\n\n*   Azure Active Directory (AAD) authentication for SQL\
    \ Server. This is because policies are only supported for an AAD account.\n\n\
    *   Azure extension for SQL Server. This agent is used for AAD authentication\
    \ but will also be used by Purview to provide information for the SQL Server engine\
    \ to connect to Purview to extract policies.\n\n*   Enhancements built into the\
    \ SQL Server engine to the security system to understand how to take policy information\
    \ and allow connections and access to SQL Server based on the policy.\n\nFigure\
    \ [3-44](#525217_1_En_3_Chapter.xhtml#Fig44) shows an architecture view of how\
    \ Purview access policies work.\n\n![](Images/525217_1_En_3_Fig44_HTML.png)\n\n\
    A 4-step flowchart shows the Microsoft Purview s q l server policy architecture.\
    \ Steps start with Azure extension for s q l server and end with a a d login.\n\
    \nFigure 3-44\n\nArchitecture of Purview access policies for SQL Server\n\nLet’s\
    \ look at these components further:\n\n1.  After creating a Purview account, you\
    \ will use the Azure extension for SQL Server to **enable Purview** through the\
    \ Azure Arc–enabled SQL Server capability (remember you already did this to get\
    \ AAD authentication enabled, which is first required). When you enable Purview,\
    \ the extension stores key information in the Windows registry or mssql.conf file\
    \ (Linux) so the SQL Server engine knows how to communicate with Purview.\n\n\
    \    **Note** For Windows, the registry key is Computer\\HKEY_LOCAL_MACHINE\\\
    SOFTWARE\\Microsoft\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQLServer\\\
    PurviewConfig. This is internal information, and we do not support you reading\
    \ or modifying these registry keys.\n\n2.  You will then use Purview Studio to\
    \ register your Arc-enabled SQL Server instance with Purview and enable Data Use\
    \ Management (DUM). You can now create policies for Data and DevOps scenarios.\n\
    \n3.  The SQL Server engine can then pull policy information from Purview and\
    \ store in a policy cache (system tables and memory structures). The engine periodically\
    \ checks for updates to policies and updates the cache (or you can force a refresh).\n\
    \n4.  The principal granted access through the policy can then log in to SQL Server\
    \ and be authenticated with AAD. The engine then can use the policy cache to determine\
    \ what permissions this principal has access to in SQL Server and user databases.\n\
    \nTo make this more real to you, let’s look at an exercise to see an example of\
    \ a Data and DevOps policy.\n\n### Using Purview Access Policies\n\nIn this exercise\
    \ I’ll show you how to use two types of access policies for Purview: Data to read\
    \ user data and DevOps for performance monitoring.\n\n#### Prerequisites\n\nHere\
    \ are the perquisites for this exercise to use Microsoft Purview access policies\
    \ with SQL Server 2022\\. I’d like to personally thank Vlad Rodriguez, Srdan Bozovic,\
    \ and Nikolas Ogg from our Microsoft engineering teams for helping me get these\
    \ exercises working:\n\n*   A virtual machine or computer with at least two CPUs\
    \ and 8Gb RAM. Your virtual machine or computer needs to be capable of connecting\
    \ to Azure over the Internet.\n\n*   You have fulfilled all the prerequisites\
    \ earlier in this chapter for Azure Active Directory (AAD) authentication and\
    \ have followed all the steps as instructed earlier in this chapter to set up\
    \ AAD with SQL Server 2022.\n\n*   Permissions in your Azure subscription to create\
    \ a Microsoft Purview account.\n\n*   Note that during our preview for SQL Server\
    \ 2022, Purview data access policies were restricted to certain Azure regions.\
    \ Please consult with this documentation for the latest updates: [`https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server?branch=release-build-purview-sql-policy#prerequisites`](https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server?branch=release-build-purview-sql-policy#prerequisites)."
  trans: "### Purview 访问策略如何工作？\n\n与 Synapse Link 类似，您将使用 Azure 中的 Purview 来*设计*构建影响\
    \ SQL Server 的策略体验。您将通过一个名为 **Purview 治理门户**的工具（我常称之为 Purview Studio）来学习如何操作。\n\
    \n一个策略由以下部分组成：\n\n*   **访问类型**（读取、性能监控等）\n*   一个**数据源**。这将是您要向 Purview 注册的 SQL\
    \ Server 实例。\n*   一个要授予权限的**主体**。这是一个 Azure Active Directory 账户。\n\n您可以为 SQL Server\
    \ 创建两种类型的 Purview 策略：\n\n*   **数据策略** – 用于支持仅需读取数据（例如构建报表）的用户概念。\n*   **DevOps\
    \ 策略** – 用于支持*管理员*用户，例如进行性能监控和安全审计。\n\n**注意**\n\n我们将持续在此领域投入并添加更多类型的访问策略，例如数据修改和自助数据访问。自助数据访问允许用户通过已扫描的数据源请求访问权限，并且可以在不创建特定策略的情况下自动完成审批。\n\
    \nPurview 访问策略不仅适用于 SQL Server。Purview 访问策略是 Purview 中一个更广泛概念的一部分，称为**数据使用管理**，您可以在\
    \ `https://docs.microsoft.com/azure/purview/how-to-enable-data-use-management`\
    \ 阅读更多相关信息。\n\nMicrosoft Purview 访问策略依赖于本章已介绍的三种能力：\n\n*   用于 SQL Server 的 Azure\
    \ Active Directory (AAD) 身份验证。这是因为策略仅支持 AAD 账户。\n*   用于 SQL Server 的 Azure 扩展。此代理用于\
    \ AAD 身份验证，也将被 Purview 用来为 SQL Server 引擎提供连接到 Purview 以提取策略的信息。\n*   构建到 SQL Server\
    \ 引擎安全系统中的增强功能，以理解如何获取策略信息，并基于该策略允许连接和访问 SQL Server。\n\n图 3-44 展示了 Purview 访问策略工作原理的架构视图。\n\
    \n![](img/525217_1_En_3_Fig44_HTML.png)\n\n一个 4 步流程图展示了 Microsoft Purview SQL\
    \ Server 策略架构。步骤从 Azure SQL Server 扩展开始，到 AAD 登录结束。\n\n**图 3-44** SQL Server 的\
    \ Purview 访问策略架构\n\n让我们进一步了解这些组件：\n\n1.  创建 Purview 账户后，您将使用 Azure SQL Server\
    \ 扩展通过 Azure Arc 支持的 SQL Server 功能来**启用 Purview**（记住，您已经执行此操作以启用首先需要的 AAD 身份验证）。启用\
    \ Purview 时，扩展会将关键信息存储在 Windows 注册表或 `mssql.conf` 文件（Linux）中，以便 SQL Server 引擎知道如何与\
    \ Purview 通信。\n\n    **注意** 对于 Windows，注册表项是 `Computer\\HKEY_LOCAL_MACHINE\\SOFTWARE\\\
    Microsoft\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQLServer\\PurviewConfig`。这是内部信息，我们不支持您读取或修改这些注册表项。\n\
    \n2.  然后，您将使用 Purview Studio 将您的 Arc 支持的 SQL Server 实例注册到 Purview 并启用数据使用管理。您现在可以为数据和\
    \ DevOps 场景创建策略。\n3.  SQL Server 引擎随后可以从 Purview 拉取策略信息，并将其存储在策略缓存（系统表和内存结构）中。引擎会定期检查策略的更新并更新缓存（或者您可以强制刷新）。\n\
    4.  通过策略授予权限的主体随后可以登录到 SQL Server 并通过 AAD 进行身份验证。然后，引擎可以使用策略缓存来确定该主体在 SQL Server\
    \ 和用户数据库中拥有哪些访问权限。\n\n为了让您更直观地理解，让我们通过一个练习来查看数据策略和 DevOps 策略的示例。\n\n### 使用 Purview\
    \ 访问策略\n\n在本练习中，我将向您展示如何为 Purview 使用两种类型的访问策略：用于读取用户数据的数据策略和用于性能监控的 DevOps 策略。\n\
    \n#### 先决条件\n\n以下是本练习使用 SQL Server 2022 的 Microsoft Purview 访问策略的先决条件。我谨个人感谢来自我们\
    \ Microsoft 工程团队的 Vlad Rodriguez、Srdan Bozovic 和 Nikolas Ogg 帮助我完成这些练习：\n\n* \
    \  一台至少有两个 CPU 和 8GB 内存的虚拟机或计算机。您的虚拟机或计算机需要能够通过互联网连接到 Azure。\n*   您已完成本章前面关于 Azure\
    \ Active Directory (AAD) 身份验证的所有先决条件，并按照本章前面的说明完成了 SQL Server 2022 的 AAD 设置。\n\
    *   您在 Azure 订阅中拥有创建 Microsoft Purview 账户的权限。\n*   请注意，在 SQL Server 2022 的预览期间，Purview\
    \ 数据访问策略仅限于特定的 Azure 区域。请查阅此文档以获取最新更新：`https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server?branch=release-build-purview-sql-policy#prerequisites`。"
- fmt: "## Set Up Microsoft Purview Access Policies\n\n![](Images/525217_1_En_3_Fig45_HTML.png)\n\
    \nA screenshot shows the Microsoft Purview access policies preview tab. Two entries\
    \ show the app registration i d, and Purview endpoint with an overlay titled your\
    \ purview account name.\n\n**Figure 3-45**\nRegistering Purview with the Azure\
    \ extension for SQL Server\n\n1.  You will first need a Microsoft Purview account.\
    \ Here is a quick-start guide to create a Purview account: [`https://docs.microsoft.com/azure/purview/create-catalog-portal`](https://docs.microsoft.com/azure/purview/create-catalog-portal).\n\
    2.  There are some permissions you will need to set up with Purview to allow you\
    \ to create and publish policies and enable DUM. Please follow the steps in this\
    \ documentation **carefully** to set up these permissions: [`https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server#configuration`](https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server#configuration).\n\
    3.  Now you need to register your Purview account with the Azure extension for\
    \ SQL Server through the Azure portal. Find your SQL Server – Azure Arc resource\
    \ that you created for AAD authentication in the Azure portal. Select on the left-hand\
    \ menu `Azure Active Directory`. At the bottom of the screen that is presented,\
    \ you will see a section called `Microsoft Purview access policies`. Click `Enabled`\
    \ and fill out `Microsoft Purview Endpoint` by putting in your Purview account\
    \ name like in Figure 3-45.\n    The `App registration ID` will be automatically\
    \ filled in. This is an AAD ID associated with the Azure application that was\
    \ registered when you enabled AAD authentication. Select `Save` at the top of\
    \ this screen. The status of success or fail is a bit odd as this screen doesn’t\
    \ just go away when the save is successful.\n    When you are done, your screen\
    \ should look like Figure 3-46.\n\n![](Images/525217_1_En_3_Fig46_HTML.png)\n\n\
    A screenshot shows the s q l server 2022\\. The Azure active directory is selected\
    \ in the left pane. The service certificate and app registration of the s q l\
    \ server are service managed. External policy-based authorization is enabled.\n\
    \n**Figure 3-46**\nAzure Arc–enabled SQL Server 2022 configured for AAD and Purview\n\
    \nSo how do you know if Purview was enabled on your SQL Server through the Azure\
    \ extension? One way to see this is to view details of the SQL extension in the\
    \ portal.\nSearch on the home page of the Azure portal for `Servers – Azure Arc`.\
    \ Select `Servers – Azure Arc` under `Services`. Choose your server name at the\
    \ top of this list. On the left-hand menu, choose `Extensions`. Now choose `WindowsAgent.SqlServer.`.\
    \ The `Status` message shows information sent to the extension on your SQL Server,\
    \ which should look similar to Figure 3-47.\n\n![](Images/525217_1_En_3_Fig47_HTML.png)\n\
    \nA screenshot shows windows agent dot s q l server. The succeeded status is followed\
    \ by a status message and resource i d.\n\n**Figure 3-47**\nSuccessful extension\
    \ status for AAD and Purview\n\n4.  You will need some AAD accounts to authorize\
    \ access in the exercise. I will show you two scenarios for two different AAD\
    \ accounts. For access to read data, I’ll use the account `annahoffman@aadsqlmi.net`\
    \ that I created in the exercise earlier in this chapter for AAD authentication.\
    \ For the exercise on DevOps for performance monitoring, I’ll show an example\
    \ of a *guest* AAD account. A guest is an account that is not part of your AAD\
    \ but you are *inviting* them to access resources in Azure. You can read more\
    \ about how to invite a guest account in AAD at [`https://docs.microsoft.com/azure/active-directory/external-identities/b2b-quickstart-add-guest-users-portal`](https://docs.microsoft.com/azure/active-directory/external-identities/b2b-quickstart-add-guest-users-portal).\n\
    5.  Learn the basics of how to launch Purview Studio from the Azure portal at\
    \ [`https://docs.microsoft.com/azure/purview/use-azure-purview-studio`](https://docs.microsoft.com/azure/purview/use-azure-purview-studio).\
    \ Use the AAD admin account you created earlier in this chapter for the exercises\
    \ to enable AAD authentication for SQL Server 2022."
  raw: '#### Set Up Microsoft Purview Access Policies


    ![](Images/525217_1_En_3_Fig45_HTML.png)


    A screenshot shows the Microsoft Purview access policies preview tab. Two entries
    show the app registration i d, and Purview endpoint with an overlay titled your
    purview account name.


    Figure 3-45


    Registering Purview with the Azure extension for SQL Server


    1.  You will first need a Microsoft Purview account. Here is a quick-start guide
    to create a Purview account: [`https://docs.microsoft.com/azure/purview/create-catalog-portal`](https://docs.microsoft.com/azure/purview/create-catalog-portal).


    2.  There are some permissions you will need to set up with Purview to allow you
    to create and publish policies and enable DUM. Please follow the steps in this
    documentation **carefully** to set up these permissions: [`https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server#configuration`](https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server#configuration).


    3.  Now you need to register your Purview account with the Azure extension for
    SQL Server through the Azure portal. Find your SQL Server – Azure Arc resource
    that you created for AAD authentication in the Azure portal. Select on the left-hand
    menu Azure Active Directory. At the bottom of the screen that is presented, you
    will see a section called **Microsoft Purview access policies****.** Click Enabled
    and fill out Microsoft Purview Endpoint by putting in your Purview account name
    like in Figure [3-45](#525217_1_En_3_Chapter.xhtml#Fig45).


    The App registration ID will be automatically filled in. This is an AAD ID associated
    with the Azure application that was registered when you enabled AAD authentication.
    Select Save at the top of this screen. The status of success or fail is a bit
    odd as this screen doesn’t just go away when the save is successful.


    When you are done, your screen should look like Figure [3-46](#525217_1_En_3_Chapter.xhtml#Fig46).


    ![](Images/525217_1_En_3_Fig46_HTML.png)


    A screenshot shows the s q l server 2022\. The Azure active directory is selected
    in the left pane. The service certificate and app registration of the s q l server
    are service managed. External policy-based authorization is enabled.


    Figure 3-46


    Azure Arc–enabled SQL Server 2022 configured for AAD and Purview


    So how do you know if Purview was enabled on your SQL Server through the Azure
    extension? One way to see this is to view details of the SQL extension in the
    portal.


    Search on the home page of the Azure portal for **Servers – Azure Arc**. Select
    Servers – Azure Arc under Services. Choose your server name at the top of this
    list. On the left-hand menu, choose Extensions. Now choose **WindowsAgent.SqlServer.**
    The Status message shows information sent to the extension on your SQL Server,
    which should look similar to Figure [3-47](#525217_1_En_3_Chapter.xhtml#Fig47).


    ![](Images/525217_1_En_3_Fig47_HTML.png)


    A screenshot shows windows agent dot s q l server. The succeeded status is followed
    by a status message and resource i d.


    Figure 3-47


    Successful extension status for AAD and Purview


    1.  You will need some AAD accounts to authorize access in the exercise. I will
    show you two scenarios for two different AAD accounts. For access to read data,
    I’ll use the account annahoffman@aadsqlmi.net that I created in the exercise earlier
    in this chapter for AAD authentication. For the exercise on DevOps for performance
    monitoring, I’ll show an example of a *guest* AAD account. A guest is an account
    that is not part of your AAD but you are *inviting* them to access resources in
    Azure. You can read more about how to invite a guest account in AAD at [`https://docs.microsoft.com/azure/active-directory/external-identities/b2b-quickstart-add-guest-users-portal`](https://docs.microsoft.com/azure/active-directory/external-identities/b2b-quickstart-add-guest-users-portal).


    2.  Learn the basics of how to launch Purview Studio from the Azure portal at
    [`https://docs.microsoft.com/azure/purview/use-azure-purview-studio`](https://docs.microsoft.com/azure/purview/use-azure-purview-studio).
    Use the AAD admin account you created earlier in this chapter for the exercises
    to enable AAD authentication for SQL Server 2022.'
  trans: "\n## 设置 Microsoft Purview 访问策略\n\n![](img/525217_1_En_3_Fig45_HTML.png)\n\
    \n屏幕截图显示了 Microsoft Purview 访问策略预览选项卡。两个条目显示了应用注册 ID 和 Purview 终结点，上方有一个叠加标题，内容为“您的\
    \ Purview 账户名称”。\n\n**图 3-45**\n使用 Azure 扩展为 SQL Server 注册 Purview\n\n1.  首先，您需要一个\
    \ Microsoft Purview 账户。以下是创建 Purview 账户的快速入门指南：[`https://docs.microsoft.com/azure/purview/create-catalog-portal`](https://docs.microsoft.com/azure/purview/create-catalog-portal)。\n\
    2.  您需要在 Purview 中设置一些权限，以便能够创建和发布策略以及启用 DUM。请**仔细**按照此文档中的步骤设置这些权限：[`https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server#configuration`](https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server#configuration)。\n\
    3.  现在，您需要通过 Azure 门户，使用 SQL Server 的 Azure 扩展注册您的 Purview 账户。在 Azure 门户中找到您为\
    \ AAD 身份验证创建的 SQL Server – Azure Arc 资源。在左侧菜单中选择 `Azure Active Directory`。在呈现的屏幕底部，您会看到一个名为\
    \ `Microsoft Purview access policies` 的部分。点击 `Enabled`，并通过输入您的 Purview 账户名称来填写\
    \ `Microsoft Purview Endpoint`，如图 3-45 所示。\n    `App registration ID` 将自动填充。这是与启用\
    \ AAD 身份验证时注册的 Azure 应用程序相关联的 AAD ID。选择此屏幕顶部的 `Save`。成功或失败的状态显示有些奇怪，因为保存成功后此屏幕不会立即消失。\n\
    \    完成后，您的屏幕应如图 3-46 所示。\n\n![](img/525217_1_En_3_Fig46_HTML.png)\n\n屏幕截图显示了\
    \ SQL Server 2022。左侧窗格中选择了 Azure Active Directory。SQL Server 的服务证书和应用注册由服务管理。基于外部策略的授权已启用。\n\
    \n**图 3-46**\n为 AAD 和 Purview 配置的 Azure Arc–启用的 SQL Server 2022\n\n那么，如何知道是否通过\
    \ Azure 扩展在您的 SQL Server 上启用了 Purview？一种查看方法是查看门户中 SQL 扩展的详细信息。\n在 Azure 门户的主页上搜索\
    \ `Servers – Azure Arc`。在 `Services` 下选择 `Servers – Azure Arc`。在此列表顶部选择您的服务器名称。在左侧菜单中，选择\
    \ `Extensions`。现在选择 `WindowsAgent.SqlServer.`。`Status` 消息显示已发送到 SQL Server 上扩展的信息，其外观应类似于图\
    \ 3-47。\n\n![](img/525217_1_En_3_Fig47_HTML.png)\n\n屏幕截图显示了 windows agent dot\
    \ sql server。Succeeded 状态后跟有状态消息和资源 ID。\n\n**图 3-47**\nAAD 和 Purview 的扩展状态成功\n\
    \n4.  在本练习中，您将需要一些 AAD 账户来授权访问。我将为您展示两个不同 AAD 账户的两种场景。对于读取数据的访问，我将使用本章前面在 AAD\
    \ 身份验证练习中创建的账户 `annahoffman@aadsqlmi.net`。对于性能监控的 DevOps 练习，我将展示一个 *来宾* AAD 账户的示例。来宾是指不属于您\
    \ AAD 但您 *邀请* 其访问 Azure 中资源的账户。您可以在 [`https://docs.microsoft.com/azure/active-directory/external-identities/b2b-quickstart-add-guest-users-portal`](https://docs.microsoft.com/azure/active-directory/external-identities/b2b-quickstart-add-guest-users-portal)\
    \ 阅读更多关于如何在 AAD 中邀请来宾账户的信息。\n5.  在 [`https://docs.microsoft.com/azure/purview/use-azure-purview-studio`](https://docs.microsoft.com/azure/purview/use-azure-purview-studio)\
    \ 学习如何从 Azure 门户启动 Purview Studio 的基础知识。使用您在本章前面为 SQL Server 2022 启用 AAD 身份验证的练习中创建的\
    \ AAD 管理员账户。\n"
- fmt: '### Using Microsoft Purview Access Policies


    ![A screenshot shows the register sources tab. It has entries for name, azure
    subscription, server name, server endpoint, select a collection, and application
    i d. Data use management is enabled.](Images/525217_1_En_3_Fig48_HTML.png)


    Figure 3-48: Registering a SQL Server data source for Purview access policies


    1.  The first thing we need to do is register the SQL Server 2022 instance as
    a data source. Launch Purview Studio from the Azure portal. Choose the `Data map`
    icon on the left-hand menu (hover over the icons to see Data map). Your Purview
    account may have other data sources already registered shown in a visual tree
    or in a table format. Choose `Register` at the top of the screen. On the `Register
    sources` screen, type in `Arc` in the `Filter by keyword` field. Select `SQL Server
    on Azure Arc–enabled servers` and select `Continue`.


    You can now choose and fill out fields on the `Register sources (SQL Server on
    Azure Arc–enabled servers)` screen. Choose a name (I recommend the same name as
    your registered server), subscription, and server name (your registered server).
    Type in your registered server name in the `Server endpoint` field and leave the
    `(Root)` collection as the default.


    Select the `Enabled` option for `Data Use Management`, which should auto-populate
    the `Application ID` (this is the App registration ID that is listed on the Azure
    Active Directory screen from SQL Server – Azure Arc). Your screen should look
    similar to Figure 3-48.


    Select `Register`. After a few seconds, you will see the list of data sources
    again. Select `Refresh` at the top of the screen to confirm your data source.


    > **Note**

    > If you want to apply a policy against multiple SQL Server instances, you need
    to register each one first. You only need to register a SQL Server data source
    once to use with any number of policies.


    2.  Let’s now create a data policy for another AAD account. I’ll use `annahoffman@aadsqlmi.net`
    to be granted access to read data for our SQL Server instance. For me, since I
    created this account as a login in the exercises for AAD, I first deleted the
    login to avoid any confusion. Turns out that if a login exists for the same AAD
    account as a policy, we use the *union* of the permissions of the login and the
    policy.


    > **Note**

    > At the time of the writing of this book, we were looking to add more granular
    read access for individual objects like specific databases and/or tables in the
    future. This will require the SQL Server instance to be scanned using the data
    catalog feature of Microsoft Purview.


    Using Purview Studio, select the `Data policy` icon on the left-hand menu. Select
    `Data policies` and then `+ New policy`. Now select `Access Control` under `Policy
    Types`.


    On the `Access Control Policy`, type in a name called `sqlreader` with the same
    description. Then select `+ New policy statement`. Now you need to build the statement
    with some choices:


    *   For `effect` choose `Allow`.

    *   For `action` choose `Read`.

    *   For `data resources` on the new screen, choose `Data source type` and then
    choose `SQL Server on Azure Arc–enabled servers`. Leave `Assets` alone and select
    `Continue`. Choose your server under `Data Source Name` and select `Add`.


    > **Note**

    > If you have registered multiple SQL Server data sources, this is where you can
    apply a policy to one or more of them.


    *   For `subjects` type in the AAD account you want to give read access to in
    the `Select subjects` search window and then select `Ok`.


    Your policy statement should look like Figure 3-49.


    ![A screenshot shows the access control policy tab. The field entries for name
    and description are s q l reader. The policy statement tab is visible at the bottom.](Images/525217_1_En_3_Fig49_HTML.png)


    Figure 3-49: Creating a read policy for SQL Server 2022


    Select `Save`. Now that the policy is saved, you will see your new policy on a
    list of policies.


    ![A screenshot shows the new policy tab. Policy statement, data resource path,
    and dev ops roles panes with add or remove button for subject are visible.](Images/525217_1_En_3_Fig50_HTML.png)


    Figure 3-50: Create a DevOps policy for SQL performance monitoring.


    3.  For the policy to take affect, we need to publish it. Select your policy and
    select `Publish` on the right side of the screen. Choose your data source and
    select `Publish` at the bottom of the new screen. You should now see a `Published
    On` date and time on the screen for your policy.

    4.  Let’s create a database and data for the new account to read. Execute the
    script `howboutthemcowboys.sql` against your SQL Server 2022 instance as your
    default sysadmin.

    5.  Policies are not immediately applied. SQL Server will check periodically for
    new policies on a polling interval. Connect to your SQL Server 2022 to immediately
    apply the new policy. Execute the script `policyrefresh.sql`, which uses the following
    T-SQL statements:


    ```sql

    -- Force immediate download of latest published policies

    USE master;

    GO

    exec sp_external_policy_refresh reload;

    GO

    ```


    > **Note**

    > On a server start when SQL Server obtains information from Microsoft Purview
    for policies, you might see messages like the following in the ERRORLOG:

    >

    > `IMDS resource information. Subscription ID: 4fe118d0-bc41-4d7b-869f-0820c87df124,
    Resource Group: aad-auth-demo-env, Name: SQLSERVER2022.`

    >

    > `[JSONWebTokenService::GetCertificateFromCertificateStoreBySubjectName] [AADAuthThumbprint]
    Thumbprint being used for AAD authentication aRgwszCertificateThumbprint 26289598dfe34092c141edc8a319505bdf0882b6`

    >

    > `[CBabylonConfigSubscriber] Purview frequency setting changed. New value: 300`

    >

    > `[CBabylonConfigSubscriber] Purview policy expiration time changed to 480 mins`

    >

    > `[CBabylonConfigSubscriber] Received update to the config settings`

    >

    > `[CBabylonConfigSubscriber] Purview frequency setting changed. New value: 300`

    >

    > `[CBabylonConfigSubscriber] Purview policy expiration time changed to 480 mins`

    >

    > `[CBabylonConfigSubscriber] Registered for setting updates successfully`

    >

    > **Fun fact**

    > Babylon is the original project name for Microsoft Purview.


    6.  Using the same technique you learned earlier in this chapter with SSMS, log
    into SSMS with the account you published the policy for using the MFA option (don’t
    forget to check the `Trust server certificate` option). Let’s check the new permissions
    as a reader to make sure it worked. Execute the script `querythecowboys.sql`,
    which executes the following T-SQL statements:


    ```sql

    USE howboutthemcowboys;

    GO

    SELECT * FROM tothesuperbowl;

    GO

    ```


    You should get one row back (I hope this is our year<g>). The permission to read
    data includes system catalog views and limited Dynamic Management Views (DMVs).


    7.  Let’s prove you only have read permissions. Execute the script `dropthecowboys.sql`,
    which executes the following T-SQL statements:


    ```sql

    USE howboutthemcowboys;

    GO

    DROP TABLE tothesuperbowl;

    GO

    ```


    You should now get an error like the following:


    ```

    Msg 3701, Level 14, State 20, Line 3

    Cannot drop the table ''tothesuperbowl'', because it does not exist or you do
    not have permission.

    ```


    8.  Let’s take a quick peek at a few new Dynamic Management Views (DMVs) to see
    policy information that has been pulled down from Microsoft Purview. Connect as
    a sysadmin to your SQL Server 2022 instance and execute the script `policydmvs.sql`,
    which uses the following T-SQL statements:'
