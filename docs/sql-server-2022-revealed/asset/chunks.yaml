    # 1. Project Dallas Becomes SQL Server 2022


    `SQL Server 2022` was already in the making before `SQL Server 2019` was released.
    In this chapter of the book, I will walk you through the history of `SQL Server
    2022`, as it began with a project that turned into one of the most successful
    releases in `SQL Server` history.


    I’ll also give an introduction into why you want to consider using `SQL Server
    2022` as a data platform that is cloud connected, intelligent, and industry proven.


    My goal is that you will read this chapter, get excited, and be hungry to delve
    into the following chapters of the book to learn all the details you need to know
    about `SQL Server 2022`.'
