    \ on optimized plan forcing in our documentation at [`https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store).\n\
    \n## IQP Nextgen with dbcompat 140+\n\nBased on the previous section, you can\
    \ see that if you upgrade to SQL Server 2022 with any supported dbcompat level,\
