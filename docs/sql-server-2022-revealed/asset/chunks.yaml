    \ will like the 25+ major features we have introduced in SQL Server 2022 including\
    \ Ledger for SQL Server, “hands-free” tempdb, and Contained Availability Groups.\n\
    \nIf you have heard of S3 object storage but are not sure how to use it, you will\
    \ like Chapter [7](#525217_1_En_7_Chapter.xhtml). I’ll show you how to access\
    \ parquet files and delta tables from SQL Server using our Polybase technology.\
    \ Or perhaps you are looking for a new place to host your backups, so I’ll show\
    \ you how to back up and restore native SQL backups to and from any S3-compatible\
    \ storage provider.\n\nI think many believe we have forgotten about the Transact-SQL\
    \ (T-SQL) language. You might be surprised to see the new T-SQL functions and\
    \ language enhancements we have poured into SQL Server 2022 in Chapter [8](#525217_1_En_8_Chapter.xhtml).\n\
