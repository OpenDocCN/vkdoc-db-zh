    but also there is a good summary in Azure documentation at [`https://docs.microsoft.com/rest/api/azure/devops/?view=azure-devops-rest-7.1`](https://docs.microsoft.com/rest/api/azure/devops/?view=azure-devops-rest-7.1).
    In the Azure docs I really like this description of REST: “Representational State
    Transfer (REST) APIs are service endpoints that support sets of HTTP operations
