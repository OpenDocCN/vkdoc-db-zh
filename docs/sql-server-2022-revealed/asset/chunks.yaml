- fmt: '### Steps to Deploy


    ![A screenshot of the azure S Q L window to create resources. It has options to
    create S Q L databases, managed instances, and virtual machines.](Images/525217_1_En_10_Fig1_HTML.png)


    **Figure 10-1** Creating an Azure SQL resource


    1.  Launch the Azure portal at [`https://portal.azure.com`](https://portal.azure.com)
    and log in using your Azure subscription.

    2.  On your home page, select **+ Create Resource**. In the search box, type in
    `Azure SQL`. In the drop-down, select `Azure SQL`. Select **Create**. You should
    now see a screen like [Figure 10-1](#525217_1_En_10_Chapter.xhtml#Fig1).


    `SQL Server on Azure Virtual Machines` is part of the `Azure SQL` family, and
    this screen is a convenient method to choose several SQL virtual machine options.


    ![A screenshot of a window to create a virtual machine. There are options for
    details under the basics tab to review plus create.](Images/525217_1_En_10_Fig2_HTML.png)


    **Figure 10-2** The Basics blade for Azure virtual machine deployment


    1.  For SQL virtual machines, select the “down arrow” to see marketplace image
    options. You can scroll through these choices to see the various combinations
    of OS and SQL versions. For now, choose the option for `SQL Server 2022` for a
    `Free License`. When `SQL Server 2022` becomes generally available, this choice
    should be `Free SQL Server License: SQL Server 2022 Developer on Windows Server
    2022`. (At GA there will also be choices for Standard and Enterprise editions).
    Click **Create**.

    2.  Now you will be able to fill out information based on your planning on a series
    of screens called *blades*. The first blade is **Basics**. [Figure 10-2](#525217_1_En_10_Chapter.xhtml#Fig2)
    shows how I filled out the Basics blade for my new VM to create.


    Let’s take a closer look at these options:


    ![A screenshot of a window. There are options for security and networking, server
    license, and automated backup under the S Q L server settings tab.](Images/525217_1_En_10_Fig3_HTML.png)


    **Figure 10-3** SQL Server settings during Azure deployment


    1.  For the **Disks** blade, there may be some options for you to explore, but
    this is only for the OS disk. You will get options later for other data disks
    to store SQL Server data, log, and `tempdb` files. Click **Next: Networking**.

    2.  For the **Networking** blade, I’ll leave all the defaults. This is because
    I’ll by default join the Azure virtual network for the resource group. If you
    selected a new resource group, you would have options to automatically create
    a new network. There could be specific scenarios where an Azure network is already
    set up and you can join that network here. There is an option called `Accelerated
    Networking`, which I recommend you select to get maximum network performance.
    It is by default selected if you have a virtual machine size that supports this
    feature. Click **Next: Management**.

    3.  For the **Management** blade, I’ll use the defaults, but I recommend you explore
    a few options here including enabling `Microsoft Defender for Cloud` (I have this
    auto-enabled with my subscription), `auto-shutdown` for testing or developer-oriented
    virtual machines, and `Enable hotpatch` (but only available with specific OS choices).
    Click **Next: Monitoring**.

    4.  On the **Monitoring** blade, I left the defaults, but you should explore some
    of the other options here for diagnostics. These are independent of SQL and are
    for the OS and VM. Click **Next: Advanced**.

    5.  For the **Advanced** blade, I left the defaults, but there could be some customization
    per your organization needs such as installing different extensions. (This is
    not where the `SQL Server IaaS Agent Extension` is chosen. You made that selection
    by choosing a SQL Server marketplace image.) Click **Next: SQL Server settings**.

    6.  The **SQL Server settings** blade only appears if you choose a SQL Server
    marketplace image. It provides several options to configure SQL Server settings
    and also important options like storage. [Figure 10-3](#525217_1_En_10_Chapter.xhtml#Fig3)
    shows the default options when this blade first appeared for me.


    *   Your `Azure subscription` will be filled in based on the default subscription
    for your account, but you can change this if you have multiple subscriptions.

    *   I chose an existing `resource group` I’ve created for multiple virtual machines.
    You can also create a new one here.


    **Tip** When you create a virtual machine in a new resource group, a virtual network
    is created. If you add other virtual machines to the same resource group, the
    Azure portal will add your new virtual machines to the same Azure network. Therefore,
    your VMs are now in their own private network easily able to discover each other.


    *   Choose a `virtual machine name`, which must be unique in your resource group.
    This becomes the computer name of the VM.

    *   Choose the `Azure region` to deploy your VM.

    *   For `Availability options` I don’t need anything extra for availability than
    what Azure already provides. You will need to choose an option here when you build
    a `Failover Cluster Instance (FCI)` or `Always On Availability Group`.

    *   For `Security type` I chose `Standard`. You do have some new security options
    for your VM including options that support features like `secure boot` and `new
    TPM encryption`. SQL Server marketplace images may not be available for all of
    these options.

    *   For `Image` I just left the option I chose when using the `Azure SQL` screen.
    You could use this to change to a different edition or OS option.

    *   For `VM architecture` `x64` is the only option for SQL Server marketplace
    images.

    *   I left `Run with Azure Spot discount` unchecked because that option would
    not be appropriate for a SQL Server–based virtual machine. (This option means
    you pay less but may have less built-in availability.)

    *   `Size` is where it gets interesting. There is where your planning comes into
    play. If you click **See all sizes**, you can change your size. The `Ev5` series
    is one of the recommend ones for SQL Server, so I chose this one. For my testing
    purposes, four vCPUs and 32Gb RAM are plenty. There are other limits that come
    into play based on size mostly around storage performance. So even though you
    can change this later, it is best to stop and get this as right up front. Consult
    our site at [`https://aka.ms/SQLIaaSSizing`](https://aka.ms/SQLIaaSSizing) for
    more information. Pay close attention to the overall storage performance cap for
    the virtual machine based on the size choice vs specific storage choices you need
    for data, log, and `tempdb`.


    **Note** There could be scenarios where you want to pay less but don’t mind less
    resources or storage performance such as development scenarios. Consider sizes
    like the `D` series or `B` series for burstable.


    *   Fill in a username and password for the `administrator account`. Even though
    you can change the password later (even in the portal if you forget it), you can
    also create new admin accounts in the virtual machine through standard OS options.

    *   I will leave the standard `rdp` port open as public inbound port for testing
    purposes. For production you may not want to do this and use other options. I’ll
    cover these options in the next section of the chapter, “**Connecting to SQL Server
    on an Azure Virtual Machine**.”

    *   For `licensing` I definitely want to save money. Let’s say I have existing
    licenses for `Windows Server` that are not currently being used. I can check this
    box and declare I want to use my Windows license to pay for the Windows cost of
    the virtual machine.


    Select **Next: Disks**.


    Let’s learn more about these settings:


    ![A warning text for the virtual machine I slash O cap.](Images/525217_1_En_10_Fig4_HTML.png)


    **Figure 10-4** Virtual machine I/O cap warning'
