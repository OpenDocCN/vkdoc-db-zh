    ## 普尔维的清单


    多年来，我在微软遇到了许多才华横溢、善良而出色的人。他们默默无闻地工作，从不大肆宣扬。他们只是做好自己的工作，做得非常出色，并且极其友善和友好。普尔维·沙阿就是其中之一。普尔维是
    SQL 团队的高级软件工程师，但她的角色远超过这个头衔。普尔维在我们的“性能”团队工作，她的时间都花在寻找让 SQL Server 和 Azure SQL
    变得更快的方法上——快到我们大多数人都无法理解的程度。她和团队的工作在很多方面都能被感受到，但你可能永远看不到，因为它们通常是对引擎的增强，而不是一个“功能”。


    > **注意**

    >

    > 她为 SQL Server 2019 工作的一个显著例子是针对 `tempdb` 的 `PFS` 页面并发性改进，这非常棒！


    在这个版本发布之际，我联系了普尔维，请她分享我希望读者了解的可扩展性增强列表。以下是她的列表：


    *   **减少的缓冲池 I/O 提升** – 过去存在一些情况，我们会将单页读取提升为八页 I/O，从而导致系统问题。事实证明这并没有真正帮助性能，反而可能使
    I/O 系统过载，因此我们调整了这个算法。这只是让我们的引擎在执行 I/O 操作时变得更智能。


    *   **增强了我们的一些核心自旋锁算法** – 自旋锁是引擎内部多线程一致性的关键部分。我们一直在寻找调整这些算法的方法，以确保引擎在各种工作负载下都能以最佳状态运行。我们进行了一些内部调整，使自旋锁更高效，这些改进深入引擎内部，很难量化其影响（普尔维和团队在非常深的层次上做这件事，以确保他们的工作真的让一切变得更好，而不是更糟）。


    *   **改进了虚拟日志文件算法** – 虚拟日志文件是物理事务日志的抽象。基于日志增长而产生大量小型虚拟日志文件会影响恢复等操作的性能。我们更改了在某些日志增长场景下创建多少虚拟日志文件的算法，以减少此类问题。你可以在我们的文档
    [`https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide?#virtual-log-files-vlfs`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide?#virtual-log-files-vlfs)
    中阅读有关我们如何更改此算法的信息。


    *   **日志文件增长的即时文件初始化** – 直到 SQL Server 2022，我们都不能对事务日志使用即时文件初始化，因为我们认为无法正确检测“日志末尾”。在
    SQL Server 2022 中，我们已经确定，当我们需要增长事务日志时，如果增长大小被认为是“中等”的（最高 64Mb），我们**可以**使用 `IFI`。对于在增长操作期间将日志文件清零会导致阻塞问题的场景，这可能是一个重大的性能胜利。事实证明，64Mb
    正好是创建新数据库时 SQL Server 数据和日志文件的默认自动增长大小。


    普尔维和她的团队做了如此出色的工作，使 SQL Server 引擎保持调整和快速。我问普尔维更多关于她为什么喜欢在微软工作的原因，她说：“保持 SQL Server
    和 Azure SQL 以峰值性能运行是我工作的一部分。我竭尽全力做到最好。当然，我热爱我的工作！希望我能做出积极的贡献，继续我们的使命。”


    ### “免动手”的 tempdb


    尽管 SQL Server 是一个伟大的产品，但在与 SQL Server 打交道 29 年后，我仍然遇到一些至今让我抓狂的问题。其中之一就是 `tempdb`
    的 `latch` 争用。


    #### 挑战是什么？


    SQL Server 中的所有数据库页面都需要使用 `latch` 进行物理保护。一些数据库页面被称为系统页面，因为它们包含分配信息；这些就是 `PFS`、`GAM`
    和 `SGAM` 页面。任何需要分配或释放的查询或操作都可能需要读写这些页面。对这些页面的读写需要一种 *latch 保护方案*。需要 `latch` 保护是因为两个线程可能同时尝试修改或读取一个页面（这是对
    `latch` 工作原理的一个非常基本的描述）。


    这些页面在数据库文件中位于固定位置。此外，每个表都有用于存储数据和索引的页面。任何影响这些页面的查询或操作也需要 `latch` 保护。因为系统表和其他表一样有页面，SQL
    中的特定 DDL 语句最终会导致系统表页面的 `latch` 保护和争用。


    现在考虑 `tempdb`。涉及 `tempdb` 的 SQL Server 工作负载通常需要大量的分配和系统表页面操作。临时表、表变量和溢出只是引发这些操作的几个例子。所有这些通常都需要快速且频繁的页面分配和系统表修改。因此，当许多用户并发运行导致在
    `tempdb` 内进行这些操作的查询时，自然会对用于分配和系统表的页面的 `latch` 产生争用或*压力*。这个问题的主要症状是看到你的请求等待在 `PAGELATCH_XX`
    等待类型上。


    最初，当 `latch` 在 SQL Server 7.0 中首次引入时，我看到过 `tempdb` 在 `PFS`、`GAM` 和 `SGAM` 页面上的
    `latch` 争用，因为当时数据库页面的默认行为是单个文件。通常会发生的情况是，一个应用程序会被多个并发用户使用，这会导致频繁的 `CREATE` 和 `DROP`
    操作，从而需要分配和释放操作。这自然会对单个文件中的 `PFS`、`GAM` 和 `SGAM` 页面造成压力。

    '
- fmt: '#### Solutions Over the Years


    When we first started to really see this problem in SQL Server 7.0 and even into
    SQL Server 2000, many of us in CSS would recommend that customers create multiple
    files for tempdb data. Why? Because we were naturally `partitioning` latch concurrency
    for these allocation pages. This is because SQL Server will allocate pages in
    a round-robin fashion and leverage a proportional fill algorithm across multiple
    files for data pages. This solution really helped many of these latch contention
    problems. But then a new problem surfaced. How many files do you need to create
    to solve the problem? Unfortunately, many people went overboard and suggested
    that you would need a number of files to match the number of CPUs for SQL Server.
    I and others in the community, like Paul Randal, thought differently. For example,
    we knew that for a 64-CPU machine you would probably not need 64 files. Common
    sense said that it seemed like it could cause more harm than good. I eventually
    did some detailed research on this topic, which led me to recommend that using
    eight files for eight CPUs and then adding by four until you see the performance
    balance for your workload would be the best approach. You can see more details
    about this approach in a presentation I did way back in the PASS Summit in 2011
    at [`www.youtube.com/watch?v=SvseGMobe2w`](http://www.youtube.com/watch?v=SvseGMobe2w).


    Another thing we did is introduce `trace flag 1118` so that all allocations for
    tables used uniform extents to ease pressure on the `SGAM` pages of files. We
    also discovered that using multiple files to ease system page latch contention
    only worked if all the files were the exact same size. As a result, we introduced
    `trace flag 1117` so that any autogrow activities would grow all files to keep
    them the same size.


    Any true bottleneck requires peeling back the layers like an onion. Even with
    this approach of multiple files, a system could have so many users that `PFS`,
    `GAM`, and `SGAM` latch contention could still happen, but it paled in comparison
    to the new main problem: system table page latch contention. We struggled at first
    to recognize this. We were used to running scripts that would recognize specific
    pages for latch contention: `PFS`, `GAM`, and `SGAM`.


    Once we saw the hot spot was system table pages, we honestly had no recourse but
    to tell customers to reduce their tempdb workload contention. We did create some
    solutions that would help called `tempdb caching`. We discovered that we could
    save metadata about temporary tables, including some pages for patterns that were
    repeated. You can see more about this concept at [`https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database?#performance-improvements-in-tempdb-for-sql-server`](https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database?#performance-improvements-in-tempdb-for-sql-server).
    Even with `tempdb caching`, it did not eliminate the problem, and not all tempdb
    scenarios can use caching.


    In SQL Server 2016 we helped customers ensure multiple files were created for
    tempdb by including a default configuration within setup to create the number
    of files to match the number of CPUs detected up to eight. We also removed the
    need for `trace flags 1117 and 1118` by turning these into `ALTER DATABASE` options
    and making them the default for tempdb.


    Workloads continued to put pressure on tempdb, and we still saw issues. We introduced
    two big changes in SQL Server 2019 to help the latch problem:


    - `PFS` pages now would no longer have latching problems. We found ways to update
    `PFS` pages even under a shared latch.

    - We introduced tempdb metadata optimization as a new server option. When this
    option is enabled (a server restart is required), we convert critical system tables
    in tempdb to memory-optimized tables. Memory-optimized tables are “latch-free,”
    so any reads or writes from or to these tables do not experience latch contention.


    The improvements were huge. With these two enhancements, I saw many workloads
    no longer experience significant issues due to latch contention. But the core
    problem could occasionally still be seen with latch contention on `SGAM` and `GAM`
    pages. When I first saw `SGAM` contention continue to occur, I was puzzled because
    we changed tempdb to always use uniform extents. However, there is one page that
    still has to be allocated for temporary tables or indexes that is not with a uniform
    extent, and that is an `IAM` page, which tracks allocations for an object.


    #### Why Now “Hands-Free”?


    When I saw the initial set of engine improvements for project Dallas, I was very
    happy to learn that `GAM` and `SGAM` concurrencies were enhanced in the same manner
    that `PFS` pages had been in SQL Server 2019.


    Now tempdb could truly be “hands-free” with regard to latch issues.


    Consider this:


    - `PFS`, `GAM`, and `SGAM` latch contentions are completely gone.

    - If you execute this statement `ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED
    TEMPDB_METADATA = ON` and restart SQL Server, critical system tables are memory
    optimized and won’t encounter latch contention.


    Note: tempdb latching issues were never about slow I/O. However, you should always
    make sure to eliminate any I/O issues for tempdb by placing tempdb data and log
    files on a separate drive from your user data and preferably on a SSD. If you
    have I/O issues for tempdb, they are typically seen in the form of `PAGELATCH_IO`,
    `IO_COMPLETION`, and `WRITELOG` (tempdb log) wait types.'
