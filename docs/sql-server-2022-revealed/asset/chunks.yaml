- fmt: 'Chapter 6 is “all engine,” and I believe you will like the 25+ major features
    we have introduced in `SQL Server 2022` including Ledger for `SQL Server`, “hands-free”
    `tempdb`, and Contained Availability Groups.


    If you have heard of `S3` object storage but are not sure how to use it, you will
    like Chapter 7. I’ll show you how to access `parquet` files and delta tables from
    `SQL Server` using our `Polybase` technology. Or perhaps you are looking for a
    new place to host your backups, so I’ll show you how to back up and restore native
    `SQL` backups to and from any `S3`-compatible storage provider.


    I think many believe we have forgotten about the `Transact-SQL (T-SQL)` language.
    You might be surprised to see the new `T-SQL` functions and language enhancements
    we have poured into `SQL Server 2022` in Chapter 8.


    There are not many new features in `SQL Server 2022` specific to `Linux`, but
    I want to make sure you know the fundamentals. In Chapter 9 I’ll show the basics
    of deploying and using `SQL Server` on `Linux`, containers, and `Kubernetes`.


    I believe `Azure` is the best cloud for `SQL Server`, so Chapter 10 is a journey
    for you to learn how to deploy, optimize, and manage `SQL Server 2022` on an `Azure`
    Virtual Machine.


    And finally I wanted a way to close out the book with how `SQL Server` has become
    a force everywhere you need it. So Chapter 11 is how `SQL Server` exists “edge
    to cloud” in ways you have never dreamed with a story of consistency and flexibility.


    If you have liked reading my books before or maybe this is for the first time,
    I hope you enjoy the book in all its aspects. I write in a very conversational
    style, which many have told me helps them “visualize me speaking to them” as they
    have seen me present in various events both in person and online. I also want
    you to have resources, so you will see plenty of online references throughout
    the book for you to dive in deeper.


    Anytime your write a book like this, you want readers to have the latest information.
    So keep up to date with the latest examples and errata for the book at `https://aka.ms/sql2022bookexamples`.
    Or check out my free workshop materials at `https://aka.ms/sql2022workshop`.


    I love to hear from readers, so you can either give the book a rating on Amazon
    or email me directly at `bobward@microsoft.com`. I always want to know how you
    feel about the book or if you want to learn more about `SQL Server 2022`.


    > Bob Ward

    >

    > North Richland Hills, TX

    >

    > September 2022


    Acknowledgments


    I want to first thank God for sending his one and only son, Jesus, for the forgiveness
    of my sins, the immersion of the Holy Spirit, and the promise of everlasting life.
    Without my faith, I am nothing.


    I want to thank my wife, Ginger, so much for her love and dedication to me for
    all of our years together but especially during the writing of this book. You
    patiently allowed me to work crazy hours and situations even on some of our vacation
    time to bring this book to life. I also want to thank my sons Troy and Ryan, and
    Ryan’s wife Blair, my daughter-in-law. You all give me hope for the future as
    I see you all grow and exhibit grace and truth in everything you do.


    This is my fourth book with `Apress`, and I want to personally thank Jonathan
    Gennick from `Apress`. Jonathan gave me my first chance at authoring when many
    publication companies turned me down. Thank you, Jonathan, for always supporting
    me and letting me “write my way.” I also want to thank Jill Balzano from `Apress`
    whom I’ve never met in person but who always is so kind and professional despite
    all the crazy deadlines we try to meet.


    I asked Erin Stellato to be my technical reviewer because she is one of the deepest
    experts on `SQL` and just an incredible person. Turns out it was a blessing when
    she joined `Microsoft` during the writing of the book as we could discuss confidential
    information. Erin, thank you for your thoroughness and great attitude as we all
