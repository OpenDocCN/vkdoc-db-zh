- fmt: '# Announcing SQL Server 2022


    Preparing for an announcement of this magnitude is no simple task, and our entire
    team worked tirelessly in October and right up to the announcement for Ignite
    to have everything in order.


    Asad Khan and Anna Hoffman recorded their Ignite presentation announcing SQL Server
    2022 (you can see their original session at [`https://learn.microsoft.com/en-us/events/ignite-nov-2021/azure/breakouts/brk225/`](https://learn.microsoft.com/en-us/events/ignite-nov-2021/azure/breakouts/brk225/)).


    Joe, Pedro, and Kendal worked to make sure everything was lined up to have the
    Private Preview build and EAP registration setup.


    Matthew and Sonya worked to get our main website ([`https://aka.ms/sqlserver2022`](https://aka.ms/sqlserver2022))
    up and running and build a blog, which would be authored by our Corporate Vice
    President of Azure Data SQL Engineering, Peter Carlin (my manager, Asad Khan,
    works for Peter, and Peter works for Rohan Kumar) at [`https://cloudblogs.microsoft.com/sqlserver/2021/11/02/announcing-sql-server-2022-preview-azure-enabled-with-continued-performance-and-security-innovation`](https://cloudblogs.microsoft.com/sqlserver/2021/11/02/announcing-sql-server-2022-preview-azure-enabled-with-continued-performance-and-security-innovation).


    As we prepared for the big launch announcement, the famous Microsoft Mechanics
    team (led by Jeremy Chapman) reached out to me about recording a Mechanics video
    on SQL Server 2022. Microsoft Mechanics ([`https://aka.ms/microsoftmechanics`](https://aka.ms/microsoftmechanics))
    is just a cool team. The preparation that goes into the demos, the script, and
    the animations is a pure marvel. I recorded the session weeks before the announcement
    in my home in North Richland Hills, Texas, in one take! The result was a very
    popular video at [`https://aka.ms/sqlmechanics22`](https://aka.ms/sqlmechanics22).
    It was the #1 watched video produced for Microsoft Ignite. These types of videos
    are also a forcing function to get demos working even with early builds. I was
    able to collaborate with the Managed Instance team to get the link feature for
    Managed Instance working (along with Anna who demonstrated this in Asad''s session)
    with very early builds of both SQL Server 2022 and SSMS (SQL Server Management
    Studio). I worked with our team to get Synapse Link working and was able to craft
    up a fun demo (with a big thanks to Anna for building a machine learning model
    in Spark) with a bit of a Texas twist! And then a demo for what you will probably
    find out as you read this book is my favorite feature: Parameter-Sensitive Plan
    (PSP) optimization. PSP is "all engine," so I spun up an Azure Virtual Machine
    with "pre-CTP" bits and was able to modify a demo that Pedro Lopes and my good
    friend from development Jack Li gave me.


    In the weeks leading up to the announcement, Joe Sack asked me to do a few NDA
    presentations on SQL Server 2022 to some of our key partners to prepare them for
    our launch. It was pretty fun to do these as it was the first time I had actually
    told anyone about SQL Server 2022 outside of Microsoft.


    One last piece of promotion for the SQL Server 2022 Private Preview launch was
    a partnership with Intel for an article in *WIRED* magazine. The resulting article
    at [`https://www.wired.com/sponsored/story/data-is-driving-the-future-of-business`](https://www.wired.com/sponsored/story/data-is-driving-the-future-of-business)
    was wildly popular and received a lot of views at launch and for months afterward.


    One other interesting twist for me was a trip to Redmond the week before Ignite
    in late October 2021. Due to the pandemic, I had not traveled to Redmond since
    February of 2020. I went to Redmond for a few reasons. First, I needed to record
    a webinar in our Microsoft studios on SQL Server 2022 with Matt Burrows and Anna
    Hoffman. You can see that webinar on-demand at [`https://aka.ms/sqlserver2022webinar`](https://aka.ms/sqlserver2022webinar).
    The second reason was to record a demo for the PASS Summit keynote with Rohan
    and Peter Carlin. It was fun to record this because I recorded the demo using
    the PSP demo I did for Microsoft Mechanics, but the twist was having Conor Cunningham
    interrupt me during my recording. We kind of planned this out, but funny enough
    we captured it in the first take. It was fun to do since both of us were used
    to being on stage live with Rohan for the PASS keynote, which couldn''t happen
    in 2021. You can watch the recording of that keynote at [`https://youtu.be/Ydlg1KpmrKU?list=PLoGAcXKPcRvYWLmrDZJ9XTdSJAduAefm7`](https://youtu.be/Ydlg1KpmrKU?list=PLoGAcXKPcRvYWLmrDZJ9XTdSJAduAefm7).
    The third reason I traveled to Redmond was to meet some of my colleagues in person
    for the first time in almost 2 years. It was great to see folks in person again.
    While I was up there, Rie Merrit, who runs our MVP program, asked if I would do
    a preview announcement of SQL Server 2022 for the MVPs since we were making our
    big announcement the next week. It was really fun to do that session because it
    was the first time I had told a fairly large audience about SQL Server 2022. I''m
    used to keeping this type of confidential information, but it is still hard. For
    example, we had reserved slots for the PASS Summit the week after Ignite for SQL
    Server 2022 sessions but couldn''t even tell the PASS event organizers the details
    of our sessions. In addition, Thomas LaRock had invited me and others to come
    speak at their SQL Live event in Orlando in November ([`https://sqllive360.com/ECG/live360events/Events/Orlando-2021/SQL.aspx`](https://sqllive360.com/ECG/live360events/Events/Orlando-2021/SQL.aspx)),
    and I had reserved a session called "Microsoft SQL Engineering Session Under Wraps."
    The organizers were asking me, "Can''t you tell us anymore about this?" and my
    answer was "Not really." At the MVP session, I could hear Thomas in his head going,
    "Ah, that is why Bob couldn''t tell us." I had the same issue with sessions I
    was doing at the SQL Server and Azure SQL Conference (formerly SQLIntersection)
    in December in Las Vegas.


    It was a whirlwind week, which also marked my 28th work anniversary at Microsoft.
    From SQL OS/2 to now, I would have never dreamed I would be still working on SQL
    Server.


    Finally, on November 2nd at Microsoft Ignite, Scott Guthrie announced SQL Server
    2022. We launched all of our other assets along with Asad''s session as well at
    Ignite. I also feel that LinkedIn can be a powerful method to make announcements,
    so I crafted a LinkedIn article the day of launch at [`www.linkedin.com/posts/bobwardms_activity-6861322082387664896-mBzK`](http://www.linkedin.com/posts/bobwardms_activity-6861322082387664896-mBzK).


    I felt the reception of SQL Server 2022 Private Preview was very positive. I think
    many in the industry and community quite frankly wondered whether we would ever
    build another major version of SQL Server. I personally saw reviews and comments
    of surprise that we not only were building another version but also we were including
    some very fairly major enhancements including all the Azure-connected features,
    built-in query intelligence, SQL Ledger, and data virtualization. It was a little
    awkward to make this announcement because we started with Private Preview, which
    is not how we announced SQL Server 2019. There was a precedence for this with
    SQL Server 2017, but I realized the frustration this caused for some who were
    anxious to download the bits and see what was inside.'
