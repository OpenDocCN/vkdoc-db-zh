  trans: '### 何时使用 Azure SQL 托管实例


    与 Azure 虚拟机类似，`Azure SQL 托管实例` 面向 `SQL Server` 用户，他们希望由 Microsoft 来管理 `SQL Server`
    计算背后的基础设施和主机。`Azure SQL 托管实例` 更进一步，管理支持 `SQL Server` 的虚拟机环境。


    结合版本无关引擎、自动高可用性、自动备份以及 Microsoft 支持的 `SLA`，作为托管 `SQL Server` 的 `Azure SQL 托管实例`
    对于当今许多使用 `SQL Server` 的客户来说，可能是一个非常不错的选择。请记住，在第 3 章中，我们介绍了将 `Azure SQL 托管实例` 作为灾难恢复系统一部分的概念。这可能是您开始使用
    `Azure SQL 托管实例` 的途径。


    与 `Azure 虚拟机` 一样，您使用 `Azure` 订阅进行计费，但也有 `Azure 混合权益` 和预留容量选项来节省成本。


    是否存在与 `SQL Server` 的差异，可能使我无法选择 `Azure SQL 托管实例`？答案是肯定的，但不像您想象的那么多：


    *   `Azure SQL 托管实例` 包含数据库引擎以及其他功能，如复制、`Polybase` 和 `DTC`。如果您需要 `SSAS` 或 `SSRS`
    等服务，`Azure SQL 托管实例` 将不是您的选择。请注意，`SSIS` 包兼容 `Azure SQL 托管实例`。


    *   虽然 `Azure SQL 托管实例` 提供了大多数核心数据库引擎功能，但存在一些差异，详见 [`https://aka.ms/azuretsqldiff`](https://aka.ms/azuretsqldiff)。


    *   需要考虑一些资源限制。目前 `Azure SQL 托管实例` 的最大存储为 `16TB`（这是实例所有数据库的总和）。`80 vCores` 是我们目前支持的最大
    `CPU` 数，根据我们目前最先进的选项，您拥有的最大内存量约为 `~870Gb`。我们正在不断提高此限制，请通过 [`https://docs.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://docs.microsoft.com/azure/azure-sql/managed-instance/resource-limits)
    关注我们的更新。


    ### Azure SQL 数据库


    `Azure SQL` 产品系列中的最后一项服务是 `Azure SQL 数据库`。`Azure SQL 数据库` 是 `SQL` 在云端的起点。从一开始，我们就想创建一个概念，让开发者可以专注于数据库本身，而不必担心基础设施、虚拟机、`OS`
    甚至 `SQL Server` 实际。实际上，我们早期在 `SQL Server` 中作为包含数据库实现了这项工作。我也在《Azure SQL 内幕》一书中详细介绍了
    `Azure SQL 数据库`。


    我相信 `Azure SQL 数据库` 今天已经实现了其所有初始目标，但仍有更进一步的空间。`Azure SQL 数据库` 代表了 `Azure SQL`
    产品系列中最`托管的服务`。它是 `Azure SQL` 的最高级别 `PaaS`。它具备 `Azure SQL 托管实例` 的所有托管功能，如版本无关、自动备份、内置
    `HA` 等。它更进一步采用了托管概念，因为您无需关心 `SQL Server` 实际。


    注意


    我们确实会让人困惑，因为 `Azure SQL 数据库` 具有`逻辑服务器`的概念，它实际上是一组元数据，支持多个数据库以及有关数据库的连接/安全信息。但它不是一个物理的
    `SQL Server` 实例。


    与 `Azure SQL 托管实例` 不同，部署 `Azure SQL 数据库` 时有两个有趣的选择，称为`无服务器`和`超大规模`。


    部署 `Azure SQL 数据库` 时，您通常像为托管实例一样为数据库选择 `vCores` 数量。`无服务器` 允许您选择一个 `vCores` 的 `范围`，以便我们可以自动扩展或缩减您的工作负载。这也开启了仅为使用的
    `vCores` 支付 `无服务器` 费用的能力。此外，`无服务器` 具有暂停/恢复功能。因此，如果您不使用数据库，我们将暂停计算，在此期间您无需支付任何
    `vCore` 使用费用。当您再次连接时，我们会“恢复”您的数据库，正常的计费将继续。对于任何使用 `Azure SQL 数据库` 的新开发者来说，这可能是一个非常吸引人的选择。


    `超大规模` 正如其名而构建——为您提供无限的数据库资源、计算、内存和存储。事实上，`超大规模` 目前可以在 `Azure` 中支持 `100TB` 的数据库。它是我们在云端拥有的最大的数据库选项。`超大规模`
    还提供`自动`存储。您无需选择最大存储选项。您只需创建一个数据库，我们会根据您的需要不断扩展其增长。您确实需要为 `超大规模` 选择 `vCores`，这决定了您的内存限制。但
    `超大规模` 使用分布式、分层的架构和分页系统（这是我们在 `100TB` 级别仍能提供速度的原因之一），因此在性能方面，这些限制并不那么重要。此外，您的应用程序可以随
    `超大规模` 扩展的方式之一是使用副本，包括最多 `30` 个用于读取扩展的命名副本。此架构不使用 `Always On 可用性组`，而是使用基于日志的变更方法来实现大规模下的相同概念，并具有内置的高可用性。


    想象一下这些数据库选项。如果我们把 `无服务器` 和 `超大规模` 结合在一起会怎样！（敬请关注；它可能比您想象的来得更快。）


    虽然 `Azure SQL 数据库` 为您提供了核心引擎能力，但它也确实限制了您，因为您无法访问实例级别的功能。因此，`SQL Server Agent`
    作业、复制（尽管 `Azure SQL 数据库` 可以作为订阅者）、资源调控器和 `DTC` 等功能在 `Azure SQL 数据库` 中不受支持。这些功能保留用于需要完整
    `SQL Server` 实例的场景。


    好消息是，`Azure SQL 数据库` 包含了您在本书中读到的关于 `SQL Server 2022` 的大部分创新功能，包括 `Synapse Link`、`Microsoft
    Purview` 策略、`Azure Active Directory (AAD)`、`Microsoft Defender`、内置查询智能、`Ledger`
    等。


    最近，我们一直在为 `Azure SQL 数据库` 的开发者进行投资，包括本地开发者体验（使用容器）、`Azure SQL` 函数绑定、新的改进的 `JSON`
    支持以及内置引擎的 `REST API` 集成。您可以在 [`https://docs.microsoft.com/events/build-2022/brk20-modernize-your-applications-with-new-innovations-across-sql-server-2022-azure-sql`](https://docs.microsoft.com/events/build-2022/brk20-modernize-your-applications-with-new-innovations-across-sql-server-2022-azure-sql)
    了解更多关于这些激动人心的开发者新功能。


    立即通过 [`https://aka.ms/azuresqldb`](https://aka.ms/azuresqldb) 开始使用 `Azure SQL
    数据库`。'
- fmt: '### When to Use Azure SQL Database


    Given that Azure SQL Database is focused on the concept of "just a database,"
    I believe this option is best for developers building new applications, especially
    applications that are designed to run in `Azure`. In fact, the focus of the team
    behind `Azure SQL Database` is to make it the best developer experience we can
    for applications that need data.


    Don''t be fooled by the term "developers." While we want the developer experience
    to be great, `Azure SQL Database` has a proven history of supporting enterprise-grade
    workloads. I remember delivering a keynote address at an event called Visual Studio
    Live! in the summer of 2022. As part of the keynote, I delivered some stunning
    numbers on `Azure SQL Database`:

    * On average we support around 160,000+ active customers a month.

    * `Azure SQL Database` applications execute around 35 *trillion* queries a month.

    * `Azure SQL Database` hosts around 8 million active databases a month.

    * We manage around 40 petabytes of data across all of `Azure SQL Database` customers.

    * We actively have a customer with a 97TB production database application using
    `Hyperscale`.


    Even though `Azure SQL Database` is targeted for these types of modern applications,
    we have seen customers migrate `SQL Server` databases to `Azure SQL Database`
    namely because they didn''t need instance-level features and loved the concepts
    of options like `Hyperscale`.


    ## Azure Arc–Enabled SQL Managed Instance


    I know many in the community were disappointed to see us retire the `SQL Server
    Big Data Clusters (BDC)` option of `SQL Server 2019` in early 2022. `BDC` was
    all built on container images running on `Kubernetes`. One benefit of this work
    was that we learned how to run `SQL Server` containers in `Kubernetes` as a managed
    `SQL` service. We found we could bring the power of `Azure SQL Managed Instance`
    to the infrastructure of your choice using `Kubernetes`. That is the simplest
    way to define `Azure Arc–enabled SQL Managed Instance (Arc SQL MI)`. In fact I
    remember Dinakar Nethi, Principal Program Manager for `Azure Arc`, once saying
    to me, "`Azure Arc–`enabled Managed Instance is the mirror of `Azure SQL Managed
    Instance` outside of `Azure`."


    Like `Azure SQL Managed Instance`, `Arc SQL MI` is versionless and includes built-in
    `HA` with replicas, automatic backups, and failover groups. `Arc SQL MI` even
    has service tiers like `Azure SQL Managed Instance` and supports a cloud billing
    model (including `Azure Hybrid Benefit`). One advantage `Arc SQL MI` has over
    `Azure SQL Managed Instance` is a free developer edition option for developing
    applications.


    All this is achieved through a series of container images running in pods including
    the main `SQL Server` container image and a set of `Kubernetes` pods called the
    data controller. Figure [11-2](#525217_1_En_11_Chapter.xhtml#Fig2) is an architecture
    diagram I often use to describe `Arc SQL MI`.


    ![](Images/525217_1_En_11_Fig2_HTML.png)


    A chart of the main `SQL Server` container is listed in 5 parts labeled 1 through
    5. `Azure` arc resources directly lead to `Azure` agents and nodes, and indirectly
    to inventory billing.


    Figure 11-2


    `Azure Arc–enabled SQL Managed Instance` architecture


    You can learn more about the components of this architecture in a `Microsoft Learn`
    module Buck Woody and I developed at [`https://aka.ms/learnazurearcdata`](https://aka.ms/learnazurearcdata).


    One of the keys to `Arc SQL MI` is `Kubernetes`. `Kubernetes` provides the software
    platform to help us achieved a managed service. We provide a list of supported
    `Kubernetes` distributions at [`https://docs.microsoft.com/azure/azure-arc/data/plan-azure-arc-data-services#deployment-requirements`](https://docs.microsoft.com/azure/azure-arc/data/plan-azure-arc-data-services#deployment-requirements).
    We have also built a validation program with our partners so you can see hardware
    and `Kubernetes` solutions that are proven and trusted at [`https://docs.microsoft.com/azure/azure-arc/data/validation-program`](https://docs.microsoft.com/azure/azure-arc/data/validation-program).


    Notice in Figure [11-2](#525217_1_En_11_Chapter.xhtml#Fig2) the connectivity to
    `Azure`. The entire `Azure Arc` story is built on bringing the power of `Azure`
    to your infrastructure or cloud but connecting services to `Azure` (hence the
    term `Arc` or `arcing` together two worlds, `Azure` and yours). `Azure Arc–enabled
    SQL Managed Instance` is considered a full hybrid solution because you can run
    your managed `SQL` instance in your data center and yet be connected to `Azure`
    for added value (inventory, metrics, logs, cloud billing, and more).


    Because `Arc SQL MI` is based on `SQL Server Linux` containers, it has the same
    feature set as `SQL Server on Linux` and containers. The big difference is that
    `Arc SQL MI` doesn''t follow a major version. In fact it is our goal to align
    the feature set and enhancements with `Azure SQL Managed Instance`.


    Get started with `Azure Arc–enabled SQL Managed Instance` at [`https://aka.ms/azurearcsqlmi`](https://aka.ms/azurearcsqlmi).


    ### When to Use Azure Arc–Enabled SQL Managed Instance


    If you want the features of `Azure SQL Managed Instance` but you cannot move to
    the `Azure` cloud, then `Azure Arc–enabled SQL Managed Instance` could be the
    solution for you. Anywhere you can run a supported `Kubernetes` distribution,
    your infrastructure or multi-cloud, we can support your `Azure Arc–enabled SQL
    Managed Instance`. Furthermore, you get the added value of connecting your deployment
    to `Azure`, either indirect or direct.


    In my experience the learning curve is usually `Kubernetes`. I have found some
    companies have experience with `Kubernetes` so are very comfortable with this
    platform. Others come from a complete `Windows Server` world so have to figure
    out if they can make this shift. I''ve found `Azure Stack HCI` to be a compelling
    solution because it includes a `Kubernetes` distribution Microsoft supports (`Azure
    Kubernetes Service`) but also allows you to run virtual machines with `SQL Server`
    on `Windows` or `Linux`. Learn more at [`https://aka.ms/azurestackhci`](https://aka.ms/azurestackhci).


    One nice story of `Arc SQL MI` is database compatibility since this solution is
    built on the `SQL Server on Linux` engine. Just back up a database from `SQL Server
    on Windows` and restore it to `Azure Arc–enabled SQL Managed Instance`.


    ## SQL Is Everywhere You Need It


    The `SQL` edge to cloud story is deep, wide, and powerful. `SQL` is everywhere
    you need it: familiar, compatible, and flexible. `SQL` supports the newest startups
    that aspire to be Fortune 500 companies. We grow and scale with your business
    using the same application languages, engine, and tools.


    Each time I talk to a customer about `SQL` edge to cloud, they are trying to see
    how they can choose multiple options. That is because not every workload or business
    fits into just one slot. The great story about `SQL` is that you can use your
    existing skills and knowledge with `SQL Server` across all options. And you can
    see that in almost every option `SQL` connects to each other, bringing hybrid
    capabilities.


    The `SQL` edge to cloud story is bringing worlds together in new and innovative
    ways allowing you to maximize and protect your investments. `SQL` allows you to
    grow your business and your skills scaling with your future. `SQL` is no longer
    just an `RDBMS` engine. `SQL` is a truly hybrid data platform, the world''s database,
    edge to cloud.'
  raw: '### When to Use Azure SQL Database


    Given that Azure SQL Database is focused on the concept of “just a database,”
    I believe this option is best for developers building new applications, especially
    applications that are designed to run in Azure. In fact, the focus of the team
    behind Azure SQL Database is to make it the best developer experience we can for
    applications that need data.


    Don’t be fooled by the term “developers.” While we want the developer experience
    to be great, Azure SQL Database has a proven history of supporting enterprise-grade
    workloads. I remember delivering a keynote address at an event called Visual Studio
    Live! in the summer of 2022\. As part of the keynote, I delivered some stunning
    numbers on Azure SQL Database:


    *   On average we support around 160,000+ active customers a month.


    *   Azure SQL Database applications execute around 35 *trillion* queries a month.


    *   Azure SQL Database hosts around 8 million active databases a month.


    *   We manage around 40 petabytes of data across all of Azure SQL Database customers.


    *   We actively have a customer with a 97TB production database application using
    Hyperscale.


    Even though Azure SQL Database is targeted for these types of modern applications,
    we have seen customers migrate SQL Server databases to Azure SQL Database namely
    because they didn’t need instance-level features and loved the concepts of options
    like Hyperscale.


    ## Azure Arc–Enabled SQL Managed Instance


    I know many in the community were disappointed to see us retire the SQL Server
    Big Data Clusters (BDC) option of SQL Server 2019 in early 2022\. BDC was all
    built on container images running on Kubernetes. One benefit of this work was
    that we learned how to run SQL Server containers in Kubernetes as a managed SQL
    service. We found we could bring the power of Azure SQL Managed Instance to the
    infrastructure of your choice using Kubernetes. That is the simplest way to define
    Azure Arc–enabled SQL Managed Instance (Arc SQL MI). In fact I remember Dinakar
    Nethi, Principal Program Manager for Azure Arc, once saying to me, *“Azure Arc–*enabled
    Managed Instance is the mirror of Azure SQL Managed Instance outside of Azure*.”*


    Like Azure SQL Managed Instance, Arc SQL MI is versionless and includes built-in
    HA with replicas, automatic backups, and failover groups. Arc SQL MI even has
    service tiers like Azure SQL Managed Instance and supports a cloud billing model
    (including Azure Hybrid Benefit). One advantage Arc SQL MI has over Azure SQL
    Managed Instance is a free developer edition option for developing applications.


    All this is achieved through a series of container images running in pods including
    the main SQL Server container image and a set of Kubernetes pods called the data
    controller. Figure [11-2](#525217_1_En_11_Chapter.xhtml#Fig2) is an architecture
    diagram I often use to describe Arc SQL MI.


    ![](Images/525217_1_En_11_Fig2_HTML.png)


    A chart of the main S Q L server container is listed in 5 parts labeled 1 through
    5\. Azure arc resources directly lead to azure agents and nodes, and indirectly
    to inventory billing.


    Figure 11-2


    Azure Arc–enabled SQL Managed Instance architecture


    You can learn more about the components of this architecture in a Microsoft Learn
    module Buck Woody and I developed at [`https://aka.ms/learnazurearcdata`](https://aka.ms/learnazurearcdata).


    One of the keys to Arc SQL MI is Kubernetes. Kubernetes provides the software
    platform to help us achieved a managed service. We provide a list of supported
    Kubernetes distributions at [`https://docs.microsoft.com/azure/azure-arc/data/plan-azure-arc-data-services#deployment-requirements`](https://docs.microsoft.com/azure/azure-arc/data/plan-azure-arc-data-services#deployment-requirements).
    We have also built a validation program with our partners so you can see hardware
    and Kubernetes solutions that are proven and trusted at [`https://docs.microsoft.com/azure/azure-arc/data/validation-program`](https://docs.microsoft.com/azure/azure-arc/data/validation-program).


    Notice in Figure [11-2](#525217_1_En_11_Chapter.xhtml#Fig2) the connectivity to
    Azure. The entire Azure Arc story is built on bringing the power of Azure to your
    infrastructure or cloud but connecting services to Azure (hence the term Arc or
    *arcing* together two worlds, Azure and yours). Azure Arc–enabled SQL Managed
    Instance is considered a full hybrid solution because you can run your managed
    SQL instance in your data center and yet be connected to Azure for added value
    (inventory, metrics, logs, cloud billing, and more).


    Because Arc SQL MI is based on SQL Server Linux containers, it has the same feature
    set as SQL Server on Linux and containers. The big difference is that Arc SQL
    MI doesn’t follow a major version. In fact it is our goal to align the feature
    set and enhancements with Azure SQL Managed Instance.


    Get started with Azure Arc–enabled SQL Managed Instance at [`https://aka.ms/azurearcsqlmi`](https://aka.ms/azurearcsqlmi).


    ### When to Use Azure Arc–Enabled SQL Managed Instance


    If you want the features of Azure SQL Managed Instance but you cannot move to
    the Azure cloud, then Azure Arc–enabled SQL Managed Instance could be the solution
    for you. Anywhere you can run a supported Kubernetes distribution, your infrastructure
    or multi-cloud, we can support your Azure Arc–enabled SQL Managed Instance. Furthermore,
    you get the added value of connecting your deployment to Azure, either indirect
    or direct.


    In my experience the learning curve is usually Kubernetes. I have found some companies
    have experience with Kubernetes so are very comfortable with this platform. Others
    come from a complete Windows Server world so have to figure out if they can make
    this shift. I’ve found Azure Stack HCI to be a compelling solution because it
    includes a Kubernetes distribution Microsoft supports (Azure Kubernetes Service)
    but also allows you to run virtual machines with SQL Server on Windows or Linux.
    Learn more at [`https://aka.ms/azurestackhci`](https://aka.ms/azurestackhci).


    One nice story of Arc SQL MI is database compatibility since this solution is
    built on the SQL Server on Linux engine. Just back up a database from SQL Server
    on Windows and restore it to Azure Arc–enabled SQL Managed Instance.


    ## SQL Is Everywhere You Need It


    The SQL edge to cloud story is deep, wide, and powerful. SQL is everywhere you
    need it: familiar, compatible, and flexible. SQL supports the newest startups
    that aspire to be Fortune 500 companies. We grow and scale with your business
    using the same application languages, engine, and tools.


    Each time I talk to a customer about SQL edge to cloud, they are trying to see
    how they can choose multiple options. That is because not every workload or business
    fits into just one slot. The great story about SQL is that you can use your existing
    skills and knowledge with SQL Server across all options. And you can see that
    in almost every option SQL connects to each other, bringing hybrid capabilities.


    The SQL edge to cloud story is bringing worlds together in new and innovative
    ways allowing you to maximize and protect your investments. SQL allows you to
    grow your business and your skills scaling with your future. SQL is no longer
    just an RDBMS engine. SQL is a truly hybrid data platform, the world’s database,
    edge to cloud.'
  trans: '

    ### 何时使用 Azure SQL 数据库


    鉴于 Azure SQL 数据库专注于“纯粹是一个数据库”的理念，我认为此选项最适合构建新应用程序的开发人员，尤其是那些设计为在 `Azure` 中运行的应用程序。事实上，`Azure
    SQL 数据库` 背后团队的重点是将其打造为面向需要数据的应用程序所能提供的最佳开发者体验。


    不要被“开发者”这个词所误导。虽然我们希望开发者体验出色，但 `Azure SQL 数据库` 在支持企业级工作负载方面拥有 proven 的历史。我记得在
    2022 年夏季一个名为 Visual Studio Live! 的活动中发表过主题演讲。作为演讲的一部分，我公布了一些关于 `Azure SQL 数据库`
    的惊人数字：

    * 我们平均每月支持约 160,000 多个活跃客户。

    * `Azure SQL 数据库` 应用程序每月执行约 35 *万亿* 次查询。

    * `Azure SQL 数据库` 每月托管约 800 万个活跃数据库。

    * 我们管理着所有 `Azure SQL 数据库` 客户总计约 40 PB 的数据。

    * 我们目前有一家客户正使用 `Hyperscale` 托管着一个 97TB 的生产数据库应用程序。


    尽管 `Azure SQL 数据库` 针对的是这类现代应用程序，但我们已看到客户将 `SQL Server` 数据库迁移到 `Azure SQL 数据库`，主要因为他们不需要实例级功能，并且非常青睐像
    `Hyperscale` 这样的选项理念。


    ## Azure Arc 启用的 SQL 托管实例


    我知道社区中许多人对我们于 2022 年初退役 `SQL Server 2019` 的 `SQL Server 大数据群集 (BDC)` 选项感到失望。`BDC`
    完全构建在运行于 `Kubernetes` 上的容器镜像之上。这项工作的一个好处是，我们学会了如何将 `SQL Server` 容器作为托管的 `SQL`
    服务在 `Kubernetes` 中运行。我们发现可以使用 `Kubernetes` 将 `Azure SQL 托管实例` 的强大功能带到您选择的任何基础设施上。这就是定义
    `Azure Arc 启用的 SQL 托管实例 (Arc SQL MI)` 的最简单方式。事实上，我记得 `Azure Arc` 的首席项目经理 Dinakar
    Nethi 曾对我说：“`Azure Arc 启用的托管实例` 是 `Azure` 之外的 `Azure SQL 托管实例` 的镜像。”


    与 `Azure SQL 托管实例` 类似，`Arc SQL MI` 是无版本的，并包含内置的 `HA`（含副本）、自动备份和故障转移组。`Arc SQL
    MI` 甚至拥有与 `Azure SQL 托管实例` 类似的服务层级，并支持云计费模型（包括 `Azure 混合权益`）。`Arc SQL MI` 相对于
    `Azure SQL 托管实例` 的一个优势是，它提供了用于开发应用程序的免费开发者版本选项。


    所有这些是通过一系列在 Pod 中运行的容器镜像实现的，包括主要的 `SQL Server` 容器镜像和一组称为数据控制器的 `Kubernetes` Pod。图
    11-2 是我经常用来描述 `Arc SQL MI` 的架构图。


    ![](img/525217_1_En_11_Fig2_HTML.png)


    图中显示了主要的 `SQL Server` 容器图表，分为标记为 1 到 5 的 5 个部分。`Azure` Arc 资源直接导向 `Azure` 代理和节点，并间接导向清单计费。


    图 11-2


    `Azure Arc 启用的 SQL 托管实例` 架构


    您可以在 Buck Woody 和我开发的 `Microsoft Learn` 模块中了解更多关于此架构组件的信息：[`https://aka.ms/learnazurearcdata`](https://aka.ms/learnazurearcdata)。


    `Arc SQL MI` 的关键之一是 `Kubernetes`。`Kubernetes` 提供了软件平台，帮助我们实现了托管服务。我们在 [`https://docs.microsoft.com/azure/azure-arc/data/plan-azure-arc-data-services#deployment-requirements`](https://docs.microsoft.com/azure/azure-arc/data/plan-azure-arc-data-services#deployment-requirements)
    提供了受支持的 `Kubernetes` 发行版列表。我们还与合作伙伴建立了一个验证计划，您可以在 [`https://docs.microsoft.com/azure/azure-arc/data/validation-program`](https://docs.microsoft.com/azure/azure-arc/data/validation-program)
    查看经过验证且值得信赖的硬件和 `Kubernetes` 解决方案。


    请注意图 11-2 中与 `Azure` 的连接。整个 `Azure Arc` 的理念建立在将 `Azure` 的强大功能引入您的基础设施或云之上，同时将服务连接到
    `Azure`（因此使用了 `Arc` 或“连接”两个世界——`Azure` 和您的世界——的术语）。`Azure Arc 启用的 SQL 托管实例` 被认为是一个完整的混合解决方案，因为您可以在数据中心运行托管的
    `SQL` 实例，同时连接到 `Azure` 以获得附加价值（清单、指标、日志、云计费等）。


    由于 `Arc SQL MI` 基于 `SQL Server Linux` 容器，因此它具有与 `SQL Server on Linux` 和容器相同的功能集。最大的不同是
    `Arc SQL MI` 不遵循主要版本。事实上，我们的目标是使功能集和增强功能与 `Azure SQL 托管实例` 保持一致。


    请从 [`https://aka.ms/azurearcsqlmi`](https://aka.ms/azurearcsqlmi) 开始使用 `Azure
    Arc 启用的 SQL 托管实例`。


    ### 何时使用 Azure Arc 启用的 SQL 托管实例


    如果您想要 `Azure SQL 托管实例` 的功能，但又无法迁移到 `Azure` 云，那么 `Azure Arc 启用的 SQL 托管实例` 可能是您的解决方案。在任何可以运行受支持的
    `Kubernetes` 发行版的地方——无论是您的基础设施还是多云环境——我们都能支持您的 `Azure Arc 启用的 SQL 托管实例`。此外，您还能获得将您的部署连接到
    `Azure` 的附加价值，无论是间接还是直接连接。


    根据我的经验，学习曲线通常是 `Kubernetes`。我发现有些公司拥有 `Kubernetes` 经验，因此对这个平台非常适应。另一些公司则完全来自 `Windows
    Server` 世界，因此需要弄清楚是否能够完成这种转变。我发现 `Azure Stack HCI` 是一个引人注目的解决方案，因为它包含 Microsoft
    支持的 `Kubernetes` 发行版（`Azure Kubernetes Service`），并且允许您在 `Windows` 或 `Linux` 上运行带有
    `SQL Server` 的虚拟机。更多信息请访问 [`https://aka.ms/azurestackhci`](https://aka.ms/azurestackhci)。


    `Arc SQL MI` 的一个亮点是数据库兼容性，因为此解决方案基于 `SQL Server on Linux` 引擎。只需从 `Windows` 上的
    `SQL Server` 备份一个数据库，然后将其还原到 `Azure Arc 启用的 SQL 托管实例` 即可。


    ## SQL 无处不在，触手可及


    `SQL` 从边缘到云的故事深邃、广泛且强大。`SQL` 无处不在，触手可及：熟悉、兼容且灵活。`SQL` 支持着那些渴望成为财富 500 强的最新初创公司。我们使用相同的应用程序语言、引擎和工具，伴随您的业务一起成长和扩展。


    每次我与客户谈论 `SQL` 从边缘到云时，他们都在尝试了解如何选择多个选项。这是因为并非每个工作负载或业务都恰好适合一个槽位。`SQL` 的一个伟大之处在于，您可以在所有选项中运用您现有的
    `SQL Server` 技能和知识。而且您几乎可以在每个选项中看到 `SQL` 彼此连接，带来混合能力。


    `SQL` 从边缘到云的故事正在以新颖创新的方式将世界连接起来，使您能够最大化和保护您的投资。`SQL` 让您能够发展业务和技能，与您的未来共同扩展。`SQL`
    不再仅仅是一个 `RDBMS` 引擎。`SQL` 是一个真正的混合数据平台，是世界性的数据库，从边缘到云。

