    #### 为何选择托管式灾难恢复？


    本章节的标题以*托管式灾难恢复*开头。我称其为*托管式*是因为，借助此功能，你的灾难恢复 (DR) 站点将使用平台即服务 (PaaS) SQL。SQL Server
    本身具备构建 DR 站点的所有功能，但你必须自行管理它，并确保在需要时它可用。


    一旦你将 SQL Server 链接到托管实例，Microsoft 就会为你管理 DR 站点。Microsoft 通过托管实例管理整个基础架构、可用性以及
    SQL Server 数据库的备份。这样，你就可以放心，当你需要 DR 站点时，它将随时可用并准备就绪。


    #### SQL Server 与数据库版本兼容性


    你可能早就知道，我们不允许你将较新主要版本的 SQL Server 数据库备份还原到较旧的主要版本。当你执行 `RESTORE` T-SQL 语句时，会遇到错误，提示备份的版本*高于*当前版本。


    实际上，不兼容性存在于数据库级别，而非实例级别。每个 SQL Server 主要版本的数据库都有一个版本号。你可以使用 T-SQL 函数 `DATABASEPROPERTYEX(<db>,
    ‘Version’)` 查看此版本。你也可以使用 `RESTORE HEADERONLY` T-SQL 语句来查看备份的 `DatabaseVersion`。


    实际情况是，当我们构建一个新的主要版本的 SQL Server 时，我们通常会进行一些更改，这些更改会影响数据库在构建新软件版本*期间*的版本兼容性（不是数据库兼容性级别）。这包括像系统表修改这样的变更。由于这些更改依赖于新版本的代码，因此无法在旧版本中访问新代码。在构建新的主要版本时，数据库版本可能会经历多个*小版本跳跃*或*步骤*（实际上，每个
    CTP 构建通常都会有几次小版本跳跃）。一旦我们发布了某个主要版本的正式版 (General Availability)，我们会锁定该数据库版本，直到下一个主要版本。我们绝不会在累积更新中更改此版本号，这就解释了为什么它们彼此兼容。当你将旧版本的数据库备份还原到新版本时，可以看到这些版本跳跃的过程。在
    `RESTORE` 的输出中，你可能会看到几条这样的消息：


    ```

    Database ''WideWorldImporters'' running the upgrade step from version 928 to version
    929.

    ```


    在我们构建每个主要版本的过程中，可能会有多个这样的“步骤”。从版本号可以看出，多年来我们已经进行了多次这样的操作。


    由于 Azure SQL 托管实例是*无版本*的，它将始终*领先于* SQL Server 的主要版本。这就是为什么你无法将 Azure SQL 托管实例的数据库备份还原到
    SQL Server。


    随着 Azure SQL 托管实例与 SQL Server 2022 链接功能的发布，我们提供了一项能力，使得 Azure SQL 托管实例可以在数据库版本级别上与
    SQL Server 2022 *兼容*。这就是我们如何支持离线灾难恢复流程的方式。一个被标记为兼容的 Azure SQL 托管实例的备份，可以被还原到 SQL
    Server 2022 实例，因为它们将使用**相同的数据库版本**。


    灾难恢复概念是*离线*的，因为在你将数据库从 Azure SQL 托管实例还原到 SQL Server 2022 并完成恢复和运行之前，你的 SQL Server
    2022 应用程序将处于停机状态。


    让我们通过一个练习来看看 Azure SQL 托管实例的链接功能如何用于离线灾难恢复。


    本练习基于我们文档中的步骤，文档地址为 `https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview#use-the-link-feature`。在这个练习中，我们将使用
    SSMS 来执行复制和故障转移的步骤。从该文档页面你也可以看到使用 T-SQL 和 PowerShell 执行相同过程的步骤。阅读这些内容以了解复制和故障转移在后台如何工作可能会很有趣。


    我要亲自感谢 Microsoft 的 Dani Ljepava 和 Mladen Andzic。他们在帮助我创建这些练习方面发挥了重要作用。


    #### 先决条件


    *   使用你的 Azure 订阅部署一个 Azure SQL 托管实例。你可以在我们的文档中查看快速入门指南：`https://docs.microsoft.com/azure/azure-sql/managed-instance/instance-create-quickstart`。部署托管实例时，请务必选择与你的源
    SQL Server 排序规则相匹配的排序规则。你可以使用 T-SQL 语句 `SELECT SERVERPROPERTY(N''Collation'')`
    检查你的 SQL Server 排序规则。同时记下你创建的 SQL 管理员帐户，因为你需要它通过 SSMS 登录到托管实例。

    *   一个带有容器的 Azure 存储帐户，用于存储托管实例的数据库备份。请使用此文档页面作为在 Azure 中创建存储帐户的快速入门指南：`https://docs.microsoft.com/azure/storage/common/storage-account-create`。使用此快速入门页面在你的存储帐户中创建容器：`https://docs.microsoft.com/azure/storage/blobs/storage-quickstart-blobs-portal#create-a-container`。

    *   一台至少有两个 CPU 和 8GB 内存的虚拟机或计算机。链接功能同时支持 Windows 和 Linux。本章中的练习将向你展示在 Windows
    上使用链接功能的说明。

    *   具有数据库引擎功能的 SQL Server 2022 评估版。

    *   SQL Server Management Studio (SSMS)。最新的 18.x 或 19.x 版本均可使用。

    *   你需要 SQL Server 和 Azure 之间的网络连接。如果你的 SQL Server 运行在本地，请使用 VPN 链接或 ExpressRoute
    专线。如果你的 SQL Server 运行在 Azure 虚拟机上，请将你的虚拟机部署到与托管实例相同的子网，或者使用全局 VNet 对等互连来连接两个独立的子网。在本练习中，我为
    SQL Server 部署了一台 Azure 虚拟机，并将其与 Azure SQL 托管实例放在同一个子网中。这是测试此功能最快的方式。如果你需要其他选项，可能需要获取一些关于
    Azure 网络的帮助。Azure 网络的完整指南可在 `https://docs.microsoft.com/azure/networking` 获取。

    *   将 WideWorldImporters `Standard` 示例备份从 `https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak`
    下载到你将运行 SQL Server 的机器上。使用 `Standard` 备份是因为它不包含内存优化表，如果你为托管实例选择了通用目的服务层，内存优化表将不受支持。

    *   从书籍示例的 `ch3_cloudconnected\milinkdr` 文件夹中获取的脚本副本。

