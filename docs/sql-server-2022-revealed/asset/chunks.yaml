- fmt: "### Ledger for SQL Server\n\nLedger for SQL Server 是存储在 SQL Server 数据库中的防篡改数据记录。区块链技术的发明是为了提供一个*数字账本*，它使用加密哈希来确保交易有效且可信。最初的区块链概念在2000年代末为支持加密货币比特币而进入公众视野。事实上，当我与一些人谈论*区块链*这个术语时，他们似乎认为区块链就等于比特币。然而，数字账本的概念除了支持比特币交易外，还有许多其他应用。区块链的一个主要优势在于，它允许多方参与一个交易系统，其中没有任何一方可以被信任来管理数据的真实性。许多区块链实施面临的一个挑战是，它们是去中心化的，需要分布式算法，这常常导致性能问题并妨碍数据管理能力。而性能和数据管理能力正是\
    \ SQL Server 擅长的两个方面。\n\n#### Ledger for SQL Server 的背景\n\n2018年，微软开始探索区块链和关系数据库的世界是否能融合成一个数字账本解决方案。根据微软首席软件工程师\
    \ Panagiotis Antonopoulos 的说法：\n\n> *2018年，我们与微软研究院一起，开始致力于寻找一种架构，以弥合区块链与关系数据库之间的鸿沟，从而提供两种技术的优势。我们评估了不同的设计选项，包括让\
    \ SQL Server 在去中心化配置中运行（使用区块链的高级共识算法），或在更符合传统 SQL Server 设置的中心化环境中运行。我们分析了这些选项的技术可行性，并与大量区块链客户进行了交流，以了解他们在采用该技术时面临的挑战。这是一个非常有教育意义的过程，它让我们清楚地认识到，去中心化尽管有其安全优势，却使得区块链的开发和管理变得昂贵而复杂，给企业客户的采用带来了巨大阻力。*\n\
    \n> **注意**\n>\n> 如果你认出 Panagiotis Antonopoulos 这个名字，他是我们在 SQL Server 2019 中引入的极其酷炫的技术——加速数据库恢复（ADR）的主要开发者之一。他就是在构建出色的软件！\n\
    \n这项研究努力促成了 Ledger for SQL Server 的开发。这项工作最初在 Azure SQL Database 中开始。你可以在 [`https://aka.ms/sqlledgerpaper`](https://aka.ms/sqlledgerpaper)\
    \ 阅读关于原始项目的介绍。\n\nLedger for SQL Server 使用了成熟的区块链技术，如加密数据结构（例如哈希链和 Merkle 树）。（如果你感兴趣，白皮书详细介绍了什么是\
    \ Merkle 树。）Ledger for SQL Server 的关键之一是充分利用……嗯，SQL Server。Ledger for SQL Server\
    \ 内置于产品本身，无需更改应用程序、特殊提供程序或代码。只需使用 T-SQL。\n\nPanagiotis 总结了 Ledger for SQL Server\
    \ 的强大之处：*“尽管数据是集中存储的，但各个组织可以使用这些摘要来验证数据完整性。这种解决方案的简单性和透明度使我们能够将区块链商品化，并使所有 SQL\
    \ 用户能够以极低的成本和复杂性利用其优势。”*\n\n由于这种能力，我喜欢将 Ledger 视为一种**数据完整性**的形式。让我们看看它是如何工作的，以了解原因。\n\
    \n#### 工作原理\n\nLedger for SQL Server 由以下组件构成：\n\n*   `Ledger tables`（账本表）\n  \
    \  *   用户使用 `CREATE TABLE` 语法的扩展来创建账本表。账本表可以是*可更新的*或*仅追加的*。可更新的账本表非常适合审计场景。仅追加表只允许\
    \ `INSERT` 语句，这可以是多方信任场景的一个很好的解决方案。\n*   `Ledger history tables`（账本历史表）\n    *\
    \   可更新的账本表具有类似时间表的内置历史记录，但附带额外的事务信息，这些信息与发起更改的 SQL 主体相关联。\n*   `Ledger views`（账本视图）\n\
    \    *   当你创建一个账本表时，我们会自动构建一个视图，该视图将账本表与账本历史表连接起来，以提供一个整合的视图。\n*   `Database ledger`（数据库账本）\n\
    \    *   *数据库账本*是一组系统表，包含数据库中所有账本表的所有事务的详细信息、加密哈希和 Merkle 树。这是提供数据防篡改记录的关键组件之一。\n\
    *   `Digests`（摘要）\n    *   数据库账本中最新区块的哈希称为数据库**摘要**。它代表了该区块生成时数据库中所有账本表的状态。我喜欢将摘要视为数据库中区块链的*校验和*。摘要是实现防篡改记录的另一个关键组件，因为它是生成并存储在\
    \ SQL Server *之外*的。\n\n图 [6-1](#525217_1_En_6_Chapter.xhtml#Fig1) 展示了这些组件如何为一个可更新的账本表协同工作。\n\
    \n![](Images/525217_1_En_6_Fig1_HTML.jpg)\n\n图 6-1\n带有可更新账本的 SQL Server Ledger\
    \ for SQL Server\n\n在这个例子中，对于像银行这样的公司，他们可以简单地使用 `CREATE TABLE` 的这个扩展来创建一个可更新的账本表：\n\
    \n```\nWITH\n(\nSYSTEM_VERSIONING = ON,\nLEDGER = ON\n);\n```\n\nSQL Server 将自动创建一个历史表和一个与该账本表对应的账本视图。\n\
    \n当对表进行任何修改（`INSERT`、`UPDATE` 或 `DELETE`）时，每个事务的审计记录和加密哈希都会记录在数据库账本以及区块链的区块中。\n\
    \n摘要（实际上是 JSON 数据）可以手动或自动在单独的存储位置生成。这使得像银行监管机构这样的人可以使用摘要来随时验证账本的完整性。\n\n图 [6-2](#525217_1_En_6_Chapter.xhtml#Fig2)\
    \ 展示了仅追加账本表的组件。\n\n![](Images/525217_1_En_6_Fig2_HTML.jpg)\n\n图 6-2\n用于仅追加账本表的\
    \ SQL Server Ledger for SQL Server\n\n仅追加账本表不需要历史表，因为你只能执行 `INSERT` 语句。仅追加账本表非常适合多方场景，因为没有任何一方可以“更新”账本表。只允许保留新记录的历史记录（即使是拥有\
    \ `sysadmin` 权限的 DBA 也无法进行更新以伪造账本）。\n\n考虑到这些组件，以下是 Ledger 如何提供数据完整性、信任和数据防篡改记录的：\n\
    \n*   账本表具有内置的审计功能，因此你可以看到对表的每次修改的确切日期时间和 SQL 主体。\n*   仅追加账本表通过只允许 `INSERT` 语句，只允许“向记录添加内容”。\n\
    *   你可以随时通过数据库账本中的加密哈希来验证没有人篡改账本表（例如，在引擎底层）。\n*   存储在账本之外的摘要可用于验证没有人篡改数据库账本。\n\
    \n为了更详细地了解这些组件如何工作，让我们尝试一个例子。"
  raw: '### Ledger for SQL Server


    Ledger for SQL Server is a tamper-evident record of data stored in a SQL Server
    database. Blockchain technology was invented to provide a *digital ledger* using
    crypto hashes to ensure transactions are valid and can be trusted. The original
    blockchain concept was brought into the public eye in the late 2000s to support
    cryptocurrency bitcoin. In fact, when I’ve talked to some people about the term
    *blockchain*, they seem to think blockchain = bitcoin. The concept of a digital
    ledger has so many applications other than supporting bitcoin trading. One of
    the major benefits of a blockchain is the ability for multiple parties to participate
    in a transaction system where no one party can be trusted to manage the authenticity
    of the data. One of the challenges for many blockchain implementations is that
    they are decentralized, requiring distributing algorithms that often cause performance
    issues and hinder data management capabilities. Performance and data management
    capabilities are two things at which SQL Server excels.


    #### Background of Ledger for SQL Server


    In 2018, Microsoft began to explore whether the worlds of blockchain and relational
    databases could converge into a digital ledger solution. According to Panagiotis
    Antonopoulos, Principal Software Engineer at Microsoft


    *In 2018, together with Microsoft Research, we started the effort to identify
    an architecture that would bridge the gap between blockchains and relational databases
    to provide the benefits of both technologies. We evaluated different design options
    where SQL Server would run in a decentralized configuration, using the advanced
    consensus algorithms of blockchains, or in a centralized environment, more aligned
    with the traditional SQL Server setup. We analyzed the technical feasibility of
    these options but also talked to a large number of blockchain customers to understand
    the challenges they were facing when adopting the technology. This was a very
    educational exercise and made it clear for us that decentralization, despite its
    security benefits, was making blockchains expensive and complex to develop and
    manage, causing significant friction to their adoption by enterprise customers.*


    Note


    If you recognize the name Panagiotis Antonopoulos, he is one of the lead developers
    for the incredible cool technology Accelerated Database Recovery (ADR) we introduced
    in SQL Server 2019\. He just builds great software!


    This research effort led to the development of Ledger for SQL Server. The work
    first started in Azure SQL Database. You can read about the original project at
    [`https://aka.ms/sqlledgerpaper`](https://aka.ms/sqlledgerpaper).


    Ledger for SQL Server uses proven blockchain techniques like cryptographic data
    structures such as hash-chains and Merkle trees. (The whitepaper goes into the
    details of what a Merkle tree is for those of you who are interested.) One of
    the keys to Ledger for SQL Server is to leverage…well, SQL Server. Ledger for
    SQL Server is built into the product itself requiring no application changes,
    special provider, or code. Just use T-SQL.


    Panagiotis summed up the power of Ledger for SQL Server: *“Although the data is
    stored centrally, individual organizations can use these digests to verify the
    data integrity. The simplicity and transparency of this solution allows u*s to
    commoditize blockchains and enable all SQL users to leverage their benefits at
    a very low cost and complexity.”


    Because of this capability, I like to think of Ledger as a form of **data integrity**.
    Let’s learn how it works to see why.


    #### How Does It Work


    Ledger for SQL Server is made up of the following components:


    *   **Ledger tables**


    *   Users use an extension of the CREATE TABLE syntax to create a ledger table.
    Ledger tables can either be *updateable* or *append-only*. Updateable ledger tables
    are perfect for auditing scenarios. Append-only tables only allow INSERT statements,
    which can be a great solution for multi-party trust scenarios.


    *   **Ledger history tables**


    *   Updateable ledger tables have a built-in history like a temporal table but
    with additional transaction information that ties into which SQL principal initiated
    the change.


    *   **Ledger views**


    *   When you create a ledger table, we automatically build a view, which joins
    the ledger table with the ledger history table to provide a consolidated view.


    *   **Database ledger**


    *   The *database ledger* is a set of system tables, which contains transaction
    details, crypto hashes, and Merkle trees of all transactions for all ledger tables
    in the database. This is one of the key components to provide a tamper-evident
    record of data.


    *   **Digests**


    *   The hash of the latest block in the database ledger is called the database
    **digest**. It represents the state of all ledger tables in the database at the
    time when the block was generated. I like to think of a digest like a *checksum*
    of the blockchain in the database. A digest is the other key component for a tamper-evident
    record because a digest is generated and stored *outside* of SQL Server.


    Figure [6-1](#525217_1_En_6_Chapter.xhtml#Fig1) shows how these components work
    together for an updateable ledger table.


    ![](Images/525217_1_En_6_Fig1_HTML.jpg)


    A flowchart of S Q L Server with updateable ledger. The flow starts with bank
    regulator, goes through trusted storage, and ends at database ledger.


    Figure 6-1


    Ledger for SQL Server with updateable ledger tables


    In this example for a company such as a bank, they could create an updateable
    ledger table by simply using this extension to CREATE TABLE:


    ```

    WITH

    (

    SYSTEM_VERSIONING = ON,

    LEDGER = ON

    );

    ```


    Automatically, SQL Server will create a history table and a ledger view corresponding
    to the ledger table.


    When any modifications are made to the table (INSERT, UPDATE, or DELETE), audits
    and crypto hashes of each transaction are recorded in the database ledger as well
    as blocks for the blockchain.


    Digests (which are effectively JSON data) can be generated manually or automatically
    in a separate storage location. This allows someone like a bank regulator to use
    the digests to verify the integrity of the ledger at any point in time.


    Figure [6-2](#525217_1_En_6_Chapter.xhtml#Fig2) shows the components for an append-only
    ledger table.


    ![](Images/525217_1_En_6_Fig2_HTML.jpg)


    A flowchart of S Q L Server for append-only ledger. The flow starts with bank
    regulator, goes through trusted storage, and ends at database ledger.


    Figure 6-2


    Ledger for SQL Server for append-only ledger tables


    Append-only ledger tables don’t need a history table since you can only perform
    INSERT statements. Append-only ledger tables are great for multi-party scenarios
    because no one party can “update” the ledger table. Only a history of new records
    is allowed (even a DBA with sysadmin rights can’t make an update to fake the ledger).


    With these components in mind, here is how Ledger provides data integrity, trust,
    and tamper-evident records of data:


    *   Ledger tables have built-in auditing, so you can see the exact datetime and
    SQL principal for every modification to the table.


    *   Append-only ledger tables will only allow an “addition to the record” by only
    allowing INSERT statements.


    *   At any time you can verify that no one has tampered with ledger tables (say
    under the covers of the engine) through crypto hashes in the database ledger.


    *   Digests, stored outside the ledger, can be used to verify no one has tampered
    with the database ledger.


    To understand in more detail how these components work, let’s try out an example.'
  trans: "\n### SQL Server 的账本\n\nSQL Server 的账本是存储在 SQL Server 数据库中的防篡改数据记录。区块链技术的发明旨在提供一个*数字账本*，它使用加密哈希来确保交易的有效性和可信度。最初的区块链概念在\
