- fmt: '# Connecting SQL to the World


    SQL Server is now not just connected to Azure. SQL Server is *integrated* with
    Azure to bring to you powerful solutions such as managed disaster recovery, near-real-time
    analytics, and centralized security and governance. Each of these solutions requires
    us to enhance the SQL Server engine so that the capabilities you need are seamless
    and work with the SQL Server ecosystem. There is no requirement to use all of
    these services. Pick and choose the one you want when you need it. The future
    for SQL Server hybrid is bright, and for Microsoft and our customers, the journey
    is just starting.


    ## Implementing Policies with Microsoft Purview


    ### Exploring Policy-Related DMVs


    ```sql

    -- Lists generally supported actions

    SELECT * FROM sys.dm_server_external_policy_actions;

    GO

    -- Lists the roles that are part of a policy published to this server

    SELECT * FROM sys.dm_server_external_policy_roles;

    GO

    -- Lists the links between the roles and actions, could be used to join the two

    SELECT * FROM sys.dm_server_external_policy_role_actions;

    GO

    ```


    The results of `sys.dm_server_external_policy_actions` are all the possible types
    of actions a policy can be applied to. Think of these as the detailed types of
    permissions the Data and DevOps policies apply to. This list will expand as we
    provide more capabilities. The DMV `sys.dm_server_external_policy_roles` lists
    out the detailed roles that apply to Data and DevOps policies including reading,
    performance monitoring, and security auditing. You will see others in here not
    implemented yet and roles for Connect, which apply to all roles. This list will
    also expand as we add more capabilities. The DMV `sys.dm_server_external_policy_role_actions`
    is a join of what actions are allowed for specific predefined roles. These DMVs
    will always be populated even if no policies have been created.


    ### Viewing Principals and Permissions


    7. Since we have created a policy, execute the script `policyprincipals.sql`,
    which uses the following T-SQL statements:


    ```sql

    -- Lists all Azure AD principals that were given connect permissions

    SELECT * FROM sys.dm_server_external_policy_principals;

    GO

    -- Lists Azure AD principals assigned to a given role on a given resource scope

    SELECT * FROM sys.dm_server_external_policy_role_members;

    GO

    -- Lists Azure AD principals, joined with roles, joined with their data actions

    SELECT * FROM sys.dm_server_external_policy_principal_assigned_actions;

    GO

    ```


    Let’s break down the results from these DMVs. `sys.dm_server_external_policy_principals`
    will list any AAD account you have granted access through a policy. You will only
    see one row for an account even if it has been granted access through more than
    one policy. The `aad_object_id` column maps to the unique ID in Azure Active Directory
    for this account. `sys.dm_server_external_policy_role_members` shows which roles
    from `sys.dm_server_external_policy_roles` the AAD account is a member of. Then
    finally `sys.dm_server_external_policy_principal_assigned_actions` shows all the
    permissions for an AAD account assigned through any policy.


    ### Creating a DevOps Policy Example


    8. Let’s show an example of a DevOps policy. Let’s say you hire a consultant to
    look at performance metrics for your SQL Server for a period of time to help tune
    and improve performance. You want to grant an AAD *guest* account access to your
    SQL Server (or many) but limit them to only access certain operations that allow
    them to analyze performance but make no changes or access no user data. In Purview
    Studio, select **Data policy** from the left-hand menu as you did in step 2. Select
    **DevOps policies** and **+ New policy**. For Data source type choose SQL Server
    on Arc-enabled servers and pick your registered SQL Server and select **Select**.


    Now choose Add/remove subjects and pick the guest AAD account you created for
    the prerequisites. Your screen should look like Figure 3-50.


    Select **Save**. You don’t need to publish DevOps policies.


    ![](Images/525217_1_En_3_Fig51_HTML.jpg)


    A screenshot shows the connect to server tab. Server type, server name, authentication,
    user name panes are visible. The connect button is visible at the bottom.


    **Figure 3-51**

    Connecting as a guest AAD account to SQL Server


    1. On your SQL Server instance connected as a sysadmin, execute the script `policyrefresh.sql`.


    2. Execute the scripts `policydmvs.sql` and `policyprincipals.sql` as a sysadmin
    to see the additions to the new AAD guest account and the permissions granted
    for performance monitoring.


    3. Connect with SSMS with the guest ADD account using MFA as you have done before
    with other AAD accounts in this chapter.


    As a refresher my login to SSMS looks like Figure 3-51.


    ### Testing the Policy-Granted Permissions


    4. Execute the script `perfdmvs.sql` as the new AAD guest account. This script
    uses the following T-SQL statements:


    ```sql

    SELECT * FROM sys.dm_exec_requests;

    GO

    SELECT * FROM sys.dm_os_wait_stats;

    GO

    ```


    Your results should be the same results as you see from a typical admin who can
    view this type of information.


    5. Execute the script `querythecowboys.sql` as the new guest AAD account. Notice
    you get the following error trying to access user data:


    ```

    Msg 229, Level 14, State 5, Line 3

    The SELECT permission was denied on the object ''tothesuperbowl'', database ''howboutthemcowboys'',
    schema ''dbo''.

    ```


    6. To ensure the account that is granted a policy to just look at performance
    data cannot make any changes, execute the script `sp_configure.sql`, which uses
    the following T-SQL statements:


    ```sql

    EXEC sp_configure ''show advanced options'', 1;

    GO

    ```


    You should receive the following error:


    ```

    Msg 15247, Level 16, State 1, Procedure sp_configure, Line 105 [Batch Start Line
    0]

    User does not have permission to perform this action.

    ```


    ### Revoking the Policy


    7. Let’s say the contract for the consultant with the guest AAD account is now
    over. You would like to ensure the system is secure and remove access to SQL Server.
    Let’s do this through Microsoft Purview. In Purview Studio select the **Data policy**
    icon from the left-hand menu. Then select **DevOps policies**. Select the checkbox
    next to the policy you created and select **Delete** at the top of the screen.
    Select Delete again.


    8. Now go back to SQL Server and try to connect again with the guest AAD account.
    You should get a login failure error.


    ### Summary and Considerations


    In this exercise you learned how to create policies with Microsoft Purview to
    grant access to AAD accounts to read data and execute performance monitoring analysis
    without having to directly create logins and assign roles in SQL Server. SQL Server
    has been enhanced to integrate policies from Purview into the security permission
    system so it naturally feels like you granted direct authentication and authorization
    inside SQL Server.


    **Tip**

    There is one issue you may encounter using this feature. You will need to extend
    how you view security information in the system. You will need to use the new
    DMVs in addition to other security catalog views to see who has access to your
    system and their permissions. Fortunately, features like SQL Server Audit and
    Extended Events can track any account that has access through policies.'
