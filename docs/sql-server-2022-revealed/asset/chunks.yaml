    \ a Filter operator to only return the one row based on **ssn**.\n\n4.  Now let’s\
    \ run a query and filter by the id column. Execute the script **querybyid.sql**.\
    \ This script executes the following T-SQL statements:\n\n```\n    USE [WideWorldImporters];\n\
    \    GO\n    SELECT * FROM OPENROWSET\n    (BULK '/delta/people-10m',\n    FORMAT\
    \ = 'DELTA', DATA_SOURCE = 's3_wwi') as [people]\n    WHERE [people].id = 10000000;\n\
    \    GO\n    ```\n\nI specifically chose an id value that is “at the end” of one\
    \ of the files. Notice the query comes back in ~1 second. That is because the\
    \ delta table is partitioned by the id column; it is a form of predicate pushdown\
    \ that can make queries faster.\n\n**Note** When you look at a query execution\
    \ plan, the optimizer does not know the partition column for delta. The power\
    \ is within the REST API calls to get the data from the delta table. Therefore,\
    \ you may see a Filter operator after a remote scan. But only one row is returned\
    \ from the REST API calls, so the Filter operator is not indicative of any performance\
    \ issues. In the future, we plan to investigate how to make the optimizer more\
    \ efficient in conjunction with delta-partitioned columns.\n\n5.  One of the concepts\
    \ I mentioned with CETAS is the ability to create an external table based on an\
