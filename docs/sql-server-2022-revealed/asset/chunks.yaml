  raw: '#### Set Up Credentials and Data Sources


    The next step, within the *context of a user database,* is to create a database-scoped
    credential using the CREATE DATABASE SCOPED CREDENTIAL statement and external
    data source using the CREATE EXTERNAL DATA SOURCE statement (which requires the
    credential). You will need to do this for each connector you plan to use. You
    must first create a master key before you can create a database-scoped credential
    using the CREATE MASTER KEY statement, but you only need to do this once no matter
    how many credentials and data sources you want to create in the database. These
    objects are stored as metadata in system tables in the user database.


    #### Query Files Directly with OPENROWSET( )


    With an external data source created, you can directly query files using the OPENROWSET()
    T-SQL function with the BULK option. File formats such as PARQUET and DELTA don’t
    require any options for column names or types; CSV and text files will require
    this.


    #### Create an External Table


    You can also create an external table using the CREATE EXTERNAL TABLE statement.
    The external table requires an external data source and can be mapped directly
    to files for connectors using LOCATION. You must first create a file format, using
    the CREATE EXTERNAL FILE FORMAT statement, for use with the external table. The
    file format can be for a “known” format like **ParquetFileFormat** or for a CSV
    file, which will require you to provide more details. The external table can provide
    all the column names from the source file or a subset. No data is stored for an
    external table, only metadata in system tables, which is the same for file formats.


    You can also use the CREATE EXTERNAL TABLE AS SELECT (CETAS) syntax to create
    an external table and store the results from a user table in the LOCATION target.
    It is a method to “export” data to REST API connectors. You can even use CETAS
    with the source of a query to OPENROWSET().


    Once you create an external table, you can query the external table like any other
    SQL table (and even assign permissions to it). You can join with other user tables
    or other external tables and execute OPENROWSET() queries. You can use standard
    T-SQL like INSERT..SELECT or SELECT INTO to take data from external tables and
    populate user tables (i.e., ingestion).


    ### Try Out Polybase v3


    Let’s go through some examples to see REST API–based data virtualization using
    an S3 object provider.


    Note


    If you do not want to install non-Microsoft software required for this exercise,
    you can review the results of the exercise in the SQL notebook files **queryparquet.ipynb**
    and **querydelta.ipynb**, which can be found with the sample files and scripts
    in the **ch07_datavirt_objectstorage\datavirt\parquet** and **ch07_datavirt_objectstorage\datavirt\delta**
    folders. You will need to install Azure Data Studio to use these notebooks, or
    you can view the notebooks in the GitHub repo with a browser.


    #### Prerequisites


    To go through this exercise, you will need the following prerequisites:


    *   SQL Server 2022 Evaluation Edition with the database engine and the Polybase
    Query Service for External Data feature installed.


    Note


    For Linux, install the Polybase packages at [`https://docs.microsoft.com/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/sql/relational-databases/polybase/polybase-linux-setup).


    *   Virtual machine or computer with minimum of two CPUs with 8Gb RAM.


    *   SQL Server Management Studio (SSMS). The latest 18.x or 19.x build will work.


    *   The latest build of Azure Data Studio (ADS). **This is optional**. I have
    included a SQL notebook with the results of this exercise, so if you do not want
    to install non-MSFT software, you can review the results with ADS.


    Note


    The following prerequisites are for non-Microsoft software. The use of this software
    does not represent any official endorsement from Microsoft. This software is not
    supported by Microsoft, so any issues using this software are up to the user to
    resolve.


    *   The **minio** server for Windows, which you can download at [`https://min.io/download#/windows`](https://min.io/download#/windows).
    For the demo I assume you have created a directory called **c:\minio** and have
    downloaded the minio.exe for Windows into that directory.


    *   **openssl** for Windows, which you can download at [`https://slproweb.com/products/Win32OpenSSL.html`](https://slproweb.com/products/Win32OpenSSL.html).
    I chose the Win64 OpenSSL v3.0.5 MSI option. Set the system environment variable
    OPENSSL_CONF=C:\Program Files\OpenSSL-Win64\bin\openssl.cfg and put c:\Program
    Files\OpenSSL-Win64\bin in the system path.


    Note


    This exercise can also work with Linux and containers. You will need to use the
    minio server for Linux. openssl comes with Linux or is available by installing
    an optional package. Check your Linux documentation.


    *   A copy of the scripts and files from the GitHub repo of this book, from the
    **ch07_datavirt_objectstorage\datavirt\parquet** directory.'
  trans: '

    #### 设置凭据与数据源


    在用户数据库的上下文中，下一步是使用 `CREATE DATABASE SCOPED CREDENTIAL` 语句创建数据库范围凭据，以及使用 `CREATE
    EXTERNAL DATA SOURCE` 语句创建外部数据源（后者需要凭据）。您需要为您计划使用的每个连接器执行此操作。在创建数据库范围凭据之前，必须先使用
    `CREATE MASTER KEY` 语句创建一个主密钥，但无论您想在数据库中创建多少个凭据和数据源，此操作只需执行一次。这些对象作为元数据存储在用户数据库的系统表中。


    #### 使用 OPENROWSET( ) 直接查询文件


    创建了外部数据源后，您可以使用带有 `BULK` 选项的 `OPENROWSET()` T-SQL 函数直接查询文件。像 PARQUET 和 DELTA 这样的文件格式不需要任何列名或类型的选项；CSV
    和文本文件则需要这些选项。


    #### 创建外部表


    您也可以使用 `CREATE EXTERNAL TABLE` 语句创建一个外部表。外部表需要一个外部数据源，并且可以使用 `LOCATION` 直接映射到连接器的文件。您必须先使用
    `CREATE EXTERNAL FILE FORMAT` 语句创建一个文件格式，以供外部表使用。该文件格式可以是“已知”格式，如 `ParquetFileFormat`，也可以是
    CSV 文件，后者将要求您提供更多细节。外部表可以提供源文件的所有列名或其子集。外部表不存储任何数据，仅在系统表中存储元数据，这与文件格式相同。


    您还可以使用 `CREATE EXTERNAL TABLE AS SELECT` (CETAS) 语法创建一个外部表，并将用户表的结果存储在 `LOCATION`
    目标中。这是一种将数据“导出”到 REST API 连接器的方法。您甚至可以将 CETAS 与查询 `OPENROWSET()` 的源一起使用。


    一旦创建了外部表，您就可以像查询任何其他 SQL 表一样查询它（甚至可以为其分配权限）。您可以与其他用户表或其他外部表进行联接，并执行 `OPENROWSET()`
    查询。您可以使用标准的 T-SQL，如 `INSERT..SELECT` 或 `SELECT INTO`，从外部表获取数据并填充用户表（即数据摄入）。


    ### 尝试 Polybase v3


    让我们通过一些示例来看看使用 S3 对象提供程序进行基于 REST API 的数据虚拟化。


    > 注意

    >

    > 如果您不想安装此练习所需的非 Microsoft 软件，可以在 SQL notebook 文件 `queryparquet.ipynb` 和 `querydelta.ipynb`
    中查看练习的结果，这些文件可以在示例文件和脚本的 `ch07_datavirt_objectstorage\datavirt\parquet` 与 `ch07_datavirt_objectstorage\datavirt\delta`
    文件夹中找到。您需要安装 Azure Data Studio 才能使用这些 notebook，或者您可以在 GitHub 仓库中用浏览器查看这些 notebook。


    #### 先决条件


    要进行此练习，您需要满足以下先决条件：


    *   安装了数据库引擎和 Polybase Query Service for External Data 功能的 SQL Server 2022 评估版。


    > 注意

    >

    > 对于 Linux，请在 [`https://docs.microsoft.com/sql/relational-databases/polybase/polybase-linux-setup`](https://docs.microsoft.com/sql/relational-databases/polybase/polybase-linux-setup)
    安装 Polybase 包。


    *   具有至少两个 CPU 和 8GB RAM 的虚拟机或计算机。

    *   SQL Server Management Studio (SSMS)。最新的 18.x 或 19.x 版本均可。

    *   最新版本的 Azure Data Studio (ADS)。**这是可选的**。我已包含了一个带有此练习结果的 SQL notebook，因此如果您不想安装非
    MSFT 软件，可以使用 ADS 查看结果。


    > 注意

    >

    > 以下先决条件适用于非 Microsoft 软件。使用此软件不代表 Microsoft 的任何官方认可。此软件不受 Microsoft 支持，因此使用此软件出现的任何问题都由用户自行解决。


    *   适用于 Windows 的 `minio` 服务器，您可以从 [`https://min.io/download#/windows`](https://min.io/download#/windows)
    下载。在演示中，我假设您已创建了一个名为 `c:\minio` 的目录，并将 Windows 版的 `minio.exe` 下载到该目录。

    *   适用于 Windows 的 `openssl`，您可以从 [`https://slproweb.com/products/Win32OpenSSL.html`](https://slproweb.com/products/Win32OpenSSL.html)
    下载。我选择了 Win64 OpenSSL v3.0.5 MSI 选项。设置系统环境变量 `OPENSSL_CONF=C:\Program Files\OpenSSL-Win64\bin\openssl.cfg`，并将
    `c:\Program Files\OpenSSL-Win64\bin` 添加到系统路径中。


    > 注意

    >

    > 此练习也可以在 Linux 和容器中运行。您需要使用适用于 Linux 的 minio 服务器。`openssl` 随 Linux 附带，或通过安装可选软件包获得。请查阅您的
    Linux 文档。


    *   本书 GitHub 仓库中 `ch07_datavirt_objectstorage\datavirt\parquet` 目录下的脚本和文件副本。

