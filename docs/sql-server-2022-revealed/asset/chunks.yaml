    #### How Does It Work?


    The concept of a Contained Availability Group is to include a version of the master
    and msdb system databases inside the availability group, along with user databases.
    If anyone connects to the listener of the availability group or a user database
    context directly inside the AG, any instance information in master and msdb will
    be seen from these system databases. Anyone connecting to the instance directly
    would see the normal master and msdb databases. It is not a copy of the instance
    master and msdb databases; it is a special version of these databases used in
    the context of the AG. On creation of a Contained AG, these system databases are
    empty except any existing admin logins are copied into the *contained AG master*
    so that an admin can connect to the AG and start adding instance objects.


    Figure [6-5](#525217_1_En_6_Chapter.xhtml#Fig5) shows the various components of
    a Contained AG.


    ![](Images/525217_1_En_6_Fig5_HTML.png)


    An illustration of various components of a Contained A G. Listener or direct d
    b context in the center is connected to primary and secondary. The primary and
    secondary are connected by log changes.


    Figure 6-5


    The Contained AG architecture


    When a user creates an availability group, there is a new syntax keyword for the
    WITH clause called CONTAINED. When this keyword is used, SQL Server will create
    two databases called **<agname>_master** and **<agname>_msdb** and add these to
    the availability group. Existing admin logins in the master database of the primary
    are added to the Contained AG master.


    When a user connects to the listener of the AG or a direct database context (i.e.,
    uses the database name in the connection string), this user is considered in the
    *context* of the Contained AG. Any operation that would normally apply to master
    or msdb applies to the Contained AG master and msdb. For example, if you were
    connected to the listener and created a new SQL Server Agent job, that job would
    exist in <agname>_msdb and NOT in the msdb of the instance of the primary. Since
    the <agname>_msdb is part of the AG, any logged operations such as adding a new
    job are replicated to the <agname>_msdb on the secondary.


    If a failover occurs, the replicated Contained AG master and msdb will now be
    used for new primary listener connections.


    When I first saw this design, I was puzzled about SQL Server Agent. How could
    SQL Server Agent know to look for jobs in the Contained AG msdb? Well, turns out
    we enhanced SQL Server Agent in 2022 to recognize multiple msdb databases that
    may be needed to use for Agent jobs. Any job in the Contained AG msdb only gets
    executed on the primary replica.


    You can read more about how Contained AGs work at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview).


    I think you will understand further how this works by seeing an example.'
  trans: '

    ### 托管可用性组


    在 2018 年的 PASS 峰会上，我和我的前微软同事 Amit Banerjee 一起登台，介绍了`SQL Server 2019`的最新更新。就在 2018
    年 9 月的 Microsoft Ignite 大会上，我们刚刚宣布了`SQL Server 2019`的首次公开预览版。


    在 PASS 大会上，我们宣布`SQL Server 2019`将支持使用`Always On 可用性组`进行实例级对象复制，这让听众惊喜不已。这意味着在辅助副本发生`故障转移`后，您不再需要手动复制链接服务器、`SQL
    Agent`作业和登录名。我们确实赢得了观众的起立鼓掌，因为这是长期以来的迫切需求。不幸的是，我们过早地发布了这一消息。我记得当时我们必须做出决定，不将此功能包含在`SQL
    Server 2019`中发布。我感到非常失望，我相信整个社区也同样失望。


    2022 年初，我们继续评估"达拉斯项目"的内容。我们已经宣布了私有预览版，我记得我们讨论了如何重振这项功能。这时，我们团队的长期项目经理资深专家 Kevin
    Farlee 和`SQL Server`团队的首席软件工程师 David Liao 挺身而出。他们将完成我们过去开始的工作并在`SQL Server 2022`中发布此功能视为自己的`使命`。我们称之为`托管可用性组`。我们在
    2022 年 3 月的 SQLBits 大会上对此做了一个小范围的宣布，并在`Microsoft //build`大会上宣布`SQL Server 2022
    CTP 2.0`时让更多人知晓。我询问了 Kevin 对于将此功能纳入产品的重要性的看法：


    > 当我们在`SQL Server 2012`中首次发布`Always On 可用性组`时，它广受欢迎，是高可用性领域的一大进步。然而，一个需求很快涌现出来，并且一直得到支持和强化至今："确保`AG`中所有副本实例的用户、登录名、权限、代理作业以及所有其他基础架构配置都同步，这很麻烦。"客户通过创建作业或手动过程来强制同步，但这并非良策。事实证明，一些
    Azure 高可用性配置，如托管实例以及启用 Azure Arc 的 SQL 托管实例，也面临同样的挑战。因此我们通力合作，找到了一个解决方案来复制每个`AG`的`master`和`msdb`数据库的部分内容。这就是我们现在在`SQL
    Server`产品中所称的`托管 AG`。我很高兴能将其交付给客户。


    > 我们也是，Kevin！


    #### 工作原理


    `托管可用性组`的概念是在`可用性组`内部包含一份`master`和`msdb`系统数据库的版本，与用户数据库一起。如果有人连接到`可用性组`的`监听器`或直接连接到`AG`内的用户数据库上下文，将会从这些系统数据库中看到`master`和`msdb`中的实例信息。任何直接连接到实例的人则会看到正常的`master`和`msdb`数据库。这不是实例`master`和`msdb`数据库的副本；它是在`AG`上下文中使用的这些数据库的特殊版本。在创建`托管
    AG`时，这些系统数据库是空的，但任何现有的管理员登录名会被复制到`托管 AG master`中，以便管理员可以连接到`AG`并开始添加实例对象。


    图 6-5 展示了`托管 AG`的各个组成部分。


    ![](img/525217_1_En_6_Fig5_HTML.png)


    `托管 AG`各组成部分的示意图。中心位置的`监听器`或直接数据库上下文连接到主副本和辅助副本。主副本和辅助副本通过日志更改连接。


    图 6-5


    `托管 AG`架构


    当用户创建`可用性组`时，`WITH`子句中有一个新的语法关键字`CONTAINED`。使用此关键字时，`SQL Server`将创建两个名为`<agname>_master`和`<agname>_msdb`的数据库，并将它们添加到`可用性组`中。主副本`master`数据库中的现有管理员登录名会被添加到`托管
    AG master`中。


    当用户连接到`AG`的`监听器`或直接数据库上下文（即在连接字符串中使用数据库名）时，该用户即被视为处于`托管 AG`的`上下文`中。任何通常应用于`master`或`msdb`的操作都将应用于`托管
    AG master`和`msdb`。例如，如果您连接到`监听器`并创建了一个新的`SQL Server Agent`作业，该作业将存在于`<agname>_msdb`中，而**不是**存在于主副本实例的`msdb`中。由于`<agname>_msdb`是`AG`的一部分，诸如添加新作业之类的任何已记录操作都会被复制到辅助副本上的`<agname>_msdb`中。


    如果发生`故障转移`，复制的`托管 AG master`和`msdb`将用于新的主副本`监听器`连接。


    当我第一次看到这个设计时，我对`SQL Server Agent`感到困惑。`SQL Server Agent`如何知道在`托管 AG msdb`中查找作业？结果证明，我们在
    2022 版中增强了`SQL Server Agent`，使其能够识别可能用于`Agent`作业的多个`msdb`数据库。`托管 AG msdb`中的任何作业都仅在`主副本`上执行。


    您可以在 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview)
    阅读更多关于`托管 AG`如何工作的信息。


    我想通过看一个例子，您会进一步理解其工作原理。

