    \ script **getemployeesledgerview.sql**. This script executes the following T-SQL\
    \ statements:"
  trans: "## 练习：将账本用于 SQL Server\n\n让我们通过一个练习来看看账本是如何工作的。本练习分为四个部分：使用可更新账本表、使用仅追加账本表、防止删除账本表，以及一个有趣的例子——我尝试“入侵”账本。\n\
    \n### 前提条件\n\n*   SQL Server 2022 评估版。您必须将 `SQL Server` 配置为混合模式身份验证。\n*   虚拟机或计算机，至少配备两个\
    \ CPU 和 8GB 内存。\n*   SQL Server Management Studio (`SSMS`)。最新的 `SSMS` 18.x 版本可用，但\
    \ `SSMS` 19.x 版本对账本表提供了新的可视化效果，因此本练习中的示例是使用最新的 `SSMS` 19.x 构建版本完成的。\n*   从书的示例文件\
    \ `ch06_meatandpotatoes\\security\\sqlledger` 获取本练习的脚本。\n\n注意：本练习中的任何可识别姓名或信息纯属虚构，不代表任何真实人物。\n\
    \n### 设置练习\n\n我们将创建两个新的 SQL 登录名和一个数据库用于练习：\n\n1.  执行脚本 `addsysadminlogin.sql`\
    \ 以添加一个系统管理员 SQL 登录名。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE master;\nGO\n-- 为 bob 创建登录名并使其成为系统管理员\n\
    IF EXISTS (SELECT * FROM sys.server_principals WHERE NAME = 'bob')\nBEGIN\n  \
    \  DROP LOGIN bob;\nEND\nCREATE LOGIN bob WITH PASSWORD = N'StrongPassw0rd!';\n\
    EXEC sp_addsrvrolemember 'bob', 'sysadmin';\nGO\n```\n\n2.  使用您在步骤 1 中创建的 SQL\
    \ 登录名 `bob` 登录。通过执行脚本 `createdb.sql` 创建数据库并为“应用”添加一个登录名。此脚本执行以下 T-SQL 语句：\n\n\
    ```sql\nUSE master;\nGO\n-- 创建 ContosoHR 数据库\n--\nDROP DATABASE IF EXISTS ContosoHR;\n\
    GO\nCREATE DATABASE ContosoHR;\nGO\nUSE ContosoHR;\nGO\n-- 为应用创建登录名\nIF EXISTS\
    \ (SELECT * FROM sys.server_principals WHERE NAME = 'app')\nBEGIN\n    DROP LOGIN\
    \ app;\nEND\nCREATE LOGIN app WITH PASSWORD = N'StrongPassw0rd!', DEFAULT_DATABASE\
    \ = ContosoHR;\nGO\n-- 启用快照隔离以允许验证账本\nALTER DATABASE ContosoHR SET ALLOW_SNAPSHOT_ISOLATION\
    \ ON;\nGO\n-- 为应用登录名创建应用用户\nCREATE USER app FROM LOGIN app;\nGO\nEXEC sp_addrolemember\
    \ 'db_owner', 'app';\nGO\n```\n\n### 练习 1：使用可更新账本表\n\n第一个练习的所有步骤都使用 SQL 登录名 `bob`\
    \ 连接。\n\n1.  通过执行脚本 `createemployeeledger.sql` 创建一个用于员工表的可更新账本表。此脚本执行以下 T-SQL\
    \ 语句：\n\n```sql\nUSE ContosoHR;\nGO\n-- 创建 Employees 表并将其设为可更新账本表\nDROP TABLE\
    \ IF EXISTS [dbo].[Employees];\nGO\nCREATE TABLE [dbo].Employees NOT NULL,\n \
    \   [SSN] char NOT NULL,\n    [FirstName] nvarchar NOT NULL,\n    [LastName] nvarchar\
    \ NOT NULL,\n    [Salary] [money] NOT NULL\n)\nWITH\n(\n    SYSTEM_VERSIONING\
    \ = ON,\n    LEDGER = ON\n);\nGO\n```\n\n如果您使用的是 `SSMS` 19.X，那么您可以看到账本表的可视化属性以及相应的版本表名称，如图\
    \ 6-3 所示。\n\n![](img/525217_1_En_6_Fig3_HTML.jpg)\n\n图 6-3 `SSMS` 对象资源管理器中的账本表和视图\n\
    \n2.  使用脚本 `populateemployees.sql` 填充初始员工数据。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE ContosoHR;\n\
    GO\n-- 清除 Employees 表\nDELETE FROM [dbo].[Employees];\nGO\n-- 插入 10 名员工。姓名和社会安全号码完全是虚构的，与任何真实人物无关\n\
    DECLARE @SSN1 char(11) = '795-73-9833'; DECLARE @Salary1 Money = 61692.00; INSERT\
    \ INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN1,\
    \ 'Catherine', 'Abel', @Salary1);\nDECLARE @SSN2 char(11) = '990-00-6818'; DECLARE\
    \ @Salary2 Money = 990.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName],\
    \ [LastName], [Salary]) VALUES (@SSN2, 'Kim', 'Abercrombie', @Salary2);\nDECLARE\
    \ @SSN3 char(11) = '009-37-3952'; DECLARE @Salary3 Money = 5684.00; INSERT INTO\
    \ [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN3,\
    \ 'Frances', 'Adams', @Salary3);\nDECLARE @SSN4 char(11) = '708-44-3627'; DECLARE\
    \ @Salary4 Money = 55415.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName],\
    \ [LastName], [Salary]) VALUES (@SSN4, 'Jay', 'Adams', @Salary4);\nDECLARE @SSN5\
    \ char(11) = '447-62-6279'; DECLARE @Salary5 Money = 49744.00; INSERT INTO [dbo].[Employees]\
    \ ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN5, 'Robert', 'Ahlering',\
    \ @Salary5);\nDECLARE @SSN6 char(11) = '872-78-4732'; DECLARE @Salary6 Money =\
    \ 38584.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary])\
    \ VALUES (@SSN6, 'Stanley', 'Alan', @Salary6);\nDECLARE @SSN7 char(11) = '898-79-8701';\
    \ DECLARE @Salary7 Money = 11918.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName],\
    \ [LastName], [Salary]) VALUES (@SSN7, 'Paul', 'Alcorn', @Salary7);\nDECLARE @SSN8\
    \ char(11) = '561-88-3757'; DECLARE @Salary8 Money = 17349.00; INSERT INTO [dbo].[Employees]\
    \ ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN8, 'Mary', 'Alexander',\
    \ @Salary8);\nDECLARE @SSN9 char(11) = '904-55-0991'; DECLARE @Salary9 Money =\
    \ 70796.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary])\
    \ VALUES (@SSN9, 'Michelle', 'Alexander', @Salary9);\nDECLARE @SSN10 char(11)\
    \ = '293-95-6617'; DECLARE @Salary10 Money = 96956.00; INSERT INTO [dbo].[Employees]\
    \ ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN10, 'Marvin', 'Allen',\
    \ @Salary10);\nGO\n```\n\n3.  使用脚本 `getallemployees.sql` 检查员工表中的数据。此脚本执行以下 T-SQL\
    \ 语句：\n\n```sql\nUSE ContosoHR;\nGO\n-- 使用 * 表示所有列\nSELECT * FROM dbo.Employees;\n\
    GO\n-- 列出所有列\nSELECT EmployeeID, SSN, FirstName, LastName, Salary,\n    ledger_start_transaction_id,\
    \ ledger_end_transaction_id, ledger_start_sequence_number,\n    ledger_end_sequence_number\n\
    FROM dbo.Employees;\nGO\n```\n\n请注意，有一些“隐藏”列，如果您执行 `SELECT *` 则不会显示。其中一些列是 `NULL`\
    \ 或 0，因为尚未对数据进行任何更新。您通常不会使用这些列，但可以使用账本视图查看有关员工表更改的信息。\n\n4.  通过执行脚本 `getemployeesledger.sql`\
    \ 查看员工账本视图。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE ContosoHR;\nGO\nSELECT * FROM dbo.Employees_Ledger;\n\
    GO\n```\n\n这是一个使用员工表和账本*版本*表的视图。请注意，账本包含了来自表中隐藏列的事务信息，以及对特定行执行的操作类型指示。\n\n5. \
    \ 让我们通过执行脚本 `getemployeesledgerview.sql` 来查看账本视图的定义。此脚本执行以下 T-SQL 语句："
- fmt: '# 使用 SQL Server Ledger 进行数据审计


    ```

    USE [ContosoHR];

    GO

    sp_helptext ''Employees_ledger'';

    GO

    The results of this query should look like the following T-SQL code:

    CREATE VIEW [dbo].[Employees_Ledger] AS

    SELECT [EmployeeID], [SSN], [FirstName], [LastName], [Salary], [ledger_start_transaction_id]
    AS [ledger_transaction_id], [ledger_start_sequence_number] AS [ledger_sequence_number],
    1 AS [ledger_operation_type], N''INSERT'' AS [ledger_operation_type_desc]

    FROM [dbo].[Employees]

    UNION ALL

    SELECT [EmployeeID], [SSN], [FirstName], [LastName], [Salary], [ledger_start_transaction_id]
    AS [ledger_transaction_id], [ledger_start_sequence_number] AS [ledger_sequence_number],
    1 AS [ledger_operation_type], N''INSERT'' AS [ledger_operation_type_desc]

    FROM [dbo].[MSSQL_LedgerHistoryFor_901578250]

    UNION ALL

    SELECT [EmployeeID], [SSN], [FirstName], [LastName], [Salary], [ledger_end_transaction_id]
    AS [ledger_transaction_id], [ledger_end_sequence_number] AS [ledger_sequence_number],
    2 AS [ledger_operation_type], N''DELETE'' AS [ledger_operation_type_desc] FROM
    [dbo].[MSSQL_LedgerHistoryFor_901578250]

    ```


    让我们分解一下视图是如何构建结果的。`Employees` 日志表中的任何行都是 `INSERT`。历史表（`MSSQL_LedgerHistoryFor_901578250`）中的任何
    `UPDATE` 都对应一个 `INSERT` 和一个 `DELETE`，而任何 `DELETE` 在历史表中都记录为 `DELETE`。请注意，历史表的名称始终是
    `MSSQL_LedgerHistoryFor_<object id>`，其中 `<object id>` 是基础日志表的 `object_id`。使用 `UNION
    ALL` 将它们组合在一起。


    6.  让我们使用日志视图来获取更多与日志表关联的事务审计信息，执行脚本 `viewemployeesledgerhistory.sql`。此脚本执行以下
    T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    SELECT e.EmployeeID, e.FirstName, e.LastName, e.Salary,

    dlt.transaction_id, dlt.commit_time, dlt.principal_name, e.ledger_operation_type_desc,
    dlt.table_hashes

    FROM sys.database_ledger_transactions dlt

    JOIN dbo.Employees_Ledger e

    ON e.ledger_transaction_id = dlt.transaction_id

    ORDER BY dlt.commit_time DESC;

    GO

    ```


    在这个查询中，我引入了一个新的系统表（实际上是一个视图），称为 `database_ledger_transactions`。我们可以使用日志视图中的事务
    ID 来连接此表以获取更多洞察。从这个系统表中，我们可以看到事务是何时执行的、执行更改的 SQL 主体是谁，以及该事务的加密哈希值。你可以看到 “bob”
    插入了日志表的所有行。你可以在 [`https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-ledger-transactions-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-ledger-transactions-transact-sql)
    查看此系统表的完整定义。


    7.  让我们生成一个摘要以确保我们可以验证日志，执行脚本 `generatedigest.sql`。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    EXEC sp_generate_database_ledger_digest;

    GO

    ```


    此过程的结果是 JSON 数据。此时你可以验证日志，但我们将在这次更新后再次运行此命令以验证日志，因此你不需要保存此查询的输出。


    8.  你可以通过执行脚本 `getledgerblocks.sql` 查看数据库日志中生成的区块链。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    SELECT * FROM sys.database_ledger_blocks;

    GO

    ```


    系统表 `database_ledger_blocks`（实际上是一个视图）代表了数据库日志中的内部区块链。


    9.  尝试更新 Jay Adams 的薪资，看看 Ledger 如何跟踪更改，执行脚本 `updatejayssalary.sql`。此脚本执行以下 T-SQL
    语句：


    ```

    USE ContosoHR;

    GO

    UPDATE dbo.Employees

    SET Salary = Salary + 50000

    WHERE EmployeeID = 4;

    GO

    ```


    10. 再次执行脚本 `getallemployees.sql`。如果你对 `Employees` 表中的原始数据一无所知，你将无法知道是否发生了任何更新。


    11. 再次执行脚本 `viewemployeesledgerhistory.sql`。现在结果显示了我们需要的信息。我们可以看到 Jay Adams 薪资的原始
    `INSERT` 记录，但我们也看到名为 bob 的人尝试直接更新它（`INSERT`/`DELETE` 组合）。


    通过再次执行脚本 `generatedigest.sql` 生成另一个摘要。保存此输出值（包括括号）以用于验证日志。


    12. 你现在可以验证日志（1）在初始数据填充后和（2）在对 Jay Adam 的薪资进行更新之后。首先编辑脚本 `verifyledger.sql` 来验证日志的当前状态。在
    `N'' ''` 引号内放入你最近保存的摘要 JSON。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    EXECUTE sp_verify_database_ledger

    N''''

    GO

    ```


    执行该脚本。你的输出应列出与摘要 JSON 数据中相同的 `block_id`。


    你现在已经验证了日志表与加密哈希、区块链和保存的摘要相匹配。你现在可以相信日志数据是准确的，即 bob 是更新 Jay Adam 薪资的人。


    ## 练习 2：使用仅附加日志


    虽然 SQL Server 的 Ledger 对于审计哪个 SQL 主体进行任何事务更改非常有用，但如果应用程序使用“应用程序登录”来执行所有 SQL 查询呢？你将如何知道发起导致数据更改操作的原始应用程序用户？


    对于此场景，我们将构建一个仅附加日志表，用于记录来自应用程序的信息，包括导致 SQL 更改的用户发起的应用程序操作。除了本练习中指出的一个例外情况外，请使用在第一个练习中创建的
    `bob` 登录连接执行所有查询。


    1.  通过执行脚本 `createauditledger.sql` 创建一个用于审核应用程序的仅附加日志表。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    -- Create an append-only ledger table to track T-SQL commands from the app and
    the "real" user who initiated the transaction

    DROP TABLE IF EXISTS [dbo].[AuditEvents];

    GO

    CREATE TABLE [dbo].[AuditEvents](

    [Timestamp] [Datetime2] NOT NULL DEFAULT (GETDATE()),

    [UserName] [nvarchar](255) NOT NULL,

    [Query] [nvarchar](4000) NOT NULL

    )

    WITH (LEDGER = ON (APPEND_ONLY = ON));

    GO

    ```


    应用程序已增强，以便针对 `Employees` 表执行的任何事务都会在此表中插入一行。请注意，你不需要 `SYSTEM_VERSIONING` 子句。


    2.  现在，使用在第一个练习中创建的 `app` 登录（此登录是在 `createdb.sql` 脚本中创建的）登录到新连接。执行脚本 `appchangemaryssalary.sql`。此脚本执行以下
    T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    UPDATE dbo.Employees

    SET Salary = Salary + 50000

    WHERE EmployeeID = 8;

    GO

    INSERT INTO dbo.AuditEvents VALUES (getdate(), ''bob'', ''UPDATE dbo.Employees
    SET Salary = Salary + 50000 WHERE EmployeeID = 8'');

    GO

    ```


    此脚本模拟了如果用户尝试更新 Mary 的薪资，应用程序将执行的操作。


    3.  使用系统管理员登录 `bob` 的连接，执行脚本 `viewemployeesledgerhistory.sql`。从结果中你可以看到 `app`
    登录更改了 Mary 的薪资。这很准确，但究竟是谁真正发起了这次更改？


    4.  执行脚本 `getauditledger.sql`。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    SELECT * FROM dbo.AuditEvents_Ledger;

    GO

    ```'
  raw: "```\n    USE [ContosoHR];\n    GO\n    sp_helptext 'Employees_ledger';\n \
    \   GO\n    The results of this query should look like the following T-SQL code:\n\
    \    CREATE VIEW [dbo].[Employees_Ledger] AS\n    SELECT [EmployeeID], [SSN],\
    \ [FirstName], [LastName], [Salary], [ledger_start_transaction_id] AS [ledger_transaction_id],\
    \ [ledger_start_sequence_number] AS [ledger_sequence_number], 1 AS [ledger_operation_type],\
    \ N'INSERT' AS [ledger_operation_type_desc]\n    FROM [dbo].[Employees]\n    UNION\
    \ ALL\n    SELECT [EmployeeID], [SSN], [FirstName], [LastName], [Salary], [ledger_start_transaction_id]\
    \ AS [ledger_transaction_id], [ledger_start_sequence_number] AS [ledger_sequence_number],\
    \ 1 AS [ledger_operation_type], N'INSERT' AS [ledger_operation_type_desc]\n  \
    \  FROM [dbo].[MSSQL_LedgerHistoryFor_901578250]\n    UNION ALL\n    SELECT [EmployeeID],\
    \ [SSN], [FirstName], [LastName], [Salary], [ledger_end_transaction_id] AS [ledger_transaction_id],\
    \ [ledger_end_sequence_number] AS [ledger_sequence_number], 2 AS [ledger_operation_type],\
    \ N'DELETE' AS [ledger_operation_type_desc] FROM [dbo].[MSSQL_LedgerHistoryFor_901578250]\n\
    \    ```\n\nLet’s break down how the view constructs its results. Any rows in\
    \ the Employees ledger table are an INSERT. Any UPDATE in the history table (**MSSQL_LedgerHistoryFor_901578250**)\
    \ is an INSERT and a DELETE, and any DELETE appears in the history table as a\
    \ DELETE. Note that the history table will always be MSSQL_LedgerHistoryFor_<object\
    \ id> where <object id> is the object_id of the base ledger table. A UNION ALL\
    \ is used to bring these together.\n\n6.  Let’s use the ledger view to get more\
    \ auditing information about transactions associated with the ledger table by\
    \ executing the script **viewemployeesledgerhistory.sql**. This script executes\
    \ the following T-SQL statements:\n\n```\n    USE ContosoHR;\n    GO\n    SELECT\
    \ e.EmployeeID, e.FirstName, e.LastName, e.Salary,\n    dlt.transaction_id, dlt.commit_time,\
    \ dlt.principal_name, e.ledger_operation_type_desc, dlt.table_hashes\n    FROM\
    \ sys.database_ledger_transactions dlt\n    JOIN dbo.Employees_Ledger e\n    ON\
    \ e.ledger_transaction_id = dlt.transaction_id\n    ORDER BY dlt.commit_time DESC;\n\
    \    GO\n    ```\n\nI’ve introduced a new system table in this query (which is\
    \ really a view) called **database_ledger_transactions**. We can use the transaction\
    \ ID from the ledger view to join to this table to gain more insights. From this\
    \ system table, we can see when a transaction was executed, who was the SQL principal\
    \ to execute the change, and a crypto hash value for the transaction. You can\
    \ see that “bob” inserted all the rows for the ledger table. You can see a complete\
    \ definition of this system table at [`https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-ledger-transactions-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-ledger-transactions-transact-sql).\n\
    \n7.  Let’s generate a digest to ensure we can verify the ledger by executing\
    \ the script **generatedigest.sql**. This script executes the following T-SQL\
    \ statements:\n\n```\n    USE ContosoHR;\n    GO\n    EXEC sp_generate_database_ledger_digest;\n\
    \    GO\n    ```\n\nThe result of this procedure is JSON data. You could verify\
    \ the ledger at this point, but instead we will run this again after an update\
    \ to verify the ledger, so you don’t need to save the output of this query.\n\n\
    8.  You can see the generated blockchain in the database ledger by executing the\
    \ script **getledgerblocks.sql**. This script executes the following T-SQL statements:\n\
    \n```\n    USE ContosoHR;\n    GO\n    SELECT * FROM sys.database_ledger_blocks;\n\
    \    GO\n    ```\n\nThe system table **database_ledger_blocks** (which is really\
    \ a view) represents the internal blockchain in the database ledger.\n\n9.  Try\
    \ to update Jay Adam's salary to see how Ledger can track changes by executing\
    \ the script **updatejayssalary.sql**. This script executes the following T-SQL\
    \ statements:\n\n```\n    USE ContosoHR;\n    GO\n    UPDATE dbo.Employees\n \
    \   SET Salary = Salary + 50000\n    WHERE EmployeeID = 4;\n    GO\n    ```\n\n\
    10.  Execute the script **getallemployees.sql** again. If you didn’t know anything\
    \ about what the original data was in the Employees table, you would not know\
    \ if any updates had occurred.\n\n11.  Execute the script **viewemployeesledgerhistory.sql**\
    \ again. Now the results show what we need. We can see the original INSERT for\
    \ Jay Adam’s salary, but we also see someone named bob tried to update it (INSERT/DELETE\
    \ combo) directly.\n\nGenerate another digest by executing the script **generatedigest.sql**\
    \ again. Save this output value (including the brackets) to be used for verifying\
    \ the ledger.\n\n12.  You can now verify the ledger (1) after initial population\
    \ of data and (2) after the update was made to Jay Adam’s salary. Verify the current\
    \ state of the ledger by first editing the script **verifyledger.sql**. Put in\
    \ your most recent saved digest JSON inside the N' ' quotes. This script executes\
    \ the following T-SQL statements:\n\n```\n    USE ContosoHR;\n    GO\n    EXECUTE\
    \ sp_verify_database_ledger\n    N''\n    GO\n    ```\n\nExecute the script. Your\
    \ output should list the same block_id as in the digest JSON data.\n\nYou have\
    \ now verified the ledger tables match crypto hashes, the blockchain, and the\
    \ saved digest. You can now trust the ledger data is accurate in that bob is the\
    \ one who updated Jay Adam’s salary.\n\n**Exercise 2: Using an** **Append-Only\
    \ Ledger**\n\nWhile Ledger for SQL Server is great for auditing which SQL principal\
    \ makes any transaction change, what about scenarios where an application uses\
    \ an “application login” to execute all SQL queries? How will you know the original\
    \ application user that initiated an operation that led to a change of data?\n\
    \nFor this scenario, we will build an append-only ledger table, which records\
    \ information from the application including the user-initiated application operations\
    \ that lead to SQL changes. With one exception noted in this exercise, execute\
    \ all queries while connected with the **bob** login created in the first exercise.\n\
    \n1.  Create an append-only ledger table for auditing the application by executing\
    \ the script **createauditledger.sql**. This script executes the following T-SQL\
    \ statements:\n\n```\n    USE ContosoHR;\n    GO\n    -- Create an append-only\
    \ ledger table to track T-SQL commands from the app and the \"real\" user who\
    \ initiated the transaction\n    DROP TABLE IF EXISTS [dbo].[AuditEvents];\n \
    \   GO\n    CREATE TABLE [dbo].[AuditEvents](\n    [Timestamp] [Datetime2] NOT\
    \ NULL DEFAULT (GETDATE()),\n    [UserName] [nvarchar](255) NOT NULL,\n    [Query]\
    \ [nvarchar](4000) NOT NULL\n    )\n    WITH (LEDGER = ON (APPEND_ONLY = ON));\n\
    \    GO\n    ```\n\nThe application has been enhanced to insert a row in this\
    \ table for any transaction executed against the Employees table. Notice you do\
    \ not need the SYSTEM_VERSIONING clause.\n\n2.  Now log into a new connection\
    \ using the **app** login created in the first exercise (this login was created\
    \ in the **createdb.sql** script). Execute the script **appchangemaryssalary.sql**.\
    \ This script executes the following T-SQL statements:\n\n```\n    USE ContosoHR;\n\
    \    GO\n    UPDATE dbo.Employees\n    SET Salary = Salary + 50000\n    WHERE\
    \ EmployeeID = 8;\n    GO\n    INSERT INTO dbo.AuditEvents VALUES (getdate(),\
    \ 'bob', 'UPDATE dbo.Employees SET Salary = Salary + 50000 WHERE EmployeeID =\
    \ 8');\n    GO\n    ```\n\nThis script simulates what the application would do\
    \ if a user tried to update Mary’s salary.\n\n3.  Using the connection for the\
    \ sysadmin login **bob**, execute the script **viewemployeesledgerhistory.sql**.\
    \ You can see from the results that the **app** login changed Mary’s salary. This\
    \ is accurate, but who really initiated the change?\n\n4.  Execute the script\
    \ **getauditledger.sql**. This script executes the following T-SQL statements:\n\
    \n```\n    USE ContosoHR;\n    GO\n    SELECT * FROM dbo.AuditEvents_Ledger;\n\
    \    GO\n    ```"
  trans: '# 使用 SQL Server Ledger 进行数据审计


    ```

    USE [ContosoHR];

    GO

    sp_helptext ''Employees_ledger'';

    GO

    该查询的结果应类似于以下 T-SQL 代码：

    CREATE VIEW [dbo].[Employees_Ledger] AS

    SELECT [EmployeeID], [SSN], [FirstName], [LastName], [Salary], [ledger_start_transaction_id]
    AS [ledger_transaction_id], [ledger_start_sequence_number] AS [ledger_sequence_number],
    1 AS [ledger_operation_type], N''INSERT'' AS [ledger_operation_type_desc]

    FROM [dbo].[Employees]

    UNION ALL

    SELECT [EmployeeID], [SSN], [FirstName], [LastName], [Salary], [ledger_start_transaction_id]
    AS [ledger_transaction_id], [ledger_start_sequence_number] AS [ledger_sequence_number],
    1 AS [ledger_operation_type], N''INSERT'' AS [ledger_operation_type_desc]

    FROM [dbo].[MSSQL_LedgerHistoryFor_901578250]

    UNION ALL

    SELECT [EmployeeID], [SSN], [FirstName], [LastName], [Salary], [ledger_end_transaction_id]
    AS [ledger_transaction_id], [ledger_end_sequence_number] AS [ledger_sequence_number],
    2 AS [ledger_operation_type], N''DELETE'' AS [ledger_operation_type_desc] FROM
    [dbo].[MSSQL_LedgerHistoryFor_901578250]

    ```


    让我们分解一下视图是如何构建结果的。`Employees` 日志表中的任何行都是 `INSERT`。历史表（`MSSQL_LedgerHistoryFor_901578250`）中的任何
    `UPDATE` 都对应一个 `INSERT` 和一个 `DELETE`，而任何 `DELETE` 在历史表中都记录为 `DELETE`。请注意，历史表的名称始终是
    `MSSQL_LedgerHistoryFor_<object id>`，其中 `<object id>` 是基础日志表的 `object_id`。使用 `UNION
    ALL` 将它们组合在一起。


    6. 让我们使用日志视图来获取更多与日志表关联的事务审计信息，执行脚本 `viewemployeesledgerhistory.sql`。此脚本执行以下 T-SQL
    语句：


    ```

    USE ContosoHR;

    GO

    SELECT e.EmployeeID, e.FirstName, e.LastName, e.Salary,

    dlt.transaction_id, dlt.commit_time, dlt.principal_name, e.ledger_operation_type_desc,
    dlt.table_hashes

    FROM sys.database_ledger_transactions dlt

    JOIN dbo.Employees_Ledger e

    ON e.ledger_transaction_id = dlt.transaction_id

    ORDER BY dlt.commit_time DESC;

    GO

    ```


    在这个查询中，我引入了一个新的系统表（实际上是一个视图），称为 `database_ledger_transactions`。我们可以使用日志视图中的事务
    ID 来连接此表以获取更多洞察。从这个系统表中，我们可以看到事务是何时执行的、执行更改的 SQL 主体是谁，以及该事务的加密哈希值。你可以看到 “bob”
    插入了日志表的所有行。你可以在 [`https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-ledger-transactions-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-ledger-transactions-transact-sql)
    查看此系统表的完整定义。


    7. 让我们生成一个摘要以确保我们可以验证日志，执行脚本 `generatedigest.sql`。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    EXEC sp_generate_database_ledger_digest;

    GO

    ```


    此过程的结果是 JSON 数据。此时你可以验证日志，但我们将在这次更新后再次运行此命令以验证日志，因此你不需要保存此查询的输出。


    8. 你可以通过执行脚本 `getledgerblocks.sql` 查看数据库日志中生成的区块链。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    SELECT * FROM sys.database_ledger_blocks;

    GO

    ```


    系统表 `database_ledger_blocks`（实际上是一个视图）代表了数据库日志中的内部区块链。


    9. 尝试更新 Jay Adams 的薪资，看看 Ledger 如何跟踪更改，执行脚本 `updatejayssalary.sql`。此脚本执行以下 T-SQL
    语句：


    ```

    USE ContosoHR;

    GO

    UPDATE dbo.Employees

    SET Salary = Salary + 50000

    WHERE EmployeeID = 4;

    GO

    ```


    10. 再次执行脚本 `getallemployees.sql`。如果你对 `Employees` 表中的原始数据一无所知，你将无法知道是否发生了任何更新。


    11. 再次执行脚本 `viewemployeesledgerhistory.sql`。现在结果显示了我们需要的信息。我们可以看到 Jay Adams 薪资的原始
    `INSERT` 记录，但我们也看到名为 bob 的人尝试直接更新它（`INSERT`/`DELETE` 组合）。


    通过再次执行脚本 `generatedigest.sql` 生成另一个摘要。保存此输出值（包括括号）以用于验证日志。


    12. 你现在可以验证日志（1）在初始数据填充后和（2）在对 Jay Adam 的薪资进行更新之后。首先编辑脚本 `verifyledger.sql` 来验证日志的当前状态。在
    `N'' ''` 引号内放入你最近保存的摘要 JSON。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    EXECUTE sp_verify_database_ledger

    N''''

    GO

    ```


    执行该脚本。你的输出应列出与摘要 JSON 数据中相同的 `block_id`。


    你现在已经验证了日志表与加密哈希、区块链和保存的摘要相匹配。你现在可以相信日志数据是准确的，即 bob 是更新 Jay Adam 薪资的人。


    ## 练习 2：使用仅附加日志


    虽然 SQL Server 的 Ledger 对于审计哪个 SQL 主体进行任何事务更改非常有用，但如果应用程序使用“应用程序登录”来执行所有 SQL 查询呢？你将如何知道发起导致数据更改操作的原始应用程序用户？


    对于此场景，我们将构建一个仅附加日志表，用于记录来自应用程序的信息，包括导致 SQL 更改的用户发起的应用程序操作。除了本练习中指出的一个例外情况外，请使用在第一个练习中创建的
    `bob` 登录连接执行所有查询。


    1. 通过执行脚本 `createauditledger.sql` 创建一个用于审核应用程序的仅附加日志表。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    -- 创建一个仅附加日志表，用于跟踪来自应用的 T-SQL 命令以及发起事务的“真实”用户

    DROP TABLE IF EXISTS [dbo].[AuditEvents];

    GO

    CREATE TABLE [dbo].AuditEvents),

    [UserName] nvarchar NOT NULL,

    [Query] nvarchar NOT NULL

    )

    WITH (LEDGER = ON (APPEND_ONLY = ON));

    GO

    ```


    应用程序已增强，以便针对 `Employees` 表执行的任何事务都会在此表中插入一行。请注意，你不需要 `SYSTEM_VERSIONING` 子句。


    2. 现在，使用在第一个练习中创建的 `app` 登录（此登录是在 `createdb.sql` 脚本中创建的）登录到新连接。执行脚本 `appchangemaryssalary.sql`。此脚本执行以下
    T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    UPDATE dbo.Employees

    SET Salary = Salary + 50000

    WHERE EmployeeID = 8;

    GO

    INSERT INTO dbo.AuditEvents VALUES (getdate(), ''bob'', ''UPDATE dbo.Employees
    SET Salary = Salary + 50000 WHERE EmployeeID = 8'');

    GO

    ```


    此脚本模拟了如果用户尝试更新 Mary 的薪资，应用程序将执行的操作。


    3. 使用系统管理员登录 `bob` 的连接，执行脚本 `viewemployeesledgerhistory.sql`。从结果中你可以看到 `app` 登录更改了
    Mary 的薪资。这很准确，但究竟是谁真正发起了这次更改？


    4. 执行脚本 `getauditledger.sql`。此脚本执行以下 T-SQL 语句：


    ```

    USE ContosoHR;

    GO

    SELECT * FROM dbo.AuditEvents_Ledger;

    GO

    ```'
- fmt: "You can see that the application registered that `bob` initiated a query (the\
    \ `app` login records the query) that resulted in Mary’s salary change. Since\
    \ the table is append-only, no other user could go in and try to erase any record\
    \ of what the application did.\n\n### Exercise 3: Protect Ledger Objects\n\nIn\
    \ this exercise, you will learn how SQL Server protects ledger objects.\n\n1.\
    \  Execute the script `getledgerobjects.sql` to see a history of what ledger tables\
    \ and columns have been created. This script executes the following T-SQL statements:\n\
    \n```sql\n    USE ContosoHR;\n    GO\n    SELECT * FROM sys.ledger_table_history;\n\
    \    GO\n    SELECT * FROM sys.ledger_column_history;\n    GO\n```\n\n2.  Try\
    \ to alter or drop ledger objects. Execute the script `admindropledger.sql`. This\
    \ script executes the following T-SQL statements:\n\n```sql\n    USE ContosoHR;\n\
    \    GO\n    -- You cannot turn off versioning for a ledger table\n    ALTER TABLE\
    \ Employees SET (SYSTEM_VERSIONING = OFF);\n    GO\n    -- You cannot drop the\
    \ ledger history table\n    DROP TABLE dbo.MSSQL_LedgerHistoryFor_901578250;\n\
    \    GO\n    -- You can drop a ledger table\n    DROP TABLE Employees;\n    GO\n\
    \    -- But we keep a history of the dropped table\n    SELECT * FROM sys.objects\
    \ WHERE name like '%DroppedLedgerTable%';\n    GO\n```\n\nYou can see from the\
    \ output you cannot turn off versioning for a ledger table (there is no syntax\
    \ to set `LEDGER = OFF`). You cannot drop the history table either. You can drop\
    \ the ledger table, but we keep a record of what was dropped. And you can’t drop\
    \ the “dropped” ledger table. Furthermore, even if you drop a ledger table, the\
    \ transactions associated with this table remain in the database ledger (system\
    \ tables). The only way to remove the existence of dropped ledger tables would\
    \ be to drop the database.\n\nYou can also execute the script `getledgerobjects.sql`\
    \ again to see the drop history. SSMS in Object Explorer can also show you what\
    \ ledger tables were dropped.\n\n### Exercise 4: What Does a Tampered Ledger Look\
    \ Like?\n\nWhen I first heard about Ledger, I thought to myself, “I know internals\
    \ pretty well. Can I beat the system?” So I went on a journey of trying to *tamper*\
    \ with the ledger.\n\nI can’t share the details of what I did, but effectively\
    \ after a basic T-SQL update, I attempted ways that were *outside the boundaries*\
    \ of supported SQL to *hack* the ledger. I attempted to conceal an update to a\
    \ ledger table by manipulating the database ledger system tables in an extremely\
    \ undocumented way. I actually found a way to get this working until Panagiotis\
    \ said to me, “What about the digest?” Got me! I literally could hack my way into\
    \ SQL Server to make it look like my update never existed, but the digest is on\
    \ separate storage, so I couldn’t hack that. You can see the results of my early\
    \ tries at this in the T-SQL notebook `ledger.ipynb` in the samples directory.\
    \ You can also see me do this live with Buck Woody at the 2022 SQLBits keynote\
    \ at [`https://youtu.be/_R9FE2ZclVk`](https://youtu.be/_R9FE2ZclVk) (start at\
    \ about 12 minutes in).\n\n#### What Else Should You Know?\n\nLedger for SQL Server\
    \ is amazing technology in so many ways. For me, what I’ve realized is that SQL\
    \ now provides solutions for industry problems like multi-party trust scenarios,\
    \ which are not traditional solutions for SQL.\n\nIn fact, very early on we had\
    \ customers start to embrace this technology to solve real problems. Lenovo saw\
    \ an opportunity to build trust into their supply chain. Their supply chain spans\
    \ multiple parties, but who oversees the data? That is the power of Ledger. You\
    \ can read Lenovo’s story at [`https://customers.microsoft.com/story/1497685499820529889-lenovo-manufacturing-azure-SQL-database-ledger`](https://customers.microsoft.com/story/1497685499820529889-lenovo-manufacturing-azure-SQL-database-ledger).\n\
    \nAs a team, we are committed to finding new and innovative ways to bring Ledger\
    \ into the market where SQL was never thought of as a solution.\n\nOne very nice\
    \ feature added to Ledger for SQL Server is automatic digest storage. In the example,\
    \ you learned how to manually generate and use a digest. SQL Server 2022 can be\
    \ configured to automatically save a digest to Azure Blob Storage. You can read\
    \ all the details at [`https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-how-to-enable-automatic-digest-storage`](https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-how-to-enable-automatic-digest-storage).\n\
    \nAs with any feature, there are some limits, and Ledger is no different. Keep\
    \ up to date with all the limits at [`https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-limits`](https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-limits).\n\
    \nAs I worked on Ledger, I built up my own set of questions that I worked on with\
    \ Panagiotis and Pieter Vanhove, our lead program manager over Ledger:\n\n*  \
    \ How is this different from a temporal table?\n\n    Ledger uses temporal table\
    \ functionality for updateable ledger tables, but unlike temporal tables it has\
    \ built-in auditing and supports append-only tables.\n\n*   How is this different\
    \ from SQL Server Audit?\n\n    Ledger has auditing baked into transaction changes,\
    \ and all the audits are stored in the database. Furthermore, all changes are\
    \ tracked with crypto hashes and separate digest storage. Once a ledger is created,\
    \ you can’t undo it where system admins with the right privilege can erase audits.\
    \ The only way to erase ledger tables once created is to completely drop the database,\
    \ but even then, separate digests exist.\n\n*   How often do I need to save the\
    \ digest?\n\n    Digests are the primary mechanism to verify the ledger from tampering.\
    \ Theoretically, you would need to generate a separate digest for every transaction,\
    \ but that is not practical. Save digests as often as you need to verify the ledger\
    \ for your business needs. Automatic digest management saves a digest every 30\
    \ seconds.\n\n*   Does Ledger require more space?\n\n    Updateable ledger tables\
    \ require pretty much the same extra space as a temporal table. Each transaction\
    \ requires separate system table rows for crypto hash. There is minimal space\
    \ required for the internal blockchains, but it all depends on how long you keep\
    \ the ledger. Digests are small in nature, and again you need to keep a history\
    \ as long as you keep the database with ledger tables.\n\n*   Is there any performance\
    \ impact?\n\n    We have not run specific performance benchmarks with Ledger because\
    \ we believe the impact will be minimal. Consider that append-only ledger tables\
    \ should not see any impact. Updateable ledger tables could see the same impact\
    \ as temporal tables.\n\nKeep up with all the latest information on Ledger for\
    \ SQL Server at [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger).\n\n###\
    \ Encryption Enhancements\n\nEncryption of data is a key aspect to security, and\
    \ SQL Server provides several different capabilities to encrypt data end-to-end.\
    \ End-to-end means from a connection to SQL Server, data in the SQL Server engine,\
    \ and data stored at rest. To read about the complete lineup of encryption capabilities\
    \ of SQL Server, check our documentation at [`https://docs.microsoft.com/sql/relational-databases/security/encryption/sql-server-encryption`](https://docs.microsoft.com/sql/relational-databases/security/encryption/sql-server-encryption).\n\
    \nIn SQL Server 2022 we have a few enhancements around encryption including enhancements\
    \ for Always Encrypted, crypto enhancements, and enhancements for connection encryption."
