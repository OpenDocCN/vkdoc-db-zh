  raw: '### What Other Details About PSP Optimization Should I Know?


    Here are some other details I think you will find useful about PSP optimization.


    #### Check the Latest Information


    First, be sure to check in on all the latest information in our documentation
    about PSP optimization at [`https://aka.ms/pspopt`](https://aka.ms/pspopt).


    #### Known Limitations


    There are limitations for PSP optimization in the initial release with SQL Server
    2022:


    *   We only support predicates in WHERE clauses using an “=” operator.


    *   We do support multiple parameters, but there are limits on the number and
    how many we can support in a stored procedure.


    *   You cannot configure the number of variants, buckets, or predicate ranges
    with PSP optimization except to enable or disable it. Because of the limited number
    of predicates per plan, your plan cache should not become “bloated.” The possible
    downside is that you may experience situations within a variant where multiple
    parameter values may still have issues with *one plan per variant*.


    *   If you have disabled “parameter sniffing” in SQL Server, we will not use PSP
    optimization. Parameter sniffing can be disabled with trace flag 4136, the database-scoped
    configuration PARAMETER_SNIFFING, or the query hint USE HINT(''DISABLE_PARAMETER_SNIFFING'').


    *   If you use a RECOMPILE hint or option, we don’t consider this “cacheable,”
    so we will not use PSP optimization for the query.


    *   If you use the OPTIMIZE FOR query hint, which is a workaround used by some
    for PSP problems, we will not use PSP optimization for the query.


    *   PSP optimization *is supported* for queries against temporary tables.


    *   One issue we have discovered as we built out the feature during the preview
    is tracking performance information between stored procedures and statements in
    the procedure. For example, it can now be difficult to tie in statements and procedures
    together for performance using DMVs like sys.dm_exec_query_stats and sys.dm_exec_procedure_stats.
    In addition, in Query Store to associate statements with stored procedures, you
    will need to use sys.query_store_query_variant, which has information associating
    the dispatcher plan (stored procedure) with query variants (statements in the
    procedure). We do store the object_id in the query SHOWPLAN and in the statement
    text of the variant saved in Query Store.


    One reality of letting PSP optimization work is to “let go” of some of the things
    you have done in the past to avoid this problem. It could be something you have
    to do in phases (e.g., use workarounds at a query level vs. at a database-scoped
    level) until you can see how much PSP optimization will solve your problems without
    requiring other solutions.


    #### Use the Diagnostics


    We have Extended Events to help you look further at PSP optimization including
    the following:


    **parameter_sensitive_plan_optimization_skipped_reason**


    If you believe PSP optimization should be working but it is not, enable this event.
    The **reason** for the event gives more context on why PSP was not used. The two
    reason values you might find valuable are


    *   **NonCacheable** – A query that cannot be saved into the plan cache. It could
    be you are using hints for RECOMPILE that could cause this state, which has been
    a common workaround for the PSP problem.


    *   **SkewnessThresholdNotMet –** This means there is not enough “data skew” to
    enable PSP optimization. We do not document the threshold. You can see in the
    example I used “millions” of rows, but the threshold doesn’t necessarily have
    to be that. Note also that if statistics are not up to date, you might encounter
    this problem even if you have data skew because we rely on statistics.


    **parameter_sensitive_plan_optimization**


    This is a *debug* channel-only event but can show that the query processor is
    using query variants.


    You can intentionally *disable* PSP optimization by (other than the workarounds
    listed previously that disable its use)


    *   Using dbcompat level < 160


    *   Using the database-scoped configuration PARAMETER_SENSITIVE_PLAN_OPTIMIZATION
    = OFF (and you can enable it again with this option)


    ### PSP Optimization Is a Powerful Innovation


    I personally think the innovation here will help so many people avoid expensive
    and time-consuming query performance problems. For me, PSP optimization is clearly
    one of the best things to come out of SQL Server 2022\. Jack Li summed it up best
    when I asked him his perspective on PSP optimization: *“When it comes to parameterized
    queries involving scenarios such as data skewness, having one plan per* query
    makes it impossible for optimizer to pick a plan that will meet the needs for
    all conditions. By allowing multiple plans per query, Parameter Sensitive Plan
    Optimization enables the ability to choose plans based on cardinality of predicates
    to achieve optimal performance.”


    ## Cardinality Estimation (CE) Model Feedback


    I vividly remember back before SQL Server 2014 shipped, I was in Redmond for what
    was called a “milestone review” for the release. I was working in CSS in those
    days and often found myself meeting “early” on a release internally to give a
    supportability and customer perspective to the engineering team. This is when
    I first learned about a new cardinality estimation (CE) model to be introduced
    in SQL Server 2014.


    I understood the concept. We needed to update our query processor assumptions
    about cardinality. We were using assumptions from 1998, when SQL Server 7.0 was
    released, and we created a new query processor from the old Sybase code. But I
    had my “support hat” on for those meetings, so even though I understood this was
    probably the right thing to do, I made sure to ask for a way to “turn it off”
    in case of problems.


    Unfortunately, the need to disable this new “model” for queries over the years
    happened far more than we thought. Let’s first look more at exactly what a “CE
    model” is and why it has resulted in problems for customers.'
  trans: '

    ### 关于 PSP 优化，我还应了解哪些其他细节？


    以下是我认为你会觉得有用的其他一些 PSP 优化细节。


    #### 查阅最新信息


    首先，请务必查阅我们文档中关于 PSP 优化的所有最新信息：[`https://aka.ms/pspopt`](https://aka.ms/pspopt)。


    #### 已知限制


    在 SQL Server 2022 的初始版本中，PSP 优化存在以下限制：


    *   我们仅支持 `WHERE` 子句中使用 `=` 运算符的谓词。

    *   我们确实支持多个参数，但在存储过程中支持的数量和种类有限制。

    *   除了启用或禁用 PSP 优化，你无法配置变体、桶或谓词范围的数量。由于每个计划的谓词数量有限，你的计划缓存不应变得“臃肿”。可能的缺点是，在某个变体中，你可能仍会遇到多个参数值因
    `每个变体一个计划` 而产生问题的情况。

    *   如果你在 SQL Server 中禁用了“参数嗅探”（parameter sniffing），我们将不会使用 PSP 优化。可以通过跟踪标志 `4136`、数据库作用域配置
    `PARAMETER_SNIFFING` 或查询提示 `USE HINT(''DISABLE_PARAMETER_SNIFFING'')` 来禁用参数嗅探。

    *   如果你使用了 `RECOMPILE` 提示或选项，我们会认为该查询“不可缓存”，因此不会对其应用 PSP 优化。

    *   如果你使用了 `OPTIMIZE FOR` 查询提示（这是某些人用于规避 PSP 问题的权宜之计），我们将不会对该查询使用 PSP 优化。

    *   PSP 优化 `支持` 针对临时表的查询。

    *   在预览版期间构建此功能时，我们发现了一个问题：如何在存储过程和过程内的语句之间跟踪性能信息。例如，现在可能很难使用 `sys.dm_exec_query_stats`
    和 `sys.dm_exec_procedure_stats` 等 DMV 将语句和过程关联起来进行性能分析。此外，在 `查询存储` 中，要将语句与存储过程关联起来，你需要使用
    `sys.query_store_query_variant`，其中包含将调度程序计划（存储过程）与查询变体（过程中的语句）关联起来的信息。我们确实在查询的
    `SHOWPLAN` 以及存储在 `查询存储` 中的变体语句文本中保存了 `object_id`。


    让 PSP 优化发挥作用的一个现实是，“放手”一些你过去为避免此问题而做的事情。这可能需要你分阶段进行（例如，在查询级别使用变通方法，而非在数据库作用域级别），直到你能看清
    PSP 优化能在多大程度上解决问题，而无需其他解决方案。


    #### 使用诊断工具


    我们提供了 `扩展事件` 来帮助你进一步查看 PSP 优化，包括以下事件：


    `parameter_sensitive_plan_optimization_skipped_reason`


    如果你认为 PSP 优化应该生效但实际没有，请启用此事件。该事件的 `reason`（原因）值会提供更多关于为何未使用 PSP 的上下文。你可能会发现有用的两个原因值是：


    *   `NonCacheable` – 无法保存到计划缓存中的查询。可能是因为你使用了 `RECOMPILE` 提示，这可能导致此状态，而这一直是解决 PSP
    问题的常见变通方法。

    *   `SkewnessThresholdNotMet` – 这意味着“数据偏斜”不足以启用 PSP 优化。我们未公开该阈值。在我使用的例子中，行数是“数百万”，但阈值不一定必须是那个值。另请注意，如果统计信息不是最新的，即使存在数据偏斜，你也可能遇到此问题，因为我们依赖于统计信息。


    `parameter_sensitive_plan_optimization`


    这是一个仅 `调试` 通道的事件，但可以显示查询处理器正在使用查询变体。


    你可以通过以下方式有意 `禁用` PSP 优化（除了前面列出的禁用其使用的变通方法）：


    *   使用 `dbcompat level < 160`

    *   使用数据库作用域配置 `PARAMETER_SENSITIVE_PLAN_OPTIMIZATION = OFF`（并且你可以使用此选项再次启用它）


    ### PSP 优化是一项强大的创新


    我个人认为，这项创新将帮助许多人避免代价高昂且耗时的查询性能问题。对我来说，PSP 优化显然是 SQL Server 2022 中最好的功能之一。当我问 Jack
    Li 对 PSP 优化的看法时，他总结得最好：*“当涉及到数据偏斜等场景的参数化查询时，每个查询只有一个计划使得优化器无法选出一个满足所有条件的计划。通过允许每个查询有多个计划，参数敏感计划优化能够根据谓词的基数选择计划，从而实现最佳性能。”*


    ### 基数估算（CE）模型反馈


    我清晰地记得，在 SQL Server 2014 发布之前，我曾到雷德蒙德参加一个被称为该版本“里程碑评审”的会议。那时我在 CSS（客户服务与支持）部门工作，经常在版本发布“早期”参加内部会议，为工程团队提供可支持性和客户视角。就是在那时，我第一次了解到将在
    SQL Server 2014 中引入的新基数估算（CE）模型。


    我理解这个概念。我们需要更新查询处理器关于基数的假设。我们使用的是 1998 年 SQL Server 7.0 发布时从旧 Sybase 代码创建新查询处理器时的假设。但在那些会议上，我戴着“支持”的帽子，所以即使我明白这可能是正确的做法，我还是确保要求提供一种在出现问题时“关闭”它的方法。


    不幸的是，在过去的这些年里，需要为查询禁用这个新“模型”的情况发生的频率远超我们的预期。让我们先详细看看“CE 模型”到底是什么，以及为什么它会给客户带来问题。'
- fmt: '### What Is the CE Model Problem?


    Cardinality is pretty well described in my opinion in our documentation at [`https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server`](https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server).
    Here is a quote I like from this documentation:


    > The Query Optimizer determines the cost of executing a query plan based on two
    main factors:

    >

    > The total number of rows processed at each level of a query plan, referred to
    as the cardinality of the plan.

    >

    > The cost model of the algorithm dictated by the operators used in the query.

    >

    > The first factor, cardinality, is used as an input parameter of the second factor,
    the cost model. Therefore, improved cardinality leads to better estimated costs
    and, in turn, faster execution plans.


    Cardinality estimation (CE) is a process for the query optimizer to estimate the
    uniqueness of any part of an operator when compiling a plan. Sometimes it is obvious
    and easy. Sometimes it is not so easy.


    The `CE model` dictates how the query optimizer in SQL Server makes certain assumptions
    about cardinality when it is not so easy. In SQL Server 7.0, we redesigned the
    assumptions of the CE model as we built a new query processor. The types of assumptions
    fall into areas described in our documentation at [`https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server?#versions-of-the-ce`](https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server?#versions-of-the-ce).
    In this documentation, we introduce the concept of CE `versions`. There are two
    CE versions: (1) the CE model we introduced in SQL Server 7.0 and (2) a new CE
    model we introduced in SQL Server 2014. The documentation also talks about different
    CE model scenarios including `independence`, `uniformity`, `containment`, and
    `inclusion`.


    In all of these scenarios, there is no right or wrong answer. It is a classic
    “it depends” situation. The SQL Server 7.0 CE model, known as the `legacy` CE
    model, made certain assumptions. In SQL Server 2014, we made changes to the CE
    model to what we believed were more in line with “modern” workloads. Concepts
    like `correlation` and `containment` were updated. Correlation is one of the more
    interesting problems and is how the optimizer decides how columns are `related`
    to each other (or not related).


    We believed we were making the optimizer more “accurate.” And in many cases we
    were spot on. In fact, in many cases we improved the performance of queries with
    this new model. If you used a `dbcompat` level of 120 (the default for SQL Server
    2014), the `new` CE model took effect.


    Unfortunately, there are assumptions this new model makes that don’t work for
    every workload. Although we were trying to make a model more accurate, that didn’t
    always lead to the same or better performance and sometimes resulted in performance
    regressions.


    We introduced trace flags, query hints, and even database options to use the `legacy`
    CE model. These topics in themselves can be detailed and difficult to read even
    for a seasoned SQL professional. I encourage you to read two additional resources
    to learn more:


    *   A blog we wrote on why we built a new CE model at [`https://cloudblogs.microsoft.com/sqlserver/2014/03/17/the-new-and-improved-cardinality-estimator-in-sql-server-2014/`](https://cloudblogs.microsoft.com/sqlserver/2014/03/17/the-new-and-improved-cardinality-estimator-in-sql-server-2014/)

    *   An incredible detailed whitepaper written by the famous Joe Sack at [`https://download.microsoft.com/download/d/2/0/d20e1c5f-72ea-4505-9f26-fef9550efd44/optimizing%20your%20query%20plans%20with%20the%20sql%20server%202014%20cardinality%20estimator.docx`](https://download.microsoft.com/download/d/2/0/d20e1c5f-72ea-4505-9f26-fef9550efd44/optimizing%2520your%2520query%2520plans%2520with%2520the%2520sql%2520server%25202014%2520cardinality%2520estimator.docx)


    The bottom line is that customers would tell us they upgraded to SQL Server 2014
    and used the new `dbcompat` 120 level and “it just got slower.” It was not a prevalent
    complaint but enough to cause a problem. As a result, customers over the years
    have become accustomed to using the legacy CE model along with the latest `dbcompat`
    levels.


    Along comes `CE feedback` to try and help resolve some of these conflicts.


    #### How Does CE Feedback Work?


    `CE feedback` is a coordination between the query optimizer and Query Store to
    recognize query patterns that fit the CE model problem and then use query hints
    to rectify the issue.


    The optimizer will go through the process of compiling a query. If it recognizes
    a CE model pattern that is a candidate for CE model feedback, it will save a query
    hint that could make the query faster. We are conservative with this approach,
    and the query must be run a certain number of times with the same query text before
    we attempt to `analyze` for CE feedback.


    Once we have analyzed for CE feedback, then on the next query execution, we attempt
    to apply the query hint and perform a `validation` if the hint made the CPU time
    of the query better or worse (it could be slightly better, which is not considered
    good enough to continue to use the hint). If the validation is successful, we
    save the query hint and feedback in Query Store. If not successful, it is considered
    a regression, and we will not use or save the hint. We also record the fact that
    the feedback caused a regression in Query Store.


    ### Try Out an Exercise


    Let’s do an exercise of CE feedback to try and solve a scenario involving `correlation`.


    #### Prerequisites


    In order to try this exercise, you will need the following perquisites:


    *   SQL Server 2022 Evaluation Edition.

    *   Virtual machine or computer with minimum of two CPUs with 8Gb RAM.


    > **Note**

    >

    > The timings for this example are `very CPU sensitive`. I’ve used several virtual
    machines and computers that allow you to see the problem, but older CPUs with
    slower speeds may not allow you to see CE feedback in action with this specific
    exercise. For my tests I used an Azure Virtual Machine Standard_D2ds_v5 (two vCPUs,
    8Gb memory). Our documentation for Azure says this VM size uses a third-generation
    Intel® Xeon® Platinum 8370C (Ice Lake) processor reaching an all-core turbo clock
    speed of up to 3.5 GHz. I think one of the keys is to use a `dedicated` VM or
    computer. Any CPU cycles from other programs can disrupt a pure CPU workload.


    *   SQL Server Management Studio (SSMS). The latest 18.x or 19.x build will work.

    *   A copy of the scripts from the GitHub repo of this book from the `ch05_builtinqueryintelligence_getsbetter\cefeedback`
    directory.'
