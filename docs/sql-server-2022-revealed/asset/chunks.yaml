  trans: "# 按照以下步骤进行练习\n\n按照以下步骤查看 CE 反馈的实际效果：\n\n![Images/525217_1_En_5_Fig14_HTML.png](img/525217_1_En_5_Fig14_HTML.png)\n\
    \n这是 CE 反馈分析的输出表示。输出标题显示为“显示 1 个事件”。一个箭头指向 feedback_hint，该选项为 left parenthesis\
    \ single quotes assume_min_selectivity_for_filter_estimates single quotes right\
    \ parenthesis。\n\n**图 5-14** CE 反馈分析\n\n1.  从 [`https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2016_EXT.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2016_EXT.bak)\
    \ 下载 `AdventureWorks2016_EXT` 示例备份文件。还原脚本假设目录为 `c:\\sql_sample_databases`。\n2.\
    \  使用脚本 `restore_adventureworks_ext.sql` 还原 `AdventureWorks_EXT` 示例备份。根据需要编辑文件路径。此脚本运行以下\
    \ T-SQL 语句：\n```sql\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS AdventureWorks_EXT;\n\
    \    GO\n    RESTORE DATABASE AdventureWorks_EXT FROM DISK = 'c:\\sql_sample_databases\\\
    AdventureWorks2016_EXT.bak'\n    WITH MOVE 'AdventureWorks2016_EXT_Data' TO 'c:\\\
    sql_sample_databases\\AdventureWorks2016_Data.mdf',\n    MOVE 'AdventureWorks2016_EXT_Log'\
    \ TO 'c:\\sql_sample_databases\\AdventureWorks2016_log.ldf',\n    MOVE 'AdventureWorks2016_EXT_Mod'\
    \ TO 'c:\\sql_sample_databases\\AdventureWorks2016_EXT_mod'\n    GO\n```\n还原此备份后，查询存储已启用。\n\
    3.  执行脚本 `create_xevent_seassion.sql` 以创建并启动一个扩展事件会话来查看反馈事件。在 SSMS 的对象资源管理器中使用“查看实时数据”功能查看该会话。该脚本使用以下\
    \ T-SQL 语句：\n```sql\n    IF EXISTS (SELECT * FROM sys.server_event_sessions WHERE\
    \ name = 'CEFeedback')\n    DROP EVENT SESSION [CEFeedback] ON SERVER;\n    GO\n\
    \    CREATE EVENT SESSION [CEFeedback] ON SERVER\n    ADD EVENT sqlserver.query_feedback_analysis(\n\
    \    ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text)),\n\
    \    ADD EVENT sqlserver.query_feedback_validation(\n    ACTION(sqlserver.query_hash_signed,sqlserver.query_plan_hash_signed,sqlserver.sql_text))\n\
    \    WITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=NO_EVENT_LOSS,MAX_DISPATCH_LATENCY=1\
    \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=OFF);\n\
    \    GO\n    -- Start XE\n    ALTER EVENT SESSION [CEFeedback] ON SERVER\n   \
    \ STATE = START;\n    GO\n```\n4.  执行脚本 `create_index_on_city.sql`，为 `Person.Address`\
    \ 表的 `City` 列添加一个索引。此脚本使用以下 T-SQL 语句：\n```sql\n    USE [AdventureWorks_EXT];\n\
    \    GO\n    CREATE NONCLUSTERED INDEX [IX_Address_City] ON [Person].[Address]\n\
    \    (\n    [City] ASC\n    );\n    GO\n```\n5.  执行脚本 `dbcompat160.sql` 以开启数据库兼容性级别\
    \ 160 并清除查询存储和缓存。此脚本使用以下 T-SQL 语句：\n```sql\n    USE master;\n    GO\n    ALTER\
    \ DATABASE [AdventureWorks_EXT] SET COMPATIBILITY_LEVEL = 160;\n    GO\n    ALTER\
    \ DATABASE [AdventureWorks_EXT] SET QUERY_STORE CLEAR ALL;\n    GO\n    USE [AdventureWorks_EXT];\n\
    \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n\
    ```\n6.  执行脚本 `cefeedbackquerybatch.sql` 以 *触发* CE 反馈。此脚本使用以下 T-SQL 语句：\n```sql\n\
    \    USE AdventureWorks_EXT;\n    GO\n    SELECT AddressLine1, City, PostalCode\
    \ FROM Person.Address\n    WHERE StateProvinceID = 79\n    AND City = 'Redmond';\n\
    \    GO 15\n```\n该脚本应在几秒内完成。这是一个典型的关联性示例。城市 Redmond 是否被关联到 `StateProvinceID =\
    \ 79` 的省份？优化器应对关联性做出何种假设？我们稍后将了解 CE 反馈的作用。该脚本运行 15 次是为了确保在尝试提供反馈之前，查询至少运行了一个最低次数。这个数字没有被文档化，所以不要特别依赖\
    \ 15 这个神奇的数字。\n7.  现在执行脚本 `cefeedbackquery.sql`，该脚本会再次运行相同的查询。如果您检查扩展事件的实时数据，应该会看到一个名为\
    \ `query_feedback_analysis` 的事件。输出应类似于图 5-14。其中一个关键列是 `feedback_hint`。在接下来的练习中，您将了解更多相关信息。\n\
    \n![Images/525217_1_En_5_Fig15_HTML.png](img/525217_1_En_5_Fig15_HTML.png)\n\n\
    这是 CE 反馈验证的输出表示。输出标题显示为“显示 2 个事件”。箭头指向 feedback_validation_cpu_time（值为 1521）和\
    \ original_cpu_time（值为 8476）。\n\n**图 5-15** CE 反馈验证\n\n1.  执行查询脚本 `check_query_hints_and_feedback.sql`。此脚本使用以下\
    \ T-SQL 语句：\n```sql\n    USE AdventureWorks_EXT;\n    GO\n    SELECT * from sys.query_store_query_hints;\n\
    \    GO\n    SELECT * from sys.query_store_plan_feedback;\n    GO\n```\n`sys.query_store_query_hints`\
    \ 是存储所有查询提示的地方，无论是您提供的还是系统提供的。`sys.query_store_plan_feedback` 用于显示系统为查询处理提供的任何反馈。您在第四章中看到了内存授予持久化这方面的示例。\n\
    \n对于第二个查询，您的输出应类似于以下内容（我垂直翻转了结果但省略了日期时间值）：\n```sql\n    plan_feedback_id     \
    \   2\n    plan_id                 22\n    feature_id              1\n    feature_desc\
    \            CE Feedback\n    feedback_data           {\"Feedback hints\":\"\"\
    }\n    state                   2\n    state_desc              PENDING_VALIDATION\n\
    ```\n这些数据表明 CE 反馈有资格被提供，但需要验证。验证是为了确保反馈不会使查询变慢（更具体地说，反馈提示不会导致使用更多 CPU 的计划）。第一个查询不返回任何行，因为我们尚未“锁定”要用于\
    \ CE 反馈的提示。\n2.  再次执行脚本 `cefeedbackquery.sql`。\n3.  检查扩展事件实时数据。现在已触发一个名为 `query_feedback_validation`\
    \ 的事件。您的结果应类似于图 5-15。注意 `feedback_validation_cpu_time` 的值小于 `original_cpu_time`。这意味着我们使用的提示使查询所需的\
    \ CPU 更少。\n4.  再次运行脚本 `check_query_hints_and_feedback.sql`。您应该会看到第一个查询（来自 `sys.query_store_query_hints`）的结果如下所示：\n\
    ```sql\n    query_hint_id                              1\n    query_id       \
    \                            22\n    query_hint_text\n    OPTION(USE HINT('ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES'))\n\
    \    last_query_hint_failure_reason             0\n    last_query_hint_failure_reason_desc\
    \        NONE\n    query_hint_failure_count                   0\n    source  \
    \                                   1\n    source_desc                       \
    \         CE feedback\n    comment                                    NULL\n```\n\
    而第二个查询（来自 `sys.query_store_plan_feedback`）的结果应类似于：\n```sql\n    plan_feedback_id\
    \        2\n    plan_id                 22\n    feature_id              1\n  \
    \  feature_desc            CE Feedback\n    feedback_data\n    {\"Feedback hints\"\
    :\"Min selectivity\"}\n    state                   5\n    state_desc         \
    \     VERIFICATION_PASSED\n```"
- fmt: '# Note


    If the validation fails, you will see a `state_desc` value of `VERIFICATION_REGRESSED`.
    The typical reason is that during validation the hint resulted in higher CPU time
    for the query.


    A query hint has been automatically applied to make the query run faster. But
    what does the hint `ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES` mean? Back in
    the previous section titled “**What Is the CE Model Problem**?” I described one
    of the CE model issues related to how to deal with correlation. The `ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES`
    hint assumes *full correlation*. You can find more details in our documentation
    at [`https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query`](https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query).
    The following is the quote for this hint:


    > *Causes SQL Server to generate a plan using minimum selectivity when estimating
    AND predicates for filters to account for full correlation. This hint name is
    equivalent to trace flag 4137 when used with cardinality estimation model of SQL
    Server 2012 (11.x) and earlier versions and has similar effect when trace flag
    9471 is used with cardinality estimation model of SQL Server 2014 (12.x) or higher.*


    ![](Images/525217_1_En_5_Fig16_HTML.png)


    A screenshot of the top 25 resource consumers for database adventure works. The
    screenshot has a bar chart on the left, a plan summary for query 22, and plan
    22, not forced at the bottom.


    Figure 5-16: Original query plan before CE feedback hint


    1.  Run the script `cefeedbackquerybatch.sql` again to compare the times from
    the first run.

    2.  Use Query Store reports in SSMS to see the differences. Use the **Top Resource-Consuming
    Queries report** from Object Explorer to see the differences in CPU time. There
    are two plans for the query. The original plan that takes longer is as shown in
    Figure [5-16](#525217_1_En_5_Chapter.xhtml#Fig16).


    Notice this plan uses several joins over several indexes. Part of the reason is
    the optimizer is using the “new” CE model to make the assumption that there is
    no correlation or only partial correlation. Figure [5-17](#525217_1_En_5_Chapter.xhtml#Fig17)
    shows the new plan after applying the new hint with CE feedback.


    ![](Images/525217_1_En_5_Fig17_HTML.png)


    A screenshot of the top 25 resource consumers for database adventure works. The
    screenshot has a bar chart on the left, a plan summary for query 22 on the right,
    and plan 22, not forced at the bottom.


    Figure 5-17: New plan with CE feedback hint


    This plan runs faster and consumes less CPU. The new plan uses a single index
    scan to get the data. If you move your cursor over the index scan operator, you
    can see the scan is using a filtered predicate to resolve the two predicate values
    as seen in Figure [5-18](#525217_1_En_5_Chapter.xhtml#Fig18).


    ![](Images/525217_1_En_5_Fig18_HTML.png)


    A screenshot of the top 25 resource consumers for database adventure works. The
    screenshot has a bar chart on the left, a plan summary for query 22, and plan
    27, not forced at the bottom. An arrow points to the details of the predicate
    section.


    Figure 5-18: Predicate pushdown with the new query plan


    This scenario is called *predicate pushdown*. The idea is that the optimizer can
    “scan and filter” at the same time on an index. There is a great explanation of
    this concept in this blog post by the famous Pedro Lopes at [`https://techcommunity.microsoft.com/t5/sql-server-blog/predicate-pushdown-and-why-should-i-care/ba-p/385946`](https://techcommunity.microsoft.com/t5/sql-server-blog/predicate-pushdown-and-why-should-i-care/ba-p/385946).
    Since the optimizer is now using the hint `ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES`,
    it can easily decide to use this technique since it assumes full correlation.


    Pretty nifty, right? And since the feedback and hint is persisted in Query Store,
    it will be used even if the plan is evicted from cache.


    # Limits and More Details About CE Feedback


    Stay up to date with all the latest on CE feedback at [`https://aka.ms/cefeedback`](https://aka.ms/cefeedback).


    When you look at the actual execution plan XML for a query that has used CE feedback,
    you will find these properties have been added to the `<StmtSimple>` clause:


    ```

    QueryStoreStatementHintId="1"

    ```


    This will match the `sys.query_store_query_hints.query_hint_id`:


    ```

    QueryStoreStatementHintText="OPTION(USE HINT(''ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES''))"
    QueryStoreStatementHintSource="CE feedback"

    ```


    CE feedback will not be used under the following situations:


    *   You are using a dbcompat level < 160.

    *   You are using your own Query Store hints.

    *   You are forcing the plan in Query Store.

    *   You execute the following T-SQL to turn off CE feedback for the database:
    `ALTER DATABASE SCOPED CONFIGURATION SET CE_FEEDBACK = OFF`.

    *   You are executing a query that doesn’t meet the pattern under the category
    of correlation, join containment, or optimizer row goal as outlined in our docs
    at [`https://aka.ms/cefeedback`](https://aka.ms/cefeedback).

    *   You are using the query hint `DISABLE_CE_FEEDBACK`.


    I expect there will be variability in how CE feedback works for applications and
    workloads. Since we apply the “do not harm policy” by using a validation process,
    my hope is that customers will observe that it is helping their workloads after
    they move to dbcompat 160.'
