- fmt: "## Preparing the Environment\n\nThere are a few things you need to do first\
    \ to prepare for creating a link to Managed Instance. The complete details can\
    \ be found at [`https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-preparation`](https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-preparation).\
    \ Read these carefully. These involve the following:\n\n- Create a master key\
    \ in the master database.\n- Enable the availability group feature for SQL Server\
    \ if not already enabled.\n- As an optional but recommended step, enable startup\
    \ trace flags for performance.\n- Configure network connectivity between SQL Server\
    \ and Azure SQL Managed Instance.\n- Open up firewall and Azure Network Security\
    \ Group (NSG) settings for port 5022 (dbm endpoint).\n- Migrate your certificate\
    \ for Transparent Data Encryption (TDE) to Managed Instance if your database is\
    \ to be linked on SQL Server uses TDE.\n\n## Creating the Link to Replicate the\
    \ Database\n\nLet’s now go through the steps to create the link to Managed Instance\
    \ to replicate the database on SQL Server using the wizard from SSMS:\n\n![Images/525217_1_En_3_Fig4_HTML.png](Images/525217_1_En_3_Fig4_HTML.png)\n\
    \n*A screenshot shows contents of s q l 2022 client folder. Sub-folder wide world\
    \ import is selected for azure s q l managed instance link with replicate and\
    \ failover options.*\n\n**Figure 3-4** Using SSMS to create a link to Azure SQL\
    \ Managed Instance\n\n1.  Restore the `WideWorldImporters` database to SQL Server\
    \ 2022 by executing the script `restorewwi_std.sql`. You may need to edit the\
    \ file path for the backup and your data and log files. This script uses the following\
    \ T-SQL statements:\n\n    ```\n    USE master;\n    GO\n    RESTORE DATABASE\
    \ WideWorldImporters FROM DISK = 'c:\\sql_sample_databases\\WideWorldImporters-Standard.bak'\
    \ WITH\n    MOVE 'WWI_Primary' TO 'f:\\data\\WideWorldImporters.mdf',\n    MOVE\
    \ 'WWI_UserData' TO 'f:\\data\\WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log'\
    \ TO 'g:\\log\\WideWorldImporters.ldf',\n    stats=5;\n    GO\n    ```\n\n2. \
    \ We need to change the recovery model to `FULL` and back up the database. Execute\
    \ the script `fullandbackup.sql`, which uses the following T-SQL statements. You\
    \ may need to edit the file path for the backup:\n\n    ```\n    -- Run on SQL\
    \ Server\n    -- Set full recovery mode for all databases you want to replicate.\n\
    \    ALTER DATABASE WideWorldImporters SET RECOVERY FULL;\n    GO\n    -- Execute\
    \ backup for all databases you want to replicate.\n    BACKUP DATABASE WideWorldImporters\
    \ TO DISK = N'c:\\sql_sample_databases\\wwi.bak';\n    GO\n    ```\n\n3.  Launch\
    \ `SSMS` and connect to SQL Server 2022. Right-click your database and select\
    \ the option to replicate the database like in Figure [3-4](#525217_1_En_3_Chapter.xhtml#Fig4).\n\
    \n![Images/525217_1_En_3_Fig5_HTML.png](Images/525217_1_En_3_Fig5_HTML.png)\n\n\
    *A screenshot shows the new managed instance link. Select managed instance is\
    \ selected on the left pane. A warning message on the right pane reads database\
    \ collations do not match.*\n\n**Figure 3-5** Choosing Managed Instance to create\
    \ the link\n\n1.  You will now go through a series of steps in the Replicate database\
    \ wizard. Select `Next`. The first screen validates you have met the `requirements`\
    \ to use the link feature.\n2.  Now `choose your database` to replicate and select\
    \ `Next`.\n3.  Now you need to provide information for the Managed Instance you\
    \ deployed. This will require you to log in to Azure and choose the subscription,\
    \ resource group, and Managed Instance. You will also need to select `Login` to\
    \ connect to the selected Managed Instance. Once this is done, your screen should\
    \ look like Figure [3-5](#525217_1_En_3_Chapter.xhtml#Fig5).\n\nNotice the warning\
    \ for collations. I chose a different collation for my Managed Instance to show\
    \ you the warning you would get if collations did not match. This may not be an\
    \ issue for you if you use character data in your database that is not dependent\
    \ on different collations. Select `Next`.\n\n![Images/525217_1_En_3_Fig6_HTML.png](Images/525217_1_En_3_Fig6_HTML.png)\n\
    \n*A screenshot shows the new managed instance link. The results option is selected\
    \ on the left pane. Task titled scripting setup is selected under summary on the\
    \ right pane.*\n\n**Figure 3-6** A successful creation of a link to Azure SQL\
    \ Managed Instance\n\n1.  The next screen shows options to create the `Distributed\
    \ Availability Group` (DAG). Leave these defaults and select `Next`.\n2.  The\
    \ next screen is the `final step`. Select `Finish`. Note that the time it takes\
    \ to complete the link creation depends on the size of your source database because\
    \ database seeding takes place here. There is also a button to generate a script\
    \ for what the wizard does. When this is finished, your screen should look like\
    \ Figure [3-6](#525217_1_En_3_Chapter.xhtml#Fig6).\n\n![Images/525217_1_En_3_Fig7_HTML.png](Images/525217_1_En_3_Fig7_HTML.png)\n\
    \n*A screenshot of azure replicated database shows 1 managed instance database.\
    \ The wide world importers database is online and it has no restore point available.*\n\
    \n**Figure 3-7** A replicated database in Managed Instance\n\n1.  Navigate in\
    \ the Azure portal to your Managed Instance. You should see your database is replicated\
    \ in Azure and has a status of `Online` as seen in Figure [3-7](#525217_1_En_3_Chapter.xhtml#Fig7).\n\
    \nNote the tag at the top of this figure shows the Managed Instance is compatible\
    \ with SQL Server 2022.\n\n![Images/525217_1_En_3_Fig8_HTML.png](Images/525217_1_En_3_Fig8_HTML.png)\n\
    \n*A screenshot shows a folder list with parent node s q l 2022 client. Databases,\
    \ security, available groups, D A G, and other collapsible items are visible under\
    \ the parent node.*\n\n**Figure 3-8** Database, AG, and DAG status after link\
    \ creation\n\n1.  Use Object Explorer in `SSMS` connected to SQL Server to see\
    \ the status of the database as `Synchronized` (you will need to refresh to see\
    \ this) and a detailed list of the AG and DAG created for the link. Your screen\
    \ should look similar to Figure [3-8](#525217_1_En_3_Chapter.xhtml#Fig8).\n\n\
    Since we are using the built-in capabilities of SQL Server for an AG and DAG,\
    \ you can also use a rich set of Dynamic Management Views (`DMVs`) to inspect\
    \ the configuration. Check out these examples at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#monitor-health`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/distributed-availability-groups#monitor-health).\n\
    \n1.  Execute the script `checkstatus.sql` against the SQL Server 2022 instance,\
    \ which uses the following T-SQL statements:\n\n    ```\n    SELECT @@SERVERNAME;\n\
    \    GO\n    SELECT DATABASEPROPERTYEX('WideWorldImporters', 'Updateability');\n\
    \    GO\n    SELECT DATABASEPROPERTYEX('WideWorldImporters', 'Version');\n   \
    \ GO\n    ```\n\n    You will see the status of `READ_WRITE` and a database version\
    \ that is the locked-in version for SQL Server 2022.\n\n2.  Connect with `SSMS`\
    \ to the Managed Instance you have deployed. Execute the `checkstatus.sql` script.\
    \ You should see the `Updateability` is `READ_ONLY`, and the database version\
    \ should match SQL Server 2022."
  raw: "#### Preparing the Environment\n\nThere are a few things you need to do first\
    \ to prepare for creating a link to Managed Instance. The complete details can\
    \ be found at [`https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-preparation`](https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-preparation).\
