    Figure 2-5


    Azure Arc–enabled SQL Server in the portal


    If you select SQL Server – Azure Arc, you will see interesting information on
    the main portal page as seen in Figure [2-6](#525217_1_En_2_Chapter.xhtml#Fig6).


    ![](Images/525217_1_En_2_Fig6_HTML.png)


    A screenshot of the main page of the azure portal. It has a list of essentials
