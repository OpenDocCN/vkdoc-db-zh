- fmt: "## Set Up minio for the Exercise\n\nTo use `minio.exe` with SQL Server, TLS\
    \ is required. In order to use TLS, you must have a valid certificate. For testing\
    \ purposes, we will generate a self-signed certificate.\n\nFollow these steps\
    \ to set up minio for the exercise:\n\n1.  Generate a private key by running the\
    \ following command from the `c:\\minio` directory at the command prompt:\n\n\
    \    ```\n    openssl genrsa -out private.key 2048\n    ```\n\n2.  Copy the supplied\
    \ `openssl.conf` file to `c:\\minio`. Edit this file by changing the `IP.2` to\
    \ your local IP address and `DNS.2` to your local computer name.\n\n3.  Generate\
    \ a self-signed certificate by running the following command from the `c:\\minio`\
    \ directory at the command prompt:\n\n    ```\n    openssl req -new -x509 -nodes\
    \ -days 730 -key private.key -out public.crt -config openssl.conf\n    ```\n\n\
    4.  For Windows users, double-click the `public.crt` file and select Install Certificate.\
    \ Choose Local Machine and then Place all certificates in the following store.\
    \ Browse and select Trusted Root Certification Authorities.\n\n    **Note** Self-signed\
    \ certificates are great for testing but *not* secure. I recommend you delete\
    \ the certificate via Manage User Certificates in Control Panel when you are finished\
    \ with this exercise.\n\n5.  Copy the files `private.key` and `public.crt` from\
    \ the `c:\\minio` directory into the `%%USERPROFILE%%\\mino\\certs` directory.\n\
    \n6.  From a command prompt, navigate to the `c:\\minio` directory. Then start\
    \ the minio program by running the following command (`cmd.exe` users don’t need\
    \ the `.\\`):\n\n    ```\n    .\\minio.exe server c:\\minio --console-address\
    \ \":9001\"\n    ```\n\n    This program starts and runs until you quit with `Ctrl+C`.\
    \ Your output in the command prompt should look something like this:\n\n    ![](Images/525217_1_En_7_Fig3_HTML.jpg)\n\
    \n    A screenshot of the minio login window. At the top, minio console multi\
    \ cloud object storage is written. Below are options for writing usernames and\
    \ passwords.\n\n    **Figure 7-3** The minio console login screen\n\n7.  Test\
    \ your connection to minio by using a web browser on the local computer for `https://127.0.0.1:9001`.\
    \ You should be presented with a login screen like Figure 7-3. Use the `RootUser`\
    \ and `RootPass` from the preceding minio server output.\n\n    ```\n    MinIO\
    \ Object Storage Server\n    Copyright: 2015-2022 MinIO, Inc.\n    License: GNU\
    \ AGPLv3 \n    Version: RELEASE.2022-07-30T05-21-40Z (go1.18.4 windows/amd64)\n\
    \    Status:         1 Online, 0 Offline.\n    API: https://:9000  https://127.0.0.1:9000\n\
    \    RootUser: \n    RootPass: \n    Console: https://:9001 https://127.0.0.1:9001\n\
    \    RootUser: \n    RootPass: \n    Command-line: https://docs.min.io/docs/minio-client-quickstart-guide\n\
    \    $ mc.exe alias set myminio https://:9000  \n    Documentation: https://docs.min.io\n\
    \    ```\n\n    ![](Images/525217_1_En_7_Fig4_HTML.png)\n\n    A screenshot of\
    \ the minio window. On the left, the buckets option is highlighted to create a\
    \ new bucket.\n\n    **Figure 7-4** A new bucket in S3 storage\n\n8.  On the left-hand\
    \ side menu, click Identity and Users. Select Create User. Create a user and password.\
    \ Select the `readwrite` policy for the user. Note down this user and password.\
    \ This is the user and password that you will use for the `SECRET` value in the\
    \ `creates3creds.sql` script later in this exercise.\n\n9.  Select the menu option\
    \ for Buckets. Select Create Bucket. Use a bucket name of `wwi`. Leave all the\
    \ defaults and click Create Bucket. Your screen should now look like Figure 7-4.\n\
    \n## Learn to Use REST API to Access Parquet Files on S3\n\nWith an S3 provider\
    \ ready to use, we can now access S3 compatible storage with SQL Server. Follow\
    \ these steps for the exercise for basics of REST API data virtualization to access\
    \ parquet files on an S3 object provider. The next section has an exercise to\
    \ access delta files.\n\n![](Images/525217_1_En_7_Fig5_HTML.png)\n\nA flowchart\
    \ to create an external table. The steps are as follows. Clustered index scan,\
    \ compute scalar, put, and select into.\n\n**Figure 7-5** Query execution plan\
    \ for CETAS\n\n1.  Copy the `WideWorldImporters` sample database from `https://aka.ms/WideWorldImporters`\
    \ to a local directory (the restore script assumes `c:\\sql_sample_databases`).\n\
    \n2.  Edit the `restorewwi.sql` script to specify the correct path for the backup\
    \ and where data and log files should go.\n\n3.  Execute the script `restorewwi.sql`.\
    \ This script executes the following T-SQL statements:\n\n    ```sql\n    USE\
    \ master;\n    GO\n    DROP DATABASE IF EXISTS WideWorldImporters;\n    GO\n \
    \   RESTORE DATABASE WideWorldImporters FROM DISK = 'c:\\sql_sample_databases\\\
    WideWorldImporters-Full.bak' with\n    MOVE 'WWI_Primary' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters.mdf',\n    MOVE 'WWI_UserData' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters.ldf',\n    MOVE 'WWI_InMemory_Data_1' TO 'c:\\sql_sample_databases\\\
    WideWorldImporters_InMemory_Data_1',\n    stats=5;\n    GO\n    ALTER DATABASE\
    \ WideWorldImporters SET QUERY_STORE CLEAR ALL;\n    GO\n    ```\n\n4.  Execute\
    \ the script `enablepolybase.sql` to configure instance-level settings to allow\
    \ Polybase features to execute and export data from Polybase to S3. This script\
    \ executes the following T-SQL statements:\n\n    ```sql\n    EXEC sp_configure\
    \ 'polybase enabled', 1;\n    GO\n    RECONFIGURE;\n    GO\n    EXEC sp_configure\
    \ 'allow polybase export', 1;\n    GO\n    RECONFIGURE;\n    GO\n    ```\n\n5.\
    \  Edit the script `createmasterkey.sql` to put in a password. Execute the script\
    \ to create a master key to protect the database-scoped credential. This script\
    \ executes the following T-SQL statements:\n\n    ```sql\n    USE [WideWorldImporters]\n\
    \    GO\n    IF NOT EXISTS (SELECT * FROM sys.symmetric_keys WHERE name = ''##MS_DatabaseMasterKey##'')\n\
    \    CREATE MASTER KEY ENCRYPTION BY PASSWORD = '';\n    GO\n    ```\n\n6.  Edit\
    \ the script `creates3creds.sql` to put in the user and password you created in\
    \ the minio console for `SECRET`. Execute the script to create a database-scoped\
    \ credential. This script executes the following T-SQL statements:\n\n    ```sql\n\
    \    IF EXISTS (SELECT * FROM sys.database_scoped_credentials WHERE name = 's3_wwi_cred')\n\
    \    DROP DATABASE SCOPED CREDENTIAL s3_wwi_cred;\n    GO\n    CREATE DATABASE\
    \ SCOPED CREDENTIAL s3_wwi_cred\n    WITH IDENTITY = 'S3 Access Key',\n    SECRET\
    \ = ':';\n    GO\n    ```\n\n7.  Edit the script `creates3datasource.sql` to substitute\
    \ in your local IP address for the minio server. Execute the script to create\
    \ an external data source. This script executes the following T-SQL statements:\n\
    \n    ```sql\n    IF EXISTS (SELECT * FROM sys.external_data_sources WHERE name\
    \ = 's3_wwi')\n    DROP EXTERNAL DATA SOURCE s3_wwi;\n    GO\n    CREATE EXTERNAL\
    \ DATA SOURCE s3_wwi\n    WITH\n    (\n    LOCATION = 's3://:9000'\n    ,CREDENTIAL\
    \ = s3_wwi_cred\n    );\n    GO\n    ```\n\n    **Tip** You could put in the bucket\
    \ name here after the port number so that the data source is focused only on a\
    \ specific bucket. We will instead use the bucket when specifying location for\
    \ queries.\n\n8.  Create a file format for parquet by executing the script `createparquetfileformat.sql`.\
    \ This script executes the following T-SQL statements:\n\n    ```sql\n    USE\
    \ [WideWorldImporters];\n    GO\n    IF EXISTS (SELECT * FROM sys.external_file_formats\
    \ WHERE name = 'ParquetFileFormat')\n    DROP EXTERNAL FILE FORMAT ParquetFileFormat;\n\
    \    CREATE EXTERNAL FILE FORMAT ParquetFileFormat WITH(FORMAT_TYPE = PARQUET);\n\
    \    GO\n    ```"
