    \ will need it throughout this exercise) to do this. In the Azure portal for the\
    \ Synapse workspace, in the middle of the page, click Open for the box that says\
    \ **Open Synapse Studio** as in Figure [3-16](#525217_1_En_3_Chapter.xhtml#Fig16).\n\
    \nOnce you open Synapse Studio, click the icon on the left-hand menu for Data,\
    \ expand the wwipool database, and select New SQL Script. Then type in `CREATE\
    \ MASTER KEY;` and hit Run as seen in Figure [3-17](#525217_1_En_3_Chapter.xhtml#Fig17).\n\
    \n![](Images/525217_1_En_3_Fig17_HTML.png)\n\nA screenshot shows b w synapse analytics\
    \ tab under Microsoft Azure. Arrows point at the data icon, w w i s q l pool option,\
    \ new s q l script option, and the run icon.\n\nFigure 3-17\n\nCreating the master\
    \ key in the SQL dedicated pool\n\n![](Images/525217_1_En_3_Fig18_HTML.png)\n\n\
    A screenshot shows part of the b w synapse analytics tab. Arrows point toward\
    \ the manage icon, linked services option, and the new button.\n\nFigure 3-18\n\
    \nCreating a new linked service for SQL Server 2022\n\n1.  We are now ready to\
    \ create the **linked service to SQL Server 2022** from Synapse Studio. In Synapse\
    \ Studio click the Manage icon on the left-hand menu (the last one), Linked services,\
    \ and then + New as seen in Figure [3-18](#525217_1_En_3_Chapter.xhtml#Fig18).\n\
    \n1.  Synapse Link does not automatically create schemas when synchronizing tables\
    \ from SQL Server. Since WideWorldImporters uses schemas, we need to create these\
    \ first in Synapse. Use the same window you created the master key in Synapse\
    \ Studio to run these SQL statements after clearing out the CREATE MASTER KEY\
    \ statement:\n\n```\n    CREATE SCHEMA Application;\n    GO\n    CREATE SCHEMA\
    \ Purchasing;\n    GO\n    CREATE SCHEMA Sales;\n    GO\n    CREATE SCHEMA Warehouse;\n\
    \    GO\n    CREATE SCHEMA Website;\n    GO\n    ```\n\nType in sql in the search\
    \ window and select SQL Server and hit Continue as seen in Figure [3-19](#525217_1_En_3_Chapter.xhtml#Fig19).\n\
    \n![](Images/525217_1_En_3_Fig19_HTML.png)\n\nA screenshot shows the new linked\
    \ service tab with s q l typed in the search bar below. Amongst the 9 icons under\
    \ menu option all, the s q l server is selected.\n\nFigure 3-19\n\nChoosing SQL\
    \ Server as a linked service\n\nYou are presented with a screen to fill out several\
    \ pieces of information. Stay with me on these steps because you are going to\
    \ fill out some information here, move over to your machine hosting SQL Server,\
    \ and then come back to this page.\n\nType in the name of the linked service and\
    \ then in the **Connect via integration runtime** field, select the “down” arrow\
    \ and then **+ New** as seen in Figure [3-20](#525217_1_En_3_Chapter.xhtml#Fig20).\n\
    \n![](Images/525217_1_En_3_Fig20_HTML.png)\n\nA screenshot shows the new linked\
    \ service. The cursor is placed over the new option from the drop-down menu for\
    \ connect via integration runtime.\n\nFigure 3-20\n\nSelecting an integration\
    \ runtime for Synapse Link for SQL\n\nSelect **Self-Hosted** and click **Continue.**\n\
    \nLeave the Default name field and click Create. You will now be presented with\
    \ a screen like Figure [3-21](#525217_1_En_3_Chapter.xhtml#Fig21).\n\n![](Images/525217_1_En_3_Fig21_HTML.png)\n\
    \nA screenshot shows the integration runtime setup. Key 1 and key 2 are visible\
    \ under option 2 manual setup from the settings tab.\n\nFigure 3-21\n\nInstructions\
    \ to install the self-hosted integration runtime\n\nThe integration runtime code\
    \ is now installed in the control plane for the Synapse workspace. You need to\
    \ now install the self-hosted integration runtime (SHIR) software on your machine\
    \ or VM where SQL Server is installed.\n\nNote\n\nSHIR can be installed anywhere\
    \ on the network where it can connect to and discover SQL Server. For this exercise\
    \ we will just install it locally.\n\nOption 1 in the screen in Figure [3-21](#525217_1_En_3_Chapter.xhtml#Fig21)\
    \ would be the right choice if you launched Synapse Studio from the computer or\
    \ VM where you planned to install SHIR. I used the portal from my own laptop when\
    \ I did this exercise, so I chose Option 2 to install manually. When you click\
    \ Option 2, a new browser tab will be launched to download the software. Keep\
    \ the Synapse Studio browser tab open. You will need the **Authentication Key**\
    \ on that screen, and when you are done installing SHIR, we need to come back\
    \ to this place to finish installing the linked service.\n\nAfter I clicked Download\
    \ on the new web page, I chose the latest MSI version and then copied this downloaded\
    \ .MSI file into my virtual machine in Azure. This file is ~1Gb in size, so it\
    \ may take a few minutes to copy into your VM or machine.\n\nWhile you are copying\
    \ this file, launch the Standard SQL XEvent Profiler from SSMS for SQL Server\
    \ (click Launch Session) as seen in Figure [3-22](#525217_1_En_3_Chapter.xhtml#Fig22).\n\
    \n![](Images/525217_1_En_3_Fig22_HTML.jpg)"
  trans: "\n# 使用 Synapse Link 同步数据\n\n我提供了一系列详细的步骤，指导你设置并完成从 SQL Server 到 Synapse\
    \ 的初始数据同步。当你逐步完成这些步骤时，可能会觉得有点复杂。但一旦你完成设置并初始化，数据的更改同步就\"只需启用\"了。\n\n![](img/525217_1_En_3_Fig16_HTML.png)\n\
    \n一张截图展示了基本要素和入门操作。箭头指向入门部分下的\"打开 Synapse Studio\"选项。\n\n**图 3-16** 启动 Synapse\
    \ Studio\n\n## 启动 Synapse Studio\n\n1.  我们将使用 WideWorldImporters 备份，因此你需要将其还原到你的\
    \ SQL Server 实例。你可以使用 sysadmin 帐户登录并运行 `restorewwi_std.sql` 脚本。你可能需要编辑备份文件以及数据/日志文件的文件路径。此脚本执行以下\
    \ T-SQL 语句：\n\n```sql\nUSE master;\nGO\nRESTORE DATABASE WideWorldImporters FROM\
    \ DISK = 'c:\\sql_sample_databases\\WideWorldImporters-Standard.bak' WITH\nMOVE\
    \ 'WWI_Primary' TO 'f:\\data\\WideWorldImporters.mdf',\nMOVE 'WWI_UserData' TO\
    \ 'f:\\data\\WideWorldImporters_UserData.ndf',\nMOVE 'WWI_Log' TO 'g:\\log\\WideWorldImporters.ldf',\n\
    stats=5;\nGO\n```\n\n2.  让我们在数据库中添加两个新表来跟踪车辆货物。在 SQL Server 上执行脚本 `extendwwitables.sql`，该脚本执行以下\
    \ T-SQL 语句：\n\n```sql\nUSE [WideWorldImporters];\nGO\nDROP TABLE IF EXISTS [Warehouse].[Vehicles];\n\
    GO\nCREATE TABLE [Warehouse].Vehicles NOT NULL,\n[Vehicle_Type] nchar NULL,\n\
    [Vehicle_State] nvarchar NULL,\n[Vehicle_City] nvarchar NULL,\n[Vehicle_Status]\
    \ nvarchar NULL,\nPRIMARY KEY CLUSTERED\n(\n[Vehicle_Registration] ASC\n));\n\
    GO\nDROP TABLE IF EXISTS [Warehouse].[Vehicle_StockItems];\nGO\nCREATE TABLE [Warehouse].Vehicle_StockItems\
    \ NOT NULL,\n[StockItemID] [int] NOT NULL\nPRIMARY KEY CLUSTERED\n(\n[Vehicle_Registration]\
    \ ASC,\n[StockItemID] ASC\n));\nGO\n```\n\n3.  通过在 SQL Server 上执行脚本 `populatedata.sql`，将数据填充到这些表中。\n\
    \n4.  WideWorldImporters 数据库包含一些 Synapse Link 不支持的功能和数据类型。因此，在 SQL Server 上执行脚本\
    \ `alterwwi.sql` 以移除其中一些功能（例如，时态表）和具有不支持数据类型的列。\n\n**注意** 在 SQL Server 2022 发布时，其中一些数据类型可能会得到支持，但为了本练习的目的，安全起见，我移除了所有可能导致问题的功能或类型。\n\
    \n5.  Synapse 和 SQL Server 2022 都需要一个主密钥用于加密目的，以及为 Synapse 构建的架构。\n    1.  连接到\
    \ SQL Server 2022 并运行脚本 `createmasterkey.sql`，该脚本执行以下 T-SQL 语句：\n\n```sql\nUSE\
    \ [WideWorldImporters];\nGO\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = 'Strongpassw0rd!';\n\
    GO\n```\n\n    2.  Synapse 池也需要一个主密钥，但你不需要密码。让我们来熟悉一下 Synapse Studio（因为你将在整个练习中需要用到它）来完成此操作。在\
    \ Synapse 工作区的 Azure 门户中，在页面中部，点击标有 **Open Synapse Studio** 的框的\"打开\"按钮，如图 3-16\
    \ 所示。\n\n打开 Synapse Studio 后，点击左侧菜单中的\"数据\"图标，展开 `wwipool` 数据库，然后选择\"新建 SQL 脚本\"\
    。接着输入 `CREATE MASTER KEY;` 并点击\"运行\"，如图 3-17 所示。\n\n![](img/525217_1_En_3_Fig17_HTML.png)\n\
    \n一张截图显示了 Microsoft Azure 下的 BW Synapse Analytics 选项卡。箭头指向数据图标、WWI SQL 池选项、新建\
    \ SQL 脚本选项和运行图标。\n\n**图 3-17** 在 SQL 专用池中创建主密钥\n\n![](img/525217_1_En_3_Fig18_HTML.png)\n\
    \n一张截图显示了 BW Synapse Analytics 选项卡的一部分。箭头指向管理图标、链接服务选项和新建按钮。\n\n**图 3-18** 为 SQL\
    \ Server 2022 创建新的链接服务\n\n1.  我们现在已准备好从 Synapse Studio 创建**到 SQL Server 2022 的链接服务**。在\
    \ Synapse Studio 中，点击左侧菜单（最后一个）上的\"管理\"图标，选择\"链接服务\"，然后点击 + 新建，如图 3-18 所示。\n\n\
    2.  Synapse Link 在从 SQL Server 同步表时不会自动创建架构。由于 WideWorldImporters 使用了架构，我们需要先在\
    \ Synapse 中创建这些架构。使用你在 Synapse Studio 中创建主密钥的同一个窗口，在清除了 `CREATE MASTER KEY` 语句后，运行以下\
    \ SQL 语句：\n\n```sql\nCREATE SCHEMA Application;\nGO\nCREATE SCHEMA Purchasing;\n\
    GO\nCREATE SCHEMA Sales;\nGO\nCREATE SCHEMA Warehouse;\nGO\nCREATE SCHEMA Website;\n\
    GO\n```\n\n在搜索窗口中输入 `sql`，选择 SQL Server，然后点击继续，如图 3-19 所示。\n\n![](img/525217_1_En_3_Fig19_HTML.png)\n\
    \n一张截图显示了新建链接服务选项卡，下方搜索栏中输入了 SQL。在菜单选项\"全部\"下的 9 个图标中，SQL Server 被选中。\n\n**图 3-19**\
    \ 选择 SQL Server 作为链接服务\n\n屏幕上会显示一个需要填写多项信息的页面。请按照以下步骤操作，因为你需要在这里填写一些信息，然后转到你托管\
    \ SQL Server 的机器，最后再回到这个页面。\n\n输入链接服务的名称，然后在 **通过集成运行时连接** 字段中，点击\"向下\"箭头，然后选择\
    \ **+ 新建**，如图 3-20 所示。\n\n![](img/525217_1_En_3_Fig20_HTML.png)\n\n一张截图显示了新的链接服务。光标悬停在\"\
    通过集成运行时连接\"下拉菜单中的\"新建\"选项上。\n\n**图 3-20** 为 SQL 的 Synapse Link 选择集成运行时\n\n选择 **自承载**，然后点击\
    \ **继续。**\n\n保留默认名称字段，然后点击创建。现在，你将看到一个类似图 3-21 的屏幕。\n\n![](img/525217_1_En_3_Fig21_HTML.png)\n\
    \n一张截图显示了集成运行时设置。在设置选项卡下，选项 2 手动设置中可以看到密钥 1 和密钥 2。\n\n**图 3-21** 安装自承载集成运行时的说明\n\
    \n集成运行时代码现已安装在 Synapse 工作区的控制平面中。你现在需要在安装了 SQL Server 的计算机或虚拟机上安装自承载集成运行时 (SHIR)\
    \ 软件。\n\n**注意**\n\nSHIR 可以安装在网络上任何能连接到并发现 SQL Server 的位置。对于本练习，我们仅将其安装在本地。\n\n\
    如果图 3-21 中的屏幕上的选项 1 是你从计划安装 SHIR 的计算机或虚拟机启动 Synapse Studio 时的正确选择。我在做这个练习时是从自己的笔记本电脑使用门户，所以我选择了选项\
    \ 2 进行手动安装。当你点击选项 2 时，将启动一个新的浏览器标签页来下载软件。请保持 Synapse Studio 浏览器标签页打开。你将需要该屏幕上的**身份验证密钥**，并且在完成\
    \ SHIR 安装后，我们需要回到此位置以完成链接服务的安装。\n\n在新网页上点击下载后，我选择了最新的 MSI 版本，然后将下载的 .MSI 文件复制到了我在\
    \ Azure 中的虚拟机中。此文件大小约为 1GB，因此复制到你的虚拟机或计算机中可能需要几分钟时间。\n\n在复制此文件的同时，从 SSMS 为 SQL\
    \ Server 启动标准 SQL XEvent Profiler（点击启动会话），如图 3-22 所示。\n\n![](img/525217_1_En_3_Fig22_HTML.jpg)\n"
- fmt: "## 屏幕截图说明\n\n图 3-22 显示了对象资源管理器。X 事件探查器下的“标准”选项被选中。旁边显示一个包含 4 个选项的弹出窗口。\n\n\
    ### 启动标准 XEvent 探查器会话\n\n这将允许你追踪进入服务器的所有 SQL 流量。我们将在本练习的后面部分使用此功能来查看 SHIR 向 SQL\
    \ Server 2022 发送了何种类型的 SQL 过程。\n\n### 下载并安装 SHIR\n\n下载后，运行 `MSI` 文件以安装 `SHIR`。安装时请使用所有默认设置。完成安装后，会出现一个输入身份验证密钥的屏幕。\n\
    \n在你发起 `SHIR` 下载的 `Synapse Studio` 中，从 `key1` 或 `key2` 复制身份验证密钥的值，粘贴到 `SHIR` 屏幕中，然后点击\
    \ **Register**。接着点击 **Finish**。如果一切成功，你的 `SHIR` 屏幕应如图 3-23 所示。\n\n![](Images/525217_1_En_3_Fig23_HTML.png)\n\
    \n图 3-23：SHIR 注册成功\n\n点击 **Close**。\n\n### 验证连接\n\n在 Windows Server 上，从“开始”菜单启动\
    \ `Microsoft Integration Runtime` 程序以验证与 `Synapse` 的连接。你的屏幕应如图 3-24 所示。\n\n![](Images/525217_1_En_3_Fig24_HTML.png)\n\
    \n图 3-24：SHIR 成功连接到 Synapse\n\n`SHIR` 作为服务运行，因此你可以关闭此窗口。\n\n回到 `Synapse Studio`，在集成运行时设置屏幕上点击\
    \ **Close**。\n\n无需担心在“通过集成运行时连接”上可能看到的错误。只需点击刷新图标，一切应变为“绿色”。\n\n### 创建链接服务\n\n\
    现在，填写服务器名称和数据库名称（本练习使用 `WideWorldImporters`）。使用 `SQL` 身份验证，并填写你为 `SQL Server`\
    \ 创建的 `sysadmin` 的 `SQL` 登录名和密码。首先，点击屏幕右下角的 **Test connection** 以验证连接是否有效。如果成功，点击\
    \ **Create**。\n\n你将在 `Synapse Studio` 中看到一个类似图 3-25 的屏幕。\n\n![](Images/525217_1_En_3_Fig25_HTML.png)\n\
    \n图 3-25：SQL Server 的链接服务创建成功\n\n### 设置落地区链接\n\n1.  现在我们需要为落地区创建另一个**链接服务**。在“链接服务”页面上，选择\
    \ **+ New** 并选择 **Azure Data Lake Storage Gen2**。\n    为链接服务命名。“通过集成运行时连接”保留为默认值。将身份验证类型选择为“系统分配的托管标识”，这将选择你的\
    \ `Synapse` 工作区托管标识（该标识在创建工作区时自动创建）。这就是你之前授予落地区访问权限的托管标识。\n    选择你的 `Azure` 订阅和你为落地区创建的存储帐户名称。选择屏幕底部的\
    \ **Test connection**。如果一切顺利，你的屏幕应如图 3-26 所示。\n\n![](Images/525217_1_En_3_Fig26_HTML.png)\n\
    \n图 3-26：设置落地区链接\n\n点击 **Create** 以创建新链接。\n\n### 发布更改\n\n现在，点击屏幕顶部的 **Publish\
    \ all** 选项，如图 3-27 所示。\n\n![](Images/525217_1_En_3_Fig27_HTML.png)\n\n图 3-27：发布所有更改"
  raw: 'A screenshot shows the object explorer. The standard option under X event
    profiler is selected. An adjacent popup with 4 options is visible.


    Figure 3-22


    Launching the Standard XEvent Profiler session


    This will allow you to trace all SQL traffic coming into the server. We will use
    this to see what type of SQL procedures SHIR sends to SQL Server 2022 later in
    this exercise.


    Once downloaded, run the MSI file, which installs SHIR. Use all the defaults for
    the installation. When you finish the installation, you will be presented with
    a screen to enter in an Authentication Key. In Synapse Studio where you initiated
    the download of SHIR, copy the value for Authentication Key from either key1 or
    key2 and paste this into the SHIR screen, and click **Register**. Then click **Finish**.
    If everything was successful, your SHIR screen should look like Figure [3-23](#525217_1_En_3_Chapter.xhtml#Fig23).


    ![](Images/525217_1_En_3_Fig23_HTML.png)


    A screenshot shows Microsoft integration runtime configuration manager. Register
    integration runtime, h t t p proxy, diagnostic tool sections are visible. Launch
    configuration manager button is selected.


    Figure 3-23


    SHIR successfully registered


    Click **Close**.


    On Windows Server, from the Start Menu launch the Microsoft Integration Runtime
    program to verify the connection to Synapse. Your screen should look like Figure
    [3-24](#525217_1_En_3_Chapter.xhtml#Fig24).


    ![](Images/525217_1_En_3_Fig24_HTML.png)


    A screenshot shows Microsoft integration runtime configuration manager. The self-hosted
    node is connected to the cloud service option is ticked. Data source credentials
    are given below.


    Figure 3-24


    SHIR successfully connected to Synapse


    SHIR runs as a service, so you can close out this window.


    Go back to Synapse Studio and click **Close** on the integration runtime setup
    screen.


    Don’t worry about an error you might see on Connect via integration runtime. Just
    click the refresh icon, and all should be “green.”


    Now fill in the server name and database name (WideWorldImporters for this exercise).
    Use SQL authentication and fill in the SQL login and password you created as a
    sysadmin for SQL Server. First, click Test connection at the bottom right of the
    screen to verify the connection will work. Then if successful, click Create.


    You will be presented with a screen in Synapse Studio that looks like Figure [3-25](#525217_1_En_3_Chapter.xhtml#Fig25).


    ![](Images/525217_1_En_3_Fig25_HTML.png)


    A screenshot shows the linked services. Filter by name with any annotation shows
    3 Azure items, namely synapse analytics, data lake storage, and s q l server.


    Figure 3-25


    A successful linked service creation for SQL Server


    ![](Images/525217_1_En_3_Fig26_HTML.png)


    A screenshot shows the new linked service tab. The visible panes are name, description,
    connect via integration runtime, authentication type, account selection method.
    Create button is visible below.


    Figure 3-26


    Setting up the landing zone link


    1.  Now we need to create another **linked service for the landing zone**. On
    the Linked services page, select **+ New** and choose **Azure Data Lake Storage
    Gen2**.


    Give the linked service a name. Leave Connect via integration runtime to the default.
    Choose Authentication type as System-Assigned Managed Identity, which will choose
    your Synapse workspace Managed Identity, which was automatically created when
    you created the workspace. This was the Managed Identity you gave access to the
    landing zone earlier.


    Choose your Azure subscription and the storage account name for the landing zone
    you created. Select Test connection at the bottom of the screen. If all goes well,
    your screen should look like Figure [3-26](#525217_1_En_3_Chapter.xhtml#Fig26).


    Click **Create** to create the new link.


    Now Click the **Publish all** option at the top of the screen like in Figure [3-27](#525217_1_En_3_Chapter.xhtml#Fig27).


    ![](Images/525217_1_En_3_Fig27_HTML.png)


    A screenshot shows the linked services tab. An arrow points to the highlighted
    publish all option at the top.'
  trans: "\n## 屏幕截图说明\n\n图 3-22 显示了对象资源管理器。X 事件探查器下的“标准”选项被选中。旁边显示一个包含 4 个选项的弹出窗口。\n\
    \n### 启动标准 XEvent 探查器会话\n\n这将允许你追踪进入服务器的所有 SQL 流量。我们将在本练习的后面部分使用此功能来查看 SHIR 向\
    \ SQL Server 2022 发送了何种类型的 SQL 过程。\n\n### 下载并安装 SHIR\n\n下载后，运行 `MSI` 文件以安装 `SHIR`。安装时请使用所有默认设置。完成安装后，会出现一个输入身份验证密钥的屏幕。\n\
    \n在你发起 `SHIR` 下载的 `Synapse Studio` 中，从 `key1` 或 `key2` 复制身份验证密钥的值，粘贴到 `SHIR` 屏幕中，然后点击\
    \ **注册**。接着点击 **完成**。如果一切成功，你的 `SHIR` 屏幕应如图 3-23 所示。\n\n![](img/525217_1_En_3_Fig23_HTML.png)\n\
    \n图 3-23：SHIR 注册成功\n\n点击 **关闭**。\n\n### 验证连接\n\n在 Windows Server 上，从“开始”菜单启动 `Microsoft\
    \ Integration Runtime` 程序以验证与 `Synapse` 的连接。你的屏幕应如图 3-24 所示。\n\n![](img/525217_1_En_3_Fig24_HTML.png)\n\
    \n图 3-24：SHIR 成功连接到 Synapse\n\n`SHIR` 作为服务运行，因此你可以关闭此窗口。\n\n回到 `Synapse Studio`，在集成运行时设置屏幕上点击\
    \ **关闭**。\n\n无需担心在“通过集成运行时连接”上可能看到的错误。只需点击刷新图标，一切应变为“绿色”。\n\n### 创建链接服务\n\n现在，填写服务器名称和数据库名称（本练习使用\
    \ `WideWorldImporters`）。使用 `SQL` 身份验证，并填写你为 `SQL Server` 创建的 `sysadmin` 的 `SQL`\
    \ 登录名和密码。首先，点击屏幕右下角的 **测试连接** 以验证连接是否有效。如果成功，点击 **创建**。\n\n你将在 `Synapse Studio`\
    \ 中看到一个类似图 3-25 的屏幕。\n\n![](img/525217_1_En_3_Fig25_HTML.png)\n\n图 3-25：SQL Server\
    \ 的链接服务创建成功\n\n### 设置落地区链接\n\n1.  现在我们需要为落地区创建另一个**链接服务**。在“链接服务”页面上，选择 **+ 新建**\
    \ 并选择 **Azure Data Lake Storage Gen2**。\n    为链接服务命名。“通过集成运行时连接”保留为默认值。将身份验证类型选择为“系统分配的托管标识”，这将选择你的\
    \ `Synapse` 工作区托管标识（该标识在创建工作区时自动创建）。这就是你之前授予落地区访问权限的托管标识。\n    选择你的 `Azure` 订阅和你为落地区创建的存储帐户名称。选择屏幕底部的\
    \ **测试连接**。如果一切顺利，你的屏幕应如图 3-26 所示。\n\n![](img/525217_1_En_3_Fig26_HTML.png)\n\n\
    图 3-26：设置落地区链接\n\n点击 **创建** 以创建新链接。\n\n### 发布更改\n\n现在，点击屏幕顶部的 **发布所有** 选项，如图 3-27\
    \ 所示。\n\n![](img/525217_1_En_3_Fig27_HTML.png)\n\n图 3-27：发布所有更改\n"
- fmt: "# 发布链接服务到着陆区\n\n点击 `Publish`，您将返回到链接服务列表。现在应该能看到着陆区和 SQL Server 的链接服务（Synapse\
    \ 默认安装了另外两个链接服务）。\n\n![](Images/525217_1_En_3_Fig28_HTML.jpg)\n*一张显示 Microsoft\
    \ Azure 下 B W Synapse Analytics 的截图。光标位于左侧窗格的“集成”图标上。箭头指向右侧窗格的 + 图标。*\n\n# 创建新的链接连接\n\
    \n## 开始创建链接连接\n\n现在链接服务已就位，是时候通过基于链接服务创建**链接连接**来将数据从 SQL Server 同步到 Synapse 了。选择所有表。在\
    \ Synapse Studio 中，点击屏幕左侧的 `Integrate` 图标，然后点击 +，如图 [3-28](#525217_1_En_3_Chapter.xhtml#Fig28)\
    \ 所示。\n\n选择 `Linked connection`。您将看到一个创建新链接连接的屏幕。选择 `SQL Server` 作为源类型，然后选择您之前为\
    \ SQL Server 创建的链接服务。您的屏幕应刷新并显示 WideWorldImporters 的表列表，如图 [3-29](#525217_1_En_3_Chapter.xhtml#Fig29)\
    \ 所示。\n\n![](Images/525217_1_En_3_Fig29_HTML.png)\n*一张显示新链接连接的截图。为源类型和源链接服务选择的选项是\
    \ SQL Server 和 SQL 2022 link。源表功能包含 33 个项目。*\n\n# 设置新的链接连接\n\n## 选择要链接的表\n\n您可以浏览可能的表列表，甚至预览列和数据。我希望链接所有表，因此点击\
    \ `Name` 旁边的复选框（这将选择所有表），然后点击 `Continue`。\n\n## 配置目标与完成连接\n\n在下一个屏幕上，选择您之前创建的\
    \ SQL 专用池。我的池名为 `wwisqlpool`。点击 `Continue`。您现在将看到一个完成创建链接连接过程的屏幕。\n\n为链接连接命名。使用默认的核心数和连续模式。您将在本章后面的“**关于\
    \ Synapse Link 的更多细节**”部分中了解更多关于何时为这些选项做出不同选择的信息。现在选择您为着陆区创建的链接服务。输入您之前为着陆区文件夹路径创建的容器名称。然后选择\
    \ `+ Generate token`（并在新屏幕上使用默认值）。您的屏幕现在应如图 [3-30](#525217_1_En_3_Chapter.xhtml#Fig30)\
    \ 所示。\n\n![](Images/525217_1_En_3_Fig30_HTML.png)\n*一张显示新链接连接的截图。连接设置下的选项包括链接连接名称、核心数、模式、着陆区链接服务、文件夹路径、SAS\
    \ 令牌。*\n\n# 完成链接连接\n\n点击 `OK`。您现在将进入一个显示链接连接所有详细信息的新屏幕。您可以浏览这些信息。目前选择 `Publish\
    \ all`，然后点击 `Publish`。接着点击 `Start`。您的屏幕将显示 `Starting the link connection. This\
    \ may take a few minutes`。对我来说，“几分钟”大约是 10 分钟。\n\n![](Images/525217_1_En_3_Fig31_HTML.png)\n\
    *一张显示 B W Synapse Analytics 选项卡的截图。箭头指向左侧窗格中“集成”下的“链接连接”选项。右窗格列出了链接连接名称、源、目标、状态。*\n\
    \n# 监控 SQL Server 的链接连接\n\n## 观察初始同步过程\n\n在此连接启动期间，您可以返回 SSMS 并查看您的 XEvent Profiler\
    \ 会话。查找来自 `client_app_name` 字段、名为 `AzureDataMovement` 的事件。这些是来自 SHIR 的查询。\n\n\
    在这些事件中，您将看到使用存储过程和 T-SQL 的批处理，例如：\n*   `sys.sp_change_feed_enable_db`。现在，该数据库的\
    \ `sys.databases.is_change_feed_enabled` 列被设置为 1。\n*   为着陆区存储账户创建的数据库范围凭据。\n*\
    \   `sys.sp_change_feed_create_table_group`，它创建一个指向 Synapse 工作区和着陆区的*表组*。每个数据库的每个链接连接都会创建一个表组。\n\
    *   `sys.sp_change_feed_enable_table`。由于我们在链接连接中选择了所有表，您将看到对数据库中每个表执行一次 `sys.sp_change_feed_enable_table`。\n\
    *   针对系统目录视图的查询，以获取每个表的架构，包括列和数据类型。\n\n**注意** 在本书撰写时，这些存储过程和 T-SQL 尚未被记录或支持。Synapse\
    \ Link 必须通过 Synapse Studio 进行配置，它与 SHIR 进行通信。\n\n## 查看连接状态\n\n使用 Synapse Studio\
    \ 监控链接连接，如图 [3-31](#525217_1_En_3_Chapter.xhtml#Fig31) 所示。\n\n点击链接连接名称以深入了解详细信息，如图\
    \ [3-32](#525217_1_En_3_Chapter.xhtml#Fig32) 所示。\n\n![](Images/525217_1_En_3_Fig32_HTML.png)\n\
    *一张显示 SQL 2022 link connection 的截图。它包含一个 33 项的表，详细信息包括：源架构、目标架构、状态、链接表 ID 等。*\n\
    \n# 监控链接表的状态\n\n状态 `Replicating` 表示表的初始快照已同步到 SQL 池表。\n\n![](Images/525217_1_En_3_Fig33_HTML.jpg)\n\
    *一张显示 Microsoft Azure 中 Synapse Analytics 的截图。光标悬停在“数据”图标上。右侧的工作区显示从 tables 文件夹中选择了\
    \ application.cities 文件。*\n\n# SQL 池中的表列表\n\n## 查看同步的表\n\n现在，让我们通过使用 Synapse Studio\
    \ 来查看 SQL 池中的表，如图 [3-33](#525217_1_En_3_Chapter.xhtml#Fig33) 所示。\n\n![](Images/525217_1_En_3_Fig34_HTML.png)\n\
    *一张显示 sql script 1 的截图。顶部窗格有 6 行代码。底部窗格是一个包含 vehicle registration、vehicle city\
    \ 和 cargo 列的表。*\n\n# 执行查询获取货物计数\n\n## 运行示例查询\n\n现在使用 Synapse Studio 像之前一样运行查询。粘贴以下\
    \ T-SQL（在脚本 `getcargocounts.sql` 中找到）来运行查询以查看货物计数：\n\n```sql\n    SELECT v.Vehicle_Registration,\
    \ v.Vehicle_City, count(*) AS cargo\n    FROM Warehouse.Vehicles v\n    JOIN Warehouse.Vehicle_StockItems\
    \ vs\n    ON v.Vehicle_Registration = vs.Vehicle_Registration\n    GROUP BY v.Vehicle_Registration,\
    \ v.Vehicle_City;\n    GO\n```\n\n结果应如图 [3-34](#525217_1_En_3_Chapter.xhtml#Fig34)\
    \ 所示，这与这些表中的初始数据填充相匹配。\n\n![](Images/525217_1_En_3_Fig35_HTML.png)\n*一张标题为 wwi\
    \ data 的容器页面截图。左侧窗格中选择了“概述”。箭头指向右侧窗格中的文件夹。*\n\n# 着陆区中的表组\n\n## 浏览着陆区容器\n\n我们不支持复制或修改着陆区中的文件，但为了学习目的，值得查看容器中的文件。如果您进入着陆区账户中的容器并深入查看，您的结果将类似于图\
    \ [3-35](#525217_1_En_3_Chapter.xhtml#Fig35)。\n\n文件夹的 GUID 值与在 WideWorldImporters\
    \ 数据库的系统表 `changefeed.change_feed_table_groups` 中创建并存储的表组 ID 相匹配。\n\n当您深入查看此文件夹时，您将看到另一个名为\
    \ `Tables` 的文件夹。深入其中，您将看到一系列更多文件夹。每个文件夹代表一个表。名称是存储在 WideWorldImporters 数据库的系统表\
    \ `changefeed.change_feed_tables` 中的 `table_id`。深入第一个文件夹直到找到一个 parquet 文件，如图 [3-36](#525217_1_En_3_Chapter.xhtml#Fig36)\
    \ 所示。\n\n![](Images/525217_1_En_3_Fig36_HTML.png)\n*一张容器页面右窗格的截图。箭头指向根目录“wwi data”下“位置”给出的链接。*\n\
    \n# 初始播种生成的 Parquet 文件"
  raw: "Figure 3-27\n\nPublishing the linked service to the landing zone\n\nClick\
    \ **Publish**, and you will be brought back to the list of linked services. You\
    \ should now see linked services for the landing zone and SQL Server (there are\
    \ two other linked services that are installed by default for Synapse).\n\n![](Images/525217_1_En_3_Fig28_HTML.jpg)\n\
    \nA screenshot shows b w synapse analytics under Microsoft Azure. The cursor is\
    \ on the integrate icon on the left pane. An arrow points to the + icon on the\
    \ right pane.\n\nFigure 3-28\n\nCreating a new linked connection\n\n1.  Now that\
    \ we have linked services in place, it is time to sync data from SQL Server to\
    \ Synapse by creating a **linked connection** based on linked services. Choose\
    \ all the tables. In Synapse Studio click the **Integrate** icon on the left side\
    \ of the screen and then click + like Figure [3-28](#525217_1_En_3_Chapter.xhtml#Fig28).\n\
    \nSelect **Linked connection**. You will be presented with a screen to create\
    \ a new linked connection. Select SQL Server as the source type and then select\
    \ the linked service you created earlier for SQL Server. Your screen should refresh\
    \ with a list of tables from WideWorldImporters like in Figure [3-29](#525217_1_En_3_Chapter.xhtml#Fig29).\n\
    \n![](Images/525217_1_En_3_Fig29_HTML.png)\n\nA screenshot shows the new link\
    \ connection. The options selected for source type and source linked service are\
    \ s q l server and s q l 2022 link. Source table features 33 items.\n\nFigure\
    \ 3-29\n\nSetting up a new linked connection\n\nYou can browse a possible list\
    \ of tables and even preview the columns and data. I want all tables to be linked,\
    \ so click the checkbox next to Name (which selects all tables) and click **Continue**.\n\
    \nFor the next screen, choose the SQL dedicated pool you created earlier. Mine\
    \ was called wwisqlpool. Click **Continue**. You will now be presented with a\
    \ screen to complete the process to create the linked connection.\n\nGive the\
    \ linked connection a name. Use the default core count and continuous mode. You\
    \ will learn more about when to make different choices for these options in the\
    \ section later in this chapter titled “**More Details About Synapse Link**.”\
    \ Now select the linked service you created for the landing zone. Type in the\
    \ container name you created earlier for the Landing zone folder path. Then select\
    \ **+ Generate token** (and use the defaults on the new screen). You screen should\
    \ now look like Figure [3-30](#525217_1_En_3_Chapter.xhtml#Fig30).\n\n![](Images/525217_1_En_3_Fig30_HTML.png)\n\
    \nA screenshot shows the new link connection. The options under connection settings\
    \ are link connection name, core count, mode, and landing zone linked service,\
    \ folder path, s a s token.\n\nFigure 3-30\n\nCompleting the linked connection\n\
    \nHit OK. You will now be on a new screen to show all the details of the linked\
    \ connection. You can browse this information. For now select Publish all and\
    \ then Publish. Then click **Start**. Your screen will show **Starting the link\
    \ connection. This may take a few minutes**. For me a “few minutes” was about\
    \ 10 minutes.\n\n![](Images/525217_1_En_3_Fig31_HTML.png)\n\nA screenshot shows\
    \ b w synapse analytics tab. An arrow points to the link connections option under\
    \ integration in the left pane. The right pane lists the link connection name,\
    \ source, target, status.\n\nFigure 3-31\n\nMonitoring the linked connection for\
    \ SQL Server\n\n1.  While this is still starting, you can go back to SSMS and\
    \ view your XEvent Profiler session. Look for events from the **client_app_name**\
    \ field called **AzureDataMovement**. These are queries from SHIR.\n\nIn these\
    \ events you will see batches that use procedures and T-SQL like\n    *   sys.sp_change_feed_enable_db.\
    \ The sys.databases.is_change_feed_enabled column is now set to 1 for the database.\n\
    \n*   A database-scoped credential created for the landing zone storage account.\n\
    \n*   sys.sp_change_feed_create_table_group, which creates a *table group* that\
    \ points to the Synapse workspace and landing zone. A table group is created for\
    \ each linked connection for the database.\n\n*   sys.sp_change_feed_enable_table.\
    \ You will see an execution of sys.sp_change_feed_enable_table for each table\
    \ in the database because we picked all of them in the linked connection.\n\n\
    *   Queries against system catalog views to get the schema of each table including\
    \ columns and data types.\n\n**Note** At the time of the writing of this book,\
    \ these procedures and T-SQL are not documented or supported. Synapse Link must\
    \ be configured through Synapse Studio, which communicates with SHIR.\n\n2.  Use\
    \ Synapse Studio to monitor the linked connection as seen in Figure [3-31](#525217_1_En_3_Chapter.xhtml#Fig31).\n\
    \nClick the linked connection name to drill in for more details as seen in Figure\
    \ [3-32](#525217_1_En_3_Chapter.xhtml#Fig32).\n\n![](Images/525217_1_En_3_Fig32_HTML.png)\n\
    \nA screenshot shows the s q l 2022 link connection. It features a 33-item table\
    \ with the following details: source schema, target schema, status, link table\
    \ i d, and others.\n\nFigure 3-32\n\nMonitoring the status of linked tables\n\n\
    The status of Replicating means the initial snapshots of the tables are synchronized\
    \ to SQL pool tables.\n\n![](Images/525217_1_En_3_Fig33_HTML.jpg)\n\nA screenshot\
    \ shows synapse analytics in Microsoft Azure. The cursor is over the data icon.\
    \ The workspace on the right shows application dot cities file is selected from\
    \ the tables folder.\n\nFigure 3-33\n\nList of tables in the SQL pool\n\n1.  Now\
    \ let’s see the tables in the SQL pool by using Synapse Studio like in Figure\
    \ [3-33](#525217_1_En_3_Chapter.xhtml#Fig33).\n\n![](Images/525217_1_En_3_Fig34_HTML.png)\n\
    \nA screenshot shows s q l script 1\\. The top pane has a 6-line code. The bottom\
    \ pane has a table with columns for vehicle registration, vehicle city, and cargo.\n\
    \nFigure 3-34\n\nExecuting a query to get cargo counts\n\n1.  Now use Synapse\
    \ Studio as you did earlier to run queries. Paste in the following T-SQL (which\
    \ is found in the script **getcargocounts.sql**) to run a query to look at cargo\
    \ counts:\n\n```\n    SELECT v.Vehicle_Registration, v.Vehicle_City, count(*)\
    \ AS cargo\n    FROM Warehouse.Vehicles v\n    JOIN Warehouse.Vehicle_StockItems\
    \ vs\n    ON v.Vehicle_Registration = vs.Vehicle_Registration\n    GROUP BY v.Vehicle_Registration,\
    \ v.Vehicle_City;\n    GO\n    ```\n\nThe results should look like Figure [3-34](#525217_1_En_3_Chapter.xhtml#Fig34),\
    \ which matches the initial population of data in these tables.\n\n![](Images/525217_1_En_3_Fig35_HTML.png)\n\
    \nA screenshot of the containers page titled w w i data. The overview is selected\
    \ in the left pane. An arrow points to the folder on the right pane.\n\nFigure\
    \ 3-35\n\nThe table group in the landing zone\n\n1.  We don’t support copying\
    \ or modifying files in the landing zone, but it is worth taking a look at files\
    \ in the container for learning purposes. If you got to your container in the\
    \ landing zone account and drill into the container, your results will look similar\
    \ to Figure [3-35](#525217_1_En_3_Chapter.xhtml#Fig35).\n\nThe GUID value of the\
    \ folder matches the table group ID created and stored in the system table **changefeed.change_feed_table_groups**\
    \ in the WideWorldImporters database.\n\nWhen you drill into this folder, you\
    \ will see another folder called Tables. Drill into that, and you will see a series\
    \ of more folders. Each of these represents a table. The name is the table_id\
    \ stored in the **changefeed.change_feed_tables** system table stored in the WideWorldImporters\
    \ database. Drill into the first folder down until you find a parquet file like\
    \ in Figure [3-36](#525217_1_En_3_Chapter.xhtml#Fig36).\n\n![](Images/525217_1_En_3_Fig36_HTML.png)\n\
    \nA screenshot of the right pane of the containers page. An arrow points to the\
    \ link given for location under the root directory titled w w i data.\n\nFigure\
    \ 3-36\n\nParquet file from initial seeding"
