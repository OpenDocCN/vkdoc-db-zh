  trans: '

    ## Azure 虚拟机上的 SQL Server


    Azure 虚拟机上的 SQL Server 是 `Azure SQL` 家族在 Azure 中的服务之一。Azure 虚拟机也被称为基础设施即服务 (`IaaS`)。你在本书的第
    10 章中学习了在 Azure 虚拟机上运行 `SQL Server 2022` 的所有细节。在该章节中，你了解了如何在 Azure 虚拟机生态系统中部署、使用和管理
    `SQL Server 2022`。你了解到了关于此选项最有价值的信息之一。`它就是 SQL Server`。它是在 Windows 或 Linux 操作系统上运行的完整
    SQL Server "盒装产品"，由你管理虚拟机 `内部` 的一切。微软管理虚拟机外部的一切，但同时为完整的托管虚拟机体验提供必要的资源（大小选择、网络、存储、内置虚拟机
    `HA` 等）。


    因为微软管理着基础设施，所以我们为你提供了称为虚拟机大小的选项。可以把这想象成一份大型的晚餐菜单，列出了你需要的 CPU 速度以及 CPU 数量、内存和存储。你可以在
    [`https://aka.ms/azurevmsizes`](https://aka.ms/azurevmsizes) 找到所有大小选择。


    请通过 [`https://aka.ms/azuresqlvm`](https://aka.ms/azuresqlvm) 开始使用 Azure 虚拟机上的
    SQL Server。


    ### 何时使用 Azure 虚拟机上的 SQL Server


    如果你需要选择完整的 SQL Server 产品，因为你需要 `SSAS` 或 `SSRS` 等所有功能和服务，或者你的应用程序需要特定版本的 SQL Server，但你又不想管理虚拟机的硬件和主机，那么
    Azure 虚拟机上的 SQL Server 可能适合你。


    正如你在第 10 章所看到的，我们确实提供了一些服务来帮助你获得 Azure 虚拟机体验，包括通过市场轻松部署，以及 `SQL Server IaaS 代理扩展`
    来协助备份、安全更新、最佳实践评估、`Microsoft Defender` 以及“SQL”Azure 门户体验。


    另外，如果你担心无法通过故障转移集群或 `Always On 可用性组` 构建完整的 `HA` 解决方案，这在 Azure 虚拟机环境中都是可以实现的。


    与 SQL Server 的一个巨大区别在于，你使用 `云计费` 方式为 Azure 虚拟机上的 SQL Server 付费。这意味着你使用 Azure 订阅按月支付
    SQL Server 和虚拟机的使用费用。如果你习惯于 SQL Server 的许可和定价，起初这可能会让你感觉非常不同。但我们提供了一些选项来帮助你。首先，你可以使用一个称为
    `Azure 混合权益` ([`https://aka.ms/azurehybridbenefit`](https://aka.ms/azurehybridbenefit))
    的概念来应用你现有的 SQL Server 许可证。此外，你可以注册一份合同，在更长的时间段内使用虚拟机，并获得称为 `Azure 预留虚拟机实例` 的折扣。另外，如果
    Azure 虚拟机已停止（取消分配），那么在它重新启动之前，你无需支付任何计算费用。这对于开发和测试目的来说是一个非常不错的选择。


    许多客户选择此选项来迁移本地 SQL Server 部署，因为它可以提供最快、最简单的 `直接迁移` 体验。鉴于它是完整的 SQL Server 产品，应该不会有任何应用程序兼容性问题，因为你只是改变了现有
    SQL Server 的托管位置。


    另外需要考虑的一点是：一旦你在 Azure 虚拟机上部署了 SQL Server，我们为你提供了未来在线迁移到 Azure SQL 托管实例的选项。因此，Azure
    虚拟机可以成为你迈向完整托管体验的垫脚石。


    请通过 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/migrate-to-vm-from-sql-server`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/migrate-to-vm-from-sql-server)
    开始迁移到 Azure 虚拟机。


    ## Azure SQL 托管实例


    假设你需要完整的 SQL Server 引擎，包含数据库和实例功能，如 `SQL Server 代理`、`复制`、`资源调控器` 和 `DTC`。但是，你并不局限于某个特定的
    SQL Server 版本。事实上，你很乐意不再需要担心打补丁，比如应用累积更新。这不仅仅是打补丁的问题。你希望有一个 `无版本` 的 SQL 选项，这样我们就可以比
    SQL Server 更频繁地为你提供新功能。而且你真的不关心托管 SQL Server 的虚拟机或操作系统是什么样子。你希望对核心数、内存、存储，甚至 `I/O`
    延迟和吞吐量有选择权，但不想管理虚拟机，甚至不想担心文件的物理放置位置。


    这些听起来都很有趣。让我们让它变得更好。假设你很乐意拥有一个能自动执行备份，甚至能在你需要进行时间点恢复时随时保留这些备份的系统。然后，如果系统能提供内置的高可用性，包括
    `Always On 可用性组`，那就更好了。哦，我还希望这个 `自动高可用性` 附带一个退款保证。


    欢迎来到 Azure SQL 托管实例。Azure SQL 托管实例是 `平台即服务` (`PaaS`) 的一个例子，也是 Azure SQL 家族中的第二个选项。我记得有一次我告诉
    Anna Hoffman 我会如何总结 Azure SQL 托管实例：“它是 SQL Server 与云的最佳结合体。”它确实是一个 `托管 SQL Server`。Azure
    SQL 托管实例是我上一本书 `Azure SQL Revealed` 的重要组成部分。在书中，我在非常详细的层面对比了 SQL Server 与 Azure
    SQL 托管实例。想象一下，你需要的几乎所有核心 SQL Server 功能都包含在一个托管 SQL Server 中。


    当你从 `SSMS` 连接到 Azure SQL 托管实例时，它看起来就像一个完整的 SQL Server！你会注意到一个很大的不同是 `Always On
    可用性组` 选项不见了。那是因为如果你为 Azure SQL 托管实例选择 `业务关键` 服务层，我们会在幕后创建一个 `Always On 可用性组`，包括一个免费的只读副本。然后我们为你维护它。Azure
    SQL 托管实例构建在 Azure 生态系统中，并使用服务结构来支持 `HA` 决策。`通用目的` 服务层的行为类似于 `故障转移集群实例`，而无需设置 Windows
    故障转移集群。你甚至可以使用 `自动故障转移组` 跨区域连接两个实例。此外，当你部署 Azure SQL 托管实例时，我们提供了一个可用性的 `服务级别协议`
    (`SLA`)，你可以在 [`https://azure.microsoft.com/support/legal/sla/azure-sql-sql-managed-instance/v1_0`](https://azure.microsoft.com/support/legal/sla/azure-sql-sql-managed-instance/v1_0)
    阅读。


    我们的迁移工具支持从 SQL Server 迁移到 Azure SQL 托管实例。你可以在 [`https://docs.microsoft.com/azure/azure-sql/migration-guides/managed-instance/sql-server-to-managed-instance-guide`](https://docs.microsoft.com/azure/azure-sql/migration-guides/managed-instance/sql-server-to-managed-instance-guide)
    阅读迁移指南。


    请通过 [`https://aka.ms/azuresqlmi`](https://aka.ms/azuresqlmi) 立即开始使用 Azure SQL
    托管实例。

    '
- fmt: '### When to Use Azure SQL Managed Instance


    Like Azure Virtual Machines, `Azure SQL Managed Instance` is for users of `SQL
    Server` who want Microsoft to manage the infrastructure and hosts behind the computing
    for `SQL Server`. `Azure SQL Managed Instance` goes a step further by managing
    the virtual machine environment supporting `SQL Server`.


    Combined with a versionless engine, automatic high availability, automated backups,
    and a Microsoft-backed `SLA`, `Azure SQL Managed Instance` as a managed `SQL Server`
    can be a very nice option for many customers who use `SQL Server` today. And remember
    that in Chapter [3](#525217_1_En_3_Chapter.xhtml) we introduced the concept of
    using `Azure SQL Managed Instance` as part of your disaster recovery system. That
    may be the way for your start to use `Azure SQL Managed Instance`.


    Like `Azure Virtual Machines`, you are billed using an `Azure` subscription but
    also have the options for `Azure Hybrid Benefit` and reserved capacity to save
    costs.


    Are there differences from `SQL Server` that might prevent me from choosing `Azure
    SQL Managed Instance`? The answer is yes but not as much as you would think:


    *   `Azure SQL Managed Instance` includes the database engine with other features
    like replication, `Polybase`, and `DTC`. If you need services like `SSAS` or `SSRS`,
    `Azure SQL Managed Instance` would not be your choice. Note that `SSIS` packages
    are compatible to work with `Azure SQL Managed Instance`.


    *   While most core database engine features are available in `Azure SQL Managed
    Instance`, there are a few differences, listed here [`https://aka.ms/azuretsqldiff`](https://aka.ms/azuretsqldiff).


    *   There are some resource limits to consider. The largest storage for an `Azure
    SQL Managed Instance` today is `16TB` (this is for all databases for the instance).
    `80 vCores` is the max number of `CPUs` we support today, and based on our most
    advanced option today, you have a maximum amount of memory at `~870Gb`. We keep
    growing this limit, so stay in touch with our updates at [`https://docs.microsoft.com/azure/azure-sql/managed-instance/resource-limits`](https://docs.microsoft.com/azure/azure-sql/managed-instance/resource-limits).


    ### Azure SQL Database


    The final service in the `Azure SQL` family is `Azure SQL Database`. `Azure SQL
    Database` is where it all started for `SQL` in the cloud. From the beginning we
    wanted to create a concept where a developer could just focus on a database and
    not worry about infrastructure, virtual machines, `OS`, or even the `SQL Server`
    instance. We actually implemented early work on this inside `SQL Server` as contained
    databases. I also covered `Azure SQL Database` in detail in the book `Azure SQL
    Revealed`.


    I believe `Azure SQL Database` today has achieved all of its initial goals, but
    there is room to go farther. `Azure SQL Database` represents the most `managed
    service` of the `Azure SQL` family. It is the highest level of `PaaS` for `Azure
    SQL`. It has all the managed capabilities of `Azure SQL Managed Instance` like
    versionless, automatic backups, built-in `HA`, and more. It takes the managed
    concept further because you don’t have to care about the `SQL Server` instance.


    Note


    We do confuse people because `Azure SQL Database` has a concept of a `logical
    server`, which is really a set of metadata supporting multiple databases and connection/security
    information about databases. But it is not a physical `SQL Server` instance.


    Unlike `Azure SQL Managed Instance`, there are two interesting choices when deploying
    an `Azure SQL Database` called `Serverless` and `Hyperscale`.


    When you deploy an `Azure SQL Database`, you typically choose the number of `vCores`
    for your database like a Managed Instance. `Serverless` allows you to choose a
    `range` of `vCores` so we can auto-scale your workload up or down. This also lights
    up the ability to pay for `Serverless` for only the `vCores` you use. In addition,
    `Serverless` has a pause/resume feature. So if you are not using the database,
    we will pause the compute, and you don’t pay for any `vCore` usage during that
    time. When you connect again, we “resume” your database, and normal billing continues.
    For any new developer using `Azure SQL Database`, this could be a very compelling
    option.


    `Hyperscale` is built for exactly its name – a way for you to get unlimited database
    resources, compute, memory, and storage. In fact, `Hyperscale` today can support
    a `100TB` database in `Azure`. It is the largest database option we have in the
    cloud. `Hyperscale` also offers `automatic` storage. You don’t choose a maximum
    storage option. You just create a database, and we keep scaling your growth as
    much as you need. You do choose `vCores` for `Hyperscale`, which dictates your
    memory limits. But `Hyperscale` uses a distributed, tiered architecture with paging
    systems (which is one of the reasons we can give you speed at `100TB`), so those
    limits do not matter as much when it comes to performance. In addition, one of
    the ways your application can scale with `Hyperscale` is replicas including up
    to `30` read-scale named replicas. This architecture doesn’t use `Always On Availability
    Groups` but uses log-based change methodology to achieve the same concept at scale
    with built-in high availability.


    Think of these database options. What about a world where we combine `Serverless`
    and `Hyperscale` together! (Stay tuned; it may happen sooner than you think.)


    While `Azure SQL Database` provides you core engine capabilities, it does limit
    you because you don’t have access to instance-level features. So `SQL Server Agent`
    jobs, replication (although an `Azure SQL Database` can be a subscriber), resource
    governor, and `DTC` to name a few are not supported with `Azure SQL Database`.
    These features are reserved for scenarios where you need a complete `SQL Server`
    instance.


    The good news is that `Azure SQL Database` includes most of the innovations you
    have read in this book for `SQL Server 2022` including `Synapse Link`, `Microsoft
    Purview` policies, `Azure Active Directory (AAD)`, `Microsoft Defender`, built-in
    query intelligence, `Ledger`, and more.


    Recently we have been investing in developers for `Azure SQL Database` including
    a local developer experience (using containers), `Azure SQL` function bindings,
    new and improved `JSON` support, and `REST API` integration built into the engine.
    You can learn more about these exciting new features for developers at [`https://docs.microsoft.com/events/build-2022/brk20-modernize-your-applications-with-new-innovations-across-sql-server-2022-azure-sql`](https://docs.microsoft.com/events/build-2022/brk20-modernize-your-applications-with-new-innovations-across-sql-server-2022-azure-sql).


    Get started today with `Azure SQL Database` at [`https://aka.ms/azuresqldb`](https://aka.ms/azuresqldb).'
