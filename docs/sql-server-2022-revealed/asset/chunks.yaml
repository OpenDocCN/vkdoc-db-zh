    \ names (that you put in the hosts file) for <node1> (primary) and <node2> (secondary).\
    \ This script executes the following T-SQL statements:\n\n```\n    USE master;\n\
    \    GO\n    CREATE AVAILABILITY GROUP [ag1]\n    WITH (CLUSTER_TYPE = NONE, CONTAINED)\n\
    \    FOR REPLICA ON\n    N'' WITH (\n    ENDPOINT_URL = N'tcp://:5022',\n    AVAILABILITY_MODE\
    \ = ASYNCHRONOUS_COMMIT,\n    FAILOVER_MODE = MANUAL,\n    SEEDING_MODE = AUTOMATIC,\n\
    \    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n    ),\n    N'' WITH (\n    ENDPOINT_URL\
    \ = N'tcp://:5022',\n    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n    FAILOVER_MODE\
    \ = MANUAL,\n    SEEDING_MODE = AUTOMATIC,\n    SECONDARY_ROLE (ALLOW_CONNECTIONS\
    \ = ALL)\n    );\n    GO\n    ALTER AVAILABILITY GROUP [ag1] GRANT CREATE ANY\
    \ DATABASE;\n    GO\n    ```\n\nNotice the use of the option CLUSTER_TYPE = NONE\
    \ (clusterless) and CONTAINED. Any type of availability group will support CONTAINED.\
    \ I’m just using a clusterless type to simplify the exercise.\n\nFor my system,\
    \ my script looks like this:\n\n```\n    USE master;\n    GO\n    CREATE AVAILABILITY\
    \ GROUP [ag1]\n    WITH (CLUSTER_TYPE = NONE, CONTAINED)\n    FOR REPLICA ON\n\
    \    N'bwsql2022vm1' WITH (\n    ENDPOINT_URL = N'tcp://bwsql2022vm1:5022',\n\
    \    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n    FAILOVER_MODE = MANUAL,\n \
    \   SEEDING_MODE = AUTOMATIC,\n    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n\
    \    ),\n    N'bwsql2022vm2' WITH (\n    ENDPOINT_URL = N'tcp://bwsql2022vm2:5022',\n\
    \    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n    FAILOVER_MODE = MANUAL,\n \
    \   SEEDING_MODE = AUTOMATIC,\n    SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n\
    \    );\n    GO\n    ```"
  trans: "\n### 让我们动手试试\n\n让我们通过一个练习来了解**包含可用性组**是如何工作的。在这个练习中，我将设置一个*无集群*的可用性组。换句话说，我不使用\
    \ Windows 集群，因此我的可用性组不具备自动故障转移功能。无集群的可用性组是展示包含可用性组最简单的方法。因为我使用的是无集群可用性组，你也可以轻松地在\
    \ Linux 上设置这个练习。你也可以设置自己类型的可用性组，仍然可以使用这里的大部分示例。\n\n#### 注意\n\n本练习的步骤非常详细。你需要仔细遵循每一步，否则练习将无法成功。\n\
    \n## 先决条件\n\n*   两台运行 Windows Server 的虚拟机，每台具有四个 vCPU 和 `8Gb` 内存。虚拟机需要位于同一网络和子网中。我使用了\
    \ Azure 虚拟机，并将两台虚拟机放在同一个资源组中，这会自动将它们放入同一个 VNet 和子网。为了让我的脚本更容易操作，我手动将每台虚拟机的 IP\
    \ 地址添加到了 `C:\\windows\\system32\\drivers\\etc\\hosts` 文件中。这样我就可以使用服务器名称而不是直接 IP\
    \ 地址。指定其中一台虚拟机为主副本，另一台为辅助副本。在以下步骤中，我将称它们为主实例或辅助实例（或虚拟机）。\n*   在每台虚拟机上安装 SQL Server\
    \ 评估版，并启用混合模式身份验证（也称为 SQL Server 和 Windows 身份验证模式）。为了简化练习，我们将使用 SQL 登录名。你可以在安装期间或安装后（安装后需要重启实例）进行此操作。\n\
    *   在每台虚拟机上，创建防火墙规则以允许端口 `1433` 和 `5022` 的传入流量。\n*   使用 SQL Server 配置管理器为每个 SQL\
    \ 实例启用 Always On 可用性组功能，并重新启动 SQL Server。你可以在 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/enable-and-disable-always-on-availability-groups-sql-server#SQLCM2Procedure`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/enable-and-disable-always-on-availability-groups-sql-server#SQLCM2Procedure)\
    \ 阅读更多关于如何执行此操作的信息（请忽略有关 Windows 集群的说明）。这需要重启实例。\n*   使用 SQL Server Management\
    \ Studio (`SSMS`)。你可以使用最新的 `18.x` 版本，但 `19.x` 版本包含新功能，可以在对象资源管理器中查看包含可用性组，并提供图形界面来创建包含\
    \ AG。在本练习中，我们将使用 T-SQL “手动方式” 进行操作，但 `SSMS 19.X` 会识别包含 AG。\n*   从本书示例的 **ch06_meatandpotatoes\\\
    availability\\containedag** 目录获取脚本。\n\n## 练习步骤\n\n![一张标题为“always on high availability”的文件夹截图。其下包含各种文件夹和文件。光标指向“always\
    \ on high availability”。](img/525217_1_En_6_Fig6_HTML.jpg)\n*图 6-6: SQL Server\
    \ 2022 中的包含可用性组*\n\n1.  **直接连接到实例**，使用安装时设置的默认系统管理员登录，在主实例和辅助实例上都执行脚本 **sqlsysadminlogin.sql**。此脚本执行以下\
    \ T-SQL 语句：\n\n    ```\n    USE master;\n    GO\n    CREATE LOGIN sqladmin WITH\
    \ PASSWORD = '$Strongpassw0rd';\n    GO\n    EXEC sp_addsrvrolemember 'sqladmin',\
    \ 'sysadmin';\n    GO\n    ```\n    在接下来的练习中，你将使用此登录名连接到每个实例。\n\n2.  在主虚拟机和辅助虚拟机上都启动\
    \ `SQL Server Agent` 服务。\n\n3.  在主虚拟机上使用 `SSMS`，通过 **sqladmin** 登录名**同时**连接到主实例和辅助实例。\n\
    \n4.  在主实例和辅助实例上都执行脚本 **dbmcreds.sql**。此脚本执行以下 T-SQL 语句：\n\n    ```\n    USE master;\n\
    \    GO\n    CREATE LOGIN dbm_login WITH PASSWORD = '$Strongpassw0rd';\n    GO\n\
    \    CREATE USER dbm_user FOR LOGIN dbm_login;\n    GO\n    ```\n\n5.  **仅在主实例上**执行脚本\
    \ **createcert.sql**。此脚本执行以下 T-SQL 语句：\n\n    ```\n    USE master;\n    GO\n \
    \   CREATE MASTER KEY ENCRYPTION BY PASSWORD = '$Strongpassw0rd';\n    GO\n  \
    \  DROP CERTIFICATE dbm_certificate;\n    GO\n    CREATE CERTIFICATE dbm_certificate\
    \ WITH SUBJECT = 'dbm';\n    GO\n    BACKUP CERTIFICATE dbm_certificate\n    TO\
    \ FILE = 'C:\\Program Files\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\\
    DATA\\dbm_certificate.cer'\n    WITH PRIVATE KEY (\n        FILE = 'c:\\Program\
    \ Files\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\DATA\\dbm_certificate.pvk',\n\
    \        ENCRYPTION BY PASSWORD = '$Strongpassw0rd');\n    GO\n    ```\n    此脚本假设了\
    \ Windows 上 SQL Server 的默认安装路径。如果你的安装路径不同，则必须修改此脚本。对于 Linux，你还需要修改此脚本以匹配正确的安装路径。\n\
    \n6.  将文件 **dbm_certificate.cer** 和 **dbm_certificate.pvk** 从主虚拟机的路径复制到辅助虚拟机上完全相同的文件路径（默认为\
    \ `C:\\Program Files\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\DATA`）。\n\
    \n7.  **仅在辅助实例上**执行脚本 **importcert.sql**。此脚本执行以下 T-SQL 语句（如果路径不是下面的默认值，你需要进行修改）：\n\
    \n    ```\n    USE master;\n    GO\n    CREATE MASTER KEY ENCRYPTION BY PASSWORD\
    \ = '$Strongpassw0rd';\n    GO\n    CREATE CERTIFICATE dbm_certificate\n     \
    \   AUTHORIZATION dbm_user\n        FROM FILE = 'C:\\Program Files\\Microsoft\
    \ SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\DATA\\dbm_certificate.cer'\n       \
    \ WITH PRIVATE KEY (\n            FILE = 'c:\\Program Files\\Microsoft SQL Server\\\
    MSSQL16.MSSQLSERVER\\MSSQL\\DATA\\dbm_certificate.pvk',\n            DECRYPTION\
    \ BY PASSWORD = '$Strongpassw0rd');\n    GO\n    ```\n\n8.  在**两个实例上**都执行脚本 **dbm_endpoint.sql**。此脚本执行以下\
    \ T-SQL 语句：\n\n    ```\n    USE master;\n    GO\n    CREATE ENDPOINT [Hadr_endpoint]\n\
    \        AS TCP (LISTENER_PORT = 5022)\n        FOR DATA_MIRRORING (\n       \
    \     ROLE = ALL,\n            AUTHENTICATION = CERTIFICATE dbm_certificate,\n\
    \            ENCRYPTION = REQUIRED ALGORITHM AES\n            );\n    GO\n   \
    \ ALTER ENDPOINT [Hadr_endpoint] STATE = STARTED;\n    GRANT CONNECT ON ENDPOINT::[Hadr_endpoint]\
    \ TO [dbm_login];\n    GO\n    ```\n\n9.  编辑脚本 **createag.sql**。将你放在 hosts 文件中的两个虚拟机服务器名称填入\
    \ `<node1>`（主）和 `<node2>`（辅）。此脚本执行以下 T-SQL 语句：\n\n    ```\n    USE master;\n \
    \   GO\n    CREATE AVAILABILITY GROUP [ag1]\n        WITH (CLUSTER_TYPE = NONE,\
    \ CONTAINED)\n        FOR REPLICA ON\n            N'' WITH (\n               \
    \ ENDPOINT_URL = N'tcp://:5022',\n                AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n\
    \                FAILOVER_MODE = MANUAL,\n                SEEDING_MODE = AUTOMATIC,\n\
    \                SECONDARY_ROLE (ALLOW_CONNECTIONS = ALL)\n                ),\n\
    \            N'' WITH (\n                ENDPOINT_URL = N'tcp://:5022',\n    \
    \            AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n                FAILOVER_MODE\
    \ = MANUAL,\n                SEEDING_MODE = AUTOMATIC,\n                SECONDARY_ROLE\
    \ (ALLOW_CONNECTIONS = ALL)\n                );\n    GO\n    ALTER AVAILABILITY\
    \ GROUP [ag1] GRANT CREATE ANY DATABASE;\n    GO\n    ```\n    注意使用了 `CLUSTER_TYPE\
    \ = NONE`（无集群）和 `CONTAINED` 选项。任何类型的可用性组都支持 `CONTAINED`。我使用无集群类型只是为了简化练习。\n\n\
    \    对于我的系统，我的脚本如下所示：\n\n    ```\n    USE master;\n    GO\n    CREATE AVAILABILITY\
    \ GROUP [ag1]\n        WITH (CLUSTER_TYPE = NONE, CONTAINED)\n        FOR REPLICA\
    \ ON\n            N'bwsql2022vm1' WITH (\n                ENDPOINT_URL = N'tcp://bwsql2022vm1:5022',\n\
    \                AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n                FAILOVER_MODE\
    \ = MANUAL,\n                SEEDING_MODE = AUTOMATIC,\n                SECONDARY_ROLE\
    \ (ALLOW_CONNECTIONS = ALL)\n                ),\n            N'bwsql2022vm2' WITH\
    \ (\n                ENDPOINT_URL = N'tcp://bwsql2022vm2:5022',\n            \
    \    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\n                FAILOVER_MODE =\
    \ MANUAL,\n                SEEDING_MODE = AUTOMATIC,\n                SECONDARY_ROLE\
    \ (ALLOW_CONNECTIONS = ALL)\n                );\n    GO\n    ```\n"
- fmt: '### 10. 在辅助实例上执行脚本 `joinag.sql`

    此脚本执行以下 T-SQL 语句：

    ```sql

    USE master;

    GO

    ALTER AVAILABILITY GROUP [ag1] JOIN WITH (CLUSTER_TYPE = NONE);

    GO

    ALTER AVAILABILITY GROUP [ag1] GRANT CREATE ANY DATABASE;

    GO

    ```


    ### 11. 验证配置

    现在，你应该已经有一个正常运行的包含式可用性组。让我们使用 SSMS 中的对象资源管理器来确认它是否工作正常。如果展开“可用性组”文件夹，你应该会看到类似于图
    [6-6](#525217_1_En_6_Chapter.xhtml#Fig6) 的内容。

    你可以看到可用性组由包含式 AG 的 `master` 和 `msdb` 组成。SSMS 19 有新图标来识别包含式 AG。


    ![](Images/525217_1_En_6_Fig7_HTML.jpg)

    *标题为“数据库”的文件夹截图。它包含系统数据库和数据库快照文件夹，其下有文件。*

    图 6-7

    包含式 AG 的 `master` 和 `msdb` 数据库


    由于你直接连接到实例（而非通过侦听器或直接数据库上下文），你可以将这些数据库视为用户数据库。在对象资源管理器中展开“数据库”文件夹。你应该会看到类似于图 [6-7](#525217_1_En_6_Chapter.xhtml#Fig7)
    的内容。

    当你使用侦听器或直接数据库上下文时，你会看到不同的视图。


    ![](Images/525217_1_En_6_Fig8_HTML.png)

    *标题为“SQL Server”的截图。网络数据包大小和连接超时的条目分别为 4096 字节和 30 秒，网络协议设置为默认值。*

    图 6-8

    使用数据库上下文连接到主实例


    ### 12. 创建并备份新数据库

    在 `primary instance` 上执行脚本 `createdb.sql` 来创建一个新数据库并对其进行备份。此脚本执行以下 T-SQL 语句（请根据系统需要更改备份文件路径）：

    ```sql

    CREATE DATABASE letsgomavs;

    GO

    ALTER DATABASE letsgomavs SET RECOVERY FULL;

    GO

    BACKUP DATABASE letsgomavs

    TO DISK = N''c:\Program Files\Microsoft SQL Server\MSSQL16.MSSQLSERVER\MSSQL\Backup\letsgomavs.bak''
    WITH INIT;

    GO

    ```

    > *在创建此演示时，我心爱的达拉斯独行侠队正在为 NBA 西部联盟季后赛激战，所以我忍不住在这里用了他们的名字。遗憾的是，他们在西部决赛中输给了最终的冠军金州勇士队。*


    ### 13. 将新数据库加入可用性组

    在 `primary instance` 上执行脚本 `dbjoinag.sql`，将新数据库加入可用性组。此脚本执行以下 T-SQL 语句：

    ```sql

    USE master;

    GO

    ALTER AVAILABILITY GROUP [ag1] ADD DATABASE letsgomavs;

    GO

    ```

    如果在 SSMS 中刷新可用性组，你将看到数据库 `letsgomavs` 现在已成为 AG 的一部分。


    ### 14. 使用直接数据库上下文连接

    现在情况变得有趣了。使用 `direct database context` 连接到 `primary instance`。我发现启动另一个 SSMS 副本并连接到主实例是最简单的方法。但这次在
    SSMS 登录屏幕上，选择“选项”和“连接属性”选项卡。在“连接到数据库”字段中输入 `letsgomavs`，如图 [6-8](#525217_1_En_6_Chapter.xhtml#Fig8)
    所示。

    通过使用侦听器也可以实现相同的概念。由于我使用的是无集群可用性组，我将只使用数据库上下文进行连接。


    ### 15. 查看数据库列表

    使用 SSMS 查看数据库列表。你将只看到 `letsgomavs`，如果展开系统表，你将看到 `master` 和 `msdb`。这些就是包含式 AG 的
    `master` 和 `msdb` 数据库。


    ### 16. 创建 SQL Server 代理作业

    当你连接到 `primary instance` 时，使用 SSMS 创建一个 SQL Server 代理作业。作业内容无关紧要。我只是使用对象资源管理器界面创建了一个名为
    `testjob` 的无步骤新作业。


    ### 17. 在辅助实例上验证作业复制

    启动另一个直接连接到该实例的 SSMS。使用对象资源管理器展开 SQL Server 代理的作业列表。你在那里看不到该作业，因为它位于包含式 AG 的 `msdb`
    数据库中。

    使用相同的技术通过 SSMS 连接到 `letsgomavs` 数据库来连接 `secondary instance`。在对象资源管理器中展开 SQL Server
    代理的作业，你将看到之前创建的作业。这证明了作业会被复制到辅助实例。


    ### 18. 执行手动故障转移

    让我们尝试进行故障转移。使用 `directly connected to the primary instance (not using the database
    context)` 的 SSMS，右键单击可用性组并选择“故障转移”，如图 [6-9](#525217_1_En_6_Chapter.xhtml#Fig9)
    所示。


    ![](Images/525217_1_En_6_Fig9_HTML.jpg)

    *重叠菜单的截图。光标指向“故障转移”。*

    图 6-9

    包含式 AG 的手动故障转移

    按照向导中的步骤故障转移到辅助实例。在连接辅助实例时，使用实例连接（不要提供数据库上下文），并 `use the sqladmin SQL login` 在本练习前面创建的。由于我们使用的是无集群
    AG 并进行手动故障转移，你将收到有关数据丢失的警告。忽略这些警告以完成故障转移，并单击选项以确认你知道可能会有数据丢失。


    ### 19. 验证故障转移

    故障转移完成后，你可以使用直接连接到主实例或辅助实例的 SSMS 来查看角色切换。你也可以使用数据库上下文连接到 `new primary`，以查看你的数据库和
    SQL Server 代理作业已准备就绪可供使用。


    ### 注意事项

    包含式 AG 有一些限制和注意事项。例如，不支持对位于包含式 AG 中的数据库使用复制。但像 CDC、日志传送和 TDE 这样的功能在遵循一些特殊使用说明的情况下是支持的。你可以在我们的文档中了解更多相关信息：[`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview#interactions-with-other-features`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview#interactions-with-other-features)。


    ### 其他可用性组增强功能

    我们对 Always On 可用性组的核心部分进行了其他小的增强，包括可靠性修复、诊断功能以及对分布式可用性组的增强。'
  raw: "10.  Execute the script **joinag.sql** on the secondary instance. This script\
    \ executes the following T-SQL statements:\n\n```\n    USE master;\n    GO\n \
    \   ALTER AVAILABILITY GROUP [ag1] JOIN WITH (CLUSTER_TYPE = NONE);\n    GO\n\
    \    ALTER AVAILABILITY GROUP [ag1] GRANT CREATE ANY DATABASE;\n    GO\n    ```\n\
    \n11.  You should now have a Contained Availability Group up and running. Let’s\
    \ make sure it is working by using Object Explorer in SSMS. If you expand the\
    \ folder for Availability Groups, you should see something like Figure [6-6](#525217_1_En_6_Chapter.xhtml#Fig6).\n\
    \nYou can see the availability group is made up of the Contained AG master and\
    \ msdb. SSMS 19 has new icons to recognize a Contained AG.\n\n![](Images/525217_1_En_6_Fig7_HTML.jpg)\n\
    \nA screenshot of a folder titled databases. It has system databases and database\
    \ snapshots folders with files under it.\n\nFigure 6-7\n\nContained AG master\
    \ and msdb databases\n\n1.  Since you are directly connected to the instance (not\
    \ through a listener or direct db context), you can see these databases as user\
    \ databases. Expand the Databases folder in Object Explorer. You should see something\
    \ like Figure [6-7](#525217_1_En_6_Chapter.xhtml#Fig7).\n\nWhen using the listener\
    \ or direct db context, you will see that we have a different view.\n\n![](Images/525217_1_En_6_Fig8_HTML.png)\n\
    \nA screenshot titled S Q L server. The entries for network packet size and connection\
    \ time-out are 4096 bytes and 30 seconds respectively, with the network protocol\
    \ set at default.\n\nFigure 6-8\n\nConnect to the primary instance with a database\
    \ context\n\n1.  Execute the script **createdb.sql** on the **primary instance**\
    \ to create a new database and back it up. This script executes the following\
    \ T-SQL statements (change the file path for the backup to your system needs):\n\
    \n```\n    CREATE DATABASE letsgomavs;\n    GO\n    ALTER DATABASE letsgomavs\
    \ SET RECOVERY FULL;\n    GO\n    BACKUP DATABASE letsgomavs\n    TO DISK = N'c:\\\
    Program Files\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQL\\Backup\\letsgomavs.bak'\
    \ WITH INIT;\n    GO\n    ```\n\nAt the time I created this demo, my beloved Dallas\
    \ Mavericks were in the heat of battle for the NBA Western Conference playoffs,\
    \ so I couldn’t resist using their name here. Sadly, they lost to the eventual\
    \ champions, Golden State, in the Conference finals.\n\n2.  Execute the script\
    \ **dbjoinag.sql** against the primary instance to join the new database to the\
    \ availability group. This script executes the following T-SQL statements:\n\n\
    ```\n    USE master;\n    GO\n    ALTER AVAILABILITY GROUP [ag1] ADD DATABASE\
    \ letsgomavs;\n    GO\n    ```\n\nIf you refresh the availability group in SSMS,\
    \ you will see the database letsgomavs is now part of the AG.\n\n3.  Now it gets\
    \ interesting. Connect to the primary instance **using a direct database context**.\
    \ I find it easiest to launch another copy of SSMS and connect to the primary\
    \ instance. But this time on the SSMS login screen, select Options and the Connection\
    \ Properties tab. Put in letsgomavs in the Connect to database field like in Figure\
    \ [6-8](#525217_1_En_6_Chapter.xhtml#Fig8).\n\nYou can achieve the same concept\
    \ by using a listener. Since I’m using a clusterless availability group, I’ll\
    \ just connect using the database context.\n\n![](Images/525217_1_En_6_Fig9_HTML.jpg)\n\
    \nA screenshot of an overlapping menu. The cursor points to failover.\n\nFigure\
    \ 6-9\n\nManual failover for a Contained AG\n\n1.  Use SSMS to look at the list\
    \ of databases. You will only see letsgomavs, and if you expand system tables,\
    \ you will see master and msdb. These are the Contained AG master and msdb databases.\n\
    \n2.  While you are connected to the primary instance, use SSMS to create a SQL\
    \ Server Agent job. It doesn’t matter what is in the job. I just used the Object\
    \ Explorer interface to create a new job called testjob with no steps.\n\n3. \
    \ Launch another SSMS that is directly connected to the instance. Use Object Explorer\
    \ to expand the list of jobs for SQL Server Agent. You will not see the job there\
    \ because it is in the Contained AG msdb database.\n\n4.  Connect to the secondary\
    \ instance using the same technique with SSMS to connect with the letsgomavs database.\
    \ Expand the jobs for SQL Server Agent in Object Explorer, and you will see the\
    \ job you created previously. This demonstrates that jobs are replicated to secondary\
    \ instances.\n\n5.  Let’s try a failover. Using SSMS **directly connected to the\
    \ primary instance (not using the database context)**, right-click the availability\
    \ group and select Failover like in Figure [6-9](#525217_1_En_6_Chapter.xhtml#Fig9).\n\
    \nFollow the steps in the wizard to fail over to the secondary instance. When\
    \ connecting to the secondary, use the instance connection (do not provide the\
    \ database context) and **use the sqladmin SQL login** created earlier in this\
    \ exercise. Since we are using a clusterless AG with a manual failover, you will\
    \ get warnings about data loss. Ignore these to complete the failover and click\
    \ the option to confirm you know there may be data loss.\n\n1.  When the failover\
    \ is complete, you can use SSMS connected directly to the primary or secondary\
    \ instance to see the switch in roles. You can also connect using a database context\
    \ to the *new primary* to see your database and SQL Server Agent job ready to\
    \ use.\n\n#### Items to Consider\n\nThere are a few limits and considerations\
    \ for Contained AGs. For example, replication is not supported for databases that\
    \ are in a Contained AG. But features like CDC, log shipping, and TDE are supported\
    \ with some special instructions for use. You can learn more about these in our\
    \ documentation at [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview#interactions-with-other-features`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview#interactions-with-other-features).\n\
    \n### Other AG Enhancements\n\nWe have made other minor enhancements to the core\
    \ of Always On Availability Groups including reliability fixes, diagnostics, and\
    \ enhancements for Distributed Availability Groups."
  trans: '

    ### 10. 在辅助实例上执行脚本 `joinag.sql`

    此脚本执行以下 T-SQL 语句：

    ```sql

    USE master;

    GO

    ALTER AVAILABILITY GROUP [ag1] JOIN WITH (CLUSTER_TYPE = NONE);

    GO

    ALTER AVAILABILITY GROUP [ag1] GRANT CREATE ANY DATABASE;

    GO

    ```


    ### 11. 验证配置

    现在，你应该已经有一个正常运行的包含式可用性组。让我们使用 SSMS 中的对象资源管理器来确认它是否工作正常。如果展开“可用性组”文件夹，你应该会看到类似于图
    6-6 的内容。

    你可以看到可用性组由包含式 AG 的 `master` 和 `msdb` 组成。SSMS 19 有新图标来识别包含式 AG。


    ![](img/525217_1_En_6_Fig7_HTML.jpg)

    *标题为“数据库”的文件夹截图。它包含系统数据库和数据库快照文件夹，其下有文件。*

    图 6-7

    包含式 AG 的 `master` 和 `msdb` 数据库


    由于你直接连接到实例（而非通过侦听器或直接数据库上下文），你可以将这些数据库视为用户数据库。在对象资源管理器中展开“数据库”文件夹。你应该会看到类似于图 6-7
    的内容。

    当你使用侦听器或直接数据库上下文时，你会看到不同的视图。


    ![](img/525217_1_En_6_Fig8_HTML.png)

    *标题为“SQL Server”的截图。网络数据包大小和连接超时的条目分别为 4096 字节和 30 秒，网络协议设置为默认值。*

    图 6-8

    使用数据库上下文连接到主实例


    ### 12. 创建并备份新数据库

    在 `primary instance` 上执行脚本 `createdb.sql` 来创建一个新数据库并对其进行备份。此脚本执行以下 T-SQL 语句（请根据系统需要更改备份文件路径）：

    ```sql

    CREATE DATABASE letsgomavs;

    GO

    ALTER DATABASE letsgomavs SET RECOVERY FULL;

    GO

    BACKUP DATABASE letsgomavs

    TO DISK = N''c:\Program Files\Microsoft SQL Server\MSSQL16.MSSQLSERVER\MSSQL\Backup\letsgomavs.bak''
    WITH INIT;

    GO

    ```

    > *在创建此演示时，我心爱的达拉斯独行侠队正在为 NBA 西部联盟季后赛激战，所以我忍不住在这里用了他们的名字。遗憾的是，他们在西部决赛中输给了最终的冠军金州勇士队。*


    ### 13. 将新数据库加入可用性组

    在 `primary instance` 上执行脚本 `dbjoinag.sql`，将新数据库加入可用性组。此脚本执行以下 T-SQL 语句：

    ```sql

    USE master;

    GO

    ALTER AVAILABILITY GROUP [ag1] ADD DATABASE letsgomavs;

    GO

    ```

    如果在 SSMS 中刷新可用性组，你将看到数据库 `letsgomavs` 现在已成为 AG 的一部分。


    ### 14. 使用直接数据库上下文连接

    现在情况变得有趣了。使用 `direct database context` 连接到 `primary instance`。我发现启动另一个 SSMS 副本并连接到主实例是最简单的方法。但这次在
    SSMS 登录屏幕上，选择“选项”和“连接属性”选项卡。在“连接到数据库”字段中输入 `letsgomavs`，如图 6-8 所示。

    通过使用侦听器也可以实现相同的概念。由于我使用的是无集群可用性组，我将只使用数据库上下文进行连接。


    ### 15. 查看数据库列表

    使用 SSMS 查看数据库列表。你将只看到 `letsgomavs`，如果展开系统表，你将看到 `master` 和 `msdb`。这些就是包含式 AG 的
    `master` 和 `msdb` 数据库。


    ### 16. 创建 SQL Server 代理作业

    当你连接到 `primary instance` 时，使用 SSMS 创建一个 SQL Server 代理作业。作业内容无关紧要。我只是使用对象资源管理器界面创建了一个名为
    `testjob` 的无步骤新作业。


    ### 17. 在辅助实例上验证作业复制

    启动另一个直接连接到该实例的 SSMS。使用对象资源管理器展开 SQL Server 代理的作业列表。你在那里看不到该作业，因为它位于包含式 AG 的 `msdb`
    数据库中。

    使用相同的技术通过 SSMS 连接到 `letsgomavs` 数据库来连接 `secondary instance`。在对象资源管理器中展开 SQL Server
    代理的作业，你将看到之前创建的作业。这证明了作业会被复制到辅助实例。


    ### 18. 执行手动故障转移

    让我们尝试进行故障转移。使用 `directly connected to the primary instance (not using the database
    context)` 的 SSMS，右键单击可用性组并选择“故障转移”，如图 6-9 所示。


    ![](img/525217_1_En_6_Fig9_HTML.jpg)

    *重叠菜单的截图。光标指向“故障转移”。*

    图 6-9

    包含式 AG 的手动故障转移

    按照向导中的步骤故障转移到辅助实例。在连接辅助实例时，使用实例连接（不要提供数据库上下文），并 `use the sqladmin SQL login` 在本练习前面创建的。由于我们使用的是无集群
    AG 并进行手动故障转移，你将收到有关数据丢失的警告。忽略这些警告以完成故障转移，并单击选项以确认你知道可能会有数据丢失。


    ### 19. 验证故障转移

    故障转移完成后，你可以使用直接连接到主实例或辅助实例的 SSMS 来查看角色切换。你也可以使用数据库上下文连接到 `new primary`，以查看你的数据库和
    SQL Server 代理作业已准备就绪可供使用。


    ### 注意事项

    包含式 AG 有一些限制和注意事项。例如，不支持对位于包含式 AG 中的数据库使用复制。但像 CDC、日志传送和 TDE 这样的功能在遵循一些特殊使用说明的情况下是支持的。你可以在我们的文档中了解更多相关信息：[`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview#interactions-with-other-features`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/contained-availability-groups-overview#interactions-with-other-features)。


    ### 其他可用性组增强功能

    我们对 Always On 可用性组的核心部分进行了其他小的增强，包括可靠性修复、诊断功能以及对分布式可用性组的增强。

