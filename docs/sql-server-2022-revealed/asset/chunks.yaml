  trans: "# 9. 将数据导出至 Parquet 格式\n\n首先，让我们通过执行脚本 `wwi_cetas.sql` 来学习如何将 Parquet 格式的数据导出到\
    \ wwi 存储桶中。在 SSMS 中，选择 **包含实际执行计划** 选项。此脚本执行以下 T-SQL 语句：\n\n```sql\n    USE [WideWorldImporters];\n\
    \    GO\n    IF OBJECT_ID('wwi_customer_transactions', 'U') IS NOT NULL\n    DROP\
    \ EXTERNAL TABLE wwi_customer_transactions;\n    GO\n    CREATE EXTERNAL TABLE\
    \ wwi_customer_transactions\n    WITH (\n    LOCATION = '/wwi/',\n    DATA_SOURCE\
    \ = s3_wwi,\n    FILE_FORMAT = ParquetFileFormat\n    )\n    AS\n    SELECT *\
    \ FROM Sales.CustomerTransactions;\n    GO\n    ```\n\n让我们来检查一下这个脚本。`LOCATION`\
    \ 是存储桶名称。`LOCATION` 值可以是一个存储桶名称，甚至可以是一系列文件夹，乃至一个具体的文件名。在本例中，由于外部数据源未指定具体的存储桶，我需要在此处指定。由于我只指定了存储桶，查询会将所有文件放置在父文件夹中。对于\
    \ Parquet 文件和 REST API 连接器，没有谓词下推。所有的过滤操作都在 SQL Server 内部完成（即使你指定了 `WHERE` 子句）。\n\
    \n`DATA_SOURCE` 是我们为连接 minio 服务器而创建的外部数据源。文件格式匹配 Parquet。请注意，除了指定为 Parquet 外，我们无需再指定格式的任何其他信息。我们也可以在此定义中包含列名，但这不是必需的。使用语句的\
    \ `AS SELECT` 部分将创建一个包含列名、类型和数据的单一 Parquet 文件。\n\n在 **消息** 选项卡中，你应看到受影响了 97147\
    \ 行。在 **执行计划** 选项卡中，你应看到一个类似于图 7-5 的计划。\n\n请注意 `Put` 运算符，它用于将数据作为 Parquet 文件导出到\
    \ S3 连接器。\n\n**提示**\n我在使用 CETAS 时的一个观察是，它没有“重复”检测功能。如果你连续运行两次上述命令，将会创建两个 Parquet\
    \ 文件。\n\n![](img/525217_1_En_7_Fig6_HTML.png)\nMinio 窗口的截图。在 wwi 中创建的存储桶中打开了一个包含最后修改时间和大小的\
    \ Parquet 文件。\n**图 7-6** 通过 CETAS 添加到 S3 存储桶的 Parquet 文件\n\n### 1. 验证导出的文件\n使用\
    \ minio 控制台浏览 wwi 存储桶，并确认 Parquet 文件已添加。你的结果应类似于图 7-6。\n\n![](img/525217_1_En_7_Fig7_HTML.jpg)\n\
    通过 CETAS 创建的列列表的文件夹截图视图。一个名为 dbo.wwi_customer_transactions 的文件被高亮显示。\n**图 7-7**\
    \ 通过 CETAS 自动创建的 Parquet 列\n\n### 2. 查询外部表\n通过执行脚本 `querywwiexternaldata.sql`\
    \ 来查询新的外部表。此脚本执行以下 T-SQL 语句：\n\n```sql\n    USE [WideWorldImporters];\n    GO\n\
    \    SELECT c.CustomerName, SUM(wct.OutstandingBalance) as total_balance\n   \
    \ FROM wwi_customer_transactions wct\n    JOIN Sales.Customers c\n    ON wct.CustomerID\
    \ = c.CustomerID\n    GROUP BY c.CustomerName\n    ORDER BY total_balance DESC;\n\
    \    GO\n    ```\n\n请注意，在这个例子中，脚本将外部表（存储在 S3 中的 Parquet 文件）与用户数据库中的本地表进行了连接。你的结果应显示\
    \ 263 行。此类示例的一个常见用例是，在此查询之上构建一个 `VIEW`（视图），并且只授予用户对该视图的访问权限。这样，用户将被抽象于数据的来源，无论数据是在\
    \ SQL Server 中还是在 Parquet 文件中。\n\n### 3. 查看表架构\n使用 SSMS 的对象资源管理器查看通过 CETAS 创建的表的列定义。你的结果应类似于图\
    \ 7-7。\n\n请注意，列名和类型与数据库中原始表相匹配；这展示了 Parquet 包含元数据的强大之处。\n\n![](img/525217_1_En_7_Fig8_HTML.png)\n\
    一个标题为“remote scan”的表格。一个箭头指向“每次执行的估计行数”的 remote scan 值。表格下方是一个输出列表。\n**图 7-8**\
    \ `OPENROWSET()` 的查询执行计划"
- fmt: "1.  让我们使用 `OPENROWSET()` 从存储在 S3 中的生成的 Parquet 文件运行“临时”查询，通过执行脚本 **`querybyopenrowset.sql`**\
    \ 来实现。在 SSMS 中，选择“包含实际执行计划”选项。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImporters];\n\
    \    GO\n    SELECT *\n    FROM OPENROWSET\n    (BULK '/wwi/'\n    , FORMAT =\
    \ 'PARQUET'\n    , DATA_SOURCE = 's3_wwi')\n    as [wwi_customer_transactions_file];\n\
    \    GO\n    ```\n\n    事实证明，`BULK` 选项不仅仅是关于数据的批量插入；它还可以用于在文件上“打开行集”。\n\n    在“消息”选项卡中，你应该看到\
    \ 97147 行受影响，这与原始表 `Sales.CustomerTransactions` 中的行数相同。如果你查看“执行计划”选项卡，你应该会看到一个类似图\
    \ [7-8](#525217_1_En_7_Chapter.xhtml#Fig8) 的查询执行计划。\n\n    请注意，估计行数大约是实际总行数的 30%。这是因为优化器本身没有来自\
    \ Parquet 文件的任何统计信息。这与 **`wwi_customer_transactions`** 相反，它是作为外部表创建的。你可以手动在外部表上创建统计信息，或者如果你将数据库选项\
    \ `AUTO_CREATE_STATISTICS` 设置为 `ON`（默认值），则在查询外部表时会自动创建统计信息。如果这些统计信息可用，估计值将是准确的。没有统计信息时，`OPENROWSET()`\
    \ 查询性能可能会受到不利影响，也可能不会。\n\n    正如我在本章前面提到的，对于 Parquet 文件没有谓词下推。如果你在前面的 SQL 语句中添加一个\
    \ `WHERE` 子句：\n\n    ```sql\n    USE [WideWorldImporters];\n    GO\n    SELECT\
    \ *\n    FROM OPENROWSET\n    (BULK '/wwi/'\n    , FORMAT = 'PARQUET'\n    , DATA_SOURCE\
    \ = 's3_wwi')\n    as [wwi_customer_transactions_file]\n    WHERE wwi_customer_transactions_file.CustomerTransactionID\
    \ = 2;\n    ```\n\n    引擎中的查询处理器必须将此存储桶父文件夹中 Parquet 文件的结果引入，然后在引擎内进行过滤以产生最终结果。\n\
    \n    你可以通过使用桶内的文件夹结构对你的 Parquet 文件进行分区，然后仅使用 `BULK` 语法或外部表的 `LOCATION` 指定你需要的文件夹，来帮助减少\
    \ SQL Server 必须读取和过滤的数据量。\n\n2.  外部表的另一个很好的特性是能够基于 Parquet 文件中的列子集创建一个。执行脚本 **`querybyexternaltable.sql`**\
    \ 来查看一个示例。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    IF OBJECT_ID('wwi_customer_transactions_base',\
    \ 'U') IS NOT NULL\n    DROP EXTERNAL TABLE wwi_customer_transactions_base;\n\
    \    GO\n    CREATE EXTERNAL TABLE wwi_customer_transactions_base\n    (\n   \
    \ CustomerTransactionID int,\n    CustomerID int,\n    TransactionTypeID int,\n\
    \    TransactionDate date,\n    TransactionAmount decimal(18,2)\n    )\n    WITH\n\
    \    (\n    LOCATION = '/wwi/'\n    , FILE_FORMAT = ParquetFileFormat\n    , DATA_SOURCE\
    \ = s3_wwi\n    );\n    GO\n    SELECT * FROM wwi_customer_transactions_base;\n\
    \    GO\n    ```\n\n    你将看到与外部表 `wwi_customer_transactions` 相同的行数，但只包含你指定的列。列的顺序不必是特定的。\n\
    \n3.  正如我之前提到的，你可以在外部表的任意数量的列上手动创建统计信息。执行脚本 **`creatstats.sql`** 以获取示例。此脚本执行以下\
    \ T-SQL 语句：\n\n    ```sql\n    USE WideWorldImporters;\n    GO\n    CREATE STATISTICS\
    \ wwi_ctb_stats ON wwi_customer_transactions_base (CustomerID) WITH FULLSCAN;\n\
    \    GO\n    ```\n\n    统计信息存储在用户数据库系统表中。\n\n4.  我之前在本章提到过，数据虚拟化的许多对象都存储在系统表中。执行脚本\
    \ **`exploremetadata.sql`** 来查看为外部数据源、文件格式和外部表存储了哪些数据。此脚本执行以下 T-SQL 语句：\n\n  \
    \  ```sql\n    USE [WideWorldImporters];\n    GO\n    SELECT * FROM sys.external_data_sources;\n\
    \    GO\n    SELECT * FROM sys.external_file_formats;\n    GO\n    SELECT * FROM\
    \ sys.external_tables;\n    GO\n    ```\n\n5.  SQL Server 还提供了系统存储过程来探索像 Parquet\
    \ 这样的文件中的元数据。执行脚本 **`getparquetmetadata.sql`** 来查看一个示例。此脚本执行以下 T-SQL 语句：\n\n \
    \   ```sql\n    EXEC sp_describe_first_result_set N'\n    SELECT *\n    FROM OPENROWSET\n\
    \    (BULK ''/wwi/''\n    , FORMAT = ''PARQUET''\n    , DATA_SOURCE = ''s3_wwi'')\n\
    \    as [wwi_customer_transactions_file];';\n    GO\n    ```\n\n6.  `OPENROWSET`\
    \ 还提供了一个很好的功能来收集有关源 Parquet 文件的元数据。执行脚本 **`getfilemetadata.sql`** 来查看一个示例。该脚本执行以下\
    \ T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImporters];\n    GO\n    SELECT TOP\
    \ 1 wwi_customer_transactions_file.filepath(),\n    wwi_customer_transactions_file.filename()\n\
    \    FROM OPENROWSET\n    (BULK '/wwi/'\n    , FORMAT = 'PARQUET'\n    , DATA_SOURCE\
    \ = 's3_wwi')\n    as [wwi_customer_transactions_file];\n    GO\n    ```"
  raw: "1.  Let’s use OPENROWSET() to run an “ad hoc” query from the generated parquet\
    \ file stored in S3 by executing the script **querybyopenrowset.sql**. In SSMS,\
    \ select the Include Actual Execution Plan option. This script executes the following\
    \ T-SQL statements:\n\n```\n    USE [WideWorldImporters];\n    GO\n    SELECT\
    \ *\n    FROM OPENROWSET\n    (BULK '/wwi/'\n    , FORMAT = 'PARQUET'\n    , DATA_SOURCE\
    \ = 's3_wwi')\n    as [wwi_customer_transactions_file];\n    GO\n    ```\n\nIt\
    \ turns out the BULK option is not just about the BULK insert of data; it can\
    \ also be used to “open a rowset” on a file.\n\nIn the Messages tab you should\
    \ see 97147 rows affected, which is the same number of rows in the original table,\
    \ Sales.CustomerTransactions. If you look at the Execution Plan tab, you should\
    \ see a query execution plan like Figure [7-8](#525217_1_En_7_Chapter.xhtml#Fig8).\n\
    \nNotice that the estimated number of rows is roughly 30% of the total actual\
    \ rows. This is because the optimizer doesn’t have any statistics from the parquet\
    \ file itself. This is opposite from **wwi_customer_transactions**, which was\
    \ created as an external table. You can manually create statistics on an external\
    \ table, or if you have the database option AUTO_CREATE_STATISTICS set to ON (the\
    \ default), statistics will be automatically created when you query the external\
    \ table. The estimates will be accurate if these statistics are available. OPENROWSET()\
    \ query performance may or may not be adversely affected without statistics.\n\
    \nAs I’ve mentioned earlier in the chapter, there is no predicate pushdown for\
    \ parquet files. If you add a WHERE clause to the preceding SQL statement\n\n\
    ```\nUSE [WideWorldImporters];\nGO\nSELECT *\nFROM OPENROWSET\n(BULK '/wwi/'\n\
    , FORMAT = 'PARQUET'\n, DATA_SOURCE = 's3_wwi')\nas [wwi_customer_transactions_file]\n\
    WHERE wwi_customer_transactions_file.CustomerTransactionID = 2;\n```\n\nthe query\
    \ processor in the engine must bring the results of the parquet file(s) in this\
    \ bucket parent folder and then filter within the engine to produce the final\
    \ result.\n\nYou can help reduce the amount of data that SQL Server has to read\
    \ and filter by partitioning your parquet files with a folder structure within\
    \ the bucket and then specify only the folder you need with the BULK syntax or\
    \ LOCATION for external tables.\n\n1.  Another nice feature for external tables\
    \ is the ability to create one based on a subset of columns in the parquet file.\
    \ Execute the script **querybyexternaltable.sql** to see an example of this. This\
    \ script executes the following T-SQL statements:\n\n```\n    IF OBJECT_ID('wwi_customer_transactions_base',\
    \ 'U') IS NOT NULL\n    DROP EXTERNAL TABLE wwi_customer_transactions_base;\n\
    \    GO\n    CREATE EXTERNAL TABLE wwi_customer_transactions_base\n    (\n   \
    \ CustomerTransactionID int,\n    CustomerID int,\n    TransactionTypeID int,\n\
    \    TransactionDate date,\n    TransactionAmount decimal(18,2)\n    )\n    WITH\n\
    \    (\n    LOCATION = '/wwi/'\n    , FILE_FORMAT = ParquetFileFormat\n    , DATA_SOURCE\
    \ = s3_wwi\n    );\n    GO\n    SELECT * FROM wwi_customer_transactions_base;\n\
    \    GO\n    ```\n\nYou will see the same number of rows from the wwi_customer_transactions\
    \ external table, but only with the columns you specified. The columns don’t have\
    \ to be in any specific order.\n\n2.  As I mentioned earlier, you can manually\
    \ create statistics on any number of columns in an external table. Execute the\
    \ script **creatstats.sql** for an example. This script executes the following\
    \ T-SQL statements:\n\n```\n    USE WideWorldImporters;\n    GO\n    CREATE STATISTICS\
    \ wwi_ctb_stats ON wwi_customer_transactions_base (CustomerID) WITH FULLSCAN;\n\
    \    GO\n    ```\n\nThe statistics are stored in user database system tables.\n\
    \n3.  I previously mentioned in this chapter that many of the objects for data\
    \ virtualization are stored in system tables. Execute the script **exploremetadata.sql**\
    \ to see what data is stored for external data sources, file formats, and external\
    \ tables. This script executes the following T-SQL statements:\n\n```\n    USE\
    \ [WideWorldImporters];\n    GO\n    SELECT * FROM sys.external_data_sources;\n\
    \    GO\n    SELECT * FROM sys.external_file_formats;\n    GO\n    SELECT * FROM\
    \ sys.external_tables;\n    GO\n    ```\n\n4.  SQL Server also provides system\
    \ procedures to explore metadata in files like parquet. Execute the script **getparquetmetadata.sql**\
    \ to see an example. This script executes the following T-SQL statements:\n\n\
    ```\n    EXEC sp_describe_first_result_set N'\n    SELECT *\n    FROM OPENROWSET\n\
    \    (BULK ''/wwi/''\n    , FORMAT = ''PARQUET''\n    , DATA_SOURCE = ''s3_wwi'')\n\
    \    as [wwi_customer_transactions_file];';\n    GO\n    ```\n\n5.  OPENROWSET\
    \ also provides a nice feature to gather metadata about the source parquet files.\
    \ Execute the script **getfilemetadata.sql** to see an example. The script executes\
    \ the following T-SQL statements:\n\n```\n    USE [WideWorldImporters];\n    GO\n\
    \    SELECT TOP 1 wwi_customer_transactions_file.filepath(),\n    wwi_customer_transactions_file.filename()\n\
    \    FROM OPENROWSET\n    (BULK '/wwi/'\n    , FORMAT = 'PARQUET'\n    , DATA_SOURCE\
    \ = 's3_wwi')\n    as [wwi_customer_transactions_file];\n    GO\n    ```"
