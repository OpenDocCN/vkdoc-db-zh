    \ it to clear the dirty bit\nUSE master;\nGO\nDROP TABLE IF EXISTS cowboysrule;\n\
    GO\nCHECKPOINT;\nGO\n```\n\n### 将位打包到一个值中\n\n本练习将使用 `LEFT_SHIFT`、`RIGHT_SHIFT`\
    \ 和 `SET_BIT` 函数将多个值打包到单个字节中。本练习可以在任何数据库上下文中完成。\n\n1.  加载脚本 `packbits.sql`，该脚本包含多个步骤。\n\
