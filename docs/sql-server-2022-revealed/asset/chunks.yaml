    \ help!\n\n1.  Use the minio console to create a new bucket called **delta**.\
    \ Use the Upload folder option in the console to upload the folder from the example\
    \ files called **people-10m**. This will create a folder under the delta bucket\
    \ called people-10m with several parquet files and a folder called **_delta_log**.\n\
    \n2.  Query the delta table by executing the script **querydeltatable.sql**. This\
    \ script executes the following T-SQL statements:\n\n```\n    USE [WideWorldImporters];\n\
    \    GO\n    SELECT * FROM OPENROWSET\n    (BULK '/delta/people-10m',\n    FORMAT\
    \ = 'DELTA', DATA_SOURCE = 's3_wwi') as [people];\n    GO\n    ```\n\nThere are\
