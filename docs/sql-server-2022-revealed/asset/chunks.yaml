    \n#### Learn to Use REST API to Access Parquet Files on S3\n\nWith an S3 provider\
    \ ready to use, we can now access S3 compatible storage with SQL Server. Follow\
    \ these steps for the exercise for basics of REST API data virtualization to access\
    \ parquet files on an S3 object provider. The next section has an exercise to\
    \ access delta files.\n\n![](Images/525217_1_En_7_Fig5_HTML.png)\n\nA flowchart\
    \ to create an external table. The steps are as follows. Clustered index scan,\
    \ compute scalar, put, and select into.\n\nFigure 7-5\n\nQuery execution plan\
    \ for CETAS\n\n1.  Copy the **WideWorldImporters** sample database from [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
    \ to a local directory (the restore script assumes c:\\sql_sample_databases).\n\
    \n2.  Edit the **restorewwi.sql** script to specify the correct path for the backup\
    \ and where data and log files should go.\n\n3.  Execute the script **restorewwi.sql.**\
    \ This script executes the following T-SQL statements:\n\n```\n    USE master;\n\
    \    GO\n    DROP DATABASE IF EXISTS WideWorldImporters;\n    GO\n    RESTORE\
    \ DATABASE WideWorldImporters FROM DISK = 'c:\\sql_sample_databases\\WideWorldImporters-Full.bak'\
    \ with\n    MOVE 'WWI_Primary' TO 'c:\\sql_sample_databases\\WideWorldImporters.mdf',\n\
    \    MOVE 'WWI_UserData' TO 'c:\\sql_sample_databases\\WideWorldImporters_UserData.ndf',\n\
    \    MOVE 'WWI_Log' TO 'c:\\sql_sample_databases\\WideWorldImporters.ldf',\n \
    \   MOVE 'WWI_InMemory_Data_1' TO 'c:\\sql_sample_databases\\WideWorldImporters_InMemory_Data_1',\n\
    \    stats=5;\n    GO\n    ALTER DATABASE WideWorldImporters SET QUERY_STORE CLEAR\
    \ ALL;\n    GO\n    ```\n\n4.  Execute the script **enablepolybase.sql** to configure\
    \ instance-level settings to allow Polybase features to execute and export data\
    \ from Polybase to S3\\. This script executes the following T-SQL statements:\n\
    \n```\n    EXEC sp_configure 'polybase enabled', 1;\n    GO\n    RECONFIGURE;\n\
    \    GO\n    EXEC sp_configure 'allow polybase export', 1;\n    GO\n    RECONFIGURE;\n\
    \    GO\n    ```\n\n5.  Edit the script **createmasterkey.sql** to put in a password.\
    \ Execute the script to create a master key to protect the database-scoped credential.\
    \ This script executes the following T-SQL statements:\n\n```\n    USE [WideWorldImporters]\n\
    \    GO\n    IF NOT EXISTS (SELECT * FROM sys.symmetric_keys WHERE name = ''##MS_DatabaseMasterKey##'')\n\
    \    CREATE MASTER KEY ENCRYPTION BY PASSWORD = '';\n    GO\n    ```\n\n6.  Edit\
    \ the script **creates3creds.sql** to put in the user and password you created\
    \ in the minio console for SECRET. Execute the script to create a database-scoped\
    \ credential. This script executes the following T-SQL statements:\n\n```\n  \
    \  IF EXISTS (SELECT * FROM sys.database_scoped_credentials WHERE name = 's3_wwi_cred')\n\
    \    DROP DATABASE SCOPED CREDENTIAL s3_wwi_cred;\n    GO\n    CREATE DATABASE\
    \ SCOPED CREDENTIAL s3_wwi_cred\n    WITH IDENTITY = 'S3 Access Key',\n    SECRET\
    \ = ':';\n    GO\n    ```\n\n7.  Edit the script **creates3datasource.sql** to\
    \ substitute in your local IP address for the minio server. Execute the script\
    \ to create an external data source. This script executes the following T-SQL\
    \ statements:\n\n```\n    IF EXISTS (SELECT * FROM sys.external_data_sources WHERE\
    \ name = 's3_wwi')\n    DROP EXTERNAL DATA SOURCE s3_wwi;\n    GO\n    CREATE\
    \ EXTERNAL DATA SOURCE s3_wwi\n    WITH\n    (\n    LOCATION = 's3://:9000'\n\
    \    ,CREDENTIAL = s3_wwi_cred\n    );\n    GO\n    ```\n\n**Tip** You could put\
    \ in the bucket name here after the port number so that the data source is focused\
    \ only on a specific bucket. We will instead use the bucket when specifying location\
    \ for queries.\n\n8.  Create a file format for parquet by executing the script\
    \ **createparquetfileformat.sql**. This script executes the following T-SQL statements:\n\
    \n```\n    USE [WideWorldImporters];\n    GO\n    IF EXISTS (SELECT * FROM sys.external_file_formats\
    \ WHERE name = 'ParquetFileFormat')\n    DROP EXTERNAL FILE FORMAT ParquetFileFormat;\n\
    \    CREATE EXTERNAL FILE FORMAT ParquetFileFormat WITH(FORMAT_TYPE = PARQUET);\n\
    \    GO\n    ```"
  trans: "\n## 为练习设置 minio\n\n要使用 `minio.exe` 与 SQL Server，需要 TLS。要使用 TLS，您必须拥有有效的证书。出于测试目的，我们将生成一个自签名证书。\n\
    \n按照以下步骤为练习设置 minio：\n\n1.  在命令提示符下，从 `c:\\minio` 目录运行以下命令生成私钥：\n\n    ```\n \
    \   openssl genrsa -out private.key 2048\n    ```\n\n2.  将提供的 `openssl.conf` 文件复制到\
    \ `c:\\minio`。编辑此文件，将 `IP.2` 更改为您的本地 IP 地址，并将 `DNS.2` 更改为您的本地计算机名称。\n\n3.  在命令提示符下，从\
    \ `c:\\minio` 目录运行以下命令生成自签名证书：\n\n    ```\n    openssl req -new -x509 -nodes -days\
    \ 730 -key private.key -out public.crt -config openssl.conf\n    ```\n\n4.  对于\
    \ Windows 用户，双击 `public.crt` 文件并选择安装证书。选择本地计算机，然后选择“将所有证书放入下列存储”。浏览并选择“受信任的根证书颁发机构”。\n\
    \n    **注意** 自签名证书非常适合测试，但*不*安全。建议您在完成本练习后，通过控制面板中的“管理用户证书”删除该证书。\n\n5.  将 `private.key`\
    \ 和 `public.crt` 文件从 `c:\\minio` 目录复制到 `%%USERPROFILE%%\\mino\\certs` 目录。\n\n\
    6.  在命令提示符下，导航到 `c:\\minio` 目录。然后通过运行以下命令启动 minio 程序（`cmd.exe` 用户不需要 `.\\`）：\n\
    \n    ```\n    .\\minio.exe server c:\\minio --console-address \":9001\"\n   \
    \ ```\n\n    此程序会启动并一直运行，直到您使用 `Ctrl+C` 退出。您的命令提示符输出应类似于以下内容：\n\n    ![](img/525217_1_En_7_Fig3_HTML.jpg)\n\
    \n    minio 登录窗口的屏幕截图。顶部写着 minio console multi cloud object storage。下方是用于输入用户名和密码的选项。\n\
    \n    **图 7-3** minio 控制台登录屏幕\n\n7.  在本地计算机上使用 Web 浏览器访问 `https://127.0.0.1:9001`\
    \ 来测试与 minio 的连接。您应该会看到一个类似于图 7-3 的登录屏幕。使用前面 minio 服务器输出中的 `RootUser` 和 `RootPass`。\n\
    \n    ```\n    MinIO Object Storage Server\n    Copyright: 2015-2022 MinIO, Inc.\n\
    \    License: GNU AGPLv3 \n    Version: RELEASE.2022-07-30T05-21-40Z (go1.18.4\
    \ windows/amd64)\n    Status:         1 Online, 0 Offline.\n    API: https://:9000\
    \  https://127.0.0.1:9000\n    RootUser: \n    RootPass: \n    Console: https://:9001\
    \ https://127.0.0.1:9001\n    RootUser: \n    RootPass: \n    Command-line: https://docs.min.io/docs/minio-client-quickstart-guide\n\
    \    $ mc.exe alias set myminio https://:9000  \n    Documentation: https://docs.min.io\n\
    \    ```\n\n    ![](img/525217_1_En_7_Fig4_HTML.png)\n\n    minio 窗口的屏幕截图。左侧，“存储桶”选项高亮显示以创建新存储桶。\n\
    \n    **图 7-4** S3 存储中的新存储桶\n\n8.  在左侧菜单上，单击“身份和用户”。选择“创建用户”。创建一个用户和密码。为该用户选择\
    \ `readwrite` 策略。记下此用户和密码。这是您在本练习后面的 `creates3creds.sql` 脚本中将用于 `SECRET` 值的用户和密码。\n\
    \n9.  选择“存储桶”菜单选项。选择“创建存储桶”。使用 `wwi` 作为存储桶名称。保留所有默认设置并单击“创建存储桶”。您的屏幕现在应如图 7-4\
    \ 所示。\n\n## 学习使用 REST API 访问 S3 上的 Parquet 文件\n\n准备好可用的 S3 提供程序后，我们现在可以使用 SQL\
    \ Server 访问 S3 兼容存储。请按照本练习的以下步骤了解 REST API 数据虚拟化的基础知识，以访问 S3 对象提供程序上的 parquet\
    \ 文件。下一节有一个访问 delta 文件的练习。\n\n![](img/525217_1_En_7_Fig5_HTML.png)\n\n创建外部表的流程图。步骤如下。聚集索引扫描、计算标量、PUT\
    \ 和 SELECT INTO。\n\n**图 7-5** CETAS 的查询执行计划\n\n1.  将 `WideWorldImporters` 示例数据库从\
    \ `https://aka.ms/WideWorldImporters` 复制到本地目录（还原脚本假定为 `c:\\sql_sample_databases`）。\n\
    \n2.  编辑 `restorewwi.sql` 脚本，为备份指定正确的路径以及数据和日志文件应存放的位置。\n\n3.  执行脚本 `restorewwi.sql`。此脚本执行以下\
    \ T-SQL 语句：\n\n    ```sql\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS\
    \ WideWorldImporters;\n    GO\n    RESTORE DATABASE WideWorldImporters FROM DISK\
    \ = 'c:\\sql_sample_databases\\WideWorldImporters-Full.bak' with\n    MOVE 'WWI_Primary'\
    \ TO 'c:\\sql_sample_databases\\WideWorldImporters.mdf',\n    MOVE 'WWI_UserData'\
    \ TO 'c:\\sql_sample_databases\\WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log'\
    \ TO 'c:\\sql_sample_databases\\WideWorldImporters.ldf',\n    MOVE 'WWI_InMemory_Data_1'\
    \ TO 'c:\\sql_sample_databases\\WideWorldImporters_InMemory_Data_1',\n    stats=5;\n\
    \    GO\n    ALTER DATABASE WideWorldImporters SET QUERY_STORE CLEAR ALL;\n  \
    \  GO\n    ```\n\n4.  执行脚本 `enablepolybase.sql` 以配置实例级设置，允许执行 Polybase 功能并从 Polybase\
    \ 导出数据到 S3。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    EXEC sp_configure 'polybase enabled',\
    \ 1;\n    GO\n    RECONFIGURE;\n    GO\n    EXEC sp_configure 'allow polybase\
    \ export', 1;\n    GO\n    RECONFIGURE;\n    GO\n    ```\n\n5.  编辑脚本 `createmasterkey.sql`\
    \ 以输入密码。执行该脚本以创建主密钥来保护数据库范围的凭据。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImporters]\n\
    \    GO\n    IF NOT EXISTS (SELECT * FROM sys.symmetric_keys WHERE name = ''##MS_DatabaseMasterKey##'')\n\
    \    CREATE MASTER KEY ENCRYPTION BY PASSWORD = '';\n    GO\n    ```\n\n6.  编辑脚本\
    \ `creates3creds.sql`，将您在 minio 控制台中创建的用户和密码填入 `SECRET`。执行该脚本以创建数据库范围的凭据。此脚本执行以下\
    \ T-SQL 语句：\n\n    ```sql\n    IF EXISTS (SELECT * FROM sys.database_scoped_credentials\
    \ WHERE name = 's3_wwi_cred')\n    DROP DATABASE SCOPED CREDENTIAL s3_wwi_cred;\n\
    \    GO\n    CREATE DATABASE SCOPED CREDENTIAL s3_wwi_cred\n    WITH IDENTITY\
    \ = 'S3 Access Key',\n    SECRET = ':';\n    GO\n    ```\n\n7.  编辑脚本 `creates3datasource.sql`，用\
    \ minio 服务器的本地 IP 地址替换。执行该脚本以创建外部数据源。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n    IF EXISTS\
    \ (SELECT * FROM sys.external_data_sources WHERE name = 's3_wwi')\n    DROP EXTERNAL\
    \ DATA SOURCE s3_wwi;\n    GO\n    CREATE EXTERNAL DATA SOURCE s3_wwi\n    WITH\n\
    \    (\n    LOCATION = 's3://:9000'\n    ,CREDENTIAL = s3_wwi_cred\n    );\n \
    \   GO\n    ```\n\n    **提示** 您可以在此处端口号后输入存储桶名称，以便数据源仅专注于特定存储桶。我们将在指定查询位置时使用存储桶。\n\
    \n8.  执行脚本 `createparquetfileformat.sql` 以创建 Parquet 的文件格式。此脚本执行以下 T-SQL 语句：\n\
    \n    ```sql\n    USE [WideWorldImporters];\n    GO\n    IF EXISTS (SELECT * FROM\
    \ sys.external_file_formats WHERE name = 'ParquetFileFormat')\n    DROP EXTERNAL\
    \ FILE FORMAT ParquetFileFormat;\n    CREATE EXTERNAL FILE FORMAT ParquetFileFormat\
    \ WITH(FORMAT_TYPE = PARQUET);\n    GO\n    ```\n"
- fmt: "# 9. Exporting Data to Parquet Format\n\nLet’s first learn how to export data\
    \ in parquet format to the wwi bucket by executing the script `wwi_cetas.sql`.\
    \ In SSMS, select the **Include Actual Execution Plan** option. This script executes\
    \ the following T-SQL statements:\n\n```sql\n    USE [WideWorldImporters];\n \
    \   GO\n    IF OBJECT_ID('wwi_customer_transactions', 'U') IS NOT NULL\n    DROP\
    \ EXTERNAL TABLE wwi_customer_transactions;\n    GO\n    CREATE EXTERNAL TABLE\
    \ wwi_customer_transactions\n    WITH (\n    LOCATION = '/wwi/',\n    DATA_SOURCE\
    \ = s3_wwi,\n    FILE_FORMAT = ParquetFileFormat\n    )\n    AS\n    SELECT *\
    \ FROM Sales.CustomerTransactions;\n    GO\n    ```\n\nLet’s examine this script.\
    \ The `LOCATION` is the bucket name. The `LOCATION` value can be a bucket name\
    \ or even a series of folders and even a specific filename. In this case, because\
    \ the external data source didn’t specify a specific bucket, I need to specify\
    \ that here. Since I only specified the bucket, the query will place all files\
    \ in the parent folder. There is no predicate pushdown with parquet files and\
    \ REST API connectors. Any filtering is done inside SQL Server (even if you specify\
    \ a `WHERE` clause).\n\nThe `DATA_SOURCE` is the external data source we created\
    \ to connect to the minio server. The file format matches up to parquet. Notice\
    \ we do not have to specify anything about the format other than just parquet.\
    \ We can also include column names with this definition, but we don’t need to.\
    \ Using the `AS SELECT` part of the statement will create a single parquet file\
    \ with column names, types, and data.\n\nIn the **Messages** tab, you should see\
    \ 97147 rows affected. In the **Execution Plan** tab you should see a plan like\
    \ Figure 7-5.\n\nNotice the `Put` operator, which is used to export data to the\
    \ s3 connector as a parquet file.\n\n**Tip**\nOne observation I have had using\
    \ CETAS is there is no “duplicate” detection. If you run the preceding command\
    \ twice, two parquet files will be created.\n\n![](Images/525217_1_En_7_Fig6_HTML.png)\n\
    A screenshot of the minio window. A parquet file with the last modified information\
    \ and size is open in the bucket created in w w i.\n**Figure 7-6** Parquet file\
    \ added to S3 bucket through CETAS\n\n### 1. Verify the Exported File\nUse the\
    \ minio console to browse the wwi bucket and confirm the parquet file has been\
    \ added. Your results should look like Figure 7-6.\n\n![](Images/525217_1_En_7_Fig7_HTML.jpg)\n\
    A folder screenshot view of a list of columns created through C E T A S. A file\
    \ titled d b o dot w w i underscore customer underscore transactions is highlighted.\n\
    **Figure 7-7** Columns created automatically with parquet through CETAS\n\n###\
    \ 2. Query the External Table\nQuery the new external table by executing the script\
    \ `querywwiexternaldata.sql`. This script executes the following T-SQL statements:\n\
    \n```sql\n    USE [WideWorldImporters];\n    GO\n    SELECT c.CustomerName, SUM(wct.OutstandingBalance)\
    \ as total_balance\n    FROM wwi_customer_transactions wct\n    JOIN Sales.Customers\
    \ c\n    ON wct.CustomerID = c.CustomerID\n    GROUP BY c.CustomerName\n    ORDER\
    \ BY total_balance DESC;\n    GO\n    ```\n\nNotice in this example the script\
    \ joins the external table (stored in parquet in S3) with a local table in the\
    \ user database. Your results should display 263 rows. One common use case for\
    \ an example like this is to build a `VIEW` on top of this query and only give\
    \ users access to the view. They will be abstracted from the source of the data,\
    \ whether it be in SQL Server or a parquet file.\n\n### 3. View the Table Schema\n\
    Use SSMS with Object Explorer to see the column definitions for the table created\
    \ through CETAS. Your results should look like Figure 7-7.\n\nNotice the column\
    \ names and types match the original table in the database; this demonstrates\
    \ the power of parquet including metadata.\n\n![](Images/525217_1_En_7_Fig8_HTML.png)\n\
    A table titled remote scan. An arrow points to the remote scan value of the estimated\
    \ number of rows per execution. Below the table is an output list.\n**Figure 7-8**\
    \ Query execution plan for `OPENROWSET()`"
