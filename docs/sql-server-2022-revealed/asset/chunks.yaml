    #### 向量扩展以改进批处理模式


    在 SQL Server 2016 中，我们添加了代码以利用称为基于`向量`的硬件能力的特殊处理器指令。基于向量的硬件能力允许程序因为处理器中的向量寄存器而更简单、更快速且以更并行的方式处理数据。如果您希望阅读一些关于此主题的非常深入的内容，这里有一篇不错的文章：[`www.techspot.com/article/2166-mmx-sse-avx-explained`](http://www.techspot.com/article/2166-mmx-sse-avx-explained)。


    SQL Server 2016 能够识别两种不同类型的向量能力，即`SSE`和`AVX`，并利用它们来加速列存储操作，尤其是在使用批处理模式时。Robert
    Dorr 在这篇博文中概述了我们是如何做到这一点的：[`https://docs.microsoft.com/archive/blogs/bobsql/sql-2016-it-just-runs-faster-column-store-uses-vector-instructions-sseavx`](https://docs.microsoft.com/archive/blogs/bobsql/sql-2016-it-just-runs-faster-column-store-uses-vector-instructions-sseavx)。


    最新的向量硬件技术是`AVX-512`，而 SQL Server 2022 可以识别这种新的硬件能力，从而为列存储和行存储的批处理模式操作符获得更显著的性能提升。我很好奇是什么促使我们研究`AVX-512`，并发现了
    Conor Cunningham 的这段有趣引述：


    在疫情期间，我读到了一篇学术论文，其中解释了如何使用`AVX-512`指令实现快速排序。这些指令本质上是一次执行 N 个操作而不是一个，这意味着它有可能大幅提升性能关键代码的速度。我实现了论文中的排序算法，并开始对其进行改进。后来，我想开始尝试在
    SQL 的代码中实现一些东西。我们有一些逻辑使用了上一代的向量指令（`AVX2`），我研究了那段代码，并想通了如何编写一个等效版本，使用更新、更宽的向量指令，这算是一个副业项目。当我完成后，我们在关键的分析基准测试（`TPC-H`）上获得了良好的性能提升。有趣的是，直到有一天我出现并将这份礼物交给团队时，我都没有告诉任何人我在做这件事——这并不是一个为
    SQL Server 2022 正式资助的项目，但当我们意识到它能为客户带来的价值后，我们优先考虑了它。


    在撰写本书时，我们将此增强功能置于一个跟踪标志之下，并且有可能我们在发布产品时仍然需要一个跟踪标志——主要是因为使用此功能是一个高级概念，并非适用于所有人。请访问
    [`https://aka.ms/sqlserver2022docs`](https://aka.ms/sqlserver2022docs) 查看最新信息。


    这项工作的一个方面是您可能会看到一个新的`ERRORLOG`条目，它看起来像这样：


    ```

    CPU vectorization level(s) detected:  SSE SSE2 SSE3 SSSE3 SSE41 SSE42 AVX AVX2
    POPCNT BMI1 BMI2

    ```


    这些名称是我们检测到的处理器中各种向量 CPU 能力。如果您使用的是支持这种新向量模型的芯片组，则会出现`AVX-512`。


    #### 列存储段消除增强


    列存储索引的列被组织成段。列存储包含一个称为段消除的概念，以便可以根据查询消除或不准备某些段。在 SQL Server 2022 之前，只有数据类型为数值、日期和时间以及比例小于或等于二的`datetimeoffset`的列才是段消除的候选对象。现在在
    SQL Server 2022 中，我们将段消除扩展到了新的数据类型，包括字符串、二进制和`guid`数据类型，以及比例大于二的`datetimeoffset`数据类型。


    ### 可扩展性改进


    有几项改进旨在帮助提高您的查询、工作负载和 SQL Server 使用的可扩展性。您最不希望看到的就是投入精力修改应用程序设计、购买新服务器或基础设施后，却被
    SQL Server 限制了扩展能力。此领域的所有工作都是客户案例或我们内部及与合作伙伴进行的基准和测试的直接结果。


    #### 缓冲池并行扫描


    如果您访问我的网站查看我所有的演讲（我是一位开源演讲者），[`https://aka.ms/bobwardms`](https://aka.ms/bobwardms)，您会找到一个名为`SQL
    PASS 2013`的文件夹。在 2013 年的`PASS Community Summit`上，我做了一个关于内存的半天演讲。如果您查看这份演示文稿，会看到一些关于
    SQL Server 缓冲池的内部信息。在这些幻灯片中，我谈到了`BUF`哈希表和`BUF`结构。`BUF`结构指向页面，而`BUF`哈希表是一种组织所有`BUF`结构以便轻松找到页面的方法。因此，使用`BUF`哈希表查找来定位特定页面并不那么困难。


    不幸的是，SQL Server 中的某些操作必须扫描所有的`BUF`结构。可以将其想象为扫描聚集索引与使用索引查找。就像聚集索引扫描一样，如果您只需要几行数据，但聚集索引很大，那么获取结果仍可能需要很长时间。


    对于缓冲池的某些操作也可能发生同样的问题，我们曾在客户那里看到过这种情况。他们的服务器可能有，比如说，1TB 的 RAM，并允许缓冲池消耗大部分内存。然后他们会执行一些维护操作，即使针对一个非常小的数据库，也会花费异常长的时间。这是因为我们会扫描整个大约
    1TB 的`BUF`结构来完成操作。我们甚至添加了`ERRORLOG`消息来警告用户正在发生这种情况。更多信息请参阅文章 [`https://docs.microsoft.com/troubleshoot/sql/performance/buffer-pool-scan-runs-slowly-large-memory-machines`](https://docs.microsoft.com/troubleshoot/sql/performance/buffer-pool-scan-runs-slowly-large-memory-machines)。这是一个经典问题：某个架构多年来没有引起问题，但随着硬件技术变得极其庞大，这种设计需要更新。


    我们研究了这个问题，并提出了类似这样的想法：“如果查询可以通过并行运行来获得更快的结果，为什么我们在扫描缓冲池时不能这样做呢？”（这不是原话；这是我在阅读此功能的设计文档时的转述。）


    这项工作的成果是缓冲池并行扫描，该功能在 SQL Server 2022 中默认为内存容量大的系统启用。我在 Microsoft 的同事 David Pless
    参与了此功能的开发，并在 [`https://cloudblogs.microsoft.com/sqlserver/2022/07/07/improve-scalability-with-buffer-pool-parallel-scan-in-sql-server-2022`](https://cloudblogs.microsoft.com/sqlserver/2022/07/07/improve-scalability-with-buffer-pool-parallel-scan-in-sql-server-2022)
    中解释了其工作原理。


    David 展示了我们在 SQL Server 2022 中看到的一些显著的改进数据。此外，请查看他的 Data Exposed 节目，他在其中通过一个巧妙的演示展示了更多细节：[`https://youtu.be/4GvU106Xiag`](https://youtu.be/4GvU106Xiag)。我在一个
    T-SQL 笔记本中包含了 David 发现的结果示例，您可以使用 Azure Data Studio 查看该示例：`ch06_meatandpotatoes\scalability\Buffer_pool_parallel_scan_BPP_notebook_quick.ipynb`。

    '
- fmt: '## Purvi’s List


    多年来，我在微软遇到了许多才华横溢、善良而出色的人。他们默默无闻地工作，从不大肆宣扬。他们只是做好自己的工作，做得非常出色，并且极其友善和友好。Purvi
    Shah 就是其中之一。Purvi 是 SQL 团队的高级软件工程师，但她的角色远超过这个头衔。Purvi 在我们的“性能”团队工作，她的时间都花在寻找让
    SQL Server 和 Azure SQL 变得更快的方法上——快到我们大多数人都无法理解的程度。她和团队的工作在很多方面都能被感受到，但你可能永远看不到，因为它们通常是对引擎的增强，而不是一个“功能”。


    > **注意**

    >

    > 她为 SQL Server 2019 工作的一个显著例子是针对 `tempdb` 的 `PFS` 页面并发性，这非常棒！


    在这个版本发布之际，我联系了 Purvi，请她分享我希望读者了解的可扩展性增强列表。以下是她的列表：


    *   **减少的缓冲池 I/O 提升** – 过去存在一些情况，我们会将单页读取提升为八页 I/O，从而导致系统问题。事实证明这并没有真正帮助性能，反而可能使
    I/O 系统过载，因此我们调整了这个算法。这只是让我们的引擎在执行 I/O 操作时变得更智能。


    *   **增强了我们的一些核心自旋锁算法** – 自旋锁是引擎内部多线程一致性的关键部分。我们一直在寻找调整这些算法的方法，以确保引擎在各种工作负载下都能以最佳状态运行。我们进行了一些内部调整，使自旋锁更高效，这些改进深入引擎内部，很难量化其影响（Purvi
    和团队在非常深的层次上做这件事，以确保他们的工作真的让一切变得更好，而不是更糟）。


    *   **改进了虚拟日志文件算法** – 虚拟日志文件是物理事务日志的抽象。基于日志增长而产生大量小型虚拟日志文件会影响恢复等操作的性能。我们更改了在某些日志增长场景下创建多少虚拟日志文件的算法，以减少此类问题。你可以在我们的文档
    [`https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide?#virtual-log-files-vlfs`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide?#virtual-log-files-vlfs)
    中阅读有关我们如何更改此算法的信息。


    *   **日志文件增长的即时文件初始化** – 直到 SQL Server 2022，我们都不能对事务日志使用即时文件初始化，因为我们认为无法正确检测“日志末尾”。在
    SQL Server 2022 中，我们已经确定，当我们需要增长事务日志时，如果增长大小被认为是“中等”的（最高 64Mb），我们**可以**使用 `IFI`。对于在增长操作期间将日志文件清零会导致阻塞问题的场景，这可能是一个重大的性能胜利。事实证明，64Mb
    正好是创建新数据库时 SQL Server 数据和日志文件的默认自动增长大小。


    Purvi 和她的团队做了如此出色的工作，使 SQL Server 引擎保持调整和快速。我问 Purvi 更多关于她为什么喜欢在微软工作的原因，她说：“保持
    SQL Server 和 Azure SQL 以峰值性能运行是我工作的一部分。我竭尽全力做到最好。当然，我热爱我的工作！希望我能做出积极的贡献，继续我们的使命。”


    ### “免动手”的 tempdb


    尽管 SQL Server 是一个伟大的产品，但在与 SQL Server 打交道 29 年后，我仍然遇到一些至今让我抓狂的问题。其中之一就是 `tempdb`
    的 `latch` 争用。


    #### 挑战是什么？


    SQL Server 中的所有数据库页面都需要使用 `latch` 进行物理保护。一些数据库页面被称为系统页面，因为它们包含分配信息；这些就是 `PFS`、`GAM`
    和 `SGAM` 页面。任何需要分配或释放的查询或操作都可能需要读写这些页面。对这些页面的读写需要一种 *latch 保护方案*。需要 `latch` 保护是因为两个线程可能同时尝试修改或读取一个页面（这是对
    `latch` 工作原理的一个非常基本的描述）。


    这些页面在数据库文件中位于固定位置。此外，每个表都有用于存储数据和索引的页面。任何影响这些页面的查询或操作也需要 `latch` 保护。因为系统表和其他表一样有页面，SQL
    中的特定 DDL 语句最终会导致系统表页面的 `latch` 保护和争用。


    现在考虑 `tempdb`。涉及 `tempdb` 的 SQL Server 工作负载通常需要大量的分配和系统表页面操作。临时表、表变量和溢出只是引发这些操作的几个例子。所有这些通常都需要快速且频繁的页面分配和系统表修改。因此，当许多用户并发运行导致在
    `tempdb` 内进行这些操作的查询时，自然会对用于分配和系统表的页面的 `latch` 产生争用或*压力*。这个问题的主要症状是看到你的请求等待在 `PAGELATCH_XX`
    等待类型上。


    最初，当 `latch` 在 SQL Server 7.0 中首次引入时，我看到过 `tempdb` 在 `PFS`、`GAM` 和 `SGAM` 页面上的
    `latch` 争用，因为当时数据库页面的默认行为是单个文件。通常会发生的情况是，一个应用程序会被多个并发用户使用，这会导致频繁的 `CREATE` 和 `DROP`
    操作，从而需要分配和释放操作。这自然会对单个文件中的 `PFS`、`GAM` 和 `SGAM` 页面造成压力。'
  raw: '#### Purvi’s List


    I have encountered so many talented, kind, and wonderful people at Microsoft over
    the years who work behind the scenes with no fanfare. They just do their job,
    do it well, and are incredibly nice and friendly. One of those people is Purvi
    Shah. Purvi is a senior software engineer in the SQL team, but her role is larger
    than that title. Purvi works in our “performance” team and literally spends her
    time finding ways to make SQL Server and Azure SQL faster – but faster on a level
    that most of us don’t understand. Her and the team’s work can be felt in so many
    ways that you may never see because it is often enhancements into the engine that
    are not a “feature.”


    Note


    One notable example she worked on for SQL Server 2019 was PFS page concurrency
    for tempdb, which was huge!


    For this release I reached out to Purvi and asked her to share her list of scalability
    enhancements that I want our readers to know about. Here is her list:


    *   **Reduced buffer pool I/O promotions** – There were cases where we would cause
    system issues by taking a single page read and promoting it to an eight-page I/O.
    Turns out this wasn’t really helping performance and could overload an I/O system,
    so we tuned this algorithm. This is simply tuning our engine to be smarter when
    performing I/O operations.


    *   **Enhanced some of our core spinlock algorithms** – Spinlocks are a huge part
    of the consistency inside the engine for multiple threads. We are always looking
    to tune these algorithms to ensure the engine is running at its best in all types
    of workloads. We made some internal adjustments to make spinlocks more efficient,
    and the improvements are so deep into the engine it is hard to quantify its effect
    (Purvi and the team do this at a very deep level to ensure their work actually
    makes everything better and not worse).


    *   **Improved Virtual Log File (VLF) algorithms** – Virtual Log File (VLF) is
    an abstraction of the physical transaction log. Having a high number of small
    VLFs based on log growth can affect the performance of operations like recovery.
    We changed the algorithm for how many VLFs we create during certain log grow scenarios
    to reduce these types of problems. You can read about how we have changed this
    algorithm in our docs at [`https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide?#virtual-log-files-vlfs`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide?#virtual-log-files-vlfs).


    *   **Instant File Initialization (IFI) for log file growth** – Up until SQL Server
    2022, we could not use Instant File Initialization (IFI) on the transaction log
    because we didn’t think we could properly detect the “end of the log.” With SQL
    Server 2022 we have determined that when we have to grow the transaction log,
    we *can* use IFI if the *grow* size is considered “medium,” which is up to 64Mb
    in size. This one could be a big performance win for scenarios where zeroing the
    log file during grow operations would cause blocking problems. Turns out 64Mb
    is exactly the default auto growth size for SQL Server data and log files when
    creating a new database.


    Purvi and her team do such great work to keep the SQL Server engine tuned and
    fast. I asked Purvi more about why she likes her job at Microsoft, and she said,
    “Keeping both SQL Server and Azure SQL running at its peak performance is part
    of my job. I strive to do it to best of my abilities. Of course, I love my job!
    Hope I am able to make a positive contribution to continue our mission.”


    ### “Hands-Free” tempdb


    As great as a product as SQL Server is, after working with SQL Server for 29 years,
    I’ve seen some issues that to this day just keep me pulling my hair out. One of
    these issues is latch contention with tempdb.


    #### What Is the Challenge?


    All database pages in SQL Server need physical protection using latches. Some
    database pages are called system pages because they have allocation information;
    these are known as PFS, GAM, and SGAM pages. Any query or operation that requires
    allocation or deallocation may need to read or write from or to these pages. Reads
    and writes from and to these pages require a *latch protection scheme*. Latch
    protection is needed because two threads could be trying to modify or read a page
    at the same time (that is a very basic description of how latches work).


    These pages are at fixed locations within database files. In addition, every table
    has pages to store data and indexes. Any queries or operations that affect these
    pages will also require latch protection. Because system tables have pages like
    any other table, specific DDL statements in SQL will eventually lead to the latch
    protection and contention for pages for system tables.


    Now consider tempdb. Workloads for SQL Server that involve tempdb typically require
    a great deal of allocation and system table page operations. Temporary tables,
    table variables, and spills are just a few that invoke these operations. All of
    these typically require fast and frequent page allocations and system table modifications.
    Therefore, when many users run queries concurrently that result in these operations
    within tempdb, there is naturally contention or *pressure* on latches for pages
    for allocation and system tables. The main symptom of this problem is seeing your
    request waiting on a PAGELATCH_XX wait type.


    Initially, when latches were first introduced in SQL Server 7.0, I would see latch
    contention for tempdb on PFS, GAM, and SGAM pages because back then the default
    behavior was a single file for database pages. Typically, what would happen is
    that an application would use temporary tables across multiple concurrent users,
    which would result in frequent CREATE and DROP operations, which required allocation
    and deallocation operations. This naturally put pressure on PFS, GAM, and SGAM
    pages in a single file.'
