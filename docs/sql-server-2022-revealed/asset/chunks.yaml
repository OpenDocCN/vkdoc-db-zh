    What about high availability and disaster recovery? All questions to be thought
    through for any production SQL Server deployment.


    These decisions are no different with an Azure Virtual Machine. One big difference
    is now your virtual machine with SQL Server is being hosted in Azure. This means
    your choices on possible virtual machine resources are dictated by what Microsoft
    provides (but you will see the choices are vast).


    Let’s review some of the important decisions you need to consider to make the
    overall experience the best possible. You will use these planning decisions to
    make choices during and after deployment. A big reason I think you should consider
    these choices before you deploy is you may become blocked on deployment because
    you are not sure about what choice to make.


    *   You need an **Azure subscription** to deploy a virtual machine and also to
    decide what **resource group** to use. Resource groups are a great way to organize
    multiple Azure resources, but they also can be a convenient method to create your
    own virtual network in Azure. Read more about resource groups at [`https://docs.microsoft.com/azure/azure-resource-manager/management/overview#resource-groups`](https://docs.microsoft.com/azure/azure-resource-manager/management/overview#resource-groups).


    *   **Review the possible virtual machine sizes** available in Azure at [`https://aka.ms/azurevmsizes`](https://aka.ms/azurevmsizes).
    To help you narrow down your choices, check out our advice on Azure VM sizes for
    SQL Server at [`https://aka.ms/SQLIaaSSizing`](https://aka.ms/SQLIaaSSizing).
    Also take heart, in many cases, you can change your VM size after you have deployed
    often with a very small amount of downtime.


    Tip


    You will see an issue later in this chapter where the virtual machine size I choose
    has a cap on storage performance that is less than the disk storage choices for
    data, log, and tempdb. This can cause an unexpected and hard-to-detect performance
    problem. Take time reading our documentation at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist)
    to align these choices.


    *   Are there **trust concerns** about hosting SQL Server and data in Azure? Check
    out [`https://aka.ms/azuretrust`](https://aka.ms/azuretrust) for more information
    on Azure privacy, compliance, security layers, and monitoring.'
  trans: '

    # 10. 在 Azure 虚拟机上运行的 SQL Server 2022


    如今部署 SQL Server 2022 时，您可以选择在笔记本电脑、"物理"服务器甚至容器中运行 SQL Server。部署和运行 SQL Server
    最常见的选择是 `虚拟机`。虽然使用 Hyper-V 和 VMWare 等虚拟化技术运行 SQL Server 非常流行，但许多客户现在正转向云端以获得基础设施即服务
    (IaaS) 的体验。我相信使用 `Azure 虚拟机` 会为您提供出色的体验。


    在 Azure 虚拟机上运行 SQL Server 的体验在不断发展和完善。因此，尽管 Azure 虚拟机针对 SQL Server 2022 并没有新增特定功能，但我认为专门用一章来介绍
    Azure 虚拟机上的 SQL Server 对本书读者来说会很有价值。


    在本章中，我将展示如何在 Azure 虚拟机上部署 SQL Server，以及如何使用、管理、优化和监控它。


    ## 什么是 Azure 虚拟机上的 SQL Server？


    您可能已有现有的 SQL Server 虚拟机 (VM) 部署，或者正在考虑新建一个。那么，在哪里托管这个 VM 呢？其中一种选择是在 Azure 中，称为
    Azure 虚拟机。Azure 虚拟机被称为基础设施即服务 (IaaS)，因为 Azure 将托管基础设施作为一种服务提供给您，用于运行 Windows 或
    Linux 的虚拟机。这意味着 Azure 将托管您的虚拟机，并提供所有硬件，包括计算、存储和网络。您将负责管理 `guest` 虚拟机内的所有内容，包括操作系统和
    SQL Server。我们会采取一些措施来帮助您管理 `guest` 虚拟机环境，您将在本章中看到这些内容。


    由于您对虚拟机内部拥有完全控制权，因此可以自由使用 Windows 或 Linux 操作系统（包括容器）。在此环境中运行的 SQL Server 是完整的"盒装"产品，包括数据库引擎和所有服务。实际上，您可以在本地环境虚拟机中运行的任何
    SQL Server 功能，都可以在 Azure 虚拟机中运行。这包括引擎外部的服务，如 SQL Server 集成服务 (SSIS)、SQL Server
    分析服务 (SSAS) 和 SQL Server 报告服务 (SSRS)。


    ## 部署规划


    每当您要部署新的 SQL Server 实例时，进行适当合理的规划将节省您的时间、金钱和精力。当您在 Hyper-V 虚拟机上规划新的 SQL 部署时，您会考虑诸如
    CPU 数量、CPU 类型和速度以及内存等因素。需要什么样的存储容量、性能和磁盘数量？您甚至可能在拥有数据中心的公司工作，公司要求您使用网站来请求配置虚拟机。在此类场景中，通常会选择
    VM `size`，这决定了您的 SQL Server 实例可用的资源。


    您还需要知道应用程序和工具将如何连接到 SQL Server。您会使用远程桌面 (`rdp`) 在 VM 内部或远程运行 SSMS 等工具吗？如何设置虚拟机的网络以连接到您的应用程序？高可用性和灾难恢复呢？这些都是任何生产
    SQL Server 部署都需要考虑的问题。


    对于 Azure 虚拟机，这些决策并无不同。一个很大的不同在于，现在您的 SQL Server 虚拟机托管在 Azure 中。这意味着您在可能的虚拟机资源方面的选择取决于
    Microsoft 提供的选项（但您将看到选择范围非常广泛）。


    让我们回顾一些您需要做出的重要决策，以获得最佳的整体体验。您将使用这些规划决策在部署期间和之后做出选择。我认为您应该在部署前考虑这些选择的一个重要原因是，您可能会因为不确定如何选择而在部署时受阻。


    -   您需要一个 `Azure 订阅` 来部署虚拟机，并决定使用哪个 `资源组`。资源组是组织多个 Azure 资源的绝佳方式，但它们也可以是在 Azure
    中创建自己的虚拟网络的便捷方法。在 [`https://docs.microsoft.com/azure/azure-resource-manager/management/overview#resource-groups`](https://docs.microsoft.com/azure/azure-resource-manager/management/overview#resource-groups)
    阅读更多关于资源组的信息。


    -   **查看 Azure 中可用的虚拟机大小**，地址为 [`https://aka.ms/azurevmsizes`](https://aka.ms/azurevmsizes)。为了帮助您缩小选择范围，请查看我们关于
    SQL Server 的 Azure VM 大小建议，地址为 [`https://aka.ms/SQLIaaSSizing`](https://aka.ms/SQLIaaSSizing)。同时请放心，在许多情况下，您可以在部署后更改
    VM 大小，通常只需很少的停机时间。


    > **提示**

    >

    > 您将在本章后面看到一个问题，我选择的虚拟机大小对存储性能设置了上限，该上限低于数据、日志和 tempdb 的磁盘存储选择。这可能导致意外且难以发现的性能问题。请花时间阅读我们的文档
    [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist)，以对齐这些选择。


    -   在 Azure 中托管 SQL Server 和数据是否存在**信任问题**？请访问 [`https://aka.ms/azuretrust`](https://aka.ms/azuretrust)
    获取有关 Azure 隐私、合规性、安全层和监控的更多信息。

    '
- fmt: '# 在Azure虚拟机上部署SQL Server的注意事项


    ## 部署前的关键决策


    ### 存储与区域选择

    *   VM规格决定了可用的**存储选项**性能，但也需考虑数据库所需的最大存储容量。例如，Azure中支持数据库的VM规格可通过多个磁盘提供高达2048TB的存储。但是，将SQL
    Server数据库备份到Azure Blob Storage的最大大小为12TB（Azure高级文件共享可支持100TB）。请先通读我们的存储选择最佳实践：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist)。


    *   一个非常重要的决策是选择部署虚拟机的**Azure区域**。Azure区域是Azure数据中心所在的地理位置。从最初的几个数据中心发展至今，已形成全球规模。我们将Azure区域组织为*geographies*。您可以查看部署Azure虚拟机的众多区域选择：[`https://azure.microsoft.com/global-infrastructure/geographies`](https://azure.microsoft.com/global-infrastructure/geographies)。Azure区域的选择基于多种因素，主要围绕您的应用程序将连接到Azure虚拟机中SQL
    Server的位置。我认为从一开始就选择合适的区域很重要，但也有方法可以将虚拟机移动到其他区域，详情请阅读：[`https://docs.microsoft.com/azure/resource-mover/tutorial-move-region-virtual-machines`](https://docs.microsoft.com/azure/resource-mover/tutorial-move-region-virtual-machines)。Azure虚拟机被视为*core
    service*，因此每当建立新区域时，Azure虚拟机都将可用。然而，并非所有虚拟机规格在所有区域都可用。


    ### 管理员账户与密码

    *   决定使用一个**管理员账户**和密码。您需要为Windows或Linux提供一个管理员账户。我遇到过客户因为公司管理员账户标准而完全受阻的情况。如果您使用SQL
    Server市场映像，我们会自动将此管理员账户添加为`sysadmin`角色的成员。


    ### 部署方式与许可证

    *   **如何部署？**


    在Azure虚拟机上部署SQL Server有几种方式。我将在本章后面展示使用Azure门户逐步部署的过程，但您也可以使用脚本和一种称为**ARM模板**的概念进行部署。


    您还需要决定是否使用**SQL Server市场映射**，它预装了操作系统和SQL Server。我们有多种操作系统和SQL Server组合可供选择。这种方法的优点包括自动安装**SQL
    Server IaaS扩展**，您将在本章后面的“**SQL Server IaaS代理扩展**”一节中了解更多。


    **注意** SQL Server的市场映射可能包含所有服务，包括SQL Server Reporting Services (SSRS)和SQL Server
    Analysis Services (SSAS)，或者您也可以仅选择数据库引擎。也有单独的SSRS或SSAS市场映射。


    有些情况下您希望自己安装SQL Server。我有时会在安装特定版本的SQL Server时这样做。因此，我将使用Azure市场仅安装操作系统。然后，我将SQL安装包复制到虚拟机中并安装SQL
    Server。使用SQL Server市场映射的一个好处是，我们会将安装保留在虚拟机内，因此您可以为命名实例场景卸载和重新安装。


    无论使用哪种方法，您都必须决定**许可证**。您是否有现有的SQL Server、Windows和/或Linux许可证，还是将选择按需付费方法？使用现有的SQL
    Server和Windows许可证称为**Azure Hybrid Benefit (AHUB)**。您可以阅读更多关于AHUB的信息：[`https://azure.microsoft.com/pricing/hybrid-benefit`](https://azure.microsoft.com/pricing/hybrid-benefit)。还有另一个用于**DR**的许可证选项，您可以仅为灾难恢复部署Azure虚拟机，并免费获得SQL
    Server许可证。您可以在此处了解更多信息：[`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/business-continuity-high-availability-disaster-recovery-hadr-overview#free-dr-replica-in-azure`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/business-continuity-high-availability-disaster-recovery-hadr-overview#free-dr-replica-in-azure)。


    您还可以通过使用称为**预留实例**的概念来节省成本，您可以在此处阅读：[`https://azure.microsoft.com/pricing/reserved-vm-instances`](https://azure.microsoft.com/pricing/reserved-vm-instances)。即使您选择使用现有的Windows和SQL
    Server软件许可证，您仍会产生计算和存储成本。


    ### 高可用性选项

    *   您需要**故障转移集群实例 (FCI)** 还是**Always On可用性组？**


    如果您计划将SQL Server作为故障转移集群实例 (FCI) 或Always On可用性组的一部分部署，那么您需要做出一些选择，包括可用性、存储和网络。有关更多详细信息，请参阅本章后面的“**高可用性**”部分。


    还有其他部署选择要做，但我将在本章后面标题为“**在Azure虚拟机上部署SQL Server**”的练习中向您展示这些，该练习展示了如何通过Azure门户使用SQL
    Server市场映射进行部署。


    ## SQL Server IaaS代理扩展


    您已经了解了Azure Arc代理和扩展的概念，例如Azure SQL Server扩展。Azure虚拟机通过虚拟机扩展具有相同的概念。您可以在此处阅读更多关于扩展概念的信息：[`https://docs.microsoft.com/azure/virtual-machines/extensions/overview`](https://docs.microsoft.com/azure/virtual-machines/extensions/overview)。扩展架构也适用于Linux，您可以在此处阅读：[`https://docs.microsoft.com/azure/virtual-machines/extensions/features-linux`](https://docs.microsoft.com/azure/virtual-machines/extensions/features-linux)。


    ### 什么是SQL Server IaaS代理扩展？


    对于SQL Server，我们为Azure虚拟机构建了一个扩展，称为**SQL Server IaaS代理扩展**。此扩展在虚拟机内部安装一组服务，为您提供管理虚拟机和SQL
    Server的真正价值，包括


    *   Azure门户管理

    *   自动SQL数据库备份

    *   自动安全更新

    *   许可证和版本管理，包括AHUB

    *   SQL配置管理，如`tempdb`

    *   SQL最佳实践评估

    *   Microsoft Defender for Cloud


    **注意** 在撰写本书时，SQL Server IaaS代理扩展不支持Azure Active Directory (AAD)身份验证和Microsoft
    Purview访问策略与SQL Server 2022。我们的团队计划在未来添加这些功能。


    使用SQL Server IaaS代理扩展没有相关成本。


    ### IaaS代理扩展模式


    该扩展有两种不同的模式和安装方法。


    #### 完全模式


    这是使用SQL市场映射时的默认模式，并启用所有功能。'
  raw: '*   VM sizes can dictate what type of **storage choices** are available for
    performance, but also consider the basic decision of what is the maximum size
    of storage you need for your database(s). For example, you can get storage in
    Azure for databases with a VM size that would support 2048TB across multiple disks.
    However, the maximum size to back up a SQL Server database to Azure Blob Storage
    is 12TB (Azure Premium file shares can support 100TB). Read through our best practices
    for storage choices first at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/performance-guidelines-best-practices-checklist).


    *   A very important decision to make is which **Azure region** to deploy your
    virtual machine. An Azure region is a geographical location where Azure data centers
    exist. What started with just a few data centers years ago has turned into a worldwide
    force. So much so that we organize Azure regions into *geographies*. You can see
    the amazing story of just how many choices you have to deploy an Azure virtual
    machine at [`https://azure.microsoft.com/global-infrastructure/geographies`](https://azure.microsoft.com/global-infrastructure/geographies).
    Your choice of an Azure region can be based on many factors mostly centered around
    where your applications will connect to SQL Server in an Azure virtual machine.
    I think picking the right region for you is important from the beginning, but
    there are methods to move virtual machines to other regions, which you can read
    about at [`https://docs.microsoft.com/azure/resource-mover/tutorial-move-region-virtual-machines`](https://docs.microsoft.com/azure/resource-mover/tutorial-move-region-virtual-machines).
    Azure virtual machines are considered a *core service*, so whenever we build a
    new region, you can be assured an Azure virtual machine will be available. However,
    not all virtual machine sizes may be available in all regions.


    *   Decide on an **admin account** and password. You will be required to supply
    an admin account for either Windows or Linux. I’ve had customers get totally blocked
    here because there are company standards for admin accounts. If you use a SQL
    Server marketplace image, we automatically add this admin account as a member
    of the sysadmin role.


    *   **How will you deploy?**


    There are several ways to deploy SQL Server on an Azure Virtual Machine. I’ll
    show you later in this chapter a step-by-step process to deploy using the Azure
    portal, but you can also deploy using scripts and a concept called an **ARM template**.


    You also need to decide if you will use a **marketplace image for SQL Server**,
    which comes with an operating system and SQL Server preinstalled. We have various
    choices of OS and SQL Server combinations available. There are advantages with
    this approach including the automatic installation of the **SQL Server IaaS extension**,
    which you will learn more about later in this chapter in the section titled “**The
    SQL Server IaaS Agent Extension**.”


    **Note** The marketplace images for SQL Server can come with all services including
    SQL Server Reporting Services (SSRS) and SQL Server Analytics Services (SSAS)
    installed, or you can choose just the database engine. There are also separate
    marketplace images for just SSRS or SSAS.


    There can be scenarios where you want to install SQL Server yourself. I do this
    sometimes when I’m installing a specific build of SQL Server. So I will use the
    Azure marketplace to install just the operating system. Then I copy my SQL install
    packages into the virtual machine and install SQL Server. One nice feature of
    using the marketplace images for SQL Server is that we leave the installation
    binaries inside the virtual machine so you can uninstall and reinstall for a named
    instance scenario.


    No matter what method you use, you will have to decide on **licensing**. Do you
    have existing SQL Server, Windows, and/or Linux licenses, or will you choose a
    pay-as-you-go method? Using existing licenses for SQL Server and Windows is called
    **Azure Hybrid Benefit** (AHUB). You can read more about AHUB at [`https://azure.microsoft.com/pricing/hybrid-benefit`](https://azure.microsoft.com/pricing/hybrid-benefit).
    There is one other license option for **DR** where you can deploy an Azure virtual
    machine for disaster recovery only and be license free for SQL Server. You can
    learn more about this at [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/business-continuity-high-availability-disaster-recovery-hadr-overview#free-dr-replica-in-azure`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/business-continuity-high-availability-disaster-recovery-hadr-overview#free-dr-replica-in-azure).


    You also have options to save money by using a concept called **reserved instances**,
    which you can read about at [`https://azure.microsoft.com/pricing/reserved-vm-instances`](https://azure.microsoft.com/pricing/reserved-vm-instances).
    Even if you choose options to use existing software licenses for Windows and SQL
    Server, you will still incur costs for compute and storage.


    *   Do you need a **Failover Cluster Instance (FCI)** or **Always On Availability
    Group?**


    If you plan to deploy SQL Server as part of a Failover Cluster Instance (FCI)
    or Always On Availability Group, then you will need to make certain choices including
    availability, storage, and networking. See the section titled “**High Availability**”
    later in this chapter for more details.


    There are other choices for deployment to make, but I’ll show you those in an
    exercise in the section later in this chapter titled “**Deploying SQL Server on
    an Azure Virtual Machine**,” which shows you how to deploy using a SQL Server
    marketplace image through the Azure portal.


    ## The SQL Server IaaS Agent Extension


    You have learned in this book the concept of the Azure Arc Agent and extensions
    like the Azure extension for SQL Server. Azure virtual machines have the same
    concept through virtual machine extensions. You can read more about the overall
    extension concept at [`https://docs.microsoft.com/azure/virtual-machines/extensions/overview`](https://docs.microsoft.com/azure/virtual-machines/extensions/overview).
    The extension architecture is also available for Linux, which you can read about
    at [`https://docs.microsoft.com/azure/virtual-machines/extensions/features-linux`](https://docs.microsoft.com/azure/virtual-machines/extensions/features-linux).


    ### What Is the SQL Server IaaS Agent Extension?


    For SQL Server we have built an extension for Azure virtual machines called the
    **SQL Server IaaS Agent Extension**. This extension installs a set of services
    inside your virtual machine to give you real value in managing your virtual machine
    and SQL Server including


    *   Azure portal management


    *   Automatic SQL database backups


    *   Automatic security updates


    *   Licensing and edition management including AHUB


    *   SQL configuration management such as tempdb


    *   SQL best practices assessment


    *   Microsoft Defender for Cloud


    Note


    At the time of the writing of this book, the SQL Server IaaS Agent Extension did
    not support Azure Active Directory (AAD) authentication and Microsoft Purview
    access policies with SQL Server 2022\. Our team has plans to add these capabilities
    in the future.


    There is no cost associated with using the SQL Server IaaS Agent Extension.


    ### IaaS Agent Extension Modes


    The extension has two different modes and installation methods.


    #### Full


    This is the default mode when you use a SQL marketplace image and enables all
    features.'
