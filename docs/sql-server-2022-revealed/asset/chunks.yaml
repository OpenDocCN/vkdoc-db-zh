    \ The publisher, the authors, and the editors are safe to assume that the advice\
    \ and information in this book are believed to be true and accurate at the date\
    \ of publication. Neither the publisher nor the authors or the editors give a\
    \ warranty, expressed or implied, with respect to the material contained herein\
    \ or for any errors or omissions that may have been made. The publisher remains\
    \ neutral with regard to jurisdictional claims in published maps and institutional\
    \ affiliations.\n\nThis Apress imprint is published by the registered company\
    \ APress Media, LLC, part of Springer Nature.\n\nThe registered company address\
    \ is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\n# 献词\n\n*I’ve said this\
    \ before, but it is worth repeating because it matters. This book is dedicated\
    \ to the #sqlfamily, the most dedicated and passionate and largest technical community\
    \ I know of in the world. Without you we would not have a product.*\n\n# 前言\n\n\
    Today’s modern business landscape is dynamic and fast moving – with data playing\
    \ a fundamental role. Organizations need to quickly gain insights from data to\
    \ inform customer experiences and empower their employees. Currently, many companies\
    \ operate in a hybrid environment, with data in the cloud and on-premise. That’s\
    \ why we are so excited about the upcoming release of SQL Server 2022, a key part\
    \ of our evolving data and intelligence strategy. At Microsoft, we have made significant\
    \ investments in SQL, creating the most connected SQL database ever with this\
    \ newly launched product – and it’s incorporated into a Microsoft data ecosystem\
    \ that gives organizations a seamless way to connect across their databases, analytics,\
    \ and governance platforms.\n\nI can think of no person more qualified to take\
    \ you through a deep dive into SQL Server 2022 than our principal architect, and\
    \ 29-year Microsoft veteran, Bob Ward. Bob’s depth of knowledge is second only\
    \ to his enthusiasm and passion for the SQL community.\n\nIn his informational\
    \ book, Bob delivers a closer look at new solutions that enable you to do more\
    \ with your data and guide you to take advantage of new capabilities. Bob will\
    \ introduce Azure Synapse Link for SQL Server 2022, which gets you from data to\
    \ insights faster and easier than ever.\n\nBob will cover database engine innovations\
    \ including built-in query intelligence, Ledger for SQL Server and Contained Availability\
    \ Groups, as well as Azure Synapse Link for SQL, which combines data from on-prem\
    \ and cloud data. This enables near-real-time analytics over your most important\
    \ operational data, all without the need to build and manage complex packages\
    \ and pipelines – or the need to write a single line of code for ETL movement.\
    \ You’ll learn about SQL Managed Instance for managed disaster recovery and use\
    \ the power of built-in Distributed Availability Groups (DAGs) to seed and link\
    \ databases to Azure.\n\nAdditionally, Bob shares easy-to-consume information\
    \ on Microsoft Purview, which you can use to create a policy for access rights\
    \ and then publish across many SQL Servers, allowing you to have a central governance\
    \ hub.\n\nWe hope you enjoy reading about, exploring, and deploying SQL Server\
    \ 2022 as much as we enjoyed developing it. We want to extend our sincere thanks\
    \ to our incredibly engaged SQL community. Your feedback over the years has helped\
    \ us make a powerful platform that will reduce complexity, accelerate innovation,\
    \ and deliver insights to inform business decisions. Thank you for giving us an\
    \ opportunity to support your efforts and innovations!\n\n> Rohan Kumar  \n> Microsoft\
    \ Corporate Vice President, Azure Data\n\n# 引言\n\nLike *SQL Server 2019 Revealed*,\
    \ the manuscript for this book saw plenty of mileage. I was back on the road again\
    \ in late 2021 and in 2022, and many of the chapters were written or polished\
    \ in places like Las Vegas (multiple times); Orlando; London (including the London\
    \ Underground); Charleston, South Carolina (where my son Troy lives); Greenville,\
    \ South Carolina; Dallas (where my son Ryan lives); Poolville, Texas (where my\
    \ wife’s family lives); Austin; Genesee, Colorado (where Ginger and I have a small\
    \ mountain retreat); Siesta Key, Florida (thank you, Tom and Janet Grubish); Redmond,\
    \ Washington (multiple times); Chicago; and Atlanta. This includes a number of\
    \ times writing pages in hotels, airplanes, trains, and even the front seat on\
    \ a road trip while Ginger drove. But I was always most effective finishing off\
    \ a chapter or making edits in the confines of my home in North Richland Hills,\
    \ Texas.\n\nThis book is a complete knowledge transfer from me to you on everything\
    \ I learned, absorbed, tested, and exhaustively poured my brain into about SQL\
    \ Server 2022 from its inception as project Dallas right up to the General Availability\
    \ release of the product. And it is my honor and pleasure to do that. All those\
    \ late nights and weekends of study, testing, looking at source code, talking\
    \ to program managers and developers, and thinking of scenarios based on my 29\
    \ years of experience are all in this book. I tried to bring both the high-level\
    \ “what and why” with deep “how it works” so you can learn SQL Server 2022 from\
    \ all angles. The number of pages alone in the book is a testament toward that\
    \ goal. I’ve also tried to provide a deep set of examples in almost every chapter.\
    \ I want you to not only read about why SQL Server 2022 is special but try it\
    \ out for yourself to see it in action. I think you will also love in almost every\
    \ chapter quotes from our engineering team on their perspective on why they believe\
    \ SQL Server 2022 is a great release.\n\nIf you like knowing the history and “behind\
    \ the scenes” of SQL Server 2022, start with Chapter 1 where you will also get\
    \ an insight into the overall story of SQL Server 2022. If you want to understand\
    \ differences in installing SQL Server 2022 from previous releases including what\
    \ has been removed and new Azure connectivity options, take a look at Chapter\
    \ 2.\n\nAll of the other chapters can be read in succession or on their own as\
    \ separate topics. If you want an immersion into how SQL Server is connected to\
    \ Azure, Chapter 3 is a complete resource. There are plenty of screenshots in\
    \ this chapter to show you the entire Azure experience. Even if you don’t have\
    \ an Azure subscription, check out how we are connecting to Azure for disaster\
    \ recovery (DR), analytics, and security.\n\nPerhaps you want to dive right into\
    \ the engine. Built-in query intelligence is so vast I needed two chapters to\
    \ cover it all. Chapters 4 and 5 include very interesting exercises you can try\
    \ yourself all on your own laptop with Evaluation or Developer Edition."
