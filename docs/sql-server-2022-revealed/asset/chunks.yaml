  trans: '### PSP 优化如何工作？


    PSP 优化的概念简单而强大。


    > 注意

    >

    > 我要事先向您说明，我们确实不确定能否解决所有的 PSP 问题。我们知道这项工作的初版存在局限性。但我们确实相信，对于受参数探查影响的应用程序，它有真正的可能性产生积极影响。


    要实现 PSP 优化，我们已在查询处理器中为查询计划构建了新的概念。一个`调度程序`查询计划是`参数化`SQL 语句的父查询计划，并存储在`计划缓存`中。参数化语句可以存在于存储过程中，由应用程序参数化，甚至可以由
    SQL Server 引擎自动参数化。您可以在 [`https://docs.microsoft.com/sql/relational-databases/performance/parameter-sensitivity-plan-optimization?#understanding-parameterization`](https://docs.microsoft.com/sql/relational-databases/performance/parameter-sensitivity-plan-optimization?#understanding-parameterization)
    阅读更多关于参数化的内容。


    调度计划本身不用于执行。相反，一个调度计划可以有多个`变体`计划。变体计划是基于参数化查询中使用的`谓词`或过滤器的值桶（bucket）或范围创建的。图 5-4
    展示了调度器和变体如何工作的示意图。


    ![](img/525217_1_En_5_Fig4_HTML.png)


    调度器与变体工作原理图表。参数化查询导向调度计划。调度计划导向针对少于 1 万条列表的查询变体代理、针对 1 万到 100 万条列表的查询变体代理、针对大于或等于
    1 千条列表的查询变体代理等。


    图 5-4


    PSP 优化下的调度器与查询变体


    在此图中，您可以看到有三个变体，每个变体对应一个查询，覆盖匹配某个谓词或过滤器的特定“范围”（即值桶）。这个概念有趣的地方在于，它也可以帮助解决我在第 4
    章讨论的一些`内存授予`问题。这是因为每个变体计划在`计划缓存`中是“其自身的计划”，即使两个变体使用了类似的`计划形状`（例如，索引扫描），它们也可以包含不同的内存授予。


    > 注意

    >

    > 图 5-4 是一个展示调度器和变体概念的图表。调度器可以使用多少个变体或桶的设计是内部实现，且未公开记录。


    当查询首次编译时，查询处理器可以识别参数化语句，检查它是否符合调度器和查询变体的条件。第一次执行将产生一个调度器和一个变体。如果使用落入另一个桶的不同参数执行同一语句，则可以编译新的变体计划并将其存储到缓存中。


    调度器和变体计划不会被持久化。它们只存在于计划缓存中，但可以在需要时通过新的编译重新构建。变体计划也可以根据需要单独重新编译。


    让我们回顾一下本节前面展示 PSP 问题的可视化场景。在相同的场景中，如果启用了 `dbcompat 160`，现在的情况如图 5-5 所示。


    ![](img/525217_1_En_5_Fig5_HTML.jpg)


    允许缓存中存在多个计划的 PSP 优化示意图。示意图如下：`exec my_proc_1` 向右箭头 寻找，`exec my_proc_10` 向右箭头 扫描。


    图 5-5


    PSP 优化允许缓存中存在多个计划


    无需更改代码，优化器就可以使用变体，为存储过程或参数化语句在缓存中保留多个计划。了解 PSP 优化工作原理的最好方法莫过于亲自尝试。


    ### 让我们看看 PSP 优化的实际应用


    这个练习有一长串步骤，但我认为您会发现它值得一试。


    #### 先决条件


    要进行此练习，您需要满足以下先决条件：


    *   `SQL Server 2022 评估版`。

    *   虚拟机或计算机，至少配备 2 个 CPU 和 8GB 内存。

    *   `SQL Server Management Studio (SSMS)`。最新的 18.x 或 19.x 版本均可。

    *   从 [`https://aka.ms/ostress`](https://aka.ms/ostress) 下载 `ostress.exe`。使用下载的
    `RMLSetup.msi` 文件进行安装。使用所有默认设置。仅在 Windows 系统上下载此工具。以下部分练习仅在 Windows 系统上运行。

    *   从本书 GitHub 仓库的 `ch05_builtinqueryintelligence_getsbetter\pspopt` 目录获取脚本副本。'
- fmt: "#### Follow These Steps for the Exercise\n\nFollow these steps to see how\
    \ PSP optimization works:\n\n![](Images/525217_1_En_5_Fig6_HTML.jpg)\n\nA flowchart\
    \ of query plan using an index seek. The key lookup, clustered, stock items dot\
    \ P K underscore warehouse, cost 33 percentage, 0.000s 3 of 3, 100 percentage,\
    \ and Index seek, non-clustered, stock items dot F K underscore warehouse cost\
    \ 15 percentage, 0.000s 3 of 3, 100 percentage leads to nested loops, and so on.\n\
    \nFigure 5-6\n\nIndex seek plan for a stored procedure parameter\n\n1.  Download\
    \ a copy of the backup of WideWorldImporters from [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters).\
    \ The script in the next step assumes a location of the backup at `c:\\sql_sample_databases`.\
    \ There is a customized backup available with extended data preloaded you can\
    \ use at [`https://github.com/microsoft/sqlworkshops-sql2022workshop/releases`](https://github.com/microsoft/sqlworkshops-sql2022workshop/releases).\n\
    \n2.  Restore the WideWorldImporters sample backup. You can edit and use the `restorewwi.sql`\
    \ script. This script was designed for a SQL Server on Azure Virtual Machines\
    \ marketplace image, which has separate disks for data and log files. Edit this\
    \ file to match your file paths. This script contains the following T-SQL statements:\n\
    \n    ```\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS WideWorldImporters;\n\
    \    GO\n    -- Edit the locations for files to match your storage\n    RESTORE\
    \ DATABASE WideWorldImporters FROM DISK = 'c:\\sql_sample_databases\\WideWorldImporters-Full.bak'\
    \ with\n    MOVE 'WWI_Primary' TO 'e:\\data\\WideWorldImporters.mdf',\n    MOVE\
    \ 'WWI_UserData' TO 'e:\\data\\WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log'\
