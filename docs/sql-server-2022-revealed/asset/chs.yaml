  注意，`dop_feedback_stabilized` 事件是在 `feedback_dop` 尝试设置为 2 但未稳定后触发的。尝试 DOP 反馈为 2 后，经过时间增加了，但
  CPU 使用率下降了。为了遵循“不造成损害”的原则，我们必须在 DOP 为 4 时停止。`dop_feedback_stabilized` 事件显示了稳定的原因。在本例中，对
  DOP 2 的验证失败是因为查询持续时间更长。这结束了反馈循环，因为我们已经找到了最佳且最低的可能 DOP 值 4。然而，请记住，当反馈被提供且反馈状态为 **`Stable`**
  时，反馈会被持久保存到 **查询存储** 中。这允许稳定状态被持久保存，即使通过进一步的反馈可能会将其降低。


  > **我多次运行过这个测试和场景，在某些情况下，我看到 DOP 反馈降低到 2 并稳定在那个数值。**


  ![DOP 反馈的平均持续时间。](img/525217_1_En_5_Fig22_HTML.png)


