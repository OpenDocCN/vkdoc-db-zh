- "# 3. 将数据库连接至云端\n\n## 配置\n\n尽管本章专门为您提供安装和升级方面的指导，但安装后 SQL Server 的配置同样是一个重要主题。不过，在\
  \ SQL Server 2022 中，实例配置的改动非常少：\n\n*   新增了少量服务器级别的 `sp_configure` 选项。这些选项将在本书中结合\
  \ SQL Server 2022 的新特性进行讨论。\n\n*   SQL Server 配置管理器已得到增强，允许您控制 Azure SQL Server\
  \ 扩展功能的服务（启动和停止）。\n\n除此之外，没有新的实例级别配置变更。\n\n您将在探索本书中各种新特性时，了解到新的数据库级别配置选项。\n\n##\
  \ 易于安装和升级\n\nSQL Server 一直以来以其简便的安装和升级体验而闻名，这一点在 SQL Server 2022 中并未改变。作为该体验的一部分，我们提供了集成设置，以便在您需要实现混合策略时连接到\
  \ Azure。\n\n如果您通读了本章的所有细节，那么您已基本准备好深入探索各项功能了。那么，让我们开始吧！下一章将介绍如何以前所未有的行业方式将 SQL Server\
  \ 连接到云端，该方式将 SQL Server 与 Azure 相结合，以提供灾难恢复、分析和安全功能。\n\nSQL Server 可在您需要的任何平台上运行，从边缘到云端。无论您在何处运行\
  \ SQL Server，我们都看到了行业和客户将 SQL Server *连接* 到云端的趋势。*连接* 是一个相当宽泛的术语，因此在本章中，您将详细了解 SQL\
  \ Server 2022 如何连接到云端。\n\n首先，我将分享我对 *混合* 含义的理解，以及 SQL Server 多年来如何成为一个混合平台。然后，我将深入介绍\
  \ SQL Server 2022 现在在哪些主要领域以空前的方式启用了 Azure 功能。这包括托管的灾难恢复、近实时分析以及新的安全功能。作为此部分内容的一部分，我将描述如何使用\
  \ Azure Arc 来实现其中一些技术。\n\n本章包含供您实践学习的示例，以了解这些功能的工作原理。对于其中任何一项功能，您都需要一个 Azure 订阅，并且需要能够将您的\
  \ SQL Server 连接到 Azure，无论是直接连接互联网还是通过代理连接。您的公司或组织可能已为您提供了 Azure 账户或订阅。但是，如果您需要自己的账户，请从\
  \ `https://azure.microsoft.com/get-started` 开始。在本章中，我将详细说明每种场景可能需要的特定访问权限，以及您可能希望使用的任何特殊连接配置（如代理）。\n\
  \n## 混合 SQL Server\n\n在本书的这一部分，我将分享我对 *混合* 一词在 SQL Server 相关语境下含义的理解，简要回顾 SQL Server\
  \ 在以往版本中如何具备混合功能，并概述 SQL Server 2022 的独特之处。\n\n### 什么是 *混合*？\n\n我相信你们很多人都思考过 *混合*\
  \ 的含义，我的研究表明行业内对此有多种定义和见解。我喜欢将 *混合* 一词简单地定义为与计算或数据平台相关的概念：\n\n*   同时在本地和云端提供的产品或服务，*且具有一致性*\n\
  \n    SQL Server 绝对符合这一条件，因为它可在 Azure 云端的 Azure SQL 中运行：Azure 虚拟机上的 SQL、Azure SQL\
  \ 托管实例以及 Azure SQL 数据库。请注意我在短语末尾的强调：“且具有一致性”。我这样说是因为，您可能会找到其他同时存在于本地和云端的产品，但它们是否具备与\
  \ SQL Server 相同的一致性故事呢？相同的核心数据库引擎、相同的 T-SQL 语言以及相同的工具。\n\n*   一种在本地运行的产品，通过连接到云端以\
  \ *增强* 数据能力\n\n这个短语有两个关键词：连接和增强。*连接* 意味着通过某种方式将本地产品现有功能的数据连接起来。*增强* 意味着这种连接能带来真正的商业价值。您将在本章中看到，我认为\
  \ SQL Server 2022 同时做到了这两点。\n\n首先，让我们回顾一下 SQL Server 历年来如何连接到 Azure，以建立一些背景知识。\n\
  \n### 历年 SQL Server 的混合特性\n\nSQL Server 历年来包含的最基本的混合功能是备份。从 SQL Server 2012 开始，您就可以使用包含\
  \ URL 的语法，将数据库备份到 Azure Blob 存储或从其中恢复。此功能多年来不断增强，至今仍然存在，您可以在 `https://docs.microsoft.com/sql/relational-databases/backup-restore/sql-server-backup-to-url`\
  \ 阅读相关内容。\n\n还有其他连接 SQL Server 到 Azure 的方法，包括使用现有功能来扩展高可用性、冗余或查询。例如，您可以将 Always\
  \ On 可用性组扩展到 Azure，您可以在 `https://docs.microsoft.com/previous-versions/azure/virtual-machines/windows/sqlclassic/virtual-machines-windows-classic-sql-onprem-availability`\
  \ 阅读相关信息。\n\n您还可以设置事务复制，其中发布服务器是本地 SQL Server，而订阅服务器数据库位于 Azure 虚拟机、Azure SQL 托管实例，甚至\
  \ Azure SQL 数据库上（您可以在 `https://docs.microsoft.com/azure/azure-sql/database/replication-to-sql-database`\
  \ 阅读有关如何为 Azure SQL 数据库设置此功能的具体说明）。\n\n最后，任何 Azure SQL 服务都可以作为本地 SQL Server 通过链接服务器查询的数据源。这些都是连接\
  \ SQL Server 到 Azure 的基本方法，但 SQL Server 2022 将其提升到了一个新的水平。\n\n### SQL Server 2022\
  \ 混合功能阵容\n\n图 3-1 直观地展示了 SQL Server 2022 的所有 Azure 启用功能。\n\n![](img/525217_1_En_3_Fig1_HTML.png)\n\
  \nSQL Server 2022 具备 3 项内置能力，可云连接至 5 项 Azure 启用功能，从复制数据故障转移到评估警报。\n\n图 3-1\n\nSQL\
  \ Server 2022 实现云连接\n\n从左至右，SQL Server 2022 在顶部内置了提供这些云连接功能的能力。\n\n#### Azure SQL\
  \ 托管实例\n\nAzure SQL 托管实例的链接功能为 SQL Server 2022 提供 *托管式* 灾难恢复。内置的分布式可用性组 (DAG) 功能用于桥接\
  \ SQL Server 和 Azure SQL 托管实例。\n\n#### Azure Synapse Analytics\n\n适用于 SQL Server\
  \ 的 Azure Synapse Link 允许 SQL Server 2022 将选定表中的数据无缝同步到 Azure Synapse 的专用 SQL 池。自承载集成运行时\
  \ (SHIR) 用于协调 Synapse 和 SQL Server 之间的通信，但 SQL Server 也具备向 Azure 发送数据的内置能力。\n\n\
  #### Azure Active Directory 身份验证\n\nSQL Server 2022 现在可以使用 Azure Active Directory\
  \ (AAD) 账户进行登录身份验证。这支持了诸如多因素身份验证等概念。您必须在 SQL Server 2022 上启用 AAD 才能支持 Purview 集成的策略管理。SQL\
  \ Server 2022 的 AAD 需要 Azure SQL Server 扩展。\n\n\n"
- '# Microsoft SQL Server 2022 云连接功能


  ## Microsoft Purview


  Microsoft Purview 具备许多功能，但与 SQL Server 2022 集成的具体新功能是 `policy management`（策略管理）。您可以使用
  Purview 发布一个将推送到 SQL Server 2022 的策略，以支持身份验证和访问。Purview 策略管理与 SQL Server 2022 要求您已为
  SQL Server 配置了 Azure Active Directory (AAD) 身份验证，因为策略将基于 AAD 帐户。Purview 策略管理还需要
  Azure 扩展 for SQL Server。


  ## Microsoft Defender for SQL


  Microsoft Defender for SQL 是 Microsoft Defender for Cloud 家族的一员，支持对 SQL Server 2022
  进行漏洞评估和高级威胁防护 (ATP)。Microsoft Defender for SQL 适用于多种 SQL 技术，并支持早期版本的 SQL Server。适用于本地
  SQL Server 的 Microsoft Defender for SQL 需要 Azure Arc Agent 和用于监视的扩展。本章不会详细介绍此服务。您可以在
  [`https://docs.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage`](https://docs.microsoft.com/azure/defender-for-cloud/defender-for-sql-usage)
  阅读更多关于 Microsoft Defender for SQL 的信息。


  ## Azure Arc Agents and Azure Extension for SQL Server


  `Azure Arc Agent` 是在您选择在 SQL Server 安装期间或通过脚本方法连接到 Azure 时安装的，用于连接 Microsoft Purview、启用
  Azure Active Directory 身份验证 (AAD) 并支持 Microsoft Defender for SQL。Azure Arc Agent
  支持一个用于特定功能的扩展框架。我们构建了一个名为 `Azure extension for SQL Server` 的扩展。此扩展与 Azure 通信，将信息存储在注册表（对于
  Linux 是 `mssql.conf`）中，数据库引擎已增强以支持 AAD 和 Purview。Microsoft Defender for SQL 使用另一个名为
  Monitoring Agent 的扩展。您可以在 [`https://docs.microsoft.com/azure/azure-arc/servers/agent-overview`](https://docs.microsoft.com/azure/azure-arc/servers/agent-overview)
  阅读有关 Azure Arc Agent 架构的详细信息。Azure Arc Agent 和扩展是为本地 SQL Server 设计的。Azure 虚拟机上的
  SQL Server 有类似的概念，但使用不同的架构，包括 SQL Server IaaS Agent Extension ([`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management))。在本书撰写时，Microsoft
  Purview 和 Azure Active Directory 身份验证尚未得到 IaaS Agent Extension 的支持。然而，我们计划启用此功能，并且我们可以在不同于发布
  SQL Server 主要版本的时间框架内增强该扩展。


  本章的其余部分将深入介绍这些云连接功能中的每一项。您可以阅读所有部分，或直接跳转到您想了解的特定云服务。


  '
- '# 使用 Azure SQL Managed Instance 进行托管灾难恢复


  您只会在……嗯，发生灾难时才需要担心灾难恢复。但当然没有人知道那是什么时候，这就是为什么为 SQL Server 数据和安装制定灾难恢复计划是任何生产系统的关键组成部分。


  您如何构建灾难恢复系统通常取决于您可能知道的行业术语，例如恢复时间目标 (RTO) 和恢复点目标 (RPO)。我们的高可用性解决方案，例如 SQL Server
  的内置崩溃恢复和故障转移群集，可以帮助满足这些要求。这些解决方案通常不能帮助灾难恢复的原因是，真正的灾难通常意味着您的本地数据副本不可用。


  SQL Server 提供了许多帮助解决方案，包括一个基本的数据库备份和还原解决方案，您通常将备份存储在另一个物理位置，如果在灾难情况下发生，可以检索和还原这些备份。您甚至可以建立一个
  Always On 可用性组，将辅助副本放在不同的物理位置，但这可能需要更复杂的群集设置。


  对于 SQL Server 2022，我们希望为灾难恢复提供一个新选项，我称之为 `managed disaster recovery`（托管灾难恢复）。


  ## Project Chimera 和 DAG


  为了理解我们如何构建托管灾难恢复解决方案，让我们看看这个新功能的背景。


  ### 分布式可用性组


  为了帮助灾难恢复场景，我们在 SQL Server 2016 中构建了一个名为 `Distributed Availability Groups` (分布式可用性组，DAG)
  的新功能。DAG 是一个跨越多个可用性组 (AG) 的可用性组，通常跨越遥远的区域。DAG 技术最棒的地方在于它完全内置于 SQL Server 中。实际上，AG
  技术也内置于 SQL Server 中以管理数据复制。诸如 Windows Server 故障转移群集 (WSFC) 和 Pacemaker (Linux) 之类的技术用于协调故障转移。


  图 3-2 显示了一个可能的 DAG 配置。


  ![图 3-2](img/525217_1_En_3_Fig2_HTML.png)


  图 3-2：SQL Server 分布式可用性组 (DAG)


  您可以看到此设计的一个有趣方面是，可用性组 1 (AG1) 中的主副本不仅将其事务日志更改发送到其 AG 中的辅助副本，还发送到可用性组 2 (AG2) 的主副本。AG2
  的主副本将其日志更改转发到其辅助副本。用户只能向 AG1 的主副本写入更改。但如果出现情况，您可以故障转移到 AG2，然后用户就可以向 AG2 的主副本写入更改。副本和
  AG 之间的所有通信和数据复制都在 SQL Server 引擎内管理。


  AG 和 DAG 都内置于 SQL Server 中，这一事实让我们想到将这个概念扩展为混合方法。为什么第二个 AG 不能在 Azure 中呢？但不仅仅是在 Azure
  中，因为您肯定可以在您的数据中心中的 SQL Server 与 Azure 虚拟机上的第二个 AG 之间构建一个 DAG。我们希望构建一些新的、革命性的东西。


  ### Project Chimera


  大约 3 年前，负责 Azure SQL Managed Instance 的工程团队提出了一个想法，导致了一个名为 Chimera 的项目。正如 Managed
  Instance 团队的高级项目经理 Dani Ljepava 告诉我的那样，*“Chimera 是希腊神话中的神话怪兽，看起来像一条龙，有多个来自不同动物的头合而为一。正如我们正在构建
  SQL Server 和云之间的混合能力，Chimera 似乎是这个项目的完美名称，因为它指的是一个混合怪兽——多个动物合为一体。”*


  团队最初只是想在 SQL Server 和 Azure SQL Managed Instance (MI) 之间建立一个链接，以便 MI 可以用作只读副本，并最终成为从
  SQL Server 在线迁移的目标。最终，随着我们为项目 Dallas 制定计划，该项目章程不断扩展，以便此功能可以支持 SQL Server 2022 的灾难恢复场景。


  Dani 告诉我，*“我们面临着解决微软以前没有人解决过的问题，并且不得不在此过程中经历一些独特的挑战（并且在我们说话的今天仍在进行中）。尽管如此，以前从未有人在
  SQL Server 和完全托管的 Azure PaaS 服务之间构建过在线 DR。”*


  随着我们朝着 SQL Server 2022 的私人预览版发布迈进，我们将 Chimera 品牌化为 `Azure SQL Managed Instance`
  的 `link feature`（链接功能）。



  '
- "# Azure SQL 托管实例的链接功能\n\nAzure SQL 托管实例的链接功能，让你能够以简单无缝的方式，将现有的 SQL Server 数据库连接或链接到一个托管实例。我们利用了\
  \ SQL Server 引擎中内置的可用性组和 `分布式可用性组` 技术的强大功能，再加上一些幕后的技术，实现了 Azure SQL 托管实例的这一功能。\n\
  \nAzure SQL 托管实例的链接功能可用于 `SQL Server 2016`、`SQL Server 2019` 或 `SQL Server 2022`\
  \ 的数据库（`SQL Server 2017` 的支持将在稍后添加）。此功能支持通过 AG 技术将数据复制到 Azure SQL 托管实例（MI），并将该 MI\
  \ 数据库用于读取横向扩展场景。如果你最终希望从 SQL Server 迁移到 MI，那么可以故障转移到 MI，此时 MI 就成为了主系统。这是一个 `单向`\
  \ 操作，这也是为什么它能帮助你建立一个向 Azure 迁移的在线解决方案（并且由于我们使用的是 AG 技术，这是向 MI 进行在线迁移的最快方法）。此功能有时被称为向\
  \ Azure MI 进行 `单向` 复制。\n\n`SQL Server 2022` 独有的功能是能够设置一个到 Azure SQL 托管实例的链接，其中托管实例被声明为灾难恢复站点，可以\
  \ `在线` 故障转移到 MI，但在某个时间点可以 `离线` 故障回退到 `SQL Server 2022`。此功能有时被称为向 Azure MI 进行 `双向`\
  \ 复制。我将在本章后面名为 \"`使用链接功能进行离线灾难恢复`\" 的部分解释故障回退为何是离线的，以及我为何称其为受控灾难恢复。\n\n## 工作原理\n\
  \n让我们通过查看如何创建链接和故障转移到 MI，来了解 Azure SQL 托管实例（MI）的链接功能是如何工作的。\n\n### 创建和使用链接\n\nAzure\
  \ SQL 托管实例的链接功能结合使用内置的 `T-SQL` 和 `PowerShell` 脚本，在 `SQL Server 2022` 上创建一个可用性组（如果不存在的话），并在\
  \ `SQL Server 2022` 和 Azure SQL 托管实例（任何服务层级）之间创建一个 `分布式可用性组`，其中包含来自你的 `SQL Server\
  \ 2022` 实例的数据库。通过 `SQL Server Management Studio (SSMS)` 中新增的 GUI 向导，创建链接的过程也变得更加容易，在对象资源管理器中数据库的上下文菜单里有一个选项叫做\
  \ `Azure SQL 托管实例链接 ➤ 复制数据库`。\n\n图 3-3 展示了创建到 Azure SQL 托管实例链接的架构和流程。\n\n![](img/525217_1_En_3_Fig3_HTML.png)\n\
  \n一个图表展示了 Azure SQL 托管实例的链接。步骤 1 到 6 分别是 Azure 网络、可用性组 1、DAG 异步、创建链接数据库种子设定、日志更改和可用性组\
  \ 2。\n\n图 3-3\n\nAzure SQL 托管实例的链接功能\n\n让我们从创建链接的过程来拆解链接功能的组成部分。`SSMS` 会自动化这些步骤：\n\
  \n1.  **建立网络连接**，使用 Azure 网络和数据库镜像（`dbm`）端点，在 SQL Server 和 Azure SQL 托管实例之间建立连接。\n\
  \n2.  在 `SQL Server 2022` 上**创建一个可用性组（AG）**和数据库镜像（`dbm`）端点（如果尚不存在）。将 AG 构建为 `无群集`\
  \ 或 `CLUSTER_TYPE = NONE`。我们不会对 AG 使用任何群集技术，因为这不是一个基于自动故障转移的解决方案。现有的 AG 可能已经有一个辅助副本。事实证明，有一个有趣但不太为人所知的特性是，如果你自己构建\
  \ AG，`你不必拥有辅助副本`（在这种情况下不使用可用性模式）。但你必须创建一个 AG，以便能够创建一个 DAG。\n\n3.  **创建一个分布式可用性组（DAG）**，其中包含\
  \ `SQL Server 2022` 的 AG 和你的托管实例名称。\n\n4.  **创建到 Azure SQL 托管实例的链接**（`PowerShell`\
  \ cmdlet）。这会为 `常规用途` 服务层级的托管实例建立一个 AG，或使用 `业务关键` 服务层级中现有的 AG（该层级已有一个辅助副本）。再次注意，AG\
  \ 不一定必须有辅助副本，这就是为什么此解决方案能很好地适用于 `常规用途` 服务层级。创建链接还会启动到 Azure SQL 托管实例的数据库复制或种子设定。种子设定使用\
  \ `dbm` 端点将数据库的副本流式传输到托管实例。你可以在 [`https://docs.microsoft.com/sql/database-engine/availability-groups/windows/automatically-initialize-always-on-availability-group`](https://docs.microsoft.com/sql/database-engine/availability-groups/windows/automatically-initialize-always-on-availability-group)\
  \ 阅读更多关于种子设定工作原理的信息。\n\n5.  现在对主数据库所做的**更改**将作为日志更改自动传输到 Azure SQL 托管实例。\n\n6. \
  \ 用户可以连接到 Azure SQL 托管实例并以 `只读` 方式访问数据库，对于 `业务关键` 服务层级，还可以访问辅助副本。\n\n**注意** 当 Azure\
  \ SQL 托管实例的链接功能最终版本发布时，我们可能会提供一个选项，让你为灾难恢复（DR）目的声明你的托管实例。这个概念是在这种情况下使托管实例免许可费用，因此你只需支付计算和存储费用。如果此选项可用，你将无法从\
  \ Azure SQL 托管实例数据库读取，因为你仅将其用于灾难恢复目的。\n\n一旦数据库在 Azure SQL 托管实例中同步，事务日志中的任何更改都会自动发送到\
  \ Azure SQL 就像你自己构建了一个 DAG 一样。用户也可以访问 Azure SQL 托管实例中的数据库进行读取，就像访问 DAG 中的辅助副本一样。\n\
  \n### 故障转移到 Azure SQL 托管实例\n\n假设现在你已准备好将你的主要工作负载迁移到 Azure SQL 托管实例。你可以使用链接功能执行故障转移。对于\
  \ `SQL Server 2022` 之前的 SQL Server 版本，这是一个 `单向操作`。\n\n在故障转移操作上你有两个选择（两者都是手动的）：\n\
  \n*   **计划内手动故障转移**\n    *   如果你使用此选项，你的 SQL Server 实例是可用的，并且你希望确保故障转移中没有数据丢失。这将需要停止你的应用程序对主副本进行修改，并同步\
  \ DAG。\n\n*   **强制故障转移**\n    *   使用此选项，你愿意接受一些数据丢失（即使在 DAG 已经同步的情况下可能没有丢失）。如果 SQL\
  \ Server 实例不可用，这是你进行故障转移的唯一选择。\n\n当你故障转移到 Azure SQL 托管实例时，数据库将被设置为读/写。我们会处理托管实例上所有\
  \ AG 的后勤工作。在 SQL Server 端，你也可以选择删除 AG（如果它是被创建的）和/或 DAG。\n\n现在你需要更改你的应用程序以连接到 Azure\
  \ SQL 托管实例服务器名称。你还需要手动迁移任何实例级别的对象（`SQL Agent` 作业、登录名等）。因此，事先将这些对象全部编写成脚本以准备故障转移是一个好主意。\n\
  \n## 使用链接功能进行离线灾难恢复\n\n到目前为止，这听起来不像一个灾难恢复解决方案，而是一个单向迁移解决方案，这确实是真的。然而，对于 `SQL Server\
  \ 2022`，我们将允许你使用托管实例作为离线灾难恢复站点。我称此功能为离线灾难恢复，因为尽管到托管实例的故障转移被认为是在线的，但故障回退是离线的。我们添加的关键功能是能够将数据库从\
  \ Azure SQL 托管实例 `恢复回` SQL Server。\n\n\n\n#### 为何选择托管式灾难恢复？\n\n本章节的标题以*托管式灾难恢复*开头。我称其为*托管式*是因为，借助此功能，你的灾难恢复\
  \ (DR) 站点将使用平台即服务 (PaaS) SQL。SQL Server 本身具备构建 DR 站点的所有功能，但你必须自行管理它，并确保在需要时它可用。\n\
  \n一旦你将 SQL Server 链接到托管实例，Microsoft 就会为你管理 DR 站点。Microsoft 通过托管实例管理整个基础架构、可用性以及\
  \ SQL Server 数据库的备份。这样，你就可以放心，当你需要 DR 站点时，它将随时可用并准备就绪。\n\n#### SQL Server 与数据库版本兼容性\n\
  \n你可能早就知道，我们不允许你将较新主要版本的 SQL Server 数据库备份还原到较旧的主要版本。当你执行 `RESTORE` T-SQL 语句时，会遇到错误，提示备份的版本*高于*当前版本。\n\
  \n实际上，不兼容性存在于数据库级别，而非实例级别。每个 SQL Server 主要版本的数据库都有一个版本号。你可以使用 T-SQL 函数 `DATABASEPROPERTYEX(<db>,\
  \ ‘Version’)` 查看此版本。你也可以使用 `RESTORE HEADERONLY` T-SQL 语句来查看备份的 `DatabaseVersion`。\n\
  \n实际情况是，当我们构建一个新的主要版本的 SQL Server 时，我们通常会进行一些更改，这些更改会影响数据库在构建新软件版本*期间*的版本兼容性（不是数据库兼容性级别）。这包括像系统表修改这样的变更。由于这些更改依赖于新版本的代码，因此无法在旧版本中访问新代码。在构建新的主要版本时，数据库版本可能会经历多个*小版本跳跃*或*步骤*（实际上，每个\
  \ CTP 构建通常都会有几次小版本跳跃）。一旦我们发布了某个主要版本的正式版 (General Availability)，我们会锁定该数据库版本，直到下一个主要版本。我们绝不会在累积更新中更改此版本号，这就解释了为什么它们彼此兼容。当你将旧版本的数据库备份还原到新版本时，可以看到这些版本跳跃的过程。在\
  \ `RESTORE` 的输出中，你可能会看到几条这样的消息：\n\n```\nDatabase 'WideWorldImporters' running the\
  \ upgrade step from version 928 to version 929.\n```\n\n在我们构建每个主要版本的过程中，可能会有多个这样的“步骤”。从版本号可以看出，多年来我们已经进行了多次这样的操作。\n\
  \n由于 Azure SQL 托管实例是*无版本*的，它将始终*领先于* SQL Server 的主要版本。这就是为什么你无法将 Azure SQL 托管实例的数据库备份还原到\
  \ SQL Server。\n\n随着 Azure SQL 托管实例与 SQL Server 2022 链接功能的发布，我们提供了一项能力，使得 Azure SQL\
  \ 托管实例可以在数据库版本级别上与 SQL Server 2022 *兼容*。这就是我们如何支持离线灾难恢复流程的方式。一个被标记为兼容的 Azure SQL\
  \ 托管实例的备份，可以被还原到 SQL Server 2022 实例，因为它们将使用**相同的数据库版本**。\n\n灾难恢复概念是*离线*的，因为在你将数据库从\
  \ Azure SQL 托管实例还原到 SQL Server 2022 并完成恢复和运行之前，你的 SQL Server 2022 应用程序将处于停机状态。\n\
  \n让我们通过一个练习来看看 Azure SQL 托管实例的链接功能如何用于离线灾难恢复。\n\n本练习基于我们文档中的步骤，文档地址为 `https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-feature-overview#use-the-link-feature`。在这个练习中，我们将使用\
  \ SSMS 来执行复制和故障转移的步骤。从该文档页面你也可以看到使用 T-SQL 和 PowerShell 执行相同过程的步骤。阅读这些内容以了解复制和故障转移在后台如何工作可能会很有趣。\n\
  \n我要亲自感谢 Microsoft 的 Dani Ljepava 和 Mladen Andzic。他们在帮助我创建这些练习方面发挥了重要作用。\n\n####\
  \ 先决条件\n\n*   使用你的 Azure 订阅部署一个 Azure SQL 托管实例。你可以在我们的文档中查看快速入门指南：`https://docs.microsoft.com/azure/azure-sql/managed-instance/instance-create-quickstart`。部署托管实例时，请务必选择与你的源\
  \ SQL Server 排序规则相匹配的排序规则。你可以使用 T-SQL 语句 `SELECT SERVERPROPERTY(N'Collation')` 检查你的\
  \ SQL Server 排序规则。同时记下你创建的 SQL 管理员帐户，因为你需要它通过 SSMS 登录到托管实例。\n*   一个带有容器的 Azure 存储帐户，用于存储托管实例的数据库备份。请使用此文档页面作为在\
  \ Azure 中创建存储帐户的快速入门指南：`https://docs.microsoft.com/azure/storage/common/storage-account-create`。使用此快速入门页面在你的存储帐户中创建容器：`https://docs.microsoft.com/azure/storage/blobs/storage-quickstart-blobs-portal#create-a-container`。\n\
  *   一台至少有两个 CPU 和 8GB 内存的虚拟机或计算机。链接功能同时支持 Windows 和 Linux。本章中的练习将向你展示在 Windows 上使用链接功能的说明。\n\
  *   具有数据库引擎功能的 SQL Server 2022 评估版。\n*   SQL Server Management Studio (SSMS)。最新的\
  \ 18.x 或 19.x 版本均可使用。\n*   你需要 SQL Server 和 Azure 之间的网络连接。如果你的 SQL Server 运行在本地，请使用\
  \ VPN 链接或 ExpressRoute 专线。如果你的 SQL Server 运行在 Azure 虚拟机上，请将你的虚拟机部署到与托管实例相同的子网，或者使用全局\
  \ VNet 对等互连来连接两个独立的子网。在本练习中，我为 SQL Server 部署了一台 Azure 虚拟机，并将其与 Azure SQL 托管实例放在同一个子网中。这是测试此功能最快的方式。如果你需要其他选项，可能需要获取一些关于\
  \ Azure 网络的帮助。Azure 网络的完整指南可在 `https://docs.microsoft.com/azure/networking` 获取。\n\
  *   将 WideWorldImporters `Standard` 示例备份从 `https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak`\
  \ 下载到你将运行 SQL Server 的机器上。使用 `Standard` 备份是因为它不包含内存优化表，如果你为托管实例选择了通用目的服务层，内存优化表将不受支持。\n\
  *   从书籍示例的 `ch3_cloudconnected\\milinkdr` 文件夹中获取的脚本副本。\n\n\n\n## 准备环境\n\n首先，您需要做一些准备工作，以便创建到托管实例的链接。完整详细信息请查阅\
  \ [`https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-preparation`](https://docs.microsoft.com/azure/azure-sql/managed-instance/managed-instance-link-preparation)。请仔细阅读这些内容。涉及以下步骤：\n\
  \n- 在主数据库中创建一个主密钥。\n- 为 SQL Server 启用可用性组功能（如果尚未启用）。\n- （可选但推荐）启用启动跟踪标志以提升性能。\n\
  - 配置 SQL Server 与 Azure SQL 托管实例之间的网络连接。\n- 为端口 `5022`（dbm 端点）开放防火墙和 Azure 网络安全组（NSG）设置。\n\
  - 如果您的 SQL Server 数据库使用了透明数据加密（TDE），则需要将证书迁移到托管实例，以便链接该数据库。\n\n## 创建链接以复制数据库\n\n\
  现在，让我们逐步介绍如何使用 SSMS 中的向导创建到托管实例的链接，以复制 SQL Server 上的数据库：\n\n![Images/525217_1_En_3_Fig4_HTML.png](img/525217_1_En_3_Fig4_HTML.png)\n\
