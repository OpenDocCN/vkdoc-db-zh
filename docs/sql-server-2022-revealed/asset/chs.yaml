  ### 10. 观察 DOP 反馈


  当脚本完成后，你可以使用 Extended Events 的实时数据观察 DOP 反馈。你应该会看到一系列类似于图 5-20 的事件。


  在 SSMS 的 **实时数据查看器** 中，你可以向默认视图添加列以查看反馈的顺序（右键单击 **详细信息** 窗格中的任意字段，然后选择 **在表中显示列**）。随着时间的推移，你会看到
  **`feedback_dop`** 值降低，以及查询的经过时间和 CPU 时间减少。你还可以看到验证的迭代，其 `feedback_state` 为 `PendingValidationTest`
  和 `Stable`。每当达到 `Stable` 状态时，反馈就会持久保存到 **查询存储** 中。


  让我们关注最后两个事件，如图 5-21 所示。


  ![DOP 反馈验证和稳定化事件。](img/525217_1_En_5_Fig21_HTML.png)


