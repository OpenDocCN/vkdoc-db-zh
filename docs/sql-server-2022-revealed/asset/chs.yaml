- "# SQL Server 2022 简介\n\n既然您已经了解了 SQL Server 2022 的发布历程和“幕后故事”，让我们来概览一下 SQL Server\
  \ 2022 包含哪些内容，为本书后续章节做好铺垫。\n\n## 基于坚实基础构建\n\n我在 2018 年和 2019 年环游世界，在大型活动和直接面向客户宣讲\
  \ SQL Server 2019 时，学到了一点：我忘了谈论之前的版本以及 SQL Server 2019 的基础。\n\n![](img/525217_1_En_1_Fig6_HTML.png)\n\
  \n一幅题为“SQL Server 下一步”的图解。它包含了 SQL Server 2016、2017 和 2019，以及各年份对应的 SQL 功能。\n\n\
  图 1-6. 先前 SQL Server 版本的主要功能\n\n与我交谈的客户甚至尚未使用 SQL Server 2016，也不知道诸如 `查询存储`、`PolyBase`、`始终加密`\
  \ 或 `智能查询处理` 等功能。这不是他们的错，而是我的错，因为我没有更广泛地宣传 SQL Server 2016 和 2017。SQL Server 的版本是累积性的，因此您在本书中学到的关于\
  \ SQL Server 2022 的一切，都包含了如图 1-6 所示的功能。*《SQL Server 2019 揭秘》* 可以让您深入了解 SQL Server\
  \ 2019 的内容，当您升级到 SQL Server 2022 时也能获得这些功能。更重要的是，我们在 SQL Server 2022 中构建的新功能是作为对这些现有功能的\
  \ `增强`，或以新颖创新的方式加以运用。了解这一背景后，让我们来看看 SQL Server 2022 主要的 `新` 增强功能。\n\n## 能力之轮\n\n\
  2019 年，我为 SQL Server 2019 的演示文稿制作了一张带有“象限”的幻灯片，以展示该版本的主要功能。（您可以在 *《SQL Server 2019\
  \ 揭秘》* 的第一章中看到这张幻灯片。）在宣讲 SQL Server 2019 几次后，我开始称它为我的“相机幻灯片”。这是因为每当我在活动上展示它时，每个人都会拍照（这让我感到非常谦卑）。但其理念是一致的：创建一张捕捉该版本主要功能的幻灯片。\n\
  \n对于 SQL Server 2022，我做了类似但有所不同的东西。图 1-7 展示了我称之为“能力之轮”的图解。\n\n![](img/525217_1_En_1_Fig7_HTML.png)\n\
  \n一幅 SQL Server 2022 功能图解。它由中心的 SQL Server 2022 组成，连接着扩展 T-SQL、云连接、内置查询、安全和数据虚拟化等功能。\n\
  \n图 1-7. SQL Server 2022 “能力之轮”\n\n“虚线”表示 SQL Server 可以连接到服务器或虚拟机外部源的领域。并非每个领域的投入程度都相同，但这为我们的功能提供了一个很好的分类。当您阅读本书后续章节时，您会看到有几章就是围绕着这个轮子的“辐条”组织的。\n\
  \n## 云连接\n\n云连接代表了一系列功能，能够以前所未有的新颖且令人兴奋的方式将 SQL Server 连接到 Azure。这些云连接功能使 SQL Server\
  \ 2022 在 `混合计算` 领域占据了独特地位。您将在本书第 3 章中详细了解这些功能的细节。以下是亮点：\n\n- **Azure SQL 托管实例链接功能**\n\
  \  利用内置的分布式可用性组的强大功能，您现在可以使用 Azure SQL 托管实例进行灾难恢复。Azure SQL 托管实例是一种平台即服务 (`PaaS`)\
  \ 形式的托管 SQL 实例。您将能够在 SQL Server 2022 和 Azure SQL 托管实例之间来回进行故障转移。此功能的首次迭代采用离线方法（备份和还原），完全在线的故障转移将在未来推出。\n\
  - **SQL Server 2022 的 Synapse Link**\n  使用您的 SQL Server 2022 实例将操作数据库更改馈送到 Synapse\
  \ Analytics，以进行近实时分析。这是减少对 `ETL` 应用程序需求并利用 Synapse 的强大功能将 SQL Server 数据与其他数据源结合以支持分析的绝佳解决方案。\n\
  - **Microsoft Purview 策略管理**\n  大规模管理 SQL Server 资源的身份验证和访问权限可能既繁琐又容易出错。Microsoft\
  \ Purview 允许您从中心位置发布 `策略`，以管理对 SQL Server 或任何 Azure SQL 虚拟机、实例或数据库的访问。Microsoft\
  \ Purview 依赖于 Azure Active Directory (`AAD`) 身份验证，该验证现在也可用于 SQL Server 2022。\n\n\
  ## 内置查询智能\n\n在 SQL Server 2016 中，我们引入了 `查询存储` 来捕获数据库中的关键性能信息。在 SQL Server 2017 中，我们增强了引擎中的查询处理器\
  \ (`QP`)，帮助您在不更改代码的情况下获得更快的性能。在 SQL Server 2019 中，我们通过添加更多查询处理器场景提升了水平，并将其命名为 `智能查询处理`\
  \ (`IQP`)。\n\n在 SQL Server 2022 中，我们默认启用了 `查询存储`，增加了对只读副本的支持，并引入了提示来影响查询计划。我们为 `下一代`\
  \ `智能查询处理` 构建了一套新的增强功能，包括一些与 `查询存储` 协同工作的功能。\n\n这是 SQL Server 2022 最令人兴奋的投资领域之一，您将在本书第\
  \ 4 章和第 5 章中全面了解。\n\n## 经行业验证的数据库引擎\n\n如果没有一个经过行业验证的数据库引擎，我们就没有产品。而如果我们不在每个版本中投入于安全性、可扩展性和可用性，我们就没有引擎。我称此为\
  \ SQL Server 的“基本要素”。您将在本书第 6 章中读到许多此类功能，但这里列举一些亮点：\n\n- **SQL Server 账本功能**\n \
  \ 区块链技术可以提供防篡改的更改“账本”，但传统上是在分布式系统中实现的。SQL Server 2022 包含将数据库表声明为 `账本表` 的能力，以提供内置的、防篡改的更改记录。\n\
  - **系统页闩锁并发**\n  自 SQL Server 成为产品以来，`系统页闩锁并发` 一直是使用 `tempdb` 的工作负载的一个主要痛点。我们通过指导用户如何为\
  \ `tempdb` 创建多个文件，并在 SQL Server 2019 中引入 `tempdb` 元数据优化和并发 `PFS` 更新等功能，逐步缓解了这个问题。在\
  \ SQL Server 2022 中，我们进一步提高了需要访问其他系统页的操作的并发性。我个人认为我们可能已经实现了 `tempdb` 的“免手动”管理，但您需要亲自体验。\n\
  - **包含可用性组**\n  我们的客户经常要求的功能现在已成为现实。您现在可以创建 `包含可用性组`，我们会将实例级对象（如 `SQL Server 代理`\
  \ 作业、链接服务器和登录名）复制到辅助副本。\n\n\n\n### 数据虚拟化与对象存储\n\n在 SQL 2016 中，我们引入了一个称为 `Polybase`\
  \ 的概念。最初的想法是使用 T-SQL 来访问 Hadoop 系统中的非关系型文件格式，而无需移动数据。在 SQL Server 2019 中，我们将这个概念扩展到支持诸如\
  \ Oracle、Teradata、MongoDB 和通过 ODBC 驱动连接的 SQL 等数据源。SQL Server 现在可以成为数据虚拟化的 `data\
  \ hub`。\n\n在 SQL Server 2022 中，我们引入了一种新方法，通过使用相同的 T-SQL 结构来访问其他数据，但在底层使用 REST API\
  \ 来访问连接器，如 `S3`、Azure Data Lake 和 Azure Blob Storage。此外，我们增加了对常见文件格式（包括 parquet\
  \ 和 delta tables）的原生识别支持。\n\n与此功能相关但不依赖于它的是，能够将数据库执行 `native backup and restore`\
  \ 到 `S3 compatible` 的 `object storage` 系统中。这为存储 SQL 备份打开了更多选择，而不仅仅是通过 URL 的磁盘或 Azure\
  \ Blob Storage。我想你会对我如何使用此功能从 AWS RDS 迁移到 SQL Server 感兴趣。\n\n你将在本书的第 7 章中了解更多关于数据虚拟化和对象存储的细节。\n\
  \n### 为开发人员增强 T-SQL\n\nSQL Server 仍然为开发人员提供了一些最佳的接口和功能。T-SQL 语言对于访问或操作数据的几乎所有场景都非常丰富。我们有一个传统，即使用\
  \ T-SQL 语言来访问我们构建的任何新功能。\n\n在 SQL Server 2022 中，我们延续了这一传统，通过增强 T-SQL 函数以处理 `JSON`\
  \ 格式的数据，基于开发人员反馈和 ANSI 兼容性添加新的和增强的 `T-SQL functions`，并将处理来自 Azure SQL Edge 的 `time\
  \ series` 数据的 T-SQL 函数引入到 SQL Server 2022 引擎中。\n\n你将在本书的第 8 章中看到所有这些 T-SQL 增强功能的示例。\n\
  \n## 开始使用 SQL Server 2022\n\n你现在已阅读了关于 SQL Server 2022 可能性的概述，并知道本书的后续章节将帮助你学习“力量之轮”这些领域的细节。你可能会问，“我如何获取并开始使用它？”\n\
  \n### 如何获取 SQL Server 2022\n\n除了通过常规许可渠道获取 SQL Server，你还可以从 [`https://aka.ms/getsqlserver2022`](https://aka.ms/getsqlserver2022)\
  \ 下载 SQL Server 2022 的 Developer 或 Evaluation Edition。\n\n本书的第 9 章向你展示如何下载 SQL Server\
  \ 容器镜像或 SQL Server Linux 发行版。\n\n另一种获取 SQL Server 2022 的方法是使用 Azure 虚拟机的市场镜像。本书的第\
  \ 10 章涵盖了在 Azure 中获取和部署 SQL Server 2022 的所有细节。\n\n### 安装 SQL Server 2022\n\nSQL\
  \ Server 2022 的设置和安装过程与过去的版本相同，只有一些微小的变化。要了解如何安装和部署 SQL Server 2022，请访问 [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022)。本书的第\
  \ 2 章提供了更多关于如何在 Windows 上安装和升级到 SQL Server 2022 的细节。本书的第 9 章涵盖了如何使用容器镜像、在 Linux\
  \ 发行版上以及在 Kubernetes 集群上安装 SQL Server 2022 的细节。本书的第 10 章涵盖了如何在 Azure 虚拟机上安装 SQL\
  \ Server 的细节。\n\n### 了解所有功能与版本\n\n虽然本书全面介绍了 SQL Server 2022，但你可能还想查阅我们的文档以了解新功能和示例。此外，我们的文档总是列出每个\
  \ SQL Server 版本（如 Enterprise 或 Standard）所启用的确切功能集。使用链接 [`https://aka.ms/sqlserver2022docs`](https://aka.ms/sqlserver2022docs)\
  \ 查看 SQL Server 2022 文档的最新版本。\n\n### 了解定价与许可\n\n我有时会收到关于 SQL Server 许可的问题，我相信 SQL\
  \ Server 2022 也不例外。然而，与其尝试解释许可的所有细微差别，最好的参考资料是我们关于定价和许可的文档，地址是 [`https://aka.ms/sqlserver2022licensing`](https://aka.ms/sqlserver2022licensing)。\n\
  \n### 获取 SQL Server 2022 培训\n\n与 SQL Server 2019 和 Azure SQL 一样，你可以通过我们的 workshop\
  \ 了解更多关于 SQL Server 2022 的知识。使用我们的主要 workshop 站点 [`https://aka.ms/sqlworkshops`](https://aka.ms/sqlworkshops)，或直接访问\
  \ SQL Server 2022 workshop [`https://aka.ms/sql2022workshop`](https://aka.ms/sql2022workshop)。我们还计划了一个\
  \ Microsoft learning path，地址是 [`https://aka.ms/learnsqlserver2022`](https://aka.ms/learnsqlserver2022)。\n\
  \n我也自称是一个开源演讲者，所以你可以在 [`https://aka.ms/sqlserver2022decks`](https://aka.ms/sqlserver2022decks)\
  \ 找到我和其他人制作的所有演示文稿。\n\n### 通过我们的博客系列深入了解\n\n通过我们 Microsoft 项目经理的博客系列深入了解每个 SQL Server\
  \ 2022 功能，地址是 [`https://aka.ms/sqlserver2022blogs`](https://aka.ms/sqlserver2022blogs)。\n\
  \n### 下载本书代码与示例\n\n你可以从本书引言中列出的 GitHub 仓库下载本书所有示例的代码和脚本。与我写的其他书一样，你也可以在 [`https://aka.ms/sql2022bookexamples`](https://aka.ms/sql2022bookexamples)\
  \ 找到代码、脚本以及本书的任何勘误。\n\n\n\n## 云连接、智能且经行业验证的数据平台\n\n我常将 SQL Server 2019 称为现代化数据平台，因为该版本的功能远不止数据库引擎所提供的。SQL\
  \ Server 2019 提供了构建数据平台所需的能力，包括数据虚拟化、强大的引擎以及机器学习服务。\n\nSQL Server 2022 将混合数据平台提升到了新的高度。它以前所未有的创新方式，按照您自己的条件连接到云。SQL\
  \ Server 2022 内置查询智能，解决了您和开发人员当前面临的一些最常见且代价高昂的查询调优问题。并且，SQL Server 2022 配备了经过行业验证的数据库引擎，在安全性、可扩展性、可用性、数据虚拟化方面进行了创新，并对世界上最流行的数据库语言\
  \ `T-SQL` 进行了增强。\n\n我们的 SQL Server 首席集团项目经理 Ajay Jagannathan 分享了他的看法：\n\n> 这是一个特别的\
  \ SQL Server 版本。在为每个主要版本的 SQL Server 进行规划时，我们都会投入大量精力来审视定义该版本的几个关键主题。这包括行业领先的创新、云原生以及任务关键型功能，最重要的是客户和社区的反馈。这帮助我们将\
  \ SQL Server 打造成了地球上最流行的商业关系型数据库。对于 SQL Server 2022，让这个版本通过引入一些最新创新（如托管实例的 Link\
  \ 功能、通过 Azure Synapse Link 进行近实时分析以及通过 Microsoft Purview 进行治理），成为微软智能数据平台不可或缺的一部分，是至关重要的。不仅如此，我们的客户还将能够利用\
  \ SQL Server 行业领先的任务关键型能力的进步，这些进步涵盖了围绕 T-SQL 语言、智能查询处理、性能、安全性、可用性和可扩展性等备受期待的主题。并且，通过成为第一个开箱即用支持\
  \ Azure Arc 的版本，我们的客户可以在任何地方，在他们选择的环境中，通过混合和多云部署来利用 Azure 的优势。我不仅为整个 SQL Server\
  \ 产品团队将此版本交付给我们的客户、合作伙伴和社区所完成的工作感到自豪，而且我的好友兼同事 Bob Ward 在这本书中也做得非常出色，帮助深入探讨产品的多个领域，并为读者简化内容。阅读本书将使热情的\
  \ SQL Server 用户清晰地理解这些功能，并有能力在其环境中最大化利用这些功能。我迫不及待地希望我们的客户开始使用 SQL Server 2022，并聆听他们利用这些功能解决业务问题的所有精彩场景。\n\
  \n如果您想了解更多关于 SQL Server 2022 的安装和升级体验，可以从第 2 章开始您的旅程。\n\n**注意**\n对于那些安装 SQL Server\
  \ 的老手来说，安装程序变化不大，因此如果您想安装 Windows 版的 Developer Edition 并直接跳到第 3 章开始学习，请直接开始吧！安装中有一个方面会启用一些云连接功能，因此您可能需要先在第\
  \ 2 章中了解更多相关信息。请记住，使用容器镜像、Linux 和 Kubernetes 安装 SQL Server 的部署指南在第 9 章，如何通过 Azure\
  \ 虚拟机部署的详细信息在第 10 章。\n\n"
- "# 2. 安装与升级\n\n您首先想做的事情之一就是安装 SQL Server 2022，以便探索它所提供的所有优秀功能。对于任何熟悉 SQL Server\
  \ 的人来说，好消息是 SQL Server 2022 的安装体验与之前的版本基本相同，只有一些微小的改变。\n\n如果您是经验丰富的 SQL Server 用户，在本章中您可以回顾\
  \ SQL Server 2022 的不同之处。如果您是 SQL Server 的新手，也不必担心。首先，安装过程极其简单，我们的用户体验会引导您完成整个过程。其次，如果您需要一个“分步”流程，请直接访问我们的文档\
  \ [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022)。\n\n\
  ## 如何安装 SQL Server 2022\n\n您可能习惯于通过安装免费的 Developer 或 Evaluation 版 SQL Server 来开始评估该产品。SQL\
  \ Server 2022 支持这两种版本，所以如果您只想直接开始，请访问 [`https://aka.ms/getsqlserver2022`](https://aka.ms/getsqlserver2022)\
  \ 并开始测试！\n\n我知道有些人希望在“直接获取二进制文件”之前了解更多关于 SQL Server 安装的信息。在本章的这一部分，我将回顾安装 SQL Server\
  \ 的先决条件，并讨论与之前版本的差异以及部署选项。\n\n本章这一部分重点介绍在 Windows 上安装 SQL Server。本章后面标题为“在其他平台上部署”的部分将讨论在\
  \ Linux、容器、Kubernetes 和 Azure 上的安装。在这些平台上部署的详细信息可以在本书的第 9 章和第 10 章中找到。\n\n### 先决条件\n\
  \n在 Windows 上安装 SQL Server 2022 的先决条件（包括所需资源）与之前的 SQL Server 主要版本相比没有变化，除了我们支持的特定\
  \ Windows 操作系统版本或 Linux 发行版。和过去一样，我们将支持“官方”支持的 Windows Server 和 Windows（客户端）版本，包括所需的任何特定\
  \ Windows 更新。请查阅 [`https://docs.microsoft.com/sql/sql-server/sql-server-2022-release-notes`](https://docs.microsoft.com/sql/sql-server/sql-server-2022-release-notes)\
  \ 上的 SQL Server 2022 发行说明，了解 SQL Server 2022 先决条件的任何可能变更。\n\n与之前版本的 SQL Server 相比，先决条件的一个不同之处是需要连接到\
  \ Azure 以支持一些新的*云连接*场景。最重要的要求是，如果您在安装过程中选择设置 Azure 连接的场景，您将需要一个 Azure 订阅和一个服务主体。\n\
  \n**注意**\n一些云连接场景，如托管实例和 Synapse Link，在安装过程中不需要任何特殊步骤。而像 Azure Active Directory\
  \ (`AAD`) 和 Microsoft Purview 集成这样的新功能则需要此配置。\n\n我将在本章后面标题为“为 SQL Server 设置 Azure\
  \ 扩展”的部分描述此要求的确切步骤。我还将在本书第 3 章更详细地介绍 SQL Server 如何连接到 Azure。\n\n要查找在 Windows 上安装\
  \ SQL Server 2022 所需的所有确切资源要求，请查阅文档 [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022)。\n\
  \n\n### SQL Server 2022 有何不同？\n\n在 Windows 上使用“向导”安装 SQL Server 2022 与安装以前版本的 SQL\
  \ Server 非常相似。因此，我不会向你展示“逐屏”体验。完整步骤请参见 [`https://aka.ms/deploysqlserver2022`](https://aka.ms/deploysqlserver2022)。\n\
  \n> 注意\n> 我可以自夸地说，我安装和卸载 SQL Server 2022 的次数可能比世界上任何人都多。老实说，从 2021 年 11 月到 2022\
  \ 年 11 月，我已经数不清安装和卸载了多少次 SQL Server 2022。可能只有我们在微软的自动化测试能胜过我！\n\n相反，我将讨论与之前版本的差异。让我们从运行\
  \ SQL Server 安装程序的角度来看看这些差异。\n\n#### SQL Server 的 Azure 扩展\n\n在选择功能之前，你将看到的第一个选项是\
  \ SQL Server 的 Azure 扩展。SQL Server 的 Azure 扩展功能代表运行在安装了 SQL Server 的计算机或虚拟机上的软件，用于将其连接到\
  \ Azure。此扩展的功能并非新功能，它通过 `Azure Arc–enabled SQL Server` 提供（你可以在 [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview)\
  \ 阅读更多内容）。你仍然可以使用文档中的方法将 SQL Server 2022 连接到 Azure。我们只是将其作为 SQL Server 安装程序的集成部分提供了一种实现方法。\n\
  \n这是一个很大的主题，因此要了解有关先决条件以及如何填写此功能信息的更多信息，请参阅本章后面的标题为 `设置 SQL Server 的 Azure 扩展` 的部分。\n\
  \n#### 功能差异\n\n在安装过程中选择功能时存在一些差异，主要涉及被移除的功能。你可以通过查看图 2-1 中的 SQL Server 2019 安装功能选择以及我已突出显示现已移除的功能来查看这些差异。\n\
  \n![](img/525217_1_En_2_Fig1_HTML.png)\n\nSQL Server 2019 的截图。实例功能中的 Python、Java\
  \ 连接器、机器学习服务器和分布式重放客户端被突出显示。\n\n图 2-1\n\nSQL Server 2019 安装功能，其中被移除的功能已突出显示\n\n\
  图 2-2 显示了安装程序中现在可用的功能列表更短了。\n\n![](img/525217_1_En_2_Fig2_HTML.png)\n\nSQL Server\
  \ 2022 的截图。功能选择文件下是为 SQL Server 2022 选择的实例功能列表。\n\n图 2-2\n\nSQL Server 2022 功能选择\n\
  \n让我们进一步看看从 SQL Server 2022 中移除的功能。\n\n#### 移除 R、Python 和 Java\n\n在 SQL Server 2016、2017\
  \ 和 2019 中，我们包含了安装 R、Python 和 Java 的开源运行时包作为机器学习服务和语言扩展功能的一部分。虽然这对许多人来说很方便，但我们发现许多使用此功能的客户希望使用他们自己的运行时包。我们还必须弄清楚如何更新我们安装的开源包。因此，我们认为在安装程序中继续安装这些包没有意义。在\
  \ SQL Server 2022 中，我们在安装程序中不再提供这些包作为选项。如果你想使用机器学习服务或语言扩展，你仍然必须在安装程序中选择此功能。\n\n\
  相反，你可以安装自己的包。有关 R 和 Python 的入门，请参阅 [`https://docs.microsoft.com/sql/machine-learning/install/sql-machine-learning-services-windows-install`](https://docs.microsoft.com/sql/machine-learning/install/sql-machine-learning-services-windows-install)\
  \ 的文档。对于 Java 语言扩展，你可以从 [`https://docs.microsoft.com/sql/language-extensions/install/windows-java`](https://docs.microsoft.com/sql/language-extensions/install/windows-java)\
  \ 开始。\n\n#### 移除基于 Java 的 Polybase Hadoop 连接\n\n在 SQL Server 2016 中，我们引入了 Polybase\
  \ 的概念，即使用 T-SQL 查询“其所在位置”的不同格式和存储中的数据的能力。原始设计将 T-SQL 语句转换为 Java 代码以查询 Hadoop 系统中的文件。这具有革命性，但特定于\
  \ Hadoop 系统的连接从未在广大客户中真正流行起来。\n\n在 SQL Server 2022 中，我们已停止提供此功能以及 Polybase 横向扩展组。你可以在\
  \ [`https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics/`](https://cloudblogs.microsoft.com/sqlserver/2022/02/25/the-path-forward-for-sql-server-analytics/)\
  \ 阅读有关停止支持基于 Java 的 Polybase 到 Hadoop、横向扩展组和大数据群集的更多信息。然而，Polybase 的概念仍然存在并运行良好。你将在本书第\
  \ 7 章中看到使用 REST API 的 Polybase 新实现。\n\n> 重要提示\n> 为了使用 Polybase REST API，你需要选择“Polybase\
  \ 外部数据查询服务”功能。这将安装 Polybase 服务。Polybase REST API 不使用这些服务，而是直接内置在引擎中。但是，目前你必须选择此功能才能启用支持\
  \ Polybase REST API 的配置选项。用于 ODBC 驱动程序的 Polybase 服务也需要你选择此功能并且确实使用了 Polybase 服务。\n\
  \n#### 移除机器学习服务器\n\n在 2022 年夏天，我们宣布了机器学习服务器的退役，并声明它将不再作为下一个版本 SQL Server 的功能。因此，在\
  \ SQL Server 2022 安装程序中它不是一个功能选项。你可以在 [`https://docs.microsoft.com/lifecycle/announcements/microsoft-machine-learning-server-retiring`](https://docs.microsoft.com/lifecycle/announcements/microsoft-machine-learning-server-retiring)\
  \ 阅读更多关于此退役声明的信息。\n\n#### 移除分布式重放\n\n分布式重放是一个重放 SQL Profiler 跟踪的工具，已在产品中存在多年。我们决定将此功能从\
  \ SQL Server 安装中解绑，并将以单独的下载包形式提供。我向本书的读者坦率地说，我们已经很长时间没有增强此功能了。\n\n#### 内存建议\n\n\
  过去，我们在安装程序中引入了为 SQL Server 实例配置 `最大服务器内存` 的能力，其中包括*建议*值。`最大服务器内存` 的建议值来自我们的文档 [`https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options`](https://docs.microsoft.com/sql/database-engine/configure-windows/server-memory-server-configuration-options)。\n\
  \n我们已经确定我们之前计算得不太正确，并且我们已经在 SQL Server 2022 安装程序中更新了方法。请注意，在我看来这个建议非常保守，所以在使用它时要小心。`最大服务器内存`\
  \ 的计算方式是运行安装程序时*可用*空闲内存的约 75%。我们这样设计是为了适用于许多不同的工作负载和配置。同样重要的是要注意，此建议不考虑其他 SQL 实例，因此如果你在同一服务器上运行多个\
  \ SQL 实例，则需要仔细考虑每个实例的 `最大服务器内存` 值。\n\n\n## 其他安装方法\n\nWindows 上的 SQL Server 安装程序仍然支持通过命令行进行无用户界面选项安装。你可以找到相关示例并查看所有选项，地址是\
  \ [`https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt`](https://docs.microsoft.com/sql/database-engine/install-windows/install-sql-server-from-the-command-prompt)。SQL\
  \ Server 2022 的唯一区别在于：如本章前文所述，移除了已停止使用功能的选项，并添加了支持 `Azure extension for SQL Server`\
  \ 的新参数。\n\n如果你是初次设置 SQL Server，需要知道 SQL Server 评估版和开发版附带了一个“简易安装”模式，其安装程序会直接安装默认组件，无需经过任何设置界面。如果你选择此方法，则不会选中\
  \ `Azure extension for SQL Server` 功能。如果你想要使用评估版或开发版的完整安装体验，请从初始设置界面选择 `Custom`\
  \ 选项。\n\n## 设置 Azure extension for SQL Server\n\n2020 年，我们宣布了一项名为 `Azure Arc–enabled\
  \ SQL Server` 的 SQL Server 新混合功能。其理念是将现有的 SQL Server 安装连接到 Azure，以提供新功能，例如在 Azure\
  \ 门户中查看实例详情、使用 `Microsoft Defender` 以及进行最佳实践评估。使用 `Azure Arc` 设置 SQL Server 的过程是通过\
  \ Azure 门户或脚本完成的。SQL Server 2022 在安装过程中提供了一种集成方法来安装此功能，通过一个名为 `Azure extension for\
  \ SQL Server` 的安装功能实现。\n\n`Azure extension for SQL Server` 为 SQL Server 2022 提供以下功能：\n\
  \n*   `Microsoft Defender` for SQL\n*   `SQL Assessment`（你可以在 [`https://docs.microsoft.com/sql/sql-server/azure-arc/assess`](https://docs.microsoft.com/sql/sql-server/azure-arc/assess)\
  \ 阅读更多相关内容）\n*   在 Azure 门户中查看已连接的 SQL Server 以及其他的 Azure SQL 资源\n*   `Azure Active\
  \ Directory (AAD)` 身份验证\n*   `Microsoft Purview` 中的访问策略（`Purview` 集成需要 `AAD`，而 `AAD`\
  \ 也需要 `Azure extension for SQL Server`）\n\n你将在本书的第 3 章了解更多关于这些功能的内容。我将在本书的第 11 章进一步描述\
  \ `Azure Arc–enabled SQL Server` 的作用。仅仅将 SQL Server 连接到 Azure 不会产生任何费用。只有当你选择了某些服务，例如\
  \ `Microsoft Defender` 或 `Purview` 时，才会产生订阅费用。\n\n注意\n\n在 Azure 虚拟机上运行 SQL Server\
  \ 时，不支持 `Azure extension for SQL Server`。SQL Server 使用 `Infrastructure-as-a-Service\
  \ (IaaS) Agent Extension` 来提供诸如 `Defender`、评估和 `AAD` 身份验证等功能。你可以在 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/sql-server-iaas-agent-extension-automate-management)\
  \ 阅读更多关于 `IaaS Agent Extension` 的信息。\n\n图 2-3 展示了设置 `Azure extension for SQL Server`\
  \ 所需的信息。\n\n![](img/525217_1_En_2_Fig3_HTML.png)\n\nSQL Server 2022 的屏幕截图。其中包含 Azure\
  \ 服务、订阅 ID、资源组、区域、租户 ID 和 Azure 扩展的服务器 URL 等选项。\n\n图 2-3\n\n设置 `Azure extension\
  \ for SQL Server`\n\n我将描述如何用 Azure 信息填写这些字段。在本书示例代码的 `ch2_install` 文件夹中，我提供了一些可以帮助你的示例文件。\n\
  \n### 你首先应该了解什么\n\n在你继续阅读之前，让我先就填写这些字段时会涉及的 Azure 主题，给你一些指导：\n\n*   以下信息假设你拥有一个\
  \ `Azure subscription`（Azure 订阅），并且你的 SQL Server 直接连接到互联网或通过代理连接。如果你没有 `Azure subscription`，请咨询你所在组织。或者你也可以在\
  \ [`https://azure.microsoft.com/get-started/`](https://azure.microsoft.com/get-started/)\
  \ 开始使用。\n*   请阅读 `Azure Role-Based Access Control (RBAC)`（Azure 基于角色的访问控制）的概念。`RBAC`\
  \ 是 Azure 中的一个权限系统，用于授予你在 Azure 中执行某些操作的权限。你可以在 [`https://docs.microsoft.com/azure/role-based-access-control/overview`](https://docs.microsoft.com/azure/role-based-access-control/overview)\
  \ 了解更多关于 `Azure RBAC` 的信息。\n*   你需要检查你在 `Azure subscription` 中的权限，以确保你可以创建一个 `resource\
  \ group`（资源组）以及为 `Azure Arc` 设置自定义权限，或者有能力创建 `custom role`（自定义角色）和 `service principal`（服务主体）。如果这些示例因权限不足而失败，请咨询你的\
  \ `Azure subscription` 管理员。你的 `Azure account`（Azure 账户）或要与 `service principal` 一起使用的\
  \ `custom role` 的权限可以在 [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions)\
  \ 找到。\n*   一个有效的 `Azure Resource Group`（Azure 资源组）。你可能已经有一个想要使用的，或者可以新建一个。你可以使用此文档页面学习如何创建新的\
  \ `resource group`：[`https://docs.microsoft.com/azure/azure-resource-manager/management/manage-resource-groups-portal`](https://docs.microsoft.com/azure/azure-resource-manager/management/manage-resource-groups-portal)。创建\
  \ `resource group` 时，请选择一个支持 `Azure Arc–enabled servers` 的 `Azure region`（Azure\
  \ 区域），其支持列表记录在 [`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#supported-azure-regions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#supported-azure-regions)。\n\
  *   我建议你从 [`https://docs.microsoft.com/cli/azure/`](https://docs.microsoft.com/cli/azure/)\
  \ 安装 `az` 命令行界面（`CLI`），或者使用 `Azure Cloud Shell`（你可以在 [`https://docs.microsoft.com/azure/cloud-shell/overview`](https://docs.microsoft.com/azure/cloud-shell/overview)\
  \ 了解更多）。\n*   如果你决定使用 `service principal`，你将需要在 Azure 中创建一个包含以下权限的 `custom role`：[`https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions`](https://docs.microsoft.com/sql/sql-server/azure-arc/overview#required-permissions)。要学习如何创建\
  \ `custom role`，请前往 [`https://docs.microsoft.com/azure/active-directory/roles/custom-create`](https://docs.microsoft.com/azure/active-directory/roles/custom-create)。\n\
  \n注意\n\n在我位于 Microsoft 的租户中，我没有在 Azure 门户中创建 `custom role` 的权限。但是，我能够使用 `az CLI`\
  \ 创建一个，如 [`https://docs.microsoft.com/azure/role-based-access-control/custom-roles-cli`](https://docs.microsoft.com/azure/role-based-access-control/custom-roles-cli)\
  \ 所述。你可以在本章示例的 `sqlazureext.json` 文件中看到我的示例 JSON 文件。使用此 JSON 文件创建角色的脚本在示例文件 `createcustomrole.ps1`\
  \ 中。\n\n*   如果你决定使用 `service principal`，你可以使用 `az` 命令行界面（`CLI`）为你的订阅和 `resource\
  \ group` 创建一个：[`https://docs.microsoft.com/cli/azure/create-an-azure-service-principal-azure-cli`](https://docs.microsoft.com/cli/azure/create-an-azure-service-principal-azure-cli)。\n\
  \n\n\n你将把服务主体分配给你创建的自定义角色和资源组。你可以参考脚本 `sqlazureextsp.ps1` 中的示例来了解如何操作。\n\n当你使用 CLI\
  \ 创建服务主体时，会得到一个 JSON 格式的结果，其中包含此屏幕所需字段的值。**请务必保存此结果，尤其是密码。** 我将为你展示输出中的每个字段如何与 SQL\
  \ Server 安装功能屏幕上的字段相对应。\n\n生成的 JSON 应该类似于这样：\n```\n{\n\"appId\": \"\",\n\"displayName\"\
  : \"\",\n\"password\": \"\",\n\"tenant\": \"\"\n}\n```\n\n注意：在功能设置屏幕上使用这些值时，不要包含引号。\n\
  \n服务主体在 Azure 中是拥有极高权限的账户。我是在资源组作用域创建的服务主体，但通过自定义角色分配的权限非常高。如果你决定断开连接并从 Azure 中移除\
  \ SQL Server，请务必同时移除该服务主体。\n\n### 为功能设置提供值\n\n创建好这些资源后，你就可以填写图 2-3 中的字段了（除代理服务器\
  \ URL 外，所有这些字段都是必填的）。\n\n#### 检查 SQL Server 的 Azure 扩展\n\n如果你不想安装 SQL Server 的 Azure\
  \ 扩展，可以取消勾选此框。保留勾选状态以安装扩展。请记住，仅设置扩展不会产生任何费用。\n\n#### 登录或服务主体\n\n你可以选择使用订阅中的 Azure\
  \ 登录凭据或服务主体。如果选择 `使用 Azure 登录`，系统将显示一个屏幕，让你根据公司要求使用凭据登录（微软要求 MFA）。登录后，我们会验证你的账户是否有设置扩展的正确权限。然后，我们会自动填充以下字段：\n\
  \n*   `Azure 租户 ID`\n    *   这是与你的账户关联的 Azure Active Directory 的 ID。\n*   `Azure\
  \ 订阅 ID`\n    *   这是你的 Azure 账户的默认订阅 ID。我们将在此订阅下注册你的 SQL Server。你可以从下拉列表中选择不同的订阅。\n\
  *   `Azure 资源组`\n    *   我们将选择你订阅下的一个资源组，用于注册你的 SQL Server。你可以从下拉列表中选择一个不同的资源组。\n\
  *   `Azure 区域`\n    *   我们将从资源组中选择 Azure 区域，但你可以从下拉列表中选择一个不同的区域。\n*   `代理服务器 URL`\n\
  \    *   如果你的 SQL Server 无法直接连接到 Internet，可以可选地填写代理 URL。默认情况下，服务器上随扩展安装的代理将使用出站\
  \ TCP 端口 443 通过 Internet 连接到 Azure 服务。你可以设置代理服务器。如果使用代理服务器，请在此字段中填写代理的 URL。你可以在\
  \ [`https://docs.microsoft.com/azure/azure-arc/servers/manage-agent#update-or-remove-proxy-settings`](https://docs.microsoft.com/azure/azure-arc/servers/manage-agent#update-or-remove-proxy-settings)\
  \ 阅读更多相关信息。**如果未使用代理，请将此字段留空**。\n\n如果你决定使用服务主体，则需要填写在使用自定义角色创建服务主体时收集的信息：\n\n* \
  \  `Azure 服务主体 ID`\n    *   这是创建服务主体时 JSON 结果中的 `appId` 值。\n*   `Azure 服务主体密码`\n\
  \    *   这是 JSON 结果中的 `password` 值。\n*   `Azure 订阅 ID`\n    *   这是你在创建服务主体时作为 `–scopes`\
  \ 参数一部分使用的订阅 ID 值。\n*   `Azure 资源组`\n    *   这是你作为先决条件创建并用于 `–scopes` 参数来创建服务主体的资源组名称。\n\
  *   `Azure 区域`\n    *   你创建资源组所在的 Azure 区域名称。此处的区域名称不应包含空格且应为小写。我的区域是美国东部，所以值应为\
  \ `eastus`。\n*   `Azure 租户 ID`\n    *   这是你在创建服务主体时 JSON 结果中的 `tenant` 值。\n\n在此场景下也可以使用\
  \ `代理服务器 URL`。\n\n接下来会发生什么？\n\n当你点击下一步按钮后，会有几分钟的延迟才能继续。这是为了进行一些连接到 Azure 的验证。在安装过程中，将安装\
  \ Azure Arc 代理和 SQL Server 的 Azure 扩展，以连接并注册到 Azure。安装成功完成后，你可以通过查看已安装的程序看到这些代理，如图\
  \ 2-4 所示。\n\n![](img/525217_1_En_2_Fig4_HTML.jpg)\n\n一个屏幕截图。两个标题为 \"azure connected\
  \ machine agent\" 和 \"Microsoft S Q L server extension\" 的文件及其发布者、大小和版本被突出显示。\n\n\
  图 2-4：Azure Arc 代理和 SQL Server 的 Azure 扩展\n\n此外，`Azure Connected SQL Server Onboarding`\
  \ 角色将自动分配给该服务主体。将 SQL Server 连接到 Azure 需要此角色。\n\n安装日志显示了安装程序执行的 PowerShell 脚本的详细信息（这在\
  \ SQL Server 安装日志的 `details.txt` 文件中）：\n\n\n\n"
