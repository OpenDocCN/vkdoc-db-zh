  \    GO\n    EXEC sp_addsrvrolemember @loginame='annahoffman@aadsqlmi.net', @rolename='sysadmin';\n\
  \    GO\n```\n\n注意新的语法 `FROM EXTERNAL PROVIDER`（我们已经对 Azure SQL Database 和 Azure\
  \ SQL 托管实例提供了支持）。\n\n你现在可以使用这个新登录名，通过 AAD 使用 MFA 或基于密码的身份验证连接到 SSMS。\n\n4.  现在假设另一位同事\
  \ Marisa Mathews 需要作为用户访问特定数据库，但实际上不需要登录名或成为 `sysadmin` 角色的成员。你可以通过 AAD 身份验证来实现。以\
  \ AAD `sysadmin` 登录名连接，执行脚本 `createaaduser.sql`，它使用了以下 T-SQL 语句：\n\n```\n    DROP\
  \ DATABASE IF EXISTS howaboutthemcowboys;\n    GO\n    CREATE DATABASE howboutthemcowboys;\n\
  \    GO\n    USE howboutthemcowboys;\n    GO\n    CREATE USER [marisamathews@aadsqlmi.net]\
  \ FROM EXTERNAL PROVIDER;\n    GO\n```\n\n现在，当你尝试使用此 AAD 账户通过 SSMS 连接时，你需要在 `连接属性`\
  \ 下使用 `连接到数据库` 选项并指定此数据库。该用户将只能访问该数据库，而不是整个实例。这与我们为 Azure SQL Database 提供的功能非常相似。\n\
  \n5.  另一个不错的选项是 AAD 组。假设 Anna 和 Marisa 是一个名为 `sqlusers` 的 AAD 组的成员。以 `sysadmin`\
  \ 登录名连接，你可以执行脚本 `createaadgrouplogin.sql`。该脚本使用以下 T-SQL 语句：\n\n```\n    USE master;\n\
  \    GO\n    CREATE LOGIN [sqlusers] FROM EXTERNAL PROVIDER;\n    GO\n```\n\n不幸的是，像\
  \ `xp_logininfo` 这样的存储过程不适用于 AAD 组，因此要查看成员身份，你需要使用列出 AAD 组的方法。\n\n还有一些其他的语法选项可用于创建登录名和用户，包括\
  \ Azure 应用程序（无密码账户），你可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-setup-tutorial#create-logins-and-users`](https://docs.microsoft.com/en-us/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-setup-tutorial#create-logins-and-users)\
  \ 阅读更多相关信息。\n\n我们甚至支持链接服务器的 AAD 身份验证，你可以在 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-linked-server`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/azure-ad-authentication-sql-server-linked-server)\
  \ 阅读更多内容。\n\n## Microsoft Purview 策略管理\n\n要理解 Microsoft Purview 策略管理的强大功能，让我们看一个场景。你需要雇佣一名在\
  \ SQL Server 性能监控方面技能非常强的顾问。你希望这位顾问能够访问你的 SQL Server，但只能监控与性能相关的动态管理视图 (DMV) 等内容。你不想授予他们完整的\
  \ `sysadmin` 权限。你将在本书的第 6 章了解到，我们为此目的引入了新的固定服务器角色，例如 `##MS_ServerPerformanceStateReader##`。这可以完美满足你的需求。你甚至可以在你的\
  \ Azure Active Directory 中创建一个来宾账户，并基于该账户创建一个 SQL Server 登录名，然后将他们分配到新角色。\n\n那么，如果你需要跨，比如说，50\
  \ 个 SQL Server 实例执行此操作呢？你将需要创建一些脚本来连接所有实例以创建登录名并分配角色。当合同结束时会发生什么？你需要自己创建脚本来在所有实例上删除你先前创建的登录名。\n\
  \n如果你能使用一个中心位置来完成所有这些工作，而无需创建和维护脚本，甚至无需直接创建登录名呢？Microsoft Purview 提供了一个中心治理中心，为包括作为\
  \ Azure Arc 启用的 SQL Server 的 SQL Server 2022 在内的 Azure SQL 资源建立**访问策略**。此外，Microsoft\
  \ 还创建了一些内置策略来匹配某些场景，例如性能监控、安全审计或读取用户表数据。\n\n以下由微软负责 SQL 的 Purview 访问策略首席项目经理 Srdan\
  \ Bozovic 撰写的博客文章 [`https://cloudblogs.microsoft.com/sqlserver/2022/08/11/microsoft-purview-access-policies-for-sql-server-2022/`](https://cloudblogs.microsoft.com/sqlserver/2022/08/11/microsoft-purview-access-policies-for-sql-server-2022/)\
  \ 很好地展示了可能实现的功能。\n\n我询问了 SQL 安全首席集团项目经理 Joachim Hammer 对 Microsoft Purview 为 SQL\
  \ 客户提供哪些价值的看法。他说：\n\n*Microsoft Purview 提供的**全面、统一的数据治理**有助于跨云、应用和设备保护敏感数据，是应对日益增长的安全威胁的重要工具。现已在\
  \ SQL Server 2022 中可用的基于 Purview 的访问策略，与当今数据库管理系统内置的访问控制相比具有两大优势：使用 Purview 易于使用的策略仪表板在一个地方高效地管理数据访问，同时执行规模可扩展到整个数据资产。我们非常自豪能够以基于\
  \ Purview 的访问策略形式，为我们 SQL Server 客户提供强大的、基于云的数据治理，帮助他们治理和保护其所有 SQL Server 数据，无论数据位于何处，从本地到云端。*\n\
  \n让我们深入细节。让我们看看 Purview 访问策略是如何工作的，然后通过一个练习来看看它们的实际操作。\n\n\n### Purview 访问策略如何工作？\n\
  \n与 Synapse Link 类似，您将使用 Azure 中的 Purview 来*设计*构建影响 SQL Server 的策略体验。您将通过一个名为 **Purview\
  \ 治理门户**的工具（我常称之为 Purview Studio）来学习如何操作。\n\n一个策略由以下部分组成：\n\n*   **访问类型**（读取、性能监控等）\n\
  *   一个**数据源**。这将是您要向 Purview 注册的 SQL Server 实例。\n*   一个要授予权限的**主体**。这是一个 Azure Active\
  \ Directory 账户。\n\n您可以为 SQL Server 创建两种类型的 Purview 策略：\n\n*   **数据策略** – 用于支持仅需读取数据（例如构建报表）的用户概念。\n\
  *   **DevOps 策略** – 用于支持*管理员*用户，例如进行性能监控和安全审计。\n\n**注意**\n\n我们将持续在此领域投入并添加更多类型的访问策略，例如数据修改和自助数据访问。自助数据访问允许用户通过已扫描的数据源请求访问权限，并且可以在不创建特定策略的情况下自动完成审批。\n\
  \nPurview 访问策略不仅适用于 SQL Server。Purview 访问策略是 Purview 中一个更广泛概念的一部分，称为**数据使用管理**，您可以在\
  \ `https://docs.microsoft.com/azure/purview/how-to-enable-data-use-management` 阅读更多相关信息。\n\
  \nMicrosoft Purview 访问策略依赖于本章已介绍的三种能力：\n\n*   用于 SQL Server 的 Azure Active Directory\
  \ (AAD) 身份验证。这是因为策略仅支持 AAD 账户。\n*   用于 SQL Server 的 Azure 扩展。此代理用于 AAD 身份验证，也将被\
  \ Purview 用来为 SQL Server 引擎提供连接到 Purview 以提取策略的信息。\n*   构建到 SQL Server 引擎安全系统中的增强功能，以理解如何获取策略信息，并基于该策略允许连接和访问\
  \ SQL Server。\n\n图 3-44 展示了 Purview 访问策略工作原理的架构视图。\n\n![](img/525217_1_En_3_Fig44_HTML.png)\n\
  \n一个 4 步流程图展示了 Microsoft Purview SQL Server 策略架构。步骤从 Azure SQL Server 扩展开始，到 AAD\
  \ 登录结束。\n\n**图 3-44** SQL Server 的 Purview 访问策略架构\n\n让我们进一步了解这些组件：\n\n1.  创建 Purview\
  \ 账户后，您将使用 Azure SQL Server 扩展通过 Azure Arc 支持的 SQL Server 功能来**启用 Purview**（记住，您已经执行此操作以启用首先需要的\
  \ AAD 身份验证）。启用 Purview 时，扩展会将关键信息存储在 Windows 注册表或 `mssql.conf` 文件（Linux）中，以便 SQL\
  \ Server 引擎知道如何与 Purview 通信。\n\n    **注意** 对于 Windows，注册表项是 `Computer\\HKEY_LOCAL_MACHINE\\\
  SOFTWARE\\Microsoft\\Microsoft SQL Server\\MSSQL16.MSSQLSERVER\\MSSQLServer\\PurviewConfig`。这是内部信息，我们不支持您读取或修改这些注册表项。\n\
  \n2.  然后，您将使用 Purview Studio 将您的 Arc 支持的 SQL Server 实例注册到 Purview 并启用数据使用管理。您现在可以为数据和\
  \ DevOps 场景创建策略。\n3.  SQL Server 引擎随后可以从 Purview 拉取策略信息，并将其存储在策略缓存（系统表和内存结构）中。引擎会定期检查策略的更新并更新缓存（或者您可以强制刷新）。\n\
  4.  通过策略授予权限的主体随后可以登录到 SQL Server 并通过 AAD 进行身份验证。然后，引擎可以使用策略缓存来确定该主体在 SQL Server\
  \ 和用户数据库中拥有哪些访问权限。\n\n为了让您更直观地理解，让我们通过一个练习来查看数据策略和 DevOps 策略的示例。\n\n### 使用 Purview\
  \ 访问策略\n\n在本练习中，我将向您展示如何为 Purview 使用两种类型的访问策略：用于读取用户数据的数据策略和用于性能监控的 DevOps 策略。\n\
  \n#### 先决条件\n\n以下是本练习使用 SQL Server 2022 的 Microsoft Purview 访问策略的先决条件。我谨个人感谢来自我们\
  \ Microsoft 工程团队的 Vlad Rodriguez、Srdan Bozovic 和 Nikolas Ogg 帮助我完成这些练习：\n\n*   一台至少有两个\
  \ CPU 和 8GB 内存的虚拟机或计算机。您的虚拟机或计算机需要能够通过互联网连接到 Azure。\n*   您已完成本章前面关于 Azure Active\
  \ Directory (AAD) 身份验证的所有先决条件，并按照本章前面的说明完成了 SQL Server 2022 的 AAD 设置。\n*   您在 Azure\
  \ 订阅中拥有创建 Microsoft Purview 账户的权限。\n*   请注意，在 SQL Server 2022 的预览期间，Purview 数据访问策略仅限于特定的\
  \ Azure 区域。请查阅此文档以获取最新更新：`https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server?branch=release-build-purview-sql-policy#prerequisites`。\n\
  \n\n## 设置 Microsoft Purview 访问策略\n\n![](img/525217_1_En_3_Fig45_HTML.png)\n\n屏幕截图显示了\
  \ Microsoft Purview 访问策略预览选项卡。两个条目显示了应用注册 ID 和 Purview 终结点，上方有一个叠加标题，内容为“您的 Purview\
  \ 账户名称”。\n\n**图 3-45**\n使用 Azure 扩展为 SQL Server 注册 Purview\n\n1.  首先，您需要一个 Microsoft\
  \ Purview 账户。以下是创建 Purview 账户的快速入门指南：[`https://docs.microsoft.com/azure/purview/create-catalog-portal`](https://docs.microsoft.com/azure/purview/create-catalog-portal)。\n\
  2.  您需要在 Purview 中设置一些权限，以便能够创建和发布策略以及启用 DUM。请**仔细**按照此文档中的步骤设置这些权限：[`https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server#configuration`](https://docs.microsoft.com/azure/purview/how-to-policies-data-owner-arc-sql-server#configuration)。\n\
  3.  现在，您需要通过 Azure 门户，使用 SQL Server 的 Azure 扩展注册您的 Purview 账户。在 Azure 门户中找到您为 AAD\
  \ 身份验证创建的 SQL Server – Azure Arc 资源。在左侧菜单中选择 `Azure Active Directory`。在呈现的屏幕底部，您会看到一个名为\
  \ `Microsoft Purview access policies` 的部分。点击 `Enabled`，并通过输入您的 Purview 账户名称来填写 `Microsoft\
  \ Purview Endpoint`，如图 3-45 所示。\n    `App registration ID` 将自动填充。这是与启用 AAD 身份验证时注册的\
  \ Azure 应用程序相关联的 AAD ID。选择此屏幕顶部的 `Save`。成功或失败的状态显示有些奇怪，因为保存成功后此屏幕不会立即消失。\n    完成后，您的屏幕应如图\
  \ 3-46 所示。\n\n![](img/525217_1_En_3_Fig46_HTML.png)\n\n屏幕截图显示了 SQL Server 2022。左侧窗格中选择了\
  \ Azure Active Directory。SQL Server 的服务证书和应用注册由服务管理。基于外部策略的授权已启用。\n\n**图 3-46**\n\
  为 AAD 和 Purview 配置的 Azure Arc–启用的 SQL Server 2022\n\n那么，如何知道是否通过 Azure 扩展在您的 SQL\
  \ Server 上启用了 Purview？一种查看方法是查看门户中 SQL 扩展的详细信息。\n在 Azure 门户的主页上搜索 `Servers – Azure\
  \ Arc`。在 `Services` 下选择 `Servers – Azure Arc`。在此列表顶部选择您的服务器名称。在左侧菜单中，选择 `Extensions`。现在选择\
  \ `WindowsAgent.SqlServer.`。`Status` 消息显示已发送到 SQL Server 上扩展的信息，其外观应类似于图 3-47。\n\
  \n![](img/525217_1_En_3_Fig47_HTML.png)\n\n屏幕截图显示了 windows agent dot sql server。Succeeded\
  \ 状态后跟有状态消息和资源 ID。\n\n**图 3-47**\nAAD 和 Purview 的扩展状态成功\n\n4.  在本练习中，您将需要一些 AAD\
  \ 账户来授权访问。我将为您展示两个不同 AAD 账户的两种场景。对于读取数据的访问，我将使用本章前面在 AAD 身份验证练习中创建的账户 `annahoffman@aadsqlmi.net`。对于性能监控的\
  \ DevOps 练习，我将展示一个 *来宾* AAD 账户的示例。来宾是指不属于您 AAD 但您 *邀请* 其访问 Azure 中资源的账户。您可以在 [`https://docs.microsoft.com/azure/active-directory/external-identities/b2b-quickstart-add-guest-users-portal`](https://docs.microsoft.com/azure/active-directory/external-identities/b2b-quickstart-add-guest-users-portal)\
  \ 阅读更多关于如何在 AAD 中邀请来宾账户的信息。\n5.  在 [`https://docs.microsoft.com/azure/purview/use-azure-purview-studio`](https://docs.microsoft.com/azure/purview/use-azure-purview-studio)\
  \ 学习如何从 Azure 门户启动 Purview Studio 的基础知识。使用您在本章前面为 SQL Server 2022 启用 AAD 身份验证的练习中创建的\
  \ AAD 管理员账户。\n\n\n\n### 使用 Microsoft Purview 访问策略\n\n![一张截图显示了注册源选项卡。其中包含名称、Azure\
  \ 订阅、服务器名称、服务器端点、选择集合和应用程序 ID 等条目。数据使用管理已启用。](img/525217_1_En_3_Fig48_HTML.png)\n\
  \n图 3-48：为 Purview 访问策略注册 SQL Server 数据源\n\n1.  我们需要做的第一件事是将 SQL Server 2022 实例注册为数据源。从\
  \ Azure 门户启动 Purview Studio。选择左侧菜单中的 `数据地图` 图标（将鼠标悬停在图标上可看到“数据地图”）。你的 Purview 帐户可能已经注册了其他数据源，这些数据源可能以可视树或表格形式显示。选择屏幕顶部的\
  \ `注册`。在 `注册源` 屏幕上的 `按关键字筛选` 字段中输入 `Arc`。选择 `Azure Arc 托管服务器上的 SQL Server`，然后选择\
  \ `继续`。\n\n现在，你可以在 `注册源（Azure Arc 托管服务器上的 SQL Server）` 屏幕上选择并填写字段。选择一个名称（我建议与你注册的服务器名称相同）、订阅和服务器名称（你已注册的服务器）。在\
  \ `服务器端点` 字段中输入你已注册的服务器名称，并将 `(Root)` 集合保留为默认值。\n\n为 `数据使用管理` 选择 `已启用` 选项，这应会自动填充\
  \ `应用程序 ID`（这是 SQL Server – Azure Arc 的 Azure Active Directory 屏幕上列出的应用程序注册 ID）。你的屏幕应与图\
  \ 3-48 类似。\n\n选择 `注册`。几秒钟后，你将再次看到数据源列表。选择屏幕顶部的 `刷新` 以确认你的数据源。\n\n> **注意**\n> 如果你想对多个\
  \ SQL Server 实例应用策略，你需要先注册每一个实例。你只需注册一次 SQL Server 数据源，即可用于任意数量的策略。\n\n2.  现在让我们为另一个\
  \ AAD 帐户创建一个数据策略。我将使用 `annahoffman@aadsqlmi.net` 来授予对我们 SQL Server 实例数据的读取访问权限。对我而言，由于我在\
  \ AAD 的练习中将此帐户创建为了登录名，为了避免混淆，我首先删除了该登录名。结果证明，如果某个登录名与策略使用的是同一个 AAD 帐户，我们将使用登录名和策略权限的*并集*。\n\
  \n> **注意**\n> 在撰写本书时，我们正计划在未来为特定对象（如特定数据库和/或表）添加更精细的读取访问权限。这将需要使用 Microsoft Purview\
  \ 的数据目录功能扫描 SQL Server 实例。\n\n使用 Purview Studio，选择左侧菜单中的 `数据策略` 图标。选择 `数据策略`，然后选择\
  \ `+ 新建策略`。现在，在 `策略类型` 下选择 `访问控制`。\n\n在 `访问控制策略` 上，输入一个名为 `sqlreader` 的名称，描述相同。然后选择\
  \ `+ 新建策略语句`。现在你需要通过一些选择来构建语句：\n\n*   对于 `效果`，选择 `允许`。\n*   对于 `操作`，选择 `读取`。\n*\
  \   对于新屏幕上的 `数据资源`，选择 `数据源类型`，然后选择 `Azure Arc 托管服务器上的 SQL Server`。不要动 `资产`，选择 `继续`。在\
  \ `数据源名称` 下选择你的服务器，然后选择 `添加`。\n\n> **注意**\n> 如果你注册了多个 SQL Server 数据源，你可以在此处将策略应用于其中一个或多个。\n\
  \n*   对于 `主体`，在 `选择主体` 搜索窗口中输入你想要授予读取访问权限的 AAD 帐户，然后选择 `确定`。\n\n你的策略语句应如图 3-49 所示。\n\
  \n![一张截图显示了访问控制策略选项卡。名称和描述字段条目为 s q l reader。策略语句选项卡在底部可见。](img/525217_1_En_3_Fig49_HTML.png)\n\
  \n图 3-49：为 SQL Server 2022 创建读取策略\n\n选择 `保存`。策略保存后，你将在策略列表中看到你的新策略。\n\n![一张截图显示了新策略选项卡。可见策略语句、数据资源路径和\
  \ DevOps 角色窗格，以及用于主体的添加或删除按钮。](img/525217_1_En_3_Fig50_HTML.png)\n\n图 3-50：为 SQL\
  \ 性能监控创建 DevOps 策略。\n\n3.  要使策略生效，我们需要发布它。选择你的策略，然后在屏幕右侧选择 `发布`。选择你的数据源，并在新屏幕底部选择\
  \ `发布`。现在，你应该在屏幕上看到策略的 `发布于` 日期和时间。\n4.  让我们为新帐户创建一个数据库和数据以供读取。以你的默认系统管理员身份，对你的\
  \ SQL Server 2022 实例执行脚本 `howboutthemcowboys.sql`。\n5.  策略不会立即应用。SQL Server 将在轮询间隔定期检查新策略。连接到你的\
  \ SQL Server 2022 以立即应用新策略。执行脚本 `policyrefresh.sql`，该脚本使用以下 T-SQL 语句：\n\n```sql\n\
  -- 强制立即下载最新发布的策略\nUSE master;\nGO\nexec sp_external_policy_refresh reload;\nGO\n\
  ```\n\n> **注意**\n> 当 SQL Server 在服务器启动时从 Microsoft Purview 获取策略信息时，你可能会在 ERRORLOG\
  \ 中看到类似以下的消息：\n>\n> `IMDS resource information. Subscription ID: 4fe118d0-bc41-4d7b-869f-0820c87df124,\
  \ Resource Group: aad-auth-demo-env, Name: SQLSERVER2022.`\n>\n> `[JSONWebTokenService::GetCertificateFromCertificateStoreBySubjectName]\
  \ [AADAuthThumbprint] Thumbprint being used for AAD authentication aRgwszCertificateThumbprint\
  \ 26289598dfe34092c141edc8a319505bdf0882b6`\n>\n> `[CBabylonConfigSubscriber] Purview\
  \ frequency setting changed. New value: 300`\n>\n> `[CBabylonConfigSubscriber] Purview\
  \ policy expiration time changed to 480 mins`\n>\n> `[CBabylonConfigSubscriber]\
  \ Received update to the config settings`\n>\n> `[CBabylonConfigSubscriber] Purview\
  \ frequency setting changed. New value: 300`\n>\n> `[CBabylonConfigSubscriber] Purview\
  \ policy expiration time changed to 480 mins`\n>\n> `[CBabylonConfigSubscriber]\
  \ Registered for setting updates successfully`\n>\n> **有趣的事实**\n> Babylon 是 Microsoft\
  \ Purview 的原始项目名称。\n\n6.  使用你本章前面学到的 SSMS 技巧，使用你为其发布了策略的帐户登录 SSMS（使用 MFA 选项，别忘了勾选\
  \ `信任服务器证书` 选项）。让我们以读者身份检查新权限以确保其生效。执行脚本 `querythecowboys.sql`，该脚本执行以下 T-SQL 语句：\n\
  \n```sql\nUSE howboutthemcowboys;\nGO\nSELECT * FROM tothesuperbowl;\nGO\n```\n\n\
  你应该会返回一行数据（我希望今年是我们的年份<g>）。读取数据的权限包括系统目录视图和有限的动态管理视图 (DMV)。\n\n7.  让我们证明你只有读取权限。执行脚本\
  \ `dropthecowboys.sql`，该脚本执行以下 T-SQL 语句：\n\n```sql\nUSE howboutthemcowboys;\nGO\n\
  DROP TABLE tothesuperbowl;\nGO\n```\n\n你现在应该会得到类似以下的错误：\n\n```\nMsg 3701, Level\
  \ 14, State 20, Line 3\nCannot drop the table 'tothesuperbowl', because it does\
  \ not exist or you do not have permission.\n```\n\n8.  让我们快速查看几个新的动态管理视图 (DMV)，以查看已从\
  \ Microsoft Purview 拉取的策略信息。以系统管理员身份连接到你的 SQL Server 2022 实例，并执行脚本 `policydmvs.sql`，该脚本使用以下\
  \ T-SQL 语句：\n\n\n\n"
- '# 连接 SQL Server 与世界


  如今，SQL Server 已不仅仅连接到 Azure。它与 Azure *深度集成*，为您提供强大的解决方案，如托管式灾难恢复、近实时分析以及集中式安全与治理。这些解决方案中的每一项都要求我们增强
  SQL Server 引擎，以确保您所需的功能能够无缝运行，并与 SQL Server 生态系统协同工作。您无需使用所有这些服务，可以根据需要选择所需的功能。SQL
  Server 混合场景的未来一片光明，对于 Microsoft 和我们的客户而言，这段旅程才刚刚开始。


  ## 使用 Microsoft Purview 实施策略


  ### 探索与策略相关的 DMV


  ```sql

  -- 列出通常受支持的操作

  SELECT * FROM sys.dm_server_external_policy_actions;

  GO

  -- 列出发布到此服务器的策略所包含的角色

  SELECT * FROM sys.dm_server_external_policy_roles;

  GO

  -- 列出角色与操作之间的链接，可用于连接这两者

  SELECT * FROM sys.dm_server_external_policy_role_actions;

  GO

  ```


  `sys.dm_server_external_policy_actions` 的结果显示了策略可以应用的所有可能操作类型。您可以将这些视为数据和 DevOps
  策略所应用的详细权限类型。随着我们提供更多功能，此列表将会扩展。DMV `sys.dm_server_external_policy_roles` 列出了适用于数据和
  DevOps 策略的详细角色，包括读取、性能监控和安全审计。您还会看到一些尚未实施的角色以及适用于所有角色的“连接”角色。随着我们增加更多功能，此列表也会扩展。DMV
  `sys.dm_server_external_policy_role_actions` 则连接了特定预定义角色允许的操作。即使未创建任何策略，这些 DMV 也始终会被填充。


  ### 查看主体与权限


  7.  由于我们已经创建了一个策略，请执行脚本 `policyprincipals.sql`，它使用了以下 T-SQL 语句：


  ```sql

  -- 列出所有被授予连接权限的 Azure AD 主体

  SELECT * FROM sys.dm_server_external_policy_principals;

  GO

  -- 列出在给定资源范围内被分配到特定角色的 Azure AD 主体

  SELECT * FROM sys.dm_server_external_policy_role_members;

  GO

  -- 列出 Azure AD 主体，并连接其角色和数据操作

  SELECT * FROM sys.dm_server_external_policy_principal_assigned_actions;

  GO

  ```


  让我们分解一下这些 DMV 的结果。`sys.dm_server_external_policy_principals` 将列出您通过策略授予访问权限的所有 Azure
  AD 账户。即使某个账户通过多个策略获得访问权限，您也只会看到该账户的一行记录。`aad_object_id` 列对应于 Azure Active Directory
  中该账户的唯一 ID。`sys.dm_server_external_policy_role_members` 显示了 Azure AD 账户是 `sys.dm_server_external_policy_roles`
  中哪些角色的成员。最后，`sys.dm_server_external_policy_principal_assigned_actions` 显示了通过任何策略分配给
  Azure AD 账户的所有权限。


  ### 创建 DevOps 策略示例


  8.  让我们展示一个 DevOps 策略的示例。假设您聘请了一名顾问，在一段时间内查看您 SQL Server 的性能指标，以帮助进行性能调优和改进。您希望授予一个
  Azure AD *访客*账户访问您的 SQL Server（或多台）的权限，但将其限制为只能访问某些允许其分析性能但不能进行更改或访问用户数据的操作。在 Purview
  Studio 中，像步骤 2 那样从左侧菜单中选择 **数据策略**。选择 **DevOps 策略** 和 **+ 新建策略**。对于数据源类型，选择 Arc
  已启用服务器上的 SQL Server，然后选择您已注册的 SQL Server 并点击 **选择**。


  现在，选择“添加/移除主体”，并选取您为先决条件创建的访客 Azure AD 账户。您的屏幕应如图 3-50 所示。


  点击 **保存**。您无需发布 DevOps 策略。


  ![](img/525217_1_En_3_Fig51_HTML.jpg)


  一张截图显示了“连接到服务器”选项卡。可见服务器类型、服务器名称、身份验证、用户名窗格。底部可见连接按钮。


  **图 3-51**

  以访客 Azure AD 账户身份连接到 SQL Server


  1.  在以系统管理员身份连接的 SQL Server 实例上，执行脚本 `policyrefresh.sql`。


  2.  以系统管理员身份执行脚本 `policydmvs.sql` 和 `policyprincipals.sql`，以查看新增的 Azure AD 访客账户及其被授予的用于性能监控的权限。


  3.  使用 SSMS，以访客 Azure AD 账户通过 MFA 进行连接，就像您在本章中使用其他 Azure AD 账户所做的那样。


  作为复习，我的 SSMS 登录界面如图 3-51 所示。


  ### 测试策略授予的权限


  4.  以新的 Azure AD 访客账户身份执行脚本 `perfdmvs.sql`。此脚本使用了以下 T-SQL 语句：


  ```sql

  SELECT * FROM sys.dm_exec_requests;

  GO

  SELECT * FROM sys.dm_os_wait_stats;

  GO

  ```


  您的结果应与典型管理员（有权查看此类信息）所看到的结果相同。


  5.  以新的访客 Azure AD 账户身份执行脚本 `querythecowboys.sql`。注意，尝试访问用户数据时会出现以下错误：


  ```

  Msg 229, Level 14, State 5, Line 3

  对象 ''tothesuperbowl''，数据库 ''howboutthemcowboys''，架构 ''dbo'' 上的 SELECT 权限被拒绝。

  ```


  6.  为确保被授予策略的账户仅用于查看性能数据而无法进行任何更改，请执行脚本 `sp_configure.sql`，该脚本使用了以下 T-SQL 语句：


  ```sql

  EXEC sp_configure ''show advanced options'', 1;

  GO

  ```


  您应该会收到以下错误：


  ```

  Msg 15247, Level 16, State 1, Procedure sp_configure, Line 105 [Batch Start Line
  0]

  用户没有执行此操作的权限。

  ```


  ### 撤销策略


  7.  假设与持有访客 Azure AD 账户的顾问的合同现已结束。您希望确保系统安全并移除对 SQL Server 的访问权限。让我们通过 Microsoft
  Purview 来完成。在 Purview Studio 中，从左侧菜单中选择 **数据策略** 图标。然后选择 **DevOps 策略**。勾选您创建的策略旁边的复选框，然后点击屏幕顶部的
  **删除**。再次点击删除。


  8.  现在回到 SQL Server，尝试再次使用访客 Azure AD 账户连接。您应该会收到登录失败的错误。


  ### 总结与注意事项


  在本练习中，您学习了如何使用 Microsoft Purview 创建策略，以授予 Azure AD 账户读取数据和执行性能监控分析的访问权限，而无需直接在 SQL
  Server 中创建登录名和分配角色。SQL Server 已经过增强，能够将 Purview 中的策略集成到安全权限系统中，因此感觉就像您在 SQL Server
  内部直接授予了身份验证和授权一样。


  **提示**

  在使用此功能时，您可能会遇到一个问题。您需要扩展查看系统中安全信息的方式。除了其他安全目录视图外，您还需要使用新的 DMV 来查看谁拥有对您系统的访问权限及其权限。幸运的是，SQL
  Server Audit 和 Extended Events 等功能可以跟踪任何通过策略访问的账户。




