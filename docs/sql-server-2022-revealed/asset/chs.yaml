  \n    **注意** 自签名证书非常适合测试，但*不*安全。建议您在完成本练习后，通过控制面板中的“管理用户证书”删除该证书。\n\n5.  将 `private.key`\
  \ 和 `public.crt` 文件从 `c:\\minio` 目录复制到 `%%USERPROFILE%%\\mino\\certs` 目录。\n\n6.\
  \  在命令提示符下，导航到 `c:\\minio` 目录。然后通过运行以下命令启动 minio 程序（`cmd.exe` 用户不需要 `.\\`）：\n\n\
