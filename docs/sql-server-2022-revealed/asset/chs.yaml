  \ Windows 的 `openssl`，您可以从 [`https://slproweb.com/products/Win32OpenSSL.html`](https://slproweb.com/products/Win32OpenSSL.html)\
  \ 下载。我选择了 Win64 OpenSSL v3.0.5 MSI 选项。设置系统环境变量 `OPENSSL_CONF=C:\\Program Files\\\
  OpenSSL-Win64\\bin\\openssl.cfg`，并将 `c:\\Program Files\\OpenSSL-Win64\\bin` 添加到系统路径中。\n\
  \n> 注意\n>\n> 此练习也可以在 Linux 和容器中运行。您需要使用适用于 Linux 的 minio 服务器。`openssl` 随 Linux 附带，或通过安装可选软件包获得。请查阅您的\
  \ Linux 文档。\n\n*   本书 GitHub 仓库中 `ch07_datavirt_objectstorage\\datavirt\\parquet`\
  \ 目录下的脚本和文件副本。\n\n\n\n## 为练习设置 minio\n\n要使用 `minio.exe` 与 SQL Server，需要 TLS。要使用\
  \ TLS，您必须拥有有效的证书。出于测试目的，我们将生成一个自签名证书。\n\n按照以下步骤为练习设置 minio：\n\n1.  在命令提示符下，从 `c:\\\
