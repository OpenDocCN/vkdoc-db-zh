- '# 前言


  当今的现代商业环境充满活力且瞬息万变——数据在其中扮演着基础性角色。组织需要快速从数据中获得洞察，以改善客户体验并赋能员工。目前，许多公司在混合环境中运营，数据同时存在于云端和本地。这就是为什么我们对即将发布的
  SQL Server 2022 如此兴奋，它是我们不断演进的数据与智能战略的关键部分。在微软，我们对 SQL 进行了重大投资，通过这款新产品创建了有史以来连接最紧密的
  SQL 数据库——并将其整合到微软数据生态系统中，为组织提供了一种无缝连接其数据库、分析和治理平台的方式。


  我认为，没有人比我们的首席架构师、拥有 29 年微软工龄的 Bob Ward 更有资格带您深入探索 SQL Server 2022。Bob 的知识深度仅次于他对
  SQL 社区的热情和激情。


  在这本信息丰富的书中，Bob 详细介绍了使您能够利用数据做更多事情并指导您利用新功能的新解决方案。Bob 将介绍适用于 SQL Server 2022 的 Azure
  Synapse Link，它能比以往更快、更轻松地将数据转化为洞察。


  Bob 将涵盖数据库引擎的创新，包括内置查询智能、SQL Server 的账本以及包含可用性组，以及适用于 SQL 的 Azure Synapse Link，它结合了本地和云数据。这使得能够对您最重要的运营数据进行近乎实时的分析，而无需构建和管理复杂的包和管道——也无需为
  ETL 流动编写一行代码。您将了解用于托管灾难恢复的 SQL 托管实例，并利用内置分布式可用性组（DAG）的功能来播种和链接数据库到 Azure。


  此外，Bob 分享了关于 Microsoft Purview 的易于理解的信息，您可以用它来创建访问权限策略，然后在多台 SQL Server 上发布，让您拥有一个集中治理中心。


  我们希望您阅读、探索和部署 SQL Server 2022 的乐趣与我们开发它的乐趣一样多。我们想向我们积极参与的 SQL 社区表示诚挚的感谢。多年来您的反馈帮助我们打造了一个强大的平台，它将减少复杂性、加速创新，并提供洞察以支持业务决策。感谢您给我们一个支持您的努力和创新的机会！


  > Rohan Kumar

  > 微软公司副总裁，Azure Data


  '
- '# 引言


  与*《SQL Server 2019 揭秘》*类似，本书的手稿也经历了大量修改。2021 年底和 2022 年，我又踏上了旅途，许多章节是在拉斯维加斯（多次）、奥兰多、伦敦（包括伦敦地铁）、南卡罗来纳州的查尔斯顿（我儿子
  Troy 居住的地方）、南卡罗来纳州的格林维尔、达拉斯（我儿子 Ryan 居住的地方）、德克萨斯州的普尔维尔（我妻子家人居住的地方）、奥斯汀、科罗拉多州的杰纳西（Ginger
  和我有一个小的山间居所）、佛罗里达州的西耶斯塔岛（感谢 Tom 和 Janet Grubish）、华盛顿州的雷德蒙德（多次）、芝加哥和亚特兰大等地撰写或润色的。这包括许多次在酒店、飞机、火车甚至公路旅行中
  Ginger 开车时，我在前排座位上写稿。但我最高效地完成章节或进行编辑的地方，始终是在德克萨斯州北里奇兰山我家中那有限的空间里。


  本书是我将从 SQL Server 2022 作为 Dallas 项目开始，直到产品正式发布期间，我所学习、吸收、测试并绞尽脑汁深入研究的所有内容，完整地传授给你们。能做这件事是我的荣幸和喜悦。所有那些深夜和周末的学习、测试、查阅源代码、与产品经理和开发者交谈，以及基于我
  29 年经验构思的各种场景，都包含在这本书中。我试图将高层次的“是什么和为什么”与深入的“工作原理”结合起来，以便您能从各个角度学习 SQL Server 2022。仅书的页数就证明了这一目标。我还尝试在几乎每一章都提供了深入的示例。我希望您不仅阅读
  SQL Server 2022 为何特别，还能亲自尝试，亲眼看到它的实际效果。我想您也会喜欢几乎每一章中我们工程团队关于他们为何认为 SQL Server 2022
  是一个重要版本的观点引述。


  如果您喜欢了解 SQL Server 2022 的历史和“幕后故事”，请从第 1 章开始，您还将洞察 SQL Server 2022 的整体故事。如果您想了解安装
  SQL Server 2022 与之前版本的差异，包括哪些内容已被移除以及新的 Azure 连接选项，请参阅第 2 章。


  所有其他章节可以按顺序阅读，也可以作为独立主题单独阅读。如果您想深入了解 SQL Server 如何与 Azure 连接，第 3 章是一个完整的资源。本章包含大量屏幕截图，向您展示完整的
  Azure 体验。即使您没有 Azure 订阅，也可以看看我们如何连接到 Azure 以实现灾难恢复（DR）、分析和安全。


  也许您想直接深入引擎内部。内置查询智能非常广泛，我需要用两章才能涵盖全部内容。第 4 章和第 5 章包含了非常有趣的练习，您可以使用评估版或开发人员版在自己的笔记本电脑上独立尝试。




  第 6 章专注于“引擎核心”，相信你会喜欢我们在 `SQL Server 2022` 中引入的 25 多项主要功能，包括用于 `SQL Server` 的 Ledger、全自动化的
  `tempdb` 以及包含的可用性组。


  如果你听说过 `S3` 对象存储但不确定如何使用，那么你会喜欢第 7 章。我将展示如何使用我们的 `Polybase` 技术从 `SQL Server` 访问
  `parquet` 文件和 Delta 表。或者，如果你正在寻找存放备份的新位置，我也会演示如何将原生 `SQL` 备份备份到任何兼容 `S3` 的存储提供商，并从那里进行还原。


  我认为许多人觉得我们已经遗忘了 `Transact-SQL (T-SQL)` 语言。在第 8 章中，看到我们倾注到 `SQL Server 2022` 中的全新
  `T-SQL` 函数和语言增强功能，你可能会感到惊喜。


  `SQL Server 2022` 针对 `Linux` 的新功能并不多，但我想确保你了解其基础。在第 9 章，我将展示在 `Linux`、容器和 `Kubernetes`
  上部署和使用 `SQL Server` 的基础知识。


  我相信 `Azure` 是 `SQL Server` 的最佳云平台，因此第 10 章是一段引导你学习如何在 `Azure` 虚拟机上部署、优化和管理 `SQL
  Server 2022` 的旅程。


  最后，我希望用一种方式来收尾本书，阐述 `SQL Server` 如何在任何你需要的地方成为一股力量。因此，第 11 章讲述了 `SQL Server` 如何以你从未梦想过的方式实现“从边缘到云端”的存在，这是一个关于一致性与灵活性的故事。


  如果你以前喜欢读我的书，或者这是第一次接触，我希望你全方位享受这本书。我以非常对话式的风格写作，许多人告诉我，这有助于他们“想象我正在对他们讲话”，就像他们在各种现场和在线活动中看到我的演示一样。我也希望为你提供资源，因此你会在全书中看到大量的在线参考文献，供你深入探究。


  每当撰写这样的书籍时，你总希望读者获得最新的信息。因此，请通过 `https://aka.ms/sql2022bookexamples` 获取本书的最新示例和勘误。或者，查看我在
  `https://aka.ms/sql2022workshop` 的免费研讨会材料。


  我乐于听取读者的意见，所以你可以在亚马逊上为本书评分，或者直接发送邮件至 `bobward@microsoft.com`。我总是想知道你对本书的看法，或者你是否想了解更多关于
  `SQL Server 2022` 的信息。


  > Bob Ward

  >

  > 北德克萨斯州，理查德兰山市

  >

  > 2022 年 9 月


