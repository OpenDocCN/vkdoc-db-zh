  图 5-18：新查询计划中的谓词下推


  这种情况称为*谓词下推*。其思想是优化器可以在索引上同时进行“扫描和筛选”。著名的 Pedro Lopes 在博文 [`https://techcommunity.microsoft.com/t5/sql-server-blog/predicate-pushdown-and-why-should-i-care/ba-p/385946`](https://techcommunity.microsoft.com/t5/sql-server-blog/predicate-pushdown-and-why-should-i-care/ba-p/385946)
  中对这个概念有很好的解释。由于优化器现在使用了 `ASSUME_MIN_SELECTIVITY_FOR_FILTER_ESTIMATES` 提示，它可以轻松决定使用此技术，因为它假设了完全相关性。


  相当巧妙，对吧？并且由于反馈和提示保存在查询存储中，即使计划从缓存中被淘汰，它仍将被使用。


