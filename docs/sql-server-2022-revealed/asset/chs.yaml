- "# 执行查询获取货物计数\n\n## 运行示例查询\n\n现在使用 Synapse Studio 像之前一样运行查询。粘贴以下 T-SQL（在脚本 `getcargocounts.sql`\
  \ 中找到）来运行查询以查看货物计数：\n\n```sql\n    SELECT v.Vehicle_Registration, v.Vehicle_City,\
  \ count(*) AS cargo\n    FROM Warehouse.Vehicles v\n    JOIN Warehouse.Vehicle_StockItems\
  \ vs\n    ON v.Vehicle_Registration = vs.Vehicle_Registration\n    GROUP BY v.Vehicle_Registration,\
  \ v.Vehicle_City;\n    GO\n```\n\n结果应如图 3-34 所示，这与这些表中的初始数据填充相匹配。\n\n![](img/525217_1_En_3_Fig35_HTML.png)\n\
  *一张标题为 wwi data 的容器页面截图。左侧窗格中选择了“概述”。箭头指向右侧窗格中的文件夹。*\n\n"
