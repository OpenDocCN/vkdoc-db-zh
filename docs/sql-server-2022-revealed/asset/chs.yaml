- "# 高可用性\n\n在规划部署时，您可能需要确保为 Azure 虚拟机上的 SQL Server 构建高可用性解决方案。或者，您可能只想确保了解以后扩展高可用性的选项。\n\
  \n## Azure 的内置容错能力\n\n您是否知道，仅通过在 Azure 虚拟机上安装 SQL Server，您就获得了 VM 级别的内置高可用性和容错能力？如果由于数据中心或维护问题需要移动您的虚拟机，我们会使用\
  \ **live migration**（实时迁移）的概念。但我们不仅仅是在问题发生时做出反应。我们还使用机器学习模型来帮助我们采取主动措施，让您的系统运行时间更长、更可预测。请阅读这篇精彩的博客文章，了解其在\
  \ Azure 中的幕后工作原理：[`https://azure.microsoft.com/blog/improving-azure-virtual-machine-resiliency-with-predictive-ml-and-live-migration`](https://azure.microsoft.com/blog/improving-azure-virtual-machine-resiliency-with-predictive-ml-and-live-migration/)。\n\
  \n我们还有一个非常强大的主机和基础设施维护系统，以确保您的高可用性。您可以在 [`https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates`](https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates)\
  \ 阅读更多信息。\n\n## 故障转移群集实例 (FCI)\n\n故障转移群集实例 (FCI) 是 SQL Server 客户实现高可用性的一个非常受欢迎的选项。Azure\
  \ 虚拟机支持使用 Windows Server 故障转移群集 (WSFC) 和 Linux 的 Pacemaker 来构建此类系统。\n\n为了支持 FCI，您至少需要多个虚拟机作为\
  \ SQL Server 节点。这就是在部署虚拟机时考虑使用可用性选项的地方，例如 **Availability Sets**（可用性集），它确保您在 Azure\
  \ 上部署的 VM 分布在多个隔离的硬件集群中。或者您可以选择 **Availability Zone**（可用性区域），它是每个 Azure 区域内物理上独立的、能够容忍本地故障的位置。可用性区域为您带来最佳的冗余性。\n\
  \n由于 FCI 需要在节点之间使用**共享存储**，您需要在 Azure 中使用以下选项之一：\n\n*   **Azure shared disks**（Azure\
  \ 共享磁盘）\n    本质上，这与您在本章练习中为 Azure 虚拟机设置的托管磁盘相同，但您可以使其共享。\n\n*   **Storage Spaces\
  \ Direct (SSD) – 仅限 Windows**\n    这是 Windows Server 本地环境中的一个流行选项。SSD 使用带有本地磁盘的虚拟存储区域网络\
  \ (SAN) 方法。\n\n*   **Premium file shares**（高级文件共享）\n    高级文件共享是 Azure 文件中的一项功能，本质上是一个共享文件系统。\n\
  \n在这三个选项中，高级文件共享支持最大的容量并且限制最少。\n\n最后一个重要的概念是 **quorum**（仲裁），FCI 需要它来支持故障转移决策。就像本地环境一样，Azure\
  \ 虚拟机支持使用 Azure 磁盘和文件共享的基于磁盘的 *witness*（见证人）来实现仲裁。但我推荐的一个独特选项是 **cloud witness**（云见证）。云见证易于设置并使用\
  \ Azure 存储。\n\n要开始为 Azure 虚拟机上的 SQL Server 配置 FCI，请访问 [`https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/hadr-windows-server-failover-cluster-overview`](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/hadr-windows-server-failover-cluster-overview)。\n\
  \n### Always On 可用性组\n\n虽然故障转移群集实例（FCI）是 SQL Server 高可用性的热门选项，但 Always On 可用性组（AG）代表了一种更强大的解决方案，它使用本地存储和副本。其最大优势在于辅助服务器是可用的（可用于只读查询、备份等）。\n\
  \nAzure 虚拟机支持所有形式的 Always On 可用性组。请记住，在本书第 6 章中，我向您展示了如何在无群集的情况下设置 AG。我正是使用 Azure\
  \ 虚拟机完成的。\n\n但假设您想要自动故障转移功能。那么您将需要与 Azure 中的 FCI 类似的设置，但无需共享存储。对于使用 Windows Server\
  \ 故障转移群集（WSFC）的 FCI 和 AG 设置，一个很好的新特性是能够使用子网，而不必配置负载均衡器。\n\n图 10-12 展示了 Azure 中一个具有多个子网的\
  \ AG 的可能配置。\n\n![图 10-12](img/525217_1_En_10_Fig12_HTML.png)\n\n一个 AG 配置的示意图。顶部是\
  \ DC 子网，下方是 SQL-subnet-1 和 SQL-subnet-2。\n\n**图 10-12** Azure 中具有多个子网的 AG 配置\n\n\
  要了解有关配置具有子网的 AG 的更多信息，请参阅[使用多个子网在 Azure 虚拟机上手动配置 Always On 可用性组先决条件教程](https://docs.microsoft.com/azure/azure-sql/virtual-machines/windows/availability-group-manually-configure-prerequisites-tutorial-multi-subnet)。\n\
  \n使用 Azure 虚拟机配置 AG 的一个好处是，一旦您的群集、网络和域设置完毕，SQL 部分的运维操作与本地部署是相同的。\n\n如果您希望了解在 Linux\
  \ 上设置 AG 的体验，我们与合作伙伴 Red Hat 共同构建了一份很棒的快速入门指南，您可以查看[在 RHEL 上为 SQL Server 虚拟机设置高可用性\
  \ Always On 可用性组](https://docs.microsoft.com/azure/azure-sql/virtual-machines/linux/rhel-high-availability-stonith-tutorial)。\n\
  \n我一直想要一个简单快速的方法来设置整个系统，以便我能够测试并查看一个完整的自动故障转移动作。我的同事 Taryn Pratt，她是负责 Azure 上 SQL\
  \ Server 高可用性/灾难恢复（HA/DR）的高级项目经理，向我展示了这个 ARM 模板：[为 Azure SQL VM 端到端设置 Always On\
  \ 可用性组](https://github.com/microsoft/tigertoolbox/tree/master/AzureSQLVM/e2e-ag-setup)。所以请试试看，并通过\
  \ GitHub 问题站点向 Taryn 提供反馈。我想向 Taryn 了解我们在 Azure 虚拟机上 SQL Server 的 HA 体验方面的未来计划。Taryn\
  \ 说：“*Azure IaaS 上的 SQL Server 团队正在努力改善在 Azure VM 上运行的客户的 HA/DR 体验。我们的目标之一是增强门户功能，以便在使用\
  \ Always On 可用性组时提供从开始到结束的更好整体体验。这包括在 SQL Server 创建时增加部署多子网 Always On 可用性组的能力，以及扩展现有的故障排除工具以包含有关\
  \ AG 健康状况的更多详细信息。我们希望为客户提供一种在 Azure VM 上轻松创建和支持 SQL Server HA/DR 解决方案的方法。*”\n\n\
  ## 灾难恢复\n\n虽然设置 Always On 可用性组（AG）也可以提供灾难恢复选项，因为您的数据通过本地存储复制到另一个节点，但对于 Azure 虚拟机上的\
  \ SQL Server 灾难恢复还有其他考虑因素。\n\n### 存储容错\n\n我在本章前面已经讨论过在 Azure 存储上为数据库和日志文件选择存储方案。事实证明，Azure\
  \ 存储帐户具有内置的冗余选项。这些选项包括本地冗余存储（LRS）、区域冗余存储（ZRS）和地域冗余存储（GRS）。由于 SQL Server 进行 I/O 的性质，我们仅支持使用\
  \ LRS 存储数据和日志文件。但即使使用 LRS，您的数据在数据中心内也已自动保存了多个最新的副本。\n\n### 备份数据库选项\n\n因为我们只支持使用\
  \ LRS 存储数据和日志文件，所以您需要制定一个备份策略，将备份存储与数据和日志存储分开，同时选择更冗余的选项，如 ZRS 或 GRS。\n\n并且由于 SQL\
  \ Server 引擎内置了备份到 `Azure 存储` 的功能，因此使用 Azure 实现稳健的备份策略并不困难。此外，如果您以完整模式注册 IaaS 代理扩展，则可以利用自动备份功能，该功能使用您选择的\
  \ Azure 存储帐户。这种方法的一个缺点是备份有 12TB 的限制（压缩可能对此有帮助）。\n\n您确实可以选择配置一个新的 `Azure 托管磁盘`，以便简单地在虚拟机内备份到另一个驱动器或挂载的文件系统。虽然使用这种方法允许更大的备份大小（因为您使用的是\
  \ `BACKUP TO DISK`），但其缺点是虚拟机必须可用才能访问备份，而对于 Azure 存储，您可以随时访问备份。\n\n使用 T-SQL 直接进行\
  \ Azure 备份的第三个选项是 `高级文件共享`。当您配置高级文件共享时，您将使用 `BACKUP TO DISK` 备份数据库，但存储独立于虚拟机，因此您可以轻松地将高级文件共享附加到另一台虚拟机。此外，高级文件共享支持高达\
