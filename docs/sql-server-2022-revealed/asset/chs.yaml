  \n我说过 PSP 优化允许同一查询有多个计划，但为什么查询存储认为有两个“查询”？让我们使用查询存储元数据进一步查看。\n\n![](img/525217_1_En_5_Fig13_HTML.png)\n\
  \n一个图形化的显示计划运算符。显示计划运算符中的文本写着：查询 1，查询成本，100%；从仓库.库存项目中选择库存项目 ID、供应商 ID、库存项目名称、前置时间天数，其中供应商\
  \ ID 等于 @供应商 ID，按库存项目名称排序；以及多重计划，成本 0%。\n\n图 5-13\n\n一个调度程序计划运算符\n\n1.  执行脚本 `query_store_plans.sql`。此脚本执行以下\
  \ T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    -- 查看变体的查询和计划\n\
  \    -- 注意每个查询都来自相同的 parent_query_id，并且 query_hash 相同\n    SELECT qt.query_sql_text,\
  \ qq.query_id, qv.query_variant_query_id, qv.parent_query_id,\n    qq.query_hash,qr.count_executions,\
  \ qp.plan_id, qv.dispatcher_plan_id, qp.query_plan_hash,\n    cast(qp.query_plan\
  \ as XML) as xml_plan\n    FROM sys.query_store_query_text qt\n    JOIN sys.query_store_query\
  \ qq\n    ON qt.query_text_id = qq.query_text_id\n    JOIN sys.query_store_plan\
  \ qp\n    ON qq.query_id = qp.query_id\n    JOIN sys.query_store_query_variant qv\n\
  \    ON qq.query_id = qv.query_variant_query_id\n    JOIN sys.query_store_runtime_stats\
  \ qr\n    ON qp.plan_id = qr.plan_id\n    ORDER BY qv.parent_query_id;\n    GO\n\
  \    ```\n\n    如果查看结果，你会看到以下有趣之处：\n    *   两个 `query_id` 的 `query_hash` 值相同。\n\
  \    *   有两个 `query_variant_id` 值，它们具有相同的 `parent_query_id`（调度程序）。这些值来自查询存储中一个名为\
  \ `sys.query_store_query_variant` 的新 DMV。\n    *   如果展开 `query_sql_text` 值，你将看到来自存储过程的\
  \ SELECT 语句，但添加了类似 `option (PLAN PER VALUE(ObjectID = 1835153583, QueryVariantID\
  \ = 1, predicate_range([WideWorldImporters].[Warehouse].[StockItems].[SupplierID]\
  \ = @SupplierID, 100.0, 1000000.0)))` 和 `option (PLAN PER VALUE(ObjectID = 1835153583,\
  \ QueryVariantID = 3, predicate_range([WideWorldImporters].[Warehouse].[StockItems].[SupplierID]\
  \ = @SupplierID, 100.0, 1000000.0)))` 的选项。这个附加文本就是为什么技术上有两个查询，但它们*哈希*到相同的 `query_hash`\
  \ 值。我们如何决定查询变体以及 `predicate_range()` 函数的实现细节目前是内部专用的。我们不希望任何人依赖这些细节，因为随着我们改进 PSP\
  \ 优化，可能会更改它们。但我会给你一些见解：变体和 `predicate_range` 的概念基于我在标题为“**PSP 优化如何工作？**”的章节和图 5-4\
  \ 中描述的 PSP 优化概念。对于此父计划，基于基数和谓词匹配，存在三种可能的变体：行数 <=100 的变体、行数在 100 到 1M 之间的变体以及行数 >=\
  \ 1M 的变体。\n    *   如果查看每个查询变体的 `xml_plan` 列的详细信息，一个名为 `<Dispatcher>` 的新部分包含 `<QueryPlan>`\
  \ 部分中的 `QueryVariantID`，其中包含变体和 `predicate_range` 的详细信息。\n\n2.  执行脚本 `query_store_parent_query.sql`。此脚本使用以下\
  \ T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    -- 查看“父”查询\n  \
  \  -- 注意这是存储过程中的 SELECT 语句，没有变体的 OPTION。\n    SELECT qt.query_sql_text\n    FROM\
  \ sys.query_store_query_text qt\n    JOIN sys.query_store_query qq\n    ON qt.query_text_id\
  \ = qq.query_text_id\n    JOIN sys.query_store_query_variant qv\n    ON qq.query_id\
  \ = qv.parent_query_id;\n    GO\n    ```\n\n    结果将是存储过程中查询的 SQL 语句文本，*没有*变体选项，如下所示：\n\
  \n    ```\n    (@SupplierID int)SELECT StockItemID, SupplierID, StockItemName, TaxRate,\
  \ LeadTimeDays  FROM Warehouse.StockItems s  WHERE SupplierID = @SupplierID  ORDER\
  \ BY StockItemName\n    ```\n\n3.  执行脚本 `query_store_dispatcher_plan.sql`。此脚本使用以下\
  \ T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    -- 查看调度程序计划\n \
  \   -- 如果你“点击” SHOWPLAN XML 输出，你将看到一个“多重计划”运算符\n    SELECT qp.plan_id, qp.query_plan_hash,\
  \ cast (qp.query_plan as XML) as dispatcher_plan\n    FROM sys.query_store_plan\
  \ qp\n    JOIN sys.query_store_query_variant qv\n    ON qp.plan_id = qv.dispatcher_plan_id;\n\
  \    GO\n    ```\n\n    如果点击 `dispatcher_plan` 的值，你将看到一个如图 5-13 所示的图形化显示计划运算符。\n\
  \n这是一个用于调度程序计划的新运算符，它不执行查询，而是变体查询计划的父级。\n\n我知道这是一个漫长的练习，但我希望你觉得它值得！此示例向你展示了 PSP\
  \ 优化的强大功能以及一些关于其工作原理的见解。\n\n\n### 关于 PSP 优化，我还应了解哪些其他细节？\n\n以下是我认为你会觉得有用的其他一些 PSP\
  \ 优化细节。\n\n#### 查阅最新信息\n\n首先，请务必查阅我们文档中关于 PSP 优化的所有最新信息：[`https://aka.ms/pspopt`](https://aka.ms/pspopt)。\n\
  \n#### 已知限制\n\n在 SQL Server 2022 的初始版本中，PSP 优化存在以下限制：\n\n*   我们仅支持 `WHERE` 子句中使用\
  \ `=` 运算符的谓词。\n*   我们确实支持多个参数，但在存储过程中支持的数量和种类有限制。\n*   除了启用或禁用 PSP 优化，你无法配置变体、桶或谓词范围的数量。由于每个计划的谓词数量有限，你的计划缓存不应变得“臃肿”。可能的缺点是，在某个变体中，你可能仍会遇到多个参数值因\
  \ `每个变体一个计划` 而产生问题的情况。\n*   如果你在 SQL Server 中禁用了“参数嗅探”（parameter sniffing），我们将不会使用\
  \ PSP 优化。可以通过跟踪标志 `4136`、数据库作用域配置 `PARAMETER_SNIFFING` 或查询提示 `USE HINT('DISABLE_PARAMETER_SNIFFING')`\
  \ 来禁用参数嗅探。\n*   如果你使用了 `RECOMPILE` 提示或选项，我们会认为该查询“不可缓存”，因此不会对其应用 PSP 优化。\n*   如果你使用了\
  \ `OPTIMIZE FOR` 查询提示（这是某些人用于规避 PSP 问题的权宜之计），我们将不会对该查询使用 PSP 优化。\n*   PSP 优化 `支持`\
  \ 针对临时表的查询。\n*   在预览版期间构建此功能时，我们发现了一个问题：如何在存储过程和过程内的语句之间跟踪性能信息。例如，现在可能很难使用 `sys.dm_exec_query_stats`\
  \ 和 `sys.dm_exec_procedure_stats` 等 DMV 将语句和过程关联起来进行性能分析。此外，在 `查询存储` 中，要将语句与存储过程关联起来，你需要使用\
  \ `sys.query_store_query_variant`，其中包含将调度程序计划（存储过程）与查询变体（过程中的语句）关联起来的信息。我们确实在查询的\
  \ `SHOWPLAN` 以及存储在 `查询存储` 中的变体语句文本中保存了 `object_id`。\n\n让 PSP 优化发挥作用的一个现实是，“放手”一些你过去为避免此问题而做的事情。这可能需要你分阶段进行（例如，在查询级别使用变通方法，而非在数据库作用域级别），直到你能看清\
  \ PSP 优化能在多大程度上解决问题，而无需其他解决方案。\n\n#### 使用诊断工具\n\n我们提供了 `扩展事件` 来帮助你进一步查看 PSP 优化，包括以下事件：\n\
  \n`parameter_sensitive_plan_optimization_skipped_reason`\n\n如果你认为 PSP 优化应该生效但实际没有，请启用此事件。该事件的\
  \ `reason`（原因）值会提供更多关于为何未使用 PSP 的上下文。你可能会发现有用的两个原因值是：\n\n*   `NonCacheable` – 无法保存到计划缓存中的查询。可能是因为你使用了\
  \ `RECOMPILE` 提示，这可能导致此状态，而这一直是解决 PSP 问题的常见变通方法。\n*   `SkewnessThresholdNotMet`\
  \ – 这意味着“数据偏斜”不足以启用 PSP 优化。我们未公开该阈值。在我使用的例子中，行数是“数百万”，但阈值不一定必须是那个值。另请注意，如果统计信息不是最新的，即使存在数据偏斜，你也可能遇到此问题，因为我们依赖于统计信息。\n\
  \n`parameter_sensitive_plan_optimization`\n\n这是一个仅 `调试` 通道的事件，但可以显示查询处理器正在使用查询变体。\n\
  \n你可以通过以下方式有意 `禁用` PSP 优化（除了前面列出的禁用其使用的变通方法）：\n\n*   使用 `dbcompat level < 160`\n\
  *   使用数据库作用域配置 `PARAMETER_SENSITIVE_PLAN_OPTIMIZATION = OFF`（并且你可以使用此选项再次启用它）\n\n\
  ### PSP 优化是一项强大的创新\n\n我个人认为，这项创新将帮助许多人避免代价高昂且耗时的查询性能问题。对我来说，PSP 优化显然是 SQL Server\
  \ 2022 中最好的功能之一。当我问 Jack Li 对 PSP 优化的看法时，他总结得最好：*“当涉及到数据偏斜等场景的参数化查询时，每个查询只有一个计划使得优化器无法选出一个满足所有条件的计划。通过允许每个查询有多个计划，参数敏感计划优化能够根据谓词的基数选择计划，从而实现最佳性能。”*\n\
  \n### 基数估算（CE）模型反馈\n\n我清晰地记得，在 SQL Server 2014 发布之前，我曾到雷德蒙德参加一个被称为该版本“里程碑评审”的会议。那时我在\
  \ CSS（客户服务与支持）部门工作，经常在版本发布“早期”参加内部会议，为工程团队提供可支持性和客户视角。就是在那时，我第一次了解到将在 SQL Server\
  \ 2014 中引入的新基数估算（CE）模型。\n\n我理解这个概念。我们需要更新查询处理器关于基数的假设。我们使用的是 1998 年 SQL Server 7.0\
  \ 发布时从旧 Sybase 代码创建新查询处理器时的假设。但在那些会议上，我戴着“支持”的帽子，所以即使我明白这可能是正确的做法，我还是确保要求提供一种在出现问题时“关闭”它的方法。\n\
  \n不幸的是，在过去的这些年里，需要为查询禁用这个新“模型”的情况发生的频率远超我们的预期。让我们先详细看看“CE 模型”到底是什么，以及为什么它会给客户带来问题。\n\
  \n### 什么是 CE 模型问题？\n\n我认为我们文档中对基数的描述已经相当到位，具体可参考：[`https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server`](https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server)。以下是我从该文档中摘录的一段喜欢的引述：\n\
  \n> 查询优化器根据两个主要因素确定执行查询计划的成本：\n>\n> 在查询计划的每个级别处理的总行数，称为该计划的基数。\n>\n> 查询中使用的运算符所决定的算法成本模型。\n\
  >\n> 第一个因素，即基数，被用作第二个因素（成本模型）的输入参数。因此，改进的基数估计能带来更优的成本估计，进而生成更快的执行计划。\n\n基数估计是查询优化器在编译计划时，对运算符任一部分的唯一性进行估计的过程。有时这显而易见且简单，有时则不然。\n\
  \n当情况不那么明显时，`CE 模型`规定了 SQL Server 中的查询优化器如何对基数做出某些假设。在 SQL Server 7.0 中，我们在构建新查询处理器时重新设计了\
  \ CE 模型的假设。这些假设类型涉及的领域在我们的文档中有描述：[`https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server?#versions-of-the-ce`](https://docs.microsoft.com/sql/relational-databases/performance/cardinality-estimation-sql-server?#versions-of-the-ce)。该文档引入了\
  \ CE `版本`的概念。存在两个 CE 版本：(1) 我们在 SQL Server 7.0 中引入的 CE 模型；(2) 我们在 SQL Server 2014\
  \ 中引入的新 CE 模型。文档还讨论了不同的 CE 模型场景，包括 `独立性`、`均匀性`、`包含性`和`包含关系`。\n\n所有这些场景中，都没有绝对的对错答案。这是一个经典的“视情况而定”的情况。SQL\
  \ Server 7.0 的 CE 模型，即 `遗留` CE 模型，做出了一些特定的假设。在 SQL Server 2014 中，我们对 CE 模型进行了更改，使其我们认为更符合“现代”工作负载。像\
  \ `关联性` 和 `包含性` 这样的概念得到了更新。关联性是其中比较有趣的问题之一，它涉及优化器如何决定列之间是否 `相关`。\n\n我们相信这会让优化器更“准确”。在许多情况下，我们确实做到了。事实上，在许多情况下，我们通过这个新模型提高了查询性能。如果你使用的\
  \ `dbcompat` 级别是 120（SQL Server 2014 的默认级别），那么 `新` CE 模型就会生效。\n\n不幸的是，这个新模型所做的某些假设并不适用于所有工作负载。尽管我们试图构建一个更准确的模型，但这并不总是带来相同或更好的性能，有时甚至会导致性能下降。\n\
  \n我们引入了跟踪标志、查询提示，甚至数据库选项来使用 `遗留` CE 模型。这些主题本身可能很详细，即使对于经验丰富的 SQL 专业人士来说也难以理解。我鼓励你阅读以下两份额外资源以了解更多信息：\n\
  \n*   我们撰写的一篇关于为何构建新 CE 模型的博客：[`https://cloudblogs.microsoft.com/sqlserver/2014/03/17/the-new-and-improved-cardinality-estimator-in-sql-server-2014/`](https://cloudblogs.microsoft.com/sqlserver/2014/03/17/the-new-and-improved-cardinality-estimator-in-sql-server-2014/)\n\
  *   由著名专家 Joe Sack 撰写的一份极其详细的白皮书：[`https://download.microsoft.com/download/d/2/0/d20e1c5f-72ea-4505-9f26-fef9550efd44/optimizing%20your%20query%20plans%20with%20the%20sql%20server%202014%20cardinality%20estimator.docx`](https://download.microsoft.com/download/d/2/0/d20e1c5f-72ea-4505-9f26-fef9550efd44/optimizing%2520your%2520query%2520plans%2520with%2520the%2520sql%2520server%25202014%2520cardinality%2520estimator.docx)\n\
  \n关键问题是，客户会告诉我们，他们升级到 SQL Server 2014 并使用了新的 `dbcompat` 120 级别后，“速度反而变慢了”。虽然这不是普遍存在的投诉，但也足以引起问题。因此，多年来，客户已经习惯于使用遗留\
  \ CE 模型配合最新的 `dbcompat` 级别。\n\n于是，`CE 反馈` 机制应运而生，试图帮助解决其中一些冲突。\n\n#### CE 反馈如何工作？\n\
  \n`CE 反馈` 是查询优化器与查询存储之间的一种协作机制，旨在识别符合 CE 模型问题的查询模式，然后使用查询提示来纠正问题。\n\n优化器会执行查询编译过程。如果它识别出一个适合进行\
  \ CE 模型反馈的 CE 模型模式，它将保存一个可能使查询运行更快的查询提示。我们采取的方法是保守的，查询必须以相同的查询文本运行一定次数后，我们才会尝试 `分析`\
  \ 是否适用 CE 反馈。\n\n一旦我们分析出适用 CE 反馈，那么在下一次查询执行时，我们会尝试应用该查询提示，并执行一次 `验证`，以检查该提示是否使查询的\
  \ CPU 时间变得更好或更差（它可能只是略有改善，这不被认为足够好到可以继续使用该提示）。如果验证成功，我们会将查询提示和反馈保存在查询存储中。如果不成功，则视为一次性能下降，我们不会使用或保存该提示。我们还会在查询存储中记录该反馈导致性能下降的事实。\n\
  \n### 尝试一个练习\n\n让我们通过一个涉及 `关联性` 场景的 CE 反馈练习。\n\n#### 先决条件\n\n为了尝试此练习，你需要满足以下先决条件：\n\
  \n*   SQL Server 2022 评估版。\n*   虚拟机或计算机，至少配备两个 CPU 和 8Gb 内存。\n\n> **注意**\n>\n> 此示例的计时对\
  \ `CPU 非常敏感`。我使用过几台虚拟机和计算机都能看到此问题，但较旧或速度较慢的 CPU 可能无法让你在这个特定练习中观察到 CE 反馈的效果。我的测试使用的是\
  \ Azure 虚拟机 Standard_D2ds_v5（两个 vCPU，8Gb 内存）。我们的 Azure 文档指出，此虚拟机大小使用的是第三代 Intel®\
  \ Xeon® Platinum 8370C（Ice Lake）处理器，全核睿频时钟速度最高可达 3.5 GHz。我认为关键之一是要使用 `专用` 虚拟机或计算机。其他程序的任何\
  \ CPU 周期都可能干扰纯粹的 CPU 工作负载。\n\n*   SQL Server Management Studio (SSMS)。最新的 18.x 或\
  \ 19.x 版本均可。\n*   本书 GitHub 仓库中 `ch05_builtinqueryintelligence_getsbetter\\cefeedback`\
  \ 目录下的脚本副本。\n\n"
