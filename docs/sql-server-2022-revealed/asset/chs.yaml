- "# 4. 内置查询智能\n\n自我加入微软以来，我们一直致力于打造业内最佳的查询处理器（QP）之一，并倾注了全部心血。但正如我在多年技术支持工作中所见，QP\
  \ 在某些场景下仍会遇到困难。早在 2016 年，我们的团队便开始了一项旅程，旨在使查询处理器能够适应各种工作负载，帮助用户在无需更改代码的情况下实现一致或更优的性能。\n\
  \n我们最初将这一努力称为 `自适应查询处理（AQP）`。我第一次听到这个术语来自 Joe Sack，他是 SQL Server 2017 中 `AQP` 的首席产品经理。`AQP`\
  \ 增加了响应内存授予、支持自适应连接的功能，并为分析查询引入了批处理模式。这些功能均通过将数据库兼容性（`dbcompat`）级别更改为 `140`（SQL\
  \ Server 2017 的默认级别）即可启用，无需更改代码。更多关于 `dbcompat` 级别的信息，请访问 [`https://aka.ms/dbcompat`](https://aka.ms/dbcompat)。而这仅仅是个开始。\n\
  \n> 注意\n> 趣味回顾，穿越时光。观看 Conor Cunningham 和我在 2018 年 SQLBits 大会上对 `AQP` 的演讲：[`https://sqlbits.com/Sessions/Event17/Adaptive_query_processing_in_SQL_databases?msclkid=2b8c0902c4ca11ecb9e5158053df6fa9`](https://sqlbits.com/Sessions/Event17/Adaptive_query_processing_in_SQL_databases?msclkid=2b8c0902c4ca11ecb9e5158053df6fa9)。\n\
  \n我们加倍努力，在 SQL Server 2019 中将这一概念重新命名为 `智能查询处理（IQP）`。`IQP` 包含了强大而新颖的场景，例如表变量延迟编译、扩展的内存授予，以及为基于行的表启用批处理模式。您可以在我的著作《`SQL\
  \ Server 2019 Revealed`》的第 2 章中阅读关于 `IQP` 的详细内容，或者直接查阅我们的文档：[`https://aka.ms/iqp`](https://aka.ms/iqp)。所有这些场景均可通过简单地将\
  \ `dbcompat` 级别更改为 `150` 来启用，无需更改代码。\n\n> 注意\n> 近似查询处理不需要 `dbcompat 150`，只需升级到 SQL\
  \ Server 2019 即可。\n\n随着我们步入 SQL Server 2022 时代，我们决定保留 `IQP` 这一品牌，同时将一整套新场景纳入 `内置查询智能`\
  \ 这一术语中。这包括了 `新一代（nextgen）` 的 `IQP`、对查询存储的新增强，以及这些场景的协同工作。\n\nSQL Server 2022 中的\
  \ `内置查询智能` 效果如何？我将这些能力分成了两章来介绍。本章将介绍所有 `内置查询智能` 的概念，然后深入探讨查询存储以及那些不需要 `dbcompat\
  \ 160` 的 `智能查询处理（IQP）` 功能。第 5 章将深入介绍三个新的 `IQP` 功能，这些功能在您启用 `dbcompat 160` 后可用（同样，无需更改代码）。\n\
  \n为什么仅 SQL Server 2022 的这一部分就有如此多的内容？请考虑以下几点：\n\n- 这是 SQL Server 2022 投资最丰富的领域之一。\n\
  - 这两章中几乎每个场景背后都有一个故事。我不仅喜欢讲故事，而且许多故事背后都有我亲身经历。\n- 尽管 `内置查询智能` 的核心理念是以最少的努力获取性能和洞察力，但我在这两章中都花时间详细解释了每个功能背后的细节。\n\
  - 两章中都提供了许多示例供您试用这些新功能。\n\n在阅读接下来的两章时，请牢记我们团队在这一领域始终遵循的以下原则：\n\n- 尽可能做到“无害”。换句话说，确保不破坏现有工作负载，也不会因该功能不可用而导致它们运行得更慢。\n\
  - 无需更改代码即可利用这些功能（查询存储提示和近似百分位数等例外情况除外）。\n- 允许单独关闭任何这些功能。这让您可以使用您喜欢的功能，并禁用那些可能不适合您工作负载的功能。\n\
  \n我们的创新真的有效吗？我们引擎的合作伙伴工程组经理 Naveen Prakash 认为如此：“*不可预测的* 查询性能曾导致人们无法将货物装入汽车或卡车，无法驶离仓库。SQL\
  \ Server 2022 *通过智能监控和自适应执行，持续提升透明、可预测和高效查询处理的标杆*。”\n\n所以，请放松身心，继续阅读。选择您现在想读的部分，也许稍后再回来继续。想象自己在接下来的两章中，仿佛置身于我过去一场“烧脑”的演讲之中。\n\
  \n让我们先概览一下新功能的整体阵容，深入了解一下 `全新的` 查询存储，然后一步步看看如何利用 `新一代 IQP` 中的一些功能。\n\n## SQL Server\
  \ 2022 中的内置查询智能\n\n在 SQL Server 2022 早期规划阶段，Pedro Lopes 和我提出了 `内置查询智能` 这一术语。我们这样做是为了代表\
  \ SQL Server 2022 中全新的创新，旨在 **无需更改代码即可获得并保持一致的性能**。此外，这些变更还让您能够通过增强的查询存储，获得对查询性能的新洞察，并以更快、更新颖的方式调优查询。这些创新被“内置”到引擎本身，并利用“数据”进行智能操作。这些数据基于统计信息或来自查询存储等数据源的执行信息。\n\
  \n这系列新功能包括：\n\n- 查询存储增强功能，例如新数据库默认开启、支持针对只读副本执行的查询以及查询存储提示。\n- 新的 `IQP` 场景，包括为 SQL\
  \ Server 查询性能的“古老”问题提供了一些惊人的解决方案；事实上，其中一些新功能 `使用了查询存储`。\n\n图 4-1 展示了所有新 `IQP` 功能的可视化图，并标注了哪些功能使用了查询存储。\n\
  \n![](img/525217_1_En_4_Fig1_HTML.png)\n\n图 4-1：SQL Server 2022 `IQP` 新功能\n\n本章将涵盖无需\
  \ `dbcompat 160` 即可获得的功能（左侧两列）。第 5 章将深入探讨如果您启用 `dbcompat 160` 后可用的 `IQP` 功能，包括 `参数敏感计划（PSP）`\
  \ 优化、`基数估计（CE）` 模型反馈和 `并行度（DOP）` 反馈。\n\n请注意右下角的方框，描述了 “`IQP Gen1`” 是通过 `dbcompat\
  \ 140` 启用的。这代表了我们在 SQL Server 2017 中引入的 `IQP` 能力。“`IQP Gen1+2`” 代表了我们在 SQL Server\
  \ 2019 加上 SQL Server 2017 中引入的 `IQP` 能力。了解这一点很重要，因为您可能正从 SQL Server 2016 或更早版本升级到\
  \ SQL Server 2022，却没有意识到可以使用所有之前的 `IQP` 能力。您始终可以在 [`https://aka.ms/iqp`](https://aka.ms/iqp)\
  \ 了解所有 `IQP` 功能。\n\n让我们从查询存储的增强功能开始看起。SQL Server 2022 有足够多的新增强，我称之为 `全新的` 查询存储。\n\
  \n\n\n## 全新查询存储\n\n在我看来，查询存储是我们嵌入 SQL Server 引擎中最酷的功能之一。早在 2000 年代中期，著名的 Conor Cunningham\
  \ 就曾向我们客户支持团队的几个人提出过一种追踪查询性能的新方法。在此之前，我们都是通过“轮询”动态管理视图 (`DMVs`) 来持久化查询性能执行数据。Conor\
  \ 的想法是将有关查询性能执行的遥测数据直接内置于查询处理器本身。这些遥测数据将以系统表的形式持久化存储在用户数据库中。他称之为查询磁盘存储 (`QDS`)，也就是现在众所周知的查询存储。\n\
  \n经过几次迭代，Conor 这一创新梦想在 `SQL Server 2016` 中得以实现。它也是 Azure SQL Database 成功的关键一环，因为我们为所有新数据库默认启用了它。\n\
  \n时至今日，我仍然发现许多我交谈过的客户并未使用查询存储。有些人不太清楚它到底是什么，有些人听说过但未曾尝试启用，还有一些人用过但遇到了问题。\n\n到 `SQL\
  \ Server 2019` 时，我们完成了新的增强功能，以修复一些性能问题，添加了等待统计信息（在 `SQL Server 2017` 中引入），并引入了额外的控件来帮助查询捕获和更好的数据存储管理。所有这些都为我们面向所有人推进全新的查询存储奠定了基础。\n\
  \n如果你初次接触查询存储，我建议你在阅读我们关于 `SQL Server 2022` 的增强功能之前，先通读我们的文档（[查询存储](https://aka.ms/querystore)）。考虑到这一点，当你在\
  \ `SQL Server 2022` 中使用新功能时，需要牢记关于查询存储的几个基本原则：\n\n*   查询存储有一个称为 **捕获模式** 的选项。捕获模式控制哪些查询会被保留在查询存储中。值为\
  \ `ALL` 意味着收集所有查询（嗯，并非完全是所有，因为像 `CREATE TABLE` 这样的 SQL 语句永远不会是查询存储的候选对象）。值为 `AUTO`\
  \ 意味着只收集有意义的查询，这实际上意味着只保留你关心的、需要收集性能信息的查询。值为 `CUSTOM` 允许你配置比 `ALL` 或 `AUTO` 更精细的控制，决定保留哪些查询。这个概念之所以重要，是因为你可能正在尝试使用一个依赖查询存储的功能，但它似乎不起作用。原因可能是根据捕获策略，该查询不符合保留在查询存储中的条件。你可以在\
  \ [设置最佳的查询存储捕获模式](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store?#set-the-optimal-query-store-capture-mode)\
  \ 阅读更多关于查询存储捕获模式的信息。\n\n*   查询存储将所有数据保留在用户数据库上下文中的系统表内。这扩展了数据库所需的存储空间。有一些选项（带有默认值）用于控制用于查询存储的空间最大大小和清理策略。此外，还可以手动删除查询存储中的所有数据或部分数据。你可以在\
  \ [使用查询存储监视性能 - 场景](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios)\
  \ 阅读更多关于查询存储维护的信息。\n\n掌握了这些知识后，在本节中，我将向你展示为什么我将 `SQL Server 2022` 中的查询存储称为*全新*的，包括以下内容：\n\
  \n*   查询存储现在对于新数据库默认开启。\n*   查询存储提示（Query Store hints）可在无需更改代码的情况下塑造查询计划。\n*   查询存储支持针对只读副本的查询的遥测数据。\n\
  *   一些新的智能查询处理 (IQP) 功能使用查询存储来提升性能，且无需更改代码。\n\n### 默认开启\n\n我清晰地记得，当我们讨论项目 Dallas（SQL\
  \ Server 的代号）的新功能时，Pedro Lopes 和 Joe Sack 对我说：“Bob，我们打算默认开启查询存储。”我的反应是：“嘿，我们 SQL\
  \ Server 不这么做。在默认开启这类功能方面，我们相当保守。”但他们解释为什么要这样做的理由很充分。\n\n以下是他们提出的事实概要：\n\n*   查询存储自\
  \ `SQL Server 2016` 起已经存在多个版本。\n*   我们在 Azure SQL 中为数百万个数据库默认开启了此功能。而且我们已经这样做了好几年。\n\
  *   我们更改了捕获查询的默认模式，以减轻具有即席工作负载的应用程序的负担（将 `QUERY_CAPTURE_MODE` 改为 `AUTO`）。\n*   我们在\
  \ `SQL Server 2019` 中为 `QUERY_CAPTURE_MODE` 添加了一个新的 `CUSTOM` 选项，使用 `QUERY_CAPTURE_POLICY`\
  \ 选项来更精细地控制查询存储捕获的内容。\n*   我们计划在 `SQL Server 2022` 中添加查询存储提示和支持只读副本。\n*   最后，也是最重要的原因，一些新的智能查询处理\
  \ (IQP) 场景将*需要*查询存储。这句话确实引起了我的注意。我记得我说了类似“再说一遍？”的话。当你在本章和下一章阅读关于 `SQL Server 2022`\
  \ 的新 IQP 场景时，就会明白我们所说的“需要”查询存储是什么意思。\n\n这一切都很好，但我敢肯定你读到这里时可能仍在问：“这会对我的应用程序有影响吗？”\n\
  \n对于任何此类普遍问题，答案都是“视情况而定。”Joe 和 Pedro 之前给我的所有理由都让我可以放心地告诉任何人，为任何应用程序启用查询存储所带来的影响可能是微乎其微的。\n\
  \n话虽如此，以下是我个人认为需要考虑的几点想法：\n\n*   我们仅为 `SQL Server 2022` 中新创建的数据库启用查询存储。任何从早期版本 SQL\
  \ Server 还原的数据库，只有在其原先已开启查询存储的情况下才会保持启用状态。\n*   我总是建议任何客户在使用任何捕获遥测数据的系统或程序时测试他们的应用程序。这包括第三方应用程序、动态管理视图\
  \ (`DMVs`) 的使用、扩展事件或查询存储。\n*   我们在 Azure SQL Database 中默认开启查询存储已有数年，未有客户工作负载受影响的报告。\n\
  *   新的捕获策略允许你“捕获所需”，从而减少对系统的整体影响。\n*   对于某些生产工作负载，我们仍然建议使用跟踪标志 `7745` 以避免关闭操作的影响。你可以在\
  \ [使用查询存储的最佳实践](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store)\
  \ 阅读更多关于此跟踪标志以及所有查询存储最佳实践的信息。\n\n    ```\n    DBCC TRACEON(7745, -1)\n    ```\n\n\
  \n"
- '# 查询存储提示


  在 2021 年夏天，我们为 Azure SQL Database 引入了查询存储提示的概念。查询存储提示的理念是在不更改应用程序代码的情况下塑造查询执行计划。


  > **注意**

  >

  > 您可以在此期 Data Exposed 节目中阅读关于查询存储提示最初发布的信息，由 Anna Hoffman 和 Joe Sack 主讲：[`youtu.be/pYB6Uik_Q7A`](https://youtu.be/pYB6Uik_Q7A)。


  *查询提示*的概念并不新鲜，您可能已经在使用它们。通过向 T-SQL 语句添加 `OPTION` 子句，您可以影响查询优化器构建查询计划。我见过两个常用的查询提示是
  `RECOMPILE`（每次执行查询时重新编译）和 `MAXDOP`（在查询级别控制最大并行度）。您可以在[`docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query`](https://docs.microsoft.com/sql/t-sql/queries/hints-transact-sql-query)阅读所有可能的查询提示和示例。


  如果您没有使用查询提示，也不必担心。查询提示是为那些由于某种原因您的应用程序与查询处理器默认编译的查询计划配合不佳的场景而设计的。


  然而，出于实际生产工作负载的原因，确实需要这些提示。查询提示要求能够更改 T-SQL 语句。但是，如果 T-SQL 语句在应用程序代码中被调用，更改应用程序代码来应用提示不切实际或不可能，该怎么办？这正是查询存储提示可以发挥作用的地方，因为查询优化器可以基于查询存储中存储的内容应用提示，而无需更改应用程序代码。


  ## 如何使用查询存储提示？


  以下是使用查询存储提示的步骤，假设查询存储已启用读写功能：


  *   执行查询，其计划存储在查询存储中。

  *   您使用查询存储目标视图找到要对其应用提示的查询的 `query_id`。

  *   您执行存储过程 `sys.sp_query_store_set_hints`，指定 `query_id` 和要应用的提示。

  *   您可以使用视图 `sys.query_store_query_hints` 查看现有的查询存储提示。


  我们将提示保存在查询存储中，这样查询处理器将在下次执行该查询时使用提供的提示。由于提示是持久化的，它将在重启和计划缓存清除后依然存在。


  并非所有查询提示都支持查询存储。有关支持的查询提示的完整列表，请查阅文档[`docs.microsoft.com/sql/relational-databases/system-stored-procedures/sys-sp-query-store-set-hints-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-stored-procedures/sys-sp-query-store-set-hints-transact-sql)。还有一些情况下，根据给定查询的编译规则，查询优化器无法使用您指定的查询提示。这被称为查询存储提示*失败*，并将记录在视图
  `sys.query_store_query_hints` 中。


  文档在[`docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#examples`](https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#examples)提供了一个非常好的端到端使用查询存储提示的示例。我将在第
  5 章中向您展示一个系统生成的查询存储提示的示例，称为**基数估计 (CE) 模型反馈**。


  ## 我应该在什么时候使用查询存储提示？


  虽然查询提示可能是您长期与应用程序一起使用的有用功能，但我见过的大多数查询提示用法都是临时措施。因此，当您想临时应用查询提示而不更改（或无法更改）应用程序代码时，查询存储提示可以是一个极其有用的功能。在您想覆盖应用程序代码中查询的提示时，查询存储提示也很方便。


  > **注意**

  >

  > 在使用查询存储提示之前，您应该了解一些使用它们的注意事项，您可以在[`docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#query-store-hints-and-feature-interoperability`](https://docs.microsoft.com/sql/relational-databases/performance/query-store-hints?#query-store-hints-and-feature-interoperability)阅读相关内容。


  在使用查询存储提示之前，请确认您试图解决的问题无法通过其他方式完成。例如，许多人使用 `RECOMPILE` 或 `OPTIMIZE FOR` 提示来解决经典的**参数敏感计划**问题。在
  SQL Server 2022 中，我们有一个针对此问题的新解决方案，可能让您避免使用那些查询提示。您可以在第 5 章中阅读更多关于**参数敏感计划 (PSP)**
  优化的信息。


  ## 这与计划指南有何不同？


  与查询存储提示类似，计划指南提供了一种在不更改应用程序代码的情况下塑造查询计划的方法。计划指南在 SQL Server 中已经存在了很多个版本。查询存储提示提供了一个更简单的接口来塑造查询计划，主要是因为您只需要向查询存储中存储的现有查询添加一个或多个查询提示。


  计划指南可以通过提供应用程序中查询的原始 SQL 文本或使用缓存中计划的计划句柄来创建。因此，查询存储提示具有实现更简单的优势，并且可以用于随时间持久化的查询。计划指南优于查询存储提示的一个优势是它们不需要启用查询存储。


  '
- '# 查询存储对辅助副本的支持


  虽然查询存储是 SQL Server 的一项伟大创新，但一个经常被请求的增强功能是支持收集 Always On 可用性组中针对辅助只读副本运行的查询的性能执行统计信息。


  > **注意**

  >

  > 您可以在我们的[`aka.ms/sqlfeedback`](https://aka.ms/sqlfeedback)站点[`feedback.azure.com/d365community/idea/eade91be-4e25-ec11-b6e6-000d3a4f0da0`](https://feedback.azure.com/d365community/idea/eade91be-4e25-ec11-b6e6-000d3a4f0da0)上看到这个请求有多受欢迎。


  使用 SQL Server 2022，您现在可以配置 Always On 可用性组以支持在查询定向到只读副本时捕获统计信息。


  我认为深入理解这个新功能的最佳方式是回答一些“如何”问题。


  ## 如何配置？


  在 Always On 可用性组的主副本上启用查询存储后，您可以在主数据库的上下文中运行以下 T-SQL：


  ```sql

  ALTER DATABASE CURRENT FOR SECONDARY SET QUERY_STORE = ON ( OPERATION_MODE = READ_WRITE);

  ```


  > **注意**

  >

  > 在本书编写时，该功能尚未正式发布（GA），需要跟踪标志 12606 来启用此功能。请在正式发布时查阅文档，看此跟踪标志是否仍然必需。启用此功能时，将捕获可用性组中所有辅助副本的查询存储信息。没有办法为每个辅助副本单独控制此设置。


  一旦您执行此语句，针对*任何*辅助副本执行的任何查询都将被捕获到查询存储中。


  但是，如果查询针对辅助副本运行，如果副本数据库是只读的，查询存储如何捕获有关查询的信息呢？让我们看看它是如何工作的。



  #### 工作原理


  当你启用 Query Store 并捕获查询的性能信息时，它首先被记录在一组内存结构中。随后，Query Store 信息会异步刷新到磁盘（刷新到用户数据库中的一组系统表中）。运行时统计数据的刷新基于一个名为
  `DATA_FLUSH_INTERVAL_SECONDS` 的配置值。你可以在以下网址阅读更多关于 Query Store 如何收集信息的内容：[`https://docs.microsoft.com/sql/relational-databases/performance/how-query-store-collects-data`](https://docs.microsoft.com/sql/relational-databases/performance/how-query-store-collects-data)。


  如果你已为辅助副本启用了 Query Store 捕获，Query Store 信息会在辅助副本的内存结构中被捕获，但不会刷新到辅助副本数据库的磁盘（因为数据库是只读的）。相反，这些信息会被发送回主副本，并在那里刷新到磁盘。Always
  On 可用性组副本之间有一个*通道*可以相互通信，我们只需使用该通道将数据发送回主副本。SQL Server 2022 引擎得到了增强，能够理解这种发送回主副本的新信息类型，然后将数据添加到主副本的
  Query Store 中，如图 4-2 所示。


  ![](img/525217_1_En_4_Fig2_HTML.png)


  图 4-2：Query Store 与辅助副本


  让我们更详细地探索其工作流程。假设你已经设置并配置了一个 Always On 可用性组，用于在辅助副本上运行 Query Store。当用户对辅助读取副本发起查询时，引擎将在内存中收集
  Query Store 统计数据。这些统计数据不会在辅助副本上持久化，因为数据库是只读的。


  - 后台任务会在辅助副本引擎中将这些统计数据排入内存队列。在*某个时刻*（一个内部实现细节），这些统计数据将通过用于可用性组日志更改的同一通信通道（dbm 端点）发送。我们努力确保这些性能统计数据的优先级低于日志更改，以免干扰日志更改的复制。


  注意


  在我撰写本章时，我们的团队正在研究是否可以启用系统存储过程 `sp_query_store_flush_db` 来强制从辅助副本向主副本发送统计数据。


  - 在主副本上，后台任务将接收这些 Query Store 统计数据并将其持久化到磁盘，同时跟踪副本详细信息和统计数据。由于这些统计数据存储在数据库中并且是记录的更改，它们也会像所有记录的更改一样被发送到辅助副本。


  - 现在，任何用户都可以针对主副本或辅助副本运行查询或报告来获取 Query Store 统计信息。


  为了区分在主副本和辅助副本上执行的查询，Query Store 视图 `sys.query_store_runtime_stats` 中添加了一个名为 `replica_group_id`
  的新列。该列映射到一个名为 `sys.query_store_replicas` 的新视图，该视图包含所有副本名称、角色及其 ID 值。


  关于此功能的预期行为，我认为有几点你应该了解：


  - 如果启用此功能，你可能需要增加 `MAX_STORAGE_SIZE_MB` 的值，特别是如果你有多个辅助副本并在其上执行查询时。


  - 查询结果不会立即出现在主副本上。由于我们使用相同的通道向副本复制更改，我们不希望对事务更改产生负面影响。因此，我们以延迟的方式将数据发送回主副本。目前没有可调整此时间的配置值。根据我的经验，在辅助副本上执行查询后，查询性能信息可能需要几分钟才会出现在主副本上。


  - 即使存在此延迟，如果你的应用程序对在 Always On 可用性组中复制的更改很敏感，则应仔细测试此选项，以确保用于副本更改的标准通信通道不受影响。吞吐量也可能取决于你在辅助副本上执行查询的频率以及可用性组中辅助副本的数量。


  - 唯一捕获 `replica_group_id` 的 Query Store 视图是 `sys.query_store_runtime_stats` 和 `sys.query_store_wait_stats`。如果你想找出特定副本的*计划存储*（即
  `Sys.query_store_query`）中的信息，你将需要联接到这些视图之一（使用 `plan_id` 作为联接列）。换句话说，如果你只查询 `sys.query_store_plan`，你将无法判断计划是从主副本还是辅助副本捕获的。


  - 在撰写本章时，我们仍在研究使用 Query Store 的哪些功能可能支持或不支持只读副本。这包括 Query Store 提示、优化计划强制、DOP 反馈和
  CE 反馈。你可以在以下文档中跟踪此功能的最新更新：[`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#query-store-for-secondary-replicas`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#query-store-for-secondary-replicas)。


  #### 如何使用


  由于我们只是在增强现有的 Query Store 功能，你现在可以像以往一样使用 Query Store 来分析查询性能。而且因为所有数据都在主副本中，任何主副本数据库的备份都包含来自所有副本的信息。


  ### 用于 IQP 的存储


  由于 Query Store 数据持久化在数据库中，它能够经受重启，包含重要的遥测信息，因此成为新 IQP 功能的完美“存储”。


  此外，由于 Query Store 具有持久化存储，查询处理器可以将特定信息保存在 Query Store 中以启用新功能。再者，引擎中的 Query Store
  实现具有后台任务，可用于执行分析以避免影响查询执行。


  例如，Query Store 后台任务可用于记录查询性能统计数据和针对有资格进行*并行度 (DOP) 反馈*的查询的*反馈*数据。这些数据持久化在 Query
  Store 表中，查询处理器在确定查询的并行度 (DOP) 时可以使用它。你可以在第 5 章阅读更多关于 DOP 反馈的详细信息。


  因为特定的 IQP 功能依赖于 Query Store，所以正确维护和配置 Query Store 变得更加重要。你应该将 Query Store 视为一组*生产*数据（即使它是用户数据库中系统表的集合）。


  因此，请务必查阅以下关于 Query Store 最佳实践和维护的文档页面：


  - [`https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store`](https://docs.microsoft.com/sql/relational-databases/performance/best-practice-with-the-query-store)

  - [`https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios`](https://docs.microsoft.com/sql/relational-databases/performance/monitoring-performance-by-using-the-query-store?#Scenarios)



  ## IQP 下一代默认功能


  当您升级到 SQL Server 2022 时，多项 IQP 功能只需“开启”即可，无需更改任何数据库兼容性级别。这意味着，即使您使用的是 IQP“诞生”之前版本的
  SQL Server（如 SQL Server 2016，数据库兼容性级别 130）的兼容性级别，也能利用新的 IQP 功能。这包括近似百分位数和优化计划强制。让我们来解释一下这些功能各自的工作原理以及如何利用它们。


  ### 近似百分位数


  在 SQL Server 2019 中，我们引入了一个新的 T-SQL 函数 `APPROX_COUNT_DISTINCT`，使您能够近似获取查询中不同值的数量。尽管这不如使用
  SELECT COUNT DISTINCT 精确，但其执行速度可能快得多，准确度约为 97%。我们发现，这类函数可以显著提升分析工作负载的性能。您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-count-distinct-transact-sql)
  阅读更多关于 `APPROX_COUNT_DISTINCT` 的内容。


  SQL Server 包含两个函数来帮助分析工作负载计算值范围的 `百分位数`：`PERCENTILE_CONT`（您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/percentile-cont-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/percentile-cont-transact-sql)
  阅读相关内容）和 `PERCENTILE_DISC`（您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/percentile-disc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/percentile-disc-transact-sql)
  阅读相关内容）。


  SQL Server 2022 为这两个函数提供了 `近似` 等效项：`APPROX_PERCENTILE_CONT` 和 `APPROX_PERCENTILE_DISC`。对于拥有异常庞大数据集的分析工作负载，这些函数可能极其有用。它们的执行速度更快，其实现保证在
  99% 概率下误差率高达 1.33%。以下是 `APPROX_PERCENTILE_CONT` 的一个 T-SQL 示例：


  ```

  SELECT DeptId,

  APPROX_PERCENTILE_CONT(0.10) WITHIN GROUP(ORDER BY Salary) AS ''P10'',

  APPROX_PERCENTILE_CONT(0.90) WITHIN GROUP(ORDER BY Salary) AS ''P90''

  FROM tblEmployee

  GROUP BY DeptId;

  ```


  `APPROX_PERCENTILE_CONT` 的参数是需要为数据范围计算的 `百分位数`。


  您可以在 [`https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-cont-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-cont-transact-sql)
  阅读更多关于如何使用 `APPROX_PERCENTILE_CONT` 的内容，在 [`https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-disc-transact-sql`](https://docs.microsoft.com/sql/t-sql/functions/approx-percentile-disc-transact-sql)
  阅读关于 `APPROX_PERCENTILE_DISC` 的内容。


  我与微软高级项目经理 Balmukund Lakhani 讨论了 T-SQL 用户为何应该考虑使用这些新函数：


  在 `SQL Server 2022` 中，我们近似查询处理家族迎来了最新成员：近似百分位数函数（用于连续值的 `APPROX_PERCENTILE_CONT`
  和用于离散值的 `APPROX_PERCENTILE_DISC`）。当您希望以最小的输出误差为代价换取更快的性能时，这些聚合函数可以替代早期的分析百分位数函数（用于连续值的
  `PERCENTILE_CONT` 和用于离散值的 `PERCENTILE_DISC`）。想象一下，一个温度传感器数据表拥有数百万行数据，而您希望快速找到第 99
  百分位数，并接受可接受的基于排序的误差边界，以便快速决策。这些函数可以在单次扫描中输出结果，且使用更少的 CPU 和内存。


  ### 优化计划强制


  `优化计划强制` 是 SQL Server 2022 中的一项新功能，旨在减少在查询存储中强制查询计划后，某些查询编译所需的时间。


  注意

  在查询存储中强制查询计划与使用查询计划提示不同。强制查询计划允许您获取查询存储中的特定查询计划，并“告知”优化器在编译时使用该计划，而不是创建新计划。您使用系统存储过程
  `sp_query_store_force_plan` 来强制查询计划。


  #### 背景


  到 2019 年，我们的工程团队与 CSS（客户支持服务）注意到一些客户遇到的一种称为 `编译风暴` 的性能问题模式。在这些情况下，由于某些不可预见的事件（例如，故障转移、重启、内存压力），所有查询计划都从缓存中被清除。然后应用程序会立即生成大量并发连接，每个连接都在极其短暂的时间内发出需要编译的查询。


  此问题的典型症状是所有处理器上出现大量的 CPU 利用率（例如，100% CPU 利用率或“满载”）。应用程序实际上处于停滞状态，因为所有用户运行的查询都需要进行耗时较长的查询编译。查询编译几乎完全是受
  CPU 限制的操作，某些查询模式可能需要很长时间才能编译并生成查询计划。


  在几个示例中，即使客户使用查询存储强制特定查询计划，问题也可能发生。即使在查询存储中强制了查询计划，当计划不在缓存中时，查询仍必须进行编译。


  #### 它是如何工作的？


  在 SQL Server 2022 中，我们增强了查询存储和查询处理器，如果认为查询编译可能需要大量时间，则可以缩短强制查询计划的编译时间。我们将此概念称为 `优化计划强制`。


  以下是 `优化计划强制` 的工作方式：


  *   如果在编译查询时启用了查询存储，并且查询编译需要大量时间，则它有资格生成 `编译脚本`。什么是“大量”？我们不记录此阈值，也不允许您更改它，但它实际上意味着查询执行的
  `编译阶段` 正在影响整体查询持续时间。您将在下一节“**实际应用**”中看到一个示例。此外，只有需要“完全优化”的查询（即，没有平凡计划的查询）才有资格。您可以在
  [`https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store?#considerations`](https://docs.microsoft.com/sql/relational-databases/performance/optimized-plan-forcing-query-store?#considerations)
  查看决定哪些查询有资格进行 `优化计划强制` 的所有不同考虑因素。


  *   编译脚本是二进制数据，被编码到存储在查询存储中的 XML 查询计划的二进制表示中，如 `sys.query_store_plan` 视图中的 `query_plan`
  列所示。如果您将 `query_plan` 列“转换”为 XML，将看不到此信息。它是一种未记录的二进制格式，不是 showplan XML 架构的一部分。


  *   我们还通过将 `sys.query_store_plan` 视图中的 `has_compile_replay_script` 列设置为 `1`，将查询计划标记为具有编译脚本。


  所有这些在 SQL Server 2022 中都是默认发生的，无论数据库兼容性级别如何，前提是数据库启用了查询存储并处于 READ_WRITE 模式。如果您使用
  `sp_query_store_force_plan` 强制一个具有编译脚本的计划，那么下次我们需要编译该查询时，我们将使用编译脚本来缩短编译时间。只要查询计划在查询存储中被标记为强制，此操作就会发生。


  当我介绍这个概念时，有人问我：“如果查询计划已被强制，为什么我们还需要此功能？”强制查询计划只是在编译查询时“锁定”一个特定的查询计划。这并不意味着我们不必编译查询的计划。如果我们能缩短编译计划所需的时间，最终可以节省大量
  CPU 周期，尤其是在这些“编译风暴”场景中。



