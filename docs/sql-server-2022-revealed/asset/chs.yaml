  \n    现在，服务器运行时除了从 SQL Server 2019 继承的 PFS 并发外，没有任何优化。\n\n3.  将脚本 `` `pageinfo.sql`\
  \ `` 加载到 SSMS 中。当工作负载开始时，你将运行此脚本以查看闩锁争用的情况。此脚本执行以下 T-SQL 语句：\n\n    ```sql\n   \
  \ USE tempdb;\n    GO\n    SELECT object_name(page_info.object_id), page_info.*\n\
  \    FROM sys.dm_exec_requests AS d\n    CROSS APPLY sys.fn_PageResCracker(d.page_resource)\
