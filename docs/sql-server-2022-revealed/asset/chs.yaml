  \ vs\n    ON v.Vehicle_Registration = vs.Vehicle_Registration\n    GROUP BY v.Vehicle_Registration,\
  \ v.Vehicle_City;\n    GO\n    ```\n\n    你应该会看到 SQL Server 和托管实例返回的结果相同。\n\n####\
  \ 故障转移到托管实例\n\n现在，让我们看看故障转移到托管实例的过程。\n\n![](img/525217_1_En_3_Fig9_HTML.png)\n\n\
  截图显示，在父节点 `sql 2022 client` 下选择了 `wide world importers` 选项。从下拉菜单中选择了“从 Azure SQL\
  \ 托管实例链接故障转移数据库”。\n\n图 3-9\n使用 SSMS 执行故障转移\n\n1.  在 SSMS 中使用对象资源管理器，选择“故障转移数据库”，使用与你复制数据库时相同的选择，如图\
  \ 3-9 所示。\n\n![](img/525217_1_En_3_Fig10_HTML.png)\n\n截图显示“故障转移数据库到托管实例”窗口。左侧窗格中突出了故障转移类型。右侧窗格中选择了“计划的手动故障转移”。\n\
  \n图 3-10\n选择故障转移类型\n\n1.  选择“下一步”，你将看到一个登录 Azure 的屏幕。选择你的托管实例部署所使用的订阅，然后选择“下一步”。\n\
  2.  你可以选择“计划或强制故障转移”。选择“计划手动故障转移”，并勾选你已停止工作负载的选项（我们没有运行任何写入操作）。你的屏幕应如图 3-10 所示。\n\
  \    选择 **下一步**。\n\n![](img/525217_1_En_3_Fig11_HTML.png)\n\n截图显示“故障转移数据库到托管实例”窗口。左侧窗格中选择了“结果”选项。右侧显示了六个任务，其中四个带有复选标记，脚本设置被突出显示。\n\
  \n图 3-11\n已完成的故障转移到托管实例\n\n1.  你现在可以选择“清理”之前创建的 AG 和/或 DAG。你可以选择保留它们并在以后重新创建链接，但为了本练习的目的，我将勾选两个选项并选择“下一步”。\n\
  2.  你现在处于完成故障转移的最终屏幕。选择“完成”。此步骤将 DAG 更改为同步模式，通过比较两个系统上的 LSN 值来检查所有日志更改是否已同步，然后删除链接。完成后，你的屏幕应如图\
  \ 3-11 所示。\n3.  使用 SSMS 再次对托管实例执行脚本 `checkstatus.sql`，查看状态现在是否为 `READ_WRITE`。\n\
  4.  你也可以从连接到 SQL Server 的 SSMS 中看到 AG 和 DAG 已被移除。\n\n在真实的故障转移场景中，你现在需要将应用程序更改为连接到托管实例，并将任何实例级对象（如\
  \ SQL Agent 作业、登录名等）迁移到托管实例。\n\n#### 将数据库还原回 SQL Server\n\n正如我们在本章所述，此灾难恢复选项被称为“离线”，因为即使你可以执行在线故障转移，但要故障恢复回\
  \ SQL Server 则需要数据库备份和还原。完全备份和还原可能需要一些时间，因此你的停机时间更长，故称为“离线”。\n\n将数据库从托管实例还原到 SQL\
  \ Server 的步骤如下：\n\n1.  如果你希望故障恢复包含对 SQL Server 的所有更改，请停止对 Azure SQL 托管实例工作负载的所有写入操作。\n\
  2.  从 Azure SQL 托管实例创建数据库的 `COPY_ONLY` 备份。请参阅文档了解如何通过连接到托管实例的 SSMS 将数据库备份到 Azure\
  \ 存储。（如果你需要，也有 T-SQL 选项。从步骤 [`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#create-credential`](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#create-credential)\
  \ 开始。）\n3.  使用 SSMS（也有 T-SQL 选项）连接到 SQL Server，从 Azure 存储还原数据库。从 [`https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#restore-database`](https://docs.microsoft.com/sql/relational-databases/tutorial-sql-server-backup-and-restore-to-azure-blob-storage-service#restore-database)\
  \ 开始按照文档中的步骤操作。如果链接功能的原始数据库仍然存在，你将需要为 SQL Server 上的数据库选择一个不同的名称。\n4.  你还需要将应用程序重新指向\
  \ SQL Server 而非托管实例。此外，你需要迁移实例对象，例如 SQL Agent 作业。\n5.  你现在可以选择重新创建到托管实例的链接，以重建你的灾难恢复站点。在执行此操作之前，你需要先删除之前在托管实例上链接的数据库。\n\
  \n\n\n### 注意事项\n\n使用 Azure SQL 托管实例时，请牢记以下几点细节：\n\n*   一个链接只允许对应一个数据库。您可以在一个 SQL\
  \ Server 上创建多个链接，或让多个服务器指向同一个托管实例。目前，一个托管实例最多可支持 100 个链接。同时，请考虑您的托管实例需要多少存储空间来支持链接中的数据库。\n\
  *   任何 Azure SQL 托管实例不支持的功能（例如 `filestream`）也不支持链接功能。\n*   如果目标 Azure SQL 托管实例使用的是通用服务层，则不支持内存中\
  \ OLTP，因为该服务层不支持内存中 OLTP。\n*   请遵循最佳实践，例如定期进行事务日志备份，这是任何 `DAG` 设置都应执行的操作。\n*   对您主要\
  \ SQL Server 上工作负载的性能影响，与您自己设置基于异步的 `DAG` 相同。由于我们使用的是异步方式，您应该会看到对写入性能的影响很小。\n* \
  \  链接功能没有监听器概念，因此在故障转移后，您的应用程序需要手动更改指向托管实例。\n*   实例级对象（如 `SQL Agent` 作业）不会被复制。故障转移后，您需要手动将这些对象迁移到托管实例。\n\
  \n有关限制和约束的最新更新，请访问我们的文档：`https://docs.microsoft.com//azure/azure-sql/managed-instance/managed-instance-link-feature-overview#limitations`。\n\
  \n### Azure SQL 托管实例链接功能的未来\n\n在撰写本书时，我们仅为 `SQL Server 2016`、`SQL Server 2019` 和\
  \ `SQL Server 2022` 提供单向链接。正如您在书中所见，我们还正在发布将 Azure SQL 托管实例用作离线灾难恢复站点的功能，因为您必须手动将完整备份还原到\
  \ `SQL Server 2022` 才能故障回复。\n\n未来无法保证，但我们打算通过诸如在线故障回复等功能来增强灾难恢复场景，类似于当今使用 `SQL Server`\
  \ 时通过可用性组进行故障回复的方式。我们还想探索像同步 `DAG` 这样的可能性。我询问了 Dani Ljepava 关于团队的愿景，以及为什么将链接功能发展到其全部功能对微软和我们的客户如此重要*：*\n\
  \n*“Azure SQL 托管实例于 2018 年 11 月作为一项服务推出，旨在提供与 SQL Server 兼容性最高的最佳 PAAS 服务。当时我们在内部将该项目称为‘云提升器’，主要理念是我们希望使客户能够将其工作负载从\
  \ SQL Server 直接迁移到完全托管的 PAAS 服务。自从我们推出该服务以来，客户一直向我们提出以下问题——我还没准备好迁移到 Azure，我想在 Azure\
  \ 中实现现代化但不进行迁移；我希望能够在托管实例上运行分析和读取扩展，同时仍然运行在我的 SQL Server 上。当准备好迁移时，客户询问如何降低迁移到 Azure\
  \ 的风险？如果出现任何问题，我能轻松回退到 SQL Server 吗？我的工作负载很关键，我需要尽可能短的最小迁移停机时间。一些客户问——我需要在云中我的 SQL\
  \ Server 和托管实例之间建立灾难恢复。法律要求我能够轻松地从 Azure 回退到 SQL Server，并定期执行灾难恢复演练。现在，如果您发现自己问的是这些问题之一，那么我们正是为您构建了\
  \ MI 链接。该链接是我们‘云提升器’承诺的延伸，通过提供极致的混合灵活性，让您以自己的条款、步调和时间使用 Azure。”*\n\n请在 `https://aka.ms/milink`\
  \ 关注 Azure SQL 托管实例链接功能的所有最新动态。\n\n## Azure Synapse Link for SQL Server\n\nAzure\
  \ Synapse Analytics 是解决所有类型大数据的完美方案。它是一个分析解决方案，因为它拥有用于需要分析数据的应用程序所需的强大功能和工具。然而，问题在于：要分析的数据在哪里？在许多情况下，数据可能存在于您想要使用\
  \ Synapse 分析的 `SQL Server` 实例中。挑战在于如何在不依赖复制数据或 `ETL` 作业的情况下，将所需的数据从 `SQL Server`\
  \ 引入 `Synapse`。任何想要分析数据的人通常都希望在某种*近实时*的时间范围内完成。\n\n### 什么是 Synapse Link for SQL\
  \ Server？\n\nSynapse Link for SQL Server 是 `SQL Server` 和 `Synapse` 的一项功能，可将近实时地将\
  \ `SQL Server` 中的数据与 `Synapse` 链接起来，且无缝衔接。这涉及您最初同步数据，然后 `Synapse Link` 将以增量方式自动捕获更改，使您能够在近实时查询\
  \ `Synapse` 中的数据。\n\n`SQL Server` 多年来一直包含内置在 `SQL Server` 引擎中用于捕获更改的技术，称为*更改流*，包括复制和变更数据捕获（`CDC`）。这些功能内置于\
  \ `SQL Server` 引擎中，以从事务日志中*提取*更改并将其*输送*到另一个目标。在目标提交更改之前，事务不会从事务日志中被截断。`Synapse Link`\
  \ 使用了更改流的一些核心功能来实现相同的目标，只不过目标将是 Azure Synapse。\n\nAzure Synapse Link 适用于 `SQL Server\
  \ 2022` 和 Azure SQL Database。在 `SQL Server 2022` 中使用此功能不需要 Azure 扩展。Synapse 还为 Cosmos\
  \ DB 和 Dataverse 提供链接服务。Synapse Link for SQL 的一个很大区别是数据被同步并输送到 SQL 池中。请在 `https://aka.ms/synapselinksqlserver`\
  \ 获取有关 Synapse Link for SQL Server 的最新信息。\n\n\n\n"
- "# Synapse Link 如何工作？\n\nSynapse Link 的工作涉及多个组件。让我们回顾图 3-12 来理解这些组件和数据流。\n\n![](img/525217_1_En_3_Fig12_HTML.png)\n\
  \nAzure Synapse Link for SQL Server 的六步流程图。步骤从 Synapse 工作区开始，以更改数据流队列结束。\n\n图 3-12\n\
  \nSQL Server 的 Synapse Link 架构\n\n让我们使用图中的数字来了解组件创建和数据流的顺序。不用担心如何创建这些组件的细节。你将在下一节的练习中看到这些细节。\n\
  \n1.  首先，你需要一个 Azure Synapse 工作区。\n2.  现在创建一个 SQL 专用池来承载数据。\n3.  创建一个 `SQL Server\
  \ 2022 的链接服务`。这在 Synapse 内建立了一个控制平面，并能够将 SQL Server 和 Synapse 连接起来。你将在 SQL Server\
  \ 的计算机或网络上安装自承载集成运行时 (`SHIR`)。此链接服务专用于此特定的 SQL Server 和数据库。如果你想为同一 SQL 实例上的不同数据库设置链接，则需要一个唯一的链接服务，这需要另一个不同的\
  \ `SHIR`。一次只能在 `VM` 或计算机上运行一个 `SHIR` 程序。但由于 `SHIR` 可以远程连接到 SQL Server，你可以在网络中的不同\
  \ `VM` 或计算机上运行该程序的另一个副本。`SHIR` 仅在 Windows 上工作，因此如果你在 Linux 上使用 Synapse Link for\
  \ SQL Server，你将需要在网络中的一台可以连接到你的 Linux 上的 SQL Server 的 Windows `VM` 或计算机上安装 `SHIR`。\n\
  4.  创建一个名为 `暂存区` 的 Azure 存储帐户以及该暂存区的链接服务。此暂存区帐户将专用于此 SQL Server 和数据库。暂存区将存储从 SQL\
  \ Server 提取的文件，Synapse 知道如何将这些文件摄取到 SQL 池表中。\n5.  基于 SQL 的链接服务创建一个 `链接连接`。从 SQL\
  \ Server 上的源数据库选择要链接的表。启动连接。`SHIR` 在 SQL Server 2022 中执行系统存储过程以启动该过程。表的快照被捕获并通过\
  \ `HTTPS` 以 Parquet 和架构文件的形式提交到暂存区。控制平面中的摄取服务获取暂存区文件并在 SQL 池中创建表。数据根据初始快照插入到池表中。链接连接针对数据库中的特定表。你可以为同一个数据库拥有多个链接连接，但一个表只能位于一个链接连接中。\n\
  6.  对 SQL Server 中表的任何修改都会记录在事务日志中。SQL Server 中的更改数据捕获任务获取日志更改并将其放入队列，这些队列是 SQL\
  \ Server 内的内存结构。内部任务将更改从队列以 `CSV` 和清单文件的形式通过 `HTTPS` 发布到暂存区。我们尽量将所需的内存量保持在尽可能小的水平，同时平衡需要有良好的吞吐量来捕获日志更改并发布到暂存区。SQL\
  \ Server 使用一个工作线程池来执行捕获日志更改并将这些更改发布到暂存区的任务。工作线程池是专用于 Synapse Link 更改数据捕获的池，并且跨实例上所有启用了\
  \ Synapse Link 的数据库工作。Synapse 中的摄取服务获取暂存区文件并执行对 SQL 池中受影响表的修改。\n7.  可选地创建一个 Power\
  \ BI 报表，直接在 SQL 池表上可视化你的数据。\n\n现在你已经了解了组件和流程，让我们尝试一个练习，看看 Synapse Link 如何运作。\n\n\
  ## 尝试 Synapse Link for SQL Server\n\n为了成功完成本练习，你需要仔细遵循先决条件、设置练习的步骤以及每个练习步骤。\n\n\
  我要感谢 Chuck Heinzelman、Mine Token、Milos Vucic 和 Tim Chen 帮助我理解 Synapse Link 的工作原理，并为本练习创建了所有资源。\n\
  \n### 先决条件\n\n*   一台至少有两个 CPU 和 `8Gb` 内存的虚拟机或计算机。对于我的测试，我使用了 Azure `E4ds_v5` `VM`，它带有四个\
  \ `vCPU` 和 `32Gb` 内存。你的虚拟机或计算机需要能够通过 Internet 连接到 Azure，或者作为 Azure 虚拟机运行。\n*   SQL\
  \ Server 2022 评估版。本练习只需要数据库引擎功能。\n*   一个具有创建 Azure Synapse 工作区和 Azure Data Lake\
  \ Storage Gen2 帐户权限的 Azure 订阅（Synapse 使用自己的存储帐户，但你需要一个单独的帐户作为暂存区）。\n*   SQL Server\
  \ Management Studio (`SSMS`)。最新的 18.x 或 19.x 版本均可使用。\n*   将 WideWorldImporters `Standard`\
  \ 示例备份从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImporters-Standard.bak)\
  \ 下载到你将运行 SQL Server 的计算机上。之所以使用 Standard 备份，是因为像内存中 OLTP 这样的功能不被 Synapse Link 支持。\n\
  *   一份来自书籍示例 `ch3_cloudconnected\\synapselink` 文件夹中的脚本副本。\n\n\n\n#### 设置练习\n\n![](img/525217_1_En_3_Fig13_HTML.png)\n\
  *一张截图显示了 Azure Synapse Analytics。左侧窗格中选择了“概述”。右侧窗格显示了基本信息、入门、分析池和 Apache Spark 池。*\n\
  **图 3-13**\n*一个 Azure Synapse Analytics 工作区*\n\n1.  创建一个 `Azure Synapse Analytics`\
  \ 工作区。以下是如何创建工作区的快速入门指南：[`https://docs.microsoft.com/azure/synapse-analytics/get-started-create-workspace`](https://docs.microsoft.com/azure/synapse-analytics/get-started-create-workspace)。\n\
  \    在创建工作区时，需要遵循以下要点：\n    *   你在工作区创建过程中使用的 `Data Lake Storage Gen2` 存储账户是给 `Synapse`\
  \ 用的。在本练习的后续步骤中，你将为 `登陆区` 另外创建一个。\n    *   对于网络设置，你必须为 `托管虚拟网络` 选择 `禁用`，并勾选 `允许来自所有\
  \ IP 地址的连接`。如果担心此要求的安全性，你可以设置防火墙规则。\n    *   虽然不是必须的，但我喜欢将 `Azure` 资源整理到特定的资源组中。在本练习中，我在与\
  \ `Synapse` 相同的资源组中创建了一个运行 `SQL Server 2022` 的 `Azure 虚拟机`，因为我将使用 `允许 Azure 服务和资源访问此工作区`\
  \ 选项来访问 `Synapse`，而不是设置防火墙规则。\n    *   其他所有选项我都保留了默认值。`Synapse Link` 应该在支持 `Synapse`\
  \ 的任何区域都可用，但请查看 [`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#prerequisites`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#prerequisites)\
  \ 以获取最新更新。\n    根据我的经验，`Synapse` 工作区的部署时间不会超过 5-10 分钟。\n    图 3-13 展示了我的 `Synapse`\
  \ 工作区创建后的门户视图。\n\n![](img/525217_1_En_3_Fig14_HTML.png)\n*一张截图显示了 Azure 存储登陆区账户。左侧窗格中选择了“概述”。右侧窗格显示了基本信息、数据湖存储、文件服务、安全性和网络。*\n\
  **图 3-14**\n*Azure 存储登陆区账户*\n\n2.  接下来，我们需要一个地方来存放数据，对于 `Synapse Link` 来说，这个地方称为\
  \ `专用 SQL 池`。你可以将其理解为 `Synapse` 内部的一个数据库，用于承载来自源 `SQL Server` 的基于 `SQL` 的表。有几种方法可以创建它。一种简单的方法是通过\
  \ `Azure` 门户。转到屏幕左侧工作区的资源菜单，在 `分析池` 下选择 `SQL 池`。选择 `+ 新建`。对于本练习，输入一个池名称（我选择了 `wwisqlpool`）并保留默认值。对于生产系统，你可能需要在此处选择不同的选项。有关更多详情，请参阅本章后面的标题为“关于\
  \ Synapse Link 的更多细节”的部分。\n3.  创建一个新的 `Azure` 存储账户，用作 `Azure Data Lake Storage Gen2`，即\
  \ `登陆区`。我使用此文档页面中的说明创建了我的存储账户：[`https://docs.microsoft.com/azure/storage/blobs/create-data-lake-storage-account`](https://docs.microsoft.com/azure/storage/blobs/create-data-lake-storage-account)。对于本练习，我使用了与我的\
  \ `Synapse` 工作区相同的区域和资源组（非必需），并且对于 `性能` 我选择了 `标准` 选项（对于生产工作负载，你可能需要 `高级`）。除了在 `高级`\
  \ 选项卡上，我**必须选择 `启用分层命名空间`** 外，其他所有选项我都保留了默认值。图 3-14 展示了我创建后的存储账户。\n\n![](img/525217_1_En_3_Fig15_HTML.png)\n\
  *一张截图显示了访问控制下的“添加角色分配”。在“查看 + 分配”菜单下可以看到角色、范围、成员、描述和条件选项。*\n**图 3-15**\n*将 Synapse\
  \ 工作区访问权限分配给登陆区容器*\n\n4.  仅仅有一个存储账户不足以存储来自 `SQL Server` 的文件。你还需要一个文件夹或 `容器`。在屏幕左侧存储账户的资源菜单下，`数据存储`\
  \ 部分，选择 `容器`。然后在新屏幕上，选择 `+ 容器`。输入你选择的名称（稍后你会需要它）。我将我的容器命名为 `wwidata`。保留默认设置并选择 `创建`。这应该只需要几秒钟。\n\
  5.  你现在需要为 `Synapse` 工作区授予对 `登陆区` 存储账户的访问权限。按照文档中此链接的步骤 1 和 2，将 `托管标识` 的访问权限分配给\
  \ `登陆区`：[`https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#create-linked-service-to-connect-to-your-landing-zone-on-azure-data-lake-storage-gen2`](https://docs.microsoft.com/azure/synapse-analytics/synapse-link/connect-synapse-link-sql-server-2022#create-linked-service-to-connect-to-your-landing-zone-on-azure-data-lake-storage-gen2)。\n\
  \    我的角色分配如图 3-15 所示。\n\n设置这些步骤确实很多，但请花点时间确保你已准备好使用 `Synapse Link`。\n\n\n\n"
- "# 使用 Synapse Link 同步数据\n\n我提供了一系列详细的步骤，指导你设置并完成从 SQL Server 到 Synapse 的初始数据同步。当你逐步完成这些步骤时，可能会觉得有点复杂。但一旦你完成设置并初始化，数据的更改同步就\"\
  只需启用\"了。\n\n![](img/525217_1_En_3_Fig16_HTML.png)\n\n一张截图展示了基本要素和入门操作。箭头指向入门部分下的\"\
  打开 Synapse Studio\"选项。\n\n**图 3-16** 启动 Synapse Studio\n\n## 启动 Synapse Studio\n\
  \n1.  我们将使用 WideWorldImporters 备份，因此你需要将其还原到你的 SQL Server 实例。你可以使用 sysadmin 帐户登录并运行\
  \ `restorewwi_std.sql` 脚本。你可能需要编辑备份文件以及数据/日志文件的文件路径。此脚本执行以下 T-SQL 语句：\n\n```sql\n\
  USE master;\nGO\nRESTORE DATABASE WideWorldImporters FROM DISK = 'c:\\sql_sample_databases\\\
  WideWorldImporters-Standard.bak' WITH\nMOVE 'WWI_Primary' TO 'f:\\data\\WideWorldImporters.mdf',\n\
  MOVE 'WWI_UserData' TO 'f:\\data\\WideWorldImporters_UserData.ndf',\nMOVE 'WWI_Log'\
  \ TO 'g:\\log\\WideWorldImporters.ldf',\nstats=5;\nGO\n```\n\n2.  让我们在数据库中添加两个新表来跟踪车辆货物。在\
  \ SQL Server 上执行脚本 `extendwwitables.sql`，该脚本执行以下 T-SQL 语句：\n\n```sql\nUSE [WideWorldImporters];\n\
  GO\nDROP TABLE IF EXISTS [Warehouse].[Vehicles];\nGO\nCREATE TABLE [Warehouse].Vehicles\
  \ NOT NULL,\n[Vehicle_Type] nchar NULL,\n[Vehicle_State] nvarchar NULL,\n[Vehicle_City]\
  \ nvarchar NULL,\n[Vehicle_Status] nvarchar NULL,\nPRIMARY KEY CLUSTERED\n(\n[Vehicle_Registration]\
  \ ASC\n));\nGO\nDROP TABLE IF EXISTS [Warehouse].[Vehicle_StockItems];\nGO\nCREATE\
  \ TABLE [Warehouse].Vehicle_StockItems NOT NULL,\n[StockItemID] [int] NOT NULL\n\
  PRIMARY KEY CLUSTERED\n(\n[Vehicle_Registration] ASC,\n[StockItemID] ASC\n));\n\
  GO\n```\n\n3.  通过在 SQL Server 上执行脚本 `populatedata.sql`，将数据填充到这些表中。\n\n4.  WideWorldImporters\
  \ 数据库包含一些 Synapse Link 不支持的功能和数据类型。因此，在 SQL Server 上执行脚本 `alterwwi.sql` 以移除其中一些功能（例如，时态表）和具有不支持数据类型的列。\n\
  \n**注意** 在 SQL Server 2022 发布时，其中一些数据类型可能会得到支持，但为了本练习的目的，安全起见，我移除了所有可能导致问题的功能或类型。\n\
  \n5.  Synapse 和 SQL Server 2022 都需要一个主密钥用于加密目的，以及为 Synapse 构建的架构。\n    1.  连接到 SQL\
  \ Server 2022 并运行脚本 `createmasterkey.sql`，该脚本执行以下 T-SQL 语句：\n\n```sql\nUSE [WideWorldImporters];\n\
  GO\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = 'Strongpassw0rd!';\nGO\n```\n\n \
  \   2.  Synapse 池也需要一个主密钥，但你不需要密码。让我们来熟悉一下 Synapse Studio（因为你将在整个练习中需要用到它）来完成此操作。在\
  \ Synapse 工作区的 Azure 门户中，在页面中部，点击标有 **Open Synapse Studio** 的框的\"打开\"按钮，如图 3-16\
  \ 所示。\n\n打开 Synapse Studio 后，点击左侧菜单中的\"数据\"图标，展开 `wwipool` 数据库，然后选择\"新建 SQL 脚本\"\
  。接着输入 `CREATE MASTER KEY;` 并点击\"运行\"，如图 3-17 所示。\n\n![](img/525217_1_En_3_Fig17_HTML.png)\n\
  \n一张截图显示了 Microsoft Azure 下的 BW Synapse Analytics 选项卡。箭头指向数据图标、WWI SQL 池选项、新建 SQL\
  \ 脚本选项和运行图标。\n\n**图 3-17** 在 SQL 专用池中创建主密钥\n\n![](img/525217_1_En_3_Fig18_HTML.png)\n\
  \n一张截图显示了 BW Synapse Analytics 选项卡的一部分。箭头指向管理图标、链接服务选项和新建按钮。\n\n**图 3-18** 为 SQL\
  \ Server 2022 创建新的链接服务\n\n1.  我们现在已准备好从 Synapse Studio 创建**到 SQL Server 2022 的链接服务**。在\
  \ Synapse Studio 中，点击左侧菜单（最后一个）上的\"管理\"图标，选择\"链接服务\"，然后点击 + 新建，如图 3-18 所示。\n\n2.\
  \  Synapse Link 在从 SQL Server 同步表时不会自动创建架构。由于 WideWorldImporters 使用了架构，我们需要先在 Synapse\
  \ 中创建这些架构。使用你在 Synapse Studio 中创建主密钥的同一个窗口，在清除了 `CREATE MASTER KEY` 语句后，运行以下 SQL\
  \ 语句：\n\n```sql\nCREATE SCHEMA Application;\nGO\nCREATE SCHEMA Purchasing;\nGO\n\
  CREATE SCHEMA Sales;\nGO\nCREATE SCHEMA Warehouse;\nGO\nCREATE SCHEMA Website;\n\
  GO\n```\n\n在搜索窗口中输入 `sql`，选择 SQL Server，然后点击继续，如图 3-19 所示。\n\n![](img/525217_1_En_3_Fig19_HTML.png)\n\
  \n一张截图显示了新建链接服务选项卡，下方搜索栏中输入了 SQL。在菜单选项\"全部\"下的 9 个图标中，SQL Server 被选中。\n\n**图 3-19**\
  \ 选择 SQL Server 作为链接服务\n\n屏幕上会显示一个需要填写多项信息的页面。请按照以下步骤操作，因为你需要在这里填写一些信息，然后转到你托管 SQL\
  \ Server 的机器，最后再回到这个页面。\n\n输入链接服务的名称，然后在 **通过集成运行时连接** 字段中，点击\"向下\"箭头，然后选择 **+ 新建**，如图\
  \ 3-20 所示。\n\n![](img/525217_1_En_3_Fig20_HTML.png)\n\n一张截图显示了新的链接服务。光标悬停在\"通过集成运行时连接\"\
  下拉菜单中的\"新建\"选项上。\n\n**图 3-20** 为 SQL 的 Synapse Link 选择集成运行时\n\n选择 **自承载**，然后点击 **继续。**\n\
  \n保留默认名称字段，然后点击创建。现在，你将看到一个类似图 3-21 的屏幕。\n\n![](img/525217_1_En_3_Fig21_HTML.png)\n\
  \n一张截图显示了集成运行时设置。在设置选项卡下，选项 2 手动设置中可以看到密钥 1 和密钥 2。\n\n**图 3-21** 安装自承载集成运行时的说明\n\
  \n集成运行时代码现已安装在 Synapse 工作区的控制平面中。你现在需要在安装了 SQL Server 的计算机或虚拟机上安装自承载集成运行时 (SHIR)\
  \ 软件。\n\n**注意**\n\nSHIR 可以安装在网络上任何能连接到并发现 SQL Server 的位置。对于本练习，我们仅将其安装在本地。\n\n如果图\
  \ 3-21 中的屏幕上的选项 1 是你从计划安装 SHIR 的计算机或虚拟机启动 Synapse Studio 时的正确选择。我在做这个练习时是从自己的笔记本电脑使用门户，所以我选择了选项\
  \ 2 进行手动安装。当你点击选项 2 时，将启动一个新的浏览器标签页来下载软件。请保持 Synapse Studio 浏览器标签页打开。你将需要该屏幕上的**身份验证密钥**，并且在完成\
  \ SHIR 安装后，我们需要回到此位置以完成链接服务的安装。\n\n在新网页上点击下载后，我选择了最新的 MSI 版本，然后将下载的 .MSI 文件复制到了我在\
  \ Azure 中的虚拟机中。此文件大小约为 1GB，因此复制到你的虚拟机或计算机中可能需要几分钟时间。\n\n在复制此文件的同时，从 SSMS 为 SQL Server\
  \ 启动标准 SQL XEvent Profiler（点击启动会话），如图 3-22 所示。\n\n![](img/525217_1_En_3_Fig22_HTML.jpg)\n\
  \n\n\n## 屏幕截图说明\n\n图 3-22 显示了对象资源管理器。X 事件探查器下的“标准”选项被选中。旁边显示一个包含 4 个选项的弹出窗口。\n\n\
  ### 启动标准 XEvent 探查器会话\n\n这将允许你追踪进入服务器的所有 SQL 流量。我们将在本练习的后面部分使用此功能来查看 SHIR 向 SQL\
  \ Server 2022 发送了何种类型的 SQL 过程。\n\n### 下载并安装 SHIR\n\n下载后，运行 `MSI` 文件以安装 `SHIR`。安装时请使用所有默认设置。完成安装后，会出现一个输入身份验证密钥的屏幕。\n\
  \n在你发起 `SHIR` 下载的 `Synapse Studio` 中，从 `key1` 或 `key2` 复制身份验证密钥的值，粘贴到 `SHIR` 屏幕中，然后点击\
  \ **注册**。接着点击 **完成**。如果一切成功，你的 `SHIR` 屏幕应如图 3-23 所示。\n\n![](img/525217_1_En_3_Fig23_HTML.png)\n\
  \n图 3-23：SHIR 注册成功\n\n点击 **关闭**。\n\n### 验证连接\n\n在 Windows Server 上，从“开始”菜单启动 `Microsoft\
  \ Integration Runtime` 程序以验证与 `Synapse` 的连接。你的屏幕应如图 3-24 所示。\n\n![](img/525217_1_En_3_Fig24_HTML.png)\n\
  \n图 3-24：SHIR 成功连接到 Synapse\n\n`SHIR` 作为服务运行，因此你可以关闭此窗口。\n\n回到 `Synapse Studio`，在集成运行时设置屏幕上点击\
  \ **关闭**。\n\n无需担心在“通过集成运行时连接”上可能看到的错误。只需点击刷新图标，一切应变为“绿色”。\n\n### 创建链接服务\n\n现在，填写服务器名称和数据库名称（本练习使用\
  \ `WideWorldImporters`）。使用 `SQL` 身份验证，并填写你为 `SQL Server` 创建的 `sysadmin` 的 `SQL`\
  \ 登录名和密码。首先，点击屏幕右下角的 **测试连接** 以验证连接是否有效。如果成功，点击 **创建**。\n\n你将在 `Synapse Studio`\
  \ 中看到一个类似图 3-25 的屏幕。\n\n![](img/525217_1_En_3_Fig25_HTML.png)\n\n图 3-25：SQL Server\
  \ 的链接服务创建成功\n\n### 设置落地区链接\n\n1.  现在我们需要为落地区创建另一个**链接服务**。在“链接服务”页面上，选择 **+ 新建**\
  \ 并选择 **Azure Data Lake Storage Gen2**。\n    为链接服务命名。“通过集成运行时连接”保留为默认值。将身份验证类型选择为“系统分配的托管标识”，这将选择你的\
  \ `Synapse` 工作区托管标识（该标识在创建工作区时自动创建）。这就是你之前授予落地区访问权限的托管标识。\n    选择你的 `Azure` 订阅和你为落地区创建的存储帐户名称。选择屏幕底部的\
  \ **测试连接**。如果一切顺利，你的屏幕应如图 3-26 所示。\n\n![](img/525217_1_En_3_Fig26_HTML.png)\n\n\
  图 3-26：设置落地区链接\n\n点击 **创建** 以创建新链接。\n\n### 发布更改\n\n现在，点击屏幕顶部的 **发布所有** 选项，如图 3-27\
  \ 所示。\n\n![](img/525217_1_En_3_Fig27_HTML.png)\n\n图 3-27：发布所有更改\n\n\n\n"
