  \n在 *SQL Server 2019 Revealed* 的第 2 章中，我提供了关于内存授予反馈的详细背景和解释。让我在此总结一下我在该章中关于内存授予反馈的关键点。\n\
  \n查询计划中有某些运算符需要自己的内存分配，例如哈希联接和排序。当查询被编译时，SQL Server 将决定这些类型的运算符需要多少内存；这被称为*内存授予*。我喜欢我们的资深开发者之一\
  \ Jay Choe 关于内存授予的这篇详细博文：[`https://docs.microsoft.com/en-us/archive/blogs/sqlqueryprocessing/understanding-sql-server-memory-grant`](https://docs.microsoft.com/en-us/archive/blogs/sqlqueryprocessing/understanding-sql-server-memory-grant)。内存授予也称为*查询内存*。\n\
  \n多年来我在支持工作中经常遇到的一个问题是，内存授予与运算符实际所需的内存不准确。这个问题可能以两种形式出现：\n\n*   如果对于查询执行来说内存授予太小，则可能发生*溢出*。实际上，如果在查询执行期间，查询开始时预先分配的内存授予不足，引擎将不得不使用\
  \ tempdb 作为*分页文件*。即使 tempdb 的磁盘速度再快，也不如所有需要的内存都在 RAM 中快。因此，溢出会导致查询性能变慢。\n*   如果对于查询执行来说内存授予太大，其他查询可能会被迫等待，尤其是当多个查询需要特定大小的内存授予时。症状将是\
  \ wait_type = `RESOURCE_SEMAPHORE`。\n\n内存授予不准确可能由多种原因造成。最常见的原因之一是为像哈希联接或排序这样的运算符提供输入的基数估计不准确。可能仅仅是统计信息过时了。\n\
  \n像处理任何其他问题一样，我们的支持团队会与客户合作提供解决方法。有许多选项，例如查询提示或资源调控器设置。但没有真正解决根本问题。用户很难深入调查为什么内存授予不准确。\n\
  \n在 SQL Server 2017 中，如果你使用 dbcompat 140，我们为批处理模式操作（当时仅限列存储）创建了内存授予反馈模型。在 SQL Server\
  \ 2019 中，如果启用了 dbcompat 150，我们增强了反馈系统，以包含行模式操作（但在 SQL Server 2019 中也引入了批处理模式，无需列存储即可使用）。\n\
  \n注意\n请通读以下关于 SQL Server 中批处理和行模式操作的内容：[`https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-batch-mode-on-rowstore/ba-p/386256`](https://techcommunity.microsoft.com/t5/azure-sql-blog/introducing-batch-mode-on-rowstore/ba-p/386256)。\n\
  \n\n\n反馈系统的核心理念在于评估内存的实际使用情况，并与执行开始时分配的初始内存授予进行对比。在下一次执行时，如果实际使用的内存显著高于初始授予量，则会增加内存授予。如果实际使用的内存较低，则会减少授予量。\n\
  \nSQL Server 能够有效地从之前的执行中学习，使未来的执行更加高效。对我个人而言，这项创新具有开创性意义。多年来那些让客户困扰于内存溢出或阻塞问题的支持案例，现在都可以由引擎自动解决了。\n\
  \n然而，我们从 SQL Server 2017 和 2019 中发现并改进了两个方面：\n\n*   **易变性**\n    我们在初始设计中内置了一项能力：如果我们发现针对同一查询需要持续调整内存授予，则会禁用内存授予反馈。参数敏感型计划就是这类场景的一个显著例子。你可以通过查看查询计划中的\
  \ `IsMemoryGrantFeedbackAdjusted` 属性并发现值为 `No: Feedback disabled`，来判断我们是否需要禁用内存授予反馈。\n\
  \n*   **持久性**\n    该反馈系统适用于大多数工作负载，但遗憾的是，它无法持久化到磁盘。因此，如果服务器重启或查询计划被逐出缓存，所有反馈信息都将丢失。\n\
  \n### 内存授予百分位数\n\n为了改进初始设计的易变性问题，SQL Server 2022 中的内存授予反馈采用了基于百分位数的方法，而不是直接禁用内存授予反馈。我们不再仅使用查询执行中上一次的已用内存量，而是考虑一系列历史内存使用情况，来调整一个适用于多次查询执行的内存授予量。\n\
  \n这种方法倾向于避免溢出，因此有可能授予比实际需求更多的内存。如果我们对内存授予使用这种方法，你可以在查询计划的 `IsMemoryGrantFeedbackAdjusted`\
  \ 属性中观察到值为 `Yes: Percentile Adjusting`。\n\n在 SQL Server 2022 中，如果你使用数据库兼容性级别 140\
  \ 或更高版本，默认启用此行为。如果你想禁用此功能，请将数据库作用域配置选项 `MEMORY_GRANT_FEEDBACK_PERCENTILE` 设置为 OFF。\n\
  \n### 内存授予反馈持久化\n\n如果你在 SQL Server 2022 中使用数据库兼容性级别 140 或更高版本，并且为查询存储启用了 READ_WRITE\
  \ 模式，我们将把内存授予反馈的详细信息持久化到查询存储中。这使得任何内存授予反馈都能在服务器重启或计划缓存被逐出后仍然保留。\n\n还有什么比通过练习来学习更好的方式呢？我一向追求效率，所以我将重用我在\
  \ *SQL Server 2019 Revealed* 第 2 章中介绍的内存授予反馈示例，并稍作补充。\n\n在你开始这个练习之前，我想快速说明一下：我通过强制查询使用哈希联接并模拟基数问题，来引发需要内存授予反馈的条件。但这里的创新是真实存在的。这项功能正在解决应用程序日常面临的真实世界问题，这些应用程序并不关心查询处理器是否使用了哈希联接，甚至不知道什么是内存授予。这正是智能查询处理的初衷。就是让它能用起来！\n\
  \n#### 先决条件\n\n使用此示例的先决条件如下：\n\n*   SQL Server 2022 评估版。\n*   虚拟机或计算机，至少配备两个 CPU\
  \ 和 8GB 内存。\n*   SQL Server Management Studio。最新的 18.x 或 19.x 版本均可。\n*   本书 GitHub\
  \ 仓库中 `ch4_builtinqueryintelligence\\persistedmgf` 目录下的脚本副本。\n\n#### 按照以下步骤进行练习\n\
  \n请按照以下步骤在 SQL Server 2022 上查看具有持久化功能的内存授予反馈：\n\n![](img/525217_1_En_4_Fig3_HTML.jpg)\n\
  \n一个查询计划流程图。流程从表扫描和聚集索引扫描开始，经过哈希匹配，最终以 0% 的选择成本结束。\n\n图 4-3：存在溢出的查询计划\n\n1.  从 [`https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak`](https://github.com/Microsoft/sql-server-samples/releases/download/wide-world-importers-v1.0/WideWorldImportersDW-Full.bak)\
  \ 下载 `WideWorldImportersDW` 数据库备份文件。后续步骤中的还原脚本假设备份文件位于 `c:\\sql_sample_databases`。你可以在\
  \ [`https://github.com/microsoft/sqlworkshops-sql2022workshop/releases`](https://github.com/microsoft/sqlworkshops-sql2022workshop/releases)\
  \ 找到预加载了扩展数据的自定义备份。\n\n2.  将此数据库还原到你的 SQL Server 2022 实例。执行脚本 `restorewwidw.sql`。你可能需要根据你的备份文件位置和数据库文件还原目标位置更改目录路径。此脚本运行以下\
  \ T-SQL 语句：\n\n    ```sql\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS\
  \ WideWorldImportersDW;\n    GO\n    RESTORE DATABASE WideWorldImportersDW FROM\
  \ DISK = 'c:\\sql_sample_databases\\wideworldimportersdw-full.bak'\n    WITH MOVE\
  \ 'wwi_primary' TO 'c:\\sql_sample_databases\\wideworldimportersdw.mdf',\n    MOVE\
  \ 'wwi_userdata' TO 'c:\\sql_sample_databases\\wideworldimportersdw_userdata.ndf',\n\
  \    MOVE 'wwi_log' TO 'c:\\sql_sample_databases\\wideworldimportersdw.ldf',\n \
  \   MOVE 'wwidw_inmemory_data_1' TO 'c:\\sql_sample_databases\\wideworldimportersdw_inmemory_data'\n\
  \    GO\n    ```\n\n3.  为了运行部分示例，你需要一个比 WideWorldImportersDW 默认表更大的、且没有列存储索引的表。因此，请执行脚本\
  \ `extendwwidw.sql` 来创建一个更大的表。扩展此数据库会将其大小（包括事务日志）增加到总共约 8GB。此脚本运行以下 T-SQL 语句：\n\n\
  \n\n"
- "# 内存授予反馈演示\n\n以下脚本将在 `WideWorldImportersDW` 数据库中创建 `Fact.OrderHistory` 表，并用数据填充它。\n\
  \n```\nUSE WideWorldImportersDW;\nGO\n-- Build a new rowmode table called OrderHistory\
  \ based off of Orders\n--\nDROP TABLE IF EXISTS Fact.OrderHistory;\nGO\nSELECT 'Buliding\
  \ OrderHistory from Orders...'\nGO\nSELECT [Order Key], [City Key], [Customer Key],\
  \ [Stock Item Key], [Order Date Key], [Picked Date Key], [Salesperson Key], [Picker\
  \ Key], [WWI Order ID], [WWI Backorder ID], Description, Package, Quantity, [Unit\
  \ Price], [Tax Rate], [Total Excluding Tax], [Tax Amount], [Total Including Tax],\
  \ [Lineage Key]\nINTO Fact.OrderHistory\nFROM Fact.[Order];\nGO\nALTER TABLE Fact.OrderHistory\n\
  ADD CONSTRAINT PK_Fact_OrderHistory PRIMARY KEY NONCLUSTERED([Order Key] ASC, [Order\
  \ Date Key] ASC)WITH(DATA_COMPRESSION=PAGE);\nGO\nCREATE INDEX IX_Stock_Item_Key\n\
  ON Fact.OrderHistory([Stock Item Key])\nINCLUDE(Quantity)\nWITH(DATA_COMPRESSION=PAGE);\n\
  GO\nCREATE INDEX IX_OrderHistory_Quantity\nON Fact.OrderHistory([Quantity])\nINCLUDE([Order\
  \ Key])\nWITH(DATA_COMPRESSION=PAGE);\nGO\n-- Table should have 231,412 rows\nSELECT\
  \ 'Number of rows in Fact.OrderHistory = ', COUNT(*) FROM Fact.OrderHistory;\nGO\n\
  SELECT 'Increasing number of rows for OrderHistory...';\nGO\n-- Make the table bigger\n\
  INSERT Fact.OrderHistory([City Key], [Customer Key], [Stock Item Key], [Order Date\
  \ Key], [Picked Date Key], [Salesperson Key], [Picker Key], [WWI Order ID], [WWI\
  \ Backorder ID], Description, Package, Quantity, [Unit Price], [Tax Rate], [Total\
  \ Excluding Tax], [Tax Amount], [Total Including Tax], [Lineage Key])\nSELECT [City\
  \ Key], [Customer Key], [Stock Item Key], [Order Date Key], [Picked Date Key], [Salesperson\
  \ Key], [Picker Key], [WWI Order ID], [WWI Backorder ID], Description, Package,\
  \ Quantity, [Unit Price], [Tax Rate], [Total Excluding Tax], [Tax Amount], [Total\
  \ Including Tax], [Lineage Key]\nFROM Fact.OrderHistory;\nGO 4\n-- Table should\
  \ have 3,702,592 rows\nSELECT 'Number of rows in Fact.OrderHistory = ', COUNT(*)\
  \ FROM Fact.OrderHistory;\nGO\n```\n\n## 4. 设置演示环境\n\n通过执行脚本 `setup.sql` 来设置演示环境。此脚本运行以下\
  \ T-SQL 语句：\n\n```\nUSE [WideWorldImportersDW];\nGO\nALTER DATABASE [WideWorldImportersDW]\
  \ SET COMPATIBILITY_LEVEL = 150;\nGO\nALTER DATABASE SCOPED CONFIGURATION CLEAR\
  \ PROCEDURE_CACHE;\nGO\nALTER DATABASE WideWorldImportersDW SET QUERY_STORE CLEAR\
  \ ALL;\nGO\n```\n\n此脚本将 `dbcompat` 设置为 150，以允许启用针对行模式的内存授予反馈。此数据库已启用查询存储，因此我们只需清除过程缓存（以确保获得新的编译）和查询存储统计信息，以便我们只关注此查询。\n\
  \n## 5. 模拟不准确的基数估计\n\n为了轻松模拟由于基数不准确导致内存授予不准确的问题，请执行脚本 `set_stats.sql`。此脚本执行以下 T-SQL\
  \ 语句：\n\n```\nUSE WideWorldImportersDW;\nGO\nUPDATE STATISTICS Fact.OrderHistory\n\
  WITH ROWCOUNT = 1000;\nGO\n```\n\n## 6. 执行查询并捕获执行计划\n\n在 SSMS 的查询编辑器中，选择 **查询**\
  \ > **包括实际执行计划**（也可以使用 `Ctrl+M` 启用）。然后执行脚本 `execute_query.sql`，该脚本大约需要 30 秒才能完成（此示例中行结果无关紧要）。此脚本执行以下\
  \ T-SQL 语句：\n\n```\nUSE WideWorldImportersDW;\nGO\nSELECT fo.[Order Key], fo.Description,\
  \ si.[Lead Time Days]\nFROM  Fact.OrderHistory AS fo\nINNER HASH JOIN Dimension.[Stock\
  \ Item] AS si\nON fo.[Stock Item Key] = si.[Stock Item Key]\nWHERE fo.[Lineage Key]\
  \ = 9\nAND si.[Lead Time Days] > 19;\nGO\n```\n\n## 7. 分析第一次执行的执行计划\n\n从结果窗口中选择\
  \ **执行计划** 选项卡。你将看到一个图形化的执行计划输出，类似于图 4-3。\n\n请注意 Hash Match 运算符顶部的黄色警告。如果将光标悬停在此运算符上，可以看到一个关于溢出到\
  \ `tempdb` 的警告，类似于图 4-4。\n\n![](img/525217_1_En_4_Fig4_HTML.png)\n\n*图 4-4：查询计划中的溢出警告*\n\
  \n你可以看到哈希联接需要大约 426MB（`52024*8192`）的内存，而原始授予仅为约 1.4MB。\n\n![](img/525217_1_En_4_Fig5_HTML.png)\n\
  \n*图 4-5：导致溢出的内存授予*\n\n1.  如果将光标悬停在 `SELECT` 运算符上，可以确认内存授予约为 1.4MB，如图 4-5 所示。\n\n\
  如果右键单击 `SELECT` 运算符并选择 **属性**，可以展开 `MemoryGrantInfo` 属性，如图 4-6 所示。\n\n![](img/525217_1_En_4_Fig6_HTML.jpg)\n\
  \n*图 4-6：首次执行时的内存授予反馈*\n\n`IsMemoryGrantFeedbackAdjusted = NoFirstExecution` 意味着查询是首次执行，因此没有发生反馈调整。请注意，`MaxUsedMemory`\
  \ 值并未反映溢出到 `tempdb` 的页面。\n\n## 8. 检查内存授予反馈\n\n1.  由于我们使用的是 SQL Server 2022，在此查询执行后，反馈会存储在查询存储中。你可以通过执行脚本\
  \ `get_plan_feedback.sql` 来查看此反馈。此脚本执行以下 T-SQL 语句：\n\n```\nUSE WideWorldImportersDW;\n\
  GO\nSELECT qpf.feature_desc, qpf.feedback_data, qpf.state_desc, qt.query_sql_text,\
  \ (qrs.last_query_max_used_memory * 8192)/1024 as last_query_memory_kb\nFROM sys.query_store_plan_feedback\
  \ qpf\nJOIN sys.query_store_plan qp\nON qpf.plan_id = qp.plan_id\nJOIN sys.query_store_query\
  \ qq\nON qp.query_id = qq.query_id\nJOIN sys.query_store_query_text qt\nON qq.query_text_id\
  \ = qt.query_text_id\nJOIN sys.query_store_runtime_stats qrs\nON qp.plan_id = qrs.plan_id;\n\
  GO\n```\n\n你的结果应类似于以下内容（我将结果垂直翻转，以便你可以看到每列对应的内容）：\n\n```\nfeature_desc      Memory\
  \ Grant Feedback\nfeedback_data\n[{\"NodeId\":\"0\",\"AdditionalMemoryKB\":\"624504\"\
  }]\nstate_desc        FEEDBACK_VALID\nquery_sql_text\nSELECT fo.[Order Key], fo.Description,\
  \ si.[Lead Time Days]  FROM  Fact.OrderHistory AS fo  INNER HASH JOIN Dimension.[Stock\
  \ Item] AS si   ON fo.[Stock Item Key] = si.[Stock Item Key]  WHERE fo.[Lineage\
  \ Key] = 9  AND si.[Lead Time Days] > 19\nlast_query_memory_kb      1424\n```\n\n\
  `feedback_data` 列显示了下一次执行同一查询时将使用的新内存授予，根据第一次执行的 `tempdb` 溢出情况，这应该是足够的。\n\n## 9.\
  \ 再次执行查询验证反馈\n\n再次执行 `execute_query.sql` 脚本。你应该看到查询现在只需几秒钟即可完成。\n\n如果查看图形化查询计划，你会注意到哈希联接运算符没有警告。如果将光标悬停在\
  \ `SELECT` 运算符上，你应该会看到类似于图 4-7 的内存授予。\n\n![](img/525217_1_En_4_Fig7_HTML.jpg)\n\n\
  *图 4-7：反馈后的内存授予*\n\n如果右键单击 `SELECT` 运算符并选择 **属性**，你可以展开 `MemoryGrantInfo` 并查看类似于图\
  \ 4-8 的详细信息。\n\n![](img/525217_1_En_4_Fig8_HTML.jpg)\n\n\n\n一张包含两列（内存授权和 611 MB）的表格截图。内存授权信息在“内存授权”中被选中。两个箭头分别指向“625528”和“是正在调整”中的“611\
  \ MB”。\n\n图 4-8\n\n内存授权反馈已调整\n\n`IsMemoryGrantFeedbackAdjusted = YesAdjusting` 表示反馈已根据前一次执行情况应用，用于调整内存授权。没有发生\
  \ tempdb 溢出，因此执行时间显著缩短。\n\n1.  再次执行脚本 `get_plan_feedback.sql`。你将在结果中看到 `last_query_memory_kb`\
  \ 的值反映了新的、更大的内存授权。\n\n2.  此时，此场景的行为与 SQL Server 2019 完全相同，只是以前内存授权反馈仅存储在缓存的查询计划中。现在你可以看到反馈被持久化在查询存储中。执行脚本\
  \ `clear_proc_cache.sql` 以清除计划缓存。此脚本使用以下 T-SQL 语句：\n\n    ```sql\n    USE [WideWorldImportersDW];\n\
  \    GO\n    ALTER DATABASE SCOPED CONFIGURATION CLEAR PROCEDURE_CACHE;\n    GO\n\
  \    ```\n\n3.  再次执行脚本 `execute_query.sql`。你将看到查询在几秒内完成，并使用了存储在查询存储的 feedback_data\
  \ 列中的反馈信息所提供的相同内存授权。\n\n你可以使用以下数据库作用域配置选项来禁用内存授权反馈持久化：\n\n```sql\nALTER DATABASE\
  \ SCOPED CONFIGURATION SET MEMORY_GRANT_FEEDBACK_PERSISTENCE = OFF\n```\n\n你还可以在查询提示级别使用选项\
  \ `DISABLE_MEMORY_GRANT_FEEDBACK_PERSISTENCE` 来禁用内存授权反馈持久化。\n\n现在，内存授权反馈将支持使用百分位数处理更广泛的工作负载，并将反馈持久化到查询存储中，以在服务器重启和计划缓存清除后得以保留。\n\
  \n请通过以下链接跟踪有关 SQL Server 2022 内存授权增强功能的所有最新信息：[`https://docs.microsoft.com/sql/relational-databases/performance/intelligent-query-processing-details?#percentile-and-persistence-mode-memory-grant-feedback`](https://docs.microsoft.com/sql/relational-databases/performance/intelligent-query-processing-details?#percentile-and-persistence-mode-memory-grant-feedback)。\n\
  \n## 智能查询处理器\n\n在本章中，你探索了内置查询智能的含义。简而言之，它意味着无需更改代码即可获得更快的查询。它利用了查询存储的增强功能——用于查询性能统计的内置存储现默认为新数据库启用，以及对提示和只读副本的增强。它关乎下一代智能查询处理器的能力，通过近似百分位数、优化的计划强制执行以及内存授权反馈的增强来获得更好的性能。即使不使用\
  \ SQL Server 2022 的新数据库兼容级别 160，你也能获得所有这些改进。\n\n我询问了智能查询处理器领域的高级项目经理 Kate Smith，关于她对\
  \ SQL Server 2022 中内置查询智能重要性的看法：\n\n> 在我看来，查询处理是 SQL Server 功能核心跳动的心脏。所有查询都利用它，所有查询都从中受益。智能查询处理领域的最新工作延续了这一趋势——通过允许优化器根据客户的特定需求进行自我调优，我们将需要手动干预的范围扩展，迈向自我调节系统。SQL\
  \ Server 2022 中发布的新特性在许多方面扩展了功能——解决了内存授权反馈先前的挑战，引入了优化器在使用基数估计反馈时采用不同 CE 模型的能力，创建了参数敏感计划，甚至无需用户输入即可调整查询的并行度。更重要的是，这些功能可以协同工作，无缝衔接。因此，在\
  \ SQL Server 2022 之前，一个有问题的查询可能需要多次手动调整迭代，而现在同一个查询可以在多个维度上即时调整，无需任何用户操作。这些调整可以跨重启持久化，并且可以跨不同副本应用。综合来看，最新的智能查询处理器功能将极大地减轻各地\
  \ SQL Server DBA 的负担。我很高兴看到这些功能的落地，也期待用户开始看到它们带来的好处。但请注意：我们还没完成！这个团队始终着眼未来，思考我们还能提供什么。所以，敬请期待。\n\
  \n如果你准备好了，故事在下一章会变得更加精彩。如果你准备好了切换到数据库兼容级别 160，请继续阅读下一章，了解内置查询智能如何通过解决三个由来已久的问题——参数敏感计划、基数估计模型问题和并行度——而进一步发展。\n\
  \n"
- '# 5. 内置查询智能变得更强大


  在第 4 章中，你了解了内置查询智能背后的历史及其承诺：无需更改代码即可获得更快的性能。你了解了 SQL Server 2022 的新功能，如新的查询存储、内存授权反馈持久化等。这些都不需要更改为
  SQL Server 2022 的新数据库兼容级别 160。


  如果你想获得第 4 章中读到的所有内容，甚至更多呢？如果你将数据库兼容级别更改为 160，你肯定会获得更多。这包括以下内容：


  *   参数敏感计划优化

  *   基数估计模型反馈

  *   并行度反馈


  在本章中，你将了解每一项功能，包括我们要解决的问题、它们的工作原理以及如何使用它们的示例。这个故事始于试图将世界从参数嗅探中拯救出来。


  ## 参数敏感计划优化


  我相信 SQL Server 中的查询处理器是引擎中最健壮和最优秀的部分之一。我们在智能查询处理器上的投入表明，我们致力于适应所有类型的工作负载，无需更改代码即可获得性能提升。但多年来，一直有一种特定类型的场景是用户的一个痛点问题。



  '
- '# 什么是参数敏感计划？


  假设你创建了一个存储过程，并使用参数作为输入。然后你在 T-SQL 语句（例如 `WHERE` 子句）中使用该参数来筛选数据。查询首次编译时，优化器会确定参数的*值*，以决定该语句的最佳查询计划。这个查询计划随后将用于该存储过程的*任何*后续执行，无论传入的参数值是什么，直到该过程重新编译。计划缓存中，单个语句只能存在一个查询计划。因此，该计划在查询首次编译时对参数值是*敏感*的。这个问题被称为*参数嗅探*。


  注意

  许多 SQL 社区人士都说，我是多年前创造“*参数嗅探*”这个术语的人。有些人说是康纳·坎宁安 (Conor Cunningham)。我想这将永远是个谜。


  对于许多工作负载和数据集，这种情况不会造成问题。但是，如果为某个特定参数值构建的查询计划并非执行其他参数值查询的最佳计划呢？*一些*用户可能会遇到糟糕或不一致的性能问题。当要被参数筛选的查询所涉及的数据是*倾斜的*——换句话说，在匹配参数的值上分布不均匀时，这个问题通常就会发生。


  我在微软近三十年的职业生涯中，亲眼目睹过这个问题给客户带来性能问题。你可以阅读以下资源，进一步了解此问题以及如果你遇到此问题可以尝试的各种解决方法，包括


  [`https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide?#parameter-sensitivity`](https://docs.microsoft.com/sql/relational-databases/query-processing-architecture-guide?#parameter-sensitivity)
  和 [`https://docs.microsoft.com/azure/azure-sql/identify-query-performance-issues?#resolving-queries-with-suboptimal-query-execution-plans`](https://docs.microsoft.com/azure/azure-sql/identify-query-performance-issues?#resolving-queries-with-suboptimal-query-execution-plans)


  *但是，SQL Server 2022 有一个更好的解决方案，它内置于查询处理器中，无需任何代码更改。*


  ## 通过场景学习 PSP


  这里是一个简单的可视化序列，展示了 PSP 可能引发问题的场景，如图 5-1 所示。


  ![](img/525217_1_En_5_Fig1_HTML.jpg)


  PSP 可能引发问题的场景示意图。图示如下：`Exec my proc 1` 向右箭头 `seek`。


  **图 5-1**


  存储过程执行导致了一个带有 `index seek` 的计划


  在这个第一个场景中，用户执行存储过程时使用的参数值为 1（可能基于应用程序的用户输入）。过程中使用此参数值筛选行的查询被编译，查询计划使用了 `index seek`
  运算符，因为表中只有少数行匹配值 1。这个查询可能运行得极快。


  假设在不受任何人控制的情况下，内存压力导致该查询计划被从计划缓存中清除。那么，如果此时另一个用户来执行相同的存储过程，但参数为 10，会怎样呢？如图 5-2 所示。


  ![](img/525217_1_En_5_Fig2_HTML.jpg)


  另一个用户此时来执行相同存储过程但参数为 10 的场景示意图。图示如下：`Exec my proc 1` 和 `exec my proc 1` 向右箭头 `scan`。


  **图 5-2**


  相同的存储过程使用不同的参数生成了一个带有 `index scan` 的计划


  如果表中有许多行匹配值 10 作为筛选条件，在编译新计划时，优化器可能转而使用聚集 `index scan`（甚至使用并行）。这完全正常，对于使用值 10 执行过程的用户来说，性能可能被认为是正常的。现在，两个用户都被绑定到这个扫描计划中。


  那么，现在使用参数 1 执行过程的第一个用户会怎样呢？如图 5-3 所示，这种情况可能就不妙了。


  ![](img/525217_1_En_5_Fig3_HTML.jpg)


  使用参数 1 执行过程的示意图。图示如下：`Exec my proc 1` 和 `exec my proc 1` 向右箭头 `scan`。


  **图 5-3**


  第一个用户体验到由于 PSP 导致的性能下降


  一个只需查找少数几行的查询，现在可能需要扫描数百万行才能得到结果。这种行为很容易导致性能下降。很可能，使用该过程的应用程序用户会简单地说：“它突然就变慢了。”听起来熟悉吗？


  这个问题完全源于一个事实：对于特定的 T-SQL 语句，缓存中只能存在一个计划。而数据的倾斜可能意味着一个计划无法满足各种参数值的需求。并且，作为存储过程的开发者，数据倾斜并非你的错。因此，与其面对你可能遇到的各种变通方法和性能调优的困扰，不如让我们看看
  `SQL Server 2022` 中针对此问题的一个解决方案，坦率地说，这是一个“改变游戏规则”的方案。


  '
- "# 一切如何开始\n\n2020 年初，我在德克萨斯州欧文市的微软办公室。那时，我在 CSS 团队所在的大楼里有一间真正的办公室。由于我为 CSS 工作了多年，当我加入工程团队时，他们让我保留了办公室。那时，我的一位前\
  \ CSS 同事，Jack Li，也作为一名开发人员加入了工程部。他也在欧文办公室保留了一个工位。当时天色已晚，我正准备离开，顺道去 Jack 的工位看看他在不在。幸运的是他在，于是我们聊了一会儿家常、一些在\
  \ CSS 时的趣事，以及我们各自在工程部门的工作情况。然后我对 Jack 说：*“嘿*，你最近在忙什么？” 他是个非常谦虚的人，但他说：*“嗯*，实际上是件大事。我正在写一些代码来解决参数嗅探问题。”\
  \ 我停顿了一下消化这个信息，然后说了类似*“你在开玩笑吧。我想了解更多。” 可能让我们俩的妻子都懊恼的是，接下来的两个小时我们一直待到很晚在讨论这个项目。结束时，我记得对他说：*“Jack，这可是主题演讲级别的演示材料。当你展示这个时，SQL\
  \ 世界会为之沸腾。”*\n\n正如你可以从时间线想象到的，世界有点乱套了，我与 Jack 关于此事的讨论也就搁置了。时间快进到 2021 年春天，我收到了 Jack\
  \ 的一封电子邮件：*“嘿，Bob，还记得我之前在研究的参数嗅探项目吗？嗯，它要实现了，我们认为可以把它放进项目 Dallas*。” Jack 将此解决方案称为**参数敏感计划\
  \ (PSP) 优化**。那天我的工作都停了。我立刻打电话给他了解细节。当我们谈完，我知道我确实拥有了一个主题演讲级别的演示，以及 `SQL Server 2022`\
  \ 一个主要功能的亮点。\n\n注意\n在主题演讲中展示这个功能确实在 2021 年的 PASS Community Summit 上发生了。感谢 Jack 给了我可以在主题演讲中使用的演示。主题演讲是虚拟的，但做起来仍然很棒。请查看此视频链接\
  \ [`https://youtu.be/Ydlg1KpmrKU`](https://youtu.be/Ydlg1KpmrKU) 并快进到大约 17 分钟处。Peter\
  \ Carlin 介绍我来演示这项新功能，当然，即使我们不在同一个房间或城市，康纳和鲍勃的节目也必须存在！\n\n### PSP 优化如何工作？\n\nPSP\
  \ 优化的概念简单而强大。\n\n> 注意\n>\n> 我要事先向您说明，我们确实不确定能否解决所有的 PSP 问题。我们知道这项工作的初版存在局限性。但我们确实相信，对于受参数探查影响的应用程序，它有真正的可能性产生积极影响。\n\
  \n要实现 PSP 优化，我们已在查询处理器中为查询计划构建了新的概念。一个`调度程序`查询计划是`参数化`SQL 语句的父查询计划，并存储在`计划缓存`中。参数化语句可以存在于存储过程中，由应用程序参数化，甚至可以由\
  \ SQL Server 引擎自动参数化。您可以在 [`https://docs.microsoft.com/sql/relational-databases/performance/parameter-sensitivity-plan-optimization?#understanding-parameterization`](https://docs.microsoft.com/sql/relational-databases/performance/parameter-sensitivity-plan-optimization?#understanding-parameterization)\
  \ 阅读更多关于参数化的内容。\n\n调度计划本身不用于执行。相反，一个调度计划可以有多个`变体`计划。变体计划是基于参数化查询中使用的`谓词`或过滤器的值桶（bucket）或范围创建的。图\
  \ 5-4 展示了调度器和变体如何工作的示意图。\n\n![](img/525217_1_En_5_Fig4_HTML.png)\n\n调度器与变体工作原理图表。参数化查询导向调度计划。调度计划导向针对少于\
  \ 1 万条列表的查询变体代理、针对 1 万到 100 万条列表的查询变体代理、针对大于或等于 1 千条列表的查询变体代理等。\n\n图 5-4\n\nPSP\
  \ 优化下的调度器与查询变体\n\n在此图中，您可以看到有三个变体，每个变体对应一个查询，覆盖匹配某个谓词或过滤器的特定“范围”（即值桶）。这个概念有趣的地方在于，它也可以帮助解决我在第\
  \ 4 章讨论的一些`内存授予`问题。这是因为每个变体计划在`计划缓存`中是“其自身的计划”，即使两个变体使用了类似的`计划形状`（例如，索引扫描），它们也可以包含不同的内存授予。\n\
  \n> 注意\n>\n> 图 5-4 是一个展示调度器和变体概念的图表。调度器可以使用多少个变体或桶的设计是内部实现，且未公开记录。\n\n当查询首次编译时，查询处理器可以识别参数化语句，检查它是否符合调度器和查询变体的条件。第一次执行将产生一个调度器和一个变体。如果使用落入另一个桶的不同参数执行同一语句，则可以编译新的变体计划并将其存储到缓存中。\n\
  \n调度器和变体计划不会被持久化。它们只存在于计划缓存中，但可以在需要时通过新的编译重新构建。变体计划也可以根据需要单独重新编译。\n\n让我们回顾一下本节前面展示\
  \ PSP 问题的可视化场景。在相同的场景中，如果启用了 `dbcompat 160`，现在的情况如图 5-5 所示。\n\n![](img/525217_1_En_5_Fig5_HTML.jpg)\n\
  \n允许缓存中存在多个计划的 PSP 优化示意图。示意图如下：`exec my_proc_1` 向右箭头 寻找，`exec my_proc_10` 向右箭头 扫描。\n\
  \n图 5-5\n\nPSP 优化允许缓存中存在多个计划\n\n无需更改代码，优化器就可以使用变体，为存储过程或参数化语句在缓存中保留多个计划。了解 PSP 优化工作原理的最好方法莫过于亲自尝试。\n\
  \n### 让我们看看 PSP 优化的实际应用\n\n这个练习有一长串步骤，但我认为您会发现它值得一试。\n\n#### 先决条件\n\n要进行此练习，您需要满足以下先决条件：\n\
  \n*   `SQL Server 2022 评估版`。\n*   虚拟机或计算机，至少配备 2 个 CPU 和 8GB 内存。\n*   `SQL Server\
  \ Management Studio (SSMS)`。最新的 18.x 或 19.x 版本均可。\n*   从 [`https://aka.ms/ostress`](https://aka.ms/ostress)\
  \ 下载 `ostress.exe`。使用下载的 `RMLSetup.msi` 文件进行安装。使用所有默认设置。仅在 Windows 系统上下载此工具。以下部分练习仅在\
  \ Windows 系统上运行。\n*   从本书 GitHub 仓库的 `ch05_builtinqueryintelligence_getsbetter\\\
  pspopt` 目录获取脚本副本。\n\n#### 遵循以下练习步骤\n\n请遵循以下步骤，了解 PSP 优化如何工作：\n\n![](img/525217_1_En_5_Fig6_HTML.jpg)\n\
  \n一个使用索引查找的查询计划流程图。其中包含：键查找（聚集，StockItems.PK_Warehouse，成本 33%，0.000 秒，3/3，100%）、索引查找（非聚集，StockItems.FK_Warehouse，成本\
  \ 15%，0.000 秒，3/3，100%），这些操作导向嵌套循环，等等。\n\n图 5-6\n\n存储过程参数的索引查找计划\n\n1.  从 [`https://aka.ms/WideWorldImporters`](https://aka.ms/WideWorldImporters)\
  \ 下载 WideWorldImporters 的备份副本。下一步中的脚本假设备份文件位于 `c:\\sql_sample_databases`。你也可以使用一个预加载了扩展数据的定制备份，可从\
  \ [`https://github.com/microsoft/sqlworkshops-sql2022workshop/releases`](https://github.com/microsoft/sqlworkshops-sql2022workshop/releases)\
  \ 获取。\n\n2.  还原 WideWorldImporters 示例备份。你可以编辑并使用 `restorewwi.sql` 脚本。此脚本专为 Azure\
  \ 虚拟机市场映像上的 SQL Server 设计，该映像为数据和日志文件提供了单独的磁盘。请编辑此文件以匹配你的文件路径。此脚本包含以下 T-SQL 语句：\n\
  \n    ```\n    USE master;\n    GO\n    DROP DATABASE IF EXISTS WideWorldImporters;\n\
  \    GO\n    -- 编辑文件位置以匹配你的存储\n    RESTORE DATABASE WideWorldImporters FROM DISK\
  \ = 'c:\\sql_sample_databases\\WideWorldImporters-Full.bak' with\n    MOVE 'WWI_Primary'\
  \ TO 'e:\\data\\WideWorldImporters.mdf',\n    MOVE 'WWI_UserData' TO 'e:\\data\\\
  WideWorldImporters_UserData.ndf',\n    MOVE 'WWI_Log' TO 'f:\\log\\WideWorldImporters.ldf',\n\
  \    MOVE 'WWI_InMemory_Data_1' TO 'e:\\data\\WideWorldImporters_InMemory_Data_1',\n\
  \    stats=5;\n    GO\n    ```\n\n3.  执行 `populatedata.sql` 脚本，向 `Warehouse.StockItems`\
  \ 表加载更多数据。此脚本需要运行 5-10 分钟（具体时间取决于 CPU 数量和磁盘速度）。此脚本执行以下 T-SQL 语句（练习中不会为我最喜欢的运动队道歉），这些语句向\
  \ Warehouse.StockItems 表添加数据以创建数据倾斜场景：\n\n    ```\n    USE WideWorldImporters;\n\
  \    GO\n    -- 添加 StockItems 以在供应商中造成数据倾斜\n    --\n    DECLARE @StockItemID int;\n\
  \    DECLARE @StockItemName varchar(100);\n    DECLARE @SupplierID int;\n    SELECT\
  \ @StockItemID = 228;\n    SET @StockItemName = 'Dallas Cowboys Shirt'+convert(varchar(10),\
  \ @StockItemID);\n    SET @SupplierID = 4;\n    DELETE FROM Warehouse.StockItems\
  \ WHERE StockItemID >= @StockItemID;\n    SET NOCOUNT ON;\n    BEGIN TRANSACTION;\n\
  \    WHILE @StockItemID <= 8000000\n    BEGIN\n    INSERT INTO Warehouse.StockItems\n\
  \    (StockItemID, StockItemName, SupplierID, UnitPackageID, OuterPackageID, LeadTimeDays,\n\
  \    QuantityPerOuter, IsChillerStock, TaxRate, UnitPrice, TypicalWeightPerUnit,\
  \ LastEditedBy\n    )\n    VALUES (@StockItemID, @StockItemName, @SupplierID, 10,\
  \ 9, 12, 100, 0, 15.00, 100.00, 0.300, 1);\n    SET @StockItemID = @StockItemID\
  \ + 1;\n    SET @StockItemName = 'Dallas Cowboys Mug'+convert(varchar(10), @StockItemID);\n\
  \    END;\n    COMMIT TRANSACTION;\n    SET NOCOUNT OFF;\n    GO\n    ```\n\n4.\
  \  使用脚本 `rebuild_index.sql` 重建与表关联的索引。\n\n    **重要提示** 如果错过此步骤，将无法看到 PSP 优化带来的性能提升。此脚本使用以下\
  \ T-SQL 语句：\n\n    `USE WideWorldImporters;`\n    `GO`\n    `ALTER INDEX FK_Warehouse_StockItems_SupplierID\
  \ ON Warehouse.StockItems REBUILD;`\n    `GO`\n\n5.  使用脚本 `proc.sql` 创建一个用于练习的新过程。此脚本使用以下\
  \ T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    CREATE OR ALTER\
  \ PROCEDURE [Warehouse].[GetStockItemsbySupplier]  @SupplierID int\n    AS\n   \
  \ BEGIN\n    SELECT StockItemID, SupplierID, StockItemName, TaxRate, LeadTimeDays\n\
  \    FROM Warehouse.StockItems s\n    WHERE SupplierID = @SupplierID\n    ORDER\
  \ BY StockItemName;\n    END;\n    GO\n    ```\n\n    可以看到，此存储过程接受单个参数 `@SupplierID`，并将使用此参数作为谓词或筛选器来查找\
  \ `StockItems` 表中的行。\n\n6.  使用 SSMS 执行脚本 `setup.sql`。这将确保 `WideWorldImporters` 数据库处于\
  \ `dbcompat` 150（因此最初未启用 PSP）并清空查询存储。此脚本使用以下 T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n\
  \    GO\n    ALTER DATABASE current SET COMPATIBILITY_LEVEL = 150;\n    GO\n   \
  \ ALTER DATABASE current SET QUERY_STORE CLEAR;\n    GO\n    ```\n\n7.  在 SSMS 中打开一个新的查询编辑器窗口（我喜欢在对象资源管理器中选择数据库，然后使用文件\
  \ ➤ 新建 ➤ 数据库引擎查询菜单），并选择菜单上的“包括实际执行计划”按钮。在 SSMS 的查询窗口中执行脚本 `query_plan_seek.sql`\
  \ 两次。该脚本使用以下 T-SQL 语句：\n\n    ```\n    USE WideWorldImporters;\n    GO\n    SET\
  \ STATISTICS TIME ON;\n    GO\n    USE WideWorldImporters;\n    GO\n    -- 此参数的最佳计划是索引查找\n\
  \    EXEC Warehouse.GetStockItemsbySupplier 2;\n    GO\n    ```\n\n    注意查询执行速度很快（<\
