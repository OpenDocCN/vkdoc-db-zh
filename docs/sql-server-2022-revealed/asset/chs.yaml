  \ Studio (SSMS)。最新的 18.x 或 19.x 版本均可。\n*   最新版本的 Azure Data Studio (ADS)。**这是可选的**。我已包含了一个带有此练习结果的\
  \ SQL notebook，因此如果您不想安装非 MSFT 软件，可以使用 ADS 查看结果。\n\n> 注意\n>\n> 以下先决条件适用于非 Microsoft\
  \ 软件。使用此软件不代表 Microsoft 的任何官方认可。此软件不受 Microsoft 支持，因此使用此软件出现的任何问题都由用户自行解决。\n\n*\
