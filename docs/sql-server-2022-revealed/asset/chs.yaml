  ### 关于 DOP 反馈我还应该了解什么？


  在您利用此功能时，关于 DOP 反馈，您需要了解以下几个关键点：


  *   如果您将数据库作用域的配置值 `DOP_FEEDBACK` 设置为 `OFF`，且反馈信息尚未持久化，那么反馈将会丢失，这相当于您“重置了系统”。如果反馈已持久化，那么查询将恢复到“默认”的
  DOP 行为，但反馈不会丢失。如果您再次将其开启，则将使用 DOP 反馈。


  *   如果反馈未持久化，那么任何重新编译都会导致“重新开始”。如果反馈已持久化，那么反馈在重启或重新编译后依然存在，这正是使用 `查询存储` 来保存反馈的好处。


  *   查询执行时的当前数据库上下文是考虑 DOP 反馈的基础。因此，如果您执行一个跨越多个数据库的查询，并且该数据库的 `DOP_FEEDBACK` 设置为
  `ON`，则使用您执行查询时的数据库上下文。


  *   使用临时表的查询符合 `DOP_FEEDBACK` 的条件。我修改了前面的练习，在存储过程中使用了临时表，并完成了整个练习。其行为与使用用户表时相同。


  *   我之前提到过原始 DOP 以及使用 DOP 反馈的优先级顺序。假设数据库选项 `DOP_FEEDBACK` 处于开启状态，并且您没有使用 `DISABLE_DOP_FEEDBACK`
  查询提示，我们将根据您对查询提示、资源组、数据库作用域配置或实例配置的设置，“开始”用于反馈考虑的基线 DOP。


  例如，如果您没有使用查询提示，也没有使用其他任何配置值，只是将‘最大并行度’设置为 8，我们将从 8 开始 DOP 反馈的基线（即使您的 CPU 数量超过 8
  个）。


  *   在 SQL Server 2017 中，我们引入了自动计划修正（`APRC`）的概念，它同样利用了 `查询存储`。其概念是，如果发生性能回退，则自动恢复到“最后已知的良好”计划。如果您启用了
  `APRC`，它的优先级将高于使用 DOP 反馈。您可以在 `https://docs.microsoft.com/sql/relational-databases/automatic-tuning/automatic-tuning?#automatic-plan-correction.ack`
  了解更多关于 `APRC` 的信息。


  请在 `https://aka.ms/dopfeedback` 获取所有关于 DOP 反馈的最新文档和更新。


  ## 为您服务的引擎


  想想如今融入 SQL Server 2022 内置查询智能的所有创新。


  从 `SQL Server 2016` 开始，我们引入了 `查询存储`，现在，在 SQL Server 2022 中，借助提示、对只读副本的支持以及与 `IQP`
  的集成，它变得比以往任何时候都更强大、更可用。


  在 `SQL Server 2017` 中，我们引入了以下 `IQP` 功能：


  *   自适应联接


  *   交错执行


  *   批处理模式的内存授予反馈


  然后在 `SQL Server 2019` 中，我们添加了


  *   行模式的内存授予反馈


  *   用于行模式查询（非列存储查询）的批处理模式


  *   标量 UDF 内联


  *   表变量延迟编译


  *   近似 COUNT DISTINCT


  而现在在 `SQL Server 2022` 中，随之而来的是


  *   近似百分位数


  *   优化的计划强制


  *   DOP 反馈


  *   内存授予百分位数和持久化


  *   参数敏感型计划优化


  *   CE 反馈


  我知道我有偏见，但对我来说，这就是一个为您服务的引擎。除了为近似函数编写示例之外，这些功能中的每一个都不需要任何代码更改。而且这些并非特殊的附加功能。它们被内置于引擎的核心中，存在于
  SQL 所在的任何地方。它们是我们产品中基于现实场景的最亮点创新领域之一，这些场景您每天都会遇到。


  我认为微软技术院士 Hanuma Kodavalla 总结得最好，他告诉我：


  > 查询的能力是关系数据库区别于其他数据库的关键，而 SQL Server 提供了业界最复杂的查询处理引擎之一。SQL Server 的工程师和项目经理例行使用从数百万个云数据库（规模从几
  GB 到一百 TB 不等）收集的遥测数据，这些数据库运行着广泛的工作负载——OLTP、数据仓库、HTAP——以理解常见的查询模式，并设计改进查询性能的功能。由此产生了
  SQL Server 2022 的许多功能——参数敏感型计划、基数估计反馈、近似查询处理、优化的计划强制、可读辅助副本上的 QDS、对 QDS 提示的改进、内存授予反馈以及智能选择并行度。在所有这些功能中，一个不变的主题是开发创新的算法，这些算法能在运行时适应各种查询模式和系统负载，从而得出更好的计划并提高查询执行效率。由于这些功能，工作负载通常能在不要求应用程序进行任何更改的情况下看到显著的性能提升。此外，所有这些功能在发布给
  SQL Server 2022 客户之前，都已在云中部署并在关键任务工作负载上进行了测试，因此它们都已准备好在生产环境中使用。


  '
- "# 6. SQL Server 的核心基础\n\n几年前，我正在为 PASS 大会主题演讲中著名的“Conor and Bob”环节做准备。我构思了一个涉及机器学习、分析和其他类型新功能的复杂想法。当我展示给\
  \ Conor 看时，他只是简单地说：“Bob，我认为我们的环节应该坚持核心基础。” 作为德克萨斯人，我明白他的意思。要突出 SQL Server 的 `核心引擎`\
  \ 能力。\n\n当然，SQL 在机器学习和分析等方面具有核心能力，但 Conor 真正指的是安全性、可扩展性（性能）和可用性。对于每一个主要版本，我们都必须在这三个领域进行投资，否则我们实际上就没有一个真正的引擎。\n\
  \n## 核心引擎是 SQL Server 的核心基础\n\n本章节完全关于核心引擎领域：安全性、可扩展性（性能）和可用性——外加一些不完全属于这些类别的其他“内容”。内置查询智能无疑是核心引擎的一部分，但它值得拥有自己的章节。在这里，我将涵盖所有有助于实现以下目标的新功能：\n\
  \n*   保护您的应用程序和数据安全。\n\n*   确保您的应用程序能够扩展并保持高性能。\n\n*   确保您的应用程序具有高可用性。\n\n然后是一个对引擎来说纯粹是“锦上添花”的功能列表。您开始阅读本章时可能会觉得这只是“一个功能列表”。但本章中的每一个新增强都有其背后的故事和原因。我会尝试为许多这些新功能提供这些细节。这些类别没有特定的顺序，但我通常从安全性开始。\n\
  \n## 安全性\n\n我一直认为我们的工程团队非常重视安全性，不仅因为十多年来我们一直是业界漏洞最少的数据库（这不是我们发布的——您可以自行从美国国家标准与技术研究院综合漏洞数据库查看），还因为我们不断投入新功能来帮助保护应用程序和数据更加安全。\n\
  \n对于 SQL Server 2022，这包括数据完整性、加密和授权方面的增强。这一切都始于一项名为 `SQL Server 总账` 的革命性创新。\n\n\
  注意\n\n我认为 `Azure Active Directory (AAD)` 身份验证、`Microsoft Purview` 策略管理和 `Microsoft\
  \ Defender` 都属于“安全”功能。但这些在本书第 3 章中有更详细的介绍。\n\n\n\n### SQL Server 的账本\n\nSQL Server\
  \ 的账本是存储在 SQL Server 数据库中的防篡改数据记录。区块链技术的发明旨在提供一个*数字账本*，它使用加密哈希来确保交易的有效性和可信度。最初的区块链概念在\
  \ 2000 年代末为支持加密货币比特币而进入公众视野。事实上，当我与一些人谈论*区块链*这个术语时，他们似乎认为区块链就等于比特币。然而，数字账本的概念除了支持比特币交易外，还有许多其他应用。区块链的一个主要优势在于，它允许多方参与一个交易系统，其中没有任何一方可以被信任来管理数据的真实性。许多区块链实施面临的一个挑战是，它们是去中心化的，需要分布式算法，这常常导致性能问题并妨碍数据管理能力。而性能和数据管理能力正是\
  \ SQL Server 擅长的两个方面。\n\n#### SQL Server 账本的背景\n\n2018 年，微软开始探索区块链和关系数据库的世界是否能融合成一个数字账本解决方案。根据微软首席软件工程师\
  \ Panagiotis Antonopoulos 的说法：\n\n> *2018 年，我们与微软研究院一起，开始致力于寻找一种架构，以弥合区块链与关系数据库之间的鸿沟，从而提供两种技术的优势。我们评估了不同的设计选项，包括让\
  \ SQL Server 在去中心化配置中运行（使用区块链的高级共识算法），或在更符合传统 SQL Server 设置的中心化环境中运行。我们分析了这些选项的技术可行性，并与大量区块链客户进行了交流，以了解他们在采用该技术时面临的挑战。这是一个非常有教育意义的过程，它让我们清楚地认识到，去中心化尽管有其安全优势，却使得区块链的开发和管理变得昂贵而复杂，给企业客户的采用带来了巨大阻力。*\n\
  \n> **注意**\n>\n> 如果你认出 Panagiotis Antonopoulos 这个名字，他是我们在 SQL Server 2019 中引入的极其酷炫的技术——加速数据库恢复（ADR）的主要开发者之一。他就是在构建出色的软件！\n\
  \n这项研究努力促成了 SQL Server 账本的开发。这项工作最初在 Azure SQL Database 中开始。你可以在 [`https://aka.ms/sqlledgerpaper`](https://aka.ms/sqlledgerpaper)\
  \ 阅读关于原始项目的介绍。\n\nSQL Server 的账本使用了成熟的区块链技术，如加密数据结构（例如哈希链和 Merkle 树）。（如果你感兴趣，白皮书详细介绍了什么是\
  \ Merkle 树。）SQL Server 账本的关键之一是充分利用……嗯，SQL Server。SQL Server 的账本内置于产品本身，无需更改应用程序、特殊提供程序或代码。只需使用\
  \ T-SQL。\n\nPanagiotis 总结了 SQL Server 账本的强大之处：*“尽管数据是集中存储的，但各个组织可以使用这些摘要来验证数据完整性。这种解决方案的简单性和透明度使我们能够将区块链商品化，并使所有\
  \ SQL 用户能够以极低的成本和复杂性利用其优势。”*\n\n由于这种能力，我喜欢将账本视为一种**数据完整性**的形式。让我们看看它是如何工作的，以了解原因。\n\
  \n#### 工作原理\n\nSQL Server 的账本由以下组件构成：\n\n*   `Ledger tables`（账本表）\n    *   用户使用\
  \ `CREATE TABLE` 语法的扩展来创建账本表。账本表可以是*可更新的*或*仅追加的*。可更新的账本表非常适合审计场景。仅追加表只允许 `INSERT`\
  \ 语句，这可以是多方信任场景的一个很好的解决方案。\n*   `Ledger history tables`（账本历史表）\n    *   可更新的账本表具有类似时间表的内置历史记录，但附带额外的事务信息，这些信息与发起更改的\
  \ SQL 主体相关联。\n*   `Ledger views`（账本视图）\n    *   当你创建一个账本表时，我们会自动构建一个视图，该视图将账本表与账本历史表连接起来，以提供一个整合的视图。\n\
  *   `Database ledger`（数据库账本）\n    *   *数据库账本*是一组系统表，包含数据库中所有账本表的所有事务的详细信息、加密哈希和\
  \ Merkle 树。这是提供数据防篡改记录的关键组件之一。\n*   `Digests`（摘要）\n    *   数据库账本中最新区块的哈希称为数据库**摘要**。它代表了该区块生成时数据库中所有账本表的状态。我喜欢将摘要视为数据库中区块链的*校验和*。摘要是实现防篡改记录的另一个关键组件，因为它是生成并存储在\
  \ SQL Server *之外*的。\n\n图 6-1 展示了这些组件如何为一个可更新的账本表协同工作。\n\n![](img/525217_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n带有可更新账本的 SQL Server\n\n在这个例子中，对于像银行这样的公司，他们可以简单地使用 `CREATE TABLE` 的这个扩展来创建一个可更新的账本表：\n\
  \n```\nWITH\n(\nSYSTEM_VERSIONING = ON,\nLEDGER = ON\n);\n```\n\nSQL Server 将自动创建一个历史表和一个与该账本表对应的账本视图。\n\
  \n当对表进行任何修改（`INSERT`、`UPDATE` 或 `DELETE`）时，每个事务的审计记录和加密哈希都会记录在数据库账本以及区块链的区块中。\n\n\
  摘要（实际上是 JSON 数据）可以手动或自动在单独的存储位置生成。这使得像银行监管机构这样的人可以使用摘要来随时验证账本的完整性。\n\n图 6-2 展示了仅追加账本表的组件。\n\
  \n![](img/525217_1_En_6_Fig2_HTML.jpg)\n\n图 6-2\n用于仅追加账本表的 SQL Server\n\n仅追加账本表不需要历史表，因为你只能执行\
  \ `INSERT` 语句。仅追加账本表非常适合多方场景，因为没有任何一方可以“更新”账本表。只允许保留新记录的历史记录（即使是拥有 `sysadmin` 权限的\
  \ DBA 也无法进行更新以伪造账本）。\n\n考虑到这些组件，以下是账本如何提供数据完整性、信任和数据防篡改记录的：\n\n*   账本表具有内置的审计功能，因此你可以看到对表的每次修改的确切日期时间和\
  \ SQL 主体。\n*   仅追加账本表通过只允许 `INSERT` 语句，只允许“向记录添加内容”。\n*   你可以随时通过数据库账本中的加密哈希来验证没有人篡改账本表（例如，在引擎底层）。\n\
  *   存储在账本之外的摘要可用于验证没有人篡改数据库账本。\n\n为了更详细地了解这些组件如何工作，让我们尝试一个例子。\n\n\n## 练习：将账本用于 SQL\
  \ Server\n\n让我们通过一个练习来看看账本是如何工作的。本练习分为四个部分：使用可更新账本表、使用仅追加账本表、防止删除账本表，以及一个有趣的例子——我尝试“入侵”账本。\n\
  \n### 前提条件\n\n*   SQL Server 2022 评估版。您必须将 `SQL Server` 配置为混合模式身份验证。\n*   虚拟机或计算机，至少配备两个\
  \ CPU 和 8GB 内存。\n*   SQL Server Management Studio (`SSMS`)。最新的 `SSMS` 18.x 版本可用，但\
  \ `SSMS` 19.x 版本对账本表提供了新的可视化效果，因此本练习中的示例是使用最新的 `SSMS` 19.x 构建版本完成的。\n*   从书的示例文件\
  \ `ch06_meatandpotatoes\\security\\sqlledger` 获取本练习的脚本。\n\n注意：本练习中的任何可识别姓名或信息纯属虚构，不代表任何真实人物。\n\
  \n### 设置练习\n\n我们将创建两个新的 SQL 登录名和一个数据库用于练习：\n\n1.  执行脚本 `addsysadminlogin.sql` 以添加一个系统管理员\
  \ SQL 登录名。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE master;\nGO\n-- 为 bob 创建登录名并使其成为系统管理员\n\
  IF EXISTS (SELECT * FROM sys.server_principals WHERE NAME = 'bob')\nBEGIN\n    DROP\
  \ LOGIN bob;\nEND\nCREATE LOGIN bob WITH PASSWORD = N'StrongPassw0rd!';\nEXEC sp_addsrvrolemember\
  \ 'bob', 'sysadmin';\nGO\n```\n\n2.  使用您在步骤 1 中创建的 SQL 登录名 `bob` 登录。通过执行脚本 `createdb.sql`\
  \ 创建数据库并为“应用”添加一个登录名。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE master;\nGO\n-- 创建 ContosoHR\
  \ 数据库\n--\nDROP DATABASE IF EXISTS ContosoHR;\nGO\nCREATE DATABASE ContosoHR;\n\
  GO\nUSE ContosoHR;\nGO\n-- 为应用创建登录名\nIF EXISTS (SELECT * FROM sys.server_principals\
  \ WHERE NAME = 'app')\nBEGIN\n    DROP LOGIN app;\nEND\nCREATE LOGIN app WITH PASSWORD\
  \ = N'StrongPassw0rd!', DEFAULT_DATABASE = ContosoHR;\nGO\n-- 启用快照隔离以允许验证账本\nALTER\
  \ DATABASE ContosoHR SET ALLOW_SNAPSHOT_ISOLATION ON;\nGO\n-- 为应用登录名创建应用用户\nCREATE\
  \ USER app FROM LOGIN app;\nGO\nEXEC sp_addrolemember 'db_owner', 'app';\nGO\n```\n\
  \n### 练习 1：使用可更新账本表\n\n第一个练习的所有步骤都使用 SQL 登录名 `bob` 连接。\n\n1.  通过执行脚本 `createemployeeledger.sql`\
  \ 创建一个用于员工表的可更新账本表。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE ContosoHR;\nGO\n-- 创建 Employees\
  \ 表并将其设为可更新账本表\nDROP TABLE IF EXISTS [dbo].[Employees];\nGO\nCREATE TABLE [dbo].Employees\
  \ NOT NULL,\n    [SSN] char NOT NULL,\n    [FirstName] nvarchar NOT NULL,\n    [LastName]\
  \ nvarchar NOT NULL,\n    [Salary] [money] NOT NULL\n)\nWITH\n(\n    SYSTEM_VERSIONING\
  \ = ON,\n    LEDGER = ON\n);\nGO\n```\n\n如果您使用的是 `SSMS` 19.X，那么您可以看到账本表的可视化属性以及相应的版本表名称，如图\
  \ 6-3 所示。\n\n![](img/525217_1_En_6_Fig3_HTML.jpg)\n\n图 6-3 `SSMS` 对象资源管理器中的账本表和视图\n\
  \n2.  使用脚本 `populateemployees.sql` 填充初始员工数据。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE ContosoHR;\n\
  GO\n-- 清除 Employees 表\nDELETE FROM [dbo].[Employees];\nGO\n-- 插入 10 名员工。姓名和社会安全号码完全是虚构的，与任何真实人物无关\n\
  DECLARE @SSN1 char(11) = '795-73-9833'; DECLARE @Salary1 Money = 61692.00; INSERT\
  \ INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN1,\
  \ 'Catherine', 'Abel', @Salary1);\nDECLARE @SSN2 char(11) = '990-00-6818'; DECLARE\
  \ @Salary2 Money = 990.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName], [LastName],\
  \ [Salary]) VALUES (@SSN2, 'Kim', 'Abercrombie', @Salary2);\nDECLARE @SSN3 char(11)\
  \ = '009-37-3952'; DECLARE @Salary3 Money = 5684.00; INSERT INTO [dbo].[Employees]\
  \ ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN3, 'Frances', 'Adams',\
  \ @Salary3);\nDECLARE @SSN4 char(11) = '708-44-3627'; DECLARE @Salary4 Money = 55415.00;\
  \ INSERT INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary]) VALUES\
  \ (@SSN4, 'Jay', 'Adams', @Salary4);\nDECLARE @SSN5 char(11) = '447-62-6279'; DECLARE\
  \ @Salary5 Money = 49744.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName],\
  \ [LastName], [Salary]) VALUES (@SSN5, 'Robert', 'Ahlering', @Salary5);\nDECLARE\
  \ @SSN6 char(11) = '872-78-4732'; DECLARE @Salary6 Money = 38584.00; INSERT INTO\
  \ [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN6, 'Stanley',\
  \ 'Alan', @Salary6);\nDECLARE @SSN7 char(11) = '898-79-8701'; DECLARE @Salary7 Money\
  \ = 11918.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary])\
  \ VALUES (@SSN7, 'Paul', 'Alcorn', @Salary7);\nDECLARE @SSN8 char(11) = '561-88-3757';\
  \ DECLARE @Salary8 Money = 17349.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName],\
  \ [LastName], [Salary]) VALUES (@SSN8, 'Mary', 'Alexander', @Salary8);\nDECLARE\
  \ @SSN9 char(11) = '904-55-0991'; DECLARE @Salary9 Money = 70796.00; INSERT INTO\
  \ [dbo].[Employees] ([SSN], [FirstName], [LastName], [Salary]) VALUES (@SSN9, 'Michelle',\
  \ 'Alexander', @Salary9);\nDECLARE @SSN10 char(11) = '293-95-6617'; DECLARE @Salary10\
  \ Money = 96956.00; INSERT INTO [dbo].[Employees] ([SSN], [FirstName], [LastName],\
  \ [Salary]) VALUES (@SSN10, 'Marvin', 'Allen', @Salary10);\nGO\n```\n\n3.  使用脚本\
  \ `getallemployees.sql` 检查员工表中的数据。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE ContosoHR;\n\
  GO\n-- 使用 * 表示所有列\nSELECT * FROM dbo.Employees;\nGO\n-- 列出所有列\nSELECT EmployeeID,\
  \ SSN, FirstName, LastName, Salary,\n    ledger_start_transaction_id, ledger_end_transaction_id,\
  \ ledger_start_sequence_number,\n    ledger_end_sequence_number\nFROM dbo.Employees;\n\
  GO\n```\n\n请注意，有一些“隐藏”列，如果您执行 `SELECT *` 则不会显示。其中一些列是 `NULL` 或 0，因为尚未对数据进行任何更新。您通常不会使用这些列，但可以使用账本视图查看有关员工表更改的信息。\n\
  \n4.  通过执行脚本 `getemployeesledger.sql` 查看员工账本视图。此脚本执行以下 T-SQL 语句：\n\n```sql\nUSE\
  \ ContosoHR;\nGO\nSELECT * FROM dbo.Employees_Ledger;\nGO\n```\n\n这是一个使用员工表和账本*版本*表的视图。请注意，账本包含了来自表中隐藏列的事务信息，以及对特定行执行的操作类型指示。\n\
  \n5.  让我们通过执行脚本 `getemployeesledgerview.sql` 来查看账本视图的定义。此脚本执行以下 T-SQL 语句：\n\n"
- "# 使用 SQL Server Ledger 进行数据审计\n\n```\nUSE [ContosoHR];\nGO\nsp_helptext 'Employees_ledger';\n\
  GO\n该查询的结果应类似于以下 T-SQL 代码：\nCREATE VIEW [dbo].[Employees_Ledger] AS\nSELECT [EmployeeID],\
  \ [SSN], [FirstName], [LastName], [Salary], [ledger_start_transaction_id] AS [ledger_transaction_id],\
  \ [ledger_start_sequence_number] AS [ledger_sequence_number], 1 AS [ledger_operation_type],\
  \ N'INSERT' AS [ledger_operation_type_desc]\nFROM [dbo].[Employees]\nUNION ALL\n\
  SELECT [EmployeeID], [SSN], [FirstName], [LastName], [Salary], [ledger_start_transaction_id]\
  \ AS [ledger_transaction_id], [ledger_start_sequence_number] AS [ledger_sequence_number],\
  \ 1 AS [ledger_operation_type], N'INSERT' AS [ledger_operation_type_desc]\nFROM\
  \ [dbo].[MSSQL_LedgerHistoryFor_901578250]\nUNION ALL\nSELECT [EmployeeID], [SSN],\
  \ [FirstName], [LastName], [Salary], [ledger_end_transaction_id] AS [ledger_transaction_id],\
  \ [ledger_end_sequence_number] AS [ledger_sequence_number], 2 AS [ledger_operation_type],\
  \ N'DELETE' AS [ledger_operation_type_desc] FROM [dbo].[MSSQL_LedgerHistoryFor_901578250]\n\
  ```\n\n让我们分解一下视图是如何构建结果的。`Employees` 日志表中的任何行都是 `INSERT`。历史表（`MSSQL_LedgerHistoryFor_901578250`）中的任何\
  \ `UPDATE` 都对应一个 `INSERT` 和一个 `DELETE`，而任何 `DELETE` 在历史表中都记录为 `DELETE`。请注意，历史表的名称始终是\
  \ `MSSQL_LedgerHistoryFor_<object id>`，其中 `<object id>` 是基础日志表的 `object_id`。使用 `UNION\
  \ ALL` 将它们组合在一起。\n\n6. 让我们使用日志视图来获取更多与日志表关联的事务审计信息，执行脚本 `viewemployeesledgerhistory.sql`。此脚本执行以下\
  \ T-SQL 语句：\n\n```\nUSE ContosoHR;\nGO\nSELECT e.EmployeeID, e.FirstName, e.LastName,\
  \ e.Salary,\ndlt.transaction_id, dlt.commit_time, dlt.principal_name, e.ledger_operation_type_desc,\
  \ dlt.table_hashes\nFROM sys.database_ledger_transactions dlt\nJOIN dbo.Employees_Ledger\
  \ e\nON e.ledger_transaction_id = dlt.transaction_id\nORDER BY dlt.commit_time DESC;\n\
  GO\n```\n\n在这个查询中，我引入了一个新的系统表（实际上是一个视图），称为 `database_ledger_transactions`。我们可以使用日志视图中的事务\
  \ ID 来连接此表以获取更多洞察。从这个系统表中，我们可以看到事务是何时执行的、执行更改的 SQL 主体是谁，以及该事务的加密哈希值。你可以看到 “bob”\
  \ 插入了日志表的所有行。你可以在 [`https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-ledger-transactions-transact-sql`](https://docs.microsoft.com/sql/relational-databases/system-catalog-views/sys-database-ledger-transactions-transact-sql)\
  \ 查看此系统表的完整定义。\n\n7. 让我们生成一个摘要以确保我们可以验证日志，执行脚本 `generatedigest.sql`。此脚本执行以下 T-SQL\
  \ 语句：\n\n```\nUSE ContosoHR;\nGO\nEXEC sp_generate_database_ledger_digest;\nGO\n\
  ```\n\n此过程的结果是 JSON 数据。此时你可以验证日志，但我们将在这次更新后再次运行此命令以验证日志，因此你不需要保存此查询的输出。\n\n8. 你可以通过执行脚本\
  \ `getledgerblocks.sql` 查看数据库日志中生成的区块链。此脚本执行以下 T-SQL 语句：\n\n```\nUSE ContosoHR;\n\
  GO\nSELECT * FROM sys.database_ledger_blocks;\nGO\n```\n\n系统表 `database_ledger_blocks`（实际上是一个视图）代表了数据库日志中的内部区块链。\n\
  \n9. 尝试更新 Jay Adams 的薪资，看看 Ledger 如何跟踪更改，执行脚本 `updatejayssalary.sql`。此脚本执行以下 T-SQL\
  \ 语句：\n\n```\nUSE ContosoHR;\nGO\nUPDATE dbo.Employees\nSET Salary = Salary + 50000\n\
  WHERE EmployeeID = 4;\nGO\n```\n\n10. 再次执行脚本 `getallemployees.sql`。如果你对 `Employees`\
  \ 表中的原始数据一无所知，你将无法知道是否发生了任何更新。\n\n11. 再次执行脚本 `viewemployeesledgerhistory.sql`。现在结果显示了我们需要的信息。我们可以看到\
  \ Jay Adams 薪资的原始 `INSERT` 记录，但我们也看到名为 bob 的人尝试直接更新它（`INSERT`/`DELETE` 组合）。\n\n\
  通过再次执行脚本 `generatedigest.sql` 生成另一个摘要。保存此输出值（包括括号）以用于验证日志。\n\n12. 你现在可以验证日志（1）在初始数据填充后和（2）在对\
  \ Jay Adam 的薪资进行更新之后。首先编辑脚本 `verifyledger.sql` 来验证日志的当前状态。在 `N' '` 引号内放入你最近保存的摘要\
  \ JSON。此脚本执行以下 T-SQL 语句：\n\n```\nUSE ContosoHR;\nGO\nEXECUTE sp_verify_database_ledger\n\
  N''\nGO\n```\n\n执行该脚本。你的输出应列出与摘要 JSON 数据中相同的 `block_id`。\n\n你现在已经验证了日志表与加密哈希、区块链和保存的摘要相匹配。你现在可以相信日志数据是准确的，即\
  \ bob 是更新 Jay Adam 薪资的人。\n\n## 练习 2：使用仅附加日志\n\n虽然 SQL Server 的 Ledger 对于审计哪个 SQL\
  \ 主体进行任何事务更改非常有用，但如果应用程序使用“应用程序登录”来执行所有 SQL 查询呢？你将如何知道发起导致数据更改操作的原始应用程序用户？\n\n对于此场景，我们将构建一个仅附加日志表，用于记录来自应用程序的信息，包括导致\
  \ SQL 更改的用户发起的应用程序操作。除了本练习中指出的一个例外情况外，请使用在第一个练习中创建的 `bob` 登录连接执行所有查询。\n\n1. 通过执行脚本\
  \ `createauditledger.sql` 创建一个用于审核应用程序的仅附加日志表。此脚本执行以下 T-SQL 语句：\n\n```\nUSE ContosoHR;\n\
  GO\n-- 创建一个仅附加日志表，用于跟踪来自应用的 T-SQL 命令以及发起事务的“真实”用户\nDROP TABLE IF EXISTS [dbo].[AuditEvents];\n\
  GO\nCREATE TABLE [dbo].AuditEvents),\n[UserName] nvarchar NOT NULL,\n[Query] nvarchar\
  \ NOT NULL\n)\nWITH (LEDGER = ON (APPEND_ONLY = ON));\nGO\n```\n\n应用程序已增强，以便针对 `Employees`\
  \ 表执行的任何事务都会在此表中插入一行。请注意，你不需要 `SYSTEM_VERSIONING` 子句。\n\n2. 现在，使用在第一个练习中创建的 `app`\
  \ 登录（此登录是在 `createdb.sql` 脚本中创建的）登录到新连接。执行脚本 `appchangemaryssalary.sql`。此脚本执行以下\
  \ T-SQL 语句：\n\n```\nUSE ContosoHR;\nGO\nUPDATE dbo.Employees\nSET Salary = Salary\
  \ + 50000\nWHERE EmployeeID = 8;\nGO\nINSERT INTO dbo.AuditEvents VALUES (getdate(),\
  \ 'bob', 'UPDATE dbo.Employees SET Salary = Salary + 50000 WHERE EmployeeID = 8');\n\
  GO\n```\n\n此脚本模拟了如果用户尝试更新 Mary 的薪资，应用程序将执行的操作。\n\n3. 使用系统管理员登录 `bob` 的连接，执行脚本 `viewemployeesledgerhistory.sql`。从结果中你可以看到\
  \ `app` 登录更改了 Mary 的薪资。这很准确，但究竟是谁真正发起了这次更改？\n\n4. 执行脚本 `getauditledger.sql`。此脚本执行以下\
  \ T-SQL 语句：\n\n```\nUSE ContosoHR;\nGO\nSELECT * FROM dbo.AuditEvents_Ledger;\n\
  GO\n```\n\n\n你可以看到，应用程序记录了 `bob` 发起了一个查询（`app` 登录记录了该查询），该查询导致了 Mary 的薪资变更。由于表是仅追加的，其他用户无法进入并尝试抹去应用程序所做操作的任何记录。\n\
  \n### 练习 3：保护 Ledger 对象\n\n在本练习中，你将学习 SQL Server 如何保护 ledger 对象。\n\n1.  执行脚本 `getledgerobjects.sql`\
  \ 以查看已创建的 ledger 表和列的历史记录。该脚本执行以下 T-SQL 语句：\n\n```sql\n    USE ContosoHR;\n    GO\n\
  \    SELECT * FROM sys.ledger_table_history;\n    GO\n    SELECT * FROM sys.ledger_column_history;\n\
  \    GO\n```\n\n2.  尝试修改或删除 ledger 对象。执行脚本 `admindropledger.sql`。该脚本执行以下 T-SQL 语句：\n\
  \n```sql\n    USE ContosoHR;\n    GO\n    -- 无法为 ledger 表关闭版本控制\n    ALTER TABLE\
  \ Employees SET (SYSTEM_VERSIONING = OFF);\n    GO\n    -- 无法删除 ledger 历史表\n   \
  \ DROP TABLE dbo.MSSQL_LedgerHistoryFor_901578250;\n    GO\n    -- 可以删除 ledger 表\n\
  \    DROP TABLE Employees;\n    GO\n    -- 但我们保留了已删除表的历史记录\n    SELECT * FROM sys.objects\
  \ WHERE name like '%DroppedLedgerTable%';\n    GO\n```\n\n从输出中你可以看到，无法为 ledger 表关闭版本控制（没有设置\
  \ `LEDGER = OFF` 的语法）。你也不能删除历史表。你可以删除 ledger 表，但我们会保留关于删除了什么的记录。而且你无法删除“已删除”的 ledger\
  \ 表。此外，即使你删除了 ledger 表，与该表关联的事务仍会保留在数据库 ledger（系统表）中。删除已存在的已删除 ledger 表的唯一方法是删除整个数据库。\n\
  \n你也可以再次执行脚本 `getledgerobjects.sql` 来查看删除历史。SSMS 中的对象资源管理器也可以向你显示哪些 ledger 表已被删除。\n\
  \n### 练习 4：被篡改的 Ledger 是什么样子？\n\n当我第一次听说 Ledger 时，我心想：“我对内部机制相当了解。我能击败这个系统吗？” 于是，我开始了一段尝试\
  \ *篡改* ledger 的旅程。\n\n我不能分享我做了什么的细节，但基本上，在一次基本的 T-SQL 更新之后，我尝试了各种 *超出支持 SQL 范围*\
  \ 的方法来 *入侵* ledger。我试图通过一种极其未记录的方式操纵数据库 ledger 系统表，来隐藏对 ledger 表的更新。我实际上找到了一种方法让它工作，直到\
  \ Panagiotis 对我说：“那摘要呢？” 说中了！我确实可以入侵 SQL Server，使其看起来我的更新从未存在过，但摘要存储在独立的存储中，所以我无法入侵它。你可以在示例目录的\
  \ T-SQL 笔记本 `ledger.ipynb` 中看到我早期尝试的结果。你也可以在 2022 年 SQLBits 主题演讲中，看到我与 Buck Woody\
  \ 现场演示，地址是 [`https://youtu.be/_R9FE2ZclVk`](https://youtu.be/_R9FE2ZclVk)（从大约 12\
  \ 分钟处开始）。\n\n#### 你还应该知道什么？\n\nSQL Server 的 Ledger 在很多方面都是一项惊人的技术。对我而言，我意识到 SQL\
  \ 现在为行业问题提供了解决方案，例如多方信任场景，这些并非 SQL 的传统解决方案。\n\n事实上，很早就有客户开始采用这项技术来解决实际问题。联想（Lenovo）看到了将其信任融入供应链的机会。他们的供应链跨越多方，但谁来监督数据？这就是\
  \ Ledger 的力量。你可以在 [`https://customers.microsoft.com/story/1497685499820529889-lenovo-manufacturing-azure-SQL-database-ledger`](https://customers.microsoft.com/story/1497685499820529889-lenovo-manufacturing-azure-SQL-database-ledger)\
  \ 阅读联想的故事。\n\n作为一个团队，我们致力于寻找新颖创新的方式，将 Ledger 引入 SQL 从未被视为解决方案的市场。\n\n为 SQL Server\
  \ 的 Ledger 添加的一个非常棒的功能是自动摘要存储。在示例中，你学习了如何手动生成和使用摘要。SQL Server 2022 可以配置为自动将摘要保存到\
  \ Azure Blob 存储。你可以在 [`https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-how-to-enable-automatic-digest-storage`](https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-how-to-enable-automatic-digest-storage)\
  \ 阅读所有细节。\n\n与任何功能一样，它存在一些限制，Ledger 也不例外。请在 [`https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-limits`](https://docs.microsoft.com/sql/relational-databases/security/ledger/ledger-limits)\
  \ 保持对所有限制的更新。\n\n当我研究 Ledger 时，我积累了一系列问题，并与 Panagiotis 和我们 Ledger 的首席项目经理 Pieter\
  \ Vanhove 一起进行了探讨：\n\n*   这与时间表有何不同？\n\n    Ledger 对于可更新的 ledger 表使用了时间表功能，但与时间表不同的是，它具有内置的审计功能并支持仅追加表。\n\
  \n*   这与 SQL Server 审计有何不同？\n\n    Ledger 将审计功能内置于事务变更中，所有审计信息都存储在数据库中。此外，所有变更都通过加密哈希和独立的摘要存储进行跟踪。一旦创建了\
  \ ledger，就无法撤销它，而拥有适当权限的系统管理员无法抹去审计记录。创建 ledger 表后，抹去它的唯一方法是完全删除数据库，但即便如此，独立的摘要仍然存在。\n\
  \n*   我需要多久保存一次摘要？\n\n    摘要是验证 ledger 未被篡改的主要机制。理论上，你需要为每个事务生成一个独立的摘要，但这不切实际。根据你验证\
  \ ledger 的业务需求，尽可能频繁地保存摘要。自动摘要管理每 30 秒保存一次摘要。\n\n*   Ledger 需要更多空间吗？\n\n    可更新的\
  \ ledger 表所需的额外空间与时间表大致相同。每个事务需要独立的系统表行来存储加密哈希。内部区块链需要最少的空间，但这取决于你保留 ledger 的时间长短。摘要本身很小，同样，你需要保留与包含\
  \ ledger 表的数据库一样长的历史记录。\n\n*   是否有任何性能影响？\n\n    我们没有针对 Ledger 运行特定的性能基准测试，因为我们认为影响会很小。考虑到仅追加的\
  \ ledger 表不应看到任何影响。可更新的 ledger 表可能会看到与时间表相同的影响。\n\n请在 [`https://aka.ms/sqlledger`](https://aka.ms/sqlledger)\
  \ 关注 SQL Server Ledger 的所有最新信息。\n\n### 加密增强功能\n\n数据加密是安全的一个关键方面，SQL Server 提供了多种不同的功能来端到端地加密数据。端到端意味着从连接到\
  \ SQL Server、SQL Server 引擎中的数据，到静态存储的数据。要了解 SQL Server 加密功能的完整阵容，请查看我们的文档：[`https://docs.microsoft.com/sql/relational-databases/security/encryption/sql-server-encryption`](https://docs.microsoft.com/sql/relational-databases/security/encryption/sql-server-encryption)。\n\
  \n在 SQL Server 2022 中，我们在加密方面有一些增强，包括 Always Encrypted 的增强、加密增强以及连接加密的增强。\n\n\n\
  ## Always Encrypted 增强功能\n\n在 SQL Server 2016 中，我们引入了一种称为 Always Encrypted 的端到端加密新概念。其核心思想是数据在客户端应用程序中加密，并且在\
  \ SQL Server 引擎中始终保持加密状态（因此得名）。此外，用于解密数据的密钥由应用程序拥有。因此，SQL Server 的管理员无法解密数据；只有应用程序能做到这一点。如果您不熟悉\
  \ Always Encrypted，可以通过访问 [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine`](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-database-engine)\
  \ 来了解如何配置和使用它。\n\n由于数据在 SQL Server 引擎内永远不会以*明文*形式出现，原始设计存在一些限制。例如，使用 `LIKE` 等运算符的查询将无法工作，因为引擎需要将数据解密为明文才能执行操作。\n\
  \n在 SQL Server 2019 中，我们通过一项称为 *secure enclaves*（安全飞地）的概念增强了 Always Encrypted。安全飞地是\
  \ SQL Server 引擎内部的一个安全内存区域。即使在数据库引擎内部，代码也无法在飞地中看到明文数据。飞地技术提供了一种方法，使 SQL Server 能够将密钥从应用程序传递到飞地中，以执行任何需要明文的操作，例如模式匹配操作。SQL\
  \ Server 2019 支持称为虚拟化飞地或 VBS 飞地的概念（Azure 则通过 Intel Software Guard Extensions (Intel\
  \ SGX) 支持硬件飞地）。由于解密发生在服务器上，我个人发现使用安全飞地还能显著提升对使用 Always Encrypted 加密的列进行的几乎所有操作的性能。\n\
  \n您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves`](https://docs.microsoft.com/sql/relational-databases/security/encryption/always-encrypted-enclaves)\
  \ 阅读关于带有安全飞地的 Always Encrypted 的完整介绍。\n\n在 SQL Server 2022 中，我们对带有安全飞地的 Always Encrypted\
  \ 进行了增强，提供了以下新功能：\n\n*   SQL Server 2022 可以在 VBS 安全飞地内使用多线程和密钥缓存，以进一步提升性能。\n*  \
  \ SQL Server 2022 可以支持新的联接类型以及 `ORDER BY` 和 `GROUP BY` 操作。此项支持与 Azure SQL Database\
  \ 的功能保持一致。\n\n## 加密功能增强\n\n我们希望确保 SQL Server 符合最新的密码学或加密标准。SQL Server 在引擎的许多不同功能中使用加密技术，包括证书和密钥支持。根据\
  \ SQL 安全方面的高级项目经理 Shoham Dasgupta 的说法，“*我们希望增强 SQL Server 中的默认加密技术*，以达到/超越行业标准，并保护客户的机密数据，以应对不断演变的威胁格局。”\n\
  \n我们内部进行的一项未对客户直接可见的增强是强化了我们的算法，以符合当前美国国家标准与技术研究院 (NIST) 的标准，具体包括：\n\n*   所有系统生成的证书的最小强度为\
  \ RSA-3072，这是 NIST 推荐的位密钥大小。\n*   增强我们用于签名生成的内部哈希算法，使用 SHA-2 512，这是一种比 SHA-1 更安全的方法。\n\
  \n另一项旨在强化安全性以符合当今标准的投资是支持个人信息交换 (PFX) 格式。SQL Server 支持在数据库引擎内创建证书来保护对象、连接和数据。SQL\
  \ Server 2022 现在支持为 PFX 创建证书。PFX 或 PKCS#12 是一种现代的证书格式，SQL Server 现在支持使用 PFX 文件，通过\
  \ `CREATE CERTIFICATE` 语句在 SQL Server 中创建证书。您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/create-certificate-transact-sql)\
  \ 阅读更多关于如何使用 PFX 文件创建证书的信息。\n\n加密方面的最后一项增强是支持将密钥备份和还原到 Azure Blob Storage 或从其还原。数据库主密钥通常用于保护凭证，例如用于外部数据源的凭证。但您经常需要将此密钥与数据库分开备份。SQL\
  \ Server 2022 现在允许您将这些密钥之一备份或还原到 Azure Blob Storage 或从其还原，而不是备份或还原到本地或网络文件路径。您可以在\
  \ [`https://docs.microsoft.com/sql/t-sql/statements/backup-master-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-master-key-transact-sql)\
  \ 阅读如何使用新的 URL 语法。对称密钥 (`SYMMETRIC keys`) 也存在相同的支持，您可以在 [`https://docs.microsoft.com/sql/t-sql/statements/backup-symmetric-key-transact-sql`](https://docs.microsoft.com/sql/t-sql/statements/backup-symmetric-key-transact-sql)\
  \ 阅读相关信息。\n\n\n#### 严格连接加密\n\n表格数据流（TDS）是应用程序连接 SQL Server 并进行数据传输所使用的 `数据协议`。自\
  \ SQL Server 成为产品以来，TDS 便已存在。随着时间的推移，TDS 通过版本号系统不断得到增强和修改。通常，随着新版本 TDS 的发布，应用程序需要使用相应的提供程序或驱动程序来支持它。微软在\
  \ 1998 年发布 SQL Server 7.0 时，将 TDS 的主版本号更改为 7.0。此后，次版本号也随之更新，最新的 TDS 7.4 支持 SQL Server\
  \ 2012 及更高版本。用户、管理员和开发人员无需了解 TDS 协议的细节，只需了解其功能变化或需要使用更新的驱动程序即可。我曾在微软担任多年的支持工程师，为了解决复杂的客户问题，我经常需要\
  \ TDS 的详细信息。您可以在 [`https://docs.microsoft.com/openspecs/windows_protocols/ms-tds/b46a581a-39de-4745-b076-ec4dbb7d13ec`](https://docs.microsoft.com/openspecs/windows_protocols/ms-tds/b46a581a-39de-4745-b076-ec4dbb7d13ec)\
  \ 自行阅读所有细节。\n\nSQL Server 2022 引入了 TDS 的一个新主版本，即 TDS 8.0。使用 TDS 7.4 的驱动程序和提供程序仍然得到完全支持。新的驱动程序理解\
  \ TDS 8.0 并能够使用此协议。推出这个新版本的主要原因是连接加密。多年来，SQL Server 一直支持应用程序与 SQL Server 之间通信的加密。与许多应用程序一样，SQL\
  \ Server 使用传输层安全性（TLS）来实现通信加密。SQL Server 始终允许应用程序通过名为 `Encrypt` 和 `TrustServerCertificate`\
  \ 的连接字符串选项来决定是否使用加密与 SQL Server 进行通信。您还可以在服务器端强制对客户端连接进行加密。这两种连接字符串的组合非常重要，您可以在\
  \ [`https://docs.microsoft.com/dotnet/framework/data/adonet/connection-string-syntax#using-trustservercertificate`](https://docs.microsoft.com/dotnet/framework/data/adonet/connection-string-syntax#using-trustservercertificate)\
  \ 阅读更多细节。\n\nTDS 8.0 引入了 `严格连接` 加密的概念。如果应用程序使用 `Encrypt = strict` 值，则会启用 TDS 8.0\
  \ 协议。这里的一个显著变化是，如果使用了严格连接加密，那么客户端和 SQL Server 之间的通信**必须**是加密的（因此称为 `strict`）。另一个重要之处在于\
  \ TDS 8.0 处理连接加密的方式。在 TDS 8.0 之前，SQL Server 会与客户端执行未加密的握手或预登录。现在，借助 TDS 8.0，该握手过程完全通过\
  \ TLS 加密。这适用于所有 TLS 版本。这一点非常重要，因为它符合 HTTPS 等协议的标准，并允许网络设备安全地传递 SQL 通信。最新的提供程序必须能够使用\
  \ TDS 8.0。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3#strict-connection-encryption`](https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3#strict-connection-encryption)\
  \ 了解更多信息。\n\n此外，但与 TDS 8.0 独立的是，SQL Server 2022 现在支持最新版本的 TLS 1.3。TLS 1.3 是最安全的\
  \ TLS 版本。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3?#differences-between-tls-12-and-tls-13`](https://docs.microsoft.com/sql/relational-databases/security/networking/tds-8-and-tls-1-3?#differences-between-tls-12-and-tls-13)\
  \ 阅读更多关于 TLS 1.2 和 1.3 之间差异的信息。\n\n注意\n\n当产品正式发布时，我们也在研究在服务器级别强制执行此选项的方法。\n\n###\
  \ 安全权限增强\n\n在 SQL Server 2022 中，我们还针对授权或权限场景引入了一些增强功能。这包括新的固定服务器级角色和用于动态数据屏蔽的新权限。\n\
  \n#### 新的固定服务器级角色\n\n直到 SQL Server 2022 之前，该产品都附带一组特定的 `固定` 服务器级角色。它们是固定的，因为您无法更改角色的访问级别或定义。它们是服务器级的，因为它们适用于整个\
  \ SQL Server 实例，而不仅仅是单个数据库。\n\n您可能熟悉其中一些角色，例如 `sysadmin`、`securityadmin`、`dbcreator`\
  \ 和 `public`。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles)\
  \ 查看这些角色的完整列表。\n\n我们长期以来从客户那里看到的一个请求是，希望我们提供的产品角色具有 `更细的粒度`——换句话说，就是拥有更少特定任务权限的更多固定角色。我在微软的同事\
  \ Andreas Wolter 就 `最低权限` 主题撰写了一篇有趣的博客，地址是 [`https://techcommunity.microsoft.com/t5/azure-sql-blog/security-the-principle-of-least-privilege-polp/ba-p/2067390`](https://techcommunity.microsoft.com/t5/azure-sql-blog/security-the-principle-of-least-privilege-polp/ba-p/2067390)。\n\
  \nSQL Server 2022 现在提供了遵循此原则的内置新固定服务器级角色。您可以在 [`https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles?#fixed-server-level-roles-introduced-in-sql-server-2022`](https://docs.microsoft.com/sql/relational-databases/security/authentication-access/server-level-roles?#fixed-server-level-roles-introduced-in-sql-server-2022)\
  \ 查看完整列表。\n\n我挑选了几个我觉得很有趣的角色：\n\n*   `##MS_DefinitionReader##`\n    *   此角色的成员被授予查看需要\
  \ `VIEW ANY DEFINITION` 或 `VIEW DEFINITION` 权限（假设他们在该数据库中拥有用户账户）的目录视图的权限。这是一种很好的方式，可以赋予某人“查看”有关服务器或重要信息的权限，而不允许他们进行更改。\n\
  \n*   `##MS_ServerStateReader##`\n    *   此角色的成员被授予查看需要 `VIEW SERVER STATE` 或 `VIEW\
  \ DATABASE` 状态（假设他们在该数据库中拥有用户账户）的动态管理视图（DMV）或函数的权限。\n\n*   `##MS_ServerPerformanceStateReader##`\n\
  \    *   此角色与前一个固定角色类似，但更侧重于查看来自动态管理视图（DMV）的特定性能信息。此固定角色中的用户被授予与需要 `VIEW SERVER\
  \ PERFORMANCE STATE` 权限的对象相同的权限。\n\n想象一下这种情况：您想聘请一位顾问来查看系统和数据库的重要信息，以便为您提供分析。出于隐私原因，您不希望他们访问任何用户数据，也不希望他们进行更改。将他们添加为这两个角色的成员可以帮助您实现这一目标，而在此之前，您必须使用一个权限超过必要的固定服务器级角色，或者为他们的账户在实例以及您需要他们提供咨询的所有数据库中设置自定义权限。\n\
  \n您还会喜欢 SSMS 19 已得到增强以支持这些新的固定服务器级角色，如图 6-4 所示。\n\n![一张标题为“服务器角色”的文件夹截图。它包含 19 个文件。](img/525217_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4 SQL Server 2022 固定服务器级角色\n\n\n\n我快速进行了一项测试，以查看属于 `MS_ServerPerformanceStateReader`\
  \ 角色与仅属于公共固定角色之间的权限差异。如果你只有公共固定角色，那么在查询 `sys.dm_exec_requests` 时，你只能看到自己的会话。但如果你是\
  \ `MS_ServerPerformanceStateReader` 角色的成员，你就能从 `sys.dm_exec_requests` 中看到所有会话。一个需要\
  \ `MS_ServerStateReader` 或 `MS_ServerSecurityStateReader` 角色成员资格才能访问的 DMV 示例是 `sys.dm_server_audit_status`\
  \ DMV。任何仅属于 `MS_ServerPerformanceStateReader` 角色的用户都将无权访问此 DMV。实际上，我们在这里所做的是将 `MS_ServerStateReader`\
  \ 角色拆分为两个不同的角色：`MS_ServerPerformanceStateReader` 和 `MS_ServerSecurityStateReader`。\n\
  \n## 动态数据屏蔽功能增强\n\n动态数据屏蔽是指在表架构中提供逻辑，以便在用户查看数据时进行屏蔽（例如，将电子邮件地址屏蔽为 xxxx@xxxx 的格式）。我们在\
  \ SQL Server 2016 中引入了此概念，并且它非常受欢迎。在此功能出现之前，应用程序必须在代码中实现屏蔽逻辑。如果需要更改屏蔽逻辑，则必须更改并重新部署应用程序。动态数据屏蔽提供了一种在定义表列时定义屏蔽规则的方法。如果你是动态数据屏蔽的新手，请从我们的文档开始：[`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking)。\n\
  \n动态数据屏蔽的一个优点是我们为常见的屏蔽场景提供了内置函数。因此，像这样的列定义：\n\n```sql\nEmail   varchar(100) MASKED\
  \ WITH (FUNCTION = 'email()') NOT NULL\n```\n\n将导致此列中存储的任何值在用户看来都是 XXX@XXXX.com。\n\
  \n你可以在以下位置查看动态数据屏蔽的完整函数列表：[`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#defining-a-dynamic-data-mask`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#defining-a-dynamic-data-mask)。\n\
  \n在 SQL Server 2022 中，我们为 datetime 列类型添加了一个新函数。你可以屏蔽 datetime 值的全部或部分，例如年、月、日、时、分或秒。\n\
  \n动态数据屏蔽的原始实现默认不允许“非管理员”用户查看未屏蔽的数据。但是，我们提供了一个名为 `GRANT UNMASK` 的 T-SQL 命令选项，以便授予用户查看未屏蔽数据的能力。这个原始设计的问题在于，未屏蔽权限是针对数据库中的任何屏蔽规则。\n\
  \n2021 年，我们将细粒度 `UNMASK` 的概念引入 Azure，使得此权限可以应用于架构、表或列级别。你可以在以下位置查看原始公告：[`https://azure.microsoft.com/updates/general-availability-dynamic-data-masking-granular-permissions-for-azure-sql-and-azure-synapse-analytics/`](https://azure.microsoft.com/updates/general-availability-dynamic-data-masking-granular-permissions-for-azure-sql-and-azure-synapse-analytics/)。\n\
  \nSQL Server 2022 只是将此实现从云端引入到了 SQL Server。你可以在以下位置查看细粒度未屏蔽的示例：[`https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#granular`](https://docs.microsoft.com/sql/relational-databases/security/dynamic-data-masking?#granular)。\n\
  \n"
- '# 性能与可伸缩性


  我总是乐于看到任何 SQL Server 版本在性能和可伸缩性方面的创新和增强。原因之一是，这个领域的几乎所有改进都源于调优实践、真实客户案例或我们为基准测试所做的研究。SQL
  Server 2022 在整个工作负载和引擎组件的各个方面都进行了各种性能与可伸缩性投资。


  ## 列存储与批处理模式改进


  SQL Server 2022 包含增强功能，以提升列存储索引和批处理模式操作（在 SQL Server 2019 及更高版本中，批处理模式操作不再强制要求列存储）的性能。


  ### 有序聚集列存储索引


  Azure Synapse Analytics 和 SQL Server 都支持列存储索引。关于列存储索引以及它们为何对应用程序有益，可以写一整本书。我仍然认为这是
  SQL Server 中一个未被充分利用的功能。我遇到的几乎所有不了解列存储的客户，一旦理解了它们的工作原理，立即就能看出如何利用它们。如果你不了解列存储，请直接查阅文档开始学习：[`https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview`](https://docs.microsoft.com/sql/relational-databases/indexes/columnstore-indexes-overview)。


  Azure Synapse Analytics 增加了一个选项，可以创建 *有序* 的聚集列存储索引。虽然构建有序聚集列存储索引可能需要更长时间，但对某些查询的性能提升可能非常显著。SQL
  Server 2022 现在支持有序聚集列存储索引。了解更多：[`https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci`](https://docs.microsoft.com/azure/synapse-analytics/sql-data-warehouse/performance-tuning-ordered-cci)。


  ### 列存储字符串处理改进


  我们没有关于此的特定文档，但当我与资深 SQL 工程师 Ryan Stonecipher 聊到这个话题时，他对我说的原话是：“只需重建你的索引，我们就会为深层数据（例如
  *char 和 *binary + guid）维护最小/最大值。此外，我们现在支持在列存储上进行 LIKE 下推操作，以及一种快速的字符串相等实现。”




  #### 向量扩展以改进批处理模式


  在 SQL Server 2016 中，我们添加了代码以利用称为基于`向量`的硬件能力的特殊处理器指令。基于向量的硬件能力允许程序因为处理器中的向量寄存器而更简单、更快速且以更并行的方式处理数据。如果您希望阅读一些关于此主题的非常深入的内容，这里有一篇不错的文章：[`www.techspot.com/article/2166-mmx-sse-avx-explained`](http://www.techspot.com/article/2166-mmx-sse-avx-explained)。


  SQL Server 2016 能够识别两种不同类型的向量能力，即`SSE`和`AVX`，并利用它们来加速列存储操作，尤其是在使用批处理模式时。Robert Dorr
  在这篇博文中概述了我们是如何做到这一点的：[`https://docs.microsoft.com/archive/blogs/bobsql/sql-2016-it-just-runs-faster-column-store-uses-vector-instructions-sseavx`](https://docs.microsoft.com/archive/blogs/bobsql/sql-2016-it-just-runs-faster-column-store-uses-vector-instructions-sseavx)。


  最新的向量硬件技术是`AVX-512`，而 SQL Server 2022 可以识别这种新的硬件能力，从而为列存储和行存储的批处理模式操作符获得更显著的性能提升。我很好奇是什么促使我们研究`AVX-512`，并发现了
  Conor Cunningham 的这段有趣引述：


  在疫情期间，我读到了一篇学术论文，其中解释了如何使用`AVX-512`指令实现快速排序。这些指令本质上是一次执行 N 个操作而不是一个，这意味着它有可能大幅提升性能关键代码的速度。我实现了论文中的排序算法，并开始对其进行改进。后来，我想开始尝试在
  SQL 的代码中实现一些东西。我们有一些逻辑使用了上一代的向量指令（`AVX2`），我研究了那段代码，并想通了如何编写一个等效版本，使用更新、更宽的向量指令，这算是一个副业项目。当我完成后，我们在关键的分析基准测试（`TPC-H`）上获得了良好的性能提升。有趣的是，直到有一天我出现并将这份礼物交给团队时，我都没有告诉任何人我在做这件事——这并不是一个为
  SQL Server 2022 正式资助的项目，但当我们意识到它能为客户带来的价值后，我们优先考虑了它。


  在撰写本书时，我们将此增强功能置于一个跟踪标志之下，并且有可能我们在发布产品时仍然需要一个跟踪标志——主要是因为使用此功能是一个高级概念，并非适用于所有人。请访问
  [`https://aka.ms/sqlserver2022docs`](https://aka.ms/sqlserver2022docs) 查看最新信息。


  这项工作的一个方面是您可能会看到一个新的`ERRORLOG`条目，它看起来像这样：


  ```

  CPU vectorization level(s) detected:  SSE SSE2 SSE3 SSSE3 SSE41 SSE42 AVX AVX2 POPCNT
  BMI1 BMI2

  ```


  这些名称是我们检测到的处理器中各种向量 CPU 能力。如果您使用的是支持这种新向量模型的芯片组，则会出现`AVX-512`。


  #### 列存储段消除增强


  列存储索引的列被组织成段。列存储包含一个称为段消除的概念，以便可以根据查询消除或不准备某些段。在 SQL Server 2022 之前，只有数据类型为数值、日期和时间以及比例小于或等于二的`datetimeoffset`的列才是段消除的候选对象。现在在
  SQL Server 2022 中，我们将段消除扩展到了新的数据类型，包括字符串、二进制和`guid`数据类型，以及比例大于二的`datetimeoffset`数据类型。


  ### 可扩展性改进


  有几项改进旨在帮助提高您的查询、工作负载和 SQL Server 使用的可扩展性。您最不希望看到的就是投入精力修改应用程序设计、购买新服务器或基础设施后，却被
  SQL Server 限制了扩展能力。此领域的所有工作都是客户案例或我们内部及与合作伙伴进行的基准和测试的直接结果。


  #### 缓冲池并行扫描


  如果您访问我的网站查看我所有的演讲（我是一位开源演讲者），[`https://aka.ms/bobwardms`](https://aka.ms/bobwardms)，您会找到一个名为`SQL
  PASS 2013`的文件夹。在 2013 年的`PASS Community Summit`上，我做了一个关于内存的半天演讲。如果您查看这份演示文稿，会看到一些关于
  SQL Server 缓冲池的内部信息。在这些幻灯片中，我谈到了`BUF`哈希表和`BUF`结构。`BUF`结构指向页面，而`BUF`哈希表是一种组织所有`BUF`结构以便轻松找到页面的方法。因此，使用`BUF`哈希表查找来定位特定页面并不那么困难。


  不幸的是，SQL Server 中的某些操作必须扫描所有的`BUF`结构。可以将其想象为扫描聚集索引与使用索引查找。就像聚集索引扫描一样，如果您只需要几行数据，但聚集索引很大，那么获取结果仍可能需要很长时间。


  对于缓冲池的某些操作也可能发生同样的问题，我们曾在客户那里看到过这种情况。他们的服务器可能有，比如说，1TB 的 RAM，并允许缓冲池消耗大部分内存。然后他们会执行一些维护操作，即使针对一个非常小的数据库，也会花费异常长的时间。这是因为我们会扫描整个大约
  1TB 的`BUF`结构来完成操作。我们甚至添加了`ERRORLOG`消息来警告用户正在发生这种情况。更多信息请参阅文章 [`https://docs.microsoft.com/troubleshoot/sql/performance/buffer-pool-scan-runs-slowly-large-memory-machines`](https://docs.microsoft.com/troubleshoot/sql/performance/buffer-pool-scan-runs-slowly-large-memory-machines)。这是一个经典问题：某个架构多年来没有引起问题，但随着硬件技术变得极其庞大，这种设计需要更新。


  我们研究了这个问题，并提出了类似这样的想法：“如果查询可以通过并行运行来获得更快的结果，为什么我们在扫描缓冲池时不能这样做呢？”（这不是原话；这是我在阅读此功能的设计文档时的转述。）


  这项工作的成果是缓冲池并行扫描，该功能在 SQL Server 2022 中默认为内存容量大的系统启用。我在 Microsoft 的同事 David Pless
  参与了此功能的开发，并在 [`https://cloudblogs.microsoft.com/sqlserver/2022/07/07/improve-scalability-with-buffer-pool-parallel-scan-in-sql-server-2022`](https://cloudblogs.microsoft.com/sqlserver/2022/07/07/improve-scalability-with-buffer-pool-parallel-scan-in-sql-server-2022)
  中解释了其工作原理。


  David 展示了我们在 SQL Server 2022 中看到的一些显著的改进数据。此外，请查看他的 Data Exposed 节目，他在其中通过一个巧妙的演示展示了更多细节：[`https://youtu.be/4GvU106Xiag`](https://youtu.be/4GvU106Xiag)。我在一个
  T-SQL 笔记本中包含了 David 发现的结果示例，您可以使用 Azure Data Studio 查看该示例：`ch06_meatandpotatoes\scalability\Buffer_pool_parallel_scan_BPP_notebook_quick.ipynb`。




  ## 普尔维的清单


  多年来，我在微软遇到了许多才华横溢、善良而出色的人。他们默默无闻地工作，从不大肆宣扬。他们只是做好自己的工作，做得非常出色，并且极其友善和友好。普尔维·沙阿就是其中之一。普尔维是
  SQL 团队的高级软件工程师，但她的角色远超过这个头衔。普尔维在我们的“性能”团队工作，她的时间都花在寻找让 SQL Server 和 Azure SQL 变得更快的方法上——快到我们大多数人都无法理解的程度。她和团队的工作在很多方面都能被感受到，但你可能永远看不到，因为它们通常是对引擎的增强，而不是一个“功能”。


  > **注意**

  >

  > 她为 SQL Server 2019 工作的一个显著例子是针对 `tempdb` 的 `PFS` 页面并发性改进，这非常棒！


  在这个版本发布之际，我联系了普尔维，请她分享我希望读者了解的可扩展性增强列表。以下是她的列表：


  *   **减少的缓冲池 I/O 提升** – 过去存在一些情况，我们会将单页读取提升为八页 I/O，从而导致系统问题。事实证明这并没有真正帮助性能，反而可能使
  I/O 系统过载，因此我们调整了这个算法。这只是让我们的引擎在执行 I/O 操作时变得更智能。


  *   **增强了我们的一些核心自旋锁算法** – 自旋锁是引擎内部多线程一致性的关键部分。我们一直在寻找调整这些算法的方法，以确保引擎在各种工作负载下都能以最佳状态运行。我们进行了一些内部调整，使自旋锁更高效，这些改进深入引擎内部，很难量化其影响（普尔维和团队在非常深的层次上做这件事，以确保他们的工作真的让一切变得更好，而不是更糟）。


  *   **改进了虚拟日志文件算法** – 虚拟日志文件是物理事务日志的抽象。基于日志增长而产生大量小型虚拟日志文件会影响恢复等操作的性能。我们更改了在某些日志增长场景下创建多少虚拟日志文件的算法，以减少此类问题。你可以在我们的文档
  [`https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide?#virtual-log-files-vlfs`](https://docs.microsoft.com/sql/relational-databases/sql-server-transaction-log-architecture-and-management-guide?#virtual-log-files-vlfs)
  中阅读有关我们如何更改此算法的信息。


  *   **日志文件增长的即时文件初始化** – 直到 SQL Server 2022，我们都不能对事务日志使用即时文件初始化，因为我们认为无法正确检测“日志末尾”。在
  SQL Server 2022 中，我们已经确定，当我们需要增长事务日志时，如果增长大小被认为是“中等”的（最高 64Mb），我们**可以**使用 `IFI`。对于在增长操作期间将日志文件清零会导致阻塞问题的场景，这可能是一个重大的性能胜利。事实证明，64Mb
  正好是创建新数据库时 SQL Server 数据和日志文件的默认自动增长大小。


  普尔维和她的团队做了如此出色的工作，使 SQL Server 引擎保持调整和快速。我问普尔维更多关于她为什么喜欢在微软工作的原因，她说：“保持 SQL Server
  和 Azure SQL 以峰值性能运行是我工作的一部分。我竭尽全力做到最好。当然，我热爱我的工作！希望我能做出积极的贡献，继续我们的使命。”


  ### “免动手”的 tempdb


  尽管 SQL Server 是一个伟大的产品，但在与 SQL Server 打交道 29 年后，我仍然遇到一些至今让我抓狂的问题。其中之一就是 `tempdb`
  的 `latch` 争用。


  #### 挑战是什么？


  SQL Server 中的所有数据库页面都需要使用 `latch` 进行物理保护。一些数据库页面被称为系统页面，因为它们包含分配信息；这些就是 `PFS`、`GAM`
  和 `SGAM` 页面。任何需要分配或释放的查询或操作都可能需要读写这些页面。对这些页面的读写需要一种 *latch 保护方案*。需要 `latch` 保护是因为两个线程可能同时尝试修改或读取一个页面（这是对
  `latch` 工作原理的一个非常基本的描述）。


  这些页面在数据库文件中位于固定位置。此外，每个表都有用于存储数据和索引的页面。任何影响这些页面的查询或操作也需要 `latch` 保护。因为系统表和其他表一样有页面，SQL
  中的特定 DDL 语句最终会导致系统表页面的 `latch` 保护和争用。


  现在考虑 `tempdb`。涉及 `tempdb` 的 SQL Server 工作负载通常需要大量的分配和系统表页面操作。临时表、表变量和溢出只是引发这些操作的几个例子。所有这些通常都需要快速且频繁的页面分配和系统表修改。因此，当许多用户并发运行导致在
  `tempdb` 内进行这些操作的查询时，自然会对用于分配和系统表的页面的 `latch` 产生争用或*压力*。这个问题的主要症状是看到你的请求等待在 `PAGELATCH_XX`
  等待类型上。


  最初，当 `latch` 在 SQL Server 7.0 中首次引入时，我看到过 `tempdb` 在 `PFS`、`GAM` 和 `SGAM` 页面上的 `latch`
  争用，因为当时数据库页面的默认行为是单个文件。通常会发生的情况是，一个应用程序会被多个并发用户使用，这会导致频繁的 `CREATE` 和 `DROP` 操作，从而需要分配和释放操作。这自然会对单个文件中的
  `PFS`、`GAM` 和 `SGAM` 页面造成压力。





  #### 历年解决方案


  当我们最初在 SQL Server 7.0 乃至 SQL Server 2000 中真正开始遇到这个问题时，CSS（客户服务与支持）团队的许多人都会建议客户为
  tempdb 数据创建多个文件。为什么？因为这是在自然地为这些分配页的**闩锁并发**进行 `分区`。这是因为 SQL Server 会以轮询方式分配页，并在多个文件之间利用比例填充算法来处理数据页。这个方案确实帮助解决了许多这类闩锁争用问题。但随后出现了一个新问题：需要创建多少个文件才能解决问题？不幸的是，许多人矫枉过正，建议文件数量应该匹配
  SQL Server 的 CPU 数量。我以及社区中的其他人，比如 Paul Randal，则有不同的看法。例如，我们知道对于一台 64 核 CPU 的机器，你可能并不需要
  64 个文件。常识告诉我们，这似乎弊大于利。我最终对此课题进行了一些详细研究，由此我建议的最佳方法是：对于 8 个 CPU 使用 8 个文件，然后每次增加 4
  个文件，直到你的工作负载达到性能平衡点。关于这种方法的更多细节，你可以查看我在 2011 年 PASS Summit 大会上做的演示：[`www.youtube.com/watch?v=SvseGMobe2w`](http://www.youtube.com/watch?v=SvseGMobe2w)。


  我们做的另一件事是引入了 `跟踪标志 1118`，以便所有表的分配都使用统一区，从而减轻文件的 `SGAM` 页的压力。我们还发现，使用多个文件来缓解系统页闩锁争用，只有在所有文件大小完全相同时才有效。因此，我们引入了
  `跟踪标志 1117`，以便任何自动增长活动都会增长所有文件以保持它们大小相同。


  任何真正的瓶颈都需要像剥洋葱一样层层深入。即使采用了这种多文件方法，一个系统如果用户数量极大，`PFS`、`GAM` 和 `SGAM` 闩锁争用仍然可能发生，但与新的主要问题——系统表页闩锁争用——相比，它就相形见绌了。我们起初很难认识到这一点。我们已经习惯于运行脚本来识别特定页的闩锁争用：`PFS`、`GAM`
  和 `SGAM`。


  一旦我们发现热点是系统表页，老实说，我们别无他法，只能告诉客户减少他们的 tempdb 工作负载争用。我们确实创建了一些有帮助的解决方案，称为 `tempdb
  缓存`。我们发现可以保存临时表的元数据，包括一些针对重复模式的页。你可以在 [`https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database?#performance-improvements-in-tempdb-for-sql-server`](https://docs.microsoft.com/sql/relational-databases/databases/tempdb-database?#performance-improvements-in-tempdb-for-sql-server)
  查看更多关于这个概念的信息。即使有了 `tempdb 缓存`，它也没有消除问题，而且并非所有 tempdb 场景都能使用缓存。


  在 SQL Server 2016 中，我们通过包含一个默认配置（在安装时创建与检测到的 CPU 数量相匹配的文件，最多 8 个）来帮助客户确保为 tempdb
  创建多个文件。我们还通过将 `跟踪标志 1117 和 1118` 转变为 `ALTER DATABASE` 选项并将其设为 tempdb 的默认设置，从而消除了对它们的需要。


  工作负载持续对 tempdb 施加压力，我们仍然看到问题存在。我们在 SQL Server 2019 中引入了两项重大改进来帮助解决闩锁问题：


  -   `PFS` 页现在将不再有闩锁问题。我们找到了即使在共享闩锁下也能更新 `PFS` 页的方法。

  -   我们引入了 tempdb 元数据优化作为一个新的服务器选项。启用此选项后（需要重启服务器），我们会将 tempdb 中的关键系统表转换为内存优化表。内存优化表是“无锁的”，因此对这些表的任何读写操作都不会遇到闩锁争用。


  改进是巨大的。有了这两项增强功能，我看到许多工作负载不再因闩锁争用而出现显著问题。但核心问题偶尔仍能看到，即 `SGAM` 和 `GAM` 页上的闩锁争用。当我第一次看到
  `SGAM` 争用继续发生时，我感到困惑，因为我们已经将 tempdb 改为始终使用统一区。然而，有一个页仍然必须为临时表或索引分配，而且它不在统一区内，那就是
  `IAM` 页，它跟踪对象的分配情况。


  #### 为何现在可以“免维护”？


  当我看到项目 Dallas 的最初一套引擎改进时，我非常高兴地了解到 `GAM` 和 `SGAM` 的并发性得到了增强，其方式与 SQL Server 2019
  中 `PFS` 页的增强相同。


  现在，tempdb 在闩锁问题方面可以真正做到“免维护”了。


  请考虑以下几点：


  -   `PFS`、`GAM` 和 `SGAM` 闩锁争用完全消失。

  -   如果你执行此语句 `ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA =
  ON` 并重新启动 SQL Server，关键系统表将是内存优化的，不会遇到闩锁争用。


  注意：tempdb 闩锁问题从未与缓慢的 I/O 有关。但是，你应该始终通过将 tempdb 数据和日志文件放在与用户数据不同的驱动器上，并且最好放在 SSD
  上，来确保消除 tempdb 的任何 I/O 问题。如果你的 tempdb 存在 I/O 问题，通常表现为 `PAGELATCH_IO`、`IO_COMPLETION`
  和 `WRITELOG`（tempdb 日志）等待类型。




