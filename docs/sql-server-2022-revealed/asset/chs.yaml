  \ 看到如何将核心 SQL Server 容器镜像与其他 SQL Linux 软件包结合构建新软件包的示例。`docker build` 不运行容器。它用于构建一个镜像，该镜像通过\
  \ `docker run` 作为容器运行。\n\n这种定制能力非常强大。你可以构建自己的容器镜像，将 SQL Server 核心镜像与你自己的一组脚本甚至数据库备份文件结合起来。\n\
  \n一个帮助构建和运行复杂容器镜像（包括应用程序）的工具叫做 `docker-compose` ([`https://github.com/docker/compose`](https://github.com/docker/compose))。查看我构建的这个示例（感谢我以前的同事\
  \ Vin Yu），它使用 `docker-compose` 通过容器安装 SQL Server 复制：[`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers/replication`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/containers/replication)。\n\
  \n\n\n### 容器切换方法\n\n我在本章前面提到过，你不会去修补 SQL Server 容器。你会通过`切换`它们来应用累积更新。以下是其魔法般的原理。当你运行一个容器并通过\
  \ `-v` 命令指定一个持久卷时，该卷中的任何文件在容器重启或删除后都会保留。如果你将 SQL Server 数据库文件（包括系统数据库）放入一个映射到持久化存储的目录中，你就可以一次`指向`任何一个\
  \ SQL Server 容器到这个卷。\n\n此外，SQL Server 累积更新在同一主版本内是兼容的。因此，我可以执行以下操作：\n\n1.  启动一个\
  \ SQL Server 2022 RTM 容器镜像，将其指向 `/var/opt/mssql` 的一个持久卷。\n2.  假设 SQL Server 2022\
  \ 的第一个累积更新发布，而我想使用它。\n3.  停止 SQL Server 2022 RTM 容器。\n4.  然后运行一个基于 SQL Server 2022\
  \ CU1 的新 SQL Server 容器，将其指向同一个持久卷。新的 SQL Server 将启动并识别新的 master 数据库和用户数据库。只需几分钟，我就更新了\
  \ SQL Server。\n5.  现在假设出现问题，你想回滚到 SQL Server 2022 RTM 容器。\n6.  停止新的 SQL Server 2022\
  \ CU1 容器并启动 SQL Server 2022 RTM 容器。几分钟之内，你就完成了回滚。\n\n你可以从《*SQL Server 2019 Revealed*》一书中查看如何对\
  \ SQL Server 2019 执行此操作的示例，地址是 [`https://github.com/microsoft/bobsql/tree/master/sql2019book/ch7_inside_sql_containers/update/dockerpowershell`](https://github.com/microsoft/bobsql/tree/master/sql2019book/ch7_inside_sql_containers/update/dockerpowershell)。\n\
  \n### 在 Kubernetes 上运行 SQL Server 2022\n\n为 SQL Server 提供 Linux 支持为我们打开了一个全新的世界，包括容器。容器则为我们打开了通往\
  \ Kubernetes 的世界。你想以一种有趣的方式学习 Kubernetes 吗？没有什么能比得上《给孩子们看的 Kubernetes 图解指南》：[`https://youtu.be/4ht22ReBjno`](https://youtu.be/4ht22ReBjno)。\n\
  \n### 为什么用 k8s\n\nKubernetes 源自 Google。Kubernetes 的创始人，如 Brendan Burns（现就职于微软），希望找到一种大规模运行容器的方法。Linux\
  \ 本身并未为此提供方案，因此他们在 Linux 之上构建了一套名为 Kubernetes 的软件服务。Brendan 制作了一个非常棒的视频播放列表来解释 Kubernetes：[`www.youtube.com/watch?v=daVUONZqn88&list=PLLasX02E8BPCrIhFrc_ZiINhbRkYMKdPT`](http://www.youtube.com/watch?v=daVUONZqn88&list=PLLasX02E8BPCrIhFrc_ZiINhbRkYMKdPT)。\n\
  \n既然 SQL Server 支持容器，为何不也支持 Kubernetes 呢？好吧，这个长单词说得够多了。让我们像那些酷孩子一样使用 `k8s`（k<八个字母>s）吧。必须承认，SQL\
  \ Server 在 `k8s` 上的支持目前还非常基础。你可以部署 SQL Server，连接到实例，并将数据存储在持久存储中。但 `k8s` 确实提供了一些不错的内置功能，如负载均衡器和基本的高可用性。如果你正在寻找一个使用\
  \ `k8s` 和 SQL Server 的完整托管体验，你应该看看 Azure Arc 托管实例 (Arc SQL MI)（[`https://aka.ms/azurearcsqlmi`](https://aka.ms/azurearcsqlmi)）。\n\
  \n请在 [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s) 关注 SQL Server 在 `k8s` 上的最新动态。你也可以观看我在\
  \ SQLBits 上做的演讲以更深入地了解：[`https://youtu.be/USfCJDoCMr8`](https://youtu.be/USfCJDoCMr8)。\n\
  \n理解基础知识是值得的，这样你就能了解 SQL Server 在 `k8s` 上是如何工作的，以及它是否可以成为你扩展多个 SQL Server 容器的平台。\n\
  \n### 在 k8s 上部署 SQL Server\n\n让我们来看看在 `k8s` 上部署单个 SQL Server 容器的基础知识。\n\n#### k8s\
  \ 的主要组件有哪些？\n\n当你看到部署体验时，有几个 `k8s` 术语你需要理解。这是一组非常基础的定义。关于这些组件和架构的更完整参考，请参阅 `k8s`\
  \ 文档：[`https://kubernetes.io/docs/concepts/overview/components`](https://kubernetes.io/docs/concepts/overview/components)。\n\
  \n让我们通过图 9-1 来回顾这些组件（此处并未显示所有组件）。\n\n![](img/525217_1_En_9_Fig1_HTML.png)\n\n图 9-1\
  \ `k8s` 组件\n\n*   `集群 (Cluster)`\n    把集群想象成一个主机，它包含所有 `k8s` 内部软件以及一系列用于运行容器的虚拟机或节点（可以是物理服务器）。\n\
  *   `节点 (Node)`\n    把节点想象成一个虚拟机（可以是物理机），它可以帮助协调其他节点或以容器形式运行用户程序。\n*   `控制平面 (Control\
  \ plane)`\n    所有运行系统的内部 `k8s` 软件称为控制平面，它运行在每个节点上。例如，`k8s` 完全基于 API，因此 API 服务器可以接收请求并在节点间进行编排。\n\
  *   `Pod`\n    Pod 被定义为在一个节点上执行的一个或多个容器。它是 `k8s` 系统中执行的最小单元。\n*   `容器运行时 (Container\
  \ runtime)`\n    由于容器是 Pod 执行的核心，因此所有节点上必须存在一个像 Docker 这样的容器运行时，以拉取容器镜像并运行容器。\n\
  *   `命名空间 (Namespace)`\n    命名空间是 `k8s` 对象的逻辑分组，使组织项目变得非常方便。每个 `k8s` 系统都有一个默认命名空间，但我建议你始终为你的\
  \ Pod 和其他 `k8s` 对象创建其他命名空间。\n*   `负载均衡器服务 (Load balancer service)`\n    你已经看到过 SQL\
  \ Server 中以侦听器形式出现的连接抽象。可以把负载均衡器服务（另一种类型称为节点端口）看作一个侦听器。负载均衡器是一种将连接抽象到固定 IP 地址和端口的方式，这样即使底层\
  \ IP 地址发生变化，连接也始终会被定向到正确的位置。\n*   `存储类 (Storage class)` 和 `持久卷声明 (PersistentVolumeClaim)`\n\
  \    存储类是系统上存储类型的映射。例如，Azure Kubernetes Service 有一个由系统定义的名为 `managed-premium` 的存储类，它使你能够访问\
  \ Azure 高级托管磁盘。可以把持久卷声明 (PVC) 想象成从存储类中划出的一个固定大小的卷。使用 PVC 的关键在于，你的数据独立于节点存储在集群中。如果你将数据库文件存储在\
  \ PVC 上，那么无论 SQL Server 的 Pod 运行在哪个节点上，这些文件都是可用的。\n*   `副本集 (Replicaset)` 和 `有状态集\
  \ (Statefulset)`\n    `k8s` 最酷的功能之一是能够为我们的 Pod 声明一种形式的高可用性。例如，你可以`告诉` `k8s`，“我希望在任何时间点都始终有一个\
  \ Pod 副本在运行。”因此，如果 Pod 失败（SQL Server 崩溃）甚至节点失败（虚拟机崩溃），`k8s` 将自动尝试重新启动 Pod（如果可用，可能会在同一节点或其他节点上启动）。\n\
  \n#### 如何获取 k8s？\n\n`K8s` 是作为一个开源项目构建的，你可以基于开源部署自己的 `k8s` 集群。例如，你可以使用开源工具 `kubeadm`\
  \ 来安装 `k8s`，具体文档见 [`https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/create-cluster-kubeadm/)。\n\
  \n大多数 `k8s` 客户使用许可产品进行 `k8s` 生产部署，例如 Azure Stack HCI、Red Hat OpenShift 或 Rancher。你可以使用基于云的\
  \ `k8s` 系统，例如 Azure Kubernetes Service (AKS)、Google Kubernetes Engine (GKE) 和 Amazon\
  \ Elastic Kubernetes Service (EKS)。许可产品的巨大优势是部分 `k8s` 系统由服务商管理，并且你可以获得商业生产支持。\n\n\
  \n\n"
- "# 在 Kubernetes 上部署 SQL Server\n\n### 部署步骤是什么？\n\n我们为您构建了一个简单的教程，用于在 AKS 上试用 SQL\
  \ Server，详见 [`https://aka.ms/sqlk8s`](https://aka.ms/sqlk8s)。\n\n我还构建了一系列脚本，以更详细地解释部署步骤，详见\
  \ [`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/deploy`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/deploy)。\n\
  \n其核心概念是，您向 `k8s` *声明*一个包含单个 SQL Server 容器镜像的 `Pod` 定义。命令行工具 `kubectl` 常用于向 `k8s`\
  \ 提交您的声明（`kubectl` 使用 `k8s` API）。您还经常使用一个名为 `YAML` 文件的文本来提供声明的详细信息。\n\n在示例脚本中，您需要执行以下步骤：\n\
  \n1.  为 `k8s` 对象创建一个新的命名空间。\n2.  为管理员密码创建一个 Secret。\n3.  创建一个新的映射到端口 `1433` 的负载均衡器服务。\n\
  4.  从 `managed-premium` 存储类创建一个 PVC。\n5.  使用 `YAML` 文件部署一个使用 SQL Server 容器镜像的 `Pod`，该镜像引用了\
  \ Secret、负载均衡器和 PVC。在 `YAML` 文件中，声明一个副本数为 `1` 的 `Replicaset`，以确保始终有一个 SQL Server\
  \ `Pod` 在运行。\n\n部署 `Pod` 是一个异步操作。容器镜像如果在节点中不存在则会被拉取并执行。`Pod` 的整体编排远比这复杂。`K8s` 拥有复杂的算法来决定在哪些节点上调度和运行\
  \ `Pod`。它还必须通过事件通知来检测 `Pod` 故障或资源限制，并采取相应措施。\n\n### 连接和使用 Kubernetes 上的 SQL Server\n\
  \n在像 `AKS` 这样的系统上，负载均衡器 `IP` 地址和端口是对外可用的，因此可以使用像 `SSMS` 这样的工具通过负载均衡器连接到在 `Pod` 中运行的\
  \ `SQL` 实例。在我位于 [`https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/sqlk8s/deploy/step12_querysql.ps1`](https://github.com/microsoft/bobsql/blob/master/demos/sqlserver2022/sqlk8s/deploy/step12_querysql.ps1)\
  \ 的示例脚本中，您可以看到一种动态确定负载均衡器 `IP` 地址以连接到 `SQL Server` 的方法。\n\n`K8s` 包含内置服务来监控资源使用情况，以确保系统保持健康。我们看到的一个与\
  \ `k8s` 和 `SQL Server` 相关的问题是，`SQL Server` 可能会在节点内使用大量内存。这可能会触发 `k8s` 强制终止 `Pod`\
  \ 并将其迁移到另一个节点。这是因为 `k8s` 包含检测节点内应有多少可用内存以保持其健康的算法。然而，`SQL Server` 并不了解这些算法。著名的 `SQL`\
  \ 和 `Linux` 社区专家 Anthony Nocentino 对此场景进行了很好的阐述，详见 [`www.centinosystems.com/posts/2019-09-28-memory-settings-for-running-sql-server-in-kubernetes`](http://www.centinosystems.com/posts/2019-09-28-memory-settings-for-running-sql-server-in-kubernetes)，其中也包括了如何解决此问题。\n\
  \n### 使用 Kubernetes 实现高可用性\n\n高可用性对于生产环境的 `SQL Server` 至关重要，因此 `k8s` 在系统中提供内置的*基础*高可用性是非常好的。\n\
  \n#### 使用 SQL Server 和 Kubernetes 实现基本高可用性\n\n当您在 `k8s` 上部署一个 `SQL Server Pod` 并使用负载均衡器、`PVC`\
  \ 和 `Replicaset` 时，您已经向 `k8s` 声明您希望使用基本的高可用性。\n\n考虑以下两种场景：\n\n*   **Pod 故障**\n \
  \   *   如果 `SQL Server` 因任何原因崩溃，这将被视为 `Pod` 故障，`k8s` 将自动启动一个新的 `Pod`，该 `Pod` 通常会在同一节点上（如果资源可用）启动一个新的\
  \ `SQL Server` 容器。由于所有数据库都在 `PVC` 上，这类似于 `SQL Server` 容器的持久化存储。`SQL Server` 只需对所有数据库运行恢复。\n\
  \    *   `Pod` 故障也可能因其他原因在 `k8s` 内部发生，`k8s` 可能决定在另一个节点上启动新的 `Pod`。节点具有私有 `IP` 地址，但由于您使用了负载均衡器，您的连接会自动重定向到新节点。并且由于您使用了\
  \ `PVC`，所有数据库即使在新节点上也是可用的。这就像一个具有共享存储的故障转移集群，而您无需设置或配置任何故障转移集群软件。\n*   **节点故障**\n\
  \    *   如果您在构建 `k8s` 集群时部署了多个节点，那么当某个节点发生故障时，也可能出现相同的情况。事实上，我建议您在任何用于 `SQL Server`\
  \ 的 `k8s` 集群中*至少*拥有三个节点。一个节点将用于编排其他工作节点，您至少会有两个工作节点以实现冗余。\n    *   以下是我的脚本，用于查看\
  \ `AKS` 上 `SQL Server` 的 `HA` 实战：[`https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/ha`](https://github.com/microsoft/bobsql/tree/master/demos/sqlserver2022/sqlk8s/ha)。\n\
  \n#### Always On 可用性组与 Kubernetes\n\n在 `SQL Server 2019` 的预览版中，我们引入了一个与 `k8s` 集成的\
  \ `Always On` 可用性组部署概念。不幸的是，该功能未能出现在 `SQL Server 2019` 的最终版本中。我们在那里的工作确实演变为 `Azure\
  \ Arc` 启用的 `SQL` 托管实例所附带的内置 `AG` 功能（通过商业服务层）。\n\n还有另一个来自我们合作伙伴 `DH2i` ([`https://dh2i.com`](https://dh2i.com))\
  \ 的解决方案。您可以在 [`https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes-dh2i`](https://docs.microsoft.com/sql/linux/tutorial-sql-server-containers-kubernetes-dh2i)\
  \ 查看如何使用 `DH2i` 的解决方案在 `k8s` 上部署 `AG`。\n\n### Helm 图表\n\n有些人觉得 `k8s` 的部署体验有点复杂。于是出现了\
  \ `Helm` 图表的概念 ([`https://helm.sh`](https://helm.sh))。可以将 `Helm` 视为 `k8s` 的包管理器。您可以在\
