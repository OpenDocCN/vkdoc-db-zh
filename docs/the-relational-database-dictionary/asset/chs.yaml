  #### 异或


  1.  （二元情况）如果 `p` 和 `q` 是谓词，它们的“异或” (`p`) `XOR` (`q`) 也是一个谓词。令 (`ip`) `XOR` (`iq`)
  为该谓词的一个调用（其中 `ip` 和 `iq` 分别是 `p` 和 `q` 的调用）。那么，当且仅当 `ip` 和 `iq` 中恰好有一个求值为 TRUE 时，该调用
  (`ip`) `XOR` (`iq`) 的结果才为 TRUE。（换句话说，(`p`) `XOR` (`q`) 等价于 `NOT((p) EQUIV (q))`。）*注意*：在实践中，表达式
  (`p`) `XOR` (`q`) 中包围 `p` 和 `q` 的括号可能不需要。

  2.  （多元情况）令 `p1, p2, . . . , pn`（`n` ≥ 0）为谓词。那么，“异或” `XOR {p1, p2, . . ., pn}` 也是一个谓词；并且如果
  `ip1, ip2, . . ., ipn` 分别是 `p1, p2, . . ., pn` 的调用，那么当且仅当调用 `ip1, ip2, . . ., ipn`
  中恰好有 `m` 个返回 TRUE，且 `m` 为奇数时，调用 `XOR {ip1, ip2, . . ., ipn}` 才返回 TRUE。*注意*：后一个定义是为了保持结合律；具体来说，它具有表达式
  `XOR {p1, XOR{p2, p3}}`、`XOR {XOR{p1, p2}, p3}` 和 `XOR {p1, p2, p3}` 在逻辑上等价的性质。（另一方面，它也具有
  `XOR {p1, p2, p3}` 与 `NOT(EQUIV {p1, p2, p3})`（按照本词典中该表达式的定义）*不*等价的性质。*参见* 等价性。）可以提出一个不同的、可能更直观的定义，根据该定义，当且仅当调用
  `ip1, ip2, . . ., ipn` 中恰好有一个返回 TRUE 时，调用 `XOR {ip1, ip2, . . ., ipn}` 才返回 TRUE。然而，这两个定义本身显然并不等价，尽管它们在
