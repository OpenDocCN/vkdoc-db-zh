  ## 引言


  本词典收录了 900 多个条目，涉及关系数据模型所包含或由其使用而产生的问题、术语和概念。许多条目不仅包含定义本身，还提供了说明性的示例（有时不止一个）。关于这些定义，我已尽力使其清晰、精确且准确；它们基于我个人对材料的最佳理解，这一理解是在我涉足该领域近
  40 年的时间里逐渐打磨形成的。


  我想强调一点，正如标题所示，这是一本关于关系的词典。为此，我特意省略了许多与关系问题只有边缘联系的术语和概念（例如，支撑性类型理论的几乎所有细节，尤其是类型继承细节）。在很大程度上，我还省略了数据库技术中普遍存在、并非关系数据库所特有的各种主题（例如，安全性问题、日志、恢复和并发控制等等）。此外，我还省略了某些
  SQL 术语和概念——尽管 SQL 本应是一种关系语言，但这些概念实际上并非关系性的（例如，`外连接`、`UNION ALL` 和通过游标进行更新）。尽管如此，我必须补充说明，我特意收录了一些非关系术语，以便澄清一个与普遍看法相反的事实：这些术语所对应的概念确实不是关系性的（`索引`
  就是一个典型的例子）。


  我还必须解释，这是一本有态度的词典。我坚信，关系模型是数据库技术正确且恰当的基础，并且在可预见的未来仍将如此，下文中的许多定义都反映了这一信念。正如我在《数据库实战：面向实践者的关系理论》（*Database
  in Depth: Relational Theory for Practitioners*，O''Reilly Media Inc.，2005）一书中所言：


  > [这是]我的观点，关系模型坚如磐石，“正确”，并将持久。一百年后，我完全预期数据库系统仍将以科德的关系模型为基础。为什么？因为该模型的基础——即集合论和谓词逻辑——其本身同样是坚如磐石。特别是谓词逻辑的要素可追溯至两千多年前，至少远至亚里士多德（公元前
  384–322 年）。


  **iv**


