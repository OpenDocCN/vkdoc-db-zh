  \n#### 导出关系\n\n笼统地说，是用其他关系定义的关系。更精确地说，设 `s` 为一个关系集合。那么关系 `r` 是从 `s` 中的关系导出的，当且仅当它本身不出现在\
  \ `s` 中，但可以通过某个关系表达式从 `s` 中的关系得到。该表达式必须满足（a）每个关系操作数都是 `s` 中的一个关系或从 `s` 中的关系导出的关系，并且（b）每个关系运算都是本词典中定义的运算之一，`EXTEND`、`SUMMARIZE`\
  \ 以及只读的（“假设”）形式的 `UPDATE` 除外。*对比* 基关系。\n*注*：此定义中对合法运算符的限制目的是排除引入某种“全新的”关系（可以这么说）的可能性，而该关系无法从\
  \ `s` 中的关系导出。\n\n**示例**：考虑表达式 `S JOIN SP`。如果关系变量 `S` 和 `SP` 的当前值分别为 `s` 和 `sp`，则此表达式定义的导出关系就是\
  \ `s` 和 `sp` 的连接。\n\n#### 导出关系变量\n\n通过某个关系表达式（特别是视图或快照，见该词条）用其他关系变量定义的关系变量。*对比*\
  \ 基关系变量。\n\n**示例**：*参见* 快照；视图。\n\n#### 描述符\n\n一段元数据，描述例如一个关系变量、一个属性或一个约束。\n\n####\
  \ 指示符\n\n在谓词中用于指代某个特定对象（与参数相对）的表达式。例如，在谓词“关系变量 `S` 的基数为 `n`”中，表达式“关系变量 `S`”指代供应商关系变量的当前值所对应的关系（相比之下，`n`\
  \ 是一个参数）。\n\n#### 决定因素\n\n在一个函数依赖（FD）中，左侧的属性集合。*对比* 依赖项。\n\n**示例**：*参见* 依赖项。\n\n\
  **46**\n**关系数据库词典，扩展版**\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n![](img/00195.png)\n\
  \n#### 差\n\n两个关系 `r1` 和 `r2`（按此顺序）的差，`r1 MINUS r2`，其中 `r1` 和 `r2` 是相同类型 `T` 的，结果是一个类型为\
  \ `T` 的关系，其体是包含所有满足条件“`t` 出现在 `r1` 中且不出现在 `r2` 中”的元组 `t` 的集合。\n\n\n\n*注*：关系差运算符在某些方面与同名的数学或集合论运算符不同，详见相关条目。实际上，它是半差的一种特例，详见相关条目。\n\
  \n**示例**：表达式 `(S{CITY}) MINUS (P{CITY})` 表示分别对关系变量 `S` 和 `P` 的当前值在 `{CITY}` 上进行投影后得到的关系之间的差集。该差集是一个类型为\
  \ `RELATION {CITY CHAR}` 的关系。此外，如果关系变量 `S` 和 `P` 的当前值分别是 `s` 和 `p`，那么该关系的主体由所有形式为\
  \ `< c>` 且出现在 `s{CITY}` 中但不出现在 `p{CITY}` 中的元组组成——这意味着 `c` 是一个当前供应商所在城市，但它不是当前零件所在城市。注意，表达式\
  \ `(S{CITY}) MINUS (P{CITY})` 在语义上等价于表达式 `(S{CITY}) NOT MATCHING (P{CITY})`——或者更简单的表达式\
  \ `(S{CITY}) NOT MATCHING P`。\n\n**差（包理论）** *参见* 包。\n\n**差（集合论）** 指所有出现在一个给定集合中而不在另一个集合中的元素组成的集合。*另见*\
  \ 补集（集合论）；*对比* 对称差。\n\n**直接映像** 一种相对简单的实现风格，见于当今主流数据库产品中的大多数（如果不是全部）。在这种风格下，物理存储的内容实际上只是用户逻辑所见内容的直接映像（即，关系变量作为物理文件存储，元组和属性作为这些文件内的记录和字段存储）。\n\
  \n**直接证明** *参见* 证明。\n\n**直接推理** *参见* *肯定前件*。\n\n**有向关系** 指该术语的第三种定义意义上的关系。\n\n***关系数据库词典（扩展版）***\n\
  \n**47**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00152.png)\n\
  \n**可分辨性** 可区分性。*参见* 不可分辨者的同一性原理。\n\n**不相交的**（指一组包或集合）没有共同元素的。\n\n**不相交并集** 关系并集运算符的一个变体，要求其操作数关系不相交，即它们没有共同的元组。（此操作显然可以推广，不仅适用于关系，也适用于一般的集合。）\n\
  \n**示例**：考虑表达式 `(S{CITY}) D_UNION (P{CITY})`。如果关系变量 `S` 和 `P` 的当前值如图 1 所示，该表达式将导致运行时错误，因为操作数并非不相交。但如果它们是不相交的，那么该表达式在语义上就等价于\
  \ `(S{CITY}) UNION (P{CITY})`。\n\n**析取项** 一个与其他零个或多个谓词进行或（OR）运算的谓词。\n\n**析取** 1.\
  \ （*二元情况*）如果 `p` 和 `q` 是谓词，它们的析取 `(p) OR (q)` 也是一个谓词。令 `(ip) OR (iq)` 是该谓词的一个调用（其中\
  \ `ip` 和 `iq` 分别是 `p` 和 `q` 的调用）。那么，调用 `(ip) OR (iq)` 的求值结果为 `TRUE`，当且仅当 `ip` 和\
  \ `iq` 中至少有一个的求值结果为 `TRUE`。*注*：在析取中包围 `p` 和 `q` 的圆括号在实践中可能并非必需。 2. （*N 元情况*）令 `p1`，`p2,\
  \ . . ., pn`（`n` ≥ 0）为谓词。那么析取 `OR {p1,p2,. . .,pn}` 等价于表达式 `FALSE OR (p1) OR (p2)\
  \ OR . . . OR (pn)`。\n\n*另见* 包容性或。\n\n**析取范式** 一个谓词是析取范式（`DNF`），当且仅当它的形式为 `(p1)\
  \ OR (p2) OR . . . OR (pn)`，其中没有任何析取项 `(p1)`、`(2)`、...、`(pn)` 涉及任何 `OR`——更准确地说，其中每个析取项\
  \ `(p1)`、`(p2)`、...、`(pn)` 都是文字的合取（*参见* 文字，第二种定义）。\n\n**DISTINCT** *参见* SELECT 表达式。\n\
