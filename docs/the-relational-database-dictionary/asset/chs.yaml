  #### 多重赋值

  一种允许同时执行多个独立赋值，且仅在所有独立赋值完全执行后才进行完整性检查的操作。注意，多重赋值隐含地涉及许多其他操作——例如，更新某个连接视图，或以引发补偿操作（参见
  `compensating action`）的方式更新某个关系变量。


  ### 示例

  以下“双删除”在逻辑上是一个多重赋值操作：

  ```sql

  DELETE S WHERE S# = S#(''S1'') ,

  DELETE SP WHERE S# = S#(''S1'') ;

  ```

  注意第一个 `DELETE` 后的逗号分隔符，这在语法上表明整个语句尚未结束。


  还需注意，如果两个独立的 `DELETE` 以相反的顺序指定，语义将完全保持不变。其扩展形式为：

  ```sql

  S := S WHERE NOT ( S# = S#(''S1'') ) ,

  SP := SP WHERE NOT ( S# = S#(''S1'') ) ;

  ```


  #### 多重度

  参见 `bag`。


  #### 多集

  同 `bag`。


  #### 多值依赖

  函数依赖概念的推广（每个函数依赖都是多值依赖，但并非所有多值依赖都是函数依赖）。


  多值依赖是一个表达式——实际上是一个命题——形式为 *A* →→ *B*，其中 *A* 和 *B* 都是同一关系变量 *R* 的标题的子集，整个表达式读作“*B*
  多值依赖于 *A*”，或“*A* 多值确定 *B*”，或更简单地，“*A* 双箭头 *B*”。


  设 *C* 是同一关系变量 *R* 标题的子集，使得 *A*、*B* 和 *C* 的集合论并集等于该标题。设 *AB* 表示 *A* 和 *B* 的集合论并集，*AC*
  同理。那么关系变量 *R* 满足多值依赖（MVD）*A* →→ *B* 和 *A* →→ *C*——等价地说，这些 MVD 在关系变量 *R* 中成立——当且仅当
  *R* 满足连接依赖 ∗{ *AB,AC*}。


  > **注意**：多值依赖也称为多值依赖性。观察 MVD *A* →→ *B* 中的 *A* 和 *B* 具体是属性集。然而在非正式场合，通常（尽管严格来说不正确）会说
  *B* 中的属性本身多值依赖于 *A*，而不是说包含这些属性的集合 *B* 多值依赖于 *A*。同样，通常（尽管严格来说不正确）会说 *A* 中的属性本身多值确定
  *B*，而不是说包含这些属性的集合 *A* 多值确定 *B*。注意，根据定义，如果关系变量 *R* 满足 MVD *A* →→ *B* 和 *A* →→ *C*，那么如果它包含元组
  < *a,b1,c1*> 和 < *a,b2,c2*>，它也必然包含元组 < *a,b1,c2*> 和 < *a,b2,c1*>。进一步注意，同样直接从定义可知，关系变量
  *R* 可以无损分解为其在 *AB* 和 *AC* 上的投影，当且仅当它满足 MVD *A* →→ *B* 和 *A* →→ *C*（这个定理是 Heath 定理的强化形式，是
  Fagin 提出的众多定理之一）。最后注意，从形式化的角度看，MVD *A* →→ *B* 只是一个命题，根据定义，它要么被满足，要么不被满足（即求值为 `TRUE`
  或 `FALSE`）；然而非正式地，通常将 *A* →→ *B* 定义为一个 MVD 仅当它实际被相关关系变量满足时。但该定义没有方式表达一个给定的关系变量不满足或违反某个
  MVD（因为根据该定义，一个未被满足的 MVD 就不是 MVD！）。


  #### 变异

  有时使用的术语（尤其在面向对象上下文中）表示更新。


  #### 变异器

  有时使用的术语（尤其在面向对象上下文中）表示更新运算符。（SQL 对该术语的使用是非正统的，因为它的变异器是只读的。）


  #### MVD

  多值依赖。


  #### 超键隐含的 MVD

  MVD *A* →→ *B* 由超键隐含，当且仅当 *A* 是相关关系变量的超键。


  ### N


  #### n 元

  （指运算符）恰好有 *n* 个操作数；即用恰好 *n* 个参数定义（*n* ≥ 0）。


  > **注意**：设 *Op* 为一个二元运算符。如果我们想定义 *Op* 的 *n* 元版本，那么至少在该 *n* 元版本旨在应用于集合（而非序列）操作数时，*Op*
  必须是可交换且可结合的。本词典中此类运算符的定义示例包括：(a) 逻辑运算符 `AND`、`EQUIV`、`OR` 和 `XOR`；(b) 关系运算符 `intersect`、`join`、`product`
  和 `union`。


  #### n 元

  （指标题、键、元组、元组变量、关系或关系变量）度为 *n*（*n* ≥ 0）。


  #### n 位

  （指谓词）同 `n-adi`（*n* ≥ 0）。


  #### n 元组

  度为 *n* 的元组（*n* ≥ 0）。


  #### 与非

  在逻辑中，一个二元连接词（也称为谢弗竖线，通常写作垂直线“|”）；如果 *p* 和 *q* 是谓词，那么 ( *p*)|( *q*) 也是一个谓词。设 ( *ip*)|(
  *iq*) 是该谓词的一次调用（其中 *ip* 和 *iq* 分别是 *p* 和 *q* 的调用）。那么该调用 ( *ip*)|( *iq*) 求值为 `FALSE`，当且仅当
  *ip* 和 *iq* 都求值为 `TRUE`。（换句话说，( *p*)|( *q*) 等价于 `NOT(( p) AND ( q))`。）


  > **注意**：在表达式 ( *p*)|( *q*) 中包围 *p* 和 *q* 的括号在实践中可能不需要。另外，如上定义的 `NAND` 是一个逻辑运算符；然而，代数
  `A`（参见 `A`）包含一个也叫 `NAND` 的运算符，根据定义它是一个代数运算符（它基本上是“连接的补”）。


  #### 自然连接

  1.  （二元情况）设关系 *r1* 和 *r2* 满足同名属性属于相同类型（换句话说，*r1* 和 *r2* 是可连接的，参见 `joinable`）。那么
  *r1* 和 *r2* 的自然连接 *r1* `JOIN` *r2* 是一个关系，其标题是 *r1* 和 *r2* 标题的集合论并集，其主体是所有元组 *t*
  的集合，其中 *t* 是来自 *r1* 的一个元组和来自 *r2* 的一个元组的集合论并集。

  2.  （n 元情况）设关系 *r1, r2, . . ., rn*（*n* ≥ 0）满足同名属性属于相同类型（换句话说，*r1, r2, . . ., rn*
  是可连接的，参见 `joinable`）。那么自然连接 `JOIN { r1,r2,. . .,rn}` 定义如下：如果 *n* = 0，结果是 `TABLE_DEE`；如果
  *n* = 1，结果是 *r1*；否则，从集合 *r1, r2, . . ., rn* 中任意选择两个不同的关系，并用它们的（二元）自然连接替换它们，重复此过程，直到集合中只剩下一个关系
  *r*，该关系即为最终结果。


  ### 示例

  表达式 `S JOIN SP` 表示关系变量 `S` 和 `SP` 的当前值对应关系的自然连接。该连接是一个类型为 `RELATION {S# S#, SNAME
  NAME, STATUS INTEGER, CITY CHAR, P# P#, QTY QTY}` 的关系。此外，如果关系变量 `S` 和 `SP` 的当前值分别是
  *s* 和 *sp*，则该关系的主体由所有形式为 < *s#,sn,st,sc,p#,q*> 的元组组成，其中元组 < *s#,sn,st,sc*> 出现在 *s*
  中，且元组 < *s#,p#,q*> 出现在 *sp* 中。


  #### 否定

  如果 *p* 是一个谓词，其否定 `NOT( p)` 也是一个谓词。设 `NOT( ip)` 是该谓词的一次调用（其中 *ip* 是 *p* 的调用）。那么该调用
  `NOT( ip)` 求值为 `TRUE`，当且仅当 *ip* 求值为 `FALSE`。


  > **注意**：在表达式 `NOT( p)` 中包围 *p* 的括号在实践中可能不需要。




  #### 失败即否定

  这是“封闭世界假设”的一个密切相关概念；粗略地说，它意味着如果一个给定的元组本应（至少在原理上）出现在某个查询的结果中但实际没有出现，则该元组所代表的命题为假。


  #### 负的

  严格小于零。（表达式 `-0` 当然是合法的，但它并不表示一个负值；相反，它表示非负值 0。）


  #### 嵌套关系

  *参见* 关系值属性。


  #### NF²

  NF 平方；NFNF（“非第一范式”）的缩写。粗略地说，一个 NF² 关系变量是至少包含一个关系值属性的关系变量。


  然而，该术语已被弃用，因为它基于对第一范式概念有缺陷的理解。此外，NF² 概念通常被认为包含了对传统关系运算符的某些扩展，这些扩展不仅仅是简写形式，因此没有被包含（或不需要）在关系模型中。


  #### 零元

  （*指一个运算符*）没有操作数；即，其定义不涉及任何参数。*注意*：一个运算符在语法上可能看起来是零元的，但由于其使用了可能被称为隐藏操作数的东西（例如系统时钟），它每次调用的效果可能并不限于相同。确实，这种“零元”运算符——当然，无论如何它们并非真正的零元——是常见的情况。


  **示例**：许多语言提供一个运算符来生成随机（或者更确切地说，“伪随机”）数。这样的运算符有效地拥有一个隐藏操作数：即前一次调用返回的随机数。


  #### 非交换群

  *参见* 群（数学）。


  #### 非键属性

  给定关系变量的一个属性，且该属性不属于该关系变量的任何键。


  #### 无损分解

  用关系变量 *R* 的投影 *R1*、*R2*、……、*Rn* 来替换它，使得 (a) *R1*、*R2*、……、*Rn* 的连接保证等于 *R*，并且通常也使得
  (b) *R1*、*R2*、……、*Rn* 中的每一个对于提供该保证都是必需的（即这些投影中没有一个在连接中是冗余的）。请注意，对于任何给定的关系变量 *R*，一个总是可用的“无损分解”是“替换”
  *R* 为相应的恒等投影（恒等投影，q.v.）。


  **示例**：一个可能应用于供应商-零件数据库的无损分解是，用其在 {供应商号, 供应商名} 和 {供应商号, 状态, 城市} 上的投影来替换关系变量 S。然后可以通过将这两个投影重新连接在一起来重构关系变量
  S。


  #### 非负的

  大于或等于零。*对比* 正的。


  #### 非标量

  非标量的。关系模型中最重要的非标量结构是元组以及（尤其是）关系本身。


  #### 非平凡的

  （*指一个 FD、JD 或 MVD*）非平凡的。*参见* 平凡 FD; 平凡 JD; 平凡 MVD。


  #### 或非

  在逻辑中，一种二元连接词（也称为皮尔士箭头，通常写作向下的箭头 “↓”）；如果 *p* 和 *q* 是谓词，那么 ( *p*)↓( *q*) 也是一个谓词。令
  ( *ip*)↓( *iq*) 为该谓词的一次调用（其中 *ip* 和 *iq* 分别是 *p* 和 *q* 的调用）。那么该调用 ( *ip*)↓( *iq*)
  的求值结果为 TRUE 当且仅当 *ip* 和 *iq* 的求值结果均为 FALSE。（换句话说，( *p*)↓( *q*) 等价于 NOT(( *p*) OR
  ( *q*))。）*注意*：在表达式 ( *p*)↓( *q*) 中包围 *p* 和 *q* 的圆括号在实践中可能不需要。此外，按上述定义的“或非”是一个逻辑运算符；然而，代数
  **A**（q.v.）包含一个名为“或非”的运算符——根据定义——它是一个代数运算符（本质上是“并集的补集”，不过这里的“并集”指的不是关系运算符中的那个名字，而是该运算符的一种广义形式）。


  #### 范式

  1. （*通用*）规范形式。2. （*指一个关系变量*）*参见* 第一范式；第二范式；等等。*注意*：最重要的关系范式是 BCNF 和 5NF（以及 6NF）；其他的主要是具有历史意义。


  #### 规范化

  使用无损分解的原则，用某个关系变量的某些投影来替换给定的关系变量，使得这些投影的连接保证等于原始关系变量。因此，请注意，投影是分解运算符，而连接是重组运算符，这与规范化过程（通常按后者理解）相关。规范化的目标是减少冗余（q.v.），从而消除可能发生的某些更新异常（q.v.）。


  #### 规范化原则

  一个不属于 5NF 的关系变量应被分解为一组 5NF 投影；原始关系变量应能通过将这些投影重新连接在一起来重构；分解过程应保持依赖关系；每个投影在重构过程中都应是必需的。


  #### 规范化的

  关系，因而也是关系变量的一种属性，根据该属性，所讨论的关系或关系变量中的每个元组对其每个属性都恰好包含一个（适当类型的）值。实际上，一个对其每个属性不包含恰好一个适当类型值的“元组”首先就不是一个元组；同样，一个包含这种“元组”的“关系”也不是关系，而其值是这种“关系”的“关系变量”也不是关系变量。换句话说，根据定义，所有关系，因而所有关系变量，都是规范化的。*注意*：关系变量尤其等价地被称为处于第一范式，1NF（q.v.）；也就是说，一个规范化的关系变量就是一个处于
  1NF 的关系变量，这意味着它只是一个关系变量。然而，术语 *规范化的* 经常（尽管不准确地）被用来指代高于第一范式的某些范式（特别是 BCNF 或 5NF）。


  #### 规范化的关系变量

  一个关系变量。（根据定义，关系变量总是规范化的，其意义在于它们至少处于第一范式。）


  #### 非

  *参见* 否定。*注意*：按常规理解的“非”是一个逻辑运算符；然而，代数 **A**（q.v.）包含一个名为“非”的运算符——根据定义——它是一个代数运算符（本质上是“补集”）。


  #### 不匹配

  *参见* 半差。


  #### 空值

  一种在 SQL 中特别用于表示缺失信息（q.v.）的结构。*注意*：根据定义，空值不是值（它们有时被称为 *标记*）；因此，一个“包含空值”的“类型”不是类型，一个“包含空值”的“元组”不是元组，一个“包含空值”的“关系”不是关系，一个包含空值的“关系变量”也不是关系变量。进一步地，空值严重破坏了关系模型，因此本词典对于大多数与空值相关的概念几乎不予讨论。


  #### 空集

  有时使用（非常不幸地！）表示空集的过时术语。


  #### 零元的

  零度的。由于可能与空值（q.v.）混淆，该术语最好避免使用。


  #### 零元外键

  一个零度的外键。


  #### 零元表头

  空表头；即，零度的表头。


  #### 零元键

  一个空的键；即，一个零度的键。




  #### 零元投影

  1.  （关系而言）给定关系`r`在无属性上的投影（即`r{}`）；如果`r`为空，则结果为`TABLE_DUM`，否则结果为`TABLE_DEE`。

  2.  （元组而言）给定元组在无属性上的投影；结果始终是空元组。


  #### 零元关系

  零度关系。恰好有两个这样的关系：`TABLE_DEE`和`TABLE_DUM`。


  #### 零元元组

  空元组；即零度元组。


  #### 空学

  空集的研究。该术语与`null`无关。


  #### nVL

  一种具有`n`个“真值”的逻辑；换句话说，是某个`n`≥2 的`n`值逻辑。

  *注意*：如果`n` = 2，那些“真值”实际上是真值，我们可以去掉引号。


  #### 对象

  一个事物。


  #### 对象类

  参见`class`（第二个定义）。


  #### 对象 ID

  一个指针。


  #### 对象建模

  参见`semantic modeling`。


  #### 面向对象 / 对象取向

  倾向于事物的。


  #### 对象/关系数据库

  关系数据库（参见`object/relational DBMS`）。


  #### 对象/关系 DBMS

  一种关系数据库管理系统。

  *注意*：实际上，提供“对象/关系”支持的商业数据库管理系统与不提供这种支持的主要区别在于，前者允许用户定义自己的类型。但是一个真正的关系数据库管理系统也会这样做，因此不提供这种支持的数据库管理系统就不能合理地声称是完全关系的，即使它支持关系模型的其他方面。事实是，术语`object/relational`几乎只是一个营销标签，旨在掩盖早期“关系”产品不太关系的本质。因此有了当前的定义，即“对象/关系”仅仅意味着关系。


  #### 观察者

  有时使用的术语（尤其在面向对象上下文中），指只读运算符。


  #### 一对多对应

  严格来说，一种配对两个集合`s1`和`s2`（`s1`和`s2`不一定不同）的规则，使得`s1`的每个元素对应`s2`的至少一个元素，且`s2`的每个元素对应`s1`的恰好一个元素；等价地，指该配对本身。

  然而，该术语常被宽松地使用，表示一种配对，其中：(a) `s1`的每个元素对应任意数量的`s2`元素（可能为零），且`s2`的每个元素对应`s1`的恰好一个元素；或
  (b) `s1`的每个元素对应`s2`的至少一个元素，且`s2`的每个元素对应`s1`的至多一个元素；或 (c) `s1`的每个元素对应任意数量的`s2`元素（可能为零），且`s2`的每个元素对应`s1`的至多一个元素。除非预期含义明确，否则最好避免使用该术语。

  **示例**（仅严格意义）：令`s1`为所有非负数的集合，`s2`为所有数的集合。那么，将非负数`x`与其平方根±√`x`配对，是从`s1`到`s2`的一个多对一对应。


  #### 一一对应

  严格来说，一种配对两个集合`s1`和`s2`（`s1`和`s2`不一定不同）的规则，使得`s1`的每个元素对应`s2`的恰好一个元素，且`s2`的每个元素对应`s1`的恰好一个元素（换句话说，是一个双射）；等价地，指该配对本身。

  然而，该术语常被宽松地使用，表示一种配对，其中：(a) `s1`的每个元素对应至多一个`s2`元素，且`s2`的每个元素对应`s1`的恰好一个元素；或 (b)
  `s1`的每个元素对应恰好一个`s2`元素，且`s2`的每个元素对应`s1`的至多一个元素；或 (c) `s1`的每个元素对应至多一个`s2`元素，且`s2`的每个元素对应`s1`的至多一个元素。除非预期含义明确，否则最好避免使用该术语。

  **示例**（仅严格意义）：令`s`为所有整数的集合。那么，将元素`x`与其后继`x`+1 配对，是从`s`到其自身的一一对应；将元素`x`与其前驱`x`-1
  配对也是一一对应。


  #### 到上

  （函数而言；用作形容词）值域等于陪域（与`into`对比）。参见`bijection`；`surjection`。


  #### OO

  面向对象或面向对象，视上下文而定。


  #### 开放 WFF

  一个未封闭的 WFF；即，表示非命题的谓词的 WFF。


  #### 开放世界假设

  宽泛地说，假设数据库陈述或隐含的一切为真，而其他一切未知。

  更精确地说，开放世界假设（OWA）——通常被拒绝，而倾向于封闭世界假设——指出：(a) 如果一个给定元组在给定时间出现在一个给定的关系变量中，则该元组所代表的命题在该时间为真；(b)
  如果一个给定元组在该时间可以出现在该关系变量中但没有出现，则该元组所代表的命题在该时间可能为真也可能为假。换句话说，在任何给定时间，该关系变量包含且仅包含那些已知对应于真命题的元组——即，在该时间已知求值为
  TRUE 的关系变量谓词的调用或完全实例化。

  *注意*：所讨论的关系变量不必是基本关系变量，这就是为什么原始宽泛描述中出现“或隐含”这个短语。还要注意，该定义是用关系变量专门表述的，但一个精确类似的定义也适用于关系（参见`extension`，第三个定义）。最后注意，OWA
  被强烈反对，因为它似乎直接导致需要支持三值逻辑。


  #### 操作数

  执行操作的对象。另见`argument`；`parameter`。


  #### 运算

  一个运算符；有时指调用运算符时执行的过程。


  #### 运算符

  可以是只读运算符或更新运算符。

  *注意*：该术语常被更具体但有点宽松地用于特指只读运算符。它也常被更具体地用于指由特殊符号（如`/`）而非标识符（如`DIV`）表示的只读运算符，在这种情况下，其他只读运算符（即由标识符表示的）通常被称为函数。然而，后一种用法是误导性的，因此不推荐，因为严格来说，所有只读运算符都是函数。


  #### 优化

  将关系表达式——实际上是查询、更新和约束——转换为“最佳可能”可执行代码的过程，其中“最佳可能”基本上意味着*性能最佳*。该术语有点夸大，因为很少能保证生成的可执行代码在任何意义上都是真正最优的。另见`database
  statistics`；`expression transformation`；`semantic optimization`。




  #### 优化器

  DBMS 中负责优化的部分，参见*q.v.*。


  #### 可选参与

  参见`基数约束`。


  #### 或

  参见`析取`。*注*：通常理解的“或”是一个逻辑运算符；然而，代数**A**（参见*q.v.*）包含一个名为“或”的运算符，根据定义，它是一个代数运算符（实际上，它是并集的一种广义形式）。


  #### ORDER BY

  参见`排序`。


  #### 有序 n 元组

  参见`有序对`。注意，有序*n*-元组不是关系模型意义上的元组（关系模型中的元组其分量没有顺序）。


  #### 有序对

  一种组合，通常记为<*x, y*>，由恰好两个元素*x*和*y*组成，其中*x*是第一元素，*y*是第二元素。有序对<*x1, y1*>和<*x2, y2*>相等当且仅当*x1*
  = *x2*且*y1* = *y2*（因此，一般来说<*x, y*> ≠ <*y, x*>）。形式上，<*x, y*>被定义为等于集合{{*x*}, {*x,
  y*}}；请注意，该集合中的一个元素确定了构成有序对的元素，另一个元素则确定了这些元素中哪一个排在第一位。*注*：这个定义可以轻松扩展到有序三元组、有序四元组，...，以及更一般地，对于任意*n*
  > 1 的有序*n*-元组。


  #### 有序元组

  参见`有序 n 元组`。


  #### 排序

  为关系的属性施加从左到右的序列，特别是为元组施加从上到下的序列的过程，或该过程的结果，以便将相关关系中的数据转移出关系上下文，进入一个依赖此类序列的环境。请求这种排序（或称“定序”）的运算符具有重要的实用价值，但它们不是关系运算符，因为其结果不是关系。*注*：思考此类运算符的一个便捷方式是，它们将关系转换为表（因为表与关系不同，其列具有从左到右的顺序，行具有从上到下的顺序）。


  *示例*：提供此功能的 SQL 运算符是`SELECT`（用于从左到右的列序）和`ORDER BY`（用于从上到下的行序）。


  *注*：顺便值得指出，`ORDER BY`不是函数——也就是说，给定`ORDER BY`调用的结果通常是不确定的（例如，考虑`ORDER BY CITY`对图
  1 所示的、作为`relvar S`当前值的关系的影响）。相比之下，关系代数的运算符确实都是函数。（顺便说一句，这些运算符的 SQL 模拟并不总是如此，因为 SQL
  允许即使`v1`和`v2`不是相同值，`v1 = v2`形式的比较也返回`TRUE`。）`ORDER BY`在另一个方面也不同寻常。具体来说，它产生一个元组序列作为其结果，然而运算符“<”和“>”对于元组是明确定义不适用的（参见`元组比较`）。


  #### 排序（数学）

  参见`偏序`；`全序`。


  #### 序数类型

  一种定义了`全序`（参见*q.v.*）的类型。设`T`为这样一种类型。那么，通常与类型`T`相关联的运算符将包括：(a) 零元`FIRST`和`LAST`运算符，分别根据该全序返回类型`T`的第一个值和最后一个值；(b)
  一元`NEXT`和`PRIOR`运算符，给定类型`T`的一个值`v`，分别返回在类型`T`中紧随`v`之后的值和紧接`v`之前的值，同样根据该全序。


  *示例*：类型`INTEGER`是一个序数类型。`NEXT`和`PRIOR`运算符基本上分别就是`加一`和`减一`。`FIRST`和`LAST`运算符通常不直接支持，但返回最小和最大整数的选择器调用足以满足需求。


  作为反例，假设系统还支持一个类型`POINT`，可能是用户定义的，表示二维空间中的几何点。那么类型`POINT`大概不会是一个序数类型，因为一个点以某种方式小于或大于另一个点的概念没有意义。


  #### 正交的

  独立的。


  #### 正交分解

  将某个给定的`关系变量`分解为限制条件，使得这些限制条件满足`正交设计原则`。


  *示例*：假设我们用两个关系变量`LP`和`HP`替换`关系变量 P`，`LP`包含重量小于或等于 17.0 的零件的元组，`HP`包含重量大于 17.0 的零件的元组；那么该分解就是正交的。相比之下，假设`关系变量
  HP`被定义为包含重量大于*或等于*17.0 的零件的元组；那么该分解就不是正交的，因为重量等于 17.0 的零件的元组在逻辑上应同时属于`LP`和`HP`。


  #### 正交设计原则

  参见`正交设计原则`。


  #### 重载

  为两个或多个不同的运算符使用相同的名称。这些运算符最好具有相似的语义。


  *注*：重载也被更具体地称为重载多态；它也被称为特设多态。在继承上下文中，该术语有时也用来表示`包含多态`（参见*q.v.*）；但是，这种特定用法不被推荐，因为它基于对子类型和超类型本质的有缺陷的理解。进一步的细节超出了本词典的范围。


  *示例*：`UNION`被重载，因为该名称（即名称）被用于表示关系并集和元组并集（而在 SQL 中它也被用于表示并集加上，尽管奇怪的是它本身不表示包并集）。同样，“=”被重载，因为它适用于每种类型的值（即，存在用于整数的“=”运算符，另一个用于供应商编号，另一个用于类型为`RELATION
  {S# S#, P# P#, QTY QTY}`的关系，等等）。


  #### 覆盖

  用另一个具有相同名称、相同参数数量、相同参数和结果类型——即相同`特征`（参见*q.v.*）——但不同语义的运算符替换一个运算符。（它与`域检查覆盖`（参见*q.v.*）无关。）*对比*`重载`。


  *示例*：假设存在一个名为`LOG`的运算符（可能是内置的），它返回自然对数。那么可能可以用一个返回以十为底的对数的运算符来覆盖它。


  #### OWA

  开放世界假设。


  #### P-关系

  参见`RM/T`。


  #### 对

  指基数为二的集合，或者更常见的是指`有序对`（参见*q.v.*），具体取决于上下文。


  #### 参数

  定义某个运算符所依据的形式操作数，当调用该运算符时，将被某个`实参`替换。（稍微简化一下，参见`泛型运算符`，）每个参数都被声明为某种类型，并且任何与给定参数对应的实参必须与该参数类型相同。*对比*`实参`。


  #### 父表

  有时在 SQL 上下文中用来表示（SQL 模拟的）`被引用关系变量`（参见*q.v.*）的术语，因不恰当而被弃用。



  #### 偏函数


  设 `f` 是一个定义域为 `d` 的函数，且 `dd` 是 `d` 的一个超集；那么 `f` 可以被视为一个定义域为 `dd` 的偏函数。换句话说，偏函数就是函数（参见该词条），只不过可能存在定义域中的元素
  `x` 在陪域中没有对应的像 `y`。*对比***全函数**。


  ### 示例


  设 `s` 为实数集。那么，“取倒数”是一个定义域和陪域都是 `s` 的偏函数（它是偏函数，因为 `s` 中有一个元素，即 `0`，没有倒数）。


  #### 偏实例化


  *参见***实例化**。


  #### 偏序


  设 `s` 是一个集合。那么，`s` 上的一个偏序是一个二元真值运算符，通常记为 "≤"，使得对于 `s` 中的所有 `x`、`y` 和 `z`：

  - `x ≤ y` 或 `y ≤ x`（或两者，或可能两者都不）；

  - `x ≤ x`（自反性）；

  - 若 `x ≤ y` 且 `y ≤ z`，则 `x ≤ z`（传递性）；

  - 若 `x ≤ y` 且 `y ≤ x`，则 `x = y`（反对称性）。


  *对比***全序**。


  ### 示例


  设 `s` 是一个任意集合，`p` 是 `s` 的幂集，并用 "≤" 表示集合包含运算符（更常写作 "⊆"）。那么 "≤" 就是 `p` 上的一个偏序。（而且，这是一个非全序的偏序，除非在
  `s` 的基数（元素个数）为零或一这种退化情况下。）


  #### 划分


  设 `s` 是一个集合。那么，`s` 的一个划分是 `s` 的若干子集（称为“划分块”）构成的集合，使得 `s` 的每个元素恰好是其中一个子集的元素。注意：

  - 各划分块两两不相交；

  - 它们的并集等于 `s`。


  *另见***等价类**。


  #### 皮尔士符号


  *参见***或非**。


  #### 持久性


  指数据一旦插入数据库，就会一直保留（“持久存在”）直到被显式删除的属性。基本关系变量尤其具有这种意义上的持久性。


  #### 物理数据独立性


  *参见***数据独立性**。


  #### 物理数据库设计


  给定某个逻辑数据库设计，决定该逻辑设计应如何映射到目标 DBMS 所支持的任何物理结构的过程（或该过程的结果）。因此，请注意，物理设计应当源自逻辑设计，而不是反过来；实际上，理想情况下它应该是自动推导出来的。


  #### 图像


  *（对于关系、属性或元组）* 分别*参见***表**、**列**和**行**；*另见***单元格**。注意在所有情况下，图像与其所描绘的事物之间存在逻辑上的区别。


  #### 管道化


  一种实现技术，其中中间结果关系的元组被逐个生成并传递给另一个操作，而不是成批传递。*对比***物化**（第一个定义）。


  #### PJ/NF


  投影-连接范式，参见该词条。


  #### 占位符


  一个自由变量或参数。


  #### PNF


  前束范式。


  #### 指针


  一种实现结构。众所周知，指针被排除在关系模型之外。事实上，将指针和关系混合使用——即允许一个“关系”拥有一个“属性”，其值是指向另一个“关系”中“元组”的指针（这种情况被一些
  SQL 产品以及 SQL 标准所支持，尽管它违反了信息原理等原则）——被称为第二大错误。（关于第一个错误，*参见***类型**。）*另见***引用**。


  *注意*：一些作者专门用术语 *指针* 来指值是某种物理地址的指针，而用术语 *引用*（或类似术语）来指其他类型的指针。这种区分在某些语境中可能有用，但与关系模型无关。还要注意，外键尤其不是指针；除其他原因外，外键值标识的是元组（它们是值），而指针值是地址，因此根据定义，它们标识的是变量（这就是为什么它们违反信息原理）。*参见***值**；**变量**。


  #### 多态运算符


  *参见***多态**。


  #### 多态


  粗略地说，指一个运算符在不同调用时允许其参数类型不同的概念。*参见***泛型多态**；**包含多态**；**重载**。


  #### 正


  严格大于零。*对比***非负**。


  #### 幂集


  给定集合的所有子集构成的集合。如果给定集合的基数（元素个数）为 `n`，则幂集的基数为 `2ⁿ`（这个计数包括空集和与原始集合完全相同的集合，这两者确实都是原始集合的子集）。


  #### 谓词


  一个真值函数。给定一个任意谓词，用实参替换该谓词的参数就产生一个命题（因此，另一种理解谓词的方式是，将其视为一个参数化或一般化的命题）。


  *注意*：当且仅当该参数集合为空时，谓词退化为命题（即它本身已经是一个命题）。换句话说，所有命题都是谓词，但大多数谓词不是命题。


  #### 谓词演算


  一个关于谓词、连接词以及可以使用这些谓词和连接词进行推理的形式系统，它具有可靠性和完备性。


  *注意*：谓词演算与命题演算（参见该词条）的主要区别在于，谓词与命题不同，允许包含量词和逻辑变量（包括自由的和约束的），这使得谓词演算功能更强，适用范围更广。


  #### 谓词常元


  与**谓词**相同。


  #### 谓词表达式


  表示一个谓词的表达式；即涉及谓词常元、谓词变元、连接词和括号的表达式。


  *注意*：很少有逻辑学教材使用这个术语；事实上，逻辑学教材通常似乎根本没有一个专门的术语来指代这个结构，除了*谓词*本身（即使是那些使用*命题形式*来指代命题表达式的教材，也未必会使用显而易见的*谓词形式*来指代谓词表达式）。


  ### 示例


  如果 `p` 和 `q` 是谓词变元，那么 `p`、`q`、合取 `(p) AND (q)`、析取 `(p) OR (q)` 以及否定 `NOT(p)` 都是谓词表达式。


  #### 谓词形式


  与**谓词表达式**相同。


  #### 谓词逻辑


  与**谓词演算**相同。


  #### 谓词变元


  其值为一个谓词的变量。（一些作者用该术语来指自由变量，但这种用法是不推荐的。）


  #### 前提


  在逻辑中，为证明或尝试证明而假定为真的陈述。



  #### 前束范式

  当且仅当所有量词都出现在开头时，一个谓词才处于前束范式（`PNF`）；更精确地说，当且仅当（a）它无量词或（b）它的形式是 `EXISTS x ( p)` 或
  `FORALL x ( p)`，且其中的 `p` 本身也处于 `PNF` 时，它才处于 `PNF`。因此，一个 `PNF` 谓词的形式是

  `Q1 x1 ( Q2 x2 ( ... ( Qn xn ( p ) ) ) )`，其中 (a) `n >= 0`，(b) 每个 `Qi`（`i` = 1,2,
  . . . , `n`）是 `EXISTS` 或 `FORALL`，以及 (c) 谓词 `p`——有时称为主式——是无量词的。


  `示例`：考虑以下元组演算查询（“获取至少供应一个红色零件的供应商”）：

  ```

  SX RANGES OVER { S } ;

  SPX RANGES OVER { SP } ;

  PX RANGES OVER { P } ;

  SX WHERE

  EXISTS PX ( PX.COLOR = ''Red'' AND

  EXISTS SPX ( SPX.S# = SX.S# AND

  SPX.P# = PX.P# ) )

  ```

  这里的 `WHERE` 子句中的谓词并不处于前束范式。


  然而，下面是该查询的一个语义等价表述，其中谓词处于前束范式：

  ```

  SX WHERE

  EXISTS PX ( EXISTS SPX ( PX.COLOR = ''Red'' AND

  SPX.S# = SX.S# AND

  SPX.P# = PX.P# ) )

  ```

  前束范式在逻辑上并不比其他形式更正确，但稍加练习，它往往会成为最容易书写的形式。


  #### 保持依赖性

  *参见* `FD` 保持。


