  #### 多对多对应


  该术语常被宽松地使用，意指一种配对关系，满足以下任一条件：(a) `s1` 中的每个元素对应 `s2` 的任意数量元素（可能一个都没有），且 `s2` 中的每个元素至少对应
  `s1` 中的一个元素；或 (b) `s1` 中的每个元素至少对应 `s2` 中的一个元素，且 `s2` 中的每个元素对应 `s1` 的任意数量元素（可能一个都没有）；或
  (c) `s1` 中的每个元素对应 `s2` 的任意数量元素（可能一个都没有），且 `s2` 中的每个元素对应 `s1` 的任意数量元素（可能一个都没有）。除非意图明确，否则最好避免使用该术语。


