  \n![](img/00048.png)\n\n**分配律** 1. 令运算符 `OpM` 和 `OpD` 分别为一元和二元运算符，并为明确起见，假设 `OpD`\
  \ 以中缀风格表示。那么，`OpM` 对 `OpD` 满足分配律，当且仅当对于所有 `x` 和 `y`，`OpM(x OpD y) = (OpM(x)) OpD\
  \ (OpM(y))`。 2. 令运算符 `OpC` 和 `OpD` 均为二元运算符，并为明确起见，假设它们都以中缀风格表示。那么，`OpC` 对 `OpD`\
  \ 满足分配律，当且仅当对于所有 `x, y` 和 `z`，`x OpC (y OpD z) = (x OpC y) OpD (x OpC z)`。\n\n**示例**：1.\
  \ （*一元对二元*）在普通算术中，非负平方根（\"√\"）对乘法（\"*\"）满足分配律，因为对于所有 `x` 和 `y`，`√ (x * y) = √(x)\
  \ * √(y)`。类似地，在关系代数中，限制对 `UNION`、`INTERSECT` 和 `MINUS` 满足分配律。 2. （*二元对二元*）乘法对加法（\"\
  +\"）满足分配律，因为对于所有 `x, y` 和 `z`，`x * (y + z) = (x * y) + (x * z)`。类似地，在关系代数中，`UNION`\
  \ 和 `INTERSECT` 彼此之间都满足分配律。同样，在逻辑中，`OR` 和 `AND` 彼此之间也满足分配律。\n\n**DIVIDEBY** *参见*\
  \ 除法；大除；小除。\n\n**除法** 多年来，已经定义了几种逻辑上不同的关系除法运算符（即用于“除”一个关系的运算符）——事实上，种类如此之多，以至于最好完全不要使用这个术语，或者至少在任何给定的上下文中明确指出指的是哪个特定运算符。本词典定义了两种这样的运算符：大除和小除，详见相关条目。*注*：早期的\
  \ **Tutorial D** 版本明确支持这两种运算符；当前版本不支持，因为它们的功能可以通过多种其他方式获得。\n\n**DK/NF** 域键范式。\n\n\
  ***关系数据库词典（扩展版）***\n\n**49**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00173.png)\n\n**DNF** 析取范式。\n\n**域** 类型。早期的关系理论著作倾向于使用 *域* 这个术语；近期的著作则更倾向于使用\
  \ *类型*。\n\n**域（数学）** *参见* 函数；关系（数学）。\n\n**域演算** 关系演算的一种形式，在语义上等价于元组演算，详见相关条目。其中，范围变量在域（类型）上变化，而不是在关系上变化，因此表示来自那些域的值。\n\
  \n**示例**：以下是查询“获取供应至少一种零件的供应商名称”的域演算表述（*参见* 元组演算以了解其元组演算类似形式）：\n\n```\nNX RANGES\
  \ OVER { NAME } ;\nSX RANGES OVER { S# } ;\nPX RANGES OVER { P# } ;\nNX WHERE\n\
  \    EXISTS SX ( EXISTS PX ( S { S# SX, SNAME NX } AND\n                       \
  \    SP { S# SX, P# PX } ) )\n```\n\n用生硬的英语表达：“获取名称 `NX`，使得存在供应商编号 `SX` 且存在零件编号\
  \ `PX`，使得一个包含供应商编号 `SX` 和供应商名称 `NX` 的元组出现在关系变量 `S` 中，并且一个包含相同供应商编号 `SX` 和零件编号 `PX`\
  \ 的元组出现在关系变量 `SP` 中。” 正如你所见，这个特定例子比它的元组演算对应形式（*参见* 元组演算）更笨拙一些，但也有些情况恰好相反。\n\n**域检查覆盖**\
  \ 一种临时的、逻辑上有缺陷的（因此不推荐的）机制，用于在不同类型值之间执行比较。（它存在缺陷是因为它混淆了类型和表示之间的逻辑区别。）\n\n**域键范式**\
  \ 关系变量 `R` 属于域键范式（`DK/NF`），当且仅当适用于 `R` 的每个约束都由 `R` 的域键以及一般约束（如果有）所蕴含。注：此定义有所简化。更精确的定义，请参见引用的参考文献。\n\
  \n**50**\n\n***关系数据库词典（扩展版）***\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00012.png)\n\n\n### 适用于 `R` 的属性和键约束。（`属性-键范式` 会是更好的名称。无论如何，这个概念主要具有学术意义，因为关系变量可以很容易地被完全规范化——即达到\
  \ 5NF 或 6NF——但仍然不属于 `DK/NF`。）\n\n**示例：** 正如在 Boyce/Codd 范式下指出的那样，对于范式来说，展示一个反例往往比展示一个正面的例子更具启发性。因此，假设发货关系满足一个约束，其大意是奇数编号的零件只能由奇数编号的供应商提供，而偶数编号的零件只能由偶数编号的供应商提供（当然，这个例子非常牵强，但对于当前的目的来说已经足够）。那么这个约束显然不是由适用于关系变量\
  \ `SP` 的属性和键约束所蕴含的，因此 `SP` 不属于 `DK/NF`；但它当然属于 6NF。\n\n#### 域关系演算\n`域演算`，参见。\n\n\
  #### 点限定\n在元组演算及基于它的语言中，一个点限定名称是形如 `rx.A` 的表达式，其中 `rx` 是一个范围变量的名称，而 `A` 是该范围变量 `rx`\
  \ 所遍历的关系 `r` 的一个属性名称。这样的表达式用作属性引用，参见；它表示 `rx` 当前所指向的 `r` 的特定元组中属性 `A` 的值（或可能是指属性\
  \ `A` 本身）。点限定在元组演算中用于消除歧义——在 SQL 中也是如此——但在域演算或关系代数中则不然（后者使用属性（重）命名和名称作用域来达到等效效果）。\n\
  \n**示例：** 以下查询“找出至少提供一种零件的供应商”的元组演算表述，使用了两个点限定名称 `SPX.S#` 和 `SX.S#`：\n\n```\nSX\
  \ RANGES OVER { S } ;\nSPX RANGES OVER { SP } ;\nSX WHERE EXISTS SPX ( SPX.S# =\
  \ SX.S# )\n```\n\n这里是同一查询的关系代数表述，以作比较：`S MATCHING SP`。这里的“匹配”是基于属性 `S#` 进行的（因为该属性是关系变量\
  \ `S` 和 `SP` 唯一共同的属性）。\n\n#### 双箭头\n*参见* `多值依赖`。\n\n#### 双下划线\n一种约定，如图 1 所示，用于标记参与主键的属性。\n\
  \n#### `DRC`\n`域关系演算`。\n\n#### 删除\n*参见* `数据定义操作符`。\n\n#### 对偶\n1.  （*逻辑学*）`与`、`或`、`真`\
  \ 和 `假` 的对偶分别是 `或`、`与`、`假` 和 `真`（`非` 是其自身的对偶）。更一般地说，令 `x` 是一个仅涉及 `非`、`与` 和 `或` 这些连接词的逻辑表达式，并令\
  \ `y` 是通过将 `x` 中出现的每一个 `与`、`或`、`真` 和 `假` 替换为其对偶而得到的；那么 `x` 和 `y` 互为对偶。*注意*：由于每个逻辑表达式都等价于一个仅涉及\
  \ `非`、`与` 和 `或` 的表达式，因此每个逻辑表达式都有一个对偶。\n2.  （*集合论*）交集、并集、全集和空集的对偶分别是并集、交集、空集和全集（补集是其自身的对偶）。更一般地说，令\
  \ `x` 是一个仅涉及补集、交集和并集的集合论表达式，并令 `y` 是通过将 `x` 中出现的每一个交集、并集、全集和空集替换为其对偶而得到的；那么 `x`\
  \ 和 `y` 互为对偶。*注意*：由于每个集合论表达式都等价于一个仅涉及补集、交集和并集的表达式，因此每个集合论表达式都有一个对偶。*另见* `对偶原理`。\n\
  \n#### 双模原理\n指任何可以交互调用的关系操作，也可以从应用程序中调用的原则。\n\n#### 对偶原理\n1.  （*逻辑学*）令 `x` 和 `y`\
  \ 是逻辑表达式，使得 `x` 是 `y` 的对偶；那么 `x` 是重言式当且仅当 `y` 是重言式。\n2.  （*集合论*）令 `x` 和 `y` 是集合论中的陈述，使得\
  \ `x` 是 `y` 的对偶；那么 `x` 是一个定理当且仅当 `y` 是一个定理。\n\n**示例：** `德摩根定律`，参见。\n\n#### `DUM`\n\
  `TABLE_DUM`。\n\n#### 重复\n令 `a1` 和 `a2` 是在某个上下文中值 `v1` 和 `v2` 的出现，参见。那么 `a1` 和 `a2`\
  \ 互为重复，当且仅当 `v1` 和 `v2` 相等（换句话说，当且仅当 `v1` 和 `v2` 是完全相同的值）。顺便说一句，从这个定义可以清楚地看出，那句众所周知的格言——关系中从不包含重复元组——其真正含义是没有关系包含*相同*元组的重复*出现*——尽管为了熟悉度，我们在本词典中倾向于使用不太精确的表述。观察到，由于（a）关系从不包含重复元组，并且（b）每个关系操作都产生一个关系，因此，每当执行关系操作时，如果需要，会消除重复元组（更准确地说，是相同元组的冗余出现）。\n\
  \n**示例**（*重复消除*）：给定图 1 所示的示例值，关系变量 `S` 的当前值在 `{CITY}` 上的投影基数为三，而非五；类似地，关系变量 `S`\
  \ 和 `P` 的当前值在 `{CITY}` 上的投影的并集基数为四，而非十一。（在最熟悉的关系运算符中，投影和并集是唯一需要关注重复消除的两个。对于其他运算符——如选择、连接等——它实际上是一个空操作。）\n\
  \n#### 重复消除\n一个普遍使用的术语，意指更准确地应称为复制消除。*参见* `重复`。\n\n#### 二元\n（*指一个运算符*）恰好有两个操作数；即根据恰好两个参数定义。\n\
  \n### `E`\n`E/R` 实体/关系。\n\n#### E/R 图\n*参见* `实体/关系图`。\n\n#### E/R 模型\n*参见* `实体/关系模型`。\n\
  \n#### E/R 建模\n*参见* `实体/关系建模`。\n\n#### E-关系\n*参见* `RM/T`。\n\n#### 元素\n*参见* `包`；`集`。\n\
  \n#### 嵌入式依赖\n由某个关系变量的某个投影所满足的依赖。\n\n**示例：** 考虑关系变量 `CTXD`，其属性为 `C`（课程）、`T`（教师）、`X`（教材）和\
  \ `D`（天数），谓词为“教师 `T` 在课程 `C` 上花 `D` 天时间讲解教材 `X`”。假设该关系变量的唯一键是 `{C,T,X}`。同时假设对于给定课程，教师集合和教材集合是相当独立的。那么\
  \ `CTXD` 属于 6NF——除了平凡分解外，它根本无法进行无损分解。然而，它在 `{C,T,X}` 上的投影满足嵌入式多值依赖 `{C} ->> {T}`\
  \ 和 `{C} ->> {X}`。\n\n#### 空\n（*指一个包或集*）没有元素。\n\n#### 空包\n没有元素的包（注意恰好有一个这样的包）；写作\
  \ `()`。（当然，空包 `()` 和空集 `{}`，参见，在逻辑上是不可区分的。）\n\n#### 空外键\n度为零的外键。*注意*：所引用关系变量中的对应候选键必然也度为零，并且引用约束将被满足，当且仅当（a）被引用的关系变量非空，或者（b）引用的关系变量为空（或两者兼有）。\n\
  \n#### 空标题\n度为零的标题（注意恰好有一个这样的标题）。\n\n"
- '# 关系数据库词典（扩展版）


  #### 空键

  度为零的键。注意，具有空键的关系变量不能有其他键，因为空键不满足键的可约性要求（*参见* 候选键）。还需注意，这样的关系变量不能包含多于一个元组，否则将违反键约束。因此，声明关系变量*R*具有空键是施加基数约束的一种便捷方式，以确保*R*永远不会包含多于一个元组。


  #### 空域

  *参见* 存在量词；全称量词。


  #### 空关系

  给定关系类型 `RELATION { H }`，该类型中不包含任何元组的关系。注意，对于每种关系类型，恰好存在一个空关系（其基数为零）。*对比* 全称关系。


  **示例**：假设关系变量 `S` 和 `P` 当前都为空；即它们的当前值 *s* 和 *p* 都是空关系。那么 *s* 和 *p* 并不相等，即使它们的关系体相等，原因恰恰在于它们是不同类型（等价地，因为它们的关系头不相等）。


  #### 空关系变量

  当前值为空关系的关系变量。


  #### 空限制

  给定关系 *r* 的一个不包含任何元组的限制（即等于 `r WHERE FALSE`）；尤指形式为 `r WHERE c` 的限制，其中 *c* 是一个矛盾式（*参见*
  矛盾式）。


  **示例**：给定图 1 中的示例值，表达式 `S WHERE STATUS = 25` 和 `S WHERE STATUS > STATUS` 都表示空限制（第二个必然是，因为
  `STATUS > STATUS` 是一个矛盾式）。


  #### 空集

  没有元素的集合（注意恰好有一个这样的集合）；写作 `{}` 或 `ø`。所有适用于一般集合的定理、性质、定义等都特别适用于空集。例如，关系头和关系体都被定义为集合（分别是属性集和元组集），因此两者都允许是空集。


  #### 空元组

  度为零的元组（注意恰好有一个这样的元组）。


  #### 空类型

  没有值的类型。如果支持继承，这个概念至关重要，否则可能没什么用处。


  #### 封装的

  标量。*注意*：该术语也用于（尤其在面向对象上下文中）指代代码和数据（或更精确地说，操作符定义和数据表示定义）的物理捆绑或打包。但以这种方式使用该术语混淆了模型和实现的考虑；用户不应该，也无需关心代码和数据是否物理上捆绑在一起。


  #### 实体

  一个事物。*注意*：经常有人建议“感兴趣的实体”与基本关系变量中的元组之间应该存在一一对应关系。然而，鉴于“感兴趣的实体”这个术语没有精确定义，这个建议很难成立。（当然，“实体”本身也是如此。）


  #### 实体完整性

  基本关系变量的主键属性不允许为空（null）的规则。然而，由于（a）关系变量（无论是否基本）不一定必须有主键（*参见* 主键），以及（b）适用于基本关系变量而不适用于其他种类的规则本身就相当可疑（因为它们违反了可交换性原理），实体完整性规则可以而且实际上已经被放弃，而没有造成严重损失。我们在这里提到它主要是出于历史原因。无论如何，它涉及一个与关系模型完全不兼容的概念——空值；因此，任何保留它的建议都需要进行重大修改才能被认真考虑。


  #### 实体建模

  *参见* 语义建模。


  #### 实体/关系图

  一种用于阐明给定数据库逻辑设计的图示，其抽象级别省略了许多细节——特别是底层类型的细节和几乎所有的完整性约束。


  #### 实体/关系模型

  用于绘制实体/关系图（*参见* 实体/关系图）的一套约定。


  #### 实体/关系建模

  使用实体/关系模型（*参见* 实体/关系模型）作为辅助逻辑数据库设计过程的工具。


  #### EQ

  与 EQUIV 相同。


  #### 相等

  一个真值运算符；两个值相等当且仅当它们是同一个值。例如，整数 3 等于整数 3，而不等于整数 4，也不等于任何其他整数（或其他任何东西）。更精确地说，令 *T*
  为一个类型；则类型 *T* 的值的相等运算符“=”定义如下。令 *v1* 和 *v2* 为两个这样的值，并令 *Op* 是一个只读操作符（除了“=”本身），其具有一个类型为
  *T* 的参数 *x*。那么 *v1* 和 *v2* 相等（即 `v1 = v2` 计算结果为 TRUE）当且仅当，对于所有这样的操作符 *Op*，两次成功调用
  *Op*，除了对应的 *x* 参数在一次调用中是 *v1* 而在另一次中是 *v2* 之外，其他所有方面都相同，且它们的效果无法区分。*注意*：相等运算符（为每个类型都定义，且必须定义）也称为恒等（identity）。*另见*
  包成员资格；重复；等价；恒等，重载；集合；集合成员资格；关系相等；元组相等。


  #### 等值连接

  Theta 连接（theta join）中 theta 为“=”的情况。


  #### EQUIV

  *参见* 等价。


  #### 等价

  1.  （*一般意义*）令 *x* 和 *y* 是某个集合的元素，并令该集合被划分成一个等价类（*参见* 等价类）集合。那么 *x* 和 *y* 是等价的（符号表示为
  *x* ≡ *y*）当且仅当它们是同一个等价类的成员。

  2.  （*FD 集*）两个函数依赖（FD）集是等价的当且仅当每个集都是另一个集的覆盖。*注意*：任何给定的 FD 集总是至少有一个等价的不可约集（*参见* 不可约）。

  3.  （*逻辑，二元情况*）如果 *p* 和 *q* 是谓词，那么等价式 `(p) EQUIV (q)` 也是一个谓词。令 `(ip) EQUIV (iq)`
  是该谓词的一次调用（其中 *ip* 和 *iq* 分别是 *p* 和 *q* 的调用）。那么调用 `(ip) EQUIV (iq)` 的计算结果为 TRUE 当且仅当
  *ip* 和 *iq* 都计算为 TRUE 或都计算为 FALSE。（换句话说，`(p) EQUIV (q)` 等价于 `(p) IMPLIES (q) AND
  (q) IMPLIES (p)`。）*另见* 真值。*注意*：在表达式 `(p) EQUIV (q)` 中包围 *p* 和 *q* 的括号在实践中可能不需要。

  4.  （*逻辑，多元情况*）令 *p1, p2, . . . , pn*（*n* ≥ 0）为谓词。那么等价式 `EQUIV {p1,p2,. . .,pn}`
  也是一个谓词；并且如果 *ip1, ip2, . . ., ipn* 分别是 *p1, p2, . . ., pn* 的调用，那么调用 `EQUIV {ip1,ip2,.
  . .,ipn}` 返回 TRUE 当且仅当调用 *ip1, ip2, . . ., ipn* 中恰好有 *m* 个返回 FALSE，其中 *m* 是偶数。*注意*：最后这个定义的动机是保持结合律；具体来说，它具有这样的性质：表达式
  `EQUIV {p1, EQUIV{p2,p3}}`、`EQUIV {EQUIV{p1,p2}, p3}` 和 `EQUIV {p1,p2,p3}` 是逻辑等价的。（另一方面，它也具有这样的性质：`EQUIV
  {p1,p2,p3}` 和 `NOT (XOR {p1,p2,p3})`（正如本字典中对 `XOR` 的定义）**不是**等价的。*参见* 异或。）可以提出一个不同的、可能更直观的定义，根据该定义，调用
  `EQUIV {ip1,ip2,. . .,ipn}` 返回 TRUE



  当且仅当所有 `n` 个调用 `ip1, ip2, . . ., ipn` 返回相同的真值时。然而，这两个定义本身显然并不等价（!），尽管它们在 `n` = 2
  时确实重合；换句话说，它们定义了两个逻辑上不同的运算符。


