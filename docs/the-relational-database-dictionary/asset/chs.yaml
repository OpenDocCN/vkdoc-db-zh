- '# **一百五十一**


  #### 关系数据库


  遵守 `信息原理` 的数据库。在本词典中，除非有明确说明，我们假设所有数据库都是关系的。*注*：`SQL` 数据库最多只能被视为近似的关系数据库，因为 `SQL`
  涉及许多对 `信息原理` 的偏离（包括但不限于 `表` 条目下指出的那些偏离）。


  #### 关系数据库管理系统


  管理关系数据库（且不管理其他数据库）的 `DBMS`；等价地说，是实现 `关系模型` 的 `DBMS`。*注*：`SQL DBMS` 最多只能被视为近似的关系系统，因为
  `SQL` 涉及许多对关系模型的偏离（包括但不限于 `表` 条目下指出的那些偏离）。



  #### 关系表达式


  表示一个关系的表达式。关系字面量、关系选择器调用、`relcon` 与 `relvar` 引用以及关系代数运算符调用都是其特殊情形。


  #### 关系包含


  设关系 `r1` 和 `r2` 类型相同。那么 `r1` 包含 `r2`（“`r1` ⊇ `r2`”）当且仅当 `r1` 的主体是 `r2` 主体的超集，而 `r2`
  包含于 `r1`（“`r2` ⊆ `r1`”）当且仅当 `r2` 的主体是 `r1` 主体的子集。关系 `r1` 等于关系 `r2`（“`r1` = `r2`”）当且仅当两者互相包含。注意，每个关系都包含自身，并且每个关系都包含其适用类型的空关系。


  还需注意，术语“关系包含”通常（有点随意地）特指“⊆”运算符，而非“⊇”运算符。


