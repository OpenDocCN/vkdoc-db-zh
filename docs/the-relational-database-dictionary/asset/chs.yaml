  #### ****projection（投影）**

  设 `r` 为一个关系，且 { `X`} 是 `r` 的标题的一个子集。

  那么，`r` 在 { `X`} 上的投影，`r{` `X` `}`，是一个标题为 { `X`} 的关系，其体由所有满足以下条件的元组 `x` 组成：存在 `r`
  中的某个元组 `t`，其 `X` 值为 `x`。*另见* tuple projection（元组投影）。


  **示例*：表达式 `S{STATUS,CITY}` 表示对关系变量 `S` 当前值的关系进行的投影。该投影是一个类型为 `RELATION {STATUS INTEGER，
  CITY CHAR}` 的关系，包含所有形如 < `st，sc`> 的可能元组（且无其他元组），使得存在某个供应商编号 `s#` 和某个名称 `sn`，使得元组
  < `s#,sn,st,sc`> 出现在关系变量 `S` 的当前值中。给定图 1 的样本值，该结果的基数为 4。*注*：为了用户友好性，`Tutorial D`
  允许使用要移除的属性而非要保留的属性来表达投影；因此，例如，投影 `S{STATUS,CITY}` 可以等价地表达为 `S{ALL BUT S#,SNAME}`。类似的说明也适用于其他几个
  `Tutorial D` 结构——`KEY`、`GROUP`、`SUMMARIZE` 等。


  #### ****projection-join normal form（投影-连接范式）**

  第五范式。其替代名称，也是原始名称，*投影-join normal form* 源于这样一个事实：5NF 是关于投影和连接（按这些操作符的经典理解）的“那个”范式。


