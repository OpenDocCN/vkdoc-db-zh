  \n![](img/00098.png)\n\n### 复合属性 / 组合属性\n指两个或多个属性组合的弃用术语。这些术语被弃用，因为“复合”或“组合”属性实际上根本不是一个属性。\n\
  \n### 复合键 / 组合键\n由两个或多个属性组成的键。\n*示例*：在供应商-零件数据库中，`SP` 是唯一一个具有复合键（即 `{S#,P#}`）的关系变量。\n\
  \n### 复合谓词 / 组合谓词\n涉及至少一个连接词的谓词。\n\n### 复合命题 / 组合命题\n涉及至少一个连接词的命题。\n\n### 复合语句 /\
  \ 组合语句\n在语法上，指内部嵌套了其他语句的语句。\n*示例*：传统的 `IF`、`DO`、`WHILE`、`CASE` 语句；`BEGIN . . . END\
  \ . . .` 语句块；多变量赋值语句；以及许多其他语句。\n\n#### 复合\n1.  （二元情况）设 `r1` 和 `r2` 为关系。那么，`r1` 和\
  \ `r2` 的复合，记作 `r1 COMPOSE r2`，是 `(r1 JOIN r2){X}` 的简写，其中 `{X}` 是 `r1` 和 `r2` 除共有属性外的所有属性。\n\
  2.  （N 元情况）设 `r1`, `r2`,..., `rn` (`n` ≥ 0) 为关系。那么，复合 `COMPOSE {r1, r2,..., rn}`\
  \ 是 `(JOIN {r1, r2,..., rn}){X}` 的简写，其中 `{X}` 是 `r1`, `r2`,..., `rn` 中除至少在两个关系中都有的属性外的所有属性。另请参见元组复合。\n\
  \n*示例*：参见递归查询下的示例。\n\n**32**\n\n**关系数据库词典，扩展版**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00201.png)\n\n#### 计算完备性\n当且仅当一种语言支持计算所有可计算函数（其中，可计算函数是指图灵机能在有限步骤内计算的函数）时，该语言是计算完备的。\n\
  \n\n### 示例\n*   C++；SQL；`Tutorial D`；以及许多其他语言。Codd 最初的关系代数是一种非计算完备语言的示例。\n\n####\
  \ 概念建模\n*参见* 语义建模。\n\n#### 结论\n在逻辑中，指一个证明所证明的内容，或一个尝试性证明试图证明的内容。\n\n#### 条件表达式\n\
  一种逻辑表达式，*q.v.*。\n\n#### 条件运算符\n一种只读逻辑运算符，*q.v.*（尤指连接词之一，*q.v.*）。\n\n#### 合取项\n一个通过\
  \ AND 与零个或多个其他谓词连接的谓词。\n\n#### 合取\n1.  （*二元情况*）如果`p`和`q`是谓词，它们的合取`(p) AND (q)`也是一个谓词。令`(ip)\
  \ AND (iq)`为该谓词的一次调用（其中`ip`和`iq`分别是`p`和`q`的调用）。那么，当且仅当`ip`和`iq`的计算结果都为`TRUE`时，该调用`(ip)\
  \ AND (iq)`的计算结果为`TRUE`。\n    *注意*：在实际应用中，合取中包围`p`和`q`的括号可能不需要。\n2.  （*N 元情况*）令`p1`,\
  \ `p2, ..., pn`（`n` ≥ 0）为谓词。那么，合取`AND{p1, p2, ..., pn}`等价于表达式`TRUE AND (p1) AND\
  \ (p2) AND ... AND (pn)`。\n\n#### 合取范式\n当且仅当一个谓词具有`(p1) AND (p2) AND ... AND (pn)`的形式，且没有任何合取项`(p1)`,\
  \ `(p2)`, ..., `(pn)`涉及任何`AND`运算时——更准确地说，当每个合取项`(p1)`, `(p2)`, ..., `(pn)`都是文字的析取（*参见*\
  \ 文字，第二个定义）时，该谓词处于合取范式，`CNF`。\n\n"
