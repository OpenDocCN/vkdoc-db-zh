  (b) 体由所有满足以下条件的元组 `t` 组成：`t` 是 `r2` 的一个元组，扩展了属性 `X` 的值 `x`。该值 `x` 是通过对 `r1` 中所有与元组
  `t` 具有相同 `A1, A2, . . ., An` 属性值的元组计算表达式 `exp` 得到的。关系 `r2` 不能有名为 `X` 的属性，且 `exp`
  不能引用 `X`。


  > **注意**：表达式 `exp` 通常至少包含一个汇总（*summary*，q.v.）。另外，早期版本的 **Tutorial D** 显式支持 `SUMMARIZE`
  运算符；相比之下，当前版本通过其对 `EXTEND` 运算符（q.v.）的支持，提供了等效的功能。下面的示例说明了两种风格。


  ### 示例


  以下表达式表示对关系变量 `SP` 当前值的关系进行概括：


  ```

  SUMMARIZE SP PER ( S { S# } ) ADD ( COUNT ( ) AS CT )

  ```


  该概括是一个类型为 `RELATION {S# S#, CT INTEGER}` 的关系，为关系变量 `S`（而非 `SP`！—注意 `PER` 规范）中当前出现的每个不同
  `S#` 值包含一个元组，且不包含其他元组。每个这样的元组包含一个供应商编号和该供应商编号在关系变量 `SP` 中当前出现的次数（表达式 `COUNT()` 是汇总的一个示例，q.v.）。例如，给定图
  1 中的示例值，结果中供应商 `S2` 的元组具有 `S#` 值 `S2` 和 `CT` 值 `2`，而供应商 `S5` 的元组具有 `S#` 值 `S5` 和
  `CT` 值 `0`。


  相比之下，表达式


  ```

  SUMMARIZE SP PER ( SP { S# } ) ADD ( COUNT ( ) AS CT )

  ```


  ——因为 `PER` 操作数是 `SUMMARIZE` 操作数的投影，实际上可以稍微简化为


  ```

  SUMMARIZE SP BY { S# } ADD ( COUNT ( ) AS CT )

  ```


  ——产生一个类型为 `RELATION {S# S#, CT INTEGER}` 的关系，为关系变量 `SP` 中当前出现的每个不同 `S#` 值包含一个元组。例如，给定图
  1 中的示例值，结果不包含供应商 `S5` 的元组。


  以下是使用 `EXTEND` 代替 `SUMMARIZE` 的上述示例的类似物：


  ```

  EXTEND S { S# } ADD ( COUNT ( ‼SP ) AS CT )

  ```


  ```

  EXTEND SP { S# } ADD ( COUNT ( ‼SP ) AS CT )

  ```


  这些示例中的表达式 `‼SP` 是表达式 `(SP MATCHING RELATION {TUPLE {S# S#}}){ALL BUT S#}` 的简写。


