  ## C. J. 戴特


  ### 关于 firstPress


  Apress 的`firstPress`系列是您理解前沿技术的源泉。这些书籍短小精悍、重点突出，由专家撰写，能为您节省时间和精力。它们包含了您通过深入研究才能获得的信息，或者如果您每两周参加一次会议所能获取的知识——假如您有时间的话。它们涵盖了能让*您*保持技术领先地位的概念和技巧。Apress
  的 firstPress 书籍是真正的书籍，您可以选择`PDF 电子书`或按需印刷格式，即使技术本身尚显粗糙，书籍也毫无瑕疵。您不能没有它们。


  ## 书籍简介


  由数据库领域的杰出人物 C. J. 戴特所著的*关系数据库词典*，如今比以往更加出色！新的扩展版包含超过 900 个定义，其中许多附有详细示例和交叉引用。这是希望正确理解术语的数据库专业人士或学生的必备参考书。它是同类书籍中唯一的选择，对于任何认真对待数据库技术的人来说都是无价之宝。它的特点是：


  *   新增 300 多个术语和大量修订，使其成为首选参考书

  *   简洁、正确、明确的定义，并酌情提供示例

  *   C. J. 戴特对术语使用的独特态度和见解


  由于本书专为关系数据库专业人士设计，您无需费力寻找那些在数据库中有特殊含义的常见用法术语。它们都收录在此，并严格按照与关系数据库相关的方式进行了定义。


  C. J. 戴特是一位独立的作者、讲师、研究员和顾问，专门研究关系数据库技术（他是该领域的先驱之一）。他以其著作*数据库系统导论*（第 8 版，2004 年）而闻名，该书已售出超过
  75 万册，并被全球数百所学院和大学采用。他还撰写了多本关于关系数据库管理的其他书籍，包括最近的*逻辑与数据库：关系理论的根源*（Trafford 出版社，2007
  年）。他于 2004 年入选计算行业名人堂。


  **详情**


  *   228 页

  *   源代码在线：www.apress.com

  *   用户级别：初学者–高级


  ### 示例


  ```

  if (condVar > someVal) {console.log("xxx")}

  ```




