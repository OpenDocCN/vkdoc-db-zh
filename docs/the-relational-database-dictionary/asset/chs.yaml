  \n#### 实现依赖\n该术语（尤其在 SQL 标准中）用于指代其语义可能因不同实现而异，且甚至无需为每个具体实现明确规定的特性。换言之，该术语实质上等同于“未定义”；实现方可以自由决定如何处理该特性，且该决策的结果无需记录（甚至可能在不同版本间变动）。例如，SQL\
  \ 中若 `ORDER BY` 子句的规范未指定完整的排序规则，则该子句的全部影响即属此类。\n\n#### 蕴含\n若 `p` 和 `q` 是谓词，则蕴含式\
  \ `(p) IMPLIES (q)` 也是一个谓词。令 `(ip) IMPLIES (iq)` 为该谓词的一次调用（其中 `ip` 和 `iq` 分别是 `p`\
  \ 和 `q` 的调用）。当且仅当 `ip` 计算结果为 `FALSE` 或 `iq` 计算结果为 `TRUE` 或两者同时成立时，该调用 `(ip) IMPLIES\
  \ (iq)` 的计算结果为 `TRUE`。（换言之，`(p) IMPLIES (q)` 等价于 `(NOT(p)) OR (q)`。）*注*：在蕴含式 `(p)\
  \ IMPLIES (q)` 中，`p` 和 `q` 分别称为前件与后件。实际应用中，包围它们的括号可能并非必需。\n\n**示例**：对于未受过形式逻辑训练的人来说，蕴含关系往往难以理解。例如，考虑命题\
  \ `(2 + 2 = 4) IMPLIES (太阳是一颗恒星)`，或以更易理解的方式表达为：`若 (2 + 2 = 4) 则 (太阳是一颗恒星)`。该命题的计算结果为\
  \ `TRUE`，因为其前件与后件均为真；然而，太阳是否是一颗恒星显然与 `2+2 = 4` 是否成立无关。不过，以下观察可能有所帮助。\n\n在 16 种二元连接词（*参见*\
  \ 连接词）中，部分（但非全部）拥有诸如 `AND` 和 `OR` 等通用名称。但这些名称本质上只是一种助记手段——它们本身并无内在含义，之所以如此命名，仅仅是因为这些连接词的行为与自然语言中对应词项的行为相似（但未必完全相同）。特别是，在\
  \ 16 种可用连接词中，名为 `IMPLIES` 的连接词，其行为最接近自然语言中通常理解的蕴含关系。但无人会或应该声称两者是同一事物。此外，这些连接词必然是形式化定义的；即，它们纯粹是根据其参数（对于\
  \ `IMPLIES` 而言即前件和后件）的真值而非含义来定义的，而自然语言中的对应词项显然不具备这一特性。\n\n再举一例，命题 `若 (2 + 2 = 5)\
  \ 则 (猫王依然在世)` 的计算结果也为 `TRUE`（这或许更违反直觉），因为其前件为假；然而，猫王是否在世显然与 `2+2 = 5` 是否成立无关。同样，部分理由（即该蕴含式计算结果为\
  \ `TRUE` 的事实）仅在于 `IMPLIES` 是形式化定义的。不过在此例中，或许有另一个论证更能令人接受。假设供应商-零件数据库需遵循约束：红色零件必须存储在伦敦（参见数据库约束示例中的约束\
  \ C2）：\n\n关系数据库词典（扩展版）\n87\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
