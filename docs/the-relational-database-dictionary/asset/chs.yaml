  ## 《关系数据库词典（扩展版）》


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ![](img/00208.png)


  #### 关系模型


  关系数据库乃至整个关系技术所基于的正式理论或基础。


  关系模型常被笼统地描述为具有三个方面：一个与关系本身相关的结构方面；一个与候选键和外键相关的完整性方面；一个与连接等运算符相关的操纵方面。


  更精确地说，关系模型由以下组件构成：(a) 一个开放式的标量类型集合，特别包括 `BOOLEAN` 类型；(b) 一个关系类型生成器，以及对此生成器所生成类型的关系的既定解释；(c)
  用于定义此类生成关系类型的关系变量的设施；(d) 一个关系赋值运算符；(e) 一个开放式的通用只读运算符（即关系代数或关系演算）集合，用于从关系推导出关系。尤其要注意部分
  (e)；将关系模型仅仅视为结构而忽视其运算符是一种太过常见的错误，然而（正如 Codd 曾经所说）没有运算符的结构，就如同没有生理学的解剖学。此外，请注意这些运算符并不仅仅用于编写查询，正如许多人似乎认为的那样；相反，它们用于编写表达式，这些表达式服务于多种目的，包括但不限于查询。一个特别重要的目的是约束的制定（尽管在这种情况下，关系表达式只是某个布尔表达式的一个子表达式，通常尽管并非总是
  `IS_EMPTY`（参见该词条）的调用）。*注*：为了实现物理数据独立性，关系模型刻意对与性能相关的一切（尤其是物理存储表示）保持沉默。


  #### 关系运算符


  一种运算符，它 (a) 接受关系或关系变量（或两者）作为操作数，并且 (b) 要么返回一个关系，要么更新至少一个关系变量。


