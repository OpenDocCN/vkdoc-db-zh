  \n#### 不当包含\n集合`s1`不当包含集合`s2`，且集合`s2`被集合`s1`不当包含，当且仅当`s1`与`s2`是同一个集合。\n\n#### 不当子键\n\
  是一个键的子键；换句话说，就是一个键。\n\n#### 不当子集\n集合`s2`是集合`s1`的不当子集，当且仅当`s2`与`s1`是同一个集合。\n\n####\
  \ 不当超键\n是一个键的超键；换句话说，就是一个键。\n\n#### 不当超集\n集合`s1`是集合`s2`的不当超集，当且仅当`s1`与`s2`是同一个集合。\n\
  \n#### 包含\n*参见* 包；关系包含；集合包含。\n\n#### 包含依赖\n令`R1`和`R2`是关系变量，它们不一定互异。令`X1`和`X2`分别是`R1`的标题子集和`R2`的标题子集，使得存在一个在`R1`上的可能为空的属性重命名序列，该序列将`X1`映射到`X1'`（暂且这么称呼），其中`X1'`和`X2`包含完全相同的属性。进一步地，令`R2`和`R1`服从一个约束，该约束要求：在任何时候，`R2`中的每一个元组`t2`，其`X2`值都必须是当时`R1`中至少一个元组`t1`的`X1'`值。那么，该约束就是一个包含依赖（简称\
  \ IND），而`R2`和`R1`分别是该 IND 的源关系变量和相应的目标关系变量。*注意*：外键约束是一个重要的特例。\n\n*示例*：假设供应商-零件数据库服从一个约束，其效果是：除非某个城市至少有一个供应商，否则不能在该城市存储任何零件：\n\
  \n`CONSTRAINT IND1 P { CITY } ⊆ S { CITY } ;`\n\n/* 每个零件城市必须同时 */\n\n/* 是一个供应商城市\
  \ */\n\n*注意*：图 1 所示的示例值不满足此约束。\n\n**关系数据库词典，扩展版**\n\n**89**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00110.png)\n\n#### 包含多态\n根据定义（*参见* 类型继承），任何应用于给定类型`T`的值的运算符，必然也应用于`T`的每个子类型的值。因此，这样的运算符是多态的，它所展现的多态类型称为包含多态。\n\
  \n*注意*：一个应用于类型`T`变量的运算符，可能也应用于也可能不应用于`T`的某个子类型的变量。如果它确实适用，那么它也被称为展现包含多态。\n\n####\
  \ 包含或\n有时用作“或”同义词的术语；主要用于将其与异或（参见相关条目）区分开来。\n\n#### 不相干原理\n参见“不一致原理”。\n\n#### IND\n\
  包含依赖。\n\n#### 独立投影\n*参见* 函数依赖保持。\n\n#### 索引\n一种特定类型的物理访问路径；因此，是一种实现结构。\n\n#### 间接证明\n\
  *参见* 证明。\n\n#### 间接推理\n*参见* 拒取式。\n\n#### 不可辨别性\n缺乏可辨别性。*参见* 不可辨别对象同一性原理。\n\n####\
  \ 推理规则\n用于从一组前提（即其他定理，可能包括公理）推导出结论（一个定理）的规则。推导过程称为推理。*另参见* Armstrong 推理规则；约束推理；键推理；逻辑系统；关系类型推理；元组类型推理；类型推理。\n\
  \n\n\n#### **信息等价**\n设`s1`和`s2`是关系集合。当且仅当`s1`中的每个关系要么与`s2`中的某个关系相同，要么可以从`s2`中的关系推导出来（参见`派生关系`），并且`s2`中的每个关系要么与`s1`中的某个关系相同，要么可以从`s1`中的关系推导出来时，`s1`和`s2`才是信息等价的。\n\
