- "# 注意\n\n*术语* `database` *在非关系型语境中也用于表示多种其他含义：例如，物理存储的数据集合。它也常被非常频繁地用来指代数据库管理系统（DBMS），但这种特定用法被强烈反对。（如果我们将\
  \ DBMS 称为数据库，那么我们该称数据库为什么呢？）*\n\n#### 数据库约束\n\n1.  *（“一个”数据库约束）* 从形式上讲，指任何非类型约束的约束（这意味着除类型约束外的所有约束，包括属性约束和关系变量约束等，都只是其特例）；通俗地讲，指引用两个或多个不同关系变量的约束（也称为多关系变量约束，参见\
  \ q.v.）。*注意*：这两个定义并非在任何意义上等价——它们指的是两个不同的概念。\n2.  *（“该”数据库约束）* 除类型约束外，适用于给定数据库的所有约束的逻辑与（即该数据库的“该”数据库约束——有时称为*总*数据库约束）。注意，根据此定义，每个数据库都至少受一个约束：即退化的（“默认”）约束\
  \ `TRUE`。*另见* 关系变量约束。\n\n### 示例\n\n首先，供应商-零件数据库定义中指定的键约束和外键约束都是数据库约束。\n\n其次，以下是一些也可能适用于该数据库的其他数据库约束：\n\
  \n```sql\nCONSTRAINT C1 IS_EMPTY\n    ( S WHERE STATUS < 1 OR STATUS > 100 ) ;\n\
  \    /* status values must be in the */\n    /* range 1 to 100 inclusive */\n\n\
  CONSTRAINT C2 IS_EMPTY\n    ( P WHERE CITY = 'London' AND COLOR ≠ 'Red' ) ;\n  \
  \  /* parts in London must be red */\n\nCONSTRAINT C3 IS_EMPTY\n    ( ( S JOIN SP\
  \ )\n    WHERE STATUS < 20 AND P# = P#('P6') ) ;\n    /* no supplier with status\
  \ less */\n    /* than 20 can supply part P6 */\n```\n\n最后，假设为举例说明，指定的键约束和外键约束，连同上述约束\
  \ `C1`–`C3`，是适用于供应商-零件数据库的唯一数据库约束。\n\n那么，所有这些约束与 `TRUE` 的逻辑与就是该数据库的“该”（总）数据库约束。\n\
  \n#### 数据库设计\n\n*参见* 逻辑数据库设计；物理数据库设计。\n\n#### 数据库管理系统\n\n管理（特别是处理对某个数据库或数据库集合的所有访问）的软件系统（即\
  \ `DBMS`）。*对比* 数据库。\n\n#### 数据库编程语言\n\n包含完全集成的（“原生”）数据库支持的编程语言。*对比* 数据子语言；宿主语言。\n\
  \n### 示例\n\n`Tutorial D` 可能被视为一个成熟的数据库编程语言，只是它目前不包含异常处理或 I/O 支持。类似的评论也适用于 `SQL`；`SQL`\
  \ 通常被认为只是一个数据子语言（参见 q.v.），但随着 1992 年版标准引入了诸如 `SQL` 变量、异常处理、`IF`、`CASE`、`WHILE`、`CALL`、`RETURN`\
  \ 和赋值（`SET`）语句等特性，它也成为了一个成熟的数据库编程语言（只是像 `Tutorial D` 一样，它目前也不包含 I/O 功能）。\n\n## 数据库关系变量\n\
  \n*参见* 关系变量。\n\n#### 数据库统计信息\n\n元数据，通常保存在目录中，可能对优化器有帮助。\n\n### 示例\n\n关系变量和属性基数；最小、最大和平均属性值；属性值频率；索引选择性；等等。\n\
  \n#### 数据库值\n\n某个数据库的当前或某个可能的“状态”；即关系的集合，这些关系是相应关系变量的可能值。因此，从概念上讲，数据库值可以被认为是一组命题，这些命题对应于相应关系中的元组。*对比*\
  \ 数据库变量。\n\n### 示例\n\n图 1 所示的关系（即关系值）构成了供应商-零件数据库在某个特定时间碰巧为当前的“状态”。但如果我们会在另一个不同时间查看该数据库，我们可能会看到一个不同的状态。换句话说，数据库实际上是一个变量——精确地说是一个数据库变量，即其值是数据库值的变量。此外，在任何给定时间，作为关系变量\
  \ `S`、`P` 和 `SP` 值的那些关系中的元组代表了命题——在该时间被假设为真命题——因此在该时间点的数据库可以被认为是一组真命题。\n\n#### 数据库变量\n\
  \n宽泛地说，是关系变量的容器；更准确地说，是一个在任何给定时间其值都是数据库值的变量。严格来说，数据库值和数据库变量之间存在逻辑差异，这与关系值和关系变量之间的差异完全类似。换句话说，我们通常称为数据库的东西实际上是一个变量（通常是一个相当大的变量），更新该数据库的效果是将该变量的一个值替换为另一个值——这里涉及的值是数据库值，而涉及的变量是数据库变量。更精确地说，数据库是一个元组变量，对于该数据库中的每个关系变量，都有一个（关系值的）属性。\n\
  \n因此请注意，数据库变量实际上并不是一组关系变量，尽管我们在非正式场合经常这样认为。\n\n尽管如此，考虑到所有这些，我们在本词典的其他地方遵循传统用法，使用术语*数据库*来指代数据库值和数据库变量，依靠上下文来明确所指。\n\
  \n*参见* 数据库。\n\n### 示例\n\n*参见* 数据库值。至于数据库实际上是一个元组变量的问题，供应商-零件数据库尤其可以被认为是一个具有以下元组类型的元组变量：\n\
  \n```sql\nTUPLE { S RELATION { S# S#, SNAME NAME,\n                      STATUS\
  \ INTEGER, CITY CHAR },\n         P RELATION { P# P#, PNAME NAME, COLOR COLOR,\n\
  \                      WEIGHT WEIGHT, CITY CHAR },\n         SP RELATION { S# S#,\
  \ P# P#, QTY QTY } }\n```\n\n#### DBMS\n\n数据库管理系统；复数形式为 `DBMSs`。\n\n#### dbvar\n\
  \n数据库变量（参见 q.v.）。该术语不常用。\n\n#### DCO\n\n域检查覆盖。\n\n#### 德摩根定律\n\n1.  *（逻辑）* 谓词 *p*\
  \ 和 *q* 的析取的否定等价于 *p* 和 *q* 的否定的合取；谓词 *p* 和 *q* 的合取的否定等价于 *p* 和 *q* 的否定的析取。\n2.\
  \  *（集合论）* 集合 *s1* 和 *s2* 的并集的补集等于 *s1* 和 *s2* 的补集的交集；集合 *s1* 和 *s2* 的交集的补集等于 *s1*\
  \ 和 *s2* 的补集的并集。\n\n#### 可判定性\n\n形式系统的这样一种性质：给定任意一个语句 *s*，可以判定 *s* 是否是该系统的语句。\n\n\
  ### 示例\n\n命题演算是可判定的；谓词演算是不可判定的。\n\n#### 已声明的\n\n有时用作“已定义”或“已指定”的同义词的术语。\n\n####\
  \ 声明类型\n\n1.  *（值的）* 该值的类型。\n\n\n\n#### 声明类型\n\n2\\. （*对于变量或属性*）在声明该变量或属性时指定的类型。\n\
  3\\. （*对于只读运算符*）该运算符结果的类型，在声明该运算符时指定。\n4\\. （*对于表达式*）表达式中涉及的最外层运算符的类型。\n*注*：如果不支持继承，术语*声明类型*可以安全地简化为*类型*。实际上，对于值来说，将其类型称为声明类型多少有点虚构的意味，因为值本身并非被声明出来的。然而，有时将值的类型视为其声明类型是很方便的（其效果是简化了某些其他定义）。\n\
  \n#### 分解\n\n非损失分解（除非上下文另有要求）。\n\n#### 推理公理\n\n偶尔用来表示推理规则的术语。\n\n#### DEE\n\n`TABLE_DEE`。\n\
  \n#### 默认值\n\n设 `A` 为关系变量 `R` 的一个属性。除非有显式的约束相反规定，则可以为 `A` 声明一个默认值（简称默认值）；该值，比如说\
  \ `a`，将在任何元组中，当该元组被输入到 `R` 中时没有为 `A` 指定其他值的情况下，作为 `A` 的值出现。\n\n**示例**：假设关系变量 `S`\
  \ 的属性 `STATUS` 的默认值为 10。\n\n那么，从语法上讲，以下 `INSERT` 可能是有效的：\n\n**关系数据库词典，扩展版**\n**43**\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n![](img/00177.png)\n\n```\nINSERT\
  \ S RELATION { TUPLE { S# S#('S6'),\nSNAME NAME('Lopez'),\nCITY 'Madrid' } } ;\n\
  ```\n\n实际插入的关系将如下所示：\n\n```\nRELATION { TUPLE { S# S#('S6'),\nSNAME NAME('Lopez'),\n\
  STATUS 10,\nCITY 'Madrid' } }\n```\n\n*注*：前述示例中形如 `RELATION {TUPLE {. . .}}` 的两个表达式是关系选择器调用；每个都表示一个只包含一个元组（即基数为\
  \ 1）的关系。*参见* 选择器。\n\n#### 延迟检查\n\n在某个时间（通常是在提交时）检查完整性约束，该时间晚于执行可能导致该约束被违反的更新操作的时间。关系模型拒绝延迟检查，认为其存在逻辑缺陷。*对比*\
  \ 立即检查。\n\n#### 延迟约束\n\n一种完整性约束，其检查被延迟（*参见* 延迟检查）。关系模型拒绝延迟约束，认为其存在逻辑缺陷。*对比* 立即约束。\n\
  \n#### 度\n\n一个给定的标题、键、外键、元组、元组变量、关系或关系变量中属性的数量 `n`（`n` ≥ 0）。\n\n**示例**：关系变量 `S`、`P`\
  \ 和 `SP` 的度分别为四、五和三；相应键的度分别为一、一和二。\n\n#### DELETE\n\n笼统地说，是一个从给定关系变量中移除给定元组集合的运算符。它是某个关系赋值的简写形式。\n\
  \n**示例**：`DELETE` 语句\n\n```\nDELETE S WHERE CITY = 'London' ;\n```\n\n是以下关系赋值的简写：\n\
  \n**44**\n**关系数据库词典，扩展版**\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n![](img/00041.png)\n\
  \n```\nS := S WHERE NOT ( CITY = 'London' ) ;\n```\n\n#### DELETE 规则\n\n一种外键规则（见该词条），指定当存在某个包含外键值（该值引用某个元组\
  \ `t1`）的元组 `t2`，并且——说的相当笼统（*参见* 元组级别）——元组 `t1` 被删除时，DBMS 应采取的操作。\n\n#### 反规范化\n\n\
  用一组关系变量 `R1, R2, . . ., Rn` 的连接 `R` 来替换它们，使得对于所有 `i`，`R` 在 `Ri` 属性上的投影保证等于 `Ri`（`i`\
  \ = 1, 2, . . ., `n`）。反规范化通常出于性能原因而进行；然而，它具有增加冗余（见该词条）的效果，从而增加了（a）必须完成的完整性检查量，或（b）某些更新异常（见该词条）发生的可能性，或（c）两者。它也会增加某些查询的复杂性。\n\
  *注*：从逻辑角度看，反规范化，至少降到 5NF 以下的级别，总是不可取的。然而，鉴于当今商业产品中发现的技术水平，有时它无法避免。\n\n**示例**：可应用于供应商-零件数据库的一个反规范化是，用关系变量\
  \ `S` 和 `SP` 的连接（假设为 `SSP`）来替换它们。然后可以通过在 `S` 的属性和 `SP` 的属性上分别投影关系变量 `SSP` 来导出关系变量\
  \ `S` 和 `SP`。\n\n#### 依赖项 / 被依赖项\n\n在一个函数依赖（FD）中，右侧的属性集合。\n*对比* 决定因素。\n\n**示例**：在由关系变量\
  \ `SP` 所满足的 FD `{S#,P#} → {QTY}` 中，`{QTY}` 是依赖项，`{S#,P#}` 是决定因素。\n\n#### 依赖\n\n\
  一个包含依赖（IND）、连接依赖（JD）、多值依赖（MVD）或（特别是）函数依赖（FD）。\n\n#### 依赖保持\n\n函数依赖保持（见该词条）。\n\n\
  #### 依赖理论\n\n建立在关系模型之上的理论体系，可用于辅助逻辑数据库设计（尽管不仅限于此目的）。\n\n#### 解引用\n\n*参见* 引用。\n\n\
