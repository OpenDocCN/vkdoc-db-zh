- "# 关系数据库词典（扩展版）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00086.png)\n\
  \n*示例*：设 `ST` 是一个 `INTEGER` 类型的变量。那么下面的语句将供应商在伦敦的 `STATUS` 值之和赋给 `ST`：\n```\nST\
  \ := SUM ( S WHERE CITY = 'London', STATUS ) ;\n```\n这里的 `STATUS` 是一个属性引用（参见）。如果关系变量\
  \ `S` 当前为空，那么在此赋值之后，变量 `ST` 的值将为零。\n\n`ALGEBRA` *参见* `A`。\n\n\n\n#### 代数\n\n1. \
  \ 泛指一个由一组元素和一组只读运算符构成的形式系统，这些元素和运算符共同满足特定的定律和属性（必然包括封闭性，可能包括交换律和结合律等）；亦称为代数结构或抽象代数。`代数`一词本身源自阿拉伯语`al-jebr`，意为（破碎之物的）复位或组合。*另见*\
  \ `布尔代数；域（数学）；群（数学）；代数定律，The；关系代数；环（数学）。`\n2.  特指关系代数（如果上下文有此要求）。\n\n#### 集合代数\n\
  \n*见* `布尔代数`（第二个定义）。\n\n#### 别名\n\n在一些 SQL 产品中使用的已弃用术语，意指元组演算范围变量或此类变量的名称。术语`表别名`（同样已弃用）有时也用于相同含义。\n\
  \n## ALL BUT\n\n*见* `投影`。\n\n## ALPHA\n\n由 Codd 提出的一个基于元组演算的具体关系语言提案；亦称为数据子语言 ALPHA。ALPHA\
  \ 从未被实现，但其思想对几种后来得以实现的语言设计产生了影响，包括 QBE、QUEL 以及（在较小程度上）SQL。\n\n**关系数据库词典，扩展版**\n\n\
  **5**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00001.png)\n\
  \n#### 替代键\n\n非正式地指不是主键的候选键。\n\n更精确地说，让关系变量 `R` 拥有键 `K1, K2, . . . , Kn,` 并选择某个\
  \ `Ki` (`i = 1, 2, . . . , n`) 作为 `R` 的主键；那么每个 `Kj` (`j = 1, 2, . . . , n, j ≠ i`)\
  \ 都是 `R` 的一个替代键。该术语不常用。\n\n## AND\n\n*见* `合取`。*注意*：通常理解的 `AND` 是一个逻辑运算符；然而，代数 `A`（见该词）包含一个名为\
  \ `AND` 的运算符——根据定义——它是一个代数运算符（实际上它就是自然连接）。\n\n#### 前件\n\n*见* `蕴涵`。\n\n#### 反对称性\n\
  \n*见* `偏序`。注意 `反对称性` 和 `非对称性` 存在逻辑差异；前者如 `偏序` 下所定义，而后者仅指缺乏对称性。\n\n#### 出现\n\n*（值的）*\
  \ 某个值的出现或“实例”（在某个上下文中）。注意值本身与其出现之间存在逻辑差异——例如，作为某个变量的当前值出现，或作为某个元组变量或关系变量的当前值中的属性值出现。每个这样的出现，在内部都由该值的某种物理表示组成（同一值的不同出现可能有不同的物理表示）。因此，值的出现与其物理表示之间也存在逻辑差异；同一值的不同出现所使用的物理表示之间甚至可能存在逻辑差异。然而，尽管如此，通常将*值的出现之物理表示*缩写为*值的出现*，或（更常见地）直接缩写为*值*，只要不存在歧义风险。\n\
  \n注意`值的出现`是一个模型概念，而`出现的物理表示`是一个实现概念——用户当然可能需要知道（例如）两个变量是否包含同一值的出现，但他们不需要知道这些出现是否使用相同的物理表示。\n\
  \n**示例**：令 `N1` 和 `N2` 为 `INTEGER` 类型的变量。经过以下赋值后，`N1` 和 `N2` 都包含整数值 `3` 的一个出现。对应的物理表示可能相同也可能不同（例如，`N1`\
  \ 可能使用二进制表示，而 `N2` 使用十进制表示），但无论哪种情况，用户都无需关心。\n\n```sql\nN1 := 3 ;\nN2 := 3 ;\n```\n\
  \n## 应用关系变量\n\n*见* `关系变量`。\n\n## 实参\n\n当调用某个运算符时，替换其某个参数的实际操作数。注意实参本身与表示它的表达式（即实参表达式）之间存在逻辑差异。实参本身要么是一个值，要么是一个变量。如果相关参数是可更新的，那么实参——事实上，必须是——一个变量，由某个变量引用表示；否则它是一个值，可以由任意复杂的表达式（可能只是一个变量引用）表示。*对比*\
  \ `形参`。\n\n**示例**：令运算符 `DOUBLE` 定义如下：\n\n```sql\nOPERATOR DOUBLE ( X INTEGER ) RETURNS\
  \ INTEGER ;\n    RETURN ( 2 * X ) ;\nEND OPERATOR ;\n```\n\n这里的 `X` 是一个形参，声明类型为\
  \ `INTEGER`。令 `N` 为 `INTEGER` 类型的变量。那么，例如 `DOUBLE(N+1)` 是对 `DOUBLE` 的一次调用，在该调用时刻表达式\
  \ `N+1` 的值是该调用的一个实参——实际上是唯一的实参。该调用本身又是一个表达式，它可以出现在任何整型字面量可以出现的地方（因为运算符 `DOUBLE`\
  \ 被定义为返回 `INTEGER` 类型的值）。\n\n**关系数据库词典，扩展版**\n\n**7**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00139.png)\n\n现在假设 `DOUBLE` 被定义为一个更新运算符而非只读运算符：\n\n```sql\nOPERATOR DOUBLE\
  \ ( X INTEGER ) UPDATES { X } ;\n    X := 2 * X ;\nEND OPERATOR ;\n```\n\n现在形参 `X`\
  \ 是可更新的，任何对应于 `X` 的实参必须是一个变量。因此，例如 `DOUBLE(N)` 是 `DOUBLE` 的有效调用，并且变量 `N`——注意，不是该变量的值——是该调用的实参。（注意，例如\
  \ `DOUBLE(N+1)` 会是语法错误，因为 `N+1` 不是变量引用。）然而，该调用 `DOUBLE(N)` 不是一个表达式，它不能出现在“任何整型字面量可以出现的地方”；相反，它只能出现在显式的\
  \ `CALL` 语句（或等效语句）中，如下所示：\n\n```sql\nCALL DOUBLE ( N ) ;\n```\n\n## 实参表达式\n\n表示实参（见该词）的表达式。\n\
  \n#### 元数\n\n度数（见该词）。该术语不常用。\n\n## Armstrong 推理规则\n\n*（针对函数依赖 FD）* 令 `A, B,` 和 `C`\
  \ 为某个关系变量头部的子集。令 `AC` 表示 `A` 和 `B` 的集合理论并集，`BC` 类似。那么 Armstrong 规则（也称为 Armstrong\
  \ 公理）指出：(a) 如果 `A` 是 `B` 的超集，则 `A → B`（自反律）；(b) 如果 `A → B`，则 `AC → BC`（增广律）；以及 (c)\
  \ 如果 `A → B` 且 `B → C`，则 `A → C`（传递律）。这些规则既是可靠（*见* `可靠性`）又是完备的（*见* `完备性`）。\n\n**示例**：令\
  \ `s` 为一个 FD 集合，并且 `s` 包含 FD `A → BC`。那么 FD `A → B` 被 `s` 蕴含，并且可以容易地使用 Armstrong\
  \ 规则推导如下：(a) `A → BC`（给定）；(b) `BC → B`（自反律）；因此 (c) `A → B`（传递律）。\n\n作为第二个例子，如果集合\
  \ `s` 包含 FD `A → B` 和 `C → D`，那么 FD `AX → BD`（其中 `X` 是 `C` 和 `B` 的集合理论差集，按此顺序）被\
  \ `s` 蕴含。*注意*：这个由 Darwen 提出的例子可以被视为另一个推理规则。它有一个有趣的性质，即增广律和传递律，以及此处未讨论的其他几个规则，都是它的特例。\n\
  \n**关系数据库词典，扩展版**\n\n**8**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00202.png)\n\n#### 箭头\n\n*见* `函数依赖`。\n\n\n\n#### 赋值\n将一个值（源，由表达式表示）赋给一个变量（目标，由变量引用表示）的运算符；也指调用该运算符时执行的操作。源和目标必须具有相同类型。*注意*：每个更新运算符的调用在语义上等价于某个赋值操作（可能是一个多重赋值，参见相关条目）。\n\
  \n"
- '# 赋值原则

  将值 `v` 赋给变量 `V` 后，比较 `v = V` 必须求值为 TRUE。


  #### 关联寻址

  按值而非按位置寻址。在关系模型中，所有寻址都是关联的，这意味着其中包含明确拒绝指针（参见相关条目）等特性。


  #### 结合律

  设 `Op` 为一个二元运算符，并假设 `Op` 以中缀形式表示。当且仅当对于所有 `x`、`y` 和 `z`，都有 `x Op (y Op z) = (x Op
  y) Op z` 时，`Op` 才具有结合性。


  **示例**：在普通算术中，加法（`+`）是结合的，因为对于所有数字 `x`、`y` 和 `z`，都有 `x + (y + z) = (x + y) + z`。同样，`||`（字符串连接）是结合的，因为对于所有字符串
  `x`、`y` 和 `z`，都有 `x || (y || z) = (x || y) || z`。类似地，在关系代数中，`UNION` 和 `JOIN` 是结合的（相比之下，`MINUS`
  不是）。同样，在逻辑中，`OR` 和 `AND` 是结合的（相比之下，`IMPLIES` 不是）。


  *注意*：上述所有结合律运算符（除了 `||`）也都是可交换的（参见相关条目）。另一个具有结合性但不具有交换性的例子是二值逻辑中仅返回其第一个参数值的未命名二元连接词。*另见*
  左结合性；右结合性。


  #### 原子谓词

  一个简单谓词（参见相关条目）。


  #### 原子命题

  一个简单命题（参见相关条目）。


  #### 原子关系变量

  这是一个**弃用术语**，指无法分解为独立投影的关系变量（*参见* FD 保持性）。该术语已被弃用，因为它很可能与术语*不可约关系变量*（*参见* 不可约性，第二个定义）混淆。虽然不可约关系变量总是原子的，但反过来则不一定——一个关系变量可以是原子的但不是不可约的，实际上甚至可能不在
  BCNF 中。无论如何，这个概念很少需要；因此，必要时最好直接阐明其含义。


  **示例**：假设关系变量 `SP` 满足附加的 FD `{QTY} → {P#}`，意味着给定发货的零件号是发货数量的函数；例如，零件 `P1`（单独）总是以数量
  100 供应，零件 `P2`（单独）以数量 200 供应，依此类推（当然，此示例非常牵强，但足以说明当前目的）。此修订版的 `SP` 不在 BCNF 中（因为
  `{QTY}` 不是超键），并且可以无损分解为在 `{S#,QTY}` 和 `{QTY,P#}` 上的投影。然而，这些投影虽然处于 BCNF 中，但并非独立，因为
  FD `{S#,P#} → {QTY}` 在分解中没有被保留；因此，此修订版的 `SP` 不是原子的。*注意*：由此示例可知，(a) 分解为 BCNF 投影和
  (b) 分解为原子投影的目标，尽管通常都是可取的，但有时可能会相互冲突。


  #### 原子语句

  （*编程语言*）在语法上，指内部不包含其他嵌套语句的语句（*对比* 复合语句）；在语义上，指保证要么完全执行，要么没有任何效果（可能除了返回状态码或等效值）的语句。所有语法上的原子语句在语义上也是原子的。


  ---

