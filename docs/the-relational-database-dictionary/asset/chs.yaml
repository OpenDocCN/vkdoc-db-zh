  #### ****proof（证明）**

  ( *逻辑学*) 通常指在某个逻辑系统中，由一系列语句组成的序列，这些语句共同确立某个语句是某些给定语句的逻辑推论；如果给定语句为真，则推论语句也为真。直接证明是一个序列，其中每个语句要么是公理，要么可以通过系统的推理规则从序列中前面的语句推导出来；最后一个语句是定理。公理是只有一个语句的直接证明的定理。间接证明，也称为
  *reductio ad absurdum*（归谬法）证明，是一个语句序列，它通过显示其否定会导致矛盾来共同确立某个语句为定理。


  #### ****propagating updates（传播更新）**

  *参见* controlled redundancy（受控冗余）。


  #### ****proper inclusion（真包含）**

  集合 `s1` 真包含集合 `s2`（“`s1` ⊃ `s2`”）当且仅当它是 `s2` 的真超集；集合 `s2` 被集合 `s1` 真包含（“`s2` ⊂ `s1`”）当且仅当它是
  `s1` 的真子集。


  #### ****proper subkey（真子键）**

  一个不是键的子键（即，键的真子集）。


  #### ****proper subset（真子集）**

  集合 `s2` 是集合 `s1` 的真子集（“`s2` ⊂ `s1`”）当且仅当它是 `s1` 的子集且 `s1` 和 `s2` 不相同。


  #### ****proper superkey（真超键）**

  一个不是键的超键（即，不具有不可约性的超键）；宽泛地说，是键的真超集。


  #### ****proper superset（真超集）**

  集合 `s1` 是集合 `s2` 的真超集（“`s1` ⊃ `s2`”）当且仅当它是 `s2` 的超集且 `s1` 和 `s2` 不相同。


  #### ****property（属性）**

  属于另一事物的事物。*注*：人们经常建议，“感兴趣的属性”与基本关系变量中的属性之间应该存在一一对应关系。然而，考虑到“感兴趣的属性”这个术语没有精确的定义，这种建议很难成立。（当然，“属性”这个术语本身也是如此。）


  #### ****proposition（命题）**

  0 元谓词；一个没有参数（即，没有自由变量）的谓词；一个陈述性语句（逻辑意义上的，非编程语言意义上的）；因此，是一个明确地评估为真或假的东西。*注*：严格来说，如果
  `S` 是一个陈述性语句，相应的命题并不是 `S` 本身——而是 `S` 所作的断言。例如，考虑语句“The sun is a star”和 *“Le soleil
  est une étoile*。” 显然，这里有两个不同的语句；然而，它们都表示同一个命题。不过，在非正式场合（有时在更正式的场合也是如此）通常忽略这种细微区别。


  **示例*：

  1.  太阳是一颗恒星。

  2.  海王星是一颗恒星。

  3.  所有政客都是腐败的。

  4.  供应商 S1 签有合同，名为 Smith，状态为 20，且位于巴黎。

  5.  存在一个城市 `c`，使得存在一个供应商编号 `s#`，使得供应商编号为 `s#` 的供应商位于城市 `c`。注意，这最后一个例子中有两个变量，`s#`
  和 `c`；然而，这些变量是绑定的，而非自由的，整个例子仍然明确地评估为真或假（即至少有一个供应商位于至少一个城市的情况成立或不成立）。

  6.  设 `p` 为任意谓词。如果 `p` 的每个参数都被量化或被某个参数替换，那么结果就是一个命题。例如，给定谓词“供应商编号为 `s#` 的供应商名为 `sn，`
  状态为 `st，` 且位于城市 `sc，` ” 语句“存在一个城市 `sc`，使得存在一个供应商编号 `s#`，使得供应商编号为 `s#` 的供应商名为 Smith，状态为
  20，且位于城市 `sc`”是一个命题。

  7.  作为反例，表达式“`x` > 0 OR TRUE”不是一个命题（因为它涉及一个参数 `x`），即使它确实明确地评估为真。换句话说，虽然命题总是明确地评估为真或假，但并非所有明确地评估为真或假的东西都是命题。事实上，一个有用的非正式测试来检查某个语句
  `S` 是否为命题如下：`S` 是一个命题当且仅当“`*S* 是真的吗？`”在自然语言中是一个结构良好的问题。


