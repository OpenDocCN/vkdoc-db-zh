    ![](images/00019.png)


    **equivalence** 1\. ( *General*) Let *x* and *y* be elements of some set, and
    let that set be partitioned into a set of equivalence classes, q.v. Then *x* and
    *y* are equivalent (in symbols, *x* ≡ *y*) if and only if they’re members of the
    same equivalence class. 2\. ( *Of sets of FDs*) Two sets of FDs are equivalent
    if and only if each is a cover for the other. *Note*: Any given set of FDs always
    has at least one equivalent set that’s irreducible ( *see* irreducible).


    3\. ( *Logic, dyadic case*) If *p* and *q* are predicates, the equivalence ( *p*)
    EQUIV ( *q*) is a predicate also. Let ( *ip*) EQUIV ( *iq*) be an invocation of
    that predicate (where *ip* and *iq* are invocations of *p* and *q,* respectively).


    Then that invocation ( *ip*) EQUIV ( *iq*) evaluates to TRUE if and only if *ip*
    and *iq* both evaluate to TRUE or both evaluate to FALSE. (In other words, ( *p*)
    EQUIV ( *q*) is equivalent to ( *p*) IMPLIES ( *q*) AND ( *q*) IMPLIES ( *p*).)
    *See also* truth value of. *Note*: The parentheses enclosing *p* and *q* in the
    expression ( *p*) EQUIV ( *q*) might not be needed in practice. 4\. ( *Logic,
    nadic case*) Let *p1, p2, . . . , pn* ( *n* ≥ 0) be predicates. Then the equivalence
    EQUIV { *p1,p2,. . .,pn*} is a predicate also; and if *ip1, ip2, . . ., ipn* are
    invocations of *p1, p2, . . ., pn* (respectively), then the invocation EQUIV


    { *ip1,ip2,. . .,ipn*} returns TRUE if and only if exactly *m* of the invocations
    *ip1, ip2, . . ., ipn* return FALSE, where *m* is even. *Caveat*: This last definition
