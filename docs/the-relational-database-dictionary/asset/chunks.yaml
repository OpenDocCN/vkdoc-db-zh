    \ `r1 DIVIDEBY r2 PER (r3,r4)` is semantically equivalent to the expression `(r1\
    \ JOIN r2) NOT MATCHING ((r1{X} JOIN r4{Y,Z}) NOT MATCHING r3)`. *Contrast* Small\
    \ Divide.\n\n*Examples*: Suppose we're given a revised version of the suppliers-and-parts\
    \ database—a version that's both extended and simplified, compared to our usual\
    \ running example, and looks like this:\n\n```\nS { S# }\nSP { S#, P# }\nPJ {\
    \ P#, J# }\nJ { J# }\n```\n\nRelvar `J` here represents projects (`J#` stands\
    \ for project number), and relvar `PJ` indicates which parts are used in which\
    \ projects. Then the division `S DIVIDEBY J PER (SP,PJ)` yields a relation with\
    \ heading `{S#,J#}` and body consisting of all possible tuples of the form `<s#,j#>`\
    \ (where `s#` is an `S#` value currently appearing in relvar `S`, `j#` is a `J#`\
    \ value currently appearing in relvar `J`, and supplier `s#` supplies all parts\
    \ used in project `j#`), and no other tuples. The expression is semantically equivalent\
    \ to this one:\n\n```\n( S JOIN J ) NOT MATCHING ( ( S JOIN PJ ) NOT MATCHING\
    \ SP )\n```\n\nAn equivalent tuple calculus formulation is\n\n```\nSX RANGES OVER\
    \ { S } ;\nSPX RANGES OVER { SP } ;\nPJX RANGES OVER { PJ } ;\nJX RANGES OVER\
    \ { J } ;\n( SX, JX ) WHERE FORALL PJX ( EXISTS SPX\n    ( SX.S# = SPX.S# AND\n\
    \      SPX.P# = PJX.P# AND\n      PJX.J# = JX.J# ) )\n```\n\nAn equivalent **Tutorial\
    \ D** formulation is\n\n```\n( S JOIN J ) WHERE ‼PJ ⊆ ‼SP\n```\n(*see* image relation).\n\
    \nIncidentally, observe what happens if the operands to the foregoing division\
    \ are switched around, thus: `J DIVIDEBY S PER (PJ,SP)`. This expression yields\
    \ a relation with heading `{J#,S#}` and body consisting of all possible tuples\
    \ of the form `<j#,s#>` (where `j#` is a `J#` value currently appearing in relvar\
    \ `J`, `s#` is an `S#` value currently appearing in relvar `S`, and project `j#`\
