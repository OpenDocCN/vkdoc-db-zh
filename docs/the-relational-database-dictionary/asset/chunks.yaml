  trans: '## EXISTS


    对于前述示例，`EXISTS x ( p( x))` 等价于 `( p( v1)) OR ( p( v2)) OR . . . OR ( p( vn)) OR
    FALSE`。需特别注意，当 `n = 0`（即绑定变量 `x` 遍历一个空集）时，此表达式的求值结果为 `FALSE`。进一步观察可知，表达式 `EXISTS
    x ( p( x))` 在逻辑上等价于表达式 `NOT (FORALL x (NOT ( p( x))))`。


    *参见* `UNIQUE`；*对比* `universal quantifier`。


    ### 示例

    *参见* `bound variable`；`domain calculus`；`free variable`；`tuple calculus`；以及其他相关条目。


    ### EXISTS

    *参见* `existential quantifier`。在文献中，`EXISTS` 常由一个反向的 E 表示，即：∃。


    ## expanded Cartesian product

    *参见* `Cartesian product`。


    ## expressible relation

    任何关系，给定一个特定的关系集合，要么包含在该集合中，要么可以从该集合中派生出来（*参见* `derived relation`）。


    ## expressible relvar

    任何关系变量，给定一个特定的关系变量集合，要么包含在该集合中，要么可以从该集合中派生出来（*参见* `derived relvar`）。


    ## expression

    在编程语言中，指只读的运算符调用；一种表示值的结构；因此，是计算或确定所讨论值的规则。每个表达式都具有某种类型——即其表示的值的类型。注意，常量和变量名（即变量引用，参见相关条目）都被视为只读的运算符调用，因此两者都构成合法的表达式。*对比*
    `statement`。


    ### 示例

    `X+Y` 是一个表达式；实际上，它是“`+`”运算符的一个调用，它表示变量 `X` 和 `Y` 的当前值之和的值。相比之下，


    ```

    Z := X + Y ;

    ```


    是一条语句；它将右侧表达式 `X+Y` 所表示的值赋给左侧引用的变量 `Z`。*注意*：在以上两个例子中，`X` 和 `Y` 都是变量引用，因此它们本身也是表达式。


    ## expression transformation

    将给定表达式转换为另一个语义等价的表达式。该过程特别适用于关系表达式，在这种情况下有时被称为“查询重写”。


    查询重写通常出于性能原因而进行；它可以由用户完成，但更重要的是由系统完成（*参见* `optimizer`）。*注意*：术语 `query rewrite`
    在某些商业产品中也用于一个含义稍有限制的场景。*Caveat lector*（读者需留意）。


    ### 示例

    关系表达式 `( r WHERE br) JOIN ( s WHERE bs)` 在语义上等价于关系表达式 `( r JOIN s) WHERE ( br)
    AND ( bs)`；因此，任何一个表达式都可以转换为另一个。将第二个转换为第一个从性能角度来看可能是有利的，因为第一个意味着先执行限制（`WHERE`）操作再执行连接（`JOIN`）操作；因此，连接的输入关系可能会更小，输出也会更小。事实上，这种转换可能决定了连接结果是能保留在内存中，还是不得不溢出到磁盘上。


    ## EXTEND

    *参见* `extension`。


    ## extended Cartesian product

    *参见* `Cartesian product`。


    ## Extensible Markup Language

    *参见* `XML`。


    ## extension

    1. （*关系代数*）设 `r` 是一个关系。那么，扩展运算 `EXTEND r ADD ( exp AS X)` 是一个关系，其（a）头（heading）是
    `r` 的头加上属性 `X`，且（b）体（body）由所有元组 `t` 组成，其中 `t` 是 `r` 的一个元组，其属性 `X` 的值是通过对 `r` 的该元组计算表达式
    `exp` 而得出的。关系 `r` 不能有一个名为 `X` 的属性，并且 `exp` 不能引用 `X`。*另见* `tuple extension`。'
- fmt: '### 2. (Predicate)

    Let `p` be a predicate; then the extension of `p` consists of all full instantiations
    of `p` (i.e., all propositions that can be derived from `p` by full instantiation)
    that evaluate to `TRUE`.


    ### 3. (Relation)

    Following on from the previous definition, let `r` be a relation. Then the heading
    of `r` can be regarded as representing a predicate (*see* relation predicate),
    and the body of `r` can be regarded as representing the extension of that predicate.
    Hence, the term `extension` is also sometimes used to refer to the body of a relation.


    *Contrast* intension.


    ### 4. (Set theory)

    *See* axiom of extension.


    **Example** (first definition only): The following expression denotes an extension
    of the relation that’s the current value of relvar `P`:

    ```

    EXTEND P ADD ( WEIGHT * 454 AS GMWT )

    ```

    That extension is a relation just like the current value of relvar `P`, except
    that it has an additional attribute `GMWT` (“gram weight”), whose value in any
    given tuple is 454 times the `WEIGHT` value in that same tuple. Note that relvar
    `P` per se remains unaltered in the database—`EXTEND` isn’t like `ALTER TABLE`
    in `SQL`, it’s just a read-only operator that (like `restrict`, for example) takes
    a certain relation as input and returns another as output.


    Further examples are given under summarization.


    ### external predicate

    The relvar predicate for a given relvar. *Contrast* internal predicate. *Note*:
    Since this latter term is deprecated, the term `external predicate` is deprecated
    (somewhat) as well.


    *The Relational Database Dictionary, Extended Edition*


    **65**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00017.png)


    **F**


    ### FALSE

    *See* BOOLEAN.


    ### FD

    Functional dependency.


    ### FD implied by a superkey

    The FD `A` → `B` is implied by a superkey if and only if `A` is a superkey for
    the pertinent relvar.


    ### FD preservation

    Decomposing a relvar `R` into its projections `R1`, `R2`, . . ., `Rn` in such
    a way that FDs are preserved—that is, every FD satisfied by `R` is implied by
    those satisfied by `R1`, `R2`, . . ., `Rn`. `R1`, `R2`, . . ., `Rn` here are said
    to be independent projections. *Note*: Projections that aren’t independent are
    said to be interdependent, not dependent.


    *See also* atomic relvar.


    **Example**: Suppose relvar `S` satisfies the additional FD `{CITY}` → `{STATUS}`;
    i.e., the status for a given supplier is a function of that supplier’s location.
    Then replacing `S` by its projections on `{S#,SNAME,CITY}` and `{CITY,STATUS}`
    preserves FDs, because every FD satisfied by `S` is either satisfied by one of
    the two projections or is implied by those that are. By contrast, suppose `S`
    is replaced by its projections on `{S#,SNAME,CITY}` and `{S#,STATUS}` instead.
    Now the FD `{CITY}` → `{STATUS}` isn’t implied by the FDs satisfied by those projections
    (even though the decomposition is nonloss). One practical consequence is that
    updates to either of the two projections must now be monitored (either by the
    DBMS or—more likely in current practice—by some application) to ensure that the
    FD `{CITY}` → `{STATUS}` continues to be satisfied; for example, consider what’s
    involved in moving supplier `S1` from `London` to `Paris`. In other words, the
    two projections aren’t independent in this latter decomposition but are, rather,
    interdependent.


    Given the level of technology found in today’s commercial products, therefore,
    it’s generally preferable to perform decomposition in such a way as to preserve
    FDs—i.e., to decompose into independent projections—whenever possible.


    *The Relational Database Dictionary, Extended Edition*


    **67**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00128.png)


    ### field

    Term sometimes used to mean a column, in any of the possible senses of that term.
    All such uses are deprecated, however; the term is better reserved for an operating
    system or even physical level construct.


    ### field (mathematics)

    An algebra, q.v., for which the operators “+” and “*” have all of the properties
    (commutativity, associativity, etc.) that addition and multiplication of real
    numbers have; equivalently, a formal system that obeys all of The Laws of Algebra,
    q.v.


    ### fifth normal form

    Relvar `R` is in fifth normal form, `5NF`, if and only if every nontrivial JD
    satisfied by `R` is implied by the superkeys of `R`; equivalently, if and only
    if every nontrivial JD `5{ A1,A2,. . .,An }` satisfied by `R` is such that (a)
    each of `A1`, `A2`, . . ., `An` is a superkey for `R` and (b) the keys of `R`
    can be ordered in such a way that each pair of adjacent keys in that ordering
    is included in some `Ai`, 1 ≤ `i` ≤ `n`. Every `5NF` relvar is in `4NF`. *Note*:
    `5NF` is “the” normal form with respect to JDs. Also, although being in `5NF`
    clearly doesn’t preclude being in `6NF` as well, the term `5NF` is often used
    loosely to refer to a relvar that’s in `5NF` and not in `6NF`.


    Observe that relvar `R` is certainly in `5NF` if either (a) it’s in `3NF` and
    it has no composite keys or (b) it’s in `BCNF` and it has at least one nonkey
    attribute.


    **Example**: As noted under Boyce/Codd normal form, with the normal forms it’s
    often more instructive to show a counterexample rather than an example per se.
    Consider, therefore, relvar `SPJ`, with attributes `S#` (supplier number), `P#`
    (part number), and `J#` (project number), and predicate “Supplier `S#` supplies
    part `P#` to project `J#`.” Let that relvar be all key (i.e., subject to the key
    constraint `KEY{S#,P#,J#}`). Let it also be subject to the constraint that if
    (a) supplier `Sx` supplies part `Py` and (b) part `Py` is supplied to project
    `Jz` and (c) project `Jz` is supplied by supplier `Sx`, then (d) supplier `Sx`
    supplies part `Py` to project `Jz`. Then `SPJ` is equal to the join of its projections
    on `{S#,P#}`, `{P#,J#}`, and `{J#,S#}`—i.e., it satisfies the JD `5{{S#,P#},{P#,J#},{J#,S#}}`—and
    so it can be nonloss decomposed into those three projections. Since that JD is
    neither trivial nor implied by the sole superkey (namely, the entire heading),
    relvar `SPJ` isn’t in `5NF`, though it is in `4NF`. We remark that relvar `SPJ`
    (a) is in `3NF` but has a composite key and (b) is in fact in `BCNF` but has no
    nonkey attributes.


    *The Relational Database Dictionary, Extended Edition*


    **68**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00059.png)


    ### file

    Term sometimes used to mean a table, in any of the possible senses of that term,
    or even a relation or relvar. All such uses are deprecated, however; the term
    is better reserved for an operating system or even physical level construct.


    ### First Great Blunder, The

    Equating types and either relations or relvars. *See* type.


    ### first normal form

    Normalized. All relvars are in first normal form, `1NF`, by definition; that is,
    the terms `1NF` and `normalized`, applied to a relvar, mean the same thing (*see*
    normalized for further explanation). It follows that a “table,” in a language
    like `SQL`, can be considered to be in `1NF` if and only if it’s a direct and
    faithful representation of some relvar, where *direct and faithful* means among
    other things that every row-and-column intersection (i.e., every cell, q.v.) in
    that table contains exactly one value of the applicable type, nothing more and
    nothing less. (The value in question can be arbitrarily complex—it can even be
    a table—but, to repeat, there must be exactly one such, and it must be of the
    applicable type.) In particular, therefore, a table isn’t in first normal form
    if it contains any repeating groups, q.v. This fact accounts for the usual informal
    characterization of first normal form as meaning simply *no repeating groups*.
    *Note*: Although being in `1NF` clearly doesn’t preclude being in `2NF` as well,
    the term `1NF` is often used loosely to refer to a relvar that’s in `1NF` only
    and not in any higher normal form.'
