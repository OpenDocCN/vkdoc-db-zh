  trans: '

    # 赋值

    将一个值（源，由表达式表示）赋给一个变量（目标，由变量引用表示）的运算符；也指调用该运算符时执行的操作。源和目标必须具有相同类型。*注意*：每个更新运算符的调用在语义上等价于某个赋值操作（可能是一个多重赋值，参见相关条目）。


    # 赋值原则

    将值 `v` 赋给变量 `V` 后，比较 `v = V` 必须求值为 TRUE。


    # 关联寻址

    按值而非按位置寻址。在关系模型中，所有寻址都是关联的，这意味着其中包含明确拒绝指针（参见相关条目）等特性。


    # 结合律

    设 `Op` 为一个二元运算符，并假设 `Op` 以中缀形式表示。当且仅当对于所有 `x`、`y` 和 `z`，都有 `x Op (y Op z) = (x
    Op y) Op z` 时，`Op` 才具有结合性。


    **示例**：在普通算术中，加法（`+`）是结合的，因为对于所有数字 `x`、`y` 和 `z`，都有 `x + (y + z) = (x + y) + z`。同样，`||`（字符串连接）是结合的，因为对于所有字符串
    `x`、`y` 和 `z`，都有 `x || (y || z) = (x || y) || z`。类似地，在关系代数中，`UNION` 和 `JOIN` 是结合的（相比之下，`MINUS`
    不是）。同样，在逻辑中，`OR` 和 `AND` 是结合的（相比之下，`IMPLIES` 不是）。


    *注意*：上述所有结合律运算符（除了 `||`）也都是可交换的（参见相关条目）。另一个具有结合性但不具有交换性的例子是二值逻辑中仅返回其第一个参数值的未命名二元连接词。*另见*
    左结合性；右结合性。


    # 原子谓词

    一个简单谓词（参见相关条目）。


    # 原子命题

    一个简单命题（参见相关条目）。


    # 原子关系变量

    这是一个**弃用术语**，指无法分解为独立投影的关系变量（*参见* FD 保持性）。该术语已被弃用，因为它很可能与术语*不可约关系变量*（*参见* 不可约性，第二个定义）混淆。虽然不可约关系变量总是原子的，但反过来则不一定——一个关系变量可以是原子的但不是不可约的，实际上甚至可能不在
    BCNF 中。无论如何，这个概念很少需要；因此，必要时最好直接阐明其含义。


    **示例**：假设关系变量 `SP` 满足附加的 FD `{QTY} → {P#}`，意味着给定发货的零件号是发货数量的函数；例如，零件 `P1`（单独）总是以数量
    100 供应，零件 `P2`（单独）以数量 200 供应，依此类推（当然，此示例非常牵强，但足以说明当前目的）。此修订版的 `SP` 不在 BCNF 中（因为
    `{QTY}` 不是超键），并且可以无损分解为在 `{S#,QTY}` 和 `{QTY,P#}` 上的投影。然而，这些投影虽然处于 BCNF 中，但并非独立，因为
    FD `{S#,P#} → {QTY}` 在分解中没有被保留；因此，此修订版的 `SP` 不是原子的。*注意*：由此示例可知，(a) 分解为 BCNF 投影和
    (b) 分解为原子投影的目标，尽管通常都是可取的，但有时可能会相互冲突。


    # 原子语句

    （*编程语言*）在语法上，指内部不包含其他嵌套语句的语句（*对比* 复合语句）；在语义上，指保证要么完全执行，要么没有任何效果（可能除了返回状态码或等效值）的语句。所有语法上的原子语句在语义上也是原子的。


    ---

    **关系数据库词典，扩展版**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00028.png)


    ![](img/00102.png)

    '
- fmt: '# 关系数据库词典（扩展版）


    ## 相关模型中的原子性

    在关系模型中，一个关系变量是原子的当且仅当其所有属性都是原子的。（顺便说一句，反之不成立；具体来说，多重赋值在语义上是原子的，但在语法上并非如此。）


    ## 原子类型

    **已弃用术语**，标量类型的旧称。*参见* 标量。


    ## 原子值

    **过时且有些弃用的术语**，指标量值。*参见* 标量。


    ## 属性

    宽泛地说，指一列；更精确地说，是一个 `<属性名, 类型名>` 对，尽管通常非正式地用其属性名本身来指代某个给定属性。（这种简化形式是可接受的，因为关系模型要求属性名在相关标题中必须是唯一的，因此这些名字实际上隐含了相应的类型名。）


    **示例**：在供应商-零件数据库中，(a) 对 `<SNAME, NAME>` 是关系变量 `S` 的一个属性；(b) 对 `<S#, S#>` 是关系变量
    `S` 和关系变量 `SP` 的共同属性。


    我们也可以更简单但不太正式地说：(a) `SNAME` 是关系变量 `S` 的一个属性；(b) `S#` 是关系变量 `S` 和关系变量 `SP` 的一个共同属性。这两个属性的类型分别是
    `NAME` 和 `S#`。


    ## 属性赋值

    *参见* 属性引用。


    ## 属性约束

    一种规范（概念上属于关系变量约束的一部分），用于指定给定关系变量的给定属性属于给定的声明类型。


    **示例**：关系变量 `S` 的属性 `SNAME` 被声明为类型 `NAME`——也就是说，它被约束为只包含类型 `NAME` 的值。任何试图将非该类型的
    `SNAME` 值引入该关系变量的操作都会立即失败。


    ## 属性提取器

    一种操作符，用于从指定元组中提取指定属性的值。


    **示例**：令 `t` 表示图 1 中供应商 S1 的供应商元组。那么，以下表达式从该元组中提取状态值 20（一个整数）：

    ```

    STATUS FROM t

    ```

    这里的 `STATUS` 是一个属性引用。


    ## 属性 FROM

    **Tutorial D** 语法中用于属性提取器的表达方式。


    ## 属性引用

    从语法上讲，指一个属性名（可能带点限定）。属性引用可以表示属性本身，或者该属性的值（通常但不总是出现在某个特定元组的上下文中），具体取决于上下文。需要特别注意的是，当它出现在某个
    `UPDATE` 操作符调用内的“属性赋值”左侧时，它肯定表示属性本身。


    **示例**：考虑以下 `UPDATE` 语句：

    ```

    UPDATE P WHERE CITY = ''London'' :

    { WEIGHT := 2 * WEIGHT , CITY := ''Oslo'' } ;

    ```

    该语句包含两个属性赋值和四个属性引用：`CITY`（两次）和 `WEIGHT`（也是两次）。设想整个 `UPDATE` 操作是按某种顺序逐个处理关系变量 `P`
    的元组来执行的，令 `t` 是当前正在处理的元组。那么在整个语句中：(a) `CITY` 的第一次出现和 `WEIGHT` 的第二次出现分别表示 `t` 内的
    `CITY` 值和 `WEIGHT` 值；(b) `WEIGHT` 的第一次出现和 `CITY` 的第二次出现分别表示 `t` 内的 `WEIGHT` 属性本身和
    `CITY` 属性本身。*参见* `UPDATE` 以获取进一步解释。


    ## 属性重命名

    *参见* 重命名。


    ## 属性类型

    *参见* 属性。


    ## 属性值

    *参见* 元组值。


    ## 增广

    *参见* Armstrong 推理规则。


    ## 公理

    被假定为真的事物，可用于推导进一步的真理（即定理）。在数据库中，基本关系中的元组可被视为公理，因为它们代表了被假定为真的命题。公理是定理的一个特例。*参见*
    证明。'
  raw: 'in the relational model. (The converse is false, incidentally; to be specific,
    multiple assignment, q.v., is semantically but not syntactically atomic.)


    ****atomic type** Deprecated term for a scalar type. *See* scalar.


    ****atomic value** Old fashioned and somewhat deprecated term for a scalar value.
    *See* scalar.


    ****attribute** Loosely, a column; more precisely, an <attribute name, type name>
    pair, though it’s common to refer to a given attribute informally by its attribute
    name alone. (This simplified form is acceptable because the relational model requires
    attribute names to be unique within the pertinent heading, and those names thus
    effectively imply the corresponding type names.)


    **Examples*: In the suppliers-and-parts database, (a) the pair


    <SNAME,NAME> is an attribute of relvar S; (b) the pair <S#,S#> is an attribute—a
    “common attribute,” q.v.—of both relvar S and relvar SP.


    We might also say, more simply but less formally, just that (a) SNAME is an attribute
    of relvar S and (b) S# is an attribute—a “common attribute”—


    of both relvar S and relvar SP. These two attributes are of types NAME


    and S#, respectively.


    ****attribute assignment** *See* attribute reference.


    ****attribute constraint** A specification (conceptually part of a relvar constraint,
    q.v.) to the effect that a given attribute of a given relvar is of a given declared
    type.


    **Example*: Attribute SNAME of relvar S is declared to be of type NAME—


    that is, it’s constrained to contain values of type NAME. Any operation that attempts
    to introduce an SNAME value into that relvar that’s not of that type will immediately
    fail.


    ****attribute extractor** An operator for extracting the value of a specified
    attribute from a specified tuple.


    ***The Relational Database Dictionary, Extended Edition**


    **11**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00193.png)


    *Example*: Let *t* denote the supplier tuple in Figure 1 for supplier S1\. Then
    the following expression extracts the status value 20 (an integer) from that tuple:


    STATUS FROM *t*


    STATUS here is an attribute reference, q.v.


    ****attribute FROM** **Tutorial D** syntax for an attribute extractor, q.v.


    ****attribute reference** Syntactically, an attribute name (possibly dot qualified).
    An attribute reference denotes either an attribute as such or the value of the
    attribute in question (usually though not always within some specific tuple in
    each case), as the context demands. Note in particular that such a reference certainly
    denotes an attribute as such if it appears on the left side of an “attribute assignment”
    within some UPDATE operator invocation.


    **Examples*: Consider the following UPDATE statement:


    UPDATE P WHERE CITY = ''London'' :


    { WEIGHT := 2 * WEIGHT , CITY := ''Oslo'' } ;


    This statement contains two attribute assignments and four attribute references,
    CITY (twice) and WEIGHT (also twice). Imagine the overall UPDATE being executed
    by processing the tuples of relvar P one by one in some sequence, and let *t*
    be the tuple currently being processed. Within the overall statement, then, (a)
    the first appearance of CITY and the second appearance of WEIGHT denote the CITY
    value and the WEIGHT value, respectively, within *t*; (b) the first appearance
    of WEIGHT and the second appearance of CITY denote the WEIGHT attribute as such
    and the CITY


    attribute as such, respectively, within *t*. *See* UPDATE for further explanation.


    **attribute renaming *See* renaming.


    **attribute type** *See* attribute.


    ****attribute value** *See* tuple value.


    ****12**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00181.png)


    **augmentation** *See* Armstrong’s inference rules.


    ****axiom** Something assumed to be true, available for use in deriving further
    truths (i.e., theorems, q.v.). In a database, the tuples in the base relations
    can be regarded as axioms, because they represent propositions that are assumed
    to be true. An axiom is a special case of a theorem. *See* proof.'
