    ****universal relvar** The join of all relvars in a given set of relvars.


    The normalization procedure of nonloss decomposition, if viewed in isolation (i.e.,
    ignoring other possible aids to database design), tacitly assumes that it’s possible
    to define an initial universal relvar that has all of the attributes relevant
    to the database under consideration, and then shows how that relvar can be replaced
    by successively “smaller” (i.e., lower degree) projections until a “good” design
    is reached.


