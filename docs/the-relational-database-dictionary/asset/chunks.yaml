    others. 2\. ( *Operator*) Equality. 3\. ( *Logic*) Equality; also, a tautology
    of the form ( *p*) EQUIV ( *q*). 4\. ( *Comparison*) A Boolean expression of the
    form ( *exp1*) = ( *exp2*), where *exp1* and *exp2* are expressions of the same
    type, that’s guaranteed to evaluate to TRUE regardless of the values of any variables
    involved. The parentheses enclosing *exp1* and *exp2* might not be needed in practice.
    5\. ( *Identity value*) Let *Op* be a commutative dyadic operator, and assume
    for definiteness that *Op* is expressed in infix style.


    If there exists a value *i* such that *i* *Op* *v* and *v* *Op* *i* are both equal
    to *v* for all possible values *v,* then *i* is the identity, or identity value,
    with respect to *Op* ( *see* Laws of Algebra, The). *Note*: Identity values are
    also known as identity elements; neutral elements; unit elements; or sometimes
