    times. An example is the collection ( *y,y,x,z,y,z*), which can equivalently be
    written as ( *x,y,y,y,z,z*), since bags, like sets, have no ordering to their
    elements. The number of times a given element appears in a given bag is the multiplicity
    (of that element with respect to that bag).


    The set theory operations of inclusion, union, intersection, difference, and product
    (but not complement) can all be generalized to apply to bags. First, inclusion:
    Let *b1* and *b2* be bags, and let element *x* appear exactly *n1* times in *b1*
    and exactly *n2* times in *b2* ( *n1* ≥ 0, *n2* ≥ 0). Then bag *b1* includes bag
    *b2* ( *b1* ⊇ *b2*) if and only if *n1* ≥ *n2* for all such elements *x*; *further,
    *b2**


    *is included in *b1* ( *b2* ⊆ *b1*) if and only if *b1* includes *b2,* and *b1*
    is equal to *b2* ( *b1* = *b2*) if and only if each includes the other. All of
    the terms associated with set inclusion (superset, subset, and so on) have analogs
    in connection with bag inclusion (superbag, subbag, and so on).


    Now let *Op* be union, intersection, or difference, and let *b* be the bag obtained
    by applying *Op* to bags *b1* and *b2* (in that order, in the case of difference),
    where as before element *x* appears exactly *n1* times in *b1* and exactly *n2*
    times in *b2* ( *n1* ≥ 0, *n2* ≥ 0). Then element *x* appears exactly *n* times
    in *b,* where *n* is:


    MAX( *n1,n2*) if *Op* is union


    MIN( *n1,n2*) if *Op* is intersection


    MAX( *n1*- *n2,* 0) if *Op* is difference In no case does *b* contain any other
    elements.


    Now let elements *x1* and *x2* appear exactly *n1* times in *b1* and exactly *n2*


    times in *b2,* respectively ( *n1* ≥ 0, *n2* ≥ 0), and let *b* be the product
    of *b1* and **The Relational Database Dictionary, Extended Edition**


    **15**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00037.png)


    *b2,* in that order. Then the pair < *x1,x2*> appears exactly *n1** *n2* times
    in *b,* and *b* contains no other elements.


    Finally, there are two operations, union plus and intersection star (also known
    by a variety of other names), that have no counterpart in set theory.


    Let *b* be the bag obtained by applying one of these operations to bags *b1*


    and *b2,* where once again element *x* appear exactly *n1* times in *b1* and exactly
    *n2* times in *b2* ( *n1* ≥ 0, *n2* ≥ 0). Then element *x* appears exactly *n*
    times in *b,* where *n* is:


    *n1*+ *n2* if *Op* is union plus


    *n1** *n2* if *Op* is intersection star


    **Note*: SQL supports union plus but not true bag union. It does not support intersection
    star.


    **Examples*: Let *b1* and *b2* be the bags ( *w,w,x,x,y*) and ( *x,y,y,y,z,z*),
    respectively. Then the following expressions yield the indicated results:


    b1 UNION b2 = (w,w,x,x,y,y,y,z,z)


    b1 INTERSECT b2 = (x,y)


    b1 MINUS b2 = (w,w,x)


    b2 MINUS b1 = (y,y,z,z)


    b1 TIMES b2 = (<w,x>,<w,x>,<x,x>,<x,x>,<y,x>,


    <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,


    <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,


    <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,


    <w,z>,<w,z>,<x,z>,<x,z>,<y,z>,


    <w,z>,<w,z>,<x,z>,<x,z>,<y,z>)


    b1 UNION+ b2 = (w,w,x,x,x,y,y,y,y,z,z)


    b1 INTERSECT* b2 = (x,x,y,y,y)


