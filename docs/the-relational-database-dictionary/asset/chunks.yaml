    satisfies the FD *A* → *B,* then *R* is equal to the join of its projections on
    *AB*


    and *AC*. Note that the converse of this theorem is false; that is, just because
    *R* is equal to the join of its projections on *AB* and *AC,* it doesn’t follow
    that *R* satisfies the FD *A* → *B*. (If we replace the FD *A* → *B* by the MVD
    *A* →→ *B* throughout, however, the resulting statement is true in both directions;
    that is, *R* is equal to the join of its projections on *AB* and *AC* if *and
    only if* it satisfies the MVD *A* →→ *B*. *See* multivalued dependency.)


