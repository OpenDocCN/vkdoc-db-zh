- fmt: '# tuple unwrapping


    Let *s* be a tuple, let {*Y*} be a tuple valued attribute of *s*, and let {*X*}
    be the set of all attributes of *s* except *YT*. Let {*Y*} have attributes *Y1,
    Y2, . . ., Yn*; also, let {*X*} not contain any attribute with the same name as
    any of *Y1, Y2, . . ., Yn*. Then the tuple unwrapping `s` `UNWRAP` (*YT*) is another
    tuple *t*. The heading of *t* consists of the set theory union of {*X*} and {*Y*}.
    Let tuple *s* have *X* value *x* and *YT* value a tuple with *Y1* value *y1,*
    *Y2* value *y2,* . . ., and *Yn* value *yn*; then tuple *t* has *X* value *x,*
    *Y1* value *y1,* *Y2* value *y2,* . . ., and *Yn* value *yn*.


    ## Example


    Let *t* be a tuple from relvar SP, and let *tw* be the tuple resulting from the
    expression


    ```

    t WRAP ( { P#, QTY } AS PQ_TUP )

    ```


    (see tuple wrapping). Then the expression


    ```

    tw UNWRAP ( PQ_TUP )

    ```


    yields *t*.


    ## tuple value


    Loosely, a row (value). More precisely, let `TUPLE` {*H*} be a tuple type, and
    let *t* be a set of pairs <<*A,T*>, *v*>, called components (q.v.), obtained from
    {*H*} by attaching to each attribute <*A,T*> in {*H*} some value *v* of type *T,*
    called the attribute value in *t* for attribute *A*. Then *t* is a tuple value
    (tuple for short) of type `TUPLE` {*H*}, with heading {*H*} and the same degree
    and attributes as {*H*}. *Note*: Tuples as defined in the relational model differ
    in certain important respects from the mathematical construct of the same name.
    In particular, tuples in mathematics typically don’t have named attributes; instead,
    their attributes are identified by their ordinal position, left to right. See
    tuple (mathematics).


    ## tuple valued attribute


    An attribute whose type is some tuple type. Values of such an attribute are tuples
    of the specified type. *Note*: If a relvar has a tuple valued attribute, that
    fact in and of itself doesn’t constitute a violation of any particular level of
    normalization (not even first); however, such attributes are usually contraindicated
    in database design, at least in base relvars, because they necessarily imply some
    structural asymmetry and thereby give rise to asymmetry (and complexity) in queries,
    constraints, and updates as well. *See also* tuple unwrapping; tuple wrapping.


    ## tuple variable


    Loosely, a row (variable); more precisely, a variable whose type is some tuple
    type. Let tuple variable *T* be of type `TUPLE` {*H*}; then *T* has the same heading
    (and therefore attributes) and degree as that type does. *Note*: Tuple variables
    aren’t required by the relational model as such, but they’re likely to be needed
    in the external environment in order to support, for example, extraction of some
    tuple from some relation.


    ## tuple wrapping


    Let *t* be a tuple and let the heading of *t* be partitioned into subsets {*X*}
    and {*Y*}. Let the attributes of {*Y*} be *Y1, Y2, . . ., Yn*; also, let {*X*}
    not contain any attribute called *YT*. Then the tuple wrapping `t` `WRAP` ({*Y*}
    AS *YT*) is another tuple *s*. The heading of *s* consists of {*X*} extended with
    an attribute *YT* of type `TUPLE` {*Y*}. Let tuple *t* have *X* value *x,* *Y1*
    value *y1,* *Y2* value *y2,* . . ., and *Yn* value *yn*; then tuple *s* has *X*
    value *x* and *YT* value a tuple with *Y1* value *y1,* *Y2* value *y2,* . . .,
    and *Yn* value *yn*.


    ### Example


    Let *t* be the tuple for supplier S1 and part P1 from relvar SP. Then the expression


    ```

    t WRAP ( { P#, QTY } AS PQ_TUP )

    ```


