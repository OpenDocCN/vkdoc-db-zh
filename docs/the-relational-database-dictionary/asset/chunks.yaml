- fmt: '# first order logic


    A form of predicate logic in which the sets over which variables range aren’t
    allowed to contain predicates. *Contrast* second order logic. *Note*: Propositional
    logic, q.v., might be regarded as a “zeroth order” logic, because it has no variables
    (and its variables thus don’t range over anything at all).


    # flat relation


    The idea that “relations are flat” is a popular misconception (and the phrase
    “flat relation” is strongly deprecated). *See* table.


    # FORALL


    *See* universal quantifier. In the literature, `FORALL` is often represented by
    an upside down A, thus: ∀.


    # foreign key


    Let `R1` and `R2` be relvars, not necessarily distinct, and let `K` be a key for
    `R1`. Let `FK` be a subset of the heading of `R2` such that there exists a possibly
    empty sequence of attribute renamings on `R1` that maps `K` into `K''` (say),
    where `K''` and `FK` contain exactly the same attributes. Further, let `R2` and
    `R1` be subject to the constraint that, at all times, every tuple `t2` in `R2`
    has an `FK` value that’s the `K''` value for some (necessarily unique) tuple `t1`
    in `R1` at the time in question. Then `FK` is a foreign key, the associated constraint
    is a referential constraint, and `R2` and `R1` are the referencing relvar and
    the corresponding referenced relvar, respectively, for that constraint. Also,
    `K` (not `K''` ) is referred to, sometimes, as the referenced key or target key.
    *Note*: The referencing and referenced terminology carries over to tuples in the
    obvious way; that is, tuples `t2` and `t1` from the foregoing discussion are a
    referencing tuple and the corresponding referenced tuple, respectively. A referenced
    tuple is also sometimes called a target tuple.


    ## Examples


    In relvar `SP`, `{S#}` and `{P#}` are foreign keys corresponding to the keys `{S#}`
    and `{P#}` in relvars `S` and `P`, respectively. They might be specified as follows:


    ```

    VAR SP BASE RELATION

    { S# S#, P# P#, QTY QTY }

    KEY { S#, P# }

    FOREIGN KEY { S# } REFERENCES S

    FOREIGN KEY { P# } REFERENCES P ;

    ```


    Here by contrast is an example in which some attribute renaming is required:


    ```

    VAR EMP BASE RELATION

    { E# E#, ..., M# E#, ... }

    KEY { E# }

    FOREIGN KEY { M# } REFERENCES

    ( EMP { E# } ) RENAME ( E# AS M# ) ;

    ```


    Attribute `M#` here denotes the employee number of the manager of the employee
    identified by `E#` (the referencing relvar and the referenced relvar in this example
    are one and the same). Thus, for example, the `EMP` tuple for employee `E3` might
    contain an `M#` value of `E2`, which constitutes a reference to the `EMP` tuple
    for employee `E2`.


    Note that there’s no requirement that the key in the referenced relvar that corresponds
    to a given foreign key be a primary key specifically. Nor is there a requirement
    that the referencing relvar and the referenced relvar be base relvars specifically.


    # foreign key constraint


    A referential constraint, q.v.


    # foreign key rule


    A rule specifying the action to be taken by the DBMS—typically but not necessarily
    a compensating action, q.v.—to ensure that updates affecting the foreign key in
    question don’t violate the associated foreign key constraint.


    # formal


    Having to do with form rather than content (though the term also carries connotations
    of precision, and its opposite, informal, is often used as if it were a synonym
    for intuitive). By way of example, consider the expression (actually a functional
    dependency) `{S#} → {CITY}`. This FD is a formal statement, and it has a certain
    precise (formal!) significance: namely, that whenever two tuples in relvar `S`
    have the same `S#` value, they also have the same `CITY` value. By contrast, the
    real world constraint that this FD is supposed to represent looks something like
    this: *Each supplier*'
