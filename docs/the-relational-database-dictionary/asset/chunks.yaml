    ![](images/00182.png)


    bag inclusion *See* bag.


    **bag membership** ( *Of an element*) The property of appearing in some given
    bag; the operation of testing for that property. Like set membership, q.v., bag
    membership is usually denoted by the symbol “∈”; thus, the Boolean expression
    *x* ∈ *b* returns TRUE if and only if element *x* does in fact appear at least
    once in bag *b*.


    **bag operator *See* bag.


    **base relation** The value of a given base relvar at a given time. *Contrast*
    derived relation.


    **Example* s: The relations that are the values of relvars S, P, and SP at any
    given time.


    ****base relvar** A relvar not defined in terms of others; that is, an independent
    relvar. *Contrast* derived relvar. *Note*: It’s a popular misconception that base
    relvars are physically stored, in the sense that they’re represented in storage
    by physical files and their tuples and attributes are represented in storage by
    records and fields within those files ( *see* direct image). But the relational
    model deliberately has nothing to say about physical storage; in particular, it
    categorically doesn’t say that base relvars, as such, are physically stored—neither
    in the foregoing sense, nor in any other. The only requirement is that there must
    be some defined mapping from what’s physically stored to what’s perceived by the
    user (i.e., base relvars or derived relvars or a mixture of both) and vice versa.


    **Examples*: Relvars S, P, and SP.


    ****base table** SQL analog of either a base relation or a base relvar, as the
    context demands. *See also* table.


    ****BCNF** Boyce/Codd normal form.


    ****bi-implication** Logical equivalence.


    ****BI-IMPLIES** Same as EQUIV.


    ****The Relational Database Dictionary, Extended Edition**


    **17**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00006.png)


    **bijection** A mapping, or function, from set *s1* to set *s2* such that each
    element of *s2* is the image of exactly one element of *s1*; equivalently, a mapping
    that is both an injection and a surjection (in other words, a one-to-one correspondence,
    in the strict sense of that term, from *s1* to *s2*). Also known as a bijective
    or “one-to-one onto” mapping. Note that if a given mapping is bijective, then
    it has an inverse mapping that’s bijective as well.


    **Examples:* The mapping from integers *x* to their successors *x*+1 is a bijection
    from the set of all integers to itself. So is the inverse mapping from integers
    *x* to their predecessors *x*-1\.


    ****binary** Of degree two.


    ****binding** ( *Logic*) Converting a free variable to a bound variable by means
    of quantification, q.v.


    ****body** A set of tuples all of the same type; especially, the set of tuples
    appearing in a given relation, or in a given relvar at a given time. Every subset
    of a body is itself a body.


    **Examples*: The set of tuples appearing in relvar S at any given time; any subset
    of that set.


    ****BOOLEAN** A scalar data type—the only one required by the relational model—containing
    just two values (two truth values, to be specific, denoted by the literals TRUE
    and FALSE, respectively).


    ****Boolean algebra** 1\. ( *Simple case*) The truth values TRUE and FALSE, together
    with the logical operators NOT, OR, and AND, q.v. 2\. ( *General* *case*) Let
