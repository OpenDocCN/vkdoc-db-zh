    \n***The Relational Database Dictionary, Extended Edition***\n\n**49**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00173.png)\n\n**DNF** Disjunctive normal form.\n\n**domain** Type.\
    \ Earlier relational writings favored the term *domain*; more recent ones favor\
    \ the term *type* instead.\n\n**domain (mathematics)** *See* function; relation\
    \ (mathematics).\n\n**domain calculus** A form of relational calculus, semantically\
    \ equivalent to tuple calculus, q.v., in which the range variables range over\
    \ domains (types) instead of relations and thus denote values from those domains.\n\
    \n**Example**: Here’s a domain calculus formulation of the query “Get supplier\
