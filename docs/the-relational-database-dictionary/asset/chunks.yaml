- fmt: "# R\n\n## range\n\n1.  *See* `function`.\n2.  *See* `range variable`.\n\n\
    ## range variable\n\n关系演算中逻辑变量的类似物；换言之，一个“取值范围”为某个特定值集的变量——在元组演算中是某个关系中的元组集合，在域演算中是某种类型的值集合——并且在关系演算表达式中既可以是绑定的也可以是自由的。\n\
    \n**示例**：*参见* `domain calculus` 和 `tuple calculus` 下的示例。\n\n## RANK\n\n*参见* `ranking`.\n\
    \n## ranking\n\n设 *r* 是一个没有名为 *X* 属性的关系。那么排名运算 `RANK r BY ( item, . ., item AS\
    \ X )`，其中每个 `item` 由 `ASC`（升序）或 `DESC`（降序）后跟一个标识 *r* 属性的属性引用组成（并且这些 `item` 的整体序列按常规方式指定了主排序到次排序），生成一个与\
    \ *r* 相同的关系，除了 (a) 它多了一个属性 *X* 以及 (b) 该结果中任何给定元组的 *X* 值显示了该元组相对于指定排序的排名位置。\n\n\
    **示例**：*参见* `quota query`.\n\n## read-only operator\n\n一个函数；即一个调用时不更新任何内容（除了可能更新该操作符实现内部的局部变量）但返回一个值的操作符，该值的类型在操作符定义时声明。因此，只读操作符调用表示一个值；即，它是一个表达式——事实上，根据定义，每个表达式都是一个只读操作符调用（*参见*\
    \ `expression`）——并且它可以出现在任何允许相应类型字面量的地方。特别地，它可以嵌套在其他表达式中。*注意*：正如本词典其他地方提到的，某些\
    \ SQL 只读操作符是“可能非确定性的”，这意味着从技术上讲，它们根本不是函数。实际上，它们确实是函数；然而，它们是故意未充分指定的，因此从用户的角度来看，它们的行为不像函数。\n\
    \n**示例**：*参见* `argument` 下的第一个示例。\n\n## real relation\n\n给定实时点上一个真实关系变量的值。\n\n\
    ## real relvar\n\n一个基本关系变量或一个快照（*对比* `virtual relvar`）。\n\n## record\n\n有时用来表示“行”的术语，具有该词的任何可能含义。然而，所有此类用法都被弃用；该术语最好保留给操作系统甚至物理级别的构造。\n\
    \n## recursive query\n\n一个关系表达式——根据定义可以被视为某个关系值操作符 *Op* 的调用——其求值涉及对该同一操作符 *Op*\
    \ 的进一步调用。\n\n**示例**：这里是一个计算具有属性 A 和 B（均为 `P#` 类型）的二元关系的传递闭包（*参见* `transitive closure`）的操作符的递归定义（代码效率不高，但显然可以通过多种方式改进）：\n\
    ```\nOPERATOR TRANCLO ( AB RELATION { A P#, B P# } )\nRETURNS RELATION { A P#,\
    \ B P# } ;\nRETURN\n( WITH ( AB UNION\n( ( AB RENAME ( B AS C ) ) COMPOSE\n( AB\
    \ RENAME ( A AS C ) ) ) AS ttt :\nIF ttt = AB THEN ttt ELSE TRANCLO ( ttt ) END\
    \ IF ) ;\nEND OPERATOR ;\n```\n现在，`TRANCLO( r )` 的调用（其中 *r* 是一个适当类型的关系）可以被认为是一个递归查询，因为它的求值涉及对\
    \ `TRANCLO` 本身的进一步调用（通常是这样）。\n\n## recursive relationship\n\n一种关系（取该词的第三种定义，*参见*\
    \ `relationship`），其中参与的两个集合是同一个集合。这个术语并不是特别贴切，因为其中并不涉及递归。\n\n## reductio ad absurdum\n\
    \n“归谬法”；一种证明方法（*参见* `proof`），通过证明某物的否定会导致矛盾来确立该物为真。\n\n## redundancy\n\n一个数据库当且仅当它包含（直接或间接地）同一命题的两个或多个不同表示时，才显示出冗余。*另见*\
    \ `controlled redundancy`.\n\n## referenced key\n\n*参见* `foreign key`.\n\n## referenced\
    \ relvar\n\n*参见* `foreign key`.\n\n## referenced tuple\n\n*参见* `foreign key`.\n\
    \n## referencing\n\n该术语的关系型含义如 `foreign key` 下所述；不应与同名操作符混淆——该操作符存在于支持指针但不支持关系模型的系统中——它给定一个变量\
    \ *V*，返回一个指向 *V* 的指针。*注意*：支持指针的系统通常也支持一个称为 `dereferencing`（解引用）的操作符，它给定一个指针 *p*，返回\
    \ *p* 指向的变量 *V*。\n\n## referencing relvar\n\n*参见* `foreign key`.\n\n## referencing\
    \ tuple\n\n*参见* `foreign key`.\n\n## referential action\n\n外键规则的操作规范部分（例如，DELETE\
    \ 规则中的“cascade”）；也用于指代指定的操作本身。\n\n## referential constraint\n\n*参见* `foreign key`.\n\
    \n## referential cycle\n\n从某个关系变量到其自身的一条引用路径（*参见* `referential path`）。涉及此类循环的数据库设计通常是不推荐的。\n\
    \n## referential integrity\n\n粗略地说，规则是：如果对应的被引用元组不存在，则不允许任何引用元组存在。更精确地说，设 *FK*\
    \ 是某个引用关系变量 *R2* 中的某个外键；设 *K* 是对应被引用关系变量 *R1* 中的对应键；并设 *K'* 是如 `foreign key` 下所述从\
    \ *K* 派生而来的值。那么，完整性规则要求不存在这样一个时刻：存在一个 *R2* 中的 *FK* 值，它不是 *R1* 中某个（必然是唯一的）元组的 *K'*\
    \ 值。*另见* `foreign key`; `foreign key rule`.\n\n## referential path\n\n设关系变量 *Rz,\
    \ Ry, Rx, ..., Rb, Ra* 满足：存在一个从 *Rz* 到 *Ry* 的引用约束，一个从 *Ry* 到 *Rx* 的引用约束，...，以及一个从\
    \ *Rb* 到 *Ra* 的引用约束。那么，从 *Rz* 到 *Ra* 的这一系列约束构成了一条从 *Rz* 到 *Ra* 的引用路径（并且链中约束的数量是该路径的长度）。\n\
    \n## reflexivity\n\n1.  （*二元逻辑操作符的*）二元逻辑操作符 *Op*（为明确起见，我们假设它以中缀风格表示）是自反的，当且仅当，对于所有\
    \ *x*，`x Op x` 为真。\n2.  （*二元关系的*）二元关系 *r* 是自反的，当且仅当，对于所有 *x*，元组 `<x, x>` 出现在 *r*\
    \ 中。\n3.  （*函数依赖的*）*参见* `Armstrong's inference rules`.\n    *注意*：前两个定义略有简化，因为它们故意没有指定\
    \ *x* 的可能值范围。\n\n    **示例**（*仅第一个定义*）：逻辑操作符 `EQUIV`；“小于或等于”操作符 `\"≤\"`。\n\n##\
    \ refresh\n\n*参见* `snapshot`.\n\n## relation\n\n一个关系值（*参见* `relation value`）。*注意*：众所周知，该术语也常用于指代关系变量，但此用法因引起诸多混淆而被弃用。"
  raw: '( *t2* WHERE #_HEAVIER < 3 ) AS *t3* :


    **t3* { P#, PNAME, WEIGHT, COLOR, CITY }


    Using the RANK shorthand, q.v., we can express this query a little more succinctly
    thus:


    ( ( RANK P BY ( DESC WEIGHT AS W ) ) WHERE W ≤ 3 )


    { P#, PNAME, WEIGHT, COLOR, CITY }


    Note that the cardinality of the result of a given quota query might not be exactly
    equal to the specified quota; in fact, it might be either less than or greater
    than that quota, depending on the query itself and also on the relations involved
    in that query.


    **142**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00061.png)


    **R**


    **range** 1\. *See* function. 2\. *See* range variable.


    ****range variable** Relational calculus analog of a logic variable; in other
    words, a variable that “ranges over” some specified set of values—either the set
    of tuples in some relation (in tuple calculus) or the set of values of some type
    (in domain calculus)—and can appear either bound or free in relational calculus
    expressions.


    **Examples*: See the examples under domain calculus and tuple calculus.


    ****RANK** *See* ranking.


    ****ranking** Let *r* be a relation with no attribute called *X*. Then the ranking
    RANK *r* BY ( *item, . . ., item* AS *X*), where each *item* consists of either
    ASC


    (ascending) or DESC (descending) followed by an attribute reference identifying
    an attribute of *r* (and the overall sequence of items specifies major-to-minor
    ordering in the usual way), is a relation identical to *r* except that (a) it
    has an additional attribute *X* and (b) the *X* value in any given tuple of that
    result shows that tuple’s ranking position with respect to the specified ordering.


    **Example*: *See* quota query.


    ****read-only operator** A function; i.e., an operator that, when invoked, updates
    nothing (except possibly variables local to the implementation of the operator
    in question) but returns a value, of a type declared when the operator in question
    is defined. A read-only operator invocation thus denotes a value; i.e., it’s an
    expression—by definition, in fact, every expression is a read-only operator invocation
    ( *see* expression)—and it can appear wherever a literal of the appropriate type
    is allowed. In particular, it can be nested inside other expressions. *Note*:
    As mentioned elsewhere in this dictionary, certain SQL read-only operators in
    particular are “possibly nondeterministic,” meaning they’re not functions at all,
    technically **The Relational Database Dictionary, Extended Edition**


    **143**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00079.png)


    speaking. In truth, they really are functions; however, they’re ones that are
    deliberately underspecified and thus don’t behave like functions from the user’s
    point of view.


    **Example*: See the first example under argument.


    ****real relation** The value of a given real relvar at a given time.


    ****real relvar** A base relvar or a snapshot ( *contrast* virtual relvar).


    ****record** Term sometimes used to mean a row, in any of the possible senses
    of that term. All such uses are deprecated, however; the term is better reserved
    for an operating system or even physical level construct.


    ****recursive query** A relational expression—which by definition can be thought
    of as the invocation of some relation valued operator *Op*—whose evaluation involves
    further invocations of that same operator *Op*.


    **Example*: Here’s a recursive definition of an operator to compute the transitive
    closure, q.v., of a binary relation with attributes A and B, both of type P# (the
    code isn’t very efficient, but it can obviously be improved in a variety of ways):


    OPERATOR TRANCLO ( AB RELATION { A P#, B P# } )


    RETURNS RELATION { A P#, B P# } ;


    RETURN


    ( WITH ( AB UNION


    ( ( AB RENAME ( B AS C ) ) COMPOSE


    ( AB RENAME ( A AS C ) ) ) AS *ttt* :


    IF *ttt* = AB THEN *ttt* ELSE TRANCLO ( *ttt* ) END IF ) ;


    END OPERATOR ;


    Now the invocation TRANCLO( *r*), where *r* is a relation of the appropriate type,
    can be thought of as a recursive query, because its evaluation involves further
    invocations of TRANCLO itself (in general).


    ****144**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00122.png)


    **recursive relationship** A relationship (in the sense of the third definition
    of that term, q.v.) in which the two sets participating are one and the same.


    The term isn’t particularly apt, since there’s no recursion, as such, involved.


    ****reductio ad absurdum*** “Reduction to absurdity”; a method of proof, q.v.,
    that establishes something as true by showing that its negation leads to a contradiction.


    ****redundancy** A database displays redundancy if and only if it contains, directly
    or indirectly, two or more distinct representations of the same proposition. *See
    also* controlled redundancy.


    ****referenced key** *See* foreign key.


    ****referenced relvar** *See* foreign key.


    ****referenced** tuple *See* foreign key.


    ****referencing** The relational meaning of this term is as described under foreign
    key; it should not be confused with the operator of the same name—found in systems
    that support pointers but not in relational systems—that, given a variable *V,*
    returns a pointer to *V*. *Note*: Systems that support pointers usually support
    an operator called *dereferencing* as well, which, given a pointer *p,* returns
    the variable *V* that *p* points to.


    ****referencing relvar** *See* foreign key.


    ****referencing tuple** *See* foreign key.


    ****referential action** The action specification portion of a foreign key rule
    (e.g., “cascade,” in a DELETE rule); also used to mean the specified action as
    such.


    **referential constraint *See* foreign key.


    **referential cycle** A referential path, q.v., from some relvar to itself.


    Database designs involving such cycles are usually contraindicated.


    ****The Relational Database Dictionary, Extended Edition**


    **145**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00130.png)


    **referential integrity** Loosely, the rule that no referencing tuple is allowed
    to exist if the corresponding referenced tuple doesn’t exist. More precisely,
    let *FK* be some foreign key in some referencing relvar *R2*; let *K* be the corresponding
    key in the corresponding referenced relvar *R1*; and let *K''* be derived from
    *K* as explained under foreign key. Then the referential integrity rule requires
    there never to be a time at which there exists an *FK*


    value in *R2* that isn’t the *K''* value for some (necessarily unique) tuple in
    *R1*. *See also* foreign key; foreign key rule.


    ****referential path** Let relvars *Rz, Ry, Rx, . . ., Rb, Ra* be such that there
    exists a referential constraint from *Rz* to *Ry,* a referential constraint from
    *Ry* to *Rx,* . . . , and a referential constraint from *Rb* to *Ra*. Then the
    chain of such constraints from *Rz* to *Ra* constitutes a referential path from
    *Rz* to *Ra* (and the number of constraints in the chain is the length of the
    path).


    ****reflexivity** 1\. ( *Of a dyadic logical operator*) The dyadic logical operator
    *Op,* which we assume for definiteness is expressed in infix style, is reflexive
    if and only if, for all *x,* *x* *Op* *x* is true. 2\. ( *Of a binary relation*)
    The binary relation *r* is reflexive if and only if, for all *x,* the tuple <
    *x,x*> appears in *r*. 3\. ( *Of FDs*) *See* Armstrong’s inference rules. *Note*:
    The first two of these definitions are slightly simplified, in that they deliberately
    fail to specify the range of possible values for *x*.


    **Examples* ( *first definition only*): The logical operator EQUIV; the “less
    than or equals” operator “≤”.


    ****refresh** *See* snapshot.


    ****relation** A relation value, q.v. *Note*: As is well known, the term is also
    commonly used to refer to a relation variable, but this usage is deprecated as
    the source of much confusion.'
  trans: "\n# R\n\n## 范围（range）\n\n1.  *参见* `函数（function）`。\n2.  *参见* `范围变量（range\
    \ variable）`。\n\n## 范围变量（range variable）\n\n关系演算中逻辑变量的类似物；换言之，一个“取值范围”为某个特定值集的变量——在元组演算中是某个关系中的元组集合，在域演算中是某种类型的值集合——并且在关系演算表达式中既可以是绑定的也可以是自由的。\n\
    \n**示例**：*参见* `域演算（domain calculus）` 和 `元组演算（tuple calculus）` 下的示例。\n\n## 排名（RANK）\n\
    \n*参见* `排名运算（ranking）`。\n\n## 排名运算（ranking）\n\n设 *r* 是一个没有名为 *X* 属性的关系。那么排名运算\
    \ `RANK r BY ( item, . ., item AS X )`，其中每个 `item` 由 `ASC`（升序）或 `DESC`（降序）后跟一个标识\
    \ *r* 属性的属性引用组成（并且这些 `item` 的整体序列按常规方式指定了主排序到次排序），生成一个与 *r* 相同的关系，除了 (a) 它多了一个属性\
    \ *X* 以及 (b) 该结果中任何给定元组的 *X* 值显示了该元组相对于指定排序的排名位置。\n\n**示例**：*参见* `配额查询（quota query）`。\n\
    \n## 只读操作符（read-only operator）\n\n一个函数；即一个调用时不更新任何内容（除了可能更新该操作符实现内部的局部变量）但返回一个值的操作符，该值的类型在操作符定义时声明。因此，只读操作符调用表示一个值；即，它是一个表达式——事实上，根据定义，每个表达式都是一个只读操作符调用（*参见*\
    \ `表达式（expression）`）——并且它可以出现在任何允许相应类型字面量的地方。特别地，它可以嵌套在其他表达式中。*注意*：正如本词典其他地方提到的，某些\
    \ SQL 只读操作符是“可能非确定性的”，这意味着从技术上讲，它们根本不是函数。实际上，它们确实是函数；然而，它们是故意未充分指定的，因此从用户的角度来看，它们的行为不像函数。\n\
    \n**示例**：*参见* `参数（argument）` 下的第一个示例。\n\n## 实关系（real relation）\n\n给定实时点上一个真实关系变量的值。\n\
    \n## 实关系变量（real relvar）\n\n一个基本关系变量或一个快照（*对比* `虚拟关系变量（virtual relvar）`）。\n\n##\
    \ 记录（record）\n\n有时用来表示“行”的术语，具有该词的任何可能含义。然而，所有此类用法都被弃用；该术语最好保留给操作系统甚至物理级别的构造。\n\
    \n## 递归查询（recursive query）\n\n一个关系表达式——根据定义可以被视为某个关系值操作符 *Op* 的调用——其求值涉及对该同一操作符\
    \ *Op* 的进一步调用。\n\n**示例**：这里是一个计算具有属性 A 和 B（均为 `P#` 类型）的二元关系的传递闭包（*参见* `传递闭包（transitive\
    \ closure）`）的操作符的递归定义（代码效率不高，但显然可以通过多种方式改进）：\n```\nOPERATOR TRANCLO ( AB RELATION\
    \ { A P#, B P# } )\nRETURNS RELATION { A P#, B P# } ;\nRETURN\n( WITH ( AB UNION\n\
    ( ( AB RENAME ( B AS C ) ) COMPOSE\n( AB RENAME ( A AS C ) ) ) AS ttt :\nIF ttt\
    \ = AB THEN ttt ELSE TRANCLO ( ttt ) END IF ) ;\nEND OPERATOR ;\n```\n现在，`TRANCLO(\
    \ r )` 的调用（其中 *r* 是一个适当类型的关系）可以被认为是一个递归查询，因为它的求值涉及对 `TRANCLO` 本身的进一步调用（通常是这样）。\n\
    \n## 递归关系（recursive relationship）\n\n一种关系（取该词的第三种定义，*参见* `关系（relationship）`），其中参与的两个集合是同一个集合。这个术语并不是特别贴切，因为其中并不涉及递归。\n\
    \n## 归谬法（reductio ad absurdum）\n\n“归谬法”；一种证明方法（*参见* `证明（proof）`），通过证明某物的否定会导致矛盾来确立该物为真。\n\
    \n## 冗余（redundancy）\n\n一个数据库当且仅当它包含（直接或间接地）同一命题的两个或多个不同表示时，才显示出冗余。*另见* `受控冗余（controlled\
    \ redundancy）`。\n\n## 被引用键（referenced key）\n\n*参见* `外键（foreign key）`。\n\n## 被引用关系变量（referenced\
    \ relvar）\n\n*参见* `外键（foreign key）`。\n\n## 被引用元组（referenced tuple）\n\n*参见* `外键（foreign\
    \ key）`。\n\n## 引用（referencing）\n\n该术语的关系型含义如 `外键（foreign key）` 下所述；不应与同名操作符混淆——该操作符存在于支持指针但不支持关系模型的系统中——它给定一个变量\
    \ *V*，返回一个指向 *V* 的指针。*注意*：支持指针的系统通常也支持一个称为 `解引用（dereferencing）` 的操作符，它给定一个指针 *p*，返回\
    \ *p* 指向的变量 *V*。\n\n## 引用关系变量（referencing relvar）\n\n*参见* `外键（foreign key）`。\n\
    \n## 引用元组（referencing tuple）\n\n*参见* `外键（foreign key）`。\n\n## 引用操作（referential\
    \ action）\n\n外键规则的操作规范部分（例如，DELETE 规则中的“cascade”）；也用于指代指定的操作本身。\n\n## 引用约束（referential\
    \ constraint）\n\n*参见* `外键（foreign key）`。\n\n## 引用环（referential cycle）\n\n从某个关系变量到其自身的一条引用路径（*参见*\
    \ `引用路径（referential path）`）。涉及此类循环的数据库设计通常是不推荐的。\n\n## 引用完整性（referential integrity）\n\
    \n粗略地说，规则是：如果对应的被引用元组不存在，则不允许任何引用元组存在。更精确地说，设 *FK* 是某个引用关系变量 *R2* 中的某个外键；设 *K*\
    \ 是对应被引用关系变量 *R1* 中的对应键；并设 *K'* 是如 `外键（foreign key）` 下所述从 *K* 派生而来的值。那么，完整性规则要求不存在这样一个时刻：存在一个\
    \ *R2* 中的 *FK* 值，它不是 *R1* 中某个（必然是唯一的）元组的 *K'* 值。*另见* `外键（foreign key）`; `外键规则（foreign\
    \ key rule）`。\n\n## 引用路径（referential path）\n\n设关系变量 *Rz, Ry, Rx, ..., Rb, Ra*\
    \ 满足：存在一个从 *Rz* 到 *Ry* 的引用约束，一个从 *Ry* 到 *Rx* 的引用约束，...，以及一个从 *Rb* 到 *Ra* 的引用约束。那么，从\
    \ *Rz* 到 *Ra* 的这一系列约束构成了一条从 *Rz* 到 *Ra* 的引用路径（并且链中约束的数量是该路径的长度）。\n\n## 自反性（reflexivity）\n\
    \n1.  （*二元逻辑操作符的*）二元逻辑操作符 *Op*（为明确起见，我们假设它以中缀风格表示）是自反的，当且仅当，对于所有 *x*，`x Op x`\
    \ 为真。\n2.  （*二元关系的*）二元关系 *r* 是自反的，当且仅当，对于所有 *x*，元组 `<x, x>` 出现在 *r* 中。\n3.  （*函数依赖的*）*参见*\
    \ `阿姆斯特朗推理规则（Armstrong's inference rules）`。\n    *注意*：前两个定义略有简化，因为它们故意没有指定 *x*\
    \ 的可能值范围。\n\n    **示例**（*仅第一个定义*）：逻辑操作符 `EQUIV`；“小于或等于”操作符 `\"≤\"`。\n\n## 刷新（refresh）\n\
    \n*参见* `快照（snapshot）`。\n\n## 关系（relation）\n\n一个关系值（*参见* `关系值（relation value）`）。*注意*：众所周知，该术语也常用于指代关系变量，但此用法因引起诸多混淆而被弃用。\n"
- fmt: "## relation (mathematics)\n\n给定集合`s1, s2, . . ., sn`（它们不一定互不相同），`r`是这些集合上的一个关系，当且仅当`r`是一个`n`元组的集合，并且其中每个元组的第一个元素来自`s1`，第二个元素来自`s2`，以此类推。\n\
    \n（等价地，`r`是笛卡尔积`s1 × s2 × . . . × sn`的一个子集。）**146**\n\n**The Relational Database\
    \ Dictionary, Extended Edition**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00132.png)\n\n集合`si`是`r`的第`i`个域（`i` = 1, . . ., `n`）。\n\n注意：数学中的关系与关系模型中的对应概念之间存在几个重要的逻辑差异。以下列举其中一些：\n\
    \n*   数学关系的属性具有从左到右的顺序。\n*   实际上，数学关系充其量只有非常初步的属性概念。当然，除了按其序数位置命名外，它们的属性没有被命名。\n\
    *   因此，数学关系在关系模型的意义上，既没有真正意义上的标题（heading），也没有类型（type）。\n*   数学关系通常是二元的，或者偶尔是一元的。\n\
    *   相比之下，关系模型中的关系的度（degree）是`n`，其中`n`可以是任意非负整数。\n*   像`JOIN`、`EXTEND`这样的关系运算符最初是在关系模型的背景下专门定义的；数学的关系理论则很少包含此类运算符。\n\
    *   等等（以上并非详尽无遗的列表）。\n\n## relation assignment\n\n关系赋值（Relational assignment），参见（q.v.）。\n\
    \n## relation comparison\n\n关系比较（Relational comparison），参见（q.v.）。\n\n## relation\
    \ constant\n\n一个关系，特别是被命名的关系；不要与关系字面量（relation literal，参见 q.v.）混淆。\n\n示例：`TABLE_DEE`\
    \ 和 `TABLE_DUM`。\n\n注意：这两个关系常量很可能是内置的（假设它们至少被支持，这在当前产品中可能并非如此）。与此相反，下面这个是用户定义的：\n\
    \n```\nCONST STATES_OF_THE_USA =\nRELATION { TUPLE { STATE_NAME('Alabama') } ,\n\
    \           TUPLE { STATE_NAME('Alaska' ) } ,\n           ..............\n   \
    \        TUPLE { STATE_NAME('Wyoming') } } ;\n```\n\n**The Relational Database\
    \ Dictionary, Extended Edition**\n\n**147**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00209.png)\n\n## relation equality\n\n关系的相等性。关系`r1`和`r2`相等（即，关系比较`r1\
    \ = r2`的求值结果为`TRUE`），当且仅当`r1`和`r2`是完全相同的关系。\n\n## relation expression\n\n关系表达式（Relational\
    \ expression），参见（q.v.）。\n\n## relation literal\n\n表示关系的字面量；不要与关系常量（relation constant，参见\
    \ q.v.）混淆。\n\n示例：参见字面量（literal）下的示例。\n\n## relation inclusion\n\n关系包含（Relational\
    \ inclusion），参见（q.v.）。\n\n## relation predicate\n\n设`r`是一个关系。那么，`r`的关系谓词（relation\
    \ predicate）就是在某个特定上下文中代表用户所理解的`r`的含义的那个谓词。如果`r`的度是`n`，那么该谓词将是`n`元的（它为`r`的每个属性都有一个参数）。此外，在封闭世界假设（The\
    \ Closed World Assumption）下，`r`的主体将包含且仅包含那些对应于该谓词求值结果为`TRUE`的元组。\n\n示例：\n1.  设`r`是关系变量`S`在`{S#,\
    \ CITY}`上的投影（projection）。那么`r`的谓词是“存在一个名称`sn`和一个状态`st`，使得供应商`S#`已签约，其名为`sn`，状态为`st`，并且位于`CITY`”。注意，这个谓词是二元的，正如二元关系所预期的那样。\n\
    2.  考虑关系`r1`和`r2`，其中`r1`是`S{CITY}`的投影，`r2`是`P{CITY}`的投影。那么`r1`和`r2`完全有可能相等；尽管如此，它们具有不同的谓词，对应于它们各自的两个不同上下文（粗略地说，谓词分别是“存在一个位于`CITY`的供应商”和“存在一个存储在`CITY`的零件”）。\n\
    \n## relation schema / relation scheme\n\n研究文献中（尽管在商业实践中很少使用）常用来表示关系标题（relation\
    \ heading）的术语。\n\n## relation selector\n\n参见选择器（selector）。\n\n**148**\n\n**The\
    \ Relational Database Dictionary, Extended Edition**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00118.png)\n\n## relation type\n\n设`{ H }`是一个标题（heading）；那么`RELATION\
    \ { H }`是一个关系类型（relation type），它与`{ H }`具有相同的度和属性。\n\n示例：\n*   关系变量`S`的类型是：\n\
    \    ```\n    RELATION { S# S#, SNAME NAME,\n               STATUS INTEGER, CITY\
    \ CHAR }\n    ```\n*   以下类型（对应于关系变量`S`的某个特定投影）也是一个关系类型：\n    ```\n    RELATION\
    \ { CITY CHAR, SNAME NAME }\n    ```\n\n## relation type generator\n\n参见类型生成器（type\
    \ generator）。\n\n## relation type inference\n\n确定给定关系表达式所表示的值的类型的过程。注意，这个过程完全由定义各种关系运算结果类型的规则所指定。\n\
    \n## relation value\n\n粗略地说，是一个表（value）。更精确地说，设`RELATION { H }`是一个关系类型，并设`{ b\
    \ }`是一个类型为`TUPLE { H }`的元组集合。\n\n设`r`是`<{ H }, { b }>`这个序对。那么`r`就是一个关系值（relation\
    \ value，简称关系），其类型是`RELATION { H }`，具有标题`{ H }`和主体`{ b }`，并且与`{ H }`具有相同的度和属性，与`{\
    \ b }`具有相同的基数（cardinality）。\n\n对比：关系变量（relation variable）；关系变量（relvar）。\n\n注意：根据这个定义，一个关系并不真正包含元组（它包含一个主体，而该主体又包含元组），但通常为了简化，会说成关系直接包含元组。另请注意，关系模型中的关系与同名的数学构造在某些重要方面有所不同。特别是，数学中的关系通常没有命名的属性；相反，它们的属性是通过从左到右的序数位置来标识的。关于其他差异，参见关系（数学）（relation\
    \ (mathematics)）。\n\n**The Relational Database Dictionary, Extended Edition**\n\
    \n**149**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00109.png)\n\
    \n## relation valued attribute\n\n一种类型为某种关系类型的属性。此类属性的值是指定类型的关系（有时称为嵌套关系，因为它们“嵌套”在元组中——尤其是其他关系中的元组内）。\n\
    \n注意：如果一个关系变量具有关系值属性，这一事实本身并不构成对任何特定范式级别（甚至第一范式）的违反；然而，这种属性通常在基本关系变量（base relvar）中是不推荐的，因为它们必然暗示某种结构上的不对称性，从而在查询、约束和更新中也引发不对称性（和复杂性）。另见分组（grouping）；去分组（ungrouping）。\n\
    \n## relation variable\n\n粗略地说，是一个表（variable）；更精确地说，是一个类型为某种关系类型的变量。设关系变量`R`的类型是`RELATION\
    \ { H }`；那么`R`具有与该类型相同的标题（因此也具有相同的属性）和度。设在某个给定时间`R`的值是`r`；那么在该时间`R`具有与`r`相同的主体和基数。注意，关系变量*不是*一组元组变量（tuple\
    \ variable）（甚至不是一组相同类型的元组变量）。\n\n对比：关系（relation）；关系值（relation value）。\n\n## relational\
    \ algebra\n\n一个开放的关系运算符集合，每个运算符接受一个或多个关系作为操作数，并产生一个关系作为结果。具体包含哪些运算符有些随意，但整个集合被要求至少与关系演算（relational\
    \ calculus）一样强大，其意义是每一个关系演算表达式都语义等价于某个关系代数表达式。"
  raw: '****relation (mathematics)** Given sets *s1, s2, . . ., sn,* not necessarily
    distinct, *r* is a relation on those sets if and only if it’s a set of *n*-tuples
    each of which has its first element from *s1,* its second element from *s2,* and
    so on.


    (Equivalently, *r* is a subset of the Cartesian product *s1* × *s2* × . . . ×
    *sn*.) **146**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00132.png)


    Set *si* is the *i* th domain of *r* ( *i* = 1, . . ., *n*). *Note*: There are
    several important logical differences between relations in mathematics and their
    relational model counterparts. Here are some of them:


    Mathematical relations have a left-to-right ordering to their attributes.


    Actually, mathematical relations have, at best, only a very rudimentary concept
    of attributes anyway. Certainly their attributes aren’t named, other than by their
    ordinal position.


    As a consequence, mathematical relations don’t really have either a heading or
    a type in the relational model sense.


    Mathematical relations are usually either binary or, just occasionally, unary.


    By contrast, relations in the relational model are of degree *n,* where *n* can
    be any nonnegative integer.


    Relational operators such as JOIN, EXTEND, and the rest were first defined in
    the context of the relational model specifically; the mathematical theory of relations
    includes few such operators.


    And so on (the foregoing isn’t meant to be an exhaustive list).


    ****relation assignment** Relational assignment, q.v.


    ****relation comparison** Relational comparison, q.v.


    ****relation constant** A relation, especially one that’s named; not to be confused
    with a relation literal, q.v.


    **Examples*: TABLE_DEE and TABLE_DUM. *Note*: These two relation constants are
    probably built in (assuming they’re supported at all, that is, which in today’s
    products they’re probably not). Here by contrast is one that’s user defined:


    CONST STATES_OF_THE_USA


    RELATION { TUPLE { STATE NAME(''Alabama'') } ,


    TUPLE { STATE NAME(''Alaska'' ) } ,


    ..............


    TUPLE { STATE NAME(''Wyoming'') } } ;


    ****The Relational Database Dictionary, Extended Edition**


    **147**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00209.png)


    **relation equality** Equality of relations; relations *r1* and *r2* are equal
    (i.e., the relational comparison *r1* = *r2* evaluates to TRUE) if and only if
    *r1*


    and *r2* are the very same relation.


    ****relation expression** Relational expression, q.v.


    ****relation literal** A literal that denotes a relation; not to be confused with
    a relation constant, q.v.


    **Examples*: See the examples under literal.


    ****relation inclusion** Relational inclusion, q.v.


    ****relation predicate** Let *r* be a relation. Then the relation predicate for
    *r* is the predicate that represents the user-understood meaning of *r* in some
    particular context. If *r* is of degree *n,* that predicate will be *n*-adic (it
    will have a parameter for each attribute of *r*). Under The Closed World Assumption,
    moreover, the body of *r* will contain all and only those tuples that correspond
    to invocations of that predicate that evaluate to TRUE.


    **Examples*: 1\. Let *r* be the projection of the current value of relvar S on


    {S#,CITY}. Then the predicate for *r* is “There exists a name *sn* and a status
    *st* such that supplier S# is under contract, is named *sn,* has status *st,*
    and is located in CITY.” Note that this predicate is dyadic, as is to be expected
    for a binary relation. 2\. Consider the relations *r1* and *r2,* where *r1* is
    the projection S{CITY} and *r2* is the projection P{CITY}. Then it’s certainly
    possible for *r1* and *r2* to be equal; nevertheless, they have different predicates,
    corresponding to their two different contexts (loosely speaking, the predicates
    are “There exists a supplier located in CITY” and


    “There exists a part stored in CITY,” respectively).


    ****relation schema / relation scheme** Terms much used in the research literature
    (though very little in commercial practice) to mean a relation heading.


    **relation selector *See* selector.


    **148**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00118.png)


    **relation type** Let { *H*} be a heading; then RELATION { *H*} is a relation
    type with the same degree and attributes as { *H*}.


    **Examples*: The type of relvar S is


    RELATION { S# S#, SNAME NAME,


    STATUS INTEGER, CITY CHAR }


    The following (corresponding to a certain projection of relvar S) is also a relation
    type:


    RELATION { CITY CHAR, SNAME NAME }


    **relation type generator *See* type generator.


    **relation type inference** The process of determining the type of the value denoted
    by a given relational expression. Note that this process is completely specified
    by the rules defining the types of the results of the various relational operations,
    q.v.


    ****relation value** Loosely, a table (value). More precisely, let RELATION


    { *H*} be a relation type, and let { *b*} be a set of tuples of type TUPLE { *H*}.


    Let *r* be the pair <{ *H*},{ *b*}>. Then *r* is a relation value (relation for
    short) of type RELATION { *H*}, with heading { *H*} and body { *b*}, and the same
    degree and attributes as { *H*} and the same cardinality as { *b*}. *Contrast*
    relation variable; relvar. *Note*: It follows from this definition that a relation
    doesn’t really contain tuples (it contains a body, and that body in turn contains
    tuples), but it’s usual to talk as if relations contained tuples directly, for
    simplicity. Note too that relations in the relational model differ in certain
    important respects from the mathematical construct of the same name. In particular,
    relations in mathematics typically don’t have named attributes; instead, their
    attributes are identified by their ordinal position, left to right. For other
    differences, *see* relation (mathematics).


    ****The Relational Database Dictionary, Extended Edition**


    **149**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00109.png)


    **relation valued attribute** An attribute whose type is some relation type.


    Values of such an attribute are relations of the specified type (sometimes called
    nested relations, since they’re “nested” inside tuples—especially tuples in some
    other relation). *Note*: If a relvar has a relation valued attribute, that fact
    in and of itself doesn’t constitute a violation of any particular level of normalization
    (not even first); however, such attributes are usually contraindicated in base
    relvars, because they necessarily imply some structural asymmetry and thereby
    give rise to asymmetry (and complexity) in queries, constraints, and updates as
    well. *See also* grouping; ungrouping.


    ****relation variable** Loosely, a table (variable); more precisely, a variable
    whose type is some relation type. Let relation variable *R* be of type RELATION
    { *H*}; then *R* has the same heading (and therefore attributes) and degree as
    that type does. Let the value of *R* at some given time be *r*; then *R* has the
    same body and cardinality at that time as *r* does. Note that a relation variable
    is *not* the same thing as a set of tuple variables (not even a set of tuple variables
    all of the same type). *Contrast* relation; relation value.


    ****relational algebra** An open-ended collection of read-only operators on relations,
    each of which takes one or more relations as operands and produces a relation
    as a result. Exactly which operators are included is somewhat arbitrary, but the
    collection overall is required to be at least as powerful as relational calculus,
    in the sense that every relational calculus expression is semantically equivalent
    to some relational algebra expression.'
  trans: "\n## 关系（数学）\n\n给定集合`s1, s2, . . ., sn`（它们不一定互不相同），`r`是这些集合上的一个关系，当且仅当`r`是一个`n`元组的集合，并且其中每个元组的第一个元素来自`s1`，第二个元素来自`s2`，以此类推。\n\
    \n（等价地，`r`是笛卡尔积`s1 × s2 × . . . × sn`的一个子集。）**146**\n\n**《关系数据库词典，扩展版》**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00132.png)\n\n集合`si`是`r`的第`i`个域（`i` = 1, . . ., `n`）。\n\n注意：数学中的关系与关系模型中的对应概念之间存在几个重要的逻辑差异。以下列举其中一些：\n\
    \n*   数学关系的属性具有从左到右的顺序。\n*   实际上，数学关系充其量只有非常初步的属性概念。当然，除了按其序数位置命名外，它们的属性没有被命名。\n\
    *   因此，数学关系在关系模型的意义上，既没有真正意义上的标题（heading），也没有类型（type）。\n*   数学关系通常是二元的，或者偶尔是一元的。\n\
    *   相比之下，关系模型中的关系的度（degree）是`n`，其中`n`可以是任意非负整数。\n*   像`JOIN`、`EXTEND`这样的关系运算符最初是在关系模型的背景下专门定义的；数学的关系理论则很少包含此类运算符。\n\
    *   等等（以上并非详尽无遗的列表）。\n\n## 关系赋值\n\n关系赋值（Relational assignment），参见（q.v.）。\n\n##\
    \ 关系比较\n\n关系比较（Relational comparison），参见（q.v.）。\n\n## 关系常量\n\n一个关系，特别是被命名的关系；不要与关系字面量（relation\
    \ literal，参见 q.v.）混淆。\n\n示例：`TABLE_DEE` 和 `TABLE_DUM`。\n\n注意：这两个关系常量很可能是内置的（假设它们至少被支持，这在当前产品中可能并非如此）。与此相反，下面这个是用户定义的：\n\
    \n```\nCONST STATES_OF_THE_USA =\nRELATION { TUPLE { STATE_NAME('Alabama') } ,\n\
    \           TUPLE { STATE_NAME('Alaska' ) } ,\n           ..............\n   \
    \        TUPLE { STATE_NAME('Wyoming') } } ;\n```\n\n**《关系数据库词典，扩展版》**\n\n**147**\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00209.png)\n\n##\
    \ 关系相等性\n\n关系的相等性。关系`r1`和`r2`相等（即，关系比较`r1 = r2`的求值结果为`TRUE`），当且仅当`r1`和`r2`是完全相同的关系。\n\
    \n## 关系表达式\n\n关系表达式（Relational expression），参见（q.v.）。\n\n## 关系字面量\n\n表示关系的字面量；不要与关系常量（relation\
    \ constant，参见 q.v.）混淆。\n\n示例：参见字面量（literal）下的示例。\n\n## 关系包含\n\n关系包含（Relational\
    \ inclusion），参见（q.v.）。\n\n## 关系谓词\n\n设`r`是一个关系。那么，`r`的关系谓词（relation predicate）就是在某个特定上下文中代表用户所理解的`r`的含义的那个谓词。如果`r`的度是`n`，那么该谓词将是`n`元的（它为`r`的每个属性都有一个参数）。此外，在封闭世界假设（The\
    \ Closed World Assumption）下，`r`的主体将包含且仅包含那些对应于该谓词求值结果为`TRUE`的元组。\n\n示例：\n1.  设`r`是关系变量`S`在`{S#,\
    \ CITY}`上的投影（projection）。那么`r`的谓词是“存在一个名称`sn`和一个状态`st`，使得供应商`S#`已签约，其名为`sn`，状态为`st`，并且位于`CITY`”。注意，这个谓词是二元的，正如二元关系所预期的那样。\n\
    2.  考虑关系`r1`和`r2`，其中`r1`是`S{CITY}`的投影，`r2`是`P{CITY}`的投影。那么`r1`和`r2`完全有可能相等；尽管如此，它们具有不同的谓词，对应于它们各自的两个不同上下文（粗略地说，谓词分别是“存在一个位于`CITY`的供应商”和“存在一个存储在`CITY`的零件”）。\n\
    \n## 关系模式 / 关系方案\n\n研究文献中（尽管在商业实践中很少使用）常用来表示关系标题（relation heading）的术语。\n\n## 关系选择器\n\
    \n参见选择器（selector）。\n\n**148**\n\n**《关系数据库词典，扩展版》**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00118.png)\n\n## 关系类型\n\n设`{ H }`是一个标题（heading）；那么`RELATION { H }`是一个关系类型（relation\
    \ type），它与`{ H }`具有相同的度和属性。\n\n示例：\n*   关系变量`S`的类型是：\n    ```\n    RELATION {\
    \ S# S#, SNAME NAME,\n               STATUS INTEGER, CITY CHAR }\n    ```\n* \
    \  以下类型（对应于关系变量`S`的某个特定投影）也是一个关系类型：\n    ```\n    RELATION { CITY CHAR, SNAME\
    \ NAME }\n    ```\n\n## 关系类型生成器\n\n参见类型生成器（type generator）。\n\n## 关系类型推导\n\n确定给定关系表达式所表示的值的类型的过程。注意，这个过程完全由定义各种关系运算结果类型的规则所指定。\n\
    \n## 关系值\n\n粗略地说，是一个表（value）。更精确地说，设`RELATION { H }`是一个关系类型，并设`{ b }`是一个类型为`TUPLE\
    \ { H }`的元组集合。\n\n设`r`是`<{ H }, { b }>`这个序对。那么`r`就是一个关系值（relation value，简称关系），其类型是`RELATION\
    \ { H }`，具有标题`{ H }`和主体`{ b }`，并且与`{ H }`具有相同的度和属性，与`{ b }`具有相同的基数（cardinality）。\n\
    \n对比：关系变量（relation variable）；关系变量（relvar）。\n\n注意：根据这个定义，一个关系并不真正包含元组（它包含一个主体，而该主体又包含元组），但通常为了简化，会说成关系直接包含元组。另请注意，关系模型中的关系与同名的数学构造在某些重要方面有所不同。特别是，数学中的关系通常没有命名的属性；相反，它们的属性是通过从左到右的序数位置来标识的。关于其他差异，参见关系（数学）（relation\
    \ (mathematics)）。\n\n**《关系数据库词典，扩展版》**\n\n**149**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00109.png)\n\n## 关系值属性\n\n一种类型为某种关系类型的属性。此类属性的值是指定类型的关系（有时称为嵌套关系，因为它们“嵌套”在元组中——尤其是其他关系中的元组内）。\n\
    \n注意：如果一个关系变量具有关系值属性，这一事实本身并不构成对任何特定范式级别（甚至第一范式）的违反；然而，这种属性通常在基本关系变量（base relvar）中是不推荐的，因为它们必然暗示某种结构上的不对称性，从而在查询、约束和更新中也引发不对称性（和复杂性）。另见分组（grouping）；去分组（ungrouping）。\n\
    \n## 关系变量\n\n粗略地说，是一个表（variable）；更精确地说，是一个类型为某种关系类型的变量。设关系变量`R`的类型是`RELATION {\
    \ H }`；那么`R`具有与该类型相同的标题（因此也具有相同的属性）和度。设在某个给定时间`R`的值是`r`；那么在该时间`R`具有与`r`相同的主体和基数。注意，关系变量*不是*一组元组变量（tuple\
    \ variable）（甚至不是一组相同类型的元组变量）。\n\n对比：关系（relation）；关系值（relation value）。\n\n## 关系代数\n\
    \n一个开放的关系运算符集合，每个运算符接受一个或多个关系作为操作数，并产生一个关系作为结果。具体包含哪些运算符有些随意，但整个集合被要求至少与关系演算（relational\
    \ calculus）一样强大，其意义是每一个关系演算表达式都语义等价于某个关系代数表达式。\n"
- fmt: '# The Relational Database Dictionary, Extended Edition


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00009.png)


    Also, the operators are generic, in the sense that they apply to all possible
    relations (loosely speaking). *Note*: If we want relational algebra to be regarded
    as an algebra in the same sense that the algebra of sets, q.v., is so regarded—which
    presumably we do—then we ought really to include, in addition to the operators
    that produce a relation as a result, a `relational inclusion operator`, q.v. Note
    further that `relational assignment` is also a relational operator, but it isn’t
    a relational algebra operator because it isn’t read-only.


    ## relational assignment


    An operation that assigns a relation value to a `relation variable` (of the same
    type). *See* `assignment`.


    ## relational calculus


    An applied form of `predicate calculus`, tailored to operating on relations, with
    the property that every relational calculus expression is semantically equivalent
    to some relational algebra expression.


    *See also* `domain calculus`; `tuple calculus`.


    ## relational comparison


    A Boolean expression of the form (`exp1`) `theta` (`exp2`), where `exp1` and `exp2`
    are relational expressions of the same type `T` and `theta` is any comparison
    operator that makes sense for relations of type `T` (e.g., “=”, “≠”, “⊆”). *Note*:
    The parentheses surrounding `exp1` and `exp2` in the comparison might not be needed
    in practice.


    ## relational completeness


    A measure of the expressive power of a language; essentially, a language is relationally
    complete if and only if it’s at least as powerful as relational calculus, meaning
    that any relation definable by some relational calculus expression is also definable
    by some expression of the language in question.


    *Examples*: `Relational algebra` is relationally complete, because every relational
    calculus expression is semantically equivalent to some relational algebra expression.
    (In fact the converse is true as well; that is, every relational algebra expression
    is semantically equivalent to some relational calculus expression, at least with
    the algebra and calculus as usually defined.) For example, the relational calculus
    expression shown as an example under `tuple calculus` is semantically equivalent
    to the relational algebra expression:


    ```

    (S MATCHING SP){SNAME}

    ```


    It follows that in order to prove that a given language `L` is relationally complete,
    it suffices to prove that every relational algebra expression is semantically
    equivalent to some expression in `L`—which is often easier than proving that every
    relational calculus expression is semantically equivalent to some expression in
    `L`. `SQL`, for example, can be shown to be “almost” relationally complete in
    this way (“almost,” because `SQL` fails to support `TABLE_DEE` and `TABLE_DUM`).
    *Note*: In fact, `SQL` is “more than” relationally complete, in that its expressions
    permit the definition of many objects that aren’t relations at all. As this example
    suggests, being more than relationally complete isn’t necessarily a good thing.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00060.png)


    # **151**


    ## relational database


    A database that abides by `The Information Principle`. We assume throughout this
    dictionary that all databases are relational, barring explicit statements to the
    contrary. *Note*: `SQL` databases must be regarded as only approximately relational
    at best, since `SQL` involves so many departures from `The Information Principle`
    (including but not limited to the departures identified under `table`).


    ## relational DBMS


    A `DBMS` that manages relational databases (and no others); equivalently, a `DBMS`
    that implements the `relational model`. *Note*: `SQL DBMS`s must be regarded as
    only approximately relational at best, since `SQL` involves so many departures
    from the relational model (including but not limited to the departures identified
    under `table`).'
