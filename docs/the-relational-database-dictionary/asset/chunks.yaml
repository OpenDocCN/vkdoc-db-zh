- fmt: "**Example**: The tuple `<S1,Smith,20,London>` in the relation that’s the current\
    \ value of base relvar `S` represents the presumably true proposition\n\n“Supplier\
    \ `S1` is under contract, is named `Smith`, has status `20`, and is located in\
    \ `London`.”\n\n**axiom of extension**\nAn axiom of set theory, to the effect\
    \ that two sets are equal if and only if they have the same elements (in which\
    \ case they are in fact the same set).\n\n**The Relational Database Dictionary,\
    \ Extended Edition**\n\n**13**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00141.png)\n\n**B**\n\n**bag**\nVery loosely, a “set” that permits\
    \ duplicates; more precisely, a collection of objects, called elements, in which\
    \ the same element can appear any number of times. An example is the collection\
    \ `(y,y,x,z,y,z)`, which can equivalently be written as `(x,y,y,y,z,z)`, since\
    \ bags, like sets, have no ordering to their elements. The number of times a given\
    \ element appears in a given bag is the multiplicity (of that element with respect\
    \ to that bag).\n\nThe set theory operations of inclusion, union, intersection,\
    \ difference, and product (but not complement) can all be generalized to apply\
    \ to bags. First, inclusion: Let `b1` and `b2` be bags, and let element `x` appear\
    \ exactly `n1` times in `b1` and exactly `n2` times in `b2` (`n1` ≥ 0, `n2` ≥\
    \ 0). Then bag `b1` includes bag `b2` (`b1` ⊇ `b2`) if and only if `n1` ≥ `n2`\
    \ for all such elements `x`; further, `b2` is included in `b1` (`b2` ⊆ `b1`) if\
    \ and only if `b1` includes `b2`, and `b1` is equal to `b2` (`b1` = `b2`) if and\
    \ only if each includes the other. All of the terms associated with set inclusion\
    \ (superset, subset, and so on) have analogs in connection with bag inclusion\
    \ (superbag, subbag, and so on).\n\nNow let `Op` be union, intersection, or difference,\
    \ and let `b` be the bag obtained by applying `Op` to bags `b1` and `b2` (in that\
    \ order, in the case of difference), where as before element `x` appears exactly\
    \ `n1` times in `b1` and exactly `n2` times in `b2` (`n1` ≥ 0, `n2` ≥ 0). Then\
    \ element `x` appears exactly `n` times in `b`, where `n` is:\n`MAX(n1, n2)` if\
    \ `Op` is union\n`MIN(n1, n2)` if `Op` is intersection\n`MAX(n1 - n2, 0)` if `Op`\
    \ is difference\nIn no case does `b` contain any other elements.\n\nNow let elements\
    \ `x1` and `x2` appear exactly `n1` times in `b1` and exactly `n2` times in `b2`,\
    \ respectively (`n1` ≥ 0, `n2` ≥ 0), and let `b` be the product of `b1` and `b2`,\
    \ in that order. Then the pair `<x1, x2>` appears exactly `n1 * n2` times in `b`,\
    \ and `b` contains no other elements.\n\nFinally, there are two operations, union\
    \ plus and intersection star (also known by a variety of other names), that have\
    \ no counterpart in set theory.\n\nLet `b` be the bag obtained by applying one\
    \ of these operations to bags `b1` and `b2`, where once again element `x` appear\
    \ exactly `n1` times in `b1` and exactly `n2` times in `b2` (`n1` ≥ 0, `n2` ≥\
    \ 0). Then element `x` appears exactly `n` times in `b`, where `n` is:\n`n1 +\
    \ n2` if `Op` is union plus\n`n1 * n2` if `Op` is intersection star\n\n**Note**:\
    \ SQL supports union plus but not true bag union. It does not support intersection\
    \ star.\n\n**Examples**: Let `b1` and `b2` be the bags `(w,w,x,x,y)` and `(x,y,y,y,z,z)`,\
    \ respectively. Then the following expressions yield the indicated results:\n\n\
    ```\nb1 UNION b2 = (w,w,x,x,y,y,y,z,z)\nb1 INTERSECT b2 = (x,y)\nb1 MINUS b2 =\
    \ (w,w,x)\nb2 MINUS b1 = (y,y,z,z)\nb1 TIMES b2 = (<w,x>,<w,x>,<x,x>,<x,x>,<y,x>,\n\
    \                <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,\n                <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,\n\
    \                <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,\n                <w,z>,<w,z>,<x,z>,<x,z>,<y,z>,\n\
    \                <w,z>,<w,z>,<x,z>,<x,z>,<y,z>)\nb1 UNION+ b2 = (w,w,x,x,x,y,y,y,y,z,z)\n\
    b1 INTERSECT* b2 = (x,x,y,y,y)\n```\n\n**16**\n\n**The Relational Database Dictionary,\
    \ Extended Edition**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00182.png)\n\
    \n**bag inclusion**\n*See* bag.\n\n**bag membership** (Of an element)\nThe property\
    \ of appearing in some given bag; the operation of testing for that property.\
    \ Like set membership, q.v., bag membership is usually denoted by the symbol “∈”;\
    \ thus, the Boolean expression `x ∈ b` returns `TRUE` if and only if element `x`\
    \ does in fact appear at least once in bag `b`.\n\n**bag operator**\n*See* bag.\n\
    \n**base relation**\nThe value of a given base relvar at a given time. *Contrast*\
    \ derived relation.\n\n**Example**: The relations that are the values of relvars\
    \ `S`, `P`, and `SP` at any given time.\n\n**base relvar**\nA relvar not defined\
    \ in terms of others; that is, an independent relvar. *Contrast* derived relvar.\
    \ *Note*: It’s a popular misconception that base relvars are physically stored,\
    \ in the sense that they’re represented in storage by physical files and their\
    \ tuples and attributes are represented in storage by records and fields within\
    \ those files (*see* direct image). But the relational model deliberately has\
    \ nothing to say about physical storage; in particular, it categorically doesn’t\
    \ say that base relvars, as such, are physically stored—neither in the foregoing\
    \ sense, nor in any other. The only requirement is that there must be some defined\
    \ mapping from what’s physically stored to what’s perceived by the user (i.e.,\
    \ base relvars or derived relvars or a mixture of both) and vice versa.\n\n**Examples**:\
    \ Relvars `S`, `P`, and `SP`.\n\n**base table**\nSQL analog of either a base relation\
    \ or a base relvar, as the context demands. *See also* table.\n\n**BCNF**\nBoyce/Codd\
    \ normal form.\n\n**bi-implication**\nLogical equivalence.\n\n**BI-IMPLIES**\n\
    Same as `EQUIV`.\n\n**The Relational Database Dictionary, Extended Edition**\n\
    \n**17**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00006.png)\n\
    \n**bijection**\nA mapping, or function, from set `s1` to set `s2` such that each\
    \ element of `s2` is the image of exactly one element of `s1`; equivalently, a\
    \ mapping that is both an injection and a surjection (in other words, a one-to-one\
    \ correspondence, in the strict sense of that term, from `s1` to `s2`). Also known\
    \ as a bijective or “one-to-one onto” mapping. Note that if a given mapping is\
    \ bijective, then it has an inverse mapping that’s bijective as well.\n\n**Examples**:\
    \ The mapping from integers `x` to their successors `x + 1` is a bijection from\
    \ the set of all integers to itself. So is the inverse mapping from integers `x`\
    \ to their predecessors `x - 1`.\n\n**binary**\nOf degree two.\n\n**binding**\
    \ (Logic)\nConverting a free variable to a bound variable by means of quantification,\
    \ q.v.\n\n**body**\nA set of tuples all of the same type; especially, the set\
    \ of tuples appearing in a given relation, or in a given relvar at a given time.\
    \ Every subset of a body is itself a body.\n\n**Examples**: The set of tuples\
    \ appearing in relvar `S` at any given time; any subset of that set.\n\n**BOOLEAN**\n\
    A scalar data type—the only one required by the relational model—containing just\
    \ two values (two truth values, to be specific, denoted by the literals `TRUE`\
    \ and `FALSE`, respectively).\n\n**Boolean algebra**\n1.  (Simple case) The truth\
    \ values `TRUE` and `FALSE`, together with the logical operators `NOT`, `OR`,\
    \ and `AND`, q.v.\n2.  (General case) Let `s` be a set; let “≤” be a partial ordering,\
    \ q.v., on `s`; and let a monadic operator “¬” (complement) and distinct dyadic\
    \ operators “+”(addition) and “*” (multiplication) be defined on `s`, such that\
    \ (a) “¬” satisfies the closure and involution laws; (b) “+” and “*” satisfy the\
    \ closure, commutative, associative, distributive, idempotence, and absorption\
    \ laws (meaning, in the case of the distributive law in particular, that each\
    \ “+” and “*” distributes over the other); and (c) “¬”, “+”, and “*” together\
    \ satisfy De Morgan’s Laws. Let `s` also contain two elements `0` and `1`.\n\n\
    **18**\n\n**The Relational Database Dictionary, Extended Edition**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00153.png)"
