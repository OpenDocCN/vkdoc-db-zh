    ## ****proof**

    ( *Logic*) In general， a sequence of sentences in some logical system that together
    establish some sentence as a logical consequence of certain given sentences; if
    the given sentences are true， then the consequential sentence is also true. A
    direct proof is a sequence in which each sentence is either an axiom or can be
    deduced from previous sentences in the sequence by means of the rules of inference
    of the system; the final sentence is a theorem. An axiom is a theorem with a single-sentence
    direct proof. An indirect proof， also known as a *reductio ad absurdum* proof，
    is a sequence of sentences that together establish some sentence as a theorem
    by showing that its negation leads to a contradiction.


    ## ****propagating updates**

    *See* controlled redundancy.


    ## ****proper inclusion**

    Set `s1` properly includes set `s2` (“`s1` ⊃ `s2`”) if and only if it is a proper
    superset of `s2`; set `s2` is properly included in set `s1` (“`s2` ⊂ `s1`”) if
    and only if it is a proper subset of `s1`.


    ## ****proper subkey**

    A subkey that isn’t a key (i.e.， a proper subset of a key).


    ## ****proper subset**

    Set `s2` is a proper subset of set `s1` (“`s2` ⊂ `s1`”) if and only if it is a
    subset of `s1` and `s1` and `s2` are distinct.


    ## ****proper superkey**

    A superkey that isn’t a key (i.e.， a superkey that doesn’t have the irreducibility
    property); loosely， a proper superset of a key.


    ## ****proper superset**

    Set `s1` is a proper superset of set `s2` (“`s1` ⊃ `s2`”) if and only if it is
    a superset of `s2` and `s1` and `s2` are distinct.


    ## ****property**

    A thing belonging to another thing. *Note*: It’s frequently suggested that there
    should be a one-to-one correspondence between “properties of interest” and attributes
    in base relvars. The suggestion is hard to sustain， however， given that the term
    *properties of interest* has no precise definition. (Of course， the same is true
    of the term *property* itself， come to that.)


    ## ****proposition**

    A 0-place predicate; a predicate with no parameters (i.e.， no free variables);
    a declarative statement (in the sense of logic， not the programming language sense);
    hence， something that evaluates unequivocally to either TRUE or FALSE. *Note*:
    Strictly speaking， if `S` is a declarative statement， the corresponding proposition
    isn’t really `S` as such—rather， it’s the assertion made by `S`. For example，
    consider the statements “The sun is a star” and *“Le soleil est une étoile*.”
    Clearly， there are two distinct statements here; however， they both denote the
    same proposition. However， it’s usual to ignore this fine distinction in informal
    contexts (and sometimes in more formal contexts as well).


    **Examples*:

    1.  The sun is a star.

    2.  Neptune is a star.

    3.  All politicians are corrupt.

    4.  Supplier S1 is under contract， is named Smith， has status 20， and is located
    in Paris.

    5.  There exists a city `c` such that there exists a supplier number `s#` such
    that the supplier with supplier number `s#` is located in city `c`. Notice that
    there are two variables， `s#` and `c，` in this last example; however， the variables
    in question are bound， not free， and the example overall still evaluates unequivocally
    to either TRUE or FALSE (it’s either the case or not the case that at least one
    supplier is located in at least one city).

    6.  Let `p` be an arbitrary predicate. If every parameter of `p` is either quantified
    or replaced by some argument， then what results is a proposition. For example，
    given the predicate “The supplier with supplier number `s#` is named `sn，` has
    status `st，` and is located in city `sc，` ” the statement “There exists a city
    `sc` such that there exists a supplier number `s#` such that the supplier with
    supplier number `s#` is named Smith， has status 20， and is located in city `sc`”
    is a proposition.

    7.  By way of a counterexample， the expression “`x` > 0 OR TRUE” is not a proposition
    (because it involves a parameter， `x`)， even though it does evaluate unequivocally
    to TRUE. In other words， although propositions always evaluate unequivocally to
    either TRUE or FALSE， not everything that evaluates unequivocally to either TRUE
    or FALSE is a proposition. In fact， a useful informal test for checking whether
    some statement `S` is a proposition is the following: `S` is a proposition if
    and only if “`Is it the case that *S*?`” is a well formed question in natural
    language.


