    ****double arrow** *See* multivalued dependency.


    ****double underlining** A convention, illustrated in Figure 1, for marking attributes
    that participate in primary keys.


    ****DRC** Domain relational calculus.


    ****drop** *See* data definition operator.


    ****dual** 1\. ( *Logic*) The duals of AND, OR, TRUE, and FALSE are OR, AND, FALSE,
    and TRUE, respectively (NOT is its own dual). More generally, let *x* be a logical
    expression involving no connectives other than NOT, AND, and OR, and let *y* be
    obtained from *x* by replacing every occurrence of AND, OR, TRUE, and FALSE by
    its dual; then *x* and *y* are duals of each other. *Note*: Since every logical
    expression is equivalent to one involving no connectives other than NOT, AND,
    and OR, it follows that every logical expression has a dual. 2\. ( *Set theory*)
    The duals of intersection, union, the universal set, and the empty set are union,
    intersection, the empty set, and the universal set, respectively (complement is
    its own dual). More generally, let *x* be a set theory expression involving no
    operators other than complement, intersection, and union, and let *y* be obtained
    from *x* by replacing every occurrence of intersection, union, the universal set,
    and the empty set by its dual; then *x* and *y* are duals of each other. *Note*:
    Since every set theory expression is equivalent to one involving no operators
    other than complement, intersection, and union, it follows that every set theory
    expression has a dual. *See also* Duality Principle, The.


    ****52**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00101.png)


    **dual mode principle** The principle that any relational operation that can be
    invoked interactively can also be invoked from an application program.


    ***Duality Principle, The** 1\. ( *Logic*) Let *x* and *y* be logical expressions
    such that *x* is the dual of *y*; then *x* is a tautology if and only if *y* is
    a tautology.


    2\. ( *Set theory*) Let *x* and *y* be statements in set theory such that *x*
    is the dual of *y*; then *x* is a theorem if and only if *y* is a theorem.


    **Examples*: De Morgan’s Laws, q.v.


    ****DUM** TABLE_DUM.


    ****duplicate** Let *a1* and *a2* be appearances, q.v., in some context of values
    *v1*


    and *v2*, respectively. Then *a1* and *a2* are duplicates of each other if and
    only if *v1* and *v2* are equal (in other words, if and only if *v1* and *v2*
    are the very same value). Incidentally, it should be clear from this definition
    that the well known dictum to the effect that relations never contain duplicate
    tuples really means that no relation ever contains duplicate *appearances* of
    the *same* tuple—though we tend to stay with the less precise formulation in this
    dictionary for reasons of familiarity. Observe that since (a) relations never
    contain duplicate tuples and (b) every relational operation yields a relation,
    it follows that duplicate tuples (meaning, more precisely, redundant appearances
    of the same tuple) are eliminated, if necessary, whenever a relational operation
    is performed.


    **Examples* ( *duplicate elimination*): Given the sample values shown in Figure
    1, the projection on {CITY} of the current value of relvar S has cardinality three,
    not five; similarly, the union of the projections on


    {CITY} of the current values of relvars S and P has cardinality four, not eleven.
    (Of the most familiar relational operators, projection and union are the only
    ones for which duplicate elimination is a concern. For the others—restriction,
    join, and so on—it’s effectively a no op.)


