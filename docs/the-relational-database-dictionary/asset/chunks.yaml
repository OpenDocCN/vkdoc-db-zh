    ## 声明类型


    2\. （*对于变量或属性*）在声明该变量或属性时指定的类型。

    3\. （*对于只读运算符*）该运算符结果的类型，在声明该运算符时指定。

    4\. （*对于表达式*）表达式中涉及的最外层运算符的类型。

    *注*：如果不支持继承，术语*声明类型*可以安全地简化为*类型*。实际上，对于值来说，将其类型称为声明类型多少有点虚构的意味，因为值本身并非被声明出来的。然而，有时将值的类型视为其声明类型是很方便的（其效果是简化了某些其他定义）。


    ## 分解


    非损失分解（除非上下文另有要求）。


    ## 推理公理


    偶尔用来表示推理规则的术语。


    ## DEE


    `TABLE_DEE`。


    ## 默认值


    设 `A` 为关系变量 `R` 的一个属性。除非有显式的约束相反规定，则可以为 `A` 声明一个默认值（简称默认值）；该值，比如说 `a`，将在任何元组中，当该元组被输入到
    `R` 中时没有为 `A` 指定其他值的情况下，作为 `A` 的值出现。


    **示例**：假设关系变量 `S` 的属性 `STATUS` 的默认值为 10。


    那么，从语法上讲，以下 `INSERT` 可能是有效的：


    **关系数据库词典，扩展版**

    **43**

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    ![](img/00177.png)


    ```

    INSERT S RELATION { TUPLE { S# S#(''S6''),

    SNAME NAME(''Lopez''),

    CITY ''Madrid'' } } ;

    ```


    实际插入的关系将如下所示：


    ```

    RELATION { TUPLE { S# S#(''S6''),

    SNAME NAME(''Lopez''),

    STATUS 10,

    CITY ''Madrid'' } }

    ```


    *注*：前述示例中形如 `RELATION {TUPLE {. . .}}` 的两个表达式是关系选择器调用；每个都表示一个只包含一个元组（即基数为 1）的关系。*参见*
    选择器。


    ## 延迟检查


    在某个时间（通常是在提交时）检查完整性约束，该时间晚于执行可能导致该约束被违反的更新操作的时间。关系模型拒绝延迟检查，认为其存在逻辑缺陷。*对比* 立即检查。


    ## 延迟约束


    一种完整性约束，其检查被延迟（*参见* 延迟检查）。关系模型拒绝延迟约束，认为其存在逻辑缺陷。*对比* 立即约束。


    ## 度


    一个给定的标题、键、外键、元组、元组变量、关系或关系变量中属性的数量 `n`（`n` ≥ 0）。


    **示例**：关系变量 `S`、`P` 和 `SP` 的度分别为四、五和三；相应键的度分别为一、一和二。


    ## DELETE


    笼统地说，是一个从给定关系变量中移除给定元组集合的运算符。它是某个关系赋值的简写形式。


    **示例**：`DELETE` 语句


    ```

    DELETE S WHERE CITY = ''London'' ;

    ```


    是以下关系赋值的简写：


    **44**

    **关系数据库词典，扩展版**

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    ![](img/00041.png)


    ```

    S := S WHERE NOT ( CITY = ''London'' ) ;

    ```


    ## DELETE 规则


    一种外键规则（见该词条），指定当存在某个包含外键值（该值引用某个元组 `t1`）的元组 `t2`，并且——说的相当笼统（*参见* 元组级别）——元组 `t1`
    被删除时，DBMS 应采取的操作。


    ## 反规范化


    用一组关系变量 `R1, R2, . . ., Rn` 的连接 `R` 来替换它们，使得对于所有 `i`，`R` 在 `Ri` 属性上的投影保证等于 `Ri`（`i`
    = 1, 2, . . ., `n`）。反规范化通常出于性能原因而进行；然而，它具有增加冗余（见该词条）的效果，从而增加了（a）必须完成的完整性检查量，或（b）某些更新异常（见该词条）发生的可能性，或（c）两者。它也会增加某些查询的复杂性。

    *注*：从逻辑角度看，反规范化，至少降到 5NF 以下的级别，总是不可取的。然而，鉴于当今商业产品中发现的技术水平，有时它无法避免。


    **示例**：可应用于供应商-零件数据库的一个反规范化是，用关系变量 `S` 和 `SP` 的连接（假设为 `SSP`）来替换它们。然后可以通过在 `S`
    的属性和 `SP` 的属性上分别投影关系变量 `SSP` 来导出关系变量 `S` 和 `SP`。


    ## 依赖项 / 被依赖项


    在一个函数依赖（FD）中，右侧的属性集合。

    *对比* 决定因素。


    **示例**：在由关系变量 `SP` 所满足的 FD `{S#,P#} → {QTY}` 中，`{QTY}` 是依赖项，`{S#,P#}` 是决定因素。


    ## 依赖


    一个包含依赖（IND）、连接依赖（JD）、多值依赖（MVD）或（特别是）函数依赖（FD）。


    ## 依赖保持


    函数依赖保持（见该词条）。


    ## 依赖理论


    建立在关系模型之上的理论体系，可用于辅助逻辑数据库设计（尽管不仅限于此目的）。


    ## 解引用


    *参见* 引用。


    **关系数据库词典，扩展版**

    **45**

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    ![](img/00178.png)


    ## 导出关系


    笼统地说，是用其他关系定义的关系。更精确地说，设 `s` 为一个关系集合。那么关系 `r` 是从 `s` 中的关系导出的，当且仅当它本身不出现在 `s` 中，但可以通过某个关系表达式从
    `s` 中的关系得到。该表达式必须满足（a）每个关系操作数都是 `s` 中的一个关系或从 `s` 中的关系导出的关系，并且（b）每个关系运算都是本词典中定义的运算之一，`EXTEND`、`SUMMARIZE`
    以及只读的（“假设”）形式的 `UPDATE` 除外。*对比* 基关系。

    *注*：此定义中对合法运算符的限制目的是排除引入某种“全新的”关系（可以这么说）的可能性，而该关系无法从 `s` 中的关系导出。


    **示例**：考虑表达式 `S JOIN SP`。如果关系变量 `S` 和 `SP` 的当前值分别为 `s` 和 `sp`，则此表达式定义的导出关系就是 `s`
    和 `sp` 的连接。


    ## 导出关系变量


    通过某个关系表达式（特别是视图或快照，见该词条）用其他关系变量定义的关系变量。*对比* 基关系变量。


    **示例**：*参见* 快照；视图。


    ## 描述符


    一段元数据，描述例如一个关系变量、一个属性或一个约束。


    ## 指示符


    在谓词中用于指代某个特定对象（与参数相对）的表达式。例如，在谓词“关系变量 `S` 的基数为 `n`”中，表达式“关系变量 `S`”指代供应商关系变量的当前值所对应的关系（相比之下，`n`
    是一个参数）。


    ## 决定因素


    在一个函数依赖（FD）中，左侧的属性集合。*对比* 依赖项。


    **示例**：*参见* 依赖项。


    **46**

    **关系数据库词典，扩展版**

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    ![](img/00195.png)


    ## 差


    两个关系 `r1` 和 `r2`（按此顺序）的差，`r1 MINUS r2`，其中 `r1` 和 `r2` 是相同类型 `T` 的，结果是一个类型为 `T`
    的关系，其体是包含所有满足条件“`t` 出现在 `r1` 中且不出现在 `r2` 中”的元组 `t` 的集合。

