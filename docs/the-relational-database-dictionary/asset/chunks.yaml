- fmt: '### negation as failure

    The Closed World Assumption 的一个密切相关概念；粗略地说，它意味着如果一个给定的元组本应（至少在原理上）出现在某个查询的结果中但实际没有出现，则该元组所代表的命题为假。


    ### negative

    严格小于零。（表达式 `-0` 当然是合法的，但它并不表示一个负值；相反，它表示非负值 0。）


    ### nested relation

    *参见* relation valued attribute。


    ### NF²

    NF 平方；NFNF（“非第一范式”）的缩写。粗略地说，一个 NF² 关系变量是至少包含一个关系值属性的关系变量。


    然而，该术语已被弃用，因为它基于对第一范式概念有缺陷的理解。此外，NF² 概念通常被认为包含了对传统关系运算符的某些扩展，这些扩展不仅仅是简写形式，因此没有被包含（或不需要）在关系模型中。


    ### niladic

    （*指一个运算符*）没有操作数；即，其定义不涉及任何参数。*注意*：一个运算符在语法上可能看起来是 niladic 的，但由于其使用了可能被称为隐藏操作数的东西（例如系统时钟），它每次调用的效果可能并不限于相同。确实，这种“niladic”运算符——当然，无论如何它们并非真正的
    niladic——是常见的情况。


    **示例**：许多语言提供一个运算符来生成随机（或者更确切地说，“伪随机”）数。这样的运算符有效地拥有一个隐藏操作数：即前一次调用返回的随机数。


    ### noncommutative group

    *参见* group (mathematics)。


    ### nonkey attribute

    给定关系变量的一个属性，且该属性不属于该关系变量的任何键。


    ### nonloss decomposition

    用关系变量 *R* 的投影 *R1*、*R2*、……、*Rn* 来替换它，使得 (a) *R1*、*R2*、……、*Rn* 的连接保证等于 *R*，并且通常也使得
    (b) *R1*、*R2*、……、*Rn* 中的每一个对于提供该保证都是必需的（即这些投影中没有一个在连接中是冗余的）。请注意，对于任何给定的关系变量 *R*，一个总是可用的“无损分解”是“替换”
    *R* 为相应的恒等投影（identity projection，q.v.）。


    **示例**：一个可能应用于供应商-零件数据库的无损分解是，用其在 {S#,SNAME} 和 {S#,STATUS,CITY} 上的投影来替换关系变量 S。然后可以通过将这两个投影重新连接在一起来重构关系变量
    S。


    ### nonnegative

    大于或等于零。*对比* positive。


    ### nonscalar

    非标量的。关系模型中最重要的非标量结构是元组以及（尤其是）关系本身。


    ### nontrivial

    （*指一个 FD、JD 或 MVD*）非平凡的。*参见* trivial FD; trivial JD; trivial MVD。


    ### NOR

    在逻辑中，一种二元连接词（也称为 Peirce 箭头，通常写作向下的箭头 “↓”）；如果 *p* 和 *q* 是谓词，那么 ( *p*)↓( *q*) 也是一个谓词。令
    ( *ip*)↓( *iq*) 为该谓词的一次调用（其中 *ip* 和 *iq* 分别是 *p* 和 *q* 的调用）。那么该调用 ( *ip*)↓( *iq*)
    的求值结果为 TRUE 当且仅当 *ip* 和 *iq* 的求值结果均为 FALSE。（换句话说，( *p*)↓( *q*) 等价于 NOT(( *p*)
    OR ( *q*))。）*注意*：在表达式 ( *p*)↓( *q*) 中包围 *p* 和 *q* 的圆括号在实践中可能不需要。此外，按上述定义的 NOR
    是一个逻辑运算符；然而，代数 **A**（q.v.）包含一个名为 NOR 的运算符——根据定义——它是一个代数运算符（本质上是“并集的补集”，不过这里的“并集”指的不是关系运算符中的那个名字，而是该运算符的一种广义形式）。


    ### normal form

    1. （*通用*）规范形式。2. （*指一个关系变量*）*参见* first normal form; second normal form; 等等。*注意*：最重要的关系范式是
    BCNF 和 5NF（以及 6NF）；其他的主要是具有历史意义。


    ### normalization

    使用无损分解的原则，用某个关系变量的某些投影来替换给定的关系变量，使得这些投影的连接保证等于原始关系变量。因此，请注意，投影是分解运算符，而连接是重组运算符，这与规范化过程（通常按后者理解）相关。规范化的目标是减少冗余（q.v.），从而消除可能发生的某些更新异常（q.v.）。


    ### normalization principles

    一个不属于 5NF 的关系变量应被分解为一组 5NF 投影；原始关系变量应能通过将这些投影重新连接在一起来重构；分解过程应保持依赖关系；每个投影在重构过程中都应是必需的。


    ### normalized

    关系，因而也是关系变量的一种属性，根据该属性，所讨论的关系或关系变量中的每个元组对其每个属性都恰好包含一个（适当类型的）值。实际上，一个对其每个属性不包含恰好一个适当类型值的“元组”首先就不是一个元组；同样，一个包含这种“元组”的“关系”也不是关系，而其值是这种“关系”的“关系变量”也不是关系变量。换句话说，根据定义，所有关系，因而所有关系变量，都是规范化的。*注意*：关系变量尤其等价地被称为处于第一范式，1NF（q.v.）；也就是说，一个规范化的关系变量就是一个处于
    1NF 的关系变量，这意味着它只是一个关系变量。然而，术语 *normalized* 经常（尽管不准确地）被用来指代高于第一范式的某些范式（特别是 BCNF
    或 5NF）。


    ### normalized relvar

    一个关系变量。（根据定义，关系变量总是规范化的，其意义在于它们至少处于第一范式。）


    ### NOT

    *参见* negation。*注意*：按常规理解的 NOT 是一个逻辑运算符；然而，代数 **A**（q.v.）包含一个名为 NOT 的运算符——根据定义——它是一个代数运算符（本质上是“补集”）。


    ### NOT MATCHING

    *参见* semidifference。


    ### null

    一种在 SQL 中特别用于表示缺失信息（q.v.）的结构。*注意*：根据定义，null 不是值（它们有时被称为 *标记*）；因此，一个“包含 null”的“类型”不是类型，一个“包含
    null”的“元组”不是元组，一个“包含 null”的“关系”不是关系，一个包含 null 的“关系变量”也不是关系变量。进一步地，null 严重破坏了关系模型，因此本词典对于大多数与
    null 相关的概念几乎不予讨论。


    ### null set

    有时使用（非常不幸地！）表示空集的过时术语。


    ### nullary

    零度的。由于可能与 null（q.v.）混淆，该术语最好避免使用。


    ### nullary foreign key

    一个零度的外键。


    ### nullary heading

    空表头；即，零度的表头。


    ### nullary key

    一个空的键；即，一个零度的键。'
  raw: '****negation as failure** A concept closely related to The Closed World Assumption,
    q.v.; it means, loosely, that if a given tuple could appear in the result of a
    given query (at least in principle) but doesn’t, then the proposition represented
    by that tuple is false.


    ****negative** Strictly less than zero. (The expression -0 is legal, of course,
    but it doesn’t denote a negative value; rather, it denotes the nonnegative value
    0.)


    ****nested relation** *See* relation valued attribute.


    ****NF²** NF squared; short for NFNF (“non first normal form”). An NF²


    relvar is, loosely, a relvar with at least one relation valued attribute.


    The term is deprecated, however, because it’s based on a flawed **114**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00008.png)


    understanding of the concept of first normal form. Also, the NF² concept is usually
    taken to include certain extensions to the conventional relational operators,
    extensions that aren’t just shorthand and thus aren’t included (or needed) in
    the relational model.


    ****niladic** ( *Of an operator*) Having no operands; i.e., being defined in terms
    of no parameters. *Note*: An operator might appear to be niladic syntactically
    and yet not be limited to having the same effect on every invocation, owing to
    its use of what might be called hidden operands such as the system clock. Indeed,
    such “niladic” operators—which are, of course, not truly niladic anyway—are the
    normal case.


    **Example*: Many languages provide an operator for generating random (or, rather,
    “pseudorandom”) numbers. Such operators effectively have a hidden operand: namely,
    the random number returned on the previous invocation.


    ****noncommutative group** *See* group (mathematics).


    ****nonkey attribute** An attribute of a given relvar that isn’t part of any key
    of that relvar.


    ****nonloss decomposition** Replacing a relvar *R* by its projections *R1,* *R2,
    . . ., Rn,* such that (a) the join of *R1, R2, . . ., Rn* is guaranteed to be
    equal to *R,* and usually also such that (b) each of *R1, R2, . . ., Rn* is needed
    in order to provide that guarantee (i.e., none of those projections is redundant
    in the join). Note that one “nonloss decomposition” that’s always available for
    any given relvar *R* is to “replace” *R* by the corresponding identity projection,
    q.v.


    **Example*: A nonloss decomposition that might be applied to the suppliers-and-parts
    database would be to replace relvar S by its projections on


    {S#,SNAME} and {S#,STATUS,CITY}. Relvar S could then be


    reconstructed by joining those two projections back together again.


    ****nonnegative** Greater than or equal to zero. *Contrast* positive.


    ****The Relational Database Dictionary, Extended Edition**


    **115**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00015.png)


    **nonscalar** Not scalar. The most important nonscalar constructs in the relational
    model are tuples and (especially) relations themselves.


    ****nontrivial** ( *Of an FD, JD, or MVD*) Not trivial. *See* trivial FD; trivial
    JD; trivial MVD.


    ****NOR** In logic, a dyadic connective (also known as the Peirce arrow and usually
    written as a down arrow, “↓”); if *p* and *q* are predicates, then ( *p*)↓( *q*)
    is a predicate also. Let ( *ip*)↓( *iq*) be an invocation of that predicate (where
    *ip* and *iq* are invocations of *p* and *q,* respectively). Then that invocation
    ( *ip*)↓( *iq*) evaluates to TRUE if and only if *ip* and *iq* both evaluate to
    FALSE. (In other words, ( *p*)↓( *q*) is equivalent to NOT(( *p*) OR


    ( *q*)).) *Note*: The parentheses enclosing *p* and *q* in the expression ( *p*)↓(
    *q*) might not be needed in practice. Also, NOR as just defined is a logical operator;
    however, the algebra **A**, q.v., includes an operator called NOR


    that—by definition—is an algebraic operator instead (it’s basically


    “complement of union,” though “union” here refers not to the relational operator
    of that name but to a generalized form of that operator).


    ****normal form** 1\. ( *General*) Canonical form. 2\. ( *Of a relvar*) *See*
    first normal form; second normal form; and so on. *Note*: The most important relational
    normal forms are BCNF and 5NF (and 6NF); the others are of mainly historical interest.


    ****normalization** Using the principles of nonloss decomposition to replace some
    given relvar by certain of its projections, such that the join of those projections
    is guaranteed to be equal to the original relvar. Observe, therefore, that projection
    is the decomposition operator, and join the recomposition operator, with respect
    to the normalization process (as this latter term is usually understood). The
    objective of normalization is to reduce redundancy, q.v., and thereby to eliminate
    certain update anomalies, q.v., that might otherwise occur.


    ****normalization principles** A relvar not in 5NF should be decomposed into a
    set of 5NF projections; the original relvar should be reconstructable by **116**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00045.png)


    joining those projections back together again; the decomposition process should
    preserve dependencies; every projection should be needed in the reconstruction
    process.


    ****normalized** That property of relations, and hence of relvars, according to
    which every tuple in the relation or relvar in question contains exactly one value
    (of the appropriate type) for each of its attributes. Actually, a “tuple”


    that didn’t contain exactly one value of the appropriate type for each of its
    attributes wouldn’t be a tuple in the first place; likewise, a “relation” that
    contained such a “tuple” wouldn’t be a relation, and a “relvar” whose value was
    such a “relation” wouldn’t be a relvar, either. In other words, it’s immediate
    from the definition that all relations, and hence all relvars, are normalized.
    *Note*: Relvars in particular are equivalently said to be in first normal form,
    1NF, q.v.; that is, a normalized relvar is just a relvar that’s in 1NF, which
    is to say it’s just a relvar. However, the term *normalized* is frequently, though
    inaccurately, used to refer to some normal form higher than just first (especially
    either BCNF or 5NF).


    ****normalized relvar** A relvar. (Relvars are always normalized by definition,
    in the sense that they’re in at least first normal form.)


    ****NOT** *See* negation. *Note*: NOT as conventionally understood is a logical
    operator; however, the algebra **A**, q.v., includes an operator called NOT


    that—by definition—is an algebraic operator instead (it’s basically


    “complement”).


    ****NOT MATCHING** *See* semidifference.


    ****The Relational Database Dictionary, Extended Edition**


    **117**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00075.png)


    **null** A construct, used in SQL in particular, for representing missing information,
    q.v. *Note*: By definition, nulls aren’t values (they’re sometimes said to be
    *marks*); it follows that a “type” that “contains a null”


    isn’t a type, a “tuple” that “contains a null” isn’t a tuple, a “relation” that


    “contains a null” isn’t a relation, and a “relvar” that contains a null isn’t
    a relvar. It follows further that nulls do serious violence to the relational
    model, and this dictionary therefore has very little to say regarding most null-related
    concepts.


    ****null set** Deprecated term sometimes used (most unfortunately!) to mean the
    empty set.


    ****nullary** Of degree zero. The term is probably best avoided because of the
    potential confusion with null, q.v.


    ****nullary foreign key** A foreign key of degree zero.


    ****nullary heading** The empty heading; that is, the heading of degree zero.


    **nullary key** An empty key; that is, a key of degree zero.'
  trans: '

    ### 失败即否定

    这是“封闭世界假设”的一个密切相关概念；粗略地说，它意味着如果一个给定的元组本应（至少在原理上）出现在某个查询的结果中但实际没有出现，则该元组所代表的命题为假。


    ### 负的

    严格小于零。（表达式 `-0` 当然是合法的，但它并不表示一个负值；相反，它表示非负值 0。）


    ### 嵌套关系

    *参见* 关系值属性。


    ### NF²

    NF 平方；NFNF（“非第一范式”）的缩写。粗略地说，一个 NF² 关系变量是至少包含一个关系值属性的关系变量。


    然而，该术语已被弃用，因为它基于对第一范式概念有缺陷的理解。此外，NF² 概念通常被认为包含了对传统关系运算符的某些扩展，这些扩展不仅仅是简写形式，因此没有被包含（或不需要）在关系模型中。


    ### 零元

    （*指一个运算符*）没有操作数；即，其定义不涉及任何参数。*注意*：一个运算符在语法上可能看起来是零元的，但由于其使用了可能被称为隐藏操作数的东西（例如系统时钟），它每次调用的效果可能并不限于相同。确实，这种“零元”运算符——当然，无论如何它们并非真正的零元——是常见的情况。


    **示例**：许多语言提供一个运算符来生成随机（或者更确切地说，“伪随机”）数。这样的运算符有效地拥有一个隐藏操作数：即前一次调用返回的随机数。


    ### 非交换群

    *参见* 群（数学）。


    ### 非键属性

    给定关系变量的一个属性，且该属性不属于该关系变量的任何键。


    ### 无损分解

    用关系变量 *R* 的投影 *R1*、*R2*、……、*Rn* 来替换它，使得 (a) *R1*、*R2*、……、*Rn* 的连接保证等于 *R*，并且通常也使得
    (b) *R1*、*R2*、……、*Rn* 中的每一个对于提供该保证都是必需的（即这些投影中没有一个在连接中是冗余的）。请注意，对于任何给定的关系变量 *R*，一个总是可用的“无损分解”是“替换”
    *R* 为相应的恒等投影（恒等投影，q.v.）。


    **示例**：一个可能应用于供应商-零件数据库的无损分解是，用其在 {供应商号, 供应商名} 和 {供应商号, 状态, 城市} 上的投影来替换关系变量 S。然后可以通过将这两个投影重新连接在一起来重构关系变量
    S。


    ### 非负的

    大于或等于零。*对比* 正的。


    ### 非标量

    非标量的。关系模型中最重要的非标量结构是元组以及（尤其是）关系本身。


    ### 非平凡的

    （*指一个 FD、JD 或 MVD*）非平凡的。*参见* 平凡 FD; 平凡 JD; 平凡 MVD。


    ### 或非

    在逻辑中，一种二元连接词（也称为皮尔士箭头，通常写作向下的箭头 “↓”）；如果 *p* 和 *q* 是谓词，那么 ( *p*)↓( *q*) 也是一个谓词。令
    ( *ip*)↓( *iq*) 为该谓词的一次调用（其中 *ip* 和 *iq* 分别是 *p* 和 *q* 的调用）。那么该调用 ( *ip*)↓( *iq*)
    的求值结果为 TRUE 当且仅当 *ip* 和 *iq* 的求值结果均为 FALSE。（换句话说，( *p*)↓( *q*) 等价于 NOT(( *p*)
    OR ( *q*))。）*注意*：在表达式 ( *p*)↓( *q*) 中包围 *p* 和 *q* 的圆括号在实践中可能不需要。此外，按上述定义的“或非”是一个逻辑运算符；然而，代数
    **A**（q.v.）包含一个名为“或非”的运算符——根据定义——它是一个代数运算符（本质上是“并集的补集”，不过这里的“并集”指的不是关系运算符中的那个名字，而是该运算符的一种广义形式）。


    ### 范式

    1. （*通用*）规范形式。2. （*指一个关系变量*）*参见* 第一范式；第二范式；等等。*注意*：最重要的关系范式是 BCNF 和 5NF（以及 6NF）；其他的主要是具有历史意义。


    ### 规范化

    使用无损分解的原则，用某个关系变量的某些投影来替换给定的关系变量，使得这些投影的连接保证等于原始关系变量。因此，请注意，投影是分解运算符，而连接是重组运算符，这与规范化过程（通常按后者理解）相关。规范化的目标是减少冗余（q.v.），从而消除可能发生的某些更新异常（q.v.）。


    ### 规范化原则

    一个不属于 5NF 的关系变量应被分解为一组 5NF 投影；原始关系变量应能通过将这些投影重新连接在一起来重构；分解过程应保持依赖关系；每个投影在重构过程中都应是必需的。


    ### 规范化的

    关系，因而也是关系变量的一种属性，根据该属性，所讨论的关系或关系变量中的每个元组对其每个属性都恰好包含一个（适当类型的）值。实际上，一个对其每个属性不包含恰好一个适当类型值的“元组”首先就不是一个元组；同样，一个包含这种“元组”的“关系”也不是关系，而其值是这种“关系”的“关系变量”也不是关系变量。换句话说，根据定义，所有关系，因而所有关系变量，都是规范化的。*注意*：关系变量尤其等价地被称为处于第一范式，1NF（q.v.）；也就是说，一个规范化的关系变量就是一个处于
    1NF 的关系变量，这意味着它只是一个关系变量。然而，术语 *规范化的* 经常（尽管不准确地）被用来指代高于第一范式的某些范式（特别是 BCNF 或 5NF）。


    ### 规范化的关系变量

    一个关系变量。（根据定义，关系变量总是规范化的，其意义在于它们至少处于第一范式。）


    ### 非

    *参见* 否定。*注意*：按常规理解的“非”是一个逻辑运算符；然而，代数 **A**（q.v.）包含一个名为“非”的运算符——根据定义——它是一个代数运算符（本质上是“补集”）。


    ### 不匹配

    *参见* 半差。


    ### 空值

    一种在 SQL 中特别用于表示缺失信息（q.v.）的结构。*注意*：根据定义，空值不是值（它们有时被称为 *标记*）；因此，一个“包含空值”的“类型”不是类型，一个“包含空值”的“元组”不是元组，一个“包含空值”的“关系”不是关系，一个包含空值的“关系变量”也不是关系变量。进一步地，空值严重破坏了关系模型，因此本词典对于大多数与空值相关的概念几乎不予讨论。


    ### 空集

    有时使用（非常不幸地！）表示空集的过时术语。


    ### 零元的

    零度的。由于可能与空值（q.v.）混淆，该术语最好避免使用。


    ### 零元外键

    一个零度的外键。


    ### 零元表头

    空表头；即，零度的表头。


    ### 零元键

    一个空的键；即，一个零度的键。

    '
- fmt: '# nullary projection

    1.  (Of a relation) 给定关系`r`在无属性上的投影（即`r{}`）；如果`r`为空，则结果为`TABLE_DUM`，否则结果为`TABLE_DEE`。

    2.  (Of a tuple) 给定元组在无属性上的投影；结果始终是空元组。


    # nullary relation

    零度关系。恰好有两个这样的关系：`TABLE_DEE`和`TABLE_DUM`。


    # nullary tuple

    空元组；即零度元组。


    # nullology

    空集的研究。该术语与`null`无关。


    # nVL

    一种具有`n`个“真值”的逻辑；换句话说，是某个`n`≥2的`n`值逻辑。

    *注意*：如果`n` = 2，那些“真值”实际上是真值，我们可以去掉引号。


    # object

    一个事物。


    # object class

    参见`class`（第二个定义）。


    # object ID

    一个指针。


    # object modeling

    参见`semantic modeling`。


    # object oriented / object orientation

    倾向于事物的。


    # object/relational database

    关系数据库（参见`object/relational DBMS`）。


    # object/relational DBMS

    一种关系数据库管理系统。

    *注意*：实际上，提供“对象/关系”支持的商业数据库管理系统与不提供这种支持的主要区别在于，前者允许用户定义自己的类型。但是一个真正的关系数据库管理系统也会这样做，因此不提供这种支持的数据库管理系统就不能合理地声称是完全关系的，即使它支持关系模型的其他方面。事实是，术语`object/relational`几乎只是一个营销标签，旨在掩盖早期“关系”产品不太关系的本质。因此有了当前的定义，即“对象/关系”仅仅意味着关系。


    # observer

    有时使用的术语（尤其在面向对象上下文中），指只读运算符。


    # one-to-many correspondence

    严格来说，一种配对两个集合`s1`和`s2`（`s1`和`s2`不一定不同）的规则，使得`s1`的每个元素对应`s2`的至少一个元素，且`s2`的每个元素对应`s1`的恰好一个元素；等价地，指该配对本身。

    然而，该术语常被宽松地使用，表示一种配对，其中：(a) `s1`的每个元素对应任意数量的`s2`元素（可能为零），且`s2`的每个元素对应`s1`的恰好一个元素；或
    (b) `s1`的每个元素对应`s2`的至少一个元素，且`s2`的每个元素对应`s1`的至多一个元素；或 (c) `s1`的每个元素对应任意数量的`s2`元素（可能为零），且`s2`的每个元素对应`s1`的至多一个元素。除非预期含义明确，否则最好避免使用该术语。

    **示例**（仅严格意义）：令`s1`为所有非负数的集合，`s2`为所有数的集合。那么，将非负数`x`与其平方根±√`x`配对，是从`s1`到`s2`的一个多对一对应。


    # one-to-one correspondence

    严格来说，一种配对两个集合`s1`和`s2`（`s1`和`s2`不一定不同）的规则，使得`s1`的每个元素对应`s2`的恰好一个元素，且`s2`的每个元素对应`s1`的恰好一个元素（换句话说，是一个双射）；等价地，指该配对本身。

    然而，该术语常被宽松地使用，表示一种配对，其中：(a) `s1`的每个元素对应至多一个`s2`元素，且`s2`的每个元素对应`s1`的恰好一个元素；或 (b)
    `s1`的每个元素对应恰好一个`s2`元素，且`s2`的每个元素对应`s1`的至多一个元素；或 (c) `s1`的每个元素对应至多一个`s2`元素，且`s2`的每个元素对应`s1`的至多一个元素。除非预期含义明确，否则最好避免使用该术语。

    **示例**（仅严格意义）：令`s`为所有整数的集合。那么，将元素`x`与其后继`x`+1配对，是从`s`到其自身的一一对应；将元素`x`与其前驱`x`-1配对也是一一对应。


    # onto

    （Of a function；用作形容词）值域等于陪域（与`into`对比）。参见`bijection`；`surjection`。


    # OO

    面向对象或面向对象，视上下文而定。


    # open WFF

    一个未封闭的WFF；即，表示非命题的谓词的WFF。


    # Open World Assumption, The

    宽泛地说，假设数据库陈述或隐含的一切为真，而其他一切未知。

    更精确地说，开放世界假设（OWA）——通常被拒绝，而倾向于封闭世界假设——指出：(a) 如果一个给定元组在给定时间出现在一个给定的关系变量中，则该元组所代表的命题在该时间为真；(b)
    如果一个给定元组在该时间可以出现在该关系变量中但没有出现，则该元组所代表的命题在该时间可能为真也可能为假。换句话说，在任何给定时间，该关系变量包含且仅包含那些已知对应于真命题的元组——即，在该时间已知求值为TRUE的关系变量谓词的调用或完全实例化。

    *注意*：所讨论的关系变量不必是基本关系变量，这就是为什么原始宽泛描述中出现“或隐含”这个短语。还要注意，该定义是用关系变量专门表述的，但一个精确类似的定义也适用于关系（参见`extension`，第三个定义）。最后注意，OWA被强烈反对，因为它似乎直接导致需要支持三值逻辑。


    # operand

    执行操作的对象。另见`argument`；`parameter`。


    # operation

    一个运算符；有时指调用运算符时执行的过程。


    # operator

    可以是只读运算符或更新运算符。

    *注意*：该术语常被更具体但有点宽松地用于特指只读运算符。它也常被更具体地用于指由特殊符号（如`/`）而非标识符（如`DIV`）表示的只读运算符，在这种情况下，其他只读运算符（即由标识符表示的）通常被称为函数。然而，后一种用法是误导性的，因此不推荐，因为严格来说，所有只读运算符都是函数。


    # optimization

    将关系表达式——实际上是查询、更新和约束——转换为“最佳可能”可执行代码的过程，其中“最佳可能”基本上意味着*性能最佳*。该术语有点夸大，因为很少能保证生成的可执行代码在任何意义上都是真正最优的。另见`database
    statistics`；`expression transformation`；`semantic optimization`。'
  raw: '****nullary projection** 1\. ( *Of a relation*) The projection of a given
    relation *r* on no attributes (i.e., *r*{}); the result is TABLE_DUM if *r* is
    empty and TABLE_DEE otherwise. 2\. ( *Of a tuple*) The projection of a given tuple
    on no attributes; the result is always the empty tuple.


    ****nullary relation** A relation of degree zero. There are exactly two such,
    TABLE_DEE and TABLE_DUM.


    ****nullary tuple** The empty tuple; i.e., the tuple of degree zero.


    ****nullology** The study of the empty set. The term has nothing to do with null,
    q.v.


    ****n*****VL** A logic with *n* “truth values”; in other words, *n*-valued logic
    for some *n* ≥ 2\. *Note*: If *n* = 2, those “truth values” really are truth values,
    and we can drop the quotation marks.


    **118**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00200.png)


    **O**


    **object** A thing.


    ****object class** *See* class (second definition).


    ****object ID** A pointer, q.v.


    ****object modeling** *See* semantic modeling.


    **object oriented / object orientation Leaning toward things.


    **object/relational database** A relational database ( *see* object/relational
    DBMS).


    ****object/relational DBMS** A relational DBMS. *Note*: In practice, the major
    distinction between commercial DBMSs that provide


    “object/relational” support and those that don’t is simply that the former allow
    users to define their own types. But a true relational DBMS does so too, and a
    DBMS that doesn’t provide such support thus can’t reasonably claim to be fully
    relational, even if it supports other aspects of the relational model. The fact
    is, the term *object/relational* is little more than a marketing label, dreamt
    up to conceal the fact that early “relational”


    products weren’t very relational at all. Hence the present definition, to the
    effect that “object/relational” just means relational.


    ****observer** Term sometimes used (especially in OO contexts) for a read-only
    operator.


    ****one-to-many correspondence** Strictly, a rule pairing two sets *s1* and *s2*


    ( *s1* and *s2* not necessarily distinct) such that each element of *s1*


    corresponds to at least one element of *s2* and each element of *s2*


    corresponds to exactly one element of *s1*; equivalently, that pairing itself.


    Often used loosely, however, to mean a pairing such that either (a) each element
    of *s1* corresponds to any number of elements of *s2* (possibly none at all) and
    each element of *s2* corresponds to exactly one element of *s1,* or **The Relational
    Database Dictionary, Extended Edition**


    **119**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00145.png)


    (b) each element of *s1* corresponds to at least one element of *s2* and each
    element of *s2* corresponds to at most one element of *s1,* or (c) each element
    of *s1* corresponds to any number of elements of *s2* (possibly none at all) and
    each element of *s2* corresponds to at most one element of *s1*. The term is best
    avoided unless the intended meaning is clear.


    **Example* ( *strict sense only*): Let *s1* and *s2* be the set of all nonnegative
    numbers and the set of all numbers, respectively. Then the pairing of nonnegative
    numbers *x* with their square roots ±√ *x* is a one-to-many correspondence from
    *s1* to *s2*.


    ****one-to-one correspon**dence Strictly, a rule pairing two sets *s1* and *s2*


    ( *s1* and *s2* not necessarily distinct) such that each element of *s1*


    corresponds to exactly one element of *s2* and each element of *s2*


    corresponds to exactly one element of *s1* (in other words, a bijection, q.v.);
    equivalently, that pairing itself. Often used loosely, however, to mean a pairing
    such that (a) each element of *s1* corresponds to at most one element of *s2*
    and each element of *s2* corresponds to exactly one element of *s1,* or (b) each
    element of *s1* corresponds to exactly one element of *s2* and each element of
    *s2* corresponds to at most one element of *s1,* or (c) each element of *s1* corresponds
    to at most one element of *s2* and each element of *s2*


    corresponds to at most one element of *s1*. The term is best avoided unless the
    intended meaning is clear.


    **Example* ( *strict sense only*): Let *s* be the set of all integers. Then the
    pairing of elements *x* with their successors *x*+1 is a one-to-one correspondence
    from *s* to itself; so too is the pairing of elements *x* with their predecessors
    *x*-1\.


    ****onto** ( *Of a function*; *used as an adjective*) Having range equal to the
    codomain ( *contrast* into). *See* bijection; surjection.


    ****OO** Object-oriented or object orientation, as the context demands.


    ****open WFF** A WFF that isn’t closed; that is, a WFF that denotes a predicate
    that isn’t a proposition.


    ****120**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00147.png)


    **Open World Assumption, The** Loosely, the assumption that everything stated
    or implied by the database is true and everything else is unknown.


    More precisely, The Open World Assumption (OWA)—usually rejected in favor of The
    Closed World Assumption, q.v.—states that (a) if a given tuple appears in a given
    relvar at a given time, then the proposition represented by that tuple is true
    at that time, and (b) if a given tuple could appear in that relvar at that time
    but doesn’t, then the proposition represented by that tuple might or might not
    be true at that time. At any given time, in other words, the relvar contains all
    and only those tuples that are known to correspond to true propositions—that is,
    invocations, or full instantiations, of the relvar predicate that are known to
    evaluate to TRUE—


    at that time. *Note*: The relvar in question doesn’t have to be a base relvar,
    which is why the phrase “or implied” appears in the original loose characterization.
    Note too that the definition is phrased in terms of a relvar specifically, but
    a precisely analogous definition applies to relations also ( *see* extension,
    third definition). Note finally that the OWA is strongly contraindicated, because
    it seems to lead directly to a need to support three-valued logic, q.v.


    ****operand** Something on which an operation is performed. *See also* argument;
    parameter.


    ****operation** An operator; sometimes, the process performed when an operator
    is invoked.


    ****operator** Either a read-only operator or an update operator. *Note*: The
    term is often used, more specifically but a trifle loosely, to mean a read-only
    operator in particular. It’s also often used even more specifically to mean a
    read-only operator that’s denoted by some special symbol such as


    “/” instead of by an identifier such as DIV, in which case other read-only operators
    (i.e., those denoted by identifiers) are typically referred to as functions. However,
    this latter usage is misleading, and hence deprecated, because all read-only operators
    are functions, strictly speaking.


    ****The Relational Database Dictionary, Extended Edition**


    **121**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00207.png)


    **optimization** The process of converting relational expressions—in effect, queries,
    updates, and constraints—into the “best possible” executable code, where “best
    possible” basically means *best performing*. The term is somewhat of an overclaim,
    since it can rarely be guaranteed that the executable code produced is truly optimal
    in any sense. *See also* database statistics; expression transformation; semantic
    optimization.'
  trans: '

    # 零元投影

    1.  （关系而言）给定关系`r`在无属性上的投影（即`r{}`）；如果`r`为空，则结果为`TABLE_DUM`，否则结果为`TABLE_DEE`。

    2.  （元组而言）给定元组在无属性上的投影；结果始终是空元组。


    # 零元关系

    零度关系。恰好有两个这样的关系：`TABLE_DEE`和`TABLE_DUM`。


    # 零元元组

    空元组；即零度元组。


    # 空学

    空集的研究。该术语与`null`无关。


    # nVL

    一种具有`n`个“真值”的逻辑；换句话说，是某个`n`≥2 的`n`值逻辑。

    *注意*：如果`n` = 2，那些“真值”实际上是真值，我们可以去掉引号。


    # 对象

    一个事物。


    # 对象类

    参见`class`（第二个定义）。


    # 对象 ID

    一个指针。


    # 对象建模

    参见`semantic modeling`。


    # 面向对象 / 对象取向

    倾向于事物的。


    # 对象/关系数据库

    关系数据库（参见`object/relational DBMS`）。


    # 对象/关系 DBMS

    一种关系数据库管理系统。

    *注意*：实际上，提供“对象/关系”支持的商业数据库管理系统与不提供这种支持的主要区别在于，前者允许用户定义自己的类型。但是一个真正的关系数据库管理系统也会这样做，因此不提供这种支持的数据库管理系统就不能合理地声称是完全关系的，即使它支持关系模型的其他方面。事实是，术语`object/relational`几乎只是一个营销标签，旨在掩盖早期“关系”产品不太关系的本质。因此有了当前的定义，即“对象/关系”仅仅意味着关系。


    # 观察者

    有时使用的术语（尤其在面向对象上下文中），指只读运算符。


    # 一对多对应

    严格来说，一种配对两个集合`s1`和`s2`（`s1`和`s2`不一定不同）的规则，使得`s1`的每个元素对应`s2`的至少一个元素，且`s2`的每个元素对应`s1`的恰好一个元素；等价地，指该配对本身。

    然而，该术语常被宽松地使用，表示一种配对，其中：(a) `s1`的每个元素对应任意数量的`s2`元素（可能为零），且`s2`的每个元素对应`s1`的恰好一个元素；或
    (b) `s1`的每个元素对应`s2`的至少一个元素，且`s2`的每个元素对应`s1`的至多一个元素；或 (c) `s1`的每个元素对应任意数量的`s2`元素（可能为零），且`s2`的每个元素对应`s1`的至多一个元素。除非预期含义明确，否则最好避免使用该术语。

    **示例**（仅严格意义）：令`s1`为所有非负数的集合，`s2`为所有数的集合。那么，将非负数`x`与其平方根±√`x`配对，是从`s1`到`s2`的一个多对一对应。


    # 一一对应

    严格来说，一种配对两个集合`s1`和`s2`（`s1`和`s2`不一定不同）的规则，使得`s1`的每个元素对应`s2`的恰好一个元素，且`s2`的每个元素对应`s1`的恰好一个元素（换句话说，是一个双射）；等价地，指该配对本身。

    然而，该术语常被宽松地使用，表示一种配对，其中：(a) `s1`的每个元素对应至多一个`s2`元素，且`s2`的每个元素对应`s1`的恰好一个元素；或 (b)
    `s1`的每个元素对应恰好一个`s2`元素，且`s2`的每个元素对应`s1`的至多一个元素；或 (c) `s1`的每个元素对应至多一个`s2`元素，且`s2`的每个元素对应`s1`的至多一个元素。除非预期含义明确，否则最好避免使用该术语。

    **示例**（仅严格意义）：令`s`为所有整数的集合。那么，将元素`x`与其后继`x`+1 配对，是从`s`到其自身的一一对应；将元素`x`与其前驱`x`-1
    配对也是一一对应。


    # 到上

    （函数而言；用作形容词）值域等于陪域（与`into`对比）。参见`bijection`；`surjection`。


    # OO

    面向对象或面向对象，视上下文而定。


    # 开放 WFF

    一个未封闭的 WFF；即，表示非命题的谓词的 WFF。


    # 开放世界假设

    宽泛地说，假设数据库陈述或隐含的一切为真，而其他一切未知。

    更精确地说，开放世界假设（OWA）——通常被拒绝，而倾向于封闭世界假设——指出：(a) 如果一个给定元组在给定时间出现在一个给定的关系变量中，则该元组所代表的命题在该时间为真；(b)
    如果一个给定元组在该时间可以出现在该关系变量中但没有出现，则该元组所代表的命题在该时间可能为真也可能为假。换句话说，在任何给定时间，该关系变量包含且仅包含那些已知对应于真命题的元组——即，在该时间已知求值为
    TRUE 的关系变量谓词的调用或完全实例化。

    *注意*：所讨论的关系变量不必是基本关系变量，这就是为什么原始宽泛描述中出现“或隐含”这个短语。还要注意，该定义是用关系变量专门表述的，但一个精确类似的定义也适用于关系（参见`extension`，第三个定义）。最后注意，OWA
    被强烈反对，因为它似乎直接导致需要支持三值逻辑。


    # 操作数

    执行操作的对象。另见`argument`；`parameter`。


    # 运算

    一个运算符；有时指调用运算符时执行的过程。


    # 运算符

    可以是只读运算符或更新运算符。

    *注意*：该术语常被更具体但有点宽松地用于特指只读运算符。它也常被更具体地用于指由特殊符号（如`/`）而非标识符（如`DIV`）表示的只读运算符，在这种情况下，其他只读运算符（即由标识符表示的）通常被称为函数。然而，后一种用法是误导性的，因此不推荐，因为严格来说，所有只读运算符都是函数。


    # 优化

    将关系表达式——实际上是查询、更新和约束——转换为“最佳可能”可执行代码的过程，其中“最佳可能”基本上意味着*性能最佳*。该术语有点夸大，因为很少能保证生成的可执行代码在任何意义上都是真正最优的。另见`database
    statistics`；`expression transformation`；`semantic optimization`。

