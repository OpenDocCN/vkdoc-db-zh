    which, given a set *s* of sentences of the system, all sentences implied by those
    in *s* can be derived using the rules of inference of that system (i.e., all tautologies
    are theorems). *Contrast* soundness.


    ****component** ( *Of a tuple*) *See* tuple component.


    **COMPOSE** *See* composition.


    ****The Relational Database Dictionary, Extended Edition**


    **31**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00098.png)


    **composite attribute / compound attribute** Deprecated terms for a combination
    of two or more attributes. The terms are deprecated because a


    “composite” or “compound” attribute isn’t actually an attribute at all.


    ****composite key / compound key** A key consisting of two or more attributes.


    **Example*: In the suppliers-and-parts database, SP is the only relvar with a
    composite key (namely, {S#,P#}).


    ****composite predicate / compound predicate** A predicate that involves at least
    one connective.


    ****composite proposition / compound proposition** A proposition that involves
    at least one connective.


    ****composite statement / compound statement** Syntactically, a statement that
    contains other statements nested inside itself.


    **Examples*: Conventional IF, DO, WHILE, CASE statements; BEGIN . . . END . .
    . statement blocks; multiple assignment statements; and many others.


    ****composition** 1\. ( *Dyadic case*) Let *r1* and *r2* be relations. Then the
    composition of *r1* and *r2,* *r1* COMPOSE *r2,* is shorthand for ( *r1* JOIN


    *r2*){ *X*}, where { *X*} is all of the attributes of *r1* and *r2* apart from
    common ones. 2\. ( *N-adic case*) Let *r1*, *r2*,..., *rn* ( *n* ≥ 0) be relations.
    Then the composition COMPOSE { *r1*, *r2*,..., *rn*} is shorthand for (JOIN


    { *r*, *r2*,..., *rn*}){ *X*}, where { *X*} is all of the attributes of *r* 1,
    *r* 2,..., *rn* apart from ones common to at least two of those relations. *See
    also* tuple composition.


    Example: *See* the example under recursive query.


    **32**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00201.png)


    **computational completeness** A language is computationally complete if and only
    if it supports the computation of all computable functions (where a computable
    function is a function that can be computed by a Turing machine in a finite number
    of steps).'
  trans: '

    级联删除操作就是一个典型例子。此类操作应以声明方式指明，并且用户通常应当知晓；也就是说，用户通常应知道他们的更新请求是否是某个更广泛操作集的简写，否则他们可能会察觉到看似违反了**赋值原理**（参见）。另请参见多变量赋值；设置层级。


    ### 补集

    设 `r` 是一个标题为 `{H}`、主体为 `{b}` 的关系。那么，`r` 的补集是唯一一个标题为 `{H}` 且主体由所有标题为 `{H}` 但未出现在
    `{b}` 中的元组组成的关系。


    ### 补集（集合论）

    一个集合 `s` 的补集——也称为**绝对补集**——是指所有不出现于 `s` 中的元素构成的集合。*注意*：集合 `s1` 与 `s2` 的差（按此顺序），有时被称为
    `s2` 相对于 `s1` 的**相对补集**（参见差集）；因此，`s` 的绝对补集实际上是 `s` 相对于全集（参见）的相对补集。另请参见布尔代数（第二个定义）。


    ### 互补性

    1.  （逻辑学）一个谓词与其否定的析取是一个**重言式**（参见）；一个谓词与其否定的合取是一个**矛盾式**（参见）。

    2.  （集合论）一个集合与其补集的并集等于**全集**（参见）；一个集合与其补集的交集等于**空集**（参见）。


    ### 完备性

    （不要与计算完备性、关系完备性或真值函数完备性（参见）混淆。）这是形式系统的一种性质，根据该性质，给定系统中一组句子 `s`，所有被 `s` 蕴含的句子都可以使用该系统的推理规则推导出来（即，所有重言式都是定理）。与可靠性相对。


    ### 分量（元组的）

    参见元组分量。


    ## 组合

    参见复合。


    ---


    **关系数据库词典，扩展版**


    **31**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00098.png)


    ### 复合属性 / 组合属性

    指两个或多个属性组合的弃用术语。这些术语被弃用，因为“复合”或“组合”属性实际上根本不是一个属性。


    ### 复合键 / 组合键

    由两个或多个属性组成的键。

    *示例*：在供应商-零件数据库中，`SP` 是唯一一个具有复合键（即 `{S#,P#}`）的关系变量。


    ### 复合谓词 / 组合谓词

    涉及至少一个连接词的谓词。


    ### 复合命题 / 组合命题

    涉及至少一个连接词的命题。


    ### 复合语句 / 组合语句

    在语法上，指内部嵌套了其他语句的语句。

    *示例*：传统的 `IF`、`DO`、`WHILE`、`CASE` 语句；`BEGIN . . . END . . .` 语句块；多变量赋值语句；以及许多其他语句。


    ### 复合

    1.  （二元情况）设 `r1` 和 `r2` 为关系。那么，`r1` 和 `r2` 的复合，记作 `r1 COMPOSE r2`，是 `(r1 JOIN
    r2){X}` 的简写，其中 `{X}` 是 `r1` 和 `r2` 除共有属性外的所有属性。

    2.  （N 元情况）设 `r1`, `r2`,..., `rn` (`n` ≥ 0) 为关系。那么，复合 `COMPOSE {r1, r2,..., rn}`
    是 `(JOIN {r1, r2,..., rn}){X}` 的简写，其中 `{X}` 是 `r1`, `r2`,..., `rn` 中除至少在两个关系中都有的属性外的所有属性。另请参见元组复合。


    *示例*：参见递归查询下的示例。


    **32**


    **关系数据库词典，扩展版**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00201.png)


    ### 计算完备性

    当且仅当一种语言支持计算所有可计算函数（其中，可计算函数是指图灵机能在有限步骤内计算的函数）时，该语言是计算完备的。

