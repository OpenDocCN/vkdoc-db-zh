    # S


    ## RM/V2

    科德在 1980 年代后期花费了大量时间修订和扩展他最初提出的关系模型（他称之为“关系模型第一版”或 `RM/V1`），以产出“关系模型第二版”或 `RM/V2`。然而，正如本词典引言所述，此处的定义旨在符合由《第三宣言》定义的关系模型；因此，它们并不总是与科德的
    `RM/V1` 或 `RM/V2` 定义一致。关于后两者的详细信息，请参阅科德的著作*数据库管理的关系模型第二版*（Addison-Wesley, 1990）。


    ## 行

    1.  根据上下文需求，对元组值或元组变量的 SQL 类比。

    2.  更一般地，指元组（例如在纸面上）的一种表示。*另见* 单元格；列；表。


    ## 行标识符

    一种实现结构（通常是但不一定是指针，参见 pointer）。然而，在一些商业产品中，此类标识符会暴露给用户——通常（且不幸的是）以违反“信息原理”或“可替换性原理”或两者兼有的方式。有时被不恰当地称为元组标识符。


    ## 推理规则

    *参见* 推理规则。


    ## RVA

    关系值属性。


    ## 安全表达式

    即使底层域是无限的，也能保证计算出有限结果的表达式。在实践中，会施加各种规则以确保不会出现不安全表达式。如果不加禁止，一个不安全表达式的例子是表示当前未出现在关系变量
    `S` 中的所有供应商元组的集合（换句话说，即请求关系变量 `S` 当前值的关系的补集）。*注*：显而易见，即使所有域实际上都是有限的（在真实系统中当然如此），通常也应当禁止不安全表达式。


    ## 标量

    1. （*对于类型、属性、值或变量*）指没有用户可见组成部分的。该术语也常专门用作*标量值*的缩写。

    2. （*对于运算符*）指返回标量结果的运算符。


    *注*：关系模型要求有标量类型、属性和值；标量变量不是必需的，但在外部环境中几乎肯定需要它们，以支持例如从某个关系的某个元组中检索某个标量属性的值。类似的说明也适用于标量运算符。还需注意，不存在“绝对标量性”（或有时所称的“绝对原子性”）这样的东西——这个概念必然是相对的。例如，一个电话号码既可以被看作一个“原子”（即标量）值，也可以被看作一个由国家代码、地区代码和本地号码组成的元组值（涉及电话号码的数据库设计应当能够支持这两种看法）。再考虑
    `TABLE_DUM` 的情况，它显然是一个关系，然而（像标量一样）没有用户可见的组成部分。


    ## 标量属性

    *参见* 标量。


    ## 标量类型

    *参见* 标量。


    ## 标量值

    *参见* 标量。


    ## 标量变量

    *参见* 标量。


    ## 第二大错误

    混合指针与关系。*参见* 指针。


    注意，犯下第一大错误似乎不可避免地会导致也犯下第二大错误；然而，有可能犯下第二大错误而不犯下第一大错误。


    ## 第二范式

    关系变量 `R` 处于第二范式（`2NF`），当且仅当 `R` 的每个非键属性 `A` 都满足集合 { `A` } 不可约地依赖于 `R` 的每个键；等价地说，当且仅当
    `R` 所满足的每个非平凡函数依赖 `A → B`，要么 (a) `A` 是超键或不是子键，要么 (b) `B` 是子键。每个 `2NF` 关系变量都处于
    `1NF`（实际上，每个关系变量都是）。*注*：虽然处于 `2NF` 显然并不排除也处于更高一级的范式（`3NF`），但 `2NF` 这个术语常被宽泛地用于指代处于
    `2NF` 但不处于 `3NF` 的关系变量。此外，第二范式本身已不再非常重要（`BCNF`、`5NF` 和 `6NF` 是具有最实际意义的范式）；我们在此提及它主要是出于历史原因。


    *示例*：正如在 Boyce/Codd 范式下所指出的，对于范式而言，展示一个反例通常比展示一个例子本身更具启发性。因此，假设关系变量 `SP` 有一个额外的属性
    `CITY`，代表相应供应商所在的城市。这个修订版的 `SP` 满足函数依赖 `{S#} → {CITY}`，因此不处于 `2NF`（因为 `CITY` 是非键属性，然而
    `{CITY}` 并不可约地依赖于键 `{S#,P#}`；等价地说，`{S#}` 不是超键，*是* 子键，而 `{CITY}` 不是子键）。


    ## 二阶逻辑

    谓词逻辑的一种形式，其中变量所取值的集合允许包含谓词。*对比* 一阶逻辑。


    *示例*：考虑众所周知的数学归纳法原理，为简单起见，此处限于其应用于唯一参数为非负整数类型的一元谓词 `p`。该原理可以用（有些生硬的）英语表述如下：对于所有这样的谓词
    `p`，如果 (a) `p(0)` 为真，并且 (b) 对于所有 `i`，如果 `p(i)` 为真则 `p(i+1)` 为真，那么 (c) 对于所有 `n`，`p(n)`
    为真。用符号表示：

    ```

    FORALL p ( ( p(0) AND FORALL i ( p(i) IMPLIES p(i+1) ) ) IMPLIES FORALL n ( p(n)
    ) )

    ```

    在这个例子中，变量 `i` 和 `n` 的取值范围是非负整数，但变量 `p` 的取值范围是谓词（具体来说，是唯一参数为非负整数类型的一元谓词）。因此，整个表达式是二阶的。


    ## SELECT 表达式

    在 SQL 中，大多数查询被表述为表达式，依次包含 `SELECT` 子句（带可选的 `DISTINCT` 规范）、`FROM` 子句、`WHERE` 子句、`GROUP
    BY` 子句和 `HAVING` 子句（后三个是可选的）。这些表达式通常被宽泛地称为 `SELECT - FROM - WHERE - GROUP BY -
    HAVING` 表达式，或更简单地称为 `SELECT - FROM - WHERE` 表达式，或者更简单地称为 `SELECT` 表达式。不幸的是，在本词典性质的文献中，无法给出这个
    SQL 结构的完整准确定义，部分原因是各子句之间的相互依赖关系；例如，`SELECT` 子句的语义取决于是否存在 `GROUP BY` 子句（以及其他因素）。但以下概念性算法大致描述了其整体语义：


    （`FROM`）形成 `FROM` 子句中指定表的笛卡尔积。

    （`WHERE`）丢弃该积中不满足 `WHERE` 子句中布尔表达式的行。

    （`GROUP BY`）根据 `GROUP BY` 子句中指定列的值，将剩余的行划分成分组。

    （`HAVING`）丢弃该划分中不满足 `HAVING` 子句中布尔表达式的组。

