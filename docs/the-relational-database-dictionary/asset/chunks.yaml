    **join dependency** A generalization of the concept of multivalued dependency
    (every multivalued dependency is a join dependency, but some join dependencies
    aren’t multivalued dependencies). A join dependency is an expression—actually
    a proposition—of the form 5{ *A1,A2,. . .,An*}, where *A1, A2, . . ., An* are
    all subsets of the heading of the same relvar *R,* and the expression overall
    is read as “star *A1, A2, . . ., An*.” Relvar *R*


    satisfies the join dependency (JD) 5{ *A1,A2,. . .,An*}—equivalently, that JD


    holds in relvar *R*—if and only if every relation that’s a legal value for *R*
    is equal to the join of its projections on *A1, A2, . . ., An*. *Note*: Join dependency
    is also known as join dependence. Observe that relvar *R* can’t possibly satisfy
    the JD 5{ *A1,A2,. . .,An*} unless the set theory union of *A1,* *A2, . . ., An*
    is equal to the heading of *R*. Observe further that it’s immediate from the definition
    that relvar *R* can be nonloss decomposed into its projections on *A1, A2, . .
    . , An* if and only if it satisfies the JD


    5{ *A1,A2,. . .,An*}. Note finally that from a formal point of view, a JD


    5{ *A1,A2,. . .,An*} is just a proposition that, by definition, can be either
    satisfied or not (i.e., can evaluate to either TRUE or FALSE); informally, however,
    it’s common to define 5{ *A1,A2,. . .,An*} to be a JD only if it’s actually satisfied
    by the pertinent relvar. But that definition leaves no way of saying that a given
    relvar fails to satisfy, or violates, some JD (because, by that definition, a
    JD that isn’t satisfied isn’t a JD!).


    **Example*: Relvar S satisfies the JD


    5 { { S#, SNAME }, { S#, STATUS }, { S#, CITY } }


    because every relation that’s a legal value for S is equal to the join of its
    projections on {S#,SNAME}, {S#,STATUS}, and {S#,CITY}; i.e., relvar S could be
    nonloss decomposed into those three projections. (Of course, there’s no requirement
    that this decomposition actually be performed—


    whether it should or not depends on whether there’s any advantage to be gained
    by doing so.)


