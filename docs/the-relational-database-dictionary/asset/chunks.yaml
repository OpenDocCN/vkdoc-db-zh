- fmt: "# algebra\n\n1.  Generically, a formal system consisting of a set of elements\
    \ and a set of read-only operators that together satisfy certain laws and properties\
    \ (certainly closure, probably commutativity and associativity, and so on); also\
    \ known as an algebraic structure or an abstract algebra. The word `algebra` itself\
    \ derives from Arabic `al-jebr,` meaning a resetting (of something broken) or\
    \ a combination. *See also* `Boolean algebra; field (mathematics); group (mathematics);\
    \ Laws of Algebra, The; relational algebra; ring (mathematics).`\n2.  Relational\
    \ algebra specifically (if the context demands).\n\n## algebra of sets\n\n*See*\
    \ `Boolean algebra` (second definition).\n\n## alias\n\nDeprecated term used in\
    \ some SQL products to mean either a tuple calculus range variable or the name\
    \ of such a variable. The term `table alias` (also deprecated) is also sometimes\
    \ used with the same meaning.\n\n## ALL BUT\n\n*See* `projection`.\n\n## ALPHA\n\
    \nA proposal, due to Codd, for a concrete relational language based on tuple calculus;\
    \ also known as Data Sublanguage ALPHA. ALPHA was never implemented, but its ideas\
    \ were influential on the design of several languages that were, including QBE,\
    \ QUEL, and (to a much lesser extent) SQL.\n\n**The Relational Database Dictionary,\
    \ Extended Edition**\n\n**5**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00001.png)\n\n## alternate key\n\nLoosely, a candidate key that isn’t\
    \ the primary key.\n\nMore precisely, let relvar `R` have keys `K1, K2, . . .\
    \ , Kn,` and let some `Ki` (`i = 1, 2, . . . , n`) be chosen as the primary key\
    \ for `R`; then each `Kj` (`j = 1, 2, . . . , n, j ≠ i`) is an alternate key for\
    \ `R`. The term isn’t much used.\n\n## AND\n\n*See* `conjunction`. *Note*: `AND`\
    \ as conventionally understood is a logical operator; however, the algebra `A`,\
    \ q.v., includes an operator it calls `AND` that—by definition—is an algebraic\
    \ operator (in fact, it’s just natural join).\n\n## antecedent\n\n*See* `implication`.\n\
    \n## antisymmetry\n\n*See* `partial ordering`. Note that there’s a logical difference\
    \ between `antisymmetry` and `asymmetry`; the former is as defined under `partial\
    \ ordering`, while the latter just means lack of symmetry.\n\n## appearance\n\n\
    *(Of a value*) An occurrence or \"instance\" of a value (in some context). Observe\
    \ that there’s a logical difference between a value as such and an appearance\
    \ of that value—for example, an appearance as the current value of some variable\
    \ or as an attribute value within the current value of some tuplevar or some relvar.\
    \ Each such appearance consists internally of some physical representation of\
    \ the value in question (and distinct appearances of the same value might have\
    \ distinct physical representations). Thus, there’s also a logical difference\
    \ between an appearance of a value, on the one hand, and the physical representation\
    \ of that appearance, on the other; there might even be a logical difference between\
    \ the physical representations used for distinct appearances of the same value.\
    \ All of that being said, however, it’s usual to abbreviate *physical representation\
    \ of an appearance of a value* to just *appearance of a value,* or (more often)\
    \ just *value,* so long as there’s no risk of ambiguity.\n\nNote that `appearance\
    \ of a value` is a model concept, whereas `physical representation of an appearance`\
    \ is an implementation concept—users certainly might need to know whether (for\
    \ example) two variables contain appearances of the same value, but they don’t\
    \ need to know whether those appearances use the same physical representation.\n\
    \n**Example**: Let `N1` and `N2` be variables of type `INTEGER`. After the following\
    \ assignments, then, `N1` and `N2` both contain an appearance of the integer value\
    \ `3`. The corresponding physical representations might or might not be the same\
    \ (for example, `N1` might use a base two representation and `N2` a base ten representation),\
    \ but it’s of no concern to the user either way.\n\n```sql\nN1 := 3 ;\nN2 := 3\
    \ ;\n```\n\n## application relvar\n\n*See* `relvar`.\n\n## argument\n\nAn actual\
    \ operand that replaces some parameter of some operator when that operator is\
    \ invoked. Note that there’s a logical difference between an argument per se and\
    \ the expression that denotes it (i.e., the argument expression). The argument\
    \ per se is either a value or a variable. If the pertinent parameter is subject\
    \ to update, then the argument is—in fact, must be—a variable, denoted by some\
    \ variable reference; otherwise it’s a value and can be denoted by an arbitrarily\
    \ complex expression (possibly just a variable reference). *Contrast* `parameter`.\n\
    \n**Examples**: Let operator `DOUBLE` be defined as follows:\n\n```sql\nOPERATOR\
    \ DOUBLE ( X INTEGER ) RETURNS INTEGER ;\n    RETURN ( 2 * X ) ;\nEND OPERATOR\
    \ ;\n```\n\n`X` here is a parameter, of declared type `INTEGER`. Let `N` be a\
    \ variable of type `INTEGER`. Then, e.g., `DOUBLE(N+1)` is an invocation of `DOUBLE`,\
    \ and the value of the expression `N+1` at the time of that invocation is an argument—in\
    \ fact, the sole argument—to that invocation. That invocation is itself an expression\
    \ in turn, and it can appear wherever an integer literal can appear (because operator\
    \ `DOUBLE` is defined to return a value of type `INTEGER`).\n\n**The Relational\
    \ Database Dictionary, Extended Edition**\n\n**7**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00139.png)\n\nSuppose now that `DOUBLE` is defined to be an update\
    \ operator instead of a read-only one:\n\n```sql\nOPERATOR DOUBLE ( X INTEGER\
    \ ) UPDATES { X } ;\n    X := 2 * X ;\nEND OPERATOR ;\n```\n\nNow the parameter\
    \ `X` is subject to update, and any argument corresponding to `X` must be a variable.\
    \ Thus, e.g., `DOUBLE(N)` is a valid invocation of `DOUBLE`, and the variable\
    \ `N`—not the value of that variable, observe—is the argument to that invocation.\
    \ (Note that, e.g., `DOUBLE(N+1)` would be a syntax error, because `N+1` isn’t\
    \ a variable reference.) However, that invocation `DOUBLE(N)` isn’t an expression,\
    \ and it can’t appear \"wherever an integer literal can appear\"; instead, it\
    \ can appear only in an explicit `CALL` statement (or equivalent), as here:\n\n\
    ```sql\nCALL DOUBLE ( N ) ;\n```\n\n## argument expression\n\nAn expression denoting\
    \ an argument, q.v.\n\n## arity\n\nDegree, q.v. The term isn’t much used.\n\n\
    ## Armstrong’s inference rules\n\n( *For FDs*) Let `A, B,` and `C` be subsets\
    \ of the heading of some relvar. Let `AC` denote the set theory union of `A` and\
    \ `B,` and similarly for `BC`. Then Armstrong’s rules (also known as Armstrong’s\
    \ axioms) state that (a) if `A` is a superset of `B,` then `A → B` (the reflexivity\
    \ rule); (b) if `A → B,` then `AC → BC` (the augmentation rule); and (c) if `A\
    \ → B` and `B → C,` then `A → C` (the transitivity rule). These rules are both\
    \ sound and complete ( *see* `completeness; soundness`).\n\n**Examples**: Let\
    \ `s` be a set of FDs, and let `s` contain the FD `A → BC`. Then the FD `A → B`\
    \ is implied by `s` and can easily be derived using Armstrong’s rules as follows:\
    \ (a) `A → BC` (given); (b) `BC → B` (reflexivity); hence (c) `A → B` (transitivity).\n\
    \nBy way of a second example, if the set `s` contains the FDs `A → B` and `C →\
    \ D,` then the FD `AX → BD` (where `X` is the set theory difference between `C`\
    \ and `B,` in that order) is implied by `s`. *Note*: This example, which is due\
    \ to Darwen, can be regarded as another inference rule. It has the interesting\
    \ property that the augmentation and transitivity rules, as well as several other\
    \ rules not discussed here, are all special cases.\n\n**The Relational Database\
    \ Dictionary, Extended Edition**\n\n**8**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00202.png)\n\n## arrow\n\n*See* `functional dependency`."
