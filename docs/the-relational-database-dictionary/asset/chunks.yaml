    *参见* 并。


    ## 并

    1.  （*二元情况*）两个关系 *r1* 和 *r2* 的并集，`r1 UNION r2`，其中 *r1* 和 *r2* 属于同一类型 *T*，结果是一个类型为
    *T* 的关系，其主体是所有元组 *t* 的集合，这些 *t* 出现在 *r1* 或 *r2* 或两者中。

    2.  （*N 元情况*）*n* 个关系 *r1, r2, ..., rn* (*n* ≥ 0) 的并集，`UNION`

    '
- fmt: '{ `r1,r2,. . .,rn`}，其中`r1, r2, . . ., rn`是相同类型`T`的所有关系，是一个类型为`T`的关系，其主体是所有元组`t`的集合，其中`t`至少出现在`r1,
    r2, . . ., rn`之一中。*注*：如果`n` = 0，(a) 需要某种未在此展示的语法机制来指定相关的类型`T`，且 (b) 结果是该类型的空关系。还需注意，关系并运算符在某些方面与数学或集合论中同名的运算符不同，参见q.v.
    *另见* disjoint union；tuple union。


    ### Example

    表达式`(S{CITY}) UNION (P{CITY})`表示关系变量S和P的当前值在`{CITY}`上的投影的并集。该并集是一个类型为`RELATION
    {CITY CHAR}`的关系。此外，如果关系变量S和P的当前值分别为`s`和`p`，该关系的主体由形式为`< c>`的所有元组组成，这些元组出现在`s`{CITY}或`p`{CITY}或两者中——意味着`c`是当前供应商城市或当前零件城市或两者兼是。


    ### union (bag theory)

    *参见* bag。


    ### union (set theory)

    出现在两个给定集合的任一个或两个中的所有元素的集合。*注*：此定义显然可以扩展适用于任意数量的集合。


    **union compatibility**

    （*关系*）属于相同类型。该术语因多种原因（其中之一是其不恰当性）已被弃用。


    ### union plus

    *参见* bag。


    ### UNIQUE

    关键字，有时用于表示量词“恰好存在一个”。


    ### Example

    这是外键约束“每个装运恰好对应一个供应商”的一个元组演算公式：

    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    CONSTRAINT SP_REFERENCES_S

    FORALL SPX ( UNIQUE SX ( SX.S# = SPX.S# ) ) ;

    ```


    ### unique index

    一个基于某个关系变量某个键的索引——因此是一种实现结构；不应与键本身混淆，即使该索引可能用于实现相应的键约束。


    ### universal quantifier

    令`p( x)`是一个带有参数`x`的谓词；那么`FORALL x ( p( x))`是一个谓词，它的意思是“对于所有可以替换参数`x`的参数`v`，`p(
    v`)为真。”在此例中，`FORALL x`是一个全称量词，`x`是一个全称量化约束变量，参见q.v.。


    *注*：一些作者单独将`FORALL`称为量词；文献对此并不一致。更重要的是，请注意，如果`v1, v2, . . ., vn`是上述示例中所有可能的参数，那么`FORALL
    x ( p( x))`等价于`( p( v1)) AND ( p( v2)) AND . . . AND ( p( vn)) AND TRUE`。特别要注意，当`n`
    = 0（即约束变量`x`的取值范围为空集）时，此表达式求值为`TRUE`。


    另请注意，表达式`FORALL x ( p( x))`在逻辑上等价于表达式`NOT (EXISTS x (NOT ( p( x))))`。


    *对比* existential quantifier。


    ### Example

    这是一个使用了全称量词和存在量词的元组演算查询（“获取供应所有零件的供应商”）：

    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    PX RANGES OVER { P } ;

    SX WHERE

    FORALL PX ( EXISTS SPX ( SPX.S# = SX.S# AND

    SPX.P# = PX.P# ) )

    ```

    后一个表达式可以理解为“供应商SX，其中对于所有零件PX，存在一个装运SPX，其供应商编号与SX相同，零件编号与PX相同。”


    ### universal relation

    给定一个关系类型`RELATION { H}`，包含所有类型为`TUPLE { H}`的可能元组的那个关系。因此，请注意，每个关系类型恰好有一个通用关系。


    *对比* empty relation。


    ### universal relvar

    给定一组关系变量集合中所有关系变量的连接。


    无损分解的规范化过程，如果孤立地看待（即忽略数据库设计的其他可能辅助工具），默认假设是有可能定义一个初始的通用关系变量，它包含与所考虑数据库相关的所有属性，然后展示如何通过依次替换为“更小”（即度更低）的投影来替代该关系变量，直到达到一个“良好”的设计。


    ### universal set

    在某个给定上下文中包含所有感兴趣元素的集合。


    ### universe of discourse

    *参见* sorted logic。


    ### unnormalized

    未规范化的（即不符合第一范式，参见q.v.）；不要与反规范化（*参见* denormalization）混淆。


    ### unsorted logic

    *参见* sorted logic。


    ### UNWRAP

    *参见* unwrapping。


    ### unwrapping

    令`s`是一个具有类型为`TUPLE { Y}`的属性`YT`的关系，并且`{ X}`是`s`中除`YT`外的所有属性的集合。令`{ Y}`具有属性`Y1,
    Y2, . . ., Yn`；同时，令`{ X}`不包含任何与`Y1, Y2, . . ., Yn`中任何一个同名的属性。那么解包操作`s UNWRAP (
    YT)`会得到另一个关系`r`。`r`的标题由`{ X}`和`{ Y}`的集合论并集组成。`r`的主体包含一个元组，对应于`s`中的每个元组，没有其他元组。令`s`的元组`t`的`X`值为`x`，`YT`值为一个元组，其`Y1`值为`y1`，`Y2`值为`y2`，...,
    以及`Yn`值为`yn`；那么`r`的对应元组具有`X`值`x`，`Y1`值`y1`，`Y2`值`y2`，..., 以及`Yn`值`yn`。*另见* tuple
    unwrapping。


    ### Example

    令`spw`是表达式`SP WRAP ( { P#, QTY } AS PQ_REL )`（*参见* wrapping）产生的关系。那么以下表达式表示对`spw`的一个解包：

    ```

    spw UNWRAP ( PQ_REL )

    ```

    该解包是一个类型为`RELATION {S# S#, P# P#, QTY QTY}`的关系。如果`spw`是通过包装图1中显示为关系变量SP值的关系`sp`得到的，那么解包`spw`的结果就是`sp`。


    ### UPDATE

    1. （*只读运算符*）*参见* what if。

    2. （*更新运算符*）非常宽松地说，是一个在给定关系变量的给定元组集合中更新给定属性集合的运算符；稍宽松地说，是将给定关系变量中的给定元组集合替换为另一个这样的集合的运算符。它是某个关系赋值的简写。


    ### Example（仅针对第二个定义）

    `UPDATE`语句

    ```

    UPDATE P WHERE CITY = ''London'' :

    { WEIGHT := 2 * WEIGHT , CITY := ''Oslo'' } ;

    ```

    是以下关系赋值的简写：

    ```

    P := WITH ( P WHERE CITY = ''London'' ) AS t1 ,

    ( EXTEND t1 ADD

    ( 2 * WEIGHT AS NW ) ) AS t2 ,

    ( EXTEND t2 ADD

    ( ''Oslo'' AS NC ) ) AS t3 ,

    ( t3 { P#, PNAME, COLOR, NW, NC } ) AS t4 ,

    ( t4 RENAME ( NW AS WEIGHT ) ) AS t5 ,

    ( t5 RENAME ( NC AS CITY ) AS t6 ,

    ( P MINUS t1 ) AS t7 :

    t7 UNION t6 ;

    ```

    在此例中，我们可能宽松地说，属性`WEIGHT`和`CITY`正在针对伦敦零件的元组进行更新；我们可能仍然宽松但稍少一点宽松地说，伦敦零件的元组正在被替换；但实际上发生的是，某个关系值被赋给了某个关系变量。


    ### UPDATE rule

    一种外键规则，参见q.v.，指定当存在某个包含引用某个元组`t1`的外键值的元组`t2`并且——非常宽松地说（*参见* tuple level）——元组`t1`中对应的候选键被更新时，由DBMS采取的动作。


    ### update

    一种关系赋值（特别是`INSERT`、`DELETE`或`UPDATE`操作）。'
  raw: '{ *r1,r2,. . .,rn*}, where *r1, r2, . . ., rn* are all of the same type *T,*
