- fmt: "## **information equivalence**\n设`s1`和`s2`是关系集合。当且仅当`s1`中的每个关系要么与`s2`中的某个关系相同，要么可以从`s2`中的关系推导出来（参见`derived\
    \ relation`），并且`s2`中的每个关系要么与`s1`中的某个关系相同，要么可以从`s1`中的关系推导出来时，`s1`和`s2`才是信息等价的。\n\
    \n**90**\n\n**The Relational Database Dictionary, Extended Edition**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00172.png)\n\n## **Information Principle, The**\n该原则指出，在关系数据库中唯一允许的变量类型是关系变量。等价地说，关系数据库只包含关系变量，别无他物。另一个等价的表述是：在任何给定时间，数据库的全部信息内容都以唯一的一种方式表示——即，作为关系。\n\
    \n*注：需要说明的是，这个原则的命名并不太准确。它更准确地应称为“统一表示原则”，甚至“表示统一性原则”，因为其关键点在于它意味着关系数据库中的所有信息都以相同的方式表示——即，作为关系。\n\
    \n## **inheritance**\n类型继承，参见`type inheritance`。\n\n## **injection**\n一种从集合`s1`到集合`s2`的映射或函数，使得`s2`中的每个元素最多是`s1`中一个元素的像。也称为非损失映射、单射或“一对一入”映射（尽管此处的“一对一”并非其严格意义上的用法，参见`one-to-one`）。\n\
    \n*示例*：从非负整数`x`到其平方`x²`的映射，是从所有非负整数的集合到其自身的一个单射。\n\n## **inner join**\n与`join`相同。限定词`inner`用于将所讨论的连接与其外部对应物区分开来。而外部连接——至少按通常理解——涉及空值和三值逻辑，因此本词典不作进一步讨论（尽管事实上可以定义一种完全不涉及空值的“可靠”的外部连接形式）。\n\
    \n## **INSERT**\n宽松地讲，一个将给定元组集合插入到给定关系变量中的运算符。它是某个关系赋值的简写。\n\n*示例*：INSERT语句\n\
    ```\nINSERT SP\nRELATION {\n    TUPLE { S# S#('S3'), P# P#('P1'), QTY QTY(150)\
    \ },\n    TUPLE { S# S#('S5'), P# P#('P1'), QTY QTY(500) } } ;\n```\n是以下关系赋值的简写：\n\
    ```\nSP := ( SP ) UNION\n    ( RELATION {\n        TUPLE { S# S#('S3'), P# P#('P1'),\n\
    \                QTY QTY(150) },\n        TUPLE { S# S#('S5'), P# P#('P1'),\n\
    \                QTY QTY(500) } } ) ;\n```\n在此示例中，表达式`S#(‘S3’)`和`S#(‘S5’)`是类型`S#`的选择器调用；表达式`P#(‘P1’)`是类型`P#`的选择器调用；表达式`QTY(150)`和`QTY(500)`是类型`QTY`的选择器调用。同样，两个形式为`TUPLE\
    \ {. . .}`的表达式是元组类型`TUPLE {S# S#, P# P#, QTY QTY}`的选择器调用，唯一的形式为`RELATION {. .\
    \ .}`的表达式是关系类型`RELATION {S# S#, P# P#, QTY QTY}`的选择器调用。\n\n另外请注意，按此处定义的`INSERT`，尝试插入一个已在目标关系变量中存在的元组并不是错误。在展开式中将`UNION`替换为`D_UNION`可以解决这个问题（如果它算是个问题的话）。\n\
    \n**91**\n\n**The Relational Database Dictionary, Extended Edition**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00174.png)\n\n## **instantiation**\n宽松地讲，对谓词的一次调用，其中（根据定义）每个参数被某个实参替换。这种实例化的结果是一个命题。\n\
    \n*注：实际上，逻辑上的实例化概念比熟悉的编程语言中的函数调用概念更广义。具体来说，我们可以通过仅替换其`n`个参数中的`m`个（`m` ≤ `n`）来实例化一个`n`元谓词，从而得到一个`r`元谓词，其中`r`\
    \ = `n`- `m`。如果`m` = `n`，则该实例化被称为完全的（并且术语“实例化”在无修饰的情况下通常意指完全实例化，除非上下文另有要求）；否则被称为部分的。\n\
    \n**92**\n\n**The Relational Database Dictionary, Extended Edition**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00119.png)\n\n## **integrity**\n当且仅当数据库不违反任何已定义的完整性约束（即，当且仅当它是一致的）时，数据库才处于完整状态。完整性是正确性的必要但不充分条件。关系模型要求数据库始终处于完整状态，这里的“始终”实际上意味着在语句边界处（除非在`type\
    \ constraint`下另有说明）。\n\n## **integrity constraint**\n一个已命名的布尔表达式，或某种等价于此类表达式的表达式，要求它始终（即，在语句边界处，除非在`type\
    \ constraint`下另有说明）被满足（即，求值为`TRUE`）。有两种基本类型：数据库约束和类型约束，参见`database constraint`和`type\
    \ constraint`（但参见`attribute constraint`、`relvar constraint`、`tuple constraint`）。DBMS应拒绝任何如果被接受就会导致某个完整性约束被违反（即，求值为`FALSE`）的更新。\n\
    \n*注：* 除类型约束外的约束专门约束更新，而根据定义更新专门应用于变量；因此，此类约束也专门应用于变量——即，任何受此类约束的东西必须是一个变量。\n\n\
    ## **intelligent key**\n一种单属性键，除了其标识某个实体的主要目的外，还携带某种编码信息嵌入其中。对比`surrogate key`。\n\
    \n*示例*：假设从国内供应商购买的零件被分配0-4999范围内的零件编号，而从其他地方购买的零件被分配5000-9999范围内的零件编号。现在假设第5001种不同类型的零件是从国内供应商处购买的。显然，零件编号方案现在必须进行修订，任何以前依赖于国内购买零件编号小于5000这一事实的程序现在都将失败。正如这个例子所示，智能键应谨慎使用。（实际上，类似的评论也适用于在*任何*属性中编码信息，而不仅仅是键属性，但键属性似乎特别容易受到这种滥用。）\n\
    \n**93**\n\n**The Relational Database Dictionary, Extended Edition**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00043.png)\n\n## **intended interpretation**\n对于给定的关系变量，指非正式的、用户理解的含义（即，关系变量谓词）。也简称为解释。对比`relvar\
    \ constraint`（第二个定义）。\n\n## **intension**\n对于给定的关系或关系变量，指其预期解释，有时也指其标题。对比`extension`（第三个定义）。\n\
    \n## **Interchangeability Principle, The**（Of base and virtual relvars）\n该原则指出，在基本关系变量和虚拟关系变量之间不应存在任意和不必要的区别；也就是说，就用户而言，虚拟关系变量应该“看起来和感觉起来”就像基本关系变量一样。\n\
    \n**interdependent projections** 参见`FD preservation`。\n\n## **internal predicate**\n\
    给定关系变量的总体关系变量约束。该术语已弃用，因为它至少可以说具有误导性（因为关系变量约束不仅是谓词，而且是命题）。\n\n## **interpretation**\n\
    与`intended interpretation`相同。\n\n## **INTERSECT** 参见`intersection`。\n\n## **intersection**\n\
    1. （二元情况）两个关系`r1`和`r2`的交集，`r1 INTERSECT r2`，其中`r1`和`r2`是相同类型`T`，其结果是一个类型为`T`的关系，其主体是所有同时出现在`r1`和`r2`中的元组`t`的集合。"
  raw: '****information equivalence** Let *s1* and *s2* be sets of relations. Then
    *s1* and *s2* are information equivalent if and only if every relation in *s1*
    is either identical to some relation in *s2* or can be derived from the relations
    in *s2*


    ( *see* derived relation), and every relation in *s2* is either identical to some
    relation in *s1* or can be derived from the relations in *s1*.


    ***90**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00172.png)


    **Information Principle, The** The principle that the only kind of variable allowed
    in a relational database is the relation variable specifically.


    Equivalently, a relational database contains relvars, and nothing but relvars.


    Yet another equivalent formulation is: at any given time, the entire information
    content of the database is represented in one and only one way—namely, as relations.
    *Note*: It has to be said that this principle isn’t very well named. It might
    more accurately be called The Principle of Uniform Representation, or even The
    Principle of Uniformity of Representation, since the crucial point about it is
    that it implies that all information in a relational database is represented in
    the same way—


    namely, as relations.


    ****inheritance** Type inheritance, q.v.


    ****injection** A mapping, or function, from set *s1* to set *s2* such that each
    element of *s2* is the image of at most one element of *s1*. Also known as a nonloss,
    injective, or “one-to-one into” mapping (though *one-to-one* here isn’t being
    used in its strict sense, q.v.).


    **Example*: The mapping from nonnegative integers *x* to their squares *x²* is
    an injection from the set of all nonnegative integers to itself.


    ****inner join** Same as join. The qualification *inner* is used to distinguish
    the join in question from its outer counterpart. Outer join in turn—at least as
    usually understood—has to do with nulls and three-valued logic and is therefore
    deliberately not discussed further in this dictionary (though in fact it would
    be possible to define a “respectable” form of outer join that didn’t involve nulls
    at all).


    ****INSERT** Loosely, an operator that inserts a given set of tuples into a given
    relvar. It’s shorthand for a certain relational assignment.


    ***The Relational Database Dictionary, Extended Edition**


    **91**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00174.png)


    *Example*: The INSERT statement


    INSERT SP


    RELATION {


    TUPLE { S# S#(''S3''), P# P#(''P1''), QTY QTY(150) },


    TUPLE { S# S#(''S5''), P# P#(''P1''), QTY QTY(500) } } ;


    is shorthand for the following relational assignment:


    SP := ( SP ) UNION


    ( RELATION {


    TUPLE { S# S#(''S3''), P# P#(''P1''),


    QTY QTY(150) },


    TUPLE { S# S#(''S5''), P# P#(''P1''),


    QTY QTY(500) } } ) ;


    In this example, the expressions S#(‘S3’) and S#(‘S5’) are selector invocations
    for type S#; the expression P#(‘P1’) is a selector invocation for type P#; and
    the expressions QTY(150) and QTY(500) are selector invocations for type QTY. Likewise,
    the two expressions of the form TUPLE {. . .} are selector invocations for tuple
    type TUPLE {S# S#, P# P#, QTY QTY}, and the sole expression of the form RELATION
    {. . .}


    is a selector invocation for relation type RELATION {S# S#, P# P#, QTY QTY}.


    Note, incidentally, that with INSERT as here defined it’s not an error to try
    to insert a tuple that already exists in the target relvar. Replacing UNION


    in the expansion by D_UNION would solve this problem (if it is a problem).


    ****instantiation** Loosely, an invocation of a predicate, in which (by definition)
    each parameter is replaced by some argument. The result of such instantiation
    is a proposition. *Note*: Actually, the logical notion of instantiation is more
    general than the familiar programming language notion of function invocation.
    To be specific, we can instantiate an *n*-place predicate by substituting arguments
    for just *m* of its parameters ( *m* ≤ *n*), thereby obtaining an *r*-place predicate,
    where *r* = *n*- *m*. If *m* = *n,* the **92**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00119.png)


    instantiation is said to be full (and the term *instantiation,* unqualified, is
    usually taken to mean full instantiation, unless the context demands otherwise);
    otherwise it’s said to be partial.


    ****integrity** A database is in a state of integrity if and only if it violates
    no defined integrity constraints (i.e., if and only if it’s consistent). Integrity
    is necessary but not sufficient for correctness. The relational model requires
    databases to be in a state of integrity at all times, where “at all times”


    effectively means at statement boundaries (except as noted under type constraint).


    ****integrity constraint** A named Boolean expression, or something equivalent
    to such an expression, that’s required to be satisfied (i.e., to evaluate to TRUE)
    at all times, where “at all times” effectively means at statement boundaries (except
    as noted under type constraint). There are two basic kinds, database constraints
    and type constraints, q.v. ( *but* *see* attribute constraint; relvar constraint;
    tuple constraint). The DBMS should reject any update that, if accepted, would
    cause some integrity constraint to be violated (i.e., to evaluate to FALSE). *Note*:
    Constraints other than type constraints constrain updates specifically, and updates
    by definition apply to variables specifically; thus, such constraints apply to
    variables specifically too—i.e., anything so constrained must be a variable, by
    definition.


    ****intelligent key** A single-attribute key that, in addition to its main purpose
    of serving to identify some entity, carries some kind of encoded information embedded
    within it. *Contrast* surrogate key.


    **Example*: Let parts purchased from domestic suppliers be assigned part numbers
    in the range 0-4999 and parts purchased elsewhere be assigned part numbers in
    the range 5000-9999\. Now assume the 5001st different kind of part is purchased
    from a domestic supplier. Clearly, the part numbering scheme will now have to
    be revised, and any application that previously relied on the fact that parts
    purchased domestically have numbers less than 5000 will now fail. As this example
    suggests, intelligent **The Relational Database Dictionary, Extended Edition**


    **93**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00043.png)


    keys should be used with caution. (Actually, a similar remark applies to the encoding
    of information within *any* attribute, not just key attributes specifically, but
    key attributes seem to be particularly prone to this kind of abuse.)


    ****intended interpretation** For a given relvar, the informal, user-understood
    meaning (i.e., the relvar predicate, q.v.). Also referred to as interpretation,
    unqualified. *Contrast* relvar constraint (second definition).


    ****intension** For a given relation or relvar, the intended interpretation, or
    sometimes the heading. *Contrast* extension (third definition).


    ***Interchangeability Principle, The** ( *Of base and virtual relvars*) The principle
    that there should be no arbitrary and unnecessary distinctions between base and
    virtual relvars; that is, virtual relvars should “look and feel” just like base
    ones so far as users are concerned.


    **interdependent projections *See* FD preservation.


    **internal predicate** The total relvar constraint for a given relvar. The term
    is deprecated because it’s at least arguably misleading (since relvar constraints
    are not just predicates but propositions).


    ****interpretation** Same as intended interpretation.


    ****INTERSECT** *See* intersection.


    ****intersection** 1\. ( *Dyadic case*) The intersection of two relations *r1*
    and *r2,* *r1* INTERSECT *r2,* where *r1* and *r2* are of the same type *T,* is
    a relation of type *T* with body the set of all tuples *t* such that *t* appears
    in both *r1* and *r2*.'
  trans: "\n## **信息等价**\n设`s1`和`s2`是关系集合。当且仅当`s1`中的每个关系要么与`s2`中的某个关系相同，要么可以从`s2`中的关系推导出来（参见`派生关系`），并且`s2`中的每个关系要么与`s1`中的某个关系相同，要么可以从`s1`中的关系推导出来时，`s1`和`s2`才是信息等价的。\n\
    \n**90**\n\n**关系数据库词典，扩展版**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00172.png)\n\n## **信息原理，The**\n该原理指出，在关系数据库中唯一允许的变量类型是关系变量。等价地说，关系数据库只包含关系变量，别无他物。另一个等价的表述是：在任何给定时间，数据库的全部信息内容都以唯一的一种方式表示——即，作为关系。\n\
    \n*注：* 需要说明的是，这个原理的命名并不太准确。它更准确地应称为“统一表示原理”，甚至“表示统一性原理”，因为其关键点在于它意味着关系数据库中的所有信息都以相同的方式表示——即，作为关系。\n\
    \n## **继承**\n类型继承，参见`类型继承`。\n\n## **单射**\n一种从集合`s1`到集合`s2`的映射或函数，使得`s2`中的每个元素最多是`s1`中一个元素的像。也称为非损失映射、单射或“一对一入”映射（尽管此处的“一对一”并非其严格意义上的用法，参见`一对一`）。\n\
    \n*示例*：从非负整数`x`到其平方`x²`的映射，是从所有非负整数的集合到其自身的一个单射。\n\n## **内连接**\n与`连接`相同。限定词`内`用于将所讨论的连接与其外部对应物区分开来。而外连接——至少按通常理解——涉及空值和三值逻辑，因此本词典不作进一步讨论（尽管事实上可以定义一种完全不涉及空值的“可靠”的外连接形式）。\n\
    \n## **INSERT**\n宽松地讲，一个将给定元组集合插入到给定关系变量中的运算符。它是某个关系赋值的简写。\n\n*示例*：INSERT 语句\n\
    ```\nINSERT SP\nRELATION {\n    TUPLE { S# S#('S3'), P# P#('P1'), QTY QTY(150)\
    \ },\n    TUPLE { S# S#('S5'), P# P#('P1'), QTY QTY(500) } } ;\n```\n是以下关系赋值的简写：\n\
    ```\nSP := ( SP ) UNION\n    ( RELATION {\n        TUPLE { S# S#('S3'), P# P#('P1'),\n\
    \                QTY QTY(150) },\n        TUPLE { S# S#('S5'), P# P#('P1'),\n\
    \                QTY QTY(500) } } ) ;\n```\n在此示例中，表达式`S#(‘S3’)`和`S#(‘S5’)`是类型`S#`的选择器调用；表达式`P#(‘P1’)`是类型`P#`的选择器调用；表达式`QTY(150)`和`QTY(500)`是类型`QTY`的选择器调用。同样，两个形式为`TUPLE\
    \ {. . .}`的表达式是元组类型`TUPLE {S# S#, P# P#, QTY QTY}`的选择器调用，唯一的形式为`RELATION {. .\
    \ .}`的表达式是关系类型`RELATION {S# S#, P# P#, QTY QTY}`的选择器调用。\n\n另外请注意，按此处定义的`INSERT`，尝试插入一个已在目标关系变量中存在的元组并不是错误。在展开式中将`UNION`替换为`D_UNION`可以解决这个问题（如果它算是个问题的话）。\n\
    \n**91**\n\n**关系数据库词典，扩展版**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00174.png)\n\n## **实例化**\n宽松地讲，对谓词的一次调用，其中（根据定义）每个参数被某个实参替换。这种实例化的结果是一个命题。\n\
    \n*注：* 实际上，逻辑上的实例化概念比熟悉的编程语言中的函数调用概念更广义。具体来说，我们可以通过仅替换其`n`个参数中的`m`个（`m` ≤ `n`）来实例化一个`n`元谓词，从而得到一个`r`元谓词，其中`r`\
    \ = `n`- `m`。如果`m` = `n`，则该实例化被称为完全的（并且术语“实例化”在无修饰的情况下通常意指完全实例化，除非上下文另有要求）；否则被称为部分的。\n\
    \n**92**\n\n**关系数据库词典，扩展版**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00119.png)\n\n## **完整性**\n当且仅当数据库不违反任何已定义的完整性约束（即，当且仅当它是一致的）时，数据库才处于完整状态。完整性是正确性的必要但不充分条件。关系模型要求数据库始终处于完整状态，这里的“始终”实际上意味着在语句边界处（除非在`类型约束`下另有说明）。\n\
    \n## **完整性约束**\n一个已命名的布尔表达式，或某种等价于此类表达式的表达式，要求它始终（即，在语句边界处，除非在`类型约束`下另有说明）被满足（即，求值为`TRUE`）。有两种基本类型：数据库约束和类型约束，参见`数据库约束`和`类型约束`（但参见`属性约束`、`关系变量约束`、`元组约束`）。DBMS\
    \ 应拒绝任何如果被接受就会导致某个完整性约束被违反（即，求值为`FALSE`）的更新。\n\n*注：* 除类型约束外的约束专门约束更新，而根据定义更新专门应用于变量；因此，此类约束也专门应用于变量——即，任何受此类约束的东西必须是一个变量。\n\
    \n## **智能键**\n一种单属性键，除了其标识某个实体的主要目的外，还携带某种编码信息嵌入其中。对比`代理键`。\n\n*示例*：假设从国内供应商购买的零件被分配\
    \ 0-4999 范围内的零件编号，而从其他地方购买的零件被分配 5000-9999 范围内的零件编号。现在假设第 5001 种不同类型的零件是从国内供应商处购买的。显然，零件编号方案现在必须进行修订，任何以前依赖于国内购买零件编号小于\
    \ 5000 这一事实的程序现在都将失败。正如这个例子所示，智能键应谨慎使用。（实际上，类似的评论也适用于在*任何*属性中编码信息，而不仅仅是键属性，但键属性似乎特别容易受到这种滥用。）\n\
    \n**93**\n\n**关系数据库词典，扩展版**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00043.png)\n\n## **预期解释**\n对于给定的关系变量，指非正式的、用户理解的含义（即，关系变量谓词）。也简称为解释。对比`关系变量约束`（第二个定义）。\n\
    \n## **内涵**\n对于给定的关系或关系变量，指其预期解释，有时也指其标题。对比`外延`（第三个定义）。\n\n## **可交换性原理，The（基本与虚拟关系变量的）**\n\
    该原理指出，在基本关系变量和虚拟关系变量之间不应存在任意和不必要的区别；也就是说，就用户而言，虚拟关系变量应该“看起来和感觉起来”就像基本关系变量一样。\n\
    \n**相互依赖的投影** 参见`FD 保持`。\n\n## **内部谓词**\n给定关系变量的总体关系变量约束。该术语已弃用，因为它至少可以说具有误导性（因为关系变量约束不仅是谓词，而且是命题）。\n\
    \n## **解释**\n与`预期解释`相同。\n\n## **INTERSECT** 参见`交集`。\n\n## **交集**\n1. （二元情况）两个关系`r1`和`r2`的交集，`r1\
    \ INTERSECT r2`，其中`r1`和`r2`是相同类型`T`，其结果是一个类型为`T`的关系，其主体是所有同时出现在`r1`和`r2`中的元组`t`的集合。\n"
- fmt: '## (N-adic case)

    `n`元情况：`n`个关系`r1, r2, ..., rn`（`n` ≥ 0）的交集，`INTERSECT { r1, r2, ..., rn }`，其中`r1,
    r2, ..., rn`都是相同类型`T`，结果是一个类型为`T`的关系，其主体是所有出现在每一个`r1, r2, ..., rn`中的元组`t`的集合（除非`n`
    = 0，此时(a) 需要某种未在此展示的语法机制来指定相关类型`T`，并且(b) 结果是该类型的全关系（universal relation））。*注*：关系交集运算符在某些方面不同于同名的数学或集合论运算符。实际上，它是连接（join）的特例。


    **示例**：表达式`(S{CITY}) INTERSECT (P{CITY})`表示关系`S`和`P`的当前值在`{CITY}`上的投影的交集。该交集是一个类型为`RELATION
    {CITY CHAR}`的关系。此外，如果关系变量`S`和`P`的当前值分别是`s`和`p`，那么该关系的主体由所有形如`< c >`、同时出现在`s{CITY}`和`p{CITY}`中的元组组成——这意味着`c`既是当前供应商城市，也是当前零件城市。注意，表达式`(S{CITY})
    INTERSECT (P{CITY})`在语义上等价于表达式`(S{CITY}) JOIN (P{CITY})`。


    ## intersection (bag theory)

    参见 bag。


    ## intersection (set theory)

    两个给定集合中共同出现的所有元素的集合。*注*：此定义显然可以扩展到任意数量的集合。


    ## intersection star

    参见 bag。


    ## into

    （函数的；用作形容词）值域等于陪域（codomain）的某个真子集的（与 onto 相对）。参见 injection。


    ## inverse

    参见 Laws of Algebra, The。


    **示例**：

    1.  在普通算术中，“+”和“*”的单位元（identity）分别是 0 和 1。因此，(a) 对于“+”，`x`的逆是`-x`；(b) 对于“*”，`x`的逆是`1/x`（除非`x`是
    0，这是唯一没有乘法逆元的数）。

    2.  在二值逻辑中，`OR`和`AND`的单位元分别是`FALSE`和`TRUE`。因此，(a) 对于`OR`，`FALSE`是自身的逆，但`TRUE`没有逆（不存在真值`v`使得`TRUE
    OR v`结果为`FALSE`）；(b) 对于`AND`，`TRUE`是自身的逆，但`FALSE`没有逆（不存在真值`v`使得`FALSE AND v`结果为`TRUE`）。


    ## involution

    1.  （逻辑）如果`v`是一个真值，那么`v`的否定的否定等于`v`。

    2.  （集合论）如果`s`是一个集合，那么`s`的补集的补集等于`s`。


    ## irreducibility

    1.  （键的）参见 candidate key。

    2.  （关系变量的）第六范式。

    3.  （函数依赖（FD）的）左不可约（Left irreducible）。

    4.  （FD集合的）FD集合`s`是不可约的，当且仅当 (a) `s`中每个FD的依赖项（dependant）只包含一个属性，(b) `s`中每个FD都是左不可约的，并且
    (c) 从`s`中移除任何一个FD都不会改变`s`的闭包（closure）。


    ## irreducibly dependent

    （FD中依赖项的）设`A`和`B`是某个关系变量`R`的标题（heading）的子集。那么`B`不可约地依赖于`A`，当且仅当它函数依赖于`A`，并且不函数依赖于`A`的任何真子集。


    **示例**：在关系变量`S`中，`{STATUS}`不可约地依赖于`{S#}`；它也依赖于`{S#, CITY}`，但不是不可约地依赖。类似地，在关系变量`SP`中，`{QTY}`不可约地依赖于`{S#,
    P#}`；它也依赖于`{S#, P#, QTY}`，但不是不可约地依赖。


    ## irreducibly equivalent

    （FD集合的）设`s1`和`s2`是两个FD集合。那么`s1`与`s2`不可约地等价，当且仅当它与`s2`等价并且是不可约的。


