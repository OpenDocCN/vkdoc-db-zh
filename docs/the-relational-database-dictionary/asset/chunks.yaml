    also has the property that EQUIV


    { *p1,p2,p3*} and NOT (XOR { *p1,p2,p3*}), as this latter expression is defined
    in this dictionary, are *not* equivalent. *See* exclusive OR.) It would be possible
    to come up with a different and possibly more intuitive definition, according
    to which the invocation EQUIV { *ip1,ip2,. . .,ipn*} returns TRUE'
