    # 关系数据库词典（扩展版）


    ## 布尔代数


    一个集合 `s` 以及其上的运算符 `<=`、`~`、`+` 和 `*` 构成一个布尔代数，当且仅当以下三个条件全部满足：(a) `0` 是 `+` 的恒等元；(b)
    `1` 是 `*` 的恒等元；(c) 对于 `s` 中的所有元素 `x`，都有 `0 <= x <= 1`。此时，集合 `s` 与运算符 `<=`、`~`、`+`、`*`
    的组合就是一个布尔代数。


    注意：尽管在此上下文中它们通常分别被称为加法和乘法，但必须明确理解 `+` 和 `*` 不一定是传统算术中同名的运算符。


    ### 示例（第二种定义）


    设 `s` 为一个任意集合；设 `p` 为 `s` 的幂集；并设 `<=`、`~`、`+`、`*` 分别表示集合包含、集合补集、集合并集和集合交集。那么，刚刚定义的幂集
    `p` 与运算符 `<=`、`~`、`+`、`*` 的组合就是一个布尔代数，其中空集和集合 `s` 本身分别充当所需的加法恒等元和乘法恒等元。（换句话说，熟悉的集合代数实际上就是一种布尔代数。）


    ## 布尔表达式


    一种逻辑表达式，*参见*。


    ## 布尔运算符


    一种只读的逻辑运算符，*参见*（特别是连接词，*参见*）。


    ## 布尔值


    `BOOLEAN` 类型的值，*参见*；换句话说，一个真值。


    ## 约束变量


    在逻辑中，指一个变量——更准确地说，是在某个谓词内的一个变量引用的出现——它要么 (a) 出现在明确指定了该变量的量词的作用域内，要么 (b) 本身就是那个明确的规格说明。（此处“变量”一词是在逻辑意义上使用的，而非编程语言意义上的。）


    对比：自由变量。


    ### 示例


    令符号 `x` 和 `y` 表示整数。那么下面两个表达式都是谓词，并且 `x` 在每个谓词中都作为约束变量出现了两次：


    ```

    EXISTS x ( x > 3 )

    ```


    ```

    EXISTS x ( x > 3 ) AND y < 7

    ```


    第一个谓词实际上是一个命题，其含义是“存在一个整数 `x` 使得 `x` 大于三”（这个命题的求值结果当然是 `TRUE`）。相比之下，第二个谓词不是一个命题，因为它除了两个约束变量外，还涉及一个自由变量（即
    `y`）；因此，它没有真值。


    转向一个数据库示例，下面是一个在供应商-零件数据库上的查询（“获取供应至少一种零件的供应商”），用元组演算（*参见*）表示：


    ```

    S WHERE EXISTS SP ( SP.S# = S.S# )

    ```


    关键字 `WHERE` 之后的布尔表达式是一个谓词，该谓词中对 `SP` 的引用是约束的（相比之下，对 `S` 的引用是自由的）。但请注意，在此特定示例中，符号
    `S` 和 `SP` 不仅表示逻辑意义上的变量，也表示传统编程语言意义上的变量——但这只是因为我们采用了一定的技巧。下面是同一示例的扩展版本，应该有助于澄清问题：


    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    SX WHERE EXISTS SPX ( SPX.S# = SX.S# )

    ```


    这里，`SX` 和 `SPX` 被显式声明为逻辑意义上的变量，分别遍历（当前的）关系变量 `S` 和 `SP` 的值。


    现在，对 `SPX` 的引用是约束的，而对 `SX` 的引用是自由的（在关键字 `WHERE` 之后的谓词中，两种情况下皆如此）。


    实际上，在第一个版本的示例中发生的是，我们诉诸了一条语法规则，该规则允许使用关系变量名来表示一个隐式定义的、遍历（当前）同名关系变量值的范围变量。


    注意：`SQL` 包含了一条完全类似的规则。


    ## Boyce/Codd 范式


    关系变量 `R` 是 Boyce/Codd 范式（`BCNF`），当且仅当 `R` 所满足的每一个非平凡 `FD` 都被 `R` 的某个超键所蕴含；等价地，当且仅当对于
    `R` 所满足的每一个非平凡 `FD A -> B`，`A` 都是 `R` 的一个超键。每一个 `BCNF` 关系变量都是 `3NF` 的。


    注意：`BCNF` 是关于 `FD` 的“那个”范式。此外，尽管处于 `BCNF` 显然不排除也处于更高一级的范式（`4NF`），但术语 `BCNF` 常被宽松地用于指代处于
    `BCNF` 但不处于 `4NF` 的关系变量。


    ### 示例


    关于范式，展示一个反例通常比展示一个例子本身更具启发性。因此，假设关系变量 `SP` 有一个额外的属性 `SNAME`，表示相应供应商的名字；同时假设供应商名字是唯一的（即，任何时候都不会有两个供应商同名）。


    这个修改后的 `SP` 版本有两个键，`{S#,P#}` 和 `{SNAME,P#}`，并且所有标题的子集——特别是 `{QTY}`——都（当然）函数依赖于这两个键。然而，该关系变量也满足
    `FD` `{S#} -> {SNAME}` 和 `{SNAME} -> {S#}`；这些 `FD` 显然不是平凡的，也不是“从超键指出的箭头”，因此该关系变量不处于
    `BCNF`（尽管它处于 `3NF`）。


    ## 内建的


    系统定义的。


    对比：用户定义的。


    ## 业务规则


    一个陈述，通常用自然语言表达，旨在捕获数据库中数据的某些含义或其值如何被约束。对于这个术语目前没有更精确定义的共识，但大多数作者至少会同意，关系变量谓词（*参见*）是一个重要的特例。


    # C


    ## 演算


    1.  广义上，指形式计算系统（拉丁语 *calculus* 意为小石头，可能用于计数或其他计算形式）。2. 特指关系演算（如果上下文要求）。


    ## 候选键


    松散地说，是唯一标识符。更精确地说，设 `K` 是关系变量 `R` 标题的一个子集；那么 `K` 是 `R` 的一个候选键（简称键），当且仅当 (a) `R`
    的任何可能值都不包含两个在 `K` 上值不同的不同元组（唯一性性质），同时 (b) `K` 的任何真子集都不能满足相同的条件（不可约性性质）。注意，每个关系变量，无论是基本的还是派生的，都至少有一个键。还需注意，根据定义，键是属性的集合（因此键值是元组）；但是，如果构成某个键
    `K` 的属性集合只包含一个属性 `A`，那么通常（尽管严格来说不正确）会非正式地称该属性 `A` 本身为该键。


    对比：子键；超键。


    另见：键约束。


    ### 示例


    在供应商-零件数据库中，`{S#}`、`{P#}` 和 `{S#,P#}` 分别是关系变量 `S`、`P` 和 `SP` 的唯一键。注意，`{SNAME}`
    不是 `S` 的一个键，因为 `{SNAME}` 的值不一定唯一（尽管图 1 中显示的值恰好是唯一的）。还需注意，例如，`{S#,CITY}` 也不是 `S`
    的一个键，因为尽管其值必须是唯一的，但它不是不可约的——我们可以移除 `CITY` 属性，剩下的部分仍然满足唯一性性质。（不可约性是期望的，因为没有它，系统将强制执行错误的完整性约束。在此例中，它不会强制执行供应商编号“全局”唯一的约束，而只会强制执行一个更弱的约束，即它们在每个城市内唯一。）

