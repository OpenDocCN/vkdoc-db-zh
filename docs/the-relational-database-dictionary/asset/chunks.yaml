    in **Tutorial D** and not SQL. (**Tutorial D** is, of* *course, a valid **D**.)*


    **The Relational Database Dictionary, Extended Edition**


    **vii**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00142.png)


    3\. *Following on from the previous point, I should make it clear that all* *relational
    definitions in this dictionary are intended to conform fully to the* *relational
    model as defined by* The Third Manifesto *. As a consequence, you* *might find
    certain aspects of those definitions a trifle surprising—for* *example, the assertion
    in the entry for deferred checking that such checking is* *logically flawed. As
    I’ve said, this is a dictionary with an attitude.*


    4\. *It has become standard practice in the industry to use terms such as* *projection,
    join, and so on in two somewhat different senses: they’re used to* *refer both
    to the operators identified by those names and also to the results* *obtained
    when those operators are invoked. I’ve followed this practice* *myself in this
    dictionary on occasion, and hope it won’t lead to confusion.*


    5\. *It has also become standard practice in the industry to interpret the terms*
    *projection, join, and so on in another sense as well. By definition, these* *operators
    apply to relation values specifically. In particular, of course, they* *apply
    to the values that happen to be the current values of relvars. It thus* *clearly
    makes sense to talk about, e.g., the join of relvars* R1 *and* R2 *,* *meaning
    the relation that results from taking the join of the current values* r1


    **and* r2 *, respectively, of those two relvars. In some contexts, however* *(normalization,
    for example), it turns out to be convenient to use expressions* *like “the join
    of relvars* R1 *and* R2 *” in a slightly different sense. To be* *specific, we
    might say, loosely but very conveniently, that some relvar (* RJ *,* *say) is
    the join of relvars* R1 *and* R2 *—meaning, more precisely, that the value* *of*
    RJ *at all times is the join of the values of* R1 *and* R2 *at the time in question.*


    *In a sense, therefore, we can talk in terms of joins of relvars per se, rather*
    *than just in terms of joins of current values of relvars. Analogous remarks*
    *apply to all of the relational operations.*


    6\. *Mention of projection raises yet another point. The dictionary defines* *projection
    thus:*


    *Let r be a relation and let {X} be a subset of the heading of r. Then the* *projection
    of r on {X}, r{X}, is a relation with heading {X} and body consisting* *of all
    tuples x such that there exists some tuple t in r with X value x.*


    **viii**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00157.png)


    *But this definition isn’t quite as precise as it might be. To be specific, if
    {X}*


    *is a subset of the heading of r, then by definition it’s a set of <attribute
    name,* *type name> pairs. But in the **Tutorial D** expression r{X}, the symbol
    {X} is* *supposed to denote, not a set of <attribute name, type name> pairs, but*
    *rather just a set of attribute names. (The **Tutorial D** syntax works because*
    *attribute names are unique within the pertinent heading, and the* *corresponding
    type names are thus specified implicitly.) So there’s a kind of* *punning going
    on here: The very same symbol {X} must be understood in a* *slightly different
    sense in different contexts. I hope this tiny sleight of hand* *on my part won’t
    cause you any confusion, since I’ve made extensive use of it* *throughout the
    dictionary.* Note *: In the same kind of way, the term attribute* *must sometimes
    be understood to mean an attribute name instead of an* *attribute as such, and
    the term heading must sometimes be understood to* *mean a set of attribute names
    instead of a set of <attribute name, type name>* *pairs. See, for example, the
    entry for candidate key, which illustrates both of* *these usages.*


    7\. *Certain definitions—of certain operators, for example—require certain* *values
    to be of certain specific types. For simplicity, I haven’t bothered to* *spell
    this fact out in detail in every case but have simply assumed the* *requirement
    is satisfied wherever necessary.*


    8\. *Several definitions and examples make use of a simplified notation for tuples.*


    *For example, consider the SP tuple shown in Figure 1 for supplier S1 and* *part
    P1\. A formal **Tutorial D** representation of that tuple might look like this:*
    TUPLE { S# S#(''S1''), P# P#(''P1''), QTY QTY(300) }


    *In the simplified notation under discussion, however, the same tuple would be*
    *represented thus:*


    <S1,P1,300>


    9\. *The notion of* set *is ubiquitous in the database world. On paper, a set
    is* *usually represented by a comma-separated list (or “commalist”) of symbols*
    *denoting the elements, the whole enclosed in braces, as here: {* a,b,c *}.*


    *Throughout this dictionary, therefore, I use braces to enclose commalists of*
    *items when the items in question are meant to denote the elements of some* **The
    Relational Database Dictionary, Extended Edition**


    **ix**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00011.png)


    *set, implying among other things that (a) the order in which the items appear*
    *within that commalist is immaterial and (b) if an item appears more than* *once,
    it’s treated as if it appeared just once.*


    10\. *The notion of* logic *is also ubiquitous in the database world. The relational*
    *model in particular is firmly based on logic. More precisely, it’s based on*
    *conventional two-valued predicate logic, 2VL (q.v.), and all references to* *logic
    in this dictionary should be taken as referring to that logic specifically,* *except
    where the context demands otherwise.* Note *: As this point suggests,* *many of
    the dictionary entries have to do with concepts from logic.*


    *Unfortunately, logic texts (and logicians) vary widely, not just in the* *terminology
    they use but also, in some cases, in the substance of their* *definitions. The
    definitions I give are the ones I find most appropriate myself,* *but be warned
    that they’re sometimes at odds with others you can find in the* *literature.*


    11\. A remark on the extended edition: *It’s a fact of life that dictionaries
    always* *expand from one edition to the next. The first edition of this dictionary
    had* *just over 600 entries; this one has over 900—an almost 50 percent increase.*'
