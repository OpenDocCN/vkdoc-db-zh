    Genesis Explains Basic Relational* *Algebra*. As this expanded name suggests,
    it is designed in such a way as to emphasize its close relationship to, and solid
    foundation in, the discipline of predicate logic, q.v. Further details can be
    found in the book *Databases, Types, and the Relational Model: The Third Manifesto*
    (3rd edition), by C. J. Date and Hugh Darwen (Addison-Wesley, 2006).


    *Note*: That book uses solid arrowheads, ◄ and ►, to delimit **A** operator names,
    as in ◄NOR►, in order to distinguish those operators from operators with the same
    name in predicate logic or **Tutorial D** or both, but those arrowheads are deliberately
    omitted here. More to the point, that book doesn’t actually define either NOR
    or NAND as a primitive **A** operator; rather, it defines **A** as including explicit
    NOT, OR, and AND


    operators. But it then goes on to show that (a) either OR or AND could be removed
    without loss, and (b) NOT and whichever of OR and AND is retained could be collapsed
    into a single operator—NOT and OR into NOR, or NOT and AND into NAND. So no serious
    harm is done by thinking of either NOR or NAND (like REMOVE, q.v.) as a primitive
    operator of **A**.


    ****Abelian group** *See* group (mathematics).


    ****absolute complement** *See* complement (set theory).


    ****The Relational Database Dictionary, Extended Edition**


    **3**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00010.png)


    **absorption** Let operators *OpC* and *OpD* both be dyadic, and assume for definiteness
    that they’re expressed in infix style. Then *OpC* absorbs *OpD*


    if and only if, for all *x* and *y,* *x* *OpC* ( *x* *OpD* *y*) = *x*.


    **Examples*: In logic, OR and AND each absorb the other, because *x* OR


    ( *x* AND *y*) and *x* AND ( *x* OR *y*) both reduce to just *x*. Similarly, in
    set theory and relational algebra, union and intersection each absorb the other.


    ****abstract data type** Type. *Note*: The term is sometimes used to refer to
    some specific kind of type (especially one that isn’t built in), but a strong
    case can be made that all types are or should be “abstract,” at least in the sense
    that their physical representation is hidden from the user.


    **access path** An implementation construct. Typical examples include hashes,
    indexes, and pointer chains. There are no access paths in the relational model—all
    access to relations is via associative addressing, q.v.


    ****actual operand** *See* argument.


    **ad hoc polymorphism *See* overloading.


    **aggregate operator** A read-only operator that derives a single value, typically
    but not necessarily a scalar value, from the “aggregate” (i.e., the set or bag)
    of values appearing as values of some attribute of some relation—or, in the case
    of COUNT, which is slightly special, from the


    “aggregate” that’s the entire relation as such. *Contrast* summary. *Note*: If
    (a) some aggregate operator invocation is such that the relation over which the
    aggregation is to be done is empty, and (b) that invocation is essentially just
    shorthand for repeated invocation of some dyadic scalar operator, and (c) an identity
    value, q.v., exists for that scalar operator, then the result of that invocation
    is that identity value. For example, suppose the operator SUM is invoked on an
    aggregate consisting of a set of values of type INTEGER. Since SUM is essentially
    just shorthand for repeated invocation of the scalar operator “+”, and an identity
    value—namely, zero—exists for “+” on integers, the result if the aggregate is
    empty is zero.


    ***4**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00086.png)


    *Example*: Let ST be a variable of type INTEGER. Then the following statement
    assigns to ST the sum of the status values for suppliers in London:


    ST := SUM ( S WHERE CITY = ''London'', STATUS ) ;


    STATUS here is an attribute reference (q.v.). And if relvar S is currently empty,
    then after this assignment variable ST will have the value zero.


    ALGEBRA *See* A.'
