    Term used (in the SQL standard in particular) to refer to a feature whose semantics
    can vary from one implementation to another but do at least have to be specified
    for any individual implementation. In other words, the implementation is free
    to decide how it will implement the feature in question, but the result of that
    decision must be documented. An SQL example is the maximum length of a character
    string.


