    ## EXCEPT


    SQL analog of `MINUS`.


    ## exclusive OR


    1. (*Dyadic case*) If `p` and `q` are predicates, their “exclusive OR” (`p`) `XOR`
    (`q`) is a predicate also. Let (`ip`) `XOR` (`iq`) be an invocation of that predicate
    (where `ip` and `iq` are invocations of `p` and `q,` respectively). Then that
