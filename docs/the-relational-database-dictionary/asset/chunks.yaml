    该概括是一个类型为 `RELATION {S# S#, CT INTEGER}` 的关系，为关系变量 `S`（而非 `SP`！—注意 `PER` 规范）中当前出现的每个不同
    `S#` 值包含一个元组，且不包含其他元组。每个这样的元组包含一个供应商编号和该供应商编号在关系变量 `SP` 中当前出现的次数（表达式 `COUNT()`
    是汇总的一个示例，q.v.）。例如，给定图 1 中的示例值，结果中供应商 `S2` 的元组具有 `S#` 值 `S2` 和 `CT` 值 `2`，而供应商
    `S5` 的元组具有 `S#` 值 `S5` 和 `CT` 值 `0`。


    相比之下，表达式


    ```

    SUMMARIZE SP PER ( SP { S# } ) ADD ( COUNT ( ) AS CT )

    ```


    ——因为 `PER` 操作数是 `SUMMARIZE` 操作数的投影，实际上可以稍微简化为


    ```

    SUMMARIZE SP BY { S# } ADD ( COUNT ( ) AS CT )

    ```


    ——产生一个类型为 `RELATION {S# S#, CT INTEGER}` 的关系，为关系变量 `SP` 中当前出现的每个不同 `S#` 值包含一个元组。例如，给定图
    1 中的示例值，结果不包含供应商 `S5` 的元组。


    以下是使用 `EXTEND` 代替 `SUMMARIZE` 的上述示例的类似物：


    ```

    EXTEND S { S# } ADD ( COUNT ( ‼SP ) AS CT )

    ```


    ```

    EXTEND SP { S# } ADD ( COUNT ( ‼SP ) AS CT )

    ```


    这些示例中的表达式 `‼SP` 是表达式 `(SP MATCHING RELATION {TUPLE {S# S#}}){ALL BUT S#}` 的简写。


    更多解释，*参见* 映像关系。


    # SUMMARIZE


    *参见* 概括。


    # 汇总


    一种构造，可以出现在 `SUMMARIZE` 表达式的 `ADD` 规范中（*参见* 概括）。请注意，汇总不是聚合运算符调用，尽管它们看起来可能很像。聚合运算符调用是一个表达式，它可以出现在任何可以出现适当类型字面量的地方。


    相比之下，汇总只是 `SUMMARIZE` 的一个操作数（说得不太严格）；它不是一个表达式，它在 `SUMMARIZE` 的上下文之外没有意义，并且实际上不能出现在该上下文之外。


    # 超键


    粗略地说，是键的超集；它具有唯一性属性，但不一定具有不可约性属性。更精确地说，令 `X` 是关系变量 `R` 目标的一个子集；那么当且仅当 `R` 的任何可能值都不包含两个在
    `X` 上值不同的不同元组时，`X` 才是 `R` 的一个超键。


    ## 示例


    关系变量 `S` 恰好有八个超键（为什么？），其中 `{S#}` 和 `{S#,CITY}` 是两个。请注意，任何给定关系变量 `R` 的目标必然是 `R`
    的一个超键。


    **178**


    **关系数据库词典，扩展版**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00056.png)


    # 超集


    集合 `s1` 是集合 `s2` 的超集（“`s1 ⊇ s2`”）当且仅当 `s2` 的每个元素也是 `s1` 的元素。注意，每个集合都是自身的超集，同时每个集合也是空集的超集。*对比*
    真超集。


    # 超类型


    *参见* 类型继承。


    # 满射


    从集合 `s1` 到集合 `s2` 的映射或函数，使得 `s2` 的每个元素都是 `s1` 至少一个元素的像（换句话说，是严格意义上的多对一对应）。也称为满射或“多对一到上”映射。


    ## 示例


    令 `s1` 和 `s2` 分别为所有整数的集合和所有非负整数的集合。那么，从整数 `x` 到它们的绝对值 `|x|` 的映射是从 `s1` 到 `s2`
    的一个满射。


    # 代理


    代理键的缩写。


    # 代理键


    一种单属性键，其值仅作为代理（因此得名）代表它们所代表的实体（换句话说，它们仅用于表示相应实体的存在，并且不携带任何额外的信息或意义）。*对比* 复合键；智能键。


    # 对称差（集合论）


    出现在两个给定集合中任意一个但不同时在两者中的所有元素的集合。


    > **注意**：对称差与异或的关系，就像并集与或的关系。


    # 对称性


    1.  （*二元逻辑运算符的*）可交换性。

    2.  （*二元关系的*）二元关系 `r` 是对称的当且仅当，对于所有 `x` 和 `y`，如果元组 `<x,y>` 出现在 `r` 中，那么元组 `<y,x>`
    也出现在其中。


    ## 示例（仅限第一个定义）


    逻辑运算符 `EQUIV`；等于运算符“`=`”。


    # 语法的


    与语法结构或（语言、句子等的）句法有关的。*对比* 词法的；语义的。


    **关系数据库词典，扩展版**


    **179**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00175.png)


    # 语法


    *参见* 语义。


    # 系统定义的


    *参见* 用户定义的。


