    \ see, this particular example is somewhat clumsier than its tuple calculus counterpart\
    \ (*see* tuple calculus), but there are also cases where the reverse is true.\n\
    \n**domain check override** An ad hoc and logically flawed—and therefore deprecated—mechanism\
    \ for performing comparisons between values of different types. (It’s flawed because\
    \ it’s based on a confusion over the logical difference between types and representations.)\n\
    \n**domain-key normal form** Relvar `R` is in domain-key normal form, `DK/NF`,\
    \ if and only if every constraint that applies to `R` is implied by the domain\
    \ keys of `R` together with general constraints (if any). Note: This definition\
    \ is somewhat simplified. For a more precise definition, see the cited reference.\n\
    \n**50**\n\n***The Relational Database Dictionary, Extended Edition***\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00012.png)"
  raw: '*Note*: The relational difference operator differs in certain respects from
    the mathematical or set theory operator of the same name, q.v. In fact, it’s a
    special case of semidifference, q.v.


    **Example*: The expression (S{CITY}) MINUS (P{CITY}) denotes the difference between
    the projections on {CITY} of the relations that are the current values of relvars
    S and P (in that order). That difference is a relation of type RELATION {CITY
    CHAR}. Moreover, if the current values of relvars S and P are *s* and *p,* respectively,
    the body of that relation consists of all tuples of the form < *c*> that appear
    in *s*{CITY} and not *p*{CITY}—meaning *c* is a current supplier city that isn’t
    also a current part city. Note that the expression (S{CITY}) MINUS (P{CITY}) is
    semantically equivalent to the expression (S{CITY}) NOT MATCHING


    (P{CITY})—or the simpler expression (S{CITY}) NOT MATCHING P, come to that.


    **difference (bag theory) *See* bag.


    **difference (set theory)** The set of all elements appearing in one given set
    and not in another. *See also* complement (set theory); *contrast* symmetric difference.


    ****direct image** A somewhat unsophisticated implementation style, found in most
    if not all of today’s mainstream database products, in which what’s physically
    stored is effectively just a direct image of what the user logically sees (i.e.,
    relvars are stored as physical files, and tuples and attributes are stored as
    records and fields within those files).


    ****direct proof** *See* proof.


    ****direct reasoning** *See* *modus ponens*.


    ****directed relationship** A relationship, in the sense of the third definition
    of that term.


    ****The Relational Database Dictionary, Extended Edition**


    **47**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00152.png)


    **discernibility** Distinguishability. *See* Principle of Identity of Indiscernibles,
    The.


    ****disjoint** ( *Of a set of bags or sets*) Having no elements in common.


    ****disjoint union** A version of the relational union operator for which the
    operand relations are required to be disjoint, meaning they have no tuples in
    common. (This operation could obviously be generalized to apply to sets in general
    as well as relations in particular.)


    **Example*: Consider the expression (S{CITY}) D_UNION (P{CITY}).


    If the current values of relvars S and P are as shown in Figure 1, this expression
    will cause a run-time error, because the operands aren’t disjoint.


    If they were, however, the expression would then be semantically equivalent to
    (S{CITY}) UNION (P{CITY}).


    ****disjunct** A predicate that’s ORed with zero or more others.


    ****disjunction** 1\. ( *Dyadic case*) If *p* and *q* are predicates, their disjunction
    ( *p*) OR ( *q*) is a predicate also. Let ( *ip*) OR ( *iq*) be an invocation
    of that predicate (where *ip* and *iq* are invocations of *p* and *q,* respectively).
    Then that invocation ( *ip*) OR ( *iq*) evaluates to TRUE if and only if at least
    one of *ip* and *iq* evaluates to TRUE. *Note*: The parentheses enclosing *p*
    and *q* in the disjunction might not be needed in practice. 2\. ( *N-adic case*)
    Let *p1,* *p2, . . ., pn* ( *n* ≥ 0) be predicates. Then the disjunction OR {
    *p1,p2,. . .,pn*}


    is equivalent to the expression FALSE OR ( *p1*) OR ( *p2*) OR . . . OR ( *pn*).


    *See also* inclusive OR.


    ****disjunctive normal form** A predicate is in disjunctive normal form, DNF,
    if and only if it’s of the form ( *p1*) OR ( *p2*) OR . . . OR ( *pn*), where
    none of the disjuncts ( *p1*), ( *p2*), . . ., ( *pn*) involves any ORs—more precisely,
    where each of the disjuncts ( *p1*), ( *p2*), . . ., ( *pn*) is a conjunction
    of literals ( *see* literal, second definition).


    ****DISTINCT** *See* SELECT expression.


    **48**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00048.png)


    **distributivity** 1\. Let operators *OpM* and *OpD* be monadic and dyadic, respectively,
    and assume for definiteness that *OpD* is expressed in infix style. Then *OpM*
    distributes over *OpD* if and only if, for all *x* and *y,* *OpM*( *x* *OpD* *y*)
    = ( *OpM*( *x*)) *OpD* ( *OpM*( *y*)). 2\. Let operators *OpC* and *OpD*


    both be dyadic, and assume for definiteness that they’re expressed in infix style.
    Then *OpC* distributes over *OpD* if and only if, for all *x, y,* and *z,* *x*
    *OpC* ( *y* *OpD* *z*) = ( *x* *OpC* *y*) *OpD* ( *x* *OpC* *z*).


    **Examples*: 1\. ( *Monadic over dyadic*) In ordinary arithmetic, nonnegative
    square root (“√”) distributes over multiplication (“*”), because


    √ ( *x* * *y* ) = √ ( *x* ) * √ ( *y* ) for all *x* and *y*. In the same kind
    of way, restriction distributes over UNION, INTERSECT, and MINUS in relational
    algebra.


    2\. ( *Dyadic over dyadic*) Multiplication distributes over addition (“+”), because


    **x* * ( *y* + *z* ) = ( *x* * *y* ) + ( *x* * *z* ) for all *x, y,* and *z*.
    In the same kind of way, each of UNION and INTERSECT distributes over the other
    in relational algebra. Likewise, each of OR and AND distributes over the other
    in logic.


    ****DIVIDEBY** *See* division; Great Divide; Small Divide.


    ****division** Over the years several logically distinct relational division operators
    (i.e., operators that “divide” one relation by another) have been defined—so many,
    in fact, that it’s probably better not to use the term at all, or at least to
    state explicitly in any given context which particular operator is intended. Two
    such operators are defined in this dictionary, the Great Divide and the Small
    Divide, q.v. *Note*: Earlier versions of **Tutorial** **D** supported both of
    these operators explicitly; the current version does not, because their functionality
    can be obtained by a variety of other means.


    ****DK/NF** Domain-key normal form.


    ****The Relational Database Dictionary, Extended Edition**


    **49**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00173.png)


    **DNF** Disjunctive normal form.


    ****domain** Type. Earlier relational writings favored the term *domain*; more
    recent ones favor the term *type* instead.


    ****domain (mathematics)** *See* function; relation (mathematics).


    ****domain calculus** A form of relational calculus, semantically equivalent to
    tuple calculus, q.v., in which the range variables range over domains (types)
    instead of relations and thus denote values from those domains.


    **Example*: Here’s a domain calculus formulation of the query “Get supplier names
    for suppliers who supply at least one part” ( *see* tuple calculus for a tuple
    calculus analog):


    NX RANGES OVER { NAME } ;


    SX RANGES OVER { S# } ;


    PX RANGES OVER { P# } ;


    NX WHERE


    EXISTS SX ( EXISTS PX ( S { S# SX, SNAME NX } AND


    SP { S# SX, P# PX } ) )


    In stilted English: “Get names NX where there exists a supplier number SX and
    there exists a part number PX such that a tuple with supplier number SX and supplier
    name NX appears in relvar S and a tuple with the same supplier number SX and part
    number PX appears in relvar SP.”


    As you can see, this particular example is somewhat clumsier than its tuple calculus
    counterpart ( *see* tuple calculus), but there are also cases where the reverse
    is true.


    ****domain check override** An ad hoc and logically flawed—and therefore deprecated—mechanism
    for performing comparisons between values of different types. (It’s flawed because
    it’s based on a confusion over the logical difference between types and representations.)


    ****domain-key normal form** Relvar *R* is in domain-key normal form, DK/NF, if
    and only if every constraint that applies to *R* is implied by the **50**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


