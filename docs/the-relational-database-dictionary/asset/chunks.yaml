    given type currently in use; and (e) possibly other things besides.


    ****closed WFF** A WFF that denotes a proposition. *Contrast* open WFF.


    ****Closed World Assumption, The** Loosely, the assumption that everything stated
    or implied by the database is true and everything else is false. More precisely,
    The Closed World Assumption (CWA) states that (a) if a given tuple appears in
    a given relvar at a given time, then the proposition represented by that tuple
    is true at that time, and (b) if a given tuple could appear in that relvar at
    that time but doesn’t, then the proposition represented by that tuple is false
    at that time. At any given time, in other words, the relvar contains all and only
    those tuples that correspond to true propositions—that is, invocations, or full
    instantiations, of the relvar predicate that evaluate to TRUE—at that time. *Note*:
    The relvar in question doesn’t have to be a base relvar, which is why the phrase
    *“* or implied” appears in the original loose characterization. Note too that
    the definition is phrased in terms of a relvar specifically, but a precisely **The
    Relational Database Dictionary, Extended Edition**


    **27**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00149.png)


    analogous definition applies to relations also ( *see* extension, third definition).
    *Contrast* Open World Assumption, The.


    **Examples*: The tuple <S1,P1,300> currently appears in relvar SP; we can therefore
    assume that it currently is the case that supplier S1 supplies part P1 in quantity
    300\. By contrast, the tuple <S5,P6,250> doesn’t currently appear, though presumably
    it could; we can therefore assume that it’s currently not the case that supplier
    S5 supplies part P6 in quantity 250.


    As for an example of implied information, observe that the tuple <S3> currently
    appears in the projection of relvar SP on {S#}; we can therefore assume that it
    currently is the case that supplier S3 supplies some part in some quantity. By
    contrast, the tuple <S5> doesn’t currently appear, though presumably it could;
    we can therefore assume that it’s currently not the case that supplier S5 supplies
    any part in any quantity.


    ****closure** 1\. ( *Of a set of attributes*) The set of all attributes *A* such
    that the set { *A*} is functionally dependent on the given set. 2\. ( *Of a set
    of FDs*) The set of all FDs implied by the given set. 3\. ( *Of an algebra in
    general)* *See* Laws of Algebra, The. 4\. ( *Of relational algebra in particular*)
    The property that the result of every algebraic operation is a relation.


    ****closure, transitive** *See* transitive closure.


    ****CNF** Conjunctive normal form.


    ****Codd, E. F.** The inventor of the relational model. See especially his papers
    (a) “Derivability, Redundancy, and Consistency of Relations Stored in Large Data
    Banks,” IBM Research Report RJ599, August 19th, 1969


    (the very first publication on the relational model); (b) “A Relational Model
    of Data for Large Shared Data Banks,” *CACM 13,* No. 6, June 1970


    (a revised and extended version of that first paper); and (c) “Relational Completeness
    of Data Base Sublanguages,” in Randall Rustin (ed.), *Data* *Base Systems*: Courant
    Computer Science Symposia *6,* Prentice-Hall (1972). The last of these papers
    in particular contains formal definitions of **28**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00016.png)


    tuple calculus and Codd’s original relational algebra, also of Codd’s reduction
    algorithm, q.v.


    ****Codd’s reduction algorithm** An algorithm for reducing an arbitrary tuple
    calculus expression to a semantically equivalent relational algebra expression.
    Among other things, the algorithm relies on the fact that the relational algebra
    operators projection and division are algebraic counterparts to the existential
    quantifier and the universal quantifier, respectively, of tuple calculus. *Note*:
    The existence of this algorithm suffices to show that Codd’s original algebra
    is relationally complete ( *see* relational completeness).


    ****codomain** *See* function.


    ****coercion** Implicit type conversion (usually best avoided).


    ****collection** ( *Of an attribute, type, value, or variable*; *used as an adjective*)
    A special case of nonscalar, q.v., in which the user-visible component parts are
    usually required all to be of the same type; thus, for example, array and relation
    types might be regarded as collection types, but tuple types usually wouldn’t
    be. The term is also used as a noun, in which case it serves as an abbreviation
    for any or all of collection type or collection value or collection variable (depending
    on context).


    ****column** 1\. SQL analog of (a) an attribute of some relation or relvar, or
    (b) the bag or set of values of some attribute of some relation or relvar, or
    (c) the type of some attribute of some relation or relvar, or sometimes even (d)
    an attribute of some tuple or tuplevar or (e) the value of some attribute of some
    tuple or tuplevar or (f) the type of some attribute of some tuple or tuplevar
    (as the context demands). 2\. More generally, a picture of an attribute (on paper,
    for example). *See also* cell; row; table.


    ****The Relational Database Dictionary, Extended Edition**


    **29**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00024.png)


    **common attribute** An attribute that’s common to two or more relations or relvars.


    **Examples*: In the suppliers-and-parts database, (a) the pair <S#,S#> is a common
    attribute in relvars S and SP; (b) the pair <P#,P#> is a common attribute in relvars
    SP and P; and (c) the pair <CITY,CHAR> is a common attribute in relvars S and
    P. We might also say, more simply but less formally, just that (a) S# is a common
    attribute for relvars S and SP, (b) P# is a common attribute for relvars SP and
    P, and (c) CITY is a common attribute for relvars S and P.


    ****commutative group** *See* group (mathematics).


    ****commutativity** Let *Op* be a dyadic operator, and assume for definiteness
    that *Op* is expressed in infix style. Then *Op* is commutative if and only if,
    for all *x* and *y,* *x* *Op* *y* = *y* *Op* *x*.


    **Examples*: In ordinary arithmetic, addition (“+”) is commutative, because


    **x* + *y* = *y* + *x*


    for all *x* and *y*. In the same kind of way, UNION and JOIN are commutative in
    relational algebra (by contrast, MINUS is not). Likewise, OR and AND are commutative
    in logic (by contrast, IMPLIES is not).


    *Note*: It so happens that all of the commutative operators just mentioned are
    also associative, q.v. Examples of operators that are commutative but not associative
    include the logical operators NAND and NOR, q.v.


    ****comparison** A Boolean expression of the form ( *exp1*) *theta* ( *exp2*),
    where *exp1* and *exp2* are expressions of the same type *T* and *theta* is any
    comparison operator that makes sense for values of type *T* (certainly “=” or


    “≠”, perhaps “>” also, and so on). *Note*: The parentheses enclosing *exp1*


    and *exp2* in the comparison might not be needed in practice.


    ****compensating action / compensatory action** An update performed automatically
    by the system in addition to some requested update, with the aim of avoiding some
    integrity violation that might otherwise occur.


