- fmt: '# 多值依赖与相关术语


    ## 多重赋值

    一种允许同时执行多个独立赋值，且仅在所有独立赋值完全执行后才进行完整性检查的操作。注意，多重赋值隐含地涉及许多其他操作——例如，更新某个连接视图，或以引发补偿操作（参见
    `compensating action`）的方式更新某个关系变量。


    ### 示例

    以下“双删除”在逻辑上是一个多重赋值操作：

    ```sql

    DELETE S WHERE S# = S#(''S1'') ,

    DELETE SP WHERE S# = S#(''S1'') ;

    ```

    注意第一个 `DELETE` 后的逗号分隔符，这在语法上表明整个语句尚未结束。


    还需注意，如果两个独立的 `DELETE` 以相反的顺序指定，语义将完全保持不变。其扩展形式为：

    ```sql

    S := S WHERE NOT ( S# = S#(''S1'') ) ,

    SP := SP WHERE NOT ( S# = S#(''S1'') ) ;

    ```


    ## 多重度

    参见 `bag`。


    ## 多集

    同 `bag`。


    ## 多值依赖

    函数依赖概念的推广（每个函数依赖都是多值依赖，但并非所有多值依赖都是函数依赖）。


    多值依赖是一个表达式——实际上是一个命题——形式为 *A* →→ *B*，其中 *A* 和 *B* 都是同一关系变量 *R* 的标题的子集，整个表达式读作“*B*
    多值依赖于 *A*”，或“*A* 多值确定 *B*”，或更简单地，“*A* 双箭头 *B*”。


    设 *C* 是同一关系变量 *R* 标题的子集，使得 *A*、*B* 和 *C* 的集合论并集等于该标题。设 *AB* 表示 *A* 和 *B* 的集合论并集，*AC*
    同理。那么关系变量 *R* 满足多值依赖（MVD）*A* →→ *B* 和 *A* →→ *C*——等价地说，这些 MVD 在关系变量 *R* 中成立——当且仅当
    *R* 满足连接依赖 ∗{ *AB,AC*}。


    > **注意**：多值依赖也称为多值依赖性。观察 MVD *A* →→ *B* 中的 *A* 和 *B* 具体是属性集。然而在非正式场合，通常（尽管严格来说不正确）会说
    *B* 中的属性本身多值依赖于 *A*，而不是说包含这些属性的集合 *B* 多值依赖于 *A*。同样，通常（尽管严格来说不正确）会说 *A* 中的属性本身多值确定
    *B*，而不是说包含这些属性的集合 *A* 多值确定 *B*。注意，根据定义，如果关系变量 *R* 满足 MVD *A* →→ *B* 和 *A* →→ *C*，那么如果它包含元组
    < *a,b1,c1*> 和 < *a,b2,c2*>，它也必然包含元组 < *a,b1,c2*> 和 < *a,b2,c1*>。进一步注意，同样直接从定义可知，关系变量
    *R* 可以无损分解为其在 *AB* 和 *AC* 上的投影，当且仅当它满足 MVD *A* →→ *B* 和 *A* →→ *C*（这个定理是 Heath
    定理的强化形式，是 Fagin 提出的众多定理之一）。最后注意，从形式化的角度看，MVD *A* →→ *B* 只是一个命题，根据定义，它要么被满足，要么不被满足（即求值为
    `TRUE` 或 `FALSE`）；然而非正式地，通常将 *A* →→ *B* 定义为一个 MVD 仅当它实际被相关关系变量满足时。但该定义没有方式表达一个给定的关系变量不满足或违反某个
    MVD（因为根据该定义，一个未被满足的 MVD 就不是 MVD！）。


    ## 变异

    有时使用的术语（尤其在面向对象上下文中）表示更新。


    ## 变异器

    有时使用的术语（尤其在面向对象上下文中）表示更新运算符。（SQL 对该术语的使用是非正统的，因为它的变异器是只读的。）


    ## MVD

    多值依赖。


    ## 超键隐含的 MVD

    MVD *A* →→ *B* 由超键隐含，当且仅当 *A* 是相关关系变量的超键。


    # N


    ## n元

    （指运算符）恰好有 *n* 个操作数；即用恰好 *n* 个参数定义（*n* ≥ 0）。


    > **注意**：设 *Op* 为一个二元运算符。如果我们想定义 *Op* 的 *n* 元版本，那么至少在该 *n* 元版本旨在应用于集合（而非序列）操作数时，*Op*
    必须是可交换且可结合的。本词典中此类运算符的定义示例包括：(a) 逻辑运算符 `AND`、`EQUIV`、`OR` 和 `XOR`；(b) 关系运算符 `intersect`、`join`、`product`
    和 `union`。


    ## n元

    （指标题、键、元组、元组变量、关系或关系变量）度为 *n*（*n* ≥ 0）。


    ## n位

    （指谓词）同 `n-adi`（*n* ≥ 0）。


    ## n元组

    度为 *n* 的元组（*n* ≥ 0）。


    ## 与非

    在逻辑中，一个二元连接词（也称为谢弗竖线，通常写作垂直线“|”）；如果 *p* 和 *q* 是谓词，那么 ( *p*)|( *q*) 也是一个谓词。设 (
    *ip*)|( *iq*) 是该谓词的一次调用（其中 *ip* 和 *iq* 分别是 *p* 和 *q* 的调用）。那么该调用 ( *ip*)|( *iq*)
    求值为 `FALSE`，当且仅当 *ip* 和 *iq* 都求值为 `TRUE`。（换句话说，( *p*)|( *q*) 等价于 `NOT(( p) AND
    ( q))`。）


    > **注意**：在表达式 ( *p*)|( *q*) 中包围 *p* 和 *q* 的括号在实践中可能不需要。另外，如上定义的 `NAND` 是一个逻辑运算符；然而，代数
    `A`（参见 `A`）包含一个也叫 `NAND` 的运算符，根据定义它是一个代数运算符（它基本上是“连接的补”）。


    ## 自然连接

    1. （二元情况）设关系 *r1* 和 *r2* 满足同名属性属于相同类型（换句话说，*r1* 和 *r2* 是可连接的，参见 `joinable`）。那么
    *r1* 和 *r2* 的自然连接 *r1* `JOIN` *r2* 是一个关系，其标题是 *r1* 和 *r2* 标题的集合论并集，其主体是所有元组 *t*
    的集合，其中 *t* 是来自 *r1* 的一个元组和来自 *r2* 的一个元组的集合论并集。

    2. （n元情况）设关系 *r1, r2, . . ., rn*（*n* ≥ 0）满足同名属性属于相同类型（换句话说，*r1, r2, . . ., rn*
    是可连接的，参见 `joinable`）。那么自然连接 `JOIN { r1,r2,. . .,rn}` 定义如下：如果 *n* = 0，结果是 `TABLE_DEE`；如果
    *n* = 1，结果是 *r1*；否则，从集合 *r1, r2, . . ., rn* 中任意选择两个不同的关系，并用它们的（二元）自然连接替换它们，重复此过程，直到集合中只剩下一个关系
    *r*，该关系即为最终结果。


    ### 示例

    表达式 `S JOIN SP` 表示关系变量 `S` 和 `SP` 的当前值对应关系的自然连接。该连接是一个类型为 `RELATION {S# S#, SNAME
    NAME, STATUS INTEGER, CITY CHAR, P# P#, QTY QTY}` 的关系。此外，如果关系变量 `S` 和 `SP` 的当前值分别是
    *s* 和 *sp*，则该关系的主体由所有形式为 < *s#,sn,st,sc,p#,q*> 的元组组成，其中元组 < *s#,sn,st,sc*> 出现在
    *s* 中，且元组 < *s#,p#,q*> 出现在 *sp* 中。


    ## 否定

    如果 *p* 是一个谓词，其否定 `NOT( p)` 也是一个谓词。设 `NOT( ip)` 是该谓词的一次调用（其中 *ip* 是 *p* 的调用）。那么该调用
    `NOT( ip)` 求值为 `TRUE`，当且仅当 *ip* 求值为 `FALSE`。


    > **注意**：在表达式 `NOT( p)` 中包围 *p* 的括号在实践中可能不需要。'
  raw: '**multiple assignment** An operation that allows several individual assignments
    all to be performed “simultaneously,” without any integrity checking being done
    until all of the individual assignments have been executed in their entirety.
    Note that multiple assignments are involved implicitly in a variety of other operations—for
    example, updating some join view, or updating some relvar in such a way as to
    cause some compensating action (q.v.) to be performed.


    **Example*: The following “double DELETE” is, logically, a multiple assignment
    operation:


    DELETE S WHERE S# = S#(''S1'') ,


    DELETE SP WHERE S# = S#(''S1'') ;


    Note the comma separator after the first DELETE, which indicates syntactically
    that the end of the overall statement hasn’t yet been reached.


    Note too that the semantics would remain completely unchanged if the two individual
    DELETEs were specified in reverse order. Here’s the expanded form: S := S WHERE
    NOT ( S# = S#(''S1'') ) ,


    SP := SP WHERE NOT ( S# = S#(''S1'') ) ;


    multiplicity *See* bag.


    **multiset** Same as bag.


    ****multivalued dependency** A generalization of the concept of functional dependency
    (every functional dependency is a multivalued dependency, but some multivalued
    dependencies aren’t functional dependencies).


    A multivalued dependency is an expression—actually a proposition—of the form *A*
    →→ *B,* where *A* and *B* are both subsets of the heading of the same relvar *R,*
    and the expression overall is read as “*B* is multidependent on *A,* ” or “*A*
    multidetermines *B,* ” or, more simply, just “*A* double arrow *B*.”


    Let *C* be a subset of the heading of that same relvar *R* such that the set theory
    union of *A, B,* and *C* is equal to that heading. Let *AB* denote the set theory
    union of *A* and *B,* and similarly for *AC*. Then relvar *R* satisfies the multivalued
    dependencies (MVDs) *A* →→ *B* and *A* →→ *C*—equivalently, **The Relational Database
    Dictionary, Extended Edition**


    **111**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00164.png)


    those MVDs hold in relvar *R*—if and only if *R* satisfies the join dependency
    5{ *AB,AC*}. *Note*: Multivalued dependency is also known as multivalued dependence.
    Observe that *A* and *B* in the MVD *A* →→ *B* are, specifically, sets of attributes.
    Informally, however, it’s common (though strictly incorrect) to speak of the attributes
    in *B* as if those attributes per se, instead of the set *B* that contains those
    attributes, were multidependent on *A*. Likewise, it’s common (though strictly
    incorrect) to speak of the attributes in *A* as if *B* were multidependent on
    those attributes per se, instead of on the set *A* that contains those attributes.
    Note that it follows from the definition that if relvar *R* satisfies the MVDs
    *A* →→ *B* and *A* →→ *C,* then if it contains the tuples < *a,b1,c1*> and < *a,b2,c2*>,
    it also contains the tuples < *a,b1,c2*> and < *a,b2,c1*>. Note further that it’s
    also immediate from the definition that relvar *R* can be nonloss decomposed into
    its projections on *AB* and *AC* if and only if it satisfies the MVDs *A*


    →→ *B* and *A* →→ *C* (this theorem, a stronger form of Heath’s theorem, is one
    of many due to Fagin). Note finally that from a formal point of view, an MVD *A*
    →→ *B* is just a proposition that, by definition, can be either satisfied or not
    (i.e., can evaluate to either TRUE or FALSE); informally, however, it’s common
    to define *A* →→ *B* to be an MVD only if it’s actually satisfied by the pertinent
    relvar. But that definition leaves no way of saying that a given relvar fails
    to satisfy, or violates, some MVD


    (because, by that definition, an MVD that isn’t satisfied isn’t an MVD!).


    ****mutation** Term sometimes used (especially in OO contexts) for updating.


    ****mutator** Term sometimes used (especially in OO contexts) for an update operator.
    (SQL’s use of the term is unorthodox, in that its mutators are read-only.)


    ****MVD** Multivalued dependency.


    ****MVD implied by a superkey** The MVD *A* →→ *B* is implied by a superkey if
    and only if *A* is a superkey for the pertinent relvar.


