- fmt: '# The Relational Database Dictionary, Extended Edition


    ## propositional variable

    A variable whose value is a proposition and is thus, effectively, either TRUE
    or FALSE. (Some writers use the term to mean a free variable, but this usage is
    deprecated.)


    ## proto tuple

    Loosely, the portion of a relational calculus expression that precedes the `WHERE`
    clause. The term is shorthand for “prototype tuple”; it’s useful but nonstandard.


    ## pseudovariable reference

    The use of an operational expression instead of a simple variable reference to
    denote the target for some update operation.


    *Note*: It’s convenient for definitional purposes to regard pseudovariable references
    as if they were regular variable references (and we do so in this dictionary);
    in other words, pseudovariables are variables, loosely speaking.


    *Examples*: Let `CS` be a variable of type `CHAR`, with current value the string
    ‘Middle’, and consider the following assignment:


    ```

    SUBSTR ( CS, 2, 1 ) = ''u'' ;

    ```


    `SUBSTR` here is the substring operator, and the effect of the assignment is to
    “zap” the second character position within `CS`, replacing the ‘i’ with a ‘u’
    (after the update, therefore, the current value of `CS` is the string ‘Muddle’).
    The expression on the left side of the assignment is a pseudovariable reference.


    For a second example, let `LSV` be a view, defined as the restriction of relvar
    `S` to just suppliers in London, and consider the following `DELETE` statement:


    ```

    DELETE LSV WHERE STATUS > 15 ;

    ```


    Logically speaking, this `DELETE` is equivalent to the following:


    ```

    DELETE ( S WHERE CITY = ''London'' )

    WHERE STATUS > 15 ;

    ```


    In this expanded form, the target of the `DELETE` is specified as an operational
    expression (i.e., a pseudovariable reference). As the example suggests, therefore,
    updating a view is logically equivalent to updating a certain pseudovariable (thus,
    views are pseudovariables, loosely speaking).


    ## QBE

    A relational language based on domain calculus. The name is an abbreviation for
    `Query-By-Example`.


    ## quantification

    Applying a quantifier (q.v.) to a free variable, thereby converting that free
    variable into a bound variable (see binding) and converting the predicate containing
    that free variable into a different predicate, logically distinct from the original.

    *Note*: If every free variable in the original predicate is quantified in this
    way, what results is a proposition.


    ## quantifier

    See existential quantifier; universal quantifier.

    *Note*: Other quantifiers are possible—for example, there exists exactly one of
    (see `UNIQUE`); for all but one of; there exists an odd number of; and so on—but
    `EXISTS` and `FORALL` are easily the ones most frequently encountered in practice.


    ## QUEL

    A relational language based on tuple calculus that at one time was a serious competitor
    to SQL.


    ## query

    A retrieval request (i.e., a relational expression, or a statement that asks for
    the evaluation of such an expression). Sometimes used, loosely, to refer to update
    requests also; also used to refer to the informal natural language counterpart
    to some retrieval or update request.


    ## query decomposition

    A divide and conquer technique for evaluating relational expressions by recursively
    dividing them into subexpressions.


    ## query rewrite

    See expression transformation.


    ## quota query

    A query that imposes a desired limit, or quota, on the cardinality of the result.


    *Example*: Here’s a possible formulation of the quota query “Get the three heaviest
    parts” (the quota here is three):


    ```

    WITH ( P RENAME ( WEIGHT AS WT ) ) AS t1 ,

    ( EXTEND P ADD ( COUNT ( t1 WHERE WT > WEIGHT ) AS #_HEAVIER ) AS t2 ,

    ```'
