  raw: '****update anomaly** A somewhat old fashioned term, never very precisely defined,
    for the kind of thing that can go wrong in a less than fully normalized database
    (or, more generally, in any database that involves uncontrolled redundancy).


    ****update operator** An operator that, when invoked, returns no value but updates
    at least one variable (usually an argument) that’s not local to the implementation
    of the operator in question. An update operator invocation has no value—thus,
    it’s not an expression, and it can’t appear wherever an expression is required.
    In particular, it can’t be nested inside expressions.


    **206**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00032.png)


    Every update operator invocation is semantically equivalent to some assignment
    (possibly a multiple assignment, q.v.).


    **Example*: See the second example under argument.


    ****update propagation** *See* controlled redundancy.


    **user** Either an end user or an application programmer or both, as the context
    demands.


    ****user defined** Defined by some agency other than the system; i.e., not system
    defined (not built in). User defined operators and user defined types provide
    obvious examples. *Note*: The term “user defined” is sanctioned by usage but really
    isn’t very good. Consider the case of a user defined type *T,* for example. To
    the user who merely makes use of that type—as opposed to the user who actually
    defines it—type *T* behaves in all major respects just like a system defined type
    (indeed, that’s the whole point). In other words, what’s being sought is not so
    much a distinction between the user and the system as it is a distinction between
    different roles played by users (possibly by the same user) in different contexts.


    **The Relational Database Dictionary, Extended Edition**


    **207**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00107.png)


    **V**


    **value** An “individual constant” (e.g., the integer value 3). Values can be
    of arbitrary complexity (they can be scalar or nonscalar; note in particular that
    tuples and relations are both values). Values have no location in time or space;
    however, they can be represented in memory by means of some encoding, and those
    representations do have locations in time and space—


    indeed, distinct representations of the same value can appear at any number of
    distinct locations in time and space, meaning, loosely, that the same value can
    appear as the current value of any number of distinct variables, and/or as any
    number of attribute values within the current value of any number of distinct
    tuplevars or relvars, at the same time or different times.


    Note that, by definition, a value can’t be updated; for if it could, then after
    such an update it would no longer be that value. Note too that every value is
    of some type (in fact, of exactly one type, except possibly if type inheritance
    is supported). Note further that a value isn’t a type, nor is it a variable. *Contrast*
    appearance.


    ****value set** Term sometimes used in E/R modeling to mean a type.


    ****VAR** The **Tutorial D** operator for defining variables (relation variables
    in particular).


    ****variable** 1\. ( *Logic*) *See* logic variable. 2\. ( *Programming languages*)
    A holder for a representation of a value, q.v. Unlike values, variables (a) do
    have location in time and space and (b) can be updated (that is, the current value
    of the variable can be replaced by another value). Indeed, to be a variable is
    to be updatable; equivalently, to be a variable is to be assignable to (and to
    be assignable to is to be a variable). Note that every variable is declared to
    be of some type. Note further that a variable isn’t a type, nor is it a value.


    ****The Relational Database Dictionary, Extended Edition**


    **209**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00070.png)


    **variable reference** 1\. ( *Logic*) *See* bound variable; free variable.


    2\. ( *Programming languages*) Syntactically, a variable name (except as noted
    under pseudovariable reference), used to denote either the variable as such or
    the value of that variable, as the context demands. Note that such a reference
    certainly denotes the variable as such if it’s used to specify a target for some
    update operation—in particular, if it appears on the left side of an assignment.
    If on the other hand it denotes the value of the variable, then it can be regarded
    as an invocation of a read-only operator—and hence as a special case of an expression,
    q.v.—where the read-only operator in question is essentially “return the current
    value of the specified variable.”


    *Note*: If the variable reference *V* in fact denotes the value of *V,* then (like
    all expressions) it can appear wherever a literal of the appropriate type can
    appear. *See also* pseudovariable reference.


    ****vertical decomposition** Informal term for decomposition into projections.


    ****view** A derived relvar that’s virtual, not real ( *contrast* snapshot).


    The value of a given view at a given time is the result of evaluating a certain
    relational expression (the view defining expression, specified when the view per
    se is defined) at the time in question. *Note*: The view defining expression must
    mention at least one relvar, for otherwise the view wouldn’t be, specifically,
    a relation variable. Note too that the view must be updatable for the same reason.


    **Example*: The following statement defines a view called LSV: VAR LSV VIRTUAL
    ( S WHERE CITY = ''London'' ) ;


    The relation that’s the value of view LSV at any given time is equal to the value
    of the view defining expression S WHERE CITY = ‘London’ at that time.


    ****210**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00062.png)


    **view materialization** A somewhat unsophisticated technique for implementing
    operations on views according to which (a) the relational expression that defines
    the view is evaluated at the time the operation is invoked, (b) a relation is
    thereby materialized, and (c) the operation in question is then executed against
    the relation so materialized. Observe that this technique can’t be used for implementing
    view updates but is limited to read-only operations. *Contrast* substitution (second
    definition).


    *See also* materialized view.


    ****view updating** Either the theory or the process of updating views, as the
    context demands. View updating is still a somewhat controversial topic, but there
    are those who believe that—contrary to popular opinion—all views are at least
    theoretically updatable. The details are beyond the scope of this dictionary,
    except to note that (a) a view update can fail on an integrity violation, of course,
    just as a base relvar update can, and (b) an argument can be made that view updates
    that are regarded by some as “impossible” aren’t intrinsically impossible but
    instead fail on just such a violation.


    ****virtual relation** The value of a given virtual relvar at a given time.


    ****virtual relvar** A view, q.v. ( *contrast* real relvar).


    **The Relational Database Dictionary, Extended Edition**


    **211**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00097.png)


