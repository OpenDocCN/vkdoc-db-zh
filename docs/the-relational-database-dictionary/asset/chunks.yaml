    ## 多对多对应


    该术语常被宽松地使用，意指一种配对关系，满足以下任一条件：(a) `s1` 中的每个元素对应 `s2` 的任意数量元素（可能一个都没有），且 `s2` 中的每个元素至少对应
    `s1` 中的一个元素；或 (b) `s1` 中的每个元素至少对应 `s2` 中的一个元素，且 `s2` 中的每个元素对应 `s1` 的任意数量元素（可能一个都没有）；或
    (c) `s1` 中的每个元素对应 `s2` 的任意数量元素（可能一个都没有），且 `s2` 中的每个元素对应 `s1` 的任意数量元素（可能一个都没有）。除非意图明确，否则最好避免使用该术语。


    **示例**（*仅限严格意义*）：设 `s` 为所有正整数的集合。


    考虑如下定义的正整数 `x` 和 `y` 的配对：当且仅当 `x` 和 `y` 在常规十进制表示法中具有相同的位数（无前导零）时，它们被配对。


    那么，该配对就是从 `s` 到其自身的多对多对应。


    ## 多对一对应


    严格来说，指一种配对规则，将两个集合 `s1` 和 `s2`（`s1` 和 `s2` 不一定互异）配对，使得 `s1` 中的每个元素恰好对应 `s2` 中的一个元素，且
    `s2` 中的每个元素至少对应 `s1` 中的一个元素（换言之，这是一个满射，`q.v.`）；等价地，指该配对本身。然而，该术语常被宽松地使用，意指一种配对关系，满足以下任一条件：(a)
    `s1` 中的每个元素至多对应 `s2` 中的一个元素，且 `s2` 中的每个元素至少对应 `s1` 中的一个元素；或 (b) `s1` 中的每个元素恰好对应
    `s2` 中的一个元素，且 `s2` 中的每个元素对应 `s1` 的任意数量元素（可能一个都没有）；或 (c) `s1` 中的每个元素至多对应 `s2` 中的一个元素，且
    `s2` 中的每个元素对应 `s1` 的任意数量元素（可能一个都没有）。除非意图明确，否则最好避免使用该术语。


    **示例**（*仅限严格意义*）：设 `s1` 和 `s2` 分别为所有整数的集合和所有非负整数的集合。那么，将整数 `x` 与其绝对值 `|x|` 配对，就是从
    `s1` 到 `s2` 的多对一对应。


    ## 多值逻辑


    等同于 `n` VL（`q.v.`），其中 `n > 2`。


    ## 映射 / mapping


    指一个函数（`q.v.`）。也用于（尤其在本词典中，有时）特指一个函数，该函数本身是双射，并包含其逆函数。


    ## 标记


    *参见* `null`。


    ## 匹配


    *参见* `semijoin`。


    ## 实质等价


    即逻辑等价（`q.v.`）。


    ## 实质蕴涵


    即逻辑蕴涵（`q.v.`）。


    ## 物化


    1.  一种实现技术，其中先完整地生成一个中间结果关系，然后再传递给另一个操作。*对比* `pipelining`。

    2.  视图物化（`q.v.`）。


    ## 物化视图


    这是对 `snapshot`（快照）的弃用术语。请注意区分：(a) 作为实现视图操作的技术的物化（*参见* `view materialization`）与
    (b) “物化视图”本身（即 `snapshot`）。前者是一种实现技术，根本不应影响用户的逻辑（即，用户无需知道对给定视图的给定操作是否通过物化来实现）。相比之下，后者则是用户非常关心的问题；即，用户确实需要知道给定的关系变量是否为快照，因为这会影响该关系变量的语义。然而，问题在于，（如定义所示）快照在（至少某些圈子里）已开始不被称为快照，而被称为物化视图。但快照不是视图；视图是虚拟的，而快照不是，因此“物化视图”是一个自相矛盾的术语（至少就模型而言）。更糟糕的是，如今不加修饰的术语
    `view` 常被特指为物化视图，这样一来，我们就有失去“视图”原始含义的优良术语的危险。本词典确实沿用 `view` 的原始含义，但需注意，该术语在其他地方并非总是具有此意。*读者须知*。


    ## 含义


    （*关于一个关系变量*）*参见* `intended interpretation`；`relvar constraint`（第二个定义）；`relvar
    predicate`。


    ## 成员


    `bag`（包）或 `set`（集合）中的一个元素。


    ## 成员关系


    *参见* `bag membership`；`set membership`。


    ## 归并


    一种 `join`（连接）实现技术。


    ## 元数据


    关于数据的数据。*参见* `catalog`。


    ## 最小性


    （*关于一个键或一组 FD*）这是 `irreducibility`（不可约性）的一种过时且有些弃用的术语。


    ## MINUS


    *参见* `difference`。


    ## 缺失信息


    常用于指代当前未知或不适用的信息。*注意*：说当前未知的信息是缺失的，这或许合理。然而，说不适用的信息是缺失的，则完全不合理（因此这种用法是弃用的）。例如，如果某位员工未婚，则该员工的配偶信息并非缺失——它根本就不存在。


    ## 模型


    可以指一般的数据模型（通常指该术语的第一个定义），或特指关系模型，具体取决于上下文。*注意*：实际上，术语 `model` 在文献中已被赋予许多其他含义——事实上，多到它无法合理承载的程度。这些额外的含义在此被有意省略。


    ## 肯定前件式


    宽松地说，即“肯定式证明”；一种推理规则，大意是如果我们知道 (`p`) 蕴涵 (`q`) 且 `p` 为真，就可以推断 `q` 为真。也称为直接推理。


    ## 否定后件式


    宽松地说，即“否定式证明”；一种推理规则，大意是如果我们知道 (`p`) 蕴涵 (`q`) 为真且 `q` 为假，就可以推断 `p` 为假。也称为间接推理。


    ## 一元的


    （*关于一个运算符*）具有恰好一个操作数；即，根据恰好一个参数来定义。


    ## 多关系变量约束


    有时用于指代提及两个或更多不同关系变量的 `database constraint`（数据库约束）。*对比* `single-relvar constraint`。*注意*：单关系变量约束与多关系变量约束之间的区别，更多是实用性的而非逻辑性的，这要归功于可互换性原则等因素。


    **示例**：从关系变量 `SP` 到关系变量 `S` 和 `P` 的外键约束；以及 `database constraint` 示例下的约束 `C3`。


    ## 多元组约束


    有时用于指代不是 `single-tuple constraint`（单多元组约束，`q.v.`）的关系变量或数据库约束。


    **示例**：`database constraint` 示例下的约束 `C3` 可被视为一个多元组约束。


    ## 多值依赖的


    *参见* `multivalued dependency`。


    ## 多决定


    *参见* `multivalued dependency`。

