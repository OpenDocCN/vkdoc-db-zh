    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00009.png)


    此外，这些操作符是通用的，在这个意义上，它们适用于所有可能的关系（通俗地说）。*注*：如果我们希望关系代数被视为与集合代数（参见）具有相同意义的代数——我们大概确实希望如此——那么除了产生关系作为结果的那些操作符之外，我们确实还应该包括一个
    `关系包含操作符`（参见）。还请注意，`关系赋值` 也是一个关系操作符，但它不是关系代数操作符，因为它不是只读的。


    ## 关系赋值


    将一个关系值赋给一个 `关系变量`（同类型）的操作。*参见* `赋值`。


    ## 关系演算


    `谓词演算` 的一种应用形式，专门用于对关系进行操作，其特性是每个关系演算表达式在语义上等价于某个关系代数表达式。


    *另见* `域演算`；`元组演算`。


    ## 关系比较


    一种 (`exp1`) `theta` (`exp2`) 形式的布尔表达式，其中 `exp1` 和 `exp2` 是相同类型 `T` 的关系表达式，`theta`
    是任何对类型 `T` 的关系有意义的比较操作符（例如，“=”、“≠”、“⊆”）。*注*：在比较中包围 `exp1` 和 `exp2` 的圆括号在实践中可能并不需要。


    ## 关系完备性


    衡量一种语言表达能力的尺度；本质上，一种语言是关系完备的，当且仅当它至少和关系演算一样强大，这意味着任何可以由某个关系演算表达式定义的关系，也可以由该语言的某个表达式定义。


    *示例*：`关系代数` 是关系完备的，因为每个关系演算表达式在语义上都等价于某个关系代数表达式。（事实上反过来也成立；也就是说，每个关系代数表达式在语义上都等价于某个关系演算表达式，至少对于通常定义的代数和演算来说是这样。）例如，在
    `元组演算` 条目下作为示例展示的关系演算表达式，在语义上等价于以下关系代数表达式：


    ```

    (S MATCHING SP){SNAME}

    ```


    因此，为了证明一个给定的语言 `L` 是关系完备的，只需证明每个关系代数表达式都等价于 `L` 中的某个表达式——这通常比证明每个关系演算表达式都等价于 `L`
    中的某个表达式要容易。例如，`SQL` 可以通过这种方式被证明是“近乎”关系完备的（“近乎”，因为 `SQL` 未能支持 `TABLE_DEE` 和 `TABLE_DUM`）。*注*：实际上，`SQL`
    是“超越”关系完备的，因为它的表达式允许定义许多根本不是关系的对象。正如这个例子所示，超越关系完备性并不一定是件好事。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00060.png)


    # **一百五十一**


    ## 关系数据库


    遵守 `信息原理` 的数据库。在本词典中，除非有明确说明，我们假设所有数据库都是关系的。*注*：`SQL` 数据库最多只能被视为近似的关系数据库，因为 `SQL`
    涉及许多对 `信息原理` 的偏离（包括但不限于 `表` 条目下指出的那些偏离）。


    ## 关系数据库管理系统


    管理关系数据库（且不管理其他数据库）的 `DBMS`；等价地说，是实现 `关系模型` 的 `DBMS`。*注*：`SQL DBMS` 最多只能被视为近似的关系系统，因为
    `SQL` 涉及许多对关系模型的偏离（包括但不限于 `表` 条目下指出的那些偏离）。'
- fmt: '### relational expression


    An expression denoting a relation. Relation literals, relation selector invocations,
    `relcon` and `relvar` references, and relational algebra operator invocations
    are all special cases.


    ### relational inclusion


    Let relations `r1` and `r2` be of the same type. Then `r1` includes `r2` (“`r1`
    ⊇ `r2`”) if and only if its body is a superset of that of `r2`, and `r2` is included
    in `r1` (“`r2` ⊆ `r1`”) if and only if its body is a subset of that of `r1`. Relation
    `r1` is equal to relation `r2` (“`r1` = `r2`”) if and only if each includes the
    other. Observe that every relation is included in itself, also that every relation
    includes the empty relation of the applicable type.


    Observe also that the term relational inclusion is usually taken, a trifle arbitrarily,
    to refer to the “⊆” operator specifically, not the “⊇” operator.


    152


    ## The Relational Database Dictionary, Extended Edition


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00208.png)


    ### relational model


    The formal theory or foundation on which relational databases in particular and
    relational technology in general are based.


    The relational model is often loosely characterized as having three aspects: a
    structural aspect, which has to do with relations per se; an integrity aspect,
    which has to do with candidate and foreign keys; and a manipulative aspect, which
    has to do with operators such as join.


    More precisely, the relational model consists of the following components: (a)
    an open-ended collection of scalar types, including in particular type `BOOLEAN`;
    (b) a relation type generator and an intended interpretation for relations of
    types generated thereby; (c) facilities for defining relation variables of such
    generated relation types; (d) a relational assignment operator; and (e) an open-ended
    collection of generic read-only operators (i.e., relational algebra or relational
    calculus) for deriving relations from relations. Note part (e) in particular;
    it’s a far too common error to regard the relational model as consisting of structure
    only and to overlook the operators, and yet (as Codd once said) structure without
    operators is rather like anatomy without physiology. Note moreover that those
    operators aren’t just meant for writing queries, as many seem to think; rather,
    they’re for writing expressions, expressions that serve many purposes, including
    query but not limited to query alone. One particularly important purpose is the
    formulation of constraints (though in this case the relational expression will
    be just a subexpression of some Boolean expression, frequently though not invariably
    an invocation of `IS_EMPTY`, q.v.). *Note*: In the interest of physical data independence,
    the relational model is deliberately silent on everything to do with performance
    (including physical storage representations in particular).


    ### relational operator


    An operator that (a) takes either relations or relvars (or both) as operands and
    (b) either returns a relation or updates at least one relvar.


    ## The Relational Database Dictionary, Extended Edition


    153


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00074.png)


    ### relationship


    1. A term used briefly in Codd’s early papers (later discarded) to mean what we
    would now call either a relation or a relvar, as the context demands. 2. In E/R
    modeling, “an association among entities” (definition taken from Chen’s original
    E/R paper). 3. More generally, given two sets (not necessarily distinct), a rule
    pairing elements of the first set with elements of the second set; equivalently,
    that pairing itself.


    This definition can easily be extended to three, four, or any number of given
    sets (e.g., consider the relationship involving suppliers, parts, and projects
    mentioned in the example under fifth normal form).


    ### relative complement


    *See* complement (set theory).


    ### relcon


    A relation constant, q.v.


    ### relcon reference


    Syntactically, a relcon name, used to denote the value of that relcon.


    ### relvar


    A relation variable, q.v. *Note*: For simplicity, we assume in this dictionary
    that all relvars are part of some database (“database relvars”).


    However, there’s no good reason why relvars that are local to some application
    (“application relvars”) shouldn’t be supported as well.


    ### relvar constraint


    1. ( *“A” relvar constraint*) Formally, any constraint that refers to the relvar
    in question, as well as possibly to others; informally, a single-relvar constraint,
    q.v. *Note*: These two definitions aren’t meant to be equivalent in any sense—they
    refer to two distinct concepts.


    2. ( *“The” relvar constraint*) The logical AND of `TRUE` and all constraints,
    apart from type constraints, that apply to a given relvar ( *the* relvar constraint—sometimes
    called the *total* relvar constraint—for the relvar in question); in other words,
    the formal, system-understood “meaning” for the relvar in question ( *contrast*
    relvar predicate). Note that it follows from this definition that every relvar
    is subject to at least one constraint: namely, the degenerate (“default”) constraint
    `TRUE`. Note too that all relvar constraints, in either sense, are also database
    constraints, q.v.


    154


    ## The Relational Database Dictionary, Extended Edition


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00108.png)


    *Examples*: First, the key constraint specified in the definition of relvar `S`
    is a relvar constraint on that relvar. Second, the foreign key constraint from
    `SP` to `S` is a relvar constraint for both relvar `S` and relvar `SP`. Third,
    here are some more relvar constraints (repeated from the examples under database
    constraint) that might apply to relvar `S`:


    ```

    CONSTRAINT C1 IS_EMPTY

    ( S WHERE STATUS < 1 OR STATUS > 100 ) ;


    /* status values must be in the */


    /* range 1 to 100 inclusive */


    CONSTRAINT C3 IS_EMPTY

    ( ( S JOIN SP )

    WHERE STATUS < 20 AND P# = P#(''P6'') ) ;


    /* no supplier with status less */


    /* than 20 can supply part P6 */

    ```


    (Constraint `C3` is also a relvar constraint for relvar `SP`.)


    Finally, suppose for the sake of the example that the foregoing constraints (the
    key constraint on relvar `S`, the foreign key constraint from relvar `SP` to relvar
    `S`, and constraints `C1` and `C3` above) are the only ones that apply to relvar
    `S`. Then the logical AND of all of them and `TRUE` is “the” (total) relvar constraint
    for that relvar.


    ### relvar predicate


    Let `R` be a relvar (real or virtual). Then the relvar predicate for `R` is the
    predicate that represents the user-understood meaning of `R`. If `R` is of degree
    *n*, that predicate will be *n*-adic (it will have a parameter for each attribute
    of `R`). Under The Closed World Assumption, moreover, at any given time the body
    of `R` will contain all and only those tuples that correspond to invocations of
    that predicate that evaluate to `TRUE` at that time. *Contrast* relvar constraint
    (second definition); this latter is a formal construct, but relvar predicates
    are necessarily somewhat informal. *Note*: Relvar predicates are sometimes called
    business rules, q.v.—though some writers take this latter term to include a variety
    of other constructs in addition to relvar predicates as such, including in particular


    155


    ## The Relational Database Dictionary, Extended Edition


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00050.png)


    the informal counterparts to various integrity constraints. (Conversely, others
    regard these additional constructs as part of the relvar predicates. There’s no
    consensus on such matters.)


    *Example*: The relvar predicate for relvar `S` is “Supplier `S#` is under contract,
    is named `SNAME`, has status `STATUS`, and is located in `CITY`.”'
