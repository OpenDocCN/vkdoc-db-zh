    ```


    ——产生一个类型为 `RELATION {S# S#, CT INTEGER}` 的关系，为关系变量 `SP` 中当前出现的每个不同 `S#` 值包含一个元组。例如，给定图
    1 中的示例值，结果不包含供应商 `S5` 的元组。


