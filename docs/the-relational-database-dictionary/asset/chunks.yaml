  trans: "\n**示例**：关系`S`（当前为基本关系变量`S`的值）中的元组`<S1,Smith,20,London>`表示了以下这个被认为是真实的命题：\n\
    \n“供应商`S1`已签约，名为`Smith`，状态为`20`，且位于`London`。”\n\n**外延公理**\n集合论的一条公理，大意是两个集合相等当且仅当它们拥有相同的元素（此时它们实际上是同一个集合）。\n\
    \n**《关系数据库词典（扩展版）》**\n\n**13**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00141.png)\n\n**B**\n\n**包**\n宽松地说，是一种允许重复的“集合”；更精确地说，是一个由称为元素的个体组成的集合，其中同一个元素可以出现任意多次。一个例子是集合`(y,y,x,z,y,z)`，由于包和集合一样，其元素没有顺序，因此它等价于`(x,y,y,y,z,z)`。一个给定元素在给定包中出现的次数称为该元素（相对于该包）的多重性。\n\
    \n集合论中的包含、并、交、差和积（但不是补）运算都可以推广应用于包。首先是包含：令`b1`和`b2`为包，元素`x`在`b1`中恰好出现`n1`次，在`b2`中恰好出现`n2`次（`n1`\
    \ ≥ 0，`n2` ≥ 0）。那么，当且仅当对于所有这样的元素`x`都有`n1` ≥ `n2`时，包`b1`包含包`b2`（`b1` ⊇ `b2`）；进一步，当且仅当`b1`包含`b2`时，`b2`被包含于`b1`（`b2`\
    \ ⊆ `b1`），而当且仅当两者相互包含时，`b1`等于`b2`（`b1` = `b2`）。所有与集合包含相关的术语（超集、子集等）在包包含（超包、子包等）中都有对应的概念。\n\
    \n现在，令`Op`为并、交或差运算，令`b`为对包`b1`和`b2`应用`Op`（在差运算的情况下，按此顺序）所得到的包。与之前一样，元素`x`在`b1`中恰好出现`n1`次，在`b2`中恰好出现`n2`次（`n1`\
    \ ≥ 0，`n2` ≥ 0）。那么，元素`x`在`b`中恰好出现`n`次，其中`n`是：\n如果`Op`是并运算，则为 `MAX(n1, n2)`\n如果`Op`是交运算，则为\
    \ `MIN(n1, n2)`\n如果`Op`是差运算，则为 `MAX(n1 - n2, 0)`\n在任何情况下，`b`都不包含任何其他元素。\n\n现在，令元素`x1`和`x2`分别在`b1`中恰好出现`n1`次，在`b2`中恰好出现`n2`次（`n1`\
    \ ≥ 0，`n2` ≥ 0），并令`b`为`b1`和`b2`（按此顺序）的积。那么，序对`<x1, x2>`在`b`中恰好出现`n1 * n2`次，且`b`不包含任何其他元素。\n\
    \n最后，还有两种运算，并加（union plus）和交星（intersection star）（也以其他多种名称为人所知），它们在集合论中没有对应物。\n\
    \n令`b`为对包`b1`和`b2`应用其中一种运算所得到的包，其中再次假设元素`x`在`b1`中恰好出现`n1`次，在`b2`中恰好出现`n2`次（`n1`\
    \ ≥ 0，`n2` ≥ 0）。那么，元素`x`在`b`中恰好出现`n`次，其中`n`是：\n如果`Op`是并加运算，则为 `n1 + n2`\n如果`Op`是交星运算，则为\
    \ `n1 * n2`\n\n**注意**：SQL 支持并加但不支持真正的包并。它不支持交星。\n\n**示例**：令`b1`和`b2`分别为包`(w,w,x,x,y)`和`(x,y,y,y,z,z)`。那么以下表达式产生所示结果：\n\
    \n```\nb1 UNION b2 = (w,w,x,x,y,y,y,z,z)\nb1 INTERSECT b2 = (x,y)\nb1 MINUS b2\
    \ = (w,w,x)\nb2 MINUS b1 = (y,y,z,z)\nb1 TIMES b2 = (<w,x>,<w,x>,<x,x>,<x,x>,<y,x>,\n\
    \                <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,\n                <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,\n\
    \                <w,y>,<w,y>,<x,y>,<x,y>,<y,y>,\n                <w,z>,<w,z>,<x,z>,<x,z>,<y,z>,\n\
    \                <w,z>,<w,z>,<x,z>,<x,z>,<y,z>)\nb1 UNION+ b2 = (w,w,x,x,x,y,y,y,y,z,z)\n\
    b1 INTERSECT* b2 = (x,x,y,y,y)\n```\n\n**16**\n\n**《关系数据库词典（扩展版）》**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00182.png)\n\n**包包含**\n*参见* 包。\n\n**包属于（对于一个元素）**\n指某个元素出现在给定包中的属性；指测试该属性的操作。类似于集合属于（参见），包属于通常用符号“∈”表示；因此，布尔表达式`x\
    \ ∈ b`当且仅当元素`x`确实至少在包`b`中出现一次时返回`TRUE`。\n\n**包运算符**\n*参见* 包。\n\n**基本关系**\n在给定时间，某个给定基本关系变量的值。*对比*\
    \ 导出关系。\n\n**示例**：在任何给定时间，作为关系变量`S`、`P`和`SP`的值的关系。\n\n**基本关系变量**\n不是用其他关系变量定义的关系变量；即，独立的关系变量。*对比*\
    \ 导出关系变量。*注意*：一个普遍的误解是基本关系变量是物理存储的，即它们在存储中由物理文件表示，其元组和属性在存储中由这些文件内的记录和字段表示（*参见*\
    \ 直接映像）。但关系模型故意对物理存储不作任何规定；特别是，它明确地不表示基本关系变量本身是物理存储的——既不是在上述意义上，也不是在其他任何意义上。唯一的要求是必须存在从物理存储的内容到用户感知的内容（即基本关系变量或导出关系变量或两者的混合）的某个已定义映射，反之亦然。\n\
    \n**示例**：关系变量`S`、`P`和`SP`。\n\n**基本表**\n根据上下文需要，指基本关系或基本关系变量的 SQL 类比。*另见* 表。\n\n\
    **BCNF**\n博伊斯/科德范式。\n\n**双条件**\n逻辑等价。\n\n**双条件等价**\n与`EQUIV`相同。\n\n**《关系数据库词典（扩展版）》**\n\
    \n**17**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00006.png)\n\
    \n**双射**\n从集合`s1`到集合`s2`的一个映射或函数，其中`s2`的每个元素恰好是`s1`的一个元素的像；等价地，一个既是单射又是满射的映射（换言之，是从`s1`到`s2`的一个严格意义上的一一对应）。也称为双射映射或“一一映上”映射。注意，如果一个给定的映射是双射，那么它也有一个也是双射的逆映射。\n\
    \n**示例**：从整数`x`到其后继`x + 1`的映射是从所有整数的集合到其自身的一个双射。从整数`x`到其前驱`x - 1`的逆映射同样是一个双射。\n\
    \n**二元**\n度为二。\n\n**绑定（逻辑）**\n通过量化（参见）将自由变量转换为约束变量。\n\n**体**\n一组同类型的元组；特指出现在给定关系中，或在给定时间出现在给定关系变量中的一组元组。体的每个子集本身也是一个体。\n\
    \n**示例**：在任何给定时间出现在关系变量`S`中的一组元组；该组的任意子集。\n\n**布尔**\n一种标量数据类型——关系模型唯一要求的标量类型——仅包含两个值（具体是两个真值，分别由字面量`TRUE`和`FALSE`表示）。\n\
    \n**布尔代数**\n1.  （简单情况）真值`TRUE`和`FALSE`，连同逻辑运算符`NOT`、`OR`和`AND`（参见）。\n2.  （一般情况）令`s`为一个集合；令“≤”为`s`上的一个偏序（参见）；并令一个一元运算符“¬”（补）和两个不同的二元运算符“+”（加法）和“*”（乘法）在`s`上定义，使得\
    \ (a) “¬”满足闭合律和对合律；(b) “+”和“*”满足闭合律、交换律、结合律、分配律、幂等律和吸收律（特别是分配律意味着每个“+”和“*”都对另一个运算分配）；以及\
    \ (c) “¬”、“+”和“*”共同满足德·摩根定律。令`s`还包含两个元素`0`和`1`。\n\n**18**\n\n**《关系数据库词典（扩展版）》**\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00153.png)\n"
- fmt: '# The Relational Database Dictionary, Extended Edition


    ## Boolean algebra


    A set `s` with operators `<=`, `~`, `+`, and `*` is a Boolean algebra if the following
    three conditions all hold: (a) `0` is the identity for `+`; (b) `1` is the identity
    for `*`; and (c) for all elements `x` in `s`, `0 <= x <= 1`. Then the combination
    of `s` and the operators `<=`, `~`, `+`, and `*` is a Boolean algebra.


    Note: Although they''re usually referred to in this context as addition and multiplication,
    respectively, it must be clearly understood that `+` and `*` aren''t necessarily
    the operators known by those names in conventional arithmetic.


    ### Example (second definition)


    Let `s` be an arbitrary set; let `p` be the power set of `s`; and let `<=`, `~`,
    `+`, and `*` denote set inclusion, set complement, set union, and set intersection,
    respectively. Then the combination of the power set `p` and the operators `<=`,
    `~`, `+`, and `*` as just defined is a Boolean algebra, in which the empty set
    and the set `s` itself serve as the required additive identity and multiplicative
    identity, respectively. (In other words, the familiar algebra of sets is in fact
    a Boolean algebra.)


    ## Boolean expression


    A logical expression, q.v.


    ## Boolean operator


    A read-only logical operator, q.v. (especially one of the connectives, q.v.).


    ## Boolean value


    A value of type `BOOLEAN`, q.v.; in other words, a truth value.


    ## bound variable


    In logic, a variable—more precisely, an occurrence of a variable reference within
    some predicate—that either (a) appears within the scope of a quantifier that explicitly
    specifies that variable or (b) is that explicit specification itself. (The term
    variable is used here in the sense of logic, not in the programming language sense.)


    Contrast: free variable.


    ### Examples


    Let the symbols `x` and `y` denote integers. Then the following expressions are
    both predicates, and `x` appears as a bound variable, twice, in each of them:


    ```

    EXISTS x ( x > 3 )

    ```


    ```

    EXISTS x ( x > 3 ) AND y < 7

    ```


    The first of these predicates is in fact a proposition, and its meaning is "There
    exists an integer `x` such that `x` is greater than three" (a proposition that
    evaluates to `TRUE`, of course). By contrast, the second predicate is not a proposition,
    because it involves a free variable (namely, `y`) as well as the two bound ones;
    thus, it has no truth value.


    Turning to a database example, the following is a query ("Get suppliers who supply
    at least one part") on the suppliers-and-parts database, expressed in tuple calculus,
    q.v.:


    ```

    S WHERE EXISTS SP ( SP.S# = S.S# )

    ```


    The Boolean expression following the keyword `WHERE` here is a predicate, and
    the references to `SP` in that predicate are bound (by contrast, the reference
    to `S` is free). Note, however, that in this particular example the symbols `S`
    and `SP` denote not only variables in the sense of logic but also variables in
    the conventional programming language sense—but that''s because we''ve indulged
    in a certain sleight of hand, as it were. Here''s an extended version of the same
    example that should help clarify matters:


    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    SX WHERE EXISTS SPX ( SPX.S# = SX.S# )

    ```


    Here `SX` and `SPX` have been explicitly declared as variables in the sense of
    logic, ranging over (the current values of) relvars `S` and `SP`, respectively.


    Now it''s the references to `SPX` that are bound and the reference to `SX` that''s
    free (in the predicate following the keyword `WHERE` in both cases).


    In effect, what happened in the first version of the example was that we were
    appealing to a syntax rule that allowed a relvar name to be used to denote an
    implicitly defined range variable that ranges over (the current value of) the
    relvar with the same name.


    Note: `SQL` includes a rule of exactly this kind.


    ## Boyce/Codd normal form


    Relvar `R` is in Boyce/Codd normal form, `BCNF`, if and only if every nontrivial
    `FD` satisfied by `R` is implied by some superkey of `R`; equivalently, if and
    only if for every nontrivial `FD A -> B` satisfied by `R`, `A` is a superkey for
    `R`. Every `BCNF` relvar is in `3NF`.


    Note: `BCNF` is "the" normal form with respect to `FD`s. Also, although being
    in `BCNF` clearly doesn''t preclude being in the next higher normal form (`4NF`)
    as well, the term `BCNF` is often used loosely to refer to a relvar that''s in
    `BCNF` and not in `4NF`.


    ### Example


    With the normal forms it''s often more instructive to show a counterexample rather
    than an example per se. Suppose, therefore, that relvar `SP` has an additional
    attribute `SNAME`, representing the name of the applicable supplier; suppose also
    that supplier names are necessarily unique (i.e., no two suppliers ever have the
    same name at the same time).


    This revised version of `SP` has two keys, `{S#,P#}` and `{SNAME,P#}`, and every
    subset of the heading—`{QTY}` in particular—is (of course) functionally dependent
    on both of them. However, the relvar also satisfies the `FD`s `{S#} -> {SNAME}`
    and `{SNAME} -> {S#}`; these `FD`s are certainly not trivial, nor are they "arrows
    out of superkeys," and so the relvar isn''t in `BCNF` (though it is in `3NF`).


    ## built in


    System defined.


    Contrast: user defined.


    ## business rule


    A statement, usually in natural language, that''s supposed to capture some aspect
    of what the data in the database means or how its values are constrained. There''s
    no consensus on any more precise definition of the term, but most writers would
    at least agree that relvar predicates, q.v., are an important special case.


    # C


    ## calculus


    1.  Generically, a system of formal computation (the Latin word *calculus* means
    a pebble, perhaps used in counting or some other form of reckoning). 2. Relational
    calculus specifically (if the context demands).


    ## candidate key


    Loosely, a unique identifier. More precisely, let `K` be a subset of the heading
    of relvar `R`; then `K` is a candidate key (key for short) for `R` if and only
    if (a) no possible value for `R` contains two distinct tuples with the same value
    for `K` (the uniqueness property), while (b) the same can''t be said for any proper
    subset of `K` (the irreducibility property). Note that every relvar, base or derived,
    has at least one key. Note too that, by definition, keys are sets of attributes
    (and key values are therefore tuples); however, if the set of attributes constituting
    some key `K` contains just one attribute `A`, then it''s common (though strictly
    incorrect) to speak informally of that attribute `A` per se as being that key.


    Contrast: subkey; superkey.


