  trans: '

    ### 2. （谓词）

    令 `p` 为一个谓词；那么 `p` 的外延由 `p` 的所有完全实例化（即所有可以通过完全实例化从 `p` 推导出的命题）组成，这些命题的求值结果为 `TRUE`。


    ### 3. （关系）

    承接上一定义，令 `r` 为一个关系。那么 `r` 的标题可以被视为表示了一个谓词（*参见* 关系谓词），而 `r` 的主体可以被视为表示了该谓词的外延。因此，术语
    `外延` 有时也用于指代关系的主体。


    *对比* 内涵。


    ### 4. （集合论）

    *参见* 外延公理。


    **示例**（仅针对第一个定义）：以下表达式表示了关系变量 `P` 的当前值所代表关系的一个外延：

    ```

    EXTEND P ADD ( WEIGHT * 454 AS GMWT )

    ```

    该外延是一个与关系变量 `P` 的当前值类似的关系，只是它多了一个额外的属性 `GMWT`（“克重”），该属性在任何给定元组中的值都是同一元组中 `WEIGHT`
    值的 454 倍。请注意，关系变量 `P` 本身在数据库中保持不变——`EXTEND` 不像 `SQL` 中的 `ALTER TABLE`，它只是一个只读运算符（例如，与
    `restrict` 类似），它以某个关系作为输入，并返回另一个关系作为输出。


    更多示例见汇总运算。


    ### 外部谓词

    给定关系变量的关系变量谓词。*对比* 内部谓词。*注*：由于后一术语已弃用，术语 `外部谓词` 也（在某种程度上）被弃用。


    *关系数据库词典，扩展版*


    **65**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00017.png)


    **F**


    ### FALSE

    *参见* BOOLEAN。


    ### FD

    函数依赖。


    ### 由超键隐含的 FD

    FD `A` → `B` 由超键隐含，当且仅当 `A` 是相关关系变量的超键。


    ### FD 保持

    将关系变量 `R` 分解为它的投影 `R1`， `R2`, . . ., `Rn`，使得 FD 被保持——即，`R` 满足的每一个 FD 都由 `R1`,
    `R2`, . . ., `Rn` 所满足的 FD 所隐含。这里的 `R1`, `R2`, . . ., `Rn` 被称为独立投影。*注*：非独立的投影被称为相互依赖的，而非依赖的。


    *另见* 原子关系变量。


    **示例**：假设关系变量 `S` 满足额外的 FD `{CITY}` → `{STATUS}`；即，给定供应商的状态是该供应商位置的函数。那么用其在 `{S#,SNAME,CITY}`
    和 `{CITY,STATUS}` 上的投影替换 `S` 可以保持 FD，因为 `S` 满足的每一个 FD 要么被两个投影之一满足，要么被它们所满足的 FD
    隐含。相比之下，假设 `S` 被替换为其在 `{S#,SNAME,CITY}` 和 `{S#,STATUS}` 上的投影。现在，FD `{CITY}` →
    `{STATUS}` 并未被这些投影满足的 FD 所隐含（即使分解是无损的）。一个实际的后果是，现在必须监控对两个投影中任何一个的更新（要么由 DBMS 监控，要么在当前实践中更可能由某个应用程序监控），以确保
    FD `{CITY}` → `{STATUS}` 继续得到满足；例如，考虑将供应商 `S1` 从 `London` 移动到 `Paris` 所涉及的操作。换句话说，在后一种分解中，这两个投影不是独立的，而是相互依赖的。


    考虑到当今商业产品中的技术水平，因此，通常更可取的做法是，在可能的情况下，以保持 FD 的方式进行分解——即，分解成独立投影。


    *关系数据库词典，扩展版*


    **67**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00128.png)


    ### 字段

    有时用来表示列的术语，具有该词的任何可能含义。然而，所有此类用法都是不推荐的；最好将该术语保留给操作系统甚至物理层结构。


    ### 域（数学）

    一种代数（*参见* algebra），其中运算符 “+” 和 “*” 具有实数加法和乘法的所有属性（交换律、结合律等）；等价地，一个遵循所有代数定律（*参见*
    The Laws of Algebra）的形式系统。


    ### 第五范式

    关系变量 `R` 是第五范式（`5NF`）的，当且仅当 `R` 满足的每个非平凡 JD 都由 `R` 的超键所隐含；等价地，当且仅当 `R` 满足的每个非平凡
    JD `JD{ A1,A2,. . .,An }` 满足以下条件：(a) `A1`, `A2`, . . ., `An` 中的每一个都是 `R` 的超键，并且
    (b) `R` 的键可以按某种顺序排列，使得该序列中每对相邻的键都包含在某个 `Ai` 中（1 ≤ `i` ≤ `n`）。每个 `5NF` 关系变量都是 `4NF`
    的。*注*：`5NF` 是关于 JD 的“那个”范式。此外，虽然处于 `5NF` 显然并不排除也处于 `6NF`，但术语 `5NF` 常被宽泛地用于指代处于
    `5NF` 但不处于 `6NF` 的关系变量。


    观察到如果以下任一条件成立，则关系变量 `R` 肯定是 `5NF` 的：(a) 它处于 `3NF` 且没有复合键，或 (b) 它处于 `BCNF` 且至少有一个非键属性。


    **示例**：如 Boyce/Codd 范式下所述，对于范式而言，展示一个反例通常比展示一个例子本身更具启发性。因此，考虑关系变量 `SPJ`，其属性为 `S#`（供应商编号）、`P#`（零件编号）和
    `J#`（项目编号），谓词为“供应商 `S#` 向项目 `J#` 供应零件 `P#`。”令该关系变量是全键的（即，受键约束 `KEY{S#,P#,J#}`
    约束）。并令它还受以下约束：如果 (a) 供应商 `Sx` 供应零件 `Py` 并且 (b) 零件 `Py` 被供应给项目 `Jz` 并且 (c) 项目 `Jz`
    由供应商 `Sx` 供应，那么 (d) 供应商 `Sx` 向项目 `Jz` 供应零件 `Py`。那么 `SPJ` 等于其在 `{S#,P#}`、`{P#,J#}`
    和 `{J#,S#}` 上的投影的连接——即它满足 JD `JD{{S#,P#},{P#,J#},{J#,S#}}`——因此它可以无损分解为这三个投影。由于该
    JD 既不是平凡的，也未被唯一的超键（即整个标题）所隐含，关系变量 `SPJ` 不是 `5NF` 的，尽管它是 `4NF` 的。我们注意到关系变量 `SPJ`
    (a) 处于 `3NF` 但有复合键，并且 (b) 实际上处于 `BCNF` 但没有非键属性。


    *关系数据库词典，扩展版*


    **68**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00059.png)


    ### 文件

    有时用来表示表（具有该词的任何可能含义），甚至关系或关系变量的术语。然而，所有此类用法都是不推荐的；最好将该术语保留给操作系统甚至物理层结构。


    ### 第一个重大错误

    将类型等同于关系或关系变量。*参见* 类型。


    ### 第一范式

    规范化的。根据定义，所有关系变量都是第一范式（`1NF`）的；也就是说，应用于关系变量时，术语 `1NF` 和 `规范化` 含义相同（*参见* 规范化以获取进一步解释）。由此可见，在像
    `SQL` 这样的语言中，“表”可以被认为是处于 `1NF` 的，当且仅当它是某个关系变量的直接且忠实的表示，其中 *直接且忠实* 意味着该表中的每个行列交叉点（即每个单元格，*参见*
    cell）恰好包含适用类型的一个值，不多也不少。（该值可以任意复杂——它甚至可以是一个表——但重复一遍，必须恰好有一个这样的值，并且它必须是适用类型。）因此，特别地，如果表包含任何重复组（*参见*
    repeating group），则该表不处于第一范式。这一事实解释了通常对第一范式的非正式描述，即意味着 *没有重复组*。*注*：虽然处于 `1NF` 显然并不排除也处于
    `2NF`，但术语 `1NF` 常被宽泛地用于指代仅处于 `1NF` 而不处于任何更高范式的关系变量。

