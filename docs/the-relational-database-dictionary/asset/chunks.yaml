    ## 二值逻辑

    传统的命题逻辑或谓词逻辑，其中只有真（TRUE）和假（FALSE）两个真值；缩写为 `2VL`。


    ## 类型

    值的命名集合；不应与所讨论值的内部或物理表示混淆，那是一个实现问题。每个值、每个变量、每个属性、每个只读运算符、每个参数以及每个表达式都属于某种类型。


    类型可以是标量或非标量（具体来说，它们可以是元组类型或关系类型）；因此，关系的属性也可以是标量或非标量。类型也可以是系统定义的（即内置的）或用户定义的。它们也可以由生成器生成（*参见*
    类型生成器）。


    *注意*：类型不是值，也不是变量；特别是，关系值和关系变量不是类型。将类型等同于关系值或关系变量——这是文献中曾主张的观点——已被描述为“第一大谬误”。（关于第二个，*参见*
    指针；第二大谬误。）


    **示例**：这是一个类型定义示例：


    ```

    TYPE POINT ...

    { ... CONSTRAINT ( X↑2 + Y↑2 ) ≤ 10000 } ;

    ```


    这里的 `POINT` 是一个用户定义类型，表示二维空间中的几何点。它受一个类型约束，该约束实质上规定了，唯一有意义的点是位于以原点为中心、半径为 100
    的圆内或圆上的点（符号“↑”表示乘方）。


    *注意*：示例中故意省略了 `POINT` 值的（必要的）基于笛卡尔坐标 `X` 和 `Y` 的表示定义，因为详细讨论该定义会偏离主题太远。出于类似原因，也省略了其他无关细节。


    ## 类型约束

    对构成给定类型的一组值的定义。当为某个类型 *T* 调用某个选择器时，会检查该类型 *T* 的类型约束；换句话说，当且仅当调用某个选择器时所用的参数违反了适用的类型约束时，才会发生类型约束错误。*对比*
    类型错误。


    **示例**：*参见* 类型条目下的示例。


    ## 类型错误

    如果以非对应参数类型的参数调用某个运算符，则会发生错误。与完整性违规不同，此类错误应在编译时即可检测到（除非支持类型继承，在这种情况下，某些类型错误——绝非所有——可能直到运行时才能检测到）。


    ## 类型生成器

    在编译时而非运行时调用，并返回类型而非值的运算符。例如，传统的编程语言通常支持数组类型生成器，允许用户定义各种特定的数组类型。在关系模型中，元组和（尤其是）关系类型生成器是最重要的；它们允许用户定义各种特定的元组和关系类型。*参见*
    关系类型；元组类型。


    **示例**：考虑供应商关系变量定义：


    ```

    VAR S BASE RELATION

    { S# S#, SNAME NAME, STATUS INTEGER, CITY CHAR }

    KEY { S# } ;

    ```


    此定义包含对 `RELATION` 类型生成器的调用（从语法上讲，是从关键字 `RELATION` 到关键字 `CHAR` 后的闭合大括号的所有内容，包括在内）。该调用返回一个特定的关系类型——即类型


    ```

    RELATION

    { S# S#, SNAME NAME, STATUS INTEGER, CITY CHAR }

    ```


    因此，这个类型实际上是一个生成的类型——正如所有关系类型以及所有元组类型也都是生成的一样。


    ## 类型推断

    确定给定表达式所表示值的类型的过程。请注意，此过程完全由定义表达式中所涉及的各种运算结果类型的规则所明确指定（实际上，表达式 *x* 所表示值的类型，正是
    *x* 中涉及的最外层运算结果的类型）。


    ## 类型继承

    一种组织原则，根据该原则，一个类型可以被定义为一个或多个其他类型（称为超类型）的子类型。如果 *T2* 是超类型 *T1* 的（真）子类型，那么所有类型为
    *T2* 的值也属于类型 *T1*，并且适用于类型 *T1* 值的只读运算符和类型约束会被类型 *T2* 的值继承。然而，类型 *T2* 的值会有其自身的只读运算符和类型约束，这些不适用于仅属于类型
    *T1* 而不属于 *T2* 的值。


    ## U

    **UDO**

    用户定义运算符。


    ## UDT

    用户定义类型。


    ## 一元

    度数为 1 的。


    ## UNGROUP

    *参见* 去组。


    ## 去组

    设 *s* 是一个关系，其具有一个类型为 `RELATION {Y}` 的属性 `YR`，并设 `{X}` 是 *s* 中除 `YR` 外所有属性的集合。设
    `{Y}` 具有属性 `Y1`, `Y2`, ..., `Yn`；同时，设 `{X}` 不包含任何与 `Y1`, `Y2`, ..., `Yn` 中任何一个同名的属性。那么去组
    `s UNGROUP ( YR)` 是另一个关系 *r*。*r* 的标题由 `{X}` 和 `{Y}` 的集合并组成。至于其主体，设 *z* 是一个关系，其标题由
    `{X}` 扩展一个类型为 `TUPLE {Y}` 的属性 `YT` 组成，主体定义如下：对于 *s* 中的每个元组，*z* 包含一组元组，对于该 *s*
    元组中 `YR` 值里的每个元组，包含一个（称为 *t*）；每个这样的元组 *t* 包含一个 `X` 值（称为 *x*）等于所讨论 *s* 元组中的 `X`
    值，以及一个元组值（称为 *yt*）等于所讨论 *s* 元组中 `YR` 值里的某个元组。设 *z* 不包含其他元组。那么 *r* 是 `z UNWRAP
    ( YT)` 的结果。


    **示例**：设 *spq* 是表达式 `SP GROUP ( { P#, QTY } AS PQ_REL )` 的结果关系（*参见* 分组）。那么表达式


    ```

    spq UNGROUP ( PQ_REL )

    ```


    表示对 *spq* 进行去组操作。该去组结果是一个类型为 `RELATION {S# S#, P# P#, QTY QTY}` 的关系；如果 *spq* 是从图
    1 中作为关系变量 `SP` 的值所示的关系 *sp* 获得的，那么去组 *spq* 的结果就是 *sp* 本身。然而，假设 *spq* 额外包含一个元组，比如供应商
    S5 的元组，其中 `PQ_REL` 值是一个空关系；那么前述 `UNGROUP` 的结果将不包含供应商 S5 的元组（实际上，结果仍然恰好是关系 *sp*）。因此，一般来说，对关系
    *r* 进行去组操作，然后以看似逆向的方式再次对其进行分组，并不能保证回到 *r*（*对比* 分组）。


