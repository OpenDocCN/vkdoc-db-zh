    # The Relational Database Dictionary, Extended Edition

    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00027.png)


    ## implementation dependent

    Term used (in the SQL standard in particular) to refer to a feature whose semantics
    can vary from one implementation to another and don’t even have to be specified
    for any individual implementation. In other words, the term effectively means
    “undefined”; the implementation is free to decide how it will implement the feature
    in question, and the result of that decision need not be documented (it might
    even vary from release to release). An SQL example is the full effect of an `ORDER
    BY` clause if the specifications in that clause fail to specify a total ordering.


    ## implication

    If `p` and `q` are predicates, the implication `(p) IMPLIES (q)` is a predicate
    also. Let `(ip) IMPLIES (iq)` be an invocation of that predicate (where `ip` and
    `iq` are invocations of `p` and `q`, respectively). Then that invocation `(ip)
    IMPLIES (iq)` evaluates to `TRUE` if and only if `ip` evaluates to `FALSE` or
    `iq` evaluates to `TRUE` or both. (In other words, `(p) IMPLIES (q)` is equivalent
    to `(NOT(p)) OR (q)`.) *Note*: In the implication `(p) IMPLIES (q)`, `p` and `q`
    are the antecedent and the consequent, respectively. The parentheses enclosing
    them might not be needed in practice.


    **Examples**: For people with no training in formal logic, implication is notoriously
    difficult to come to grips with. Consider, e.g., the proposition `(2 + 2 = 4)
    IMPLIES (the sun is a star)` or, in more user-friendly terms, `IF (2 + 2 = 4)
    THEN (the sun is a star)`. This proposition evaluates to `TRUE`, because the antecedent
    and the consequent are both true; yet whether the sun is a star clearly has nothing
    to do with whether `2+2 = 4`. However, the following observation might help.


    Of the 16 dyadic connectives (*see* connective), some but not all are given common
    names such as `AND` and `OR`. But those names are really nothing more than a mnemonic
    device—they don’t have any intrinsic meaning, they’re chosen simply because the
    connectives so named have behavior that’s similar to (not necessarily the same
    as) that of their natural language counterparts. In particular, the connective
    called `IMPLIES` has, of the 16 connectives available, behavior that most closely
    resembles that of implication as usually understood in natural language. But nobody
    would or should claim that the two are the same thing. Moreover, the connectives
    are, necessarily, formally defined; that is, they’re defined purely in terms of
    the truth values, not the meanings, of their arguments (viz., the antecedent and
    consequent, in the case of `IMPLIES`), whereas the same obviously can’t be said
    of their natural language counterparts.


    By way of another example, the proposition `IF (2 + 2 = 5) THEN (Elvis lives)`
    also—perhaps even more counterintuitively—evaluates to `TRUE`, because the antecedent
    is false; yet whether Elvis is alive clearly has nothing to do with whether `2+2
    = 5`. Again, part of the justification (for the fact that the implication evaluates
    to `TRUE`, that is) is just that `IMPLIES` is formally defined. In this case,
    however, there’s another argument that might be a little more satisfying. Suppose
    the suppliers-and-parts database is subject to the constraint that red parts must
    be stored in London (constraint C2 from the examples under database constraint):


