    a key for `S`, because values of `{SNAME}` aren''t necessarily unique (though
    the values shown in Figure 1 do happen to be unique). Note too that, for example,
    `{S#,CITY}` isn''t a key for `S` either, because although its values are necessarily
    unique, it isn''t irreducible—we could remove the `CITY` attribute, and what would
    be left would still satisfy the uniqueness property. (Irreducibility is desirable
    because, without it, the system would be enforcing the wrong integrity constraint.
    In the case at hand, for example, it wouldn''t be enforcing the constraint that
    supplier numbers are "globally" unique, but merely the weaker constraint that
    they''re unique within each city.)'
