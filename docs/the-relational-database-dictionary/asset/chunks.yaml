- fmt: '# partial function


    Let `f` be a function with domain `d` and let `dd` be a superset of `d`; then
    `f` can be regarded as a partial function with domain `dd`. In other words, a
    partial function is a function, q.v., except that there can exist elements `x`
    of the domain that have no image `y` in the codomain. *Contrast* **total function**.


    ## Example


    Let `s` be the set of real numbers. Then "reciprocal of" is a partial function
    with domain and codomain both `s` (it’s partial because there’s one element of
    `s`, namely `0`, that has no reciprocal).


    # partial instantiation


    *See* **instantiation**.


    # partial ordering


    Let `s` be a set. Then a partial ordering on `s` is a dyadic truth valued operator,
    usually denoted "≤", such that for all `x`, `y`, and `z` in `s`:

    - `x ≤ y` or `y ≤ x` (or both, or possibly neither);

    - `x ≤ x` (reflexivity);

    - if `x ≤ y` and `y ≤ z`, then `x ≤ z` (transitivity);

    - if `x ≤ y` and `y ≤ x`, then `x = y` (antisymmetry).


    *Contrast* **total ordering**.


    ## Example


    Let `s` be an arbitrary set, let `p` be the power set of `s`, and let "≤" denote
    the set inclusion operator (more usually written "⊆"). Then "≤" is a partial ordering
    on `p`. (Moreover, it’s a partial ordering that isn’t a total ordering, except
    in the degenerate case in which the cardinality of `s` is either zero or one.)


    # partitioning


    Let `s` be a set. Then a partitioning of `s` is a set of subsets ("partitions")
    of `s` such that every element of `s` is an element of exactly one such subset.
    Note that:

    - partitions are pairwise disjoint;

    - their union is equal to `s`.


    *See also* **equivalence class**.


    # Peirce arrow


    *See* **NOR**.


    # persistence


    The property according to which data, once inserted into the database, remains
    there ("persists") until explicitly deleted. Base relvars in particular are persistent
    in this sense.


    # physical data independence


    *See* **data independence**.


    # physical database design


    The process (or the result of the process) of deciding, given some logical database
    design, how that logical design should map to whatever physical structures the
    target DBMS happens to support. Note, therefore, that the physical design should
    be derived from the logical design and not the other way around; ideally, in fact,
    it should be derived automatically.


    # picture


    *(Of a relation, attribute, or tuple)* *See* **table**, **column**, and **row**,
    respectively; *see also* **cell**. Note in all cases that there’s a logical difference
    between the picture and the thing pictured.


    # pipelining


    An implementation technique in which tuples of an intermediate result relation
    are produced and passed on to another operation one at a time instead of en bloc.
    *Contrast* **materialization** (first definition).


    # PJ/NF


    Projection-join normal form, q.v.


    # placeholder


    A free variable or parameter.


    # PNF


    Prenex normal form.


    # pointer


    An implementation construct. As is well known, pointers are excluded from the
    relational model. In fact, mixing pointers and relations—that is, allowing a "relation"
    to have an "attribute" whose values are pointers to "tuples" in some other "relation"
    (a state of affairs supported by several SQL products as well as by the SQL standard,
    despite the fact that it violates The Information Principle among other things)—has
    been described as The Second Great Blunder. (For the first, *see* **type**.) *See
    also* **referencing**.


    *Note*: Some writers reserve the term *pointer* to mean, specifically, one whose
    value is some kind of physical address, using the term *reference* (or some such
    term) for other kinds of pointers. This distinction might be useful in certain
    contexts but is irrelevant to the relational model. Note too that foreign keys
    in particular aren’t pointers; among other things, foreign key values identify
    tuples, which are values, whereas pointer values are addresses and therefore,
    by definition, identify variables (that’s why they violate The Information Principle).
    *See* **value**; **variable**.


    # polymorphic operator


    *See* **polymorphism**.


    # polymorphism


    Loosely, the idea that an operator might permit its arguments to be of different
    types on different invocations. *See* **generic polymorphism**; **inclusion polymorphism**;
    **overloading**.


    # positive


    Strictly greater than zero. *Contrast* **nonnegative**.


    # power set


    The set of all subsets of a given set. If the given set has cardinality `n`, the
    power set has cardinality `2ⁿ` (this count includes both the empty set and the
    set that’s identical to the original set, both of which are indeed subsets of
    the original set).


    # predicate


    A truth valued function. Given an arbitrary predicate, substituting arguments
    for the parameters of that predicate yields a proposition (thus, another way of
    thinking about a predicate is as a parameterized or generalized proposition).


    *Note*: If and only if that set of parameters is empty, the predicate degenerates
    to a proposition (i.e., it already is a proposition). In other words, all propositions
    are predicates, but most predicates aren’t propositions.


    # predicate calculus


    A sound and complete formal system having to do with predicates and connectives
    and the inferences that can be made using such predicates and connectives.


    *Note*: The principal difference between predicate calculus and propositional
    calculus, q.v., is that predicates, unlike propositions, are allowed to contain
    quantifiers and logic variables (both free and bound), which makes predicate calculus
    more powerful and more widely applicable.


    # predicate constant


    Same as **predicate**.


    # predicate expression


    An expression denoting a predicate; that is, an expression involving predicate
    constants, predicate variables, connectives, and parentheses.


    *Note*: Few logic texts if any actually use this term; in fact, logic texts in
    general don’t seem to have a term for the construct at all other than *predicate*
    itself (not even ones that use *propositional form* for a propositional expression,
    which might be expected to use the surely obvious *predicate form* for a predicate
    expression).


    ## Examples


    If `p` and `q` are predicate variables, then `p`, `q`, the conjunction `(p) AND
    (q)`, the disjunction `(p) OR (q)`, and the negation `NOT(p)` are all predicate
    expressions.


    # predicate form


    Same as **predicate expression**.


    # predicate logic


    Same as **predicate calculus**.


    # predicate variable


    A variable whose value is a predicate. (Some writers use the term to mean a free
    variable, but this usage is deprecated.)


    # premise / premiss


    In logic, something assumed to be true for the purposes of a proof or attempted
    proof.'
