- fmt: '## Small Divide


    One of the many relational division operators that have been defined over the
    years (see `division`). Let relations `r1`, `r2`, and `r3` be such that (a) attributes
    with the same name in `r1` and `r3` are of the same type, and so are attributes
    with the same name in `r3` and `r2` (in other words, `r1` and `r3` are joinable,
    and so are `r3` and `r2`); (b) the set `{X}` is the common attributes of `r1`
    and `r3`; (c) the set `{Y}` is the common attributes of `r3` and `r2`; and (d)
    the sets `{X}` and `{Y}` are disjoint.


    Then the division `r1` `DIVIDEBY` `r2` `PER` (`r3`)—where `r1` is the dividend,
    `r2` is the divisor, and `r3` is the “mediator”—is a relation with the same heading
    as `r1` and with body defined as follows: tuple `t` appears in that body if and
    only if it appears in `r1` and a tuple `<x,y>` with `x` equal to the `X` value
    in `t` appears in `r3`{`X,Y`} for all tuples `<y>` in `r2`{`Y`}. In other words,
    the expression `r1` `DIVIDEBY` `r2` `PER` (`r3`) is semantically equivalent to
    the expression `r1` `NOT` `MATCHING` ((`r1`{`X`} `JOIN` `r2`{`Y`}) `NOT` `MATCHING`
    `r3`). Contrast `Great Divide`.


    ### Example


    The division `S` `DIVIDEBY` `P` `PER` (`SP`) yields a relation with heading the
    same as that of relvar `S` and body consisting of all possible tuples `<s#,sn,st,sc>`
    from relvar `S` such that supplier `s#` supplies all parts mentioned in relvar
    `P`. (Given the sample values of Figure 1, the result contains just the tuple
    for supplier `S1`.) The expression is semantically equivalent to this one:


    ```

    S NOT MATCHING

    ( ( S { S# } JOIN P { P# } ) NOT MATCHING SP )

    ```


    An equivalent tuple calculus formulation is:


    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    PX RANGES OVER { P } ;

    SX WHERE FORALL PX ( EXISTS SPX

    ( SPX.S# = SX.S# AND SPX.P# = PX.P# ) )

    ```


    An equivalent `Tutorial D` formulation is:


    ```

    S WHERE ( ‼SP ) { P# } = P { P# }

    ```


    (see `image relation`).


    ## snapshot


    A derived relvar that’s real, not virtual (contrast `view`). The value of a given
    snapshot at a given time is the result of evaluating a certain relational expression
    (the snapshot defining expression, specified when the snapshot per se is defined)
    at some time prior to the time in question. The snapshot is “refreshed” (meaning
    the snapshot defining expression is reevaluated and the result assigned as the
    new current value of the snapshot) on demand or, more usually, when some prescribed
    event occurs, such as the passing of a certain interval of time.


    Note: The snapshot defining expression must mention at least one relvar, for otherwise
    the snapshot wouldn’t be, specifically, a relation variable.


    ### Example


    The following statement defines a snapshot called `LSS`:


    ```

    VAR LSS SNAPSHOT ( S WHERE CITY = ''London'' )

    REFRESH EVERY DAY ;

    ```


    The relation that’s the value of snapshot `LSS` at any given time is equal to
    the value of the snapshot defining expression `S WHERE CITY = ‘London’` as it
    was at most 24 hours prior to the time in question.


    ## sort/merge


    A join implementation technique.


    ## sorted logic


    A form of logic in which the values that are the subject of the logic are divided
    into *sorts* (i.e., types). Note: Most logic texts pay little or no attention
    to the notion of types; instead, they deal with unsorted logic, which effectively
    means they assume that everything is of the same type (often referred to as “the
    universe of discourse”).


    ## soundness


    That property of a formal system according to which, given a set `s` of sentences
    of the system, no sentence not implied by those in `s` can be derived using the
    rules of inference of that system (i.e., all theorems are tautologies). Contrast
    `completeness`.


    ## source relvar


    For the general meaning, see `inclusion dependency`. In the foreign key context
    in particular, the term is sometimes used as a synonym for `referencing relvar`,
    q.v.


    ## source tuple


    Term sometimes used in the foreign key context as a synonym for `referencing tuple`,
    q.v.


    ## SQL


    The best known attempt (unfortunately a seriously flawed one) to realize the abstract
    ideas of the relational model in concrete syntactic form. The name `SQL`—the official
    pronunciation is “ess cue ell,” though it’s often pronounced “sequel” (see `SEQUEL`)—was
    originally an abbreviation for *Structured Query Language*. In its standard incarnation,
    however, the name is just a name and isn’t considered to be an abbreviation for
    anything at all. The version of the SQL standard current at the time of writing
    is SQL:2003 (so called because it was ratified in 2003); the next and probably
    (?) final version is likely to be ratified in 2008.


    ## star join


    A join implementation technique.


    ## state constraint


    A database constraint that isn’t a `transition constraint`.


    ## statement


    1. (Logic) A `proposition`.

    2. (Programming languages) A construct that causes some action to occur, such
    as defining or updating a variable or changing the flow of control. Contrast `expression`.


    Note: Throughout this dictionary, the term *statement* should be understood in
    the programming language sense, unless the context demands otherwise.


    ### Example (second definition only)


    See the examples under `expression`.


    ## stored procedure


    A subroutine, possibly parameterized; in other words, an operator. Note: Like
    the term `encapsulated`, q.v., the term *stored procedure* has come to mean something
    that unfortunately mixes model and implementation considerations. From the point
    of view of the model, a stored procedure is indeed, as just stated, nothing more
    than an operator. In practice, however, stored procedures have a number of properties
    that make them much more important than they would be if they were just operators
    as such (although the first two of the following properties will probably apply
    to operators in general, at least if the operators in question are system defined).
    First, they’re compiled separately and can be shared by distinct applications.
    Second, their compiled code is, typically, physically stored at the site at which
    the data itself is physically stored, with obvious performance benefits. Third,
    they’re often used to provide shared functionality that ought to have been provided
    by the DBMS but isn’t (integrity checking is a good example here). See also `triggered
    procedure`.


    ## subexpression


    An expression nested inside another such.


    ## subject to update


    Let `Op` be an update operator that, when invoked, updates the argument corresponding
    to parameter `x`. Then parameter `x` is said to be subject to update (and any
    argument corresponding to `x` must be a variable specifically).


    ### Example


    See the second example under `argument`.


    ## subkey


    Loosely, a subset of a key. More precisely, let `X` be a subset of the heading
    of relvar `R`; then `X` is a subkey for `R` if and only if there exists some key
    `K` for `R` such that `K` is a superset of `X`.


    ### Examples


    The subkeys for relvar `SP` are `{S#,P#}`, `{S#}`, `{P#}`, and `{}`. Note that
    the empty set `{}` is necessarily a subkey for all possible relvars `R`.


    ## subquery


    In general, a relational expression nested inside another such; in SQL, a `SELECT`
    expression in parentheses.


    ## subset


    Set `s2` is a subset of set `s1` (“`s2` ⊆ `s1`”) if and only if every element
    of `s2` is also an element of `s1`. Observe that every set is a subset of itself,
    also that the empty set is a subset of every set. Contrast `proper subset`.'
