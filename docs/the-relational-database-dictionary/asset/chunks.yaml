    ## 不可区分者同一性原则

    该原则指出，如果无法以任何方式区分两个对象，那么就不存在两个对象，而只有一个。或者等价地说：每个对象都有其唯一身份。*注意*：在关系模型中，这种唯一身份与其他所有东西一样表示——即，通过属性值（*参见*
    信息原则）——并且由此产生了许多好处。还要注意，不可区分性与可替换性之间存在逻辑差异——两个对象可能是可替换的但又是可区分的（例如，想想两枚一分硬币）。最后请注意，此处的术语
    `对象` 并非在其 `OO`（面向对象）意义上使用。


    ## 不连贯原则

    一个有时被用来为不太成功的批评技术问题的尝试辩护的原则，大意是：如果被批评的东西本身就不连贯，那么要连贯地批评它是很难的。偶尔被不太客气地称为不连贯原则。


