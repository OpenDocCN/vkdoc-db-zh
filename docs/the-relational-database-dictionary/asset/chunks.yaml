    **N**


    ***n-*****adic** ( *Of an operator*) Having exactly *n* operands; i.e., being
    defined in terms of exactly *n* parameters ( *n* ≥ 0). *Note*: Let *Op* be a dyadic
    operator.


    If we want to define an *n*-adic version of *Op,* then it’s necessary—at least
    if that *n*-adic version is intended to apply to a set, as opposed to a sequence,
    of operands—that *Op* be both commutative and associative. Examples of such operators
    defined in this dictionary include (a) the logical operators AND, EQUIV, OR, and
    XOR and (b) the relational operators intersect, join, product, and union.


    ****n-ary** (Of a heading, key, tuple, tuplevar, relation, or relvar) Of degree
    n (n ≥ 0).


    *****n-*****place** ( *Of a predicate*) Same as *n*-adic ( *n* ≥ 0).


    *****n*****-tuple** A tuple of degree *n* ( *n* ≥ 0).


    ****NAND** In logic, a dyadic connective (also known as the Sheffer stroke and
    usually written as a vertical bar, “|”); if *p* and *q* are predicates, then (
    *p*)|( *q*) is a predicate also. Let ( *ip*)|( *iq*) be an invocation of that
    predicate (where *ip* and *iq* are invocations of *p* and *q,* respectively).
    Then that invocation ( *ip*)|( *iq*) evaluates to FALSE if and only if *ip* and
    *iq* both evaluate to TRUE.


    (In other words, ( *p*)|( *q*) is equivalent to NOT(( *p*) AND ( *q*)).) *Note*:
    The parentheses enclosing *p* and *q* in the expression ( *p*)|( *q*) might not
    be needed in practice. Also, NAND as just defined is a logical operator; however,
    the algebra **A**, q.v., includes an operator called NAND that—by definition—is
    an algebraic operator instead (it’s basically “complement of join”).


    ****natural join** 1\. ( *Dyadic case*) Let relations *r1* and *r2* be such that
    attributes with the same name are of the same type (in other words, let *r1*


    and *r2* be joinable, q.v.). Then the natural join of *r1* and *r2,* *r1* JOIN
    *r2,* is a relation with heading the set theory union of the headings of *r1*
    and *r2*


    and with body the set of all tuples *t* such that *t* is the set theory union
    of a tuple from *r1* and a tuple from *r2*. 2\. ( *N-adic case*) Let relations
    **The Relational Database Dictionary, Extended Edition**


    **113**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00154.png)


    *r1, r2, . . ., rn* ( *n* ≥ 0) be such that attributes with the same name are
    of the same type (in other words, let *r1, r2, . . ., rn* be joinable, q.v.).
    Then the natural join JOIN { *r1,r2,. . .,rn*} is defined as follows: If *n* =
    0, the result is TABLE_DEE; if *n* = 1, the result is *r1*; otherwise, choose
    any two distinct relations from the set *r1, r2, . . ., rn* and replace them by
    their (dyadic) natural join, and repeat this process until the set consists of
    just one relation *r,* which is the overall result.


    **Example*: The expression S JOIN SP denotes the natural join of the relations
    that are the current values of relvars S and SP. That join is a relation of type
    RELATION {S# S#, SNAME NAME, STATUS


    INTEGER, CITY CHAR, P# P#, QTY QTY}. Moreover, if the current values of relvars
    S and SP are *s* and *sp,* respectively, the body of that relation consists of
    all tuples of the form < *s#,sn,st,sc,p#,q*> such that the tuple < *s#,sn,st,sc*>
    appears in *s* and the tuple < *s#,p#,q*> appears in *sp*.


    **negation** If *p* is a predicate, its negation NOT( *p*) is a predicate also.


    Let NOT( *ip*) be an invocation of that predicate (where *ip* is an invocation
    of *p*). Then that invocation NOT( *ip*) evaluates to TRUE if and only if *ip*
    evaluates to FALSE. *Note*: The parentheses enclosing *p* in the expression NOT(
    *p*) might not be needed in practice.'
