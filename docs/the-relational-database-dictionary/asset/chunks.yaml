- fmt: 'Cascading a delete operation is a typical example. Such actions should be
    specified declaratively, and users should generally be aware of them; that is,
    users should generally know when their update requests are shorthand for some
    more extensive set of actions, for otherwise they might perceive an apparent violation
    of The Assignment Principle, q.v. See also multiple assignment; set level.


    ### complement

    Let `r` be a relation with heading `{H}` and body `{b}`. Then the complement of
    `r` is the unique relation with heading `{H}` and body consisting of all tuples
    with heading `{H}` not appearing in `{b}`.


    ### complement (Set theory)

    The complement—also known as the absolute complement—of a set `s` is the set of
    all elements not appearing in `s`. *Note*: The difference between sets `s1` and
    `s2`, in that order, is sometimes referred to as the relative complement of `s2`
    with respect to `s1` (see difference); thus, the absolute complement of `s` is
    in fact the relative complement of `s` with respect to the universal set, q.v.
    See also Boolean algebra (second definition).


    ### complementarity

    1.  (Logic) The disjunction of a predicate and its negation is a tautology, q.v.;
    the conjunction of a predicate and its negation is a contradiction, q.v.

    2.  (Set theory) The union of a set and its complement is equal to the universal
    set, q.v.; the intersection of a set and its complement is equal to the empty
    set, q.v.


    ### completeness

    (Not to be confused with computational, relational, or truth functional completeness,
    q.v.) That property of a formal system according to which, given a set `s` of
    sentences of the system, all sentences implied by those in `s` can be derived
    using the rules of inference of that system (i.e., all tautologies are theorems).
    Contrast soundness.


    ### component (Of a tuple)

    See tuple component.


    ## COMPOSE

    See composition.


    ---


    **The Relational Database Dictionary, Extended Edition**


    **31**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00098.png)


    ### composite attribute / compound attribute

    Deprecated terms for a combination of two or more attributes. The terms are deprecated
    because a “composite” or “compound” attribute isn’t actually an attribute at all.


    ### composite key / compound key

    A key consisting of two or more attributes.

    *Example*: In the suppliers-and-parts database, `SP` is the only relvar with a
    composite key (namely, `{S#,P#}`).


    ### composite predicate / compound predicate

    A predicate that involves at least one connective.


    ### composite proposition / compound proposition

    A proposition that involves at least one connective.


    ### composite statement / compound statement

    Syntactically, a statement that contains other statements nested inside itself.

    *Examples*: Conventional `IF`, `DO`, `WHILE`, `CASE` statements; `BEGIN . . .
    END . . .` statement blocks; multiple assignment statements; and many others.


    ### composition

    1.  (Dyadic case) Let `r1` and `r2` be relations. Then the composition of `r1`
    and `r2`, `r1 COMPOSE r2`, is shorthand for `(r1 JOIN r2){X}`, where `{X}` is
    all of the attributes of `r1` and `r2` apart from common ones.

    2.  (N-adic case) Let `r1`, `r2`,..., `rn` (`n` ≥ 0) be relations. Then the composition
    `COMPOSE {r1, r2,..., rn}` is shorthand for `(JOIN {r1, r2,..., rn}){X}`, where
    `{X}` is all of the attributes of `r1`, `r2`,..., `rn` apart from ones common
    to at least two of those relations. See also tuple composition.


    *Example*: See the example under recursive query.


    **32**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00201.png)


    ### computational completeness

    A language is computationally complete if and only if it supports the computation
    of all computable functions (where a computable function is a function that can
    be computed by a Turing machine in a finite number of steps).'
