    *exp2*.


    **selection** *See* restriction.


    ****selector** An operator—read-only by definition—for selecting, or specifying,
    an arbitrary value of a given type; not to be confused with the SELECT operation
    of SQL (for a loose characterization of this latter, *see* SELECT expression).
    Every type, tuple and relation types included, has at least one associated selector.
    *Note*: Ultimately, the only way any **164**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00190.png)


    expression can ever yield a value of type *T* is via invocation of some selector
    for that type *T*. In fact, the selector notion is essentially a generalization
    of the familiar concept of a literal; that is, all literals are selector invocations,
    but some selector invocations aren’t literals (to be specific, a selector invocation
    is a literal if and only if all of its arguments are themselves specified as literals).


    **Examples*: Several selector invocations appear in the example under INSERT;
    however, those examples are all literals, since their arguments are themselves
    all specified as literals in turn. Here by contrast are some selector invocations
    that aren’t literals. Let SX, PX, and QX be variables of types CHAR, CHAR, and
    INTEGER, respectively. Then (a) the expressions S#(SX), P#(PX), and QTY(QX) are
    selector invocations for types S#, P#, and QTY, respectively; (b) the expression
    TUPLE


    {S# S#(SX), P# P#(PX), QTY QTY(150)} is a selector invocation for tuple type TUPLE
    {S# S#, P# P#, QTY QTY}; and (c) the expression


    RELATION { *ts*}, where *ts* is the tuple selector invocation just shown, is a
    selector invocation for relation type RELATION {S# S#, P# P#, QTY


    QTY}. Further explanation is beyond the scope of this dictionary.


    ****self-referencing relvar** A relvar *R* with a foreign key that refers to some
    candidate key of *R* itself (hence giving rise to a referential cycle, q.v., of
    length one). Database designs involving such relvars are usually contraindicated.


    ****semantic** Pertaining to meaning or semantics (of a language, sentence, etc.).
    *Contrast* lexical; syntactic.


    ****semantic modeling** A rather vague term, never very precisely defined, having
    to do with the representation of meaning within a formal database design. Other
    terms used in the same or a related sense include conceptual modeling; data modeling
    (q.v.); entity modeling; entity/relationship modeling (q.v.); and object modeling.
    *See* *also* RM/T.


    ****The Relational Database Dictionary, Extended Edition**


    **165**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00176.png)


    **semantic optimization** Using integrity constraints to help in transforming
    relational expressions, usually for performance purposes. *See* expression transformation;
    optimizer.


    **Example*: Consider the query


    P WHERE CITY = ''London'' AND COLOR = ''Red''


    Suppose relvar P is subject to the constraint that parts in London must be red.
    Then the query can clearly be transformed into the following simpler one:


    P WHERE CITY = ''London''


    Moreover, if the original query had requested blue parts instead of red ones,
    the optimizer might be able to determine that the result is empty without actually
    having to execute the query at all.


    ****semantic override** Same as domain check override.


    ****semantics** ( *Plural word treated as singular*) Meaning; pertaining to meaning.
    *Note*: Semantics is often confused with syntax, especially in nontechnical contexts.
    But when we say something, semantics is what we mean, while syntax is merely how
    we say it. Semantics is more important than syntax, at least from a logical point
    of view.


    ****semidifference** Let *r1* and *r2* be relations. Then the semidifference between
    *r1* and *r2* (in that order), *r1* NOT MATCHING *r2,* is shorthand for *r1* MINUS
    ( *r1* MATCHING *r2*).


    **Example*: The expression


    S NOT MATCHING SP


    yields suppliers who currently supply no parts at all.


    ****SEMIJOIN** Same as MATCHING.


    ****166**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00013.png)


    **semijoin** Let *r1* and *r2* be relations. Then the semijoin of *r1* with *r2*


    (in that order), *r1* MATCHING *r2,* is shorthand for ( *r1* JOIN *r2*){ *X*},
    where { *X*} is the heading of *r1*. Note that *r1* MATCHING *r2* and *r2*


    MATCHING *r1* aren’t equivalent, in general.


    **Example*: The expression


    S MATCHING SP


    yields suppliers who currently supply at least one part.


    ****SEMIMINUS** Same as NOT MATCHING.


    ****sentence** *See* logical system.


    ****SEQUEL** “Structured English Query Language” (the original name for SQL).


    ****set** A collection of objects, called elements, with the property that given
    an arbitrary object *x,* it can be determined whether *x* appears in the collection
    ( *see* set membership). An example is the collection { *y,x,z*}, which can equivalently
    be written as { *x,y,z*}, since sets have no ordering to their elements (nor do
    they contain any duplicate elements). Every subset of a set is itself a set. *See
    also* class (first definition). *Note*: There’s a logical difference (actually
    a difference in type) between an element *x* and the set


    { *x*} that contains just that element *x*. Thus, a relational language needs
    to provide both (a) an operator for extracting the single tuple from a relation
    of cardinality one and (b) an operator for extracting the single attribute value
    from a tuple of degree one ( *see* attribute extractor; tuple extractor).


    Note too that the inverse functionality—in effect, building up a tuple from specified
    attribute values and building up a relation from specified tuple values—is provided
    by the appropriate tuple and relation selectors ( *see* selector).


    ****set algebra** *See* Boolean algebra (second definition).


    ****set function** Deprecated (because highly inappropriate) term for an aggregate
    operator.


    ****The Relational Database Dictionary, Extended Edition**


    **167**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00121.png)


    **set inclusion** Set *s1* includes set *s2* (“*s1* ⊇ *s2*”) if and only if it
    is a superset of *s2*; set *s2* is included in set *s1* (“*s2* ⊆ *s1*”) if and
    only if it is a subset of *s1*. Set *s1* is equal to set *s2* (“*s1* = *s2*”)
    if and only if each includes the other. Observe that every set is included in
    itself, also that every set includes the empty set. Observe also that the term
    *set inclusion* is usually taken, a trifle arbitrarily, to refer to the “⊆” operator
    specifically, not the “⊇” operator. *Note*: The term *containment* is sometimes
    used as a synonym for inclusion in the present sense, but this usage is deprecated—


    better to say of a set that it *contains* its elements ( *see* containment) but
    *includes* its subsets.'
