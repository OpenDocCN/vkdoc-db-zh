    ****constraint inference** The process of determining the constraints that apply
    to a given derived relvar or are satisfied by a given derived relation.


    ****containment** Generally, the relationship between a container and the things
    it contains; in particular, the relationship between a bag or set and its elements.
    *Contrast* inclusion.


    ****contradiction** A predicate whose every possible invocation is guaranteed
    to yield FALSE, regardless of what arguments are substituted for its parameters.
    *Note*: A contradiction in logic isn’t quite the same thing as a contradiction
    in ordinary discourse. Loosely, we might say that (a) in ordinary discourse, a
    contradiction is something that implies that some proposition *p* and its negation
    NOT( *p*) are both true, while (b) in logic, by contrast, it’s anything that’s
    “always FALSE” (including, for example, the truth value FALSE itself). *Contrast*
    tautology.


    **Examples*: Let *p1* be the predicate (actually a proposition) 2+2 = 5; let *p2*


    be the predicate *x* > *x,* where *x* denotes an arbitrary integer; and let *p3*
    be the predicate ( *p*) AND (NOT( *p*)), where *p* denotes an arbitrary proposition.


    Then *p1, p2,* and *p3* are all contradictions.


    ****contrapositive** The contrapositive of the implication IF ( *p*) THEN ( *q*)
    is the logically equivalent implication IF (NOT( *q*)) THEN (NOT ( *p*)).


