    （**属性、类型、值或变量的**；用作形容词）非标量（`q.v.`）的一种特殊情况，其中用户可见的组成部分通常要求全部是相同类型；因此，例如，数组和关系类型可能被视为集合类型，但元组类型通常不会。该术语也用作名词，在这种情况下，它是集合类型或集合值或集合变量（取决于上下文）的任意或所有组合的缩写。


    ## column

    1. (a) 某个关系或关系变量的属性，或 (b) 某个关系或关系变量的某个属性的包或值集合，或 (c) 某个关系或关系变量的某个属性的类型，或有时甚至是
    (d) 某个元组或元组变量的属性，或 (e) 某个元组或元组变量的某个属性的值，或 (f) 某个元组或元组变量的某个属性的类型（根据上下文要求）的SQL类比。

    2. 更一般地，属性的图示（例如在纸上）。`see also` 单元格；行；表。


    ## common attribute

    两个或多个关系或关系变量共有的属性。


    **示例**：在供应商-零件数据库中，(a) 对 `<S#,S#>` 是关系变量 `S` 和 `SP` 中的公共属性；(b) 对 `<P#,P#>` 是关系变量
    `SP` 和 `P` 中的公共属性；(c) 对 `<CITY,CHAR>` 是关系变量 `S` 和 `P` 中的公共属性。我们也可以更简单但更不正式地说，(a)
    `S#` 是关系变量 `S` 和 `SP` 的公共属性，(b) `P#` 是关系变量 `SP` 和 `P` 的公共属性，(c) `CITY` 是关系变量 `S`
    和 `P` 的公共属性。


    ## commutative group

    `see` 群（数学）。


    ## commutativity

    令 *Op* 为一个二元运算符，并假设为明确起见 *Op* 以中缀风格表示。那么，当且仅当对于所有 *x* 和 *y*，`x Op y = y Op x`
    成立时，*Op* 是可交换的。


    **示例**：在普通算术中，加法（“+”）是可交换的，因为对于所有 *x* 和 *y*：


    ```

    x + y = y + x

    ```


    同样地，在关系代数中，`UNION` 和 `JOIN` 是可交换的（相比之下，`MINUS` 不是）。同样，在逻辑中，`OR` 和 `AND` 是可交换的（相比之下，`IMPLIES`
    不是）。


    *注意*：碰巧所有上述可交换运算符也都是可结合的（`q.v.`）。可交换但不可结合的运算符的例子包括逻辑运算符 `NAND` 和 `NOR`（`q.v.`）。


    ## comparison

    形如 `(exp1) theta (exp2)` 的布尔表达式，其中 `exp1` 和 `exp2` 是相同类型 *T* 的表达式，而 `theta` 是适用于类型
    *T* 值的任何有意义的比较运算符（肯定是“=”或“≠”，也可能包括“>”等）。*注意*：比较中包围 `exp1` 和 `exp2` 的括号在实践中可能不需要。


    ## compensating action / compensatory action

    系统在执行某个请求的更新之外自动执行的一种更新，旨在避免可能发生的某些完整性违反。'
