    ****parameter** A formal operand in terms of which some operator is defined, to
    be replaced by some argument when the operator in question is invoked.


    Simplifying slightly ( *see* generic operator), every parameter is declared to
    be of some type, and any argument corresponding to a given parameter is required
    to be of the same type as that parameter. *Contrast* argument.


    ****parent / parent table** Deprecated, because inappropriate, terms sometimes
    used in SQL contexts to mean (the SQL analog of) a referenced relvar, q.v.'
  trans: '

    ## 优化器

    DBMS 中负责优化的部分，参见*q.v.*。


    ## 可选参与

    参见`基数约束`。


    ## 或

    参见`析取`。*注*：通常理解的“或”是一个逻辑运算符；然而，代数**A**（参见*q.v.*）包含一个名为“或”的运算符，根据定义，它是一个代数运算符（实际上，它是并集的一种广义形式）。


    ## ORDER BY

    参见`排序`。


    ## 有序 n 元组

    参见`有序对`。注意，有序*n*-元组不是关系模型意义上的元组（关系模型中的元组其分量没有顺序）。


    ## 有序对

    一种组合，通常记为<*x, y*>，由恰好两个元素*x*和*y*组成，其中*x*是第一元素，*y*是第二元素。有序对<*x1, y1*>和<*x2, y2*>相等当且仅当*x1*
    = *x2*且*y1* = *y2*（因此，一般来说<*x, y*> ≠ <*y, x*>）。形式上，<*x, y*>被定义为等于集合{{*x*}, {*x,
    y*}}；请注意，该集合中的一个元素确定了构成有序对的元素，另一个元素则确定了这些元素中哪一个排在第一位。*注*：这个定义可以轻松扩展到有序三元组、有序四元组，...，以及更一般地，对于任意*n*
    > 1 的有序*n*-元组。


    ## 有序元组

    参见`有序 n 元组`。


    ## 排序

    为关系的属性施加从左到右的序列，特别是为元组施加从上到下的序列的过程，或该过程的结果，以便将相关关系中的数据转移出关系上下文，进入一个依赖此类序列的环境。请求这种排序（或称“定序”）的运算符具有重要的实用价值，但它们不是关系运算符，因为其结果不是关系。*注*：思考此类运算符的一个便捷方式是，它们将关系转换为表（因为表与关系不同，其列具有从左到右的顺序，行具有从上到下的顺序）。


    *示例*：提供此功能的 SQL 运算符是`SELECT`（用于从左到右的列序）和`ORDER BY`（用于从上到下的行序）。


    *注*：顺便值得指出，`ORDER BY`不是函数——也就是说，给定`ORDER BY`调用的结果通常是不确定的（例如，考虑`ORDER BY CITY`对图
    1 所示的、作为`relvar S`当前值的关系的影响）。相比之下，关系代数的运算符确实都是函数。（顺便说一句，这些运算符的 SQL 模拟并不总是如此，因为
    SQL 允许即使`v1`和`v2`不是相同值，`v1 = v2`形式的比较也返回`TRUE`。）`ORDER BY`在另一个方面也不同寻常。具体来说，它产生一个元组序列作为其结果，然而运算符“<”和“>”对于元组是明确定义不适用的（参见`元组比较`）。


    ## 排序（数学）

    参见`偏序`；`全序`。


    ## 序数类型

    一种定义了`全序`（参见*q.v.*）的类型。设`T`为这样一种类型。那么，通常与类型`T`相关联的运算符将包括：(a) 零元`FIRST`和`LAST`运算符，分别根据该全序返回类型`T`的第一个值和最后一个值；(b)
    一元`NEXT`和`PRIOR`运算符，给定类型`T`的一个值`v`，分别返回在类型`T`中紧随`v`之后的值和紧接`v`之前的值，同样根据该全序。


    *示例*：类型`INTEGER`是一个序数类型。`NEXT`和`PRIOR`运算符基本上分别就是`加一`和`减一`。`FIRST`和`LAST`运算符通常不直接支持，但返回最小和最大整数的选择器调用足以满足需求。


    作为反例，假设系统还支持一个类型`POINT`，可能是用户定义的，表示二维空间中的几何点。那么类型`POINT`大概不会是一个序数类型，因为一个点以某种方式小于或大于另一个点的概念没有意义。


    ## 正交的

    独立的。


    ## 正交分解

    将某个给定的`关系变量`分解为限制条件，使得这些限制条件满足`正交设计原则`。


    *示例*：假设我们用两个关系变量`LP`和`HP`替换`关系变量 P`，`LP`包含重量小于或等于 17.0 的零件的元组，`HP`包含重量大于 17.0
    的零件的元组；那么该分解就是正交的。相比之下，假设`关系变量 HP`被定义为包含重量大于*或等于*17.0 的零件的元组；那么该分解就不是正交的，因为重量等于
    17.0 的零件的元组在逻辑上应同时属于`LP`和`HP`。


    ## 正交设计原则

    参见`正交设计原则`。


    ## 重载

    为两个或多个不同的运算符使用相同的名称。这些运算符最好具有相似的语义。


    *注*：重载也被更具体地称为重载多态；它也被称为特设多态。在继承上下文中，该术语有时也用来表示`包含多态`（参见*q.v.*）；但是，这种特定用法不被推荐，因为它基于对子类型和超类型本质的有缺陷的理解。进一步的细节超出了本词典的范围。


    *示例*：`UNION`被重载，因为该名称（即名称）被用于表示关系并集和元组并集（而在 SQL 中它也被用于表示并集加上，尽管奇怪的是它本身不表示包并集）。同样，“=”被重载，因为它适用于每种类型的值（即，存在用于整数的“=”运算符，另一个用于供应商编号，另一个用于类型为`RELATION
    {S# S#, P# P#, QTY QTY}`的关系，等等）。


    ## 覆盖

    用另一个具有相同名称、相同参数数量、相同参数和结果类型——即相同`特征`（参见*q.v.*）——但不同语义的运算符替换一个运算符。（它与`域检查覆盖`（参见*q.v.*）无关。）*对比*`重载`。


    *示例*：假设存在一个名为`LOG`的运算符（可能是内置的），它返回自然对数。那么可能可以用一个返回以十为底的对数的运算符来覆盖它。


    ## OWA

    开放世界假设。


    ## P-关系

    参见`RM/T`。


    ## 对

    指基数为二的集合，或者更常见的是指`有序对`（参见*q.v.*），具体取决于上下文。


    ## 参数

    定义某个运算符所依据的形式操作数，当调用该运算符时，将被某个`实参`替换。（稍微简化一下，参见`泛型运算符`，）每个参数都被声明为某种类型，并且任何与给定参数对应的实参必须与该参数类型相同。*对比*`实参`。


    ## 父表

    有时在 SQL 上下文中用来表示（SQL 模拟的）`被引用关系变量`（参见*q.v.*）的术语，因不恰当而被弃用。

