    over an empty set). Observe further that the expression EXISTS *x* ( *p*( *x*))
    is logically equivalent to the expression NOT (FORALL *x* (NOT ( *p*( *x*)))).


    *See also* UNIQUE; *contrast* universal quantifier.


    **Examples*: *See* bound variable; domain calculus; free variable; tuple calculus;
    and elsewhere.


    ****EXISTS** *See* existential quantifier. In the literature, EXISTS is often
    represented by a backward E, thus: ∃.


    **expanded Cartesian product *See* Cartesian product.


    **expressible relation** Any relation that, given a particular set of relations,
    is either contained in that set or can be derived from those that are ( *see*
    derived relation).


    ****expressible relvar** Any relvar that, given a particular set of relvars, is
    either contained in that set or can be derived from those that are ( *see* derived
    relvar).


    ****expression** In a programming language, a read-only operator invocation; a
    construct that denotes a value; hence, a rule for computing, or determining, the
    value in question. Every expression is of some type—namely, the type of the value
    it denotes. Note that constant and variable names (i.e., variable references,
    q.v.) are both considered to be read-only operator invocations and hence both
    constitute legal expressions. *Contrast* statement.


    **Examples*: X+Y is an expression; in fact, it’s an invocation of the “+”


    operator, and it denotes the value that’s the sum of the current values of the
    variables X and Y. By contrast,


    Z := X + Y ;


    **The Relational Database Dictionary, Extended Edition**


    **63**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00078.png)


    is a statement; it assigns the value denoted by the expression X+Y on the right
    side to the variable Z referenced on the left side. *Note*: In both of the foregoing
    examples, X and Y are variable references and thus themselves expressions in turn.


    ****expression transformation** Transforming a given expression into another,
    semantically equivalent expression. The process applies to relational expressions
    in particular, where it’s sometimes called “query rewrite.”


    Query rewrite is typically done for performance reasons; it can be done either
    by the user or, much more importantly, by the system ( *see* optimizer). *Note*:
    The term *query rewrite* is also used in certain commercial products with a somewhat
    more limited meaning. *Caveat* *lector.*


    **Example*: The relational expression ( *r* WHERE *br*) JOIN ( *s* WHERE *bs*)
    is semantically equivalent to the relational expression ( *r* JOIN *s*) WHERE


    ( *br*) AND ( *bs*); therefore, either expression can be transformed into the
    other. Transforming the second into the first is likely to be advantageous from
    a performance standpoint, because the first means doing the restrictions before
    the join; thus, it’s likely that the input relations to the join will be smaller
    and the output will be smaller too. In fact, this transformation could make the
    difference between keeping the result of the join in memory and having to spill
    it out on to the disk.


    ****EXTEND** *See* extension.


    **extended Cartesian product *See* Cartesian product.


    Extensible Markup Language *See* XML.


    **extension** 1\. ( *Relational algebra*) Let *r* be a relation. Then the extension
    EXTEND *r* ADD ( *exp* AS *X*) is a relation with (a) heading the heading of *r*
    extended with attribute *X,* and (b) body consisting of all tuples *t* such that
    *t* is a tuple of *r* extended with a value for attribute *X* that’s computed
    by evaluating the expression *exp* on that tuple of *r*. Relation *r* must not
    have an attribute called *X,* and *exp* must not refer to *X*. *See also* tuple
    extension.


