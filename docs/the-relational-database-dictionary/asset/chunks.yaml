- fmt: '**( *SELECT*) 从每个剩余的组中，通过应用 `SELECT` 和 `GROUP BY` 子句共同指定的组合（汇总、扩展、重命名和“投影”操作）来导出一行。


    **( *DISTINCT*) 丢弃冗余的重复行。


    在任何更精确的解释中，都需要考虑以下因素：

    - 表中列出的 SQL 表与其关系对应物之间的所有差异

    - 各个子句都可以包含子查询（q.v.）这一事实

    - 某些子查询可以是“关联的”这一事实

    - 某些子查询可以是“横向的”这一事实

    - 某些基本操作（包括相等性（`=`））没有完全定义（在某些情况下，实际上它们被明确允许为 SQL 标准所称的“可能非确定性”），意味着其结果是不可预测的


    对此类事项的进一步解释超出了本词典的范围。


    **注意**：令 `exp1` 和 `exp2` 为 `SELECT` 表达式。那么 SQL 允许以 `exp1` 和 `exp2` 为基础，形成各种并集、交集和差集。


    ### selection

    *参见* restriction。


    ### selector

    一种运算符（按定义是只读的），用于选择或指定给定类型的任意值；不要与 SQL 的 `SELECT` 操作混淆（关于后者的一个宽松描述，*参见* `SELECT`
    表达式）。每种类型（包括元组和关系类型）都至少有一个关联的选择器。*注意*：最终，任何表达式要产生类型为 `T` 的值，唯一的方式是通过调用该类型 `T`
    的某个选择器。事实上，选择器的概念本质上是熟悉概念“字面量”的推广；也就是说，所有字面量都是选择器调用，但并非所有选择器调用都是字面量（具体来说，一个选择器调用是字面量，当且仅当其所有参数本身都被指定为字面量）。


    ### selector 示例

    在 `INSERT` 的示例中出现了几个选择器调用；然而，那些示例都是字面量，因为它们的参数本身也被指定为字面量。与此相反，这里是一些不是字面量的选择器调用。令
    `SX`、`PX` 和 `QX` 分别为 `CHAR`、`CHAR` 和 `INTEGER` 类型的变量。那么 (a) 表达式 `S#(SX)`、`P#(PX)`
    和 `QTY(QX)` 分别是类型 `S#`、`P#` 和 `QTY` 的选择器调用；(b) 表达式 `TUPLE {S# S#(SX), P# P#(PX),
    QTY QTY(150)}` 是元组类型 `TUPLE {S# S#, P# P#, QTY QTY}` 的选择器调用；以及 (c) 表达式 `RELATION
    { ts }`（其中 `ts` 是刚展示的元组选择器调用）是关系类型 `RELATION {S# S#, P# P#, QTY QTY}` 的选择器调用。进一步的解释超出了本词典的范围。


    ### self-referencing relvar

    一个关系变量 `R`，其外键引用 `R` 本身的某个候选键（从而产生一个长度为 1 的引用循环，q.v.）。涉及此类关系变量的数据库设计通常是不推荐的。


    ### semantic

    关于意义或语义（语言的、句子的等）的。*对比* lexical；syntactic。


    ### semantic modeling

    一个相当模糊的术语，从未被精确定义过，涉及在形式化数据库设计中表示意义。用于相同或相关含义的其他术语包括 conceptual modeling；data
    modeling（q.v.）；entity modeling；entity/relationship modeling（q.v.）；以及 object modeling。*另见*
    RM/T。


    ### semantic optimization

    使用完整性约束来帮助转换关系表达式，通常是为了性能目的。*参见* expression transformation；optimizer。


    ### semantic optimization 示例

    考虑查询：

    ```

    P WHERE CITY = ''London'' AND COLOR = ''Red''

    ```

    假设关系变量 `P` 受以下约束：伦敦的零件必须是红色的。那么该查询显然可以转换为以下更简单的查询：

    ```

    P WHERE CITY = ''London''

    ```

    此外，如果原始查询请求的是蓝色零件而不是红色零件，优化器可能能够确定结果为空，而根本无需实际执行查询。


    ### semantic override

    与 domain check override 相同。


    ### semantics

    （*复数形式被视为单数*）意义；关于意义的。*注意*：语义常与句法混淆，尤其是在非技术性上下文中。但当我们说某事时，语义是我们所指的意义，而句法仅仅是我们表达的方式。至少从逻辑的角度来看，语义比句法更重要。


    ### semidifference

    令 `r1` 和 `r2` 为关系。那么 `r1` 和 `r2` 之间的半差（按此顺序），`r1 NOT MATCHING r2`，是 `r1 MINUS
    ( r1 MATCHING r2 )` 的简写。


    ### semidifference 示例

    表达式：

    ```

    S NOT MATCHING SP

    ```

    产生当前不供应任何零件的供应商。


    ### SEMIJOIN

    与 `MATCHING` 相同。


    ### semijoin

    令 `r1` 和 `r2` 为关系。那么 `r1` 与 `r2` 的半连接（按此顺序），`r1 MATCHING r2`，是 `( r1 JOIN r2 ){
    X }` 的简写，其中 `{ X }` 是 `r1` 的标题。注意 `r1 MATCHING r2` 和 `r2 MATCHING r1` 通常不等价。


    ### semijoin 示例

    表达式：

    ```

    S MATCHING SP

    ```

    产生当前至少供应一个零件的供应商。


    ### SEMIMINUS

    与 `NOT MATCHING` 相同。


    ### sentence

    *参见* logical system。


    ### SEQUEL

    “结构化英语查询语言”（SQL 的原名）。


    ### set

    一个对象的集合，称为元素，具有以下性质：对于任意对象 `x`，可以确定 `x` 是否出现在该集合中（*参见* set membership）。一个例子是集合
    `{ y, x, z }`，它可以等价地写成 `{ x, y, z }`，因为集合的元素没有顺序（也不包含重复元素）。集合的每个子集本身也是一个集合。*另见*
    class（第一个定义）。*注意*：一个元素 `x` 和仅包含该元素 `x` 的集合 `{ x }` 之间存在逻辑差异（实际上是类型上的差异）。因此，关系语言需要提供
    (a) 用于从基数为 1 的关系中提取单个元组的运算符，以及 (b) 用于从度为 1 的元组中提取单个属性值的运算符（*参见* attribute extractor；tuple
    extractor）。


    还需注意，逆功能——实际上是从指定的属性值构建元组，以及从指定的元组值构建关系——是由适当的元组和关系选择器提供的（*参见* selector）。


    ### set algebra

    *参见* Boolean algebra（第二个定义）。


    ### set function

    聚合运算符（aggregate operator）的已弃用（因为非常不合适）术语。


    ### set inclusion

    集合 `s1` 包含集合 `s2`（`s1 ⊇ s2`）当且仅当它是 `s2` 的超集；集合 `s2` 被包含于集合 `s1`（`s2 ⊆ s1`）当且仅当它是
    `s1` 的子集。集合 `s1` 等于集合 `s2`（`s1 = s2`）当且仅当每个集合都包含另一个。注意，每个集合都包含自身，并且每个集合都包含空集。还要注意，术语“集合包含”通常被（有点随意地）理解为特指
    `⊆` 运算符，而不是 `⊇` 运算符。*注意*：术语“containment”有时用作此处“包含”含义的同义词，但这种用法不被推荐——最好说一个集合“包含”它的元素（*参见*
    containment）但“包含”它的子集（includes its subsets）。'
