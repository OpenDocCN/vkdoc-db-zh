    *is located in just one city*. This latter statement is an example of what some
    would call a business rule, q.v., and it’s quite informal (note in particular
    that it relies on the concepts “supplier,” “city,” and “is located in,” none of
    which is formally defined).


    ### formal operand

    A parameter, q.v.


    ### formal system

    A logical system, q.v.


    ### formula

    Same as well-formed formula.


    ### fourth normal form

    Relvar `R` is in fourth normal form, `4NF`, if and only if every nontrivial MVD
    satisfied by `R` is implied by some superkey of `R`; equivalently, if and only
    if for every nontrivial MVD `A →→ B` satisfied by `R`, `A` is a superkey for `R`
    (and the MVD `A →→ B` in fact degenerates to the FD `A → B`). Every `4NF` relvar
    is in `BCNF`. *Note*: `4NF` is “the” normal form with respect to MVDs. Also, although
    being in `4NF` clearly doesn’t preclude being in the next higher normal form (`5NF`)
    as well, the term *4NF* is often used loosely to refer to a relvar that’s in `4NF`
    and not in `5NF`.


    In any case, fourth normal form as such is no longer very important (`BCNF`, `5NF`,
    and `6NF` being the normal forms of most practical significance); we mention it
    here mainly for historical reasons.


    **Example:** As noted under Boyce/Codd normal form, with the normal forms it’s
    often more instructive to show a counterexample rather than an example per se.
    Consider, therefore, relvar `CTX`, with attributes `C` (course), `T` (teacher),
    and `X` (text), and predicate “Course `C` can be taught by teacher `T` and uses
    text `X` as a textbook.” Let that relvar be all key (i.e., subject to the key
    constraint `KEY{C,T,X}`). Assume also that for a given course, the set of teachers
    and the set of texts are quite independent of each other. Then `CTX` is equal
    to the join of its projections on `{C,T}` and `{C,X}`—i.e., it satisfies the MVDs
    `{C} →→ {T}` and `{C} →→ {X}`—and so it can be nonloss decomposed into those two
    projections. Since those MVDs are neither trivial nor implied by the sole superkey
    (namely, the entire heading), relvar `CTX` isn’t in `4NF`, though it is in `BCNF`.


    ### 72


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00214.png)


    ### free variable

    In logic, a variable—more precisely, an occurrence of a variable reference within
    some predicate—that isn’t bound; in other words, a parameter. (The term *variable*
    is used here in the sense of logic, not in the programming language sense.) *Contrast*
    bound variable.


    **Examples:** Let the symbols `x` and `y` denote integers. Then the following
    expressions are both predicates, and `x` appears as a free variable in each of
    them:


    ```

    x < 7

    EXISTS y ( y > 3 ) AND x < 7

    ```


    The first predicate is self-explanatory. The second is a little more complicated
    because it involves a quantified subexpression (in which `y` appears, twice, as
    a bound variable) as well as the free variable `x`.


    Turning to a database example, the following is a query (“Get suppliers who supply
    at least one part”) on the suppliers-and-parts database, expressed in tuple calculus:


    ```

    S WHERE EXISTS SP ( SP.S# = S.S# )

    ```


    The Boolean expression following the keyword `WHERE` here is a predicate, and
    the reference to `S` in that predicate is free (by contrast, the references to
    `SP` are bound). Note, however, that in this particular example the symbols `S`
    and `SP` denote not only variables in the sense of logic but also variables in
    the conventional programming language sense—but that’s because we’ve indulged
    in a certain sleight of hand, as it were. Here’s an extended version of the same
    example that should help clarify matters:


    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    SX WHERE EXISTS SPX ( SPX.S# = SX.S# )

    ```


    Here `SX` and `SPX` have been explicitly declared as variables in the sense of
    logic, ranging over (the current values of) relvars `S` and `SP`, respectively.


