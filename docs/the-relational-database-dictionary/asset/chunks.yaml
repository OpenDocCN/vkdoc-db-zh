    ## ****projection**

    Let `r` be a relation and let { `X`} be a subset of the heading of `r`.

    Then the projection of `r` on { `X`}， `r{` `X` `}`， is a relation with heading
    { `X`} and body consisting of all tuples `x` such that there exists some tuple
    `t` in `r` with `X` value `x`. *See also* tuple projection.


    **Example*: The expression `S{STATUS,CITY}` denotes a projection of the relation
    that’s the current value of relvar `S`. That projection is a relation of type
    `RELATION {STATUS INTEGER， CITY CHAR}`， containing all possible tuples of the
    form < `st，sc`> (and no other tuples) such that there exists some supplier number
    `s#` and some name `sn` such that the tuple < `s#,sn,st,sc`> appears in the current
    value of relvar `S`. Given the sample values of Figure 1， the result has cardinality
    four. *Note*: For reasons of user friendliness， `Tutorial D` allows projections
    to be expressed in terms of the attributes to be removed instead of those to be
    retained; thus， for example， the projection `S{STATUS,CITY}` can equivalently
    be expressed as `S{ALL BUT S#,SNAME}`. A similar remark applies to several other
    `Tutorial D` constructs also—`KEY`， `GROUP`， `SUMMARIZE`， and so on.


    ## ****projection-join normal form**

    Fifth normal form. The alternative， and original， name *projection-join normal
    form* derives from the fact that 5NF is “the” normal form with respect to projection
    and join， as those operators are classically understood.


