- fmt: '# The Relational Database Dictionary, Extended Edition


    ## C. J. Date


    ### About firstPress


    Apress''s `firstPress` series is your source for understanding cutting-edge technology.
    Short, highly focused, and written by experts, Apress''s firstPress books save
    you time and effort. They contain the information you could get based on intensive
    research yourself or if you were to attend a conference every other week—if only
    you had the time. They cover the concepts and techniques that will keep *you*
    ahead of the technology curve. Apress''s firstPress books are real books, in your
    choice of `PDF Electronic Book` or Print on Demand format, with no rough edges
    even when the technology itself is still rough. You can''t afford to be without
    them.


    ## Book Description


    Written by database luminary C. J. Date, *The Relational Database Dictionary*
    is now better than ever! The new Extended Edition has more than 900 definitions,
    many with detailed examples and cross references. This is the sourcebook for the
    database professional or student of databases wishing to correctly understand
    the terminology. It is the only resource of its kind and an invaluable aid to
    anyone serious about database technology. It features


    *   Over 300 new terms and numerous adaptations make this the reference of choice

    *   Concise, correct, unambiguous definitions with examples as appropriate

    *   C. J. Date''s unique attitude and perceptions on the uses of the terms


    Because this book is specifically geared to the relational database professional,
    you won''t have to search for all those annoying common usage terms that have
    special database meanings. They''re all here and defined exactly as they pertain
    to relational databases.


    C. J. Date is an independent author, lecturer, researcher, and consultant, specializing
    in relational database technology (a field he helped pioneer). He is best known
    for his book, *An Introduction to Database Systems* (8th edition, 2004), which
    has sold over 750,000 copies and is used by several hundred colleges and universities
    worldwide. He is also the author of many other books on relational database management,
    including most recently *Logic and Databases: The Roots of Relational Theory*
    (Trafford Publishing, 2007). He was inducted into the Computing Industry Hall
    of Fame in 2004.


    **Details**


    *   228 Pages

    *   Source Code Online: www.apress.com

    *   User Level: Beginner–Advanced


    ### Example


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```'
