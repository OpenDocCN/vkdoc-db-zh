    ## TVA

    Tuple valued attribute.


    ## two-valued logic

    Conventional propositional or predicate logic, in which there are just two truth
    values, TRUE and FALSE; abbreviated `2VL`.


    ## type

    A named set of values; not to be confused with the internal or physical representation
    of the values in question, which is an implementation issue. Every value, every
    variable, every attribute, every read-only operator, every parameter, and every
    expression is of some type.


    Types can be either scalar or nonscalar (in particular, they can be tuple or relation
    types); as a consequence, attributes of relations can also be either scalar or
    nonscalar. Types can also be either system defined (i.e., built in) or user defined.
    They can also be generated (*see* type generator).


    *Note*: A type isn’t a value, nor is it a variable; in particular, relation values
    and relation variables aren’t types. Equating types and either relation values
    or relation variables—positions that have been advocated in the literature—has
    been described as The First Great Blunder. (For the second, *see* pointer; Second
    Great Blunder, The.)


    **Example**: Here’s a sample type definition:


    ```

    TYPE POINT ...

    { ... CONSTRAINT ( X↑2 + Y↑2 ) ≤ 10000 } ;

    ```


    `POINT` here is a user defined type, denoting geometric points in two-dimensional
    space. It’s subject to a type constraint that says, in effect, that the only points
    of interest are those that lie on or inside a circle with center the origin and
    radius 100 (the symbol “↑” denotes exponentiation).


    *Note*: The (necessary) definition of the representation of `POINT` values in
    terms of the Cartesian coordinates `X` and `Y` is deliberately omitted from the
    example, since a detailed discussion of that definition would take us too far
    afield. Other irrelevant details are also omitted for similar reasons.


    ## type constraint

    A definition of the set of values that make up a given type. The type constraint
    for type *T* is checked when some selector is invoked for that type *T*; in other
    words, a type constraint error occurs if and only if some selector is invoked
    with arguments that violate the applicable type constraint. *Contrast* type error.


    **Example**: *See* the example under type.


    ## type error

    The error that occurs if some operator is invoked with an argument not of the
    type of the corresponding parameter. Unlike integrity violations, such errors
    should be detectable at compile time (unless type inheritance is supported, in
    which case certain type errors—not all, by any means—might not be detectable until
    run time).


    ## type generator

    An operator that’s invoked at compile time instead of run time and returns a type
    instead of a value. For example, conventional programming languages typically
    support an array type generator, which lets users define a variety of specific
    array types. In the relational model, the tuple and (especially) relation type
    generators are the most important ones; they allow users to define a variety of
    specific tuple and relation types. *See* relation type; tuple type.


    **Example**: Consider the suppliers relvar definition:


    ```

    VAR S BASE RELATION

    { S# S#, SNAME NAME, STATUS INTEGER, CITY CHAR }

    KEY { S# } ;

    ```


    This definition includes an invocation of the `RELATION` type generator (syntactically,
    everything from the keyword `RELATION` to the closing brace following the keyword
    `CHAR`, inclusive). That invocation returns a specific relation type—namely, the
    type


    ```

    RELATION

    { S# S#, SNAME NAME, STATUS INTEGER, CITY CHAR }

    ```


    So this type is in fact a generated type—as indeed are all relation types, and
    all tuple types also.


    ## type inference

    The process of determining the type of the value denoted by a given expression.
    Note that this process is completely specified by the rules defining the types
    of the results of the various operations involved in the expression in question
    (in fact, of course, the type of the value denoted by expression *x* is, precisely,
    the type of the result of the outermost operation involved in *x*).


    ## type inheritance

    An organizing principle according to which one type can be defined as a subtype
    of one or more other types, called supertypes (of the type in question). If *T2*
    is a (proper) subtype of supertype *T1,* then all values of type *T2* are also
    of type *T1,* and read-only operators and type constraints that apply to values
    of type *T1* are inherited by values of type *T2*. However, values of type *T2*
    will have read-only operators and type constraints of their own that don’t apply
    to values that are only of type *T1* and not *T2*.


    ## U

    **UDO**

    User defined operator.


    ## UDT

    User defined type.


    ## unary

    Of degree one.


    ## UNGROUP

    *See* ungrouping.


    ## ungrouping

    Let *s* be a relation with an attribute `YR` of type `RELATION { Y}`, and let
    `{ X}` be the set of all attributes of *s* except `YR`. Let `{ Y}` have attributes
    `Y1`, `Y2`, ..., `Yn`; also, let `{ X}` not contain any attribute with the same
    name as any of `Y1`, `Y2`, ..., `Yn`. Then the ungrouping `s UNGROUP ( YR)` is
    another relation *r*. The heading of *r* consists of the set theory union of `{
    X}` and `{ Y}`. As for the body, let *z* be a relation with heading consisting
    of `{ X}` extended with an attribute `YT`, of type `TUPLE { Y}`, and body defined
    as follows: for each tuple of *s,* *z* contains a set of tuples, one (*t,* say)
    for each tuple in the `YR` value in that *s* tuple; each such tuple *t* contains
    an `X` value (*x,* say) equal to the `X` value from the *s* tuple in question
    and a tuple value (*yt,* say) equal to some tuple from the `YR` value in the *s*
    tuple in question. Let *z* contain no other tuples. Then *r* is the result of
    `z UNWRAP ( YT)`.


    **Example**: Let *spq* be the relation resulting from the expression `SP GROUP
    ( { P#, QTY } AS PQ_REL )` (*see* grouping). Then the expression


    ```

    spq UNGROUP ( PQ_REL )

    ```


    denotes an ungrouping of *spq*. That ungrouping is a relation of type `RELATION
    {S# S#, P# P#, QTY QTY}`; and if *spq* is obtained from the relation *sp* shown
    as the value of relvar `SP` in Figure 1, then the result of ungrouping *spq* is
    just *sp*. Suppose, however, that *spq* additionally contains a tuple, say for
    supplier S5, in which the `PQ_REL` value is an empty relation; then the result
    of the foregoing `UNGROUP` won’t contain a tuple for supplier S5 (in fact, the
    result will still be, exactly, relation *sp*). In general, therefore, ungrouping
    a relation *r* and then grouping it again in what might look like an inverse way
    isn’t guaranteed to take us back to *r* (*contrast* grouping).


    ## uniform representation

    *See* Information Principle, The.


    ## UNION

    *See* union.


    ## union

    1.  (*Dyadic case*) The union of two relations *r1* and *r2,* `r1 UNION r2`, where
    *r1* and *r2* are of the same type *T,* is a relation of type *T* with body the
    set of all tuples *t* such that *t* appears in either or both of *r1* and *r2*.

    2.  (*N-adic case*) The union of *n* relations *r1, r2, ..., rn* (*n* ≥ 0), `UNION`'
