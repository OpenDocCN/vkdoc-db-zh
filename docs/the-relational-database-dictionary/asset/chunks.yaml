  trans: '

    至少，这个谓词是本词典其他地方假设（且确实陈述）的针对关系变量 `S` 的谓词。然而，更准确的说法是，该谓词其实是：“我们*知道*——或者（或许更好地说）我们*相信*——供应商
    `S#` 已签订合同，其名为 `SNAME`，其状态为 `STATUS`，且位于 `CITY` 中。”关键在于，无法保证数据库真实地反映了现实世界中存在的事态（*参见*
    正确性）；它所能做的只是反映用户告诉它的内容，而用户告诉它的内容又反过来反映了他们对现实世界的信念，而不一定是现实世界本身。但在非正式语境下，通常忽略这些考虑。


    ## 关系变量引用

    在语法上，一个关系变量名，用于表示关系变量本身或该关系变量的值，具体取决于上下文要求。


    ## REMOVE

    *参见* **A**。


    ## 重命名

    令 `r` 为一个关系，`A` 为 `r` 的一个属性，并且令 `r` 没有名为 `B` 的属性。那么，重命名 `r RENAME ( A AS B )`
    是一个关系，其 (a) 目标与 `r` 的目标相同，只是其中的属性 `A` 被重命名为 `B`；(b) 主体与 `r` 的主体相同，只是主体中所有对 `A`
    的引用（更准确地说，是主体元组中对 `A` 的引用）都被替换为对 `B` 的引用。*另见* 元组重命名。


    **示例**：表达式


    ```

    P RENAME ( WEIGHT AS WT )

    ```


    生成一个关系，该关系与关系变量 `P` 的当前值相同，只是属性 `WEIGHT` 被重命名为 `WT`。请注意，关系变量 `P` 本身在数据库中保持不变——`RENAME`
    不像 SQL 中的 `ALTER TABLE`，它只是一个只读运算符，就像 `restrict` 一样，它接受某个关系作为输入并返回另一个关系作为输出。*注意*：出于用户友好性的考虑，**Tutorial
    D** 允许使用单次 `RENAME` 调用来表达两个或多个连续的重命名。因此，例如，表达式 `(P RENAME (WEIGHT AS WT)) RENAME
    (COLOR AS COL)` 可以缩写为 `P RENAME (WEIGHT AS WT, COLOR AS COL)`。类似的说明也适用于其他几种关系（和元组）运算——例如
    `EXTEND`、`SUMMARIZE` 等。


    ## 重复组

    令某个表具有类型为 `T` 的列 `C`。那么，当且仅当出现在 `C` 中的值不是类型 `T` 的值，而是类型 `T` 值的集合（集合、列表、数组等等）时，`C`
    是一个重复组列。重复组在关系模型中是被禁止的（这就是为什么此定义是用表和列而不是关系和属性来表述的）；实际上，具有重复组“属性”的“关系”是一个自相矛盾的概念。


    ## 限制

    令 `r` 为一个关系，`bx` 为作用于 `r` 的一个限制条件（因此特别要注意，`bx` 中的每个属性引用都标识了 `r` 的某个属性）。那么，根据 `bx`
    对 `r` 进行的限制，即 `r WHERE bx`，是一个关系，其目标与 `r` 相同，其主体由 `r` 中所有满足 `bx` 求值结果为 TRUE 的元组组成。


    *注意*：限制有时被称为选择，但不应与 SQL 的 `SELECT` 操作混淆。SQL 的 `SELECT` 操作——更具体地说，仅指 SQL `SELECT`
    表达式中的 `SELECT` 部分——可以大致描述为 `summarize`、`extend`、`rename` 和“投影”（“投影”加引号是因为它通常不消除重复行，除非通过
    `DISTINCT` 显式要求）的组合。


    **示例**：以下表达式表示关系变量 `P` 当前值所对应关系的一个限制：


    ```

    P WHERE WEIGHT < WEIGHT ( 17.5 )

    ```


    ## 限制条件

    一个布尔表达式，其中 (a) 所有属性引用都标识同一关系 `r` 的属性，且 (b) 没有关系变量引用。*参见* 限制。*注意*：真实语言中的 `WHERE`
    子句通常允许的谓词比作用于相关关系的简单限制条件要通用得多。实际上，严格来说，限制条件甚至不允许包含任何连接词，因为连接词是逻辑运算符，而非代数运算符。然而，在实践中，以下恒等式使得真实语言最终能够支持连接词：


    `r WHERE ( p AND q )`

    ≡ `( r WHERE p ) INTERSECT ( r WHERE q )`


    `r WHERE ( p OR q )`

    ≡ `( r WHERE p ) UNION ( r WHERE q )`


    `r WHERE ( NOT p )`

    ≡ `r MINUS ( r WHERE p )`


    *示例*：关于谓词仅是相关关系的简单限制条件的 `WHERE` 子句示例，请参见限制。


    这里是一个谓词更为通用的示例：


    ```

    S WHERE P { P# } = ( ( SP RENAME ( S# AS SNO ) ) WHERE SNO = S# ) { P# }

    ```


    这里的谓词不仅仅是关系变量 `S` 当前值所对应关系的简单限制条件，因为 (a) 它包含的属性引用并不标识该关系的属性，并且 (b) 它还包含两个关系变量引用（分别针对
    `P` 和 `SP`）。然而，整个表达式可以看作是如下形式的简写：


    ```

    WITH ( SP RENAME ( S# AS SNO ) ) AS t1 ,

    ( EXTEND S ADD ( ( P { P# } ) AS X ) ) AS t2 ,

    ( EXTEND t2 ADD ( ( ( t1 WHERE SNO = S# ) { P# } ) AS Y ) ) AS t3 :

    t3 WHERE X = Y

    ```


    在这个展开的表述中，`X` 和 `Y` 是 `t3` 的（关系值）属性，并且最后一行 `WHERE` 子句中的谓词确实是形式化定义的限制条件。


    ## 可逆分解

    用一组关系变量 `R1, R2, ..., Rn` 替换一个关系变量 `R`，其方式保证了可以从 `R1, R2, ..., Rn` 推导出 `R`。无损分解（q.v.）是一个重要的特例。


    ## 重写规则

    恒等式（q.v.），取该术语的第四种定义含义。顾名思义，形式为 `x = y` 的重写规则允许将任何包含 `x` 出现的表达式重写为包含 `y` 出现的表达式。*参见*
    表达式转换；查询重写；替换。


    ## 右结合性

    *参见* 左结合性。


    ## 环（数学）

    一个形式系统，它遵循代数定律（q.v.）中的所有定律，除了交换律、单位元律和逆元律不一定适用于乘法。*注意*：每个环相对于加法而言都是一个阿贝尔群（q.v.）。


    ## RM/T

    关系模型的一种扩展形式，由科德提出，其明确目标是捕获比关系模型本身所能捕获的更多的含义。该名称是 Relational Model / Tasmania 的缩写（之所以这样称呼，是因为科德首次在塔斯马尼亚的一次会议上描述了它）。


    `RM/T` 包含各种“语义”构造（例如，旨在分别表示实体和属性的 `E`-关系和 `P`-关系，以及用于操作此类关系的运算符）。`RM/T` 从未在商业产品中实现过（事实上也不可能实现，因为关于该主题的唯一正式论文——“Extending
    the Database Relational Model to Capture More Meaning”，*ACM TODS 4,* No. 4——未能对其进行充分规范），但其思想可作为传统数据库设计中的辅助手段。


    ## RM/V1

    *参见* RM/V2。

