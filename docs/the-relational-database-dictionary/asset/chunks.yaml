    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00129.png)


    **transition constraint** A database constraint that limits the transitions a
    given database can validly make from one state to another. *Contrast* state constraint.


    **Example* (“No supplier’s status must ever decrease”): CONSTRAINT TRC1 IS_EMPTY
    (


    ( ( S'' { S#, STATUS } RENAME ( STATUS AS STATUS'' ) )


    JOIN


    ( S { S#, STATUS } ) )


    WHERE STATUS'' > STATUS ) ;


    This formulation relies on a convention to the effect that a primed relvar name
    such as S'' refers to the corresponding relvar as it was prior to the update under
    consideration.


    ****transitive closure** Let *r* be a binary relation with attributes *A* and
    *B,* both of type *T*. Then the transitive closure of *r,* TCLOSE ( *r*), is a
    relation *r+*


    defined as follows: the tuple < *a,b*> appears in *r+* if and only if it appears
    in *r* or there exists a value *c* of type *T* such that the tuple < *a,c*> appears
    in *r* and the tuple < *c,b*> appears in *r+*. (Note that this is a recursive
    definition; note too that *r+* is indeed a transitive relation, as the name “transitive
    closure” suggests. *See* transitivity, second definition.) As the following pseudocode
    algorithm indicates, computing TCLOSE ( *r*) conceptually involves iterative formation
    of the union of some intermediate result (computed on the previous iteration)
    and a new partial result (computed on the current iteration), until that union
    ceases to grow—in other words, until it reaches a fixed point or “fixpoint.”


    **r+* := *r* ;


    do until *r+* ceases to grow ;


    *r+* := WITH ( *r+* RENAME ( B AS C ) ) AS *t1* , ( *r* RENAME ( A AS C ) ) AS
    *t2* :


    *r+* UNION ( ( *t1* JOIN *t2* ) { A, B } ) ; end do ;


    *See also* recursive query.


