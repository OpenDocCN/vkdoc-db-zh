    something that can already be expressed in the classical relational algebra.


    Further details are beyond the scope of this dictionary.


    ****theorem** Something that follows from given axioms according to given rules
    of inference (and is therefore true if the axioms are true and the inference rules
    valid). In the database context, tuples in derived relations can be regarded as
    theorems, because they represent propositions derived from the ones represented
    by tuples in the base relations. Theorems include axioms, q.v., as a degenerate
    special case. *See* proof.


    **Example*: Given the sample values of Figure 1, the relation denoted by the expression
    (S JOIN P){S#,P#} contains the tuple <S1,P1>. That tuple can be regarded as a
    theorem; it represents the (true) proposition “Supplier S1


    and part P1 are in the same city,” a fact that can be inferred from the axioms
    represented by tuples in the base relations.


    ****theta join** A relational operation, equivalent to an expression of the form
    ( *r1* TIMES *r2*) WHERE *A1* *theta* *A2,* where (a) *A1* and *A2* are attributes
    (of the same type *T*) of *r1* and *r2,* respectively, and (b) *theta* is any
    comparison operator that makes sense for values of type *T* (e.g., “=”, “>”).


    **Example*: The following expression represents the greater-than join (i.e., theta
    here is “>”) of suppliers and parts, in that order, on cities: ( ( S RENAME (
    CITY AS SC ) ) TIMES


    ( P RENAME ( CITY AS PC ) ) ) WHERE SC > PC


    We assume here that CHAR—the type of attribute CITY—is an ordinal type (“>” on
    CHAR values presumably means “greater in alphabetic ordering”). Note that we could
    replace TIMES by JOIN in the foregoing expression without changing the meaning.
    Also, replacing “>” with “<”


    would yield a less-than join; replacing it with “=” would yield an equijoin.


    ****The Relational Database Dictionary, Extended Edition**


    **183**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00034.png)


    ***Third Manifesto, The*** A formal proposal for the future of data and database
    management systems; like Codd’s original papers, it can be seen as an abstract
    blueprint for the design of a DBMS and the language interface to such a DBMS.
    *See* the introduction to this dictionary.


    ****third normal form** Relvar *R* is in third normal form, 3NF, if and only if,
    for every nontrivial FD *A* → *B* satisfied by *R,* *A* is a superkey or *B* is
    a subkey. Every 3NF relvar is in 2NF. *Note*: Many of the definitions of


    “3NF” in the literature are actually definitions of BCNF; *caveat lector.*


    Also, although being in 3NF clearly doesn’t preclude being in the next higher
    normal form (BCNF) as well, the term *3NF* is often used loosely to refer to a
    relvar that’s in 3NF and not in BCNF. In any case, third normal form as such is
    no longer very important (BCNF, 5NF, and 6NF being the normal forms of most practical
    significance); we mention it here mainly for historical reasons.


    **Example*: As noted under Boyce/Codd normal form, with the normal forms it’s
    often more instructive to show a counterexample rather than an example per se.
    Suppose, therefore, that relvar S satisfies the additional FD {CITY} → {STATUS};
    that is, the status for a given supplier is a function of that supplier’s location.
    Since {CITY} isn’t a superkey and


    {STATUS} isn’t a subkey, this version of relvar S isn’t in 3NF (though it is in
    2NF).


    ****three-valued logic** A logic in which there’s a “third truth value,” usually
    called UNKNOWN, in addition to the usual TRUE and FALSE;


    abbreviated 3VL. SQL is loosely based on such a logic (the relational model, by
    contrast, is based on two-valued logic, q.v.). In particular, SQL’s support for
    nulls, q.v., is based on a three-valued logic, though in fact that support is
    logically flawed; for example, SQL treats UNKNOWN


    and null as identical, even though there’s a logical difference between the two—UNKNOWN
    is a value, while null isn’t a value at all but a “mark.”


    (This is just one of many logical errors in SQL’s 3VL support.) *Note*: Tautologies
    in 2VL aren’t necessarily tautologies in 3VL; likewise, **184**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00215.png)


    contradictions in 2VL aren’t necessarily contradictions in 3VL. As a result, theorems
    that hold in 2VL don’t necessarily hold in 3VL, and expression transformations
    that are valid in 2VL aren’t necessarily valid in 3VL.


    ****time-varying relation** Codd’s original term for a relvar; the term is deprecated
    because relations are values and so don’t vary over time.


    ****TIMES** *See* Cartesian product.


    ****total database constraint** *See* database constraint.


    ****total function** A partial function in which every element *x* of the domain
    has an image *y* in the codomain; in other words, a function.


    ****total ordering** A special case of partial ordering, q.v. Let *s* be a set.


    Then a total ordering on *s* is a partial ordering, usually denoted “<”, with
    the property that for all pairs of distinct elements *x* and *y* in *s,* either
    *x* < *y* or *y* < *x* (and not both). *Note*: Given that the “=” operator and
    the NOT


    connective are both always available, it follows that all of the usual comparison
    operators—“=”, “≠”, “<”, “≤”, “>”, and “≥”—are available for all pairs of values
    in such a set *s*.


    **Examples*: See the examples under ordinal type.


    ****total relvar constraint** *See* relvar constraint.


    ****transaction** A unit of recovery and concurrency; loosely, a unit of work.


    Transactions are all or nothing, in the sense that they either execute in their
    entirety or have no effect. *Note*: Transactions are often said to be a unit of
    integrity also. Since the relational model requires all integrity checking to
    be immediate, however, the unit of integrity as far as the relational model is
    concerned is the statement, not the transaction. *See* atomic statement; immediate
    checking.


    ****The Relational Database Dictionary, Extended Edition**


