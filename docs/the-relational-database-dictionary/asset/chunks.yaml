  trans: "\n*注*：关系差运算符在某些方面与同名的数学或集合论运算符不同，详见相关条目。实际上，它是半差的一种特例，详见相关条目。\n\n**示例**：表达式\
    \ `(S{CITY}) MINUS (P{CITY})` 表示分别对关系变量 `S` 和 `P` 的当前值在 `{CITY}` 上进行投影后得到的关系之间的差集。该差集是一个类型为\
    \ `RELATION {CITY CHAR}` 的关系。此外，如果关系变量 `S` 和 `P` 的当前值分别是 `s` 和 `p`，那么该关系的主体由所有形式为\
    \ `< c>` 且出现在 `s{CITY}` 中但不出现在 `p{CITY}` 中的元组组成——这意味着 `c` 是一个当前供应商所在城市，但它不是当前零件所在城市。注意，表达式\
    \ `(S{CITY}) MINUS (P{CITY})` 在语义上等价于表达式 `(S{CITY}) NOT MATCHING (P{CITY})`——或者更简单的表达式\
    \ `(S{CITY}) NOT MATCHING P`。\n\n**差（包理论）** *参见* 包。\n\n**差（集合论）** 指所有出现在一个给定集合中而不在另一个集合中的元素组成的集合。*另见*\
    \ 补集（集合论）；*对比* 对称差。\n\n**直接映像** 一种相对简单的实现风格，见于当今主流数据库产品中的大多数（如果不是全部）。在这种风格下，物理存储的内容实际上只是用户逻辑所见内容的直接映像（即，关系变量作为物理文件存储，元组和属性作为这些文件内的记录和字段存储）。\n\
    \n**直接证明** *参见* 证明。\n\n**直接推理** *参见* *肯定前件*。\n\n**有向关系** 指该术语的第三种定义意义上的关系。\n\n\
    ***关系数据库词典（扩展版）***\n\n**47**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00152.png)\n\n**可分辨性** 可区分性。*参见* 不可分辨者的同一性原理。\n\n**不相交的**（指一组包或集合）没有共同元素的。\n\
    \n**不相交并集** 关系并集运算符的一个变体，要求其操作数关系不相交，即它们没有共同的元组。（此操作显然可以推广，不仅适用于关系，也适用于一般的集合。）\n\
    \n**示例**：考虑表达式 `(S{CITY}) D_UNION (P{CITY})`。如果关系变量 `S` 和 `P` 的当前值如图 1 所示，该表达式将导致运行时错误，因为操作数并非不相交。但如果它们是不相交的，那么该表达式在语义上就等价于\
    \ `(S{CITY}) UNION (P{CITY})`。\n\n**析取项** 一个与其他零个或多个谓词进行或（OR）运算的谓词。\n\n**析取**\
    \ 1. （*二元情况*）如果 `p` 和 `q` 是谓词，它们的析取 `(p) OR (q)` 也是一个谓词。令 `(ip) OR (iq)` 是该谓词的一个调用（其中\
    \ `ip` 和 `iq` 分别是 `p` 和 `q` 的调用）。那么，调用 `(ip) OR (iq)` 的求值结果为 `TRUE`，当且仅当 `ip`\
    \ 和 `iq` 中至少有一个的求值结果为 `TRUE`。*注*：在析取中包围 `p` 和 `q` 的圆括号在实践中可能并非必需。 2. （*N 元情况*）令\
    \ `p1`，`p2, . . ., pn`（`n` ≥ 0）为谓词。那么析取 `OR {p1,p2,. . .,pn}` 等价于表达式 `FALSE OR\
    \ (p1) OR (p2) OR . . . OR (pn)`。\n\n*另见* 包容性或。\n\n**析取范式** 一个谓词是析取范式（`DNF`），当且仅当它的形式为\
    \ `(p1) OR (p2) OR . . . OR (pn)`，其中没有任何析取项 `(p1)`、`(2)`、...、`(pn)` 涉及任何 `OR`——更准确地说，其中每个析取项\
    \ `(p1)`、`(p2)`、...、`(pn)` 都是文字的合取（*参见* 文字，第二种定义）。\n\n**DISTINCT** *参见* SELECT\
    \ 表达式。\n\n**48**\n\n***关系数据库词典（扩展版）***\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00048.png)\n\n**分配律** 1. 令运算符 `OpM` 和 `OpD` 分别为一元和二元运算符，并为明确起见，假设 `OpD`\
    \ 以中缀风格表示。那么，`OpM` 对 `OpD` 满足分配律，当且仅当对于所有 `x` 和 `y`，`OpM(x OpD y) = (OpM(x)) OpD\
    \ (OpM(y))`。 2. 令运算符 `OpC` 和 `OpD` 均为二元运算符，并为明确起见，假设它们都以中缀风格表示。那么，`OpC` 对 `OpD`\
    \ 满足分配律，当且仅当对于所有 `x, y` 和 `z`，`x OpC (y OpD z) = (x OpC y) OpD (x OpC z)`。\n\n\
    **示例**：1. （*一元对二元*）在普通算术中，非负平方根（\"√\"）对乘法（\"*\"）满足分配律，因为对于所有 `x` 和 `y`，`√ (x *\
    \ y) = √(x) * √(y)`。类似地，在关系代数中，限制对 `UNION`、`INTERSECT` 和 `MINUS` 满足分配律。 2. （*二元对二元*）乘法对加法（\"\
    +\"）满足分配律，因为对于所有 `x, y` 和 `z`，`x * (y + z) = (x * y) + (x * z)`。类似地，在关系代数中，`UNION`\
    \ 和 `INTERSECT` 彼此之间都满足分配律。同样，在逻辑中，`OR` 和 `AND` 彼此之间也满足分配律。\n\n**DIVIDEBY** *参见*\
    \ 除法；大除；小除。\n\n**除法** 多年来，已经定义了几种逻辑上不同的关系除法运算符（即用于“除”一个关系的运算符）——事实上，种类如此之多，以至于最好完全不要使用这个术语，或者至少在任何给定的上下文中明确指出指的是哪个特定运算符。本词典定义了两种这样的运算符：大除和小除，详见相关条目。*注*：早期的\
    \ **Tutorial D** 版本明确支持这两种运算符；当前版本不支持，因为它们的功能可以通过多种其他方式获得。\n\n**DK/NF** 域键范式。\n\
    \n***关系数据库词典（扩展版）***\n\n**49**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00173.png)\n\n**DNF** 析取范式。\n\n**域** 类型。早期的关系理论著作倾向于使用 *域* 这个术语；近期的著作则更倾向于使用\
    \ *类型*。\n\n**域（数学）** *参见* 函数；关系（数学）。\n\n**域演算** 关系演算的一种形式，在语义上等价于元组演算，详见相关条目。其中，范围变量在域（类型）上变化，而不是在关系上变化，因此表示来自那些域的值。\n\
    \n**示例**：以下是查询“获取供应至少一种零件的供应商名称”的域演算表述（*参见* 元组演算以了解其元组演算类似形式）：\n\n```\nNX RANGES\
    \ OVER { NAME } ;\nSX RANGES OVER { S# } ;\nPX RANGES OVER { P# } ;\nNX WHERE\n\
    \    EXISTS SX ( EXISTS PX ( S { S# SX, SNAME NX } AND\n                     \
    \      SP { S# SX, P# PX } ) )\n```\n\n用生硬的英语表达：“获取名称 `NX`，使得存在供应商编号 `SX` 且存在零件编号\
    \ `PX`，使得一个包含供应商编号 `SX` 和供应商名称 `NX` 的元组出现在关系变量 `S` 中，并且一个包含相同供应商编号 `SX` 和零件编号\
    \ `PX` 的元组出现在关系变量 `SP` 中。” 正如你所见，这个特定例子比它的元组演算对应形式（*参见* 元组演算）更笨拙一些，但也有些情况恰好相反。\n\
    \n**域检查覆盖** 一种临时的、逻辑上有缺陷的（因此不推荐的）机制，用于在不同类型值之间执行比较。（它存在缺陷是因为它混淆了类型和表示之间的逻辑区别。）\n\
    \n**域键范式** 关系变量 `R` 属于域键范式（`DK/NF`），当且仅当适用于 `R` 的每个约束都由 `R` 的域键以及一般约束（如果有）所蕴含。注：此定义有所简化。更精确的定义，请参见引用的参考文献。\n\
    \n**50**\n\n***关系数据库词典（扩展版）***\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00012.png)\n"
- fmt: '### attribute and key constraints that apply to `R`. (`Attribute-key normal
    form` would be a better name. In any case, the concept is mainly of academic interest,
    because relvars can easily be fully normalized— i.e., in 5NF or even 6NF—and still
    not be in `DK/NF`.)


    **Example:** As noted under Boyce/Codd normal form, with the normal forms it’s
    often more instructive to show a counterexample rather than an example per se.
    Suppose, therefore, that shipments satisfy a constraint to the effect that odd-numbered
    parts can be supplied only by odd-numbered suppliers and even-numbered parts only
    by even-numbered suppliers (the example is very contrived, of course, but it suffices
    for the purpose at hand). Then this constraint is clearly not implied by the attribute
    and key constraints that apply to relvar `SP`, and so `SP` isn’t in `DK/NF`; yet
    it’s certainly in 6NF.


    ### domain relational calculus

    `Domain calculus`, q.v.


    ### dot qualification

    In tuple calculus and languages based on it, a dot qualified name is an expression
    of the form `rx.A`, where `rx` is the name of a range variable and `A` is the
    name of an attribute of the relation `r` over which `rx` ranges. Such an expression
    serves as an attribute reference, q.v.; it denotes the value of attribute `A`
    (or possibly attribute `A` as such) within the particular tuple of `r` to which
    `rx` currently refers. Dot qualification is used for disambiguation purposes in
    tuple calculus—also in SQL—but not in domain calculus or relational algebra (these
    latter use attribute (re)naming and name scoping to achieve an equivalent effect).


    **Example:** The following tuple calculus formulation of the query “Get suppliers
    who supply at least one part” makes use of two dot qualified names, `SPX.S#` and
    `SX.S#`:


    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    SX WHERE EXISTS SPX ( SPX.S# = SX.S# )

    ```


    Here for comparison is a relational algebra formulation of the same query: `S
    MATCHING SP`. The “matching” here is done on the basis of attribute `S#` (since
    that attribute is the only one common to relvars `S` and `SP`).


    ### double arrow

    *See* `multivalued dependency`.


    ### double underlining

    A convention, illustrated in Figure 1, for marking attributes that participate
    in primary keys.


    ### `DRC`

    `Domain relational calculus`.


    ### drop

    *See* `data definition operator`.


    ### dual

    1.  ( *Logic*) The duals of `AND`, `OR`, `TRUE`, and `FALSE` are `OR`, `AND`,
    `FALSE`, and `TRUE`, respectively (`NOT` is its own dual). More generally, let
    `x` be a logical expression involving no connectives other than `NOT`, `AND`,
    and `OR`, and let `y` be obtained from `x` by replacing every occurrence of `AND`,
    `OR`, `TRUE`, and `FALSE` by its dual; then `x` and `y` are duals of each other.
    *Note*: Since every logical expression is equivalent to one involving no connectives
    other than `NOT`, `AND`, and `OR`, it follows that every logical expression has
    a dual.

    2.  ( *Set theory*) The duals of intersection, union, the universal set, and the
    empty set are union, intersection, the empty set, and the universal set, respectively
    (complement is its own dual). More generally, let `x` be a set theory expression
    involving no operators other than complement, intersection, and union, and let
    `y` be obtained from `x` by replacing every occurrence of intersection, union,
    the universal set, and the empty set by its dual; then `x` and `y` are duals of
    each other. *Note*: Since every set theory expression is equivalent to one involving
    no operators other than complement, intersection, and union, it follows that every
    set theory expression has a dual. *See also* `Duality Principle, The`.


    ### dual mode principle

    The principle that any relational operation that can be invoked interactively
    can also be invoked from an application program.


    ### Duality Principle, The

    1.  ( *Logic*) Let `x` and `y` be logical expressions such that `x` is the dual
    of `y`; then `x` is a tautology if and only if `y` is a tautology.

    2.  ( *Set theory*) Let `x` and `y` be statements in set theory such that `x`
    is the dual of `y`; then `x` is a theorem if and only if `y` is a theorem.


    **Examples:** `De Morgan’s Laws`, q.v.


    ### `DUM`

    `TABLE_DUM`.


    ### duplicate

    Let `a1` and `a2` be appearances, q.v., in some context of values `v1` and `v2`,
    respectively. Then `a1` and `a2` are duplicates of each other if and only if `v1`
    and `v2` are equal (in other words, if and only if `v1` and `v2` are the very
    same value). Incidentally, it should be clear from this definition that the well
    known dictum to the effect that relations never contain duplicate tuples really
    means that no relation ever contains duplicate *appearances* of the *same* tuple—though
    we tend to stay with the less precise formulation in this dictionary for reasons
    of familiarity. Observe that since (a) relations never contain duplicate tuples
    and (b) every relational operation yields a relation, it follows that duplicate
    tuples (meaning, more precisely, redundant appearances of the same tuple) are
    eliminated, if necessary, whenever a relational operation is performed.


    **Examples** ( *duplicate elimination*): Given the sample values shown in Figure
    1, the projection on `{CITY}` of the current value of relvar `S` has cardinality
    three, not five; similarly, the union of the projections on `{CITY}` of the current
    values of relvars `S` and `P` has cardinality four, not eleven. (Of the most familiar
    relational operators, projection and union are the only ones for which duplicate
    elimination is a concern. For the others—restriction, join, and so on—it’s effectively
    a no op.)


    ### duplicate elimination

    Term used ubiquitously to mean what would more accurately be called duplication
    elimination. *See* `duplicate`.


    ### dyadic

    ( *Of an operator*) Having exactly two operands; i.e., being defined in terms
    of exactly two parameters.


    ### `E`

    `E/R` Entity/relationship.


    ### E/R diagram

    *See* `entity/relationship diagram`.


    ### E/R model

    *See* `entity/relationship model`.


    ### E/R modeling

    *See* `entity/relationship modeling`.


    ### E-relation

    *See* `RM/T`.


    ### element

    *See* `bag`; `set`.


    ### embedded dependency

    A dependency satisfied by some projection of some relvar.


    **Example:** Consider relvar `CTXD`, with attributes `C` (course), `T` (teacher),
    `X` (text), and `D` (days) and predicate “Teacher `T` spends `D` days with textbook
    `X` on course `C`.” Let the sole key for that relvar be `{C,T,X}`. Assume also
    that for a given course, the set of teachers and the set of texts are quite independent
    of each other. Then `CTXD` is in 6NF—it can’t be nonloss decomposed at all, other
    than trivially. Yet its projection on `{C,T,X}` satisfies the embedded multivalued
    dependencies `{C} ->> {T}` and `{C} ->> {X}`.


    ### empty

    ( *Of a bag or set*) Having no elements.


    ### empty bag

    The bag with no elements (note that there’s exactly one such); written `()`. (Of
    course, the empty bag `()` and the empty set `{}`, q.v., are logically indistinguishable.)


    ### empty foreign key

    A foreign key of degree zero. *Note*: The corresponding candidate key in the referenced
    relvar will necessarily also be of degree zero, and the referential constraint
    will therefore be satisfied if and only if either (a) the referenced relvar is
    nonempty or (b) the referencing relvar is empty (or both).


    ### empty heading

    The heading of degree zero (note that there’s exactly one such).'
  raw: 'attribute and key constraints that apply to *R*. ( *Attribute-key normal form*
    would be a better name. In any case, the concept is mainly of academic interest,
    because relvars can easily be fully normalized— i.e., in 5NF or even 6NF—and still
    not be in DK/NF.)


    **Example*: As noted under Boyce/Codd normal form, with the normal forms it’s
    often more instructive to show a counterexample rather than an example per se.
    Suppose, therefore, that shipments satisfy a constraint to the effect that odd-numbered
    parts can be supplied only by odd-numbered suppliers and even-numbered parts only
    by even-numbered suppliers (the example is very contrived, of course, but it suffices
