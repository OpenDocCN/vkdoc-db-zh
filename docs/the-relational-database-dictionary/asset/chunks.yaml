    ## 值

    一个“个体常量”（例如整数值`3`）。值可以具有任意复杂性（它们可以是标量或非标量；特别注意，元组和关系都是值）。值在时间或空间中没有位置；然而，它们可以通过某种编码在内存中表示，并且这些表示在时间和空间中确实有位置——实际上，同一个值的不同表示可以出现在时间和空间的任意多个不同位置，这意味着，粗略地说，同一个值可以同时或不同时地作为任意多个不同变量的当前值，和/或作为任意多个不同元组变量或关系变量的当前值中的任意多个属性值出现。


    注意，根据定义，值不能被更新；因为如果它可以被更新，那么在那次更新之后，它就不再是那个值了。还要注意，每个值都属于某种类型（事实上，恰好属于一种类型，除非支持类型继承）。进一步注意，值不是类型，也不是变量。*对比*
    外观。


    ## 值集

    在 E/R 建模中有时用来表示类型（type）的术语。


    ## VAR

    **Tutorial D** 中用于定义变量（特别是关系变量）的操作符。


    ## 变量

    1\.（*逻辑学*）参见 逻辑变量。

    2\.（*编程语言*）值（`value`, q.v.）的表示的持有者。与值不同，变量（a）在时间或空间中具有位置，并且（b）可以被更新（即，变量的当前值可以被另一个值替换）。实际上，是变量就意味着可以被更新；等价地，是变量就意味着可以被赋值（而可以被赋值就意味着是变量）。注意，每个变量都被声明为某种类型。进一步注意，变量不是类型，也不是值。


    ## 变量引用

    1\.（*逻辑学*）参见 约束变量; 自由变量。

    2\.（*编程语言*）在语法上，是一个变量名（除非在 伪变量引用 中注明），用于表示变量本身或该变量的值，具体取决于上下文。注意，如果此引用用于指定某个更新操作的目标——特别是，如果它出现在赋值语句的左侧——那么它肯定表示变量本身。另一方面，如果它表示变量的值，那么它可以被视为一个只读操作符（`read-only
    operator`）的调用——因此是表达式（`expression`, q.v.）的一种特殊情况——其中相关的只读操作符本质上是“返回指定变量的当前值”。


    *注意*：如果变量引用`V`实际上表示`V`的值，那么（像所有表达式一样）它可以出现在任何适合类型的字面量可以出现的地方。另见 伪变量引用。


    ## 垂直分解

    分解为投影（projections）的非正式术语。


    ## 视图

    一种导出的关系变量（`relvar`），它是虚拟的，而非真实的（对比 `快照`）。


    给定视图在给定时间的值，是在该时间计算某个关系表达式（视图定义表达式，在定义视图本身时指定）的结果。*注意*：视图定义表达式必须至少提及一个关系变量，否则它就不会是，具体来说，一个关系变量。同样注意，视图必须是可更新的，原因相同。


    **示例**：以下语句定义了一个名为`LSV`的视图：

    ```

    VAR LSV VIRTUAL ( S WHERE CITY = ''London'' ) ;

    ```

    在任何给定时间，作为视图`LSV`的值的关系，等于该时间的视图定义表达式`S WHERE CITY = ''London''`的值。


    ## 视图物化

    一种实现视图操作时技术上不太复杂的方法，根据该方法，（a）在操作被调用时计算定义视图的关系表达式，（b）由此物化出一个关系，然后（c）针对如此物化的关系执行相关操作。请注意，这种技术不能用于实现视图更新，而仅限于只读操作。对比
    替换（第二个定义）。


    另见 `物化视图`。


    ## 视图更新

    视图更新的理论或过程，视上下文而定。视图更新目前仍是一个有些争议的话题，但有人认为——与普遍看法相反——所有视图至少在理论上是可更新的。细节超出了本词典的范围，但需要注意（a）当然，视图更新可能因完整性约束违反而失败，就像基本关系变量更新一样，以及（b）有人认为某些人视为“不可能”的视图更新并非本质上不可能，而恰恰是因这种违反而失败。


    ## 虚拟关系

    给定虚拟关系变量（`virtual relvar`）在给定时间的值。


    ## 虚拟关系变量

    视图（`view`, q.v.）（对比 `真实关系变量`）。


    # W


    ## 合式公式

    在逻辑学中，表示谓词（`predicate`）的形式表达式。


    ## WFF

    一个合式公式（`well-formed formula`）。缩写发音可以是“weff”、“wiff”或“woof”。参见 `闭合 WFF`; `开放 WFF`。


    ## 假设分析

    一种只读关系操作符，它返回如果对指定关系进行某些更改后将得到的关系（忽略这些更改实际上无法进行的事实，因为关系是值）。


    **示例**：考虑以下表达式：

    ```

    UPDATE S WHERE CITY = ''Paris'' :

    { STATUS := 2 * STATUS , CITY := ''Nice'' }

    ```

    '
- fmt: 'Observe that, even though it uses the keyword `UPDATE`, this expression is
    indeed an expression and not a statement (it has no terminating semicolon); in
    particular, it has no effect on relvar `S`. What it does do is return a relation
    containing exactly one tuple `t` for each tuple `s` in the current value of relvar
    `S` for which the city is Paris—except that, in that tuple `t`, the status is
    double that in tuple `s` and the city is Nice, not Paris.


    ## WHERE clause

    A syntactic construct of the form `WHERE bx` (where `bx` is a Boolean expression)
    that appears ubiquitously in **Tutorial D**, SQL, and many other languages. *See*
    `DELETE`; restriction; restriction condition; `SELECT` expression; `UPDATE`; and
    elsewhere.


    ## WITH

    A **Tutorial D** syntactic construct for introducing names for the results of
    subexpressions. The introduced names are then available for subsequent use within
    the overall expression of which the `WITH` clause forms a part to denote those
    results. (SQL also includes a `WITH` construct, with similar but not identical
    semantics.)


    **Example**: The following is a formulation of the query “Get pairs of supplier
    numbers, `S#` `x` and `S#` `y` say, such that `S#` `x` and `S#` `y` each supply
    exactly the same set of parts”:


    `WITH ( S RENAME ( S# AS SX ) ) { SX } AS tx,`

    `( S RENAME ( S# AS SY ) ) { SY } AS ty :`

    `( tx JOIN ty ) WHERE ( SP WHERE S# = SX ) { P# } =`

    `( SP WHERE S# = SY ) { P# }`


    **The Relational Database Dictionary, Extended Edition**

    **213**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00103.png)


    ## WRAP

    *See* wrapping.


    ## wrapping

    Let `r` be a relation and let the heading of `r` be partitioned into subsets `{
    X }` and `{ Y }`. Let the attributes of `{ Y }` be `Y1`, `Y2`, ..., `Yn`; also,
    let `{ X }` not contain any attribute called `YT`. Then the wrapping `r WRAP ({
    Y } AS YT)` is another relation `s`. The heading of `s` consists of `{ X }` extended
    with an attribute `YT` of type `TUPLE { Y }`. The body of `s` contains one tuple
    for each tuple in `r`, and no other tuples. Let tuple `t` of `r` have `X` value
    `x`, `Y1` value `y1`, `Y2` value `y2`, ..., and `Yn` value `yn`; then the corresponding
    tuple of `s` has `X` value `x` and `YT` value a tuple with `Y1` value `y1`, `Y2`
    value `y2`, ..., and `Yn` value `yn`. *See also* tuple wrapping.


    **Example**: The following expression denotes a wrapping of the relation that’s
    the current value of relvar `SP`:


    `SP WRAP ( { P#, QTY } AS PQ_TUP )`


    That wrapping is a relation `spw` of type `RELATION { S# S#, PQ_TUP TUPLE { P#
    P#, QTY QTY } }`; it contains one tuple for each tuple currently appearing in
    relvar `SP`, and no other tuples. Given the sample values in Figure 1, for example,
    the `spw` tuple for supplier `S1` and part `P1` has `S#` value `S1` and `PQ_TUP`
    value a tuple with `P#` value `P1` and `QTY` value 300.


    **214**

    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00066.png)


    ## X


    ## XML

    Extensible Markup Language; from a database point of view, best regarded as just
    another data type (albeit one of considerable pragmatic importance at the time
    of writing)—meaning, among other things, that relations should be allowed to have
    attributes of the type in question, and tuples in such relations should thus be
    allowed to contain attribute values that are XML documents.


    ## XOR

    *See* exclusive OR.


    **The Relational Database Dictionary, Extended Edition**

    **215**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


