    # 元组解包


    令 *s* 为一个元组，令 {*Y*} 为 *s* 的一个元组值属性，并令 {*X*} 为 *s* 除 *YT* 外的所有属性的集合。令 {*Y*} 具有属性
    *Y1, Y2, . . ., Yn*；同时，令 {*X*} 不包含与 *Y1, Y2, . . ., Yn* 中任何属性同名的属性。那么，元组解包操作 `s`
    `UNWRAP` (*YT*) 的结果是另一个元组 *t*。*t* 的标题（heading）由 {*X*} 和 {*Y*} 的集合理论并集组成。令元组 *s*
    的 *X* 值为 *x*，且 *YT* 值为一个具有 *Y1* 值 *y1,* *Y2* 值 *y2,* . . ., 以及 *Yn* 值 *yn* 的元组；那么，元组
    *t* 将具有 *X* 值 *x,* *Y1* 值 *y1,* *Y2* 值 *y2,* . . ., 以及 *Yn* 值 *yn*。


    ## 示例


    令 *t* 为来自关系变量 SP 的一个元组，并令 *tw* 为以下表达式的结果元组


    ```

    t WRAP ( { P#, QTY } AS PQ_TUP )

    ```


    （参见元组包装）。那么，表达式


    ```

    tw UNWRAP ( PQ_TUP )

    ```


    将产生 *t*。


    ## 元组值


    宽泛地说，一行（值）。更精确地，令 `TUPLE` {*H*} 为一个元组类型，并令 *t* 为一组 <<*A,T*>, *v*> 形式的配对，称为分量（component，参见该词条），通过为
    {*H*} 中的每个属性 <*A,T*> 附加某个类型为 *T* 的值 *v*（称为 *t* 中属性 *A* 的属性值）而获得。那么，*t* 就是类型 `TUPLE`
    {*H*} 的一个元组值（简称元组），其标题为 {*H*}，且具有与 {*H*} 相同的度（degree）和属性。*注意*：关系模型中定义的元组在某些重要方面与同名的数学构造有所不同。特别是，数学中的元组通常没有命名属性；相反，它们的属性通过其从左到右的序数位置来标识。参见
    元组（数学）。


    ## 元组值属性


    其类型为某个元组类型的属性。此类属性的值是指定类型的元组。*注意*：如果一个关系变量具有元组值属性，这一事实本身并不违反任何特定的范式级别（甚至第一范式也不违反）；然而，在数据库设计中，此类属性通常是不推荐的，至少在基本关系变量中如此，因为它们必然意味着某种结构上的不对称，从而在查询、约束和更新中也会引起不对称性（和复杂性）。*另见*
    元组解包；元组包装。


    ## 元组变量


    宽泛地说，一行（变量）；更精确地说，是一个类型为某个元组类型的变量。令元组变量 *T* 的类型为 `TUPLE` {*H*}；那么，*T* 具有与该类型相同的标题（因此属性）和度。*注意*：关系模型本身并不要求元组变量，但为了支持例如从某个关系中提取某个元组等操作，外部环境很可能需要它们。


    ## 元组包装


    令 *t* 为一个元组，并令 *t* 的标题被划分为子集 {*X*} 和 {*Y*}。令 {*Y*} 的属性为 *Y1, Y2, . . ., Yn*；同时，令
    {*X*} 不包含任何名为 *YT* 的属性。那么，元组包装操作 `t` `WRAP` ({*Y*} AS *YT*) 的结果是另一个元组 *s*。*s*
    的标题由 {*X*} 扩展一个类型为 `TUPLE` {*Y*} 的属性 *YT* 组成。令元组 *t* 的 *X* 值为 *x,* *Y1* 值为 *y1,*
    *Y2* 值为 *y2,* . . ., 以及 *Yn* 值为 *yn*；那么，元组 *s* 将具有 *X* 值 *x*，以及 *YT* 值为一个具有 *Y1*
    值 *y1,* *Y2* 值 *y2,* . . ., 以及 *Yn* 值 *yn* 的元组。


    ### 示例


    令 *t* 为来自关系变量 SP 的供应商 S1 和零件 P1 对应的元组。那么，表达式


    ```

    t WRAP ( { P#, QTY } AS PQ_TUP )

    ```


    将产生一个类型为 `TUPLE {S# S#, PQ_TUP TUPLE {P# P#, QTY QTY}}` 的元组 *tw*，其 S# 值为 S1，PQ_TUP
    值为一个 P# 值为 P1 且 QTY 值为 300 的元组。


    ## 元组变量


    即一个元组变量，参见该词条。


    ## 元组变量引用


    在语法上，是一个元组变量名，用于指代元组变量本身或该元组变量的值，具体取决于上下文要求。


    ## 教程 D


    一个特定的 **D**，参见该词条（参见本词典的引言）。

