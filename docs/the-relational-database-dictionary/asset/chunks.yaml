    this old warhorse yet one more time, but I believe that using the* *same example
    in a variety of different publications can be a help, not a* *hindrance, in learning.
    Here are the relvar definitions (and if you don’t know* *what a relvar is, then
    please check the dictionary entry for that term!):* VAR S BASE RELATION


    { S# S#, SNAME NAME, STATUS INTEGER, CITY CHAR }


    KEY { S# } ;


    VAR P BASE RELATION


    { P# P#, PNAME NAME, COLOR COLOR,


    WEIGHT WEIGHT, CITY CHAR }


    KEY { P# } ;


    VAR SP BASE RELATION


    { S# S#, P# P#, QTY QTY }


    KEY { S#, P# } ;


    *The semantics are as follows:*


    *Relvar S represents suppliers under contract. Each supplier has one supplier*
    *number (S#), unique to that supplier; one name (SNAME), not necessarily* *unique;
    one status value (STATUS); and one location (CITY). Attributes S#,* *SNAME, STATUS,
    and CITY are of types S#, NAME, INTEGER, and CHAR,* *respectively.*


    *Relvar P represents kinds of parts. Each kind of part has one part number* *(P#),
    which is unique; one name (PNAME); one color (COLOR); one weight* *(WEIGHT); and
    one location where parts of that kind are stored (CITY).*


