- fmt: '# S


    ## RM/V2

    Codd spent much of the late 1980s revising and extending the original relational
    model, which he referred to as "the Relational Model Version 1" or `RM/V1`, to
    produce "the Relational Model Version 2" or `RM/V2`. As noted in the introduction
    to this dictionary, however, definitions herein are intended to conform to the
    relational model as defined by `The Third Manifesto`; in consequence, they don’t
    always agree with Codd’s `RM/V1` or `RM/V2` definitions. For details of these
    latter, see Codd’s book *The Relational Model for Database Management Version
    2* (Addison-Wesley, 1990).


    ## row

    1. SQL analog of either a tuple value or a tuple variable, as the context demands.

    2. More generally, a picture of a tuple (on paper, for example). *See also* cell;
    column; table.


    ## row ID

    An implementation construct (typically though not necessarily some kind of pointer,
    q.v.). In some commercial products, however, such IDs are exposed to the user—usually,
    and unfortunately, in such a way as to violate either The Information Principle
    or The Principle of Interchangeability or both. Sometimes rather inappropriately
    called a tuple ID.


    ## rule of inference

    *See* inference rule.


    ## RVA

    Relation valued attribute.


    ## safe expression

    An expression that would be guaranteed to evaluate to a finite result even if
    the underlying domains were infinite. In practice, various rules are imposed to
    ensure that unsafe expressions can never occur. An example of an unsafe expression,
    if it were permitted, would be one denoting the set of all supplier tuples not
    currently appearing in relvar `S` (in other words, a request for the complement
    of the relation that’s the current value of relvar `S`). *Note*: As should be
    obvious, it’s generally desirable to prohibit unsafe expressions even if all domains
    are in fact finite (as of course they are in real systems).


    ## scalar

    1. ( *Of a type, attribute, value, or variable*) Having no user-visible component
    parts. The term is also often used as an abbreviation for *scalar value* specifically.

    2. ( *Of an operator*) Returning a scalar result.


    *Note*: Scalar types, attributes, and values are required by the relational model;
    scalar variables aren’t, but they’re almost certainly needed in the external environment
    in order to support, e.g., retrieval of the value of some scalar attribute from
    some tuple of some relation. Similar remarks apply to scalar operators. Note too
    that there’s no such thing as "absolute scalarness" (or "absolute atomicity,"
    as it’s sometimes called)—the concept is necessarily somewhat relative. For example,
    a phone number might be perceived equally well as an "atomic" (i.e., scalar) value
    or as a tuple value consisting of country code, area code, and local number (and
    a database design involving phone numbers ought to be capable of supporting both
    perceptions). Consider also the case of `TABLE_DUM`, which is clearly a relation
    and yet (like a scalar) has no user-visible component parts.


    ## scalar attribute

    *See* scalar.


    ## scalar type

    *See* scalar.


    ## scalar value

    *See* scalar.


    ## scalar variable

    *See* scalar.


    ## Second Great Blunder, The

    Mixing pointers and relations. *See* pointer.


    Note that committing The First Great Blunder, q.v., seems to lead inevitably to
    committing the second as well; however, it’s possible to commit the second without
    committing the first.


    ## second normal form

    Relvar `R` is in second normal form, `2NF`, if and only if every nonkey attribute
    `A` of `R` is such that the set { `A` } is irreducibly dependent on every key
    of `R`; equivalently, if and only if, for every nontrivial FD `A → B`, satisfied
    by `R` (a) `A` is either a superkey or not a subkey or (b) `B` is a subkey. Every
    `2NF` relvar is in `1NF` (as is every relvar, in fact). *Note*: Although being
    in `2NF` clearly doesn’t preclude being in the next higher normal form (`3NF`)
    as well, the term `2NF` is often used loosely to refer to a relvar that’s in `2NF`
    and not in `3NF`. Also, second normal form as such is no longer very important
    (`BCNF`, `5NF`, and `6NF` being the normal forms of most practical significance);
    we mention it here mainly for historical reasons.


    *Example*: As noted under Boyce/Codd normal form, with the normal forms it’s often
    more instructive to show a counterexample rather than an example per se. Suppose
    for the sake of the example, therefore, that relvar `SP` has an additional attribute
    `CITY`, representing the city of the applicable supplier. This revised version
    of `SP` satisfies the FD `{S#} → {CITY}`, and is therefore not in `2NF` (because
    `CITY` is a nonkey attribute, yet `{CITY}` isn’t irreducibly dependent on the
    key `{S#,P#}`; equivalently, `{S#}` isn’t a superkey, *is* a subkey, and `{CITY}`
    isn’t a subkey).


    ## second order logic

    A form of predicate logic in which the sets over which variables range are allowed
    to contain predicates. *Contrast* first order logic.


    *Example*: Consider the well known principle of mathematical induction, limited
    here for simplicity to its application to monadic predicates `p` whose sole parameter
    is of type nonnegative integer. That principle can be stated (in somewhat stilted
    English) as follows: For all such predicates `p`, if (a) `p(0)` is true and (b)
    for all `i`, if `p(i)` is true then `p(i+1)` is true, then (c) `p(n)` is true
    for all `n`. In symbols:

    ```

    FORALL p ( ( p(0) AND FORALL i ( p(i) IMPLIES p(i+1) ) ) IMPLIES FORALL n ( p(n)
    ) )

    ```

    In this example the variables `i` and `n` range over nonnegative integers, but
    the variable `p` ranges over predicates (specifically, monadic predicates whose
    sole parameter is of type nonnegative integer). The overall expression is thus
    second order.


    ## SELECT expression

    In SQL, most queries are formulated as expressions involving, in order, a `SELECT`
    clause (with an optional `DISTINCT` specification), a `FROM` clause, a `WHERE`
    clause, a `GROUP BY` clause, and a `HAVING` clause (the last three of which are
    optional). Such expressions are known generically, and loosely, as `SELECT - FROM
    - WHERE - GROUP BY - HAVING` expressions, or more simply as `SELECT - FROM - WHERE`
    expressions, or more simply still as just `SELECT` expressions. Unfortunately,
    it’s impossible in a dictionary of this nature to give a complete and accurate
    definition of this SQL construct, owing in part to the interdependencies among
    the various clauses; for example, the semantics of the `SELECT` clause depend
    on whether or not there’s an accompanying `GROUP BY` clause (among other things).
    But the following conceptual algorithm gives a very rough idea of the overall
    semantics:


    ( `FROM`) Form the Cartesian product of the tables specified in the `FROM` clause.

    ( `WHERE`) Discard rows from that product that fail to satisfy the Boolean expression
    in the `WHERE` clause.

    ( `GROUP BY`) Partition the rows that remain into groups in accordance with values
    of the columns specified in the `GROUP BY` clause.

    ( `HAVING`) Discard groups from that partitioning that fail to satisfy the Boolean
    expression in the `HAVING` clause.'
