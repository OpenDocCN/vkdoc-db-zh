- fmt: '# Examples


    ## Example

    The pairs `<S#,S#>,S1>` and `<SNAME,NAME>,Smith>` are both components of the supplier
    tuple for supplier `S1` in Figure 1.


    ## Note

    In `Tutorial D`, tuple components are specified more simply as `<attribute name,
    attribute value>` pairs (not meant to be exact `Tutorial D` syntax). This simplified
    form is acceptable because the relational model requires attribute names to be
    unique within the pertinent heading, and those names thus effectively imply the
    corresponding type names.


    # Tuple composition

    The tuple composition of tuples `t1` and `t2,` `t1 COMPOSE t2,` is the tuple union
    of `t1` and `t2,` projected on all attributes not common to `t1` and `t2`.


    # Tuple constant

    A tuple, especially one that’s named; not to be confused with a tuple literal,
    q.v.


    # Tuple constraint

    Slightly deprecated term sometimes used to refer to a relvar constraint of the
    form `IS_EMPTY( R WHERE bx)`, where `R` is a relvar and `bx` is a restriction
    condition, q.v., on `R` (and can therefore be evaluated for a given tuple by examining
    just that tuple in isolation).


    Note that a tuple constraint is indeed a constraint on a relvar and not on a tuplevar.
    (There aren’t any tuplevars in a relational database; a fortiori, therefore, there
    aren’t any "tuplevar constraints" either.)


    ## Example

    Constraints `C1` and `C2` from the examples under database constraint are both
    tuple constraints; constraint `C3` is not.


    # Tuple difference

    *See* tuple union.


    # Tuple equality

    Equality of tuples; tuples `t1` and `t2` are equal (i.e., the tuple comparison
    `t1 = t2` evaluates to `TRUE`) if and only if `t1` and `t2` are the very same
    tuple. More specifically, tuples `t1` and `t2` are equal if and only if they have
    the same attributes `A1, A2, . . ., An`—in other words, they’re of the same type—and,
    for all `i` (`i` = 1, 2, . . ., `n`), the value `v1` of `Ai` in `t1` is equal
    to the value `v2` of `Ai` in `t2`.


    ## Note

    The importance of this concept can hardly be overstated, since so much in the
    relational model depends on it. For example, candidate keys, foreign keys, and
    most if not all of the operators of relational algebra are defined in terms of
    it. Note in particular too that (speaking somewhat loosely) all 0-tuples are equal
    to one another, since in fact there’s only one such tuple.


    **191**


    # Tuple expression

    An expression denoting a tuple. Tuple literals, tuple selector invocations, tuplevar
    references, and read-only tuple operator invocations are all special cases.


    # Tuple extension

    Let `t` be a tuple. Then the tuple extension `EXTEND t ADD ( exp AS X)` is a tuple
    identical to `t` except that it has an additional attribute called `X,` with value
    as specified by `exp`. Tuple `t` must not have an attribute called `X,` and `exp`
    must not refer to `X`.


    ## Example

    Let `t` be some tuple from relvar `P`. Then the expression

    ```

    EXTEND t ADD ( WEIGHT * 454 AS GMWT )

    ```

    yields a tuple just like `t,` except that it has an additional attribute `GMWT`
    ("gram weight") whose value is 454 times the `WEIGHT` value in that same tuple.


    # Tuple extractor

    An operator for extracting the single tuple from a specified relation of cardinality
    one.


    ## Example

    The following expression extracts the supplier tuple for supplier `S1` from the
    current value of relvar `S`:

    ```

    TUPLE FROM ( S WHERE S# = S#(''S1'') )

    ```

    A run-time error will occur if the `TUPLE FROM` argument doesn’t have cardinality
    exactly one.


    # TUPLE FROM

    `Tutorial D` syntax for a tuple extractor, q.v.


    # Tuple ID

    *See* row ID.


    **192**


    # Tuple intersection

    *See* tuple union.


    # Tuple join

    *See* tuple union.


    # Tuple level

    An operator is tuple level if it takes individual tuples or tuplevars or both
    as operands and either produces a tuple as a result or updates a tuple variable.
    There are no tuple level operators in the relational model as such, but such operators
    are likely to be needed in the external environment in order to support, e.g.,
    extraction of some tuple from some relation. (By contrast, SQL in particular supports
    certain tuple level operations—specifically, `DELETE WHERE CURRENT` and `UPDATE
    WHERE CURRENT`—that aren’t just part of the external environment but are supposed
    to affect the database directly. The operators in question thus constitute a departure
    from the relational model.)


    # Tuple literal

    A literal that denotes a tuple.


    ## Example

    *See* the examples under literal.


    # Tuple operator

    An operator that (a) takes either tuples or tuplevars (or both) as operands and
    (b) either returns a tuple or updates at least one tuplevar.


    # Tuple projection

    Let `t` be a tuple and let `{ X}` be a subset of the heading of `t`. Then the
    tuple projection of `t` on `{ X},` `t{ X},` is a tuple obtained from `t` by removing
    all components not corresponding to attributes in `{ X}`.


    ## Example

    Let `t` be some tuple in relvar `S`. Then the expression `t{STATUS,CITY}` yields
    a tuple of type `TUPLE {STATUS INTEGER, CITY CHAR}`, containing just the `STATUS`
    and `CITY` components from that tuple `t`.


    # Tuple relational calculus

    Tuple calculus, q.v.


    # Tuple renaming

    Let `t` be a tuple, let `A` be an attribute of `t,` and let `t` not have an attribute
    named `B`. Then the tuple renaming `t RENAME ( A AS B)` is a tuple identical to
    `t` except that attribute `A` in that tuple is renamed `B`.


    ## Example

    Let `t` be some tuple from relvar `P`. Then the expression

    ```

    t RENAME ( WEIGHT AS WT )

    ```

    yields a tuple just like `t,` except that attribute `WEIGHT` is renamed `WT`.


