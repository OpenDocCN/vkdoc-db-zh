    # A


    `A` 一种关系完备的、“精简指令集”形式的关系代数，仅有两个原始运算符——`REMOVE`（本质上是除一个属性外对所有属性的投影）和 `NOR` 或 `NAND`（参见相应词条）的代数类比物。这个名称是一个双重递归首字母缩略词：它代表
    *ALGEBRA*（代数），而 *ALGEBRA* 本身又代表 *A Logical Genesis Explains Basic Relational Algebra*（一个逻辑起源解释基本关系代数）。正如这个扩展名称所示，它的设计方式强调了与谓词逻辑（参见）学科的密切关系和坚实基础。更多细节可以在
    C.J.戴特（C. J. Date）和休·达文（Hugh Darwen）所著的《数据库、类型与关系模型：第三宣言》（*Databases, Types, and
    the Relational Model: The Third Manifesto*）（第 3 版，Addison-Wesley, 2006）一书中找到。


    *注*：该书使用实心箭头 ◄ 和 ► 来界定 `A` 运算符名称，例如 ◄NOR►，以区分这些运算符与谓词逻辑或 **Tutorial D** 中或两者中具有相同名称的运算符，但此处特意省略了这些箭头。更重要的是，该书实际上并没有将
    `NOR` 或 `NAND` 定义为原始的 `A` 运算符；相反，它将 `A` 定义为包含显式的 `NOT`、`OR` 和 `AND` 运算符。但它随后指出，(a)
    移除 `OR` 或 `AND` 中的任何一个不会导致功能损失，并且 (b) `NOT` 和保留下来的 `OR` 或 `AND` 可以合并成一个运算符——`NOT`
    和 `OR` 合并为 `NOR`，或 `NOT` 和 `AND` 合并为 `NAND`。因此，将 `NOR` 或 `NAND`（如同 `REMOVE`，参见）视为
    `A` 的一个原始运算符并无大碍。


    `Abelian group` *参见* group (mathematics)（群（数学））。


    `absolute complement` *参见* complement (set theory)（补集（集合论））。


    # 关系数据库词典（扩展版）


    **3**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00010.png)


    `absorption` 设运算符 *OpC* 和 *OpD* 都是二元运算符，并且为了明确起见，假设它们以中缀风格表示。那么 *OpC* 吸收 *OpD*
    当且仅当，对于所有的 *x* 和 *y*，`x OpC (x OpD y) = x`。


    *示例*：在逻辑中，`OR` 和 `AND` 彼此吸收对方，因为 `x OR (x AND y)` 和 `x AND (x OR y)` 都简化为 `x`。类似地，在集合论和关系代数中，`union`（并）和
    `intersection`（交）也彼此吸收对方。


    `abstract data type` 类型。*注*：该术语有时用于指代某种特定类型的类型（尤其是非内置的类型），但有充分理由认为所有类型都应该是“抽象的”，至少在其物理表示对用户隐藏这个意义上如此。


    `access path` 一种实现构造。典型的例子包括哈希、索引和指针链。在关系模型中没有访问路径——对关系的所有访问都是通过关联寻址（参见）进行的。


    `actual operand` *参见* argument（实参）。


    `ad hoc polymorphism` *参见* overloading（重载）。


    `aggregate operator` 一种只读运算符，它从作为某个关系某个属性值出现的“聚合”（即集合或包）中导出单个值（通常是但不一定是标量值）——或者，在
    `COUNT`（它稍微特殊一点）的情况下，是从整个关系本身这个“聚合”中导出。*对比* summary（汇总）。*注*：如果 (a) 某个聚合运算符调用所基于的关系是空的，并且
    (b) 该调用本质上只是对某个二元标量运算符重复调用的简写，并且 (c) 该标量运算符存在一个幺元（参见），那么该调用的结果就是那个幺元值。例如，假设运算符
    `SUM` 在一个由一组 `INTEGER` 类型值组成的聚合上调用。由于 `SUM` 本质上只是对标量运算符“+”重复调用的简写，并且对于整数上的“+”存在一个幺元值——即零，那么如果聚合为空，结果就是零。


    **4**


    # 关系数据库词典（扩展版）


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00086.png)


    *示例*：设 `ST` 是一个 `INTEGER` 类型的变量。那么下面的语句将供应商在伦敦的 `STATUS` 值之和赋给 `ST`：

    ```

    ST := SUM ( S WHERE CITY = ''London'', STATUS ) ;

    ```

    这里的 `STATUS` 是一个属性引用（参见）。如果关系变量 `S` 当前为空，那么在此赋值之后，变量 `ST` 的值将为零。


    `ALGEBRA` *参见* `A`。

