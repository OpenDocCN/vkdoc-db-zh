    ## 3. *承接上一点，我应该明确指出，本词典中的所有关系定义都旨在完全符合* The Third Manifesto *定义的关系模型。因此，你可能会发现这些定义的某些方面有点令人惊讶——例如，在*
    延迟检查 *条目中声称这种检查在逻辑上是有缺陷的。正如我所说，这是一本有态度的词典。*


    ## 4. *在行业中，标准做法是使用诸如* 投影 *、* 连接 *之类的术语，但其含义有两点不同：它们既用于指代由这些名称标识的运算符，也用于指代调用这些运算符时获得的结果。我自己在本词典中也偶尔遵循这一做法，并希望这不会引起混淆。*


    ## 5. *在行业中，还有另一种解释* 投影 *、* 连接 *等术语的标准做法。根据定义，这些运算符专门应用于关系值。当然，特别是，它们应用于碰巧是 `relvars`
    当前值的值。因此，谈论例如 `relvars` `R1` 和 `R2` 的连接是有意义的，意思是分别取这两个 `relvars` 的当前值 `r1` 和 `r2`
    的连接所得到的关系。然而，在某些情况下（例如规范化），事实证明方便地使用诸如“`relvars` `R1` 和 `R2` 的连接”之类的表达，但其含义略有不同。具体来说，我们可能会松散但非常方便地说某个
    `relvar`（比如 `RJ`）是 `relvars` `R1` 和 `R2` 的连接——更准确地说，意思是 `RJ` 的值在所有时刻都是 `R1` 和
    `R2` 在相关时刻的值的连接。*


    *因此，从某种意义上说，我们可以谈论 `relvars` 本身的连接，而不仅仅是谈论 `relvars` 当前值的连接。类似的评论适用于所有的关系操作。*


    ## 6. *提到投影又引出了另一点。词典这样定义投影：*


    *令 `r` 为一个关系，令 `{X}` 为 `r` 的标题的一个子集。那么 `r` 在 `{X}` 上的投影，`r{X}`，是一个标题为 `{X}` 且主体由所有元组
    `x` 组成的关系，其中存在某个元组 `t` 在 `r` 中，其 `X` 值为 `x`。*


    **viii**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00157.png)


    *但这个定义并不像它可能的那样精确。具体来说，如果 `{X}` 是 `r` 标题的一个子集，那么根据定义，它是一组 `<属性名，类型名>` 对。但在 **Tutorial
    D** 表达式 `r{X}` 中，符号 `{X}` 应该表示的不是一组 `<属性名，类型名>` 对，而仅仅是一组属性名。（**Tutorial D** 语法之所以有效，是因为属性名在相关标题内是唯一的，因此相应的类型名是隐式指定的。）所以这里存在一种双关：完全相同的符号
    `{X}` 必须在不同的上下文中被理解为略有不同的含义。我希望我玩的这个小把戏不会给你带来任何困惑，因为我在整个词典中广泛使用了它。注意：以同样的方式，术语*
    属性 *有时必须被理解为属性名，而不是属性本身，术语* 标题 *有时必须被理解为一组属性名，而不是一组 `<属性名，类型名>` 对。例如，请参见* 候选键
    *条目，它说明了这两种用法。*


    ## 7. *某些定义——例如某些运算符的定义——要求某些值是某些特定类型。为了简单起见，我没有在每种情况下都详细说明这一事实，而只是假设在必要时该要求已得到满足。*


    ## 8. *一些定义和示例使用了元组的简化符号。*


    *例如，考虑图 1 中显示的针对供应商 `S1` 和零件 `P1` 的 `SP` 元组。该元组的正式 **Tutorial D** 表示可能如下所示：`TUPLE
    { S# S#(''S1''), P# P#(''P1''), QTY QTY(300) }`*


    *然而，在讨论的简化符号中，同一个元组将表示如下：*


    `<S1,P1,300>`


    ## 9. *集合的概念在数据库世界中无处不在。在纸上，集合通常由一个逗号分隔的符号列表（或“逗号列表”）表示，这些符号表示元素，整个列表用花括号括起来，如下所示：`{
    a,b,c }`。*


    *因此，在本词典中，当相关项目旨在表示某个集合的元素时，我使用花括号将项目的逗号列表括起来，这意味着（a）逗号列表中项目出现的顺序无关紧要，以及（b）如果一个项目出现多次，则将其视为仅出现一次。*


    **The Relational Database Dictionary, Extended Edition**


    **ix**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00011.png)


    ## 10. *逻辑的概念在数据库世界中也无处不在。关系模型尤其牢固地建立在逻辑基础上。更准确地说，它基于传统的二值谓词逻辑 `2VL`（见该条目），本词典中所有对逻辑的引用都应被视为特指该逻辑，除非上下文另有要求。注意：正如这一点所表明的，词典中的许多条目都与来自逻辑的概念有关。*


    *不幸的是，逻辑教科书（以及逻辑学家）差异很大，不仅在于他们使用的术语，而且在某些情况下在于他们定义的实质。我给出的定义是我自己认为最合适的，但请注意，它们有时与你可以在文献中找到的其他定义不一致。*


