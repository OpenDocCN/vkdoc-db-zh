  trans: '# 关系型数据库词典扩展版


    虽然有时在更广泛的意义上使用，用于包含因某些原因不被视为合法集合的元素集合。


    例如，（无限）所有集合的集合被一些数学家视为类而非集合。


    ## OO

    用于表示以下不同含义的术语：(a) 一种类型；(b) 某个给定类型的实现或物理表示；(c) 一个类型及其某个实现的组合；(d) 某个给定类型当前使用的所有值的集合；以及
    (e) 可能还有其他含义。


    ## closed WFF

    一个表示命题的 WFF。`contrast` 开放式 WFF。


    ## Closed World Assumption, The

    粗略地说，假设数据库中陈述或隐含的一切都是真的，而其他一切都是假的。更精确地说，封闭世界假设（`CWA`）指出：(a) 如果某个给定元组在某个给定时间出现在某个给定的关系变量中，那么该元组所表示的命题在该时间为真；(b)
    如果某个给定元组在该时间本可以出现在该关系变量中但实际上没有，那么该元组所表示的命题在该时间为假。换句话说，在任何给定时间，关系变量只包含并且包含所有那些对应于真命题（即，在该时间对关系变量谓词的调用或完全实例化求值结果为`TRUE`）的元组。*注意*：这里所指的关系变量不一定是基本关系变量，这就是为什么原始粗略描述中出现了“或隐含”的短语。还要注意，该定义是专门针对关系变量表述的，但一个完全类似的定义也适用于关系（`see`
    扩展，第三个定义）。`contrast` Open World Assumption, The。


    **示例**：元组 `<S1,P1,300>` 当前出现在关系变量 `SP` 中；因此我们可以假设，当前供应商 `S1` 以数量 `300` 供应零件 `P1`
    的情况成立。相反，元组 `<S5,P6,250>` 当前没有出现，尽管它本可以出现；因此我们可以假设，当前供应商 `S5` 以数量 `250` 供应零件 `P6`
    的情况不成立。


    关于隐含信息的一个例子：观察到元组 `<S3>` 当前出现在关系变量 `SP` 在 `{S#}` 上的投影中；因此我们可以假设，当前供应商 `S3` 以某种数量供应某个零件的情况成立。相反，元组
    `<S5>` 当前没有出现，尽管它本可以出现；因此我们可以假设，当前供应商 `S5` 不供应任何零件的情况成立。


    ## closure

    1. （**属性集的**）所有属性 *A* 的集合，使得集合 `{A}` 函数依赖于给定集合。

    2. （**函数依赖集的**）由给定集合蕴含的所有函数依赖的集合。

    3. （**一般代数的**）`see` 代数定律，The。

    4. （**关系代数的**）每个代数运算的结果都是一个关系的属性。


    ## closure, transitive

    `see` 传递闭包。


    ## CNF

    合取范式。


    ## Codd, E. F.

    关系模型的发明者。尤其要参见他的论文：(a) "Derivability, Redundancy, and Consistency of Relations
    Stored in Large Data Banks," IBM Research Report RJ599, 1969 年 8 月 19 日（关于关系模型的第一篇出版物）；(b)
    "A Relational Model of Data for Large Shared Data Banks," *CACM 13*, No. 6, 1970
    年 6 月（第一篇论文的修订扩展版）；以及 (c) "Relational Completeness of Data Base Sublanguages,"
    in Randall Rustin (ed.), *Data Base Systems*: Courant Computer Science Symposia
    *6*, Prentice-Hall (1972)。特别是最后一篇论文包含了元组演算和科德原始关系代数的形式化定义，以及科德归约算法（`q.v.`）的形式化定义。


