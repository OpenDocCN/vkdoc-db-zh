    **essentiality** Let *DM* be a data model in the first sense of that term (q.v.)
    and let *DS* be a data structure provided by *DM*. Let *dm* be a data model in
    the second sense of that term (created using the facilities of *DM*), and let
    *dm* include an occurrence *ds* of *DS*. Let *db* be a database conforming to
    *dm*. If removal from *db* of the data corresponding to *ds* would cause a loss
    of information from *db*, then *ds* is essential in *dm* (and, loosely, *DS* is
    essential in *DM*). For example, nonrelational systems typically provide numerous
    ways of representing information essentially, including (e.g.) pointers, record
    ordering, repeating groups, and so forth. *Note*: If data model *DM* supports
    *n* distinct data structures—in other words, if *DM*


    provides *n* distinct ways, essential or inessential, to represent information—then
    it’s axiomatic that *DM* must also support *n* distinct sets of operators. However,
    there’s nothing useful that can be done if *n* > 1 that can’t be done if *n* =
    1 (and *n* = 1 is the minimum, of course).


    **Example*: For the relational model, we do have *n* = 1; that is, the relational
    model supports just one data structure, the relation itself, and that data structure
    is clearly essential, since if it were removed the model would be incapable of
    representing anything at all. However, since the relational model is in fact capable
    of representing absolutely any data whatsoever, any data model that supports relations
    in some shape or form as well as some additional data structure *DS* must be such
    that either relations are inessential or *DS* is. But if relations are inessential,
    then *DS* must be logically equivalent to relations!—in which case it could be
    argued that it’s really *DS* that’s inessential anyway, not relations. What’s
    more, a data model that doesn’t “support relations in some shape or form” is unlikely
    in the extreme; even SQL could be said to support relations if various SQL


    features—nulls, anonymous columns, duplicate rows, and so on—are avoided. Thus,
    for example, pointers (object IDs), bags, lists, and arrays could all be removed
    from the so called object model without any loss of representational power. Indeed,
    the fact that they’re not removed is prima facie evidence that “the object model”
    fails to distinguish properly between model and implementation issues.


