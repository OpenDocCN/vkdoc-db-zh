    ( *n* ≥ 0), INTERSECT { *r1,r2,. . .,rn*}, where *r1, r2, . . ., rn* are all of
    the same type *T,* is a relation of type *T* with body the set of all tuples *t*
    such that *t* appears in each of *r1, r2, . . ., rn* (unless *n* = 0, in which
    case (a) some syntactic mechanism, not shown here, is needed to specify the pertinent
    type *T* and (b) the result is the universal relation, q.v., of that type). *Note*:
    The relational intersection operator differs in certain respects from the **94**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00199.png)


    mathematical or set theory operator of the same name, q.v. In fact, it’s a special
    case of join, q.v.


    **Example*: The expression (S{CITY}) INTERSECT (P{CITY}) denotes the intersection
    of the projections on {CITY} of the relations that are the current values of relvars
    S and P. That intersection is a relation of type RELATION {CITY CHAR}. Moreover,
    if the current values of relvars S


    and P are *s* and *p,* respectively, the body of that relation consists of all
    tuples of the form < *c*> that appear in both *s*{CITY} and *p*{CITY}—


    meaning *c* is a current supplier city that’s also a current part city. Note that
    the expression (S{CITY}) INTERSECT (P{CITY}) is semantically equivalent to the
    expression (S{CITY}) JOIN (P{CITY}).


    **intersection (bag theory) *See* bag.


    **intersection (set theory)** The set of all elements appearing in both of two
    given sets. *Note*: This definition can obviously be extended to apply to any
    number of sets.


    **intersection star *See* bag.


    **into** ( *Of a function*; *used as an adjective*) Having range equal to some
    proper subset of the codomain ( *contrast* onto). *See* injection.


    ****inverse** *See* Laws of Algebra, The.


    **Examples*: 1\. In ordinary arithmetic, the identities for “+” and “*” are 0


    and 1, respectively ( *see* identity). As a consequence, (a) for “+”, the inverse
    of *x* is - *x*; (b) for “*”, the inverse of *x* is 1/ *x* (unless *x* is 0, the
    only number that has no multiplicative inverse). 2\. In two-valued logic, the
    identities for OR and AND are FALSE and TRUE, respectively (again, *see* identity).
    As a consequence, (a) for OR, FALSE is its own inverse but TRUE has no inverse
    (there’s no truth value *v* such that TRUE OR *v* yields FALSE); (b) for AND,
    TRUE is its own inverse but FALSE has no inverse (there’s no truth value *v* such
    that FALSE AND *v* yields TRUE).


    ****The Relational Database Dictionary, Extended Edition**


    **95**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00085.png)


    **involution** 1\. ( *Logic*) If *v* is a truth value, then the negation of the
    negation of *v* is equal to *v*. 2\. ( *Set theory*) If *s* is a set, then the
    complement of the complement of *s* is equal to *s*.


    ****irreducibility** 1\. ( *Of a key*) *See* candidate key. 2\. ( *Of a relvar*)
    Sixth normal form. 3\. ( *Of an FD*) Left irreducible. 4\. ( *Of a set of FDs*)
    The set *s* of FDs is irreducible if and only if (a) the dependant in every FD
    in *s* contains just one attribute, (b) every FD in *s* is left irreducible, and
    (c) no FD can be removed from *s* without changing the closure of *s*.


    ****irreducibly dependent** ( *Of a dependant in an FD*) Let *A* and *B* be subsets
    of the heading of some relvar *R*. Then *B* is irreducibly dependent on *A* if
