    **Introduction**


    *This dictionary contains just over 900 entries dealing with issues, terms, and*
    *concepts involved in, or arising from use of, the relational model of data. Many*
    *of the entries include not only a definition as such but also an illustrative*
    *example (sometimes more than one). With regard to those definitions, I’ve done*
    *my best to make them as clear, precise, and accurate as possible; they’re based*
    *on my own best understanding of the material, an understanding I’ve gradually*
    *been honing over nearly 40 years of involvement in this field.*


    *I’d like to stress the point that the dictionary is, as advertised, relational.
    To that* *end, I’ve deliberately omitted many terms and concepts that are only
    tangentially* *connected to relational matters (e.g., almost all details of the
    supporting type* *theory, including type inheritance details in particular). For
    the most part, I’ve* *also omitted various topics that are part of database technology
    in general and* *aren’t peculiar to relational databases (e.g., security issues,
    the log, recovery* *and concurrency control, and so forth). What’s more, I’ve
    also omitted certain* *SQL terms and concepts that—the fact that SQL is supposed
    to be a relational* *language notwithstanding—aren’t really relational at all
    (outer join, UNION*


    *ALL, and updating through a cursor are examples). That said, I should add that*
    *I have deliberately included a few nonrelational terms in order to make it clear*
    *that, contrary to popular opinion, the concepts in question are indeed not* *relational
    (index is a case in point here).*


    *I must explain too that this is a dictionary with an attitude. It’s my very firm*
    *belief that the relational model is the right and proper foundation for database*
    *technology and will remain so for as far out as anyone can see, and many of the*
    *definitions in what follows reflect this belief. As I said in my book* Database
    in Depth: Relational Theory for Practitioners *(O’Reilly Media Inc., 2005):*


    *[It’s] my opinion that the relational model is rock solid, and “right,” and will*
    *endure. A hundred years from now, I fully expect database systems still to be*
    *based on Codd’s relational model. Why? Because the foundations of that* *model—namely,
    set theory and predicate logic—are themselves rock solid in* *turn. Elements of
    predicate logic in particular go back well over 2000 years, at* *least as far
    as Aristotle (384–322 BCE).*


