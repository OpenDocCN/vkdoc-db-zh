    ## primary domain

    Let `R` be a base relvar; let `R` have a primary key, `K`; let `K` be simple (
    *see* simple key); and let `K` be defined on domain (i.e., type) `D`. Then, and
    only then, `D` is a primary domain. *Note*: Since (a) it clearly violates The
    Principle of Interchangeability and (b) it relies on a concept, primary key, that’s
    hard to justify from a logical point of view ( *see* primary key), the primary
    domain concept is strongly deprecated. In any case, the term (perhaps fortunately)
    isn’t much used; we mention it here mainly for historical reasons.


    `Examples`: In the case of the suppliers-and-parts database, the sole primary
    domains are `S#` and `P#`.


    ## primary key

    A candidate key that has been singled out for special syntactic treatment for
    some reason. While a given relvar can have any number of candidate keys, it can
    have at most one primary key. For a given relvar, however, whether some candidate
    key is to be chosen as primary, and if so which one, are essentially psychological
    issues, beyond the purview of the relational model as such. *Note*: The relational
    model originally insisted that base relvars, at least, should always have a primary
    key. It also insisted that foreign keys reference primary keys specifically. However,
    there were never any good logical reasons for these rules, and in any case rules
    that apply to base relvars but not other kinds are more than a little suspect
    anyway (because they violate The Principle of Interchangeability); thus, the primary
    key notion could be dropped without serious loss. We mention it here mainly for
    historical reasons.


    ## prime attribute

    Old fashioned and somewhat deprecated term for a key attribute (not necessarily
    a primary key attribute).


    ## primitive operator

    Loosely, an operator not defined in terms of others. More precisely, let `s` be
    a set of operators. Let `Op` be an operator in `s` that can be defined in terms
    of other operators in `s`; remove `Op` from `s`, and repeat this step until it
    can’t be repeated any more. What remains is a set of operators that are primitive
    with respect to `s`. Note that the set of primitive operators with respect to
    a given set `s` is not necessarily unique.


    `Examples`: 1. For relational algebra, a primitive set of operators (a) will definitely
    include projection, (b) will probably include join, but (c) will probably not
    include semijoin (because semijoin can be defined in terms of projection and join).
    *See* **A**. 2. For two-valued logic, any of the following sets of operators can
    be taken as primitive: `{NOT, OR}`; `{NOT, AND}`; `{NOR}`; `{NAND}`.


    **The Relational Database Dictionary, Extended Edition**

    **132**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00162.png)


    ## Principle of Cautious Design, The

    A guiding principle in the design of formal systems (including databases, `DBMS`s,
    database languages, and many others). It can be stated thus: given a design choice
    between options `A` and `B`, where `A` is upward compatible with `B` and the full
    implications of `B` aren’t yet known, the cautious decision is to go with `A`.
    Going with `A` permits future “opening up” of the design to `B` if such opening
    up becomes desirable. By contrast, going with `B` prohibits future “closing down”
    of the design to `A`, even if such closing down becomes desirable (i.e., if it
    becomes clear that `B` was a bad decision in the first place).


    `Example`: The designers of `SQL` had a choice between prohibiting duplicate rows
    ( *Option A*) and permitting them ( *Option B*). The cautious decision would have
    been to prohibit them ( *Option A*); they could then have been supported in the
    future, if a clear need for such support were ever demonstrated. Unfortunately,
    the designers chose to permit them ( *Option B*). Of course, this decision turned
    out to be a very bad one, but now there’s no compatible way for `SQL` to go back
    to *Option A*. *Note*: As this example suggests, The Principle of Cautious Design
    can help to avoid situations in which the language (or the `DBMS`, or the database,
    or whatever else it is that’s being designed) provides certain options that users
    have to be explicitly told not to exercise.


    **The Relational Database Dictionary, Extended Edition**

    **133**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00155.png)


    ## Principle of Identity of Indiscernibles, The

    The principle that if there’s no way whatsoever of distinguishing between two
    objects, then there aren’t two objects but only one. Or equivalently: every object
    has its own unique identity. *Note*: In the relational model, such unique identities
    are represented in the same way as everything else—namely, by means of attribute
    values ( *see* Information Principle, The)—and numerous benefits accrue from this
    fact. Note too that there’s a logical difference between indiscernibility and
    interchangeability—two objects might be interchangeable and yet distinguishable
    (think of two pennies, for example). Note finally that the term `object` is not
    being used here in its `OO` sense.


    ## Principle of Incoherence, The

    A principle, sometimes invoked in defense of a less than fully successful attempt
    at criticizing some technical issue, to the effect that it’s hard to criticize
    something coherently if what’s being criticized is itself not very coherent in
    the first place. Occasionally referred to, a little unkindly, as The Incoherent
    Principle.


    ## Principle of Interchangeability, The

    *See* Interchangeability Principle, The.


    ## Principles of Normalization, The

    *See* normalization principles.


