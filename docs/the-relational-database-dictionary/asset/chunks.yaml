- fmt: '## set level

    The operators of the relational model are all set level, in the sense that they
    take entire relations or relvars or both as operands and either produce entire
    relations as results or update entire relvars. (`Relation level` would be a better
    term.)


    *Note*: An implication of this notion for update operators in particular is that
    compensating actions and database integrity checking must not be done until all
    of the updating has been done; i.e., a set level update must not be treated as
    a sequence of individual tuple level updates.


    *Contrast* tuple level.


    ## set membership

    (*Of an element*) The property of appearing in some given set; the operation of
    testing for that property. Set membership is usually denoted by the symbol "∈";
    thus, for example, the Boolean expression `x` ∈ `s` (which is semantically equivalent
    to the expression { `x`} ⊆ `s`) returns TRUE if and only if element `x` does in
    fact appear in set `s`.


    ## set operator

    *See* Boolean algebra (second definition).


    ## set theory

    A branch of mathematics, closely related to logic, that deals with the nature
    of sets; it formalizes the concept of a set in terms of certain axioms, such as
    the axiom of extension, q.v.


    ## Sheffer stroke

    *See* NAND.


    ## SI prefixes

    Part of the International System of Units, the standard for scientific measurements
    of all kinds (SI is an abbreviation for `Système Internationale d''Unités`). The
    following table lists SI prefixes and their abbreviations and meanings:


    | yotta | Y | 10 to the power 24 | yocto | y | 10 to the power -24 |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | zetta | Z | 10 to the power 21 | zepto | z | 10 to the power -21 |

    | exa | E | 10 to the power 18 | atto | a | 10 to the power -18 |

    | peta | P | 10 to the power 15 | femto | f | 10 to the power -15 |

    | tera | T | 10 to the power 12 | pico | p | 10 to the power -12 |

    | giga | G | 10 to the power 9 | nano | n | 10 to the power -9 |

    | mega | M | 10 to the power 6 | micro | µ | 10 to the power -6 |

    | kilo | k | 10 to the power 3 | milli | m | 10 to the power -3 |

    | hecto | h | 10 to the power 2 | centi | c | 10 to the power -2 |

    | deca | da | 10 to the power 1 | deci | d | 10 to the power -1 |


    In the computing world, however, the prefixes yotta through kilo are used a little
    differently. To be specific, they''re interpreted in terms of powers of 2, not
    10, as indicated here:


    | yotta | Y | 2 to the power 80 |

    | :--- | :--- | :--- |

    | zetta | Z | 2 to the power 70 |

    | exa | E | 2 to the power 60 |

    | peta | P | 2 to the power 50 |

    | tera | T | 2 to the power 40 |

    | giga | G | 2 to the power 30 |

    | mega | M | 2 to the power 20 |

    | kilo | K | 2 to the power 10 |


    For example, one kilobyte (1KB—the prefix `kilo` is usually abbreviated `K`, not
    `k`, in the computing world) is 1,024 bytes, not 1,000 bytes. Note in particular
    that a gigabyte is a billion bytes, roughly speaking (the abbreviation `BB` is
    sometimes used instead of `GB`; likewise, the abbreviation `XB` is sometimes used
    instead of `EB`). Note also that—contrary to popular belief—`gigabyte` is pronounced
    with a soft initial `g` and the `i` is long (as in `gigantic`).


    ## signature

    Let `Op` be an operator. Then the signature of `Op` consists of the combination
    of (a) the operator name `Op`, (b) the types (in order) of the parameters to `Op`,
    and (c) the type of the result, if any, of executing `Op`.


    *Note*: Some writers give definitions that differ slightly from the one just given;
    for example, the term is sometimes taken to include parameter names.


    *Example*: Consider the read-only version of the operator `DOUBLE` from the examples
    under argument. The signature for that operator consists of the combination of
    (a) the operator name `DOUBLE`, (b) the type (`INTEGER`) of the sole parameter
    to that operator, and (c) the type (also `INTEGER`) of the result returned when
    that operator is invoked.


    ## simple attribute

    An attribute, q.v. *Contrast* composite attribute.


    ## simple key

    A key that''s not composite.


    ## simple predicate

    A predicate that involves no connectives.


    ## simple proposition

    A proposition that involves no connectives.


    ## single arrow

    Same as arrow (*see* functional dependency).


    ## single-relvar constraint

    Term sometimes used to mean a database constraint that mentions exactly one relvar.
    *Contrast* multi-relvar constraint.


    *Note*: The difference between single-relvar and multi-relvar constraints is more
    a matter of pragma than logic, thanks to The *Principle of Interchangeability*
    among other things.


    *Examples*: The key constraints for relvars `S`, `SP`, and `P`; also constraints
    `C1` and `C2` from the examples under database constraint.


    ## single-tuple constraint

    Same as tuple constraint.


    ## singleton

    Strictly, a set of cardinality one (also known as a singleton set); sometimes
    used loosely to refer to the single element contained in such a set.


    ## sixth normal form

    Relvar `R` is in sixth normal form, `6NF`, if and only if it can''t be nonloss
    decomposed at all, other than trivially—i.e., if and only if the only JDs it satisfies
    are trivial ones. Note, therefore, that (a) `6NF` is the ultimate normal form
    with respect to normalization as conventionally understood; (b) every `6NF` relvar
    is in `5NF`. Observe that relvar `R` is in `6NF` if and only if (a) it consists
    of a key `K` and at most one other attribute `A` (if `K` is free of embedded dependencies,
    q.v.) or exactly one other attribute `A` (otherwise), and (b) no proper subset
    { `B`} of `K` satisfies either the FD { `A`} → { `B`} or the FD { `B`} → { `A`}.
    Observe also that the definition can in fact be simplified thus: Relvar `R` is
    in `6NF` if and only if it''s in `5NF`, is of degree `n`, and has no key of degree
    less than `n`-1.


    *Note*: The concept of `6NF` is given an extended definition in a temporal database
    context, where it enjoys certain advantages over `5NF`—advantages that don''t
    necessarily apply in a conventional (nontemporal) database. The details are beyond
    the scope of this dictionary.


    *Examples*: 1. Relvar `SP` is in `6NF`, since it can''t be nonloss decomposed
    at all other than trivially. (Observe that `SP` is certainly in `5NF`; it''s of
    degree three; and it has no key of degree less than two.) By contrast, relvars
    `S` and `P` aren''t in `6NF`, because they can both be nonloss decomposed, nontrivially,
    into several binary projections. 2. Let relvar `PLUS` have attributes `A`, `B`,
    and `C`, all of type `INTEGER`, and let the corresponding relvar predicate be
    `A + B = C`. Then relvar `PLUS` has three distinct keys: `{A,B}`, `{B,C}`, and
    `{C,A}`. But `PLUS` is in `6NF`, since it''s certainly in `5NF`, it''s of degree
    three, and it has no key of degree less than two.


    ## Skolem constant

    By definition, the expression

    ```

    EXISTS x ( p( x))

    ```

    is logically equivalent to the expression `p( v)` for some unknown value `v`;
    that is, the original expression asserts that some such `v` certainly exists,
    even if we don''t know what it is. That value `v` is a Skolem constant. *See also*
    Skolem function.


    ## Skolem function

    By definition, the expression

    ```

    FORALL y (EXISTS x ( q( y,x))

    ```

    is logically equivalent to the expression

    ```

    FORALL y ( q( y,f( y)))

    ```

    for some unknown function `f` of the universally quantified variable `y`. That
    function `f` is a Skolem function. Together, Skolem constants, q.v., and Skolem
    functions provide a basis for systematically eliminating existential quantifiers
    from an arbitrary expression, thereby making that expression more amenable to
    subsequent formal manipulation. Further details are beyond the scope of this dictionary.'
