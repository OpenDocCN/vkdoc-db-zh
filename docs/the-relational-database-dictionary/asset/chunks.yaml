    ## 小除法


    多年来定义的众多关系除法运算符之一（参见 `除法`）。设关系 `r1`、`r2` 和 `r3` 满足：(a) `r1` 和 `r3` 中同名属性类型相同，`r3`
    和 `r2` 中同名属性类型也相同（换句话说，`r1` 和 `r3` 是可连接的，`r3` 和 `r2` 也是可连接的）；(b) 集合 `{X}` 是 `r1`
    和 `r3` 的公共属性；(c) 集合 `{Y}` 是 `r3` 和 `r2` 的公共属性；(d) 集合 `{X}` 和 `{Y}` 不相交。


    那么，除法 `r1` `除以` `r2` `每` (`r3`)——其中 `r1` 是被除数，`r2` 是除数，`r3` 是“中介”——是一个与 `r1` 具有相同标题的关系，其主体定义如下：元组
    `t` 出现在该主体中，当且仅当 `t` 出现在 `r1` 中，并且对于 `r2`{`Y`} 中的每一个元组 `<y>`，都存在一个元组 `<x,y>`（其中
    `x` 等于 `t` 中的 `X` 值）出现在 `r3`{`X,Y`} 中。换句话说，表达式 `r1` `除以` `r2` `每` (`r3`) 在语义上等价于表达式
    `r1` `不匹配` ((`r1`{`X`} `连接` `r2`{`Y`}) `不匹配` `r3`)。对比 `大除法`。


    ### 示例


    除法 `S` `除以` `P` `每` (`SP`) 产生一个关系，其标题与关系变量 `S` 相同，主体由来自关系变量 `S` 的所有可能元组 `<s#,sn,st,sc>`
    组成，这些元组满足供应商 `s#` 提供了关系变量 `P` 中提到的所有零件。（根据图 1 的示例值，结果只包含供应商 `S1` 的元组。）该表达式在语义上等价于下面这个表达式：


    ```

    S 不匹配

    ( ( S { S# } 连接 P { P# } ) 不匹配 SP )

    ```


    等价的元组演算表述是：


    ```

    SX 范围属于 { S } ;

    SPX 范围属于 { SP } ;

    PX 范围属于 { P } ;

    SX 满足 对所有 PX ( 存在 SPX

    ( SPX.S# = SX.S# AND SPX.P# = PX.P# ) )

    ```


    等价的 `教程 D` 表述是：


    ```

    S 满足 ( ‼SP ) { P# } = P { P# }

    ```


    （参见 `影像关系`）。


    ## 快照


    一个真实的派生关系变量，而非虚拟的（对比 `视图`）。给定快照在给定时间的值，是在该时间之前某个时间对某个关系表达式（快照定义表达式，在定义快照本身时指定）进行求值的结果。快照根据需要“刷新”（意思是重新求值快照定义表达式，并将结果赋值为快照新的当前值），或者更常见的情况是，当某个规定的事件发生时（例如经过了一段特定的时间间隔）进行刷新。


    注意：快照定义表达式必须至少提及一个关系变量，否则快照就不 specifically 是一个关系变量。


    ### 示例


    以下语句定义了一个名为 `LSS` 的快照：


    ```

    VAR LSS 快照 ( S 满足 城市 = ''London'' )

    每天刷新 ;

    ```


    快照 `LSS` 在任何给定时间的值，等于快照定义表达式 `S 满足 城市 = ‘London’` 在最多 24 小时之前的值。


    ## 排序/归并


    一种连接实现技术。


    ## 排序逻辑


    一种逻辑形式，其中逻辑所涉及的值被划分为 *种类*（即类型）。注意：大多数逻辑教材很少或根本不关注类型的概念；相反，它们处理的是无排序逻辑，这实际上意味着它们假设所有事物都是同一类型（通常称为“论域”）。


    ## 可靠性


    形式系统的一种性质：对于系统的一组句子 `s`，不能使用该系统的推理规则推导出不由 `s` 中句子所蕴含的句子（即所有定理都是重言式）。对比 `完备性`。


    ## 源关系变量


    一般含义参见 `包含依赖`。在外键上下文中，该术语有时用作 `引用关系变量` 的同义词，见上文。


    ## 源元组


    在外键上下文中有时用作 `引用元组` 同义词的术语。


    ## SQL


    最著名（不幸的是，存在严重缺陷）的尝试，旨在以具体的语法形式实现关系模型的抽象思想。名称 `SQL`——官方发音是“ess cue ell”，但通常发音为“sequel”（参见
    `SEQUEL`）——最初是 *Structured Query Language* 的缩写。然而，在其标准化身中，该名称只是一个名称，不被视为任何东西的缩写。撰写本文时现行的
    SQL 标准版本是 SQL:2003（之所以如此称呼是因为它在 2003 年获得批准）；下一个版本（可能也是？最终版本）预计将在 2008 年获得批准。


    ## 星型连接


    一种连接实现技术。


    ## 状态约束


    一种数据库约束，不是 `转换约束`。


    ## 语句


    1.  （逻辑）一个 `命题`。

    2.  （编程语言）一种导致某些操作发生的构造，例如定义或更新变量，或改变控制流。对比 `表达式`。


    注意：在本词典中，除非上下文另有要求，否则 *语句* 一词应理解为编程语言意义上的语句。


    ### 示例（仅第二个定义）


    参见 `表达式` 下的示例。


    ## 存储过程


    一个可能带参数的子程序；换句话说，就是一个运算符。注意：与术语 `封装的` 类似，*存储过程* 一词已逐渐意味着不幸地混合了模型和实现的考虑因素。从模型的角度来看，一个存储过程确实如前所述，只不过是一个运算符。然而，在实践中，存储过程具有许多属性，使得它们比单纯作为运算符要重要得多（尽管以下前两个属性可能普遍适用于运算符，至少如果所讨论的运算符是系统定义的）。首先，它们被单独编译，并且可以被不同的应用程序共享。其次，它们的编译代码通常物理地存储在数据本身物理存储的位置，具有明显的性能优势。第三，它们通常用于提供本应由
    DBMS 提供但尚未提供的共享功能（完整性检查就是一个很好的例子）。另见 `触发过程`。


    ## 子表达式


    嵌套在另一个表达式内部的表达式。


    ## 可更新参数


    设 `Op` 是一个更新运算符，当被调用时，会更新对应于参数 `x` 的实参。那么，参数 `x` 被称为是可更新的（并且任何对应于 `x` 的实参必须是一个变量）。


    ### 示例


    参见 `实参` 下的第二个示例。


    ## 子键


    粗略地说，是键的子集。更精确地说，设 `X` 是关系变量 `R` 标题的一个子集；那么 `X` 是 `R` 的一个子键，当且仅当存在某个键 `K` 是 `R`
    的键，且 `K` 是 `X` 的超集。


    ### 示例


    关系变量 `SP` 的子键是 `{S#,P#}`、`{S#}`、`{P#}` 和 `{}`。注意，空集 `{}` 必然是所有可能的关系变量 `R` 的一个子键。


    ## 子查询


    一般而言，指嵌套在另一个关系表达式内部的关系表达式；在 SQL 中，指括号内的 `SELECT` 表达式。


    ## 子集


    集合 `s2` 是集合 `s1` 的子集（“`s2` ⊆ `s1`”），当且仅当 `s2` 的每个元素也是 `s1` 的元素。注意，每个集合都是其自身的子集，空集也是每个集合的子集。对比
    `真子集`。

