- fmt: 'At least, this predicate is the one assumed (and indeed stated) elsewhere
    in this dictionary to be the one for relvar `S`. However, it would be more accurate
    to say the predicate is, rather, “We *know* that—or (perhaps better) we *believe*
    that—supplier `S#` is under contract, is named `SNAME`, has status `STATUS`, and
    is located in `CITY`.” The point is, there can’t be any guarantee that the database
    truly reflects the state of affairs that exists in the real world ( *see* correctness);
    all it can do is reflect what users tell it, and what users tell it in turn will
    reflect their beliefs about the real world, not necessarily the real world per
    se. But it’s customary to ignore such considerations in informal contexts.


    ## relvar reference

    Syntactically, a relvar name, used to denote either the relvar as such or the
    value of that relvar, as the context demands.


    ## REMOVE

    *See* **A**.


    ## renaming

    Let `r` be a relation, let `A` be an attribute of `r`, and let `r` not have an
    attribute named `B`. Then the renaming `r RENAME ( A AS B )` is a relation with
    (a) heading identical to that of `r` except that attribute `A` in that heading
    is renamed `B`, and (b) body identical to that of `r` except that all references
    to `A` in that body (more precisely, in tuples in that body) are replaced by references
    to `B`. *See also* tuple renaming.


    **Example**: The expression


    ```

    P RENAME ( WEIGHT AS WT )

    ```


    yields a relation identical to the current value of relvar `P`, except that attribute
    `WEIGHT` is renamed `WT`. Note that relvar `P` per se remains unaltered in the
    database—`RENAME` is not like `ALTER TABLE` in SQL, it’s just a read-only operator
    that (like restrict, for example) takes a certain relation as input and returns
    another as output. *Note*: For reasons of user friendliness, **Tutorial D** allows
    two or more consecutive renamings to be expressed by means of a single `RENAME`
    invocation. Thus, for example, the expression `(P RENAME (WEIGHT AS WT)) RENAME
    (COLOR AS COL)` can be abbreviated to `P RENAME (WEIGHT AS WT, COLOR AS COL)`.
    A similar remark applies to several other relational (and tuple) operations also—for
    example, `EXTEND`, `SUMMARIZE`, and so on.


    ## repeating group

    Let some table have a column `C` of type `T`. Then `C` is a repeating group column
    if and only if the values appearing within `C` aren’t values of type `T` but are,
    rather, collections (sets or lists or arrays or ...) of values of type `T`. Repeating
    groups are outlawed in the relational model (which is why this definition is phrased
    in terms of tables and columns instead of relations and attributes); in fact,
    a “relation” with a repeating group “attribute” is a contradiction in terms.


    ## restriction

    Let `r` be a relation and let `bx` be a restriction condition, q.v., on `r` (observe
    in particular, therefore, that every attribute reference in `bx` identifies some
    attribute of `r`). Then the restriction of `r` according to `bx`, `r WHERE bx`,
    is a relation with heading the same as that of `r` and body consisting of all
    tuples of `r` for which `bx` evaluates to TRUE.


    *Note*: Restriction is sometimes known as selection, but it shouldn’t be confused
    with the `SELECT` operation of SQL. The SQL `SELECT` operation—meaning, more specifically,
    just the `SELECT` portion of an SQL `SELECT` expression, q.v.—can be loosely characterized
    as a combination of `summarize`, `extend`, `rename`, and “project” (“project”
    in quotes because it doesn’t eliminate duplicates, in general, unless explicitly
    requested to do so via `DISTINCT`).


    **Example**: The following expression denotes a restriction of the relation that’s
    the current value of relvar `P`:


    ```

    P WHERE WEIGHT < WEIGHT ( 17.5 )

    ```


    ## restriction condition

    A Boolean expression in which (a) all attribute references identify attributes
    of the same relation `r` and (b) there are no relvar references. *See* restriction.
    *Note*: `WHERE` clauses in real languages usually permit predicates that are considerably
    more general than simple restriction conditions on the pertinent relation. Strictly
    speaking, in fact, a restriction condition isn’t even allowed to contain any connectives,
    since the connectives are logical operators, not algebraic ones. In practice,
    however, the following identities let real languages support the connectives after
    all:


    `r WHERE ( p AND q )`

    ≡ `( r WHERE p ) INTERSECT ( r WHERE q )`


    `r WHERE ( p OR q )`

    ≡ `( r WHERE p ) UNION ( r WHERE q )`


    `r WHERE ( NOT p )`

    ≡ `r MINUS ( r WHERE p )`


    *Examples*: For an example of a `WHERE` clause in which the predicate is just
    a simple restriction condition on the pertinent relation, see restriction.


    Here by contrast is an example in which the predicate is more general:


    ```

    S WHERE P { P# } = ( ( SP RENAME ( S# AS SNO ) ) WHERE SNO = S# ) { P# }

    ```


    The predicate here isn’t just a simple restriction condition on the relation that’s
    the current value of relvar `S`, because (a) it contains attribute references
    that don’t identify attributes of that relation, and (b) it also contains two
    relvar references (to `P` and `SP`, respectively). However, the overall expression
    can be seen as shorthand for something like the following:


    ```

    WITH ( SP RENAME ( S# AS SNO ) ) AS t1 ,

    ( EXTEND S ADD ( ( P { P# } ) AS X ) ) AS t2 ,

    ( EXTEND t2 ADD ( ( ( t1 WHERE SNO = S# ) { P# } ) AS Y ) ) AS t3 :

    t3 WHERE X = Y

    ```


    In this expanded formulation, `X` and `Y` are (relation valued) attributes of
    `t3`, and the predicate in the `WHERE` clause in the last line is indeed a restriction
    condition as formally defined.


    ## reversible decomposition

    Replacing a relvar `R` by a set of relvars `R1, R2, ..., Rn` in such a way that
    it’s guaranteed that `R` can be derived from `R1, R2, ..., Rn`. Nonloss decomposition,
    q.v., is an important special case.


    ## rewrite rule

    An identity, q.v., in the sense of the fourth definition of that term. As the
    name suggests, a rewrite rule of the form `x = y` allows any expression that contains
    an occurrence of `x` to be rewritten as an expression that contains an occurrence
    of `y` instead. *See* expression transformation; query rewrite; substitution.


    ## right associativity

    *See* left associativity.


    ## ring (mathematics)

    A formal system that obeys all of The Laws of Algebra, q.v., except that the commutative,
    identity, and inverse laws don’t necessarily apply to multiplication. *Note*:
    Every ring is a commutative group, q.v., with respect to addition.


    ## RM/T

    An extended form of the relational model, due to Codd, with the explicit goal
    of capturing more meaning than the relational model per se is capable of. The
    name is an abbreviation for Relational Model / Tasmania (so called because Codd
    first described it at a conference in Tasmania).


    `RM/T` includes a variety of “semantic” constructs (e.g., `E`- and `P`-relations,
    which are meant to represent entities and properties, respectively, together with
    operators for operating on such relations). `RM/T` has never been implemented
    in a commercial product (in fact it couldn’t be, since the sole formal paper on
    the topic—“Extending the Database Relational Model to Capture More Meaning,” *ACM
    TODS 4,* No. 4—fails to specify it adequately), but its ideas can be useful as
    an aid in conventional database design.


    ## RM/V1

    *See* RM/V2.'
