    that *Op* is expressed in infix style. Then *Op* is idempotent if and only if,
    for all *x,* *x* *Op* *x* = *x*.


    **Examples*: In logic, OR and AND are both idempotent, because *x* OR


    *x* = *x* and *x* AND *x* = *x* for all *x*. It follows as a direct consequence
    that UNION and JOIN, respectively, are idempotent in relational algebra.


