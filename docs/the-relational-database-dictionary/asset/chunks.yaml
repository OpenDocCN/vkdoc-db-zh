    ****monadic** ( *Of an operator*) Having exactly one operand; that is, being defined
    in terms of exactly one parameter.


    **multi**-**relvar constraint** Term sometimes used for a database constraint
    that mentions two or more distinct relvars. *Contrast* single-relvar constraint.
    *Note*: The difference between single-relvar and multi-relvar constraints is more
    a matter of pragma than logic, thanks to The Principle of Interchangeability among
    other things.


    **Examples*: The foreign key constraints from relvar SP to relvars S and P; also
    constraint C3 from the examples under database constraint.


    ****multi**-**tuple constraint** Term sometimes used for a relvar or database
    constraint that isn’t a single-tuple constraint, q.v.


    **Example*: Constraint C3 from the examples under database constraint might be
    regarded as a multi-tuple constraint.


    ****multidependent** *See* multivalued dependency.


    ****multidetermines** *See* multivalued dependency.


