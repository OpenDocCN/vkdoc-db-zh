    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00005.png)


    ### improper inclusion

    Set `s1` improperly includes set `s2,` and set `s2` is improperly included in
    set `s1,` if and only if `s1` and `s2` are the same set.


    ### improper subkey

    A subkey that’s a key; in other words, a key.


    ### improper subset

    Set `s2` is an improper subset of set `s1` if and only if `s2` and `s1` are the
    same set.


    ### improper superkey

    A superkey that’s a key; in other words, a key.


    ### improper superset

    Set `s1` is an improper superset of set `s2` if and only if `s1` and `s2` are
    the same set.


    ### inclusion

    *See* bag; relational inclusion; set inclusion.


    ### inclusion dependency

    Let `R1` and `R2` be relvars, not necessarily distinct. Let `X1` and `X2` be a
    subset of the heading of `R1` and a subset of the heading of `R2,` respectively,
    such that there exists a possibly empty sequence of attribute renamings on `R1`
    that maps `X1` into `X1''` (say), where `X1''` and `X2` contain exactly the same
    attributes. Further, let `R2` and `R1` be subject to the constraint that, at all
    times, every tuple `t2` in `R2` has an `X2` value that’s the `X1''` value for
    at least one tuple `t1` in `R1` at the time in question. Then that constraint
    is an inclusion dependency (IND for short), and `R2` and `R1` are the source relvar
    and corresponding target relvar, respectively, for that IND. *Note*: Foreign key
    constraints are an important special case.


    **Example*: Suppose the suppliers-and-parts database is subject to a constraint
    to the effect that no part can be stored in a city unless there’s at least one
    supplier in that city:


    `CONSTRAINT IND1 P { CITY } ⊆ S { CITY } ;`


    /* every part city must also */


    /* be a supplier city */


    *Note*: This constraint is not satisfied by the sample values shown in Figure
    1.


    **The Relational Database Dictionary, Extended Edition**


    **89**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00110.png)


    ### inclusion polymorphism

    By definition (*see* type inheritance), any operator that applies to values of
    a given type `T` necessarily applies to values of every subtype of `T`. Such an
    operator is thus polymorphic, and the kind of polymorphism it exhibits is called
    inclusion polymorphism.


    *Note*: An operator that applies to variables of type `T` might or might not apply
    to variables of some subtype of `T`. If it does, it too is said to exhibit inclusion
    polymorphism.


    ### inclusive OR

    Term sometimes used as a synonym for OR; used primarily to distinguish it from
    exclusive OR, q.v.


    ### Incoherent Principle, The

    See Principle of Incoherence, The.


    ### IND

    Inclusion dependency.


    ### independent projections

    *See* FD preservation.


    ### index

    A specific kind of physical access path; hence, an implementation construct.


    ### indirect proof

    *See* proof.


    ### indirect reasoning

    *See* *modus tollens*.


    ### indiscernibility

    Lack of discernibility. *See* Principle of Identity of Indiscernibles, The.


    ### inference rule

    A rule for deriving a conclusion—a theorem—from a set of premises (i.e., other
    theorems, possibly axioms). The derivation process is known as inference. *See
    also* Armstrong’s inference rules; constraint inference; key inference; logical
    system; relation type inference; tuple type inference; type inference.'
