- fmt: '# The Relational Database Dictionary, Extended Edition


    ## Closure laws

    集合 `s` 在运算 "+" 和 "`*`" 下是闭合的；也就是说，对于 `s` 中的所有 `x` 和 `y`，表达式 `x + y` 和 `x * y`
    的结果都是 `s` 中的一个元素。


    ## Commutative laws

    对于 `s` 中的所有 `x` 和 `y`，`x + y = y + x` 且 `x * y = y * x`。


    ## Associative laws

    对于 `s` 中的所有 `x`, `y` 和 `z`，`x + (y + z) = (x + y) + z` 且 `x * (y * z) = (x * y)
    * z`。


    ## Identity laws

    在集合 `s` 中存在元素 0 和 1，使得对于 `s` 中的所有 `x`，`x + 0 = x` 且 `x * 1 = x`。元素 0 和 1 分别被称为加法单位元和乘法单位元。


    ## Inverse laws

    对于 `s` 中的所有 `x`，存在元素 `-x` 以及（除非 `x = 0`）`1 / x` 在 `s` 中，使得 `x + (-x) = 0` 且 `x
    * (1 / x) = 1`。元素 `-x` 和 `1 / x` 分别被称为 `x` 的加法逆元和乘法逆元（在每种情况下）。表达式 `x + (-y)` 和
    `x * (1 / y)` 通常缩写为 `x - y` 和 `x / y`。


    ## Distributive law

    （“`*`” 对于 “`+`” 的分配律）：对于 `s` 中的所有 `x`, `y` 和 `z`，`x * (y + z) = (x * y) + (x *
    z)`。


    请注意，并非所有代数都遵循上述所有定律。例如，在集合代数中，“`+`” 和 “`*`” 运算符分别表示并集和交集，但逆定律不适用于这些运算。


