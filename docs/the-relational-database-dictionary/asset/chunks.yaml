    \ be semantically equivalent to `(S{CITY}) UNION (P{CITY})`.\n\n**disjunct** A\
    \ predicate that’s ORed with zero or more others.\n\n**disjunction** 1. (*Dyadic\
    \ case*) If `p` and `q` are predicates, their disjunction `(p) OR (q)` is a predicate\
    \ also. Let `(ip) OR (iq)` be an invocation of that predicate (where `ip` and\
