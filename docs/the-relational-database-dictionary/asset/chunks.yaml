    # summarization


    令关系 `r1` 和 `r2` 满足 `r2` 与 `r1` 的某个投影类型相同，并且令 `r2` 的属性为 `A1, A2, . . ., An`。


    那么，概括 `SUMMARIZE r1 PER ( r2) ADD ( exp AS X)` 是一个关系，其 (a) 目标是 `r2` 的目标扩展了属性 `X`，以及
    (b) 体由所有满足以下条件的元组 `t` 组成：`t` 是 `r2` 的一个元组，扩展了属性 `X` 的值 `x`。该值 `x` 是通过对 `r1` 中所有与元组
    `t` 具有相同 `A1, A2, . . ., An` 属性值的元组计算表达式 `exp` 得到的。关系 `r2` 不能有名为 `X` 的属性，且 `exp`
    不能引用 `X`。


