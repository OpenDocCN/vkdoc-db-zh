  trans: '

    请注意，尽管它使用了关键字 `UPDATE`，但这个表达式确实是一个表达式而非语句（它没有终止的分号）；具体来说，它对关系变量 `S` 没有任何实际影响。它实际所做的是返回一个关系，该关系包含当前关系变量
    `S` 值中，城市为巴黎的每个元组 `s` 所对应的一个元组 `t`——唯一的区别是，在元组 `t` 中，状态值是元组 `s` 中的两倍，并且城市变为了尼斯，而非巴黎。


    ## WHERE 子句

    一种形如 `WHERE bx`（其中 `bx` 是一个布尔表达式）的语法结构，广泛存在于 **Tutorial D**、SQL 及许多其他语言中。*参见*
    `DELETE`；限制；限制条件；`SELECT` 表达式；`UPDATE`；以及别处。


    ## WITH

    一种 **Tutorial D** 语法结构，用于为子表达式的结果引入名称。引入的名称随后可在整个表达式的后续部分（`WITH` 子句是其组成部分）中用来指代这些结果。（SQL
    也包含一个 `WITH` 结构，其语义相似但不完全相同。）


    **示例**：以下是一个实现查询“获取供应商编号对，记为 `S#` `x` 和 `S#` `y`，使得 `S#` `x` 和 `S#` `y` 各自供应完全相同的零件集合”的表述：


    `WITH ( S RENAME ( S# AS SX ) ) { SX } AS tx,`

    `( S RENAME ( S# AS SY ) ) { SY } AS ty :`

    `( tx JOIN ty ) WHERE ( SP WHERE S# = SX ) { P# } =`

    `( SP WHERE S# = SY ) { P# }`


    **《关系数据库词典（扩展版）》**

    **213**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00103.png)


    ## WRAP

    *参见* wrapping。


    ## wrapping

    设 `r` 是一个关系，并且 `r` 的标题被划分为子集 `{ X }` 和 `{ Y }`。设 `{ Y }` 的属性为 `Y1`、`Y2`、...、`Yn`；同时，设
    `{ X }` 不包含任何名为 `YT` 的属性。那么，包装 `r WRAP ({ Y } AS YT)` 是另一个关系 `s`。`s` 的标题由 `{ X
    }` 扩展一个类型为 `TUPLE { Y }` 的属性 `YT` 构成。`s` 的主体包含 `r` 中每个元组所对应的一个元组，没有其他元组。设 `r`
    的元组 `t` 具有 `X` 值 `x`、`Y1` 值 `y1`、`Y2` 值 `y2`、...、`Yn` 值 `yn`；那么 `s` 的对应元组将具有 `X`
    值 `x` 和 `YT` 值（其值为一个元组，该元组包含 `Y1` 值 `y1`、`Y2` 值 `y2`、...、`Yn` 值 `yn`）。*另见* 元组包装。


    **示例**：以下表达式表示关系变量 `SP` 当前值关系的一个包装：


    `SP WRAP ( { P#, QTY } AS PQ_TUP )`


    该包装是一个类型为 `RELATION { S# S#, PQ_TUP TUPLE { P# P#, QTY QTY } }` 的关系 `spw`；它包含关系变量
    `SP` 当前出现的每个元组所对应的一个元组，没有其他元组。例如，给定图 1 中的示例值，供应商 `S1` 和零件 `P1` 对应的 `spw` 元组具有
    `S#` 值 `S1` 和 `PQ_TUP` 值（其值为一个元组，该元组包含 `P#` 值 `P1` 和 `QTY` 值 300）。


    **214**

    **《关系数据库词典（扩展版）》**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00066.png)


    ## X


    ## XML

    可扩展标记语言；从数据库的角度来看，最好将其视为另一种数据类型（尽管在撰写本文时它具有相当重要的实用意义）——这意味着，除其他事项外，关系应被允许拥有该类型的属性，并且此类关系中的元组应被允许包含值为
    XML 文档的属性值。


    ## XOR

    *参见* 异或。


