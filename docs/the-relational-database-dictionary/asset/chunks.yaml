    \ are attributes with the same name in `r3` and `r4,` and so are attributes with\
    \ the same name in `r4` and `r2` (in other words, `r1` and `r3` are joinable,\
    \ and so are `r3` and `r4,` and so are `r4` and `r2`); (c) the sets `{ X}, { Y},`\
    \ and `{ Z}` are the common attributes of `r1` and `r3,` of `r3` and `r4,` and\
    \ of `r4` and `r2,` respectively; and (d) the sets `{ X}` and `{ Y}` are disjoint,\
    \ and so are the sets `{ Y}` and `{ Z}`. Then the division `r1 DIVIDEBY r2 PER\
    \ (r3,r4)`—where `r1` is the dividend, `r2` is the divisor, and `r3` and `r4`\
    \ are the \"mediators\"—is a relation with heading the set theory union of the\
    \ headings of `r1` and `r2` and with body defined as follows: Tuple `t` appears\
    \ in that body if and only if it appears in `r1 JOIN r2` and a tuple `<x,y>` with\
    \ `x` equal to the `X` value in `t` appears in `r3{X,Y}` for all tuples `<y,z>`\
