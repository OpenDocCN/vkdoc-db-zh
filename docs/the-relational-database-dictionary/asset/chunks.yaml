    # Tuple selector

    *See* selector.


    # Tuple type

    Let `{ H}` be a heading; then `TUPLE { H}` is a tuple type with the same degree
    and attributes as `{ H}`.


    ## Examples

    The type of the tuples in relvar `S` is

    ```

    TUPLE { S# S#, SNAME NAME, STATUS INTEGER, CITY CHAR }

    ```

    The following (corresponding to a certain projection of a supplier tuple) is also
    a tuple type:

    ```

    TUPLE { CITY CHAR, SNAME NAME }

    ```


