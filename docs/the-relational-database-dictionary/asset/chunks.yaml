  trans: "# 示例\n*   C++；SQL；`Tutorial D`；以及许多其他语言。Codd 最初的关系代数是一种非计算完备语言的示例。\n\n#\
    \ 概念建模\n*参见* 语义建模。\n\n# 结论\n在逻辑中，指一个证明所证明的内容，或一个尝试性证明试图证明的内容。\n\n# 条件表达式\n一种逻辑表达式，*q.v.*。\n\
    \n# 条件运算符\n一种只读逻辑运算符，*q.v.*（尤指连接词之一，*q.v.*）。\n\n# 合取项\n一个通过 AND 与零个或多个其他谓词连接的谓词。\n\
    \n# 合取\n1.  （*二元情况*）如果`p`和`q`是谓词，它们的合取`(p) AND (q)`也是一个谓词。令`(ip) AND (iq)`为该谓词的一次调用（其中`ip`和`iq`分别是`p`和`q`的调用）。那么，当且仅当`ip`和`iq`的计算结果都为`TRUE`时，该调用`(ip)\
    \ AND (iq)`的计算结果为`TRUE`。\n    *注意*：在实际应用中，合取中包围`p`和`q`的括号可能不需要。\n2.  （*N 元情况*）令`p1`,\
    \ `p2, ..., pn`（`n` ≥ 0）为谓词。那么，合取`AND{p1, p2, ..., pn}`等价于表达式`TRUE AND (p1) AND\
    \ (p2) AND ... AND (pn)`。\n\n# 合取范式\n当且仅当一个谓词具有`(p1) AND (p2) AND ... AND (pn)`的形式，且没有任何合取项`(p1)`,\
    \ `(p2)`, ..., `(pn)`涉及任何`AND`运算时——更准确地说，当每个合取项`(p1)`, `(p2)`, ..., `(pn)`都是文字的析取（*参见*\
    \ 文字，第二个定义）时，该谓词处于合取范式，`CNF`。\n\n# 《关系数据库词典（扩展版）》\n**33**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00170.png)\n\n# 连接陷阱\n一些批评者用来指称关系模型中所谓缺陷的术语。考虑表达式`(S JOIN P){S#,P#}`。该表达式表示一个关系，假设为*r*，它碰巧包含元组`<S2,P5>`（因为供应商`S2`和零件`P5`都位于巴黎）。现在，显然不能从这个事实（至少不能有效地推断）推断出供应商`S2`供应零件`P5`——*r*的谓词是“供应商`S#`和零件`P#`位于同一个城市”，而不是“供应商`S#`供应零件`P#`”。然而，批评者声称，用户仍然会做出这种无效推断，因此关系模型是有缺陷的，因为它让用户陷入这个陷阱。但是，从这个例子应该清楚，缺陷不在于模型本身，而在于那些用户（或者也许是那些批评者）未能理解连接的语义。\n\
    *注意*：如例子所示，*连接陷阱*一词通常被视为与连接操作相关的问题（事实上，一些作者甚至因此将其称为连接陷阱）；然而，类似的问题也可能出现在其他操作中。\n\
    \n# 连接词\n一种只读的一元或二元逻辑运算符。在二值逻辑中，正好有 20 个连接词，其中 4 个一元，16 个二元（直接对应于 4 种可能的一元和 16\
    \ 种可能的二元真值表）。实践中最常遇到的连接词是`NOT`（否定）、`OR`（析取）、`AND`（合取）、`IMPLIES`（蕴涵）和`EQUIV`（等价）；其他连接词包括`NAND`、`NOR`和`XOR`，*q.v.*\n\
    *注意*：还有各种其他符号和关键字也用于表示这些连接词，其中一些（但非全部）已包含在本词典中。\n\n# 后件\n*参见* 蕴涵。\n\n# 一致性\n完整性，*q.v.*\
    \ *对比* 正确性。\n\n# 一致的\n1.  （*逻辑*）一组谓词是一致的，当且仅当存在至少一组参数，可以替换这些谓词的参数，使得每个结果命题的计算结果都为`TRUE`。\n\
    2.  （*指数据库*）满足所有定义的完整性约束。\n\n**34**\n\n# 《关系数据库词典（扩展版）》\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00213.png)"
- fmt: '### Examples (first definition)

    Let the symbols `x`, `y`, and `z` denote integers.


    Then the predicates `x > y` and `y > z` form a consistent set, while the predicates
    `x > y`, `y > z`, and `z > x` do not.


    ### constant

    A value, especially one that’s named; not to be confused with a literal, q.v.


    ### Example

    See `relation constant`.


    ### constraint

    An integrity constraint, q.v.


    ### constraint inference

    The process of determining the constraints that apply to a given derived `relvar`
    or are satisfied by a given derived relation.


    ### containment

    Generally, the relationship between a container and the things it contains; in
    particular, the relationship between a `bag` or `set` and its elements. Contrast
    `inclusion`.


    ### contradiction

    A predicate whose every possible invocation is guaranteed to yield `FALSE`, regardless
    of what arguments are substituted for its parameters. Note: A contradiction in
    logic isn’t quite the same thing as a contradiction in ordinary discourse. Loosely,
    we might say that (a) in ordinary discourse, a contradiction is something that
    implies that some proposition `p` and its negation `NOT(p)` are both true, while
    (b) in logic, by contrast, it’s anything that’s “always `FALSE`” (including, for
    example, the truth value `FALSE` itself). Contrast `tautology`.


    ### Examples

    Let `p1` be the predicate (actually a proposition) `2 + 2 = 5`; let `p2` be the
    predicate `x > x`, where `x` denotes an arbitrary integer; and let `p3` be the
    predicate `(p) AND (NOT(p))`, where `p` denotes an arbitrary proposition.


    Then `p1`, `p2`, and `p3` are all contradictions.


    ### contrapositive

    The contrapositive of the implication `IF (p) THEN (q)` is the logically equivalent
    implication `IF (NOT(q)) THEN (NOT(p))`.


    ### The Relational Database Dictionary, Extended Edition

    35


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00137.png)


    ### controlled redundancy

    `Redundancy`, q.v., is controlled if it does exist (and the user is aware of it),
    but the task of “propagating updates” to ensure that it never leads to any inconsistencies
    is managed by the DBMS, not the user. Uncontrolled redundancy can be a problem,
    but controlled redundancy shouldn’t be. As a general rule, databases shouldn’t
    include any uncontrolled redundancy.


    ### correct

    See `correctness`.


    ### correctness

    (Of a database) The property of truly reflecting the state of affairs that exists
    in the real world (see the example under `relvar predicate` for further discussion).
    Contrast `consistency`.


    ### correlation name

    SQL term for either a tuple calculus range variable or the name of such a variable.


    ### cover

    (Of a set of FDs) If `s1` and `s2` are sets of FDs, then `s2` is a cover for `s1`
    if and only every FD implied by `s1` is implied by `s2`. Note: Some writers use
    the term `cover` in a stronger sense, to mean a set of FDs that’s equivalent to
    some given set (see `equivalence`).


    ### cross join / cross product

    `Cartesian product`, q.v.


    ### CWA

    The Closed World Assumption.


    ### 36

    ### The Relational Database Dictionary, Extended Edition


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00002.png)


    ### D

    Generic name used to refer to any language that conforms to the principles laid
    down by `The Third Manifesto`.


    ### D_UNION

    See `disjoint union`.


    ### data

    An encoded representation of propositions, assumed by convention to be true ones.


    ### data definition operator

    An operator that either (a) defines some database object, such as a base `relvar`
    or a view or a snapshot or a constraint, or (b) deletes (drops) or updates such
    a definition; in other words, an operator that updates the catalog. Note: Dropping
    a definition effectively causes the corresponding object to be dropped as well
    (at least as far as the user is concerned), and is usually described in such terms.
    For example, **Tutorial D** provides an operator it calls `DROP CONSTRAINT` (not
    “drop constraint definition”).


    ### Examples

    See the definitions of `relvars S`, `P`, and `SP`. Other examples could be (a)
    an operation to add an attribute to one of those `relvars`, or (b) an operation
    to define a constraint on those `relvars`, or (c) an operation to delete any of
    those definitions. (Strictly speaking, the first of these examples—“adding an
    attribute” to some `relvar`, say `relvar S`—has the effect of dropping the original
    `relvar` and introducing a new one with the same name, at the same time preserving,
    somehow, the information content of the original `relvar`. Details of how this
    effect might be achieved are beyond the scope of this dictionary.)


    ### data independence

    The ability to change the physical or logical design of a database without having
    to make corresponding changes in the way the database is perceived by users. The
    terms `physical data independence` and `logical data independence` are used to
    refer to the two cases. Both involve having two sets of definitions and mappings
    between them, such that (a) if the physical design changes, `physical data independence`
    is preserved by changing the mapping from the physical design to the logical design,
    and (b) if the logical design changes, `logical data independence` is preserved
    by defining a mapping from the old logical design to the new one.


    ### The Relational Database Dictionary, Extended Edition

    37


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00111.png)


    ### data manipulation operator

    Loosely, an operator that isn’t a `data definition operator`. However, the distinction
    isn’t hard and fast; in fact, it’s hard to find an operator that doesn’t, in the
    last analysis, “manipulate” data of some kind (unless it’s a read-only operator,
    possibly; some writers might argue that update operators are the only ones that
    actually “manipulate” data). The term is probably best avoided.


    ### data model

    1. An abstract, self-contained, logical definition of the data structures, data
    operators, and so forth, that together make up the abstract machine with which
    users interact (contrast `implementation`). 2. A model of the persistent data
    of some particular enterprise (i.e., a logical database design).


    ### Examples

    For the second definition, any logical database design will suffice as an example.
    As for the first definition, the most obvious example is the `relational model`.
    There’s a nice analogy that can help explain the difference between the two definitions,
    as follows: A `data model` in the first sense is like a programming language,
    whose constructs can be used to solve many specific problems but in and of themselves
    have no direct connection with any such specific problem; a `data model` in the
    second sense is like a specific program written in that language—it uses the facilities
    provided by the model, in the first sense of that term, to solve some specific
    problem. Note: We can sum up the distinction between a `data model` in the first
    sense and an implementation of that model by saying that the model is what the
    user has to know, while the implementation is what the user doesn’t have to know.


    ### data modeling

    Term sometimes used as a synonym for the logical database design process.


    ### 38

    ### The Relational Database Dictionary, Extended Edition


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00082.png)


    ### data sublanguage

    A language that provides database support for one or more distinct `host languages`,
    q.v., in which its statements can be embedded or from which they can be invoked.


    ### Data Sublanguage ALPHA

    See `ALPHA`.


    ### data type

    `Type`, q.v.


    ### database

    Strictly, a `database value`, q.v.; more commonly used, in this dictionary in
    particular, to refer to what would more accurately be called a `database variable`,
    q.v. We assume throughout this dictionary that databases are always relational,
    barring explicit statements to the contrary.'
