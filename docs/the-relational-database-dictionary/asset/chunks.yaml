  trans: '# 关系数据库词典（扩展版）


    ### SQL 表与关系型关系


    SQL 表在几个关键方面不同于其关系型对应物：

    (a) SQL 表可以包含重复行；

    (b) SQL 表可以包含空值；

    (c) SQL 表具有从左到右的列顺序；

    (d) SQL 表可以有两个或更多同名列；

    (e) SQL 表可以有实际上完全没有名称的列。


    更一般地说，一个关系的图示（例如在纸上的）。**注意**：将关系与这种表格图示混淆，可能是导致人们普遍误以为关系是“扁平”或二维的根源。虽然这些图示显然是二维的，但关系通常不是；相反，一个度为
    `n` 的关系是 `n` 维的，这意味着其元组对应于某个 `n` 维空间中的点（每个维度对应于所讨论关系的一个属性）。这种考虑的一个具体结果是（再次与普遍观点相反）关系完全能够表示所谓的多维数据，从而支持所谓的联机分析处理（OLAP）。*另见*
    `cell`；`column`；`row`。


    ### 表别名


    *参见* `alias`。


    ### TABLE_DEE 和 TABLE_DUM


    两个关系常量，最好是内置的。`TABLE_DEE` 是唯一的没有属性且恰好有一个元组（必然是空元组）的关系；`TABLE_DUM` 是唯一的没有属性且根本没有元组的关系。它们可以分别解释为
    `TRUE`（或*是*）和 `FALSE`（或*否*）。（更准确地说，`TABLE_DEE` 的关系谓词是任何求值为 `TRUE` 的零元谓词，`TABLE_DUM`
    的关系谓词是任何求值为 `FALSE` 的零元谓词。）**注意**：这些名字可能选得不太好，因为 `TABLE_DEE` 和 `TABLE_DUM` 正是最难用表格形象化的两个关系。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00217.png)


    ### 表与视图 / 表或视图


    在 SQL 上下文中经常出现的短语，强烈暗示视图以某种方式与表不同。但视图的关键在于（用 SQL 术语来说）它们*就是*表——就像在数学中，一个集合（例如两个集合的并集或交集）的关键在于它本身就是一个集合。视图对于用户来说应该“看起来和感觉起来”都像基本表一样（可互换性原则转化为
    SQL 术语）。


    ### 目标键


    *参见* `foreign key`。


    ### 目标关系变量


    1. （*在 `IND` 中*）一般含义，*参见* 包含依赖。在外键上下文中，该术语有时用作 `referenced relvar` 的同义词，见后。

    2. （*在赋值中*）在关系赋值操作中被更新的关系变量。


    ### 目标元组


    有时在外键上下文中用作 `referenced tuple` 的同义词，见后。


    ### 重言式


    一个谓词，无论用什么参数替换其参数，其所有可能的调用都保证求值为 `TRUE`。*对比* `contradiction`。


    **示例**：令 `p1` 为谓词（实际上是命题）`2+2 = 4`；令 `p2` 为谓词 `x = x`，其中 `x` 表示任意整数；令 `p3` 为谓词
    `(p) OR (NOT(p))`，其中 `p` 表示任意命题。那么 `p1`、`p2` 和 `p3` 都是重言式。


    ### TCLOSE


    *参见* `transitive closure`。


    ### 时态数据库


    一种数据库，其中至少一个关系变量是时态的（时态关系变量是指其标题包含至少一个某种时间戳类型的属性的关系变量，这意味着相应的关系变量谓词具有至少一个某种时间戳类型的参数）。


    可以定义多种特殊运算符来帮助管理此类数据库——参见 C. J. Date、Hugh Darwen 和 Nikos A. Lorentzos 所著的 *Temporal
    Data and the Relational Model*（Morgan Kaufmann, 2003）一书——但归根结底，所有这些运算符都是最初定义的关系代数中可定义运算符的简写。'
- fmt: "# The Relational Database Dictionary, Extended Edition\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00165.png)\n\nsomething that can already be expressed in the classical\
    \ relational algebra.\n\nFurther details are beyond the scope of this dictionary.\n\
    \n## `theorem`\nSomething that follows from given axioms according to given rules\
    \ of inference (and is therefore true if the axioms are true and the inference\
    \ rules valid). In the database context, tuples in derived relations can be regarded\
    \ as theorems, because they represent propositions derived from the ones represented\
    \ by tuples in the base relations. Theorems include axioms, q.v., as a degenerate\
    \ special case. *See* proof.\n\n**Example**: Given the sample values of Figure\
    \ 1, the relation denoted by the expression `(S JOIN P){S#,P#}` contains the tuple\
    \ `<S1,P1>`. That tuple can be regarded as a theorem; it represents the (true)\
    \ proposition “Supplier S1 and part P1 are in the same city,” a fact that can\
    \ be inferred from the axioms represented by tuples in the base relations.\n\n\
    ## `theta join`\nA relational operation, equivalent to an expression of the form\
    \ `( r1 TIMES r2) WHERE A1 theta A2`, where (a) `A1` and `A2` are attributes (of\
    \ the same type `T`) of `r1` and `r2`, respectively, and (b) `theta` is any comparison\
    \ operator that makes sense for values of type `T` (e.g., “=”, “>”).\n\n**Example**:\
    \ The following expression represents the greater-than join (i.e., theta here\
    \ is “>”) of suppliers and parts, in that order, on cities: `(( S RENAME ( CITY\
    \ AS SC ) ) TIMES ( P RENAME ( CITY AS PC ) )) WHERE SC > PC`\n\nWe assume here\
    \ that `CHAR`—the type of attribute `CITY`—is an ordinal type (“>” on `CHAR` values\
    \ presumably means “greater in alphabetic ordering”). Note that we could replace\
    \ `TIMES` by `JOIN` in the foregoing expression without changing the meaning.\
    \ Also, replacing “>” with “<” would yield a less-than join; replacing it with\
    \ “=” would yield an equijoin.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00034.png)\n\n# Third Manifesto, The\nA formal proposal for the future\
    \ of data and database management systems; like Codd’s original papers, it can\
    \ be seen as an abstract blueprint for the design of a DBMS and the language interface\
    \ to such a DBMS. *See* the introduction to this dictionary.\n\n## `third normal\
    \ form`\nRelvar `R` is in third normal form, 3NF, if and only if, for every nontrivial\
    \ FD `A → B` satisfied by `R`, `A` is a superkey or `B` is a subkey. Every 3NF\
    \ relvar is in 2NF. *Note*: Many of the definitions of “3NF” in the literature\
    \ are actually definitions of BCNF; *caveat lector.*\n\nAlso, although being in\
    \ 3NF clearly doesn’t preclude being in the next higher normal form (BCNF) as\
    \ well, the term `3NF` is often used loosely to refer to a relvar that’s in 3NF\
    \ and not in BCNF. In any case, third normal form as such is no longer very important\
    \ (BCNF, 5NF, and 6NF being the normal forms of most practical significance);\
    \ we mention it here mainly for historical reasons.\n\n**Example**: As noted under\
    \ Boyce/Codd normal form, with the normal forms it’s often more instructive to\
    \ show a counterexample rather than an example per se. Suppose, therefore, that\
    \ relvar `S` satisfies the additional FD `{CITY} → {STATUS}`; that is, the status\
    \ for a given supplier is a function of that supplier’s location. Since `{CITY}`\
    \ isn’t a superkey and `{STATUS}` isn’t a subkey, this version of relvar `S` isn’t\
    \ in 3NF (though it is in 2NF).\n\n## `three-valued logic`\nA logic in which there’s\
    \ a “third truth value,” usually called `UNKNOWN`, in addition to the usual `TRUE`\
    \ and `FALSE`; abbreviated 3VL. SQL is loosely based on such a logic (the relational\
    \ model, by contrast, is based on two-valued logic, q.v.). In particular, SQL’s\
    \ support for nulls, q.v., is based on a three-valued logic, though in fact that\
    \ support is logically flawed; for example, SQL treats `UNKNOWN` and null as identical,\
    \ even though there’s a logical difference between the two—`UNKNOWN` is a value,\
    \ while null isn’t a value at all but a “mark.” (This is just one of many logical\
    \ errors in SQL’s 3VL support.) *Note*: Tautologies in 2VL aren’t necessarily\
    \ tautologies in 3VL; likewise, contradictions in 2VL aren’t necessarily contradictions\
    \ in 3VL. As a result, theorems that hold in 2VL don’t necessarily hold in 3VL,\
    \ and expression transformations that are valid in 2VL aren’t necessarily valid\
    \ in 3VL.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00215.png)\n\
    \n## `time-varying relation`\nCodd’s original term for a relvar; the term is deprecated\
    \ because relations are values and so don’t vary over time.\n\n## `TIMES`\n*See*\
    \ Cartesian product.\n\n## `total database constraint`\n*See* database constraint.\n\
    \n## `total function`\nA partial function in which every element `x` of the domain\
    \ has an image `y` in the codomain; in other words, a function.\n\n## `total ordering`\n\
    A special case of partial ordering, q.v. Let `s` be a set. Then a total ordering\
    \ on `s` is a partial ordering, usually denoted “<”, with the property that for\
    \ all pairs of distinct elements `x` and `y` in `s`, either `x < y` or `y < x`\
    \ (and not both). *Note*: Given that the “=” operator and the `NOT` connective\
    \ are both always available, it follows that all of the usual comparison operators—“=”,\
    \ “≠”, “<”, “≤”, “>”, and “≥”—are available for all pairs of values in such a\
    \ set `s`.\n\n**Examples**: See the examples under ordinal type.\n\n## `total\
    \ relvar constraint`\n*See* relvar constraint.\n\n## `transaction`\nA unit of\
    \ recovery and concurrency; loosely, a unit of work. Transactions are all or nothing,\
    \ in the sense that they either execute in their entirety or have no effect. *Note*:\
    \ Transactions are often said to be a unit of integrity also. Since the relational\
    \ model requires all integrity checking to be immediate, however, the unit of\
    \ integrity as far as the relational model concerned is the statement, not the\
    \ transaction. *See* atomic statement; immediate checking.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00129.png)\n\n## `transition constraint`\nA database constraint that\
    \ limits the transitions a given database can validly make from one state to another.\
    \ *Contrast* state constraint.\n\n**Example** (“No supplier’s status must ever\
    \ decrease”):\n```sql\nCONSTRAINT TRC1 IS_EMPTY (\n    ( ( S' { S#, STATUS } RENAME\
    \ ( STATUS AS STATUS' ) )\n      JOIN\n      ( S { S#, STATUS } ) )\n    WHERE\
    \ STATUS' > STATUS ) ;\n```\nThis formulation relies on a convention to the effect\
    \ that a primed relvar name such as `S'` refers to the corresponding relvar as\
    \ it was prior to the update under consideration.\n\n## `transitive closure`\n\
    Let `r` be a binary relation with attributes `A` and `B`, both of type `T`. Then\
    \ the transitive closure of `r`, `TCLOSE ( r )`, is a relation `r+` defined as\
    \ follows: the tuple `< a,b>` appears in `r+` if and only if it appears in `r`\
    \ or there exists a value `c` of type `T` such that the tuple `< a,c>` appears\
    \ in `r` and the tuple `< c,b>` appears in `r+`. (Note that this is a recursive\
    \ definition; note too that `r+` is indeed a transitive relation, as the name\
    \ “transitive closure” suggests. *See* transitivity, second definition.) As the\
    \ following pseudocode algorithm indicates, computing `TCLOSE ( r )` conceptually\
    \ involves iterative formation of the union of some intermediate result (computed\
    \ on the previous iteration) and a new partial result (computed on the current\
    \ iteration), until that union ceases to grow—in other words, until it reaches\
    \ a fixed point or “fixpoint.”\n\n```\nr+ := r ;\ndo until r+ ceases to grow ;\n\
    \    r+ := WITH ( r+ RENAME ( B AS C ) ) AS t1 ,\n               ( r RENAME (\
    \ A AS C ) ) AS t2 :\n          r+ UNION ( ( t1 JOIN t2 ) { A, B } ) ;\nend do\
    \ ;\n```\n\n*See also* recursive query.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00065.png)"
