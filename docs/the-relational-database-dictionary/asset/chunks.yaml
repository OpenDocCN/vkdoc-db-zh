  raw: '****empty key** A key of degree zero. Note that a relvar with an empty key
    can’t have any other keys in addition to the empty one, because of the irreducibility
    requirement on keys ( *see* candidate key). Note too that such a relvar can’t
    contain more than one tuple, because otherwise the key constraint would be violated.
    Declaring relvar *R* to have an empty key is thus a convenient way of imposing
    a cardinality constraint to the effect that *R* never contains more than one tuple.


    ****empty range** *See* existential quantifier; universal quantifier.


    ****empty relation** Given a relation type RELATION { *H*}, the relation of that
    type that contains no tuples at all. Note that there’s exactly one empty relation
    for each relation type (and its cardinality is zero). *Contrast* universal relation.


    **Example*: Suppose relvars S and P are both currently empty; that is, their current
    values *s* and *p* are both empty relations. Then *s* and *p* aren’t equal, even
    though their bodies are equal, precisely because they’re of different types (equivalently,
    because their headings aren’t equal).


    ****empty relvar** A relvar whose current value is an empty relation.


    ****empty restriction** A restriction of a given relation *r* that contains no
    tuples (i.e., is equal to *r* WHERE FALSE); especially, a restriction of the form
    *r* WHERE *c,* where *c* is a contradiction, q.v.


    **Examples*: Given the sample values in Figure 1, the expressions S


    WHERE STATUS = 25 and S WHERE STATUS > STATUS both denote empty restrictions (the
    second necessarily so, because STATUS > STATUS is a contradiction).


    ****empty set** The set with no elements (note that there’s exactly one such);
    written {} or ø. All theorems, properties, definitions, etc., that apply to sets
    in general apply to the empty set in particular. For example, relation **56**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00081.png)


    headings and bodies are both defined to be sets (of attributes and tuples, respectively),
    and so each is allowed to be the empty set in particular.


    ****empty tuple** The tuple of degree zero (note that there’s exactly one such).


    ****empty type** A type with no values. This concept is of crucial importance
    if inheritance is supported but is perhaps of little use otherwise.


    ****encapsulated** Scalar. *Note*: The term is also used, especially in OO


    contexts, to refer to the physical bundling, or packaging, of code and data (or
    operator definitions and data representation definitions, to be more precise).
    But to use the term in this way is to mix model and implementation considerations;
    the user shouldn’t care, and shouldn’t need to care, whether or not code and data
    are physically bundled together.


    ****entity** A thing. *Note*: It’s frequently suggested that there should be a
    one-to-one correspondence between “entities of interest” and tuples in base relvars.
    The suggestion is hard to sustain, however, given that the term *entities of interest*
    has no precise definition. (Of course, the same is true of the term *entity* itself,
    come to that.)


    ****entity integrity** The rule that attributes of primary keys in base relvars
    don’t allow nulls. However, since (a) relvars, base or otherwise, don’t necessarily
    have to have primary keys ( *see* primary key) and (b) rules that apply to base
    relvars but not other kinds are more than a little suspect anyway (because they
    violate The Principle of Interchangeability), the entity integrity rule could
    be, and in fact has been, dropped without serious loss. We mention it here mainly
    for historical reasons. In any case, it refers to a concept, null, that is totally
    incompatible with the relational model; it would thus require major revision anyway
    before any suggestion that it be kept could be seriously entertained.


    ****entity modeling** *See* semantic modeling.


    ****The Relational Database Dictionary, Extended Edition**


    **57**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00197.png)


    **entity/relationship diagram** A picture intended to explicate the logical design
    of a given database at a level of abstraction in which many details—


    in particular, details of the underlying types and almost all integrity constraints—are
    omitted.


    ****entity/relationship model** A set of conventions for drawing entity/relationship
    diagrams, q.v.


    ****entity/relationship modeling** Using the entity/relationship model, q.v.,
    as a tool for assisting in the logical database design process.


    ****EQ** Same as EQUIV.


    ****equality** A truth valued operator; two values are equal if and only if they’re
    the very same value. For example, the integer 3 is equal to the integer 3 and
    not to the integer 4, nor to any other integer (nor to anything else, either).
    More precisely, let *T* be a type; then the equality operator “=”


    for values of type *T* is defined as follows. Let *v1* and *v2* be two such values,
    and let *Op* be a read-only operator (other than “=” itself) with a parameter
    *x* of type *T*. Then *v1* and *v2* are equal (i.e., *v1* = *v2* evaluates to
    TRUE) if and only if, for all such operators *Op,* two successful invocations
    of *Op* that are identical in all respects except that the argument corresponding
    to *x* is *v1* in one invocation and *v2* in the other are indistinguishable in
    their effect. *Note*: The equality operator (which is—in fact, must be—defined
    for every type) is also known as identity. *See also* bag membership; duplicate;
    equivalence; identity, overloading; set; set membership; relation equality; tuple
    equality.


    ****equijoin** A theta join in which theta is “=”.


    ****EQUIV** *See* equivalence.


