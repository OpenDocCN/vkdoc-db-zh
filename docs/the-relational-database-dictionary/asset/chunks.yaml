    `y1, y2, . . ., yn` 和 `y` 分别是 `x1, x2, . . ., xn` 和 `x` 在映射 `f` 下的像。换句话说，一个双射映射是同构，当且仅当它保持了定义域
    `sX` 在到达域 `sY` 中的代数结构。


    > **注**：如果双射映射 `f` 是一个同构，那么它的逆也是一个同构。


    **示例**：设 `sX` 为集合 `{EVEN, ODD}`，并定义运算符 “+” 和 “*” 如下：


    **现在设 `sY` 为集合 `{TRUE, FALSE}`，并设 `f` 是从 `sX` 到 `sY` 的一个双射，将 `EVEN` 和 `ODD` 分别映射到
    `TRUE` 和 `FALSE`。进一步，令逻辑运算符 `EQUIV` 和 `OR` 分别对应于 “+” 和 “*”。那么 `f` 是从 `sX`（带有其运算符
    “+” 和 “*”）到 `sY`（带有其运算符 `EQUIV` 和 `OR`）的一个同构。


    # J


    **JD**


    连接依赖。


    **由超键蕴含的 JD**


    连接依赖 `⭐{A1, A2, . . ., An}` 由超键蕴含，当且仅当：(a) `A1, A2, . . ., An` 中的每一个都是相关关系变量 `R`
    的超键；并且 (b) `R` 的键可以按某种顺序排列，使得对于每个这样的键，至少有一个 `A1, A2, . . ., An` 同时包含该键及其在该顺序下的后继键。


    **示例**：设关系变量 `R` 仅有属性 `A`, `B`, `C`, `D`, `E`, `F`，并且仅有键 `{A}`, `{B}`, `{C}`。令
    `ABD` 表示属性集 `{A, B, D}`，其他字母组合类似。那么以下 JD 中，第一个被 `R` 的超键所蕴含，但第二个和第三个不是：

    ```

    ⭐ { ABD, BCE, CF }

    ⭐ { ABD, CE, CF }

    ⭐ { ABD, BCE, DF }

    ```

    注意，关系变量 `R` 必然满足第一个 JD，并且不满足第二个（后一个论断的有效性可能不明显，但事实上确实如此）。第三个 JD 可能满足，也可能不满足。如果满足，则关系变量
    `R` 不在 5NF 中；反之，如果关系变量 `R` 在 5NF 中，则它不可能满足第三个 JD。


    **JOIN**


    *参见* 自然连接。


    **join**


    自然连接（除非上下文另有要求）。


    **可连接的**


    1.  （二元情况）关系 `r1` 和 `r2` 是可连接的，当且仅当具有相同名称的属性属于相同的类型——等价地，当且仅当它们的属性集并集是一个合法的属性集。

    2.  （多元情况）关系 `r1, r2, . . . , rn` (`n` > 0) 是可连接的，当且仅当对于所有的 `i`, `j`，关系 `ri` 和
    `rj` 是可连接的 (`1 ≤ i ≤ n`, `1 ≤ j ≤ n`)。


    # 连接依赖


    多值依赖概念的推广（每个多值依赖都是一个连接依赖，但有些连接依赖不是多值依赖）。连接依赖是一个表达式——实际上是一个命题——形式为 `⭐{A1, A2, .
    . ., An}`，其中 `A1, A2, . . ., An` 都是同一个关系变量 `R` 的属性集的子集，整个表达式读作“星 `A1, A2, . .
    ., An`”。关系变量 `R` 满足连接依赖（JD）`⭐{A1, A2, . . ., An}`——等价地，该 JD 在关系变量 `R` 中成立——当且仅当每一个是
    `R` 合法值的关系都等于其在 `A1, A2, . . ., An` 上投影的连接。


    > **注**：连接依赖也被称为连接依赖性。注意，除非 `A1, A2, . . ., An` 的并集等于 `R` 的属性集，否则关系变量 `R` 不可能满足
    JD `⭐{A1, A2, . . ., An}`。进一步注意，从定义可以立即得出，关系变量 `R` 可以无损分解为其在 `A1, A2, . . ., An`
    上的投影，当且仅当它满足 JD `⭐{A1, A2, . . ., An}`。最后注意，从形式角度看，JD `⭐{A1, A2, . . ., An}` 只是一个命题，根据定义，它可以被满足或不满足（即可以评估为
    TRUE 或 FALSE）；然而，非正式地，通常只将 `⭐{A1, A2, . . ., An}` 定义为 JD，如果它确实被相关的关系变量满足。但这个定义使得无法说一个给定的关系变量不满足或违反某个
    JD（因为根据该定义，一个不被满足的 JD 根本不是 JD！）。


    **示例**：关系变量 `S` 满足 JD

    ```

    ⭐ { { S#, SNAME }, { S#, STATUS }, { S#, CITY } }

    ```

    因为每一个是 `S` 合法值的关系都等于其在 `{S#, SNAME}`、`{S#, STATUS}` 和 `{S#, CITY}` 上投影的连接；即，关系变量
    `S` 可以无损分解为这三个投影。（当然，没有要求必须实际执行这种分解——是否应该分解取决于这样做是否有任何好处。）


    **连接陷阱**


    *参见* 连接陷阱。


    # K


    **键**


    候选键（除非上下文另有要求）。


    **键属性**


    给定关系变量的一个属性，它至少是该关系变量的一个键的一部分。*另见* 子键。


    **键约束**


    一种约束，表明给定关系变量的属性集的某个子集是该关系变量的一个键。在 **Tutorial D** 中，这样的约束通过在相关关系变量定义中使用 `KEY`
    规范来定义（*参见*，例如，本词典引言中关系变量 `S`、`P` 和 `SP` 的定义）。但请注意，虽然系统肯定会强制执行这种约束所隐含的唯一性属性（*参见*
    候选键），但它通常无法同时强制执行相应的不可约性属性。换句话说，在关系变量 `R` 的定义中指定 `KEY{K}` 意味着 `K` 肯定是一个超键，但不一定是关系变量
    `R` 本身的一个键。


    **示例**：假设我们在关系变量 `S` 的定义中指定 `KEY{S#, CITY}` 而不是 `KEY{S#}`。那么系统显然无法强制执行供应商编号本身（相对于供应商编号/城市组合）必须唯一的约束。（另一方面，如果我们同时指定
    `{S#}` 和 `{S#, CITY}` 为键，系统至少应该能够识别前者是后者的真子集，并因此拒绝后一个规范。）


    **键推断**


    确定适用于给定派生关系变量或由给定派生关系满足的键约束的过程。


    键推断是约束推断的一个特例。


