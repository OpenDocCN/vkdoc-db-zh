- fmt: '## many-to-many correspondence


    Often used loosely, however, to mean a pairing such that either (a) each element
    of `s1` corresponds to any number of elements of `s2` (possibly none at all) and
    each element of `s2` corresponds to at least one element of `s1`, or (b) each
    element of `s1` corresponds to at least one element of `s2` and each element of
    `s2` corresponds to any number of elements of `s1` (possibly none at all), or
    (c) each element of `s1` corresponds to any number of elements of `s2` (possibly
    none at all) and each element of `s2` corresponds to any number of elements of
    `s1` (possibly none at all). The term is best avoided unless the intended meaning
    is clear.


    **Example** (*strict sense only*): Let `s` be the set of all positive integers.


    Consider the pairing of positive integers `x` and `y` defined as follows: Positive
    integers `x` and `y` are paired if and only if they have the same number of digits
    in conventional decimal notation (no leading zeros).


    Then that pairing is a many-to-many correspondence from `s` to itself.


    ## many-to-one correspondence


    Strictly, a rule pairing two sets `s1` and `s2` (`s1` and `s2` not necessarily
    distinct) such that each element of `s1` corresponds to exactly one element of
    `s2` and each element of `s2` corresponds to at least one element of `s1` (in
    other words, a surjection, `q.v.`); equivalently, that pairing itself. Often used
    loosely, however, to mean a pairing such that (a) each element of `s1` corresponds
    to at most one element of `s2` and each element of `s2` corresponds to at least
    one element of `s1`, or (b) each element of `s1` corresponds to exactly one element
    of `s2` and each element of `s2` corresponds to any number of elements of `s1`
    (possibly none at all), or (c) each element of `s1` corresponds to at most one
    element of `s2` and each element of `s2` corresponds to any number of elements
    of `s1` (possibly none at all). The term is best avoided unless the intended meaning
    is clear.


    **Example** (*strict sense only*): Let `s1` and `s2` be the set of all integers
    and the set of all nonnegative integers, respectively. Then the pairing of integers
    `x` with their absolute values `|x|` is a many-to-one correspondence from `s1`
    to `s2`.


    ## many-valued logic


    Same as `n` VL, `q.v.`, for some `n > 2`.


    ## map / mapping


    A function, `q.v.` Also used (in this dictionary in particular, on occasion) to
    mean a function that''s a bijection specifically, together with its inverse.


    ## mark


    *See* `null`.


    ## MATCHING


    *See* `semijoin`.


    ## material equivalence


    Logical equivalence, `q.v.`


    ## material implication


    Logical implication, `q.v.`


    ## materialization


    1.  An implementation technique in which an intermediate result relation is produced
    in its entirety before being passed on to another operation. *Contrast* `pipelining`.

    2.  View materialization, `q.v.`


    ## materialized view


    Deprecated term for a `snapshot`. Note the difference between (a) materialization
    as a technique for implementing operations on views (*see* `view materialization`)
    and (b) a “materialized view”—i.e., a `snapshot`—as such. The former is an implementation
    technique and should have no logical consequences for the user at all (i.e., users
    shouldn’t need to know whether a given operation on a given view is implemented
    by materialization). By contrast, the latter is an issue that concerns the user
    very much; that is, the user certainly does need to know whether a given relvar
    is a snapshot, because whether it is or not affects the semantics of the relvar
    in question. The problem is, however, that (as the definition indicates) snapshots
    have come to be known, at least in some circles, not as snapshots at all but as
    materialized views. But snapshots aren’t views; views are virtual and snapshots
    aren’t, and “materialized view” is a contradiction in terms (at least as far as
    the model is concerned). Worse yet, the unqualified term `view` is often taken
    nowadays to mean a materialized view specifically, and we’re thus in danger of
    no longer having a good term for a view in the original sense. This dictionary
    does use `view` in its original sense, but be warned that the term doesn’t always
    have that meaning elsewhere. *Caveat lector.*


    ## meaning


    (*Of a relvar*) *See* `intended interpretation`; `relvar constraint` (second definition);
    `relvar predicate`.


    ## member


    An element of a `bag` or `set`.


    ## membership


    *See* `bag membership`; `set membership`.


    ## merge


    A `join` implementation technique.


    ## metadata


    Data about data. *See* `catalog`.


    ## minimality


    (*Of a key or set of FDs*) Old fashioned and somewhat deprecated (because inaccurate)
    term for `irreducibility`.


    ## MINUS


    *See* `difference`.


    ## missing information


    A term often used to refer to information that''s either currently unknown or
    not applicable. *Note*: To say that information that''s currently unknown is missing
    is possibly reasonable. However, to say that information that''s not applicable
    is missing isn''t reasonable at all (and the usage is therefore deprecated). For
    example, if a given employee is unmarried, spouse information for that employee
    isn''t missing—rather, it simply doesn''t exist.


    ## model


    Either a data model in general (usually in the sense of the first definition of
    that term) or the relational model specifically, as the context demands. *Note*:
    Actually, the term `model` has been given a great number of other meanings as
    well in the literature—more meanings, in fact, than it can reasonably be expected
    to bear. Such additional meanings are deliberately omitted here.


    ## modus ponens


    Loosely, “proof by affirmation”; a rule of inference to the effect that if we
    know that (`p`) IMPLIES (`q`) and `p` are both true, we can infer that `q` is
    true. Also known as direct reasoning.


    ## modus tollens


    Loosely, “proof by denial”; a rule of inference to the effect that if we know
    that (`p`) IMPLIES (`q`) is true and `q` is false, we can infer that `p` is false.
    Also known as indirect reasoning.


    ## monadic


    (*Of an operator*) Having exactly one operand; that is, being defined in terms
    of exactly one parameter.


    ## multi-relvar constraint


    Term sometimes used for a `database constraint` that mentions two or more distinct
    relvars. *Contrast* `single-relvar constraint`. *Note*: The difference between
    single-relvar and multi-relvar constraints is more a matter of pragma than logic,
    thanks to The Principle of Interchangeability among other things.


    **Example**: The foreign key constraints from relvar `SP` to relvars `S` and `P`;
    also constraint `C3` from the examples under `database constraint`.


    ## multi-tuple constraint


    Term sometimes used for a relvar or database constraint that isn''t a `single-tuple
    constraint`, `q.v.`


    **Example**: Constraint `C3` from the examples under `database constraint` might
    be regarded as a multi-tuple constraint.


    ## multidependent


    *See* `multivalued dependency`.


    ## multidetermines


    *See* `multivalued dependency`.'
