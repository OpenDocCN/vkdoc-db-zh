  trans: '### 适用于 `R` 的属性和键约束。（`属性-键范式` 会是更好的名称。无论如何，这个概念主要具有学术意义，因为关系变量可以很容易地被完全规范化——即达到
    5NF 或 6NF——但仍然不属于 `DK/NF`。）


    **示例：** 正如在 Boyce/Codd 范式下指出的那样，对于范式来说，展示一个反例往往比展示一个正面的例子更具启发性。因此，假设发货关系满足一个约束，其大意是奇数编号的零件只能由奇数编号的供应商提供，而偶数编号的零件只能由偶数编号的供应商提供（当然，这个例子非常牵强，但对于当前的目的来说已经足够）。那么这个约束显然不是由适用于关系变量
    `SP` 的属性和键约束所蕴含的，因此 `SP` 不属于 `DK/NF`；但它当然属于 6NF。


    ### 域关系演算

    `域演算`，参见。


    ### 点限定

    在元组演算及基于它的语言中，一个点限定名称是形如 `rx.A` 的表达式，其中 `rx` 是一个范围变量的名称，而 `A` 是该范围变量 `rx` 所遍历的关系
    `r` 的一个属性名称。这样的表达式用作属性引用，参见；它表示 `rx` 当前所指向的 `r` 的特定元组中属性 `A` 的值（或可能是指属性 `A` 本身）。点限定在元组演算中用于消除歧义——在
    SQL 中也是如此——但在域演算或关系代数中则不然（后者使用属性（重）命名和名称作用域来达到等效效果）。


    **示例：** 以下查询“找出至少提供一种零件的供应商”的元组演算表述，使用了两个点限定名称 `SPX.S#` 和 `SX.S#`：


    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    SX WHERE EXISTS SPX ( SPX.S# = SX.S# )

    ```


    这里是同一查询的关系代数表述，以作比较：`S MATCHING SP`。这里的“匹配”是基于属性 `S#` 进行的（因为该属性是关系变量 `S` 和 `SP`
    唯一共同的属性）。


    ### 双箭头

    *参见* `多值依赖`。


    ### 双下划线

    一种约定，如图 1 所示，用于标记参与主键的属性。


    ### `DRC`

    `域关系演算`。


    ### 删除

    *参见* `数据定义操作符`。


    ### 对偶

    1.  （*逻辑学*）`与`、`或`、`真` 和 `假` 的对偶分别是 `或`、`与`、`假` 和 `真`（`非` 是其自身的对偶）。更一般地说，令 `x`
    是一个仅涉及 `非`、`与` 和 `或` 这些连接词的逻辑表达式，并令 `y` 是通过将 `x` 中出现的每一个 `与`、`或`、`真` 和 `假` 替换为其对偶而得到的；那么
    `x` 和 `y` 互为对偶。*注意*：由于每个逻辑表达式都等价于一个仅涉及 `非`、`与` 和 `或` 的表达式，因此每个逻辑表达式都有一个对偶。

    2.  （*集合论*）交集、并集、全集和空集的对偶分别是并集、交集、空集和全集（补集是其自身的对偶）。更一般地说，令 `x` 是一个仅涉及补集、交集和并集的集合论表达式，并令
    `y` 是通过将 `x` 中出现的每一个交集、并集、全集和空集替换为其对偶而得到的；那么 `x` 和 `y` 互为对偶。*注意*：由于每个集合论表达式都等价于一个仅涉及补集、交集和并集的表达式，因此每个集合论表达式都有一个对偶。*另见*
    `对偶原理`。


    ### 双模原理

    指任何可以交互调用的关系操作，也可以从应用程序中调用的原则。


    ### 对偶原理

    1.  （*逻辑学*）令 `x` 和 `y` 是逻辑表达式，使得 `x` 是 `y` 的对偶；那么 `x` 是重言式当且仅当 `y` 是重言式。

    2.  （*集合论*）令 `x` 和 `y` 是集合论中的陈述，使得 `x` 是 `y` 的对偶；那么 `x` 是一个定理当且仅当 `y` 是一个定理。


    **示例：** `德摩根定律`，参见。


    ### `DUM`

    `TABLE_DUM`。


    ### 重复

    令 `a1` 和 `a2` 是在某个上下文中值 `v1` 和 `v2` 的出现，参见。那么 `a1` 和 `a2` 互为重复，当且仅当 `v1` 和 `v2`
    相等（换句话说，当且仅当 `v1` 和 `v2` 是完全相同的值）。顺便说一句，从这个定义可以清楚地看出，那句众所周知的格言——关系中从不包含重复元组——其真正含义是没有关系包含*相同*元组的重复*出现*——尽管为了熟悉度，我们在本词典中倾向于使用不太精确的表述。观察到，由于（a）关系从不包含重复元组，并且（b）每个关系操作都产生一个关系，因此，每当执行关系操作时，如果需要，会消除重复元组（更准确地说，是相同元组的冗余出现）。


    **示例**（*重复消除*）：给定图 1 所示的示例值，关系变量 `S` 的当前值在 `{CITY}` 上的投影基数为三，而非五；类似地，关系变量 `S`
    和 `P` 的当前值在 `{CITY}` 上的投影的并集基数为四，而非十一。（在最熟悉的关系运算符中，投影和并集是唯一需要关注重复消除的两个。对于其他运算符——如选择、连接等——它实际上是一个空操作。）


    ### 重复消除

    一个普遍使用的术语，意指更准确地应称为复制消除。*参见* `重复`。


    ### 二元

    （*指一个运算符*）恰好有两个操作数；即根据恰好两个参数定义。


    ### `E`

    `E/R` 实体/关系。


    ### E/R 图

    *参见* `实体/关系图`。


    ### E/R 模型

    *参见* `实体/关系模型`。


    ### E/R 建模

    *参见* `实体/关系建模`。


    ### E-关系

    *参见* `RM/T`。


    ### 元素

    *参见* `包`；`集`。


    ### 嵌入式依赖

    由某个关系变量的某个投影所满足的依赖。


    **示例：** 考虑关系变量 `CTXD`，其属性为 `C`（课程）、`T`（教师）、`X`（教材）和 `D`（天数），谓词为“教师 `T` 在课程 `C`
    上花 `D` 天时间讲解教材 `X`”。假设该关系变量的唯一键是 `{C,T,X}`。同时假设对于给定课程，教师集合和教材集合是相当独立的。那么 `CTXD`
    属于 6NF——除了平凡分解外，它根本无法进行无损分解。然而，它在 `{C,T,X}` 上的投影满足嵌入式多值依赖 `{C} ->> {T}` 和 `{C}
    ->> {X}`。


    ### 空

    （*指一个包或集*）没有元素。


    ### 空包

    没有元素的包（注意恰好有一个这样的包）；写作 `()`。（当然，空包 `()` 和空集 `{}`，参见，在逻辑上是不可区分的。）


    ### 空外键

    度为零的外键。*注意*：所引用关系变量中的对应候选键必然也度为零，并且引用约束将被满足，当且仅当（a）被引用的关系变量非空，或者（b）引用的关系变量为空（或两者兼有）。


    ### 空标题

    度为零的标题（注意恰好有一个这样的标题）。'
- fmt: '# The Relational Database Dictionary, Extended Edition


    ## empty key

    一个度为零的键。注意，具有空键的关系变量不能有其他键，因为空键不满足键的可约性要求（*参见* candidate key）。还需注意，这样的关系变量不能包含多于一个元组，否则将违反键约束。因此，声明关系变量*R*具有空键是施加基数约束的一种便捷方式，以确保*R*永远不会包含多于一个元组。


    ## empty range

    *参见* existential quantifier; universal quantifier。


    ## empty relation

    给定关系类型 `RELATION { H }`，该类型中不包含任何元组的关系。注意，对于每种关系类型，恰好存在一个空关系（其基数为零）。*对比* universal
    relation。


    **示例**：假设关系变量 `S` 和 `P` 当前都为空；即它们的当前值 *s* 和 *p* 都是空关系。那么 *s* 和 *p* 并不相等，即使它们的关系体相等，原因恰恰在于它们是不同类型（等价地，因为它们的关系头不相等）。


    ## empty relvar

    当前值为空关系的关系变量。


    ## empty restriction

    给定关系 *r* 的一个不包含任何元组的限制（即等于 `r WHERE FALSE`）；尤指形式为 `r WHERE c` 的限制，其中 *c* 是一个矛盾式（*参见*
    contradiction）。


    **示例**：给定图1中的示例值，表达式 `S WHERE STATUS = 25` 和 `S WHERE STATUS > STATUS` 都表示空限制（第二个必然是，因为
    `STATUS > STATUS` 是一个矛盾式）。


    ## empty set

    没有元素的集合（注意恰好有一个这样的集合）；写作 `{}` 或 `ø`。所有适用于一般集合的定理、性质、定义等都特别适用于空集。例如，关系头和关系体都被定义为集合（分别是属性集和元组集），因此两者都允许是空集。


    ## empty tuple

    度为零的元组（注意恰好有一个这样的元组）。


    ## empty type

    没有值的类型。如果支持继承，这个概念至关重要，否则可能没什么用处。


    ## encapsulated

    标量。*注意*：该术语也用于（尤其在面向对象上下文中）指代代码和数据（或更精确地说，操作符定义和数据表示定义）的物理捆绑或打包。但以这种方式使用该术语混淆了模型和实现的考虑；用户不应该，也无需关心代码和数据是否物理上捆绑在一起。


    ## entity

    一个事物。*注意*：经常有人建议“感兴趣的实体”与基本关系变量中的元组之间应该存在一一对应关系。然而，鉴于“感兴趣的实体”这个术语没有精确定义，这个建议很难成立。（当然，“实体”本身也是如此。）


    ## entity integrity

    基本关系变量的主键属性不允许为空（null）的规则。然而，由于（a）关系变量（无论是否基本）不一定必须有主键（*参见* primary key），以及（b）适用于基本关系变量而不适用于其他种类的规则本身就相当可疑（因为它们违反了可交换性原理），实体完整性规则可以而且实际上已经被放弃，而没有造成严重损失。我们在这里提到它主要是出于历史原因。无论如何，它涉及一个与关系模型完全不兼容的概念——空值；因此，任何保留它的建议都需要进行重大修改才能被认真考虑。


    ## entity modeling

    *参见* semantic modeling。


    ## entity/relationship diagram

    一种用于阐明给定数据库逻辑设计的图示，其抽象级别省略了许多细节——特别是底层类型的细节和几乎所有的完整性约束。


    ## entity/relationship model

    用于绘制实体/关系图（*参见* entity/relationship diagram）的一套约定。


    ## entity/relationship modeling

    使用实体/关系模型（*参见* entity/relationship model）作为辅助逻辑数据库设计过程的工具。


    ## EQ

    与 EQUIV 相同。


    ## equality

    一个真值运算符；两个值相等当且仅当它们是同一个值。例如，整数 3 等于整数 3，而不等于整数 4，也不等于任何其他整数（或其他任何东西）。更精确地说，令 *T*
    为一个类型；则类型 *T* 的值的相等运算符“=”定义如下。令 *v1* 和 *v2* 为两个这样的值，并令 *Op* 是一个只读操作符（除了“=”本身），其具有一个类型为
    *T* 的参数 *x*。那么 *v1* 和 *v2* 相等（即 `v1 = v2` 计算结果为 TRUE）当且仅当，对于所有这样的操作符 *Op*，两次成功调用
    *Op*，除了对应的 *x* 参数在一次调用中是 *v1* 而在另一次中是 *v2* 之外，其他所有方面都相同，且它们的效果无法区分。*注意*：相等运算符（为每个类型都定义，且必须定义）也称为恒等（identity）。*另见*
    bag membership; duplicate; equivalence; identity, overloading; set; set membership;
    relation equality; tuple equality。


    ## equijoin

    Theta 连接（theta join）中 theta 为“=”的情况。


    ## EQUIV

    *参见* equivalence。


    ## equivalence

    1.  （*一般意义*）令 *x* 和 *y* 是某个集合的元素，并令该集合被划分成一个等价类（*参见* equivalence class）集合。那么 *x*
