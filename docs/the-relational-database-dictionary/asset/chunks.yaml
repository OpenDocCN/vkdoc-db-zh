    *s2* 指定的；那么该约束指示了在关系 *r* 中，每个 *x1* 对应多少个 *x2*。各种指定的含义如下：1 表示必须恰好有一个 *x2*；0..1
    表示至多有一个 *x2*；0.. *m* 表示可以有任意数量的 *x2*，从零到某个未定义的上限 *m*；1.. *m* 表示可以有任意数量的 *x2*，从一到某个未定义的上限
