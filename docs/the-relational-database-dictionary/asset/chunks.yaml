  trans: '

    ## 集合级

    关系模型中的运算符都是**集合级**的，因为它们以完整的关系或关系变量（或两者）作为操作数，并要么产出完整的关系作为结果，要么更新完整的关系变量。（`关系级`会是一个更好的术语。）


    *注意*：这个概念对更新运算符尤其意味着，在所有的更新完成之前，不得进行补偿操作和数据库完整性检查；也就是说，一个集合级更新不能被当作一系列单独的元组级更新来处理。


    *对比*元组级。


    ## 集合成员

    （*针对某个元素*）出现在某个给定集合中的属性；或检测该属性的操作。集合成员通常用符号 "∈" 表示；因此，例如，布尔表达式 `x` ∈ `s`（在语义上等价于表达式
    { `x`} ⊆ `s`）当且仅当元素 `x` 确实出现在集合 `s` 中时返回 TRUE。


    ## 集合运算符

    *参见*布尔代数（第二个定义）。


    ## 集合论

    数学的一个分支，与逻辑密切相关，研究集合的本质；它根据某些公理，如外延公理（参见该词条），将集合的概念形式化。


    ## 谢弗竖线

    *参见*与非门。


    ## SI 前缀

    国际单位制（SI）的一部分，该单位制是各种科学测量的标准（SI 是 `Système Internationale d''Unités` 的缩写）。下表列出了
    SI 前缀及其缩写和含义：


    | yotta | Y | 10 的 24 次方 | yocto | y | 10 的 -24 次方 |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | zetta | Z | 10 的 21 次方 | zepto | z | 10 的 -21 次方 |

    | exa | E | 10 的 18 次方 | atto | a | 10 的 -18 次方 |

    | peta | P | 10 的 15 次方 | femto | f | 10 的 -15 次方 |

    | tera | T | 10 的 12 次方 | pico | p | 10 的 -12 次方 |

    | giga | G | 10 的 9 次方 | nano | n | 10 的 -9 次方 |

    | mega | M | 10 的 6 次方 | micro | µ | 10 的 -6 次方 |

    | kilo | k | 10 的 3 次方 | milli | m | 10 的 -3 次方 |

    | hecto | h | 10 的 2 次方 | centi | c | 10 的 -2 次方 |

    | deca | da | 10 的 1 次方 | deci | d | 10 的 -1 次方 |


    然而，在计算领域，从 yotta 到 kilo 的前缀用法略有不同。具体来说，它们被解释为 2 的幂，而不是 10 的幂，如下所示：


    | yotta | Y | 2 的 80 次方 |

    | :--- | :--- | :--- |

    | zetta | Z | 2 的 70 次方 |

    | exa | E | 2 的 60 次方 |

    | peta | P | 2 的 50 次方 |

    | tera | T | 2 的 40 次方 |

    | giga | G | 2 的 30 次方 |

    | mega | M | 2 的 20 次方 |

    | kilo | K | 2 的 10 次方 |


    例如，一千字节（1KB——前缀 `kilo` 在计算领域通常缩写为 `K`，而不是 `k`）是 1,024 字节，而不是 1,000 字节。要特别注意，一个千兆字节大致上是一百亿字节（缩写
    `BB` 有时会代替 `GB` 使用；同样，缩写 `XB` 有时会代替 `EB` 使用）。还要注意——与普遍看法相反——`gigabyte` 的发音中开头的
    `g` 是软音，且 `i` 是长音（如同 `gigantic` 中的发音）。


    ## 签名

    设 `Op` 为一个运算符。那么 `Op` 的**签名**由以下组合构成：(a) 运算符名称 `Op`，(b) `Op` 的参数（按顺序）的类型，以及 (c)
    执行 `Op` 所产生的结果（如果有）的类型。


    *注意*：有些作者给出的定义与刚才给出的略有不同；例如，该术语有时被认为包含参数名称。


    *示例*：考虑参数词条示例中只读版本的运算符 `DOUBLE`。该运算符的签名由以下组合构成：(a) 运算符名称 `DOUBLE`，(b) 该运算符唯一参数的类型（`INTEGER`），以及
    (c) 调用该运算符时返回结果的类型（也是 `INTEGER`）。


    ## 简单属性

    一个属性（参见该词条）。*对比*复合属性。


    ## 简单键

    不是复合的键。


    ## 简单谓词

    不包含连接词的谓词。


    ## 简单命题

    不包含连接词的命题。


    ## 单箭头

    同箭头（*参见*函数依赖）。


    ## 单关系变量约束

    有时用于指代仅提及一个关系变量的数据库约束的术语。*对比*多关系变量约束。


    *注意*：单关系变量约束和多关系变量约束之间的区别更多是实用（pragma）问题，而非逻辑问题，这要归功于**可交换性原则**以及其他因素。


    *示例*：关系变量 `S`、`SP` 和 `P` 的键约束；以及数据库约束词条示例中的约束 `C1` 和 `C2`。


    ## 单元组约束

    同元组约束。


    ## 单元素集

    严格来说，指基数为 1 的集合（也称为单元素集合）；有时宽泛地用来指代这样一个集合中包含的那个单一元素。


    ## 第六范式

    关系变量 `R` 是**第六范式**，`6NF`，当且仅当它根本不能进行非平凡的非损失分解——即当且仅当它满足的连接依赖（JD）只有平凡的。因此，请注意，(a)
    `6NF` 是传统理解下的范式规范化方面的终极范式；(b) 每个 `6NF` 关系变量都在 `5NF` 中。观察发现，关系变量 `R` 在 `6NF` 中，当且仅当
    (a) 它由一个键 `K` 和最多一个其他属性 `A`（如果 `K` 没有嵌入式依赖，参见该词条）或恰好一个其他属性 `A`（否则）构成，并且 (b) `K`
    的任何真子集 { `B`} 都不满足函数依赖 { `A`} → { `B`} 或函数依赖 { `B`} → { `A`}。还观察到，该定义实际上可以简化为：关系变量
    `R` 在 `6NF` 中，当且仅当它在 `5NF` 中，其度为 `n`，并且没有度小于 `n`-1 的键。


    *注意*：`6NF` 的概念在时态数据库背景下给出了扩展定义，在那里它相对于 `5NF` 具有某些优势——这些优势在传统的（非时态）数据库中不一定适用。细节超出了本词典的范围。


    *示例*：1. 关系变量 `SP` 在 `6NF` 中，因为它根本不能进行非平凡的非损失分解。（观察到 `SP` 肯定在 `5NF` 中；它的度是三；并且它没有度小于二的键。）相比之下，关系变量
    `S` 和 `P` 不在 `6NF` 中，因为它们两者都可以非平凡地分解为几个二元投影。2. 设关系变量 `PLUS` 具有属性 `A`、`B` 和 `C`，类型均为
    `INTEGER`，并设相应的关系变量谓词为 `A + B = C`。那么关系变量 `PLUS` 有三个不同的键：`{A,B}`、`{B,C}` 和 `{C,A}`。但
    `PLUS` 在 `6NF` 中，因为它肯定在 `5NF` 中，度为三，并且没有度小于二的键。


    ## 斯科伦常量

    根据定义，表达式

    ```

    EXISTS x ( p( x))

    ```

    在逻辑上等价于表达式 `p( v)`，其中 `v` 是某个未知值；也就是说，原始表达式断言存在某个这样的 `v`，即使我们不知道它是什么。那个值 `v` 就是一个**斯科伦常量**。*另见*斯科伦函数。


    ## 斯科伦函数

    根据定义，表达式

    ```

    FORALL y (EXISTS x ( q( y,x))

    ```

    在逻辑上等价于表达式

    ```

    FORALL y ( q( y,f( y)))

    ```

    其中 `f` 是关于全称量化变量 `y` 的某个未知函数。那个函数 `f` 就是一个**斯科伦函数**。斯科伦常量（参见该词条）和斯科伦函数一起，为从任意表达式中系统地消除存在量词提供了基础，从而使该表达式更易于进行后续的形式化处理。进一步的细节超出了本词典的范围。

