- fmt: "# Examples\n*   C++； SQL； `Tutorial D`； and many others. Codd’s original relational\
    \ algebra is an example of a language that’s not computationally complete.\n\n\
    # conceptual modeling\n*See* semantic modeling.\n\n# conclusion\nIn logic, that\
    \ which a proof proves or an attempted proof attempts to prove.\n\n# conditional\
    \ expression\nA logical expression, *q.v.*\n\n# conditional operator\nA read-only\
    \ logical operator, *q.v.* (especially one of the connectives, *q.v.*).\n\n# conjunct\n\
    A predicate that’s ANDed with zero or more others.\n\n# conjunction\n1.  (*Dyadic\
    \ case*) If `p` and `q` are predicates, their conjunction `(p) AND (q)` is a predicate\
    \ also. Let `(ip) AND (iq)` be an invocation of that predicate (where `ip` and\
    \ `iq` are invocations of `p` and `q`, respectively). Then that invocation `(ip)\
    \ AND (iq)` evaluates to `TRUE` if and only if `ip` and `iq` both evaluate to\
    \ `TRUE`.\n    *Note*: The parentheses enclosing `p` and `q` in the conjunction\
    \ might not be needed in practice.\n2.  (*N-adic case*) Let `p1`, `p2, ..., pn`\
    \ (`n` ≥ 0) be predicates. Then the conjunction `AND{p1, p2, ..., pn}` is equivalent\
    \ to the expression `TRUE AND (p1) AND (p2) AND ... AND (pn)`.\n\n# conjunctive\
    \ normal form\nA predicate is in conjunctive normal form, `CNF`, if and only if\
    \ it’s of the form `(p1) AND (p2) AND ... AND (pn)`, where none of the conjuncts\
    \ `(p1)`, `(p2)`, ..., `(pn)` involves any `AND`s—more precisely, where each of\
    \ the conjuncts `(p1)`, `(p2)`, ..., `(pn)` is a disjunction of literals (*see*\
    \ literal, second definition).\n\n# The Relational Database Dictionary, Extended\
    \ Edition\n**33**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00170.png)\n\
    \n# connection trap\nA term used by some critics to refer to an alleged flaw in\
    \ the relational model. Consider the expression `(S JOIN P){S#,P#}`. This expression\
    \ denotes a relation, *r* say, that happens to contain the tuple `<S2,P5>` (because\
    \ supplier `S2` and part `P5` are both located in Paris). Now, it obviously can’t\
    \ be inferred from this fact (at least, not validly) that supplier `S2` supplies\
    \ part `P5`—the predicate for *r* is “Supplier `S#` and part `P#` are located\
    \ in the same city,” not “Supplier `S#` supplies part `P#`.” However, critics\
    \ claim that users will nevertheless make that invalid inference, and hence that\
    \ the relational model is flawed because it lets users fall into that trap. But\
    \ it should be clear from the example that the flaw lies not with the model but\
    \ with a failure on the part of those users (or those critics, perhaps) to understand\
    \ the semantics of join.\n*Note*: As the example suggests, the term *connection\
    \ trap* is typically regarded as an issue that arises in connection with join\
    \ specifically (indeed, some writers even refer to it as the join trap for that\
    \ reason); however, analogous issues can arise in connection with other operations\
    \ also.\n\n# connective\nA read-only monadic or dyadic logical operator. There\
    \ are exactly 20 connectives in two-valued logic, four monadic and 16 dyadic (corresponding\
    \ directly to the four possible monadic and 16 possible dyadic truth tables).\
    \ The connectives most frequently encountered in practice are `NOT` (negation),\
    \ `OR` (disjunction), `AND` (conjunction), `IMPLIES` (implication), and `EQUIV`\
    \ (equivalence); others include `NAND`, `NOR`, and `XOR`, *q.v.*\n*Note*: A variety\
    \ of other symbols and keywords, some but not all of which are included in this\
    \ dictionary, are also used to denote these connectives.\n\n# consequent\n*See*\
    \ implication.\n\n# consistency\nIntegrity, *q.v.* *Contrast* correctness.\n\n\
    # consistent\n1.  (*Logic*) A set of predicates is consistent if and only if there\
    \ exists at least one set of arguments that can be substituted for the parameters\
    \ of those predicates such that every resulting proposition evaluates to `TRUE`.\n\
    2.  (*Of a database*) Satisfying all defined integrity constraints.\n\n**34**\n\
    \n# The Relational Database Dictionary, Extended Edition\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00213.png)"
