    ## ****propositional calculus**

    A sound， complete， and decidable formal system having to do with propositions
    and connectives and the inferences that can be made using such propositions and
    connectives. *Contrast* predicate calculus.


    ## ****propositional constant**

    Same as proposition.


    ## ****propositional expression**

    An expression denoting a proposition; that is， an expression involving propositional
    constants， propositional variables， connectives， and parentheses. *Note*: Logic
    texts don’t use this term much， typically preferring the term *propositional form，*
    q.v. (if they use any term for the concept at all， that is).


    **Examples*: If `p` and `q` are propositional variables， then `p，` `q，` the conjunction
    ( `p`) AND ( `q`)， the disjunction ( `p`) OR ( `q`)， and the negation NOT( `p`)
    are all propositional expressions.


    ## ****propositional form**

    Same as propositional expression.


    ## **propositional function**

    Same as predicate.


    ## **propositional logic**

    Same as propositional calculus.'
