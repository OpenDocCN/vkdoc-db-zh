    relations (loosely speaking). *Note*: If we want relational algebra to be regarded
    as an algebra in the same sense that the algebra of sets, q.v., is so regarded—which
    presumably we do—then we ought really to include, in addition to the operators
    that produce a relation as a result, a relational inclusion operator, q.v. Note
    further that relational assignment is also a **150**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00009.png)


    relational operator, but it isn’t a relational algebra operator because it isn’t
    read-only.


    ****relational assignment** An operation that assigns a relation value to a relation
    variable (of the same type). *See* assignment.


    ****relational calculus** An applied form of predicate calculus, tailored to operating
    on relations, with the property that every relational calculus expression is semantically
    equivalent to some relational algebra expression.


    *See also* domain calculus; tuple calculus.


    ****relational comparison** A Boolean expression of the form ( *exp1*) *theta*
    ( *exp2*), where *exp1* and *exp2* are relational expressions of the same type
    *T*


    and *theta* is any comparison operator that makes sense for relations of type
    *T* (e.g., “=”, “≠”, “⊆”). *Note*: The parentheses surrounding *exp1* and *exp2*


    in the comparison might not be needed in practice.


    ****relational completeness** A measure of the expressive power of a language;
    essentially, a language is relationally complete if and only if it’s at least
    as powerful as relational calculus, meaning that any relation definable by some
    relational calculus expression is also definable by some expression of the language
    in question.


    **Examples*: Relational algebra is relationally complete, because every relational
    calculus expression is semantically equivalent to some relational algebra expression.
    (In fact the converse is true as well; that is, every relational algebra expression
    is semantically equivalent to some relational calculus expression, at least with
    the algebra and calculus as usually defined.) For example, the relational calculus
    expression shown as an example under tuple calculus is semantically equivalent
    to the relational algebra expression (S MATCHING SP){SNAME}. It follows that in
    order to prove that a given language *L* is relationally complete, it suffices
    to prove that every relational algebra expression is semantically equivalent to
    some expression in *L*—which is often easier than proving that every relational
    calculus expression is semantically equivalent to some **The Relational Database
    Dictionary, Extended Edition**


    **151**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00060.png)


    expression in *L*. SQL, for example, can be shown to be “almost”


    relationally complete in this way (“almost,” because SQL fails to support TABLE_DEE
    and TABLE_DUM). *Note*: In fact, SQL is “more than”


    relationally complete, in that its expressions permit the definition of many objects
    that aren’t relations at all. As this example suggests, being more than relationally
    complete isn’t necessarily a good thing.


    ****relational database** A database that abides by The Information Principle.


    We assume throughout this dictionary that all databases are relational, barring
    explicit statements to the contrary. *Note*: SQL databases must be regarded as
    only approximately relational at best, since SQL involves so many departures from
    The Information Principle (including but not limited to the departures identified
    under table).


    ****relational DBMS** A DBMS that manages relational databases (and no others);
    equivalently, a DBMS that implements the relational model.


    *Note*: SQL DBMSs must be regarded as only approximately relational at best, since
    SQL involves so many departures from the relational model (including but not limited
    to the departures identified under table).'
