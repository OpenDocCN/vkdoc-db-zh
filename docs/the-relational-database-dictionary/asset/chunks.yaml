    **logical database design** The process (or the result of the process) of deciding,
    given some body of data to be represented in some database, what relvars that
    database should contain, what attributes they should have, and what constraints
    they should be subject to. Ideally, the goal is to produce a design that’s independent
    of all considerations having to with either physical implementation or specific
    applications—the latter objective being desirable for the good reason that it’s
    generally not the case that all uses to which the database will be put are known
    at design time.


    Overall, the design process can be summarized as one of (a) pinning down the relvar
    predicates (as well as other “business rules,” possibly) as carefully as possible,
    albeit necessarily somewhat informally, and then (b) mapping those predicates
    and rules to specific relvars and formal constraints.


    **logical equivalence *See* equivalence.


    **logical expression** An expression denoting a truth value.


    ****logical implication** Implication, q.v.


    ****The Relational Database Dictionary, Extended Edition**


    **105**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00159.png)


    **logical operator** An operator that (a) takes either values or variables (or
    both) of type BOOLEAN as operands and (b) either returns a value, or updates at
    least one variable, of type BOOLEAN. The connectives are a special case.


    ****logical system** Loosely, a system consisting of axioms and inference rules,
    together with a set of theorems that can be derived from the former by means of
    the latter. More precisely, a logical system consists of (a) a set of symbols
    (e.g., NOT, AND, punctuation symbols, variable names); (b) a set of grammatical
    rules for forming “sentences” of the system; (c) a set of given sentences (the
    axioms); and (d) a set of rules for inferring


    “new” sentences from “old” ones (the rules of inference).


    **Examples*: Propositional logic and predicate logic are both logical systems,
    in which the legal sentences are propositions and predicates, respectively.


    ****logical variable** ( *Programming languages*) A variable of type BOOLEAN.
    The term is best avoided because of possible confusion with the term *logic variable,*
    q.v.


    ****lossless decomposition** Nonloss decomposition, q.v.


    ****lossy decomposition** A decomposition that isn’t nonloss.


    **Example*: The decomposition of relvar S into its projections on


    {S#,SNAME} and {SNAME,STATUS,CITY} is lossy because it isn’t guaranteed that,
    at all times, S is equal to the join of those projections.


    **106**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00163.png)


    **M**


    **managed redundancy** Controlled redundancy, q.v.


    ****mandatory participation** *See* cardinality constraint.


    ****many-to-many correspondence** Strictly, a rule pairing two sets *s1* and *s2*


    ( *s1* and *s2* not necessarily distinct) such that each element of *s1*


    corresponds to at least one element of *s2* and each element of *s2*


    corresponds to at least one element of *s1*; equivalently, that pairing itself.'
  trans: '

    # 《关系数据库词典（扩展版）》


    ## 闭合定律

    集合 `s` 在运算 "+" 和 "`*`" 下是闭合的；也就是说，对于 `s` 中的所有 `x` 和 `y`，表达式 `x + y` 和 `x * y`
    的结果都是 `s` 中的一个元素。


    ## 交换律

    对于 `s` 中的所有 `x` 和 `y`，`x + y = y + x` 且 `x * y = y * x`。


    ## 结合律

    对于 `s` 中的所有 `x`, `y` 和 `z`，`x + (y + z) = (x + y) + z` 且 `x * (y * z) = (x * y)
    * z`。


    ## 单位元定律

    在集合 `s` 中存在元素 0 和 1，使得对于 `s` 中的所有 `x`，`x + 0 = x` 且 `x * 1 = x`。元素 0 和 1 分别被称为加法单位元和乘法单位元。


    ## 逆元定律

    对于 `s` 中的所有 `x`，存在元素 `-x` 以及（除非 `x = 0`）`1 / x` 在 `s` 中，使得 `x + (-x) = 0` 且 `x
    * (1 / x) = 1`。元素 `-x` 和 `1 / x` 分别被称为 `x` 的加法逆元和乘法逆元（在每种情况下）。表达式 `x + (-y)` 和
    `x * (1 / y)` 通常缩写为 `x - y` 和 `x / y`。


    ## 分配律

    （“`*`” 对于 “`+`” 的分配律）：对于 `s` 中的所有 `x`, `y` 和 `z`，`x * (y + z) = (x * y) + (x *
    z)`。


    请注意，并非所有代数都遵循上述所有定律。例如，在集合代数中，“`+`” 和 “`*`” 运算符分别表示并集和交集，但逆元定律不适用于这些运算。


    ## 103


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00042.png)


    ## 左不可约的 FD

    给定一个 FD 集合 `s`，当且仅当无法在不改变 `s` 的闭包的前提下从 `f` 的决定因素中移除任何属性时，`s` 中的 FD `f`（相对于 `s`）是左不可约的。


    ## 示例

    令 `s` 为关系变量 `SP` 所满足的所有 FD 的集合。那么 FD `{S#,P#} → {QTY}` 和 `{S#,P#,QTY} → {QTY}`
    都出现在 `s` 中。在这两个 FD 中，第一个是左不可约的，但第二个不是。


    ## 左结合性

    令 `Op` 为一个二元运算符，并假设 `Op` 以中缀风格表示。那么当且仅当对于所有 `x`, `y` 和 `z`，`x Op y Op z = (x Op
    y) Op z` 时，`Op` 是左结合的；类似地，当且仅当对于所有 `x`, `y` 和 `z`，`x Op y Op z = x Op (y Op z)`
    时，它是右结合的。


    *注意*：在数学和逻辑中，左结合性和右结合性都归结为通常理解的结合性（参见 `associative laws`）。然而，在计算中情况不一定如此。例如，考虑如果
    `x`, `y` 和 `z` 是数字且 `Op` 是 “`+`” 时会发生什么。在这种情况下，表达式 `(x + y) + z` 和 `x + (y + z)`
    很可能产生不同的结果；甚至可能一个导致溢出而另一个不会。


    ## 小于连接

    theta 值为 “`<`” 的 theta 连接。


    ## 词法的

    指语言的个体单词和其他基本符号（标点符号等）。*对比* `semantic`；`syntactic`。


    ## 字面量

    1.  （*编程语言*）宽松地说，一个自定义符号；一个表示可以在编译时确定的值的符号。

    更精确地说，`literal` 是一个表示固定且由该符号确定的值的符号（因此该值的类型也由该符号固定和确定）。每个类型的每个值，包括元组和关系类型，都必须能够通过某个字面量来表示。请注意，`literal`
    是选择器调用（参见 `selector`）的一个特例。还要注意，`literal` 本身与其表示的值之间存在逻辑差异（参见 `constant`）。

    2.  （*逻辑*）一个简单命题或其否定；一个简单谓词或其否定（参见 `simple predicate`；`simple proposition`）。


    ## 104


    **《关系数据库词典（扩展版）》**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00156.png)


    ## 示例（仅针对第一个定义）

    `4`（`INTEGER` 类型的字面量）；`''ABC''`（`CHAR` 类型的字面量）；`FALSE`（`BOOLEAN` 类型的字面量）；`S#(''S1'')`（`S#`
    类型的字面量）；`TUPLE {S# S#(''S1''), P# P#(''P1''), QTY QTY(300)}`（`TUPLE {S# S#, P#
    P#, QTY QTY}` 类型的字面量）；`RELATION {TUPLE {S# S#(''S1''), P# P#(''P1''), QTY QTY(300)}}`（`RELATION
    {S# S#, P# P#, QTY QTY}` 类型的字面量）；等等。


    ## 逻辑学

    对有效推理中使用的方法和原理的科学或科学研究。


    ## 逻辑变量

    在谓词演算表达式中既可以作为约束变量出现也可以作为自由变量出现的变量（参见 `bound variable`；`free variable`）；不要与 `logical
    variable`（参见 `logical variable`）混淆。另请参见 `range variable`。


    **逻辑数据独立性** 参见 `data independence`。


    ## 逻辑数据库设计

    决定给定要在某个数据库中表示的数据主体时，该数据库应包含哪些关系变量、它们应具有哪些属性以及它们应受到哪些约束的过程（或该过程的结果）。理想情况下，目标是生成一个独立于所有与物理实现或特定应用相关的考虑因素的设计——后者是可取的，因为通常并非数据库的所有已知用途在设计时都已知。


    总体而言，设计过程可以总结为：(a) 尽可能仔细地（尽管必然有些非正式地）确定关系变量谓词（以及其他可能的“业务规则”），然后 (b) 将这些谓词和规则映射到特定的关系变量和形式化约束。


    **逻辑等价** 参见 `equivalence`。


    ## 逻辑表达式

    表示真值的表达式。


    ## 逻辑蕴含

    蕴含，参见 `implication`。


    ## 105


    **《关系数据库词典（扩展版）》**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00159.png)


    ## 逻辑运算符

    一种运算符，它 (a) 接受类型为 `BOOLEAN` 的值或变量（或两者）作为操作数，并且 (b) 返回一个类型为 `BOOLEAN` 的值，或更新至少一个类型为
    `BOOLEAN` 的变量。连接词是其特例。


    ## 逻辑系统

    粗略地说，一个由公理和推理规则组成的系统，以及一组可以通过后者从前者推导出的定理。更精确地说，一个逻辑系统包括 (a) 一组符号（例如，`NOT`, `AND`,
    标点符号, 变量名）; (b) 一组用于形成系统“句子”的语法规则；(c) 一组给定的句子（公理）；以及 (d) 一组用于从“旧”句子推断“新”句子的规则（推理规则）。


    ## 示例

    命题逻辑和谓词逻辑都是逻辑系统，其中的合法句子分别是命题和谓词。


    ## 逻辑变量

    （*编程语言*）一个类型为 `BOOLEAN` 的变量。最好避免使用该术语，因为可能与 `logic variable` 一词混淆。


    ## 无损分解

    非损失分解，参见 `nonloss decomposition`。


    ## 有损分解

    一种非无损的分解。


    ## 示例

    将关系变量 `S` 分解为其在 `{S#,SNAME}` 和 `{SNAME,STATUS,CITY}` 上的投影是有损的，因为不能保证在所有时间 `S`
    等于这些投影的连接。


    ## 106


    **《关系数据库词典（扩展版）》**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00163.png)


    ## M


    **受控冗余** 受控冗余，参见 `controlled redundancy`。


    ## 强制参与

    参见 `cardinality constraint`。


    ## 多对多对应关系

    严格来说，一种将两个集合 `s1` 和 `s2`（`s1` 和 `s2` 不一定不同）配对的规则，使得 `s1` 的每个元素对应于 `s2` 的至少一个元素，并且
    `s2` 的每个元素对应于 `s1` 的至少一个元素；等价地，指该配对本身。

