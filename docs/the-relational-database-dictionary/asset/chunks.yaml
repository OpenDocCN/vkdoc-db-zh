    ## 前束范式

    当且仅当所有量词都出现在开头时，一个谓词才处于前束范式（`PNF`）；更精确地说，当且仅当（a）它无量词或（b）它的形式是 `EXISTS x ( p)`
    或 `FORALL x ( p)`，且其中的 `p` 本身也处于 `PNF` 时，它才处于 `PNF`。因此，一个 `PNF` 谓词的形式是

    `Q1 x1 ( Q2 x2 ( ... ( Qn xn ( p ) ) ) )`，其中 (a) `n >= 0`，(b) 每个 `Qi`（`i` = 1,2,
    . . . , `n`）是 `EXISTS` 或 `FORALL`，以及 (c) 谓词 `p`——有时称为主式——是无量词的。


    `示例`：考虑以下元组演算查询（“获取至少供应一个红色零件的供应商”）：

    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    PX RANGES OVER { P } ;

    SX WHERE

    EXISTS PX ( PX.COLOR = ''Red'' AND

    EXISTS SPX ( SPX.S# = SX.S# AND

    SPX.P# = PX.P# ) )

    ```

    这里的 `WHERE` 子句中的谓词并不处于前束范式。


    然而，下面是该查询的一个语义等价表述，其中谓词处于前束范式：

    ```

    SX WHERE

    EXISTS PX ( EXISTS SPX ( PX.COLOR = ''Red'' AND

    SPX.S# = SX.S# AND

    SPX.P# = PX.P# ) )

    ```

    前束范式在逻辑上并不比其他形式更正确，但稍加练习，它往往会成为最容易书写的形式。


