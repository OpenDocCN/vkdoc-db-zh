    We obviously don’t want this constraint to be violated by a part that isn’t red.
    It follows, therefore, that we want the expression overall—which is a logical
    implication, of course—to evaluate to TRUE if the antecedent evaluates to FALSE.


    ### implied by FDs

    Given a set `s` of FDs, a given FD is implied by `s` if and only if it’s a logical
    consequence of the FDs in `s` according to Armstrong’s inference rules, q.v.


    ### implied by superkey(s)

    *See* FD implied by a superkey; JD implied by superkeys; MVD implied by a superkey.


    ### IMPLIES

    *See* implication.


