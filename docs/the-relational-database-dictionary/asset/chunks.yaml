  trans: "\n# 关系数据库词典（扩展版）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ![](img/00165.png)\n\n那些已经可以用经典关系代数表达的东西。\n\n更详细的说明超出了本词典的范围。\n\n## `定理`\n根据给定的推理规则从给定公理推导出的命题（因此，如果公理为真且推理规则有效，则该命题也为真）。在数据库上下文中，派生关系中的元组可以被看作定理，因为它们代表了从基关系中元组所代表的命题推导出来的命题。定理包含公理（参见该词条）作为一个退化的特例。*参见*\
    \ 证明。\n\n**示例**：给定图 1 的示例值，由表达式 `(S JOIN P){S#,P#}` 表示的关系包含元组 `<S1,P1>`。该元组可被视为一个定理；它代表（真实的）命题“供应商\
    \ S1 和零件 P1 位于同一城市”，这一事实可以从基关系中的元组所表示的公理推断出来。\n\n## `θ连接`\n一种关系运算，等价于形如 `( r1\
    \ TIMES r2) WHERE A1 theta A2` 的表达式，其中 (a) `A1` 和 `A2` 分别是 `r1` 和 `r2` 的属性（具有相同类型\
    \ `T`），且 (b) `theta` 是任何对类型 `T` 的值有意义的比较运算符（例如，“=”、“>”）。\n\n**示例**：以下表达式表示供应商和零件（按此顺序）在城市上的大于连接（即此处\
    \ theta 为 “>”）：`(( S RENAME ( CITY AS SC ) ) TIMES ( P RENAME ( CITY AS PC ) ))\
    \ WHERE SC > PC`\n\n这里我们假设 `CHAR` —— 属性 `CITY` 的类型 —— 是一个序数类型（对 `CHAR` 值的 “>”\
    \ 可能意味着“按字母顺序更大”）。注意，我们可以在上述表达式中用 `JOIN` 替换 `TIMES` 而不改变其含义。同样，用 “<” 替换 “>” 将产生一个小于连接；用\
    \ “=” 替换则将产生一个等值连接。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00034.png)\n\
    \n# 第三宣言\n一个关于数据和数据库管理系统未来的正式提案；像 Codd 的原始论文一样，它可以被看作是 DBMS 设计及与之交互的语言接口的抽象蓝图。*参见*\
    \ 本词典的引言。\n\n## `第三范式`\n关系变量 `R` 处于第三范式，简称 3NF，当且仅当，对于 `R` 所满足的每一个非平凡函数依赖 `A →\
    \ B`，`A` 是一个超键或者 `B` 是一个子键。每一个 3NF 的关系变量也处于 2NF。*注意*：文献中许多“3NF”的定义实际上是 BCNF 的定义；*读者须知*。\n\
    \n此外，尽管处于 3NF 显然并不排除同时处于下一个更高的范式（BCNF），但术语 `3NF` 常被宽泛地用来指代处于 3NF 但不处于 BCNF 的关系变量。无论如何，第三范式本身已不再那么重要（BCNF、5NF\
    \ 和 6NF 是具有最大实际意义的范式）；我们在此提及它主要是出于历史原因。\n\n**示例**：如“Boyce/Codd 范式”词条下所指出的，对于范式而言，展示一个反例通常比展示一个实例本身更具启发性。因此，假设关系变量\
    \ `S` 满足额外的函数依赖 `{CITY} → {STATUS}`；也就是说，给定供应商的状态是其所在位置的函数。由于 `{CITY}` 不是一个超键且\
    \ `{STATUS}` 不是一个子键，这个版本的关系变量 `S` 不处于 3NF（尽管它处于 2NF）。\n\n## `三值逻辑`\n一种逻辑，除了通常的\
    \ `TRUE` 和 `FALSE` 外，还有一个“第三真值”，通常称为 `UNKNOWN`；缩写为 3VL。SQL 大致基于这种逻辑（相比之下，关系模型基于二值逻辑，参见该词条）。特别是，SQL\
    \ 对空值（参见该词条）的支持是基于三值逻辑的，尽管事实上该支持在逻辑上存在缺陷；例如，SQL 将 `UNKNOWN` 和 null 视为等同，即使两者之间存在逻辑差异\
    \ —— `UNKNOWN` 是一个值，而 null 根本不是一个值，而是一个“标记”。（这只是 SQL 的 3VL 支持中众多逻辑错误之一。）*注意*：在\
    \ 2VL 中的重言式在 3VL 中不一定是重言式；同样，在 2VL 中的矛盾式在 3VL 中也不一定是矛盾式。因此，在 2VL 中成立的定理在 3VL 中不一定成立，在\
    \ 2VL 中有效的表达式转换在 3VL 中也不一定有效。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00215.png)\n\n## `时变关系`\nCodd 用于指代关系变量的原始术语；该术语已被弃用，因为关系是值，因此不会随时间变化。\n\
    \n## `笛卡尔积`\n*参见* 笛卡尔积。\n\n## `全数据库约束`\n*参见* 数据库约束。\n\n## `全函数`\n一种偏函数，其中域中的每个元素\
    \ `x` 在陪域中都有一个像 `y`；换句话说，就是一个函数。\n\n## `全序`\n偏序（参见该词条）的一种特例。令 `s` 为一个集合。那么 `s`\
    \ 上的一个全序通常记为 “<”，具有以下性质：对于 `s` 中所有不同的元素对 `x` 和 `y`，要么 `x < y`，要么 `y < x`（但不能两者同时成立）。*注意*：鉴于\
    \ “=” 运算符和 `NOT` 连接词总是可用的，因此在这样的集合 `s` 中，所有常用的比较运算符 —— “=”、“≠”、“<”、“≤”、“>” 和 “≥”\
    \ —— 对于所有值对都是可用的。\n\n**示例**：参见“序数类型”词条下的示例。\n\n## `全关系变量约束`\n*参见* 关系变量约束。\n\n\
    ## `事务`\n一个恢复和并发的单元；粗略地说，是一个工作单元。事务是“全有或全无”的，意思是它们要么全部执行，要么没有任何效果。*注意*：事务通常也被说成是完整性单元。然而，由于关系模型要求所有完整性检查都必须是立即的，因此就关系模型而言，完整性单元是语句，而不是事务。*参见*\
    \ 原子语句；立即检查。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00129.png)\n\
    \n## `变迁约束`\n一种数据库约束，用于限制给定数据库可以从一个状态有效变迁到另一个状态的方式。*对比* 状态约束。\n\n**示例**（“任何供应商的状态都绝不允许降低”）：\n\
    ```sql\nCONSTRAINT TRC1 IS_EMPTY (\n    ( ( S' { S#, STATUS } RENAME ( STATUS\
    \ AS STATUS' ) )\n      JOIN\n      ( S { S#, STATUS } ) )\n    WHERE STATUS'\
    \ > STATUS ) ;\n```\n此公式依赖于一个约定，即带撇的关系变量名（如 `S'`）指的是在考虑当前更新之前该关系变量的状态。\n\n## `传递闭包`\n\
    令 `r` 为一个具有属性 `A` 和 `B` 的二元关系，两者类型均为 `T`。那么 `r` 的传递闭包，记作 `TCLOSE ( r )`，是一个关系\
    \ `r+`，定义如下：元组 `< a, b>` 出现在 `r+` 中，当且仅当它出现在 `r` 中，或者存在一个类型为 `T` 的值 `c`，使得元组 `<\
    \ a, c>` 出现在 `r` 中且元组 `< c, b>` 出现在 `r+` 中。（注意这是一个递归定义；还要注意 `r+` 确实是一个传递关系，正如“传递闭包”这个名字所暗示的。*参见*\
    \ 传递性，第二个定义。）如下面的伪代码算法所示，计算 `TCLOSE ( r )` 在概念上涉及迭代地构造某个中间结果（在前一次迭代中计算）与一个新的部分结果（在当前迭代中计算）的并集，直到该并集不再增长\
    \ —— 换句话说，直到它达到一个不动点或“定点”。\n\n```\nr+ := r ;\ndo until r+ ceases to grow ;\n \
    \   r+ := WITH ( r+ RENAME ( B AS C ) ) AS t1 ,\n               ( r RENAME ( A\
    \ AS C ) ) AS t2 :\n          r+ UNION ( ( t1 JOIN t2 ) { A, B } ) ;\nend do ;\n\
    ```\n\n*另见* 递归查询。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00065.png)\n"
- fmt: '## transitive FD

    The FDs `A` → `B` and `B` → `C` together imply the transitive FD `A` → `C`. (Thus,
    if relvar `R` satisfy the FDs `A` → `B` and `B` → `C,` it also satisfies the transitive
    FD `A` → `C`.)


    ## transitivity

    1. ( *Of a dyadic logical operator*) The dyadic logical operator `Op,` which we
    assume for definiteness is expressed in infix style, is transitive if and only
    if, for all `x, y,` and `z,` if `x` `Op` `y` and `y` `Op` `z` are both true, then
    so is `x` `Op` `z`.

    2. ( *Of a binary relation*) The binary relation `r` is transitive if and only
    if, for all `x, y,` and `z,` if the tuples < `x,y*> and < `y,z*> both appear in
    `r,` then so does the tuple < `x,z*>.

    3. ( *Of FDs*) *See* Armstrong’s inference rules.


    **Examples** ( *first definition only*): The logical operator IMPLIES; the “less
    than” operator “<”.


    ## TransRelationalTM Model

    A proprietary DBMS implementation technology, not based on conventional direct
    image techniques.


    ## TRC

    Tuple relational calculus.


    ## trigger

    *See* triggered procedure.


    ## triggered procedure

    Strictly, an action (the “triggered action”) to be performed if a specified event
    (the “triggering event”) occurs, though the term is often used loosely to include
    the triggering event as well.


    A triggered procedure can be thought of as a stored procedure (q.v.), except that
    stored procedures must be explicitly invoked, whereas a triggered procedure is
    invoked automatically whenever the triggering event occurs.


    Apart from this difference, however, triggered procedures have many of the same
    properties, and are used for many of the same purposes, as stored procedures.
    No triggered procedures are prescribed by the relational model, but they aren’t
    necessarily proscribed either—though they would be if they could lead to a violation
    of The Assignment Principle *,* q.v., which they very well might in practice.
    Foreign key rules provide a pragmatically important example (in which, as it happens,
    the “procedure” is specified declaratively). *Note*: The combination of a triggering
    event and the corresponding triggered action is often known simply as a trigger.


    **The Relational Database Dictionary, Extended Edition**


    **187**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00033.png)


    ## trivial decomposition

    A nonloss decomposition, q.v., that’s performed on the basis of some trivial dependency
    (i.e., a trivial FD, JD, or MVD, q.v.).


    *Examples*: 1. The suppliers relvar `S` can be trivially decomposed into its projections
    on `{S#,SNAME}` and `{S#,SNAME,STATUS,CITY}`.

    2. Any relvar can be trivially decomposed into just its identity projection.


    ## trivial FD

    An FD that can’t possibly be violated. The FD `A` → `B` is trivial if and only
    if `A` is a superset of `B`.


    ## trivial JD

    A JD that can’t possibly be violated. The JD `5{A1,A2,. . .,An}` is trivial if
    and only if at least one of `A1, A2, . . ., An` is the entire heading of the pertinent
    relvar `R`.


    ## trivial MVD

    An MVD that can’t possibly be violated. The MVD `A` →→ `B` is trivial if and only
    if either `A` is a superset of `B` or the set theory union of `A` and `B` is the
    heading of the pertinent relvar `R` (or both).


    ## TRUE

    *See* BOOLEAN.


    ## truth functional completeness

    A logical system is truth functionally complete if and only if all possible connectives
    can be expressed in terms of the given ones. Truth functional completeness is
    an extremely important property; a logical system that didn’t satisfy it would
    be like a system of arithmetic that had no support for certain operations, say
    the operation of addition.


    ## truth functional equivalence

    Logical equivalence, q.v.


    ## truth functional implication

    Logical implication, q.v.


    ## truth table

    Let `X` be a propositional expression. Then the semantics of `X` can be defined
    by means of a truth table that shows, for each possible combination of truth values
    for the propositional variables in `X,` the truth value of the overall expression.


    *Example*: Let `X` be the expression (`p` AND `q`) OR `r,` where `p, q,` and `r`
    are propositional variables. Then, using T and F to represent TRUE and FALSE,
    respectively, the semantics of `X` are as defined by the following self-explanatory
    truth table:


    ## truth value

    In two-valued logic, either TRUE or FALSE; in other words, a Boolean value. *Note*:
    Many-valued logics, q.v., support additional “truth values” over and above the
    conventional TRUE and FALSE.


    ## truth value of

    In logic, an operator (in symbols, “/. . ./”) that, given a logical expression,
    returns the truth value of that expression. For example, let the symbols `x` and
    `y` denote integers. Then the expression `/x > y/` returns TRUE if the integer
    denoted by `x` is greater than that denoted by `y` and FALSE otherwise. Note that
    `/TRUE/` and `/FALSE/` return TRUE and FALSE, respectively. Note too that the
    logical expression `p` EQUIV `q` means the same as `/p/ = /q/`; for example, the
    expression `(Neptune is a planet)` EQUIV `(Mars has exactly two moons)` means
    the same as the expression `/(Neptune is a planet)/ = /(Mars has exactly two moons)/`.


    Note further that (at least in the computing literature) authors often write `p
    = q` when what they really mean is `/p/ = /q/`; *caveat lector*.


    ## truth valued expression

    A logical expression, q.v.


    ## truth valued operator

    A read-only logical operator, q.v. (especially one of the connectives, q.v.).


    **The Relational Database Dictionary, Extended Edition**


    **189**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00216.png)


    ## tuple

    A tuple value, q.v.


    ## tuple (mathematics)

    Given sets `s1, s2, . . ., sn,` not necessarily distinct, `t` is an *n*-tuple
    (tuple for short) on those sets if and only if it’s an ordered collection of elements,
    the first of which is from `s1,` the second from `s2,` and so on. Set `si` is
    the *i* th domain of `t` (`i` = 1, . . ., `n`). *Note*: There are several important
    logical differences between tuples in mathematics and their relational model counterparts.
    *See* relation (mathematics); tuple value.


    ## tuple assignment

    An operation that assigns a tuple value to a tuple variable (of the same type).
    *See* assignment.


    ## tuple calculus

    A form of relational calculus, semantically equivalent to domain calculus, q.v.,
    in which the range variables range over relations and thus denote tuples from
    those relations.


    *Example*: Here’s a tuple calculus formulation of the query “Get supplier names
    for suppliers who supply at least one part” ( *see* domain calculus for a domain
    calculus analog):

    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    SX.SNAME WHERE EXISTS SPX ( SPX.S# = SX.S# )

    ```

    In stilted English: “Get names of suppliers `SX` where there exists a shipment
    `SPX` with the same supplier number as `SX`.”


    ## tuple comparison

    A Boolean expression of the form (`exp1`) `theta` (`exp2`), where `exp1` and `exp2`
    are tuple expressions of the same type and `theta` is either “=” or “≠” (observe
    that the operators “<” and “>” are explicitly not defined for tuples). *Note*:
    The parentheses enclosing `exp1` and `exp2` in the comparison might not be needed
    in practice.


    ## tuple component

    An <attribute, attribute value> pair appearing in the tuple in question. Note
    that attributes in turn are defined to be <attribute name, type name> pairs. However,
    other formalisms are possible; for example, it would be possible to define a tuple
    component as an <attribute name, type name, attribute value> triple instead of
    an <attribute, attribute value> pair. (As a matter of fact, *The Third Manifesto*
    does exactly this.) Of course, it’s easy to see that these two formalisms are
    isomorphic.


    **190**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00040.png)'
