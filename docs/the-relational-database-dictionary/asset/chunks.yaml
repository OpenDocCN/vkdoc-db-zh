  trans: '# 偏函数


    设 `f` 是一个定义域为 `d` 的函数，且 `dd` 是 `d` 的一个超集；那么 `f` 可以被视为一个定义域为 `dd` 的偏函数。换句话说，偏函数就是函数（参见该词条），只不过可能存在定义域中的元素
    `x` 在陪域中没有对应的像 `y`。*对比***全函数**。


    ## 示例


    设 `s` 为实数集。那么，“取倒数”是一个定义域和陪域都是 `s` 的偏函数（它是偏函数，因为 `s` 中有一个元素，即 `0`，没有倒数）。


    # 偏实例化


    *参见***实例化**。


    # 偏序


    设 `s` 是一个集合。那么，`s` 上的一个偏序是一个二元真值运算符，通常记为 "≤"，使得对于 `s` 中的所有 `x`、`y` 和 `z`：

    - `x ≤ y` 或 `y ≤ x`（或两者，或可能两者都不）；

    - `x ≤ x`（自反性）；

    - 若 `x ≤ y` 且 `y ≤ z`，则 `x ≤ z`（传递性）；

    - 若 `x ≤ y` 且 `y ≤ x`，则 `x = y`（反对称性）。


    *对比***全序**。


    ## 示例


    设 `s` 是一个任意集合，`p` 是 `s` 的幂集，并用 "≤" 表示集合包含运算符（更常写作 "⊆"）。那么 "≤" 就是 `p` 上的一个偏序。（而且，这是一个非全序的偏序，除非在
    `s` 的基数（元素个数）为零或一这种退化情况下。）


    # 划分


    设 `s` 是一个集合。那么，`s` 的一个划分是 `s` 的若干子集（称为“划分块”）构成的集合，使得 `s` 的每个元素恰好是其中一个子集的元素。注意：

    - 各划分块两两不相交；

    - 它们的并集等于 `s`。


    *另见***等价类**。


    # 皮尔士符号


    *参见***或非**。


    # 持久性


    指数据一旦插入数据库，就会一直保留（“持久存在”）直到被显式删除的属性。基本关系变量尤其具有这种意义上的持久性。


    # 物理数据独立性


    *参见***数据独立性**。


    # 物理数据库设计


    给定某个逻辑数据库设计，决定该逻辑设计应如何映射到目标 DBMS 所支持的任何物理结构的过程（或该过程的结果）。因此，请注意，物理设计应当源自逻辑设计，而不是反过来；实际上，理想情况下它应该是自动推导出来的。


    # 图像


    *（对于关系、属性或元组）* 分别*参见***表**、**列**和**行**；*另见***单元格**。注意在所有情况下，图像与其所描绘的事物之间存在逻辑上的区别。


    # 管道化


    一种实现技术，其中中间结果关系的元组被逐个生成并传递给另一个操作，而不是成批传递。*对比***物化**（第一个定义）。


    # PJ/NF


    投影-连接范式，参见该词条。


    # 占位符


    一个自由变量或参数。


    # PNF


    前束范式。


    # 指针


    一种实现结构。众所周知，指针被排除在关系模型之外。事实上，将指针和关系混合使用——即允许一个“关系”拥有一个“属性”，其值是指向另一个“关系”中“元组”的指针（这种情况被一些
    SQL 产品以及 SQL 标准所支持，尽管它违反了信息原理等原则）——被称为第二大错误。（关于第一个错误，*参见***类型**。）*另见***引用**。


    *注意*：一些作者专门用术语 *指针* 来指值是某种物理地址的指针，而用术语 *引用*（或类似术语）来指其他类型的指针。这种区分在某些语境中可能有用，但与关系模型无关。还要注意，外键尤其不是指针；除其他原因外，外键值标识的是元组（它们是值），而指针值是地址，因此根据定义，它们标识的是变量（这就是为什么它们违反信息原理）。*参见***值**；**变量**。


    # 多态运算符


    *参见***多态**。


    # 多态


    粗略地说，指一个运算符在不同调用时允许其参数类型不同的概念。*参见***泛型多态**；**包含多态**；**重载**。


    # 正


    严格大于零。*对比***非负**。


    # 幂集


    给定集合的所有子集构成的集合。如果给定集合的基数（元素个数）为 `n`，则幂集的基数为 `2ⁿ`（这个计数包括空集和与原始集合完全相同的集合，这两者确实都是原始集合的子集）。


    # 谓词


    一个真值函数。给定一个任意谓词，用实参替换该谓词的参数就产生一个命题（因此，另一种理解谓词的方式是，将其视为一个参数化或一般化的命题）。


    *注意*：当且仅当该参数集合为空时，谓词退化为命题（即它本身已经是一个命题）。换句话说，所有命题都是谓词，但大多数谓词不是命题。


    # 谓词演算


    一个关于谓词、连接词以及可以使用这些谓词和连接词进行推理的形式系统，它具有可靠性和完备性。


    *注意*：谓词演算与命题演算（参见该词条）的主要区别在于，谓词与命题不同，允许包含量词和逻辑变量（包括自由的和约束的），这使得谓词演算功能更强，适用范围更广。


    # 谓词常元


    与**谓词**相同。


    # 谓词表达式


    表示一个谓词的表达式；即涉及谓词常元、谓词变元、连接词和括号的表达式。


    *注意*：很少有逻辑学教材使用这个术语；事实上，逻辑学教材通常似乎根本没有一个专门的术语来指代这个结构，除了*谓词*本身（即使是那些使用*命题形式*来指代命题表达式的教材，也未必会使用显而易见的*谓词形式*来指代谓词表达式）。


    ## 示例


    如果 `p` 和 `q` 是谓词变元，那么 `p`、`q`、合取 `(p) AND (q)`、析取 `(p) OR (q)` 以及否定 `NOT(p)` 都是谓词表达式。


    # 谓词形式


    与**谓词表达式**相同。


    # 谓词逻辑


    与**谓词演算**相同。


    # 谓词变元


    其值为一个谓词的变量。（一些作者用该术语来指自由变量，但这种用法是不推荐的。）


    # 前提


    在逻辑中，为证明或尝试证明而假定为真的陈述。'
- fmt: '## prenex normal form

    A predicate is in prenex normal form (`PNF`) if and only if all of the quantifiers
    appear at the beginning; more precisely, it’s in `PNF` if and only if (a) it’s
    quantifier free or (b) it’s of the form `EXISTS x ( p)` or `FORALL x ( p)`, where
    `p` is in `PNF` in turn. Thus, a `PNF` predicate takes the form

    `Q1 x1 ( Q2 x2 ( ... ( Qn xn ( p ) ) ) )` where (a) `n >= 0`, (b) each `Qi` (
    `i` = 1,2, . . . , `n`) is either `EXISTS` or `FORALL`, and (c) the predicate
    `p`—which is sometimes called the matrix—is quantifier free.


    `Example`: Consider the following tuple calculus query (“Get suppliers who supply
    at least one red part”):

    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    PX RANGES OVER { P } ;

    SX WHERE

    EXISTS PX ( PX.COLOR = ''Red'' AND

    EXISTS SPX ( SPX.S# = SX.S# AND

    SPX.P# = PX.P# ) )

    ```

    The predicate in the `WHERE` clause here is not in prenex normal form.


    Here, however, is a semantically equivalent formulation of the query in which
    the predicate is in prenex normal form:

    ```

    SX WHERE

    EXISTS PX ( EXISTS SPX ( PX.COLOR = ''Red'' AND

    SPX.S# = SX.S# AND

    SPX.P# = PX.P# ) )

    ```

    Prenex normal form is no more logically correct than any other, but with a little
    practice it does tend to become the easiest to write.


