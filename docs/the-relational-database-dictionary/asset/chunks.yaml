    **left irreducible FD** Given a set *s* of FDs, the FD *f* in *s* is left irreducible
    (with respect to *s*) if and only if no attribute can be removed from the determinant
    of *f* without changing the closure of *s*.


    **Examples*: Let *s* be the set of all FDs satisfied by relvar SP. Then the FDs


    {S#,P#} → {QTY} and {S#,P#,QTY} → {QTY} both appear in *s*. Of these two FDs,
    the first is left irreducible but the second isn’t.


    ****left associativity** Let *Op* be a dyadic operator, and assume for definiteness
    that *Op* is expressed in infix style. Then *Op* is left associative if and only
    if, for all *x, y,* and *z,* *x* *Op* *y* *Op* *z* = ( *x* *Op* *y*) *Op* *z*;
    similarly, it’s right associative if and only if, for all *x, y,* and *z,* *x*
    *Op* *y* *Op* *z* = *x* *Op* ( *y* *Op* *z*).


    *Note*: In mathematics and logic, left and right associativity both reduce to
    associativity as normally understood (q.v.). However, such is not necessarily
    the case in computing. For example, consider what happens if *x, y,* and *z* are
    numbers and *Op* is “+”. In this case, the expressions ( *x*+ *y*)+ *z* and *x*+(
    *y*+ *z*) might well produce different results; it might even be that one causes
    an overflow and the other doesn’t.


    ****less-than join** A theta join in which theta is “<”.


    ****lexical** Pertaining to individual words and other basic symbols (punctuation,
    etc.) of a language. *Contrast* semantic; syntactic.


    ****literal** 1\. ( *Programming languages*) Loosely, a self-defining symbol;
    a symbol that denotes a value that can be determined at compile time.


    More precisely, a literal is a symbol that denotes a value that’s fixed and determined
    by the symbol in question (and the type of that value is therefore also fixed
    and determined by the symbol in question). Every value of every type, tuple and
    relation types included, must be denotable by means of some literal. Note that
    a literal is a special case of a selector invocation ( *see* selector). Note too
    that there’s a logical difference between a literal as such and the value it denotes
    ( *see* constant). 2\. ( *Logic*) A simple proposition or its negation; a simple
    predicate or its negation ( *see* simple predicate; simple proposition).


