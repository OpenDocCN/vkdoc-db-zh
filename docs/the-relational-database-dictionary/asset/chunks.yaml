  trans: '

    ## 传递函数依赖

    函数依赖 `A` → `B` 和 `B` → `C` 共同蕴含了传递函数依赖 `A` → `C`。（因此，如果关系变量 `R` 满足函数依赖 `A` → `B`
    和 `B` → `C`，那么它也满足传递函数依赖 `A` → `C`。）


    ## 传递性

    1. （*对于二元逻辑运算符*）二元逻辑运算符 `Op`（为明确起见，我们假设其以中缀风格表示）是传递的，当且仅当，对于所有 `x`、`y` 和 `z`，如果
    `x` `Op` `y` 和 `y` `Op` `z` 均为真，则 `x` `Op` `z` 也为真。

    2. （*对于二元关系*）二元关系 `r` 是传递的，当且仅当，对于所有 `x`、`y` 和 `z`，如果元组 <`x`, `y`> 和 <`y`, `z`>
    都出现在 `r` 中，那么元组 <`x`, `z`> 也出现。

    3. （*对于函数依赖*）*参见* Armstrong 推理规则。


    **示例**（*仅针对第一个定义*）：逻辑运算符 IMPLIES（蕴含）；“小于”运算符“<”。


    ## TransRelationalTM 模型

    一种专有的 DBMS 实现技术，并非基于传统的直接影像技术。


    ## TRC

    元组关系演算。


    ## 触发器

    *参见* 触发过程。


    ## 触发过程

    严格来说，是一个动作（“触发动作”），在指定事件（“触发事件”）发生时执行，尽管该术语常被宽泛地使用，也包括触发事件本身。


    触发过程可以被视为一个存储过程（*参见*），不同之处在于存储过程必须显式调用，而触发过程在触发事件发生时自动调用。


    然而，除了这一区别，触发过程具有许多与存储过程相同的属性，并用于许多相同的目的。关系模型并未规定任何触发过程，但也并非必然禁止它们——尽管如果它们可能导致违反赋值原则（*参见*），则应被禁止，而它们在实践中非常可能导致违反。外键规则提供了一个具有重要实际意义的例子（其中，“过程”是以声明方式指定的）。*注*：触发事件与相应触发动作的组合通常简称为触发器。


    **关系数据库词典，扩展版**


    **187**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00033.png)


    ## 平凡分解

    一种无损分解（*参见*），基于某种平凡依赖（即平凡的函数依赖、连接依赖或多值依赖，*参见*）执行。


    *示例*：1. 供应商关系变量 `S` 可以平凡地分解为其在 `{S#,SNAME}` 和 `{S#,SNAME,STATUS,CITY}` 上的投影。

    2. 任何关系变量都可以平凡地分解为其恒等投影。


    ## 平凡函数依赖

    一种不可能被违反的函数依赖。函数依赖 `A` → `B` 是平凡的，当且仅当 `A` 是 `B` 的超集。


    ## 平凡连接依赖

    一种不可能被违反的连接依赖。连接依赖 `5{A1, A2, ..., An}` 是平凡的，当且仅当 `A1, A2, ..., An` 中至少有一个是相关关系变量
    `R` 的整个标题。


    ## 平凡多值依赖

    一种不可能被违反的多值依赖。多值依赖 `A` →→ `B` 是平凡的，当且仅当 `A` 是 `B` 的超集，或者 `A` 和 `B` 的集合并是相关关系变量
    `R` 的标题（或两者兼有）。


    ## 真值

    *参见* 布尔值。


    ## 真值函数完备性

    一个逻辑系统是真值函数完备的，当且仅当所有可能的联结词都可以用给定的联结词来表达。真值函数完备性是一个极其重要的属性；一个不满足此属性的逻辑系统，就像一个算术系统不支持某些运算（例如加法）一样。


    ## 真值函数等价

    逻辑等价，*参见*。


    ## 真值函数蕴含

    逻辑蕴含，*参见*。


    ## 真值表

    令 `X` 为一个命题表达式。那么 `X` 的语义可以通过一个真值表来定义，该表显示了对于 `X` 中命题变量的每个可能的真值组合，整个表达式的真值。


    *示例*：令 `X` 为表达式 (`p` 与 `q`) 或 `r`，其中 `p`、`q` 和 `r` 是命题变量。那么，使用 T 和 F 分别代表真 (TRUE)
    和假 (FALSE)，`X` 的语义由以下自解释的真值表定义：


    ## 真值

    在二值逻辑中，是真 (TRUE) 或假 (FALSE)；换句话说，是一个布尔值。*注*：多值逻辑（*参见*）支持在传统的真和假之外的额外“真值”。


    ## 真值

    在逻辑中，一个运算符（符号表示为“/.../”），给定一个逻辑表达式，返回该表达式的真值。例如，令符号 `x` 和 `y` 表示整数。那么表达式 `/x >
    y/` 在 `x` 所表示的整数大于 `y` 所表示的整数时返回真 (TRUE)，否则返回假 (FALSE)。注意 `/TRUE/` 和 `/FALSE/`
    分别返回真 (TRUE) 和假 (FALSE)。还要注意，逻辑表达式 `p` 等价于 `q` 与 `/p/ = /q/` 含义相同；例如，表达式 `(海王星是行星)`
    等价于 `(火星恰好有两个月球)` 与表达式 `/(海王星是行星)/ = /(火星恰好有两个月球)/` 含义相同。


    进一步注意，（至少在计算机文献中）作者常写 `p = q`，而他们真正的意思是 `/p/ = /q/`；*读者需留心*。


    ## 真值表达式

    一个逻辑表达式，*参见*。


    ## 真值运算符

    一个只读的逻辑运算符，*参见*（尤其是联结词，*参见*）。


    **关系数据库词典，扩展版**


    **189**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00216.png)


    ## 元组

    一个元组值，*参见*。


    ## 元组（数学）

    给定集合 `s1, s2, ..., sn`（不一定互不相同），`t` 是这些集合上的一个 *n* 元组（简称元组），当且仅当它是一个元素的有序集合，其中第一个元素来自
    `s1`，第二个来自 `s2`，依此类推。集合 `si` 是 `t` 的第 `i` 个域（`i` = 1, ..., `n`）。*注*：数学中的元组与其在关系模型中的对应物之间存在几个重要的逻辑差异。*参见*
    关系（数学）；元组值。


    ## 元组赋值

    将一个元组值赋给一个（相同类型的）元组变量的操作。*参见* 赋值。


    ## 元组演算

    一种关系演算形式，在语义上等价于域演算（*参见*），其中范围变量的范围是关系，因此表示来自这些关系的元组。


    *示例*：以下是一个元组演算形式化表达，用于查询“获取供应至少一个零件的供应商名称”（*参见* 域演算以了解其域演算类比）：

    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    SX.SNAME WHERE EXISTS SPX ( SPX.S# = SX.S# )

    ```

    用生硬的英语说：“获取供应商 `SX` 的名称，其中存在一个与 `SX` 具有相同供应商编号的发货记录 `SPX`。”


    ## 元组比较

    一种形如 (`exp1`) `theta` (`exp2`) 的布尔表达式，其中 `exp1` 和 `exp2` 是相同类型的元组表达式，`theta` 是“=”或“≠”（注意运算符“<”和“>”对于元组是明确定义为未定义的）。*注*：在实际操作中，比较式中包围
    `exp1` 和 `exp2` 的括号可能不需要。


    ## 元组分量

    出现在所讨论元组中的一个<属性名, 属性值>对。注意，属性本身被定义为<属性名, 类型名>对。然而，其他形式体系也是可能的；例如，可以将元组分量定义为<属性名,
    类型名, 属性值>三元组，而不是<属性, 属性值>对。（事实上，*《The Third Manifesto》* 正是这样做的。）当然，很容易看出这两种形式体系是同构的。


    **190**


    **关系数据库词典，扩展版**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00040.png)

