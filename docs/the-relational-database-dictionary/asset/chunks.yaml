    **UNWRAP** *See* unwrapping.


    ****unwrapping** Let *s* be a relation with an attribute *YT* of type TUPLE {
    *Y*}, and { *X*} be the set of all attributes of *s* except *YT*. Let { *Y*} have
    attributes *Y1, Y2, . . ., Yn*; also, let { *X*} not contain any attribute with
    the same name as any of *Y1, Y2, . . ., Yn*. Then the unwrapping *s* UNWRAP (
    *YT*) is another relation *r*. The heading of *r* consists of the set theory union
    of { *X*}


    and { *Y*}. The body of *r* contains one tuple for each tuple in *s,* and no other
    tuples. Let tuple *t* of *s* have *X* value *x* and *YT* value a tuple with *Y1*
    value *y1,* *Y2* value *y2,* . . ., and *Yn* value *yn*; then the corresponding
    tuple of *r* has *X* value *x,* *Y1* value *y1,* *Y2* value *y2,* . . ., and *Yn*
    value *yn*. *See also* tuple unwrapping.


    **Example*: Let *spw* be the relation resulting from the expression SP WRAP (
    { P#, QTY } AS PQ_REL )


    ( *see* wrapping). Then the following expression denotes an unwrapping of *spw*:


    **spw* UNWRAP ( PQ_REL )


    That unwrapping is a relation of type RELATION {S# S#, P# P#, QTY


    QTY}. If *spw* is obtained by wrapping the relation *sp* shown as the value of
    relvar SP in Figure 1, then the result of unwrapping *spw* is just *sp*.


    ****UPDATE** 1\. ( *Read-only operator*) *See* what if. 2\. ( *Update operator*)
    Very loosely, an operator that updates a given set of attributes in a given set
