    **Heath’s theorem** Let *A, B,* and *C* be subsets of the heading of relvar *R,*
    such that the set theory union of *A, B,* and *C* is equal to that heading.


    Let *AB* denote the set theory union of *A* and *B,* and similarly for *AC*. If
