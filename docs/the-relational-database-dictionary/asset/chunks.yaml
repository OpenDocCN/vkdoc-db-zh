  trans: '

    ### 关系表达式


    表示一个关系的表达式。关系字面量、关系选择器调用、`relcon` 与 `relvar` 引用以及关系代数运算符调用都是其特殊情形。


    ### 关系包含


    设关系 `r1` 和 `r2` 类型相同。那么 `r1` 包含 `r2`（“`r1` ⊇ `r2`”）当且仅当 `r1` 的主体是 `r2` 主体的超集，而
    `r2` 包含于 `r1`（“`r2` ⊆ `r1`”）当且仅当 `r2` 的主体是 `r1` 主体的子集。关系 `r1` 等于关系 `r2`（“`r1`
    = `r2`”）当且仅当两者互相包含。注意，每个关系都包含自身，并且每个关系都包含其适用类型的空关系。


    还需注意，术语“关系包含”通常（有点随意地）特指“⊆”运算符，而非“⊇”运算符。


    152


    ## 《关系数据库词典（扩展版）》


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00208.png)


    ### 关系模型


    关系数据库乃至整个关系技术所基于的正式理论或基础。


    关系模型常被笼统地描述为具有三个方面：一个与关系本身相关的结构方面；一个与候选键和外键相关的完整性方面；一个与连接等运算符相关的操纵方面。


    更精确地说，关系模型由以下组件构成：(a) 一个开放式的标量类型集合，特别包括 `BOOLEAN` 类型；(b) 一个关系类型生成器，以及对此生成器所生成类型的关系的既定解释；(c)
    用于定义此类生成关系类型的关系变量的设施；(d) 一个关系赋值运算符；(e) 一个开放式的通用只读运算符（即关系代数或关系演算）集合，用于从关系推导出关系。尤其要注意部分
    (e)；将关系模型仅仅视为结构而忽视其运算符是一种太过常见的错误，然而（正如 Codd 曾经所说）没有运算符的结构，就如同没有生理学的解剖学。此外，请注意这些运算符并不仅仅用于编写查询，正如许多人似乎认为的那样；相反，它们用于编写表达式，这些表达式服务于多种目的，包括但不限于查询。一个特别重要的目的是约束的制定（尽管在这种情况下，关系表达式只是某个布尔表达式的一个子表达式，通常尽管并非总是
    `IS_EMPTY`（参见该词条）的调用）。*注*：为了实现物理数据独立性，关系模型刻意对与性能相关的一切（尤其是物理存储表示）保持沉默。


    ### 关系运算符


    一种运算符，它 (a) 接受关系或关系变量（或两者）作为操作数，并且 (b) 要么返回一个关系，要么更新至少一个关系变量。


    ## 《关系数据库词典（扩展版）》


    153


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00074.png)


    ### 关联


    1. 在 Codd 早期论文中曾短暂使用的术语（后被弃用），意指我们现在根据上下文所称的关系或关系变量。2. 在 E/R 建模中，指“实体之间的联系”（定义取自
    Chen 最初的 E/R 论文）。3. 更一般地，给定两个集合（不一定不同），一个将第一个集合的元素与第二个集合的元素配对的规则；等价地，指该配对本身。


    这个定义可以轻松地扩展到三个、四个或任意数量的给定集合（例如，考虑第五范式下的例子中提到的涉及供应商、零件和项目的关联）。


    ### 相对补集


    *参见* 补集（集合论）。


    ### 关系常量


    关系常量的简称。


    ### 关系常量引用


    在语法上，指一个关系常量名称，用于表示该关系常量的值。


    ### 关系变量


    关系变量的简称。*注*：为简单起见，我们在本词典中假设所有关系变量都是某个数据库的一部分（“数据库关系变量”）。


    然而，没有充分理由不支持那些局限于某个应用程序的关系变量（“应用程序关系变量”）。


    ### 关系变量约束


    1. （ *“某个”关系变量约束*）形式上，指任何引用该关系变量（也可能引用其他关系变量）的约束；非正式地，指单一关系变量约束。*注*：这两个定义并非意在任何意义上等价——它们指代两个不同的概念。

    2. （ *“该”关系变量约束*）指 `TRUE` 以及除类型约束外适用于给定关系变量的所有约束的逻辑与（即所讨论关系变量的*总*关系变量约束）；换句话说，是所讨论关系变量的正式、系统理解的“含义”（*对比*
    关系变量谓词）。注意，根据此定义，每个关系变量都至少受一个约束：即退化的（“默认”）约束 `TRUE`。还需注意，所有关系变量约束，无论哪种含义，同时也是数据库约束。


    154


    ## 《关系数据库词典（扩展版）》


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00108.png)


    *示例*：首先，在关系变量 `S` 定义中指定的键约束是该关系变量上的一个关系变量约束。其次，从 `SP` 到 `S` 的外键约束是关系变量 `S` 和关系变量
    `SP` 两者的约束。第三，以下是一些可能适用于关系变量 `S` 的更多关系变量约束（摘自数据库约束下的示例）：


    ```

    CONSTRAINT C1 IS_EMPTY

    ( S WHERE STATUS < 1 OR STATUS > 100 ) ;


    /* 状态值必须在 1 到 100 之间（含） */


    CONSTRAINT C3 IS_EMPTY

    ( ( S JOIN SP )

    WHERE STATUS < 20 AND P# = P#(''P6'') ) ;


    /* 状态小于 20 的供应商不能供应零件 P6 */

    ```

    （约束 `C3` 也是关系变量 `SP` 的关系变量约束。）


    最后，为示例起见，假设上述约束（关系变量 `S` 上的键约束、从关系变量 `SP` 到关系变量 `S` 的外键约束以及上面的约束 `C1` 和 `C3`）是唯一适用于关系变量
    `S` 的约束。那么所有这些约束与 `TRUE` 的逻辑与就是该关系变量的“总”关系变量约束。


    ### 关系变量谓词


    设 `R` 为一个关系变量（真实的或虚拟的）。那么 `R` 的关系变量谓词就是代表用户所理解的 `R` 的含义的那个谓词。如果 `R` 的度是 *n*，则该谓词将是
    *n* 元的（它将为 `R` 的每个属性设有一个参数）。此外，在封闭世界假设下，在任何给定时间，`R` 的主体将包含且仅包含那些在该时间对谓词的调用求值为
    `TRUE` 的元组。*对比* 关系变量约束（第二个定义）；后者是一种形式构造，而关系变量谓词必然是有些非形式化的。*注*：关系变量谓词有时被称为业务规则——尽管一些作者认为后一术语除了关系变量谓词本身外，还包括各种其他构造，特别是各种完整性约束的非形式化对应部分。（相反，另一些人认为这些附加构造是关系变量谓词的一部分。对此类问题尚无共识。）


    *示例*：关系变量 `S` 的关系变量谓词是“供应商 `S#` 已签约，名为 `SNAME`，状态为 `STATUS`，且位于 `CITY`。”

