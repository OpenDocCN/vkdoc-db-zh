    physical representations might or might not be the same (for example, N1 might
    use a base two representation and N2 a base ten representation), but it’s of no
    concern to the user either way.


    N1 := 3 ;


    N2 := 3 ;


    **application relvar *See* relvar.


    **argument** An actual operand that replaces some parameter of some operator when
    that operator is invoked. Note that there’s a logical difference between an argument
    per se and the expression that denotes it (i.e., the argument expression). The
    argument per se is either a value or a variable. If the pertinent parameter is
    subject to update, then the argument is—in fact, must be—a variable, denoted by
    some variable reference; otherwise it’s a value and can be denoted by an arbitrarily
    complex expression (possibly just a variable reference). *Contrast* parameter.


    **Examples*: Let operator DOUBLE be defined as follows: OPERATOR DOUBLE ( X INTEGER
    ) RETURNS INTEGER ;


    RETURN ( 2 * X ) ;


    END OPERATOR ;


    X here is a parameter, of declared type INTEGER. Let N be a variable of type INTEGER.
    Then, e.g., DOUBLE(N+1) is an invocation of DOUBLE, and the value of the expression
    N+1 at the time of that invocation is an argument—in fact, the sole argument—to
    that invocation. That invocation is itself an expression in turn, and it can appear
    wherever an integer literal can appear (because operator DOUBLE is defined to
    return a value of type INTEGER).


    **The Relational Database Dictionary, Extended Edition**


    **7**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00139.png)


    Suppose now that DOUBLE is defined to be an update operator instead of a read-only
    one:


    OPERATOR DOUBLE ( X INTEGER ) UPDATES { X } ;


    X := 2 * X ;


    END OPERATOR ;


    Now the parameter X is subject to update, and any argument corresponding to X
    must be a variable. Thus, e.g., DOUBLE(N) is a valid invocation of DOUBLE, and
    the variable N—not the value of that variable, observe—is the argument to that
    invocation. (Note that, e.g., DOUBLE(N+1) would be a syntax error, because N+1
    isn’t a variable reference.) However, that invocation DOUBLE(N) isn’t an expression,
    and it can’t appear “wherever an integer literal can appear”; instead, it can
    appear only in an explicit CALL statement (or equivalent), as here:


    CALL DOUBLE ( N ) ;


    ****argument expression** An expression denoting an argument, q.v.


    ****arity** Degree, q.v. The term isn’t much used.


    ****Armstrong’s inference rules** ( *For FDs*) Let *A, B,* and *C* be subsets
    of the heading of some relvar. Let *AC* denote the set theory union of *A* and
    *B,* and similarly for *BC*. Then Armstrong’s rules (also known as Armstrong’s
    axioms) state that (a) if *A* is a superset of *B,* then *A* → *B* (the reflexivity
    rule); (b) if *A* → *B,* then *AC* → *BC* (the augmentation rule); and (c) if
    *A* → *B* and *B* → *C,* then *A* → *C* (the transitivity rule). These rules are
    both sound and complete ( *see* completeness; soundness).


    **Examples*: Let *s* be a set of FDs, and let *s* contain the FD *A* → *BC*. Then
    the FD *A* → *B* is implied by *s* and can easily be derived using Armstrong’s
    rules as follows: (a) *A* → *BC* (given); (b) *BC* → *B* (reflexivity); hence
    (c) *A* → *B* (transitivity).


    By way of a second example, if the set *s* contains the FDs *A* → *B* and *C*
    → *D,* then the FD *AX* → *BD* (where *X* is the set theory difference between
    *C* and *B,* in that order) is implied by *s*. *Note*: This example, **8**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00202.png)


    which is due to Darwen, can be regarded as another inference rule. It has the
    interesting property that the augmentation and transitivity rules, as well as
    several other rules not discussed here, are all special cases.


    ****arrow** *See* functional dependency.'
  trans: "\n# 代数\n\n1.  泛指一个由一组元素和一组只读运算符构成的形式系统，这些元素和运算符共同满足特定的定律和属性（必然包括封闭性，可能包括交换律和结合律等）；亦称为代数结构或抽象代数。`代数`一词本身源自阿拉伯语`al-jebr`，意为（破碎之物的）复位或组合。*另见*\
    \ `布尔代数；域（数学）；群（数学）；代数定律，The；关系代数；环（数学）。`\n2.  特指关系代数（如果上下文有此要求）。\n\n## 集合代数\n\
    \n*见* `布尔代数`（第二个定义）。\n\n## 别名\n\n在一些 SQL 产品中使用的已弃用术语，意指元组演算范围变量或此类变量的名称。术语`表别名`（同样已弃用）有时也用于相同含义。\n\
    \n## ALL BUT\n\n*见* `投影`。\n\n## ALPHA\n\n由 Codd 提出的一个基于元组演算的具体关系语言提案；亦称为数据子语言\
    \ ALPHA。ALPHA 从未被实现，但其思想对几种后来得以实现的语言设计产生了影响，包括 QBE、QUEL 以及（在较小程度上）SQL。\n\n**关系数据库词典，扩展版**\n\
    \n**5**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00001.png)\n\
    \n## 替代键\n\n非正式地指不是主键的候选键。\n\n更精确地说，让关系变量 `R` 拥有键 `K1, K2, . . . , Kn,` 并选择某个\
    \ `Ki` (`i = 1, 2, . . . , n`) 作为 `R` 的主键；那么每个 `Kj` (`j = 1, 2, . . . , n, j ≠\
    \ i`) 都是 `R` 的一个替代键。该术语不常用。\n\n## AND\n\n*见* `合取`。*注意*：通常理解的 `AND` 是一个逻辑运算符；然而，代数\
    \ `A`（见该词）包含一个名为 `AND` 的运算符——根据定义——它是一个代数运算符（实际上它就是自然连接）。\n\n## 前件\n\n*见* `蕴涵`。\n\
    \n## 反对称性\n\n*见* `偏序`。注意 `反对称性` 和 `非对称性` 存在逻辑差异；前者如 `偏序` 下所定义，而后者仅指缺乏对称性。\n\n\
    ## 出现\n\n*（值的）* 某个值的出现或“实例”（在某个上下文中）。注意值本身与其出现之间存在逻辑差异——例如，作为某个变量的当前值出现，或作为某个元组变量或关系变量的当前值中的属性值出现。每个这样的出现，在内部都由该值的某种物理表示组成（同一值的不同出现可能有不同的物理表示）。因此，值的出现与其物理表示之间也存在逻辑差异；同一值的不同出现所使用的物理表示之间甚至可能存在逻辑差异。然而，尽管如此，通常将*值的出现之物理表示*缩写为*值的出现*，或（更常见地）直接缩写为*值*，只要不存在歧义风险。\n\
    \n注意`值的出现`是一个模型概念，而`出现的物理表示`是一个实现概念——用户当然可能需要知道（例如）两个变量是否包含同一值的出现，但他们不需要知道这些出现是否使用相同的物理表示。\n\
    \n**示例**：令 `N1` 和 `N2` 为 `INTEGER` 类型的变量。经过以下赋值后，`N1` 和 `N2` 都包含整数值 `3` 的一个出现。对应的物理表示可能相同也可能不同（例如，`N1`\
    \ 可能使用二进制表示，而 `N2` 使用十进制表示），但无论哪种情况，用户都无需关心。\n\n```sql\nN1 := 3 ;\nN2 := 3 ;\n\
    ```\n\n## 应用关系变量\n\n*见* `关系变量`。\n\n## 实参\n\n当调用某个运算符时，替换其某个参数的实际操作数。注意实参本身与表示它的表达式（即实参表达式）之间存在逻辑差异。实参本身要么是一个值，要么是一个变量。如果相关参数是可更新的，那么实参——事实上，必须是——一个变量，由某个变量引用表示；否则它是一个值，可以由任意复杂的表达式（可能只是一个变量引用）表示。*对比*\
    \ `形参`。\n\n**示例**：令运算符 `DOUBLE` 定义如下：\n\n```sql\nOPERATOR DOUBLE ( X INTEGER )\
    \ RETURNS INTEGER ;\n    RETURN ( 2 * X ) ;\nEND OPERATOR ;\n```\n\n这里的 `X` 是一个形参，声明类型为\
    \ `INTEGER`。令 `N` 为 `INTEGER` 类型的变量。那么，例如 `DOUBLE(N+1)` 是对 `DOUBLE` 的一次调用，在该调用时刻表达式\
    \ `N+1` 的值是该调用的一个实参——实际上是唯一的实参。该调用本身又是一个表达式，它可以出现在任何整型字面量可以出现的地方（因为运算符 `DOUBLE`\
    \ 被定义为返回 `INTEGER` 类型的值）。\n\n**关系数据库词典，扩展版**\n\n**7**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00139.png)\n\n现在假设 `DOUBLE` 被定义为一个更新运算符而非只读运算符：\n\n```sql\nOPERATOR\
    \ DOUBLE ( X INTEGER ) UPDATES { X } ;\n    X := 2 * X ;\nEND OPERATOR ;\n```\n\
    \n现在形参 `X` 是可更新的，任何对应于 `X` 的实参必须是一个变量。因此，例如 `DOUBLE(N)` 是 `DOUBLE` 的有效调用，并且变量\
    \ `N`——注意，不是该变量的值——是该调用的实参。（注意，例如 `DOUBLE(N+1)` 会是语法错误，因为 `N+1` 不是变量引用。）然而，该调用\
    \ `DOUBLE(N)` 不是一个表达式，它不能出现在“任何整型字面量可以出现的地方”；相反，它只能出现在显式的 `CALL` 语句（或等效语句）中，如下所示：\n\
    \n```sql\nCALL DOUBLE ( N ) ;\n```\n\n## 实参表达式\n\n表示实参（见该词）的表达式。\n\n## 元数\n\n\
    度数（见该词）。该术语不常用。\n\n## Armstrong 推理规则\n\n*（针对函数依赖 FD）* 令 `A, B,` 和 `C` 为某个关系变量头部的子集。令\
    \ `AC` 表示 `A` 和 `B` 的集合理论并集，`BC` 类似。那么 Armstrong 规则（也称为 Armstrong 公理）指出：(a) 如果\
    \ `A` 是 `B` 的超集，则 `A → B`（自反律）；(b) 如果 `A → B`，则 `AC → BC`（增广律）；以及 (c) 如果 `A →\
    \ B` 且 `B → C`，则 `A → C`（传递律）。这些规则既是可靠（*见* `可靠性`）又是完备的（*见* `完备性`）。\n\n**示例**：令\
    \ `s` 为一个 FD 集合，并且 `s` 包含 FD `A → BC`。那么 FD `A → B` 被 `s` 蕴含，并且可以容易地使用 Armstrong\
    \ 规则推导如下：(a) `A → BC`（给定）；(b) `BC → B`（自反律）；因此 (c) `A → B`（传递律）。\n\n作为第二个例子，如果集合\
    \ `s` 包含 FD `A → B` 和 `C → D`，那么 FD `AX → BD`（其中 `X` 是 `C` 和 `B` 的集合理论差集，按此顺序）被\
    \ `s` 蕴含。*注意*：这个由 Darwen 提出的例子可以被视为另一个推理规则。它有一个有趣的性质，即增广律和传递律，以及此处未讨论的其他几个规则，都是它的特例。\n\
    \n**关系数据库词典，扩展版**\n\n**8**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00202.png)\n\n## 箭头\n\n*见* `函数依赖`。\n"
- fmt: '# assignment

    An operator that assigns a value (the source, denoted by an expression) to a variable
    (the target, denoted by a variable reference); also, the operation performed when
    that operator is invoked. The source and target must be of the same type. *Note*:
    Every update operator invocation is semantically equivalent to some assignment
    operation (possibly a multiple assignment, q.v.).


    # Assignment Principle, The

    After assignment of value `v` to variable `V`, the comparison `v = V` is required
    to evaluate to TRUE.


    # associative addressing

    Addressing by value instead of position. All addressing is associative in the
    relational model, implying among other things that pointers, q.v., are explicitly
    rejected.


    # associativity

    Let `Op` be a dyadic operator, and assume for definiteness that `Op` is expressed
    in infix style. Then `Op` is associative if and only if, for all `x`, `y`, and
    `z`, `x Op (y Op z) = (x Op y) Op z`.


    **Examples**: In ordinary arithmetic, addition (`+`) is associative, because `x
    + (y + z) = (x + y) + z` for all numbers `x`, `y`, and `z`. Likewise, `||` (string
    concatenation) is associative, because `x || (y || z) = (x || y) || z` for all
    strings `x`, `y`, and `z`. In the same kind of way, `UNION` and `JOIN` are associative
    in relational algebra (by contrast, `MINUS` is not). Likewise, `OR` and `AND`
    are associative in logic (by contrast, `IMPLIES` is not).


    *Note*: All of the associative operators just mentioned except `||` are also commutative,
    q.v. Another example of an operator that’s associative but not commutative is
    the unnamed dyadic connective in two-valued logic that simply returns the value
    of its first argument. *See also* left associativity; right associativity.


    # atomic predicate

    A simple predicate, q.v.


    # atomic proposition

    A simple proposition, q.v.


    # atomic relvar

    Deprecated term for a relvar that can’t be decomposed into independent projections
    ( *see* FD preservation). The term is deprecated because it’s likely to be confused
    with the term *irreducible relvar* ( *see* irreducibility, second definition).
    While it’s true that irreducible relvars are always atomic, the converse is false—a
    relvar can be atomic without being irreducible, and in fact without even being
    in BCNF. The concept is seldom needed, anyway; thus, it’s probably best just to
    spell out the meaning when necessary.


    **Example**: Suppose relvar `SP` satisfies the additional FD `{QTY} → {P#}`, meaning
    the part number for a given shipment is a function of the shipment quantity; e.g.,
    part `P1` (alone) is always supplied in a quantity of 100, part `P2` (alone) in
    a quantity of 200, and so on (this example is very contrived, of course, but it
    suffices for the purpose at hand). This revised version of `SP` isn’t in BCNF
    (because `{QTY}` isn’t a superkey), and it can be nonloss decomposed into its
    projections on `{S#,QTY}` and `{QTY,P#}`. However, those projections, though they’re
    in BCNF, aren’t independent, because the FD `{S#,P#} → {QTY}` isn’t preserved
    in the decomposition; this revised version of `SP` is thus not atomic. *Note*:
    It follows from this example that the objectives of (a) decomposing into BCNF
    projections and (b) decomposing into atomic projections, though both generally
    desirable, can sometimes be in conflict.


    # atomic statement

    ( *Programming languages*) Syntactically, a statement that contains no other statements
    nested inside itself ( *contrast* compound statement); semantically, a statement
    that is guaranteed either to execute in its entirety or to have no effect, except
    possibly for returning a status code or equivalent. All syntactically atomic statements
    are semantically atomic.


    ---

    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00028.png)


    ![](images/00102.png)'
