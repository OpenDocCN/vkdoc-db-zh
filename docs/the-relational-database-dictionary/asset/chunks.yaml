- fmt: '## idempotence

    设 `Op` 为一个双目运算符，并假设为明确起见，`Op` 以中缀风格表示。那么，当且仅当对于所有 `x`，`x Op x = x` 时，`Op` 才是幂等的。


    **示例**：在逻辑中，OR 和 AND 都是幂等的，因为对于所有 `x`，`x OR x = x` 且 `x AND x = x`。由此直接可得，在关系代数中，UNION
    和 JOIN 分别是幂等的。


    ## identity

    1.  （**通用**）区分给定实体与其他所有实体的属性。

    2.  （**运算符**）相等性。

    3.  （**逻辑**）相等性；也指形式为 `(p) EQUIV (q)` 的重言式。

    4.  （**比较**）一种布尔表达式，形式为 `(exp1) = (exp2)`，其中 `exp1` 和 `exp2` 是相同类型的表达式，并且保证无论涉及的任何变量的取值如何，其求值结果都为
    TRUE。在实践中，包围 `exp1` 和 `exp2` 的括号可能不需要。

    5.  （**恒等值**）设 `Op` 为一个可交换的双目运算符，并假设为明确起见，`Op` 以中缀风格表示。如果存在一个值 `i`，使得对于所有可能的值
    `v`，`i Op v` 和 `v Op i` 都等于 `v`，那么 `i` 就是关于 `Op` 的恒等值（参见 `Laws of Algebra, The`）。**注**：恒等值也被称为恒等元、中性元、单位元，或者有时简称为单位。


    **示例（仅针对第五个定义）**：双目运算符 `+`、`*`、OR、AND 和 JOIN 的恒等值分别是 0、1、FALSE、TRUE 和 TABLE_DEE。特别注意最后一个：这意味着，明确地说，对于所有可能的关系
    `r`，`r JOIN TABLE_DEE = TABLE_DEE JOIN r = r`。这也意味着，正如没有整数的和是零（参见 `aggregate operator`）一样，没有关系的连接是
    TABLE_DEE（参见 `natural join`）。


    ## identity projection

    给定关系 `r` 在其所有属性上的投影（即 `r{H}`，其中 `{H}` 是 `r` 的标题）。这种投影保证等于 `r`。**注**：该术语也用于关系变量；例如，表达式
    `SP{S#,QTY,P#}` 表示关系变量 `SP` 的恒等投影（其在任何给定时刻的值，就是当时关系变量 `SP` 的值的恒等投影）。


    ## identity restriction

    给定关系 `r` 的一个限制，该限制等于 `r`（即等于 `r WHERE TRUE`）；特别地，形式为 `r WHERE t` 的限制，其中 `t` 是一个重言式。**注**：该术语也用于关系变量。


    **示例**：给定图 1 中的示例值，表达式 `S WHERE STATUS ≠ 25` 和 `S WHERE STATUS = STATUS` 都表示恒等限制（第二个必然如此，因为
    `STATUS = STATUS` 是一个重言式）。


    ## identity value

    参见 `identity`。


    ## IF AND ONLY IF

    等同于 `EQUIV`。


    ## IF . . . THEN . . .

    等同于 `IMPLIES`；更准确地说，`IF (p) THEN (q)` 被定义为与 `(p) IMPLIES (q)` 相同。


    ## IFF

    等同于 `EQUIV`。


    ## image

    参见 `function`。


    ## image relation

    在 **Tutorial D** 中，指形式为 `‼r` 的表达式（其中 `r` 是一个关系表达式）所表示的值（一个关系）。符号 `‼` 读作 “bang
    bang” 或 “double bang”。这样的表达式可以出现在 (a) `WHERE` 子句中或 (b) `EXTEND` 调用中的 `ADD` 规范中（在每种情况下，只要关系表达式可以出现的地方都可以）。为明确起见，假设表达式
    `‼r2` 出现在形式为 `r1 WHERE bx` 的关系表达式的布尔表达式 `bx` 中（这是情况 (a) 的一个特例；情况 (b) 和情况 (a) 的其他实例可类似定义）。此处的关系
    `r1` 和 `r2` 必须满足同名属性属于同一类型（换句话说，`r1` 和 `r2` 必须是可连接的）；设它们的公共属性为 `A1, A2, . . .
    , An`（`n ≥ 0`）。那么表达式 `‼r2` 在语义上等价于表达式 `(r2) MATCHING RELATION {TUPLE {A1 A1, A2
    A2, . . ., An An}}) {ALL BUT A1, A2, . . ., An}`，其中，对于元组选择器调用 `TUPLE {...}` 中的每一对形式为
    `Ai Ai`（`i = 1, 2, . . ., n`）的项，第一个 `Ai` 是属性名，第二个是对 `r1` 中该名称属性的引用。


    **示例**：表达式

    ```

    S WHERE ( ‼SP ) { P# } = P { P# }

    ```

    生成一个关系，其标题与关系变量 `S` 相同，其主体由来自关系变量 `S` 的所有可能的元组 `<s#,sn,st,sc>` 组成，这些元组对应的供应商 `s#`
    供应关系变量 `P` 中提到的所有零件。（给定图 1 的示例值，结果只包含供应商 S1 的元组。）该表达式在语义上等价于这个表达式：

    ```

    S WHERE ( ( SP MATCHING RELATION { TUPLE { S# S# } } ) { ALL BUT S# } ) { P# }
    = P { P# }

    ```

    详细说明：设 `s` 和 `sp` 分别为关系变量 `S` 和 `SP` 的当前值。对于 `s` 中的一个给定元组 `t`，表达式（实际上是一个关系选择器调用）`RELATION
    {TUPLE {S# S#}}` 求值为一个只包含一个属性 `S#` 和一个元组的关系，并且该元组只包含来自 `t` 的 `S#` 值。因此，对应的像关系——即对应于元组
    `t`，由表达式 `‼SP` 表示的关系——只包含 `SP` 中与该元组 `t` 匹配的那些元组，投影到 `{P#,QTY}`（`= {ALL BUT S#}`）上。因此，投影
    `(‼SP){P#}` 求值为一个关系，记为 `ps`，该关系只有一个属性 `P#`，给出了与元组 `t` 对应的供应商所供应的所有零件的零件号。对于该供应商，布尔表达式
    `(‼SP){P#} = P{P#}` 随后测试对应的关系 `ps`，看它是否等于 `P` 在 `{P#}` 上的投影。当且仅当与元组 `t` 对应的供应商供应了
    `P` 中提到的所有零件时，该测试才会得到 TRUE。


    下面是一个情况 (b) 的示例：

    ```

    EXTEND S { S# } ADD ( COUNT ( ‼SP ) AS CT )

    ```

    该表达式生成一个类型为 `RELATION {S# S#, CT INTEGER}` 的关系，为当前出现在关系变量 `S` 中的每个不同的 `S#` 值包含一个元组，且不包含其他元组。每个这样的元组包含一个供应商编号和一个计数，该计数表示该供应商编号当前在关系变量
    `SP` 中出现的次数（表达式 `‼SP` 再次是表达式 `SP MATCHING RELATION {TUPLE {S# S#}}) {ALL BUT S#}`
    的简写）。例如，给定图 1 中的示例值，结果中供应商 S2 的元组具有 `S#` 值 S2 和 `CT` 值二，供应商 S5 的元组具有 `S#` 值 S5
    和 `CT` 值零。


    ## immediate checking

    在执行可能导致完整性约束被违反的更新时检查该约束。在关系模型中，所有约束检查都是即时的。*对比* `deferred checking`。


    ## immediate constraint

    一种完整性约束，对其检查是即时的（参见 `immediate checking`）。在关系模型中，所有约束都是即时的。*对比* `deferred constraint`。


    ## implementation

    在真实机器上对构成某个给定数据模型（按该术语的第一个定义）的抽象机器的物理实现。为了物理数据独立性，模型及其实施应该严格分离；也就是说，模型应该对实施的任何方面都无话可说。'
