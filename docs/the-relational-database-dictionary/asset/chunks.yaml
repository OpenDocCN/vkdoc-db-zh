- fmt: '## optimizer

    The part of the DBMS responsible for optimization, q.v.


    ## optional participation

    See `cardinality constraint`.


    ## OR

    See `disjunction`. *Note*: OR as conventionally understood is a logical operator;
    however, the algebra **A**, q.v., includes an operator called OR that—by definition—is
    an algebraic operator (in fact, it’s a generalized form of union).


    ## ORDER BY

    See `ordering`.


    ## ordered n-tuple

    See `ordered pair`. Note that an ordered *n*-tuple is not a tuple in the relational
    model sense (tuples in the relational model have no ordering to their components).


    ## ordered pair

    A combination, usually denoted < *x,y*>, of exactly two elements *x* and *y* such
    that *x* is the first element and *y* the second. The ordered pairs < *x1,y1*>
    and < *x2,y2*> are equal if and only if *x1* = *x2* and *y1* = *y2* (thus < *x,y*>
    ≠ < *y,x*>, in general). Formally, < *x,y*> is defined to be equal to the set
    {{ *x*},{ *x,y*}}; observe that one of the elements in this set determines the
    elements that constitute the ordered pair and the other determines which of those
    elements comes first. *Note*: This definition can easily be extended to ordered
    triples, ordered quadruples, . . ., and more generally ordered *n*-tuples for
    any *n* > 1.


    ## ordered tuple

    See `ordered n-tuple`.


    ## ordering

    The process, or the result of the process, of imposing a left-to-right sequence
    on the attributes—and, more particularly, a top-to-bottom sequence on the tuples—of
    a relation, so that the data in the relation in question can be transferred out
    of the relational context and into an environment that relies on such sequences.
    Operators that request such sequencing, or ordering, are of major pragmatic importance,
    but they aren’t relational operators because their result isn’t a relation. *Note*:
    A convenient way to think of such operators is as ones that convert relations
    to tables (given that tables, unlike relations, do have a left-to-right ordering
    to their columns and a top-to-bottom ordering to their rows).


    *Example*: The SQL operators that provide this functionality are `SELECT` (for
    left-to-right column sequence) and `ORDER BY` (for top-to-bottom row sequence).


    *Note*: It’s worth pointing out in passing that `ORDER BY` isn’t a function—that
    is, the result of a given `ORDER BY` invocation is indeterminate, in general (consider,
    e.g., the effect of `ORDER BY CITY` on the relation that’s the current value of
    `relvar S` as shown in Figure 1). By contrast, the operators of the relational
    algebra are indeed all functions. (The same can’t always be said of the SQL analogs
    of those operators, incidentally, owing to the fact that SQL allows comparisons
    of the form `v1 = v2` to return `TRUE` even if `v1` and `v2` aren’t the same value.)
    `ORDER BY` is unusual in another respect also. To be specific, it produces a sequence
    of tuples as its result, and yet the operators “<” and “>” are explicitly not
    defined for tuples (see `tuple comparison`).


    ## ordering (mathematics)

    See `partial ordering`; `total ordering`.


    ## ordinal type

    A type for which a `total ordering`, q.v., is defined. Let `T` be such a type.
    In general, then, the following operators will be provided in connection with
    type `T`: (a) niladic `FIRST` and `LAST` operators, which return the first value
    and the last value, respectively, of type `T` with respect to that total ordering;
    (b) monadic `NEXT` and `PRIOR` operators, which, given a value `v` of type `T`,
    return the value of type `T` immediately succeeding `v` and the value of type
    `T` immediately preceding `v`, respectively, again with respect to that total
    ordering.


    *Examples*: Type `INTEGER` is an ordinal type. The `NEXT` and `PRIOR` operators
    are basically just `add one` and `subtract one`, respectively. `FIRST` and `LAST`
    operators typically aren’t supported directly, but selector invocations that return
    the minimum and maximum integers will suffice.


    By way of a counterexample, suppose the system also supports a type `POINT`, perhaps
    user defined, representing geometric points in two-dimensional space. Then type
    `POINT` presumably wouldn’t be an ordinal type, because the notion of one point
    being somehow less or greater than another makes no sense.


    ## orthogonal

    Independent.


    ## orthogonal decomposition

    A decomposition of some given `relvar` into restrictions, such that the restrictions
    in question satisfy `The Principle of Orthogonal Design`.


    *Examples*: Suppose we were to replace `relvar P` by two `relvars LP` and `HP`,
    `LP` containing tuples for parts with weight less than or equal to 17.0 and `HP`
    containing tuples for parts with weight greater than 17.0; then that decomposition
    would be orthogonal. By contrast, suppose `relvar HP` were defined to contain
    tuples for parts with weight greater than *or equal to* 17.0; then the decomposition
    wouldn’t be orthogonal, because tuples for parts with weight equal to 17.0 would
    logically belong to both `LP` and `HP`.


    ## Orthogonal Design Principle, The

    See `The Principle of Orthogonal Design`.


    ## overloading

    Using the same name for two or more different operators. The operators in question
    should preferably have similar semantics.


    *Note*: Overloading is also referred to more specifically as overloading polymorphism;
    it’s also known as ad hoc polymorphism. In an inheritance context, the term is
    also sometimes used to mean `inclusion polymorphism`, q.v.; this particular usage
    is deprecated, however, because it’s based on a flawed perception of the nature
    of subtypes and supertypes. Further details are beyond the scope of this dictionary.


    *Examples*: `UNION` is overloaded, because it—the name, that is—is used to mean
    both relational and tuple union (and in SQL it’s also used to mean union plus,
    though oddly enough not bag union per se). Likewise, “=” is overloaded, because
    it applies to values of every type (i.e., there’s an “=” operator for integers,
    another for supplier numbers, another for relations of type `RELATION {S# S#,
    P# P#, QTY QTY}`, and so on).


    ## overriding

    Replacing an operator by another with the same name, same number of parameters,
    and same parameter and result types—that is, the same `signature`, q.v.—but different
    semantics. (It has nothing to do with `domain check override`, q.v.) *Contrast*
    `overloading`.


    *Example*: Suppose there exists an operator called `LOG` (possibly built in) that
    returns natural logarithms. Then it might be possible to override that operator
    by one that returns logarithms to base ten instead.


    ## OWA

    The Open World Assumption.


    ## P-relation

    See `RM/T`.


    ## pair

    Either a set of cardinality two or, more usually, an `ordered pair` (q.v.), as
    the context demands.


    ## parameter

    A formal operand in terms of which some operator is defined, to be replaced by
    some `argument` when the operator in question is invoked. Simplifying slightly
    (see `generic operator`), every parameter is declared to be of some type, and
    any argument corresponding to a given parameter is required to be of the same
    type as that parameter. *Contrast* `argument`.


    ## parent / parent table

    Deprecated, because inappropriate, terms sometimes used in SQL contexts to mean
    (the SQL analog of) a `referenced relvar`, q.v.'
