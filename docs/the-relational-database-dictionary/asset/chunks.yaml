- fmt: "# Note\n\n*The term* `database` *is also used in nonrelational contexts to\
    \ mean a variety of other things: for example, a collection of data as physically\
    \ stored. It’s also used, all too frequently, to mean a DBMS, but this particular\
    \ usage is strongly deprecated. (If we call the DBMS a database, what do we call\
    \ the database?)*\n\n## database constraint\n\n1.  *(“A” database constraint)*\
    \ Formally, any constraint that isn’t a type constraint (implying that constraints\
    \ of all kinds apart from type constraints, including attribute and relvar constraints\
    \ in particular, are just special cases); informally, any constraint that refers\
    \ to two or more distinct relvars (also known as a multi-relvar constraint, q.v.).\
    \ *Note*: These two definitions aren’t meant to be equivalent in any sense—they\
    \ refer to two distinct concepts.\n2.  *(“The” database constraint)* The logical\
    \ AND of `TRUE` and all constraints, apart from type constraints, that apply to\
    \ a given database (*the* database constraint—sometimes called the *total* database\
    \ constraint—for the database in question). Note that it follows from this definition\
    \ that every database is subject to at least one constraint: namely, the degenerate\
    \ (“default”) constraint `TRUE`. *See also* relvar constraint.\n\n### Examples\n\
    \nFirst, the key and foreign key constraints specified in the definition of the\
    \ suppliers-and-parts database are all database constraints.\n\nSecond, here are\
    \ some more database constraints that might also apply to that database:\n\n```sql\n\
    CONSTRAINT C1 IS_EMPTY\n    ( S WHERE STATUS < 1 OR STATUS > 100 ) ;\n    /* status\
    \ values must be in the */\n    /* range 1 to 100 inclusive */\n\nCONSTRAINT C2\
    \ IS_EMPTY\n    ( P WHERE CITY = 'London' AND COLOR ≠ 'Red' ) ;\n    /* parts\
    \ in London must be red */\n\nCONSTRAINT C3 IS_EMPTY\n    ( ( S JOIN SP )\n  \
    \  WHERE STATUS < 20 AND P# = P#('P6') ) ;\n    /* no supplier with status less\
    \ */\n    /* than 20 can supply part P6 */\n```\n\nFinally, suppose for the sake\
    \ of the example that the specified key and foreign key constraints, together\
    \ with constraints `C1`–`C3` above, are the only database constraints that apply\
    \ to the suppliers-and-parts database.\n\nThen the logical AND of all of them\
    \ and `TRUE` is “the” (total) database constraint for that database.\n\n## database\
    \ design\n\n*See* logical database design; physical database design.\n\n## database\
    \ management system\n\nThe software system (the `DBMS`) that manages, and in particular\
    \ handles all access to, some database or collection of databases. *Contrast*\
    \ database.\n\n## database programming language\n\nA programming language that\
    \ includes fully integrated (“native”) database support. *Contrast* data sublanguage;\
    \ host language.\n\n### Examples\n\n`Tutorial D` might be regarded as a fully\
    \ fledged database programming language, except that it currently includes no\
    \ exception handling or I/O support. A similar remark applies to `SQL`; `SQL`\
    \ is widely thought of as just a data sublanguage, q.v., but with the introduction\
    \ into the 1992 version of the standard of such features as `SQL` variables, exception\
    \ handling, `IF`, `CASE`, `WHILE`, `CALL`, `RETURN`, and assignment (`SET`) statements,\
    \ it too became a fully fledged database programming language (except that, like\
    \ `Tutorial D`, it currently includes no I/O facilities).\n\n## database relvar\n\
    \n*See* relvar.\n\n## database statistics\n\nMetadata, typically kept in the catalog,\
    \ that might be helpful to the optimizer.\n\n### Examples\n\nRelvar and attribute\
    \ cardinalities; minimum, maximum, and average attribute values; attribute value\
    \ frequencies; index selectivities; and so on.\n\n## database value\n\nEither\
    \ the current or some possible “state” for some database; i.e., a collection of\
    \ relations, those relations being possible values for the applicable relvars.\
    \ Conceptually, therefore, a database value can be thought of as a set of propositions,\
    \ those propositions corresponding to the tuples in the applicable relations.\
    \ *Contrast* database variable.\n\n### Example\n\nThe relations (i.e., relation\
    \ values) shown in Figure 1 constitute the “state” of the suppliers-and-parts\
    \ database that happens to be current at some particular time. But if we were\
    \ to look at that database at some different time, we would probably see a different\
    \ state. In other words, the database is really a variable—a database variable,\
    \ to be precise, meaning a variable whose values are database values. Moreover,\
    \ the tuples in the relations that are the values of relvars `S`, `P`, and `SP`\
    \ at any given time represent propositions—propositions that are assumed to be\
    \ true at that time—so the database at the time in question can be thought of\
    \ as a collection of true propositions.\n\n## database variable\n\nLoosely, a\
    \ container for relvars; more accurately, a variable whose value at any given\
    \ time is a database value. Strictly speaking, there’s a logical difference, precisely\
    \ analogous to that between relation values and relation variables, between database\
    \ values and database variables. In other words, what we usually call a database\
    \ is really a variable (typically a rather large one), and updating that database\
    \ has the effect of replacing one value of that variable by another—where the\
    \ values in question are database values and the variable in question is a database\
    \ variable. More precisely, a database is a tuple variable, with one attribute\
    \ (relation valued) for each relvar in the database in question.\n\nNote, therefore,\
    \ that a database variable isn’t really a set of relation variables, despite the\
    \ fact that we often think of it that way informally.\n\nAll of that being said,\
    \ however, we bow to traditional usage elsewhere in this dictionary and use the\
    \ term *database* to refer to both database values and database variables, relying\
    \ on context to make clear which is intended.\n\n*See* database.\n\n### Example\n\
    \n*See* database value. As for the matter of a database really being a tuple variable,\
    \ the suppliers-and-parts database in particular can be thought of as a tuple\
    \ variable of the following tuple type:\n\n```sql\nTUPLE { S RELATION { S# S#,\
    \ SNAME NAME,\n                      STATUS INTEGER, CITY CHAR },\n         P\
    \ RELATION { P# P#, PNAME NAME, COLOR COLOR,\n                      WEIGHT WEIGHT,\
    \ CITY CHAR },\n         SP RELATION { S# S#, P# P#, QTY QTY } }\n```\n\n## DBMS\n\
    \nDatabase management system; plural `DBMSs`.\n\n## dbvar\n\nA database variable,\
    \ q.v. The term isn’t much used.\n\n## DCO\n\nDomain check override.\n\n## De\
    \ Morgan’s Laws\n\n1.  (*Logic*) The negation of the disjunction of predicates\
    \ *p* and *q* is equivalent to the conjunction of the negations of *p* and *q*;\
    \ the negation of the conjunction of predicates *p* and *q* is equivalent to the\
    \ disjunction of the negations of *p* and *q*.\n2.  (*Set theory*) The complement\
    \ of the union of sets *s1* and *s2* is equal to the intersection of the complements\
    \ of *s1* and *s2*; the complement of the intersection of sets *s1* and *s2* is\
    \ equal to the union of the complements of *s1* and *s2*.\n\n## decidability\n\
    \nThat property of a formal system according to which, given an arbitrary sentence\
    \ *s*, it can be determined whether or not *s* is a sentence of the system.\n\n\
    ### Examples\n\nPropositional calculus is decidable; predicate calculus is not.\n\
    \n## declared\n\nTerm sometimes used as a synonym for defined or specified.\n\n\
    ## declared type\n\n1.  (*Of a value*) The type of the value in question."
  raw: '**Note*: The term *database* is also used in nonrelational contexts to mean
    a variety of other things: for example, a collection of data as physically stored.
    It’s also used, all too frequently, to mean a DBMS, but this particular usage
    is strongly deprecated. (If we call the DBMS a database, what do we call the database?)


    ****database constraint** 1\. ( *“A”database constraint*) Formally, any constraint
    that isn’t a type constraint (implying that constraints of all kinds apart from
    type constraints, including attribute and relvar constraints in particular, are
    just special cases); informally, any constraint that refers to two or more distinct
    relvars (also known as a multi-relvar constraint, q.v.). *Note*: These two definitions
    aren’t meant to be equivalent in any sense—they refer to two distinct concepts.
    2\. ( *“The” database constraint*) The logical AND of TRUE and all constraints,
    apart from type constraints, that apply to a given database ( *the* database constraint—sometimes
    called the *total* database constraint—for the database in question). Note that
    it follows from this definition that every database is subject to at least one
    constraint: namely, the degenerate (“default”) constraint TRUE. *See also* relvar
    constraint.


    **Examples*: First, the key and foreign key constraints specified in the definition
    of the suppliers-and-parts database are all database constraints.


    Second, here are some more database constraints that might also apply to that
    database:


    **The Relational Database Dictionary, Extended Edition**


    **39**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00127.png)


    CONSTRAINT C1 IS_EMPTY


    ( S WHERE STATUS < 1 OR STATUS > 100 ) ;


    /* status values must be in the */


    /* range 1 to 100 inclusive */


    CONSTRAINT C2 IS_EMPTY


    ( P WHERE CITY = ''London'' AND COLOR ≠ ''Red'' ) ;


    /* parts in London must be red */


    CONSTRAINT C3 IS_EMPTY


    ( ( S JOIN SP )


    WHERE STATUS < 20 AND P# = P#(''P6'') ) ;


    /* no supplier with status less */


    /* than 20 can supply part P6 */


    Finally, suppose for the sake of the example that the specified key and foreign
    key constraints, together with constraints C1–C3 above, are the only database
    constraints that apply to the suppliers-and-parts database.


    Then the logical AND of all of them and TRUE is “the” (total) database constraint
    for that database.


    ****database design** *See* logical database design; physical database design.


    ****database management system** The software system (the DBMS) that manages,
    and in particular handles all access to, some database or collection of databases.
    *Contrast* database.


    ****database programming language** A programming language that includes fully
    integrated (“native”) database support. *Contrast* data sublanguage; host language.


    **Examples*: **Tutorial D** might be regarded as a fully fledged database programming
    language, except that it currently includes no exception handling or I/O support.
    A similar remark applies to SQL; SQL is widely thought of as just a data sublanguage,
    q.v., but with the introduction into the 1992 version of the standard of such
    features as SQL variables, exception handling, IF, CASE, WHILE, CALL, RETURN,
    and assignment **40**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00124.png)


    (SET) statements, it too became a fully fledged database programming language
    (except that, like **Tutorial D**, it currently includes no I/O


    facilities).


    **database relvar *See* relvar.


    **database statistics** Metadata, typically kept in the catalog, that might be
    helpful to the optimizer.


    **Examples*: Relvar and attribute cardinalities; minimum, maximum, and average
    attribute values; attribute value frequencies; index selectivities; and so on.


    ****database value** Either the current or some possible “state” for some database;
    i.e., a collection of relations, those relations being possible values for the
    applicable relvars. Conceptually, therefore, a database value can be thought of
    as a set of propositions, those propositions corresponding to the tuples in the
    applicable relations. *Contrast* database variable.


    **Example*: The relations (i.e., relation values) shown in Figure 1 constitute
    the “state” of the suppliers-and-parts database that happens to be current at
    some particular time. But if we were to look at that database at some different
    time, we would probably see a different state. In other words, the database is
    really a variable—a database variable, to be precise, meaning a variable whose
    values are database values. Moreover, the tuples in the relations that are the
    values of relvars S, P, and SP at any given time represent propositions—propositions
    that are assumed to be true at that time—so the database at the time in question
    can be thought of as a collection of true propositions.


    ****database variable** Loosely, a container for relvars; more accurately, a variable
    whose value at any given time is a database value. Strictly speaking, there’s
    a logical difference, precisely analogous to that between relation values and
    relation variables, between database values and database variables. In other words,
    what we usually call a database is really a variable (typically a rather large
    one), and updating that database **The Relational Database Dictionary, Extended
    Edition**


    **41**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00046.png)


    has the effect of replacing one value of that variable by another—where the values
    in question are database values and the variable in question is a database variable.
    More precisely, a database is a tuple variable, with one attribute (relation valued)
    for each relvar in the database in question.


    Note, therefore, that a database variable isn’t really a set of relation variables,
    despite the fact that we often think of it that way informally.


    All of that being said, however, we bow to traditional usage elsewhere in this
    dictionary and use the term *database* to refer to both database values and database
    variables, relying on context to make clear which is intended.


    *See* database.


    **Example*: *See* database value. As for the matter of a database really being
    a tuple variable, the suppliers-and-parts database in particular can be thought
    of as a tuple variable of the following tuple type:


    TUPLE { S RELATION { S# S#, SNAME NAME,


    STATUS INTEGER, CITY CHAR },


    P RELATION { P# P#, PNAME NAME, COLOR COLOR,


    WEIGHT WEIGHT, CITY CHAR },


    SP RELATION { S# S#, P# P#, QTY QTY } }


    ****DBMS** Database management system; plural DBMSs.


    ****dbvar** A database variable, q.v. The term isn’t much used.


    ****DCO** Domain check override.


    ****De Morgan’s Laws** 1\. ( *Logic*) The negation of the disjunction of predicates
    *p* and *q* is equivalent to the conjunction of the negations of *p* and *q*;
    the negation of the conjunction of predicates *p* and *q* is equivalent to the
    disjunction of the negations of *p* and *q*. 2\. ( *Set theory*) The complement
    of the union of sets *s1* and *s2* is equal to the intersection of the complements
    of *s1* and *s2*; the complement of the intersection of sets *s1* and *s2* is
    equal to the union of the complements of *s1* and *s2*.


    ****42**


    **The Relational Database Dictionary, Extended Edition**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00087.png)


    **decidability** That property of a formal system according to which, given an
    arbitrary sentence *s,* it can be determined whether or not *s* is a sentence
    of the system.


    **Examples*: Propositional calculus is decidable; predicate calculus is not.


    ****declared** Term sometimes used as a synonym for defined or specified.


    ****declared type** 1\. ( *Of a value*) The type of the value in question.'
  trans: "\n# 注意\n\n*术语* `database` *在非关系型语境中也用于表示多种其他含义：例如，物理存储的数据集合。它也常被非常频繁地用来指代数据库管理系统（DBMS），但这种特定用法被强烈反对。（如果我们将\
    \ DBMS 称为数据库，那么我们该称数据库为什么呢？）*\n\n## 数据库约束\n\n1.  *（“一个”数据库约束）* 从形式上讲，指任何非类型约束的约束（这意味着除类型约束外的所有约束，包括属性约束和关系变量约束等，都只是其特例）；通俗地讲，指引用两个或多个不同关系变量的约束（也称为多关系变量约束，参见\
    \ q.v.）。*注意*：这两个定义并非在任何意义上等价——它们指的是两个不同的概念。\n2.  *（“该”数据库约束）* 除类型约束外，适用于给定数据库的所有约束的逻辑与（即该数据库的“该”数据库约束——有时称为*总*数据库约束）。注意，根据此定义，每个数据库都至少受一个约束：即退化的（“默认”）约束\
    \ `TRUE`。*另见* 关系变量约束。\n\n### 示例\n\n首先，供应商-零件数据库定义中指定的键约束和外键约束都是数据库约束。\n\n其次，以下是一些也可能适用于该数据库的其他数据库约束：\n\
    \n```sql\nCONSTRAINT C1 IS_EMPTY\n    ( S WHERE STATUS < 1 OR STATUS > 100 ) ;\n\
    \    /* status values must be in the */\n    /* range 1 to 100 inclusive */\n\n\
    CONSTRAINT C2 IS_EMPTY\n    ( P WHERE CITY = 'London' AND COLOR ≠ 'Red' ) ;\n\
    \    /* parts in London must be red */\n\nCONSTRAINT C3 IS_EMPTY\n    ( ( S JOIN\
    \ SP )\n    WHERE STATUS < 20 AND P# = P#('P6') ) ;\n    /* no supplier with status\
    \ less */\n    /* than 20 can supply part P6 */\n```\n\n最后，假设为举例说明，指定的键约束和外键约束，连同上述约束\
    \ `C1`–`C3`，是适用于供应商-零件数据库的唯一数据库约束。\n\n那么，所有这些约束与 `TRUE` 的逻辑与就是该数据库的“该”（总）数据库约束。\n\
    \n## 数据库设计\n\n*参见* 逻辑数据库设计；物理数据库设计。\n\n## 数据库管理系统\n\n管理（特别是处理对某个数据库或数据库集合的所有访问）的软件系统（即\
    \ `DBMS`）。*对比* 数据库。\n\n## 数据库编程语言\n\n包含完全集成的（“原生”）数据库支持的编程语言。*对比* 数据子语言；宿主语言。\n\
    \n### 示例\n\n`Tutorial D` 可能被视为一个成熟的数据库编程语言，只是它目前不包含异常处理或 I/O 支持。类似的评论也适用于 `SQL`；`SQL`\
    \ 通常被认为只是一个数据子语言（参见 q.v.），但随着 1992 年版标准引入了诸如 `SQL` 变量、异常处理、`IF`、`CASE`、`WHILE`、`CALL`、`RETURN`\
    \ 和赋值（`SET`）语句等特性，它也成为了一个成熟的数据库编程语言（只是像 `Tutorial D` 一样，它目前也不包含 I/O 功能）。\n\n##\
    \ 数据库关系变量\n\n*参见* 关系变量。\n\n## 数据库统计信息\n\n元数据，通常保存在目录中，可能对优化器有帮助。\n\n### 示例\n\n\
    关系变量和属性基数；最小、最大和平均属性值；属性值频率；索引选择性；等等。\n\n## 数据库值\n\n某个数据库的当前或某个可能的“状态”；即关系的集合，这些关系是相应关系变量的可能值。因此，从概念上讲，数据库值可以被认为是一组命题，这些命题对应于相应关系中的元组。*对比*\
    \ 数据库变量。\n\n### 示例\n\n图 1 所示的关系（即关系值）构成了供应商-零件数据库在某个特定时间碰巧为当前的“状态”。但如果我们会在另一个不同时间查看该数据库，我们可能会看到一个不同的状态。换句话说，数据库实际上是一个变量——精确地说是一个数据库变量，即其值是数据库值的变量。此外，在任何给定时间，作为关系变量\
    \ `S`、`P` 和 `SP` 值的那些关系中的元组代表了命题——在该时间被假设为真命题——因此在该时间点的数据库可以被认为是一组真命题。\n\n## 数据库变量\n\
    \n宽泛地说，是关系变量的容器；更准确地说，是一个在任何给定时间其值都是数据库值的变量。严格来说，数据库值和数据库变量之间存在逻辑差异，这与关系值和关系变量之间的差异完全类似。换句话说，我们通常称为数据库的东西实际上是一个变量（通常是一个相当大的变量），更新该数据库的效果是将该变量的一个值替换为另一个值——这里涉及的值是数据库值，而涉及的变量是数据库变量。更精确地说，数据库是一个元组变量，对于该数据库中的每个关系变量，都有一个（关系值的）属性。\n\
    \n因此请注意，数据库变量实际上并不是一组关系变量，尽管我们在非正式场合经常这样认为。\n\n尽管如此，考虑到所有这些，我们在本词典的其他地方遵循传统用法，使用术语*数据库*来指代数据库值和数据库变量，依靠上下文来明确所指。\n\
    \n*参见* 数据库。\n\n### 示例\n\n*参见* 数据库值。至于数据库实际上是一个元组变量的问题，供应商-零件数据库尤其可以被认为是一个具有以下元组类型的元组变量：\n\
    \n```sql\nTUPLE { S RELATION { S# S#, SNAME NAME,\n                      STATUS\
    \ INTEGER, CITY CHAR },\n         P RELATION { P# P#, PNAME NAME, COLOR COLOR,\n\
    \                      WEIGHT WEIGHT, CITY CHAR },\n         SP RELATION { S#\
    \ S#, P# P#, QTY QTY } }\n```\n\n## DBMS\n\n数据库管理系统；复数形式为 `DBMSs`。\n\n## dbvar\n\
    \n数据库变量（参见 q.v.）。该术语不常用。\n\n## DCO\n\n域检查覆盖。\n\n## 德摩根定律\n\n1.  *（逻辑）* 谓词 *p*\
    \ 和 *q* 的析取的否定等价于 *p* 和 *q* 的否定的合取；谓词 *p* 和 *q* 的合取的否定等价于 *p* 和 *q* 的否定的析取。\n\
    2.  *（集合论）* 集合 *s1* 和 *s2* 的并集的补集等于 *s1* 和 *s2* 的补集的交集；集合 *s1* 和 *s2* 的交集的补集等于\
    \ *s1* 和 *s2* 的补集的并集。\n\n## 可判定性\n\n形式系统的这样一种性质：给定任意一个语句 *s*，可以判定 *s* 是否是该系统的语句。\n\
    \n### 示例\n\n命题演算是可判定的；谓词演算是不可判定的。\n\n## 已声明的\n\n有时用作“已定义”或“已指定”的同义词的术语。\n\n##\
    \ 声明类型\n\n1.  *（值的）* 该值的类型。\n"
- fmt: '## declared type


    2\. ( *Of a variable or an attribute*) The type specified when the variable or
    attribute in question is declared.

    3\. ( *Of a read-only operator*) The type of the result, specified when the operator
    in question is declared.

    4\. *(Of an expression*) The type of the outermost operator involved in the expression
    in question.

    *Note*: The term *declared type* can safely be simplified to just *type* if inheritance
    is not supported. In the case of values, in fact, it’s a slight fiction to refer
    to the type as a declared type anyway, since values as such aren’t declared in
    the first place. Nevertheless, it’s convenient, sometimes, to regard the type
    of a value as its declared type (it has the effect of simplifying certain other
    definitions).


    ## decomposition


    Nonloss decomposition (unless the context demands otherwise).


    ## deductive axiom


    Term occasionally used to mean a rule of inference.


    ## DEE


    `TABLE_DEE`.


    ## default value


    Let `A` be an attribute of relvar `R`. Barring explicit constraints to the contrary,
    then, a default value (default for short) can be declared for `A`; that value,
    `a` say, will appear as the `A` value in any tuple for which no other value is
    specified when the tuple in question is entered into `R`.


    **Example**: Suppose attribute `STATUS` of relvar `S` has default value 10.


    Then the following `INSERT` might be valid, syntactically speaking:


    **The Relational Database Dictionary, Extended Edition**

    **43**

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    ![](images/00177.png)


    ```

    INSERT S RELATION { TUPLE { S# S#(''S6''),

    SNAME NAME(''Lopez''),

    CITY ''Madrid'' } } ;

    ```


    The relation that’s actually inserted will look like this:


    ```

    RELATION { TUPLE { S# S#(''S6''),

    SNAME NAME(''Lopez''),

    STATUS 10,

    CITY ''Madrid'' } }

    ```


    **Note**: The two expressions in the foregoing example of the form `RELATION {TUPLE
    {. . .}}` are relation selector invocations; each denotes a relation containing
    just one tuple (i.e., a relation of cardinality one). *See* selector.


    ## deferred checking


    Checking an integrity constraint at some time (typically commit time) later than
    the time when an update is performed that might cause it to be violated. The relational
    model rejects deferred checking as logically flawed. *Contrast* immediate checking.


    ## deferred constraint


    An integrity constraint for which the checking is deferred ( *see* deferred checking).
    The relational model rejects deferred constraints as logically flawed. *Contrast*
    immediate constraint.


    ## degree


    The number `n` (`n` ≥ 0) of attributes in a given heading, key, foreign key, tuple,
    tuplevar, relation, or relvar.


    **Examples**: The degrees of relvars `S`, `P`, and `SP` are four, five, and three,
    respectively; the degrees of the corresponding keys are one, one, and two, respectively.


    ## DELETE


    Loosely, an operator that removes a given set of tuples from a given relvar. It’s
    shorthand for a certain relational assignment.


    **Example**: The `DELETE` statement


    ```

    DELETE S WHERE CITY = ''London'' ;

    ```


    is shorthand for the following relational assignment:


    **44**

    **The Relational Database Dictionary, Extended Edition**

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    ![](images/00041.png)


    ```

    S := S WHERE NOT ( CITY = ''London'' ) ;

    ```


    ## DELETE rule


    A foreign key rule, q.v., that specifies the action to be taken by the DBMS if
    some tuple `t2` exists that contains a foreign key value referencing some tuple
    `t1` and—speaking rather loosely ( *see* tuple level)—tuple `t1` is deleted.


    ## denormalization


    Replacing a set of relvars `R1, R2, . . ., Rn` by their join `R`, such that for
    all `i` the projection of `R` on the attributes of `Ri` is guaranteed to be equal
    to `Ri` (`i` = 1, 2, . . ., `n`). Denormalization is usually done for performance
    reasons; however, it has the effect of increasing redundancy, q.v., thereby increasing
    (a) the amount of integrity checking that has to be done, or (b) the likelihood
    that certain update anomalies, q.v., will occur, or (c) both. It can also increase
    the complexity of certain queries.

    *Note*: Denormalization, at least to a level below 5NF, is always contraindicated
    from a logical point of view. Sometimes it can’t be avoided, however, given the
    level of technology found in today’s commercial products.


    **Example**: A denormalization that might be applied to the suppliers-and-parts
    database would be to replace relvars `S` and `SP` by their join (`SSP`, say).
    Relvars `S` and `SP` could then be derived by projecting relvar `SSP` on the attributes
    of `S` and the attributes of `SP`, respectively.


    ## dependant / dependent


    In an FD, the set of attributes on the right side.

    *Contrast* determinant.


    **Example**: In the FD `{S#,P#} → {QTY}`, which is satisfied by relvar `SP`, `{QTY}`
    is the dependant and `{S#,P#}` is the determinant.


    ## dependency


    An IND or JD or MVD or (especially) FD.


    ## dependency preservation


    FD preservation, q.v.


    ## dependency theory


    A body of theory, built on top of the relational model, that can be used to help
    with logical database design (though not limited to that purpose alone).


    ## dereferencing


    *See* referencing.


    **The Relational Database Dictionary, Extended Edition**

    **45**

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    ![](images/00178.png)


    ## derived relation


    Loosely, a relation defined in terms of others. More precisely, let `s` be a set
    of relations. Then relation `r` is derived from those in `s` if and only if it
    doesn’t itself appear in `s` but can be obtained by means of some relational expression
    from those that do. That expression must be such that (a) every relational operand
    is a relation in `s` or one derived from those in `s` and (b) every relational
    operation is one of those defined in this dictionary, other than `EXTEND`, `SUMMARIZE`,
    and the read-only (“what if”) form of `UPDATE`. *Contrast* base relation.

    *Note*: The purpose of the limitation on legal operators in this definition is
    to exclude the possibility of introducing some “completely new” relation (as it
    were) that’s not otherwise derivable from `s`.


    **Example**: Consider the expression `S JOIN SP`. If the current values of relvars
    `S` and `SP` are `s` and `sp`, respectively, this expression defines the derived
    relation that is the join of `s` and `sp`.


    ## derived relvar


    A relvar defined in terms of others by means of some relational expression (in
    particular, a view or snapshot, q.v.). *Contrast* base relvar.


    **Examples**: *See* snapshot; view.


    ## descriptor


    A piece of metadata, describing, for example, a relvar or an attribute or a constraint.


    ## designator


    An expression used in a predicate to designate some specific object (as opposed
    to a parameter). For example, in the predicate “The cardinality of relvar `S`
    is `n`,” the expression “relvar `S`” designates the relation that’s the current
    value of the suppliers relvar (by contrast, `n` is a parameter).


    ## determinant


    In an FD, the set of attributes on the left side. *Contrast* dependant.


    **Example**: *See* dependant.


    **46**

    **The Relational Database Dictionary, Extended Edition**

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    ![](images/00195.png)


    ## difference


    The difference between two relations `r1` and `r2` (in that order), `r1 MINUS
    r2`, where `r1` and `r2` are of the same type `T`, is a relation of type `T` with
