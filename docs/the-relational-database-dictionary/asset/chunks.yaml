    ## equivalence class


    A subset `ss` of some given set `s` with the property that the elements of `ss`
    are (a) all equivalent to one another, under some stated definition of equivalence,
    and (b) not equivalent to any other element of `s,` under that same definition
    of equivalence. (Note the relevance of this concept to relational grouping and
    summarization, q.v.; *see also* image relation.) For a more formal definition,
    *see* equivalence relation.


    *Examples*: 1. Let `s` be the set of all positive integers, and define positive
    integers `x` and `y` to be equivalent if and only if they have the same number
    of digits in conventional decimal notation (no leading zeros). Then the subset
    of `s` containing all one-digit integers is an equivalence class under this definition
    of equivalence; so too are the subsets consisting of all two-digit integers, all
    three-digit integers, and so on. 2. Consider the set of parts currently represented
    by relvar `P`. Define two such parts to be equivalent if and only if they’re of
    the same color. Then the set of all red parts currently represented in `P` is
    an equivalence class under this definition of equivalence; so too are the set
    of all blue parts, and the set of all yellow parts, and so on. 3. Consider the
    set of tuples in the current value of relvar `SP`. Define two such tuples to be
    equivalent if and only if they contain the same `S#` value. Then the set of all
    such tuples for supplier number `S1` is an equivalence class under this definition
    of equivalence; so too are the set of all such tuples for supplier `S2`, and the
    set of all such tuples for supplier `S3`, and so on.


    ## equivalence relation


    Let `r` be a binary relation. Then `r` is an equivalence relation if and only
    if it’s reflexive, symmetric, and transitive, q.v. Further, let `x` be a value
    such that the tuple `<x, y>` appears in `r` for some `y`. Given that value `x,`
    then, the set of all such values `y` is an equivalence class with respect to `r`—namely,
    that specific equivalence class that corresponds to the given value `x` (*see*
    equivalence class). Observe that if `ry` is the set of all values `y` appearing
    in `r,` then every value in `ry` appears in exactly one equivalence class with
    respect to `r`—in other words, equivalence classes are pairwise disjoint, and
    together they partition the pertinent set of values.


