    *仅位于一个城市*。后一个陈述是某些人会称之为业务规则（参见 *business rule*）的一个例子，而且它相当不正式（尤其要注意它依赖于“供应商”、“城市”和“位于”这些概念，而这些概念均未被正式定义）。


    ### 形式运算符（formal operand）

    参数，参见 *parameter*。


    ### 形式系统（formal system）

    逻辑系统，参见 *logical system*。


    ### 公式（formula）

    同合式公式（well-formed formula）。


    ### 第四范式（fourth normal form）

    关系变量 `R` 是第四范式（`4NF`），当且仅当 `R` 所满足的每一个非平凡 MVD 都被 `R` 的某个超键所蕴含；等价地说，当且仅当对于 `R`
    所满足的每一个非平凡 MVD `A →→ B`，`A` 都是 `R` 的一个超键（并且该 MVD `A →→ B` 实际上退化为 FD `A → B`）。每一个
    `4NF` 的关系变量都处于 `BCNF`。*注意*：`4NF` 是针对 MVD 的“那个”范式。另外，虽然处于 `4NF` 显然并不妨碍同时也处于更高的范式（`5NF`），但术语
    *4NF* 常被不严格地用来指代处于 `4NF` 但不处于 `5NF` 的关系变量。


    无论如何，第四范式本身已不再非常重要（`BCNF`、`5NF` 和 `6NF` 是具有最大实际意义的范式）；我们在此提及它主要是出于历史原因。


    **示例：** 如 Boyce/Codd 范式下所述，对于范式而言，展示一个反例通常比展示一个正例更具启发性。因此，考虑关系变量 `CTX`，其属性为 `C`（课程）、`T`（教师）和
    `X`（教材），其谓词是“课程 `C` 可由教师 `T` 讲授，并使用教材 `X` 作为教科书。”假设该关系变量是全键的（即，受限于键约束 `KEY{C,T,X}`）。同时假设对于一门给定的课程，教师集合和教材集合是相互独立的。那么，`CTX`
    等于其在 `{C,T}` 和 `{C,X}` 上的投影的连接——也就是说，它满足 MVD `{C} →→ {T}` 和 `{C} →→ {X}`——因此它可以无损分解为那两个投影。由于这些
    MVD 既非平凡的，也未被唯一的超键（即整个标题）所蕴含，关系变量 `CTX` 不处于 `4NF`，尽管它处于 `BCNF`。


    ### 72


    **关系数据库词典，扩展版**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00214.png)


    ### 自由变量（free variable）

    在逻辑中，指一个变量——更准确地说，是某个谓词内出现的变量引用——它未被绑定；换句话说，是一个参数。（此处术语 *variable* 是在逻辑意义上使用，而非编程语言意义上的。）*对比*
    绑定变量（bound variable）。


    **示例：** 令符号 `x` 和 `y` 表示整数。那么下面两个表达式都是谓词，并且 `x` 在两者中都作为自由变量出现：


    ```

    x < 7

    EXISTS y ( y > 3 ) AND x < 7

    ```


    第一个谓词不言自明。第二个稍微复杂一些，因为它涉及一个量化子表达式（其中 `y` 出现了两次，作为绑定变量）以及自由变量 `x`。


    转向一个数据库示例，下面是一个在供应商-零件数据库上的查询（“获取至少供应一种零件的供应商”），用元组演算表示：


    ```

    S WHERE EXISTS SP ( SP.S# = S.S# )

    ```


    这里关键字 `WHERE` 后面的布尔表达式是一个谓词，其中对 `S` 的引用是自由的（相比之下，对 `SP` 的引用是绑定的）。然而，请注意，在这个特定例子中，符号
    `S` 和 `SP` 不仅表示逻辑意义上的变量，也表示传统编程语言意义上的变量——但那是因为我们可以说是在某种程度上耍了个小花招。以下是同一个示例的扩展版本，应有助于澄清问题：


    ```

    SX RANGES OVER { S } ;

    SPX RANGES OVER { SP } ;

    SX WHERE EXISTS SPX ( SPX.S# = SX.S# )

    ```


    这里 `SX` 和 `SPX` 被显式声明为逻辑意义上的变量，分别遍历（当前值的）关系变量 `S` 和 `SP`。


    **关系数据库词典，扩展版**


    **73**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00036.png)


    现在，对 `SX` 的引用是自由的，而对 `SPX` 的引用是绑定的（在关键字 `WHERE` 之后的谓词中，两种情况皆然）。


    *注意*：令 `VR` 是一个变量引用，它出现在某个元组演算表达式的 `WHERE` 子句之前——即，在原型元组（proto tuple，参见 *proto
    tuple*）中。如果 `VR` 也出现在该 `WHERE` 子句的谓词中（它经常但并非总是如此），那么它在该谓词中必须是自由的，而非绑定的。


    ### 完全 FD（full FD）

    陈旧且有些被弃用（因为稍欠贴切）的术语，指左不可约的 FD（left irreducible FD）。


    ### 完全实例化（full instantiation）

    *参见* 实例化（instantiation）。


    ### 完全依赖（fully dependent）

    陈旧且有些被弃用（因为稍欠贴切）的术语，指不可约地依赖（irreducibly dependent）。


    ### 完全规范化（fully normalized）

    一个数据库是完全规范化的，当且仅当它包含的每一个关系变量都至少处于 `5NF`（即，当且仅当每一个这样的关系变量自身也是完全规范化的）。


    ### 函数（function）

    1.  （*数学*）给定两个集合（不一定不同），一个规则——也称为映射（map 或 mapping）——将第一个集合（定义域）的每个元素与第二个集合（陪域）的恰好一个元素配对；等价地说，是构成该配对的序对
    `<x, y>` 的集合。


    与定义域元素 `x` 对应的陪域中的唯一元素 `y` 是 `x` 在指定函数下的像，而所有这些像的集合是该函数的值域。注意，值域是陪域的一个子集（通常是真子集），并且该函数可被视为从定义域到值域的一个有向关系——实际上，是严格意义上的一对多对应。还要注意，函数是二元关系的一种特例。*另见*
    偏函数（partial function）；全函数（total function）。

    2.  （*编程语言*）一个只读运算符（有时更具体地指由标识符如 `DIV` 表示的运算符，而非由像“/”这样的特殊符号表示）。然而，请注意，这个术语所表示的编程语言结构正是数学意义上的函数；因此，这里实际上只有一个概念，而非两个。还要注意，定义中并未要求定义域和陪域必须是标量集合；因此，一个只读运算符可以依据，比如说，三个参数来定义，在这种情况下，定义域将由一组三元组构成。类似的说明也适用于陪域。


    **示例：** 令 `f` 是将非负整数 `x` 映射到其平方 `x²` 的规则。那么我们可以说 `f` 是一个函数，其（a）定义域和陪域都是所有非负整数的集合，（b）值域是陪域中仅包含完全平方数的那个子集。


    ### 函数依赖（functional dependency）

    一种表达式——实际上是一个命题——形式为 `A → B`，其中决定因素 `A` 和被决定因素 `B` 都是同一个关系变量 `R` 标题的子集，整个表达式读作“`B`
    函数依赖于 `A`”，或“`A` 函数决定 `B`”，或更简单地，就叫“`A` 箭头 `B`”。关系变量 `R` 满足函数依赖（FD）`A → B`——等价地，该
    FD 在关系变量 `R` 中成立——当且仅当，在 `R` 的每一个合法值关系中，每当两个元组在 `A` 上具有相同的值，它们在 `B` 上也具有相同的值（*参见*
    函数 function）。*注意*：函数依赖也被称为函数依赖性（functional dependence）。请注意，在 FD `A → B` 中，`A`
    和 `B` 具体来说是属性的集合；然而，非正式地，常见（尽管严格来说不正确）的说法是，好像 `B` 中的那些属性本身，而不是包含这些属性的集合 `B`，函数依赖于
    `A`。

