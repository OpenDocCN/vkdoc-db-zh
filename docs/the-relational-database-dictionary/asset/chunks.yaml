    *See* type generator.


    # Tuple type inference

    The process of determining the type of the value denoted by a given tuple expression.
    Note that this process is completely specified by the rules defining the types
    of the results of the various tuple operations, q.v.


    # Tuple union

    Let tuples `t1` and `t2` be such that attributes with the same name are of the
    same type and have the same value. Then the tuple union of `t1` and `t2,` `t1
    UNION t2,` is the set theory union of `t1` and `t2`. (This operation could obviously
    be generalized to apply to any number of tuples.)


    ## Note

    Tuple union might reasonably be called tuple join. Also, it would clearly be possible
    to define tuple intersection and tuple difference operators if desired.


    ## Example

    Let `t1` be a tuple from relvar `S` and `t2` a tuple from relvar `SP,` and let
    `t1` and `t2` have the same `S#` component (the same `S#` value in particular).
    Then the expression `t1 UNION t2` yields a tuple of type `TUPLE {S# S#, SNAME
    NAME, STATUS INTEGER, CITY CHAR, P# P#, QTY QTY}`, with components as in `t1`
    or `t2` or both, as applicable.


