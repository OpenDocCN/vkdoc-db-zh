    ### full FD

    Old fashioned and somewhat deprecated (because slightly inappropriate) term for
    a left irreducible FD.


    ### full instantiation

    *See* instantiation.


    ### fully dependent

    Old fashioned and somewhat deprecated (because slightly inappropriate) term for
    irreducibly dependent.


    ### fully normalized

    A database is fully normalized if and only if every relvar it contains is in at
    least `5NF` (i.e., if and only if every such relvar is fully normalized in turn).


    ### function

    1.  (*Mathematics*) Given two sets, not necessarily distinct, a rule—also known
    as a map or mapping—pairing each element of the first set (the domain) with exactly
    one element of the second set (the codomain); equivalently, the set of ordered
    pairs `<x, y>` that constitutes that pairing.


    The unique element `y` of the codomain corresponding to element `x` of the domain
    is the image of `x` under the specified function, and the set of all such images
    is the range of that function. Note that the range is a subset (often a proper
    subset) of the codomain, and the function can be regarded as a directed relationship—in
    fact, a many-to-one correspondence, in the strict sense of that term—from the
    domain to the range. Note too that a function is a special case of a binary relation.
    *See also* partial function; total function.

    2.  (*Programming languages*) A read-only operator (sometimes more specifically
    one denoted by an identifier such as `DIV` instead of by a special symbol such
    as “/”). Note, however, that the programming language construct denoted by this
    term is precisely a function in the mathematical sense; thus, there’s really just
    one concept here, not two. Note also that nothing in the definition requires the
    domain and codomain to be sets of scalars; thus, a read-only operator could be
    defined in terms of, say, three parameters, in which case the domain would consist
    of a set of triples. A similar remark applies to the codomain.


    **Example:** Let `f` be the rule that maps nonnegative integers `x` to their squares
    `x²`. Then we can say that `f` is a function with (a) domain and codomain both
    the set of all nonnegative integers and (b) range that subset of the codomain
    consisting only of perfect squares.


    ### functional dependency

    An expression—actually a proposition—of the form `A → B`, where the determinant
    `A` and the dependant `B` are both subsets of the heading of the same relvar `R`,
    and the expression overall is read as “`B` is functionally dependent on `A`,”
    or “`A` functionally determines `B`,” or, more simply, just “`A` arrow `B`.” Relvar
    `R` satisfies the functional dependency (FD) `A → B`—equivalently, that FD holds
    in relvar `R`—if and only if, in every relation that’s a legal value for `R`,
    whenever two tuples have the same value for `A`, they also have the same value
    for `B` (*see* function). *Note*: Functional dependency is also known as functional
    dependence. Observe that `A` and `B` in the FD `A → B` are, specifically, sets
    of attributes; informally, however, it’s common (though strictly incorrect) to
    speak of the attributes in `B` as if those attributes per se, instead of the set
    `B` that contains those attributes, were functionally dependent on `A`.'
