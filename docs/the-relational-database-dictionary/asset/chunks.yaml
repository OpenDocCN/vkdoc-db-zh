    ## 主域

    设 `R` 为基础关系变量；设 `R` 有一个主键 `K`；设 `K` 是简单键（*参见* 简单键）；并且设 `K` 定义在域（即类型）`D` 上。那么，且仅当此时，`D`
    才是一个主域。*注意*：由于 (a) 它明显违反了可替换性原则，并且 (b) 它依赖于一个从逻辑角度难以证明其合理性的概念——主键（*参见* 主键），主域概念被强烈反对。无论如何，这个术语（或许幸好）并不常用；我们在此提及它主要是出于历史原因。


    `示例`：在供应商-零件数据库的情况下，唯一的主域是 `S#` 和 `P#`。


    ## 主键

    一个因某种原因被挑选出来进行特殊语法处理的候选键。虽然一个给定的关系变量可以有任意数量的候选键，但它最多只能有一个主键。然而，对于一个给定的关系变量，是否要选择某个候选键作为主键，以及如果选择，选哪一个，本质上是心理层面的问题，超出了关系模型本身的范围。*注意*：关系模型最初坚持基础关系变量（至少）应该始终有一个主键。它还坚持外键应专门引用主键。然而，这些规则从未有好的逻辑理由，而且无论如何，适用于基础关系变量而不适用于其他类型关系的规则本身就相当可疑（因为它们违反了可替换性原则）；因此，主键概念可以被舍弃而不会造成严重损失。我们在此提及它主要是出于历史原因。


    ## 码属性

    对键属性（不一定是主键属性）的一种过时且有些被弃用的术语。


    ## 原语运算符

    粗略地说，一个不是用其他运算符定义的运算符。更精确地说，设 `s` 是一个运算符集合。设 `Op` 是 `s` 中的一个运算符，它可以用 `s` 中的其他运算符来定义；将
    `Op` 从 `s` 中移除，并重复此步骤直到无法再重复为止。剩下的就是一个相对于 `s` 的原语运算符集合。请注意，对于给定集合 `s`，其原语运算符集合不一定是唯一的。


    `示例`：1. 对于关系代数，一个原语运算符集合 (a) 肯定会包括投影，(b) 可能会包括连接，但 (c) 可能不会包括半连接（因为半连接可以用投影和连接来定义）。*参见*
    **A**。2. 对于二值逻辑，以下任一运算符集合都可以被视为原语：`{NOT, OR}`；`{NOT, AND}`；`{NOR}`；`{NAND}`。


    **关系数据库词典，扩展版**

    **132**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00162.png)


    ## 谨慎设计原则

    在设计形式系统（包括数据库、`DBMS`、数据库语言和许多其他系统）时的一个指导原则。可以这样表述：当在选项 `A` 和 `B` 之间做设计选择时，如果 `A`
    向上兼容 `B`，并且 `B` 的全部影响尚不明确，那么谨慎的决定是选择 `A`。选择 `A` 允许未来在需要时将设计“开放”给 `B`。相反，选择 `B`
    则禁止未来将设计“收窄”回 `A`，即使这种收窄变得可取（即，如果一开始就明确 `B` 是个坏决定）。


    `示例`：`SQL` 的设计者曾面临禁止重复行（*选项 A*）和允许重复行（*选项 B*）之间的选择。谨慎的决定本应是禁止它们（*选项 A*）；如果未来证明对此类支持有明确需求，他们本可以随后支持它们。不幸的是，设计者选择了允许它们（*选项
    B*）。当然，这个决定后来被证明是非常糟糕的，但现在 `SQL` 已经无法以兼容的方式回到 *选项 A*。*注意*：正如这个例子所示，谨慎设计原则有助于避免这样一种情况：语言（或
    `DBMS`，或数据库，或任何正在设计的东西）提供了某些选项，用户却必须被明确告知不要使用这些选项。


