    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00194.png)


    SX RANGES OVER { S } ;


    SPX RANGES OVER { SP } ;


    SX WHERE EXISTS SPX ( SPX.S# = SX.S# )


    Here for comparison is a relational algebra formulation of the same query: S MATCHING
    SP


    The “matching” here is done on the basis of attribute S# (since that attribute
