    and key constraints that apply to relvar SP, and so SP isn’t in DK/NF; yet it’s
    certainly in 6NF.


    **domain relational calculus Domain calculus, q.v.


    **dot qualification** In tuple calculus and languages based on it, a dot qualified
    name is an expression of the form *rx*. *A,* where *rx* is the name of a range
    variable and *A* is the name of an attribute of the relation *r* over which *rx*
    ranges. Such an expression serves as an attribute reference, q.v.; it denotes
    the value of attribute *A* (or possibly attribute *A* as such) within the particular
    tuple of *r* to which *rx* currently refers. Dot qualification is used for disambiguation
    purposes in tuple calculus—also in SQL—but not in domain calculus or relational
    algebra (these latter use attribute (re)naming and name scoping to achieve an
    equivalent effect).


    **Example*: The following tuple calculus formulation of the query


    “Get suppliers who supply at least one part” makes use of two dot qualified names,
    SPX.S# and SX.S#:


    **The Relational Database Dictionary, Extended Edition**


