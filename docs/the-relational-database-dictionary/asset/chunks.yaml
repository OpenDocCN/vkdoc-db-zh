- fmt: "# The Relational Database Dictionary, Extended Edition\n\n### SQL Tables vs.\
    \ Relational Relations\n\nSQL tables differ from their relational counterparts\
    \ in several key ways:  \n(a) SQL tables can contain duplicate rows;  \n(b) SQL\
    \ tables can contain nulls;  \n(c) SQL tables have a left-to-right column sequence;\
    \  \n(d) SQL tables can have two or more columns with the same name;  \n(e) SQL\
    \ tables can have what are, in effect, columns with no name at all.\n\nMore generally,\
    \ a picture of a relation (on paper, for example). **Note**: Confusion between\
    \ relations and such tabular pictures probably accounts for the popular misconception\
    \ that relations are “flat” or two-dimensional. While it’s obviously true that\
    \ those pictures are two-dimensional, relations in general aren’t; rather, a relation\
    \ of degree `n` is `n`-dimensional, in the sense that its tuples correspond to\
    \ points in some `n`-dimensional space (one dimension for each attribute of the\
    \ relation in question). One specific consequence of such considerations is that\
    \ (again contrary to popular opinion) relations are perfectly capable of representing\
    \ so called multidimensional data and thereby supporting so called online analytical\
    \ processing (OLAP). *See also* `cell`; `column`; `row`.\n\n### table alias\n\n\
    *See* `alias`.\n\n### TABLE_DEE and TABLE_DUM\n\nTwo relation constants, preferably\
    \ built in. `TABLE_DEE` is the unique relation with no attributes and exactly\
    \ one tuple (necessarily the empty tuple); `TABLE_DUM` is the unique relation\
    \ with no attributes and no tuples at all. They can be interpreted as `TRUE` (or\
    \ *yes*) and `FALSE` (or *no*), respectively. (More precisely, the relation predicate\
    \ for `TABLE_DEE` is any 0-place predicate that evaluates to `TRUE`, and the relation\
    \ predicate for `TABLE_DUM` is any 0-place predicate that evaluates to `FALSE`.)\
    \ **Note**: The names are perhaps not very well chosen, since `TABLE_DEE` and\
    \ `TABLE_DUM` are precisely the two relations that are most difficult to picture\
    \ as tables.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00217.png)\n\
    \n### tables and views / tables or views\n\nPhrases that often appear in SQL contexts\
    \ and strongly suggest that views are somehow different from tables. But the whole\
    \ point about views is that (in SQL terms) they *are* tables—just as, in mathematics,\
    \ the whole point about a set that’s (e.g.) the union or intersection of two sets\
    \ is that it is itself a set. Views should “look and feel” just like base tables\
    \ to the user (The Principle of Interchangeability translated into SQL terms).\n\
    \n### target key\n\n*See* `foreign key`.\n\n### target relvar\n\n1. ( *In an `IND`*)\
    \ For the general meaning, *see* inclusion dependency. In the foreign key context\
    \ in particular, the term is sometimes used as a synonym for `referenced relvar`,\
    \ q.v.\n2. ( *In an assignment*) The relvar being updated in a relational assignment\
    \ operation.\n\n### target tuple\n\nTerm sometimes used in the foreign key context\
    \ as a synonym for `referenced tuple`, q.v.\n\n### tautology\n\nA predicate whose\
    \ every possible invocation is guaranteed to yield `TRUE`, regardless of what\
    \ arguments are substituted for its parameters. *Contrast* `contradiction`.\n\n\
    **Examples**: Let `p1` be the predicate (actually a proposition) `2+2 = 4`; let\
    \ `p2` be the predicate `x = x`, where `x` denotes an arbitrary integer; and let\
    \ `p3` be the predicate `(p) OR (NOT(p))`, where `p` denotes an arbitrary proposition.\
    \ Then `p1`, `p2`, and `p3` are all tautologies.\n\n### TCLOSE\n\n*See* `transitive\
    \ closure`.\n\n### temporal database\n\nA database in which at least one of the\
    \ relvars is temporal (where a temporal relvar is one whose heading includes at\
    \ least one attribute of some timestamp type, implying that the corresponding\
    \ relvar predicate has at least one parameter of some timestamp type).\n\nA variety\
    \ of special operators can be defined to help with the management of such databases—see\
    \ the book *Temporal Data and the Relational Model*, by C. J. Date, Hugh Darwen,\
    \ and Nikos A. Lorentzos (Morgan Kaufmann, 2003)—but all of those operators are,\
    \ in the final analysis, shorthand for operators that can be defined in terms\
    \ of the relational algebra as originally defined."
