  ## 第 5 章


  ![image](img/frontdot.jpg)


  开发数据模型




  ### 属性、类还是关系？


  在之前的章节中，你已经看到了如何通过考虑系统用户需要执行的任务来确定数据库问题的需求。任务用用例表示，并开发了一个简单的数据模型来表示所需的数据。在第 4 章中，你看到通过质疑简单关系的一些细节（特别是关系两端涉及的对象数量）可以学到很多关于问题的知识。在本章中，你将了解到几个经常出现的问题，以扩大你解决棘手情况的“武器库”。


  ##### 属性、类或关系？


  永远不可能说某个给定的数据模型是*唯一*正确的。我们只能说它在给定范围内满足了问题的需求，并且基于某些假设或近似。如果我们有一段描述某个人、物或事件的数据，可能有不同的方式来表示该信息。在本节中，我们将看一个简单的问题，如示例
  5-1 所述，其中各种数据片段可以根据问题的总体需求表示为属性、类或关系。


  ##### 示例 5-1：体育俱乐部


  假设我们正在维护一个体育俱乐部当前队伍的信息。俱乐部希望保留非常简单的记录，包括队名、级别和队长。作为开始，我们可以有一个类来包含这些信息，如图 5-1 所示。


  ![9781430242093_Fig05-01.tif](img/9781430242093_Fig05-01_fmt.jpeg)


  **图 5-1**。队伍的简单类


  在图 5-1 中，我们为队伍捕获的每一条信息——名称、级别和队长的名字——都表示为一个属性。使用这个模型，我们可以找到任何给定队伍的属性值，但这就是我们能做的全部了。当然，这可能就是我们想做的全部！


  在之前的章节中，我们看到考虑存储的数据未来如何使用是很重要的。对于图 5-1 中的数据，我们很可能希望找到某个级别的所有队伍。简单的数据模型允许这样做吗？当然可以找到所有具有给定`grade`属性值的`Team`对象；然而，为了获得可靠的数据，我们需要数据录入完全准确。如果不同对象的`grade`属性值被分别记录为“Senior”、“snr”、“Sen
  Grade”、“Senior Grd”等，我们就无法获得 Senior 级别的所有队伍的准确列表。我们在示例 2-1 中看到了类似的问题，当时我们想确保植物属信息（如*Eucalyptus*）的拼写始终正确。如果可靠地记录和提取关于级别的信息对我们的体育俱乐部很重要，那么我们需要一个能确保级别被一致记录的数据模型。这可以通过将队伍的级别表示为一个类来实现，如图
  5-2 所示。每个可能的级别都成为`Grade`类的一个对象，每个队伍都与相应的`Grade`对象相关联。


  ![9781430242093_Fig05-02.tif](img/9781430242093_Fig05-02_fmt.jpeg)


  **图 5-2.** 将队伍级别表示为一个类


  因此，根据项目的需求，我们可以选择将级别表示为`Team`的一个属性（如果拼写的一致性不重要），或者表示为它自己的一个类（例如，如果我们认为可能想要查找属于同一级别的所有队伍）。


  现在考虑图 5-1 中的`captain`属性。一个人不太可能同时担任多支队伍的队长，因此类似于上一节中的查询（查找 Jenny 目前担任队长的所有队伍）不太可能是一个高优先级需求。然而，我们可能希望保存一些关于队长的额外数据：也许是她的电话号码和地址。在体育俱乐部的背景下，这些信息很可能已经存在于某个会员名单中。我们很可能有另一个类`Member`，它保存了体育俱乐部所有会员的联系信息。如果是这样，我们可以将队伍的队长表示为`Team`和`Member`类之间的关系，如图
  5-3 所示。一个特定的`Member`对象是一个`Team`对象的队长。


  ![9781430242093_Fig05-03.tif](img/9781430242093_Fig05-03_fmt.jpeg)


  **图 5-3.** 将队长表示为一个关系


  再次，根据问题的不同，我们有不同的方式来表示队伍的队长。我们可以选择将队长表示为`Team`的一个属性，或者表示为`Member`和`Team`之间的关系。这里的决定因素将是问题是否需要关于会员的一般信息。


  在考虑是否将信息表示为属性、类或关系时，可以问一些有用的问题，总结如下：


  *   “我是否可能想要使用某个给定的信息片段进行汇总、分组或选择？” 例如，你是否可能想根据级别选择队伍？如果是，请考虑将该信息片段变成一个类。

  *   “我现在或将来是否可能存储关于这个信息片段的其他数据？” 例如，你是否可能想保存队长的电话和地址等信息？这些信息是否（或应该）已经存在于另一个类中？如果是，请考虑将该信息片段表示为类之间的关系。


  ### 类之间的两个或更多关系


  如果我们还想保存关于为一支队伍打球的人的信息，图 5-3 中的模型将如何改变？我们可能需要知道他们的名字和电话号码。将所有信息作为`Team`类的属性保存将很快变得难以处理。我们将需要诸如`player1Name`、`player1Phone`等属性。我们很可能已经在一个`Member`类中拥有了我们需要的关于球员的信息。特定会员为特定队伍效力这一事实因此可以表示为类之间的关系。这与示例
  2-1 中植物对象与特定用途对象相关联的情况非常相似。图 5-4 展示了在我们的数据模型中添加的`Member`和`Team`之间的这种关系。


  ![9781430242093_Fig05-04.tif](img/9781430242093_Fig05-04_fmt.jpeg)


  **图 5-4.** Member 和 Team 之间的不同关系


  现在在我们的`Member`和`Team`类之间有两个关系。一个是关于哪些会员为队伍效力（可能有很多）。另一个是关于哪个会员是队伍的队长（只有一个）。图 5-4
  中的模型也允许有不为任何队伍效力或担任任何队伍队长的会员（他们可能是俱乐部的社交会员）。这样的会员将简单地不与任何队伍关联。




  你可能在想，团队的队长是否应该始终是团队中的一员。如图 5-4 所示的模型，并未对此类约束给出任何说明。有多种方式可以表示此类约束。一种可能是将约束纳入相关的用例中。对于描述录入团队信息的用例，我们会规定队长必须是团队成员之一。由对象管理组开发的*对象约束语言（OCL）*^(1)，作为对统一建模语言（UML）的补充，为约束提供了形式化规范。在本书中，我将不深入探讨形式化方法，而更倾向于在用例文本中指出这些额外的约束。


  另一种可能需要考虑类之间存在两种关系的情况是当我们拥有历史数据时。示例 5-2 重新审视了我们在第 4 章中首次探讨的`Rooms`（房间）、`Groups`（团体）和`Guests`（客人）示例。


  **示例 5-2：小型旅社**


  一个小型旅社由单人房组成。通常，团体（如学校班级）会住在该旅社。我们将扩展第 4 章的问题，保留以往客人和当前客人的信息。一个房间随着时间的推移会有许多客人入住。（为简化，我们假设每位客人只入住一次，且只住一间房。）修改后的模型如图
  5-5 所示。


  ![9781430242093_Fig05-05.tif](img/9781430242093_Fig05-05_fmt.jpeg)


  图 5-5. 单人房随时间拥有多个客人的模型


  该旅社主要接待团体游客，因此入住和退房日期属于团体信息，而非每位客人个人。


  我们能从图 5-5 的模型中发现什么？如果我们想查询某位客人，可以轻松找到其房号，还可以通过查看相关团体对象的日期来确定其入住时长。如果我们想找出当前占用某房间的客人姓名（比如有噪音投诉），事情就变得稍微复杂一些。每个房间随着时间的推移关联的客人越来越多，那么我们该如何找到当前这位客人呢？一种方法是搜索与该房间关联的所有客人，并检查他们相关的团体信息，以找到一个`date_out`（退房日期）在未来的记录。另一个可能的任务是检索空房列表。为此，我们必须找出那些没有关联`date_out`在未来的团体的客人居住的房间。


  这些解决方案是可行的，但对于可能需要定期执行的任务来说，它们既复杂又繁琐。另一种选择是考虑在`Room`（房间）和`Guest`（客人）之间为*当前*客人建立第二种关系。所有客人都将像图
  5-5 中那样与一个房间关联，但我们在当前客人与房间之间增加一个额外的关系。如图 5-6 所示。


  ![9781430242093_Fig05-06.tif](img/9781430242093_Fig05-06_fmt.jpeg)


  图 5-6. 房间随时间拥有多个客人的替代模型


  使用图 5-6 的数据模型，我们只需参考两个类（`Room`和`Guest`）的对象即可找到当前客人。而使用图 5-5 的模型，我们还需要检查`Group`对象的日期属性值。要查找空房，我们现在只需查找所有没有当前客人的房间即可。


  以这种方式建模数据存在一些问题，因为需要额外的更新来保持数据一致性。例如，当一个团体退房时，我们必须更新`Group`中的`date_out`，同时还需要移除每个*当前入住*关系实例，以反映房间现在为空。这个额外的维护步骤是因为我们实际上以不止一种方式存储了同一信息。虽然图
  5-6 的模型在*检索*空房和当前客人信息时更简单，但数据的*更新*却更复杂。表 5-1 展示了针对团体退房以及为每种数据模型列出当前所有空房报告的可能用例。


  表 5-1. 两种客人与房间模型的一些可能用例对比


  |   | **使用图 5-5 的数据模型** | **使用图 5-6 的数据模型** |

  | :--- | :--- | :--- |

  | 团体退房 | 更新相应`Group`对象的`date_out`。 | 更新相应`Group`对象的`date_out`。查找所有关联的`Guest`对象，并移除与`Room`对象的*当前入住*关联。
  |

  | 列出所有当前空房 | 首先找出被占用的房间：查找所有`date_out`在未来的`Group`对象。找出这些团体的所有关联`Guest`对象，以及这些客人关联的所有`Room`对象的集合。列出*未*包含在此集合中的所有`Room`对象的`room_number`。
  | 查找所有没有关联当前`Guest`对象的`Room`对象。 |


  很明显，对于图 5-6 这类模型，报告生成更简单；而对于图 5-5 这类模型，维护更简单。图 5-6 模型的问题在于，如果团体退房时所需的更新操作没有正确执行，最终会导致数据库信息不一致。虽然图
  5-6 的模型看起来更容易查询，但这是以增加维护难度、从而更可能损害可靠性为代价的。正如你将在下一节看到的，最好避免信息被存储不止一次的情况。


  至此，我们意识到，如果我们想保留房间占用的历史数据，那么图 5-5 或 5-6 中的模型对于旅社问题都不算特别好。第 4 章讨论的方案允许我们保留哪些团体曾入住旅社、客人是谁以及房间当前居住者的信息。这些都运作良好。一旦我们尝试添加关于房间占用的历史数据，模型就变得难以管理。第
  4 章的“测试你的理解”部分提出了另一种解决方案。


  ### 类之间的不同路径


  使用图 5-6 的模型，我们可以通过两种路径找到房间的当前客人：通过*当前入住*关系，或者通过检查每位曾入住该房间客人的`date_out`日期。这里的问题是，如果数据维护不当，我们可能会得到两个不同的答案。例如，如果一个团体退房了，但我们没有移除所有*当前入住*关联（如表
  5-1 中的用例），那么第一条路径会给出房间的前一位客人，而第二条路径则会显示该房间为空。



  ### 冗余、陷阱与数据模型


  正如前一节所论证的，易于检索的优势似乎可能超过随之而来的数据维护复杂性。我们应不惜一切代价避免的是，当没有相应的复杂性降低时，为一条信息提供替代路径。


  #### 冗余信息


  本应相同的信息通过两种不同路径获取，可被称为 **冗余信息**。在上一节中，关于当前房间住户的信息就是冗余的。我们可以通过检查 `is currently in`
  关系来找到当前住户，或者通过查看团队的退房日期来推断当前住户。


  让我们看一下示例 5-3，这是冗余信息的另一个案例。


  ##### 示例 5-3：创业孵化器


  一家创业孵化器有若干员工，他们各自为一个或多个小型项目团队工作。每个团队及其所有员工都安置在一个特定的房间里，较大的房间会容纳多个团队。我们可能需要诸如每位员工的工位在哪里、特定员工的电话号码、某个团队在哪里、哪些员工在每个团队中、谁在每个房间等信息。一种可能的数据模型如图
  5-7 所示。花点时间理解这个数据模型及其所包含的关于特定问题（如一个房间内有多少团队等）的信息。该模型存在冗余信息。你能看出来吗？


  ![9781430242093_Fig05-07.tif](img/9781430242093_Fig05-07_fmt.jpeg)


  ***图 5-7.** 包含冗余关系的员工、团队和房间*


  关于示例 5-3，如果我们经常需要查找员工的电话号码，可能会认为图 5-7 中 `Employee` 和 `Room` 之间的顶部关系是一个有用的直接路径。然而，通过
  `Group` 的替代路径，同样可以非常容易地获得此信息。我们可以找到该员工（唯一）所属的团队，然后找到该团队（唯一）所在的房间。这是一个非常简单的检索过程（它不涉及困扰示例
  5-2 中那家小旅馆的日期相关复杂问题）。


  然而，这个额外关系不仅是不必要的，而且是危险的。对于相同信息有两条路径，我们有可能得到两个不同的答案，除非数据得到非常仔细的维护。每当员工更换团队或团队转移房间时，都需要更新两个关系实例。如果没有非常仔细的更新流程，我们最终可能会得到“Jim
  在 A 团队，A 团队在 12 号房间”，而另一条路径可能直接将 Jim 关联到 15 号房间。**冗余信息容易导致不一致，应始终予以移除。**


  > **注意** 每当数据模型中存在封闭路径时（如图 5-7），值得仔细检查以确保没有关系是冗余的。


  #### 提供不同信息的路径


  并非所有封闭路径都必然意味着数据冗余。其中一条路径可能包含不同的信息。稍微修改示例 5-3 中的问题，允许一名员工为多个小型项目团队工作。如图 5-8 所示。现在你能推断出某位员工在哪个房间吗？


  ![9781430242093_Fig05-08.tif](img/9781430242093_Fig05-08_fmt.jpeg)


  ***图 5-8.** 为多个项目团队工作的员工*


  在图 5-8 的模型中，没有确定明确的路径连接员工和特定房间。例如，A 团队可能在 12 号房间，B 团队在 16 号房间，而 Jim 可能同时为两个团队工作。因此，Jim
  可能在 12 号房间，也可能在 16 号房间。仅仅缩小这种可能性可能就是问题所需的全部。然而，如果每位员工有一个主办公室，而我们希望记录该信息，就需要在员工和房间之间建立一个额外的关系，如图
  5-9 所示。


  ![9781430242093_Fig05-09.tif](img/9781430242093_Fig05-09_fmt.jpeg)


  **图 5-9.** 不同的路径提供不同的信息。


  看起来我们似乎引入了另一条路径，对于诸如“Jim 在哪个房间？”这样的问题会给出不同的答案。图 5-9 允许我们让 Jim 的办公室不同于他工作的任何一个团队所在的房间。对于现实生活中的问题，这可能正是所需要的。房间的大小和团队的员工数量不太可能总是匹配。重要的是确保两条路径不包含本应相同的信息，这样我们就不会引入可避免的不一致性。


  #### 路径产生的虚假信息（扇形陷阱）


  无法从图 5-8 推断出员工的房间，是一个更普遍问题的例子。请看示例 5-4。


  ##### 示例 5-4：更大的组织


  一个组织有多个部门。每个部门拥有许多员工，并进一步划分为若干团队。我们可以将其建模为图 5-10。看看这个模型。关于特定员工与哪个（或哪些）团队相关联，我们能推断出什么？


  ![9781430242093_Fig05-10.tif](img/9781430242093_Fig05-10_fmt.jpeg)


  **图 5-10.** 对组织进行建模的一种（危险）方式


  图 5-10 代表了一个非常常见的问题，通常被称为 **扇形陷阱**。这里的危险在于，沿着员工和团队之间的路径进行推断，可能会得出并非本意的结论。图 5-11
  展示了一些与图 5-10 模型一致的可能对象实例。


  ![9781430242093_Fig05-11.eps](img/9781430242093_Fig05-11_fmt.png)


  **图 5-11.** 一个扇形陷阱


  考虑员工 Jim 和 Sue。无法推断 Jim 或 Sue 在哪些团队工作。只能得到许多共享同一部门的 `Group` 对象和 `Employee` 对象的组合：Jim
  A、Jim B、Sue B、Jane D 等等。^(2) 我们绝不能将这些组合误认为是所需的信息——例如，Jane 属于哪个（或哪些）团队？


  让我们意识到扇形陷阱的特征是：一个类在两端具有“多”基数性的两个关系。这导致了图 5-11 中的扇形形状。


  我们能对此做些什么？如果系统能够显示员工工作的团队对我们很重要，那么我们需要在 `Group` 和 `Employee` 之间建立另一种关系，或者我们可能需要以完全不同的方式建模该问题（如下一节所示）。


  #### 类之间路径的缺口（峡谷陷阱）


  我们可能会选择以层次结构的方式对部门、团队和员工之间的关系进行建模，如图 5-12（即一个部门拥有多个团队，一个团队拥有多名员工）。员工-团队关系一端的可选性尚未指定。思考一下不同的可能性。


  ![9781430242093_Fig05-12.tif](img/9781430242093_Fig05-12_fmt.jpeg)


  **图 5-12.** 对组织建模的另一种方式



  图 5-13 展示了一些示例对象。我们有一个员工与一个单一组之间的直接联系（Jim 在 A 组工作），以及另一个组与其所属的一个部门之间的联系（A 组属于 1
  部门）。因此，我们可以在 Jim 和 1 部门之间建立明确且唯一的联系。


  ![9781430242093_Fig05-13.eps](img/9781430242093_Fig05-13_fmt.png)


  图 5-13. 一个 `断层陷阱`


  到目前为止，一切顺利。然而，在类似情况下，检查这种联系是否始终存在总是有用的。如果 Ann 没有分配到具体的组呢？也许她是 1 部门的总管理员，为所有组服务。如果一个员工不一定属于某个组，那么图
  5-12 中的模型就无法提供 Ann 与其部门之间的链接。要找到合适的 `部门` 对象，我们需要知道其所在的 `组`，但 Ann 没有相关的 `组` 对象。如果我们需要知道这个信息，那就有问题了。这有时被称为
  `断层陷阱`（我们无法从这里到达那里）。


  这又是一个通过仔细研究数据模型而对问题提出有趣疑问的案例。对于像图 5-12 这样的模型，我们应该始终检查员工可能未附加到任何组的特殊情况。


  如何解决 `断层陷阱` 问题取决于我们正在建模的情况。一种可能是在部门和员工之间添加另一个关系，这样我们总是可以建立那种联系。然而，这种额外的关系会导致信息冗余。对于许多员工来说，我们将有两种方式将他们与部门联系起来：直接联系和通过其所在的组联系。这就是我们在示例
  5-3 中遇到的情况，并可能导致连接员工和部门的结果不一致。**不推荐**。


  在示例 5-4 中解决问题的另一种方法是引入另一个组对象（管理或辅助人员）。Ann 可以属于这个组，然后我们可以坚持每个员工 `必须` 属于一个组。然而，也许这个问题需要完全重新建模。通常最好回到用例，重新考虑对问题而言什么信息是最重要的。在资源有限的项目中，不可能捕捉到每一个细节，因此务实主义变得非常重要。


  #### 同类对象之间的关系


  让我们回到示例 5-1 中的体育俱乐部。许多俱乐部要求新成员由现有成员介绍或担保。如果需要存储担保信息，数据模型的初步尝试可能如图 5-14 所示。


  ![9781430242093_Fig05-14.tif](img/9781430242093_Fig05-14_fmt.jpeg)


  图 5-14. 对成员和担保人建模（不正确）


  图 5-14 中模型的问题在于（根据定义）担保人是成员。该模型意味着，如果 Jim 担保俱乐部的一名新成员，我们将为他存储两个对象（一个在 `成员` 类中，一个在
  `担保人` 类中），两者可能包含相同的信息（直到不可避免地变得不一致）。这里真正发生的是成员相互担保。这可以通过如图 5-15 所示的 `自关联` 来表示。


  ![9781430242093_Fig05-15.tif](img/9781430242093_Fig05-15_fmt.jpeg)


  图 5-15. 成员担保其他成员


  图 5-15 中的关系读起来与两个不同类之间的关系完全一样。顺时针阅读，我们有 *一个特定成员可以担保许多成员*，而逆时针阅读，我们有 *一个特定成员恰好由一个成员担保*。与所有关系一样，我们必须根据方向改变动词（即
  *担保* 和 *由...担保*）。我已经在图 5-15 上做了标注，以消除关于我们朝哪个方向进行的任何困惑。


  这个数据模型中没有任何内容阻止成员担保自己。此类约束需要被记录下来，最有效的方法是在适当的用例中提及它们（例如，添加成员时）。


  `自关联` 出现在很多情况中。对于与谱系或动物育种相关的数据来说尤其如此。考虑图 5-16 中的情况，我们记录有关动物及其母亲的信息（为了让例子简单，我省略了父亲！）。


  ![9781430242093_Fig05-16.tif](img/9781430242093_Fig05-16_fmt.jpeg)


  图 5-16. 关于动物的谱系数据


  顺时针阅读，我们有 *一只动物可能是多只其他动物的母亲*，而逆时针阅读，我们有 *每只动物最多有一位母亲*。为什么不是 *恰好* 一位母亲？每只动物都应该有妈妈，不是吗？这就是我们必须非常清楚我们的类定义的地方。`动物`
  类代表那些我们正在保存其数据的动物，而不是所有动物。例如，如果我们追溯一只纯种狗的血统，我们可能会在我们的数据库中找到他的母亲，以及她的母亲，但最终我们会找到一片空白。你可能会争辩说，为了完整性应该添加额外的世代，但这可能意味着要追溯到原始的泥浆。我们的数据模型并不是说
  *有些动物没有母亲*，而仅仅是说 *有些动物没有记录在我们数据库中的母亲*。


  顺便说一句，请注意，我们的 `动物` 类可能包含两种性别的动物。显然，如果我们确定两个 `动物` 对象之间存在 `是...的母亲` 关系，那么母亲必须是雌性。就目前而言，模型中没有任何内容阻止雄性动物被记录为母亲。这种约束可以在用例中表达，但如果这是一个严肃的谱系数据库，我们可能希望对雄性和雌性进行稍微不同的处理。我们将在第
  6 章 中讨论如何使用称为 `泛化` 和 `特化` 的技术来处理此类情况。


  #### 涉及两个以上类的关系


  在到目前为止的例子中，我们感兴趣的信息通常涉及两个类之间的关系（例如，哪些成员在哪个队中，或哪个员工在哪个组中）。有时我们的数据依赖于两个以上类的对象。让我们重新考虑一个体育俱乐部。除了保存有关成员及其当前队伍的数据外，我们可能还想保存有关队伍之间比赛的信息。现在忽略像轮空这样的复杂情况，^(3)
  我们可以说一场比赛恰好有两支队伍参加。一个可能的数据模型如图 5-17 所示。


  ![9781430242093_Fig05-17.tif](img/9781430242093_Fig05-17_fmt.jpeg)


  图 5-17. 成员、队伍和比赛的可能数据模型




  图 5-17 中的模型允许我们记录一名球员当前或所属的主要球队、特定球队的当前成员，以及球队参与的比赛。然而，我们无法推断出特定球员是否参加了某场给定的比赛（他可能因病或受伤）。这就是本章前面描述的*扇形陷阱*的一个例子。一支球队有许多球员，并参与多场比赛，但我们无法进一步说明哪些球员参与了特定的比赛。我们可以尝试通过添加`Member`和`Match`之间的关系来解决这个问题，如图
  5-18 所示。仔细看看这个新的数据模型。你能看出数据可能在哪里变得不一致吗？


  ![9781430242093_Fig05-18.tif](img/9781430242093_Fig05-18_fmt.jpeg)


  图 5-18. 另一种表示成员、球队和比赛的模型


  从图 5-18 来看，可能存在以下关系实例：


  *   约翰为 A 队效力。

  *   约翰参加了周二的比赛。

  *   周二的比赛在 B 队和 C 队之间进行。


  如果约翰只效力于一支球队（如模型所示），那么这里就有些不对劲了。


  让我们进一步思考一下成员、球队和比赛这个问题。如果我们想跟踪谁参加了哪些比赛，我们的问题有一些复杂性，而模型未能充分表示。如果我们允许人员受伤不参赛，我们还需要考虑另一队人员可能需要替补的情况。例如，约翰通常为
  A 队效力，但周二因为斯科特受伤而为 B 队替补。我们在前一段中的情景并不那么奇怪——只是比我们最初想的稍微复杂一些。


  然而，我们仍然有一个问题。我们满意约翰通常为 A 队效力，而且他恰好参加了周二 B 队与 C 队之间的比赛，但模型并没有告诉我们他是为哪支队伍比赛的。


  我们需要退一步，重新审视用例，并弄清楚我们到底想知道什么。如果我们想知道每场比赛中每支队伍的确切上场球员，那么图 5-18 中的任何关系组合都无法告诉我们这一点。关键点在于，谁在哪个比赛中为哪支队伍效力，需要同时知晓来自三个类的对象信息：哪个`Member`，哪个`Team`，以及哪个`Match`。这有时被称为*三元关系*（类似地，四个类称为四元关系，依此类推）。


  当我们需要的信息要求同时知晓来自三个（或更多）类的对象时，我们就引入一个新的类，连接到所有三个类，如图 5-19 所示。


  ![9781430242093_Fig05-19.tif](img/9781430242093_Fig05-19_fmt.jpeg)


  图 5-19. 成员及其在特定比赛中所效力的球队


  我们或许能为这个类想一个合适的名字；在这个例子中，`Appearance`是合理的。如果想不到，将其他三个类名连接起来也足够（例如，`Team/Member/Match`）。这与我们在第
  4 章中考虑的多对多关系中引入新类并无不同。与那种情况类似，每个外部类的基数为 1。


  解读这个模型，我们得到类似这样的信息：每次出场涉及一名成员、一支球队和一场比赛（例如，吉姆在 12 日星期六的比赛中为 A 队出场）；每名成员可能有多次出场（吉姆可以参加多场比赛，可能为不同的球队）；一支球队会有多名球员在不同比赛中出场；一场比赛会有多名球员为每支队伍出场。


  新类可能有属性，也可能没有。它可能只是`Member`、`Team`和`Match`对象有效组合的存放处。如果新类有属性，它们必须是涉及所有三个类的信息。例如，关于特定球员在特定比赛中为特定球队效力，我们需要知道什么？可能是位置。如果我们想知道吉姆在
  12 日星期六的比赛中为 A 队担任后卫，我们的新类就是记录该信息的地方。


  图 5-19 显然包含了一些无法从图 5-18 推断出的额外信息。反之呢？我们能从图 5-19 重新创建出图 5-18 中的所有信息吗？通过查看图 5-19，我们可以推断出一个球员效力过的所有球队、参加过的所有比赛，以及每场比赛涉及的球队。我们不需要在每对类之间添加额外的关系来弄清楚这些信息。事实上，这样做是危险的，因为那样我们就会有两条途径来查找一条信息，而且正如我们所看到的，这种冗余可能导致不一致。然而，可能还有关于每对类的其他信息我们希望保留。例如，在图
  5-19 中，我们知道吉姆效力过的所有球队，但我们不知道他通常与哪支球队一起训练。除了与新类的关系外，三个类之间可能还需要一些二元关系。


  每当我们遇到类似图 5-19 的模式时，我们应该检查其他二元关系是否必要。如果我们有类 A、B 和 C 连接到第三个类，对于每一对类，我们应该问一个问题，比如：“是否存在我需要知道的关于
  A 和 B 之间关系的信息，而这个信息独立于 C？”对于前面的例子，我们可以问：“是否存在我需要知道的关于球员和球队的信息，而这个信息独立于比赛？”这里的答案会是：“是的。我想知道球员的主要球队。”因此，我们会添加一个二元关系来表示该信息，如图
  5-20 所示。


  ![9781430242093_Fig05-20.tif](img/9781430242093_Fig05-20_fmt.jpeg)


  图 5-20. 包含一个独立于某一类的二元关系


  我们需要为其他每种组合提出类似的问题；例如，“关于特定球队和特定比赛，我需要知道什么独立于成员的信息？”也许是获胜球队。“关于特定成员和特定比赛，我需要知道什么独立于球队的信息？”也许是裁判是谁。


  ### 总结


  本章描述了一系列常见的建模情况。研究这些情况有助于更精确地理解和表示现实问题。这些情况总结如下：




  '
- '# 属性、类，还是关系？


  以下是一些有助于你决策的问题示例。

  `我是否会想根据属性的值来选择对象？` 例如，你是否会想根据年级来选择队伍？如果是，请考虑为该信息引入一个类（创建一个年级类）。

  `我现在或将来是否可能为此信息存储其他数据？` 例如，我是否想保存关于队长的额外信息：电话、地址等？如果是，请考虑引入一个类。

  `我是否已经在存储（或者应该存储）此类信息？` 例如，关于队长的信息与关于成员的信息相同或相似。请考虑现有类之间的关系。


  '
- '# 两个类之间的多种关系


  如果涉及两个类的信息是不同的，请考虑它们之间存在多种关系。例如，一个成员可能为一支队伍`效力`，`担任`一支队伍的队长，`管理`一支队伍，等等。


  '
- '# 考虑自关系


  一个类的对象可以彼此相关。例如，成员`推荐`其他成员，人`是`其他人`的父母`。


  ### 类之间的不同路径


  检查任何存在闭环的地方，以确保相同的信息不会被重复存储。

  检查并确保你没有从一条路径推断出过多的信息；也就是说，要注意扇形陷阱，即一个类与两个其他类相关，并且两个外端的基数都是多对多。

  检查并确保所有对象都有可用的路径；也就是说，要注意深渊陷阱（该路径上是否存在可选的关系？）。


  '
- '# 依赖于三个或更多类对象的信息


  当你需要同时了解来自三个或更多类的对象的组合时，考虑引入一个新类；例如，哪个成员在哪场比赛中为哪支队伍效力？

  新类中的任何属性必须依赖于来自*每个*参与类的特定对象组合；例如，关于特定`成员`在特定`队伍`的特定`比赛`中，我需要了解什么？

  考虑什么信息可能与来自贡献类*对*的两个对象相关；例如，关于特定成员和特定队伍，*独立于*任何比赛，我需要了解什么？


