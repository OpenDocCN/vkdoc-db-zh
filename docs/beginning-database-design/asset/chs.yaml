  *   我们使用主键字段通过外键来表示类之间的关系。\n```\n\n\n\n### 数据库规范化\n\n在这一阶段，一切看起来可能完全正常，但也可能，我们的模型中有些类（或数据库中的表）仍可能给我们带来问题。规范化是一种正式的方法，用于检查字段是否位于正确的表中，或者我们是否可能需要重组或增加额外的表来帮助保持数据的准确性。规范化最初的想法由\
  \ E. F. Codd ¹ 于 1970 年首次提出，并从那时起一直作为关系数据库设计的基石。本书的一些读者可能会惊恐地举手抗议，我竟然把这个重要主题留到第\
  \ 8 章才讲。然而，实际上我们从示例 1-1 开始就在对数据库进行规范化，当时我们看到需要两个类来保存关于植物及其用途的信息。\n\n在本章中，我们将首先探讨为何所有属性都必须在正确的表中至关重要，以及规范化如何帮助我们确保这一点。\n\
  \n#### 更新异常\n\n让我们看一个简单的例子，其中属性位于错误的表中可能会在维护数据时导致若干问题。假设我们有一个数据库，用于维护公司许多不同方面的信息。可能会有几个表用于维护客户、产品、订单、供应商等，还有两个表如图\
