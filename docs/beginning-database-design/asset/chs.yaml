- '# 初始需求与用例


  在本章中，我们将考虑从现实世界问题到最终现实世界解决方案的第一步，如第 2 章所述。首先，我们需要确保自己真正理解了问题。这听起来可能显而易见，但令人惊讶的是，人们经常在完全理解问题之前就开始着手实施数据库。我们需要做两件事：理解系统所有用户需要执行的任务，然后弄清楚需要存储什么数据来支持这些任务。如图
  3-1 所示的用例和类图，是开始整合我们对问题理解的好方法。


  ![9781430242093_Fig03-01.eps](img/9781430242093_Fig03-01_fmt.png)


  ***图 3-1**. 第一步：为现实世界问题开发一个抽象模型*


  首先，我们必须*完全*理解真正的问题。仅仅对业务、俱乐部或科学家所做的事情有一个粗略的了解是不够的。我最喜欢的引述之一来自 Peter Coad 和 Ed Yourdon
  的书*《面向对象分析》*^(1)，其中他们对分析空中交通控制系统有如下说法：


  *分析师需要将自己沉浸于问题领域中，其深度要达到他开始发现一些细微差别，而这些差别甚至连每天与空中交通管制打交道的人都未曾完全考虑过。*


  虽然相关人员是他们特定现实世界问题的专家，但他们很少需要以抽象的方式思考细节。例外和异常情况可以在出现时直接“处理”。在人工系统中，有人可以草草记下笔记、补开一张发票或调整一些总额。然而，自动化系统不能如此宽容，可能的异常情况需要从一开始就加以考虑。


  人们通常不会主动提供关于他们问题中那些小异常的信息，即使在被询问时，也常常意识不到这些信息可能很重要。诸如“不，没什么。”或“几乎没有。”或“嗯，不，我想没有，嗯，也许吧。”这样的回答，都是存在需要深入理解的复杂问题的信号，在进一步进行数据库设计之前必须理解这些复杂问题。


  正如你在前面章节中所看到的，数据库的建立往往只为解决一个眼前问题，很少考虑接下来可能会发生什么，或者情况有时会如何偏离常规。在示例 1-4“学业成绩”中，表格的设置是为了记录学生的分数，却没有考虑到（不幸的是这并非完全不常见）学生需要重修一门科目这种情况。


  在本章中，我们将探讨获取问题的初始、准确概述并用用例来表达它的方法。然后，在理解了所有的定义、细节、例外、异常、合理扩展以及系统用途（天啊）之后，我们必须确保我们的抽象模型准确地捕捉到了最重要的特征。毕竟，最终将被实现的是这个抽象模型。


  你可能是在设计自己的数据库，也可能是在为别人设计一个数据库。无论是哪种情况，对问题都有两种视角。一种是来自最终用户（我将称此人为客户）的具体、现实世界的视角，另一种是来自设计并可能开发系统的人（我将称此人为分析师）的更为抽象的模型视角。如果你是在设计自己的数据库，那么请同时戴上两顶帽子，并根据需要进行切换。



  ### 现实与抽象视图


  由于对现实世界问题的良好理解极其依赖于客户与分析师能够相互理解，我们将花点时间来看看对一个问题的两种不同视角。


  ##### 问题的现实与抽象视图


  分析师主要以抽象的方式看待问题。对于我们考虑的这类数据库问题，处理过程大多可以分为：


  *   输入、编辑或以其他方式维护数据。

  *   根据某些条件从数据库中提取信息。问题的这种视图如图 3-2 所示。


  ![9781430242093_Fig03-02.eps](img/9781430242093_Fig03-02_fmt.png)


  `Figure 3-2`. 分析师对典型数据库系统的视图


  分析师首先要做的是充分理解客户的问题，以帮助确定输入和输出需求（即时和潜在的）。这些可以用用例来表达。然后，分析师需要开发一个能够支持这些需求的数据模型。正如你将在后面章节中看到的，数据模型提供了对系统细节的相当深入的理解，因此用例和数据模型通常是并行开发的。


  建立用例并非易事。用户或客户很少对整个流程有清晰的了解。许多数据库项目属于下一节描述的两类情况之一，从客户的视角审视这些情况是有益的。


  ##### 数据整理


  数据整理项目涉及一个需要照看其数据的客户。研究结果通常属于这种情况。科学家可能会设计一个实验来收集数据，以便进行专门的统计分析。这里分析师的责任是提前思考，并询问数据还可能如何被使用，并以一种能够满足即时和未来可能需求的方式存储它。这个过程如图
  3-3 所示。


  ![9781430242093_Fig03-03.eps](img/9781430242093_Fig03-03_fmt.png)


  `Figure 3-3`. 数据整理问题的分析


  在这个阶段进行仔细分析有助于避免一种非常常见且令人恼火的情况：知道数据“在里面”，但无法方便地“取出来”。根据正在收集的数据类型，预测潜在的输出需求是存储数据最困难的方面之一。


  ##### 任务自动化


  许多项目涉及一个客户，其工作需要自动化。这可能是小企业、俱乐部或学校，他们一直用手动或需要更新的软件保存记录。也许他们希望将数据转移到具有 Web 界面的数据库中。这些客户通常对他们所做的工作有清晰的认识。分析师的工作是将客户*所做的*与需要*记录*和*报告的*分开，并如图
  3-4 所示重新定义问题。


  ![9781430242093_Fig03-04.eps](img/9781430242093_Fig03-04_fmt.png)


  `Figure 3-4`. 任务自动化问题的分析


  一个本地学校任务自动化问题的典型描述可能是这样的：


  *当家长打电话来说孩子生病时，我们必须通知他们的班级老师，如果那天是运动会日，孩子在校队里，体育老师可能需要安排替补。然后我们需要统计所有缺勤天数，放到孩子的报告中。教育部每个学期也需要这些总数。*


  记录缺勤并能够以多种方式报告显然是主要需求。然而，关于运动队呢？系统是否需要区分那些在队中的孩子（如果是，是否需要知道是哪些队）？系统是否需要知道哪些日期有校际比赛？可能不需要。区分客户*所做*的（如果是运动会日，告诉体育老师）与需要*记录*的，是范围界定过程的一部分。对于体育部分问题的最终解决方案可能像记录所有关于队伍、替补和比赛日期的细节一样复杂，也可能像每天给体育老师一份所有缺勤者的名单并让她自己处理一样简单。


  每个问题都是不同的，所以我们需要一个通用的框架来发现和表示数据库问题的复杂性。一个好的开始是确定以下问题的答案：


  *   用户做什么？

  *   涉及什么数据？

  *   系统的主要目标是什么？

  *   满足这个目标需要什么数据？

  *   输入用例是什么？

  *   第一个数据模型是什么？

  *   输出用例是什么？


  前面的步骤是迭代的。随着我们对问题了解更多，我们可能需要返回到早期的步骤并进行调整。我们将在示例 3-1 的背景下逐步完成这些步骤。


  `EXAMPLE 3-1`. 餐食递送


  入住当地汽车旅馆或酒店房间的游客会获得一项服务，可以为他们递送各种快餐或外卖餐食（披萨、汉堡、印度外卖等）。访客致电公司并下订单购买一些餐食。一名司机被选中并被派往相应的快餐店取餐。司机将餐食送给客户，接收付款，并通知仓库。他稍后还会填写一份时间表交回仓库。


  希望自动化这一目前手动流程的原因之一，是为了能够生成关于所接订单数量以及完成订单所需时间的统计数据。


  ###### 用户做什么？


  “用户做什么？”这个问题对于任务自动化问题特别相关。作为开始，列出用户定期执行的任务是有用的。以下是当前手动餐食递送示例中执行的任务的起始列表：


  *   接待员记录订单详情（地址、电话号码、餐食、总价）。

  *   接待员选择一名司机并告诉他有关订单的信息。

  *   司机从快餐店取餐。

  *   司机送餐并通知仓库。

  *   司机在下班时交回时间表。

  *   接待员或经理生成每周和每月的统计数据。


  前面五个任务可能涉及向系统输入数据，而最后一个任务则涉及报告系统中已有的信息。


  ###### 涉及什么数据？


  上一节描述的任务很大程度上是从用户的角度陈述的，是实际发生的事情。我们需要退后一步，戴上分析师的帽子，思考在每一步需要记录或检索什么数据（如果有的话）。


  从思考一个典型订单可能涉及的内容开始是有用的。假设一个家庭在汽车旅馆住了一晚，打电话订购咖喱给父母，披萨给孩子。集思广益一下，在工作的每一步可以记录哪些数据。一些可能性如表
  3-1 所示。


  `Table 3-1`. 物理用户任务及相关数据




  ### 外卖配送系统数据分析


  #### 任务与数据记录


  | **任务** | **实际工作** | **可记录的数据** |

  | :--- | :--- | :--- |

  | 1 | 接单。 | 订单号、地址、电话、姓名、餐品、价格、时间。 |

  | 2 | 派单给司机。 | 司机姓名（或 ID？）、订单号、时间、需前往的出餐点。 |

  | 3 | 取餐。 | 订单号、每份餐品的取餐时间。 |

  | 4 | 送餐。 | 订单号、送达时间。 |

  | 5 | 录入工时表。 | 除了每个订单已有的信息外，还需要其他信息吗？签到时间、签退时间？ |


  让我们看看这些任务各自可能引发的一些问题：


  ##### 接单


  记录订单信息看似相当直接。我们需要能够轻松识别一个订单。我们可以参考顾客和下单时间，但通常分配一个订单号将使其更容易在各个阶段被追踪。关于顾客的信息是显而易见的。我们至少需要记录餐品的送达地点以及如何联系顾客。那么，关于所请求的餐品呢？我们如何记录这些信息？大概顾客是从某个可用餐品列表中进行选择的。系统是否应该能以某种方式向接线员提供该餐品列表以便进行选择？价格呢？如果我们有了餐品数据，我们就会知道价格。是否需要输入其他费用？比如里程费？


  ##### 派单给司机


  首先，我们需要考虑如何知道是哪位司机将去配送订单。系统需要跟踪司机的位置并确定最合适的司机吗？接线员是从值班司机列表中选择吗？系统是否需要跟踪哪些司机有空或当前正在配送？如果所有司机都忙了，怎么办？


  决定好司机后，我们需要告诉他订单详情（两份咖喱，两份披萨）。我们还需要告诉他去哪里取餐吗（例如，有多个披萨店可供选择）？系统是否需要记录为该订单提供餐品的出餐点？如果披萨店和咖喱店相距很远，是否可能需要两名司机参与？


  ##### 取餐


  关于司机取餐，我们想记录什么？我们是否希望系统能够告诉我们订单的当前状态（例如，“咖喱已于 8:40 取走，披萨尚未收集”）？最终的统计是否需要将餐品取餐时间和送达时间分开，还是只需要总时间？


  ##### 送餐


  如果时间统计很重要，记录餐品送达的时间将是必不可少的。


  ##### 录入工时表


  假设工时表目前是手动管理的，查看现有的工时表将非常有帮助。手工工时表可能包含我们已经讨论过的一些信息。是否有我们尚未记录的数据？系统是否需要记录有关司机工资率和支付情况的信息？我们在“深入了解问题”一节中再次讨论了查看现有手工表格的问题。


  #### 系统目标是什么？


  显然，一个用于记录送餐情况的系统可能非常小，也可能非常大，这取决于我们决定记录前一节中的多少信息。带着分析师的视角，我们需要理清主要目标并提供务实的解决方案（而不是包罗万象的方案）。


  如果你与他人合作，一个常见的问题是，当你提出类似于前一节描述的问题时，你的客户可能会对扩大系统范围以包含越来越多功能变得相当热衷。不过，当他们意识到额外的功能需要付出成本时，他们很快就会平静下来。


  重要的是，不要将一切*可能*自动化的事情都视为*应该*自动化的事情。许多工作手动完成要方便得多，而且通常让任务或决定有一些人的参与会更好。一个很好的例子是为实验室课程分配演示员。虽然数据库可能有关于需求和可用性的所有信息，但实际的匹配工作可能由真正的人来做会更好，因为他们掌握额外的信息（例如，谁有睡懒觉的倾向，谁可能和谁闹翻，谁在周五下午
  5:30 可能最有耐心）。


  在分析的早期阶段，最好将问题范围保持得尽可能小且定义严格。首先满足最紧迫的需求。一个设计良好的数据库在必要时或随着时间的推移和资金的允许，应该不会太难扩展。让我们思考一下外卖配送的例子。开发数据库的最初动机是提供关于订单和所涉及时间的汇总信息。汇总的订单信息可能包括订单总数和/或它们的总价值，可能是在某个时间范围内（每周或每月）。这些信息可能让公司识别出一些趋势并相应地调整其业务。


  让我们思考一下时间统计。它们应该有多详细？这正是你需要发挥想象力的地方。像“你想要关于时间的哪些统计？”这样的问题可能无法从客户那里得到足够的细节。如果不行，你可以试着想想能实现什么，并提出一些更具体的问题。这里有一些建议：


  *   你需要统计数据来支持诸如“我们的餐品在 40 分钟内送达”或“我们的平均送餐时间是 15 分钟”这样的陈述吗？

  *   你需要能够分解送餐时间以查看延迟在哪里吗？例如：一个订单通常需要等待多久才有司机可用？等待餐品准备的时间占多大比例？从出餐点送达顾客的平均时间是多少？

  *   你需要能够按司机分解这些统计吗？例如，找出是否有司机经常比别人慢？

  *   你需要能够按出餐点分解这些统计吗？例如，你是否需要查看每个出餐点的平均等待时间，以确定是否有明显较慢的？


  这些问题的目的是确定最紧迫的需求。让我们假设，对于这家小企业，主要目标只是大致了解从打电话到送达的总时间。提出其他问题可能（也可能不会）导致客户变得过于雄心勃勃：“我从未想过这个。好主意。把这个也加进去吧。”


  在大家忘乎所以之前，必须考虑获得足够可靠的数据来实现这些额外想法有多现实。总的送餐时间这个主要目标不是太难。它需要记录呼叫时间以及最终送达时间。任何比这更详细的记录都需要付出巨大成本。司机必须不断记录时间或在每个阶段通知仓库。是否需要额外的接线员来处理维护所有这些额外数据的工作？如果这些额外功能对客户不是必需的，那么范围就应该排除它们。然而，如果额外信息是获取该系统的主要目的之一，仍然有一些问题需要考虑。数据会有多准确？如果司机怀疑时间被记录在他们的名字旁边，他们是否会感到压力，有时变得不那么准确？建立一个复杂的系统来分析不准确的数字，是在浪费每个人的时间和金钱。




  假设经过一些仔细思考，大家一致认为只需要记录总的配送时间。现在我们可以重新阐述项目的主要目标：


  *记录订单信息，以便能够检索不同时间段内订单的数量、价值以及处理订单所花费的总时间等汇总数据。*


  #### 需要哪些数据来实现目标？


  现在，我们可以带着更明确的目标，重新审视表 3-1 中的每一项任务。在与客户进一步磋商后，我们可以对这些任务产生更精确的描述，如下所示。


  ##### 接单

  如果我们需要按月或周提供统计数据，就需要记录日期。客户已确认有一份不同餐品的价格表，让接待员能够从此列表中选择将非常有用。因此，我们需要一项额外的任务：录入并维护餐品及其价格信息。客户确认，订单成本就是所有餐品的总成本。


  ##### 派单给司机

  我们需要了解如何选择司机，并确定我们需要记录什么。假设我们发现司机是按不同时间单位排班的。显然，能够维护并打印出值班表会很有用。然而，自动化排班并不直接有助于实现我们的主要目标。目前大家同意暂时将排班表排除在系统范围之外。接待员将使用独立于数据库的信息（可能是钉在公告板上的名单）来决定应该指派谁去配送订单。


  即使接待员将手动指派司机，我们仍需考虑系统需要记录什么。司机信息的准确性有多重要？如果我们想要保存关于特定司机工作情况的数据（例如用于计算工资或分析绩效），那么保存准确的信息就很重要。如果对于这个系统来说，只需要能够联系司机下达订单并检查进度，那么在订单上记录一个联系电话就足够了。这需要向客户澄清，可以问这样的问题：“了解不同司机配送了多少订单对您来说重要吗？”
  假设在初始阶段不需要这个功能。


  司机去哪里取披萨？系统的一部分是否应该建议或记录取餐点？同样，如果统计的目的是为了优化业务，那么了解每个司机去了哪里以及在各个取餐点等待了多长时间将是至关重要的。鉴于我们已经确定这不是主要目标，我们决定目前不维护取餐点信息。


  ##### 取餐

  我们与客户达成一致，只需要记录从初次联系到最终送达订单的总时间。这意味着我们不需要记录流程中每个阶段的时间。即使我们不记录取餐时间，知道餐品已被取走并且正在送往客户手中，是否仍然有用？当然，当出现延误或问题时，这将是有用的信息。然而，为了满足我们的主要目标，系统没有必要记录配送状态信息。如果有问题，接待员有司机的联系电话，可以打电话询问订单所处的阶段。因此，首先，我们不需要记录任何关于取餐的信息。


  ##### 送达餐品

  如果我们想要获得整体配送时间的统计数据，显然需要记录每份餐品送达的时间。现阶段我们不需要关心这些信息是如何进入数据库的。司机可能会打电话到仓库，或者将时间写在时间表上稍后录入。在这个阶段，我们只关心系统能否存储每个订单的送达时间。订单送达时，接待员还需要知道司机可以接新订单了。我们在关于派单司机的章节中已经决定，目前这些决定将独立于数据库。接待员可能只会手动记录一下司机可以接新订单了。


  ##### 录入时间表

  我们已经记录了司机姓名、订单信息和送达时间。在这个步骤中，我们还需要记录其他什么吗？假设查看当前的手工时间表确认我们已经掌握了所有需要的信息。


  我们费了很大力气去提问，以澄清问题的范围以及支持该范围所需的数据。我们做出的决定是假设性的。它们没有对错之分。即使对于一个实际问题，也不会有绝对的对错答案；我们只能期望得到一个良好的实用解决方案。如果数据库设计得合理，那么在后期能够添加额外信息或扩大范围应该是相当直接的事情。就系统的规模和范围做出某些决定可能需要相当长的时间，因此在达成一些共识后，清晰地表达新的范围非常重要。示例
  3-2 根据我们的重新思考，重新陈述了问题。


  ##### 示例 3-2. 餐品配送问题的重新陈述


  系统将记录并提供有关餐品及其当前价格的信息。它将维护订单数据，包括日期、所订餐品、客户联系信息以及分配负责配送的司机信息。它还将维护订单下达时间和最终送达时间。基于此，系统将能够提供特定时间段内订单数量和价值的汇总信息，以及订单整体处理所用时间的汇总信息。系统不会维护关于司机的任何额外信息，也不会维护特定订单与哪些司机关联的信息。系统不会维护关于取餐点的任何信息，也不会记录任何特定订单使用了哪个取餐点。


  #### 输入用例是什么？


  回想一下，用例只是描述用户与系统交互方式的文本说明。用例有许多不同的层次，从非常高层次的目标描述到非常低层次的任务。对于我们试图理解和描述数据库系统的目的而言，最有用的层次是用户任务层次。Alistair
  Cockburn 在他的著作《编写有效用例》²中，将其描述为小到“用户可以在大约二十分钟内完成，然后去喝杯咖啡”的任务。他还说，它应该是一个“足够重要的工作，以至于如果一个用户一天内完成了几个这样的任务，他可以以此作为要求加薪的证据。”
  因此，像“管理业务的订单”这样的描述对于一个任务来说过于宽泛，而“查找司机的电话号码”可能又过于琐碎。


  既然我们对目标和系统范围有了更清晰的认识，就可以回到涉及数据录入的任务列表（之前出现在表 3-1 中），并决定在每个节点需要与系统进行哪些交互。这些交互显示在表
  3-2 中。




  '
- '# `表 3-2`. 拟议系统的数据录入与交互物理用户任务


  | **任务** | **物理工作** | **与系统交互** |

  | :--- | :--- | :--- |

  | 0 | 记录可用餐品。 | 输入并维护每个可订购餐品的数据（ID、描述、当前价格）。 |

  | 1 | 接单。 | 输入订单数据（订单号、时间、地址、电话）以及所需每份餐品的 ID（目前假设价格不变）。 |

  | 2 | 指派司机。 | 将司机的联系电话与相应订单关联记录。 |

  | 3 | 取餐。 | 无。 |

  | 4 | 送餐。 | 记录相应订单的送达时间（在此处或可能在下一步记录）。 |

  | 5 | 录入工时表。 | 无。 |


  `表 3-2`中的交互构成了我们首次尝试编写一些数据录入用例的基础。每个用例应该多大？我们应该合并一些任务，还是将其他任务拆分成多个用例？首要考虑的是可读性和沟通效率。初次尝试时，大约五到十个用例就足够了（且不算太多），足以清晰地展现一个小问题的组成部分。


  我们可以考虑将所有涉及订单数据的任务合并到一个用例中（即，录入原始订单、添加司机联系方式以及更新送达时间）。然而，对于这个问题，这些任务都相当独立，在不同的时间执行，并且可能由不同的人执行。可能无法立即为订单指派司机（在繁忙时段，我们可能需要等待看哪位司机先有空），因此录入司机联系方式数据应该是一个独立于录入订单的任务。同样，记录送达时间也是一个在不同时间执行的独立任务。这些与更新订单相关的任务都是整个业务的核心，并且一天内会重复多次，因此为每个任务提供独立的用例是合理的。但是，添加司机联系方式和添加送达时间的操作机制几乎完全相同，都需要找到特定订单的信息然后进行更新。我们可以（如果我们愿意的话）将这些合并为一个用例，例如称为“更新订单状态”。


  思考更新现有订单的状态，引导我们思考用户将如何定位特定订单。提供尚未指派司机或尚未送达的订单列表可能会有用。我们在此阶段不会研究具体的用户界面设计（即如何呈现此类列表或用户如何选择合适的订单）；然而，提供此类信息将很重要。我们存储了足够的数据，能够找到没有司机联系电话或没有送达时间的订单。鉴于这些信息对接待员来说几乎是必不可少的，并且在系统中易于获取，我们也将未完成订单的报告添加为一个用例。`示例
  3-3`显示了目前的用例。


  ## `示例 3-3`. 餐饮配送的初始用例


  `图 3-5`展示了餐饮配送问题的初始用例，每个用例的文本在图后给出。


  ![9781430242093_Fig03-05.eps](img/9781430242093_Fig03-05_fmt.png)


  ### `图 3-5`. 餐饮用例


  *   **用例 1**：维护餐品数据。输入和更新餐品数据（ID、描述、当前价格）。

  *   **用例 2**：录入订单。输入初始订单信息（订单号、日期、地址、电话）并记录每份餐品的 ID。（此假设价格不变。我们将在本章后面的“变更价格”一节中考虑价格变化。）每份餐品必须是系统中已有的。

  *   **用例 3**：更新订单状态。针对系统中已有的特定订单，添加司机联系电话或送达时间。

  *   **用例 4**：报告订单状态。检索所有满足所需状态（例如，无司机联系电话或无送达时间）的订单。


  #### 什么是第一个数据模型？


  既然我们对需要维护的数据有了一些概念，就可以为问题勾勒出第一个数据模型。我们显然拥有至少两类独立事物的数据：订单和可供应餐品的类型，因此有两个类，如`图 3-6`所示。`餐品`类的对象将是出现在客户汽车旅馆或酒店房间菜单上的每种餐品类型。


  ![9781430242093_Fig03-06.tif](img/9781430242093_Fig03-06_fmt.jpeg)


  ### `图 3-6`. 餐饮配送数据库的首次数据模型尝试


  在`图 3-6`中，我们将我们记录的每个数据片段分离开来，并将它们作为属性放入最可能的类中。让我们回顾一下`第 2 章`，了解像`图 3-6`这样的模型意味着什么。从左向右阅读，我们看到一个特定的订单（例如，“4
  月 1 日 8:30 送到科伦坡街”）可以涉及一种或多种餐品类型。从右向左看，每种餐品类型（例如，印度风味鸡肉）可以出现在多个订单上，但也可能不出现在任何订单上（例如，可能从来没有人想点菠菜凤尾鱼披萨）。为避免混淆，当我们谈论“餐品”时，指的是菜单上出现的餐品类型。我们并不是指一份特定的咖喱可能会被送到多个订单上！


  请注意，这个模型只是首次尝试，忽略了一些我们将在本章后面考虑的重要细节。


  #### 什么是输出用例？


  我们现在需要根据我们正在维护的数据（如`图 3-6`中的数据模型）重新考虑所需的报告和汇总任务。我们已经确定，报告等待指派司机的订单或尚未送达的订单将很有用，并已将其包含在`示例
  3-3`的用例 4 中。


  让我们思考一下作为我们主要目标一部分的订单和送达时间统计。订单的统计可以通过考虑`订单`对象来找到。我们可以通过汇总与该订单关联的每份餐品的价格（目前假设价格不变）来找到每个订单的价值。我们还可以通过`订单时间`减去`送达时间`来确定每个订单的耗时。通过选择那些在感兴趣日期范围内的订单对象，我们可以确定特定周、月或任何所需时间段内时间的不同统计数据（例如，平均值或总和）。我们的数据模型中存储了足够的信息来满足主要目标的要求。



  #### 数据分析与扩展思考


  此时，审视我们正在存储的数据，并看看能推导出哪些其他信息，是很有用的。基于我们已有的数据，我们还能提供哪些统计信息？比如，按餐食类型对所有订单进行分组？鉴于大部分信息已存储在案，询问客户是否想知道披萨带来的总收入、有多少人点了咖喱，或者包含特定类型餐食的订单是否需要更长的配送时间，这可能是有用的。我们是否有现成的信息形式，能让这类报告唾手可得？


  我们掌握了特定餐食（例如鸡肉文达卢或羊肉科尔马）的信息，但要获取不同餐食类别（披萨对比咖喱）的信息却并不容易。或许引入一个新的属性或类——`Category`（类别）——会很有用。然后，每种餐食都可以被分配一个特定的类别。我们将在第
  5 章(`Chapter 5`)更深入地探讨像类别这样的东西应该是属性还是类，但现在请相信我的话，设立一个`Category`类会是个好主意。这只是对问题的一个小扩展，却可能以微小的额外努力或成本，提供相当可观的补充信息。戴上我们分析师的帽子，我们至少应该与客户讨论一下这个增补。


  即使我们不增加一个额外的`Category`类，我们至少还需要一个进一步的用例来处理统计输出。因为所有的报告大体相似，我们可以像在示例 3-4(`Example
  3-4`)中展示的那样，在一个用例中相当清晰地描述它们。


  ### `示例 3-4`. 餐食配送统计报告用例


  图 3-7(`Figure 3-7`)展示了用于报告统计信息的用例。


  ![9781430242093_Fig03-07.eps](img/9781430242093_Fig03-07_fmt.png)


  图 3-7(`Figure 3-7`). 统计报告用例


  `用例`: 订单汇总报告。（此用例假设价格不变。）


  *对于所需时间段内、`date`（日期）符合要求的每一个已完成订单：*


  *   查找所有相关的餐食并检索其价格。

  *   如果需要，通过从`delivery_time`（配送时间）中减去`order_time`（下单时间）来计算订单耗时。

  *   如果需要，按更小的时间段（天、周等）对订单进行分组。

  *   计算价格/时间的平均值和/或总值。


  #### 关于用例的更多内容


  我们在用例中一直使用非常简单的描述。然而，用例可以包含更多信息，优秀的范例可以在阿利斯泰尔·科克伦的《编写有效用例》( `Writing Effective Use
  Cases` )一书中找到。这本书比我这里讲得更详细，因为它包含了对更大项目的分析，在这些项目中，出于合同目的的需求规范更为关键。在本书中，我们使用用例更多地是将其作为一种澄清和深入了解拟议项目、其范围及其复杂性的方式，而非作为合同规范文件。


  关于用例应包含什么内容或应如何呈现，没有硬性的规定。首要的考虑是它们应具备可读性，并清晰、完整地描述每项任务涉及的内容。


  让我们更仔细地审视用例的一些其他方面。


  ##### 参与者


  我们使用一个`actor`（参与者）来代表我们数据库的用户。为了考虑到用户可能与数据库交互的所有不同方式，考虑我们的用户可能包含的所有不同`类型`的人是很有用的。


  在我们的餐食配送服务示例中，你会看到在图 3-5(`Figures 3-5`)和图 3-7(`3-7`)中，我们区分了两个参与者：`receptionist`（接待员）和`manager`（经理）。不必过于担心哪些人与特定用例相关联。重要的是考虑可能与系统交互的人的`角色`，并从每个角色的角度看待问题。对于小企业，这些角色可能总共由一两个人承担。对于较大的组织，一个单一角色可能由许多人（例如，许多数据录入操作员）来承担。这就变成了戴上不同的帽子，从不同的观点来看待问题。


  以下是一些人们可能拥有的广泛角色类别，并附有来自我们餐食配送服务的示例。


  `文员/数据录入操作员`：此角色的用户负责输入或更新原始数据（例如，输入订单详情或查找订单以录入配送时间）。


  `主管`：此角色的用户处理日常细节。他们可能需要交易清单、值班表等。对于我们的餐食配送数据库，这些用户可能会处理诸如尚未配送的订单列表或特定订单的详情（以跟进问题）等事务。


  `经理`：经理更可能对汇总信息而非日常细节感兴趣（例如，上周每天的总订单数或今天订单的平均配送时间）。他们也可能需要非常概括的、显示趋势并可用于预测和战略管理决策的汇总信息（例如，过去两年每月的订单价值）。


  从这些不同角色（或参与者）的角度思考，可以极大地了解系统需要提供什么才能最有用。


  ##### 异常与扩展


  每个用例的文本描述部分是用来包含任何可能发生的异常或问题的地方。对于我们的简单示例，问题不太多。我们可能会包含如何处理跨午夜的订单以正确计算耗时（我讨厌处理时间问题！）。我们还可能包含如果订单因某种原因未能完成会发生什么。这相当棘手。我们需要区分已取消的订单和尚未配送的订单，这样我们关于当前订单状态的报告才是正确的。每次我们查询那些尚未配送的订单时，我们不希望包含从一开始所有已中止的订单。这里有两种可能：取消或终止的订单可以从系统中删除；或者我们可以为`Order`类添加一个新的属性——`status`（状态），其值可以是`ordered`（已下单）、`delivered`（已配送）、`cancelled`（已取消）等。第二个选项更可取，因为删除系统中已有的信息似乎是一种浪费，而且经理很可能非常有兴趣知道订单的取消百分比（并且非常想知道原因——但这又引入了另一层复杂性）。任何增补，比如跟踪已取消订单，都必须反映在用例和数据模型中。


  如你所见，思考每一步可能出错的事情有助于我们理解问题。


  ##### 用于维护数据的用例



  ### 用例分析


  #### 数据维护用例


  数据维护包括三项活动：存储新值、修改现有值以及删除数据。这三项更新任务可以合并为一个用例（例如，维护膳食数据）。虽然它们都是独立的工作，并且可能在不同的时间完成，但它们各自并不真正符合先前给出的用户任务标准。用户无法真正使用她纠正了许多膳食描述拼写错误这一事实来作为要求加薪的证据。数据库软件提供了执行数据维护活动的工具。如果我们为膳食数据创建一个表，软件几乎肯定会提供实用程序来让我们添加新膳食、查找特定膳食（基于一个或多个属性的值）、更新特定膳食的值或完全删除膳食。因此，对于许多类来说，将这些维护活动包含在一个用例中是相当合理的，而具体细节则留待以后设计用户界面时再考虑。


  对于某些任务，将维护特定类数据的不同方面分开可能是有意义的。在我们的送餐示例中，我们将输入订单与更新订单（例如，添加司机联系方式和送货时间）分开了，因为这是接待员工作中相当重要且独立的部分，并且它们肯定会在不同的时间发生。分别考虑输入和更新任务促使我们思考接待员如何能方便地找到适当的订单来更新其状态，因此引导我们提供关于当前订单状态的报告。


  是否应该将维护订单数据的这些方面放在单独的用例中，这是一个观点问题，决定因素应该是何种方式最易读且提供了最佳的沟通效果。由于我们的用例不多，将它们分开似乎是合理的；但是，如果范围以及用例的数量增长，那么通过合并它们可能更好地服务于清晰度。


  #### 报告信息的用例


  对于许多客户来说，报告任务可能是数据库系统最重要的部分。我们需要能够提取满足某些条件的对象，然后对它们做一些事情：在屏幕或网页上显示它们、在报告中写出它们、将它们分组、计数它们，或对某些属性值求平均值或总和。


  正如我们所看到的，在生成报告时，考虑我们可能希望如何选择或分组对象是非常有用的。在送餐示例中，我们考虑了按膳食类型对订单进行分组，并很快意识到对*膳食类别*采用更广泛的定义可能被证明是有用的。尽早询问关于报告的详细问题是一项很好的投资，因为它将对所需的类产生影响。


  你需要多少个报告用例？再次以可读性为指导。图 3-7 中的用例包含了几个相似但不同的可能性，并且相当容易阅读。如果我们包含其他相当不同的报告（名册、发票等），那么每个报告都应该有自己的用例。


  选择打印哪个报告或包含哪些订单（本周的或本月的）的机制不属于分析这一部分的事务。我们将这些决策推迟到用户界面设计阶段。在此阶段，重要的是数据存储的方式应使报告成为可能。


  #### 深入了解问题


  我们已经考虑了许多需要回答的问题，以理解项目范围和界定范围，并将这些问题呈现为客户和分析师之间的对话。大量信息也可以从其他来源获得。客户（企业、研究人员、俱乐部等）正在使用的现有表单和报告是了解项目概况的绝佳方式。这些文档可以提供丰富的细节，并且可以成为许多有趣问题的来源。在开始时仔细查看输入表单和报告可以增进对问题的理解，并为详细的询问路线奠定良好的基础。


  重要的是要意识到，你查看表单和报告是为了发现问题（而不是为了了解表单和报告本身）。空白表单表明了客户期望记录的数据。然而，更多信息将来自已填写的表单。在这里，你很可能会发现许多不规则性和例外情况。查找未填写或标记为“不适用”的字段。查找被划掉并手写了另一个选项的选项。查找包含两个值的字段，或在表单底部或背面手写的解释性注释。正是这些细节将真正让你洞察问题的复杂性。


  现有报告也为你提供了关于客户当前可访问信息的指南。但请记住，这个项目之所以被委托，可能正是因为现有报告在某些方面不尽人意。检查现有报告可以引发有趣的问题。查找行或列中的空白。查找空白与零的区别。质疑任何负数。询问金额的定义。


  #### 我们推迟了哪些内容？


  我们对送餐示例的分析还远未完成，因为我们还需要更多的数据建模专业知识来表示一些复杂性。对于那些担心疏漏的人，这里列出了一些我们仍需考虑的事情。我们将在后面的章节中更深入地探讨这些问题。


  ##### 变动的价格


  `Meal`类有一个我们称之为`price`的属性。这是膳食的当前价格，显然它会随时间变化。当下新订单时，我们需要知道与膳食信息一起记录的当前价格。如果价格发生变化，并且我们运行一份关于旧订单的报告，如图
  3-7 中的用例所述，我们将遇到问题。我们存储的唯一价格是当前价格，因此我们不一定能找到特定订单在下单时的总成本，反而会发现这些相同订单按今天当前价格计算的成本。有几种方法可以补救这种情况。在这种情况下，最简单的方法是在`Order`类中包含另一个属性，用于存储`下单时`的订单总价值。这样，当膳食价格在以后日期发生变化时，该值将保持不变。


  ##### 停售的膳食


  另一件肯定会随时间变化的事情是所提供的膳食。添加新膳食不会引起任何问题；然而，移除膳食则更棘手。如果我们移除一种膳食，我们必须考虑与该膳食关联的系统中旧订单会发生什么。我们可能希望保留这些历史数据，因此我们可能选择永不删除与订单关联的任何膳食。




  我们接着面临的问题是，我们的餐点集合中包含了一些不应与新订单关联的项目。处理这个问题的一种方法是，在`Meal`类中添加一个`available`属性，用于指示该餐点当前是否可以订购。我们需要修改录入订单的用例，规定只有`available`的餐点才能被包含在内。然而，我们的报告用例可能会包含报告期内所有被订购的餐点。


  ##### 特定餐点的数量


  如果我们的顾客点了两份鸡肉文达洛 os（chicken vindaloos）怎么办？我们可以将`Order`对象与`Meal`对象关联起来，但关于此订单需要配送多少份该特定餐点的信息，我们保存在哪里呢？这是一个非常严重的疏忽，要修复它需要在`Order`和`Meal`类之间引入一个新类。当我们处理多对多（Many–Many）关系时，这种情况经常发生。我们将在第
  4 章进一步讨论这一点。


  ### 小结


  分析过程的第一部分是理解项目的主要目标和范围。分析师的工作是深入了解所有将使用系统的不同类型用户的想法，以理解他们当前的需求以及未来可能的需求。这个过程是迭代的，但可能包括以下步骤：


  *   确定系统的主要目标。

  *   确定不同用户在平均一天中从事的工作。

  *   头脑风暴与每项工作可能关联的数据。

  *   商定项目范围，并确定相关数据。

  *   勾勒数据输入用例，考虑异常情况，并检查现有表格。

  *   勾勒初始数据模型。

  *   根据正在收集的数据，头脑风暴可能的输出。

  *   勾勒信息输出用例。

  *   检查数据模型是否能够方便地提供输出信息。


  ### 检验你的理解


  练习 3-1。


  考虑本章开头描述的场景：


  *当家长打电话说孩子生病时，我们必须通知他们的班级老师；如果当天是运动会日并且孩子在校运动队中，体育老师可能需要安排替补。然后我们需要统计所有缺勤天数以记录在孩子的报告上。教育部门每个学期也需要这些总数。*


  按照小结部分中的步骤，勾勒一些用例和一个初始数据模型。假设主要目标是为班级老师记录缺勤情况、用于学校报告以及提供给教育部的统计数据。


  ¹ Peter Coad 和 Ed Yourdon，《面向对象分析》（Object Oriented Analysis）（新泽西州上鞍 River：Yourdon
  Press, 1991）。


  ² Alistair Cockburn，《编写有效用例》（Writing Effective Use Cases）（马萨诸塞州波士顿：Addison Wesley,
  2001）。


