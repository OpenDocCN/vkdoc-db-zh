- "# 第 12 章 其他实现方式\n\n![image](img/frontdot.jpg)\n\n在本书的前几章中，我们专注于获取一组用例和一个能准确表示问题范围及不同数据项相互关联的数据模型。第\
  \ 7 章到第 9 章展示了我们如何将数据模型在关系数据库中表示为一组规范化表，并通过外键实现关系。前两章展示了我们如何高效地向这些表中输入数据并使用查询来提取有意义的信息和报告。\n\
  \n现在，我们将简要了解表示数据模型的其他方法。我们将研究面向对象数据库、电子表格（用于简单的数据模型）和 XML 作为表示数据模型的方式。\n\n### 面向对象实现\n\
  \n我们的数据模型是*面向对象的*。这意味着我们从特定对象的角度来看待数据和关系，就像这个对“一对多”关系的描述：“一个 `Customer` 类对象可以与多个\
  \ `Order` 类对象关联。” 使用 Java、VB .NET 或 C# 等面向对象语言的程序员可以直接创建和操作对象。OO 语言还具有大多数关系数据库软件中不具备的附加功能。这些功能包括为属性使用复杂类型（对象或对象集合）的能力，以及将描述对象行为的方法作为类定义一部分存储的能力。OO\
  \ 语言的另一个优势是能够直接实现和维护类与子类，从而充分利用继承。有时 OO 语言中缺少的是以透明方式将对象保存到持久性存储和从中检索对象的方法。OO 数据库提供了一种无缝创建对象、将其存储到磁盘然后再找到它们的方法。OO\
  \ 程序的设计是一个巨大的主题，因此在此我仅概述一些捕获数据模型基本要素的主要技术。\n\n#### 类与对象\n\n与关系数据库不同，OO 编程语言直接支持类和对象的概念。类是对象将如何构造的定义或模板。例如，一个\
  \ `Customer` 类将指定每个 `Customer` 对象将具有的属性（例如，名称、地址等）。每个 `Customer` 对象将根据类的定义创建，并将拥有其各自属性的值。类只是一个抽象概念，但对象本身是独立的实体。相比之下，在关系数据库中，我们从表的角度思考。我们构造一个表来表示每个类，而对象由行表示。我们对表执行连接和联合等操作，而不是对行。关系数据库中的操作严格基于表，而在\
  \ OO 环境中，重点是对象（因此称为“面向对象”）。\n\n当我们考虑继承时，OO 语言和关系数据库之间的差异尤其明显。在第 6 章中，我们看到了特化和泛化的概念如何帮助我们建模那些有许多共同点的类所在的特定情况。在图\
  \ 12-1 中，我们有一个数据模型，它捕获了学生和讲师在父类 `Person` 中的相似之处。\n\n![9781430242093_Fig12-01.tif](img/9781430242093_Fig12-01_fmt.jpeg)\n\
  \n图 12-1. 具有继承关系的数据模型\n\n图 12-2 展示了我们如何尝试在关系数据库中使用表来捕获此数据模型的主要特征。\n\n![9781430242093_Fig12-02.tif](img/9781430242093_Fig12-02_fmt.jpeg)\n\
  \n图 12-2. 用 1-1 关系表示的继承\n\n图 12-2 中的表示需要三个表。每个学生将由两行表示：一行在 `Person` 表中，另一行在 `Student`\
  \ 表中。如果我们想要某个特定学生的所有信息，我们需要连接 `Student` 和 `Person` 表以检索学位和姓名。在 OO 环境中，如果我们创建一个 `Student`\
  \ 或 `Lecturer` 类的对象，该对象将包含嵌入其中的所有相关属性。我们不需要查找任何其他对象或引用任何其他类来检索所需信息。这描绘在图 12-3 中。\n\
  \n![9781430242093_Fig12-03.eps](img/9781430242093_Fig12-03_fmt.png)\n\n图 12-3. OO\
  \ 环境中的学生和讲师对象\n\n在 OO 环境中，每个对象都是一个独立的实体，拥有自己唯一的对象标识符。因为每个对象都有自己的标识，所以不要求其属性值是唯一的。换句话说，从实现的角度来看，不需要提供我们在关系数据库中需要的等效主键。例如，图\
  \ 12-4 中的两个对象都可以通过其唯一的 `OID` 被系统识别，尽管它们的属性值是相同的。然而，`OID` 不一定可用，对用户也没有意义。程序可以区分对象，但用户能区分吗？\n\
  \n![9781430242093_Fig12-04.eps](img/9781430242093_Fig12-04_fmt.png)\n\n图 12-4. 两个不同的对象；但用户能区分它们吗？\n\
  \n现实中会有一些信息可以区分两个不同的学生（例如，地址或出生日期）。虽然不是必须的，但像学号这样的唯一标识符对于帮助用户引用特定的人可能仍然有用。引用学生 128675\
  \ 比引用住在 Beckenham 的 Jane Smith 更容易。\n\n#### 复杂类型与方法\n\n\n#### 使用复杂属性类型\n\n在大多数关系型系统中，我们通常使用简单类型（例如数字、文本、日期等）的属性。在面向对象的环境中，我们可以拥有更复杂的属性。\n\
  \n考虑地址和名称的问题。在第 7 章中，我们认为单一的地址字段是不够的，因此我们引入了诸如`street`、`city`、`post_code`和`country`等独立字段。我们对名称做了类似的事情，引入了`title`、`first_name`、`last_name`、`initials`等字段。这样使得按国家或姓氏有效地搜索或排序行，以及在报告中正确格式化地址成为可能。在关系型数据库中，这些字段都是独立的；如果不创建一个新表，就没有简单的方法来说明*这些字段应该以某种方式保持在一起，因为它们共同构成了一个地址*。创建一个新表来保存地址属性并不会真正带来太多好处，因为每次我们需要获取某人及其地址的所有信息时，都需要创建连接。对于额外的开销来说，这几乎没有实现什么。\n\
  \n在面向对象的环境中，我们可以定义一个`Address`类，它有自己的属性（`street`、`city`、`country`、`postcode`），然后在`Customer`类中，我们可以有一个属性`address`，它引用一个`Address`对象。图\
  \ 12-5 说明了地址和名称的这个想法。\n\n![9781430242093_Fig12-05.eps](img/9781430242093_Fig12-05_fmt.png)\n\
  \n**图 12-5.** 一个`Person`对象可以引用一个`Address`对象和一个`Name`对象。\n\n在`Person`类中，我们有三个属性：`name`和`address`（它们是对我们的新`Name`和`Address`类的对象的引用），以及`birth_date`（这是一个简单的日期类型）。拥有这些新类的主要优点之一是我们能够声明可以在属性上执行的方法或指令集。让我们看一个`Name`类的简单例子。在图\
  \ 12-6 中，我们有一个和之前类似的类图，但现在底部的矩形中有一些方法。\n\n![9781430242093_Fig12-06.eps](img/9781430242093_Fig12-06_fmt.jpeg)\n\
  \n**图 12-6.** 包含两个方法的`Name`类\n\n方法`formal_name()`可能会指示程序打印出`title`、`initials`和`last_name`（例如，Mr.\
  \ J. A. Wilson），而`full_name()`可能会打印出`first_name`、`last_name`（例如，John Wilson）。在关系型数据库中，这些类型的指令将与特定的报告或表单保存在一起。每次我们需要一个新报告时，都必须重新发出这些指令。在面向对象环境中，这些指令与数据保存在一起。无论我们在哪里使用`Name`对象，我们只需要请求`full_name`，这些指令就是可用的。\n\
  \n#### 对象集合\n\n面向对象环境具有对象的*集合*（或集合或列表）的概念。就像`Student`表是管理关系型数据库中所有行的方式一样，在面向对象环境中，我们可以建立许多不同的对象集合。每个特定类的对象可能都有一个内置集合（例如，所有`Student`对象），但我们也创建自己的集合。我们可能有名为`AllStudents`、`CurrentStudents`、`Lecturers`、`People`等的集合。每个集合都将包含一组对单个对象的引用。图\
  \ 12-7 显示了如何可视化集合和对象。特定对象可能被多个集合引用（例如，一个`Lecturer`对象可能被`People`集合引用，也被`Lecturers`集合引用）。\n\
  \n![9781430242093_Fig12-07.eps](img/9781430242093_Fig12-07_fmt.png)\n\n**图 12-7.**\
  \ 引用对象的集合\n\n集合对于表示对象之间的关系非常重要，正如你将在下一节中看到的。集合还可以用于帮助确保对象具有唯一值的某些属性，以便用户能够区分它们。在面向对象环境中没有像主键这样的概念，但我们可以使用集合来强制实施类似的唯一性约束。通常，有不同类型的集合可供选择。一种有用的集合类型是可以在特定属性或属性组合上进行键控的集合。例如，一个在`studentID`上键控的集合`AllStudents`，其设置方式将非常高效，可以在给定\
  \ ID 号时定位特定对象。在`last_name`上键控的集合将能够高效地基于姓名查找特定对象。在键控集合中查找特定对象与在具有索引的表中查找行非常相似。与关系模型一样，我们可以指定特定的键控集合可能只具有键的唯一值。如果我们有一个在`studentID`上唯一键控的集合`AllStudents`，并且我们确保所有`Student`对象都添加到这个集合中，我们就有效地强制实施了约束：没有两个`Student`对象具有相同的`studentID`值。这确保了我们所有的对象都有一个（或一组）让用户可识别的属性。\n\
  \n### 表示关系\n\n对对象和对象集合的引用可用于表示数据模型中的关系。考虑图 12-8 中的模型，其中客户可以有多个订单，而每个订单恰好对应一个客户。\n\
  \n![9781430242093_Fig12-08.tif](img/9781430242093_Fig12-08_fmt.jpeg)\n\n**图 12-8.**\
  \ 客户与订单之间关系的数据模型\n\n我们将有两个类，`Customer`和`Order`。每个客户将有自己的对象，每个订单也将有自己的对象。那么这两个对象之间的关系呢？让我们看看关系的“1”端。每个订单有一个关联的`Customer`对象。因为我们可以将复杂类型作为类中的属性，所以每个`Order`中可以有一个属性，它是对相应`Customer`对象的引用。图\
  \ 12-9 说明了这一点。\n\n![9781430242093_Fig12-09.eps](img/9781430242093_Fig12-09_fmt.png)\n\
  \n**图 12-9.** 每个`Order`对象包含一个对`Customer`对象的引用。\n\n`Order`对象中的这个引用与关系模型中的外键概念并非完全不同；不同之处在于，外键的引用指向表，应用程序必须找到关联的行。在面向对象环境中，引用直接指向相关的`Customer`对象。\n\
  \n现在让我们考虑关系的“多”端。每个`Customer`对象有多个`Order`对象，我们也可以直接建立这种关联。我们可以在`Customer`类中包含一个`Order`引用的集合作为属性，如图\
  \ 12-10 所示。\n\n![9781430242093_Fig12-10.eps](img/9781430242093_Fig12-10_fmt.png)\n\
  \n**图 12-10.** 一个`Customer`对象有一个对其关联`Order`对象的引用集合。\n\n##### 导航与关系表示\n\n我们可以选择在`Order`类中包含对`Customer`的引用（图\
  \ 12-9），在`Customer`类中包含`Order`的集合（图 12-10），或者两者都包含。决策将取决于我们希望如何在类之间*导航*。用例将指导我们。如果我们想知道特定客户下了哪些订单，就需要通过`Order`对象的集合，从`Customer`导航到`Orders`。如果有一个未收集的订单，而我们想知道客户的姓名，则需要通过`Customer`对象的引用，从`Order`导航到`Customer`。\n\
  \n这与关系数据库有何不同？在关系数据库中，`Order`表中的每一行都有一个外键`customer`指向`Customer`表，但我们没有行之间的直接连接。如果需要来自`Customer`和`Order`表的信息，我们需要连接这两个表并创建一个新的虚拟表。那个表非常对称，我们能够从这个虚拟表中为特定订单查找客户，也能为特定客户查找订单。这非常有用。回想一下前一章，我们如何能够从一个虚拟表创建两个截然不同的报告——学生记录和班级列表。\n\
  \n相比之下，在面向对象（OO）环境中，如果我们认为需要这些路径，就必须显式地提供两条路径。如果`Customer`中没有集合，我们就无法轻易找到特定客户的订单。如果在`Order`对象中没有对客户的引用，我们将没有直接的方法来找到合适的客户。然而，我们可以提供的直接链接对于在对象之间导航非常高效。\n\
  \n##### 多对多关系的表示\n\n既然我们可以用对象集合来表示关系的“多”端，那么多对多（Many-Many）关系就可以直接表示。这与关系模型形成对比，在关系模型中，我们必须创建一个新的中间表来处理多对多关系。例如，在图\
  \ 12-11 的模型中，植物（plants）和用途（uses）之间的多对多关系可以通过让每个`Plant`对象关联一个`Use`对象的集合，以及每个`Use`对象关联一个`Plant`对象的集合来表示。对象之间的关联是直接的；我们不需要额外的表，也不需要像关系模型那样执行两次连接。\n\
  \n![9781430242093_Fig12-11.tif](img/9781430242093_Fig12-11_fmt.jpeg)\n\n**图 12-11.**\
  \ 一个多对多关系\n\n你可能已经发现了其中的潜在问题。以客户和订单的例子为例。如果我们选择同时包含引用和集合，如图 12-9 和 12-10 所示，我们可能存储了关于对象间关联的信息两次。一个特定的订单会在客户的订单集合中，同时客户引用也会与订单一起保存。现在有产生不一致性的风险。订单\
  \ A 可能在客户 Smith 的集合中，但订单 A 对象可能引用客户 Green。如何管理这一点取决于你使用的软件。更多内容将在下一节中讨论。\n\n####\
  \ OO 环境\n\n有许多开发平台使用面向对象的概念。许多现代编程语言（例如`VB .NET`、`C#`、`Java`、`C++`、`Python`）都基于类和对象。然而，使用这些语言来维护数据不一定容易。虽然它们提供了我们迄今为止讨论的所有概念，但当你尝试永久存储数据时，问题就来了。当你向关系数据库输入一行时，软件会自动负责将其保存到磁盘，以便在软件和计算机关闭并重新启动后数据仍然可用。这是*永久*或*持久*的数据。其他变量——计算的中间结果等——不会以这种方式保存，被称为*临时*数据。\n\
  \n在 OO 编程语言中，程序员通常必须专门保存和检索关于对象的数据，而这并非易事。专门设计的 OO 数据库系统（例如 Intersystems 的`Cache`¹和`JADE`²）可以透明地处理对象的存储和检索。像`JADE`这样的系统允许你获取数据模型并定义类层次结构。可以指定类中对象之间的关系并自动维护。例如，前一节提到的关于`Order`和`Customer`对象之间引用不一致的问题就不会出现。如果从客户的集合中移除一个订单，`Order`对象中对该客户的引用将自动更新。\n\
  \n一个良好的面向对象数据库产品提供了许多优势。它可以充分利用继承的全部能力，管理复杂类型，将方法与数据一起存储，并在相关对象之间提供非常高效的链接。然而（总是有个然而），关系模型最强大的方面之一是我们可以对表执行的操作集合，以检索复杂的数据子集，如第\
  \ 10 章所述：连接、并集、交集等。执行这些操作的`SQL`命令相对直接，并且是任何关系数据库系统不可或缺的一部分。但是，所有这些操作都是在表上定义的，在 OO\
  \ 系统中没有直接的对应部分。目前正在大力开发面向对象数据库的标准和 OO 数据库查询语言³。\n\n介于完整的 OO 数据库和关系数据库之间的一种折中方案是，使用\
  \ OO 编程语言连接到关系数据库。对象被转换为表中的行，然后可以利用关系数据库的全部数据管理能力进行存储和检索。在编程语言内部，可以使用`SQL`与数据库通信并插入和检索数据。诸如`Hibernate`⁴之类的工具促进了这种对象关系映射的过程。然而，在执行对象和表之间的转换时，我们可能会失去针对数据对象的许多特定\
  \ OO 优势。\n\n### 在电子表格中实现数据模型\n\n电子表格也许是桌面广泛可用的应用程序中最通用的之一。有许多产品可供选择，包括`Microsoft\
  \ Excel`、`Open Office`和`Google Docs`。电子表格的流行源于能够打开工作表并立即开始输入数字和公式——无需声明变量或设计表。\n\
  \n\n### 电子表格在数据管理中的应用\n\n对于那些拥有数据并需要快速找到统计或计算结果的人来说，电子表格非常出色。电子表格通过其丰富的函数和特性，提供了惊人的强大功能。然而，它们也可能相当危险。任何考虑使用电子表格执行重要计算的人都应该访问一些专门讨论困扰大多数电子表格的各类错误的网站。\n\
  \n#### 电子表格的优缺点\n\n电子表格非常适合执行计算，但不太适合存储可能需要以多种方式提取的数据。要轻松查询和报告数据，所需信息通常需要放在一个工作表上。这有点像将所有问题数据保存在一个数据库表中。我们在第一章中展示了一些这样做的问题示例。本书的其余部分主要讨论了如何通过将数据拆分为类或规范化的表来避免这些问题。然而，电子表格是如此流行的工具，因此值得研究如何有效地使用它们来表示一个小型数据模型。\n\
  \n对于那些类很多且关系复杂的问题，电子表格无法以可维护的方式准确捕捉其复杂性。对于只有少数几个类（主要是类别型类）的问题，有时可以通过精心设计的电子表格来捕捉数据模型的相当一部分复杂性。\n\
  \n#### 示例：简单订单模型\n\n考虑一个将客户交易数据保存在电子表格中的小企业。您可能会想象，初步的电子表格设计可能类似于图 12-12。\n\n![9781430242093_Fig12-12.tif](img/9781430242093_Fig12-12_fmt.jpeg)\n\
  \n**图 12-12.** 用于处理客户（非常）简单产品订单的电子表格\n\n到目前为止，您应该能够看到这种解决方案的潜在问题。数据是重复的（例如，客户地址和产品价格），存在不一致的可能性（如第\
  \ 3 行和第 4 行）。订单可以在没有关联客户的情况下输入（第 2 行），而且据我们所见，这里没有检查是否输入了有效的产品代码（真的有产品 76253 吗？）。\n\
  \n#### 优化的数据模型\n\n针对上述情况的一个合适数据模型（假设订单仅针对单一产品）如图 12-13 所示。通过将客户和产品信息分离到不同的类中，我们可以确保交易始终针对有效的客户和产品，并且相关的名称、地址和价格是一致的。\n\
  \n![9781430242093_Fig12-13.tif](img/9781430242093_Fig12-13_fmt.jpeg)\n\n**图 12-13.**\
  \ 客户订购产品的数据模型\n\n#### 在电子表格中实现关系\n\n在电子表格中，我们计算和分析的主要焦点将是订单。我们将需要按日期排序、汇总金额、按客户搜索等。为此，所有信息必须集中在一张工作表上，如图\
  \ 12-12 所示。那么，我们如何对数据的一致性和准确性保持一定的控制呢？\n\n图 12-13 中的数据模型有两个“一对多”关系，因此我们首先看看如何在电子表格中表示这些关系。\n\
  \n##### 表示一对多关系\n\n为了表示如图 12-13 所示的涉及“一对多”关系的数据模型，我们首先为“一”端的每个类设置一个单独的工作表。图 12-14\
  \ 显示了一个包含客户信息的工作表，其中数据被赋予了一个范围名称（`all_Customers`）。还会有另一个包含产品信息的工作表。单独的客户工作表使得行可以独立于其他信息（订单和产品）添加或更新。\n\
  \n![9781430242093_Fig12-14.tif](img/9781430242093_Fig12-14_fmt.jpeg)\n\n**图 12-14.**\
  \ 包含客户信息的工作表，范围名称为`all_Customers`\n\n然后，我们为“多”端的类（订单）创建第三张工作表，我们将在其中汇总所有需要的信息。我们无需输入每个客户的全部信息，而可以输入客户\
  \ ID 并显示来自客户工作表的匹配数据。这可以通过一个名为`VLOOKUP`的函数来完成。\n\n```\n=VLOOKUP(1672,all_Customers,2,FALSE)\n\
  ```\n\n列表 12-1 中的公式获取值（例如 1672）并在范围`all_Customers`（图 12-14）中查找它；参数“2”表示返回该范围中第二列的相关值（姓名\
  \ - Li）。“FALSE”表示如果该值不在表中，则返回错误消息。列表 12-1 中的公式在 Excel、Google Docs 以及（如果将逗号替换为分号）Open\
  \ Office 中都是有效的。\n\n图 12-15 显示了列 C 中 VLOOKUP 函数的结果。列 D 和 G 也包含用于从相应工作表查找数据的函数。史密斯先生地址不一致的问题（图\
  \ 12-12）已得到解决，并且在第 6 行有一个警告，提示在`all_Customers`中没有客户 1657。\n\n![9781430242093_Fig12-15.tif](img/9781430242093_Fig12-15_fmt.jpeg)\n\
  \n**图 12-15.** 带有客户和产品详情查找的订单表\n\n#### 数据验证与参照完整性\n\n图 12-15 中的`custID`列的行为有点类似于关系表中的外键。然而，与外键不同的是，到目前为止，没有任何东西阻止我们在列\
  \ B 中输入一个在客户工作表中不存在的值（第 6 行），但如果我们使用**精确匹配**查找（包括列表 12-1 中的“FALSE”参数），我们会得到一个非常明确的信号，即错误消息`#N/A`（不可用），表明存在问题。\n\
  \n电子表格产品还提供数据验证工具，因此我们可以控制输入到列 B 的客户编号。我们可以指定订单表上列 B 中的值必须来自客户工作表的 ID 列中的值列表。Google\
  \ Docs 中的实现方式如图 12-16 所示。我们将客户工作表上包含客户编号的单元格范围命名为`custIDs`。\n\n![9781430242093_Fig12-16.tif](img/9781430242093_Fig12-16_fmt.jpeg)\n\
  \n**图 12-16.** Google Docs 验证工具\n\n除了限制我们可以输入到列中的值之外，验证工具还提供了一个方便的有效值列表框以帮助数据录入，如图\
  \ 12-17 所示。\n\n![9781430242093_Fig12-17.tif](img/9781430242093_Fig12-17_fmt.jpeg)\n\
  \n**图 12-17.** 使用数据验证工具限制列中的值\n\n在图 12-17 的列 B 上使用数据验证，为我们提供了一种在订单表上输入或更新数据时的参照完整性。查找函数本身的行为有点像连接操作。图\
  \ 12-15 中的订单表将来自客户和产品工作表的数据汇集在一起，其方式与关系数据库中三个表之间的外连接非常相似。当我们的模型中存在大量不同的类时，这种处理关系的方法很快就会失控，但对于小型问题来说，这是一个不错的近似方案。\n\
  \n\n\n我们设法分隔了三个班级的数据以避免不一致性，使用数据验证在一定程度上模拟了参照完整性，并通过查找功能实现了类似联接的操作。因此我们对数据的准确性有了一定的控制。我们可以使用排序和筛选工具来实现等效的行选择操作，并能通过隐藏列来模拟列投影。电子表格还提供了大量的分析功能。我们所缺乏的是轻松执行需要其他关系运算的复杂查询的能力，例如，*哪些客户同时订购了产品\
  \ 76253 和 56789？*\n\n#### 多对多关系\n\n现在让我们看看电子表格中的多对多关系。这种情况经常出现在我们拥有分类数据时，我们将最后一次查看图\
  \ 12-18 中展示的植物示例数据模型。\n\n![9781430242093_Fig12-18.tif](img/9781430242093_Fig12-18_fmt.jpeg)\n\
  \n**图 12-18.** 一个表示具有多种用途的植物的多对多关系\n\n有几种不同的方法可以在电子表格中存储多个用途值。我们将探讨三种不同方法的优缺点：`重复列`、`类别作为列`和`规范化范围`。\n\
  \n##### 重复列\n\n图 12-19 展示了一种人们在电子表格（也经常在数据库中！）中存储多值类别的常见方法：`重复列`。\n\n![9781430242093_Fig12-19.tif](img/9781430242093_Fig12-19_fmt.jpeg)\n\
  \n**图 12-19.** 使用`重复列`表示多种用途值\n\n这种数据存储方式如此受欢迎的原因在于它采用了一种对用户有用的格式。用户最初可能从植物及其用途的角度考虑数据，而这种格式将每种植物及其所有用途显示在一行上。（从规范化的数据库表中生成这种输出可能很困难。）我们已经在第\
  \ 1 章中讨论过以这种方式存储数据的一些问题，但通过使用一些电子表格功能，我们可以减少部分问题。其中一个问题是确保 D 列到 F 列中的条目拼写一致。这可以通过在电子表格中使用`数据验证`功能来实现，即要求这些列中的值来自存储在另一张工作表上的可能用途列表。另一个重要问题是能够找到具有特定用途（例如，遮荫）的所有植物。仅仅对\
  \ D 列进行排序或筛选来查找所有遮荫值是不够的；这是因为遮荫可能记录在 D 列到 F 列中的任何一列。可以使用`高级筛选`和条件表来检查所有三列，但这远远超出了普通用户的能力范围。具备这种技能的用户，从一开始就使用数据库会更好。因此，`重复列`可以对用途数据进行一些检查，提供良好的报告格式，但在根据给定用途查找植物方面查询能力较差。\n\
  \n##### 类别作为列\n\n另一种常见的存储方法是让每一列对应一个独立的类别，并使用复选标记来指定它们是否适用于特定物种。如图 12-20 所示。\n\n\
  ![9781430242093_Fig12-20.tif](img/9781430242093_Fig12-20_fmt.jpeg)\n\n**图 12-20.**\
  \ 使用`类别作为列`表示多种用途值\n\n这实际上是一种非常有用的表示方法。只要类别数量不是太多，它就很适合报告目的，因为您可以在一行上看到所有用途。不存在用途名称拼写问题，因为这些名称只在标题行中出现一次。也能够非常简单地找到具有特定用途的所有植物。如果我们想找到所有的树篱植物，我们可以简单地对\
  \ F 列进行排序或筛选。简单的筛选还允许我们执行更复杂的查询，例如*查找既适用于树篱又适用于柴火的植物*。因此，`类别作为列`的安排提供了良好的报告、良好的数据录入一致性和有用的查询功能。\n\
  \n##### 规范化范围\n\n最后一种方法是我们称之为`规范化范围`的方法。这种方法实际上模仿了关系数据库，引入了等同于图 12-18 中的中间类，将多对多关系转换为两个一对多关系。我们现在的情况与前面描述的订单电子表格非常相似。我们会有一个包含所有物种信息的工作表（带有一个\
  \ ID 列），一个包含所有用途的工作表，以及第三个工作表用于存储物种和用途的配对，并使用`查找`或`验证`功能关联到其他工作表。如图 12-21 所示。B 列到\
  \ D 列在植物工作表中进行查找，E 列可以从用途工作表进行验证。\n\n![9781430242093_Fig12-21.tif](img/9781430242093_Fig12-21_fmt.jpeg)\n\
  \n**图 12-21.** 使用`规范化范围`和`查找`表示多种用途值\n\n使用这种数据保存方法，我们对数据进行了良好的检查，我们可以对 A 列进行排序或筛选以查找特定植物的所有用途，也可以对\
  \ E 列进行排序或筛选以查找具有特定用途的所有植物。到目前为止，一切都很好。然而，报告效果很差。数据的格式不是任何人想要打印出来的形式，使用起来也不是特别方便。如果数据要以这种方式存储，不如将其存储在数据库中的三个表里，这样我们就能使用更好的查询、数据录入和报告功能。\n\
  \n### 在 XML 中实现\n\nXML（可扩展标记语言）⁶被设计为一种交换信息的方式。它基于带标签元素的层次结构，这些元素包含信息的描述和值。例如，清单\
  \ 12-2 显示了一个表示名字数据片段的带标签元素。我们有开始标签和结束标签，它们描述了数据内容（名字），标签之间是值“James”。\n\n***清单 12-2**.\
  \ 表示名字的 XML 标签*\n\n```xml\n<first_name>James</first_name>\n```\n\n元素也可以有属性，并且元素可以相互嵌套。清单\
  \ 12-3 显示了学生的 XML 定义。`student`是一个带有属性`studentID`的元素，姓氏和名字被声明为元素。\n\n***清单 12-3**.\
  \ 使用元素和属性表示学生数据*\n\n```xml\n<student studentID=“113452”>\n    <first_name>James</first_name>\n\
  \    <last_name>Green</last_name>\n</student>\n```\n\n如果你在问为什么`studentID`是属性而名字是元素，你并不孤单！学生信息可以用属性或元素的许多不同组合来反映，尽管通常任何被认为对人类读者重要的东西都用元素表示。关于清单\
  \ 12-3 需要注意的重要一点是，XML 既包含了数据结构的定义（学生有 ID、名字和姓氏），也包含了数据的值（这个学生是 ID 为 113452 的 James\
  \ Green）。\n\n\n\nXML 非常灵活，元素可以在任何时候定义。其规则之一是整体结构为一棵树，包含一个**根元素**，所有其他元素都必须嵌套在其中。Listing\
  \ 12-3 是可以的，因为它只表示一个学生；但要表示多个学生，我们需要一个包容性的根元素，例如 `<university>`，如 Listing 12-4.\
  \ 所示。\n\n`Listing 12-4`. 表示多个学生的层次结构*\n\n```\n<university>\n\n<student studentID=“113452”>\n\
  \n<first_name>James</first_name>\n\n<last_name>Green</last_name>\n\n</student>\n\
  \n<student studentID=“113756”>\n\n<first_name>Mary</first_name>\n\n<last_name>Smith</last_name>\n\
  \n<degree>Science</degree>\n\n</student>\n\n<student studentID=“116543”>\n\n<first_name>Sally</first_name>\n\
  \n<last_name>Hunter</last_name>\n\n<hostel>Helliers</hostel>\n\n</student>\n\n</university>\n\
  ```\n\nXML 允许我们为每个学生保存不同类型的数据。在 Listing 12-4 中，我们看到 Mary 有关于学位的信息，而 Sally 有关于宿舍的信息。用这种方式表示数据极其灵活，因为它不需要像关系型数据库表那样预定义结构。可以轻松添加额外信息，因为描述和值都保存在一起。这种灵活性的缺点是你永远无法确切知道一个学生是如何被描述的，因此查询数据将会很困难。\n\
  \n### 表示关系\n\nXML 的层次特性允许我们将元素相互嵌套，因此一对多关系很容易表示。我们可以取一个包含多个部门元素的 `organization`\
  \ 元素，每个部门元素内部又嵌套了 `employee` 元素。让我们看看如何使用 XML 来表示 Figure 12-22 中的多对多关系。\n\n![9781430242093_Fig12-22.tif](img/9781430242093_Fig12-22_fmt.jpeg)\n\
  \n`Figure 12-22.` 学生选课的数据模型\n\n我们可以从两个方面来思考 Figure12-22 中的信息：作为每个学生拥有一组课程，或作为每门课程拥有一组学生。Figure\
  \ 12-23 展示了表示学生和课程相关数据的两种可能的 XML 树版本。\n\n![9781430242093_Fig12-23.eps](img/9781430242093_Fig12-23_fmt.png)\n\
  \n`Figure 12-23.` 表示学生和课程的两种可能的 XML 树\n\n在 Figure 12-23 的树中，每个方框都是一个元素，拥有自己嵌套的元素和属性。例如，James\
  \ Green 的每个方框都将用 Listing 12-3 中的代码表示。显然，这里存在一个信息重复的问题。在 Figure 12-23a 中，每个学生的数据会为每门课程重复；而在\
  \ Figure 12-23b 中，每门课程的信息会为每个学生重复。如果 XML 仅用作不同应用程序之间传输数据的手段，这不一定是个问题，但如果有人试图直接更新数据，这显然会成为问题。\n\
  \n表示 Figure 12-22 中模型的另一种方式是引入第三种类型的元素（`enroll`），这与我们在关系型数据库中引入中间表的方式非常相似。Listing\
  \ 12-5 展示了表示两门课程、两名学生及其在 C102 课程中注册情况的代码。\n\n`Listing 12-5`. 表示学生、课程以及关联它们的注册关系的层次结构*\n\
  \n```\n<?xml version=“1.0”?>\n\n<university>\n\n<courses>\n\n<course>\n\n<code>C102</code>\n\
  \n<title>Programming</title>\n\n</course>\n\n<course>\n\n<code>C106</code>\n\n<title>Databases</title>\n\
  \n</course>\n\n</courses>\n\n<students>\n\n\n\n<student studentID = \"113452\">\n\
  <first_name>James</first_name>\n<last_name>Green</last_name>\n</student>\n\n<student\
  \ studentID = \"113756\">\n<first_name>Mary</first_name>\n<last_name>Smith</last_name>\n\
  </student>\n</students>\n\n<enrollments>\n<enroll>\n<stud>113452</stud>\n<crse>C102</crse>\n\
  </enroll>\n<enroll>\n<stud>113756</stud>\n<crse>C102</crse>\n</enroll>\n</enrollments>\n\
  </university>\n\n### 定义 XML 类型\n\n大多数数据库系统都具备从 XML 文件导入和导出数据的功能。例如，清单 12-5 中的文件可以直接导入到\
  \ Access 中，以创建和填充三个数据库表（`student`、`course` 和 `enroll`）。\n\n前几节中的 XML 非常灵活。然而，在实践中，我们通常需要更精确地描述数据元素。可以使用\
  \ DTD（文档类型定义）将课程定义为一个包含代码（`code`）和标题（`title`）的元素。清单 12-6 中的代码就是一个课程的`course`定义。它说明一个课程由`code`和`title`组成，并且`code`和`title`都是字符数据。底部的几行代码则为课程提供了一些值。\n\
  \n***清单 12-6**. 课程的 DTD*\n\n```xml\n<?xml version=\"1.0\"?>\n<!DOCTYPE course[\n\
  \  <!ELEMENT course (code, title)>\n  <!ELEMENT code (#CDATA)>\n  <!ELEMENT title\
  \ (#CDATA)>\n]>\n<course>\n  <code>C102</code>\n  <title>Programming</title>\n</course>\n\
  ```\n\n将清单 12-6 中的 XML 文档导入 Access 将创建一个包含两个文本列（`code`和`title`）的表，以及一行值为`C102`和`Programming`的记录。这是在应用程序之间传输数据结构和值信息的绝佳方式。\n\
  \n一种更具表现力的定义 XML 数据类型的方法是使用 XML 模式语言（XML Schema Language）。XML 模式文档（XSD）是用于描述数据的\
  \ XML 代码。清单 12-7 展示了一个定义课程的简单 XSD。由于元素的定义很可能在许多不同场景中被重用，我们可能会遇到不同文档中的两个或更多元素具有相同名称的情况。例如，我们可能在另一个定义中发现一个名为`title`的不同元素。XSD\
  \ 具有命名空间的概念，因此所有元素都可以被唯一标识。清单 12-7 中的第二行代码表明，任何以`xs`为前缀的定义都来自我们大学的这个定义。其余代码说明`course`是一个由`code`和`title`序列组成的复杂类型，两者都是字符串（或字符类型）。\n\
  \n***清单 12-7**. 非常基础的课程 XSD*\n\n```xml\n<?xml version=\"1.0\"?>\n<xs:schema xmlns:xs=\"\
  http://university\">\n  <xs:element name=\"course\">\n    <xs:complexType>\n   \
  \   <xs:sequence>\n        <xs:element name=\"code\" type=\"xs:string\"/>\n    \
  \    <xs:element name=\"title\" type=\"xs:string\"/>\n      </xs:sequence>\n   \
  \ </xs:complexType>\n  </xs:element>\n</xs:schema>\n```\n\n`XSD`是一个庞大的语言，它允许你定义值的约束、指定基数（例如，一个学生可能拥有的最少和最多课程数）、指定默认值、声明元素必须具有唯一值等等。完整规范可以在\
  \ [`www.w3.org/XML/Schema`](http://www.w3.org/XML/Schema) 找到。本质上，它允许你指定等同于数据库表的结构，但使用的是平台无关的文本文档。它对于在应用程序之间传输模式描述非常有用。\n\
  \n### 查询 XML\n\n本节关于查询`XML`数据的内容仅旨在简要介绍其可能性，并指引你获取更多信息。请参考清单 12-8 中一些学生数据的`XML`描述。\n\
  \n***清单 12-8**. 描述一些学生数据的 XML*\n\n```xml\n<?xml version=\"1.0\"?>\n<university>\n\
  \  <student>\n    <studentID>15673</studentID>\n    <last_name>Smith</last_name>\n\
  \    <first_name>Jim</first_name>\n    <age>18</age>\n  </student>\n  <student>\n\
  \    <studentID>23543</studentID>\n    <last_name>Green</last_name>\n    <first_name>Ruby</first_name>\n\
  \    <age>22</age>\n  </student>\n</university>\n```\n\n这种分层结构意味着我们可以解析文本来查找符合特定条件的学生。`XPath`是一种简洁的语言，允许遍历层次结构以检索满足不同条件的元素。例如，清单\
  \ 12-9 中的`XPath`代码将检索所有年龄超过 20 岁的学生的姓氏。\n\n***清单 12-9**. 检索年龄超过 20 岁的学生的姓氏的 XPath\
  \ 表达式*\n\n```\n/university/student[age>20]/last_name\n```\n\n该代码将遍历`university`树，找到所有定义为`student`的元素，然后找到他们的`last_name`——但仅限于满足`age`元素值大于\
  \ 20 这一条件的记录。`XQuery`是`XPath`的扩展，它允许以各种方式（例如，按字母顺序排序）转换结果，甚至允许在数据集之间进行等同于连接（`join`）的操作。`XPath`和`XQuery`的规范可以在\
  \ [`www.w3.org/standards/xml/`](http://www.w3.org/standards/xml/) 找到。\n\n### NoSQL\n\
  \n本书重点关注小型数据库。我们特别关注高度结构化的数据，其中重点在于能够检索不同类型的信息。这只是整个数据库世界中的一小部分。互联网催生了巨大的数据集，这些数据通常需要存储在横跨各大洲的数百台计算机上。高度结构化的数据模型及其在关系型或`SQL`数据库中的表示方式并不是管理此类数据的有效方法。\n\
  \n`NoSQL`数据库提供了一种结构化程度较低的方式来管理大量数据。一个例子是键值数据库。键数据（比如一个字符串）被存储且可搜索，值则是指向可以找到其余数据的位置的引用。对于数据的结构方式没有约束，因此这些数据库非常灵活。其他例子包括文档数据库和大表数据库（其中所有行可以具有不同的结构）。虽然这些类型的数据库在存储大量数据方面有许多优势，但缺点在于查询的难易程度以及发现不同数据片段之间联系的能力。没有严格的结构，你无法拥有`SQL`中可用的操作，如连接（`join`）。这种逻辑通常在`NoSQL`数据库中通过前端编程来处理。图数据库可以通过维护数据项之间的链接来反映不同数据片段之间的关联。同样，实际数据可以以任何方式结构化，而预设的链接可以在数据项之间提供快速访问。临时查询是困难的。\n\
  \n`SQL`数据库为结构良好的数据提供了高效的存储和查询。`NoSQL`数据库则提供了管理大量不同类型数据的灵活方式。\n\n### 总结\n\n在本章中，我们探讨了使用关系型数据库之外的替代方案来表示数据模型。\n\
  \n### 面向对象数据库\n\n面向对象数据库在处理复杂数据类型（例如姓名和地址）、方法（例如输出不同格式的名称）以及准确表示继承方面，相比关系型数据库具有许多优势。缺点在于复杂的查询可能更难建立。\n\
  \n要在面向对象语言或数据库中表示数据模型：\n\n\n\n### 数据存储与表示\n\n#### 面向对象数据库设计注意事项\n\n*   为每个类定义一个类。\n\
  *   考虑为复杂数据类型（如地址或名称）创建类。\n*   考虑向类添加方法（例如，用于格式化地址或执行计算）。\n*   思考用户将如何识别对象（等同于主键）。\n\
  *   对于关系中的“多”端，包含一个集合，该集合拥有对多个对象的引用（例如，一个`Customer`将拥有一个包含许多`Order`对象的集合）。\n*  \
  \ 对于关系中的“一”端，包含对特定对象的引用（例如，一个`Order`将拥有一个对单个`Customer`对象的引用）。\n\n#### 电子表格\n\n电子表格是数据分析和计算的绝佳工具。它们并非真正为存储数据而设计，但由于通常被认为比数据库更简单且更直接有用，因此常被用于此目的。对于具有类之间简单关系的**小型数据模型**，可以设计出既实用又准确的电子表格。\n\
  \n要在电子表格中表示非常简单的 1-多关系：\n\n*   为每个类创建一个独立的工作表。\n*   创建一个工作表，用于汇集所有信息。\n*   使用精确匹配查找来显示来自其他工作表的信息。\n\
  *   使用数据验证功能来提供工作表之间等同于**参照完整性**的功能。\n\n在电子表格中表示多-多关系有几种方式：\n\n*   重复列（适用于验证和报告，但不适用于查询）\n\
  *   将类别作为列（适用于验证、报告和查询）\n*   规范化范围（适用于验证和查询，但报告和易用性较差）\n\n#### XML\n\nXML 提供了一种以文本格式表达数据结构以及数据元素值的方法。它对于平台无关的数据规范以及在应用程序之间传输数据描述和值非常有用。\n\
  \n*   一个简单的 XML 文档是由标签指定的元素树。\n*   我们可以通过利用 XML 树的层次结构来表示关系。例如，学生可以嵌套在课程中，反之亦然。\n\
  *   多-多关系也可以通过定义三个复杂的 XML 元素来表示，例如学生（students）、课程（courses）和注册（enrollments）（类似于关系数据库中用于表示多-多关系的表）。\n\
  *   文档类型定义（DTD）和 XML 模式定义（XSD）可用于定义数据的结构。\n*   XPath 和 XQuery 是两种能够从 XML 文档中检索特定元素的语言。\n\
