  *   将关系客户端的可选性更改为 0，这样并非所有购买都需要客户。

  *   将可选性保留为 1，但包含一个名为 `CashCustomer` 的虚拟客户对象。

  *   创建 `Customer` 的子类：`Cash_Customer` 和 `Account_Customer`。

