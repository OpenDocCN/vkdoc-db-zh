  \n**图 8-1.** 存在潜在更新问题的表\n\n`Assignment`表的一个问题，是我们早在示例 1-3“昆虫数据”中就遇到过的。我们重复存储了关于一个项目的信息。如果一个项目有超过一名员工参与，那么该项目的编号、名称和联系人可能会在这个表中重复出现多次。这几乎不可避免地会导致某些行（例如项目编号为\
  \ 3 的行）在某个阶段拥有不一致的名称或联系电话。对于图 8-1 中的数据，这相对容易发现，但通常可能不那么明显。如果我们没有两名员工参与项目 3 的数据，我们可能甚至意识不到存在这种可能性。规范化为我们提供了一种正式的方法，在我们陷入麻烦之前检查此类情况。\n\
