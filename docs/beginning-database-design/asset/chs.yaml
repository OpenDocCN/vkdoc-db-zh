  \n##### 练习 1-1\n\n一所学校正在为其学生规划一些户外活动。它想创建一个关于家长如何提供帮助的数据库。秘书设置了如`图 A-1`所示的数据库表来保存信息。\n\
  \n![9781430242093_APP01-01.tif](img/9781430242093_APP01-01_fmt.jpeg)\n\n**图 A-1.**\
  \ 用于记录家长贡献的初始数据库表\n\na)  你预见到在`图 A-1`的表格中充分利用信息会存在什么问题？\n\n该表可能被设计成`图 A-1`的样子，因为学校秘书准备了一份人员名单，并请他们填写自己可以帮助学校露营旅行做什么。然而，数据的主要用途很可能相反——谁能提供这种帮助？如果你想找人帮忙开车，你必须检查两个列，因此对表格进行筛选或排序以找到司机将很困难。此外，还存在类别或关键词问题。有些人将他们愿意送孩子去营地称为“driving（驾驶）”，而另一些人则称之为“transport（运输）”。这使得任何自动选择合适人员的操作几乎不可能。需要人工检查每一行。\n\
  \nb)  建议一些更好的存储这些信息的方法。\n\n一个改进是预先确定一些类别：transport（运输）、provide equipment（提供设备）和\
  \ food preparation（食物准备）。如`图 A-2`所示，基于这些类别的简单电子表格或表格将更容易操作。例如，对运输列进行一些简单的筛选将很快找到所有司机。\n\
  \n![9781430242093_APP01-02.tif](img/9781430242093_APP01-02_fmt.jpeg)\n\n**图 A-2.**\
  \ 使用类别的电子表格或数据库表\n\n`图 A-2`中的解决方案如果学校只想保留这些信息，那是没问题的，很可能确实如此。然而，如果学校后来决定想要详细说明诸如食物准备等任务，或者保留关于可用性的日期，那么该设计将难以修改。我们实际上存储的是关于两件事的信息：人和贡献，以及它们之间的关系（即，谁可以提供什么，可能在什么时候）。类似于`图\
  \ 2-1`中为植物和用途提出的解决方案将是此问题的一个更通用的解决方案，但它可能不值得付出努力。总是在为当前问题提供良好、廉价的解决方案和提供能够演进的可扩展设计之间存在权衡。\n\
  \n##### 练习 1-2\n\na)  你预见到在`图 A-3`的数据库表中充分利用信息会存在什么问题？\n\n![9781430242093_APP01-03.tif](img/9781430242093_APP01-03_fmt.jpeg)\n\
  \n**图 A-3.** *一个用于记录值班任务的初始数据库表*\n\n该表基于用户预想的报告。它便于为给定月份打印出来，放在电话旁或墙上。但这基本上是它唯一有用的方面，而且它同样容易写在一张纸上。从这个数据中可以获得的一个额外信息是为每个人显示他们被安排值班的日期的报告。数据就在那里，但用这种设计提取它一点也不容易。再次强调，思考数据而非输出是有用的。我们正在保存关于两件事的信息：人和日期，以及它们之间的关系。\n\
  \nb)  建议一些更好的存储这些信息的方法。\n\n一个类似于`图 A-4`中的表或电子表格将能够实现对数据的更多视图。我们可以按姓名筛选以获取一个人的值班表，或选择特定的周来获取相同的信息，如`图\
  \ A-3`所示。\n\n![9781430242093_APP01-04.tif](img/9781430242093_APP01-04_fmt.jpeg)\n\
  \n**图 A-4.** 存储关于值班任务数据的一种更有用的方式\n\n\n\n虽然所有信息都包含在表格中，但要让报告的呈现形式与图 A-3 完全一致并非易事。因此，这里需要做出权衡。我个人非常想要图\
  \ A-3 中的表格格式，但我愿意在格式上妥协，以换取图 A-4 所提供的额外数据视图。\n\n##### 练习 2-1\n\n一个小型体育俱乐部需要管理其会员及他们会费缴纳的信息。秘书希望能够录入会员缴费数据，并打印一份类似图\
  \ A-5 的报告。\n\n![9781430242093_APP01-05.tif](img/9781430242093_APP01-05_fmt.jpeg)\n\
  \n**图 A-5.** 一个小型俱乐部的会员数据\n\n### a)  思考不同数据项可能在何时录入。为数据录入绘制一个初始的用例图。\n\n乍一看，我们可能会认为录入数据是一个一步完成的任务，但仔细观察后会发现，可能存在三个不同的流程。不同会员类型的会费很可能在当年年初就已确定，并可在那时录入。一些会员数据可能已经存在，但我们需要在会员加入俱乐部时添加新成员。会费可能会在稍后的某个日期缴纳（特别是对于现有会员）。因此，初始的用例图应反映这些独立的任务。\n\
  \n![9781430242093_APP01-06.eps](img/9781430242093_APP01-06_fmt.png)\n\n**图 A-6.**\
  \ *用于录入俱乐部数据的可能用例*\n\n### b)  考虑你需要维护哪些不同类型的信息，并绘制一个简单的类图。\n\n数据在不同阶段录入这一事实，为我们提供了一些线索，表明有多个不同的类参与其中。我们有关于会员类型和会费的信息、关于会员的信息以及关于付款的信息。如下的类图草稿展示了初始设想。\n\
  \n![9781430242093_APP01-07.tif](img/9781430242093_APP01-07_fmt.jpeg)\n\n**图 A-7.**\
  \ *代表俱乐部数据的类图初稿*\n\n现在考虑一下基数。从表面上看，我们有这样的关系：一个特定的类型（例如，全费会员）会关联许多会员；一个会员只属于一种类型；一笔付款只关联一个会员。一个会员可能会有多少笔付款？这取决于我们是只保存一年的信息还是长期保存。有时，像俱乐部秘书这样的人可能只关心手头的工作，即整理好今年的信息——而这可能就是全部需求。然而，如果你费心建立一个数据库，那么拥有一个能够长期应对的数据库是至关重要的。（然后我们将不得不担心会费随时间变化的问题，但稍后再详述。目前我们假设会费保持不变。）包含基数的完整类图如图\
  \ A-8 所示。请注意，会员（目前）可能没有任何付款记录，并且在某些时候，可能存在一些没有任何关联会员的会员类型。\n\n![9781430242093_APP01-08.tif](img/9781430242093_APP01-08_fmt.jpeg)\n\
  \n**图 A-8.** *代表俱乐部数据的类图，包括基数*\n\n### c)  你可以向俱乐部建议哪些不同的报告呈现方式？你的类图是否能方便地获取所需信息？\n\
  \n能够按类型区分会员可能对计算付款汇总和小计很有用（拥有类型类将确保此信息的准确性）。找出未付款的会员将是必不可少的。如果我们只保存单一年度的付款记录，这很容易——只需找出没有关联付款记录的会员即可。然而，如果我们长期保存付款记录，事情就变得有点棘手了。我们需要知道一笔付款是针对哪一年缴纳的，而不是它何时被支付（有些会员可能会非常拖延）。检查某一年是否已付款可能并不令人满意。我们将在后续章节中探讨处理这类问题的方案。\n\
  \n##### 练习 3-1\n\n考虑以下场景，并绘制一些用例图和初始数据模型。假设系统的主要目标是：为课堂教师记录学生缺勤情况，为学校报告提供信息，以及为教育部提供统计数据。\n\
  \n*当家长打电话说孩子生病时，我们必须通知他们的课堂教师；如果那天是运动日，而孩子在校队里，体育老师可能需要安排替补。然后，我们需要统计所有缺勤天数，写入孩子的报告。教育部每个学期也需要这些总数。*\n\
  \n让我们按照第 3 章总结部分的步骤来进行。\n\n1.  **确定系统的主要目标。**\n\n    我们与客户达成一致，主要目标是为课堂教师、学校报告和教育部的统计数据记录缺勤情况。\n\
  \n2.  **确定不同用户在平均一天内所做的工作。**\n\n    *   秘书接听电话并记录每个学生的姓名。\n    *   秘书为每位课堂教师整理缺勤信息，并通知他们哪些学生缺席。\n\
  \    *   如果是比赛日，秘书将缺勤名单交给体育老师。\n    *   统计每个学生的缺勤总数，用于其个人报告。\n    *   汇总所有学生的缺勤总数，用于教育部。\n\
  \n3.  **头脑风暴与每项工作相关的数据。**\n\n    a.  秘书接听电话并记录每个学生的姓名。\n\n    由于缺勤信息需要按学生整理，我们必须确保正确识别学生。这些学生数据将是系统的重要组成部分。我们需要记录所有学生的姓名，并应考虑引入\
  \ ID 编号来区分可能有相同姓名的学生。我们还需要记录当前日期。\n\n    b.  秘书为每位课堂教师整理缺勤信息，并通知他们哪些学生缺席。\n\n  \
  \  我们需要能够将每个学生与一位课堂教师关联起来。我们需要教师的姓名和一些联系信息。如何通知教师？是给他们送去打印的名单，还是打电话？也许我们可以发电子邮件。从一开始就记录教师的联系信息，如房间号、电话号码和电子邮件地址，会给我们带来灵活性，而且很容易做到。\n\
  \n    c.  如果是比赛日，秘书将运动队缺勤名单交给体育老师。\n\n    这不是主要目标之一，因此记录运动队成员信息目前看来超出了问题范围。能够打印一份当天所有缺勤人员的名单可能就足够了，而我们已经掌握了所有这些信息。\n\
  \n    d.  统计每个学生的缺勤总数，用于其个人报告。\n\n    我们正在收集缺勤日期和学生的 ID，这样我们就可以按任何所需的时间段（周、学期或年）统计每个学生的缺勤次数。\n\
  \n    e.  汇总所有学生的缺勤总数，用于教育部。\n\n    与上一步相同，但汇总所有学生。\n\n4.  **商定项目范围并确定相关数据。**\n\n\
  \    至少我们需要：\n\n    对于每位教师：姓名和联系方式（可能还需要一个 ID）\n\n\n\n#### 学生出勤系统设计过程\n\n##### 5.\
  \ 草拟数据输入用例——考虑异常情况——检查现有表单\n\n图 A-9 展示了一些初始的数据输入用例。\n\n![9781430242093_APP01-09.eps](img/9781430242093_APP01-09_fmt.png)\n\
  \n`图 A-9.` 数据输入用例\n\n以下是图 A-9 中所示用例的简要描述。\n\n1.  维护教师详情：记录或更新姓名和联系方式。\n2.  维护学生详情：为新学生分配学号。记录或更新姓名，并将学生与现有的班级教师关联。\n\
  3.  记录每次缺勤的日期和缺勤学生的学号。\n\n##### 6. 考虑异常情况和复杂问题\n\n一个想到的问题是：我们如何记录一个学生连续缺勤多天的情况？我们有几个选择；我们可以将每一天记录为一次单独的缺勤，或者我们可以记录一次缺勤并带有开始日期和结束日期。前者是最简单的选择。然而，如果学校可能需要关于缺勤类型的一些统计数据（例如，平均缺勤时长是多少？有多少学生一次缺勤超过一周？），那么我们就必须重新考虑我们的方法。由于主要目标只是统计总的缺勤天数，我们目前将每次缺勤记录为单独的一天。另一个问题涉及那些缺勤但未接到家长电话的学生。班级教师将能够使用现有的用例，但这引发了一个问题：缺勤是否有不同的类别。目前，我们只在缺勤数据中添加一条备注。\n\
  \n##### 7. 草拟第一个数据模型\n\n图 A-10 展示了一个数据模型。\n\n![9781430242093_APP01-10.tif](img/9781430242093_APP01-10_fmt.jpeg)\n\
  \n`图 A-10.` 记录学生缺勤的类图\n\n对于图 A-10 中的模型，以下陈述成立：\n\n*   每个学生只有一位班级教师，但可以有多次缺勤。\n*\
  \   每位教师可能作为班级教师负责许多学生（但有些教师可能不是班级教师）。\n*   每次缺勤只针对一个学生。\n\n##### 8. 根据收集的数据，头脑风暴可能的输出\n\
  \n我们拥有报告每个学生或所有学生缺勤次数所需的全部信息。我们还能检索到哪些进一步的信息？我们已决定不保留缺勤时长。那么缺勤原因呢？添加一些缺勤类别（如生病、学校旅行、体育比赛等）将是一个简单的补充。这可能值得与客户讨论。\n\
  \n草拟信息输出用例。\n\n图 A-11 展示了一些满足系统主要目标的输出用例。\n\n![9781430242093_APP01-11.eps](img/9781430242093_APP01-11_fmt.png)\n\
  \n`图 A-11.` 报告信息的用例\n\n以下是图 A-11 中所示用例的简要描述。\n\n4.  体育教师完整列表：查找今天日期的所有缺勤记录。打印出相关学生的姓名。\n\
  \    班级教师列表：查找今天日期的所有缺勤记录。打印出学生姓名和教师姓名，并按教师分组。\n5.  提交给教育部门：查找相关时间段内日期的所有缺勤记录并进行计数。\n\
  \    用于学校报告：对于每个学生，统计相关时间段内日期的所有缺勤次数。\n\n### 练习\n\n##### 练习 4-1\n\n图 A-12 展示了一个初步草图，用于对一家出版公司希望保存作者和书籍信息的场景进行建模。考虑关系`writes`两端的可能可选性，并据此确定书籍和作者的一些可能定义。\n\
  \n![9781430242093_APP01-12.tif](img/9781430242093_APP01-12_fmt.jpeg)\n\n`图 A-12.`\
  \ 考虑作者写书关系的可能可选性\n\n起初我们可能认为，一个作者总会至少有一本他写的书，一本书也总会至少有一个作者（即使我们可能不知道是谁）。这对于*实际的*书籍和作者来说可能是正确的，但这里我们关心的是关于书籍和作者的*信息*。一家出版公司可能会经常看到某个主题的出书机会，并在寻找作者时记录该信息。同样，出版商可能会保留一个潜在的作者并存储其信息，即使该人尚未为该出版商写过书。\n\
  \n可能的定义可能包括：*书籍是已写成或计划写成的作品；作者是已经或可能在将来写书的人*。\n\n##### 练习 4-2\n\n图 A-13 展示了一个鸡尾酒配方的可能数据模型。缺少了什么？\n\
  \n![9781430242093_APP01-13.tif](img/9781430242093_APP01-13_fmt.jpeg)\n\n`图 A-13.`\
  \ 鸡尾酒及其成分；缺少了什么？\n\n每种鸡尾酒可能有多种成分（曼哈顿：味美思，威士忌；玛格丽特：龙舌兰，橙味酒，酸橙）。缺少的是用量。正如多对多关系中常见的情况，需要一个中间类。用量取决于鸡尾酒和成分的特定配对。图\
  \ A-14 展示了一个更好的模型，并附带了一些可能的数据。包含`Recipe`类允许我们保存诸如制作“大吉利”需要多少朗姆酒，而制作“缆车”又需要多少等信息。\n\
  \n![9781430242093_APP01-14.eps](img/9781430242093_APP01-14_fmt.png)\n\n`图 A-14.`\
  \ 一个中间类`Recipe`可以记录每种鸡尾酒和成分配对的用量。\n\n##### 练习 4-3\n\n图 A-15 展示了关于旅馆客人的部分数据模型。如何修改该模型以保存关于房间占用情况的历史信息？\n\
  \n![9781430242093_APP01-15.tif](img/9781430242093_APP01-15_fmt.jpeg)\n\n`图 A-15.`\
  \ 如何修改此模型以保存关于房间占用的历史信息？\n\n该数据模型表明，对于单人间的旅馆，一个房间可能空置或最多有一位住客。每位当前的客人占用一个房间。然而，随着时间的推移，一个房间将会有许多不同的客人，客人也可能返回并入住不同的房间。这需要被建模为一个多对多关系，如图\
  \ A-16 所示。（顺便说一句，从客人与房间关联的可选性为`1`，你可以推断出，我们对客人的定义是在某个阶段被分配了房间的人——而不仅仅是任何可能或不可能来旅馆的人。）\n\
  \n![9781430242093_APP01-16.tif](img/9781430242093_APP01-16_fmt.jpeg)\n\n`图 A-16.`\
  \ 用多对多关系建模客人与房间\n\n现在我们有了一个多对多关系，我们需要问：有什么缺失吗？显然缺失的是关于特定客人在何时占用特定房间的信息。这需要一个中间类，如图\
  \ A-17 所示。\n\n![9781430242093_APP01-17.tif](img/9781430242093_APP01-17_fmt.jpeg)\n\
  \n`图 A-17.` 包含一个`Booking`类以保存客人占用房间的日期信息\n\n\n\n#### 预订模型的问题与业务规则\n\n每位客人可以随时间拥有多个预订，一个房间也可以被多次预订。每次预订对应一位客人和一个特定房间。这里需要提醒注意——我们最初的数据模型（图\
  \ A-16）表明一个房间只能容纳一位客人。既然我们现在允许一个房间随时间容纳多位客人，我们就丢失了这样一个信息：在任何特定时间点，一个房间只能有一位客人入住。我们在图\
  \ A-17 中的模型无法防止多人同时预订同一个房间。这类问题从来不简单！记录关于同时预订的业务规则的一种方法，是在用于为房间添加预订的用例中进行描述。它可能会这样写：*不能为已有预订日期重叠的房间添加新的预订*。数据模型为我们提供了大量的洞见，但它本身并不能完整地描述问题。\n\
  \n##### 练习 5-1\n\n图 A-18 中的类记录了关于一个部门的信息。对于部门的经理和位置信息进行建模，还有哪些其他选择？\n\n![9781430242093_APP01-18.tif](img/9781430242093_APP01-18_fmt.jpeg)\n\
  \n图 A-18. 部门信息建模的初步尝试\n\n首先考虑位置。我们想用这些信息做什么？能够找到所有位于同一地点的部门可能很有用——例如，可以通知他们 CEO\
  \ 要来访。如果我们想根据属性的值来检索对象，就必须确保该值在每个对象中存储一致。创建一个新类有助于解决这个问题。如果引入一个`Location`类，我们就可以存储每个位置的信息，并在部门和位置之间建立关系。引入`Location`类还允许我们保留关于位置的额外信息：地址、电话等等。\n\
  \n我们不太可能经常需要根据经理的姓名来检索部门对象，因为在大多数情况下，经理只与一个部门相关联。然而，关于一位经理，我们需要了解大量的额外信息。如何联系他至少是一个起点。我们已经有这些信息了吗？公司肯定存储了其所有员工的信息，所以在这里我们应该将经理建模为指向现有`Employee`类的关系。\n\
  \n图 A-19 展示了一个更好的模型。如果你感兴趣，可以尝试基于这个新模型来考虑历任经理。\n\n![9781430242093_APP01-19.tif](img/9781430242093_APP01-19_fmt.jpeg)\n\
  \n图 A-19. 更灵活的部门信息模型\n\n##### 练习 5-2\n\n一所大学想要为课程教学的信息建模。可能有多名教职员工参与一门课程的教学，其中一名教职员工被指定为课程主管。请提出一个初步的数据模型。\n\
  \n我们为这种情况有两个显而易见的类：`Course`（课程）和`StaffMember`（教职员工）。这两个类之间有两种不同的关系：`teaches`（教）和`supervises`（监督）。图\
  \ A-20 展示了一个可能的模型。从右向左阅读：每门课程有一位或多位教师，每门课程只有一位主管。从左向右阅读：教职员工可能教授和/或监督任意数量的课程。在这个模型中，我们没有考虑任何历史信息；也没有考虑其他可能的约束，例如，主管是否必须是教师之一？\n\
  \n![9781430242093_APP01-20.tif](img/9781430242093_APP01-20_fmt.jpeg)\n\n图 A-20.\
  \ 使用两种关系对课程教学和监督进行建模\n\n##### 练习 5-3\n\n你会如何为婚姻信息建模？考虑所有可能产生的情况（为简单起见，暂时不必担心参与者的性别）。\n\
  \n我们需要保存关于人的信息——至少是他们的名字。一个人与另一个人结婚，因此需要一个自反关系，如图 A-21 所示。\n\n![9781430242093_APP01-21.tif](img/9781430242093_APP01-21_fmt.jpeg)\n\
  \n图 A-21. 使用自反关系对婚姻建模\n\n可选性很容易理解——人们不必与他人结婚。基数（Cardinalities）呢？通常是一次只有一段婚姻（但不总是如此）。然而，从历史上看，一个人可能有多次婚姻。这就需要一个多对多（Many–Many）关系。当我们有一个多对多关系时，谨慎的做法总是要问：“关于特定的一对对象，哪些附加信息可能有用？”在这种情况下，婚姻的日期会很有用。这些信息可以保存在一个中间类`Marriage`中。我们还可以保存关于婚姻结束原因（离婚、分居、配偶去世等）的详细信息。一个`EndType`类将有助于准确维护这些类别，图\
  \ A-22 中的数据模型就能捕获大量这类细节。每段婚姻恰好涉及两个人（`Marriage`和`Person`之间的两条线），而每个人可以涉及任意多次婚姻。一些婚姻已经结束，因此有一个与之关联的可选类别。\n\
  \n![9781430242093_APP01-22.tif](img/9781430242093_APP01-22_fmt.jpeg)\n\n图 A-22.\
  \ 包含附加类以捕获婚姻信息\n\n##### 练习 5-4\n\n一个管弦乐队保存关于其音乐家、曲目和音乐会的信息。一个部分数据模型如图 A-23 所示。\n\
  \n从这个初始模型中可能推导出哪些错误信息？\n\n修改模型，使其能正确维护以下信息：\n*   特定音乐会中哪些演奏者参与了特定的作品\n*   音乐会上将呈现哪些作品\n\
  *   演奏者在特定音乐会中出场获得的酬金\n\n![9781430242093_APP01-23.tif](img/9781430242093_APP01-23_fmt.jpeg)\n\
  \n图 A-23. 管弦乐队音乐会信息的部分模型\n\n这个模型存在一个扇形陷阱（fan trap）：两个关系的外端都具有多（Many）基数。例如，如果我们知道\
  \ Joe Smith 被要求参加周六的音乐会，并且贝多芬的小提琴奏鸣曲将在周六的音乐会上演出，我们可能会错误地推断 Joe 会演奏这首小提琴奏鸣曲。\n\n\
  如果我们想知道在特定音乐会上，哪些演奏者参与了哪些特定的作品，我们需要一个同时涉及`Player`（演奏者）、`Concert`（音乐会）和`Work`（作品）这三个类的三元关系。图\
  \ A-24 通过一个新的`Appearance`（出场）类来表示这种三元关系。\n\n![9781430242093_APP01-24.tif](img/9781430242093_APP01-24_fmt.jpeg)\n\
  \n图 A-24. 通过附加类表示的三元关系\n\n`Appearance`类的每个对象都与一位演奏者、一部作品和一场音乐会相关联。它允许我们保存如图 A-25\
  \ 中表格所示的数据。我们可以看到 Joe 在周六演奏了奏鸣曲和交响曲，而 Linda 只演奏了奏鸣曲。\n\n![9781430242093_APP01-25.tif](img/9781430242093_APP01-25_fmt.jpeg)\n\
  \n图 A-25. 由`Appearance`类表示的示例数据\n\n\n\n我们需要在 `Work`（作品）和 `Concert`（音乐会）之间建立关系，以便了解节目单上有什么曲目吗？从图\
  \ A-25 可以看出，周六的音乐会以奏鸣曲和交响曲为特色。然而，节目单很可能在任何演奏者参与之前很久就已确定，因此我们需要关于特定音乐会中作品的信息，且该信息独立于演奏者。图\
  \ A-26 中 `Concert` 和 `Work` 之间的二元关系可以记录该信息：一场音乐会在节目单上有一部或多部作品，一部作品可能在许多音乐会上演出。\n\
  \n那么，演奏者在音乐会演出所获得的报酬呢？如果报酬与每部作品相关，那么它们可以作为属性包含在 `Appearance`（演出）中。例如，Joe 因周六演奏奏鸣曲获得\
  \ 30 美元，因演奏交响曲获得 50 美元。如果一笔报酬是针对整场音乐会的（例如，差旅津贴），那么它与作品无关，就需要在 `Player`（演奏者）和 `Concert`（音乐会）之间建立一个新的二元关系。该关系将是多对多（一个演奏者可能参与多场音乐会，一场音乐会有许多演奏者）。因此需要引入新的中间类\
  \ `Player/Concert`，以便我们有一个地方来包含特定演奏者-音乐会组合的报酬。\n\n![9781430242093_APP01-26.tif](img/9781430242093_APP01-26_fmt.jpeg)\n\
  \n图 A-26. 一个更全面的音乐会信息模型\n\n##### 练习 6-1\n\n考虑图 A-27 中的模型，它描述了一家小型邮购公司的客户购买产品的情况。该公司改变了其业务模式，允许客户直接上门支付现金。现金购买无需关联任何客户。\n\
  \n![9781430242093_APP01-27.tif](img/9781430242093_APP01-27_fmt.jpeg)\n\n图 A-27.\
  \ 客户购买产品。\n\n讨论以下数据修改方式的效果如何。\n\n*   将关系客户端的可选性改为 0，这样并非所有购买都需要关联客户。\n\n    这个方案解决了现金销售无需关联客户的当前问题。如果处理得当，它可以工作。然而，存在一个问题：当邮购购买需要开具发票或交付时，将没有客户的记录。\n\
  \n*   保持可选性为 1，但包含一个名为“现金客户”的虚拟客户对象。\n\n    我们现在必须为每笔购买指定一个客户。这可能比前一个选项稍微安全一些。然而，该项目的目标之一是提供关于客户习惯的统计数据。“现金客户先生”可能会有大量的购买记录，这可能会扭曲平均价值或平均购买次数等统计数据的结果。如果记得的话，可以在进行统计前移除“现金客户”的购买记录，但这很繁琐。这取决于这些统计的重要性以及需求的频率。\n\
  \n*   创建 `Customer` 的子类：`Cash_Customer`（现金客户）和 `Account_Customer`（账户客户）。\n\n   \
  \ 这实际上并不比前一个选项实现更多目标，而且实现起来要困难得多。我们没有收集关于现金客户的信息，因此为它们设立一个类是无意义的。\n\n*   创建 `Purchase`（购买）的子类：`Cash_Purchase`（现金购买）和\
  \ `Account_Purchase`（账户购买）。\n\n    我们将有许多现金购买（无关联客户）和许多账户购买（有强制关联的客户），因此为每种类型设立一个类是一个合理的想法。这使得为不同客户类型推导统计信息变得简单。对于当前的需求集，它比虚拟现金客户并没有太大优势，但如果我们想开始记录支付方式（现金、EFTPOS、信用卡等），那么添加这些会很容易。图\
  \ A-28 展示了如何对此建模。\n\n![9781430242093_APP01-28.tif](img/9781430242093_APP01-28_fmt.jpeg)\n\
  \n图 A-28. 购买可以是针对有账户的客户，也可以是匿名的现金交易。\n\n##### 练习 6-2\n\n一位农民记录其农作物施用肥料的信息（例如，用量、日期等）。他的农场由大的区域（section）组成，这些区域又划分为田地（field）。通常，一次肥料施用是针对整个区域的，但偶尔也针对单个田地。你会如何为此建模？\n\
  \n我们可以从一个名为 `Application`（施用）的类开始，它可以记录日期和肥料用量，并且与某种区域——一个区域或一块田地——相关联。区域和田地都是“区域”，它们有共同之处（名称、大小、可施肥等），因此这是泛化的一个候选。看看图\
  \ A-29 中的模型。\n\n![9781430242093_APP01-29.tif](img/9781430242093_APP01-29_fmt.jpeg)\n\
  \n图 A-29. 肥料施用于区域，这些区域要么是区域（section），要么是田地（field）。\n\n除了一个区域要么是区域（section）要么是田地（field）之外，我们还知道一个区域（section）中可能包含许多田地（field）。现在我们可以记录一次施用是针对某个区域（section）的，并知道哪些田地接受了处理。如果需要，我们也可以记录针对单个田地的施肥。\n\
  \n图 A-29 是一个好的解决方案；然而，使用图 A-30 中的组合模式，可以提供一个更通用的解决方案。我们可以记录对整个农场的施肥，农场由区域（section）组成，区域又由田地（field）组成。我们也可以在这任意层级记录肥料施用。这类似于第\
  \ 6 章讨论的建筑物检查问题。\n\n![9781430242093_APP01-30.tif](img/9781430242093_APP01-30_fmt.jpeg)\n\
  \n图 A-30. 组合模式允许对所有层级的区域进行施肥记录。\n\n##### 练习 6-3\n\n一个志愿者图书馆有工作人员、会员和书籍。需要知道哪些书借给了谁以及如何联系借阅者，并记录因书籍逾期产生的费用。参考书不可外借。会员因书籍逾期每天被罚款\
  \ 5 美元，但工作人员不被罚款。你会如何为此情况建模？一些初始类如图 A-31 所示。\n\n![9781430242093_APP01-31.tif](img/9781430242093_APP01-31_fmt.jpeg)\n\
  \n图 A-31. 人们可以借书。\n\n我们知道有两种类型的书（普通书和参考书）和两种类型的人（工作人员和会员）。现在的重要问题是：我们需要继承吗？对于人，问题陈述中唯一的区别是逾期罚款的数值。没有行为上的差异。我们可以创建一个\
  \ `Type`（类型）类（包含工作人员和会员对象），该类与每个人相关联。这个类可以记录该类型的罚款金额（会员 5.00 美元，工作人员 0.00 美元）。类似地，我们可以将每本书分类为某种类型，并在用例中内置一条规则，即参考书不能关联到借阅。然而，这种不同的行为可能值得考虑继承解决方案。图\
  \ A-32 描述了一个可能的解决方案，使用一个关联来表示不同类型的人，使用继承来表示不同类型的书。注意，我们引入了一个抽象的 `Book`（书）类，以便我们可以独立地修改普通书和参考书类。\n\
  \n![9781430242093_APP01-32.tif](img/9781430242093_APP01-32_fmt.jpeg)\n\n图 A-32.\
  \ 表示不同类型书籍和人员的众多可能方法之一\n\n##### 练习 7-1\n\n\n#### 图书馆数据模型与关系数据库设计\n\na) 图 A-33 展示了一个小型图书馆的初始数据模型。向图书管理员解释这个初始数据模型的含义。\n\
  \nb) 为关系数据库设计表，以捕获该模型所表示的信息。包括主键、外键以及其他适当的约束。\n\n![9781430242093_APP01-33.tif](img/9781430242093_APP01-33_fmt.jpeg)\n\
  \n**图 A-33.** 一个小型图书馆的草稿数据模型\n\n##### 解释数据模型\n\na) 以下是一种向图书管理员解释数据模型含义的可能方式。\n\n\
  “该模型显示，您打算保存有关人员的信息（每个人都有一个编号和姓名）。您还保存有关馆藏图书书目的信息：作者、书名和类别。对于每个书目，至少有一个副本，也可能有更多。这些副本有一个副本编号和购买日期。您将保存有关哪些人员借阅了特定副本的信息。”\n\
  \n显然，这个模型中缺少一些重要的内容——我们稍后会提到其中一些！\n\n##### 转换为关系数据库\n\nb) 现在让我们看看如何在关系数据库中表示该模型。\n\
  \n对于每个类，我们需要一个表，其字段用于表示属性。\n\n直接转换得到：\n\n```\nPerson      (ID, last_name, first_name)\n\
  \nTitle       (cat_num, title, author)\n\nItem        (copy_num, purchase_date)\n\
  \nCategory    (name)\n```\n\n我们需要为字段指定一些类型。`ID` 应该是一个整数，您可以考虑某种自动递增的类型。根据编目系统，`cat_num`\
  \ 很可能是一个文本字段。`copy_num` 将是一个整数（1, 2, 3 等），`purchase_date` 显然是一个日期，其他字段都是文本。我们可能应该更仔细地查看作者字段。这里有一些可能性；至少它应该被分成名字和姓氏，但由于人们可能希望按作者搜索，它可能应该是一个独立的类。我们现在暂时不考虑这一点。\n\
  \n约束呢？所有这些字段对我来说似乎都很重要，我看不出有什么理由不将它们全部设为必填（非空）。购买日期可能应该是一个过去的日期，但那样如果需要存储计划中的未来购买可能会造成问题（而这扩大了范围，所以我们现在也暂时不考虑）。\n\
  \n`Person`（`ID`）、`Title`（`cat_num`）和 `Category`（`name`）表的主键很容易确定，但 `Item` 表没有一个明显的主键候选。每个书目都会有一个\
  \ `copy_num = 1` 的副本，并且它们可能是在同一天购买的。因此，没有任何字段或字段组合是合适的。我们可以添加一个唯一标识符，但我们将稍作等待，看看后续情况。\n\
  \n现在来表示关系。`Title` 和 `Category` 之间的一对多（1–Many）关系可以通过在 `Title` 表中添加一个外键来表示，同样，我们需要在\
  \ `Item` 表中添加一个引用 `Title` 表的外键。这些外键的数据类型必须与它们所引用的表中的数据类型相同。为了表示“借阅”这个多对多（Many–Many）关系，我们需要首先添加一个新类（`Loan`），如图\
  \ A-34 所示。\n\n![9781430242093_APP01-34.tif](img/9781430242093_APP01-34_fmt.jpeg)\n\
  \n**图 A-34.** 一个用于帮助表示多对多关系“借阅”的新类\n\n在这个阶段，我们应该意识到（你可能早就意识到了）需要存储有关 `Person` 和\
  \ `Item` 配对的信息（`date_out`、`due_date` 等）。这些需要与客户讨论。我们现在先做个记录。为了表示图 A-34 中的两个一对多关系，我们将在\
  \ `Loan` 表中添加两个外键，分别引用 `Person` 和 `Item`。\n\n下面，我总结了我们目前的进展。（我使用加粗下划线表示主键，斜体表示外键。）\n\
  \n|   | Person | (`ID`, last_name, first_name) |\n|   | Title | (cat_num, title,\
  \ author, *category*) |\n|   | Item | (`copy_num`, purchase_date, *title_cat_num*)\
  \ |\n|   | Category | (`name`) |\n|   | Loan | (`<dates>`, *item*, *person*) |\n\
  \n我们快完成了；我们只需要决定 `Item` 和 `Loan` 表的主键。对于 `Item` 表，现在可以使用 `title_cat_num` 和 `copy_num`\
  \ 的组合作为主键。每个书目都有一个唯一的目录编号，并且每个书目只会有一个副本 1、一个副本 2，依此类推。对于 `Loan` 表，`item` 和 `person`\
  \ 的组合并不合适；同一个人可能第二次借阅同一件物品。然而，如果我们包含借出日期，那么这三个字段将是唯一的（假设您不会在同一天借出同一件物品两次）。也可以在 `Loan`\
  \ 表中添加一个唯一的贷款编号作为主键（我们在第 8 章中探讨这个选择）。\n\n代码清单 A-1 展示了在 SQL Server 中创建这些表的 SQL（我们尚未在本设计书籍中涵盖处理连接键和外键的所有必需语法，但它相当容易理解）。\n\
  \n**代码清单 A-1.** 创建图书馆数据库的 SQL\n\n```sql\nCREATE TABLE Category (name VARCHAR (20)\
  \ PRIMARY KEY);\n\nCREATE TABLE Person (ID INT PRIMARY KEY, last_name VARCHAR(20)\
  \ NOT NULL, first_name VARCHAR(20) NOT NULL);\n\nCREATE TABLE Title (cat_num VARCHAR(40)\
  \ PRIMARY KEY, title VARCHAR(80) NOT NULL, author VARCHAR(80) NOT NULL, category\
  \ VARCHAR(20) NOT NULL FOREIGN KEY REFERENCES Category);\n\nCREATE TABLE Item (title_cat_num\
  \ VARCHAR (40) FOREIGN KEY REFERENCES Title, copy_num INT, purchase_date DATE NOT\
  \ NULL, PRIMARY KEY (title_cat_num, copy_num));\n\nCREATE TABLE Loan (date_out DATE,\
  \ cat_num VARCHAR(40), copy_num INT, borrower INT FOREIGN KEY REFERENCES Person,\
  \ FOREIGN KEY (cat_num, copy_num) REFERENCES Item, PRIMARY KEY (date_out, cat_num,\
  \ copy_num, borrower) );\n```\n\n##### 练习 8-3\n\n图 A-35 展示了示例 1-3 中讨论的未规范化昆虫数据的一个版本。\n\
  \n![9781430242093_APP01-35.tif](img/9781430242093_APP01-35_fmt.jpeg)\n\n**图 A-35.**\
  \ *未规范化的昆虫数据*\n\na) 可能会出现哪些更新问题？\n\n最明显的问题很可能源于重复信息导致的不一致数据。每个农场的名称被记录了多次，并且不可避免地导致\
  \ `HighGate` 出现了拼写错误。访问日期 14 是 2 月 9 日这一事实被记录了多次，数据输入错误是可能的。由于数据存储在电子表格中，没有主键，因此不会出现插入和删除问题。\n\
  \nb) 以下哪些函数依赖成立？\n\n#### 函数依赖分析\n\n*   `FarmID` -> `FarmName`? 是的。如果我知道 ID 就能告诉你名称（或者在拼写错误被纠正后应该可以）。\n\
  *   `FarmID` -> `Visit`? 不是。如图 A-35 中所示的数据，农场 1 有两个关联的访问（14 和 15）。如果这个函数依赖成立，那就意味着每个农场只有一个访问——显然不是本意。\n\
  *   `Visit` -> `Date`? 对于所示数据这肯定是正确的，但这会永远成立吗？这将意味着一次访问发生在单日——需要与客户确认。我们暂时说是。\n\
  *   `Date` -> `Visit`? 不是。那将意味着每天只有一次访问。2 月 9 日有两个关联的访问：14 和 16。\n*   `Visit` ->\
  \ `FarmID`? 所示数据支持这一点。通常我们需要确认一次访问只针对一个农场（即不包含全国巡游）。我们暂时说是。\n*   `SampleID` -> `Field`?\
  \ 如果我们知道样本，肯定也应该知道它来自哪个田地，对吗？然而，一些`SampleID`为 2 的行，`Field`值是 F1，而另一些是 F2。所以，不行——我们无法通过知道`SampleID`的值来确定`Field`的值。这是因为`SampleID`字段不能唯一标识一个样本。存在多个来自不同访问的`SampleID`为\
  \ 2 的样本。要标识一个样本，我们还需要知道它是在哪次访问中收集的。\n*   (`SampleID`, `VisitID`) -> `Field`? 是的——见上文！数据支持这一点。访问\
  \ 14 的样本 2 只关联 F2，访问 16 的样本 2 只关联 F1。\n*   (`SampleID`, `Insect`) -> `Count`? 在一个实际样本中，如果我们指定了昆虫，那么应该得出一个唯一的计数。但记住，`SampleID`字段不能唯一标识一个实际样本。看看`SampleID\
  \ = 2`且`Insect = 'Beetle'`的那些行。（多么巧合！）\n*   (`VisitID`, `SampleID`, `Insect`) ->\
  \ `Count`? 见上文。现在我们将`VisitID`与`SampleID`一起包含，就可以识别出实际的试管（或其他容器）并知道甲虫的数量。\n\n#####\
  \ 问题 c)\n\n(`VisitID`, `SampleID`, `Insect`) 是一个合适的键吗？\n\n从问题 2，让我们总结一下对这些数据成立的函数依赖（FD）。\n\
  \n*   FD1: `FarmID` -> `FarmName`\n*   FD2: `VisitID` -> `Date`, `FarmID`\n*   FD3:\
  \ `SampleID`, `VisitID` -> `Field`\n*   FD4: `VisitID`, `SampleID`, `Insect` ->\
  \ `Count`\n\n如果我有(`VisitID`, `SampleID`, `Insect`)的值，我能确定哪些字段值？\n\n我们知道`Count` (FD4)，`Field`\
  \ (FD3)，`Date`和`FarmID` (FD2)，并且因为现在我知道了`FarmID`，我就能告诉你`FarmName` (FD1)。这就是所有信息，所以这个集合是一个键。它是一个主键，因为如果你移除了任何字段，你就无法知道所有信息（我将把验证这一点留给非常热衷的读者）。\n\
  \n##### 问题 d)\n\n将图 A-35 中的数据分解为一组符合第三范式（3rd Normal form）的表。\n\n字段如下（主键带下划线）：\n\n\
  (`FarmID`, `VisitID`, `SampleID`, `Date`, `FarmName`, `Field`, `Insect`, `Count`)\n\
  \n这符合第一范式（1st Normal Form）吗？\n\n是的。我们没有试图在一个单元格中放入多个信息。\n\n这符合第二范式（2nd Normal Form），或者说非键字段是否依赖于整个键？\n\
  \n不是。我们仅通过知道`FarmID`就能确定`FarmName` (FD1)，所以它应该被移除到另一个与它所依赖的字段一起的表中。这给我们留下：\n\n(`FarmID`,\
  \ `VisitID`, `SampleID`, `Date`, `FarmName`, `Field`, `Insect`, `Count`)\n\n(`FarmID`,\
  \ `FarmName`) (新表)\n\n仅通过知道`Visit`就能确定`Date`和`FarmID` (FD2)。移除这两个字段后剩下：\n\n(`FarmID`,\
  \ `VisitID`, `SampleID`, `Date`, `FarmName`, `Field`, `Insect`, `Count`)\n\n(`VisitID`,\
  \ `FarmID`, `Date`) (新表)\n\n仅通过知道`SampleID`和`VisitID`就能确定`Field` (FD3)。所以这需要被移除。\n\
  \n(`FarmID`, `VisitID`, `SampleID`, `Date`, `FarmName`, `Field`, `Insect`, `Count`)\n\
  \n(`VisitID`, `SampleID`, `Field`) (新表)\n\n最终我们得到以下四个表（键带下划线，外键用斜体）。\n\n*   (`FarmID`,\
  \ `FarmName`)\n*   (`VisitID`, *`FarmID`*, `Date`)\n*   (*`VisitID`*, `SampleID`,\
  \ `Field`)\n*   (*`VisitID`*, *`SampleID`*, `Insect`, `Count`) (原表的剩余部分)\n\n如果我们从图\
  \ A-36 中的类图开始，也能推导出这些表。\n\n![9781430242093_APP01-36.tif](img/9781430242093_APP01-36_fmt.jpeg)\n\
  \n**图 A-36.** `昆虫数据类图`\n\n类图本质上表示一个农场获得多次访问。每次访问有许多关联的样本，对于每个样本，我们可以记录昆虫的数量。我想你会看到，从类图开始会省去很多麻烦，并且还会促使我们思考其他一些可能的类，比如`Field`和`Insect`。然而，这两种方法是达到类似结果的等效途径。\n\
  \n##### 练习 9-1\n\n这里我们再次看到非常有用的“客户订购产品”示例。设计将代表图 A-37 中`Order`类的表。考虑约束、主键和外键以及更新规则。\n\
  \n![9781430242093_APP01-37.tif](img/9781430242093_APP01-37_fmt.jpeg)\n\n**图 A-37.**\
  \ `客户下订单模型`\n\n我们假设`customerID`和`product_name`分别是`Product`和`Customer`表的主键。为了表示这两个关系，这些主键将作为新的外键字段包含在`Order`表中。我们将有（外键用斜体）：\n\
  \n`Order` (`customer`, `product`, `date`, `quantity`)\n\n什么是主键？一个客户可能多次订购一个产品，可能在同一日期甚至相同数量。（你可能为你的聚会订购了三打点心，意识到你误算了某些客人的胃口，并立即又订购了三打。）这是一个（相当罕见的）情况，其中没有属性组合可以保证是唯一的，需要添加一个生成的订单号。所有属性都是必要的，因此应具有`NOT\
  \ NULL`约束。如果日期是订单下达的日期，那么它不应该是未来的日期——但如果它是订单生效的日期，也许未来日期是有意义的——我们现在先不限定这个。至于更新规则，我们必须选择`Disallow\
  \ Delete`（默认）。如果删除了客户或产品，我们仍然希望出于会计目的保留订单（如第 9 章所讨论的，我们可能也希望保留产品和客户）。`Nullify Delete`将使订单信息无用，因为我们留下的数据会是这样的：“在某个特定日期，某人订购了六件某物。”\n\
  \n创建该表的 SQL 语句将类似于清单 A-2 所示。\n\n**清单 A-2.** 创建订单表的 SQL——禁止删除是默认更新规则\n\n```sql\n\
  CREATE TABLE Order (\n    order_num INT PRIMARY KEY,\n    product INT NOT NULL FOREIGN\
  \ KEY REFERENCES Product,\n    customer INT NOT NULL FOREIGN KEY REFERENCES Customer,\n\
  \    quantity INT NOT NULL,\n    date DATE NOT NULL,\n);\n```\n\n##### 练习 9-2\n\n\
  思考为汽车销售场设置品牌和车型表的可用选项。\n\n我们有品牌（makes）、车型（models）、类型（types）和实际的汽车（cars）。如果我们回溯到第\
  \ 2 章，思考用户可能用于排序或搜索的属性并将它们作为单独的类是很有用的。（我们在植物案例中对属（genus）这样做了，以确保所有桉树（Eucalyptus）物种的拼写正确）。在这里，我们很可能希望能够找到关于所有福特（Fords）、所有西耶那（Siestas），甚至所有轿车（sedans）或所有蓝色汽车的信息。初始模型可能类似于图\
  \ A-38 中的样子。\n\n![9781430242093_APP01-38.tif](img/9781430242093_APP01-38_fmt.jpeg)\n\
  \n\n##### 图 A-38：保存车辆信息的可能模型\n\n如果我们进行从类到表的转换，我们会从以下表开始（主键带下划线，外键用斜体表示）：\n\n品牌（`品牌名称`）\n\
  \n型号（`型号名称`，`品牌名称`）\n\n版本（`类型名称`，`排量`，`变速箱`，`价格`，`型号名称`，`品牌名称`）（主键？）\n\n车辆（`车牌号`，`颜色`，？）\n\
  \n让我们在这里停一下。`型号`表的主键是`型号名称`和`品牌名称`的组合，这似乎是合理的。我们不能保证型号名称在不同品牌间是唯一的，而引入一个生成的 ID 在这里似乎并没有增加太多价值。\n\
  \n`版本`表的问题更大。我们需要除`价格`外的所有字段来构成主键：`福特嘉年华自动 1.5 升轿车`与`福特嘉年华自动 2.0 升轿车`是不同的版本。拥有这样一个长主键本身没有问题，直到我们处理`车辆`表时。那五个属性的集合将成为外键，并且需要出现在`车辆`表的每一行中。这将变得非常麻烦。\n\
  \n在这一点上，为`版本`表考虑一个生成的 ID 可能是值得的。然后我们可以得到以下表。\n\n品牌（`品牌名称`）\n\n型号（`型号名称`，`品牌名称`）\n\
  \n版本（`版本 ID`，`类型名称`，`排量`，`变速箱`，`价格`，`型号名称`，`品牌名称`）\n\n车辆（`车牌号`，`颜色`，`版本`）\n\n那么类型（如`轿车`、`掀背车`等）怎么办？这里你有两种选择：引入一个新表，或者在`版本`表的`类型名称`字段上创建一个约束。我们可以对颜色做类似的处理。我可能倾向于为类型单独建一个表：随着我们开始考虑三门或五门掀背车以及其他变体，新类型会被不断添加。我甚至不想去想颜色。如果我们能只假设红色、绿色和蓝色，那会很容易，但我敢肯定你会发现有叫做`樱桃色`、`火焰红`、`猩红色`等等颜色。\n\
  \n##### 练习 10-1\n\n图 A-39 展示了第 3 章中讨论的订餐问题的数据库表和一些可能的数据。在`订单 _ 餐品`表中，`订单`和`餐品`分别是引用`订单`表和`餐品`表的外键。\n\
  \n![9781430242093_APP01-39.eps](img/9781430242093_APP01-39_fmt.png)\n\n###### 图\
  \ A-39：用于送餐的表\n\n确定可提供以下信息的查询。\n\n**a) 确定特定订单（例如 232 号）的费用。**\n\n需要哪些表来获取此信息？我们实际上不需要`订单`表。`订单\
  \ _ 餐品`表有订单号和餐品名称，`餐品`表有价格。在`餐品`和`订单 _ 餐品`之间进行连接，条件是`名称 = 餐品`，将给我们提供图 A-40 中的虚拟表。\n\
  \n![9781430242093_APP01-40.tif](img/9781430242093_APP01-40_fmt.jpeg)\n\n###### 图\
  \ A-40：餐品表和订单 _ 餐品表连接的结果\n\n图 A-40 中的数据包含了我们需要的所有信息。对于每一行，我们可以将`价格`乘以`数量`。我们可以检索订单`232`的所有行并汇总这些金额。\n\
  \n看一下清单 A-3 中的 SQL 代码，看看是否能理解。\n\n**清单 A-3. 用于查找订单 232 费用的 SQL 代码**\n```sql\nSELECT\
  \ SUM (quantity * price)\nFROM Meals INNER JOIN Order_Meal on name = meal\nWHERE\
  \ order = 232\n```\n\n**b) 准备一份未送达订单的列表。**\n\n我们只需要`订单`表来获取此信息。任何没有送达时间的订单都尚未送达（或未记录为已送达）。因此，一个简单的`select`操作来查找`送达时间`字段为空的行即可实现我们的目标。代码如清单\
  \ A-4 所示。\n\n**清单 A-4. 用于查找未送达订单的 SQL 代码**\n```sql\nSELECT *\nFROM Orders\nWHERE\
  \ deliver_time is NULL\n```\n\n清单 A-4 中的查询将为我们提供每个未完成订单的`订单号`、`地址`、`电话`、`司机`和`下单时间`。这足以打电话给司机询问情况。如果我们还想知道点了哪些餐，那么我们需要将`订单`表与`餐品\
  \ _ 订单`表进行连接，以获取所点菜品的名称和数量。\n\n**c) 确定某个月份不同类型餐品的收入。**\n\n这个查询有相当多的步骤，你需要一点练习才能快速得出答案。然而，如果慢慢来，它是很容易理解的。我们需要`餐品`表（用于价格）、`订单\
  \ _ 餐品`表（用于数量）和`订单`表（用于查找日期）。清单 A-5 展示了这三个表之间的连接。\n\n**清单 A-5. 连接餐品数据库中三个表的 SQL\
  \ 代码**\n```sql\nSELECT *\nFROM (Meal INNER JOIN Order_Meal ON name = meal)\n   \
  \       INNER JOIN Orders ON order = order_num\n```\n\n图 A-41 展示了清单 A-5 中连接产生的一些最相关的列。前三列来自`餐品`表，接下来三列来自`订单\
  \ _ 餐品`表，其余列来自`订单`表。\n\n![9781430242093_APP01-41.tif](img/9781430242093_APP01-41_fmt.jpeg)\n\
  \n###### 图 A-41：餐品表、订单 _ 餐品表和订单表连接后的部分列\n\n一个`WHERE`子句将找到所需时间段内的行。（例如，`WHERE 下单时间\
  \ >= 2012/02/01 AND 下单时间 < 2012/03/01` 将检索 2012 年 2 月的行。）我们可以进行`数量`和`价格`的乘法运算来计算总额，类似于本问题\
  \ a)部分的做法。一个`GROUP BY`子句将允许我们找到每种餐品类型的总额。\n\n清单 A-6 展示了最终的查询。试着识别不同的部分。\n\n**清单\
  \ A-6. 用于查找 2012 年 2 月不同类型餐品收入的 SQL 代码**\n```sql\nSELECT type, SUM (quantity * price)\n\
  FROM (Meal INNER JOIN Order_Meal ON name = meal)\n          INNER JOIN Orders ON\
  \ order = order_num\nWHERE Order_time >= 02/01/2012 AND Order_time <= 03/01/2012\n\
  GROUP BY type\n```\n\n##### 练习 11-1\n\n在练习 3-1 中，我们研究了学校记录学生缺勤的问题。初始用例如图 A-42 所示，初始数据模型如图\
  \ A-43 所示。设计一些表单以满足数据输入需求（用例 1-3），并设计一些报告以满足输出用例（4 和 5）。\n\n![9781430242093_APP01-42.eps](img/9781430242093_APP01-42_fmt.png)\n\
  \n###### 图 A-42：记录和报告学校缺勤情况的用例\n\n![9781430242093_APP01-43.tif](img/9781430242093_APP01-43_fmt.jpeg)\n\
  \n###### 图 A-43：记录学校缺勤情况的数据模型\n\nA-44 展示了一些具有代表性的表数据：外键，`学生`和`教师`，已分别添加到`缺勤`表和`学生`表中。\n\
  \n![9781430242093_APP01-44.eps](img/9781430242093_APP01-44_fmt.png)\n\n###### 图\
  \ A-44：学校缺勤情况的一些数据\n\n用于输入教师和学生数据的表单非常简单，因为它们各自基于单个表。记录缺勤的表单需要在`缺勤`表中输入`学生 ID`和`日期`。然而，接听家长电话的学校秘书会希望处理姓名而非\
  \ ID，因此提供姓名信息对于数据输入很重要。图 A-45 展示了一个基于`缺勤`表和`学生`表连接的表单。一个下拉列表按字母顺序显示所有学生的 ID 和姓名，方便选择；只读字段显示学生姓名；新条目的日期默认为今天的日期。\n\
  \n![9781430242093_APP01-45.tif](img/9781430242093_APP01-45_fmt.jpeg)\n\n\n######\
  \ 图 A-45. 录入缺勤情况的表单\n\n为了向教师报告，我们需要来自全部三张表的信息。代码清单 A-7 展示了用于连接这些表的视图的 SQL。请注意，我们在\
  \ `Student` 表上使用了外连接，以便即使学生没有缺勤记录也能被包含在内。\n\n###### 代码清单 A-7. 从所有三张表中检索信息的 SQL\n\
  \n```sql\nCREATE VIEW AllInfo AS\nSELECT * FROM Teacher INNER JOIN\n(Student LEFT\
  \ JOIN Absence ON studentID = student)\nON teacherID = teacher;\n```\n\n图 A-46 展示了基于代码清单\
  \ A-7 中视图查询出的一些数据。\n\n![9781430242093_APP01-46.tif](img/9781430242093_APP01-46_fmt.jpeg)\n\
  \n###### 图 A-46. 从图 A-8 中视图检索出的数据\n\n图 A-46 中的数据包含了我们制作所有报告所需的一切。我们只需要选择相关的行，然后进行一些分组和汇总操作。\n\
