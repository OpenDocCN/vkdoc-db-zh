    在本附录中，我们将讨论每章末尾的问题。我强调这些是讨论而非答案。处理这些不同场景可能还有其他可接受的方式。


    ### Exercise 1-1


    一所学校正在为其学生规划一些户外活动。它想创建一个关于家长如何提供帮助的数据库。秘书设置了如`图 A-1`所示的数据库表来保存信息。


    ![9781430242093_APP01-01.tif](images/9781430242093_APP01-01_fmt.jpeg)


    [**Figure A-1.**](#9781430242093_APP.xhtml#FG1) 用于记录家长贡献的初始数据库表


    a)  你预见到在`图 A-1`的表格中充分利用信息会存在什么问题？


    该表可能被设计成`图 A-1`的样子，因为学校秘书准备了一份人员名单，并请他们填写自己可以帮助学校露营旅行做什么。然而，数据的主要用途很可能相反——谁能提供这种帮助？如果你想找人帮忙开车，你必须检查两个列，因此对表格进行筛选或排序以找到司机将很困难。此外，还存在类别或关键词问题。有些人将他们愿意送孩子去营地称为“driving（驾驶）”，而另一些人则称之为“transport（运输）”。这使得任何自动选择合适人员的操作几乎不可能。需要人工检查每一行。


    b)  建议一些更好的存储这些信息的方法。


    一个改进是预先确定一些类别：transport（运输）、provide equipment（提供设备）和food preparation（食物准备）。如`图
    A-2`所示，基于这些类别的简单电子表格或表格将更容易操作。例如，对运输列进行一些简单的筛选将很快找到所有司机。


    ![9781430242093_APP01-02.tif](images/9781430242093_APP01-02_fmt.jpeg)


    [**Figure A-2.**](#9781430242093_APP.xhtml#FG2) 使用类别的电子表格或数据库表


    `图 A-2`中的解决方案如果学校只想保留这些信息，那是没问题的，很可能确实如此。然而，如果学校后来决定想要详细说明诸如食物准备等任务，或者保留关于可用性的日期，那么该设计将难以修改。我们实际上存储的是关于两件事的信息：人和贡献，以及它们之间的关系（即，谁可以提供什么，可能在什么时候）。类似于`图
    2-1`中为植物和用途提出的解决方案将是此问题的一个更通用的解决方案，但它可能不值得付出努力。总是在为当前问题提供良好、廉价的解决方案和提供能够演进的可扩展设计之间存在权衡。


    ### Exercise 1-2


    a)  你预见到在`图 A-3`的数据库表中充分利用信息会存在什么问题？


    ![9781430242093_APP01-03.tif](images/9781430242093_APP01-03_fmt.jpeg)


    [**Figure A-3.**](#9781430242093_APP.xhtml#FG3) *一个用于记录值班任务的初始数据库表*


    该表基于用户预想的报告。它便于为给定月份打印出来，放在电话旁或墙上。但这基本上是它唯一有用的方面，而且它同样容易写在一张纸上。从这个数据中可以获得的一个额外信息是为每个人显示他们被安排值班的日期的报告。数据就在那里，但用这种设计提取它一点也不容易。再次强调，思考数据而非输出是有用的。我们正在保存关于两件事的信息：人和日期，以及它们之间的关系。


    b)  建议一些更好的存储这些信息的方法。


    一个类似于`图 A-4`中的表或电子表格将能够实现对数据的更多视图。我们可以按姓名筛选以获取一个人的值班表，或选择特定的周来获取相同的信息，如`图 A-3`所示。


