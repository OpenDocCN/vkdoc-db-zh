    ## 集合操作


    虽然连接可能是组合多个表信息最常用的操作，但还有一些其他操作。连接可以在任意两个表之间使用。集合操作则用于两个具有相同数量和类型列的表（或虚拟表）。它们用于诸如“检索同时出现在这两个表中的行”或“检索在这个表中但不在那个表中的行”之类的查询。我们可以使用图
    10-9 中的 `Enrollment` 表来说明这些概念。


    ![9781430242093_Fig10-09.tif](img/9781430242093_Fig10-09_fmt.jpeg)


    **图 10-9**. `Enrollment` 表


    以下是我们可能希望执行的一些查询：


    *   检索所有*同时*选修了 `COMP101` *和* `COMP102` 的学生的 `ID` 号。

    *   检索所有*要么*选修了 `COMP101` *要么*选修了 `COMP102` 的学生的 `ID` 号。

    *   检索所有选修了 `COMP101` *但未*选修 `COMP102` 的学生的 `ID` 号。


    首先，我们需要两个查询，分别返回选修了 `COMP101` 和 `COMP102` 的学生的 `ID`。这些查询及其产生的虚拟表如图 10-10 所示。


    ![9781430242093_Fig10-10.eps](img/9781430242093_Fig10-10_fmt.png)


