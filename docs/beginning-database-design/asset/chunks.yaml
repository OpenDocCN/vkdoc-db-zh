- fmt: 'This chapter gives examples drawn from real life to illustrate some very basic
    types of problems encountered when data is stored in poorly designed spreadsheets
    or tables. These are real examples that I have encountered in my own design work.
    They do not come from a textbook or out of an exam paper. Some of the data has
    been removed or altered to protect the identities of the guilty.


    ## Mishandling Keywords and Categories


    A common problem in database design is the failure to properly deal with keywords
    and categories. Many database applications involve data that is categorized in
    some way; products or events may be of interest to certain categories of people,
    and customers may be categorized by age, interest, or income (or all three). When
    entering data, you usually think of an item with its particular list of categories
    or keywords. However, when you come to preparing reports or doing some analyses,
    you may need to look at things the other way around. You often want to see a category
    with a list of all its items or a count of the number of items. For example, you
    might ask, “What percentage of our customers is in the high–income bracket?” If
    keywords and categories are not stored correctly initially, these reports can
    become very difficult to produce.


    [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1) describes a case in which information
    about how plants are used was recorded in a way that seems reasonable at first
    glance, but that ultimately works against certain types of searches that you would
    realistically expect to be able to perform.


    ### [EXAMPLE 1-1.](#9781430242093_Ch01.xhtml#exa1) THE PLANT DATABASE


    [Figure 1-1](#9781430242093_Ch01.xhtml#F1) shows a small portion of a database
    table recording information about plants. Along with the botanical and common
    names of each plant, the developer decides it would be convenient to keep information
    on the uses for each plant. This is to help prospective buyers decide whether
    a plant is appropriate for their requirements.


    ![9781430242093_Fig01-01.tif](images/9781430242093_Fig01-01_fmt.jpeg)


    [**Figure 1-1.**](#9781430242093_Ch01.xhtml#FG1) The plant database


    If we look up a plant, we can immediately see what its uses are. However, if we
    want to find all the plants suitable for hedging, for example, we have a problem.
    We need to search through each of the use columns individually. Producing a report
    of all hedging plants would require some logic along the lines of: “`IF use1 =
    ‘hedging’ OR use2 = ‘hedging’ OR use3=‘hedging’`.” Also, the database table as
    it stands restricts a plant to having three uses. That may be adequate for now,
    but if that three–use limit changes, the table would have to be redesigned to
    include a new column(s). Any logic will need to be altered to include “`OR use4=‘hedging’`,”
    and at the back of our minds we just know that whatever number of uses we choose,
    eventually we will come across a plant that needs one more. The carefully collected
    data has unfortunately been saved in a manner that is difficult to use and maintain.


    In [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1), the real shame is that all
    the data has been carefully collected and entered, but the design of the table
    makes it extremely difficult to answer a question such as, “What plants are good
    for shelter?” The developer has done better than many in separating the uses into
    individual columns. Often data like this can be found stored in a single column
    separated by commas or other punctuation. (E.g., an entry in a single column for
    uses might read: “shelter, hedging, soil stability.”) This is even more difficult
    to manage than the design in [Figure 1-1](#9781430242093_Ch01.xhtml#F1).


    The problem is that the database was designed principally to satisfy the user’s
    immediate problem, which is: “I need to store all the info I have about each plant.”
    The developer thought of the data in terms of a single type or class, `Plant`,
    and he saw each use as an attribute of a plant in much the same way as its genus
    or common name. This is fine if all you want to know are answers to questions
    like, “What uses does this plant have?” The approach is not so useful when going
    in the other direction, searching for plants having a given use.


    In [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1), we really have two sets or
    classes of data, `Plants` and `Uses`, and we are interested in the connections
    between them. The data modeling techniques described in the rest of the book are
    a practical way of clarifying exactly what it is you expect from your data and
    helping you decide on the best database design to support that.


    Jumping ahead a bit to see a solution for the plant database problem, you can
    quite quickly set up a useful relational database by creating the two tables shown
    in [Figure 1-2](#9781430242093_Ch01.xhtml#F2). (Some extra tables would be even
    better, but more about that in [Chapter 2](#9781430242093_Ch02.xhtml).)


    ![9781430242093_Fig01-02.eps](images/9781430242093_Fig01-02_fmt.png)


    [**Figure 1-2.**](#9781430242093_Ch01.xhtml#FG2) An improved database design to
    represent Plants and Uses


    An end user with modest database skills would be able to set up the appropriate
    keys, relationships, and joins and produce some useful reports. A simple query
    on (or even a filtering or sorting of) the `Uses` table will enable the user to
    find, for example, all shelter plants. There is no restriction now on how many
    uses a plant can have. The initial setup is slightly more costly, in time and
    expertise, than for the single table described in [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1),
    but these separate tables will be able to provide a great deal of additional information.


    [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1) shows us one way we can satisfactorily
    deal with categories. Unfortunately, there are other problems in store. In [Example
    1-1](#9781430242093_Ch01.xhtml#ex1-1), the categories were quite clear cut, but
    this is not always the case. [Example 1-2](#9781430242093_Ch01.xhtml#ex1-2) shows
    the problems that occur when categories and keywords are not so easily determined.


    ### [EXAMPLE 1-2.](#9781430242093_Ch01.xhtml#exa2) RESEARCH INTERESTS


    An employee of a university’s liaison team often receives calls asking to speak
    to a specialist in a particular topic. The liaison team decides to set up a small
    spreadsheet to maintain data about each staff member’s main research interests.
    Originally, the intention is to record just one main area for each staff member,
    but academics, being what they are, cannot be so constrained. The problem of an
    indeterminate number of interests is solved by adding a few extra columns in order
    to accommodate all the interests each staff member supplies. Part of the spreadsheet
    is shown in [Figure 1-3](#9781430242093_Ch01.xhtml#F3).


    ![9781430242093_Fig01-03.tif](images/9781430242093_Fig01-03_fmt.jpeg)


    [**Figure 1-3.**](#9781430242093_Ch01.xhtml#FG3) Research interests in a spreadsheet


    We are able to see at a glance the research interests of a particular person,
    but as was the case in [Example 1-1](#9781430242093_Ch01.xhtml#ex1-1), it is awkward
    to do the reverse and find who is interested in a particular topic. However, we
    have an additional problem here. Many of the research interests look similar but
    they are described differently. How easy will it be to find a researcher who is
    able to “visualize data”?'
