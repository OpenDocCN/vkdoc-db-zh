    # 属性、类，还是关系？


    以下是一些有助于你决策的问题示例。

    `我是否会想根据属性的值来选择对象？` 例如，你是否会想根据年级来选择队伍？如果是，请考虑为该信息引入一个类（创建一个年级类）。

    `我现在或将来是否可能为此信息存储其他数据？` 例如，我是否想保存关于队长的额外信息：电话、地址等？如果是，请考虑引入一个类。

    `我是否已经在存储（或者应该存储）此类信息？` 例如，关于队长的信息与关于成员的信息相同或相似。请考虑现有类之间的关系。


    # 两个类之间的多种关系


    如果涉及两个类的信息是不同的，请考虑它们之间存在多种关系。例如，一个成员可能为一支队伍`效力`，`担任`一支队伍的队长，`管理`一支队伍，等等。


    # 考虑自关系


    一个类的对象可以彼此相关。例如，成员`推荐`其他成员，人`是`其他人`的父母`。


    # 类之间的不同路径


    检查任何存在闭环的地方，以确保相同的信息不会被重复存储。

    检查并确保你没有从一条路径推断出过多的信息；也就是说，要注意扇形陷阱，即一个类与两个其他类相关，并且两个外端的基数都是多对多。

    检查并确保所有对象都有可用的路径；也就是说，要注意深渊陷阱（该路径上是否存在可选的关系？）。


    # 依赖于三个或更多类对象的信息


    当你需要同时了解来自三个或更多类的对象的组合时，考虑引入一个新类；例如，哪个成员在哪场比赛中为哪支队伍效力？

    新类中的任何属性必须依赖于来自*每个*参与类的特定对象组合；例如，关于特定`成员`在特定`队伍`的特定`比赛`中，我需要了解什么？

    考虑什么信息可能与来自贡献类*对*的两个对象相关；例如，关于特定成员和特定队伍，*独立于*任何比赛，我需要了解什么？


    # 检验你的理解


    练习 5-1.


    图 5-21 中的类记录了关于一个部门和经理姓名的信息。对于建模部门的经理和位置信息，还有哪些其他选项？


    ![9781430242093_Fig05-21.tif](img/9781430242093_Fig05-21_fmt.jpeg)


    **图 5-21.** 对部门信息建模的初步尝试


    练习 5-2.


    一所大学希望为课程的教学信息建模。可能有多个教职员工参与授课，其中一位教职员工被指定为课程主管。请提出一个初步的数据模型。


    练习 5-3.


    你会如何为婚姻信息建模——谁和谁结婚，以及何时结婚？思考所有可能出现的不同情况（为简化，目前暂不考虑参与者的性别）。


    练习 5-4.


    一个管弦乐队保存着关于其音乐家、曲目和音乐会的信息。一个部分数据模型如图 5-22 所示。这些关系存储了诸如“Joe Smith 被要求参加周六的音乐会”和“贝多芬的小提琴奏鸣曲将在周六的音乐会上演奏”等信息。


    ![9781430242093_Fig05-22.tif](img/9781430242093_Fig05-22_fmt.jpeg)


    **图 5-22.** 管弦乐队曲目和音乐会的部分数据模型


    从这个初始模型中可能推导出哪些错误信息？

    修正该模型，使其能正确维护以下信息：


    *   哪些演奏者参与了音乐会中特定的作品

    *   音乐会上将要呈现的作品

    *   演奏者参加特定音乐会所获得的报酬


    ¹[`www.omg.org/`](http://www.omg.org)

    ²这种情况有时也被称为`有损连接`。

    ³在队伍数量为奇数的竞赛中，有时会出现`轮空`。


    # 第 6 章

    ## 泛化与特化


    随着数据模型开始发展，有时会出现一些情况，我们发现一个类可能无法像我们希望的那样清晰地描述我们可能的对象。我们可能会发现，对于某些对象，其中一些属性并不真正适用。例如，如果我们有一个类来记录公司所有相关人员的信息，我们可能会发现有些人是小时工资率，而另一些人是年薪。在许多方面，关于每个员工的大部分信息是相似的，但也存在差异。我们也可能遇到这样的情况：我们最初有两个独立的类，例如`讲师`和`学生`，然后开始意识到它们之间有大量共同信息，或者它们涉及相同的关系（比如说，谁有停车许可）。我们如何以务实的方式处理这些“相同却又不同”的情况？


    一些值得牢记的问题是：


    `这两个类是否有足够的共同点，需要重新考虑它们的定义方式？`

    `给定类中的某些对象是否与其他对象有足够大的差异，值得重新考虑其定义方式？`


    ## 共同点很多的类或对象


    考虑一个希望保存员工信息的公司。对于所有员工，它需要保存员工编号、姓名、联系地址和工作类型，但根据工作类型的不同，其余信息可能有所不同。行政人员可能有级别，技术人员可能有证书续期日期。一些工作者可能有年薪，而另一些可能有小时工资率。


    让我们以一个外包公司保存行政人员和技术人员信息的简单情况为例。作为开始，我们可以只考虑一个类，`员工`，如图 6-1 所示。在图 6-2 中，我们展示了该类的一些可能对象。


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig06-01_fmt.jpeg)


    **图 6-1.** 保存在一个类中的不同类型工作者的信息


    ![9781430242093_Fig01-01.tif](img/9781430242093_Fig06-02_fmt.jpeg)


    **图 6-2.** 类`员工`的一些可能对象

