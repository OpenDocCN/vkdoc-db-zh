  trans: '

    ## 后续章节将更详细描述的**技术**本可避免`示例 1-3`中遇到的问题。设计师本不应将数据视为`每个样本中的计数`来思考，而应将`农场`、`田地`、`访察`和`昆虫`视为研究人员感兴趣且可独立或关联研究的独立数据类别。例如，研究人员可能希望查找有关特定土壤类型的田地或在良好天气条件下进行的访察的信息。`图
    1-5`展示了将田地和访察信息分离到不同表格中，不仅减少了重复信息的问题，还能轻松添加更多数据（如田地的土壤类型、访察的天气条件）。`计数`表仍然存在与`示例
    1-1`和`1-2`中表格相同的问题，但这个问题可以解决。我们将在`第 4 章`回到这个例子。


    ![9781430242093_Fig01-05.tif](img/9781430242093_Fig01-05_fmt.png)


    `图 1-5`. 针对昆虫问题改进后的数据库设计


    ### 为单一报告而设计


    有问题的数据库的另一个成因是，设计表格以匹配特定报告的需求。一家小企业可能心中已有一份发票所需的格式。学校秘书可能想看到教师在工作周的去向。从某一份特定报告倒推设计，可能导致数据库存在许多缺陷。`示例
    1-4`是我特别喜欢的一个例子，因为我第一次因为修复数据库而获得真正的报酬，正是因为这个问题（显然，自那以后，学生记录软件已经进步了很多！）。


    `示例 1-4.` 学业成绩


    一个大学院系需要将其最终学年的成绩整理成适合带到考官会议上的格式。该课程规定非常严格，所有学生都完成相同的科目，在系统计算机化之前，会手工生成类似`图 1-6`所示的报告。这种格式便于比较每个学生在各科目上的表现，有助于确定荣誉学位的分数线。


    ![9781430242093_Fig01-06.tif](img/9781430242093_Fig01-06_fmt.jpeg)


    `图 1-6`. 学生成绩所需的报告格式


    数据库表格被设计成完全匹配`图 1-6`中的报告，每一列对应一个字段。第一年数据库运行良好。第二年问题开始出现。你能预见吗？


    一些学生被允许用自己选择的科目替换其中一门试卷。表格被修改，加入了选项名称和选项分数列。接着，一些科目被替换，但过去的科目必须为那些曾经选过的学生保留。表格变得混乱，但尚能应对数据。


    该设计无法处理的是那些挂科后重新注册某科目的学生。一个学生的完整学业记录需要被记录下来，而表格的设计使得无法记录一个学生多次完成同一科目时的多个分数。这个问题直到运行的第二年（当第一批学生开始挂科时）才被注意到。那时，已经投入了相当多的开发工作和数据录入努力。一个有些奇怪的解决方案是，为每一年创建一个新表格，然后应用一些迂回的逻辑从相应的表格中提取学生的分数。当最初的开发者离职后，多年的数据处于一种无人能理解的状况。这就是我如何得到我的第一份数据库工作（并且这个数据库应对了多年中不断变化的需求）。


    `示例 1-4`特别能说明糟糕的设计会带来多大的麻烦。开发者从所需报告的角度看到了问题。他只从一个类来思考：`学生`。实际上，至少存在两个类，`学生`和`科目`，我们感兴趣的是它们之间的关系。特别是，我们想知道某个特定学生在某个特定科目上获得了什么分数。`第
    4 章`将展示，如何通过对诸如`科目`与`学生`之间的**多对多关系**进行探究，从而引入另一个类，`注册记录`。这允许为同一科目的不同尝试记录不同的分数。采用这种方法，关于如何处理学生挂科的疏忽就会被发现，从而避免整个糟糕的局面。


    ## 总结


    关于如何设计数据库的最初想法，可能会受到特定报告或特定输入方法的影响。有时，驱动数据库创建的仅仅是因为手头有一些有价值的信息需要“找个地方存放”。匆忙创建数据库或电子表格可能导致设计无法应对即使是简单的信息检索变化。重要的是仔细思考底层数据，并设计数据库以反映所存储的信息，而不是短期内你可能想对数据做什么。


    ## 测试你的理解


    ### 练习 1-1


    一所学校正为学生计划一些户外活动。教职员工希望创建一个关于家长如何提供帮助的数据库。秘书建立了`图 1-7`中的数据库表格来保存信息。


    ![9781430242093_Fig01-07.tif](img/9781430242093_Fig01-07_fmt.jpeg)


    `图 1-7.`. 记录家长贡献的初始数据库表


    在充分利用这些信息方面，你能预见哪些问题？

    请建议一些更好的存储这些信息的方式。


    ### 练习 1-2


    一个小型图书馆保存着每天谁在服务台值班的名单。他们有一个数据库表，如`图 1-8`所示。


    ![9781430242093_Fig01-08.tif](img/9781430242093_Fig01-08_fmt.jpeg)


    `图 1-8.`. 记录值班任务的初始数据库表


    在充分利用这些信息方面，你能预见哪些问题？

    请建议一些更好的存储这些信息的方式。

