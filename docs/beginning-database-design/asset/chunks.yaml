  trans: '

    清单 10-1 中的查询结果将是一个新行集，其中只包含我们指定的那三个字段或列。投影操作是表上最简单的操作之一，但即使对于这样简单的过程，我们也必须仔细思考我们在做什么。表中的每一行都保证是唯一的，因为我们总是有一个主键。然而，如果主键不是我们在查询中指定的列之一，那么投影操作产生的结果行可能不是唯一的。我们应该如何处理重复行？答案完全取决于你的查询用途。


    考虑几个可能产生重复行的查询例子，使用的是图 10-1 中 `Student` 表的小样本数据。假设校友经理正在组织一次晚宴，并希望获得一份名单来为所有客人制作姓名标签。他从
    `Student` 表中投影出 `first_name` 和 `last_name`，结果有两行都是 `John Smith`。他需要这两行吗？他当然需要，因为两个同名的不同的人会来参加晚宴。现在考虑校友经理希望建立校友分会，因此想要一份所有学生来自的城市列表。他从
    `Student` 表中投影出 `city`，得到了几行 `Christchurch`。他想要所有这些行吗？不。他只想要知道这个城市的集合。


    所以，有时我们希望查询结果中包含重复行，有时则不希望。默认情况下，像清单 10-1 这样的 SQL 语句会检索出重复行。如果你不想要重复行，可以使用关键字
    `DISTINCT`，如清单 10-2 所示。


    清单 10-2. `仅检索唯一记录`


    ```sql

    SELECT DISTINCT city

    FROM Student

    ```


    ## 选择操作


    我们想对单个表做的另一件事是仅检索其中某些行。例如，我们可能想检索那些正在攻读理科学位的学生的信息，或者仅仅是那些在 2011 年首次入学的学生。检索行的子集被称为*选择*操作。我们需要指定如何确定我们想要哪些行。我们通过指定一个测试条件来实现这一点，该条件对每一行而言，结果要么为真，要么为假。要找到所有的理科学生，我们会指定条件
    `degree = ‘Science’`，而要找到所有在 2011 年进入大学的学生，条件则是 `year = 2011`。该条件会依次对每一行进行检查，如果为真，则该行将被包含在正在检索的结果集中。我们可以通过使用
    `AND`、`OR` 和 `NOT` 等运算符来构建更复杂的条件。例如，如果我们只想要在 2011 年入学的理科学生，条件就是 `degree = ‘Science’
    and year = 2011`。如果我们想要一份所有商科和文科学生（但不包括其他任何学位）的名单，条件则是 `degree = ‘Arts’ OR degree
    = ‘Commerce’`。


    在 SQL 语句中，通过使用关键字 `WHERE` 后跟适当的条件来指定选择操作，如清单 10-3 所示。第一行中的 `*` 表示检索所选行的*所有*列或字段。


    清单 10-3. `指定要检索哪些行`


    ```sql

    SELECT *

    FROM Student

    WHERE degree = ‘Science’ and year = 2011

    ```


    有一个虽小但重要的点需要记住：如果一个字段（例如 `degree`）没有值，那么像 `degree = ‘Science’` 这样的语句的真假性是未知的。SQL
    查询只返回那些条件语句*已知*为真的行。如果我们为 `degree = ‘Science’` 检索行，然后为 `degree <> ‘Science’` 检索行，我们将漏掉那些
    `degree` 字段没有值的行，因为我们不知道它的值（它可能是 Science，也可能不是）。要找到那些为空的字段，我们可以使用表达式 `degree is
    NULL`。


    大多数查询将需要结合使用选择和投影操作。在这种情况下，首先根据条件选择行，然后检索指定的列。我们可能不想像清单 10-3 那样看到每个所选学生的全部信息，而可能只想看到他们的
    ID 号和姓名。清单 10-4 展示了在 SQL 语句中结合使用选择和投影操作。


    清单 10-4. `指定要检索哪些行和列`


    ```sql

    SELECT studentID, first_name, last_name

    FROM Student

    WHERE degree = ‘Science’ and year = 2011

    ```


    请注意，条件中涉及的字段（`degree` 和 `year`）不必出现在投影的列中。


    ## 聚合


    我们可能想从 `Student` 表中检索的其他类型信息包括计数、平均值和总和。例如，我们可能想知道曾经注册过的学生总数、每个学位的注册人数，或过去十年中每年的注册人数。如果
    `Student` 表中有更多的列，我们可能还想计算费用的总和或年龄的平均值等等。


    SQL 提供了多种不同的函数用于计数和聚合数值数据（例如，`COUNT`、`AVG`、`SUM`、`MAX`、`MIN`）。我们现在来看如何执行几个不同的查询。


    如果我们只想简单地统计一下曾经在该大学注册过的学生人数，我们可以发出一个如清单 10-5 所示的 SQL 语句。


    清单 10-5. `选择单个计数`


    ```sql

    SELECT COUNT(*)

    FROM Student

    ```


    `COUNT(*)` 的意思就是统计每条记录。这将只返回一个数字，即表中的行数。如果我们想找到最大的 `studentID`，我们会发出类似的语句，但要指定我们要为其查找最大值的字段，如清单
    10-6 所示。


    清单 10-6. `查找字段的最大值`


    ```sql

    SELECT MAX(studentID)

    FROM Student

    ```


    我们可以在 `COUNT` 语句中指定一个特定的字段。你认为如果我们要求 `COUNT(studentID)` 或 `COUNT(city)` 会返回什么？在这两种情况下，我们可能会得到相同的答案（行数），因为大多数版本的
    SQL 默认只计算该字段有值的所有行。如果我们要求统计学生 ID，这可能是我们想要的，但当我们要求统计城市数量时，我们实际上是想知道表中出现了多少个不同的城市。这可以通过在
    `COUNT` 函数中添加关键字 `DISTINCT` 来实现，如清单 10-7 所示。


    清单 10-7. `计算不同城市的数量`


    ```sql

    SELECT COUNT(DISTINCT city)

    FROM Student

    ```


    这些聚合语句中的每一个都可以与选择操作结合使用，以首先检索行的子集。我们可以通过添加一个 `WHERE` 子句来指定我们想要应用聚合操作的行来实现这一点。例如，要找出曾经攻读过理科专业的学生人数，我们会使用清单
    10-8 中的语句。我们可以将其理解为首先检索相应的行，然后对它们进行计数。


    清单 10-8. `计算行的子集`

    '
- fmt: '# SQL查询、分组与连接


    SQL 的聚合功能非常强大，其中一个特别强大的特性是能够对行的子集进行分组，然后统计每个子集中的行数。例如，[Listing 10-8](#9781430242093_Ch10.xhtml#L8)
    返回了已报名科学学位的学生人数。很可能我们同时需要知道科学、艺术及其他学位的学生人数。与其为每个学位单独发出几条命令，不如将它们合并到一条语句中，如 [Listing
    10-9](#9781430242093_Ch10.xhtml#L9) 所示。


    **Listing 10-9.** *检索每个学位的计数*


    ```sql

    SELECT degree, COUNT(*)

    FROM Student

    GROUP BY degree

    ```


    我喜欢这样理解 [Listing 10-9](#9781430242093_Ch10.xhtml#L9) 中的查询：去获取 `Student` 表中的所有行，将每个学位对应的所有行归为一组，统计每个子集中的行数，然后输出学位和计数（如第一行所指定）。结果将类似于
    [Figure 10-2](#9781430242093_Ch10.xhtml#F2)。


    ![9781430242093_Fig10-02.tif](images/9781430242093_Fig10-02_fmt.jpeg)


    **Figure 10-2.** 如 [Listing 10-9](#9781430242093_Ch10.xhtml#L9) 中所示的分组聚合查询的结果


    再次强调，所有这些聚合查询都可以与 `WHERE` 子句结合，以便在分组和计数之前仅检索行的一个子集。这意味着我们可以满足多种多样的请求，例如检索过去十年中每年报名科学的学生人数、来自每个城市的学生人数、来自每个城市的理科学生人数等等。


    ## 排序


    当我们从表中检索行和列的子集时，可能希望它们以特定的顺序显示。例如，如果我们想要一个2011年首次入学的所有学生姓名列表，我们很可能希望按姓名排序，而不是随机顺序。SQL
    短语 `ORDER BY` 允许我们指定行的呈现顺序。[Listing 10-10](#9781430242093_Ch10.xhtml#L10) 展示了检索行子集然后对其进行排序的
    SQL 语句：首先按 `last_name` 排序，然后对于 `last_name` 值相同的行，再按 `first_name` 排序。


    **Listing 10-10.** *按指定顺序检索行和列的子集*


    ```sql

    SELECT last_name, first_name, studentID

    FROM Student

    WHERE year = 2011

    ORDER BY last_name, first_name

    ```


    ## 涉及两个或多个表的查询


    上一节概述了我们可以对单个表执行的一些查询。我们的大多数查询将需要数据库中多个表的信息。


    有多种不同的关系操作可以用来组合表，我们将在本节中了解其中一些。关系数据库操作的一个真正优雅的特性是，当我们对一个或多个表执行操作时，可以将结果视为一个新表。这个新表并非永久存在于数据库中，但概念上将其视为在查询期间存在的虚拟表是方便的。我们在上一节中使用的所有操作（投影列、选择行、聚合和排序）随后都可以应用于这个新的虚拟表。我们还可以将组合两个表产生的虚拟表与另一个真实表组合，然后再与另一个组合。因此，通过一些相当简单的操作，我们可以轻松构建涉及多个表的查询，以满足相当复杂的问题。让我们首先看一些组合表的操作。


    ### 连接操作


    组合两个表最常见的操作是 *内连接*。考虑 [Figure 10-3](#9781430242093_Ch10.xhtml#F3) 中的 `Student`
    和 `Enrollment` 表。


    ![9781430242093_Fig10-03.eps](images/9781430242093_Fig10-03_fmt.png)


    **Figure 10-3.** `Student` 和 `Enrollment` 表的部分内容


    如果我们想回答“谁在2011年注册了COMP102？”这样的问题，我们需要两个表中的数据。如果我们仅通过查看表来回答这个问题，我们会首先从 `Enrollment`
    表中找到满足条件 `course = ‘COMP102’ AND year = 2011` 的行。然后我们需要查看 `Student` 表以找到对应的姓名。内连接允许我们将两个表组合起来，使所有需要的信息一起出现。对于此查询，我们对来自
    `Student` 表的行和来自 `Enrollment` 表的行感兴趣，其中 `studentID` 的值在两个表中相同。这将是连接条件。让我们看看 [Listing
    10-11](#9781430242093_Ch10.xhtml#L11) 中的 SQL 语句，然后思考它的含义。


    **Listing 10-11.** *连接两个表的 SQL 语句*


    ```sql

    SELECT *

    FROM Student INNER JOIN Enrollment ON Student.studentID = Enrollment.studentID

    ```


    将内连接操作理解为创建一个新的虚拟表是很有用的，该表将包含来自两个原始表的所有列。我们用每个表的行的所有组合填充这个表，然后保留那些满足条件 `Student.studentID
    = Enrollment.studentID`（即，两个表中 `studentID` 的值相同）的行。[Figure 10-4](#9781430242093_Ch10.xhtml#F4)
    显示了结果行集的一部分。


    ![9781430242093_Fig10-04.tif](images/9781430242093_Fig10-04_fmt.jpeg)


    **Figure 10-4.** 在 `studentID` 上连接 `Student` 和 `Enrollment` 得到的行


    在 [Figure 10-4](#9781430242093_Ch10.xhtml#F4) 中，前四列来自 `Student` 表，后四列来自 `Enrollment`
    表。我们只看到两个表中 `studentID` 相同的行组合。现在我们有了这个虚拟表，就可以将所有单表操作应用于它。我们可以用 `WHERE` 子句仅选择2011年注册
    COMP102 的那些行，然后投影或仅检索学生的 ID 和姓名。执行此操作的 SQL 语句如 [Listing 10-12](#9781430242093_Ch10.xhtml#L12)
    所示，结果行如 [Figure 10-5](#9781430242093_Ch10.xhtml#F5) 所示。


    **Listing 10-12.** *检索2011年注册COMP102的学生的ID和姓名的SQL语句*


    ```sql

    SELECT Student.studentID, last_name, first_name

    FROM Student INNER JOIN Enrollment ON Student.studentID = Enrollment.studentID

    WHERE course = ‘COMP102’ AND year = 2011

    ```


    ![9781430242093_Fig10-05.tif](images/9781430242093_Fig10-05_fmt.jpeg)


    **Figure 10-5.** 将连接与选择和投影操作结合后得到的行


    这只是对内连接的一个非常粗略的解释，但我相信你能看出如何不断地将产生的虚拟表与另一个表连接，然后再与另一个连接，从而构建出越来越复杂的查询。


    在这个关于连接的基本介绍中，最后一点值得提及的是，当我们连接 [Figure 10-6](#9781430242093_Ch10.xhtml#F6) 中那样的两个表时会发生什么。


    ![9781430242093_Fig10-06.eps](images/9781430242093_Fig10-06_fmt.png)


    **Figure 10-6.** `Course` 和 `Lecturer` 表


    如果我们想要一个包含考官姓名的课程列表，我们可能会首先尝试一个内连接，其中 `Course` 表中的 `examiner` 等于 `Lecturer` 表中的
    `personID`。如果我们这样做，那么结果行将如 [Figure 10-7](#9781430242093_Ch10.xhtml#F7) 所示。


    ![9781430242093_Fig10-07.tif](images/9781430242093_Fig10-07_fmt.jpeg)


    **Figure 10-7.** `Course` 和 `Lecturer` 表内连接的结果'
  raw: 'SELECT COUNT(*)


    FROM Student


    WHERE degree = ‘Science’


    One particularly powerful feature of aggregating in SQL is being able to group
    subsets of rows and then count the rows in each subset. For example, [Listing
    10-8](#9781430242093_Ch10.xhtml#L8) returns the number of students who have enrolled
    in science. It is likely that we might want numbers of students in science, arts,
    and other degrees as well. Rather than having to issue several commands, one for
    each degree, we can combine this into a single statement as in [Listing 10-9](#9781430242093_Ch10.xhtml#L9).


    ***[Listing 10-9.](#9781430242093_Ch10.xhtml#Lis9)** Retrieving Counts for Each
    Degree*


    SELECT degree, COUNT(*)


    FROM Student


    GROUP BY degree


    I like to think of the query in [Listing 10-9](#9781430242093_Ch10.xhtml#L9) as
    working like this: Go and get all the rows in the Student table, group all the
    ones for each degree together, count the rows in each subset, and then write out
    the degree and the count (as specified on the first line). The result would be
    something like [Figure 10-2](#9781430242093_Ch10.xhtml#F2).


    ![9781430242093_Fig10-02.tif](images/9781430242093_Fig10-02_fmt.jpeg)


    [**Figure 10-2**](#9781430242093_Ch10.xhtml#FG2). Result of a grouped aggregate
    query as in [Listing 10-9](#9781430242093_Ch10.xhtml#L9)


    Once again, all these aggregate queries can be combined with a WHERE clause to
    retrieve just a subset of the rows before we do the grouping and counting. This
    means we can answer a multitude of requests such as retrieve the numbers of students
    enrolling in science in each of the last ten years, retrieve the number of students
    from each city, retrieve the number of science students that have come from each
    city, and so on.


    Ordering


    When we retrieve a subset of rows and columns from a table, we might want to see
    them in a particular order. For example, if we want a list of the names of all
    students first enrolling in 2011, it is likely that we would prefer to see them
    ordered by name rather than in a random order. The SQL phrase ORDER BY allows
    us to specify the order in which the rows are presented. [Listing 10-10](#9781430242093_Ch10.xhtml#L10)
    shows the SQL statement that retrieves a subset of the rows and then orders them:
    first by last_name and then, for rows with the same value of last_name, by first_name.


    ***[Listing 10-10.](#9781430242093_Ch10.xhtml#Lis10)** Retrieving a Subset of
    Rows and Columns in a Specified Order*


    SELECT last_name, first_name, studentID


    FROM Student


    WHERE year = 2011


    ORDER BY last_name, first_name


    Queries with Two or More Tables


    The last section gave an overview of some of the queries we can carry out on a
    single table. Most of our queries will require information from several tables
    in our database.


    There are a number of different relational operations that we can use to combine
    tables, and we will look at some of them in this section. One really elegant feature
    of relational database operations is that when we carry out operations on one
    or more tables, we can think of the result as a new table. This new table does
    not exist permanently in the database, but conceptually it is convenient to think
    of it as a virtual table that exists for the time of the query. All the operations
    that we used in the previous section (projecting columns, selecting rows, aggregating,
    and ordering) can then be applied to the new virtual table. We can also take a
    virtual table that results from combining two tables and then combine that with
    another real table, and then another. So with a few quite simple operations, we
    can easily build up queries that involve a number of tables that will satisfy
    quite complex questions. Let’ s first look at some of the operations that combine
    tables.


    The Join Operation


    The most common operation to combine two tables is the *inner join*. Consider
    the Student and Enrollment tables in [Figure 10-3](#9781430242093_Ch10.xhtml#F3).


    ![9781430242093_Fig10-03.eps](images/9781430242093_Fig10-03_fmt.png)


    [**Figure 10-3**](#9781430242093_Ch10.xhtml#FG3). Parts of the Student and Enrollment
    tables


    If we want to answer a question such as “Who was enrolled in COMP102 in 2011?”
    we need data from both tables. If we were answering this question by just looking
    at the tables, we would first find the rows from the Enrollment table that satisfy
    the condition course = ‘COMP102’ AND year = 2011\. We would then need to look
    at the Student table to find the corresponding names. An inner join allows us
    to combine the two tables so that all the required information appears together.
    For this query, we are interested in rows from the Student table and rows from
    the Enrollment table where the value of the studentID is the same in each. This
    will be the join condition. Let’ s look at the SQL statement in [Listing 10-11](#9781430242093_Ch10.xhtml#L11)
    and then consider what it means.


    ***[Listing 10-11.](#9781430242093_Ch10.xhtml#Lis11)** SQL Statement to Join Two
    Tables*


    SELECT *


    FROM Student INNER JOIN Enrollment ON Student.studentID = Enrollment.studentID


    It is useful to think of an inner join operation as making a new virtual table
    that will have all the columns from both original tables. We fill this table up
    with every combination of rows from each table and then retain those that satisfy
    the condition Student.studentID = Enrollment.studentID (i.e., where the values
    of studentID are the same in each table). [Figure 10-4](#9781430242093_Ch10.xhtml#F4)
    shows part of the resulting set of rows.


    ![9781430242093_Fig10-04.tif](images/9781430242093_Fig10-04_fmt.jpeg)


    [**Figure 10-4**](#9781430242093_Ch10.xhtml#FG4). Rows resulting from joining
    Student and Enrollment on studentID


    In [Figure 10-4](#9781430242093_Ch10.xhtml#F4), the first four columns are from
    the Student table, and the second four columns are from the Enrollment table.
    We only see the combinations of rows from each table where the studentID is the
    same. Now that we have this virtual table, we can apply all the single table operations
    to it. We can select just those rows for enrollments in COMP102 for 2011 with
    a WHERE clause and then project or retrieve just the IDs and names of the students.
    The SQL statement to do this is shown in [Listing 10-12](#9781430242093_Ch10.xhtml#L12)
    and the resulting rows in [Figure 10-5](#9781430242093_Ch10.xhtml#F5).


    ***[Listing 10-12.](#9781430242093_Ch10.xhtml#Lis12)** SQL Statement to Retrieve
    IDs and Names of Students in COMP102 in 2011*


    SELECT Student.studentID, last_name, first_name


    FROM Student INNER JOIN Enrollment ON Student.studentID = Enrollment.studentID


    WHERE course = ‘COMP102’ AND year = 2011


    ![9781430242093_Fig10-05.tif](images/9781430242093_Fig10-05_fmt.jpeg)


    [**Figure 10-5.**](#9781430242093_Ch10.xhtml#FG5) Rows resulting from combining
    join with select and project operations


    This is just a very cursory explanation of an inner join, but I’ m sure you can
    see how you can keep joining the resulting virtual table to another table and
    then another to build up ever more complex queries.


    One last point that is worth mentioning in this basic introduction to joins is
    what happens when we join two tables such as those in [Figure 10-6](#9781430242093_Ch10.xhtml#F6).


    ![9781430242093_Fig10-06.eps](images/9781430242093_Fig10-06_fmt.png)


    [**Figure 10-6**](#9781430242093_Ch10.xhtml#FG6). Course and Lecturer tables


    If we want a list of courses with the names of the examiner, we might first try
    an inner join where examiner in the Course table is equal to personID in the Lecturer
    table. If we were to do this, then the resulting rows would be those shown in
    [Figure 10-7](#9781430242093_Ch10.xhtml#F7).


    ![9781430242093_Fig10-07.tif](images/9781430242093_Fig10-07_fmt.jpeg)


    [**Figure 10-7**](#9781430242093_Ch10.xhtml#FG7). Result of inner join between
    Course and Lecturer tables'
